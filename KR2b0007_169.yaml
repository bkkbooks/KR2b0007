body:
  text: 資治通鑑卷第一百六十九端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注陳紀三世祖文皇帝下天嘉四年天嘉四年癸未五六三天嘉四年春正月齊以太子少傅魏收兼尚書右僕射時齊主終日酣飲朝事專委侍中高元海酣戶甘翻朝直遙翻下同元海庸俗帝亦輕之以收才名素盛故用之而收畏懦避事尋坐阿縱除名考異曰北齊書帝紀正月乙亥收為僕射己卯除名相去五日不容如此之速恐誤今去其日兗州刺史畢義雲作書與高元海論敘時事元海入宮不覺遺之給事中李孝貞得而奏之帝由是疏元海以孝貞兼中書舍人徵義雲還朝和士開復譖元海復扶又翻帝以馬鞭箠元海六十責曰汝昔教我反事見上卷二年箠止蕊翻幾許不義以鄴城兵抗並州幾許無智幾居豈翻出為兗州刺史天嘉四年甲申周迪衆潰脫身踰嶺奔晉安臨川郡南城縣有東興嶺通晉安官軍克臨川獲迪妻子寶應以兵資迪留異又遣子忠臣隨之虞寄與寶應書以十事諫之曰自天厭梁德英雄互起人人自以為得之然夷凶翦亂四海樂推者陳氏也樂音洛豈非曆數有在惟天所授乎一也以王琳之強侯瑱之力進足以搖蕩中原爭衡天下退足以屈強江外瑱他甸翻又音鎮屈其勿翻強其兩翻雄張偏隅張知亮翻然或命一旅之師或資一士之説琳則瓦解冰泮投身異域瑱則厥角稽顙書泰誓曰若崩厥角言如角之崩也孟子曰若崩厥角稽首文雖小異意則大同此止言厥角稽顙當以顛蹶之蹶為義説式芮翻稽音啓斯又天假其威而除其患二也今將軍以藩戚之重陳編寶應於屬籍故云然盡忠奉上勠力勤王豈不勳高竇融竇融以河西歸漢纍世貴盛吳芮以長沙奉漢高祖賢之制詔御史長沙王忠其定著令至傳國五世楊雄解嘲曰析人之圭師古注云析分也判亦分也判野謂畫野分土君國子民而傳之後世也三也聖朝棄瑕忘過寬厚得人至於余孝頃潘純陀李孝欽歐陽頠等朝直遙翻高祖永定元年歐陽頠為周文育所禽潘純陀李孝欽皆王琳將也孝欽及余孝頃二年為周迪所禽純陀蓋琳敗而歸陳也頠魚委翻悉委以心腹任以爪牙胸中豁然曾無纖芥況將軍釁非張繡罪異畢諶張繡殺曹操之子其後歸操操厚待之事見漢獻帝紀又操為兗州以畢諶為別駕張邈以兗州叛劫諶母弟妻子操謝遣之諶頓首言無二心既出遂亡去及破呂布諶生得衆為之懼操曰夫人孝于親者豈有不忠於君乎吾所求也以為魯相釁許覲翻諶氏壬翻何失於富貴四也方今周齊鄰睦境外無虞並兵一向匪朝伊夕非劉項競逐之機楚趙連從之勢從子容翻何得雍容高拱坐論西伯哉五也范曄論隗囂曰若囂命會符運敵非天力雖坐論西伯豈為過哉注云言不遇光武為敵則不謝西伯也亟經摧衄亟去吏翻頻數也聲實虧喪膽氣衰沮其將帥首鼠兩端唯利是視孰能被堅執鋭長驅深入繫馬埋輪奮不顧命以先士卒者乎六也喪息浪翻沮在呂翻將即亮翻帥所類翻被皮義翻先悉薦翻將軍之強孰如侯景將軍之衆孰如王琳武皇滅侯景於前今上摧王琳於後此乃天時非復人力復扶又翻且兵革已後民皆厭亂其孰能棄墳墓捐妻子出萬死不顧之計從將軍於白刃之間乎七也歷觀前古子陽季孟顛覆相尋餘善右渠危亡繼及子陽公孫述字季孟隗囂字二人事見漢光武紀餘善右渠事見漢武帝紀山川難恃況將軍欲以數郡之地當天下之兵以諸侯之資拒天子之命強弱逆順可得侔乎八也且非我族類其心必異左傳季文子引史佚之言豈能及物留將軍身縻國爵子尚王姬易曰我有好爵吾與爾縻之子尚王姬謂異子貞臣尚主也背明君而孤立危急之日豈能同憂共患不背將軍者乎背蒲妹翻至於師老力屈懼誅利賞必有韓智晉陽之謀張陳井陘之勢九也韓智事見一卷周威烈王二十三年張陳事始秦二世三年終漢高帝三年陘音刑鋒不可當兵自建康來建康於晉安為北故曰北軍萬里遠鬬者無反顧之心有必死之志故其鋒不可當人多顧後衆寡不敵將帥不侔師以無名而出事以無機而動以此稱兵稱猶舉也十也為將軍計莫若絶親留氏寶應娶留異之女為妻章十二行本釋上有遣子入質四字乙十一行本同孔本同張校同退齋校同甲偃兵一遵詔旨方今藩維尚少少詩沼翻皇子幼沖凡豫宗族皆蒙寵樹況以將軍之地將軍之才將軍之名將軍之勢而克修藩服北面稱臣寧與劉澤同年而語其功業哉劉澤漢高祖疏屬事見十三卷漢高后七年不覺狂言斧鉞之誅其甘如薺薺齊濟翻寶應覽書大怒或謂寶應曰虞公病勢稍篤言多錯謬寶應意乃小釋亦以寄民望故優容之天嘉四年周梁躁公侯莫陳崇從周主如原州諡法好變動民曰躁人竊怪其故崇謂所親曰吾比聞術者言晉公今年不利車駕今忽夜還不過晉公死耳比毗至翻宇文護封晉公或發其事乙酉帝召諸公於大德殿面責崇崇惶恐謝罪其夜冢宰護遣使將兵就崇第逼令自殺護當恐懼修省引咎避權不當專殺功臣使疏吏翻將即亮翻天嘉四年壬辰以高州刺史黃法為南徐州刺史臨川太守周敷為南豫州刺史五代志高涼郡梁置高州南豫州時治宣城巨俱翻天嘉四年周主命司憲大夫拓跋迪唐六典御史大夫秦官歷晉宋齊梁陳後魏北齊後周並不置大夫而以中丞為臺主後周秋官置司憲中大夫二人掌丞司寇之法以左右刑罰蓋比御史中丞之職也章十二行本篇下有二月庚子頒行之七字乙十一行本同孔本同張校同退齋校同五代志周造大律凡二十五篇一刑名二法例三祀享四朝會五婚姻六戶禁七水火八興繕九衛宮十市廛十一鬬競十二劫盜十三賊叛十四毀亡十五違制十六關津十七諸侯十八廣既牧十九雜犯二十詐偽二十一請求二十二告言二十三逃亡二十四繫訊二十五斷獄當從志作二十五篇其制罪一曰杖刑自十至五十二曰鞭刑自六十至百三曰徒刑自一年至五年四曰流刑自二千五百里至四千五百里五曰死刑磬絞斬梟裂古者公族有罪磬于甸人鄭玄曰懸縊殺之曰磬絞者全其身首斬者殊死梟者挂其首於木上裂者車裂梟堅堯翻五刑之屬各有五合二十五等天嘉四年庚戌以司空南徐州刺史侯安都為江州刺史天嘉四年辛酉周詔大冢宰晉國公親則懿昆昆兄也自今詔誥及百司文書並不得稱公名護抗表固讓天嘉四年三月乙丑朔日有食之天嘉四年齊詔司空斛律光督步騎二萬築勳掌城於軹關五代志軹關在河內郡王屋縣騎奇寄翻軹音只置十二戍天嘉四年丙戌齊以兼尚書右僕射趙彥深為左僕射左僕射當作右僕射蓋先是兼官今正除右僕射也天嘉四年夏四月乙未周以柱國達奚武為太保天嘉四年周主將視學以太傅燕國公于謹為三老燕因肩翻謹上表固辭不許仍賜以延年杖戊午帝幸太學謹入門帝迎拜於門屏之間謹答拜有司設三老席於中楹南向太師護升階設几謹升席南面憑几而坐大司馬豆盧寧升階正舄帝升階立於斧扆之前西面扆屏風也斧扆畫文為斧形扆於豈翻帝跪設醬豆醬食味之主古之養老執醬而饋今跪而設豆為于偽翻袒割袒而割牲也謹食畢帝親跪授爵以酳酳羊晉翻以酒漱口也有司撤訖帝北面立而訪道謹起立於席後對曰木受繩則正后從諫則聖書傅説告高宗之言天下乃安又曰去食去兵信不可去論語孔子答子貢之言去羌呂翻又曰有功必賞有罪必罰則為善者日進為惡者日止又曰言行者立身之基行下孟翻願陛下三思而言九慮而行勿使有過天子之過如日月之食人莫不知願陛下慎之帝再拜受言謹答拜禮成而出三代而下視學養老乞言之禮唯漢明帝周武帝行之天嘉四年司空侯安都恃功驕橫橫戶孟翻數聚文武之士騎射賦詩數所角翻下又數同騎奇寄翻齋中賓客動至千人部下將帥多不遵法度檢問收攝攝録也捕也將即亮翻帥所類翻上性嚴整內銜之安都弗之覺每有表啓封訖有事未盡開封自書之云又啓某事及侍宴酒酣或箕踞傾倚常陪樂遊園禊飲樂音洛謂上曰何如作臨川王時上不應安都再三言之上曰此雖天命抑亦明公之力宴訖啓借供帳水飾欲載妻妾於御堂宴飲上雖許之意甚不懌明日安都坐於御座賓客居㣥臣位稱觴上壽上時掌翻會重雲殿災安都帥將士帶甲入殿上甚惡之陰為之備此皆日前事史歷敘安都致敗之由重直龍翻惡烏路翻及周迪反朝議謂當使安都討之朝直遙翻下同而上更使吳明徹更工衡翻又數遣臺使按問安都部下檢括亡叛使疏吏翻安都遣其別駕周弘實自託於舍人蔡景歷蔡景歷為中書舍人自武帝以來特蒙親任蓋陳朝事權皆在中書也景歷録其狀具奏之因希旨稱安都謀反上慮其不受召故用為江州五月安都自京口還建康部伍入于石頭六月帝引安都宴於嘉德殿又集其部下將帥會于尚書朝堂於坐收安都囚于嘉德西省坐徂臥翻又收其將帥盡奪馬仗而釋之因出蔡景歷表以示於朝乃下詔暴其罪惡明日賜死宥其妻子資給其喪初高祖在京口高祖與王僧辨既平臺城出鎮京口杜僧明周文育侯安都為壽奉觴上壽也積功曰伐卿等悉良將也而並有所短杜公志大而識暗狎於下而驕於上周侯交不擇人而推心過差侯郎慠誕而無厭輕佻而肆志厭於鹽翻佻他雕翻並非全身之道卒皆如其言知臣莫若君誠哉是言也卒子恤翻天嘉四年乙卯齊主使兼散騎常侍崔子武來聘散悉亶翻騎奇寄翻下同天嘉四年齊侍中開府儀同三司和士開有寵於齊主齊主外朝視事或在內宴賞須臾之間不得不與士開相見或纍日不歸一日數入或放還之後俄頃即追未至之間連騎督趣趣讀曰促姦諂百端寵愛日隆前後賞賜不可勝紀每侍左右言辭容止極諸鄙褻以夜繼晝無復君臣之禮常謂帝曰自古帝王盡為灰土堯舜桀紂竟復何異陛下宜及少壯極意為樂縱橫行之勝音升復扶又翻少詩照翻樂音洛縱子容翻一日取快可敵千年國事盡付大臣何慮不辦無為自勤約也帝大悅於是委趙彥深掌官爵元文遙掌財用唐雍掌外騎兵外兵及騎兵也勃海王歡相魏丞相府外兵曹騎兵曹分掌兵馬及文宣受禪諸司咸歸尚書惟此二曹不廢謂之外兵省騎兵省據和士開傳時委雍掌外兵白建掌騎兵帝三四日一視朝書數字而已朝直遙翻略無所言須臾罷入長粲僧敬之子也胡僧敬見一百五十八卷梁武帝大同七年帝使士開與胡后握槊河南康獻王孝瑜諫曰皇后天下之母豈可與臣下接手孝瑜又言趙郡王睿其父死於非命睿父琛勃海王歡之弟也亂歡後庭因杖而斃近其靳翻由是睿及士開共譖之士開言孝瑜奢僭睿言山東唯聞河南王不聞有陛下齊主多居晉陽在山西司冀定殷瀛滄之地皆在山東孝瑜竊與爾朱御女言齊制八十一御女比正四品古之御妻也孝瑜傳云爾朱事太后孝瑜先與之通大怒庚申頓飲孝瑜酒三十七杯飲於禁翻孝瑜體肥大腰帶十圍帝使左右婁子彥載以出鴆之於車至西華門煩躁投水而絶躁則到翻贈太尉録尚書事諸侯在宮中者莫敢舉聲唯河間王孝琬大哭而出孝琬孝瑜之弟也天嘉四年秋七月戊辰周主幸原州天嘉四年八月辛丑齊以三臺宮為大興聖寺天嘉四年九月壬戌廣州刺史陽山穆公歐陽頠卒詔子紇襲父爵位陽山郡公五代志南海郡含洭縣梁置陽山郡為歐陽紇不就徵阻兵而反張本頠魚委翻紇下沒翻天嘉四年甲子周主自原州登隴登隴坂也天嘉四年周迪復越東興嶺為寇東興嶺在臨川郡南城縣界唐志撫州南城縣武德四年析置永城東興二縣七年省沈約曰東興縣吳立屬臨川郡復扶又翻辛未詔護軍章昭達將兵討之昭達時為護軍將軍天嘉四年丙戌周主如同州天嘉四年初周人欲與突厥木杆可汗連兵伐齊厥九勿翻杆公旦翻可從刊入聲汗音寒許納其女為后遣御伯大夫楊荐唐六典曰後周天官新置御伯中大夫二人天子出入則侍于左右大祭祀盥洗則授巾武帝改御伯為納言蓋侍中之職也宣帝末又別置侍中為加官左武伯蓋侍衛之官注見後齊人聞之懼亦遣使求婚於突厥賂遺甚厚使疏吏翻遺于季翻木杆貪齊幣重欲執荐等送齊荐知之責木杆曰太祖昔與可汗共敦鄰好好呼到翻蠕蠕部落數千來降太祖悉以付可汗使者以快可汗之意事見一百六十六卷梁敬帝紹泰元年蠕人兗翻降戶江翻獨不愧鬼神乎背蒲妹翻木杆慘然良久曰君言是也吾意決矣當相與共平東賊然後遣女荐等復命考異曰典略在保定二年按王慶傳云是歲乃興入並之役故置於此公卿請發十萬人擊齊柱國楊忠獨以為得萬騎足矣戊子遣忠將步騎一萬與突厥自北道伐齊又遣大將軍達奚武帥步騎三萬自南道出平陽期會於晉陽忠將即亮翻又音如字領也騎奇寄翻帥讀曰率下同天嘉四年冬十一月辛酉章昭達大破周迪迪脫身潛竄山谷民相與匿之雖加誅戮無肯言者天嘉四年十二月辛卯周主還長安自隴上還天嘉四年丙申大赦天嘉四年章昭達進軍度嶺趣建安討陳寶應趣七喻翻詔益州刺史余孝頃梁元帝之世益州之地已入于周陳命余孝頃遙領益州刺史耳會工外翻天嘉四年是歲初祭始興昭烈王於建康用天子禮帝嗣高祖以子伯茂奉始興昭烈王之祀今初以天子禮祀之非禮也天嘉四年周楊忠拔齊二十餘城齊人守陘嶺之隘唐志代州鴈門縣有東陘關西陘關陘音刑隘烏懈翻突厥木杆地頭步離三可汗以十萬騎會之木杆分國為三部木杆牙帳居都斤山地頭可汗統東方步離可汗統西方厥九勿翻杆公旦翻己丑自恆州三道俱入恆戶登翻時大雪數旬南北千餘里平地數尺齊主自鄴倍道赴之戊午至晉陽斛律光將步兵章十二行本兵作騎乙十一行本同孔本同三萬屯平陽拒達奚武之兵也己未周師及突厥逼晉陽齊主畏其強戎服帥宮人欲東走避之趙郡王睿河間王孝琬叩馬諫孝琬請委睿部分分扶問翻必得嚴整帝從之命六軍進止皆取睿節度而使並州刺史段韶總之委睿部分而段韶總其事五年五年春正月庚申朔齊主登北城晉陽北城也突厥咎周人曰爾言齊亂故來伐之今齊人眼中亦有鐵何可當邪厥九勿翻邪音耶周人以步卒為前鋒從西山下去城二里許諸將咸欲逆擊之將即亮翻段韶曰步卒力勢自當有限今積雪既厚逆戰非便不如陳以待之彼勞我逸破之必矣既至齊悉其鋭師鼓譟而出突厥震駭引上西山不肯戰陳讀曰陳上時掌翻周師大敗而還還從宣翻又如字下同突厥引兵出塞縱兵大掠自晉陽以往七百餘里人畜無遺謂晉陽以北七百餘里畜許救翻不敢逼突厥還至陘嶺凍滑乃鋪氈以度胡馬寒瘦膝已下皆無毛比至長城陘音刑比必利翻長城即文宣所築者馬死且盡截矟杖之以歸達奚武至平陽未知忠退斛律光與書曰鴻鵠已翔於寥廓羅者猶視於沮澤漢司馬相如難蜀父老曰焦明已翔乎寥廓羅者猶視乎藪澤沮將預翻亦還光逐之入周境獲二千餘口而還光見帝於晉陽帝以新遭大寇抱光頭而哭任城王湝進曰何至於此乃止見賢遍翻湝音皆又戶皆翻初齊顯祖之世周人常懼齊兵西渡每至冬月守河椎冰及世祖即位嬖幸用事朝政漸紊嬖卑義翻又博計翻朝直遙翻紊音問齊人椎冰以備周兵之逼斛律光憂之曰國家常有吞關隴之志今日至此而唯玩聲色乎五年辛巳上祀南郊五年二月庚寅朔日有食之五年初齊顯祖命㣥官刊定魏麟趾格為齊律見一百六十三卷梁簡文帝大寶元年時軍國多事決獄罕依律文相承謂之變法從事世祖即位思革其弊乃督修律令者至是而成律十二篇五代志齊律十二篇一名例二禁衛三婚戶四亶興五違制六詐偽七鬬訟八賊盜九捕斷十毀損十一廣既牧十二雜律其刑名有五一曰死重者轘之轘胡慣翻即車裂也次梟首次斬次絞二曰流投邊裔為兵三曰刑自五歲至一歲四曰鞭自百至四十五曰杖自三十至十凡十五等死四等流一刑五等鞭五等杖三等通十八等今曰凡十五等通鑑依五代志大凡為十五等之文也梟堅堯翻章十二行本外作內乙十一行本同孔本同官及老小閹癡老者小者閹者癡者與流外官皆贖鄭玄曰閹精氣閉藏者癡不慧也皆以絹代金三月辛酉班行之因大赦赦其宿罪此後有犯者皆以法令施行又敕仕門子弟常講習之仕門謂入仕之家又令民十八受田輸租調二十充兵六十免力役六十六還田免租調一夫受露田八十畝杜佑曰不栽樹者謂之露田調力弔翻下夫調牛調同奴婢依良人言奴婢受田依良人畝數按五代志丁牛一頭受田六十畝限止四年丁牛者勝耕之牛牧牛者得受其田綿八兩墾租二石義租五斗奴婢準良人之半奴婢者官常役其力故所調半於良人墾租一斗義租五升墾租送臺義租納郡以備水旱調力弔翻五年己巳齊㣥盜田子禮等數十人共劫太師彭城景思王浟為主詐稱使者徑向浟第至內室稱敕牽浟上馬臨以白刃欲引向南殿浟大呼不從浟夷周翻使疏吏翻上時掌翻呼火故翻盜殺之五年庚辰周初令百官執笏記玉藻曰史進象笏書思對命注云意所思念將以告君者也對所以對君也命所受命也書之於笏為失忘也又曰凡有指畫於君前者用笏造受命於君前用笏笏畢用也因飾焉笏度二尺有六寸其中博三寸其殺六分而去一應劭曰昔荊軻逐秦王其後謁者持匕首以備不虞從此侍官皆執刀劍高祖偃武修文始制手版代焉隋志曰中世以來唯八座尚書執笏笏者白筆綴其頭紫囊裹之其餘公卿但執手板謂之筆笏蓋以記事受言西魏以降通用象牙五品已下通用竹木爾雅二字衍釋名笏忽也君有教命及所白則書其上以備忽忘也唐會要曰笏舊制三品已上前挫後直五品已上前挫後屈武德已來一例上圓下方開元八年諸笏三品已上前詘後直五品以上前詘後挫並用象九品已上任用竹木上挫下方男以上聽依品爵執笏假版官亦依此例五年齊以斛律光為司徒武興王普為尚書左僕射普歸彥之兄子也甲申以馮翊王潤為司空五年夏四月辛卯齊主使兼散騎常侍皇甫亮來聘散悉亶翻騎奇寄翻五年庚子周主遣使來聘使疏吏翻五年癸卯周以鄧公河南竇熾為大宗伯五月壬戌封世宗之子賢為畢公五年甲子齊主還鄴自晉陽還五年壬午齊以趙郡王睿為録尚書事前司徒婁睿為太尉甲申以段韶為太師丁亥以任城王湝為大將軍湝戶皆翻又音皆五年壬辰齊主如晉陽五年周以太保達奚武為同州刺史五年六月齊主殺樂陵王百年時白虹暈日兩重重直龍翻又橫貫而不達赤星見齊主欲以百年厭之見賢遍翻厭於叶翻會博陵人賈德胄教百年書百年嘗作數敕字德胄封以奏之帝發怒使召百年百年自知不免割帶玦留與其斛律氏見帝於涼風堂見賢遍翻使百年書敕字驗與德胄所奏相似遣左右亂捶之又令曳之繞堂行且捶所過血皆遍地氣息將盡乃斬之孝昭殺文宣之子武成又殺孝昭之子天之報應固不爽遺言諄諄竟何益哉捶止蕊翻棄諸池池水盡赤把玦哀號不食號戶高翻月餘亦卒玦猶在手拳不可開其父光自擘之乃開擘博厄翻分擘也五年庚寅周改御伯為納言五年初周太祖之從賀拔嶽在關中也遣人迎晉公護於晉陽梁武帝中大通二年宇文泰從賀拔嶽入關按下護答母書云違離膝下三十五年逆而數之正在是年周主之姑蓋宇文泰之妹也中山宮慕容氏之故宮自魏以來以為別宮遣間使入齊求之莫知音息間古莧翻音息猶今人言信息也使疏吏翻下同齊遣使者至玉壁求通互市護欲訪求母姑使司馬下大夫尹公正至玉壁與之言司馬下大夫即軍司馬之職勳州刺史韋孝寬獲關東人復縱之因致書為言西朝欲通好之意復扶又翻又音如字為于偽翻好呼到翻下同周在關西故稱西朝朝直遙翻是時周人以前攻晉陽不得志謀與突厥再伐齊厥九勿翻齊主聞之大懼許遣護母西歸且求通好先遣其姑歸五年秋八月丁亥朔日有食之五年周遣柱國楊忠章十二行本忠下有將兵二字乙十一行本同孔本同會突厥伐齊至北河而還水經河水東徑沃野故城南又北屈而為南河出焉河水又北迆西溢於窳渾縣故城東又屈而東流為北河東徑高闕南還從宣翻又音如字五年戊子周以齊公憲為雍州牧雍於用翻宇文貴為大司徒九月丁巳以衛公直為大司空追録佐命元功封開府儀同三司隴西公李昞為唐公録昞父虎佐命之功也李氏有天下國號曰唐本此昞音丙周官大馭中大夫掌馭玉路以祀及犯軷屬夏官樂音洛虎之子鳳惠之子也李虎始見一百五十六卷梁武帝中大通六年若干惠見一百五十八卷大同九年五年乙丑齊主封其子綽為南陽王儼為東平王儼太子之母弟也五年突厥寇齊幽州衆十餘萬入長城大掠而還五年周皇姑之歸也齊主遣人為晉公護母作書言護幼時數事又寄其所著錦袍以為信驗為于偽翻著陟略翻且曰吾屬千載之運屬之欲翻載子亥翻蒙大齊之德矜老開恩許得相見禽獸草木母子相依吾有何罪與汝分離今復何福還望見汝復扶又翻又音如字言此悲喜死而更蘇世間所有求皆可得母子異國何處可求假汝貴極王公富過山海有一老母八十之年飄然千里死亡旦夕不得一朝暫見暫與暫同處昌呂翻寒不得汝衣飢不得汝食汝雖窮榮極盛光耀世間於吾何益吾今日之前汝既不得申其供養供居用翻養羊亮翻事往何論今日以後吾之殘命唯繫於汝爾戴天履地中有鬼神勿云冥昧而可欺負護得書悲不自勝勝音升復書曰區宇分崩遭遇災禍違離膝下三十五年離力智翻皆知母子誰同薩保護字薩保薩桑葛翻子為公侯母為俘隸暑不見母暑寒不見母寒衣不知有無食不知飢飽泯如天地之外無由暫聞分懷冤酷終此一生分扶問翻死若有知冀奉見於泉下耳不謂齊朝解網惠以德音磨敦四姑並許矜放護兄弟呼其母為阿摩敦四姑即周主之姑也第四朝直遙翻下同魂爽飛越左傳鄭子産曰人生始化曰魄既生魄陽曰魂用物精多則魂魄強是以有精爽至於神明號戶刀翻不能自勝勝音升下足勝同齊朝霈然之恩既已霑洽有家有國信義為本伏度來期已應有日朝直遙翻度徒洛翻一得奉見慈顏永畢生願生死肉骨生死謂使死者復生肉骨謂使枯骨再肉負山戴嶽未足勝荷勝音升荷下可翻齊人留護母使更與護書邀護重報往返再三時段韶拒突厥軍於塞下厥九勿翻齊主使黃門徐世榮乘傳齎周書問韶韶以周人反覆本無信義比晉陽之役其事可知護外託為相其實主也既為母請和傳張戀翻比毗至翻相息亮翻為于偽翻下主為同不遣一介之使使疏吏翻下同若據移書即送其母恐示之以弱不如且外許之待和親堅定然後遣之未晚齊主不聽即遣之護母至長安席未及暖而洛陽之師已出卒如段韶之言閻氏至周舉朝稱慶周主為之大赦凡所資奉窮極華盛每四時伏臘周主帥諸親戚行家人之禮稱觴上壽朝直遙翻帥讀曰率下同上時掌翻五年突厥自幽州還還從宣翻又如字留屯塞北更集諸部兵遣使告周欲與共擊齊如前約閏月乙巳突厥寇齊幽州晉公護新得其母未欲伐齊恐負突厥約更生邊患不得已徵二十四軍及左右廂散隸秦隴巴蜀之兵二十四軍六柱國及十二大將軍所統關中諸府兵也安定公泰相魏左右各十二軍並屬相府左右廂禁衛兵也兼有秦隴巴蜀之兵散隸於左右廂者散悉亶翻凡二張二作三十萬人冬十月甲子周主授護斧鉞於廟庭丁卯親勞軍於沙苑勞力到翻癸酉還宮護軍至潼關遣柱國尉遲迥帥精兵十萬為前鋒趣洛陽大將軍權景宣帥山南之兵趣懸瓠山南荊襄之兵尉紆勿翻帥讀曰率下同趣七喻翻少始照翻檦與標同五年周迪復出東興復扶又翻下衆復同宣城太守錢肅鎮東興以城降迪守式又翻降戶江翻吳州刺史陳詳將兵擊之五代志鄱陽郡梁置吳州陳廢鄱陽之吳州而於吳郡置吳州將即亮翻又音如字領也迪衆復振南豫州刺史西豐脫侯周敷帥所部擊之諡法無脫諡蓋以周敷輕脫而死故以為諡據周敷傳定川縣名迪紿敷曰吾昔與弟勠力同心事見一百六十六卷梁敬帝太平元年紿蕩亥翻今願伏罪還朝朝直遙翻因弟披露心腑先乞挺身共盟敷許之方登壇為迪所殺五年陳寶應據晉安建安二郡水陸為柵以拒章昭達昭達與戰不利因據上流命軍士伐木為筏施拍其上會大雨江漲昭達放筏衝寶應水柵盡壞之筏音伐壞音怪又出兵攻其步軍方合戰上遣將軍余孝頃自海道適至去年遣孝頃督會稽諸郡兵自東道合攻陳寶應十一月己丑寶應大敗逃至莆口莆口在唐泉州莆田縣界莆田今興化軍即其地虞寄傳作莆田莆音蒲早從虞公計不至今日昭達追擒之並擒留異及其族黨送建康斬之異子貞臣以尚主得免寶應賓客皆死上聞虞寄嘗諫寶應命昭達禮遣詣建康既見勞之曰管寧無恙漢末管寧客遼東不受公孫度爵命已而復得還鄉里故以寄況之勞力到翻上子伯信封衡陽王奉獻王昌祀五年周晉公護進屯弘農尉章十二行本尉上有甲午二字乙十一行本同孔本同張校同遲迥圍洛陽雍州牧齊公憲同州刺史達奚武涇州總管王雄軍於邙山雍於用翻邙音亡五年戊戌齊主遣兼散騎常侍劉逖來聘散悉亶翻騎奇寄翻五年初周楊檦為邵州刺史五代志絳郡垣縣後魏置邵郡及白水縣後周置邵州改白水為亳城隋廢州及郡改亳城為垣縣數與齊戰數所角翻未嘗不捷由是輕之既出軹關獨引兵深入又不設備甲辰齊太尉婁睿將兵奄至大破檦軍檦遂降齊將即亮翻下同降戶江翻下同權景宣圍懸瓠十二月齊豫州道行臺豫州刺史太原王士良永州刺史蕭世怡並以城降之景宣使開府郭彥守豫州謝徹守永州五代志汝南郡城陽縣舊置楚州後齊曰永州周人為土山地道以攻洛陽三旬不克晉公護命諸將塹斷河陽路塹七豔翻斷音短遏齊救兵然後同攻洛陽諸將以為齊兵必不敢出唯張斥候而已齊遣蘭陵王長恭大將軍斛律光救洛陽畏周兵之強未敢進齊主召並州刺史段韶謂曰洛陽危急今欲遣王救之突厥在北復須鎮禦如何復扶又翻對曰北虜侵邊事等疥癬今西鄰窺逼乃腹心之病請奉詔南行齊主曰朕意亦爾乃令韶督精騎一千發晉陽騎奇寄翻丁巳齊主亦自晉陽赴洛陽五年己未齊太宰平原靖翼王淹卒五年段韶自晉陽行五日濟河會連日陰霧壬戌韶至洛陽帥帳下三百騎與諸將登邙阪觀周軍形勢邙阪北邙之阪也帥讀曰率與周軍遇韶即馳告諸營追集騎士結陳以待之陳讀曰陳下光陳同韶為左軍蘭陵王長恭為中軍斛律光為右軍周人不意其至皆忷懼忷許拱翻韶遙謂周人曰汝宇文護才得其母遽來為寇何也周人曰天遣我來有何可問韶曰天道賞善罰惡當遣汝送死來耳周人以步兵在前上山逆戰上北邙逆齊兵與戰上時掌翻誘音酉待其力弊然後下馬擊之周師大敗一時瓦解投墜溪谷死者甚衆蘭陵王長恭以五百騎突入周軍遂至金墉城下城上人弗識長恭免胄示之面乃下弩手救之周師在城下者亦解圍遁去委棄營幕自邙山至穀水水經穀水出弘農澠池縣墦冢林穀陽谷東北過穀城縣北又東過河南縣北東南入于洛軍資器械彌滿川澤唯齊公憲達奚武及庸忠公王雄在後勒兵拒戰諡法危身奉上曰忠王雄馳馬衝斛律光陳光退走雄追之光左右皆散唯餘一奴一矢雄按矟不及光者丈餘矟色角翻謂光曰吾惜爾不殺當生將爾見天子光射雄中額雄抱馬走至營而卒射而亦翻中竹仲翻卒子恤翻軍中益懼齊公憲拊循督勵衆心小安至夜收軍憲欲待明更戰達奚武曰洛陽軍散人情震駭若不因夜速還明日欲歸不得武在軍久備見形勢公少年未經事少詩照翻豈可以數營士卒委之虎口乎乃還權景宣亦棄豫州走丁卯齊主至洛陽己巳以段韶為太宰斛律光為太尉蘭陵王長恭為尚書令賞戰勝之功也壬申齊主如虎牢遂自滑臺如黎陽丙子至鄴楊忠引兵出沃野應接突厥軍糧不給諸軍憂之計無所出忠乃招誘稽胡酋長咸在坐此稽胡與離石稽胡同種散居銀夏之間誘音酉酋慈秋翻長知兩翻坐徂臥翻曰大冢宰已平洛陽欲與突厥共討稽胡之不服者坐者皆懼忠慰諭而遣之於是諸胡相帥饋輸軍糧填積屬周師罷歸忠亦還帥讀曰率屬之欲翻晉公護本無將略是行也又非本心故無功兵出無名事故不成其宇文護之謂乎將即亮翻與諸將稽首謝罪周主慰勞罷之稽音啓勞力到翻五年是歲齊山東大水飢死者不可勝計勝音升五年宕昌王梁彌定屢寇周邊周大將軍田弘討滅之以其地置宕州宕州在長安西南一千六百五十六里宕徒浪翻六年六年春正月癸卯齊以任城王湝為大司馬湝戶皆翻又音皆任音壬六年齊主如晉陽六年二月辛丑周遣陳公純許公貴神武公竇毅南陽公楊荐等魏收志朔州有神武郡領尖山樹頽二縣水經注樹頽水出沃陽縣東山下西南流右合誥升爰水其水左合中陵川後魏置神武郡於神武川治尖山縣隋為神武縣屬馬邑郡荐在甸翻並六宮百二十人詣突厥可汗牙帳逆女毅熾之兄子也熾時為柱國周主既誅宇文護以為太傅六年丙寅周以柱國安武公李穆為大司空綏德公陸通為大司寇李穆陸通皆縣公也五代志襄陽郡舊有安武縣西魏併為南漳縣雕陰郡有綏德縣西魏置六年壬申周主如岐州六年夏四月甲寅以安成王頊為司空頊以帝弟之重勢傾朝野直兵鮑僧睿恃頊勢為不法自秦以來王公府皆有直兵從南臺官屬引奏案而入御史臺為南臺為斂容正坐為于偽翻下上為同陵進讀奏版時頊在殿上侍立仰視上流汗失色陵遣殿中御史引頊下殿殿中侍御史居殿中察非法故使之引頊下殿朝廷肅然六年丙嚴丙改戊午齊大將軍東安王婁睿坐事免六年齊著作郎祖珽有文學多技藝而疏率無行珽它鼎翻技渠綺翻行下孟翻嘗為高祖中外府功曹高歡都督中外諸軍事以珽為府功曹叵羅杯之屬叵普火翻又坐詐盜官粟三千石鞭二百配甲坊珽與令史李雙倉督成祖等作晉州啓請粟三千石珽代功曹趙彥深宣教給之事覺鞭配珽為祕書丞盜華林遍略及有他贓當絞除名為民華林遍略梁武帝集諸學士所撰也南人持至鄴下賣之高澄集書吏一日一夜寫畢退還其本珽盜遍略數帙質錢樗蒲重以得罪至顯祖時又盜遍略一部及擬補令史十餘人皆有受由是除名而愛其才伎令直中書省伎渠綺翻世祖為長廣王珽為胡桃油獻之珽善為胡桃油以塗畫殿下有非常骨法孝徵夢殿下乘龍上天孝徵祖珽字也是時人多以字行上時掌翻若然當使兄大富貴及即位擢拜中書侍郎遷散騎常侍與和士開共為姦諂珽私説士開曰君之寵幸振古無比振古猶云自古也説式芮翻下宜説微説同晚晏也義與晏駕同士開因從問計珽曰宜説主上云文襄文宣孝昭之子俱不得立今宜令皇太子早踐大位以定君臣之分踐慈演翻分扶問翻若事成中宮少主必皆德君此萬全計也請君微説主上令粗解少詩照翻粗坐五翻解戶買翻曉也珽當自外上表論之士開許諾會有彗星見彗祥歲翻見賢遍翻太史奏云彗除舊布新之象當有易主珽於是上書言陛下雖為天子未為極貴宜傳位東宮且以上應天道並上魏顯祖禪子故事見一百三十二卷宋明帝泰始六年是上併上時掌翻下公上同丙子使太宰段韶持節奉皇帝璽綬傳位於太子緯太子即皇帝位於晉陽宮諱緯字仁綱武成帝之長子也璽斯氏翻綬音受改元天統又詔以太子斛律氏為皇后於是㣥公上世祖尊號為太上皇帝軍國大事咸以聞使黃門侍郎馮子琮尚書左丞胡長粲輔導少主出入禁中專典敷奏子琮胡后之妹夫也祖珽拜祕書監加儀同三司大被親寵被皮義翻見重二宮六年丁丑齊以賀拔仁為太師侯莫陳相為太保馮翊王潤為司徒趙郡王睿為司空河南嚴南改間王孝琬為尚書令戊寅以瀛州刺史尉粲為太尉斛律光為大將軍東安王婁睿為太尉尉粲婁睿並為太尉此承齊紀之誤按尉粲傳粲為太傅當從之婁睿封郡王五代志琅邪郡沂水縣舊置東安郡按齊紀彥深自右僕射遷為左僕射六年五月突厥遣使至齊使疏吏翻始與齊通六年六月己巳齊主使兼散騎常侍王季高來聘六年秋七月辛巳朔日有食之六年上遣都督程靈洗自鄱陽別道擊周迪破之迪與麾下十餘人竄于山穴中日月浸久從者亦稍苦之從才用翻後遣人潛出臨川市魚鮭吳人總稱魚菜為鮭音戶皆翻臨川太守駱牙執之令取迪自效因使腹心勇士隨之入山其人誘迪出獵守式又翻誘音酉勇士伏於道傍出斬之丙戌傳首至建康六年庚寅周主如秦州八月丙子還長安六年己卯立皇子伯固為新安王伯恭為晉安王伯仁為廬陵王伯義為江夏王夏戶雅翻六年冬十月辛亥周以函谷關城為通洛防以金州刺史賀若敦為中州刺史鎮函谷五代志河南郡新安縣後周置中州杜佑曰在今洛州新安縣東敦恃才負氣顧其流輩皆為大將軍敦獨未得兼以湘州之役全軍而返謂宜受賞翻得除名事見上卷元年二年使疏吏翻晉公護怒徵還逼令自殺臨死謂其子弼曰吾志平江南今而不果汝必成吾志吾以舌死汝不可不思因引錐刺弼舌出血以誡之刺七亦翻弼能從父之志而取江南不能守父之戒而保其身六年十一月癸未齊太上皇至鄴六年齊世祖之為長廣王也數為顯祖所捶數所角翻捶止蕊翻心常銜之顯祖每見祖珽常呼為賊故珽亦怨之且欲求媚於世祖乃説世祖曰文宣狂暴何得稱文既非創業何得稱祖若文宣為祖陛下萬歲後當何所稱帝從之己丑改諡太祖獻武皇帝章十二行本帝下有為神武皇帝五字乙十一行本同孔本同張校同退齋校同廟號高祖獻明皇后為武明皇后令有司更議文宣諡號説式芮翻更工衡翻諡神至翻六年十二月乙卯封皇子伯禮為武陵王六年壬戌齊上皇如晉陽六年庚午齊改諡文宣皇帝為景烈皇帝廟號威宗諡法布義行剛曰景有功安民曰烈猛以強果曰威有威可畏曰威以刑服遠曰威天康元年丙戌五六六是年二月改元六年春正月己卯日有食之六年癸未周大赦改元天和六年辛卯齊主祀圜丘癸巳祫太廟五代志齊制圜丘方澤並三年一祭謂之禘祀圜丘則以蒼璧束帛正月上辛祀昊天上帝太廟則春祠夏禴秋嘗冬蒸皆以孟月並臘凡五祭三年一禘五年一祫謂之殷祭六年丙申齊以吏部尚書尉瑾為右僕射六年己亥周主耕藉田藉在亦翻六年庚子齊主如晉陽六年周遣小載師杜杲來聘周禮載師掌任土之法以物地事授地職而待其政令屬地官其官有上士二人中士四人而無大小之別五代志後周置載師掌任土之法辨夫家田里之數會六畜車乘之稽審賦役斂弛之節制畿疆修廣之役頒施惠之要審牧産之政六年二月庚戌齊上皇還鄴六年丙子大赦改元改元天康六年三月己卯以安成王頊為尚書令六年丙午周主祀南郊夏四月辛亥大雩六年上不豫臺閣衆事並令尚書僕射到仲舉五兵尚書孔奐共決之奐琇之之曾孫也孔琇之見一百三十九卷齊明帝建武元年琇音秀奐仲舉與司空尚書令揚州刺史安成王頊吏部尚書袁樞中書舍人劉師知入侍醫藥樞君正之子也袁君正見一百六十三卷梁武帝太清三年上憂其不能守位謂頊曰吾欲遵太伯之事言以天下讓也固辭上又謂仲舉奐等曰今三方鼎峙四海事重宜須長君長知兩翻朕欲近則晉成遠隆殷法晉成帝立母弟為嗣事見九十七卷咸康八年殷法兄死弟及孔奐流涕對曰陛下御膳違和痊復非久痊愈也復謂復初痊且緣翻聖德日躋毛萇曰躋升也鄭玄曰言日進也足為周旦若有廢立之心臣等愚誠不敢聞詔上曰古之遺直復見於卿復扶又翻乃以奐為太子詹事臣光曰夫人臣之事君宜將順其美正救其惡孝經記夫子之言處腹心之重任處昌呂翻決社稷之大計苟以世祖之言為不誠則當如竇嬰面辨袁盎廷爭竇嬰事見十六卷漢景帝三年袁盎事見十二年爭讀曰諍覬音冀覦音俞以為誠邪邪音耶則當請明下詔書宣告中外使世祖有宋宣之美高宗無楚靈之惡左傳宋宣公舍其子與夷而立其弟穆公穆公卒捨其子馮而立與夷君子曰宋宣公可謂知人矣立穆公其子饗之楚康王有疾其弟圍入問王疾縊而弒之遂殺其二子幕及平夏而自立是為靈王謂太子嫡嗣不可動搖欲保輔而安全之則當盡忠竭節章十二行本節下有以死繼之四字乙十一行本同孔本同張校同退齋校同如晉之荀息趙之肥義左傳晉獻公有疾屬其子奚齊於荀息息曰臣竭其股肱之力繼之以死公薨里克殺奚齊荀息將死之人曰不如立卓子而輔之荀息立卓子以葬獻公里克殺卓子荀息死之肥義事見卷四周赧王二十年則逆探其情而求合焉探吐南翻及其既沒則權臣移國而不能救嗣主失位而不能死斯乃姦諛之尤者而世祖謂之遺直以託六尺之孤豈不悖哉悖蒲內翻六年癸酉上殂殂祚于翻上起自艱難知民疾苦性明察儉約每夜刺閨取外事分判者前後相續以錐薾物曰刺閨宮中小門也就閨中刺取外事故曰刺閨刺七賜翻必投籤於階石之上令鎗然有聲更工衡翻更籤更籌也鎗楚庚翻曰吾雖眠亦令驚覺覺古孝翻太子即位大赦五月己卯尊皇太后曰太皇太后皇后曰皇太后六年乙酉齊以兼尚書左僕射武興王普為尚書令六年吐谷渾龍涸王莫昌帥部落附于周以其地為扶州五代志同昌郡嘉誠縣後周置縣並龍涸郡及扶州總管府吐從暾入聲谷音浴帥讀曰率六年庚寅以安成王頊為驃騎大將軍司徒録尚書都督中外諸軍事頊吁玉翻驃匹妙翻騎奇寄翻丁酉以中軍大將軍開府儀同三司徐度為司空以吏部尚書袁樞為左僕射吳興太守沈欽為右僕射守式又翻御史中丞徐陵為吏部尚書陵以梁末以來選授多濫乃為書示衆曰梁元帝承侯景之凶荒王太尉接荊州之禍敗王太尉謂僧辨也荊州禍敗謂江陵陷沒也窮此紛雜方法也窮極也南史徐陵傳作永定永定高祖受禪初元也當從之白銀難得黃札易營朝直遙翻易以豉翻權以官階代於錢絹致令員外常侍路上比肩咨議參軍市中無數豈是朝章固應如此朝直遙翻今衣冠禮樂日富年華謂一日富於一日一年華於一年也退意作章非理望也衆咸服之六年己亥齊立上皇子弘為齊安王仁固為北平王仁英為高平王仁光為淮南王六年六月齊遣兼散騎常侍韋道儒來聘散悉亶翻騎奇寄翻六年丙寅葬文皇帝于永寧陵廟號世祖六年秋七月戊寅周築武功等諸城以置軍士武功即漢扶風武功縣周紀築武功郿斜谷武都留谷津坑諸城六年丁酉立王氏為皇后臨海王立后六年八月齊上皇如晉陽六年周信州蠻冉令賢向五子王等據巴峽反巴峽在巴郡巴縣有明月廣德等峽亦謂之三峽黨與連結二千餘里周遣開府儀同三司元契趙剛等前後討之終不克九月詔開府儀同三司陸騰督開府儀同三司王亮司馬裔討之騰軍于湯口水經江水自胊䏰縣東徑瞿巫灘左則湯溪水注之謂之湯口置十城遠結涔陽蠻為聲援涔鉏簪翻丁度曰涔陽渚在郢中此蓋荊州蠻也又水經涔水出漢中南鄭縣東南旱山東北流徑成固縣南城北北至沔陽縣南入于沔水經又曰涔水出作唐縣西北天門郡界東南流注于澧水九域志江陵府公安縣有涔陽鎮此涔陽當從九域志自帥精卒固守水邏城帥讀曰率邏郎佐翻騰召諸將問計皆欲先取水邏後攻江南騰曰令賢內恃水邏金湯之固外託涔陽輔車之援資糧充實器械精新以我懸軍攻其嚴壘脫一戰不克更成其氣不如頓軍湯口先取江南翦其羽毛然後進軍水邏此制勝之術也乃還章十二行本還作遣乙十一行本同孔本同退齋校同王亮帥衆渡江旬日拔其八城捕虜及納降各千計遂間募驍勇間當作簡驍堅堯翻蠻帥冉伯犂冉安西素與令賢有仇騰説誘賂以金帛使為鄉導帥讀曰率説式芮翻鄉讀曰嚮水邏之旁有石勝城令賢使其兄子龍真據之騰密誘龍真龍真遂以城降水邏衆潰斬首萬餘級捕虜萬餘口令賢走追獲斬之騰積骸於水邏城側為京觀是後㣥蠻望之輒大哭不敢復叛觀古玩翻復扶又翻向五子王據石墨城使其子寶勝據雙城今歸州巴東縣北臨大江有鐵槍頭長數丈經數百年不損目曰向王槍蓋諸向所據處也騰頻遣諭之猶不下進擊皆擒之盡斬諸向酋長捕虜萬餘口酋慈秋翻長知兩翻信州舊治白帝騰徙之於八陳灘北諸葛亮壘石為八陳於魚復平沙之上今謂之八陳磧夔州圖經云八陳磧在奉節縣西南七里又云在永安宮南一里渚下平磧上聚細石為之各高五丈皆碁布相當中間相去九尺正中開南北巷悉廣五尺凡六十四聚或為人散亂及為夏水所沒水退則依然如故又有二十四聚作兩層其後每層各十二聚陳讀曰陳小吏部隴西辛昂周既建六官以六部分屬六官小吏部屬天官且為騰督軍糧使疏吏翻下同為于偽翻時臨信楚合等州民多從亂五代志巴東郡臨江縣後周置臨州巴郡梁置楚州涪陵郡西魏置合州唐改臨州為忠州赴者如歸乃令老弱負糧壯夫拒戰咸樂為用樂音洛使還會巴州萬榮郡民反五代志清化郡梁置巴州所領永穆縣舊置萬榮郡唐志永穆縣屬通州我朝改通州為達州遏絶山路昂謂其徒曰凶狡猖狂若待上聞孤城必陷苟利百姓專之可也遂募通開二州五代志通川郡梁置萬州西魏曰通川所領西流縣後魏之漢興縣也西魏置開州唐省西流縣入盛山縣杜佑曰通州漢宕渠之地梁於此置萬州以州內地萬餘頃故以為名西魏改通州以居四達之地倍道兼行出其不意直趣賊壘趣七喻翻賊以為大軍至望風瓦解一郡獲全周朝嘉之以為渠州刺史五代志宕渠郡梁置渠州朝直遙翻六年冬十月齊以侯莫陳相為太傅任城王湝為太保婁睿為大司馬馮翊王潤為太尉開府儀同三司韓祖念為司徒六年庚申帝享太廟六年十一月乙亥周遣使來弔使疏吏翻六年丙戌周主行視武功等新城行下孟翻十二月庚申還長安六年齊河間王孝琬怨執政怨讒殺其兄孝瑜也射而亦翻和士開祖珽譖之於上皇曰草人以擬聖躬也又前突厥至並州孝琬脫兜鍪扺地扺諸氏翻側擊也北齊書作抵丁禮翻云我豈老嫗須著此物此言屬大家也嫗威遇翻著陟略翻屬之欲翻比時已謂天子為大家言比上皇於婦人又魏世謠言河南種穀河北生白楊樹上金雞鳴河南北者河間也孝琬將建金雞大赦耳五代志曰後齊赦日武庫令設金雞及鼓於闕門外之右集囚於闕前撾鼓千聲釋焉爾雅翼曰海中星占曰天雞聲動為有赦故後魏北齊赦日皆設金雞揭于竿會孝琬得佛牙置第內夜有光上皇聞之使搜之得填庫矟幡數百填讀曰鎮矟色角翻上皇以為反具收訊諸姬有陳氏者無寵誣孝琬云孝琬常畫陛下像而哭之其實世宗像也孝琬父澄諡文襄皇帝廟號世宗使武衛赫連輔玄倒鞭撾之倒鞭者執小頭以大頭撾之上皇曰何敢呼我為叔孝琬曰臣神武皇帝嫡孫文襄皇帝嫡子魏孝靜皇帝之甥何為不得呼叔上皇愈怒折其兩脛而死折而設翻安德王延宗哭之淚赤延宗亦文襄之子幼為文宣所養問欲作何王對曰欲作衝天王文宣問楊愔愔曰天下無此郡名願使安於德乃封安德王淚赤者泣盡而繼之以血也魏中興初分樂陵置安德郡鞭而訊之曰何故殺我兄奴告之上皇覆延宗於地馬鞭鞭之二百幾死幾居依翻六年是歲齊賜侍中中書監元文遙姓高氏文遙孝昭帝之后黨也遷尚書左僕射魏末以來縣令多用廝役廝音斯今相傳讀從詵入聲由是士流恥為之文遙以為縣令治民之本治直之翻遂請革選革更改也發敕用之猶恐其披訴悉召之集神武門令趙郡王睿宣旨唱名厚加尉諭而遣之齊之士人為縣自此始章錫琛標點容肇祖聶崇岐覆校
