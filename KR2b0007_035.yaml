body:
  text: 資治通鑑卷第三十五翰林學士朝散大夫右諫議大夫知制誥兼侍講同提舉萬壽觀公事兼判集賢院上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣奉敕編集後學天台音注漢紀二十七元壽元年孝哀皇帝下元壽元年己未前二元壽元年春正月辛丑朔考異曰荀紀云辛卯朔誤因就拜孔鄉侯傅晏為大司馬衛將軍陽安侯丁明為大司馬票騎將軍用息夫躬之言也票頻妙翻元壽元年是日日有食之上詔公卿大夫悉心陳過失又令舉賢良方正能直言者各一人大赦天下丞相嘉奏封事曰孝元皇帝奉承大業溫恭少欲少詩沼翻下同都內錢四十萬萬百官表大司農有都內令丞後官馮貴人從臨獸圈猛獸驚出貴人前當之即二十九卷建昭元年事也圈求遠翻賜錢五萬師古曰言此事雖嘉其義而賞亦不多有加賞賜屬其人勿衆謝師古曰掖庭宮人有親戚來見而帝賜之者屬其家勿使於衆人中謝也見賢遍翻下見錢同屬音之欲翻余謂有見親幸者加之賞賜則屬其人勿於衆中謝也惡烏路翻重失人心賞賜節約是時外戚資千萬者少耳故少府水衡見錢多也少府掌禁錢水衡都尉有鍾官辨銅令丞掌鑄錢師古曰見在之錢也加以西羌之變永光二年隴西羌反內振貧民終無傾危之憂以府臧內充實也臧讀曰藏音徂浪翻孝成皇帝時諫臣多言燕出之害師古曰燕出謂微行也耽於酒色損德傷年其言甚切然終不怨怒也寵臣淳于長張放史育育數貶退家資不滿千萬放斥逐就國事見三十三卷成帝綏和二年數所角翻事見三十二卷綏和元年榜音彭故雖多內譏朝廷安平師古曰言雖有好內之譏而不害政也陛下在國之時好詩書好呼到翻上儉節徵來所過道上稱誦德美此天下所以回心也師古曰望為治也余謂回心者回其戴成帝之心而戴哀帝也易帷帳去錦繡去羌呂翻乘輿席緣綈繒而已乘繩證翻緣俞絹翻師古曰綈厚繒也音徒奚翻繒慈陵翻共皇寢廟比當作共音恭比近也音毗至翻憂閔元元惟用度不足師古曰惟思也輒且止息今始作治治直之翻下同而駙馬都尉董賢亦起官寺上林中又為賢治大第開門鄉北闕為于偽翻鄉讀曰嚮下獨鄉同蘇林曰王渠官渠也猶今御渠也晉灼曰渠名也在城東覆盎門外師古曰晉説是賞賜吏卒甚於治宗廟師古曰護監視也長安廚給祠具師古曰長安有廚官主為官食如淳曰禱於道中故行人皆得飲食余謂若據文理則飲音於禁翻食讀曰飼器成奏御乃行或物好特賜其工自貢獻宗廟三宮猶不至此師古曰三宮天子太后皇后也原父曰是時太皇太后稱長信宮傅太后稱永信宮而丁姬稱中安宮故以三宮為言余按此時丁姬死矣三宮蓋謂長信永信及趙太后宮也諸官並共師古曰見親親戚相見也並共言百官各以所掌事及財物就供之共讀曰供使者護視發取市物百賈震動師古曰賈謂販賣之人也言百賈者非一之稱也賈音古歡許元翻㣥臣惶惑詔書罷苑而以賜賢二千餘頃均田之制從此墮壞孟康曰自公卿以下至于吏民名曰均田皆有頃數於品制中令均等今賜賢二千餘頃則壞其制也師古曰墮音火規翻均田見三十三卷綏和二年變亂陰陽災異衆多百姓訛言持籌相驚師古曰言行西王母籌也不能自止陛下素仁智慎事今而有此大譏孔子曰危而不持顛而不扶則將安用彼相矣師古曰論語季氏將伐顓臾冉有季路見於孔子孔子以此言責之以其不匡諫也相息亮翻竊內悲傷不能通愚忠之信身死有益於國不敢自惜唯陛下慎己之所獨鄉察衆人之所共疑往者章甲十六行本者下有寵臣二字乙十一行本同張校同鄧通韓嫣驕貴失度逸豫無厭小人不勝情欲卒陷罪辜亂國亡軀不終其祿鄧通幸於文帝賜以蜀嚴道銅山景帝立人告通盜出徼外鑄錢沒入其家卒以餓死韓嫣幸於武帝出入永巷不禁以姦聞賜死嫣音偃厭於鹽翻勝音升卒子恤翻者也宜深覽前世以節賢寵全安其命上由是於嘉浸不説為嘉死不以罪張本説讀曰悅前涼州刺史杜鄴以方正對策曰聞陽尊陰卑天之道也是以男雖賤各為其家陽女雖貴猶為其國陰故禮明三從之義師古曰謂婦人在家從父既嫁從夫夫死從子必繫於子師古曰文母文王之太姒也仲馮曰文母文王之母也所謂繫於子也何預太姒余謂劉説是詩曰思齊太任文王之母終有叔段篡國之禍左傳鄭武薑生莊公及共叔段惡莊公而愛段為之請京使居之祭仲諫曰國之害也公曰薑氏欲之焉辟害段繕甲兵具卒乘將襲鄭莊公克之而遭居鄭之危史記周惠王二子長襄王次叔帶惠后愛叔帶襄王既立叔帶召狄人狄人伐周王御士將禦之王曰先后其謂我何乃出居于鄭難乃旦翻呂太后權私親屬幾危社稷事見高后紀幾居依翻欲與天下更始更工衡翻然嘉瑞未應而日食地震案春秋災異以指象為言語師古曰謂天不言但以景象指意告諭人明陽為陰所臨日者陽宗陰盛陽微日為所掩而食是為陰所臨也為土為母以安靜為德震不陰之效也師古曰言地當安靜而今乃震是為不遵陰道也臣敢不直言其事昔曾子問從令之義孔子曰是何言與師古曰曾子問從父之令可謂孝乎孔子非之事見孝經與讀曰歟所行無非理張理作禮者故無可間也師古曰論語稱孔子曰孝哉閔子騫人不間於其父母兄弟之言是也間音居莧翻無賢不肖並侍帷幄布在列位師古曰不問賢與不肖皆親近在位或將軍屯將即亮翻寵意並於一家積貴之勢世所希見所希聞也至乃並置大司馬將軍之官皇甫雖盛三桓雖隆魯為作三軍無以甚此言周以皇甫為卿士魯三桓強盛作三軍而三分公室比丁傅無以甚也為于偽翻暗然日食師古曰暗音烏感翻不在前後臨事而發者明陛下謙遜無專承指非一所言輒聽所欲輒隨師古曰謂皆迫於太后也無功能者畢受官爵流漸積猥過在於是猥遝也言有罪惡者不誅無功能者並進其流漸至積遝也朝直遙翻昔詩人所刺春秋所譏指象如此殆不在他由後視前忿邑非之師古曰由從也邑於邑也不自鏡見則以為可計之過者師古曰逮及也鏡鑒照也自以所行為可是計策之誤者思承始初事稽諸古以厭下心師古曰每事皆考於古者厭滿也音一贍翻説讀曰悅上帝百神收還威怒禎祥福祿何嫌不報師古曰嫌疑也上又徵孔光詣公車問以日食事拜為光祿大夫秩中二千石給事中位次丞相初王莽既就國建平二年莽就國其中子獲殺奴中讀曰仲莽切責獲令自殺在國三歲吏民上書冤訟莽者百數師古曰言其合管朝政不當就國也上時掌翻賢良周護宋崇等對策復深訟莽功德復扶又翻上於上徵莽及平阿侯仁還京師侍太后侍太皇太后也元壽元年董賢因日食之變以沮傅晏息夫躬之策沮在呂翻辛卯章甲十六行本卯作亥乙十一行本同退齋校同上收晏印綬罷就第元壽元年丁巳皇太太后傅氏崩合葬渭陵稱孝元傅皇后史記正義曰漢帝后同陵則為合葬不合陵也諸陵皆如此傅氏以側室而合葬稱孝元傅皇后太皇太后在上此心為何如邪宜其啓王莽而授之以柄也元壽元年丞相御史奏皇夫躬孫寵等罪過上乃免躬寵官遣就國又罷侍中諸曹黃門郎數十人丁傅之親黨也鮑宣上書曰陛下父事天母事地子養黎民即位以來父虧明母震動子訛言相驚恐今日食於三始如淳曰正月一日為歲之朝月之朝日之朝朝猶始也小民正朔日尚恐毀敗器物敗補邁翻何況於日虧乎陛下深內自責避正殿舉直言求過失罷退外親及旁仄素餐之人徵拜孔光為光祿大夫發覺孫寵息夫躬過惡免官遣就國衆庶歙然莫不説喜師古曰歙音翕天人同心人心説則天意解矣説讀曰悅乃二月丙戌白虹干日虹日旁氣也白兵象干犯也此天下張下作有憂結未解民有怨望未塞者也塞悉則翻侍中駙馬都尉董賢本無葭莩之親但以令色諛言自進令善也諛諂也孔安國曰令色無質巧言無實竭盡府臧臧讀曰藏音徂浪翻並合三第尚以為小復壞暴室師古曰時以三第總為一第賜賢猶嫌狹小復取暴室之地以增益之也復扶又翻下同言其驕慢也將作大匠掌治宮室使為之治第治直之翻師古曰為賢第上持時行夜者行音下孟翻輒太官為供為之供見也為于偽翻下同當養一君今反盡之賢家豈天意與民意邪天不可久負暴殄天物以私嬖幸是為負天反所以害之也誠欲哀賢宜為謝過天地解讎海內免遣就國收乘輿器物還之縣官此所謂謝過解讎也為于偽翻乘繩證翻章甲十六行本可上有如此二字乙十一行本同孔本同張校同以父子終其性命不者海內之所仇未有得久安者也孫寵息夫躬不宜居國可皆免以視天下師古曰視讀曰示復徵何武師丹彭宣傅喜曠然使民易視以應天心建立大政興太平之端上感大異納宣言徵何武彭宣拜鮑宣為司隸元壽元年上託傅太后遺詔令太皇太后下丞相御史益封董賢二千戶賢先封千戶下遐稼翻三人者先雖封侯未有國邑今賜之國邑也陽新侯即陽信侯鄭業漢書傅昭儀傳作陽信王嘉傳及恩澤侯表作陽新後世給舍封駁本此師古曰還謂卻上之於天子也臣聞爵祿土地天之有也書云天命有德五服五章哉師古曰虞書皋陶謨之辭也言皇天命有德者以居列位天子諸侯卿大夫士尊卑之服采章各異也尤宜慎之裂地而封不得其宜則衆庶不服感動陰陽其害疾自深師古曰言此氣損害故令天子身有疾也此臣嘉所內懼也高安侯賢佞幸之臣陛下傾爵位以貴之單貨財以富之師古曰單盡也師古曰言上意傾惑為下所窺也余謂帝為賢治第擬於宮闕乘輿器物充牣其家此所謂損至尊以寵之也府臧已竭唯恐不足財皆民力所為孝文章甲十六行本文下有皇帝二字乙十一行本同孔本同張校同欲起露臺重百金之費克己不作事見文帝紀一家至受千金往古以來貴臣未嘗有此流聞四方皆同怨之里諺曰千人所指無病而死臣常為之寒心為于偽翻今太皇太后以永信太后遺詔詔丞相御史益賢戶賜三侯國臣嘉竊惑山崩地動日食於三朝皆陰侵陽之戒也前賢已再封謂賢先封關內侯繼封高安侯也商先嗣爵崇祖侯後改封汝昌侯晏無所考按表晏先以皇后父封三千戶又益二千戶食邑於夏丘橫戶孟翻恩已過厚求索自恣不知厭足甚傷尊尊之義封三侯者所以尊傅太后今求濫恩不知厭足則傷尊尊之義矣索山客翻厭於鹽翻為害痛矣痛甚也師古曰罔謂誣蔽也氣感相動害及身體陛下寢疾久不平繼嗣未立宜思正萬事順天人之心以求福祐乃章甲十六行本乃作奈乙十一行本同孔本同張校同何輕身肆意師古曰肆放也垂立制度欲傳之於無窮哉臣謹封上詔書不敢露見上時掌翻見賢遍翻非愛死而不自法謂不以違拒詔指之法自劾也故不敢自劾自言劾則天下知其事也劾戶概翻初廷尉梁相治東平王雲獄時冬月未盡二旬而相心疑雲冤獄有飾辭師古曰假飾之辭非其實也治直之翻師古曰傳謂移其獄事也傳知戀翻下遐稼翻下同尚書令鞫談僕射宗伯鳳以為可許師古曰鞫及宗伯皆姓也宗伯以官為氏鞫音居六翻外內顧望操持兩心師古曰操音千高翻幸雲踰冬無討賊疾惡主讎之意謂僥幸雲獄踰冬則雲可以減死也後數月大赦嘉薦相等皆有材行行下孟翻聖王有計功除過臣竊為朝廷惜此三人按公卿表建平元年大司農梁相為廷尉二年貶為東海都尉三年左馮翊方賞為廷尉四年徙本紀東平王雲有罪自殺在建平四年大赦天下在今年正月若以表為證則當治東平時廷尉乃方賞非梁相表言相貶不言免為庶人又今年大赦上距建平三年十二月治東平獄時已一期有餘是大赦亦不在後數月也通鑑書王嘉薦梁相等三人全取漢書王嘉傳然傳與紀表歲月自相抵牾繫年之書可謂難矣為于偽翻下同上不能平師古曰心怒也嘉封還益董賢戶事上乃發怒召嘉詣尚書責問以相等前坐不忠罪惡著聞君時輒已自劾今又稱譽云為朝廷惜之何也劾戶概翻譽音余嘉免冠謝罪事下將軍朝者朝者當時見入朝之臣也朝直遙翻嘉迷國罔上不道請謁者召嘉詣廷尉詔獄議郎龔等以為嘉言事前後相違宜奪爵土免為庶人永信少府猛等以為嘉罪名雖應法謂法當下吏也裸躬就笞師古曰括結也關貫也裸露也褒宗廟也上不聽章甲十六行本聽下有三月二字乙十一行本同孔本同張校同詔假謁者節召丞相詣廷尉詔獄使者既到府掾史涕泣共和藥進嘉掾俞絹翻和戶臥翻嘉不肯服主簿曰將相不對理陳冤相踵以為故事自周勃繫獄賈誼以為言文帝自此待大臣有節將相有罪皆自殺不受刑然景帝時周亞夫武帝時公孫賀劉屈氂猶下獄死相踵為故事言其概也理獄也對理對獄也言大臣之體縱有冤不對獄而自陳也師古曰踵猶躡也師古曰令自殺也師古曰以逼促嘉也嘉引藥柸以擊地謂官屬曰官屬謂掾史主簿等丞相幸得備位三公奉職負國當伏刑都市以示萬衆丞相豈兒女子邪何謂咀藥而死師古曰咀嚼也音材汝翻嘉遂裝出見使者再拜受詔裝出者朝服而出去蓋不冠去羌呂翻隨使者詣廷尉廷尉收嘉丞相新甫侯印綬恩澤侯表新甫侯國於南陽新野百官表執金吾屬官有中壘寺互武庫都船四令丞如淳曰漢儀注有寺互都船獄大怒上欲嘉自裁而嘉詣獄故大怒漢治大臣獄率使五二千石今又使將軍同治之怒之甚也晉灼曰大臣獄重故使秩二千石者五人雜治之詰去吉翻嘉對曰案事者思得實竊見相等前治東平王獄不以雲為不當死欲關公卿示重慎關會也古者獄成命三公六卿參聽之示明謹於用刑也驗徵驗也為于偽翻下同復扶又翻相等皆良善吏臣竊為國惜賢不私此三人獄吏曰苟如此則君何以為罪猶當有以負國不空入獄矣吏欲文致以負國之罪故云然嘉喟然仰天歎曰喟丘愧翻歎息之聲幸得充備宰相不能進賢退不肖以是負國死有餘責吏責其負國故以此對嘉曰賢故丞相孔光故大司空何武不能進惡高安侯董賢父子章甲十六行本子下有佞邪二字乙十一行本同孔本同張校同亂朝而不能退惡烏路翻朝直遙翻罪當死死無所恨嘉繫獄二十餘日不食歐血而死已而上覽其對思嘉言會御史大夫賈延免夏五月乙卯以孔光為御史大夫秋七月丙午以光為丞相復故國博山侯又以泛鄉侯何武為御史大夫上乃知孔光前免非其罪以過近臣毀短光者光免事見上卷建平二年過督過也咎之也傅嘉前為侍中毀譖仁賢誣訴大臣令俊艾者久失其位師古曰艾讀曰乂其免嘉為庶人歸故郡傅氏本河內溫人元壽元年八月何武徙為前將軍辛卯光祿大夫彭宣為御史大夫元壽元年司隸鮑宣坐摧辱丞相拒閉使者無人臣禮減死髡鉗丞相孔光四時行園陵官屬行馳道中宣使吏鉤止丞相掾史沒入其車馬摧辱丞相事下御史中丞侍御史至司隸官欲捕從事閉門不肯內坐以拒閉使者罪元壽元年大司馬丁明素重王嘉以其死而憐之九月乙卯册免明使就第元壽元年冬十一月壬午以故定陶太傅光祿大夫韋賞為大司馬車騎將軍己丑賞卒成帝省王國太傅更曰傅此猶曰太傅者習於舊稱未能頓從新稱也賞韋賢之孫弘之子也元壽元年十二月庚子以侍中駙馬都尉董賢為大司馬衛將軍册曰建爾于公以為漢輔往悉爾心匡正庶事允執其中是時賢年二十二雖為三公常給事中領尚書事給事禁中而領尚書事也審食其以丞相而侍禁中呂后嬖之也董賢以三公侍禁中哀帝嬖之也論道經邦之任安在哉徙為光祿大夫秩中二千石弟寬信代賢為駙馬都慰董氏親屬皆侍中諸曹奉朝請寵在丁傅之右矣朝直遙翻請才性翻又如字初丞相孔光為御史大夫賢父恭為御史事光及賢為大司馬與光並為三公上故令賢私過光令私往見之觀其所以接之者何如也雅素也及聞賢當來也光警戒衣冠出門待望見賢車乃卻入賢至中門光入閣既下車乃出拜謁送迎甚謹不敢以賓客鈞敵之禮此非恭而無禮者邪光能卑事董賢則必能曲徇王莽矣喜立拜光兩兄子為諫大夫光有三兄福捷喜未知兩兄子為誰為諫大夫而加常侍官也師古曰侔等也是時成帝外家王氏衰廢唯平阿侯談子去疾為侍中去羌呂翻弟閎為中常侍閎妻父中郎將蕭咸前將軍望之子也賢父恭慕之欲為子寬信求咸女為婦為于偽翻使閎言之咸惶恐不敢當私謂閎曰董公為大司馬册文言允執其中此乃堯禪舜之文論語堯曰咨爾舜天之曆數在爾躬允執其中四海困窮天祿永終舜亦以命禹道統之傳此乎出也言考之漢家故事册三公者未嘗有此語也長知兩翻此豈家人子所能堪邪師古曰家人猶言庶人也蓋咸自謂知讀曰智聞咸言亦悟乃還報恭深達咸自廉薄之意恭歎曰我家何用負天下而為人所畏如是意不説説讀曰悅下同後上置酒麒麟殿師古曰在未央宮中侍中中常侍皆在側上有酒所師古曰言酒在體中從千容翻笑曰吾欲法堯禪舜何如王閎進曰天下乃高皇帝天下非陛下章甲十六行本下下有之字乙十一行本同孔本同有也陛下承宗廟當傳子孫於亡窮統業至重天子亡戲言周成王剪桐葉為圭與小弱弟戲曰以封汝周公入賀王曰戲也周公曰王者不可戲乃封小弱弟於唐古亡無通左右皆恐於是遣閎出歸郎署三署郎各有署舍遣出不得侍禁中也考異曰董賢傳但云遣閎出不得復侍宴自歸郎署以下皆漢紀所載也荀紀無漢書外事不知此語荀悅何從得之又云閎歸郎署二十日長樂宮深為閎謝又御史大夫彭宣上封事言國安危繼嗣事上覺寤召閎按太皇太后居長信宮云長樂宮誤也余按漢書注長信宮以長樂宮中長信殿為稱亦可言長樂宮也久之太皇太后為閎謝復召閎還為于偽翻復扶又翻下同閎遂上書諫曰臣聞王者立三公法三光三光日月星也上時掌翻易曰鼎折足覆公餗喻三公非其人也易鼎之九四曰鼎折足覆公餗餗音送鹿翻虞云八珍之具也馬云建也建音之然翻鄭云菜也折而設翻不過中大夫武帝幸韓嫣賞賜而已皆不在大位武帝幸韓嫣賞賜擬鄧通位不過上大夫以罪賜死嫣於虔翻無功於漢朝又無肺腑之連復無名迹高行以矯世行戶孟翻升擢數年列備鼎足典衛禁兵無功封爵父子兄弟橫蒙拔擢賞賜空竭帑藏橫戶孟翻帑它朗翻藏徂浪翻萬民喧譁偶言道路誠不當天心也昔褒神蚖變化為人實生褒姒亂周國國語曰夏之衰也有二龍降于夏庭言曰豫褒之二君也夏后請其漦而藏之歷殷周莫敢發也至厲王之末發而觀之漦流於庭不可除也王使婦人不帷而譟之其神化為玄蚖入于王府府之童妾既齓而遭之既笄而孕懼而棄之鬻檿弧者收以奔褒是為褒姒褒人有獄以入於幽王王嬖之生伯服遂黜申后而立褒姒廢太子而立伯服以亂周國蚖音元又吾官翻漦似災翻檿於琰翻賢有小人不知進退之禍非所以垂法後世也上雖不從閎言多其年少志強少詩照翻下同亦不罪也二年元壽二年春正月胸奴單于及烏孫大昆彌伊秩靡皆來朝朝直遙翻漢以為榮是時西域凡五十國三十六國分為五十餘國凡三百七十六人譯長之官西域諸國皆有之所以通其國之語言於中國長知兩翻烏弋山離國去長安萬二千二百里不屬都護東與罽賓西與犂靬條支接氏音支罽音計不在數中其來貢獻則相與報不督録總領也正謂不屬都護也單于每入朝其賞賜錦繡繒絮輒加厚於前以慰接之單于宴見見賢遍翻㣥臣在前單于怪董賢年少以問譯師古曰譯傳語之人也大司馬年少以大賢居位單于乃起拜賀漢得賢臣是時上以太歲厭勝所在是年太歲在申師古曰厭音一涉翻蒲陶本出大宛武帝伐大宛采蒲陶種植之離宮宮由此得名師古曰舍止宿單于知之不悅元壽二年夏四月壬辰晦日有食之元壽二年五月甲子正三公官分職成帝綏和二年置三公官哀帝建平三年罷今復正三公官名分職謂大司馬掌兵事大司徒掌人民事大司空掌水土事分扶問翻丞相孔光為大司徒彭章甲十六行本彭上有御史大夫四字乙十一行本同孔本同張校同宣為大司空封長平侯恩澤侯表長平侯國於濟南元壽二年六月戊午帝崩于未央宮臣瓚曰帝年二十即位即位六年壽二十五師古曰即位明年乃改元壽二十六帝睹孝成之世祿去王室謂政在王氏也屢誅大臣謂殺朱博王嘉等師古曰則法也謂趙昌董賢息夫躬等謂師丹傅喜鄭崇等太皇太后聞帝崩即日駕之未央宮之往也璽斯氏翻綬音受太后召大司馬賢引見東箱見賢遍翻問以喪事調度師古曰調選發也度計料也調徒弔翻不能對免冠謝太后曰新都侯莽前以大司馬奉送先帝大行謂成帝之喪也吾令莽佐君賢頓首幸甚太后遣使者馳召奔詔尚書諸發兵符節百官奏事中黃門期門兵皆屬莽中黃門守禁門黃闥者也期門兵守衛殿門者也使尚書劾賢帝病不親醫藥劾戶概翻禁止賢不得入宮殿司馬中據漢書趙充國傳子卬入莫府司馬中亂屯兵如淳注曰司馬中律所謂營軍司馬中也余謂此宮殿司馬中蓋宮殿屯衛司馬中也詣闕免冠徒跣謝己未莽使謁者以太后詔即闕下册賢師古曰即就也賢年少未更事理少詩照翻師古曰更歷也音工衡翻為大司馬不合衆心其收大司馬印綬罷歸第即日賢與妻皆自殺家惶恐夜葬莽疑其詐死有司奏請發賢棺至獄診視師古曰謂發冢取其棺柩也診驗也音軫太皇太后詔公卿舉可大司馬者莽故大司馬辭位避丁傅衆庶稱以為賢事見三十三卷綏和二年自大司徒孔光以下舉朝皆舉莽朝直遙翻獨前將軍何武左將軍公孫祿二人相與謀以為往時惠昭之世外戚呂霍上官持權幾危社稷幾居希翻今孝成孝哀比世無嗣比頻寐翻方當選立近親張親下脫輔字幼主不宜令外戚大臣持權外戚大臣謂王莽也親謂外戚疏謂異姓之為將軍公卿者師古曰錯間雜也為國之計唯此為便而祿亦舉武庚申太皇太后自用莽為大司馬領尚書事太皇太后與莽議立嗣安陽侯王舜莽之從弟其人修飭師古曰飭讀與敕同敕整也從才用翻太皇太后所信愛也莽白以舜為車騎將軍秋七月遣舜與大鴻臚左咸使持節迎中山王箕子以為嗣使持節者奉使而持節也魏晉以下遂以為官稱臚陵如翻嗣祥吏翻莽又白太皇太后詔有司以皇太后章甲十六行本后下有前字乙十一行本同孔本同與女弟昭儀專寵錮寢錮塞也杜塞後宮侍寢之路不使進御也詳見上卷建平元年徙居北宮又以定陶共王太后與孔鄉侯晏同心合謀背恩忘本專恣不軌背蒲妹翻徙孝哀皇后退就桂宮傅氏丁氏皆免官爵歸故郡莽以積年間退之久一旦得權無所不至傅氏河內人丁氏山陽人獨下詔褒揚傅喜曰高武侯喜姿性端慤師古曰慤謹也音口角翻雖與故定陶太后有屬終不順指從邪介然守節以故斥逐就國喜就國見上卷建平二年師古曰論語載孔子之言以喻有節操之人也位特進奉朝請喜雖外見褒賞孤立憂懼後復遣就國以壽終復扶又翻莽又貶傅太后號為定陶共王母丁太后號曰丁姬莽又奏董賢父子驕恣奢僭請收沒入財物縣官諸以賢為官者皆免父恭弟寬信與家屬徙合浦母別歸故郡巨鹿長安中小民歡譁鄉其第哭幾獲盜之師古曰陽往哭之實欲竊盜也歡音許爰翻鄉讀曰嚮幾讀曰冀凡四十三萬萬賢所厚吏沛朱詡自劾去大司馬府劾戶概翻買棺衣收賢尸葬之莽聞之以他罪擊殺詡莽以大司徒孔光名儒相三主成哀及平帝為三主天下信之於是盛尊事光引光女壻甄邯為侍中奉車都尉甄之人翻姓也陳留風俗傳曰舜陶甄河濱其後為氏邯戶甘翻諸素所不説者説讀曰悅莽皆傅致其罪師古曰傅讀曰附附益而引致之令入罪為請奏草令邯持與光以太后指風光師古曰草謂文書之稿草也風讀曰諷不敢不上之上時掌翻莽白太后輒可其奏於是劾奏何武公孫祿互相稱舉皆免官武就國又奏董宏子高昌侯武父為佞邪奪爵宏為佞邪謂請立丁姬為帝太后也治中山馮太后獄冤陷無辜關內侯張由誣告骨肉中太僕史立泰山太守丁玄陷人入大辟事並見三十三卷建平元年辟毗亦翻事見上卷建平四年皆不宜處位在中土處昌呂翻免為庶人徙合浦中山之獄本立玄自典考之但與隆連名奏事莽少時慕與隆交隆不甚附故因事擠之少詩照翻擠子計翻又箋西翻排也紅陽侯立太后親弟雖不居位莽以諸父內敬憚之畏立從容言太后令己不得肆意復令光奏立罪惡從千容翻復扶又翻下同前知定陵侯長犯大逆罪章甲十六行本罪下有多受其賂四字乙十一行本同孔本同張校同退齋校同為言誤朝事見三十二卷成帝綏和元年為于偽翻誤朝誤朝廷也朝直遙翻衆言曰呂氏少帝復出謂呂后名他人子為惠帝子也事見十三卷難以示來世成襁褓之功謂難成輔立幼主之功太后不聽莽曰今漢家衰比世無嗣比毗至翻太后獨代幼主統政誠可畏懼力用公正先天下尚恐不從師古曰力勉力先悉薦翻如此㣥下傾邪亂從此起宜可且遣就國安後復徵召之師古曰安猶徐也余謂安定也安後猶言事定後也遣立就國莽之所以脅持上下皆此類也於是附順莽者拔擢忤恨者誅滅忤五故翻以王舜王邑為腹心甄豐甄邯主擊斷斷丁亂翻平晏領機事晏當之子也孫建為爪牙豐子尋秀子棻師古曰棻音扶云翻涿郡崔發姓譜齊丁公之子食采於崔因以為氏莽色厲而言方師古曰外示凜厲之色而假為方直之言微見風采師古曰見音胡電翻黨與承其指意而顯奏之莽稽首涕泣固推讓稽音啓推吐雷翻上以惑太后下用示信於衆庶焉元壽二年八月莽復白太皇太后廢孝成皇后孝哀皇后為庶人就其園就孝成孝哀寢廟園也復扶又翻皆自殺考異曰漢春秋八月甲寅未知胡旦所據元壽二年大司空彭宣以王莽專權乃上書言三公鼎足承君一足不任則覆亂美實帥古曰美實謂鼎中之實也易鼎卦九四爻辭曰鼎折足覆公餗餗食也故宣引以為言任音壬年齒老眊師古曰眊與耄同鄭玄曰耄惛忘也數所角翻昏亂遺忘忘巫放翻願上大司空長平侯印綬上時掌翻乞骸骨歸鄉里俟填溝壑俟古俟字填與填同使就國莽恨宣求退故不賜黃金安車駟馬宣居國數年薨班固贊曰薛廣德保縣車之榮平當逡巡有恥彭宣見險而止異乎苟患失之者矣薛廣德縣車在元帝永光元年平當不肯受封在建平三年通鑑因彭宣事以班贊繫之於此縣讀曰懸元壽二年戊午右將軍王崇為大司空光祿勳東海馬宮為右將軍按班書馬宮本姓馬矢氏宮仕學稱馬氏以中郎將加左曹官元壽二年九月辛酉中山王即皇帝位貢父曰辛酉去哀帝崩六十四日平帝九年歲太皇太后臨朝大司馬莽秉政百官總己以聽於莽援古者天子諒陰百官總己以聽於冢宰之制以盜權也師古曰聚束曰總音總朱熹曰謂各總攝己職孔光憂懼不知所出上書乞骸骨莽白太后帝幼少宜置師傅徙光為帝太傅位四輔記曰虞夏商周有師保有疑丞設四輔及三公莽倣之以位置孔光變更官名自此始矣領宿衛供養行內師古曰行內行在所之內中猶言禁中也省服御食物師古曰省視也余謂行內署門戶當為一句此宿衛事也省服御食物則供養事也文理甚明師古誤斷其句因曲為之説耳行下孟翻省悉井翻甄豐為右將軍元壽二年冬十月壬寅葬孝哀皇帝於義陵臣瓚曰自崩至葬凡百五日義陵在扶風去長安四十六里考異曰哀紀云九月壬寅葬義陵按長曆是月辛酉朔無壬寅壬寅乃十月十二日又臣瓚注曰自崩至葬凡一百五日按帝以六月戊午崩然則葬在十月審矣蓋本紀月誤也孝平皇帝上荀悅曰諱衎之字曰樂應劭曰諡法布綱治紀曰平余按帝本名箕子元始二年始更名衎元始元年辛酉一元壽二年春正月王莽風益州令塞外蠻夷自稱越裳氏重譯獻白雉一黑雉二越裳注已見二十八卷元帝初元二年參考諸家之説越裳之地不在益州塞外莽自以輔幼主欲以致遠人功德比周公惑衆故為此耳師古曰越裳南方遠國也譯謂傳言也道路絶遠風俗殊隔故纍譯而後乃通風讀曰諷以白雉薦宗廟於是㣥臣盛陳莽功德致周成白雉之瑞周公及身在而託號於周時㣥臣言聖王之法臣有大功則生有美號因引周公事為徵益戶疇爵邑張晏曰漢律非始封十減二疇者等也言不復減賢曰疇等也言功臣子孫襲封與先人等余謂此言莽進號為公宜益其邑戶使與爵等也莽上書言臣與孔光王舜甄豐甄邯共定策今願獨條光等功賞寢置臣莽勿隨輩列進息也寢舍也無偏無黨王道蕩蕩師古曰尚書洪範之言也蕩蕩廣平之貌也故引之不可以骨肉故蔽隱不揚君其勿辭莽復上書固讓數四復扶又翻下同稱疾不起左右白太后宜勿奪莽意但條孔光等莽乃肯起二月丙辰太后下詔以太傅博山侯光為太師車騎將軍安陽侯舜為太保皆益封萬戶考異曰平紀作正月事而王子侯表公卿表皆云二月丙辰今從之余按考異所謂王子侯云二月丙辰封者謂宣帝耳孫信等也由今考之不能無疑注見下封廣陽侯恩澤侯表廣陽侯國於南陽侍中奉車都尉邯封承陽侯恩澤侯表承陽侯國於汝南師古曰承音蒸莽尚未起㣥臣復上言莽雖克讓朝所宜章言朝廷所當章顯也朝直遙翻明重元功無使百僚元元失望太后乃下詔以大司馬新都侯莽為太傅幹四輔之事號曰安漢公益封二萬八千戶於是莽為惶恐不得已而起受太傅安漢公號讓還益封事云願須百姓家給師古曰給足也家給家家自足㣥臣復爭太后詔曰公自期百姓家給是以聽之其令公奉賜皆倍故奉讀曰俸所食之俸也賜歲時常賜著諸令者也師古曰倍故數多於故各一倍也百姓家給人足大司徒大司空以聞言待家給人足二府以其事聞也而建言褒賞宗室㣥臣立故東平王雲太子開明為王哀帝建平二年雲死國除今復立其子奉孝王後東平思王宣帝子宇也帝入奉大宗故立成都以奉孝王後晉灼曰耳音仍考異曰平紀元始元年封孝宣曾孫信等三十六人莽傳在五年按王子侯表皆以元年二月丙辰封莽傳誤也余按王子侯表陶鄉侯恢等十五人皆以二月丙辰封不及三十六人之數又無信名按恢等皆宣帝曾孫也太僕王惲等二十五人皆賜爵關內侯惲等以前議定陶傅太后尊號守經法不阿指從邪賜爵惲於粉翻皆得以為嗣同産子同母兄弟之子復其屬謂袒免以上親以罪絶屬籍者復其屬籍免音問參分故祿以一與之終其身師古曰參三也恩澤之政無所不施莽既媚説吏民又欲專斷説讀曰悅斷丁亂翻知太后老厭政乃風公卿奏言往者吏以功次遷至二千石功者以勞績遷次者以資序遷章甲十六行本州上有及字乙十一行本同孔本同張校同部所舉茂材異等吏州部即部刺史也稱尺證翻宜皆見安漢公又太后春秋高不宜親省小事省悉井翻令太后下詔曰自今以來唯封爵乃以聞他事安漢公四輔平決州牧二千石及茂材吏初除奏事者輒引入至近署對安漢公考故官問新職以知其稱否考故官者考其前任有勞績與否也問新職者問其新任當如何施設也稱尺證翻密致恩意厚加贈送其不合指顯奏免之權與人主侔矣元壽二年置羲和官秩二千石羲和初置自為一官莽既篡改大司農曰羲和元壽二年夏五月丁巳朔日有食之大赦天下公卿以下舉敦厚能直言者各一人元壽二年王莽恐帝外家衛氏奪其權帝中山衛姬所生也前哀帝立背恩義背蒲妹翻下同自貴外家丁傅撓亂國家師古曰撓擾也音火高翻幾危社稷幾居希翻今帝以幼年復奉大宗為成帝後宜明一統之義謂既奉大宗則以子繼父一以正統相承義不得顧私親為後代法六月遣甄豐奉璽綬即拜帝母衛姬為中山孝王后賜帝舅衛寶寶弟玄爵關內侯賜帝女弟三人號曰君謁臣號修義君皮為承禮君鬲子為尊德君師古曰鬲音歷不得至京師扶風功曹申屠剛以直言對策曰臣聞成王幼少周公攝政聽言下賢均權布寵動順天地舉措不失然近則召公不説遠則四國流言賢曰尚書曰周公為師相成王為左右召公不悅言周公既還政成王宜自退今復為相故不悅也四國謂管蔡商奄也成王幼小周公攝政四國流言曰公將不利於孺子説讀曰悅即位以來至親分離外戚杜隔恩不得通且漢家之制雖任英賢猶援姻戚親疏相錯杜塞間隙援于元翻塞悉則翻間古莧翻誠所以安宗廟重社稷也宜亟遣使者徵中山太后置之別宮令時朝見朝直遙翻見賢遍翻又召馮衛二族裁與宀兒職賢曰宀兒散也以抑患禍之端上安社稷下全保傅此保傅謂四輔也剛所言僻經妄説違背大義背布內翻罷歸田里元壽二年丙午封魯頃公之八世孫公子寬為褒魯侯魯頃公讎秦孝文王元年為楚所滅恩澤侯表褒魯侯食邑於南陽郡恩澤侯表褒成侯食邑於山陽瑕丘元壽二年詔天下女徒已論歸家出雇山錢月三百如淳曰已論罪已定也令甲女子犯罪作女徒六月雇山遣歸説以為當於山伐木聽使入錢雇功直故謂之雇山應劭曰舊刑鬼薪取薪於山以給宗廟今使女徒出錢雇薪故曰雇山也師古曰如説近之謂女徒論罪已定並放歸家不親役之但令出錢月三百以雇人也為此恩者所以行太皇太后之德施惠於婦人鄉一人師古曰復方目翻鄉一人取其尤最者大司農部丞十三人人部一州勸農桑武帝時桑弘羊置大司農部丞數十人分部郡國主均輸鹽鐵今以十三人部十三州元壽二年秋九月赦天下徒二年元壽二年春黃支國獻犀牛黃支在南海中去京師三萬里應劭曰黃支國在日南之南故厚遺其王遺于季翻令遣使貢獻元壽二年越巂郡上黃龍遊江中上時掌翻太師光大司徒宮等咸稱莽功德比周公宜告祠宗廟大司農孫寶曰周公上聖召公大賢尚猶有不相説説讀曰悅著於經典兩不相損今風雨未時百姓不足每有一事㣥臣同聲師古曰言雷同阿附妄説福祥謂所美非美也甄邯即時承制罷議者會寶遣吏迎母母道病留弟家獨遣妻子司直陳崇劾奏寶事下三公即訊師古曰就問之也劾戶概翻下遐稼翻年七十悖眊恩衰共養營妻子如章師古曰悖惑也眊與耄同自言老耄心志亂惑供養之恩衰具如所奏之章也悖音布內翻共讀曰供音居用翻終於家元壽二年帝更名衎衎空旱翻又墟岸翻元壽二年三月癸酉大司空王崇謝病免以避王莽元壽二年夏四月丁酉左將軍甄豐為大司空右將軍孫建為左將軍光祿勳甄邯為右將軍元壽二年立代孝王玄孫之子如意為廣宗王江都易王孫盱台侯宮為廣川王廣川惠王曾孫倫為廣德王代孝王參孫義改封清河傳國至孫年宣帝地節四年以罪廢今封如意以奉孝王後江都易王非傳國子建武帝元狩二年謀反自殺今立宮以奉易王後廣川惠王越宣帝地節四年以其孫文紹封傳子海陽甘露四年以罪廢今立倫以奉惠王後此皆王莽為政以繼絶世惑衆盱台音吁怡共絳侯周勃玄孫師古曰共讀曰恭元壽二年郡國大旱蝗青州尤甚青州部平原千乘濟南齊北海東萊等郡災川膠東高密等王國王莽白太后宜衣繒練師古曰繒練謂帛無文者衣於既翻以示天下莽因上書願出錢百萬獻田三十頃付大司農助給貧民於是公卿皆慕效焉凡獻田宅者二百三十人以口賦貧民師古曰計口而給其田宅如淳曰民居之里以居貧民莽帥㣥臣奏太后帥讀曰率言幸賴陛下德澤間者風雨時甘露降神芝生蓂莢朱草嘉禾休徵同時並至師古曰休美也徵證也復太官之法膳使臣子各得盡歡心備共養共居用翻養羊尚翻莽又令太后下詔不許每有水旱莽輒素食師古曰素食即菜食無肉太后遣使者詔莽曰聞公菜食憂民深矣今秋幸孰孰古熟字通愛身為國為于偽翻元壽二年六月隕石于巨鹿二元壽二年光祿大夫楚國龔勝太中大夫琅邪邴漢邴姓也與丙同皆乞骸骨莽令太后策詔之曰朕愍以官職之事煩大夫大夫其修身守道以終高年皆加優禮而遣之元壽二年梅福知王莽必篡漢祚一朝棄妻子去不知所之其後人有見福於會稽者變姓名為吳市門卒云會稽郡時治吳縣會工外翻元壽二年秋九月戊申晦日有食之赦天下徒元壽二年遣執金吾候陳茂晉灼曰百官表執金吾屬官有兩丞候司馬説輸芮翻皆自出送家在所收事如淳曰賊雖自出得還其家而已不得復除尚當役作之也師古曰如説非也言身既自出又各送其家人詣本屬縣邑從賦役耳貢父曰賊二百餘人皆異縣人既自出故送家在所收事也余謂劉説是服虔曰重成重也作賊長帥故徙之也元壽二年王莽欲悅太后以威德至盛異於前乃風單于令遣王昭君女須卜居次云入侍太后所以賞賜之甚厚元壽二年車師後王國有新道通玉門關車師後王國治務塗谷去長安八千九百五十里戊己校尉徐普欲開之車師後王姑句師古曰句音鉤以當道供給使者心不便也普欲分明其界然後奏之召姑句使證之不肯繫之其妻股紫陬師古曰陬音子侯翻謂姑句曰前車師前王為都護司馬所殺此言日前事也車師前王治交河城去長安八千一百五十里不如降胸奴即馳突出高昌壁入胸奴拓拔魏時闞爽始立國於高昌蓋因漢高昌壁為名杜佑曰高昌郡蓋因其地高敞人物昌盛立名或云昔漢武帝遣兵西討師旅頓弊者因住焉有漢時高昌壘故也婼羌國王號去胡來王去陽關千八百里去長安六千三百里師古曰言去胡戎來附漢也婼孟康音兒師古曰音而遮翻羌之居赤水者大種也與婼羌比近唐有黑黨項居赤水西數所角翻告急都護都護但欽不以時救助但欽人姓名姓書但平音或上怨欽東守玉門關玉門關不內即將妻子人民千餘人亡降胸奴降戶江翻下同單于受置左谷蠡地左谷蠡王所居地也谷音鹿蠡盧奚翻臣謹已受詔遣中郎將韓隆等使胸奴責讓單于單于叩頭謝罪執二虜還付使者二虜姑句及唐兜也服虔曰惡都奴西域之谷名也因請其罪為二虜請於漢求釋其背叛之罪也莽不聽詔會西域諸國王陳軍斬姑句唐兜以示之欲以懲後使不敢叛師古曰更新為此制也烏孫亡降胸奴者西域諸國佩中國印綬降胸奴者烏桓降胸奴者皆不得受遣中郎將王駿王昌副校尉甄阜王尋使胸奴班四條與單于雜函封師古曰與璽書同一函而封之令奉行因收故宣帝所為約束封函還宣帝與胸奴約長城以南漢有之長城以北胸奴有之有降者不得受今莽以約束未明故頒四條而收舊所為約束公羊春秋傳譏二名故莽效之宜上書慕化為一名漢必加厚賞單于從之上書言幸得備藩臣竊樂太平聖制臣故名囊知牙斯今謹更名曰知莽大説樂音洛更工衡翻説讀曰悅白太后遣使者答諭厚賞賜焉元壽二年莽欲以女配帝為皇后以固其權奏言皇帝即位三年長秋宮未建師古曰秋者收成之時長者恆久之義故以為皇后宮名媵以證翻從嫁之女也古者諸侯一國嫁女九國媵之乃者國家之難本從無嗣配取不正請考論五經定取后禮難乃旦翻師古曰取皆讀曰娶正十二女之義以廣繼嗣古者天子一娶九女公羊傳曰諸侯一聘九女則周之天子固有十二女之禮莽之進女也十一媵蓋通后為十二女也二王後殷周之後周公孔子世周孔之後世嫡相承者師古曰適讀曰嫡嫡謂妻所生也上衆女名下遐稼翻上時掌翻下同王氏女多在選中者莽恐其與己女爭即上言身無德子材下不宜與衆女並采太后以為至誠乃下詔曰王氏女朕之外家其勿采庶民諸生郎吏以上守闕上書者日千餘人公卿大夫或詣廷中或伏省戶下咸言安漢公盛勳堂堂若此今當立后獨奈何廢公女天下安所歸命願得公女為天下母莽遣長史以下分部曉止公卿及諸生師古曰分音扶問翻曉止開諭之使止也而上書者愈甚太后不得已聽公卿采莽女莽復自白宜博選衆女公卿爭曰不宜采諸女以二正統師古曰言皇后之位當在莽女也願見女容肇祖標點顧頡剛聶崇岐覆校
