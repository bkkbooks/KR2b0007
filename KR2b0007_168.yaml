body:
  text: 資治通鑑卷第一百六十八端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注陳紀二世祖文皇帝上諱蒨字子華高祖兄始興王道談之長子天嘉元年庚辰五六春正月癸丑朔大赦改元齊大赦改元乾明辛酉上祀南郊齊高陽王湜以滑稽便辟有寵於顯祖湜常職翻史記索隱曰滑謂亂也稽同也以言辨捷之人言非若是言是若非能亂同異也楚辭將突梯滑稽如脂如韋崔浩云滑音骨滑流酒器也轉注吐酒終日不已言出口成章詞不空竭若滑稽之吐酒故揚雄酒賦云鴟夷滑稽腹如大壺盡日盛酒人復藉沽是也又姚察云滑稽猶俳諧也滑讀如字稽音計以其言語滑利智計捷出故云滑稽也尹焞曰便辟足恭也朱元晦曰便辟謂習於威儀而不直便毗連翻辟匹亦翻執杖以撻諸王太皇太后深銜之及顯祖殂湜有罪太皇太后杖之百餘癸亥卒辛未上祀北郊齊主自晉陽還至鄴二月乙未高州刺史紀機自軍所逃還宣城軍所侯瑱軍前也涇令賀當遷討平之王琳至柵口柵口在濡須口之東水導巢湖今謂之柵江口宋白曰廬州東南至柵口三百九十里今謂之新婦口瑱他甸翻又音鎮相持百餘日東關春水稍長長知兩翻舟艦得通琳引合肥漅湖之衆舳艫相次而下艦戶黯翻漅音巢又子小翻舳艫音逐盧軍勢甚盛瑱進軍虎檻洲琳亦出船列于江西隔洲而泊明日合戰琳軍少卻退保西岸少詩沼翻及夕東北風大起吹其舟艦並壞沒于沙中浪大不得還浦及旦風靜琳入浦治船治直之翻瑱等亦引軍退入蕪湖周人聞琳東下遣都督荊襄等五十二州諸軍事荊州刺史史寧將兵數萬乘虛襲郢州孫瑒嬰城自守去年王琳東下留孫瑒守郢州將即亮翻瑒雉杏翻又音暢恐其衆潰乃帥舟師東下去蕪湖十里而泊擊柝聞於陳軍帥讀曰率柝他各翻聞音問齊儀同三司劉伯球將兵萬餘人助琳水戰行臺慕容恃德之子子會將鐵騎二千屯蕪湖西岸為之聲勢騎奇寄翻丙申瑱令軍中晨炊蓐食以待之時西南風急琳自謂得天助引兵直趣建康趣七喻翻瑱等徐出蕪湖躡其後西南風翻為瑱用琳擲火炬以燒陳船皆反燒其船逆風而用火攻此王琳所以敗也戰船前後置拍竿以拍敵船並鎔鐵灑之琳軍大敗軍士溺死者什二三溺奴狄翻餘皆棄船登岸為陳軍所殺殆盡齊步軍在西岸者自相蹂踐並陷于蘆荻泥淖中蹂人九翻踐慈演翻淖奴教翻濘泥也騎皆棄馬脫走得免者什二三擒劉伯球慕容子會斬獲萬計盡收梁齊軍資器械琳乘舴艋冒陳走舴陟格翻艋音猛陳讀曰陳至湓城欲收合離散衆無附者乃與妻妾左右十餘人奔齊先是琳使侍中袁泌先悉薦翻泌毗必翻又兵媚翻考異曰北齊書作長史袁泌今從陳書御史中丞劉仲威侍衛永嘉王莊及敗左右皆散泌以輕舟送莊達于齊境拜辭而還遂來降還從宣翻又如字降戶江翻下同仲威奉莊奔齊泌昂之子也袁昂著名節於齊梁之間自此江南皆為陳有矣帥讀曰率齊葬文宣皇帝于武寧陵廟號高祖後改曰顯祖戊戌詔衣冠士族將帥戰兵陷在王琳黨中者皆赦之隨材銓敘將即亮翻帥所類翻己亥齊以常山王演為太師録尚書事此鄴省尚書也晉陽並州故曰並省並必經翻趙郡王睿為尚書左僕射詔諸元良口配沒入官及賜人者並縱遣去年齊顯祖夷諸元沒其家口今縱遣良口奴婢仍不縱也乙巳以太尉侯瑱都督湘巴等五州諸軍事鎮湓城齊顯祖之喪常山王演居禁中護喪事婁太后欲立之而不果太子即位乃就朝列朝直遙翻以天子諒陰詔演居東館東館蓋在鄴宮昭陽殿東皆先咨決楊愔等以演與長廣王湛位地親逼恐不利於嗣主心忌之居頃之演出歸第考異曰北齊書孝昭紀云除太傅録尚書朝政皆決於帝月餘乃居藩邸今從楊愔傳藩邸常山第也或謂演曰鷙鳥離巢必有探卵之患離力智翻探吐南翻今日王何宜屢出中山太守陽休之詣演演不見休之謂王友王晞曰昔周公朝讀百篇書夕見七十士猶恐不足録王何所嫌疑乃爾拒絶賓客演以常山王録尚書事故稱為録王先是顯祖之世㣥臣人不自保先悉薦翻及濟南王立濟子禮翻演謂王晞曰一人垂拱吾曹亦保優間因言朝廷寬仁真守文良主晞曰先帝時東宮委一胡人傅之今春秋尚富驟覽萬機殿下宜朝夕先後先悉薦翻後戶遘翻親承音旨而使他姓出納詔命大權必有所歸殿下雖欲守藩其可得邪借令得遂沖退自審家祚得保靈長乎家祚猶云國祚也演以叔父之親與國同休等戚故言家祚王晞勸常山傾大宗其來久矣曰何以處我處昌呂翻晞曰周公抱成王攝政七年然後復子明辟惟殿下慮之演曰我何敢自比周公晞曰殿下今日地望欲不為周公得邪演不應顯祖常遣胡人康虎兒保護太子故晞言及之齊主將發晉陽發晉陽者嗣位而詣鄴高歡建大丞相府於晉陽文宣席之以移魏鼎宿將徑兵咸在焉故以為根本之地留長廣王鎮晉陽既而又疑之乃敕二王俱從至鄴外朝聞之莫不駭愕朝直遙翻又敕以王晞為並州長史演既行晞出郊送之演恐有覘察覘丑廉翻又丑豔翻命晞還城執晞手曰努力自慎躍馬而去平秦王歸彥總知禁衛楊愔宣敕留從駕五千兵於西中晉陽在鄴西故謂之西中從才用翻至鄴數日歸彥乃知之由是怨愔領軍大將軍可朱渾天和道元之子也可朱渾道元自隴右歸高歡考異曰典略云道元弟今從北齊書齊主之姑則高歡之女也若不誅二王少主無自安之理少詩照翻燕因肩翻鄴城有北宮處昌呂翻使歸政皇太后又自天保八年已來爵賞多濫楊愔欲加澄汰以水為諭也澄者去泥滓汰者去沙石諸叨竊恩榮者皆從黜免由是嬖寵失職之徒盡歸心二叔演湛皆齊主之叔既而中變盡以疏忌之迹告二王侍中宋欽道辨之孫也宋辨見任於魏孝文帝教太子以吏事欽道面奏帝稱二叔威權既重宜速去之去羌呂翻帝不許曰可與令公共詳其事楊愔時為尚書令故稱之為令公愔等議出二王為刺史以帝慈仁恐不可所奏乃通啓皇太后具述安危宮人李昌儀昌儀意亦內職而北史后傳無之蓋太后女官之名高仲密因妻而外叛事見一百五十八卷梁武帝大同九年甚相昵愛昵尼質翻以啓示之昌儀密啓太皇太后史言謀及婦人之禍愔等又議不可令二王俱出乃奏以長廣王湛鎮晉陽以常山王演録尚書事二王既拜職乙巳於尚書省大會百僚愔等將赴之散騎常侍兼中書侍郎鄭頤止之散悉亶翻騎奇寄翻曰事未可量不宜輕脫量音良愔曰吾等至誠體國豈常山拜職有不赴之理長廣王湛旦伏家僮數十人於録尚書後室録尚書後室録尚書者宴息之所行酒至愔等我各勸雙杯彼必致辭我一曰執酒二曰執酒三曰何不執爾輩即執之及宴如之愔大言曰諸王反逆欲殺忠良邪尊天子削諸侯赤心奉國何罪之有常山王演欲緩之湛曰不可於是拳杖亂毆毆烏口翻愔及天和欽道皆頭面血流各十人持之燕子獻多力頭又少髮少詩沼翻狼狽排衆走出門斛律光逐而擒之子獻歎曰丈夫為計遲遂至於此使太子太保薛孤延等執頤於尚藥局五代志尚藥局總知御藥事屬門下省後齊制也不用智者言至此豈非命也二王與平秦王歸彥賀拔仁斛律金擁愔等唐突入雲龍門唐突廣韻作人唐人突不遜也今時謂干乘輿者為唐突招之不進使騎殺之叱利虜復姓演使歸彥諭之休寧厲聲不從歸彥久為領軍素為軍士所服皆弛仗休寧方歎息而罷演入至昭陽殿湛及歸彥在朱華門外後齊禁中有朱華閣門下省領左右局領左右二人掌知朱華閣內諸事宣傳已下白衣齋子已上皆主之又有左右直長四人朱華閣以外左右衛將軍各一人主之各武衛將軍二人二之御仗屬官直蕩屬官直衛屬官直突屬官直閣屬官皆屬焉分為左右廂太皇太后之下疑當更有皇太后三字皇太后及帝側立演以磚叩頭磚朱緣翻範土為磚陶而成之進言曰臣與陛下骨肉至親楊遵彥等欲獨亶朝權楊愔字遵彥朝直遙翻自王公已下皆重足屏氣重直龍翻屏必郢翻共相脣齒以成亂階若不早圖必為宗社之害臣與湛為國事重為于偽翻賀拔仁斛律金惜獻武皇帝之業共執遵彥等入宮未敢刑戮專輒之罪誠當萬死時庭中及兩廡衛士二千餘人皆被甲待詔被皮義翻武衛娥永樂武力絶倫素為顯祖所厚叩刀仰視娥姓也後魏有娥清樂音洛叩刀者拔刀離削才寸許考異曰北齊書作領軍劉桃枝今從北史睨研計翻邪視也帝素吃訥吃音訖吃訥之由見上卷武帝永定三年倉猝不知所言太皇太后令卻仗不退又厲聲曰奴輩即今頭落乃退衛士被甲者皆退當未退之時使宇文覺處之常山長廣身首分矣太皇太后因問楊郎何在賀拔仁曰一眼已出太皇太后愴然曰楊郎何所能為留使豈不佳邪楊愔主壻故謂之楊郎留使留之以任使愴初亮翻此等懷逆欲殺我二子演湛皆太皇太后之子爾何為縱之帝猶不能言太皇太后怒且悲曰豈可使我母子受漢老嫗斟酌婁太皇鮮卑也李太后華族也故云然嫗威遇翻太皇太后又為太后誓言演無異志但欲去逼而已逼謂楊愔等以疏踰戚故欲去之為于偽翻下敢為同去羌呂翻太后謂帝何不安慰爾叔帝乃曰天子亦不敢為叔惜況此漢輩但丐兒命兒自下殿去此屬任叔父處分處昌呂翻分扶問翻遂皆斬之楊愔受託孤之寄不能尊主庇身者鮮卑之勢素盛華人不足以制之也長廣王湛以鄭頤昔嘗讒己楊愔傳云湛以頤昔讒己作詔書截其手而殺之演令平秦王歸彥引侍衛之士向華林園鄴都華林園魏武之舊也高歡遷魏主於鄴而身居晉陽以其子為京畿大都督防遏內外故有京畿軍士太皇太后臨愔喪哭曰楊郎忠而獲罪婁后此言出於人心是非之真也御金御府之金也曰以表我意演亦悔殺之於是下詔罪狀愔等且曰罪止一身家屬不問頃之復簿録五家楊愔可朱渾天和燕子獻宋欽道鄭頤凡五家復扶又翻乃各沒一房孩幼盡死兄弟皆除名以中書令趙彥深代楊愔總機務鴻臚少卿陽休之私謂人曰將涉千里殺騏驎而策蹇驢可悲之甚也馬黑脊曰騏驎毛晃曰馬青驪色曰騏驎東方朔傳騏驎騄駬蜚鳴驊騮天下良馬也驎力珍翻戊申演為大丞相都督中外諸軍録尚書事自後魏敬宗以爾朱榮為大丞相後高歡復為之位絶㣥后威權震主段韶為大將軍平陽王淹為太尉平秦王歸彥為司徒彭城王浟為尚書令浟夷周翻江陵之陷也見一百六十五卷梁元帝承聖三年武帝封長城公昌為世子高祖即位屢請之於周周人許而不遣高祖殂周人乃遣昌還高祖存而不遣高祖殂而遣還欲以間陳使兄弟爭國也居于安陸王琳據中流昌還建康路梗故居安陸難乃旦翻昌發安陸將濟江致書於上辭甚不遜上不懌召侯安都從容謂曰從千容翻太子將至須別求一藩為歸老之地安都曰自古豈有被代天子被皮義翻臣愚不敢奉詔因請自迎昌於是㣥臣上表請加昌爵命庚戌以昌為驃騎將軍湘州牧驃匹妙翻騎奇寄翻封衡陽王齊大丞相演如晉陽既至謂王晞曰演從少帝還鄴晞為並州長史留晉陽不用卿言幾至傾覆今君側雖清終當何以處我幾居依翻處昌呂翻下出處同晞曰殿下往時位地猶可以名教出處今日事勢遂關天時非復人理所及晞勸演篡史究言之復扶又翻王晞為司馬三月甲寅詔軍國之政皆申晉陽稟大丞相規算詔演志也周軍初至郢州助防張世貴舉外城以應之所失軍民三千餘口周人起土山長梯晝夜攻之因風縱火燒其內城南面五十餘樓孫瑒兵不滿千人身自撫循行酒賦食士卒皆為之死戰周人不能克史言千人一心雖大敵不能克郢人之死戰不下者畏江陵之俘戮也為于偽翻封萬戶郡公瑒偽許以緩之而潛修戰守之備一朝而具乃復拒守復扶又翻既而周人聞王琳敗陳兵將至乃解圍去瑒集將佐謂之曰吾與王公同獎梁室勤亦至矣今時事如此豈非天乎遂遣使奉表舉中流之地來降將即亮翻使疏吏翻降戶江翻王琳之東下也帝徵南川兵江州刺史周迪高州刺史黃法帥舟師將赴之熊曇朗據城列艦塞其中路熊曇朗時據豫章巨俱翻帥讀曰率曇徒含翻艦戶黯翻塞悉則翻琳敗曇朗部衆離心迪攻拔其城虜男女萬餘口曇朗走入村中村民斬之丁巳傳首建康盡滅其族齊軍先守魯山戊午棄城走詔南豫州刺史程靈洗守之甲子置沅州武州梁置武州於武陵帝分荊州之義陽天門郡郢州之武陵郡置武州督沅州領武陵太守治武陵郡其都尉所部六縣為沅州別置通寧郡以刺史領太守治都尉城省舊都尉沅音元以孫瑒為湘退湘作沅州刺史瑒懷不自安固請入朝史言孫瑒能自全朝直遙翻未拜除吳郡太守壬申齊封世宗之子孝珩為廣寧王珩音行長恭為蘭陵王甲戌衡陽獻王昌入境詔主書舍人緣道迎候主書及中書舍人皆當時要近之職也丙子濟江中流殞之使以溺告溺奴狄翻侯安都以功進爵清遠公以殺昌之功也五代志南海郡翁源縣陳置清遠郡初高祖遣滎陽毛喜從安成王頊詣江陵梁世祖以喜為侍郎沒於長安與昌俱還因進和親之策上乃使侍中周弘正通好於周好呼到翻夏四月丁亥立皇子伯信為衡陽王奉獻王祀昌諡曰獻周世宗明敏有識量晉公護憚之使膳部中大夫李安置毒於糖食追而進之周禮有膳夫唐六典紀前世官制沿革以後周之典庖中士為唐太官署令之職肴藏中士為珍羞署令之職掌醢中士為掌醢署令之職獨不言膳部中大夫以類推之則後周之膳部中大夫唐光祿卿之職也杜佑通典後周膳部中大夫屬冢宰六命又有膳部下大夫五命食追都回翻丸餅也江陵未敗時梁將陸法和有道術先具大食追薄餅及江陵陷梁人入魏果見食追餅蓋北食也今城市間元宵所賣焦食追即其物但較小耳糖出南方煎蔗為之絶甘庚子大漸口授遺詔五百餘言且曰朕子年幼未堪當國魯公朕之介弟杜預曰介大也海內共聞能弘我周家必此子也弘大也世宗之知武帝史所謂明敏有識孰大於此辛丑殂年二十七魯公幼有器質特為世宗所親愛朝廷大事多與之參議性深沈有遠識沈持林翻非因顧問終不輒言世宗每歎曰夫人不言言必有中引論語孔子之言夫音扶中竹仲翻壬寅魯公即皇帝位諱雍字彌羅突安定公泰之第四子也五月壬子齊以開府儀同三司劉洪徽為尚書右僕射侯安都父文捍為始興內史卒官卒官卒于官也卒子恤翻母固求停鄉里乙卯為置東衡州梁先已置東衡州於始興蓋中廢而今復置也為于偽翻從才用翻安都子祕才九歲上以為始興內史並令在鄉侍養以安都能定策以安國家故寵之養余亮翻六月壬辰詔葬梁元帝於江寧梁敬帝太平二年周人歸元帝之柩於王琳琳敗陳人乃得而葬之悉用梁典齊人收永安上黨二王遺骨葬之齊二王死見上卷武帝永定二年馮文洛尚以故意修飾詣之盛列左右立文洛於階下數之曰遭難流離數所具翻難乃旦翻以至大辱志操寡薄不能自盡言不能自殺也得反藩闈藩闈言藩王之閨闈也猶欲見侮杖之一百血流灑地秋七月丙辰封皇子伯山為鄱陽王齊丞相演以王晞儒緩恐不允武將之意將即亮翻每夜載入晝則不與語嘗進晞密室謂曰比王侯諸貴每見敦迫比毗至翻言我違天不祥恐當或有變起吾欲以法繩之何如晞曰朝廷比者疏遠親戚殿下倉猝所行非復人臣之事芒刺在背用漢霍光事遠于願翻復扶又翻何由可久殿下章十二行本下下有雖欲二字乙十一行本同孔本同張校同謙退粃粳神器實恐違上玄之意上玄天也先帝謂高歡卿何敢發此言須致卿於法晞曰天時人事皆無異謀是以敢冒犯斧鉞抑亦神明所贊耳演曰拯難匡時難乃旦翻方俟聖哲吾何敢私議幸勿多言丞相從事中郎陸杳將出使使疏吏翻握晞手使之勸進晞以杳言告演演曰若內外咸有此意趙彥深朝夕左右何故初無一言史言演非不欲篡特覘衆心事隙公事之隙少暇之時也我比亦驚此聲論聲論謂輿論皆歸演聲滿朝野也比毗至翻則口噤心悸噤其禁翻悸其季翻弟既發端吾亦當昧死一披肝膽因共勸演演遂言於太皇太后趙道德曰相王不效周公輔成王演為丞相故呼之為相王演於齊主居親親之地猶周公之於成王而不能以周公自任故趙道德責之不畏後世謂之篡邪太皇太后曰道德之言是也未幾幾居豈翻演又啓云天下人心未定恐奄忽變生須早定名位太皇太后乃從之八月壬午太皇太后下令廢齊主為濟南王出居別宮濟子禮翻以常山王演入纂大統且戒之曰勿令濟南有他也為演殺濟南王太后怒張本肅宗即皇帝位於晉陽諱演字延安勃海王歡第六子文宣帝之母弟也改元皇建太皇太后還稱皇太后皇太后稱文宣皇后宮曰昭信乙酉詔紹封功臣禮賜耆老延訪直言褒賞死事追贈名德帝謂王晞曰卿何為自同外客略不可見自今假非局司但有所懷隨宜作一牒毛晃曰牒書板小簡也即徑進也少隙言少有間隙也少詩沼翻臚陵如翻劼丘八翻每日職務罷並入東廊共舉録歷代禮樂職官及田市徵稅或不便於時而相承施用或自古為利而於今廢墜或道德高俊久在沈淪沈持林翻下沈敏同或巧言眩俗妖邪害政者悉令詳思以漸條奏朝晡給御食畢景聽還景日景日入而後聽還私舍故云畢景聽還妖於驕翻晡奔謨翻帝識度沈敏沈持林翻少居臺閣明習吏事即位尤自勤勵大革顯祖之弊時人服其明而譏其細人君而親小事為細所謂元首叢脞也少詩照翻在外議論得失澤率爾對曰陛下聰明至公自可遠侔古昔而有識之士咸言傷細帝王之度頗為未弘帝笑曰誠如卿言朕初臨萬機慮不周悉故致爾耳顏之推曰如是為爾而已為耳恐後又嫌疏漏澤由是被寵遇庫狄顯安侍坐被皮義翻坐徂臥翻帝曰顯安我姑之子庫狄顯安父干娶勃海王歡之妹樂陵長公主除君臣之敬可言我之不逮顯安曰陛下多妄言帝曰何故對曰陛下昔見文宣以馬鞭撻人常以為非今自行之非妄言邪帝握其手謝之又使直言對曰陛下太細天子乃更似吏帝曰朕甚知之然無法日久將整之以至無為耳又問王晞晞曰顯安言是也顯安干之子也㣥臣進言帝皆從容受納從千容翻性至孝太后不豫帝行不能正履容色貶悴悴秦醉翻衣不解帶殆將四旬太后疾小增即寢伏閣外食飲藥物皆手親之太后嘗心痛不自堪帝立侍帷前以爪掐掌代痛掐苦洽翻血流出袖友愛諸弟無君臣之隔戊子以長廣王湛為右丞相平陽王淹為太傅彭城王浟為大司馬浟夷周翻周軍司馬賀若敦唐六典曰周官大司馬屬官有軍司馬下大夫蓋兵部郎中之任也後周依周官其爵列中大夫也六命若人者翻奄至武陵帥讀曰率武州刺史吳明徹不能拒引軍還巴陵江陵之陷也巴湘之地皆入於周周使梁人守之太尉侯瑱等將兵逼湘州賀若敦將步騎救之乘勝深入按賀若敦傳屢戰破瑱乘勝深入九月乙卯周將獨孤盛將水軍與敦俱進辛酉遣儀同三司徐度將兵會侯瑱于巴丘將即亮翻會秋水泛溢盛敦糧援斷絶分軍抄掠以供資費抄楚交翻敦恐瑱知其糧少乃於營內多為土聚覆之以米少詩沼翻覆敷又翻此檀道濟量沙之故智也召旁村人營旁之村人也隨即遣之瑱聞之良以為實敦又增修營壘造廬舍為久留之計湘羅之間遂廢農業梁置湘州於長沙置羅州於湘陰縣先是土人亟乘輕船先悉薦翻亟去吏翻數也載米粟雞鴨以餉瑱軍敦患之乃偽為土人裝船伏甲士於中瑱軍人望見謂餉船之至逆來爭取敦甲士出而擒之唐裴行儉詐為糧車以破突厥亦用此策敦乃別取一馬率以趣船令船中逆以鞭鞭之如是者再三馬畏船不上數所角翻趣七喻翻上時掌翻然後伏兵於江岸使人乘畏船馬以招瑱軍詐云投附瑱遣兵迎接競來牽馬馬既畏船不上伏兵發盡殺之此後實有饋餉及亡降者瑱猶謂之詐並拒擊之冬十月癸巳瑱襲破獨孤盛於楊葉洲據姚思廉陳書楊葉洲在西江口西江謂湘江也築城自保丁酉詔司空侯安都帥衆會瑱南討帥讀曰率十一月辛亥齊主立元氏為皇后世子百年為太子百年時才五歲齊主徵前開府長史盧叔虎為中庶子太子中庶子職如侍中後齊門下坊之長也柔之從叔也從才用翻帝問時務於叔虎叔虎請伐周曰我強彼弱我富彼貧其勢相懸然干戈不息未能並吞者此失於不用強富也以當時東西二國觀之齊若富強而其根本實撥周若貧弱而其根本實牢若齊孝昭欲用其強富周固有以待之勝負難必是胡騎之法非萬全之術也宜立重鎮於平陽與彼蒲州相對魏神麚元年置雍州於河東延和元年改曰秦州太和中罷魏既分為東西東魏天平初復置秦州於河東沙苑敗後河東之地入于西魏後周因蒲阪舊名而置蒲州運糧積甲彼閉關不出則稍蠶食其河東之地日使窮蹙若彼出兵非十萬以上不足為我敵所損糧食損當作資我軍士年別一代一年一更戍也彼來求戰我則不應彼若退去我乘其弊自長安以西民疏城遠敵兵來往實自艱難與我相持農業且廢不過三年彼自破矣帝深善之齊主自將擊庫莫奚將即亮翻下同至天池庫莫奚出長城北遁此文宣帝所築長城也獲牛羊七萬而還還從宣翻又如字十二月乙未詔自今孟春訖于夏首大辟事已款者已款謂囚已款服也今人謂獄辭為獄款辟毗亦翻及秋冬乃行刑也己亥周巴陵城主尉遲憲降尉紆勿翻降戶江翻遣巴州刺史侯安鼎守之庚子獨孤盛將餘衆自楊葉洲潛遁賀若敦之勢愈孤矣丙午齊主還晉陽齊主斬人於前問王晞曰是人應死不不讀曰否齊主以文宣殺人多非其罪自謂誅當其罪故以問晞晞曰應死但恨死不得其地耳臣聞刑人於市與衆棄之記王制之言帝改容謝曰自今當為王公改之為于偽翻帝欲以晞為侍郎按北史王晞傳侍郎當作侍中或勸晞勿自疏晞曰我少年以來閲要人多矣少詩照翻要人謂位居勢要者得志少時鮮不顛覆少時言不多時也少始沼翻鮮息翦翻不堪時務人主恩私何由可保萬一披猖求退無地非不好作要官但思之爛熟耳好呼到翻初齊顯祖之末穀糴踊貴濟南王即位濟子禮翻尚書左丞蘇珍芝建議修石鱉等屯自是淮南軍防足食杜佑曰石鱉在楚州安宜縣西八十里鄧艾築城於此作白水塘北接連洪澤屯田一萬三千頃安宜唐寶應元年改為寶應縣平州刺史嵇曄建議開督亢陂置屯田歲收稻粟數十萬石北境周贍督亢陂在唐涿州新城縣界燕荊軻獻圖於秦即此地亢音剛以給河南之費齊分河內汲郡為義州置懷義等屯此是五代志序齊濟南王至孝昭時軍餉通鑑取之附見于此二年辛巳五六一春正月戊申周改元保定以大冢宰護為都督中外諸軍事令五府總於天官事無巨細皆先斷後聞五府地官春官夏官秋官冬官府也史言宇文護之權愈重斷丁亂翻庚戌大赦周主祀圜丘辛亥齊主祀圜丘壬子禘於太廟周主祀方丘甲寅祀感生帝於南郊用鄭玄之説祀感生帝靈威仰於南郊以祈穀乙卯祭太社齊主使王琳出合肥召募傖楚更圖進取傖助庚翻合州刺史裴景徽考異曰北齊書作景暉今從陳書請以私屬為鄉導鄉讀曰嚮齊主使琳與行臺左丞盧潛將兵赴之琳沈吟不決景徽恐事泄挺身奔齊按梁置合州於合肥侯景之亂已入於齊齊之境土南盡歷陽陳蓋僑置合州於江濱以景徽為刺史沈持林翻鎮壽陽己巳周主享太廟班太祖所述六官之法宇文泰廟號太祖泰之相魏也建六官述周禮六典以為六官之法辛未周湘州城主殷亮降降戶江翻下同湘州平侯瑱與賀若敦相持日久瑱不能制乃借船送敦等渡江按賀若敦傳借船之上有求字不許報云湘州我地為爾侵逼必須我歸可去我百里之外瑱留船江岸引兵去之敦乃自拔北歸軍士病死者什五六武陵天門南平義陽河東宜都郡悉平五代志澧陽郡孱陵縣舊置南平郡安鄉縣舊置義陽郡南郡松滋縣舊置河東郡宋白曰澧陽郡安鄉縣本漢孱陵縣地後漢為漢壽縣地晉曾立義陽郡除名為民二月甲午周主朝日於東郊三代之禮春朝朝日秋暮夕月周人慕古舉行其禮朝直遙翻周人以小司徒韋孝寬嘗立勳於玉壁事見一百五十九卷梁武帝中大同元年後周之制小司徒六命上大夫也以孝寬為刺史孝寬有恩信善用間諜間古莧翻或齊人受孝寬金貨遙通書疏故齊之動靜周人皆先知之有主帥許盆以所戍城降齊孝寬遣諜取之俄斬首而還帥所類翻諜徒協翻離石以南生胡數為抄掠五代志離石郡後齊置西汾州生胡即稽胡之不附屬周者數所角翻抄楚交翻不可誅討孝寬欲築城於險要以制之乃發河西役徒十萬甲士百人河西龍門河之西也嶽以兵少懼不敢前監工銜翻少詩沼翻孝寬曰計此城十日可畢城距晉州四百餘里吾一日創手二日敵境始知設使晉州徵兵三日方集謀議之間自稽二日計其軍行二日不到我之城隍足得辦矣乃令築之齊人果至境上疑有大軍停留不進其夜孝寬使汾水以南傍介山稷山諸村縱火傍蒲浪翻唐志蒲州萬泉縣有介山介子推隱處稷山縣有稷山齊人以為軍營收兵自固嶽卒城而還卒子恤翻三月乙卯太尉零陵壯肅公侯瑱卒丙寅周改八丁兵為十二丁兵率歲一月而役八丁兵者凡境內民丁分為八番遞上就役十二丁兵者分為十二番月上就役周而復始夏四月丙子朔日有食之周以少傅尉遲綱為大司空尉紆勿翻丙午周封愍帝子康為紀國公皇子贇為魯公章十二行本魯下有國字乙十一行本同贇李后之子也贇於倫翻六月乙酉周使御正殷不害來聘周書申徽傳曰御正任專絲綸蓋中書舍人之職也北史盧辨傳武成元年增置御正四人位上大夫考之唐六典則曰後周依周官春官府置內史中大夫掌王言蓋比中書監令之任後又增為上大夫小史下大夫比中書侍郎之任小史上士比中書舍人之任然則為御正者亦代言之職在帝左右又親密於中書杜佑通典御正屬天官府秋七月周更鑄錢更工衡翻文曰布泉一當五與五銖並行己酉周追封皇伯父皓為邵國公以晉公護之子會為嗣皓弟連為國公以章武公導之子亮為嗣連弟洛生為莒國公以護之子至為嗣追封太祖之子武邑公震為宋公以世宗之子實為嗣皓與衛可孤戰歿有子什肥導護什肥與其叔連皆為高歡所殺無後故以會亮嗣之洛生為爾朱榮所殺震早卒皆無後故亦立嗣齊主之誅楊燕也燕因肩翻許以長廣王湛為太弟既而立太子百年湛心不平帝在晉陽湛居守於鄴楊燕謂楊愔燕子獻守手又翻高祖之從孫也高歡廟號高祖元海父思宗歡之從子散悉亶翻騎奇寄翻從才用翻帝以領軍代人庫狄伏連為幽州刺史斛律光之弟羡為領軍以分湛權湛留伏連不聽羡視事齊主以伏連代羡為幽州以羡代伏連為領軍以分鄴下之權湛知其故乃留伏連不使之幽州而羡至又不聽其視領軍府事先是濟南閔悼王常在鄴濟南王殷諡閔悼先悉薦翻濟子禮翻平秦王歸彥恐濟南復立為己不利齊主藉歸彥握兵以殺楊燕楊燕死而濟南廢矣故恐其復立為己不利復扶又翻帝乃使歸彥至鄴徵濟南王如晉陽湛內不自安問計於高元海元海曰皇太后萬福至尊孝友異常殿下不須異慮湛曰此豈我推誠之意邪元海乞還省一夜思之湛即留元海於後堂元海達旦不眠唯繞牀徐步夜漏未盡湛遽出曰神算如何元海曰有三策恐不堪用耳請殿下如梁孝王故事從數騎入晉陽先見太后求哀梁孝王事見十六卷漢景帝中二年請去兵權見賢遍翻去羌呂翻以死為限不干朝政朝直遙翻必保太山之安此上策也不然當具表云威權太盛恐取謗衆口請青齊二州刺史沈靖自居沈持林翻必不招物議此中策也更問下策曰發言即恐族誅固逼之元海曰濟南世嫡主上假太后令而奪之今集文武示以徵濟南之敕執斛律豐樂斛律羡字豐樂樂音洛尊立濟南號令天下以順討逆此萬世一時也湛大悅然性怯狐疑未能用使術士鄭道謙等卜之皆曰不利舉事靜則吉有林慮令潘子密曉占候林慮縣漢屬河內郡晉屬汲郡魏敬宗永安元年置林慮郡帶林慮縣慮讀如閭宮車當晏駕殿下為天下主湛拘之於內以候之又令巫覡卜之覡刑狄翻多云不須舉兵自有大慶湛乃奉詔令數百騎送濟南王至晉陽九月帝使人鴆之濟南王不從乃扼殺之帝尋亦悔之冬十月甲戌朔日有食之丙子齊以彭城王浟為太保長樂王尉粲為太尉樂音洛下同齊肅宗出畋有兔驚馬墜地絶肋婁太后視疾問濟南所在者三齊主不對太后怒曰殺之邪不用吾言死其宜矣遂去不顧十一月甲辰詔以嗣子沖眇可遣尚書右僕射趙郡王睿諭旨徵長廣王湛統茲大寶又與湛書曰百年無罪汝可以樂處置之勿效前人也樂音洛楚靈王乾溪之役楚人殺其諸子王聞之自投於車下曰余殺人子多矣能無及此乎齊肅宗殺其兄之子臨終乃戒其弟勿殺己之子良可憫笑是日殂於晉陽宮年二十七言恨不見太后山陵顏之推論曰孝昭天性至孝而不知忌諱乃至於此良由不學之所為也趙郡王睿先使黃門侍郎王松年馳至鄴宣肅宗遺命湛猶疑其詐使所親先詣殯所發而視之使者復命使疏吏翻下同湛喜馳赴晉陽使河南王孝瑜先入宮改易禁衛癸丑世祖即皇帝位於南宮諱湛勃海王歡第九子孝昭帝之母弟南宮晉陽南宮也改元太寧周人許歸安成王頊頊吁玉翻使司會上士杜章十二行本杜上有京兆二字乙十一行本同張校同云無注本亦無杲來聘周禮天官之屬有司會凡邦國都鄙官府之治及其財用在書契版圖者皆聽其會計以歲月日考其成鄭玄曰會大計也司會主天下之大計計官之長若今尚書余按後周地官即唐戶部尚書之任司會當如唐之度支郎中而六典不言所以杜佑通典後周司會屬天官府有中大夫上士中士即遣使報之並賂以黔中地及魯山郡周得黔中則全有巴蜀得魯山則全有漢沔故因其所欲而餌之齊以彭城王浟為太師録尚書事平秦王歸彥為太傅尉粲為太保平陽王淹為太宰博陵王濟為太尉段韶為大司馬豐州刺史婁睿為司空五代志上黨郡鄉縣後魏置南垣州尋改曰豐州任城王湝為尚書左僕射任音壬湝居諧翻並州刺史斛律光為右僕射婁睿昭之兄子也婁昭婁太后之弟睿昭兄拔之子丁巳周主畋于岐陽十二月壬午還長安太子中庶子餘姚虞荔御史中丞孔奐以國用不足奏立煮海鹽賦及榷酤之科吳王濞煮海為鹽今淮鹽也至此則東南瀕海煮鹽之地皆歸於管榷矣酤音固荔力計翻榷古嶽翻初高祖以帝女豐安公主妻留異之子貞臣徵異為南徐州刺史異遷延不就帝即位復以異為縉州刺史領東陽太守自侯景之亂梁南郡王大連之敗留異跨據東陽陳興以為縉州刺史因縉雲山以名州妻七細翻復扶又翻下異復同澌每言朝廷虛弱澌斯義翻異信之雖外示臣節恆懷兩端恆戶登翻與王琳自鄱陽信安嶺潛通使往來今有嶺路自衢州經信州達于鄱陽使疏吏翻上遣左衛將軍沈恪代異實以兵襲之異出軍下淮以拒恪恪與戰而敗退還錢塘異復上表遜謝時衆軍方事湘郢乃降詔書慰諭且羈縻之異知朝廷終將討己乃以兵戍下淮及建德以備江路劉昫曰建德縣漢會稽富春縣地吳分置建德縣隋廢唐復置建德縣為睦州治所丙午詔司空南徐州刺史侯安都討之三年壬午五六二吳明徹至臨川攻周迪春正月乙亥齊主至鄴自晉陽宮至鄴辛巳祀南郊壬午享太廟丙戌立胡氏為皇后子緯為皇太子緯于貴翻后魏兗州刺史安定胡延之之女也戊子齊大赦己亥以馮翊王潤為尚書左僕射吳明徹至臨川攻周迪周涼景公賀蘭祥卒涼國公景諡也吳明徹至臨川攻周迪壬寅周人鑿河渠於蒲州龍首渠於同州二渠皆以灌溉吳明徹至臨川攻周迪丁未周以安成王頊為柱國大將軍遣杜杲送之南歸考異曰典略作杜果今從周書吳明徹至臨川攻周迪辛亥上祀南郊以胡公配天胡公始封於陳故郊祀之以配天辛酉祀北郊吳明徹至臨川攻周迪閏月丁未齊以太宰平陽王淹為青州刺史太傅平秦王歸彥為太宰冀州刺史歸彥為肅宗所厚歸彥以殺楊燕之功為肅宗所厚陵侮貴戚世祖即位侍中開府儀同三司高元海御史中丞畢義雲黃門郎高乾和數言其短數所角翻且云歸彥威權震主必為禍亂帝亦尋其反覆之迹漸忌之歸彥始為文宣所親任其後背楊愔附孝昭以成濟南之禍又為孝昭所委信孝昭既殂又迎武成以貪天之功故武成迹其反覆而忌之召魏收於帝前作詔草除歸彥冀州伺相吏翻使乾和繕寫晝日仍敕門司不聽歸彥輒入宮時歸彥縱酒為樂經宿不知至明欲參參朝參也毛晃曰參造也趨承也樂音洛大驚而退及通名謝敕令早發別賜錢帛等物甚厚又敕督將悉送至清陽宮齊有別宮在清淇之陽因以為名五代志清河郡清陽縣舊曰清河縣後齊省貝丘入焉改為貝丘隋開皇六年改為清陽將即亮翻莫敢與語唯趙郡王睿與之久語時無聞者帝之為長廣王也清都和士開以善握槊彈琵琶有寵辟為開府行參軍及即位纍遷給事黃門侍郎高元海畢義雲高乾和皆疾之將言其事士開乃奏元海等交結朋黨欲亶威福乾和由是被疏被皮義翻義雲納賂於士開得為兗州刺史為和士開怙寵亂齊張本吳明徹至臨川攻周迪帝徵江州刺史周迪出鎮湓城周迪領江州刺史而屯據臨川徵之鎮湓城若以江州授之者朝直遙翻下同迪趑且顧望並不至趑子移翻且七余翻趑趄不進之貌其餘南江酋帥私署令長多不受召酋慈秋翻帥所類翻長知兩翻朝廷未暇致討但羈縻之豫章太守周敷獨先入朝進號安西將軍給鼓吹一部賜以女妓金帛令還豫章周敷先與周迪分據臨川既破熊曇朗敷移據豫章吹尺瑞翻妓渠綺翻深不平之乃陰與留異相結遣其弟方興章十二行本興下有將兵二字乙十一行本同張校同云無注本亦無襲敷敷與戰破之又遣其兄子伏甲船中詐為賈人欲襲湓城賈音古未發事覺尋陽太守監江州事晉陵華皎遣兵逆擊之盡獲其船仗監工銜翻上以閩州刺史陳寶應之父為光祿大夫五代志建安郡陳置閩州陳寶應父羽命宗正編入屬籍而寶應以留異女為妻陰與異合虞荔弟寄流寓閩中荔思之成疾上為荔徵之寶應留不遣寄嘗從容諷以逆順為于偽翻從千容翻寶應輒引他語以亂之寶應嘗使人讀漢書臥而聽之至蒯通説韓信曰相君之背貴不可言蹶然起坐曰可謂智士寄曰通一説殺三士何足稱智班固曰蒯通一説而喪三俊應劭注云謂烹酈生敗田橫驕韓信也説式芮翻相息亮翻識所歸乎王命論見四十一卷漢光武建武五年寄知寶應不可諫恐禍及己乃著居士服著陟略翻居東山寺陽稱足疾寶應使人燒其屋寄安臥不動親近將扶之出寄曰吾命有所懸避將安往言託迹閩中生死之命懸於人手無所避之也吳明徹至臨川攻周迪乙卯齊以任城王湝為司徒任音壬湝戶皆翻吳明徹至臨川攻周迪齊揚州刺史行臺王琳數欲南侵尚書盧潛以為時事未可上遣移書壽陽欲與齊和親潛以其書奏齊朝仍上啓請且息兵數所角翻上時掌翻朝直遙翻齊主許之遣散騎常侍崔瞻來聘且歸南康愍王曇朗之喪曇朗為齊所殺見一百六十六卷梁敬帝太平元年更相表列更工衡翻齊主徵琳赴鄴以潛為揚州刺史領行臺尚書瞻㥄之子也高歡起兵於信都崔㥄為參佐㥄力膺翻吳明徹至臨川攻周迪梁末喪亂鐵錢不行梁普通中鑄鐵錢喪息浪翻甲子改鑄五銖錢一當鵝眼之十考異曰隋志在天嘉五年今從陳帝紀吳明徹至臨川攻周迪後梁主安於儉素不好酒色好呼到翻雖多猜忌而撫將士有恩以封疆褊隘邑居殘毀干戈日用鬱鬱不得志疽發背而殂年四十四諡曰宣皇帝廟號中宗太子巋即皇帝位巋字仁遠宣帝之第三子也巋音歸又區胃翻尊龔太后為太皇太后王后曰皇太后母曹貴嬪為皇太嬪毗賓翻吳明徹至臨川攻周迪二章十二行本二作三乙十一行本同張校同月丙子安成王頊至建康詔以為中書監中衛將軍上謂杜杲曰家弟今蒙禮遣實周朝之惠然魯山不返亦恐未能及此言若不賂以魯山亦恐未及遣安成王還也朝直遙翻下同安成長安一布衣耳而陳之介弟也介大也本朝敦睦九族恕己及物上遵太祖遺旨下思繼好之義好呼到翻是以遣之南歸今乃云以尋常之土易骨肉之親非使臣之所敢聞也使疏吏翻上甚慙曰前言戲之耳待杲之禮有加焉頊柳氏及子叔寶猶在穰城上復遣毛喜如周請之頊吁玉翻復扶又翻周人皆歸之吳明徹至臨川攻周迪丁丑以安右將軍吳明徹為江州刺史督高州刺史黃法巨俱翻豫章太守守式又翻周敷共討周迪吳明徹至臨川攻周迪甲申大赦吳明徹至臨川攻周迪留異始謂臺軍必自錢塘上既而侯安都步由諸暨出永康上時掌翻諸暨縣自漢以來屬會稽郡永康縣吳赤烏八年分上虞烏傷立屬東陽郡自永康至東陽一百九里異大驚奔桃枝嶺於巖口豎柵以拒之豎而主翻安都為流矢所中血流至踝中竹仲翻踝胡瓦翻足跟也乘輿指麾容止不變因其山勢迮而為堰迮側百翻迫也堰於建翻會潦水漲滿安都引船入堰起樓艦與異城等發拍碎其樓堞潦盧皓翻艦戶黯翻堞達協翻異與其子忠臣脫身奔晉安依陳寶應安都虜其妻及餘子盡收鎧仗而還鎧可亥翻還從宣翻又音如字異黨向文政據新安上以貞毅將軍程文季為新安太守梁置貞毅將軍班第二十二在五德將軍之下陳制擬官品第五文政戰敗遂降文季靈洗之子也陳氏建國程靈洗蕭摩訶等俱為健將帥讀曰率降戶江翻吳明徹至臨川攻周迪夏四月辛丑齊武明婁太后殂齊主不改服緋袍如故未幾未幾言未幾時也幾居豈翻置酒作樂宮女進白袍帝投諸臺下散騎常侍和士開請止樂帝怒撾之和士開長君之惡者也自此益無所忌憚矣吳明徹至臨川攻周迪乙巳齊遣使來聘使疏吏翻下同吳明徹至臨川攻周迪齊青州上言河水清齊主遣使祭之改元河清吳明徹至臨川攻周迪先是周之君章十二行本君作㣥乙十一行本同臣受封爵者皆未給租賦先悉薦翻癸亥始詔柱國等貴臣邑戶聽寄食他縣吳明徹至臨川攻周迪五月庚午周大赦吳明徹至臨川攻周迪己丑齊以右僕射斛律光為尚書令吳明徹至臨川攻周迪壬辰周以柱國楊忠為大司空六月己亥以柱國蜀國公尉遲迥為大司馬尉紆勿翻吳明徹至臨川攻周迪秋七月己丑納太子王氏金紫光祿大夫周之女也姚思廉陳書周作固吳明徹至臨川攻周迪齊平秦王歸彥至冀州內不自安欲待齊主如晉陽乘虛入鄴其郎中令呂思禮告之此王國郎中令也歸彥於南境置私驛聞大軍將至即閉城拒守長史宇文仲鸞等不從皆殺之歸彥自稱大丞相有衆四萬齊主以都官尚書封子繪冀州人祖父世為本州刺史得人心子繪父隆之祖回皆為冀州刺史傳張戀翻巡城諭以禍福吏民降者相繼城中動靜小大皆知之降戶江翻歸彥登城大呼云呼火故翻孝昭皇帝初崩六軍百萬悉在臣手投身向鄴奉迎陛下當時不反今日豈反邪正恨高元海畢義雲高乾和誑惑聖上疾忌忠良但為殺此三人誑居況翻為于偽翻即臨城自刎刎扶粉翻既而城破單騎北走至交津獲之水經注衡漳水徑武邑郡南又東徑武強縣北又東北徑武隧縣故城南白馬河注之水上承呼沱東徑樂鄉縣北饒陽縣南又東南徑武邑郡北而東入衡漳水謂之交津口乙未載以露車銜木面縛李百藥北齊書銜木作銜枚擊鼓隨之並其子孫十五人皆棄市命封子繪行冀州事齊主知歸彥前譖清河王嶽事見一百六十六卷梁敬帝紹泰元年贈嶽太師丁酉以段韶為太傅婁睿為司徒平陽王淹為太宰斛律光為司空趙郡王睿為尚書令河間王孝琬為左僕射吳明徹至臨川攻周迪癸亥齊主如晉陽吳明徹至臨川攻周迪上遣使聘齊吳明徹至臨川攻周迪九月戊辰朔日有食之吳明徹至臨川攻周迪以侍中都官尚書到仲舉為尚書右僕射丹楊尹仲舉溉之弟子也到溉彥之之曾孫梁初以文學顯以廉白稱吳明徹至臨川攻周迪吳明徹至臨川攻周迪不能克丁亥詔安成王頊代之考異曰陳書帝紀云丁亥迪請降詔安成王諱督衆軍以招納之今從南史迪傳吳明徹至臨川攻周迪冬十月戊戌詔以軍旅費廣百姓空虛凡供乘輿飲食衣服及宮中調度悉從減削乘繩證翻調徒釣翻至於百司宜亦思省約吳明徹至臨川攻周迪十一月丁卯周以趙國公招為益州總管吳明徹至臨川攻周迪丁丑齊遣兼散騎常侍封孝琰來聘吳明徹至臨川攻周迪十二月丙辰齊主還鄴自晉陽還鄴齊主逼通昭信李后文宣李后宮曰昭信若不從我我殺爾兒后懼從之既而有娠太原王紹德至閣不得見見賢遍翻慍曰兒豈不知邪姊腹大故不見兒后大慙由是生女不舉帝橫刀詬曰詬許候翻殺我女我何得不殺爾兒對后以刀環築殺紹德后大哭帝愈怒裸后亂撾之后號天不已帝命盛以絹囊號戶刀翻盛時征翻流血淋漉投諸渠水良久乃蘇犢車載送妙勝寺為尼武成之淫虐文宣教之也是以詩貴正始章錫琛標點容肇祖聶崇岐覆校
