body:
  text: 資治通鑑卷第一百六十一端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注梁紀十七侯景聞臺軍討之高祖武皇帝十七太清二年戊辰五四八侯景聞臺軍討之春正月己亥慕容紹宗以鐵騎五千夾擊侯景承上卷上年紹宗與景相持事故不書東魏汝輩家屬已為高澄所殺衆信之蓋前乎此時景以此言誑衆也誑居況翻呼火故翻汝輩家屬並完若歸官勳如舊歸謂復歸東魏官者各人先所居之官勳勳階也質北斗為誓以明其言之不欺被皮義翻樂音洛其將暴顯等各帥所部降於紹宗暴顯去年春為侯景所執將即亮翻帥讀曰率降戶江翻爭赴渦水渦音戈水為之不流為于偽翻景與腹心數騎自硤石濟淮稍收散卒得步騎八百人騎奇寄翻南過小城人登陴詬之曰跛奴侯景右足偏短故詬為跛奴陴頻彌翻詬苦候翻跛普我翻景怒破城殺詬者而去晝夜兼行追軍不敢逼考異曰典略云晝息夜行追軍漸逼今從梁書景若就擒公復何用紹宗乃縱之人臣苟有才必養寇以自資東魏之世彭樂慕容紹宗同一轍耳復扶又翻侯景聞臺軍討之辛丑以尚書僕射謝舉為尚書令守吏部尚書王克為僕射侯景聞臺軍討之甲辰豫州刺史羊鴉仁以東魏軍漸逼稱糧運不繼棄懸瓠還義陽殷州刺史羊思達亦棄項城走去年使羊鴉仁鎮懸瓠羊思達鎮項城考異曰典略在六月今從梁帝紀上怒責讓鴉仁鴉仁懼啓申後期頓軍淮上不敢歸義陽侯景聞臺軍討之侯景既敗不知所適時鄱陽王範除南豫州刺史未至去年遣蕭淵明攻彭城以範代鎮壽陽時猶未至素為監州事韋黯所不容監工銜翻聞景至故往候之有意見之為故鄭玄曰古者謂候為進孔穎達曰古時謂迎客為進漢時謂迎客為候今按經傳迎客為進則進使者而問故之類是也迎客為候則鄭注周禮候人云候候迎賓客之來是也壽陽去此不遠城池險固欲往投之韋黯其納我乎神茂曰黯雖據城是監州耳王若馳至近郊彼必出迎因而執之可以集事得城之後徐以啓聞朝廷喜王南歸必不責也景執其手曰天教也神茂請帥步騎百人先為鄉導帥讀曰率鄉讀曰嚮壬子景夜至壽陽城下韋黯以為賊也授甲登陴陴頻彌翻景遣其徒告曰河南王戰敗來投此鎮願速開門黯曰既不奉敕不敢聞命景謂神茂曰事不諧矣神茂曰黯懦而寡智可説下也説式芮翻乃遣壽陽徐思玉入見黯曰徐思玉本壽陽人仕於東魏今隨侯景南來河南王朝廷所重君所知也今失利來投何得不受黯曰吾之受命唯知守城河南自敗何預吾事思玉曰國家付君以閫外之略今君不肯開城若魏兵來至河南為魏所殺君豈能獨存章十二行本存下有縱使或存四字乙十一行本同孔本同退齋校同張校同云獨守無注本作獨存是張據校本存作守何顏以見朝廷黯然之思玉出報景大悅曰活我者卿也癸丑黯開門納景景遣其將分守四門詰責黯將斬之將即亮翻下同詰去吉翻既而撫手大笑置酒極歡黯睿之子也合肥之役黯請睿下城避箭其懦暗可知矣然使黯能拒景梁朝亦將敕黯納之朝廷聞景敗未得審問或云景與將士盡沒上下咸以為憂侍中太子詹事何敬容詣東宮太子曰淮北始更有信侯景定得身免不如所傳敬容曰得景遂死深為朝廷之福太子失色問其故敬容曰景翻覆叛臣終當亂國太子於玄圃自講老莊自蕭齊以來東宮有玄圃昆崙之山三級下曰樊桐二曰玄圃三曰層城太帝之所居東宮次於帝居故立玄圃梁祕書省有撰史學士昔西晉祖尚玄虛使中原淪於胡羯事見晉紀江南亦將為戎乎何敬容雖不能優遊於文義其識則過於梁朝諸臣矣復扶又翻下景復復敕乃復故復同甲寅景遣儀同三司于子悅馳以敗聞併自求貶削優詔不許景復求資給上以景兵新破未忍移易乙卯即以景為南豫州牧本官如故更以鄱陽王範為合州刺史鎮合肥更工衡翻光祿大夫蕭介上表諫曰竊聞侯景以渦陽敗績隻馬歸命渦音戈陛下不悔前禍復敕容納臣聞凶人之性不移天下之惡一也昔呂布殺丁原以事董卓終誅董而為賊事見漢靈獻二帝紀還背晉以構妖事見晉安帝紀妖於驕翻狼子野心終無馴狎之性養虎之喻必見飢噬之禍矣侯景以凶狡之才荷高歡卵翼之遇左傳楚令尹子西曰勝如卵豫翼而長之荷下可翻任居方伯然而高歡墳土未乾乾音干即還反噬逆力不逮乃復逃死關西宇文不容故復投身於我陛下前者所以不逆細流李斯上秦王書曰江海不擇細流故能就其深漢邊郡置屬國以處降胡使偵伺胸奴降戶江翻今既亡師失地直是境上之匹夫陛下愛匹夫而棄與國章十二行本國下有臣竊不取也五字乙十一行本同孔本同張校同退齋校同與國謂東魏若國家猶待其更鳴之辰歲暮之效臣竊惟侯景必非歲暮之臣惟思也背君親如遺芥背蒲妹翻豈知遠慕聖德為江淮之純臣乎事迹顯然無可致惑臣朽老疾侵不應干預朝政朝直遙翻但楚囊將死有城郢之忠左傳楚令尹子囊將死遺言子庚必城郢君子謂子囊忠將死不忘衛社稷亦有尸諫之節孔子家語曰衛大夫蘧伯玉賢靈公不用彌子瑕不肖反任之史魚驟諫不從將卒命其子曰吾不能進蘧伯玉退彌子瑕是不能正君也生不能正君死無以成禮我死汝置尸牖下於我畢矣其子從之靈公弔焉怪而問之其子以告公曰是寡人之過也命之殯於客位進蘧伯玉退彌子瑕孔子聞之曰古之烈諫者死則已矣未有若史魚死而尸諫忠感其君者也敢忘劉向之心劉向事見三十卷漢成帝陽朔二年然不能用介思話之孫也宋元嘉間蕭思話歷當方任按新唐書宰相世系表介與帝同十三世祖後漢中山相苞侯景聞臺軍討之己未東魏大將軍澄朝于鄴朝直遙翻下同侯景聞臺軍討之魏以開府儀同三司趙貴為司空侯景聞臺軍討之魏皇孫生大赦侯景聞臺軍討之二月東魏殺其南兗州刺史石長宣討侯景之黨也石長宣書官者表其以南兗州附侯景也不可以春秋書法觀之皆赦之侯景聞臺軍討之東魏既得懸瓠項城悉復舊境大將軍澄數遣書移移謂移檄也數所角翻朝廷未之許澄謂貞陽侯淵明曰先王與梁主和好十有餘年復扶又翻好呼到翻下舊好同聞彼禮佛文云奉為魏主並及先王為于偽翻言為魏主君臣祈福也此乃梁主厚意不謂一朝失信致此紛擾知非梁主本心當是侯景扇動耳宜遣使咨論使疏吏翻下同若梁主不忘舊好吾亦不敢違先王之意諸人並即遣還侯景家屬亦當同遣淵明乃遣省事夏侯僧辨奉啓於上稱勃海王弘厚長者若更通好當聽淵明還上得啓流涕此所謂婦人之仁也帝於是墮高澄數中矣右衛將軍朱異御史中丞張綰等皆曰靜寇息民和實為便司農卿傅岐獨曰高澄何事須和必是設間異羊至翻間古莧翻故命貞陽遣使欲令侯景自疑景意不安必圖禍亂若許通好正墮其計中侯景之反覆何敬容蕭介知之高澄之姦詐傅岐知之梁朝非果無人也武帝不能決擇而用之耳上亦厭用兵乃從異言賜淵明書曰知高大將軍禮汝不薄省啓甚以慰懷當別遣行人重敦鄰睦省悉景翻重直龍翻僧辨還過壽陽侯景竊訪知之攝問具服攝問收録其人而問之也陳啓於上曰高氏心懷鴆毒怨盈北土人願天從歡身殞越謂人所祝願天從而殺之計滅待時所以昧此一勝者謂渦陽之勝也左傳楚武王將死告其夫人鄧曼曰余心蕩鄧曼曰王祿盡乎盈而蕩天之道也杜預注曰蕩動散也行下孟翻又如字腹心無疾又何急急奉璧求和豈不以秦兵扼其喉秦兵謂西魏之兵西魏據有關西故曰秦兵胡騎謂柔然之兵取安大國臣聞一日縱敵數世之患晉先軫之言以棄億兆之心竊以北魏安強莫過天監之始鍾離之役匹馬不歸鍾離之戰見一百四十六卷天監六年陛下尚伐而取之及其弱也反慮而和之舍已成之功縱垂死之虜使其假命強梁以遺後世舍讀曰捨遺于季翻非直愚臣扼腕實亦志士痛心昔伍相奔吳楚邦卒滅左傳楚殺伍奢其子奔吳吳王闔閭用之破楚入郢腕烏貫翻相息亮翻卒子恤翻劉氏用興見漢高帝紀心同往事誠知高澄忌賈在翟惡會居秦左傳晉靈公之初賈季奔翟隨會奔秦秦人用其謀晉人患之六卿相見於諸浮趙宣子曰隨會在秦賈季在翟難日至矣將若之何翟與狄同惡烏路翻冀除其患若臣死有益萬殞無辭唯恐千載有穢良史觀景此言其氣悖矣餉金三百兩異納金而不通其啓史言朱異昧利而不顧患己卯上遣使弔澄景又啓曰臣與高氏釁隙已深仰憑威靈期雪讎恥今陛下復與高氏連和使臣何地自處此乃侯景由衷之言使疏吏翻釁許覲翻復扶又翻處昌呂翻宣暢皇威上報之曰朕與公大義已定豈有成而相納敗而相棄乎今高氏有使求和朕亦更思偃武進退之宜國有常制公但清靜自居無勞慮也景又啓曰臣今蓄糧聚衆秣馬潛戈指日計期克清趙魏不容軍出無名故願以陛下為主耳觀景此言亦那可忍南北復通將恐微臣之身不免高氏之手景言至此辭意迫切獸窮則搏能無及乎復扶又翻下勞復同上又報曰朕為萬乘之主豈可失信於一物想公深得此心不勞復有啓也既斷來章景又生心矣乘繩證翻景乃詐為鄴中書求以貞陽侯易景上將許之舍人傅岐曰傅岐先兼中書通事舍人纍遷太僕司農卿兼舍人如故侯景以窮歸義棄之不祥且百戰之餘寧肯束手就縶謝舉朱異曰景奔敗之將一使之力耳將即亮翻使疏吏翻上從之復書曰貞陽旦至侯景夕返景謂左右曰我固知吳老公薄心腸帝之情態於此畢露而帝不自知也嗚呼今坐聽亦死言坐而聽梁朝所為亦必至於死説式芮翻唯王圖之於是始為反計屬城居民悉召募為軍士輒停責市估及田租市估應商旅之物入市者估其直而收稅田租計畝所出常租悉以配將士景之反謀彰灼如此梁之君臣若罔聞知其亡宜矣侯景聞臺軍討之三月癸巳東魏以太尉襄城王旭為大司馬旭吁玉翻開府儀同三司高嶽為太尉辛亥大將軍澄南臨黎陽自虎牢濟河至洛陽魏同軌防長史裴寬與東魏將彭樂等戰為樂所擒澄禮遇甚厚寬得間逃歸將即亮翻間古莧翻澄由太行返晉陽行戶剛翻侯景聞臺軍討之屈獠洞斬李賁賁竄屈獠洞見一百五十九卷中大同元年獠魯皓翻考異曰陳高祖紀云太清元年蓋謂破賁之年今從梁帝紀按通鑑破賁書於中大同元年賁兄天寶遁入九真收餘兵二萬圍愛州五代志九真郡梁置愛州帥讀曰率詔以霸先為西江督護高要太守督七郡諸軍事侯景聞臺軍討之夏四月甲子東魏吏部令史張永和等偽假人官事覺糾檢首者六萬餘人糾檢官所糾檢而發之者也首自首者也史言喪亂之際吏因為姦濫冒者不勝其多首手又翻侯景聞臺軍討之甲戌東魏遣太尉高嶽行臺慕容紹宗大都督劉豐生等將步騎十萬攻魏王思政於潁川王思政守潁川事始上卷上年將即亮翻騎奇寄翻若無人者嶽恃其衆四面陵城思政選驍勇開門出戰驍堅堯翻嶽兵敗走嶽更築土山晝夜攻之思政隨方拒守奪其土山置樓堞以助防守堞徒協翻守式又翻侯景聞臺軍討之五月魏以丞相泰為太師廣陵王欣為太傅李弼為大宗伯趙貴為大司寇于謹為大司空宇文相魏倣成周之制建官登隴至原州歷北長城此蓋秦所築長城也至蒲州自五原還至蒲州也五代志河東郡後魏置秦州後周改曰蒲州因蒲坂為名也趣七喻翻還從宣翻又如字及至已愈泰還華州華戶化翻侯景聞臺軍討之上遣建康令謝挺散騎常侍徐陵等聘于東魏按梁官制建康令秩千石散騎常侍秩二千石謝挺不當在徐陵之上蓋徐陵將命而使謝挺特輔行耳散悉亶翻騎奇寄翻復扶又翻好呼到翻陵摛之子也徐摛見一百五十五卷中大通三年摛丑知翻侯景聞臺軍討之六月東魏大將軍澄巡北邊侯景聞臺軍討之秋七月庚寅朔日有食之侯景聞臺軍討之乙卯東魏大將軍澄朝于鄴朝直遙翻以道士多偽濫始罷南郊道壇魏太武帝崇信寇謙之置南郊道壇庚寅澄還晉陽遣尚書辛術帥諸將略江淮之北凡獲二十三州侯景既亂梁明年東魏始盡有淮南之地史究其終言之帥讀曰率將即亮翻侯景聞臺軍討之侯景自至壽陽徵求無已朝廷未嘗拒絶景請娶於王謝上曰王謝門高非偶可於朱張以下訪之朱張謂朱異張綰之族也恚於避翻曰會將吳兒女配奴又啓求錦萬匹為軍人作袍中領軍朱異議以青布給之又以臺所給仗多不能精啓請東冶鍛工欲更營造章十二行本造下有敕並給之四字乙十一行本同孔本同張校同退齋校同鍛丁貫翻景以安北將軍夏侯夔之子譒為長史譒補過翻徐思玉為司馬譒遂去夏稱侯託為族子夏侯詳為梁朝佐命功臣其子亶夔皆宣力邊陲並著聲績至譒不克負荷矣上既不用景言與東魏和親是後景表疏稍稍悖慢悖蒲內翻又蒲沒翻又聞徐陵等使魏反謀益甚使疏吏翻元貞知景有異志纍啓還朝景求輔貞見上卷上年朝直遙翻河北事雖不果江南何慮失之何不小忍貞懼逃歸建康具以事聞上以貞為始興內史亦不問景帝既不問景又不為之備蓋耄期倦勤直付之無可奈何臨賀王正德所至貪暴不法屢得罪於上正德既奔魏而逃歸上復其本封正德志行無悛常公行劫掠及隨豫章王北侵又委軍而走為有司所奏上詔曰汝往年在蜀昵近小人猶謂少年情志未定更於吳郡殺戮無辜劫盜財物及還京師專為逋逃乃至江乘要道湖頭斷路奪人妻妾略人子女我每加覆掩冀汝自新了無悛革怨讎逾甚匹馬奔亡志懷反噬汝既來歸又令仗節董戎前驅豈謂汝狼心不改志欲覆敗國計以快汝心今宥汝以遠於是免官削爵徙臨海未至徙所追赦之復以朱異之言封臨賀王為丹楊尹坐所部多劫盜去職出為南兗州在任苛刻人不堪命從是黜廢轉增憤恨陰養死士儲米積貨幸國家有變景知之正德在北與徐思玉相知謂奔魏時也今天子年尊姦臣亂國以景觀之計日禍敗大王屬當儲二中被廢黜詳見一百四十九卷普通三年被皮義翻歸心大王景雖不敏實思自效願王允副蒼生鑒斯誠款正德大喜曰侯公之意暗與吾同天授我也報之曰朝廷之事如公所言僕之有心為日久矣今僕為其內公為其外何有不濟機事在速今其時矣鄱陽王範密啓景謀反時上以邊事專委朱異動靜皆關之異以為必無此理上報範曰景孤危寄命譬如嬰兒仰人乳哺仰牛向翻以此事勢安能反乎範重陳之曰不早翦撲禍及生民重直用翻撲普卜翻上曰朝廷自有處分不須汝深憂也此亦報範之言非面語之也處昌呂翻分扶問翻上不許範非景敵也使上許範而進兵討景肉投餒虎耳復扶又翻下不復同鄱陽王遂不許朝廷有一客自是範啓異不復為通使疏吏翻下同為于偽翻景邀羊鴉仁同反鴉仁執其使以聞羊鴉仁自懸瓠還頓軍淮上景數百叛虜何能為敕以使者付建康獄俄解遣之景益無所憚啓上曰若臣事是實應罹國憲如蒙照察請戮鴉仁考異曰梁書南史皆云並抑不奏典略朱異拒之云云今從太清紀高澄狡猾寧可全信陛下納其詭語求與連和臣亦竊所笑也臣寧堪粉骨投命讎門讎門謂高氏也受臣控督如其不許即帥甲騎臨江上向閩越非唯朝廷自恥亦是三公旰食帥讀曰率騎奇寄翻旰古按翻上使朱異宣語答景使曰譬如貧家畜十客五客尚能得意畜吁玉翻朕唯有一客致有忿言亦朕之失也益加賞賜錦綵錢布信使相望史言帝養成侯景之禍以敗國亡身戊戌景反於壽陽以誅中領軍朱異少府卿徐驎太子右衛率陸驗制局監周石珍為名驎離珍翻李延壽曰制局小司專典兵力雲陛天啓亙設蘭錡羽林精卒重屯廣衛至於元戎啓轍武候遮迾清道晨行按轡督察往來馳騖輦轂驅投分部親承几案領護所攝手總成規蕭子顯曰尚書外司領武官有制局監監內器仗兵役亦用寒人之被恩幸者率所律翻異等皆以姦佞驕貪蔽主弄權為時人所疾故景託以興兵驎驗吳郡人石珍丹楊人驎驗迭為少府丞以苛刻為務百賈怨之賈音古異尤與之昵昵尼質翻世人謂之三蠹司農卿傅岐梗直士也嘗謂異曰卿任參國鈞榮寵如此比日所聞比毗至翻鄙穢狼籍若使聖主發悟欲免得乎異曰外間謗黷知之久矣心苟無愧何恤人言岐謂人曰朱彥和將死矣朱異字彥和肆辨以拒諫聞難而不懼難乃旦翻知惡而不改天奪之鑒其能久乎景西攻馬頭景自渦陽之敗南走馬頭戍主劉神茂迎候之以入壽陽當塗之馬頭也今又自壽陽西攻馬頭則此馬頭在壽陽之西當淮津濟渡之要縛馬頭以登舟又非當塗之馬頭也當塗之馬頭郡在壽陽東考異曰梁書云執太守劉神茂按神茂素附於景無煩攻執今從太清紀典略木柵在荊山西璆音求又渠幽翻上聞之笑曰是何能為吾折箠笞之此即朱異謂景數百叛虜何能為之説也君驕昏而臣貪昧禍至不懼以自取敗亡折之舌翻封三千戶公除州刺史甲辰詔以合州刺史鄱陽王範為南道都督北徐州刺史封山侯正表為北道都督五代志封山縣屬合浦郡通直散騎常侍裴之高為東道都督以侍中開府儀同三司邵陵王綸持節董督衆軍以討景正表宏之子仲禮慶遠之孫之高邃之兄子也宏上之弟正表正德兄弟皆其子也柳慶遠裴邃皆天監名臣侯景聞臺軍討之九月東魏濮陽武公婁昭卒濮博木翻侯景聞臺軍討之侯景聞臺軍討之問策於王偉偉曰邵陵若至彼衆我寡必為所困不如棄淮南壽陽古淮南郡治所帥輕騎直掩建康帥讀曰率臨賀反其內大王攻其外天下不足定也兵貴拙速宜即進路景乃留外弟中軍大都督王顯貴守壽陽癸未詐稱遊獵出壽陽人不之覺冬十月庚寅景揚聲趣合肥而實襲譙州此譙州渦陽之譙州魏收志梁置譙州於新昌城領高塘臨徐南梁新昌郡其地當在唐廬和二州之間宋白曰梁大同三年割北徐州之新昌南譙州之北譙立為南譙州居桑根山西今滁州城是也考異曰太清紀云十三年陷譙城下又云十三日以王質巡江遏防典略上作庚戌下作庚子按此月戊子朔蓋三日庚寅也泰範之弟也先為中書舍人先悉薦翻傾財以事時要超授譙州刺史至州遍發民丁使擔腰輿扇繖等物腰輿者人舉之而行其高才至腰繖蘇旰翻又蘇旱翻蓋也恥為之者重加杖責多輸財者即縱免之由是人皆思亂及侯景至人無戰心故敗庚子詔遣寧遠將軍王質帥衆三千巡江防遏景攻歷陽太守莊鐵丁未鐵以城降降戶江翻因説景曰國家承平歲久人不習戰聞大王舉兵內外震駭宜乘此際速趨建康説式芮翻趨七喻翻可兵不血刃而成大功若使朝廷徐得為備內外小安遣羸兵千人直據采石羸倫為翻大王雖有精甲百萬不得濟矣景乃留儀同三司田英郭駱守歷陽以鐵為導引兵臨江江上鎮戍相次啓聞上問討景之策於都官尚書羊侃侃請以二千人急據采石令邵陵王襲取壽陽使景進不得前退失巢穴烏合之衆自然瓦解朱異曰景必無渡江之志遂寢其議侃曰今茲敗矣戊申以臨賀王正德為平北將軍都督京師諸軍事屯丹楊郡盧循之寇建康也徐赤特敗於張侯橋循兵大上至丹楊郡則丹楊郡治蓋近江渚詐稱載荻密以濟景艘蘇遭翻荻音狄景將濟慮王質為梗使諜視之會臨川大守陳昕啓稱采石急須重鎮王質水軍輕弱恐不能濟恐其不能濟國事也諜徒協翻昕許斤翻代質戍采石徵質知丹楊尹事昕慶之之子也陳慶之有入洛之功而昕猶未下渚諜告景云質已退未下渚者未下秦淮渚也諜徒協翻諜如言而返景大喜曰吾事辦矣己酉自橫江濟于采石有馬數百匹兵八千人是夕朝廷始命戒嚴景分兵襲姑孰執淮南太守文成侯寧晉成帝初於姑孰僑立淮南郡五代志丹楊郡當塗縣舊置淮南郡欲於下流邀景帥讀曰率其副董桃生家在江北與其徒先潰走子一收餘衆步還建康子一子四之兄也太子見事急戎服入見上入見賢遍翻稟受方略上曰此自汝事何更問為內外軍事悉以付汝考異曰太清紀云太宗見事急乃入面啓高祖曰請以軍事並以垂付願不勞聖心南史云帝曰此自汝事何更問為今從典略指授軍事物情惶駭莫有應募者朝廷猶不知臨賀王正德之情命正德屯朱雀門寧國公大臨屯新亭大府卿韋黯屯六門繕修宮城為受敵之備大臨大器之弟也大臨大器皆太子綱之子己酉景至慈湖建康大駭御街人更相劫掠更工衡翻不復通行復扶又翻赦東西冶尚方錢署及建康繫囚以揚州刺史宣城王大器都督城內諸軍事以羊侃為軍師將軍副之南浦侯推守東府劉禪建興八年立南浦縣屬巴東郡沈約曰吳立豐縣屬臨川郡晉武帝太康元年更名西豐韋黯與右衛將軍柳津等分守宮城諸門及朝堂朝直遙翻推秀之子安成王秀上弟也大臨之弟津仲禮之父也攝諸寺庫公藏錢聚之德陽堂以充軍實攝收也諸寺謂十二寺也藏徂浪翻天監六年改閲武堂為德陽堂在南闕前庚戌侯景至板橋張舜民曰出秦淮西南行循東岸行小夾中十里過板橋店實欲觀城中虛實上召問之思玉詐稱叛景請間陳事上將屏左右屏必郢翻舍人高善寶曰思玉從賊中來情偽難測安可使獨在殿上朱異侍坐曰徐思玉豈刺客邪思玉出景啓言異等弄權乞帶甲入朝除君側之惡異甚慚悚朝直遙翻景又請遣了事舍人出相領解了事猶言曉事也領總録也解分判也領解言總録景所欲言之事而分判是非也凡此皆侯景詭言以怠梁朝君臣使無戰心勞力到翻景北面受敕季曰今者之舉何名景曰欲為帝也王偉進曰朱異等亂政除姦臣耳景既出惡言遂留季獨遣寶亮還宮百姓聞景至競入城公私混亂無復次第復扶又翻羊侃區分防擬皆以宗室間之間古莧翻軍人爭入武庫自取器甲所司不能禁所司謂武庫令之屬方止是時梁興四十七年天監十八普通七大通二中大通六大同十一中大同一至是年太清二年通四十七年公卿在位及閭里士大夫罕見兵甲賊至猝迫公私駭震宿將已盡後進少年並出在外將即亮翻少詩照翻軍旅指撝一決於侃侃膽力俱壯太子深仗之仗除兩翻憑仗也辛亥景至朱雀桁南桁戶剛翻太子以臨賀王正德守宣陽門東宮學士新野庾信守朱雀門帥宮中文武三千餘人營桁北太子命信開大桁以挫其鋒正德曰百姓見開桁必大驚駭可且安物情太子從之俄而景至信帥衆開桁始除一舶帥讀曰率下同舶旁陌翻大舟曰舶見景軍皆著鐵面著陟略翻退隱于門信方食甘蔗甘蔗生於南方狀如紫竹圍數寸高丈餘以刀去皮切食其味甘冷解煩析酲楚辭所謂泰尊柘漿析朝酲司馬相如子虛賦所謂諸柘者也蔗之夜翻信手甘蔗應弦而落遂棄軍走南塘遊軍沈子睦臨賀王正德之黨也復閉桁渡景景至秦淮南岸子睦領遊軍在南塘庾信既走北岸無兵子睦因得閉桁以渡景兵中竹仲翻復扶又翻至領軍府遇賊未陳而走正德帥衆於張侯橋迎景馬上交揖既入宣陽門望闕而拜歔欷流涕隨景渡淮景軍皆著青袍正德軍並著絳袍碧裏陳讀曰陳歔音虛欷許既翻又音希著陟略翻既與景合悉反其袍景乘勝至闕下城中恟懼恟許拱翻羊侃詐稱得射書云邵陵王西昌侯援兵已至近路邵陵王綸兵時已渡江向鍾離西昌侯淵藻時鎮京口西豐公大春棄石頭奔京口謝禧元貞棄白下走津主彭文粲等以石頭城降景降戶江翻景遣其儀同三司于子悅守之壬子景列兵繞臺城幡旗皆黑射啓於城中曰射而亦翻朱異等蔑弄朝權輕作威福朝直遙翻臣為所陷欲加屠戮陛下若誅朱異等臣則斂轡北歸上問太子有是乎對曰然上將誅之太子曰賊以異等為名耳今日殺之無救於急適足貽笑將來俟賊平誅之未晚上乃止景繞城既匝匝作答翻周也百道俱攻鳴鼓吹脣喧聲震地縱火燒大司馬東西華諸門羊侃使鑿門上為竅竅苦弔翻空也穴也下水沃火太子自捧銀鞍往賞戰士直閣將軍朱思帥戰士數人踰城出外灑水久之方滅賊又以長柯斧斫東掖門門將開羊侃鑿扇為孔扇門扇也斫者乃退刺七亦翻景據公車府蕭子顯齊志公車令屬領軍以受天下章奏梁制公車令屬衛尉其署舍在臺城門外故景得據之府者署舍之通稱景黨宋子仙據東宮范桃棒據同泰寺棒部項翻景取東宮妓數百分給軍士妓渠綺翻女樂也東宮近城近臺城也射而亦翻下臨射亦射弓射同至夜景於東宮置酒奏樂太子遣人焚之臺殿及所聚圖書皆盡景又燒乘黃廣既士林館太府寺大同中於臺城西立士林館使朱異顧琛孔子袪等遞互講述乘繩證翻癸丑景作木驢數百攻城城上投石碎之景更作尖項木驢石不能破更工衡翻杜佑曰以木為脊長一丈徑一尺五寸下安六腳下闊而上尖高七尺內可容六人以濕牛皮蒙之人蔽其下舁直抵城下木石鐵火所不能敗用以攻城謂之木驢羊侃使作雉尾炬灌以膏蠟叢擲焚之俄盡杜佑曰燕尾炬縛葦草為之分為兩岐如燕尾狀以油蠟灌之加火從城墜下使人騎木驢而燒之侃之作雉尾炬也施鐵鏃以油灌之擲驢上焚之高十餘丈欲臨射城中高居傲翻射而亦翻侃曰車高塹虛彼來必倒可臥而觀之及車動果倒塹七豔翻景攻既不克士卒死傷多乃築長圍以絶內外又啓求誅朱異等城中亦射賞格出外曰射而亦翻下同有能送景首者授以景位並錢一億萬布絹各萬匹朱異張綰議出兵擊之問羊侃侃曰不可今出人若少少詩沼翻不足破賊徒挫鋭氣若多則一旦失利門隘橋小必大致失亡異等不從使千餘人出戰鋒未及交退走爭橋赴水死者大半侃子鷟為景所獲鷟士角翻執至城下以示侃侃曰我傾宗報主猶恨不足豈計一子幸早殺之數日復持來復扶又翻侃謂鷟曰久以汝為死矣猶在邪引弓射之景以其忠義亦不之殺莊鐵慮景不克託稱迎母與左右數十人趣歷陽趣七喻翻先遣書紿田英郭駱曰紿待多翻侯王已為臺軍所殺國家使我歸鎮駱等大懼棄城奔壽陽鐵入城不敢守奉其母奔尋陽十一月戊午朔刑白馬祀蚩尤於太極殿前應劭曰蚩尤亦古天子好五兵故祭之求福祥薛瓚曰蚩尤庶人之貪者非天子也管仲曰割廬山發而出水金從之蚩尤受之以作劍戟臨賀王正德即帝位於儀賢堂天監六年改聽訟堂為儀賢堂在南闕前普通以來姦邪亂政上久不豫社稷將危河南王景釋位來朝左傳王子朝曰諸侯釋位以間王政朝直遙翻紹茲寶位可大赦改元正平立其世子見理為皇太子以景為丞相妻以女妻七細翻並出家之寶貨悉助軍費於是景營於闕前分其兵二千人攻東府南浦侯推拒之三日不克景自往攻之矢石雨下宣城王防閣許伯衆潛引景衆登城宣城王大器太子之長子也許伯衆為其防閣在東府故得為景內應姚思廉梁書作許鬱華時為東府東北樓主辛酉克之殺南浦侯推及城中戰士三千人載其尸聚於杜姥宅遙語城中人曰語牛倨翻若不早降正當如此降戶江翻景聲言上已晏駕雖城中亦以為然壬戌太子請上巡城上幸大司馬門城上聞蹕聲皆鼓譟流涕衆心粗安粗坐五翻江子一之敗還也謂自采石下流敗還之時子一拜謝曰臣以身許國常恐不得其死今所部皆棄臣去臣以一夫安能擊賊若賊遂能至此臣誓當碎首以贖前罪不死闕前當死闕後乙章十二行本乙作癸乙十一行本同孔本同亥子一啓太子與弟尚書左丞子四東宮主帥子五帥所領百餘人開承明門出戰主帥所類翻五帥讀曰率子一直抵賊營賊伏兵不動未測其情故不動賊輩何不速出久之賊騎出夾攻之子一徑前引槊刺賊從者莫敢繼賊解其肩而死子四子五相謂曰與兄俱出何面獨旋皆免胄赴賊子四中矟洞胸而死呼火故翻刺七亦翻從才用翻中竹仲翻矟與槊同色角翻子五傷脰還至塹一慟而絶江子一兄弟駢肩以死於闕下而不足以衛社稷悲夫古人所以重折衝千里之外者也塹七豔翻景初至建康謂朝夕可拔號令嚴整士卒不敢侵暴及屢攻不克人心離沮景恐援兵四集一旦潰去又食石頭常平諸倉既盡軍中乏食乃縱士卒掠奪民米及金帛子女是後米一升至七八萬錢人相食餓死者什五六乙丑景於城東西起土山驅迫士民不限貴賤亂加毆捶疲羸者因殺以填山號哭動地毆烏口翻捶止蘂翻羸倫為翻號戶刀翻民不敢竄匿並出從之旬日間衆至數萬城中亦築土山以應之太子宣城王已下皆親負土執畚鍤畚布袞翻所以盛土鍤側洽翻所以鍬土於山上起芙蓉層樓高四丈飾以錦罽芙蓉層樓下施㭿栱層層疊出若芙蓉花然錦綵帛罽毳布也織毛為之高居傲翻罽音居例翻厚衣袍鎧謂之僧騰客衣於既翻下衣錦同分配二山二山謂東土山西土山也會大雨城內土山崩賊乘之垂入苦戰不能禁羊侃令多擲火為火城以斷其路斷音短徐於內築城賊不能進景募人奴降者悉免為良降戶江翻得朱異奴以為儀同三司異家資産悉與之奴乘良馬衣錦袍於城下仰詬異曰詬苦候翻汝五十年仕宦方得中領軍我始事侯王已為儀同矣於是三日之中㣥奴出就景者以千數景皆厚撫以配軍人人感恩為之致死凡為奴者皆㣥不逞也一旦免之為良固已踴躍況又資之以金帛安得不為賊致死乎士大夫承平之時虐用奴婢豈特誤其身誤其家亦以誤國事可不戒哉為于偽翻荊州刺史湘東王繹聞景圍臺城丙寅戒嚴移檄所督湘州刺史河東王譽雍州刺史嶽陽王察雍於用翻江州刺史當陽公大心郢州刺史南平王恪等發兵入援大心大器之弟恪偉之子也南平王偉上弟也朱異遺景書為陳禍福遺于季翻為于偽翻景報書並告城中士民以為梁自近歲以來權幸用事割剝齊民以供嗜欲如曰不然公等試觀今日國家池苑王公第宅僧尼寺塔及在位庶僚姬薑百室僕從數千不耕不織從才用翻錦衣玉食不奪百姓從何得之景書及此異等其何辭以對指誅權佞非傾社稷今城中指望四方入援吾觀王侯諸將志在全身誰能竭力致死與吾爭勝負哉將即亮翻長江天險二曹所歎事見魏文帝紀詩國風曰誰謂河廣一葦杭之注杭渡也箋云誰謂河水廣歟一葦加之則可以渡之喻狹也自非天人允協何能如是幸各三思自求元吉景又奉啓於東魏主稱臣進取壽春暫欲停憩而蕭衍識此運終自辭寶位臣軍未入其國已投同泰捨身去月二十九日去月謂前此月也江海未蘇干戈暫止永言故鄉人馬同戀尋當整轡以奉聖顏臣之母弟久謂屠滅近奉明敕始承猶在承猶奉也言奉近敕始知母弟尚在也大將軍恩念臣之弱劣知何仰報今輒齎啓迎臣母弟妻兒伏願聖慈特賜裁放景欲卑辭以迎其家高澄兄弟詎能墮其數中邪己巳湘東王繹遣司馬吳曄天門太守樊文皎等將兵發江陵陳昕為景所擒景與之極飲使昕收集部曲欲用之昕不可景使其儀同三司范桃棒囚之昕因説桃棒説式芮翻使帥所部襲殺王偉宋子仙詣城降桃棒從之潛遣昕夜縋入城帥讀曰率降戶江翻下同縋馳偽翻上大喜敕鐫銀券賜桃棒曰鐫子全翻刻也雕也事定之日封汝河南王即有景衆並給金帛女樂太子恐其詐猶豫不決上怒曰受降常理何忽致疑太子召公卿會議朱異傅岐曰桃棒降必非謬桃棒既降賊景必驚乘此擊之可大破也太子曰吾堅城自守以俟外援援兵既至賊豈足平此萬全策也今開門納桃棒桃棒之情何易可知易以豉翻萬一為變悔無所及社稷事重須更詳之異曰殿下若以社稷之急宜納桃棒如其猶豫非異所知太子終不能決桃棒又使昕啓曰今止將所領五百人若至城門皆自脫甲乞朝廷開門賜容事濟之後保擒侯景考異曰太清紀南史皆云桃棒求以甲士二千人來降以景首應購今從典略愈疑之朱異撫膺曰失此社稷事去矣太子綱固多疑少斷朱異拊膺於此時何其晚也景拉殺之拉盧合翻拉其幹而殺之陳昕不知如期而出景邀得之逼使射書城中曰射而亦翻桃棒且輕將數十人先入將即亮翻景欲衷甲隨之昕不肯期以必死乃殺之景使蕭見理與儀同三司盧暉略戍東府見理凶險夜與㣥盜剽劫於大桁中流矢而死剽匹妙翻中竹仲翻邵陵王綸行至鍾離聞侯景已渡采石綸晝夜兼道旋軍入援濟江中流風起人馬溺者什一二盧循之亂劉裕冒風濟江而風止侯景之亂綸濟江而風起豈天之欲亡梁邪是以善觀人之國者必觀之天人祐助之際也沈約志西豐縣屬臨川郡吳立帥讀曰率新塗或作新淦沈約志新淦縣漢屬豫章郡永安侯確安南侯駿是皆以古縣名為侯國吳分烏程餘杭立永安縣晉已改為武康晉武帝分江安立安南縣五代志無之武陵郡梁置武州上時掌翻大成大春之弟確綸之子駿懿之孫也景遣軍至江乘拒綸軍趙伯超曰若從黃城大路必與賊遇不如徑指鍾山鍾山即蔣山吳孫權立蔣子文廟於是山又以其祖諱鍾改名蔣山出賊不意城圍必解矣綸從之夜行失道迂二十餘里迂音于又音紆曲也遠也庚辰旦營于蔣山景見之大駭悉送所掠婦女珍貨於石頭具舟欲走分兵三道攻綸綸與戰破之時山巔寒雪乃引軍下愛敬寺帝事文皇帝獻皇后孝於鍾山造大愛敬寺以資福乙酉綸進軍玄武湖側考異曰太清紀云二十九日典略云壬午今從梁帝紀不戰陳讀曰陳至暮景更約明日會戰綸許之安南侯駿見景軍退以為走即與壯士逐之景旋軍擊之駿敗走趣綸軍趙伯超望見亦引兵走景乘勝追擊之諸軍皆潰綸收餘兵近千人近其靳翻入天保寺景追之縱火燒寺綸奔朱方丹徒春秋朱方之地時為蘭陵武進縣往往墮足景悉收綸輜重重直用翻生擒西豐公大春安前司馬莊丘慧主帥霍俊等而還帝置二百四十號將軍有安前將軍置長史司馬帥所類翻還從宣翻又如字考異曰典略作廣陵令崔俊南史作直閣將軍胡子約廣陵令霍雋今從太清紀丙戌景陳所獲綸軍首虜鎧仗及大春等於城下使言曰邵陵王已為亂兵所殺霍俊獨曰王小失利已全軍還京口城中但堅守援軍尋至賊以刀毆其背毆烏口翻俊辭色彌厲景義而釋之臨賀王正德殺之是日晚鄱陽王範遣其世子嗣與西豫州刺史裴之高建安太守趙鳳舉晉安帝分廬江郡立晉熙郡及懷寧縣梁置西豫州隋為同安郡唐為舒州五代志沔陽郡竟陵縣舊有京山縣齊置建安郡但其地在漢陽與舒州勢不相接壽陽義陽之間有建安戍蕭子顯齊志及五代志皆不言於此置郡五代志又云黃州麻城縣梁置建寧郡或者史以建寧為建安歟更考軍于蔡洲將即亮翻考異曰梁帝紀作張公洲今從太清紀以待上流諸軍範以之高督江右援軍事景悉驅南岸居民於水北此謂秦淮水也大街已西掃地俱盡北徐州刺史封山侯正表鎮鍾離隋志有封山縣屬合浦郡蓋梁置也正表託以船糧未集不進景以正表為南兗州刺史封南郡王正表乃於歐陽立柵以斷援軍斷音短水經注邗溝水上承歐陽引江入埭六十里至廣陵城以地望考之此歐陽在今真州界按江淮之間地名歐陽見於史者非一處裴邃移長孫稚欲營歐陽在壽春境上吳喜使蕭道成留軍歐陽在淮陰界帥衆一萬聲言入援實欲襲廣陵密書誘廣陵令劉詢使燒城為應誘音酉詢以告南兗州刺史南康王會理十二月會理使詢帥步騎千人夜襲正表大破之帥讀曰率騎奇寄翻下同正表走還鍾離詢收其兵糧歸就會理與之入援癸巳侍中都官尚書羊侃卒城中益懼侯景大造攻具陳於闕前大車高數丈一車二十輪丁酉復進攻城高居報翻復扶又翻以蝦蟇車運土填塹湘東王繹遣世子方等將步騎一萬入援建康將即亮翻下同庚子發公安繹又遣竟陵太守王僧辨將舟師萬人出自漢川載糧東下漢水徑竟陵郡入江考異曰太清紀云僧辨將精卒二萬今從梁書善騎射每戰親犯矢石以死節自任為人臣子固當以身許國然存其身者所以存國也兩陳相向勝負未分危機交急親犯矢石以帥厲將士可一用之耳豈可以為常哉方等以死節自任以親犯矢石為常此其所以敗死於湘川也若方等者謂之必死之將可也若論臣子大節則全其身以全國家斯得謂之忠孝矣壬寅侯景以火車焚臺城東南樓材官吳景有巧思思相吏翻於城內構地為樓火才滅新樓即立賊以為神景因火起潛遣人於其下穿城城將崩乃覺之詳觀上下文景因火起作賊因火起則於當時事勢文理為明順蓋侯景與吳景殽亂也讀者難以明辨迂憂俱翻迂曲也狀如卻月以擬之兼擲火焚其攻具賊乃退走太子遣洗馬元孟恭將千人自大司馬門出蕩孟恭與左右奔降於景己酉景土山稍逼城樓柳津命作地道以取其土外山崩壓賊且盡又於城內作飛橋懸罩二土山景衆見飛橋逈出崩騰而走城內擲雉尾炬焚其東山樓柵蕩盡賊積死於城下死於城下者豈真賊哉侯景驅民以攻城以其黨迫蹙於後攻城之人退則死於賊手進則死於矢石嗚呼積死於城下者得非梁之赤子乎自焚其攻具復扶又翻材官將軍宋嶷降於景嶷魚力翻降戶江翻教之引玄武湖水以灌臺城闕前皆為洪流上徵衡州刺史韋粲為散騎常侍吳孫亮太平二年分長沙東部都尉立湘東郡今之衡州按五代志梁置衡州於南海郡含洭縣湘東之衡州隋平陳始置粲放之子也韋放見一百五十一卷大通元年監工銜翻至廬陵聞侯景亂粲簡閲部下得精兵五千倍道赴援至豫章聞景已出橫江粲就內史劉孝儀謀之孝儀曰必如此當有敕豈可輕信人言妄相驚動或恐不然時孝儀置酒粲怒以杯抵地曰賊已渡江便逼宮闕水陸俱斷何暇有報假令無敕豈得自安韋粲今日何情飲酒即馳馬出部分將發分扶問翻會江州刺史當陽公大心遣使邀粲使疏吏翻粲乃馳往見大心曰上遊藩鎮江州去京最近按沈約志江州去京水行一千四百里但中流任重當須應接不可闕鎮今宜且張聲勢移鎮湓城張知亮翻遣偏將賜隨將即亮翻下在將同於事便足大心然之遣中兵柳昕帥兵二千人隨粲粲至南洲外弟司州刺史柳仲禮亦帥步騎萬餘人至橫江帥讀曰率粲即送糧仗贍給之並散私金帛以賞其戰士西豫州刺史裴之高自張公洲遣船渡仲禮考之粲傳張公洲蓋即蔡洲丙辰粲仲禮及宣猛將軍李孝欽考異曰梁帝紀作李遷仕今從太清紀五代志宣州南陵縣梁置南陵郡粲議推仲禮為大都督報下流衆軍下流衆軍張公洲之兵也恥居其下議纍日不決粲抗言於衆曰今者同赴國難難乃旦翻義在除賊所以推柳司州者正以久捍邊疆先為侯景所憚且士馬精鋭無出其前若論位次柳在粲下語其年齒亦少於粲直以社稷之計不得復論今日形勢貴在將和若人心不同大事去矣裴公朝之舊德豈應復挾私情以沮大計粲請為諸軍解之語牛倨翻少詩照翻復扶又翻沮在呂翻為于偽翻乃單舸至之高營切讓之曰舸古我翻今二宮危逼猾寇滔天臣子當戮力同心豈可自相矛楯韓非子有鬻矛楯者曰吾矛之利物無不陷也又曰吾楯之堅物莫能陷也或問之曰以子之矛陷子之楯可乎鬻者不能對後世矛楯之説祖此鋒鏑便有所歸言將攻之高也遂推仲禮為大都督宣城內史楊白華遣其子雄將郡兵繼至華讀曰花將即亮翻下同援軍大集衆十餘萬緣淮樹柵景亦於北岸樹柵以應之裴之高與弟之橫以舟師一萬屯張公洲景囚之高弟姪子孫臨水陳兵連鎖列於陳前以鼎鑊刀鋸隨其後謂曰裴公不降今即烹之於陳讀曰陳降戶江翻之高召善射者使射其子再發皆不中使射而亦翻中竹仲翻景帥步騎萬人於後渚挑戰據韋粲傳後渚在中興寺前挑徒了翻韋粲曰日晚我勞未可戰也仲禮乃堅壁不出景亦引退湘東王繹將鋭卒三萬發江陵留其子綏寧侯方諸居守守手又翻沈約志廣州南海郡有綏寧縣宋文帝立咨議參軍劉之迡等三上箋請留答教不許湘東王繹非有自將入援之志也陽為不許耳迡與遲同又音奴計翻鄱陽王範遣其將梅伯龍攻王顯貴於壽陽克其羅城攻中城不克而退範益其衆使復攻之復扶又翻侯景聞臺軍討之東魏大將軍澄患民錢濫惡議不禁民私鑄但懸稱市門稱尺證翻錢不重五銖毋得入市朝議以為年穀不登請俟他年乃止朝直遙翻侯景聞臺軍討之魏太師泰殺安定國臣王茂而非其罪泰封安定公故有國臣泰怒曰卿黨罪人亦當坐執慶於前慶辭色不撓撓奴教翻曰慶聞君蔽於事為不明臣知而不爭為不忠慶既竭忠不敢愛死但懼公為不明耳泰寤亟使赦茂不及乃賜茂家錢帛曰以旌吾過侯景聞臺軍討之丙辰晦柳仲禮夜入韋粲營部分衆軍分扶問翻旦日會戰諸將各有據守令粲頓青塘粲以青塘當石頭中路粲傳曰青塘迫近淮渚據陳霸先之言青塘即青溪塘也頗憚之仲禮曰青塘要地非兄不可若疑兵少當更遣軍相助乃使直閣將軍劉叔胤助之為下韋粲敗死張本少詩沼翻張政烺標點容肇祖聶崇岐覆校
