body:
  text: 資治通鑑卷第七十六翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事柱國河內郡開國侯食邑一千三百戶食實封二百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注魏紀八嘉平五年邵陵厲公下嘉平五年癸酉二五三嘉平五年春正月朔蜀大將軍費禕與諸將大會於漢壽郭偱在坐費父沸翻坐徂臥翻蜀先主改葭萌為漢壽禕歡飲沈醉偱當作修下同沈持林翻殺之刺七亦翻禕資性泛愛泛孚梵翻廣也言無所不愛也不疑於人越巂太守張嶷巂音髓嶷魚力翻嘗以書戒之曰昔岑彭率師來歙杖節咸見害於刺客岑彭來歙事見四十二卷漢光武建武十一年歙許及翻待信新附太過宜鑒前事少以為警少詩沼翻禕不從故及禍嘉平五年詔追封郭偱為長樂鄉侯樂音洛使其子襲爵嘉平五年王昶毌丘儉聞東軍敗時三道伐吳東關最在東故曰東軍昶丑兩翻朝議欲貶黜諸將朝直遙翻下同大將軍師曰我不聽公休諸葛誕字公休此我過也諸將何罪悉宥之師弟安東將軍昭時為監軍唯削昭爵而已監工銜翻以諸葛誕為鎮南將軍都督豫州毌丘儉為鎮東將軍都督揚州是歲雍州刺史陳泰求敕並州並力討胡雍於用翻師從之未集而新興鴈門二郡胡以遠役遂驚反雍州在並州西南而鴈門新興二郡並州北鄙也其道里相去遠漢末曹公集塞下荒地為新興郡宋白曰曹公立新興郡於樓煩郡唐為嵐州漢為汾陽縣地此我過也非陳雍州之責是以人皆愧悅司馬師承父懿之後大臣未附引咎責躬所以愧服天下之心而固其權耳盜亦有道況盜國乎習鑿齒論曰司馬大將軍引二敗以為己過二敗謂東關師敗及並州胡反也可謂智矣若乃諱敗推過推吐雷翻歸咎萬物常執其功而隱其喪喪息浪翻上下離心賢愚解體謬之甚矣嗚呼此賈相國之所以敗也苟統斯理以御國行失而名揚行下孟翻兵挫而戰勝雖百敗可也況於再乎嘉平五年光祿大夫張緝言於師曰恪雖克捷見誅不久師曰何故緝曰威震其主功蓋一國求不死得乎緝料恪雖中緝亦卒為師所殺師方專政忌才智而疾異己況以緝而耀明於師乎嘉平五年二月吳軍還自東興進封太傅恪陽都侯加荊揚州牧督中外諸軍事恪遂有輕敵之心復欲出軍復扶又翻諸大臣以為數出罷勞數所角翻罷讀曰疲同辭諫恪恪不聽中散大夫蔣延固爭漢制大夫議郎皆掌顧問應對無常事中散大夫秩六百石在諫議大夫上按中散大夫王莽所置後漢因之散悉亶翻因著論以諭衆曰凡敵國欲相吞即仇讎欲相除也有讎而長之長知兩翻左傳晉先軫曰墮軍實而長寇讎禍不在己則在後人不可不為遠慮也昔秦但得關西耳謂函谷關以西也今以魏比古之秦土地數倍以吳與蜀比古六國不能半也然今所以能敵之者但以操時兵衆於今適盡而後生者未及長大正是賊衰少未盛之時是時魏興三十餘年生聚教訓精兵良將分鎮方面諸葛蔣費陸遜朱然相繼凋謝吳蜀蓋小懦矣恪不能兢懼以保勝恃一戰之捷遽謂魏人為衰少未盛之時其輕敵甚矣長知兩翻少詩沼翻續自隕斃事見上卷嘉平三年雖有智計之士未得施用當今伐之是其厄會既以司馬師為幼弱又謂其未能用人茲可謂不善料敵者矣趨七喻翻誠謂今日若順衆人之情懷偷安之計以為長江之險可以傳世不論魏之終始而以今日遂輕其後此吾所以長歎息者也恪自謂其才足以辦魏不欲以賊遺後人吾不知其自視與叔父亮果何如也孔明纍出師以攻魏每言一州之地不足以與賊支久卒無成功齎志以沒恪無孔明之才而輕用其民不唯不足以強吳適足以滅其身滅其家而已欲務閒息此不知慮其大危而愛其小勤者也昔漢祖幸已自有三秦之地何不閉關守險以自娛樂空出攻楚身被創痍事見漢高帝紀樂音洛被皮義翻創初良翻蟣居豈翻將士厭困苦豈甘鋒刃而忘安寧哉慮於長久不得兩存者耳每鑒荊邯說公孫述以進取之圖事見四十二卷漢光武建武六年邯下甘翻說輸芮翻家叔父謂諸葛亮亮表見七十一卷明帝太和二年夙夜反側所慮如此故聊疏愚言以達一二章甲十一行本作二三乙十一行本同孔本同君子之末若一朝隕沒志畫不立貴令來世知我所憂可思於後耳衆人雖皆心以為不可然莫敢復難復扶又翻下同難乃旦翻丹陽太守聶友素與恪善以書諫恪曰大行皇帝本有遏東關之計吳主之喪未踰年故稱之為大行皇帝聶尼輒翻章甲十一行本行下有今公輔贊大業成先帝之志十一字乙十一行本同張校同退齊校同孔本同成字作承寇遠自送謂魏兵遠來而自送死也出身用命一旦有非常之功豈非宗廟神靈社稷之福邪聶友此言所以抑恪之盛氣者婉而當有古朋友切偲之義焉按抑也今乘此勢欲復大出復扶又翻天時未可而苟任盛意私心以為不安恪題論後為書答友曰即前所著以喻衆之論也足下雖有自然之理然未見大數謂勝負存亡之大數也可以開悟矣恪之所以待舊友者驕倨如此吳主權嫌其剛狠自用蓋已見之矣省悉景翻滕胤謂恪曰君受伊霍之託入安本朝朝直遙翻出摧強敵名聲振於海內天下莫不震動萬姓之心冀得蒙君而息今猥以勞役之後勞役謂內有山陵營作外有東關之師也民疲力屈遠主有備左傳秦大夫蹇叔諫穆公曰勞師以襲遠師勞力屈遠主備之無乃不可乎野略無獲是喪前勞而招後責也喪息浪翻不如按甲息師觀隙而動且兵者大事左傳曰國之大事在祀與戎事以衆濟衆苟不悅君獨安之胤之言可謂深切矣諸云不可皆不見計算懷居苟安者也而子復以為然復扶又翻下同吾何望乎夫以曹芳暗劣劣弱也私門謂司馬氏固有離心今吾因國家之資藉戰勝之威則何往而不克哉談何容易恪大發州郡二十萬衆復入寇復扶又翻以滕胤為都下督掌統留事嘉平五年夏四月大赦嘉平五年漢姜維自以練西方風俗姜維本天水冀人故自以為練西方風俗練習也欲誘諸羌胡以為羽翼誘音酉謂自隴以西可斷而有斷丁管翻每欲興軍大舉費禕常裁制不從與其兵不過萬人曰吾等不如丞相亦已遠矣丞相謂諸葛亮況吾等乎不如且保國治民謹守社稷治直之翻如其功業以俟能者無為希冀徼幸徼堅堯翻決成敗於一舉若不如志悔之無及及禕死維得行其志費禕死蜀諸臣皆出維下故不能裁制之圍狄道石營在董亭西南維蓋自武都出石營也狄道縣屬隴西郡為維以勞民亡蜀張本嘉平五年吳諸葛恪入寇淮南驅略民人諸將或謂恪曰今引軍深入疆埸之民必相率遠遁恐兵勞而功少埸音亦少詩沼翻不如止圍新城合肥新城也救必至至而圖之乃可大獲此即諸葛誕言於司馬師之計也見上卷上年五月還軍圍新城詔太尉司馬孚督軍二十萬往赴之大將軍師問於虞松曰今東西有事二方皆急謂吳攻淮南蜀攻隴西也若之何沮在呂翻松曰昔周亞夫堅壁昌邑而吳楚自敗事見十六卷漢景帝三年不可不察也今恪悉其鋭衆足以肆暴而坐守新城欲以致一戰耳致者猶古所謂致師也請戰不可師老衆疲勢將自走諸將之不徑進乃公之利也姜維有重兵而縣軍應恪縣讀曰懸投食我麥謂維軍後無轉餉投兵魏地擬其麥以為食耳且謂我並力於東西方必虛是以徑進今若使關中諸軍倍道急赴出其不意殆將走矣師曰善乃使郭淮陳泰悉關中之衆解狄道之圍敕毌丘儉按兵自守以新城委吳毌音無陳泰進至洛門即天水冀縣落門聚退還果如虞松所料揚州牙門將涿郡張特守新城吳人攻之連月城中兵合三千人疾病戰死者過半而恪起土山急攻城將陷不可護特乃謂吳人曰今我無心復戰也復扶又翻然魏法被攻過百日而救不至者雖降家不坐言雖身降而其家不坐罪也被皮義翻降戶江翻已九十餘日矣此城中本有四千餘人戰死者已過半城雖陷尚有半人不欲降我當還為相語條別善惡為于僞翻語牛倨翻別彼列翻明日早送名且以我印綬去為信乃投其印綬與之吳人聽其辭而不取印綬綬音受特乃投夜徹諸屋材柵補其缺為二重重直龍翻明日謂吳人曰我但有鬬死耳吳人大怒進攻之不能拔會大暑吳士疲勞飲水泄下流腫病者太半死傷塗地諸營吏日白病者多恪以為詐欲斬之自是莫敢言恪內惟失計惟思也忿形于色將軍朱異以軍事忤恪忤五故翻逆也恪立奪其兵斥還建業都尉蔡林數陳軍計數所角翻恪不能用策馬來奔諸將伺知吳兵已疲乃進救兵伺相吏翻秋七月恪引軍去士卒傷病流曳道路或頓仆坑壑流者放而不能自收也曳者羸困不能自扶相牽引而行顛仆顛頓而僵仆也壑溝也存亡哀痛大小嗟呼而恪晏然自若出住江渚一月渚水中洲也漢尋陽故縣地也在大江之北尋陽記曰尋陽春秋為吳之西境楚之東境本在大江之北今蘄州界古蘭城是也言召命相繼也舟行以舳艫不絶為相銜陸行以馬首尾相接為相銜由是衆庶失望怨讟興矣痛怨而謗曰讟讟徒木翻汝南太守鄧艾言於司馬師曰孫權已沒大臣未附吳名宗大族皆有部曲阻兵仗勢足以違命諸葛恪新秉國政而內無其主不念撫恤上下以立根基競於外事虛章甲十一行本虛作虐虐下空一格乙十一行本均同用其民悉國之衆頓於堅城死者萬數載禍而歸此恪獲罪之日也昔子胥吳起商鞅樂毅皆見任時君主沒猶敗伍子胥見任於吳王闔閭闔閭死夫差不能用其言而殺之吳起事見一卷周安王二十一年商鞅事見二卷顯王三十一年樂毅事見四卷赧王三十六年而不慮大患其亡可待也張緝鄧艾皆料諸葛恪必誅緝死而艾存者緝附李豐而艾為師用也然艾不死於師而死於昭者功名之際難居重以鍾會之搆間也八月吳軍還建業諸葛恪陳兵導從從才用翻歸入府館府館即府舍也厲聲謂曰卿等何敢數妄作詔怒其數作詔召之也數所角翻因病還家恪征行之後曹所奏署令長職司一更罷選曹選曹也罷選者罷而更選也長知兩翻多所罪責當進見者無不竦息治直之翻又改易宿衛用其親近復敕兵嚴欲向青徐凡此者皆恪所以速死復敕兵嚴者戒兵士使嚴裝也復扶又翻孫峻因民之多怨衆之所嫌構恪於吳主云欲為變冬十月孫峻與吳主謀置酒請恪恪將入之夜精爽擾動左傳鄭子産曰人生始化曰魄既生魄陽曰魂用物精多則魂魄強是以有精爽至於神明杜預曰爽明也擾動言不安也死期將至故然家數有妖怪數所角翻恪疑之旦日駐車宮門峻已伏兵於帷中恐恪不時入事泄乃自出見恪曰使君若尊體不安自可須後須待也欲以嘗知恪意嘗試也當自力入言當自力疾而入見吳主也今日張設非常張竹亮翻疑有他故恪以書示滕胤胤勸恪還恪曰兒輩何能為正恐因酒食中人耳中竹仲翻考異曰恪傳曰恪省張約等書而去未出路門逢太常滕胤恪曰卒腹痛不任入胤不知峻陰計謂恪曰君自行旋未見上今上置酒請君君已至門宜當力進恪躊躇而還孫盛以為不然今從吳曆恪入劍履上殿進謝還坐設酒恪疑未飲孫峻曰使君病未善平言病未良已也可取之恪意乃安別飲所齎酒數行吳主還內峻起如廁解長衣著短服著陟略翻出曰有詔收諸葛恪恪驚起拔劍未得而峻刀交下張約從旁斫峻裁傷左手峻應手斫約斷右臂斷丁管翻武衛之士皆趨上殿武衛之士武衛將軍領之所取者恪也今已死悉令復刃令內刃於鞘也恪二子竦建聞難難乃旦翻載其母欲來奔峻使人追殺之以葦席裹恪尸篾束腰投之石子岡恪傳曰建業南有長陵名石子岡葬者依焉按今高座寺後即石子岡寺在建康城南門外宋白曰石子岡在臺城南四十里蓋今建康城非臺城也施績時在江陵孫一時在夏口及其三子恪外甥都鄉侯張震常侍朱恩皆夷三族臨淮臧均表乞收葬恪曰震雷電激不崇一朝鄭康成曰崇終也言不終朝也希有極日然猶繼之以雲雨因以潤物是則天地之威不可經日浹辰浹即協翻周也辰十二辰也十二日辰一周曰浹辰帝王之怒不宜訖情盡意訖亦盡也音居乞翻臣以狂愚不知忌諱敢冒破滅之罪謂破家滅身之罪伏念故太傅諸葛恪罪積惡盈自致夷滅父子三首梟市積日梟堅堯翻觀者數萬詈聲成風國之大刑無所不震長老孩幼無不畢見長知兩翻人情之於品物品衆也庶也樂音洛見恪貴盛世莫與二身處台輔處昌呂翻中間歷年今之誅夷無異禽獸觀訖情反能不憯然僭七感翻痛也且已死之人與土壤同域鑿掘斫刺無所復加刺七亦翻復扶又翻下同願聖朝稽則乾坤稽考也法則也使其鄉邑若故吏民收以士伍之服秦漢之制奪官爵者為士伍禮記曰夫子制於中都四寸之棺五寸之椁鄭康成注云此庶人之制也按禮上大夫棺八寸椁六寸下大夫棺六寸椁四寸無三寸棺制也孟子曰中古棺七寸椁稱之墨子尚儉桐棺三寸左傳趙簡子曰桐棺三寸不設屬辟下卿之罰也韓信獲收斂之恩斯則漢高發神明之譽也葬項籍事見十一卷漢高帝五年斂韓信事今史無所考史云帝聞信死且喜且憐之是必收斂之也施式智翻斂力贍翻上古送死棄之中野後世聖人易之以棺椁此所謂三皇之仁也使國澤加於辜戮之骸復受不已之恩於以揚聲遐方沮勸天下豈不大哉沮在呂翻昔欒布矯命彭越事見十二卷漢高帝十一年不先請主上而專名以肆情其得不誅實為幸耳今臣不敢章宣愚情以露天恩謹伏手書冒昧陳聞古之人臣進言於君率曰冒死曰昧死謂人君之威難犯冒昧其死罪而言也於是吳主及孫峻聽恪故吏斂葬斂力贍翻初恪少有盛名少詩照翻大帝深器重之而恪父瑾常以為戚曰非保家之主也戚憂也瑾渠吝翻敗補邁翻陸遜嘗謂恪曰在我前者吾必奉之同升在我下者則扶接之今觀君氣陵其上意蔑乎下蔑者視之若無漢侍中諸葛瞻亮之子也恪再攻淮南越巂太守張嶷與瞻書曰東主初崩吳在蜀東故謂其君為東主巂音髓嶷魚力翻帝謂吳主亮諸葛恪為吳太傅故稱之易以豉翻親有周公之才猶有管蔡流言之變謂周公之才而有叔父之親且不能免於管蔡之流言亦有燕蓋上官逆亂之謀事見二十三卷漢昭帝元鳳元年難乃旦翻昔每聞東主殺生賞罰不任下人又今以垂沒之命卒召太傅屬以後事卒讀曰猝屬之欲翻誠實可慮加吳楚剽急乃昔所記周亞夫曰吳楚剽輕太史公曰楚俗剽輕易發怒自漢以來皆有是言剽匹妙翻離力智翻少詩照翻履敵庭恐非良計長算也雖云東家綱紀肅然上下輯睦東家亦謂吳立國於東也非明者之慮也取古則今今則古也則子德翻則刌剫也樣也言取古事以刌剫今之事今猶古也自非郎君進忠言於太傅自漢以來門生故吏率稱恩門子弟為郎君復扶又翻旋軍廣農務行德惠數年之中東西並舉實為不晚願深採察恪果以此敗吳㣥臣共議上奏推孫峻為太尉滕胤為司徒上時掌翻有媚峻者言曰萬機宜在公族若承嗣為亞公滕胤字承嗣司徒位亞太尉故曰亞公衆心所附不可量也量音良乃表峻為丞相大將軍督中外諸軍事又不置御史大夫由是士人失望漢承秦制置御史大夫以副丞相理衆事今峻為丞相而不置御史大夫則專吳國之政故國人失望胤以此辭位孫峻曰鯀禹罪不相及舜之罪也殛鯀其舉也興禹峻與胤雖內不沾洽言其情不浹洽也進胤爵高密侯共事如前齊王奮聞諸葛恪誅下住蕪湖欲至建業觀變傅相謝慈等諫奮殺之坐廢為庶人徙章安章安前漢冶縣也故閩越地光武更名章安屬會稽郡沈約宋志曰臨海太守本會稽東部都尉前漢治鄞後漢分會稽為吳郡疑是都尉徙治章安也晉太康記曰章安本鄞縣南之回浦鄉余謂太康志所云即吳臨海郡之章安縣地今台州黃巖縣章安鎮是也奮徙章安即臨海之章安也南陽王和張氏諸葛恪之甥也先是恪有遷都之意先悉薦翻使治武昌宮治直之翻民間或言恪欲迎和立之及恪被誅丞相峻因此奪和璽綬南陽王璽綬也璽斯氏翻綬音受又遣使者追賜死初和妾何氏生子晧諸姬子德謙俊和將死與張別曰吉凶當相隨終不獨生亦自殺何姬曰若皆從死誰當字孤從才用翻說文曰字乳也愛也遂撫育晧及其三弟皆賴以獲全為後吳人立晧張本高貴鄉公上諱髦字彥士文帝孫東海定王霖子也正始五年封高貴鄉公高貴鄉屬郯縣正元元年甲戌二五四是年嘉平六年也冬十月高貴鄉公方改元正元通鑑以是年繫之高貴鄉公因書正元元年嘉平五年春二月殺中書令李豐初豐年十七八已有清名海內翕然稱之其父太僕恢不願其然敕使閉門斷客斷讀曰短曹爽專政司馬懿稱疾不出事見上卷邵陵厲公正始八年九年依違二公間故不與爽同誅豐子韜以選尚齊長公主帝之姊妹曰長公主齊主蓋明帝女長知兩翻以豐為中書令是時太常夏侯玄有天下重名以曹爽親章甲十一行本親下有故字乙十一行本同孔本同張校同不得在勢任居常怏怏邵陵厲公嘉平元年玄自關右召詣京師勢任權勢之任也怏於兩翻緝自東莞召見上卷嘉平四年師雖擢用豐豐私心常在玄豐在中書二歲帝數召豐與語數所角翻不知所說師知其議己請豐相見以詰豐詰去吉翻豐不以實告師怒以刀鐶築殺之鐶戶關翻刀把上有鐶築搗也送尸付廷尉遂收豐子韜及夏侯玄張緝等皆下廷尉下遐稼翻下及下同鍾育按治云豐與黃門監蘇鑠永寧署令樂敦漢有黃門令宦者為之黃門監蓋魏置也永寧宮魏太后宮名永寧署令太后宮官也亦宦者為之治直之翻宀兒漢制中宮宀兒從僕射宦者為之主黃門宀兒從秩六百石沈約志曰漢東京有中黃門宀兒從僕射魏世因其名而置宀兒從僕射宀兒而隴翻散也諸營兵皆屯門屯宮城門也檐宇之末曰軒促御坐前臨殿陛曰臨軒將㣥僚人兵就誅大將軍下將即亮翻陛下儻不從人便當劫將去耳又云謀以玄為大將軍緝為車章甲十一行本車作驃乙十一行本同張校同孔本作票騎將軍玄輯章甲十一行本輯作緝乙十一行本同皆知其謀此上皆獄辭也庚戌誅韜玄緝鑠敦賢皆夷三族夏侯霸之入蜀也見上卷嘉平四年玄不從及司馬懿薨中領軍高陽許允謂玄曰無復憂矣復扶又翻玄歎曰士宗卿何不見事乎許允字士宗不見事猶今人言不曉事也少詩照翻子元子上不吾容也司馬師字子元司馬昭字子上玄不肯下辭鍾育自臨治之治直之翻玄正色責育曰吾當何罪卿為令史責人也自漢以來公府有令史廷尉則有獄史耳玄蓋責育以身為九卿乃承公府指自臨治我是為公府令史而責人也為于僞翻下同育以玄名士節高不可屈而獄當竟竟結竟也令與事相附為作獄辭使與所按之事相附合也玄視頷之而已及就東市顏色不變舉動自若李豐弟翼為兗州刺史司馬師遣使收之翼妻荀氏謂翼曰中書事發可及詔書未至赴吳何為坐取死亡左右可同赴水火者為誰赴水火者入必焦沒自非誓同生死安肯相從故以為言妻曰君在大州不知可與同死生者雖去亦不免翼曰二兒小吾不去今但從坐身死耳謂從兄坐罪止一身若奔吳不達禍及妻子也乃止死初李恢與尚書僕射杜畿及東安太守郭智善東安縣前漢屬城陽國後漢屬琅邪國魏分為郡沈約曰晉惠帝分東莞為東安郡蓋魏既分而又省併既省併而晉又分屬東莞又自東莞分為郡也有內實而無外觀州里弗稱也沖嘗與李豐俱見畿既退畿歎曰孝懿無子非徒無子殆將無家君謀為不死也其子足繼其業李恢字孝懿郭智字君謀及豐死沖為代郡太守卒繼父業卒子恤翻正始中夏侯玄何晏鄧揚俱有盛名欲交尚書郎傅嘏嘏不受嘏友人荀粲怪而問之嘏曰太初志大其量能合虛聲而無實才夏侯玄字太初好辨而無誠所謂利口覆邦國之人也論語孔子曰惡利口之覆邦家者何晏字平叔好呼到翻外要名利內無關鑰貴同惡異多言而妬前多言多釁妬前無親鄧揚字玄茂妬前者忌前也人忌勝己則無親之者要一遙翻惡烏路翻皆將敗家遠之猶恐禍及敗補邁翻遠于願翻況昵之乎昵尼質翻近也比也嘏又與李豐不善謂同志曰豐飾僞而多疑矜小智而昧於權利若任機事其死必矣嘉平五年辛亥大赦嘉平五年三月廢皇后張氏曹操殺漢后伏氏而司馬師殺魏后張氏此不惟天道亦操之有以教之也四月立皇后王氏奉車都尉夔之之女也嘉平五年狄道長李簡密書請降於漢長知兩翻降戶江翻六月姜維寇隴西嘉平五年中領軍許允素與李豐夏侯玄善秋允為鎮北將軍假節都督河北諸軍事晉有假節都督者與四征鎮加大將軍不開府為都督者同四征鎮安平加大將軍不開府持節都督者品秩第二詔會㣥臣帝特引允以自近近其靳翻允當與帝別涕泣歔欷君臣不密遂並蹈失臣失身之禍歔音虛欷音希又許既翻有司奏允前放散官物收付廷尉徙樂浪樂浪音洛琅未至道死嘉平五年吳孫峻驕矜淫暴國人側目司馬桓慮謀殺峻立太子登之子吳侯英不克皆死嘉平五年帝以李豐之死意殊不平安東將軍司馬昭鎮許昌詔召之使擊姜維九月昭領兵入見帝幸平樂觀以臨軍過見賢遍翻樂音洛觀古玩翻左右勸帝因昭辭殺之勒兵以退大將軍已書詔於前帝懼不敢發昭引兵入城大將軍師乃謀廢帝平樂觀在洛陽城西昭已過軍復引入城帝事去矣甲戌師以皇太后令召㣥臣會議矯太后令以召㣥臣褻近倡優倡齒良翻倡優女樂也近其靳翻不可以承天緒㣥臣皆莫敢違乃奏收帝璽綬歸藩于齊璽斯氏翻綬音受使郭芝入白太后太后方與帝對坐芝謂帝曰大將軍欲廢陛下立彭城王據彭城王據文帝子此何等語芝太后之從父也故使之入脅太后太后不悅芝曰太后有子不能教今大將軍意已成又勒兵于外以備非常但當順旨將復何言復扶又翻太后曰我欲見大將軍口有所說芝曰何可見邪但當速取璽綬王莽篡漢遣王舜求璽於元后其辭氣何至如此折屈也音之列翻乃遣傍侍御取璽綬著坐側太后侍御非止一人傍侍御謂當時侍御之在傍側者著直略翻坐徂臥翻師甚喜王莽司馬師蕭鸞同是心也國之姦賊必有羽翼有天下者其戒之哉出就西宮帝與太后垂涕而別人章甲十一行本人作遂乙十一行本同孔本同熊校同乘王車從太極殿南出王車諸王所乘青蓋車也司馬孚悲不自勝勝音升餘多流涕廢帝時年二十一師又使使者請璽綬於太后太后曰彭城王我之季叔也今來立我當何之之往也高貴鄉公文章甲十一行本文下有皇字乙十一行本同帝之長孫明皇帝之弟子太后謂明帝絶嗣蓋謂以據為後則兄死弟及又禮兄弟不得相入廟也文帝黃初三年初制封王之庶子為鄉公嗣王之庶子為侯公侯之庶子為亭伯小宗有後大宗之義其詳議之世嫡為大宗支子之子各宗其父為小宗禮王后無嗣擇建支子以繼大宗丁丑師更召㣥臣以太后令示之乃定迎高貴鄉公髦於元城定迎者議始定而迎之也元城縣漢屬魏郡魏屬陽平郡時魏王公皆録置鄴故出髦而就元城迎之東海定王霖之子也時年十四使太常王肅持節迎之師又使請璽綬太后曰我見高貴鄉公小時識之太后欲立高貴鄉公必見其小時意氣異於諸王子故欲立之豈知祿去帝室而終無益乎冬十月癸章甲十一行本癸作己乙十一行本同張校同云無注本作癸誤丑高貴鄉公至玄武館酈道元曰魏氏立玄武館於芒垂蓋館在芒山之尾其地直洛城北玄武館之前殿也避止西廂㣥臣又請以法駕迎公不聽庚寅公入于洛陽㣥臣迎拜西掖門南公下輿答拜儐者請曰儀不拜儐必刃翻贊導者也儀不拜者謂於儀不當答拜也公曰吾人臣也遂答拜至止車門下輿左右曰舊乘輿入公曰吾被皇太后徵未知所為言唯天子可乘輿入止車門吾方被徵未知何如不可以天子自居也以余觀高貴鄉公蓋小慧而知書故能為此若以為習於禮則余以為猶魯昭公也被皮義翻見太后其日即皇帝位於太極前殿百僚陪位者皆欣欣焉謂公之足與有為也而卒死於權臣之手嗚呼余觀漢文帝入立之後夜拜宋昌為衛將軍領南北軍張武為郎中令行殿中周勃陳平朱虛東牟雖有大功其權去矣夫然後能自固魏朝百官皆欣欣者果何所見邪改元自此方是正元元年為于僞翻嘉平五年漢姜維自狄道進拔河間臨洮河間當作河關河關縣前漢屬金城郡後漢屬隴西郡以地里考之河關臨洮在狄道西姜維自狄道西拔河關臨洮意欲收魏之邊縣以自廣耳殺其蕩寇將軍張嶷沈約志四十號將軍蕩寇第二十二嶷魚力翻嘉平五年初揚州刺史文欽驍果絶人曹爽以其鄉里故愛之欽爽邑人也驍堅堯翻多所陵傲及爽誅章甲十一行本誅下有欽已內懼四字乙十一行本同孔本同張校同退齊校同爽誅見上卷嘉平元年又好增虜級以邀功賞好呼到翻司馬師常抑之由是怨望鎮東將軍丘儉素與夏侯玄李豐善玄等死儉亦不自安乃以計厚待欽儉子治書侍御史甸謂儉曰大人居方嶽重任古者天子巡狩四方其方之諸侯各會朝于方嶽之下堯舜有四嶽之官孔安國曰堯命羲和四子分掌四方之諸侯故曰四嶽魏晉之時征鎮安平總督諸軍任專方面時因謂之方嶽重任將受四海之責矣儉然之二年二年春正月儉欽矯太后詔起兵於壽春移檄州郡以討司馬師乃表言相國懿忠正有大勳於社稷宜宥及後世請廢師以侯就第以弟昭代之太尉孚忠孝小心護軍望忠公親事皆宜親寵授以要任望孚之子也儉又遣使邀鎮南將軍諸葛誕誕斬其使時誕都督豫州西至項儉堅守使欽在外為游兵司馬師問計於河南尹王肅肅曰昔關羽虜于禁於漢濱有北向爭天下之志後孫權襲取其將士家屬羽士衆一旦瓦解事見六十八卷漢獻帝建安二十四年魏制諸將出征及鎮守方面皆留質任時淮南將士皆自內州出戍故家屬皆留內禦儉欽之衆使不得進又衛其家屬必有關羽土崩之勢矣時師新割目瘤創甚瘤音留疣也肉起疾腫曰瘤創初良翻或以為大將軍不宜自行不如遣太尉孚拒之唯王肅與尚書傅嘏中書侍郎鍾會魏初中書既置監令又置通事郎次黃門郎黃門郎已署事過通事郎乃署名已署奏以入為帝省讀書可後改曰中書侍郎勸師自行師疑未決嘏曰淮楚兵徑壽春故楚都時為淮南重鎮以南備吳徑兵聚焉其鋒未易當也易以豉翻若諸將戰有利鈍大勢一失則公事敗矣師蹶然起曰我請輿疾而東蹶然急遽而起之貌蹶音厥又音姑衛翻戊午師率中外諸軍以討儉欽中謂中軍外謂城外諸營兵留鎮洛陽召三方兵會于陳許三方東西北也師問計於光祿勳鄭袤袤莫候翻袤曰毌兵儉好謀而不達事情好呼到翻文欽勇而無算今大軍出其不意江淮之卒鋭而不能固宜深溝高壘以挫其氣此亞夫之長策也漢周亞夫堅壁以破吳楚師以荊州刺史王基為行監軍假節統許昌軍魏晉之制使持節都督諸軍為上假節都督次之假節監諸軍又次之假節行監軍又次之魏受漢禪以許昌為別宮屯重兵以為東南二方根本監古銜翻淮南之逆非吏民思亂也儉等誑誘迫脅畏目下之戮是以尚屯聚耳誑居況翻誘音酉若大兵一臨必土崩瓦解儉欽之首不終朝而致於軍門矣師從之以基為前軍既而復敕基停駐復扶又翻基以為儉等舉軍足以深入而久不進者是其詐僞已露衆心疑沮也沮在呂翻今不張示威形以副民望而停軍高壘有似畏懦非用兵之勢也若儉欽虜略民人以自益又州郡兵家為賊所得者更懷離心言州郡兵其家有為賊所得者必懷反顧而有離散之心也自顧罪重不敢復還此為錯兵無用之地錯倉故翻置也停軍不進是置之於無用之地而成姦宄之源吳寇因之則淮南非國家之有譙沛汝豫危而不安豫即潁川也豫州時治潁川故曰譙沛汝豫四郡皆屬豫州軍宜速進據南頓南頓縣屬汝南郡故頓子國應劭曰頓迫於陳其後南徙故號南頓計足軍人四十日糧保堅城因積穀先人有奪人之心左傳楚令尹孫叔敖之言也杜預注曰奪敵戰心先悉薦翻基屢請乃聽進據㶏水水經注汝水東南過定陵縣又東南徑奇雒城枝分別出世謂之大㶏水㶏水東流至南頓縣北入于潁師古曰㶏於謹翻又音殷閏月甲申師次于㶏橋儉將史招李續相次來降王基復言於師曰復扶又翻兵聞拙速未覩為巧之久也孫子之言內有叛臣若不時決則事之深淺未可測也言儉欽之變若不以時定恐吳寇乘之而來則禍之深淺有未可測者將軍持重是也停軍不進非也持重非不行之謂也進而不可犯耳今保壁壘以積實資虜而遠運軍糧甚非計也師猶未許基曰將在軍君令有所不受孫子及司馬穰苴皆有是言我得亦利是謂爭地孫子之言所謂九地爭地其一也遂輒進據南頓儉等從項亦欲往爭發十餘里發兵而行十餘里乃復還保項二年癸未征西將軍郭淮卒以雍州刺史陳泰代之雍於用翻二年吳丞相峻率驃騎將軍呂據左將軍會稽留贊襲壽春驃匹妙翻會工外翻司馬師命諸軍皆深壁高壘以待東軍之集東軍青徐兗之軍也師曰諸軍張軍作君知其一未知其二諸軍當作諸君儉欽說誘與之舉事說輸芮翻謂遠近必應而事起之日淮北不從淮北謂豫兗也內乖外叛自知必敗困獸思鬬左傳吳夫概王曰困獸猶鬬雖云必克傷人亦多且儉等欺誑將士詭變萬端小與持久詐情自露此不戰而克之術也乃遣諸葛誕督豫州諸軍自安風向壽春安風縣前漢屬六安國後漢併屬廬江郡魏分安風等五縣置安豐郡屬豫州宋謂梁國之地梁國都睢陽故宋都也師屯汝陽汝陽縣屬汝南郡在汝水之北退恐壽春見襲計窮不知所為淮南將士家皆在北衆心沮散降者相屬果如王肅之計屬之欲翻儉之初起遣健步齎書至兗州健步能疾走者今謂之急腳子又謂之快行子將兵萬餘人兼道前進先趨樂嘉城水經注潁水過汝陽縣北又東南過南頓縣㶏水注之又南徑博陽故城東城在南頓縣北四十里漢宣帝封丙吉為侯國王莽更名樂嘉趨七喻翻儉使文欽將兵襲之師自汝陽潛兵就艾於樂嘉欽猝見大軍驚愕未知所為欽子鴦年十八勇力絶人謂欽曰及其未定擊之可破也於是分為二隊夜夾攻軍鴦帥壯士先至鼓譟帥讀曰率軍中震擾師驚駭所病目突出恐衆知之囓被皆破齧被以忍疼齧魚結翻會明鴦見兵盛乃引還還從宣翻又如字師與諸將曰賊走矣可追之諸將曰欽父子驍猛未有所屈何苦而走師曰夫一鼓作氣再而衰左傳魯曹劌之言其勢已屈不走何待欽將引而東鴦曰不先折其勢不得去也乃與驍騎十餘摧鋒陷陳陳讀曰陳所向皆披靡披普彼翻遂引去師使左長史司馬班率驍騎八千翼而追之魏公府及諸大將軍位從公者各置長史一人惟大將軍府及司徒府加置左右長史各一人翼者張左右翼而追之輒殺傷百餘人乃出如此者六七追騎莫敢逼殿中人尹大目小為曹氏家奴常在天子左右大目時為殿中校尉將讀如鳳將雛雞冠距鳴將之將音如字大目知師一目已出啓云文欽本是明公腹心但為人所誤耳又天子鄉里文欽譙人故曰天子鄉里乞為公追解語之謂追欽而為師自解釋言之也為于僞翻語牛倨翻復還也反也好善也謂還復相善也好讀如字大目單身乘大馬被鎧胄被皮義翻追欽遙相與語大目心實欲為曹氏為于僞翻謬言君侯何苦不可復忍數日中也蓋謂文欽何不堅忍數日與師相持師病已篤必當有變也復扶又翻解胡買翻喻也曉也欽殊不悟乃更厲聲罵大目曰汝先帝家人不念報恩反與司馬師作逆不顧上天天不祐汝張弓傅矢欲射大目傅讀曰附射而亦翻大目涕泣曰世事敗矣善自努力是日毌丘儉聞欽退恐懼夜走衆遂大潰欽還至項以孤軍無繼不能自立欲還壽春壽春已潰遂奔吳吳孫峻至東興聞儉等敗壬寅進至橐皋春秋會吳于橐皋杜預曰在九江逡遒縣東南今其地在巢縣界亦謂之柘皋橐音託又讀為柘降戶江翻毌丘儉走北至慎縣慎縣漢屬汝南郡魏分屬汝陰郡賢曰慎縣故城在今潁州潁上縣西北余按儉自項走至慎慎在項南非北也北乃比字之誤比必寐翻儉藏水邊草中甲辰安風津民張屬就殺儉水經注淮水東過安豐縣東北又東為安豐津水南有城故安豐都尉治後立霍丘戍杜佑曰安風津在壽州霍丘城北封屬為侯諸葛誕至壽春壽春城中十餘萬口懼誅或流迸山澤或散走入吳迸北孟翻詔以誕為鎮東大將軍儀同三司都督揚州諸軍事夷毌丘儉三族儉黨七百餘人繫獄侍御史杜友治之治直之翻惟誅首事者十餘人餘皆奏免之儉孫女適劉氏當死以孕繫廷尉司隸主簿程咸議曰魏晉之制列卿各置丞功曹主簿五官等員女適人者若已産育則成他家之母於防不足以懲姦亂之源防謂禁防也男不遇罪於他族而女獨嬰戮於二門嬰當也二門謂父母之家及夫家也女陰類稟氣柔弱在室從父母既嫁從夫故曰女弱分扶問翻臣以為在室之女可從父母之刑既醮之婦使從夫家之戮毛晃曰醮冠娶祭名酌而無酬酢曰醮禮記曰醮於客位冠禮也父親醮子而命之迎婚禮也晉志曰古者昏冠皆有醮鄭氏醮文三首具存醮子肖翻仍著於律令二年舞陽忠武侯司馬師疾篤還許昌留中郎將參軍事賈充監諸軍事充逵之子也賈逵事武帝文帝監古銜翻魏制衛將軍班車騎將軍下位從公省悉景翻辛亥師卒于許昌卒子恤翻中書侍郎鍾會從師典知密事中詔敕尚書傅嘏詔自中出上意也是時詔命皆以司馬氏之意行之此詔出於禁中之意故曰中詔權留衛將軍昭屯許昌為內外之援令嘏率諸軍還會與嘏謀使嘏表上上時掌翻輒與昭俱發還到洛水南屯住二月丁巳詔以司馬昭為大將軍録尚書事會由是常有自矜之色嘏戒之曰子志大其量而勳業難為也可不慎哉為後鍾會作亂張本二年吳孫峻聞諸葛誕已據壽春乃引兵還以文欽為都護鎮北大將軍幽州牧漢置都護於西域於西域稱都護將軍然未嘗以為將軍號至光武遂有都護將軍之官三國位從公晉制在撫軍下鎮軍上吳置左右都護亦不以為將軍號今以欽為都護蓋又在左右都護之上矣二年三月立皇后卞氏大赦后武宣皇后弟秉之曾孫女也二年秋七月吳將軍孫儀張怡林恂謀殺孫峻不克死者數十人全公主譖朱公主於峻曰與儀同謀峻遂殺朱公主朱公主吳主權之女適朱據者也峻使衛尉馮朝城廣陵魏之廣陵郡治淮陰漢之廣陵故城廢棄不治舉朝莫敢言唯滕胤諫止之峻不從功卒不成卒子恤翻二年漢姜維復議出軍復扶又翻下同征西大將軍張翼廷爭爭讀曰諍以為國小民勞不宜黷武維不聽率車騎將軍夏侯霸及翼同進八月維將數萬人至枹罕枹罕縣前漢屬金城郡後漢屬隴西郡魏時廢省枹音膚趨七喻翻征西將軍陳泰敕雍州刺史王經進屯狄道須泰軍到東西合勢乃進泰軍陳倉經所統諸軍於故關與漢人戰不利故關謂漢時故邊關也在洮水西泰以經不堅據狄道必有他變率諸軍以繼之經已與維戰於洮西大敗洮士刀翻以萬餘人還保狄道城餘皆奔散死者萬計張翼請維曰可以止矣不宜復進或毀此大功為蛇畫足戰國策曰昭陽為楚伐魏覆軍殺將移師攻齊陳軫為齊王使見昭陽曰楚有祠者賜其舍人酒一卮舍人相謂曰數人飲之不足一人飲之有餘請各畫地為蛇先成者飲酒一人先成引酒飲之乃左手持卮右手畫蛇曰吾能為之足為足未成一人之蛇後成奪其卮曰蛇固無足子安能為之足遂飲酒今君攻魏既勝復移移師攻齊是為蛇足者也昭陽悟乃還軍遂進圍狄道辛未詔長水校尉鄧艾行安西將軍與陳泰並力拒維晉志曰四安起於魏初在四鎮之下戊辰復以太尉孚為後繼泰進軍隴西諸將皆曰王經新敗賊衆大盛將軍以烏合之衆繼敗軍之後當乘勝之鋒殆必不可古人有言蝮蛇螫手壯士解腕漢書田榮傳曰蝮蠚手則斬手蠚足則斬足應劭曰蝮一名虺螫人手足則割去其肉不然則死師古曰爾雅及說文皆以為蝮即虺也博三寸首大如擘而郭璞云各自一種蛇其蝮蛇細頸大頭焦尾色如綬文文間有毛如者鬣鼻上有針大者長七八尺一名反鼻非虺之類也今以俗名證之郭說得矣虺若土色所在有之蝮蛇唯出南方蝮芳六翻螫式亦翻腕烏貫翻陸佃埤雅蝮蛇怒時毒在頭尾螫手則手斷螫足則足斷蛇之尤毒烈者也地有所不守蓋小有所失而大有所全故也不如據險自保觀釁待敝然後進救此計之得者也泰曰姜維提輕兵深入正欲與我爭鋒原野求一戰之利王經當高壁深壘挫其鋭氣今乃與戰使賊得計經既破走維若以戰克之威進兵東向據櫟陽積穀之實櫟陽縣前漢屬左馮翊後漢魏省余謂櫟陽在長安東北維兵方至狄道安得便可東據櫟陽泰蓋言略陽耳櫟音藥藥略聲相近因語訛而致傳寫字訛耳降戶江翻招納羌胡東爭關隴傳檄四郡四郡謂隴西南安天水略陽略陽時為廣魏郡及晉乃更名略陽惡烏路翻而乃以乘勝之兵挫峻城之下鋭氣之卒屈力致命攻守勢殊客主不同兵書曰修櫓轒轀三月乃成拒堙三月而後已此孫子之言也孫子之說以攻城為不得已魏武注曰修治也櫓大楯也轒轀者轒牀也轒牀其下四輪從中推之至城下也杜佑曰攻城戰具作四輪車車上以繩為脊生牛皮蒙之下可藏十人填隍推之直抵城下可以攻掘金火木石所不能敗謂之轒轀車注又曰距堙者踊土稍高而前以附其城也杜佑曰土山即孫子所謂距闉也應劭曰轒轀胸奴車非也蓋攻城之車耳師古曰轒扶云翻轀於云翻今維孤軍遠僑僑音喬寄也客也糧穀不繼是我速進破賊之時所謂疾雷不及掩耳文子之言淮南子亦有是言洮水帶其表維等在其內今乘高據勢臨其項領不戰必走寇不可縱圍不可久君等何言如是遂進軍度高城嶺水經注曰隴西首陽縣有高城嶺嶺上有城曰渭源城夜至狄道東南高山上多舉烽火鳴鼓角狄道城中將士見救至皆憤踊維不意救兵卒至卒讀曰猝緣山急來攻之泰與交戰維退泰引兵揚言欲向其還路維懼九月甲辰維遁走城中將士乃得出王經歎曰糧不至旬向非救兵速至舉城屠裂覆喪一州矣隴西略陽天水南安秦州也喪息浪翻前後遣還更差軍守差擇也遣還王經所統將士更擇軍以守狄道勞力到翻差初佳翻治直之翻還屯上邽泰每以一方有事輒以虛聲擾動天下故希簡上事上時掌翻驛書不過六百里狄道東至洛陽二千二百餘里而驛書不過六百里蓋傳入近裏郡縣使如常郵筒以達洛陽也陳征西沈勇能斷沈持林翻荷方伯之重荷下可翻救將陷之城而不求益兵又希簡上事必能辦賊者也都督大將不當爾邪姜維退駐鍾提鍾提當在羌中蜀之涼州界也二年初吳大帝不立太廟以武烈嘗為長沙太守立廟於臨湘吳大帝諡其父堅曰武烈皇帝長沙郡治臨湘縣冬十章甲十一行本十下有二字乙十一行本同退齊校同熊校同月始作太廟於建業尊大帝為太祖考異曰吳曆太平元年正月立太祖廟沈約宋書孫亮立明年正月立權廟今從吳志王崇武標點容肇祖聶崇岐覆校
