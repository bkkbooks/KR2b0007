body:
  text: 資治通鑑卷第二百一十六端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀三十二玄宗至道大聖大明孝皇帝下之上天寶六載天寶六載丁亥七四七載子亥翻天寶六載十二月己巳上以仙芝為安西四鎮節度使徵靈察入朝使疏吏翻朝直遙翻靈察大懼仙芝見靈察趨走如故靈察益懼副都護京兆程千里押牙畢思琛及行官王滔等押牙者盡管節度使牙內之事行官主將命往來京師及鄰道及巡內郡縣琛丑林翻仙芝面責千里思琛曰公面如男子心如婦人何也又捽滔等欲笞之捽才沒翻笞丑之翻既而皆釋之謂曰吾素所恨於汝者欲不言恐汝懷憂今既言之則無事矣軍中乃安初仙芝為都知兵馬使猗氏人封常清少孤貧細瘦纇目少詩照翻纇盧對翻一足偏短求為仙芝傔不納常清日候仙芝出入不離其門凡數十日傔苦念翻離力智翻下離席同仙芝不得已留之會達奚部叛夫蒙靈察使仙芝追之斬獲略盡常清私作捷書以示仙芝皆仙芝心所欲言者由是一府奇之仙芝為節度使即署常清判官仙芝出征常為留後唐諸使之屬判官位次副使盡總府事又節度使或出征或入朝或死而未有代皆有知留後事其後遂以節度留後為稱至我朝遂以留後為承宣使資序未應建節者為之將即亮翻仙芝遇之如兄弟使典家事威行軍中常清嘗出德詮自後走馬突之而過常清至使院使院留後治事之所節度使便坐治事亦或就使院使疏吏翻每過一門輒闔之既至常清離席謂曰常清本出寒微郎將所知今日中丞命為留後離力智翻中丞謂高仙芝唐邊鎮諸帥或帶御史中丞大夫時隨其所帶官稱之郎將何得於衆中相陵突因叱之曰郎將須暫死以肅軍政暫與暫同面仆地曳出仙芝妻及乳母於門外號哭救之不及因以狀白仙芝仙芝覽之驚曰已死邪及見常清遂不復言號戶高翻復扶又翻常清亦不之謝軍中畏之惕息史言封常清能治軍政亦緣高仙芝不以私親撓法惕他歷翻自唐興以來邊帥皆用忠厚名臣不久任不遙領不兼統功名著者往往入為宰相如李靖李績劉仁軌婁師德之類是也開元以來薛訥郭元振張嘉貞王晙張說杜暹蕭嵩李適之等亦皆自邊帥入相帥所類翻雖才略如阿史那社爾契苾何力猶不專大將之任皆以大臣為使以制之社爾討高昌侯君集為元帥何力討高麗李績為元帥將即亮翻契欺訖翻苾毗必翻使疏吏翻天子有吞四夷之志為邊將者十餘年不易始久任矣王晙郭知運張守圭之類是也宰相則蕭嵩牛仙客始遙領矣諸王事見二百十三卷開元十五年蕭嵩事見十七年牛仙客事見二百十四卷二十四年始兼統矣蓋嘉運事見二百十四卷開元二十八年王忠嗣事見上卷五載蓋古合翻以胡人不知書乃奏言文臣為將怯當矢石不若用寒畯胡人寒謂卑賤畯嘗有事農耕者也畯音俊寒族則孤立無黨陛下誠以恩洽其心彼必能為朝廷盡死為于僞翻上悅其言始用安祿山至是諸道節度盡用胡人安祿山安思順哥舒翰高仙芝皆胡人也天下之勢偏重卒使祿山傾覆天下皆出於林甫專寵固位之謀也卒子恤翻七載戊子七四八天寶六載夏四月辛丑左監門大將軍知內侍省事高力士加驃騎大將軍知內侍省事自此始唐制勳階二十九驃騎大將軍為之首從一品監古銜翻驃匹妙翻騎奇寄翻中外畏之太子亦呼之為兄諸王公呼之為翁駙馬輩直謂之爺爺以遮翻俗呼父為爺自李林甫安祿山輩皆因之以取將相其家富厚不資將即亮翻相悉亮翻資即移翻不資言不可算計也於西京作寶壽寺寺鐘成力士作齊以慶之舉朝畢集宋璟若在必不預斯集矣朝直遙翻施錢百緡施式豉翻有求媚者至二十杵少者不減十杵然性和謹少過善觀時俯仰不敢驕橫故天子終親任之士大夫亦不疾惡也少始紹翻橫戶孟翻惡烏路翻天寶六載五月壬午㣥臣上尊號曰開元天寶聖文神武應道皇帝上時掌翻赦天下免百姓來載租庸擇後魏子孫一人為三恪三恪二王後注已見前杜佑曰周得天下封夏殷二王後又封舜後謂之恪恪敬也義取王之所敬故曰三恪天寶十三載公卿議曰三恪二王之議有三說焉一曰二王之前更立三代之後為三恪此據樂記武王克商未及下車封黃帝堯舜之後下車封夏殷之後而言一曰二王之前但存一代通二王為三恪此據左傳但封胡公以備三恪明王者所敬先王有二更封一代以備三恪三云二王之後為一恪妻之父母為二恪夷狄之君為三恪此據王有不臣者三而言之梁崔靈恩云三說以初為長按二王三恪經無正文靈恩據禮記遂以為通存五代竊恐未安記云尊賢不過二代第三代者雖遠難師法豈得不録其後故亦存之示敬其道而已因謂之三恪故左傳云封胡公以備三恪足知其無五代也況歷代至今皆以三代為三恪焉以此考之蓋以後魏子孫與周隋子孫為三恪也明年尋罷魏後注又見後天寶六載六月庚子賜安祿山鐵券天寶六載度支郎中兼侍御史楊釗善窺上意所愛惡而迎之以聚斂驟遷歲中領十五餘使釗音昭斂力贍翻惡烏路翻使疏吏翻洪邁隨筆曰楊國忠為度支郎領十五餘使至宰相凡領四十餘使新舊唐史皆不詳載其職按其拜相制前銜云御史大夫判度支權知太府卿事兼蜀郡長史劍南節度支度營田等副大使本道兼山南西道采訪處置使兩京太府出納監倉祠祭木炭宮市長春九成宮等使關內道及京畿采訪處置使拜右相兼吏部尚書集賢殿崇玄館學士修國史太清紫微宮使自餘所領又有管當租庸鑄錢等使以是觀之概可見矣甲辰遷給事中兼御史中丞專判度支事度徒洛翻恩幸日隆蘇冕論曰設官分職各有司存政有恆而易守恆戶登翻易以豉翻事歸本而難失經遠之理捨此奚據洎姦臣廣言利以邀恩多立使以示寵洎其冀翻使疏吏翻刻下民以厚斂張虛數以獻狀上心蕩而益奢人望怨而成禍使天子有司守其位而無其事受厚祿而虛其用宇文融首唱其端楊慎矜王鉷繼遵其軌鉷戶公翻楊國忠終成其亂仲尼云寧有盜臣而無聚斂之臣記大學百乘之家不畜聚斂之臣與其有聚斂之臣寧有盜臣前車既覆後轍未改求達化本不亦難乎天寶六載冬十月庚戌上幸華清宮天寶六載十一月癸未以貴姊適崔氏者為韓國夫人適裴氏者為虢國夫人適柳氏者為秦國夫人三人皆有才色上呼之為姨出入宮掖並承恩澤勢傾天下每命婦入見姊蔣兕翻掖音亦命婦外命婦也見賢遍翻玉真公主等皆讓不敢就位玉真公主睿宗之女凡有請託府縣承迎峻於制敕四方賂遺銛丑廉翻錡魚奇翻遺于季翻下獻遺同輻湊其門惟恐居後朝夕如市十宅諸王及百孫院婚嫁十王宅百孫院見二百十三卷開元十五年無不如志上所賜與及四方獻遺五家如一競開第舍極其壯麗一堂之費動踰千萬既成見他人有勝己者輒毀而改為虢國尤為豪蕩一旦帥工徒突入韋嗣立宅即撤去舊屋緡彌賓翻帥讀曰率去羌呂翻自為新第但授韋氏以隙地十畝而已中堂既成召工圬墁圬音烏墁謨官翻約錢二百萬復求賞技復扶又翻技巨綺翻虢國以絳羅五百段賞之嗤而不顧曰請取螻蟻蜥蜴嗤丑之翻蜥先擊翻蜴羊益翻師古曰爾雅云蠑螈蜥蜴蝘蜓守宮是則一類耳揚雄方言云在澤中者謂之蜥蜴記其數置堂中苟失一物不敢受直天寶六載十二月戊戌或言玄元皇帝降於朝元閣上於華清宮中起老君殿殿之北為朝元閣以或言老君降于此改曰降聖閣廢新豐入昭應辛酉上還宮自溫泉宮還從宣翻又音如字天寶六載哥舒翰築神威軍於青海上吐蕃至翰擊破之又築城於青海中龍駒島吐從暾入聲青海周八九百里中有山須冰合遊牝馬其上明年生駒號龍種故謂之龍駒島吐蕃屏跡不敢近青海屏必郢翻近其靳翻天寶六載是歲雲南王歸義卒子閣羅鳳嗣以其子鳳迦異為陽瓜州刺史卒子恤翻嗣祥吏翻南詔王父子相繼其子必以父號下一字冠於己所號之上歸義本號皮邏閣帝賜名歸義其子號閣羅鳳是以閣字冠其號之上也閣羅鳳之子號鳳迦異是以鳳字冠其號之上也其後至豐祐乃革其舊開元二十六年考異不取此說然二百四十三卷穆宗之長慶四年則又書豐祐不與父連名事八載己丑七四九天寶六載春二月戊申引百官觀左藏唐六典曰周禮有外府中士主泉藏之在外者掌邦布之入出以供百物而待邦用者也又有職幣上士中士主貨幣之入者也並今左藏之職至秦漢則分在司農少府後漢少府屬官有中藏府令丞掌中藏幣帛金銀貨物魏氏因之晉少府屬官有左右藏令東晉御史九人各掌一曹有庫曹御史後復分庫曹置外左庫內左庫宋文帝省外左庫而內左庫直曰左庫齊梁陳有右藏庫而無左藏北齊太府寺統左右藏令丞後周有外府上士中士隋有左右藏署令丞唐左藏有東庫西庫朝堂庫又有東都庫余按雍録太極宮中東左藏庫西左藏庫東庫在恭禮門之東西庫在安仁門之西大明宮中有左藏庫在麟德殿之左又有右藏署令掌邦國寶貨雜物而天下賦調之正數錢物則皆歸左藏也藏徂浪翻下帑藏同是時州縣殷富倉庫積粟帛動以萬計楊釗奏請所在糶變為輕貨及徵丁租地稅皆變布帛輸京師屢奏帑藏充牣古今罕儔故上帥㣥臣觀之釗音昭帥讀曰率賜釗紫衣金魚以賞之上以國用豐衍故視金帛如糞壤賞賜貴寵之家無有限極天寶六載三月朔方節度等使張齊丘於中受降城西北五百餘里木剌山築橫塞軍以振遠軍使鄭人郭子儀為橫塞軍使橫塞軍本名可敦城按宋白續通典橫塞軍初置在飛狐後移蔚州開元六年張嘉貞移於古代郡大安城南以為九姓之援天寶十二年改為天德軍參考諸書橫塞軍即橫野軍天寶元年書河東節度統橫野軍開元六年所移者也此築橫塞軍在可敦城者也振遠軍在單于府界鄭縣漢屬京兆後魏置東雍州並華山縣西魏改華州隋開皇初廢郡大業初廢州復置鄭縣屬京兆唐屬華州使疏吏翻降戶江翻剌盧達翻天寶六載夏四月咸寧太守趙奉璋咸寧郡本丹州丹陽郡元年更郡名守式又翻狀未達林甫知之諷御史逮捕以為妖言杖殺之妖於喬翻天寶六載先是折衝府皆有木契銅魚朝廷徵發下敕書契魚唐制銅魚符所以起軍旅王畿之內左三右一王畿之外左五右一左者在外行用之日從第一為首後事須用二次發之周而復始木契之制若太子監國則王畿之內左右各三王畿之外左右各五庶官鎮守則左右各十唐六典符寶郎掌符節曰木契者所以重鎮守慎出納車駕巡幸皇太子監國有兵馬受處分者為木契並行軍所及領軍五百人馬五百匹以上征討皆給木契三公以下兩京留守及諸州有兵馬受處分亦給木契曰銅魚符者所以起軍旅易守長兩京留守若諸州諸軍折衝府諸處捉兵鎮守之所及宮總監皆給魚符程大昌演繁露曰唐世左魚之外又有敕牒將之故兼名魚書先悉薦翻下遐嫁翻然後遣之自募置彍騎彍騎見二百一十二卷開元十三年彍音郭又音霍墮讀曰隳死及逃亡者有司不復點補復扶又翻其六馱馬牛器械糗糧耗散略盡馱徒何翻糗去九翻府兵入宿衛者謂之侍官言其為天子侍衛也其後本衛多以假人役使如奴隸長安人羞之至以相詬病記儒行曰今衆人以儒相詬病注云以儒相靳故相戲詬病猶恥辱也杜預云戲而相愧為靳詬音遘又呼候翻又多為邊將苦使利其死而沒其財將即亮翻下同由是應為府兵者皆逃匿至是無兵可交五月癸酉李林甫奏停折衝府上下魚書是後府兵徒有官吏而已唐府兵之制十人為火火有長火備六馱馬凡火具烏布幕鐵馬盂布槽鍤钁鑿碓筐斧鉗鋸皆一甲牀二鎌二五十人為隊隊具火鑽一胸馬繩一首羈足絆皆三人具弓一矢三十胡祿橫刀礪石大觿氈帽氈裝行縢皆一麥飯九斗米二斗皆自備其介胄戎具藏於庫有所征行則視其入而出給之其番上宿衛者惟給弓矢橫刀而已今皆耗廢非其舊矣又歷年不遷士大夫亦恥為之其彍騎之法天寶以後稍亦變廢應募者皆市井負販無賴子弟孔穎達曰白虎通云因井為市故曰市井應劭通俗文云市恃也養贍老小恃以不匱也俗說市井謂至市者於井上洗濯其物香潔及自嚴飾乃到市也謹按古者二十畝為一井因為市交易故稱市井然則本由井田之中交易為市故國都之市亦因曰市井按禮制九夫為井應劭二十畝為井者劭依漢書食貨志一井八家家有私田百畝公田十畝餘二十畝以為井竈廬舍故言二十畝耳因井為市或如劭言時承平日久議者多謂中國兵可銷於是民間挾兵器者有禁子弟為武官父兄擯不齒猛將精兵皆聚於西北中國無武備矣天寶六載太白山人李渾等上言水經注曰武功縣有太一山古文以為終南亦曰中南亦曰太白山在武功縣南去長安二百里不知其高幾何俗云武功太白去天三百杜彥遠曰太白山南連武功山於諸山最為秀傑冬夏積雪望之皓然隋志曰太一山在盩厔縣界新志曰太白山在郿縣言金星洞有玉板石記聖主福壽之符命御史中丞王鉷入仙遊谷求而獲之上以符瑞相繼皆祖宗休烈六月戊申上聖祖號曰大道玄元皇帝上高祖諡曰神堯大聖皇帝太宗諡曰文武大聖皇帝高宗諡曰天皇大聖皇帝中宗諡曰孝和大聖皇帝睿宗諡曰玄真大聖皇帝竇太后以下皆加諡曰順聖皇后天寶六載辛亥刑部尚書京兆尹蕭炅坐贓左遷汝陰太守汝陰郡潁州天寶六載上命隴右節度使哥舒翰帥隴右河西及突厥阿布思兵益以朔方河東兵凡六萬三千攻吐蕃石堡城厥九勿翻吐從暾入聲其城三面險絶惟一徑可上上時掌翻吐蕃但以數百人守之多貯糧食積檑木及石貯丁呂翻檑盧對翻唐兵前後屢攻之不能克翰進攻數日不拔召裨將高秀巖張守瑜欲斬之高秀巖後為安祿山守大同蓋二人朔方河東將也如期拔之獲吐蕃鐵刃悉諾羅等四百人唐士卒死者數萬果如王忠嗣之言王忠嗣言見上卷六載翰又遣兵於赤嶺西開屯田以謫卒二千戍龍駒島冬冰合吐蕃大集戍者盡沒深入虜境聲援不接兵法曰遺人獲也天寶六載閏月乙丑以石堡城為神武軍又於劍南西山索磨川置保寧都護府置保寧都護府以領牂柯吐蕃天寶六載丙寅上謁太清宮天寶元年正月得靈符起玄元皇帝廟於西京大寧坊東京置於東宮積善坊臨淄舊邸天下諸郡各置玄元像於開元觀至二年三月十二日改在京玄元宮為太清宮東京為太極宮天下諸郡為紫極宮丁卯㣥臣上尊號曰開元天地大寶聖文神武應道皇帝赦天下禘祫自今於太清宮聖祖前設位序正天寶六載秋七月冊突騎施移撥為十姓可汗騎奇寄翻可從刊入聲汗音寒天寶六載八月乙亥護密王羅真檀入朝朝直遙翻請留宿衛許之拜左武衛將軍天寶六載冬十月乙丑上幸華清宮天寶六載十一月乙未吐火羅葉護失里怛伽羅遣使表稱朅師王親附吐蕃怛當割翻伽求加翻使疏吏翻朅丘竭翻又去謁翻困苦小勃律鎮軍阻其糧道臣思破凶徒望發安西兵以來歲正月至小勃律六月至大勃律朅師亦曰羯師胡種也與吐火羅鄰接大勃律或曰布露直吐蕃西其北即小勃律也九載庚寅七五天寶六載春正月己亥上還宮天寶六載㣥臣屢表請封西嶽許之天寶六載二月楊貴復忤旨送歸私第楊初忤旨見上卷五載復扶又翻忤五故翻婦人識慮不遠違忤聖心陛下何愛宮中一席之地不使之就死豈忍辱之於外舍邪吉溫此言欲以自結於楊耳邪音耶遣中使賜以御膳對使者涕泣曰妾罪當死陛下幸不殺而歸之今當永離掖庭使疏吏翻下同離力智翻掖音亦金玉珍玩皆陛下所賜不足為獻惟髮者父母所與敢以薦誠乃翦髮一繚而獻之繚力照翻上遽使高力士召還寵待益深還從宣翻又音如字婦人女子最為難養以忤旨而出之若棄咳唾可也既出而復召還則彼之怙寵悍悖將無所不至明皇其可再乎古之所謂英主如漢武之於鉤弋庶乎時諸貴戚競以進食相尚上命宦官姚思藝為檢校進食使水陸珍羞數千盤一盤費中人十家之産中書舍人竇華嘗退朝使疏吏翻朝直遙翻值公主進食列於中衢傳呼按轡出其間宮苑小兒數百奮梃於前宮苑小兒宮苑使領之梃待鼎翻天寶六載安西節度使高仙芝破朅師虜其王勃特沒朅丘竭翻考異曰實録去載十一月吐火羅葉護請使安西兵討朅師上許之不見出師今載三月庚子冊朅師國王勃特沒兄素迦為王冊曰頃勃特沒於卿不孝於國不忠不言朅師為誰所破按十載正月高仙芝擒朅師王來獻然則朅師為仙芝所破也三月庚子立勃特沒之兄素迦為朅師王迦音加天寶六載上命御史大夫王鉷鑿華山路設壇場於其上鉷戶公翻華戶化翻是春關中旱辛亥嶽祠災制罷封西嶽天寶六載夏四月己巳御史大夫宋渾坐贓巨萬流潮陽潮陽郡本潮州義安郡元年更郡名吉溫因李林甫得進天寶四載吉溫鞫兵部之獄自是得進溫遂去林甫而附之為釗畫代林甫執政之策釗音昭為于僞翻蕭炅及渾皆林甫所厚也炅古迥翻求得其罪使釗奏而逐之以翦其心腹林甫不能救也天寶六載五月乙卯賜安祿山爵東平郡王唐將帥封王自此始將即亮翻帥所類翻天寶六載秋七月乙亥置廣文館於國子監以教諸生習進士者時廣文館置博士二員助教員天寶六載八月丁巳以安祿山兼河北道采訪處置使天寶六載朔方節度使張齊丘給糧失宜軍士怒毆其判官毆烏口翻兵馬使郭子儀以身捍齊丘乃得免世皆知郭子儀得衆然後能捍免張齊丘而不知當此之時唐之軍政果安在也癸亥齊丘左遷濟陰太守濟陰郡曹州濟子禮翻天寶六載辛卯處士崔昌上言處昌呂翻上時掌翻國家宜承周漢以土代火周隋皆閏位不當以其子孫為二王後事下公卿集議下遐嫁翻集賢殿學士衛包上言集議之夜四星聚於尾天意昭然上乃命求殷周漢後為三恪廢韓介酅公韓元魏後介後周後酅隋後酅戶圭翻孔穎達曰古春秋左氏說周家封夏殷二王之後以為上公封黃帝堯舜之後謂之三恪鄭氏云所存二王之後者命使郊天以天子之禮祭其始祖受命之王自行其正朔服色恪者敬也敬其先聖而封其後與諸侯無殊異不得比夏殷之後包為虞部員外郎天寶六載冬十月庚申上幸華清宮天寶六載太白山人王玄翼上言見玄元皇帝言寶仙洞有妙寶真符考異曰舊志王鉷奏玄翼見玄元於寶仙洞中遣鉷與張均王倕王濟王翼王嶽靈於洞中得玉石函上清護國經寶券紀籙等獻之今從實録云得之時上尊道教慕長生故所在爭言符瑞㣥臣表賀無虛月李林甫等皆請捨宅為觀觀古玩翻以祝聖壽上悅天寶六載安祿山屢誘奚契丹為設會飲以莨菪酒本草曰莨菪子生海邊川谷今處處有之苗莖高二三尺許葉與地黃紅藍等而三指闊四月開花紫色苗夾莖有白毛五月結實有殼作罌子狀如小石榴房中子至細青白如米粒毒甚煮一二日而芽方生以釀酒其毒尤甚為于僞翻下先為同飲於鴆翻莨音浪菪音蕩動數千人函其酋長之首以獻前後數四至是請入朝上命有司先為起第於昭應時王公皆私置第於昭應獨祿山以承恩命有司起第酋慈由翻長知兩翻朝直遙翻戲許宜翻楊釗兄弟姊妹皆往迎之冠蓋蔽野上自幸望春宮以待之辛未祿山獻奚俘八千人上命考課之日書上上考前此聽祿山於上谷鑄錢五壚祿山乃獻錢樣千緡緡彌頻翻天寶六載楊釗張易之之甥也釗音昭考異曰鄭審天寶故事云楊國忠本張易之之子天授中張易之恩幸莫比每歸私第詔令居樓上仍去其梯母恐張氏絶嗣乃密令女奴蠙珠上樓遂有娠而生國忠其說曖昧無稽今不取奏乞昭雪易之兄弟易之兄弟誅見二百七卷中宗神龍元年庚辰制引易之兄弟迎中宗於房陵之功迎中宗非特二張倡其議也事見二百六卷武后聖曆元年考異曰唐曆在七月二十五日今從實録釗以圖讖有金刀請更名讖楚譖翻更工衡翻上賜名國忠天寶六載十二月乙亥上還宮天寶六載關西遊奕使王難得擊吐蕃克五橋拔樹敦城以難得為白水軍使使疏吏翻吐從暾入聲樹敦城以古犬戎王樹惇名城隋在吐谷渾界唐在吐蕃界天寶六載安西四鎮節度使高仙芝僞與石國約和引兵襲之虜其王及部衆以歸悉殺其老弱仙芝性貪掠得瑟瑟十餘斛使疏吏翻張揖廣雅曰瑟瑟碧珠也黃金五六橐駝其餘口馬雜貨稱是皆入其家為石國王子扇誘諸國以覆仙芝之師張本稱尺證翻天寶六載楊國忠德鮮于仲通鮮于仲通資給國忠又推轂之事見上卷四載仲通性褊急失蠻夷心褊補典翻故事南詔常與妻子俱謁都督過雲南雲南太守張虔陀皆私之過古禾翻雲南郡姚州守式又翻又多所徵求南詔王閣羅鳳不應虔陀遣人詈辱之仍密奏其罪閣羅鳳忿怨是歲發兵反攻陷雲南殺虔陀取夷州三十二夷州謂西南夷附化羈縻之州也十載辛卯七五一載祖亥翻天寶六載春正月壬辰上朝獻太清宮癸巳朝享太廟朝直遙翻下同甲子合祭天地於南郊赦天下免天下今載地稅上書壬辰癸巳下書丁酉則甲子當作甲午天寶六載丁酉命李林甫遙領朔方節度使以戶部侍郎李暐知留後事天寶六載庚子楊氏五宅夜遊楊銛錡及韓虢秦三夫人為五宅廣平新書作廣寧公主上女也從才用翻公主墜馬駙馬程昌裔下扶之亦被數鞭公主泣訴於上上為之杖殺楊氏奴被皮義翻為于僞翻下司為使為遽為同明日免昌裔官不聽朝謁天寶六載上命有司為安祿山治第於親仁坊治直之翻敕令但窮壯麗不限財力既成具幄帟器皿充牣其中有帖白檀牀二皆長丈闊六尺本草圖經曰檀香木如檀生南海種有黃白紫之異帟音亦長直亮翻帳方丈六尺章十二行本作一方一丈八五字乙十一行本同孔本同退齊校同張校云六作八於廚廣既之物皆飾以金銀金飯罌二罌於耕翻缶也銀淘盆二淘盆所以淅米織銀絲筐及笊篱各一筐去王翻所以瀝米笊側絞翻篱音離笊篱所以轑釜取食物他物稱是稱尺證翻雖禁中服御之物殆不及也上每令中使為祿山護役護監護也使疏吏翻下同常戒之曰胡眼大勿令笑我偫直里翻大唐佐翻祿山入新第置酒乞降墨敕請宰相至第是日上欲於樓下擊毬遽為罷戲命宰相赴之日遣諸楊與之選勝遊宴侑以梨園教坊樂梨園皇帝梨園弟子也教坊內教坊也或後苑校獵獲鮮禽輒遣中使走馬賜之絡繹於路甲辰祿山生日上及貴賜衣服寶器酒饌甚厚饌雛戀翻又雛皖翻後三日召祿山入禁中貴以錦繡為大襁褓裹祿山使宮人以綵輿舁之襁居兩翻舁羊茹翻上聞後宮歡笑問其故左右以貴三日洗祿兒對上自往觀之喜賜貴洗兒金銀錢復厚賜祿山盡歡而罷復扶又翻自是祿山出入宮掖不禁或與貴對食或通宵不出頗有醜聲聞於外上亦不疑也聞音問觀明皇所以待祿山者昏庸之主所不為殆天奪之魄也考異曰祿山事迹正月二十日祿山生日玄宗及太真賜祿山器皿衣服件目甚多後三日召祿山入內貴以錦繡繃縛祿山令內人以綵輿舁之宮中歡呼動地玄宗使人問之報云貴與祿兒作三日洗兒玄宗就觀之大悅因賜貴洗兒金銀錢物極歡而罷自是宮中皆呼祿山為祿兒不禁其出入溫畬天寶亂離西幸記祿山諂約楊誓為子母自虢國已下次及諸王皆戲祿兒與之促膝娛宴上時聞後宮三千合處喧笑密偵則祿山果在其內貴戚猱雜未之前聞凡曰叉鬟皆啖厚利或通宵禁掖昵狎嬪嬙和士開之出入臥內方此為疏薊城侯之獲廁刑餘又奚足尚王仁裕天寶遺事云祿山常與子同食無所不至帝恐外人以酒毒之遂賜金牌子繫於臂上每有王公召宴欲沃以巨觥即祿山以金牌示之云準敕戒酒今略取之天寶六載安西節度使高仙芝入朝獻所擒突騎施可汗吐蕃酋長石國王朅師王加仙芝開府儀同三司尋以仙芝為河西節度使代安思順思順諷㣥胡割耳剺面請留己制復留思順於河西剺力之翻復扶又翻天寶六載安祿山求兼河東節度二月丙辰以河東節度使韓休珉為左羽林將軍以祿山代之戶部郎中吉溫見祿山有寵又附之約為兄弟說祿山曰李右丞相雖以時事親三兄天寶元年改侍中為左相中書令為右相李林甫時為右相中書令之職也丞字衍安祿山第三說式芮翻溫雖蒙驅使終不得超擢兄若薦溫於上溫即奏兄堪大任共排林甫出之為相必矣祿山悅其言數稱溫才於上上亦忘曩日之言數所角翻忘巫放翻言見上卷四載會祿山領河東因奏溫為節度副使知留後以大理司直張通儒為留後判官大理司直從六品上通儒帶司直而為河東留後判官是後節鎮有帶六曹尚書有帶三省長官有帶三公三師其屬亦率帶六品以下朝職謂之帶職黃琮曰外官帶職有憲銜有檢校憲銜自監察御史至御史大夫檢校自國子祭酒至三公唐及五代之制也是時楊國忠為御史中丞方承恩用事祿山登降殿階國忠常扶掖之掖音亦祿山與王鉷俱為大夫鉷權任亞於李林甫祿山見林甫禮貌頗倨林甫陽以他事召王大夫鉷至趨拜甚謹祿山不覺自失容貌益恭林甫與祿山語每揣知其情先言之揣初委翻祿山驚服祿山於公卿皆慢侮之獨憚林甫每見雖盛冬常汗沾衣林甫乃引與坐於中書廳廳他經翻中庭曰聽事言受事察訟於是也漢晉皆作聽事六朝以來乃始加而徑曰廳撫以溫言自解披袍以覆之祿山欣荷言無不盡覆敷又翻荷下可翻謂林甫為十郎林甫第十劉駱谷每自長安來必問十郎何言得美言則喜或但云語安大夫語牛倨翻須好檢校輒反手據牀曰噫嘻我死矣祿山既兼領三鎮賞刑己出日益驕恣自以曩時不拜太子事見上卷六載頗內懼又見武備墮弛墮讀曰隳有輕中國之心孔目官嚴莊孔目官衙前吏職也唐世始有此名言凡使司之事一孔一目皆須經由其手也掌書記位判官下古記室參軍之任勸之作亂為于僞翻讖楚譖翻祿山養同羅奚契丹降者八千餘人謂之曳落河契欺訖翻又音喫降戶江翻考異曰祿山事迹云養為己子按養子必無八千之數今不取曳落河者胡言壯士也及家僮百餘人皆驍勇善戰一可當百又畜戰馬數萬匹驍堅堯翻畜許六翻多聚兵仗分遣商胡詣諸道販鬻歲輸珍貨數百萬輸舂遇翻私作緋紫袍魚袋以百萬計以高尚嚴莊張通儒及將軍孫孝哲為腹心史思明安守忠李歸仁蔡希德牛廷玠向潤容向式亮翻姓也李庭望崔乾祐尹子奇何千年武令珣能元皓能奴代翻何氏姓苑云能姓出自長廣田承嗣田乾真阿史那承慶為爪牙尚雍奴人雍奴天寶元年更名武清屬范陽郡此因舊縣名書之頗有辭學薄遊河朔貧困不得志常歎曰高不危當舉大事而死豈能齧草根求活邪祿山引置幕府出入臥內尚典箋奏莊治簿書治直之翻通儒萬歲之子張萬歲唐初掌廣既牧通儒必非其子或者其孫也否則別又有一張萬歲契丹也承嗣世為盧龍小校祿山以為前鋒兵馬使章十二行本使下有治軍嚴整四字乙十一行本同孔本同張校同退齊校同嘗大雪祿山按行諸營校戶教翻使疏吏翻行下孟翻至承嗣營寂若無人入閲士卒無一人不在者祿山以是重之天寶六載夏四月壬午劍南節度使鮮于仲通討南詔蠻大敗於瀘南瀘水之南也武后垂拱元年置長城縣屬姚州天寶初更名瀘南縣考異曰楊國忠傳南蠻質子閣羅鳳亡歸不獲帝怒欲討之國忠薦閬州人鮮于仲通為益州長史令帥精兵八萬討南蠻按南詔傳七年蒙歸義死詔閣羅鳳襲雲南王不云嘗為質子亡歸也九年姚州自以張虔陀侵之故反時鮮于仲通已為益州長史國忠傳與南詔傳相違新舊書皆如此恐誤至曲州靖州分為二道一道出戎州一道出嶲州也自戎州開邊縣西行七十里至曲州自嶲州西南行八百餘里渡瀘水曲州本隋之恭州古朱提之地武德八年更名曲州靖州隋屬協州古夜郎地武德初分協州置靖州嶲音髓章十二行本謝上有遣使二字乙十一行本同孔本同張校同罪請還所俘掠城雲南而去去年南詔攻陷雲南城必有夷毀處故請城之以謝罪今吐蕃大兵壓境若不許我我將歸命吐蕃雲南非唐有也仲通不許囚其使進軍至西洱河與閣羅鳳戰軍大敗使疏吏翻洱乃吏翻士卒死者六萬人仲通僅以身免楊國忠掩其敗狀仍敍其戰功考異曰唐曆云令仲通白衣領節度事舊傳無之按既掩敗敍功豈得復白衣領職築為京觀觀古玩翻遂北臣於吐蕃蠻語謂弟為鍾吐蕃命閣羅鳳為贊普鍾號曰東帝給以金印閣羅鳳刻碑於國門言己不得已而叛唐且曰我世世事唐受其封爵後世容復歸唐當指碑以示唐使者知吾之叛非本心也其後德宗之世異牟尋卒復歸唐復扶又翻制大募兩京及河南北兵以擊南詔人聞雲南多瘴癘未戰士卒死者什八九莫肯應募楊國忠遣御史分道捕人連枷送詣軍所舊制百姓有勳者免征役時調兵既多調徒弔翻國忠奏先取高勳於是行者愁怨父母妻子送之所在哭聲振野天寶六載高仙芝之虜石國王也石國王子逃詣諸胡具告仙芝欺誘貪暴之狀誘音酉諸胡皆怒潛引大食欲共攻四鎮仙芝聞之將蕃漢三萬衆擊大食將即亮翻考異曰馬宇段秀實別傳云蕃漢六萬衆今從唐曆深入七百餘里至恆羅斯城或作怛羅斯城相持五日葛羅祿部衆叛葛羅祿即葛邏祿仙芝大敗士卒死亡略盡所餘才數千人右威衛將軍李嗣業勸仙芝宵遁道路阻隘拔汗那部衆在前人畜塞路拔汗那時從仙芝擊大食塞悉則翻奮大梃擊之人馬俱斃仙芝乃得過將士相失別將陽段秀實陽郡本隴州隴東郡元年改郡名有陽縣蓋元魏所置梃待鼎翻將即亮翻下同口堅翻詬曰詬苦候翻避敵先奔無勇也全己棄衆不仁也幸而得達獨無愧乎嗣業執其手謝之留拒追兵收散卒得俱免還至安西言於仙芝以秀實兼都知兵馬使為己判官天寶六載八月丙辰武庫火燒兵器三十七萬考異曰唐曆云四十七萬事今從實録天寶六載安祿山將三道兵六萬幽州平盧河東三道以奚騎二千為鄉導騎奇寄翻下同鄉讀曰嚮過平盧千餘里至土護真水遇雨自雄武軍東北渡灤河有古盧龍鎮有斗陘嶺自古盧龍北經九荊嶺受米城張洪隘渡石嶺至奚王帳六百里又東北傍吐護真河五百里至奚契丹牙帳又出檀州燕樂縣東北百八十五里至長城口又北八百里有吐護真河奚王牙帳也至契丹牙帳契丹大駭時久雨弓弩筋膠皆弛大將何思德言於祿山曰吾兵雖多遠來疲弊實不可用不如按甲息兵以臨之不過三日虜必降將即亮翻下同降戶江翻祿山怒欲斬之思德請前驅效死思德貌類祿山虜爭擊殺之以為已得祿山勇氣增倍奚復叛與契丹合夾擊唐兵殺傷殆盡射祿山中鞍折冠簪失履獨與麾下二十騎走會夜追騎解得入師州貞觀三年以室韋部落置師州治營州之廢陽師鎮復扶又翻射而亦翻中竹仲翻折而設翻哥解蓋自突厥來降者解戶買翻平盧兵馬使史思明懼逃入山谷近二旬近其靳翻收散卒得七百人平盧守將史定方將精兵二千救祿山契丹引去祿山乃得免至平盧麾下皆亡不知所出史思明出見祿山祿山喜起執其手曰吾得汝復何憂復扶又翻思明退謂人曰嚮使早出已與哥解並斬矣史言史思明之智數過於安祿山祿山使思明擊卻之天寶六載冬十月壬子上幸華清宮天寶六載楊國忠使鮮于仲通表請己遙領劍南十一月丙午以國忠領劍南節度使十一載壬辰七五二天寶六載春正月丁亥上還宮天寶六載二月庚午命有司出粟帛及庫錢數十萬緡於兩市易惡錢考異曰舊紀唐曆皆作癸酉今從實録江淮多惡錢貴戚大商往往以良錢一易惡錢五載入長安市井不勝其弊先悉薦翻勝音升故李林甫奏請禁之官為易取期一月不輸官者罪之於是商賈囂然不以為便賈音古囂許驕翻又五刀翻衆共遮楊國忠馬自言國忠為之言於上乃更命非鉛錫所鑄及穿穴者皆聽用之如故為于僞翻更工衡翻天寶六載三月安祿山發蕃漢步騎二十萬擊契丹欲以雪去秋之恥初突厥阿布思來降事見上卷元年降戶江翻賜姓名李獻忠纍遷朔方節度副使賜爵奉信王獻忠有才略不為安祿山下祿山恨之至是奏請獻忠帥同羅數萬騎與俱擊契丹帥讀曰率下同獻忠恐為祿山所害白留後張暐請奏留不行暐不許安祿山領河東而張暐為留後暐知附祿山而已安肯為阿布思請哉叛歸漠北祿山遂頓兵不進天寶六載乙巳改吏部為文部兵部為武部刑部為憲部天寶六載戶部侍郎御史大夫京兆尹王鉷權寵日盛領二十餘使宅旁為使院文案盈積吏求署一字纍日不得前中使賜賚不絶於門使疏吏翻賚來代翻雖李林甫亦畏避之林甫子岫為將作監鉷子準為衛尉少卿俱供奉禁中準陵侮岫岫常下之下遐嫁翻然鉷事林甫謹林甫雖忌其寵不忍害也準嘗帥其徒過駙馬都尉王繇王繇同皎之子也帥讀曰率過工禾翻準挾彈命中於繇冠折其玉簪以為戲笑彈徒旦翻命中者先命其處而後中之中竹仲翻折而設翻既而繇延準置酒繇所尚永穆公主上之愛女也黃琮曰皇女有美名公主或以德或以容或以福壽設名最多又有郡公主小國中國等刀匕宰夫之職記杜蕢曰蕢也宰夫也惟刀匕是共為于僞翻下同或謂繇曰鼠雖挾其父勢稱之為鼠微之也為于僞翻有如上聞無乃非宜繇曰上雖怒無害至於七郎王鉷第七不敢不爾鉷弟戶部郎中銲凶險不法銲何旦翻召術士任海川任音壬姓也問我有王者之相否相悉亮翻海川懼亡匿鉷恐事泄捕得託以他事杖殺之王府司馬韋會定安公主之子王繇之同産也定安公主中宗女下嫁王同皎生繇又嫁韋濯生會鉷使長安尉賈季鄰收會繫獄縊殺之縊於計翻繇不敢言銲所善邢縡縡作代翻與龍武萬騎謀殺龍武將軍以其兵作亂殺李林甫陳希烈楊國忠前期二日有告之者夏四月乙酉上臨朝朝直遙翻以告狀面授鉷使捕之鉷意銲在縡所先使人召之日晏乃命賈季鄰等捕縡縡居金城坊金城坊朱雀街西第四街之北來第二坊漢顧成廟博望苑戾園皆在焉縡帥其黨數十人持弓刀格鬬突出帥讀曰率鉷與楊國忠引兵繼至縡黨曰勿傷大夫人言勿傷鉷所部人也大夫稱鉷之官賊有號不可戰也今人謂私記為號言賊私為記號以相識別傔苦念翻至皇城西南隅京城之內有皇城皇城之內有宮城飛龍禁軍乘飛龍廣既馬者也武后置仗內六間一曰飛龍以中官為內飛龍使捕其黨皆擒之國忠以狀白上曰鉷必預謀上以鉷任遇深不應同逆李林甫亦為之辨解為于僞翻上乃特命原銲不問然意欲鉷表請罪之使國忠諷之鉷不忍上怒會陳希烈極言鉷大逆當誅戊子敕希烈與國忠鞫之仍以國忠兼京兆尹於是任海川韋會等事皆發獄具鉷賜自盡銲杖死於朝堂朝直遙翻鉷子準稱流嶺南稱齒繩翻尋殺之有司籍其第舍數日不能遍鉷賓佐莫敢窺其門獨采訪判官裴冕收其尸葬之王鉷蓋兼京畿采訪使天寶六載初李林甫以陳希烈易制引為相事見上卷五載易以豉翻晚節遂與林甫為敵林甫懼會李獻忠叛林甫乃請解朔方節制且薦河西節度使安思順自代庚子以思順為朔方節度使使疏吏翻天寶六載五月戊申慶王琮薨贈靖德太子琮徂宗翻贈字之下逸諡字既曰贈矣無諡字亦可天寶六載丙辰京兆尹楊國忠加御史大夫京畿關內采訪等使凡王鉷所綰使務悉歸國忠鉷戶公翻使疏吏翻初李林甫以國忠微才且貴之族故善遇之國忠與王鉷俱為中丞鉷用林甫薦為大夫故國忠不悅遂深探邢縡獄探吐南翻縡作代翻令引林甫交私鉷兄弟及阿布思事狀令力丁翻陳希烈哥舒翰從而證之上由是疏林甫國忠貴震天下始與林甫為仇敵矣天寶六載六月甲子楊國忠奏吐蕃兵六十萬救南詔吐從暾入聲克故隰州等三城考異曰實録兵部侍郎兼御史中丞劍南節度使楊國忠破吐蕃于雲南拔故隰州等三城獻俘于朝唐曆國忠上言破吐蕃于雲南拔故洪州等三城按國忠時在長安蓋劍南破吐蕃以國忠領節制故使之上表獻俘耳時國忠已為大夫云中丞誤也隰州從實録以道遠簡壯者千餘人及酋長降者獻之酋慈由翻長知兩翻降戶江翻天寶六載秋八月乙章十二行本作己乙十一行本同孔本同張校同丑上復幸左藏賜㣥臣帛蜀本作己丑當從之八載已嘗幸左藏賜㣥臣帛矣故此書復復扶又翻藏徂浪翻癸巳楊國忠奏有鳳皇見左藏庫屋出納判官魏仲犀言鳳集庫西通訓門左藏舊有令丞而已出納判官蓋帝置也是時分立諸使舊來司存之官備員莫得舉其職楊國忠方承恩遇領使最多蓋兼領左藏出納使而以魏仲犀為判官也宋白曰天寶二年始命張瑄充太府出納使閣本太極宮圖左藏庫之西則通訓門見賢遍翻天寶六載九月阿布思入寇圍永清柵永清柵亦曰永濟柵在中受降城之西二百里大同川使疏吏翻天寶六載冬十月戊寅上幸華清宮天寶六載己亥改通訓門曰鳳集門魏仲犀遷殿中侍御史楊國忠屬吏率以鳳皇優得調調徒釣翻天寶六載南詔數寇邊蜀人請楊國忠赴鎮去年楊國忠領劍南蜀人困於兵故請之數所角翻國忠將行泣辭上言必為林甫所害貴亦為之請上謂國忠曰卿暫到蜀區處軍事朕屈指待卿還當入相屈指計日以待之亦為于僞翻處昌呂翻相息亮翻憂悶不知所為悶莫困翻又莫緩翻中煩也巫言一見上可小愈上欲就視之左右固諫上乃令林甫出庭中林甫時蓋臥疾昭應私第天寶七載十二月以玄元皇帝見於朝元閣改為降聖閣在華清宮中今富貴之家帨巾率以胭脂染之為真紅色唐之遺俗也使人代拜國忠比至蜀比必利翻及也上遣中使召還中使疏吏翻至昭應謁林甫拜於牀下林甫流涕謂曰林甫死矣公必為相以後事纍公纍力瑞翻國忠謝不敢當汗出覆面國忠素憚林甫故然覆敷又翻丁卯林甫薨上晚年自恃承平以為天下無復可憂復扶又翻遂深居禁中專以聲色自娛悉委政事於林甫林甫媚事左右迎合上意以固其寵杜絶言路掩蔽聰明以成其姦妬賢疾能排抑勝己以保其位屢起大獄誅逐貴臣以張其勢張知亮翻自皇太子以下畏之側足凡在相位十九年開元二十二年始相林甫至是年凡十九年而上不之寤也天寶六載庚申以楊國忠為右相兼文部尚書右相即中書令文部即吏部判如判度支之類使謂諸使使疏吏翻國忠為人強辨而輕躁無威儀既為相以天下為己任裁決機務果敢不疑居朝廷攘袂扼腕躁則到翻相息亮翻朝直遙翻腕烏貫翻公卿以下頤指氣使莫不震懾懾之涉翻自侍御史至為相楊國忠兼侍御史在六載七載之間楊國忠為度支郎領五十餘使至宰相凡領四十餘使新舊唐史皆不詳載其職按其拜相制前銜云御史大夫判度支權知太府卿事兼蜀郡長史劍南節度支度營田等副大使本道兼山南西道采訪處置使兩京太府司農出納監倉祀祭木炭宮市長春九成宮等使關內道及京畿采訪處置使拜右相兼吏部尚書集賢殿崇玄館學士修國史太清太微宮使自餘所領又有管當租庸鑄錢等使以是觀之概可見行下孟翻不為己用者皆出之或勸陝郡進士張彖謁國忠陝郡本陝州弘農郡天寶元年更郡名陝失冉翻見之富貴立可圖彖曰君輩倚楊右相如泰山吾以為冰山耳若皎日既出君輩得無失所恃乎遂隱居嵩山國忠以司勳員外郎崔圓為劍南留後徵魏郡太守吉溫為御史中丞充京畿關內採訪等使魏郡魏州京畿關內先置兩采訪使今令溫兼充魏郡屬河北道采訪使時祿山兼采訪使故溫往辭為溫控馬出驛數十步為于僞翻溫至長安凡朝廷動靜輒報祿山信宿而達天寶六載十二月楊國忠欲收人望建議文部選人無問賢不肖選深者留之依資據闕注官選須絹翻考異曰唐曆此敕在十月二十七日統紀在七月舊紀十二月甲戌國忠奏請兩京選人銓日便定留放無長名按國忠作相始兼文部尚書七月未也今從舊紀滯淹者翕然稱之國忠凡所施置皆曲徇人所欲故頗得衆譽天寶六載甲申以平盧兵馬使史思明兼北平太守充盧龍軍使使疏吏翻天寶六載丁亥上還宮還自華清宮考異曰本紀唐曆皆云己亥還京今從實録天寶六載丁酉以安西行軍司馬封常清為安西四鎮節度使唐制行軍司馬位節度副使之上天寶以後節鎮以為儲帥天寶六載哥舒翰素與安祿山安思順不協上常和解之使為兄弟是冬三人俱入朝朝直遙翻上使高力士宴之於城東祿山謂翰曰我父胡母突厥公父突厥母胡族類頗同何得不相親翰曰古人云狐向窟嘷不祥為其忘本故也厥九勿翻窟苦骨翻嘷戶刀翻為于僞翻兄苟見親翰敢不盡心祿山以為譏其胡也大怒罵翰曰突厥敢爾翰欲應之力士目翰翰乃止陽醉而散自是為怨愈深天寶六載棣王琰有二孺人爭寵曲禮大夫之曰孺人注云孺之言屬正義曰孺屬也言其為親屬唐制縣王有孺人二人視正五品孺而樹翻琰與監院宦者有隙時諸皇子列宅禁中之北宦者監之監古銜翻密奏琰祝詛上上使人掩其履而獲之大怒琰頓首謝臣實不知有符上使鞫之果孺人所為上猶疑琰知之囚於鷹狗坊鷹狗坊屬間廣既使朝直遙翻憂憤而薨天寶六載故事兵吏部尚書知政事者知政事即宰相之職選須絹翻三注三唱仍過門下省審自春及夏其事乃畢唐制六品以下赴選始集而試觀其書判巳試而銓察其身言已銓而注詢其便利而擬巳注而唱不厭者得反通其辭三唱而不厭者聽冬集厭者為甲上于僕射乃上門下省給事中讀之黃門侍郎省之侍中審之然後以聞主者受旨而奉行焉謂之奏受省悉景翻欲自示精敏乃遣令史先於私第密定名闕十二載癸巳七五三天寶六載春正月壬戌國忠召左相陳希烈及給事中諸司長官皆集尚書都堂尚書都堂尚書都省之堂也長知兩翻一日而畢曰今左相給事中俱在座已過門下矣左相即侍中與給事皆門下省官無敢言者於是門下不復過官復扶又翻侍郎但掌試判而已侍郎韋見素張倚趨走門庭與主事無異吏部主事四人吏職也湊之子也韋湊見二百十卷睿宗景雲元年京兆尹鮮于仲通諷選人請為國忠刻頌立於省門制仲通撰其辭上為改定數字撰士免翻為于僞翻仲通以金填之天寶六載楊國忠使人說安祿山說式芮翻誣李林甫與阿布思謀反祿山使阿布思部落降者詣闕誣告林甫與阿布思約為父子上信之下吏按問降戶江翻下戶嫁翻林甫壻諫議大夫楊齊宣懼為所纍纍力瑞翻附國忠意證成之時林甫尚未葬二月癸未制削林甫官爵子孫有官者除名流嶺南及黔中黔音琴給隨身衣及糧食自餘資産並沒官近親及黨與坐貶者五十餘人剖林甫棺抉取含珠褫金紫抉於穴翻含戶紺翻褫敕豸翻更以小棺如庶人禮葬之更工衡翻己亥賜陳希烈爵許國公楊國忠爵魏國公賞其成林甫之獄也天寶六載夏五月己酉復以魏周隋後為三恪改三恪見上九載衛包以助邪貶夜郎尉夜郎縣屬溱州貞觀十六年開山洞置烏雷縣屬陸州天寶六載阿布思為回紇所破安祿山誘其部落而降之誘音酉降戶江翻由是祿山精兵天下莫及天寶六載壬辰以左武衛大將軍何復光將嶺南五府兵五府廣桂雍蒙容將即亮翻擊南詔天寶六載安祿山以李林甫狡猾踰己故畏服之及楊國忠為相祿山視之蔑如也蔑無也言視之若無也國忠屢言祿山有反狀上不聽隴右節度使哥舒翰擊吐蕃拔洪濟大漠門等城悉收九曲部落吐蕃得九曲地見二百十卷睿宗景雲元年廓州西南百四十里有洪濟橋注見前初高麗人王思禮與翰俱為押牙事王忠嗣翰為節度使思禮為兵馬使兼河源軍使麗力知翻使疏吏翻翰擊九曲思禮後期翰將斬之既而復召釋之思禮徐曰斬則遂斬復召何為復扶又翻楊國忠欲厚結翰共排安祿山奏以翰兼河西節度使秋八月戊戌賜翰爵西平郡王翰表侍御史裴冕為河西行軍司馬是時中國盛強自安遠門西盡唐境萬二千里長安城西面北來第一門曰安遠門本隋之開遠門也西盡唐境萬二千里併西域內屬諸國言之桑麻翳野天下稱富庶者無如隴右翰每遣使入奏常乘白橐駝日馳五百里使疏吏翻天寶六載九月甲辰以突騎施黑姓可汗登里伊羅蜜施為突騎施可汗天寶六載北庭都護程千里追阿布思至磧西以書諭葛邏祿使相應磧七迹翻邏郎佐翻歸葛邏祿葛邏祿葉護執之並其妻子麾下數千人送之甲寅加葛邏祿葉護頓毗伽開府儀同三司賜爵金山王天寶六載冬十月戊寅上幸華清宮考異曰舊紀唐曆皆作戊申按長曆是月無戊申今從實録然實録在辛巳後蓋誤楊國忠與虢國夫人居第相鄰虢國居宣陽坊國忠居第在其西無復期度或並轡走馬入朝不施障幕婦人出必有障幕以自蔽復扶又翻朝直遙翻下同三夫人將從車駕幸華清宮三夫人韓虢秦也為于僞翻車馬僕從充溢數坊從才用翻錦繡珠玉鮮華奪目國忠謂客曰吾本寒家一旦緣椒房至此未知稅駕之所然念終不能致令名不若且極樂耳楊氏五家隊各為一色衣以相別樂音洛別彼列翻五家合隊粲若雲錦合音閣國忠仍以劍南旌節引於其前國忠子暄舉明經學業荒陋不及格禮部侍郎達奚珣畏國忠權勢遣其子昭應尉撫先白之撫伺國忠入朝上馬伺相吏翻上時掌翻趨至馬下國忠意其子必中選有喜色撫曰大人白相公郎君所試不中程式然亦未敢落也落謂黜落也中竹仲翻我子何患不富貴乃令鼠輩相賣策馬不顧而去撫惶遽書白其父曰彼恃挾貴勢令人慘嗟安可復與論曲直復扶又翻遂置暄上第及暄為戶部侍郎珣始自禮部遷吏部暄與所親言猶歎己之淹回珣之迅疾國忠既居要地中外餉遺輻湊遺于季翻積縑至三千萬匹天寶六載上在華清宮欲夜出遊龍武大將軍陳玄禮諫曰宮外即曠野安可不備不虞陛下必欲夜遊請歸城闕上為之引還為于僞翻還從宣翻又如字下同天寶六載是歲安西節度使封常清擊大勃律至菩薩勞城新舊書並作賀菩勞城菩薄胡翻薩桑葛翻常清乘勝逐之斥候府果毅段秀實諫曰新書作隴州大堆府果毅此從舊書虜兵羸而屢北誘我也羸倫為翻誘音酉請搜左右山林常清從之果獲伏兵遂大破之受降而還天寶六載中書舍人宋昱知選事前進士廣平劉乃以選法未善廣平郡本洺州武安郡天寶元年更名選須絹翻以為禹稷皋陶同居舜朝猶曰載采有九德考績以九載書皋陶曰亦行有九德亦言其人有德乃言曰載采采禹曰何皋陶曰寬而栗柔而立願而恭亂而敬擾而毅直而溫簡而廉剛而塞強而義彰厥有常吉哉又舜典曰三載考績三考黜陟幽明三考九載也上時掌翻陶余招翻九載子亥翻察言於一幅之判觀行於一揖之間何古今遲速不侔之甚哉借使周公孔子今處銓廷銓廷謂吏部銓量選人之所處昌呂翻則不及徐庾徐陵庾信唐正元大曆以前皆尚其文則不若嗇夫嗇夫事見十四卷漢文帝三年齊思和標點聶崇岐覆校
