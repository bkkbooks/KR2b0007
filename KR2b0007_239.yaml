body:
  text: 資治通鑑卷第二百三十九端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀五十五憲宗昭文章武大聖至神孝皇帝中之上元和七年元和七年壬辰八一二元和七年冬十月乙未魏博監軍以狀聞以魏兵廢懷諫立田興之狀聞謂李絳曰卿揣魏博若符契揣初委翻李吉甫請遣中使宣慰以觀其變李絳曰不可今田興奉其土地兵衆坐待詔命不乘此際推心撫納結以大恩必待敕使至彼持將士表來為請節鉞然後與之此大曆貞元之弊也為于僞翻下亦為正為度為當為同非出於上將士為重朝廷為輕其感戴之心亦非今日之比也機會一失悔之無及吉甫素與樞密使梁守謙相結守謙亦為之言於上曰故事皆遣中使宣勞勞力到翻今此鎮獨無恐更不諭言恐其更不諭上意也欲俟其還而議之癸卯李絳復上言復扶又翻朝廷恩威得失在此一舉時機可惜奈何棄之利害甚明願聖心勿疑計忠順之行甫應過陝甫始也陝失冉翻猶可及也上且欲除留後絳曰興恭順如此言興守朝廷法令申版籍請官吏異乎河北諸鎮之為也則無以使之感激殊常上從之甲辰以興為魏博節度使忠順未還制命已至魏州興感恩流涕士衆無不鼓舞元和七年庚戌更名皇子寬曰惲察曰悰寰曰欣寮曰悟審曰恪更工衡翻惲於粉翻元和七年李絳又言魏博五十餘年不霑皇化魏博自田承嗣以來倔強拒命至是四十九年六州魏博貝衛澶相傾叛亂之巢穴不有重賞過其所望則無以慰士卒之心使四鄰勸慕請發內庫錢百五十萬緡以賜之左右宦官以為所與太多後有此比將何以給之上以語絳語牛據翻絳曰田興不貪專地之利不顧四鄰之患歸命聖朝陛下奈何愛小費而遺大計不以收一道人心錢用盡更來機事一失不可復追復扶又翻借使國家發十五萬兵以取六州期年而克之期讀曰朞其費豈止百五十萬緡而已乎上悅曰朕所以惡衣菲食蓄聚貨財正為欲平定四方為于僞翻下同不然徒貯之府庫何為貯丁呂翻十一月辛酉遣知制誥裴度至魏博宣慰以錢百五十萬緡賞軍士六州百姓給復一年復方目翻復除其賦役也軍士受賜歡聲如雷成德兗鄆使者數輩見之相顧失色歎曰倔強者果何益乎兗鄆即淄青平盧軍也鄆音運倔其勿翻強其兩翻度為興陳君臣上下之義興聽之終夕不倦待度禮極厚請度遍至所部州縣宣布朝命朝直遙翻奏乞除節度副使於朝廷詔以戶部郎中河東胡證為之證之盛翻興又奏所部缺官九十員請有司注擬行朝廷法令輸賦稅田承嗣以來室屋僭侈者皆避不居鄆蔡恆遣遊客間說百方興終不聽鄆李師道蔡吳少陽恆王承宗也恆戶登翻間古莧翻說輸芮翻我世與田氏約相保援今興非田氏族又首變兩河事言田興悉心奉朝廷變兩河藩鎮故事惡烏路翻我將與成德合軍討之弘曰我不知利害知奉詔行事耳若兵北渡河我則以兵東取曹州曹州李師道巡屬也不敢動田興既葬田季安送田懷諫于京師辛巳以懷諫為右監門衛將軍元和七年李絳奏振武天德左右良田可萬頃請擇能吏開置營田可以省費足食上從之絳命度支使盧坦經度用度度支經度皆徒洛翻四年之間開田四千八百頃收穀四千餘萬斛千當作十邊防賴之元和七年上嘗於延英謂宰相曰卿輩當為朕惜官為于僞翻勿用之私親故李吉甫權德輿皆謝不敢李絳曰崔祐甫有言非親非故不諳其才諳者尚不與官不諳者何敢復與但問其才器與官相稱否耳諳烏含翻復扶又翻稱尺證翻若避親故之嫌使聖朝虧多士之美此乃偷安之臣非至公之道也苟所用非其人則朝廷自有典刑誰敢逃之上曰誠如卿言元和七年是歲吐蕃寇涇州及西門之外先寇涇州界進及涇州西門之外上患之李絳上言京西京北皆有神策鎮兵京西鳳翔秦隴原涇渭也京北邠寧丹延鄜坊慶靈鹽夏綏銀宥也鎮兵注已見前置之欲以備禦吐蕃使與節度使掎角相應也今則鮮衣美食坐耗縣官每有寇至節度使邀與俱進則云申取中尉處分唐神策鎮兵分屯于外皆屬左右神策中尉處昌呂翻分扶問翻虜去遠矣比必利翻及也縱有果鋭之將聞命奔赴節度使無刑戮以制之相視如平交左右前卻莫肯用命何所益乎請據所在之地士馬及衣糧器械皆割隸當道節度使使號令齊一如臂之使指則軍威大振虜不敢入寇矣上曰朕不知舊事如此當亟行之既而神策軍驕恣日久不樂隸節度使樂音洛竟為宦者所沮而止八年八年春正月癸亥以博州刺史田融為相州刺史融興之兄也融長養而教之兄弟皆幼失父母而兄年差長故長養其弟而教之長知丈翻角競也角射者以中為勝融退而抶之抶丑栗翻打也曰爾不自晦禍將及矣故興能自全於猜暴之時猜暴之時謂田季安時也八年勃海定王元瑜卒弟言義權知國務庚午以言義為勃海王八年李吉甫李絳數爭論於上前禮部尚書同平章事權德輿居中無所可否上鄙之數所角翻鄙陋也辛未德輿罷守本官八年辛卯賜魏博節度使田興名弘正八年司空同平章事于頔久留長安鬱鬱不得志二年頔入朝見二百三十二卷自言與樞密使梁守謙同宗能為人屬請為于僞翻下同屬之欲翻頔使其子太常丞敏重賂正言求出鎮久之正言詐漸露敏索其賂不得索山客翻誘其奴支解之棄溷中誘音酉溷戶困翻廁也事覺頔帥其子殿中少監季友等素服詣建福門請罪門者不內帥讀曰率唐大明宮端門曰丹鳳門其西曰建福門內即納字也退負南牆而立遣人上表閣門以無印引不受唐制凡四方章表皆閣門受而進之頔方請罪既無職印又無內引所以不受明日復至復扶又翻丁酉頔左授恩王傅仍絶朝謁朝直遙翻敏流雷州舊志雷州至京師六千五百一十二里官僮奴死者數人敏至秦嶺而死自藍田關南出度秦嶺事連僧鑒虛鑒虛自貞元以來以財交權幸受方鎮賂遺遺唯季翻厚自奉養吏不敢詰至是權幸爭為之言上欲釋之中丞薛存誠不可上遣中使詣臺宣旨曰朕欲面詰此僧非釋之也存誠對曰陛下必欲面釋此僧請先殺臣然後取之不然臣期不奉詔上嘉而從之三月丙辰杖殺鑒虛沒其所有之財考異曰實録在二月按長曆二月乙酉朔三月甲寅朔丙辰三月三日甲子武元衡入知政事十一日也實録脫不書月耳八年甲子徵前西川節度使同平章事武元衡入知政事元和二年武元衡出鎮西川至是召還八年夏六月大水上以為陰盈之象辛丑出宮人二百車八年秋七月章甲十一行本月下有辛酉二字乙十一行本同孔本同張校同退齊校同振武節度使李光進請修受降城兼理河防理治也河毀受降城見上卷七年天德故城在東受降城西二百里大同川乾元後徙天德軍於永濟柵宋白續通典作永清柵其城則隋大同城之舊墟受降城張仁願所築事見二百九卷中宗景龍元年據虜要衝美水草守邊之利地今避河患退二三里可矣奈何捨萬代永安之策徇一時省費之便乎況天德故城僻處確瘠處昌呂翻確克角翻磽確也瘠土薄也去河絶遠烽候警急不相應接虜忽唐突勢無由知是無故而蹙國二百里也及城使周懷義奏利害與絳坦同上卒用吉甫策卒子恤翻以受降城騎士隸天德軍李絳言於上曰邊軍徒有其數而無其實虛費衣糧將帥但緣私役使緣私者並緣公役之名而私使之未嘗訓練以備不虞此不可不於無事之時豫留聖意也時受降城兵籍舊四百人及天德軍交兵止有五十人考異曰實録云李光進請修東受降城兼理河防又云以中受降城及所管騎士一千一百四十人隸于天德軍舊傳盧坦與李絳叶議以為西城張仁願所築不可廢三者不同莫知孰是今但云受降城所闕疑也又李司空論事云中城舊屬振武有鎮兵四百人其時割屬天德交割惟有五十人人數如此不同或者一千一百四十人是三城都數耳自餘稱是稱尺證翻故絳言及之上驚曰邊兵乃如是其虛邪卿曹當加按閲會絳罷相而止八年乙巳廢天威軍元和初並左右神威為一軍號天威軍神威軍本殿前射生軍也八年丁未辰漵賊帥張伯靖請降辰漵賊反事始上卷六年辛亥章甲十一行本辛上有九月二字乙十一行本同孔本同張校同以伯靖為歸州司馬委荊南軍前驅使委屬也付也八年初吐蕃欲作烏蘭橋新志會州烏蘭縣有烏蘭關在縣西南吐蕃於河上作橋貯丁呂翻朔方常潛遣人投之於河終不能成虜知朔方靈鹽節度使王佖貪佖支筆翻又頻筆翻先厚賂之然後併力成橋仍築月城守之自是朔方禦寇不暇八年冬十月回鶻發兵度磧南自柳谷西擊吐蕃新志西州交河縣北二百一十里經柳谷渡壬寅振武天德軍奏回鶻數千騎至鸊鵜泉鸊鵜泉在西受降城北三百里鸊扶歷翻鵜徒奚翻八年振武節度使李進賢不恤士卒判官嚴徹綬之子也於時嚴綬尚在綬音受進賢使牙將楊遵憲將五百騎趣東受降城以備回鶻所給資裝多虛估資裝不給本色虛估其價給以他物趣七喻翻遵憲屋處處昌呂翻而士卒暴露衆發怒夜聚薪環其屋而焚之環音宦卷甲而還還從宣翻又如字庚寅夜焚門攻進賢進賢踰城走軍士屠其家並殺嚴徹進賢奔靜邊軍靜邊軍在雲州西一百八十里八年㣥臣纍表請立德郭氏為皇后上以門宗強盛郭曖之女子儀之孫女也後宮莫得進託以歲時禁忌竟不許八年丁酉振武監軍駱朝寬奏亂兵已定請給將士衣上怒以夏綏節度使張煦為振武節度使煦吁句翻將夏州兵二千赴鎮仍命河東節度使王鍔以兵二千納之聽以便宜從事駱朝寬歸罪於其將蘇若方而殺之八年發鄭滑魏博卒鑿黎陽古河十四里以紓滑州水患大河故瀆徑黎陽山之東後南徙為滑州患故復鑿古河八年上問宰相人言外間朋黨大盛何也李絳對曰自古人君所甚惡者莫若人臣為朋黨故小人譖君子必曰朋黨何則朋黨言之則可惡惡烏路翻尋之則無跡故也東漢之末凡天下賢人君子宦官皆謂之黨人而禁錮之遂以亡國見漢桓靈二帝紀願陛下深察之夫君子固與君子合豈可必使之與小人合然後謂之非黨邪九年九年春正月甲戌王鍔遣兵五千會張煦於善羊柵善羊當作善陽唐朔州治善陽縣西北至單于府百二十里柵蓋立於縣界乙亥煦入單于都護府振武節度使治單于都護府二月丁丑貶李進賢為通州刺史甲午駱朝寬坐縱亂者杖之八十奪色配役定陵奪色者奪其品色也九年李絳屢以足疾辭位癸卯罷為禮部尚書初上欲相絳先出吐突承璀為淮南監軍見上卷六年相息亮翻下同上召還承璀先罷絳相甲辰承璀至京師復以為弓箭庫使觀李絳立朝本末亦庶乎有大臣之節矣承璀以喪師罷中尉為弓箭庫使今遂兼為之此憲宗之巧蓋持兩端以觀朝議也李絳既罷誰敢復以為言乎九年李吉甫奏國家舊置六胡州於靈鹽之境調露元年於靈夏南境以降突厥置魯州麗州含州塞州依州契州以唐人為刺史謂之六胡州鹽州與靈夏接境更置宥州以領降戶天寶中宥州寄理於經略軍長安四年併六胡州為匡長二州開元二十六年以廢匡州置懷恩縣帶宥州縣管內有榆多勒城天寶中王忠嗣奏置經略軍在宥州故城東北三百里宋白曰宥州應接天德南援夏州治長澤縣本漢三封縣地因循遂廢今請復之以備回鶻撫党項上從之党底朗翻夏五月庚申復置宥州理經略軍取鄜城神策屯兵九千以實之大曆六年置肅戎軍於鄜州之鄜城先是回鶻屢請昏先悉薦翻朝廷以公主出降其費甚廣故未之許禮部尚書李絳上言以為回鶻凶強不可無備淮西窮蹙事要經營今江淮大縣歲所入賦有二十萬緡者足以備降主之費陛下何愛一縣之賦不以羈縻徑虜回鶻若得許昏必喜而無猜然後可以修城塹蓄甲兵邊備既完得專意淮西功必萬全今既未降公主而虛弱西城西城謂西受降城更修天德以疑虜心謂徙受降城於天德也則淮西遺醜復延歲月之命矣復扶又翻儻虜騎南牧國家非步兵三萬騎五千則不足以抗禦借使一歲而勝之其費豈特降主之比哉上不聽九年乙丑桂王綸薨綸上弟也九年六月壬寅以河中節度使張弘靖為刑部尚書同平章事弘靖延賞之子也張延賞相德宗於貞元之間九年翰林學士獨孤郁權德輿之壻也上歎郁之才美曰德輿得壻郁我反不及邪先是尚主皆取貴戚及勳臣之家先悉薦翻上始命宰相選公卿大夫子弟文雅可居清貫者史照曰貫事也清貫猶言清職也惟杜佑孫司議郎悰不辭悰藏宗翻秋七月戊辰以悰為殿中少監駙馬都尉尚岐陽公主公主上長女郭所生也八月癸巳成昏公主有賢行行下孟翻杜氏大族尊行不翅數十人尊行之行下浪翻不翅與不啻同公主卑委怡順一同家人禮度二十年間人未嘗以絲髮間指為貴驕始至則與悰謀曰上所賜奴婢卒不肯窮屈卒子恤翻終也奏請納之悉自市寒賤可制指者制指謂可制御而指使者也九年閏月丙辰彰義節度使吳少陽薨考異曰實録少陽卒在閏月己丑下壬辰上而並元濟焚舞陽言之統紀舊紀少陽卒皆在九月按舊傳曰少陽卒凡四十日不為輟朝唐紀張弘靖請為少陽廢朝贈官而實録辛丑贈少陽右僕射然則己丑至辛丑才十二日耳豈容四十日不輟朝乎今從新紀陰聚亡命牧養馬騾時抄掠壽州茶山以實其軍壽州有茶山抄楚交翻匿喪以病聞自領軍務上自平蜀元和初平蜀淮南節度使李吉甫上言少陽軍中上下攜離請徙理壽州以經營之淮南節度使治揚州欲徙治壽州以經略淮西事見上卷四年五年及吉甫入相田弘正以魏博歸附事見七年河陽宿兵本以制魏博今弘正歸順則河陽為內鎮不應屯重兵以示猜阻辛酉以河陽節度使烏重胤為汝州刺史充河陽懷汝節度使徙理汝州己巳弘正檢校右僕射賜其軍錢二十萬緡弘正曰吾未若移河陽軍之為喜也喜者喜朝廷之不猜防魏博九月庚辰以洺州刺史李光顏為陳州刺史充忠武都知兵馬使九域志陳州西南至蔡州一百九十里通彰之子也肅宗時令狐彰背史思明歸順丙戌以山南東道節度使袁滋為荊南節度使以荊南節度使嚴綬為山南東道節度使吳少陽判官蘇兆楊元卿大將侯惟清皆勸少陽入朝元濟惡之惡烏路翻殺兆囚惟清元卿先奏事在長安具以淮西虛實及取元濟之策告李吉甫請討之時元濟猶匿喪元卿勸吉甫凡蔡使入奏者所在止之少陽死近四十日不為輟朝但易環蔡諸鎮將帥近其靳翻為于僞翻下同朝直遙翻環音宦益兵為備元濟殺元卿妻及四男以圬射堋圬哀乎翻墁也堋補鄧翻射埻也淮西宿將董重質吳少誠之壻也元濟以為謀主九年戊戌加河東節度使王鍔同平章事九年李吉甫言於上曰淮西非如河北四無黨援國家常宿數十萬兵以備之勞費不可支也失今不取後難圖矣上將討之張弘靖請先為少陽輟朝贈官遣使弔贈待其有不順之迹然後加兵上從之遣工部員外郎李君何弔祭唐工部郎掌城池土木之工役程式發兵四出屠舞陽舞陽漢縣唐屬許州九域志在州西南一百八十里葉式涉翻掠魯山襄城關東震駭君何不得入而還還從宣翻又如字九年冬十月丙午中書侍郎同平章事趙公李吉甫薨九年壬戌以忠武節度副使李光顏為節度使甲子以嚴綬為申光蔡招撫使督諸道兵招討吳元濟綬音受乙丑命內常侍知省事崔潭峻監其軍考異曰實録作談峻今從舊傳戊辰以尚書左丞呂元膺為東都留守九年党項寇振武九年十二月戊辰以尚書右丞韋貫之同平章事十年十年春正月乙酉加韓弘守司徒弘鎮宣武十餘年不入朝頗以兵力自負朝廷亦不以忠純待之王鍔加章甲十一行本加下有同字乙十一行本同孔本同張校同平章事弘恥班在其下與武元衡書頗露不平之意朝廷方倚其形勢以制吳元濟故遷官使居鍔上以寵慰之十年吳元濟縱兵侵掠及於東畿東都畿也己亥制削元濟官爵命宣武等十六道進軍討之嚴綬擊淮西兵小勝不設備淮西兵夜還襲之二月甲辰綬敗于磁丘磁丘當作慈丘縣屬唐州隋分比陽縣置取縣界慈丘山為名在州東北馳入唐州而守之九域志唐州東至蔡州三百五十里敗補邁翻走保州城境上諸柵盡為淮西所屠癸丑以左金吾大將軍李文通代之貶通昭州司戶詔鄂嶽觀察使柳公綽以兵五千授安州刺史李聽使討吳元濟公綽曰朝廷以吾書生不知兵邪即奏請自行許之公綽至安州李聽屬櫜鞬迎之屬之欲翻櫜姑勞翻鞬居言翻公綽以鄂嶽都知兵馬使先鋒行營兵馬都虞候二牒授之選卒六千以屬聽戒其部校曰校戶教翻行營之事一決都將總諸部之軍者謂之都將如出麾下公綽號令整肅區處軍事處昌呂翻諸將無不服士卒在行營者其家疾病死喪厚給之妻淫泆者沈之於江泆弋質翻沈持林翻士卒皆喜曰中丞為我治家為于僞翻治直之翻我何得不前死故每戰皆捷公綽所乘馬踶殺圉人踶特計翻圉人掌養馬者公綽命殺馬以祭之或曰圉人自不備耳此良馬可惜公綽曰材良性駑何足惜也竟殺之駑音奴十年河東將劉輔殺豐州刺史燕重旰王鍔誅之及其黨燕於賢翻旰古案翻十年王叔文之黨坐謫官者凡十年不量移永貞元年貶王叔文之黨事見二百三十六卷量音良悉召至京師諫官爭言其不可上與武元衡亦惡之惡烏路翻三月乙嚴乙改己酉皆以為遠州刺史官雖進而地益遠永州司馬柳宗元為柳州刺史朗州司馬劉禹錫為播州刺史永州古零陵郡隋置永州以永水為名京師南三千二百七十四里柳州漢潭中縣地隋置馬平縣唐初置昆州貞觀改柳州至京師水陸相乘五千四百七十里朗州古武陵郡梁置武州隋為朗州京師東南二千一百五十九里播州即漢夜郎且蘭二國西南隅之地漢置牂柯郡唐置播州京師南四千四百五十里播非人所居而夢得親在堂劉禹錫字夢得欲請於朝願以柳易播會中丞裴度亦為禹錫言曰為于僞翻禹錫誠有罪然母老與其子為死別良可傷上曰為人子尤當自謹勿貽親憂此則禹錫重可責也重直用翻度曰陛下方侍太后恐禹錫在所宜矜上良久乃曰朕所言以責為人子者耳然不欲傷其親心退謂左右曰裴度愛我終切明日禹錫改連州刺史連州漢桂陽陽山地唐置連州以郡南有黃連嶺為名京師南三千六百六十五里考異曰舊禹錫傳元和十年自武陵召還宰相復欲置之郎署時禹錫作遊玄都觀詠看花君子詩語涉譏刺執政不悅復出為播州刺史禹錫集載其詩曰玄都觀裏桃千樹盡是劉郎去後栽按當時叔文之黨一切除遠州刺史不止禹錫一人豈緣此詩蓋以此得播州惡處耳實録曰中丞裴度奏其母老必與此子為死別臣恐傷陛下孝理之風憲宗曰為子尤須謹慎恐貽親之憂禹錫更合重於他人卿豈可以此論之度無以對良久帝改容而言曰朕所言是責人子之事然終不欲傷其所親之心明日改授禹錫連州趙元拱唐諫諍集裴度曰陛下方侍太后以孝理天下至如禹錫誠合哀矜憲宗乃從之明日制授禹錫連州既而語左右裴度終愛我切趙璘因話録曰憲宗初徵柳宗元劉禹錫至京城俄而柳為柳州刺史劉為播州刺史柳以劉須侍親播州最為惡處請以柳州換上不許宰相對曰禹錫有老親上曰但要與郡豈繫母在裴晉公進曰陛下方侍太后不合發此言上有愧色劉遂改為連州按柳宗元墓志將拜疏而未上耳非已上而不許也禹錫除播州時裴度未為相今從實録及諫諍集宗元善為文嘗作梓人傳傳直戀翻以為梓人不執斧斤刀鋸之技專以尋引規矩繩墨度㣥木之材技渠綺翻引羊晉翻度徒洛翻視棟宇之制相高深圓方短長之宜指麾衆工各趨其事不勝任者退之相息亮翻趨七喻翻勝音升大夏既成夏與廈同胡雅翻章甲十一行本正作廈乙十一行本同孔本同則獨名其功受祿三倍亦猶相天下者立綱紀整法度擇天下之士使稱其職稱尺證翻居天下之人使安其業能者進之不能者退之萬國既理而談者獨稱伊傅周召召讀曰邵其百執事之勤勞不得紀焉或者不知體要衒能矜名衒熒絹翻親小勞侵衆官聽聽於府庭聽魚隱翻又魚巾翻而遺其大者遠者是不知相道者也又作種樹郭橐駝傳曰橐駝之所種無不生且茂者或問之對曰橐駝非能使木壽且孳也孳津之翻生也凡木之性其根欲舒其土欲故既植之勿動勿慮去不復顧其蒔也若子蒔音侍更種也其置也若棄則其天全而性得矣他植者則不然根拳而土易愛之太恩憂之太勤旦視而暮撫已去而復顧甚者爪其膚以驗其生枯爪側絞翻搖其本以觀其疏密而木之性日以離矣雖曰愛之其實害之雖曰憂之其實讎之故不我若也為政亦然吾居鄉見長人者長知兩翻好煩其令好呼到翻若甚憐焉而卒以禍之卒子恤翻旦暮吏來聚民而令之促其耕穫督其蠶織吾小人輟饔飧以勞吏之不暇饔於容翻飧蘇昆翻饔飧熟食也勞力到翻又何以蕃吾生而安吾性邪蕃音煩凡病且怠職此故也杜預曰職主也梓人傳以諭相種樹傳以諭守令故溫公取之以其有資於治道也十年庚子李光顏奏破淮西兵於臨潁十年田弘正遣其子布將兵三千助嚴綬討吳元濟十年甲辰李光顏又奏破淮西兵於南頓南頓漢縣屬汝南郡唐屬陳州十年吳元濟遣使求救於恆鄆王承宗李師道數上表請赦元濟上不從恆戶登翻鄆音運數所角翻是時發諸道兵討元濟而不及淄青師道使大將將二千人趣壽春趣七喻翻聲言助官軍討元濟實欲為元濟之援也師道素養刺客奸人數十人厚資給之其人說師道曰說輸芮翻用兵所急莫先糧儲今河陰院積江淮租賦請潛往焚之募東都惡少年數百劫都市焚宮闕則朝廷未暇討蔡先自救腹心此亦救蔡一奇也師道從之自是所在盜賊竊發辛亥暮盜數十人攻河陰轉運院殺傷十餘人燒錢帛三十餘萬緡匹穀三萬餘斛於是人情恇懼恇去王翻怯也㣥臣多請罷兵上不許十年諸軍討淮西久未有功五月上遣中丞裴度詣行營宣慰察用兵形勢度還還音旋又如字言淮西必可取之狀且曰觀諸將惟李光顏勇而知義必能立功上悅言有必克之勢故悅考功郎中知制誥韓愈上言以為淮西三小州三小州申光蔡而當天下之全力其破敗可立而待此以大小強弱之勢言也在陛下斷與不斷耳斷丁亂翻此以大曆貞元以來積習言也因條陳用兵利害以為今諸道發兵各二三千人勢力單弱羈旅異鄉與賊不相諳委望風懾懼諳烏含翻懾之涉翻將帥以其客兵待之既薄使之又苦或分割隊伍兵將相失心孤意怯難以有功將即亮翻下同又其本軍各須資遣道路遼遠勞費倍多聞陳許安唐汝壽等州與賊連接處村落百姓悉有兵器習於戰鬬識賊深淺比來未有處分比毗至翻近也處昌呂翻分扶問翻猶願自備衣糧保護鄉里若令召募立可成軍賊平之後易使歸農易以豉翻乞悉罷諸道軍募土人以代之又言蔡州士卒皆國家百姓若勢力窮不能為惡者不須過有殺戮十年丙申李光顏奏敗淮西兵於時曲時曲在陳州殷水縣西南敗補邁翻陳讀曰陳下同光顏不得出乃自毀其柵之左右出騎以擊之光顏自將數騎衝其陳出入數四賊皆識之矢集其身如蝟毛其子攬轡止之攬以手攬取也於是人爭致死淮西兵大潰殺數千人上以裴度為知人十年上自李吉甫薨悉以用兵事委武元衡李師道所養客說李師道曰天子所以鋭意誅蔡者元衡贊之也請密往刺之說輸芮翻下同刺七亦翻元衡死則他相不敢主其謀爭勸天子罷兵矣師道以為然即資給遣之王承宗遣牙將尹少卿奏事為吳元濟遊說為吳于為翻少卿至中書辭指不遜元衡叱出之承宗又上書詆毀元衡六月癸卯天未明元衡入朝出所居靖安坊東門有賊自暗中突出射之從者皆散走射而亦翻從才用翻賊執元衡馬行十餘步而殺之取其顱骨而去顱龍都翻首骨也又入通化坊擊裴度傷其首墜溝中度氈帽厚得不死傔人王義自後抱賊大呼賊斷義臂而去傔苦念翻傔從也呼火故翻斷音短京城大駭於是詔宰相出入加金吾騎士張弦露刃以衛之所過坊門呵索甚嚴呵叱也索搜也索山客翻下大索同上或御殿久之班猶未齊賊遺紙於金吾及府縣遺棄也左右金吾掌邏捕姦非府縣京兆府及兩赤縣毋急捕我我先殺汝故捕賊者不敢甚急兵部侍郎許孟容見上言自古未有宰相橫尸路隅而盜不獲者此朝廷之辱也因涕泣又詣中書揮涕言請奏起裴中丞為相大索賊黨窮其姦源戊申詔中外所在搜捕獲賊者賞錢萬緡官五品敢庇匿者舉族誅之於是京城大索公卿家有復壁重橑者皆索之復壁夾壁也重橑大屋覆小屋上下施椽其間皆可容物橑魯皓翻椽也史照憐蕭切成德軍進奏院有恆州卒張晏等數人行止無狀無狀者無善狀也恆戶登翻庚戌神策將軍王士則等告王承宗遣晏等殺元衡吏捕得晏等八人命京兆尹裴武監察御史陳中師鞫之癸亥詔以王承宗前後三表出示百僚議其罪裴度病瘡臥二旬詔以衛兵宿其第中使問訊不絶或請罷度官以安恆鄆之心上怒曰若罷度官是奸謀得成朝廷無復綱紀吾用度一人足破二賊史言憲宗明斷故能成功甲子上召度入對乙丑以度為中書侍郎同平章事度上言淮西腹心之疾不得不除且朝廷業已討之兩河藩鎮跋扈者將視此為高下不可中止上以為然悉以用兵事委度討賊甚急初德宗多猜忌朝士有相過從者過古禾翻金吾皆伺察以聞伺相吏翻宰相不敢私第見客度奏今寇盜未平宰相宜招延四方賢才與參謀議始請於私第見客許之陳中師按張晏等具服殺武元衡張弘靖疑其不實屢言於上上不聽戊辰斬晏等五人殺其黨十四人李師道客竟潛匿亡去考異曰舊張弘靖傳曰初盜殺元衡京師索賊未得時王承宗邸中有鎮卒張晏輩數人行止無狀人多意之詔録付御史臺御史陳中師按之皆附致其罪如京中所說弘靖疑其不直驟於上前言之憲宗不聽及田弘正入鄆按簿書亦有殺元衡者但事曖昧互有所說卒未得其實按舊呂元膺傳獲李師道將訾嘉珍門察皆稱害武元衡者然則元衡之死必師道所為也但以元衡叱尹少卿及承宗上表詆元衡故時人皆指承宗耳今從薛圖存河南記十年秋七月庚午朔靈武節度使李光進薨光進與弟光顏友善光顏先娶其母委以家事母卒光進後娶光顏使其妻奉管籥籍財物歸于其姒毛晃曰杜預云兄弟之妻相謂曰姒蓋妯娌相呼以身年長少為名年長曰姒少曰娣不以夫之長幼也今俗呼兄之妻曰姒弟之妻曰娣姒音詳里翻新婦逮事先姑先姑命主家事不可易也因相持而泣十年甲戌詔數王承宗罪惡數所具翻絶其朝貢曰冀其翻然改過束身自歸攻討之期更俟後命十年八月己亥朔日有食之十年李師道置留後院於東都本道人雜沓往來吏不敢詰本道人謂兗鄆淄青人也防禦兵悉屯伊闕師道潛內兵於院中至數十百人謀焚宮闕縱兵殺掠已烹牛饗士明日將發其小卒詣留守呂元膺告變元膺亟追伊闕兵圍之賊衆突出防禦兵踵其後不敢迫呂元膺以東都防禦使為留守其所統兵曰防禦兵望山而遁唐六典東都城南面三門中曰定鼎左曰長夏右曰厚載東面三門中曰建春南曰永通北曰上東北面二門東曰安喜西曰徽安西連禁苑苑西四門南迎秋次遊義次籠煙北靈溪考異曰河南記曰賊帥訾嘉珍果於東都留後院潛召募一百餘人兼造置兵仗部署已定會門子健兒有小過被笞責之遂使兄弟一人告河南府當時飭兩縣驅丁壯悉持弓矢刀棒圍興道坊院數重賊黨迫蹙遞相蹂四面矢下如雨俄然殄滅因縱火焚其院宇悉為煨燼今從實録留守兵寡弱元膺坐皇城門唐六典東都皇城在都城西北隅南面三門中曰端門左曰左掖門右曰右掖門東面一門曰賓耀西面二門南曰麗景北曰宣耀元膺蓋坐於左掖門下分扶問翻意氣自若都人賴以安東都西南接鄧虢九域志河南府西南抵虢州界三百二十五里稍南抵鄧州界六百里民不耕種專以射獵為生人皆趫勇趫丘妖翻捷也謂之山棚元膺設重購以捕賊數日有山棚鬻鹿賊遇而奪之山棚走召其儕類儕士皆翻且引官軍共圍之谷中盡獲之按驗得其魁乃中嶽寺僧圓淨故嘗為史思明將勇悍過人為師道謀多買田於伊闕陸渾之間以舍山棚而衣食之為師于僞翻舍始夜翻有訾嘉珍門察者訾即移翻姓也門亦姓也潛部分以屬圓淨圓淨以師道錢千萬陽為治佛光寺分扶問翻治直之翻下同結黨定謀約令嘉珍等竊發城中圓淨舉火於山中集二縣山棚入城助之二縣陸渾伊闕也捕者既得之奮鎚擊其脛不能折鎚直追翻脛戶定翻腳脛釋名曰脛莖也直而長似物莖折而設翻圓淨罵曰鼠子折人脛且不能敢稱健兒乃自置其脛教使折之臨刑歎曰誤我事不得使洛城流血黨與死者凡數千人留守防禦將二人留守兵之將及防禦兵之將也職名李師道私所署衙前管軍職名給帖者也元膺鞫訾嘉珍門察始知殺武元衡者乃師道也元膺密以聞以檻車送二人詣京師上業已討王承宗不復窮治復扶又翻元膺上言近日藩鎮跋扈不臣有可容貸者至於師道謀屠都城燒宮闕悖逆尤甚不可不誅悖蒲內翻又蒲沒翻上以為然而方討吳元濟絶王承宗故未暇治師道也史說得憲宗心事出十年乙丑李光顏敗於時曲十年初上以嚴綬在河東所遣裨將多立功謂李光顏等也襄陽山南東道節度治所綬無他材能到軍之日傾府庫賚士卒纍年之積一朝而盡又厚賂宦官以結聲援擁八州之衆萬餘人屯境上八州襄鄧唐隨均房郢復無尺寸功裴度屢言其軍無政九月癸酉以韓弘為淮西諸軍都統弘樂於自亶樂音洛欲倚賊自重不願淮西速平考異曰舊傳曰弘鎮汴州當兩河賊之衝要朝廷慮其異志欲以兵柄授之而令李光顏烏重胤實當旗鼓乃授弘淮西諸軍行營都統弘雖居統帥常不欲諸軍立功陰為逗撓之計每聞獻捷輒數日不怡其危國邀功如是按弘承宣武積亂之後鎮定一方居強寇之間威望甚著若有異志與諸鎮連衡跋扈如反掌耳然觀其始末未嘗失臣節朝廷若疑其有異志而更用為都統則光顏重胤更受其節制非所以防之也且數日不怡有何狀可尋恐毀之過其實耳今從其可信者弘欲結其歡心舉大梁城索得一美婦人宣武節度治大梁索山客翻飾以珠玉金翠直數百萬錢遣使遺之遺唯季翻使者先致書光顏大章甲十一行本大上有乃字乙十一行本同孔本同張校同饗將士使者進妓容色絶世一座盡驚光顏謂使者曰相公愍光顏羈旅賜以美妓荷德誠深妓渠綺翻荷下可翻然戰士數萬皆棄家遠來冒犯白刃光顏何忍獨以聲色自娛悅乎因流涕座者皆泣座恐當作坐為文從字順並妓返之曰為光顏多謝相公繒慈陵翻為于僞翻光顏以身許國誓不與逆賊同戴日月死無二矣十年冬十月庚子始分山南東道為兩節度以戶部侍郎李遜為襄復郢均房節度使以右羽林大將軍高霞寓為唐隨鄧節度使朝議以唐與蔡接故使霞寓專事攻戰而遜調五州之賦以餉之調徒弔翻十年辛丑刑部侍郎權德輿奏自開元二十五年修格式律令事類後唐六典敍文法之名格二十四篇式三十三篇律十二篇令二十七篇會要曰開元二十五年刪緝成律十二卷律疏三十卷式二十卷開元新格十卷又撰格式律令事類四十卷以類相從便於省覽近刪定為三十卷請施行從之會要開元十九年裴光庭等奏令有司刪撰格後長行敕六卷今又刪定二十五年以後長行敕為三十卷十年上雖絶王承宗朝貢未有詔討之魏博節度使田弘正屯兵於其境承宗屢敗之敗補邁翻下同弘正忿表請擊之上不許表十上上時掌翻乃聽至貝州丙午弘正軍于貝州十年庚戌東都奏盜焚柏崖倉宋白曰河清縣有柏崖城杜佑曰柏崖城侯景所築在河清縣西十年十一月壽州刺史李文通奏敗淮西兵壬申韓弘請命衆軍合攻淮西從之李光顏烏重胤敗淮西兵於小殷水拔其城乙亥以嚴綬為太子少保以討淮西無功也盜焚襄州佛寺軍儲盡徙京城積草於四郊以備火丁丑李文通敗淮西兵於固始固始前漢汝南郡之寖縣春秋之寖丘後漢更名固始唐屬光州九域志在州東北一百四十五里戊寅盜焚獻陵寢宮永巷十年詔發振武兵二千會義武軍以討王承宗十年己丑吐蕃款隴州塞請互市許之十年初吳少陽聞信州人吳武陵名邀以為賓友武陵不答及元濟反武陵以書諭之曰足下勿謂部曲不我欺人情與足下一也足下反天子人亦欲反足下易地而論則其情可知矣十年丁酉武寧節度使李願奏敗李師道之衆時師道數遣兵攻徐州數所角翻敗蕭沛數縣敗補邁翻蕭沛皆漢縣唐屬徐州九域志蕭在州西五十里沛在州西北一百四十里願悉以步騎委都押牙溫人王智興擊破之十二月甲辰智興又破師道之衆斬首二千餘級逐北至平陰而還平陰古肥子國漢肥城縣之地隋開皇十四年置榆山縣大業初改曰平陰取界內平陰古城為名時屬鄆州九域志在州東北一百二十里還從宣翻又如字晟之子也十年東都防禦使呂元膺請募山棚以衛宮城從之十年乙丑河東節度使王鍔薨十年王承宗縱兵四掠幽滄定三鎮皆苦之爭上表請討承宗上欲許之中書侍郎同平章事張弘靖以為兩役並興兩役謂既討淮西又討恆冀也請併力平淮西乃征恆冀恆戶登翻上不為之止為于僞翻弘靖乃求罷十一年十一年春正月己巳以弘靖同平章事充河東節度使據章鈺資治通鑑校宋記補十一年幽州節度使劉總奏敗成德兵拔武強斬首千餘級敗補邁翻十一年庚辰翰林學士中書舍人錢徽駕部郎中知制誥蕭俯各解職守本官時㣥臣請罷兵者衆上患之故黜徽俯以警其餘徽吳人也十一年癸未制削王承宗官爵命河東幽州義武橫海魏博昭義六道進討韋貫之屢請先取吳元濟後討承宗曰陛下不見建中之事乎始於討魏及齊而蔡燕趙皆應卒致朱泚之亂事見二百二十六卷止二百二十八卷卒子恤翻欲太平之功速成故也上不聽佳兵者不祥之器張弘靖韋貫之之言蓋未可厚非十一年甲申盜斷建陵門戟四十七枝斷音短十一年二月西川奏吐蕃贊普卒新贊普可黎可足立十一年乙巳以中書舍人李逢吉為門下侍郎同平章事逢吉玄道之曾孫也李玄道事太宗為文學館學士十一年乙卯昭義節度使郗士美奏破成德兵郗丑之翻斬首千餘級十一年南詔勸龍晟淫虐不道上下怨疾弄棟節度王嵯巔弒之立其弟勸利勸利德嵯巔賜姓蒙氏謂之大容容蠻言兄也南詔置弄棟節度於唐姚州之地程大昌曰南詔有六節度曰弄棟永昌銀生劍川拓東麗水南詔王姓蒙氏嵯昨何翻巔音顛十一年己未劉總破成德兵斬首千餘級十一年荊南節度使袁滋父祖墓在朗山袁茲陳袁憲之後陳亡憲入中國後居蔡州朗山縣宋白曰朗山漢安昌縣漢末改朗山以界內朗山為名劉昫曰朗山漢安昌縣隋改朗山杜佑曰朗山漢朗陵縣宋避聖祖諱改朗山為確山欲勸上罷兵行至鄧州聞蕭俯錢徽貶官及見上更以必克勸之更工衡翻僅得還鎮十一年辛酉魏博奏敗成德兵拔其固城乙丑又奏拔其鴉城固城鴉城當在冀州南宮縣界十一年三月庚午太后崩太后王氏上之母也辛未敕以國哀諸司公事權取中書門下處分只令宰相參決百司公事處昌呂翻分扶問翻唐中世以來天子崩置攝冢宰倣古者百官總己以聽于冢宰之制然非能盡行古道也十一年壽州團練使李文通奏敗淮西兵於固始拔山五高翻又五到翻己卯唐鄧節度使高霞寓奏敗淮西兵於朗山斬首千餘級焚二柵十一年幽州節度使劉總圍樂壽十一年夏四月庚子李光顏烏重胤奏敗淮西兵於陵雲柵陵雲柵在殷水西南郾城東北蔡人立柵於此以陵雲為名十一年辛亥司農卿皇甫鎛以兼中丞權判度支鎛始以聚斂得幸鎛補各翻斂力贍翻十一年乙卯劉總奏破成德兵於深州斬首二千五百級乙丑義武節度使渾鎬奏破成德兵於九門殺千餘人鎬瑊之子也渾瑊事肅代德有大功十一年宥州軍亂逐刺史駱怡夏州節度使田進討平之十一年五月壬申李光顏烏重胤奏敗淮西兵於陵雲柵斬首二千餘級十一年六月甲辰高霞寓大敗於鐵城僅以身免據舊書霞寓自蕭陂進至文城柵遇伏而敗意鐵城即文城柵以其堅不可破故謂之鐵城耳宋白曰鐵城在新興柵東北新興柵在吳房縣西南文城東北勝則虛張殺獲敗則匿之至是大敗不可掩始上聞上時掌翻中外駭愕宰相入見見賢遍翻將勸上罷兵上曰勝負兵家之常今但當論用兵方略察將帥之不勝任者易之不勝音升兵食不足者助之耳豈得以一將失利遽議罷兵邪於是獨用裴度之言他人言罷兵者亦稍息矣己酉霞寓退保唐州上責高霞寓之敗霞寓稱李遜應接不至李遜主餉霞寓軍因得以罪歸之七月章甲十一行本月下有丁丑二字乙十一行本同孔本同張校同貶霞寓為歸州刺史歸州古之秭歸吳立建平郡唐置歸州京師南二千二百六十八里恩王連代宗之子以荊南節度使袁滋為彰義節度申光蔡唐隨鄧觀察使以唐州為理所壬午宣武軍奏破郾城之衆二萬殺二千餘人捕虜千餘人十一年田弘正奏破成德兵於南宮殺二千餘人十一年中書侍郎同平章事韋貫之性高簡好甄別流品好呼到翻甄稽延翻察也別彼列翻又數請罷用兵數所角翻左補闕張宿毀之於上云其朋黨八月壬寅貫之罷為吏部侍郎十一年諸軍討王承宗者互相觀望獨昭義節度使郗士美引精兵壓其境己未士美奏大破承宗之衆於柏鄉殺千餘人降者亦如之為三壘以環柏鄉柏鄉漢縣屬巨鹿郡故城在今縣西南十七里今治在彭水之陽隋所置也屬趙州宋白曰趙州柏鄉縣春秋時晉鄗邑地漢置鄗縣光武改曰高邑北齊天保六年移高邑縣於漢房子縣東界今高邑縣是也隋開皇十六年於漢縣故城南十八里置柏鄉縣遙取漢柏鄉之名宋省柏鄉為鎮屬高邑環音宦十一年庚申葬莊憲皇后于豐陵從順宗也十一年九月乙亥右拾遺獨孤朗坐請罷兵貶興元府倉曹朗及之子也獨孤及事代宗為文長於論議十一年饒州大水漂失四千七百戶十一年丙子以韋貫之為湖南觀察使猶坐前事也前事謂請罷用兵也辛巳以吏部侍郎韋顗考功員外郎韋處厚等皆為遠州刺史張宿讒之以為貫之之黨也顗見素之孫韋見素天寶末為相敻之九世孫也韋敻後周韋孝寬之兄敻翾正翻十一年乙酉李光顏烏重胤奏拔吳元濟陵雲柵丁亥光顏又奏拔石越二柵壽州奏敗殷城之衆拔六柵殷城漢期思縣屬汝南郡宋置苞信縣隋改曰殷城唐屬光州按九域志固始縣有殷城鎮十一年冬十一月壬戌朔容管奏黃洞蠻為寇乙丑雍管奏擊黃洞蠻卻之復賓蠻等州賓蠻當作賓巒武德四年以故秦桂林郡地置淳州永貞元年更名巒州十一年丙寅加幽州節度使劉總同平章事十一年李師道聞拔陵雲柵而懼詐請輸款上以力未能討加師道檢校司空十一年王鍔家二奴告鍔子稷改父遺表匿所獻家財去年王鍔薨新書儀衛志凡朝會之仗三衛番上分為五仗號衙內五衛一曰供奉仗以左右衛為之二曰親仗以親衛為之三曰勳仗以勳衛為之四曰翊仗以翊衛為之五曰散手仗以親勳翊衛為之皆帶刀捉仗列坐東西廊下每月以四十六人立內廊閣外號曰內仗以左右金吾將軍當上中郎將一人押之裴度諫曰王鍔既沒其所獻之財已為不少今又因奴告檢括其家臣恐諸將帥聞之各以身後為憂上遽止使者己巳以二奴付京兆杖殺之十一年庚子以給事中柳公綽為京兆尹公綽初赴府赴京兆府初治事也公綽駐馬杖殺之明日入對延英上色甚怒詰其專殺之狀對曰陛下不以臣無似無似猶言不肖也京兆為輦轂師表今視事之初而小將敢爾唐突此乃輕陛下詔命非獨慢臣也臣知杖無禮之人不知其為神策軍將也上曰何不奏對曰臣職當杖之不當奏上曰誰當奏者對曰本軍當奏若死於街衢金吾街使當奏金吾左右街使各一人掌分察六街徼巡凡城內坊角有武候鋪衛士彍騎分守大城門百人大鋪三十人小城門二十人小鋪五人日暮鼓八百聲而門閉乙夜街使以騎卒巡行叫呼武官暗探五更二點鼓自內發諸街鼓承振坊市門皆啓鼓三千檛而止左右巡使當奏程大昌雍録曰長安四郭之內縱橫皆十坊大率當為百坊亦有一面不啻十坊者故六典曰一百一十坊也坊皆有垣有門隨晝夜鼓聲以行啓閉巡使掌左右街百坊之內謹啓閉徼巡者也宋白曰廣德二年九月命御史中丞兼戶部侍郎王延昌充左巡使御史中丞源休充右巡使辛亥源休充都左右巡使元和八年薛存誠奏得兩巡御史狀以承平舊例兩街本屬臺司其所由每月衙集動靜申報如所報差繆舉勘悉在臺中又按唐監察御史十員裏行五員掌內外糾察分為左右巡糾察違失以承天朱雀街為界每月一代將晦即巡刑部大理東西徒坊金吾及縣獄退謂左右曰汝曹須作意此人言須為此人作意務自謹敕考異曰柳氏敍訓曰公穆宗朝為大京兆有禁軍校冒騶卒唱駐馬斃之明日延英對上云云朝退上顧左右曰爾輩大須作意如此神采我亦怕他因話録曰憲宗正色詰公專殺之狀公曰京兆尹在取則之地臣初受陛下獎擢軍中偏裨躍馬衝過此乃輕陛下法不獨試臣臣杖無禮之人不打神策軍將按公綽憲宗穆宗朝俱嘗為京兆尹此事恐非穆宗所能為敍訓之誤也今從因話録十一年討淮西諸軍近九萬近其靳翻上怒諸將久無功辛巳命知樞密梁守謙宣慰因留監其軍授以空名告身五百通及金帛以勸死事庚寅先加李光顏等檢校官而詔書切責示以無功必罰十一年辛卯李文通奏敗淮西兵於固始斬首千餘級十一年十二月壬寅程執恭奏敗成德兵於長河長河漢信都廣川縣地隋於廣川縣東八十里置長河縣元和四年移就白橋於永濟河西岸置縣十年又置於河東小胡城屬德州十一年義武節度使渾鎬與王承宗戰屢勝遂引全師壓其境距恆州三十里而軍恆戶登翻承宗懼潛遣兵入鎬境焚掠城邑人心始內顧而搖會中使督其戰鎬引兵進薄恆州薄伯各翻與承宗戰大敗奔還定州九域志恆州至定州一百三十五里丙午詔以易州刺史陳楚為義武節度使軍中聞之掠鎬及家人衣至於倮露倮郎果翻陳楚馳入定州易州南至定州百四十里斂軍中衣以歸鎬斂軍中所掠鎬家之衣也朝直遙翻楚定州人張茂昭之甥也史言河朔之人習於叛亂知奉其帥之親黨而已十一年丁未以翰林學士王涯為中書侍郎同平章事十一年袁滋至唐州去斥候去羌呂翻止其兵不使犯吳元濟境袁滋所謂開門揖盜者也新興柵當在唐州東北界新立之以備蔡人元濟由是不復以滋為意復扶又翻朝廷知之甲寅以太子詹事李訴為唐隨鄧節度使訴聽之兄也訴聽皆李晟之子十一年初置淮潁水運使楊子院米自淮陰泝淮入潁至項城入殷據舊史時運米泝淮至壽州四十里入潁口又泝流至潁州沈丘界五百里至于項城又泝流五百里入殷河又三百里輸于郾城得米五十萬石茭五百萬束省汴運之費七萬六千緡項城漢項縣屬汝南郡唐屬陳州九域志在州東南七十里據水經注殷水汝水之別流潁水至古南頓縣與殷水合唐之殷水縣漢汝陽縣地也以饋討淮西諸軍省汴運之費七萬餘緡郾音偃十一年己未容管奏黃洞蠻屠巖州容管統容辨白牢欽巖禺湯瀼古等州容肇祖標點聶崇岐覆校
