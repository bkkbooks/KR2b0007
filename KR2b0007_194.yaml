body:
  text: 資治通鑑卷第一百九十四端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀十太宗文武大聖大廣孝皇帝上之下貞觀六年貞觀六年壬辰六三二觀古玩翻貞觀六年春正月乙卯朔日有食之貞觀六年癸酉靜州獠反將軍李子和討平之獠魯皓翻貞觀六年文武官復請封禪復扶又翻去年諸州朝集使請封禪上曰卿輩皆以封禪為帝王盛事朕意不然若天下乂安家給人足雖不封禪庸何傷乎昔秦始皇封禪見七卷始皇二十八年後世豈以文帝之賢不及始皇邪邪音耶且事天掃地而祭禮記郊特牲曰郊之祭也大報天也兆於南郊就陽位也掃地而祭於其質也封數尺之土然後可以展其誠敬乎㣥臣猶請之不已上亦欲從之魏徵獨以為不可考異曰實録唐書志及唐統紀皆以為太宗自不欲封禪而魏文貞公故事及王方慶文貞公傳録以為太宗欲封太山徵諫而止意頗不同今兩存之公不欲朕封禪者以功未高邪曰高矣德未厚邪曰厚矣中國未安邪曰安矣四夷未服邪曰服矣年穀未豐邪曰豐矣符瑞未至邪曰至矣然則何為不可封禪對曰陛下雖有此六者然承隋末大亂之後戶口未復倉廩尚虛而車駕東巡千乘萬騎乘繩證翻騎奇寄翻其供頓勞費未易任也易以豉翻任音壬且陛下封禪則萬國咸集遠夷君長皆當扈從長知兩翻從才用翻今自伊洛以東至于海岱煙火尚希灌莽極目灌木叢生也莽草深茂也示之以虛弱也況賞賚不資未厭遠人之望給復連年不償百姓之勞厭於協翻復方目翻崇虛名而受實害陛下將焉用之焉於虔翻會河南北數州大水事遂寢貞觀六年上將幸九成宮通直散騎常侍姚思廉諫散悉亶翻騎奇寄翻朕有氣疾暑輒頓劇往避之耳賜思廉絹五十匹監察御史馬周上疏監古銜翻上時掌翻以為東宮在宮城之中而大安宮乃在宮城之西此因大安宮在西遂謂帝所居為東宮耳尚為卑小於四方觀聽有所不足宜增修高大以稱中外之望稱尺證翻又太上皇春秋已高陛下宜朝夕視膳今九成宮去京師三百餘里太上皇或時思念陛下陛下何以赴之又車駕此行欲以避暑太上皇尚留暑中而陛下獨居涼處溫凊之禮竊所未安記曲禮凡為人子之禮冬溫而夏凊凊音七正翻不可復止復扶又翻願速示返期以解衆惑又王長通白明達皆樂工韋槃提斛斯正止能調馬縱使技能出衆正可賚之金帛豈得超授官爵鳴玉曳履與士君子比肩而立同坐而食使渠綺翻坐徂臥翻臣竊恥之上深納之貞觀六年上以新令無三師官二月丙戌詔特置之唐以太師太傅太保為三師正一品天子所師法無所總職貞觀六年三月戊辰上幸九成宮貞觀六年庚午吐谷渾寇蘭州吐從暾入聲谷音浴貞觀六年長樂公主將出降唐會要長樂公主下嫁長孫沖樂音洛皇后所生特愛之敕有司資送倍於永嘉長公主永嘉長公主高祖女下嫁竇奉節又嫁賀蘭僧伽唐制皇姑為大長公主正一品姊為長公主女為公主皆視一品長知兩翻下同昔漢明帝欲封皇子曰我子豈得與先帝子比皆令半楚淮陽事見四十五卷漢明帝永平十五年倍於長主得無異於明帝之意乎上然其言入告皇后后歎曰妾亟聞陛下稱重魏徵亟去吏翻不知其故今觀其引禮義以抑人主之情乃知真社稷之臣也妾與陛下結髮為夫婦曲承恩禮每言必先候顏色不敢輕犯威嚴況以人臣之疏遠乃能抗言如是陛下不可不從因請遣中使齎錢四百緡絹四百匹以賜徵使疏吏翻考異曰舊文德皇后傳云使齎帛五百匹詣徵第賜之魏文貞公故事云遣中使齎錢二十萬絹百匹詣公宅宣命今從舊魏徵傳且語之曰語牛倨翻聞公正直乃今見之故以相賞公宜常秉此心勿轉移也上嘗罷朝怒曰會須殺此田舍翁朝直遙翻后問為誰上曰魏徵每廷辱我后退具朝服立于庭唐制皇后之服褘衣者受册助祭朝會大事之服也深青織成為之畫翬赤質五色十二等素紗中單黼領朱羅縠褾襈蔽膝隨裳色以緅領為緣用翟為章三等青衣革帶大帶隨衣色裨紐約佩綬如天子青襪舄加金飾首飾大小華十二樹以象袞冕之旒又有兩博鬢朝直遙翻褾彼小翻袖專襈皺戀翻緣也緅仄鳩翻后曰妾聞主明臣直今魏徵直由陛下之明故也妾敢不賀上乃悅貞觀六年夏四月辛卯襄州都督鄒襄公張公謹卒卒子恤翻明日上出次發哀有司奏辰日忌哭彭祖百忌辰不哭泣君之於臣猶父子也情發於衷安避辰日遂哭之貞觀六年六月己亥金州刺史酆悼王元亨薨金州西城郡梁置南梁州西魏置東梁州尋改曰金州辛亥江王囂薨貞觀六年秋七月丙辰焉耆王突騎支遣使入貢初焉耆入中國由磧路隋末閉塞道由高昌突騎支請復開磧路以便往來騎奇寄翻使疏吏翻磧七迹翻塞悉則翻復扶又翻又音如字上許之由是高昌恨之遣兵襲焉耆大掠而去焉耆國東鄰高昌為討高昌張本貞觀六年辛未宴三品已上於丹霄殿上從容言曰從千容翻中外乂安皆公卿之力然隋煬帝威加夷夏夏戶雅翻頡利跨有北荒頡奚結翻統葉護雄據西域今皆覆亡此乃朕與公等所親見勿矜強盛以自滿也貞觀六年西突厥肆葉護可汗發兵擊薛延陀為薛延陀所敗厥九勿翻可從刊入聲汗音寒敗補邁翻肆葉護性猜狠信讒有乙利可汗功最多乙利西突厥小可汗也狠戶墾翻誅滅之由是諸部皆不自保肆葉護又忌莫賀設之子泥孰陰欲圖之泥孰奔焉耆設卑達官與弩失畢二部攻之舊傳作設卑達官考異曰新傳作沒卑達干今從舊傳尋卒肆葉護立見上卷三年騎奇寄翻卒子恤翻是為咄陸可汗遣使內附咄常沒翻可從刊入聲汗音寒使疏吏翻丁酉遣鴻臚少卿劉善因立咄陸為奚利邲咄陸可汗臚陵如翻少始照翻邲毗必翻咄陸即阿史那彌射此當參觀高宗顯慶二年考異而詳辨之考異曰舊傳册為吞阿妻狀奚利邲咄陸可汗新傳册號吞阿婁拔利邲咄陸可汗今從實録貞觀六年閏月乙卯上宴近臣於丹霄殿長孫無忌曰王圭魏徵昔為仇讎謂其事隱太子勸之圖帝也上曰徵圭盡心所事故我用之然徵每諫我不從我與之言輒不應何也魏徵對曰臣以事為不可故諫陛章十二行本陛上有若字乙十一行本同下不從而臣應之則事遂施行故不敢應上曰且應而復諫庸何傷復扶又翻對曰昔舜戒㣥臣爾無面從退有後言書益稷之言乃面從也豈稷契事舜之意邪契息列翻上大笑曰人言魏徵舉止疏慢我視之更覺嫵媚嫵罔甫翻嫵亦媚也正為此耳為于偽翻徵起拜謝曰陛下開臣使言故臣得盡其愚若陛下拒而不受臣何敢數犯顏色乎數所角翻貞觀六年戊辰祕書少監虞世南上聖德論上時掌翻上賜手詔稱卿論太高朕何敢擬上古但比近世差勝耳然卿適覩其始未知其終若朕能慎終如始則此論可傳如或不然恐徒使後世笑卿也貞觀六年九月己酉幸慶善宮上生時故宅也以高祖武功舊第為慶善宮賦詩起居郎清平呂才清平縣屬博州劉昫曰本漢貝丘縣隋曰清平被皮義翻命曰功成慶善樂使童子八佾為九功之舞大宴會與破陳舞偕奏於庭才有巧思故命以所賦詩被之管絃以為樂章以童子六十四人冠進德冠紫袴褶長袖漆髻屣履而舞號九功舞進蹈安徐以象文德破陳樂號七德舞擊刺往來發揚蹈厲以象武功陳讀曰陳同州馮翊郡尉紆勿翻敬德怒曰汝何功坐我上任城王道宗次其下諭解之敬德拳毆道宗目幾眇任音壬毆烏口翻幾居希翻考異曰唐曆云嘗因內宴於御前毆宇文士及曰汝有何功合居吾上太宗慰諭之方止今從舊傳上不懌而罷謂敬德曰朕見漢高祖誅滅功臣意常尤之故欲與卿等共保富貴令子孫不絶令力丁翻然卿居官數犯法乃知韓彭葅醢非高祖之罪也國家綱紀唯賞與罰非分之恩不可數得分扶問翻數所角翻勉自修飭無貽後悔敬德由是始懼而自戢戢阻立翻貞觀六年冬十月乙卯車駕還京師帝侍上皇宴於大安宮帝與皇后更獻飲膳及服御之物更工衡翻夜久乃罷帝親為上皇捧輿至殿門為于偽翻上皇不許命太子代之貞觀六年突厥頡利可汗鬱鬱不得意數與家人相對悲泣容貌羸憊厥九勿翻頡奚結翻可從刊入聲汗音寒數所角翻羸倫為翻憊蒲拜翻上見而憐之以虢州地多麋鹿義寧元年分弘農二縣置虢州虢郡宋白曰帝王世紀云虢有三周封虢仲於西虢虢州之地也封虢叔於東虢今成皋也陝郡平陸是北虢乃以頡利為虢州刺史頡利辭不願往癸未復以為右衛大將軍復扶又翻下勿復不復同又音如字貞觀六年十一月辛巳契苾酋長何力帥部落六千餘家詣沙州降詔處之於甘涼之間契欺結翻苾毗必翻酋慈由翻長知兩翻帥讀曰率降戶江翻處昌呂翻甘涼相去五百里以何力為左領軍將軍貞觀六年庚寅以左光祿大夫陳叔達為禮部尚書帝謂叔達曰卿武德中有讜言見一百九十一卷高祖武德九年讜音黨善言直言也對曰臣見隋室父子相殘以取亂亡當日之言非為陛下為于偽翻乃社稷之計耳貞觀六年十二月癸丑帝與侍臣論安危之本中書令溫彥博曰伏願陛下常如貞觀初則善矣帝曰朕比來怠於為政乎觀古玩翻比毗至翻魏徵曰貞觀之初陛下志在節儉求諫不倦比來營繕微多諫者頗有忤旨此其所以異耳比毗至翻忤五故翻帝拊掌大笑曰誠有是事貞觀六年辛未帝親録繫囚見應死者閔之縱使歸家期以來秋來就死仍敕天下死囚皆縱遣使至期來詣京師貞觀六年是歲黨項羌前後內屬者三十萬口黨底朗翻貞觀六年公卿以下請封禪者前後相屬屬之欲翻上諭以舊有氣疾恐登高增劇公等勿復言復扶又翻貞觀六年上謂侍臣曰朕比來決事或不能皆如律令公輩以為事小不復執奏夫事無不由小而致大此乃危亡之端也比毗至翻夫音扶昔關龍逄忠諫而死逄皮江翻朕每痛之煬帝驕暴而亡公輩所親見也公輩常宜為朕思煬帝之亡朕常為公輩念關龍逄之死為于偽翻何患君臣不相保乎貞觀六年上謂魏徵曰為官擇人不可造次朱元晦曰造次急遽苟且之時造七到翻則君子皆至用一小人則小人競進矣對曰然天下未定則專取其才不考其行喪亂既平行下孟翻下同喪息浪翻則非才行兼備不可用也觀此則天下已定之後可不為官擇人乎七年七年春正月更名破陳樂曰七德舞更工衡翻左傳楚莊王曰武有七德禁暴戢兵保大定功安民和衆豐財故以為樂舞之名新志七德舞圖左圓右方先偏後伍交錯屈伸以象魚麗鵝鸛命呂才以圖教樂工百二十八人被銀甲執戟而舞凡三變每變為四陳象擊刺往來歌者和曰秦王破陳樂杜佑曰破陳樂舞圖左圓右方先偏後伍魚麗鵝鸛箕張翼舒交錯屈伸首尾回互以象戰陳之形凡為三變每變有四陳有來往疾徐擊刺之象以應歌節發揚蹈厲聲韻慷慨陳讀曰陳癸巳宴三品已上及州牧蠻夷酋長於玄武門奏七德九功之舞酋慈由翻長知兩翻太常卿蕭瑀上言七德舞形容聖功有所未盡瑀音禹上時掌翻請寫劉武周薛仁果竇建德王世充等擒獲之狀上曰彼皆一時英雄今朝廷之臣往往嘗北面事之若覩其故主屈辱之狀能不傷其心乎瑀謝曰此非臣愚慮所及魏徵欲上偃武修文每侍宴見七德舞輒俯首不視見九功舞則諦觀之俯音免諦都計翻審也七年三月戊子侍中王圭坐漏泄禁中語左遷同州刺史庚寅以祕書監魏徵為侍中七年直太史雍人李淳風雍縣屬岐州雍於用翻但有赤道請更造渾天黃道儀更工衡翻渾戶本翻許之癸巳成而奏之時李淳風上言舜在璿璣玉衡以齊七政則渾天儀也周禮土圭正日景以求地中有以見日行黃道之驗也暨于周末此器乃亡漢洛下閎作渾天其後賈逵張衡亦有之而推驗七曜並循赤道按冬至極南夏至極北而赤道常定於中國全蓋渾儀無黃道久矣上異其説因詔為之儀表裏三重下據準基上如十字末樹鼇足以張四表一曰六合儀有天經雙規金渾緯規金常規相結於四極之內列二十八宿十日干經緯三百六十五度二曰三辰儀圓徑八尺有璿璣規日月天宿矩列宿所行轉於六合之內三曰四遊儀圓玄以連結玉衡遊筒而貫約規矩又玄極樞南矩地軸傍轉於內玉衡在玄樞之間而南北遊仰以觀天之辰宿下以識器之晷度皆用銅為之七年夏五月癸未上幸九成宮七年雅州道行軍總管張士貴擊反獠破之雅州漢嚴道縣地隋廢州置臨邛郡唐復為雅州獠魯皓翻七年秋八月乙丑左屯衛大將軍譙敬公周範卒上行幸常令範與房玄齡居守卒子恤翻守式又翻範為人忠篤嚴正疾甚不肯出外竟終於內省與玄齡相抱而訣曰所恨不獲再奉聖顏七年辛未以張士貴為龔州道行軍總管使擊反獠龔州臨江郡漢猛陵縣地隋為永平郡武林縣貞觀三年置燕州於今州東仍於燕州之故所置龔州七年九月山東河南四十餘州水遣使賑之使疏吏翻賑津忍翻七年去歲所縱天下死囚凡三百九十人無人督帥皆如期自詣朝堂帥讀曰率朝直遙翻考異曰四年實録云天下斷死罪止二十九人今年實録乃有二百九十九人何頓多如此事已可疑又白居易樂府云死囚四百來歸獄舊本紀統紀年代記皆云二百九十人今從新書刑法志無一人亡匿者上皆赦之七年冬十月庚申上還京師七年十一月壬辰以開府儀同三司長孫無忌為司空長知兩翻無忌固辭曰臣忝預外戚恐天下謂陛下為私上不許曰吾為官擇人惟才是與為于偽翻苟或不才雖親不用襄邑王神符是也神符少威嚴不為下所畏又足不良于行由是歸第雖讎不棄魏徵等是也今日所舉非私親也七年十二月甲寅上幸芙蓉園景龍文館記芙蓉園在京師羅城東南隅本隋世之離宮也青林重復緑水瀰漫帝城勝景也丙辰校獵少陵原少陵原在長安城南屬萬年縣界少始照翻戊午還宮從上皇置酒故漢未央宮漢故未央宮在長安宮城北禁苑之西偏考異曰舊高祖紀八年閲武於城西高祖親自臨視還置酒於未央宮高祖實録不記年月據太宗實録八年正月頡利可汗死今從唐曆又命南蠻酋長馮智戴詠詩厥九勿翻頡奚結翻可從刊入聲汗音寒酋慈由翻長知兩翻既而笑曰胡越一家自古未有也帝奉觴上壽上時掌翻曰今四夷入臣皆陛下教誨非臣智力所及昔漢高祖亦從太上皇置酒此宮妄自矜大漢高祖十年置酒未央宮奉玉巵為太上皇壽曰始大人常以臣亡賴不能治産業不如仲力今某之業所就孰與仲多上皇大悅殿上皆呼萬歲七年帝謂左庶子于志寧右庶子杜正倫曰朕年十八猶在民間民之疾苦情偽無不知之及居大位區處世務猶有差失況太子生長深宮處昌呂翻長知兩翻百姓艱難耳目所未涉能無驕逸乎卿等不可不極諫太子好嬉戲頗虧禮法志寧與右庶子孔穎達數直諫好呼到翻數所角翻上聞而嘉之各賜金一斤帛五百匹七年工部尚書段綸奏徵巧工楊思齊上令試之綸使先造傀儡傀儡木偶戲也杜佑曰窟子亦曰傀磊子作偶人以戲善歌舞本喪樂也漢末始用之於嘉會北齊高緯尤所好閭市盛行焉余按列子偃師以此伎奉周穆王其來久矣傀口猥翻儡落猥翻得巧工庶供國事卿令先造戲具豈百工相戒無作淫巧之意邪月令孟春之月百工咸理監工日號毋或作為淫巧以蕩上心邪音耶唐制工部尚書正三品削其階則不得立於三品班中七年嘉陵州獠反嘉州眉山郡漢犍為南安縣地陵州陵山郡漢蜀郡廣都犍為郡武陽二縣東界之地獠魯皓翻唐揚州有邗江府兵邗胡安翻七年上問魏徵曰㣥臣上書可采及召對多失次何也臣上時掌翻對曰臣觀百司奏事常數日思之及至上前三分不能道一況諫者拂意觸忌拂與咈同豈敢盡其情哉上由是接㣥臣辭色愈溫嘗曰煬帝多猜忌臨朝對㣥臣多不語朝直遙翻朕則不然與㣥臣相親如一體耳八年八年春正月癸未突厥頡利可汗卒厥九勿翻頡奚結翻可從刊入聲汗音寒卒子恤翻命國人從其俗焚尸葬之八年辛丑行軍總管張士貴討東西王洞反獠平之東西王洞獠蓋在龔州界八年上欲分遣大臣為諸道黜陟大使使疏吏翻考異曰實録舊本紀但云遣蕭瑀等巡省天下按時止有十道而會要統紀皆云發十六道黜陟大使據姓名止十三人皆所未詳故但云諸道未得其人李靖薦魏徵上曰徵針規朕失不可一日離左右離力智翻乃命靖與太常卿蕭瑀等凡十三人分行天下察長吏賢不肖行下孟翻長知兩翻問民間疾苦禮高年賑窮乏章十二行本乏下有褒善良三字乙十一行本同退齋校同賑津忍翻起久淹章十二行本久作滯乙十一行本同孔本作淹滯退齋校同熊校同俾使者所至如朕親覩八年三月庚辰上幸九成宮八年夏五月辛未朔日有食之八年初吐谷渾可汗伏允吐從暾入聲谷音浴可從刊入聲汗音寒考異曰實録十年立諾曷鉢詔稱伏允為順步薩鉢今從舊傳未返大掠鄯州而去使疏吏翻宋白曰鄯州西南至廓州廣城縣故承風嶺吐谷渾界一百九十五里上遣使讓之徵伏允入朝稱疾不至鄯時戰翻朝直遙翻仍為其子尊王求婚上許之令其親迎為于偽翻迎魚敬翻尊王又不至乃絶婚伏允又遣兵寇蘭廓二州蘭州金城郡以皋蘭山名州信其臣天柱王之謀數犯邊數所角翻又執唐使者趙德楷上遣使諭之十返又引其使者臨軒親諭以禍福伏允終無悛心悛丑緣翻六月遣左驍衛大將軍段志玄為西海道行軍總管左驍衛將軍樊興為赤水道行軍總管將邊兵及契苾黨項之衆以擊之吐谷渾中有赤水城近河源驍堅堯翻將邊即亮翻契欺訖翻苾毗必翻黨底朗翻考異曰實録六年三月吐谷渾寇蘭州不云遣志玄擊之吐谷渾寇蘭廓二州無年月新本紀此夏遣志玄實録十月志玄破吐谷渾故參酌置此又新書本紀是夏吐谷渾寇涼州遣志玄等伐之實録十月辛丑志玄破吐谷渾而不書遣將日月新紀亦無破吐谷渾月日實録寇涼州在十一月今參用之八年秋七月山東河南淮海之間大水八年上屢請上皇避暑九成宮上皇以隋文帝終於彼惡之九成宮即隋之仁壽宮隋文帝仁壽四年崩於仁壽宮惡烏路翻十月營大明宮大明宮在禁苑東南西接宮城之東北隅曰東內程大昌曰大明宮地本太極宮之後苑東南面射殿也地在龍首山上龍朔二年高宗染風痹惡太極宮卑下就修大明宮改曰蓬萊宮未成而上皇寢疾不果居八年辛丑段志玄擊吐谷渾破之追奔八百餘里去青海三十餘里吐谷渾中有青海闞駰曰漢金城郡臨羌縣西有卑禾羌海世謂之青海東去西平二百五十里西平唐鄯州也吐從暾入聲谷音浴八年甲子上還京師八年右僕射李靖以疾遜位許之十一月辛未以靖為特進封爵如故祿賜吏卒並依舊給俟疾小瘳瘳丑留翻每三兩日至門下中書平章政事唐初政事堂在門下省歐陽修曰平章事之名始此八年甲申吐蕃贊普棄宗弄讚考異曰太宗實録贊普作贊府高宗實録棄宗作器宗今從舊傳仍請婚使疏吏翻吐蕃在吐谷渾西南近世浸強蠶食他國土宇廣大勝兵數十萬勝音升然未嘗通中國其王稱贊普俗不言姓王族皆曰論宦族皆曰尚吐蕃本西羌屬蓋百有五十種散處河湟江岷間有發羌唐旄等未始與中國通居析支水西祖曰鶻提勃悉野健武多智稍並諸羌據其地蕃發聲近故其子孫曰吐蕃而姓勃窣野或曰南涼禿髮烏孤之後二子曰樊尼曰傉檀為乞伏熾盤所滅樊尼挈殘部降沮渠蒙遜沮渠滅樊尼率兵西濟河踰積石遂撫有㣥羌云其俗謂強雄曰贊丈夫曰普故號君長為贊普其地直長安八千里距鄯善五百里劉昫曰吐蕃禿髮氏之後語訛曰吐蕃宋白曰樊尼奔沮渠蒙遜署臨松郡丞沮渠滅建國西土改姓勃窣野時人謂丞為贊府語訛為贊普吐從暾入聲四鄰畏之上遣使者馮德遐往慰撫之八年丁亥吐谷渾寇涼州己丑下詔大舉討吐谷渾考異曰舊傳云吐谷渾拘趙德楷太宗遣使宣諭十餘返竟無悛心九年詔李靖等討伐太宗實録己丑吐谷渾拘我行人趙德楷即下此詔十二月遣李靖等今從實録據舊傳拘德楷在前據實録先遣使宣諭後拘德楷即下詔伐之今兩存之為其老重勞之重難也以其年老難勞之以征伐之事也將即亮翻為于偽翻請行上大悅十二月辛丑以靖為西海道行軍大總管節度諸軍兵部尚書侯君集為積石道刑部尚書任城王道宗為鄯善道涼州都督李大亮為且末道岷州都督李道彥為赤水道利州刺史高甑生為鹽澤道行軍總管西海鄯善且末皆隋破吐谷渾所置郡名積石山在隋河源郡赤水城亦在河源郡鹽池在西海郡任音壬鄯時戰翻且子餘翻八年帝聘隋通事舍人鄭仁基女為充華充華舊有之唐六宮之職無此官册使將發使疏吏翻魏徵聞其嘗許嫁士人陸爽遽上表諫上時掌翻帝聞之大驚手詔深自克責命停册使房玄齡等奏稱許嫁陸氏無顯狀大禮既行不可中止爽亦表言初無婚姻之議帝謂徵曰㣥臣或容希合爽亦自陳何也對曰彼以為陛下外雖捨之或陰加罪譴故不得不然帝笑曰外人意或當如是朕之言未能使人必信如此邪八年中牟丞皇甫德參中牟縣漢屬河南郡晉屬滎陽郡後魏屬廣武郡為治所隋開皇十年改曰郟城縣大業改曰圃田縣唐武德三年更名中牟丞二令治縣事上縣丞從八品下中下縣各以差降一品修洛陽宮勞人收地租厚斂俗好高髻蓋宮中所化上時掌翻下上書同斂力贍翻好呼到翻下不好同上怒謂房玄齡等曰德參欲國家不役一人不收斗租宮人皆無髮乃可其意邪欲治其謗訕之罪治直之翻魏徵諫曰賈誼當漢文帝時上書云可為痛哭者一可為流涕者二見十四卷漢文帝六年不能動人主之心所謂狂夫之言聖人擇焉漢書李左車有是言上曰朕罪斯人則誰敢復言復扶又翻乃賜絹二十匹他日徵奏言陛下近日不好直言雖勉強含容非曩時之豁如強其兩翻上乃更加優賜拜監察御史監古銜翻八年中書舍人高季輔上言考異曰貞觀政要季輔疏在三年會要在八年按舊傳季輔貞觀初拜御史纍轉中書舍人故從會要置此外官卑品猶未得祿飢寒切身難保清白今倉廩浸實宜量加優給然後可責以不貪嚴設科禁又密王元曉等皆陛下之弟比見帝子拜諸叔量音良比毗至翻叔皆答拜紊亂昭穆紊音問昭時招翻宜訓之以禮書奏上善之八年西突厥咄陸可汗卒其弟同娥設立是為沙鉢羅嘻利失可汗嘻徒結翻又丑栗翻九年九年春正月黨項先內屬者皆叛歸吐谷渾三月庚辰洮州羌叛入吐谷渾殺刺史孔長秀洮土刀翻九年壬辰嚴辰改午赦天下九年乙酉鹽澤道行軍總管高甑生擊叛羌破之九年庚寅詔民資分三等未盡其詳宜分九等唐會要武德六年三月令天下戶量其資産定為三等今分九等蓋於三等各分上中下也九年上謂魏徵曰齊後主周天元皆重斂百姓厚自奉養力竭而亡譬如饞人自噉其肉肉盡而斃何其愚也斂力贍翻饞七咸翻貪食而多取之為饞噉徒覽翻又徒濫翻然二主孰為優劣對曰齊後主懦弱政出多門懦乃臥翻又奴亂翻周天元驕暴威福在己雖同為亡國齊主尤劣也九年夏閏四月癸酉任城王道宗敗吐谷渾於庫山敗補邁翻下兒敗等敗之敗同考異曰舊道宗傳云賊聞軍至走入嶂山已行數千里諸將議欲息兵道宗固請追討李靖然之而君集不從道宗遂帥偏師並行倍道去大軍十日追及之賊據險苦戰道宗潛遣千餘騎踰山襲其後賊表裏受敵一時奔潰庫山嶂山不知其所以為同異據嶂山已行數千里今不取今即以為庫山之戰也吐谷渾可汗伏允悉燒野草輕兵走入磧磧七迹翻馬無草疲瘦未可深入侯君集曰不然嚮者段志玄軍還才及鄯州虜已至其城下蓋虜猶完實衆為之用故也今一敗之後鼠逃鳥散斥候亦絶君臣攜離父子相失取之易於拾芥易以豉翻此而不乘後必悔之李靖從之考異曰舊道宗傳云道宗固請追討李靖然之而君集不從靖傳云軍次伏俟城吐谷渾燒去野草以餒我師退保大非川諸將咸言春草未生馬已羸瘦不可赴敵唯靖決計而進深入敵境遂踰積石山按實録庫山之捷可汗謀將入磧以避官軍道宗復曰柏海近河源古來罕有至者賊既西走未知的處今段之行實資馬力今馬疲糧少遠入為難未若且向鄯州待馬肥之後更圖進取君集曰不然段志玄曩者才至鄯州賊衆便到城下良由彼國尚完凶徒阻命今者一敗以後斥候亦絶君臣相失父子攜離乘其迫懼取同俯拾柏海雖遙便可鼓行而至也靖又然之道宗傳與實録相違今從實録君集與任城王道宗由南道戊子靖部將薛孤兒敗吐谷渾於曼頭山斬其名王大獲雜畜以充軍食畜許救翻癸巳靖等敗吐谷渾於牛心堆水經注湟水自臨羌縣東流合龍駒川水又東合晉昌川水又東合長寧川水又東合牛心川水水出西南遠山東北流徑牛心堆又東徑西平亭西東北入于湟水考異曰實録癸巳李靖侯君集任城王道宗等破吐谷渾於赤水源按上文自庫山中分士馬為兩道靖趣北路出曼頭山踰赤水君集道宗趣南路歷破邏真谷然則赤水之戰君集道宗不在彼也今刪去其名又吐谷渾傳獲其高昌王慕容孝俊不知在何戰今亦刪去盛夏降霜經破邏真谷其地無水人齕冰馬噉雪邏郎佐翻齕下沒翻又戶結翻五月追及伏允於烏海隋志河源郡有烏海在漢哭山西大破之獲其名王薛萬均薛萬徹又敗天柱王於赤海赤海蓋即赤水深廣處考異曰舊萬徹傳作赤水源契苾何力傳作赤水川今從實録九年太上皇自去秋得風疾庚子崩於垂拱殿舊書帝紀崩於大安宮之垂拱前殿年七十甲辰㣥臣請上準遺誥視軍國大事上不許乙巳詔太子承乾於東宮平決庶政九年赤水之戰薛萬均薛萬徹輕騎先進為吐谷渾所圍兄弟皆中槍騎奇寄翻下同中竹仲翻失馬步鬬從騎死者什六七左領軍將軍契苾何力將數百騎救之竭力奮擊所向披靡萬均萬徹由是得免從才用翻披丕彼翻李大亮敗吐谷渾於蜀渾山山在赤海西將軍執失思力敗吐谷渾於居茹川李靖督諸軍經積石山河源至且末窮其西境聞伏允在突倫川考異曰吐谷渾傳云伏允西走圖倫磧蓋即突倫川虜語轉耳今從契苾何力傳契苾何力欲追襲之薛萬均懲其前敗固言不可何力曰虜非有城郭隨水草遷徙若不因其聚居襲取之一朝雲散豈得復傾其巢穴邪復扶又翻自選驍騎千餘直趣突倫川萬均乃引兵從之驍堅堯翻趣七喻翻考異曰吐谷渾傳云萬均率輕鋭追奔入磧數百里及其餘黨破之蓋何力先進而萬均從之也磧中乏水將士刺馬血飲之刺七亦翻襲破伏允牙帳斬首數千級獲雜畜二十餘萬伏允脫身走俘其妻子侯君集等進逾星宿川至柏海還與李靖軍合畜許救翻宿音秀考異曰吐谷渾傳柏海作柏梁今從實録實録及吐谷渾傳皆云君集與李靖會於大非川按十道圖大非川在青海南烏海星宿海柏海並在其西且末又在其西極遠據靖已至且末又過烏海星宿川至柏海豈得復會於大非川於事可疑故不敢著其地吐谷渾傳又云兩軍會於大非川至破邏真谷大寧王順乃降按實録歷破邏真谷又行月餘日乃至星宿川然則破邏真谷在星宿川東甚遠矣豈得返至其處邪今從實録大寧王順隋氏之甥伏允之嫡子也為侍中章十二行本中作子乙十一行本同退齋校同張校同云無注本亦誤中於隋久不得歸伏允立侍章十二行本侍作他乙十一行本同退齋校同張校同云無注本亦誤侍子為太子及歸意常怏怏順歸見一百八十七卷高祖武德二年怏於兩翻國人窮蹙怨天柱王順因衆心斬天柱王舉國請降伏允帥千餘騎逃磧中十餘日衆散稍盡為左右所殺降戶江翻帥讀曰率考異曰吐谷渾傳云自縊而死今從實録國人立順為可汗壬子李靖奏平吐谷渾乙卯詔復其國以慕容順為西平郡王趉故呂嚴故呂改胡呂烏甘豆可汗趉渠詘翻又九勿翻杜佑巨屈翻上慮順未能服其衆仍命李大亮將精兵數千為其聲援九年六月己丑㣥臣復請聽政上許之其細務仍委太子太子頗能聽斷是後上每出行幸常令居守監國復扶又翻斷丁亂翻守手又翻監工銜翻九年秋七月庚子鹽澤道行軍副總管劉德敏擊叛羌破之九年丁巳詔山陵依漢長陵故事長陵漢高祖陵也皇甫謐曰長陵東西廣百二十步高十三丈房玄齡云高九丈蓋尺度之長短有古今之異也期限既促功不能及祕書監虞世南上疏以為聖人薄葬其親非不孝也深思遠慮以厚葬適足為親之纍上時掌翻纍力瑞翻故不為耳昔張釋之有言使其中有可欲雖錮南山猶有隙見十四卷漢文帝三年釋之之言為無窮計也見三十一卷漢成帝永始元年誠合至理伏惟陛下聖德度越唐虞而厚葬其親乃以秦漢為法臣竊為陛下不取雖復不藏金玉為于偽翻復扶又翻下同後世但見丘壟如此其大安知章十二行本知下有其中二字乙十一行本同無金玉邪且今釋服已依霸陵用漢文帝遺詔三十七日釋服也恐非所宜伏願依白虎通班固等述白虎通義六卷器物制度率皆節損仍刻石立之陵旁別書一通藏之宗廟用為子孫永久之法疏奏不報世南復上疏以為漢天子即位即營山陵遠者五十餘年今以數月之間為數十年之功恐於人力有所不逮上乃以世南疏授有司令詳處其宜復扶又翻處昌呂翻房玄齡等議以為漢長陵高九丈原陵高六丈原陵漢光武陵也高去聲三仞則太卑請依原陵之制從之九年辛亥詔國初草創宗廟之制未備今將遷祔宜令禮官詳議諫議大夫朱子奢請立三昭三穆而虛太祖之位昭時招翻於是增修太廟祔弘農府君及高祖並舊神主四為六室弘農府君諱重耳涼王李皓諡武昭不可為始祖上從之九年黨項寇疊州九年李靖之擊吐谷渾也厚賂黨項使為鄉導鄉讀曰嚮黨項酋長拓跋赤辭來謂諸將曰隋人無信喜暴掠我喜許記翻今諸軍苟無異心我請供其資糧如或不然我將據險以塞諸軍之道塞悉則翻諸將與之盟而遣之赤水道行軍總管李道彥行至闊水闊水在黨項羈縻闊州界襲之獲牛羊數千頭於是㣥羌怨怒屯野狐峽道彥不得進赤辭擊之道彥大敗死者數萬退保松州左驍衛將軍樊興逗遛失軍期遛音留士卒失亡多乙卯道彥興皆坐減死徙邊上遣使勞諸將於大斗拔谷勞力到翻薛萬均排毀契苾何力自稱己功何力不勝忿勝音升拔刀起欲殺萬均諸將救止之上聞之以讓何力何力具言其狀具言赤水之戰拔萬均兄弟於圍中及見排毀之狀也欲解萬均官以授何力何力固辭曰陛下以臣之故解萬均官㣥胡無知以陛下為重胡輕漢轉相誣告馳競必多且使胡人謂諸將皆如萬均將有輕漢之心上善之而止尋令宿衛北門檢校屯營事北門玄武門也按會要貞觀十二年於玄武門置左右屯營以諸衛將軍領之其兵名曰飛騎何力檢校屯營蓋十二年以後事史究言之洮土刀翻九年岷州都督鹽澤道行軍總管高甑生後軍期李靖按之甑生恨靖誣告靖謀反按驗無狀八月庚辰甑生坐減死徙邊或言甑生秦府功臣寬其罪上曰甑生違李靖節度又誣其反此而可寬法將安施且國家自起晉陽功臣多矣若甑生獲免則人人犯法安可復禁乎復扶又翻我於舊勳未嘗忘也為此不敢赦耳為于偽翻李靖自是闔門杜絶賓客雖親戚不得妄見也以李靖事太宗然猶如此豈非功名之際難居哉九年上欲自詣園陵園陵謂獻陵固諫而止羸倫為翻瘠而尺翻九年冬十月乙亥處月初遣使入貢處月處密皆西突厥之別部也九年庚寅葬太武皇帝於獻陵獻陵在京兆三原縣東之十八里以穆皇后祔葬太穆皇后竇氏初葬壽安陵今祔獻陵九年十一月庚戌詔議於太原立高祖廟祕書監顏師古議以為寢廟應在京師漢世郡國立廟非禮乃止九年戊午以光祿大夫蕭瑀為特進復令參預政事蕭瑀罷預聞朝政見上卷貞觀四年復扶又翻武德六年以後高祖有廢立之心而未定我不為兄弟所容實有功高不賞之懼斯人也不可以利誘不可以死脅真社稷臣也誘音酉因賜瑀詩曰疾風知徑草板蕩識誠臣又謂瑀曰卿之忠直古人不過然善惡太明亦有時而失瑀再拜謝魏徵曰瑀違衆孤立唯陛下知其忠徑嚮不遇聖明求免難矣九年特進李靖唐六典正二品曰特進注曰二漢及魏以為加官從本官服無吏卒品第二位次諸公在開府驃騎上江左皆兼官梁班第十七北齊特進第二品隋特進為正二品散官唐因之請依遺誥御常服臨正殿弗許上時掌翻九年吐谷渾甘豆可汗久質中國質音致國人不附竟為其下所殺子燕王諾曷鉢立諾曷鉢幼大臣爭權國中大亂十二月詔兵部尚書侯君集等將兵援之先遣使者諭解將即亮翻使疏吏翻有不奉詔者隨宜討之十年十年春正月甲午上始親聽政十年辛丑以突厥拓設阿史那社爾為左驍衛大將軍驍堅堯翻社爾處羅可汗之子也年十一以智略聞可汗以為拓設建牙於磧北與欲谷設分統敕勒諸部居官十年未嘗有所賦斂斂力贍翻諸設或鄙其不能為富貴社爾曰部落苟豐於我足矣諸設慙服突厥謂子弟典兵者為設與社爾同時典兵者非一人故曰諸設攻破欲谷設事見一百九十二卷元年將其餘衆走保西陲將即亮翻頡利可汗既亡見上卷四年咄陸可汗兄弟爭國事見同上引兵襲破西突厥取其地幾半降戶江翻幾居希翻有衆十餘萬自稱答嚴答改都布可汗社爾乃謂諸部曰首為亂破我國者薛延陀也我當為先可汗報仇擊滅之為于偽翻諸部皆諫曰新得西方宜且留鎮撫今遽捨之遠去西突厥必來取其故地社爾不從擊薛延陀於磧北連兵百餘日會嘻利失可汗立見上八年多棄社爾逃歸逃歸嘻利失社爾大敗走保高昌其舊兵在者才萬餘家又畏西突厥之逼遂帥衆來降帥讀曰率降戶江翻敕處其部落於靈州之北處昌呂翻留社爾於長安尚皇妹南陽長公主新舊書皆作衡陽長公主陽長知兩翻十年癸丑徙趙王元景為荊王魯王元昌為漢王鄭王元禮為徐王徐王元嘉為韓王荊王元則為彭王滕王元懿為鄭王吳王元軌為霍王豳王元鳳為虢王陳王元慶為道王魏王靈夔為燕王自此以上皆皇弟也越王泰為魏王燕王祐為齊王梁王愔為蜀王郯王惲為蔣王漢王貞為越王申王慎為紀王自恪以下皇子也燕因肩翻愔於今翻郯音談惲於粉翻二月乙丑以元景為荊州都督元昌為梁州都督元禮為徐州都督元嘉為潞州都督元則為遂州都督靈夔為幽州都督恪為潭州都督泰為相州都督祐為齊州都督愔為益州都督惲為安州都督貞為揚州都督泰不之官以金紫光祿大夫張亮章十二行本亮下有為長史三字乙十一行本同行都督事唐制凡注官階卑而擬高者則曰守階高而擬卑則曰行今張亮行都督事乃用宋齊諸王典方面置行事之例與注官之行不同好呼到翻禮接士大夫特命於其府別置文學館聽自引召學士為泰圖東宮張本十年三月丁酉吐谷渾王諾曷鉢遣使請頒曆行年號遣子弟入侍並從之使疏吏翻丁未以諾曷鉢為河源郡王烏地也拔勤豆可汗十年癸丑諸王之藩上與之別曰兄弟之情豈不欲常共處邪但以天下之重不得不爾諸子尚可復有兄弟不可復得處昌呂翻復扶又翻因流涕嗚咽不能止上之流涕嗚咽者抑思建成元吉之事乎十年夏六月壬申以溫彥博為右僕射太常卿楊師道為侍中十年侍中魏徵屢以目疾求為散官散悉亶翻以徵為特進仍知門下事雖不居侍中之職猶令知門下事參議得失朝直遙翻徒流以上罪詳事聞奏其祿賜吏卒並同職事特進散官也祿賜吏卒同職事官所以優賢也十年長孫皇后性仁孝儉素好讀書常與上從容商略古事好呼到翻從千容翻因而獻替裨益弘多上或以非罪譴怒宮人后亦陽怒請自推鞫因命囚繫俟上怒息徐為申理由是宮壼之中刑無枉濫豫章公主早喪其母后收養之慈愛逾於所生豫章公主上女也後下嫁唐義識為于偽翻壼苦本翻喪息浪翻后親撫視輟己之藥膳以資之宮中無不愛戴訓諸子常以謙儉為先太子乳母遂安夫人唐制太子乳母封郡夫人睦州遂安郡以東宮器用少請奏益之少詩沼翻后不許曰為太子患在德不立名不揚何患無器用邪上得疾纍年不愈后侍奉晝夜不離側離力智翻常繫毒藥於衣帶曰若有不諱義不獨生后素有氣疾前年從上幸九成宮柴紹等中夕告變上擐甲出閣問狀后扶疾以從擐音宦從才用翻左右止之后曰上既震驚吾何心自安由是疾遂甚太子言於后曰醫藥備盡而疾不瘳瘳丑留翻請奏赦罪人及度人入道庶獲冥福后曰死生有命非智力所移若為善有福則吾不為惡如其不然妄求何益赦者國之大事不可數下數所角翻道釋異端之教蠹國病民皆上素所不為奈何以吾一婦人使上為所不為乎必行汝言吾不如速死太子不敢奏私以語房玄齡語牛倨翻玄齡白上上哀之欲為之赦為于偽翻后固止之及疾篤與上訣時房玄齡以譴歸第后言於帝曰玄齡事陛下久小心慎密奇謀祕計未嘗宣泄苟無大故願勿棄之妾之本宗因緣葭莩以致祿位漢書曰非有葭莩之親張晏曰葭蘆葉也莩葉裏白皮也晉灼曰莩葭裏之白皮也皆取喻於輕薄也師古曰葭蘆也莩者其筒中白皮至薄者也葭莩喻著莩音孚張言葉裏白皮非也易致顛危欲使其子孫保全慎勿處之權要但以外戚奉朝請足矣以無忌之賢不能自保則后之所慮為深遠矣易以豉翻處昌呂翻朝直遙翻不可以死害人用記檀弓成子高語意但因山為墳器用瓦木而已仍願陛下親君子遠小人納忠諫屏讒慝省作役止遊畋遠于願翻屏必郢翻妾雖沒於九泉誠無所恨兒女輩不必令來見其悲哀徒亂人意因取衣中毒藥以示上曰妾於陛下不豫之日誓以死從乘輿不能當呂后之地耳呂后事見漢紀乘繩證翻己卯崩于立政殿閣本太極宮圖東上閣門之東有萬春殿萬春殿之東有立政殿唐六典太極殿之北有兩儀殿兩儀殿之東曰萬春殿兩儀之左曰獻春門獻春門之左曰立政門其內曰立政殿后嘗采自古婦人得失事為女則三十卷又嘗著論駮漢明德馬后以不能抑退外親使當朝貴盛徒戒其車如流水馬如龍見四十六卷漢章帝建初二年駮北角翻朝直遙翻及崩宮司並女則奏之唐內職有宮正糾人㚘心失彤史記功書過六典尚儀局有司籍二人掌經史教學奏女則者蓋司籍也以示近臣曰皇后此書足以垂範百世朕非不知天命而為無益之悲但入宮不復聞規諫之言復扶又翻下今復同失一良佐故不能忘懷耳乃召房玄齡使復其位十年秋八月丙子上謂㣥臣曰朕開直言之路以利國也而比來上封事者多訐人細事比毗至翻上時掌翻訐居謁翻自今復有為是者朕當以讒人罪之十年冬十一月庚午葬文德皇后於昭陵昭陵在京兆醴泉縣西北六十里唐六典曰西內太極殿次北曰朱明門門之左曰虔化門右曰肅章門肅章之西曰暉政門又曰兩儀殿蓋古之內朝也承天門之東曰長樂門北入恭禮門又北入虔化門則宮內也承天門之西曰永安門北入安仁門又北入肅章門則宮內也士及開營內之志玄閉門不納曰軍門不可夜開使者曰此有手敕志玄曰夜中不辨真偽竟留使者至明帝聞而歎曰真將軍也帝復為文刻之石使疏吏翻復扶又翻下復何亦復同稱皇后節儉遺言薄葬以為盜賊之心止求珍貨既無珍貨復何所求朕之本志亦復如此王者以天下為家何必物在陵中乃為己有今因九嵕山為陵嵕祖紅翻鑿石之工才百餘人數十日而畢不藏金玉人馬器皿皆用土木形具而已庶幾姦盜息心存沒無纍幾居希翻纍力瑞翻當使百世子孫奉以為法上念后不已於苑中作層觀觀古玩翻以望昭陵嘗引魏徵同登使視之徵熟視之曰臣昏眊不能見眊莫報翻上指示之徵曰臣以為陛下望獻陵若昭陵則臣固見之矣上泣為之毀觀為于偽翻十年十二月戊寅朱俱波甘棠遣使入貢朱俱波在蔥嶺之北去瓜州二章十二行本二作三乙十一行本同千八百里甘棠在大海南朱俱波亦曰朱俱槃漢子合國也甘棠在西海之南崑崙人也二國皆在西域使疏吏翻中國既安四夷自服然朕不能無懼昔秦始皇威振胡越二世而亡唯諸公匡其不逮耳十年魏王泰有寵於上或言三品以上多輕魏王上怒引三品以上作色讓之曰隋文帝時一品以下皆為諸王所顛躓躓音致彼豈非天子兒邪邪音耶朕但不聽諸子縱橫耳縱如字又子容翻橫戶孟翻又如字聞三品以上皆輕之我若縱之豈不能折辱公輩乎折之舌翻房玄齡等皆惶懼流汗拜謝魏徵獨正色曰臣竊計當今㣥臣必無敢輕魏王者在禮臣子一也春秋王人雖微序於諸侯之上春秋僖七年公會王人齊侯宋公衛侯許男曹伯陳世子款鄭世子華盟于洮公羊傳曰王人者何微者也曷為序乎諸侯之上先王命也陛下所尊禮若紀綱大壞固所不論聖明在上魏王必無頓辱㣥臣之理隋文帝驕其諸子使多行無禮卒皆夷滅又足法乎卒子恤翻上悅曰理到之語不得不服朕以私愛忘公義嚮者之忿自謂不疑及聞徵言方知理屈人主發言何得容易乎易以豉翻十年上曰法令不可數變數變則煩官長不能盡記數所角翻長知兩翻又前後差違吏得以為姦自今變法皆宜詳慎而行之十年治書侍御史權萬紀上言宣饒二州銀大發采之歲可得數百萬緡治直之翻宋白曰饒州漢為鄱陽縣吳置鄱陽郡梁置吳州陳廢州復為郡隋平陳罷郡為饒州徐湛鄱陽記云北有堯山又以地饒衍遂加食為饒今郡圖又云以山川蘊物珍奇故名饒上曰朕貴為天子所乏者非財也但恨無嘉言可以利民耳與其多得數百萬緡何如得一賢才卿未嘗進一賢退一不肖而專言稅銀之利昔堯舜抵璧於山投珠於谷陸賈新語曰聖人不用珠玉而寶其身故舜棄黃金於巉巖之山捐珠玉於五湖之川以杜淫邪之欲也事見五十七卷漢靈帝光和元年藏徂浪翻邪音耶是日黜萬紀使還家十年是歲更命統軍為折衝都尉別將為果毅都尉唐制上府折衝都尉正四品上中府正四品下下府正五品下上府果毅都尉從五品下中府正六品上下府從六品下更工衡翻將即亮翻置府六百三十四而關內二百六十一皆隸諸衛及東宮六率東宮六率者左右衛率擬上臺左右衛將軍左右宗衛率擬左右領軍將軍左右監門率擬左右監門將軍後又置左右虞候率擬左右金吾將軍左右內率擬左右千牛將軍通謂之十率中府千人下府八百人三百人為團團有校尉校戶教翻五十人為隊隊有正十人為火火有長長知兩翻每人兵甲糧裝各有數皆自備輸之庫有征行則給之年二十為兵六十而免其能騎射者為越騎越騎者言其徑勇能超越也騎奇寄翻每歲季冬折衝都尉帥其屬教戰帥讀曰率當給馬者官豫其直市之豫讀曰與凡當宿衛者番上兵部以遠近給番遠疏近數皆一月而更時制五百里為五番千里七番一千五百里八番二千里十番外為十二番若簡留宿衛者五百里為七番千里八番二千里十番外為十二番上時掌翻數所角翻更工衡翻十一年十一年春正月徙鄶王元裕為鄧王鄶工外翻譙王元名為舒王十一年辛卯以吳王恪為安州都督晉王治為並州都督紀王慎為秦州都督將之官上賜書戒敕曰吾欲遺汝珍玩恐益驕奢遺于季翻不如得此一言耳十一年上作飛山宮觀明年廢明德宮及飛山宮之玄圃院以給洛人之遭水壞廬舍者則知飛山宮亦在洛陽庚子特進魏徵上疏上時掌翻以為煬帝恃其富強不虞後患窮奢極欲使百姓困窮以至身死人手社稷為墟陛下撥亂返正宜思隋之所以失我之所以得撤其峻宇安於卑宮若因基而增廣襲舊而加飾此則以亂易亂殃咎必至難得易失可不念哉易以豉翻十一年房玄齡等先受詔定律令先悉薦翻以為舊法兄弟異居蔭不相及而謀反連坐皆死祖孫有蔭而止應配流據禮論情深為未愜今定律祖孫與兄弟緣坐者俱配役從之自是比古死刑除其太半天下稱賴焉玄齡等定律五百條立刑名二十等笞刑五自十至于五十杖刑五自六十至于百徒刑五自一年至于三年流刑三自千里至于三千里死刑二絞斬辟毗亦翻減流入徒者七十一條凡削煩去蠹變重為輕者不可勝紀去羌呂翻勝音升又定令一千五百九十餘條武德舊制釋奠於太學以周公為先聖孔子配饗玄齡等建議停祭周公以孔子為先聖顏回配饗又刪武德以來敕格定留七百條至是頒行之又定枷杻鉗鎖杖笞皆有長短廣狹之制械其頸曰枷械其手曰杻鉗以鐵劫束之也鎖以鐵琅當之也杖長三尺五寸削去節目訊杖大頭徑三分二釐小頭二分二釐常行杖大頭二分七釐小頭一分七釐笞杖大頭二分小頭一分有半杻女九翻自張蘊古之死見上卷五年時有失入者又不加罪上嘗問大理卿劉德威曰近日刑網稍密何也對曰此在主上不在㣥臣人主好寬則寬好急則急律文失入減三等失出減五等今失入無辜失出更獲大罪是以吏各自免競就深文非有教使之然畏罪故耳陛下儻一斷以律則此風立變矣上悅從之由是斷獄平允好呼到翻斷丁亂翻十一年上以漢世豫作山陵免子孫蒼猝勞費又志在儉葬恐子孫從俗奢靡二月丁巳自為終制因山為陵容棺而已十一年甲子上行幸洛陽宮十一年上至顯仁宮隋志河南壽安縣有顯仁宮煬帝大業元年所起有被譴者偫直里翻被皮義翻魏徵諫曰陛下以儲偫譴官吏臣恐承風相扇異日民不聊生殆非行幸之本意也昔煬帝諷郡縣獻食視其豐儉以為賞罰見一百八十三卷大業十二年此陛下所親見奈何欲效之乎上驚曰非公不聞此言因謂長孫無忌等曰朕昔過此買飯而食僦舍而宿僦子就翻今供頓如此豈得嫌不足乎十一年三月丙戌朔日有食之十一年庚子上宴洛陽宮西苑泛積翠池洛陽西苑北距北邙西至孝水南帶洛水支渠穀洛二水會于其間慮其泛溢為三陂以禦之一曰積翠二曰月陂三曰上陽苑牆周回一百二十六里煬帝作此宮苑結怨於民築西苑見一百八十卷大業元年正由宇文述虞世基裴蘊之徒內為諂諛外蔽聰明故也可不戒哉按隋煬帝大業二年令宇文愷作洛陽西苑述恐當作愷十一年房玄齡魏徵上所定新禮一百三十八篇上時掌翻丙午詔行之十一年以禮部尚書王圭為魏王泰師唐初因魏晉之制諸王置師一人開元改曰傅汝事圭當如事我泰見圭輒先拜圭亦以師道自居圭子敬直尚南平公主公主上女也公主下嫁先悉薦翻皆不以婦禮事舅姑圭曰今主上欽明動循禮法吾受公主謁見豈為身榮所以成國家之美耳乃與其妻就席坐令公主執笲行盥饋之禮笲音煩竹器也以盛棗栗腶修盥音管以盤水沃洗手也婦以特豚饋士昏禮曰舅坐于阼階西面姑坐于房外南面婦執笲棗栗東面拜奠于舅席訖婦又執腶修升進北面拜奠于姑席舅姑入于室婦盥饋特豚明婦順也右胖載之舅俎左胖載之姑俎各以南為上是後公主始行婦禮自圭始十一年㣥臣復請封禪五年諸州朝集使請封禪六年文武官請今衆臣復請復扶又翻房玄齡裁定之十一年夏四月己卯魏徵上疏以為人主善始者多克終者寡豈取之易而守之難乎上時掌翻易以豉翻蓋以殷憂則竭誠以盡下殷音隱安逸則驕恣而輕物盡下則胡越同心輕物則六親離德雖震之以威怒亦皆貌從而心不服故也人主誠能見可欲則思知足將興繕則思知止處高危則思謙降臨滿盈則思挹損遇逸樂則思撙節處昌呂翻樂音洛撙慈損翻在宴安則思後患防壅蔽則思延納疾讒邪則思正己行爵賞則思因喜而僭施刑罰則思因怒而濫僭僭差濫濫益也而選賢任能固可以無為而治治直吏翻又何必勞神苦體以代百司之任哉王崇武標點容肇祖聶崇岐覆校
