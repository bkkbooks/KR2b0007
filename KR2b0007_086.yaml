body:
  text: 資治通鑑卷第八十六端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰權判西京留司御史臺上柱國河內郡開國侯食邑一千三百戶食實封四百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注晉紀八永興二年孝惠皇帝下永興二年乙丑三五永興二年夏四月張方廢羊后永興二年遊楷等攻皇甫重纍年不能克遊楷等自太安二年攻皇甫重至是首尾三年昌詣司空越越以太宰顒新與山東連和事見上卷上年昌乃與故殿中人楊篇故殿中人舊屬二衛部曲者迎羊后於金墉城入宮以后令發兵討張方奉迎大駕是年四月張方廢羊后其時方已奉帝入關蓋以威令遙脅留臺百官使廢羊后耳今皇甫昌迎后入宮欲發兵討方特以是起兵非因方在洛而討之也百官初皆從之俄知其詐相與誅昌顒請遣御史宣詔喻重令降降戶江翻下同重不奉詔先是城中不知長沙厲王及皇甫商已死長沙厲王死見上卷上年皇甫商死見上卷太安二年先悉薦翻因御史來宣詔獲其騶人騶側鳩翻廣既御也晉制諸公給騶八人下至御史各有差齊王融曰車前無八騶何得稱丈夫則騶蓋辟車之卒我弟將兵來欲至未騶人曰已為河間王所害重失色立殺騶人於是城中知無外救共殺重以降顒以馮翊太守張輔為秦州刺史顒以破劉沈之功用張輔永興二年六月甲子安豐元侯王戎薨于郟王戎奔郟見上卷上年郟音夾永興二年張輔至秦州殺天水太守封尚欲以立威又召隴西太守韓稚守式又翻稚子朴勒兵擊輔輔軍敗死涼州司馬楊胤言於張軌曰韓稚亶殺刺史明公杖鉞一方不可不討軌從之遣中督護泛瑗帥衆二萬討稚稚詣軌降中督護中軍督護也泛音凡瑗于眷翻帥讀曰率下同幾居豈翻鮮卑若羅拔能寇涼州軌遣司馬宋配擊之斬拔能俘十餘萬口威名大振史言張軌能尊主攘夷以致強盛永興二年漢王淵攻東嬴公騰騰復乞師於拓跋猗色復扶又翻色徒河翻衛操勸猗色助之猗色帥輕騎數千救騰斬漢將綦毋豚毋音無綦毋復姓北狄傳胸奴國人有綦毋氏勒氏皆勇健好反叛考異曰後魏書桓帝紀及劉淵傳皆云淵南走蒲子按晉載記淵無走蒲子事下云自離石遷黎亭蓋後魏書夸誕妄言耳詔假猗色大單于單音蟬加操右將軍甲申猗色卒子普根代立永興二年東海中尉劉洽以張方劫遷車駕晉諸王國有郎中令中尉大農為三卿張方劫遷車駕事見上卷上年秋七月越傳檄山東征鎮州郡云欲糾帥義旅奉迎天子還復舊都舊都謂洛陽懼長史王修説楙曰東海宗室重望今興義兵公宜舉徐州以授之則免於難説輸芮翻難乃旦翻且有克讓之美矣楙從之越乃以司空領徐州都督楙自為兗州刺史詔即遣使者劉虔授之楙督徐州始八十四卷永寧元年去年范陽王虓以苟晞行兗州晞留許昌未及至州而楙自領之越兄弟並據方任越弟略都督青州模都督冀州虓虛交翻及王浚等共推越為盟主越輒選置刺史以下輒專也朝士赴越者不從帝在長安者也朝直遙翻永興二年成都王穎既廢穎廢見上卷上年穎鎮鄴初有時譽後雖以驕侈致禍河北之人厭亂而思舊故多憐之起兵於趙魏衆至數萬初上黨武鄉羯人石勒有膽力善騎射武鄉縣晉置屬上黨郡後石勒分置武鄉郡劉昫曰唐潞州武鄉縣漢河東之垣縣也唐遼州榆社縣分晉武鄉縣置載記曰勒胸奴別部羌渠之胄又胸奴傳曰北狄入居塞內者有十九種羯其一也羯居謁翻建威將軍閻粹説東嬴公騰説輸芮翻執諸胡於山東賣充軍實勒亦被掠賣為茌平人師歡奴茌平縣前漢屬東郡後漢屬濟北國晉屬平原國應劭曰在茌山之平地者也意其地當在唐齊州博州界劉昫曰茌平縣併入唐博州聊城縣被皮義翻師古曰茌音仕疑翻歡家鄰於馬牧勒乃與牧帥汲桑結壯士為㣥盜帥所類翻及公師藩起桑與勒帥數百騎赴之帥讀曰率桑始命勒以石為姓勒為名石勒始此殺二千石長吏長知兩翻轉前攻鄴平昌公模甚懼范陽王虓遣其將苟晞救鄴與廣平太守譙國丁紹共擊藩走之漢武帝置平干國宣帝改為廣平國後漢光武省屬巨鹿郡魏文帝黃初二年復置廣平郡唐為洺州之地永興二年八月辛丑大赦永興二年司空越以琅邪王睿為平東將軍監徐州諸軍事留守下邳監工銜翻睿請王導為司馬委以軍事考異曰導傳曰元帝鎮下邳請導為安東司馬按元帝時為平東及徙揚州乃為安東耳或者平字誤為安或後為安東司馬故但云司馬西屯蕭縣蕭縣自漢以來屬沛郡唐屬徐州許即許昌以范陽王虓領豫州刺史喬以虓非天子命發兵拒之虓以劉琨為司馬越以劉蕃為淮北護軍劉輿為潁川太守輿琨蕃之子也列輿兄弟罪惡因引兵攻許豫州刺史時治項上時掌翻長知兩翻越兵不能進東平王楙在兗州徵求不已郡縣不堪命范陽王虓遣苟晞還兗州虓用苟晞為兗州刺史見上卷上年楙不受命背山東諸侯與劉喬合背蒲妹翻永興二年太宰顒聞山東兵起甚懼以公師藩為成都王穎起兵壬午表穎為鎮軍大將軍都督河北諸軍事給兵千人以盧志為魏郡太守隨穎鎮鄴欲以撫安之又遣建武將軍呂朗屯洛陽顒發詔令東海王越等各就國越等不從會得劉喬上事上事者言東海王越等起兵及喬攻許拒越之事上時掌翻十月丙子下詔稱劉輿迫脅范陽王虓造搆凶逆其令鎮南大將軍劉弘劉弘都督荊州彭城王釋蓋代羊伊屯宛劉準都督揚州與劉喬並力以張方為大都督統精卒十萬與呂朗共會許昌誅輿兄弟釋宣帝弟子穆王權之孫也權宣帝弟東武城侯馗之子考異曰劉喬傳釋作繹帝紀宗室傳皆作釋蓋喬傳誤帝紀八月車騎大將軍劉弘逐平南將軍彭城王釋于宛弘釋傳及衆書皆無之弘傳但云彭城前東奔有不善之言按弘晉室純臣劉喬與范陽搆難弘猶以書和解之以安天下尊王室釋受王命鎮宛而弘肯更自逐之乎據此詔令弘釋共討劉輿疑無弘逐釋事帝紀必誤丁丑顒使成都王穎領將軍劉章甲十一行本劉作樓乙十一行本同孔本同退齋校同褒等前車騎將軍石超領北中郎將王闡等據河橋為劉喬繼援進喬鎮東將軍假節劉弘遺喬及司空越書遺于季翻欲使之解怨釋兵同奬王室皆不聽弘又上表曰自頃兵戈紛亂猜禍鋒生疑隙搆於㣥王災難延于宗子難乃旦翻今日為忠明日為逆翩其反而言是非反覆之易冏乂穎顒之事誠如此言迭為興戎之首也骨肉之禍未有如今者也臣竊悲之今邊陲無備豫之儲中華有杼軸之困詩曰小東大東杼軸其空杼持緯器軸亦作柚皆織具也不惟國體職競尋常惟思也職主也競爭也八尺曰尋倍尋曰常言所爭者尋丈之間不足為長短也左傳曰爭尋常以盡其民楚痛也此亦猛虎交鬬自效於卞莊者矣劉石之禍劉弘蓋知之矣令兩釋猜嫌各保分局分扶問翻自今以後其有不被詔書亶興兵馬者天下共伐之被皮義翻下同時太宰顒方拒關東倚喬為助不納其言喬乘虛襲許破之劉琨將兵救許不及遂與兄輿及范陽王虓俱奔河北琨父母為喬所執劉弘以張方殘暴知顒必敗乃遣參軍劉盤為都護盡護行營諸將為都護督護則止督一軍耳帥讀曰率時天下大亂弘專督江漢威行南服南服南方也謂之服者責以服事天子為職則曰某人之功如有負敗則曰老子之罪每有興發興發謂興師動衆調發財賦守手又翻相息亮翻丁寧款密所以人皆感悅爭赴之咸曰得劉公一紙書賢於十部從事州有部從事部管內諸郡弘怒斬之益州之破辛冉去羅尚從劉弘冉以事尚者事弘猶將不免於誅況以從橫説之邪史言劉弘忠純説輸芮翻從子容翻永興二年有星孛于北斗孛蒲內翻永興二年平昌公模遣將軍宋胄趣河橋模自鄴遣胄進兵趣七喻翻永興二年十一月立節將軍周權詐被檄詐言被司空越檄也復立羊后洛陽令何喬攻權殺之復廢羊后復扶又翻太宰顒矯詔以羊后屢為姦人所立遣尚書田淑敕留臺賜后死時荀藩劉暾周馥居留臺司隸校尉劉暾等上奏暾他昆翻上時掌翻固執以為羊庶人門戶殘破廢放空宮門禁峻密無緣得與姦人搆亂衆無愚智皆謂其冤今殺一枯窮之人而令天下傷慘何益於治治直吏翻顒怒遣呂朗收暾考異曰暾傳云顒遣陳顏呂朗帥騎五千收暾按暾匹夫安用五千騎蓋朗時在洛顒敕使收暾耳説者欲大其事故云爾依高密王略然羊后亦以是得免永興二年十二月呂朗等東屯滎陽成都王穎進據洛陽永興二年劉琨説冀州刺史太原溫羡使讓位於范陽王虓魏收曰袁紹曹操為冀州治鄴魏晉治信都杜佑曰治房子説輸芮翻遣琨詣幽州乞師於王浚浚以突騎資之突騎天下精兵燕人致梟騎助漢高祖以破項羽光武得漁陽上谷突騎以平河北考異曰琨傳曰得突騎八百人按劉喬傳云琨率突騎五千濟河攻喬疑八百太少或因下文迎東海王之數致有此誤今闕疑殺之琨遂與虓引兵濟河斬石超於滎陽劉喬自考城引退考城縣屬陳留郡前漢梁國之災縣也章帝更名晉省後魏置考陽縣及北梁郡北齊郡縣並廢為城安縣隋改曰考城縣屬梁郡至唐屬曹州廩丘縣前漢屬東郡後漢屬濟陰晉屬濮陽郡為兗州刺史治所賢曰廩丘故城在今濮州雷澤縣北琨徽引兵東迎越擊劉祐於譙祐敗死喬衆遂潰喬奔平氏考異曰帝紀云喬奔南陽按地理志南陽無平氏縣武帝分南陽置義陽郡有西平氏縣或者南陽有東平氏而非縣與今按前漢書地理志平氏縣屬南陽郡晉書地理志平氏縣屬義陽郡平氏之上有厥西縣沈約宋書地理志南義陽太守領厥西平氏二縣且曰厥西今二漢無晉太康地志屬義陽以此證之蓋後人傳寫晉書者誤以厥西之西字聯平氏而書之其實晉義陽之平氏即漢南陽之平氏也帝紀所謂喬奔南陽以漢古郡大界書之也劉昫曰唐申州義陽縣漢南陽郡平氏縣之義陽鄉與唐州之桐柏平氏二縣皆漢南陽平氏縣地陽武縣漢屬河南郡晉屬滎陽郡唐屬鄭州帥讀曰率下同永興二年初陳敏既克石冰事見上卷太安二年有割據江東之志其父怒曰滅我門者必此兒也遂以憂卒敏以喪去職司空越起敏為右將軍前鋒都督越為劉祐所敗敗補邁翻敏請東歸收兵遂據歷陽叛歷陽縣漢屬九江郡魏改九江曰淮南晉因之今和州即歷陽縣之地宋白曰縣南有歷水故曰歷陽棄官東歸晉諸王國大國置左右常侍各一人考異曰卓傳云州舉秀才為吳王常侍討石冰以功賜爵都亭侯東海王越引為參軍出補離狐令棄官東歸遇陳敏敏傳云吳王常侍甘卓自洛至按卓為常侍不應討石冰為離狐令不應自洛至今從敏傳敏為子景娶卓女為于偽翻使卓假稱皇太弟令拜敏揚州刺史敏使弟恢及別將錢端等南略江州弟斌東略諸郡斌音彬揚章甲十一行本揚上有江州刺史應邈六字乙十一行本同孔本同張校同退齋校同州刺史劉機丹楊太守王曠皆棄城走時揚州刺史蓋與丹楊太守同治秣陵敏遂據有江東以顧榮為右將軍賀循為丹楊內史周王巳為安豐太守安豐縣後漢屬廬江郡魏分廬江為安豐郡其地為唐之壽州安豐霍丘縣王巳墟里翻咸加收禮為將軍郡守者四十餘人或有老疾就加秩命循詐為狂疾得免乃以榮領丹楊內史王巳亦稱疾不之郡敏疑諸名士終不為己用欲盡誅之榮説敏曰中國喪亂胡夷內侮觀今日之勢不能復振百姓將無遺種説輸芮翻喪息浪翻種章勇翻江南雖經石冰之亂人物尚全榮常憂無孫劉之主孫劉謂孫權劉備今將軍神武不世勳效已著帶甲數萬舳艫山積漢武帝紀舳艫千里注云舳船後持柂處艫船前刺棹處又漢律名船方長為舳艫此言山積蓋取漢律之義使各盡懷散蒂芥之嫌張晏曰蒂芥刺鯁也師古曰蒂音丑介翻則上方數州可傳檄而定上方數州謂揚州以西荊江豫梁益等州也塞悉則翻終不濟也章甲十一行本也下有敏乃止三字乙十一行本同孔本同張校同退齋校同敏命僚佐推己為都督江東諸軍事大司馬楚公加九錫列上尚書上時掌翻稱被中詔被皮義翻自江入沔漢奉迎鑾駕太宰顒以張光為順陽太守順陽縣前漢曰博山後漢明帝更名順陽屬南陽郡至建安中割南陽右壤為南鄉郡晉太康中立順陽郡以南鄉為縣唐鄧州之臨湍菊潭縣皆順陽郡地劉弘遣江夏太守陶侃武陵太守苗光屯夏口夏戶雅翻又遣南平太守汝南應詹督水軍以繼之侃與敏同郡侃與敏皆廬江人同歲舉赴京師隨縣漢屬南陽郡春秋之隨國也晉武帝分南陽立義陽國後又分義陽立隨郡隋為漢東郡唐為隋州侃居大郡統強兵脫有異志則荊州無東門矣弘曰侃之忠能吾得之已久必無是也侃聞之遣子洪及兄子臻詣弘以自固弘引為參軍資而遣之既引為參軍又以貨物資送而遣其歸賢叔征行君祖母年高便可歸也匹夫之交尚不負心況大丈夫乎敏以陳恢為荊州刺史寇武昌弘加侃前鋒督護以禦之侃以運船為戰艦艦戶黯翻或以為不可侃曰用官船擊官賊何為不可侃與恢戰屢破之又與皮初張光苗光共破錢端於長岐據張光傳長岐之戰光設伏於步路苗光為水軍藏舟船於沔水則長岐當在江夏郡界南陽太守衛展説弘曰張光太宰腹心公既與東海宜斬光以明向背背蒲妹翻弘曰宰輔得失豈張光之罪危人自安君子弗為也乃表光殊勳乞加遷擢永興二年是歲離石大飢漢王淵徙屯黎亭續漢志上黨郡壺關縣有黎亭書西伯戡黎即此留太尉宏守離石使大司農卜豫運糧以給之光熙元年丙寅三六六月帝還洛陽始改元此猶是永興三年永興二年春正月戊子朔日有食之永興二年初太弟中庶子蘭陵繆播繆靡幼翻又莫六翻姓也有寵於司空越播從弟右衛率胤太宰顒前之弟也越之起兵遣播胤詣長安説顒令奉帝還洛説輸芮翻下因説復説迎説同約與顒分陝為伯陝失冉翻顒素信重播兄弟即欲從之張方自以罪重恐為誅首以剽掠洛都劫天子西遷也今據形勝之地國富兵強奉天子以號令誰敢不從奈何拱手受制於人顒乃止及劉喬敗顒懼欲罷兵與山東和解恐張方不從猶豫未決方素與長安富人郅輔親善以為帳下督方傳云初方從山東來甚微賤郅輔厚相供給及貴甚親昵之嘗為方所侮因説顒曰張方久屯霸上聞山東兵盛盤桓不進顒遣方與呂朗會劉喬攻許方屯霸上未進而劉喬敗馬融曰盤桓旋也其親信郅輔具知其謀繆播繆胤復説顒宜急斬方以謝山東可不勞而定復扶又翻顒使人召輔垣迎説輔曰張方欲反人謂卿知之王若問卿何辭以對輔驚曰實不聞方反為之奈何垣曰王若問卿但言爾爾爾爾猶言如此如此也必不免禍輔入顒問之曰張方反卿知之乎輔曰爾顒曰遣卿取之可乎又曰爾顒於是使輔送書於方因殺之輔既昵於方昵尼質翻持刀而入守閣者不疑方火下發函輔斬其頭還報顒以輔為安定太守送方頭於章甲十一行本於下有司空二字乙十一行本同孔本同張校同退齋校同越以請和越不許宋胄襲河橋樓褒西走平昌公模遣前鋒督護馮嵩會宋胄逼洛陽成都王穎西奔長安至華陰華陰縣前漢屬京兆後漢晉屬弘農郡唐屬華州華戶化翻留不敢進呂朗屯滎陽劉琨以張方首示之遂降降戶江翻司章甲十一行本司上有甲子二字乙十一行本同孔本同張校同空越遣祁弘宋胄司馬纂帥鮮卑西迎車駕帥讀曰率以周馥為司隸校尉假節都督諸軍屯澠池澠彌兗翻永興二年三月惤令劉伯章甲十一行本伯作柏乙十一行本同孔本同張校同根反惤縣自漢以來屬東萊郡拓跋魏省魏收地形志東牟郡黃縣有惤城師古曰惤音堅自稱惤公王彌帥家僮從之帥讀曰率柏根以彌為長史彌從父弟桑為東中郎將從才用翻柏根寇臨淄青州都督治所暾兵敗奔洛陽暾他昆翻略走保聊城聊城縣漢屬東郡晉屬平原郡唐為博州治所斬之將即亮翻王彌亡入長廣山為㣥盜長廣縣前漢屬琅邪郡後漢屬東萊郡晉武帝咸寧三年置長廣郡長廣縣屬焉隋廢長廣郡及縣更名膠水縣唐屬萊州永興二年寧州頻歲飢疫死者以十萬計五苓夷強盛州兵屢敗五苓夷反事始上卷太安二年苓力丁翻夷遂圍州城李毅疾病救援路絶乃上疏上時掌翻言不能式遏寇虐坐待殄斃若不垂矜恤乞降大使及臣尚存加臣重辟使疏吏翻辟毗亦翻若臣已死陳尸為戮朝廷不報積數年子釗自洛往省之省悉景翻未至毅卒毅女秀明達有父風衆推秀領寧州事秀奬厲戰士嬰城固守城中糧盡炙鼠拔草而食之伺夷稍怠輒出兵掩擊破之伺相吏翻考異曰懷帝紀永嘉元年五月建寧郡夷攻陷寧州死者三千餘人李雄載記曰南夷李毅固守不降雄誘建寧夷使討之毅病卒城陷殺壯士三千餘人送婦女千口於成都王遜傳云李毅卒城中奉毅女固守經年華陽國志有毅卒年月及女秀守城事今從之永興二年范長生詣成都自青城山詣成都也執版拜為丞相尊之曰范賢永興二年夏四月己巳司空越引兵屯溫初太宰顒以為張方死東方兵必可解既而東方兵聞方死爭入關顒悔之乃斬郅輔遣弘農太守彭隨北地太守刁默將兵拒祁弘等於湖五月壬辰弘等擊隨默大破之遂西入關又敗顒將馬瞻郭偉於霸水敗補邁翻顒單馬逃入太白山三秦記太白山在武功縣南去長安三百里俗云武功太白去天三百新唐書地理志太白山在鳳翔府郿縣所部鮮卑大掠殺二萬餘人百官奔散入山中拾橡實食之橡似兩翻栩實也爾雅曰柞實謂之橡賢曰橡櫟實也己亥弘等奉帝乘牛車東還晉志曰古之貴者不乘牛車漢武帝推恩之後諸侯寡弱至乘牛車其後稍見貴重自靈帝以來天子至士遂以為常乘夫天子出入有大駕法駕鹵簿帝自鄴奔洛則乘犢車自長安還洛則乘牛車無復出警入蹕之制矣守關中六月丙辰朔帝至洛陽復羊后考異曰后傳曰張方首至洛陽即日復后位按方傳首巳久不至今日今從帝紀辛未大赦改元改元光熙永興二年馬瞻等入長安殺梁柳與始平太守梁邁共迎太宰顒於南山武帝泰始二年分扶風置始平郡領槐里始平武功鄠蒯城等縣南山即太白山中南太白本一山也廙羊至翻又逸職翻秦國內史賈龕安定太守賈匹等起兵擊顒斬馬瞻梁邁匹詡之曾孫也帝即位改扶風為秦國以封秦王柬龕苦含翻匹音雅賈詡生於漢末始從李傕郭汜中從張繡後歸魏考異曰牽秀傳云顒密遣使就東海王越求迎越遣將麋晃等迎顒今從顒傳顒使平北將軍牽秀屯馮翊顒長史楊騰詐稱顒命使秀罷兵騰遂殺秀關中皆服於越顒保城而已顒僅保長安城永興二年成都王雄即皇帝位雄字仲雋特第三子改元曰晏平國號大成考異曰晉帝紀三十國晉春秋皆云永興二年六月雄即帝位華陽國志光熙元年雄即帝位後魏書序紀及李雄傳皆云昭帝十二年雄稱帝即光熙元年也十六國春秋鈔晏平元年六月雄即帝位十六國春秋目録雄年號建興二晏平五與華陽國志同今從之諸書雄改元晏平無大武年號惟晉載記改元大武無晏平年號按雄國號大成魏書雄傳云雄稱帝號大成改元晏平故三十國春秋誤云改年大成載記轉寫誤為大武今從諸書去大武之號廟號始祖尊王太后曰皇太后雄母羅氏尊為王太后見上卷永興元年太師乃有天地之號侯景未足多怪也㣥盜私立名字以相署置可勝言哉考異曰華陽國志尊長生曰四時八節天地太師今從晉載記皆不豫征稅復方目翻諸將恃恩互爭班位將即亮翻尚書令閻式上疏請考漢晉故事立百官制度從之永興二年秋七月乙酉朔日有食之永興二年八月以司空越為太傅録尚書事范陽王虓為司空鎮鄴考異曰虓傳為司徒今從帝紀鎮許昌王浚為驃騎大將軍都督東夷河北諸軍事領幽州刺史浚恃鮮卑烏桓以為羽翼故使並督東夷諸軍驃匹妙翻章甲十一行本庾上有穎川二字乙十一行本同孔本同張校同退齋校同敳為軍咨祭酒敳魚開翻漢魏之間兵興始置軍咨祭酒前太弟中庶子胡母輔之為從事中郎黃門侍郎郭章甲十一行本郭上有河南二字乙十一行本同孔本同張校同退齋校同象為主簿鴻臚丞阮修為行參軍臚陵如翻晉列卿各置丞行參軍在參軍事之下沈約志晉太傅司馬越府有行參軍兼行參軍後加長兼字除拜則為參軍事府版則為行參軍行參軍始於蜀丞相諸葛亮府謝鯤為掾掾以絹翻輔之薦樂安光逸於越姓譜光姓燕人田光之後秦末子孫避地因以為氏敳等皆尚虛玄不以世務嬰心縱酒放誕敳殖貨無厭厭於鹽翻象薄行好招權越皆以其名重於世故辟之史言越所辟置采虛名而無實用行下孟翻好呼到翻永興二年祁弘之入關也成都王穎自武關奔新野新野縣漢屬南陽郡晉屬義陽郡司馬郭勱作亂欲迎穎為主郭章甲十一行本郭上有治中順陽四字乙十一行本同孔本同張校同退齋校同舒奉弘子璠以討勱斬之璠孚袁翻勱莫敗翻詔南中郎將劉陶收穎穎北渡河奔朝歌收故將士得數百人欲赴公師藩頓章甲十一行本頓上有九月二字乙十一行本同孔本同張校同丘太守馮嵩執之送鄴頓丘縣漢屬東郡武帝泰始元年分置郡公師藩自白馬南渡河白馬縣漢屬東郡晉屬濮陽國唐為滑州治所永興二年進東嬴公騰爵為東燕王燕於賢翻平昌公模為南陽王永興二年冬十月范陽王虓薨長史劉輿以章甲十一行本以下有成都王三字乙十一行本同孔本同張校同退齋校同穎素為鄴人所附祕不發喪偽令人為臺使稱詔夜賜穎死使疏吏翻並殺其二子穎官屬先皆逃散惟盧志隨從至死不怠收而殯之從才用翻太傅越召志為軍咨祭酒越將召劉輿或曰輿猶膩也近則汚人膩女利翻皮膚之垢其肥滑者為膩汚烏故翻及至越疏之輿密視天下兵簿及倉庫牛馬器械水陸之形皆默識之識音志記也時軍國多事每會議自長史潘滔以下莫知所對輿應機辨畫辨者辨析事宜畫者為之區畫也即以為左長史軍國之務悉以委之輿説越遣其弟琨鎮並州以為北面之重説輸芮翻越表琨為並州刺史以東燕王騰為車騎將軍都督鄴城諸軍事鎮鄴永興二年十一月己巳夜帝食麥并中毒麥并必郢翻麥丏餈也釋名麥并並也溲麥丏使合並也蒸麥并湯麥并之屬隨形而名食麥并中毒或云越鴆之也中竹仲翻庚午崩于顯陽殿年四十八恐不得為太后將立清河王覃侍中華混諫曰太弟在東宮已久熾立為皇太弟見上卷永興元年華戶化翻今日寧可易乎即露版馳召太傅越召太弟入宮后已召覃至尚書閣疑變託疾而返癸酉太弟即皇帝位大赦尊皇后曰惠皇后居弘訓宮追尊母王才人曰皇太后立梁氏為皇后懷帝始遵舊制於東堂聽政東堂太極殿東堂也輒與㣥官論衆務考經籍黃門侍郎傅宣歎曰今日復見武帝之世矣復扶又翻永興二年十二月壬午朔日有食之永興二年太傅越以詔書徵河間王顒為司徒顒乃就徵南陽王模遣其將梁臣邀之於新安車上扼殺之並殺其三子模越之弟也意謂殺顒父子則兄弟身安而無患矣而不知石勒趙染之禍已伏於冥冥之中矣新安縣漢屬弘農郡晉屬河南郡考異曰三十國晉春秋云東海王越殺顒今從顒傳永興二年辛丑以中書監溫羡為左光祿大夫領司徒尚書左僕射王衍為司空永興二年己酉葬惠帝于太陽陵永興二年劉琨至上黨東燕王騰即自井陘東下時並州飢饉數為胡寇所掠胡寇謂劉淵之黨也數所角翻州將田甄甄弟蘭任祉祁濟李惲薄盛等州將謂並州諸將也將即亮翻甄稽延翻任音壬惲於粉翻悉隨騰就穀冀州號為乞活所餘之戶不滿二萬寇賊縱橫道路斷塞縱于容翻塞悉則翻琨募兵上黨得五百人轉鬬而前至晉陽府寺焚毀府寺府舍也聚居城市為邑散居在外為野流民稍集勞力到翻徠力代翻孝懷皇帝上諱熾字豐度武帝第二十五子也諡法慈仁短折曰懷永嘉元年丁卯三七永興二年春正月癸丑大赦改元永興二年吏部郎周穆太傅越之姑子也與其妹夫御史中丞諸葛玫玫謨杯翻説越曰主上之為太弟張方意也成都王穎之廢河間王顒立帝為皇太弟故以為張方之意清河王齊王冏立為太子經廢者數矣越不許重言之重直用翻越怒斬之永興二年二月張月下脫東萊二字王彌寇青徐二州自稱征東大將軍攻殺二千石太傅越以公車令東萊鞠羡為本郡太守晉志公車令屬衛尉彌擊殺之永興二年陳敏刑政無章不為英俊所附子弟凶暴所在為患顧榮周等憂之廬江內史華談遺榮等書曰陳敏盜據吳會命危朝露言若朝露之棲草上見日即晞不得久也華戶化翻遺于季翻或列為近臣而更辱身姦人之朝朝直遙翻下同降節叛逆之黨不亦羞乎吳武烈父子皆以英傑之才繼承大業吳諡孫堅曰武烈皇帝七弟頑宀兒欲躡桓王之高蹤蹈大皇之絶軌孫策追諡長沙桓王孫權諡大皇帝宀兒而隴翻躡尼輒翻猶當未許也度徒洛翻皇輿東返謂自長安還洛陽也才過千人曰俊彥美士也諸賢何顏復見中州之士邪復扶又翻榮等素有圖敏之心及得書甚慚密遣使報征東大將軍劉準使疏吏翻使發兵臨江己為內應剪髮為信準遣揚州刺史劉機等出歷陽討敏敏使其弟廣武將軍昶將兵數萬屯烏江沈約志廣武將軍晉江左置蓋始於此時晉置烏江縣屬淮南郡即烏江亭長檥船待項羽之地以名縣宋白曰烏江縣漢東城縣地晉太康六年始於東城界置烏江縣昶丑兩翻敏弟處知顧榮等有二心勸敏殺之敏不從考異曰敏傳云弟昶勸殺榮按晉春秋敏臨死謂處曰我負卿時昶已先死今從晉春秋昶司馬錢廣周同郡人也密使廣殺昶宣言州下已殺敏揚州刺史治建業故謂建業為州下廣勒兵朱雀橋南朱雀橋在建業宮城之南跨秦淮水世傳晉孝武建朱雀門上有兩銅雀故橋亦以此得名余謂朱雀橋自吳以來有之蓋取前朱雀之義非晉孝武之時始有此名也朱雀橋亦曰大桁堅甲精兵悉委之顧榮慮敏之疑故往就敏敏曰卿當四出鎮衛謂鎮安人心乃所以衛敏也榮乃出與周共説甘卓曰説輸芮翻若江東之事可濟當共成之然卿觀茲事勢當有濟理不不讀曰否敏既常才政令反覆計無所定其子弟各已驕矜其敗必矣而吾等安然坐受其官祿事敗之日使江西諸軍函首送洛江西諸軍謂劉準所遣臨江者也此萬世之辱也卓遂詐稱疾迎女斷橋收船南岸橋即朱雀橋也建業城在秦淮水北故卓收船傍南岸斷丁管翻松滋縣屬廬江郡後漢省晉屬安豐郡劉昫曰唐壽州霍山縣漢松滋縣地今江陵府松滋縣乃是吳樂鄉之地晉氏南渡後以松滋流民僑立松滋縣非古松滋也敏自帥萬餘人討卓軍人隔水語敏衆曰本所以戮力陳公者正以顧丹楊周安豐耳敏以顧榮為丹楊太守周為安豐太守故以稱之帥讀曰率語牛倨翻汝等何為敏衆狐疑未決榮以白羽扇揮之白羽扇編白羽為之敏單騎北走騎奇寄翻追獲之於江乘歎曰諸人誤我以至今日謂弟處曰我負卿卿不負我謂不用處言殺顧榮等也夷三族於是會稽等郡盡殺敏諸弟會工外翻時平東將軍周馥代劉準鎮壽春三月己未朔馥傳敏首至京師詔徵顧榮為侍中紀瞻為尚書郎太傅越辟周為參軍陸玩為掾玩機之從弟也掾以絹翻從才用翻榮等至徐州聞北方愈亂疑不進越與徐州刺史裴盾書曰若榮等顧望以軍禮發遣榮等懼逃歸盾楷之兄子越兄也楊正衡曰盾徒損翻永興二年西陽夷寇江夏西陽縣春秋弦子之國漢為縣屬江夏郡晉屬弋陽郡漢和帝永元末巫蠻反討降之徙置江夏西陽諸蠻是也沈約曰晉惠帝分弋陽為西陽國劉昫曰吳分江夏置蘄春郡晉改為西陽郡唐蘄州即其地宋白曰光州光山縣本漢西陽縣夏戶雅翻諸將爭獻方略騎督朱伺獨不言將即亮翻騎奇寄翻伺相吏翻珉曰朱將軍何以不言伺曰諸人以舌擊賊伺惟以力耳珉又問將軍前後擊賊何以常勝伺曰兩敵共對惟當忍之彼不能忍我能忍是以勝耳珉善之凡戰非有智巧以出奇取勝而以力角力者莫過於朱伺之説矣永興二年詔追復楊太后尊號丁卯改葬之諡曰武悼楊后遇禍見八十二卷惠帝元康元年永興二年庚午立清河王覃弟豫章王詮為皇太子詮且緣翻辛未大赦永興二年帝觀章甲十一行本觀作親乙十一行本同張校同覽大政留心庶事太傅越不悅固求出藩庚辰越出鎮許昌為越殺繆播等張本永興二年以高密王略為征南大將軍都督荊州諸軍事鎮襄陽南陽王模為征西大將軍都督秦雍梁益諸章甲十一行本諸上有四州二字乙十一行本同孔本同張校同軍事鎮長安東燕王騰為新蔡王都督司冀二州諸軍事仍鎮鄴去年騰自並州徙鎮鄴永興二年公師藩既死汲桑逃還苑中茌平牧苑也桑於此起兵赴公師藩藩死逃還自稱大將軍聲言為成都王報仇為于偽翻下燕為同以石勒為前驅所向輒克署勒討章甲十一行本討作掃乙十一行本同孔本同張校同虜將軍遂進攻鄴時鄴中府庫空竭而新蔡武哀王騰資用甚饒騰性吝嗇無所振惠臨急乃賜將士米各數升帛各丈尺以是人不為用夏五月桑大破魏郡太守馮嵩長驅入鄴騰輕騎出奔為桑將李豐所殺桑出成都王穎棺穎之死也盧志收殯之今桑出而載之每事啓而後行遂燒鄴宮火旬日不滅袁紹據鄴始營宮室魏武帝又增而廣之至是悉為灰燼矣大掠而去濟自延津南擊兗州太傅越大懼使苟晞及將軍王讚討之永興二年秦州流民鄧定訇氐等據成固楊正衡曰訇呼宏翻余謂訇姓氐名寇掠漢中梁州刺史張殷遣巴西太守張燕討之鄧定等飢窘詐降於燕且賂之燕為之緩師窘渠隕翻降戶江翻為于偽翻定密遣訇氐求救於成成主雄遣太尉離司徒雲司空璜將兵二萬救定與燕戰大破之張殷及漢中太守杜孟治棄城走積十餘日離等引還盡徙漢中民於蜀漢中人句方白落帥吏民還守南鄭句古侯翻姓也梁州刺史漢中太守俱治南鄭杜佑曰漢漢中郡故城在唐梁州南鄭縣東北永興二年石勒與苟晞等相持於平原陽平間數月大小三十餘戰互有勝負秋七月己酉朔太傅越屯官渡為晞聲援永興二年己未以琅邪王睿為安東將軍都督揚州江南諸軍事假節鎮建業時周馥鎮壽春督揚州之江北故睿督揚州之江南考異曰元帝紀曰東海王越之收兵下邳以帝都督揚州越西迎大駕留帝居守永嘉初用王導計始鎮建業按既都督揚州不當猶鎮下邳又懷帝紀明言七月己未睿都督揚州鎮建業今從之永興二年八月己卯朔苟晞擊汲桑於東武陽東武陽縣漢屬東郡魏晉屬陽平郡後魏去東字為武陽縣唐貞觀初廢武陽入魏州莘縣開元七年復置改為朝城縣杜佑曰魏郡莘縣南有東武陽城桑退保清淵清淵縣漢屬魏郡應劭曰清河在縣西北晉屬陽平郡後魏分置臨清縣後齊廢臨清縣入清淵唐避高祖諱改清淵為臨清屬貝州永興二年分荊州江州八郡為湘州晉志帝分荊州之衡陽長沙湘東零陵邵陽桂陽及廣州之始安始興臨賀九郡置湘州帝紀曰分荊江八郡為湘州紀志自相抵牾此從紀沈約亦曰分荊州之長沙衡陽湘東邵陵零陵營陽建昌江州之桂陽八郡立湘州永興二年九月戊申琅邪王睿至建業睿以安東司馬王導為謀主推心親信每事咨焉睿名論素輕吳人不附居久之士大夫莫有至者導患之會睿出觀禊導使睿乘肩輿具威儀禊胡計翻祓除不祥也漢儀季春上巳官及百姓皆禊於東流水上應劭風俗通曰按周禮女巫掌歲時以祓除疾病禊者潔也於水上盥潔之也肩輿平肩輿也人以肩舉之而行導與諸名勝皆騎從騎奇寄翻從才用翻紀瞻顧榮等見之驚異相帥拜於道左帥讀曰率導因説睿曰顧榮賀循此土之望宜引之以結人心二子既至則無不來矣睿乃使導躬造循榮二人皆應命而至説輸芮翻造七到翻考異曰導傳曰元帝鎮建康居月餘士庶莫有至者會從兄敦來朝導謂之曰琅邪王仁德雖厚而名論猶輕兄威風已振宜有以匡濟者會三月上巳帝觀禊敦導皆騎從王敦傳東海王越誅繆播後乃以敦為揚州刺史其後徵拜尚書不就周傳錢璯聞劉聰逼洛陽不敢進乃謀反時王敦遷尚書與璯俱西欲殺敦敦奔告元帝懷帝紀永嘉元年七月琅邪王睿鎮建業三年三月殺繆播四年二月錢璯反是時睿在建業已三年矣安得言月餘又睿名論雖輕安有為都督數年而士庶莫有至者陳敏得江東猶首用周顧以收人望導為睿佐豈得待數年然後薦之乎然則導傳所云難以盡信今刪去導語及敦名而已以循為吳國內史榮為軍司軍司軍司馬也職為軍司此加官也皆與之謀議又以紀瞻為軍張軍下脫咨字祭酒卞壼為從事中郎壺苦本翻周為倉曹屬琅邪劉超為舍人晉諸王國有謁者四人中大夫六人舍人十人闓可亥翻又音開壺粹之子卞粹見上卷惠帝太安二年昭之曾孫也張昭輔吳為元臣謙以接士儉以足用以清靜為政撫綏新舊新謂自中原來者舊謂江東人説輸芮翻睿初至頗以酒廢事導以為言睿命酌引觴覆之於此遂絶史言元帝能用王導所以興於江左永興二年苟晞追擊汲桑破其八壘死者萬餘人桑與石勒收餘衆將奔漢冀州刺史譙國丁紹邀之於赤橋又破之桑奔馬牧茌平馬牧也晉志陽平郡有樂平縣前漢東郡之清縣也後漢章帝改曰樂平但石勒欲奔漢則非此樂平也又並州有樂平郡武帝泰始中置唐之遼州也勒奔于此加苟晞撫軍將軍都督青兗諸軍事丁紹寧北將軍監冀州諸軍事皆假節晞屢破強寇威名甚盛善治繁劇治直之翻用法嚴峻其從母依之晞奉養甚厚從母子求為將晞不許曰吾不以王法貸人從才用翻將子亮翻貸他代翻將無後悔邪固求之晞乃以為督護後犯法晞杖節斬之從母叩頭救之不聽既而素服哭之曰殺卿者兗州刺史哭弟者苟道將也苟晞字道將永興二年胡部大張㔨督馮莫突等胡人一部之長呼為部大楊正衡曰㔨音背壁于上黨石勒往從之因説㔨督等曰劉單于舉兵擊晉劉單于謂劉淵也説輸芮翻單音蟬自度終能獨立乎度徒洛翻曰不能勒曰然則安可不早有所屬今部落皆已受單于賞募往往聚議欲叛部大而歸單于矣㔨督等以為然冬十月㔨督等隨勒單騎歸漢騎奇寄翻漢王淵署㔨督為親漢王莫突為都督部大以勒為輔漢將軍平晉王以統之烏桓張伏利度有衆二千壁于樂平淵屢招不能致勒偽獲罪於淵往奔伏利度伏利度喜結為兄弟使勒帥諸胡寇掠帥讀曰率下同所向無前諸胡畏服勒知衆心之附己乃因會執伏利度謂諸胡曰今起大事我與伏利度誰堪為主諸胡咸推勒勒於是釋伏利度帥其衆歸漢淵加勒督山東征討諸軍事以伏利度之衆配之史言石勒之衆浸盛永興二年十一月戊申朔日有食之永興二年甲寅以尚書右僕射和郁為征北將軍鎮鄴永興二年乙亥以王衍為司徒衍説太傅越曰説輸芮翻下同朝廷危亂當賴方伯宜得文武兼資以任之乃以弟澄為荊州都督族弟敦為青州刺史考異曰晉春秋王衍言於太傅越以王澄為荊州敦為揚州據吳楚以為形援越從之於是澄敦同發越餞之敦傳自青州入為中書監東海王越誅繆播後始出為揚州播死在永嘉三年三月此年越在許昌不在洛故以晉書為定荊州有江漢之固青州有負海之險卿二人在外而吾居中足以為三窟矣戰國策馮暖謂孟嘗君曰狡兔有三窟僅得免其死耳其後敦澄自相魚肉衍亦死於石勒三窟安在哉是以忠臣國爾忘家蓋國安則家亦安也陸佃埤雅曰俗云兔營窟必背丘相通所謂狡兔三窟語牛倨翻以郭舒為別駕委以府事澄日夜縱酒不親庶務雖寇戎交急不以為懷舒常切諫以為宜愛民養兵保全州境澄不從為王澄不能保荊州張本永興二年十二月戊寅乞活田甄田蘭薄盛等起兵為新蔡王騰報讎斬汲桑于樂陵樂陵縣漢屬平原郡晉分為樂陵國唐為縣宋白曰棣州陽信縣魏屬樂陵國晉斬汲桑於此屬滄州為于偽翻穎故臣收葬之永興二年甲午以前太傅劉實為太尉實以老固辭不許庚子以光祿大夫高光為尚書令永興二年前北軍中候呂雍度支校尉陳顏等度支校尉蓋當時所置以督漕運者也度徒洛翻事覺太傅越矯詔囚覃於金墉城永興二年初太傅越與苟晞親善引升堂結為兄弟司馬潘滔説越曰兗州衝要魏武以之創業事見六十卷六十一卷非純臣也久令處之則患生心腹矣處昌呂翻若遷于青州厚其名號晞必悅公自牧兗州經緯諸夏藩衛本朝此所謂為之於未亂者也老子曰其安易持其未兆易謀其脆易破其微易散為之於未有治之於未亂緯于貴翻夏戶雅翻朝直遙翻癸卯越自為丞相領兗州牧都督兗豫司冀幽並諸軍事杜佑曰晉司徒與丞相通職更置迭廢未嘗並立至永嘉元年始兩置焉王衍為司徒東海王越為丞相加侍中假節都督青州諸軍事領青州刺史封東平郡公越晞由是有隙為後晞馳檄罪狀越張本晞至青州以嚴刻立威日行斬戮州人謂之屠伯鄧展曰言殺人若屠兒之殺六畜伯長也衆五六萬大掠兗州晞出屯無鹽以討之無鹽縣屬東平國唐屬濟州界刑殺更甚於晞晞討植破之初陽平劉靈少貧賤少詩照翻力制奔牛走及奔馬時人雖異之莫能舉也靈撫膺歎曰膺胸也天乎何當亂也及公師藩起靈自稱將軍寇掠趙魏會王彌為苟純所敗靈亦為王讚所敗遂俱遣使降漢敗補邁翻考異曰彌傳曰彌逼洛陽敗於七里澗乃與其黨劉靈謀歸漢按十六國春秋靈為王讚所逐彌為苟純所敗乃謀降漢今年春靈已在淵所五月彌乃如平陽然則二人先降漢已久矣彌傳誤也漢拜彌鎮東大將軍青徐二州牧都督緣海諸軍事封東萊公以靈為平北將軍永興二年李釗至寧州光熙元年李毅卒釗今乃至寧州釗音昭治中毛孟詣京師求刺史屢上奏不見省上時掌翻省悉景翻孟曰君亡親喪幽閉窮城謂李毅已死寧州受圍不解也喪息浪翻精誠無感生不如死欲自刎刎扶粉翻朝廷憐之以魏興太守王遜為寧州刺史考異曰華陽國志以廣漢太守王遜為寧州按時廣漢已為李雄所陷今從遜傳交州刺史吾彥遣其子咨將兵救之將即亮翻永興二年慕容廆自稱鮮卑大單于廆乎罪翻永興二年拓跋祿官卒弟猗盧總攝三部與廆通好祿官分國為三部事見上八十二卷惠帝元康五年好呼到翻二年二年春正月丙午朔日有食之考異曰帝紀天文志云丙子朔誤今從長曆二年丁未大赦二年漢王淵遣撫軍將軍聰等十將南據太行行戶剛翻輔漢將軍石勒等十將東下趙魏考異曰石勒載記曰元海使劉聰攻壺關命勒帥所統七千為前鋒都督劉琨遣護軍黃秀等救壺關勒敗秀於白田殺之遂陷壺關事在明年今從十六國春秋二年二月辛卯太傅越殺清河王覃二年庚子石勒寇常山王浚擊破之二年涼州刺史張軌病風口不能言使其子茂攝州事隴西內史晉昌張越涼州大族惠帝分敦煌酒泉置晉昌郡杜佑曰晉昌漢冥安縣地與其兄酒泉太守鎮及西平太守曹袪袪丘於翻考異曰晉春秋作曹祗今從張軌傳謀遣使詣長安使疏吏翻告南陽王模稱軌廢疾請以秦州刺史賈龕代之龕將受之其兄讓龕曰張涼州一時名士威著西州汝何德以代之龕乃止龕口含翻鎮袪上疏更請刺史未報遂移檄廢軌以軍司杜耽攝州事使耽表越為刺史軌下教欲避位歸老宜陽軌少隱於宜陽女几山故下教欲歸老於宜陽踏徒臘翻折而設翻排閣入言曰晉室多故明公撫寧西夏此西夏謂河西之地夏戶雅翻當鳴鼓誅之遂出戒嚴會軌長子實自京師還乃以實為中督護將兵討鎮遣鎮甥太府主簿令狐亞按張軌傳有太府司馬主簿又有少府主簿蓋以都督府為太府涼州府為少府也為陳利害説輸芮翻為于偽翻鎮流涕曰人誤我乃詣實歸罪實南擊曹袪走之朝廷得鎮袪疏以侍中袁瑜為涼州刺史治中楊淡馳詣長安考異曰晉春秋作張淡今從張軌傳淡徒覽翻又徒濫翻割耳盤上訴軌之被誣被皮義翻南陽王模表請停瑜武威太守張琠亦上表留軌字林琠他殄翻詔依模所表且命誅曹袪軌於是命實帥步騎三萬討袪斬之帥讀曰率下同張越奔鄴涼州乃定二年三月太傅越自許昌徙鎮鄄城鄄音絹二年王彌收集亡散兵復大振復扶又翻分遣諸將攻掠青徐兗豫四州所過攻陷郡縣多殺守令有衆數萬苟晞與之連戰不能克夏四月丁亥彌入許昌太傅越遣司馬王斌帥甲士五千人入衛京師張軌亦遣督護北宮純將兵衛京師五月彌入自轘轅轘音環敗官軍于伊北伊水之北也敗必邁翻下同宮城門晝閉壬戌彌至洛陽屯于津陽門津陽門洛陽城南面東頭第二門北章甲十一行本北上有甲子衍與王斌等出戰九字乙十一行本同孔本同張校同退齋校同宮純募勇士百餘人突陳陳讀曰陳彌兵大敗乙丑彌燒建春門而東衍遣左衛將軍王秉追之戰于七里澗又敗之彌走渡河與王桑自軹關如平陽軹關在河內軹縣軹音只令曰孤親行將軍之館行下孟翻拂席洗爵敬待將軍及至拜司隸校尉加侍中特進以桑為散騎侍郎北宮純等與漢劉聰戰於河東敗之二年詔封張軌西平郡公軌辭不受時州郡之使莫有至者軌獨遣使貢獻歲時不絶使疏吏翻二年秋七月甲辰漢王淵寇平陽太守宋抽棄郡走河東太守路述戰死淵徙都蒲子蒲子縣即晉公子重耳所居蒲城也漢屬河東郡晉屬平陽郡劉昫曰唐隰州治隰川縣漢蒲子縣地杜佑曰隰州隰川蒲縣漢蒲子縣地考異曰劉琨答太傅府書曰潛遣使驛離間其部落淵遂怖懼南奔蒲子雜虜歸降萬有餘落琨傳亦然按時淵強琨弱豈因畏琨而徙都蓋琨為自大之辭史因承以為實耳酋慈由翻單上演翻降戶江翻考異曰載記作氐酋大單于徵按當時戎狄酋長皆謂之大徵即光文單后之父于衍字也二年八月丁亥太傅越自鄄城徙屯濮陽濮陽衛墟漢屬東郡晉初分置濮陽國唐鄄城濮陽二縣皆屬濮州鄄音絹濮音卜又徙屯滎陽幾居豈翻二年九月漢王彌石勒寇鄴和郁棄城走詔豫州刺史裴憲屯白馬以拒彌車騎將軍王堪屯東燕以拒勒漢東郡燕縣古南燕國晉省而故城猶在曰東燕城後魏立東燕縣屬陳留郡劉昫曰唐滑州胙城縣漢南燕縣燕於賢翻大陽縣屬河東郡地理志曰北虢也應劭曰在大河之陽唐併入陝州河北縣界楷之子也裴楷仕武帝惠帝時二年冬十月甲戌漢王淵即皇帝位大赦改元永鳳十一月以其子和為大將軍聰為車騎大將軍族子曜為龍驤大將軍驤思將翻二年壬寅並州刺史劉琨使上黨太守劉惇帥鮮卑攻壺關杜佑曰唐潞州治上黨漢壼關縣後魏移壺關縣當羊腸阪羊頭之厄帥讀曰率下同二年丙午漢都督中外諸軍事章甲十一行本事下有大司馬三字乙十一行本同孔本同退齋校同領丞相右賢王宣卒二年石勒劉靈帥衆三萬寇魏郡汲郡頓丘汲縣漢屬河內郡武帝泰始二年分置汲郡唐之衛州即其地降戶江翻皆假壘主將軍都尉印綬綬音受簡其強壯五萬為軍士老弱安堵如故己酉勒執魏郡太守王粹于三臺殺之三臺注見後八十八卷永嘉六年二年十二月辛未朔大赦二年乙亥漢主淵以大將軍和為大司馬封梁王尚書令歡樂為大司徒封陳留王樂音洛后父御史大夫呼延翼為大司空封鴈門郡公宗室以親疏悉封郡縣王異姓以功伐悉封郡縣公侯二年成尚書令楊褒卒考異曰載記云丞相楊褒今從晉春秋好呼到翻成主雄初得蜀用度不足諸將有以獻金銀得官者褒諫曰陛下設官爵當網羅天下英豪何有以官買金邪雄謝之雄嘗醉推中書令杖太官令褒進曰天子穆穆諸侯皇皇禮記曲禮言陸德明曰酗況具翻以酒為凶曰酗雄慚而止二年成平寇將軍李鳳屯晉壽葭萌縣漢屬廣漢郡蜀改為漢壽縣屬梓潼郡晉又改漢壽曰晉壽漢中民東走荊沔沔水自梁州入荊州界為荊沔荊州寇盜不禁詔起劉璠為順陽內史江漢間翕然歸之璠父弘之喪未終起之於苫塊荊州之民懷其父故翕然歸其子璠扶元翻王崇武標點容肇祖聶崇岐覆校
