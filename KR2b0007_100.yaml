body:
  text: 資治通鑑卷第一百端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰權判西京留司御史臺上柱國河內郡開國侯食邑一千三百戶食實封四百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注晉紀二十二永和十一年孝宗穆皇帝中之下永和十一年乙卯三五五永和十一年春正月故仇池公楊毅弟宋奴使其姑子梁式王刺殺楊初初子國誅式王及宋奴自立為仇池公桓溫表國為鎮北將軍秦州刺史永和十一年二月秦大蝗百草無遺牛馬相噉毛無草可食故相噉毛噉徒濫翻又徒覽翻永和十一年夏四月燕主俊自和龍還薊燕主如龍城見上卷上年薊音計幽冀之人以俊為東遷和龍直薊之東先悉薦翻所在屯結㣥臣請討之俊曰㣥小以朕東巡故相惑為亂耳今朕既至尋當自定不足討也永和十一年蘭陵太守孫黑濟北太守高柱守式又翻濟子禮翻建興太守高瓫瓫蒲奔翻及秦河內太守王會黎陽太守韓高皆以郡降燕史言燕強諸反側子皆附之降戶江翻永和十一年秦淮南王生幼無一目性粗暴其祖父洪嘗戲之曰吾聞瞎兒一淚信乎瞎許轄翻一目盲也生怒引佩刀自刺出血曰此亦一淚也洪大驚鞭之生曰性耐刀槊不堪鞭棰槊色角翻棰止蕊翻洪謂其父健曰此兒狂悖悖蒲內翻又蒲沒翻宜早除之不然必破人家健將殺之健弟雄止之曰兒長自應改何可遽爾及長力舉千鈞手格猛獸格擊也長知兩翻擊刺騎射冠絶一時騎奇寄翻冠古玩翻下同獻哀太子卒秦太子萇諡曰獻哀強其兩翻少詩照翻秦主健以讖文有三羊五眼乃立生為太子為苻生以凶暴不克紹張本尚書令王墮為司空司隸校尉梁楞為尚書令楞盧登翻永和十一年姚襄所部多勸襄北還襄從之五月襄攻冠軍將軍高季於外黃外黃縣自漢以來屬陳留郡賢曰外黃故城在今汴州雍丘縣東冠古玩翻襄進據許昌永和十一年六月丙子秦主健寢疾庚辰平昌公章十二行本公作王乙十一行本同孔本同菁勒兵入東宮將殺太子生而自立時生侍疾西宮秦主所居為西宮卒子恤翻攻東掖門健聞變登端門陳兵自衛衆見健惶懼皆捨仗逃散健執菁數而殺之數所具翻餘無所問壬午以大司馬武都王安都督中外諸軍事苻雄死健以菁都督中外諸軍菁以逆誅以安代之甲申健引太師魚遵丞相雷弱兒太傅毛貴司空王墮尚書令梁楞左僕射梁安右僕射段純吏部尚書辛牢等受遺詔輔政健謂太子生曰六夷酋帥及大臣執權者若不從汝命宜漸除之為苻生虐殺大臣張本酋慈由翻帥所類翻臣光曰顧命大臣所以輔導嗣子為之羽翼也為之羽翼而教使翦之能無斃乎知其不忠則勿任而已矣任以大柄又從而猜之鮮有不召亂者也鮮息淺翻永和十一年乙酉健卒年三十九廟號高祖丙戌太子生即位苻生字長生健第三子也改元壽光㣥臣奏曰未踰年而改元非禮也古禮君薨世子即位既踰年而後稱元年窮推議主得右僕射段純殺之永和十一年秋七月以吏部尚書周閔為左僕射永和十一年或告會稽王昱曰會工外翻武陵王第中大修器仗將謀非常武陵王晞也彪之曰武陵王之志盡於馳騁畋獵而已耳騁丑郢翻深願靜之以安異同之論勿復以為言昱善之為武陵終以此得禍彪之所不能救張本復扶又翻永和十一年秦主生尊母強氏曰皇太后立梁氏為皇后梁氏安之女也以其嬖臣太子門大夫南安趙韶為右僕射續漢志太子門大夫二人職比郎將嬖卑義翻又博計翻著作郎董榮為尚書永和十一年涼王祚淫虐無道上下怨憤祚惡河州刺史張瓘之強張駿置河州治枹罕惡烏路翻索昔各翻枹音膚使瓘討叛胡又遣其將易揣張玲帥步騎萬三千以襲瓘將即亮翻易讀如字姓也揣初委翻玲盧經翻帥讀曰率騎奇寄翻張掖人王鸞知術數言於祚曰此軍出必不還涼國將危並陳祚三不道祚大怒以鸞為訞言訞於驕翻斬以徇鸞臨刑曰我死軍敗於外王死於內必矣祚族滅之瓘聞之斬孚起兵擊祚傳檄州郡廢祚以侯還第復立涼寧侯曜靈曜靈廢見上卷上年瓘擊破之揣等單騎奔還瓘軍躡之姑臧振恐驍騎將軍敦煌宋混兄修與祚有隙懼禍驍堅堯翻敦徒門翻八月混與弟澄西走合衆萬餘人以應瓘還向姑臧祚遣楊秋胡將曜靈於東苑拉其腰而殺之將如字拉盧合翻諡曰哀公永和十一年秦主生封衛大將軍黃眉為廣平王前將軍飛為新興王皆素所善也徵大司馬武都王安領太尉健臨沒以安督中外諸軍然尚在蒲阪今生乃召之鎮蒲阪阪音反魏王廋為鎮東大將軍豫州牧鎮陝城廋疏鳩翻陝失冉翻中書監胡文中書令王魚言於生曰比有星孛于大角熒惑入東井大角帝坐東井秦分天文志大角在攝提間大角者天王坐也東井八星東井輿鬼秦雍州分比毗至翻孛蒲內翻坐徂臥翻分扶問翻國有大喪大臣戮死願陛下修德以禳之生曰皇后與朕對臨天下可以應大喪矣毛太傅梁車騎梁僕射受遺輔政可以應大臣矣九月生殺梁后及毛貴梁楞梁安貴后之舅也右僕射趙韶中護軍趙誨皆洛州刺史俱之從弟也趙俱鎮宜陽事見上卷上年從才用翻乃以俱為尚書令俱固辭以疾謂韶誨曰汝等不復顧祖宗復扶又翻欲為滅門之事毛梁何罪而誅之吾何功而代之汝等可自為吾其死矣遂以憂卒卒子恤翻永和十一年涼宋混軍于武始大澤張駿分狄道縣立武始郡宋混西走起兵必不東向狄道水經都野澤在武威縣東北注云在姑臧城北三百里都野即禹貢之豬野其水上承姑臧武始澤澤在姑臧西為于僞翻閏月混軍至姑臧涼王祚收張瓘弟琚及子嵩將殺之琚嵩聞之募市人數百揚言張祚無道我兄大軍已至城東敢舉手者誅三族遂開西門納混兵領軍將軍趙長等懼罪趙長請立祚者也故懼罪立涼武侯玄靚為主靚疾郢翻又疾正翻易揣等引兵入殿收長等殺之祚按劍殿上大呼叱左右力戰呼火故翻祚素失衆心莫肯為之鬬者為于僞翻遂為兵人所殺混等梟其首梟堅堯翻宣示中外暴尸道左城內咸稱萬歲以庶人禮葬之並殺其二子混琚上玄靚為大將軍涼州牧西平公上時掌翻復稱建興四十三年張祚改建興年號見上卷上年張瓘至姑臧推玄靚為涼王自為使持節都督中外諸軍事尚書令涼州牧張掖郡公使疏吏翻以宋混為尚書僕射隴西人李儼據郡不受瓘命用江東年號用永和年號也為李儼歸秦張本將即亮翻未至西平人衛綝亦據郡叛綝丑林翻霸兵潰奔還瓘遣弟琚擊綝敗之敗補邁翻酒泉太守馬基起兵以應綝瓘遣司馬張姚王國擊斬之永和十一年冬十月以豫州刺史謝尚督並冀幽三州時江左僑立青冀並幽四州於江北南渡初祖逖以豫州刺史治譙城永昌元年祖約退屯壽春成帝咸和四年庾亮以豫州刺史治蕪湖咸康四年毛寶以豫州刺史治邾城六年庾翼以豫州刺史治蕪湖永和元年趙胤以豫州刺史治牛渚二年尚以豫州刺史治蕪湖今進壽春皆建康西藩也進取則屯壽春守江則多在歷陽蕪湖二處永和十一年鎮北將軍段龕與燕主俊書抗中表之儀俊段氏出也故龕與之抗中表之儀龕苦含翻下同俊怒十一月以太原王恪為大都督撫軍將軍陽騖副之以擊龕騖音務永和十一年秦以辛牢守尚書令趙韶為左僕射尚書董榮為右僕射中護軍趙誨為司隸校尉永和十一年十二月高句麗王釗遣使詣燕納質修貢以請其母句如字又音駒麗力知翻燕囚釗母見九十七卷成帝咸康八年質音致燕主俊許之遣殿中將軍刁龕送釗母周氏歸其國以釗為征東大將軍營州刺史封樂浪公樂浪音洛琅王如故使為高句麗王如故永和十一年上黨人馮鴦逐燕太守段剛據安民城魏收地形志燕上黨太守治安民城安民城在襄垣縣蓋永嘉中劉琨遣張倚所築以安上黨之民因以為名遣使來降使疏吏翻降戶江翻永和十一年秦丞相雷弱兒性剛直以趙韶董榮亂政每公言於朝朝直遙翻見之常切齒韶榮譖之於秦主生生殺弱兒及其九子二十七孫於是諸羌皆有離心雷弱兒南安羌酋也以非罪而死故諸羌皆有離心生雖諒陰遊飲自若彎弓露刃以見朝臣錘鉗鋸鑿錘傳追翻鉗其廉翻鋸居御翻可以害人之具備置左右即位未幾幾居豈翻后公卿已下至于僕隸凡殺五百餘人截脛拉脅鋸項刳胎者比比有之脛形定翻膝下骨直而長者拉盧合翻比簿計翻永和十一年燕主俊以段龕方強謂太原王恪曰若龕遣軍拒河不得渡者可直取呂護而還呂護時據野王具舟楫以觀龕志趣龕弟羆驍勇有智謀驍堅堯翻言於龕曰慕容恪善用兵加之衆盛若聽其濟河進至城下恐雖乞降不可得也降戶江翻下同請兄固守羆帥精鋭拒之於河幸而戰捷兄帥大衆繼之帥讀曰率下同必有大功若其不捷不若早降猶不失為千戶侯也龕不從羆固請不已龕怒殺之十二年十二年春正月燕太原王恪引兵濟河未至廣固百餘里段龕帥衆三萬逆戰丙申恪大破龕於淄水據載記恪破龕於濟水之南今言未至廣固百餘里蓋至淄水而會戰也水經濁水徑廣固城西東流至廣饒入巨淀又北合于淄水斬右長史袁範等齊王友辟閭蔚被創段龕自稱齊王故置王友之官蔚紆勿翻創初良翻遣人求之蔚已死士卒降者數千人龕脫走還城固守恪進軍圍之十二年秦司空王墮性剛峻右僕射董榮侍中強國皆以佞幸進墮疾之如讎每朝見榮未嘗與之言每朝句絶朝直遙翻見如字董君貴幸無比公宜小降意接之墮曰董龍是何雞狗龍董榮小字會有天變榮與強國言於秦主生曰強其兩翻姓也今天譴甚重宜以貴臣應之生曰貴臣惟有大司馬及司空耳榮章十二行本榮下有國字乙十一行本同孔本同曰大司馬國之懿親不可殺也大司馬謂武都王安生叔父也將刑榮謂之曰今日復敢比董龍於雞狗乎復扶又翻墮瞋目叱之瞋七人翻洛州刺史杜郁墮之甥也左僕射趙韶惡之惡烏路翻譖於生以為二於晉而殺之壬戌生宴㣥臣於太極殿以尚書令辛牢為酒監酒酣生怒曰何不強人酒而猶有坐者監古暫翻強其兩翻引弓射牢殺之射而亦翻㣥臣懼莫敢不醉偃仆失冠生乃悅十二年胸奴大人劉務桓卒弟閼頭立將二於代二月代王什翼犍引兵西巡臨河閼頭懼請降犍居言翻閼於葛翻降戶江翻下同十二年燕太原王恪招撫段龕諸城恪圍廣固未下故先招撫其統內諸城己丑龕所署徐州刺史陽都公王騰舉衆降恪命騰以故職還屯陽都段龕置徐州於琅邪陽都縣杜佑曰漢陽都縣故城在沂州沂水縣南十二年秦征東大將軍晉王柳遣參軍閻負梁殊使於涼以書說涼王玄靚使疏吏翻下同說輸芮翻負殊至姑臧張瓘見之曰我晉臣也臣無境外之交二君何以來辱負殊曰晉王與君鄰藩雖山河阻絶風通道會秦使苻柳鎮蒲阪非與涼州鄰也故以風通道會為言好呼到翻下同君何怪焉瓘曰吾盡忠事晉於今六世矣軌實茂駿重華曜靈祚為七世今言六世斥祚不以為世數是上違先君之志下隳士民之節其可乎負殊曰晉室衰微墜失天命固已久矣是以涼之二王北面二趙唯知機也張茂稱藩於前趙張駿稱藩於後趙涼王若欲自帝河右則非秦之敵欲以小事大則曷若捨晉事秦長保福祿乎瓘曰中州好食言好呼到翻嚮者石氏使車適返而戎騎已至使疏吏翻永和二年張重華嗣位遣使奉章於石虎虎繼遣王擢來寇騎奇寄翻吾不敢信也負殊曰自古帝王居中州者政化各殊趙為姦詐秦敦信義豈得一概待之乎概所以平斗斛一概待之言無所高下也先帝討而擒之擒張先見九十八卷六年未嘗擒楊初也負殊姑為是言耳寵以爵秩固非石氏之比也瓘曰必如君言秦之威德無敵何不先取江南則天下盡為秦有征東何辱命焉負殊曰江南文身之俗古者荊蠻之俗斷髮文身以避蛟龍之害負殊以此斥言之耳是時衣冠文物皆在江南且正朔所在也負殊吠堯刺由知各為其主而已化隆後服鄭玄曰汚猶殺也易曰高宗伐鬼方三年克之世之說者以為荊楚輕悍道汚先叛化隆後服故負殊亦以此斥言江南河右可以義懷故遣行人先申大好好呼到翻若君不達天命則江南得延數年之命而河右恐非君之土也瓘曰我跨據三州三州謂涼河沙張茂及張駿所分置者也西苞葱嶺東距大河伐人有餘況於自守何畏於秦負殊曰貴州山河之固孰若殽函民物之饒孰若秦雍雍於用翻杜洪張琚因趙氏成資兵強財富有囊括關中席卷四海之志先帝戎旗西指冰消雲散旬月之間不覺易主事見九十八卷六年赫然奮怒控弦百萬鼓行而西未知貴州將何以待之瓘笑曰茲事當決之於王非身所了了決也涼王雖英睿夙成然年在幼沖君居伊霍之任國家安危繫君一舉耳瓘懼乃以玄靚之命遣使稱藩於秦秦因玄靚所稱官爵而授之十二年將軍劉度攻秦青州刺史王朗於盧氏盧氏縣漢屬弘農郡晉屬上洛郡唐屬虢州攻秦幽州刺史強哲于裴氏堡永嘉之亂裴氏舉宗據險築堡以自守後人因而置屯戍故堡猶有裴氏之名蓋在河東界長知兩翻建節將軍鄧羌拒長卿飛未至而度退羌與長卿戰大破之獲長卿及甲首二千餘級十二年桓溫請移都洛陽修復園陵章十餘上上時掌翻不許拜溫征討大都督督司冀二州諸軍事以討姚襄十二年三月秦主生發三輔民治渭橋治直之翻金紫光祿大夫程肱諫以為妨農生殺之十二年夏四月長安大風發屋拔木風捲屋瓦掀簷桷為發屋或稱賊至宮門晝閉五日乃止秦主生推告賊者刳出其心左光祿大夫強平諫曰天降災異陛下當愛民事神緩刑崇德以應之乃可弭也弭止也鑿其頂而殺之衛將軍廣平王黃眉前將軍新興王飛建節將軍鄧羌以平太后之弟叩頭固諫生弗聽出黃眉為左馮翊飛為右扶風羌行咸陽太守前漢扶風渭城縣秦之咸陽也後漢晉省魏收地形志咸陽郡治石安縣即漢渭城也石勒更名是郡蓋永嘉之後㣥胡所置也故皆弗殺驍堅堯翻五月太后強氏以憂恨卒諡曰明德十二年姚襄自許昌攻周成于洛陽周成襲據洛陽見上卷十年十二年六月秦主生下詔曰朕受皇天之命君臨萬邦嗣統以來有何不善而謗讟之音扇滿天下杜預曰讟誹也讟徒木翻而謂之殘虐行者比肩未足為希希少也復如朕何復扶又翻自去春以來潼關之西至于長安虎狼為暴晝則繼道言虎狼相繼於路也繼蜀本作斷不食六畜畜許又翻專務食人凡殺七百餘人民廢耕桑相聚邑居而為害不息秋七月秦㣥臣奏請禳災禳如羊翻除殃祭也生曰野獸飢則食人飽當自止何禳之有且天豈不愛民哉正以犯罪者多故助朕殺之耳史言苻生之虐甚於桀紂十二年丙子燕獻懷太子曄卒十二年姚襄攻洛陽踰月不克長史王亮諫曰明公英名蓋世兵強民附今頓兵堅城之下力屈威挫或為他寇所乘此危亡之道也襄不從桓溫自江陵北伐遣督護高武據魯陽輔國將軍戴施屯河上自帥大兵繼進帥讀曰率下同與寮屬登平乘樓平乘樓大船之樓歎曰遂使神州陸沈百年丘墟王夷甫諸人不得不任其責以王衍等尚清談而不恤王事以致夷狄亂華也晉諸公諸從公府皆有記室掌表疏箋記書檄運有興廢豈必諸人之過溫作色曰昔劉景升有千斤大牛噉芻豆十倍於常牛負重致遠曾不若一羸牸溫意以牛況宏徒能糜俸祿而無經世之用劉表字景升噉徒濫翻又徒覽翻羸倫為翻牸疾置翻牝牛也漢獻帝建安十三年曹操入荊州八月己亥溫至伊水伊水在洛陽城南匿精鋭於水北林中遣使謂溫曰承親帥王師以來襄今奉身歸命願敕三軍小卻當拜伏道左溫曰我自開復中原展敬山陵無豫君事欲來者便前相見在近無煩使人使疏吏翻襄拒水而戰溫結陳而前陳讀曰陳親被甲督戰被皮義翻襄衆大敗死者數千人襄帥麾下數千騎奔于洛陽北山洛陽北山北芒山也騎奇寄翻民棄妻子隨襄者五千餘人襄勇而愛人雖戰屢敗民知襄所在輒扶老攜幼奔馳而赴之溫軍中傳言襄病創已死創初良翻許洛士女為溫所得者無不北望而泣史言姚襄得人心溫追之不及弘農楊亮自襄所來奔溫問襄之為人亮曰襄神明器宇孫策之儔而雄武過之儔等也類也周成帥衆出降降戶江翻下同溫屯故太極殿前既而徙屯金墉城己丑謁諸陵有毀壞者修復之各置陵令漢起陵邑邑各置令後遂因之諸陵各置陵令屬太常鎮洛陽以尚未至留潁川太守毛穆之督護陳午河南太守戴施以二千人戍洛陽衛山陵徙降民三千餘家於江漢之間執周成以歸姚襄奔平陽秦並州刺史尹赤復以衆降襄尹赤叛襄見上卷八年襄陵縣漢屬河東郡晉屬平陽郡後魏改襄陵為禽昌縣隋唐復曰襄陵永和七年張平降秦已而二於燕通鑑以秦所授官繫之敗補邁翻乃與平約為兄弟各罷兵十二年段龕遣其屬段薀嚴薀改蘊來求救薀紆粉翻詔徐州刺史荀羡將兵隨薀救之羡至琅邪此古琅邪也王騰寇鄄城鄄城縣漢屬東郡晉屬濮陽此非古鄄城縣蓋僑縣也會霖雨城壞獲騰斬之段龕署王騰為徐州刺史屯陽都時降于燕為燕來寇十二年冬十月癸巳朔日有食之十二年秦主生夜食棗多旦而有疾召太醫令程延使診之診止尹翻候脈也延曰陛下無他疾食棗多耳生怒曰汝非聖人安知吾食棗遂斬之十二年燕大司馬恪圍段龕於廣固諸將請急攻之恪曰用兵之勢有宜緩者有宜急者不可不察若彼我勢敵外有強援恐有腹背之患則攻之不可不急若我強彼弱無援於外力足制之者當羈縻守之以待其斃兵法十圍五攻正謂此也孫子曰用兵之法十則圍之五則攻之未有離心濟南之戰即淄水之戰曰濟南者以濟水南北大界言之但龕用之無術以取敗耳今憑阻堅城上下戮力我盡鋭攻之計數日章十二行本日作旬乙十一行本同孔本同可拔然殺吾士卒必多矣自有事中原兵不暫息暫與暫同夜而忘寐奈何輕用其死乎要在取之不必求功之速也諸將皆曰非所及也軍中聞之人人感悅於是為高牆深塹以守之塹七豔翻齊人爭運糧以饋燕軍龕嬰城自守樵采路絶城中人相食龕悉衆出戰恪破之於圍裏時外築長圍故戰於圍裏屯廣固城諸門也騎奇寄翻蕩徒朗翻又他浪翻僅而得入餘兵皆沒於是城中氣沮莫有固志沮在呂翻十一月丙子龕面縛出降並執朱禿送薊降戶江翻薊音計恪撫安新民悉定齊地徙鮮卑胡羯三千餘戶于薊燕王俊具朱禿五刑朱禿殺慕容鉤而奔龕見上卷十年恪留慕容塵鎮廣固以尚書左丞鞠殷為東萊太守章武太守鮮于亮為齊郡太守乃還殷彭之子也彭時為燕大長秋以書戒殷曰王彌曹嶷必有子孫嶷魚力翻汝善招撫勿尋舊怨以長亂源長知兩翻殷推求得彌從子立嶷孫巖於山中請與相見深結意分從才用翻下同分扶問翻彭復遣使遺以車馬衣服復扶又翻遺于季翻郡民由是大和鞠彭自東萊歸燕見九十一卷元帝大興二年荀羡聞龕已敗退還下邳留將軍諸葛攸高平太守劉莊將三千人守琅邪參軍譙國戴彖等將二千人守泰山楊正衡曰彖音遁汴城即浚儀城余謂汴當作卞魯國卞縣城也劉昫曰兗州泗水縣卞縣古城也十二年詔遣兼司空散騎常侍車灌等持節如洛陽修五陵宣帝陵在河陰首陽山景帝陵曰峻平文帝陵曰崇陽武帝陵曰峻陽惠帝陵曰太陽散悉亶翻騎奇寄翻車尺奢翻庚戌帝及㣥臣皆服緦臨於太極殿三日緦十五升布抽去其半臨力鴆翻十二年司州都督謝尚以疾不行以丹陽尹王胡之代之章十二行本之下有未行而卒四字乙十一行本同孔本同張校同退齊校同胡之廙之子也王廙王敦之從弟見八十九卷愍帝建興三年廙羊至翻又逸職翻十二年是歲仇池公楊國從父俊殺國自立以俊為仇池公國子安奔秦其後秦用楊安以取仇池豈即國之子邪升平元年丁巳三五七十二年春正月壬戌朔帝加元服太后詔歸政大赦改元太后徙居崇德宮十二年燕主俊徵幽州刺史乙逸為左光祿大夫逸夫婦共載鹿車子璋從數十騎服飾甚麗奉迎於道逸大怒閉車不與言到城深責之到城謂到薊城也永和八年燕王都薊於龍城置留臺以乙逸領留務蓋以幽州刺史鎮龍城也騎奇寄翻悛丑緣翻下同逸常憂其敗而璋更被擢任歷中書令御史中丞被皮義翻逸乃歎曰吾少自修立少詩照翻克己守道僅能免罪璋不治節檢專為奢縱治直之翻而更居清顯此豈惟璋之忝幸實時世之陵夷也十二年二月癸丑燕主俊立其子中山王暐為太子大赦改元光壽十二年太白入東井秦有司奏太白罰星東井秦分分扶問翻必有暴兵起京師秦主生曰太白入井自為渴耳為于僞翻何所怪乎十二年姚襄將圖關中夏四月自北屈進屯杏城北屈縣漢屬河東郡晉屬平陽郡師古曰屈居勿翻晉公子夷吾所居班志禹貢壺口山在北屈縣東南水經注北屈西距河十里孟門山在河上襄蓋自北屈渡河而屯杏城五代志汾州昌寧縣有壺口山宋白曰慈州吉鄉縣漢北屈縣今縣北二十一里古城即漢理魏收地形志澄城縣有杏城師古曰澄城漢馮翊之徵縣也徵音懲據載記杏城在馬蘭山北杜佑曰姚萇置杏城鎮在今坊州西七里敷城唐坊州鄜城縣是也後魏置敷城縣隋改曰鄜城曜武將軍蓋趙石氏所署置蘭襄之從兄從才用翻益生襄之兄也羌胡及秦民歸之者五萬餘戶秦將苻飛龍擊蘭擒之襄引兵進據黃落秦主生遣衛大將軍廣平王黃眉平北將軍苻道龍驤將軍東海王堅驤思將翻建節將軍鄧羌漢魏之間置建節中郎將後以為將軍號襄堅壁不戰羌謂黃眉曰襄為桓溫張平所敗鋭氣喪矣敗補邁翻喪息浪翻然其為人強狠狠戶墾翻若鼓譟揚旗直壓其壘彼必忿恚而出恚於避翻可一戰擒也五月羌帥騎三千壓其壘門而陳帥讀曰率騎奇寄翻陳讀曰陳襄怒悉衆出戰羌陽不勝而走襄追之至于三原三原在漢馮翊池陽縣界宋白曰苻堅於嶻嶭北置三原護軍後周置三原縣黃眉等以大衆繼至襄兵大敗襄所乘駿馬曰黧眉騧黧音黎又音良脂翻黑而黃色曰黧騧古瓜翻黃馬黑喙曰騧馬倒秦兵擒而斬之弟萇帥其衆降萇仲良翻降戶江翻襄載其父弋仲之柩在軍中柩巨救翻在牀曰尸在棺曰柩秦主生以王禮葬弋仲於孤磐孤磐在天水冀縣界章十二行本襄下有廣平王三字乙十一行本同孔本同黃眉等還長安生不之賞數衆辱黃眉數所角翻黃眉怒謀弒生發覺伏誅事連王公親戚死者甚衆十二年戊寅燕主俊遣撫軍將軍垂中軍將軍虔護軍將軍平熙帥步騎八萬攻敕勒於塞北新唐書曰敕勒其先胸奴也元魏時號高車部其後訛為鐵勒唐之鐵勒十五種是也載記作丁零勑勤勒大破之俘斬十餘萬獲馬十三萬匹牛羊億萬頭十二年胸奴單于賀賴頭帥部落三萬五千口降燕自東漢以來胸奴入居塞內者凡十九種賀賴其一也單音蟬漢代郡有平舒縣勃海有東平舒縣東平舒後漢屬河間國晉屬章武國代郡之平舒未嘗改屬書代郡以別章武之平舒代郡之平舒當在唐蔚之北界處昌呂翻十二年秦主生夢大魚食蒲苻氏本蒲家也故以夢魚食蒲為異東海大魚化為龍男皆為王女為公生乃誅太師録尚書事廣寧公魚遵並其七子十孫金紫光祿大夫牛夷懼禍求為荊州秦荊州治豐陽川以為中軍將軍引見調之曰調徒雕翻調戲也牛性遲重善持轅軛轅輈也轅前曰軛加之牛項軛音厄動負百石夷曰雖服大車未經峻壁願試重載乃知勳績載才再翻生笑曰何其快也公嫌所載輕乎朕將以魚公爵位處公處昌呂翻夷懼歸而自殺生飲酒無晝夜或連月不出奏事不省往往寢落省悉景翻落當作格音閣留止不下曰格或醉中決事左右因以為姦賞罰無準或至申酉乃出視朝朝直遙翻乘醉多所殺戮自以眇目諱言殘缺偏隻少無不具之類誤犯而死者不可勝數勝音升數所具翻好生剝牛羊驢馬燖雞豚鵝鴨好呼到翻燖徐廉翻湯瀹去其毛曰燖縱之殿前數十為㣥或剝人面皮使之歌舞臨觀以為樂樂音洛嘗問左右曰自吾臨天下汝外間何所聞或對曰聖明宰世賞罰明當當丁浪翻天下唯歌太平怒曰汝媚我也引而斬之他日又問或對曰陛下刑罰微過又怒曰汝謗我也亦斬之勳舊親戚誅之殆盡㣥臣得保一日如度十年東海王堅素有時譽時譽者為時人所稱美也讚翼密說堅曰說輸芮翻主上猜忍暴虐中外離心方今宜主秦祀者非殿下而誰願早為計勿使他姓得之堅以問尚書呂婆樓婆樓曰僕刀鐶上人耳魏晉之間率以刀鐶築殺人言將為生所殺也或曰刀以鋒刃為用刀鐶以上無所用之婆樓以自喻鐶戶關翻僕里舍有王猛其人謀略不世出不世出者言世間不常生此人堅因婆樓以招猛一見如舊友語及時事堅大悅自謂如劉玄德之遇諸葛孔明也見六十五卷漢獻帝建安十二年六月太史令康權言於秦主生曰姓譜曰康衛康叔之後亦西胡姓昨夜三月並出孛星入太微連東井孛蒲內翻自去月上旬沈陰不雨以至于今將有下人謀上之禍此亦據洪範五行傳言之也沈持林翻以為妖言撲殺之妖於驕翻撲弼角翻特進領御史中丞梁平老等謂堅曰主上失德上下嗷嗷嗷嗷衆口愁聲燕晉二方伺隙而動伺相吏翻恐禍發之日家國俱亡此殿下之事也宜早圖之堅心然之畏生趫勇未敢發趫丘妖翻捷也生夜對侍婢言曰阿法兄弟亦不可信阿傳讀從安入聲明當除之明謂明旦猶言明日也法與梁平老及特進光祿大夫強汪帥壯士數百潛入雲龍門魏明帝起洛陽宮宮城正南門曰雲龍門苻氏據長安亦以宮城正南門為雲龍門帥讀曰率下同宿衛將士皆舍仗歸堅舍讀曰捨生猶醉寐堅兵至生驚問左右曰此輩何人左右曰賊也生曰何不拜之堅兵皆笑生又大言何不速拜不拜者斬之堅兵引生置別室廢為越王尋殺之諡曰厲王年二十三堅以位讓法法曰汝嫡嗣且賢宜立堅母苟氏雄之元故謂堅為嫡嗣兄年長宜立長知兩翻堅母苟氏泣謂㣥臣曰社稷事重小兒自知不能他日有悔失在諸君㣥臣皆頓首請立堅堅乃去皇帝之號去羌呂翻稱大秦天王即位於太極殿苻堅字永固雄之子也大赦改元永興追尊父雄為文桓皇帝母苟氏為皇太后苟氏為皇后世子宏為皇太子以清河王法為都督中外諸軍事丞相録尚書事東海公諸王皆降爵為公以從祖右光祿大夫永安公侯為太尉晉公柳為車騎大將軍尚書令從才用翻騎奇寄翻封弟融為陽平公雙為河南公子丕為長樂公樂音洛暉為平原公熙為廣平公睿為巨鹿公以漢陽李威為左僕射李威於堅母有辟陽之寵故擢用之強汪為領軍將軍呂婆樓為司隸校尉王猛為中書侍郎融好文學好呼到翻明辨過人耳聞則誦過目不忘力敵百夫善騎射擊刺少有令譽少詩照翻堅愛重之常與共議國事融經綜內外刑政修明薦才揚滯補益弘多弘大也治民斷獄皆亞於融史言堅有弟有子如此而無救於敗亡明天之所棄非人之所能支也治直之翻斷丁亂翻威苟太后之姑子也素與魏王雄友善生屢欲殺堅賴威營救得免威得幸於苟太后堅事之如父威知王猛之賢常勸堅以國事任之堅謂猛曰李公知君猶鮑叔牙之知管仲也管仲少與鮑叔牙遊鮑叔知其賢善遇之管仲曰吾始困時與鮑叔賈分財多自與鮑叔不以我為貪知我貧也吾嘗為鮑叔謀事而更窮困鮑叔不以我為愚知時有利不利也吾嘗三仕三見逐鮑叔不以我為不肖知我不遭時也吾嘗三戰三北鮑叔不以我為怯知我有老母也公子糾敗召忽死之吾幽囚受辱鮑叔不以我為無恥知我不羞小節而恥功名不顯於天下也生我者父母知我者鮑子也十二年燕主俊殺段龕坑其徒三千餘人龕苦含翻十二年秋七月秦大將軍冀州牧張平遣使請降降戶江翻拜並州刺史十二年八月丁未立皇后何氏后故散騎侍郎廬江何準之女也散悉亶翻騎奇寄翻成帝咸康二年立杜后十二年秦王堅以權翼為給事黃門侍郎權翼仕秦久當事任而卒歸姚氏料其受苻堅信用雖不為莊舄之越吟固隱之於心也與王猛並掌機密九月追復太師魚遵等官以禮改葬子孫存者皆隨才擢敍十二年張平據新興鴈門西河太原上黨上郡之地壁壘三百餘夷夏十餘萬戶壁壘蓋時遭亂離豪望自相保聚所築者石氏用張平為並州故得有其地有其民夏戶雅翻欲與燕秦為敵國石氏之敗平兩附燕秦今恃其強欲與燕秦為敵國十月平寇略秦境平蓋間秦之有內難也安知由是而敗亡乎加並州牧鎮蒲阪以禦之十二年十一月癸酉燕主俊自薊徙都鄴薊音計十二年秦太后苟氏遊宣明臺見東海公法之第門車馬輻湊恐終不利於秦王堅乃與李威謀賜法死堅與法訣於東堂慟哭歐血諡曰獻哀公封其子陽為東海公敷為清河公為後陽謀復讎張本十二年十二月乙巳燕主俊入鄴宮大赦復作銅雀臺魏武建國於鄴作銅雀臺石氏增修之兵亂圮毀慕容都鄴復作使如舊十二年以太常王彪之為左僕射十二年秦王堅行至尚書以文案不治治直之翻免左丞程卓官以王猛代之堅舉異材修廢職課農桑恤困窮禮百神立學校旌節義繼絶世秦民大悅史言苻堅能用王猛以治秦校戶教翻二年二年春正月司徒昱稽首歸政稽音啓帝不許二年初馮鴦既以上黨來降見上永和十一年又自歸於燕既而復叛燕復扶又翻二月燕司徒上庸王評討之不克二年秦王堅自將討張平將即亮翻以鄧羌為前鋒督護帥騎五千軍于汾上汾水之上也帥讀曰率騎奇寄翻蚝七吏翻蚝多力趫捷趫丘妖翻能曳牛卻走城無高下皆可超越與羌相持旬餘莫能相勝三月堅至銅壁河汾之間有銅川其民遇亂築銅壁以自守因曰銅壁蚝單馬大呼出入秦陳者四五呼火故翻陳讀曰陳堅募人生致之鷹揚將軍呂光刺蚝中之刺七亦翻中竹仲翻鄧羌擒蚝以獻平衆大潰平懼請降降戶江翻下同堅拜平右將軍以蚝為虎賁中郎將賁音奔將即亮翻下同蚝本姓弓姓譜弓姓魯叔弓之後堅寵待甚厚常置左右秦人稱鄧羌張蚝皆萬人敵光婆樓之子也堅徙張平部民三千餘戶于長安二年甲戌燕主俊遣領軍將軍慕輿根將兵助司徒評攻馮鴦根欲急攻之評曰鴦壁堅不如緩之根曰不然公至城下經月未嘗交鋒賊謂國家力止於此遂相固結冀幸萬一言鴦心僥幸於萬一可以保城也形勢方振賊衆恐懼皆有離心計慮未定從而攻之無不克者遂急攻之鴦與其黨果相猜忌鴦奔野王依呂護其衆盡降二年夏四月秦王堅如雍祠五畤六月如河東祠后土用漢禮也雍於用翻畤音止二年秋八月豫州刺史謝奕卒奕安之兄也司徒昱以建武將軍桓雲代之雲溫之弟也訪於僕射王彪之彪之曰雲非不才然溫居上流已割天下之半其弟復處西藩東晉豫州鎮江西建康在江東故以豫州為西藩復扶又翻處昌呂翻下同非深根固蒂之宜人才非可豫量量音良但當令不與殿下作異者耳昱頷之曰君言是也壬申以吳興太守謝萬為西中郎將監司豫冀並四州諸軍事豫州刺史司豫冀並所統皆僑郡也監工銜翻王羲之與桓溫箋曰謝萬才流經通言其才具可以經世於時人流輩中為通達也固是後來之秀今以之俯順荒餘近是違才易務矣言邊郡兵民皆兵荒之餘雕瘵未蘇而獷悍難調當俯就而柔順之今萬非其才而用之則為違才務事也以萬之才可以處廊廟而使之處邊鄙則為易事處昌呂翻近其靳翻遺于季翻以君邁往不屑之韻而俯同㣥碎誠難為意也言其矜高不屑軍中之細務也正當隨事行藏耳願君每與士卒之下者同甘苦則盡善矣萬不能用徐兗二州刺史荀羡有疾以御史中丞郗曇為軍章十二行本軍上有羡字乙十一行本同孔本羡軍二字並刊一格張校同司曇徒含翻為萬曇皆不勝其任張本考異曰帝紀謝萬為豫州下云郗曇為北中郎將督五州軍事徐兗二州刺史曇傳云荀羡有疾以曇為軍司頃之羡徵還除曇北中郎將都督刺史按帝紀十二月北中郎將荀羡及慕容俊戰于山茌王師敗績燕書十二月荀羡寇泰山殺太守賈堅載記荀羡殺賈堅下云敗羡復陷山茌故知八月曇未為徐兗二州恐始為軍司耳曇鑒之子也二年九月庚辰秦王堅還長安以太尉侯守尚書令永安公苻侯於是秦大旱堅減膳徹樂命后以下悉去羅紈師古曰紈素今之絹也去羌呂翻公私共之息兵養民旱不為災王猛日親幸用事宗親勳舊多疾之特進姑臧侯樊世本氐豪佐秦主健定關中謂猛曰吾輩耕之君食之邪猛曰非徒使君耕之又將使君炊之世大怒曰要當懸汝頭於長安城門不然吾不處世處昌呂翻猛以白堅堅曰必殺此老氐然後百寮可肅會世入言事與猛爭論於堅前世欲起擊猛堅怒斬之於是㣥臣見猛皆屏息屏氣不敢息也氣一出入為息屏必郢翻二年趙之亡也其將張平李歷高昌皆遣使降燕已而降晉又降秦各受爵位欲中立以自固李歷高昌初降晉張平降秦永和七年也八年歷昌降秦是年又與張平俱降燕苻生死後張平又降晉各受爵位將即亮翻使疏吏翻降戶江翻司空陽騖討高昌於東燕樂安王臧討李歷於濮陽騖攻昌別將於黎陽不拔歷奔滎陽其衆皆降並州壁壘百餘降於燕俊以右僕射悅綰為並州刺史以撫之平所署征西將軍諸葛驤等帥壁壘百三十八降於燕驤思將翻帥讀曰率下同俊皆復其官爵平帥衆三千奔平陽復請降於燕復扶又翻二年冬十月泰山太守諸葛攸攻燕東郡入武陽後漢東郡治東武陽武帝咸康二年封子允以東不可為國名而東郡有濮陽縣改曰濮陽國允改封淮南還曰東郡趙王倫篡位廢太孫臧為濮陽王東郡遂名濮陽此蓋燕復名東郡晉志武陽縣分屬陽平郡劉昫曰魏州朝城縣隋武陽縣地天寶七年更名攸敗走還泰山恪遂渡河略地河南分置守宰二年燕主俊欲經營秦晉十二月令州郡校實見丁校實檢校其實數也見賢遍翻餘悉發為兵欲使步卒滿一百五十萬期來春大集洛陽武邑劉貴上書極陳百姓雕弊發兵非法法未有戶留一丁而悉發為兵者俊善之乃更令三五發兵寬其期日以來冬集鄴時燕調發繁數調徒弔翻數所角翻官司各遣使者道路旁午郡縣苦之太尉領中書監封奕請自今非軍期嚴急不得遣使使疏吏翻自餘賦發皆責成州郡其㣥司所遣彈督在外者一切攝還攝收也追也二年燕泰山太守賈堅屯山茌山茌即前漢之茌縣屬泰山郡後漢改曰山茌茌仕疑翻堅所將才七百餘人將即亮翻羡兵十倍於堅堅將出戰諸將皆曰衆少不如固守少詩沼翻堅曰固守亦不能免不如戰也遂出戰身先士卒先悉薦翻殺羡兵千餘人復還入城復扶又翻下同羡進攻之堅歎曰吾自結髮志立功名而每值窮厄豈非命乎堅欲折其鋒使羡懼而退耳羡進攻之堅計窮矣不若守節而死乃謂將士曰今危困計無所設卿等可去吾將止死將士皆泣曰府君不出衆亦俱死耳乃扶堅上馬堅曰我如欲逃必不相遣今當為卿曹決鬬為于為翻若勢不能支卿等可趣去趣讀曰促勿復顧我也乃開門直出羡兵四集堅立馬橋上左右射之射而亦翻皆應弦而倒羡兵衆多從塹下斫橋堅人馬俱陷生擒之遂拔山茌塹七豔翻羡謂堅曰君父祖世為晉臣奈何背本不降背蒲妹翻降戶江翻下同堅曰晉自棄中華非吾叛也堅發此言江東將相其愧多矣強則託命既已事人安可改節吾束修自立謂從師就學便有志於自立朱子曰修脯也十脡為束古者從師必以束修為禮未嘗易志堅不降燕見九十八卷永和七年羡復責之復扶又翻堅怒曰豎子兒女御乃公自稱為乃公慢羡而孩視之也曰御者言若駕御兒女然執置雨中數日堅憤惋而卒惋烏貫翻燕青州刺史慕容塵遣司馬悅明救泰山羡兵大敗燕復取山茌燕主俊以賈堅子活為任城太守任音壬荀羡疾篤徵還以郗曇為北中郎將都督徐兗青冀幽五州諸軍事五州惟徐州有實土郗丑之翻曇徒含翻鎮下邳二年燕吳王垂娶段末柸女生子令寶段氏才高性烈自以貴姓段與慕容本抗衡之國故自以為貴姓可足渾氏銜之燕主俊素不快於垂事見上卷永和十年涅乃結翻姓也因希旨告段氏及吳國典書令遼東高弼為巫蠱欲以連汙垂晉制王國置典書典祠學官令慕容氏因之典書令天朝吏部尚書之職齊王攸傳國相上長吏缺典書令請求差選是也西晉典書令在常侍侍郎上及渡江則侍郎次常侍而典書令居三卿下汙烏姑翻下遐稼翻段氏及弼志氣確然終無撓辭掠治日急撓奴教翻掠音亮治直之翻垂愍之私使人謂段氏曰人生會當一死何堪楚毒如此不若引服引服自引而誣服也吾豈愛死者耶若自誣以惡逆上辱祖宗下纍於王纍力瑞翻固不為也辨答益明故垂得免禍而段氏竟死於獄中出垂為平州刺史鎮遼東垂以段氏女弟為繼室可足渾氏黜之以其妹長安君妻垂垂不悅由是益惡之為慕容垂出奔張本妻七細翻惡烏路翻二年胸奴劉閼頭部落多叛懼而東走乘冰渡河半渡而冰解後衆悉歸劉悉勿祈閼頭奔代代在北河之東閼於焉翻又於葛翻務桓之子也務桓卒見上卷永和十二年三年三年春二月燕主俊立子泓為濟北王濟子禮翻沖為中山王三年燕人殺段勤勤弟思來奔段勤降燕見上卷永和八年三年燕主俊宴㣥臣于蒲池蒲池在鄴周靈王之太子曰晉慧而早卒國語諫壅穀洛者即晉也晉既卒弟貴立是為景王景王崩而子朝子丐爭立周遂以亂潸所姦翻才子難得自景先之亡燕太子曄字景先毛晃曰中直衆翻半也司徒左長史李績對曰獻懷太子之在東宮曄諡曰獻懷晉志曰太子中庶子職如侍中敢不知之太子大德有八至孝一也聰敏二也沈毅三也疾諛喜直四也沈持林翻喜許記翻好學五也多藝六也謙恭七也好施八也好呼到翻施式豉翻俊曰卿譽之雖過譽音余然此兒在吾死無憂矣景茂何如燕太子暐字景茂績曰皇太子天資岐嶷嶷魚力翻毛萇曰岐智意也嶷識也雖八德已聞而二闕未補好遊畋而樂絲竹樂五教翻此其所以損也俊顧謂暐曰伯陽之言藥石之惠也李績字伯陽暐甚不平為李績以憂卒張本俊夢趙王虎齧其臂齧魚結翻乃發虎墓求尸不獲購以百金鄴女子李菟知而告之菟同都翻得尸於東明觀下水經注洹水東北流徑鄴城南又東分為二水北徑東明觀下觀古玩翻俊踏而罵之曰僵居良翻踏與踏同死胡何敢怖生天子數其殘暴之罪而鞭之投於漳水尸倚橋柱不流水經注漳水徑紫陌西趙建武十一年造紫陌浮橋慕容俊投石虎尸處也怖普布翻數所具翻王猛為之誅李菟收而葬之史終言之為于僞翻三年秦平羌護軍高離據略陽叛永安威公侯討之未克而卒夏四月驍騎將軍鄧羌驍堅堯翻秦州刺史啖鐵討平之啖徒覽翻氐姓也三年胸奴劉悉勿祈卒弟衛辰殺其子而代之三年五月秦王堅如河東六月大赦改元甘露三年涼州牧張瓘猜忌苛虐專以愛憎為賞罰郎中殷郇諫之郇須倫翻瓘曰虎生三日自能食肉不須人教也由是人情不附輔國將軍宋混性忠鯁瓘憚之欲殺混及弟澄因廢涼王玄靚而代之靚疾正翻又疾郢翻徵兵數萬集姑臧混知之與澄帥壯士楊和等四十餘騎奄入南城王隱晉書曰涼州城有龍形故曰臥龍城南北七里東西二里本胸奴所築後張氏世居之又增築四城箱各千步並舊城為五又據張駿傳駿於姑臧城南築作五殿四面各依方色四時遞居之則南城張氏所居也帥讀曰率騎奇寄翻張瓘謀逆被太后令誅之被皮義翻俄而衆至二千瓘帥衆出戰混擊破之瓘麾下玄臚刺混不能穿甲玄姓也風俗通古諸侯有玄都國臚陵如翻刺七亦翻下同瓘衆悉降降戶江翻瓘與弟琚皆自殺混夷其宗族玄靚以混為使持節都督中外諸軍事驃騎大將軍酒泉郡侯代瓘輔政驃匹妙翻混乃請玄靚去涼王之號張祚始稱涼王見九十九卷永和十年張瓘推玄靚為涼王見上十一年去羌呂翻混謂玄臚曰卿刺我幸而不傷今我輔政卿其懼乎臚曰臚受瓘恩唯恨刺節下不深耳竊無所懼混義之任為心膂三年高昌不能拒燕秋七月自白馬奔滎陽三年秦王堅自河東還以驍騎將軍鄧羌為御史中丞驍堅堯翻八月以咸陽內史王猛為侍中中書令領京兆尹特進光祿大夫強德太后之弟也強太后秦主健之后也豪橫酗于句翻孔安國曰以酒為凶曰酗賈公彥曰據字酒旁為凶是因酒為凶者也橫戶孟翻掠人財貨子女為百姓患猛下車收德奏未及報已陳尸於市堅馳使赦之不及與鄧羌同志疾惡糾案無所顧忌數旬之間權豪貴戚殺戮刑免者二十餘人朝廷震栗姦猾屏氣屏必郢翻路不拾遺堅歎曰吾始今知天下之有法也三年泰山太守諸葛攸將水陸二萬擊燕將即亮翻下同入自石門屯于河渚燕上庸王評長樂太守傅顏帥步騎五萬與攸戰于東阿攸兵大敗樂音洛帥讀曰率騎奇寄翻冬十月詔謝萬軍下蔡郗曇軍高平以擊燕萬矜豪傲物但以嘯詠自高未嘗撫衆兄安深憂之謂萬曰汝為元帥帥所類翻下同宜數接對諸將以悅其心數所角翻豈有傲誕如此而能濟事也萬乃召集諸將一無所言直以如意指四坐云諸將皆徑卒諸將益恨之如意鐵如意也坐徂臥翻凡奮身行伍者以兵與卒為諱既為將矣而稱之為卒所以益恨也乃自隊帥以下無不親造厚相親託造七到翻晉史言安性遲緩而為其弟慮乃周密如此宜其能為晉室內消桓溫之變外破苻秦之師也既而萬帥衆入渦潁以援洛陽渦水至山桑入淮潁水至下蔡入淮謝尚之兵自下蔡而入渦潁之間萬以為燕兵大盛故曇退即引兵還衆遂驚潰進師易退師難是以善將者欲退師必廣為方略而後引退不唯防敵人之追截亦慮己衆之驚潰也軍士欲因其敗而圖之以安故而止既至詔廢萬為庶人降曇號建武將軍於是許昌潁川譙沛諸城相次皆沒於燕三年秦王堅以王猛為吏部尚書尋遷太子詹事十一月為左僕射餘官如故三年十二月封武陵王晞子㻱為梁王㻱與璡同音津三年大旱三年辛酉燕主俊寢疾謂大司馬太原王恪曰吾病必不濟今二方未平二方謂晉秦也國家多難吾欲效宋宣公以社稷屬汝難乃旦翻宋宣公舍其子與夷而立其弟穆公屬之欲翻何如恪曰太子雖幼勝殘致治之主也勝音升治直之翻臣實何人敢干正統俊怒曰兄弟之間豈虛飾邪恪曰陛下若以臣能荷天下之任者豈不能輔少主乎荷下可翻少詩照翻俊喜曰汝能為周公吾復何憂復扶又翻李績清方忠亮汝善遇之召吳王垂還鄴自遼東召還也三年秦王堅以王猛為輔國將軍司隸校尉居中宿衛僕射詹事侍中中書令領選如故選須絹翻猛上疏辭讓因薦散騎常侍陽平公融光祿散騎西河任㣥光祿散騎以光祿大夫為散騎常侍也散悉亶翻騎奇寄翻任音壬處昌呂翻堅不許而以融為侍中中書監左僕射任㣥為光祿大夫領太子家令晉志曰太子家令主刑獄穀貨飲食職比司農少府漢制尚書有侍郎三十六人尚書郎初從三署詣臺試守尚書郎中歲滿稱尚書郎三年稱侍郎晉志曰庶子職比散騎常侍中書監令朱彤當作朱肜歲中五遷猛自尚書左丞遷咸陽內史又遷侍中中書令領京兆尹又遷吏部尚書尋遷太子詹事為左僕射及今凡五遷人有毀之者堅輒罪之於是㣥臣莫敢復言復扶又翻以左僕射李威領護軍右僕射梁平老為使持節都督北垂諸軍事鎮北大將軍戍朔方之西使疏吏翻丞相司馬賈雍為雲中護軍戍雲中之南三年燕所徵郡國兵悉集鄴城去年所徵今乃悉集王崇武標點容肇祖聶崇岐覆校
