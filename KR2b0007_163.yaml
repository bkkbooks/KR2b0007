body:
  text: 資治通鑑卷第一百六十三端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注梁紀十九是時太宗簡文皇帝上諱綱字世讚小字六通武帝第三子昭明太子母弟也諡法平易不訾曰簡學勤好問曰文大寶元年庚午五五是時春正月辛亥朔大赦改元是時陳霸先發始興至大庾嶺大庾嶺在今南安軍大庾縣西南二十里吳録南野縣有大庾山自嶺嶠九嶝二里至嶺下平行十里至平亭南野縣漢屬豫章郡晉屬南康郡劉昫曰唐韶州始興縣漢南野縣地宋白曰虔州之南康大庾嶺南雄州之始興皆漢南野縣地輿地志今虔州龍南縣漢南野縣地將即亮翻年十三單騎出戰無敢當者杜僧明馬被傷騎奇寄翻被皮義翻陳霸先救之授以所乘馬僧明上馬復戰上時掌翻復扶又翻衆軍因而乘之路養大敗脫身走霸先進軍南康考異曰太清紀在二月今從陳帝紀是時戊辰東魏進太原公高洋位丞相都督中外諸軍録尚書事大行臺齊郡王是時庚午邵陵王綸至江夏郢州刺史南康王恪郊迎南康當作南平參考前後及梁書可見夏戶雅翻綸不受乃推綸為假黃鉞都督中外諸軍事承制置百官考異曰太清紀云三月綸逼奪恪州徙恪於郡廨今從梁書典略是時魏楊忠圍安陸柳仲禮馳歸救之去年仲禮將兵趣襄陽請急攻之將即亮翻下同忠曰攻守勢殊未可猝拔若引日勞師表裏受敵非計也南人多習水軍不間野戰仲禮師在近路吾出其不意以奇兵襲之彼怠我奮一舉可克克仲禮則安陸不攻自拔諸城可傳檄定也乃選騎二千銜枚夜進敗仲禮於漴頭敗補邁翻杜佑曰漴音崇水所衝曰漴考異曰太清紀作潼頭在去年十二月今從典略獲仲禮及其弟子禮盡俘其衆馬岫以安陸別將王叔孫以竟陵皆降於忠降戶江翻於是漢東之地盡入于魏是時廣陵人來嶷嶷魚力翻説前廣陵太守祖皓曰董紹先輕而無謀輕牽正翻人情不附襲而殺之此壯士之任也今欲糾帥義勇奉戴府君帥讀曰率下同若其克捷可立桓文之勳必天未悔禍猶足為梁室忠臣皓曰此僕所願也乃相與糾合勇士得百餘人癸酉襲廣陵斬南兗州刺史董紹先據城馳檄遠近推前太子舍人蕭勔為刺史勔彌兗翻仍結東魏為援皓之子祖見一百四十七卷武帝天監十二年諸本作之之子者衍一之字古鄧翻勃之兄也乙亥景遣郭元建帥衆奄至皓嬰城固守是時二月魏楊忠乘勝至石城五代志竟陵郡長壽縣後周置石城郡湘東王繹遣舍人庾恪説忠曰察來伐叔説式芮翻來伐事見上卷上年而魏助之何以使天下歸心忠遂停湕北湕水之北也湕紀偃翻魏人許之繹與忠盟曰魏以石城為封梁以安陸為界請同附庸並送質子貿遷有無質音致貿易也遷徙也徙有之無以相貿易貿音茂永敦鄰睦忠乃還還從宣翻又如字是時宕昌王梁彌定宕徒浪翻為其宗人獠甘所襲彌定奔魏獠甘自立羌酋傍乞鐵匆據渠株川獠魯皓翻酋慈秋翻與渭州民鄭五醜合諸羌以叛魏丞相泰使大將軍宇文貴涼州刺史史寧討之擒斬鐵匆五醜寧別擊獠甘破之獠甘將百騎奔生羌鞏廉玉生羌遠在塞外不羈屬於魏者騎奇寄翻置岷州於渠株川五代志臨洮郡臨洮縣西魏置溢樂縣並置岷州復扶又翻斬獠甘虜廉玉送長安是時侯景遣任約于慶等帥衆二萬攻諸藩諸藩謂梁之宗室分任藩維者任音壬帥讀曰率是時邵陵王綸欲救河東王譽而兵糧不足乃致書於湘東王繹曰天時地利不及人和用孟子之言豈可相害今社稷危恥創巨痛深禮記三年問曰創巨者其疾久痛甚者其愈遲三年者稱情而立文所以為至痛極也斬衰苴杖居倚廬食粥寢苫枕塊所以為至痛飾也創初良翻泣血枕戈越王句踐臥薪嘗膽求以報吳晉劉琨枕戈待旦志梟逆虜枕之任翻子執親喪泣血三年孔穎達曰説文哭哀聲也泣無聲出淚也則無聲謂之泣矣連言血者以淚出於目猶血出於體故以淚比血禮記曰子羔執親之喪泣血三年注曰無聲而血出是也或宜容貰貰貸也家禍仍構料今訪古難乃旦翻料音聊未或不亡夫征戰之理唯求克勝至於骨肉之戰愈勝愈酷捷則非功敗則有喪喪息浪翻勞兵損義虧失多矣侯景之軍所以未窺江外者荊州治江陵在江北故曰江外宗鎮強密為于偽翻屏必郢翻弟若陷洞庭湘州之地襟帶洞庭故謂湘州為洞庭雍州疑迫何以自安必引進魏軍以求形援以綸之昏狂猶能言及於此蓋勢有所必至也戢阻立翻雍於用翻家國去矣必希解湘州之圍存社稷之計繹復書陳譽過惡不赦言其過大惡極法所不赦察引楊忠來相侵逼頗遵談笑用卻秦軍魯仲連談笑而卻秦軍繹引此以為大言不復自陳復扶又翻臨湘旦平臨湘縣自漢以來屬長沙郡時為州郡治所隋改臨湘縣曰長沙縣即路就路也承上文而言若欲攻襄陽考之下文蓋謂討侯景投之於案慷慨流涕曰天下之事一至於斯湘州若敗吾亡無日矣綸知繹兵東下必將圖己故云然使在京口之時能思及此則何亡國喪身之有古人所以重居安慮危居寵思畏者也史為綸北奔張本是時侯景遣侯子鑒帥舟師八千自帥徒兵一萬徒兵步兵也帥讀曰率下同三日克之執祖皓縛而射之箭遍體然後車裂以徇城中無少長皆埋之於地馳馬射而殺之射而亦翻少詩照翻長知兩翻考異曰太清紀曰城中數百人典略曰死者八千人今從南史以子鑒為南兗州刺史鎮廣陵廣陵之人既殲矣子鑒所鎮者空城耳是時丙戌以安陸王大春為東揚州刺史省吳州景置吳州見上卷上年是時乙巳以尚書僕射王克為左僕射是時庚寅東魏以尚書令高隆之為太保是時宣城內史楊白華進據安吳孫吳立安吳縣屬宣城郡隋省安吳入涇縣不克是時東魏行臺辛術將兵入寇圍陽平不克是時侯景納上女溧陽公主甚愛之溧音栗三月甲申景請上禊宴於樂遊苑禊宴因祓禊而開宴禊胡計翻樂遊苑在玄武湖南上還宮景與公主共據御牀南面並坐㣥臣文武列坐侍宴是時庚申東魏進丞相洋爵為齊王是時臨川內史始興王彖殳等擊莊鐵王彖殳始興人彖殳即毅字後人傳寫變立為耳瑱他甸翻彖殳等敗死是時鄱陽世子嗣與任約戰於三章約敗走嗣因徙鎮三章謂之安樂柵去年鄱陽王範西上使世子嗣守安樂柵今移柵三章亦以安樂名柵樂音洛是時夏四月庚辰朔湘東王繹以上甲侯韶為長沙王上甲侯韶奔江陵見上卷上年按梁書長沙王懿子淵業嗣封卒子孝儼嗣封又卒子眘嗣封眘懿曾孫也時在建康湘東以韶歸之遂以為長沙王非禮也是時丙午侯景請上幸西州上御素輦侍衛四百餘人景浴鐵數千翼衛左右浴鐵者言鐵甲堅滑若以水浴之也悽然泣下命景起舞景亦請上起舞酒闌坐散坐徂臥翻上抱景于牀曰我念丞相景曰陛下如不念臣臣何得至此逮夜乃罷時江南連年旱蝗江揚尤甚百姓流亡相與入山谷江湖采草根木葉菱芡而食之菱芰也芡巨險翻説文曰雞頭也方言曰南楚謂之雞頭北燕謂之䓈青徐淮泗之間謂之芡死者蔽野富室無食皆鳥面鵠形衣羅綺懷珠玉俯伏牀帷待命聽終千里絶煙衣於既翻煙與煙同人迹罕見白骨成聚如丘隴焉景性殘酷於石頭立大碓碓都內翻有犯法者搗殺之常戒諸將曰破柵平城當淨殺之使天下知吾威名故諸將每戰勝專以焚掠為事斬刈人如草芥以資戲笑由是百姓雖死終不附之史言侯景將敗犯者刑及外族男子謂舅家為外家婦人謂父母之家為外家外族外家之族悉稱行臺來降附者悉稱開府其親寄隆重者曰左右廂公勇力兼人者曰庫直都督南史侯景傳作庫真部督誤也是時魏封皇子儒為燕王公為吳王是時侯景召宋子仙還京口去年宋子仙克東揚州今召還京口是時邵陵王綸在郢州以聽事為正陽殿內外齋閣悉加題署其部下陵暴軍府郢州將佐莫不怨之咨議參軍江仲舉南平王恪之謀主也説恪圖綸説式芮翻恪驚曰若我殺邵陵寧靜一鎮荊益兄弟必皆內喜帝既蒙塵綸於兄弟之次當立恪若除綸則人望歸於荊益必當內以為喜時湘東王繹在荊州武陵王紀在益州則以大義責我矣且巨逆未梟巨逆謂侯景梟謂梟其首梟堅堯翻自亡之道也卿且息之仲舉不從部分諸將分扶問翻刻日將發謀泄綸壓殺之恪狼狽往謝綸曰㣥小所作非由兄也凶黨已斃兄勿深憂南平王恪偉之子也於綸為兄是時王僧辨急攻長沙辛巳克之執河東王譽斬之傳首江陵湘東王繹反其首而葬之反其首於長沙與身俱葬世子方等之死見上卷上年吳立臨蒸縣以縣臨蒸水而名屬衡陽郡晉屬湘東郡酈道元曰臨蒸即故酃縣縣即湘東郡劉昫曰隋改臨蒸為衡陽縣今衡州所治衡陽縣是也衡州志吳分酃縣立臨蒸縣俯臨蒸水其氣如蒸姚思廉陳書曰周鐵虎不知何許人梁世南渡事河東王譽為臨蒸令如此則通鑑逸令字僧辨得鐵虎命烹之呼曰呼火故翻侯景未滅奈何殺壯士僧辨奇其言而釋之還其麾下繹以僧辨為左衛將軍加侍中鎮西長史繹自去歲聞高祖之喪以長沙未下故匿之壬寅始發喪刻檀為高祖像置於百福殿事之甚謹動靜必咨焉繹以為天子制於賊臣不肯從大寶之號猶稱太清四年丙午繹下令大舉討侯景移檄遠近是時鄱陽王範至湓城以晉熙為晉州晉安帝分廬江郡立晉熙郡五代志同安郡懷寧縣舊置晉熙郡唐以同安郡為舒州江州郡縣多輒改易改易郡縣守令也政令所行不出一郡惟尋陽一郡而已嗣與鐵素善請發兵救之範遣侯瑱帥精甲五千助鐵瑱他甸翻又音鎮帥讀曰率下同由是二鎮互相猜忌無復討賊之志復扶又翻大心使徐嗣徽帥衆二千築壘稽亭以備範據齊書晉安王子懋傳子懋謀舉兵於江州宣城王遣裴叔業襲取湓城子懋先已具船於稽亭渚聞叔業得湓城乃據州自衛則稽亭渚在江州城東也帥讀曰率範數萬之衆無所得食多餓死範憤恚疽發於背五月乙卯卒恚於避翻考異曰典略作己酉今從太清紀範衆祕不發喪奉範弟安南侯恬為主有衆數千人是時丙辰侯景以元思虔為東道大行臺鎮錢唐丁巳以侯子鑒為南兗州刺史是時東魏齊王洋之為開府也洋為開府見一百五十七卷武帝大同元年管記即記室參軍之職言無不盡昵尼質翻金紫光祿大夫丹楊徐之才北平太守廣宗宋景業漢晉以來中山有北平縣後魏孝昌中分置北平郡屬定州廣宗縣漢屬巨鹿郡後屬安平國後魏太和二十一年分置廣宗郡時屬司州讖楚譖翻以為太歲在午當有革命因德政以白洋勸之受禪洋以告婁太太曰汝父如龍兄如虎猶以天位不可妄據終身北面汝獨何人欲行舜禹之事乎洋以告之才之才曰正為不及父兄為于偽翻故宜早升尊位耳洋鑄像卜之而成乃使開府儀同三司段韶問肆州刺史斛律金金來見洋固言不可以宋景業首陳符命請殺之洋與諸貴議於太前太曰吾兒懦直必無此心高德政樂禍教之耳樂音洛洋以人心不一遣高德政如鄴察公卿之意未還洋擁兵而東至平都城九域志遼州遼山縣有平城鎮宋白曰遼州平城縣本漢涅縣地晉置武鄉縣此地屬焉隋開皇十六年於趙簡子所立平都故城置平城縣莫敢對長史杜弼曰關西國之勍敵謂宇文氏也勍渠京翻恐彼挾天子自稱義兵而東向此天子謂西魏主徐之才曰今與王爭天下者彼亦欲為王所為縱其屈強屈其勿翻強其兩翻不過隨我稱帝耳弼無以應高德政至鄴諷公卿莫有應者司馬子如逆洋於遼陽遼陽縣自漢末以來屬樂平郡隋開皇十一年改曰遼山縣我朝為遼州治所洋欲還倉丞李集曰北齊之制太倉及水次諸倉皆有令丞北齊紀作尚食丞李集王來為何事而今欲還為于偽翻洋偽使於東門殺之而別令賜綃十匹遂還晉陽自是居常不悅徐之才宋景業等日陳陰陽雜占云宜早受命高德政亦敦勸不已洋使術士李密卜之遇大橫曰漢文之卦也大橫見十三卷漢高后八年遇乾之鼎乾之初九九五二爻動變而之鼎乾君也鼎五月卦也宜以仲夏受禪或曰五月不可入官犯之終於其位陰陽家之説上官忌正月五月九月王為天子無復下期復扶又翻豈得不終於其位乎洋大悅乃發晉陽高德政録在鄴諸事條進於洋洋令左右陳山提馳驛齎事條並密書與楊愔愔於今翻是月山提至鄴楊愔即召太常卿邢邵議造儀注祕書監魏收草九錫禪讓勸進諸文凡禪代皆奉表三讓百僚三表勸進而後即位故令收預草諸文留於東齋甲寅東魏進洋位相國總百揆備九錫洋行至前亭前亭在晉陽之東平都城之西意甚惡之至平都城不復肯進惡烏路翻復扶又翻高德政徐之才苦請曰山提先去恐其漏泄即命司馬子如杜弼馳驛續入觀察物情子如等至鄴衆人以事勢已決無敢異言洋至鄴召夫夫民夫也高隆之請曰用此何為洋作色曰我自有事君何問為欲族滅邪隆之謝而退於是作圜丘備法物丙辰司空潘樂侍中張亮黃門郎趙彥深等求入啓事東魏孝靜帝在昭陽殿見之亮曰五行遞運有始有終謂五德之運以木代水以火代木以土代火以金代土以水代金也萬方歸仰願陛下遠法堯舜帝斂容曰此事推挹已久推吐雷翻挹遜也謹當遜避又曰若爾須作制書中書郎崔劼裴讓之曰劼丘八翻制已作訖使侍中楊愔進之東魏主既署曰居朕何所愔對曰北城別有館宇乃下御坐步就東廊坐徂臥翻詠范蔚宗後漢書贊曰獻生不辰身播國屯終我四百永作虞賓范曄字蔚宗作後漢書此其贊獻帝之辭也賢注曰辰時也播遷也言獻帝生不逢時身既播遷國又屯難也漢有天下四百年而運終虞賓謂虞以堯子丹朱為賓書曰虞賓在位蔚紆勿翻屯陟倫翻所司謂掌禪代事者請發者請出宮居別邸也此實楊愔等使人請之古人念遺簪弊履朕欲與六宮別可乎高隆之曰今日天下猶陛下之天下況在六宮帝步入與嬪已下別舉宮皆哭趙國李嬪誦陳思王詩云王其愛玉體俱享黃髮期曹植魏武帝之子封陳王諡曰思嬪毗賓翻章十二行本以下有故犢二字乙十一行本同孔本同張校同車一乘候於東閣直長官名凡殿中諸局各有奉御有直長趙道德蓋尚乘直長也亦高氏之私人東閣即東閣門長竹兩翻乘繩證翻道德超上抱之上時掌翻帝叱之曰朕自畏天順人何物奴敢逼人如此道德猶不下出雲龍門王公百僚拜辭高隆之灑泣遂入北城居司馬子如南宅司馬子如有宅在太原故謂鄴城之宅為南宅禪位于齊璽斯氏翻綬音受東魏十六年而亡考異曰北齊書北史高德政傳云五月六日留咸陽王坦等七日司馬子如等至鄴九日文宣至城南頓按後魏書北史帝紀皆云辛亥王如鄴甲寅加九錫丙辰魏主遜位戊午王即帝位典略辛亥王還鄴以長曆推之此月己酉朔皆不與德政傳日相應蓋辛亥始自晉陽如鄴非到鄴之日也戊午齊王即皇帝位于南郊帝諱洋字子進勃海王高歡第二子澄之母弟也歡以勃海王贈齊王洋又進爵齊王且高氏本勃海人勃海故齊地也國遂號曰齊改元天保自魏敬宗以來百官絶祿至是始復給之復扶又翻己未封東魏主為中山王待以不臣之禮追尊齊獻武王為獻武皇帝廟號太祖後改為高祖文襄王為文襄皇帝廟號世宗辛酉尊王太后婁氏為皇太后乙丑降魏朝封爵有差其宣力霸朝自高歡起兵以來諸勳貴皆宣力霸朝者也朝直遙翻不在降限謂自關西及江南來投者是時文成侯寧起兵於吳有衆萬人己巳進攻吳郡吳郡帶吳縣寧蓋起兵於吳縣界進攻吳郡城也按侯景傳寧起兵於吳西鄉去年陸緝等推寧據吳郡宋子仙擊之敗走今復起兵於西鄉殺之寧範之弟也子榮因縱兵大掠郡境自晉氏渡江三吳最為富庶貢賦商旅皆出其地及侯景之亂掠金帛既盡乃掠人而食之或賣於北境遺民殆盡矣是時唯荊益所部尚完實太尉益州刺史武陵王紀移告征鎮使世子圓照帥兵三萬受湘東王節度帥讀曰率圓照軍至巴水巴郡巴縣有巴水水折三回如巴字巴郡唐為渝州考異曰南史云六月辛酉紀遣圓照東下按六月己卯朔無辛酉典略在五月或者五月辛酉歟令屯白帝梁置信州於白帝唐改夔州是時六月辛巳以南郡王大連行揚州事是時江夏王大款山陽王大成宜都王大封自信安間道奔江陵間古莧翻是時齊主封宗室高嶽等十人功臣庫狄干等七人皆為王高嶽及隆之歸彥思宗長弼普子瑗顯國睿孝緒凡十人庫狄干斛律金賀拔仁韓軌可朱渾道元彭樂潘相樂凡七人癸未封弟浚為永安王淹為平陽王浟為彭城王演為常山王渙為上黨王淯為襄城王湛為長廣王湝為任城王浟以周翻淯音育湝戶皆翻湜為高陽王濟為博陵王為新平王潤為馮翊王洽為漢陽王是時鄱陽王範既卒侯瑱往依莊鐵鐵忌之瑱不自安丙戌詐引鐵謀事因殺之自據豫章是時尋陽王大心遣徐嗣徽夜襲湓城安南侯恬裴之橫等擊走之是時齊主娶趙郡李希宗之女生子殷及紹德又納段韶之妹及將建中宮高隆之高德政欲結勳貴之援乃言漢婦人不可為天下母宜更擇美配帝不從丁亥立李氏為皇后考異曰典略在五月乙丑今從北齊帝紀子殷為皇太子庚寅以庫狄干為太宰彭樂為太尉潘相樂為司徒司馬子如為司空辛卯以清河王嶽為司州牧是時侯景以羊鴉仁為五兵尚書庚子鴉仁出奔江西將赴江陵至東莞南徐州有東莞郡不在江西意者東莞其東關之誤歟邀殺之考異曰太清紀在十月今從梁帝紀典略是時魏人欲令嶽陽王察發哀嗣位察辭不受丞相泰使榮權册命察為梁王始建臺置百官察字理孫武帝之孫昭明太子之第二子是時陳霸先修崎頭古城徙居之崎渠希翻曲岸曰崎九域志南安軍治大庾縣古南野也有南康古城又有峽頭鎮是時初燕昭成帝奔高麗見一百二十三卷宋文帝元嘉十三年麗力知翻因留新會晉恭帝元熙二年分南海郡立新會郡隋唐為新會縣屬廣州九域志新會縣在廣州之西南三百三十里世為羅州刺史五代志高涼郡石龍縣舊置羅州我朝為化州治所高涼縣漢屬合浦郡獻帝建安二十二年吳分立高涼郡梁置高州洗音銑丁度集韻姺國名或作先姓氏韻纂又音綿考異曰典略作沈氏今從隋書世為蠻酋酋慈秋翻部落十餘萬家有女多籌略善用兵諸洞皆服其信義融聘以為寶婦融雖纍世為方伯非其土人號令不行洗氏約束本宗使從民禮每與寶參決辭訟首領有犯雖親戚無所縱舍舍讀曰捨由是馮氏始得行其政高州刺史李遷仕據大皋口五代志高涼郡梁置高州使疏吏翻下同寶欲往洗氏止之曰刺史無故不應召太守必欲詐君共反耳寶曰何以知之洗氏曰刺史被召援臺被皮義翻乃稱有疾鑄兵聚衆而後召君此必欲質君以發君之兵也質音致願且無往以觀其變數日遷仕果反遣主帥杜平虜將兵入贛石城魚梁以逼南康帥所類翻魚梁亦地名近贛石贛古暗翻霸先使周文育擊之洗氏謂寶曰平虜驍將也驍堅堯翻將即亮翻下同今入贛石與官軍相拒勢未得還遷仕在州無能為也君若自往必有戰鬬宜遣使卑辭厚禮告之曰身未敢出欲遣婦參彼聞之必喜而無備喜與喜同步擔雜物唱言輸賧擔都甘翻賧吐濫翻得至柵下破之必矣寶從之遷仕果不設備洗氏襲擊大破之遷仕走保寧都吳分漢贛縣立陽都縣晉武太康元年更名寧都五代志南康虔化縣舊曰寧都據其城洗氏與霸先會于贛石還謂寶曰陳都督非常人也甚得衆心必能平賊君宜厚資之湘東王繹以霸先為豫州刺史領豫章內史是時辛丑裴之橫攻稽亭徐嗣徽擊走之是時秋七月辛亥齊立世宗元氏為文襄皇后后東魏孝靜帝女又封世宗子孝琬為河間王孝瑜為河南王乙卯以尚書令封隆之録尚書事尚書左僕射平陽王淹為尚書令是時辛酉梁王察入朝于魏自此魏益厚察矣朝直遙翻是時初東魏遣儀同武威牒雲洛等雲當作云牒云虜復姓柔然阿那王褱之求附於魏也魏遣牒云具仁往使牒云之為姓尚矣使鎮皖城劉昫曰懷寧宿松望江太湖等縣皆漢皖縣地蓋此城即皖縣古城也皖戶板翻任約軍至洛等引去嗣遂失援出戰敗死約遂略地至湓城尋陽王大心遣司馬韋質出戰而敗帳下猶有戰士千餘人咸勸大心走保建州後漢汝南郡有苞信縣江左僑置於弋陽界五代志弋陽郡殷城縣舊曰苞信梁置義城郡及建州帳下勸大心走保之者便於入齊也九域志殷城縣併入固始戊辰以江州降約先是大心使太子洗馬韋臧鎮建昌降戶江翻下同先悉薦翻洗亦同音有甲士五千聞尋陽不守欲帥衆奔江陵帥讀曰率下同未發為麾下所殺臧粲之子也太清三年青塘之戰韋粲死之是時于慶略地至豫章侯瑱力屈降之慶送瑱於建康景以瑱同姓待之甚厚留其妻子及弟為質質音致遣瑱隨慶徇蠡南諸郡蠡南謂彭蠡湖以南也考異曰太清紀在十一月今從典略是時初巴山人黃法有勇力五代志臨川郡崇仁縣梁置巴山郡劉昫曰吳分臨汝為新建縣梁置巴山郡巨俱翻合徒衆保鄉里太守賀詡下江州自巴山順流赴江州為下監工衡翻法屯新淦于慶自豫章分兵襲新淦新淦縣漢屬豫章郡五代志屬廬陵郡淦古暗翻敗補邁翻陳霸先使周文育進軍擊慶法引兵會之是時邵陵王綸聞任約將至使司馬蔣思安將精兵五千襲之約衆潰思安不設備約收兵襲之思安敗走是時湘東王繹改宜都為宜州沈約曰劉備分南郡立宜都郡梁以宜都郡置宜州隋並宜都入夷陵郡是時是月以南郡王大連為江州刺史是時魏丞相泰以齊主稱帝帥諸軍討之帥讀曰率下同以齊王廓鎮隴右徵秦州刺史宇文導為大將軍都督二十三州諸軍事屯咸陽鎮關中是時益州沙門孫天英帥徒數千人夜攻州城武陵王紀與戰斬之是時邵陵王綸大修鎧仗將討侯景湘東王繹惡之惡綸由此兵力益強將不利於己也惡烏路翻甲午遣左衛將軍王僧辨信州刺史鮑泉等帥舟師一萬東趣江郢趣七喻翻考異曰典略云九月戊申朔繹遣僧辨按太清紀事在八月末今從梁簡文帝紀聲言拒任約且云迎邵陵王還江陵授以湘州是時齊主初立勵精為治治直吏翻趙道德以事屬黎陽太守清河房超屬之欲翻下請屬同守式又翻超不發書棓殺其使魏收志孝昌中分汲郡置黎陽郡屬司州治黎陽城棓步項翻使疏吏翻下同命守宰各設棓以誅屬請之使久之都官中郎張中郎作郎中宋軌奏曰中郎當作郎中五代志都官郎中掌畿內非違得失事此齊制也若受使請賕猶致大戮身為枉法何以加罪乃罷之司都功曹張老上書請定齊律司都功曹司州之功曹也時都鄴以鄴為司州治所按北齊主或居晉陽不常居鄴也更討論損益之麟趾格見一百五十八卷武帝大同七年琡昌六翻齊主簡練六坊之人每一人必當百人任其臨陳必死魏齊之間六軍宿衛之士分為六坊任保任也陳讀曰陳謂之百保鮮卑百保言其勇可保一人當百人也高氏以鮮卑創業當時號為健鬬故衛士皆用鮮卑猶今北人謂勇士為霸都魯也謂之勇士以備邊要邊要邊上要害之地始立九等之戶戶有上中下三等每等又分上中下是為九等貧者役其力是時九月丁巳魏軍發長安發長安而東伐齊是時王僧辨軍至鸚鵡洲鸚鵡洲在江夏江中昔黃祖使禰衡賦鸚鵡賦於此洲因以得名洲之下即黃鵠磯質音致邵陵王綸聞之遣其子威正侯礩將兵擊之礩職日翻龍虎敗奔于僧辨綸以書責僧辨曰將軍前年殺人之姪謂殺河東王譽也綸於繹兄也恐天下不許僧辨送書於湘東王繹繹命進軍辛酉綸集其麾下於西園園在郢城西偏故曰西園又有東園在城東東湖上我本無他志在滅賊湘東常謂與之爭帝遂爾見伐今日欲守則交絶糧儲欲戰則取笑千載載子亥翻不容無事受縛當於下流避之麾下壯士爭請出戰綸不從與礩自倉門登舟北出據姚思廉梁書倉門郢城北門帶江阻險繹以南平王恪為尚書令開府儀同三司世子方諸為郢州刺史王僧辨為領軍將軍綸遇鎮東將軍裴之高於道之高之子畿掠其軍器綸與左右輕舟奔武昌澗飲寺武昌今壽昌軍是也綸長史韋質司馬薑律等聞綸尚存馳往迎之説七柵流民以求糧仗時流民於北江州結七柵以相保説式芮翻流民八九千人附之稍收散卒屯于齊昌據魏收志梁武帝置北江州治鹿城關領義陽齊昌新昌梁安齊興光城郡五代志黃州木蘭縣梁曰梁安郡又有義陽郡後齊置湘州後改曰北江州則齊昌亦當在木蘭縣界唐省木蘭入黃岡縣宋白曰吳置蘄春郡晉惠帝改西陽郡南齊北齊改西陽為齊昌郡唐為蘄州章十二行本和作降乙十一行本同孔本同于齊使疏吏翻齊以綸為梁王是時湘東王繹改封皇子大款為臨川王大成為桂陽王大封為汝南王是時癸亥魏軍至潼關是時庚午齊主如晉陽命太子殷居涼風堂監國據北史齊樂陵王百年傳涼風堂在鄴宮玄都苑監工銜翻是時南郡王中兵參軍張彪等南郡王大連之鎮會稽也以張彪為中兵參軍若邪山在今越州東南四十里有衆數萬吳郡人陸令公等説太守南海王大臨往依之説式芮翻大臨曰彪若成功不資我力如其橈敗橈奴教翻杜預曰橈曲也勢屈為橈以我自解言將歸罪於大臨以自解於侯景是時任約進寇西陽武昌初寧州刺史彭城徐文盛募兵數萬人討侯景湘東王繹以為秦州刺史五代志江都郡六合縣舊置秦郡後齊置秦州抑梁已置之歟與約遇於武昌繹以廬陵王應為江州刺史以文盛為長史行府州事督諸將拒之將即亮翻下同應續之子也廬陵王續卒於武帝太清元年移營馬柵距西陽八十里西陽即今黃州黃岡縣古之邾城也遣儀同叱羅子通等將鐵騎二百襲之叱羅虜復姓騎奇寄翻策馬亡走時湘東王繹亦與齊連和故齊人觀望不助綸定州刺史田祖龍迎綸綸以祖龍為繹所厚懼為所執復歸齊昌復扶又翻行至汝南魏所署汝南城主李素綸之故吏也開城納之魏收志郢州有汝南郡治上蔡縣五代志竟陵郡舊置郢州所領有漢東縣舊曰上蔡則汝南城即漢東縣城也又按姚思廉梁書汝南治安陸重城宋白曰晉汝南郡人流寓夏口因僑立汝南郡汝南縣於潼口荊湘記云金水北岸有汝南舊城是也考異曰梁帝紀在十一月今從太清紀是時裴之高帥子弟部曲千餘人至夏首帥讀曰率夏戶雅翻湘東王繹召之以為新興永寧二郡太守新興郡置於江陵縣界永寧郡置於襄陽南漳縣界鎮武陵武陵唐為朗州至我朝改為鼎州是時初邵陵王綸以衡陽王獻為齊州刺史鎮齊昌任約擊擒之送建康殺之考異曰梁帝紀在十一月今從太清紀暢之孫也暢武帝之弟是時乙亥進侯景位相國封二十郡為漢王加殊禮是時嶽陽王察還襄陽自朝魏而還也前已書察梁王矣今復書察舊爵以義例言之合改正是時黎州民攻刺史張賁賁棄城走五代志義城郡梁曰黎州唐之利州是也魏以武興為東益州氐王楊氏居之梁蓋以為北益州按下卷楊法琛治平興則梁置北益州於平興也酋慈秋翻紀深責之囚法琛質子崇顒崇虎質音致顒魚容翻冬十月丁丑朔法琛遣使附魏使疏吏翻是時己卯齊主至晉陽宮晉陽宮齊獻武王所置唐志晉陽宮在北都之西北宮城周二千五百二十步都城左汾右晉潛丘在中長四千三百二十一步廣三千一百二十二步周萬五千一百五十三步汾東曰東城齊主將如晉陽長弼言於帝曰韶擁強兵在彼恐不如人意言恐韶為變帝不聽既至以長弼語告之曰如君忠誠人猶有讒況其餘乎長弼永樂之弟也高永樂不內高昂使之喪元長弼又讒段韶高歡父子為失刑矣乙酉以特進元韶為尚書左僕射段韶為右僕射是時乙未侯景自加宇宙大將軍都督六合諸軍事以詔文呈上上驚曰將軍乃有宇宙之號乎是時立皇子大鈞為西陽王大威為武寧王大球為建安王大昕為義安王蕭子顯齊志寧蠻府所領有義安郡沈約志宋文帝元嘉十三年立綏建郡於漢南海郡四會縣地樂梁史無所考此時諸王所封皆郡名也當在大同中所分二十餘州不知處所之數考異曰太清紀在十一月十四日今從梁帝紀是時齊東徐州刺史行臺辛術鎮下邳十一月侯景徵租入建康術帥衆渡淮斷之帥讀曰率斷音短燒其穀百萬石遂圍陽平景行臺郭元建引兵救之壬戌術略三千餘家還下邳是時武陵王紀帥諸軍發成都考異曰南史云十一月壬寅按是月壬子朔無壬寅蜀人勇悍易動難安使疏吏翻易弋豉翻弟可鎮之吾自當滅賊又別紙曰地擬孫劉各安境界情深魯衛書信恆通地擬孫劉欲吳蜀各為一國也情深魯衛謂兄弟也恆戶登翻是時甲子南平王恪帥文武拜箋推湘東王繹為相國總百揆繹不許是時魏丞相泰自弘農為橋濟河至建州丙寅齊主自將出頓東城即晉陽之東城也將即亮翻歎曰高歡不死矣會久雨自秋及冬魏軍畜産多死乃自蒲阪還於是河南自洛陽河北自平陽已東皆入于齊邊民見魏師無功齊能自立心無反側疆場遂定是時丁卯徐文盛軍貝磯任約帥水軍逆戰帥讀曰率文盛大破之斬叱羅子通趙威方仍進軍大舉口水經注江水東過邾縣南東徑白虎磯北又東徑貝磯北又東徑黎磯北北岸烽火洲即舉洲也北對舉口舉水出龜頭山徑梁定州城南又徑梁司豫州城東又南歷齊安郡西又東南歷赤亭下分為二水南流注于江將即亮翻以約守西陽久不能進自出屯晉熙考異曰典略七月景軍次濡須使梁仲宣知留府事按典略九月景請梁主同宴梁帝紀十月乙未景逼太宗幸西州不容七月已在濡須今因南康王會理事見之太清紀梁書典略晉熙皆作皖口今從南史南康王會理以建康空虛與太子左衛將軍柳敬禮西鄉侯勸東鄉侯勔勔彌兗翻謀起兵誅王偉安樂侯乂理出奔長蘆今真州六合縣有長蘆鎮及長蘆寺淳熙十二年徙寺於滁口山之東張舜民曰長蘆鎮在滁河西南建安侯賁中宿世子子雍知其謀中宿世子中宿侯之世子也沈約曰中宿漢舊縣屬南海郡吳度屬始興郡偉收會理敬禮勸勔及會理弟祁陽侯通理俱殺之沈約曰祁陽縣吳立屬零陵郡考異曰典略云十二月癸未建安侯賁等告會理梁帝紀十月壬寅景害會理今從太清紀錢塘褚冕以會理故舊捶掠千計捶止藥翻掠音亮終無異言會理隔壁謂之曰褚郎卿豈不為我致此為于偽翻卿雖忍死明我我心實欲殺賊冕竟不服景乃宥之勸昺之子賁正德之弟子子雍憺之孫也昺音丙憺徒敢翻又徒濫翻帝自即位以來景防衛甚嚴外人莫得進見見賢遍翻唯武林侯咨及僕射王克舍人殷不害並以文弱得出入臥內帝與之講論而已及會理死克不害懼禍稍自疏咨獨不離帝離力智翻朝請無絶景惡之使其仇人刁戍刺殺咨於廣莫門外朝直遙翻惡烏路翻刺七亦翻考異曰太清紀在會理死前今從南史帝之即位也景與帝登重雲殿據梁紀重雲殿在華林園項安世曰梁華林園重雲殿前置銅儀重直龍翻自今君臣兩無猜二臣固不負陛下陛下亦不得負臣及會理謀泄景疑帝知之故殺咨帝自知不久指所居殿謂殷不害曰龐涓當死此下景自帥衆討楊白華于宣城白華力屈而降景以其北人楊白華大眼之子魏胡太后私幸之白華懼禍奔梁帥讀曰率華讀曰花降戶江翻以為左民尚書誅其兄子彬以報來亮之怨楊白華殺來亮見上卷太清三年十二月丙子朔景封建安侯賁為竟陵王中宿世子子雍為隨王仍賜姓侯氏侯景賞其告會理之功也是時辛丑齊主還鄴自晉陽還也是時邵陵王綸在汝南修城池集士卒將圖安陸魏安州刺史馬祐以告丞相泰五代志安陸郡梁置南司州西魏改曰安州今為德安府將即亮翻是時武陵王紀遣潼州刺州楊乾運南梁州刺史譙淹合兵二萬討楊法琛元和郡縣志梓潼郡梁置潼州潼音同是時侯景還建康自晉熙還也是時初魏敬宗以爾朱榮為柱國大將軍柱國大將軍魏初官也世祖以加太尉長孫嵩榮敗此官遂廢大統三年文帝復以丞相泰為之復扶又翻其後功參佐命望實俱重者亦居此官凡八人曰安定公宇文泰廣陵王欣趙郡公李弼隴西公李虎河內公獨孤信南陽公趙貴常山公于謹彭城公侯莫陳崇謂之八柱國泰始籍民之才力者為府兵身租庸調一切蠲之唐府兵之法本諸此凡受田之丁歲輸粟謂之租隨鄉所出每丁歲輸絹綾絁布帛丿糸麻非蠶鄉則歲輸銀謂之調用人之力歲二十日閏加二日不役者日為絹三尺謂之庸調徒弔翻馬畜糧備六家供之合為百府每府一郎將主之將即亮翻分屬二十四軍泰任總百揆督中外諸軍欣以宗室宿望從容禁闥而已陳讀曰陳從千容翻餘六人各督二大將軍凡十二大將軍廣平王元贊淮王元育齊王元廓章武郡公宇文導平原郡公侯莫陳順高陽郡公達奚武陽平公李遠范陽公豆盧寧化政公宇文貴博陵公賀蘭祥陳留公楊忠武威公王雄凡十二人皆使持節大將軍開府各領一軍是後功臣位至柱國大將軍開府儀同三司儀同三司者甚衆率為散官無所統御雖有繼掌其事者聞望皆出諸公之下云散悉亶翻聞音問是時齊主命散騎侍郎宋景業造天保曆行之時齊主命景業叶圖讖造天保曆景業奏依握誠圖及元命包言齊受祿之期當魏終之紀得乘三十五以為蔀應六百七十六以為章齊主大悅乃施用之王崇武標點容肇祖聶崇岐覆校
