body:
  text: 資治通鑑卷第八十三端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰權判西京留司御史臺上柱國河內郡開國侯食邑一千三百戶食實封四百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注晉紀五元康九年孝惠皇帝上之下元康九年己未二九九元康九年春正月孟觀大破氐衆於中亭水經注扶風美陽縣有中亭水亦謂之中亭川在美陽縣西元康九年太子洗馬陳留江統洗悉薦翻以為戎狄亂華宜早絶其原乃作徙戎論以警朝廷曰夫夷蠻戎狄地在要荒周禮九州之外謂之蕃國謂東夷南蠻西戎北狄也國語曰蠻夷要服戎狄荒服韋昭注曰要者要結好信而服從之荒者言荒忽無常也要一遙翻孔安國曰言荒服之外流沙之內皆就次敘班固曰即敘者言就而敘之婪盧含翻凶悍不仁悍侯罕翻又下罕翻四夷之中戎狄為甚弱則畏服強則侵叛當其強也以漢高祖困於白登孝文軍於霸上及其弱也以元成之微而單于入朝此其已然之效也單音禪朝直遙翻是以有道之君牧夷狄也惟以待之有備禦之有常雖稽顙執贄周禮蕃國世一見各以其所貴寶為贄稽音啓漢元帝時胸奴單于請罷邊塞守備侯應以為不可所謂不弛固守也周宣王薄伐獫狁至于太原盡境而返比於蚊虻驅之而已所謂不加遠征也疆場不侵而已及至周室失統諸侯專征封疆不固利害異心戎狄乘間得入中國如戎伐魯濟西山戎病燕狄伐衛邢長狄入三國之類間古莧翻如申繒以西戎攻殺周幽王晉遷陸渾之戎之於伊川與之掎角以敗秦師于殽楚以蠻軍與晉戰于鄢陵誘音酉與中國錯居如徐夷在齊晉魯宋之間鮮虞介燕晉之境赤狄居上黨之地陸渾戎居伊洛之間義渠大荔居秦晉之域戎蠻子居梁霍之地兵威旁達攘胡走越當是時中國無復四夷也事見秦紀漢建武中馬援領隴西太守討叛羌徙其餘種於關中種章勇翻居馮翊河東空地數歲之後族類蕃息蕃扶元翻既恃其肥強且苦漢人侵之永初之元㣥羌叛亂覆沒將守屠破城邑鄧騭敗北侵及河內十年之中夷夏俱敝任尚馬賢僅乃克之事並見漢紀按漢光武建武十一年馬援討羌降之安帝永初元年羌反自建武十一年至永初元年凡七十三年數歲之後當作數十歲之後將即亮翻守式又翻騭之日翻夏戶雅翻任音壬餘燼不盡小有際會輒復侵叛復扶又翻中世之寇惟此為大魏興之初與蜀分隔疆場之戎一彼一此武帝徙武都氐於秦川事見六十八卷漢獻帝建安草三年此蓋權宜之計非萬世之利也今者當之已受其敝矣夫關中土沃物豐帝王所居周都豐鎬秦都咸陽漢都長安皆關中之地非我族類其心必異而因其衰敝遷之畿服畿服謂邦畿千里之內侮其輕弱使其怨恨之氣毒於骨髓至於蕃育衆盛蕃扶袁翻則坐生其心以貪悍之性挾憤怒之情候隙乘便輒為橫逆橫戶孟翻而居封域之內無障塞之隔掩不備之人收散野之積積子賜翻聚也故能為禍滋蔓暴害不測此必然之勢已驗之事也當今之宜宜及兵威方盛衆事未罷徙馮翊北地新平安定界內諸羌著先零罕幵析支之地徙扶風始平京兆之氐出還隴右著陰平武都之界先零罕幵析支之地自湟中西至賜支河首陰平武都舊白馬氐地也著直略翻零音憐幵苦堅翻令足自致廩當作稟給也下廩糧同種章勇翻反其舊土使屬國撫夷就安集之屬國都尉及撫夷護軍也並得其所縱有猾夏之心孔安國曰猾亂也夏華夏也夏戶雅翻則絶遠中國隔閡山河遠于願翻閡與礙同雖有寇暴所害不廣矣難者曰氐寇新平關中饑疫百姓愁苦咸望寧息而欲使疲悴之衆徙自猜之寇恐勢盡力屈緒業不卒難乃旦翻悴秦醉翻卒子恤翻終也前害未及弭而後變復橫出矣復扶又翻答曰子以今者㣥氐為尚挾餘資悔惡反善懷我德惠而來柔附乎將勢窮道盡智力俱困懼我兵誅以至於此乎曰無有餘力勢窮道盡故也然則我能制其短長之命而令其進退由己矣夫樂其業者不易事樂音洛安其居者無遷志方其自疑危懼畏怖促遽怖普布翻故可制以兵威使之左右無違也逮其死亡流散離逖未鳩逖他歷翻爾雅曰逖遠也鳩集也與關中之人戶皆為讎謂氐羌之反暴掠平民關中之人怨毒之戶皆為讎敵令其心不懷土也夫聖賢之謀事也為之於未有治之於未亂治直之翻道不著而平德不顯而成其次則能轉禍為福因敗為功值困必濟遇否能通否皮鄙翻今子遭敝事之終而不圖更制之始更工衡翻愛易轍之勤而遵覆車之軌何哉車覆於前不可遵其轍當易路而行若遵覆車之迹則後車又將覆矣率其少多率列恤翻約數也少詩沼翻戎狄居半處之與遷必須口實口實謂糧食也處昌呂翻糝粒不繼者糝桑頷翻以米和羹也故當傾關中之穀以全其生生之計必無擠於溝壑而不為侵掠之害也氐羌窮乏勢必聚而侵掠晉朝欲弭其害故當傾穀以給之擠子西翻又子細翻傳食而至謂所過郡縣遞給其食也傳直戀翻自使相贍而秦地之人得其半穀言關中居人戎狄居半今遷使歸其舊地則秦中百姓將食其所積之穀以約率之正得常居之半穀也種章勇翻下餘種同遺居者以積倉遺于季翻寬關中之逼去盜賊之原去羌呂翻除旦夕之損建終年之益若憚暫舉之小勞暫與暫同惜日月之煩苦而遺纍世之寇敵非所謂能創業垂統謀及子孫者也並州之胡本實胸奴桀惡之寇也建安中使右賢王去卑誘質呼廚泉聽其部落散居六郡謂並州所統六郡也晉書胸奴傳曰胸奴與晉人雜居平陽西河太原新興上黨樂平莫不有焉質呼廚泉事見六十七卷漢獻帝建安二十一年質音致以一部太強分為三率率讀曰帥音所類翻泰始之初又增為四於是劉猛內叛連結外虜事見七十九卷武帝泰始七年八年發於穀遠穀遠縣漢屬上黨郡晉省蓋其地猶存舊縣名也劉昫曰穀遠今沁源縣宋白曰漢穀遠故縣在沁源縣南百五十步孤遠故城是也晉地記云穀遠今名孤遠後代語訛耳郝散事見上卷四年戶至數萬人口之盛過於西戎其天性驍勇弓馬便利倍於氐羌驍堅堯翻若有不虞風塵之慮則並州之域可為寒心劉淵之禍江統固逆知之矣正始中毋丘儉討句驪事見七十五卷魏邵陵厲公正始七年句如字又音駒驪力知翻種章勇翻始徙之時戶落百數子孫孳息孳津之翻生也今以千計數世之後必至殷熾熾昌志翻今百姓失職民不得安於耕鑿是失職也犬馬肥充則有噬齧況於夷狄能不為變但顧其微弱勢力不逮耳顧內顧也夫為邦者憂不在寡而在不安論語孔子曰丘聞有國有家者不患寡而患不均不患貧而患不安士民之富豈須夷虜在內然後取足哉此等皆可申諭發遣還其本域慰彼羈旅懷土之思釋我華夏纖介之憂夏戶雅翻惠此中國以綏四方詩大雅民勞之辭於計為長也朝廷不能用元康九年散騎常侍賈謐侍講東宮對太子倨傲成都王穎見而叱之謐怒言於賈后出穎為平北將軍鎮鄴考異曰帝紀云以穎為鎮北大將軍今從本傳以河間王顒為鎮西將軍鎮關中肜余中翻顒魚容翻初武帝作石函之制非至親不得鎮關中顒輕財愛士朝廷以為賢故用之顒安平獻王孚之孫太原烈王瓖之子也初襲父爵咸寧三年改封河間為穎顒各據方鎮以阻兵張本元康九年夏六月章甲十一行本月下有戊戌二字乙十一行本同孔本同高密文獻王泰薨考異曰帝紀云隴西王本傳云泰為尚書令改封高密紀誤元康九年賈后淫虐日甚私於太醫令程據等晉志太醫令屬宗正簏盧谷翻說文竹高篋也少詩照翻復恐其漏泄往往殺之復扶又翻賈模恐禍及己甚憂之裴頠與模及張華議廢后更立謝淑謝淑太子之母也頠魚毀翻更工衡翻考異曰賈后傳曰模與裴頠王衍謀廢之衍後悔而止今從頠傳主上自無廢黜之意而吾等專行之儻上心不以為然將若之何且諸王方強朋黨各異恐一旦禍起身死國危無益社稷頠曰誠如公言然宮中逞其昏虐亂可立待也華曰卿二人於中宮皆親戚言或見信宜數為陳禍福之戒庶無大悖則天下尚未至於亂吾曹得以優游卒歲而已張華處昏亂之朝位冠㣥后而持心如此天殆假手於趙王倫而誅之也數所角翻為于僞翻卒子恤翻悖蒲內翻說輸芮翻從才用翻令戒諭賈后以親厚太子賈模亦數為后言禍福后不能用反以模為毀己而疏之模不得志憂憤而卒秋八月以裴頠為尚書僕射頠雖賈后親屬然雅望素隆四海惟恐其不居權位尋詔頠專任門下事晉制侍中與給事黃門侍郎同管門下事頠為侍中專任門下事賈后之意也以賈模適亡復以臣代之復扶又翻崇外戚之望彰偏私之舉為聖朝纍纍力瑞翻不聽或謂頠曰君可以言當盡言於中宮言而不從當遠引而去儻二者不立雖有十表難以免矣頠慨然久之竟不能從史言華頠顧戀祿位以殞首亡家帝為人戇騃戇陟降翻愚也騃語駭翻癡也嘗在華林園聞蝦蟆蝦何加翻蟆謨加翻謂左右曰此鳴者為官乎為私乎為于僞翻時天下荒饉百姓餓死帝聞之曰何不食肉糜糜忙皮翻粥也由是權在㣥下政出多門勢位之家更相薦託有如互市更工衡翻賈郭恣橫橫戶孟翻貨賂公行南陽魯褒作錢神論以譏之曰錢之為體有乾坤之象親之如兄字曰孔方錢圜函方天圜而地方故曰有乾坤之象孔方亦以錢體言無勢而熱排金門入紫闥危可使安死可使活貴可使賤生可使殺是故忿爭非錢不勝幽滯非錢不拔怨讎非錢不解令聞非錢不發聞音問洛中朱衣當塗之士晉制諸王朱衣絳紗襮當塗之士謂當路柄用者皆無已已執我之手抱我終始凡今之人惟錢而已又朝臣務以苛察相高每有疑議㣥下各立私意刑法不一獄訟繁滋裴頠上表曰先王刑賞相稱稱尺證翻輕重無二故下聽有常㣥吏安業去元康四年大風廟闕屋瓦有數枚傾落免太常荀㝢事輕責重有違常典五年二月有大風蘭臺主者懲懼前事求索阿棟之間得瓦小邪十五處蘭臺主者御史臺主者也即令史之類阿屋之隈曲棟屋穩也索山客翻復興刑獄復扶又翻下頌復史復同今年八月陵上荊一枝圍七寸二分者被斫司徒太常奔走道路說文荊楚木也司徒漢丞相之職漢制丞相與太常掌園陵被皮義翻而按劾難測劾戶概翻又戶得翻搔擾驅馳各競免負負罪負也夫刑書之文有限而舛違之故無方故有臨時議處之制言法有一定之文而罪有故誤情有輕重故制令臨時隨事情議處其罪處昌呂翻至於此等皆為過當當丁浪翻恐姦吏因緣得為淺深也既而曲議猶不止曲議謂曲法而議自為淺深晉志漢成帝置三公尚書主斷獄光武以三公曹主歲盡考課州郡事自近世以來法漸多門令甚不一吏不知所守下不知所避姦僞者因以售其情居上者難以檢其下檢校檢束也獄犴不平犴魚旰翻野獄曰犴夫君臣之分各有所司法欲必奉故令主者守文理有窮塞故使大臣釋滯事有時宜故人主權斷塞悉則翻斷丁亂翻下弘斷同主者守文若釋之執犯蹕之平也事見十四卷漢文帝三年若公孫弘斷郭解之獄也事見十八卷漢武帝元朔二年若漢祖戮丁公之為也事見十一卷漢高祖五年自非此類不得出意妄議皆以律令從事然後法信於下人聽不惑吏不容姦可以言政矣考異曰刑法志敘頌奏續頠表之下而云侍中太宰汝南王亮按頠表引元康八年事時亮死已久蓋志誤也郎令史復出法駁案者隨事以聞然亦不能革也郎令史尚書郎及尚書蘭臺令史也出法駁案者謂出於法之外而為駁議也駁北角翻頌遷吏部尚書建九班之制欲令百官居職希遷考課能否明其賞罰賈郭用權仕者欲速事竟不行裴頠薦平陽韋忠於張華魏邵陵厲公正始八年分河東郡之汾北為平陽郡忠辭疾不起人問其故忠曰張茂先華而不實裴逸民欲而無厭張華字茂先裴頠字逸民厭於鹽翻此豈大丈夫之所為哉逸民每有心託我我常恐其溺於深淵而餘波及我況可褰裳而就之哉溺奴狄翻關內侯敦煌索靖知天下將亂敦徒門翻索蘇各翻指洛陽宮門銅駝歎曰會見汝在荊棘中耳銅駝魏明帝景初元年自長安徙之洛陽元康九年冬十一月甲子朔日有食之元康九年初廣城君郭槐以賈后無子常勸后使慈愛太子賈謐驕縱數無禮於太子數所角翻廣城君恆切責之恆戶登翻廣城君欲以韓壽女為太子太子亦欲婚韓氏以自固壽妻賈午及后皆不聽而為太子聘王衍少女太子聞衍長女美而后為賈謐聘之為于僞翻少詩照翻長知兩翻心不能平頗以為言及廣城君病臨終執后手令盡心於太子言甚切至又曰趙粲賈午必亂汝家事我死後勿復聽入深記吾言郭槐妬狠而垂沒之時所以告戒其女者如此蓋多權數故其智慮能及此耳復扶又翻下同更與粲午謀害太子太子幼有令名事見上卷武帝太康十年不好學長知兩翻好呼報翻下同惟與左右嬉戲賈后復使黃門輩誘之為奢靡威虐誘音酉由是名譽浸減驕慢益彰或廢朝侍而縱遊逸朝直遙翻於宮中為市使人屠酤手揣斤兩揣初委翻輕重不差其母本屠家女也故太子好之古者擇女必求之名門取其幽閒令淑者良有以也好呼到翻俸扶用翻太子常探取二月用之猶不足探吐南翻又他紺翻探取預取也又令西園賣葵菜藍子雞麵等物而收其利葵亦菜也魯相公儀休拔園葵漆室氏女曰晉客馬踐吾葵使吾終歲不食葵是也藍盧甘翻草可以染青者也本草圖經曰藍實人家蔬圃中作畦種蒔三月四月生苗高三四尺許葉似水蓼花紅白色實亦若蓼子而大黑色五月六月採實麵屑麥為之多所拘忌班固曰陰陽家蓋出於羲和之官敬順昊天曆象日月星辰敬授人時此其所長也及拘者為之則牽於禁忌泥於小數捨人事而任鬼神一曰雖有微苦宜力疾朝侍苦亦疾也朝直遙翻咨詢善道三曰畫室之功可宜章甲十一行本宜作且乙十一行本同孔本同減省畫室以五采繪畫室屋也畫與盡同一皆罷遣鏤郎豆翻四曰西園賣葵藍之屬虧敗國體貶損令聞敗補邁翻聞音問五曰繕牆正瓦不必拘攣小忌攣閭緣翻太子皆不從中舍人杜錫晉志太子中舍人四人咸寧四年置以舍人才學美者為之與中庶子共掌文翰職如黃門侍郎在中庶子下洗馬上每盡忠諫勸太子修德業保令名言辭懇切太子患之置針著錫常所坐氈中著陟略翻刺之流血刺七亦翻錫預之子也杜預武帝時建平吳之功太子性剛知賈謐恃中宮驕貴不能假借之謐時為侍中至東宮或捨之於後庭遊戲詹事裴權諫曰詹事秦官掌太子家晉初未置詹事宮事無大小皆由二傅咸寧元年置詹事掌宮事二傅不復領官屬謐后所親昵昵尼質翻一旦交構則事危矣不從謐譖太子於后曰太子多畜私財以結小人者為賈氏故也為于僞翻若宮車晏駕彼居大位依楊氏故事誅臣等廢后於金墉如反手耳賈后殺楊駿廢太后天地之所不容也觀其姑姪之間所言若此則其心固不能一息安也更立慈順者可以自安更工衡翻后納其言乃宣揚太子之短布於遠近又詐為有娠娠升人翻孕也內藳物産具取妹夫韓壽子慰祖養之欲以代太子于時朝野咸知賈后有害太子之意中護軍趙俊請太子廢后太子不聽左衛率東平劉卞以賈后之謀問張華帝在東宮置衛率初曰中衛率泰始五年分為左右各領一軍愍懷在東宮又加前後二率謂之四率率所律翻不聞卞曰卞自須昌小吏受公成拔以至今日須昌縣屬東平國卞自縣小吏從令入洛歷官至左衛率是以盡言而公更有疑於卞邪華曰假令有此君欲如何卞曰東宮俊乂如林時江統潘滔王敦等皆為東宮官屬馬融曰才過千人曰俊百人曰乂公居阿衡之任若得公命皇太子因朝入録尚書事朝直遙翻下同廢賈后於金墉城兩黃門力耳華曰今天子當陽太子人子也吾又不受阿衡之命華自言事任不可以伊尹自居此是無君父而以不孝示天下也章甲十一行本也下有雖能有成猶不免罪八字乙十一行本同孔本同張校同退齊校同況權戚滿朝威柄不一成可必乎賈后常使親黨微服聽察於外頗聞卞言乃遷卞為雍州刺史雍於用翻卞知言泄飲藥而死賈后剛悍使聞卞言而張華不以告則華必死於賈后之手意卞言實華泄之也十二月太子長子虨病長知兩翻虨甫斤翻又方間翻太子為虨求王爵不許虨疾篤太子為之禱祀求福為于僞翻賈后聞之乃詐稱帝不豫召太子入朝既至后不見置于別室遣婢陳舞以帝命賜太子酒三升使盡飲之太子辭以不能飲三升舞逼之曰不孝邪天賜汝酒而不飲臣子以君父為天故以君父之賜為天賜太子不得已強飲至盡強其兩翻遂大醉后使黃門侍郎潘嶽作書草潘嶽此事自當赤族其後天假手於孫秀耳以紙筆及草因太子醉稱詔使書之文曰陛下宜自了不自了吾當入了之中宮又宜速自了不自了吾當手了之並與謝共要刻期兩發勿疑猶豫以致後患茹毛飲血於三辰之下皇天許當掃除患害立道文為王蔣氏為內主願成當以三牲祠北君太子醉迷不覺遂依而寫之謝太子母也要約也言並以書與謝約刻期內外俱發也茹毛飲血謂盟誓也虨字道文蔣氏虨母蔣保林也內主言將立為后也三牲牛羊豕也北君北帝也按此書不惟無徵左使常人觀之亦知其僞為而不可信晉朝王公卿尚書黃散視而不敢言張華之諫實亦不敢發賈氏之姦姑引古義依違而言之耳裴頠請檢校傳書者賈氏之姦無所逃矣而亦不敢竟其說上下相蒙宜其大亂也后補成之以呈帝壬戌帝幸式乾殿召公卿入使黃門令董猛以太子書及青紙詔示之曰遹書如此今賜死遍示諸公王莫有言者諸公王宗室諸王之為公者此國之大禍自古以來常因廢黜正嫡以致喪亂喪息浪翻且國家有天下日淺願陛下詳之裴頠以為宜先檢校傳書者又請比校太子手書不然恐有詐妄賈后乃出太子啓事十餘紙衆人比視亦無敢言非者賈后使董猛矯以長廣公主辭白帝曰長廣公主武帝女下嫁甄德事宜速決而㣥臣各不同其不從詔者宜以軍法從事欲以此言脅㣥臣也不決后見華等意堅懼事變乃表免太子為庶人詔許之於是使尚書和郁等持節詣東宮廢太子為庶人太子改服出拜受詔步出承華門承華門東宮門也陸機詩所謂振纓承華是也東武公淡以兵仗送太子及王氏王子虨臧尚同幽于金墉城王衍自表離婚許之慟哭而歸清談之禍起於何晏何晏猶與曹爽同禍福若王衍者又不逮何晏矣保林良娣漢六宮十四等之數魏晉以下為東宮女官品秩師古曰保林言其可安衆如林也永康元年庚申三元康九年春正月癸亥朔考異曰帝紀天文志皆有己卯日食宋志無之按長曆己卯十七日安得日食改元元康九年西戎校尉司馬閻纘武帝置南蠻校尉於襄陽西戎校尉於長安南夷校尉於寧州各有長史司馬以為漢戾太子稱兵拒命言者猶曰罪當笞耳事見二十二卷漢武帝征和二年三年不敢失道猶為輕於戾太子宜重選師傅重再也重直龍翻若不悛改棄之未晚也悛丑緣翻書奏不省省悉景翻纘圃之孫也閻圃見六十七卷漢獻帝建安二十年賈后使黃門自首首式救翻下同欲與太子為逆詔以黃門首辭班示公卿遣東武公淡以千兵防衛太子幽于許昌宮令持張持作治書御史劉振持節守之持書御史即治書侍御史洗馬江統潘滔舍人王敦杜蕤魯瑤等冒禁至伊水拜辭涕泣晉志太子舍人十六人職比散騎中書等侍郎水經注伊水過伊闕中東北至洛陽縣南北入于洛其繫河南獄者樂廣悉解遣之樂廣時為河南尹猶未釋付郡者河南尹得解遣之繫洛陽獄者尹不得與故未釋所以廢徙太子以其為惡故耳今宮臣冒罪拜辭而加以重辟流聞四方乃更彰太子之德也說輸芮翻辟毗亦翻聞音問不如釋之謐乃語洛湯令曹攄使釋之攄抽居翻語牛倨翻廣亦不坐敦覽之孫王覽見七十七卷魏高貴鄉公甘露元年肇之孫也曹肇見七十四卷魏明帝景初二年遺王書遺于季翻自陳誣枉父衍不敢以聞元康九年丙子皇孫虨卒非疾也考異曰帝紀虨作霖按虨字道文不當作霖今從傳元康九年三月尉氏雨血尉氏縣自漢以來屬陳留郡應劭曰古獄官曰尉氏鄭之別獄也臣瓚曰鄭大夫尉氏之邑故以為邑名師古曰鄭大夫尉氏亦以掌獄之官故為族耳應說是也雨于具翻星見妖而不知其名故但曰妖星妖於驕翻見賢遍翻下同晉天文志曰太白晝見與日爭明強國弱小國強女主昌史記天官書曰魁下六星兩兩而比者曰三台三台色齊君臣和不齊君臣乖戾漢天文志曰三台曰泰階上階上星為天子下星為女主中階上星為諸侯三公下星為卿大夫下階上星為士下星為庶人拆者兩星不相比也少詩照翻韙羽委翻華不從曰天道幽遠不如靜以待之華所謂靜以待之者欲何所待也元康九年太子既廢衆情憤怒右衛督司馬雅常從督許超皆嘗給事東宮與殿中中郎士猗等右衛督常從督殿中中郎皆屬二衛武帝甚重兵官殿中軍校多選朝廷清望之士居之司馬雅宗室之疏屬也從才用翻復太子以張華裴頠安常保位難與行權右軍將軍趙王倫執兵柄性貪冒冒密北翻可假以濟事乃說孫秀曰說輸芮翻中宮凶妬無道與賈謐等共誣廢太子今國無嫡嗣社稷將危大臣將起大事而公名奉事中宮與賈郭親善太子之廢皆云豫知言倫秀豫知廢太子之謀禍必相及何不先謀之乎秀許諾言於倫倫納焉遂告通事令史張林通事令史中書令史也中書侍郎本通事郎官名雖改令史猶以通事冠之陸機惠帝起居注曰張林者黑山賊張燕之曾孫省事亦吏職也賈充為尚書令以目疾表置省事吏四員省事蓋自此始省悉景翻事將起孫秀言於倫曰太子聰明剛猛若還東宮必不受制於人明公素黨於賈后道路皆知之今雖建大功於太子太子謂公特逼於百姓之望翻覆以免罪耳言百姓望太子復倫等畏逼故背賈氏復太子以求自免罪必不能深德明公若有瑕釁猶不免誅不若遷延緩期遲其事而遷延未發也然後廢賈后為太子報讎為于僞翻非徒免禍而已乃更可以得志倫然之秀因使人行反間間古莧翻言殿中人欲廢皇后立太子司馬雅許超士猗皆殿中人也數所角翻聞之甚懼倫秀因勸謐等早除太子以絶衆望癸未賈后使太醫令程據和毒藥和戶臥翻矯詔使黃門孫慮至許昌毒太子太子自廢黜恐被毒常自煮食於前被皮義翻慮以告劉振振乃徙太子於小坊中絶其食宮人猶竊於牆上過食與之慮逼太子以藥太子不肯服慮以藥杵椎殺之椎傳追翻有司請以庶人禮葬賈后表請以廣陵王禮葬之元康九年夏四月辛卯朔日有食之元康九年趙王倫孫秀將討賈后告右衛佽飛督閭和晉制右衛有佽飛虎賁二督佽飛荊人赴江斬蛟古勇士也自漢以來以為衛士之號佽日四翻期以癸巳丙夜一籌以鼓聲為應丙夜夜三鼓丙夜一籌三更一點也癸巳秀使司馬雅告張華曰趙王欲與公共匡社稷為天下除害為于僞翻華拒之雅怒曰刃將在頸猶為是言邪不顧而出華素有籌略雅辭氣之悖如此而無以處之蓋亦知衆怒不可遏而己為賈后用心不敢背之搏手無策待死而已及期倫矯詔敕三部司馬曰晉二衛有前驅由基強弩三部司馬中宮與賈謐等殺吾太子今使車騎入廢中宮時趙王倫以車騎將軍領右軍將軍事畢賜爵關中侯不從者誅三族衆皆從之又矯詔開門夜入陳兵道南御道之南也武帝太康元年置翊軍校尉冏居永翻華林令駱休為內應華林令華林園令也魏起芳林園後避齊王芳諱改曰華林園有天淵池池中有魏文帝九花叢殿晉志華林令屬大鴻臚姓譜齊太公之後有公子駱子孫以為氏又秦之先有大駱以詔召賈謐於殿前將誅之謐走入西鍾下呼曰阿后救我呼火故翻阿今相傳從安入聲就斬之賈后見齊王冏驚曰卿何為來冏曰有詔收后后曰詔當從我出何詔也后至上閣遙呼帝曰陛下有婦使人廢之亦行自廢矣是時梁王肜亦預其謀后問冏曰起事者誰冏曰梁趙后曰繫狗當繫頸反繫其尾何得不然恨不先誅梁趙也幽之於建始殿收趙粲賈午等付暴室考竟晉志暴室令屬光祿勳召中書監侍中黃門侍郎八座皆夜入殿尚書始疑詔有詐郎師景露版奏請手詔郎尚書郎也師姓景名倫陰與秀謀篡位欲先除朝望朝直遙翻且報宿怨乃執張華裴頠解系解結等於殿前倫秀怨華頠系事見上光卷元康六年結系弟也秀亂關中結議秀罪應誅故亦怨之卿欲害忠臣邪林稱詔詰之曰詰去吉翻卿為宰相太子之廢不能死節何也華曰式乾之議臣諫事具存可覆按也林曰諫而不從何不去位華無以對遂皆斬之仍夷三族解結女適裴氏明日當嫁而禍起裴氏欲認活之女曰家既如此我何以活為亦坐死朝廷由是議革舊制女不從死不從父母家坐死也甲午倫坐端門宮門正南門曰端門楊太后太子遹之廢史皆不書為庶人此獨書賈庶人者正其罪也司徒王戎及內外官坐張裴親黨黜免者甚衆閻纘撫張華尸慟哭曰早語君遜位而不肯今果不免命也語牛倨翻於是趙王倫稱詔赦天下自為使持節都督中外諸軍事相國侍中一依宣文輔魏故事晉志曰丞相相國秦官也晉受魏禪並不置自惠帝之後省置無恆為之者趙王倫梁王肜成都王穎南陽王保王敦王導之徒非復人臣之職也今按宣王懿以丞相輔魏文王昭以相國輔魏皆非人臣之職以其世子散騎常侍荂領冗從僕射荂枯花翻楊正衡音孚晉志冗從僕射屬光祿勳從才用翻子馥為前將軍封濟陽王濟子禮翻虔為黃門郎封汝陰王詡為散騎侍郎封霸城侯黃門郎即黃門侍郎散騎侍郎魏初與散騎常侍同置自魏至晉散騎常侍侍郎與侍中黃門侍郎共平尚書奏事皆要官也並據兵權文武官封侯者數千人百官總己以聽於倫朱氏曰總己謂總攝己職復受制於孫秀復扶又翻秀為中書令威權振朝廷天下皆事秀而無求於倫詔追復故太子遹位號使尚書和郁帥東宮官屬迎太子喪於許昌帥讀曰率追封遹子虨為南陽王封虨弟臧為臨淮王尚為襄陽王有司奏尚書令王衍備位大臣太子被誣志在苟免謂太子遺王書自陳誣枉衍不敢以聞也從之相國倫欲收人望選用海內名德之士以前平陽太守李重滎陽太守荀組為左右長史東平王堪沛國劉謨為左右司馬尚書郎陽平束皙為記室魏文帝黃初二年分魏郡置陽平郡記室主文翰束皙漢太子太傅疏廣之後廣曾孫避難因去疏字之足改姓為束續漢志曰記室主上章表報書記殿中郎尚書郎也主殿中曹勗之子勗為晉初佐命之臣荀彧為魏初佐命之官辭疾不就倫逼之不已憂憤成疾扶曳受拜數日而卒元康九年丁酉以梁王肜為太宰左光祿大夫何劭為司徒右光祿大夫劉實為司空晉志左右光祿大夫假金章紫綬品秩第二祿賜班位冠幘車服佩玉置吏卒羽林後之金紫光祿大夫蓋魏晉之左右光祿大夫也但魏晉之大夫皆為專官後世則為寄祿官耳杜佑曰魏晉以來左右光祿三大夫皆銀印青綬其重者詔加金章紫綬者則謂之金紫光祿大夫重者既有金紫之號故謂本光祿為銀青光祿大夫元康九年太子遹之廢也將立淮南王允為太弟議者不合言有持異議者也乃以允為驃騎將軍開府儀同三司領中護軍元康九年己亥相國倫矯詔遣尚書劉弘齎金屑酒賜賈后死于金墉城元康九年五月己巳詔立臨海章甲十一行本海作淮乙十一行本同孔本同王臧為皇太孫還王氏以母之太子之廢也歸王于父母家相國倫行太孫太傅元康九年己卯諡故太子曰愍懷六月壬寅葬于顯平陵元康九年清河康王遐薨元康九年中護軍淮南王允性沈毅沈持林翻宿衛將士皆畏服之允知相國倫及孫秀有異志陰養死士謀討之倫秀深憚之秋八月轉允為太尉外示優崇實奪其兵權中護軍掌兵轉太尉則兵權去矣秀遣御史劉機逼允收其官屬以下劾以拒詔大逆不敬劾戶概翻又戶得翻允視詔乃秀手書也大怒收御史將斬之御史走免斬其令史二人此蘭臺令史也趙王欲破我家遂帥國兵及帳下七百人直出國兵淮南國兵也帳下中護軍帳下也帥讀曰率呼火故翻趙王反我將討之從我者左袒於是歸之者甚衆允將赴宮尚書左丞王輿閉掖門宮門端門之左曰左掖門右曰右掖門遂圍相府時倫以東宮為相府將即亮翻倫與戰屢敗死者千餘人太子左率陳徽勒東宮兵鼓譟於內以應允左率即左衛率弓弩齊發射倫飛矢雨下陳讀曰陳射而亦翻主書司馬眭祕以身蔽倫續漢志尚書三十六曹郎曹有三主書此主書司馬蓋相國府官屬倫所自署置眭息隨翻姓也中竹仲翻下同倫官屬皆隱樹而立每樹輒中數百箭自辰至未中書令陳淮前有中書令陳準淮蓋準字之誤也欲應允言於帝曰宜遣白虎幡以解鬬白虎幡以麾軍進戰非以解鬬也陳準蓋以帝庸愚故請以白虎幡麾軍欲倫兵見之以為允之攻倫出於帝命將自潰也否則何以應允司馬督護亦殿中將校屬二衛陰與胤誓曰富貴當與卿共之胤乃懷空版出空版不書詔之版本無詔書而別取空版懷之以出也允不之覺開陳內之下車受詔胤因殺之並殺允子秦王郁漢王迪坐允夷滅者數千人曲赦洛陽不普赦天下而獨赦洛陽故曰曲赦初孫秀嘗為小吏事黃門郎潘嶽嶽屢撻之孫秀琅邪人潘嶽為琅邪內史秀為小吏給嶽狡黠自喜嶽惡其為人數撻辱之建表倫罪惡見上卷元康六年緑珠善吹笛太平廣記曰今白州雙角山下有緑珠井昔梁氏之女有容貌石崇使交州以真珠三斛買之梁氏之居舊井存焉汲飲者必誕美女里閭以美女無益遂以石填之崇不與及淮南王允敗秀因稱石崇潘嶽歐陽建奉允為亂收之考異曰崇傳曰崇建潛知其計陰勸淮南王允齊王冏圖趙王倫若崇果與允同謀允敗崇應惶懼不應被收時方宴於樓上蓋倫秀以舊怨誣殺之耳今按石崇傳孫秀索緑珠崇不許秀怒乃勸倫誅崇崇正宴於樓上介士到門崇謂緑珠曰我今為爾得罪緑珠泣曰當效死於君前因自投於樓下而死奴輩利吾財爾收者曰知財為禍何不早散之崇不能答初潘嶽母常誚責嶽曰汝當知足而乾沒不已乎蓋戒嶽乘時射利不知止也服虔曰乾沒射成敗也如淳曰得利為乾失利為沒乾音干一說以水為喻也言其視利而趨雖乾而在陸沒而滅頂皆所不顧也嶽謝母曰負阿母阿從安入聲籍沒崇家相國倫收淮南王母弟吳王晏欲殺之光祿大夫傅祗爭之於朝堂朝直遙翻衆皆諫止倫乃貶晏為賓徒縣王賓徒縣前漢屬遼西郡後漢屬遼東屬國都尉晉屬昌黎郡齊王冏以功遷游擊將軍晉志驍騎將軍游擊將軍並漢雜號將軍也魏置為中軍及晉以領護左右衛驍騎游擊為六軍有恨色孫秀覺之且憚其在內乃出為平東將軍鎮許昌為冏自許昌起兵討倫張本元康九年以光祿大夫陳準為太尉録尚書事未幾薨元康九年孫秀議加相國倫九錫百官莫敢異議吏部尚書劉頌曰昔漢之錫魏魏之錫晉皆一時之用非可通行謂禪代然後有九錫非常典也其功至大皆不聞有九錫之命也謂周勃霍光定策以安漢室且不聞有九錫之命所以折倫秀之姦謀也以頌為張華之黨將殺之孫秀曰殺張裴已傷時望不可復殺頌林乃止復扶又翻下同以頌為光祿大夫晉志光祿大夫與卿同秩中二千石著進賢兩梁冠黑介幘五時朝服佩水蒼玉考異曰三十國春秋云倫黨大怒謀害頌頌懼自殺頌傳云頌為光祿尋病卒今從傳復加其子荂撫軍將軍撫軍將軍文帝以授武帝遂以代魏倫以加其世子意趣為何武帝受禪置中軍將軍統宿衛七軍尋罷已而復置又加孫秀侍中輔國將軍相國司馬右率如故右率右衛率也不解此官者欲握東宮兵增相府兵為二萬人與宿衛同並所隱匿之兵數踰三萬九月改司徒為丞相以梁王肜為之肜固辭不受倫及諸子皆頑鄙無識秀狡黠貪淫黠下八翻所與共事者皆邪佞之士惟競榮利無遠謀深略志趣乖異互相憎嫉秀子會為射聲校尉形貌短陋如奴僕之下者秀使尚帝女河東公主史言倫秀兵已在頸乃圖非望元康九年冬十一月甲子立皇后羊氏赦天下后尚書郎泰山羊玄之之女也外祖平南將軍樂安孫旗與孫秀善故秀立之拜玄之光祿大夫特進散騎常侍封興晉侯晉志光祿大夫假銀章青綬者品秩第三加特進則品秩與左右光祿大夫同矣晉置興晉郡在唐河州界元康九年詔徵益州刺史趙廞為大長秋廞許今翻以成都內史中山耿滕為益州刺史晉諸王國置內史猶漢王國相也武帝太康九年改諸王國相為內史考異曰帝紀作耿勝載記華陽國志作滕今從之賈后之姻親也聞徵甚懼懼以賈后親黨連坐陰有據蜀之志乃傾倉廩賑流民以收衆心以李特兄弟材武其黨類皆巴西人與廞同郡李特黨類本巴氐趙廞亦巴西人也特等憑恃廞勢專聚衆為盜蜀人患之特等入蜀事始上卷元康八年流民剛剽蜀人愞弱數所角翻剽匹妙翻愞奴亂翻主不能制客必為亂階宜使還本居若留之險地蜀地阻險流民本居秦雍雍於用翻惡烏路翻州被詔書遣文武千餘人迎滕是時成都治少城益州治太城二城皆秦張儀所築儀既築太城後一年又築少城太城今成都府子城也少城唯西南北三壁東即太城之西墉也少詩照翻未去滕欲入州功曹陳恂諫曰今州郡搆怨日深州謂益州郡謂成都此言廞滕搆怨也不如留少城以觀其變檄諸縣合村保以備秦氐李特等本巴氐蜀人以其徙居秦州界因謂之秦氐陳西夷謂西夷校尉陳總也行至言總來領西夷校尉之職行且至成都也晉置西夷校尉於汶山平越中郎將於廣州南蠻校尉於襄陽南夷校尉於寧州不然退保犍為西渡江源以防非常江源縣漢屬蜀郡後李雄分立江源郡晉改為多融縣又改為晉原縣唐蜀州之晉原青城唐安三縣皆漢江源縣地犍居言翻是日帥衆入州帥讀曰率下同廞遣兵逆之戰于西門滕敗死考異曰華陽國志曰戰於廣漢宣化亭殺傳詔按州郡俱治成都不容戰於廣漢又趙廞若已與滕戰不應欲直入州今從載記惟陳恂面縛詣廞請滕死章甲十一行本死作喪乙十一行本同孔本同請其尸而葬之死讀曰尸廞義而許之廞又遣兵逆西夷校尉陳總總至江陽江陽縣漢屬犍為郡劉璋分江陽郡唐瀘州瀘川綿水二縣漢江陽之地也主簿蜀郡趙模曰今州郡不協必生大變當速行赴之府是兵要助順討逆言西夷府總蜀兵之要順謂耿滕逆謂趙廞使總助滕討廞也總更緣道停留比至南安魚涪津南安縣屬犍為郡有魚涪津唐眉州青神縣漢南安縣地宋白曰榮州應靈縣資官縣嘉州龍游皆漢安南縣比必寐翻涪音浮模白總散財募士以拒戰若克州軍則州可得言破廞軍則益州可取罪人斯得矣順流而退必無害也言順流而退廞軍勢不能追必無所害趙益州忿耿侯故殺之與吾無嫌何為如此兵臨其前猶發是言陳總特庸人耳今州起事必當殺君以立威雖不戰無益也言至垂涕總不聽衆遂自潰總逃草中模著總服格戰著陟略翻廞兵殺模見其非是更搜求得總殺之搜尋也考異曰帝紀廞又殺犍為太守李密汶山太守霍固按華陽國志犍為太守李苾汶山太守楊邠非密固也載記亦作李苾蓋紀誤廞自稱大都督大將軍益州牧考異曰晉春秋云建號太平元年他書無之今不取改易守令王官被召無敢不往王官謂晉朝所命者被皮義翻帥讀曰率楊正衡曰晶音精武帝泰始二年分扶風置始平郡費扶沸翻他徒河翻氐苻成隗伯等四千騎歸廞廞以庠為威寇將軍沈約志威寇將軍四十號之第七委以心膂使招合六郡壯勇至萬餘人以斷北道六郡即天水略陽等六郡壯勇流民之壯勇者北道自關中入蜀之道斷丁管翻王崇武標點容肇祖聶崇岐覆校
