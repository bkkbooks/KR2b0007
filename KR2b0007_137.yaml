body:
  text: 資治通鑑卷第一百三十七端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注齊紀三帝因謂明根等曰世祖武皇帝中永明八年庚午四九帝因謂明根等曰春正月詔放隔城俘二千餘人還魏拔隔城見上卷上年帝因謂明根等曰乙丑魏主如方山二月辛未如靈泉泉下當有池字壬申還宮帝因謂明根等曰地豆干頻寇魏邊北史曰地豆干國在室韋之西千餘里四月甲戌魏征西大將軍陽平王頤擊走之頤新城之子也新城當作新成見一百二十八卷宋孝武大明元年考異曰陽平王頤帝紀作熙又作賾今從本傳帝因謂明根等曰甲午魏遣兼員外散騎常侍邢産等來聘散悉亶翻騎奇寄翻帝因謂明根等曰五月己酉庫莫奚寇魏邊隋書庫莫奚東部胡之種為慕容氏所破遺落者竄匿松漠之間其俗甚為不潔而善射獵好寇鈔後單稱為奚魏高宗皇興二年置安州治方城領密雲廣陽安樂等郡將即亮翻帝因謂明根等曰秋七月辛丑以會稽太守安陸侯緬為雍州刺史緬鸞之弟也緬留心獄訟得劫皆赦遣許以自新再犯乃加誅劫謂劫盜也會工外翻緬彌兗翻雍於用翻帝因謂明根等曰癸卯大赦帝因謂明根等曰丙午魏主如方山丙辰遂如靈泉池八月丙寅朔還宮帝因謂明根等曰河南王度易侯卒乙酉以其世子伏連籌為秦河二州刺史考異曰齊書作世子休留成今從魏書且弔之伏連籌逼冠先使拜冠先不從伏連籌推冠先墜崖而死冠古玩翻推吐雷翻上厚賜其子雄敕以喪委絶域不可復尋復扶又翻仕進無嫌帝因謂明根等曰荊州刺史巴東王子響有勇力善騎射好武事自選帶仗左右六十人皆有膽幹騎奇寄翻好呼到翻帶仗左右使之帶器仗而衛左右因名至鎮數於內齋以牛酒犒之數所角翻犒苦到翻又私作錦袍絳襖欲以餉蠻交易器仗襖烏浩翻長史高平劉寅司馬安定席恭穆連名密啓上敕精檢言精加檢校也不見敕使疏吏翻召寅恭穆及咨議參軍江悆悆羊茹翻典籤吳修之魏景淵等詰之寅等祕而不言修之曰既已降敕政應方便答塞景淵曰應先檢校修之言方便答塞欲為子響道地也景淵言應先檢校欲依敕行之也塞悉則翻執寅等八人於後堂殺之具以啓聞上欲赦江悆聞皆已死怒壬辰以隨王子隆為荊州刺史上欲遣淮南太守戴僧靜將兵討子響將即亮翻僧靜面啓曰巴東王年少長史執之太急忿不思難故耳少詩照翻難乃旦翻天子兒過誤殺人有何大罪官忽遣軍西上上時掌翻人情惶懼無所不至僧靜不敢奉敕上不答而心善之不答而心善其言蓋天性所在而未敢橈國法也檢捕㣥小齋仗天子齋內精仗手也茹音如帥讀曰率子響若束手自歸可全其命以平南內史張欣泰為諧之副按齊書張欣泰傳時為南平內史當作南平今段之行勝既無名負成奇恥彼凶狡相聚所以為其用者或利賞逼威無由自潰若頓軍夏口宣示禍福可不戰而擒也夏戶雅翻諧之不從欣泰興世之子也張興世見一百三十一卷宋明帝泰始二年諧之等至江津築城燕尾洲燕尾洲在江津戍西江水至此北合靈溪水頻遣使與相聞曰天下豈有兒反身不作賊直是粗疏今便單舸還闕受殺人之罪使疏吏翻舸古我翻何築城見捉邪尹略獨答曰誰將汝反父人共語將引也灑泣揮淚也具酒饌餉臺軍饌雛戀翻又雛晥翻略棄之江流子響呼茹法亮法亮疑畏不肯往又求見傳詔法亮亦不遣且執録其使録收也使疏吏翻遣所養勇士收集州府兵二千人從靈溪西渡子響自與百餘人操萬鈞弩宿江隄上明日府州兵與臺軍戰子響於隄上發弩射之臺軍大敗尹略死諧之等單艇逃去操七刀翻射而亦翻艇待鼎翻小船也上又遣丹楊尹蕭順之將兵繼至將即亮翻子響即日將白衣左右三十人乘舴艋沿流赴建康舴艋亦小船也舴陟格翻艋莫幸翻順之之發建康也太子密諭順之使早為之所勿令得還子響見順之欲自申明順之不許於射堂縊殺之縊於賜翻又於計翻考異曰齊書曰子響部下恐懼各逃散子響乃白服出降詔賜死蓋蕭子顯為順之諱耳今從南史按順之梁武帝之父蕭子顯者仕梁朝而作齊書故通鑑言其為順之諱子響臨死啓上曰臣罪踰山海分甘斧鉞分扶問翻敕遣諧之等至竟無宣旨便建旗入津對城南岸築城守臣纍遣書信呼法亮乞白服相見法亮終不肯㣥小怖懼怖普布翻遂致攻戰此臣之罪也臣此月二十五日束身投軍希還天闕停宅一月希望也宅謂建康諸王宅也可使齊代無殺子之譏臣免逆父之謗既不遂心今便命盡臨啓哽塞知復何陳塞悉則翻復扶又翻有司奏絶子響屬籍屬籍宗屬之籍也今謂之玉牒易姓蛸氏蛸相邀翻與蕭音相近諸所連坐別下考論謂子響之黨當連坐者別行下考核論定其罪也下戶嫁翻久之上遊華林園見一猿透擲悲鳴問左右句斷猿子前日墜崖死上思子響因嗚咽流涕茹法亮頗為上所責怒蕭順之慙懼發疾而卒豫章王嶷表請收葬子響不許子響先嘗出繼嶷故以舊恩請收葬魚復縣時屬巴東郡應劭曰復音腹子響之亂方鎮皆啓子響為逆兗州刺史垣榮祖曰此非所宜言正應云劉寅等孤負恩奬逼迫巴東使至於此上省之以榮祖為知言省悉景翻臺軍焚燒江陵府舍官曹文書一時蕩盡上以大司馬記室南陽樂藹屢為本州僚佐引見問以西事見賢遍翻藹應對詳敏上悅用為荊州治中敕付以修復府州事藹繕修廨舍數百區廨古隘翻頃之咸畢而役不及民荊部稱之帝因謂明根等曰九月癸丑魏太皇太后馮氏殂高祖勺飲不入口者五日勺音酌挹抒之器也周禮考工記梓人為飲器勺一升哀毀過禮中部曹華陰楊椿諫曰據北史楊椿傳時為中部法曹華戶化翻陛下荷祖宗之業荷下可翻臨萬國之重豈可同匹夫之節以取僵仆僵居良翻㣥下惶灼莫知所言惶恐也遽也灼熱也毀不滅性孝經曰三日而食教民無以死傷生毀不滅性此聖人之政也楊椿此語説出魏孝文心事帝感其言為之一進粥為于偽翻於是諸王公皆詣闕上表請時定兆域兆域謂葬地從先帝之兆並太皇太后終制既葬公除公除者以天下為公而除服也自遭禍罰慌惚如昨慌乎往翻惚音忽鄭玄曰慌惚思念益深之時也奉侍梓宮猶希髣佛事死如事生猶冀髣佛見之也所未忍聞冬十月王公復上表固請復扶又翻詔曰山陵可依典册衰服之宜情所未忍謂未忍公除也衰讀與縗同倉回翻戊辰詔諸常從之具悉可停之從才用翻其武衛之官防侍如法法常法也不撤武衛備不虞也癸酉葬文明太皇太后于永固陵陵在方山不從金陵之兆甲戌帝謁陵王公固請公除詔曰比當別敘在心比並也並當別敘在心之所欲言比毗至翻己卯又謁陵庚辰帝出至思賢門右據魏紀太和元年起朱明思賢門蓋平城宮之南門也勞力到翻太尉丕等進言曰臣等以老朽之年歷奉纍聖國家舊事頗所知聞伏惟遠祖有大諱之日唯侍從梓宮者凶服從才用翻左右盡皆從吉四祖三宗因而無改四祖者高祖昭成帝太祖道武帝世祖太武帝顯祖獻文帝三宗者太宗明元帝恭宗景穆帝高宗文成帝哀毀過禮伏聞所御三食不滿半溢禮喪大記曰君之喪子食粥朝一溢米暮一溢米食之無算注云二十兩為一溢於粟米之法為米一升二十四分升之一孔穎達曰按律曆志黃鍾之律其實一籥律曆志合籥為合則二十四銖合重兩十合為一升升重十兩二十兩則米二升與此不同者但古稱有二法説左傳百二十斤為石則一斗十二斤為兩則一百九十二兩則一升為十九兩有奇今一兩為二十四銖則二十兩為四百八十銖計十九兩有奇為一升則總有四百六十銖八絫以成四百八十銖唯有十九銖二絫在是為米一升二十四分升之一此大略而言之陳言曰以紹興一升得漢五升喪服麻在首腰皆曰絰首絰象緇布冠腰絰象大帶絰之言實也衰之言摧也衰絰明中實摧痛也坐不安席願少抑至慕之情奉行先朝舊典朝直遙翻帝曰哀毀常事豈足關言朝夕食粥粗可支任粗坐五翻任音壬勝也堪也諸公何足憂怖怖普布翻祖宗情專武略未修文教朕今仰稟聖訓庶習古道論時比事又與先世不同太尉等國老政之所寄於典記舊式或所未悉典記謂經典傳記也其餘古今喪禮朕且以所懷別問尚書遊明根高閭等公可聽之遊明根高閭時以儒鳴故帝別與之言帝因謂明根等曰聖人制卒哭之禮授服之變皆奪情以漸禮親始死哭無時謂朝夕哭之外哀至則哭也既葬而虞既虞而卒哭自此朝夕之間哀至不哭猶朝夕哭三年之喪服斬衰期而小祥既祥而練再期而大祥既祥而禫又三月而除服卒子恤翻言及即吉特成傷理對曰臣等伏尋金册遺旨蓋以文明太后遺旨書之金册也葬而即吉故於下葬之初奏練除之事帝曰朕惟中代所以不遂三年之喪蓋由君上違世繼主初立君德未流臣義不洽故身襲袞冕行即位之禮朕誠不德在位過紀宋明帝泰始七年魏孝文受禪至是十九年此言在位過紀蓋以宋蒼梧王元徽四年顯祖方殂踰年改元太和至是十四年故云在位過紀十二年為一紀過古禾翻於此之時而不遂哀慕之心使情禮俱失深可痛恨高閭曰杜預晉之碩學論自古天子無有行三年之喪者以為漢文之制暗與古合雖叔世所行事可承踵是以臣等慺慺干請慺洛侯翻慺慺敬謹貌帝曰竊尋金册之旨所以奪臣子之心令早即吉者慮廢絶政事故也㣥公所請其志亦然朕今仰奉册令俯順㣥心不敢暗默不言以荒庶政暗音陰唯欲衰麻廢吉禮衰叱回翻下衰絰除衰從衰同朔望盡哀誠情在可許故專欲行之如杜預之論於孺慕之君諒暗之主蓋亦誣矣孺慕如孺子之慕父母也曹操為魏王置祕書令丞漢明德馬后保養章帝母子之道無可間然間古莧翻及后之崩葬不淹旬尋已從吉漢章帝建初四年六月癸丑明德皇后崩七月壬戌葬史不書公除之日此言葬不淹旬尋已從吉以漢文三十六日釋服之制推之也明德不損名願陛下遵金册遺令割哀從議帝曰朕所以眷戀衰絰不從所議者實情不能忍豈徒苟免嗤嫌而已哉衰倉回翻嗤充之翻今奉終儉素一已仰遵遺册但痛慕之心事繫於豫庶聖靈不奪至願耳高閭曰陛下既不除服於上臣等獨除服於下則為臣之道不足又親御衰麻復聽朝政復扶又翻朝直遙翻吉凶事雜臣竊為疑帝曰先后撫念㣥下卿等哀慕猶不忍除奈何令朕獨忍之於至親乎今朕逼於遺册唯望至期雖不盡禮蘊結差申㣥臣各以親疏貴賤遠近為除服之差庶幾稍近於古易行於今高閭曰昔王孫裸葬士安去棺其子皆從而不違近其靳翻易以豉翻去羌呂翻漢武帝時楊王孫家纍千金厚自奉養生無所不致及病且終先令其子曰吾欲裸葬以反吾真必無易吾志則為布囊盛尸入土七尺既下從足引脫其囊以身親土其子不忍往問其友人祁侯祁侯與之辨難往復而王孫終守其説祁侯曰善遂裸葬晉人皇甫謐字士安著論曰生不能保七尺之軀死何故隔一棺之土然則衣衾所以穢身棺槨所以隔真吾氣絶之後便即時服幅巾故衣以籧篨裹尸擇不毛之土穿坑下尸籧篨之外便以親土若不如此則冤悲沒世其子從之今親奉遺令而有所不從臣等所以頻煩干奏李彪曰三年不改其父之道可謂大孝引論語孔子之言恐涉改道之嫌帝曰王孫士安皆誨子以儉及其遵也豈異今日改父之道殆與此殊縱有所涉甘受後代之譏未忍今日之請㣥臣又言春秋蒸嘗事難廢闕禮曰喪三年不祭言帝若行三年之喪則宗廟之祭將至廢闕也自先朝以來恆有司行事朝直遙翻恆戶登翻朕賴蒙慈訓常親致敬今昊天降罰人神喪恃詩曰無母何恃喪息浪翻亦輟歆祀賴蜀本作想當從之否則賴字衍章十二行本正作想乙十一行本同孔本同張校同退齋校同歆尹今翻恐乖冥旨㣥臣又言古者葬而即吉不必終禮此乃二漢所以經綸治道魏晉所以綱理庶政也治直吏翻下同帝曰既葬即吉蓋季俗多亂權宜救世耳二漢之盛魏晉之興豈由簡略喪禮遺忘仁孝哉平日之時公卿每稱當今四海晏然禮樂日新可以參美唐虞比盛夏商夏戶雅翻及至今日即欲苦奪朕志使不踰於魏晉如此之意未解所由解戶買翻曉也李彪曰今雖治化清晏然江南有未賓之吳漠北有不臣之虜是以臣等猶懷不虞之慮虞防也魯公帶絰從戎據史記武王崩成王幼管蔡反淮夷徐戎起亦並興魯公伯禽征之時有武王之喪故帶絰從戎也春秋時晉文公卒未葬襄公墨衰絰以敗秦師于殽衰倉回翻敗補邁翻如有不虞雖越紼無嫌鄭玄曰越猶躐也紼輴車索孔穎達曰未葬之前屬紼於輴以備火災今既祭天地社稷須越躐此紼而往祭故云越紼紼音弗輴敕倫翻索悉各翻豈可於晏安之辰豫念軍旅之事以廢喪紀哉古人亦有稱王者除衰而諒暗終喪者暗音陰若不許朕衰服則當除衰拱默委政冢宰二事之中唯公卿所擇遊明根曰淵默不言則大政將曠仰順聖心請從衰服太尉丕曰臣與尉元歷事五帝明元太武文成獻文並孝文為五帝尉紆勿翻尤諱之後三月尤諱猶云大諱也尤甚也死者人之所甚諱也禳惡於北具行吉禮此魏初所用夷禮也禳如羊翻未之或改皇始道武帝年號若能以道事神不迎自至苟失仁義雖迎不來此乃平日所不當行言不當用夷禮朕在不言之地謂居喪諒陰三年不言也喋徒協翻喋喋多言也便語也但公卿執奪朕情遂成往復追用悲絶遂號慟㣥官亦哭而辭出號戶高翻初太后忌帝英敏恐不利於己欲廢之盛寒閉於空室絶其食三日召咸陽王禧將立之太尉東陽王丕尚書右僕射穆泰尚書李沖固諫乃止帝初無憾意唯深德丕等泰崇之玄孫也穆崇魏開國功臣又有宦者譖帝於太后太后杖帝數十帝默然受之不自申理及太后殂亦不復追問不復追問譖者為誰復扶又翻甲申魏主謁永固陵辛卯詔曰㣥官以萬機事重屢求聽政但哀慕纏綿未堪自力近侍先掌機衡者皆謀猷所寄且可委之如有疑事當時與論決帝因謂明根等曰交州刺史清河房法乘專好讀書常屬疾不治事好呼到翻屬之欲翻屬託也屬疾猶言託疾也治直之翻由是長史伏登之得亶權改易將吏不令法乘知將直亮翻下同録事房季文白之法乘大怒繫登之於獄十餘日登之厚賂法乘妹夫崔景叔得出因將部曲襲州襲州治也謂之曰使君既有疾不宜煩勞囚之別室法乘無事復就登之求書讀之復扶又翻登之曰使君靜處處昌呂翻猶恐動疾豈可看書遂不與乃啓法乘心疾動不任視事任音壬十一月乙卯以登之為交州刺史法乘還至嶺而卒嶺即大庾嶺也史言徒讀書而無政事者不足以當方任帝因謂明根等曰十二月己卯立皇子子建為湘東王帝因謂明根等曰初太祖以南方錢少更欲鑄錢建元末奉朝請孔顗上言少詩沼翻朝直遙翻顗魚豈翻考異曰齊紀作孔覬今從齊書南史以為食貨相通理勢自然李悝云糴甚貴傷民甚賤傷農甚賤甚貴其傷一也李悝魏文侯之師韋昭曰民謂士工商悝苦回翻國之關奧比歲時被水潦而糴不貴比毗至翻被皮義翻是天下錢少非穀賤此不可不察也鑄錢之弊在輕重屢變重錢患難用而難用為纍輕纍力瑞翻輕錢弊盜鑄而盜鑄為禍深民所以盜鑄嚴法不能禁者由上鑄錢惜銅愛工也惜銅愛工者意謂錢為無用之器以通交易務欲令質輕而數多使省工而易成易以豉翻不詳慮其為患也夫民之趨利如水走下用漢朝錯之言趨讀曰趣走音奏從以重刑是導其為非而陷之於死豈為政歟漢興鑄輕錢民巧偽者多至元狩中始懲其弊乃鑄五銖錢周郭其上下令不可磨取鋊漢初行半兩錢及莢錢一面有文一面漫民盜磨其漫面取其鋊以更鑄作錢元狩鑄五銖文漫兩面皆周匝為郭令不得磨取鋊鋊音浴銅屑也章十二行本而下有民字乙十一行本同孔本同計其費不能相償私鑄益少此不惜銅不愛工之效也少詩沼翻王者不患無銅乏工每令民不能競則盜鑄絶矣宋文帝鑄四銖至景和錢益輕雖有周郭而鎔冶不精於是盜鑄紛紜而起不可復禁此惜銅愛工之驗也復扶又翻凡鑄錢與其不衷寧重無輕不衷者不得輕重之中也歷五百餘年制度世有廢興而不變五銖者明其輕重可法得貨之宜故也按今錢文率皆五銖異錢時有耳異錢謂其文非五銖者又不禁民翦鑿為禍既博鍾弊于今豈不悲哉鍾聚也後經寇戎水火耗散沈鑠沈持林翻鑠書藥翻所失歲多譬猶磨礱砥礪不見其損有時而盡引漢枚乘之言錢竭則士農工商皆喪其業喪息浪翻民何以自存愚以為宜如舊制大興鎔鑄錢重五銖一依漢法若官鑄者已布於民便嚴斷翦鑿斷音短禁截也輕小破缺無周郭者悉不得行官錢細小者稱合銖兩稱尺證翻合音閣合少為多也銷以為大利貧良之民塞姦巧之路錢貨既均遠近若一百姓樂業市道無爭衣食滋殖矣塞悉則翻樂音洛太祖然之使諸州郡大市銅炭會晏駕事寢是歲益州行事劉悛上言悛七倫翻又丑緣翻蒙山下有嚴道銅山舊鑄錢處可以經略蒙山在今雅州嚴道縣南十里此即漢鄧通鑄錢舊處遣使入蜀鑄錢使疏吏翻頃之以功費多而止帝因謂明根等曰自太祖治黃籍至上謫巧者戍緣淮各十年百姓怨望事見上卷四年至上謂至武帝時治直之翻下同自宋升明以前皆聽復注聽復注籍也各許還本此後有犯嚴加翦治帝因謂明根等曰長沙威王晃卒諡法勇以果毅曰威帝因謂明根等曰吏部尚書王晏陳疾自解上欲以西昌侯鸞代晏領選手敕問之晏啓曰鸞清幹有餘然不諳百氏百氏百家氏族也自魏晉以來率以門地用人選須絹翻諳烏含翻上乃止帝因謂明根等曰以百濟王牟大為鎮東大將軍百濟王帝因謂明根等曰高車阿伏至羅及窮奇遣使如魏請為天子討除蠕蠕使疏吏翻為于偽翻蠕人兗翻魏主賜以繡袴褶及雜綵百匹褶音習九年辛未四九一春正月辛丑上祀南郊丁卯魏主始聽政於皇信東室自居馮太后之喪至是始聽政皇信東室蓋皇信堂之東室也詔太廟四時之祭薦宣皇帝起麥丏餅鴨起麥丏餅今北人能為之其餅浮軟以卷肉噉之亦謂之卷餅程大昌曰起麥丏餅入教麥丏中令鬆鬆然也教俗書作酵麥丏莫甸翻孟詵曰音郝肉羹也筍鴨卵高皇帝肉膾葅羹昭皇帝章十二行本帝作后乙十一行本同孔本同茗粣炙魚茗茶也本草曰茗苦茶郭璞曰早採者為茶晚採者為茗粣類篇云色責翻糝也又側革翻粽也南史虞悰作扁米粣蓋即今之饊子是也可以供茶炙之石翻上夢太祖謂己宋氏諸帝常在太廟從我求食可別為吾致祠為于偽翻乃命豫章王庾氏四時祠二帝二后於清溪故宅杜佑曰蕭齊之世有清溪宮後改為華林苑據卞彬傳清溪在臺城東宮又在清溪之東建康志曰吳大帝鑿通城北塹以泄玄武湖水發源於鍾山接於秦淮謂之清溪皆用家人禮臣光曰昔屈到嗜芰屈建去之以為不可以私欲干國之典屈九勿翻芰奇寄翻菱也去羌呂翻屈建屈到子也國語屈到嗜芰有疾召宗老而屬之曰祭我必以芰及祥宗老將薦芰屈建命去之曰祭典有之國君有牛享大夫有羊饋士有豚犬之奠庶人有魚炙之薦籩豆脯醢則上下共之不羞珍異不陳庶侈夫子不以其私欲干國之典遂不用況子為天子而以庶人之禮祭其父違禮甚矣衛成公欲祀相寧武子猶非之左傳僖三十一年狄圍衛衛遷于帝丘衛成公夢康叔謂己曰相奪豫享公命祀相寧武子不可曰鬼神非其族類不歆其祀鄫何事相之不享於此久矣非衛之罪也不可以間成王周公之命祀請改祀命相息亮翻使庶婦尸之乎豫章王嶷與帝同母帝為嫡故通鑑以嶷為庶婦尸主也初魏主召吐谷渾王伏連籌入朝伏連籌辭疾不至輒修洮陽泥和二城置戍兵焉後周武帝逐吐谷渾置洮陽郡唐洮州及臨潭縣所治即洮陽城也泥和即水經注所謂迷和城洮水徑其南又在洮陽城東宋白曰洮州臨洮郡郡城本名洮陽在洮水之北乃吐谷渾所築南臨洮水極峻險今謂之洪和城吐從暾入聲谷音浴洮土刀翻乙亥魏枹罕鎮將長孫百年請擊二戍魏枹罕鎮將帶河州刺史枹音膚將即亮翻長知兩翻散騎常侍裴昭明散騎侍郎謝竣如魏弔散悉亶翻騎奇寄翻竣七倫翻又丑緣翻欲以朝服行事朝直遙翻下同魏主客曰弔有常禮何得以朱衣入凶庭昭明等曰受命本朝不敢輒易往返數四昭明等固執不可魏主命尚書李沖選學識之士與之言沖奏遣著作郎上谷成淹昭明等曰魏朝不聽使者朝服出何典禮淹曰吉凶不相厭厭於葉翻羔裘玄冠不以弔論語記孔子容止有是言稚直利翻昔季孫如晉求遭喪之禮以行左傳文六年季文子將聘于晉使求遭喪之禮以行其人曰將焉用之文子曰備豫不虞古之善教也求而無之實難過求何害方問出何典禮行人得失何其遠哉昭明曰二國之禮應相準望準揆平之物又其義擬也倣也對看為望月有弦望後漢律曆志分天之中相與為衡謂之望謂月望日月正相對其平如衡準望之言義取諸此魏遣李彪來弔初不素服齊朝亦不以為疑帝即位之初魏遣彪來聘非弔也昭明欲以是抗止淹耳要讀曰邀淹曰齊不能行亮陰之禮踰月即吉彪奉使之日齊之君臣鳴玉盈庭貂璫曜目漢制侍中常侍之冠加黃金璫貂尾以飾之晉宋以後王公皆冠貂蟬使疏吏翻敢獨以素服廁其間乎皇帝仁孝侔於有虞執親之喪居廬食粥豈得以此方彼乎昭明曰三王不同禮孰能知其得失淹曰然則虞舜高宗皆非邪昭明竣相顧而笑曰非孝者無親孝經之言乃曰使人之來唯齎袴褶此既戎服不可以弔晉志曰袴褶之制未詳所起近世凡車駕親戎中外戒嚴服之服無定色使疏吏翻褶音習然違本朝之命返必獲罪淹曰使彼有君子卿將命得宜且有厚賞若無君子卿出而光國得罪何傷自當有良史書之乃以衣帢給昭明等帢苦洽翻使服以致命己丑引昭明等入見文武皆哭盡哀魏主嘉淹之敏遷侍郎考異曰楊松玠談藪作朱淹又云自著作郎遷著佐郎今從魏書昭明駰之子也裴駰松之之子注史記行于世駰音因始興簡王鑑卒三月甲辰魏主謁永固陵夏四月癸亥朔設薦於太和廟太和廟據北史作太和殿水經注太和殿在太極殿東堂之東魏書帝紀太和元年起太和安昌二殿追感哀哭終日不飯侍中馮誕等諫經宿乃飯甲子罷朝夕哭蓋亦不能及期矣飯扶晚翻乙丑復謁永固陵復扶又翻魏自正月不雨至于癸酉有司請祈百神帝曰成湯遭旱以至誠致雨謂湯以六事自責也今普天喪恃喪息浪翻幽顯同哀何宜四氣未周謂一期而四時之氣始周唯當責躬以待天譴譴去戰翻甲戌魏員外散騎常侍李彪等來聘為之置燕設樂為于偽翻彪辭樂且曰主上孝思罔極興墜正失言行喪禮興百王之墜典而正其失也朝臣始除衰絰猶以素服從事朝直遙翻衰吐回翻是以使臣不敢承奏樂之賜朝廷從之彪凡六奉使據魏紀上即位之初年至三年彪凡四來聘是年再聘通前凡六使疏吏翻將還上親送至琅邪城命㣥臣賦詩以寵之左傳晉趙武自宋還過鄭鄭伯享之于垂隴七穆皆從趙孟曰七子從君以寵武也請皆賦詩以卒君貺己卯魏作明堂改營太廟五月己亥魏主更定律令於東明觀魏主太和四年起東明觀觀古玩翻更工行翻命李沖議定輕重潤色辭旨帝執筆書之李沖忠勤明斷加以慎密為帝所委情義無間斷丁亂翻舊臣貴戚莫不心服中外推之乙卯魏長孫百年攻洮陽泥和二戍克之俘三千餘人丙辰魏初造五輅五輅玉金象革木也六月甲戌以尚書左僕射王奐為雍州刺史為後誅奐張本雍於用翻丁未魏濟陰王鬱以貪殘賜死齊子禮翻秋閏七月乙丑魏主謁永固陵己卯魏主詔曰烈祖有創業之功世祖有開拓之德宜為祖宗百世不遷平文之功少於昭成而廟號太祖道武帝天興初追尊平文帝為太祖少詩沼翻而廟號烈祖明元帝追尊道武帝為烈祖朕今奉尊烈祖為太祖以世祖顯祖為二祧鄭玄曰廟之為言貌也宗廟者先祖之尊貌也祧之言超也超上去意也八月壬辰又詔議養老及禋于六宗之禮尚書禋于六宗而諸儒互説不同王莽以易六子遂立六宗祠王肅亦以為易六子摯虞以為月令孟冬天子祈來年于天宗天宗六宗之神也劉邵以為萬物負陰而抱陽沖氣以為和六宗者太極沖和之氣為六氣之宗者也虞書謂之六宗周書謂之天宗孔穎達曰王肅六宗之説用家語之文以四時也寒暑也日也月也水旱也為六宗孔注尚書同之伏生與馬融以天地四時為六宗劉歆孔朝以乾坤之子六為六宗賈逵以為天宗三日月星也地宗三河海岱也今尚書歐陽夏侯説六宗者上及天下及地旁及四方中央恍惚助陰陽變化有益於人者也古尚書説天宗日月北辰地宗岱河海也日月為陰陽宗北辰為星宗河為水宗岱為山宗海為澤宗鄭玄以星也辰也司中也司命也風師也雨師也為六宗虞喜別論曰地有五色太社象之總五為一則成六六為地數推校經傳別無他祭也劉昭以為此説近得其實張髦曰父祖之廟六宗即三昭三穆也魏文帝以天皇太帝五帝為六宗杜佑取之鄭氏曰禋之言煙周人尚臭煙氣之臭聞者魏常以正月吉日於朝廷設幕中置松柏樹設五帝座而祠之先悉薦翻又有探策之祭帝皆以為非禮罷之戊戌移道壇於桑乾之陰改曰崇虛寺此即寇謙之道壇也探吐南翻乾音干乙巳帝引見㣥臣見賢遍翻問以禘祫王鄭之義是非安在考異曰禮志作太和十三年五月壬戌今從本紀中書監高閭等從王詔圜丘宗廟皆有禘名從鄭禘祫並為一祭從王著之於令記大傳曰禮不王不禘王者禘其祖之所自出以其祖配之鄭氏注曰凡大祭曰禘大祭其先祖所由生謂郊祀天也王者之先皆感太微五帝之精以生皆用正歲之正月郊祭之又祭法言虞夏殷周禘郊祖宗之法鄭注云禘郊祖宗謂祭祀以配食也此禘謂祭昊天於圜丘也孔穎達曰王肅論引賈逵説吉禘于莊公禘者遞也審諦昭穆遷主遞位孫居王父之處又引禘于太廟逸禮昭尸穆尸其祝辭總稱孝子孝孫則是父子並列逸禮又云皆升合於太祖所以劉歆賈逵鄭衆馬融等皆以為然鄭不從者以公羊傳為正逸禮不可用也左氏説及杜元凱皆以為禘三年一大祭在太祖之廟傳無祫文然則祫即禘也取其序昭穆謂之禘取其合集㣥祖謂之祫杜佑通典孝文帝太和十三年詔鄭玄云天子祭員丘曰禘宗廟大祭亦曰禘三年一祫五年一禘祫則毀廟㣥廟之主於太祖廟合而祭之禘則增及百官配食者審諦而祭之魯禮三年喪畢而祫明年而禘員丘宗廟大祭俱稱禘祭有兩禘明也王肅又云天子諸侯皆禘於宗廟非祭天之祭郊祀后稷不稱禘禘祫一名也合祭故稱祫禘而審諦之故稱禘非兩祭之名三年一祫五年一禘總而互舉故稱五年再殷祭不言一禘一祫斷可知矣諸儒之説大略如是公卿可議其是非尚書遊明根言曰鄭氏之義禘者大祭之名大祭員丘謂之禘者審諦五精星辰也大祭宗廟謂之禘者審諦其昭穆百官也員丘常合不言祫宗廟時合故言祫斯則宗廟祫禘並行員丘一禘而已宜於宗廟俱行禘祫之禮二禮異故名殊依禮春祭特礿於嘗於蒸則祫嘗祫蒸不於三時皆行禘祫之禮中書監高閭又言禘祭員丘與鄭義同者以為有虞氏禘黃帝黃帝非虞在廟之帝不在廟非員丘而何又大傳云祖其所自出之祖又非在廟之文論語稱禘自既灌以往據爾雅禘大祭也諸侯無禘禮惟夏祭稱禘又非宗廟之禘魯行天子之儀不敢專行員丘之禘改殷之禘取其禘名於宗廟因先有祫遂生兩名其宗廟禘祫之祭據王氏之義祫而禘禘止於一時一時者祭不欲數一歲三禘為過數詔曰明根閭等據二家之義論禘祫詳矣至於事取折衷猶有未允閭以禘祫為名義同王氏禘祭員丘事與鄭同無所間然明根以鄭氏等兩名兩祭並存並用理有未俱稱據二義一時禘祫而闕二時之禘事有難從先王制禮內緣人子之情外協尊卑之序故天子七廟數盡則毀藏主於太祖之廟三年而祫祭之世盡則毀以示有終之義三年而祫以申追遠之情禘祫既是一祭分而兩之事無所據毀廟三年一祫又有不盡四時於禮為闕七廟四時常祭祫則三年一祭而又不究四時於情為簡王以祫為一祭於義為長鄭以員丘為禘與宗廟大祭同名義亦為當今互取鄭王二義禘祫並為一祭從王禘是祭員丘大祭之名上下同用從鄭若以數則瀆五年一禘改祫從禘五年一禘則四時盡禘以稱今情則旅天禮文先禘而後時祭便即施行著之於令永為世法戊午又詔國家饗祀諸神凡一千二百餘處今欲減省㣥祀務從簡約又詔明堂太廟配祭配享於斯備矣白登崞山雞鳴山廟唯遣有司行事明元帝永興四年立宣武廟於白登山歲一祭無常月神瑞二年帝又立宣武廟於白登西宣武帝至泰常五年始改諡道武水經注曰雞鳴山在廣寧郡下洛縣于延水北昔趙襄子殺代王於夏屋而並其土襄子之姊代王夫人也遂磨筓自殺代人憐之為立祠因名為磨筓山每夜有野雞㣥鳴於祠屋上故亦名為鳴雞山文成帝保母常氏葬於是山別立寢廟太武帝保母竇氏葬崞山別立寢廟崞音郭宜敕雍州以時供祭馮宣王太后父朗也為秦雍二州刺史生后於長安後諡文宣王因立廟長安雍於用翻先有水火之神四十餘名及城北星神今圜丘之下既祭風伯雨師司中司命鄭衆曰風師箕也雨師畢也司中三台三階也司命文昌宮星玄曰司中司命文昌第五第四星或曰中台上台也鄭氏曰中霤猶中室也古者復穴是以名室為霤音力又翻甲寅詔曰近論朝日夕月三代之禮春朝朝日秋暮夕月朝直遙翻下同然月有餘閏行無常準若一依分日或值月於東而行禮於西序情即理不可施行昔祕書監薛謂等以為朝日以朔夕月以朏日月所會謂之合朔月生明謂之朏月之三日也朏敷尾翻何者為是尚書遊明根等請用朔朏從之丙辰魏有司上言求卜祥日此小祥也筮日求吉既乖敬事之志又違永慕之心今直用晦日九月丁丑夜帝宿於廟帥㣥臣哭已已畢也帥讀曰率侍臣易服黑介幘隋志幘尊卑貴賤皆服之文者長耳謂之介幘武者短耳謂之平上幘各稱其冠而制之縞古老翻遂哭盡乙夜戊子晦帝易祭服縞冠素紕紕匹毗翻又必二翻又扶規翻冠飾也緣也白布深衣記曰古者深衣蓋有制度以應規矩繩權衡短毋見膚長毋被土續衽鉤邊要縫半下袼之高下可以運肘袂之長短反詘之及肘帶下毋厭髀上毋厭脅當無骨者制十有二幅以應十二月袂圓以應規曲夾如矩以應方負繩及踝以應直下齊如權衡以應平故聖人服之先王貴之侍臣去幘易帢辨缺四隅謂之帢傅子曰帢先未有歧荀文若巾觸樹成歧時人慕之因而弗改今通為慶弔之服白紗為之或單或夾去羌呂翻出廟帝立哭久之乃還還從宣翻又如字下同冬十月魏明堂太廟成庚寅魏主謁永固陵毀瘠猶甚穆章十二行本穆上有司空二字乙十一行本同孔本同亮諫曰陛下祥練已闋號慕如始古者既祥而練闋古穴翻終也説文曰闋事已也號戶刀翻如始言如初有喪為萬民父母未有子過哀而父母不戚父母憂而子獨悅豫者也今和氣不應風旱為災願陛下襲輕服御常膳鑾輿時動咸秩百神秩者序而祭之詔曰孝悌之至無所不通今飄風旱氣皆誠慕未濃幽顯無感也所言過哀之咎諒為未衷衷善也正也適也己未朔魏主禫於太和廟禫徒感翻除服之祭也袞冕以祭既而服黑介幘素紗深衣拜陵而還癸亥冬至魏主祀圜丘遂祀明堂還至太和廟乃入甲子臨太華殿服通天冠絳紗袍以饗㣥臣劉昭曰通天冠高九寸正豎頂少邪乃直下為鐵卷梁前有山展筒為述乘輿所常服也杜佑曰秦制通天冠其狀遺失漢因秦名制高九寸正豎頂少邪乃直下為鐵卷梁前有山展筒為述駮犀簪導乘輿所常服晉因漢制前加金博山述述即鷸也鷸知天雨故冠像焉前有展筒宋因之又加黑介幘東昏侯改用玉簪導梁武帝因之復加冕於其上謂之平天冕隋因之加金博山附蟬十二首施珠翠黑介幘玉簪導唐因之其纓改以翠緌縣讀曰懸丁卯服袞冕辭太和廟帥百官奉神主遷于新廟新作太廟成故遷主新廟帥讀曰率乙亥魏大定官品戊戌嚴戌改寅考諸牧守守式又翻魏假通直散騎常侍李彪等來聘魏舊制㣥臣季冬朝賀服袴褶行事謂之小歲朝直遙翻褶音習丙戌詔罷之十二月壬辰魏遷社於內城之西魏以安定王休為太傅齊郡王簡為太保高麗王璉卒壽百餘歲麗力知翻魏主為之制素委貌布深衣為于偽翻委貌冠長七寸高四寸制如覆杯前高廣後卑鋭所謂夏之毋追殷之章甫者也本以皂絹為之今制素者以舉哀舉哀於東郊遣謁者僕射李安上策贈太傅諡曰康孫雲嗣立乙酉嚴乙改己魏主始迎春於東郊自是四時迎氣皆親之初魏世祖克統萬及姑臧獲雅樂器服工人宋文帝元嘉四年魏克統萬十六年克姑臧晉永嘉之亂太常樂工多避地河西夏克長安獲秦雅樂故二國有其器服工人其後纍朝無留意者朝直遙翻音制多亡高祖始命有司訪民間曉音律者議定雅樂當時無能知者然金石羽旄之飾稍壯麗於往時矣辛亥詔簡置樂官使修其職又命中書監高閭參定初晉張斐杜預共注律三十卷自泰始以來用之此晉泰始也或一章之中兩家所處生殺頓異處昌呂翻臨時斟酌吏得為姦上留心法令詔獄官詳正舊注七年尚書刪定郎王植集定二注表奏之魏晉以來尚書諸曹無刪定郎此蓋刪定律注而置官竟陵王子良總其事衆議異同不能一者制旨平決是歲書成廷尉山陰孔稚圭上表以為律文雖定苟用失其平則法書徒明於帙裏帙與帙同竊尋古之名流多有法學今之士子莫肯為業縱有習者世議所輕將恐此書永淪走吏之手矣今若置律助教依五經例國子生有欲讀者策試高第即加擢用以補內外之官庶幾士流有所勸慕幾居希翻詔從其請事竟不行初林邑王范陽邁世相承襲范陽邁見一百二十四卷宋文帝元嘉二十三年遣使獻金簟等物詔以當根純為都督緣海諸軍事林邑王為下范諸農攻當根純張本使疏吏翻魏冀州刺史咸陽王禧入朝朝直遙翻有司奏冀州民三千人稱禧清明有惠政請世胙冀州魏主詔曰利建雖古未必今宜易曰利建侯理非下請周禮惟王建國辨方正位體國經野鄭玄注云經謂為之里數初魏文明太后寵任宦者略陽苻承祖官至侍中知都曹事知尚書都曹事也太后殂承祖坐贓應死魏主原之削職禁錮於家仍除悖義將軍封佞濁子悖蒲內翻月餘而卒承祖方用事親姻爭趨附以求利趨七喻翻其從母楊氏為姚氏婦從母即姨也從才用翻常謂承祖之母曰姊雖有一時之榮不若妹有無憂之樂樂音洛姊與之衣服多不受強與之強其兩翻下強使同則曰我夫家世貧美衣服使人不安不得已或受而埋之與之奴婢則曰我家無食不能飼也常著弊衣自執勞苦飼祥吏翻著則略翻承祖遣車迎之不肯起強使人抱置車上則大哭曰爾欲殺我由是苻氏內外號為癡姨及承祖敗有司執其二姨至殿廷其一姨伏法帝見姚氏姨貧弊特赦之李惠之誅也事見一百三十四卷宋順帝升明二年魏孝文諡其母李貴人曰思皇后長樂坐不軌誅事見一百三十五卷高帝建元元年從才用翻樂皆音洛鳳子安祖等四人逃匿獲免遇赦乃出既而魏主訪舅氏存者得安祖等皆封侯加將軍既而引見謂曰卿之先世再獲罪於時先世謂惠及鳳見賢遍翻由外戚而舉者季世之法也卿等既無異能且可還家自今外戚無能者視此後又例降爵為伯去其軍號軍號將軍之號也去羌呂翻待李氏太薄太常高閭嘗以為言帝不聽及世宗尊寵外家乃以安祖弟興祖為中山太守追贈李惠開府儀同三司中山公諡曰莊十年壬申四九二魏主命㣥臣議行次春正月戊午朔魏主朝饗㣥臣於太華殿懸而不樂魏主命㣥臣議行次己未魏主宗祀顯祖於明堂以配上帝遂登靈臺以觀雲物降居青陽左個布政事鄭氏曰青陽左個大寢東堂北偏散騎常侍庾蓽等聘於魏魏主使侍郎成淹引蓽等於館南瞻望行禮祀明堂登靈臺之禮辛酉魏始以太祖配南郊魏主命㣥臣議行次魏主命㣥臣議行次五行之次也以為帝王莫不以中原為正統不以世數為與奪善惡為是非故桀紂至虐不廢夏商之曆厲惠至昏無害周晉之録晉承魏為金趙承晉為水燕承趙為木秦承燕為火秦之既亡魏乃稱制玄朔且魏之得姓出於軒轅魏書曰魏之先出自黃帝軒轅氏黃帝子昌意受封北國有大鮮卑山因以為號據史記以胸奴為夏后氏苗裔蓋有此理按魏書帝紀道武天興元年㣥臣奏國家承黃帝之後宜為土德高閭蓋申前議耳以為神元與晉武往來通好至于桓穆志輔晉室事並見晉紀神元力微也桓帝猗色穆帝猗盧好呼到翻河南郡河南縣周之王城即郟鄏也郟古洽翻鄏音辱昔秦並天下漢猶比之共工卒繼周為火德漢律曆志曰祭典曰共工氏霸九域言雖有水德在火木之間非其序也任智刑以強故霸而不王秦以水德在周漢木火之間周人遷其行序故易不載卒子恤翻共讀曰恭地褊世促魏承其弊豈可捨晉而為土邪司空穆亮等皆請從彪等議壬戌詔承晉為水德祖申臘辰考異曰禮志太和十五年正月穆亮等言云云按帝紀十六年正月壬戌詔定行次以水承金蓋志誤以六為五耳魏主命㣥臣議行次甲子魏罷租課租課李延壽魏紀作袒裸魏主命㣥臣議行次魏宗室及功臣子孫封王者衆乙丑詔自非烈祖之胄餘王皆降為公公降為侯而品如舊蠻王桓誕亦降為公唯上黨王長孫觀以其祖有大功特不降長孫道生以功封上黨王長知兩翻加號宋王昶丑兩翻魏主命㣥臣議行次魏舊制四時祭廟皆用中節丙子詔始用孟月擇日而祭自漢以來宗廟歲五祀四孟及臘是也魏初用中節夷禮也魏主命㣥臣議行次以竟陵王子良領尚書令魏主命㣥臣議行次魏主毀太華殿為太極殿戊章十二行本戊上有二月二字乙十一行本同孔本同子徙居永樂宮魏主太和元年起永樂遊觀于平城之北苑樂音洛以尚書李沖領將作大匠與司空穆亮共營之魏主命㣥臣議行次辛卯魏罷寒食饗舊傳冬至後一百五日為寒食初學記曰周舉移書魏武明罰令陸翽鄴中記並云寒食斷火起於介子推然周禮司烜氏仲春以木鐸徇火禁於國中注云為仲春將出火今寒食準節氣是仲春之末清明是三月之初然則禁火並周制也魏先以寒食饗祖宗今以其非禮罷之甲午魏主始朝日于東郊自是朝日夕月皆親之朝直遙翻丁酉詔祀堯於平陽舜於廣寧禹於安邑周公於洛陽皆因其故都而祀之皇甫謐曰舜所都或言蒲阪或言潘潘今上谷也廣寧縣本屬上谷又據水經注潘當作瀵守式又翻其宣尼之廟祀於中書省丁未改諡宣尼曰文聖尼父帝親行拜祭魏舊制每歲祀天於西郊魏主與公卿從二千餘騎戎服繞壇謂之踏壇騎奇寄翻踏與踏同明日復戎服登壇致祀已又繞壇謂之繞天蕭子顯曰戎服繞壇魏主一周公卿七匝謂之踏壇明日復戎服登壇祠天魏主繞三匝公卿七匝謂之繞天復扶又翻癸酉詔盡省之魏主命㣥臣議行次辛巳魏以高麗王雲為督遼海諸軍事遼東公高句麗王詔雲遣其世子入朝句如字又音駒麗力智翻雲辭以疾遣其從叔升干隨使者詣平城從才用翻魏主命㣥臣議行次夏四月丁亥朔魏班新律令大赦魏主命㣥臣議行次辛丑豫章文獻王嶷卒嶷魚力翻贈假黃鉞都督中外諸軍事丞相喪禮皆如漢東平獻王故事嶷性仁謹廉儉不以財賄為事齋庫失火齋庫齋內之庫高祖建元二年嶷自荊州還為揚州評直論量其所直也疾篤遺令諸子曰才有優劣位有通塞運有貧富此自然之理無足以相陵侮也蓋欲諸子不以位勢相陵塞悉則翻久之語及嶷猶欷歔流涕欷音希又許氣翻歔音虛嶷卒之日第庫無見錢見賢遍翻上敕月給嶷第錢百萬終上之世乃省魏主命㣥臣議行次五月己巳以竟陵王子良為揚州刺史魏主命㣥臣議行次魏文明太后之喪使人告于吐谷渾吐谷渾王伏連籌拜命不恭吐從暾入聲谷音浴魏主不許又請還其貢物帝曰貢物乃人臣之禮今而不受是棄絶之彼雖欲自新其路無由矣因命歸洮陽泥和之俘去年長孫百年所俘秋七月庚申吐谷渾遣其世子賀虜頭入朝于魏朝直遙翻下同考異曰魏吐谷渾傳作賀魯頭今從帝紀詔以伏連籌為都督西垂諸軍事西海公吐谷渾王遣兼員外散騎常侍張禮使於吐谷渾伏連籌謂禮曰曩者宕昌常自稱名而見謂為大王今忽稱僕又拘執使人欲使偏師往問何如禮曰君與宕昌皆為魏藩比輒興兵攻之殊違臣節使疏吏翻宕徒浪翻比毗至翻離京師之日宰輔有言以為君能自知其過則藩業可保離力智翻謂可保藩臣之業也若其不悛禍難將至矣悛丑緣翻難乃旦翻伏連籌默然魏主命㣥臣議行次甲戌魏遣兼員外散騎常侍廣平宋辨等來聘及還魏主問辨江南何如辨曰蕭氏父子無大功於天下既以逆取不能順守政令苛碎賦役繁重朝無股肱之臣野有愁怨之民其得沒身幸矣非貽厥孫謀之道也魏主命㣥臣議行次八月乙未魏以懷朔鎮將陽平王頤鎮北大將軍陸睿皆為都督督十二將步騎十萬分為三道以擊柔然鎮將二將即亮翻騎奇寄翻考異曰魏帝紀太和十一年八月壬申蠕蠕犯塞遣平原王陸睿討之事具蠕蠕傳十六年八月乙未詔陽平王頤左僕射陸睿討蠕蠕按蠕蠕傳無十一年犯塞及征討事唯有十六年八月頤睿出征事與紀合蓋十一年紀誤也中道出黑山東道趣士盧河西道趣侯延河軍過大磧大破柔然而還趣七喻翻磧七迹翻魏主命㣥臣議行次初柔然伏名敦可汗可從刊入聲汗音寒伏名敦屢敗那蓋屢勝國人以那蓋為得天助乃殺伏名敦而立那蓋號候其伏代庫者可汗魏收曰魏言悅樂也章十二行本太作大乙十一行本同孔本同安魏主命㣥臣議行次魏司徒尉元大鴻臚卿遊明根纍表請老魏主許之引見尉紆勿翻臚陵如翻見賢遍翻賜元玄冠素衣石渠論玄冠朝服戴聖曰玄冠委貌也今此則玄冠委貌異制及被服雜物等而遣之魏主親養三老五更於明堂己酉詔以元為三老明根為五更帝再拜三老親袒割牲執爵而饋肅拜五更周禮九拜九曰肅拜鄭司農云肅拜但俯下手今時撎是也陸德明曰撎於至翻即今之揖更工衡翻元明根勸以孝友化民又養庶老國老於階下禮畢各賜元明根以步挽車及衣服步挽車不用牛馬使人步挽之五更以元卿元卿即上卿魏主命㣥臣議行次九月甲寅魏主序昭穆於明堂昭之招翻祀文明太后於玄室玄室北史作玄堂鄭玄曰玄堂北堂也辛未魏主以文明太后再期哭於永固陵左終日不輟聲凡二日不食甲戌辭陵還永樂宮魏主命㣥臣議行次武興氐王楊集始寇漢中至白馬梁州刺史陰智伯遣軍主桓盧奴陰沖昌嚴沖昌改仲昌等擊破之俘斬數千人集始走還武興請降于魏辛巳入朝于魏降戶江翻朝直遙翻魏以集始為南秦州刺史漢中郡侯武興王魏主命㣥臣議行次冬十月甲午上殷祭太廟殷祭大祭也魏主命㣥臣議行次庚戌魏以安定王休為大司馬特進馮誕為司徒誕熙之子也馮熙見一百三十二卷宋順帝升明元年熙文明后之兄也魏主命㣥臣議行次魏太極殿成魏主命㣥臣議行次十二月司徒參軍蕭琛范雲聘於魏琛丑林翻魏主甚重齊人親與談論顧謂㣥臣曰江南多好臣侍臣李元凱對曰江南多好臣歲一易主江北無好臣百年一易主魏主甚慙魏主命㣥臣議行次上使太子家令沈約撰宋書疑立袁粲傳審之於上傳直戀翻上曰袁粲自是宋室忠臣此人心之公是非不可泯者上曰孝武事迹不容頓爾我昔經事明帝卿可思諱惡之義春秋之義為尊者諱魏主命㣥臣議行次是歲林邑王范陽邁之孫諸農帥種人攻范當根純復得其國范當根純奪林邑國事見上年帥讀曰率種章勇翻復扶又翻魏主命㣥臣議行次魏南陽公鄭羲與李沖婚姻沖引為中書令出為西兗州刺史西兗州時治滑臺文明太后為魏主納其女為嬪后為于偽翻嬪毗賓翻徵為祕書監及卒尚書奏諡曰宣詔曰蓋棺定諡激揚清濁故何曾雖孝良史載其繆醜事見八十卷晉武帝咸寧四年直士謂之荒公事見八十一卷晉武帝太康三年諡法昏亂紀度曰荒而治闕廉清治直吏翻尚書何乃情違至公愆違明典依諡法博聞多見曰文不勤成名曰靈可贈以本官加諡文靈聶崇岐標點王崇武覆校
