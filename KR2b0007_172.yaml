body:
  text: 資治通鑑卷第一百七十二端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注陳紀六高宗宣皇帝中之上太建七年太建七年乙未五七五太建七年春正月辛未上祀南郊太建七年癸酉周主如同州太建七年乙亥左衛將軍樊毅克潼州五代志下邳郡夏丘縣梁後齊置潼州治取慮城潼音童太建七年齊主還鄴去年二月齊主如晉陽討思好尋已還鄴八月復如晉陽今還太建七年辛巳上祀北郊陳制亦以間歲正月上辛用特牛一祀天地於南北二郊間歲者一歲祀南郊一歲祀北郊也太建七年二月丙戌朔日有食之太建七年戊申樊毅克下邳高柵等六城地形志下邳郡有柵淵縣武定八年分宿豫置柵楚格翻太建七年齊主言語澀訥不喜見朝士自非寵私昵狎未嘗交語澀色立翻不滑順也訥女劣翻聲不出也趙文子其言訥訥不能出諸口喜許既翻朝直遙翻昵尼質翻性懦不堪人視所謂弱顏也懦乃臥翻又奴亂翻令尚書令録録尚書事皆略陳大指驚走而出承世祖奢泰之餘齊主之父廟號世祖後宮皆寶衣玉食一裙之費至直萬匹競為新巧朝衣夕弊朝衣於既翻盛修宮苑窮極壯麗所好不常數毀又復好呼到翻下同數所角翻百工土木無時休息夜則然火照作寒則以湯為泥鑿晉陽西山為大像一夜然油萬盆光照宮中晉陽宮也不自貶損唯多設齋以為修德後之有天下者可以鑒矣為無愁之曲近侍和之者以百數民間謂之無愁天子五代志帝倚絃而歌別採新聲為無愁曲音韻窈窕極於哀思使胡兒閹宦輩齊唱和之曲終樂闋無不殞涕雖行幸道路或時馬上奏之樂往哀來竟以亡國和戶臥翻於華林園鄴都有華林園華如字帝自衣藍縷之服行乞其間以為樂衣服穿弊如懸鶉者為藍縷衣於既翻下人衣同樂盧各翻使人衣黑衣攻之帝自帥內參拒鬬寫築者寫諸城之形而築以象之黑衣者象周之戎衣內參者諸閹宦也帥讀曰率寵任陸令萱穆提婆高阿那肱韓長鸞等宰制朝政宦官鄧長顒陳德信胡兒何洪珍等並參預機權朝直遙翻顒魚容翻各引親黨超居顯位官由財進獄以賄成競為姦諂蠹政害民舊蒼頭劉桃枝等皆開府封王其餘宦官胡兒歌舞人見鬼人官奴婢等濫得富貴者殆將萬數庶姓封王者以百數開府千餘人儀同無數領軍一時至二十人侍中中常侍數十人乃至狗馬及鷹亦有儀同郡君之號有鬬雞號開府皆食其幹祿魏齊官制凡祿各以品秩為差官一品每歲祿八百匹二百匹為一秩從一品七百匹一百七十五匹為一秩二品六百匹一百五十匹為一秩從二品五百匹一百二十五匹為一秩三品四百匹一百匹為一秩從三品三百匹七十五匹為一秩四品二百四十匹六十匹為一秩從四品二百匹五十匹為一秩五品一百六十匹四十匹為一秩從五品一百二十匹三十匹為一秩六品一百匹二十五匹為一秩從六品八十匹二十匹為一秩七品六十匹十五匹為一秩從七品四十匹十匹為一秩八品三十六匹九匹為一秩從八品三十二匹八匹為一秩九品二十八匹七匹為一秩從九品二十四匹六匹為一秩祿率一分以帛一分以粟一分以錢幹出所部之人一幹輸絹十八匹幹身放之嬖卑義翻又博計翻一戲之費動踰巨萬既而府藏空竭藏徂浪翻乃賜二三郡或六七縣使之賣官取直由是為守令者率皆富商大賈守音狩賈音古競為貪縱章十二行本縱下有賦繁役重四字乙十一行本同孔本同張校同民不聊生史極言齊氏政亂以啓敵國兼並之心又一年而齊亡有天下者可不以為鑒乎書名通鑑豈苟然哉周高祖謀伐齊命邊鎮益儲偫加戍卒偫直里翻齊人聞之亦增修守禦柱國于翼諫曰疆埸相侵互有勝負徒損兵儲無益大計不如解嚴繼好使彼懈而無備然後乘間出其不意好呼到翻懈古隘翻間古莧翻下間隙乘間同一舉可取也周主從之韋孝寬上疏陳三策上時掌翻其一曰臣在邊積年頗見間隙不因際會難以成功是以往歲出軍徒有勞費功績不立由失機會周主保定初再伐齊攻並州圍洛陽趣懸瓠出軹關皆無功事見一百六十九卷世祖天嘉四年五年爭宜陽爭汾北事見一百七十卷太建元年至三年長淮之南舊為沃土陳氏以破亡餘燼猶能一舉平之曰破亡餘燼者言陳氏承梁元帝江陵破亡之後收合餘燼再立國於江南燼徐刃翻火餘燭餘曰燼喪敗而返事見上卷五年六年喪息浪翻計盡力窮讎敵有舋不可失也左傳鬬伯比曰讎有釁不可失也舋與釁同宇文高氏世為讎敵方軌而進五代志軹關在河內郡王屋縣周師若自軹關出險趨鄴前無阻隘可以方軌橫行欲約陳共攻之左傳譬如捕鹿晉人角之諸戎掎之角者當其前掎者掎其後掎居綺翻魏永安中置廣州於魯陽魏分東西廣州西屬三鴉谷在魯陽界沿河而下周都長安以褒漢荊襄為山南驍堅堯翻下同絶其並晉之路稽胡南胸奴之餘種散在河東西河郡界阻山而居在長安北復扶又翻並卑經翻仍令各募關河之外徑勇之士厚其爵賞使為前驅關河之外指齊境而言欲募其土人以為鄉導雷駭電激百道俱進並趨虜庭趨七喻翻必當望旗奔潰所向摧殄一戎大定實在此機武王伐紂一戎衣而天下大定其二曰若國家更為後圖未即大舉宜與陳人分其兵勢三鴉以北萬春以南萬春地名新唐志武德五年析龍門置萬春縣蓋以舊地名名縣也三鴉以北萬春以南韋孝寬袤指周東北之境舉兩端而言預為貯積貯直呂翻募其驍悍立為部伍悍侯旰翻又下罕翻彼既東南有敵戎馬相持謂齊人與陳人為敵也破其疆埸埸音亦彼若興師赴援我則堅壁清野待其去遠還復出師復扶又翻常以邊外之軍引其腹心之衆我無宿舂之費莊子適百里者宿舂糧左傳申公巫臣遺楚令尹子重司馬子反書曰吾必使汝疲於奔命以死於是導吳伐楚子重子反一歲七奔命必自離叛且齊氏昏暴政出多門鬻獄賣官唯利是視荒淫酒色忌害忠良闔境嗷然不勝其弊闔戶臘翻勝音升以此而觀覆亡可待然後乘間電掃事等摧枯間古莧翻其三曰昔句踐亡吳尚期十載左傳伍員曰越十年生聚十年教訓二十年之外吳其為沼乎此言十載以教訓言之也句音鉤踐慈演翻載作亥翻猶煩再舉史記武王三年喪畢觀兵孟津諸侯不期而會者八百皆曰紂可伐武王曰汝未知天命乃還師三年紂淫暴日甚武王告諸侯曰殷有重罪不可不伐遂復伐紂滅之詩周頌於鑠王師遵養時晦毛傳云遵率養取晦昧也鄭箋云文王率殷之叛國以事紂養是晦昧之君以老其惡自是説者悉祖其義故云然左傳相時而動無纍後人復扶又翻相息亮翻申其盟約安民和衆通商惠工蓄鋭養威觀釁而動斯乃長策遠馭坐自兼並也好呼到翻通商惠工左傳語自古以來謀臣智士陳三策者其上策率非常人所能行中策亦必度其才足以行之然後能聽而用之通鑑蓋謂于翼韋孝寬所見略同也書奏周主引開府儀同三司伊婁謙入內殿伊婁虜復姓拓跋之興於代北也獻帝以其次弟為伊婁氏朕欲用兵何者為先對曰齊氏沈溺倡優耽昏麴糵從七容翻沈持林翻倡音昌糵魚列翻其折衝之將斛律明月已斃於讒口事見上卷四年將即亮翻道路以目道路以目本周語言道路以目相視而不敢言易以豉翻帝大笑喜其所見與己同丙辰使謙與小司寇元衛聘於齊以觀釁為周滅齊張本考異曰謙傳作拓跋偉今從周書帝紀余按伊婁與拓跋同所自出而各為氏則伊婁謙本傳作拓跋不為無據太建七年丙寅周主還長安自同州還還從宣翻又音如字太建七年夏四月甲午上享太廟太建七年監豫州陳桃根得青牛獻之監工銜翻詔遣還民又表上織成羅文錦被各二百首上時掌翻詔於雲龍門外焚之太建七年庚子齊以中書監陽休之為尚書右僕射太建七年六月壬辰以尚書右僕射王瑒為左僕射瑒雉杏翻又音暢太建七年甲戌齊主如晉陽太建七年秋七月丙戌周主如雲陽宮大將軍楊堅姿相奇偉堅為人龍顏額有五柱入頂目光外射有文在手曰王長上短下沈深嚴重相息亮翻下同畿伯周置屬大司徒杜佑曰周地官之屬每方畿伯中大夫也每縣小畿伯則下大夫公眼如曙星無所不照當王有天下曙星向曉之星其光閃爍曙常恕翻王于況翻蓋以其姿相殺氣重也後堅之篡內夷宇文外翦尉遲迥檀讓王謙死者不可勝數人固有相乎周主待堅素厚齊王憲言於帝曰普六茹堅相貌非常堅父忠從周太祖屢有戰功賜姓普六茹氏不覺自失恐非人下請早除之帝亦疑之以問來和和詭對曰隨公止是守節人可鎮一方若為將領陳無不破言不以實曰詭將即亮翻丁卯周主還長安先是周主獨與齊王憲及內史王誼謀伐齊先悉薦翻又遣納言盧韞周保定四年改宗伯為納言馹人質翻驛傳也周置安州於安陸餘人皆莫之知丙子始召大將軍以上於大德殿告之丁丑下詔伐齊以柱國陳王純滎陽公司馬消難鄭公達奚震為前三軍總管難乃旦翻越王盛周嚴周改同昌公侯莫陳崇嚴崇改瓊侯莫陳崇已死於保定三年此又一侯莫陳崇也不則崇字誤趙王招為後三軍總管齊王憲帥衆二萬趨黎陽帥讀曰率下同趨七喻翻隨公楊堅廣寧公薛迥將舟師三萬自渭入河將即亮翻梁公侯莫陳芮帥衆二萬守太行道太行道在河陽北守之欲以斷並冀殷定之兵行戶剛翻自河陰北渡河為河陽周主將攻河陽洛陽守之以斷其相往來蓋令于翼自安州出陳汝自齊王憲以下皆指授諸將所出之道盟之兄孫震武之子也王盟達奚武皆周初功臣周主將出河陽內史上士宇文弼曰弼音弼齊氏建國於今纍世雖曰無道藩鎮之任尚有其人今之出師要須擇地河陽衝要精兵所聚盡力攻圍恐難得志如臣所見出於汾曲戍小山平汾曲汾水之曲也用武之地莫過於此易以豉翻民部中大夫天水趙煚曰民部蓋屬大司徒煚俱永翻河南洛陽四面受敵縱得之不可以守請從河北直指太原此即出蒲晉抵晉陽路其後周主再舉卒出於此可一舉而定遂伯下大夫鮑宏曰遂伯蓋髣佛周官遂師之職杜佑曰周地官之屬有左右遂伯中大夫也小遂伯則下大夫每鄉一人我強齊弱我治齊亂何憂不克治直吏翻但先帝往日屢出洛陽先帝謂宇文泰每有不捷如臣計者進兵汾潞汾潞謂汾川潞川鮑宏欲出師以攻平陽上黨也出其不虞不虞謂不備也虞慮也度也測也三者所及則為備周主皆不從周主蓋欲淺攻以觀釁觀其再舉所以告㣥臣者可知泉之弟也鮑泉事梁元帝江陵破宏入關壬午周主帥衆六萬直指河陰楊素請帥其父麾下先驅周主許之楊素父敷死事見一百七十卷太建三年帥讀曰率太建七年八月癸卯周遣使來聘太建七年周師入齊境禁伐樹踐稼犯者皆斬丁未周主攻河陰大城拔之齊王憲拔武濟武濟城名周武王伐紂由此濟河故以名城洛水入河之口於此置城縱火焚浮橋橋絶齊永橋大都督太安傅伏自永橋夜入中灘城周人既克南城圍中灘二旬不下河陽有三城南城北城中灘是也永橋地近三城按懷縣有永橋鎮懷縣隋唐為懷州武德縣宋白曰隋大業十一年移修武縣於永橋即今武陟縣灘徒旱翻水中沙曰灘地形志朔州有太安郡周主自攻之不克永業通夜辦馬槽二千周人聞之以為大軍且至而憚之九月齊右丞章十二行本丞下有相字乙十一行本同孔本同張校同高阿那肱自晉陽將兵拒周師考異曰北齊書云閏月己丑按是月癸丑朔無己丑又下有庚辰蓋誤也會周主有疾辛酉夜引兵還還音旋又如字水軍焚其舟艦河水迅急泝流西歸追兵且至故焚其舟艦由陸道退還艦戶黯翻周師疲弊願得精騎二千追擊之可破也貴和不許齊王憲于翼李穆所向克捷降拔三十餘城降者迎降拔者以兵力攻拔降戶江翻下同唯以王藥城要害令儀同三司韓正守之正尋以城降齊戊寅周主還長安太建七年庚辰齊以趙彥深為司徒斛阿列羅為司空斛阿列虜三字姓太建七年閏月車騎大將軍吳明徹將兵擊齊彭城壬辰敗齊兵數萬於呂梁敗補邁翻太建七年甲午周主如同州太建七年冬十月己巳立皇子叔齊為新蔡王叔文為晉熙王太建七年十二月辛亥朔日有食之太建七年壬戌以王瑒為尚書左僕射瑒雉杏翻又音暢太子詹事吳郡陸繕為右僕射太建七年庚午周主還長安八年八年春正月癸未周主如同州辛卯如河東涑川杜預曰涑水出河東聞喜縣西南至蒲坂入河涑音速甲午復還同州八年甲寅齊大赦八年乙卯齊主還鄴去年六月如晉陽今還八年二月辛酉周主命太子巡撫西土因伐吐谷渾吐從暾入聲谷音浴建德四年改驃騎大將軍開府儀同三司為開府儀同大將軍仍增上開府儀同大將軍軍中節度皆委二人太子仰成而已仰如字又五亮翻八年齊括雜戶章十二行本戶下有女字乙十一行本同孔本同張校同未嫁者悉集魏虜西涼之人沒入名為隸戶魏武入關隸戶皆在東魏後齊因之仍供廝役周平齊乃悉放諸雜戶為百姓家長坐死長知兩翻八年壬申以開府儀同三司吳明徹為司空八年三月壬寅周主還長安夏四月乙卯復如同州八年己未上享太廟八年尚書左僕射王瑒卒考異曰陳書庚寅瑒卒按長曆是月己酉朔無庚寅陳書誤八年五月壬辰周主還長安八年六月戊申朔日有食之八年辛亥周主享太廟八年初太子叔寶欲以左戶部尚書江總為詹事按五代志梁置吏部祠部度支左戶都官五兵等六尚書陳因梁制此蓋左戶也部字衍奐謂瑜曰江有潘陸之華晉惠帝為太子潘嶽陸機皆為東宮官園公綺里季羽翼漢太子盈高帝遂不易太子竊有所難太子深以為恨自言於帝帝將許之奐奏曰江總文華之士今皇太子文華不少少詩沼翻豈藉於總如臣所見願選敦重之才以居輔導之職帝曰即如卿言誰當居此奐曰都官尚書王廓世有懿德識性敦敏可以居之太子時在側乃曰廓王泰之子不宜為太子詹事謂回避父諱不宜居是官也宋朝范曄朝直遙翻即范泰之子亦為太子詹事前代不疑太子固爭之帝卒以總為詹事卒子恤翻總斆之曾孫也江斆湛之子齊朝以風流冠冕一時斆音效甲寅以尚書右僕射陸繕為左僕射帝欲以孔奐代繕詔已出太子沮之而止更以晉陵太守王克為右僕射更工衡翻守音狩頃之總與太子為長夜之飲養良娣陳氏為女太子亟微行遊總家亟去吏翻上怒免總官八年周利州刺史紀王康五代志義城郡古晉壽也後魏立益州世號小益州梁曰黎州西魏復曰益州又改曰利州繕修戎器陰有異謀司録裴融諫止之康殺融丙辰賜康死八年丁巳周主如雲陽八年庚申齊宜陽王趙彥深卒彥深歷事纍朝常參機近趙彥深事齊神武已掌機密至後主歷事六君朝直遙翻既卒朝貴典機密者唯侍中開府儀同三司斛律孝卿一人而已其餘皆嬖幸也卒子恤翻朝直遙翻嬖卑義翻又博計翻孝卿羌舉之子斛律羌舉見一百五十七卷梁武帝大同三年差不貪穢八年秋八月乙卯周主還長安八年周太子伐吐谷渾至伏俟城而還伏俟城吐谷渾國都也其地即漢西海允谷鹽池在清海西吐從暾入聲谷音浴還音旋又如字下軍還同宮尹鄭譯王端等周置太子宮尹蓋即詹事之職太子在軍中多失德譯等皆預焉軍還王軌等言之於周主周主怒杖太子及譯等仍除譯等名宮臣親幸者咸被譴還從宣翻又音如字被皮義翻下同太子復召譯戲狎如初譯因曰殿下何時可得據天下太子悅益昵之復扶又翻又音如字昵尼質翻譯儼之兄孫也亂魏朝使靈太后不得良死者鄭儼也周主遇太子甚嚴每朝見朝直遙翻見賢遍翻進止與㣥臣無異雖隆寒盛暑不得休息以其耆酒耆讀曰嗜禁酒不得至東宮有過輒加捶撻捶止蕊翻嘗謂之曰古來太子被廢者幾人餘兒豈不堪立邪邪音耶乃敕東宮官屬録太子言語動作每月奏聞太子畏帝威嚴矯情修飾由是過惡不上聞上時掌翻王軌嘗與小內史賀若弼言太子必不克負荷賀若虜復姓北史云北人謂忠貞為賀若魏孝文帝以其先祖有忠貞之節遂以賀若為氏若人者翻荷下可翻又如字勸軌陳之軌後因侍坐坐徂臥翻言於帝曰皇太子仁孝無聞恐不了陛下家事愚臣短暗不足可信陛下恆以賀若弼有文武奇才恆戶登翻亦常以此為憂帝以問弼對曰皇太子養德春宮太子居東宮東方主春故亦曰春宮既退軌讓弼曰平生言論無所不道今者對揚對揚本於傅説召虎對答也揚稱也後人遂以面對敷奏為對揚爾如此也此公之過也太子國之儲副豈易發言事有蹉跌易以豉翻蹉七何翻跌徒結翻便至滅族本謂公密陳臧否否音鄙何得遂至昌言昌顯也昌言顯言也乃曰吾專心國家遂不存私計向者對衆良實非宜後軌因內宴內宴宴於宮中也上時掌翻捋帝須曰捋郎括翻須與鬚同可愛好老公但恨後嗣弱耳先是帝問右宮伯宇文孝伯曰吾兒比來何如先悉薦翻比毗至翻對曰太子比懼天威更無過失罷酒帝責孝伯曰公常語我云太子無過今軌有此言公為誑矣語牛倨翻誑居況翻孝伯再拜曰父章十二行本父上有臣聞二字乙十一行本同孔本同張校同子之際人所難言臣知陛下不能割慈忍愛遂爾結舌孝伯此言亦不可謂之不忠切也默然久之乃曰朕已委公矣公其勉之王軌驟言於帝曰皇太子非社稷主普六茹堅貌有反相不從容而言之為驟言相息亮翻曰必天命有在將若之何楊堅聞之甚懼深自晦匿帝深以軌等言為然為太子得位殺軌等張本長知兩翻又不才餘子皆幼故得不廢史言周武帝明於知子而不廢太子之由八年丁卯以司空吳明徹為南兗州刺史五代志江都郡梁置南兗州後齊改為東廣州陳復曰南兗八年齊主如晉陽營邯鄲宮此二事也既如晉陽又營宮於邯鄲以趙故都也其地在隋唐臨洺縣邯鄲音寒丹八年九月戊戌以皇子叔彪為淮南王八年周主謂㣥臣曰朕去歲屬有疾疢屬之欲翻疢丑刃翻丁度曰熱病也遂不得克平逋寇前入齊境備見其情彼之行師殆同兒戲況其朝廷昏亂朝直遙翻政由㣥小百姓嗷然朝不謀夕天與不取恐貽後悔前出河外直為拊背未扼其喉謂去年河陰之役漢婁敬曰今與人鬬不扼其吭而拊其背未能全勝高歡起兵晉州事始見一百五十四卷梁武帝中大通二年攝總持也彼必來援吾嚴軍以待擊之必克然後乘破竹之勢鼓行而東足以窮其巢穴混同文軌記曰今天下書同文車同軌將即亮翻帝曰機不可失有沮吾軍者當以軍法裁之沮在呂翻冬十月己酉周主自將伐齊將即亮翻以越王盛公亮隨公楊堅為右三軍譙王儉大將軍竇泰廣化公丘崇為左三軍廣化郡公五代志河池縣後魏曰廣化置廣化郡亮導之子也丙辰齊主獵於祁連池癸亥還晉陽先是晉州行臺左丞張延雋公直勤敏儲偫有備先悉薦翻偫直里翻百姓安業疆埸無虞諸嬖幸惡而代之埸音亦嬖卑義翻又博計翻惡烏路翻由是公私煩擾周主至晉州軍于汾曲汾曲汾水之曲在平陽南水經汾水南過平陽縣東又南過臨汾縣東又屈從縣南西流是汾曲也章十二行本兵字作精騎二字乙十一行本同孔本同張校同二萬守雀鼠谷水經汾水南過冠爵津在介休縣西南俗謂之雀鼠谷數十里間道隘水左右悉結偏梁閣道纍石就路縈帶巖側或去水一丈或高六丈上戴山阜下臨絶澗俗謂之魯般橋蓋通古之津隘又在今之地險也將即亮翻千里徑亦當在平陽北要路之一也杜佑曰汾州界北接太原當千里徑騎奇寄翻下同統軍川地闕齊子嶺在邵郡東焉氏讀曰燕支燕平聲此焉氏縣公也地形志涼州番和郡有燕支縣因燕支山以名縣隋併入番和縣水經注教水出垣縣北教山其水南歷鼓鍾上峽又南流歷鼓鍾川西南有冶官世人謂之鼓鍾城山海經曰鼓鍾之山帝臺之所以觴百神即是山也垣縣後魏於此置邵郡涼城公辛韶步騎五千守蒲津關此涼城郡公也後魏立涼城郡於漢沃陽縣鹽澤北七里池西有舊城俗謂之涼城郡取名也按後魏自六鎮反亂此地皆棄之不能有後周特取郡名以封爵耳漢魏以後五等之封皆無實土其來久矣蒲津關在蒲坂因津濟處以立關漢書武帝元封六年立蒲津關水經涑水出河東聞喜縣東山黍葭谷俗謂之華谷即齊將斛律光取周汾北以進築者也汾水關當在霍邑縣南臨汾縣北自此以上凡言守者皆以斷齊援兵之路獨守蒲津關者為後繼括地志汾州靈石縣有雀鼠谷汾水關遣內史王誼監諸軍攻平陽城監工銜翻齊行臺僕射海昌王尉相貴嬰城拒守尉紆勿翻章十二行本守下有相貴相願之兄也七字乙十一行本同孔本同張校同甲子齊集兵晉祠地形志晉陽有晉王祠庚午齊主自晉陽帥諸軍趣晉州帥讀曰率下同趣七喻翻周主日自汾曲至城下督戰城中窘急窘巨隕翻庚午行臺左丞侯子欽出降於周降戶江翻壬申晉州刺史崔景嵩守北城夜遣使請降於周王軌帥衆應之未明周將北海段文振杖槊與數十人先登使疏吏翻帥讀曰率將即亮翻槊色角翻與景嵩同至尉相貴所拔佩刀劫之城上鼓譟齊兵大潰遂克晉州虜相貴及甲士八千人齊主方與馮淑獵於天池考異曰馮淑傳云獵於三堆今從高阿那肱傳余按宋白續通典嵐州靜樂縣本三堆也天池亦在縣界自旦至午驛馬三至右丞相高阿那肱曰大家正為樂樂音洛邊鄙小小交兵乃是常事何急奏聞至暮使更至使疏吏翻云平陽已陷乃奏之齊主將還淑請更殺一圍齊主從之按齊主獵於祁連池癸亥還晉陽甲子即集兵庚午自晉陽帥兵趣晉州壬申晉州陷時齊主方獵於天池馮淑請更殺一圍審如是則晉州陷之日齊主猶在天池天池今在憲州靜樂縣至晉陽一百七十餘里自晉陽南至晉州又五百有餘里齊主既以庚午違晉陽而南無緣復北至天池竊謂獵祁連池與獵天池共是一事北人謂天為祁連故天池亦謂之祁連池通鑑稡集諸書成一家言自癸亥排日書至庚午發晉陽是據北齊紀書高阿那肱不急奏邊報是據阿那肱傳書請更殺一圍是據馮淑傳合三者而書之不能不相抵牾又馮淑傳以為獵於三堆三堆在肆州永安郡平寇縣界亦在晉陽北周齊王憲攻拔洪洞永安二城二城皆在晉州北洪洞城在楊縣取城北洪洞嶺名之永安古彘縣地隋改曰霍邑齊人焚橋守險軍不得進乃屯永安使永昌公椿屯雞栖原永昌郡公五代志巴東郡大昌縣後周置永昌郡雞栖原在永安北菴烏含翻漢皇甫規親入菴廬巡視三軍椿廣之弟也癸酉齊主分軍萬人向千里徑壬申晉州陷癸酉齊軍已向千里徑則知晉州陷不與獵天池同日明矣自帥大軍上雞栖原上時掌翻宇文盛遣人告急齊王憲自救之齊師退盛追擊破之俄而椿告齊師稍逼憲復還救之復扶又翻與齊對陳至夜不戰陳讀曰陳會周主召憲還還從宣翻又如字憲引兵夜去齊人見柏菴在不之覺明日始知之齊主使高阿那肱將前軍先進仍節度諸軍將即亮翻甲戌周以上開府儀同大將軍安定梁士彥為晉州刺史留精兵一萬鎮之十一月己卯齊主至平陽周主以齊兵新集聲勢甚盛且欲西還以避其鋒開府儀同大將軍宇文欣諫曰以陛下之聖武乘敵人之荒縱何患不克若使齊得令主君臣協力雖湯武之勢未易平也易以豉翻今主暗臣愚士無鬬志雖有百萬之衆實為陛下奉耳軍正京兆王紘章十二行本紘作韶乙十一行本同孔本同曰時因行軍倣漢制置軍正之官不常置也齊失紀綱於茲纍世世祖嗣位齊政不綱今再世矣一戰而扼其喉取亂侮亡正在今日取亂侮亡商仲虺之誥臣所未諭周主雖善其言竟引軍還欣貴之子也宇文貴本朔方人徙京兆仕周為大司馬非周之族也周主留齊王憲為後拒齊師追之憲與宇文欣各將百騎與戰斬其驍將賀蘭豹子等將即亮翻下同騎奇寄翻驍堅堯翻齊師乃退憲引軍渡汾追及周主於玉壁齊師遂圍平陽晝夜攻之城中危急樓堞皆盡樓城上敵樓堞城短垣堞徒協翻尋仞而已六尺為尋七尺為仞槍槊為短兵外援不至衆皆震懼梁士彥慷慨自若慷苦朗翻謂將士曰死在今日吾為爾先於是勇烈齊奮呼聲動地呼火故翻無不一當百齊師少卻少詩沼翻乃令妻妾軍民婦女晝夜修城三日而就周主使齊王憲將兵六萬屯涑川遙為平陽聲援齊人作地道攻平陽城陷十餘步將士乘勢欲入齊主敕且止召馮淑觀之淑粧點不時至周人以木拒塞之塞悉則翻城遂不下舊俗相傳晉州城西石上有聖人迹淑欲往觀之齊主恐弩矢及橋乃抽攻城木造遠橋舊橋近城別造遠橋橋壞至夜乃還癸巳周主還長安甲午復下詔以齊人圍晉州更帥諸軍擊之丙申縱齊降人使還帥讀曰率縱之使還使齊師知周師將復至而懼亦以堅晉州守者之心降戶江翻丁酉周主發長安還長安僅三日復出師明引歸者欲使齊師疲於攻平陽而後取之壬寅濟河與諸軍合十二月丁未周主至高顯高顯蓋近涑川章十二行本王下有憲字乙十一行本同孔本同張校同帥所部先向平陽戊申周主至平陽庚戌諸軍總集凡八萬人稍進逼城置陳東西二十餘里先是齊人恐周師猝至於城南穿塹自喬山屬於汾水齊主大出兵陳於塹北陳讀曰陳先悉薦翻塹七豔翻屬之欲翻喬山當在平陽城西周主命齊王憲馳往觀之憲復命曰易與耳易以豉翻請破之而後食左傳齊晉戰于鞍齊侯曰余姑翦滅此而後朝食曰如汝言吾無憂矣周主乘常御馬從數人巡陳所至輒呼主帥姓名慰勉之帥所類翻將士喜於見知咸思自奮將戰有司請換馬周主曰朕獨乘良馬欲何之周主欲薄齊師礙塹而止自旦至申相持不決齊主謂高阿那肱曰戰是邪不戰是邪邪音耶阿那肱曰吾兵雖多堪戰不過十萬病傷及繞城樵爨者復三分居一復扶又翻昔攻玉壁援軍來即退攻玉壁事見一百五十九卷梁武帝中大同元年豈勝神武時邪高歡諡神武皇帝卻守高梁橋地形志晉州平陽縣有高梁城水經注汾水徑高梁故城西故高梁之墟也晉文公害懷公於此汾水又南過平陽縣東新唐志晉州臨汾縣東北十里有高梁堰一撮許賊馬上刺取擲著汾水中耳一撮言其少也撮倉括翻刺七亦翻著直略翻不知兵勢而輕敵大言未有不敗者也諸內參曰彼亦天子我亦天子彼尚能遠來我何為守塹示弱齊主曰此言是也於是填塹南引周主大喜勒諸軍擊之兵才合齊主與馮淑並騎觀戰東偏少卻淑怖曰軍敗矣騎奇寄翻少詩沼翻怖普故翻惶懼也録尚書事城陽王穆提婆曰大家去大家去齊主即以淑奔高梁橋開府儀同三司奚長諫曰半進半退戰之常體今兵衆全整未有虧傷陛下捨此安之馬足一動人情駭亂不可復振願速還安慰之復扶又翻還從宣翻又音如字下同武衛張常山自後至武衛屬左右武衛將軍軍尋收訖甚完整圍城兵亦不動至尊宜回不信臣言乞將內參往視將領也與也偕也攜也挾也穆提婆引齊主肘曰此言難信齊主遂以淑北走齊師大潰死者萬餘人軍資器械數百里間委棄山積齊人所棄皆為稽胡所取後周人由此討稽胡延宗在亂能整未易才也惜大廈將顛非一木所支耳齊主至洪洞淑方以粉鏡自玩施粉添粧臨鏡以自玩也唱賊至於是復走復扶又翻先是齊主以淑為有功勳將立為左皇后遣內參詣晉陽取皇后服御褘翟等五代志梁制皇后謁廟服袿襡大衣蓋嫁服也皂上皂下親蠶則青上縹下齊制皇后助祭朝會以褘衣祠郊禖以褕狄小宴以闕狄親蠶以鞠衣禮見皇帝以展衣宴居以緑衣六服俱有蔽膝織成緄帶周制皇后翟衣六祀郊禖朝享則翬衣素質五色祭陰社朝命婦則衣青質五色祭㣥小祀受獻璽則鷩衣赤色采桑則鴇衣黃色從皇帝見賓客聽女教則鵫衣白色食命婦歸寧則矢羽衣玄色隋制皇后褘衣深青織成為之為翬翟之形素質五色十二等先悉薦翻褘許韋翻袿涓畦翻釋名婦人上服曰袿具下垂者襡朱欲翻縹匹小翻褕音遙展與袒同陟戰翻沈將輦翻緄古本翻與褕同音鷩必列翻亦雉也鴇補抱翻鵫敕角翻雉名矢羽直質翻遇於中塗齊主為按轡為于偽翻命淑著之然後去史言齊師之敗皆由馮小憐以婦人從軍國之禍也齊主既敗而寵其所嬖以速亡著職略翻辛亥周主入平陽梁士彥見周主持周主須而泣曰臣幾不見陛下周主亦為之流涕史敘後周君臣相與之情須與鬚同幾居依翻為于偽翻上主為下善為同周主以將士疲弊欲引還將息亮翻還所宣翻又音如字士彥叩馬諫曰今齊師遁散衆心皆動因其懼而攻之其勢必舉周主從之執其手曰余得晉州為平齊之基若不固守則大事不成朕無前憂唯慮後變汝善為我守之用兵而能慮後患者善師者也帥讀曰率諸將固請西還周主曰縱敵患生卿等若疑朕將獨往諸將乃不敢言癸丑至汾水關齊主入晉陽憂懼不知所之甲寅齊大赦齊主問計於朝臣皆曰宜省賦息役以慰民心收遺兵背城死戰以安社稷朝直遙翻背蒲妹翻齊主欲留安德王延宗廣寧王孝珩守晉陽珩音行自向北朔州魏孝昌中改懷朔鎮為朔州本漢五原郡地尋即陷沒而朔州寄治並州界後齊置朔州於古馬邑城於西河郡置南朔州故謂馬邑為北朔州新唐志曰朔州本治善陽建中中馬遂徙治馬邑大元以朔州置順義節度領鄯陽窟谷二縣而以馬邑縣置固州則奔突厥厥九勿翻㣥臣皆以為不可帝不從開府儀同三司賀拔伏恩等宿衛近臣三十餘人西奔周軍周主封賞各有差高阿那肱所部兵尚一萬守高壁高壁嶺名在雀鼠谷南括地志汾州靈石縣有高壁嶺杜佑曰在縣東南宋白曰靈石縣東南有高壁嶺雀鼠谷汾水關皆汾西險固之所寨與寨同柴夬翻下同周主引軍向高壁阿那肱望風退走齊王憲攻洛女寨拔之有軍士告阿那肱招引西軍齊主令侍中斛律孝卿檢校孝卿以為妄還至晉陽阿那肱腹心復告阿那肱謀反復扶又翻又以為妄斬之乙卯齊主詔安德王延宗廣寧王孝珩募兵延宗入見珩音行見賢遍翻齊主告以欲向北朔州後魏太和中置朔州於定襄故城高齊天保於馬邑西南置朔州相去三百八十里故定襄古城之朔州有北朔州之稱不從密遣左右先送皇太后太子於北朔州丙辰周主與齊王憲會於介休介休縣屬西河郡以為上柱國封郇公降戶江翻郇音荀郇古國名是夜齊主欲遁去諸將不從將即亮翻丁巳周師至晉陽齊主復大赦復扶又翻改元隆化以安德王延宗為相國並州刺史總山西兵並卑經翻鄴都謂並州之地為山西謂曰並州兄自取之兒今去矣延宗曰陛下為社稷勿動臣為陛下出死力戰必能破之為于偽翻穆提婆曰至尊計已成王不得輒沮沮在呂翻齊主乃夜斬五龍門而出欲奔突厥從官多散厥九勿翻從才用翻下同領軍梅勝郎叩馬諫乃回向鄴時唯高阿那肱等十餘騎從騎奇寄翻廣寧王孝珩襄城王彥道繼至得數十人與俱穆提婆西奔周軍陸令萱自殺家屬皆誅沒周主以提婆為柱國宜州刺史五代志京兆郡華原縣後魏置北雍州西魏改為宜州若妙盡人謀深達天命官榮爵賞各有加隆或我之將卒逃逸彼朝將即亮翻朝直遙翻無問貴賤皆從蕩滌自是齊臣降者相繼降戶江翻初齊高祖為魏丞相齊尊高歡廟號曰高祖相息亮翻太原白建典騎兵曹騎奇寄翻皆以善書計工簿帳受委任及齊受禪諸司咸歸尚書唯二曹不廢更名二省更工衡翻雍官至録尚書事建官至中書令常典二省世稱唐白雍兼領度支與高阿那肱有隙阿那肱譖之齊主敕侍中斛律孝卿總知騎兵度支度徒洛翻孝卿事多專決不復詢稟復扶又翻雍自以宿習舊事為孝卿所輕意甚鬱鬱鬱鬱者受抑而氣不得舒也雍遂留晉陽並州將帥請於安德王延宗曰王不為天子諸人實不能為王出死力將即亮翻帥所類翻為于偽翻延宗不得已戊午即皇帝位下詔曰武平孱弱曰武平者稱齊主年號孱士顏翻又士眼翻章十二行本宮作宦乙十一行本同豎斬關夜遁莫知所之王公卿士猥見推逼猥遝也大赦改元德昌以晉昌王唐雍為宰相齊昌王莫多婁敬顯沭陽王章十二行本王下有和阿千子四字乙十一行本同孔本同張校同云無注本千作干右衛大將軍段暢開府儀同三司韓骨胡等為將帥敬顯貸文之子也此皆齊所封郡王也五代志西城郡石泉縣舊置晉昌郡蘄春郡蘄春縣後齊置齊昌郡東海郡沭陽縣東魏置沭陽郡莫多婁貸文戰死事見一百五十八卷梁武帝大同四年沭音術不召而至者前後相屬延宗發府藏及後宮美女以賜將士屬之欲翻藏徂浪翻將即亮翻籍沒內參十餘家齊主聞之謂近臣曰我寧使周得並州不欲安德得之左右曰理然延宗見士卒皆親執手稱名流涕嗚咽衆爭為死為于偽翻童兒女子亦乘屋攘袂投甎石以禦敵乘登也己未周主至晉陽考異曰周書武帝紀丁巳大軍次並州又云己未軍次並州蓋丁巳前軍至己未帝乃至也庚申齊主入鄴周師圍晉陽四合如黑雲周戎衣及旗幟皆黑且兵多故如黑雲和阿干子段暢拒城東自帥衆拒齊王憲於城北帥讀曰率延宗素肥前如偃後如伏人常笑之至是奮大矟往來督戰矟所角翻徑捷若飛所向無前和阿干子段暢以千騎奔周軍騎奇寄翻周主攻東門際昏遂入之進焚佛寺延宗敬顯自門入夾擊之周師大亂爭門相填壓塞路不得進齊人從後斫刺死者二千餘人塞悉則翻刺七亦翻周主左右略盡自拔無路承御上士張壽牽馬首承御上士蓋侍衛左右之官考異曰北齊書安德王延宗傳作佛恩今從周齊帝紀崎丘奇翻嶇音區齊人奮擊幾中之幾居依翻又巨希翻近也中竹仲翻城東道厄曲厄與厄同烏懈翻僅得免降戶江翻時已四更夜分五更四更丁夜也更工衡翻使於積尸中求長鬣者不得鬣良涉翻鬚也時齊人既捷入坊飲酒盡醉臥延宗不復能整復扶又翻周主出城飢甚欲遁去諸將亦多勸之還將即亮翻還從宣翻又音如字宇文欣勃然進曰陛下自克晉州乘勝至此今偽主奔波關東響震自古行兵未有若斯之盛昨日破城將士輕敵微有不利何足為懷丈夫當死中求生敗中取勝今破竹之勢已成奈何棄之而去齊王憲柱國王誼亦以為去必不免段暢等又盛言城內空虛周主乃駐馬鳴角收兵俄頃復振散兵復聚則摧沮之勢振迅而起復扶又翻又音如字辛酉旦還攻東門克之還復也走至城北周人擒之周主下馬執其手延宗辭曰死人手何敢迫至尊周主曰兩國天子非有怨惡直為百姓來耳言為救民而來為于偽翻勿怖也怖蒲故翻使復衣帽而禮之五代志帽自天子下及士人通冠之蓋常服也然亦有白紗烏紗之異又有繒皂雜紗為之者降戶江翻獨莫多婁敬顯奔鄴齊主以為司徒延宗初稱尊號遣使修啓於瀛州刺史任城王湝後魏置瀛州於河間使疏吏翻下同任音壬湝戶皆翻又音皆至尊出奔宗廟事重㣥公勸迫權主號令事寧終歸叔父湝曰我人臣何容受此啓執使者送鄴壬戌周主大赦削除齊制收禮文武之士鄴伊婁謙聘於齊周遣伊婁謙聘齊事見去年二月此上不應有鄴字蓋初字之誤也章十二行本正作初乙十一行本同孔本同張校同言周將伐齊使謙來觀釁周主既克晉陽召謙勞之勞力到翻下親勞同執遵付謙任其報復謙頓首請赦之周主曰卿可聚衆唾面使其知愧謙曰以遵之罪又非唾面可責唾湯臥翻帝善其言而止謙待遵如初臣光曰賞有功誅有罪此人君之任也高遵奉使異國漏泄大謀斯叛臣也使疏吏翻周高祖不自行戮乃以賜謙使之復怨失政刑矣孔子謂以德報怨者何以報德為謙者宜辭而不受歸諸有司以正典刑乃請而赦之以成其私名美則美矣亦非公義也八年齊主命立重賞以募戰士而竟不出物廣寧王孝珩請使任城王湝將幽州道兵入土門按新唐志井陘故關一名土門關珩音行任音壬湝音皆又古皆翻將即亮翻下同趣七喻翻下同獨孤永業將洛州道兵入潼關揚聲趣長安後魏自平城遷都洛陽置司州孝武西入關東魏北都鄴以鄴為司州以洛陽為洛州鼓行逆戰滏口滏水之口山海經滏水出神茵之山圖經泉源瀵涌若湯焉滏音釜自然逃潰又請出宮人珍寶賞將士齊主不悅斛律孝卿請齊主親勞將士為之撰辭將即亮翻勞力到翻為于偽翻撰士免翻且曰宜慷慨流涕以感激人心齊主既出臨衆將令之不復記所受言令讀如軍令之令復扶又翻遂大笑左右亦笑將士怒曰身尚如此吾輩何急皆無戰心於是自大丞相已下太宰三師大司馬大將軍三公等官後齊制官多循後魏大丞相太宰位望最為崇重太師太傅太保是為三師擬古上公非勳德不居次有大司馬大將軍是為二大並典司武事次置太尉司徒司空是為三公三師二大三公府三門當中開黃閣設內屏其階皆正一品或三或四不可勝數勝音升數所矩翻計也舊所具翻朔州行臺僕射高勱將兵侍衛太后太子自土門道還鄴勱音邁時宦官儀同三司苟子溢猶恃寵縱暴民間雞彘縱鷹犬搏噬取之勱執以徇將斬之太后救之得免或謂勱曰子溢之徒言成禍福獨不慮後患邪勱攘袂曰今西寇已據並州周在齊之西故謂之西寇有位任而光顯於時者為達官委棄也委叛者言棄官而叛去朝直遙翻若得今日斬之明日受誅亦無所恨勱嶽之子也高嶽從高歡起兵有功甲子齊太后至鄴丙寅周主出齊宮中珍寶服玩及宮女二千人班賜將士加立功者官爵各有差將即亮翻周主問高延宗以取鄴之策辭曰此非亡國之臣所及強問之強其兩翻乃曰若任城王據鄴臣不能知任音壬若今主自守陛下兵不血刃癸酉周師趣鄴趣七喻翻命齊王憲先驅以上柱國陳王純為並州總管齊主引諸貴臣入朱雀門朱雀門鄴宮城正南門也問以禦周之策人人異議齊主不知所從是時人情忷懼莫有鬬心朝士出降晝夜相屬忷許勇翻朝直遙翻屬之欲翻高勱曰今之叛者多是貴人至於卒伍猶未離心請追五品已上家屬置之三臺勱音邁考之齊制五品已上謂自尚書郎中書侍郎諫議大夫九寺少卿給事黃門侍郎通直散騎常侍尚書左右丞三公府長史咨議參軍太子三卿直閣將軍東宮正都督已上也三臺魏武帝所建齊文宣帝又增崇之時改為寺因脅之以戰若不捷則焚臺此曹顧惜妻子必當死戰且王師頻北賊徒輕我今背城一決背蒲妹翻理必破之齊主不能用望氣者言當有革易齊主引尚書令高元海等議依天統故事禪位皇太子天統禪位事見一百六十九卷世祖天嘉六年章錫琛標點容肇祖聶崇岐覆校
