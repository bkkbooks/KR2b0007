body:
  text: 資治通鑑卷第二百三十三端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀四十九德宗神武聖文皇帝八貞元三年貞元三年丁卯七八七貞元三年八月辛巳朔日有食之貞元三年吐蕃尚結贊遣五騎送崔漢衡歸吐從暾入聲漢衡為吐蕃所擒見上卷是年五月騎奇寄翻至潘原李觀語之以有詔不納吐蕃使者上時掌翻觀古玩翻語牛倨翻使疏吏翻受其表而卻其人貞元三年初兵部侍郎同平章事柳渾與張延賞俱為相渾議事數異同相息亮翻數所角翻延賞使所親謂曰相公舊德但節言於廟堂則重位可久渾曰為吾謝張公為于偽翻柳渾頭可斷斷音短舌不可禁禁居吟翻由是交惡上好文雅醞藉好呼到翻醞紆運翻藉慈夜翻史照曰醞藉有雅度之稱余謂照説非也記禮器云禮有擯詔樂有相步溫之至也鄭氏注云皆為溫藉重禮也皇氏云溫謂丞藉凡玉以物縕裏丞藉君子亦以威儀擯相以自丞藉溫與縕同而渾質直輕侻無威儀侻他活翻於上前時發俚語上不悅欲黜為王府長史李泌言渾褊直無他俚音里長知丈翻褊補典翻故事罷相無為長史者又欲以為王傅泌請以為常侍上曰苟得罷之無不可者於此可以見帝之親任泌泌薄必翻己丑渾罷為左散騎常侍散悉亶翻貞元三年初郜國大長公主適駙馬都尉蕭升升復之從兄弟也郜音告長知兩翻從才用翻公主不謹詹事李升蜀州別駕蕭鼎武后垂拱二年分益州置蜀州漢州豐陽縣屬商州漢商縣地晉分商縣置豐陽縣以川為名舊治吉川城麟德元年移治豐陽川主女為太子始者上恩禮甚厚主常直乘肩輿抵東宮宗戚皆疾之或告主淫亂且為厭禱厭於琰翻又一叶翻上大怒幽主於禁中切責太子太子不知所對請與蕭離婚上召李泌告之且曰舒王近已長立長知兩翻孝友溫仁泌曰何至於是陛下惟有一子考異曰按德宗十一子誼謜其所生外猶有九子而泌云惟有一子者蓋當是時小王或未生誼謜之外尚有昭靖子也欲廢之而立姪得無失計乎上勃然怒曰卿何得間人父子間古莧翻誰語卿舒王為姪者對曰陛下自言之大曆初陛下語臣語牛倨翻今日得數子臣請其故陛下言昭靖諸子主上令吾子之昭靖太子上弟邈也何有於姪當此之時微李泌孰能言及此者自今陛下宜努力勿復望其孝矣因父子天性推而言及人情利害極處以感動之復扶又翻卿不愛家族乎對曰臣惟愛家族故不敢不盡言若畏陛下盛怒而為曲從陛下明日悔之必尤臣云吾獨任汝為相不力諫使至此必復殺而子而汝也餘年不足惜若冤殺臣子使臣以姪為嗣臣未知得歆其祀乎因嗚咽流涕又以自家真情感動之事已如此使朕如何而可對曰此大事願陛下審圖之臣始謂陛下聖德當使海外蠻夷皆戴之如父母豈謂自有子而疑之至此乎臣今盡言不敢避忌諱自古父子相疑未有不亡國覆家者陛下記昔在彭原建寧何故而誅上曰建寧叔實冤肅宗性急譖之者深耳建寧王倓德宗之叔也倓冤死事見二百一十九卷肅宗至德元載臣昔以建寧之故固辭官爵誓不近天子左右近其靳翻不幸今日復為陛下相又覩茲事復扶又翻相息亮翻臣在彭原承恩無比竟不敢言建寧之冤及臨辭乃言之肅宗亦悔而泣事見二百二十卷至德二載常懷危懼臣亦為先帝誦黃臺瓜辭以防讒構之端事見同上為于偽翻朕固知之意色稍解乃曰貞觀開元皆易太子何故不亡對曰臣方欲言之昔承乾屢嘗監國監古銜翻託附者衆東宮甲士甚多與宰相侯君集謀反事覺太宗使其舅長孫無忌與朝臣數十人鞫之事狀顯白然後集百官而議之當時言者猶云願陛下不失為慈父使太子得終天年太宗從之並廢魏王泰事見一百九十有七卷貞觀十七年以建寧為冤臣不勝慶幸勝音升願陛下戒覆車之失從容三日從千容翻究其端緒而思之陛下必釋然知太子之無他矣若果有其迹當召大臣知義理者二十人與臣鞫其左右必有實狀願陛下如貞觀之法行之並廢舒王而立皇孫則百代之後有天下者猶陛下子孫也至於開元之末武惠譖太子瑛兄弟殺之海內冤憤事見二百一十四卷玄宗開元二十五年又可法乎且陛下昔嘗令太子見臣於蓬萊池大明宮中蓬萊殿北有太液池池中有蓬萊山所謂蓬萊池蓋即此也非有目豺聲商臣之相也左傳楚成王將立太子商臣令尹子上曰不可是人也目而豺聲忍人也不聽卒立之商臣後果以宮甲圍成王而殺之又太子自貞元以來常居少陽院大明宮中有少陽院在浴堂殿之東溫室殿西南少詩照翻德宗常居浴堂殿預外事安有異謀乎彼譖人者巧詐百端雖有手書如晉愍懷事見八十三卷西晉惠帝元康九年開元二十五年楊洄復構太子瑛鄂王瑤光王琚與兄薛鏽有異謀武惠使人詭召太子二王曰宮中有賊請甲以入太子從之白帝曰太子二王謀反甲而來帝使中人視之如言遂並廢為庶人況但以妻母有罪為纍乎纍良瑞翻下纍汝同幸陛下語臣語牛倨翻臣敢以家族保太子必不知謀嚮使楊素許敬宗李林甫之徒承此旨已就舒王圖定策之功矣上曰此朕家事何豫於卿而力爭如此對曰天子以四海為家臣今獨任宰相之重四海之內一物失所責歸於臣況坐視太子冤橫而不言橫戶孟翻臣罪大矣上曰為卿遷延至明日思之為于偽翻泌抽笏叩頭而泣曰如此臣知陛下父子慈孝如初矣然陛下還宮當自審思勿露此意於左右露之則彼皆欲樹功於舒王太子危矣上曰具曉卿意泌歸謂子弟曰吾本不樂富貴而命與願違今纍汝曹矣樂音洛纍力瑞翻太子遣人謝泌曰若必不可救欲先自仰藥何如言欲飲藥而死也必無此慮願太子起敬起孝起敬起孝禮記之言則事不可知耳間一日按經典釋文間音間廁之間上開延英殿獨召泌宋白曰唐制內中有公事商量即降宣頭付閣門開延英閣門翻宣申中書並榜正衙門如中書有公事敷奏即宰臣入榜子奏請開延英只是宰臣赴對流涕闌干泣涕縱橫為闌干一曰闌干淚不斷貌非卿切言朕今日悔無及矣皆如卿言太子仁孝實無他也自今軍國及朕家事皆當謀於卿矣泌拜賀因曰陛下聖明察太子無罪臣報國畢矣臣前日驚悸亡魂悸其季翻心動也不可復用復扶又翻願乞骸骨上曰朕父子賴卿得全方屬子孫屬之欲翻使卿代代富貴以報德何為出此言乎甲午詔李萬不知避宗宜杖死左傳齊盧蒲癸臣於慶舍有寵妻之以女慶舍之士謂盧蒲癸曰男女辨姓子不避宗何也癸曰宗不余避余獨安避之皆流嶺南及遠州貞元三年戊申吐蕃帥羌渾之衆寇隴州連營數十里京城震恐帥讀曰率九月丁卯遣神策將石季章戍武功決勝軍使唐良臣戍百里城丁巳吐蕃大掠汧陽吳山華亭吳山縣屬隴州隋之長蛇縣地唐貞觀元年更名以縣有吳山也史照曰華亭本屬安定郡後屬隴州垂拱二年更名曰亭川元和三年省入汧源汧口堅翻或斷手鑿目棄之而去斷音短驅丁壯萬餘悉送安化峽西安化峽當在秦州清水縣界九域志平涼西南七十里有安化縣又隴州汧陽縣有安化鎮乃告之曰聽爾東向哭辭鄉國衆大哭赴崖谷死傷者千餘人未幾幾居豈翻吐蕃之衆復至圍隴州復扶又翻刺史韓清沔與神策副將蘇太平夜出兵擊卻之沔彌兗翻貞元三年上謂李泌曰每歲諸道貢獻共直錢五十萬緡今歲僅得三十萬緡泌薄必翻緡眉巾翻言此誠知失體然宮中用度殊不足泌曰古者天子不私求財春秋左傳之言願陛下不受諸道貢獻及罷宣索遣中使以聖旨就有司宣取財物謂之宣索索山客翻請降敕折稅折之舌翻不使姦吏因緣誅剝上從之貞元三年回紇合骨咄祿可汗屢求和親且請昏上未之許會邊將告乏馬無以給之紇下沒翻咄當沒翻可從刊入聲汗戶汗翻將即亮翻李泌言於上曰陛下誠用臣策數年之後馬賤於今十倍矣上曰何故對曰願陛下推至公之心屈己徇人為社稷大計臣乃敢言上曰卿何自疑若是對曰臣願陛下北和回紇南通雲南西結大食天竺如此則吐蕃自困馬亦易致矣吐從暾入聲易弋豉翻三國當如卿言至於回紇則不可以陝州之辱恨回紇也臣固知陛下如此所以不敢早言見上卷是年七月當以回紇為先三國差緩耳三國謂雲南大食天竺唯回紇卿勿言泌曰臣備位宰相事有可否在陛下何至不許臣言相息亮翻上曰朕於卿言皆聽之矣至於章乙十六行本於下有和字乙十一行本同孔本同張校同回紇宜待子孫於朕之時則固不可泌曰豈非以陝州之恥邪上曰然韋少華等以朕之故受辱而死事見二百二十二卷寶應元年陝失冉翻邪音耶少始照翻屬國家多難屬之欲翻難乃旦翻未暇報之和則決不可卿勿更言泌曰害少華者乃牟羽可汗陛下即位舉兵入寇未出其境今合骨咄祿可汗殺之然則今可汗乃有功於陛下宜受封賞又何怨邪其後張光晟殺突董等九百餘人殺牟羽殺突董事並見二百二十六卷建中元年見二百二十七卷建中三年上曰卿以和回紇為是則朕固非邪對曰臣為社稷而言為于偽翻若苟合取容何以見肅宗代宗於天上凡人言死則曰見某人於地下人主之前尊君之祖父則曰見於天上言其神靈在天死則將得見之容朕徐思之自是泌凡十五餘對未嘗不論回紇事上終不許泌曰陛下既不許回紇和親願賜臣骸骨上曰朕非拒諫但欲與卿較理耳何至遽欲去朕邪對曰陛下許臣言理此固天下之福也上曰朕不惜屈己與之和但不能負少華輩對曰以臣觀之少華輩負陛下非陛下負之也上曰何故對曰昔回紇葉護將兵助討安慶緒肅宗但令臣宴勞之於元帥府先帝未嘗見也勞力到翻討安慶緒之時代宗以廣平王為元帥葉護固邀臣至其營肅宗猶不許及大軍將發先帝始與相見所以然者彼戎狄豺狼也舉兵入中國之腹不得不過為之防也陛下在陝富於春秋少華輩不能深慮以萬乘元子徑造其營造七到翻又不先與之議相見之儀使彼得肆其桀驁驁五告翻豈非少華輩負陛下邪死不足償責矣且香積之捷葉護欲引兵入長安先帝親拜之於馬前以止之葉護遂不敢入城事見二百二十卷肅宗至德二載皆歎息曰廣平王真華夷主也然則先帝所屈者少所伸者多矣葉護乃牟羽之叔父也牟羽身為可汗舉全國之兵赴中原之難難乃旦翻故其志氣驕矜敢責禮於陛下陛下天資神武不為之屈當是之時臣不敢言其他若可汗留陛下於營中歡飲十日天下豈得不寒心哉不敢察察言故云爾豺狼馴擾馴從也善也擾者順也叱退左右親送陛下乘馬而歸陛下以香積之事觀之則屈己為是乎不屈為是乎陛下屈於牟羽乎牟羽屈於陛下乎上謂李晟馬燧曰故舊不宜相逢朕素怨回紇今聞泌言香積之事朕自覺少理此多少之少音詩紹翻卿二人以為何如對曰果如泌所言則回紇似可恕上曰卿二人復不與朕復扶又翻朕當奈何泌曰臣以為回紇不足怨嚮來宰相乃可怨耳今回紇可汗殺牟羽其國人有再復京城之勳回紇至德二載與代宗復兩京寶應元年又與帝復東京是有再復京城之勳吐蕃幸國之災陷河隴數千里之地又引兵入京城使先帝蒙塵於陝見二百二十三卷代宗廣德元年章乙十六行本乃下有百代二字乙十一行本同孔本同張校同退齋校同必報之讎況其贊普章乙十六行本普下有至今二字乙十一行本同孔本同張校同尚存言牟羽已死則回紇為可恕贊普尚存則國讎當必復為于偽翻別彼列翻乃欲和吐蕃以攻回紇此為可怨耳上曰朕與之為怨已久又聞吐蕃劫盟今往與之和得無復拒我為夷狄之笑乎復扶又翻對曰不然臣曩在彭原今可汗為胡祿都督與今國相白婆帝皆從葉護而來臣待之頗親厚故聞臣為相而求和安有復相拒乎臣今請以書與之約稱臣為陛下子每使來不過二百人印馬不過千匹唐六典有諸監馬印凡諸監馬駒以小官字印印左膊以年辰印印右髀以監名依左右廂印印尾側若形容端正擬送尚乘者則不須印監名至三歲起脊量強弱漸以飛字印印右膊細馬次馬俱以龍形印印項左送尚乘者於尾側依左右間印以三花其餘雜馬上乘者以風字印印左膊以飛字印印右髀經印之後簡入別所者各以新入處監名印印左頰官馬賜人者以賜字印配諸軍及充傳送驛者以出字印並印右頰諸蕃馬印隨部落各為印識回紇馬印此所謂印馬者回紇以馬來與中國為互市中國以印印之也五者皆能如約則主上必許和親如此威加北荒旁讋吐蕃讋之涉翻足以快陛下平昔之心矣上曰自至德以來與為兄弟之國今一旦欲臣之彼安肯和乎對曰彼思與中國和親久矣其可汗國相素信臣言若其未諧但應再發一書耳上從之既而回紇可汗遣使上表稱兒及臣凡泌所與約五事一皆聽命上大喜謂泌曰回紇何畏服卿如此對曰此乃陛下威靈臣何力焉上曰回紇則既和矣所以招雲南大食天竺奈何對曰回紇和則吐蕃已不敢輕犯塞矣次招雲南則是斷吐蕃之右臂也斷音短雲南自漢以來臣屬中國雲南本漢之哀牢夷後漢永平之間始臣屬中國其地在漢永昌郡界臣于吐蕃事見二百一十六卷玄宗天寶九載未嘗一日不思復為唐臣也大食在西域為最強自蔥嶺盡西海地幾半天下大食既並波斯突騎施又亡其地東盡蔥嶺西南際海方萬餘里幾居衣翻代與吐蕃為仇臣故知其可招也癸亥遣回紇使者合闕將軍歸許以咸安公主妻可汗蓬州咸安郡公主上女也妻七細翻考異曰鄴侯家傳九月泌請與回紇和親十月與回紇書十二月回紇遣聿支達干上表謝恩皆請如宰相約和親按實録八月丁酉回紇遣默啜達干來貢方物且請和親九月癸亥遣回紇使合闕將軍歸其國初合闕將其君命請昏上許以咸安公主嫁之命見于麟德殿且令齎公主畫圖就示可汗以馬價絹五萬還之許互市而去十二月無聿支入聘之事回紇自大曆十一年以來未嘗入寇信使往來亦無不和及求和之迹蓋德宗心恨回紇而外迹猶羈縻不絶今回紇請昏則拒絶不許而李泌勸與為昏耳其月數之差則恐李繁記之不詳或者聿支即默啜與合闕皆不可知也若以默啜即為請昏之使合闕即為謝恩之人又泌論回紇凡十五餘對須半月以上泌又云臣木夾中與書令朝臣遞云一月可到歲內報至自丁酉至癸亥才二十六日耳今依實録月日因許嫁咸安本其事而言之貞元三年吐蕃寇華亭及連雲堡皆陷之連雲堡在涇州西界宋祁曰連雲堡涇要地也三垂峭絶北據高所虜進退烽火易通考異曰鄴侯家傳曰時京西諸鎮報種麥已畢絶萬頃而皆亙野上大喜既而尚結贊來入寇諸軍閉壁候夜斫營悉捷結贊乃退歸上以十餘年來邊軍嘗被戎挫皆入踐京畿此來始敗又不能更深入且報種麥已畢而喜甚按實録吐蕃陷華亭及連雲堡驅掠邠涇編戶牛畜萬計悉送至彈箏峽是秋數州人無種麥者與家傳相反今從實録甲戌吐蕃驅二城之民數千人及邠涇人畜萬計而去置之彈箏峽西涇州恃連雲為斥候連雲既陷西門不開門外皆為虜境樵采路絶每收穫必陳兵以扞之多失時得空穗而已禾麥熟而不收穫其實隕落故得空穗貞元三年冬十月甲申吐蕃寇豐義城武德二年分彭原置豐義縣屬寧州宋白曰彭陽縣後魏於縣置雲州周武保定二年廢州為防隋文帝廢防為豐義城唐武德初分彭原縣為豐義縣屬彭州貞觀廢彭州以縣屬寧州其城即後魏雲州城邠寧節度使韓遊王褱擊卻之乙酉復寇長武城復扶又翻又城故原州而屯之貞元三年妖僧李軟奴自言本皇族見嶽瀆神嶽謂五嶽瀆謂四瀆妖於遙翻結殿前射生將韓欽緒等謀作亂丙戌其黨告之上命捕送內侍省推之推鞫也遽仆於地曰晟族滅矣李泌問其故晟曰晟新罹謗毀事見上卷本年三月若有一人在其黨中則兄亦不能救矣泌乃密奏大獄一起所連引必多外間人情恟懼請出付臺推付御史臺推鞫之也欽緒遊王褱之子也亡抵邠州遊王褱出屯長武城留後械送京師壬辰腰斬軟奴等八人北軍之士坐死者八百餘人而朝廷之臣無連及者韓遊王褱委軍詣闕謝上遣使止之委任如初遊王褱又械送欽緒二子上亦宥之貞元三年吐蕃以苦寒不入寇而糧運不繼十一月詔渾瑊歸河中考異曰鄴侯家傳十一月以張獻甫為邠寧等州節度使代韓遊王褱而以渾侍中為朔方河中絳邠寧慶副元帥先公乃令獻甫修西界堡障濠塹南接涇州於是塞內始有藩籬之固尚結贊不能輕入窺邊矣按獻甫明年七月乃為邠寧節度家傳誤也劉昌分其衆章乙十六行本衆下有五千二字乙十一行本同孔本同張校同退齋校同歸汴州劉昌本汴州將也貞元三年入朝詔以汴兵八千戍涇原尋授涇原帥華戶化翻貞元三年十二月韓遊王褱入朝貞元三年自興元以來是歲最為豐稔米斗直錢百五十粟八十詔所在和糴庚辰上畋於新店入民趙光奇家問百姓樂乎對曰不樂上曰今歲頗稔何為不樂樂音洛對曰詔令不信前云兩稅之外悉無他徭今非稅而誅求者殆過於稅後又云和糴而實強取之強其良翻曾不識一錢始云所糴粟麥納於道次今則遣致京西行營動數百里車摧馬章乙十六行本馬作牛乙十一行本同斃破産不能支愁苦如此何樂之有每有詔書優恤徒空文耳恐聖主深居九重皆未知之也上命復其家復方目翻復除也除其家賦役也臣光曰甚矣唐德宗之難寤也自古所患者人君之澤壅而不下達小民之情鬱而不上通故君勤恤於上而民不懷勤恤者切於憂民也以至於離叛危亡凡以此也德宗幸以遊獵得至民家值光奇敢言而知民疾苦此乃千載之遇也載子亥翻固當按有司之廢格詔書格音閣殘虐下民橫增賦斂橫戶孟翻斂力贍翻盜匿公財及左右諂諛日稱民間豐樂者而誅之樂音洛然後洗心易慮一新其政屏浮飾屏必郢翻又卑正翻廢虛文謹號令敦誠信察真偽辨忠邪矜困窮伸冤滯則太平之業可致矣釋此不為乃復光奇之家夫以四海之廣兆民之衆又安得人人自言於天子而戶戶復其徭賦乎貞元三年李泌以李軟奴之黨猶有在北軍未發者請大赦以安之恐其自疑而動於惡四年四年春正月庚戌朔赦天下詔兩稅等第自今三年一定考異曰實録赦云天下兩稅更審定等第仍加三年一定以為常式按陸贄論兩稅狀云兩稅之立惟以資産為宗不以丁身為本資産少者則其稅少資産多者則其稅多然則當時稅賦但以貧富為等第若今時坊郭十等戶鄉村五等戶臨時科配也又云額內官勿更注擬見任者三考勒停此蓋用李泌之策也按鄴侯家傳泌請罷天下額外官又云陛下許復所減官員臣因請停額外官許其得資後停額外官員當正官三分之一則今年計已停一半據此則似有額內官又有額外官皆在正員之外不則內皆應作外字之誤也四年李泌奏京官俸太薄請自三師以下悉倍其俸唐以太師太傅太保為三師倍俸倍大曆十二年所增之數也泌薄必翻俸扶用翻考異曰實録辛巳詔以中外給用除陌錢給文武官俸料自是京官益重頗優裕焉初除陌錢隸度支至是令戶部別庫貯之給俸之餘以備他用按興元元年正月赦其所加墊陌錢稅間架之類悉宜停罷今猶有除陌錢者蓋當時止罷所加之數或私買賣者官不收墊陌錢官給錢猶有除陌在故也四年壬申以宣武行營節度使劉昌為涇原節度使甲戌以鎮國節度使李元諒為隴右節度使涇原節度使治涇州隴右節度使治秦州劉昌以汴兵防秋為行營節度使李元諒本鎮華州領鎮國軍節度使皆帥卒力田帥讀曰率下同數年軍食充羡羡弋線翻涇隴稍安四年韓遊王褱之入朝也軍中以為必不返以其子欽緒黨逆謂當連坐也王褱古回翻朝直遙翻去年十二月遊王褱入朝遊王褱見上盛陳築豐義城可以制吐蕃上悅遣還鎮見賢遍翻吐從暾入聲還從宣翻又音如字軍中憂懼者衆遊王褱忌都虞候虞鄉范希朝有功名得衆心虞鄉縣屬河中府將殺之希朝奔鳳翔上召之置於左神策軍遊王褱帥衆築豐義城二版而潰城二尺為一版上下相疑故潰四年二月元友直運淮南錢帛二十萬至長安元友直句勘東南兩稅錢帛見上卷去年七月然上猶數有宣索泌薄必翻數所角翻索山客翻仍敕諸道勿令宰相知泌聞之惆悵而不敢言相息亮翻惆丑鳩翻臣光曰王者以天下為家天下之財皆其有也阜天下之財以養天下之民己必豫焉或乃更為私藏此匹夫之鄙志也古人有言貧不學儉夫多財者奢欲之所自來也夫音扶李泌欲弭德宗之欲而豐其私財財豐則欲滋矣財不稱欲能無求乎弭眉比翻稱尺證翻是猶啓其門而禁其出也雖德宗之多僻亦泌所以相之者非其道故也四年咸陽人或上言臣見白起令臣奏云請為國家扞禦西陲正月吐蕃必大下當為朝廷破之以取信上時掌翻為于偽翻既而吐蕃入寇邊將敗之敗補邁翻不能深入上以為信然欲於京城立廟贈司徒李泌曰臣聞國將興聽於人左傳虢史嚚之言臣恐邊臣解體矣若立廟京城盛為祈禱流聞四方將長巫風長知兩翻言巫祝之風將由此盛今杜郵有舊祠白起死於杜郵故有舊祠在焉則不至驚人耳目矣且白起列國之將贈三公太重唐以太尉司徒司空為三公上笑曰卿於白起亦惜官乎對曰人神一也陛下儻不之惜則神亦不以為榮矣上從之泌自陳衰老獨任宰相精力耗竭既未聽其去乞更除一相上曰朕深知卿勞苦但未得其人耳上從容與泌論即位以來宰相從千容翻曰盧忠清強介人言姦邪朕殊不覺其然泌曰人言姦邪而陛下獨不覺其姦邪此乃之所以為姦邪也考異曰舊李勉傳勉對德宗已有此語與鄴侯家傳述泌語略同未知孰是今兩存之一本泌語之下有與勉二字豈有建中之亂乎以私隙殺楊炎殺楊炎事見二百二十七卷建中二年事見二百二十八卷建中二年擠七細翻又箋西翻事見二百二十九卷建中四年人心頓喜天亦悔禍不然亂何由弭上曰楊炎以童子視朕每論事朕可其奏則悅與之往復論難難乃旦翻下難之問難同即怒而辭位觀其意以朕為不足與言故也以是交不可忍交不可忍者言炎既形之辭而帝亦心懷不平建中之亂術士豫請城奉天事見二百二十六卷建中元年非所能致也泌曰天命他人皆可以言之惟君相不可言蓋君相所以造命也若言命則禮樂刑政皆無所用矣紂曰我生不有命在天見書西伯戡黎篇上曰朕好與人較量理體好呼到翻量音良理體猶言治體也崔祐甫性褊躁躁則到翻朕難之則應對失次朕常知其短而護之楊炎論事亦有可采而氣色粗傲難之輒勃然怒無復君臣之禮所以每見令人忿發餘人則不敢復言難乃旦翻下同復扶又翻盧小心朕所言無不從又無學不能與朕往復故朕所懷常不盡也對曰言無不從豈忠臣乎夫言而莫豫違此孔子所謂一言喪邦者也見論語喪息浪翻惟卿則異彼三人者朕言當卿有喜色不當常有憂色當丁浪翻雖時有逆耳之言如嚮來紂及喪邦之類朕細思之皆卿先事而言先悉薦翻如此則理安理安猶言治安也言雖深切而氣色和順無楊炎之陵傲朕問難往復卿辭理不屈又無好勝之志直使朕中懷已盡屈服而不能不從此朕所以私喜於得卿也泌曰陛下所用相尚多今皆不論何也上曰彼皆非所謂相也凡相者必委以政事如玄宗時牛仙客陳希烈可以謂之相乎如肅宗代宗之任卿雖不受其名乃真相耳必以官至平章事為相則王武俊之徒皆相也唐之使相時主未嘗不知名器之濫也四年劉昌復築連雲堡去年九月吐蕃陷連雲堡復扶又翻四年夏四月乙未更命殿前左右射生曰神威軍更工衡翻考異曰實録作神武軍今從新志與左右羽林龍武神武神策號曰十軍神策尤盛多戍京西散屯畿甸四年福建觀察使吳詵武德四年分泉州之建安縣置建州苦役之軍士作亂殺詵腹心十餘人逼詵牒大將郝誡溢掌留務誡溢上表請罪上遣中使就赦以安之四年乙嚴乙改丁未隴右節度使李元諒築良原故城而鎮之良原縣隋大業初置唐屬涇州貞元二年為吐蕃所破今乃修復九域志良原在涇州西南六十里宋白曰隋分安定鶉觚置良原縣西南三十里有良原因名四年雲南王異牟尋欲內附未敢自遣使先遣其東蠻鬼主驃旁苴夢衝苴烏星入見苴子魚翻見賢遍翻五月乙卯宴之於麟德殿賜賚甚厚封王給印而遣之封驃旁為和義王苴夢衝為懷化王苴烏星為順政王四年辛未以太子賓客吳湊為福建觀察使貶吳詵為涪州刺史涪音浮四年吐蕃三萬餘騎寇涇邠寧慶鄜等州先是吐蕃常以秋冬入寇及春多病疫而退至是得唐人質其妻子先悉薦翻質音致遣其將將之盛夏入寇諸州皆城守無敢與戰者吐蕃俘掠人畜萬計而去四年夏縣人陽城以學行著聞隱居柳谷之北夏戶雅翻柳谷在安邑縣中條山行下孟翻李泌薦之六月徵拜諫議大夫四年韓遊王褱以吐蕃犯塞自戍寧州病求代歸秋七月庚戌加渾瑊邠寧副元帥以左金吾將軍張獻甫為邠寧節度使陳許兵馬使韓全義為長武城行營節度使獻甫未至壬子夜遊王褱不告於衆輕騎歸朝戍卒裴滿等憚獻甫之嚴乘無帥之際癸丑帥其徒作亂騎奇寄翻朝直遙翻無帥所類翻帥其讀曰率曰張公不出本軍我必拒之謂張獻甫本不出於朔方軍也剽匹妙翻圍監軍楊明義所居使奏請范希朝為節度使都虞候楊朝晟避亂出城聞之復入曰所請甚契我心我來賀也亂卒稍安朝晟潛與諸將謀晨勒兵召亂卒謂曰所請不行張公已至邠州汝輩作亂當死不可盡殺宜自推列唱帥者遂斬二百餘人帥衆迎獻甫帥讀曰率上聞軍衆欲得范希朝將授之希朝辭曰臣畏遊王褱之禍而來今往代之非所以防窺覦安反仄也上嘉之擢為寧州刺史以副獻甫遊王褱至京師除右龍武統軍四年振武節度使唐朝臣不嚴斥候己未奚室韋寇振武李延壽曰室韋蓋契丹之在南者為契丹在北者為室韋宋祁曰室韋契丹別種東胡北邊蓋丁零苗裔也地據黃龍北傍峱越河直長安東北七千里東黑水靺鞨西突厥南契丹北瀕海大掠人畜而去時回紇之衆逆公主者在振武朝臣遣七百騎與回紇數百騎追之回紇使者為奚室韋所殺四年九月庚申吐蕃尚志嚴志改悉董星寇寧州張獻甫擊卻之吐蕃轉掠鄜坊而去四年元友直句檢諸道稅外物事始見上卷上年句古侯翻遂為定制歲於稅外輸百餘萬緡斛民不堪命諸道多自訴於上上意寤詔今年已入在官者輸京師未入者悉以與民明年以後悉免之於是東南之民復安其業四年回紇合骨咄祿可汗得唐許昏甚喜遣其妹骨咄祿毗伽公主及大臣妻並國相跌都督奚結翻跌徒結翻跌與回紇同出鐵勒而異種以下千餘人來迎可敦辭禮甚恭曰昔為兄弟今為子壻半子也若吐蕃為患子當為父除之當為于偽翻因詈辱吐蕃使者以絶之冬十月戊子回紇至長安可汗仍表請改回紇為回鶻許之考異曰舊回紇傳元和四年里迦可汗遣使請改為回鶻義取回旋輕捷如鶻崔鉉續會要貞元五年七月公主至衙帳回紇使李義進請改紇字為鶻與統紀同鄴侯家傳四年七月可汗上表請改紇字為鶻與李繁北荒君長録及新回鶻傳同按李泌明年春薨若明年七月方改家傳不應言之今從家傳君長録新書四年吐蕃發兵十萬將寇西川亦發雲南兵雲南內雖附唐外未敢叛吐蕃亦發兵數萬屯於瀘北瀘北瀘水之北瀘水即諸葛亮五月所渡者乃為書遺雲南王敘其叛吐蕃歸化之誠貯以銀函遺唯季翻貯丁呂翻使東蠻轉致吐蕃吐蕃始疑雲南遣兵二萬屯會川會川本邛都縣高宗上元二年徙縣于會川因更名新志會川縣屬巂州有瀘津關在會川東南三十里塞悉則翻趣逡諭翻又逡須翻雲南怒引兵歸國由是雲南與吐蕃大相猜阻歸唐之志益堅吐蕃失雲南之助兵勢始弱矣然吐蕃業已入寇遂分兵四萬攻兩林驃旁三萬攻東蠻七千寇清溪關清溪關在巂州界自關而南七百二十里至巂州洪源志清溪關在黎州西南界新志黎州有銅山要衝十一城破吐蕃於清溪關外四年庚子册命咸安公主加回鶻可汗章乙十六行本汗下有號字乙十一行本同孔本同張校同長壽天親可汗十一月以刑部尚書關播為送咸安公主兼册回鶻可汗使自此以後通鑑皆依前史書回鶻四年吐蕃恥前日之敗謂上清溪關外之敗也一萬攻東蠻復扶又翻韋皋命韋晉鎮要衝城督諸軍以禦之巂州經略使劉朝彩出關連戰自乙卯至癸亥大破之四年李泌言於上曰江淮漕運章乙十六行本運下有自淮入汴四字乙十一行本同孔本同退齋校同以甬橋為咽喉咽音煙地屬徐州鄰於李納徐州與李納巡屬鄰境高明應嗣鎮徐州始二百三十一卷興元元年少詩照翻復扶又翻下同竊據徐州是失江淮也國用何從而致請徙壽廬濠都團練使張建封鎮徐州割濠泗以隸之復以廬壽歸淮南則淄青惕息而運路常通江淮安矣及今明應幼騃可代騃五駭翻宜徵為金吾將軍萬一使他人得之則不可復制矣上從之以建封為徐泗濠節度使建封為政寬厚而有綱紀不貸人以法犯法者有誅無貸四年橫海節度使程日華薨子懷直自知留後四年吐蕃屢遣人誘脅雲南誘音酉五年五年春二月丁亥韋皋遺異牟尋書稱回鶻屢請佐天子共滅吐蕃王不早定計一旦為回鶻所先遺唯季翻先悉薦翻則王纍代功名虛棄矣且雲南久為吐蕃屈辱今不乘此時依大國之勢以復怨雪恥後悔無及矣五年戊戌以橫海留後程懷直為滄州觀察使懷直請分弓高景城為景州景城縣本屬滄州武德四年屬瀛州貞觀元年屬滄州大曆七年屬瀛州橫海蓋因朱滔之敗復得而有之後尋屬瀛州弓高漢古縣魏晉廢省隋置弓高縣於漢鬲縣地唐屬滄州上喜曰三十年無此事矣乃以員外郎徐伸為景州刺史五年中書侍郎同平章事李泌屢乞更命相上欲用戶部侍郎班宏泌言宏雖清強而性多凝滯乃薦竇參通敏可兼度支鹽鐵董晉方正可處門下處昌呂翻上皆以為不可參誕之玄孫也竇誕武德中勸齊王元吉棄並州者也晉為太常卿至是泌疾甚復薦二人復扶又翻庚子以董晉為門下侍郎竇參為中書侍郎兼度支轉運使並同平章事以班宏為尚書依前度支轉運副使參為人剛果峭刻尚辰羊翻度徒洛翻使疏吏翻峭七笑翻無學術多權數每奏事諸相出相悉亮翻參獨居後以奏度支事為辭實專大政多引親黨置要地使為耳目董晉充位而已然晉為人重慎所言於上前者未嘗泄於人子弟或問之晉曰欲知宰相能否視天下安危所謀議於上前者不足道也考異曰韓愈作晉行狀曰在宰相位凡五年所奏於上前者皆二帝三王之道由秦漢以降未嘗言退歸未嘗言所言於上者於人子弟有私問者公曰宰相所職繫天下安危宰相之能與否可見欲知宰相之能與否如此視之其可凡所謀議於上前者不足道也故其事卒不聞愈作行狀必揚美蓋惡敘其為相時事止於此則其循默充位可知然其重慎亦可稱也今略取行狀三月甲辰李泌薨泌有謀略而好談神仙詭誕泌薄必翻薨呼肱翻好呼到翻故為世所輕考異曰國史補曰李泌相以虛誕自任常對客教家人速灑掃今夜洪崖先生來宿有人遺美酒一榼會有客至乃曰麻姑送酒與君同傾傾未畢門者曰某侍郎來取榼泌令倒還略無愧色舊泌傳曰德宗初即位尤惡巫祝怪談之士及建中末寇戎內梗桑道茂有城奉天之説上稍以時日禁忌為意而雅聞泌長於鬼道故自外徵還以至大用時論不以為愜及在相位隨時俯仰無足可稱復引顧況輩輕薄之流動為朝士戲侮頗貽譏誚泌放曠敏辨好大言自出入中禁纍為權幸忌嫉恆由智免終以言論縱橫上悟聖主以躋相位初泌流放江南與柳渾顧況為人外之交吟詠自適而渾先達故泌復得入官於朝況蘇州人按泌雖詭誕好談神仙然其知略實有過人者至於佐肅代復兩京不受相位而去代宗順宗之在東宮皆賴泌得安此其大節可重者也舊傳毀之太過家傳出於其子雖難盡信亦豈得盡不信今擇其可信者存之五年初上思李懷光之功欲宥其一子事見二百三十二卷貞元元年戊辰詔以懷光外孫燕八八為懷光後燕於虔翻姓也賜姓名李承緒除左衛率胄曹參軍賜錢千緡使養懷光妻王氏率所律翻養羊尚翻及守其墓祀五年冬十月韋皋遣其將曹章乙十六行本曹作王乙十一行本同退齋校同有道將兵與東蠻兩林蠻及吐蕃青海臘城二節度戰于巂州臺登谷臺登漢縣唐屬巂州斬首二千級投崖及溺死者不可勝數殺其大兵馬使乞藏遮遮乞藏遮遮虜之驍將也既死皋所攻城柵無不下數年盡復巂州之境五年易定節度使張孝忠興兵襲蔚州蔚紆勿翻驅掠人畜詔書責之踰旬還鎮五年瓊州自乾封中為山賊所陷瓊州在海中大洲上中有黎母山黎人居之不輸王賦所謂山賊蓋黎人也宋白曰瓊州北十五里極大海泛大船使西南風帆三日三夜到地名崖山門入江一日至新會縣或便風十日到廣州嶺南節度使李復遣判官薑孟京與崖州刺史張少遷攻拔之五年十二月庚午聞回鶻天親可汗薨戊寅遣鴻臚卿郭鋒册命其子為登里羅沒密施俱録忠貞毗伽可汗先是安西北庭皆假道於回鶻以奏事為吐蕃所隔河隴之路不可由也故假道於回鶻以入奏先悉薦翻北庭去回鶻尤近章乙十六行本近下有回鶻二字乙十一行本同張校同云無注本亦無誅求無厭厭於鹽翻又有沙陀六千餘帳與北庭相依沙陀西突厥別部處月種也居金娑山之陽蒲類海之東有大磧名沙陀故自號沙陀三葛祿葛邏祿三部也一曰謀剌二曰婆匐三曰踏實力在北庭西北金山之西白服突厥新唐書作白眼突厥數所角翻吐蕃因葛祿白服之衆以攻北庭回鶻大相頡干迦斯將兵救之五年雲南雖二於吐蕃亦未敢顯與之絶壬辰韋皋復以書招諭之復扶又翻六年六年春詔出岐山無憂王寺佛指骨迎置禁中又送諸寺以示衆傾都瞻禮施財巨萬施式豉翻二月乙亥遣中使復葬故處六年初朱滔敗於貝州見二百三十一卷興元元年既而得罪於武俊召之不至田緒殘忍其兄朝仕李納為齊州刺史或言納欲納朝於魏緒懼判官孫光佐等為緒謀厚賂納且説納招趙鎬取棣州以悅之為于偽翻説式芮翻因請送朝於京師納從之丁酉鎬以棣州降于納三月武俊使其子士真擊之不克六年回鶻忠貞可汗之弟弒忠貞而自立考異曰新傳曰可汗為少可敦葉公主所毒死可汗之弟乃自立今從實録夏四月次相帥國人殺篡者而立忠貞之子阿啜為可汗年十五相息亮翻帥讀曰率下同六年五月王武俊屯冀州將擊趙鎬鎬帥其屬奔鄆州鄆音運李納分兵據之田緒使孫光佐如鄆州矯詔以棣州隸納武俊怒遣其子士清伐貝州取經城等四縣六年回鶻頡干迦斯與吐蕃戰不利吐蕃急攻北庭北庭人苦於回鶻誅求與沙陀酋長朱邪盡忠皆降於吐蕃為後沙陀來降張本六月頡干迦斯引兵還國次相恐其有廢立與可汗皆出郊迎俯伏自陳亶立之狀曰今日惟大相死生之盛陳郭鋒所齎國信悉以遺之去年唐遣郭鋒册忠貞可汗遺唯季翻兒愚幼若幸而得立惟仰食於阿多國政不敢豫也虜謂父為阿多仰牛向翻唐韻北人呼父曰阿爹爹徒可翻頡干迦斯感其卑屈持之而哭遂執臣禮悉以所遺頒從行者己無所受國中由是稍安秋頡干迦斯悉舉國兵數萬章乙十六行本萬下有召楊襲古四字乙十一行本同孔本同張校同退齋校同將復北庭又為吐蕃所敗敗補邁翻史言回鶻衰亂死者大半襲古收餘衆數百將還西州頡干迦斯紿之曰且與我同至牙帳章乙十六行本帳下有當送君還朝五字乙十一行本同孔本同退齋校同張校云脫當送君還四字無朝字既而留不遣竟殺之安西由是遂絶莫知存亡北庭既陷于吐蕃安西路絶故莫知其音問而西州猶為唐固守為于偽翻葛祿乘勝取回鶻之浮圖川浮圖川在烏德犍山西北悉遷西北部落於牙帳之南以避之遣達北特勒梅録隨郭鋒偕來告忠貞可汗之喪且求册命先是回鶻使者入中國禮容驕慢先悉薦翻刺史皆與之鈞禮梅録至豐州刺史李景略欲以氣加之謂梅録曰聞可汗新沒欲申弔禮景略先據高壟而坐壟即隴字俯低頭也僂曲背也僂力主翻可汗棄代助爾哀慕梅録驕容猛氣索然俱盡索蘇各翻自是回鶻使至皆拜景略於庭威名聞塞外聞音問冬十月辛亥郭鋒始自回鶻還六年十一月庚午上祀圜丘六年上屢詔李納以棣州歸王武俊納百方遷延請以海州易之於朝廷上不許乃請詔武俊先歸田緒四縣上從之十二月納始以棣州歸武俊七年七年春正月己巳襄王僙薨僙肅宗子音戶光翻七年二月癸卯遣鴻臚少卿庾鋋册回鶻奉誠可汗鋋音蟬考異曰實録作康鋋今從新舊傳七年戊戌詔涇原節度使劉昌築平涼故城舊書曰城去原州一百五十里浹辰而畢浹與周禮挾日而斂之挾同鄭注云從甲至甲謂之挾此言浹辰從子至子也史照曰自子至亥曰辰浹辰十二日昌又築朝谷堡舊唐書作胡谷堡東距平涼三十五里甲子詔名其堡曰彰信舊書作彰義七年初上還長安以神策等軍有衛從之勞從才用翻下同皆賜名興元元從奉天定難功臣難乃旦翻宋白曰唐玄宗平內難賜衛士葛福順等為唐元功臣不過十數人德宗駐蹕奉天及幸山南賜從駕立功將校為元從奉天定難功臣谷口已來元從將士賜名元從功臣及僖昭頻年播遷功臣差多至後梁後唐遍及戎卒非賞典也以官領之撫恤優厚禁軍恃恩驕橫橫戶孟翻侵暴百姓陵忽府縣至詬辱官吏府謂京兆府縣謂赤縣畿縣詬呼漏翻詈也府縣官有不勝忿而刑之者勝音升朝笞一人夕貶萬里由是府縣雖有公嚴之官莫得舉其職市井富民往往行賂寄名軍籍則府縣不能制辛巳詔神威六軍吏士與百姓訟者委之府縣小事牒本軍大事奏聞若軍士陵忽府縣禁身以聞北軍十軍左右羽林龍武神武神威神策也神策尤盛建中之前未分左右軍謂之神策六軍者指言神策軍與左右羽林龍武神武六軍也貞元二年以神策左右廂為左右神策軍又以殿前射生左右廂為左右射生軍四年以左右射生軍為左右神威軍北軍遂為十軍此時神策軍既居北軍之右史家書此事又專言神策恃恩陵暴而有是詔則所謂神威六軍者亦當為神策六軍威字誤也此神策六軍提起左右神策軍以及左右龍武神武神威六軍也不及左右羽林軍者羽林置於唐初龍武等軍皆開元以來節次增置於禁衛又親近於羽林也禁身者囚禁其身縣吏輒敢笞辱必從貶謫七年癸未易定節度使張孝忠薨七年安南都護高正平重賦斂安南都護府本交州調露二年置為安南都護府斂力贍翻四月㣥蠻酋長杜英翰等起兵圍都護府正平以憂死㣥蠻聞之皆降史言蠻非好亂苦於貪帥而亂酋慈由翻長知兩翻辛巳置柔遠軍於安南七年端王遇薨遇皇弟也七年韋皋比年致書招雲南王異牟尋比毗至翻韋皋書招雲南事始上卷三年終未獲報然吐蕃每發雲南兵雲南與之益少少詩紹翻皋知異牟尋心附於唐討擊副使段忠義本閣羅鳳使者也閣羅鳳者異牟尋之祖丙申皋遣忠義還雲南並致書敦諭之敦迫也厚也七年秋七月戊寅以定州刺史張升雲為義武留後七年庚辰以虔州刺史趙昌為安南都護㣥蠻遂安七年八月丙午以翰林學士陸贄為兵部侍郎餘職皆解竇參惡之也惡烏路翻下同七年吐蕃攻靈州為回鶻所敗夜遁敗補邁翻九月回鶻遣使來獻俘冬十二月甲午又遣使獻所獲吐蕃酋長尚結心酋慈由翻長知兩翻七年福建觀察使吳湊為治有聲福建皆古閩越地秦為閩中郡漢為冶縣後漢為候官縣吳置建安郡陳置閩州隋改泉州唐移泉州於晉江縣而閩州治閩縣及候官縣而於建安縣立建州建安吳孫策所置縣也以年號為名本亦東候官之地開元十三年又改閩州為福州自此福建泉三州始不相紊治直吏翻且言其病風上召至京師使之步以察之知參之誣由是始惡參為竇參貶逐張本丁酉以湊為陝虢觀察使以代參黨李翼七年睦王述薨述亦皇弟七年吐蕃知韋皋使者在雲南遣使讓之雲南王異牟尋紿之曰唐使本蠻也皋聽其歸耳無他謀也因執以送吐蕃吐蕃多取其大臣之子為質質音致雲南愈怨勿鄧酋長苴夢衝潛通吐蕃扇誘㣥蠻隔絶雲南使者酋慈由翻長知兩翻韋皋遣三部落總管蘇峞將兵至琵琶川峞牛罪翻又音嵬三部落兩林勿鄧豐琶也琵琶川在巂州西南徼外為下卷明年誅夢衝張本容肇祖標點聶崇岐覆校
