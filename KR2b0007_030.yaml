body:
  text: 資治通鑑卷第三十翰林學士朝散大夫右諫議大夫知制誥兼侍講同提舉萬壽觀公事兼判集賢院上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣奉敕編集後學天台音注漢紀二十二建始元年孝成皇帝上之上荀悅曰諱驁字太孫驁之字曰俊應劭曰諡法安民立政曰成建始元年己丑前三二建始元年春正月乙丑悼考廟災宣帝尊史皇孫曰悼考建始元年石顯遷長信中太僕百官表長信中太僕掌皇太后輿馬不常置顯既失倚離權顯嬖於元帝帝崩為失倚自中書令樞機之官遷太后宮官為離權離力智翻及其黨牢梁陳順皆免官顯與妻子徙歸故郡憂悶不食道死顯故濟南人師古曰悶音悶皆廢罷少府五鹿充宗左遷玄菟太守菟音塗守式又翻御史中丞伊嘉為鴈門都尉姓譜伊姓出於伊尹司隸校尉涿郡王尊劾奏丞相衡御史大夫談劾戶概翻又戶得翻知顯等顓權亶勢大作威福為海內患害不以時白奏行罰而阿諛曲從附下罔上懷邪迷國無大臣輔政之義皆不道在赦令前去年七月大赦衡談舉奏顯不自陳不忠之罪而反揚著先帝任用傾覆之徒妄言百官畏之甚於主上卑君尊臣非所宜稱失大臣體於是衡慙懼免冠謝罪上丞相侯印綬衡封樂安侯重傷大臣乃左遷尊為高陵令然㣥下多是尊者衡默默不自安每有水旱連乞骸骨讓位上輒以詔書慰撫不許建始元年立故河間王元弟上郡庫令良為河間王元廢事見上卷元帝建昭元年如淳曰漢北邊郡庫官兵器之所藏故置令建始元年有星孛于營室晉書天文志營室二星天子之宮也一曰玄宮一曰清廟又為軍糧之府及土功事孛蒲內翻建始元年赦天下建始元年壬子封舅諸吏光祿大夫關內侯王崇為安成侯恩澤侯表安成侯食邑於汝南夏四月黃霧四塞元命包曰陰陽亂為霧爾雅曰地氣發天不應曰霧釋名曰霧冒也氣蒙冒地之物也師古曰塞滿也言四方皆滿塞悉則翻無有所諱諫大夫楊興博士駟勝等章十四行本等下有對字乙十一行本同孔本同張校同皆以為陰盛侵陽之氣也高祖之約非功臣不侯今太后諸弟皆以無功為侯外戚未曾有也故天為見異師古曰見顯示也為于偽翻見賢遍翻上書乞骸骨辭職上優詔不許建始元年御史中丞東海薛宣上疏曰陛下至德仁厚而嘉氣尚凝師古曰凝謂不通也殆吏多苛政部刺史或不循守條職師古曰刺史所察本有六條今則踰越故事信意舉劾妄為苛劾也漢官典職儀云刺史班宣周行郡國省察治狀黜陟能否斷治冤獄以六條問事非條所問即不省一條強宗豪右田宅踰制以強陵弱以衆暴寡二條二千石不奉詔書遵承典制倍公向私旁詔牟利侵漁百姓聚斂為姦三條二千石不恤疑獄風厲殺人怒則任刑喜則淫賞煩擾刻暴剝截黎元為百姓所疾山崩石裂訞詳訛言四條二千石選署不平苟阿所愛蔽賢寵頑五條二千石子弟恃怙榮勢請託所監六條二千石違公下比阿附豪強通行貨賂割損正令多與郡縣事師古曰錯置也音千故翻與讀曰豫豫干也至開私門聽讒佞以求吏民過譴呵及細微責義不量力師古曰言求備於人量音良亦內相刻流及衆庶是故鄉黨闕於嘉賓之歡九族忘其親親之恩飲食周急之厚彌衰送往勞來之禮不行師古曰勞郎到翻來郎代翻余謂來讀如字亦通夫人道不通章十四行本通作興乙十一行本同孔本同則陰陽否隔否皮鄙翻和氣不通未必不由此也詩云民之失德乾餱以愆小雅伐木之詩也毛氏曰餱食也鄭氏曰失德謂見謗訕也民尚以乾餱之食獲愆過於人況上之人乎乾音干餱音侯煩苦傷恩方刺史奏事時宜明申敕師古曰申束也謂約束也上嘉納之建始元年八月有兩月相承晨見東方服虔曰相承在上下也應劭曰案京房易傳云君弱如婦為陰所乘則兩月出見賢遍翻建始元年冬十二月作長安南北郊罷甘泉汾陰祠匡衡奏祭天於南郊就陽之義也瘞地於北郊即陰之象也甘泉郊見皇天反北之太陰汾陰祠后土反東之少陽甘泉河東之祠宜徙就正陽太陰之處於長安定南北郊上從之衡又言甘泉泰畤紫壇有文章采鏤黼黻之飾及玉女樂石壇仙人祠瘞鸞路騂駒寓龍非古於是悉罷之師古曰漢舊儀云祭天用六綵綺席六重用玉几玉飾器凡七十女樂即禮樂志所云使童男童女俱歌也二年建始二年春正月罷雍五畤及陳寶祠秦作畤於雍以祠上帝有白青黃赤帝之祠至漢高帝立北畤祠黑帝而五畤具有司進祠上不親往至文帝時始幸雍郊見五畤陳寶者秦文公獲若石於陳倉北阪上祠之其神來常以夜光輝若流星從東方來集於祠城若雄雉其聲殷殷云野雞皆鳴以應之祠以一牢名曰陳寶衡以為不應禮皆奏罷之雍於用翻畤音止辛巳上始郊祀長安南郊赦奉郊縣應劭曰天郊在長安城南地郊在長安城北長陵界中二縣有奉郊之勤故並赦之余按帝紀二縣長安及長陵也師古曰中都官京師諸官府應劭曰輕罪不至於髡完其耐鬢故曰耐古耐字從髮膚之意也杜林以為法度之字皆從寸後改如是耐音若能如淳曰耐猶任也任其事也師古曰依應氏之説耐當音而如氏之説則音乃代翻其義亦兩通耐謂頰旁毛也毛髮貌也音所廉翻又先廉翻而功臣表宣曲侯通耐為鬼薪則應氏之説斯為長矣算四十孟康曰本算百二十今減四十為八十建始二年閏月以渭城延陵亭部為初陵建始二年三月辛丑上始祠后土于北郊建始二年丙午立皇后許氏后車騎將軍嘉之女也元帝傷母恭哀后居位日淺而遭霍氏之辜事見二十四卷宣帝本始三年建始二年上自為太子時以好色聞好呼到翻聞音問及即位皇太后詔采良家女以備後宮大將軍武庫令杜欽此大將軍之軍中武庫令也欽傳軍下更有軍字禮一娶九女所以廣嗣重祖也張晏曰陽數一三五七九九數之極也臣瓚曰天子一娶九女夏殷之制也欽故舉古之約以刺今之奢也説輸苪翻所以養壽塞爭也師古曰媵女之內兄弟之女則謂之姪己之女弟則謂之娣塞絶也復扶又翻塞悉則翻行下孟翻下同則胤嗣有賢聖之君制度有威儀之節則人君有壽考之福廢而不由則女德不厭師古曰由用也從也女德不厭言好色之甚也則壽命不究於高年師古曰究竟也好色未衰婦人四十容貌改前以改前之容侍於未衰之年而不以禮為制則其原不可救而後徠異態後徠異態則正后自疑而支庶有間適之心師古曰間代也音居莧翻適讀曰嫡下亦同是以晉獻被納讒之謗申生蒙無罪之辜晉獻公嬖驪姬驪姬欲立其子讒世子申生獻公信之申生雉經而死被皮義翻未有適嗣方鄉術入學鄉讀曰嚮未親后之議將軍輔政宜因始初之隆建九女之制詳擇有行義之家行下孟翻求淑女之質毋必有聲色技能為萬世大法師古曰惟求淑質無論美色及音聲技能如此則可為萬世法也技渠綺翻夫少戒之在色師古曰論語孔子曰君子有三戒少之時血氣未定戒之在色言好色無節則致損敗故戒之也少詩照翻可為寒心詩小雅也張晏曰小卞刺幽王廢申后而立褒姒黜太子宜咎而立伯服也臣瓚曰小卞之詩太子之傅作也哀太子之放逐愍周室之大壞也卞音盤鳳白之太后太后以為故事無有鳳不能自立法度循故事而已鳳素重欽故置之莫府國家政謀常與欽慮之師古曰慮計也裨正闕失數所角翻當世善政多出於欽者建始二年夏大旱建始二年胸奴呼韓邪單于嬖左伊秩訾兄女二人長女顓渠閼氏長知兩翻下同閼於乾翻氏音支下同生二子長曰且莫車師古曰且音子余翻下且麋胥同車昌遮翻次曰囊知牙斯少女為大閼氏少詩照翻下同生四子長曰雕陶莫皋次曰且麋胥皆長於且莫車少子咸樂二人皆小於囊知牙斯又他閼氏子十餘人顓渠閼氏貴且莫車愛呼韓邪病且死欲立且莫車顓渠閼氏曰胸奴亂十餘年不絶如髮賴蒙漢力故得復安復扶又翻下同今平定未久人民創艾戰鬬師古曰創音初亮翻艾讀曰乂且莫車年少少詩照翻下同百姓未附恐復危國我與大閼氏一家共子師古曰一家言親姊妹也共子兩人所生恩慈無別也大閼氏曰且莫車雖少大臣共持國事今舍貴立賤師古曰舍謂棄置也舍讀曰捨單于卒從顓渠閼氏計立雕陶莫皋卒子恤翻約令傳國與弟呼韓邪死雕陶莫皋立為復株纍若鞮單于師古曰復音服纍力追翻賢曰胸奴謂孝為若鞮自呼韓邪降後與漢親密見漢帝諡常為孝慕之至其子復株纍單于以下皆稱若鞮復株纍若鞮單于以且麋胥為左賢王且莫車為左谷蠡王谷音鹿蠡盧奚翻囊知牙斯為右賢王復株纍單于復妻王昭君生二女長女云為須卜居次小女為當于居次文穎曰須卜氏胸奴貴族也當于亦胸奴大族也師古曰須卜當于皆其夫家氏族三年建始三年春三月赦天下徒建始三年秋關內大雨四十餘日京師民相驚言大水至百姓奔走相蹂躪師古曰蹂踐也躪轢也蹂音人九翻躪音藺號戶高翻呼火故翻長安中大亂天子親御前殿召公卿議大將軍鳳以為太后與上及後宮可御船令吏民上長安城以避水上時掌翻下同㣥臣皆從鳳議左將軍王商獨曰自古無道之國水猶不冒城郭師古曰冒蒙覆也世無兵革上下相安何因當有大水一日暴至此必訛言也師古曰訛偽也治直吏翻重驚百姓師古曰重音直用翻上乃止有頃長安中稍定問之果訛言上於是美壯商之固守數稱其議數所角翻而鳳大慙自恨失言為王鳳排斥王商張本建始三年上欲專委任王鳳八月策免車騎將軍許嘉以特進侯就朝位漢制列侯奉朝請在長安者位次三公賜位特進者在凡列侯之上位亦次三公朝直遙翻建始三年張談坐選舉不實免冬十月光祿大夫尹忠為御史大夫建始三年十二月戊申朔日有食之其夜地震未央宮殿中詔舉賢良方正能直言極諫之士杜欽及太常丞谷永上對續漢志太常丞比千石掌凡行禮及祭祀小事總署曹事漢舊儀曰丞舉廟中非法者嫉妬專上將害繼嗣之咎此蓋指許后及班倢妤也建始三年越巂山崩建始三年丁丑匡衡坐多取封邑四百頃監臨盜所主守直十金以上免為庶人衡本封臨淮郡僮縣之樂安鄉鄉本田提封三千一百頃南以閩陌為界後誤封平陵陌為界多四百頃師古曰十金以上當時律定罪之次若今律條言一尺以上一匹以上四年建始河平元年春正月癸卯隕石于亳四隕于肥纍二漢書五行志亳作稿孟康曰稿肥纍皆縣名故屬真定師古曰稿音工老翻纍音力追翻建始河平元年罷中書宦官初置尚書員五人臣瓚曰漢初中人有中謁者令孝武加中謁者令為中書謁者令置僕射宣帝時任中書官弘恭為令石顯為僕射元帝即位數年恭死顯代為中書令專權用事至帝乃罷其官師古曰漢舊儀云尚書四人為四曹常侍尚書主丞相御史事二千石尚書主刺史二千石事戶曹尚書主庶人上書事主客尚書主外國事帝置五人有三公曹主斷獄事建始河平元年三月甲申以左將軍樂昌侯王商為丞相建始河平元年夏上悉召前所舉直言之士詣白虎殿對策師古曰此殿在未央宮議者多歸咎焉谷永知鳳方見柄用師古曰柄用言任用之授以權也乃曰方今四夷賓服皆為臣妾北無葷粥冒頓之患葷許云翻師古曰粥音弋六翻太史公曰唐虞以上有葷粥孟子曰太王事獯粥冒頓為患見高惠呂后紀南無趙他呂嘉之難趙他見高惠呂后孝文紀呂嘉見孝武紀難乃旦翻靡有兵革之警諸侯大者乃食數縣漢吏制其權柄不得有為無吳楚燕梁之勢吳楚梁見孝景紀燕見孝昭紀親疏相錯師古曰盤互盤結而交互也錯間雜也師古曰申伯周申后之父余據詩嵩高云不顯申伯王之元舅是則申伯乃宣王之舅永正以之況王鳳也師古曰洞洞敬肅也屬屬專謹也洞音動屬音之欲翻無重合安陽博陸之亂師古曰重合侯莽通安陽侯上官桀博陸侯霍禹也余按莽通即馬通事見二十二卷武帝後元元年安陽侯事見二十三卷昭帝元鳳元年霍禹事見二十五卷宣帝地節四年竊恐陛下舍昭昭之白過忽天地之明戒聽暗章十四行本暗作暗乙十一行本同昧之瞽説師古曰舍謂留也暗與暗同又音一感翻瞽説言不中道若無目之人也余謂舍置也讀曰捨倚異乎政事師古曰倚依也師古曰重音直用翻不可之大者也師古曰此則為大不可也抗湛溺之意解偏駁之愛師古曰抗舉也湛讀曰沈駁不周普也湛持林翻平天覆之施使列妾得人人更進覆敷又翻施式智翻更工衡翻益納宜子婦人毋擇好醜毋避嘗字如淳曰王鳳上小妻弟以納後宮以嘗字乳王章言之坐死今永及此為鳳洗前過也仲馮曰按王章言事坐誅在陽朔初而永此對乃是建始四年則非為鳳而言也然觀永前後之文實若為鳳但班固於此對後乃云永為上第擢為光祿大夫則同是建始四年中事余謂此時鳳蓋已納張美人於後宮故永為之言若王章指言鳳過則在陽朔初也推法言之陛下得繼嗣於微賤之間乃反為福得繼嗣而已母非有賤也師古曰苟得子耳勿論其母之貴賤鄭玄曰女史女奴曉書者使令給役後宮無爵秩者也師古曰直當也令音力成翻以遇天所開右師古曰右讀曰佑佑助也慰釋皇太后之憂慍師古曰釋散也慍於問翻則繼嗣蕃滋災異訖息師古曰蕃多也訖止也蕃音扶元翻上皆以其書示後宮擢永為光祿大夫建始河平元年夏四月雨雪雨于具翻建始河平元年秋桃李實建始河平元年大雨水十餘日河決東郡金隄師古曰金隄者河隄之名今在滑州界郡承河下流據溝洫志逡言清河郡承河下流與兗州東郡分水為界先薦翻逡七倫翻易以豉翻頃所以闊無大害者以屯氏河通兩川分流也師古曰闊稀也又益不利屯氏河塞見上卷元帝永光五年塞悉則翻雖高增隄防終不能泄如有霖雨旬日不霽必盈溢師古曰雨止曰霽音子詣翻又音才詣翻九河故迹今既滅難明夏禹疏九河孔安國曰河水分九道在兗州界爾雅曰徒駭一太史二馬頰三覆釜四胡蘇五簡六潔七鉤盤八鬲津九其處易浚師古曰浚謂治導之令其深也浚音峻於以分殺水力道里便宜殺音所介翻減也可復浚以助大河復扶又翻泄暴水備非常不豫修治治直之翻北決病四五郡南決病十餘郡然後憂之晚矣事下丞相御史白遣博士許商行視下遐稼翻師古曰白白於天子也行音下更翻以為方用度不足師古曰言國家少財役也後三歲河果決於館陶及東郡金隄泛濫兗豫及章乙十一行本及作入孔本同平原千乘濟南乘繩證翻濟子禮翻凡灌四郡三十二縣水居地十五萬餘頃深者三丈壞敗官亭室廬且四萬所壞音怪敗補邁翻冬十一月御史大夫尹忠以對方略疏闊上切責其不憂職自殺遣大司農非調師古曰大司農名非調也姓譜非姓也秦非子之後師古曰令其調發均平錢穀遭水之郡使存給也調音徒釣翻師古曰一船為一㮴音先勞翻其字從木居丘陵九萬七千餘口建始河平元年壬戌以少府張忠為御史大夫建始河平元年南山㣥盜傰宗等數百人為吏民害蘇林曰傰音朋晉灼曰音倍師古曰晉音是也詔發兵千人逐捕歲餘不能禽或説大將軍鳳説輸芮翻以賊數百人在轂下師古曰在天子輦轂之下明其逼近也難以示四夷獨選賢京兆尹乃可於是鳳薦故高陵令王尊徵為諫大夫守京輔都尉武帝元鼎四年更置三輔都尉京兆曰京輔都尉馮翊曰左輔都尉扶風曰右輔都尉旬月間盜賊清後拜為京兆尹建始河平元年上即位之初丞相匡衡復奏射聲校尉陳湯武帝置北軍八校尉射聲其一也秩二千石掌待詔射聲士服虔曰工射者也冥冥中聞聲則中之因以名也復扶又翻湯為西域副校尉秩比二千石不正身以先下先悉薦翻而盜所收康居財物戒官屬曰絶域事不覆校言外域之事漢朝務存寬大必不考覆也言其事在竟寧元年七月赦前也處昌呂翻後湯上言康居王侍子非王子按驗實王子也湯下獄當死下遐稼翻太中大夫谷永按是年夏谷永方擢為光祿大夫河平二年議受伊邪莫演降永猶為光祿大夫此書太中大夫谷永據陳湯傳也臣聞楚有子玉得臣文公為之仄席而坐師古曰子玉楚大夫也得臣其名也春秋僖十八年子玉帥師與晉文公戰于城濮楚師敗績晉師三日館穀而文公猶有憂色曰得臣猶在憂未歇也及楚殺子玉公喜而後可知也禮記曰有憂者仄席而坐蓋自貶也為于偽翻仄古側字強秦不敢窺兵井陘師古曰廉頗趙將也馬服君趙奢亦趙將也井陘之口趙之西界山險道也陘音刑胸奴不敢南鄉沙幕景帝以郅都為鴈門太守胸奴素聞都節舉邊為引兵去竟都死不敢近鴈門魏尚事見十五卷文帝十四年鄉讀曰嚮戰克之將國之爪牙不可不重也蓋君子聞鼓鼙之聲則思將帥之臣師古曰禮之樂記曰鼓鼙之聲歡歡以立動動以進衆君子聽鼓鼙之聲則思將帥之臣鼙駢迷翻將即亮翻帥所類翻前斬郅支威震百蠻武暢西海漢元以來征伐方外之將未嘗有也漢元謂漢初也幽囚久繫歷時不決執憲之吏欲致之大辟辟毗亦翻昔白起為秦將南拔郢都北坑趙括以纖介之過賜死杜郵作民憐之莫不隕涕事見周赧王紀席卷喋血萬里之外師古曰如席之卷言其疾也服虔曰喋音蹀屣履之蹀如淳曰殺人流血滂沱為喋血師古曰喋音大頰翻本字當作蹀蹀謂履涉之耳告類上帝張晏曰謂以所征之國事類告天也以言事為罪無赫赫之惡周書曰記人之功忘人之過宜為君者也師古曰尚書之外間書也尚加帷蓋之報師古曰禮記稱孔子云敝帷弗棄為埋馬也敝蓋弗棄為埋狗也竊恐陛下忽於鼙鼓之聲不察周書之意而忘帷蓋之施施式智翻庸臣遇湯卒從吏議師古曰以待庸臣者待湯也卒猶終也卒子恤翻師古曰介然猶耿耿難乃旦翻書奏天子出湯奪爵為士伍會西域都護段會宗為烏孫兵所圍驛騎上書願發城郭敦煌兵以自救城郭謂西域城郭諸國也敦音屯徒門翻鳳言陳湯多籌策習外國事可問上召湯見宣室湯擊郅支時中寒見賢遍翻中竹仲翻病兩臂不屈申湯入見有詔毋拜示以會宗奏湯對曰臣以為此必無可憂也上曰何以言之湯曰夫胡兵五而當漢兵一何者兵刃朴鈍弓弩不利今聞頗得漢巧然猶三而當一又兵法曰客倍而主人半然後敵此言憑城而守者主人之半可以敵客之倍唯陛下勿憂且兵輕行五十里重行三十里今會宗欲發城郭敦煌歷時乃至所謂報讎之兵非救急之用也上曰奈何其解可必乎度何時解度徒洛翻湯知烏孫瓦合不能久攻師古曰謂如碎瓦之雜居不齊同師古曰故事謂以舊事測之已解矣屈指計其日曰不出五日當有吉語聞師古曰吉善也善謂兵解之事軍書到言已解大將軍鳳奏以為從事中郎莫府事一決於湯續漢志大將軍府有從事中郎二人秩六百石職參謀議河平元年癸巳前二八以河決隄塞輒平改元建始河平元年春杜欽薦犍為王延世於王鳳使塞決河犍居言翻塞悉則翻鳳以延世為河隄使者延世以竹落長四丈大九圍盛以小石長直亮翻盛時征翻兩船夾載而下之三十六日河隄成三月詔以延世為光祿大夫秩中二千石賜爵關內侯黃金百斤建始河平元年夏四月己亥晦日有食之詔公卿百僚陳過失無有所諱大赦天下光祿大夫劉向對曰四月交於五月月同孝惠日同孝昭孝惠七年五月丁卯先晦一日日食今四月己亥晦而日食故曰四月交於五月月同孝惠孝昭元年七月己亥晦日食故曰日同孝昭二帝尋皆晏駕而無嗣是時許皇后專寵後宮希得進見見賢遍翻中外皆憂上無繼嗣故杜欽谷永及向所對皆及之上於是減省椒房掖庭用度師古曰椒房殿皇后所居以椒和泥塗壁取其溫且芬也遺賜外家㣥臣妾師古曰外家謂后之家族言在外也劉向曰婦人內夫家而外父母家遺于季翻皇后上書自陳以為時世異制長短相補不出漢制而已纖微之間未必可同若竟寧前與黃龍前豈相放哉晉灼曰竟寧元帝時也黃龍宣帝時也言二帝奢儉不同豈相放哉師古曰放依也音甫往翻師古曰家吏皇后之官屬且使妾搖手不得設妾欲作某屏風張於某所曰故事無有或不能得則必繩妾以詔書矣師古曰言或有所求吏不肯備因云詔書不許也繩約也唯陛下省察省悉井翻故事以特牛祠大父母戴侯敬侯皆得蒙恩以太牢祠一牲曰特三牲備為一牢平恩戴侯許廣漢后父嘉紹其封於后為祖樂成敬侯許延壽后父嘉所自出也嘉繼大宗延壽於后為叔祖謂將復以特牛祠也今吏甫受詔讀記師古曰甫始也非可復若私府有所取也師古曰若謂如未奉詔之前也復扶又翻下同恐失人理師古曰萌牙言其初始發意若草木之方生也上於是采谷永劉向所言災異咎驗皆在後宮之意以報之且曰吏拘於法亦安足過過罪過也言何足以為罪也古今同之師古曰矯正也枉曲也言意在正曲送過於直特牛之祠其於皇后所以扶助德美為華寵也咎根不除災變相襲師古曰襲重纍也何戴侯也傳不云乎以約失之者鮮師古曰論語載孔子之言鮮少也謂能行儉約而有過失之事如此者少也鮮音先踐翻師古曰與讀曰歟朕亦當法孝武皇帝也如此則甘泉建章可復興矣孝文皇帝朕之師也皇太后皇后成法也假使太后在彼時不如職今見親厚又惡可以踰乎師古曰言假令太后昔時不得其志不依常理而皇后今被親厚何可踰於太后制度乎婦不可踰姑也惡音烏謙約為右師古曰以謙約為先使有法焉師古曰言垂法於後宮使皆遵行也建始河平元年給事中平陵平當上言太上皇漢之始祖廢其寢廟園非是事見上卷元帝竟寧元年遂納當言秋九月復太上皇寢廟園建始河平元年詔曰今大辟之刑千有餘條律令煩多百有餘萬言奇請他比日以益滋師古曰奇請謂常文之外主者別有所請以定罪也他比謂引他類以比附之稍增律條也奇音居宜翻欲以曉喻衆庶不亦難乎於以羅元元之民夭絶無辜豈不哀哉由從也羅謂設禁網而民無所逃罪也夭絶亡辜謂亡罪而陷於刑辟死於非命至於短折也夭於紹翻令較然易知條奏易以豉翻時有司不能廣宣上意徒鉤托微細毛舉數事以塞詔而已師古曰毛舉言舉毫毛之事輕小之甚塞猶當也塞悉則翻建始河平元年胸奴單于遣右皋林王伊邪莫演等奉獻朝正月師古曰演音衍朝直遙翻考異曰胸奴傳河平元年單于遣莫演朝正月下云明年單于上書願朝河平四年正月遂入朝據此則是莫演以元年至漢朝二年正月也而荀紀繫於元年正月之下恐誤漢紀又以莫演為黃渾今從漢書二年建始二年春伊邪莫演罷歸朝罷遣歸也欲降降戶江翻下同即不受我我自殺終不敢還歸使者以聞下公卿議下遐稼翻議者或言宜如故事受其降光祿大夫谷永議郎杜欽以為漢興胸奴數為邊害數所角翻故設金爵之賞以待降者今單于屈體稱臣列為北藩遣使朝賀無有二心漢家接之宜異於往時今既享單于聘貢之質師古曰享當也質誠也是貪一夫之得而失一國之心擁有罪之臣而絶慕義之君也假令單于初立師古曰假令猶言或當也未知利害私使伊邪莫演詐降以卜吉凶受之虧德沮善令單于自疏疏與疏同或者設為反間間居莧翻欲因以生隙受之適合其策使得歸曲而責直師古曰歸曲於漢而以直義來責也師旅動靜之首不可不詳也不如勿受以昭日月之信抑詐諼之謀懷附親之心便師古曰諼詐辭也音許遠翻又許元翻對奏天子從之遣中郎將王舜往問降狀伊邪莫演曰我病狂妄言耳遣去歸到官位如故不肯令見漢使史言永欽能得胸奴之情建始二年夏四月楚國雨雹雨于具翻大如釜建始二年徙山陽王康為定陶王建始二年六月上悉封諸舅王談為平阿侯商為成都侯立為紅陽侯根為曲陽侯逢時為高平侯思澤侯表平阿侯食邑於沛成都侯食邑於山陽紅陽侯食邑於南陽曲陽侯食邑於九江高平侯食邑於淮故世謂之五侯太后母李氏更嫁為河內苟賓妻據太后傳母李以妬去更嫁更工衡翻太后欲以田蚡為比而封之李荀曰田蚡與孝景王后同母異父得封故也蚡扶粉翻師古曰比例也音頻寐翻封田氏非正也以參為侍中水衡都尉建始二年御史大夫張忠奏京兆尹王尊暴虐倨慢尊坐免官吏民多稱惜之湖三老公乘興等師古曰湖縣名也今虢州湖城縣取其名地理志湖縣屬京兆公乘以爵為姓乘繩證翻尊治京兆撥劇整亂誅暴禁邪皆前所希有名將所不及此將謂郡將也治直之翻將即亮翻尊自行尹事為真今御史大夫奏尊傷害陰陽為國家憂無承用詔書意靖言庸違象恭滔天師古曰引虞書堯典之辭也靖治也庸用也違僻也滔漫也謂其言假託於治實用違僻貌象恭敬過惡漫天也漫音莫干翻一曰慆慢也出御史丞楊輔御史大夫有兩丞秩千石一曰中丞外依公事建畫為此議傅致奏文師古曰建立謀畫為此議也傅讀曰附謂益其事而引致於罪狀據尊傳輔故為尊書佐嘗醉過尊大奴利家利家捽搏其頰兄子閎拔刀欲剄之以故深怨欲傷害尊師古曰浸潤猶漸梁也尊修身潔己砥節首公師古曰砥厲也首向也砥音指首音式救翻誅惡不避豪強誅不制之賊賊謂傰宗等功著職修威信不廢誠國家爪牙之吏折衝之臣今一旦無辜制於仇人之手傷於詆欺之文上不得以功除罪下不得蒙棘木之聽張晏曰周禮三槐九棘公卿於下聽訟王制大司寇聽獄於棘木之下棘者欲其赤心而留意於三刺也被共工之大惡仲馮曰共工之大惡謂上劾奏云靖言庸違象恭滔天是也被皮義翻共音恭尊以京師廢亂㣥盜並興選賢徵用起家為卿賊亂既除豪猾伏辜即以佞巧廢黜一尊之身三期之間師古曰期年也期音基豈不甚哉孔子曰愛之欲其生惡之欲其死是惑也論語所載答樊遲之言惡烏路翻可謂明矣答子張之言下戶嫁翻行下孟翻夫人臣而傷害陰陽死誅之罪也靖言庸違放殛之刑也師古曰殛誅也音居力翻審如御史章尊乃當伏觀闕之誅張晏曰孔子誅少正卯於兩觀之間觀古玩翻不得苟免師古曰非止坐免官而已也當獲選舉之辜不可但已任保也漢法選舉而其人不稱者與同罪飾文深詆以訴無罪亦宜有誅以懲讒賊之口絶詐欺之路師古曰懲創也使白黑分別別彼列翻書奏天子復以尊為徐州刺史徐州部琅邪東海臨淮等郡及楚廣陵等國復扶又翻下同建始二年夜郎王興鉤町王禹漏臥侯俞更舉兵相攻孟康曰漏臥夷邑名後為縣地理志夜郎銘町漏臥三縣皆屬牂柯郡鉤町音劬梃師古曰俞音踰牂柯音臧哥議者以為道遠不可擊乃遣太中大夫蜀郡張匡持節和解興等不從命刻木象漢吏立道旁射之射面亦翻杜欽説大將軍王鳳曰蠻夷王侯輕易漢使不憚國威説榆芮翻易以豉翻恐議者選耎復守和解師古曰選耎怯不前之意也選音息兗翻耎音人兗翻乃以聞如此則復曠一時師古曰曠空也一時三月也言空廢一時不旱發兵也申固其謀黨助衆多各不勝忿勝音升下同必相殄滅自知罪成狂犯守尉師古曰言起狂勃之心而殺守尉也臧古藏字通賁育士師古曰孫孫武吳吳起賁孟賁育夏育也將即亮翻賁音奔往必焦沒智勇亡所施亡讀曰無屯田守之費不可勝量量音良宜因其罪惡未成未疑漢家加誅陰敕旁郡守尉練士馬師古曰練簡也守式又翻下同調徒釣翻選任職太守往以秋涼時人誅其王侯尤不軌者即以為不毛之地無用之民聖王不以勞中國師古曰即猶若也不毛言不生草木放棄其民絶其王侯勿復通復扶又翻如以先帝所立纍世之功不可墮壞師古曰墮音火規翻毀也亦宜因其萌牙早斷絶之及已成形然後戰師則萬姓被害斷丁管翻下同被皮義翻於章十四行本於上有大將軍鳳四字乙十一行本同孔本同是鳳章十四行本無鳳字乙十一行本同孔本同薦金城司馬臨邛陳立為牂柯太守漢列郡守尉之下有長史司馬地理志臨邛縣屬蜀郡邛音渠容翻立至牂柯諭告夜郎王興興不從命立請誅之未報乃從吏數十人出行縣行下孟翻至興國且同亭師古曰且音子餘翻按地理志夜郎縣王莽改曰同亭蓋因亭以名縣也召興興將數千人往至亭從邑君數十人入見立按西南夷傳夷人椎結耕田有邑聚各有君長因斷頭數所具翻邑君曰將軍誅無狀為民除害為于偽翻願出曉士衆以興頭示之皆釋兵降師古曰釋解也降戶江翻入粟千斛牛羊勞吏士勞力到翻立還歸郡興妻父翁指與子邪務收餘兵迫脅旁二十二邑反至冬立奏募諸夷與都尉長史分將攻翁指等將即亮翻翁指據阣為壘立使奇兵絶其餉道餉與餉同音式亮翻縱反間以誘其衆間居莧翻誘音酉都尉萬年曰兵久不決費不可共師古曰共讀曰供引兵獨進敗走趨立營師古曰趨讀曰趣趣向也音七喻翻立怒叱戲下令格之戲讀曰麾都尉復還戰立救之時天大旱立攻絶其水道蠻夷共斬翁指持首出降西夷遂平考異曰西夷傳但云河平中而胡旦漢春秋云在此年十一月未知何據也三年建始三年春正月楚王囂來朝囂宣帝子於帝為叔父乙亥詔以囂素行純茂特加顯異封其子勳為廣戚侯廣戚侯國屬沛郡行下孟翻建始三年丙戌犍為地震山崩壅江水水逆流犍居言翻建始三年秋八月乙卯晦日有食之建始三年上以中祕書頗散亡師古曰言中以別外藝文志曰武帝建藏書之策劉歆曰外則有太常太史博士之藏內則有延閣廣內祕室之府詔光祿大夫劉向校經傳諸子詩賦步兵校尉任宏校兵書百官表步兵校尉掌上林苑門屯兵武帝所置八校尉之一也任音壬校尉之校戶教翻餘並居效翻百官表太史令屬太常師古曰數術占卜之書侍醫屬太醫令在天子左右者也師古曰方技醫藥之書也技音渠綺翻向輒條其篇目撮其指意録而奏之已終也竟也師古曰撮總取也音千括翻建始三年劉向以王氏權位太盛而上方嚮詩書古文向乃因尚書洪範集合上古以來歷春秋六國至秦漢符瑞災異之記推迹行事連傅禍福傅讀曰附著其占驗比類相從各有條目凡十一篇號曰洪範五行傳論奏之天子心知向忠精故為鳳兄弟起此論也為于偽翻然終不能奪王氏權建始三年河復決平原流入濟南千乘所壞敗者半建始時復扶又翻下同濟子禮翻乘繩證翻壞音怪敗補邁翻復遣王延世與丞相史楊焉及將作大匠許商百官表曰將作少府秦官掌治宮室景帝中六年更名將作大匠孟康曰乘馬姓也師古曰乘音食證翻乃成復賜延世黃金百斤治河卒非受平賈者為著外繇六月蘇林曰平賈以錢取人作卒顧其時庸之平賈也如淳曰律説平賈一月得錢二千又筆説戍邊一歲常罷若有急當留守六月今以卒治河之故復留六月孟康曰外繇戍邊也治水不復戍邊也師古曰如孟二説皆非也以卒治河有勞雖執役日近皆得比繇戍六月也著謂著簿籍也治直之翻賈讀曰價著音竹助翻繇讀曰徭四年建始四年春正月胸奴單于來朝建始四年赦天下徒建始四年三月癸丑朔日有食之建始四年琅邪太守楊肜與王鳳連昏如淳曰連昏者昏家之姻親也肜音以中翻丞相王商按問之鳳以為請商不聽竟奏免肜奏果寢不下下遐稼翻下同鳳以是怨商陰求其短使頻陽耿定上書頻陽縣屬左馮翊商與父傅婢通及女弟淫亂奴殺其私夫師古曰私夫女弟之私與姦通者天子以為暗昧之過不足以傷大臣鳳固爭下其事司隸句斷下遐嫁翻太中大夫蜀郡張匡素佞巧復上書極言詆毀商復扶又翻有司奏請召商詣詔獄上素重商知匡言多險制曰勿治治直之翻鳳固爭之夏四月壬寅詔收商丞相印綬商免相三日發病歐血薨諡曰戾侯而商子弟親屬為駙馬都尉侍中中常侍諸曹大夫郎吏者皆出補吏莫得留給事宿衛者有司奏請除國邑有詔長子安嗣爵為樂昌侯宣帝之母黨微矣建始四年上之為太子也受論語於蓮勺張禹蓮勺音輦酌及即位賜爵關內侯拜為諸吏光祿大夫秩中二千石給事中領尚書事禹與王鳳並領尚書內不自安數病上書乞骸骨數所角翻下同欲退避鳳上不許撫待愈厚六月丙戌以禹為丞相封安昌侯恩澤侯表安昌侯食邑於汝南建始四年庚戌楚孝王囂薨建始四年初武帝通西域罽賓自以絶遠漢兵不能至獨不服罽賓國治循鮮城去長安萬二千二百里不屬都護罽音計數所角翻師古曰剽劫也音頻妙翻久之漢使者文忠與容屈王子陰末赴合謀攻殺其王王曰烏頭勞即數殺漢使者也後軍候趙德使罽賓與陰末赴相失陰末赴鎖琅當德師古曰相失相失意也琅當長鎖也若今之禁繫人鎖矣琅音郎遣使者上書謝孝元帝以其絶域不録放其使者於縣度縣度在烏秅國西縣度者石山也溪谷不通以繩索相引而度縣古懸字通師古曰懸繩而度也烏秅鄭氏音鷃拏師古曰烏音一加翻秅音直加翻急言之聲如鷃拏耳非正音也及帝即位復遣使謝罪復扶又翻下同漢欲遣使者報送其使杜欽説王鳳曰前罽賓王陰末赴本漢所立後卒畔逆説輸芮翻卒子恤翻夫德莫大於有國子民罪莫大於執殺使者所以不報恩不懼誅者自知絶遠兵不至也有求則卑辭無欲則驕慢終不可懷服凡中國所以為通厚蠻夷愜快其求者為壤比而為寇師古曰比近也為其土壤接近能為寇也愜音苦頰翻為壤之為于偽翻比毗寐翻厄非罽賓所能越也其鄉慕不足以安西域鄉讀曰嚮雖不附不能危城郭前親逆節惡暴西域師古曰暴謂章露也今悔過來而無親屬貴人奉獻者皆行賈賤人賈音古下同欲通貨市買以獻為名故煩使者送至縣度恐失實見欺凡遣使送客者欲為防護寇害也為于偽翻起皮山南更不屬漢之國四五皮山國去長安萬五千里師古曰言經歷不屬漢者凡四五國更音工衡翻五分夜擊刁斗自守師古曰夜有五更分而持之驢畜負糧須諸國稟食得以自贍師古曰稟給也贍足也食讀曰飼下同或桀黠不肯給黠下八翻擁強漢之節餒山谷之間乞丐無所得師古曰丐亦乞也音工大翻則人畜棄捐曠野而不反又歷大頭痛小頭痛之山赤土身熱之阪令人身熱無色頭痛嘔吐驢畜盡然嘔一口翻吐土故翻畜許救翻下同又有三池盤石阪道狹者尺六七寸長者徑三十里臨崢嶸不測之深狹與狹同師古曰崢嶸深險之貌崢音仕耕翻嶸音宏余謂崢嶸山峻貌騎奇寄翻繩索相引索昔各翻二千餘里乃到縣度畜墜未半坑谷盡靡碎師古曰靡散也音縻人墮勢不得相收視險阻危害不可勝言勝音升聖王分九州制五服師古曰九州冀兗豫青徐荊揚梁雍也五服甸侯綏要荒余謂此言禹迹也周職方九州有幽並無徐梁又分為九服不求外今遣使者承至尊之命送蠻夷之賈勞吏士之衆涉危難之路賈音古難乃旦翻罷敝所恃以事無用師古曰罷讀曰疲所恃謂中國之人無用謂遠方蠻夷之國非久長計也使者業已受節可至皮山而還師古曰言已立計遣之不能即止可至皮山也罽賓實利賞賜賈市賈音古其使數年而一至云陽朔元年丁酉前二四應劭曰時陰盛陽微故改元曰陽朔欲陽氣之蘇息也師古曰應説非也朔始也以山陽火生石中言陽氣之始建始四年春二月丁未晦日有食之建始四年三月赦天下徒建始四年冬京兆尹泰山王章下獄死下遐嫁翻時大將軍鳳用事上謙讓無所顓左右嘗薦光祿大夫劉向少子歆通達有異材上召見歆誦讀詩賦甚悅之欲以為中常侍百官表中常侍加官得出入禁中蓋此時以士人為之東都始純用宦者臨當拜左右皆曰未曉大將軍師古曰曉猶白余謂曉開諭也此小事何須關大將軍左右叩頭爭之上於是語鳳鳳以為不可乃止劉向忠於漢室子歆附從王莽得無由此邪爵賞之柄不自上出則貪爵祿苟富貴之人視其柄所在而趨之矣語牛倨翻王氏子弟皆卿大夫侍中諸曹分據勢官滿朝廷杜欽見鳳專政泰重戒之曰願將軍由周公之謙懼損穰侯之威放武安之欲毋使范睢之徒得間其説周公輔成王管蔡流言周公狼跋而東其懼可知矣吐握以下士其謙可知矣穰侯范睢事見周紀武安侯田蚡事見武帝紀間居莧翻時上無繼嗣體常不平師古曰言多疾疢共讀曰恭下同太后與上承先帝意遇共王甚厚賞賜十倍於他王不以往事為纖介師古曰往事謂先帝時欲以代太子也言無纖介之嫌怒不遣歸國上謂共王我未有子人命不諱師古曰人命無常不可諱師古曰他謂晏駕也復扶又翻爾長留侍我矣其後天子疾益有瘳共王因留國邸定陶邸也上甚親重之大將軍鳳心不便共王在京師會日食鳳因言日食陰盛之象定陶王雖親於禮當奉藩在國今留侍京師詭正非常師古曰詭違也見賢遍翻宜遣王之國上不得已於鳳而許之共王辭去上與相對涕泣而決決與訣同別也王章素剛直敢言雖為鳳所舉章以選為京兆鳳所舉也不親附鳳乃奏封事言日食之咎皆鳳專權蔽主之過上召見章延問以事見賢遍翻章對曰天道聰明佑善而災惡以瑞應章十四行本應作異乙十一行本同為符效今陛下以未有繼嗣引近定陶王近其靳翻所以承宗廟重社稷上順天心下安百姓此正議善事當有祥瑞何故致災異災異之發為大臣專政者也為于瑞翻今聞大將軍猥歸日食之咎於定陶王師古曰猥猶曲也師古曰建立其議也顓亶朝事以便其私非忠臣也朝直遙翻且日食陰侵陽臣顓君之咎今政事大小皆自鳳出天子曾不一舉手鳳不內省責省悉井翻反歸咎善人推遠定陶王推吐雷翻遠于願翻且鳳誣罔不忠非一事也前丞相樂昌侯商本以先帝外屬商宣帝舅王武之子行下孟翻有威重位歷將相國家柱石臣也其人守正不肯屈節隨鳳委曲卒用閨門之事為鳳所罷卒子恤翻身以憂死衆庶愍之又鳳知其小婦弟張美人已嘗適人師古曰小婦妾也弟謂女弟即妹也今欲猶謂妾為小妻託以為宜子內之後宮苟以私其妻弟聞張美人未嘗任身就館也師古曰是則不為宜子明鳳所言非實婦人將生子及月辰出就他館任讀曰妊師古曰蕩洗滌也言婦初來所生之子或他姓而近已出之女也已出謂已出嫁也近其靳翻陛下所自見足以知其餘及他所不見者師古曰以所見者譬之則不見者可知宜退使就第選忠賢以代之自鳳之白罷商後遣定陶王也上不能平及聞章言天子感寤納之謂章曰微京兆尹直言師古曰微無也且唯賢知賢君試為朕可以自輔者為于偽翻下同於是章奏封事薦信都王舅琅邪太守馮野王忠信質直智謀有餘章乙十一行本餘下有以王舅出以賢復入明聖主樂進賢也十五字上自為太子時數聞野王名章乙十一行本王下有先帝二字名下有卿聲譽出鳳遠甚七字數所角翻方倚章十四行本倚下有欲字乙十一行本同孔本同以代鳳章每召見上輒辟左右見賢遍翻師古曰辟讀曰闢時太后從弟子侍中音元后傳曰太后從弟長樂衛尉弘子侍中音師古曰弘者太后之叔父也音則從父弟余據後云音以從舅用事則顏注良是具知章言以語鳳語牛倨翻鳳聞之甚憂懼杜欽令鳳章乙十一行本鳳下有稱病二字張校同出就第上疏乞骸骨其辭指甚哀太后聞之為垂涕不御食為于偽翻御進也上少而親倚鳳少詩照翻弗忍廢乃優詔報鳳強起之強其兩翻於是鳳起視事上使尚書劾奏章知野王前以王舅出補吏而私薦之成帝立有司奏野王王舅不宜備九卿出為上郡太守阿附諸侯朝直遙翻又知張美人體御至尊而妄稱引羌胡殺子蕩腸非所宜言下章吏下遐稼翻廷尉致其大逆罪致文致也比上夷狄欲絶繼嗣之端背畔天子背蒲妹翻私為定陶王章竟死獄中妻子徙合浦合音蛤自是公卿見鳳側目而視馮野王懼不自安遂病滿三月賜告與妻子歸杜陵就醫藥大將軍鳳風御史中丞劾奏野王師古曰風讀曰諷劾戶概翻又戶得翻賜告養病而私自便師古曰便安也音頻而翻持虎符出界歸家奉詔不敬杜欽奏記於鳳曰二千石病賜告得歸有故事不得去郡亡著令如淳曰律施行無不得去郡之文也亡讀曰無所以廣恩勸功也師古曰疑當賞不當賞則與之疑厚薄則從厚豫讀曰與所以慎刑闕難知也師古曰疑當罰不當罰則赦之疑輕重則從輕去謂赦之也師古曰釋廢去也假謂假託法律以致其罪之意即以二千石守千里之地任兵馬之重任音壬不宜去郡將以制刑為後法者則野王之罪在未制令前也刑賞大信不可不慎鳳不聽竟免野王官時衆庶多冤王章譏朝廷者欽欲救其過復説鳳曰京兆尹章所坐事密自京師不曉況於遠方恐天下不知章實有罪而以為坐言事如是塞爭引之原復扶又翻下同説輸芮翻塞悉則翻爭讀曰諍師古曰爭引謂引事類以諫爭之也一曰下有諫爭之言上引而納之也損寬明之德欽愚以為宜因章事舉直言極諫並見郎從官從才用翻展盡其意加於往前以明示四方使天下咸知主上聖明不以言罪下也若此則流言消釋疑惑著明鳳白行其策焉杜欽之罪浮於谷永以其與王鳳計議為之文過也建始四年是歲陳留太守薛宣為左馮翊宣為郡所至有聲迹宣子惠為彭城令宣嘗過其縣心知惠不能不問以吏事或問宣何不教戒惠以吏職宣笑曰吏道以法令為師可問而知及能與不能自有資材何可學也衆人傳稱以宣言為然時人雖以宣言為然實未必然也二年建始二年春三月大赦天下建始二年御史大夫張忠卒建始二年夏四月丁卯以侍中太僕王音為御史大夫於是王氏愈盛郡國守相刺史皆出其門下師古曰言為其家寮屬者皆得大官按元后傳王鳳兄弟八人鳳崇以與元后同母先侯談商立根逢時同日侯世謂之五侯曼乃五侯之兄早死不侯五侯無㣥弟疑㣥字當作兄四面而至皆通敏人事好士養賢傾財施豫以相高尚遺于季翻好呼到翻施式豉翻豫讀曰與賓客滿門競為之聲譽劉向謂陳湯曰今災異如此而外家日盛其漸必危劉氏吾幸得以同姓末屬纍世蒙漢厚恩身為宗室遺老歷事三主三主宣元成每進見常加優禮見賢遍翻吾而不言孰當言者遂上封事極諫曰臣聞人君莫不欲安然而常危莫不欲存然而常亡失御臣之術也夫大臣操權柄持國政未有不為害者也操千高翻故書曰臣之有作威作福害于而家凶于而國師古曰周書洪範也而汝也言唯君得作威作福臣下為之則致凶害也政逮大夫危亡之兆也臣瓚曰政不由君下及大夫也師古曰論語孔子曰祿之去公室五世矣政逮於大夫四世矣故夫三桓之子孫微矣乘朱輪華轂者二十三人青紫貂蟬充盈幄內魚鱗左右漢制列侯紫綬二千石青綬侍中中常侍皆銀璫左貂金附蟬師古曰言在帝之左右相次若魚鱗也五侯驕奢僭盛並作威福擊斷自恣行汙而寄治身私而託公師古曰內為汙私之行而外則寄託治公之道也斷丁亂翻行下孟翻師古曰東宮太后所居也余按漢制太后率居長樂宮在未央宮東故曰東宮以為威重尚書九卿州牧郡守皆出其門管執樞機朋黨比周比毗至翻稱譽者登進忤恨者誅傷遊談者助之説執政者為之言譽音余忤五故翻為于偽翻排擯宗室孤弱公族其有智能者尤非毀而不進遠絶宗室之任不令得給事朝省遠于願翻朝直遙翻恐其與己分權數稱燕王蓋主以疑上心燕蓋事見昭帝紀師古曰以示宗室親近而反逆也數所角翻呂氏事見呂后紀霍氏事見宣帝紀師古曰呂霍二家皆坐專亶誅滅故為王氏諱而不言也外假周公之論兄弟據重宗族磐互歷上古至秦漢外戚僭貴未有如王氏者也物盛必有非常之變先見為其人微象言伏於微而著於象也見賢遍翻冠石立於泰山仆柳起於上林事見二十三卷昭帝元鳳三年今王氏先祖墳墓在濟南者王氏本濟南東平陵人武帝時繡衣御史王賀既免官乃徙居魏郡元城扶疏上出屋根地中康曰測洽切余按字書測洽之從干從臼與今字不同漢書作根垂地中意即垂字也無以過此之明也事勢不兩大王氏與劉氏亦且不並立如下有泰山之安則上有纍卵之危陛下為人子孫守持宗廟而令國祚移於外親降為皂隸師古曰皂隸卑賤之人也春秋左氏傳曰大夫臣士士臣皂皂臣輿輿臣隸也為于偽翻奈宗廟何婦人內夫家而外父母家此亦非皇太后之福也如淳曰內猶親也而皇太后反外夫家也所以全安之也平昌侯王無故宣帝舅也銷患於未然宜發明詔吐德音援近宗室親而納信師古曰援引也謂升引而附近之也援音爰近其靳翻毋授以政師古曰遠謂疏而離之也音于萬翻皆罷令就弟弟與第同漢書率作弟孟康曰第宅也有甲乙次第也亦作弟厚安外戚全其宗族誠東宮之意外家之福也王氏永存保其爵祿劉氏長安不失社稷所以褒睦外內之姓子子孫孫無疆之計也如不行此策田氏復見於今六卿必起於漢田氏篡齊六卿分晉言漢亦將有此禍也復扶又翻昭昭甚明唯陛下深留聖思書奏天子召見向歎息悲傷其意謂曰君且休矣吾將思之然終不能用其言建始二年秋關東大水建始二年八月甲申定陶共王康薨建始二年是歲徙信都王興為中山王容肇祖標點顧頡剛聶崇岐覆校
