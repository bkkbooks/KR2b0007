body:
  text: 資治通鑑卷第二百五十一端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀六十七懿宗昭聖恭惠孝皇帝中咸通九年咸通九年戊子八六八咸通九年夏六月鳳翔少尹李師望上言巂州控扼南詔為其要衝成都道遠難以節制請建定邊軍屯重兵於巂州以邛州為理所理所猶言治所也上時掌翻巂音髓邛渠容翻以師望為巂州刺史充定邊軍節度眉蜀邛雅嘉黎等州觀察統押諸蠻並統領諸道行營制置等使師望利於專制方面故建此策其實邛距成都才百六十里巂距邛千里其欺罔如此為李師望以定邊軍致寇張本咸通九年初南詔陷安南見上卷四年分八百人別戍桂州初約三年一代徐泗觀察使崔彥曾慎由之從子也崔慎由始見上卷宣宗大中十一年從才用翻下從孫同朝廷以徐兵驕命鎮之都押牙尹戡教練使杜璋大中六年五月敕天下軍府有兵馬處宜選會兵法能弓馬等人充教練使每年合教習時常令教習軍中怨之戍桂州者已六年屢求代還戡言於彥曾以軍帑空虛帑他朗翻發兵所費頗多請更留戍卒一年彥曾從之戍卒聞之怒都虞候許佶佶其吉翻軍校趙可立姚周張行實皆故徐州㣥盜州縣不能討招出之補牙職會桂管觀察使李叢移湖南新使未至校戶教翻使疏吏翻秋七月佶等作亂殺都將王仲甫將即亮翻推糧料判官龐勛為主唐制凡行軍置隨軍糧料使兵少者置糧料判官勛許云翻所過剽掠劫桂州庫兵北歸徐州還音旋又如字剽匹妙翻朝廷聞之八月遣高品張敬思赦其罪新書百官志內侍省有高品一千六百九十六人戍卒乃止剽掠咸通九年以前靜海節度使高駢為右金吾大將軍駢請以從孫潯代鎮交趾從之潯徐林翻考異曰補國史曰高公姪孫潯將先鋒軍每遇陳敵身當矢石及高公內舉交代朝廷命潯節制交趾實録但云高潯以下勒姓名於碑陰不云潯為節度使新傳曰駢之戰其從孫潯常為先鋒冒矢石以勸士駢徙天平薦潯自代詔拜交州節度使按駢為金吾半歲始除天平今從補國史咸通九年九月戊戌以山南東道節度使盧耽為西川節度使以有定邊軍之故不領統押諸蠻安撫等使既分西川置定邊軍則諸蠻皆在定邊軍巡內咸通九年龐勛等至湖南湖南觀察治潭州使悉輸其甲兵誘音酉山南東道節度使崔鉉嚴兵守要害徐卒不敢入境泛舟沿江東下許佶等相與謀曰吾輩罪大於銀刀銀刀見上卷三年慮緣道攻劫或潰散為患耳若至徐州必葅醢矣乃各以私財造甲兵旗幟幟昌志翻過浙西入淮南淮南節度使令狐綯遣使慰勞給芻米勞力到翻芻以飼馬米以給軍都押牙李湘言於綯曰徐卒亶歸勢必為亂雖無敕令誅討藩鎮大臣當臨事制宜高郵岸峽章十二行本峽作峻乙十一行本同張校同云無注本作峽而水深狹請將奇兵伏於其側焚荻舟以塞其前塞悉則翻以徑兵蹙其後可盡擒也不然縱之使得渡淮至徐州與怨憤之衆合為患必大綯素懦怯且以無敕書乃曰彼在淮南不為暴聽其自過餘非吾事也勛招集銀刀等都竄匿及諸亡命匿於舟中衆至千人丁巳至泗州泗州晉宋宿豫之地後魏置南徐州又置宿豫郡又改東徐州又改東楚州周大象三年改泗州開元二十四年移州治臨淮縣臨淮本漢徐城縣地當泗水口南北衝要之所慆他刀翻優人致辭致辭者今諸藩府有大宴則樂部頭當筵致辭稱頌賓主之美所謂致語者是也擒優人欲斬之坐者驚散慆素為之備徐卒不敢為亂而止慆悰之弟也杜悰歷事穆文武宣屢入相位咸通初又為相先是朝廷屢敕崔彥曾慰撫戍卒亶歸者勿使憂疑先悉薦翻彥曾遣使以敕意諭之道路相望勛亦申狀相繼辭禮甚恭戊午行及徐城徐城縣屬泗州宋朝省徐城為鎮入臨淮縣在泗州北百餘里自此而西北則入徐州界然其道里迂遠故龐勛等西入宿州至苻離則距徐州才一百四十里耳吾輩亶歸思見妻子耳今聞已有密敕下本軍至則支分滅族矣下戶嫁翻支分謂被支解而支體異處也即刑丈夫與其自投網羅為天下笑曷若相與戮力同心赴蹈湯火豈徒脫禍兼富貴可求況城中將士皆吾輩父兄子弟吾輩一唱於外彼必響應於內矣然後遵王侍中故事王侍中謂王智興也事見二百四十二卷穆宗長慶二年可翹足待也衆皆呼躍稱善將士趙武等十二人獨憂懼欲逃去悉章十二行本悉上有勛字乙十一行本同張校同斬之遣使致其首於彥曾且為申狀稱勛等遠戍六年實懷鄉里而武等因衆心不安輒萌姦計將士誠知詿誤詿古賣翻敢避誅夷今既蒙恩全宥輒共誅首惡以補愆尤冬十月甲子使者至彭城彥曾執而訊之具得其情乃囚之丁卯勛復於遞中申狀復扶又翻遞中謂入郵筒遞送使府稱將士自負罪戾各懷憂疑今已及苻離尚未釋甲苻離漢古縣時屬宿州九域志宿州北至徐州一百二十里宋白曰爾雅莞苻離此地尤多此草故名必生釁隙乞且停此三人職任以安衆心仍乞戍還將士別置二營共為一將將並即亮翻時戍卒拒彭城止四驛唐制三十里一驛四驛百二十里彥曾召諸將謀之皆泣曰比以銀刀凶悍比毗至翻悍侯旰翻又下罕翻使一軍皆蒙惡名殲夷流竄不無枉濫今冤痛之聲未已而桂州戍卒復爾猖狂復扶又翻下同若縱使入城必為逆亂如此則闔境塗地矣不若乘其遠來疲弊發兵擊之我逸彼勞往無不捷彥曾猶豫未決團練判官溫廷章十二行本廷作庭乙十一行本同孔本同皓復言於彥曾曰安危之兆已在目前得失之機決於今日今擊之有三難而捨之有五害詔釋其罪而亶誅之一難也帥其父兄討其子弟二難也帥讀曰率枝黨鉤連刑戮必多三難也然當道戍卒亶歸不誅則諸道戍邊者皆效之無以制禦一害也將者一軍之首而輒敢害之謂戍卒殺都將王仲甫也二害也所過剽掠剽匹妙翻自為甲兵招納亡命此而不討何以懲惡三害也軍中將士皆其親屬銀刀餘黨潛匿山澤一旦內外俱發何以支梧四害也如淳曰枝梧猶枝扞也薛瓚曰小柱為枝邪柱為梧今屋梧邪柱是也誅所忌三將又欲自為一營三將謂尹戡杜璋徐行儉及乞別營事並見上違之則託此為作亂之端五害也惟明公去其三難去羌呂翻絶其五害早定大計以副衆望時城中有兵四千三百彥曾乃命都虞候元密等將兵三千人討勛數勛之罪以令士衆數所具翻且曰非惟塗炭平人實亦汙染將士汙烏故翻染如艷翻又如險翻儻國家發兵誅討則玉石俱焚矣書曰火炎崑岡玉石俱焚天吏逸德烈于猛火凡彼親屬無用憂疑罪止一身必無連坐仍命宿州出兵苻離泗州出兵於虹以邀之虹漢古縣宋魏廢省古城在夏丘縣界武德置虹縣於古虹城貞觀八年移治夏丘故城時屬宿州九域志在州東一百八十里顏師古曰虹音貢今音絳彥曾戒元密無傷敕使時張敬思尚在勛等軍中戊辰元密發彭城軍容甚盛諸將至任山北數里任山在彭城西南三十里共思所以奪敕使之計欲俟賊入館乃縱兵擊之遣人變服負薪以詗賊詗翾正翻又火迥翻日暮賊至任山館中空無人又無供給疑之見負薪者執而榜之榜音彭果得其情乃為偶人章十二行本人下有執旗幟三字乙十一行本同孔本同張校同列於山下而潛遁比夜官軍始覺之比必利翻及也下比官軍比追及皆同音恐賊潛伏山谷及間道來襲間古莧翻復引兵退宿於城南明旦乃進追之時賊已至苻離宿州戍卒五百人出戰於濉水上濉水在虹縣靈壁東賊遂抵宿州時宿州闕刺史觀察副使焦璐攝州事城中無復餘兵庚午賊攻陷之璐走免璐音路考異曰舊紀九月甲午勛陷宿州今從鄭樵彭門紀亂及新紀賊悉聚城中貨財令百姓來取之一日之中四遠雲集然後選募為兵有不願者立斬之自旦至暮得數千人於是勒兵乘城龐勛自稱兵馬留後再宿官軍始至賊守備已嚴不可復攻先是焦璐聞苻離敗先悉薦翻決汴水以斷北路斷音短賊至水尚淺可涉比官軍至已深矣壬申元密引兵渡水將圍城會大風賊以火箭射城外茅屋射而亦翻延及官軍營士卒進則冒矢石退則限水火賊急擊之死者近三百人近其靳翻元密等以為賊必固守但為攻取之計賊夜使婦人持更夜有五更使人各直一更擊鼓以警衆謂之持更顏之推曰一更二更三更四更皆以五為節西都賦云衛以嚴更之署所以爾者假令正月建寅斗柄夕則指寅晝則指午自寅至午凡歷五辰冬夏之月雖復長短然辰間遼闊盈不至六縮不至四進退常在五者之間更歷也經也故曰五更更工衡翻備載資糧順流而下欲入江湖為盜宿州古汴河之會漕運及商旅所經故城中有大船沿汴而下入淮則可以入江湖矣艘蘇遭翻遣騎送至汴之東境此謂汴州東境也謂西歸長安明旦官軍知賊已去狼狽追之士卒皆未食比追及已飢乏賊檥舟隄下而陳於隄外陳讀曰陳下同伏千人於舟中檥魚豈翻官軍將至陳者皆走入陂中密以為畏己縱兵追之賊自舟中出夾攻之自午及申官軍大敗密引兵走陷於荷涫涫古丸翻賊追及之密等諸將及監陳敕使皆死士卒死者殆千人其餘皆降於賊無一人還徐者賊問降卒以彭城人情計謀知其無備始有攻彭城之志乙亥龐勛引兵北渡濉水踰山趣彭城趣七喻翻其夕崔彥曾始知元密敗移牒鄰道求救明日塞門塞悉則翻選城中丁壯為守備內外震恐無復固志或勸彥曾奔兗州九域志徐州北至兗州三百六十里吾為元帥城陷而死職也立斬言者丁丑賊至城下衆六七千人鼓譟動地民居在城外者賊皆慰撫無所侵擾由是人爭歸之不移時克羅城彥曾退保子城羅城外大城也子城內小城也推草車塞門而焚之推吐雷翻塞悉則翻城陷考異曰舊紀九月乙未龐勛陷徐州殺節度使崔彥曾判官焦璐等賊令別將梁丕守宿州又遣劉行及丁景琮吳迥攻圍泗州今從彭門紀亂及新紀舊彥曾傳曰九年九月十四日賊逼徐州十五日後每旦大霧十六日彥曾並誅逆卒家口十七日昏霧尤甚賊四面斬關而入實録自勛知徐州出兵退至苻離已後皆置於十一月今從彭門紀亂執尹戡杜璋徐行儉刳而銼之刳其腹而寸銼之勛坐聽事徐州觀察廳事也聽讀曰廳文武將吏伏謁莫敢仰視即日城中願附從者萬餘人戊寅勛召溫庭皓使草表求節鉞庭皓曰此事甚大非頃刻可成請還家徐草之勛許之明旦勛使趣之趣讀曰促庭皓來見勛曰昨日所以不即拒者欲一見妻子耳今已與妻子別謹來就死勛熟視笑曰書生敢爾不畏死邪龐勛能取徐州何患無人草表遂釋之有周重者每以才略自負勛迎為上客重為勛草表重為于僞翻稱臣之一軍乃漢室興王之地漢高帝起於沛唐沛縣屬徐州故稱之以自夸大刑賞失中遂致迫逐言士卒所以迫逐主帥者皆其所自致翦滅一軍見上卷三年冤橫無數橫戶孟翻今聞本道復欲誅夷將士不勝痛憤推臣權兵馬留後彈壓十萬之師撫有四州之地勝音升四州謂徐宿濠泗臣聞見利乘時帝王之資也臣見利不失遇時不疑伏乞聖慈復賜旌節不然揮戈曳戟詣闕非遲庚辰遣押牙張琯奉表詣京師勛以許佶為都虞候趙可立為都遊奕使黨與各補牙職分將諸軍又遣舊將劉行及將千五百人屯濠州李圓將二千人屯泗州梁丕將千人屯宿州自餘要害縣鎮悉繕完戍守徐人謂旌節之至不過旬月願效力獻策者遠近輻湊乃至光蔡淮浙兗鄆沂密㣥盜皆倍道歸之闐溢郛郭闐停年翻郛芳無翻旬日間米斗直錢二百人來從亂者多故米踊貴其略曰一軍暴卒盡可翦除五縣愚民各宜配隸五縣彭城蕭豐沛滕也依其所請傳布境內徐人信之皆歸怨朝廷曰微桂州將士回戈吾徒悉為魚肉矣劉行及引兵至渦口渦口至濠州僅隔淮水耳渦音戈濠州兵才數百刺史盧望回素不設備不知所為乃開門具牛酒迎之行及入城囚望回自行刺史事考異曰舊紀實録新紀濠州陷在十一月按濠本徐之屬郡勛始得徐州則遣行及取之望回猶未及為備豈得至十一月今從彭門紀亂完守備以待之且求救於江淮李圓遣精卒百人先入泗州封府庫慆遣人迎勞勞力到翻誘之入城悉誅之誘音酉明日圓至即引兵圍城城上矢石雨下賊死者數百乃斂兵屯城西勛以泗州當江淮之衝益發兵助圓攻之衆至萬餘終不能克史於此略言其終下文始詳言其事初朝廷聞龐勛自任山還趣宿州趣七喻翻遣高品康道偉齎敕書撫慰之十一月道偉至彭城勛出郊迎自任山至子城三十里大陳甲兵號令金鼓響震山谷城中丁壯悉驅使乘城宴道偉於毬場使人詐為㣥盜降者數千人諸寨告捷者數十輩復作求節鉞表復扶又翻附道偉以聞初辛雲京之孫讜辛雲京見二百二十二卷肅宗寶應二年讜多曩翻喜任俠喜許記翻如淳曰相與信為任同是非為俠所謂權行州里力折公侯者也或曰俠之為言挾也以權力俠輔人也年五十不仕與杜慆有舊聞龐勛作亂詣泗州勸慆挈家避之慆曰安平享其祿位危難棄其城池難乃旦翻吾不為也且人各有家誰不愛之我獨求生何以安衆誓與將士共死此城耳讜曰公能如是僕與公同死乃還廣陵與其家訣壬辰復如泗州復扶又翻時民避亂扶老攜幼塞塗而來塞悉則翻見讜皆止之曰人皆南走子獨北行取死何為讜不應至泗州賊已至城下讜急棹小舟得入慆即署團練判官城中危懼都押牙李雅有勇略為慆設守備帥衆鼓譟四出擊賊賊退屯徐城衆心稍安龐勛募人為兵人利於剽掠爭赴之帥讀曰率剽匹妙翻至父遣其子妻勉其夫皆斷鉏首而鋭之據陸德明春秋左氏傳釋文斷音丁管翻讀如短齊景公使王黑以靈姑鉟率請斷三尺而用之楚令尹圍為王旌以田羋尹無宇斷之是也執以應募鄰道聞勛據徐州各遣兵據要害而官軍尚少賊衆日滋官軍數不利少詩沼翻數所角翻賊遂破魚臺近十縣近其靳翻宋州東有磨山民逃匿其上勛遣其將張玄稔圍之會旱山泉竭數萬口皆渴死或說勛曰說式芮翻下同留後止欲求節鉞當恭順盡禮以事天子外戢士卒內撫百姓庶幾可得勛雖不能用然國忌猶行香唐自中世以後每國忌日令天下州府悉於寺觀設齊焚香開成初禮部侍郎崔蠡以其事無經據奏罷之尋而復舊畢仲荀幕府燕閒録曰國忌行香起於後魏唐會要曰天寶七年敕華同等州僧尼道士國忌日各就龍興寺行道散齊至貞元五年處州奏當州不在行香之數乞同衢婺等州行香有旨依注又見前凡方鎮大饗將士必朝服帥將佐西向望闕謝恩言皆出於君賜也癸卯勛聞敕使入境以為必賜旌節衆皆賀明日敕使至但責崔彥曾及監軍張道謹貶其官勛大失望遂囚敕使不聽歸詔以右金吾大將軍康承訓為義成節度使徐州行營都招討使神武大將軍王晏權為徐州北面行營招討使羽林將軍戴可師為徐州南面行營招討使考異曰舊紀十年正月以神武大將軍王晏權為武寧節度使晏權智興之從子也以右神策大將軍康承訓充徐泗行營都招討使凡十八將分董諸道之兵七萬三千一十五人正月一日進軍攻徐州又曰承訓大軍攻宿州賊將梁伾出戰屢敗乃授承訓義成節度使實録九年十二月以右金吾大將軍康承訓為義成軍節度使充徐泗行營兵馬都招討使承訓不赴鎮以節度副使陳魴句當留後以王晏權為徐泗濠宿等州觀察使充徐州北面行營招討等使羽林將軍戴可師為徐州南面行營招討等使彭門紀亂新紀承訓等除招討使皆在十一月唐年補録十一月庚申以太原節度使康承訓為都統討徐州按庚申乃十二月一日承訓舊官亦非太原節度使補録誤也今從彭門紀亂新紀帥所類翻承訓奏乞沙陀三部落使朱邪赤心沙陀薩葛安慶分為三部靼當葛翻帥讀曰率詔許之龐勛以李圓攻泗州久不克遣其將吳迥代之丙午復進攻泗州晝夜不息時敕使郭厚本考異曰舊紀實録作郗厚本今從彭門紀亂及舊傳至洪澤九域志楚州淮陰縣有洪澤鎮不敢進辛讜請往求救杜慆許之丁未夜乘小舟潛渡淮至洪澤說厚本厚本不聽比明復還己酉賊攻城益急欲焚水門城中幾不能禦說式芮翻比必利翻幾居依翻讜請復往求救慆曰前往徒還今往何益讜曰此行得兵則生返不得則死之慆與之泣別讜復乘小舟負戶突圍出見厚本為陳利害為于僞翻下皆為同厚本將從之淮南都將袁公辨曰賊勢如此自保恐不足何暇救人讜拔劍瞋目謂公辨曰瞋昌真翻賊百道攻城陷在朝夕公受詔救援而逗留不進豈惟上負國恩若泗州不守則淮南遂為寇場公詎能獨存邪我當殺公而後止章十二行本止作死乙十一行本同退齊校同張校同云無注本作止耳起欲擊之厚本起抱止之公辨僅免讜乃回望泗州慟哭終日士卒皆為之流涕為于僞翻厚本乃許分五百人與之仍問將士將士皆願行讜舉身章十二行本身下有自擲二字乙十一行本同孔本同張校同叩頭以謝將士遂帥之抵淮南岸帥讀曰率望賊方攻城有軍吏言曰賊勢已似入城還去則便憚賊不敢進兵言還軍而去則於事為便也攬得其髻攬撮持也士卒共救之曰千五百人判官不可殺也讜曰臨陳妄言惑衆陳讀曰陳必不可捨衆請不能得乃共奪之讜素多力衆不能奪讜曰將士但登舟我則捨此人衆競登舟乃捨之士卒有回顧者則斫之驅至淮北勒兵擊賊慆於城上布兵與之相應賊遂敗走鼓譟逐之至晡而還還從宣翻又如字龐勛遣其將劉張劉作許佶將精兵數千助吳迥攻泗州劉行及自濠州遣其將王弘立引兵會之戊午鎮海節度使杜審權鎮海軍治潤州翟直格翻己未行約引兵至泗州賊逆擊於淮南圍之城中兵少不能救行約及士卒盡死先是令狐綯遣李湘將兵數千救泗州先悉薦翻與郭厚本袁公辨合兵屯都梁城都梁城在泗州盱眙縣北都梁山項安世曰都梁縣有小山山上水極清淺其山中悉産蘭草緑葉紫莖俗謂蘭為都梁因以名縣賊既破翟行約乘勝圍之十二月甲子李湘等引兵出戰大敗賊遂陷都梁城執湘及郭厚本送徐州考異曰舊紀十月賊攻泗州勢急令狐綯慮失泗口乃令大將李湘赴援舉軍皆沒湘與都監郭厚本俱為賊所執送徐州令狐綯傳曰賊聞湘來援遣人致書于綯辭情遜順言朝廷纍有詔赦宥但抗拒者三兩人耳旦夕圖去之即束身請命願相公保任之綯即奏聞請賜勛節鉞仍誡李湘但戍淮口賊已招降不得立異繇是湘軍解甲安寢去警徹備日與賊軍相對歡笑交言一日賊軍乘間步騎徑入湘壘淮卒五千人皆被生縶送徐州為賊蒸而食之湘與監軍郭厚本為龐勛斷手足以徇於康承訓軍時浙西杜審權發軍千人與李湘約會兵大將翟行約勇敢知名浙軍未至而湘軍敗賊乃分兵立淮南旗幟為交鬬之狀行約軍望見急趣之千人並為賊所縛送徐州綯既喪師朝廷以馬舉代綯為淮南節度使辛讜傳曰湘率五千來援賊詐降敗于淮口湘與郭厚本皆為賊所執彭門紀亂曰勛以泗州堅守遣劉佶共謀攻取時淮南宣潤三道發兵戍都梁山舊城與泗州隔淮而已賊衆乃夜潛師渡淮及明而逼城濠州賊帥劉行及亦遣王弘立侵掠淮南於是合衆急攻官軍遂棄城出戰十一月三十日賊乃大敗官軍殺害二千人生降七八百人並虜其將李湘等咸送於徐州賊遂據有淮口斷絶驛路又曰賊既破戴可師令狐綯懼乃遣使誘諭約為奏請節旄續皇王寶運録曰十一月二十九日浙西節度使杜審權差都頭翟行約將兵二千來救三十日行約領兵方欲入泗州又被賊奔來行約占山尋被圍合城中兵士無可出救賊又開圍行約不知是計便走欲去而築著山下伏兵須臾被殺匹馬不餘賊遂圍淮口鎮有淮南都押衙李湘鎮將袁公辨領馬步三千人被圍從十一月三十日至十二月五日李湘束甲出軍被襲逐殺盡卻入鎮者使豎降旗鎮內兵士老小一萬餘人被劫驅送濠州郭厚本此時遇害今從續寶運録泗水入淮之口謂東南漕驛入上都之路絶也康承訓軍於新興九域志宋州寧陵縣有新興鎮九域志宿州臨漢縣有柳子鎮在今宿州北九十里范成大北使録曰自臨渙縣北行四十五里至柳子鎮張舜民郴行録曰柳子鎮在永城縣南九域志永城屬亳州在州東北一百一十五里時諸道兵集者才萬人承訓以衆寡不敵退屯宋州龐勛以為官軍不足畏乃分遣其將丁從實等各將數千人南寇舒廬北侵沂海破沭陽下蔡烏江巢縣沭陽漢廩丘縣後魏改曰沭陽唐屬海州九域志在州西南一百八十里下蔡漢古縣唐屬潁州烏江漢東城縣之烏江亭也隋置烏江縣唐屬和州九域志在州東北三十五里巢漢居巢縣隋為襄安縣武德七年改襄安為巢縣屬廬州沭食聿翻殺刺史高錫望又寇和州滁州南至和州百五十里引賊登樓共飲命軍士皆釋甲指所愛二人為子弟乞全之其餘惟賊所處處昌呂翻賊遂大掠城中殺士卒八百餘人考異曰彭門紀亂光蔡山中草賊數百攻破滁州殺刺史高錫望歸附龐勛舊紀十一月吳迥既執李湘乃令小將張行簡吳約攻滁州執刺史高錫望手刃之屠其城而去行簡又進攻和州刺史崔雍登城樓謂吳約云云遂剽城中居民殺判官張涿以涿浚城濠故也勛又令劉贄攻濠州陷之囚刺史盧望回於回車館望回鬱憤而死實録閏月賊陷和州濠州明年二月又云勛遣張行簡攻滁州入城害刺史高錫望新紀十二月賊陷滁和今陷濠州從彭門紀亂陷滁和置執李湘下泗州援兵既絶糧且盡人食薄粥閏月己亥辛讜言於杜慆請出求救於淮浙夜帥敢死士十人執長柯斧柯斧柄也帥讀曰率潛往斫賊水寨而出明旦賊乃覺之以五舟遮其前以五千人夾岸追之賊舟重行遲讜舟輕行疾力鬬三十餘里乃得免癸卯至揚州見令狐綯甲辰至潤州見杜審權揚州南至潤州五十餘里或傳已陷讜既至審權乃遣押牙趙翼將甲士二千人與淮南共輸米五千斛鹽五百斛以救泗州戴可師將兵三萬渡淮轉戰而前賊盡棄淮南之守可師欲先奪淮口後救泗州壬申圍都梁城城中賊少少詩沼翻拜於城上曰方與都頭議出降可師為之退五里為于僞翻賊夜遁明旦惟空城可師恃勝不設備是日大霧賊章十二行本賊上有濠州二字退齊校同將王弘立引兵數萬疾徑奄至疾徑猶言捷徑也不由正路直徑而行取其便疾官軍不及成列遂大敗將士觸兵及溺淮死得免者才數百人亡器械資糧車馬以萬計賊傳可師及監軍將校首於彭城考異曰續寶運録曰正月十八日戴可師陷失賊遂凶狂彭門紀亂曰可師引兵三萬欲先奪淮口遂救泗州十二月十三日遲明圍賊於都梁山下賊已就降而可師自恃兵強不為備賊將王弘立者將兵數萬人捷徑赴救奔突而前官軍潰亂遂為所敗可師並監使將校已下咸沒於陳於是龐勛自謂前無強敵矣舊紀十二月可師與賊轉戰賊黨屢敗盡棄淮南之守十年正月以可師充曹州行營招討使時賊將劉行及吳迥攻圍泗州可師乘勝救之屯於石梁驛賊退去可師追擊生擒行及賊保都梁城登城拜曰見與都頭謀歸降可師既知其窘乃退軍五里其城西面有水三面大軍賊乃夜中涉水而遁明早開城門惟病嫗數人而已王師入壘未整翌日詰旦重霧賊軍大至可師方大醉單馬奔出為虹縣人郭真所殺一軍盡沒賊將吳迥進軍復圍泗州又曰龐勛奏當道先發戍嶺南兵士三千人春冬衣今欲差人送赴雍管鄂嶽觀察使劉允章上書言龐勛聚徒十萬今若遣人達嶺表如戍卒與勛合勢則禍難非細尋詔龐勛止絶兼令江淮諸道紀綱捕之實録可師敗繫於閏月下而亦云十二月十三日新紀十二月壬申亦用紀亂之日也按紀亂上有臘月又云十二月十三日其下無閏月疑謂閏月十三日也然據續寶運録閏月十一日辛讜離泗州十四日至揚州乞兵糧若於時可師在都梁則讜必不舍可師而詣揚潤也若讜出在可師敗後則令狐綯方自救不暇何暇救泗州若可師敗在正月則新紀十二月已除馬舉南面招討使要之必在辛讜適揚潤之後故置於此龐勛自謂無敵於天下作露布散示諸寨及鄉村於是淮南士民震恐往往避地江左令狐綯畏其侵軼軼徒結翻遣使詣勛說諭說式芮翻許為奏請節鉞為于僞翻勛乃息兵俟命由是淮南稍得收散卒修守備時汴路既絶江淮往來皆出壽州自壽州泝淮即入潁汴路乘勝圍壽州掠諸道貢獻及商人貨其路復絶復扶又翻下同勛益自驕日事遊宴周重諫曰自古驕滿奢逸得而復失成而復敗多矣況未得未成而為之者乎諸道兵大集於宋州徐州始懼應募者益少而諸寨求益兵者相繼勛乃使其黨散入鄉村驅人為兵又見兵已及數萬人見賢遍翻資糧匱竭乃斂富室及商旅財什取其七八坐匿財夷宗者數百家又與勛同舉兵於桂州者尤驕暴奪人資財掠人婦女勛不能制由是境內之民皆厭苦之不聊生矣王晏權兵數退衄數所角翻朝廷命泰寧節度使曹翔代晏權為徐州北面招討使兗海號泰寧軍考異正文曰曹翔馬舉為徐州南北招討使注曰彭門紀亂作馬士舉今從新紀紀亂曰王晏權數為賊所攻雖不敗傷亦時退縮朝廷復除隴州牧曹翔領兗海節度使充北面都統招討等使又魏博元帥何公遣行軍薛尤將兵三萬人掎角破賊曹翔軍於滕沛魏博軍於豐蕭其衆都六七萬人又言賊寇海州壽州皆敗又言辛讜救泗州雖繫正月之下蓋追敍以前之事實録二月以馬舉為淮南節度使充南面招討使初康承訓率諸將正月一日進軍攻徐州不克賊圍壽州王晏權數為賊所攻退縮不敢出戰乃以曹翔為兗海等州節度使充北面招討使魏博遣薛尤將兵三千掎角討賊賊衆攻海州戍兵擊之大敗康承訓率衆屯於柳子之西皆承此而誤也新紀翔舉除南北招討在十二月而無閏今因翔與魏博同討徐州而見之置於歲末據考異及明年馬舉解泗州圍事則通鑑正文曹翔為徐州北面招討使之下當有以馬舉為淮南節度使充南面招討使十四字傳寫逸之也按何全皞為魏博節度使魏博本號天雄軍未嘗徙他鎮疑史衍前字或曰是時秦州號天雄軍罷魏博軍號故加前字考異曰彭門紀亂曰尤將三萬人並曹翔軍都六七萬人實録魏博奏請出兵三千人助討徐泗舊紀魏博何弘敬奏當道點檢兵馬一萬三千赴行營姓名雖誤今取其人數尤軍於豐蕭四縣皆屬徐州滕春秋滕子之國隋置滕縣宋白曰以縣西南四十里有滕城也豐漢古縣九域志滕在州北一百九十五里沛在西北一百四十里豐在西北一百四十里蕭在西五十里蕭縣亦以古蕭國為名咸通九年是歲江淮旱蝗十年十年春正月康承訓將諸道軍七萬餘人屯柳子之西自新興至鹿塘三十里壁壘相屬屬之欲翻徐兵分戍四境城中不及數千人龐勛始懼民多穴地匿其中勛遣人搜掘為兵日不過得三二十人勛將孟敬文守豐縣狡悍而兵多謀二於勛自為符讖勛聞之會魏博攻豐勛遣腹心將將三千助敬文守豐敬文與之約共擊魏博軍且譽其勇三千之下當有人字將將並即亮翻譽音余新軍既與魏博戰新軍謂龐勛新附之軍新軍盡沒勛乃遣使紿之曰紿徒亥翻王弘立已克淮南留後欲自往鎮之悉召諸將欲選一人可守徐州者敬文喜即馳詣彭城未至城數里勛伏兵擒之辛酉殺之十年丁卯同昌公主適右拾遺韋保衡以保衡為起居郎駙馬都尉同昌隋郡名唐為疊州常芬縣郭淑之女上特愛之傾宮中珍玩以為資送賜第於廣化里窗戶皆飾以雜寶井欄藥臼槽匱亦以金銀為之編金縷以為箕筐賜錢五百萬緡他物稱是稱尺證翻十年徐賊寇海州徐賊者龐勛所遣兵也九域志徐州東至海州四百八十里斷賊所過橋柱而弗殊殊絶也斷橋柱而不使絶待賊過踐踏而自陷斷音短下鎖斷斧斷同賊過橋崩蒼黃散亂伏兵發盡殪之殪一計翻其攻壽州者復為南道軍所破斬獲數千人南道軍淮浙之兵也復扶又翻辛讜以浙西之軍至楚州敕使張存誠以舟助之徐賊水陸布兵鎖斷淮流浙西軍憚其強不敢進讜曰我請為前鋒勝則繼之敗則汝走猶不可讜乃募選軍中敢死士數十人牒補職名先以米舟三艘鹽舟一艘乘風逆流直進賊夾攻之矢著舟板如急雨夾攻者兩岸賊兵也艘蘇遭翻著直略翻讜帥衆死戰斧斷其鎖乃得過城上人喧呼動地帥讀曰率呼火故翻杜慆及將佐皆泣迎之乙酉城上望見舟師張帆自東來識其旗浙西軍也去城十餘里賊列火船拒之帆止不進慆令讜帥死士出迎之乘戰艦衝賊陳而過陳讀曰陳見張存誠帥米舟九艘曰將士在道前卻存誠屢欲自殺憚敵而不敢進故為之一前一卻今又不進讜揚言賊不多甚易與耳所以作衆氣而使之進易以豉翻帥讀曰率下同賊見其勢猛鋭避之遂得入城十年二月端州司馬楊收長流歡州尋賜死其僚屬黨友坐長流嶺表者十餘人初尚書右丞裴坦子娶收女資送甚盛器用飾以犀玉坦見之怒曰破我家矣立命壞之壞音怪已而收竟以賄敗十年康承訓使朱邪赤心將沙陀三千騎為前鋒陷陳卻敵陳讀曰陳十鎮之兵伏其驍勇十鎮謂義成魏博鄜延義武鳳翔橫海泰寧宣武忠武天平也宿州臨渙縣以臨渙水得名南北對境圖渙水出亳州南流入淮正直五河口赤心帥五百騎奮楇衝圍拔出承訓賊勢披靡楇步瓜翻披普彼翻因合擊敗之敗補邁翻承訓數與賊戰數所角翻賊軍屢敗王弘立自矜淮口之捷謂破戴可師也龐勛許之己亥弘立引兵渡濉水夜襲鹿塘寨黎明圍之弘立與諸將臨望自謂功在漏刻沙陀左右突圍出入如飛賊紛擾移避沙陀縱騎蹂之蹂人九翻寨中諸軍爭出奮擊賊大敗官軍蹙之於濉水溺死者不可勝紀勝音升自鹿塘至襄城此襄城非汝州之襄城蓋徐宿間別自有襄城也斬首二萬餘級弘立單騎走免所驅掠平民皆散走山谷不復還營復扶又翻委棄資糧器械山積時有敕諸軍破賊得農民皆釋之自是賊每與官軍遇其驅掠之民先自潰龐勛許佶以弘立驕惰致敗欲斬之周重為之說勛曰為于僞翻下為敵同說式芮翻弘立再勝未賞再勝謂取濠州破戴可師棄功録過為敵報讎諸將咸懼矣不若赦之責其後效勛乃釋之弘立收散卒才數百人請取泗州以補過勛益其兵而遣之十年三月辛未以起居郎韋保衡為左諫議大夫充翰林學士十年徙郢王侃為威王侃皇子也十年康承訓既破王弘立進逼柳子與姚周一月之間數十戰丁亥周引兵渡水謂渡渙水也周退走官軍逐之遂圍柳子會大風四面縱火賊棄寨走沙陀以精騎邀之屠殺殆盡自柳子至芳城芳城新書作芳亭枕職任翻斬其將劉豐周將麾下數十人奔宿州宿州守將梁丕素與之有隙開城聽入執而斬之龐勛聞之大懼與許佶議自將出戰將即亮翻周重泣言於勛曰柳子地要兵精姚周勇敢有謀今一旦覆沒危如纍卵不若遂建大號悉兵四出決力死戰又勸殺崔彥曾以絶人望術士曹君長亦言徐州山川不容兩帥帥所類翻今觀察使尚在故留後未興賊黨皆以為然夏四月壬辰勛殺彥曾及監軍張道謹宣慰使仇大夫僚佐焦璐溫庭皓並其親屬賓客僕妾皆死斷淮南監軍郭厚本都押衙李湘手足斷丁管翻以示康承訓軍勛乃集衆揚言曰勛始望國恩大言以播告曰揚言望國恩謂望旌節也今日之事前志已乖自此勛與諸君真反者也當掃境內之兵戮力同心轉敗為功耳衆皆稱善於是命城中男子悉集毬場仍分遣諸將比屋大索比毗必翻索山客翻敢匿一男子者族其家選丁壯得三萬人更造旗幟更工衡翻幟昌志翻給以精兵許佶等共推勛為天冊將軍大會明王勛辭王爵先是辛讜復自泗州引驍勇四百人迎糧於揚潤先悉薦翻復扶又翻賊夾岸攻之轉戰百里乃得出至廣陵止于公館不敢歸家舟載鹽米二萬石錢萬三千緡乙未還至斗山斗山在今盱眙縣亦曰陡山臨淮流斗山之東則古盱眙拒之於盱眙密布戰艦百五十艘以塞淮流帥讀曰率塞悉則翻又縱火船逆之讜命以長叉托過自卯戰及未衆寡不敵官軍不利賊縛木於戰艦艦戶黯翻旁出四五尺為戰棚棚蒲庚翻讜命勇士乘小舟入其下矢刃所不能及以槍揭火牛焚之揭其謁翻火牛縛草為之爇以燒敵今沿邊州郡防城庫積草謂之火牛草戰艦既然然謂火燃也官軍乃得過入城考異曰續寶運録曰二月七日辛讜揀點驍勇領空船十二隻般糧二十日卻到楚州四月六日離楚八日至斗山下是日二更後入泗州按正月二十七日讜迎米船九隻入泗州二月六日未應食盡復出又二十日卻到楚州不應住四十五日然後離彼又上有二月十日授讜御史不應下云二月七日讜出般糧疑是三月字也龐勛以父舉直為大司馬與許佶等留守徐州或曰將軍方耀兵威不可以父子之親失上下之節乃令舉直趨拜於庭勛據桉而受之時魏博屢圍豐縣龐勛欲先擊之丙申引兵發徐州十年戊戌以前淮南節度使同平章事令狐綯為太保分司以綯在淮南喪師命馬舉代之十年龐勛夜至豐縣潛入城魏博軍皆不之知魏博分為五寨其近城者屯數千人近其靳翻勛縱兵圍之諸寨救之勛伏兵要路殺官軍二千人餘皆返走賊攻寨不克至夜解圍去官軍畏其衆且聞勛自來諸寨皆宵潰曹翔方圍滕縣聞魏博敗引兵退保兗州曹翔泰寧帥本治兗州故退保之運其資糧傳檄徐州盛自誇大謂官軍為國賊云馬舉將精兵三萬救泗州乙巳分軍三道渡淮至中流大譟聲聞數里聞音問賊大驚不測衆寡斂兵屯城西寨舉就圍之縱火焚柵賊衆大敗斬首數千級王弘立死吳迥退保徐城泗州之圍始解泗州被圍凡七月泗州自去年九月末受圍面目皆生瘡龐勛留豐縣數日欲引兵西擊康承訓或曰天時向暑蠶麥方急不若且休兵聚食然後圖之或曰將軍出師數日摧七萬之衆謂破魏博之兵也西軍謂康承訓之軍也時屯柳子其地在豐縣之西彼破走必矣時不可失龐舉直以書勸勛乘勝進軍勛意遂決丁未發豐縣庚戌至蕭約襄城留武小睢諸寨兵合五六萬人以二十九日遲明攻柳子遲直利翻待也淮南敗卒在賊中者李湘袁公辨之兵也告以其期承訓得先為之備秣馬整衆設伏以待之丙辰襄城等兵先至柳子遇伏敗走龐勛既自失期遽引兵自三十里外赴之比至比必利翻諸寨已敗勛所將皆市井白徒覩官軍勢盛皆不戰而潰承訓命諸將急追之以騎兵邀其前步卒蹙其後賊狼狽不知所之自相蹈藉僵尸數十里藉慈夜翻僵居良翻死者數萬人勛解甲服布襦而遁襦汝朱翻短衣也收散卒才及三千人歸彭城考異曰實録勛敗於柳子在五月蓋約奏到書之其他皆如此雖有月日不可用今從彭門紀亂第城驛在宿州西勛初起下邳土豪鄭鎰鎰音逸聚衆三千自備資糧器械以應之勛以為將謂之義軍五月沂州遣軍圍下邳下邳縣屬徐州九域志在州東一百八十里鎰帥所部來降帥讀曰率十年六月陝民作亂逐觀察使崔蕘陝失冉翻蕘如招翻蕘以器韻自矜不親政事民訴旱蕘指庭樹曰此尚有葉何旱之有杖之民怒故逐之蕘逃於民舍渴求飲民以溺飲之溺奴弔翻飲之於鴆翻坐貶昭州司馬十年以中書侍郎同平章事徐商同平章事充荊南節度使癸卯以翰林學士承旨戶部侍郎劉瞻同平章事考異曰玉泉子聞見録曰徐公商判鹺以瞻為從事商拜相命官曾不及瞻瞻出於羈旅以楊玄翼樞密權重可倚以圖事而密啖閽者謁焉瞻有儀表加之詞辨俊利玄翼一見悅之每玄翼歸第瞻輒候之由是日加親熟遂許以內廷之拜既有日矣瞻即復謁徐公曰相公過聽以某辱在門館幸遇相公登庸四海之人孰不受相公之惠某故相公從事窮飢日加且環歲矣相公曾不以下位處之某雖不佞亦相公之恩不終也今已別有計矣請從此辭即下拜焉商初聞瞻言徒唯唯而已逮聞別有計不覺愕然方欲遜謝瞻已疾趨出矣明日內榜子出以瞻為翰林學士舊瞻傳劉瑑作相以宗人遇之薦為翰林學士按瞻素有清節必不至如玉泉子所云恐出於愛憎之說聞見録又云玄翼為鳳翔監軍瞻即出為太原亞尹鄭從讜為節度使殊不禮焉洎復入翰林而作相也常謂人曰吾在北門為鄭尚書冷將息不復病熱矣從讜南海之命瞻所致也按舊傳瞻自戶部侍郎承旨出為太原尹河東節度使瞻為學士若非以罪謫恐不為少尹又舊紀咸通十二年十二月鄭從讜自宣武節度使為廣州在瞻歡州後故知玉泉子所記皆虛今不取桂州人也十年馬舉自泗州引兵攻濠州拔招義鍾離定遠招義漢睢陵縣地宋置濟陰郡隋廢郡為化明縣武德七年改為招義鍾離漢古縣定遠漢曲陽縣地梁改為定遠唐皆屬濠州九域志招義在州東一百二十四里定遠在州南八十里舉先遣輕騎挑戰挑徒了翻賊見其衆少爭出寨西擊之舉引大軍數萬自他道擊其東南遂焚其寨賊入固守舉塹其三面而圍之北面臨淮賊猶得與徐州通龐勛遣吳迥助行及守濠州屯兵北津以相應北津淮水之北岸也凡臨水濟渡之處謂之津斬獲數千平其寨十年曹翔之退屯兗州也留滄州卒四千人戍魯橋滄州卒橫海之兵也九域志濟州任城縣有魯橋鎮亶翔曰以龐勛作亂故討之今滄卒不從約束是自亂也勒兵迎之圍於兗州城外擇違命者二千人悉誅之朝廷聞魏博軍敗以將軍宋威為徐州西北面招討使將兵三萬屯於豐蕭之間翔復引兵會之復扶又翻秋七月康承訓克臨渙殺獲萬人遂拔襄城留武小睢等寨曹翔拔滕縣進擊豐沛賊諸寨戍兵多相帥逃匿保據山林帥讀曰率賊抄掠者過之抄楚交翻輒為所殺而五八村尤甚有陳全裕者為之帥帥所類翻凡叛勛者皆歸之衆至數千人戰守之具皆備環地數千章十二行本千作十乙十一行本同退齊校同張校同云無注本作千里環音宦賊莫敢近近其靳翻康承訓遣人招之遂舉衆來降賊黨益離蘄縣土豪李袞殺賊守將舉城降於承訓蘄漢古縣唐屬宿州九域志在州南三十六里裨將朱玫舉城降於曹翔玫莫柸翻直自彭城還玫逆擊走之翔發兵戍沛玫邠州人也勛遣其將孫章許佶各將數千人攻陳全裕朱玫皆不克而還還從宣翻康承訓乘勝長驅拔第城進抵宿州之西築城而守之龐勛憂悶不知所為但禱神飯僧而已悶莫困翻心煩也飯扶晚翻十年初龐勛怒梁丕專殺姚周黜之使徐州舊將張玄稔代之治州事治直之翻以其黨張儒張實等將城中兵數萬拒官軍儒等列寨數重於城外環水自固重直龍翻環音宦康承訓圍之張實夜遣人潛出以書白勛曰今國兵盡在城下國兵謂官軍也將軍宜引兵出其不意掠宋亳之郊彼必解圍而西將軍設伏要害迎擊其前實等出城中兵蹙其後破之必矣時曹翔使朱玫擊豐破之乘勝攻徐城下邳皆拔之斬獲萬計勛方憂懼欲走得實書即從其策使龐舉直許佶守徐州引兵而西八月壬子康承訓焚外寨張儒等入保羅城外寨宿州城外之寨羅城宿州羅城也死者數千人不能克考異曰舊紀實録皆云八月康承訓攻柳子寨垂克而賊將王弘立救至王師大敗承訓退保宋州龐勛乘勝自帥徐州徑卒併攻泗州留其都將許佶守徐州詔馬舉援泗州按弘立救柳子為承訓所敗兼於時弘立已死於泗州勛亦未嘗親攻泗州舊紀實録誤也遣辨士於城下招諭之張玄稔嘗戍邊有功雖脅從於賊心嘗憂憤心嘗當作常夜召所親數十人謀歸國因稍令布諭協同者衆乃遣腹心張皋夜出以狀白承訓約期殺賊將舉城降至日請立青旌為應使衆心無疑木行色青木主生使立青旌以示不殺從之九月丁巳張儒等飲酒於柳溪亭玄稔使部將董厚嚴厚改原等勒兵於亭西玄稔先躍馬而前大呼曰龐勛已梟首於僕射寨中呼火故翻僕射謂承訓也此輩何得尚存士卒競進遂斬張儒等數十人城中大擾玄稔諭以歸國之計及暮而定戊午開門出降玄稔見承訓肉袒膝行涕泣謝罪承訓慰勞勞力到翻下賞勞同即宣敕拜御史中丞賜遺甚厚遺唯季翻玄稔復進言復扶又翻今舉城歸國四遠未知請詐為城陷引衆趨苻離及徐州趨七喻翻下同賊黨不疑可盡擒也承訓許之宿州舊兵三萬承訓益以數百騎皆賞勞而遣之玄稔復入城暮發平安火如常日己未向晨玄稔積薪數千束縱火焚之如城陷軍潰之狀直趨苻離苻離納之既入斬其守將號令城中皆聽命收其兵復得萬人復扶又翻北趨徐州龐舉直許佶聞之嬰城拒守辛酉玄稔至彭城引兵圍之按兵未攻先諭城上人曰朝廷唯誅逆黨不傷良人汝曹奈何為賊城守為于僞翻若尚狐疑須臾之間同為魚肉矣於是守城者稍稍棄甲投兵而下崔彥曾故吏路審中開門納官軍龐舉直許佶帥其黨保子城帥讀曰率日昃賊黨自北門出玄稔遣兵追之斬舉直佶首餘黨多赴水死悉捕戍桂州者親族斬之死者數千人徐州遂平龐勛將兵二萬自石山西出所過焚掠無遺庚申承訓始知引步騎八萬西擊之使朱邪赤心將數千騎為前鋒考異曰彭門紀亂云沙陀都頭朱邪赤衷按獻祖紀年録當作赤心紀亂誤也陷其南城刺史鄭處沖守其北城處昌呂翻賊知有備捨去渡汴南掠亳州九域志宋州南至亳州一百二十里勛引兵循渙水而東將歸彭城為沙陀所逼不暇飲食至蘄蘄秦漢古縣宋置譙郡齊為北譙郡時為縣屬宿州九域志在州南三十六里李袞發橋勒兵拒之賊惶惑不知所之至縣西官軍大集縱擊殺賊近萬人近其靳翻餘皆溺死降者才及千人勛亦死而人莫之識數日乃獲其尸考異曰彭門紀亂曰初龐勛之求節也必希歲內得之於是閭里小兒競歌之曰得節不得節不過十二月即龐勛九年十月十七日作亂十年九月十九日就戮通其閏月計之正一歲而滅按六日承訓知勛掠亳宋即追之至蘄縣得之恐未至十九日疑是九日也新紀九月癸酉龐勛伏誅用彭門紀亂也宿遷晉宿豫縣也唐避代宗諱改曰宿遷屬徐州在下邳東南一百八十里吳迥獨守濠州不下冬十月以張玄稔為右驍衛大將軍御史大夫馬舉攻濠州自夏及冬不克城中糧盡殺人而食之官軍深塹重圍以守之重直龍翻辛丑夜吳迥突圍走舉勒兵追之殺獲殆盡迥死於招義以康承訓為河東節度使同平章事以杜慆為義成節度使上嘉朱邪赤心之功置大同軍於雲州以赤心為節度使會昌中已置大同軍團練使於雲州尋為防禦今升為節鎮留為左金吾上將軍賜姓名李國昌其後李國昌父子卒以雲州起兵蓋尋遣之還鎮也薛史曰赤心賜姓名系鄭王房見賢遍翻以辛讜為亳州刺史讜在泗州犯圍出迎兵糧往返凡十二及除亳州上表言臣之功非杜慆不能成也賜和州刺史崔雍自盡以其開門延賊也考異曰舊紀八月和州防虞行官石侔等訟雍罪其月賜自盡實録訟在八月賜自盡在十月今從之兄弟五人皆遠貶十年上荒宴不親庶政委任路巖巖奢靡頗通賂遺遺唯季翻左右用事至德令陳蟠叟因上書召對肅宗至德元載分鄱陽秋浦置至德縣屬饒州請破邊咸一家可贍軍二年上問咸為誰對曰路巖親吏上怒流蟠叟於愛州自是無敢言者十年初南詔遣使者楊酋慶來謝釋董成之囚釋董成見上卷七年遂殺酋慶西川大將恨師望分裂巡屬謂分西川巡屬邛巂等州別立定邊軍也事見上九年六月使入寇師望貪殘聚私貨以百萬計戍卒怨怒欲生食之師望以計免朝廷徵還以太府少卿竇滂代之滂貪殘又甚於師望故蠻寇未至而定邊固已困矣是月南詔驃信酋龍傾國入寇引數萬衆擊董舂烏部破之董舂烏部西川附塞蠻也蠻進寇巂州定邊都頭安再榮守清溪關蠻攻之再榮退屯大渡河北與之隔水相射射而亦翻九日八夜蠻密分軍開章十二行本開上有伐木二字乙十一行本同張校同退齊校同道逾雪坡奄至沐源川雪坡雪嶺之坡也沐源川在嘉州羅目縣界麟德二年開生獠置羅目縣及沐州後廢沐州以羅目屬嘉州宋朝又廢羅目為鎮屬峨眉縣又今嘉州犍為縣有沐川鎮舉軍覆沒帥讀曰率十二月丁酉蠻衣兗海之衣詐為敗卒至江岸呼船蠻衣於既翻此江青衣江也已濟衆乃覺之遂陷犍為縱兵焚掠陵榮二州之境犍為漢郡名後周置武陽縣隋開皇初改名犍為因山為名也唐屬嘉州九域志在州東南一百二十里犍居言翻蠻軍大集於陵雲寺與嘉州對岸嘉州漢犍為郡南安縣地梁武帝開通外徼立青州取青衣以為名西魏改青州為眉州取峨眉山以為名後周復曰青州又改曰嘉州取漢嘉郡以為名隋又改曰眉州唐復曰嘉州別置眉州於漢武陽縣地陵雲寺在嘉州南山開元中僧海通於瀆江沫水濛水三江之會悍流怒浪之濱鑿山為彌勒大像高踰三百六十尺建七層閣以覆之忞莫巾翻與定邊監軍張允瓊勒兵拒之蠻潛遣奇兵自東津濟夾擊官軍殺忠武都將顏慶師餘衆皆潰忞允瓊脫身走壬子陷嘉州慶師慶復之弟也竇滂自將兵拒蠻於大渡河驃信詐遣清平官數人詣滂結和滂與語未畢蠻乘船筏爭渡忠武徐宿兩軍結陳抗之徐宿舊武寧軍以其軍數亂逆罷節鎮陳讀曰陳自經於帳中徐州將苗全緒解之曰都統何至於是全緒與安再榮及忠武將勒兵出戰滂遂單騎宵遁三將謀曰今衆寡不敵明旦復戰吾屬盡矣復扶又翻不若乘夜攻之使之驚亂然後解去於是夜入蠻軍弓弩亂發蠻大驚三將乃全軍引去蠻進陷黎雅民竄匿山谷敗軍所在焚掠滂奔導江導江本劉蜀所置都安縣後周改為汶山唐改曰導江屬彭州九域志在州西九十里偫丈里翻蠻至城已空通行無礙矣考異曰張雲咸通解圍録曰十年十月南蠻衆擊董舂烏部落傾其巢窟舂烏以其衆保北柵俄而蠻掩至沐源川遂逼嘉州南自清溪關寇黎雅張錦里耆舊傳曰十一年庚寅節度使盧僕射耽冬雲南蠻數萬寇邊突破清溪關犯大渡河遂進陷沈黎突邛崍直雅邛按解圍録新舊紀皆在十年冬蠻入寇而獨以為十一年冬誤也新傳曰十年乃入寇以兵綴清溪關密引衆伐木開道徑雪坡盛夏卒凍死者二千人出沐源窺嘉州按蠻以十一月至沐源川非盛夏新傳誤也實録又曰驃信以十月三日離善闡每人止將米炒一斗隨身乃詔高駢乘其國內無兵備進攻善闡以解衝突按駢時為鄆州節度使不在安南恐實録誤也詔左神武將軍顏慶復將兵赴援容肇祖標點聶崇岐覆校
