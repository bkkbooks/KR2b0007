body:
  text: 資治通鑑卷第一百一十八端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰權判西京留司御史臺上柱國河內郡開國侯食邑一千三百戶食實封肆伯戶賜紫金魚袋臣司馬光奉敕編集後學天台音注晉紀四十裕收秦彞器渾儀土圭記里鼓指南車送詣建康安皇帝癸義熙十三年丁巳四一七裕收秦彞器渾儀土圭記里鼓指南車送詣建康春正月甲戌朔日有食之裕收秦彞器渾儀土圭記里鼓指南車送詣建康秦主泓朝會百官於前殿朝直遙翻以內外危迫君臣相泣以內則兄弟搆難外為晉夏所迫也焚廬舍自北雍州趨長安秦分嶺北五郡為北雍州鎮安定泓不用東平公紹懿橫之言以召亂帥讀曰率雍於用翻趨七喻翻移檄州郡欲除君側之惡揚威將軍姜紀帥衆歸之建節將軍彭完都棄陰密奔還長安恢至新支姜紀說恢曰國家重將大兵皆在東方京師空虛公亟引輕兵襲之必克恢不從南攻郿城鎮西將軍姚諶為恢所敗說輸芮翻敗補邁翻將即亮翻郿音眉又音媚諶氏壬翻姚諶去年棄雍東奔遂屯于郿長安大震泓馳使徵東平公紹遣姚裕及輔國將軍胡翼度屯澧西關中無澧水澧當作灃灃水出鄠南灃谷北過上林苑入渭使疏吏翻降戶江翻東平公紹引諸軍西還與恢相持於靈臺水經注漢靈臺在秦阿房宮南鎬水徑其北守潼關太守式又翻亦引兵還恢衆見諸軍四集皆有懼心其將齊黃等詣大軍降恢進兵逼紹讚自後擊之恢兵大敗殺恢及其三弟泓哭之慟葬以公禮裕收秦彞器渾儀土圭記里鼓指南車送詣建康太尉裕引水軍發彭城留其子彭城公義隆鎮彭城詔以義隆為監徐兗青冀四州諸軍事徐州刺史監工銜翻裕收秦彞器渾儀土圭記里鼓指南車送詣建康涼公皓寢疾皓古老翻遺命長史宋繇曰吾死之後世子猶卿子也善訓導之二月皓卒卒子恤翻下將卒同官屬奉世子歆為大都督大將軍涼公領涼州牧大赦改元嘉興尊歆母天水尹氏為太后以宋繇録三府事三府大都督大將軍府涼公府州牧府也廟號太祖裕收秦彞器渾儀土圭記里鼓指南車送詣建康西秦安東將軍木奕干擊吐谷渾樹洛干破其弟阿柴於堯杆川堯杆川在塞外杆居寒翻又居案翻還從宣翻又如字樹洛干走保白蘭山慙憤發疾將卒謂阿柴曰吾子拾虔幼弱今以大事付汝樹洛干卒卒子恤翻阿柴立自稱驃騎將軍沙州刺史驃匹妙翻騎奇寄翻諡樹洛干曰武王阿柴稍用兵侵人併其傍小種種章勇翻地方數千里遂為強國裕收秦彞器渾儀土圭記里鼓指南車送詣建康河西王蒙遜遣其將襲烏啼部大破之烏啼虜居張掖刪丹縣金山之西將即亮翻降之卑和羌居西海降戶江翻裕收秦彞器渾儀土圭記里鼓指南車送詣建康王鎮惡進軍澠池澠彌兗翻遣毛德祖襲尹雅於蠡吾城禽之秦以雅為弘農太守屯蠡吾城據載記蠡吾城當在宜陽之西宋白曰蠡吾城後魏初猶屬弘農唐以來為澠池縣理所余按蠡吾自是漢清河國界亭名此乃蠡城非蠡吾城也通鑑蓋承晉書之誤鎮惡引兵徑前抵潼關檀道濟沈林子自陝北渡河拔襄邑堡陝式冉翻秦河北太守薛帛奔河東襄邑堡在河北郡河北縣漢晉屬河東郡秦分立河北郡不克阪音反別將攻胸奴堡為姚成都所敗將即亮翻下同敗蒲邁翻辛酉滎陽守將傅洪以虎牢降魏秦主泓以東平公紹為太宰大將軍都督中外諸軍事假黃鉞改封魯公使督武衛將軍姚鸞等步騎五萬守潼關又遣別將姚驢救蒲阪沈林子謂檀道濟曰蒲阪城堅兵多不可猝拔攻之傷衆守之引日王鎮惡在潼關勢孤力弱不如與鎮惡合勢並力以爭潼關若得之尹昭不攻自潰矣道濟從之三月道濟林子至潼關秦魯公紹引兵出戰道濟林子奮擊大破之斬獲以千數紹退屯定城郭緣生述征記曰定城去潼關三十里夾道各一城渭水徑其北謂諸將曰道濟等兵力不多懸軍深入不過堅壁以待繼援吾分軍絶其糧道可坐禽也乃遣姚鸞屯大路以絶道濟糧道自澠池西入關有兩路南路由回溪阪自漢以前皆由之曹公惡南路之險更開北路遂以北路為大路載記曰紹留鸞守險以絶道濟糧道蓋鸞雖屯大路亦據險而邀絶糧道也紹初遣胡翼度據東原蓋與大路相為脣齒所謂據險也及沈林子襲鸞營翼度不能救何也人心危駭面面受敵故也鸞遣尹雅將兵與晉戰於關南關南潼關之南也將殺之雅曰雅前日已當死幸得脫至今死固甘心然夷夏雖殊夏戶雅翻君臣之義一也晉以大義行師獨不使秦有守節之臣乎乃免之丙子夜沈林子將鋭卒襲鸞營斬鸞殺其士卒數千人紹又遣東平公讚屯河上以斷水道斷丁管翻下兵斷同沈林子擊之讚敗走還定城薛帛據河曲來降河水自蒲阪南至潼關激而東流蒲阪河北之間謂之河曲太尉裕將水軍自淮泗入清河將泝河西上上時掌翻下必上北上同先遣使假道於魏使疏吏翻秦主泓亦遣使請救於魏魏主嗣使㣥臣議之皆曰潼關天險劉裕以水軍攻之甚難若登岸北侵其勢便易易以豉翻裕聲言伐秦其志難測且秦婚姻之國不可不救也秦女歸魏見上卷十一年勿使得西博士祭酒崔浩曰裕圖秦久矣今姚興死子泓懦劣國多內難難乃旦翻裕乘其危而伐之其志必取若遏其上流裕心忿戾必上岸北侵是我代秦受敵也今柔然寇邊民食又乏若復與裕為敵發兵南赴則北寇愈深救北則南州復危南州謂魏之南境相州瀕河諸郡復扶又翻不若假之水道聽裕西上然後屯兵以塞其東塞悉則翻使裕克捷必德我之假道不捷吾不失救秦之名此策之得者也且南北異俗借使國家棄恆山以南恆戶登翻裕必不能以吳越之兵與吾爭守河北之地安能為吾患乎夫為國計者惟社稷是利豈顧一女子乎議者猶曰裕西入關則恐吾斷其後腹背受敵北上則姚氏必不出關助我其勢必聲西而實北也嗣乃以司徒長孫嵩督山東諸軍事長知兩翻又遣振威將軍娥清孫愐曰娥姓也魏書官氏志內入諸姓阿伏干氏後為阿氏庚辰裕引軍入河以左將軍向彌為北青州刺史留戍碻磝晉氏南渡僑置青州於江北裕平廣固置北青州於東陽而江北之青州如故今向彌以北青州刺史戍碻磝東陽之青州亦如故向式亮翻初裕命王鎮惡等若克洛陽須大軍到俱進鎮惡等乘利徑趨潼關趨七喻翻為秦兵所拒不得前久之乏食衆心疑懼或欲棄輜重還赴大軍重直用翻沈林子按劍怒曰相公志清六合今許洛已定關右將平事之濟否繫於前鋒奈何沮乘勝之氣棄垂成之功乎沮在呂翻且大軍尚遠賊衆方盛雖欲求還豈可得乎下官授命不顧論語子張曰士見危授命當自為將軍辦之為于僞翻未知二三君子將何面以見相公之旗鼓邪相公謂裕也求遣糧援裕呼使者開舫北戶使疏吏翻舫甫妄翻方舟也大舟也指河上魏軍以示之曰我語令勿進今輕佻深入語牛倨翻佻他雕翻岸上如此何由得遣軍鎮惡乃親至弘農說諭百姓說輸芮翻百姓競送義租軍食復振復扶又翻下則復子復同魏人以數千騎緣河隨裕軍西行軍人於南岸牽百丈百丈者所以挽船今南人用麻繩北人以竹為之陸游曰蜀人百丈以巨竹四破為之大如人臂有漂渡北岸者漂匹招翻輒為魏人所殺略裕遣軍擊之裁登岸則走退則復來夏四月裕遣白直隊主丁旿裕選白丁之壯勇者入直左右使旿領之杜佑曰白直無月給之數旿阮古翻帥讀曰率乘繩證翻渡北岸去水百餘步為卻月陳兩端抱河車置七仗士事畢使豎一白毦豎上主翻說文曰豎立也毦仍吏翻績羽為之魏人不解其意解戶買翻曉也皆未動裕先命寧朔將軍朱超石戒嚴白毦既舉超石帥二千人馳往赴之齎大弩百張一車益二十人設彭排於轅上魏人見營陳既立乃進圍之長孫嵩帥三萬騎助之四面肉薄攻營薄普各翻肉薄者以身迫營血戰弩不能制時超石別齎大鎚及矟千餘張鎚傳為翻乃斷矟長三四尺以鎚鎚之一矟輒洞貫三四人魏兵不能當一時奔潰死者相積臨陳斬阿薄干魏人退還畔城斷丁管翻長直亮翻陳與陳同魏收地形志平原郡聊城縣有畔城超石帥寧朔將軍胡藩寧遠將軍劉榮祖追擊又破之殺獲千計魏主嗣聞之乃恨不用崔浩之言秦魯公紹遣長史姚洽寧朔將軍安鸞護軍姚墨蠡蠡魯戈翻河東太守唐小方帥衆二千屯河北之九原阻河為固欲以絶檀道濟糧援載記曰紹欲以絶弘農諸縣糧援破之斬洽墨蠡小方殺獲殆盡林子因啓太尉裕曰紹氣蓋關中今兵屈於外國危於內恐其凶命先盡不得以膏齊斧耳齊讀曰資應劭曰齊利也張晏曰齊如字征伐斧也以整齊天下也一說齊作齊凡師出入齊戒入廟而受斧鉞也紹聞洽等敗死憤恚發病嘔血以兵屬東平公讚而卒恚於避翻屬之欲翻卒子恤翻讚既代紹衆力猶盛引兵襲林子林子復擊破之復扶又翻太尉裕至洛陽行視城塹行下孟翻嘉毛修之完葺之功賜衣服玩好直二千萬好呼到翻裕收秦彞器渾儀土圭記里鼓指南車送詣建康丁巳魏主嗣如高柳壬戌還平城裕收秦彞器渾儀土圭記里鼓指南車送詣建康河西王蒙遜大赦遣張掖太守沮渠廣宗詐降以誘涼公歆沮子余翻降戶江翻下同歆發兵應之蒙遜將兵三萬伏於蓼泉新唐書地理志甘州張掖郡西北百九十里有祁連山山北有建康軍軍西百二十里有蓼泉守捉城引兵還蒙遜追之歆與戰於解支澗解支澗晉書作鮮支澗當從之斬首七千餘級蒙遜城建康置戍而還裕收秦彞器渾儀土圭記里鼓指南車送詣建康五月乙未齊郡太守王懿降於魏上書言劉裕在洛宜發兵絶其歸路可不戰而克魏主嗣善之崔浩侍講在前嗣問之曰劉裕伐姚泓果能克乎對曰克之嗣曰何故對曰昔姚興好事虛名而少實用子泓懦而多病兄弟乖爭好呼到翻少詩沼翻謂弼懿恢皆與泓爭國裕乘其危兵精將勇何故不克將即亮翻嗣曰裕才何如慕容垂對曰勝之垂藉父兄之資修復舊業國人歸之若夜蟲之就火少加倚仗易以立功少詩沼翻易以豉翻劉裕奮起寒微不階尺土討滅桓玄興復晉室事見一百一十三卷元興三年事見一百一十五卷五年六年事見六年七年梟堅堯翻非其才之過人安能如是乎嗣曰裕既入關不能進退我以精騎直搗彭城壽春騎奇寄翻裕將若之何對曰今西有屈丐北史曰明元改赫連勃勃名曰屈丐北方言屈丐者卑下也窺伺國隙伺相吏翻陛下既不可親御六師雖有精兵未睹良將將即亮翻長孫嵩長於治國短於用兵非劉裕敵也治直之翻下同興兵遠攻未見其利不如且安靜以待之凡兵之動知敵之主知敵之將此之謂也必篡其主關中華戎雜錯風俗徑悍悍侯旰翻又下罕翻裕欲以荊揚之化施之函秦此無異解衣包火張羅捕虎雖留兵守之人情未洽趨尚不同適足為寇敵之資耳赫連之得關中崔浩固料之矣秦地終為國家之有可坐而守也嗣笑曰卿料之審矣浩曰臣嘗私論近世將相之臣若王猛之治國苻堅之管仲也治直之翻慕容恪之輔幼主慕容暐之霍光也劉裕之平禍亂司馬德宗之曹操也嗣曰屈丐何如浩曰屈丐國破家覆孤孑一身孑居列翻單也寄食姚氏受其封殖不思酬恩報義而乘時徼利盜有一方事見一百一十四卷三年徼一遙翻謂與魏秦涼構怨也撅與掘同其月翻撅豎言撅起自豎立也雖能縱暴一時終當為人所吞食耳嗣大悅語至夜半賜浩御縹醪十觚縹匹紹翻青白色曰縹醅酒曰醪觚飲器受三升此魏主所自御者故曰御縹醪水精鹽一兩鹽透明如水精故謂之水精鹽朕味卿言如此鹽酒故欲與卿共饗其美然猶命長孫嵩叔孫建各簡精兵伺裕西過自成皋濟河南侵彭沛若不時過則引兵隨之彭沛謂彭城沛郡也裕收秦彞器渾儀土圭記里鼓指南車送詣建康魏主嗣西巡至雲中遂濟河畋于大漠裕收秦彞器渾儀土圭記里鼓指南車送詣建康魏置天地四方六部大人以諸公為之諸公謂時居公位及位從公者裕收秦彞器渾儀土圭記里鼓指南車送詣建康秋七月太尉裕至陝陝式冉翻沈田子傅弘之入武關秦戍將皆委城走將即亮翻田子等進屯青泥秦主泓使給事黃門侍郎姚和都屯嶢柳以拒之嶢音堯裕收秦彞器渾儀土圭記里鼓指南車送詣建康西秦相國翟勍卒勍渠京翻八月以尚書令曇達為左丞相左僕射元基為右丞相御史大夫麴景為尚書令侍中翟紹為左僕射翟勍既卒曇達皆序遷通鑑即西秦舊史書之曇徒含翻裕收秦彞器渾儀土圭記里鼓指南車送詣建康太尉裕至閺鄉閺音旻沈田子等將攻嶢柳秦主泓欲自將以禦裕軍將即亮翻恐田子等襲其後欲先擊滅田子等然後傾國東出乃帥步騎數萬奄至青泥帥讀曰率騎奇寄翻田子本為疑兵所領裁千餘人聞泓至欲擊之傅弘之以衆寡不敵止之田子曰兵貴用奇不必在衆且今衆寡相懸勢不兩立若彼結圍既固則我無所逃矣不如乘其始至營陳未立先薄之可以有功遂帥所領先進弘之繼之秦兵合圍數重陳讀曰陳重直龍翻田子撫慰士卒曰諸君冒險遠來正求今日之戰死生一決封侯之業於此在矣士卒皆踴躍鼓譟執短兵奮擊秦兵大敗沈田子以千餘人敗姚泓數萬之衆者置兵死地人自為戰也得其乘輿服御物乘繩證翻秦主泓奔還灞上初裕以田子等衆少少詩沼翻遣沈林子將兵自秦嶺往助之秦嶺在長安南班固西都賦所謂前乘秦嶺自此出藍田關裕蓋遣林子自陽華循山西南至秦嶺乃相與追之關中郡縣多潛送款於田子辛丑太尉裕至潼關以朱超石為河東太守使與振武將軍徐猗之會薛帛於河北共攻蒲阪秦平原公璞與姚和都共擊之姚和都蓋青泥既敗而奔蒲阪也或曰和都當作成都超石奔還潼關東平公讚遣司馬國璠引魏兵以躡裕後璠孚袁翻躡尼輒翻王鎮惡請帥水軍自河入渭以趨長安帥讀曰率水經河水歷船司空與渭水會春秋之渭汭即其地也趨七喻翻裕許之秦恢武將軍姚難自香城引兵而西香城在渭水之北蒲津之口恢武將軍蓋姚秦創置秦主泓自灞上引兵還屯石橋以為之援石橋在長安城洛門東北有石橋水經注曰石橋水南出馬嶺山積石據其東驪山距其西其水北徑鄭城西水上有橋東去鄭城十里故世以橋名水三輔黃圖曰洛門長安城北出東頭第一門涇水出安定涇陽縣幵頭山東南至陽陵入渭此涇上在漢京兆陽陵界破之彊死難奔長安東平公讚退屯鄭城太尉裕進軍逼之泓使姚丕守渭橋胡翼度屯石積東平公讚屯灞東泓屯逍遙園水經注沈水上承樊川皇子陂北徑長安城西與昆明池水合其枝津東北流徑鄧艾祠南又東分為二水一水入逍遙園鎮惡泝渭而上上時掌翻乘蒙衝小艦行船者皆在艦內秦人見艦進而無行船者皆驚以為神艦戶黯翻壬戌旦鎮惡至渭橋令軍士食畢皆持仗登岸後登者斬衆既登渭水迅急艦皆隨流絛忽不知所在時泓所將尚數萬人將即亮翻鎮惡諭士卒曰吾屬並家在江南此為長安北門去家萬里舟楫衣糧皆已隨流今進戰而勝則功名俱顯不勝則骸骨不返無他岐矣岐旁出之道乃身先士卒先悉薦翻衆騰踊爭進大破姚丕於渭橋泓引兵救之為丕敗卒所蹂踐不戰而潰姚諶等皆死蹂人九翻踐慈演翻諶氏壬翻泓單馬還宮鎮惡入自平朔門漢無平朔門蓋長安城北門也後人改其名耳東平公讚聞泓敗引兵赴之衆皆潰去胡翼度降於太尉裕泓將出降其子佛念年十一言於泓曰晉人將逞其欲雖降必不免不如引決降戶江翻引決謂自裁也泓憮然不應憮音武悵也失意貌佛念登宮牆自投而死姚佛念雖不及劉諶然以童稚之年氣烈如此亦可尚也癸亥泓將妻子㣥臣詣鎮惡壘門請降鎮惡以屬吏屬之欲翻城中夷晉六萬餘戶鎮惡以國恩撫慰號令嚴肅百姓安堵九月太尉裕至長安鎮惡迎於灞上裕勞之曰成吾霸業者卿也鎮惡再拜謝曰明公之威諸將之力鎮惡何功之有裕笑曰卿欲學馮異邪謂馮異謙退不伐而能定關中秦府庫盈積鎮惡盜取不可勝紀勝音升裕以其功大不問或譖諸裕曰鎮惡藏姚泓僞輦將有異志裕使人覘之覘丑廉翻又丑豔翻鎮惡剔取其金銀棄輦於垣側裕意乃安裕收秦彞器渾儀土圭記里鼓指南車送詣建康左傳祝他曰成王分魯公以官司彞器杜預注彞器常用之器漢武帝時洛下閎鮮于妄人耿壽昌造員儀以考曆度和帝時賈逵又加黃道順帝時張衡又制渾象具內外規黃赤道南北極列二十四氣二十八宿中外星官及日月五緯以漏水轉之於殿上室內星中出沒與天相應其後吳陸績造渾象王蕃制渾儀舊渾象以二分為一度凡周七尺三寸半分張衡更制以四分為一度凡周一丈四尺六寸王蕃以古制局小星辰稠穊衡器傷大難可轉移更制渾象以三分為一度凡周天一丈九寸五分分之三周禮大司徒以土圭之法測土深正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多陰日至之景尺有五寸謂之地中注云土圭所以致四時日月之景也鄭司農云測土深謂南北東西之深也日南立表處太南近日也日北謂立表處太北遠日也景夕謂日昳景乃中立表處太東近日也景朝謂日未中而景中立表處太西遠日也玄謂晝漏半而置土圭表陰陽審其南北景短於土圭謂之日南是地於日為近南也景長於土圭謂之日北是地於日為近北也東於土圭謂之日東是地於日為近東也西於土圭謂之日西是地於日為近西也如是則寒暑陰風偏而不和是未得其所求凡日景於地千里而差一寸鄭司農又云土圭之長尺有五寸以夏至之日立八尺之表其景適與土圭等謂之地中今潁川陽城地為然晉輿服志記里鼓車駕四馬制如司南車崔豹古今注曰大章車所以識道里也起於西京亦曰記里車車上有二層皆有木人行一里下層擊鼓行十里上層擊鐲黃帝作指南車晉輿服志司南車一名指南車駕四馬其下制如樓三級四角金龍銜羽葆刻木為仙人衣羽衣立車上車雖回轉手常南指大駕出行為先啓之乘蕭子顯曰指南車四周廂上施屋指南人衣裙襦天衣在廂中上四角皆施龍孑干緣唯色真孔雀毦烏布皂復幔漆畫輪駕牛皆銅校飾記里鼓車制如指南上施華蓋子䌝衣漆畫鼓機皆在內渾戶本翻皆以頒賜將士繒慈陵翻秦平原公璞並州刺史尹昭以蒲阪降東平公讚帥宗族百餘人詣裕降降戶江翻帥讀曰率裕皆殺之送姚泓至建康斬於市孝武太元九年姚萇建國改元白雀歲在甲申傳三主三十四年而亡裕以薛辨為平陽太守使鎮捍北道裕議遷都洛陽咨議參軍王仲德曰非常之事固非常人所及必致駭動今暴師日久士卒思歸遷都之計未可議也裕乃止羌衆十餘萬口西奔隴上沈林子追擊至槐里俘虜萬計姚氏羌也姚氏既滅故羌衆西奔河西王蒙遜聞太尉裕滅秦怒甚門下校郎劉祥入言事自曹操孫權置校事司察㣥臣謂之校郎後遂因之蒙遜置諸曹校郎如門下校郎中兵校郎是也蒙遜曰汝聞劉裕入關敢研研然也遂斬之楊正衡曰研五見翻然有其音而無其義河西士民乃心晉室蒙遜胡人竊據其上聞裕入關慮其響應故斬祥以威衆以鎮服其心也姦雄之喜怒豈苟然哉魏書沮渠傳作妍妍華人服飾妍靡自喜故蒙遜云然妍讀如字音義皆通當從魏書初夏王勃勃聞太尉裕伐秦謂㣥臣曰姚泓非裕敵也且其兄弟內叛安能拒人裕取關中必矣然裕不能久留必將南歸留子弟及諸將守之將即亮翻下鎮將同吾取之如拾芥耳乃秣馬礪兵訓養士卒進據安定秦嶺北郡縣鎮戍皆降之裕遣使遺勃勃書降戶江翻使疏吏翻遺于季翻約為兄弟勃勃使中書侍郎皇甫徽為報書而陰誦之對裕使者口授舍人使書之裕讀其文歎曰吾不如也史言夷豪多權數裕收秦彞器渾儀土圭記里鼓指南車送詣建康廣州刺史謝欣卒東海人徐道期聚衆攻陷州城進攻始興始興相彭城劉謙之討誅之詔以謙之為廣州刺史裕收秦彞器渾儀土圭記里鼓指南車送詣建康癸酉司馬休之司馬文思司馬國璠司馬道賜魯軌韓延之刁雍王慧龍及桓溫之孫道度道子族人桓謐桓璲陳郡袁式等皆詣魏長孫嵩降姚秦既滅司馬休之等懼為裕所誅故皆降魏璠孚袁翻雍於容翻璲音遂降戶江翻魏主嗣詔民間得姚氏子弟送平城者賞之冬十月己酉嗣召長孫嵩等還司馬休之尋卒於魏卒子恤翻魏賜國璠爵淮南公道賜爵池陽子魯軌爵襄陽公刁雍表求南鄙自效嗣以雍為建義將軍建義將軍魏以是號寵刁雍言使之建義以復父兄之讎濟子禮翻擾動徐兗太尉裕遣兵討之不克雍進屯固山衆至二萬裕收秦彞器渾儀土圭記里鼓指南車送詣建康詔進宋公爵為王增封十郡辭不受裕收秦彞器渾儀土圭記里鼓指南車送詣建康西秦王熾磐遣左丞相曇達等擊秦故將姚艾艾秦上邽之鎮將將即亮翻使疏吏翻熾磐以艾為征東大將軍秦州牧徵王松壽為尚書左僕射十二年熾磐遣松壽屯馬頭以逼秦之上邽上邽降故徵還裕收秦彞器渾儀土圭記里鼓指南車送詣建康十一月魏叔孫建等討西山丁零翟蜀洛支等平之西山魏安州之西山裕收秦彞器渾儀土圭記里鼓指南車送詣建康辛未劉穆之卒太尉裕聞之驚慟哀惋者纍日卒子恤翻惋烏貫翻始裕欲留長安經略西北而諸將佐皆久役思歸多不欲留將即亮翻會穆之卒裕以根本無託遂決意東還還從宣翻又如字穆之之卒也朝廷恇懼恇音匡怯也欲發詔以太尉左司馬徐羡之代之中軍咨議參軍張卲曰今誠急病任終在徐然世子無專命宜須咨之裕欲以王弘代穆之從事中郎謝晦曰休元輕易不若羡之王弘字休元易以豉翻代管留任於是朝廷大事常決於穆之者並悉北咨裕以次子桂陽公義真為都督雍梁秦三州諸軍事安西將軍領雍東秦二州刺史雍於用翻義真時年十二以太尉咨議參軍京兆王修為長史王鎮惡為司馬領馮翊太守沈田子毛德祖皆為中兵參軍仍以田子領始平太守德祖領秦州刺史天水太守傅弘之為雍州治中從事史先是隴上流戶寓關中者望因兵威得復本土及置東秦州時裕未得天水東秦州即毛德祖所領或曰裕置東秦州使義真兼領先悉薦翻復扶又翻下同皆歎息失望關中人素重王猛裕之克長安王鎮惡功為多由是南人皆忌之沈田子自以嶢柳之捷與鎮惡爭功不平裕將還田子及傅弘之屢言於裕曰鎮惡家在關中不可保信裕曰今留卿文武將士精兵萬人彼若欲為不善正足自滅耳勿復多言裕私謂田子曰鍾會不得遂其亂者以有衛瓘故也會瓘事見七十八卷魏元帝咸熙元年卿等十餘人何懼王鎮惡為沈田子殺王鎮惡張本臣光曰古人有言疑則勿任任則勿疑裕既委鎮惡以關中而復與田子有後言是鬬之使為亂也惜乎百年之寇千里之土得之艱難失之造次造七到翻使豐鄗之都復輸寇手鄗音浩荀子曰兼並易能也堅凝之難信哉裕收秦彞器渾儀土圭記里鼓指南車送詣建康三秦父老聞裕將還詣門流涕訴曰殘民不霑王化於今百年始覩衣冠人人相賀長安十陵是公家墳墓咸陽宮殿是公家室宅漢高帝長陵惠帝安陵文帝霸陵景帝陽陵武帝茂陵昭帝平陵宣帝杜陵元帝渭陵成帝延陵哀帝義陵平帝康陵皆在關中凡十一陵言十者舉大數也長安咸陽宮殿皆漢故跡裕劉氏子孫故父老以是為言而留之裕為之愍然為于僞翻慰諭之曰受命朝廷不得亶留誠多諸君懷本之志今以次息次息猶言次子也勉與之居十二月庚子裕發長安自洛入河開汴渠而歸汴音卞裕收秦彞器渾儀土圭記里鼓指南車送詣建康氐豪徐駭奴齊元子等擁部落三萬在雍遣使請降於魏雍於用翻使疏吏翻降戶江翻魏主嗣遣將軍王洛生河內太守楊聲等西行以應之裕收秦彞器渾儀土圭記里鼓指南車送詣建康閏月壬申魏主嗣如大寧長川裕收秦彞器渾儀土圭記里鼓指南車送詣建康秦雍人千餘家推襄邑令上谷寇讚為主以降於魏讚秦之襄邑令也久之秦雍人流入魏之河南滎陽河內者戶以萬數嗣乃置南雍州以讚為刺史封河南公治洛陽治直之翻立雍州郡縣以撫之讚善於招懷流民歸之者三倍其初裕收秦彞器渾儀土圭記里鼓指南車送詣建康夏王勃勃聞太尉裕東還大喜善用兵者觀釁而動朕欲取關中卿試言其方略買德曰關中形勝之地而裕以幼子守之狼狽而歸正欲急成篡事耳不暇復以中原為意劉裕之心事崔浩王買德皆知之復扶又翻不可失也青泥上洛南北之險要宜先遣遊軍斷之東塞潼關斷丁管翻塞悉則翻絶其水陸之路然後傳檄三輔施以威德則義真在網罟之中不足取也勃勃敗義真取關中卒如買德之計罟音古帥騎二萬向長安璝古回翻帥讀曰率騎奇寄翻前將軍昌屯潼關以買德為撫軍右長史屯青泥劉裕得洛陽而不能禁寇讚窺伺於其側使義真守關中而不能禁夏兵之斷潼關青泥南歸彭城席未暖而義真敗既棄天下肉未寒而四鎮失宜也將即亮翻下同裕收秦彞器渾儀土圭記里鼓指南車送詣建康是歲魏都坐大官章安侯封懿卒坐徂臥翻十四年戊午四一八春正月丁酉朔魏主嗣至平城命護高車中郎將薛繁帥高車丁零北略至弱水而還魏倣漢置胸奴中郎將之官置護高車中郎將帥讀曰率辛巳大赦夏赫連璝至渭陽關中民降之者屬路降戶江翻屬之欲翻龍驤將軍沈田子將兵拒之驤思將翻畏其衆盛退屯劉回堡遣使還報王鎮惡鎮惡謂王修曰公以十歲兒付吾屬當共思竭力而擁兵不進虜何由得平使者還以告田子田子與鎮惡素有相圖之志由是益忿懼未幾鎮惡與田子俱出北地以拒夏兵赫連璝已至渭陽王沈烏能出北地乎此言北地者謂長安以北之地耳幾居豈翻鎮惡欲盡殺南人以數十人送義真南還因據關中反辛亥田子請鎮惡至傅弘之營計事田子求屏人語屏必郢翻使其宗人沈敬仁斬之幕下矯稱受太尉令誅之弘之奔告劉義真義真與王修被甲登橫門以察其變橫門長安城北出東頭第一門被皮義翻橫音光言鎮惡反修執田子數以專戮斬之數所具翻以冠軍將軍毛修之代鎮惡為安西司馬冠古玩翻傅弘之大破赫連璝於池陽又破之於寡婦渡按宋白續通典今慶州北十五里有寡婦山蓋水發源是山其下流為寡婦渡夏兵乃退壬戌太尉裕至彭城解嚴琅邪王德文先歸建康裕聞王鎮惡死表言沈田子忽發狂易奄害忠勳狂易謂病狂而變易其常心易如字以彭城內史劉遵考為並州刺史領河東太守鎮蒲阪徵荊州刺史劉道憐為徐兗二州刺史裕欲以世子義符鎮荊州以徐州刺史劉義隆為司州刺史鎮洛陽中軍咨議張卲諫曰咨議咨議參軍也儲二之重四海所繫不宜處外處昌呂翻乃更以義隆為都督荊益寧雍梁秦六州諸軍事西中郎將荊州刺史更工衡翻雍於用翻以南郡太守到彥之為南蠻校尉張卲為司馬領南郡相冠軍功曹王曇首為長史冠古玩翻曇徒含翻北徐州從事王華為西中郎主簿晉置南徐州於京口北徐州仍治彭城到彥之王曇首王華輔義隆入立遂居將相之任義隆尚幼府事皆決於卲曇首弘之弟也裕謂義隆曰王曇首沈毅有器度宰相才也汝每事咨之沈持林翻以南郡公劉義慶為豫州刺史義慶道憐之子也裕解司州領徐冀二州刺史秦王熾磐以乞伏木奕干為沙州刺史鎮樂都樂音洛二月乙弗烏地延帥戶二萬降秦三月遣使聘魏使疏吏翻夏四月己巳魏徙冀定幽三州徒河於代都魏主圭皇始二年克中山置安州又立行臺以鎮撫其民天興三年改曰定州領中山常山巨鹿博陵北平河間高陽趙郡宋白曰初置安州尋改定州以安定天下為名徒河蓋徒河之民從慕容入中國留居三州者魏人因謂之徒河初和龍有赤氣四塞蔽日塞悉則翻自寅至申燕太史令張穆言於燕王跋曰此兵氣也今魏方強盛而執其使者謂留于什門也事見一百十六卷義熙十年臣竊懼焉好呼到翻跋曰吾方思之五月魏主嗣東巡至濡源及甘松濡乃官翻遣征東將軍長孫道生安東將軍李先給事黃門侍郎奚觀帥精騎二萬襲燕觀古玩翻帥讀曰率騎奇寄翻又命驍騎將軍延普幽州刺史尉諾自幽州引兵趨遼西為之聲勢魏書官氏志內入諸姓可地延氏為延氏驍堅堯翻西方尉遲氏後改為尉氏尉音鬱道生等拔乙連城進攻和龍與燕單于右輔古泥戰破之義熙七年跋置單于四輔單音蟬將即亮翻燕王跋嬰城自守魏人攻之不克掠其民萬餘家而還還從宣翻又如字六月太尉裕始受相國宋公九錫之命十二年命下至是乃受崇繼母蘭陵蕭氏為太以太尉軍咨祭酒孔靖為宋國尚書令左長史王弘為僕射領選選須絹翻從事中郎傅亮蔡廓皆為侍中謝晦為右衛將軍右長史鄭鮮之為奉常行參軍殷景仁為祕書郎其餘百官悉依天朝之制朝直遙翻下同靖辭不受亮咸之孫傅咸仕於武惠之間以直顯謨之曾孫蔡謨歷事成康穆三朝出蕃入輔皆有聲績渾之玄孫鄭渾見六十六卷漢獻帝建安十七年融之曾孫也殷融見九十四卷成帝咸和三年敏有思致思相吏翻口不談義深達理體至於國典朝儀舊章記注莫不撰録撰士免翻識者知其有當世之志魏天部大人白馬文貞公崔宏疾篤去年魏置天地四方六部大人一夜數返及卒詔㣥臣及附國渠帥皆會葬渠大也卒子恤翻帥所類翻秋七月戊午魏主嗣至平城九月甲寅魏人命諸州調民租戶五十石積於定相冀三州魏主圭天興四年置相州於鄴領魏陽平廣平汲郡東郡頓丘濮陽清河等郡冀州所領止長樂勃海武邑章武樂陵而已調徒弔翻相息亮翻河西王蒙遜復引兵伐涼復扶又翻下復歸同涼公歆將拒之左長史張體順固諫乃止蒙遜芟其秋稼而還芟所銜翻歆遣使來告襲位冬十月以歆為都督七郡諸軍事鎮西大將軍酒泉公都督敦煌酒泉晉興建康涼興及歆父皓所置會稽廣夏凡七郡姚艾叛秦降河西王蒙遜姚艾稱藩於乞伏事見上年降戶江翻艾叔父雋言於衆曰秦王寬仁有雅度自可安居事之何為從河西王西遷衆咸以為然乃相與逐艾推雋為主復歸於秦秦王熾磐徵雋為侍中中書監賜章甲十一行本賜上有征南將軍四字乙十一行本同孔本同退齊校同爵隴西公以左丞相曇達為都督洮罕以東諸軍事征東大將軍秦州牧鎮南安洮罕謂臨洮枹罕也曇徒含翻洮土刀翻劉義真年少少詩照翻賜與左右無節王修每裁抑之左右皆怨譖修於義真曰王鎮惡欲反故沈田子殺之修殺田子是亦欲反也義真信之使左右劉乞等殺修修既死人情離駭莫相統一義真悉召外軍入長安外軍謂屯蒲阪以捍魏屯渭北以捍夏之軍也關中郡縣悉降於夏赫連璝夜襲長安不克降戶江翻璝古回翻夏王勃勃進據咸陽長安樵采路絶宋公裕聞之使輔國將軍蒯恩如長安召義真東歸蒯苦怪翻以相國右司馬朱齡石為都督關中諸軍事右將軍雍州刺史代鎮長安晉先置雍州於襄陽此為北雍州雍於用翻卿至可敕義真輕裝速發既出關然可徐行然下當有後字可與義真俱歸又命中書侍郎朱超石慰勞河洛勞力到翻十一月齡石至長安義真將士貪縱大掠而東將即亮翻多載寶貨子女方軌徐行雍州別駕韋華奔夏韋華本姚氏臣也裕用為雍州別駕建威將軍傅弘之曰公處分亟進今多將輜重帥讀曰率處昌呂翻分扶問翻重直用翻一日行不過十里虜追騎且至騎奇寄翻下同何以待之宜棄車輕行乃可以免義真不從俄而夏兵大至傅弘之蒯恩斷後斷丁管翻力戰連日至青泥晉兵大敗弘之恩皆為王買德所禽買德先屯青泥故二將為所邀而見禽亦為夏兵所禽義真行在前會日暮夏兵不窮追故得免左右盡散獨逃草中中兵參軍段宏單騎追尋緣道呼之義真識其聲出就之曰君非段中兵邪身在此行矣晉人多自稱為身可刎身頭以南使家公望絶魏晉之間凡人子者稱其父曰家公人稱之曰尊公刎扶粉翻死生共之下官不忍乃束義真於背單馬而歸義真謂宏曰今日之事誠無算略然丈夫不經此何以知艱難夏王勃勃欲降傅弘之降戶江翻弘之不屈章甲十一行本屈下有時天寒三字乙十一行本同孔本同張校同勃勃裸之弘之叫罵而死裸郎果翻勃勃積人頭為京觀號曰髑髏臺觀古玩翻髑徒谷翻髏洛侯翻長安百姓逐朱齡石齡石焚其宮殿奔潼關義真既大掠長安而歸長安之人固仇視晉人矣齡石奉宋公之命與義真俱歸可也癡坐長安以待逐何歟大饗將士舉觴謂王買德曰卿往日之言一期而驗可謂算無遺策此觴所集非卿而誰以買德為都官尚書封河陽侯龍驤將軍王敬先戍曹公壘曹公壘在潼關曹操伐韓馬所築也驤思將翻朱超石至蒲阪聞齡石所在亦往從之赫連昌攻敬先壘斷其水道斷丁管翻衆渴不能戰城且陷齡石謂超石曰弟兄俱死異域使老親何以為心爾求間道亡歸間古莧翻我死此無恨矣超石持兄泣曰人誰不死寧忍今日辭兄去乎遂與敬先及右軍參軍劉欽之皆被執送長安勃勃殺之被皮義翻欽之弟秀之悲泣不歡燕者十年欽之穆之之從兄子也從才用翻宋公裕聞青泥敗未知義真存亡章甲十一行本亡下有怒甚二字乙十一行本同孔本同退齊校同刻日北伐使裕能復北伐則聞青泥之敗當投袂而起矣何待刻日乎英雄所為固非常人所測識也士卒疲弊請俟他年不從晦請俟他年亦裕所謂識機變者也鄭鮮之之言則異於是以為虜聞殿下親征必人併力守潼關徑往攻之恐未易可克易以豉翻若輿駕頓洛則不足上勞聖躬且虜雖得志不敢乘勝過陝者猶攝服大威陝失冉翻攝讀曰懾為將來之慮故也若造洛而反虜必更有揣量之心或益生邊患造七到翻揣初委翻量音良況大軍遠出後患甚多昔歲西征劉鍾狼狽謂十一年盜襲冶亭時也廣州傾覆謂徐道期陷廣州也後來之鑒也今諸州大水民食寡乏三吳㣥盜攻沒諸縣皆由困於征役故也江南士庶引領顒顒顒魚容翻以望殿下之返旆聞更北出不測淺深之謀往還之期臣恐返顧之憂更在腹心也若慮西虜更為河洛之患者宜結好北虜北虜親則河南安北虜魏也好呼到翻濟子禮翻會得段宏啓知義真得免裕乃止但登城北望慨然流涕而已降義真為建威將軍司州刺史以段宏為宋臺黃門郎領太子右衛率率所律翻裕以天水太守毛德祖為河東太守代劉遵考守蒲阪裕雖知德祖善守而用之然人心已搖宜其不能固也為下德祖棄蒲阪張本夏王勃勃築壇於灞上即皇帝位改元昌武西秦王熾磐東巡十二月徙上邽民五千餘戶于枹罕枹音膚彗星出天津入太微經北斗絡紫微晉書天文志曰箕四星一曰天津又曰天漢經尾箕之間謂之漢津太微天子庭也在北斗南紫微十五星在北斗北彗祥歲翻魏主嗣復召諸儒復扶又翻術士問之曰今四海分裂災咎之應果在何國朕甚畏之卿輩盡言勿有所隱衆推崔浩使對浩曰夫災異之興皆象人事人苟無釁又何畏焉釁許覲翻昔王莽將篡漢彗星出入正與今同漢書天文志曰哀帝建平二年彗星出牽牛七十餘日傳曰彗者所以除舊布新牽牛日月五星所從起三正之始彗而出之改更之象也其後卒有王莽篡國之禍民無異望晉室陵夷危亡不遠彗之為異其劉裕將篡之應乎衆無以易其言宋公裕以讖云昌明之後尚有二帝晉書帝紀曰初簡文帝見讖云晉祚盡昌明及孝武帝之在孕也李太后夢神人謂之曰汝生男以昌明為字及産東方始明因以為名簡文後悟乃流涕又曰讖云昌明之後有二帝裕乃使縊帝而立恭帝以應二帝云讖楚譖翻德文常在帝左右飲食寢處未嘗暫離處昌呂翻離力智翻韶之伺之經時不得間會德文有疾出居於外戊寅韶之以散衣縊帝於東堂年三十七伺相吏翻間古莧翻散悉亶翻縊於賜翻又於計翻廙之曾孫也廙王敦之從弟廙羊至翻又逸職翻奉德文即皇帝位大赦是歲河西王蒙遜奉表稱藩拜涼州刺史尚書右僕射袁湛卒恭皇帝諱德文字德文安帝母弟也諡法尊賢貴義敬事供上尊賢敬讓愛民長弟執禮御賓芘親之闕皆曰恭長弟謂順長接弟御賓迎待賓也元熙元年己未四一九春正月壬辰朔改元立琅邪王褚氏為皇后后裒之曾孫也褚裒崇德太后之父裒蒲侯翻魏主嗣畋于犢渚據北史犢渚在柞山西臨河甲午徵宋公裕入朝朝直遙翻進爵為王裕辭癸卯魏主嗣還平城庚申葬安皇帝于休平陵剌劉道憐司空出鎮京口剌者敕字之誤也章乙十一行本正作敕張校同甲十一行本作空格司空之上又當逸以字夏將叱奴侯提帥步騎二萬攻毛德祖於蒲阪將即亮翻帥讀曰率騎奇寄翻阪音反德祖不能禦全軍歸彭城二月宋公裕以德祖為滎陽太守戍虎牢宋白曰虎牢古東虢國春秋為鄭之制邑漢為成皋縣穆天子傳天子獵于鄭有虎在葭中七萃之士禽之以獻命畜之東虢號曰虎牢後為成皋縣北臨黃河後漢為成皋關後魏為東中郎將府唐為汜水縣夏主勃勃徵隱士京兆韋祖思祖思既至恭懼過甚勃勃怒曰我以國士徵汝汝乃以非類遇我汝昔不拜姚興今何獨拜我我在汝猶不以我為帝王我死汝曹弄筆當置我於何地邪遂殺之勃勃之殺祖思虐矣然祖思之恭懼過甚勃勃以為薄己而殺之則勃勃為有見而祖思為無所守也㣥臣請都長安勃勃曰朕豈不知長安歷世帝王之都沃饒險固然晉人僻遠終不能為吾患魏與我風俗略同土壤鄰接自統萬距魏境裁百餘里朕在長安統萬必危若在統萬魏必不敢濟河而西諸卿適未見此耳皆曰非所及也使勃勃常在猶云可也勃勃死則統萬為魏有古人所以貽厥子孫者固有道也以赫連璝領大將軍雍州牧録南臺尚書事璝工回翻雍於用翻勃勃還統萬大赦改元真興勃勃性驕虐視民如草芥常居城上置弓劍於側有所嫌忿手自殺之㣥臣忤視者鑿其目索隱曰忤者逆也忤五故翻諫者先截其舌而後斬之初司馬楚之奉其父榮期之喪歸建康榮期死見一百一十四卷安帝義熙二年章甲十一行本稱作裕乙十一行本同孔本同誅翦宗室之有才望者楚之叔父宣期兄貞之皆死楚之亡匿竟陵蠻中及從祖休之自江陵奔秦休之宣帝弟魏中郎進之六世孫楚之宣帝弟太常馗之八世孫故休之於楚之為從祖休之奔秦見上卷義熙十一年從才用翻聚衆以謀復讎楚之少有英氣能折節下士少詩照翻折而設翻下遐稼翻有衆萬餘屯據長社裕使刺客沐謙往刺之沐莫卜翻姓也風俗通漢有東平太守沐寵蜀本作沭音述非也楚之待謙甚厚謙欲發未得間乃夜稱疾知楚之必往問疾因欲刺之間古莧翻刺七亦翻楚之果自齎湯藥往視疾情意勤篤謙不忍發乃出匕首於席下以狀告之曰將軍深為劉裕所忌願勿輕率以自保全遂委身事之為之防衛王鎮惡之死也沈田子殺其兄弟七人唯弟康得免逃就宋公裕於彭城裕以為相國行參軍晉制諸公府置諸曹參軍又有正參軍行參軍長兼行參軍等員會長安不守康糾合關中徙民得百許人驅帥僑戶七百餘家共保金墉城帥讀曰率下同時宗室多逃亡在河南有司馬文榮者帥乞活千餘戶屯金墉城南惠帝時並州饑荒其吏民隨東燕王騰東下號曰乞活是後流徙逐糧者亦曰乞活自東垣帥三千人屯城西按魏收地形志洛州新安郡有東垣縣注云二漢晉屬河東後屬按此下當有佚文參考漢晉志河東郡有垣縣無東垣孝武太元十一年馮該擊斬苻丕於東垣此時已有東垣之名宋白曰宋武入洛更置東垣西垣二縣新唐書地理志河南府新安縣高祖武德初析置東垣縣則知東垣在新安界司馬楚之屯柏谷塢魏河內鎮將于栗磾遊騎在芒山上將即亮翻磾丁奚翻騎奇寄翻攻逼交至康堅守六旬裕以康為河東太守遣兵救之平等皆散走詳考上文未知平等為何人百姓甚親賴之司馬順明司馬道恭及平陽太守薛辨皆降於魏降戶江翻下同魏以辨為河東太守以拒夏人夏四月秦征西將軍孔子帥騎五千討吐谷渾覓地於弱水南孔子亦乞伏氏也禹貢導弱水至于合黎餘波入于流沙地志云弱水出刪丹縣亦謂之張掖河合黎在酒泉會水縣東北流沙張掖居延縣東北之居延澤是也曾氏曰弱水出窮谷覓地帥其衆六千降於秦拜弱水護軍庚辰魏主嗣有事于東廟古制左祖右社魏建宗廟於平城宮之東因曰東廟杜佑曰明元永興四年立太祖道武廟於白登山歲一祭無常月又於白登西太祖舊遊之處立昭成獻明太祖廟常以九月十月之交親祀焉則東廟者白登山廟也以山西又有廟故以此為東廟辛巳南巡至鴈門五月庚寅朔魏主嗣觀漁於灅水己亥還平城灅力水翻涼公歆用刑過嚴又好治宮室好呼到翻治直之翻從事中郎張顯上疏以為涼土三分謂李氏沮渠乞伏也兼並之本在於務農懷遠之略莫如寬簡今入歲已來陰陽失序風雨乖和是宜減膳徹懸古者天子膳用六牲具馬牛羊犬豕雞諸侯膳用三牲懸樂懸也天子宮懸諸侯軒懸大荒大札天地有烖國有大故則減膳徹樂穀梁傳曰五穀不升為天饑一穀不升謂之嗛二穀不升謂之饑三穀不升謂之饉四穀不升謂之康五穀不升謂之大侵大侵之禮君食不兼味臺榭不塗弛侯廷道不除百官布而不祭鬼神禱而不祀白虎通曰一穀不升徹鶉鷃二穀不升徹鳧鴈三穀不升徹雉兔四穀不升損囿獸五穀不升不備三牲而更繁刑峻法繕築不止殆非所以致興隆也昔文王以百里而興二世以四海而滅周文王興於岐周地方百里秦二世承始皇之後奄有四海卒以滅亡得失昭然太祖以神聖之姿為西夏所推左取酒泉右開西域李皓廟號太祖為西夏所推事見一百一十二卷安帝隆安四年取酒泉見五年開西域亦見四年夏戶雅翻混一涼土侔蹤張后張后謂張軌及其子若孫也沮渠蒙遜胡夷之傑內修政事外禮英賢攻戰之際身均士卒百姓懷之樂為之用沮子余翻樂音洛臣謂殿下非但不能平殄蒙遜亦懼蒙遜方為社稷之憂歆覽之不悅主簿泛稱上疏諫曰泛音凡天之子愛人主殷勤至矣故政之不修下災異以戒告之改者雖危必昌不改者雖安必亡元年三月癸卯敦煌謙德堂陷張駿據河西起謙光殿於姑臧自謂專制一方而事晉不改臣節雖謙而光也李皓得敦煌亦稱藩於晉起謙德堂其志猶張氏也敦煌徒門翻效穀地裂二年元日昏霧四塞四月日赤無光二旬乃復十一月狐上南門今茲春夏地頻五震六月隕星于建康臣雖學不稽古行年五十有九請為殿下略言耳目之所聞見不復能遠論書傳之事也塞悉則翻上時掌翻為于僞翻不復扶又翻傳直戀翻乃者咸安之初西平地裂狐入謙光殿前俄而秦師奄至都城不守咸安簡文帝年號涼土以姑臧為都城孝武太元元年秦入姑臧蓋地裂狐入在咸安之初而其應在太元之初也不撫百姓專為聚斂斂力贍翻建元十九年姑藏南門崩隕石於間豫堂明年為呂光所殺太元元年秦主堅建元之十二年也堅以梁熙鎮涼州建元十九年堅敗於淮南晉太元之八年也明年呂光殺梁熙三年之中地震五十餘所既而先王龍興於瓜州瓜州敦煌郡也考之晉志張氏置沙州於敦煌未嘗置瓜州又考之唐志沙洲敦煌郡本瓜州武德五年曰西沙州貞觀七年曰沙州瓜州晉昌郡武德五年析沙州之常樂置蓋李皓興於敦煌自稱秦涼二州牧其後遷于酒泉以敦煌為瓜州至唐復以敦煌為沙州以晉昌為瓜州而瓜州分為二州矣此皆目前之成事殿下所明知也效穀先王鴻漸之地皓自效穀令得敦煌遂有七郡故云然易所謂鴻漸者鴻水鳥也自水而漸于干又漸于磐又漸于陸又漸于木自下而進漸升而上也即尊之室基陷地裂大凶之徵也日者太陽之精中國之象赤而無光中國將衰諺曰諺音彥野獸入家主人將去狐上南門亦變異之大者也今蠻夷益盛中國益微願殿下亟罷宮室之役止遊畋之娛延禮英俊愛養百姓以應天變防未然歆不從秋七月宋公裕始受進爵之命八月移鎮壽陽以度支尚書劉懷慎為督淮北諸軍事徐州刺史鎮彭城曹魏文帝置度支尚書掌軍國支計晉因之度徒洛翻辛未魏主嗣東巡甲申還平城九月宋王裕自解揚州牧秦左衛將軍匹達等將兵討彭利和于漒川大破之利和單騎奔仇池獲其妻子徙羌豪三千戶于枹罕漒川羌三萬餘戶皆安堵如故冬十月以尚書右僕射王松壽為益州刺史鎮漒川漒其良翻騎奇寄翻枹音膚宋王裕以河南蕭條乙酉徙司州刺史義真為揚州刺史鎮石頭蕭太謂裕曰道憐汝布衣兄弟宜用為揚州裕曰寄奴於道憐豈有所惜裕小字寄奴道憐蕭太所生也事務至多非道憐所了太曰道憐年出五十豈不如汝十歲兒邪裕曰義真雖為刺史事無大小悉由寄奴道憐年長不親其事於聽望不足聽望猶言觀聽也長知兩翻道憐性愚鄙而貪縱故裕不肯用十一月丁亥朔日有食之十二月癸亥魏主嗣西巡至雲中從君子津西渡河大獵於薛林山按魏書帝紀薛林山在屋竇城西辛卯宋王裕加殊禮進王太為太后世子為太子聶崇岐標點王崇武覆校
