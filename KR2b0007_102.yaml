body:
  text: 資治通鑑卷第一百二端明殿學士兼翰林侍讀學士朝散大夫充右諫議大夫集賢殿修撰權判西京留司御史臺上柱國河內郡開國侯食邑一千三百戶食實封四百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注晉紀二十四海西公下太和四年己巳三六九春三月大司馬溫請與徐兗二州刺史郗愔江州刺史桓沖豫州刺史袁真等伐燕慕容恪死溫乃伐燕自謂相時而動可以制勝豈知為慕容垂所敗哉郗丑之翻愔挹淫翻初愔在北府晉都建康以京口為北府歷陽為西府姑孰為南州京口酒可飲兵可用京口兵可用蓋山川風氣然也豈必至謝玄用之而後敵人知畏哉而愔暗於事機乃遺溫箋遺于季翻欲共獎王室請督所部出河上愔子超為溫參軍取視寸寸毀裂乃更作愔箋更工衡翻自陳非將帥才不堪軍旅將即亮翻帥所類翻老病乞閒地自養勸溫並領己所統溫得箋大喜即轉愔冠軍將軍會稽內史冠古玩翻會稽為王國改太守為內史會工外翻溫自領徐兗二州刺史夏四月庚戌溫帥步騎五萬發姑孰帥讀曰率騎奇寄翻甲子燕主暐立皇后可足渾氏太后從弟尚書令豫章公翼之女也從才用翻大司馬溫自兗州伐燕郗超曰道遠汴水又淺兵亂之餘汴水填淤未嘗有人浚治故淺汴皮變翻溫不從六月辛丑溫至金鄉金鄉縣後漢屬山陽郡晉屬高平郡隋屬濟陰郡唐屬兗州我宋屬濟州縣在州東南九十里水道絶溫使冠軍將軍毛虎生鑿巨野三百里引汶水會于清水班固地理志汶水出泰山萊蕪縣西南入濟水經注濟水東北入巨野其故瀆又東北右合洪水洪水上承巨野薛訓渚謂之桓公瀆濟自是北注杜佑曰濟水因王莽末渠涸不復截河過今東平濟南淄川北海界中有水流入海謂之清河實菏澤汶水合流亦曰濟河蓋因舊名非濟水也汶音問寶之子也毛寶預有平蘇峻之功注又見前舳艫數百里舳音逐艫音盧郗超曰清水入河難以通運自清水入河皆是泝流又道里回遠故言難以通運運道又絶因敵為資復無所得復扶又翻此危道也不若盡舉見衆直趨鄴城見賢遍翻趨七喻翻彼畏公威名必望風逃潰北歸遼碣碣音竭若能出戰則事可立決若欲城鄴而守之則當此盛夏難為功力百姓布野盡為官有易水以南必交臂請命矣但恐明公以此計輕鋭勝負難必欲務持重則莫若頓兵河濟濟子禮翻控引漕運俟資儲充備至來夏乃進兵雖如賒遲賒遠也捨此二策而連軍北上上時掌翻進不速決退必愆之愆差爽也乏匱竭也此言糧運漸及秋冬水更澀滯澀色立翻且北土早寒三軍裘褐者少少詩沼翻恐於時所憂非獨無食而已溫又不從郗超之謀略豈常人所及哉宜桓溫重之也重之而不從其計者直趨鄴城決勝負於一戰溫所不敢頓兵河濟以待來年使燕得為備溫亦不為也溫遣建威將軍檀玄攻湖陸拔之湖陸縣前漢曰湖陵屬山陽郡章帝更名湖陸晉分屬高平郡賢曰湖陸故城在今兗州方與縣東南燕主暐以下邳王厲為征討大都督帥步騎二萬逆戰于黃墟水經注陳留小黃縣有黃鄉杜預曰外黃縣東有黃城兵亂之後城邑丘墟故曰黃墟帥讀曰率騎奇寄翻單馬奔還高平太守徐翻舉郡來降前鋒鄧遐朱序敗燕將傅顏於林渚水經注華水東徑棐城北即北林亭也春秋諸侯會于棐林以救鄭遇于北林按林鄉故城在新鄭北又有白鴈陂在長社東北林鄉西南敗補邁翻復扶又翻臧不能抗乃遣散騎常侍李鳳求救于秦散悉亶翻騎奇寄翻秋七月溫屯武陽此東武陽也漢屬東郡魏晉屬陽平郡唐改曰朝城縣屬魏州溫至枋頭帥讀曰率枋音方暐及太傅評大懼謀奔和龍吳王垂曰臣請擊之若其不捷走未晚也暐乃以垂代樂安王臧為使持節南討大都督使疏吏翻帥征南將軍范陽王德等衆五萬以拒溫垂表司徒左長史申胤黃門侍郎封孚尚書郎悉羅騰皆從軍悉羅騰蓋夷人以部落為氏如魏書官氏志所載神元時餘部諸姓內入者叱羅氏如羅氏之類鍾之子孚放之子也申鍾見九十五卷成帝咸和九年封放見九十九卷穆帝永和七年暐又遣散騎侍郎樂嵩請救于秦許賂以虎牢以西之地秦王堅引㣥臣議于東堂皆曰昔桓溫伐我至灞上見九十九卷永和十年今溫伐燕我何救焉且燕不稱藩於我我何為救之王猛密言於堅曰燕雖強大慕容評非溫敵也若溫舉山東進屯洛邑收幽冀之兵引並豫之粟觀兵崤澠澠彌兗翻則陛下大事去矣今不如與燕合兵以退溫溫退燕亦病矣然後我承其弊而取之不亦善乎王猛之取李儼其計亦出此八月遣將軍苟池洛州刺史鄧羌帥步騎二萬以救燕出自洛陽軍至潁川潁川郡治許昌使疏吏翻以王猛為尚書令太子太傅封孚問於申胤曰溫衆強士整乘流直進今大軍徒逡巡高岸兵不接刃未見克殄之理事將何如胤曰以溫今日聲勢似能有為然在吾觀之必無成功何則晉室衰弱溫專制其國晉之朝臣未必皆與之同心朝直遙翻故溫之得志衆所不願也必將乖阻以敗其事乖異也阻隔也敗補邁翻溫驕而恃衆怯於應變大衆深入值可乘之會反更逍遙中流不出赴利欲望持久坐取全勝溫之為計正如此申胤料之審矣情見勢屈必不戰自敗此自然之數溫攻秦而不渡霸水攻燕而徘徊枋頭人皆咎其不進知彼知己溫蓋臨敵而方有見乎此也溫之智雖不足以禁暴定功然其去衆人亦遠矣愆謂糧運失期不至懸絶也見賢遍翻溫以燕降人段思為鄉導降戶江翻鄉讀曰嚮悉羅騰與溫戰生擒思溫使故趙將李述徇趙魏騰又與虎賁中郎將染干津擊斬之染干亦夷姓如悉羅之類初溫使豫州刺史袁真攻譙梁開石門以通水運真克譙梁而不能開石門譙梁譙郡及梁國也塞悉則翻九月燕范陽王德帥騎一萬蘭臺章十二行本臺下有治書二字乙十一行本同退齊校同侍御史劉當帥騎五千屯石門豫州刺史李邽帥州兵五千斷溫糧道燕豫州刺史治許昌斷丁管翻佩之子也劉佩為慕容皓將卻石虎攻宇文皆有功與晉兵遇宙曰晉人輕剽剽匹妙翻急也怯於陷敵勇於乘退宜設餌以釣之乃使二百騎挑戰挑徒了翻分餘騎為三伏挑戰者兵未交而走晉兵追之宙帥伏以擊之晉兵死者甚衆溫戰數不利糧儲復竭數所角翻復扶又翻下同又聞秦兵將至丙申焚舟棄輜重鎧仗重直用翻自陸道奔還以毛虎生督東燕等四郡諸軍事領東燕太守沈約曰東燕郡江左分濮陽所立也余按石虎分東燕郡屬洛州則是郡蓋祖逖在豫州時所置也燕於賢翻溫自東燕出倉垣鑿井而飲汴水濟瀆皆自北而南恐追兵毒其上流故鑿井而飲燕之諸將爭欲追之吳王垂曰不可溫初退惶恐必嚴設警備簡精鋭為後拒擊之未必得志不如緩之彼幸吾未至必晝夜疾趨俟其士衆力盡氣衰然後擊之無不克矣乃帥八千騎徐行躡其後溫果兼道而進數日垂告諸將曰溫可擊矣乃急追之及溫於襄邑襄邑縣自漢以來屬陳留郡與垂夾擊溫大破之斬首三萬級秦苟池邀擊溫於譙又破之死者復以萬計孫元遂據武陽以拒燕燕左衛將軍孟高討擒之冬十月己巳大司馬溫收散卒屯于山陽劉昫曰山陽漢射陽縣地晉置山陽郡改為山陽縣唐為楚州治所喪息浪翻乃歸罪於袁真以石門不開糧運不繼為真罪又免冠軍將軍鄧遐官冠古玩翻真以溫誣己不服表溫罪狀朝廷不報真遂據壽春叛降燕且請救亦遣使如秦降戶江翻使疏吏翻下同溫以毛虎生領淮南太守守歷陽淮南太守本治壽春壽春既叛以虎生領淮南而守歷陽歷陽本淮南屬縣虎生守之外以備壽春內以衛江南燕秦既結好好呼到翻使者數往來數所角翻燕散騎侍郎章十二行本郎下有太原二字乙十一行本同孔本同張校同郝晷給事黃門侍郎梁琛相繼如秦琛丑林翻晷與王猛有舊猛接以平生問以東方之事晷見燕政不修而秦大治治直吏翻章十二行本治下有知燕將亡四字乙十一行本同孔本同張校同退齊校同陰欲自託於猛頗泄其實琛至長安秦王堅方畋於萬年萬年秦之櫟陽漢高帝更名屬馮翊晉屬京兆見賢遍翻琛曰秦使至燕燕之君臣朝服備禮灑掃宮庭朝直遙翻灑所賣翻又如字掃所報翻又如字然後敢見今秦王欲野見之使臣不敢聞命尚書郎辛徑謂琛曰賓客入境惟主人所以處之君焉得專制其禮且天子稱乘輿處昌呂翻焉於虔翻乘繩證翻所至曰行在所何常居之有又春秋亦有遇禮春秋隱四年公及宋公遇于清公羊傳曰遇者何不期也杜預曰遇者草次之期二國各簡其禮若道路相逢遇也琛曰晉室不綱靈祚歸德靈祚猶班彪王命論所謂神明之祚也俱受明命而桓溫猖狂窺我王略左傳侵敗王略杜預注曰略經略法度余謂此略封略也如左傳王與之武公之略之略勢不獨立是以秦主同恤時患要結好援要一遙翻好呼到翻下同東朝君臣引領西望愧其不競以為鄰憂競強也朝直遙翻下同敬待有加今強寇既退交聘方始謂宜崇禮篤義以固二國之歡若忽慢使臣是卑燕也豈修好之義乎夫天子以四海為家故行曰乘輿止曰行在今海縣分裂騶衍曰中國有赤縣神州赤縣神州內有九州禹所敍九州是也其外有裨海環之海縣之說蓋本諸此安得以乘輿行在為言哉禮不期而見曰遇蓋因事權行其禮簡略豈平居容與之所為哉客使單行誠勢屈於主人然苟不以禮亦不敢從也堅乃為之設行宮為于僞翻百僚陪位然後延客如燕朝之儀事畢堅與之私宴倣古私覿之禮也東朝名臣為誰琛曰太傅上庸王評明德茂親光輔王室車騎大將軍吳王垂雄略冠世冠古玩翻折衝禦侮其餘或以文進或以武用官皆稱職稱尺證翻野無遺賢琛從兄奕為秦尚書郎從才用翻堅使典客館琛於奕舍漢有典客之官後改為大鴻臚此特臨時使之典客耳館音貫下果館同昔諸葛瑾為吳聘蜀與諸葛亮惟公朝相見退無私面瑾亮兄弟也為于僞翻今使之即安私室所不敢也乃不果館奕數來就邸舍與琛臥起間問琛東國事數所角翻間古莧翻琛曰今二方分據兄弟並蒙榮寵論其本心各有所在琛欲言東國之美恐非西國之所欲聞燕在關東秦在關西二方分據故謂燕為東國秦為西國又非使臣之所得論也使疏吏翻兄何用問為堅使太子延琛相見秦人欲使琛拜太子先諷之曰鄰國之君猶其君也鄰國之儲君亦何以異乎琛曰天子之子視元士欲其由賤以登貴也禮記郊特牲曰天子之元子士也天下無生而貴者也況他國之臣乎苟無純敬則禮有往來情豈忘恭但恐降屈為煩耳言當答拜也王猛勸堅留琛堅不許燕主暐遣大鴻臚溫統拜袁真使持節都督淮南諸軍事征南大將軍揚州刺史封宣城公臚陵如翻使疏吏翻統未踰淮而卒吳王垂自襄邑還鄴威名益振太傅評愈忌之垂奏所募將士忘身立效將軍孫蓋等椎鋒陷陳立效句絶椎搗也直搗其鋒也評皆抑而不行垂數以為言與評廷爭怨隙愈深數所角翻爭讀如字太后可足渾氏素惡垂事見一百卷穆帝升平元年惡烏路翻與評密謀誅之太宰恪之子楷及垂舅蘭建知之以告垂曰先發制人兵法曰先發制人後發者人制之餘無能為矣垂曰骨肉相殘而首亂於國吾有死而已不忍為也頃之二人又以告曰內意已決內意謂可足渾后之意也垂曰必不可彌縫吾寧避之於外餘非所議垂內以為憂而未敢告諸子世子令請曰尊比者如有憂色令呼其父曰尊比毗至翻太傅疾賢功高望重愈見猜邪垂曰然吾竭力致命以破強寇本欲保全家國豈知功成之後返令身無所容汝既知吾心何以為吾謀令曰主上暗弱委任太傅一旦禍發疾於駭機機弩牙也譬之彀弩不虞而機先發使人震駭故曰駭機不失大義莫若逃之龍城遜辭謝罪以待主上之察若周公之居東庶幾感寤而得還此幸之大者也書武王有疾周公冊祝于太王王季文王請以身代武王既喪管叔及其㣥弟流言曰公將不利於孺子周公東征之周公居東二年則罪人斯得乃為詩以詒王名之曰鴟梟王亦未敢誚公天大雷電以風王啓金縢得周公代武王之說乃執書以泣迎周公而歸幾居希翻則內撫燕代外懷㣥夷守肥如之險以自保亦其次也肥如之險即盧龍之塞也善十一月辛亥朔垂請畋于大陸續漢志曰巨鹿故大鹿有大陸澤即廣阿澤將趨龍城至邯鄲趨七喻翻邯鄲縣漢屬趙國本趙都也晉屬廣平郡東魏廢隋復置唐屬磁州邯鄲音寒丹少子麟素不為垂所愛逃還告狀少詩照翻垂左右多亡叛太傅評白燕主暐遣西平公強帥精騎追之帥讀曰率騎奇寄翻下同及於范陽世子令斷後斷丁管翻強不敢逼會日暮令謂垂曰本欲保東都以自全燕既都鄴謂龍城為東都謀不及設秦主方招延英傑不如往歸之垂曰今日之計舍此安之舍讀曰捨乃散騎滅迹傍南山復還鄴傍步浪翻自范陽傍南山蓋由中山常山山谷間南還也隱于趙之顯原陵顯原陵趙主石虎虛葬處抗之則不能敵逃之則無路不知所為會獵者鷹皆飛揚衆騎散去降戶章翻垂乃殺白馬以祭天且盟從者從才用翻世子令言於垂曰太傅忌賢疾能搆事以來人尤忿恨謂搆殺垂之謀也莫知尊處如嬰兒之思母夷夏同之夏戶雅翻若順衆心襲其無備取之如指掌耳事定之後革弊簡能大匡朝政朝直遙翻以輔主上安國存家功之大者也今日之便誠不可失願給騎數人足以辦之垂曰如汝之謀事成誠為大福不成悔之何及不如西奔可以萬全子馬奴潛謀逃歸殺之而行至河陽為津吏所禁斬之而濟遂自洛陽與段夫人世子令令弟寶農隆兄子楷舅蘭建郎中令高弼俱奔秦留可足渾氏於鄴段夫人垂前之女弟可足渾可足渾太后之妹也詳見一百卷穆帝升平二年高弼垂之國卿乙泉戍即魏該所保乙泉塢也在宜陽縣西南洛水之北原上閺鄉在弘農湖縣閺音旻初秦王堅聞太宰恪卒陰有圖燕之志憚垂威名不敢發及聞垂至大喜郊迎執手曰天生賢傑必相與共成大功此自然之數也要當與卿共定天下告成岱宗然後還卿本邦世封幽州使卿去國不失為子之孝歸朕不失事君之忠不亦美乎垂謝曰羇旅之臣免罪為幸本邦之榮非所敢望堅復愛世子令及慕容楷之才復扶又翻皆厚禮之賞賜巨萬每進見屬目觀之見賢遍翻屬之欲翻關中士民素聞垂父子名皆嚮慕之王猛言於堅曰慕容垂父子譬如龍虎非可馴之物馴擾也從也順也豢養猛獸使之擾狎順人之意曰馴馴詳遵翻將不可復制不如早除之堅曰吾方收攬英雄以清四海奈何殺之且其始來吾已推誠納之矣匹夫猶不棄言況萬乘乎乃以垂為冠軍將軍封賓徒侯乘繩證翻冠古玩翻賓徒漢縣名屬遼西郡楷為積弩將軍燕魏尹范陽王德素與垂善及車騎從事中郎高泰皆坐免官垂在燕為車騎大將軍以泰為從事中郎今吳王出奔外口籍籍師古曰籍籍猶紛紛也粗可消謗粗坐五翻評曰誰可者紹曰高泰其領袖也乃以泰為尚書郎泰瞻之從子高瞻見九十一卷元帝太興二年從才用翻胤之子章十二行本子作兄乙十一行本同退齊校同也秦留梁琛月餘乃遣歸琛兼程而進程驛程也謂行者以二驛為程若一程而行四驛是兼程也比必寐翻吳王垂已奔秦琛言於太傅評曰秦人日閲軍旅多聚糧於陝東陝失冉翻以琛觀之為和必不能久今吳王又往歸之秦必有窺燕之謀宜早為之備評曰秦豈肯受叛臣而敗和好哉敗補邁翻好呼到翻下同琛曰今二國分據中原常有相吞之志桓溫之入寇彼以計相救非愛燕也若燕有釁彼豈忘其本志哉苻堅王猛之為謀梁琛固已窺見之矣秦主何如人琛曰明而善斷斷丁亂翻問王猛曰名不虛得評皆不以為然琛又以告燕主暐暐亦不然之以告皇甫真真深憂之上疏言苻堅雖聘問相尋然實有窺上國之心非能慕樂德義不忘久要也樂音洛要一遙翻朱熹曰久要舊約也前出兵洛川謂苟池鄧羌救燕時也使疏吏翻國之險易虛實易以豉翻彼皆得之矣今吳王垂又往從之為其謀主伍員之禍不可不備伍員去楚奔吳借吳兵以報楚入郢事見左傳員音云皆宜選將益兵以防未然秦後伐燕之路果如真所料杜佑曰潞州上黨縣漢為壺關縣評曰秦國小力弱恃我為援且苻堅庶幾善道言苻堅雖未能純以善道交鄰猶庶幾焉幾居希翻絶二國之好不宜輕自驚擾以啓寇心卒不為備卒子恤翻秦遣黃門郎石越聘於燕太傅評示之以奢欲以誇燕之富盛高泰及太傅參軍河間劉靖言於評曰越言誕而視遠非求好也乃觀釁也宜耀兵以示之用折其謀今乃示之以奢益為其所輕矣評不從泰遂謝病歸是時太后可足渾氏侵橈國政太傅評貪昧無厭橈奴教翻又奴巧翻厭於鹽翻貪昧者貪財昧利不顧其害也貨賂上流流水行也水行就下無逆而上流之理貨賂上行謂之上流言其逆於常理也上時掌翻下同㣥下怨憤尚書左丞申紹上疏以為守宰者致治之本治直吏翻今之守宰率非其人或武臣出於行伍或貴戚生長綺紈既非鄉曲之選又不更朝廷之職守式又翻行戶剛翻長知兩翻更工衡翻加之黜陟無法貪惰者無刑罰之懼清修者無旌賞之勸是以百姓困弊寇盜充斥綱頽紀紊莫相糾攝糾督也攝録也紊音問踰於前世公私紛然不勝煩擾勝音升大燕戶口數兼二寇以晉秦為二寇四方莫及而比者戰則屢北皆由守宰賦調不平比毗至翻調徒釣翻侵漁無已行留俱窘莫肯致命故也後宮之女四千餘人僮侍廝役尚在其外廝音斯一日之費厥直萬金士民承風競為奢靡彼秦吳僭僻謂秦僭號而吳僻在一隅也有兼並之心治直之翻而我上下因循日失其序我之不修彼之願也謂宜精擇守宰併官省職存恤兵家使公私兩遂節抑浮靡愛惜用度賞必當功罰必當罪如此則溫猛可梟謂桓溫王猛梟堅堯翻豈特保境安民而已哉又索頭什翼犍疲病昏悖蕭子顯曰鮮卑被髮左衽故呼為索頭索昔各翻犍居言翻悖蒲內翻御進也而勞兵遠戍有損無益燕戍雲中以備代控制西河南堅壺關北重晉陽西寇來則拒守過則斷後斷丁管翻猶愈於戍孤城守無用之地也疏奏不省省悉景翻辛丑丞相昱與大司馬溫會涂中楊正衡曰涂音除涂中今滁州全椒縣真州六合縣地以謀後舉以溫世子熙為豫州刺史假節初燕人許割虎牢以西賂秦晉兵既退燕人悔之謂秦人曰行人失辭謂使者許割地為失辭也分災救患理之常也秦王堅大怒遣輔國將軍王猛建威將軍梁成洛州刺史鄧羌帥步騎三萬伐燕十二月進攻洛陽帥讀曰率騎奇寄翻考異曰燕少帝紀此年十二月王猛攻洛明年正月拔洛十六國秦春秋十一月王猛伐燕遺慕容紀書紀請降十二月猛受降而歸今按獻莊紀云慕容令之奔還鄴建熙元年二月也時王猛猶在洛又猛遺紀書云去年桓溫起師故從燕書大司馬溫發徐兗州民築廣陵城徙鎮之時征役既頻加之疫癘死者什四五百姓嗟怨祕書監孫章十二行本孫上有太原二字乙十一行本同孔本同退齊校同盛漢桓帝置祕書監晉武帝以祕書併中書省惠帝復置祕書監其屬有丞有郎並統著作省直書時事大司馬溫見之怒謂盛子曰枋頭誠為失利何至乃如尊君所言晉人於人子之前稱其父為尊君尊公自是關君門戶事言欲滅其門也時盛年老家居性方嚴有軌度子孫雖斑白待之愈峻至是諸子乃共號泣稽顙請為百口切計稽音啓盛大怒不許諸子遂私改之盛先已寫別本傳之外國及孝武帝購求異書得之於遼東人與見本不同見賢遍翻遂兩存之史言桓溫雖以威逼改孫盛之書終不能沒其實五年庚午三七秦兵長驅而東春正月己亥袁真以梁國內史沛郡朱憲及弟汝南內史斌陰通大司馬溫殺之斌音彬秦兵長驅而東秦王猛遺燕荊州刺史武威王筑書遺于季翻燕荊州治洛陽筑張六翻曰國家今已塞成皋之險塞悉則翻杜盟津之路盟讀曰孟大駕虎旅百萬自軹關取鄴都金墉窮戍外無救援城下之師將軍所監監視也猶言目所見也筑懼以洛陽降降戶江翻燕衛大將軍樂安王臧城新樂破秦兵于石門石門在滎陽新樂亦當在滎陽界宋白曰衛州新鄉縣治古新樂城新樂城十六國時燕將樂安王臧所築王猛之發長安也請慕容令參其軍事以為鄉導將行造慕容垂飲酒從容謂垂曰鄉讀曰嚮造七到翻從千容翻今當遠別何以贈我使我覩物思人垂脫佩刀贈之猛至洛陽賂垂所親金熙使詐為垂使者謂令曰吾父子來此以逃死也今王猛疾人如讎讒毀日深秦王雖外相厚善其心難知丈夫逃死而卒不免卒子恤翻將為天下笑吾聞東朝比來始更悔悟朝直遙翻比毗至翻主后相尤主后謂燕主暐及可足渾后也相尤言相責過故遣告汝吾已行矣便可速發令疑之躊躇終日躊直留翻躇陳如翻猶豫住足之意又不可審覆乃將舊騎舊騎自燕奔秦所從者騎奇寄翻下同遂奔樂安王臧於石門猛表令叛狀垂懼而出走及藍田為追騎所獲秦王堅引見東堂勞之曰勞力到翻卿家國失和委身投朕賢子心不忘本猶懷首丘禮記檀弓曰太公封於齊五世皆反葬於周君子曰樂樂其所自生禮不忘其本古之人有言曰狐死正丘首仁也首式又翻不足深咎然燕之將亡非令所能存惜其徒入虎口耳且父子兄弟罪不相及晉臼季薦冀缺於晉文公公曰其父有罪可乎對曰舜之罪也殛鯀其舉也興禹康誥曰父不慈子不祗兄不友弟不共不相及也狼進則跋其胡退則疐其尾狽狼屬也生子缺一足二者相附而後能行故世謂進退不可而不能行者為狼狽燕人以令叛而復還其父為秦所厚疑令為反間復扶又翻間古莧翻徙之沙城在龍都東北六百里沙城在沙野龍都即龍城臣光曰昔周得微子而革商命殷紂暴虐日甚微子抱祭器而奔周武王乃告諸侯曰殷有重罪不可不伐遂伐紂殺之而革殷命史記戎使由余使於秦繆公留由余而遺戎王以女樂戎王受而說之繆公乃歸由余由余數諫不聽繆公使人間要由余由余遂降秦繆公問以伐戎之形並國十二開地千里遂霸西戎楚殺伍奢其子員奔吳吳王闔閭用其謀而伐楚破楚入郢事見九卷漢高帝二年至四年事見六十三卷漢獻帝建安五年來為己用進取之良資也王猛知慕容垂之心久而難信獨不念燕尚未滅垂以材高功盛無罪見疑窮困歸秦未有異心遽以猜忌殺之是助燕為無道而塞來者之門也塞悉則翻如何其可哉故秦王堅禮之以收燕望親之以盡燕情寵之以傾燕衆信之以結燕心未為過矣猛何汲汲於殺垂乃為市井鬻賣之行行下孟翻有如嫉其寵而讒之者豈雅德君子所宜為哉秦兵長驅而東樂安王臧進屯滎陽王猛遣建威將軍梁成洛州刺史鄧羌擊走之留羌鎮金墉以輔國司馬桓寅為弘農太守猛為輔國將軍以寅為司馬秦初以洛州刺史鎮陝今鄧羌既進屯金墉故以桓寅代戍陝陝失冉翻秦王堅以王猛為司徒録尚書事封平陽郡侯猛固辭曰今燕吳未平戎車方駕而始得一城即受三事之賞三事三公也將何以加之堅曰苟不暫抑朕心何以顯卿謙光之美已詔有司權聽所守封爵酬庸庸功也秦兵長驅而東二月癸酉袁真卒陳郡太守朱輔立真子瑾為建威將軍豫州刺史以保壽春遣其子乾之及司馬爨亮如鄴請命燕人以瑾為揚州刺史輔為荊州刺史瑾渠吝翻秦兵長驅而東三月秦王堅以吏部尚書權翼為尚書右僕射夏四月復以王猛為司徒録尚書事復扶又翻下同猛固辭乃止秦兵長驅而東燕秦皆遣兵助袁瑾大司馬溫遣督護竺瑤等禦之燕兵先至瑤等與戰于武丘破之武丘即丘頭文王平諸葛誕改曰武丘以旌武功杜佑曰丘頭即潁州沈丘縣惠帝分汝南立南頓郡南城壽春南城也溫之弟子也秦兵長驅而東秦王堅復遣王猛督鎮南將軍楊安等十將步騎六萬以伐燕秦兵長驅而東慕容令自度終不得免度徒洛翻密謀起兵沙城中謫戍士數千人令皆厚撫之謫陟革翻五月庚午令殺牙門孟媯城大涉圭懼請自效姓譜涉姓也左傳晉有大夫涉他媯居為翻引置左右遂帥謫戍士東襲威德城威德城即宇文涉夜干所居城也燕王皓改曰威德城據城部署遣人招東西諸戍翕然皆應之鎮東將軍勃海王亮鎮龍城令將襲之其弟麟以告亮亮閉城拒守癸酉涉圭因侍直擊令令引涉圭置左右故得因侍直而擊之其黨皆潰涉圭追令至薛黎澤擒而殺之詣龍城白亮亮為誅涉圭為于僞翻收令尸而葬之秦兵長驅而東六月乙卯秦王堅送王猛於灞上曰今委卿以關東之任當先破壺關平上黨魏收曰秦置上黨郡治壺關城前漢治長子城董卓治壺關城慕容氏治安民城後遷壺關城所謂疾雷不及掩耳淮南子之言繼卿星發星發謂戴星而發行也水陸俱進卿勿以為後慮也猛曰臣杖威靈奉成算蕩平殘胡蕩徒朗翻如風掃葉願不煩鑾輿親犯塵霧但願速敕所司部置鮮卑之所言預為治舍以待其至秦兵長驅而東秋七月癸酉朔日有食之秦兵長驅而東秦王猛攻壺關楊安攻晉陽八月燕主暐命太傅上庸王評將中外精兵三十萬以拒秦考異曰載記云四十萬今從晉春秋召散騎侍郎李鳳散悉亶翻騎奇寄翻下同秦兵衆寡何如今大軍既出秦能戰乎鳳曰秦國小兵弱非王師之敵景略常才又非太傅之比不足憂也王猛字景略勝敗在謀不在衆寡秦遠來為寇安肯不戰且吾當用謀以求勝豈可冀其不戰而已乎暐不悅王猛克壺關執上黨太守南安王越所過郡縣皆望風降附降戶江翻燕人大震黃門侍郎封孚問司徒長史申胤曰事將何如胤歎曰鄴必亡矣吾屬今茲將為秦虜然越得歲而吳伐之卒受其禍左傳昭三十二年吳伐越史墨曰不及四十年越其有吳乎越得歲而吳伐之必受其凶杜預注曰此年歲在星紀星紀吳越之分也歲星所在其國有福吳先用兵故反受其殃卒子恤翻福德在燕亦謂歲星在燕分也後苻堅所謂昔吾滅燕亦犯歲而捷是也而燕之復建不過一紀耳為後燕復興張本復扶又翻又如字秦兵長驅而東大司馬溫自廣陵帥衆二萬討袁瑾以襄城太守劉波為淮南內史將五千人鎮石頭波隗之孫也元帝之末劉隗避王敦之難因北奔于後趙帥讀曰率將即亮翻下同癸丑溫敗瑾于壽春敗補邁翻遂圍之燕左衛將軍孟高將騎兵救瑾至淮北未渡會秦伐燕燕召高還還從宣翻又如字秦兵長驅而東廣漢妖賊李弘詐稱漢歸義侯勢之子聚衆萬餘人自稱聖王年號鳳凰妖於驕翻隴西人李高詐稱成主雄之子攻破涪城涪音浮逐梁州刺史楊亮九月益州刺史周楚遣子瓊討高又使瓊子梓潼太守虓討弘皆平之虓虛交翻秦兵長驅而東秦楊安攻晉陽晉陽兵多糧足久之未下王猛留屯騎校尉苟長戍壺關苟長恐當作苟萇為地道使虎牙將軍張蚝帥壯士數百潛入城中大呼斬關納秦兵呼火故翻辛巳猛安入晉陽執燕並州刺史東海王莊太傅評畏猛不敢進屯于潞川據水經注潞川在上黨潞縣北闞駰曰潞水即漳水也為冀州浸十月辛亥猛留將軍武都毛當戍晉陽進兵潞川與慕容評相持壬戌猛遣將軍徐成覘燕軍形要形者見於外要者有諸中覘見其形未足以決勝負覘見其要則勝負之機決矣覘丑廉翻又丑豔翻及昏而返猛怒將斬之鄧羌請之曰今賊衆我寡詰朝將戰杜預曰詰朝平旦也詰去吉翻朝如字大將也宜且宥之猛曰若不殺成軍法不立羌固請曰成羌之郡將也成蓋為羌本郡太守將即亮翻下同羌願與成效戰以贖之效戰謂效力決戰也羌怒還營嚴鼓勒兵將攻猛猛問其故羌曰受詔討遠賊今有近賊自相殺欲先除之猛謂羌義而有勇使語之曰將軍止吾今赦之成既免羌詣猛謝猛執其手曰吾試將軍耳將軍於郡將尚爾況國家乎吾不復憂賊矣語牛倨翻復扶又翻太傅評以猛懸軍深入欲以持久制之評為人貪鄙鄣固山泉鬻樵及水山者樵之所仰泉者汲之所仰障固山泉使軍士不得樵汲而鬻薪水以牟利賈公彥曰高曰丘大阜曰陵莫有鬬志猛聞之笑曰慕容評真奴才雖億兆之衆不足畏況數十萬乎吾今茲破之必矣乃遣游擊將軍郭慶帥騎五千夜從間道出評營後燒評輜重火見鄴中間古莧翻重直用翻見賢遍翻潞川地形高而近鄴且火盛故鄴中望而見之燕主暐懼遣侍中蘭伊讓評曰王高祖之子也慕容廆廟號高祖奈何不撫戰士而榷賣樵水專以貨殖為心乎榷古嶽翻府庫之積朕與王共之何憂於貧若賊兵遂進家國喪亡喪息浪翻王持錢帛欲安所置之乃命悉以其錢帛散之軍士酈道元曰評鬻水與軍人絹匹與水二石趨讀曰趣音趨玉翻評大懼遣使請戰於猛使疏吏翻甲子猛陳於渭源而誓之按渭水不出潞縣水經注有涅水出潞縣西覆甑山或者渭字其涅字之誤乎又按溫公稽古録書王猛破評于清原杜預曰河東聞喜縣北有清原其地又與潞川相遠姑存疑以待知者杜佑通典作潞源陳讀曰陳下同王景略受國厚恩任兼內外今與諸君深入賊地當竭力致死有進無退共立大功以報國家受爵明君之朝稱觴父母之室不亦美乎受爵明君之朝謂有功而受賞於朝也稱觴父母之室謂受賞而歸舉酒為父母壽也朝直遙翻破釜棄糧大呼競進呼火故翻猛望燕兵之衆謂鄧羌曰今日之事非將軍不能破勍敵勍渠京翻成敗之機在茲一舉將軍勉之羌曰若能以司隸見與者公勿以為憂猛曰此非吾所及也必以安定太守萬戶侯相處秦雍州刺史治安定安定在秦中為大郡處昌呂翻俄而兵交猛召羌羌寢不應猛馳就許之羌乃大飲帳中與張蚝徐成等跨馬運矛馳赴燕陳出入數四旁若無人所殺傷數百及日中燕兵大敗俘斬五萬餘人乘勝追擊所殺及降者又十萬餘人降戶江翻評單騎走還鄴崔鴻曰鄧羌請郡將以撓法徇私也撓奴教翻又女巧翻勒兵欲攻王猛無上也臨戰豫求司隸邀君也有此三者罪孰大焉猛能容其所短收其所長若馴猛虎馭悍馬以成大功詩曰采葑采菲無以下體詩谷風之辭毛氏曰葑須也菲芴也下體根莖也鄭氏曰此二菜者蔓菁與葍之類也皆上下可食然而其根有美時有惡時采之者不可以根惡時並棄其葉陸璣草木疏曰葑蕪菁也菲息菜郭璞曰葑菘菜也江南有菘江北有蔓菁相似而異菲芴土瓜也息菜似蕪菁華紫赤色可食葍大葉白華根如指色白可食葍方六翻秦兵長驅而東秦兵長驅而東自潞川而東攻鄴丁卯圍鄴猛上疏稱臣以甲子之日大殲醜類謂甲子之日克勝事同周武王克紂殲息廉翻使六州士庶不覺易主自非守迷違命一無所害秦王堅報之曰將軍役不踰時三月為一時勳高前古朕今親帥六軍星言電赴詩曰星言夙駕謂早駕見星而行也電赴言其疾也帥讀曰率以待朕至然後取之猛之未至也鄴旁剽劫公行剽匹妙翻及猛至遠近帖然號令嚴明軍無私犯言軍士不敢私犯鄴民也燕民各安其業更相謂曰不圖今日復見太原王更工衡翻復扶又翻王猛聞之歎曰慕容玄恭信奇士也可謂古之遺愛矣慕容恪字玄恭封太原王十一月秦王堅留李威輔太子守長安陽平公融鎮洛陽自帥精鋭十萬赴鄴七日而至安陽晉志安陽縣屬魏郡魏收志曰天平初併蕩陰安陽屬鄴又汲郡北修武縣有安陽城苻洪父子先屯枋頭有故老尚存聞堅之來迎於安陽故宴之堅曰昔周亞夫不迎漢文帝見十五卷漢文帝後六年何也猛曰亞夫前卻人主以求名臣竊少之少詩沼翻且臣奉陛下威靈擊垂亡之虜譬如釜中之魚何足慮也監國沖幼太子守曰監國監工銜翻脫有不虞悔之何及陛下忘臣灞上之言邪初燕宜都王桓帥衆萬餘屯沙亭杜預曰陽平元城縣有沙亭聞評敗引兵屯內黃內黃縣自漢以來屬魏郡丁丑桓帥鮮卑五千奔龍城戊寅燕散騎侍郎餘蔚帥扶餘高句麗及上黨質子五百餘人蔚於勿翻燕蓋遣兵戍上黨取其子弟留於鄴以為質餘蔚扶餘王子故陰率諸質子開門以納秦兵質音致句如字又音駒麗力知翻夜開鄴北門納秦兵燕主暐與上庸王評樂安王臧定襄王淵左衛將軍孟高殿中將軍艾朗等奔龍城姓譜艾姓晏子春秋齊有大夫艾孔風俗通有龐儉母艾氏辛巳秦王堅入鄴宮慕容垂見燕公卿大夫及故時僚吏有慍色慍於問翻高弼言於垂曰大王憑祖宗積纍之資負英傑高世之略遭值迍厄迍株倫翻棲集外邦今雖家國傾覆安知其不為興運之始邪愚謂國之舊人宜恢江海之量有以慰結其心以立覆簣之基成九仞之功言譬如為山自覆一簣而進成九仞之功簣求位翻土籠也八尺曰仞愚竊為大王不取也高弼先從垂奔秦故敢進言為于僞翻從之燕主暐之出鄴也衛士猶千餘騎既出城皆散惟十餘騎從行秦王堅使游擊將軍郭慶追之時道路艱難孟高扶侍暐經護二王二王謂樂安王臧定襄王淵也瘁秦醉翻又所在遇盜轉鬬而前數日行至福祿依冢解息解息解鞍息馬也冢知隴翻皆挾弓矢高持刀與戰殺傷數人高力極力疲極也乃直前抱一賊頓擊於地大呼曰男兒窮矣餘賊從旁射高殺之度徒洛翻射而亦翻艾朗見高獨戰亦還趨賊並死趨七喻翻暐失馬步走郭慶追及於高陽部將巨武將縛之姓譜巨姓也汝何小人敢縛天子武曰我受詔追賊何謂天子執以詣秦王堅堅詰其不降而走之狀詰去吉翻降戶江翻下同對曰狐死首丘欲歸死於先人墳墓耳慕容氏之先皆葬昌黎令還宮帥文武出降晉穆帝永和八年燕主俊改元稱帝傳子暐共十九年而亡帥讀曰率堅命厚加斂葬斂力贍翻拜其子為郎中郭慶進至龍城太傅評奔高句麗高句麗執評送於秦宜都王桓殺鎮東將軍勃海王亮並其衆奔遼東遼東太守韓稠先已降秦桓至不得入攻之不克郭慶遣將軍朱嶷擊之桓棄衆單走嶷獲而殺之嶷魚力翻諸州牧守及六夷渠帥盡降於秦帥所類翻凡得郡百五十七戶二百四十六萬口九百九十九萬以燕宮人珍寶分賜將士將即亮翻下詔大赦曰朕以寡薄猥承休命不能懷遠以德柔服四維四維東南維西南維東北維西北維有害斯民雖百姓之過然亦朕之罪也其大赦天下與之更始更工衡翻初梁琛之使秦也使疏吏翻以侍輦苟純為副侍輦之官蓋燕所置近臣也不先告純純恨之歸言於燕主暐曰琛在長安與王猛甚親善疑有異謀琛又數稱秦王堅及王猛之美數所角翻且言秦將興師宜為之備已而秦果伐燕皆如琛言暐乃疑琛知其情及慕容評敗遂收琛繫獄秦王堅入鄴而釋之除中書著作郎秦蓋循晉初之制併祕書於中書省也見賢遍翻謂之曰卿昔言上庸王吳王皆將相奇材將即亮翻相息亮翻何為不能謀畫自使亡國對曰天命廢興豈二人所能移也堅曰卿不能見幾而作虛稱燕美忠不自防反為身禍可謂智乎對曰臣聞幾者動之微吉章十二行本吉下有凶字乙十一行本同退齊校同之先見者也易大傳之辭幾居希翻見賢遍翻實所不及然為臣莫如忠為子莫如孝自非有一至之心者莫能保忠孝之始終是以古之烈士臨危不改見死不避以徇君親彼知幾者心達安危身擇去就不顧家國臣就使知之尚不忍為況非所及邪梁琛忠於所事秦王堅不能顯而庸之識者有以知秦祚之不長矣堅聞悅綰之忠悅綰事見十卷三年拜其子為郎中堅以王猛為使持節都督關東六州諸軍事車騎大將軍開府儀同三司冀州牧鎮鄴使疏吏翻騎奇寄翻進爵清河郡侯悉以慕容評第中之物賜之賜楊安爵博平縣侯以鄧羌為使章十二行本無使字乙十一行本同退齊校同持節征虜將軍安定太守賜爵真定郡侯郭慶為持節都督幽州諸軍事幽州刺史鎮薊薊音計賜爵襄城侯賜爵者賜之侯爵非有國有土也一曰先未列爵今始賜之堅以京兆韋鐘為魏郡太守彭豹為陽平太守燕都鄴以魏郡太守為京尹陽平輔郡也故堅皆以秦人守之皆因舊以授之盡易州縣牧守令長既駭觀聽且人情新舊不相安故皆因舊使與散騎侍郎京兆韋儒俱為繡衣使者循行關東州郡觀省風俗行下孟翻省悉景翻勸課農桑振恤窮困收葬死亡旌顯節行燕政有不便於民者皆變除之並用燕秦之人為繡衣使者用燕人者以其習關東風俗用秦人者使宣堅之德意也行下孟翻十二月秦王堅遷慕容暐及燕后王公百官並鮮卑四萬餘戶于長安為後鮮卑乘亂攻秦張本王猛表留梁琛為主簿領記室督晉制諸公府有主簿記室督各一人今猛以琛兼之猛與僚屬宴語及燕朝使者猛曰人心不同昔梁君至長安專美本朝樂君但言桓溫軍盛郝君微說國弊梁琛樂嵩郝晷也本朝國弊皆謂燕也朝直遙翻使疏吏翻今三子皆為國臣此國謂秦也猛曰郝君知幾為先幾居希翻誕曰然則明公賞丁公而誅季布也言取臣之道與漢高帝異秦王堅自鄴如枋頭宴父老改枋頭曰永昌復之終世復方目翻除賦役也復除賦役終秦王之世也甲寅至長安封慕容暐為新興侯以燕故臣慕容評為給事中皇甫真為奉車都尉李洪為駙馬都尉皆奉朝請三人者燕之三公也封衡為尚書郎慕容德為張掖太守為德兄子超留張掖而入姚氏張本悉羅騰為三署郎漢有五官署郎左署郎右署郎故曰三署郎舊制郎年五十以上屬五官其次分在左右署秦遂以三署郎為官稱衡裕之子也慕容皓之興也封裕以忠諫顯燕故太史黃泓歎曰燕必中興其在吳王乎恨吾老不及見耳慕容之初興黃泓歸之及俊之取中原黃泓贊其決泓知數者也天道在燕謂歲星在燕分也章十二行本不上有而秦滅之四字乙十一行本同退齊校同張校同云無注本亦脫及十五年秦必復為燕有慕容桓之子鳳年十一陰有復讎之志鮮卑丁零有氣幹者皆傾身與之交結為後慕容鳳與丁零起兵攻秦張本兒方以才望自顯勿效爾父不識天命鳳厲色曰先王欲建忠而不遂此乃人臣之節君侯之言豈獎勸將來之義乎翼改容謝之言於秦王堅曰慕容鳳慷慨有才器但狼子野心恐終不為人用耳左傳楚令尹子文曰狼子野心史言燕之臣子非久下人者秦兵長驅而東秦省雍州秦置雍州於安定今省雍州入司隸校尉秦兵長驅而東是歲仇池公楊世卒子纂立始與秦絶叔父武都太守統與之爭國起兵相攻為秦攻仇池張本王崇武標點容肇祖聶崇岐覆校
