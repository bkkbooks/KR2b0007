body:
  text: 資治通鑑卷第二百四十四端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀六十文宗元聖昭獻孝皇帝上之下太和三年太和三年己酉八二九太和三年春正月亓志紹與成德合兵掠貝州貝州在魏州北二百一十里太和三年義成行營兵三千人先屯齊州使之禹城之往也一作屯禹城漢祝阿縣地天寶元年改為禹城以縣西有禹息古城也屬齊州九域志在州西北一百三十里橫海節度使李祐討誅之太和三年李聽史唐合兵擊亓志紹破之志紹將其衆五千奔鎮州太和三年李載義奏攻滄州長蘆拔之滄州治青池縣九域志長蘆鎮屬清池太和三年甲辰昭義奏亓志紹餘衆萬五千人詣本道降置之洛章十二行本洛作洺乙十一行本同孔本同州太和三年二月橫海節度使李祐帥諸道行營兵擊李同捷破之帥讀曰率進攻德州九域志德州東北至滄州二百三十里太和三年武寧捉生兵馬使石雄勇敢愛士卒王智興殘虐軍中欲逐智興而立雄智興知之因雄立功奏請除刺史丙辰以雄為壁州刺史宋白曰壁州本漢宕渠縣地後魏大統中於今州理置諾水縣唐武德八年立壁州以縣西一里壁山為名京師西南一千八百二十二里太和三年史憲誠聞滄景將平而懼其子唐勸之入朝丙寅憲誠使唐奉表請入朝且請以所管聽命太和三年石雄既去武寧王智興悉殺軍中與雄善者百餘人夏四月戊午智興奏雄搖動軍情請誅之上知雄無罪免死長流白州為武宗復用石雄張本武德三年析合浦縣地置博白縣四年置南州六年改白州至京師六千七百一十五里州縣皆因博白江為名太和三年戊辰李載義奏攻滄州破其羅城羅城外城也城中將卒三千餘人奔鎮州李同捷與祐書請降降戶江翻祐並奏其書諫議大夫柏耆受詔宣慰行營好張大聲勢以威制諸將諸將已惡之矣好呼到翻惡烏露翻及李同捷請降於祐祐遣大將萬洪代守滄州耆疑同捷之詐自將數百騎馳入滄州以事誅洪取同捷及其家屬詣京師乙亥至將陵將陵漢安德縣地隋分安德於將陵故城置縣唐屬德州篡初患翻奪也乃斬同捷傳首滄景悉平五月庚寅加李載義同平章事考異曰實録作庚寅誤三年僅能下之上初元即討同捷至是三年取為己功諸將疾之爭上表論列辛卯貶耆為循州司戶循州古龍川地隋置循州考異曰實録四月李祐收德州同捷請降于祐祐疑其詐柏耆請以騎兵三百入滄州祐從之耆徑入滄收同捷與其家屬赴京師又詔曰假勢張皇乘險縱恣指揮彈壓奏報蔑聞亶入滄州專殺大將補署逆校潛送凶渠舊傳曰滄德平諸將害耆邀功爭上表論列上不獲已貶循州司戶新傳曰同捷請降祐使萬洪代守滄州同捷未出也耆以三百騎馳入滄以事誅洪與同捷朝京師既行諜言王庭湊欲以奇兵劫同捷耆遂斬其首以獻諸將疾其功比奏攢詆文宗不獲已貶耆循州司戶參軍蓋耆張皇邀功則有之然諸將疾之而論奏文宗不得已而貶黜亦其實也至於賜死則因馬國亮奏其受同捷奴婢綾絹故也太和三年壬寅攝魏博副使史唐奏改名孝章太和三年六月丙辰詔鎮州四面行營各歸本道休息但務保境勿相往來惟庭湊效順為達章表為于偽翻餘皆勿受太和三年辛酉以史憲誠為兼侍中河中節度使以李聽兼魏博節度使李聽本帥義成使兼魏博以史孝章為節度使澶時連翻太和三年初李祐聞柏耆殺萬洪大驚疾遂劇上曰祐若死是耆殺之也癸酉賜耆自盡太和三年河東節度使李程奏得王庭湊書請納景州考異曰按景州本隸橫海蓋因李同捷之亂庭湊據有之同捷既平庭湊懼而復進之也縊於賜翻又一計翻太和三年上遣中使賜史憲誠旌節癸酉至魏州時李聽自貝州還軍館陶遷延未進館陶在魏州北四十五里章十二行本行下有將士怒三字乙十一行本同張校同云無注本亦無治直之翻甲戌軍亂殺憲誠奉牙內都知兵馬使靈武何進滔知留後李聽進至魏州進滔拒之不得入秋七月進滔出兵擊李聽聽不為備大敗潰走考異曰新進滔傳曰進滔下令曰公等既迫我當聽吾令衆唯唯孰殺前使及監軍者疏出之凡斬九十餘人釋脅從者素服臨哭將吏皆入弔詔拜留後按進滔結王庭湊以拒李聽又襲擊聽大破之安能如是新傳蓋據柳公權德政碑云公謂將士曰既迫以為長當謹而聽承命都將總事者諭之曰害前使與監軍凶黨籍其姓名仍集之於庭無使漏網卒獲九十三人白黑既分善惡無誤會衆顯戮共棄咸悅公於是素服而哭將吏序弔此恐涉溢美之辭耳今從舊傳趣淺口九域志魏州館陶縣有淺口鎮趣七喻翻輜重兵械盡棄之重直用翻昭義兵救之聽僅而得免歸于滑臺李聽本鎮滑州河北久用兵饋運不給朝廷厭苦之八月壬子以進滔為魏博節度使復以相衛澶三州歸之太和三年滄州承喪亂之餘喪息浪翻骸骨蔽地城空野曠戶口存者什無三四癸丑以衛尉卿殷侑為齊德滄景節度使是年始以齊州隸橫海與士卒同甘苦招撫百姓勸之耕桑流散者稍稍復業先是本軍三萬人皆仰給度支先悉薦翻仰牛向翻侑至一年租稅自能贍其半二年請悉罷度支給賜三年之後戶口滋殖倉廩充盈史言方鎮得其人則可轉荒殘為富實太和三年王庭湊因鄰道微露請服之意壬申赦庭湊及將士復其官爵太和三年徵浙西觀察使李德裕為兵部侍郎裴度薦以為相會吏部侍郎李宗閔有宦官之助甲戌以宗閔同平章事太和三年上性儉素九月辛巳命中尉以下毋得衣紗縠綾羅衣於既翻聽朝之暇惟以書史自娛聲樂遊畋未嘗留意駙馬韋處仁嘗著夾羅巾處昌呂翻著陟略翻劉昫曰武德已來始有巾子文官名流上平頭小樣者則天時朝貴臣內賜高頭巾子呼為武家諸王樣中宗景龍四年三月因內宴賜宰臣以下內樣巾子開元已來文官士伍多以紫皂官絁為頭巾平頭巾子相倣為雅製玄宗開元十九年十月賜供奉及諸司長官羅頭巾及宮樣巾迄于今服之上謂曰朕慕卿門地清素故有選尚處仁尚穆宗女新豐公主聽其他貴戚為之卿不須爾太和三年壬辰以李德裕為義成節度使李宗閔惡其逼己惡烏露翻故出之太和三年冬十月丙辰以李聽為太子少師太和三年路隋言於上曰宰相任重不宜兼金穀瑣碎之務如楊國忠元載皇甫鎛皆姦臣所為不足法也上以為然於是裴度辭度支上許之太和三年十一月甲午上祀圜丘赦天下四方毋得獻奇巧之物其纖麗布帛皆禁之焚其機杼太和三年丙申西川節度使杜元穎奏南詔入寇元穎以舊相文雅自高杜元穎長慶初相穆宗專務蓄積減削士卒衣糧西南戍邊之卒衣食不足皆入蠻境鈔盜以自給鈔楚交翻蠻人反以衣食資之由是蜀中虛實動靜蠻皆知之南詔自嵯顛謀大舉入寇嵯顛弒君立君遂專南詔之政嵯才何翻元穎不之信嵯顛兵至邊城一無備禦蠻以蜀卒為鄉導鄉讀曰嚮襲陷巂戎二州甲辰元穎遣兵與戰於邛州南蜀兵大敗蠻遂陷邛州邛渠容翻太和三年武寧節度使王智興入朝太和三年詔發東川興元荊南兵以救西川十二月丁未朔又發鄂嶽襄鄧陳許等兵繼之太和三年以王智興為忠武節度使智興自徐徙陳太和三年己酉以東川節度使郭釗為西川節度使兼權東川節度事嵯顛自邛州引兵徑抵成都九域志自邛州東至成都二百六十里庚戌陷其外郭杜元穎帥衆保牙城以拒之帥讀曰率考異曰實録寇及子城元穎方覺知按實録十一月丙申元穎奏南詔入寇乙巳奏圍清溪關十二月丙辰奏官軍失利蠻陷邛州至此乃云寇及子城元穎方覺知似尤之太過今不取欲遁者數四壬子貶元穎為邵州刺史太和三年己未以右領軍大將軍董重質為神策諸道西川行營節度使又發太原鳳翔兵赴西川南詔寇東川入梓州西川章十二行本川作郭乙十一行本同知川字乃郭之誤退齋校云下川字宋作郭嚴西川改西郭東川節度治梓州釗兵寡弱不能戰釗上當更有郭字蜀本正如此嵯顛復書曰杜元穎侵擾我故興兵報之耳與釗修好而退好呼到翻蠻留成都西郭十日其始慰撫蜀人市肆安堵將行乃大掠子女百工數萬人及珍貨而去蜀人恐懼往往赴江流尸塞江而下塞悉則翻嵯顛自為軍殿殿丁練翻及大度水嵯顛謂蜀人曰此南吾境也聽汝哭別鄉國衆皆慟哭赴水死者以千計自是南詔工巧埒於蜀中埒龍輒翻等也嵯顛遣使上表稱蠻比修職貢比毗至翻豈敢犯邊正以杜元穎不恤軍士怨苦元穎競為鄉導祈我此行以誅虐帥帥所類翻誅之不遂無以慰蜀士之心願陛下誅之丁卯再貶元穎循州司馬詔董重質及諸道兵皆引還郭釗至成都與南詔立約不相侵擾詔遣中使以國信賜嵯顛四年四年春正月辛巳武昌節度使牛僧孺入朝四年戊子立子永為魯王四年李宗閔引薦牛僧孺辛卯以僧孺為兵部尚書同平章事於是二人相與排擯李德裕之黨排擠也擯斥也四年南詔之寇成都也詔山南西道發兵救之事見上年山南西道節度治興元府未至蠻退而還還從宣翻又如字興元兵有常額詔新募兵悉罷之二月乙卯絳悉召新軍諭以詔旨而遣之仍賜以廩麥皆怏怏而退怏於兩翻往辭監軍監軍楊叔元素惡絳不奉己以賜物薄激之衆怒大譟掠庫兵趨使牙惡烏露翻趣七喻翻節度使所居為使宅治事之所為使牙使疏吏翻絳方與僚佐宴不為備走登北城或勸縋而出縋馳偽翻絳曰吾為元帥豈可逃去麾推官趙存約令去存約曰存約受明公知何可苟免牙將王景延與賊力戰死絳存約及觀察判官薛齊皆為亂兵所害賊遂屠絳家考異曰新傳曰楊叔元素疾絳遣人迎説軍士曰將收募直而還為民士皆怒乃譟而入劫庫兵絳方宴不設備遂握節登陴或言縋城可以免絳不從遂遇害實録絳召諸卒以詔旨諭而遣之發廩麥以賞衆皆怏怏而退出壘門衆有請辭監軍者而監軍楊叔元貪財怙寵素怨絳之不奉己與絳為隙久矣至是因以賞薄激之散卒遂作亂今從之戊午叔元奏絳收新軍募直以致亂庚申以尚書右丞溫造為山南西道節度使是時三省官上疏共論李絳之冤諫議大夫孔敏行具呈叔元激怒亂兵上始悟四年三月乙亥朔以刑部尚書柳公綽為河東節度使先是回鶻入貢及互市先悉薦翻所過恐其為變常嚴兵迎送防衛之公綽至鎮回鶻遣梅録李暢以馬萬匹互市公綽但遣牙將單騎迎勞於境勞力到翻至則大闢牙門受其禮謁暢感泣戒其下在路不敢馳獵無所侵擾陘北沙陀素驍勇沙陀保神武川在陘嶺之北陘音刑公綽奏以其酋長朱邪執宜為陰山都督代北行營招撫使使居雲朔塞下捍禦北邊執宜與諸酋長入謁公綽與之宴執宜神彩嚴整進退有禮公綽謂僚佐曰執宜外嚴而內寬言徐而理當酋慈由翻長知兩翻邪讀曰耶當耶浪翻福祿人也執宜母妻入見公綽使夫人與之飲酒饋遺之見賢遍翻遺唯季翻執宜感恩為之盡力為于偽翻塞下舊有廢府十一舊書作廢柵當從之蓋考之唐志雲朔塞下無十一府也使其部落三千人分守之自是雜虜不敢犯塞雜虜謂退渾回鶻韃靼奚室韋之屬四年溫造行至褒城褒城漢褒中縣唐屬興元府九域志褒城在府西北四十五里造密與之謀誅亂者以其兵八百人為牙隊五百人為前軍入府分守諸門己卯造視事饗將士於牙門造曰吾欲問新軍去留之意宜悉使來前既勞問勞力到翻命坐行酒志忠密以牙兵圍之既合唱殺圍既合唱聲曰殺衆應聲而進殺之楊叔元起擁造靴求生造命囚之其手殺絳者斬之百段餘皆斬首投尸漢水以百首祭李絳三十首祭死事者具事以聞己丑流楊叔元於康州康州漢端溪縣地武德四年置南康州貞觀十二年去南字至京師五千七百五十里四年癸卯加淮南節度使段文昌同平章事為荊南節度使四年奚寇幽州夏四月丁未盧龍節度使李載義擊破之辛酉擒其王茹羯以獻羯居列翻四年裴度以高年多疾懇辭機政六月丁未以度為司徒平章軍國重事平章軍國重事者平章大事不復煩以細務與同平章事之官不同考異曰寶曆二年度入相時猶守司空自後未嘗遷官至此實録直言司徒裴度按制辭云遷秩上公式是殊寵又云宜其首贊機衡弘敷教典蓋此時方遷司徒實録先云司徒裴度誤也三五日一入中書疾損猶言疾減也上患宦者強盛憲宗敬宗弒逆之黨猶有在左右者中尉王守澄尤專橫橫戶孟翻招權納賄上不能制嘗密與翰林學士宋申錫言之申錫請漸除其逼欲以漸去其威權逼上者逼音逼可倚以事擢為尚書右丞七月癸未以申錫同平章事疑則勿任任則勿疑文宗為負宋申錫矣為申錫貶逐張本四年初裴度征淮西謂元和討吳元濟時也由是漸獲進用至是怨度薦李德裕因其謝病九月壬午以度兼侍中充山南東道節度使四年西川節度使郭釗以疾求代冬十月戊申以義成節度使李德裕為西川節度使蜀自南詔入寇一方殘弊郭釗多病未暇完補德裕至鎮作籌邊樓圖蜀地形南入南詔西達吐蕃日召老於軍旅習邊事者雖走卒蠻夷無所間蜀自清溪關則南入南詔踰西山則西達吐蕃間古莧翻廣狹遠近易以豉翻未踰月皆若身嘗涉歷上命德裕修塞清溪關以斷南詔入寇之路塞悉則翻下同斷音短或無土則以石壘之德裕上言通蠻細路至多不可塞惟重兵鎮守可保無虞但黎雅以來得萬人成都得二萬人精加訓練則蠻不敢動矣邊兵又不宜多須力可臨制崔旰之殺郭英乂見二百二十四卷代宗永泰元年見二百二十九卷德宗建中四年時北兵皆歸本道惟河中陳許三千人在成都有詔來年三月亦歸蜀人忷懼忷許拱翻德裕奏乞鄭滑五百人陳許千人以鎮蜀且言蜀兵脆弱新為蠻寇所困皆破膽不堪征戍戰勝之威士氣百倍敗兵之卒沒世不復正謂此也脆此芮翻則與杜元穎時無異蜀不可保恐議者云蜀經蠻寇以來已自增兵嚮者蠻寇已逼元穎始募市人為兵得三千餘人徒有其數實不可用郭釗募北兵僅得百餘人臣復召募得二百餘人復扶又翻此外皆元穎舊兵也恐議者又聞一夫當關之説一夫當關萬夫莫前前人所以言蜀之險也臣訪之蜀中老將清溪之旁大路有三自餘小徑無數皆東蠻臨時為之開通勿鄧豐琶兩林皆東蠻也為于偽翻則是欺罔朝廷要須大度水北更築一城迤邐接黎州九域志黎州南至大度河一百里宋白曰黎州古沉黎地迤以爾翻邐力紙翻況聞南詔以所掠蜀人二千及金帛賂遺吐蕃遺唯季翻若使二虜知蜀虛實連兵入寇誠可深憂其朝臣建言者蓋由禍不在身望人責一狀留入堂案堂謂政事堂案文案也不可令臣獨當國憲憲法也敗補邁翻德裕乃練士卒葺堡鄣積糧儲以備邊蜀人粗安四年是歲勃海宣王仁秀卒子新德早死孫彞震立改元咸和五年五年春正月丁巳賜滄齊德節度名義昌軍張孝忠以程日華為滄州刺史朱滔之亂滄定隔絶日華以滄州自通於朝廷貞元三年以日華為橫海軍節度領滄景二州元和十三年王承宗獻德棣二州而橫海軍領滄景德棣四州長慶元年省景州明年復領景州太和元年增領齊州明年以棣州隸淄青平盧節度又明年罷橫海節度更置齊德節度尋平李同捷得滄州更號滄齊德節度是年賜號義昌軍五年庚申盧龍監軍奏李載義與敕使宴於毬場後院副兵馬使楊志誠與其徒呼噪作亂載義與子正元奔易州志誠又殺莫州刺史張慶初宋白曰幽州南至莫州二百八十里牛僧孺曰范陽自安史以來非國所有劉總暫獻其地事見二百四十一卷穆宗長慶元年今日志誠得之猶前日載義得之也敬宗寶曆二年李載義得范陽事見上卷使捍北狄不必計其逆順上從之載義自易州赴京師上以載義有平滄景之功平滄景見上三年二月壬辰以載義為太保同平章事如故以楊志誠為盧龍留後臣光曰昔者聖人順天理察人情知齊民之莫能相治也治直之翻下同故置師長以正之知㣥臣之莫能相使也故建諸侯以制之知列國之莫能相服也故立天子以統之自師長而上至天子則所謂師長者近民之官也長知丈翻能褒善而黜惡抑強而扶弱撫服而懲違禁暴而誅亂然後發號施令而四海之內莫不率從也率循也從順也一曰相率而從上之令也勉勉我王綱紀四方詩大雅棫朴之辭屏必郢翻有功於國無罪而志誠逐之此天子所宜治也若一無所問因以其土田爵位授之則是將帥之廢置殺生皆出於士卒之手天子雖在上何為哉國家之有方鎮豈專利其財賦而已乎如僧孺之言姑息偷安之術耳豈宰相佐天子御天下之道哉五年新羅王彥升卒子景徽立五年上與宋申錫謀誅宦官申錫引吏部侍郎王璠為京兆尹以密旨諭之璠泄其謀璠孚袁翻考異曰按舊璠傳去年七月為京兆尹十二月遷左丞故申錫得罪時京兆尹乃崔琯也鄭注王守澄知之陰為之備上弟漳王湊賢有人望注令神策都虞候豆盧著誣告申錫謀立漳王戊戌守澄奏之上以為信然甚怒漳王固上之所忌因其所忌而讒間之此宋申錫之所以不免於罪也飛龍使馬存亮固爭曰如此則京城自亂矣宜召他相與議其事以馬存亮定張韶之難及爭宋申錫之事觀之則溫公之取存亮固不特一事也飛龍使掌飛龍廣既是日旬休一月三旬遇旬則下直而休沐謂之旬休今謂之旬假是也中使曰所召無宋公名申錫知獲罪望延英以笏扣頭而退按閣本大明宮圖中書省與延英殿其間僅隔殿中外院殿中內院耳上示以守澄所奏相顧愕眙眙丑吏翻上命守澄捕豆盧著所告十六宅宮市品官晏敬則及申錫親事王師文等於禁中鞫之親事常在左右者今宰執侍從猶有親事官三月庚子申錫罷為右庶子自宰相大臣無敢顯言其冤者獨京兆尹崔琯大理卿王正雅連上疏請出內獄付外廷核實鞫於禁中故曰內獄正雅翃之子也王翃見德宗紀稱申錫遣王師文達意於王結異日之知獄成壬寅上悉召師保以下及臺省府寺大臣面詢之午際午際方交午漏初刻非正午時也復扶又翻下同乞以獄事付外覆按上曰吾已與大臣議之矣屢遣之出不退玄亮叩頭流涕曰殺一匹夫猶不可不重慎況宰相乎上意稍解曰當更與宰相議之乃復召宰相入牛僧孺曰人臣不過宰相今申錫已為宰相假使如所謀復與章十二行本與作欲乙十一行本同張校同云無注本作欲何求申錫殆不至此鄭注恐覆按詐覺乃勸守澄請止行貶黜癸卯貶漳王湊為巢縣公宋申錫為開州司馬存亮即日請致仕存亮之上更有一馬字姓名較明白按馬存亮自以知宋申錫之冤而不能救惡王守澄之橫而不能退即日乞身致事雖宦者而有古人之風磁州人質通五世孫王通見一百七十九卷隋文帝仁壽三年號文中子乂之子蔣乂見二百三十五卷德宗貞元十三年江州人也晏敬則等坐死及流竄者數十百人申錫竟卒於貶所五年夏四月己丑以李載義為山南西道節度使楊志誠為幽州節度使五年五月辛丑上以太廟兩室破漏踰年不葺罰將作監度支判官宗正卿俸將作監掌土木工匠度支掌支調宗正卿掌太廟齋郎宗廟不修故皆罰俸俸扶用翻輟禁中營繕之材以葺之帥讀曰率左補闕韋溫諫以為國家置百官各有所司苟為墮曠墮讀曰隳宜黜其人更擇能者代之更工衡翻今曠官者止於罰俸而憂軫所切即委內臣是以宗廟為陛下所私而百官皆為虛設也上善其言即追止中使命有司葺之五年丙辰西川節度使李德裕奏遣使詣南詔索所掠百姓索山客翻前年寇蜀所掠者也得四千人而還考異曰德裕西南備邊録曰南詔以所虜男女五千三百六十四人歸于我舊傳曰又遣人入南詔求其所俘工匠得僧道工巧四千餘人復歸成都按實録云約四千人今從之五年秋八月戊寅以陝虢觀察使崔郾為鄂嶽觀察使陝式冉翻郾於幰翻鄂嶽地囊山帶江處百越巴蜀荊漢之會處昌呂翻土多㣥盜剽行舟剽匹妙翻無老幼必盡殺乃已郾至訓卒治兵作蒙衝追討蒙衝戰船也治直之翻悉誅之郾在陝以寬仁為治治直吏翻下同或經月不笞一人及至鄂嚴峻刑罰或問其故郾曰陝土瘠民貧吾撫之不暇尚恐其驚鄂地險民雜夷俗慓狡為姦慓匹妙翻非用威刑不能致治治直吏翻政貴知變蓋謂此也五年西川節度使李德裕奏蜀兵羸疾老弱者從來終身不簡臣命立五尺五寸之度簡去四千四百餘人簡選也去羌呂翻復扶又翻少詩照翻所募北兵已得千五百人與土兵參居參倉含翻間廁也轉相訓習日益精練又蜀工所作兵器徒務華飾不堪用臣今取工於別道以治之無不堅利治直之翻九月吐蕃維州副使悉怛謀請降怛當割翻盡帥其衆奔成都德裕遣行維州刺史虞藏儉將兵入據其城庚申具奏其狀且言欲遣生羌三千燒十三橋搗西戎腹心可洗久恥是韋皋沒身恨不能致者也德宗之時韋皋屢出兵攻維州不能取集百官議下戶嫁翻皆請如德裕策牛僧孺曰吐蕃之境四面各萬里失一維州未能損其勢比來修好約罷戍兵比毗至翻好呼到翻考異曰舊僧孺傳載僧孺語曰今論董勃才還劉元鼎未至按穆宗實録長慶二年八月大理卿劉元鼎使吐蕃回文宗實録太和六年三月吐蕃遣論董勃藏入見不言元鼎再奉使杜牧僧孺墓志亦無董勃等名蓋舊傳誤也中國禦戎守信為上彼若來責曰何事失信養馬蔚茹川原州蕭關縣有蔚茹水水西即白草軍蔚紆勿翻上時掌翻阪音反萬騎綴回中怒氣直辭不三日至咸陽橋此時西南數千里外得百維州何所用之徒棄誠信有害無利此匹夫所不為況天子乎上以為然詔德裕以其城歸吐蕃執悉怛謀及所與偕來者悉歸之吐蕃盡誅之於境上極其慘酷德裕由是怨僧孺益深為武宗朝李德裕追論維州事張本五年冬十月戊寅李德裕奏南詔寇巂州陷三縣巂音髓六年六年春正月壬子詔以水旱降繫囚㣥臣上尊號曰太和文武至德皇帝右補闕韋溫上疏以為今水旱為災恐非崇飾徽稱之時稱尺證翻上善之辭不受六年三月辛丑以武寧節度使王智興兼侍中充忠武節度使以邠寧節度使李聽為武寧節度使六年回鶻昭禮可汗為其下所殺從子胡特勒立從才用翻考異曰舊傳云七年三月回鶻李義節等將駝馬到且報可汗二月二十七日薨已册親弟薩特勒廢朝三日今從新傳六年李聽之前鎮武寧也有蒼頭為牙將考新舊書李聽前此未嘗鎮武寧竊意此蒼頭蓋從聽兄願素鎮武寧遂得為牙將也聽先遣親吏至徐州慰勞將士勞力到翻蒼頭不欲聽復來説軍士復扶又翻説式芮翻殺其親吏臠食之聽懼以疾固辭辛酉以前忠武節度使高瑀為武寧節度使六年夏五月甲辰李德裕奏修邛崍關及移巂州理臺登城邛崍關或作邛峽關誤也邛崍關在雅州榮經縣所謂邛崍九折坂王尊叱馭處也祝穆曰邛崍關在巂州北九十里巂州先治越巂縣宋白曰越巂漢邛都地臺登漢旄牛地李心傳曰邛崍關近榮經去黎州六十里六年秋七月原王逵薨逵代宗子六年冬十月甲子立魯王永為太子初上以晉王普敬宗長子性謹願欲以為嗣會薨晉王普太和二年薨見上卷故久不議建儲至是始行之六年十一月乙卯以荊南節度使段文昌為西川節度使西川監軍王踐言入知樞密數為上言數所角翻為于偽翻縛送悉怛謀以快虜心絶後來降者非計也上亦悔之尤中書侍郎同平章事牛僧孺失策附李德裕者因言僧孺與德裕有隙害其功上益疏之尤者以為愆過也疏者情不相親也會上御延英謂宰相曰天下何時當太平卿等亦有意於此乎責其尸位素餐無佐理興化之心太平無象今四夷不至交侵百姓不至流散雖非至理至理猶言至治也康安也非臣等所及退謂同列曰主上責望如此吾曹豈得久居此地乎因纍表請罷十二月乙丑以僧孺同平章事充淮南節度使臣光曰君明臣忠上令下從俊良在位佞邪黜遠禮修樂舉刑清政平姦宄消伏宄音軌兵革偃戢諸侯順附四夷懷服章十二行本服下有時和年豐四字乙十一行本同張校同云無注本亦無家給人足此太平之象也于斯之時閽寺專權脅君於內弗能遠也遠于願翻藩鎮阻兵陵慢于外弗能制也士卒殺逐主帥拒命自立弗能詰也詰起吉翻軍旅歲興賦斂日急斂力贍翻骨血縱橫於原野縱子容翻杼軸空竭於里閭而僧孺謂之太平不亦誣乎當文宗求治之時僧孺任居承弼進則偷安取容以竊位退則欺君誣世以盜名罪孰大焉按書冏命旦夕承弼厥辟本不專指宰相溫公取翊輔之義遂以為宰相之任又公以進退之道責牛僧孺亦有見於後之竊位盜名如僧孺者治直吏翻六年珍王誠薨新書誠作諴諴德宗子也六年乙亥昭義節度使劉從諫入朝六年丁未以前西川節度使李德裕為兵部尚書初李宗閔與德裕有隙事見二百四十一卷穆宗長慶元年上注意甚厚朝夕且為相宗閔百方沮之不能京兆尹杜悰沮在呂翻悰徂宗翻宗閔黨也嘗詣宗閔見其有憂色曰得非以大戎乎兵部掌戎政尚書其長也故悰隱語謂之大戎然何以相救悰曰悰有一策可平宿憾恐公不能用宗閔曰何如悰曰德裕有文學而不由科第常用此為慊慊慊苦簟翻慊慊不快之意若使之知舉必喜矣知舉知貢舉也曰間如字更思其次悰曰不則用為御史大夫不讀曰否宗閔曰此則可矣悰再三與約乃詣德裕德裕迎揖曰公何為訪此寂寥悰曰靖安相公令悰達意李宗閔蓋居靖安坊因以稱之如後劉崇望居光德坊呼為光德劉公之類德裕驚喜泣下曰此大門官唐制大朝會御史大夫帥其屬正百官之班序遲明列於兩觀故以為大門官寄謝重沓重直龍翻宗閔復與給事中楊虞卿謀之復扶又翻事遂中止牛僧孺患失之心重李德裕進取之心鋭所謂楚則失矣齊亦未為得也汝士之從弟也楊汝士見二百四十一卷穆宗長慶元年七年七年春正月甲午加昭義節度使劉從諫同平章事遣歸鎮初從諫以忠義自任入朝欲請他鎮既至見朝廷事柄不一又士大夫多請託心輕朝廷考異曰補國史曰文宗朝劉從諫朝覲渥澤甚厚自謂河朔近無比倫頗矜臣節文武百辟盡湊其門從諫廣行金帛賂諸權要求登台席人情多可相國李公固言獨無一言從諫欲市其歡玉不可染欲諛其意水不可穿門館不敢導其誠懇遇休假謁於私第投誠瀝懇至於再三相公正色謂曰僕射先君以東平之功鎮潞二十餘年及即世之後僕射亶領戎務坐邀朝命朝廷以先君勳績不絶賞延任居蕃閫位劇南宮豈是恩澤降於等倫欲以何事效忠報國僕射若請邊陲一鎮大展籌謀拓境復疆乃為勳業朝廷豈不以袞職之重命賞封功區區躁求一何容易某比謂僕射英雄忠義首冠蕃臣今求佩相印擁節旄榮歸舊藩亦河朔尋常倔強之臣所措履也忠節安在深為解體從諫矍然禁口無辭再拜趨出然從諫厚賂幸臣旬日間果以本官加平章事遽辭歸鎮宰相餞於郵亭李相公謂曰相公少年昌盛勉報國恩幸望保家勿殃後嗣從諫以笏扣頭灑淚而辭及至本鎮謂從事將校曰昨者入覲闕庭遍觀朝德唯李公峻直貞明凜然可懼真社稷之重臣也按固言此年未為相其説妄也今從實録為劉從諫倔強張本七年徐州承王智興之後士卒驕悖節度使高瑀不能制悖蒲妹翻又蒲沒翻考異曰杜牧上崔相公書曰高僕射寬厚聞名不能治軍事舉動汗流拜于堂下此蓋文士筆快耳未必然也上以為憂甲寅以嶺南節度使崔珙為武寧節度使珙至鎮寬猛適宜徐人安之珙琯之弟也崔琯見上五年珙居竦翻七年二月癸亥加盧龍節度使檢校工部尚書楊志誠檢校吏部尚書進奏官徐迪徐迪盧龍進奏官也宋白曰大曆十二年正月敕諸道先置上都留後便宜並改充諸道都知進奏官軍中不識朝廷之制唯知尚書改僕射為遷不知工部改吏部為美敕使往恐不得出晉宋以來以吏部尚書為大尚書諸部尚書莫敢比焉唐諸藩進奏官豈不知之徐迪敢詣宰相出是言者直以下陵上替無所忌憚耳敕使不得出言必將拘留之也宰相不以為意七年丙戌以兵部尚書李德裕同平章事德裕入謝上與之論朋黨事對曰方今朝士三分之一為朋黨時給事中楊虞卿與從兄中書舍人汝士弟戶部郎中漢公中書舍人張元夫給事中蕭浣等善交結依附權要上干執政下撓有司為士人求官及科第無不如志上聞而惡之撓奴高翻又奴巧翻為于偽翻惡烏露翻故與德裕言首及之德裕因得以排其所不悅者昔人有評牛李事者謂德裕以燕伐燕有味乎其言也左散騎常侍張仲方嘗駁李吉甫諡李吉甫薨有司諡曰敬憲度支郎中張仲方駁其太優憲宗以是貶仲方賜諡曰忠懿宋白曰唐制諸職事官三品已上散官二品已上身亡者佐吏録行狀申考功責歷任勘校下太常寺擬諡訖復申考功都堂集省官議定然後奏聞若蘊德丘園聲實明著雖無官爵亦奏賜諡先生諡神至翻仲方稱疾不出三月壬辰以仲方為賓客分司七年楊志誠怒不得僕射留官告使魏寶義並春衣使焦奉鸞送奚契丹使尹士恭唐中世已後凡藩鎮加官率遣中使奉命謂之官告使焦奉鸞以賜春衣尹士恭以送兩蕃使者同時至幽州故皆為所留甲午遣牙將王文穎來謝恩並讓官丙申復以告身並批答賜之自唐以來凡讓官者皆有批答不允復扶又翻下同七年和王綺薨綺順宗子七年庚戌以楊虞卿為常州刺史張元夫為汝州刺史唐以隋毗陵郡置常州京師東南二千八百四十三里隋置伊州於襄城郡後改汝州京師東九百八十二里上復言及朋黨李宗閔曰臣素知之故虞卿輩臣皆不與美官李德裕曰給舍非美官而何給舍謂給事中中書舍人丁巳以蕭浣為鄭州刺史鄭州至京師千一百五里七年夏四月丙戌册回鶻新可汗為愛登里囉汩沒密施合句祿毗伽彰信可汗七年六月乙巳以山南西道節度使李載義為河東節度使先是回鶻每入貢所過暴掠先悉薦翻州縣不敢詰但嚴兵防衛而已載義至鎮回鶻使者李暢入貢載義謂之曰可汗遣將軍入貢以固舅甥之好唐公主出嫁回鶻與為舅甥之國好呼到翻將軍不戢部曲使為侵盜踐慈演翻戢疾立翻載義亦得殺之勿謂中國之法可忽也於是悉罷防衛兵但使二卒守其門暢畏服不敢犯令七年壬申以工部尚書鄭覃為御史大夫初李宗閔惡覃在禁中數言事惡烏露翻數所角翻奏罷其侍講覃自工部侍郎進尚書皆兼翰林侍講學士從千容翻殷侑經術頗似鄭覃宗閔對曰覃侑經術誠可尚然論議不足聽李德裕曰覃侑議論他人不欲聞惟陛下欲聞之後旬日宣出除覃御史大夫不由宰相進擬出宣命而除之事一切宣出安用中書潭峻曰八年天子上即位至是八年矣宗閔愀然而止愀七小翻七年乙亥以中書侍郎同平章事李宗閔同平章事充山南西道節度使七年秋七月壬寅以右僕射王涯同平章事兼度支鹽鐵轉運使七年宣武節度使楊元卿有疾朝廷議除代李德裕請徙劉從諫於宣武因拔出上黨不使與山東連結上以為未可癸丑以左僕射李程為宣武節度使七年上患近世文士不通經術李德裕請依楊綰議進士試論議不試詩賦楊綰議見二百二十二卷代宗廣德元年昔玄宗以臨淄王定內難事見二百九卷睿宗景雲元年難乃旦翻不令出閣天下議皆以為幽閉骨肉虧傷人倫嚮使天寶之末建中之初宗室散處方州處昌呂翻雖未能安定王室尚可各全其生所以悉為安祿山朱泚所魚肉者由聚於一宮故也事並見前紀制書聽宗室年高屬疏者出閣且除諸州上佐使攜其男女出外婚嫁此則百年弊法一旦因陛下去之去羌呂翻海內孰不欣悅上曰茲事朕久知其不可方今諸王豈無賢才無所施耳八月庚寅册命太子因下制諸王自今以次出閣授緊望州刺史上佐開元中定天下州府自京都及諸都督護府外以近畿同華岐蒲為四輔鄭陝汴懷衛絳為六雄宋亳滑許汝晉洺虢魏相為十望又有十緊其後入緊望者浸多凡商寧青汾貝趙襄常宣皆望州也蔡徐鄆楚鄂彭蜀為緊州不及十數又以汝虢鄭汴魏洋蘇為雄蓋升雄望者既多所以緊不及十以時出適出閣而適人使有配偶諸王出閣竟以議所除官不決而罷七年壬寅加幽州節度使楊志誠檢校右僕射考異曰舊傳曰朝廷納裴度言務以含垢下詔諭之因再遣使加尚書右僕射按此時度為襄陽節度使舊傳恐誤今從實録七年杜牧憤河朔三鎮之桀驁驁五到翻而朝廷議者專事姑息乃作書名曰罪言大略以為國家自天寶盜起河北百餘城不得尺寸人望之若回鶻吐蕃無敢窺者齊梁蔡被其風流因亦為寇齊李正己梁李靈曜蔡李希烈吳氏被皮義翻焦焦然七十餘年矣今上策莫如先自治中策莫如取魏最下策為浪戰不計地勢不審攻守是也又傷府兵廢壞作原十六衛以為國家始踵隋制開十六衛自今觀之設官言無謂者其十六衛乎本原事迹其實天下之大命也唐承隋制開十六衛改左右翊衛曰左右衛府左右驍騎衛曰左右驍衛府左右屯衛曰左右威衛府左右禦衛曰左右領軍衛府左右備身曰領左右府唯左右武衛府左右監門府左右候衛府仍隋不改顯慶五年改左右府曰左右千牛府龍朔二年左右衛府驍衛府武衛府皆省府字左右威衛曰左右武威左右領軍衛曰左右戎衛左右候衛曰左右金吾衛左右監門府曰左右監門衛左右千牛府曰左右奉宸衛後復曰左右千牛衛咸亨元年復改左右戎衛曰領軍衛武后光宅元年改左右驍衛曰左右武威衛左右武衛曰左右鷹揚衛左右威衛曰左右豹韜衛左右領軍衛曰左右玉鈐衛唐初十六衛置大將軍各一人正三品將軍各二人從三品貞元二年十六衛各置上將軍一人從二品雖設官而無兵可掌故當時以為無謂內以十六衛蓄養武臣外開折衝果毅府五百七十四諸府每府折衝都尉一人上府正四品上中府從四品下下府正五品下左右果毅都尉各一人上府從五品下中府正六品上下府正六品下有事則戎臣提兵居外無事則放兵居內其居內也富貴恩澤以奉其身所部之兵散舍諸府散者分散之散舍者居舍之舍三時耕稼一時治武籍藏將府治直之翻將即亮翻伍散田畝力解勢破人人自愛雖有蚩尤為帥亦不可使為亂耳帥所類翻下同及其居外也緣部之兵被檄乃來被皮義翻斧鉞在前爵賞在後飄暴交捽豈暇異略飄即飄字捽昨沒翻亦無能為叛也此所謂實天下之大命也戎臣兵伍未始逆篡此大聖人所以能柄統輕重制鄣表裏聖算神術張術作謨也至于開元末愚儒奏章曰天下文勝矣請罷府兵武夫奏章曰天下力強矣請搏四夷於是府兵內剷字書無剷字今以類求之音楚限翻邊兵外作戎臣兵伍湍奔矢往內無一人矣尾大中乾乾音干成燕偏重謂成安祿山偏重之勢也燕於賢翻根萌燼然七聖旰食七聖謂肅代德順憲穆敬由此觀之戎臣兵伍豈可一日使出落鈴章十二行本鈴作鈐乙十一行本同鍵哉然為國者不能無兵居外則叛居內則篡使外不叛內不篡古今以還法術最長其置府立衛乎近代以來於其將也弊復為甚將即亮翻復扶又翻下同率皆市兒輩多齎金玉負倚幽陰謂負倚宦官行貨賂以進取也絶不識父兄禮義之教復無慷慨感概之氣百城千里一朝得之其強傑愎勃者則撓削法制愎弼力翻撓奴教翻不使縛己斬族忠良不使違己力一勢便罔不為寇其陰泥巧狡者泥恐當作昵委於邪幸由卿市公去郡得都郡謂列郡都謂五都指為別館左傳管仲曰賜我先君履東至於海西至于河南至于穆陵北至于無棣杜預注云履所踐履之界後人言賜履者本此此四履謂四境所至則戛割生人略匝天下匝作答翻周也是以天下兵亂不息齊人乾耗乾音干靡不由是矣嗚呼文皇帝十六衛之旨其誰原而復之乎太宗文皇帝又作戰論以為河北視天下猶珠璣也言河北不資天下所産以為富猶四支也河北氣俗渾厚果於戰耕加以土息健馬息生也是以出則勝處則饒處昌呂翻不窺天下之産自可封殖亦猶大農之家不待珠璣然後以為富也國家無河北則精甲鋭卒利刀良弓健馬無有也是一支兵去矣河東盟津滑臺大梁彭城東平盡宿厚兵以塞虜衝不可他使是二支兵去矣河東太原之全軍盟津河陽軍滑臺義成軍大梁宣武軍彭城武寧軍東平天平軍盟讀曰孟塞音悉則翻厥數三億低首仰給仰牛向翻橫拱不為橫拱者言橫其兩肱拱立而事其帥他無所為也循河之南東盡海西叩洛赤地盡取才能應費是三支財去矣才能之子即才字漢書作財後人從省便又去貝作才戎夷大屯謂自咸陽西北列大屯以防戎夷也啖徒濫翻是四支財去矣天下四支盡解頭腹兀然其能以是久為安乎今者誠能治其五敗則一戰可定四支可生夫天下無事之時殿寄大臣偷安奉私殿寄大臣謂受殿邦之寄者牧蓋謂當時節度使也詩采菽殿天子之邦毛氏注云殿鎮也音丁練翻兵甲鈍弊是不搜練之過其敗一也百人荷戈荷下可翻仰食縣官則挾千夫之名大將小裨操其餘贏小裨謂裨將操七刀翻以師老為娛是執兵者常少糜食常多此不責實料食之過其敗二也戰小勝則張皇其功奔走獻狀以邀上賞或一日再賜或一月纍封凱還未歌書品已崇戰勝則奏凱歌而還書品謂書其官品也還音旋田宮廣矣田宮猶言田宅也繒慈陵翻子孫官矣焉肯搜奇出死勤於我矣此厚賞之過其敗三也焉於虔翻多喪兵士顛翻大都則跳身而來刺邦而去跳身而來謂逃至京師也刺邦而去謂貶為刺史也喪息浪翻氣色甚安一歲未更更工衡翻旋已立於壇墀之上矣立壇墀之上謂復登大將之壇也其敗四也大將兵柄不得專恩臣敕使迭來揮之恩臣亦指宦官之怙恩者殷然將鼓一則曰必為偃月一則曰必為魚麗陳讀曰陳麗力知翻偃月魚麗皆陳名偃月陳中軍偃居其中張兩角向前左傳為魚麗之陳先偏後伍伍承彌縫三軍萬夫環旋翔羊愰駭之間翔羊猶云徜徉徘徊也愰呼廣翻遂取吾之鼓旗此不專任責成之過其敗五也今者誠欲調持干戈灑掃垢汙章十二行本汙下有以為萬世安五字乙十一行本同退齋校同張校同云無注本亦無而乃踵前非是不可為也又作守論以為今之議者皆曰夫倔強之徒吾以良將徑兵為銜策倔渠勿翻強其兩翻銜策所以馭馬高位美爵充飽其腸安而不撓外而不拘撓奴巧翻又火高翻亦猶豢擾虎狼而不拂其心豢養也擾馴也順也拂讀曰咈此大曆貞元所以守邦也亦何必疾戰焚煎吾民然後以為快也愚曰大曆貞元之間適以此為禍也當是之時有城數十千百卒夫則朝廷別待之貸以法度於是闊視大言自樹一家破制削法角為尊奢天子養威而不問有司守恬而不呵王侯通爵越録受之凡賞功者録其功而加之封爵無功而超越授之以爵是謂越録受讀曰授几杖扶之言不朝者賜之几杖以安其心皇子嬪之息子也胤繼嗣也河北蕃將之子率多尚主無不備之緣以絹翻是以地益廣兵益強僭擬益甚侈心益昌於是土田名器分劃殆盡劃呼麥翻又音畫而賊夫貪心未及畔岸遂有淫名越號或帝或王盟詛自立詛莊助翻恬淡不畏走兵四略以飽其志者也是以趙魏燕齊卓起大唱梁蔡吳蜀躡而和之謂朱滔王武俊田悅李納相立為王李希烈李錡劉闢繼亂也和戶臥翻澒戶孔翻欲相效者往往而是運遭孝武謂憲宗宵宵衣也謂未明求衣也旰旰食也謂日旰而食也夕思朝議故能大者誅鋤小者惠來不然周秦之郊幾為犯獵哉周秦之郊謂河南關內也欲而不得則怒怒則爭亂隨之是以教笞於家刑罰於國征伐於天下此所以裁其欲而塞其爭也大曆貞元之間盡反此道提區區之有而塞無涯之爭區區之有謂朝廷爵命塞悉則翻幾不能相運掉也幾居於翻掉走弔翻今者不知非此而反用以為經經常也嗚呼大曆貞元守邦之術永戒之哉又注孫子為之序以為兵者刑也大刑用甲兵政事也為夫子之徒實仲由冉有之事也不知自何代何人分為二道曰文武離而俱行因使縉紳之士不敢言兵或恥言之苟有言者世以為粗暴異人人不比數嗚呼亡失根本斯最為甚禮曰四郊多壘此卿大夫之辱也記曲禮之言樹立其國滅亡其國未始不由兵也主兵者必聖賢材能多聞博識之士乃能有功議於廊廟之上兵形已成然後付之於將將即亮翻漢祖言指蹤者人也指蹤謂指示獸蹤此與漢書因文取義小不同此其是也彼為相者曰兵非吾事吾不當知君子曰勿居其位可也觀溫公取杜牧此語則其平時講明相業可以見矣七年前邠寧行軍司馬鄭注依倚王守澄權勢燻灼上深惡之惡烏露翻九月丙寅侍御史李款閣內奏彈注內通敕使外連朝士兩地往來兩地謂往來南牙北司間也使疏吏翻朝直遙翻晝伏夜動干竊化權人不敢言道路以目請付法司旬日之間章數十上上時掌翻守澄匿注於右軍王守澄時為右軍中尉故得以匿注惡烏露翻左軍將李弘楚説元素曰説式芮翻鄭注姦猾無雙卵鷇不除鷇苦角翻鳥子未出者使成羽翼必為國患今因御史所劾匿軍中弘楚請以中尉意詐為有疾召使治之來則中尉延與坐弘楚侍側伺中尉舉目擒出杖殺之伺相吏翻中尉因見上叩頭請罪具言其姦楊王必助中尉進言楊王謂楊承和王踐言也元和末穆宗立韋元素亦以預有定策之功矣元素以為然召之注至蠖屈鼠伏蠖烏郭翻易大傳曰尺蠖之屈以求伸也爾雅注蠖行若今以指步尺屈而後伸佞辭泉涌元素不覺執手款曲諦聽忘倦諦都計翻審也弘楚詗伺章十二行本伺下有往復二字乙十一行本同再三元素不顧以金帛厚遺注而遣之詗火迥翻又翾正翻遺唯季翻弘楚怒曰中尉失今日之斷必不免他日之禍矣斷丁亂翻為元素為注所去張本因解軍職去頃之疽發背卒王涯之為相注有力焉是必因注以結王守澄也遂寢李款之奏守澄言注於上而釋之尋奏為侍御史充右神策判官考異曰開成紀事曰五年金吾將軍孟文亮出鎮邠郊以與注姻懿之故奏為軍司馬路經奉天防遏使御史大夫王從亮薄其為人不為之禮注毀從亮於守澄竟為守澄誣構決杖投荒未幾文亮沒罷職還城守澄潛置為軍畫時澤潞劉從諫本欲誅注忌其權勢因辟為節度副使才至潞州涉旬之間會上乖愈大和七年十一月驛徵之赴闕偶遭其時聖體獲愈上悅之自此恩寵漸隆凡臺省府縣軍戎莫不從風七年九月十三日侍御史李款彈注內通敕使外連朝臣兩地往來卜射財貨晝伏夜動干竊化權人不敢言道路以目城社轉固恐為禍胎罪不容誅理合顯戮其鄭注請付有司時王涯重處台司注之所致又慮守澄黨援遂寢不行注潛遁軍司矣李德裕文武兩朝獻替記曰八年春暮上對宰相歎天下無名醫便及鄭注精於服食或欲置於翰林伎術院或欲令為左神策判官注自稱衣冠皆不願此職守澄遂託從諫奏為行軍司馬及赴職宗閔又自山南令判官楊儉至澤潞與從諫要約令卻薦入今從實録七年甲寅以前忠武節度使王智興為河中節度使七年㣥臣以上即位八年未受尊號冬十二月甲午上尊號曰太和文武仁聖皇帝會有五坊中使薛季稜自同華還同華同州華州華戶化翻還音旋上歎曰關中小稔百姓尚爾況江淮比年大水其人如何比毗至翻吾無術以救之敢崇虛名乎因以通天帶賞季稜通天犀帶也竟不受七年庚子上始得風疾不能言於是王守澄薦昭義行軍司馬鄭注善醫上徵注至京師飲其藥頗有驗遂有寵甘露之禍胎成矣容肇祖標點聶崇岐覆校
