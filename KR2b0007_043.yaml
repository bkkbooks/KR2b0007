body:
  text: 資治通鑑卷第四十三翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註漢紀三十五建武十二年世祖光武皇帝中之下建武十二年丙申三六建武十二年春正月吳漢破公孫述將魏黨公孫永於魚涪津續漢書曰犍為郡南安縣有魚涪津在縣北臨大江南中志曰魚涪津廣數百步涪音浮述遣子壻史興救之漢迎擊破之因入犍為界諸縣皆城守詔漢直取廣都據其心腹漢乃進軍攻廣都拔之武帝元朔二年置廣都縣屬蜀郡賢曰市橋即七星橋之一橋也李膺益州記沖星橋舊市橋也在今成都縣西南四里水經註成都中兩江有七橋西南石牛門外曰市橋日夜離叛述雖誅滅其家猶不能禁將即亮翻歸所類翻帝必欲降之降戶江翻下同又下詔諭述曰勿以來歙岑彭受害自疑二人受害見上卷上年歙許及翻則宗族完全詔書手記不可數得數所角翻述終無降意建武十二年秋七月馮駿拔江州獲田戒建武十二年帝戒吳漢曰成都十餘萬衆不可輕也但堅據廣都待其來攻勿與爭鋒若不敢來公轉營迫之須其力疲乃可擊也漢乘利遂自將步騎二萬進逼成都去城十餘里阻江北張北下脫為字營作浮橋使副將武威將軍劉尚將萬餘人屯於江南為營相去二十餘里帝聞之大驚讓漢曰比敕公千條萬端何意臨事勃亂比毗至翻千條萬端言詳細也勃與悖同既輕敵深入又與尚別營事有緩急不復相及復扶又翻賊若出兵綴公以大衆攻尚尚破公即敗矣幸無他者言幸而無他虞不至喪敗也詔書未到九月述果使其大司徒謝豐執金吾袁吉將衆十許萬十許萬者約言之也出攻漢使別將將萬餘人劫劉尚令不得相救漢與大戰一日兵敗走入壁豐因圍之漢乃召諸將厲之曰厲勉也毛晃曰勉厲之厲有修飾振起之意吾與諸君踰越險阻轉戰千里遂深入敵地至其城下而今與劉尚二處受圍勢既不接其禍難量量音良欲潛師就尚於江南幷兵禦之若能同心一力人自為戰大功可立如其不然敗必無餘成敗之機在此一舉諸將皆曰諾於是饗士秣馬閉營三日不出乃多樹旛旗使煙火不絕夜銜枚引兵與劉尚合軍豐等不覺明日乃分兵拒水北自將攻江南漢悉兵迎戰自旦至晡日加申為晡奔謨翻遂大破之斬豐吉於是引還廣都留劉尚拒述具以狀上上時掌翻而深自譴責帝報曰公還廣都甚得其宜述必不敢略尚而擊公也賢曰略猶過也公從廣都五十里悉步騎赴之適當值其危困破之必矣自是漢與述戰於廣都成都之間八戰八克遂軍于其郭中成都郭中也臧宮拔帛丿糸竹破涪城涪縣屬廣漢郡賢曰涪城今帛丿糸竹縣宋白曰綿州巴西縣本漢涪縣恢述弟也與吳漢會於成都賢曰繁縣名屬蜀郡繁江名因以為縣名故城在今益州新繁縣北郫縣名屬蜀郡故城在今益州郫縣北郫音皮建武十二年李通欲避權勢乞骸骨積二歲帝乃聽上大司空印綬上時掌翻以特進奉朝請後有司奏封皇子帝感通首創大謀事見三十八卷王莽地皇三年封通少子雄為召陵侯召讀與邵同建武十二年公孫述困急謂延岑曰事當奈何岑曰男兒當死中求生可坐窮乎財物易聚耳易以豉翻不宜有愛述乃悉散金帛募敢死士五千餘人以配岑岑於市橋偽建旗幟鳴鼓挑戰幟昌志翻挑徒了翻下同而潛遣奇兵出吳漢軍後襲擊破漢漢墮水緣馬尾得出漢軍餘七日糧陰具船欲遁去蜀郡太守南陽張堪聞之時成都未破先署蜀郡太守以招懷蜀人說述必敗不宜退師之策說如字乃示弱以挑敵冬十一月臧宮軍咸陽門臧宮傳作咸門賢曰成都城北面東頭門此衍陽字東或作西戊寅述自將數萬人攻漢使延岑拒宮大戰岑三合三勝自旦及日中軍士不得食並疲漢因使護軍高午唐邯將銳卒數萬擊之邯戶甘翻述兵大亂高午奔陳刺述陳讀曰陣刺七亦翻洞胸墮馬左右輿入城述以兵屬延岑屬之欲翻其夜死明旦延岑以城降降戶江翻辛巳吳漢夷述妻子盡滅公孫氏幷族延岑遂放兵大掠焚述宮室帝聞之怒以譴漢又讓劉尚曰城降三日吏民從服孩兒老母口以萬數一旦放兵縱火聞之可為酸鼻尚宗室子孫更嘗吏職更工衡翻何忍行此仰視天俯視地觀放麑啜羹二者孰仁韓子曰孟孫獵得麑使秦西巴持之其母隨而呼秦西巴不忍放而與其母孟孫怒而逐西巴既而復之使傅其子戰國策曰樂羊為將為魏文侯攻中山中山之君烹其子而遺之羹樂羊坐於幕下而啜之盡一杯文侯謂褚師贊曰樂羊以我故而食其子之肉答曰子且食之其誰不食既拔中山文侯賞其功而疑其心將即亮翻初述徵廣漢李業為博士業固稱疾不起業平帝元始中除為郎會王莽居攝以病去官杜門不應州郡之命王莽以業為酒士病不之官遂隱藏山谷絕匿名迹夫既不仕於莽其肯為述起乎使大鴻臚尹融奉詔命以劫業若起則受公侯之位不起賜以毒酒融譬旨曰方今天下分崩孰知是非而以區區之身試於不測之淵乎朝廷貪慕名德曠官缺位于今七年四時珍御不以忘君珍御謂食珍之供進者下為子孫為于偽翻下同身名俱全不亦優乎業乃歎曰古人危邦不入亂邦不居論語載孔子之言也君子見危授命論語載子張之言也誘音酉融曰宜呼室家計之業曰丈夫斷之於心久矣斷丁亂翻何妻子之為遂飲毒而死述恥有殺賢之名遣使弔祠賻贈百匹業子翬逃辭不受翬音暉述又聘巴郡譙玄姓譜曹大夫食采於譙因氏焉玄平帝元始四年為繡衣使者分行天下觀省風俗會莽居攝棄使者車歸家隱遁亦遣使者以毒藥劫之太守自詣玄廬勸之行玄曰保志全高死亦奚恨遂受毒藥玄子瑛泣血叩頭於太守願奉家錢千萬以贖父死太守為請為于偽翻述許之述又徵蜀郡王皓王嘉平帝時皓為美陽令嘉為郎王莽篡位並棄官西歸先繫其妻子使者謂嘉曰速裝妻子可全對曰犬馬猶識主況於人乎言身為漢臣豈不念故主乎以首付使者刎武粉翻述怒遂誅皓家屬王嘉聞而嘆曰後之哉乃對使者伏劍而死犍為費貽不肯仕述漆身為癩陽狂以避之犍居言翻費音祕又父沸翻同郡任永馮信皆託青盲以辭徵命青盲者其瞳子不精明不能睹物任音壬詔贈常少為太常張隆為光祿勳少隆死見上卷上年祠以中牢師古曰中牢即少牢謂羊豕也而表李業之閭徵費貽任永馮信會永信病卒獨貽仕至合浦太守郡國志合浦郡在雒陽南九千一百九十一里皆擢用之於是西土咸悅莫不歸心焉初王莽以廣漢文齊為益州太守郡國志益州郡在雒陽西五千五百里治直之翻降集㣥夷甚得其和降戶江翻下同公孫述時齊固守拒險述拘其妻子許以封侯齊不降聞上即位間道遣使自聞間古莧翻使疏吏翻蜀平徵為鎮遠將軍封成義侯建武十二年十二月辛卯揚武將軍馬成行大司空事建武十二年是歲參狼羌與諸種寇武都參狼羌無弋爰劍之後也爰劍孫邛將其種人南出賜支河曲之西數千里其後子孫分別各自為種或為氂牛種越巂羌是也或為白馬種廣漢羌是也或為參狼種武都羌是也爰劍曾孫忍及弟舞留湟中是為湟中諸種羌種章勇翻降者萬餘人於是隴右清靜援務開恩信寬以待下任吏以職但總大體而賓客故人日滿其門諸曹時白外事援輒曰此丞掾之任何足相煩百官志郡守有丞一人有諸曹掾史有功曹史主選署功勞有五官掾署功曹及諸曹事其餘有議曹法曹賊曹決曹金曹倉曹等掾俞絹翻使得遨遊若大姓侵小民黠吏不從令黠下八翻此乃太守事耳傍縣嘗有報讎者吏民驚言羌反百姓奔入城狄道長詣門請閉城發兵賢曰狄道縣屬隴西郡今蘭州縣余據隴西都治狄道故得詣門白太守長知兩翻大笑曰虜何敢復犯我曉狄道長歸守寺舍賢曰曉喻也寺舍官舍也可牀下伏怖普布翻後稍定郡中服之建武十二年詔邊吏力不足戰則守追虜料敵不拘以逗留法賢曰漢法軍行逗留畏愞者斬追虜或近或遠量敵進退不拘以軍法直取勝敵為務建武十二年山桑節侯王常牟平烈侯耿況東光成侯耿純皆薨諡法好廉自克曰節有功安民曰烈賀琛曰佐相克終曰成惇龐淳固曰成乘輿數自臨幸復以弇弟廣舉並為中郎將乘繩證翻數所角翻復扶又翻弇兄弟六人弇舒國廣舉霸兄弟六人省侍醫藥省悉景翻當世以為榮建武十二年盧芳與匈奴烏桓連兵數寇邊帝遣驃騎大將軍杜茂等將兵鎮守北邊治飛狐道治飛狐道以通趙魏應援北邊之兵修烽燧凡與匈奴烏桓大小數十百戰終不能克建武十二年上詔竇融與五郡太守入朝融等奉詔而行官屬賓客相隨駕乘千餘兩馬牛羊被野乘繩證翻兩音亮被皮義翻既至詣城門上印綬上時掌翻詔遣使者還侯印綬引見賞賜恩寵傾動京師尋拜融冀州牧冀州部魏郡鉅鹿常山中山信都河間清河趙國勃海姑臧長孔奮為武都郡丞姑臧在河西最為富饒姑臧縣屬武威郡劉昫曰姑臧縣秦月氏戎所處匈奴名蓋藏城語訛為姑臧城長知兩翻士多不修檢操居縣者不盈數月輒致豐積奮在職四年力行清潔為衆人所笑以為身處脂膏不能自潤說文戴角者脂無角者膏處昌呂翻諸守令財貨連轂彌竟川澤轂古谷翻唯奮無資單車就路帝以是賞之帝以睢陽令任延為武威太守睢音雖任音壬帝親見戒之曰善事上官無失名譽延對曰臣聞忠臣不和和臣不忠考異曰延傳作忠臣不私私臣不忠按高峻小史作忠臣不和和臣不忠意思為長又與上語相應今從之臣子之節上下雷同非陛下之福曲禮曰毋雷同鄭氏註曰雷之發聲物無不同時應者人之言當各由己不當然也臣不敢奉詔帝歎息曰卿言是也十三年十三年春正月庚申大司徒侯霸薨十三年戊子詔曰郡國獻異味其令太官勿復受百官志太官令一人秩六百石掌御膳飲食復扶又翻自如舊制漢官儀曰口實膳羞之事也日行千里又進寶劍價直百金詔以劍賜騎士馬駕鼓車輿服志乘輿法駕後有金鉦黃鉞黃門鼓車喜許既翻手不持珠玉嘗出獵車駕夜還上東門候汝南郅惲拒關不開賢曰上東門洛陽城東面北頭門也惲於粉翻見賢遍翻惲曰火明遼遠遂不受詔上乃回從東中門入賢曰東面中門也惲上書諫曰昔文王不敢槃于遊田以萬民惟正之供尚書無逸之辭槃樂也夜以繼晝其如社稷宗廟何書奏賜惲布百匹貶東中門候為參封尉雒陽十二城門每門候一人秩六百石參封縣屬琅邪郡十三年二月遣捕虜將軍馬武屯虖沱河以備匈奴虖讀曰呼十三年盧芳攻雲中久不下其將隨昱留守九原欲脅芳來降芳知之與十餘騎亡入匈奴其衆盡歸隨昱昱乃詣闕降詔拜昱五原太守封鐫胡侯鐫子全翻十三年朱祜奏古者人臣受封不加王爵丙辰詔長沙王興真定王得河間王邵中山王茂皆降爵為侯高帝封諸侯王其子孫無有與漢俱存亡者文帝封梁王城陽菑川景帝封河間長沙中山常山昭帝封廣陽廣陵高密此數國至王莽篡漢而廢但封長沙真定河間中山者與帝同出於景帝也長沙舂陵之大宗真定常山王憲之後改封者今復降爵為侯以服屬已疏也丁巳以趙王良為趙公太原王章為齊公魯王興為魯公良帝叔父章興帝兄子也宗室及絕國封侯者凡一百三十七人富平侯張純安世之四世孫也歷王莽世以敦謹守約保全前封建武初先來詣闕為侯如故於是有司奏列侯非宗室不宜復國上曰張純宿衞十有餘年其勿廢更封武始侯食富平之半賢曰武始縣屬魏郡富平縣屬平原郡十三年庚午以紹嘉公孔安為宋公承休公姬常為衞公平常元始四年改紹嘉公曰宋公承休公曰鄭公今又改鄭曰衞十三年三月辛未以沛郡太守韓歆為大司徒郡國志沛郡在雒陽東南一千二百里十三年丙子行大司空馬成復為揚武將軍十三年吳漢自蜀振旅而還至宛宛於元翻詔過家上冢賜穀二萬斛上時掌翻夏四月至京師於是大饗將士功臣增邑更封更工衡翻凡三百六十五人其外戚恩澤封者四十五人定封鄧禹為高密侯食四縣禹食昌安夷安淳于高密四縣賢曰高密國名今密州縣余據西漢以高密為王國東漢為侯國屬北海國賢所云蓋侯國也賈復為膠東侯食六縣固始侯國屬汝南郡故寢縣也帝更名史記正義曰孫叔敖以寢丘土寢薄取為封邑李通又慕叔敖受邑光武嘉之改名固始膠東西漢以為王國帝以為侯國併屬北海食郁秩壯武下密即墨挺胡觀陽凡六縣已歿者益封其子孫或更封支庶帝在兵間久厭武事且知天下疲耗思樂息肩自隴蜀平後非警急未嘗復言軍旅樂音洛復扶又翻皇太子嘗問攻戰之事帝曰昔衞靈公問陳孔子不對論語衞靈公問陳於孔子孔子曰俎豆之事則嘗聞之矣軍旅之事未之學也陳讀曰陣鄧禹賈復知帝偃干戈修文德不欲功臣擁衆京師乃去甲兵敦儒學去羌呂翻帝亦思念欲完功臣爵土不令以吏職為過恐其以職事有過而失爵邑也耿弇等亦上大將軍將軍印綬上時掌翻皆以列侯就第加位特進奉朝請朝直遙翻請才性翻又如字鄧禹內行淳備行下孟翻有子十三人各使守一藝修整閨門教養子孫皆可以為後世法資用國邑不修產利凡用度皆資於國邑不事生產作業及營利也賈復為人剛毅方直多大節既還私第闔門養威重朱祜等薦復宜為宰相帝方以吏事責三公故功臣並不用是時列侯唯高密固始膠東三侯與公卿參議國家大事恩遇甚厚帝雖制御功臣而每能回容回容猶今言回護也賢曰回曲也曲法以容也遠方貢珍甘必先徧賜諸侯而太官無餘故皆保其福祿無誅譴者十三年益州傳送公孫述瞽師郊廟樂器葆車輿輦於是法物始備賢曰瞽無目之人也為樂師取其無所見於音審也效廟之器樽彞之屬也樂器鍾磬之屬也葆車謂上建羽葆也合聚五采羽名為葆孔穎達曰羽葆者以烏羽注於柄頭如蓋謂之羽葆謂蓋也輿者車之總名也輦者駕人以行法物謂大駕鹵簿儀式也時草創未暇今得之始備余謂法物即上樂器葆車輿輦之類傳直戀翻天下少事文書調役調徒弔翻務從簡寡至乃十存一焉十三年甲寅以冀州牧竇融為大司空融自以非舊臣一旦入朝朝直遙翻下同在功臣之右每朝章十二行本朝作召乙十一行本同會進見容貌辭氣卑恭已甚帝以此愈親厚之融小心久不自安數辭爵位數所角翻上疏曰臣融有子朝夕教導以經藝不令觀天文見讖記讖楚譖翻誠欲令恭肅畏事恂恂守道不願其有才能何況乃當傳以連城廣土享故諸侯王國哉因復請間求見復扶又翻間古莧翻見賢遍翻下以意推帝不許後朝罷逡巡席後逡巡卻退貌遂使左右傳出傳旨使融出也迎詔融曰日者知公欲讓職還土賢曰日者猶往日也今相見宜論他事勿得復言融不章十二行本不上有乃字孔本同敢重陳請重直用翻十三年五月匈奴寇河東十四年十四年夏邛穀王任貴遣使上三年計即授越巂太守郡國志越巂郡在雒陽西四千八百里巂音髓邛渠容翻任音壬上時掌翻十四年秋會稽大疫郡國志會稽郡在雒陽東三千八百里會古外翻十四年莎車王張莎上脫冬字賢鄯善王安皆遣使奉獻莎素禾翻鄯時戰翻西域苦匈奴重斂斂力贍翻皆願屬漢復置都護上以中國新定不許十四年太中大夫梁統上疏曰臣竊見元帝初元五年輕殊死刑三十四事哀帝建平元年輕殊死刑八十一事其四十二事手殺人者減死一等自是之後著為常準故人輕犯法吏易殺人易以豉翻臣聞立君之道仁義為主仁者愛人義者正理愛人以除殘為務正理以去亂為心去羌呂翻刑罰在衷無取於輕衷中也適也約令定律誠得其宜高帝入關約法三章後蕭何定律九章文帝元年除收孥相坐法十三年除肉刑至哀平繼體即位日淺聽斷尚寡斷丁亂翻承相王嘉輕為穿鑿虧除先帝舊約成律按嘉傳及刑法志並無其事統與嘉時代相接所引固不妄矣但班固略而不載也或不便於理或不厭民心厭於葉翻謹表其尤害於體者傅奏於左體政體也傅音附詳擇其善定不易之典事下公卿下遐嫁翻光祿勳杜林奏曰大漢初興蠲除苛政海內歡欣及至其後漸以滋章老子曰法令滋章盜賊多有集以成贓小事無妨於義以為大戮至於法不能禁令不能止上下相遁為敝彌深賢曰遁猶回避也前書曰上下相匿以文避法焉不合翻移統復上言曰復扶又翻臣之所奏非曰嚴刑經曰爰制百姓于刑之衷尚書呂刑之言不輕不重之謂也自高祖至于孝宣海內稱治治直吏翻至初元建平而盜賊浸多皆刑罰不衷愚人易犯之所致也易以豉翻由此觀之則刑輕之作反生大患惠加姦軌而害及良善也事寢不報十五年十五年春正月辛丑大司徒韓歆免歆好直好呼到翻言無隱諱帝每不能容歆於上前證歲將饑凶指天畫地言甚剛切故坐免歸田里帝猶不釋復遣使宣詔責之復扶又翻歆及子嬰皆自殺歆素有重名死非其罪衆多不厭厭一葉翻帝乃追賜錢穀以成禮葬之賢曰成禮具禮也言不以非命而降其葬禮臣光曰昔高宗命說曰若藥弗瞑眩厥疾弗瘳說傅說也音悅孔安國曰如服藥必瞑眩極其病乃除欲其出切言以自警陸德明音瞑莫遍翻眩玄遍翻徐又呼縣翻瞑眩困極也夫切直之言非人臣之利乃國家之福也是以人君日夜求之唯懼弗得聞惜乎以光武之世而韓歆用直諫死豈不為仁明之累哉累力瑞翻十五年丁未有星孛於昴昴七星西方之宿也主獄事又為旄頭胡星也昴畢間為天街黃道之所經也孛蒲內翻十五年以汝南太守歐陽歙為大司徒郡國志汝南郡在雒陽南六百五十里歙許及翻十五年匈奴寇鈔日盛鈔楚交翻州郡不能禁二月遣吳漢率馬成馬武等北擊匈奴徙鴈門代郡上谷吏民六萬餘口置居庸常山關以東以避胡寇郡國志鴈門郡在雒陽北一千五百里代郡在雒陽東北二千五百里前書曰代郡有常山關上谷郡居庸縣有關復扶又翻朝廷患之增緣邊兵部數千人每部各數千人也十五年夏四月丁巳封皇子輔為右翊公英為楚公陽為東海公康為濟南公濟子禮翻蒼為東平公延為淮陽公荊為山陽公衡為臨淮公焉為左翊公京為琅邪公邪音耶癸丑追諡兄縯為齊武公兄仲為魯哀公帝感縯功業不就事見三十九卷更始元年恩愛甚篤以其少貴少詩照翻欲令親吏事使章試守平陰令興緱氏令平陰緱氏二縣皆屬河南尹緱工侯翻梁郡在雒陽東南八百五十里郡國志弘農郡在雒陽西南四百五十里十五年帝以天下墾田多不以實自占占之贍翻又戶口年紀互有增減乃詔下州郡檢覈覈者考其實也下戶稼翻苟以度田為名聚民田中幷度廬屋里落民遮道啼呼度徒洛翻呼火故翻或優饒豪右侵刻羸弱羸倫為翻時諸郡各遣使奏事帝見陳留吏牘上有書視之云潁川弘農可問河南南陽不可問宋白曰漢割秦南陽河南二郡之西境置弘農郡義取弘大農桑為名由從也問是書之所從來也趣向也問是書之意其所向為何如也抵言於長壽街上得之抵欺也賢曰長壽街在雒陽城中時東海公陽年十二在幄後言曰吏受郡敕敕教戒也敕教也戒也相方求問其墾田之數以相比也即如此何故言河南南陽不可問對曰河南帝城多近臣南陽帝鄉多近親田宅踰制不可為準帝令虎賁將詰問吏虎賁將虎賁中郎將也將即亮翻如東海公對首式救翻上由是益奇愛陽為立陽為太子張本遣謁者考實二千石長吏阿枉不平者長知兩翻冬十一月甲戌大司徒歙坐前為汝南太守度田不實贓罪千餘萬下獄下遐稼翻歙世授尚書八世為博士自歐陽生傳伏生尚書至歙八世皆為博士為于偽翻至有自髡剔者毛晃曰剃髮曰髡盡及身毛曰剔年十七禮姓也左傳衞有大夫禮孔帝竟不赦歙死獄中十五年十二月庚午以關內侯戴涉為大司徒十五年盧芳自匈奴復入居高柳復扶又翻十五年是歲驃騎大將軍杜茂坐使軍吏殺人免使揚武將軍馬成代茂繕治障塞十里一候以備匈奴治直之翻使騎都尉張堪領杜茂營擊破匈奴於高柳杜佑曰雲州治雲中縣縣界有高柳城闞駰曰高柳在狋氏縣北百三十里酈道元曰高柳縣故城舊代郡治高柳在代中其山重巒疊巘霞舉雲高連山隱隱東出遼塞堪視事八年匈奴不敢犯塞勸民耕稼以致殷富百姓歌曰桑無附枝麥秀兩岐章十二行本秀作穗岐從止乙十一行本均同蠶月既採桑斫去繁枝留其特長者則來年桑葉茂盛麥率一莖一穗罕有兩岐者故以為瑞張君為政樂不可支樂音洛十五年安平侯蓋延薨蓋古盍翻十五年交趾麊泠縣雒將女子徵側甚雄勇師古曰麊泠音麋零交州外域記曰交趾昔未有郡縣之時土地有雒田民墾食其田因名為雒民設雒王雒侯主諸郡縣縣有雒將銅印青綬宋白曰峯州漢麊泠縣地交趾太守蘇定以法繩之徵側忿怨十六年十六年春二月徵側與其妹徵貳反九真日南合浦蠻俚皆應之郡國志日南郡秦象郡地在雒陽南萬三千四百里賢曰俚蠻之別號今呼為俚人宋白曰愛州漢九真郡治胥浦縣驩州漢日南郡治朱吾縣自立為王都麊泠交趾刺史及諸太守僅得自守十六年三月辛丑晦日有食之十六年秋九月河南尹張伋及諸郡守十餘人皆坐度田不實下獄死後上從容謂虎賁中郎將馬援曰武帝置期門郎掌執兵送從平帝元始元年更名虎賁郎置中郎將漢儀虎賁騎鶡冠虎文單衣度徒洛翻從千容翻賁音奔吾甚恨前殺守相多也守式又翻相息亮翻對曰死得其罪何多之有但死者既往不可復生也復扶又翻上大笑十六年郡國㣥盜處處並起郡縣追討到則解散去復屯結青徐幽冀四州尤甚冬十月遣使者下郡國下遐稼翻聽㣥盜自相糾擿賢曰擿猶發也他狄翻五人共斬一人者除其罪吏雖逗留回避故縱者皆勿問聽以禽討為效其牧守令長坐界內有盜賊而不收捕者又以畏愞捐城委守者皆不以為負賢曰委守謂棄其所守也負罪負也愞而戀翻又奴亂翻殿丁甸翻唯蔽匿者乃罪之於是更相追捕更工衡翻賊並解散徙其魁帥於他郡賦田受稟稟給也帥所類翻自是牛馬放牧不收邑門不閉十六年盧芳與閔堪使使請降帝立芳為代王堪為代相賜繒二萬匹繒慈陵翻因使和集匈奴芳上疏謝自陳思望闕庭詔報芳朝明年正月朝直遙翻下同初匈奴聞漢購求芳貪得財帛故遣芳還降既而芳以自歸為功不稱匈奴所遣單于復恥言其計復扶又翻下同故賞遂不行由是大恨入寇尤深十六年馬援奏宜如舊鑄五銖錢廢五銖錢事見三十七卷王莽始建國元年天下賴其便十六年盧芳入朝南及昌平昌平縣屬上谷郡賢曰故城在今幽州昌平縣東南令更朝明歲十七年十七年春正月趙孝公良薨諡法慈惠愛親曰孝懷縣大姓李子春二孫殺人懷令趙憙窮治其姦憙許記翻又讀曰熹治直之翻二孫自殺收繫子春京師貴戚為請者數十為于偽翻憙終不聽及良病上臨視之問所欲言良曰素與李子春厚今犯罪懷令趙憙欲殺之願乞其命帝曰吏奉法律不可枉也更道他所欲良無復言復扶又翻既薨上追思良乃貰出子春貰時夜翻赦也遷憙為平原太守郡國志平原郡在雒陽北千三百里十七年二月乙未晦日有食之考異曰帝紀乙亥晦袁紀乙未據長曆三月丙申朔帝紀誤十七年夏四月乙卯上行幸章陵章陵故舂陵帝更名乙卯還宮十七年六月癸巳臨淮懷公衡薨十七年妖賊李廣攻沒皖城賢曰皖縣名屬廬江郡故城在今舒州有皖水妖於驕翻皖音下板翻秋九月破皖城斬李廣十七年郭后寵衰數懷怨懟數所角翻懟直類翻上怒之冬十月辛巳廢皇后郭氏立貴人陰氏為皇后詔曰異常之事非國休福不得上壽稱慶郅惲言於帝曰臣聞夫婦之好好呼到翻父不能得之於子況臣能得之於君乎賢曰得猶制御也司馬遷曰匹之愛君不能得之臣父不能得之子況卑下乎雖然願陛下念其可否之計無令天下有議社稷而已帝曰惲善恕己量主量音良知我必不有所左右而輕天下也賢曰左右猶向背也言其齊等以常山郡益中山國郡國志中山國在雒陽北一千四百里其餘九國公皆為王十七年甲申帝幸章陵修園廟祠舊宅觀田廬置酒作樂賞賜時宗室諸母因酣悅相與語曰文叔少時謹信少詩照翻與人不款曲唯直柔耳今乃能如此帝聞之大笑曰吾治天下亦欲以柔道行之治直之翻十二月還自章陵十七年是歲莎車王賢復遣使奉獻請都護復扶又翻帝賜賢西域都護印綬及車旗黃金錦繡敦煌太守裴遵上言夷狄不可假以大權唐氏族志伯益之後封於鄉因以為氏後徙封解邑乃去邑從衣郡國志郭煌郡在雒陽西五千里敦徒門翻詔書收還都護印綬更賜賢以漢大將軍印綬其使不肯易遵迫奪之賢由是始恨而猶詐稱大都護移書諸國諸國悉服屬焉十七年匈奴鮮卑赤山烏桓數連兵入塞鮮卑亦東胡也別依鮮卑山故因號焉漢初為冒頓所破遠竄遼東塞外與烏桓相接未嘗通中國至是始入塞為寇烏桓傳赤山在遼東西北數千里數所角翻下同詔拜襄賁令祭肜為遼東太守賢曰襄賁縣名屬東海郡故城在今沂州臨沂縣南賁音肥郡國志遼東郡在雒陽東北三千六百里祭則介翻肜當作彤虜每犯塞常為士卒鋒數破走之肜遵之從弟也從才用翻十七年徵側等寇亂連年詔長沙合浦交趾具車船修道橋通障谿障與嶂同山也山谿為阻則治橋道以通之拜馬援為伏波將軍以扶樂侯劉隆為副賢曰扶樂縣名屬九真郡余謂賢說誤矣九真郡未嘗有扶樂縣隆初封亢父侯以度田不實免次年封為扶樂鄉侯則扶樂乃鄉名非縣名賢考之不詳也水經註扶樂城在扶溝縣砂水逕其北十八年十八年二月張二月上脫春字蜀郡守將史歆反攻太守張穆穆踰城走宕渠楊偉等起兵以應歆宕渠縣屬邑郡宕渠故城在今渠州流江縣東北七十里賢曰宕渠山名因以名縣故城在今渠州流江縣東北俗名車騎城是也師古曰宕音徒浪翻十八年甲寅上行幸長安三月幸蒲坂蒲坂縣屬河東郡十八年馬援緣海而進隨山刊道千餘里至浪泊上浪泊在交趾封溪縣界按馬援既平交趾奏分西里置封溪望海二縣水經曰葉榆水過交趾麊泠縣北分為五水絡交趾郡中其南水自麊泠縣東逕封溪縣北又東逕浪泊馬援以其地高自西里進屯焉宋白曰馬援自九真以南隨山刊木至日南大破之追至禁谿禁谿水經註及越志皆作金溪其地蓋在麊泠縣西南水經註曰徵側走入金谿究三歲乃得之竺芝扶南記曰山溪瀨中謂之究賢曰其地今岑州新昌縣也余按唐志新昌縣屬豐州岑字誤十八年夏四月甲戌車駕還宮十八年戊申上行幸河內戊子還宮十八年五月旱十八年盧芳自昌平還內自疑懼遂復反復扶又翻與閔堪相攻連月匈奴遣數百騎迎芳出塞芳留匈奴中十餘年病死十八年吳漢發廣漢巴蜀三郡兵郡國志廣漢郡在雒陽西三千里巴郡在雒陽西二千七百里蜀郡在雒陽西三千一百里秋七月拔之斬史歆等漢乃乘桴編竹木以渡水大曰筏小曰桴楊偉等惶恐解散漢誅其渠帥徙其黨與數百家於南郡長沙而還帥所類翻還從宣翻又如字十八年冬十月庚辰上幸宜城賢曰宜城縣屬南郡楚之鄢邑也故城在今襄州率道縣南祠章陵十二月還宮十八年是歲罷州牧置刺史置州牧事始見三十二卷成帝綏和元年至哀帝建平二年復為刺史元壽二年復為牧十八年五官中郎將張純與太僕朱浮奏議禮為人子事大宗降其私親當除今親廟四以先帝四廟代之大司徒涉等奏立元成哀平四廟上自以昭穆次第當為元帝後昭讀為佋音韶十九年十九年春正月庚子追尊宣帝曰中宗始祠昭帝元帝於太廟賢曰漢官儀曰光武第雖十二於父子之次於成帝為兄弟於哀帝為諸父於平帝為祖父皆不可為之後上至元帝於光武為父故上繼元帝而為九代故河圖云赤九會昌謂光武也然則宣帝為祖昭帝為曾祖故追尊及祠之舂陵節侯以下於章陵其長安章陵皆太守令長侍祠祭祀志曰時詔曰宗廟處所未定且祫祭高廟其成哀平且祠祭長安故高廟其南陽舂陵歲時且各因故園廟祭祀園廟去太守治所遠者在所令長行太守事侍祠如淳曰宗廟在章陵者南陽太守稱使者往祭不使侯王祭者諸侯不得祖天子凡臨祭宗廟皆為侍祠十九年馬援斬徵側徵貳十九年妖賊單臣傳鎮等相聚入原武城妖於驕翻單音善原武縣屬河南尹自稱將軍詔太中大夫臧宮將兵圍之數攻不下數所角翻士卒死傷帝召公卿諸侯王問方略皆曰宜重其購賞東海王陽獨曰妖巫相劫勢無久立其中必有悔欲亡者但外圍急不得走耳宜小挺緩令得逃亡賢曰挺解也余據禮記月令挺重囚挺寬也音待鼎翻則一亭長足以禽矣帝然之即敕宮徹圍緩賊賊衆分散夏四月拔原武斬臣鎮等十九年馬援進擊徵側餘黨都陽等至居風降之賢曰居風縣名屬九真郡今愛州交州記曰居風有山出金牛往往夜見光耀十里山有風門常有風賢曰嶠嶺嶠也爾雅曰山銳而高曰嶠居廟翻考異曰援傳作都羊帝紀作都陽今從紀又帝紀十八年四月遣援擊交趾十九年四月斬側貳等因擊都陽等降之援傳十七年拜伏波將軍討側貳十八年春軍至浪泊明年正月斬側貳蓋紀之所書者援奏破側貳及傳側貳首至雒之時也沈懷遠南越志云徵側奔入金溪穴中二年乃得之援傳近是今從之自後駱越奉行馬將軍故事賢曰駱者越別名林邑記曰日南盧容浦通銅鼓外越銅鼓即駱越也有銅鼓因得其名馬援取其鼓以鑄銅馬十九年閏月戊申進趙齊魯三公爵皆為王十九年郭后既廢太子彊意不自安郅惲說太子曰久處疑位上違孝道下近危殆說輸芮翻處昌呂翻近其靳翻不如辭位以奉養母氏太子從之數因左右及諸王陳其懇誠願備藩國數所角翻上不忍遲回者數歲六月戊申詔曰春秋之義立子以貴春秋公羊傳曰立嫡以長不以賢立子以貴不以長桓公何以貴母貴也母貴則子貴子以母貴母以子貴皇后之子宜承大統皇太子彊崇執謙退願備藩國父子之情重久違之重難也立陽為皇太子改名莊袁宏論曰夫建太子所以重宗統一民心也非有大惡於天下不可移也世祖中興漢業宜遵正道以為後法今太子之德未虧於外內寵既多嫡子遷位可謂失矣然東海歸藩謙恭之心彌亮明帝承統友于之情愈篤論語孔子曰惟孝友于兄弟興廢不同父子兄弟至性無間夫以三代之道處之間古莧翻處昌呂翻亦何以過乎十九年帝以太子舅陰識守執金吾陰興為衞尉皆輔導太子識性忠厚入雖極言正議及與賓客語未嘗及國事帝敬重之常指識以敕戒貴戚激厲左右焉興雖禮賢好施而門無遊俠西都之季萬章樓護陳遵等皆俠遊於貴近之門至於此時亦有杜保王磐之徒好呼到翻施式豉翻俠戶頰翻姓譜鮮于本子姓周武王封箕子於朝鮮支子仲食采於于因以鮮于為氏裒蒲侯翻猶稱所長而達之友人張汜杜禽與興厚善以為華而少實俱章十二行本俱作但乙十一行本同孔本同私之以財終不為言少詩沼翻為于偽翻是以世稱其忠上以沛國桓榮為議郎沛國即沛郡建武二十年中山王輔徙封沛始為國續漢志凡郎官皆主更直執戟宿衞諸殿門出充車騎惟議郎不在直中議郎秩六百石車駕幸太學會諸博士論難於前難乃旦翻榮辨明經義每以禮讓相厭厭服也一葉翻不以辭長勝人儒者莫之及特加賞賜又詔諸生雅歌擊磬盡日乃罷帝使左中郎將汝南鍾興授皇太子及宗室諸侯春秋鍾興為公羊春秋嚴氏學也興辭以無功帝曰生教訓太子及諸王侯非大功耶興曰臣師少府丁恭於是復封恭復扶又翻而興遂固辭不受十九年陳留董宣為雒陽令湖陽公主蒼頭白日殺人因匿主家吏不能得及主出行以奴驂乘宣於夏門亭候之雒陽十二城門夏門位在亥蔡質漢儀曰雒陽十二城門門一亭賢曰夏門雒陽城北面西頭門門外有萬壽亭乘繩證翻叩近也大言數主之失數所具翻叱奴下車因格殺之主即還宮訴帝帝大怒召宣欲箠殺之箠止蕊翻宣叩頭曰願乞一言而死帝曰欲何言宣曰陛下聖德中興而縱奴殺人將何以治天下乎治直之翻臣不須箠請得自殺即以頭擊楹楹柱也被皮義翻帝令小黃門持之小黃門宦者也屬少府宣不從強使頓之強其兩翻宣兩手據地終不肯俯主曰文叔為白衣時藏亡匿死亡謂亡命死謂犯死罪者今為天子威不能行一令乎帝笑曰天子不與白衣同因敕強項令出賢曰強項言不低屈也宣悉以班諸吏由是能搏擊豪強京師莫不震慓慓當作慄慓音匹妙翻前書音義曰慓疾也非此義章十二行本正作慄孔本同十九年九月壬申上行幸南陽進幸汝南南頓縣舍置酒會賜吏民復南頓田租一歲復芳目翻下同父老前叩頭言皇考居此日久陛下識知寺舍賢曰光武嘗從皇考至南頓故識知官府舍宇風俗通曰寺者嗣也理事之吏嗣續於其中也又曰寺司也諸官府所止皆曰寺願賜復十年帝曰天下重器常恐不任任音壬勝也日復一日日復之復扶又翻下復增同安敢遠期十歲乎吏民又言陛下實惜之何言謙也帝大笑復增一歲進幸淮陽梁沛十九年西南夷棟蠶反殺長吏詔武威將軍劉尚討之路由越巂巂音髓邛穀王任貴恐尚既定南邊威法必行己不得自放縱既聚兵起營多釀毒酒欲先勞軍勞力到翻因襲擊尚尚知其謀即分兵先據邛都越巂郡治邛都任貴所據宋白曰漢邛都縣唐為巂州越巂縣誅之二十年二十年春二月戊子車駕還宮二十年夏四月庚辰大司徒戴涉坐入故太倉令奚涉罪下獄死無罪加之以罪曰入百官志太倉令屬大司農主受郡國漕轉穀秩六百石下遐稼翻策免大司空竇融二十年廣平忠侯吳漢病篤車駕親臨問所欲言對曰臣愚無所知識惟願陛下慎無赦而已五月辛亥漢薨詔送葬如大將軍霍光故事事見二十四卷宣帝地節二年漢性強力每從征伐帝未安常側足而立諸將見戰陳不利陳讀曰陳或多惶懼失其常度漢意氣自若方整厲器械激揚吏士帝時遣人觀大司馬何為還言方修戰攻之具乃歎曰吳公差強人意隱若一敵國矣賢曰隱威重之貌言其威重若敵國朝受詔夕則引道初無辨章十二行本辨作辦乙十一行本同嚴之日辨皮莧翻具也賢曰嚴即裝也避明帝諱改之及在朝廷斤斤謹質形於體貌爾雅曰明明斤斤察也李巡曰斤斤精詳之察也孫炎曰謹慎之察也斤音靳妻子在後買田業漢還讓之曰軍師在外吏士不足何多買田宅乎遂盡以分與昆弟外家故能任職以功名終二十年匈奴寇上黨天水遂至扶風郡國志上黨郡在雒陽北一千五百里天水郡在雒陽西二千里二十年帝苦風眩疾甚以陰興領侍中受顧命於雲臺廣室賢曰尚書曰成王將崩命召公作顧命孔安國註云臨終之命曰顧命顧音古雒陽南宮有雲臺廣德殿余謂廣室者寢殿也據晉書元帝紀有司奏太極殿廣室施絳帳帝令夏施青練帷冬施青布則廣室之為寢殿明矣召見興見賢遍翻欲以代吳漢為大司馬興叩頭流涕固讓曰臣不敢惜身誠虧損聖德不可苟冒至誠發中感動左右帝遂聽之太子太傅張湛自郭后之廢稱疾不朝帝強起之欲以為司徒湛固辭疾篤不能復任朝事強其兩翻復扶又翻任音壬朝直遙翻遂罷之六月庚寅以廣漢太守河內蔡茂為大司徒太僕朱浮為大司空壬辰以左中郎將劉隆為驃騎將軍行大司馬事二十年乙未徙中山王輔為沛王以郭況為大鴻臚帝數幸其第賞賜金帛豐盛莫比況郭后弟也數恩況者以慰后心耳數所角翻金穴二十年秋九月馬援自交趾還平陵孟冀迎勞之勞力到翻援曰方今匈奴烏桓尚擾北邊欲自請擊之男兒要當死於邊野以馬革裹尸還葬耳何能臥牀上在兒女子手中邪冀曰諒為烈士當如是矣二十年冬十月甲午上行幸魯東海楚沛國皆諸皇子封國也後東海王彊兼食魯郡而都於魯時猶為魯王興國二十年十二月匈奴寇天水扶風上黨二十年壬寅車駕還宮二十年馬援自請擊匈奴帝許之使出屯襄國賢曰襄國縣名屬趙國今邢州龍岡縣援謂黃門郎梁松竇固曰凡人富貴當使可復賤也如卿等欲不可復賤復扶又翻居高堅自持勉思鄙言松統之子固友之子也二十年劉尚進兵與棟蠶等連戰皆破之二十一年二十一年春正月追至不韋孫盛蜀譜曰初秦徙呂不韋子弟宗族於蜀漢武帝開西南夷置郡縣徙呂氏以充之因置不韋縣華陽國志曰武帝通博南山置不韋縣徙南越相呂嘉子孫宗族實之因名不韋以章其先人惡行也郡國志本屬益州郡明帝永平二年分置永昌郡治不韋史記正義不韋縣北去葉榆六百里西南諸夷悉平師所類翻二十一年烏桓與匈奴鮮卑連兵為寇代郡以東尤被烏桓之害被皮義翻其居止近塞近其靳翻朝發穹廬暮至城郭五郡民庶家受其辜五郡謂代郡上谷漁陽右北平遼西也百姓流亡邊陲蕭條無復人迹秋八月帝遣馬援與謁者分築堡塞稍興立郡縣或空置太守令長招還人民烏桓居上谷塞外白山者最為強富援將三千騎擊之無功而還考異曰劉昭註補後漢書志亦謂之續漢志其郡國志註云中郎將馬援誤也帝紀冬十月遣援出塞擊烏桓援傳十二月出屯襄國明年秋將三千騎出高柳袁紀在八月祭肜事前今從之二十一年鮮卑萬餘騎寇遼東太守祭肜率數千人迎擊之自被甲陷陳被皮義翻陳讀曰陣虜大奔投水死者過半遂窮追出塞虜急皆棄兵裸身散走是後鮮卑震怖畏肜不敢復闚塞裸郎果翻怖普布翻復扶又翻二十一年冬匈奴寇上谷中山二十一年莎車王賢浸以驕橫欲兼幷西域數攻諸國橫戶孟翻數所角翻重求賦稅諸國愁懼車師前王鄯善焉耆等十八國俱遣子入侍獻其珍寶及得見皆流涕稽首鄯上扇翻稽音啟願得都護帝以中國初定北邊未服皆還其侍子史所謂量時度力也諸國聞都護不出而侍子皆還大憂恐乃與敦煌太守檄敦徒門翻願留侍子以示莎車言侍子見留都護尋出冀且息其兵裴遵以狀聞帝許之二十二年二十二年春閏正月丙戌上幸長安二月己巳還雒陽二十二年夏五月乙未晦日有食之二十二年秋九月戊辰地震二十二年冬十月壬子大司空朱浮免癸丑以光祿勳杜林為大司空初陳留劉昆為江陵令縣有火災昆向火叩頭火尋滅江陵縣屬南郡虎皆負子渡河帝聞而異之徵昆代林為光祿勳帝問昆曰前在江陵反風滅火後守弘農虎北渡河行何德政而致是事對曰偶然耳左右皆笑帝歎曰此乃長者之言也顧命書諸策策簡策編簡為之漢制天子策書長二尺國史亦用簡策此書諸策即史策也尚書古文書以八寸策二十二年是歲青州蝗青州部濟南平原樂安北海東萊齊國二十二年匈奴單于輿死子左賢王烏達鞮侯立復死鞮丁奚翻弟左賢王蒲奴立匈奴中連年旱蝗赤地數千里赤地言在地之物皆盡死耗太半賢曰三分損二為太半乃遣使詣漁陽求和親帝遣中郎將李茂報命考異曰帝紀是歲匈奴日逐王比遣使詣漁陽請和親使茂報命按明年又有比遣使詣西河內附然則茂所報者非比也今從南匈奴傳二十二年烏桓乘匈奴之弱擊破之匈奴北徙數千里幕南地空詔罷諸邊郡亭候吏卒以幣帛招降烏桓降戶江翻二十二年西域諸國侍子久留敦煌皆愁思亡歸莎車王賢知都護不至擊破鄯善攻殺龜茲王龜茲前書音丘慈賢曰今龜音丘勿翻茲音沮惟翻蓋急言耳鄯善王安上書願復遣子入侍復扶又翻下同更請都護都護不出誠迫於匈奴帝報曰今使者大兵未能得出如諸國力不從心東西南北自在也任其所從班固論曰孝武之世圖制匈奴患其兼從西國結黨南羌南羌即湟中諸羌從子容翻四郡武威張掖酒泉敦煌也通西域以斷匈奴右臂隔絕南羌月氏斷丁管翻氏音支單于失援由是遠遁而幕南無王庭遭值文景玄默養民五世高惠及呂后文景為五世士馬強盛故能睹犀布瑁音代瑁音妹則建珠厓七郡感蒟醬竹杖則開牂柯越巂蒟音矩牂音臧巂音髓聞天馬蒲陶則通大宛安息自是殊方異物四面而至於是開苑囿廣宮室盛帷帳美服玩設酒池肉林以饗四夷之客作魚龍角抵之戲以觀視之觀古玩翻師古曰視讀曰示觀視之者示之令觀也及賂遺贈送遺于季翻萬里相奉師旅之費不可勝計勝音升至於用度不足乃榷酒酤榷古岳翻酤古暮翻筦鹽鐵鑄白金造皮幣算至車船租及六畜畜許救翻民力屈屈其勿翻財用竭因之以凶年寇盜並起道路不通直指之使始出衣繡杖斧斷斬於郡國使疏吏翻衣於既翻斷丁亂翻然後勝之是以末年遂棄輪臺之地而下哀痛之詔豈非仁聖之所悔哉事並見武帝紀且通西域近有龍堆遠則葱嶺身熱頭痛懸度之阨淮南杜欽揚雄之論皆以為此天地所以界別區域絕外內也別彼列翻西域諸國各有君長兵衆分弱無所統一雖屬匈奴不相親附匈奴能得其馬畜旃罽而不能統率與之進退畜許救翻與漢隔絕道里又遠得之不為益棄之不為損盛德在我無取於彼故自建武以來西域思漢威德咸樂內屬數遣使置質于漢樂音洛數所角翻質音致謂侍子也願請都護聖上遠覽古今因時之宜辭而未許雖大禹之序西戎周公之讓白雉太宗之卻走馬義兼之矣禹貢曰西戎即序即就也序次也禹就而序之非尚威服致其貢物也師古曰昔周公相成王越裳氏重九譯而獻白雉成王問周公公曰德不加焉則君子不饗其質政不施焉則君子不臣其遠吾何以獲此物也譯曰吾受命國子黃耇曰久矣天之無烈風雷雨也意者中國有聖人乎然後歸之王稱先王之神所致以薦宗廟卻走馬事見十三卷文帝元年王崇武標點容肇祖聶崇岐履校
