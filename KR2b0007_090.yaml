body:
  text: 資治通鑑卷第九十端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰權判西京留司御史臺上柱國河內郡開國侯食邑一千三百戶食實封四百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注晉紀十二建武元年中宗元皇帝上諱睿字景文宣帝曾孫琅邪武王胄之孫恭王覲之子諡法始建國都曰元建武元年丁丑三一七是年三月方改元建武元年春正月漢兵東略弘農太守宋哲奔江東哲屯華陰漢兵自長安東略故棄城來奔守式又翻建武元年黃門郎史淑侍御史王沖自長安奔涼州稱愍帝出降前一日降戶江翻使淑等齎詔賜張實拜實大都督涼州牧侍中司空承制行事且曰朕已詔琅邪王時攝大位君其協贊琅邪共濟多難淑等至姑臧實大臨三日難乃旦翻臨力鴆翻辭官不受初實叔父肅為西海太守王莽置西海郡光武中興棄之至獻帝興平二年武威太守張雅請置西海郡分張掖之居延一縣以屬之雖郡名同而非王莽西海郡之地請為先鋒入援實以其老弗許及聞長安不守肅悲憤而卒卒子恤翻實遣太府司馬韓璞時張氏保據河西有太府司馬太府少府主簿等官蓋以都督府為太府涼州府為少府也璞匹角翻撫戎將軍蓋張氏創置帥讀曰率騎奇寄翻沈約志魏置將軍四十號討虜第十九晉志曰張茂分武興金城西平安故四郡為定州蓋張氏分金城西平二郡地置安故郡也按安故縣二漢屬隴西郡水經注洮水自臨洮縣東流又屈而北流徑安故縣故城西又北徑狄道縣故城西狄道時已置武始郡安故郡蓋即漢之一縣置郡又遺相國保書曰王室有事不忘投軀前遣賈騫瞻公舉動中被符命敕騫還軍符命蓋保符下實也遺于季翻被皮義翻胡嵩不進麴允持金五百請救於嵩遂決遣騫等進軍度嶺自涼州濟河度沃于嶺至狄道為忠不遂憤痛之深死有餘責今更遣璞等唯公命是從璞等卒不能進而還至南安南安郡治䝠道縣卒子恤翻還從宣翻又如字斷丁管翻相持百餘日糧竭矢盡璞殺車中牛以饗士泣謂之曰汝曹念父母乎曰念念妻子乎曰念欲生還乎曰欲從我令乎曰諾乃鼓譟進戰會張閬帥金城兵繼至夾擊大破之斬首數千級帥讀曰率下同先是長安謠曰秦川中血沒腕唯有涼州倚柱觀腕烏貫翻及漢兵覆關中氐羌掠隴右雍秦之民死者什八九雍於用翻獨涼州安全建武元年二月漢主聰使從弟暢從才用翻帥步騎三萬攻滎陽太守李矩屯韓王故壘相去七里李矩屯新鄭則韓王故壘亦在新鄭也戰國時韓滅鄭徙都之故有故壘在焉使疏吏翻時暢兵猝至矩未及為備乃遣使詐降於暢暢不復設備大饗渠帥皆醉降戶江翻復扶又翻帥所類翻矩欲夜襲之士卒皆恇懼恇去王翻矩乃遣其將郭誦禱於子産祠子産相鄭鄭人懷其惠為之立祠子産有教當遣神兵相助衆皆踊躍爭進矩選勇敢千人使誦將之將即亮翻掩擊暢營斬首數千級暢僅以身免建武元年辛巳宋哲至建康沈約曰建康本秣陵縣漢獻帝建安十六年置孫權改秣陵為建業武帝平吳還為秣陵太康三年分秣陵之水北為建業愍帝即位避帝諱改為建康令丞相琅邪王睿統攝萬機三月琅邪王素服出次杜預曰出次避正寢於是西陽王羕及官屬等共上尊號西陽王羕汝南王亮之子羕余亮翻上時掌翻羕等固請不已王慨然流涕曰孤罪人也諸賢見逼不已當歸琅邪耳呼私奴命駕將歸國私奴謂私所畜養而給使令之奴非以罪沒官者稱晉王許之辛卯即晉王位大赦改元始備百官立宗廟建社稷有司請立太子王愛次子宣城公裒欲立之裒蒲侯翻謂王導曰立子當以德導曰世子宣城俱有朗雋之美而世子年長長知兩翻王從之丙辰立世子紹為王太子封裒為琅邪王奉恭王後帝後大宗故以裒奉琅邪國祀鎮廣陵以西陽王羕為太保封譙剛王遜之子承為譙王一本作譙王承氶音拯遜宣帝之弟子也又以征南大將軍王敦為大將軍江州牧揚州刺史王導為驃騎將軍都督中外諸軍事領中書監録尚書事驃匹妙翻丞相左長史刁協為尚書左僕射右長史周顗為吏部尚書軍咨祭酒顗魚豈翻賀循為中書令右司馬戴淵王邃為尚書司直劉隗為御史中丞行參軍劉超為中書舍人晉志曰中書晉初置舍人通事各一人江左合舍人通事謂之通事舍人掌呈奏案長兼蓋始於此掾屬拜駙馬都尉行參軍舍人拜騎都尉三都尉皆漢武帝置奉車都尉掌御乘輿車駙馬都尉掌駙馬騎都尉掌監羽林騎師古曰駙副馬也非正駕車皆為副馬一曰駙近也疾也晉武帝以宗室外戚為三都尉江左後罷奉車騎二都尉唯留駙馬都尉奉朝請諸尚公主者為之掾俞絹翻王導以敦統六州辭中外都督賀循以老病辭中書令王皆許之以循為太常是時承喪亂之後江東草創廣雅曰草造也創始也喪息浪翻諳練舊事諳烏含翻悉也記也朝直遙翻賀循為世儒宗明習禮學凡有疑議皆取決焉建武元年劉琨段匹磾相與歃血同盟磾丁奚翻歃色洽翻啜也期以翼戴晉室辛丑琨檄告華夷遣兼左長史右司馬溫嶠匹磾遣左長史榮卲奉表及盟文詣建康勸進漢之禪于魏也文帝三讓魏朝㣥臣纍表請順天人之望此則勸進之造端也晉受魏禪何曾等亦然是時愍帝蒙塵四海無君琨等勸進為得其正羡之弟子也溫羡見八十六卷惠帝永興二年母之姊妹為從母從才用翻晉祚雖衰天命未改吾當立功河朔使卿延譽江南行矣勉之王以鮮卑大都督慕容廆為都督遼左雜夷流民諸軍事龍驤將軍大單于昌黎公廆不受遼左即遼東流民謂中州之民流移入遼東者廆戶罪翻驤思將翻今兩京覆沒天子蒙塵左傳叔帶之難襄王出居于鄭使告難于魯臧文仲對曰天子蒙塵于外敢不奔問官守說輸芮翻為四海所係屬屬之欲翻明公雖雄據一方而諸部猶阻兵未服者蓋以官非王命故也謂宜通使琅邪使疏吏翻下同勸承大統然後奉詔令以伐有罪誰敢不從處士遼東高詡曰處昌呂翻霸王之資非義不濟今晉室雖微人心猶附之宜遣使江東示有所尊然後仗大義以征諸部不患無辭矣晉室雖衰慕容苻姚之興其初皆借王命以自重遣長史王濟浮海詣建康勸進建武元年漢相國粲使其黨王平謂太弟義曰適奉中詔云京師將有變宜衷甲以備非常義信之命宮臣皆衷甲以居粲固忌刻而義亦愚甚矣甲在衣中為衷甲靳居欣翻沈持林翻太弟將為亂已衷甲矣聰大驚曰寧有是邪王沈等皆曰臣等聞之久矣屢言之而陛下不之信也聰使粲以兵圍東宮粲使準沈收氐羌酋長十餘人窮問之義為大單于氐羌酋長屬焉故皆服事東宮酋慈由翻長知兩翻格以木為之周禮牛人祭祀共其牛牲之互鄭玄曰互若今屠家之懸肉格左思吳都賦曰峭格周施呂向曰格懸網木也酋長自誣與義謀反聰謂沈等曰吾今而後知卿等之忠也當念知無不言勿恨往日言而不用也於是誅東宮官屬及義素所親厚準沈等素所憎怨者大臣數十人坑士卒萬五千餘人所坑者東宮四衛之兵也四月廢義為北部王北部即胸奴後部居新興義形神秀爽寬仁有器度故士心多附之聰聞其死哭之慟曰吾兄弟止餘二人而不相容漢主淵諸子此時惟聰義二人在耳氐羌叛者甚衆以靳準行車騎大將軍討平之建武元年五月壬午日有食之考異曰帝紀天文志皆云五月丙子日食按長曆是月壬午朔無丙子今以曆為據建武元年六月丙寅溫嶠等至建康王導周顗庾亮等皆愛嶠才爭與之交是時太尉豫州牧荀組冀州刺史邵續青州刺史曹嶷寧州刺史王遜東夷校尉崔毖等皆上表勸進顗魚豈翻嶷魚力翻毖音祕王不許建武元年初流民張平樊雅各聚衆數千人在譙為塢主王之為丞相也遣行參軍譙國桓宣往說平雅平雅皆請降說輸芮翻降戶江翻下同及豫州刺史祖逖出屯蘆洲遣參軍殷乂詣平雅乂意輕平視其屋曰可作馬廣既見大鑊曰可鑄鐵器平曰此乃帝王鑊天下清平方用之奈何毀之乂曰卿未能保其頭而愛鑊邪鑊胡郭翻鼎而無足曰鑊說文云鑊江淮人謂之鍋浙人謂之鑊平大怒於坐斬乂坐徂臥翻勒兵固守逖攻之歲餘不下乃誘其部將謝浮使殺之誘音酉將即亮翻逖進據太丘太丘縣後漢屬沛郡晉省賢曰太丘故城在今亳州永城縣西北與逖相拒逖攻之不克請兵於南中郎將王含桓宣時為含參軍含遣宣將兵五百助逖逖謂宣曰卿信義已著於彼今復為我說雅復扶又翻為于僞翻宣乃單馬從兩人詣雅曰祖豫州方欲平蕩劉石倚卿為援前殷乂輕薄非豫州意也雅即詣逖降降戶江翻逖既入譙城石勒遣石虎圍譙王含復遣桓宣救之虎解去逖表宣為譙國內史己巳晉王傳檄天下稱石虎敢帥犬羊渡河縱毒今遣琅邪王裒等九軍帥讀曰率裒蒲侯翻鋭卒三萬水陸四道徑造賊埸造七到翻受祖逖節度尋復召裒還建康復扶又翻建武元年秋七月大旱司冀並青雍州大蝗河汾溢漂千餘家皆漢境也雍於用翻建武元年漢主聰立晉王粲為皇太子領相國大單于總攝朝政如故朝直遙翻大赦建武元年段匹磾推劉琨為大都督磾丁奚翻檄其兄遼西公疾陸眷及叔父涉復辰弟末柸等會于固安固安縣漢屬涿郡魏晉改涿郡曰范陽固安曰故安劉昫曰唐易州易縣古故安縣地末柸說疾陸眷涉復辰曰說輸芮翻以父兄而從子弟恥也且幸而有功匹磾獨收之吾屬何有哉各引兵還琨匹磾不能獨留亦還薊薊音計建武元年以荀組為司徒建武元年八月漢趙固襲衛將軍華薈於臨潁殺之臨潁縣屬潁川郡華戶化翻薈烏外翻初趙固與長史周振有隙振密譖固於漢主聰李矩之破劉暢也於帳中得聰詔令暢既克矩還過洛陽收固斬之以振代固矩送以示固固斬振父子帥騎一千來降帥讀曰率騎奇寄翻降戶江翻矩復令固守洛陽建武元年鄭攀等相與拒王廙廙羊至翻又逸職翻衆心不一散還橫桑口水經沔水東南徑江夏雲杜縣又東徑左桑周昭王溺死處也村老云百姓佐昭王喪事於此故曰佐桑左桑字失體耳又東謂之橫桑言得昭王喪處也王敦遣武昌太守趙誘襄陽太守朱軌擊之攀等懼請降杜曾亦請擊第五猗於襄陽以自贖廙將赴荊州留長史劉浚鎮揚口壘水經注龍陂水徑郢城東北流謂之揚水水北徑竟陵縣西又北注于沔曰揚口中夏口也伺相吏翻曾猾賊也外示屈服欲誘官軍使西然後兼道襲揚口耳宜大部分言當大為部分以備曾掩襲分扶問翻廙性矜厲自用以伺為老怯遂西行曾等果還趨揚口趨七喻翻廙乃遣伺歸裁至壘即為曾所圍劉浚自守北門使伺守南門馬雋從曾來攻壘雋妻子先在壘中馬雋本與鄭攀同距王廙皮面者剝其面皮殺其妻子未能解圍但益其怒耳乃止曾攻陷北門伺被傷被皮義翻退入船開船底以出沈行五十步乃得免沈持林翻潛行水底曰沈行曾遣人說伺曰說輸芮翻馬雋德卿全其妻子今盡以卿家內外百口付雋雋已盡心收視卿可來也伺報曰吾年六十餘不能復與卿作賊復扶又翻吾死亦當南歸妻子付汝裁之乃就王廙於甑山病創而卒甑山在竟陵界隋置甑山縣屬沔陽郡創初良翻戊寅趙誘朱軌及陵江將軍黃峻與曾戰於女觀湖水經注柞溪水出江陵縣北東注船官湖湖水又東北入女觀湖湖水又東入于揚水曾乘勝徑造沔口造七到翻威震江沔王使豫章太守周訪擊之訪有衆八千進至沌陽沈約曰沌陽縣江左立屬江夏郡水經沔水徑沌陽縣北又東徑林障故城北沌陽者沌水之陽也沈持林翻訪使將軍李恆督左甄許朝督右甄訪自領中軍曾先攻左右甄楊正衡曰甄音堅戰陳有左拒右拒拒方陳也有左甄右甄甄左右翼也左右拒見於周鄭繻葛之戰左右甄之義見於楚穆王孟諸之田孟諸之田宋公為右盂鄭伯為左盂杜預注曰將獵張兩甄蓋晉人以左右翼為左右甄杜預取當時之言以釋左右盂也訪於陳後射雉以安衆心射而亦翻令其衆曰一甄敗鳴三鼓兩甄敗鳴六鼓趙誘子胤將父餘兵屬左甄將即亮翻力戰敗而復合馳馬告訪訪怒叱令更進胤號哭還戰號戶刀翻自旦至申兩甄皆敗訪選精鋭八百人自行酒飲之飲於鴆翻敕不得妄動聞鼓音乃進曾兵未至三十步訪親鳴鼓將士皆騰躍奔赴曾遂大潰殺千餘人訪夜追之諸將請待明日訪曰曾驍勇能戰驍堅堯翻向者彼勞我逸故克之宜及其衰乘之可滅也乃鼓行而進遂定漢沔曾走保武當武當縣漢屬南陽郡晉屬順陽郡縣以武當山得名唐為均州武當郡杜佑曰郡城延岑所築訪以功遷梁州刺史屯襄陽胡子序之敗梁州陷沒故令訪領梁州而屯襄陽建武元年冬十月丁未琅邪王裒薨建武元年十一月己酉朔日有食之考異曰帝紀天文志皆云十一月丙子日食按長曆十月十二月皆己卯朔是月己酉朔二十八日丙子晉書元帝紀十一月有甲子丁卯若丙子朔則甲子丁卯乃在十月又劉琨集是年三月癸未朔八月庚辰朔皆與長曆合今以為據建武元年丁卯以劉琨為侍中太尉建武元年征南軍司戴邈上疏以為喪亂以來喪息浪翻下久喪同庠序隳廢議者或謂平世尚文遭亂尚武此言似之而實不然夫儒道深奧不可倉猝而成比天下平泰然後修之則廢墜已久矣比必寐翻又貴遊之子未必有斬將搴旗之才將即亮翻搴拔取也從軍征戍之役不及盛年使之講肄道義良可惜也肄羊至翻習也世道久喪禮俗日弊猶火之消膏莫之覺也今王業肇建萬物權輿爾雅曰權輿始也以勵風化王從之始立太學建武元年漢主聰出畋以愍帝行車騎將軍戎服執戟前導見者指之曰此故長安天子也聚而觀之故老有泣者太子粲言於聰曰昔周武王豈樂殺紂乎樂音洛正恐同惡相求為患故也今興兵聚衆者皆以子業為名不如早除之聰曰吾前殺庾珉輩殺庾珉事見八十八卷建興元年吾未忍復殺也復扶又翻且小觀之十二月聰饗㣥臣于光極殿使愍帝行酒洗爵已而更衣又使之執蓋晉臣多涕泣有失聲者尚書郎隴西辛賓起抱帝大哭聰命引出斬之使之執戟前導使之行酒洗爵使之執蓋所以屈辱之至此極矣戎狄狡計正以此觀晉舊臣及遺黎之心也更工衡翻趙固與河內太守郭默侵漢河東至絳絳縣故晉都也漢屬河東郡晉屬平陽郡劉昫曰唐絳州曲沃縣漢絳縣地聰分司隸為左右騎奇寄翻殺萬餘人固默引歸太子粲帥將軍劉雅生等步騎十萬屯小平津帥讀曰率固揚言曰要當生縛劉粲以贖天子粲表於聰曰子業若死民無所望則不為李矩趙固之用不攻而自滅矣戊戌愍帝遇害於平陽年十八固奔陽城山河南陽城縣有陽城山建武元年是歲王命課督農功二千石長吏以入穀多少為殿最長知兩翻少詩沼翻殿丁練翻諸軍各自佃作即以為稟佃音田稟給也建武元年氐王楊茂搜卒長子難敵立與少子堅頭分領部曲少詩照翻難敵號左賢王屯下辨堅頭號右賢王屯河池下辨河池二縣皆屬武都郡師古曰辨皮莧翻劉昫曰辨步莧翻下辨唐為成州同谷縣河池唐為武州盤隄縣建武元年河南王吐谷渾卒吐谷渾史家傳讀吐從暾入聲谷音欲吐谷渾者慕容廆之庶兄也父涉歸分戶一千七百以隸之及廆嗣位二部馬鬬廆遣使讓吐谷渾曰先公分建有別廆戶罪翻別彼列翻奈何不相遠異遠異者言遠去以相別異吐谷渾怒曰馬是六畜六畜馬牛羊犬豕雞畜許又翻何至怒及於人欲遠別甚易恐後會為難耳今當去汝萬里之外遂帥其衆西徙易以豉翻帥讀曰率廆悔之遣其長史乙郍婁馮追謝之郍與那同乙郍婁虜三字姓先公嘗稱卜筮之言云吾二子皆當強盛祚流後世我孽子也孽魚列翻庶出為孽理無並大今因馬而別殆天意乎遂不復還西傅陰山而居復扶又翻傅讀曰附屬永嘉之亂屬朱欲翻會也因度隴而西據洮水之西極于白蘭地方數千里沙州記曰洮水出嵹臺山東北流徑吐谷渾中又東北流入塞此洮西塞外洮水之西也即沙漒沓中之地白蘭山名羌所居也至唐時丁零羌居之左屬党項右與多彌接杜佑曰白蘭羌之別種東北接吐谷渾西至叱利模徒南界郡鄂風俗物産與宕昌同廆追思之為之作阿干之歌吐谷渾有子六十人長子吐延嗣為于僞翻長知兩翻吐延長大有勇力羌胡皆畏之吐谷渾事始此大興元年戊寅三一八是年三月方改元建武元年春正月遼西公疾陸眷卒其子幼叔父涉復辰自立段匹磾自薊往奔喪段末柸宣言匹磾之來欲為篡也匹磾至右北平劉昫曰唐薊州漁陽縣古右北平郡治所磾丁奚翻末柸乘虛襲涉復辰殺之並其子弟黨與自稱單于迎擊匹磾敗之單音蟬敗補邁翻匹磾走還薊薊音計建武元年三月癸丑愍帝凶問至建康王斬縗居廬縗倉回翻儀禮斬衰倚廬孟康曰倚廬倚牆至地為之無楣柱喪服大記父母之喪居倚廬不塗君為廬宮之大夫士袒之既葬柱楣塗廬不於顯者君大夫士皆宮之正義曰居倚廬者謂於中門之外東牆下倚木為廬下塗者但以草夾障不塗之也宮之者謂廬外以帷障之如宮牆袒之言袒也其廬袒露不帷障也既葬柱楣者既葬情殺故柱楣稍舉以納日光又以泥塗辟風寒不於顯者塗廬不塗廬外顯處君大夫士皆宮之者既葬故得皆宮之百官請上尊號上時掌翻王不許紀瞻曰晉氏統絶於今二年陛下當承大業顧望宗室誰復與讓若光踐大位則神民有所憑依苟為逆天時違人事大勢一去不可復還復扶又翻今兩都燔蕩宗廟無主劉聰竊號於西北而陛下方高讓於東南此所謂揖讓而救火也王猶不許使殿中將軍韓績徹去御坐殿中將軍屬二衛晉初置朝會宴饗則戎服直侍左右夜開諸城門則執白虎幡監之坐徂臥翻下帝坐同帝坐上應列星天文志帝坐在紫宮中王為之改容為于僞翻奉朝請周嵩上疏曰王為丞相以嵩為參軍及為晉王拜奉朝請晉志曰奉朝請者奉朝會請召而已古之王者義全而後取讓成而後得是以享世長久重光萬載也重直龍翻載子亥翻今梓宮未返舊京未清義夫泣血士女遑遑宜開延嘉謀訓卒厲兵先雪社稷大恥副四海之心則神器將安適哉由是忤旨出為新安太守孫權分丹陽立新都郡武帝太康元年改名新安郡劉昫曰新安郡唐之歙州忤五故翻嵩顗之弟也顗魚豈翻丙辰王即皇帝位百官皆陪列帝命王導升御床共坐導固辭曰若太陽下同萬物蒼生何由仰照帝乃止大赦改元文武增位二等帝欲賜諸吏投刺勸進者加位一等民投刺者皆除吏凡二十餘萬人毛晃曰書姓名於奏白曰刺陛下應天繼統率士歸戴豈獨近者情重遠者情輕不若依漢法遍賜天下爵於恩為普漢自惠帝嗣位賜民爵一級有官秩者以歲數為差其後諸帝初即位率賜民爵一級塞巧僞之端也塞悉則翻帝不從庚午立王太子紹為皇太子太子仁孝喜文辭善武藝好賢禮士喜許記翻好呼到翻容受規諫與庾亮溫嶠等為布衣之交亮風格峻整善談老莊帝器重之聘亮妹為太子帝以賀循行太子太傅周顗為少傅庾亮以中書郎侍講東宮帝好刑名家以韓非書賜太子庾亮諫曰申韓刻薄傷化不足留聖心太子納之建武元年帝復遣使授慕容廆龍驤將軍大單于昌黎公廆辭公爵不受廆辭公爵不受外為謙讓其志不肯鬱鬱於昌黎也復扶又翻使疏吏翻驤思將翻劉翔為主簿命邃創定府朝儀法朝直遙翻裴嶷言於廆曰晉室衰微介居江表介獨也嶷魚力翻中原之亂非明公不能拯也拯救也然皆頑愚相聚宜以漸並取以為西討之資西討謂自遼東進兵西入中州也君言大非孤所及也然君中朝名德不以孤僻陋而教誨之是天以君賜孤而祐其國也乃以嶷為長史委以軍國之謀諸部弱小者稍稍擊取之建武元年李矩使郭默郭誦救趙固屯于洛汭水經洛水東北過鞏縣東又北入于河夏五子傒太康于洛汭即其地據李矩傳時粲營于孟津北岸覘丑廉翻又丑豔翻以告太子粲請為之備粲曰彼聞趙固之敗自保不暇安敢來此邪毋為驚動將士俄而稚等奄至十道進攻粲衆驚潰死傷太半粲走保陽鄉陽鄉蓋春秋陽樊之地在汲郡修武縣界獲器械軍資不可勝數勝音升及旦粲見稚等兵少更與劉雅生收餘衆攻之漢主聰使太尉范隆帥騎助之少詩照翻帥讀曰率騎奇寄翻與稚等相持苦戰二十餘日不能下李矩進兵救之漢兵臨河拒守矩兵不得濟稚等殺其所獲牛馬焚其軍資突圍奔虎牢河南成皋縣鄭之虎牢也穆天子傳曰七萃之士生捕虎即獻天子天子畜之東虢號曰虎牢其後劉裕復中原置河南四鎮虎牢其一也三郡河南滎陽弘農也建武元年漢螽斯則百堂災螽斯則百堂取螽斯子孫衆多思齊則百斯男之義會工外翻建武元年聰以其子濟南王驥為大將軍都督中外諸軍事録尚書齊王勱為大司徒濟子禮翻勱音邁建武元年焦嵩陳安舉兵逼上邽相國保遣使告急於張實實遣金城太守竇濤督步騎二萬赴之軍至新陽晉志新陽縣屬天水郡何承天曰魏立水經注渭水過冀縣又東出岑峽入新陽川新陽縣蓋置于此保謀稱尊號破羌都尉張詵言於實曰南陽王國之疏屬忘其大恥而亟欲自尊君父皆死於賊手保之大恥也晉王近親且有名德當帥天下以奉之保宣帝之從曾孫故曰疏屬帝宣帝之曾孫故曰近親帥讀曰率遣牙門蔡忠奉表詣建康比至帝已即位比必寐翻實不用江東年號猶稱建興河西張氏用建興年號歷九世四十九年至孝宗升平五年張天錫乃奉升平年號建武元年夏四月丁丑朔日有食之建武元年加王敦江州牧王導驃騎大將軍開府儀同三司導遣八部從事行揚州郡國揚州時統丹陽會稽吳吳興宣城東陽臨海新安八郡故分遣部從事八人行下孟翻同時俱見諸從事各言二千石官長得失長知兩翻獨顧和無言導問之和曰明公作輔寧使網漏吞舟漢書刑法志曰漢興之初雖有約法三章網漏吞舟之魚師古曰言疏闊吞舟謂大魚也以察察為政邪導咨嗟稱善和榮之族子也建武元年成丞相范長生卒成主雄以長生子侍中賁為丞相長生博學多藝能年近百歲蜀人奉之如神近其靳翻建武元年漢中常侍王沈養女有美色沈持林翻漢主聰立以為左皇后尚書令王鑒中書監崔懿之中書令曹恂諫曰臣聞王者立后比德乾坤乾父道也君比德焉坤母道也后比德焉沒配后土必擇世德名宗幽間令淑詩關雎窈窕淑女毛注云窈窕幽間也淑善也令亦善也稱神祇之心稱尺證翻孝成帝以趙飛燕為后使繼嗣絶滅社稷為墟此前鑑也事見三十二卷漢哀帝建平元年愍帝建興之四年漢麟嘉之元年不以德舉借使沈之弟女刑餘小醜猶不可以塵汙椒房汙烏路翻況其家婢邪六宮嬪皆公子公孫奈何一旦以婢主之臣恐非國家之福也聰大怒使中常侍宣懷謂太子粲曰鑒等小子狂言侮慢無復君臣上下之禮其速考實於是收鑒等送市皆斬之金紫光祿大夫王延馳將入諫門者弗通鑒等臨刑王沈以杖叩之曰庸奴復能為惡乎乃公何與汝事與讀曰豫鑒瞋目叱之曰豎子滅大漢者正坐汝鼠輩與斬準耳瞋七人翻靳居欣翻要當訴汝於先帝取汝於地下治之治直之翻準謂鑒曰吾受詔收君有何不善君言漢滅由吾也鑒曰汝殺皇太弟使主上獲不友之名國家畜養汝輩何得不滅畜許六翻懿之謂準曰汝心如梟鏡梟食母破鏡食父破鏡如貙而虎身身一作眼汝既食人人亦當食汝聰又立宣懷養女為中皇后建武元年司徒荀組在許昌逼於石勒帥其屬數百人渡江帥讀曰率詔組與太保西陽王羕並録尚書事建武元年段匹磾之奔疾陸眷喪也劉琨使其世子㣥送之匹磾敗㣥為段末柸所得末柸厚禮之許以琨為幽州刺史欲與之襲匹磾密遣使齎㣥書請琨為內應為匹磾邏騎所得磾丁奚翻邏郎佐翻時琨別屯征北小城不知也征北小城蓋征北將軍所治匹磾以㣥書示琨曰意亦不疑公是以白公耳琨曰與公同盟庶雪國家之恥若兒書密達亦終不以一子之故負公而忘義也匹磾雅重琨雅素也將聽還屯其弟叔軍謂匹磾曰我胡夷耳所以能服晉人者畏吾衆也今我骨肉乖離謂與末柸相攻也若有奉琨以起吾族盡矣匹磾遂留琨琨之庶長子遵懼誅與琨左長史楊橋等閉門自守長知兩翻匹磾攻拔之代郡太守辟閭嵩姓譜衛文公支孫居楚丘營辟閭里因為辟閭氏事泄匹磾執嵩據及其徒黨悉誅之五月癸丑匹磾稱詔收琨縊殺之並殺其子姪四人縊於賜翻又於計翻琨從事中郎盧諶崔悅等帥琨餘衆奔遼西諶氏壬翻帥讀曰率下同依段末柸奉劉㣥為主將佐多奔石勒悅林之曾孫也崔林仕魏位至司空冀其能平河朔乃不為琨舉哀為于僞翻下同溫嶠表琨盡忠帝室家破身亡宜在褒恤盧諶崔悅因末柸使者亦上表為琨訟冤後數歲乃贈琨太尉侍中諡曰愍於是夷晉以琨死皆不附匹磾末柸遣其弟攻匹磾匹磾帥其衆數千將奔邵續勒將石越邀之於鹽山鹽山在勃海高城縣隋改高城曰鹽山縣宋白曰鹽山在縣東南八十里匹磾與琨結盟同獎晉室既殺琨而匹磾之勢亦衰終為石勒禽矣敗補邁翻匹磾復還保薊末柸自稱幽州刺史初溫嶠為劉琨奉表詣建康其母崔氏固止之嶠絶裾而去既至屢求返命朝廷不許會琨死除散騎侍郎嶠聞母亡阻亂不得奔喪臨葬固讓不拜苦請北歸詔曰凡行禮者當使理可經通經常也梟堅堯翻諸軍奉迎梓宮猶未得進嶠以一身於何濟其私難難乃旦翻而不從王命邪嶠不得已受拜建武元年初曹嶷既據青州乃叛漢來降謂遣使詣建康奉表勸進也嶷魚力翻勢援不接復與石勒相結勒授嶷東州大將軍青州牧封琅邪公曹嶷反側二國之間終為人禽而已矣復扶又翻建武元年六月甲申以刁協為尚書令荀嵩為左僕射協性剛悍與物多忤悍侯旰翻又下罕翻忤五故翻與侍中劉隗俱為帝所寵任隗五罪翻欲矯時弊每崇上抑下排沮豪強沮在呂翻故為王氏所疾諸刻碎之政皆云隗協所建協又使酒放肆侵毀公卿見者皆側目憚之為刁協見殺張本建武元年戊戌封皇子晞為武陵王建武元年劉虎自朔方侵拓跋鬱律西部虎徙朔方見八十七卷懷帝永嘉四年七月鬱律擊虎大破之虎走出塞從弟路孤帥其部落降于鬱律帥讀曰率降戶江翻於是鬱律西取烏孫故地東兼勿吉以西唐書北狄列傳曰黑水靺鞨居肅慎地亦曰挹婁元魏謂之勿吉通鑑蓋因魏收魏書書之鬱律所取者勿吉以西之地未能兼勿吉也徒河慕容令支段氏及宇文部高句麗亦非鬱律所能制伏雄於北方建武元年漢主聰寢疾徵大司馬曜為丞相石勒為大將軍皆録尚書事受遺詔輔政曜勒固辭乃以曜為丞相領雍州牧雍於用翻勒為大將軍領幽冀二州牧勒辭不受以上洛王景為太宰濟南王驥為大司馬濟子禮翻昌國公顗為太師顗魚豈翻朱紀為太傅呼延晏為太保並録尚書事范隆守尚書令儀同三司靳準為大司空領司隸校尉皆迭決尚書奏事癸亥聰卒甲子太子粲即位粲字士光樊氏號弘道皇后武氏號弘德皇后王氏號弘孝皇后立其妻靳氏為皇后子元公為太子太赦改元漢昌葬聰於宣光陵諡曰昭武皇帝廟號烈宗靳太后等皆年未盈二十粲多行無禮無復哀戚靳準陰有異志私謂粲曰如聞諸公欲行伊霍之事先誅太保及臣以大司馬統萬機陛下宜早圖之粲不從準懼復使二靳氏言之二靳氏聰后與粲后靳居欣翻復扶又翻收其太宰景大司馬驥驥母弟車騎大將軍吳王逞太師顗大司徒齊王勱皆殺之顗魚豈翻勱音邁朱紀范隆奔長安奔劉曜也粲治兵於上林謀討石勒蓋起上林苑於平陽治直之翻仍鎮長安靳準為大將軍録尚書事粲常遊宴後宮軍國之事一決於準準矯詔以從弟明為車騎將軍康為衛將軍從才用翻準將作亂謀於王延延弗從馳將告之將以準謀告粲劫延以歸準遂勒兵升光極殿使甲士執粲數而殺之數所具翻諡曰隱帝劉氏男女無少長皆斬東市少詩照翻長知兩翻發永光宣光二陵淵墓號永光陵焚其宗廟準自號大將軍漢天王稱制置百官謂安定胡嵩曰自古無胡人為天子者今以傳國璽付汝還如晉家洛陽之陷傳國璽遷于平陽如往也璽斯氏翻準怒殺之遣使告司州刺史李矩曰劉淵屠各小醜屠直於翻因晉之亂矯稱天命使二帝幽沒輒率衆扶侍梓宮請以上聞矩馳表于帝帝遣太常韓胤等奉迎梓宮漢尚書北宮純等招集晉人堡於東宮靳康攻滅之北宮純降漢見八十七卷懷帝永嘉五年延罵曰屠各逆奴何不速殺我以吾左目置西陽門觀相國之入也以劉曜將自西進兵也觀大將軍之入也以石勒將自東進兵也相國曜聞亂自長安赴之石勒帥精鋭五萬以討準據襄陵北原帥讀曰率襄陵縣漢屬河東郡晉屬平陽郡師古曰晉襄公之陵因以名縣據水經注襄陵在平陽東南準數挑戰數所角翻挑徒了翻勒堅壁以挫之冬十月曜至赤壁水經注河東皮氏縣西北有赤石川與太傅朱紀等共上尊號上時掌翻曜即皇帝位曜字永明淵之族子惟靳準一門不在赦例改元光初以朱紀領司徒呼延晏領司空太尉范隆以下悉復本位以石勒為大司馬大將軍加九錫增封十郡進爵為趙公勒進攻準於平陽巴及羌羯降者十餘萬落巴巴氐也魏武平漢中遷巴氐于關中其後種類滋蔓河東平陽皆有之羯居謁翻漢主曜使征北將軍劉雅鎮北將軍劉策屯汾陰汾陰縣漢屬河東郡晉省建武元年十一月乙卯日夜出高三丈高居奧翻建武元年詔以王敦為荊州牧加陶侃都督交州諸軍事敦固辭州牧乃聽為刺史建武元年庚申詔㣥公卿士各陳得失御史中丞熊遠上疏以為胡賊猾夏孔安國曰猾亂也夏華夏夏戶雅翻而不能遣軍進討一失也㣥官不以讎賊未報為恥務在調戲酒食而已二失也諧謔以相調戲不料實德惟在白望不求才幹惟事請託當官者以治事為俗吏治直之翻奉法為苛刻盡禮為諂諛從容為高妙從千容翻放蕩為達士驕蹇為簡雅三失也世之所惡者陸沈泥滓惡烏路翻司馬彪曰陸沈謂無水而沈之沈持林翻時之所善者翺翔雲霄是以萬機未整風俗僞薄朝廷㣥司以從順為善相違見貶安得朝有辨爭之臣士無祿仕之志乎朝直遙翻古之取士敷奏以言舜典曰敷奏以言孔安國注曰敷陳奏進也各使陳進治體之言甚違古義此即謂秀孝不試而署吏用法不及權貴是以才不濟務姦無所懲若此道不改求以救亂難矣先是帝以離亂之際欲慰悅人心州郡秀孝至者不試普皆署吏秀孝謂州郡所舉秀才及孝廉先悉薦翻宜漸循舊制試以經策晉初秀孝以經策中第者若華談之類是也頵於倫翻又居筠翻仍詔不中科者刺史太守免官欲罪舉主也中竹仲翻其有到者亦皆託疾比三年無就試者比毗寐翻帝欲特除孝廉已到者官尚書郎孔坦奏議以為近郡懼纍君父皆不敢行纍力瑞翻君父謂刺史太守遠郡冀於不試冒昧來赴今若偏加除署是為謹身奉法者失分僥幸投射者得官分扶問翻投射謂投機而射利也頽風傷教恐從此始不若一切罷歸而為之延期為于僞翻延遠也使得就學則法均而令信矣帝從之聽孝廉申至七年乃試申寬展也愈之從子也從才用翻建武元年靳準使侍中卜泰送乘輿服御請和於石勒乘繩證翻勒囚泰送於漢主曜曜謂泰曰先帝末年實亂大倫先帝謂粲也亂倫謂蒸其諸母使朕及此其功大矣若早迎大駕者當悉以政事相委況免死乎卿為朕入城具宣此意為于僞翻泰還平陽準自以殺曜母兄沈吟未從曜母胡氏為準所殺兄則史失其名沈吟冘豫不決之意沈持林翻左右車騎將軍喬泰王騰衛將軍靳康等相與殺準推尚書令靳明為主遣卜泰奉傳國六璽降漢降戶江翻石勒大怒進軍攻明明出戰大敗乃嬰城固守建武元年丁丑封皇子煥為琅邪王煥鄭夫人之子生二年矣帝愛之以其疾篤故王之己卯薨帝以成人之禮葬之備吉凶儀服營起園陵功費甚廣琅邪國右常侍會稽孫霄晉志王國置左右常侍各一人古者凶荒殺禮殺所戒翻降也減也況今海內喪亂喪息浪翻憲章舊制猶宜節省而禮典所無顧崇飾如是乎葬無服之殤以成人之禮古典所無也營無益之事罷讀曰疲殫已困之財修無用之費此臣之所不安也帝不從建武元年彭城內史周撫殺沛國內史周默以其衆降石勒詔下邳內史劉遐領彭城內史與徐州刺史蔡豹泰山太守徐龕共討之豹質之玄孫也蔡質漢人蔡雍之叔父龕口含翻建武元年石虎帥幽冀之兵會石勒攻平陽靳明屢敗遣使求救於漢漢主曜使劉雅劉策迎之明帥平陽士女萬五千人奔漢帥讀曰率曜西屯粟邑粟邑縣屬馮翊郡無少長皆斬之少詩照翻長知兩翻曜迎其母胡氏之喪於平陽葬于粟邑號曰陽陵諡曰宣明皇太后石勒焚平陽宮室使裴憲石會修永光宣光二陵收漢主粲已下百餘口葬之置戍而歸建武元年成梁州刺史李鳳數有功數所角翻成主雄兄子稚在晉壽疾之晉壽縣屬梓潼郡何承天曰晉惠帝立晉壽縣沈約曰按晉起居注武帝太康元年改梓潼之漢壽曰晉壽漢壽之名疑是蜀立云惠帝立非也雄自至涪使太傅驤討鳳斬之以李壽為前將軍督巴西軍事涪音浮何茲全標點王崇武聶崇岐覆校
