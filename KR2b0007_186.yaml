body:
  text: 資治通鑑卷第一百八十六端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀二高祖神堯大聖光孝皇帝上之中武德元年武德元年戊寅六一八武德元年八月薛舉遣其子仁果進圍寧州西魏置寧州於定安置豳州於新平隋志並定安新平二縣皆屬北地郡大業初廢新平之豳州改定安之寧州為豳州唐初析北地之新平三水置豳州而以北地郡為寧州治定安郝瑗言於舉曰郝呼各翻瑗于眷翻今唐兵新破關中騷動宜乘勝直取長安舉然之會有疾而止辛巳舉卒卒子恤翻太子仁果立居於折墌城新志涇州保定縣有折墌故城折杜佑作析音思歷翻墌章恕翻武德元年上欲與李軌共圖秦隴薛舉父子時據秦隴復武威郡為涼州宋白曰涼州之地本月氏居之後為胸奴右地漢武帝置涼州兼統河隴之地而河西之地列置武威酒泉敦煌張掖四郡東都之季河西諸郡以去州隔遠自求立州為立雍州晉惠帝末張軌為涼州刺史治姑臧為會府後分置諸州而武威始專涼州之名使疏吏翻下同與之書謂之從弟從才用翻軌大喜遣其弟懋入貢上以懋為大將軍命鴻臚少卿張俟德册拜軌為涼州總管封涼王臚陵如翻少始照翻武德元年初朝廷以安陽令呂珉為相州刺史更以相州刺史王德仁為巖州刺史是年五月王德仁來降先受朝命德仁未能有相州也六月呂珉以相州來降故正授之新志以林慮縣置巖州正德仁所據地朝廷直遙翻相息亮翻甲申誘山東大使宇文明達入林慮山而殺之誘音酉慮音廬叛歸王世充武德元年己丑以秦王世民為元帥帥所類翻擊薛仁果武德元年丁酉臨洮等四郡來降後周武帝逐吐谷渾以置洮陽郡尋置洮州大業初改州為臨洮郡洮土刀翻武德元年隋江都太守陳稜求得煬帝之柩取宇文化及所留輦輅鼓吹粗備天子儀衛守式又翻柩音舊吹昌瑞翻粗坐五翻改葬於江都宮西吳公臺下今揚州城西北有雷塘塘西有吳公臺相傳以為陳吳明徹攻廣陵所築弩臺以射城中皆列瘞於帝塋之側瘞於計翻塋音營武德元年宇文化及之發江都也是年四月化及發江都義寧元年春伏威據歷陽仍上表於隋皇泰主拜伏威為東道大總管封楚王沈法興亦上表於皇泰主自稱大司馬録尚書事天門公上時掌翻承制置百官以陳杲仁為司徒新書作陳果仁蔣元超為左僕射殷芊為左丞徐令言為右丞劉子翼為選部侍郎李百藥為府掾百藥德林之子也李德林歷事齊周隋選宣絹翻掾于絹翻武德元年九月隋襄國通守陳君賓來降拜邢州刺史復以襄國郡為邢州宋白曰邢州禹貢衡漳之地春秋邢侯之國邢遷于夷儀即其地秦兼天下於此置信都郡項羽改曰襄國蓋以趙襄子諡名之也石氏置襄國郡隋置邢州取古邢國為名守式又翻降戶江翻伯山之子也伯山陳文帝之子武德元年虞州刺史韋義節義寧元年以安邑虞鄉夏三縣置安邑郡武德元年曰虞州久不下軍數不利數所角翻壬子以工部尚書獨孤懷恩代之武德元年初李密既殺翟讓見一百八十四卷義寧元年十一月翟萇伯翻不恤士衆倉粟雖多無府庫錢帛戰士有功無以為賞又厚撫初附之人衆心頗怨徐世績嘗因宴會刺譏其短密不懌使世績出鎮黎陽雖名委任實亦疏之此敘密致敗之由非一時之事密開洛口倉散米無防守典當者當主當也當丁浪翻取之者隨意多少或離倉之後離力智翻力不能致委棄衢路自倉城至郭門郭郛郭也厚戶豆翻為車馬所轥踐轥良刃翻踐慈演翻㣥盜來就食者並家屬近百萬口近其靳翻無甕盎織荊筐淘米洛水兩岸十里之間望之皆如白沙密喜謂賈閏甫曰此可謂足食矣閏甫對曰國以民為本民以食為天今民所以襁負如流而至者以所天在此故也襁居兩翻而有司曾無愛吝屑越如此吝惜也屑越猶言狼籍而棄之也荀子曰貨財粟米者彼將日月棲遲薛越之中野我今將畜積並聚之於倉廩明公孰與成大業哉密謝之即以閏甫判司倉參軍事密以東都兵數敗微弱而將相自相屠滅謂旦夕可平王世充既專大權厚賞將士繕治器械亦陰圖取密時隋軍乏食而密軍少衣數所角翻將即亮翻治直之翻少詩沼翻世充請交易密難之長史邴元真等各求私利邴即古丙姓長知兩翻先是東都人歸密者日以百數先悉薦翻既得食降者益少密悔而止密破宇文化及還還從宣翻其徑卒良馬多死士卒疲病世充欲乘其弊擊之恐人心不一乃詐稱左軍衛士張永通三夢周公令宣意於世充當勒兵相助擊賊乃為周公立廟周公作洛世充假之以作士氣令力丁翻下同為于偽翻輒先祈禱世充令巫宣言周公欲令僕射急討李密當有大功不即兵皆疫死不讀曰否世充兵多楚人信妖言皆請戰妖於驕翻世充簡練精鋭得二萬餘人馬二千餘匹壬子出師擊密旗幡之上皆書永通字軍容甚盛以張永通宣周公之意故旗幡書永通字以表神助癸丑至偃師營於通濟渠南作三橋於渠上通濟渠大業元年所開自引精兵出偃師阻邙山以待之密召諸將會議將即亮翻裴仁基曰世充悉衆而至洛下必虛可分兵守其要路令不得東簡精兵三萬傍河西出以逼東都傍步浪翻世充還還從宣翻我且按甲世充再出我又逼之如此則我有餘力彼勞奔命破之必矣密曰公言大善今東都兵有三不可當兵仗精鋭一也決計深入二也食盡求戰三也我但乘城固守蓄力以待之彼欲鬬不得求走無路不過十日世充之頭可致麾下陳智略樊文超單雄信皆曰計世充戰卒甚少屢經摧破悉已喪膽少詩沼翻喪息浪翻兵法曰倍則戰況不啻倍哉且江淮新附之士望因此機展其勳效及其鋒而用之可以得志於是諸將喧然欲戰者什七八密惑於衆議而從之將即亮翻仁基苦爭不能得擊地歎曰公後必悔之魏徵言於長史鄭頲曰魏公雖驟勝而驍將鋭卒多死長知兩翻頲他鼎翻驍堅堯翻將即亮翻下同戰士心怠此二者難以應敵且世充乏食志在死戰難與爭鋒未若深溝高壘以拒之不過旬月世充糧盡必自退追而擊之蔑不勝矣頲曰此老生之常談耳徵曰此乃奇策何謂常談拂衣而起程知節將內馬軍與密同營在北邙山上單雄信將外馬軍營於偃師城北單慈淺翻世充遣數百騎渡通濟渠攻雄信營密遣裴行儼與知節助之行儼先馳赴敵中流矢墜於地騎奇寄翻下同中竹仲翻知節救之殺數人世充軍披靡披普彼翻乃抱行儼重騎而還重直龍翻二人共騎一馬曰重騎還從宣翻又如字為世充騎所逐刺槊洞過知節回身捩折其槊刺七亦翻槊色角翻捩練結翻拗捩也折而設翻兼斬追者與行儼俱免會日暮各斂兵還營密驍將孫長樂等十餘人皆被重創驍堅堯翻樂音洛被皮義翻創初良翻密新破宇文化及有輕世充之心不設壁壘世充夜遣二百餘騎潛入北山北山即北邙山命軍士皆秣馬蓐食甲寅旦將戰世充誓衆曰今日之戰非直爭勝負死生之分在此一舉若其捷也富貴固所不論若其不捷必無一人獲免所爭者死非獨為國為于偽翻各宜勉之遲明遲直二翻引兵薄密密出兵應之未及成列世充縱兵擊之世充士卒皆江淮剽勇剽匹妙翻出入如飛世充先索得一人貌類密者縛而匿之索山客翻戰方酣使牽以過陳前陳讀曰陳譟曰已獲李密矣考異曰革命記曰世充先於衆中覓得一人眉目狀似李密者陰畜之而不令出師至偃師城下與李密未大相接遽令數十騎馳將所畜人頭來云殺得李密充佯不信遣衆共看咸言是密頭也遂於城下勒兵擲頭與城中人城中人亦言是密頭也遂以城降今從壺關録其伏兵發乘高而下馳壓密營縱火焚其廬舍密衆大潰其將張童仁陳智略皆降壓於甲翻將即亮翻降戶江翻下同密與萬餘人馳向洛口世充夜圍偃師鄭頲守偃師其部下翻城納世充初世充家屬在江都隨宇文化及至滑臺又隨王軌入李密密留於偃師欲以招世充及偃師破世充得其兄世偉子玄應虔玄恕瓊等又獲密將佐裴仁基鄭頲祖君彥等數十人世充於是整兵向洛口得邴元真妻子鄭虔象母及密諸將子弟皆撫慰之令潛呼其父兄令力丁翻初邴元真為縣吏坐贓亡命從翟讓於瓦岡翟萇伯翻讓以其嘗為吏使掌書記及密開幕府妙選時英讓薦元真為長史密不得已用之此義寧元年春二月事長知兩翻未嘗參預密西拒世充留元真守洛口倉元真性貪鄙宇文溫謂密曰不殺元真必為公患密不應元真知之陰謀叛密楊慶聞之以告密密固疑焉至是密將入洛口城元真已遣人潛引世充矣密知而不發因與衆謀待世充兵半濟洛水然後擊之世充軍至密候騎不時覺比將出戰比必寐翻世充軍悉已濟矣單雄信等又勒兵自據密自度不能支度徒洛翻帥麾下輕騎奔虎牢元真遂以城降降戶江翻初雄信驍捷善用馬槊名冠諸軍帥讀曰率下同冠古玩翻軍中號曰飛將將即亮翻彥藻以雄信輕於去就勸密除之彥藻房彥藻也是年二月彥藻死此亦敘日前事不忍也及密失利雄信遂以所部降世充史敘邴元真單雄信事皆言李密當斷不斷反受其亂密將如黎陽或曰殺翟讓之際徐世績幾死事見一百八十四卷義寧元年十一月幾居希翻安可保乎時王伯當棄金墉保河陽密自虎牢歸之引諸將共議密欲南阻河北守太行東連黎陽以圖進取將即亮翻行戶剛翻諸將皆曰今兵新失利衆心危懼若更停留恐叛亡不日而盡又人情不願難以成功密曰孤所恃者衆也衆既不願孤道窮矣欲自刎以謝衆刎扶粉翻伯當抱密號絶號戶刀翻衆皆悲泣密復曰復扶又翻諸君幸不相棄當共歸關中密身雖無功諸君必保富貴府掾柳燮曰明公與唐公同族兼有疇昔之好謂自唐公起與之連和也掾于絹翻好呼到翻然阻東都斷隋歸路斷丁管翻使唐公不戰而據長安此亦公之功也衆咸曰然密又謂王伯當曰將軍室家重大豈復與孤俱行哉伯當曰昔蕭何盡帥子弟以從漢王漢王與項羽相距蕭何悉遣子弟詣軍天下既定論功行封上曰何舉宗數十人隨我復扶又翻下同從才用翻豈以公今日失利遂輕去就乎縱身分原野亦所甘心左右莫不感激從密入關者凡二張二作三萬人於是密之將帥州縣多降於隋朱粲亦遣使降隋將即亮翻帥所類翻降戶江翻使疏吏翻皇泰主以粲為楚王武德元年甲寅秦州總管竇軌擊薛仁果不利驃騎將軍劉感鎮涇州宋白曰魏黃初中分隴右為秦州因秦初封也與州同理冀城冀城改為隴城縣時復以隴西郡為秦州安定郡為涇州驃匹妙翻騎奇寄翻城中糧盡感殺所乘馬以分將士感一無所噉唯煮馬骨取汁和木屑食之城垂陷者數矣數所角翻會長平王叔良將士至涇州士當作兵引兵南去乙卯又遣高墌人偽以城降墌章恕翻考異曰實録云乙卯宇文欣攻高墌城下之今從劉感傳叔良遣感帥衆赴之帥讀曰率下同己未至城下扣章十二行本扣下有門字乙十一行本同孔本同張校同退齋校同云城字屬下句城中人曰賊已去可踰城入感命燒其門城上下水灌之感知其詐遣步兵先還自帥精兵為殿帥讀曰率殿丁練翻俄而城上舉三烽仁果兵自南原大下戰於百里細川唐軍大敗感為仁果所擒仁果復圍涇州令感語城中云語牛倨翻援軍已敗不如早降降戶江翻感許之至城下大呼曰呼火故翻逆賊飢餒亡在旦夕秦王帥數十萬衆四面俱集城中勿憂勉之仁果怒執感於城旁埋之至膝馳騎射之至死帥讀曰率騎奇寄翻射而亦翻聲色逾厲叔良嬰城固守僅能自全感豐生之孫也劉豐生高齊將死於潁川武德元年庚申隴州刺史陝人常達隋志扶風汧源縣西魏之東秦州也後改為隴州大業三年廢州併入扶風郡義寧二年析扶風郡之汧源汧陽南由安定郡之華亭置隴東郡唐受禪改為隴州陝失冉翻宜祿川在豳涇二州間貞觀二年析豳之新平及涇之保定靈臺置宜祿縣武德元年上遣從子襄武公琛從才用翻琛丑林翻太常卿鄭元璹璹殊玉翻以女妓遺始畢可汗妓渠綺翻遺于季翻可從刊入聲汗音寒壬戌始章十二行本始上有突厥二字乙十一行本同孔本同張校同退齋校同畢復遣骨咄祿特勒來上受禪之後骨咄祿嘗來使復扶又翻咄當沒翻武德元年癸亥白馬道士傅仁均白馬縣帶滑州戊寅唐受禪建國歲在戊寅故以名曆行之上時掌翻武德元年薛仁果屢攻常達不能克乃遣其將仵士政以數百人詐降仵姓也姓苑仵姓望出襄陽急就章有仵終古將即亮翻仵音疑古翻降戶江翻下同乙丑士政伺隙以其徒劫達擁城中二千人降於仁果伺相吏翻考異曰新舊唐書皆云薛舉遣仵士政偽降達士政劫達以見舉據實録薛舉前已死此月達再擊仁果及士政劫達皆有日月今從實録達見仁果詞色不屈仁果壯而釋之奴賊帥張貴謂達曰汝識我乎帥所類翻達曰汝逃死奴賊耳貴怒欲殺之人救之得免武德元年辛未追諡隋太上皇為煬帝諡神至翻武德元年宇文化及至魏縣張愷等謀去之事覺化及殺之腹心稍盡兵勢日蹙兄弟更無他計但相聚酣宴奏女樂化及醉尤智及曰酣戶甘翻尤責過也我初不知由汝為計強來立我智及創謀弒逆故尤之強其兩翻士馬日散負弒君之名天下所不容今者滅族豈不由汝乎持其兩子而泣智及怒曰事捷之日初不賜尤及其將敗乃欲歸罪何不殺我以降竇建德數相鬬鬩降戶江翻數所角翻鬩許激翻恨也戾也言無長幼醒而復飲以此為恆恆常也長知兩翻復扶又翻恆戶登翻化及自知必敗嘆曰人生固當死豈不一日為帝乎於是鴆殺秦王浩即皇帝位於魏縣國號許宇文化及襲封許公因以為國號署置百官武德元年冬十月壬申朔日有食之武德元年戊寅宴突厥骨咄祿引骨咄祿升御坐以寵之史言突厥驕倨唐祖欲以結其心適以滋其慢厥九勿翻咄當沒翻坐徂臥翻武德元年李密將至上遣使迎勞相望於道使疏吏翻下同勞力到翻密大喜謂其徒曰我擁衆百萬一朝解甲歸唐山東連城數百知我在此遣使招之亦當盡至比於竇融功亦不細竇融以河西歸漢光武李密自謂過之處昌呂翻己卯至長安有司供待稍薄所部兵纍日不得食衆心頗怨既而以密為光祿卿上柱國賜爵邢國公密既不滿望朝臣又多輕之朝直遙翻執政者或來求賄意甚不平為李密復叛去張本常呼為弟以舅子獨孤氏妻之妻七細翻武德元年庚辰詔右翊衛大將軍淮安王神通為山東道安撫大使山東諸軍並受節度以黃門侍郎崔民幹為副崔民幹山東望族故使副神通以招撫諸郡縣使疏吏翻武德元年鄧州刺史呂子臧與撫慰使馬元規擊朱粲破之子臧言於元規曰粲新敗上下危懼請人併力擊之一舉可滅若復遷延復扶又翻下同其徒稍集力強食盡致死於我為患方深元規不從子臧請獨以所部兵擊之元規不許既而粲收集餘衆兵復大振自稱楚帝於冠軍復扶又翻又音如字冠古玩翻改元昌達進攻鄧州子臧撫膺膺胸也老夫今坐公死矣粲圍南陽南陽即鄧州所親勸子臧降子臧曰安有天子方伯降賊者乎帥麾下赴敵而死降戶江翻帥讀曰率俄而城陷元規亦死是年二月遣馬元規今死武德元年癸未王世充收李密美人珍寶及將卒十餘萬人還東都陳於闕下將即亮翻乙酉皇泰主大赦丙戌以世充為太尉尚書令內外諸軍事內外諸軍事之上當有總督二字章十二行本正有總督二字乙十一行本同孔本同張校同退齋校同備置官屬妙選人物史言王世充篡形已成深禮之驍堅堯翻徐文遠復入東都見世充必先拜或問曰君倨見李密見上七月何也文遠曰魏公君子也能容賢士王公小人也能殺故人吾何敢不拜武德元年李密總管李育德以武陟來降隋志河內郡修武縣開皇十六年析置武陟郡劉昫曰武陟漢懷縣地故城在今縣西降戶江翻下同考異曰舊唐書高季輔傳云與李厚德來降按以武陟來降者乃育德非厚德也新舊志皆云武德二年李厚德以修武縣東北濁鹿城歸順因置陟州通鑑二年書厚德逐王世充殷州刺史以獲嘉來降以厚德刺殷州二志皆云四年置殷州差殊如此當考諤之孫也李諤見一百七十六卷陳長城公至德三年或以城邑或帥衆相繼來降將即亮翻帥讀曰率初北海賊帥綦公順大業初以青州為北海郡綦姓也帥所類翻綦音其已克其外郭進攻子城城中食盡公順自謂克在旦夕不為備明經劉蘭成糾合城中驍健百餘人襲擊之劉蘭成蓋嘗應明經科因稱之新唐志曰唐制取士之科多因隋舊則明經科起於隋也帥讀曰率驍堅堯翻下同見賢遍翻公順大敗棄營走郡城獲全於是郡官及望族分城中民為六軍各將之蘭成亦將一軍將即亮翻有宋書佐者離間諸軍曰煬帝改郡諸曹參軍為書佐間古莧翻蘭成得衆心必為諸人不利不如殺之衆不忍殺但奪其兵以授宋書佐蘭成恐終及禍亡奔公順公順軍中喜譟欲奉以為主固辭乃以為長史軍事咸聽焉居五十餘日蘭成簡軍中驍健者百五十人往抄北海抄楚交翻下同距城四十里留十人使多芟草分為百餘積芟所銜翻二十里又留二十人各執大旗五六里又留三十人伏險要蘭成自將十人夜距城一里許潛伏餘八十人分置便處約聞鼓聲即抄取人畜亟去抄楚交翻亟紀力翻仍一時焚積草明晨城中遠望無煙塵皆出樵牧日向中蘭成以十人直抵城門城上鉦鼓亂發伏兵四出抄掠雜畜十章十二行本十作千乙十一行本同孔本同餘頭及樵牧者而去畜許又翻蘭成度抄者已遠徐步而還度徒洛翻還音旋又如字城中雖出兵恐有伏兵不敢急追又見前有旌旗煙火遂不敢進而還既而城中知蘭成前者衆少悔不窮追少詩沼翻下同居月餘蘭成謀取郡城更以二十人直抵城門城中人競出逐之行未十里公順將大兵總至將即亮翻下自將主將同郡兵奔馳還城公順進兵圍之蘭成一言招諭城中人爭出降降戶江翻蘭成撫存老幼禮遇郡官見宋書佐亦禮之如舊仍資送出境內外安堵時海陵賊帥臧君相隋志海陵縣屬江都郡帥所類翻相息亮翻帥其衆五萬來爭之帥讀曰率公順衆少聞之大懼蘭成為公順畫策曰為于偽翻君相今去此尚遠必不為備請將軍倍道襲擊其營公順從之自將驍勇五千人齎熟食倍道襲之驍堅堯翻將至蘭成與敢死士二十人前行距君相營五十里見其抄者負擔向營擔丁濫翻蘭成亦與其徒負擔蔬米燒器擔亦負也都甘翻燒器鍋釜之屬詐為抄者擇空而行聽察得其號號戶告翻軍號也及主將姓名至暮與賊比肩而入負擔巡營知其虛實得其更號更號持更之號更工衡翻至三鼓忽於主將幕前交刀亂下殺百餘人賊衆驚擾公順兵亦至急攻之君相僅以身免考異曰舊書作劉蘭云頗涉經史善言成敗然性多凶狡見隋末將亂交通不逞于時北海完富蘭利其子女玉帛與㣥盜相應破其鄉城邑武德中淮安王神通為山東道安撫大使蘭率宗黨歸之革命記序其事頗詳今從之收其資糧甲仗以還還從宣翻由是公順黨衆大盛及李密據洛口公順以衆附之密敗亦來降降戶江翻武德元年隋末㣥盜起冠軍司兵李襲譽按新書李襲譽傳仕隋為冠軍府司兵考之隋志冠軍輔國將軍從六品耳其府司兵當在流外小官也冠古玩翻守式又翻遣兵據永豐倉發粟以賑貧乏出庫物賞戰士移檄郡縣同心討賊世師不能用説輸芮翻乃求募兵山南世師許之上克長安自漢中召還為太府少卿隋避諱以漢中為漢川郡唐復曰漢中仍改郡曰梁州梁洋等州皆在長安南山之南少始照翻乙未附襲譽籍於宗正李襲譽之先亦出於隴西故附之屬籍以親之宗正寺掌天子族親屬籍以別昭穆襲志之弟也李襲志時事蕭銑武德元年丙申朱粲寇淅州舊志鄧州內鄉縣漢淅縣地後周改為中鄉隋改為內鄉武德二年置淅州又按隋志淅陽郡西魏置淅州治南鄉縣朱粲所寇蓋南鄉之淅州淅音析璹殊玉翻帥讀曰率騎奇寄翻武德元年是月納言竇抗罷為左武候大將軍武德元年十一月乙巳涼王李軌即皇帝位改元安樂樂音洛考異曰按軌傳云軌稱涼王即改元安樂今據實録武德元年戊申王軌以滑州來降李密既敗王軌來降降戶江翻下同武德元年薛仁果之為太子也去年秋七月薛舉稱帝仁果為太子及即位衆心猜懼郝瑗哭舉得疾遂不起由是國勢浸弱秦王世民至高墌仁果使宗羅喉將兵拒之羅喉數挑戰將即亮翻郝呼各翻瑗于眷翻墌章恕翻數所角翻挑徒了翻世民堅壁不出諸將咸請戰世民曰我軍新敗士氣沮喪謂是年七月淺水原之敗也沮在呂翻喪息浪翻有輕我心宜閉壘以待之彼驕我奮可一戰而克也乃令軍中曰敢言戰者斬相持六十餘日仁果糧盡其將梁胡郎等帥所部來降將即亮翻下同帥讀曰率下同世民知仁果將士離心命行軍總管梁實營於淺水原以誘之誘音酉羅喉大喜盡鋭攻之梁實守險不出營中無水人馬不飲者數日羅喉攻之甚急世民度賊已疲度徒洛翻謂諸將曰可以戰矣遲明遲直利翻使右武候大將軍龐玉陳於淺水原陳讀曰陳下同羅喉人併兵擊之玉戰幾不能支幾居依翻世民引大軍自原北出其不意羅喉引兵還戰世民帥驍騎數十先陷陳唐兵表裏奮擊呼聲動地帥讀曰率驍堅堯翻騎奇寄翻下同陳讀曰陳呼火故翻羅喉士卒大潰斬首數千級世民帥二千餘騎追之騎奇寄翻竇軌叩馬苦諫曰仁果猶據堅城雖破羅喉未可輕進請且按兵以觀之喉音侯世民曰吾慮之久矣破竹之勢不可失也杜預曰兵威已振譬如破竹數節之後迎刃而解世民竇氏之出呼軌為舅復扶又翻仁果陳於城下世民據涇水臨之仁果驍將渾幹等數人臨陳來降驍堅堯翻將即亮翻渾戶昆翻姓苑記其所出者多左傳鄭有大夫渾罕衛有渾良夫唐渾瑊祖渾邪王吐谷渾後為渾其音戶本翻以為出於渾沌氏者謬也注又見後降戶江翻仁果懼引兵入城拒守日向暮大軍繼至遂圍之夜半守城者爭自投下仁果計窮己酉出降得其精兵萬餘人男女五萬口諸將皆賀因問曰大王一戰而勝遽捨步兵又無攻具輕騎直造城下造七到翻衆皆以為不克而卒取之何也卒子恤翻世民曰羅喉所將皆隴外之人將驍卒悍將即亮翻又音如字領也悍戶罕翻又侯口干翻吾特出其不意而破之斬獲不多若緩之則皆入城仁果撫而用之未易克也易以豉翻急之則散歸隴外折墌虛弱仁果破膽不暇為謀此吾所以克也折當作析音思歷翻墌章恕翻世民所得降卒悉使仁果兄弟及宗羅喉翟長孫等將之翟萇伯翻長知兩翻與之射獵無所疑間間古莧翻賊畏威銜恩皆願效死世民聞褚亮名求訪獲之禮遇甚厚引為王府文學自隋時親王府有文學上遣使謂世民曰使疏吏翻薛舉父子多殺我士卒必盡誅其黨以謝冤魂李密諫曰薛舉虐殺無辜此其所以亡也陛下何怨焉懷服之民不可不撫乃命戮其謀首餘皆赦之上使李密迎秦王世民於豳州密自恃智略功名見上猶有傲色及見世民不覺驚服此豈獨相表服之哉威靈氣焰足以服之也真英主也不如是何以定禍亂乎詔以員外散騎常侍薑謨為秦州刺史曹魏末置員外散騎常侍散悉亶翻騎奇寄翻盜賊悉歸首首手又翻士民安之武德元年徐世績據李密舊境未有所屬魏徵隨密至長安章十二行本安下有久不為朝廷所知七字乙十一行本同孔本同張校同乃自請安集山東上以為祕書丞漢獻帝建安中魏武為魏王置祕書令及二丞遺徐世績書傳株戀翻遺于季翻勸之早降世績遂決計西向謂長史陽翟郭孝恪曰隋志陽翟縣屬襄城郡降戶江翻長知兩翻此民衆土地皆魏公有也李密建國稱魏公上時掌翻是利主之敗自為功以邀富貴也吾實恥之今宜籍郡縣戶口士馬之數以啓魏公使自獻之乃遣孝恪詣長安又運糧以餉淮安王神通神通時安撫山東無表止有啓與密甚怪之孝恪具言世績意上乃嘆曰徐世績不背德不邀功使疏吏翻背蒲妹翻真純臣也賜姓李時授世績黎州總管封英國公通鑑書於明年閏二月復以梁郡為宋州此時唐未能有宋州也所得州縣委之選補委之選補官吏也武德元年癸丑獨孤懷恩攻堯君素於蒲反漢志作蒲反後始作蒲坂為君素所擒梟首城外以示無降意梟堅堯翻降戶江翻武德元年癸亥秦王世民至長安斬薛仁果於市賜常達帛三百段賞其不屈也唐制凡賜十段其率絹三匹布三端綿四屯若雜綵十段則絲布二匹紬二匹綾二匹縵四匹諡忠壯以其死節也撲弼角翻擊也以張貴尤淫暴腰斬之上享勞將士因謂㣥臣曰諸公共相翊戴以成帝業若天下承平可共保富貴使王世充得志公等豈有種乎因薛仁果君臣以相戒勞力到翻種章勇翻豈可不以為前鑑也己巳以劉文靜為戶部尚書領陝東道行臺左僕射復殷開山爵位先是劉文靜殷開山皆以淺水原之敗除名武德元年李密驕貴日久又自負歸國之功朝廷待之不副本望事見上樂音洛嘗遇大朝會密為光祿卿當進食六典光祿卿之職掌邦國酒醴膳羞之事總太官珍羞良醞掌醢四署之官屬朝會燕饗則節其等差量其豐約以供焉故當進食朝直遙翻退以告左武衛大將軍王伯當伯當心亦怏怏怏於兩翻因謂密曰天下事在公度內耳今東海公在黎陽密封徐世績為東海公襄陽公未知為誰按密將張善相時為伊州刺史據襄城自襄城北出則羅口蓋李密封善相為襄城公伯當指言之也襄陽公疑當作襄城公屈指可計豈得久如此也密大喜乃獻策於上曰臣虛蒙榮寵安坐京師曾無報效山東之衆皆臣故時麾下請往收而撫之憑藉國威取王世充如拾地芥耳顏師古曰地芥謂草芥之橫在地上者俯而拾之言易而必得也亦欲遣密往收之㣥臣多諫曰李密狡猾好反將即亮翻好呼到翻今遣之如投魚於泉放虎於山必不反矣上曰帝王自有天命非小子所能取借使叛去如以蒿箭射蒿中耳蒿蓬蕭之屬叢生於地人皆賤其無用剡蒿為箭射之蒿中言其無用而不足惜也北齊源文宗曰國家視淮南同於蒿箭蓋蒿箭之言尚矣射而亦翻吾可以坐收其弊辛未遣密詣山東收其餘衆之未下者密請與賈閏甫偕行上許之命密及閏甫同升御榻賜食傳飲巵酒曰吾三人同飲是酒以明同心善建功名以副朕意丈夫一言許人千金不易有人確執不欲弟行上呼李密為弟非他人所能間也間古莧翻密閏甫再拜受命上又以王伯當為密副而遣之考異曰高祖實録未幾聞其下兵皆不附王世充令密收集餘衆以圖洛陽密言於高祖曰臣入朝日淺不願違離又在朝公卿未甚委信願得陛下腹心左右與臣同去高祖曰朕推赤心於人終無疑阻但有益國利人即當專決今從蒲山公傳武德元年有大鳥五集于樂壽樂音洛㣥鳥數萬從之經日乃去竇建德以為己瑞改元五鳳宗城人有得玄圭獻於建德者宋正本及景城丞會稽孔德紹皆曰此天所以賜大禹也隋志宗城縣屬清河郡舊曰廣宗仁壽元年改焉避煬帝諱也景城縣屬河間郡舊曰成平開皇十八年改隋改越州為會稽郡禹平水土錫玄圭告厥成功蓋堯錫之也宋正本等引為天瑞以諂建德過矣隋縣置令丞會古外翻竇建德初稱長樂王夏戶雅翻以正本為納言德紹為內史侍郎初王須拔掠幽州中流矢死中竹仲翻考異曰革命記云須拔衆散奔突厥突厥以為南面可汗今從唐書其將魏刀兒代領其衆據深澤掠冀定之間隋志深澤縣屬博陵郡劉昫曰治滹沱河北宋白曰以界內水澤深廣名縣時復信都郡為冀州博陵郡為定州將即亮翻自稱魏帝建德偽與連和刀兒弛備建德襲擊破之遂圍深澤其徒執刀兒降建德斬之盡並其衆降戶江翻易定等州皆降唯冀州刺史麴稜不下麴稜時附於唐暹之孫也崔暹事齊高氏父子以不畏強禦稱可使攻者自敗稜信之履行命守城者皆坐毋得妄鬬曰賊雖登城汝曹勿怖怖普布翻吾將使賊自縛於是為壇夜設章醮然後自衣衰絰衣於既翻衰倉回翻絰徒結翻杖竹登北樓慟哭又令婦女升屋四面振裙建德攻之急稜將戰履行固止之俄而城陷履行哭猶未已自古以來信妖人之言以喪師亡城者多矣然後世之人猶有信而不悟者若高駢李守貞之徒是也卿忠臣也厚禮之以為內史令武德元年十二月壬申詔以秦王世民為太尉使持節陝東道大行臺使疏吏翻其蒲州河北諸府兵馬並受節度復以河東郡為蒲州河北謂大河以北黎相之地諸府諸總管府武德元年癸酉西突厥曷娑那可汗厥九勿翻娑蘇何翻可從刊入聲汗音寒降戶江翻自宇文化及所來降隋煬帝以曷娑那自從煬帝弒從化及武德元年隋將堯君素守河東將即亮翻上遣呂紹宗韋義節獨孤懷恩相繼攻之俱不下義寧元年九月屈突通留堯君素守河東呂紹宗攻之不克以韋義節代之又不克武德元年九月以獨孤懷恩代之仍不下君素為木鵝置表於頸具論事勢浮之於河河陽守者得之達於東都皇泰主見而歎息拜君素金紫光祿大夫龐玉皇甫無逸自東都來降上悉遣詣城下為陳利害為于偽翻君素不從考異曰高祖實録令宇文士及為陳利害按宇文化及為竇建德所擒士及乃自歸於唐實録誤也今從隋書許以不死其妻又至城下謂之曰隋室已亡君何自苦君素曰天下名義非婦人所知引弓射之應弦而倒射而亦翻考異曰實録云妻號慟而去今從隋書君素亦自知不濟然志在守死每言及國家未嘗不歔欷歔音虛欷音希又許既翻謂將士曰吾昔事主上於藩邸隋書堯君素傳煬帝為晉王君素以左右從必若隋祚永終天命有屬屬之欲翻自當斷頭以付諸君聽君等持取富貴斷丁管翻今城池甚固倉儲豐備大事猶未可知不可橫生心也橫戶孟翻君素性嚴明善御衆下莫敢叛久之倉粟盡人相食又獲外人微知江都傾覆丙子君素左右薛宗李楚客殺君素以降傳首長安降戶江翻下同君素遣朝散大夫解人王行本將精兵七百在他所解漢古縣也後魏曰安定西魏改曰南解又改曰綏化又曰虞鄉武德元年更名解縣別置虞鄉縣並屬蒲州朝直遙翻散悉亶翻解戶買翻將即亮翻赴救不及因捕殺君素者黨與數百人悉誅之復乘城拒守復扶又翻又音如字獨孤懷恩引兵圍之武德元年丁酉章十二行本酉作丑乙十一行本同孔本同張校同隋襄平太守鄧皓以柳城北平二郡來降以皓為營州總管隋置襄平柳城郡皆在遼西郡柳城縣界北平郡即平州盧龍之地時復以遼西郡為營州守式又翻皓工老翻武德元年辛巳太常卿鄭元璹擊朱粲於商州破之復以上洛郡為商州璹殊玉翻武德元年初宇文化及遣使招羅藝藝曰我隋臣也斬其使者為煬帝發喪臨三日使疏吏翻為于偽翻臨力鴆翻竇建德高開道各遣使招之藝曰建德開道皆劇賊耳吾聞唐公已定關中人望歸之此真吾主也吾將從之敢沮議者斬沮在呂翻會張道源慰撫山東藝遂奉表與漁陽上谷等諸郡皆來降癸未詔以藝為幽州總管隋大業初置漁陽郡於無終唐復以涿郡為幽州考異曰創業注藝以武德元年二月降舊云三年新書云二年皆誤也今從實録世雄之子也薛世雄死見一百八十四卷義寧元年詔以萬均為上柱國永安郡公萬徹為車騎將軍武安縣公唐制上柱國郡公皆正二品縣公從二品車騎將軍則諸衛郎將之職也正五品騎奇寄翻下同竇建德既克冀州兵威益盛帥衆十萬寇幽州帥讀曰率下同藝將逆戰萬均曰彼衆我寡出戰必敗不若使羸兵背城阻水為陳羸倫為翻背蒲妹翻陳讀曰陳彼必渡水擊我萬均請以精騎百人伏於城旁俟其半渡擊之蔑不勝矣藝從之建德果引兵渡水萬均邀擊大破之建德竟不能至其城下乃分兵掠霍堡及雍奴等縣霍堡蓋世亂霍氏宗黨築堡以自固因以為名雍奴漢古縣唐志屬幽州天寶改為武清縣敗之復扶又翻敗補邁翻凡相拒百餘日建德不能克乃還樂壽樂音洛藝得隋通直謁者溫彥博以為司馬隋煬帝置謁者臺有司朝謁者通事謁者通直謁者將事謁者彥博贊成之詔以彥博為幽州總管府長史未幾徵為中書侍郎長知兩翻幾居豈翻兄大雅時為黃門侍郎與彥博對居近密黃門侍郎居門下省謂之東省中書侍郎居中書省謂之西省故曰對居近密武德元年以西突厥曷娑那可汗為歸義王厥九勿翻娑素那翻可從刊入聲汗音寒曷娑那獻大珠上曰珠誠至寶然朕寶王赤心珠無所用竟還之武德元年乙酉車駕幸周氏陂過故墅章十二行本墅下有丁亥還宮四字乙十一行本同孔本同張校同退齋校同水經注白渠尾入櫟陽而東南注于渭故渠徑漢丞相周勃冢南冢北有弱亞夫冢故渠東南有周氏曲渠又南徑漢景帝陵南又東南注于渭周氏曲即周氏陂也在高陵縣界故墅在高陵縣西十里店上舊所居也武德六年名龍躍宮武德元年初羌豪旁企地以所部附薛舉旁步光翻羌姓也及薛仁果敗企地來降留長安企地不樂企去智翻樂音洛帥其衆數千叛入南山出漢川帥讀曰率此自長安南山諸谷出漢川漢川即漢中所過殺掠武候大將軍龐玉擊之為企地所敗敗補邁翻企地據張校補行至始州普安漢梓潼縣廣漢郡治焉宋置南安郡梁置南梁州後改安州西魏改為始州大業初改為普安郡唐復為始州先天二年改為劍州與俱醉臥野外王氏拔其佩刀斬首送梁州唐改漢川郡為梁州詔賜王氏號為崇義夫人武德元年壬辰王世充帥衆三萬圍穀州新安縣後周置中州及東垣縣州尋廢開皇十六年置穀州仁壽四年州廢又廢新安入東垣大業初改名新安縣屬河南郡義寧二年破段達置新安郡武德元年改穀州取穀水為名帥讀曰率王褱任音壬王褱古回翻武德元年上使李密分其麾下之半留華州周宣王封其弟友於鄭自漢以來為鄭縣後魏置東雍州及華山郡西魏改曰華州開皇初州廢大業初郡廢為鄭縣屬京兆郡義寧元年析京兆之鄭華陰置華陰郡尋改華州華戶化翻將即亮翻長史張寶德預在行中恐密亡去罪相及上封事言其必叛長知兩翻上時掌翻上意乃中變又恐密驚駭乃降敕書勞來勞力到翻來力代翻令密留所部徐行單騎入朝更受節度騎奇寄翻朝直遙翻密至稠桑得敕謂賈閏甫曰敕遣我去無故復召我還稠直留翻復扶又翻天子嚮云有人確執不許此譖行矣吾今若還無復生理不若破桃林縣開皇十六年分閿鄉陝置桃林縣取古桃林之塞以名縣也在陝西四十五里北走渡河比信達熊州宜陽縣後魏置宜陽郡東魏置陽州後周改曰熊州開皇初郡廢大業初州廢屬河南郡義寧二年破段達置宜陽郡武德元年置熊州取熊耳山以名州杜佑曰熊州今福昌縣比必寐翻苟得至黎陽大事必成言欲就徐世績也閏甫曰主上待明公甚厚況國家姓名著在圖讖讖楚譖翻天下終當一統明公既已委質質職日翻復生異圖復扶又翻下同任王褱史萬寶據熊穀二州任音壬王褱古回翻此事朝舉彼兵夕至雖克桃林兵豈暇集一稱叛逆誰復容人為明公計不若且應朝命朝直遙翻以明元無異心自然浸潤不行論語曰浸潤之譖不行焉閏甫引此徐思其便可也密怒曰唐使吾與絳灌同列何以堪之言不得如韓彭割地而王使與周勃灌嬰同列彼我所共今不殺我聽使東行足明王者不死縱使唐遂定關中山東終為我有天與不取乃欲束手投人公吾之心腹何意如是若不同心當斬而後行閏甫泣曰明公雖云應讖近察天人稍已相違今海內分崩人思自亶強者為雄明公奔亡甫爾誰相聽受且自翟讓受戮之後翟萇伯翻人皆謂明公棄恩忘本今日誰肯復以所有之兵束手委公乎彼必慮公見奪逆相拒抗一朝失勢豈有容足之地哉自非荷恩殊厚者詎肯深言不諱乎荷下可翻願明公熟思之但恐大福不再楚靈王之言閏甫亦何辭就戮密大怒揮刃欲擊之王伯當等固請乃釋之閏甫奔熊州伯當亦止密以為未可密不從伯當乃曰義士之志不以存亡易心公必不聽伯當與公同死耳然恐終無益也密因執使者斬之庚子旦密紿桃林縣官曰奉詔暫還京師使疏吏翻紿徒亥翻暫與暫同家人請寄縣舍乃簡驍勇數十人著婦人衣戴羃㒿驍堅堯翻著側略翻羃莫狄翻㒿音離藏刀裙下詐為妻妾自帥之入縣舍帥讀曰率下同須臾變服突出因據縣城驅掠徒衆直趣南山趣七喻翻又逡須翻乘險而東遣人馳告故將伊州刺史襄城張善相令以兵應接五代志襄城郡東魏置北荊州後周改曰和州開皇初改曰伊州大業初改曰汝州尋改為郡李密復開皇舊州名杜佑曰伊州今陸渾縣將即亮翻相息亮翻右翊衛將軍史萬寶鎮熊州謂行軍總管盛彥師曰李密驍賊也驍堅堯翻又輔以王伯當今決策而叛殆不可當也彥師笑曰請以數千之衆邀之必梟其首梟古堯翻萬寶曰公以何策能爾彥師曰兵法尚詐不可為公言之為于偽翻即帥衆踰熊耳山熊耳山在熊州南據要道南字當屬上句刀楯伏於溪谷楯食尹翻令之曰俟賊半渡一時俱發或問曰聞李密欲向洛州而公入山何也洛州謂洛陽密聲言向洛實欲出人不意走襄城就張善相耳走音奏相息亮翻若賊入谷口我自後追之山路險隘無所施力一夫殿後必不能制殿丁練翻今吾先得入谷擒之必矣李密既渡陝以為餘不足慮陝州之兵既不能邀密密自以為踰山而南他無邀阻不足慮也陝失冉翻果踰山南出彥師擊之密衆首尾斷絶不得相救遂斬密及伯當俱傳首長安考異曰河洛記密因執驛使者斬之曉入桃林詐縣官翻據縣城中驚悸莫敢當者驅掠畜産趨南山時右翊衛將軍上柱國太平公史萬寶在熊州既聞密叛遣將劉善武領兵追躡善武兄善績往在洛口為密所屠善武因此發憤志在取密十日十夜倍道兼行百方羅捕無暫休息追至陸渾縣南七十里與密相及連戰轉鬬一步一前驅密於邢公山與王伯當死之今從實録及舊書彥師以功賜爵葛國公章十二行本公下有拜武衛將軍五字乙十一行本同孔本同張校同退齋校同仍領熊州領當依舊書作鎮李世績在黎陽上遣使以密首示之告以反狀世績北面拜伏號慟表請收葬使疏吏翻號戶刀翻詔歸其尸世績為之行服備君臣之禮世績以此受知於太宗為于偽翻舉軍縞素葬密于黎陽山南縞工老翻密素得士心哭者多歐血武德元年隋右武衛大將軍李景守北平高開道圍之歲餘不能克遼西太守鄧皓將兵救之景帥其衆遷于柳城守式又翻皓古老翻將即亮翻帥讀曰率下同後將還幽州於道為盜所殺開道遂取北平進陷漁陽郡有馬數千匹衆且萬自稱燕王改元始興考異曰實録唐書皆無開道年號柳璨注正閏位曆年號天成李昉歷代年號亦如之宋庠紀年通譜武德元年開道年號始興云出歷代紀要録此號未知孰是今從紀要懷戎沙門高曇晟劉昫曰懷戎後漢之潘縣屬上谷郡北齊改為懷戎縣隋屬幽州涿郡曇徒含翻晟承正翻士民大集曇晟與僧五千人擁齋衆而反殺縣令及鎮將將即亮翻自稱大乘皇帝立尼靜宣為邪輸皇后釋氏以人之性識根業各差故有大乘小乘之説遣使招開道立為齊王開道帥衆五千人歸之使疏吏翻帥讀曰率居數月襲殺曇晟悉並其衆武德元年有犯法不至死者上特命殺之監察御史李素立諫曰六典監察御史蓋取秦監郡御史以名官晉孝武太元中創置檢校御史後周秋官府有司憲旅下士隋初改為監察御史從八品上監工銜翻三尺法王者所與天下共也漢書客謂杜周曰君為廷尉不循三尺法孟康注云以三尺竹簡書法律也人無所措手足陛下甫創洪業奈何棄法臣忝法司不敢奉詔上從之自是特承恩遇命所司授以七品清要官所司擬雍州司戶雍於用翻上曰此官要而不清又擬祕書郎上曰此官清而不要遂擢授侍御史六典侍御史從六品上杜佑曰唐侍御史之職有四謂推彈公廨雜事推者掌推鞫彈者掌彈舉公廨知公廨事雜事臺事總悉判之義深之曾孫也李義深趙郡著姓事高齊史云人位兼美上以舞胡安比嚴比改叱奴為散騎侍郎散悉亶翻騎奇寄翻古者樂工不與士齒雖賢如子野師襄皆章十二行本皆下有終身繼三字乙十一行本同孔本同張校同退齋校同世不易其業子野晉樂師曠字襄魯樂師安馬駒為開府有國家者以為殷鑑齊後主亡國亦此之由詩云殷監不遠在夏后之世建義功臣行賞未遍高才碩學猶滯草萊而先擢舞胡為五品使鳴玉曳組趨翔廊廟組則古翻非所以規模後世也上不從曰吾業已授之不可追也陳嶽論曰受命之主發號出令為子孫法一不中理則為厲階中竹仲翻今高祖曰業已授之不可追苟授之而是則已授之而非胡不可追歟君人之道不得不以業已授之為誡哉武德元年李軌吏部尚書梁碩有智略軌常倚之以為謀主碩見諸胡浸盛陰勸軌宜加防察由是與戶部尚書安修仁有隙其後安修仁兄弟縛軌以歸於唐卒如梁碩所慮碩不為禮乃與修仁共譖碩於軌誣以謀反軌鴆碩殺之有胡巫謂軌曰上帝當遣玉女自天而降軌信之發民築臺以候玉女勞費甚廣河右飢人相食軌傾家財以賑之不足欲發倉粟賑津忍翻召㣥臣議之曹珍等皆曰國以民為本豈可愛倉粟而坐視其死乎謝統師等皆故隋官心終不服謝統師等為軌所執見一百八十四卷義寧元年七月排軌故人乃詬珍曰詬苦候翻百姓餓者自是羸弱勇壯之士終不至此國家倉粟以備不虞豈可散之以飼羸弱羸倫為翻飼祥吏翻僕射苟悅人情不為國計非忠臣也軌以為然由是士民離怨為李軌敗亡張本王崇武標點容肇祖聶崇岐覆校
