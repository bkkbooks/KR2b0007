body:
  text: 資治通鑑卷第二百二十八端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀四十四德宗神武聖文皇帝三建中四年建中四年癸亥七八三建中四年春正月丁亥隴右節度使張鎰與吐蕃尚結贊盟于清水使疏吏翻鎰弋質翻吐從暾入聲清水漢古縣唐屬秦州九域志在州東九十里建中四年庚寅李希烈遣其將李克誠襲陷汝州執別駕李元平將即亮翻汝州治梁縣漢承休侯封邑也元平本湖南判官薄有才藝性疏傲敢大言好論兵好呼到翻關張關上脫中書侍郎播奇之薦於上以為將相之器以汝州距許州最近九域志汝州東南至許州二百七十里史言關播所用非才相息亮翻知州事元平至汝州即募工徒治城治直之翻希烈陰使壯士應募執役入數百人元平不之覺希烈遣克誠將數百騎突至城下將即亮翻又音如字騎奇寄翻縛元平馳去元平為人眇小無須須古字取象以類耐毛也後人從而加髟為鬚字此俗書耳便液汚地便毗連翻便液謂屎溺也液音亦汚烏故翻希烈罵之曰盲宰相以汝當我何相輕也以判官周晃為汝州刺史又遣別將董待名等四出抄掠取尉氏尉氏縣屬汴州九域志在州南九十里抄楚交翻官軍數為所敗邏騎西至彭婆數所角翻敗補邁翻邏郎佐翻騎奇寄翻邏騎巡邏遊奕之騎九域志河南府河南縣有彭婆鎮金人疆域圖洛陽縣有彭婆鎮東都士民震駭竄匿山谷留守鄭叔則入保西苑東都西苑在東都城西鄭叔則蓋備有急易於西奔也守式又翻上問計於盧對曰希烈年少驍將恃功驕慢將佐莫敢諫止誠得儒雅重臣奉宣聖澤為陳逆順禍福少始照翻驍堅堯翻將即亮翻為于偽翻希烈必革心悔過可不勞軍旅而服顏真卿三朝舊臣真卿歷事玄肅代三朝朝直遙翻名重海內人所信服真其人也上以為然甲午命真卿詣許州宣慰希烈詔下舉朝失色下遐嫁翻真卿乘驛至東都鄭叔則曰往必不免宜少留須後命少詩沼翻須待也真卿曰君命也將焉避之焉於虔翻遂行李勉表言失一元老為國家羞請留之又使人邀真卿章十二行本卿下有於道二字乙十一行本同張校同云無注本亦無不及真卿與其子書但敕以奉家廟撫諸孤而已至許州欲宣詔旨希烈使其養子千餘人環繞慢罵李希烈養壯士為子謂之飬子環音胡慣翻為將剸啖之勢剸旨兗翻細割也真卿足不移色不變希烈遽以身蔽之麾衆令退館真卿而禮之令力丁翻館古玩翻希烈欲遣真卿還還從宣翻又音如字會李元平在座真卿責之元平慚而起以密啓白希烈希烈意遂變留真卿不遣朱滔王武俊田悅李納各遣使詣希烈上表稱臣勸進使者拜舞於希烈前説希烈曰使疏吏翻上時掌翻説式芮翻朝廷誅滅功臣失信天下都統英武自天功烈蓋世已為朝廷所猜忌將有韓白之禍朝直遙翻統他綜翻俗從上聲韓白之禍謂韓信斬於鍾室白起死於杜郵也願亟稱尊號使四海臣民知有所歸希烈召顏真卿示之曰今四王遣使見推不謀而同以朱滔稱冀王王武俊稱趙王田悅稱魏王李納稱齊王故希烈謂之四王使疏吏翻豈吾獨為朝廷所忌無所自容邪邪音耶真卿曰此乃四凶何謂四王相公不自保功業為唐忠臣乃與亂臣賊子相從求與之同覆滅邪希烈不悅扶真卿出他日又與四使同宴四使曰久聞太師重望今都統將稱大號而太師適至是天以宰相賜都統也顏真卿為太子太師故皆以其官稱之相息亮翻何謂宰相汝知有罵安祿山而死者顏杲卿乎顏杲卿事見二百一十七卷肅宗至德元載叱尺栗翻吾年八十知守節而死耳豈受汝輩誘脅乎史照曰以利動之曰誘以威迫之曰脅誘音酉復扶又翻希烈乃使甲士十人守真卿於館舍掘坎於庭云欲坑之真卿怡然見希烈曰怡然安和之貌死生已定何必多端亟以一劍相與豈不快公心事邪希烈乃謝之考異曰顏氏行狀以為公至許州希烈前後詐為公表奏請汴州者數十上知而寢之舊真卿傳以為希烈逼為章表令雪己願罷兵馬纍遣真卿兄子峴與從吏凡數輩繼來京師上皆不報希烈大宴逆黨倡優斥黷朝政真卿拂衣起後張伯儀敗績令以首級夸示真卿號慟周曾謀奉真卿遂送真卿於龍興寺按滔等推尊希烈在去年真卿使許在今年正月蓋滔等始勸希烈稱帝希烈但稱都元帥建興王故今年滔等再遣樊播等勸進稱為都統也真卿剛烈守之以死希烈豈能逼之使為章表雪己行狀云詐為表奏是也建中四年戊戌以左龍武大將軍哥舒曜為東都汝州節度使將鳳翔邠寧涇原奉天好畤行營兵萬餘人討希烈鳳翔邠寧涇原三節鎮之兵奉天好畤神策屯兵也曜行至郟城郟音夾郟城縣屬汝州東魏之龍山縣也隋開皇初改曰汝南十八年改曰輔城大業初改曰郟城九域志郟城縣在汝州東南九十里宋白曰春秋楚令尹子瑕城郟即此遇希烈前鋒將陳利貞擊破之希烈勢小沮沮在呂翻曜翰之子也天寶末安祿山反哥舒翰敗沒於潼關希烈使其將封有麟據鄧州南路遂絶貢獻商旅皆不通壬寅詔治上津山路置郵驛上津縣屬商州治直之翻建中四年二月戊申朔命鴻臚卿崔漢衡送區頰贊還吐蕃區頰贊入見事始見上卷上年臚陵如翻建中四年丙寅以河陽三城懷衛州為河陽軍建中四年丁卯哥舒曜克汝州擒周晃建中四年三月戊寅江西節度使曹王皋敗李希烈將韓霜露於黃梅斬之辛卯拔黃州時希烈兵柵蔡山敗補邁翻九域志黃梅縣屬蘄州距州一百二十里蔡山在黃梅界即江左新蔡郡治所魯悉達保聚之地宋白曰宋分江夏郡置南新蔡郡隋開皇十八年改為黃梅縣以界內黃梅山名之祝穆曰蔡山出大龜春秋左氏傳所謂大蔡蓋以山得名也險不可攻皋聲言西取蘄州蘄音祈蘄州後漢為蘄春侯國吳置蘄春郡北齊置齊昌郡及羅州後周改蘄州州北有蘄水南入于江地名解云蘄春以水隈多蘄菜因名引舟師泝江而上希烈之將引兵循江隨戰去蔡山三百餘里皋乃復放舟順流而下上時掌翻復扶又翻下遐嫁翻急攻蔡山拔之希烈兵還救之不及而敗皋遂進拔蘄州表伊慎為蘄州刺史王鍔為江州刺史建中四年淮寧都虞候周曾鎮遏兵馬使王玢押牙姚憺韋清密輸款於李勉玢府巾翻憺徒濫翻又徒敢翻李希烈遣曾與十將康秀琳將兵三萬攻哥舒曜至襄城襄城縣漢屬潁川郡晉屬襄城郡後周置汝州唐貞觀元年廢州以襄城縣屬許州貞觀八年以伊州為汝州襄城仍屬許州天寶七載復屬汝州九域志襄城縣在汝州東南一百有五十里奉顏真卿為節度使使玢憺清為內應希烈知之遣別將李克誠將騾軍三千人淮西地少馬乘騾以戰號騾子軍尤為驍鋭將即亮翻誠將音同又音如字騾落戈翻殺之並殺玢憺及其黨甲午詔贈曾等官始韋清與曾等約事泄不相引故獨得免清恐終及禍説希烈請詣朱滔乞師説式芮翻希烈遣之行至襄邑逃奔劉洽襄邑縣屬宋州劉洽時以宣武節度鎮宋州閉壁數日其黨寇尉氏鄭州者聞之亦遁歸希烈乃上表歸咎於周曾等引兵還蔡州上時掌翻還從宣翻蔡州治汝陽縣淮寧本鎮也希烈時自許州退還外示悔過從順實待朱滔等之援也置顏真卿於龍興寺寺蓋在蔡州丁酉荊南節度使張伯儀與淮寧兵戰於安州安州漢安陸地伯儀僅以身免亡其所持節希烈使人以其節及俘馘示顏真卿真卿號慟投地絶而復蘇自是不復與人言俘方無翻馘古獲翻號戶高翻復扶又翻又音如字建中四年夏四月上以神策軍使白志貞為京城召募使募禁兵以討李希烈志貞請諸嘗為節度觀察都團練使者不問存沒並勒其子弟帥奴馬自備資裝從軍帥讀曰率授以五品官貧者甚苦之人心始搖史言德宗窮兵亂將作矣建中四年上命宰相尚書與吐蕃區頰贊盟於豐邑里區頰贊以清水之盟疆埸未定不果盟是年春張鎰與吐蕃盟於清水宋白曰張鎰與吐蕃盟文曰今國家所守界涇州西至彈箏峽西口隴州西至清水縣鳳州西至同谷縣暨劍南西山大渡河東為漢界蕃國守備在蘭渭原會西至臨洮又東至成州抵劍南西界磨些諸蠻大渡水西南為蕃界相息亮翻尚辰羊翻吐從暾入聲埸音亦己未命崔漢衡入吐蕃決於贊普是年二月命崔漢衡送區頰贊蓋欲與之盟而遣之久而盟未定又命漢衡入吐蕃決於贊普此時中國疲於兵彼固有以窺唐矣盟無益也建中四年庚申加永平宣武河陽都統李勉淮西招討使東都汝州節度使哥舒曜為之副以荊南節度使張伯儀為淮西應援招討使山南東道節度使賈耽江西節度使曹王皋為之副上督哥舒曜進兵曜至潁橋九域志襄城縣有潁橋鎮還保襄城李希烈遣其將李光輝攻襄城曜擊卻之建中四年五月乙酉潁王璬薨璬玄宗子音古了翻建中四年乙未以宣武節度使劉洽兼淄青招討使建中四年李晟謀取涿莫二州以絶幽魏往來之路與張孝忠之子升雲圍朱滔所署易州刺史鄭景濟於清苑水經注徐水出北平東徑清苑城東至高陽入于河劉昫曰清苑縣漢之樂鄉縣屬信都國隋為清苑縣屬瀛州唐景雲元年屬冀州至宋以清苑縣為保州治所宋白曰漢高宗訪樂毅之後得樂叔封於樂鄉高齊省仍自今易州滿城縣界移永寧縣理北城隋改為清苑縣因滿城縣界清苑河為名滔以其司武尚書馬實為留守司武尚書猶天朝兵部尚書自將步騎萬五千救清苑李晟軍大敗退保易州滔還軍瀛州張升雲奔滿城劉昫曰滿城縣漢北平縣地後魏置永樂縣天寶元年改為滿城屬易州引軍還保定州考異曰燕南記曰晟與張升雲等圍鄭景濟於清苑自二月至四月滔自統馬步萬五千人救清苑四月二日發館陶寨五月內到晟出戰不利城中又出攻晟晟敗去滔乘勝逐晟等大破之晟奔易州染病不復更出實録曰庚子李晟自清苑退保易州舊晟傳曰自正月至于五月會晟病甚不知人者數焉軍吏合謀乃以馬輿還定州今從之實録所云庚子蓋奏到之日也王武俊以滔既破李晟留屯瀛州未還魏橋遣其給事中宋端趣之趣讀曰促端見滔言頗不遜滔怒使謂武俊曰滔以熱疾暫未南還大王二兄遽有云云滔以救魏博之故叛君棄兄如脫屣耳履不躡跟曰屣脫之易耳惟二兄所為端還報武俊自辨於馬實實以狀白滔言趙王知宋端無禮於大王深加責讓實無他志武俊亦遣承令官鄭和隨實使者見滔謝之時武俊等改要藉官為承令官相待如初然武俊以是益恨滔矣六月李抱真使參謀賈林詣武俊壁詐降節度參謀關預軍中機密林曰林來奉詔非降也武俊色動問其故林曰天子知大夫宿著誠效謂誅李惟嶽也謂稱王時也天子不察諸將亦嘗共表大夫之志天子語使者曰朕前事誠誤悔之無及朋友失意尚可謝況朕為四海之主乎賈林先言武俊心事後述天子詔旨鋪陳悔過之意可謂善説矣語牛倨翻僕胡人也為將尚知愛百姓況天子豈專以殺人為事乎今山東連兵暴骨如莽杜預曰草之生於廣野莽莽然故曰草莽莽莫朗翻暴步卜翻又薄報翻與誰守之僕不憚歸國但已與諸鎮結盟胡人性直不欲使曲在己天子誠能下詔赦諸鎮之罪僕當首唱從化諸鎮有不從者請奉辭伐之如此則上不負天子下不負同列不過五旬河朔定矣使林還報抱真陰相約結為武俊與抱真破走朱滔張本建中四年庚戌初行稅間架除陌錢法時河東澤潞河陽朔方四軍屯魏縣神策永平宣武淮南浙西荊南江泗沔鄂湖南黔中劍南嶺南諸軍環淮寧之境江謂江南西道泗當作西黔音琴環音宦諸道軍出境皆仰給度支仰牛向翻上優恤士卒每出境加給酒肉本道糧仍給其家一人兼三人之給故將士利之各出軍才逾境而止書有之威克厥愛允濟愛克厥威允罔功德宗蓋未知此者常賦不能供判度支趙贊乃奏行二法二法即所謂稅間架及除陌錢也每屋兩架為間上屋稅錢二千中稅千下稅五百吏執筆握算入人室廬計其數史照曰算所以籌算也其法用竹徑一分長六寸二百七十一枚而成六觚為一握出錢動數百緡敢匿一間杖六十賞告者錢五十緡所謂除陌錢者公私給與及賣買每緡官留五十錢給他物及相貿易者約錢為率貿音茂敢隱錢百杖六十罰錢二千賞告者錢十緡其賞錢皆出坐事之家於是愁怨之聲盈於遠近建中四年丁卯徙郴王逾為丹王鄜王遘為簡王二王皆上弟也建中四年庚午答蕃判官監察御史于頔答蕃判官因當時出使署置以為官名頔徒歷翻剌盧達翻言疆埸已定請遣區頰贊歸國秋七月甲申以禮部尚書李揆為入蕃會盟使入蕃命官猶答蕃也壬辰詔諸將相與區頰贊盟於城西李揆有才望盧惡之惡烏路翻故使之入吐蕃揆言於上曰臣不憚遠行恐死於道路不能達詔命上為之惻然為于偽翻謂曰揆無乃太老曰使遠夷非諳練朝廷故事者不可使疏吏翻諳烏含翻且揆行則自今年少於揆者少詩照翻不敢辭遠使矣使疏吏翻建中四年八月丁未李希烈將兵三萬圍哥舒曜於襄城詔李勉及神策將劉德信將兵救之乙卯希烈將曹季昌以隨州降尋復為其將康叔夜所殺復扶又翻建中四年初上在東宮聞監察御史嘉興陸贄名嘉興漢由拳縣地吳大帝黃龍三年以其地嘉禾生改為禾興縣後避太子和名改為嘉興縣隋廢縣唐初復置屬蘇州召為翰林學士韋執誼翰林志曰自太宗時名儒學士時召草制然猶未有名號乾封以後始號北門學士玄宗初置翰林待詔掌四方表疏批答應和文章繼以詔敕文告悉由中書多壅滯始選朝官有詞藝學識者入居翰林供奉別旨然亦未定名制詔書敕猶或分在集賢開元二十六年翰林供奉始改稱學士別建學士院於翰林院之南俾專內命其後又置東翰林院於金鑾殿之西隨上所在時兩河用兵久不決兩河謂河南河北贄以兵窮民困恐別生內變乃上奏其略曰克敵之要在乎將得其人馭將之方在乎操得其柄將即亮翻下同操千高翻將非其人者兵雖衆不足恃操失其柄者將雖材不為用又曰將不能使兵國不能馭將非止費財玩寇之弊亦有不戢自焚之災左氏傳曰兵猶火也不戢將自焚今兩河淮西為叛亂之帥者獨四五凶人而已四五凶人謂河北則朱滔王武俊田悅河南則李納淮西則李希烈也帥所類翻詿古賣翻又胡卦翻內蓄危疑蒼黃失圖勢不得止況其餘衆蓋並脅從史照曰書云脅從罔治孔穎達疏云謂被脅從而距王命者余謂脅從者為威力所迫脅不得已而從於逆非同心為逆者也豈願為惡又曰無紓目前之虞或興意外之變人者邦之本也財者人之心也其心傷則其本傷其本傷則枝幹顛瘁矣瘁秦醉翻又曰人搖不寧事變難測是以兵貴拙速不貴巧遲若不靖於本而務救於末則救之所為乃禍之所起也又論關中形勢以為王者蓄威以昭德偏廢則危居重以馭輕倒持則悖王畿者四方之本也太宗列置府兵分隸禁衛大凡諸府八百餘所而在關中者殆五百焉舉天下不敵關中章乙十一行本中下有之半二字則居重馭輕之意明矣承平漸久武備浸微雖府衛具存而卒乘罕習卒臧沒翻乘繩證翻故祿山竊倒持之柄乘外重之資一舉滔天兩京不守事見玄宗天寶十四載肅宗至德元載諸牧有馬每州有糧故肅宗得以中興中竹仲翻乾元之後繼有外虞悉師東討邊備既弛禁戎亦空吐蕃乘虛深入為寇故先皇帝莫與為禦避之東遊事見二百二十三卷代宗廣德元年忘深根固柢之慮柢都禮翻又都計翻內寇則殽函失險外侵則汧渭為戎汧口肩翻于斯之時雖有四方之師寧救一朝之患陛下追想及此豈不為之寒心哉為于偽翻今朔方太原之衆遠在山東謂李懷光以朔方軍馬燧以太原軍討田悅兵不解也繼出關外左右羽林左右龍武左右神策為六軍又曰左右羽林龍武神武為六軍神策軍最盛在六軍之右時李晟哥舒曜劉德信等皆以禁兵出關討賊黠虜覷邊啖徒濫翻又徒覽翻覷七慮翻伺視也伺隙乘虛微犯亭障此愚臣所竊憂也伺相吏翻未審陛下其何以禦之側聞伐叛之初議者多易其事以其事為易也易弋豉翻役不踰時計兵未甚多度費未甚廣度徒洛翻於事為無擾於人為不勞曾不料兵連禍拏變故難測日引月長漸乖始圖曾戶增翻拏女加翻相牽引也圖謀也往歲為天下所患咸謂除之則可致升平者李正己李寶臣梁崇義田悅是也往歲為國家所信咸謂任之則可除禍亂者朱滔李希烈是也既而正己死李納繼之寶臣死惟嶽繼之崇義平希烈叛惟嶽戮朱滔攜攜離也二也四去其三矣去羌呂翻而患竟不衰往歲之所信今則自叛矣而餘又難保是知立國之安危在勢任事之濟否在人勢苟安則異類同心也勢苟危則舟中敵國也陛下豈可不追鑒往事惟新令圖修偏廢之柄以靖人復倒持之權以固國漢人曰秦倒持太阿授楚其柄極思勞神思相吏翻徇無已之求望難必之效乎今關輔之間徵發已甚宮苑之內備衛不全北軍皆屯苑中時悉在行營又如朱滔希烈或負固邊壘誘致豺狼將即亮翻帥所類翻誘羊久翻或竊發郊畿驚犯城闕此亦愚臣所竊為憂者也未審陛下復何以備之姚令言朱泚之變卒如陸贄所料復扶又翻又音如字所遣神策六軍李晟等及節將子弟悉可追還晟成正翻節將子弟白志貞所奏遣東征者還從宣翻又音如字明敕涇隴邠寧但令嚴備封守邠卑旻翻令力丁翻仍云更不徵發使知各保安居又降德音罷京城及畿縣間架等雜稅則冀已輸者弭怨見處者獲寧見賢遍翻處昌呂翻人心不搖邦本自固上不能用建中四年壬戌以汴西運使崔縱兼魏州四節度都糧料使汴東西運使事始見上卷上年河東節度使馬燧澤潞節度使李抱真河陽節度使李艽朔方節度使李懷光四軍時並在魏州行營宋白曰建中用兵諸道行營出境者皆仰給度支謂之食出界糧又於諸軍各以臺省官一人司其供億謂之糧料使余按代宗廣德初郭子儀自商州進收京師請第五琦為糧料使渙之子也崔渙者玄暐之孫玄宗幸蜀以為相建中四年九月丙戌神策將劉德信宣武將唐漢臣與淮寧將李克誠戰敗於滬澗將即亮翻滬侯古翻考異曰徐岱奉天記曰大將唐漢臣劉德信高秉哲自大梁合統兵一萬屯于汝州三帥各領本軍城小卒衆教令不一軍進至薛店更無他路又不設支軍賊諜知之乘霧而進三帥望敵大潰戈楯資實山積馬萬餘蹄皆沒焉汝州遂陷攝刺史李元平為寇所獲賊邏兵北至彭婆今從實録時李勉遣漢臣將兵萬人救襄城上遣德信帥諸將家應募者三千人助之將即亮翻又音如字帥讀曰率下同勉奏李希烈精兵皆在襄城許州空虛若襲許州則襄城圍自解去年希烈徙鎮許州蓋欲乘虛搗其巢穴則希烈必釋襄城之圍以自救趣七喻翻未至數十里上遣中使責其違詔二將狼狽而返無復斥候克誠伏兵邀之殺傷太半漢臣奔大梁德信奔汝州希烈遊兵剽掠至伊闕剽匹妙翻伊闕禹所鑿春秋為戎蠻子之國漢為新城縣隋為伊闕縣唐屬河南府勉復遣其將李堅帥四千人助守東都復扶又翻又音如字考異曰新傳作李堅華今從實録希烈以兵絶其後堅軍不得還還從宣翻又音如字汴軍由是不振襄城益危汴皮變翻汴軍宣武兵也此時則李勉帥永平軍方鎮表大曆十四年永平軍增領汴潁二州徙治汴州故使史有汴軍之稱建中四年上以諸軍討淮寧者不相統一庚子以舒王謨為荊襄等道行營都元帥更名誼更工衡翻以戶部尚書蕭復為長史右庶子孔巢父為左司馬諫議大夫樊澤為右司馬自餘將佐皆選中外之望將即亮翻下同未行會涇師作亂而止復嵩之孫也蕭嵩開元中為相孔子三十七世孫也建中四年上發涇原諸道兵救襄城冬十月丙午涇原節度使姚令言將兵五千至京師考異曰舊傳云令言率本鎮兵五萬赴援按奉天記曰哥舒曜表請加師上使涇州節度使姚令言赴援令言本領三千請加至五千今從之寒甚多攜子弟而來冀得厚賜遺其家遺唯季翻既至一無所賜丁未發至滻水詔京兆尹王翃犒師惟糲食菜餤衆怒蹴而覆之糲盧達翻餤弋廉翻又徒甘翻蹴子六翻因揚言曰吾輩將死於敵而食且不飽安能以微命拒白刃邪聞瓊林大盈二庫玄宗時王鉷為戶口色役使徵剝財貨每歲進錢百億寶貨稱是入百寶大盈庫以供人主宴私賞賜之用則玄宗時已有大盈庫陸贄諫帝曰瓊林大盈自古悉無其制傳諸耆舊之説皆云創自開元聚斂之臣貪權飾巧求媚乃言郡國貢獻所合區分賦稅當委於有司以給經用貢獻宜歸於天子以奉私求玄宗悅之新置是二庫蕩心侈欲萌禍於茲逮乎失邦終以餌寇則庫始於玄宗明矣宋白曰大盈庫內庫也以中人主之至德中第五琦始悉以租賦進入大盈庫天子以出納為便故不復出不如相與取之乃擐甲張旗鼓譟還趣京城趣七喻翻令言入辭尚在禁中聞之馳至長樂阪遇之長樂阪在滻水西本滻坂也隋文帝惡其名取其北對長樂改曰長樂坂亦曰長樂坡樂音洛令言抱馬鬣突入亂兵呼曰射而亦翻呼火故翻下大呼同諸君失計東征立功何患不富貴乃為族滅之計乎軍士不聽以兵擁令言而西自長樂坂西入京城人二匹衆益怒射中使射而亦翻又命中使宣慰賊已至通化門外通化門京城東面北來第一門程大昌曰通化門北去丹鳳門止兩坊賊殺之又命出金帛二十車賜之賊已入城喧聲浩浩不復可遏復扶又翻百姓狼狽駭走賊大呼告之曰汝曹勿恐不奪汝商貨僦質矣不稅汝間架陌錢矣呼火故翻僦即就翻上遣普王誼翰林學士薑公輔出慰諭之賊已陳於丹鳳門外陳讀曰陳小民聚觀者以萬計初神策軍使白志貞掌召募禁兵東征死亡者志貞皆隱不以聞但受市井富兒賂而補之名在軍籍受給賜而身居市廛為販鬻司農卿段秀實上言禁兵不精其數全少卒有患難將何待之不聽少詩沼翻卒讀曰猝難乃旦翻至是上召禁兵以禦賊竟無一人至者賊已斬關而入上乃與王貴韋淑太子諸王唐安公主自苑北門出王貴以傳國寶繫衣中以從從才用翻下同後宮諸王公主不及從者什七八初魚朝恩既誅宦官不復典兵事見二百二十四卷代宗大曆五年嘗事上於東宮至是帥宦官左右僅百人以從帥讀曰率使普王誼前驅太子執兵以殿殿丁練翻司農卿郭曙以部曲數十人獵苑中禁苑在京城之北東至灞水西連故長安城南連京城北枕渭水謁道左遂以其衆從曙曖之弟也曖曙皆郭子儀之子聞之帥麾下四百人從帥讀曰率下相帥同乃使建居後為殿薑公輔叩馬言曰朱泚嘗為涇帥見二百二十六卷元年帥所類翻廢處京師事見上卷上年處昌呂翻臣謂陛下既不能推心待之則不如殺之毋貽後患今亂兵若奉以為主則難制矣請召使從行上倉猝不暇用其言曰無及矣遂行夜至咸陽飯數匕而過飯扶晚翻時事出非意㣥臣皆不知乘輿所之之往也乘繩證翻白志貞王翃及御史大夫于頎中丞劉從一戶部侍郎趙贊翰林學士陸贄吳通微等追及上於咸陽頎頔之從父兄弟頎渠希翻之從才用翻從一齊賢之從孫也劉齊賢祥道之子以方正為高宗所重賊入宮登含元殿大呼曰天子已出宜人自求富遂歡譟爭入府庫運金帛極力而止歡許元翻小民因之亦入宮盜庫物通章十二行本通上有出而復入四字乙十一行本同夕不已其不能入者剽奪於路諸坊居民各相帥自守姚令言與亂兵謀曰今衆無主不能持久朱太尉間居私第請相與奉之衆許諾乃遣數百騎迎泚於晉昌里第按長安圖自京城啓夏門北入東街第二坊曰進昌坊考異曰舊泚傳作招國里今從實録泚按轡列炬傳呼入宮居含元殿設警嚴設鼓角以警嚴一曰設卒以警備嚴衛戊申旦泚徙居白華殿考李晟收復京城次第白華殿蓋近光泰門內大明宮東北隅程大昌曰晟收長安亦自白華門入諸家不載何地以晟兵所屆言之當在大明東苑之東稱涇原將士久處邊陲處昌呂翻不間朝禮間習也朝直遙翻下同致驚乘輿西出巡幸乘繩證翻太尉已權臨六軍應神策軍士及文武百官凡有祿食者悉詣行在不能往者即詣本司若出三日檢勘彼此無名者皆斬於是百官出見泚或勸迎乘輿泚不悅百官稍稍遁去源休以使回紇還賞薄怨朝廷賞薄事見上卷上年使疏吏翻屏人密語移時屏必郢翻又卑正翻為泚陳成敗引符命勸之僭逆為于偽翻泚喜然猶未決宿衛諸軍舉白幡降者列於闕前甚衆降戶江翻泚夜於苑門出兵旦自通化門入駱驛不絶張弓露刃欲以威衆上思桑道茂之言道茂言見二百二十六卷元年縣僚聞車駕猝至欲逃匿山谷主簿蘇辨止之辨良嗣之兄孫也蘇良嗣武后初為相己酉左金吾大將軍渾瑊至奉天瑊素有威望衆心恃之稍安瑊古咸翻庚戌源休勸朱泚禁十城門唐都長安京城東面通化春明延興三門南面啓夏明德安化三門西延秋金光開遠三門北光化一門凡十門朝士往往易服為傭僕潛出休又為泚説誘文武之士使之附泚又為于偽翻説輸芮翻檢校司空同平章事李忠臣久失兵柄太僕卿張光晟自負其才皆鬱鬱不得志李忠臣失兵柄見二百二十五卷代宗大曆十四年張光晟事見二百三十六卷元年校古效翻晟成正翻工部侍郎蔣鎮出亡墜馬傷足為泚所得泚且禮翻又音此先是休以才能光晟以節義鎮以清素都官員外郎彭偃以文學太常卿敬釭以勇略先悉薦翻釭古紅翻又古雙翻皆為時人所重至是皆為泚用鳳翔涇原將張廷芝段誠諫將數千人救襄城原將即亮翻諫將音同又音如字未出潼關聞朱泚據長安殺其大將隴右兵馬使戴蘭潰歸於泚泚先帥鳳翔涇原故二鎮之兵聞亂皆歸之潼音同使疏吏翻謀反遂定以源休為京兆尹判度支度徒洛翻李忠臣為皇城使唐六典皇城在京城之中東西五里一百一十五步南北三里一百四十步南面三門中曰朱雀左曰安上右曰含光東面二門北曰延喜南曰景風西面二門北曰安福南曰順義其中右社稷左宗廟百僚廨署列乎其間唐自開元以前以城門郎掌皇城諸門開闔之節中世以後置皇城使六軍宿衛咸擬乘輿乘繩證翻辛亥以渾瑊為京畿渭北節度使行在都虞候白志貞為都知兵馬使令狐建為中軍鼓角使以神策都虞候侯仲莊為左衛將軍兼奉天防城使渾戶昆翻又戶本翻瑊古咸翻使疏吏翻令力丁翻朱泚以司農卿段秀實久失兵柄段秀實失兵柄見二百二十六卷元年怏於兩翻遣數十騎召之秀實閉門拒之騎士踰垣入劫之以兵秀實自度不免騎奇寄翻垣于元翻度徒洛翻乃謂子弟曰國家有患吾於何避之當以死徇社稷汝曹宜人自求生乃往見泚泚喜曰段公來吾事濟矣延坐問計秀實説之曰公本以忠義著聞天下謂泚能釋鎮入朝及與弟滔絶也説式芮翻遽有披猖使乘輿播越夫犒賜不豐有司之過也犒口到翻乘繩證翻夫音扶天子安得知之公宜以此開諭將士示以禍福奉迎乘輿復歸宮闕此莫大之功也將即亮翻復扶又翻又音如字泚默然不悅泚且禮翻又音此然以秀實與己皆為朝廷所廢遂推心委之左驍衛將軍劉海賓涇原都虞候何明禮孔目官岐靈嶽皆秀實素所厚也朝直遙翻驍堅堯翻段秀實鎮涇原時厚遇此三人唐藩鎮吏職使院有孔目官軍府事無細大皆經其手言一孔一目無不綜理也史照曰岐姓也黃帝時有岐伯考異曰舊傳曰判官岐靈嶽今從段公別傳秀實密與之謀誅泚迎乘輿上初至奉天詔徵近道兵入援有上言朱泚為亂兵所立且來攻城宜早修守備上時掌翻盧切齒言曰朱泚忠貞㣥臣莫及奈何言其從亂傷大臣心臣請以百口保其不反上亦以為然又聞㣥臣勸泚奉迎乃詔諸道援兵至者皆營於三十里外薑公輔諫曰今宿衛單寡防慮不可不深若泚竭忠奉迎何憚於兵多如其不然有備無患上乃悉召援兵入城盧及白志貞言於上曰臣觀朱泚心迹必不至為逆願擇大臣入京城宣慰以察之上以諸章十二行本諸作問乙十一行本同孔本同退齋校同熊校同從臣皆畏憚莫敢行從才用翻金吾將軍吳溆獨請行上悅溆退而告人曰食其祿而違其難何以為臣吾幸託肺附溆章敬皇后弟也溆音徐呂翻難乃旦翻下同但舉朝無蹈難之臣使聖情慊慊耳慊慊嫌恨不足之意朝直遙翻慊苦簟翻泚反謀已決雖陽為受命館溆於客省館古玩翻尋殺之溆湊之兄也泚遣涇原兵馬使韓旻將鋭兵三千聲言迎大駕實襲奉天使疏吏翻將即亮翻又音如字時奉天守備單弱段秀實謂岐靈嶽曰事急矣使靈嶽詐為姚令言符令旻且還當與大軍俱發竊令言印未至秀實倒用司農印印符募善走者追之旻至駱驛駱驛地名史照曰駱谷關之驛也余按韓旻若至駱谷關之驛則已過奉天而西南矣照説非也但未知駱驛在何地還從宣翻又音如字秀實謂同謀曰旻來吾屬無類矣我當直搏泚殺之不克則死終不能為之臣也乃令劉海賓何明禮陰結軍中之士欲使應之於外令力丁翻旻兵至泚令言大驚岐靈嶽獨承其罪而死不以及秀實等是日泚召李忠臣源休姚令言及秀實等議稱帝事秀實勃然起奪休象笏武德初因隋舊制五品已上執象笏三品已下前挫後直五品已上後屈自時厥後一例上圓下方曾不分別大罵曰狂賊吾恨不斬汝萬段豈從汝反邪唾吐臥翻邪音耶因以笏擊泚泚舉手扞之才中其額濺血灑地泚與秀實相搏忷忷中竹仲翻忷許拱翻忷忷喧擾之狀左右猝愕不知所為海賓不敢進乘亂而逸忠臣前助泚泚得匍匐脫走秀實知事不成謂泚黨曰我不同汝反何不殺我衆爭前殺之泚一手承血一手止其衆曰義士也勿殺秀實既死泚哭之甚哀以三品禮葬之唐制司農卿從三品劉海賓不能助段秀實與之同死逃將焉往縗倉回翻後二日捕得殺之考異曰段公別傳曰五日夜泚使涇原將李忠臣高昂等統鋭兵五千以襲奉天六日賊泚又令兵馬使韓旻領馬步二千以繼之奉天記曰秀實與海賓密謀誅泚佯入請間計事而海賓置匕首於靴欲以相應為閽者見覺秀實遽奪源休笏挺而擊之舊泚傳曰秀實與劉海賓謀誅泚且虞叛卒之震驚法駕乃潛為賊符追所發兵至六日兵及駱驛而回因與海賓同入見泚為陳逆順之理而海賓於靴中取匕首為其所覺遂不得前秀實知不可以義動遽奪源休象笏挺而擊泚秀實傳曰與海賓約事急為繼而令明禮應於外及秀實擊泚而海賓等不至按李忠臣等若已將五千人襲奉天則秀實雖追還旻兵無益矣又海賓若於靴中取匕首為賊所覺則登時死矣焉能復逃若為閽者所覺亦應時被擒事迹喧著賊為之備秀實亦不得發矣此數者皆恐難信今但取段公行狀幸奉天録及舊傳可信者存之明禮從泚攻奉天復謀殺泚亦死史終言之復扶又翻恨委用不至涕泗久之建中四年壬子以少府監李昌巎為京畿渭南節度使巎奴刀翻建中四年鳳翔節度使同平章事張鎰性儒緩好修飾邊幅好呼到翻不習軍事聞上在奉天欲迎大駕具服用貨財獻于行在後營將李楚琳為人剽悍將即亮翻剽匹妙翻軍中畏之嘗事朱泚為泚所厚行軍司馬齊映與同幕齊抗言於鎰曰不去楚琳必為亂首去羌呂翻鎰命楚琳出戍隴州九域志鳳翔府西至隴州一百五十里鎰方以迎駕為憂謂楚琳已去矣楚琳夜與其黨作亂鎰縋城而走縋馳偽翻賊追及殺之判官王沼等皆死映自水竇出抗為傭保負荷而逃皆免荷下可翻又讀如字考異曰舊映傳曰鎰不從映言乃示寬大召楚琳語之曰欲令公使於外楚琳恐是夜作亂殺鎰以應泚今從鎰傳始上以奉天迫隘欲幸鳳翔戶部尚書蕭復聞之遽請見見賢遍翻曰陛下大誤鳳翔將卒皆朱泚故部曲其中必有與之同惡者臣尚憂張鎰不能久豈得以鑾輿蹈不測之淵乎上曰吾行計已決試為卿留一日為于偽翻明日聞鳳翔亂乃止齊映齊抗皆詣奉天以映為御史中丞抗為侍御史楚琳自為節度使降于朱泚隴州刺史郝通奔于楚琳郝呼各翻建中四年商州團練兵殺其刺史謝良輔建中四年朱泚自白華殿入宣政殿東內含元殿之北為宣政殿改元應天癸丑泚以姚令言為侍中關內元帥李忠臣為司空兼侍中源休為中書侍郎同平章事判度支蔣鎮為吏部侍郎樊系為禮部侍郎彭偃為中書舍人自餘張光晟等各拜官有差立弟滔為皇太弟姚令言與源休共掌朝政朝直遙翻下同凡泚之謀畫遷除軍旅資糧皆稟於休休勸泚誅翦宗室在京城者以絶人望殺郡王王子王孫凡七十七人尋又以蔣鎮為門下侍郎李子平為諫議大夫並同平章事鎮憂懼每懷刀欲自殺又欲亡竄然性怯竟不果源休勸泚誅朝士之竄匿者以脅其餘鎮力救之賴以全者甚衆樊系為泚撰册文既成仰藥而死樊系距朱泚之命不為撰册不過死耳撰册而死於義何居為賊所得章十二行本得下有逼以官三字乙十一行本同孔本同退齋校同沇絶食稱病潛竄得免沇以轉翻建中四年哥舒曜食盡棄襄城奔洛陽李希烈陷襄城建中四年右龍武將軍李觀將衛兵千餘人從上於奉天上委之召募數日得五千餘人列之通衢旗鼓嚴整城人為之增氣為于偽翻姚令言之東出也涇州在西故以救襄城為東出判官河中姚況知涇州事河清況聞上幸奉天集將士大哭激以忠義發甲兵器械百餘車通夕輸行在通夕而行自晚至旦也得之士氣大振詔以河清為四鎮北庭行營涇原節度使況為行軍司馬建中四年上至奉天數日右僕射同平章事崔寧始至上喜甚撫勞有加崔寧鎮西川有威名危難之中見其至可以鎮安人心故喜甚而撫勞加於他人勞力到翻謂所親曰主上聰明英武從善如流但為盧所惑以至於此因潸然出涕潸音刪又數板翻聞之與王翃謀陷之翃言於上曰臣與寧俱出京城寧數下馬便液數所角翻便液溺也便毗連翻液羊益翻久之不至有顧望意會朱泚下詔以左丞柳渾同平章事寧為中書令渾襄陽人也時亡在山谷翃使盩厔尉康湛詐為寧遺朱泚書獻之遺唯季翻因譖寧與朱泚結盟約為內應故獨後至乙卯上遣中使引寧就幕下云宣密旨二力士自後縊殺之中外皆稱其冤上聞之乃赦其家建中四年朱泚遣使遺朱滔書遺唯季翻稱三秦之地指日克平大河之北委卿除殄當與卿會于洛陽滔得書章十二行本書下有西向舞蹈四字乙十一行本同退齋校同張校同云無注本亦無宣示軍府移牒諸道以自誇大建中四年上遣中使告難於魏縣行營魏縣行營馬燧諸軍之討田悅者難乃旦翻李懷光帥衆赴長安為李懷光救奉天破朱泚張本帥讀曰率馬燧歸太原李艽歸河陽建中四年丁巳以戶部尚書蕭復為吏部尚書吏部郎中劉從一為刑部侍郎翰林學士薑公輔為諫議大夫並同平章事建中四年朱泚自將逼奉天軍勢甚盛以姚令言為元帥泚且禮翻又音此將即亮翻帥所類翻考異曰奉天記十月十日賊泚自統衆攻奉天以姚令言為都統今從實録舊泚傳張光晟副之以李忠臣為京兆尹皇城留守仇敬忠為同華等州節度拓東王以扞關東之師李日月為西道先鋒經略使晟成正翻守式又翻拓達各翻扞戶旰翻使疏吏翻華戶化翻邠寧留後韓遊王褱慶州刺史論惟明監軍翟文秀受詔將兵三千拒泚於便橋與泚遇於醴泉遊王褱欲還趣奉天邠卑旻翻王褱古回翻監古銜翻翟萇伯翻將音同上又音如字還從宣翻又音如字趣七喻翻下同文秀曰我向奉天賊亦隨至是引賊以迫天子也不若留壁於此賊必不敢越我向奉天若不顧而過則與奉天夾攻之遊王褱曰賊強我弱若賊分軍以綴我直趣奉天奉天兵亦弱何夾攻之有我今急趣奉天所以衛天子也且吾士卒飢寒而賊多財彼以利誘吾卒吾不能禁也翟文秀欲留拒賊詔旨也夾攻之説兵家常論也挾詔旨而依兵家常論以制將帥未有不折而從之者也微韓遊王褱持之奉天殆矣誘羊久翻泚亦隨至官軍出戰不利泚兵爭門欲入渾瑊與遊王褱血戰竟日門內有草車數乘渾戶昆翻又戶本翻瑊古咸翻乘繩證翻瑊使虞候高固帥甲士以長刀斫賊皆一當百帥讀曰率曳車塞門縱火焚之塞悉則翻衆軍乘火擊賊賊乃退會夜泚營於城東三里擊柝張火布滿原野使西明寺僧法堅造攻具毀佛寺以為梯衝西明寺在長安城中延康坊本隋楊素宅也梯雲梯衝衝車代宗飯僧以護國今朱泚乃用僧造攻具以攻奉天柝達各翻王褱寺材皆乾薪乾音干但具火以待之固侃之玄孫也高侃事太宗高宗為將有功瑊遊王褱等晝夜力戰幽州兵救襄城者聞泚反突入潼關歸泚於奉天幽州兵即代宗時朱泚入朝詣京西防秋兵也普潤戍卒神策兵也上與陸贄語及亂故深自克責贄曰致今日之患皆㣥臣之罪也上曰此亦天命非由人事贄退上疏以為陛下志一區宇四征不庭杜預曰不庭謂不朝也下之事上皆成禮於庭中一説庭直也不庭不直也逆將繼亂凶渠謂田悅李納也逆將謂朱滔李希烈等也渠大也將即亮翻行及三年建中二年兵端始啓至是及三年賦斂日重斂力贍翻內自京邑外洎邊陲洎其既翻行者有鋒刃之憂居者有誅求之困是以叛亂繼起怨讟並興非常之虞億兆同慮唯陛下穆然凝邃獨不得聞至使凶卒鼓行白晝犯闕豈不以乘我間隙因人攜離哉間古莧翻陛下有股肱之臣有耳目之任有諫諍之列有備衛之司見危不能竭其誠臨難不能效其死難乃旦翻臣所謂致今日之患㣥臣之罪者豈徒言歟聖旨又以國家興衰皆有天命臣聞天所視聽皆因於人書曰天視自我民視天聽自我民聽武王數紂之罪曰乃曰吾有命罔懲其侮並見尚書數所具翻易曰視履考祥履卦上九爻辭王弼曰禍福之祥生於所履處履之極履道成矣故可以視履而考祥失得之象易大傳之辭其義明矣然則聖哲之意六經會通皆謂禍福由人不言盛衰有命蓋人事理而天命降亂者未之有也人事亂而天命降康者亦未之有也鄭玄曰降康者下平安之福刑網稍密物力耗竭人心驚疑如居風濤洶洶靡定上自朝列朝直遙翻下達蒸黎日夕族黨聚謀咸憂必有變故旋屬涇原叛卒果如衆庶所虞屬之欲翻虞度也京師之人動逾億計固非悉知算術皆曉占書則明致寇之由未必盡關天命臣聞理或生亂亂或資理理治也唐人避高宗諱皆以治為理有以多難而興邦難乃旦翻今生亂失守之事則既往而不可復追矣復扶又翻其資理興邦之業在陛下克勵而謹修之何憂乎亂人何畏於厄運勤勵不息足致升平豈止蕩滌妖氛旋復宮闕而已建中四年田悅説王武俊使與馬實共擊李抱真於臨洺魏縣行營既散李抱真退屯臨洺説式芮翻下林説因説復説同臨洺兵精而有備未易輕也復扶又翻易以豉翻今戰勝得地則利歸魏博不勝則恆冀大傷易定滄趙皆大夫之故地也時張孝忠據易定滄康日知據趙州武俊乃辭悅與馬實北歸壬戌悅送武俊於館陶九域志館陶在元城北四十五里下至將士贈遺甚厚先是武俊召回紇兵使絶李懷光等糧道遺于季翻先悉薦翻懷光等已西去而回紇達干將回紇千人雜虜二千人適至幽州北境朱滔因説之將即亮翻説式芮翻下同欲與俱詣河南取東都應接朱泚許以河南子女章十二行本女下有金帛二字乙十一行本同張校同云無注本亦無賂之滔娶回紇女為側室回紇謂之朱郎且利其俘掠許之賈林復説武俊曰復扶又翻自古國家有患未必不因之更興況主上九葉天子自高祖太宗高宗中宗睿宗玄宗肅宗代宗至帝凡九世天下誰肯捨之共事朱泚乎滔自為盟主以來輕蔑同列河朔古無冀國冀乃大夫之封域也滔稱冀王蓋奄禹迹冀州之域以自大而王武俊巡屬有冀州故林以是間之又西倚其兄泚者滔兄其志欲盡吞河朔而王之大夫雖欲為之臣不可得矣田悅之間王武俊朱滔與賈林之説王武俊者同一利害耳人惟趨利而避害故説行非有他巧也非滔之比又本以忠義手誅叛臣謂殺李惟嶽也處昌呂翻為滔所誑誘故蹉跌至此蹉倉何翻跌徒結翻不若與昭義併力取滔其勢必獲滔既亡則泚自破矣此不世之功轉禍為福之道也今諸道輻湊攻泚不日當平天下已定大夫乃悔過而歸國則已晚矣時武俊已與滔有隙因攘袂作色曰二百年天子吾不能臣豈能臣此田舍兒乎遂與抱真及馬燧相結約為兄弟然猶外事滔禮甚謹與田悅各遣使見滔於河間瀛州治河間縣且請馬實之兵共攻康日知於趙州建中四年汝鄭應援使劉德信將子弟軍在汝州是年四月募諸嘗為節度觀察都團練使子弟帥奴馬從軍使劉德信將之以救襄城引兵入援難乃旦翻與泚衆戰于見子陵破之新書本紀作思子陵水經注閺鄉縣西皇天原上有漢武帝思子臺又漢薄太后陵在霸陵之南近文帝陵故薄太后曰南望吾子北望吾夫故俗呼為見子陵也癸亥進屯東渭橋程大昌曰東渭橋在萬年縣北五十里灞水合渭之地建中四年朱泚夜攻奉天東西南三面甲子渾瑊力戰卻之左龍武大將軍呂希倩戰死乙丑泚復攻城復扶又翻將軍高重捷與泚將李日月戰於梁山之隅破之梁山在奉天城北五里乾陵在焉重直龍翻身先士卒先悉薦翻賊伏兵擒之其麾下十餘人奮不顧死追奪之賊不能拒乃斬其首棄其身而去麾下收之入城上親撫而哭之盡哀結蒲為首而葬之贈司空朱泚見其首亦哭之曰忠臣也束蒲為身而葬之李日月泚之驍將也戰死於奉天城下泚歸其尸於長安厚葬之其母竟不哭罵曰奚奴國家何負於汝而反死已晚矣及泚敗賊黨皆族誅獨日月之母不坐己巳加渾瑊京畿渭南北金商節度使建中四年壬申王武俊與馬實至趙州城下建中四年初朱泚鎮鳳翔遣其將牛雲光將幽州兵五百人戍隴州宋白曰後魏分涇岐之地置東秦州大統十七年改為隴州因隴山為名考異曰奉天記作鳳翔節度判官今從實録李楚琳作亂郝通自隴州奔歸之欲俟皋至伏兵執之以應泚事泄帥其衆奔泚至汧陽汧陽縣屬隴州九域志在州東六十里帥讀曰率汧口肩翻玉説雲光曰説式芮翻韋皋書生也君不如與我俱之隴州皋幸而受命乃吾人也不受命君以兵誅之如取孤豚耳豚與豚同豕子也皋從城上問雲光曰嚮者不告而行今而復來何也復扶又翻下同雲光曰嚮者未知公心今公有新命謂朱泚加皋中丞之命也願託腹心皋乃先納蘇玉受其詔書謂雲光曰大使苟無異心請悉納甲兵使城中無疑衆乃可入雲光以皋書生易之易以豉翻輕易乃悉以甲兵輸之而入明日皋宴玉雲光及其卒於郡舍伏甲誅之築壇盟將士曰李楚琳賊虐本使本使謂張鎰也李楚琳鎰之部曲將而殺鎰從逆故云然安能恤下隴州鳳翔巡屬也言李楚琳既虐殺其帥安能恤隴州將士乎遣兄平弇詣奉天請命於行在所恐朱泚遣兵攻之引吐蕃以為援容肇祖標點聶崇岐覆校
