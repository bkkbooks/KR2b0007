body:
  text: 資治通鑑卷第一百八十八端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀四高祖神堯大聖光孝皇帝中之上武德二年武德二年己卯六一九武德二年十一月己卯劉武周寇浩州武周復寇西河武德二年秦王世民引兵自龍門乘冰堅渡河屯柏壁柏壁在龍門關東北宋白曰柏壁在正平縣西南二十里正平絳州治所時河東州縣此河東通言大河以東非專指河東一郡未有倉廩人情恇擾恇去王翻恇懼也聚入城堡徵斂無所得斂力贍翻軍中乏食世民發教諭民民聞世民為帥而來莫不歸附此豈可以聲音笑貌致之帥所類翻自近及遠至者日多然後漸收其糧食軍食以充孔子曰足食足兵民信之矣民已信之足食足兵當知所先後也唯令偏裨乘間抄掠間古莧翻抄楚交翻大軍堅壁不戰由是賊勢日衰世民嘗自帥輕騎覘敵帥讀曰率騎奇寄翻下同覘丑廉翻又丑豔翻下同騎皆四散世民獨與一甲士登丘而寢俄而賊兵四合初不之覺會有蛇逐鼠觸甲士之面甲士驚寤遂白世民俱上馬史言世民之有天命上時掌翻為賊所及世民以大羽箭射殪其驍將史言世民不惟有天命亦武藝絶人射而亦翻殪一計翻驍堅堯翻下同將即亮翻下同武德二年李世績欲歸唐恐禍及其父謀於郭孝恪孝恪曰吾新事竇氏動則見疑宜先立效以取信然後可圖也世績從之襲王世充獲嘉破之是年閏二月王世充殺李育德取獲嘉以獻建德建德由是親之初漳南人劉黑闥少驍勇狡獪舊志貝州漳南縣漢東陽縣地後魏省東陽縣隋開皇六年分棗強清平二縣地復置東陽縣於東陽古城十八年改為漳南宋白曰取地居漳水之南為名少詩照翻驍堅堯翻獪古外翻後為㣥盜轉事郝孝德李密王世充世充以為騎將每見世充所為竊笑之世充使黑闥守新鄉舊志隋分汲獲嘉二縣地於古新樂城置新鄉縣時屬義州後屬殷州宋白曰漢書武帝將幸緱氏至汲縣之新中鄉即此地新樂城十六國時燕樂安王臧所築獻於建德建德署為將軍賜爵漢東公常使將奇兵東西掩襲或潛入敵境覘視虛實黑闥往往乘間奮擊克獲而還間古莧翻還從宣翻武德二年十二月庚申上獵于華山華戶化翻武德二年于筠說永安王孝基急攻呂崇茂說輸芮翻獨孤懷恩請先成攻具然後進孝基從之崇茂求救於宋金剛金剛遣其將善陽尉遲敬德尋相將兵奄至夏縣孝基表裏受敵軍遂大敗將即亮翻舊志朔州善陽縣漢定襄縣地有秦時馬邑城武周塞後魏置桑乾郡隋大業初置善陽縣尉紆勿翻尋姓也姓苑晉有尋曾相息亮翻是年十月呂崇茂據夏縣夏戶雅翻考異曰高祖實録云戰于下邽縣按下邽乃在關中去夏縣殊遠實録之誤也今從舊書孝基傳孝基懷恩筠唐儉及行軍總管劉世讓皆為所虜敬德名恭以字行上徵裴寂入朝責其敗軍下吏朝直遙翻敗補邁翻下遐嫁翻既而釋之寵待彌厚尉遲敬德尋相將還澮州澮古外翻秦王世民遣兵部尚書殷開山總管秦叔寶等邀之於美良川大破之斬首二千餘級頃之敬德尋相潛引精騎援王行本於蒲反騎奇寄翻下同世民自將步騎三千從間道夜趨安邑安邑古縣時屬虞州將即亮翻間古莧翻趨七喻翻大破之敬德相僅以身免悉俘其衆復歸柏壁諸將咸請與宋金剛戰世民曰金剛懸軍深入精兵猛將咸聚於是將即亮翻下同武周據太原倚金剛為扞蔽軍章十二行本軍上有金剛二字乙十一行本同孔本同張校同無蓄積以虜掠為資利在速戰我閉營養鋭以挫其鋒分兵汾隰衝其心腹汾隰隋龍泉西河二郡之地也孫愐曰汾州本漢西河郡茲氏縣地魏於茲氏置西河郡今州城是也左傳曰重耳居蒲即隰川縣故蒲城是也漢為蒲子縣後魏齊周之間為汾州隋為隰州爾雅曰下濕曰隰以州帶泉泊下濕故以隰名自當遁走當待此機未宜速戰永安壯王孝基謀逃歸劉武周殺之武德二年李世績復遣人說竇建德曰曹戴二州戶口完實隋置曹州於濟陰戴州於成武大業初廢二州併為濟陰郡大業亂復為州復扶又翻說式芮翻與鄭人外合內離王世充國號鄭指期可取既得海公以臨徐兗王世充時遣王世辨據徐州徐圓朗據袞州建德以為然欲自將徇河南先遣其行臺曹旦等將兵五萬濟河考異曰實録在來年正月今從革命記三年三年春正月將軍秦武通攻王行本於蒲反行本出戰而敗糧盡援絶欲突圍走無隨之者戊寅開門出降降戶江翻辛巳上幸蒲州斬行本蒲州治蒲反宋白曰蒲州漢之河東郡蒲反縣本舜都周為虞虢耿揚芮之地戰國時魏地漢置河東郡後魏初置雍州延和元年改泰州後周改蒲州騎奇寄翻下同宋金剛圍絳州絳州治正平癸巳上還長安三年李世績謀俟竇建德至河南掩襲其營殺之冀得其父並建德土地以歸唐會建德妻産久之不至曹旦建德之妻兄也在河南多所侵擾諸賊羈屬者皆怨之賊帥魏郡李文相號李商胡帥所類翻相息亮翻考異曰革命記作傷胡今從河洛記聚五千餘人據孟津中灘此即河陽中灘城也宋白曰中灘城東魏所築仍置河陽關灘徒旱翻亦善騎射自稱霍總管考異曰革命記商胡母張氏號女將軍今從河洛記入拜商胡之母母泣謂世績曰竇氏無道如何事之世績曰母無憂不過一月當殺之相與歸唐耳世績辭去母謂商胡曰東海公許我共圖此賊事久變生何必待其來不如速決是夜商胡召曹旦偏裨二十三人飲之酒盡殺之飲於鴆翻旦別將高雅賢阮君明尚在河北未濟商胡以巨舟四艘濟河北之兵三百人至中流悉殺之有獸醫游水得免獸醫以能醫牛馬從軍將即亮翻艘蘇遭翻告曹旦旦嚴警為備商胡既舉事始遣人告李世績世績與曹旦連營郭孝恪勸世績襲旦世績未決聞旦已有備遂與孝恪帥數十騎來奔帥讀曰率商胡復引精兵二千復扶又翻北襲阮君明破之高雅賢收衆去商胡追之不及而還還從宣翻又如字建德㣥臣請誅李蓋建德曰世績唐臣為我所虜不忘本朝乃忠臣也朝直遙翻其父何罪遂赦之甲午世績孝恪至長安曹旦遂取濟州武德之初張青特據濟北濟北郡即濟州是後建德與唐相持於虎牢張青特運糧為唐所獲蓋先以濟州降曹旦也濟子禮翻復扶又翻下同又音如字三年二月庚子上幸華陰華戶化翻三年劉武周遣兵寇潞州陷長子壺關二縣皆屬潞州宋白曰潞州春秋潞子國秦漢為上黨郡後周立潞州以其浸汾潞為名上以將軍河東王行敏助之河東縣帶蒲州即蒲反也隋開皇十六年析蒲反置縣大業初並蒲反入焉或言子武將叛行敏斬子武以徇乙巳武周復遣兵寇潞州行敏擊破之三年壬子開州蠻冉肇則陷通州舊志開州隋巴東郡之盛山縣盛山漢巴郡之胊䏰縣也義寧元年析巴東之盛山新浦通川之萬世西流置萬州武德元年改開州通州漢宕渠縣地梁置萬州元魏改通州隋為通川郡武德元年復為通州孫愐曰通州本漢宕渠縣內有地萬餘頃因名為萬州後魏以萬州居四達之路改為通州宋為達州三年甲寅遣將軍桑顯和等攻呂崇茂於夏縣夏戶雅翻三年初工部尚書獨孤懷恩攻蒲反久不下失亡多上數以敕書誚讓之數所角翻誚才笑翻懷恩由是怨望上嘗戲謂懷恩曰姑之子皆已為天子謂隋煬帝及上也懷恩亦頗以此自負或時扼腕曰我家豈女獨貴乎周明帝后隋文帝后及上母皆獨孤氏腕烏貫翻會懷恩君寶與唐儉皆沒於尉遲敬德尉紆勿翻君寶謂儉曰獨孤尚書近謀大事若能早決豈有此辱哉及秦王世民敗敬德於美良川敗補邁翻懷恩逃歸上復使之將兵攻蒲反復扶又翻下同將即亮翻下同君寶又謂儉曰獨孤尚書遂拔難得還難乃旦翻復在蒲反可謂王者不死儉恐懷恩遂成其謀乃說尉遲敬德說輸芮翻尉紆勿翻請使劉世讓還與唐連和敬德從之遂以懷恩反狀聞時王行本已降降戶江翻下同懷恩入據其城上方濟河幸懷恩營已登舟矣世讓適至上大驚曰吾得免豈非天也乃使召懷恩懷恩未知事露輕舟來至即執以屬吏屬之欲翻分捕黨與甲寅誅懷恩及其黨三年竇建德攻李商胡殺之建德張德下脫至字洺州勸課農桑境內無盜商旅野宿三年突厥處羅可汗迎楊政道立為隋王楊政道齊王暕遺腹之子厥九勿翻處昌呂翻可從刊入聲汗音寒處羅悉以配之有衆萬人置百官皆依隋制居于定襄此蓋隋之定襄郡也治大利城三年三月乙丑劉武周遣其將張萬歲寇浩州將即亮翻李仲文擊走之俘斬數千人三年改納言為侍中內史令為中書令給事郎為給事中復舊官名也杜佑曰漢制給事中日上朝謁平尚書奏事以有事殿中故曰給事中東漢省魏復置南北朝因之後周天官之屬有給事中掌治六經給事左右其後別置給事中在六官之外隋初於吏部置給事郎至煬帝移為門下之職置員四人以省讀奏章至是改為給事中龍朔二年改東臺舍人咸亨元年復舊掌侍從讀署奏抄較正違失分判省事給事中蓋因漢之名行周隋之職三年甲戌以內史侍郎封德彞為中書令三年王世充將帥州縣來降者時月相繼帥所類翻降戶江翻世充乃峻其法一人亡叛舉家無少長就戮少詩照翻長知兩翻父子兄弟夫婦許相告而免之又使五家為保有舉家亡者四鄰不覺皆坐誅殺人益多而亡者益甚至於樵采之人出入皆有限數公私愁窘窘渠隕翻人不聊生又以宮城為大獄意所忌者並其家屬收繫宮中諸將出討亦質其家屬於宮中將即亮翻質音致禁止者常不減萬口餒死者日有數十世充又以臺省官為司鄭管原伊殷梁湊嵩谷懷德等十二州營田使世充以洛州為司州汜水為鄭州管城為管州沁水為原州襄城為伊州獲嘉為殷州睢陽為梁州湊州闕九域志鄭州古跡有湊水當置湊州於此嵩陽為嵩州大谷為谷州河內為懷州武德為德州喜若登仙丞郎尚書左右丞及諸曹郎也史言王世充將敗三年甲申行軍副總管張綸敗劉武周於浩州敗補邁翻俘斬千餘人三年西河公張綸此張綸即上張綸上書其官此書其爵石州隋之離石郡乙酉以季真為石州總管賜姓李氏封彭山郡王三年蠻酋冉肇則寇信州按新志信州隋之巴東郡武德二年改為夔州史以舊州名書之杜佑曰夔州春秋時為魚國梁置信州唐武德二年避皇外祖獨孤信諱改為夔州治奉節縣酋慈由翻不利李靖將兵八百襲擊斬之將即亮翻俘五千餘人己丑復開通二州孝恭又擊蕭銑東平王闍提斬之闍視遮翻考異曰舊書蕭銑傳云孝恭討之拔其開通二州斬其僞東平王蕭闍提按實録云冉肇則陷我通州又云孝恭復開通二州若二州本屬銑不當云我與復蓋肇則先據開州又陷通州以地附銑銑使闍提助之耳三年夏四月丙申上祠華山壬寅還長安華戶化翻從還宣翻三年置益州道行臺以益利會鄜涇遂六總管隸焉益州隋之蜀郡利州隋之義城郡梁之黎州晉之晉壽蜀之漢壽漢之葭萌也會州隋之涼川縣會寧鎮西魏之會州也鄜州隋之上郡西魏之敷州後魏之北華州中部敷城郡也太和中為東秦州涇州隋之安定郡遂州隋之遂寧郡漢之廣漢縣也是時益州行臺所統起蜀跨隴而東北三年劉武周數攻浩州為李仲文所敗數所角翻敗補邁翻宋金剛軍中食盡丁未金剛北走秦王世民追之三年羅士信圍慈澗隋志河南郡壽安縣有慈澗水經注新安有孝水孝水東十里有水世謂之慈澗章十二行本救作拒乙十一行本同孔本同士信刺玄應墜馬刺七亦翻人救之得免三年壬子以顯州道行臺楊士林為行臺尚書令去年正月楊士林降三年甲寅加秦王世民益州道行臺尚書令三年秦王世民追及尋相於呂州新志義寧元年以晉州之霍邑趙城汾西汾州之靈石置霍山郡武德元年曰呂州呂州蓋治霍邑也相息亮翻乘勝逐北一晝夜行二百餘里戰數十合至高壁嶺總管劉弘基執轡諫曰大王破賊逐北至此功亦足矣深入不已不愛身乎且士卒飢疲宜留壁於此俟兵糧畢集然後復進未晚也復扶又翻下同世民曰金剛計窮而走衆心離沮功難成而易敗機難得而易失沮在呂翻易以豉翻必乘此勢取之若更淹留使之計立備成不可復攻矣吾竭忠徇國豈顧身乎遂策馬而進將士不敢復言飢將即亮翻追及金剛於雀鼠谷一日八戰皆破之俘斬數萬人夜宿於雀鼠谷西原世民不食二日不解甲三日矣軍中止有一羊世民與將士分而食之將即亮翻丙辰陝州總管于筠自金剛所逃來陝失冉翻去年十二月筠為金剛將所擒世民引兵趣介休介休介州治所趣七喻翻又逡須翻出章十二行本出上有戊午二字乙十一行本同孔本同張校同退齊校同西門背城布陳背蒲妹翻陳讀曰陳南北七里世民遣總管李世績與戰小卻為賊所乘世民帥精騎擊之帥讀曰率騎奇寄翻出其陳後金剛大敗斬首三千級金剛輕騎走世民追之數十里至張難堡張難蓋人姓名築堡自守因以名之世民免胄示之堡中喜譟且泣左右告以王不食獻濁酒脫粟飯尉遲敬德收餘衆守介休尉紆勿翻世民遣任城王道宗宇文士及往諭之任音壬敬德與尋相舉介休及永安降永安漢中陽縣也後魏更名時屬浩州雀鼠谷在永安介休二縣間甚喜以為右一府統軍使將其舊衆八千與諸營相參將即亮翻下同屈突通慮其變驟以為言世民不聽劉武周聞金剛敗大懼棄並州走突厥金剛收其餘衆欲復戰衆莫肯從亦與百餘騎走突厥秦王之破劉武周宋金剛與破薛仁杲宗羅睺方略一也復扶又翻走音奏下同厥九勿翻世民至晉陽武周所署僕射楊伏念以城降降戶江翻唐儉封府庫以待世民唐儉與于筠同被禽未幾金剛謀走上谷突厥追獲腰斬之金剛本起於上谷幾居豈翻秦王世民擒斬之其兄季真棄石州奔劉武周將馬邑高滿政滿政殺之去年五月劉六兒降今年三月季真降而實附金剛武周今皆誅死武周之南寇也其內史令苑君璋諫曰唐主舉一州之衆直取長安所向無敵此乃天授非人力也晉陽以南道路險隘縣軍深入縣讀曰懸無繼於後若進戰不利何以自還還從宣翻不如北連突厥南結唐朝厥九勿翻朝直遙翻南面稱孤足為長策武周不聽留君璋守朔州及敗泣謂君璋曰不用君言以至於此久之武周謀亡歸馬邑事泄突厥殺之突厥又以君璋為大行臺統其餘衆仍令郁射設督兵助鎮三年庚申懷州總管黃君漢擊王世充太子玄應於西濟州大破之新志武德二年王世充將丁伯德以濟源縣來降置西濟州曰西者以別濟北之濟州濟子禮翻又破之三年辛酉王世充陷鄧州三年上聞並州平大悅壬戌宴㣥臣賜繒帛使自入御府盡力取之唐御府蓋屬內侍省內府局六典內府令掌中宮府藏寶貨給納名數凡朝會五品已上賜絹及雜綵金銀器於殿庭者並供之今使各稱力自取繒帛繒慈陵翻仍以為並州道安撫大使使疏吏翻所籍獨孤懷恩田宅資財悉以賜之賞其發懷恩反謀也世民留李仲文鎮並州劉武周數遣兵入寇此言武周未死之前數所角翻下城堡百餘所謂馬邑郡界城堡也檢校官未為真三年五月竇建德遣高士興擊李藝於幽州不克退軍籠火城藝襲擊大破之斬首五千級建德大將軍王伏寶勇略冠軍中冠古玩翻諸將疾之將即亮翻下同言其謀反建德殺之伏寶曰大王奈何聽讒言自斬左右手乎三年初尉遲敬德將兵助呂崇茂守夏縣上潛遣使赦崇茂罪拜夏州刺史蓋以夏縣為夏州使疏吏翻夏戶雅翻尉紆勿翻事泄敬德殺之敬德去崇茂餘黨復據夏縣拒守復扶又翻秦王世民引軍自晉州還攻夏縣壬午屠之考異曰高祖實録帝曰平薛舉之初不殺奴賊致生叛亂若不盡誅必為後患詔勝兵者悉斬之疑作實録者歸太宗之過於高祖今不取三年辛卯秦王世民至長安三年是月突厥遣阿史那揭多獻馬千匹於王世充厥九勿翻揭居謁翻且求婚世充以宗女妻之妻七細翻並與之互市三年六月壬辰詔以和州總管東南道行臺尚書令楚王杜伏威為使持節總管江淮以南諸軍事揚州刺史東南道行臺尚書令淮南道安撫使進封吳王賜姓李氏使疏吏翻下同以輔公祏為行臺左僕射封舒國公祏音石三年丙午立皇子元景為趙王元昌為魯王元亨為酆王三年顯州行臺尚書令楚公楊士林雖受唐官爵而北結王世充南通蕭銑詔廬江王瑗與安撫使李弘敏討之瑗于眷翻兵未行長史田瓚為士林所忌甲寅瓚殺士林降於世充世充以瓚為顯州總管長知兩翻瓚藏旱翻降戶江翻三年秦王世民之討劉武周也突厥處羅可汗遣其弟步利設帥二千騎助唐厥九勿翻處昌呂翻可從刊入聲汗音寒帥讀曰率騎奇寄翻武周既敗是月處羅至晉陽總管李仲文不能制又留倫特勒使將數百人云助仲文鎮守自石嶺以北皆留兵戍之而去石嶺關在代州杜佑曰欣州定襄縣漢陽曲縣有石嶺關甚嶮固三年上議擊王世充世充聞之選諸州鎮驍勇皆集洛陽驍堅堯翻置四鎮將軍募人分守四城謂洛陽四城也七月壬戌詔秦王世民督諸軍擊世充陝東道行臺屈突通二子在洛陽時命通判陝東道行臺左僕射從秦王東征屈區勿翻今欲使卿東征如卿二子何通曰臣昔為俘囚分當就死陛下釋縛加以恩禮事見一百八十四卷義寧元年十二月分扶問翻臣心口相誓期以更生餘年為陛下盡節為于僞翻但恐不獲死所耳今得備先驅二兒何足顧乎上歎曰徇義之士一至此乎三年癸亥突厥遣使潛詣王世充潞州總管李襲譽邀擊敗之使疏吏翻敗補邁翻虜牛羊萬計三年驃騎大將軍可朱渾定遠可朱渾虜三字姓驃匹妙翻騎奇寄翻並州總管李仲文與突厥通謀欲俟洛陽兵交引胡騎直入長安甲戌命皇太子鎮蒲反以備之又遣禮部尚書唐儉安撫並州暫廢並州總管府暫與暫同朝直遙翻三年壬午秦王世民至新安九域志新安在洛州西七十里考異曰高祖實録丙戌至新安蓋據奏到之日今從河洛記襄陽襄州宋王泰鎮懷州齊王世惲檢校南城楚王世偉守寶城太子玄應守東城漢王玄恕守含嘉城魯王道徇守曜儀城六典東都皇城在都城之西北隅東城在皇城之東皇城在東城之內皇宮在皇城之北以地望準之南城蓋在皇城之南端門之外曜儀城蓋在東城之東含嘉城則含嘉倉城寶城即寶城朝堂蓋皇城也惲於粉翻將即亮翻下同左輔大將軍楊公卿帥左龍驤二十八府騎兵右游擊大將軍郭善才帥內軍二十八府步兵左游擊大將軍跋野綱跋野虜復姓帥讀曰率驤思將翻騎奇寄翻下同總三萬人以備唐弘烈行本世偉之子泰世充之兄子也三年梁師都引突厥稽胡兵入寇厥九勿翻行軍總管段德操擊破之斬首千餘級三年羅士信將前軍圍慈澗世充自將兵三萬救之己丑秦王章十二行本王下有世民二字乙十一行本同張校同云無注本亦無將輕騎前覘世充覘丑廉翻又丑豔翻猝與之遇衆寡不敵道路險厄為世充所圍考異曰太宗實録云師次穀州王充以精兵三萬來拒戰太宗帥輕騎挑之衆寡不敵被圍數重太宗引弓馳射皆應弦而倒獲其大將燕頎賊乃退舊書太宗紀云太宗命左右先歸獨留後殿世充驍將單雄信數百騎夾道來逼交槍競進太宗幾為所敗太宗左右射之無不應弦而倒獲其大將燕頎單雄信傳云太宗圍逼東都雄信出軍拒戰援槍而至幾及太宗徐世績呵止之曰此秦王也雄信惶懼遂退太宗由是獲免按劉餗小說英公績與海陵王元吉圍洛陽元吉恃膂力每親行圍王世充召雄信告之酌以金碗雄信盡飲馳馬而出槍不及海陵者一尺績惶遽連呼曰阿兄此是績王雄信乃攬轡而止顧笑曰胡兒不緣你且竟舊書蓋承此致誤耳雄信若知是秦王則取之尤切安肯惶懼而退借如小說所云雄信既受世充之命指取元吉亦安肯以績故而捨之況元吉之圍東都績乃從太宗在武牢今不取章十二行本射下有皆應弦而斃五字乙十一行本同孔本同張校同退齊校同獲其左建威將軍燕琪燕因肩翻考異曰高祖實録作燕頃太宗實録作燕傾舊太宗紀作燕頎今從河洛記世充乃退世民還營塵埃覆面覆敷又翻軍不復識欲拒之復扶又翻世民免胄自言乃得入旦日帥步騎五萬進軍慈澗帥讀曰率騎奇寄翻世充拔慈澗之戍歸于洛陽世民遣行軍總管史萬寶自宜陽南據龍門此伊闕之龍門也酈道元曰伊水北入伊闕昔大禹疏以通水兩山相對望之若闕故謂之伊闕春秋昭公二十六年趙鞅使女寬守闕塞即此傅毅東都賦曰因龍門以暢化開伊闕以達聰是後武后居東都數遊龍門正此地也行戶剛翻上谷公王君廓自洛口斷其餉道斷丁管翻懷州總管黃君漢自河陰攻回洛城大軍屯于北邙連營以逼之世充洧州長史繁水張公謹與刺史崔樞以州城來降世充蓋以扶溝鄢陵置洧州隋志繁水縣屬武陽郡唐貞觀十八年併入昌樂縣屬魏州洧音于軌翻降戶江翻下同三年八月丁酉南寧西爨蠻遣使入貢初隋末蠻酋爨玩反誅諸子沒為官奴棄其地爨玩見一百七十八卷隋文帝開皇十七年十八年使疏吏翻酋慈由翻以玩子弘達為昆州刺史新志昆州本隋置隋亂廢武德元年開南中復置領晉寧秦臧等縣益州刺史段綸因遣使招諭其部落皆來降三年己亥竇建德共州縣令唐綱殺刺史以州來降新志衛州共城縣武德元年置共州去年竇建德破降李世績取衛州故共州亦附建德唐綱當是共城縣令也共讀曰恭降戶江翻三年鄧州土豪執王世充所署刺史來降是年五月王世充陷鄧州三年癸卯梁師都石堡留守張舉帥千餘人來降此石堡蓋在夏州東非開元天寶間與吐蕃爭之石堡城也守式又翻帥讀曰率下同三年甲辰黃君漢遣校尉張夜叉以舟師襲回洛城克之以舟師自懷州渡河襲破回洛斷河陽南橋而還降其堡聚二十餘將即亮翻斷丁管翻還從宣翻聚才喻翻世充使太子玄應帥楊公卿等攻回洛不克考異曰革命記作公鄉河洛記唐書作公卿今從之留兵戍之世充陳於青城宮秦王世民亦置陳當之今世以郊天齊宿大次為青城宮其地當在都城之南此青城宮若在洛城西北按六典洛城西禁苑北拒北邙西至孝水南帶洛水支渠穀洛二水會于其間中有合壁翠微宿羽青城等十一宮陳讀曰陳隋室傾覆唐帝關中鄭帝河南世充未嘗西侵王忽舉兵東來何也世民使宇文士及應之曰四海皆仰皇風唯公獨阻聲教為此而來為于僞翻世充曰相與息兵講好不亦善乎又應之曰奉詔取東都不令講好也好呼到翻至暮各引兵還三年上遣使與竇建德連和建德遣同安長公主隨使者俱還同安長公主上同母媦黎陽之破沒於竇建德使疏吏翻長知兩翻三年乙卯劉德威襲懷州入其外郭下其堡聚三年九月庚午梁師都將劉旻以華池來降以為林州總管慶州華池縣西魏之蔚州也後周州廢隋仁壽初置華池縣今置林州將即亮翻降戶江翻三年癸酉王世充顯州總管田瓚以所部二十五州來降是年六月田瓚降世充瓚藏旱翻世充使王弘烈鎮襄陽自襄陽至洛路出南陽鄧州既屬唐南陽之路不可由矣則自顯州出蔡汝以至洛顯州今又降唐故襄陽聲問絶三年史萬寶進軍甘泉宮漢甘泉宮在京兆醴泉縣史萬寶自新安進軍逼洛陽不應至漢之甘泉宮隋志河南壽安縣後魏之甘棠縣有顯仁宮或者以顯仁宮為甘棠宮也泉恐當作棠丁丑秦王世民遣右武衛將軍王君廓攻轘轅拔之新志洛州緱氏縣東南有轘轅故關轘音環君廓僞遁設伏大破之遂東徇地至管城而還隋志滎陽郡管城縣舊曰中牟開皇十六年析置管城縣十八年省內牟入焉隋改中牟曰內牟時為管州治所將即亮翻下同還從宣翻王世充將郭士衡許羅漢掠唐境先悉薦翻君廓以策擊卻之詔勞之曰勞力到翻卿以十三人破賊一萬自古以少制衆未之有也少詩沼翻世充尉州刺史時德睿帥所部夏陳隨許潁尉七州來降王世充蓋置州於雍丘夏州於陽夏陳州於宛丘隨州無所考意洧州之誤也許州於長社潁州於汝陰尉州於尉氏帥讀曰率降戶江翻下同無所變易改尉州為南汴州於是河南郡縣相繼來降劉武周降將尋相等多叛去諸將疑尉遲敬德囚之軍中相息亮翻尉紆勿翻行臺左僕射屈突通尚書殷開山言於世民曰敬德驍勇絶倫屈九勿翻驍堅堯翻今既囚之心必怨望留之恐為後患不如遂殺之世民曰不然敬德若叛豈在尋相之後邪邪音耶遽命釋之引入臥內賜之金曰丈夫意氣相期勿以小嫌介意吾終不信讒言以害忠良公宜體之必欲去者以此金相資表一時共事之情也辛巳世民以五百騎行戰地騎奇寄翻下同行視地形可置陳處行下孟翻登魏宣武陵魏宣武陵曰景陵在北邙山魏世宗諡宣武帝圍之單雄信引槊直趨世民帥讀曰率下同槊所角翻趨七喻翻敬德躍馬大呼橫刺雄信墜馬呼火故翻刺七亦翻世充兵稍卻敬德翼世民出圍世民敬德更帥騎兵還戰出入世充陳往反無所礙屈突通引大兵繼至世充兵大敗僅以身免擒其冠軍大將軍陳智略陳讀曰陳下同冠古玩翻考異曰實録丙戌太宗與世充相遇於魏宣武陵擊大破之斬數千級獲陳智略舊書敬德傳太宗既釋之是日從獵於榆窠世充引步騎數萬來戰單雄信直趨太宗敬德刺雄信墜馬翼太宗出圍更帥騎兵交戰擒陳智略據擒智略則宣武榆窠之戰共是一事也實録據奏到日河洛記在二十一日今從之斬首千餘級獲排矟兵六千排矟言執排執矟者也矟與槊同公何相報之速也賜敬德金銀一篋篋苦協翻自是寵遇日隆敬德善避矟每單騎入敵陳中敵叢矟刺之終莫能傷又能奪敵矟返刺之刺七亦翻齊王元吉以善馬矟自負聞敬德之能請各去刃相與校勝負敬德曰敬德謹當去之王勿去也既而元吉刺之終不能中去羌呂翻中竹仲翻秦王世民問敬德曰奪矟與避矟孰難敬德曰奪矟難乃命敬德奪元吉矟元吉操矟躍馬志在刺之操七刀翻敬德須臾三奪其矟元吉雖面相歎異內甚恥之三年叛胡陷嵐州嵐盧含翻三年初王世充以邴元真為滑州行臺僕射濮州刺史杜才幹隋志東平郡鄄城縣舊置濮陽郡開皇十六年置濮州大業初廢州以鄄城縣屬東平蓋李密復置州也濮博木翻將即亮翻恨元真叛密叛密事見一百八十六卷元年九月降戶江翻下同元真恃其官勢自往招慰才幹出迎延入就坐坐徂臥翻執而數之曰數所具翻又所主翻汝本庸才魏公置汝元僚謂李密以為長史乃構滔天之禍今來送死是汝之分分扶問翻遂斬之遣人齎其首至黎陽祭密墓壬午以濮州來降三年突厥莫賀咄設寇涼州總管楊恭仁擊之為所敗厥九勿翻咄當沒翻敗補邁翻掠男女數千人而去三年丙戌以田瓚為顯州總管賜爵蔡國公瓚藏旱翻三年冬十月甲午王世充大將軍張鎮周來降三年甲辰行軍總管羅士信襲王世充硤石堡拔之水經注穀水自新安縣東流徑千秋亭又東徑雍谷溪回岫縈紆石路阻峽故亦有峽石之稱考異曰河洛記作峽山堡今從實録此於古千金堨築堡也水經注穀水徑周乾祭門北東至千金堨河南境簿曰河南縣城東十五里有千金堨洛陽記曰千金堨舊堨穀水魏時更修此堨謂之千金堨士信夜遣百餘人抱嬰兒數十至堡下使兒啼呼詐云從東都來歸羅總管既而相謂曰此千金堡也吾屬誤矣即去堡中以為士信已去來者洛陽亡人出兵追之士信伏兵於道伺其門開突入屠之伺相吏翻三年竇建德之圍幽州也是年五月建德兵攻幽州開道帥二千騎救之建德兵引去開道因藝遣使來降帥讀曰率騎奇寄翻使疏吏翻降下江翻戊申以開道為蔚州總管蔚州隋鴈門郡之靈丘上谷郡之飛狐縣地蔚紆勿翻封北平郡王開道有矢鏃在頰召醫出之醫曰鏃深不可出開道怒斬之別召一醫曰出之恐痛又斬之更召一醫醫曰可出乃鑿骨置楔其間楔先結翻骨裂寸餘竟出其鏃開道奏妓進膳不輟妓渠綺翻三年竇建德帥衆二十萬復攻幽州建德兵已攀堞復扶又翻堞達協翻薛萬均萬徹帥敢死士百人從地道出其背掩擊之建德兵潰走斬首千餘級李藝兵乘勝薄其營建德陳於營中陳讀曰陳填塹而出奮擊大破之塹七豔翻建德逐北至其城下攻之不克而還還從宣翻又音如字三年李密之敗也見一百八十六卷元年九月復姓楊氏楊慶歸密改姓事見一百八十四卷義寧元年十一月見上卷本年四月世充以為管州總管妻以兄女妻七細翻秦王世民逼洛陽慶潛遣人請降降戶江翻世民遣總管李世績將兵往據其城將即亮翻下四將其將同慶欲與其妻偕來妻曰主上使妾侍巾櫛者櫛阻瑟翻梳也欲結君之心也今君既辜付託辜負也妾將如君何若至長安則君家一婢耳君何用為願送至洛陽君之惠也慶不許慶出妻謂侍者曰若唐遂勝鄭則吾家必滅鄭若勝唐則吾夫必死人生至此何用生為遂自殺庚戌慶來降復姓楊氏拜上柱國郇國公郇音荀時世充太子玄應鎮虎牢軍于榮汴之間榮當作滎言軍于滎澤汴水之間章十二行本正作滎張校同引兵趣管城趣七喻翻又逡須翻李世績擊卻之使郭孝恪為書說榮州刺史魏陸王世充蓋以滎陽縣置滎州作榮亦誤也章十二行本正作滎孔本同玄應遣大將軍張志就陸徵兵丙辰陸擒志等四將舉州來降陽城令王雄帥諸堡來降秦王世民使李世績引兵應之以雄為嵩州刺史新志陽城縣屬洛州又云武德四年王世充僞令王雄來降以陽城嵩陽陽翟置嵩州與此所書稍差二三月嵩南謂嵩山以南停其東道之兵令其將張慈寶且還汴州又密告汴州刺史王要漢使圖慈寶要漢斬慈寶以降玄應聞諸州皆叛大懼奔還洛陽詔以要漢為汴州總管賜爵郳國公郳五稽翻三年王弘烈據襄陽上令金州總管府司馬涇陽李大亮安撫樊鄧以圖之十一月庚申大亮攻樊城鎮拔之隋志西城郡梁置梁州尋改曰南梁州西魏改東梁州尋改金州置總管府府置長史司馬舊志襄州鄧城縣漢鄧縣屬南陽郡古樊城也宋改安養縣此時樊城鎮當在安養縣界下其城柵十四將即亮翻三年蕭銑性褊狹多猜忌諸將恃功恣橫好專誅殺橫戶孟翻好呼到翻銑患之乃宣言罷兵營農實欲奪諸將之權大司馬董景珍弟為將軍怨望謀作亂事泄伏誅景珍時鎮長沙長沙潭州治所召還江陵景珍懼甲子以長沙來降降戶江翻詔峽州刺史許紹出兵應之三年雲州總管郭子和隋志定襄郡開皇五年置雲州總管府治大利城既而襲師都寧朔城克之新志寧朔縣屬夏州後周置先悉薦翻厥九勿翻詗休正翻釁許覲翻為突厥候騎所獲使疏吏翻騎奇寄翻處羅可汗大怒囚其弟子升子和自以孤危請帥其民南徙處昌呂翻可從刊入聲汗音寒帥讀曰率考異曰子和傳云四年拔戶口南徙按處羅可汗以今年卒故置此詔以延州故城處之處昌呂翻三年張舉劉旻之降也是年八月張舉降九月劉旻降遣其尚書陸季覽說突厥處羅可汗曰比者中原喪亂說輸芮翻比毗至翻喪息浪翻分為數國勢均力弱故皆北面歸附突厥今定楊可汗既亡是年四月劉武周敗亡師都不辭灰滅亦恐次及可汗不若及其未定南取中原如魏道武所為事見晉孝武帝紀鄉讀曰嚮處羅從之謀使莫賀咄設入自原州平涼郡置原州處昌呂翻咄當沒翻章十二行本州下有處羅入自並州六字乙十一行本同孔本同張校同退齊校同突利可汗與奚霫契丹靺鞨入自幽州可從刊入聲汗音寒奚與契丹本皆東胡種保烏丸山者其後為奚保鮮卑山者其後為契丹霫與突厥同俗保冷陘山南契丹東靺鞨西拔野古靺鞨居肅慎地亦曰挹婁元魏時曰勿吉霫而立翻契欺訖翻又音喫靺莫撥翻鞨戶割翻考異曰舊突厥傳大業中突利年數歲始畢遣領東牙之兵號泥步設頡利嗣位以為突利可汗按梁師都傳此際有泥步設又有突利可汗然則突利處羅時已為小可汗非頡利嗣位後也高祖實録云處羅欲分兵大掠中國於懷戎鴈門靈武涼州四道俱入今從舊書梁師都傳會于晉絳滏口滏水之口在磁州滏陽縣界晉州隋之臨汾郡絳州隋之絳郡滏音釜處羅之弟咄苾也突利者始畢之子什鉢苾也咄當沒翻苾毗必翻處羅又欲取並州以居楊政道楊政道時居定襄處羅曰我父失國賴隋得立事見一百七十八卷隋開皇十九年將出師而卒卒子恤翻義成公主以其子奧射設醜弱廢之更立莫賀咄設更工衡翻號頡利可汗乙酉頡利遣使告處羅之喪使疏吏翻上禮之如始畢之喪去年四月始畢卒三年戊子安撫大使李大亮取王世充沮華二州襄州南漳縣後周置沮州南漳漢之臨沮縣也隋廢沮州蓋王世充復置漢南縣宋置華山郡西魏廢郡王世充蓋取宋郡名而置華州也漢南縣唐貞觀八年省併入宜城沮子魚翻華戶化翻三年是月竇建德濟河擊孟海公考異曰實録在十二月丙午蓋於時唐始聞之遣劉世讓攻洺州之日也今從革命記初王世充侵建德黎陽建德襲破殷州以報之殷州治獲嘉此皆去年冬事信使不通及唐兵逼洛陽世充遣使求救於建德使疏吏翻考異曰隋季革命記曰世充亦自遣使求救於建德云夏王或率領軍師來相救援王取東都河洛之地北收並汾南盡揚越充乃取京師蒲絳以西通蜀荊襄之境並據山河之險長為弟兄之國按世充止有河洛之地豈肯遽以賂建德借有是言建德亦何由肯信今從河洛記建德中書侍郎劉彬說建德曰天下大亂唐得關西鄭得河南夏得河北共成鼎足之勢今唐舉兵臨鄭自秋涉冬唐兵日增鄭地日蹙唐強鄭弱勢必不支鄭亡則夏不能獨立矣說輸芮翻夏戶雅翻不如解仇除忿發兵救之夏擊其外鄭攻其內破唐必矣唐師既退徐觀其變若鄭可取則取之並二國之兵乘唐師之老天下可取也建德從之遣使詣世充許以赴援又遣其禮部侍郎李大師等詣唐請罷洛陽之兵秦王世民留之不答三年十二月辛卯王世充許亳等十一州皆請降許州隋之潁川郡亳州隋之譙郡亳蒲博翻降戶江翻三年壬辰燕郡王李藝又擊竇建德軍於籠火城破之燕因肩翻三年辛丑王世充隨州總管徐毅舉州降隨州隋之漢東郡三年癸卯峽州刺史許紹攻蕭銑荊門鎮拔之荊門在荊州長林縣峽州北境接鄭之襄州東境接梁之荊門皆殺之紹得二境士卒皆資給遣之敵人愧感不復侵掠境內以安復扶又翻三年蕭銑遣其齊王張繡攻長沙董景珍謂繡曰前年醢彭越往年殺韓信卿不見之乎何為相攻引漢高祖殺功臣事以恐動繡進兵圍之景珍欲潰圍走為麾下所殺銑以繡為尚書令繡恃功驕橫橫戶孟翻銑又殺之由是功臣諸將皆有離心兵勢益弱史言蕭銑將亡三年王世充遣其兄子代王琬長孫安世詣竇建德報聘且乞師長知兩翻三年突厥倫特勒在並州大為民患是年六月突厥留倫特勒於並州厥九勿翻上聞之甚喜張道源從竇建德在河南去年九月道源為建德所執請出兵攻洺州以震山東竇建德都洺州洺音名丙午詔世讓為行軍總管使將兵出土門趣洺州新志恆州鹿泉縣有故井陘關一名土門關鹿泉漢之石邑也三年己酉瓜州刺史賀拔行威執驃騎將軍達奚皓瓜州隋之敦煌郡騎奇寄翻驃匹妙翻皓古老翻三年是歲李子通渡江攻沈法興取京口京口時屬揚州延陵縣戰於庱亭庱亭在毗陵西北庱丑拯翻又恥陵翻法興棄毗陵奔吳郡毗陵至吳郡百八十里降戶江翻子通以法興府掾李百藥為內史侍郎國子祭酒掾于絹翻杜伏威遣行臺左僕射輔公祏祏音石將卒數千攻子通將即亮翻以將軍闞稜王雄誕為之副公祏渡江攻丹陽克之進屯溧水隋志丹陽郡治江寧溧水以縣屬焉本溧陽縣開皇十八年更名自丹陽至溧水二百四十里溧音栗帥讀曰率公祏簡精甲千人執長刀為前鋒簡選也分別也曰有退者即斬之自帥餘衆復居其後帥讀曰率復扶又翻下同子通為方陳而前陳讀曰陳公祏前鋒千人殊死戰公祏復張左右翼以擊之子通敗走公祏逐之反為所敗敗補邁翻還閉壁不出王雄誕曰子通無壁壘又狃於初勝狃女九翻乘其無備擊之可破也公祏不從雄誕以其私屬數百人夜出擊之私屬親兵不在大軍名籍者子通大敗降其卒數千人降戶江翻子通食盡棄江都保京口江西之地盡入於伏威廬和等州皆江西也子通復東走太湖太湖在蘇州吳縣東南五十里得二萬人襲沈法興於吳郡大破之法興帥左右數百人棄城走吳郡賊帥聞人遂安遣其將葉孝辨迎之聞人復姓今吳中亦以為著姓賊帥所類翻將即亮翻欲殺孝辨更向會稽會稽越州會古外翻法興窘迫赴江溺死子通軍勢復振章十二行本振下有帥其㣥臣四字乙十一行本同孔本同張校同退齊校同徙都餘杭餘杭杭州北自太湖南至嶺嶺五嶺也西距宣城按子通之地西距宣城耳南境安能至嶺哉史大而言之耳會古外翻三年廣新二州賊帥高法澄沈寶徹殺隋官據州附於林士弘隋志南海郡廣州信安郡新興縣梁置新州宋白曰新州秦始皇所取陸梁地漢為合浦臨元縣晉置新寧郡梁置新州馮盎自大業之亂歸嶺南未受朝命故書隋官守式又翻盎引兵擊之賊始合盎免胄大呼曰呼火故翻爾識我乎賊多棄仗肉袒而拜馮盎自其祖母洗夫人以來威令行於嶺南故然擒寶徹智臣等嶺外遂定三年竇建德行臺尚書令恆山胡大恩請降恆山恆州恆戶登翻降戶江翻四年四年春正月癸酉以大恩為代州總管代州隋之鴈門郡賜姓李氏代州石嶺之北自劉武周之亂寇盜充斥大恩徙鎮鴈門鴈門漢廣武縣隋更名隋唐代州皆治鴈門漢鴈門郡治陰館李大恩豈徙鎮漢鴈門邪宋白曰句注在代州西北三十五里鴈門界西陘山也始皇十三年移樓煩於善無縣今句注山北下館城是也故續漢書云鴈門郡理陰館建安立新興郡陘北悉棄之其地荒廢魏文帝移鴈門郡南渡句注置廣武城即今州西廣武故城是也後魏明帝又移置廣武東古上館城內即今州城是也或曰李大恩自恆山請降授代州總管故自恆山徙鎮鴈門悉平之四年稽胡酋帥劉仚成部落數萬為邊寇酋慈由翻帥所類翻仚許延翻辛巳詔太子建成統諸軍討之四年王世充梁州總管程嘉會以所部來降後魏置梁州於浚儀因古大梁城以名州也此時以浚儀為汴州而隋之梁郡治宋城縣宋城古睢陽也漢梁國都之後魏以來以睢陽為梁郡王世充當於此置梁州四年杜伏威遣其將陳正通徐紹宗帥精兵二千來會秦王世民擊王世充將即亮翻帥讀曰率考異曰舊書杜伏威傳太宗之圍王世充遣使招之伏威請降高祖遣使就拜東南道行臺尚書令江淮以南安撫大使上柱國封吳王賜姓李氏按伏威封吳王在太宗討王世充前今從高祖太宗實録甲申攻梁克之梁縣屬伊州杜佑曰汝州梁縣漢舊縣戰國時謂之南梁以別大梁少梁也四年丙戌黔州刺史田世康黔州隋之黔安郡古黔中也黔音琴皆克之四年秦王世民選精鋭千餘騎皆皂衣玄甲分為左右隊使秦叔寶程知節尉遲敬德翟長孫分將之騎奇寄翻下同尉紆勿翻翟萇伯翻長知兩翻將即亮翻下同每戰世民親被玄甲帥之為前鋒被皮義翻帥讀曰率下同乘機進擊所向無不摧破敵人畏之行臺僕射屈突通贊皇公竇軌屈九勿翻軌封贊皇縣公贊皇縣屬趙州隋開皇十六年置劉昫曰取贊皇山為名引兵按行營屯行下孟翻猝與王世充遇戰不利秦王世民帥玄甲救之世充大敗獲其騎將葛彥璋考異曰太宗實録云初羅士信取千金堡太宗令屈突通守之王充自來攻堡通懼舉烽請救太宗度通力堪自守且緩救以驕世充通舉三烽以告急太宗方出援之左右未獲從以兩騎而進遇賊騎將葛彥璋射之應弦而墜擒之於陳後軍亦繼至通軍復振表裏奮擊王充大敗俘斬六千餘人幾獲世充今從河洛記世充遁歸四年李靖說趙郡王孝恭以取蕭銑十策孝恭上之說輸芮翻上時掌翻考異曰高祖實録孝恭獻平銑之策帝嘉納之太宗實録李靖傳靖說趙郡王孝恭陳伐蕭銑之計獻以十策高祖以孝恭未更戎旅三軍之任一以委靖授靖行軍總管兼攝孝恭長史事孝恭傳時李靖亦奉使江南以策干孝恭孝恭善之委以軍事蓋靖畫策使孝恭上之耳二月辛卯改信州為夔州以孝恭為總管使大造舟艦習水戰艦戶黯翻以孝恭未更軍旅更工衡翻以靖為行軍總管兼孝恭長史委以軍事靖說孝恭悉召巴蜀酋長子弟長知兩翻酋才由翻量才授任置之左右外示引擢實以為質量音良質音致四年王世充太子玄應將兵數千人自虎牢運糧入洛陽秦王世民遣將軍李君羡邀擊大破之玄應僅以身免世民使宇文士及奏請進圍東都上謂士及曰歸語爾王語牛倨翻今取洛陽止於息兵克城之日乘輿法物圖籍器械乘繩證翻非私家所須者委汝收之其餘子女玉帛並以分賜將士將即亮翻辛丑世民移軍青城宮壁壘未立王世充帥衆二萬自方諸門出憑故馬坊垣塹臨穀水以拒唐兵東都城西連禁苑方諸門蓋自都城出禁苑之門也青城宮在禁苑中穀洛二水會于禁苑之中帥讀曰率下同塹七豔翻世民以精騎陳於北邙登魏宣武陵以望之謂左右曰賊勢窘矣悉衆而出徼幸一戰騎奇寄翻下同陳讀曰陳下同徼古堯翻今日破之後不敢復出矣復扶又翻下同命屈突通帥步卒五千渡水擊之屈居勿翻戒通曰兵交則縱煙煙作世民引騎南下身先士卒先悉薦翻與通合勢力戰世民欲知世充陳厚薄與精騎數十衝之直出其背衆皆披靡披普彼翻殺傷甚衆既而限以長堤與諸騎相失將軍丘行恭獨從世民世充數騎追及之世民馬中流矢而斃行恭回騎射追者發無不中中竹仲翻射而亦翻追者不敢前乃下馬以授世民行恭於馬前步執長刀距躍大呼距躍超距而跳躍也杜預曰距躍超越也呼火故翻突陳而出得入大軍世充亦帥衆殊死戰散而復合者數四自辰至午世充兵始退世民縱兵乘之直抵城下俘斬七千人遂圍之驃騎將軍段志玄與世充兵力戰深入馬倒為世充兵所擒兩騎夾持其髻驃匹妙翻騎奇寄翻髻古詣翻將渡洛水志玄踴身而奮二人俱墜馬志玄馳歸追者數百騎不敢逼初驃騎將軍王懷文為唐軍斥候為世充所獲世充欲慰悅之引置左右壬寅世充出右掖門東都城南面三門中曰端門左曰左掖門右曰右掖門洛水徑其前有天津永濟中橋三橋懷文忽引槊刺世充世充衷甲槊折不能入刺七亦翻折而設翻左右猝出不意皆愕眙不知所為懷文走趣唐軍眙丑吏翻趣七喻翻又逡須翻至寫口洛城中水於此寫放以流其惡因名之為寫口殺之世充歸解去衷甲去羌呂翻袒示㣥臣曰懷文以槊刺我卒不能傷卒子恤翻豈非天所命乎先是御史大夫鄭頲不樂仕世充多稱疾不預事鄭頲李密之臣為世充所獲疾其多詐故不樂仕焉先悉薦翻頲他鼎翻樂音洛臣聞佛有金剛不壞身陛下真是也臣實多幸得生佛世願棄官削髮為沙門服勤精進以資陛下之神武詭辭以求去國之大臣聲望素重一旦入道將駭物聽俟兵革休息當從公志頲固請不許退謂其妻曰吾束髮從官志慕名節束髮謂幼小總角時也流離至此側身猜忌之朝纍足危亡之地朝直遙翻纍力委翻智力淺薄無以自全人生會有死早晚何殊姑從吾所好好呼到翻死亦無憾遂削髮被僧服被皮義翻世充聞之大怒曰爾以我為必敗欲苟免邪邪音耶不誅之何以制衆遂斬頲於市頲言笑自若觀者壯之詔贈王懷文上柱國朔州刺史朔州隋之馬邑郡四年並州安撫使唐儉密奏真鄉公李仲文與妖僧志覺有謀反語真鄉縣公也西魏置真鄉縣時屬綏州使疏吏翻妖於驕翻諂事可汗甚得其意可汗許立為南面可汗可從刊入聲汗音寒贓賄狼籍上命裴寂陳叔達蕭瑀雜鞫之瑀音禹乙巳仲文伏誅四年庚戌王泰棄河陽走去年七月世充使泰守河陽將即亮翻敻休正翻降戶江翻別將單雄信裴孝達與總管王君廓相持於洛口單慈淺翻秦王世民帥步騎五千援之至轘轅雄信等遁去君廓追敗之轘音環敗補邁翻四年壬子延州總管段德操擊劉仚成破之仚許延翻斬首千餘級四年乙卯王世充懷州刺史陸善宗以城降四年秦王世民圍洛陽宮城城中守禦甚嚴大炮飛石重五十斤擲二百步炮與炮同匹貌翻八弓弩箭如車輻鏃如巨斧射五百步八弓弩八弓共一絭也如古連弩今之划車弩亦其類也輻音福晝夜不息旬餘不克城中欲翻城者凡十三輩皆不果發而死唐將士皆疲弊思歸總管劉弘基等請班師世民曰今大舉而來當一勞永逸東方諸州已望風款服唯洛陽孤城勢不能久功在垂成奈何棄之而去乃下令軍中曰洛陽未破師必不還還從宣翻敢言班師者斬衆乃不敢復言復扶又翻上聞之亦密敕世民使還世民表稱洛陽必可克又遣參謀軍事封德彞入朝面論形勢參謀之官蓋始於此朝直遙翻世充得地雖多率皆羈屬言羈縻屬之而已唯洛陽一城而已智盡力窮克在朝夕今若旋師賊勢復振復扶又翻又音如字更相連結後必難圖上乃從之世民遺世充書遺于季翻諭以禍福世充不報四年戊午王世充鄭州司兵沈悅遣使詣左武候大將軍李世績請降李世績時屯管城使疏吏翻降戶江翻王君廓時屯洛口遂拔之獲其荊王行本及長史戴胄長知兩翻悅君理之孫也沈君理仕陳為僕射四年竇建德克周橋虜孟海公王崇武標點容肇祖聶崇岐覆校
