body:
  text: 資治通鑑卷第二百七十一端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千六百戶食實封一千戶臣司馬光奉敕編集後學天台音注後梁紀六均王下貞明五年貞明五年己卯九一九貞明五年冬十月出濛為楚州團練使承上卷徐溫惡濛事貞明五年晉王如魏州發徒數萬廣德勝北城日與梁人爭大小百餘戰互有勝負左射軍使石敬瑭與梁人戰于河壖左射軍使統軍士之能左射者壖而緣翻河邊地也斷其馬甲斷丁管翻薛史曰晉高祖為梁人所襲馬甲連革斷橫衝兵馬使劉知遠以所乘馬授之自乘斷甲者徐行為殿殿丁練翻梁人疑有伏不敢迫俱得免敬瑭以是親愛之敬瑭知遠其先皆沙陀人敬瑭李嗣源之壻也石敬瑭劉知遠始此貞明五年劉鄩圍張萬進於兗州經年城中危窘去年八月劉鄩圍兗州事見上卷窘渠隕翻力不能救萬進遣親將劉處讓乞師於晉晉王未之許處讓於軍門截耳曰苟不得請生不如死晉王義之將為出兵為于偽翻會鄩已屠兗州族萬進乃止以處讓為行臺左驍衛將軍處讓滄州人也張萬進自滄州徙兗州劉處讓蓋從之處昌呂翻驍堅堯翻貞明五年十一月吳武寧節度使張崇寇安州貞明五年丁丑以劉鄩為泰寧節度使同平章事劉鄩先以河朔喪師貶為團練使落平章事今以平張萬進復為使相貞明五年辛卯王瓚引兵至戚城戚城在德勝西即春秋時衛之戚邑也杜預曰戚河上之邑不利貞明五年梁築壘貯糧於潘張貯丁呂翻潘張地名蓋潘張二姓居之因以名村如楊村之類一姓而名村也其他如麻家渡趙步又皆以姓而名津步此皆載於通鑑薛史云潘張村在河曲距楊村五十里十二月晉王自將騎兵自河南岸西上邀其餉者俘獲而還上時掌翻還從宣翻又如字梁人伏兵於要路晉兵大敗晉王以數騎走梁數百騎圍之李紹榮識其旗凡行軍主將各有旗以為表識今謂之認旗僅免戊戌晉王復與王瓚戰於河南復扶又翻瓚先勝獲晉將石君立等既而大敗乘小舟渡河走保北城楊村北城也帝聞石君立勇石君立即救晉陽者也見二百六十九卷二年將即亮翻繫於獄而厚餉之使人誘之誘音酉君立曰我晉之敗將而為用於梁雖竭誠效死誰則信之人各有君何忍反為仇讎用哉帝猶惜之盡殺所獲晉將獨置君立晉王乘勝遂拔濮陽考異曰莊宗實録天祐十五年賀王褱屯於濮州北行臺里十二月辛酉上次于臨濮賊亦捨營踵我癸亥次于胡柳明日接戰王彥章敗走濮陽甲子進攻濮陽一鼓而拔按唐地理志濮州亦謂之濮陽郡治鄄城有濮陽臨濮二縣據莊宗實録則行臺里在臨濮東胡柳在濮陽東彥章所保莊宗所拔者皆濮陽縣非濮州也而莊宗列傳及薛史閻寶傳皆云彥章騎軍已入濮州山下惟列步兵向晚皆有歸心是以濮陽即為濮州也李嗣昭傳嗣昭云賊無營壘去臨濮地遠日已晡晚皆有歸心但以精騎撓之無令夕食晡後追擊破之必矣我若收軍拔寨賊入臨濮俟彼整齊復來則勝負未決是又以濮陽即為臨濮也按薛史梁紀貞明五年四月制書放濮州稅課是濮州猶屬梁也莊宗實録天祐十六年十二月攻下濮陽下教告諭曹濮百姓勸令歸附是濮州未屬晉也又賀王褱屯土山西晉軍在其東彥章已西入濮陽王褱豈得更東歸臨濮疑寶傳濮州嗣昭傳臨濮皆當為濮陽史氏文飾之誤也又莊宗實録去年十二月晉已拔濮陽至此又云攻下濮陽按薛史梁紀去年十二月晉人攻濮陽陷之今年十二月又云晉人陷濮陽唐紀去冬拔濮陽今年四月追襲賀王褱至濮陽十二月無攻下濮陽事賀王褱傳貞明四年領大軍營於行臺村十二月戰敗四月退軍行臺尋卒若非實録及梁紀重復則是去冬唐雖得濮陽棄而不守今年冬復攻拔之也以天平節度使戴思遠代為北面招討使屯河上以拒晉人貞明五年己酉蜀雄武節度使兼中書令王宗朗有罪削奪官爵復其姓名曰全師朗命武定節度使兼中書令桑弘志討之貞明五年吳禁民私畜兵器盜賊益繁御史臺主簿京兆盧樞上言唐御史臺置主簿一人掌印受事發辰核臺務主公廨及奴婢勳散官之職今四方分爭宜教民戰且善人畏法禁而姦民弄干戈是欲偃武而反招盜也宜團結民兵使之習戰自衛鄉里從之六年六年春正月戊辰蜀桑弘志克金州執全師朗獻于成都蜀主釋之六年吳張崇攻安州不克而還崇在廬州貪暴不法廬江民訟縣令受賕徐知誥遣侍御史知雜事楊廷式往按之欲以威崇廷式曰雜端推事其體至重唐御史臺侍御史六人以久次一人知雜事謂之雜端知誥曰何如廷式曰械繫張崇使吏如升州簿責都統簿責者一二而責之所按者縣令耳何至於是廷式曰縣令微官張崇使之取民財轉獻都統耳都統謂徐溫也詰去吉翻知誥謝之曰固知小事不足相煩煩勞也廷式泉州人也六年晉王自得魏州得魏州見二百六十九卷元年將銀槍效節都將即亮翻下同建及為人忠壯所得賞賜悉分士卒與同甘苦故能得其死力所向立功同列疾之宦者韋令圖監建及軍譖於晉王曰建及以私財驟施施式豉翻此其志不小不可使將牙兵王疑之建及知之章十二行本之下有自恃無他四字乙十一行本同孔本同張校同退齋校同行之自若三月王罷建及軍職以為代州刺史史言晉王不能信屬賢將李建及由是怏怏而卒六年漢楊洞潛請立學校開貢舉設銓選漢主巖從之校戶教翻六年夏四月乙亥以尚書左丞李琪為中書侍郎同平章事琪珽之弟也李珽始見於唐昭宗天復三年而死於梁誅友圭之時挾趙巖張漢傑之勢頗通賄賂蕭頃與琪同為相頃謹密而陰伺琪短伺相吏翻久之有以攝官求仕者琪輒改攝為守頃奏之歐史曰琪所私吏當得試官琪改試為守為頃所發欲流琪遠方趙張左右之左右讀曰佐佑止罷為太子少保考異曰薛史止有琪作相月日無罷相年月故終言之六年河中節度使冀王友謙以兵襲取同州逐忠武節度使程全暉全暉奔大梁友謙以其子令德為忠武留後表求節鉞帝怒不許既而懼友謙怨望己酉以友謙兼忠武節度使制下下戶嫁翻友謙已求節鉞於晉王朱友謙自此遂歸于晉考異曰莊宗列傳上令幕客王正言送節旄賜之莊宗實録列傳薛史友謙傳皆云友謙以令德為帥請節鉞不許薛史末帝紀貞明六年云陷同州以令德為留後表求節旄不允而貞明四年六月甲辰以歙州刺史朱令德為忠武留後恐是四年已陷同州六年吳宣王重厚恭恪徐溫父子專政王未嘗有不平之意形於言色溫以是安之及建國稱制見上卷上年多沈飲鮮食樂音洛沈持林翻鮮息淺翻少也遂成寢疾五月溫自金陵入朝議當為嗣者或希溫意言曰蜀先主謂武侯嗣子不才君宜自取見六十九卷魏文帝黃初三年吾果有意取之當在誅張皓之初誅張皓見二百六十九卷開平二年使楊氏無男有女亦當立之敢妄言者斬乃以王命迎丹楊公溥監國考異曰吳録九國志有女當立之語在誅張皓時今從薛史十國紀年王疾病大丞相溫來朝議立嗣君門下侍郎嚴可求言王諸子皆不才引蜀先主顧命諸葛亮事溫以告知誥知誥曰可求多知言未必誠不過順大人意爾溫曰吾若自取非止今日張皓之亂嗣王幼弱政在吾手取之易於反掌然思太祖大漸欲傳位劉威吾獨力爭太祖垂泣以後事託我安可忘也乃與內樞密使王令謀定策稱隆演命迎丹楊公溥監國己丑隆演卒六月戊申溥即王位恐可求亦不應有此言今從薛史越濛而立溥者濛為徐溫所忌也己丑宣王殂年二十四戊申溥即吳王位溥楊行密第四子六年丁巳蜀以司徒兼門下侍郎同平章事周庠同平章事充永平節度使唐末置永平軍於邛州歐史職方考蜀以雅州為永平節度六年帝以泰寧節度使劉鄩為河東道招討使帥感化節度使尹皓靜勝節度使溫昭圖莊宅使段凝攻同州帥讀曰率下同六年閏月庚申朔蜀主作高祖原廟于萬里橋原廟起於漢原再也已立太廟而再立廟曰原廟萬里橋在成都寰宇記曰昔者費禕聘吳諸葛亮送之至此橋曰萬里之路始於此矣因以名橋褻味常御嗜好之味也記郊特牲曰禘嘗不敢用褻味而貴多品所以交於神明之義也褻息列翻以為非禮華陽縣本唐貞觀十七年所置蜀縣在益州郭下與成都分治乾元元年改為華陽縣華戶化翻欲誅之太后以為不可乃削官流黎州士喬感憤赴水死六年劉鄩等圍同州朱友謙求救于晉秋七月晉王遣李存審李嗣昭李建及慈州刺史李存質將兵救之六年乙卯蜀主下詔北巡以禮部尚書兼成都尹長安韓昭為文思殿大學士位在翰林承旨上昭無文學以便佞得幸便毗連翻出入宮禁就蜀主乞通渠巴集數州刺史賣之以營居第蜀主許之識者知蜀之將亡八月戊辰蜀主發成都被金甲冠珠帽執弓矢而行被皮義翻冠古玩翻旌旗兵甲亙百餘里雒令段融上言雒漢古縣唐屬漢州為州治所上時掌翻不宜遠離都邑離力智翻當委大臣征討不從九月次安遠城凡兵一宿為信過信為次六年李存審等至河中即日濟河自河中濟河救同州每戰必窮追不置存審選精甲二百雜河中兵直壓劉鄩壘鄩出千騎逐之知晉人已至大驚時鄩兵出逐河中兵晉騎反擊之獲梁騎兵五十梁人知其晉軍也大驚晉人軍于朝邑九域志朝邑在同州東三十五里河中事梁久唐昭宗之世朱全忠降王珂河中遂事梁諸軍大集芻粟踊貴友謙諸子説友謙説式芮翻且歸款於梁以退其師友謙曰昔晉王親赴吾急秉燭夜戰謂與康懷貞等戰也事見二百六十八卷乾化二年謂相距於河上也分我資糧豈可負邪晉人分兵攻華州壞其外城將即亮翻華戶化翻壞音怪李存審等按兵纍旬乃進逼劉鄩營鄩等悉衆出戰大敗收餘衆退保羅文寨薛史曰鄩以餘衆退保華州羅文寨存審謂李嗣昭曰獸窮則搏不如開其走路然後擊之乃遣人牧馬於沙苑鄩等宵遁追擊至渭水又破之殺獲甚衆劉鄩用兵十步九計以此得名於時至同州之役與李存審遇為所玩弄若嬰兒在人掌股之上是何也孽也蓋鳥之中傷者曰孽聞弦鳴則引而高飛力不足斯抎矣故空弓可落也劉鄩先為晉兵所破見晉兵之來氣沮而膽消矣烏能與之為敵哉引兵略地至下邽謁唐帝陵哭之而還唐帝陵在同州奉先縣還從宣翻又如字河中兵進攻崇州靜勝節度使溫昭圖甚懼元年溫韜以義勝軍降改耀州曰崇州義勝曰靜勝韜賜今名説式芮翻公所有者華原美原兩縣耳唐末溫韜為盜據華原縣李茂貞以華原為茂州韜為刺史尋改耀州又以美原縣為鼎州建義勝軍以韜為節度使及降梁改耀州為崇州鼎州為裕州義勝為靜勝是其所有者本唐兩縣也實一鎮將比之雄藩豈可同日語也公有意欲之乎昭圖曰然維曰當為公圖之為于偽翻即教昭圖表求移鎮帝以汝州防禦使華溫琪權知靜勝留後華戶化翻六年冬十月辛酉蜀主如武定軍數日復還安遠復扶又翻六年十一月戊子朔蜀主以兼侍中王宗儔為山南節度使西北面都招討行營安撫使天雄節度使同平章事王宗昱永寧軍使王宗晏左神勇軍使王宗信為三招討以副之將兵伐岐出故關壁於咸宜壁者築壁壘以屯軍咸宜當在隴州源縣界良原縣屬涇州九域志在州西南六十里丁酉王宗儔攻隴州岐王自將萬五千人屯陽陽縣屬隴州九域志在州東六十七里東距鳳翔五十五里癸卯蜀將陳彥威出散關敗岐兵于箭筈嶺杜佑曰岐山即今之岐山縣其山兩岐故俗呼為箭筈嶺敗補邁翻筈古活翻引還還從宣翻又如字宗昱屯泰章十二行本泰作秦乙十一行本同孔本同張校同退齋校同州宗儔屯上邽宗晏宗信屯威武城庚戌蜀主發安遠城十二月庚申至利州閬州團練使林思諤來朝請幸所治從之閬中林思諤所治也九域志利州東南至閬州二百四十里癸亥泛江而下泛嘉陵江也畫與晝同舸古我翻楚人謂大船為舸州縣供辦民始愁怨此總言蜀主所經行州縣不特言閬州為然也壬申至閬州州民何康女色美將嫁蜀主取之賜其夫家帛百匹夫一慟而卒記諸侯不下漁色注云謂不內取於國中也內取國中為下漁色國君而內取象捕魚然中網則取之是無所擇王衍奪人之妻其為漁也殆有甚焉癸未至梓州六年趙王鎔自恃纍世鎮成德得趙人心生長富貴長知兩翻雍容自逸治府第園沼極一時之盛治直之翻多事嬉遊不親政事事皆仰成於僚佐仰牛向翻深居府第權移左右行軍司馬李藹宦者李弘規用事於中外外則李藹中則李弘規初劉仁恭使牙將張文禮從其子守文鎮滄州守文詣幽州省其父文禮於後據城作亂滄人討之奔鎮州比言唐末事敘張文禮之所自來省悉景翻好呼到翻自言知兵趙王鎔奇之養以為子更名德明更工衡翻悉以軍事委之德明將行營兵從晉王事始二百六十七卷太祖乾化元年使都指揮使符習代還以為防城使鎔晚年好事佛及求仙好呼到翻專講佛經受符籙廣齋醮合煉仙丹合音閣盛飾館宇於西山每往遊之鎮州西山謂之房山上有西王母祠鎔欲求仙故數往遊之數月方歸將佐士卒陪從者常不下萬人從才用翻往來供頓軍民皆苦之是月自西山還宿鶻營莊鶻戶骨翻石希蒙勸王復之他所復扶又翻李弘規言於王曰晉王夾河血戰或戰河南或戰河北故曰夾河櫛去瑟翻親冒矢石而王專以供軍之資奉不急之費且時方艱難人心難測王久虛府第遠出遊從萬一有姦人為變閉關相距將若之何王將歸希蒙密言於王曰弘規妄生猜間間古莧翻出不遜語以劫脅王專欲誇大於外長威福耳長知兩翻王遂留信宿無歸志詩九罭云於女信宿毛氏傳再宿曰信與左傳師行一宿為信之義不同擐甲拔刃帥讀曰率擐音宦詣帳前白王曰士卒暴露已久願從王歸弘規因進言曰石希蒙勸王遊從不已且聞欲陰謀弒逆請誅之以謝衆王不聽牙兵遂大譟斬希蒙首訴於前王怒且懼亟歸府是夕遣其長子副大使昭祚與王德明將兵圍弘規及李藹之第族誅之連坐者數十家又殺蘇漢衡收其黨與窮治反狀親軍大恐為張文禮嗾軍士殺王鎔張本治直之翻下同六年吳金陵城成陳彥謙上費用册籍徐溫曰吾既任公不復會計上時掌翻復扶又翻會工外翻悉焚之六年初閩王審知承制加其從子泉州刺史延彬領平盧節度使從才用翻延彬治泉州十七年吏民安之會得白鹿及紫芝僧浩源以為王者之符延彬由是驕縱密遣使浮海入貢求為泉州節度使事覺審知誅浩源及其黨黜延彬歸私第六年漢主巖遣使通好于蜀好呼到翻六年吳越王鏐遣使為其子傳琇求婚於楚楚王殷許之為于偽翻下為聘同琇音秀龍德元年辛巳九二一是年五月方改元六年春正月甲午蜀主還成都去年七月蜀主出巡遊至是方還六年初蜀主之為太子高祖為聘兵部尚書高知言女為無寵蜀主王建廟號高祖尤見疏薄至是遣還家知言驚仆不食而卒卒子恤翻韋者徐耕之孫也有殊色蜀主適徐氏見而悅之太后因納於後宮蜀主不欲娶於母族託云韋昭度之孫韋昭度唐僖宗時嘗奉制帥蜀故託言之纍加元婕妤音接豫蜀主常列錦步障擊毬其中往往遠適而外人不知爇諸香晝夜不絶久而厭之更爇皂莢以亂其氣更工衡翻爇如悅翻皂莢如豬牙者良爇之其氣酷烈結繒為山及宮殿樓觀於其上或為風雨所敗則更以新者易之或樂飲繒山涉旬不下繒慈陵翻觀工喚翻敗補邁翻樂音洛山前穿渠通禁中或乘船夜歸令宮女秉蠟炬千餘居前船卻立照之水面如晝或酣飲禁中鼓吹沸騰吹尺睡翻以至達旦以是為常六年甲辰徙靜勝節度使溫昭圖為匡國節度使鎮許昌昭圖素事趙巖故得名藩溫昭圖求徙鎮見上年靜勝梁之邊鎮且兩縣耳匡國唐之忠武軍領許陳汝三州自來為名藩趙巖以名藩授昭圖及緩急投之以託身而斬巖者昭圖也勢利之交可不戒哉六年蜀主吳主屢以書勸晉王稱帝晉王以書示僚佐曰昔王太師亦嘗遺先王書勸以唐室已亡宜自帝一方王太師者以唐官呼蜀主王建遺書事見二百六十七卷開平元年遺唯季翻語牛倨翻昔天子幸石門吾發兵誅賊臣事見二百六十卷唐昭宗乾寧二年威振天下振動也自作九錫禪文誰能禁我顧吾家世忠孝立功帝室誓死不為耳汝他日當務以復唐社稷為心慎勿效此曹所為言猶在耳此議非所敢聞也因泣既而將佐及藩鎮勸進不已乃令有司市玉造法物法物謂傳國八寶之類見二百五十四卷唐僖宗廣明元年藏之四十年至是傳真以為常玉將鬻之或識之曰傳國寶也傳真乃詣行臺獻之宋白曰同光初魏州開元寺僧傳真獻國寶驗其文即受命八寶也晉王為尚書令置行臺於魏州張承業在晉陽聞之詣魏州諫曰吾王世世忠於唐室言執宜國昌克用皆輸力於唐室難乃旦翻所以老奴三十餘年為王捃拾財賦唐昭宗乾寧二年張承業始監河東軍至是年二十七年捃舉蘊翻又居運翻誓滅逆賊復本朝宗社耳本朝謂唐也朝直遙翻朱氏尚存而王遽即大位殊非從來征伐之意天下其誰不解體乎王何不先滅朱氏復列聖之深讎然後求唐後而立之南取吳西取蜀時楊氏據江淮國號吳王氏據梁益國號蜀合為一家當是之時雖使高祖太宗復生復扶又翻下不復同誰敢居王上者讓之愈久則得之愈堅矣老奴之志無他但以受先王大恩欲為王立萬年之基耳為于偽翻下本為同王曰此非余所願奈㣥下意何承業知不可止慟哭曰諸侯血戰本為唐家此張承業所謂從來征伐之意也誤老奴矣即歸晉王章十二行本王作陽乙十一行本同孔本同張校同退齋校同邑章十二行本重邑字乙十一行本同孔本同張校同退齋校同成疾不復起張承業唐之純臣也烏可以宦者待之哉考異曰莊宗實録上初獲玉璽諸將勸上復唐正朔承業自太原急趣謁上曰殿下父子血戰三十餘年蓋緣報國復仇為唐宗社今元凶未殄軍賦不充河朔數州弊於供億遽先大號費養兵之事力困凋弊之生靈臣以為一未可也殿下既化家為國新創廟朝典禮制度須取太常準的方今禮院未見其人儻失舊章為人輕笑二未可也因泣下沾襟上曰余非所願奈諸將意何承業自是多病日加危篤卒官莊宗列傳上受諸道勸進將篡帝位承業以為晉王三代有功於國先王怒賊臣篡逆匡復舊邦賊既未平不宜輕受推戴方疾作肩輿之鄴宮見上力諫大指皆如實録薛史唐餘録皆與莊宗列傳同五代史闕文承業謂莊宗曰吾王世奉唐家最為忠孝自貞觀以來王室有難未嘗不從所以老奴三十餘年為吾王捃拾財賦召補軍馬者誓滅逆賊朱溫復本朝宗社耳今河朔甫定朱氏尚存吾王遽即大位可乎莊宗曰奈諸將意何承業知不可諫止乃慟哭曰諸侯血戰本為李家今吾王自取之誤老奴矣即歸太原不食而死秦再思洛中紀異承業諫帝曰大王何不待誅克梁孽更平吳蜀俾天下一家且先求唐氏子孫立之復更以天下讓有功者何人輒敢當之讓一月即一月牢讓一年即一年牢設使高祖再生太宗復出又胡為哉今大王一旦自立頓失從前仗義征伐之旨人情怠矣老夫是閹官不愛大王官職富貴直以受先王付囑之重欲為先王立萬年之基爾莊宗不能從乃謝病歸太原而卒歐陽史兼采闕文紀異之意按實録等書承業止惜費多及儀物不備太似淺陋如闕文所言承業事莊宗父子數十年唐室近親已盡豈不知其欲自取之意乎褒美承業亦恐太過又按傳真以天祐十八年正月獻寶承業以十九年十一月卒云即歸太原不食而死亦非實也如紀異之語承業為莊宗忠謀近得其實今從之六年二月吳改元順義六年趙王既殺李弘規李藹委政於其子昭祚昭祚性驕愎愎符逼翻既得大權嚮時附弘規者皆族之弘規部兵五百人欲逃聚泣偶語未知所之會諸軍有給賜趙王忿親軍之殺石希蒙獨不時與衆益懼王德明素蓄異志因其懼而激之曰王命我盡坑爾曹吾念爾曹無罪併命併命謂一時皆誅死不然又獲罪於王奈何衆皆感泣感張文禮則讎趙王鎔矣是夕親軍有宿於潭城西門者相與飲酒而謀之潭城常山牙城北偏也歐陽公鎮陽殘杏詩云北潭跬步病不到何暇騎馬尋郊原注云北潭常山宮後池也州之勝遊惟此以有池潭故其城謂之潭城其中驍健者曰吾曹識王太保意王太保謂王德明謂德明所以語親軍者其意欲使之作亂即踰城入趙王方焚香受籙二人斷其首而出斷音短因焚府第軍校張友順帥衆詣德明第請為留後帥讀曰率德明復姓名曰張文禮盡滅王氏之族唐穆宗長慶元年王庭湊據成德軍歷四世五帥而滅梁女妻昭祚見二百六十二卷唐昭宗光化三年六年三月吳人歸吳越王鏐從弟龍武統軍鎰于錢唐錢鎰被禽見二百六十五卷唐天祐二年錢唐吳越國都從才用翻李濤被禽見二百六十八卷乾化三年廣陵吳國都史言錢楊兩釋俘囚以固和好鏐以鎰為鎮海節度副使敗軍之罰其不行也亦已久矣六年張文禮遣使告亂于晉王且奉箋勸進因求節鉞晉王方置酒作樂聞之投杯悲泣欲討之僚佐以為文禮罪誠大然吾方與梁爭不可更立敵於肘腋宜且從其請以安之王不得已夏四月遣節度判官盧質承制授文禮成德留後晉王雖欲撫安之而張文禮不能自安也為興兵討文禮張本六年陳州刺史惠王友能反舉兵趣大梁九域志陳州北至大梁三百四十里趣七喻翻陝失冉翻友能至陳留九域志陳留縣在大梁東五十二里走還陳州諸軍圍之六年五月丙戌朔改元方改元龍德六年初劉鄩與朱友謙為婚鄩之受詔討友謙也事見上年先遣使移書諭以禍福待之月餘友謙不從然後進兵尹皓段凝素忌鄩因譖之於帝曰鄩逗遛養寇俾俟援兵尹皓段凝與劉鄩同攻朱友謙因其諭友謙而不服遇晉兵而敗退得以譖之鄩既敗歸以疾請解兵柄詔聽於西都就醫梁以洛陽為西都丁亥卒史言梁自翦其爪牙考異曰莊宗實録云憂恚發病卒薛史云張宗奭承朝廷密旨逼令飲鴆而卒今從之六年六月乙卯朔日有食之六年秋七月惠王友能降庚子詔赦其死降封房陵侯六年晉王既許藩鎮之請求唐舊臣欲以備百官朱友謙遣前禮部尚書蘇循詣行臺蘇循依朱友謙見二百六十六卷太祖開平元年入牙城望府廨即拜謂之拜殿廨古隘翻見王呼萬歲舞蹈泣而稱臣翌日又獻大筆三十枚謂之畫日筆唐制敕皆天子畫日蘇循以迎合禪代之議為朱全忠所薄而李存勗乃喜之是其識見又在全忠下矣即命循以本官為河東節度副使張承業深惡之惡烏路翻六年張文禮雖受晉命內不自安復遣間使因盧文進求援於契丹又遣間使來告曰復扶又翻盧文進叛晉歸契丹見二百六十九卷貞明二年三年間古莧翻王氏為亂兵所屠公主無恙今臣已北召契丹乞朝廷發精甲萬人相助自德棣渡河則晉人遁逃不暇矣帝疑未決敬翔曰陛下不乘此釁以復河北釁許覲翻則晉人不可復破矣復扶又翻宜徇其請不可失也趙張輩皆曰今強寇近在河上盡吾兵力以拒之猶懼不支何暇分萬人以救張文禮乎且文禮坐持兩端欲以自固於我何利焉帝乃止史言趙張慮不及遠以誤國亡家晉人屢於塞上及河津獲文禮蠟丸絹書塞上所獲者通契丹之書河津所獲者通梁之書文禮慚懼文禮忌趙故將多所誅滅符習將趙兵萬人從晉王在德勝文禮請召歸以他將代之且以習子蒙為都督府參軍遣人齎錢帛勞行營將士以悅之張文禮蓋自置鎮冀深趙都督府故有參佐勞力到翻泣涕請留晉王曰吾與趙王同盟討賊晉趙同盟見二百六十七卷太祖開平四年不意一旦禍生肘腋腋羊益翻吾誠痛之汝苟不忘舊君能為之復讎乎為于偽翻吾以兵糧助汝習與部將三十餘人舉身投地慟哭曰故使授習等劍使之攘除寇敵故使謂王鎔也已死稱為故使使疏吏翻下同冤憤無訴欲引劍自剄剄古頂翻顧無益於死者顧回思也死者亦謂王鎔輔佐者言以兵力輔佐晉王也習等不敢煩霸府之兵晉王在魏州為河北諸藩鎮盟主故稱其府曰霸府以報王氏纍世之恩死不恨矣八月庚申晉王以習為成德留後又命天平節度使閻寶相州刺史史建瑭將兵助之自邢洺而北文禮先病腹疽甲子晉兵拔趙州刺史王鋋降鋋音蟬晉王復以為刺史文禮聞之驚懼而卒其子處瑾祕不發喪與其黨韓正時謀悉力拒晉九月晉兵渡滹沱圍鎮州范成大北使録曰過滹沱河五里至鎮州獲其深州刺史張友順壬辰史建瑭中流矢卒中竹仲翻晉王欲自分兵攻鎮州北面招討使戴思遠聞之謀悉楊村之衆襲德勝北城晉王得梁降者知之冬十月己未晉王命李嗣源伏兵於戚城李存審屯德勝先以騎兵誘之偽示羸怯誘音酉羸倫為翻梁兵競進晉王嚴中軍以待之梁兵至晉王以鐵騎三千奮擊梁兵大敗思遠走趣楊村趣七喻翻士卒為晉兵所殺傷及自相蹈藉藉慈夜翻墜河陷冰失亡二萬餘人晉王以李嗣源為蕃漢內外馬步副總管同平章事六年初義武節度使兼中書令王處直未有子妖人李應之得小兒劉雲郎於陘邑陘邑本前漢苦陘縣後漢改曰漢昌曹魏改曰魏昌隋改曰隋昌唐武德四年改曰唐昌天寶元年改曰陘邑屬定州妖一遙翻陘音刑是兒有貴相使養為子名之曰都及壯便佞多詐遺唯季翻相息亮翻便毗連翻處直愛之置新軍使典之處直有孽子郁無寵奔晉晉王克用以女妻之庶子為孽妻七細翻餘子皆幼處直以都為節度副大使欲以為嗣及晉王存勗討張文禮處直以平日鎮定相為脣齒恐鎮亡而定孤固諫以為方禦梁寇宜且赦文禮晉王答以文禮弒君義不可赦又潛引梁兵恐於易定亦不利處直患之以新州地鄰契丹乃潛遣人語郁新州窮邊也北接契丹語牛倨翻召令犯塞務以解鎮州之圍王郁雖不能解鎮州之圍而亦能為契丹鄉導以寇晉不聽郁素疾都冒繼其宗乃邀處直求為嗣處直許之軍府之人皆不欲召契丹都亦慮郁奪其處乃陰與書吏和昭訓謀劫處直會處直與張文禮宴於城東按張文禮時已受兵安能至定州與王處直宴處直所與宴者必文禮使者也文禮之下當有使字章十二行本有使者二字乙十一行本同孔本同張校同都以新軍數百伏於府第大譟劫之曰將士不欲以城召契丹請令公歸西第乃並其妻妾幽之西第凡官府第舍以東為上西第者即安養間之地唐末王處存帥義武兄弟相繼至是而敗都自為留後具以狀白晉王晉王因以都代處直為唐明宗朝王都又以中山召契丹張本六年吳徐溫勸吳王祀南郊或曰禮樂未備且唐祀南郊其費巨萬今未能辦也溫曰安有王者而不事天乎吾聞事天貴誠多費何為唐每郊祀啓南門灌其樞用脂百斛以脂灌樞欲其滑而易轉且門無聲又安足法乎史言徐溫雖不學而知先王制禮之意甲子吳王祀南郊配以太祖吳王尊其父乙丑大赦加徐知誥同平章事領江州觀察使尋以江州為奉化軍以知誥領節度使徐知誥自團練升觀察尋自廉車建節徐溫聞壽州團練使崔太初苛察失民心欲徵之徐知誥曰壽州邊隅大鎮徵之恐為變不若使之入朝因留之溫怒曰一崔太初不能制如他人何史言徐溫權略過於知誥六年十一月晉王使李存審李嗣源守德勝自將兵攻鎮州張處瑾遣其弟處琪幕僚齊儉謝罪請服晉王不許盡鋭攻之旬日不克晉王但知野戰決勝負於呼吸之間未知攻城之難也趣定州趣七喻翻欲求救於王處直晉兵追至行唐斬之行唐漢南行唐縣唐屬鎮州九域志在州北五十五里六年契丹主既許盧文進出兵張文禮因盧文進求援於契丹事見上説式芮翻鎮州美女如雲金帛如山天皇王速往則皆己物也不然為晉王所有矣契丹主以為然悉發所有之衆而南史言契丹為利所誘而來未有取中國之心吾有西樓羊馬之富其樂不可勝窮也樂音洛勝音升何必勞師遠出以乘危徼利乎徼一遙翻吾聞晉王用兵天下莫敵脫有危敗悔之何及契丹主不聽十二月辛未攻幽州李紹宏嬰城自守貞明五年晉王令李紹宏提舉幽州軍府事圍涿州旬日拔之擒刺史李嗣弼進攻定州自幽州西南至涿州一百二十里自涿州至定州二百八十里晉王自鎮州將親軍五千救之遣神武都指揮使王思同將兵戍狼山之南以拒之狼山在定州西北二百里東北至易州八十里六年高季昌遣都指揮使倪可福以卒萬人修江陵外郭季昌行視行下孟翻責功程之慢杖之季昌女為可福子知進婦季昌謂其女曰歸語汝舅吾欲威衆辦事耳以白金數百兩遺之語牛倨翻遺唯季翻六年是歲漢以尚書左丞倪曙同平章事六年辰漵蠻侵楚楚寧遠節度副使姚彥章討平之太祖乾化元年姚彥章已棄容州歸潭州而領寧遠節度副使如故二年二年春正月壬午朔王都省王處直於西第處直奮拳毆其胸省悉景翻毆烏口翻曰逆賊我何負於汝既無兵刃將噬其鼻都掣袂獲免未幾處直憂憤而卒掣尺列翻幾居豈翻二年甲午晉王至新城南按魏收地形志新城在無極縣時屬祁州新樂古鮮虞子國漢為新市縣隋改曰新樂唐屬定州九域志在州西南五十里宋白曰新樂縣隋開皇十六年置新樂者漢成帝時中山孝王母馮昭儀隨王就國建宮於樂里在西鄉呼為西樂城後語訛呼西為新故曰新樂將士皆失色士卒有亡去者主將斬之不能止將即亮翻諸將皆曰虜傾國而來吾衆寡不敵又聞梁寇內侵宜且還師魏州以救根本或請釋鎮州之圍西入井陘避之晉王猶豫未決章十二行本決下有中門使三字乙十一行本同孔本同郭崇韜曰契丹為王郁所誘本利貨財而來非能救鎮州之急難也誘音酉難乃旦翻王新破梁兵貞明五年破賀王褱於胡柳又破王瓚於戚城是年破戴思遠於德勝夏戶雅翻契丹聞王至心沮氣索沮在呂翻索昔各翻苟挫其前鋒遁走必矣李嗣昭自潞州至亦曰今強敵在前吾有進無退不可輕動以搖人心晉王曰帝王之興自有天命契丹其如我何吾以數萬之衆平定山東河北之地在太行常山之東何面目以臨四海乃自帥鐵騎五千先進帥讀曰率至新城北半出桑林契丹萬餘騎見之驚走契丹素憚晉王不意其至故驚走行數十里獲契丹主之子時沙河橋狹冰薄契丹陷溺死者甚衆是夕晉王宿新樂契丹主車帳在定州城下契丹主乘奚車卓氈帳覆之寢處其中謂之車帳契丹舉衆退保望都望都在定州東北六十里范成大北使録自真定府七十里過沙河至新樂縣又四十五里至定州又五十里至望都縣水經注曰望都縣東有山孤峙帝王世紀曰堯母慶都所居謂之都山張晏曰堯山在北堯母慶都山在南登堯山見都山故望都縣以為名晉王至定州王都迎謁於馬前章十二行本前下有宴於府第四字乙十一行本同孔本同張校同請以愛女妻王子繼岌妻七細翻王都新篡義武以附于晉申之以婚姻自固也戊戌晉王引兵趣望都趣七喻翻契丹逆戰晉王以親軍千騎先進遇奚酋禿餒五千騎酋慈秋翻餒弩罪翻為其所圍晉王力戰出入數四自午至申不解李嗣昭聞之引三百騎橫擊之虜退王乃得出因縱兵奮擊契丹大敗逐北至易州九域志定州北至易州一百四十里平地數尺契丹人馬無食死者相屬於道屬之欲翻契丹主舉手指天謂盧文進曰天未令我至此既敗而又遇雪因歸之天屬之欲翻晉王引兵躡之躡尼輒翻隨其行止見其野宿之所布藁於地藁工老翻禾稈也回環方正皆如編翦雖去無一枝亂者歎曰虜用法嚴乃能如是中國所不及也晉王至幽州使二百騎躡契丹之後曰虜出境即還還從宣翻騎恃勇追擊之悉為所擒惟兩騎自他道走免進軍易退軍難退而能整是難能也契丹之強其有以哉契丹主責王郁縶之以歸以王郁誤之入寇也縶涉立翻晉代州刺史李嗣肱將兵定媯儒武等州胸奴須知媯州東南距幽州二百二十里儒武又在媯州西北契丹入塞三州皆陷故李嗣肱復定之二年晉王之北攻鎮州也李存審謂李嗣源曰梁人聞我在南兵少晉王以兵北伐留李存審等守澶魏此兵之在南者也必襲魏州吾二人聚於此何為不若分軍備之遂分軍屯澶州時澶州治頓丘趣七喻翻嗣源引兵先之先悉薦翻軍於狄公祠下唐狄仁傑刺魏州有惠政州人為之立祠使為之備思遠至魏店嗣源遣其將石萬全將騎兵挑戰挑徒了翻思遠知有備乃西渡洹水拔成安大掠而還還從宣翻又如字又將兵五萬攻德勝北城重塹復壘斷其出入重直龍翻斷音短晝夜急攻之李存審悉力拒守晉王聞德勝勢危二月自幽州赴之五日至魏州思遠聞之燒營遁還楊村二年蜀主好為微行好呼到翻酒肆倡家靡所不到惡人識之乃下令士民皆著大裁帽倡音昌惡烏路翻著陟略翻二年晉天平節度使兼侍中閻寶築壘以圍鎮州決滹沱水環之環音宦按薛史寶攻真定結營西南隅掘塹柵環之決大悲寺漕渠以浸其郛內外斷絶城中食盡丙午遣五百餘人出求食寶縱其出欲伏兵取之其人遂攻長圍其人總言鎮兵五百餘人也不為備俄數千人繼至諸軍未集鎮人遂壞長圍而出壞音怪縱火攻寶營寶不能拒退保趙州九域志鎮州南至趙州一百九十里取其芻粟數日不盡晉王聞之以昭義節度使兼中書令李嗣昭為北面招討使以代寶二年夏四月蜀軍使王承綱女將嫁蜀主取之入宮承綱請之蜀主怒流於茂州女聞父得罪自殺蜀主取何康之女其夫以之而死取王承綱之女則承綱以之得罪女以之殺身通鑑屢書之以示戒二年甲戌張處瑾遣兵千人迎糧於九門李嗣昭設伏於故營故營閻寶營也殺獲殆盡餘五人匿牆墟間嗣昭環馬而射之鎮兵發矢中其腦射而亦翻中竹仲翻孫策之中頰韓賢之斷脛李嗣昭之中腦皆以主將之重而逞一夫之技以喪身善將者不如是也嗣昭箙中矢盡箙以盛矢音房六翻拔矢於腦以射之一發而殪會日暮還營創流血不止殪一計翻創初良翻是夕卒晉王聞之不御酒肉者纍日御進也章十二行本判上有節度二字乙十一行本同孔本同張校同官任圜任音壬姓也使督諸軍攻鎮州號令如一鎮人不知嗣昭之死圜三原人也史言任圜之才晉王以天雄馬步都指揮使振武節度使李存進為北面招討使命嗣昭諸子護喪歸葬晉陽其子繼能不受命帥父牙兵數千自行營擁喪歸潞州帥讀曰率晉王遣母弟存渥馳騎追諭之兄弟俱忿欲殺存渥李嗣昭死守以全潞州撫養創殘葺理軍府備有勳勞身死行陳之間晉王使其護喪歸葬晉陽曾無褒死恤存之命此其所以兄弟俱忿也存渥晉王同母之弟嗣昭七子繼儔繼韜繼達繼忠繼能繼襲繼遠繼儔為澤州刺史當襲爵素懦弱繼韜凶狡囚繼儔於別室詐令士卒劫己為留後繼韜陽讓以事白晉王晉王以用兵方殷以鎮州未下梁兵又來攻擾河上用兵之事方殷也殷盛也改昭義軍曰安義以繼韜為留後為李繼韜叛晉附梁張本考異曰按潞州本號昭義軍今以繼韜為安義留後蓋晉王避其父諱改之耳及繼韜降梁梁亦以為匡義節度使今人猶謂澤州為安義云二年閻寶慚憤以鎮州之敗也甲戌卒二年漢主巖用術者言遊梅口鎮避災其地近閩之西鄙九域志梅州程鄉縣有梅口鎮與閩之汀州接境近其靳翻未至數十里偵者告之偵丑鄭翻巖遁逃僅免二年五月乙酉晉李存進至鎮州營于東垣渡真定本東垣漢高帝更名真定其津渡之處猶有東垣之名二年晉衛州刺史李存儒本姓楊名婆兒以俳優得幸於晉王頗有膂力晉王賜姓名以為刺史專事掊斂掊蒲侯翻斂力贍翻防城卒皆徵月課縱歸月徵其課錢而免其防守之勞莊宅使段凝與步軍都指揮使張朗引兵夜渡河襲之詰旦登城詰去吉翻執存儒遂克衛州戴思遠又與凝攻陷淇門共城新鄉共城新鄉二縣皆屬衛州舊唐書地理志曰隋割汲獲嘉二縣地於古新樂城置新鄉縣共城縣漢共縣也唐為共城縣九域志衛州治汲縣熙寧六年廢新鄉縣為鎮屬汲縣汲縣又有淇門鎮共城在州西北五十五里共音恭相州之南皆為梁有九域志澶州西至衛州二百四十里相州南至衛州一百五十里梁軍復振帝以張朗為衛州刺史朗徐州人也二年九月戊寅朔張處瑾使其弟處球乘李存進無備將兵七千人奄至東垣渡時晉之騎兵亦向鎮州城兩不相遇鎮兵及存進營門存進狼狽引十餘人鬬于橋上鎮兵退晉騎兵斷其後斷音短夾擊之鎮兵殆盡存進亦戰沒當是時晉兵強天下鎮號為怯晉王杖順討逆宜一鼓而下也鎮人忘王氏百年煦養之恩而為張文禮父子爭一旦之命史建瑭殞斃於前閻寶敗退於後李嗣昭李存進相繼輿尸而歸四人者皆晉之驍將也然則鎮勇而晉怯邪非也鎮人負弒君之罪知城破之日必駢首而就戮故盡死一力以抗晉晉以常勝之兵而臨必死之衆雖兵精將勇至於喪身而不能克是以古之伐罪散其枝黨罪止元惡者誠慮此也鎮州食竭力盡處瑾遣使詣行臺請降未報存審兵至城下丙午夜城中將李再豐為內應密投縋以納晉兵比明畢登縋馳偽翻比必利翻執處瑾兄弟家人及其黨高濛李翥齊儉送行臺趙人皆請而食之磔張文禮尸於市翥章恕翻磔陟格翻趙王故侍者得趙王遺骸於灰燼中晉王命祭而葬之以趙將符習為成德節度使烏震為趙州刺史趙仁貞為深州刺史李再豐為冀州刺史震信都人也符習不敢當成德辭曰故使無後而未葬習當斬衰以葬之臣為君服斬衰衰倉回翻既葬即詣行臺趙人請晉王兼領成德節度使從之晉王割相衛二州置義寧軍以習為節度使習辭曰魏博霸府不可分也願得河南一鎮習自取之世固多有能言而不能行者符習陳義不苟而卒不能取河南一鎮是以君子貴於踐言加李存審兼侍中二年十一月戊寅晉特進河東監軍使張承業卒曹太夫人詣其第為之行服如子姪之禮張承業平李克寧存皓之難以此故曹太夫人深德之為于偽翻不食者纍日命河東留守判官何瓚代知河東軍府事瓚藏旱翻二年十二月晉王以魏博觀察判官晉陽張憲兼鎮冀觀察判官權鎮州軍府事魏州稅多逋負晉王以讓司録濟陰趙季良唐制諸州有司録司士司兵司功等諸曹所謂判司也濟陰漢郡名隋置濟陰縣唐帶曹州濟子禮翻殿下何時當平河南王怒曰汝職在督稅職之不修何敢預我軍事季良對曰殿下方謀攻取而不愛百姓一旦百姓離心恐河北亦非殿下之有況河南乎王悅謝之自是重之每預謀議二年是歲契丹改元天贊二年大封王躬乂性殘忍海軍統帥王建殺之帥所類翻自立復稱高麗王以開州為東京平壤為西京建儉約寬厚國人安之徐兢高麗圖經曰高麗王建之先高麗大族也高氏政衰國人以建賢立為君長後唐長興二年自稱權知國事請命于明宗乃拜建大義軍使封高麗王按徐兢宣和之間使高麗進圖經紀載疏略因其國人傳聞遂謂建得國於高氏之後不知建實殺躬乂而得國也詳見貞明五年考異鄧廣銘標點聶崇岐覆校
