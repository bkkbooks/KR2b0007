body:
  text: 資治通鑑卷第二百七十九端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千六百戶食實封一千戶臣司馬光奉敕編集後學天台音註後唐紀八潞王下清泰元年清泰元年甲午九三四清泰元年二月癸酉蜀主以武泰節度使趙季良為司空兼門下侍郎同平章事領節度使如故趙季良遂為孟蜀佐命元臣清泰元年吳人多不欲遷都者吳遷都之議始上卷明宗長興四年主上西遷公復須東行都押牙鎮海寧國兩鎮都押牙也昇州於揚州為西揚州於昇州為東言吳主若西遷金陵徐知誥須東鎮江都也復扶又翻且違衆心丙子吳主遣宋齊丘如金陵諭知誥罷遷都先是知誥久有傳禪之志先悉薦翻下先己同以吳主無失德恐衆心不悅欲待嗣君宋齊丘亦以為然一旦知誥臨鏡鑷白髭鑷尼輒翻髭即移翻在口上曰髭在下曰鬚在頰曰髯歎曰國家安而吾老矣柰何周宗知其意請如江都微以傳禪諷吳主且告齊丘齊丘以宗先己心疾之先悉薦翻遣使馳詣金陵手書切諫以為天時人事未可知誥愕然徐知誥不意宋齊丘立異而忽睹其異議故愕然使疏吏翻齊丘至請斬宗以謝吳主乃黜宗為池州副使池州副使池州團練副使也節度副使李建勳行軍司馬徐玠等屢陳知誥功業宜早從民望召宗復為都押牙知誥由是疏齊丘為宋齊丘邀君得禍張本嗚呼為人臣者當易姓之際謹毋以功名自居荀文若以之咀毒而逝劉穆之以之發病而死范雲恐後時不及療疾以求速愈至於促壽而不暇顧若宋齊丘之疾周宗又其輕淺者耳清泰元年朱弘昭馮贇不欲石敬瑭久在太原且欲召孟漢瓊孟漢瓊權知天雄軍府見上卷上年己卯徙成德節度使范延光為天雄節度使代漢瓊徙潞王從珂為河東節度使兼北都留守徙石敬瑭為成德節度使皆不降制書但各遣使臣持宣監送赴鎮宣樞密院所行文書也是後漢隱帝時郭威以樞密院頭子易置西京留守豈非習於聞見而不以為異邪西班有大使臣小使臣監古銜翻清泰元年吳主詔徐知誥還府舍徐知誥虛府舍以待吳主見上卷本年甲申金陵大火乙酉又火知誥疑有變勒兵自衞章十二行本衞下有己丑復入府舍六字乙十一行本同退齋校同張校同云無註本亦無徐知誥之自衞其心猶王建也清泰元年潞王既與朝廷猜阻朝廷又命洋王從璋權知鳳翔從璋性粗率樂禍樂音洛前代安重誨鎮河中手殺之見二百七十七卷明宗長興二年尤惡之惡烏路翻欲拒命則兵弱糧少少詩沼翻不知所為謀於將佐皆曰主上富於春秋政事出於朱馮大王功名震主離鎮必無全理離力智翻不可受也言不可受代隋開皇十六年置滳河縣屬渤海郡唐屬棣州九域志滳河縣在棣州西南八十里註云漢都尉許商鑿此河近海故以商為名後人加水焉今道過京師當何向為便發此問以觀衆意君命召不俟駕引論語孔子之言又何疑焉諸人凶謀不可從也衆哂之言當過京師臨大行之喪然後赴太原也馬胤孫之言儒生守經學之言也是時勸潞王拒命者以其言為不達時變故相與哂之哂矢忍翻笑不壞顏為哂言朱弘昭等乘先帝疾亟殺長立少謂殺從榮而立帝也長知兩翻少詩照翻別疏骨肉動搖藩垣謂易置石敬瑭及己也朝直遙翻下同別彼列翻今從珂將入朝以清君側之惡而力不能獨辦願乞靈鄰藩以濟之潞王以西都留守王思同當東出之道自鳳翔趣洛陽道出長安遣推官郝詡押牙朱廷乂等相繼詣長安說以利害說式芮翻餌以美妓妓渠綺翻不從則令就圖之思同謂將吏曰吾受明宗大恩王思同自燕降晉梁晉相距思同未嘗有戰功明宗時以久次為節度使故自言受大恩借使事成而榮猶為一時之叛臣況事敗而辱流千古之醜跡乎遂執詡等以狀聞時潞王使者多為鄰道所執不則依阿操兩端不讀曰否操七刀翻惟隴州防禦使相里金傾心附之隴州東至鳳翔一百五十里薛文遇由此為潞王所信用幷州人也朝廷議討鳳翔康義誠不欲出外恐失軍權明宗以康義誠為朴忠豈知其陰狡乃爾邪帥所類翻以羽林都指揮使侯益為行營馬步軍都虞候宋白曰長興二年二月敕衞軍神捷神威雄武及魏府廣捷已下指揮改為左右羽林置四十指揮每十指揮立為一軍每一軍置都指揮使一人兼分為左右廂辭章十二行本辭下有疾字乙十一行本同不行侯益曾經鄴都之變故爾出為商州刺史洛陽至商州八百八十六里辛卯以王思同為西面行營馬步軍都部署前此用兵置帥率以都招討使命之莊宗時明宗為北面招討使以禦契丹房知溫為副都部署當時為都部署者必有其人又孟知祥拒董璋以趙廷隱為行營都部署後遂以為元帥之任宋氏建國之初猶因而用之難乃旦翻下同前絳州刺史萇從簡為馬步都虞候嚴衞步軍左廂指揮使尹暉宋白曰應順元年三月改在京羽林左右四十指揮為嚴衞左右軍然此時羽林指揮使楊思權與嚴衞指揮使尹暉並為西征偏裨則似羽林與嚴衞並置暉魏州人也清泰元年蜀主以中門使王處回為樞密使清泰元年丁酉加王思同同平章事知鳳翔行府以護國節度使安彥威為西面行營都監思同雖有忠義之志而御軍無法潞王老於行陳將士徼幸富貴者心皆向之行戶剛翻陳讀曰陣徼堅堯翻詔遣殿直楚匡祚執亳州團練使李重吉幽於宋州九域志亳州西北至宋州一百四十五里重直龍翻函谷關之西也還從宣翻又如字清泰元年三月安彥威與山南西道張虔釗武定孫漢韶彰義張從賓靜難康福等五節度使梁洋涇邠四帥幷安彥威而五難乃旦翻漢韶李存進之子也晉王克用義兒百有餘人李存進本姓孫後復本姓清泰元年乙卯諸道兵大集於鳳翔城下攻之克東西關城城中死者甚衆丙辰復進攻城復扶又翻期於必取鳳翔城塹卑淺守備俱乏衆心危急潞王登城泣謂外軍曰吾未冠從先帝百戰出入生死金創滿身冠古玩翻創初良翻以立今日之社稷汝曹從我目睹其事今朝廷信任讒臣猜忌骨肉我何罪而受誅乎因慟哭聞者哀之張虔釗性褊急主攻城西南以白刃驅士卒登城士卒怒大詬褊補典翻詬古候翻又許候翻反攻之虔釗躍馬走免楊思權因大呼曰大相公吾主也楊思權本黨於秦王從榮從榮死思權不自安久矣因乘勢奉潞王王於明宗諸子為長故稱為大相公呼火故翻下同請降於潞王帥讀曰率降戶江翻下同自西門入以幅紙進潞王曰願王克京城日以臣為節度使勿以為防團防團謂防禦團練使也思權可邠寧節度使授之王思同猶未之知趣士卒登城趣讀曰促尹暉大呼曰城西軍已入城受賞矣衆皆棄甲投兵而降其聲震地日中亂兵悉入外軍亦潰思同等六節度使皆遁去王思同及張虔釗等五節度為六節度使按孫漢韶時守興元當以藥彥稠足六節度之數至於鼎釜皆估直以給之犒苦到翻估音古丁巳王思同藥彥稠等走至長安西京副留守劉遂雍閉門不內乃趣潼關趣七喻翻遂雍鄩之子也劉鄩梁將也明宗以王淑故遂雍皆蒙引拔潞王建大將旗鼓整衆而東以孔目官虞城劉延朗為腹心隋分下邑縣置虞城縣唐屬宋州九域志在州東北五十五里歐史潞王起於鳳翔與共事者五人節度判官韓昭胤掌書記李專美牙將宋審虔客將房暠孔目官劉延朗及即位審虔將兵專美與薛文遇主謀議而昭胤暠及延朗掌機密至岐山九域志鳳翔府岐山縣東至長安二百四十三里甚喜遣使慰撫之遂雍悉出府庫之財於外軍士前至者即給賞令過比潞王至比必利翻及也前軍賞遍皆不入城庚申潞王至長安遂雍迎謁率民財以充賞府庫之財僅足以給前軍其隨潞王繼至者率民財以給之是日西面步軍都監王景從等自軍前奔還中外大駭帝不知所為謂康義誠等曰先帝棄萬國朕外守藩方謂鎮天雄也為嗣者在諸公所取耳朕實無心與人爭國既承大業年在幼沖五代會要明宗崩帝即位年二十朕於兄弟間不至榛梗榛梗者隔塞而不通榛側詵翻梗古杏翻朕何敢違軍興之初皆自夸大以為寇不足平今事至於此何方可以轉禍言何術可以轉禍為福以大位讓之若不免於罪亦所甘心朱弘昭馮贇大懼不敢對猜間兄弟以起兵端朱弘昭馮贇為之也事敗而禍集聞帝言乃大懼乃曰西師驚潰蓋主將失策耳薦王思同者康義誠也咎王思同者亦康義誠也將即亮翻下同臣請自往扼其衝要招集離散以圖後效幸陛下勿為過憂帝遣使召石敬瑭欲令將兵拒之義誠固請自行帝乃召將士慰諭空府庫以勞之勞力到翻許以平鳳翔人更賞二百緡府庫不足當以宮中服玩繼之軍士益驕無所畏忌負賜物揚言於路曰至鳳翔更請一分分扶問翻遣楚匡祚殺李重吉於宋州匡祚榜棰重吉責其家財前已囚重吉於宋州今又使就殺之榜音彭棰止橤翻召惠明入禁中見上卷本年初馬軍都指揮使朱洪實為秦王從榮所厚及朱弘昭為樞密使洪實以宗兄事之從榮勒兵天津橋洪實首為孟漢瓊擊從榮事見上卷上年首為于偽翻下為之同康義誠許迎從榮而朱洪實擊之故恨辛酉帝親至左藏藏徂浪翻給將士金帛義誠洪實共論用兵利害洪實欲以禁軍固守洛陽曰如此彼亦未敢徑前然後徐圖進取可以萬全義誠怒曰洪實為此言欲反邪洪實曰公自欲反乃謂誰反康義誠之心事朱洪實知之矣帝聞召而訊之訊問也訟者爭辯是非曲直遂斬洪實帝但以階級為曲直而不能察事之是非觀上文軍士揚言所云但欲迎降潞王何暇憤朱洪實之枉死蓋憤怒者洪實之從兵耳壬戌潞王至昭應宋大中祥符八年改昭應縣為臨潼縣九域志在長安東五十里王曰思同雖失計然盡心所奉亦可嘉也癸亥至靈口九域志臨潼縣之零口鎮是也王責讓之對曰思同起行間行戶剛翻先帝擢之位至節將節將言建節而為大將將即亮翻非不知附大王立得富貴助朝廷自取禍殃但恐死之日無面目見先帝於泉下耳潞王聞王思同之言豈不內愧乎固其所也請早就死王為之改容曰公且休矣王欲宥之而楊思權之徒恥見其面楊思權等背順附逆故恥見思同過古禾翻又如字尹暉盡取思同家資及妓妾屢言於劉延朗曰若留思同留者言活之使留於人世妓渠綺翻屬王醉屬之欲翻不待報亶殺思同及其妻子王醒怒延朗嗟惜者累日清泰元年癸亥制以康義誠為鳳翔行營都招討使以王思同副之甲子潞王至華州獲藥彥稠囚之乙丑至閿鄉九域志華州東至閿鄉九十里自閿鄉東至陝州一百七十里華戶化翻閿武巾翻亦作闅遇西軍皆迎降無一人戰者丙寅康義誠引侍衞兵發洛陽詔以侍衞馬軍指揮使安從進為京城巡檢從進已受潞王書潛布腹心矣是日潞王至靈寶靈寶縣在陝州西四十五里莊宗同光四年安重霸以秦州降重直龍翻陝失冉翻先是捧聖五百騎戍陝西為潞王前鋒至城下呼城上人曰禁軍十萬已奉新帝爾輩數人奚為徒累一城人塗地耳先悉薦翻累力瑞翻於是捧聖卒爭出迎思立不能禁不得已亦出迎丁卯潞王至陝僚佐說王曰今大王將及京畿傳聞乘輿已播遷說式芮翻乘繩證翻大王宜少留於此先移書慰安京城士庶王從之移書諭洛陽文武士庶惟朱弘昭馮贇兩族不赦外自餘勿有憂疑康義誠軍至新安新安縣西距陝州二百餘里百什為㣥棄甲兵爭先詣陝降纍纍不絕義誠至乾壕九域志陝州陝縣有乾壕鎮乾音干遇潞王候騎十餘人義誠解所佩弓劍為信因候騎請降於潞王戊辰閔帝聞潞王至陝義誠軍潰憂駭不知所為急遣章十二行本遣下有中字乙十一行本同使召朱弘昭謀所向弘昭曰急召我欲罪之也赴井死安從進聞弘昭死殺馮贇於第滅其族考異曰張昭閔帝實錄帝召弘昭不至俄聞自殺乃令從進殺贇按從進傳贇首於陝則贇死非閔帝之命明矣今不取帝欲奔魏州召孟漢瓊使詣魏州為先置先置者先路置頓也單騎奔陝初帝在藩鎮愛信牙將慕容遷及即位以為控鶴指揮使帝將北渡河密與之謀使帥部兵守玄武門玄武門洛陽宮城北門帥讀曰率下同帝以五十騎出玄武門謂遷曰朕且幸魏州徐圖興復汝帥有馬控鶴從我遷曰生死從大家乃陽為團結帝既出即闔門不行史言自古以來衆叛親離未有甚於此時己巳馮道等入朝及端門聞朱馮死帝已北走道及劉昫欲歸昫香句翻又許羽翻李愚曰天子之出吾輩不預謀今太后在宮吾輩當至中書遣小黃門取太后進止然後歸第人臣之義也道曰主上失守社稷人臣惟君是奉無君而入宮城恐非所宜唐之兩都三省及寺監皆在宮城之內不若歸俟教令乃歸至天宮寺安從進遣人語之曰語牛倨翻潞王倍道而來且至矣相公宜帥百官至穀水奉迎穀水在洛陽城西召百官中書舍人盧導至馮道曰俟舍人久矣所急者勸進文書宜速具草草者草創其辭潞王入朝百官班迎可也設有廢立當俟太后教令豈可遽議勸進乎道曰事當務實導曰安有天子在外人臣遽以大位勸人者邪若潞王守節北面以大義見責將何辭以對公不如帥百官詣宮門進名問安取太后進止則去就善矣或問馮道李愚盧導之論其於新舊君之際孰為合於義乎曰皆非也此如㣥奴之事主家主死而有二子其一養子也其一親子也養子與親子爭家政養子勝而親子不勝一奴曰皆郎君也吾從其勝者而輔之一奴之心本亦附勝者而不敢公言附之也曰吾將決諸主母馮道李愚之謂也或曰盧導之言何如曰盧導之不肯草勸進文書是也若其持論則猶李愚也至於言去就之善若是者得為善乎其言之非殆有甚於李愚矣曰然則為馮道李愚者當何如曰若漢人之論相主在與在主亡與亡可也然亦僅可而已未能盡相道也夫子之言曰危而不持顛而不扶則將焉用彼相矣明乎此則為相者貴於持危扶顛不以但能盡死為貴也從進屢遣人趣之曰潞王至矣太后太已遣中使迎勞矣趣讀曰促勞力到翻安得百官無班道等即紛然而去既而潞王未至三相息於上陽門外三相馮道李愚劉昫也上陽門上陽宮門也上陽宮在洛陽宮城西道復召而語之復扶又翻語牛倨翻導對如初李愚曰舍人之言是也吾輩之罪擢髮不足數用戰國須賈之言擢拔也數所具翻康義誠至陝待罪潞王責之曰先帝晏駕立嗣在諸公今上亮陰政事出諸公何為不能終始陷吾弟至此乎義誠大懼叩頭請死王素惡其為人惡烏路翻未欲遽誅且宥之馬步都虞候萇從簡左龍武統軍王景戡皆為部下所執降於潞王東軍盡降東軍謂自洛陽來者遂自陝而東夏四月庚午朔未明閔帝至衞州東數里遇石敬瑭石敬瑭自河東來朝至此而遇帝問以社稷大計敬瑭曰聞康義誠西討何如陛下何為至此帝曰義誠亦叛去矣敬瑭俛首長歎數四俛音免曰衞州刺史王弘贄宿將習事請與圖之王弘贄從敬瑭伐蜀嘗為偏將石敬瑭欲擁帝還衞州以授弘贄使為之所耳弘贄曰前代天子播遷多矣然皆有將相侍衞府庫法物使㣥下有所瞻仰今皆無之獨以五十騎自隨雖有忠義之心將若之何敬瑭還見帝於衞州驛自弘贄所還見帝奔洪進前責敬瑭曰沙姓古夙沙氏之後史炤曰奔姓也古有賁姓音奔又音肥後遂為奔公明宗愛壻以敬瑭尚明宗女也憂患亦宜相恤今天子播越委計於公冀圖興復乃以此四者為辭四者謂敬瑭所言無將相侍衞府庫法物從行幸也直指石敬瑭心術刺七亦翻敬瑭親將陳暉救之守榮與暉鬬死洪進亦自刎刎扶粉翻敬瑭牙內指揮使劉知遠引兵入盡殺帝左右及從騎獨置帝而去考異曰閔帝實錄庚午朔四鼓帝至衞州東七八里遇敬瑭竇貞固晉高祖實錄始帝欲與少主俱西斷孟津北據壺關南向徵諸侯兵乃啟問康義誠西討作何制置云云蘇逢吉漢高祖實錄是夜偵知少帝伏甲欲與從臣謀害晉高祖詐屏人對語方坐庭廡帝密遣御士石敢袖鎚立於後俄頃伏甲者起敢有勇力擁晉祖入一室以巨木塞門敢力當其鋒死之帝解佩刀遇夜晦以在地葦炬未然者奮擊之衆謂短兵也遂散走帝乃匿身長垣下聞帝親將李洪信謂人曰石太尉死矣帝隔垣呼洪信曰太尉無恙乃踰垣出就洪信兵共護晉祖殺建謀者以少主授王弘贄南唐烈祖實錄弘贄曰今京國阽危百官無主必相率攜神器西向公何不囚少帝西迎潞王此萬全之計敬瑭然其語按為晉漢實錄者必為二祖飾非今從閔帝實錄趣七喻翻是日太后令內諸司至乾壕迎潞王考異曰廢帝實錄三十日太后傳令至幷內司迎奉至乾壕帝促令還京按長曆三月辛丑朔四月庚午朔三月無三十日廢帝實錄誤也初潞王罷河中歸私第事見二百七十七卷明宗長興元年數所角翻漢瓊自謂於王有舊恩至澠池西九域志澠池在洛陽之西一百五十六里澠彌兗翻澠池縣名欲有所陳王曰諸事不言可知仍自預從臣之列從才用翻王即命斬於路隅清泰元年山南西道節度使張虔釗之討鳳翔也留武定節度使孫漢韶守興元虔釗既敗奔歸興元與漢韶舉兩鎮之地降于蜀蜀主命奉鑾肅衞馬步都指揮使昭武節度使李肇將兵五千還利州李肇本鎮昭武蜀主召之入領宿衞今使將兵還鎮以應接梁洋先是蜀主以兵疲民困不用趙隱取山南之計今乘時而坐得之其庸多矣清泰元年壬申潞王至蔣橋百官班迎於路傳教以未拜梓宮未可相見傳教謂傳令也王所下令為教終不用盧導之言詣西宮伏梓宮慟哭自陳詣闕之由馮道帥百官班見見賢遍翻拜句絕道等復上牋勸進復扶又翻王立謂道曰予之此行事非獲已俟皇帝歸闕園寢禮終當還守藩服㣥公遽言及此甚無謂也癸酉太后下令廢少帝為鄂王考異曰閔帝實錄云七日廢帝為鄂王今從廢帝實錄權以書詔印施行書詔印畫可所用者也閔帝之出奔也蓋以八寶自隨五代會要天成元年中書門下奏請以洛京潛龍舊宅為至德宮蓋明宗舊第也按歐史時潞王入居至德宮甲戌太后令潞王宜即皇帝位乙亥即位於柩前帝之發鳳翔也許軍士以入洛人賞錢百緡既至問三司使王玫玫莫杯翻以府庫之實問其實數既而閱實金帛不過三萬兩匹而賞軍之費計應用五十萬緡帝怒玫請率京城民財以足之數日僅得數萬緡帝謂執政曰軍不可不賞人不可不恤今將柰何執政請據屋為率無問士庶自居及僦者預借五月僦直從之僦即就翻賃居為僦清泰元年王弘贄遷閔帝於州廨廨古隘翻帝遣弘贄之子殿直巒往酖之戊寅巒至衞州謁見見賢遍翻閔帝問來故不對問巒以所以來之故數所角翻閔帝知其有毒不飲巒縊殺之年二十一閔帝性仁厚於兄弟敦睦雖遭秦王忌疾閔帝坦懷待之卒免於患事見上卷明帝長興三年卒子恤翻於潞王亦無嫌而朱弘昭孟漢瓊之徒橫生猜間橫戶孟翻間古莧翻閔帝不能違以致禍敗焉孔尚在宮中孔循之女章十二行本潞上有王巒既還四字乙十一行本同孔本同張校同退齋校同王使人謂之曰重吉何在以通鑑書法言之潞王於此當書帝蓋承前史偶失於脩改也幷其四子閔帝之在衞州也惟磁州刺史宋令詢遣使問起居聞其遇害慟哭半日自經死宋令詢出磁州見上卷上年事閔帝有始終者宋令詢一人而已磁牆之翻清泰元年己卯石敬瑭入朝清泰元年庚辰以劉昫判三司清泰元年辛巳蜀大赦改元明德清泰元年帝之起鳳翔也召興州刺史劉遂清遲疑不至聞帝入洛乃悉集三泉西縣金牛桑林戍兵以歸自散關以南城鎮悉棄之皆為蜀人所有癸未入朝帝欲治罪以其能自歸乃赦之邊境之臣委棄城鎮乃以其能自歸而不誅安有效死弗去者乎治直之翻遂清鄩之姪也清泰元年甲申蜀將張業將兵入興元洋州清泰元年乙酉改元大赦改元清泰清泰元年丁亥以宣徽南院使郝瓊權判樞密院前三司使王玫為宣徽北院使鳳翔節度判官韓昭胤為左諫議大夫充端明殿學士清泰元年戊子斬河陽節度使判六軍諸衞兼侍中康義誠滅其族康義誠欲舉宿衞兵迎降以為己功而不免於族滅此傅瑕所以死於鄭厲公之類也清泰元年己丑誅藥彥稠脩河中之怨也清泰元年庚寅釋王景戡萇從簡清泰元年有司百方斂民財僅得六萬帝怒下軍巡使獄晝夜督責凡輸財稽違者則下之軍巡使獄以督責之也下戶嫁翻至章十二行本至上有貧者二字乙十一行本同孔本同張校同自經赴井而軍士遊市肆皆有驕色市人聚詬之曰汝曹為主力戰立功良苦詬古候翻又許候翻為于偽翻下能為同反使我輩鞭胸杖背出財為賞汝曹猶揚揚自得獨不愧天地乎是時竭左藏舊物及諸道貢獻乃至太后太器服簪珥皆出之藏徂浪翻珥忍止翻耳當也纔及二十萬緡帝患之李專美夜直李專美本鳳翔掌書記時為樞密直學士卿名有才不能為我謀此留才安所施乎為于偽翻專美謝曰臣駑劣陛下擢任過分駑音奴分扶問翻然軍賞不給非臣之責也竊思自長興之季賞賚亟行卒以是驕事始見上卷長興四年亟去吏翻卒臧沒翻士卒也帑藏遂涸帑他朗翻藏徂浪翻涸戶郭翻以水為諭言枯涸也雖有無窮之財終不能滿驕卒之心故陛下拱手於危困之中而得天下此言在鳳翔時諸軍推戴之事不專繫於厚賞亦在脩法度立紀綱陛下苟不改覆車之轍臣恐徒困百姓存亡未可知也帝起事於鳳翔共事者五人能言及此者獨李專美耳宜據所有均給之何必踐初言乎帝以為然壬辰詔禁軍在鳳翔歸命者自楊思權尹暉等各賜二馬一駝錢七十緡下至軍人錢二十緡其在京者各十緡軍士無厭厭於鹽翻猶怨望為謠言曰除去菩薩扶立生鐵以閔帝仁弱帝剛嚴有悔心故也去羌呂翻菩薄乎翻薩桑割翻閔帝小字菩薩清泰元年丙申葬聖德和武欽孝皇帝于徽陵徽陵在河南府洛陽縣帝衰絰護從至陵所宿焉衰倉回翻從才用翻清泰元年五月丙午以韓昭胤為樞密使以莊宅使劉延朗為樞密副使權知樞密院房暠為宣徽北院使暠長安人也暠古老翻清泰元年帝與石敬瑭皆以勇力善鬬事明宗為左右然心競素不相悅心競本諸左傳師曠之言爭也帝即位敬瑭不得已入朝山陵既畢不敢言歸時敬瑭久病羸瘠羸倫為翻瘠秦昔翻太后及魏國公主屢為之言魏國公主明宗之女下嫁石敬瑭曹太后所生也歐史公主初號永寧公主是年進封魏國長公主為于偽翻惟韓昭胤李專美以為趙延壽在汴不宜猜忌敬瑭趙延壽時為宣武帥逼近洛都又其父德鈞在幽州擁強兵言若猜忌敬瑭趙延壽必懼而生心不以為虞乃曰石郎不惟密親兼自少與吾同艱難少詩照翻今我為天子非石郎尚誰託哉乃復以為河東節度使復扶又翻又如字縱石敬瑭歸鎮乃復疑而徙之此所以速禍也清泰元年戊午以隴州防禦使相里金為保義節度使賞其先通款於鳳翔也清泰元年丁未階州刺史趙澄降蜀清泰元年戊申以羽林軍使楊思權為靜難節度使踐鳳翔片紙所書之言也難乃旦翻清泰元年己酉張虔釗孫漢韶舉族遷于成都清泰元年庚戌以司空兼門下侍郎同平章事馮道同平章事充匡國節度使清泰元年以天雄節度使兼侍中范延光為樞密使清泰元年帝之起鳳翔也悉取天平節度使李從曮家財甲兵以供軍李從曮自其父茂貞以來再世鎮鳳翔從曮雖移鎮而家財甲兵猶在焉謂將東趣洛陽也復扶又翻帝許之至是徙從曮為鳳翔節度使長興元年從曮自鳳翔入朝徙宣武後徙天平今自天平復還鎮鳳翔清泰元年初明宗為北面招討使莊宗同光二年始以明宗為北面招討使帝以別將事之嘗被酒忿爭被皮義翻師古曰被加也被酒者為酒所加拔刃相擬及帝舉兵入洛知溫密與行軍司馬李沖謀拒之沖請先奉表以觀形勢還言洛中已安定壬章十二行本壬上有知溫懼三字乙十一行本同孔本同張校同戌入朝謝罪帝優禮之知溫貢獻甚厚清泰元年吳鎮南節度使守中書令東海康王徐知詢卒清泰元年蜀人取成州清泰元年六月甲戌以皇子左衞上將軍重美為成德節度使同平章事兼河南尹判六軍諸衞事清泰元年文州都指揮使成延龜舉州附蜀周文王第五子郕叔武封於郕或言成王封季載於郕其後以國為氏或去邑為成氏清泰元年吳徐知誥將受禪忌昭武節度使兼中書令臨川王濛昭武軍利州時屬蜀吳使濛遙領耳亶造兵器丙子降封歷陽公幽于和州命控鶴軍使王宏將兵二百衞之濛見忌之始見二百七十一卷梁貞明五年清泰元年劉昫與馮道昏姻昫性苛察李愚剛褊道既出鎮謂出鎮同州也事有應改者愚謂昫曰此賢親家所為更之不亦便乎傳曰妻父曰昏壻父曰姻凡娶以昏時婦人陰也故謂之昏壻家女之所因故曰姻二父相呼謂之親家更工衡翻下欲更同由是動成忿爭至相詬罵各欲非時求見見賢遍翻事多凝滯帝患之欲更命相問所親信以朝臣聞望宜為相者聞音問皆以尚書左丞姚顗太常卿盧文紀祕書監崔居儉對論其才行互有優劣行下孟翻帝不能決乃置其名於琉璃瓶夜焚香祝天且以筯挾之挾當作梜梜古協翻記曲禮羹之有菜者用梜註云梜猶箸也今人或謂箸為梜提次得顗秋七月辛亥以文紀為中書侍郎同平章事居儉蕘之子也崔蕘見二百五十一卷唐懿宗咸通十年清泰元年帝欲殺楚匡祚以楚匡祚殺重吉也陛下為天下父天下之人皆陛下子用法宜存至公匡祚受詔檢校重吉家財不得不爾今族匡祚無益死者恐不厭衆心厭益涉翻伏也合也乙卯長流匡祚於登州清泰元年丁巳立沛國夫人劉氏為皇后劉后應州渾元人元一作源清泰元年回鶻入貢者多為河西雜虜所掠詔將軍牛知柔帥禁兵衞送帥讀曰率與邠州兵共討之清泰元年吳徐知誥召左僕射兼中書侍郎同平章事宋齊丘還金陵以為諸道都統判官加司空於事皆無所關預徐知誥疏宋齊丘事始上二月召之還金陵而不使預事者恐其沮止禪代之議故爾知誥以南園給之清泰元年護國節度使洋王從璋歸德節度使涇王從敏皆罷鎮居洛陽私第帝待之甚薄從敏在宋州預殺重吉帝尤惡之歸德軍宋州殺重吉於宋州見上三月惡烏路翻酒酣顧二王曰爾等皆何物輒據雄藩二王大懼太后叱之曰帝醉矣爾曹速去清泰元年蜀置永平軍於雅州以孫漢韶為節度使復以張虔釗為山南西道節度使同平章事虔釗固辭不行孫漢韶張虔釗同以梁洋降蜀蜀以節鎮授之孫漢韶赴雅州而張虔釗固辭不赴梁州者無面目以見梁州人士也唐末置永平軍於邛州後徙雅州蓋莊宗滅蜀而廢之今後蜀復置之也清泰元年蜀主得風疾踰年至是增劇甲子立子東川節度使同平章事親衞馬步都指揮使仁贊為太子仍監國監古銜翻召司空同平章事趙季良武信節度使李仁罕保寧節度使趙廷隱樞密使王處回捧聖控鶴都指揮使張公鐸奉鑾肅衞指揮副使侯弘實受遺詔輔政是夕殂祕不發喪王處回夜啟義興門告趙季良處回泣不已季良正色曰今強將握兵專伺時變伺相吏翻宜速立嗣君以絕覬覦強將謂李罕之李肇等覬音冀覦音俞處回收淚謝之季良教處回見李仁罕審其詞旨然後告之處回至仁罕第仁罕設備而出遂不以實告史言李仁罕已遊於趙季良等數內丙寅宣遺制命太子仁贊更名昶丁卯即皇帝位昶蜀主第三子也更工衡翻清泰元年初帝以王玫對左藏見財失實事見上四月藏徂浪翻見賢遍翻昫命判官高延賞鉤考窮覈皆積年逋欠之數姦吏利其徵責匄取故存之匄居大翻昫具奏其狀且請察其可徵者急督之必無可償者悉蠲之韓昭胤極言其便八月庚午詔長興以前戶部及諸道逋租三百三十八萬虛煩簿籍咸蠲免勿徵貧民大悅而三司吏怨之清泰元年辛未以姚顗為中書侍郎同平章事清泰元年右龍武統軍索自通以河中之隙見二百七十七卷明宗長興元年戊子退朝過洛自投于水而卒洛水貫都城中故自通退朝過之自投于水大驚贈太尉清泰元年丙申以前安國節度使同平章事趙鳳為太子太保清泰元年九月癸卯詔鳳翔益兵守東安鎮以備蜀東安鎮當在鳳翔西界蜀既出關收階成之地故益兵以備之清泰元年蜀衞聖諸軍都指揮使武信節度使李仁罕自恃宿將有功復受顧託復扶又翻求判六軍令進奏吏宋從會以意諭樞密院又至學士院偵草麻偵丑鄭翻蜀主不得已甲寅加仁罕兼中書令判六軍事以左匡聖都指揮使保寧節度使趙廷隱兼侍中為之副清泰元年己未雲州奏契丹入寇北面招討使石敬瑭奏自將兵屯百井以備契丹辛酉敬瑭奏振武節度使楊檀擊契丹於境上卻之清泰元年蜀奉鑾肅衞都指揮使昭武節度使兼侍中李肇聞蜀主即位顧望不時入朝至漢州留與親戚燕飲踰旬冬十月庚午始至成都稱足疾扶杖入朝見見賢遍翻見蜀主不拜李肇之傲幼君亦由武夫倔強不學無識以自貽禍清泰元年戊寅左僕射門下侍郎同平章事李愚罷守本官吏部尚書兼門下侍郎同平章事判三司劉昫罷為右僕射三司吏聞昫罷相皆相賀無一人從歸第者以昫奏蠲諸道逋租吏無所並緣徵責以漁利也清泰元年蜀捧聖控鶴都指揮使張公鐸與醫官使韓繼勳豐德庫使韓保貞茶酒庫使安思謙等皆事蜀主於藩邸素怨李仁罕共譖之云仁罕有異志蜀主令繼勳等與趙季良趙廷隱謀因仁罕入朝命武士執而殺之趙廷隱自克東川與李仁罕爭功怨隙之深有自來仁罕之求判六軍蜀主命廷隱為之副所以防仁罕仁罕之不覺其冥頑凶悖取死宜矣然趙廷隱終亦不能免近習之讒其得死於牖下者幸也癸未下詔暴其罪幷其子繼宏及宋從會等數人皆伏誅是日李肇釋杖而拜李肇事孟知祥於董璋之難陰拱而觀其孰勝董璋既死肇宜不免於死矣孟知祥念其劍州之功不以為罪及事少主釋位入朝倨傲不拜其誰能容之一見李仁罕之誅遽釋杖而拜前倨後恭欲以求免不亦難乎通鑑書之以為武夫恃功驕悖者之戒清泰元年蜀源州都押牙文景琛據城叛徧考新舊唐志及九域圖志寰宇記皆不載源州建置之由與其地歐史職方考曰州縣凡唐故而廢於五代者若五代所置而見於今者及縣之割隸今因之者皆宜列以備職方之考其餘嘗置而復廢嘗改割而復舊皆不足書則知源州蓋蜀所置而尋廢此其所以無傳同光之克蜀也得州六十四見於職方考者五十三州而已如源州等蓋皆六十四州之數按薛史後蜀潘仁嗣授武定節度使源壁等州觀察營田處置等使周師攻秦鳳孟貽業駐軍平利為褒源之援則蜀置源州屬武定軍節度章胡註徧考新舊唐志及九域圖志寰宇記皆不載源州建置之由與其地云云乙十一行本源作渠按源渠筆畫相近乙十一行本印亦漫漶細審乃敢定之渠州蜀地見歐史職方表此記全書專以羅列異同為事偶有考訂概不闌入此條特標舉之自詭得見舊本較梅磵為多幸也清泰元年蜀主左右以李肇倨慢請誅之戊子以肇為太子少傅致仕徙邛州邛渠恭翻清泰元年吳主加徐知誥大丞相尚父嗣齊王九錫辭不受清泰元年雄武節度使張延朗將兵圍文州唐末置天雄節度於秦州後唐改為雄武節度蜀李延厚將果州兵屯興州遣先登指揮使范延暉將兵救文州延朗解圍而歸興州刺史馮暉自乾渠引戍兵歸鳳翔時階興二州皆已入於蜀唐蓋使郭知瓊馮暉領二州刺史以進取而不克也薛史曰長興中馮暉為興州刺史以乾渠為治所乾音干清泰元年十一月徐知誥召其子司徒同平章事景通還金陵自江都還金陵也以次子牙內馬步都指揮使海州團練使景遷為左右軍都軍使左僕射參政事留江都輔政清泰元年十二月己巳以易州刺史安叔千為振武節度使齊州防禦使尹暉為彰國節度使安叔千以捍契丹之功尹暉則鳳翔歸命之賞也沙陀人也宋白曰安叔千本貫雲州界戶屬奉誠軍灰泉村清泰元年壬申石敬瑭奏契丹引去罷兵歸自百井歸晉陽也清泰元年乙亥徵雄武節度使張延朗為中書侍郎同平章事判三司清泰元年辛巳漢皇后馬氏殂馬氏楚王殷女也清泰元年甲申蜀葬文武聖德英烈明孝皇帝于和陵廟號高祖清泰元年乙酉葬鄂王于徽陵城南唐園陵之制兆域之外繚以垣牆列植柏樹謂之柏城觀者悲之考異曰閔帝實錄及薛史閔帝紀皆云晉高祖即位諡曰閔與秦王及重吉並葬徽陵域中今從廢帝實錄清泰元年是歲秋冬旱民多流亡同華蒲絳尤甚華戶化翻清泰元年漢主命判六軍秦王弘度募宿衞兵千人皆市井無賴子弟弘度昵之昵尼質翻同平章事楊洞潛諫曰秦王國之冢嫡冢大也使之治軍已過矣治直之翻況昵㣥小乎漢主曰小兒教以戎事過煩公憂終不戒弘度洞潛出見衞士掠商人金帛商人不敢訴歎曰政亂如此安用宰相因謝病歸第久之不召遂卒二年清泰二年春正月丙申朔閩大赦改元永和清泰二年二月丙寅朔蜀大赦清泰二年甲戌以樞密使天雄節度使兼侍中范延光為宣武節度使兼中書令清泰二年丁丑夏州節度使李彞超上言疾病夏戶雅翻上時掌翻疾甚為病以兄行軍司馬彞殷權知軍州事彞超尋卒清泰二年戊寅蜀主尊母李氏為皇太后太后太原人本莊宗後宮也以賜蜀高祖孟知祥事莊宗夙蒙親任故以後宮賜之史詳書李氏之所自來以別於福慶長公主清泰二年己丑追尊帝母魯國夫人魏氏曰宣憲皇太后魏氏本平山王氏婦也少寡與帝皆為明宗所掠清泰二年閩主立淑陳氏為皇后初閩主兩娶劉氏皆士族美而無寵陳后本閩太祖侍婢金鳳也陋而淫閩主嬖之嬖皮義翻又必計翻以其族人守恩匡勝為殿使殿使閩所置官清泰二年三月辛丑以前宣武節度使兼侍中趙延壽為忠武節度使兼樞密使清泰二年以李彞殷為定難節度使李彞殷後避宋朝廟諱改名彞興其子則李繼捧李繼遷也難乃旦翻清泰二年己酉贈吳越王元瓘母陳氏為晉國太夫人元瓘性孝尊禮母黨厚加賜與而未嘗遷官授以重任清泰二年壬戌以彰聖都指揮使安審琦領順化節度使五代會要清泰元年六月改捧聖馬軍為彰聖左右軍嚴衞步軍為寧衞左右軍梁嘗改滄州義昌軍為順化軍後唐復唐之舊為橫海軍前此吳越錢元珦判明州領順化節度使審琦所領蓋楚州順化軍也金全之子也安金全代北舊將清泰二年太常丞史在德性狂狷上書歷詆內外文武之士薛史載在德書其略曰朝廷任事率多濫進稱武士者不閑計策雖被堅執銳戰則棄甲窮則背軍稱文士者鮮有藝能多無士行問策謀則杜口作文字則倩人所謂虛設具員枉費國力逢陛下維新之運是文明革弊之秋臣請應內外所管軍人凡勝衣甲者請宣下本軍大將一一考試武藝短長權謀深淺居下位有將才者便拔為大將居上位無將略者移之下軍其東班臣僚請內出策題下中書令宰臣面試如下位有大才須拔居大位無大才即移之下僚狷吉掾翻詆丁禮翻黜陟能否執政及朝士大怒盧文紀及補闕劉濤楊昭儉等皆請加罪帝謂學士馬胤孫曰朕新臨天下宜開言路若朝士以言獲罪誰敢言者卿為朕作詔書宣朕意馬胤孫時為翰林學士為于偽翻略曰昔魏徵請賞皇甫德參見一百九十四卷太宗貞觀八年事同言異何其遠哉在德情在傾輸安可責也傾輸謂傾其胸腹所懷而輸忠於上嗣復之曾孫也楊嗣復文宗時為相清泰二年吳加徐景遷同平章事知左右軍事徐知誥令尚書郎陳覺輔之考異曰江南錄時先主權位日隆中外皆知有代謝之勢而以吳主恭謹守道欲待嗣君先主次子景遷吳主之壻也先主鍾愛特甚齊丘使陳覺為景遷教授為之聲價齊丘參決時政多為不法輒歸過於嗣主而盛稱景遷之美幾有奪嫡之計所以然者以吳主少而先主老必不能待他日得國授於景遷易制己為元老威權無上矣此其日夕為謀也先主覺之乃召齊丘如金陵以為己之副遙兼申蔡節度使無所關預從容而已今從十國紀年吾少時與宋子嵩論議好相詰難少詩照翻好呼到翻詰去吉翻難乃旦翻或吾捨子嵩還家或子嵩拂衣而起子嵩攜衣笥望秦淮門欲去者數矣吾常戒門者止之宋齊丘字子嵩秦淮門金陵城門數所角翻猶未徧達時事況景遷年少當國故屈吾子以誨之耳清泰二年夏四月庚午蜀以御史中丞龍門毋昭裔為中書侍郎同平章事龍門縣本漢皮氏縣後魏更名唐屬河中府九域志在府東北九十五里毋姓也毋丘氏或為毋氏望出平昌鉅鹿開元補闕有毋景洛陽人一云吳人毋武夫翻清泰二年癸未加樞密使刑部尚書韓昭胤中書侍郎同平章事辛卯以宣徽南院使劉延皓為刑部尚書充樞密使延皓皇后之弟也癸巳以左領軍衞大將軍劉延朗為本衞上將軍充宣徽北院使兼樞密副使清泰二年五月丙申契丹寇新州及振武清泰二年庚戌賜振武節度使楊檀名光遠薛史載中書奏準天成三年正月敕九廟諱但回避正文其偏旁文字不在減少點畫今鄭州節度使楊檀檀州金壇等名酌情制宜並請改之其表章文案偏旁字缺點畫凡臣僚名涉偏旁亦請改名詔曰偏旁文字音韻懸殊止避正呼不宜全改楊檀宜賜名光遠餘依舊按此以明宗廟諱亶字避偏旁也楊檀時不鎮定州當從通鑑清泰二年六月吳德勝節度使兼中書令柴再用卒先是史官王振嘗詢其戰功先悉薦翻再用曰鷹犬微效皆社稷之靈再用何功之有竟不報有功而不求聞武人如柴再用者亦可稱也清泰二年契丹寇應州清泰二年河東節度使北面總管石敬瑭既還鎮去年五月帝令石敬瑭還太原帝好咨訪外事好呼到翻常命端明殿學士李專美翰林學士李崧知制誥呂琦薛文遇翰林天文趙延乂等唐之中世司天臺有天文博士二人正八品下天文觀生九十人天文生五十人皆掌候天文翰林天文居翰林院以候天文者也與語或至夜分時敬瑭二子為內使更工衡翻內使內諸司使按石敬瑭拒命之時其子重殷為右衞上將軍重裔為皇城副使曹太后則晉國長公主之母也敬瑭妻魏國公主是年四月進封晉國長知兩翻令伺帝之密謀事無巨細皆知之敬瑭多於賓客前自稱羸瘠不堪為帥羸倫為翻瘠在亦翻帥所類翻冀朝廷不之忌時契丹屢寇北邊禁軍多在幽幷敬瑭與趙德鈞求益兵運糧朝夕相繼敬瑭求兵糧以實幷州趙德鈞求兵糧以實幽州甲申詔借河東人有蓄積者菽粟乙酉詔鎮州輸絹五萬匹於總管府糴軍糧總管府在晉陽石敬瑭時為北面馬步軍都總管故也九域志鎮州西北至代州六百二十里乘繩證翻時水旱民饑敬瑭遣使督趣嚴急趣讀曰促山東之民流散此謂太行常山之東史敍致亂之由敬瑭將大軍屯忻州朝廷遣使賜軍士夏衣傳詔撫諭軍士呼萬歲者數四時驕兵習於聞見又欲扶立石敬瑭以希賞幕僚河內段希堯請誅其唱首者敬瑭命都押衙劉知遠斬挾馬都將李暉等三十六人以徇希堯懷州人也帝聞之益疑敬瑭清泰二年壬辰詔竊盜不計贓多少幷縱火強盜並行極法清泰二年閩福王繼鵬私於宮人李春鷰繼鵬請之於陳后后白閩主而賜之清泰二年秋七月以樞密使劉延皓為天雄節度使清泰二年乙巳以武寧節度使張敬達為北面行營副總管將兵屯代州以分石敬瑭之權為令張敬達討石敬瑭張本清泰二年帝深以時事為憂嘗從容讓盧文紀等以無所規贊從千容翻丁巳文紀等上言臣等每五日起居與兩班旅見暫獲對揚見賢遍翻兩班者文武官分為東西兩班書說命說拜稽首曰敢對揚天子之休命註云對答也答受美命而稱揚之後人遂以面對為對揚侍衞滿前雖有愚慮不敢敷陳竊見前朝自上元以來置延英殿或宰相欲有奏論天子欲有咨度章十二行本度下有皆非時召對五字乙十一行本同孔本同張校同退齋校同上元唐肅宗年號度徒洛翻旁無侍衞故人得盡言望復此故事惟聽機要之臣侍側機要之臣謂樞密舊制五日起居百僚俱退宰相獨升若常事自可敷奏或事應嚴密不以其日或異日聽於閤門奏牓子當盡屏侍臣屏必郢翻又卑正翻於便殿相待何必襲延英之名也清泰二年吳潤州團練使徐知諤狎昵小人昵尼質翻游燕廢務作列肆於牙城西躬自貿易貿音茂徐知誥聞之怒召知諤左右詰責知諤懼或謂知誥曰忠武王最愛知諤徐溫諡忠武王徐知誥之得政在於定朱瑾之難若徐溫臨沒而傳政於知誥非本心也事見二百七十六卷明宗天成二年謂自昇州召知詢還揚州也借使知諤治有能名治直吏翻訓兵養民於公何利知誥感悟待之加厚清泰二年九月丙申吳大赦改元天祚清泰二年己酉以宣徽南院使房暠為刑部尚書充樞密使暠古老翻宣徽北院使劉延朗為南院使仍兼樞密副使於是延朗及樞密直學士薛文遇等居中用事暠與趙延壽雖為使長樞密使為樞密院之長長知兩翻暠隨勢可否不為事先每幽幷遣使入奏樞密諸人環坐議之暠多俛首而寐比覺引頸振衣則使者去矣俛音免比必利翻覺居效翻啟奏除授一歸延朗為劉延朗受誅於晉房暠獲全張本然二人皆帝之親臣也延朗之好貨非也暠之避事亦非矣必先賂延朗後議貢獻賂厚者先得內地賂薄者晚得邊陲由是諸將帥皆怨憤帝不能察清泰二年蜀金州防禦使全師郁寇金州拔水寨按元和郡縣志漢水去金州城百步故唐置水寨以防蜀兵都監陳知隱託他事將兵三百沿流遁去防禦使馬全節罄私財以給軍出奇死戰蜀兵乃退戊寅詔斬知隱清泰二年初閩主有幸臣曰歸守明出入臥內閩主晚年得風疾陳后與守明及百工院使李可殷私通國人皆惡之莫敢言惡烏路翻可殷嘗譖皇城使李倣於閩主后族陳匡勝無禮於福王繼鵬倣及繼鵬皆恨之閩主疾甚繼鵬有喜色倣以閩主為必不起冬十月己卯使壯士數人持白梃擊李可殷殺之梃待鼎翻中外震驚庚辰閩主疾少間間如字閩主力疾視朝詰可殷死狀倣懼而出俄頃引部兵鼓譟入宮閩主聞變匿於九龍帳下閩主命錦工作九龍帳國人歌之曰誰謂九龍帳惟貯一歸郎歸郎謂守明也刺七亦翻閩主宛轉未絕宮人不忍其苦為絕之為絕其命也為于偽翻繼韜素與繼鵬相惡故也辛巳繼鵬稱皇太后令監國是日即皇帝位皇太后璘母黃氏也繼鵬璘之長子更工衡翻諡其父曰齊肅明孝皇帝廟號惠宗既而自稱權知福建節度事遣使奉表於唐大赦境內立李春鷰為賢初閩惠宗娶漢主女清遠公主廣州有清遠縣唐志無閩清縣蓋王氏始分置也九域志閩清縣屬福州在州西北一百五十里宋白曰唐貞元元年割候官縣十鄉為梅溪場梁乾化元年改為閩清縣番音潘漢主賜以大第稟賜甚厚數問以閩事稟筆錦翻給也數所角翻延遇不對退謂人曰去閩語閩去越語越處人宮禁可如是乎處昌呂翻漢主聞而賢之以為內常侍使鉤校諸司事延遇聞惠宗遇弒求歸不許素服向其國三日哭史言林延遇不忘舊君清泰二年荊南節度使高從誨性明達親禮賢士委任梁震以兄事之震常謂從誨為郎君門生故吏呼其主之子為郎君梁震事高季興從誨之父也故以郎君呼從誨楚王希範好奢靡好呼到翻下玩好同游談者共誇其盛從誨謂僚佐曰如馬王可謂大丈夫矣孫光憲對曰天子諸侯禮有等差彼乳臭子驕侈僭忲忲他蓋翻奢也取快一時不為遠慮危亡無日又足慕乎從誨久而悟曰公言是也他日謂梁震曰吾自念平生奉養固已過矣乃捐去玩好去羌呂翻好呼到翻以經史自娛省刑薄賦境內以安梁震曰先王待我如布衣交以嗣王屬我先王謂高季興嗣王謂從誨屬之欲翻不墜其業吾老矣不復事人矣復扶又翻遂固請退居從誨不能留乃為之築室於土洲為于偽翻江陵有九十九洲土洲其一也梁震事高氏始二百六十六卷梁太祖開平二年震披鶴氅氅昌兩翻自稱荊臺隱士每詣府跨黃牛至聽事聽讀曰廳從誨時過其家過音戈四時賜與甚厚自是悉以政事屬孫光憲屬之欲翻臣光曰孫光憲見微而能諫高從誨聞善而能徙高從誨之羨馬希範是侈心之萌芽也而孫光憲力言之以防微高從誨因光憲之言捐玩好而樂經史思所以阜民保境是遷善也梁震翼贊高氏父子能保其國是功也夫何亡國敗家喪身之有喪息浪翻清泰二年吳加中書令徐知誥尚父太師大丞相大元帥進封齊王備殊禮以昇潤宣池歙常江饒信海十州為齊國考徐知誥所封十州自潤循江而上至于江則中斷吳國之腰膂江都之與洪鄂脈理不屬矣自常潤波海界淮而有海州則有包舉吳國之勢其規圖自以為得當是時合全吳之人歸心知誥何必如是而後篡也歙書涉翻殊禮不受清泰二年閩皇城使判六軍諸衞李倣專制朝政陰養死士朝直遙翻閩主昶與拱宸指揮使林延皓等圖之延皓等詐親附倣倣待之不疑十一月壬子倣入朝延皓等伏衞士數百於內殿執斬之梟首朝門梟堅堯翻朝門正朝之門朝直遙翻倣部兵千餘持白梃攻應天門不克焚啟聖門奪倣首奔吳越詔暴倣弒君及殺繼韜等罪告諭中外此閩主之詔也以六軍判官永泰葉翹為內宣徽使參政事唐懿宗咸通二年分連江及閩置永泰縣屬福州九域志在州西南三百五十里福州圖經云永泰縣唐永泰二年置以年號為名翹祈消翻翹博學質直閩惠宗擢為福王友閩主昶初封福王多所裨益宮中謂之國翁昶既嗣位驕縱不與翹議國事一旦昶方視事翹衣道士服過庭中趨出衣於既翻昶召還拜之曰軍國事殷久不接對孤之過也翹頓首曰老臣輔導無狀致陛下即位以來無一善可稱願乞骸骨昶曰先帝以孤屬公屬之欲翻政令不善公當極言柰何棄孤去厚賜金帛慰諭令復位昶元梁國夫人李氏同平章事敏之女昶嬖李春鷰昶求春鷰於陳后見上六月嬖卑義翻又博計翻翹諫曰夫人先帝之甥聘之以禮柰何以新愛而棄之昶不悅由是疏之未幾復上書言事幾居豈翻復扶又翻昶批其紙尾曰一葉隨風落御溝批匹迷翻筆題之也遂放歸永泰路振九國志葉翹斥歸永春按九域志泉州有永春縣福州有永泰縣未知孰是清泰二年帝嘉馬全節之功卻蜀兵全金州之功也劉延朗求賂全節無以與之延朗欲除全節絳州刺史㣥議沸騰帝聞之乙卯以全節為橫海留後帝既聞之而不罪劉延朗善善惡惡郭之所以亡也清泰二年十二月壬申以中書侍郎同平章事充樞密使韓昭胤同平章事充護國節度使清泰二年乙酉以前匡國節度使同平章事馮道為司空時久無正拜三公者喪亂以來以他官兼領及檢校三公者有之無正拜者盧文紀欲令掌祭祀掃除隋制三公參議國之大事祭祀則太尉亞獻司徒奉俎司空行掃除盧文紀不深考遂以為司空職掌朝直遙翻司空掃除職也吾何憚焉既而文紀自知不可乃止史言後唐雖自言纂唐舊服而文獻皆不足清泰二年閩主賜洞真先生陳守元號天師信重之乃至更易將相更工衡翻刑罰選舉皆與之議守元受賂請託言無不從其門如市鄧廣銘標點聶崇岐覆校
