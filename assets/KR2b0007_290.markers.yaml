  - {type: variant, offset: 15, length: 0, content: '', WYG: 顔衎權知兖州事衎苦旱翻又苦旰翻赦兖州管内彦超黨逃匿者期一月聽自首首式又翻前已伏誅者赦其親戚癸未降泰寕軍為防禦州以慕容彦超據兖州拒命降節鎮為防禦州唐司徒致仕李建勲卒且死戒其家人曰時事如此吾得良死幸矣勿封土立碑聽人耕種於其上免為他日開發之標及江南之亡也謂宋平金陵時諸貴人髙大之冢無不發者惟建勲冢莫知其處李建勲知國事之日非而骸骨得保其藏可不謂智乎六月乙酉朔帝如曲阜謁孔子祠昔少皥氏自窮桑而徙曲阜魯侯伯禽所宅少皥氏之墟也應劭曰曲阜在魯城中委曲長七八里劉昫曰曲阜有闕里孔子所居後人立孔子祠自唐以來兖州治瑕丘而曲阜為屬縣九域志在州東四十里宋大中祥符五年改曲阜為仙源縣既奠將拜左右曰孔子陪臣也不當以天子拜之帝曰孔子百世帝王之師敢不敬乎遂拜之又拜孔子墓命葺孔子祠禁孔林樵採孔子廟在曲阜城西南隅闕里孔子墓在曲阜城北泗水上去城一里𦵏地葢一頃墳南北十步東西十三步髙一丈二尺前有瓴甋為祠壇方六尺與地平塋中異木以百數皆諸弟子自四方致之植於塋中魯人莫之識也訪孔子顔淵之後以為曲阜令及主簿丙戌帝發兖州乙未呉越順徳太夫人呉氏卒丁酉蜀大水入成都秦時蜀守季氷穿二江成都中皆可行舟郡縣志曰李氷鑿離澤又開二渠由永康過新繁入成都謂之外江又一渠由永康過郫入成都謂之内江髙駢未築羅城内外江皆從城西入自駢築城遂從西北作糜棗堰外江遶城北而東注於合江内江循城南而與外水俱注江江自西來其地勢髙所以有水患漂沒千餘家溺死五千餘人壞太廟四室壞音怪戊戌蜀大赦賑水災之家己亥帝至大梁自兖州還至大梁朔方節度使}
