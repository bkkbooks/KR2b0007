  - {type: variant, offset: 22, length: 1, content: 太, SBCK: 與幽州節度使蕭海真善海真契丹主兀欲之妻弟也澣􅀃海真內附海真欣然許之澣因定州諜者田重霸齎絹表以聞且與濤書言契丹主童騃專事宴遊無逺志非前人之比朝廷若能用兵必克不然與和必得二者皆利於速度其情勢它日終不能力助河東者也壬寅重霸至大梁㑹}
  - {type: page-break, offset: 22, content: '', id: KR2b0007_SBCK_290-20b}
  - {type: variant, offset: 22, length: 1, content: 太, WYG: 與幽州節度使蕭海真善海真契丹主托雲之妻弟也澣説海真内附海真欣然許之澣因定州諜者田重霸齎絹表以聞説式芮翻諜達協翻重直龍翻且與濤書言契丹主童騃騃五駭翻癡也專事宴遊無逺志非前人之比前人謂阿保機徳光等朝廷若能用兵必克不然與和必得二者皆利於速度其情勢他日終不能力助河東者也度徒洛翻河東謂壮漢壬寅重霸至大梁㑹}
  - {type: page-break, offset: 22, content: '', id: KR2b0007_WYG_290-35a, image: WYG0310/WYG0310-0675a.png}
  - {type: variant, offset: 22, length: 1, content: 太, krp: 與幽州節度使蕭海真善海真契丹主托雲之妻弟也澣説海真内附海真欣然許之澣因定州諜者田重霸齎絹表以聞説式芮翻諜達協翻重直龍翻且與濤書言契丹主童騃騃五駭翻癡也專事宴遊無逺志非前人之比前人謂阿保機徳光等朝廷若能用兵必克不然與和必得二者皆利於速度其情勢他日終不能力助河東者也度徒洛翻河東謂壮漢壬寅重霸至大梁㑹}
  - {type: variant, offset: 24, length: 9, content: 大夫提舉西京嵩山崇, SBCK: 國多事不果從辛亥以馮繼業爲朔方留後樞密使王峻性輕躁多計數好權利喜人附已自以天下爲己任每言事帝從之則喜或時未允輒愠懟往往發不遜語帝以其故舊且有佐命功又素知其爲人每優容之峻年長於帝帝即位猶以兄呼之或稱其字峻以是益驕副使鄭仁誨皇城使向訓恩州團練使李重進皆帝在藩鎭時腹心將佐也帝即位稍稍進用峻心嫉之累表稱疾求解機務以詗帝意帝屢遣左右敦諭峻對使者辭氣亢厲又遺諸道節度使書求保證諸道各獻其書帝驚駭乆之復遣左右慰勉令視事且曰卿儻不來朕且自往猶不至帝知樞密直學士陳觀與峻親善令往諭指觀曰陛下但聲言臨幸其第嚴駕以待之峻必不敢不來從之秋七月戊子峻入朝帝慰勞令視事重進滄州人其母即帝妹}
  - {type: page-break, offset: 24, content: '', id: KR2b0007_SBCK_290-21a}
  - {type: variant, offset: 24, length: 4, content: 大夫提舉, WYG: 國多事不果從北不得燕雲}
  - {type: variant, offset: 24, length: 4, content: 大夫提舉, krp: 國多事不果從北不得燕雲}
  - {type: variant, offset: 29, length: 4, content: 京嵩山崇, WYG: 不得河鄯靈夏宋人以為千古之恨觀温公書此事則元祐初棄米脂等四寨知中國之力不足也辛亥以馮繼業為朔方留後樞密使王峻性輕躁多計數好權利喜人附已躁則到翻好呼到翻喜許記翻自以天下為己任每言事帝從之則喜或時未允輒愠懟愠於運翻懟直類翻往往發不遜語帝以其故舊且有佐命功帝自鄴都入汴以至即位王峻之功為多又素知其為人每優容之峻年長於帝帝即位猶以兄呼之或稱其字峻以是益驕副使鄭仁誨皇城使向訓恩州團練使李重進皆帝在藩鎮時腹心將佐也重直龍翻將即亮翻帝即位稍稍進用峻心嫉之累表稱疾求解機務以詗帝意詗古永翻又翾正翻帝屢遣左右敦諭峻對使者辭氣亢厲亢苦浪翻又遺諸道節度使書求保證遺唯季翻諸道各獻其書帝驚駭久之復遣左右慰勉令視事復扶又翻且曰卿儻不來朕且自往猶不至帝知樞密直學士陳觀與峻親善令往諭指觀曰陛下但聲言臨幸其第峻必不敢不來秋七月戊子峻入朝帝慰勞令視事勞力到翻為貶王峻張本重進滄州人其母即帝妹}
  - {type: page-break, offset: 29, content: '', id: KR2b0007_WYG_290-35b, image: WYG0310/WYG0310-0675b.png}
  - {type: page-break, offset: 29, content: '', id: KR2b0007_WYG_290-36a, image: WYG0310/WYG0310-0675c.png}
  - {type: variant, offset: 29, length: 4, content: 京嵩山崇, krp: 不得河鄯靈夏宋人以為千古之恨觀温公書此事則元祐初棄米脂等四寨知中國之力不足也辛亥以馮繼業為朔方留後樞密使王峻性輕躁多計數好權利喜人附已躁則到翻好呼到翻喜許記翻自以天下為己任每言事帝從之則喜或時未允輒愠懟愠於運翻懟直類翻往往發不遜語帝以其故舊且有佐命功帝自鄴都入汴以至即位王峻之功為多又素知其為人每優容之峻年長於帝帝即位猶以兄呼之或稱其字峻以是益驕副使鄭仁誨皇城使向訓恩州團練使李重進皆帝在藩鎮時腹心將佐也重直龍翻將即亮翻帝即位稍稍進用峻心嫉之累表稱疾求解機務以詗帝意詗古永翻又翾正翻帝屢遣左右敦諭峻對使者辭氣亢厲亢苦浪翻又遺諸道節度使書求保證遺唯季翻諸道各獻其書帝驚駭久之復遣左右慰勉令視事復扶又翻且曰卿儻不來朕且自往猶不至帝知樞密直學士陳觀與峻親善令往諭指觀曰陛下但聲言臨幸其第峻必不敢不來秋七月戊子峻入朝帝慰勞令視事勞力到翻為貶王峻張本重進滄州人其母即帝妹}
  - {type: variant, offset: 34, length: 5, content: 宮上柱國河, SBCK: 慶長公主也李榖足跌傷右臂在告月餘帝以榖職業繁劇趣令入朝辭以未任趨拜癸巳詔免朝參但令視事蜀工部尚書判武德軍邵延鈞不禮於􅁥押王承丕承丕謀作亂辛丑左奉聖都指揮使安次孫欽當以部兵戍邊往辭承丕承丕邀與俱見府公欽不知其謀從之承丕至則令左右擊殺延鈞屠其家稱奉詔處置軍府即開府庫賞士卒出繫囚發屯戍將吏畢集欽謂承丕曰今延鈞已伏辜公宜出詔書以示衆承丕曰我能致公富貴勿問詔書欽始知承丕反因紿曰今}
  - {type: page-break, offset: 34, content: '', id: KR2b0007_SBCK_290-21b}
  - {type: variant, offset: 34, length: 1, content: 宮, WYG: 慶長公主也長知兩翻李榖足跌傷右臂跌徒結翻在告月餘帝以榖職業繁劇趣令入朝在告在假也趣讀曰促朝直遥翻下同辭以未任趨拜任音壬癸巳詔免朝參但令視事蜀工部尚書判武徳軍郭延鈞不禮於監押王承丕承丕謀作亂辛丑左奉聖都指揮使安次孫欽安次縣屬幽州孫欽本燕人而仕於蜀當以部兵戍邊往辭承丕承丕邀與俱見府公府公謂郭延鈞也公者人之尊稱一府所尊故謂之府公欽不知其謀從之承丕至則令左右擊殺延鈞屠其家稱奉詔處置軍府處昌吕翻即開府庫賞士卒出繫囚發屯戍將吏畢集欽謂承丕曰今延鈞已伏辜公宜出詔書以示衆承丕曰我能致公富貴勿問詔書欽始知承丕反因紿曰今内外未安我請以部兵為公巡察為于偽翻即躍馬而出承丕連呼之不止欽至營曉諭其衆帥以入府攻承丕帥讀曰率承丕左右欲拒戰欽叱之皆棄兵走遂執承丕斬之并其親黨傳首成都天平節度使守中書令髙行周卒行周有勇而知義功髙而不矜䇿馬臨敵叱咤風生平居與賔僚宴集侃侃和易个以是重之咤涉駕翻易以䜴翻史言髙行周所以能以功名終癸卯蜀主遣客省使趙季札如梓州慰撫吏民以新經王承丕之亂也漢法犯私鹽麴無問多少抵死鄭州民有以屋税受鹽於官過州城吏以為私鹽執而殺之其妻訟寃癸丑始詔犯鹽麴者以斤兩定刑有差時勑諸色犯鹽麴所犯一斤已下至一兩杖八十配役五斤已下一斤已}
