  - {type: variant, offset: 69, length: 3, content: 台音註, SBCK: 下母守貞喜曰吾婦猶母天下况我乎反意遂決及敗崇訓先自刃其弟妹次及符氏符氏匿幃下崇訓倉猝求之不獲遂自剄亂兵既入符氏安坐堂上叱亂兵曰吾父與郭公爲昆弟汝曹勿無禮太祖遣使歸之於彦卿及帝鎭澶州太祖為帝娶之壬戍立爲皇后后性和惠而明決帝甚重之王彦超韓通攻石州克之執刺史安彦進癸亥沁州刺史李廷誨降庚午帝發潞州趣晉陽癸酉北漢忻州監軍李勍殺刺史趙臯及契丹通事楊耨姑舉城降以勍爲忻州刺史王逵表請復徙使府治朗州資治通鑑卷第二百九十一}
