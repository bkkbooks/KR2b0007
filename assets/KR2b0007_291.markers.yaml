  - {type: 'tls:seg', offset: 59, content: '', id: KR2b0007_ZHSJ_291-d71p1s2}
  - {type: variant, offset: 59, length: 0, content: '', SBCK: 及親軍校追諭止之莫肯奉詔使者或爲軍士所殺揚言契丹大至官軍敗績餘衆已降虜矣劉詞遇愛能等於塗愛能等止之詞不從引兵而北時北漢主尚有餘衆萬餘人阻澗而陳薄暮詞至復與諸軍擊之北漢兵又敗殺王延嗣追至高平僵尸滿山谷委弃御物及輜重器械雜畜不可勝紀是夕帝宿於野次得步兵之降敵者皆殺之樊愛能等聞周兵大㨗與士卒稍稍復還有逹曙不至者甲午休兵于高平選北漢降卒數千人爲効順指揮命前武勝行軍}
  - {type: page-break, offset: 59, content: '', id: KR2b0007_SBCK_291-16b}
  - {type: variant, offset: 61, length: 0, content: '', SBCK: 唐景思將之使戍淮上餘二千餘人賜貲裝縱遣之李穀爲亂兵所迫潛竄山谷數日乃出丁酉帝至潞州北漢主自高平被褐戴笠乗契丹所贈黄騮帥百餘􅀐由雕窠嶺遁歸宵迷俘村民爲導誤之晉州行百餘里乃覺之殺導者晝夜北走所至得食未舉筯或傳周兵至輒蒼黄而去北漢主衰老力憊伏於馬上晝夜馳驟殆不能支僅得入晉陽帝欲誅樊愛能等以肅軍政猶豫未決己亥晝卧行宫帳中張永德侍側帝以其事訪之對曰愛能等素無大功忝冒節􅃏望敵先逃死未塞責且陛下方欲削平四海茍軍法不立雖有熊羆之士百萬之衆安得而用之帝擲枕於地大呼稱善即收愛能徽及所部軍使以上七十餘人責之曰汝軰皆累朝宿將非不能戰今望風奔遁者無它正欲以朕爲竒貨賣與劉崇耳悉斬之帝以何徽先守晉州有功欲免之既而以法不可廢遂并誅之而給槥車歸葬自是驕將惰卒始知所懼不行姑息之政矣庚子賞高平之功以李重進兼忠武節度使向訓兼義成節度使張永徳兼武信節度使史彦超爲鎭國節度使張永徳盛稱太祖皇帝之智勇帝擢太祖皇帝爲殿前都虞􅃸領嚴州刺史以馬仁瑀爲控鶴弓箭直指揮使馬全乂爲散貟指揮使自餘將校遷拜者凡數十人士卒有自行間擢主軍廂者釋趙晁之囚北漢主收散卒繕甲兵完城塹以備周楊衮將其衆北屯代州北漢主遣王得中送衮因求救於契丹契丹主遣得中還報許發兵救晉陽壬寅以符彦卿爲河東行營都部署兼知太原行府事以郭崇副之向訓爲都監李重進爲馬步都虞􅃸史彦超爲先鋒都指揮使將歩􅀐二萬發潞州仍詔王彦超韓通自隂地闗入與彦卿合軍而進又以劉詞爲隨駕部署保大節度使白重賛副之漢昭聖皇太后李氏殂于西宫夏四月北漢盂縣降符彦卿軍晉陽城下王彦超攻汾州北漢防禦使董希顔降帝遣萊州防禦使康延沼攻遼州密州防禦使田瓊攻沁州皆不下供備庫副使太原李謙溥單􅀐􅀃遼州刺史張漢超漢超即降乙卯葬聖神恭肅文武孝皇帝于嵩陵廟號太祖南漢主以高王􅀪邈爲雄武節度使鎭邕州􅀪邈以齊鎭二王相繼死於邕州固辭求宿衛不許至鎭委政僚佐日飲酒禱鬼神或上書誣􅀪邈謀作亂戊午南漢主遣甘泉宫使林延遇賜酖殺之初帝遣符彦卿等北征但欲耀兵於晉陽城下未議攻取既入北漢境其民爭以食物迎周師泣訴劉氏賦役之重願供軍須助攻晉陽北漢州縣繼有降者帝聞之始有兼并之意遣使往與諸將議之諸將皆言芻糧不足請且班師以俟再舉帝不聽既而諸軍數十萬聚於太原城下軍士不免剽掠北漢民失望稍稍保山谷自固帝聞之馳詔禁止剽掠安撫農民止徵今嵗租稅及募民入粟拜官有差仍發澤潞晉絳慈隰及山東近便諸州民運粮以饋軍己未遣李穀詣太原計度芻糧庚申太師中書令瀛文懿王馮道卒道少以孝謹知名唐莊宗丗始貴顯自是累朝不離將相三公三師之位爲人清儉寛􅀪人莫測其喜愠滑稽多智浮沈取容嘗著長樂老敘自述累朝榮遇之狀時人往往以德量推之歐陽脩論曰禮義廉恥國之四維四維不張國乃滅亡禮義治人之大法廉恥立人之大節況爲大臣而無廉恥天下其有不亂國家其有不亡者乎予讀馮道長樂老叙見其自述以爲榮其可謂無廉恥者矣則天下國家可從而知也予於五代得全節之士三死事之臣十有五皆武夫戰卒豈於儒者果無其人哉得非高節之士惡時之亂薄其丗而不肯出歟抑君天下者不足顧而莫能致之歟予嘗聞五代時有王凝者家青齊之間爲虢州司户參軍以疾卒于官凝家素貧一子尚㓜妻李氏携其子負其遺骸以歸東過開封止於旅舍主人不納李氏顧天已暮不肯去主人牽其臂而出之李氏仰天慟曰我爲婦人不能守節而此手爲人所執邪即引斧自斷其臂見者爲之嗟泣開封尹聞之白其事於朝厚䘏李氏而笞其主人嗚呼士不自愛其身而忍恥以偷生者聞李氏之風冝少知愧哉臣}
