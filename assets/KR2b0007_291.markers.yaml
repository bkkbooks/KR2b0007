  - {type: variant, offset: 17, length: 0, content: '', WYG: 宰相又求重鎮復扶又翻峻求領藩鎮見上月觀其志趣殊未盈厭厭於艷翻又於鹽翻無君如此誰則堪之甲子貶峻商州司馬制辭略曰肉視羣后孩撫朕躬言視朝臣如几上肉撫天子如嬰孩帝慮鄴都留守王殷不自安王峻王殷佐命有功一體之人峻得罪故慮殷猜懼命殷子尚食使承誨詣殷尚食使唐尚食奉御之職諭以峻得罪之狀峻至商州得腹疾帝猶愍之命其妻往視之未幾而卒幾居豈翻帝命折從阮分兵屯延州折從阮時為靜難帥帥兵討野鷄族而還師髙紹基始懼屢有貢獻又命供奉官張懷貞將禁兵兩指揮屯鄜延鄜方無翻紹基乃悉以軍府事授副使張匡圖甲戌以客省使向訓權知延州三月甲申以鎮寕節度使榮為開封尹晉王王峻既貶始召榮入丙戌以樞密副使鄭仁誨為鎮寜節度使初殺牛族與野鷄族有隙聞官軍討野鷄饋餉迎奉官軍利其財畜而掠之殺牛族反與野雞合敗寜州刺史張建武于包山敗補邁翻帝以郭彦欽擾羣胡致其作亂事見上年十月黜廢於家初解州刺史浚儀郭元昭與𣙜鹽使李温玉有隙漢隱帝分河中之解安邑聞喜為解州解户買翻𣙜古岳翻温玉壻魏仁浦為樞密主事晉有尚書都令史八人秩二百石與左右丞總知都臺事梁五人謂之五都令史隋開皇初改都令史為都事置八人後魏於尚書諸司置主事令史隋於諸省又各置主事令史煬帝並去令史之名更曰主事初雜用士人至唐並用流外至五代樞密院亦置主事元昭疑仁浦庇之㑹李守貞反温玉有子在河中元昭收繫温玉奏言其叛事連仁浦帝時為樞密使知其誣釋不問至是仁浦為樞密承㫖元昭代歸甚懼過洛陽以告仁浦弟仁滌仁滌曰吾兄平生不與人為怨况肯以私害公乎既至丁亥仁浦白帝以元昭為慶州刺史己丑以棣州團練使太原王仁鎬為宣徽北院使兼樞密副使唐主復以左僕射馮延己同平章事去年十月唐失潭州馮延己罷相周行逢惡武平節度副使張倣惡烏路翻言於王逵曰何敬真倣之親戚臨刑以後事屬倣公宜備之屬之欲翻夏四月庚申逵召倣飲醉而殺之丙寅歸徳節度使兼侍中常思入朝戊辰徙平盧節度使將行奏曰臣在宋州舉絲四萬餘兩在民間謹以上進請徴之舉絲者以貨物貸與民至絲熟而徴其絲上時掌翻帝頷之五月丁亥敇牓宋州凡常思所舉悉蠲之思亦無怍色怍疾各翻自唐末以來所在學校廢絶蜀毋昭裔出私財百萬營學館校户教翻毋音無姓也齊宣王封母弟於毋鄉其後因以為氏且請刻板印九經蜀主從之由是蜀中文學復盛自漢司馬相如揚雄以來蜀中號為多士而斯文之盛衰則繫乎上之人六月壬子滄州奏契丹知盧臺軍事范陽張藏英來降初唐明宗之世宰相馮道李愚請令判國子監田敏校正九經刻板印賣朝廷從之丁巳板成獻之雕印九經始二百七十七卷唐明宗長興三年至是而成凡涉二十八年由是雖亂世九經傳布甚廣史言聖人之道所以不墜者以其有方策之傳也王逵以周行逢知潭州自將兵襲朗州克之殺指揮使鄭珓珓古孝翻執武安節度使同平章事劉言幽于别館劉言為武平節度使鎮朗州非武安也安當作平言以元年七月得朗州至是而敗秋七月王殷三表請入朝帝疑其不誠遣使止之唐大旱井泉涸淮水可涉饑民度淮而北者相繼濠夀發兵禦之民與兵鬬而北來觀民心之向背唐之君臣可以岌岌矣帝聞之曰彼我之民一也聽糴米過淮唐人遂築倉多糴以供軍八月己未詔唐民以人畜負米者聽之以舟車運載者勿予予讀曰與王逵遣使上表誣劉言謀以朗州降唐又欲攻潭州其衆不從廢而囚之臣已至朗州撫安軍府訖且請復移使府治潭州去年劉言表移使府於朗州甲戌遣通事舎人翟光裔詣湖南宣撫從其所請翟萇伯翻又徒厯翻逵還長沙以周行逢知朗州事又遣潘叔嗣殺劉言於朗州為潘叔嗣殺王逵周行逢殺叔嗣張本九月己亥武成節度使白重贊奏塞决河滑州自唐以來置義成節度宋朝太平興國元年以太宗舊名始改為武成軍於此時武當作義塞悉則翻契丹冦樂夀齊州戍兵右保寜都頭劉漢章殺都監杜延熙謀應契丹不克并其黨伏誅南漢主立其子繼興為衛王璇興為桂王慶興為荆王保興為禎王崇興為梅王東自青徐南至安復西至丹慈丹州在龍門河之西慈州在龍門河之東宋朝熙寕五年廢慈州以吉鄉縣屬隰州九域志吉鄉縣在隰州西南一百六十里北至貝鎮皆大水帝自入秋得風痺疾痺必至翻又毗至翻害於食飲及步趨術者言宜散財以禳之帝欲祀南郊又以自梁以來郊祀常在洛陽疑之執政曰天子所都則可以祀百神何必洛陽於是始築圓丘社稷壇作太廟於大梁自梁都大梁以來建立郊廟皆所未遑晉天福四年太常禮院奏唐廟制度請以至徳宫正殿隔為五室而已今始作太廟癸亥遣馮道迎太廟社稷神主于洛陽南漢大赦冬十一月己丑太常請凖洛陽築四郊諸壇從之十二月丁未朔神主至大梁帝迎于西郊祔享于太廟鄴都留守天雄節度使兼侍衛親軍都指揮使同平章事王殷恃功専横恃佐命之功也横户孟翻凡河北鎮戍兵應用敇處分者殷即以帖行之又多掊歛民財處昌吕翻分扶問翻掊蒲侯翻帝聞之不悦使人謂曰卿與國同體鄴都帑庾甚豐帑他朗翻卿欲用則取之何患無財成徳節度使何福進素惡殷惡烏路翻甲子福進入朝密以殷隂事白帝帝由是疑之乙丑殷入朝詔留殷充京城内外巡檢戊辰府州防禦使折徳扆奏北漢將喬贇入冦贇於倫翻擊走之王殷每出入從者常數百人殷請量給鎧仗以備巡邏從才用翻量音良邏郎佐翻因充京城内外巡檢遂有此請帝難之時帝體不平將行郊祀而殷挾震主之勢在左右衆心忌之壬申帝力疾御滋徳殿殷入起居遂執之下制誣殷謀以郊祀日作亂流登州出城殺之命鎭寧節度使鄭仁誨詣鄴都安撫仁誨利殷家財擅殺殷子遷其家屬於登州唐祠部郎中知制誥徐鉉言貢舉初設不宜遽罷乃復行之唐罷貢舉事見上卷上年先是楚州刺史田敬洙請修白水塘溉田以實邊先悉薦翻白水塘在楚州實應縣西八十里鄧艾所築也馮延己以爲便李徳明因請大闢曠土爲屯田修復所在渠塘堙廢者吏因縁侵擾大興力役奪民田甚衆民愁怨無訴徐鉉以白唐主唐主命鉉按視之鉉籍民田悉歸其主或譖鉉擅作威福唐主怒流鉉舒州然白水塘竟不成唐主又命少府監馮延魯廵撫諸州右拾遺徐鍇表延魯無才多罪舉措輕淺不宜奉使唐主怒貶鍇校書郎分司東都鍇鉉之弟也錯口駭翻唐以揚州爲東都史言唐主惑於二馮而罪二徐路振九國志鉉鍇皆徐延休之子道州盤容洞蠻酋盤崇聚衆自稱盤容州都統屢㓂郴道州酋慈秋翻盤姓也即盤瓠之後郴道二州時皆屬南漢乙亥帝朝享太廟被衮冕左右掖以登堦朝直遥翻被皮義翻掖羊益翻纔及一室酌獻俛首不能拜而退俛音免命晉王榮終禮是夕宿南郊疾尤劇幾不救夜分小愈劇甚也増也幾居希翻顯徳元年春正月丙子朔帝祀圓丘僅能瞻仰致敬而已進爵奠幣皆有司代之大赦改元聴蜀境通商晉天福初蜀猶與中國通開運以後中國多事蜀有吞併闗西之志不復與中國通矣戊寅罷鄴都唐莊宗始以魏州爲東京後罷東京以爲鄴都但爲天雄軍庚辰加晉王榮兼侍中判内外兵馬事時羣臣希得見帝見賢遍翻中外恐懼聞晉王典兵人心稍安軍士有流言郊賞薄於唐明宗時者唐明宗以軍士流言濫賞養成其驕莫肯效命何足法也帝聞之壬午召諸將至寢殿讓之曰朕自即位以來惡衣菲食專以贍軍爲念府庫蓄積四方貢獻贍軍之外鮮有嬴餘瞻力艶翻鮮息善翻嬴餘經翻汝輩豈不知之今乃縱凶徒騰口不顧人主之勤儉察國之貧乏又不思已有何功而受賞惟知怨望於汝輩安乎皆惶恐謝罪退索不逞者戮之流言乃息驕兵於分外希賞茍非以法齊之其無厭之心庸有極乎索山客翻初帝在鄴都漢隠帝天祐三年帝在鄴都竒愛小吏曹翰之才使之事晉王榮榮鎭澶州以爲牙將榮入爲開封尹去年三月榮爲開封尹未即召翰翰自至榮怪之翰請間間古莧翻言曰大王國之儲嗣今主上寢疾大王當入侍醫藥奈何猶决事於外邪榮感悟即日入止禁中丙戌帝疾篤停諸司細務皆勿奏有大事則晉王榮禀進止宣行之以鎭寧節度使鄭仁誨爲樞密使同平章事戊子以義武留後孫行友保義留後韓通朔方留後馮繼業皆爲節度使通太原人也帝屢戒晉王曰昔吾西征謂討李守貞王景崇趙思綰時見唐十八陵無不發掘者唐髙祖太宗高宗中宗睿宗𤣥宗肅宗代宗徳宗順宗憲宗穆宗敬宗文宗武宗宣宗懿宗僖宗凡十八帝皆葬關中陵名各見前紀此無他惟多藏金玉故也我死當衣以紙衣歛以瓦棺速營葬勿久留宫中壙中無用石以甓代之當衣於旣翻歛力贍翻甓蒲歴翻摶埴而陶之今謂之甎工人役徒皆和雇勿以煩民葬畢募近陵民三十户蠲其雜徭使之守視勿修下宫勿置守陵宫人勿作石羊虎人馬惟刻石置陵前云周天子平生好儉約遺令用紙衣瓦棺嗣天子不敢違也汝或吾違吾不福汝又曰李洪義當與節鉞以李洪義發漢隠帝密詔也事見二百八十九卷乾祐三年魏仁浦勿使離樞密院離力智翻庚寅詔前登州刺史周訓等塞决河先是河决靈河魚池酸棗陽武常樂驛河隂六明鎭原武凡八口九域志滑州白馬縣有靈河鎭魚池亦在滑州界酸棗津在大梁東北陽武在鄭州河隂在孟州東南六明鎭在大通軍大通軍即胡梁渡也晉天福四年建浮橋置大通軍原武在鄭州之北塞悉則翻先悉薦翻至是分遣使者塞之帝命趣草制趣讀曰促以端明殿學士户部侍郎王溥爲中書侍郎同平章事壬辰宣制畢左右以聞帝曰吾無恨矣以樞密副使王仁鎬爲永興軍節度使以殿前都指揮使李重進領武信節度使重直龍翻馬軍都指揮使樊愛能領武定節度使步軍都指揮使何徽領昭武節度使殿前都指揮使總殿前諸班馬軍都指揮使總侍衛司馬軍步軍都指揮使總侍衛司步軍宋朝三衙之職昉於此武信軍遂州武定軍洋州昭武軍利州三鎭皆屬蜀李重進等遙領也重進年長於晉王榮帝召入禁中屬以後事仍命拜榮以定君臣之分長知兩翻屬之欲翻分扶問翻是日帝殂于滋徳殿年五十一袐不發䘮乙未宣遺制丙申晉王即皇帝位前考異曰太祖實録乙未宣遺制晉王榮可於柩即皇帝位世宗實錄丙申内出太祖遺制羣臣奉帝即皇帝位蓋以乙未宣遺制丙申即位也初靜海節度使吳權卒吳權據交州見二百八十一卷晉高祖天福三年南漢高祖之大有十一年也子昌岌立昌岌卒岌魚及翻弟昌文立是月始請命於南漢南漢以昌文爲靜海節度使兼安南都䕶北漢主聞太祖晏駕甚喜謀大舉入㓂遣使請兵于契丹二月契丹遣其武定節度使政事令楊衮將萬餘騎如晉陽帥考異曰晉陽見聞録衮騎五六七萬號十萬來㑹今從世宗實鋉北漢主自將兵三萬以義成節度使白從暉爲行軍都部署武寧節度使張元徽爲前鋒都指揮使義成軍滑州武寧軍徐州皆屬周白從暉等亦遙領晉考異曰世宗實録賊將張暉領三千騎爲前鋒今從陽聞見實録與契丹自團柏南趣潞州趣七喻翻蜀左匡聖馬步都指揮使保寧節度使安思謙譖殺張業廢趙廷隠二事並見二百八十八卷漢乾祐元年蜀人皆惡之惡烏路翻蜀主使將兵救王景崇思謙逗橈無功見二百八十八卷漢乾祐二年蜀之明徳十二年也橈奴教翻内慙懼不自安自張業之誅宫門守衛加嚴思謙以爲疑已言多不遜思謙典宿衛多殺士卒以立威蜀主閲衛士有年尚壯而爲思謙所斥者復留𨽻籍思謙殺之蜀主不能平思謙三子扆嗣裔倚父勢暴横爲國人患横户孟翻}
