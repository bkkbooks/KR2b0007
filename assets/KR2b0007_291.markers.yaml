  - {type: variant, offset: 24, length: 0, content: '', krp: 祖皇帝時爲宿衛將謂同列曰主危如此吾屬何得不致死又謂張永徳曰賊氣驕力戰可破也公麾下多能左射者請引兵乘高出爲左翼我引兵爲右翼以擊之國家安危在此一舉永徳從之各將二千人進戰太祖皇帝身先士卒馳犯其鋒士卒死戰無不一當百先悉薦翻太祖皇帝自此肇基皇業北漢兵披靡披普彼翻内殿直夏津馬仁瑀謂衆曰使乘輿受敵安用我輩躍馬引弓大呼連斃數十人士氣益振内殿直周所置殿前諸班之號夏津漢鄃縣唐天寳元年改曰夏津屬貝州九域志屬大名府在府東北二百五十里瑀王矩翻乘䋲證翻呼火故翻殿前右番行首馬全乂去年馬全乂自澶州從帝入朝已補殿前指揮使未至散員指揮使也右番行首居殿前右畨班行之首其官猶在散員指揮使之下行户剛翻言於帝曰賊勢極矣將爲我擒願陛下按轡勿動徐觀諸將破之即引數百騎進陷陳北漢主知帝自臨陳陳讀曰陣下同褒賞張元徽趣使乘勝進兵趣讀曰促元徽前略陳馬倒爲周兵所殺元徽北漢之驍將也北軍由是奪氣時南風益盛周兵爭奮北漢兵大敗北漢主自舉赤幟以收兵不能止北漢雖出於沙陀自謂劉氏纂高光之緒故旗幟尚赤楊衮畏周兵之彊不敢救且恨北漢主之語全軍而退得考異曰五代史補劉崇求援於契丹飛騎數千及覩世宗兵少悔之召諸將謀曰吾觀周師易與耳契丹之衆宜勿使但以本軍决戰不唯破敵亦足使契丹見而心服諸將皆以爲然乃使人謂契丹主將曰柴氏與吾主客之勢已見必不煩足下餘刃敢請勒兵登髙觀之可也契丹不知其謀從之洎世宗之入陳也三軍皆賈勇爭進莫不一當百契丹望而畏之故不敢救而崇敗今從世宗實録薛史樊愛能何徽引數千騎南走控弦露刃剽掠輜重剽匹妙翻重直用翻役徒驚走失亡甚多帝遣近臣及親軍校追諭止之校户教翻莫肯奉詔使者或爲軍士所殺揚言契丹大至官軍敗績餘衆已降虜矣劉詞遇愛能等於塗愛能等止之詞不從引兵而北時北漢主尚有餘衆萬餘人阻澗而陳薄暮詞至復與諸軍擊之薄迫也復扶又翻下卒復同北漢兵又敗殺王延嗣追至高平僵尸滿山谷委棄御物及輜重器械雜畜不可勝紀僵居良翻勝音升是夕帝宿於野次得步兵之降敵者皆殺之樊愛能等聞周兵大㨗與士卒稍稍復還還從宣翻有逹曙不至者甲午休兵于高平選北漢降卒數千人爲効順指揮命前武勝行軍司馬唐景思將之使戍淮上餘二千餘人賜貲裝縱遣之貲當作資李穀爲亂兵所迫潛竄山谷數日乃出丁酉帝至潞州北漢主自高平被褐戴笠被皮義翻褐毛衫也無柄曰笠有柄曰簦乘契丹所贈黄騮騮力求翻詩駉注赤馬黒髦曰騮黄色近於赤帥百餘騎由雕窠嶺遁歸雕窠嶺在高平西北由江猪嶺路入帥讀曰率宵迷夜行而迷失道也俘村民爲導誤之晉州行百餘里乃覺之殺導者晝夜北走所至得食未舉筯或傳周兵至輒蒼黄而去北漢主衰老力憊憊蒲拜翻伏於馬上晝夜馳驟殆不能支僅得入晉陽帝欲誅樊愛能等以肅軍政猶豫未决己亥晝卧行宫帳}
  - {type: variant, offset: 25, length: 0, content: '', WYG: 張永徳侍側帝以其事訪之張永德太祖壻既親且專掌殿前兵侍衛左右故訪以其事决可否對曰愛能等素無大功忝冒節鉞望敵先逃死未塞責塞悉則翻且陛下方欲削平四海茍軍法不立雖有熊羆之士百萬之衆安得而用之帝擲枕於地大呼稱善呼火故翻即收愛能徽及所部軍使以上七十餘人使疏吏翻責之曰汝曹皆累朝宿將非不能戰朝直遙翻將即亮翻下同今望風奔遁者無他正欲以朕爲竒貨賣與劉崇耳悉斬之帝以何徽先守晉州有功事見二百九十卷太祖廣順元年欲免之既而以法不可廢遂并誅之而給槥車歸葬槥車小棺也槥音衛自是驕將惰卒始知所懼不行姑息之政矣庚子賞高平之功以李重進兼忠武節度使向訓兼義成節度使張永徳兼武信節度使兼者以本職兼節鎭禄賜優於遙領者史彦超爲鎭國節度使此正除節鎭張永徳盛稱太祖皇帝之智勇帝擢太祖皇帝為殿前都虞候後魏之末宇文置虞候都督以主候騎虞候之官蓋始於此五代殿前都虞候在副都指揮使之下與都副指揮使同掌殿前班直領嚴州刺史嚴州𨽻嶺南時為南漢所有遙領刺史耳今武臣所領遙郡刺史正此類而落階官正除刺史者謂之正任刺史然亦未嘗臨郡治民也劉昫曰嚴州秦桂林郡地唐乾封間招致生獠置嚴州宋開寶七年廢嚴州以來賔縣𨽻象州以馬仁瑀爲控鶴弓箭直指揮使馬全又爲散員指揮使自餘將校遷拜者凡數十人校户教翻士卒有自行間擢主軍廂者行户剛翻時諸軍皆分左右廂廂各有主帥按薛史自五季至宋武官有軍主廂主曹威爲奉國軍主遷本軍廂主劉延欽爲控鶴主是其徵也釋趙晁之囚囚趙晁所以威衆戰勝則釋之北漢主收散卒繕甲兵完城塹以備周楊衮將其衆北屯代州北漢主遣王得中送衮因求救於契丹契丹主遣得中還報許發兵救晉陽壬寅以符彦卿爲河東行營都部署兼知太原行府事以郭崇副之向訓爲都監李重進爲馬步都虞候史彦超爲先鋒都指揮使將步騎二萬發潞州仍詔王彦超韓通自隂地闗入北漢既敗走移晉州東出之師北攻汾并與彦卿合軍而進又以劉詞爲隨駕部署保大節度使白重贊副之乘勝進攻晉陽隨駕之下當有都字漢昭聖皇太后李氏殂于西宫周太祖既踐阼漢太后李氏遷居西宫事見上卷廣順元年夏四月北漢盂縣降盂古縣唐屬太原府九域志在府東北二百里然宋下太原徙治陽曲宋白曰盂縣本晉}
