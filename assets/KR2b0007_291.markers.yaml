  - {type: variant, offset: 11, length: 0, content: '', SBCK: 臣司馬光奉勑編集後周紀二攝提格四月凡一年有竒起􅀇黓困敦九月盡閼逢太祖聖神恭肅文武孝皇帝中廣順二年九月甲寅朔呉越丞相裴堅卒以台州刺史呉延福同參相府事庚午敇北邊吏民毋得入契丹境俘掠契丹將髙謨翰以葦栰度胡盧河入宼至兾州成徳節度使何福進遣龍㨗都指揮使劉誠誨等屯貝州以拒之契丹聞之遽引兵北度所掠兾州丁壯數百人望見官軍爭鼔譟欲攻契丹官軍不敢應契丹盡殺之蜀山南西道節度使李廷珪奏周人聚兵闗中請益兵爲備蜀主遣奉鑾肅衛都虞候趙進將兵趣利州既而聞周人聚兵以備壮漢乃引還唐武安節度使邊鎬昏懦無㫁在湖南政出多門不合衆心吉水人歐陽廣上書言鎬非將帥才必喪湖南宜别擇良帥益兵以救其敗不報唐主使鎬經略朗州有自朗州來者多言劉言忠順鎬由是不爲備唐主召劉言入朝言不行謂王逵曰唐必伐我柰何逵曰武陵負江湖之險帶甲數萬安能拱手受制於人邊鎬撫馭無方士民不附可一戰擒也言猶豫未决周行逢曰機事貴速緩則彼爲之備不可圖也言乃以逵行逢及牙將何敬眞張倣蒲公益朱全琇宇文瓊彭萬和潘叔嗣張文表十人皆為指揮使部分發兵叔嗣文表皆朗州人也行逢能謀文表善戰叔嗣果敢三人多相須成功情􅅃甚昵諸將欲召溆州酋長苻彦通為援行逢曰蠻貪而無義前年從馬希萼入潭州焚掠無遺吾兵以義舉往無不克烏用此物使暴殄百姓哉乃止然亦畏彦通為後患以蠻酋土團都指揮使劉瑫為羣蠻所憚補西境鎭遏使以備之冬十月逵等將兵分道趣長沙以孫朗曹進為先鋒使邊鎬遣指揮使郭再誠等將兵屯益陽以拒之戊子逵等克沅江執都監劉承遇禆將李師徳帥衆五百降之壬辰逵等命軍士舉小舟自蔽直造益陽四面斧寨而入遂克之殺戍兵二千人邊鎬告急於唐甲午逵等克橋口及湘隂乙未至潭州邊鎬嬰城自守救兵未至城中兵少丙申夜鎬弃城走吏民俱潰醴陵門橋折死者萬餘人道州刺史廖偃為亂兵所殺丁酉旦王逵入城自稱武平節度副使權知軍府事以何敬眞為行軍司馬遣敬眞等追鎬不及斬首五百級蒲公益攻岳州唐岳州刺史宋徳權走劉言以公益權知岳州唐將守湖􅀯諸州者聞長沙陷相繼遁去劉言盡復馬氏嶺北故地惟郴連入于南漢契丹瀛莫幽州大水流民入塞散居河北者數十萬口契丹州縣亦不之禁詔所在賑給存處之中國民先為所掠得歸者什五六丁未榖以病臂乆未愈三表辭位帝遣中使諭指曰卿所掌至重朕難其人茍事功克集何必朝禮朕今於便殿待卿可暫入相見榖入見千金祥殿面陳悃􅅃帝不許榖不得已復視事榖未能執筆詔以三司務繁令刻名印用之辛亥敇民有訴訟必先歷縣州及觀察使處決不直乃聽詣臺省或自不能書牒倩人書者必書所倩姓名居處若無可倩聽執素紙所訴必須已事毋得挾私客訴慶州刺史郭彦欽性貪野雞族多羊馬彦欽故擾之以求賂野雞族遂反剽掠綱商帝命寕環二州合兵討之劉言遣使奉表來告稱湖南丗事朝廷不幸為鄰宼所陷臣雖不奉詔輙紏合義兵削平舊國唐主削邊鎬官爵流饒州初鎬以都虞候從查文徽克建州凡所俘獲皆全之建人謂之邊佛子及克潭州市不易肆潭人謂之邊菩薩既而為節度使政無綱紀惟日設齋供盛修佛事潭人失望謂之邊和尚矣左僕射同平章事馮延己右僕射同平章事孫晟上表請罪皆釋之晟陳請不已乃與延己皆罷守本官唐主以比年出師無功乃議休兵息民或曰願陛下數十年不用兵可小康矣唐主曰將終身不用何數十年之有唐主思歐陽廣之言拜本縣令十一月辛未徙保義節度使折從阮為靜難節度使討野雞族癸酉敇約每嵗民間所輸牛皮三分減二計田十頃稅取一皮餘聽民自用及賣買惟禁賣於敵國先是兵興以來禁民私賣買牛皮悉令輸宫受直唐明宗之丗有司止償以鹽晉天福中并鹽不給漢法犯私牛皮一寸抵死然民閒日用實不可無帝素知其􅁦至是李榖建議均於田畒公私便之十二月丙戌河決鄭滑遣使行視修塞甲午前靜難節度使侯章獻買宴絹千匹銀五百兩帝不受曰諸侯入覲天子宜有宴犒豈待買邪自今如此比者皆勿受王逵將兵及洞蠻五萬攻郴州南漢將潘崇徹救之遇于蠔石崇徹登髙望湖南兵曰疲而不整可破也縱擊大破之伏尸八十里翰林學士徐台符請誅誣告李崧者延葛遇及李澄馮道以為屢更赦不許王峻嘉台符之義白於帝癸卯収延遇澄誅之劉言表稱潭州殘破乞移使府治朗州且請貢獻賣茶悉如馬氏故事許之唐江西觀察使楚王馬希萼入朝唐主留之後數年卒於金陵諡曰恭孝初麟州土豪楊信自為刺史受命于周信卒子重訓嗣以州降北漢至是為羣羌所圍復歸款求救于夏府二州三年春正月丙辰以武平留後劉言為武平節度使制置武安靜江等軍事同平章事以王逵為武安節度使何敬眞為靜江節度使周行逢為武安行軍司馬詔折從阮野雞族能改過者拜官賜金帛不則進兵討之壬戍從阮奏酋長李萬全等受詔立誓外自餘猶不服方討之前丗屯田皆在邊地使戍兵佃之唐末中原宿兵所在皆置營田以耕曠土其後又募髙貲户使輸課佃之户部别置官司緫領不􅀠州縣或丁多無役或容庇姧盜州縣不能詰梁太祖擊淮􅀯掠得牛以千萬計給東􅀯諸州農民使嵗輸租自是歷數十年牛死而租不除民甚苦之帝素知其􅁦㑹閤門使知青州張凝上便宜請罷營田務李榖亦以為言乙丑敕悉罷户部營田務以其民􅀠州縣其田廬牛農器並賜見佃者為永業悉除租牛課是嵗户部増三萬餘户民既得為永業始敢葺屋植木獲地利數倍或言營田其肥饒者不若鬻之可得錢數十萬緡以資國帝曰利在於民猶在國也朕用此錢何為萊州剌史葉仁魯帝之故吏也坐贓絹萬五千匹錢千緡庚午賜死帝遣中使賜以酒食曰汝自抵國法吾無如之何當存恤汝母仁魯感泣帝以河決為憂王峻請自往行視許之鎭寕節度使榮屢求入朝峻忌其英烈每沮止之閏月榮復求入朝㑹峻在河上帝乃許之契丹宼定州圍義豐軍定和都指揮使楊􅀪裕夜擊其營大獲契丹遁去又宼鎭州本道兵擊走之丙申鎭寕節度使榮入朝故李守貞􅀐士馬全乂從榮入朝帝召見補殿前指揮使謂左右曰全乂忠於所事昔在河中屢挫吾軍汝軰宜効之王峻聞榮入朝遽自河上歸戊戍至大梁雄武節度使髙允權卒其子牙内指揮使紹基謀襲父位詐稱允權疾病表已知軍府事觀察判官李彬切諌紹基怒斬之辛丑以彬謀反聞王峻固求領藩鎮帝不得已壬寅以峻兼平盧節度使髙紹基屢奏雜虜犯邊冀得承襲帝遣六宅使張仁謙詣延州巡檢紹基不能匿始發父喪戊申折從阮奏降野雞二十一族唐草澤邵棠上言近游淮上聞周主恭儉増修徳政吾兵新破於潭朗恐其有南征之志宜為之備初王逵既克潭州以指揮使何敬眞為靜江節度副使朱全琇為武安節度副使張文表為武平節度副使周行逢為武安行軍司馬敬眞全琇各置牙兵與逵分㕔視事吏民莫知所從每宴集諸將使酒紛拏如市無復上下之分惟行逢文表事逵盡禮逵親愛之敬眞與逵不恊辭歸朗州又不能事劉言與全琇謀作亂言素忌逵之彊疑逵使敬眞伺已將討之逵聞之甚懼行逢曰劉言素不與吾軰同心何敬眞朱全琇恥在公下公宜早圖之逵喜曰與公共除凶黨同治潭朗夫復何憂㑹南漢宼全道永州行逢請身至朗州􅀃言遣敬眞全琇南討俟至長沙以計取之如掌中物耳逵從之行逢至朗州言以敬眞為南面行營招討使全琇為先鋒使將牙兵百餘人㑹潭州兵以禦南漢二人至長沙逵出郊迎相見甚歡宴飲連日多以美妓餌之敬眞因淹留不進朗州指揮使李仲遷部兵三千人乆戍潭州敬眞使之先發趣嶺北都頭符㑹等因士卒思歸劫仲遷擅還朗州逵乗敬眞醉使人詐為言使者責敬眞以南宼深侵不亟捍禦而専務荒宴太師命械公歸西府因收繫獄全琇逃去遣兵追捕之二月辛亥朔斬敬眞以徇未幾獲全琇及其黨十餘人皆斬之癸丑鎮寜節度使榮歸澶州初契丹主徳光北還以晉傳國寶自隨至是更以玉作二寶王逵遣使以斬何敬眞告劉言言不得己庚申斬符㑹等數人樞密使平盧節度使同平章事王峻晚節益狂躁奏請以}
