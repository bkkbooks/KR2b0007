  - {type: variant, offset: 11, length: 0, content: '', WYG: 宋司馬光撰胡三省音註後周紀二起𤣥黓困敦九月盡閼逢攝提格四月凡一年有竒太祖聖神恭肅文武孝皇帝中廣順二年九月甲寅朔呉越丞相裴堅卒以台州刺史呉延福同參相府事庚午敇北邊吏民毋得入契丹境俘掠契丹將髙謨翰以葦栰度胡盧河入冦胡盧河在深冀之間横亘數百里丁度曰胡盧河即衡漳之别名至冀州成徳節度使何福進遣龍㨗都指揮使劉誠誨等屯貝州以拒之九域志貝州北至冀州一百二十里契丹聞之遽引兵北度所掠冀州丁壯數百人望見官軍爭鼓譟欲攻契丹官軍不敢應契丹盡殺之蜀山南西道節度使李廷珪奏周人聚兵闗中請益兵為備蜀主遣奉鑾肅衛都虞候趙進將兵趣利州趣七喻翻既而聞周人聚兵以備壮漢乃引還還從宣翻又如字唐武安節度使邊鎬昏懦無㫁㫁丁亂翻在湖南政出多門不合衆心吉水人歐陽廣上書吉水古吉陽縣地久廢唐置吉水縣屬吉州九域志在州東壮四十里宋白曰隋開皇十年廢吉陽縣入廬陵縣大業分廬陵縣水東十一鄉為吉水縣言鎬非將帥才必喪湖南將即亮翻帥所類翻喪息浪翻宜别擇良帥益兵以救其敗不報唐主使鎬經略朗州有自朗州來者多言劉言忠順鎬由是不為備唐主召劉言入朝朝直遥翻言不行謂王逵曰唐必伐我奈何逵曰武陵負江湖之險朗州武陵郡帶甲數萬安能拱手受制於人邊鎬撫御無方士民不附可一戰擒也言猶豫未决周行逢曰機事貴速緩則彼為之備不可圖也言乃以逵行逢及牙將何敬真張倣蒲公益朱全琇琇音秀宇文瓊彭萬和潘叔嗣張文表十人皆為指揮使部分發兵分扶問翻叔嗣文表皆朗州人也行逢能謀文表善戰叔嗣果敢三人多相須成功情欵甚昵昵尼質翻諸將欲召溆州酋長苻彦通為援溆音叙苻讀曰蒲酋慈由翻長知兩翻苻彦通自謂苻秦苗裔行逢曰蠻貪而無義前年從馬希萼入潭州焚掠無遺見二百八十九卷漢隱帝乾祐二年吾兵以義舉往無不克烏用此物使暴殄百姓哉乃止然亦畏彦通為後患以蠻酋土團都指揮使劉瑫為羣蠻所憚瑫它牢翻補西境鎮遏使以備之冬十月逵等將兵分道趣長沙趣七喻翻以孫朗曹進為先鋒使孫朗曹進奔朗州見上卷是年正月邊鎬遣指揮使郭再誠等將兵屯益陽以拒之戊子逵等克沅江沅音元沅江漢益陽縣地隋改為安樂又改為沅江乾寕中改為橋江楚復為沅江屬朗州九域志在岳州西南一百二十六里執都監劉承遇禆將李師徳帥衆五百降之帥讀曰率降户江翻壬辰逵等命軍士舉小舟自蔽直造益陽造七到翻四面斧寨而入遂克之殺戍兵二千人邊鎬告急於唐甲午逵等克橋口及湘隂九域志潭州長沙縣有橋口鎮乙未至潭州邊鎬嬰城自守救兵未至城中兵少丙申夜鎬棄城走吏民俱潰醴陵門橋折醴陵門潭州城東門折而設翻死者萬餘人道州刺史廖偃為亂兵所殺丁酉旦王逵入城自稱武平節度副使權知軍府事武平當作武安軍府謂潭州軍府也以何敬真為行軍司馬遣敬真等追鎬不及斬首五百級蒲公益攻岳州風俗通漢有詹事蒲昌又晉書載紀氐酋蒲洪之先其家池中蒲生長五丈如竹形時咸謂之蒲家因以為氏其後改姓苻則蒲之所自出有二焉唐岳州刺史宋徳權走劉言以公益權知岳州唐將守湖南諸州者聞長沙陷相繼遁去劉言盡復馬氏嶺北故地惟郴連入于南漢郴尹林翻契丹瀛莫幽州大水流民入塞散居河北者數十萬口契丹州縣亦不之禁詔所在賑給存處之賑津忍翻處昌吕翻中國民先為所掠得歸者什五六丁未李榖以病臂久未愈李榖病臂始上卷是年六月榖上須有李字文乃明三表辭位帝遣中使諭指曰卿所掌至重謂李榖掌三司金榖也朕難其人茍事功克集何必朝禮朝直遥翻朕今於便殿待卿可暫入相見榖入見于金祥殿見賢遍翻面陳悃欵悃苦本翻誠也帝不許榖不得已復視事復扶又翻榖未能執筆詔以三司務繁令刻名印用之辛亥敇民有訴訟必先厯縣州及觀察使處决不直處昌吕翻乃聽訟於臺省或自不能書牒倩人書者必書所倩姓名居處若無可倩聽執素紙所訴必須已事毋得挾私客訴倩七政翻假倩也事不干己妄興詞訟謂之客訴慶州刺史郭彦欽性貪野雞族多羊馬五代㑹要黨項野雞族居慶州北彦欽故擾之以求賂野雞族遂反剽掠綱商剽匹妙翻綱商往㳂邊販易者薛史慶州北十五里寡婦山有蕃部曰野雞族刺史郭彦欽擅加糴鹽錢民夷流怨蕃族獷悍好為不法彦欽乃奏野雞族掠奪綱商帝命寕環二州合兵討之唐於古鳴沙之地置威州周改曰環州九州一百二十里環州南至志寕州北至慶州一百八十里劉言遣使來告稱湖南世事朝廷不幸為鄰冦所陷鄰冦謂唐也臣雖不奉詔輙糾合義兵削平舊國言削平湖南舊楚之地唐主削邊鎬官爵流饒州初鎬以都虞候從查文徽克建州事見二百八十五卷晉齊王開運二年唐主之保大三年也凡所俘獲皆全之建人謂之邊佛子及克潭州市不易肆事見上卷元年唐之保大九年也潭人謂之邊菩薩菩薄乎翻薩桑葛翻釋典菩普也薩濟也言能普濟衆生也既而為節度使政無綱紀惟日設齋供供居用翻盛修佛事潭人失望謂之邊和尚矣左僕射同平章馮延己右僕射同平章事孫晟上表請罪皆釋之晟陳請不已乃與延己皆罷守本官唐主以比年出師無功比毗至翻乃議休兵息民或曰願陛下數十年不用兵可小康矣唐主曰將終身不用何數十年之有人非金石唐主自謂真能享無疆之夀乎然欲終身不用兵而周兵已至淮上矣唐主思歐陽廣之言拜本縣令以歐陽廣言邊鎬必敗其言驗也十一月辛未徙保義節度使折從阮為靜難節度使折從阮自陜州徙邠州難乃旦翻下同討野雞族癸酉敇約每嵗民間所輸牛皮三分減二計田十頃税取一皮餘聽民自用及賣買惟禁賣于敵國先是兵興以來先悉薦翻禁民私賣買牛皮悉令輸官受直唐明宗之世有司止償以鹽晉天福中并鹽不給漢法犯私牛皮一寸抵死然民間日用實不可無帝素知其弊至是李榖建議均於田畆公私便之十二月丙戌河決鄭滑遣使行視修塞行下孟翻塞悉則翻甲午前靜難節度使侯章獻買宴絹千匹銀五百兩帝不受曰諸侯入覲天子宜有宴犒豈待買邪五代之時不特方鎮入朝買宴唐明宗天成二年三月幸㑹節園羣臣買宴則在朝之臣亦買宴矣犒苦到翻自今如此比者皆不受王逵將兵及洞蠻五萬攻郴州郴丑林翻南漢將潘崇徹救之遇于蠔石蠔石在郴州義章縣蠔音豪崇徹登髙望湖南兵曰疲而不整可破也縱擊大破之伏尸八十里翰林學士徐台符請誅誣告李崧者葛延遇及李澄誣李崧事見二百八十八卷漢乾祐元年徐台符素與李崧善故為請誅誣告者馮道以為屢更赦不許更工衡翻王峻嘉台符之義白於帝癸卯收延遇澄誅之劉言表稱潭州殘破乞移使府治朗州使䟽吏翻且請貢獻賣茶悉如馬氏故事許之唐江西觀察使楚王馬希萼入朝唐主留之後數年卒於金陵諡曰恭孝初麟州土豪楊信自為刺史受命于周信卒子重訓嗣訓考異曰崇訓或作崇勲世宗實録作崇後葢避梁王崇訓改名也按考異則重訓當作崇訓以州降北漢至是為羣羌所圍復歸欵復扶又翻求救於夏府二州夏州李􅃔殷府州折徳扆九域志麟州西北至夏州一百二十里東北至府州一百二十里三年春正月丙辰以武平留後劉言為武平節度使制置武安靜江等軍事同平章事以王逵為武安節度使何敬真為靜江節度使周行逢為武安行軍司馬王逵既得潭州則殺何敬真既殺何敬真則攻劉言而併朗州詔折從阮野雞族能改過者拜官賜金帛不則進兵討之壬戌從阮奏酋長李萬全等受詔立誓外酋慈秋翻長知兩翻自餘猶不服方討之前世屯田皆在邊地使戍兵佃之佃亭年翻唐末中原宿兵所在皆置營田以耕曠土其後又募髙貲户使輸課佃之輸舂遇翻下嵗輸同户部别置官司總領不𨽻州縣或丁多無役或容庇奸盜州縣不能詰詰去吉翻梁太祖擊淮南掠得牛以千萬計朱全忠大掠淮南見二百六十五卷唐昭宗天祐元年給東南諸州農民使嵗輸租自是厯數十年牛死而租不除民甚苦之帝素知其弊㑹閤門使知青州張凝上便宜請罷營田務李榖亦以為言乙丑敇悉罷户部營田務以其民𨽻州縣其田廬牛農器並賜見佃者為永業見賢遍翻悉除租牛課是嵗户部増三萬餘户民既得為永業始敢葺屋植木獲地利數倍或言營田有肥饒者不若鬻之可得錢數十萬緡以資國帝曰利在於民猶在國也朕用此錢何為萊州刺史葉仁魯帝之故吏也按葉仁魯漢髙祖之親将也天福十二年嘗破契丹于承天軍今曰帝之故吏必嘗事帝於樞密院或討河中鎮鄴都時也坐贓絹萬五千匹錢千緡庚午賜死帝遣中使賜以酒食曰汝自抵國法吾無如之何當存恤汝母仁魯感泣帝以河決為憂王峻自請往行視許之行下孟翻鎮寕節度使榮屢求入朝峻忌其英烈每沮止之沮在吕翻閏月榮復求入朝復扶又翻㑹峻在河上帝乃許之契丹寇定州圍義豐軍時置義豐軍於定州義豐縣定和都指揮使楊𢎞裕夜擊其營大獲契丹遁去又寇鎮州本道兵擊走之丙申鎮寕節度使榮入朝故李守貞騎士馬全乂從榮入朝帝召見補殿前指揮使謂左右曰全乂忠於所事昔在河中屢挫吾軍謂漢乾祐間帝討李茂貞時也汝輩宜効之王峻聞榮入朝遽自河上歸戊戌至大梁彰武節度使髙允權卒其子牙内指揮使紹基謀襲父位詐稱允權疾病表已知軍府事觀察判官李彬切諫紹基怒斬之辛巳以彬謀反聞王峻固求領藩鎮帝不得已以峻兼平盧節度使髙紹基屢奏雜虜犯邊冀得承襲帝遣六宅使張仁謙詣延州巡檢職官分紀曰唐置十宅六宅使以諸王所屬為名或總云十六宅後止曰六宅紹基不能匿始發父喪戊申折從阮奏降野鷄二十一族唐草澤邵棠上言布衣未有朝命者謂之草澤上時掌翻近游淮上聞周主恭儉増修徳政吾兵新破於潭朗謂邊鎬潭州之敗也恐其有南征之志宜為之備智識之士何國無之顧用與不用耳初王逵既得潭州事見上卷十月以指揮使何敬真為靜江節度副使朱全琇為武安節度副使張文表為武平節度副使周行逢為武安行軍司馬敬真全琇各置牙兵與逵分㕔視事吏民莫知所從每宴集諸將使酒紛挐如市無復上下之分挐奴加翻分扶問翻唯行逢文表事逵盡禮逵親愛之敬真與逵不協辭歸朗州又不能事劉言與全琇謀作亂言素忌逵之彊疑逵使敬真伺已將討之逵聞之甚懼伺相吏翻行逢曰劉言素不與吾輩同心何敬真朱全琇恥在公下公宜早圖之逵喜曰與公共除凶黨同治潭朗周行逢之據有潭朗自此造端矣治直之翻夫復何憂夫音扶復扶又翻㑹南漢冦全道永州行逢請身至朗州説言説式芮翻遣敬真全琇南討南討者拒南漢之兵俟至長沙以計取之如掌中物耳逵從之行逢至朗州言以敬真為南面行營招討使全琇為先鋒使將牙兵百餘人㑹潭州兵以禦南漢二人至長沙逵出郊迎相見甚歡宴飲連日多以美妓餌之妓渠綺翻敬真因淹留不進朗州指揮使李仲遷部兵三千人久戍潭州敬真使之先發趣嶺壮全道永三州皆在大庾嶺之北趣七喻翻都頭符㑹等因士卒思歸劫仲遷擅還朗州逵乗敬真醉使人詐為言使者責敬真以南㓂深侵不亟捍禦而専務荒宴太師命械公歸西府太師謂劉言朗府在潭州之西故謂之西府因收繫獄全琇逃去遣兵追捕之二月辛亥朔斬敬真以狥未幾幾居豈翻獲全琇及其黨十餘人皆斬之癸丑鎮寜節度使榮歸澶州澶時連翻初契丹主徳光北還見二百八十六卷天福十二年以晉傳國寶自隨至是更以玉作二寶傳國寶及受命寶也五代㑹要曰時製寶兩座用白玉方六寸螭虎紐馮道書寶文其一以皇帝承天受命之寶為文其一以皇帝神寶為文宋白曰時内司製二寳詔太常具制度以閒有司言唐六典符寶郎掌天子八璽其一曰神寶二曰受命寶其神寶方六寸髙四寸六分厚一寸七分蟠龍紐文與傳國璽同傳國璽秦皇以藍田玉刻之李斯篆方四寸面文曰受命于天既夀永昌紐盤五龍二寶厯代相傳以為神器别有六寶一曰皇帝行璽二曰皇帝之璽三曰皇帝信璽四曰天子行璽五曰天子之璽六曰天子信璽此六璽因文為名並白玉螭虎紐厯代傳受或亡失則補之北朝鑄之以金貞觀十六年别製𤣥璽一座文曰皇天景命有徳者昌白玉螭虎紐同光中製寶一座文曰皇帝受命之寶天福四年製寶一座文曰皇帝神寶其同光天福二寶内司製造不見紐篆分寸制度勑今製國寶兩座其一宜以皇帝承天受命之寶為文其一以皇帝神寶為文命中書令馮道書寶議者曰國以玉璽為傳授神器邃古無聞運計樞曰舜禹天子黄龍負璽世本曰魯昭公始作璽秦兼六國稱皇帝禮取藍田之玉玉工孫夀刻之方四寸李斯為大篆書之形制如龍魚鳳鳥之狀希世之至寶也秦亡子嬰以璽降漢漢世世傳寶之王莽之簒求璽於元后后投之於堦一角微缺莽誅歸之更始更始敗歸之盆子及熊耳之敗盆子以璽降光武漢末黄巾亂投璽於井孫堅入洛見井有五色氣取得之以歸袁術術敗荆州刺史徐璆得之詣許以進獻帝魏受漢得之以傳于晉洛陽之陷劉聰得之劉曜為石勒所禽璽歸于鄴石氏之亂冉閔得之閔敗晉將戴施入鄴得之送江東傳之宋齊梁臺城之破侯景得之景敗其將侯子鑒以璽走為追兵所迫投於栖霞寺井中僧永杼得平而匿之陳永定二年永杼弟子普智以璽上陳文帝隋陳始得秦真傳國璽煬帝江都之禍宇文化及得之化及敗璽歸竇建徳建徳敗其妻曹氏以璽獻于唐唐禪楊涉送寶于大梁莊宗滅梁得之同光末内難作寶為火灼文字訛缺明宗得之清泰敗以寶隨身自焚而死寶遂亡失其神寶者方六寸厚一寸七分髙四寸六分蟠龍隱起文與秦璽同但玉色不及形制髙大耳不知何代製造東晉孝武十九年雍州刺史郗恢得之慕容永送於金陵傳之宋齊梁臺城之破侯景得之景敗侍中趙思齊攜走江北獻之齊文宣帝宇文滅齊得之宇文亡入隋隋文帝改號傳國璽又改為受命璽及平陳始得秦真傳國璽仍以秦璽後出得於亡陳以北朝所傳神璽為第一秦璽次之隋亡竇建徳妻與神璽俱獻長安唐末不知所在其説頗有源委因載于此更工衡翻王逵遣使以斬何敬真告劉言言不得己庚申斬符㑹等數人以符㑹等擅歸召變也樞密使平盧節度使同平章事王峻晚節益狂躁奏請以}
