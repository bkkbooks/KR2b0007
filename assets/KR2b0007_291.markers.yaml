  - {type: variant, offset: 51, length: 5, content: 戶食實封一, SBCK: 北漢兵披靡内殿直夏津馬仁瑀謂衆曰使乗輿受敵安用我軰躍馬引弓大呼連斃數十人士氣益振殿前右番行首馬全乂言於帝曰賊勢極矣將爲我擒願陛下按轡勿動徐觀諸將破之即引數百騎進陷陳北漢主知帝自臨陳褒賞張元徽趣使乗勝進兵元徽前略陳馬倒爲周兵所殺元徽北漢之驍將也北軍由是奪氣時南風益盛周兵爭奮北漢兵大敗北漢主自舉赤幟以收兵不能止楊衮畏周兵之彊不敢救且恨北漢主之語全軍而退樊愛能何徽引數}
