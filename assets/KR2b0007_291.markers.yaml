  - {type: variant, offset: 27, length: 1, content: 提, WYG: 盂丙之邑漢爲盂縣按前此盂縣在今縣西陽曲縣東北八十里故盂縣城是也後魏省屬石艾縣隋開皇十六年分石艾縣置原仇縣屬遼州因原仇故城爲名即今縣是也大業二年改原仇爲盂縣從漢舊名符彦卿軍晉陽城下王彦超攻汾州九域志晉州北至汾州三百五十里北漢防禦使董希顔降帝遣萊州防禦使康延沼攻遼州遼州唐之儀州也梁開平三年勑兖州管内已有沂州其儀州改爲遼州九域志潞州東北至遼州二百四十三里密州防禦使田瓊攻沁州皆不下唐置沁州至宋太平興國五年廢沁州以和川縣𨽻晉州熈寧五年省和川縣入冀氏九域志冀氏縣在晉州東二百八十里沁音七鴆翻供備庫副使太原李謙溥單騎説遼州刺史張漢超説式苪翻漢超即降乙夘葬聖神恭肅文武孝皇帝于嵩陵三月乙酉梓宫赴山陵四月乙夘方葬與北漢交兵葬備多闕故緩廟號太祖南漢主以高王𢎞邈爲雄武節度使鎭邕州𢎞邈以齊鎭二王相繼死於邕州固辭齊王𢎞弼死見二百八十三卷晉天福八年鎭王𢎞澤死見二百八十四卷晉開運元年求宿衛不許至鎭委政僚佐日飲酒禱鬼神或上書誣𢎞邈謀作亂戊午南漢主遣甘泉宫使林延遇賜酖殺之初帝遣符彦卿等北征但欲耀兵於晉陽城下未議攻取既入北漢境其民爭以食物迎周師泣訴劉氏賦役之重願供軍須助攻晉陽北漢州縣繼有降者帝聞之始有兼并之意史言謀不先定者非廟勝之策遣使往與諸將議之諸將皆言芻糧不足請且班師以俟再}
