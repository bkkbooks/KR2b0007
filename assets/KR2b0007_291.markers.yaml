  - {type: variant, offset: 23, length: 0, content: '', WYG: 王得中扣馬諫曰義可斬也風勢如此豈助我者邪北漢主曰吾計已决老書生勿妄言且斬汝麾東軍先進張元徽將千騎擊周右軍合戰未幾幾居豈翻樊愛能何徽引騎兵先遁右軍潰步兵千餘人解甲呼萬嵗降于北漢帝見軍勢危自引親兵犯矢石督戰}
  - {type: variant, offset: 23, length: 0, content: '', krp: 王得中扣馬諫曰義可斬也風勢如此豈助我者邪北漢主曰吾計已决老書生勿妄言且斬汝麾東軍先進張元徽將千騎擊周右軍合戰未幾幾居豈翻樊愛能何徽引騎兵先遁右軍潰步兵千餘人解甲呼萬嵗降于北漢帝見軍勢危自引親兵犯矢石督戰}
  - {type: variant, offset: 24, length: 4, content: 中大夫提, SBCK: 祖皇帝時爲宿衛將謂同列曰主危如此吾屬何得不致死又謂張永徳曰賊氣驕力戰可破也公麾下多能左射者請引兵乗高西出爲左翼我引兵爲右翼以擊之國家安危在此一}
  - {type: variant, offset: 24, length: 0, content: '', WYG: 祖皇帝時爲宿衛將謂同列曰主危如此吾屬何得不致死又謂張永徳曰賊氣驕力戰可破也公麾下多能左射者請引兵乘高出爲左翼我引兵爲右翼以擊之國家安危在此一舉永徳從之各將二千人進戰太祖皇帝身先士卒馳犯其鋒士卒死戰無不一當百先悉薦翻太祖皇帝自此肇基皇業北漢兵披靡披普彼翻内殿直夏津馬仁瑀謂衆曰使乘輿受敵安用我輩躍馬引弓大呼連斃數十人士氣益振内殿直周所置殿前諸班之號夏津漢鄃縣唐天寳元年改曰夏津屬貝州九域志屬大名府在府東北二百五十里瑀王矩翻乘䋲證翻呼火故翻殿前右番行首馬全乂去年馬全乂自澶州從帝入朝已補殿前指揮使未至散員指揮使也右番行首居殿前右畨班行之首其官猶在散員指揮使之下行户剛翻言於帝曰賊勢極矣將爲我擒願陛下按轡勿動徐觀諸將破之即引數百騎進陷陳北漢主知帝自臨陳陳讀曰陣下同褒賞張元徽趣使乘勝進兵趣讀曰促元徽前略陳馬倒爲周兵所殺元徽北漢之驍將也北軍由是奪氣時南風益盛周兵爭奮北漢兵大敗北漢主自舉赤幟以收兵不能止北漢雖出於沙陀自謂劉氏纂高光之緒故旗幟尚赤楊衮畏周兵之彊不敢救且恨北漢主之語全軍而退得考異曰五代史補劉崇求援於契丹飛騎數千及覩世宗兵少悔之召諸將謀曰吾觀周師易與耳契丹之衆宜勿使但以本軍决戰不唯破敵亦足使契丹見而心服諸將皆以爲然乃使人謂契丹主將曰柴氏與吾主客之勢已見必不煩足下餘刃敢請勒兵登髙觀之可也契丹不知其謀從之洎世宗之入陳也三軍皆賈勇爭進莫不一當百契丹望而畏之故不敢救而崇敗今從世宗實録薛史樊愛能何徽引數千騎南走控弦露刃剽掠輜重剽匹妙翻重直用翻役徒驚走失亡甚多帝遣近臣及親軍校追諭止之校户教翻莫肯奉詔使者或爲軍士所殺揚言契丹大至官軍敗績餘衆已降虜矣劉詞遇愛能等於塗愛能等止之詞不從引兵而北時北漢主尚有餘衆萬餘人阻澗而陳薄暮詞至復與諸軍擊之薄迫也復扶又翻下卒復同北漢兵又敗殺王延嗣追至高平僵尸滿山谷委棄御物及輜重器械雜畜不可勝紀僵居良翻勝音升是夕帝宿於野次得步兵之降敵者皆殺之樊愛能等聞周兵大㨗與士卒稍稍復還還從宣翻有逹曙不至者甲午休兵于高平選北漢降卒數千人爲効順指揮命前武勝行軍司馬唐景思將之使戍淮上餘二千餘人賜貲裝縱遣之貲當作資李穀爲亂兵所迫潛竄山谷數日乃出丁酉帝至潞州北漢主自高平被褐戴笠被皮義翻褐毛衫也無柄曰笠有柄曰簦乘契丹所贈黄騮騮力求翻詩駉注赤馬黒髦曰騮黄色近於赤帥百餘騎由雕窠嶺遁歸雕窠嶺在高平西北由江猪嶺路入帥讀曰率宵迷夜行而迷失道也俘村民爲導誤之晉州行百餘里乃覺之殺導者晝夜北走所至得食未舉筯或傳周兵至輒蒼黄而去北漢主衰老力憊憊蒲拜翻伏於馬上晝夜馳驟殆不能支僅得入晉陽帝欲誅樊愛能等以肅軍政猶豫未决己亥晝卧行宫帳}
