  - {type: variant, offset: 17, length: 0, content: '', SBCK: 宰相又求重鎭觀其志趣殊未盈厭無君如此誰則堪之甲子貶峻商州司馬制辭略曰􅁏視羣后孩撫朕躬帝慮鄴都留守王殷不自安命殷子尚食使承誨詣殷諭以峻得罪之狀峻至商州得腹疾帝猶愍之命其妻往視之未幾而卒帝命折從阮分兵屯延州髙紹基始懼屢有貢獻又命供奉官張懷貞將禁兵兩指揮屯鄜延紹基乃悉以軍府事授副使張匡圖甲戍以客省使向訓權知延州三月甲申以鎭寕節度使榮為開封尹􅀳王丙戍以樞密副使鄭仁誨為鎭寜節度使初殺牛族與野雞族有隙聞官軍討野雞饋餉迎奉官軍利其財畜而掠之殺牛族反與野雞合敗寜州刺史張建武于包山帝以郭彦欽擾羣胡致其作亂黜廢於家初解州刺史浚儀郭元昭與􅅦鹽使李温玉有隙温玉壻魏仁浦為樞密主事元昭疑仁浦庇之㑹李守貞反温玉有子在河中元昭收繫温玉奏言其叛事連仁浦帝時為樞密使知其誣釋不問至是仁浦為樞密承旨元昭代歸甚懼過洛陽以告仁浦弟仁滌仁滌曰吾兄平生不與人為怨况肯以私害公乎既至丁亥仁浦白帝以元昭為慶州刺史己丑以棣州團練使太原王仁鎬為宣徽北院使兼樞密副使唐主復以左僕射馮延己同平章事周行逢惡武平節度副使張倣言於王逵曰何敬眞倣之親戚臨刑以後事屬倣公宜備之夏四月庚申逵召倣飲醉而殺之丙寅歸徳節度使兼侍中常思入朝戊辰徙平盧節度使將行奏曰臣在宋州舉絲四萬餘兩在民間謹以上進請徴之帝頷之五月丁亥敕牓宋州凡常思所舉絲悉蠲之巳輸者復歸之思亦無怍色自唐末以來所在學校廢絶蜀母昭裔出私財百萬營學館且請刻板印九經蜀主從之由是蜀中文學復盛六月壬子滄州奏契丹知盧臺軍事范陽張藏英來降初唐明宗之丗宰相馮道李愚請令判國子監田敏校正九經刻板印賣朝廷從之丁巳板成獻之由是雖亂丗九經傳布甚廣王逵以周行逢知潭州自將兵襲朗州克之殺指揮使鄭珓執武安節度使同平章事劉言幽于别館秋七月王殷三表請入朝帝疑其不誠遣使止之唐大旱井泉涸淮水可涉饑民度淮而北者相繼濠夀發兵禦之民與兵鬬而北來帝聞之曰彼我之民一也聽糴米過淮唐人遂築倉多糴以供軍八月己未詔唐民以人畜負米者聽之以舟車運載者勿予王逵遣使上表誣劉言謀以朗州降唐又欲攻潭州其衆不從廢而囚之臣已至朗州撫安軍府訖且請復移使府洽潭州甲戌遣通事舎人翟光裔詣湖南宣撫從其所請逵還長沙以周行逢知朗州事又遣潘叔嗣殺劉言於朗州九月己亥武成節度使白重贊奏塞決河契丹宼樂夀齊州戍兵右保寜都頭劉彦章殺都監杜延熙謀應契丹不克并其黨伏誅南漢主立其子繼興為衛王璇興為桂王慶興為荆王保興為禎王崇興為梅王東自青徐南至安復西至丹慈北至貝鎭皆大水帝自入秋得風痺疾害於食飲及步趨術者言宜散財以禳之帝欲祀南郊又以自梁以來郊祀常在洛陽疑之執政曰天子所都則可以祀百神何必洛陽於是始築圓丘社稷壇作太廟於大梁癸亥遣馮道迎太廟社稷神主于洛陽南漢大赦冬十一月己丑太常請凖洛陽築四郊諸壇從之十二月丁未朔神主至大梁帝迎于西郊祔享于太廟鄴都留守天雄節度使兼侍衛親軍都指揮使同平章事王殷恃功専横凡河北鎭戍兵應用敇處分者殷即以帖行之又多掊斂民財帝聞之不悅使人謂曰卿與國同體鄴都帑庾甚豐卿欲用則取之何患無財成徳節度使何福進素惡殷甲子福進入朝密以殷隂事白帝帝由是疑之乙丑殷入朝詔留殷充京城内外巡檢戊辰府州防禦使折徳扆奏北漢將喬贇入宼擊走之王殷每出入從者常數百人殷請量給鎧仗以備巡邏帝難之時帝體不平將行郊祀而殷挾震主之勢在左右衆心忌之壬申帝力疾御滋徳殿殷入起居遂執之下制誣殷謀以郊祀日作亂流登州出城殺之命鎭寧節度使鄭仁誨詣鄴都安撫仁誨利殷家財擅殺殷子遷其家屬於登州唐祠部郎中知制誥徐鉉言貢舉初設不宜遽罷乃復行之先是楚州刺史田敬洙請修白水塘溉田以實邊馮延己以爲便李徳明因請大闢曠土爲屯田修復所在渠塘堙廢者吏因縁侵擾大興力役奪民田甚衆民愁怨無訴徐􅉗以白唐主唐主命鉉按視之鉉籍民田悉歸其主或譛鉉擅作威福唐主怒流鉉舒州然白水塘竟不成唐主又命少府監馮延魯廵撫諸州右拾遺徐鍇表延魯無才多罪舉措輕淺不宜奉使唐主怒貶鍇校書郎分司東都鍇􅉗之弟也道州盤容洞蠻酋盤崇聚衆自稱盤容州都統屢宼郴道州乙亥帝朝享太廟被衮冕左右掖以登堦纔及一室酌獻俛首不能拜而退命晉王榮終禮是夕宿南郊疾尤劇幾不救夜分小愈顯徳元年春正月丙子朔帝祀圓丘僅能瞻仰致敬而已進爵奠幣皆有司代之大赦攺元聽蜀境通商戊寅罷鄴都但爲天雄軍庚辰加晉王榮兼侍中判内外兵馬事時羣臣希得見帝中外恐懼聞晉王典兵人心稍安軍士有流言郊賞薄於唐明宗時者帝聞之壬午召諸將至寢殿讓之曰朕自即位以來惡衣菲食專以贍軍爲念府庫蓄積四方貢獻贍軍之外鮮有嬴餘汝軰豈不知之今乃縱凶徒騰口不顧人主之勤儉察國之貧乏又不思已有何功而受賞惟知怨望於汝軰安乎皆惶恐謝罪退索不逞者戮之流言乃息初帝在鄴都竒愛小吏曹翰之才使之事晉王榮榮鎭澶州以爲牙將榮入爲開封尹未别召翰翰自至榮怪之翰請間言曰大王國之儲嗣今主上寢疾大王當入侍醫藥柰何猶決事於外邪榮感悟即日入止禁中丙戍帝疾篤停諸司細務皆勿奏有大事則晉王榮禀進止宣行之以鎭寧節度使鄭仁誨爲樞密使同平章事戊子以義武留後孫行友保義留後韓通朔方留後馮繼業皆爲節度使通太原人也帝屢戒晉王曰昔吾西征見唐十八陵無不發掘者此無它惟多藏金玉故也我死當衣以紙衣歛以瓦棺速營葬勿乆留宫中壙中無用石以甓代之工人役徒皆和雇勿以煩民葬畢募近陵民三十户蠲其雜徭使之守視勿修下宫勿置守陵宫人勿作石羊虎人馬惟刻石置陵前云周天子平生好儉約遺令用􅁓衣瓦棺嗣天子不敢違也汝或吾違吾不福汝又曰李洪義當與節􅃏魏仁浦勿使離樞密院庚寅詔前登州刺史周訓等塞決河先是河決靈河魚池酸棗陽武常樂驛河隂六名鎭原武凡八口至是分遣使者塞之帝命趣草制以端明殿學士户部侍郎王溥爲中書侍郎同平章事壬辰宣制畢左右以聞帝曰吾無恨矣以樞密副使王仁鎬爲永興節度使以殿前都指揮使李重進領武信節度使馬軍都指揮使樊愛能領武定節度使歩軍都指揮使何徽領昭武節度使重進年長於晉王榮帝召入禁中屬以後事仍命拜榮以定君臣之分是日帝殂于滋徳殿袐不發喪乙未宣遺制丙申晉王即皇帝位初靜海節度使吳權卒子昌岌立昌岌卒弟昌文立是月始請命於南漢南漢以昌文爲靜海節度使兼安南都䕶北漢主聞太祖晏駕甚喜謀大舉入宼遣使請兵于契丹二月契丹遣其武定節度使政事令楊衮將萬餘􅀐如晉陽北漢主自將兵三萬以義成節度使白從暉爲行軍都部署武寧節度使張元徽爲前鋒都指揮使與契丹自團栢南趣潞州蜀左匡聖馬步都指揮使保寧節度使安思謙譖殺張業廢趙廷隠蜀人皆惡之蜀主使將兵救王景崇思謙逗撓無功内慙懼不自安自張業之誅宫門守衛加嚴思謙以爲疑已言多不遜思謙典宿衛多殺士卒以立威蜀主閲衛士有年尚壯而爲思謙所斥者復留􅀠籍思謙殺之蜀主不能平思謙三子扆嗣裔􅀝父勢暴横爲國人患}
