  - {type: variant, offset: 27, length: 1, content: 提, krp: 盂丙之邑漢爲盂縣按前此盂縣在今縣西陽曲縣東北八十里故盂縣城是也後魏省屬石艾縣隋開皇十六年分石艾縣置原仇縣屬遼州因原仇故城爲名即今縣是也大業二年改原仇爲盂縣從漢舊名符彦卿軍晉陽城下王彦超攻汾州九域志晉州北至汾州三百五十里北漢防禦使董希顔降帝遣萊州防禦使康延沼攻遼州遼州唐之儀州也梁開平三年勑兖州管内已有沂州其儀州改爲遼州九域志潞州東北至遼州二百四十三里密州防禦使田瓊攻沁州皆不下唐置沁州至宋太平興國五年廢沁州以和川縣𨽻晉州熈寧五年省和川縣入冀氏九域志冀氏縣在晉州東二百八十里沁音七鴆翻供備庫副使太原李謙溥單騎説遼州刺史張漢超説式苪翻漢超即降乙夘葬聖神恭肅文武孝皇帝于嵩陵三月乙酉梓宫赴山陵四月乙夘方葬與北漢交兵葬備多闕故緩廟號太祖南漢主以高王𢎞邈爲雄武節度使鎭邕州𢎞邈以齊鎭二王相繼死於邕州固辭齊王𢎞弼死見二百八十三卷晉天福八年鎭王𢎞澤死見二百八十四卷晉開運元年求宿衛不許至鎭委政僚佐日飲酒禱鬼神或上書誣𢎞邈謀作亂戊午南漢主遣甘泉宫使林延遇賜酖殺之初帝遣符彦卿等北征但欲耀兵於晉陽城下未議攻取既入北漢境其民爭以食物迎周師泣訴劉氏賦役之重願供軍須助攻晉陽北漢州縣繼有降者帝聞之始有兼并之意史言謀不先定者非廟勝之策遣使往與諸將議之諸將皆言芻糧不足請且班師以俟再}
  - {type: variant, offset: 29, length: 18, content: 西京嵩山崇福宮上柱國河內郡開國公食邑, SBCK: 永徳從之各將}
  - {type: variant, offset: 29, length: 1, content: 西, WYG: 帝不聽師有歸志宜其無功既而諸軍數十萬聚於太原城下軍士不免剽掠北漢民失望剽匹妙翻稍稍保山谷自固帝聞之馳詔禁止剽掠安撫農民止徵今嵗租税及募民入粟拜官有差仍發澤潞晉絳慈隰及山東近便諸州民運糧以饋軍山東近便諸州謂邢趙鎭定己未遣李穀詣太原計度芻糧度徒洛翻庚申太師中書令瀛文懿王馮道卒文考異曰五代通録謚曰愍今從世宗實録薛史道少以孝謹知名以此知名人所難能也少詩照翻唐莊宗世始貴顯馮道事劉守光位不過參軍入唐始貴顯自是累朝不離將相三公三師之位離力智翻唐制太師太傅太保爲三師太尉司徒司空爲三公爲人清儉寛𢎞人莫測其喜愠滑稽多智浮沈取容滑音骨沈持林翻嘗著長樂老叙自述累朝榮遇之狀馮道長樂老叙既自陳其榮遇又自謂孝於家忠於國爲子爲弟爲人臣爲師長爲夫爲父有子有孫時開一卷時飲一杯食味别聲被色老安於當代老而自樂何樂如之其自述如此時人往往以徳量推之歐陽修論曰禮義廉恥國之四維四維不張國乃滅亡管子之言禮義治人之大法治直之翻廉恥立人之大節况爲大臣而無廉恥天下其有不亂國家其有不亡者乎予讀馮道長樂老叙見其自述以爲榮其可謂無廉恥者矣則天下國家可從而知也予於五代得全節之士三謂王彦章裴約劉仁瞻死事之人十有五謂張源徳夏魯竒姚洪王思同張敬逹翟進宗沈斌王清史彦超孫晟馬彦超宋令珣李遐張彦卿鄭昭業凡十五人皆武夫戰卒豈於儒者果無其人哉得非高節之士惡時之亂惡烏路翻薄其世而不肯出歟抑君天下者不足顧而莫能致之歟予嘗聞五代時有王凝者家青齊之間爲虢州司户參軍以疾卒于官凝家素貧一子尚㓜妻李氏攜其子負其遺骸以歸東過開封止於旅舍主人不納李氏顧天已暮不肯去主人牽其臂而出之李氏仰天慟曰我爲婦人不能守節而此手爲人所執邪即引斧自斷其臂見者爲之嗟泣斷音短爲之于偽翻開封尹聞之白其事於朝厚䘏李氏而笞其主人此事歐陽公得之於五代小説朝直遙翻下同嗚呼士不自愛其身而忍恥以偷生者聞李氏之風宜少知愧哉少詩沼翻臣光曰天地設位聖人則之以制禮立法内有夫婦外有君臣婦之從夫終身不改臣之事君有死無貳此人道之大倫也茍或廢之亂莫大焉范質稱馮道厚徳稽古宏才偉量雖朝代遷貿人無間言貿音茂易也間古莧翻屹若巨山不可轉也夷考范質之爲人盖學馮道者也與屹同魚迄翻臣愚以爲正女不從二夫忠臣不事二君爲女不正雖復華色之美織絍之巧不足賢矣爲臣不忠雖復材智之多治行之優不足貴矣絍汝鴆翻治直吏翻行下孟翻何則大節已虧故也道之為相歷五朝八姓五朝唐晉遼漢周八姓唐莊宗明宗潞王各為一姓石晉邪律劉漢周太祖世宗各為一姓若逆旅之視過客朝為仇敵暮為君臣易面變辭曽無愧怍怍疾各翻大節如此雖有小善庸足稱乎或以爲自唐室之亡羣雄力爭帝王興廢逺者十餘年近者四三年雖有忠智將若之何當是之時失臣節者非道一人豈得獨罪道哉臣愚以爲忠臣憂公如家見危致命君有過則彊諌力爭國敗亡則竭節致死智士邦有道則見見賢遍翻邦無道則隠或滅迹山林或優遊下僚今道尊寵則冠三師權任則首諸相冠古玩翻相息亮翻國存則依違拱黙竊位素餐國亡則圖全茍免迎謁勸進君則興亡接踵道則富貴自如兹乃奸臣之尤安得與他人爲比哉或謂道能全身逺害於亂世斯亦賢已逺于願翻臣謂君子有殺身成仁無求生害仁引論語夫子之言豈專以全身逺害為賢哉然則盜跖病終而子路醢果誰賢乎盜跖從卒九千横行天下而以壽終子路仕衛孔悝之難子路死之菹於衛東門之上抑此非特道之愆也愆過也時君亦有責焉時君謂五朝八姓之君何則不正之女中士羞以爲家不忠之人中君羞以爲臣中士中君以人品言謂識見不及上而可以語上者彼相前朝語其忠則反君事讐語其智則社稷為墟後來之君不誅不棄乃復用以爲相復扶又翻彼又安肯盡忠於我而能獲其用乎故曰非特道之愆亦時君之責也温公以此警後世之君臣深矣辛酉符彦卿奏北漢憲州刺史太原韓光愿嵐州刺史郭言皆舉城降屬郡雖降而都府未克終於無益大軍既退則其地復為敵有矣初符彦卿有女適李守貞之子崇訓相者言其貴當爲天下母守貞喜曰吾婦猶母天下况我乎反意遂决及敗崇訓先刃其弟妹次及符氏符氏匿幃下崇訓倉猝求之不獲遂自剄剄古頂翻亂兵既入符氏安坐堂上叱亂兵曰吾父與郭公爲昆弟汝曹勿無禮太祖遣使歸之於彦卿及帝鎭澶州廣順元年帝鎭澶州三年入為開封尹太祖為帝娶之為于偽翻壬戌立爲皇后后性和惠而明决帝甚重之王彦超韓通攻石州克之執刺史安彦進癸亥沁州刺史李廷誨降庚午帝發潞州趣晉陽趣七喻翻癸酉北漢忻州監軍李勍殺刺史趙臯及契丹通事楊訥呼勍渠}
