  - {type: variant, offset: 62, length: 4, content: 奉敕編集, SBCK: 曰天地設位聖人則之以制禮立法内有夫婦外有君臣婦之從夫終身不攺臣之事君有死無貳此人道之大倫也茍或廢之亂莫大焉范質稱馮道厚徳稽古宏才偉量雖朝代遷貿人無間言屹若巨山不可轉也臣愚以爲正女不從二夫忠臣不事二君爲女不正雖復華色之美織絍之巧不足賢矣爲臣不忠雖復材智之多治行之優不足貴矣何則大節已虧故也道之為相歷五朝八姓若逆旅之視過客朝為仇敵暮為君臣易靣變辭曽無愧怍大節如此雖有小善庸足稱乎或以爲自唐室之亡羣雄力爭帝王興廢逺者十餘年近者四三年雖有忠智將若之何當是之時失臣節者非道一人豈得獨罪道哉臣愚以爲忠臣憂公如家見危致命君有過則強諌力爭國敗亡則竭節致死智士􅀖有道則見􅀖無道則隠或滅迹山林或優遊下僚今道尊寵則冠三師權任則首諸相國存則依違拱嘿竊位素餐國亡則圖全茍免迎謁勸進君則興亡接踵道則富貴自如兹乃姧臣之尤安得與它人爲比哉或謂道能全身逺害於亂丗斯亦賢已臣謂君子有殺身成仁無求生害仁豈專以全身逺害為賢哉然則盜跖病終而子路􅊽果誰賢乎抑此非特道之愆也時君亦有責焉何則不正之女中士羞以爲家不忠之人中君羞以爲臣彼相前朝語其忠則反君事讎語其智則社稷為墟}
