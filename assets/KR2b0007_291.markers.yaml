  - {type: variant, offset: 23, length: 0, content: '', SBCK: 王得中扣馬諌曰義可斬也風勢如此豈助我者邪北漢主曰吾計已決老書生勿妄言且斬汝麾東軍先進張元徽將千􅀐擊周右軍合戰未幾樊愛能何徽引􅀐兵先遁右軍潰歩兵千餘人解甲呼萬歳降于北漢帝見軍勢危自引親兵犯矢石督戰}
