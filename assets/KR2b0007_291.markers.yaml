  - {type: variant, offset: 19, length: 0, content: '', WYG: 使王藻職官分紀唐有翰林使掌伎術之待詔者五代有翰林茶酒使蜀葢仍唐舊制屢言思謙怨望將反丁巳思謙入朝蜀主命壯士擊殺之及其三子藻亦坐擅啓邊奏并誅之北漢兵屯梁侯驛昭義節度使李筠遣其將穆令均將步騎二千逆戰筠自將大軍壁於太平驛宋白曰梁侯驛在團柏谷南太平驛西北太平驛東南距潞州八十里張元徽與令均戰陽不勝而北令均逐之伏發殺令均俘斬士卒千餘人筠遁歸上黨潞州治上黨闕嬰城自守筠即李榮也天福十二年李榮有逐滿達勒功見二百八十七卷避上名改焉世宗聞北漢主入冦欲自將兵禦之羣臣皆曰劉崇自平陽遁走以來謂廣順元年劉崇圍晉州不克而歸也事見上卷勢蹙氣沮必不敢自來沮在吕翻陛下新即位山陵有日人心易搖易以䜴翻不宜輕動宜命將禦之帝曰崇幸我大䘮輕朕年少新立少詩照翻有吞天下之心此必自來朕不可不徃馮道固爭之帝曰昔唐太宗定天下未嘗不自行朕何敢偷安道曰未審陛下能爲唐太宗否帝曰以吾兵力之彊破劉崇如山壓卵耳道曰未審陛下能爲山否馮道歷事八姓身爲宰輔不聞獻替唯諌世宗親征一事帝不悅惟王溥勸行帝從之三月乙亥朔蜀主加捧聖控鶴都指揮使兼中書令孫漢韶武信節度使賜爵樂安郡王罷軍職罷其掌禁兵之職也蜀主懲安思謙之跋扈命山南西道節度使李廷珪等十人分典禁兵北漢乘勝進逼潞州乘梁侯驛之勝也丁丑詔天雄節度使符彦卿引兵自磁州固鎭出北漢軍後磁州武安縣有固鎭自此西北行至遼州北漢軍時已攻潞州符彦卿若至遼州界則出其後矣磁墻之翻以鎭寧節度使郭崇副之又詔河中節度使王彦超引兵自晉州東出邀北漢九域志晉州東至潞州三百八十五里以保義節度使韓通副之又命馬軍都指揮使寧江節度使樊愛能步軍都指揮使清淮節度使何徽寧江軍䕫州屬蜀清淮軍壽州屬唐樊何亦遙領也義成節度使白重贊重直龍翻鄭州防禦使史彦超前耀州團練使符彦能將兵先趣澤州趣七喻翻宣徽使向訓監之監古衘翻重贊憲州人也辛巳大赦癸未帝命馮道奉梓宫赴山陵山陵在鄭州新鄭縣以鄭仁誨爲東京留守乙酉帝發大梁庚寅至懐州九域志大梁至懐州三百二十五里帝欲兼行速進控鶴都指揮使眞定趙晁私謂通事舎人鄭好謙曰晁直遙翻好呼到翻賊勢方盛宜持重以挫之好謙言於帝帝怒曰汝安得此言必爲人所使言其人則生不然必死好謙以實對帝命并晁械於州獄懐州獄也壬辰帝過澤州九域志懐州北至澤州一百二十里宿於州東北北漢主不知帝至過潞州不攻引兵而南是夕軍於高平之南劉昫曰高平漢泫氏縣地宋白曰漢泫氏縣後魏改泫氏北齊改高平九域志高平縣在澤州東北六十五里癸巳前鋒與北漢軍遇擊之於考異曰世宗實録甲午賊陳高平南之高原按下又有甲午此必癸巳誤也今從十國紀年北漢兵却帝慮其遁去趣諸軍亟進趣讀曰促北漢主以中軍陳於巴公原陳讀曰陣下同巴公鎭在晉城縣東北張元徽軍其東楊衮軍其西衆頗嚴整時河陽節度使劉詞將後軍未至衆心危懼而帝志氣益銳命白重進與}
