  - {type: variant, offset: 24, length: 1, content: 中, WYG: 常卿田敏已下以崇義援引周禮正文為是乃從之更工衡翻聶尼輒翻甲戌以王朴權東京留守兼判開封府事以三司使張美為}
  - {type: page-break, offset: 24, content: '', id: KR2b0007_WYG_293-22b, image: WYG0310/WYG0310-0725b.png}
  - {type: variant, offset: 24, length: 1, content: 中, krp: 常卿田敏已下以崇義援引周禮正文為是乃從之更工衡翻聶尼輒翻甲戌以王朴權東京留守兼判開封府事以三司使張美為}
  - {type: variant, offset: 25, length: 0, content: '', SBCK: 流而下唐兵戰溺死及降者殆四萬人獲船艦糧仗以十萬數晡時帝馳至荆山洪距趙歩二百餘里是夜宿鎭淮軍癸酉從官始至劉仁贍聞援兵敗扼吭歎息甲午發近縣丁夫數千城鎭淮軍為二城夾淮水徙下蔡浮梁於其間扼濠夀應援之路㑹淮水漲唐濠州都監彭城郭廷謂以水軍泝淮欲掩不備焚浮梁右龍武統軍趙匡賛覘知之伏兵邀擊破之唐齊王景逹及陳覺皆自濠州奔歸金陵惟靜江指揮使陳徳誠全軍而還戊戍以淮南節度使向訓為武寕節度使淮南道行營都監將兵戍鎭淮軍己亥上自鎭淮軍復如下蔡庚子賜劉仁贍詔使自擇禍福唐主議自督諸將拒周中書舎人喬匡舜上䟽切諌唐主以為沮衆流撫州唐主問神衛統軍朱匡業劉存忠以守禦方略匡業誦羅隱詩曰時來天地皆同力運去英雄不自由存忠以匡業言為然唐主怒貶匡業撫州副使流存忠於饒州既而竟不敢自岀甲辰帝耀兵于夀春城北唐清淮節度使兼侍中劉仁贍病甚不知人丙午監軍使周廷構營田副使孫羽等作仁贍表遣使奉之來降丁未帝賜仁贍詔遣閤門使萬年張保續入城宣諭仁贍子崇讓復出謝罪戊申帝}
  - {type: page-break, offset: 25, content: '', id: KR2b0007_SBCK_293-14a}
  - {type: page-break, offset: 25, content: '', id: KR2b0007_SBCK_293-14b}
  - {type: variant, offset: 26, length: 0, content: '', SBCK: 陳甲兵受降於夀春城北廷構等舁仁贍出城仁贍卧不能起帝慰勞賜賚復令入城養疾庚戍徙夀州治下蔡赦州境死罪以下州民受唐文書聚山林者並召令復業勿問罪有甞爲其殺傷者毋得讎訟曏日政令有不便於民者令本州條奏辛亥劉仁贍爲天平節度使兼中書令制辭略曰盡忠所事抗節無虧前代名臣幾人堪比朕之伐叛得爾爲多是日卒追賜爵彭城郡王唐主聞之亦贈太師帝復以清淮軍爲忠正軍以旌仁贍之節以右羽林統軍楊信爲忠正節度使同平章事前許州司馬韓倫侍衛馬軍都指揮使令坤之父也令坤領鎭安節度使倫居于陳州干預政事貪汚不法爲公私患爲人所訟令坤屢爲之泣請癸丑詔免倫死流沙門島倫後得赦還居洛陽與光禄卿致仕柴守禮及當時將相王􅄎王晏王彦超之父遊處恃勢恣横洛陽人畏之謂之十阿父帝既為太祖嗣人無敢言守禮子者但以元舅處之優其俸給未甞至大梁甞以小忿殺人有司不敢詰帝知而不問詔開夀州倉振飢民丙辰帝北還夏四月己巳至大梁詔修永福殿命宦官孫延希董其役丁丑帝至其所見役徒有削柹為匕瓦中噉飯者大怒斬延希於市帝之克秦鳳也以蜀兵數千人為懷恩軍乙亥遣懷恩指揮使蕭知逺等將士八百餘人西還壬午李榖扶疾入見帝命不拜坐於御坐之側榖懇辭禄位不許甲申分江南降卒為六軍三十指揮號懷德軍乙酉詔䟽汴水北入五丈河自是齊魯舟楫皆逹於大梁五月丁酉以太祖皇帝領義成節度使詔以律令文古難知格敇煩雜不壹命侍御史知雜事張湜等訓釋删定為刑統唐郭廷謂將水軍㫁渦口浮梁又襲敗武寕節度使武行德于定逺行德僅以身免唐主以廷謂為滁州團練使充上淮水陸應援使蜀人多言左右衛聖馬歩都指揮使保寕節度使同平章事李廷珪為將敗覆不應復典兵廷珪亦自請罷去六月乙丑蜀主加廷珪檢校太尉罷軍職李太后以典兵者多非其人謂蜀主曰吾昔見莊宗跨河與梁戰及先帝在太原平二蜀諸將非有大功無得典兵故士卒畏服今王昭逺出於廝養伊審徴韓保貞趙崇韜皆膏粱乳臭子素不習兵徒以舊恩寘於人上平時誰敢言者一旦疆場有事安能禦大敵乎以吾觀之惟髙彦儔太原舊人終不負汝自餘無足任者蜀主不能從丁丑以前華州刺史王祚為潁州團練使祚溥之父也溥為宰相祚有賔客溥常朝服侍立客坐不安席祚曰㹠犬不足為起秋七月丁亥上治定逺軍及夀春城南之敗以武寕節度使兼中書令武行德為左衛上將軍河陽節度使李繼勲為右衛大將軍北漢主初立七廟司空兼門下侍郎同平章事李榖臥疾二年凡九表辭位八月乙亥罷守本官令每月肩輿一詣便殿議政事以樞密副使户部侍郎王朴檢校太保充樞密使懷恩軍至成都蜀主遣梓州别駕胡立等八十人東還且致書為謝請通好癸未立等至大梁帝以蜀主抗禮不之荅蜀主聞之怒曰朕為天子郊祀天地時爾猶作賊何敢如是九月中書舎人竇儼上䟽請令有司討論古今禮儀作大周通禮考正鍾律作大周正樂又以為政之本莫大擇人擇人之重莫先宰相自有唐之末輕用名器始為輔弼即兼三公僕射之官故其未得之也則以趨競為心既得之也則以容黙為事但思解密勿之務守崇重之官逍遥林亭保安宗族乞令即日宰相於􅀯宫三品兩省給舎以上各舉所知若陛下素知其賢自可登庸若其未也且令以本官權知政事朞歳之間察其職業若果能堪稱其官已髙則除平章事未髙則稍更遷官權知如故若有不稱則罷其政事責其舉者又班行之中有員無職者太半乞量其才器授以外任試之於事還則以舊官登叙考其治狀能者進之否者黜之又請令盜賊自相糾告以其所告貲産之半賞之或親戚為之首則論其徒侣而赦其所首者如此則盗不能聚矣又新鄭鄉村團為義營各立將佐一户為盜累其一村一户被盜罪其一將每有盜發則鳴鼓舉火丁壯雲集盜少民多無能脫者由是鄰縣充斥而一境獨清請令它縣皆効之亦止盜之一術也又累朝已來屢下詔書聽民多種廣耕止輸舊稅及其既種則有司履􅅿而増之故民皆疑懼而田不加闢}
