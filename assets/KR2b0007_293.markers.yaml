  - {type: variant, offset: 17, length: 0, content: '', WYG: 中書令安審琦鎮襄州十餘年漢天福十二年安審琦鎮襄陽至是十年矣至是入朝除守太師遣還鎮既行上問宰相卿曹送之乎對曰送至城南審琦深感聖恩五代以來方鎮入朝者或留不遣或易置之今加官遣還鎮故感恩上曰近朝多不以誠信待諸侯諸侯雖有欲効忠節者其道無由王者但能毋失其信何患諸侯不歸心哉壬午張永徳奏敗唐兵于下蔡敗補邁翻是時唐復以水軍攻永徳復扶又翻永徳夜令善游者沒其船下縻以鐵鎖縱兵擊之船不得進退溺死者甚衆永徳解金帶以賞善游者甲申以太祖皇帝為定國節度使兼殿前都指揮使定國軍即同州匡國軍也太祖登極避御名始改為定國軍史亦因以後所改軍號書之太祖皇帝表渭州軍事判官趙普為節度推官張永徳與李重進不相悦永徳密表重進有二心帝不之信時二將各擁重兵衆心憂恐重進一日單騎詣永徳營李重進時在夀州城下張永徳營下蔡從容宴飲謂永徳曰吾與公幸以肺腑俱為將帥從千容翻下同李重進太祖之甥張永徳太祖之婿故云然奚相疑若此之深邪永徳意乃解衆心亦安唐主聞之以蠟丸遺重進誘以厚利其書皆謗毁及反間之語遺唯季翻誘以乆翻間古莧翻重進奏之初唐使者孫晟鍾謨從帝至大梁帝待之甚厚每朝會班於中書省官之後時召見飲以醇酒飲於鴆翻問以唐事晟但言唐主畏陛下神武事陛下無二心及得唐蠟書帝大怒召晟責以所對不實晟正色抗辭請死而已問以唐虚實黙不對十一月乙巳帝命都承㫖曹翰送晟於右軍廵院侍衛親軍分左右軍各有廵院以鞫繫囚更以帝意問之翰與之飲酒數行從容問之晟終不言翰乃謂曰有敇賜相公死以唐所授官稱之晟神色怡然索袍笏整衣冠南向拜曰臣謹以死報國乃就刑索山客翻孫晟可謂盡節於所事矣并從者百餘人皆殺之從才用翻貶鍾謨耀州司馬既而帝憐晟忠節悔殺之召謨拜衛尉少卿帝召華山隱士真源陳摶真源漢古縣隋為谷陽縣唐髙宗乾封元年以老子所生之地改為真源縣載初元年改為仙源縣神龍元年復曰真源屬亳州宋大中祥符七年改曰衛真縣九域志在州西六十里摶徒九翻問以飛升黄白之術飛升者謂羽化而升仙黄白者謂煉白金為黄金對曰陛下為天子當以治天下為務安用此為戊申遣還山詔州縣長吏常存問之治直之翻長知兩翻十二月壬申以張永徳為殿前都㸃檢後唐以來車駕行幸及出征則置大内都㸃檢之官後周選驍勇之士充殿前諸班始置殿前都㸃檢於都指揮使之上自宋太祖皇帝以殿前都㸃檢登極是後不復除授分命中使發陳蔡宋亳潁兖曹單等州丁夫城下蔡單音善是嵗唐主詔淮南營田害民尤甚者罷之遣兵部郎中陳處堯持重幣浮海詣契丹乞兵處昌吕翻處考異曰十國紀年作兵部郎中叚常今從晉陽聞見録契丹不能為之出兵為于偽翻而留處堯不遣處堯剛直有口辯久之忿懟數面責契丹主懟直類翻數所角翻契丹主亦不之罪也蜀陵榮州獠反宋白曰晉太元中益州刺史毛璩置西城戍於漢武陽縣之東境周閔帝元年於此置陵州因陵并為名榮州古夜郎國漢開為南安縣地蕭齊於此晉南安郡隋廢郡以其地屬資陽郡唐武徳初割資州之太牢威逺二縣置榮州取境有崇徳山為名獠魯皓翻弓箭庫使趙季文討平之職官分紀曰唐有内弓箭庫使五代去内字呉越王𢎞俶括境内民兵勞擾頗多判明州錢𢎞億手疏切諫罷之四年春正月己丑朔北漢大赦改元天會以}
