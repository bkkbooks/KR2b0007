  - {type: variant, offset: 49, length: 0, content: '', WYG: 餘級又攻抜其羊馬城城中震恐丙申夜唐濠州團練使郭廷謂上表言臣家在江南今若遽降恐為唐所種族種章勇翻請先遣使詣金陵禀命然後出降帝許之辛丑帝聞唐有戰船數百艘在渙水東渙水逕宿亳之間東南至巉石山西而南入淮欲救濠州自將兵夜發水陸擊之癸卯大破唐兵於洞口今濠州東九十里有浮山山下有穴名浮山洞夏潦不能及而冬不加髙故人疑其山為浮洞口竊意即浮山洞口斬首五千餘級降卒二千餘人因鼓行而東所至皆下乙巳至泗州城下太祖皇帝先攻其南因焚城門破水寨及月城月城者臨水築城兩頭抱水形如却月帝居于月城樓督將士攻城北漢主自即位以來顯徳元年冬十一月北漢主即位方安集境内未遑外略是月契丹遣其大同節度使侍中崔勲將兵來會北漢欲同入冦北漢主遣其忠武節度使同平章事李存瓌將兵會之南侵潞州至其城下而還忠武軍許州屬周李存瓌遥領耳還從宣翻又如字北漢主知契丹不足恃而不敢遽與之絶贈送勲甚厚猶欲倚之以為聲援十二月乙卯唐泗州守將范再遇舉城降以再遇為宿州團練使上自至泗州城下禁軍中芻蕘者毋得犯民田蕘如招翻民皆感悦爭獻芻粟既克泗州無一卒敢擅入城者帝聞唐戰船數百艘泊洞口遣騎詗之唐兵退保清口詗古永翻又翾正翻清口即清河口也戊午上自將親軍自淮北進命太祖皇帝將步騎自淮南進諸將以水軍自中流進共追唐兵時淮濵久無行人葭葦如織多泥淖溝塹淖奴教翻塹七艶翻士卒乗勝氣苃涉爭進皆忘其勞苃蒲撥翻草行為苃水行為涉庚申追及唐兵且戰且行金鼓聲聞數十里聞音問辛酉至楚州西北大破之九域志泗州西至濠州一百七十五里東北至楚州二百二十里唐兵有㳂淮東下者帝自追之太祖皇帝為前鋒行}
