  - {type: 'tls:seg', offset: 59, content: '', id: KR2b0007_ZHSJ_293-d77p1s2}
  - {type: variant, offset: 59, length: 7, content: 司馬光奉敕編集, SBCK: 作降表廷謂斬之舉濠州降得兵萬人糧數萬斛唐主賞李延鄒之子以官壬戌帝濟淮至楚州營于城西北乙丑唐雄武軍使知漣水縣事崔萬迪降丙寅以郭廷謂為亳州防禦使戊辰帝攻楚州克其月城庚午郭廷謂見於行宫帝曰朕南征以來江南諸將敗亡相繼獨卿能斷渦口浮梁破定逺寨所以報國足矣濠州小城使李璟自守能守之乎使將濠州兵攻天長帝遣鐡􅀐左廂都指揮使武守􅄾將􅀐數百􅃐揚州至髙郵唐人悉焚揚州官府民居驅其人南渡江}
