  - {type: variant, offset: 34, length: 0, content: '', krp: 讓復出謝罪戊申帝大陳甲兵受降於夀春城北廷構等舁仁贍出城舁音余又羊茹翻仁贍臥不能起帝慰勞賜賚勞力到翻賚來代翻復令入城養疾復扶又翻諸考異曰實録時仁贍臥疾已亟遂翻然納欵而城中軍萬計皆屏息以聽其命又曰仁贍輕財重士法令嚴肅故能以一城之衆連年拒守逮其來降而其下無敢竊議者斯亦一時之名將也歐陽史三月仁贍病甚已不知人其副使孫羽詐為仁贍書以城降世宗命舁仁贍至帳前嗟嘆久之賜以玉帶御馬復使入城養疾是日制曰劉仁贍盡忠所事抗節無虧前代名臣幾人可比予之南伐得爾為多乃拜仁贍檢校太尉兼中書令天平軍節度使仁贍不能受命而卒世宗追封彭城郡王以其子崇讚為懷州刺史李景聞仁贍卒亦贈太師又曰仁贍既殺其子以自明矣豈有垂死而變節者乎今周世宗實録載仁贍降書葢其副使孫羽等所為也當世宗時王環為蜀守秦州攻之久不下其後力屈而降世宗頗嗟其忠然止以為大將軍視世宗待二人之薄厚而考其制書乃知仁贍非降者也今從之庚戌徙夀州治下蔡夀州宋升為夀春府至今治下蔡縣而夀春故縣自為縣在淮水之南西北距下蔡二十五里髙宗南渡復於夀州舊治夀春縣建安豐軍以為控扼之地葢地險所在通古今不能易也宋白曰下蔡古之蔡國吴之州來左傳蔡成公遷于州來謂之下蔡是也漢為下蔡縣梁於硤石山築城以拒魏即今縣城也赦州境死罪以下州民受唐文書聚山林者並召令復業勿問罪有嘗為其殺傷者毋得讎訟曏日政令有不便於民者令本州條奏辛亥以劉仁贍為天平節度使兼中書令制辭略曰盡忠所事抗節無虧前代名臣幾人堪比朕之伐叛得爾為多是日卒追賜爵彭城郡王唐主聞之亦贈太師帝復以清淮軍為忠正軍楊氏以夀州置忠正軍後改清淮軍今復為忠正軍以旌劉仁贍之節按薛史唐明宗天成二年詔昇夀州為忠正軍長興二年閏五月己丑升廬州為昭順軍八月癸酉升州為昭信軍宋白續通典曰夀州後唐天成元年升為順化軍節度今並存之以俟博考以旌仁贍之節以右羽林統軍楊信為忠正節度使同平章事前許州司馬韓倫侍衛馬軍都指揮使令坤之父也令坤領鎮安節度使倫居于陳州陳州鎮安軍治所干預政事貪汚不法為公私患為人所訟令坤屢為之泣請屢為于偽翻癸丑詔免倫死流沙門島登州蓬萊縣有沙門島置沙門寨倫後得赦還居洛陽與光禄卿致仕柴守禮及當時將相王溥王晏王彦超之父游處恃勢恣横洛陽人畏之謂之十阿父處昌吕翻下處之同横户孟翻阿烏葛翻帝既為太祖嗣人無敢言守禮子者但以元舅處之優其俸給未嘗至大梁嘗以小忿殺人有司不敢詰詰去吉翻帝知而不問詔開夀州倉賑饑民丙辰帝北還還從宣翻夏四月己巳至大梁詔修永}
  - {type: variant, offset: 35, length: 0, content: '', WYG: 殿命宦官孫延希董其役丁丑帝至其所見役徒有削柹為匕瓦中噉飯者柹方廢翻木札也匕卑履翻噉徒濫翻大怒斬延希於市帝之克秦鳳也事見上卷二年以蜀兵數千人為懷恩軍乙亥遣懷恩指揮使蕭知逺等將士八百餘人西還既以示中國威徳又欲使之言已克平淮南數千里之地以恐動蜀人壬午李榖扶疾入見見賢遍翻帝命不拜坐於御坐之側御坐徂卧翻榖懇辭禄位不許甲申分江南降卒為六軍三十指揮號懷徳軍乙酉詔疏汴水北入五丈河河自都城厯曹濟及鄆其廣五丈舊名五丈河宋開寶六年詔改名廣濟河薛史曰浚五丈河東流於定陶入于濟以通齊魯運路由是齊魯舟楫皆達於大梁五月丁酉以太祖皇帝領義成節度使詔以律令文古難知格敇煩雜不壹命御史知雜事張湜等唐制御史臺有侍御史六人以久次者一人知雜事謂之雜端杜佑通典曰知雜事謂之南床殿中監察不得坐凡侍御史之例不出累月遷登南省故謂之南床百官察其行止出入揖讓去就殿中以下皆禀而隨之湜丞職翻訓釋詳定為刑統刑統一書終宋之世行之唐郭廷謂將水軍㫁渦口浮梁又襲敗武寕節度使武行徳于定逺㫁音短敗補邁翻行徳僅以身免唐主以廷謂為滁州團練使充上淮水陸應援使上淮謂淮水之上游也蜀人多言左右衛聖馬步都指揮使保寕節度使同平章事李廷珪為將敗覆敗覆謂敗軍而秦鳳階成四州之地覆沒不應復典兵應於陵翻不應猶言不當也復扶又翻廷珪亦自請罷去六月乙丑蜀主加廷珪檢校太尉罷軍職李太后以典兵者多非其人謂蜀主曰吾昔見莊宗跨河與梁戰及先帝在太原平二蜀諸將非有大功無得典兵故士卒畏服李太后本唐莊宗後宫莊宗以賜蜀髙祖故能言二主時事今王昭逺出於廝養王昭逺成都人年十三事東郭禪師智諲為童子蜀髙祖嘗飯僧於府昭逺執巾履隨智諲以入髙祖愛其慧黠時後主方就學令昭逺給事左右由是見親狎厮音斯養余亮翻伊審徴韓保貞趙崇韜皆膏粱乳臭子按路振九國志趙崇韜者廷隱之子素不習兵徒以舊恩寘於人上平時誰敢言者一旦疆場有事安能禦大敵乎以吾觀之惟髙彦儔太原舊人終不負汝自餘無足任者蜀主不能從及孟氏之亡僅髙彦儔一人能以死殉國至蜀主之死其母亦不食而卒婦人志節如此丈夫多有愧焉者丁丑以前華州刺史王祚為潁州團練使祚溥之父也溥為宰相祚有賔客溥常朝服侍立華户化翻朝直遥翻客坐不安席祚曰㹠犬不足為起㹠與豚同足為于偽翻秋七月丁亥上治定逺軍及夀春城南之敗定逺縣名屬濠州軍字衍定逺之敗見上五月夀春城南之敗見去年六月以武寕節度使兼中書令武行徳為左衛上將軍河陽節度使李繼勲為右衛大將軍北漢主初立七廟北漢主自以承髙祖隱帝之後與僭竊者不同然地狹國貧日困於兵今始能立七廟以倣天子之制司空兼門下侍郎同平章事李榖臥疾二年凡九表辭位八月乙亥罷守本官令每月肩輿一詣便殿議政事以樞密副使户部侍郎王朴檢校太保充樞密使懷恩軍至成都是年四月遣懷恩軍西還今方至成都蜀主遣梓州别駕胡立等八十人東還胡立為蜀所禽見上卷二年還從宣翻且致書為謝請通好好呼到翻癸未立等至大梁帝以蜀主抗禮不之答蜀主聞之怒曰朕為天子郊祀天地時爾猶作賊何敢如是九月中書舎人竇儼上疏請令有司討論古今禮儀作大周通禮考正鍾律作大周正樂又以為為政之本莫大擇人擇人之重莫先宰相自有唐之末輕用名器始為輔弼即兼三公僕射之官故其未得之也則以趨競為心既得之也則以容黙為事但思解密勿之務守崇重之官逍遥林亭保安宗族乞今即日宰相於南宫三品兩省給舎以上各舉所知即日宰相謂見在相位者南宫謂尚書省也三品謂六部尚書也兩省謂中書門下省也給舎謂給事中中書舎人也若陛下素知其賢自可登庸庸用也若其未也且令以本官權知政事期嵗之間察其職業若果能堪稱堪稱堪其任稱其職也稱尺證翻下不稱同其官已髙則除平章事未髙則稍更遷官權知如故若有不稱則罷其政事責其舉者又班行之中行户剛翻有員無職者太半如諸衛將軍東}
