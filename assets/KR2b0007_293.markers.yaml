  - {type: variant, offset: 16, length: 0, content: '', WYG: 王朴司天少監王處訥撰顯徳欽天厯上之初王處訥私造明𤣥厯于家因唐世所行崇𤣥厯而明之也帝以王朴通於厯數乃詔朴撰定以步日步月步星步發歛為四篇合為厯經併著顯徳三年七政細行厯一卷以為欽天厯詔自來嵗行之殿前都指揮使義成節度使張永徳屯下蔡唐將林仁肇以水陸軍援夀春永徳與之戰仁肇以船實薪芻因風縱火欲焚下蔡浮梁俄而風回唐兵敗退永徳為鐡綆千餘尺綆若杏翻距浮梁十餘步横絶淮流繫以巨木由是唐兵不能近近其靳翻九月丙午以端明殿學士左散騎常侍權知開封府事王朴為户部侍郎充樞密副使冬十月癸酉李重進奏唐人冦盛唐鐡騎都指揮使王彦昇等擊破之斬首三千餘級彦昇蜀人也丙子上謂侍臣近朝徴歛榖帛多不俟收穫紡績之畢侍臣之下有曰字文意乃足近朝猶言近代也朝直遥翻下同乃詔三司自今夏税以六月秋税以十月起徴五代會要曰二税起徴皆以月一日民間便之山南東道節度使守太尉}
