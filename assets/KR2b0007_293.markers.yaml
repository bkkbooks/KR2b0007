  - {type: variant, offset: 36, length: 0, content: '', krp: 官屬内諸使之類乞量其才器量音良授以外任試之於事還以舊官登叙考其治狀治直吏翻能者進之否者黜之又請令盗賊自相糾告以其所告貲産之半賞之或親戚為之首則論其徒侣而赦其所首者如此則盗不能聚矣言或親戚相與為盗其中有能自首者則赦之其徒侣則論其罪也首式又翻又新鄭鄉村團為義營各立將佐一户為盗累其一村將即亮翻下同累力瑞翻一户被盗罪其一將每有盗發則鳴鼓舉火丁壯雲集盗少民多無能脱者由是鄰縣充斥而一境獨清充斥獨清皆言盗也請令它縣皆效之亦止盗之一術也又累朝已來屢下詔書聽民多種廣耕}
  - {type: variant, offset: 37, length: 10, content: 柱國河內郡開國公食邑, SBCK: 環水自固謂周兵必不能涉戊子帝自攻之命内殿直康保裔帥甲士數百乗槖駝渉水太祖皇帝帥􅀐兵繼之遂抜之李重進破濠州􅀯關城癸巳帝自攻濠州王審􅄾抜其水寨唐人屯戰船數百於城北植巨木於淮水以限周兵帝命水軍攻之抜其木焚戰船七十餘艘斬首}
  - {type: variant, offset: 37, length: 10, content: 柱國河內郡開國公食邑, WYG: 輸舊税朝直遥翻輸舂遇翻及其既種則有司履畆而増之故民皆疑懼而田不加闢夫為政之先莫如敦信信茍著矣則田無不廣田廣則榖多榖多則藏之民猶藏之官也又言陛下南征江淮一舉而得八州八州謂光黄舒蘄和楊滁泰皆取之再駕而平夀春事見上三月威靈所加前無彊敵今以衆擊寡以治伐亂勢無不克治直吏翻但行之貴速則彼民免俘馘之災此民息轉輸之困矣帝覽而善之儼儀之弟也冬十月戊午設賢良方正直言極諫經學優深可為師法詳閑吏理達於教化等科此所謂制舉也時詔應天下諸色人中不限前資見任職官黄衣草澤並許應詔其逐處州府依每年貢舉人式例差官考試解送尚書吏部仍量試策論三道共三千字已上當日取文理俱優人物爽秀方得解送取來年十月集上都其登朝官亦許上表自舉癸亥北漢麟州刺史楊重訓舉城降太祖廣順二年楊重訓以麟州歸欵中間必又附北漢也以為麟州防禦使己巳以王朴為東京留守聽以便宜從事以三司使張美充大内都㸃檢壬申帝發大梁十一月丙戌至鎮淮軍是夜五鼓濟淮丁亥至濠州城西濠州東北十八里有灘唐人柵於其上環水自固環音宦謂周兵必不能涉戊子帝自攻之命内殿直康保裔帥甲士數百乗槖駝涉水帥讀曰率下同太祖皇帝帥騎兵繼之遂抜之李重進破濠州南闗城癸巳帝自攻濠州王審琦抜其水寨唐人屯戰船數百於城北植巨木於淮水以限周兵帝命水軍攻之抜其木焚戰船七十餘艘艘蘇遭翻下同斬首}
