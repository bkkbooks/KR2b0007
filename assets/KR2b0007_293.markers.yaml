  - {type: variant, offset: 33, length: 0, content: '', WYG: 發源由潁昌至鹿邑界過蔡河口與蔡河合流經順昌府潁上縣至西正陽入淮河唐人見之大驚乙酉帝至下蔡三月己丑夜帝度淮抵夀春城下庚寅旦躬擐甲胄擐音宦軍於紫金山南命太祖皇帝擊唐先鋒寨及山北一寨皆破之斬獲三千餘級斷其甬道斷音短由是唐兵首尾不能相救至暮帝分兵守諸寨還下蔡唐朱元恃功頗違元帥節度朱元恃其復舒和之功也陳覺與元有隙屢表元反覆不可將兵唐主以武昌節度使楊守忠代之守忠至濠州覺以齊王景達之命召元至濠州計事將奪其兵元聞之憤怒欲自殺門下客宋垍説元曰大丈夫何往不富貴何必為妻子死乎垍其冀翻説式芮翻為于偽翻辛卯夜元與先鋒壕寨使朱仁裕等舉寨萬餘人降禆將時厚卿不從元殺之帝慮其餘衆㳂流東潰遽命虎㨗左廂都指揮使趙晁五代㑹要廣順元年改侍衛馬軍曰龍㨗左右軍步軍曰虎㨗左右軍晁直遥翻將水軍數千㳂淮而下壬辰旦帝軍于趙步趙步在淮河北岸水濵泊舟之地人坎岸為道以上下謂之步趙步以趙氏居其地而得名今自夀春花靨鎮㳂淮東下百餘里得趙步灘又東逕梁城灘北齊梁控扼之地也淮水中有梁城灘又東二十五里至洛河口諸將擊唐紫金山寨大破之殺獲萬餘人擒許文稹邊鎬楊守忠餘衆果㳂淮東走帝自趙步將騎數百循北岸追之諸將以步騎循南岸追之水軍自中流而下唐兵戰溺死及降者殆四萬人獲船艦糧仗以十萬數晡時帝馳至荆山港荆山在濠州鍾離縣西八十三里即梁武帝築堰之地今懷逺軍正治荆山距趙步二百餘里是夜宿鎮淮軍鎮淮軍時置於渦口癸酉從官始至從才用翻劉仁贍聞援兵敗扼吭歎息吭苦郎翻甲午發近縣丁夫城鎮淮軍為二城夾淮水徙下蔡浮梁於其間扼濠夀應援之路㑹淮水漲唐濠州都監彭城郭廷詔以水軍泝淮欲掩不備焚浮梁右龍武綂軍趙匡贊覘知之覘丑廉翻又丑艶翻伏兵邀擊破之唐齊王景達及陳覺皆自濠州奔歸金陵惟靜江指揮使陳徳誠全軍而還陳徳誠誨之子也還從宣翻又如字戊戌以淮南節度使向訓為武寕節度使淮南道行營都監將兵戍鎮淮軍己亥上自鎮淮軍復如下蔡庚子賜劉仁贍詔使自擇禍福唐主議自督諸將拒周中書舎人喬匡舜上疏切諫唐主以為沮衆流撫州沮在吕翻唐主問神衛統軍朱匡業劉存忠以守禦方畧匡業誦羅隱詩曰時來天地皆同力運去英雄不自由存忠以匡業言為然唐主怒貶匡業撫州副使流存忠於饒州既而竟不敢自行甲辰帝耀兵于夀春城北唐清淮節度使兼侍中劉仁贍病甚不知人丙午監軍使周廷構營田副使孫羽等作仁贍表遣使奉之來降丁未帝賜仁贍詔遣閤門使萬年張保續入城宣諭仁贍子}
