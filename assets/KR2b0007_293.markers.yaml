  - {type: variant, offset: 36, length: 0, content: '', WYG: 官屬内諸使之類乞量其才器量音良授以外任試之於事還以舊官登叙考其治狀治直吏翻能者進之否者黜之又請令盗賊自相糾告以其所告貲産之半賞之或親戚為之首則論其徒侣而赦其所首者如此則盗不能聚矣言或親戚相與為盗其中有能自首者則赦之其徒侣則論其罪也首式又翻又新鄭鄉村團為義營各立將佐一户為盗累其一村將即亮翻下同累力瑞翻一户被盗罪其一將每有盗發則鳴鼓舉火丁壯雲集盗少民多無能脱者由是鄰縣充斥而一境獨清充斥獨清皆言盗也請令它縣皆效之亦止盗之一術也又累朝已來屢下詔書聽民多種廣耕}
