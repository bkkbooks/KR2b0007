  - {type: variant, offset: 23, length: 0, content: '', SBCK: 衛融為中書侍郎同平章事内客省使叚恒為樞密使宰相屢請立皇子為王上曰諸子皆幼且功臣之子皆未加恩而獨先朕子能自安乎周兵圍夀春連年未下城中食盡齊王景逹自濠州遣應援使永安節度使許文稹都軍使邊鎬北面招討使朱元將兵數萬泝淮救之軍於紫金山列十餘寨如連珠與城中烽火晨夕相應又築甬道抵夀春欲運糧以饋之綿亘數十里將及夀春李重進邀擊大破之死者五千人奪其二寨丁未重進以聞戊申詔以來月幸淮上劉仁贍請以邊鎬守城自帥衆決戰齊王景逹不許仁贍憤邑成疾其幼子崇諌夜泛舟度淮北為小校所執仁贍命􅆎斬之左右莫敢救監軍使周廷構哭於中門以救之仁贍不許廷構復使求救於夫人夫人曰妾於崇諌非不愛也然軍法不可私名節不可虧若貸之則劉氏為不忠之門妾與公何面目見將士乎􅃐命斬之然後成喪將士皆感泣議者以唐援兵尚彊多請罷兵帝疑之李榖寢疾在第二月丙寅帝使范質王溥就與之謀榖上䟽以為夀春危困破在旦夕若鑾駕親征則將士爭奮援兵震恐城中知亡必可下矣上悅庚午詔有司更造祭器祭玉等命國子博士聶崇義討論制度為之圖甲戍以王朴權東京留守兼判開封府事以三司使張美為大内都廵檢以侍衛都虞􅃸韓通為京城内外都廵檢乙亥帝發大梁先是周與唐戰唐水軍銳敏周人無以敵之帝每以為恨返自夀春於大梁城西汴水側造戰艦數百艘命唐降卒教北人水戰數月之後縱横出没殆勝唐兵至是命右驍衛大將軍王環將水軍數千自閔河􅆓潁入淮唐人見之大驚乙酉帝至下蔡三月己丑夜帝度淮抵夀春城下庚寅旦躬擐甲胄軍於紫金山南命}
