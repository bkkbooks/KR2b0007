  - {type: variant, offset: 49, length: 0, content: '', SBCK: 餘級又攻抜其羊馬城城中震恐丙申夜唐濠州團練使郭廷謂上表言臣家在江􅀯今若遽降恐為唐所種族請先遣使詣金陵禀命然後出降帝許之辛丑帝聞唐有戰船數百艘在泗水東欲救濠州自將兵夜發水陸擊之癸卯大破唐兵於洞口斬首五千餘級降卒二千餘人因鼔行而東所至皆下乙巳至泗州城下太祖皇帝先攻其南因焚城門破水寨及月城帝居于月城樓督將士攻城北漢主自即位以來方安集境内未遑外略是月契丹遣其大同節度使侍中崔勲將兵來㑹北漢欲同入宼北漢主遣其忠武節度使同平章事李存瓌將兵㑹之􅀯侵潞州至其城下而還北漢主知契丹不足恃而不敢遽與之絶贈送勲甚厚十二月乙卯唐泗州守將范再遇舉城降以再遇為宿州團練使上自至泗州城下禁軍中芻蕘者毋得犯民田民皆感悅爭獻芻粟既克泗州無一卒敢擅入城者帝聞唐戰船數百艘泊洞口遣􅀐詗之唐兵退保清口戊午旦上自將親軍自淮北進命太祖皇帝將歩􅀐自淮南進諸將以水軍自中流進共追唐兵時淮濵乆無行人葭葦如織多泥淖溝塹士卒乗勝氣茇渉爭進皆忘其勞庚申追及唐兵且戰且行金鼔聲聞數十里辛酉至楚州西北大破之唐兵有㳂淮東下者帝自追之太祖皇帝爲前鋒行}
