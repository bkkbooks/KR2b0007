  - {type: variant, offset: 11, length: 0, content: '', SBCK: 臣司馬光奉勑編集後周紀四圉大荒落凡一年有竒起柔兆執徐三月盡強丗宗睿武孝武皇帝中顯徳三年三月甲午朔上行視水寨至淝橋自取一石馬上持之至寨以供礮從官過橋者人齎一石太祖皇帝乗皮船入夀春壕中城上發連弩射之矢大如屋椽牙將館陶張瓊遽以身蔽之矢中瓊髀死而復蘇鏃着骨不可出瓊飲酒一大巵令人破骨出之流血數升神色自若唐主復以右僕射孫晟為司空遣與禮部尚書王崇質奉表入見稱自天祐以來海内分崩或跨據一方或遷革異代臣紹襲先業奄有江表顧以瞻烏未定附鳳何從今天命有歸聲教逺被願比兩浙湖南仰奉正朔謹守土疆乞收薄伐之威赦其後服之罪首於下國俾作外臣則柔逺之徳云誰不服又獻金千兩銀十萬兩羅綺二千匹晟謂馮延己曰此行當在左相晟若辭之則負先帝既行知不免中夜歎息謂崇質曰君家百口宜自為謀吾思之熟矣終不負永陵一抔土餘無所知􅀯漢甘泉宫使林延遇隂險多計數南漢主􅀝信之誅滅諸弟皆延遇之謀也乙未卒國人相賀延遇病甚薦内給事龔澄樞自代􅀯漢主即日擢澄樞知承宣院及内侍省澄樞番禺人也光舒黄招安廵檢使行光州刺史何超以安隨申蔡四州兵數萬攻光州丙申超奏唐光州刺史張紹弃城走都監張承翰以城降丁酉行舒州刺史郭令圖拔舒州唐蘄州將李福殺其知州王承㑺舉州來降遣六宅使齊藏珍攻黄州彰武留後李彦頵性貪虐部民與羌胡作亂攻之上召彦頵還朝秦鳳之平也上赦所俘蜀兵以􅀠軍籍從征淮􅀯復亡降于唐癸卯唐主表獻百五十人上悉命斬之舒州人逐郭令圖鐡􅀐都指揮使洛陽王審􅄾選輕􅀐夜襲舒州復取之令圖乃得歸馬希崇及王延政之子繼沂皆在揚州招撫存之丙午孫晟等至上所庚戌上遣中使以孫晟詣夀春城下示劉仁贍且招諭之仁贍見晟戎服拜於城上晟謂仁贍曰君受國厚恩不可開門納宼上聞之甚怒晟曰臣為唐宰相豈可教節度使外叛邪上乃釋之唐主使李德明孫晟言於上請去帝號割夀濠泗楚光海六州之地仍歳輸金帛百萬以求罷兵上以淮􅀯之地已半為周有諸將捷奏日至欲盡得江北之地不許德明見周兵日進奏稱唐主不知陛下兵力如此之盛願寛臣五日之誅得歸白唐主盡獻江北之地上乃許之晟因奏遣王崇質與德明俱歸上遣供奉官安􅀪道送德明等歸金陵賜唐主詔書其略曰但存帝號何爽歳寒儻堅事大之心終不廹人于險又曰俟諸郡之悉來即大軍之立罷言盡於此更不煩云茍曰未然請從茲絶又賜其將相書使熟議而來唐主復上表謝李徳明盛稱上威徳及甲兵之彊勸唐主割江北之地唐主不悅宋齊丘以割地為無益德明輕佻言多過實國人亦不之信樞密使陳覺副使李徴古素惡德明及孫晟使王崇質異其言因譖德明於唐主曰德明賣國求利唐主大怒斬德明於市呉程攻常州破其外郭執唐常州團練使趙仁澤送于錢塘仁澤見呉越王􅀪俶不拜責以負約􅀪俶怒抉其口至耳元德昭憐其忠為傅良藥得不死唐主以呉越兵在常州恐其侵逼潤州以宣􅃳大都督燕王弘兾年少恐其不習兵徴還金陵部將趙鐸言於弘兾曰大王元帥衆心所恃逆自退歸所部必亂弘兾然之辭不就徴部分諸將為戰守之備龍武都虞􅃸柴克宏再用之子也沈黙好施不事家産雖典宿衞日與賔客博奕飲酒未甞言兵時人以為非將帥才至是有言克宏乆不遷官者唐主以為撫州刺史克宏請效死行陳其母亦表稱克宏有父風可為將茍不勝任分甘孥戮唐主乃以克宏為右武衛將軍使將兵㑹􅀽州刺史陸孟俊救常州時唐精兵悉在江北克宏所將數千人皆羸老樞密使李徴古復以鎧仗之朽蠧者給之克宏訴於徴古徴古慢罵之衆皆憤恚克宏怡然至潤州徴古遣使召還以神衛統軍朱匡業代之燕王􅀪兾謂克宏君但前戰吾當論奏乃表克宏才略可以成功常州危在旦莫不宜中易主將克宏引兵徑􅃐常州徴古復遣使召之克宏曰吾計日破賊汝來召吾必姧人也命斬之使者曰受李樞密命而來克宏曰李樞密來吾亦斬之初鮑修讓羅晟在福州與呉程有隙至是程抑挫之二人皆怨先是唐主遣中書舎人喬匡舜使於呉越壬子柴克宏至常州蒙其船以幕匿甲士於其中聲言迎匡舜呉越邏者以告程曰兵交使在其間不可妄以為疑唐兵登岸徑薄呉越營羅晟不力戰縱之使􅃐程悵程僅以身免克宏大破呉越兵斬首萬級朱匡業至行營克宏事之甚謹呉程至錢塘呉越王弘俶悉奪其官甲寅蜀主以捧聖控鶴都指揮使李廷珪為左右衛聖諸軍馬歩都指揮使仍分衛聖匡聖歩􅀐為左右十軍以武定節度使吕彦􅄾等為使廷珪緫之如趙廷隱之任初柴克宏為宣州廵檢使始至城塹不修器械皆闕吏云自田頵王茂章李遇相繼叛後人無敢治之者克宏曰時移事異安有此理悉繕完之由是路彦銖攻之不克聞呉程敗乙卯引歸唐主以克宏為奉化節度使克宏復請將兵救夀州未至而卒河陽節度使白重賛以天子南征慮北漢乗虚入宼繕完守備且請兵於西京西京留守王晏初不之與又慮事出非常乃自將兵赴之重賛以晏不奉詔而來拒不納遣人謂之曰令公昔在陜服巳立大功河陽小城不煩枉駕晏慙怍而還孟洛之民數日驚擾唐主命諸道兵馬元帥齊王景達將兵拒周以陳覺爲監軍使前武安節度使邊鎬為應援都軍使中書舎人韓熙載上書曰信莫信於親王重莫重於元帥安用監軍使為唐主不從遣鴻臚卿潘承祐詣泉建召募驍勇承祐薦前永安節度使許文稹靜江指揮使陳德誠建州人鄭彦華林仁肇唐主以文稹爲西面行營應援使彦華仁肈皆為將仁肈仁翰之弟也夏四月甲子以侍衛親軍都指揮使歸徳節度使李重進為廬夀等州招討使以武寜節度使武行德為濠州城下都部署唐右衛將軍陸孟俊自常州將兵萬餘人􅃐泰州周兵遁去孟俊復取之遣陳德誠戍泰州孟俊進攻掦州屯于蜀岡韓令坤弃掦州走帝遣張永德將兵救之令坤復入掦州帝又遣太祖皇帝將兵屯六合太祖皇帝令曰掦州兵有過六合者折其足令坤始有固守之志帝自至夀春以來命諸軍晝夜攻城乆不克㑹大雨營中水深數尺攻具及士卒失亡頗多糧運不繼李德明失期不至乃議旋師或勸帝東幸濠州聲言夀州已破從之己巳帝自夀春循淮而東乙亥至濠州韓令坤敗唐兵於城東擒陸孟俊初孟俊之廢馬希蕚立希崇也滅故舒州刺史楊昭惲之族而取其財楊氏有女美獻於希崇令坤入掦州希崇以楊氏遺令坤令坤嬖之既獲孟俊將械送帝所楊氏在簾下忽撫膺慟哭令坤驚問之對曰孟俊昔在潭州殺妾家二百口今見之請復其􅁈令坤乃殺之唐齊王景達將兵二萬自􅀲歩濟江距六合二十餘里設柵不進諸將欲擊之太祖皇帝曰彼設柵自固懼我也今吾衆不滿二千若往擊之則彼見吾衆寡矣不如俟其來而擊之破之必矣居數日唐出兵􅃐六合太祖皇帝奮擊大破之殺獲近五千人餘衆尚萬餘走度江爭舟溺死者甚衆於是唐之精卒盡矣是戰也士卒有不致力者太祖皇帝陽為督戰以劔斫其皮笠明日徧閱其笠有劒跡者數十人皆斬之由是部兵莫敢不盡死先是唐主聞掦州失守命四旁發兵取之己卯韓令坤奏敗楚州兵萬餘人於灣頭堰獲漣州刺史秦進崇張永德奏敗泗州兵萬餘人於曲溪堰丙戍以宣徽南院使向訓為淮南節度使兼􅆓江招討使渦口奏新作浮梁成丁亥帝自濠州如渦口帝銳於進取欲自至掦州范質等以兵疲食少泣諫而止帝甞怒翰林學士竇儀欲殺之范質入救之帝望見知其意即起避之質趨前伏地叩頭諫曰儀罪不至死臣為宰相致陛下枉殺近臣罪皆在臣繼之以泣帝意解乃釋之北漢葬神武帝於交城北山廟號丗祖五月壬辰朔以渦口為鎭淮軍丙申唐永安節度使陳誨敗福州兵於南臺江俘斬千餘級唐主更命永安曰忠義軍誨德誠之父也戊戍帝留侍衛親軍都指揮使李重進等圍夀州自渦口北歸乙卯至大梁六月壬申赦淮南諸州繫囚除李氏非理賦役事有不便於民者委長吏以聞侍衛歩軍都指揮使彰信節度使李繼勲營於夀州城南唐劉仁贍伺繼勲無備出兵擊之殺士卒數百人焚其攻具唐駕部員外郎朱元因奏事論用兵方略唐主以為能命將兵復江北諸州秋七月辛卯朔以周行逢為武平節度使制置武安靜江等軍事行逢既兼緫湖湘乃矯前人之弊留心民事悉除馬氏横賦貪吏猾民為民害者皆去之擇亷平吏為刺史縣令朗州民夷雜居劉言王逵舊將卒多驕横行逢壹以法治之無所寛假衆怨懟且懼有大將與其黨十餘人謀作亂行逢知之大㑹諸將於座中擒之數曰吾惡衣糲食充實府庫正為汝曹何負而反今日之㑹與汝訣也立撾殺之座上股栗行逢曰諸君無罪皆宜自安樂飲而罷行逢多計數善發隱伏將卒有謀亂及叛亡者行逢必先覺擒殺之所部凛然然性猜忍常散遣人密詗諸州事其之邵州者無事可復命但言刺史劉光委多宴飲行逢曰光委數聚飲欲謀我邪即召還殺之親衛指揮使衡州刺史張文表恐獲罪求歸治所行逢許之文表歳時饋獻甚厚及謹事左右由是得免行逢妻鄖國夫人鄧氏陋而剛決善治生甞諌行逢用法太嚴人無親附者行逢怒曰汝婦人何知鄧氏不悅因請之村墅視田園遂不復歸府舎行逢屢遣人迎之不至一旦自帥僮僕來輸稅行逢就見之曰吾為節度使夫人何自苦如此鄧氏曰稅官物也公為節度使不先輸稅何以率下且獨不記為里正代人輸稅以免楚撻時邪行逢欲與之歸不可曰公誅殺太過常恐一旦有變村墅易為逃匿耳行逢慙怒其僚屬曰夫人言直公宜納之行逢壻唐德求􅀘吏行逢曰汝才不堪為吏吾今私汝則可矣汝居官無狀吾不敢以法貸汝則親戚之恩絶矣與之耕牛農具而遣之行逢少時常坐事黥􅀠辰州銅阬或說行逢公靣有文恐為朝廷使者所嗤請以藥滅之行逢曰吾聞漢有黥布不害為英雄吾何恥焉自劉言王逵以來屢舉兵將吏積功及所羈縻蠻夷檢校官至三公者以千數前天策府學士徐仲雅自馬希廣之廢杜門不仕行逢慕之署節度判官仲雅曰行逢昔趨事我柰何為之幕吏辭疾不至行逢迫脅固召之面授文牒終辭不取行逢怒放之邵州既而召還㑹行逢生日諸道各遣使致賀行逢有矜色謂仲雅曰自吾兼鎭三府四鄰亦畏我乎仲雅曰侍中境内彌天太保徧地司空四隣那得不畏行逢復放之邵州竟不能屈有僧仁及為行逢所信任軍府事皆預之亦加檢校司空娶數妻出入導從如王公辛亥宣懿皇后符氏殂唐將朱元取舒州刺史郭令圖弃城走李平取蘄州唐主以元為舒州團練使平為蘄州刺史元又取和州初唐人以茶鹽强民而徴其粟帛謂之博徴又興營田於淮南民甚苦之及周師至爭奉牛酒迎勞而將帥不之恤専事俘掠視民如土芥民皆失望相聚山澤立堡壁自固操農器為兵積紙為甲時人謂之白甲軍周兵討之屢為所敗先所得唐諸州多復為唐有唐之援兵營於紫金山與夀州城中烽火相應淮南節度使向訓奏請以廣陵之兵併力攻夀春俟克城更圖進取詔許之訓封府庫以授揚州主者命揚州牙將分部按行城中秋毫不犯揚州民感悅軍還或負糗糒以送之滁州守將亦弃城去皆引兵趣夀春唐諸將請據險以邀周師宋齊丘曰如此則怨益深不如緃之以德於敵則兵易解也乃命諸將各自守毋得擅出擊周兵由是夀春之圍益急齊王景逹軍于濠州遥為夀州聲援軍政皆出於陳覺景逹署紙尾而已擁兵五萬無決戰意將吏畏覺無敢言者八月戊辰}
