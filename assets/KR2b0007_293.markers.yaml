  - {type: variant, offset: 67, length: 5, content: 學天台音註, SBCK: 數日周兵至城中餘癃病十餘人而已癸酉守􅄾以聞帝聞泰州無備遣兵襲之丁丑抜泰州南漢中書侍郎同平章事盧膺卒南漢主聞唐屢敗憂形於色遣使入貢于周為湖南所閉乃治戰艦修武備既而縱酒酣飲曰吾身得免幸矣何暇慮後丗哉唐使者陳處堯在契丹白契丹主請遊太原北漢主厚禮之留數日北還竟卒於契丹資治通鑑卷第二百九十三}
  - {type: page-break, offset: 67, content: '', id: KR2b0007_SBCK_293-20b}
  - {type: variant, offset: 67, length: 5, content: 學天台音註, WYG: 數日周兵至城中餘癃病十餘人而已癃良中翻疲病也癸酉守琦以聞帝聞泰州無備遣兵襲之丁丑抜泰州南漢中書侍郎同平章事盧膺卒南漢主聞唐屢敗憂形於色遣使入貢于周為湖南所閉閉塞也塞其道不得通也乃治戰艦修武備既而縱酒酣飲曰吾身得免幸矣何暇慮後世哉此所謂坐而待亡者也又古語云民主偷必死南漢主將死之徴也治直之翻艦户黯翻唐使者陳處堯在契丹白契丹主請南遊太原北漢主厚禮之留數日北還竟卒於契丹去年唐主遣陳處堯如契丹乞師資治通鑑卷二百九十三}
