  - {type: page-break, offset: 23, content: '', id: KR2b0007_SBCK_293-13a}
  - {type: variant, offset: 23, length: 0, content: '', WYG: 衛融為中書侍郎同平章事内客省使叚恒為樞密使恒户登翻宰相屢請立皇子為王上曰諸子皆㓜上諸子宗訓是為恭帝次熙讓熙謹熙誨且功臣之子皆未加恩而獨先朕子能自安乎周兵圍夀春連年未下前年十一月周兵始攻夀州城中食盡齊王景達自濠州遣應援使永安節度使許文稹都軍使邊鎬北面招討使朱元將兵數萬泝淮救之軍於紫金山列十餘寨如連珠與城中烽火晨夕相應又築甬道抵夀春甬余拱翻欲運糧以饋之綿亘數十里將及夀春李重進邀擊大破之死者五千人奪其二寨丁未重進以聞戊申詔以來月幸淮上劉仁贍請以邊鎬守城自帥衆决戰帥讀曰率齊王景達不許仁贍憤邑成疾其㓜子崇諫夜泛舟度淮北為小校所執校户教翻仁贍命腰斬之左右莫敢救監軍使周廷構哭於中門以救之仁贍不許廷構復使求救於夫人復扶又翻使䟽吏翻夫人曰妾於崇諫非不愛也然軍法不可私名節不可虧若貸之則劉氏為不忠之門妾與公何面目見將士乎趣命斬之然後成喪趣讀曰促將士皆感泣議者以唐援兵尚彊多請罷兵帝疑之李榖寢疾在第二月丙寅帝使范質王溥就與之謀榖上疏以為夀春危困破在旦夕若鑾駕親征則將士爭奮援兵震恐城中知亡必可下矣上悦庚午詔有司更造祭器祭玉等命國子博士聶崇義討論制度為之圖祭器樽彞簠簋籩豆之屬也祭玉蒼璧禮天黄琮禮地青圭禮東方赤璋禮南方白琥禮西方𤣥璜禮北方也時禮官博士凖詔議祭器祭玉制度國子祭酒尹拙引崔靈恩三禮義宗云蒼璧所以禮天其長十有二寸葢法天之十二時又引江都集白虎通諸書所説云璧皆外圓内方又云黄琮所以禮地其長十寸以法地之數其琮外方内圓八角而有好國子博士聶崇義以為璧内外皆圓其徑九寸按阮氏鄭𤣥圖皆云九寸周禮玉人職又有九寸之璧及引爾雅云肉倍好謂之璧好倍肉謂之瑗肉好若一謂之環郭璞注云好孔也肉邊也而不載尺寸之數崇義又引冬官玉人云璧好三寸爾雅云肉倍好謂之璧葢兩邊肉各三寸通好共九寸則其璧九寸明矣崇義又云黄琮八方以象地每角各剡出一寸六分共長八寸厚一寸按周禮圖及阮氏圖並無好又引冬官玉人云琮八角而無好崇義又云琮璜圭璧並是禮天地之器而爾雅唯言璧環瑗三者有好其餘琮璜諸器並不言之則黄琮八角而無好明矣時}
