  - {type: variant, offset: 34, length: 0, content: '', WYG: 讓復出謝罪戊申帝大陳甲兵受降於夀春城北廷構等舁仁贍出城舁音余又羊茹翻仁贍臥不能起帝慰勞賜賚勞力到翻賚來代翻復令入城養疾復扶又翻諸考異曰實録時仁贍臥疾已亟遂翻然納欵而城中軍萬計皆屏息以聽其命又曰仁贍輕財重士法令嚴肅故能以一城之衆連年拒守逮其來降而其下無敢竊議者斯亦一時之名將也歐陽史三月仁贍病甚已不知人其副使孫羽詐為仁贍書以城降世宗命舁仁贍至帳前嗟嘆久之賜以玉帶御馬復使入城養疾是日制曰劉仁贍盡忠所事抗節無虧前代名臣幾人可比予之南伐得爾為多乃拜仁贍檢校太尉兼中書令天平軍節度使仁贍不能受命而卒世宗追封彭城郡王以其子崇讚為懷州刺史李景聞仁贍卒亦贈太師又曰仁贍既殺其子以自明矣豈有垂死而變節者乎今周世宗實録載仁贍降書葢其副使孫羽等所為也當世宗時王環為蜀守秦州攻之久不下其後力屈而降世宗頗嗟其忠然止以為大將軍視世宗待二人之薄厚而考其制書乃知仁贍非降者也今從之庚戌徙夀州治下蔡夀州宋升為夀春府至今治下蔡縣而夀春故縣自為縣在淮水之南西北距下蔡二十五里髙宗南渡復於夀州舊治夀春縣建安豐軍以為控扼之地葢地險所在通古今不能易也宋白曰下蔡古之蔡國吴之州來左傳蔡成公遷于州來謂之下蔡是也漢為下蔡縣梁於硤石山築城以拒魏即今縣城也赦州境死罪以下州民受唐文書聚山林者並召令復業勿問罪有嘗為其殺傷者毋得讎訟曏日政令有不便於民者令本州條奏辛亥以劉仁贍為天平節度使兼中書令制辭略曰盡忠所事抗節無虧前代名臣幾人堪比朕之伐叛得爾為多是日卒追賜爵彭城郡王唐主聞之亦贈太師帝復以清淮軍為忠正軍楊氏以夀州置忠正軍後改清淮軍今復為忠正軍以旌劉仁贍之節按薛史唐明宗天成二年詔昇夀州為忠正軍長興二年閏五月己丑升廬州為昭順軍八月癸酉升州為昭信軍宋白續通典曰夀州後唐天成元年升為順化軍節度今並存之以俟博考以旌仁贍之節以右羽林統軍楊信為忠正節度使同平章事前許州司馬韓倫侍衛馬軍都指揮使令坤之父也令坤領鎮安節度使倫居于陳州陳州鎮安軍治所干預政事貪汚不法為公私患為人所訟令坤屢為之泣請屢為于偽翻癸丑詔免倫死流沙門島登州蓬萊縣有沙門島置沙門寨倫後得赦還居洛陽與光禄卿致仕柴守禮及當時將相王溥王晏王彦超之父游處恃勢恣横洛陽人畏之謂之十阿父處昌吕翻下處之同横户孟翻阿烏葛翻帝既為太祖嗣人無敢言守禮子者但以元舅處之優其俸給未嘗至大梁嘗以小忿殺人有司不敢詰詰去吉翻帝知而不問詔開夀州倉賑饑民丙辰帝北還還從宣翻夏四月己巳至大梁詔修永}
