  - {type: variant, offset: 51, length: 4, content: 戶食實封, WYG: 餘艘士卒殺溺之餘得七千餘人唐之戰船在淮上者於是盡矣郭廷謂使者自金陵還還從宣翻又如字知唐不能救命録事參軍鄱陽李延鄒草降表延鄒責以忠義廷謂以兵臨之延鄒擲筆曰大丈夫終不負國為叛臣作降表為于偽翻史言李延鄒忠壯廷謂斬之舉濠州降得兵萬人糧數萬斛唐主賞李延鄒之子以官壬戌帝濟淮至楚州營于城西北乙丑唐雄武軍使知漣水縣事崔萬迪降丙寅以郭廷謂為亳州防禦使戊辰帝攻楚州克其月城庚午郭廷謂見於行宫見賢遍翻帝曰朕南征以來江南諸將敗亡相繼獨卿能斷渦口浮梁破定逺寨事見上五月所以報國足矣濠州小城使李璟自守能守之乎璟居永翻使將濠州兵攻天長帝遣鐡騎左廂都指揮使武守琦將騎數百趨揚州至髙郵九域志髙郵東南至揚州}
