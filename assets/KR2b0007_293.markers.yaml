  - {type: variant, offset: 16, length: 0, content: '', krp: 王朴司天少監王處訥撰顯徳欽天厯上之初王處訥私造明𤣥厯于家因唐世所行崇𤣥厯而明之也帝以王朴通於厯數乃詔朴撰定以步日步月步星步發歛為四篇合為厯經併著顯徳三年七政細行厯一卷以為欽天厯詔自來嵗行之殿前都指揮使義成節度使張永徳屯下蔡唐將林仁肇以水陸軍援夀春永徳與之戰仁肇以船實薪芻因風縱火欲焚下蔡浮梁俄而風回唐兵敗退永徳為鐡綆千餘尺綆若杏翻距浮梁十餘步横絶淮流繫以巨木由是唐兵不能近近其靳翻九月丙午以端明殿學士左散騎常侍權知開封府事王朴為户部侍郎充樞密副使冬十月癸酉李重進奏唐人冦盛唐鐡騎都指揮使王彦昇等擊破之斬首三千餘級彦昇蜀人也丙子上謂侍臣近朝徴歛榖帛多不俟收穫紡績之畢侍臣之下有曰字文意乃足近朝猶言近代也朝直遥翻下同乃詔三司自今夏税以六月秋税以十月起徴五代會要曰二税起徴皆以月一日民間便之山南東道節度使守太尉}
  - {type: variant, offset: 17, length: 0, content: '', SBCK: 中書令安審􅄾鎭襄州十餘年至是入朝除守太師遣還鎭既行上問宰相卿曹送之乎對曰送至城􅀯審􅄾深感聖恩上曰近朝多不以誠信待諸矦諸矦雖有欲効忠節者其道無由王者但能母失其信何患諸矦不歸心哉壬午張永德奏敗唐兵於下蔡是時唐復以水軍攻永德永德夜令善游者沒其船下縻以鐵鎻縱兵擊之船不得進退溺死者甚衆永德解金帶以賞善游者甲申以太祖皇帝為定國節度使兼殿前都指揮使太祖皇帝表渭州軍事判官趙普為節度推官張永德與李重進不相悅永德密表重進有二心帝不之信時二將各擁重兵衆心憂恐重進一日單􅀐詣永德營從容宴飲謂永德曰吾與公幸以肺腑俱為將帥奚相疑若此之深邪永德意乃解衆心亦安唐主聞之以蠟書遺重進誘以厚利其書皆謗毁及反間之語重進奏之初唐使者孫晟鍾謨從帝至大梁帝待之甚厚每朝㑹班於中書省官之後時召見飲以醇酒問以唐事晟但言唐主畏陛下神武事陛下無二心及得唐蠟書帝大怒召晟責以所對不實晟正色抗辭請死而已問以唐虚實黙不對十一月乙巳帝命都承旨曹翰送晟於右軍廵院更以帝意問之翰與之飲酒數行從容問之晟終不言翰乃謂曰有敇賜相公死晟神色怡然索靴笏整衣冠􅀯向拜曰臣謹以死報國乃就刑并從者百餘人皆殺之貶鍾謨耀州司馬既而帝憐晟忠節悔殺之召謨拜衛尉少卿帝召華山隱士眞源陳摶問以飛升黄白之術對曰陛下為天子當以治天下為務安用此為戊申遣還山詔州縣長吏常存問之十二月壬申以張永德為殿前都㸃檢分命中使發陳蔡宋亳潁兖曹單等州丁夫數萬城下蔡是嵗唐主詔淮􅀯營田害民尤甚者罷之遣兵部郎中陳處堯持重幣浮海如契丹乞兵契丹不能為之出兵而留處堯不遣處堯剛直有口辯乆之忿懟數面責契丹主契丹主亦不之罪也蜀陵榮州獠叛弓箭庫使趙季文討平之呉越王􅀪俶括境内民兵勞擾頗多判明州錢􅀪億手䟽切諌罷之四年春正月己丑朔北漢大赦攺元天㑹以}
