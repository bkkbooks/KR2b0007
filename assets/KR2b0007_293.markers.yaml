  - {type: variant, offset: 11, length: 0, content: '', WYG: 宋司馬光撰胡三省音註後周紀四起柔兆執徐三月盡彊圉大荒落凡一年有竒世宗睿文孝武皇帝中顯徳三年三月甲午朔上行視水寨至淝橋行下孟翻淝橋於淝水上為橋也自取一石馬上持之至寨以供礮從官過橋者人齎一石礮與砲同音普豹翻從才用翻齎牋西翻太祖皇帝乗皮船入夀春壕中城上發連弩射之皮船縫牛皮為之連弩即今之划車弩也射而亦翻矢大如屋椽牙將館陶張瓊遽以身蔽之矢中瓊髀椽重椽翻中竹仲翻髀部禮翻死而復蘇鏃著骨不可出著直畧翻瓊飲酒一大巵令人破骨出之流血數升神色自若史言張瓊之勇後太祖登極遂以瓊總侍衛親兵唐主復以右僕射孫晟為司空復扶又翻遣與禮部尚書王崇質奉表入見稱自天祐以來見賢遍翻天祐唐昭宗年號海内分崩或跨據一方或遷革異代跨據一方謂四方割劇之國遷革異代謂中國數易主也臣紹襲先業奄有江表顧以瞻烏未定附鳳何從詩曰瞻烏爰止于誰之屋漢耿純曰攀龍鱗附鳳翼此言未見真主則無從而歸附也今天命有歸聲教逺被被皮義翻願比兩浙湖南仰奉正朔謹守土疆兩浙自錢鏐以來湖南自馬殷以來皆奕世奉事中國乞收薄伐之威薄迫也有鐘鼓曰伐詩云薄伐西戎又云薄伐玁狁赦其後服之罪首於下國俾作外臣則柔逺之徳云誰不服又獻金千兩銀十萬兩羅綺二千匹晟謂馮延己曰此行當在左相唐以馮延己為左僕射位在孫晟上故晟云然晟若辭之則負先帝既行知不免中夜歎息謂崇質曰君家百口宜自為謀吾思之熟矣終不負永陵一培土餘無所知永陵者唐主父昇墓也培蒲枚翻唐陸龜䝉築城詞城上一培土手中千萬杵則培土以益土為義一培土猶言益一畚土也又薄口翻説文曰培塿小冡也一培土猶言一冢土也歐史作一抔土南漢甘泉宫使林延遇隂險多計數南漢主倚信之誅滅諸弟皆延遇之謀也南漢主誅諸弟事並見前乙未卒國人相賀延遇病甚薦内給事龔澄樞自代南漢主即日擢澄樞知承宣院及内侍省澄樞番禺人也龔澄樞繼林延遇用事南漢遂亡矣畨音潘禺魚容翻又音愚光舒黄招安廵檢使行光州刺史何超以安隨申蔡四州兵數萬攻光州九域志光州西南至安州六百里隨州東至安州二百四十里東北至申州二百五十里申州東至光州二百五十五里光州北至蔡州二百五十里葢以鄰郡之兵環而攻之丙申超奏唐光州刺史張紹棄城走都監張承翰以城降丁酉行舒州刺史郭令圖拔舒州唐蘄州將李福殺其知州王承雋舉州來降遣六宅使齊藏珍攻黄州九域志舒州西至蘄州二百九十八里蘄州西至黄州二百一十里三州皆瀕江彰武留後李彦頵性貪虐頵於倫翻部民與𦍑胡作亂攻之上召彦頵還朝自延州召還還從宣翻又如字朝直遥翻秦鳳之平也事見上卷上年上赦所俘蜀兵以𨽻軍籍五代㑹要顯徳二年十二月以新收秦鳳州所擒川軍署為懷恩軍所謂𨽻軍籍也從征淮南復亡降于唐復扶又反癸卯唐主表獻百五十人上悉命斬之舒州人逐郭令圖鐡騎都指揮使洛陽王審琦選輕騎夜襲舒州復取之令圖乃得歸得復歸舒州馬希崇及王延政之子繼沂皆在揚州招撫存之楚閩世事中國其後為南唐所俘囚於揚州周得揚州故撫存之丙午孫晟等至上所至行在所也庚戌上遣中使以孫晟詣夀春城下且招諭之仁贍見晟戎服拜於城上以邊帥見宰相禮拜晟晟謂仁贍曰君受國厚恩不可開門納㓂上聞之甚怒晟曰臣為宰相豈可教節度使外叛邪上乃釋之孫晟之辭直周世宗亦何以罪之唐主使李徳明孫晟言於上請去帝號去𦍑吕翻割夀濠泗楚光海六州之地六州之地皆瀕淮周既得之則唐失長淮之險藉使周從唐之請而罷兵江北之地它日亦不能守矣仍歳輸金帛百萬以求罷兵輸春遇翻上以淮南之地已半為周有諸將㨗奏日至欲盡得江北之地不許徳明見周兵日進奏稱唐主不知陛下兵力如此之盛願寛臣五日之誅得歸白唐主盡獻江北之地上乃許之晟因奏遣王崇質與徳明俱歸王崇質副孫晟來使上遣供奉官安𢎞道送徳明等歸金陵賜唐主書其略曰但存帝號何爽嵗寒爽差也言嵗寒知松柏之後彫此約不差也許唐主自帝江南儻堅事大之心終不廹人于險又曰俟諸郡之悉來謂江北諸郡也即大軍之立罷言盡於此更不煩云煩勞也言更不勞云云也茍曰未然請從茲絶又賜其將相書使熟議而來唐主復上表謝復扶又翻上時掌翻李徳明盛稱上威徳及甲兵之彊勸唐主割江北之地唐主不悦宋齊丘以割地為無益徳明輕佻言多過實國人亦不之信佻士彫翻國人謂南唐通國之人史言誕妄之士雅不足以孚乎人不惟喪身且誤國事樞密使陳覺副使李徴古素惡徳明與孫晟惡烏路翻使王崇質異其言因譖徳明於唐主曰徳明賣國求利唐主大怒斬徳明於市為鍾謨為李徳明修怨張本呉程攻常州破其外郭執唐常州團練使趙仁澤送于錢唐仁澤見呉越王𢎞俶不拜責以負約唐興呉越本通好而呉越以周之命而攻唐故責其負約𢎞俶怒决其口至耳元徳昭憐其忠為傅良藥得不死唐非無忠臣也不能用耳為于偽翻唐主以呉越兵在常州恐其侵逼潤州九域志常州西北至潤州一百七十一里以宣潤大都督燕王𢎞冀年少少詩照翻恐其不習兵徴還金陵還從宣翻部將趙鐸言於𢎞冀曰大王元帥衆心所恃逆自退歸所部必亂𢎞冀然之辭不就徴部分諸將為戰守之備分扶問翻龍武都虞候柴克宏再用之子也柴再用事楊氏為將屢立戰功又及事徐温父子沈黙好施沈持林翻好呼到翻施式豉翻不事家産雖典宿衛日與賔客博奕飲酒未嘗言兵時人以為非將帥才將即亮翻帥所類翻至是有言克宏久不遷官者唐主以為撫州刺史克宏請效死行陳其母亦表稱克宏有父風可為將茍不勝任分甘孥戮趙括之母不肯保任其子柴克宏之母自稱薦其子皆知之審也孥子也言與其子甘同戮也行户剛翻陳與陣同勝音升分扶問翻孥音奴唐主乃以克宏為右武衛將軍使將兵㑹袁州刺史陸孟俊救常州時唐精兵悉在江北克宏所將數千人皆羸老羸倫為翻樞密使李徴古復以鎧仗之朽蠧者給之克宏訴於徴古徴古慢罵之衆皆憤恚恚於避翻克宏怡然至潤州徴古遣使召還還從宣翻又如字以神衛統軍朱匡業代之燕王𢎞冀謂克宏謂者告語之也君但前戰吾當論奏乃表克宏才略可以成功常州危在旦莫莫讀曰暮不宜中易主將克宏引兵徑趣常州趣七喻翻徴古復遣使召之復扶又翻克宏曰吾計日破賊汝來召吾必奸人也命斬之使者曰受李樞密命而來克宏曰李樞密來吾亦斬之柴克宏前日之怡然乃養成今日之勇决也初鮑修讓羅晟在福州與呉程有隙漢天福十二年呉越使鮑修讓戍福州是年以呉程鎮福州至是程抑挫之二人皆怨先是唐主遣中書舎人喬匡舜使於呉越先悉薦翻壬子柴克宏至常州䝉其船以幕匿甲士於其中聲言迎匡舜呉越邏者以告邏即佐翻程曰兵交使在其間用左傳語不可妄以為疑唐兵登岸徑薄呉越營羅晟不力戰縱之使趣程帳趣七喻翻程僅以身免克宏大破呉越兵斬首萬級朱匡業至行營克宏事之甚謹呉程至錢唐呉越王𢎞俶悉奪其官甲寅蜀主以捧聖控鶴都指揮使李廷珪為左右衛聖諸軍馬步都指揮使仍分衛聖匡聖步騎為左右十軍以武定節度使吕彦琦等為使為軍使也廷珪總之如趙廷隱之任蜀自李仁罕之誅趙廷隱専總宿衛諸軍後為安思謙所譖罷事並見前初柴克宏為宣州廵檢使始至城塹不修器械皆闕吏云自田頵王茂章李遇相繼叛唐天復三年田頵以宣州叛楊行密天祐二年王茂章叛梁乾元二年李遇叛事並見前紀頵於倫翻後人無敢治之者治直之翻克宏曰時移事異安有此理悉繕完之由是路彦銖攻之不克史言宣州獲全亦柴克宏之力聞呉程敗乙卯引歸唐主以克宏為奉化節度使克宏復請將兵救夀州未至而卒人有身死而名全者柴克宏是也克宏敵呉越可以勝使遇周師未必能爾復扶又翻河陽節度使白重贊重直龍翻以天子南征慮北漢乗虚入冦繕完守備且請兵於西京西京留守王晏初不之與又慮事出非常乃自將兵赴之重贊以晏不奉詔而來拒不納遣人謂之曰令公昔在陜服已立大功謂天福十二年晏舉陜城降漢髙祖也晏時兼中書令故稱為令公陜失冉翻河陽小城不煩枉駕晏慙怍而還怍疾各翻還從宣翻又如字孟洛之民數日驚擾以王晏出兵而白重贊拒之恐兵交而罹其禍唐主命諸道兵馬元帥齊王景達將兵拒周以陳覺為監軍使前武安節度使邊鎬為應援都軍使邊鎬以失潭州奪節今叙用之中書舎人韓熙載上書曰信莫信於親王重莫重於元帥安用監軍使為句斷唐主不從遣鴻臚卿潘承祐詣泉建召募驍勇承祐薦前永安節度使許文稹稹止忍翻靜江指揮使陳徳誠建州人鄭彦華林仁肇唐主以文稹為西面行營應援使彦華仁肇皆為將將即亮翻仁肇仁翰之弟也林仁翰見二百八十四卷晉出帝開運元年唐主之保大二年也夏四月甲子以侍衛親軍都指揮使歸徳節度使李重進為廬夀等州招討使以武寜節度使武行徳為濠州城下都部署唐右衛將軍陸孟俊自常州將兵萬餘人趣泰州九域志自常州北至泰州一百九十七里周兵遁去孟俊復取之復取泰州遣陳徳誠戍泰州孟俊進攻掦州屯于蜀岡韓令坤棄掦州走蜀岡在掦州城西掦州城在蜀岡東南城之東南北皆平地溝澮交貫惟蜀岡諸山西接廬滁凡北兵南冦掦州率循山而來據髙為壘以臨之今陸孟俊據蜀岡以斷周兵援路故韓令坤懼而走帝遣張永徳將兵救之令坤復入掦州援兵至故復入掦州帝又遣太祖皇帝將兵屯六合六合縣屬掦州在州西北一百三十里劉昫曰六合漢臨淮郡之堂邑縣晉置秦郡北齊置秦州隋置方州後廢唐武徳初置六合縣太祖皇帝令曰掦州兵有過六合者折其足自掦州西北歸須過六合故云然折而設翻令坤始有固守之志帝自至夀春以來命諸軍晝夜攻城久不克㑹大雨營中水深數尺深式浸翻攻具及士卒失亡頗多時周兵以方舟載礟自淝河中流擊夀春城又束巨竹數十萬竿上施板屋號曰竹龍載甲士以攻之㑹淝水暴漲礟舟竹龍皆漂向南岸為唐兵所焚糧運不繼李徳明失期不至李徳明歸至金陵被誅乃議旋師或勸帝東幸濠州聲言夀州已破從之己巳帝自夀春循淮而東乙亥至濠州九域志夀州東至濠州三百八十里韓令坤販唐兵於城東此掦州城東也敗補邁翻擒陸孟俊初孟俊之廢馬希蕚立希崇也事見二百九十卷太祖廣順元年滅故舒州刺史楊昭惲之族而取其財惲於粉翻薛史曰楊昭惲長沙人父謚事馬殷為節度行軍司馬謚仲女為衡陽王夫人希聲襲位昭惲遷衡州刺史自以地連戚里積財貨建大第二子為牙内都將少長豪富任氣凌下士大夫惡之長沙兵亂陸孟俊怒曰楊氏怙寵滅義為國人所患久矣於是族滅楊氏舒當作衡楊氏有女美獻於希崇令坤入掦州希崇以楊氏遺令坤令坤嬖之遺唯季翻嬖卑義翻又必計翻愛也幸也既獲孟俊將械送帝所楊氏在簾下忽撫膺慟哭令坤驚問之對曰孟俊昔在潭州殺妾家二百口今日見之請復其寃令坤乃殺之史言人不可妄殺雖女子亦能復讐唐齊王景達將兵二萬自𤓰歩濟江距六合二十餘里設柵不進諸將欲擊之太祖皇帝曰彼設柵自固懼我也今吾衆不滿二千若往擊之則彼見吾衆寡矣不如俟其來而擊之破之必矣居數日唐出兵趣六合趣七喻翻太祖皇帝奮擊大破之殺獲近五千人近其靳翻餘衆尚萬餘爭舟走度江溺死者甚衆於是唐之精卒盡矣是戰也士卒有不致力者太祖皇帝陽為督戰以劔斫其皮笠明日徧閲其皮笠有劒跡者數十人皆斬之由是部兵莫敢不盡死先是唐主聞掦州失守命四旁發兵取之先悉薦翻己卯韓令坤奏敗掦州兵萬餘人於灣頭堰九域志掦州江都縣有灣頭鎮在今掦州城北十五里敗補邁翻獲漣州刺史秦進崇唐葢置漣州於漣水縣九域志漣水西南至楚州六十里張永徳奏敗泗州萬餘人於曲溪堰曲溪在盱眙縣西南十里按招信圖經曲溪堰亦謂之新河堰丙戌以宣徽南院使向訓為淮南節度使兼㳂江招討使渦口奏新作浮梁成丁亥帝自濠州如渦口渦口渦水入淮之口郡縣志渦口城東南至濠州九十里渦音戈帝鋭於進取欲自至掦州范質等以兵疲食少泣諫而止又嘗怒翰林學士竇儀欲殺之范質入救之帝望見識其意即起避之質趨前伏地叩頭諫曰儀罪不至死臣為宰相致陛下枉殺近臣罪皆在臣繼之以泣帝意解乃釋之北漢𦵏神武帝於交城北山隋分晉陽縣置交城縣取縣西北古交城為名初治交山唐天授元年移治却波村九域志在陽曲縣西南一百里宋白曰大通監本古交城之地管東西二冶烹鐡務東冶在綿上縣西冶在交城縣北山廟號世祖五月丙辰朔以渦口為鎮淮軍丙申唐永安節度使陳誨敗福州兵於南臺江今福州南九里有釣龍臺山臨江南臺江當即是此地薛史地理志福州福唐縣晉天福初改為南臺縣葢以江名縣也後復舊俘斬千餘級唐主更命永安曰忠義軍晉開運二年唐克建州置永安軍更工衡翻誨徳誠之父也戊戌帝留侍衛親軍都指揮使李重進等圍夀州自渦口北歸乙卯至大梁自渦口至大梁七百四十里六月壬申赦淮南諸州繫囚除李氏非理賦役事有不便於民者委長吏以聞長知兩翻侍衛步軍都指揮使彰信節度使李繼勲營於夀州城南唐劉仁贍伺繼勲無備伺相吏翻出兵擊之殺士卒數百人焚其攻具唐駕部員外郎朱元因奏事論用兵方略唐主以為能命將兵復江北諸州將即亮翻下同秋七月辛卯朔以周行逢為武平節度使制置武安靜江等軍事行逢既兼總湖湘乃矯前人之弊留心民事悉除馬氏横賦横戸孟翻下驕横同馬氏自希範以來始加賦於境内貪吏猾民為民害者皆去之去羌吕翻擇亷平吏為刺史縣令朗州民夷雜居劉言王逵舊將多驕横行逢壹以法治之無所寛假衆怨懟且懼治直之翻懟直類翻有大將與其黨十餘人謀作亂行逢知之大會諸將於座中擒之數曰吾惡衣糲食充實府庫正為汝曹數所具翻責數也糲盧達翻為于偽翻何負而反今日之會與汝訣也立撾殺之座上股栗行逢曰諸君無罪皆宜自安樂飲而罷撾則𤓰翻樂音洛行逢多計數善發隱伏將卒有謀亂及叛亡者行逢必先覺擒殺之所部凛然然性猜忍常散遣人密詗諸州事詗古永翻又翾正翻其之邵州者無事可復命但言刺史劉光委多宴飲行逢曰光委數聚飲數所角翻欲謀我邪即召還殺之親衛指揮使衡州刺史張文表恐獲罪求歸治所求解兵柄歸衡州也行逢許之文表嵗時饋獻甚厚及謹事左右由是得免其後行逢臨卒謂其子保權曰吾起隴畆為團兵同時十人皆誅張文表獨存是時王逵張倣何敬真朱全琇潘叔嗣皆已死唯蒲公益宇文瓊彭萬和與文表史不言其有它此三人者必又相繼為行逢所殺而文表獨免也行逢死則文表叛矣行逢妻鄖國夫人鄧氏鄖音云路振九國志作嚴氏陋而剛决善治生治直之翻嘗諫行逢用法太嚴人無親附者行逢怒曰汝婦人何知鄧氏不悦因請之村墅視田園遂不復歸府舎之往也墅承與翻復扶又翻府舎朗州府舎也行逢屢遣人迎之不至一旦自帥僮僕來輸税帥讀曰率輸舂遇翻下同行逢就見之曰吾為節度使夫人何自苦如此鄧氏曰税官物也公為節度使不先輸税何以率下且獨不記為里正代人輸税以免楚撻時邪行逢欲與之歸不可不肯歸府舎也曰公誅殺太過常恐一旦有變村墅易為逃匿耳易以豉翻行逢慙怒其僚屬曰夫人言直公宜納之行逢壻唐徳求補吏行逢曰汝才不堪為吏吾今私汝則可矣汝居官無狀吾不敢以法貸汝則親戚之恩絶矣與之耕牛農具而遣之行逢少時嘗坐事黥𨽻辰州銅阬少詩照翻黥具京翻唐文宗之世天下銅阬五十辰州不在其數辰州銅阬葢馬氏所置也或説行逢公面有文恐為朝廷使者所嗤説式芮翻嗤丑之翻請以藥滅之行逢曰吾聞漢有黥布不害為英雄吾何耻焉黥布事見八卷秦二世二年自劉言王逵以來屢舉兵將吏積功及所羈縻蠻夷檢校官至三公者以千數羈縻蠻夷謂溪峒諸蠻夷前天策府學士徐仲雅自馬希廣之廢杜門不出馬希廣廢事見二百八十九卷漢乾祐二年行逢慕之署節度判官仲雅曰行逢昔趨事我奈何為之幕吏辭疾不至行逢迫脅固召之面授文牒終辭不取行逢怒放之邵州既而召還㑹行逢生日諸道各遣使致賀行逢有矜色謂仲雅曰自吾兼鎮三府三府武平武安靜江軍府也四鄰亦畏我乎仲雅曰侍中境内周行逢加侍中故徐仲雅稱之彌天太保徧地司空四鄰那得不畏行逢復放之邵州復扶又翻竟不能屈有僧仁及為行逢所信任軍府事皆預之亦加檢校司空娶數妻出入導從如王公從才用翻辛亥宣懿皇后符氏殂唐將朱元取舒州刺史郭令圖棄城走李平取蘄州唐主以元為舒州團練使平為蘄州刺史元又取和州朱元李平皆李守貞所遣求救於唐者也事見二百八十八卷漢乾祐元年初唐人以茶鹽强民而徴其粟帛謂之博徴强其兩翻博博易也言以茶鹽博易而徴其粟帛又興營田於淮南民甚苦之及周師至爭奉牛酒迎勞勞力到翻而將帥不之恤帥所類翻専事俘掠視民如土芥民皆失望相聚山澤立堡壁自固操農器為兵操七刀翻積紙為甲時人謂之臼甲軍周兵討之屢為所敗敗補邁翻先所得唐諸州多復為唐有唐之援兵營於紫金山紫金山在夀春南或云即八公山與夀春城中烽火相應淮南節度使向訓奏請以廣陵之兵併力攻夀春俟克城更圖進取詔許之訓封府庫以授揚州主者命揚州牙將分部按行城中秋毫不犯分扶問翻行下孟翻揚州民感悦軍還或負糗糒以送之糗去久翻熬米麥為之糒平秘翻乾飯也滁州守將亦棄城去皆引兵趣夀春唐諸將請據險以邀周師宋齊丘曰如此則怨益深乃命諸將各自保守毋得擅出擊周兵由是夀春之圍益急齊王景達軍于濠州遥為夀州聲援軍政皆出於陳覺景達署紙尾而已擁兵五萬無决戰意嗚呼比年襄陽之䧟得非援兵不進之罪將吏畏覺無敢言者八月戊辰}
