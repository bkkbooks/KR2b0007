  - {type: variant, offset: 27, length: 1, content: 提, SBCK: 為政之先莫如敦信信茍著矣則田無不廣田廣則榖多榖多則藏之民猶藏之官也又言陛下􅀯征江淮一}
  - {type: variant, offset: 29, length: 0, content: '', SBCK: 而得八州再駕而平夀春威靈所加前無彊敵今以衆擊寡以治伐亂勢無不克但行之貴速則彼民免俘馘之災此民息轉輸之困矣帝覽而善之儼儀之弟也冬十月戊午設賢良方正直言極諌經學優深可為師法詳閑吏理逹於教化等科癸亥北漢麟州刺史楊重訓舉城降以為麟州防禦使己巳以王朴東京留守聽以便宜從事以三司使張美充大内都㸃檢壬申帝發大梁十一月丙戌至鎭淮軍是夜五鼔濟淮丁亥至濠州城}
