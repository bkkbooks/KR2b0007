body:
  text: 資治通鑑卷第二百四十端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀五十六憲宗昭文章武大聖至神孝皇帝中之下元和十二年元和十二年丁酉八一七元和十二年春正月甲申貶袁滋為撫州刺史李訴至唐州軍中承喪敗之餘喪息浪翻嚴綬慈丘之敗山南東道未分為二帥也既分為二帥而高霞寓敗於鐵城袁滋代之又敗士卒皆憚戰訴知之有出迓者訴謂之曰天子知訴柔懦能忍恥故使來拊循爾曹至於戰攻進取非吾事也衆信而安之訴親行視士卒行下孟翻傷病者存恤之不事威嚴或以軍政不肅為言訴曰吾非不知也袁尚書專以恩惠懷賊賊易之易弋豉翻輕易也聞吾至必增備吾故示之以不肅彼必以吾為懦而懈惰然後可圖也懈古隘翻淮西人自以嘗敗高袁二帥敗補邁翻帥所類翻輕訴名位素微遂不為備為訴乘虛取蔡張本考異曰舊傳曰訴沈勇長算推誠待士故能用其卑弱之勢出賊不意居半歲知人可用乃謀襲蔡表請濟師詔以河中鄜坊騎兵二千人益之鄭澥平蔡録曰正月二十四日甲申公至所部先是士卒經萬勝蕭陂鐵城新興之敗人心皆惴恐不敢言戰公佯曰戰爭非吾所能既而陰召大將計其事是時公以表請徑襲元濟人皆笑其説乃使觀察判官王擬請師闕下詔徵義成河中鄜坊馬步共二千以補其闕據此則是始至便請益兵又二月即擒丁士良降吳秀琳是不待半歲然後知人可用舊傳恐誤然訴密謀襲蔡豈可先泄之而云以表請襲元濟人皆笑其説則是人人知之恐非也今不取元和十二年遣鹽鐵副章甲十一行本副上有轉運二字乙十一行本同使程督財賦於江淮元和十二年回鶻屢請尚公主有司計其費近五百萬緡近其靳翻時中原方用兵故上未之許二月辛卯朔遣回鶻摩尼僧等歸國摩尼來見二百三十七卷元年史照曰元和初回鶻再朝獻始以摩尼至摩尼至京師歲往來西市商賈頗與囊橐為姦至是遣歸國也以緩其期元和十二年李訴謀襲蔡州表請益兵詔以昭義河中鄜坊步騎二千給之丁酉訴遣十將馬少良將十餘騎巡邏十將軍中小校也邏郎佐翻與戰擒之士良元濟驍將常為東邊患言唐鄧之東邊也訴許之既而召詰之士良無懼色訴曰真丈夫也命釋其縛士良乃自言本非淮西士貞元中隸安州與吳氏戰為其所擒自分死矣分扶問翻吳氏釋我而用之我因吳氏而再生故為吳氏父子竭力為于偽翻昨日力屈復為公所擒復扶又翻亦分死矣今公又生之請盡死以報德訴乃給其衣服器械署為捉生將元和十二年己亥淮西行營奏克蔡州古葛伯城漢書陳留寧陵縣孟康注曰古葛伯國今葛鄉是此必韓弘奏捷也元和十二年丁士良言於李訴曰吳秀琳擁三千之衆據文城柵文城柵在蔡州西南一百二十里按續通典柵在吳房縣界官軍不敢近者近其靳翻有陳光洽為之謀主也光洽勇而輕輕牽正翻好自出戰請為公先擒光洽好呼到翻為于偽翻下同則秀琳自降矣降戶江翻戊申士良擒光洽以歸元和十二年鄂嶽觀察使李道古引兵出穆陵關黃州麻城縣西北有穆陵關在穆陵山上甲寅攻申州克其外郭進攻子城城中守將夜出兵擊之道古之衆驚亂死者甚衆道古皋之子也曹成王皋歷江西山南等鎮著功名元和十二年淮西被兵數年被皮義翻竭倉廩以奉戰士民多無食采菱芡魚鱉鳥獸食之亦盡芡巨險翻今謂之雞頭相帥歸官軍者前後五千餘戶帥讀曰率賊亦患其耗糧食不復禁復扶又翻庚申敕置行縣以處之未能得其縣故權置行縣以處來歸之民處昌呂翻使之撫養並置兵以衛之元和十二年三月乙丑李訴自唐州徙屯宜陽柵元和十二年郗士美敗於柏鄉拔營而歸士卒死者千餘人元和十二年戊辰賜程執恭名權元和十二年戊寅王承宗遣兵二萬入東光斷白橋路東光縣屬景州宋白曰東光漢舊縣也故城在縣東二十里齊天保七年移於今縣東南三十里陶氏故城隋開皇三年又移於後魏廢勃海舊城縣西四里有永濟渠渠上有橋當自縣通弓高之路白橋跨永濟渠在德州長河縣斷音短以衆歸滄州渾鎬既敗郗士美又敗程權又退歸王承宗之才非諸帥所能制也元和十二年吳秀琳以文城柵降于李訴戊子訴引兵至文城西五里遣唐州刺史李進誠將甲士八千至城下召秀琳城中矢石如雨衆不得前進誠還報賊偽降未可信也訴曰此待我至耳即前至城下秀琳束兵投身馬足下訴撫其背慰勞之勞力到翻降其衆三千人秀琳將李憲有材勇訴更其名曰忠義而用之更工衡翻悉遷婦女於唐州章甲十一行本州下有入據其城四字乙十一行本同退齋校同張校同云無注本亦無質其家於唐州則文城之士心不敢懷反側於是唐鄧軍氣復振人有欲戰之志賊中降者相繼於道隨其所便而置之聞有父母者給粟帛遣之曰汝曹皆王人勿棄親戚衆皆感泣自此以上李訴事官軍與淮西兵夾殷水而軍諸軍相顧望無敢渡殷水者陳許兵馬使王沛先引兵五千渡殷水據要地為城於是河陽宣武河東魏博等軍相繼皆渡進逼郾城丁亥李光顏敗淮西兵三萬於郾城按宋白續通典郾城在蔡州西平縣北五十里敗補邁翻殺士卒什二三自此以上攻郾城事己丑李訴遣山河十將董少玢等分兵攻諸柵其日少玢下馬鞍山拔路口柵時都畿及唐鄧皆募土人之材勇者為兵以討蔡號為山河子弟置十將以領之玢府巾翻按唐蔡交兵凡境上要地處處置守所謂馬鞍山路口柵固不可盡詳其處而強為之注也四月辛卯山河十將馬少良下嵖岈山嵖鋤加翻岈虛加翻擒淮西將柳子野此以上又李訴事吳元濟以蔡人董昌齡為郾城令質其母楊氏質音致楊氏謂昌齡曰順死賢於逆生順死謂歸順而死逆生謂從逆而生乃孝子也從逆而吾生是戮吾也會官軍圍青陵絶郾城歸路青陵在郾城西南昌齡勸之歸國懷金乃請降於李光顏曰城人之父母妻子皆在蔡州請公來攻城吾舉烽求救救兵至公逆擊之蔡兵必敗然後吾降則父母妻子庶免矣光顏從之乙未昌齡懷金舉城降光顏引兵入據之吳元濟聞郾城不守甚懼時董重質將騾軍守洄曲據新書李光顏傳洄曲即時曲蓋殷水於此回曲因以為名此以上又李光顏事李訴山河十將媯雅田智榮下冶爐城媯居為翻姓也九域志曰蔡州冶爐城韓國鑄劍之地時當在西平界按新書冶爐城在嵖岈山東丙申十將閻士榮下白狗汶港二柵白狗汶港二柵皆在蔡州真陽縣界蕭梁置西淮州於真楊白狗堆後齊廢州為齊興郡尋廢郡為白狗縣隋開皇初改縣曰懷州大業初省入真陽隋志真陽有汶水癸卯媯雅田智榮破西平西平春秋柏國漢為西平縣屬汝南郡唐屬蔡州九域志在州西一百五里丙午遊奕兵馬使王義破楚城楚城在汝陽縣西南蕭梁置西楚州及汝陽郡於此五月辛酉李訴遣柳子野李忠義襲朗山擒其守將梁希果元和十二年六鎮討王承宗者事見上卷十一年回環數千里既無統帥又相去遠期約難一由是歷二年無功千里饋運牛驢死者什四五劉總既得武強引兵出境才五里出境謂出武強之境月給度支錢十五萬緡李逢吉及朝士多言宜併力先取淮西俟淮西平乘其勝勢回取恆冀如拾芥耳上猶豫久乃從之李逢吉等之言即韋貫之等之言也然憲宗有用不用者前此兵勢未屈今則兵勢已屈不得不從也丙子罷河北行營各使還鎮元和十二年丁丑李訴遣方城鎮遏使李榮宗擊青喜城拔之方城縣本漢堵陽縣地後漢改為順陽隋改為方城縣唐屬唐州九域志在州北一百六十里縣有青臺鎮此作青喜筆誤也訴每得降卒必親引問委曲由是賊中險易遠近虛實盡知之易弋豉翻平易也訴厚待吳秀琳與之謀取蔡秀琳曰公欲取蔡非李祐不可秀琳無能為也祐者淮西騎將有勇略守興橋柵興橋柵在張柴村東陵者加之以氣暴者虐之以威庚辰祐率士卒刈麥於張柴村張柴村在文城柵東六十里帥讀曰率廂虞候掌左右廂之兵爾以三百騎伏彼林中又使人搖幟於前幟昌志翻若將焚其麥積者祐素易官軍易弋豉翻輕之也必輕騎來逐之爾乃發騎掩之必擒之用誠如言而往生擒祐以歸將士以祐嚮日多殺官軍爭請殺之訴不許釋縛待以客禮時訴欲襲蔡而更密其謀獨召祐及李忠義屏人語屏必郢翻又卑正翻或至夜分夜半為夜分諸將恐祐為變多諫訴訴待祐益厚士卒亦不悅諸軍日有牒稱祐為賊內應且言得賊諜者具言其事此行營諸軍移文之言諜徒協翻己不及救乃持祐泣曰豈天不欲平此賊邪何吾二人相知之深而不能勝衆口也因謂衆曰諸君既以祐為疑請令歸死於天子歸死猶言致尸也左傳魏絳曰請歸死於司寇杜預注云致尸於司寇使戮之先密表其狀密表言與祐謀襲蔡之狀若殺祐則無以成功詔釋之以還訴訴見之喜執其手曰爾之得全社稷之靈也李訴之期待祐者如此祐安得不力散員兵馬使未得統兵散悉但翻出入帳中或與之同宿密語不寐達曙有竊聽於帳外者但聞祐感泣聲時唐隨牙隊三千人牙隊者節度使牙衛從之隊猶今之簇帳部皆山南東道之精鋭也時山南東道分為兩鎮八州精鋭盡抽選赴唐州使之攻戰舊軍令舍賊諜者屠其家舊軍令先時之軍令也舍者停藏之於家也使厚待之諜反以情告訴訴益知賊中虛實乙酉訴遣兵攻朗山淮西兵救之官軍不利衆皆悵恨訴獨歡然曰此吾計也賊恃勝而不備訴則訴得以成入蔡之功其計出此號曰突將將即亮翻朝夕自教習之使常為行備欲以襲蔡會久雨所在積水未果元和十二年閏月己亥程還自江淮得供軍錢百八十五萬緡是年春程督財賦於江淮元和十二年諫議大夫韋綬兼太子侍讀每以珍膳餉太子又悅太子以諧謔綬音受謔香略翻上聞之丁未罷綬侍讀觀憲宗之罷韋綬亦知所謂諭教者矣然觀穆宗之臨政也習與性成得非所急者固在於選左右歟舊志虔州京師東南四千一十七里京兆人史著綬京兆人以言其生長京邑習見淫侈非能以德義經術誘掖東宮古言沃土之民不才良有以也元和十二年吳元濟見其下數叛數所角翻兵勢日蹙六月壬戌上表謝罪願束身自歸上遣中使賜詔許以不死而為左右及大將董重質所制不得出史言董重質之情元和十二年秋七月大水或平地二丈元和十二年初國子祭酒孔戣為華州刺史戣巨龜翻華戶化翻明州歲貢蚶蛤淡菜蚶呼甘翻魁陸也橫從其理五味自充殼如瓦壠者謂之瓦壠蚶蛤葛合翻蛤小於蚶蚶殼厚其理如瓦壠蛤殼薄其文如貝月令云雀入大水化為蛤説文云百歲燕所化又云老伏翼所化皆非也蚶蛤皆生於海瀕潮汐往來舄鹵之地淡菜狀如蟲並而小黑殼脣有鬚如茸肉甘脆蟲並蒲幸翻水陸遞夫勞費戣奏疏罷之華州京畿輔郡自東南來者水陸遞夫咸經焉故得言其勞費而罷之甲辰嶺南節度使崔詠薨宰相奏擬代詠者數人上皆不用曰頃有諫進蚶蛤淡菜者為誰可求其人與之庚戌以戣為嶺南節度使元和十二年諸軍討淮蔡四年不克九年冬始討淮西民至有以驢耕者牛斃於運轉民至無以耕以問宰相李逢吉等競言師老財竭意欲罷兵裴度獨無言上問之對曰臣請自往督戰乙卯上復謂度曰復扶又翻卿真能為朕行乎為于偽翻對曰臣誓不與此賊俱生臣比觀吳元濟表比毗至翻勢實窘蹙但諸將心不一不併力迫之故未降耳若臣自詣行營諸將恐臣奪其功必爭進破賊矣上悅丙戌以度為門下侍郎同平章事兼彰義節度使仍充淮西宣慰招討處置使觀裴度不附㣥議請身督戰則韓愈平淮西碑推功於度有以也處昌呂翻制下度以韓弘已為都統不欲更為招討請但稱宣慰處置使仍奏刑部侍郎馬總為宣慰副使右庶子韓愈為彰義行軍司馬判官書記皆朝廷之選上皆從之度將行言於上曰臣若賊滅則朝天有期賊在則歸闕無日上為之流涕為于偽翻下為卿同八月庚申度赴淮西上御通化門送之通化門長安城東面北來第一門茂昭弟也嘗以膽略自衒於度衒熒絹翻度表為都押牙茂和辭以疾度奏請斬之上曰此忠順之門茂和父孝忠兄茂昭鎮易定比河朔諸鎮為忠順辛酉貶茂和永州司馬以嘉王傅高承簡為都押牙高承簡為嘉王傅蓋嘉王運之子嗣為嘉王故置府官崇文之子也李逢吉不欲討蔡翰林學士令狐楚與逢吉善度恐其合中外之勢以沮軍事翰林學士居禁中宰相在外朝恐其中外相應以上罷兵之議沮在呂翻且言其草制失辭壬戌罷楚為中書舍人元和十二年李光顏烏重胤與淮西戰癸亥敗于賈店元和十二年裴度過襄城南白草原淮西人以驍騎七百邀之鎮將楚丘曹華知而為備擊卻之楚丘古己氏縣隋開皇六年改曰楚丘唐屬宋州九域志在州東北七十里實行元帥事以郾城為治所甲申至郾城先是諸道皆有中使監陳監古銜翻陳讀曰陳進退不由主將勝則先使獻捷不利則陵挫百端度悉奏去之諸將始得專軍事戰多有功去羌呂翻元和十二年九月庚子淮西兵寇殷水鎮殺三將焚芻藳而去元和十二年初上為廣陵王布衣張宿以辨口得幸及即位纍官至比部員外郎唐比部郎屬刑部掌句諸司百僚俸料公廨贓贖調斂徒役課程逋懸數物以周知內外之經費而總句之比音毗門下侍郎同平章事李逢吉惡之惡烏路翻上欲以宿為諫議大夫逢吉曰諫議重任必能可否朝政始宜為之朝直遙翻宿小人豈得竊賢者之位必欲用宿請去臣乃可上由是不悅逢吉又與裴度異議上方倚度以平蔡丁未罷逢吉為東川節度使元和十二年甲寅李訴將攻吳房吳房漢縣屬汝南郡孟康曰本房子國楚靈王遷房於楚吳王闔廬弟夫概奔楚楚封之于此為棠溪氏故曰吳房今吳房城棠溪亭是唐吳房縣屬蔡州平蔡後改為遂平縣今日往亡陰陽家之説八月以白露後十八日為往亡九月以寒露後第二十七日為往亡吾兵少不足戰宜出其不意彼以往亡不吾虞正可擊也遂往克其外城斬首千餘級餘衆保子城不敢出訴引兵還以誘之還音旋又如字淮西將孫獻忠果以驍騎五百追擊其背衆驚將走訴下馬據胡牀胡牀今謂之交牀其制本自虜來隋以讖有胡改曰交牀唐猶謂之胡牀敢退者斬返旆力戰獻忠死考異曰舊傳作孫忠憲今從平蔡録或勸訴乘勝攻其子城可拔也訴曰非吾計也定計入蔡不在取吳房李祐言於李訴曰蔡之精兵皆在洄曲考異曰舊元濟傳李祐曰元濟徑軍多在時曲按李光顏傳曰董重質棄洄曲軍李訴傳云分五百人斷洄曲路又云洄曲子弟歸求寒衣然則元濟傳誤當為洄曲余意洄曲蓋即時曲也守音狩守州城者皆羸老之卒可以乘虛直抵其城比賊將聞之比必利翻及也元濟已成擒矣訴然之冬十月甲子遣掌書記鄭澥至郾城密白裴度度曰兵非出奇不勝常侍良圖也澥胡買翻李訴檢校左散騎常侍鎮唐鄧隨故裴度稱之元和十二年上竟用張宿為諫議大夫崔㣥王涯固諫不聽乃請以為權知諫議大夫許之宿由是怨執政及端方之士與皇甫鎛相表裏譖去之去羌呂翻元和十二年裴度帥僚佐觀築城於沱口九域志郾城縣有沱口鎮沱徒河翻邀之五溝在洄曲之北帥讀曰率呼火故翻注弩挺刃挺拔也李光顏與田布力戰拒之度僅得入城賊退布扼其溝中歸路賊下馬踰溝墜壓死者千餘人元和十二年辛未李訴命馬步都虞候隨州刺史史旻留鎮文城命李祐李忠義帥突將三千為前驅自與監軍將三千人為中軍命李進誠將三千人殿其後殿丁練翻軍出不知所之訴曰但東行行六十里夜至張柴村盡殺其戍卒及烽子唐凡烽候之所有烽帥烽副烽子蓋守烽之卒候望警急而舉烽者也杜佑曰一烽六人五人為烽子遞知更刻觀視動靜一人烽率知文書符辭轉牒命士少休少詩沼翻食乾糒整羈靮糒音備乾飯也羈馬絡頭靮紖也音丁曆翻留義成軍五百人鎮之以斷章甲十一行本斷下有朗山救兵命丁士良將五百人斷十三字乙十一行本同退齋校同張校同人下多一以字云無注本亦無洄曲及諸道橋梁斷音短復夜引兵出門復扶又翻訴曰入蔡州取吳元濟諸將皆失色監軍哭曰果落李祐姦計時大風雪旌旗裂人馬凍死者相望天陰黑自張柴村以東道路皆官軍所未嘗行人人自以為必死然畏訴莫敢違夜半雪愈甚行七十里至州城至蔡州城下也訴令擊之以混軍聲自吳少誠拒命官軍不至蔡州城下三十餘年德宗貞元二年吳少誠據蔡州至是三十二年壬申四鼓訴至城下無一人知者李祐李忠義钁其城為坎以先登钁居縛翻鋤也壯士從之守門卒方熟寐盡殺之而留擊柝者使擊柝如故遂開門納衆及裏城亦然城中皆不之覺雞鳴雪止訴入居元濟外宅節度使外宅也官軍至矣元濟尚寢笑曰俘囚為盜耳曉當盡戮之又有告者曰城陷矣元濟曰此必洄曲子弟就吾求寒衣也起聽於廷聞訴軍號令曰常侍傳語應者近萬人近其靳翻元濟始懼曰何等常侍能至於此乃帥左右登牙城拒戰帥讀曰率時董重質擁精兵萬餘人據洄曲訴曰元濟所望者重質之救耳乃訪重質家厚撫之遣其子傳道持書諭重質重質遂單騎詣訴降訴遣李進誠攻牙城毀其外門得甲庫取器械癸酉復攻之燒其南門民爭負薪芻助之城上矢如蝟毛訴軍聚射矢集城上如蝟毛言其多也門壞元濟於城上請罪進誠梯而下之甲戌訴以檻車送元濟詣京師德宗貞元二年吳少誠得蔡州三世三十二年而滅考異曰舊訴傳曰其月七日使判官鄭澥告期於裴度十日夜以李祐率突將三千為先鋒訴自率中軍三千田進誠以後軍三千殿而行元濟傳曰十一月訴夜出軍令李祐為前鋒其十日夜至蔡州城下實録曰訴以十月將襲蔡州先七日使判官鄭澥告師期於裴度按先七日即是平蔡録所云八日甲子也而訴傳誤云七日而又云十日夜帥軍行亦誤元濟傳十一月訴出軍尤誤裴度傳十月十一日李訴襲破懸瓠城擒元濟亦誤按十月戊午朔韓愈平淮西碑云壬申訴用所得賊將自文城因天大雪疾馳百二十里即十五日也又曰用夜半到蔡破其門取元濟以獻即十六日也實録己卯執元濟乃奏到日也今從平蔡録是日申光二州及諸鎮兵二萬餘人相繼來降自元濟就擒訴不戮一人凡元濟官吏帳下廚廣既之卒皆復其職使之不疑推赤心置入腹中鞠場毬場也元和十二年以淮南節度使李鄘為門下侍郎同平章事元和十二年己卯淮西行營奏獲吳元濟光祿少卿楊元卿言於上曰淮西大有珍寶臣能張能作素知之往取必得元和九年楊元卿以淮西節度判官入奏輸誠於朝廷吳元濟屠其家今請將命往取淮西珍寶其情可知也朕討淮西為人除害為于偽翻珍寶非所求也元和十二年董重質之去洄曲軍也李光顏馳入其壁悉降其衆庚辰裴度遣馬總先入蔡州慰撫辛巳度建彰義軍節將降卒萬餘人入城李訴具櫜鞬出迎拜於路左櫜姑勞翻鞬居言翻櫜以藏弓鞬以藏箭鄭玄曰道左道東也余按古者乘車尚左故迎拜於車下者皆拜于道左蓋自北而來者以道東為左自南而來者以道西為左自東西而來者亦隨車之所嚮而分左右也鄭玄舉一隅耳故孔穎達正義曰凡言左右據南鄉西鄉為正蓋南鄉君道也西鄉主道也度將避之訴曰蔡人頑悖不識上下之分數十年矣悖蒲妹翻又蒲沒翻分扶問翻願公因而示之使知朝廷之尊度乃受之史言李訴識度非當時諸帥所及李訴還軍文城裴度既入蔡李訴還軍文城此皆是識體統處又非諸帥怙功欲專地為私利者比也始公敗於朗山而不憂勝於吳房而不取事並見上孤軍深入而不懼然卒以成功卒子恤翻皆衆人所不諭也敢問其故訴曰朗山不利則賊輕我而不為備矣取吳房則其衆奔蔡併力固守故存之以分其兵風雪陰晦則烽火不接不知吾至孤軍深入則人皆致死戰自倍矣夫視遠者不顧近慮大者不詳章甲十一行本詳作計乙十一行本同張校同云無注本作詳細若矜小勝恤小敗先自撓矣何暇立功乎衆皆服余按李訴入蔡誠為奇功史家稱述其與諸將揚榷用兵方略所以取勝之由遣文命意實祖史漢韓信戰井陘事所書者然訴平蔡之事猶可以發揚若唐末王式平裘甫事則又祖李家述平蔡之功者也若其所敵之堅脆所規之廣狹固不可以欺衒識者文之過實者多學者其於是察之橈奴教翻知賢不疑見可能斷斷丁亂翻此其所以成功也裴度以蔡卒為牙兵或諫曰蔡人反仄者尚多不可不備度笑曰吾為彰義節度使元惡既擒蔡人則吾人也又何疑焉蔡人聞之感泣裴度平蔡蔡人不復叛矣識者知其所以然乎吳氏父子謂少陽元濟也先悉薦翻夜不然燭有以酒食相過從者罪死盜亦有道此其以法束下所以自防也過工禾翻下令惟禁盜賊章甲十一行本賊下有鬬殺二字乙十一行本同退齋校同張校同云無注本亦無餘皆不問往來者不限晝夜蔡人始知有生民之樂解人之束縛使得舒展四體長欠大伸豈不快哉甲申詔韓弘裴度條列平蔡將士功狀及蔡之將士降者皆差第以聞史照曰謂將士有功者等差而次第之余謂當時詔旨既令弘度差第平蔡將士之功狀而蔡之將士歸降者有降於元濟未就擒之前者有降於元濟既就擒之後者有先嘗拒殺官軍勢窮力屈而降者有先通誠款欲降而未能自致者亦令弘度差第其狀以聞史照之説舉其一而遺其一者也給復二年復方目翻除其賦役二年以優新附之民近賊四州免來年夏稅近賊四州陳許潁唐也頻遭蔡人攻剽又供億官軍故免來年夏稅亦以優之皆為收葬為于偽翻給其家衣糧五年其因戰傷殘廢者勿停衣糧死者葬其尸又贍其家殘廢者養之終身殘廢謂因戰傷折腰膂手足不復為完人堪世用者十一月章甲十一行本月下有丙戌朔三字乙十一行本同退齋校同張校同云無注本亦無上御興安門受俘大明宮南面五門興安門最在其西斬于獨柳之下初淮西之人劫於李希烈吳少誠之威虐不能自拔久而老者衰幼者壯安於悖逆不復知有朝廷矣悖蒲內翻又蒲沒翻自少誠以來遣諸將出兵皆不束以法制聽各以便宜自戰故人人得盡其才韓全義之敗于殷水也事見二百三十五卷德宗貞元十六年少誠束以示衆曰此皆公卿屬全義書屬之欲翻託也云破蔡州日乞一將士妻女為婢妾由是衆皆憤怒以死為賊用雖居中土其風俗獷戾考之漢志汝南戶口為百郡之最古人謂汝潁多奇士至唐而獷戾乃爾習俗之移人也嗚呼吾恐後之視今亦猶今之視昔獷古猛翻悍也貊莫百翻舉天下之兵環而攻之環音宦四年然後克之官軍之克元濟也李師道募人通使於蔡察其形勢牙前虞候劉晏平應募出汴宋間潛行至蔡元濟大喜厚禮而遣之晏平還至鄆師道屏人而問之還音旋屏必郢翻又卑正翻晏平曰元濟暴兵數萬於外阽危如此阽余廉翻臨危也而日與僕妾遊戲博奕於內奕當作奕奕棋也以愚觀之殆必亡不久矣師道素倚淮西為援聞之驚怒尋誣以他過杖殺之以劉晏平之善覘其智識必有過人者李師道不能委心歸計以求自安之術乃怒而殺之終亦必亡而已矣戊子以李訴為山南東道節度使賜爵涼國公加韓弘兼侍中李光顏烏重胤等各遷官有差元和十二年舊制御史二人知驛開元中令監察御史兼巡傳驛至二十五年以監察御史檢校兩京館驛大曆十四年兩京以御史一人知館驛號館驛使壬辰詔以宦者為館驛使左補闕裴潾諫曰潾力珍翻內臣外事職分各殊分扶問翻切在塞侵官之源塞悉則翻絶出位之漸事有不便必戒於初令或有妨不必在大上不聽元和十二年甲午恩王連薨連代宗子元和十二年辛丑以唐隨兵馬使李祐為神武將軍知軍事會要乾元四年十月四日敕左右羽林左右龍武左右神武軍文武官並升同金吾四衛唐制諸衛將軍大將軍上將軍類加以名號而不掌兵知軍事則掌兵矣唐隨謂當作唐鄧隨元和十二年裴度以馬總為彰義留後癸丑發蔡州上封二劍以授梁守謙使誅吳元濟舊將度至郾城遇之復與俱入蔡州量罪施刑量音良不盡如詔旨仍上疏言之元和十二年十二月壬戌賜裴度爵晉國公復入知政事以馬總為淮西節度使元和十二年初吐突承璀方貴寵用事為淮南監軍李鄘為節度使性剛嚴與承璀互相敬憚故未嘗相失承璀歸吐突承璀六年出為淮南監軍九年召還是年十月相李鄘及將佐出祖出城祖道謂餞之也鄘泣下曰吾老安外鎮宰相非吾任也戊寅鄘至京師辭疾不入見見賢遍翻不視事百官到門皆辭不見史言李鄘知恥元和十二年庚辰貶淮西降將董重質為春州司戶重質為元濟謀主屢破官軍上欲殺之李訴奏先許重質以不死十三年十三年春正月乙酉朔赦天下十三年初李師道謀逆命判官高沐與同僚郭昈李公度屢諫之昈侯古翻考異曰新傳又有郭航名按航乃牙將昈所使詣李願者非幕僚同諫者也今從河南記判官李文會孔目官林英素為師道所親信涕泣言於師道曰文會等盡心為尚書憂家事心為于偽翻反為高沐等所疾尚書奈何不愛十二州之土地十二州鄆兗曹濮淄青齊海登萊沂密也師道由是疏沐等出沐知萊州萊州古萊子之國後魏置光州隋改萊州令進奏吏密申師道云沐潛輸款於朝廷文會從而構之師道殺沐並囚郭昈凡軍中勸師道效順者文會皆指為高沐之黨而囚之及淮西平師道憂懼不知所為李公度及牙將李英曇曇徒含翻因其懼而説之使納質獻地以自贖説式芮翻質音致師道從之遣使奉表請使長子入侍並獻沂密海三州上許之乙巳遣左常侍李遜詣鄆州宣慰十三年上命六軍修麟德殿右龍武統軍張奉國大將軍李文悅大將軍即右龍武大將軍謂淮西初平白宰相冀有論諫裴度因奏事言之上怒二月丁卯以奉國為鴻臚卿壬申以文悅為右武衛大將軍即出奉國於外朝文悅又自北門諸衛遷南牙諸衛臚陵如翻威遠營亦非北軍也起承暉殿土木浸興矣大明宮東面有東內苑苑中有龍首殿龍首池龍首渠水自城南而注入于此池宋白曰龍首殿在右軍十三年李訴奏請判官大將以下官凡百五十員上不悅謂裴度曰李訴誠有奇功然奏請過多使如李晟渾瑊又何如哉遂留中不下下戶嫁翻十三年李鄘固辭相位戊戌以鄘為戶部尚書以御史大夫李夷簡為門下侍郎同平章事十三年初渤海僖王言義卒弟簡王明忠立改元太始一歲卒從父仁秀立改元建興乙巳遣使來告喪十三年橫海節度使程權自以世襲滄景德宗始命程日華為橫海帥傳子懷直為從兄懷信所逐懷信死子權嗣為帥內不自安己酉遣使上表請舉族入朝許之橫海將士樂自亶樂音洛不聽權去掌書記林蘊諭以禍福權乃得出詔以蘊為禮部員外郎十三年裴度之在淮西也布衣柏耆以策干韓愈曰吳元濟既就擒王承宗破膽矣願得奉丞相書往説之説式芮翻可不煩兵而服愈白度為書遣之承宗懼求哀於田弘正請以二子為質質音致及獻德棣二州輸租稅請官吏弘正為之奏請為于偽翻上初不許弘正上表相繼上表時掌翻上重違弘正意乃許之夏四月甲寅朔魏博遣使送承宗子知感知信及德棣二州圖印至京師幽州大將談忠説劉總曰説式芮翻自元和以來劉闢李錡田季安盧從史吳元濟阻兵馮險馮讀曰憑自以為深根固蒂蒂丁計翻天下莫能危也然顧盼之間身死家覆皆不自知此非人力所能及殆天誅也況今天子神聖威武苦身焦思思相吏翻縮衣節食縮斂也短也此志豈須臾忘天下哉今國兵駸駸北來國兵謂王師也駸駸馬行疾貌德州領安德長河平原平昌將陵安陵六縣棣州領厭次滳河陽信蒲臺渤海五縣程權之退承宗又取景州之東光今皆以歸朝廷故曰獻城十二為于偽翻總泣且拜曰聞先生言吾心定矣遂專意歸朝廷十三年戊辰內出廢印二紐賜左右三軍辟仗使龍武神武羽林三軍各分左右辟讀如闢以宦官為六軍辟仗使如方鎮之監軍無印監軍有印見二百三十五卷德宗貞元十一年宋白曰舊制內官為三軍辟仗使監視刑賞奏察違謬猶方鎮之監軍使至是始賜印得糾繩軍政事任專達矣十三年庚戌章甲十一行本戌作辰乙十一行本同張校同云無注本作戌按是月甲寅朔無庚戌詔洗雪王承宗及成德將士復其官爵削王承宗官爵見上卷十一年十三年李師道暗弱軍府大事獨與妻魏氏奴胡惟堪楊自溫婢蒲氏袁氏及孔目官王再升謀之大將及幕僚莫得預焉魏氏不欲其子入質質音致與蒲氏袁氏言於師道曰自先司徒以來有此十二州李正己初據有十五州及李納拒命徐州入于朝廷德棣入于朱滔有十二州而已先司徒謂李納也今計境內之兵不下數十萬不獻三州不過以兵相加三州謂請獻沂密海獻之未晚師道乃大悔欲殺李公度幕僚賈直言謂其用事奴曰今大禍將至豈非高沐冤氣所為若又殺公度軍府其危哉乃囚之遷李英曇於萊州未至縊殺之李遜至鄆州師道大陳兵迎之遜盛氣正色為陳禍福為于偽翻責其決語決語決為一定之説不依違持兩端師道退與其黨謀之皆曰弟許之弟與第同師道乃謝曰嚮以父子之私且迫於將士之情故遷延未遣今重煩朝使豈敢復有二三重直用翻朝直遙翻使疏吏翻復扶又翻朝使謂朝廷所遣使者遜察師道非實誠歸言於上曰師道頑愚反覆恐必須用兵既而師道表言軍情不聽納質割地上怒決意討之賈直言冒刃諫師道者二輿櫬諫者一又畫縛載檻車妻子係纍者以獻師道怒囚之史照曰孟子曰係纍其子弟趙氏注云係纍縛結也五月丙申以忠武節度使李光顏為義成節度使李光顏自許州徙鎮滑州以淮西節度使馬總為忠武節度使陳許殷蔡州觀察使以申州隸鄂嶽光州隸淮南不復以蔡州為節鎮十三年辛丑以知勃海國務大仁秀為勃海王十三年以河陽都知兵馬使曹華為棣州刺史詔以河陽兵章甲十一行本兵下有二千二字乙十一行本同退齋校同送至滳河滳河漢千乘濕沃縣地隋開皇十六年置滳河縣廢濕沃入焉唐屬棣州九域志在州西南八十里漢都尉許商鑿此通海故以商河為名後人加水焉宋白曰縣南有滳河因以為名平盧兵李師道之兵也殺二千餘人復其縣以聞詔加橫海節度副使十三年六月癸丑朔日有食之十三年丁丑復以烏重胤領懷州刺史鎮河陽淮西已平故烏重胤自汝州復還鎮河陽十三年秋七月癸未朔徙李訴為武寧節度使乙酉下制罪狀李師道令宣武魏博義成武寧橫海兵共討之以宣歙觀察使王遂為供軍使遂方慶之孫也王方慶武后聖曆中為相歙書涉翻上方委裴度以用兵門下侍郎同平章事李夷簡自謂才不及度求出鎮辛丑以夷簡同平章事充淮南節度使十三年八月壬子朔中書侍郎同平章事王涯罷為兵部侍郎十三年吳元濟既平韓弘懼九月自將兵擊李師道圍曹州十三年淮西既平上浸驕侈戶部侍郎判度支皇甫鎛衛尉卿鹽鐵轉運章甲十一行本運下有使字乙十一行本同程曉其意數進羡餘以供其費史言鎛逢君之惡數所角翻羡弋線翻鎛又以厚賂結吐突承璀甲辰鎛以本官以工部侍郎並同平章事判使如故皇甫鎛以戶部侍郎相判度支如故程進二起部以相鹽鐵轉運使如故朝野駭愕至於市井負販者亦嗤之下戶稼翻嗤丑之翻笑也裴度崔㣥極陳其不可上不聽度恥與小人同列表求自退不許度復上疏復扶又翻上時掌翻以為鎛皆錢穀吏佞巧小人陛下一旦置之相位中外無不駭笑況鎛在度支專以豐取刻與為務凡中外仰給度支之人無不思食其肉仰牛向翻比者裁損淮西糧料比毗至翻近也謂討吳元濟時裁損淮西行營諸軍糧料軍士怨怒會臣至行營曉諭慰勉僅無潰亂今舊將舊兵悉向淄青謂舊所遣討蔡之將討蔡之兵悉遣之討李師道必盡驚憂知無可訴之地矣言鎛在度支減刻糧賜軍士猶可訴之於廟堂今既為相無可訴之地矣然心事和平可處煩劇不宜為相處昌呂翻下同至如鎛資性狡詐天下共知唯能上惑聖聰足見姦邪之極言憲宗英明且為所惑可以見其極姦邪天下謂臣不知廉恥臣若不言天下謂臣有負恩寵今退既不許言又不聽臣如烈火燒心衆鏑叢體所可惜者淮西蕩定河北底寧承宗斂手削地謂獻德棣二州謂自將討李師道直以處置得宜能服其心耳陛下建升平之業十已八九何忍還自墮壞墮讀曰隳壞音怪使四方解體乎上以度為朋黨不之省省悉景翻鎛自知不為衆所與益為巧諂以自固奏減內外官俸以助國用給事中崔植封還敕書極論之乃止植祐甫之弟子也崔祐甫相德宗有可稱者時內出積年繒帛付度支令賣鎛悉以高價買之以給邊軍其繒帛朽敗隨手破裂邊軍聚而焚之繒慈陵翻度因奏事言之鎛於上前引其足曰此靴亦內庫所出臣以錢二千買之堅完可久服度言不可信上以為然引足於君前不敬大矣憲宗溺於利不惟不察其慢又且然其言為鎛得罪張本能廉謹謙遜為相月餘不敢知印秉筆時宰相更日知印秉筆十三年五坊使楊朝汶汶音問妄捕繫人迫以考捶責其息錢遂轉相誣引所繫近千人捶止蕊翻近其靳翻俯音免劾漢書音義戶概翻今音戶得翻裴度崔㣥亦以為言上曰姑與卿論用兵事姑且也處昌呂翻度曰用兵事小所憂不過山東耳五坊使暴橫恐亂輦轂橫戶孟翻史照曰轂者輻所湊也京都四方所輻湊以輦轂取喻余按漢書京兆尹率自言待罪輦轂下謂京兆在天子輦轂之下耳上不悅退召朝汶責之曰以汝故令吾羞見宰相冬十月賜朝汶死盡釋繫者十三年上晚節好神仙好呼到翻詔天下求方士宗正卿李道古先為鄂嶽觀察使以貪暴聞恐終獲罪思所以自媚於上乃因皇甫鎛薦山人柳泌云能合長生藥甲戌詔泌居興唐觀煉藥合音閣唐會要興唐觀本司農園地在長樂坊開元十八年造李道古薦柳泌以求媚免罪不知適足以重罪也泌既誅而道古亦貶矣為上服泌藥致疾張本泌薄必翻又兵媚翻十三年十一月辛巳朔鹽州奏吐蕃寇河曲夏州靈武奏破吐蕃長樂州克其外城吐蕃長樂州當在靈州黃河外定遠城之西夏戶雅翻樂音洛十三年柳泌言於上曰天台山神仙所聚新志台州唐興縣有天台山宋朝改唐興縣為天台縣天台山在縣西一百一十里臨海記天台山超然秀出山有八重視之如一高一萬八千丈周回八百里臣雖知之力不能致誠得為彼長吏庶幾可求上信之長知丈翻幾居希翻丁亥以泌權知台州刺史台州漢回浦縣地會稽東部都尉理所光武改回浦為章安縣吳分章安置臨海縣唐武德四年置海州五年改台州因天台山為名諫官爭論奏以為人主喜方士喜許記翻未有使之臨民賦政者賦布也煩一州之力而能為人主致長生為于偽翻臣子亦何愛焉由是㣥臣莫敢言十三年甲午鹽州奏吐蕃遁去十三年壬寅以河陽節度使烏重胤為橫海節度使丁未以華州刺史令狐楚為河陽節度使重胤以河陽精兵三千赴鎮河陽兵不樂去鄉里樂音洛中道潰歸又不敢入城屯于城北將大掠令狐楚適至單騎出慰撫之與俱歸先是田弘正請自黎陽渡河會義成節度使李光顏討李師道先悉薦翻裴度曰魏博軍既渡河不可復退復扶又翻立須進擊方有成功既至滑州即仰給度支義成節度使治滑州魏博與滑州以河為界兵至滑州為已出界唐中世以來命藩鎮兵征討已出境芻糧皆仰給於度支惟裴度用兵於東平李德裕用兵於上黨知其弊有以制之更生觀望之勢又或與李光顏互相疑阻益致遷延一栖不兩雄又有賓主之形疑阻或生何事不有其患豈止於遷延之役不若養威於河北宜且使之秣馬厲兵俟霜降水落自楊劉渡河楊劉鎮在鄆州東北東阿縣臨河津得至陽穀置營隨置陽穀縣以陽穀臺為名唐屬鄆州九域志在州西一百三十里宋白曰陽穀縣本漢須昌縣地今縣界有須昌故城賊衆搖心矣上文言得至恐兵有利鈍也此言賊衆搖心指其成效也是月弘正將全師自楊劉渡河距鄆州四十里築壘此自楊劉直進不復迂其路至陽穀也舊史李師道傳曰距鄆州九十里田弘正傳曰四十里考異曰河南記云營於陽穀西北今從實録十三年功德使上言鳳翔法門寺塔有佛指骨法門寺在鳳翔府岐山縣時功德使言法門寺有護國真身塔塔內有釋迦牟尼佛指骨一節開則歲豐人安來年應開請迎之十二月庚戌朔上遣中使帥僧衆迎之帥讀曰率十三年戊辰以春州司戶董重質為試太子詹事委武寧軍驅使李訴請之也時徙李訴鎮武寧以討李師道十三年戊寅魏博義成軍送所獲李師道都知兵馬使夏侯澄等四十七人上皆釋弗誅各付所獲行營驅使曰若有父母欲歸者優給遣之朕所誅者師道而已於是賊中聞之降者相繼降戶江翻初李文會與兄元規皆在李師古幕下師古薨師道立薨立見二百三十七卷元年文會屬師道親黨請留屬之欲翻元規將行謂文會曰我去身退而安全汝留必驟貴而受禍及官軍四臨平盧兵勢日蹙將士喧然皆曰高沐郭昈李存為司空忠謀為于偽翻下不為同師道檢校司空故稱之李文會姦佞殺沐囚昈存以致此禍師道不得已出文會攝登州刺史召昈存還幕府十三年上常語宰相語牛倨翻人臣當力為善何乃好立朋黨朕甚惡之好呼到翻惡烏路翻裴度對曰方以類聚物以㣥分易大傳之言勢必相合君子為徒謂之同德小人為徒謂之朋黨外雖相似內實懸殊在聖主辨其所為邪正耳十三年武寧節度使李訴與平盧兵十一戰皆捷乙章甲十一行本乙作己乙十一行本同張校同云無注本亦誤乙卯晦進攻金鄉克之金鄉縣唐屬兗州宋白曰金鄉縣本漢東緡縣今縣理即古緍國城陳留風俗傳云東緍者故陽武戶牖鄉後漢於任城縣西南七十五里置金鄉縣因穿山得金故曰金鄉自官軍致討聞小敗及失城邑輒憂悸成疾悸其季翻由是左右皆蔽匿不以實告金鄉兗州之要地也既失之其刺史驛騎告急左右不為通為于偽翻師道至死竟不知也十四年十四年春正月辛巳韓弘拔考城殺二千餘人考城漢古縣唐屬曹州九域志在汴州東一百八十里丙戌師道所署沭陽令梁洞以縣降于楚州刺史李聽沭陽漢廩丘縣後魏曰沭陽以其地在沭水之陽也唐屬海州九域志在州西南一百八十里沭食聿翻十四年吐蕃遣使者論短立藏等來修好未返好呼到翻入寇河曲上曰其國失信其使何罪庚寅遣歸國十四年壬辰武寧節度使李訴拔魚臺魚臺漢方與縣地唐屬兗州寶應元年改為魚臺小城北有魯公觀魚臺而名之觀魚臺即春秋魯隱公如棠觀魚之地元和四年李師道請移縣於黃臺市十四年中使迎佛骨至京師上留禁中三日乃歷送諸寺王公士民瞻奉捨施惟恐弗及有竭産充施者施式智翻有然香臂頂供養者供居用翻養余亮翻刑部侍郎韓愈上表切諫以為佛者夷狄之一法耳自黃帝以至禹湯文武皆享壽考百姓安樂樂音洛當是時未有佛也漢明帝時始有佛法見四十五卷永平八年運祚不長宋齊梁陳元魏已下事佛漸謹年代尤促惟梁武帝在位四十八年前後三捨身為寺家奴竟為侯景所逼餓死臺城國亦尋滅事佛求福乃更得禍事並見前紀佛不足信亦可知矣百姓愚冥易惑難曉苟見陛下如此皆云天子猶章甲十一行本猶上有大聖二字乙十一行本同退齋校同一心敬信百姓微賤於佛豈可更惜身命佛本夷狄之人口不言先王之法言身不服先王之法服不知君臣之義父子之恩假如其身尚在奉國命來朝京師陛下容而接之不過宣政一見唐時四夷入朝貢者皆引見於宣政殿見賢遍翻唐有禮賓院凡胡客入朝設宴于此元和九年置禮賓院於長興里之北宋白曰屬鴻臚寺衛而出之於境不令惑衆也況其身死已久枯朽之骨豈宜以入宮禁古之諸侯行弔於國尚章甲十一行本尚下有令巫祝三字乙十一行本同退齋校同先以桃茢祓除不祥記曰君臨臣喪以巫祝桃茢執戈惡之也注云為有凶邪之氣在側桃鬼所惡也茢萑苕可掃除不祥左傳魯襄公如楚楚康王卒楚人使公親襚公患之叔孫穆子曰祓殯而襚則布幣也乃使巫以桃茢先祓殯韓愈正引此事茢音列又音例祓敷勿翻又音廢巫祝不先先悉薦翻桃茢不用㣥臣不言其非御史不舉其罪臣實恥之乞以此骨付有司投諸水火永絶根本斷天下之疑斷丁亂翻一音短絶後代之惑使天下之人知大聖人之所作為出於尋常萬萬也豈不盛哉佛如有靈能作禍福凡有殃咎宜加臣身上得表大怒出示宰相將加愈極刑殊死謂之極刑愈雖狂發於忠懇為于偽翻懇誠也宜寬容以開言路癸巳貶愈為潮州刺史自戰國之世老莊與儒者爭衡更相是非更工衡翻至漢末益之以佛然好者尚寡好呼到翻晉宋以來日益繁熾自帝王至于士民莫不尊信下者畏慕罪福高者論難空有難乃旦翻釋氏之説談空以難有獨愈惡其蠹財惑衆力排之惡烏路翻其言多矯激太過惟送文暢師序最得其要曰夫鳥俯而啄仰而四顧獸深居而簡出懼物之為己害也猶且不免焉弱之肉強之食今吾與文暢安居而暇食優遊以生死與禽獸異者寧可不知其所自邪原其所自則聖人之所以垂世立教者也十四年丙申田弘正奏敗淄青兵於東阿敗蒲邁翻東阿漢古縣唐屬鄆州九域志在州西北六十里殺萬餘人十四年滄州刺史李宗奭與橫海節度使鄭權不叶程權既入朝以鄭權代鎮橫海權奏之上遣中使追之宗奭使其軍中留己此謂滄州本州之軍也離力智翻詔以烏重胤代權將吏懼逐宗奭懼重胤討其黨惡辛丑斬于獨柳之下十四年丙午田弘正奏敗平盧兵於陽穀容肇祖標點聶崇岐覆校
