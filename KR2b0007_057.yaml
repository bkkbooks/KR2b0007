body:
  text: 資治通鑑卷第五十七翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注漢紀四十九熹平元年孝靈皇帝上之下熹平元年壬子一七二熹平元年春正月車駕上原陵司徒掾陳留蔡雍曰吾聞古不墓祭朝廷有上陵之禮始謂可損今見威儀察其本意乃知孝明皇帝至孝惻隱不易奪也據禮儀志西都舊有上陵至東都則其儀文愈備其略見四十四卷永平元年上時掌翻掾俞絹翻易以豉翻此之謂也熹平元年三月壬戌太傅胡廣薨年八十二廣周流四公太傅太尉司徒司空賢曰廣以順帝漢安元年為司空至熹平元年薨三十一年也安順沖質桓靈罷免未嘗滿歲輒復升進復扶又翻所辟多天下名士與故吏陳蕃李咸並為三司三司即三公明解朝章解戶買翻曉也朝直遙翻故京師諺曰萬事不理問伯始天下中庸有胡公胡廣字伯始夫既曰萬事不理問伯始則當時之責望亦重矣豈可以三十餘年周流四公為榮哉賢曰中和也庸常也中和可常行之德也常遜言恭色以取媚於時無忠直之風天下以此薄之熹平元年五月己巳赦天下改元熹平元年長樂太僕侯覺坐專權驕奢策收印綬自殺長樂太僕太后宮官也主馭宦者為之秩二千石樂音洛熹平元年六月京師大水熹平元年竇太后母卒於比景太后憂思感疾癸巳崩於雲臺宦者積怨竇氏以衣車載太后尸置城南市舍數日曹節王甫欲用貴人禮殯帝曰太后親立朕躬統承大業豈宜以貴人終乎於是發喪成禮節等欲別葬太后而以馮貴人配祔賢曰祔謂新死之主祔於先死者之廟婦祔於其夫所祔之妾祔於妾祖姑也朝直遙翻令中常侍趙忠監議監古銜翻太尉李咸時病扶輿而起搗椒自隨孔穎達曰釋木云檓大椒郭璞曰今椒樹叢生實大者名為檓陸璣疏云椒樹如茱萸有針刺葉堅而滑澤蜀人作茶吳人作茗皆合煮其葉以為香今成皋山間有椒謂之竹葉椒其樹亦如蜀椒少毒熱不中合藥也可著飲食中又用蒸雞豚最佳香東海諸島亦有椒樹枝葉皆相似子長而不圓甚香其味似橘皮本草亦云椒大熱有毒按李咸搗椒自隨齊明帝將殺高武諸孫敕太官煮椒二斛蓋其毒能殺人也若皇太后不得配食桓帝吾不生還矣欲以死爭之也坐者數百人各瞻望良久莫肯先言趙忠曰議當時定廷尉陳球曰皇太后以盛德良家母臨天下宜配先帝是無所疑忠笑而言曰陳廷尉宜便操筆操千高翻球即下議曰皇太后自在椒房有聰明母儀之德遭時不造援立聖明承繼宗廟功烈至重先帝晏駕因遇大獄遷居空宮不幸早世家雖獲罪事非太后今若別葬誠失天下之望且馮貴人冢嘗被發掘骸骨暴露與賊併尸魂靈汙梁賢曰段熲為河南尹伕盜發馮貴人冢左遷諫議大夫余據熲以延熹三年入為侍中轉執金吾河南尹則發冢之事於是年近耳被皮義翻何宜上配至尊忠省球議省悉井翻下同作色俯仰蚩球曰陳廷尉建此議甚健蚩笑也陳竇既冤皇太后無故幽閉臣常痛心天下憤歎今日言之退而受罪宿昔之願也李咸曰臣本謂宜爾誠與意合於是公卿以下皆從球議曹節王甫猶爭以為梁后家犯惡逆別葬懿陵梁后先桓帝崩葬懿陵梁冀誅始廢陵為貴人冢而以李夫人配食戾太子之亂武帝策廢其母衛后后自殺武帝崩霍光緣帝雅意以李夫人配食豈得合葬先帝李咸復上疏曰臣伏惟章德竇后虐害恭懷安思閻后家犯惡逆竇后事見四十六卷章帝建初八年閻后事見五十卷五十一卷安帝延光三年四年復扶又翻順朝無貶降之文朝直遙翻至於衛后孝武皇帝身所廢棄不可以為比今長樂太后尊號在身親嘗稱制且授立聖明光隆皇祚太后以陛下為子陛下豈得不以太后為母子無黜母臣無貶君宜合葬宣陵一如舊制帝省奏從之省悉景翻考異曰袁紀云河南尹李咸執藥上書曰昔秦始皇幽閉母后感茅焦之言立駕迎母供養如初夫以秦后之惡始皇之悖尚納直臣之語不失母之恩豈況皇太后不以罪歿陛下之過有重始皇臣謹左手齎章右手執藥詣闕自聞如遂不省臣當飲鴆自裁下覲先帝具陳得失章省上感其言使公卿更議廷尉陳球乃下議與范不同今從范書秋七月甲寅葬桓思皇后于宣陵熹平元年有人書朱雀闕古今注永平二年十一月初作北宮朱爵南司馬門闕在宮門之外天下大亂曹節王甫幽殺太后考異曰舊云常侍侯覽多殺黨人按時覽己死恐誤今去之無忠言者詔司隸校尉劉猛逐捕十日一會猛以誹書言直不肯急捕月餘主名不立賢曰不得書闕主名以御史中丞段熲代之熲乃四出逐捕及太學遊生繫者千餘人節等又使熲以他事奏猛論輸左校校戶教翻初司隸校尉王寓依倚宦官求薦於太常張奐奐拒之寓遂陷奐以黨罪禁錮奐嘗與段熲爭擊羌不相平事見上卷建寧元年欲逐奐歸敦煌而害之奐徙屬弘農事見上卷桓帝永康元年敦徒門翻乃得免初魏郡李皓為司隸校尉皓古老翻以舊怨殺扶風蘇謙謙子不韋瘞而不葬瘞於計翻變姓名結客報仇皓遷大司農不韋匿於廥中鑿地旁達皓之寢室説文曰廥芻稿藏音工外翻皓大懼以板藉地一夕九徙又掘皓父冢斷取其頭斷丁管翻標之於市皓求捕不獲憤恚嘔血死恚於避翻不韋遇赦還家乃葬父行喪張奐素睦於蘇氏而段熲與皓善熲辟不韋為司隸從事不韋懼稱病不詣熲怒使從事張賢就家殺之先以鴆與賢父曰若賢不得不韋便可飲此賢遂收不韋並其一門六十餘人盡誅之熹平元年勃海王悝之貶癭陶也悝苦回翻癭於郢翻因中常侍王甫求復國許謝錢五千萬既而桓帝遺詔復悝國悝復國事見上卷永康元年不青還謝錢中常侍鄭颯中黃門董騰數與悝交通颯音立數所角翻甫密司察以告段熲司讀曰伺冬十月收颯送北寺獄使尚書令廉忠誣奏颯等謀迎立悝大逆不道遂詔冀州刺史收悝考實迫責悝令自殺妾十一人子女七十人伎女二十四人皆死獄中伎渠綺翻傅相以下悉伏誅甫等十二人皆以功封列侯熹平元年十一月會稽妖賊許生起句章句章縣屬會稽郡賢曰故城在越州鄮縣西十三州志曰句踐之地南至句無其後併吳因大城之章霸功以示子孫故曰句章妖於驕翻句音章句之句衆以萬數遣揚州刺史臧旻丹陽太守陳寅討之熹平元年十二月司徒許栩罷以大鴻臚袁隗為司徒隗五罪翻考異曰袁紀在四年今從范書熹平元年鮮卑寇並州熹平元年是歲單于車兒死子屠特若尸逐就單于立車昌遮翻二年熹平二年春正月大疫熹平二年丁丑司空宗俱薨熹平二年二月壬午赦天下熹平二年以光祿勳楊賜為司空熹平二年三月太尉李咸免熹平二年夏五月以司隸校尉段潁為太尉熹平二年六月北海地震熹平二年秋七月司空楊賜免以太常潁川唐珍為司空珍衡之弟也熹平二年冬十二月太尉段熲罷熹平二年鮮卑寇幽並二州熹平二年癸酉晦日有食之三年熹平三年春二月己巳赦天下熹平三年以太常東海陳耽為太尉熹平三年三月中山穆王暢薨無子國除暢中山簡王焉之曾孫焉光武子考異曰本傳云子節王稚嗣無子國除與帝紀異未知孰是又不知稚薨在何年今且從帝紀熹平三年夏六月封河間王利子康為濟南王奉孝仁皇祀帝入繼大宗故以康奉孝仁皇祀利帝從兄弟也濟子禮翻熹平三年吳郡司馬富春孫堅召募精勇得千餘人助州郡討許生百官志郡有丞長史而無司馬蓋是時以盜起置司馬以主兵也富春縣屬吳郡賢曰今杭州富陽縣也避晉簡文帝母鄭太后諱改曰富陽十一月張月下脫堅從二字臧旻陳寅大破生於會稽斬之會工外翻熹平三年任城王博薨無子國絶桓帝延熹四年博紹封任城國熹平三年十二月鮮卑入北地太守夏育率屠各追擊破之守式又翻夏戶雅翻屠直於翻遷育為護烏桓校尉鮮卑又寇並州熹平三年司空唐珍罷以永樂少府許訓為司空永樂少府董太后宮官也樂音洛四年熹平四年春三月詔諸儒正五經文字命議郎蔡雍為古文篆隸三體書之刻石立于太學門外雒陽記曰太學在雒陽城南開陽門外講堂長十丈廣二丈堂前石經四部本碑凡四十六枚西行尚書周易公羊傳十六碑存十二碑毀南行禮記十五碑悉崩壞東行論語三碑毀禮記碑上有諫議大夫馬日磾議郎蔡雍名古文科斗書也篆大篆也隸今謂之八分書後魏江式曰伏義氏作而八卦形其畫軒轅氏興而靈龜彰其采古史蒼頡覽二象之爻觀鳥獸之迹別創文字以代結繩迄於三代厥體頗異雖依類取制未能殊蒼氏矣周禮保氏教國子以六書一曰指事二曰象形三曰形聲四曰會意五曰轉注六曰假借蓋是史頡之遺法及宣王太史史籀著大篆十五篇與古文或同或異時人即謂之籀書孔子修六經左丘明述春秋皆以古文七國殊軌文字乖別秦兼天下李斯奏罷不合秦文者斯作蒼頡篇車府令趙高作爰歷篇太史令胡母敬作博學篇皆取史籀或頗有省改所謂小篆者也秦燒經書滌除舊典官獄繁多以趣約易始用隸書古文由此息矣隸書者始皇使下杜人程邈附於小篆所作也世人以邈徒隸即謂之隸書故秦有八體一曰大篆二曰小篆三曰符書四曰蟲書五曰摹印六曰署書七曰殳書八曰隸書漢興有尉律學教以籀書又習八體又有草書莫知誰始其書形雖無厥誼亦是一時之變通也孝宣時召通蒼頡讀者獨張敞從受之涼州刺史杜業沛人爰禮講學大夫秦近亦能言之孝平時徵禮等百餘人説文字於未央宮中黃門侍郎揚雄採以作訓纂亡新居攝使大司馬甄豐校文字之部頗改定古文時有六書一曰古文孔子壁中書也二曰奇字即古文而異者三曰篆書云小篆也四曰佐書秦隸書也五曰繆篆所以摹印也六曰鳥蟲所以書幡信也壁中書者魯恭王壞孔子宅而得尚書春秋論語孝經也又北平侯張蒼獻春秋左氏傳書體與孔氏相類即前代之古文矣後漢郎中扶風曹喜號曰工篆小異斯法而甚精巧自是後學皆其法也又詔侍中賈逵修理舊文殊藝異術王教一端苟有可以加於國者靡不悉集逵即汝南許慎古學之師也慎嗟時人之好奇歎俗儒之穿鑿撰説文解字十五篇類聚㣥分雜而不越最可得而論也左中郎將陳留蔡雍採李斯曹喜之法為古今雜形詔於太學立石碑刊載五經題書楷法多是雍書後開鴻都書畫奇能莫不雲集時諸方獻篆無出雍者魏初博士清河張揖著埤蒼廣雅古今字詁綴拾遺漏增長事類抑於文為益然其字詁方之許篇古今體用或得或失陳留邯鄲淳亦與揖同時善倉雅許氏字指八體六書精究間理有名於揖又建三字石經於漢碑西較之説文篆隸大同而古字小異又有京兆韋誕河東衛覬二家並號能篆當時臺觀榜題寶器之銘悉是誕書咸傳之字孫世稱其妙晉世義陽王典祠令呂忱表上字林六卷尋其況趣附託許慎説文而按偶章句隱別古籀奇惑之字文得正隸不差篆意也忱弟靜別放故左校令李登聲類之法作韻集五卷使宮商籥彔徵羽各為一篇而文字與兄便是魯衛音讀楚夏時有不同皇魏承百王之季世易風移文字改變篆形繆錯隸體失真俗學鄙習復加虛造巧談辨士以意為疑炫惑於時難以釐改乃曰追來為歸巧言為辨小免為需兔神蟲為蠶如斯甚衆皆不合孔氏古書史籀大篆許氏説文石經三字也式言字學本末頗詳故備著之趙明誠金石録曰石經蓋漢靈帝熹平四年所立其字則蔡雍小字八分書也後漢書儒林傳敘云為古文篆隸三體者非也蓋雍所書乃八分而三體石經乃魏時所建也洪氏隸續曰石經見於范史帝紀及儒林宦者傳皆云五經蔡雍張馴傳則曰六經惟儒林傳云為古文篆隸三體書法酈氏水經云漢立石經於太學魏正始中又刻古文篆隸三字石經唐志有三字石經古篆兩種曰尚書曰左傳獨隋志所書異同其目有一字石經七種三字石經三種既以七經為蔡雍書矣又云魏立一字石經乃其誤也范蔚宗時三體石經與熹平所鐫並列於學官故史筆誤書其事後人襲其言為錯或不見石刻無以考正趙氏雖以一字為中郎所書而未見三體者歐陽氏以三體為漢碑而未嘗見一字者近世方勺作泊宅編載其弟陶所跋石經亦為范史隋志所惑指三體為漢字至公羊碑有馬日磾等名乃云世用其所正定之本因存其名可謂謬論北史江式云魏邯鄲淳以書教皇子建三字石經於漢碑西按此碑以正始年中立漢書云元嘉元年度尚命邯鄲淳作曹娥碑時淳已弱冠自元嘉至正始亦九十餘年式以三字為魏碑則是謂之邯鄲淳所書非也碑始立其觀視及摹寫者車乘日千餘兩填塞街陌乘繩證翻兩音亮塞悉則翻熹平四年初朝議以州郡相黨人情比周比毗至翻下同乃制昏姻之家及兩州人士不得對相監臨監古銜翻至是復有三互法賢曰三互謂婚姻之家及兩州人不得交互為官也復扶又翻下同選用艱難幽冀二州久缺不補蔡雍上疏曰伏見幽冀舊壤鎧馬所出賢曰鎧甲也周禮考工記曰燕無函函亦甲也言幽燕之地家家皆能為函故無函匠也左傳曰冀之北土馬之所生漸至空耗今者闕職經時吏民延屬比毗至翻延屬者延頸而屬望也屬之欲翻而三府選舉踰月不定臣怪問其故云避三互十一州有禁當取二州而已又二州之士或復限以歲月復扶又翻下同狐疑遲淹兩州懸空萬里蕭條無所管繫愚以為三互之禁禁之薄者今但申以威靈明其憲令對相部主冀州之人刺幽州幽州之人刺冀酬是為對相部主況乃三互何足為嫌昔韓安國起自徒中韓安國梁人坐法抵罪梁內史缺天子遣使拜為梁內史起徒中為二千石朱買臣吳人家貧賣薪以自給後隨計吏至長安拜會稽太守還守本邦豈復顧循三互繫以末制乎臣願陛下上則先帝蠲除近禁其諸州刺史器用可換者無拘日月三互以差厥中朝廷不從臣光曰叔向有言國將亡必多制左傳叔向詒子産書之言也謹擇忠賢而任之凡中外之臣有功則賞有罪則誅無所阿私法制不煩而天下大治治直吏翻所以然者何哉執其本故也及其衰也百官之任不能擇人而禁令益多防間益密有功者以閡文不賞閡與礙同上下勞擾而天下大亂所以然者何哉逐其末故也孝靈之時刺史二千石貪如豺虎暴殄蒸民而朝廷方守三互之禁以今視之豈不適足為笑而深可為戒哉熹平四年封河間王建孫他為任城王他帝從兄弟之子也他徒河翻任音壬熹平四年夏四月郡國七大水熹平四年五月丁卯赦天下熹平四年延陵園災延陵成帝陵也熹平四年鮮卑寇幽州熹平四年六月弘農三輔螟熹平四年于填王安國攻拘彌大破之殺其王置徒賢翻戊己校尉西域長史各發兵輔立拘彌侍子定興為王人衆裁千口五年熹平五年夏四月癸亥赦天下熹平五年益州郡夷反太守李顒討平之顒魚容翻熹平五年大雩熹平五年五月太尉陳耽罷以司空許訓為太尉熹平五年閏月永昌太守曹鸞上書曰夫黨人者或耆年淵德或衣寇英賢皆宜股肱王室左右大猷者也而久被禁錮辱在塗泥被皮義翻謀反大逆尚蒙赦宥黨人何罪獨不開恕乎所以災異屢見見賢遍翻水旱荐臻皆由於斯宜加沛然以副天心帝省奏大恕省悉井翻即詔司隸益州檻車收鸞送槐里獄掠殺之永昌郡屬益州刺史而扶風槐里縣屬司隸蓋詔益州收鸞而司隸送槐里獄掠音亮悉免官禁錮爰及五屬賢曰謂斬衰齊衰小功大功緦麻也熹平五年六月壬戌以太常南陽劉逸為司空熹平五年秋七月太尉許訓罷以光祿勳劉寬為太尉熹平五年冬十月司徒袁隗罷十一月兩戌以光祿大夫楊賜為司徒熹平五年是歲鮮卑寇幽州六年熹平六年春正月辛丑赦天下熹平六年夏四月大旱七州蝗令三公條奏長吏苛酷貪污者罷免之平原相漁陽陽球坐嚴酷徵詣廷尉姓譜齊入遷陽子孫以國為氏一曰周景王封少子於陽樊因邑命氏考異曰本傳司空張皓條奏按皓光和元年為太尉未嘗為司空球光和元年陷蔡雍時已為將作大匠不知被徵果在何年唯熹平五年六年大旱故附於此球傳云九江山賊起三府上球有理姦才拜九江太守球到設方略凶賊殄破拜議郎熹平六年鮮卑寇三邊鮮卑強盛東西北三邊皆被寇也熹平六年市賈小民相聚為宣陵孝子者數十人詔皆除太子舍人宣陵桓帝陵百官志太子舍人秩二百石更直宿衛如三署郎中賈音古熹平六年秋七月司空劉逸免以衛尉陳球為司空熹平六年初帝好文學好呼到翻自造皇義篇五十章因引諸生能文賦者並待制鴻都門下後諸為尺牘及工書鳥篆者賢曰説文曰贖書板也長二尺藝文志曰六體者古文奇字篆書隸書繆篆蟲書音議曰古文謂孔子壁中書也奇字即古文而異者也篆書謂小篆蓋秦始皇使程邈所作也隸書亦程邈所獻主於徒隸從簡易也繆篆謂其文屈曲纏繞所以摹印章蟲書謂為蟲鳥之形所以書幡信也遂至數十人侍中祭酒樂松賈護多引無行趣勢之徒置其間百官志侍中有僕射一人中興轉為祭酒行下孟翻趣七喻翻喜許記翻帝甚悅之待以不次之位又久不親行郊廟之禮會詔㣥臣各陳政要蔡雍上封事曰夫迎氣五郊清廟祭祀養老辟雍迎氣五郊及養老辟雍注並見四十四卷明帝永平二年漢宗廟一歲五祀春以正月夏以四月秋以七月冬以十月及臘祖宗所祗奉也而有司數以蕃國疏喪宮內産生及吏卒小汙疏喪謂疏屬之喪也賢曰小汙謂病及死也數所角翻忘禮敬之大任禁忌之書拘信小故以虧大典自今齋制宜如故典漢制凡齋天地七日宗廟山川五日小祀三日齋日內有汙染解齋副倅行禮先齊一日有汙穢災變齋祀如儀妖於驕翻又古者取士必使諸侯歲貢尚書大傳曰古者諸侯之於天子三歲一貢士郡舉孝廉又有賢良文學之選於是名臣輩出文武並興漢之得人數路而已賢曰數路謂孝廉賢良文學之類也才之小者匡國治政未有其能治直之翻下同陛下即位之初先涉經術聽政餘日觀省篇章省悉井翻聊以遊意當代博奕非以為教化取士之本而諸生競利作者鼎沸其高者頗引經訓風喻之言下則連偶俗語有類俳優或竊成文虛冒名氏臣每受詔於盛化門差次録第其未及者亦復隨輩皆見拜擢既加之恩難復收改但守奉祿於義已弘不可復使治民復扶又翻及在州郡昔孝宣會諸儒於石渠事見二十七卷甘露三年事見四十六卷建初四年其事優大文武之道所宜從之若乃小能小善雖有可觀孔子以為致遠則泥君子固當志其大者賢曰子夏曰雖小道必有可觀者焉致遠恐泥鄭玄注云小道如今諸子書也泥謂滯陷不通雍以為孔子之言當別有所據也泥乃計翻前一切以宣陵孝子為太子舍人臣聞孝文皇帝制喪服三十六日事見十四卷文帝後七年父子至親公卿列臣受恩之重皆屈情從制不敢踰越今虛偽小人本非骨肉既無幸私之恩又無祿仕之實惻隱之心義無所依至有姦軌之人通容其中桓思皇后祖載之時鄭玄曰祖謂將葬祖祭於庭載謂升柩於車也亡在孝中本縣追捕乃伏其辜虛偽雜穢難得勝言勝音升太子官屬宜搜選令德豈有但取丘墓凶醜之人其為不祥莫與大焉言雖他有不祥莫與比並大也以明詐偽書奏帝乃親迎氣北郊及行辟雍之禮又詔宣陵孝子為舍人者悉改為丞尉焉漢縣置丞尉丞署文書典知倉獄尉主盜賊熹平六年護烏桓校尉夏育上言校戶教翻夏戶雅翻上時掌翻鮮卑寇邊自春以來三十餘發請徵幽州諸郡兵出塞擊之一冬二春必能禽滅先是護羌校尉田晏坐事論刑先悉薦翻被原被皮義翻欲立功自效乃請中常侍王甫求得為將甫因此議遣兵與育並力討賊帝乃拜晏為破鮮卑中郎將大臣多有不同乃召百官議於朝堂蔡雍議曰征討殊類所由尚矣然而時有同異勢有可否故謀有得失事有成敗不可齊也夫以世宗神武將帥良猛財賦充實所括廣遠數十年間官民俱匱猶有悔焉謂輪臺哀痛之詔也事劣昔時乎自胸奴遁逃鮮卑強盛據其故地事見四十七卷和帝永元五年才力徑健意智益生加以關塞不嚴禁網多漏精金良鐵皆為賊有漢人逋逃為之謀主兵利馬疾過於胸奴昔段熲良將習兵善戰有事西羌猶十餘年段熲自桓帝延熹二年擊西羌至建寧二年始成功凡十一年晏才策未必過熲鮮卑種衆不弱曩時種章勇翻而虛計二載載子亥翻自許有成若禍結兵連豈得中休當復徵發衆人轉運無已復扶又翻是為耗竭諸夏並力蠻夷夫邊垂之患手足之疥搔中國之困胸背之瘭疽賢曰疥音介搔新到翻埤蒼曰瘭必燒翻杜預注左傳曰疽惡瘡也方今郡縣盜賊尚不能禁況此醜虜而可伏乎昔高祖忍平城之恥呂后棄慢書之詬詬古候翻恥也方之於今何者為盛天設山河秦築長城漢起塞垣所以別內外異殊俗也別彼列翻苟無蹙國內侮之患則可矣蹙與蹙同蟻與蟻同雖或破之豈可殄盡而方令本朝為之旰食乎為于偽翻下同旰晚也音古按翻昔淮南王安諫伐越曰如使越人蒙死以逆執事廝輿之卒有一不備而歸者前書音義曰廝微也輿衆也雖得越王之首猶為大漢羞之而欲以齊民易醜虜皇威辱外夷就如其言猶已危矣況乎得失不可量邪量音良帝不從八月遣夏育出高柳田晏出雲中胸奴中郎將臧旻率南單于出鴈門各將萬騎三道出塞二千餘里檀石槐命三部大人各帥衆逆戰檀石槐分其國為三部見五十五卷桓帝延熹九年帥讀曰率喪其節傳輜重喪息浪翻傳株戀翻重直用翻各將數十騎奔還死者什七八三將檻車徵下獄下遐稼翻贖為庶人熹平六年冬十月癸丑朔日有食之熹平六年太尉劉寬免熹平六年辛丑京師地震熹平六年十一月司空陳球免熹平六年十二月甲寅以太常河南孟為太尉音乙六翻熹平六年庚辰司徒楊賜免熹平六年以太常陳耽為司空熹平六年遼西太守甘陵趙苞到官遣使迎母及妻子垂當到郡道經柳城杜佑曰漢遼西郡故城在盧龍城東柳城縣屬遼西郡賢曰故城在今營州南鈔楚交翻苞母及妻子遂為所劫質質音致劫以為質也載以擊郡苞率騎二萬與賊對陳陳讀曰陳賊出母以示苞苞悲號謂母曰為子無狀欲以微祿奉養朝夕不圖為母作禍號戶刀翻養羊亮翻為于偽翻昔為母子今為王臣義不得顧私恩毀忠節唯當萬死無以塞罪塞悉則翻母遙謂曰威豪趙苞字威豪何得相顧以虧忠義爾其勉之苞即時進戰賊悉摧破其母妻皆為所害苞自上歸葬自上奏乞歸葬也上時掌翻封鄃侯鄃音輸苞葬訖謂鄉人曰食祿而避難非忠也難乃旦翻殺母以全義非孝也如是有何面目立於天下遂歐血而死光和元年戊午一七八是年三月改元熹平六年春正月合浦交趾烏滸蠻反滸呼古翻招引九真日南民攻沒郡縣熹平六年太尉孟罷熹平六年二月辛亥朔日有食之熹平六年癸丑以光祿勳陳國袁滂為司徒熹平六年己未地震熹平六年置鴻都門學其諸生皆敕州郡三公舉用辟召或出為刺史太守入為尚書侍中有封侯賜爵者賜爵關內侯以下也熹平六年三月辛丑赦天下改元熹平六年以太常常山張皓為太尉皓中常侍奉之弟也熹平六年夏四月丙辰地震熹平六年侍中寺雌雞化為雄熹平六年司空陳耽免以太常來豔為司空熹平六年六月丁丑有黑氣墮帝所御溫德殿東庭中長十餘丈似龍長直亮翻熹平六年秋七月壬子青虹見玉堂後殿庭中洛陽宮殿名南宮有玉堂前後殿見賢遍翻洛陽記曰南宮有崇德殿太極殿殿西有金商門消復者消變而復其常也春秋讖曰天投霓天下怨海內亂春秋演孔圖曰霓者斗之亂精也失度投霓見郭璞注爾雅曰雙出色鮮盛者為雄曰虹暗者為雌曰霓亦復垂及春秋演孔圖曰劉四百歲之際褒漢王輔皇王以期有名不就宋均注曰雖褒族人為漢王以自輔以當有應期名見攝録者故名不就也復扶又翻媵以證翻朝直遙翻欺罔日月又鴻都門下招會㣥小造作賦説見寵於時更相薦説更工衡翻旬月之間並各拔擢樂松處常伯任芝居納言常伯侍中納言尚書處昌呂翻姓譜郤晉卿郤氏之後畝古畝字身蹈絶俗之行行下孟翻棄捐溝壑不見逮及冠履倒易陵谷代處幸賴皇天垂象譴告周書曰天子見怪則修德諸侯見怪則修政卿大夫見怪則修職士庶人見怪則修身此逸書也遠于願翻速徵鶴鳴之士易曰鶴鳴在陰其子和之我有好爵吾與爾靡之繫辭曰君子居室言善則千里之外應之鶴鳴之士言士之修身踐言為時所稱者也斷丁管翻抑止槃遊冀上天還威衆變可弭議郎蔡雍對曰臣伏思諸異皆亡國之怪也天於大漢殷勤不已故屢出祆變以當譴責祆與妖同於驕翻欲令人君感悟改危即安今霓墮雞化皆婦人干政之所致也前者乳母趙嬈貴重天下嬈奴鳥翻讒諛驕溢續以永樂門史霍玉永樂門史董太后宮官樂音洛又為姦邪今道路紛紛復云有程大人者宮中耆宿皆稱中大人復扶又翻將為國患宜高為隄防明設禁令深惟趙霍以為至戒今太尉張皓為玉所進光祿勳偉璋有名貪濁偉姓璋名玹音玄屯騎校尉蓋升蓋古合翻並叨時幸榮富優足宜念小人在位之咎退思引身避賢之福伏見廷尉郭禧純厚老成光祿大夫橋玄聰達方直故太尉劉寵忠實守正並宜為謀主數見訪問數所角翻夫宰相大臣君之四體委任責成優劣已分不宜聽納小吏雕琢大臣也賢曰雕琢謂鐫削以成其罪也尚方工技之作續漢志尚方掌上手工作御刀劍諸好器物技巨綺翻可且消息以示惟憂惟思也士之高選近者以辟召不慎切責三公而今並以小文超取選舉開請託之門違明王之典衆心不厭賢曰厭伏也音一葉翻莫之敢言臣願陛下忍而絶之思惟萬機以答天望聖朝既自約厲左右近臣亦宜從化人自抑損以塞咎戒塞悉則翻則天道虧滿鬼神福謙矣易曰天道虧盈而益謙鬼神害盈而福謙以盈為滿者避惠帝諱也上有漏言之戒下有失身之禍易曰君不密是失臣臣不密則失身無使盡忠之吏受怨姦仇章奏帝覽而歎息因起更衣更工衡翻曹節於後竊視之悉宣語左右語牛倨翻事遂漏露其為雍所裁黜者側目思報初雍與大鴻臚劉郃素不相平臚陵如翻郃古合翻又曷閣翻叔父衛尉質又與將作大匠陽球有隙球即中常侍程璜女夫也璜遂使人飛章言雍質數以私事請託於郃郃不聽雍含隱切志欲相中賢曰中傷也郃古合翻數所角翻中竹仲翻下遐稼翻下是下同詰去吉翻雍上書曰臣實愚戇戇陟降翻不顧後害陛下不念忠臣直言宜加掩蔽誹謗卒至卒讀曰猝便用疑怪臣年四十有六孤特一身得託名忠臣死有餘榮恐陛下於此不復聞至言矣復扶又翻於是下雍質於雒陽獄劾以仇怨奉公議害大臣大不敬棄市誣雍以請託不聽志欲中傷為仇怨奉公之吏三公九卿皆大臣也劾戶概翻又戶得翻中常侍河南呂強愍雍無罪力為伸請為于偽翻帝亦更思其章有詔減死一等與家屬髡鉗徙朔方不得以赦令除陽球使客追路刺雍刺七亦翻客感其義皆莫為用球又賂其部主部主州牧郡守也所賂者反以其情戒雍由是得免熹平六年八月有星孛于天市孛蒲內翻熹平六年九月太尉張皓罷以太常陳球為太尉熹平六年司空來豔薨考異曰袁紀云豔以久病罷今從范書十月以屯騎校尉袁逢為司空熹平六年宋皇后無寵後宮幸姬衆共譖毀勃海王悝宋氏即后之姑也中常侍王甫恐后怨之悝被誅事見上熹平元年悝苦回翻祝職救翻詛莊助翻帝信之遂策收璽綬璽斯氏翻綬音受后自致暴室以憂死父不其鄉侯酆及兄弟並被誅不其縣前漢屬琅邪郡後漢併省為鄉賢曰故城今萊州即墨縣西南蓋其縣之鄉也其音基被皮義翻下同熹平六年丙子晦日有食之尚書盧植上言凡諸黨錮多非其罪可加赦恕申宥回枉又宋后家屬並以無辜委骸橫尸不得斂葬斂力贍翻宜敕收拾以安遊魂又郡守刺史一月數遷宜依黜陟以章能否縱不九載可滿三歲賢曰書曰三載考績三考黜陟幽明孔安國注曰三年考功三考九年能否幽明有別升進其明者黜退其幽者此皆唐堯之法也載子亥翻請謁希求一宜禁塞塞悉則翻選舉之事責成主者又天子之體理無私積宜弘大務蠲略細徵帝不省省悉井翻熹平六年十一月太尉陳球免十二月丁巳以光祿大夫橋玄為太尉熹平六年鮮卑寇酒泉種衆日多種章男翻緣邊莫不被毒被皮義翻熹平六年詔中尚方即尚方也屬少府以勸學者為于偽翻尚書令陽球諫曰臣案松覽等皆出於微蔑蔑者微之甚幾於無也筲竹器容斗二升音所交翻依憑世戚附託權豪俯眉承睫睫即涉翻目毛也徼進明時徼一遙翻或獻賦一篇或鳥篆盈簡賢曰八體書有鳥篆象形以為字也形圖丹青亦有筆不點牘辭不辨心假手請字妖偽百品莫不蒙被殊恩蟬蛻滓濁賢曰説文曰蛻蟬蛇所解皮也音式鋭翻或音他外翻是以有識掩口謂掩口而笑也臣聞圖象之設以昭勸戒欲令人君動鑒得失未聞豎子小人詐作文頌而可妄竊天官垂象圖素者也今太學東觀東觀在南宮觀古玩翻足以宣明聖化願罷鴻之選以銷天下之謗書奏不省省悉井翻熹平六年是歲初開西邸賣官開邸舍於西園因謂之西邸四百石四百萬其以德次應選者半之或三分之一於西園立庫以貯之貯丁呂翻或詣闕上書占令長隨縣好醜豐約有賈占章贍翻長知兩翻賈讀曰價富者則先入錢貧者到官然後倍輸又私令左右賣公卿公千萬鄉五百萬初帝為侯時常苦貧及即位每歎桓帝不能作家居居積也故賣官聚錢以為私藏藏徂浪翻帝嘗問侍中楊奇曰朕何如桓帝對曰陛下之於桓帝亦猶虞舜比德唐堯帝不悅曰卿強項賢曰強項言不低屈也死後必復致大鳥矣大鳥事見五十一卷安帝延光四年復扶又翻震之曾孫也熹平六年南胸奴屠特若尸逐就單于死子呼徵立二年熹平二年春大疫熹平二年三月司徒袁滂免以大鴻臚劉郃為司徒考異曰袁紀二月丁巳滂免劉郃作劉邵今從范書熹平二年乙丑太尉橋玄罷拜太中大夫以太中大夫段熲為太尉玄幼子遊門次為人所劫登樓求貨所謂劫質也司隸校尉河南尹圍守玄家不敢迫玄瞋目呼曰瞋七人翻呼火故翻姦人無狀玄豈以一子之命而縱國賊乎促令攻之玄子亦死玄因上言天下凡有劫質皆並殺之不得贖以財寶開張姦路由是劫質遂絶質音致熹平二年京兆地震熹平二年司空袁逢罷以太常張濟為司空熹平二年夏四月甲戌朔日有食之熹平二年王甫曹節等姦虐弄權扇動內外太尉段熲阿附之節甫父兄子弟為卿校牧守令長者布滿天下所在貪暴校戶教翻守式又翻長知兩翻甫養子吉為沛相尤殘酷凡殺人皆磔尸車上隨其罪目宣示屬縣賢曰罪名也磔陟格翻則以繩連其骨周遍一郡乃止見者駭懼視事五年凡殺萬餘人尚書令陽球常拊髀發憤曰若陽球作司隸此曹子安得容乎既而球果遷司隸甫使門生於京兆界辜榷官財物七千餘萬前書音義曰辜障也榷專也謂障餘人買賣而自取其利榷古嶽翻京兆尹楊彪發其姦言之司隸京兆屬司隸所部賜之子也時甫休沐里舍里舍私第也球詣闕謝恩因奏甫熲及中常侍淳于登袁赦封等罪惡姓譜封夏封父之後音吐嗑翻辛巳悉收甫熲等送雒陽獄及甫子永樂少府萌沛相吉樂音洛球自臨考甫等五毒備極萌先嘗為司隸乃謂球曰父子既當伏誅亦以先後之義少以楚毒假借老父少詩沼翻球曰爾罪惡無狀死不滅責乃欲論先後求假借邪萌乃罵曰爾前奉事吾父子如奴奴敢反汝主乎今日臨厄相擠擠子細翻又則兮翻行自及也球使以土窒萌口箠撲交至箠止蕊翻撲普卜翻父子悉死於杖下熲亦自殺乃僵磔甫尸於夏城門大署榜曰賊臣王甫盡沒入其財産妻子皆徙比景球既誅甫欲以次表曹節等乃敕中都官從事曰中都官從事即都官從事主察舉百官犯法者中興以後專令掊擊貴戚且先去權貴大猾去羌呂翻乃議其餘耳公卿豪右若袁氏兒輩時諸袁以與袁赦同宗貴寵於世何須校尉邪權門聞之莫不屏氣屏必郢翻曹節等皆不敢出沐會順帝虞貴人葬虞貴人順帝母曹節見磔甫尸道次慨然抆淚曰賢曰抆拭也音亡粉翻我曹可自相食何宜使犬舐其汁乎舐池爾翻考異曰袁紀云球會虞貴人葬還入夏城門曹節見謁於道旁球大罵曰賊臣曹節節收淚於車中而有是語今從范書語諸常侍今且俱入勿過里舍也語牛倨翻節直入省白帝曰陽球故酷暴吏前三府奏當免官以九江微功復見擢用事見上建寧六年復扶又翻下同好為妄作好呼到翻不宜使在司隸以騁毒虐帝乃徙球為衛尉時球出謁陵諸陵皆在司部故司隸出謁陵不得稽留尺一球被召急因求見帝章甲十一行本帝下有叩頭二字乙十一行本同張校同退齋校同曰臣無清高之行橫蒙鷹犬之任謂司隸主搏噬姦非猶鷹犬也行下孟翻橫戶孟翻蓋狐狸小醜未足宣示天下願假臣一月必令豺狼鴟梟各服其辜梟堅堯翻叩頭流血殿上呵叱曰衛尉扞詔邪至於再三乃受拜於是曹節朱瑀等權勢復盛節領尚書令郎中梁人審忠上書曰審姓也漢初有審食其陛下即位之初未能萬機皇太后念在撫育權時攝政故中常侍蘇康管霸應時誅殄太傅陳蕃大將軍竇武考其黨與志清朝政朝直遙翻華容侯朱瑀知事覺露禍及其身遂興造逆謀作亂王室撞踏省闥撞直江翻踏與踏同執奪彌璽綬迫脅陛下聚會㣥臣離間骨肉母子之恩間古莧翻遂誅蕃武及尹勳等因共割裂城社自相封賞事見上卷建寧元年被蒙尊榮被皮義翻素所親厚布在州郡或登九列或據三司九列九卿也三司三公也惟思也多蓄財貨繕修第舍連里竟巷盜取御水以作漁釣賢曰水入宮苑為御水擬於天家天家猶王家也君天也故謂之天家杜口吞聲莫敢有言州牧郡守承順風旨辟召選舉釋賢取愚故蟲蝗為之生夷寇為之起為于偽翻天意憤盈積十餘年故頻歲日食於上地震於下所以以譴戒人主欲令覺悟誅鉏無狀昔高宗以雉雊之變故獲中興之功高宗肜曰有飛雉升鼎耳而雊懼而修德殷以中興發赫斯之怒詩云王赫斯怒雀戈路人士女莫不稱善若除父母之讎誠怪陛下復忍孽臣之類不悉殄滅忍謂含忍也隱忍也孽魚列翻以危其國事見八卷秦二世紀身遘其禍左傳吳伐越獲俘焉以為閽使守舟吳子餘祭觀舟閽以刀弒之赦夷族之罪姦謀一成悔亦何及臣為郎十五年皆耳目聞見瑀之所為誠皇天所不復赦願陛下留漏刻之聽漏之度晝夜百刻留漏刻之聽言少須臾留聽也省悉井翻掃滅醜類以答天怒與瑀考驗有不如言願受湯鑊之誅妻子並徙以絶妄言之路章寢不報中常侍呂強清忠奉公帝以衆例封為都鄉侯強固辭不受因上疏陳事曰臣聞高祖重約非功臣不侯所以重天爵明勸戒也中常侍曹節等宦官祐薄品卑人賤讒諂媚主佞邪徼寵徼一遙翻又古堯翻有趙高之禍未被轘裂之誅賢曰轘裂以車裂也妄授茅土開國承家小人是用易曰開國承家小人勿用重金兼紫賢曰金印紫綬重兼言纍積也重直龍翻下比㣥佞比毗至翻陰陽乖剌剌盧達翻稼穡荒蕪人用不康罔不由茲臣誠知封事已行言之無逮封事謂封爵之事也實願陛下損改既謬從此一止臣又聞後宮采女數千餘人衣食之費日數百金比穀雖賤而戶有飢色比頻寐翻言近者也按法當貴而今更賤者由賦發繁數以解縣官數所角翻賢曰縣官調發既多故賤糶殼以供之解居隘翻發也寒不敢衣飢不敢食民有斯厄而莫之恤宮女無用填積後庭天下雖復盡力耕桑猶不能供復扶又翻下同又前召議郎蔡雍對問於金商門雍不敢懷道迷國蓋引論語迷邦之言不曰邦者避高帝諱毀刺貴臣譏呵宦官陛下不密其言至令宣露㣥邪項領膏唇拭舌賢曰詩曰駕彼四牡四牡項領注云項大也四牡者人所駕今但養大其領不肯為用諭大臣自恣王不能使也膏唇拭舌謂欲讒毀故也造作飛條賢曰飛條飛書也致雍刑罪室家徙放老幼流離豈不負忠臣哉今㣥臣皆以雍為戒上畏不測之難下懼劍客之害賢曰謂陽球使客追刺雍也難乃旦翻故太尉段熲武勇冠世冠古玩翻習於邊事垂髮服戎賢曰垂髮謂童子也歷事二主二主靈帝桓帝陛下既已式序式用也式序者乃敘其功也而為司隸校尉陽球所見誣脅一身既斃而妻子遠播播遷也惆丑鳩翻功臣失望宜徵雍更加授任反熲家屬則忠貞路開衆怨以弭矣帝知其忠而不能用熹平二年丁酉赦天下熹平二年上祿長和海賢曰上祿縣屬武都郡今成州縣姓譜和本自義和之後一云卞和之後禮從祖兄弟別居異財恩義已輕服屬疏末而今黨人錮及五族即乖典訓之文有謬經常之法帝覽之而悟於是黨錮自從祖以下皆得解釋從祖緦麻服從才用翻熹平二年五月以衛尉劉寬為太尉熹平二年護胸奴中郎將張修與南單于呼徵不相能修亶斬之更立右賢王羌渠為單于更工衡翻秋七月修坐不先請而亶誅殺檻車徵詣廷尉死熹平二年初司徒劉郃兄侍中倏與竇武同謀俱死鯈直留翻桓紀作劉倏永樂少府陳球説郃曰賢曰桓帝母孝崇皇后宮曰永樂置太僕少府余據此時帝母孝仁董太后居永樂宮非孝崇后也説輪芮翻公出自宗室位登台鼎天下瞻望社稷鎮衛豈得雷同容容無違而已今曹節等放縱為害而久在左右又公兄侍中受害節等今可表徙衛尉陽球為司隸校尉以次收節等誅之政出聖主天下太平可翹足而待也郃曰凶豎多耳目恐事未會先受其禍尚書劉納曰為國棟梁傾危不持焉用彼相邪論語孔子曰危而不扶顛而不持而將焉用彼相矣焉於虔翻郃許諾亦與陽球結謀球小妻程璜之女由是節等頗得聞知乃重賂璜且脅之璜懼迫以球謀告節節因共白帝曰郃與劉納陳球陽球交通書疏謀議不軌帝大怒冬十月甲申劉郃陳球劉納陽球皆下獄死下遐稼翻熹平二年巴郡板楯蠻反楯食尹翻遣御史中丞蕭瑗督益州刺史討之不克瑗于眷翻熹平二年十二月以光祿勳楊賜為司徒熹平二年鮮卑寇幽並二州三年熹平三年春正月癸酉赦天下熹平三年夏四月江夏蠻反夏戶雅翻熹平三年秋酒泉地震熹平三年冬有星孛于狼弧晉書天文志狼一星在東井東南弧九星在狼東南孛蒲內翻熹平三年鮮卑寇幽並二州熹平三年十二月己巳立貴人何氏為皇后考異曰袁紀在十一月今從范書后本南陽屠家以選入掖庭生皇子辨故立之為何進謀誅宦官敗國亡家張本熹平三年是歲作罼圭靈昆苑賢曰罼圭苑有二東罼圭苑周一千五百步中有魚梁臺西罼圭苑周三千三百步並在雒陽宣平門外先帝之制左開鴻池右作上林不奢不約以合禮中今猥規郊城之地以為苑囿壞沃衍杜預注左傳曰衍沃平美之地也壞音怪驅居民畜禽獸畜許六翻殆非所謂若保赤子之義書曰若保赤子惟民其康乂賢曰陽嘉元年起西苑延熹二年造顯陽苑雒陽宮殿名有平樂苑上林苑桓帝延熹元年置鴻德苑順四節也賢曰逞快也四節謂春搜夏苗秋獮冬狩惟思也書奏帝欲止以問侍中任芝樂松任音壬考異曰范書云中常侍樂松松本鴻都文學必非中常侍袁紀云侍中今從之對曰昔文王之囿百里人以為小齊宣五里人以為大齊宣王問於孟子曰文王之囿方七十里人猶以為小寡人之囿方四十里人以為大何也對曰文王之囿方七十里芻蕘者往焉雉兔者往焉與人同之人以為小不亦宜乎今王之囿殺其麋鹿者如殺人之罪人以為大不亦宜乎此云五里微與孟子異無害於政也帝悅遂為之熹平三年巴郡板楯蠻反熹平三年蒼梧桂陽賊攻郡縣零陵太守楊琁制馬車數十乘以排囊盛石灰於車上賢曰排囊即今囊袋也排音蒲拜翻盛時征翻索昔各翻又為兵車專彀弓弩及戰令馬車居前順風鼓灰賊不得視因以火燒布然馬驚奔突賊陳因使後車弓弩亂發鉦鼓鳴震㣥盜波駭破散波駭者蓋喻以物擊水一波動萬波隨而駭動梟其渠帥梟者斬首而梟之木上也梟堅堯翻帥所類翻荊州刺史趙凱誣奏琁實非身親破賊而妄有其功琁與相章奏凱有黨助遂檻車徵琁防禁嚴密無由自訟乃噬臂出血書衣為章具陳破賊形勢及言凱所誣狀潛令親屬詣闕通之詔書原琁拜議郎凱受誣人之罪琁喬之弟也楊喬見上卷桓帝永康元年容肇祖標點王崇武聶崇岐覆校
