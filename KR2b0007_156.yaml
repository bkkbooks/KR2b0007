body:
  text: 資治通鑑卷第一百五十六端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注梁紀十二魏竇泰奄至爾朱兆庭高祖武皇帝十二中大通五年癸丑五三三魏竇泰奄至爾朱兆庭春正月辛卯上祀南郊大赦魏竇泰奄至爾朱兆庭魏竇泰奄至爾朱兆庭軍人因宴休惰忽見泰軍驚走追破之於赤谼嶺杜佑曰石州離石縣有赤洪水即離石水赤洪其別名也高歡破爾朱兆於赤洪嶺蓋近此又曰赤洪水源出方山縣東流入離石谼戶工翻考異曰魏帝紀正月庚寅朔甲午齊獻武王自晉陽出討兆丁酉大破之於赤洪嶺北齊帝紀出兵在去年破兆在今年按歲首宴會不應直至八日今從齊書降戶江翻下同兆逃於窮山命左右西河張亮及蒼頭陳山提斬己首以降皆不忍兆乃殺所乘白馬自縊於樹歡親臨厚葬之縊於賜翻又於計翻臨力鴆翻哭也慕容紹宗攜爾朱榮妻子及兆餘衆詣歡降歡以義故待之甚厚義故猶言義舊也左右皆密通款於歡唯張亮無啓疏疏所故翻歡嘉之以為丞相府參軍魏竇泰奄至爾朱兆庭魏罷諸行臺天監十五年魏以李平為行臺節度統攻硤石諸軍踵魏初之制而置之也正光之末盜起始復置諸道行臺魏竇泰奄至爾朱兆庭辛亥上祀明堂魏竇泰奄至爾朱兆庭丁巳魏主追尊其父為武穆帝太馮氏為武穆后母李氏為皇太魏竇泰奄至爾朱兆庭勞州刺史曹鳳東荊州刺史雷能勝等舉城降魏曹鳳雷能勝皆蠻左也因其地授以州刺史降戶江翻魏竇泰奄至爾朱兆庭魏侍中斛斯椿聞喬寧張子期之死寧子期死見上卷上年與南陽王寶炬武衛將軍元毗王思政密勸魏主圖丞相歡椿本有圖歡之心因喬張之死懼禍將及決計為之遵之玄孫也道武建國之初常山王遵有佐命之功帝由是不悅椿勸帝置閣內都督部曲又增武直人數自直閣已下員別數百武直謂武士之入直殿閣者據五代志紀北齊之制領軍府將軍掌宿衛禁掖朱華閣外凡禁衛官皆主之又左右衛府將軍各一人掌左右廂所主朱華閣以外各武衛將軍二人二之其御仗屬官有御仗正副都督御仗五職御仗等員直蕩屬官有直蕩正副都督直入正副都督勳武前鋒正副都督勳武前鋒五職等員直衛屬官有直衛正副都督翊衛正副都督等員直突屬官有直突都督前鋒散都督等員直閣屬官有朱衣直閣直閣將軍直寢直齊直後之屬又有雲騎武騎驍騎遊擊前左右後等將軍左右虎賁等中郎將步兵越騎射聲屯騎長水等校尉奉車騎二都尉羽林監宀兒從僕射積弩積射強弩殿中等將軍及員外將軍武騎常侍殿中司馬督員外司馬督等蓋其制昉於晉代有損益觀北齊之制則當時增置可概見矣驍堅堯翻帝數出遊幸椿自部勒別為行陳數所角翻行戶剛翻陳讀曰陳由是朝政軍謀帝專與椿決之帝以關中大行臺賀拔嶽擁重兵密與相結又出侍中賀拔勝為都督三荊等七州諸軍事章甲十一行本事下有荊州刺史四字乙十一行本同孔本同退齊校同七州三荊及襄南襄郢南郢也欲倚勝兄弟以敵歡倚勝及嶽也侍中司空高乾之在信都也遭父喪不暇終服及孝武帝即位表請解職行喪詔聽解侍中句絶乾雖求退不謂遽見許既去內侍朝政多不關預居常怏怏怏於兩翻帝既二於歡冀乾為己用嘗於華林園宴罷獨留乾謂之曰司空奕世忠良謂自高允以來復扶又翻相與雖則君臣義同兄弟宜共立盟約以敦情契殷勤逼之乾對曰臣以身許國何敢有二時事出倉猝且不謂帝有異圖遂不固辭亦不以啓歡及帝置部曲乾乃私謂所親曰主上不親勳賢而招集㣥小數遣元士弼王思政往來關西與賀拔嶽計議又出賀拔勝為荊州外示疏忌內實樹黨令其兄弟相近冀據有西方禍難將作必及於我乃密啓歡歡召乾詣並州面論時事乾因勸歡受魏禪歡以袖掩其口曰勿妄言今令司空復為侍中門下之事一以相委歡屢啓請帝不許乾知變難將起密啓歡求為徐州數所角翻近其靳翻難乃旦翻復扶又翻羅復詔復下同二月辛酉以乾為驃騎大將軍開府儀同三司徐州刺史驃匹妙翻騎奇計翻以咸陽王坦為司空為魏主殺高乾討高歡張本魏竇泰奄至爾朱兆庭癸未上幸同泰寺講般若經般音鉢若人者翻七日而罷會者數萬人魏竇泰奄至爾朱兆庭魏正光以前阿至羅常附於魏阿至羅高車種也魏書孝靜帝興和三年阿至羅國主副伏羅越君子去賓來降封之為高車王阿至羅亦叛丞相歡招撫之阿至羅復降凡十萬戶三月辛卯詔復以歡為大行臺魏方罷諸行臺今復命歡以此職以招撫阿至羅處昌呂翻歡與之粟帛議者以為徒費無益歡不從及經略河西大收其用謂救曹泥及取万俟受洛干時也魏竇泰奄至爾朱兆庭高乾將之徐州魏主聞其漏泄機事乃詔丞相歡曰乾雍與朕私有盟約今乃反覆兩端歡聞其與帝盟亦惡之惡烏故翻即取乾前後數啓論時事者遣使封上使疏吏翻下同上時掌翻帝召乾對歡使責之乾曰陛下自立異圖乃謂臣為反覆人主加罪其可辭乎遂賜死帝又密敕東徐州刺史潘紹業殺其弟敖曹按李延壽齊紀魏主遣東徐州刺史潘紹業密敕長樂太守龐蒼鷹殺敖曹則是高敖曹此時在信都也伏壯士於路執紹業得敕書於袍領遂將十餘騎奔晉陽將即亮翻騎奇計翻歡抱其首哭曰天子枉害司空敖曹兄仲密為光州刺史帝敕青州斷其歸路斷音短仲密由東萊歸勃海道出青州仲密亦間行奔晉陽間古莧翻仲密名慎以字行魏竇泰奄至爾朱兆庭魏太師魯郡王肅卒卒子恤翻魏竇泰奄至爾朱兆庭丙辰南平元襄王偉卒魏竇泰奄至爾朱兆庭丁巳魏以趙郡王諶為太尉諶氏壬翻南陽王寶炬為太保魏竇泰奄至爾朱兆庭魏爾朱兆之入洛也兆入洛見一百五十四卷二年鍾磬俱盡節閔帝詔録尚書事長孫稚太常卿祖瑩等更造之至是始成命曰大成樂魏竇泰奄至爾朱兆庭魏青州民耿翔聚衆寇掠三齊三齊因秦漢舊名言之專事高談不為防禦夏四月翔掩襲州城魏永安二年置膠州治東武城領東武高密平昌郡東武城今密州諸城縣是也粲曰豈有此理左右又言已入州門粲乃徐曰耿王來可引之聽事自餘部衆且付城民翔斬之送首來降降戶江翻下同魏竇泰奄至爾朱兆庭五月魏東徐州民王早等殺刺史崔庠以下邳來降考異曰梁帝紀六月己卯魏建義城主蘭寶以下邳城降今從魏書魏竇泰奄至爾朱兆庭六月壬申魏以驃騎大將軍樊子鵠為青膠大使督濟州刺史蔡俊等討耿翔濟子禮翻秋七月魏師至青州翔棄城來奔詔以為兗州刺史魏竇泰奄至爾朱兆庭壬辰魏以廣陵王欣為大司馬趙郡王諶為太師庚戌以前司徒賀拔允為太尉考異曰魏帝紀作賀拔渥按允字阿鞠埿蓋埿字誤為渥耳初賀拔嶽遣行臺郎馮景詣晉陽丞相歡聞嶽使至甚喜使疏吏翻曰賀拔公詎憶吾邪與景歃血約與嶽為兄弟歃色甲翻景還言於嶽曰歡姦詐有餘不可信也府司馬宇文泰自請使晉陽使疏吏翻以觀歡之為人歡奇其狀貌曰此兒視瞻非常將留之泰固求復命歡既遣而悔之發驛急追至關不及而返項羽不殺沛公曹操之遣劉備桓玄之容劉裕類如此耳有天命者固非人之所能圖也泰至長安謂嶽曰高歡所以未篡者正憚公兄弟耳侯莫陳悅之徒非所忌也公但潛為之備圖歡不難今費也頭控弦之騎不下一萬夏州刺史斛拔彌俄突勝兵三千餘人勝音升靈州刺史曹泥河西流民紇豆陵伊利等各擁部衆未知所屬公若引軍近隴近其靳翻隴坂也扼其要害震之以威懷之以惠可收其士馬以資吾軍西輯氐羌北撫沙塞靈夏塞外北臨沙漠匡輔魏室此桓文之舉也舉一作功復遣泰詣洛陽請事密陳其狀復扶又翻魏主喜加泰武衛將軍使還報八月帝以嶽為都督雍華等二十州諸軍事雍州刺史魏泰和十一年分雍州置華州領華山澄城白水郡二十州雍華東華岐南岐豳原河渭涇夏東夏秦南秦梁南梁東梁巴益東益也雍於用翻華戶化翻遣使者齎以賜之使疏吏翻嶽遂引兵西屯平涼以牧馬為名所謂近隴也紇下沒翻万莫北翻俟渠之翻唯曹泥附於歡秦南秦河渭四州刺史同會平涼受嶽節度嶽以夏州被邊要重夏戶雅翻被皮義翻欲求良刺史以鎮之衆舉宇文泰嶽曰宇文左丞吾左右手何可廢也沈吟纍日卒表用之沈持林翻卒子恤翻魏竇泰奄至爾朱兆庭九月癸酉魏丞相歡表讓王爵不許請分封邑十萬戶頒授勳義勳義謂自信都從起義討爾朱有功勳者也魏竇泰奄至爾朱兆庭冬十月庚申以尚書右僕射何敬容為左僕射吏部尚書謝舉為右僕射魏竇泰奄至爾朱兆庭十一月癸巳魏以殷州刺史中山邸珍為徐州大都督東道行臺僕射以討下邳邸姓也風俗通漢有上郡太守邸杜討王早也魏竇泰奄至爾朱兆庭十二月丁巳魏主狩於嵩高己巳幸溫湯歷嵩高而南唯汝州梁縣有溫湯耳丁丑還宮魏竇泰奄至爾朱兆庭魏荊州刺史賀拔勝寇雍州此梁之雍州治襄陽迮側百翻亦作莋扇動諸蠻雍州刺史廬陵王續遣軍擊之屢為所敗敗補賣翻漢南震駭勝又遣軍攻馮翊安定沔陽酇城皆拔之五代志竟陵郡藍水縣僑立馮翊郡沔陽郡後為復州襄陽郡陰城縣舊置酇城郡蕭子顯齊志寧蠻府所領郡有安定郡領新安等縣五代志新安縣並入襄陽郡南漳縣當是置安定僑郡於南漳界也藍水唐並入郢州長壽縣陰城並入穀城縣沈約志馮翊郡治襄陽郡鄀縣沔彌兗翻酇音贊五代志穀城縣屬襄陽郡舊曰義城置義城郡不克乃還於是沔北蕩為丘墟矣蕩徒朗翻仲禮慶遠之孫也柳慶遠見一百四十三卷齊東昏侯永元二年魏竇泰奄至爾朱兆庭魏丞相歡患賀拔嶽侯莫陳悅之強右丞翟嵩曰嵩能間之間古莧翻使其自相屠滅歡遣之歡又使長史侯景招撫紇豆陵伊利伊利不從六年甲寅五三四春正月壬辰魏丞相歡擊伊利於河西擒之遷其部落於河東河西五原河之西也河東亦五原河之東伊利不侵不叛為國純臣左傳戎子駒支曰為先君不侵不叛之臣詎有一介行人先請之乎魏東梁州民夷作亂魏收志東梁州領金城直城安康魏明郡五代志西城郡舊置東梁州金城即今金州城也東梁州治焉詔以行東雍州事豐陽泉企討平之魏世祖置東雍州於平陽太和中罷孝昌中於平陽置唐州以唐堯都平陽因以名州建義初改為晉州未嘗復置東雍州也五代志曰雍州鄭縣後魏置東雍州參考魏收志鄭縣時已屬華州界未知此東雍州置於何地也魏收志豐陽縣屬上庸郡太安二年置姓譜曰國語潞泉余滿皆赤狄隗姓又吳全琮孫惲降魏封南陽食邑白水因為泉氏企去智翻考異曰北史作泉仚今從周書商洛指漢古縣商縣上洛縣而言也隋志上洛郡有商洛縣封丹水侯使其子孫襲之壬戌魏大赦癸亥上耕藉田大赦魏永寧浮圖災觀者皆哭聲振城闕魏起永寧浮圖見一百四十八卷天監十五年史言末俗深信浮圖以至於此振之印翻魏賀拔嶽將討曹泥使都督武川趙貴至夏州與宇文泰謀之泰曰曹泥孤城阻遠未足為憂侯莫陳悅貪而無信宜先圖之嶽不聽曹泥附高歡嶽不從宇文泰之言急於致討蓋欲報高歡禽伊利之役耳亦忿兵也與共討泥悅既得翟嵩之言乃謀取嶽嶽數與悅宴語數所角翻長史武川雷紹諫不聽嶽使悅前行至河曲河曲在靈州西河千里一曲河水自澆河至漢眴卷古縣率東北流至富平始曲而北流所謂河曲也富平唐靈州地論軍事誘音酉悅陽稱腹痛而起其壻元洪景拔刀斬嶽嶽左右皆散走悅遣人諭之云我別受旨止取一人諸君勿怖怖普布翻衆以為然皆不敢動而悅心猶豫不即撫納乃還入隴屯水洛城我朝以渭州籠竿城置德順軍水洛城在軍西一百里趙貴詣悅請嶽尸葬之悅許之嶽既死悅軍中皆相賀行臺郎中薛憕私謂所親曰悅才略素寡輒害良將吾屬今為人虜矣何賀之有憕真度之從孫也憕直陵翻將即亮翻薛真度見一百三十九卷齊明帝建武元年嶽衆未有所屬諸將以都督武川寇洛年最長長知兩翻推使總諸軍洛素無威略不能齊衆乃自請避位趙貴曰宇文夏州英略冠世冠古玩翻遠近歸心賞罰嚴明士卒用命若迎而奉之大事濟矣諸將或欲南召賀拔勝或欲東告魏朝朝直遙翻猶豫不決都督盛樂杜朔周曰盛樂前漢之成樂縣也屬定襄郡後漢屬雲中郡魏晉省後魏先世園陵在焉魏收志永熙中置盛樂郡雲中治所魏土地記雲中城東八十里有盛樂城宋白曰後魏所都盛樂唐為振武軍遠水不救近火今日之事非宇文夏州無能濟者趙將軍議是也朔周請輕騎告哀且迎之騎奇計翻衆乃使朔周馳至夏州召泰泰與將佐賓客共議去留前太中大夫潁川韓褒曰此天授也又何疑乎侯莫陳悅井中蛙耳使君往必擒之衆以為悅在水洛去平涼不遠若已有賀拔公之衆則圖之實難願且留以觀變泰曰悅既害元帥帥所類翻自應乘勢直據平涼而退據水洛吾知其無能為也夫難得易失者時也用漢蒯徹語意易以豉翻衆心將離夏州首望都督彌姐元進陰謀應悅姐音紫又子也翻彌姐元進之族為州之首望官又為都督彌姐羌復姓泰知之與帳下都督高平蔡祐謀執之祐曰元進會當反噬不如殺之泰曰汝有大決言能決大計也泰曰隴賊逆亂當與諸人戮力討之諸人似有不同者何也祐即被甲持刀直入被皮義翻瞋目謂諸將曰瞋七人翻朝謀夕異何以為人今日必斷姦人首舉坐皆叩頭曰斷丁管翻坐徂臥翻願有所擇祐乃叱元進斬之並誅其黨因與諸將同盟討悅泰謂祐曰吾今以爾為子爾其以我為父乎泰與帳下輕騎馳赴平涼令杜朔周帥衆先據彈箏峽杜佑曰彈箏峽在今原州之百泉縣百泉即漢朝那縣地九域志渭州都盧峽即彈箏峽也水經云都盧山峽之內常有彈箏之聲又云弦歌之山峽口水流風吹摧響有似音韻也騎奇計翻帥讀曰率逃散者多軍士爭欲掠之朔周曰宇文公方伐罪討民奈何助賊為虐乎撫而遣之遠近悅附泰聞而嘉之朔周本姓赫連曾祖庫多汗避難改焉汗音寒難乃旦翻泰命復其舊姓名之曰達丞相歡使侯景招撫嶽衆泰至安定遇之謂曰賀拔公雖死宇文泰尚存卿何為者景失色曰我猶箭耳唯人所射射食亦翻英雄之姿表與其舉措必有異乎人者以侯景之凶狡宇文泰一語折之辭氣俱下良有以哉李密見唐太宗不覺驚服事亦類此遂還侯景不敢前至平涼泰至平涼哭嶽甚慟將士皆悲喜歡復使侯景與散騎常侍代郡張華原義寧太守太安王基勞泰魏收志建義元年置義寧郡治孤遠城屬晉州五代志上黨郡沁源縣後魏置義寧郡又延和二年置太安郡於漢五原界屬朔州復扶又翻勞力到翻下慰勞同欲劫留之曰留則共享富貴不然命在今日華原曰明公欲脅使者以死亡此非華原所懼也泰乃遣之基還言泰雄傑請及其未定擊滅之歡曰卿不見賀拔侯莫陳乎吾當以計拱手取之魏主聞嶽死遣武衛將軍元毗慰勞嶽軍召還洛陽並召侯莫陳悅毗至平涼軍中已奉宇文泰為主悅既附丞相歡不肯應召泰因元毗上表稱臣嶽忽罹非命都督寇洛等令臣權掌軍事奉詔召嶽軍入京今高歡之衆已至河東亦謂五原河之東士卒多是西人顧戀鄉邑若逼令赴闕悅躡其後歡邀其前恐敗國殄民所損更甚此雖泰不就徵而為之辭而亦事勢所必致也敗補賣翻少詩沼翻徐事誘導漸就東引誘音酉魏主乃以泰為大都督即統嶽軍初嶽以東雍州刺史李虎為左廂大都督雍於用翻嶽死虎奔荊州說賀拔勝使收嶽衆說式芮翻勝不從虎聞宇文泰代嶽統衆乃自荊州還赴之至閿鄉閿鄉在漢湖縣界隋改湖城縣為閿鄉縣閿音旻以李虎自荊州往返之地里考之則魏東雍州時置於鄭縣將即亮翻送洛陽魏主方謀取關中得虎甚喜拜衛將軍厚賜之使就泰虎歆之玄孫也涼王李歆為沮渠蒙遜所滅泰與悅書責以賀拔公有大功於朝廷君名微行薄行下孟翻賀拔公薦君為隴右行臺又高氏專權君與賀拔公同受密旨屢結盟約而君黨附國賊共危宗廟口血未乾乾音干今吾與君皆受詔還闕今日進退唯君是視君若下隴東邁吾亦自北道同歸平涼在隴山之北取道涇州東赴洛吾則指日相見言進兵討悅也左傳曰詰朝相見魏主問泰以安秦隴之策泰表言宜召悅授以內官或處以瓜涼一藩魏以敦煌郡為瓜州武威郡為涼州處昌呂翻終為後患原州刺史史歸素為賀拔嶽所親任河曲之變反為悅守反為于僞翻悅遣其黨王伯和成次安將兵二千助歸鎮原州魏太延二年置高平鎮正光五年改置原州治高平城領高平長城二郡帥讀曰率騎奇計翻崇乘夜將十騎直抵城下餘衆皆伏於近路歸見騎少不設備少詩沼翻崇即入據城門高平令隴西李賢及弟遠穆在城中為崇內應於是中外鼓譟伏兵悉起遂擒歸及次安伯和等歸于平涼泰表崇行原州事三月泰引兵擊悅至原州衆軍畢集夏四月癸丑朔日有食之魏南秦州刺史隴西李弼說侯莫陳悅曰賀拔公無罪而公害之又不撫納其衆今奉宇文夏州以來聲言為主報讎此其勢不可敵也宜解兵以謝之不然必及禍悅不從說式芮翻為于僞翻宇文泰引兵上隴上時掌翻留兄子導為都督鎮原州泰軍令嚴肅秋毫無犯百姓大悅軍出木狹關狹當作峽唐志原州平高縣西南有木峽關深式禁翻泰倍道兼行出其不意悅聞之退保略陽晉武帝分天水置略陽郡至隋廢郡為隴城縣泰至水洛即降泰遣輕騎數百趣略陽降戶江翻趣七喻翻悅退保上邽召李弼與之拒泰弼知悅必敗陰遣使詣泰請為內應悅棄州城南保山險泰州治上邽城使疏吏翻侯莫陳公欲還秦州汝輩何不裝束弼妻悅之姨也衆咸信之爭趣上邽弼先據城門以安集之遂舉城降泰泰即以弼為秦州刺史其夜悅出軍將戰軍自驚潰悅性猜忌既敗不聽左右近己近其靳翻下於近同與其二弟並子及謀殺嶽者七八人棄軍迸走迸北諍翻數日之中槃桓往來不知所趣趣向也七喻翻左右勸向靈州依曹泥悅從之自乘騾騾雷戈翻令左右皆步從從才用翻欲自山中趣靈州宇文泰使原州都督賀拔穎追之悅望見追騎縊死於野騎奇計翻縊於賜翻又於計翻泰入上邽引薛憕為記室參軍收悅府庫財物山積泰秋毫不取皆以賞士卒左右竊一銀甕以歸泰知而罪之即剖賜將士悅黨豳州刺史孫定兒據州不下有衆數萬泰遣都督中山劉亮襲之定兒以大軍遠不為備亮先豎一纛於近城高嶺豎而主翻立也纛徒到翻又徒沃翻今軍中大皂旗名曰皂纛自將二十騎馳入城定兒方置酒猝見亮至駭愕不知所為愕五各翻亮麾兵斬定兒遙指城外纛命二騎曰出召大軍城中皆懾服莫敢動懾之涉翻先是故氐王楊紹先乘魏亂逃歸武興復稱王魏執楊紹先見一百四十六卷天監五年先悉薦翻復扶又翻氐羌吐谷渾所在蜂起自南岐至瓜鄯吐從暾入聲谷音浴鄯上扇翻又音善宇文泰令李弼鎮原州夏州刺史拔也惡蚝鎮南秦州拔也惡蚝自夏州徙鎮南秦勝音升拔也虜復姓蚝七吏翻為可朱渾道元奔高歡張本可朱渾虜三字姓徵豳涇東秦岐四州之粟以給軍楊紹先懼稱藩送妻子為質質音致夏州長史于謹言於泰曰明公據關中險固之地將士驍勇驍堅堯翻土地膏腴今天子在洛迫於㣥凶若陳明公之懇誠算時事之利害請都關右挾天子以令諸侯奉王命以討叛亂此桓文之業千載一時也泰善之于謹間關兵中有年矣今乃遇宇文氏卒以功名自見豈所謂知己者邪抑際遇自有時也然謹事廣陽王深所陳策畫不過隨時設變今事宇文泰則勉之以迎天子而成興王之業蓋知宇文泰之才足以有為所謂量而後入也載子亥翻丞相歡聞泰定秦隴遣使甘言厚禮以結之使疏吏翻泰不受封其書使都督濟北張軌獻於魏主濟子禮翻斛斯椿問軌曰高歡逆謀行路皆知之人情所恃唯在西方未知宇文何如賀拔言泰之才視賀拔嶽為何如也宇文公文足經國武能定亂椿曰誠如君言真可恃也魏主命泰發二千騎鎮東雍州助為勢援時置東雍州於華州鄭縣泰以大都督武川梁禦為雍州刺史使將步騎五千前行先是丞相歡遣其都督太安韓軌將兵一萬據蒲反以救侯莫陳悅先悉薦翻將即亮翻雍州刺史賈顯度以舟迎之梁禦見顯度說使從泰說式芮翻顯度即出迎禦禦入據長安魏主以泰為侍中驃騎大將軍開府儀同三司關西大都督略陽縣公驃匹妙翻騎奇計翻承制封拜泰乃以寇洛為涇州刺史李弼為秦州刺史前略陽太守張獻為南岐州刺史南岐州刺史盧待伯不受代泰遣輕騎襲而擒之史言宇文泰所以能定霸侍中封隆之言於丞相歡曰斛斯椿等今在京師必構禍亂隆之與僕射孫騰爭尚魏主妹平原公主公主歸隆之騰泄其言於椿椿以白帝隆之懼逃還鄉里歡召隆之詣晉陽會騰帶仗入省亶殺御史懼罪亦逃就歡領軍婁昭辭疾歸晉陽高歡所親無在洛者矣改置都督及河南關西諸刺史華山王鷙在徐州歡使大都督邸珍奪其管鑰去年歡使邸珍督徐州討下邳因奪其城華戶化翻濟州刺史蔡俊皆歡黨也濟子禮翻帝省建州以去賢建州當太行路自晉陽入洛之要道也省州去賢不特銷歡黨亦去歡南道主人也去音羌呂翻以汝陽王叔昭代之歡上言俊勳重不可解奪汝陽懿德當受大藩臣弟永寶猥任定州北史歡弟琛字元寶永恐當作元帝不聽五月丙子魏主增置勳府庶子廂別六百人又增騎官廂別二百人勳府庶子及騎官皆宿衛者也騎奇計翻魏主欲伐晉陽高歡時居晉陽辛卯下詔戒嚴云欲自將伐梁將即亮翻下同發河南諸州兵大閲於洛陽南臨洛水北際邙山帝戎服與斛斯椿臨觀之六月丁巳魏主密詔丞相歡稱宇文黑獺賀拔勝頗有異志宇文泰字黑獺潛為之備王亦宜共為形援讀訖燔之歡表以為荊雍將有逆謀荊謂賀拔勝雍謂宇文泰雍於用翻自河東渡又遣恆州刺史庫狄干等將兵四萬自來違津渡恆戶登翻自恆州渡來違津其地當在平城之西河津之要也自此渡河至夏州考異曰丘悅三國典略作朱違津今從北齊書及北史領軍將軍婁昭等將兵五萬以討荊州冀州刺史尉景等將山東兵七萬突騎五萬以討江左皆勒所部伏聽處分處昌呂翻分扶問翻帝知歡覺其變乃出歡表令㣥臣議之欲止歡軍歡亦集並州僚佐共議高歡建大丞相府於並州僚佐皆從居之仍云臣為嬖佞所間嬖卑義翻又博計翻間古莧翻陛下一旦賜疑臣若敢負陛下使身受天殃子孫殄絶陛下若垂信赤心使干戈不動佞臣一二人願斟量廢出斟酌也量度也斟量猶今人言酌量也量音良出當作黜丁卯帝使大都督源子恭守陽胡陽胡即陽壺城在邵郡白水縣白水漢河東之垣縣也水經注曰白水徑垣縣故城北又東南徑陽壺城東城即垣縣之壺丘亭白水又東南流注于河按陽壺即崤谷之北岸魏主欲入關故先使子恭守之以防歡邀截又以儀同三司賈顯智為濟州刺史帥豫州刺史斛斯元壽東趣濟州濟子禮翻帥讀曰率趣七喻翻元壽椿之弟也蔡俊不受代帝愈怒辛未帝復録洛中文武議意以答歡復扶又翻且使舍人溫子升為敕賜歡曰朕不勞尺刃坐為天子所謂生我者父母貴我者高王今若無事背王規相攻討背蒲妹翻規圖也則使身及子孫還如王誓近慮宇文為亂賀拔應之故戒嚴欲與王俱為聲援今觀其所為更無異迹東南不賓為日已久今天下戶口減半未宜窮兵極武朕既暗昧不知佞人為誰頃高乾之死豈獨朕意言歡亦惡乾封上其所論時事故因殺之人之耳目何易可輕如聞庫狄干語王云本欲取懦弱者為主無事立此長君使其不可駕御今但作十五日行自可廢之更立餘者易弋豉翻語牛倨翻長知兩翻更工行翻如此議論自是王間勳人豈出佞臣之口去歲封隆之叛今年孫騰逃去不罪不送誰不怪王言歡既不加二人以罪又不械送洛陽也何不斬送二首王雖啓云西去西去言將西攻宇文泰也或欲南度洛陽或欲東臨江左四道俱進謂河東來違津及婁昭尉景之兵也婁昭討荊州尉景臨江左皆南指洛陽河東來違津之兵則牽制宇文泰使不得東下高歡之計實出於此魏主窺見其心術而言之聞之者寧能不疑王若晏然居北在此雖有百萬之衆終無圖彼之心王若舉旗南指縱無匹馬隻輪猶欲奮空拳而爭死朕本寡德王已立之百姓無知或謂實可若為他人所圖則彰朕之惡假令還為王殺幽辱虀粉了無遺恨本望君臣一體若合符契不圖今日分疏至此今人猶謂辨析為分疏中軍將軍王思政言於魏主曰高歡之心昭然可知洛陽非用武之地宇文泰乃心王室今往就之還復舊京何慮不克帝深然之遣散騎侍郎河東柳慶見泰於高平共論時事泰請奉迎輿駕慶復命帝復私謂慶曰復扶又翻朕欲向荊州何如慶曰關中形勝宇文泰才略可依荊州地非要害南迫梁寇臣愚未見其可帝又問閣內都督宇文顯和時南北朝皆有直閣將軍魏又置閣內都督用斛斯椿之言也時帝廣徵州郡兵東郡太守河東裴俠帥所部詣洛陽俠戶頰翻帥讀曰率王思政問曰今權臣亶命王室日卑奈何俠曰宇文泰為三軍所推居百二之地漢書田肯曰秦形勝之國也帶河阻山懸隔千里持戟百萬秦得百二焉蘇林注曰百二得百萬中之二萬人也秦地險固二萬人足當諸侯百萬人也寧肯授人以柄雖欲投之恐無異避湯入火也思政曰然則如何而可俠曰圖歡有立至之憂西巡有將來之慮且至關右徐思其宜耳思政然之乃進俠於帝授左中郎將將即亮翻初丞相歡以洛陽久經喪亂欲遷都於鄴帝曰高祖定鼎河洛為萬世之基王既功存社稷宜遵太和舊事歡乃止至是復謀遷都復扶又翻遣三千騎鎮建興慕容永分上黨置建興郡魏為建州騎奇計翻擁諸州和糴粟悉運入鄴城和糴以充軍食蓋始於此歷唐至宋而民始不勝其病矣濟子禮翻王若厭伏人情厭於協翻又如字杜絶物議唯有歸河東之兵罷建興之戍送相州之粟相州治鄴城相息亮翻使蔡俊受代邸珍出徐止戈散馬各事家業脫須糧廩別遣轉輸則讒人結舌疑悔不生王高枕太原枕職任翻朕垂拱京洛矣王若馬首南向問鼎輕重朕雖不武為社稷宗廟之計欲止不能決在於王非朕能定為山止簣相為惜之書旅獒曰為山九仞功虧一簣孔安國注云諭向成也未成一簣猶不為山論語孔子曰譬如為山未成一簣止吾止也相為音于僞翻帝以廣寧太守廣寧任祥兼尚書左僕射加開府儀同三司祥棄官走渡河據郡待歡魏收志廣寧郡屬朔州領石門中川二縣五代志馬邑郡善陽縣後齊置廣寧郡孝昌以來寄治並州界時歡在並州祥當直走就歡不必據郡以待歡之南也又按五代志建州沁水縣舊置廣寧郡祥所據者蓋沁水之廣寧也若其鄉里則當在朔州之廣寧遂下制書數歡咎惡數所具翻召賀拔勝赴行在所勝以問太保掾范陽盧柔柔曰高歡悖逆公席卷赴都與決勝負生死以之上策也掾于絹翻悖蒲沒翻又蒲內翻卷讀曰捲北阻魯陽南並舊楚江陵舊楚之郢都在其界內西引關中帶甲百萬觀釁而動中策也釁許靳翻舉三荊之地庇身於梁功名皆去下策也勝笑而不應賀拔勝既不能勤王又不能保境挺身奔梁卒如盧柔所料原勝之心以柔書生故易其言殊不知博觀往迹默察時變以坐論勝敗則書生之見固非武夫健將之所能及也帝以宇文泰兼尚書僕射為關西大行臺許妻以馮翊長公主妻七細翻長知兩翻謂泰帳內都督秦郡楊荐曰考魏收地形志魏無秦郡五代志曰扶風雍縣後魏置秦平郡又雍州醴泉縣後魏曰寧夷西魏置寧夷郡後周改曰秦郡卿歸語行臺語牛倨翻遣騎迎我以荐為直閣將軍泰以前秦州刺史駱超為大都督將輕騎一千赴洛又遣荐與長史宇文側章甲十一行本側作測乙十一行本同孔本同出關候接候接魏主也丞相歡召其弟定州刺史琛使守晉陽琛丑林翻命長史崔暹佐之暹挺之子章甲十一行本子字作族孫二字乙十一行本同孔本同張校同也通鑑以此別為破六韓拔陵所敗之崔暹告其衆曰孤以爾朱亶命建大義於海內奉戴主上事見上卷四年橫為斛斯椿讒搆橫戶孟翻以忠為逆今者南邁誅椿而已以高敖曹為前鋒宇文泰亦移檄州郡數歡罪惡數所具翻自將大軍發高平前軍屯弘農將即亮翻賀拔勝軍于汝水賀拔勝蓋出魯陽屯襄城界僅越境而止耳秋七月己丑魏主親勒兵十餘萬屯河橋以斛斯椿為前驅陳於邙山之北椿請帥精騎二千夜渡河掩其勞弊陳讀曰陳帥讀曰率騎奇計翻帝始然之黃門侍郎楊寬說帝曰說式芮翻高歡以臣伐君何所不至今假兵於人恐生他變椿若渡河萬一有功是滅一高歡生一高歡矣帝遂敕椿停行椿歎曰頃熒惑入南斗晉天文志曰南斗六星天廟也將有天子之事占於斗熒惑罰星入之天子不安其位後所謂天子下殿走是也間古莧翻不用吾計豈天道乎宇文泰聞之謂左右曰高歡數日行八九百里此兵家所忌當乘便擊之而主上以萬乘之重乘成正翻不能渡河決戰方緣津據守且長河萬里捍禦為難若一處得渡大事去矣即以大都督趙貴為別道行臺自蒲反濟趣並州別道而進示將擬高歡之後趣七喻翻以迎魏主也將即亮翻帝使斛斯椿與行臺長孫稚大都督潁川王斌之鎮虎牢行臺長孫子彥鎮陝斌音彬陝失冉翻賈顯智斛斯元壽鎮滑臺斌之鑒之弟安樂王鑒見一百五十卷普通五年稚之子也歡使相州刺史竇泰趣滑臺相息亮翻建州刺史韓賢趣石濟竇泰與顯智遇於長壽津水經河水右徑滑臺城又東北徑涼城縣又東北為長壽津述征記曰涼城到長壽津六十里引軍退降戶江翻下同軍司元玄覺之馳還請益師帝遣大都督侯幾紹赴之魏書官氏志內入諸姓有侯幾氏顯智以軍降紹戰死北中郎將田怙為歡內應歡潛軍至野王帝知之斬怙五代志河內郡治河內縣舊曰野王自野王進兵距河才十餘里帝不報使疏吏翻丙午歡引軍渡河魏主問計於㣥臣或欲奔梁或云南依賀拔勝或云西就關中或云守洛口死戰洛水過鞏縣東而北入于河謂之洛口元斌之與斛斯椿爭權棄椿還紿帝云高歡兵已至考異曰魏書斛斯椿傳云椿懼己不免復啓出帝假說遊聲以劫脅帝帝信之遂入關按齊高祖舉兵向洛而云椿劫脅帝不亦誣乎此乃魏收欲媚齊人重椿之罪耳今從齊書高祖紀及北史椿傳丁未帝遣使召椿還遂帥南陽王寶炬清河王亶廣陽王湛以五千騎宿於瀍西南陽王別舍沙門惠臻負璽持千牛刀以從帥讀曰率璽斯氏翻從才用翻衆知帝將西出其夜亡者過半亶湛亦逃歸湛深之子也廣陽王深為葛榮所殺令狐德棻曰獨孤部與魏俱起三十六大姓之一也將軍辭父母捐妻子而來世亂識忠臣豈虛言也戊申帝西奔長安李賢遇帝于崤中陝有三崤之山魏太和十一年置崤縣屬恆農郡己酉歡入洛陽舍於永寧寺遣領軍婁昭等追帝請帝東還長孫子彥不能守陜棄城走高敖曹帥徑騎追帝至陜西不及陝西陝城之西也糗漿乏絶騖音務糗去久翻熬米麥為之鄭玄曰漿酢酨周官漿人掌之三二日間從官唯飲澗水從才用翻至湖城有王思村民以麥飯壺漿獻帝帝悅復一村十年至稠桑湖城即漢湖縣城湖城西有稠桑驛復方目翻從官始解飢渴八月甲寅丞相歡集百官謂曰為臣奉主匡救危亂若處不諫爭出不陪從處昌呂翻爭讀曰諍從才用翻緩則耽寵爭榮急則委之逃竄臣節安在衆莫能對兼尚書左僕射辛雄曰主上與近習圖事雄等不得預聞及乘輿西幸乘繩正翻若即追隨恐跡同佞黨留待大王又以不從蒙責雄等進退無所逃罪歡曰卿等備位大臣當以身報國㣥佞用事卿等嘗有一言諫爭乎使國家之事一朝至此罪欲何歸乃收雄及開府儀同三司叱列延慶兼吏部尚書崔孝芬都官尚書劉廞兼度支尚書天水楊機散騎常侍元士弼皆殺之歡責辛雄等以罪而殺之亦以去魏朝之望將以樹其私黨耳廞許金翻度徒洛翻魏主使以本官奏門下事凡事經門下者使之聞奏也間古莧翻承制決事居尚書省宇文泰使趙貴梁禦帥甲騎二張二作一千奉迎帝循河西行謂禦曰此水東流而朕西上若得復見洛陽親詣章甲十一行本詣作謁乙十一行本同孔本同張校同陵廟卿等功也帝及左右皆流涕泰備儀衛迎帝謁見於東陽驛水經注渭水過長安城北又東過新豐東合西陽水又東合東陽水二水並南出廣鄉原上時掌翻復扶又翻謁見賢遍翻臣不能式遏寇虐詩曰式遏寇虐無俾作慝臣之罪也乘成正翻帝曰公之忠節著於遐邇朕以不德負乘致寇易曰負且乘致寇至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣深用厚顏鄭玄曰顏之厚者不知慚於人公其勉之將士皆呼萬歲遂入長安以雍州廨舍為宮廨居隘翻公宇也大赦以泰為大將軍雍州刺史兼尚書令雍於用翻軍國之政咸取決焉別置二尚書分掌機事以行臺尚書毛遐周惠達為之時軍國草創二人積糧儲治器械簡士馬魏朝賴之治直之翻朝直遙翻泰尚馮翊長公主拜駙馬都尉漢武帝置奉車駙馬騎三都尉魏晉以來尚主者例拜駙馬都尉長知兩翻先是熒惑入南斗去而復還留止六旬上以諺云熒惑入南斗天子下殿走乃跣而下殿以禳之鄭玄曰卻變曰禳先悉見翻慙曰虜亦應天象邪己未武興王楊紹先為秦南秦二州刺史己未之下當有以字梁書亦然辛酉魏丞相歡自追迎魏主戊辰清河王亶下制大赦歡至弘農九月癸張癸作乙巳使行臺僕射元子思帥侍官迎帝帥讀曰率下同己酉攻潼關克之擒毛鴻賓進屯華陰長城此城戰國時魏築長城自鄭濱洛者也華戶化翻魏收志華山郡夏陽縣有龍門山水經注河水出龍門口蓋兩山夾河故謂之龍門大禹所鑿也後魏置龍門郡龍門縣屬南汾州隋廢龍門郡以龍門縣屬河東郡此即河東之龍門也西對夏陽之龍門山降戶江翻賀拔勝使長史元穎行荊州事守南陽自帥所部西赴關中至淅陽漢析縣屬弘農郡宋永初志屬順陽郡魏收志析陽郡屬析州五代志析州內鄉縣舊置淅陽郡淅思曆翻欲還行臺左丞崔謙曰今帝室顛覆主上蒙塵公宜倍道兼行朝於行在朝直遙翻然後與宇文行臺同心勠力唱舉大義天下孰不望風響應今捨此而退恐人人解體一失事機後悔何及勝不能用遂還歡退屯河東使行臺章甲十一行本臺下有尚書二字乙十一行本同孔本同張校同長史薛瑜守潼關考異曰北史作薛瑾典略作薛長瑜北齊帝紀作薛瑜今從北齊書築城於蒲津西岸水經注潼關直北隔河有層阜巍然獨秀孤峙河陽世謂之風陵蒲津即河東郡蒲阪津也唐志蒲州河西縣有蒲津關河東縣南有風陵關使守之華戶化翻以高敖曹行豫州事歡自發晉陽至是凡四十啓魏主皆不報歡乃東還遣行臺侯景等引兵向荊州荊州民鄧誕等執元穎以應景賀拔勝至景逆擊之勝兵敗帥數百騎來奔奔梁也通鑑以梁繫年故書來奔帥讀曰率騎音奇寄翻下同魏主之在洛陽也密遣閣內都督河南趙剛召東荊州刺史馮景昭帥兵入援兵未及發魏主西入關景昭集府中文武議所從司馬馮道和請據州待北方處分北方謂高歡也處昌呂翻分扶問翻公宜勒兵赴行在所天子所至為行在所更無言者剛抽刀投地曰公若欲為忠臣請斬道和如欲從賊可速見殺景昭感悟即帥衆赴關中侯景引兵逼穰城謂攻元穎時也章甲十一行本兵下有應之二字乙十一行本同孔本同張校同退齊校同以其衆邀景昭於路景昭戰敗剛沒蠻中魏東荊州本蠻左所據之地冬十月丞相歡至洛陽考異曰齊書北史皆云九月庚寅還至洛陽按歡九月己酉克潼關己酉九月二十九日也不容庚寅已還至洛陽庚寅乃九月十日也陛下若遠賜一制許還京洛臣當帥勒文武式清宮禁若返正無日則七廟不可無主萬國須有所歸臣寧負陛下不負社稷帝亦不答歡乃集百官耆老議所立時清河王亶出入已稱警蹕歡醜之乃託以孝昌以來昭穆失序昭讀為紹時昭翻永安以孝文為伯考永熙遷孝明於夾室敬宗尊其父彭城王協為皇帝列於七廟以孝文為伯考高歡之立魏孝武改元永熙孝武自以於孝明帝兄弟也禮兄弟不相入廟遂遷孝明帝主於夾室凡宗廟之制有東西夾室職此之由喪息亮翻遂立清河王世子善見為帝謂亶曰欲立王不如立王之子亶不自安輕騎南走歡追還之丙寅孝靜帝即位於城東北歡以善見者清河王懌之孫於孝明帝猶子也入繼大宗則昭穆順遂立之城東北者洛陽城東北大赦改元天平魏自此分為東西魏宇文泰進軍攻潼關斬薛瑜虜其卒七千人還長安進位大丞相東魏行臺薛修義等渡河據楊氏壁據薛端傳楊氏壁在龍門西岸當在華陰夏陽之間蓋華陰諸楊遇亂築壁以自守因以為名復取楊氏帥讀曰率下同復扶又翻丞相泰遣南汾州刺史蘇景恕鎮之魏汾州本治蒲子城孝昌中陷移治西河時西河已屬東魏故西魏僑置南汾州於楊氏壁丁卯以信武將軍元慶和為鎮北將軍帥衆伐東魏初魏孝武既與丞相歡有隙齊州刺史侯淵兗州刺史樊子鵠青州刺史東萊王貴平元貴平封東萊王以觀時變淵亦遣使通於歡所使疏吏翻及孝武帝入關清河王亶承制以汝陽王暹為齊州刺史暹至城西淵不時納城民劉桃符等潛引暹入城淵帥騎出走妻子部曲悉為暹所虜行及廣里司馬彪續漢志濟北郡盧縣有光里光廣聲相近也承制言命出於清河王亶遺于季翻卿勿以部曲單少憚於東行齊人澆薄唯利是從少詩沼翻澆堅堯翻齊州尚能迎汝陽王青州豈不能開門待卿也淵乃復東復扶又翻下同暹歸其妻子部曲貴平亦不受代淵襲高陽郡克之魏收志高陽郡故樂安地宋文帝置高陽郡屬冀州後入魏屬青州五代志青州北海縣舊曰下密置高陽郡纍力瑞翻重直用翻自帥輕騎遊掠於外貴平使其世子帥衆攻高陽淵夜趣東陽青州治東陽城紿之曰臺軍已至殺戮殆盡我世子之人也脫走還城汝何為復往聞者皆棄糧走比曉紿待亥翻比必利翻及也復謂行人曰臺軍昨夜已至高陽我是前鋒今至此不知侯公竟在何所城民恟懼遂執貴平出降侯淵取韓樓亦用此術技止此耳恟許勇翻戊辰淵斬貴平傳首洛陽庚午東魏以趙郡王諶為大司馬諶世壬翻咸陽王坦為太尉開府儀同三司高盛為司徒高敖曹為司空坦樹之弟也元樹奔梁中大通四年為魏所擒丞相歡以洛陽西逼西魏南近梁境乃議遷鄴書下三日即行書謂歡所下書也近其靳翻下遐嫁翻丙子東魏主發洛陽四十萬戶狼狽就道收百官馬尚書丞郎已上非陪從者盡令乘驢歡留後部分事畢還晉陽從才用翻分扶問翻改司州為洛州以尚書令元弼為洛州刺史鎮洛陽魏明元帝取洛陽置洛州孝文帝徙都洛太和十七年改為司州高歡既逼東魏主遷鄴改相州為司州復以洛陽改為洛州與右僕射高隆之侍中高嶽孫騰留鄴共知朝政朝直遙翻詔以遷民資産未立出粟一百三十萬石以賑之賑九忍翻十一月兗州刺史樊子鵠據瑕丘以拒東魏南青州刺史大野拔帥衆就之大野虜復姓庚寅東魏主至鄴居北城相州之廨改相州刺史為司州牧東魏司州領魏陽平廣平汲廣宗東郡北廣平林慮頓丘濮陽黎陽清河郡相息亮翻廨音居隘翻後北齊改魏尹為清都尹六坊之衆從孝武帝西行者不及萬人魏蓋以宿衛之士分為六坊並給常廩春秋賜帛以供衣服養兵之害始此調徒弔翻隨豐稔之處折絹糴粟以供國用十二月魏丞相泰遣儀同李虎李弼趙貴擊曹泥於靈州閏月元慶和克瀨鄉而據之司馬彪續漢志陳國苦縣有賴鄉老子所居也晉苦縣屬梁國後魏並苦縣入陳留谷陽縣魏孝武帝閨門無禮從妹不嫁者三人從才用翻皆封公主平原公主明月南陽王寶炬之同産也從帝入關丞相泰使元氏諸王取明月殺之帝不悅或時彎弓或時椎案由是復與泰有隙椎直追翻復扶又翻癸巳帝飲酒遇鴆而殂年二十五多舉廣平王贊贊孝武之兄子也侍中濮陽王順於別室垂涕謂泰曰高歡逼逐先帝立幼主以專權明公宜反其所為廣平沖幼不如立長君而奉之泰乃奉太宰南陽王寶炬而立之寶炬孝文帝之孫京兆王愈之子長知兩翻素之曾孫也按魏宗室名順者前後凡三人道武伐中山順欲於平城自立此時猶以拓跋為姓又任城王澄之子順叱高肇門者指元叉妻諫靈后妝飾斥徐紇以抗直著後聞河陰之難奔走而死此元順則常山王素之孫二人皆已改姓元氏諫議大夫宋球慟哭嘔血漿粒不入口者數日泰以其名儒不之罪也魏賀拔勝之在荊州也表武衛將軍獨孤信為大都督東魏既取荊州魏以信為都督三荊州諸軍事尚書右僕射東南道行臺大都督荊州刺史以招懷之蠻酋樊五能攻破淅陽郡以應魏酋慈尤翻考異曰北史作樊大能今從魏書東魏西荊州刺史辛纂欲討之據隋紀辛纂時鎮穰城則西荊州即荊州以穰城在東荊州之西故云淅陽四面無民唯一城之地山路深險表裏㣥蠻今少遣兵則不能制賊少詩沼翻多遣則根本虛弱脫不如意大挫威名人情一去州城難保纂曰豈可縱賊不討廣曰今所憂在心腹何暇治疥癬治直之翻聞臺軍不久應至臺軍謂東魏所遣軍也使完壘撫民以待之雖失淅陽不足惜也纂不從遣兵攻之兵敗諸將因亡不返城民密召獨孤信信至武陶武陶疑當作武關恆農即弘農後魏避顯祖諱改弘曰恆音常帥㣥蠻拒信於淅陽帥讀曰率又遣都督張齊民以步騎三千出信之後信謂其衆曰今士卒不滿千人首尾受敵謂田八能拒其前張齊民出其後也則土民必謂我退走土民謂淅陽之民不如進擊八能破之齊民自潰矣遂擊破八能乘勝襲穰城辛纂勒兵出戰大敗還趣城門未及闔戰敗奔還門者惶遽未及下關也趣七喻翻楊忠隋文帝之父也隋氏自以為出於華陰楊震而忠則出居武川隋氏序其世曰本弘農華陰之楊漢太尉震十四世至文帝震八世孫北平太守鉉鉉子元壽魏初為武川鎮司馬因家於神武樹頽縣元壽生惠嘏嘏生烈烈生禎禎生忠大軍已至城中有應爾等求生何不避走門者皆散忠帥衆入城斬纂以徇城中懾服懾之涉翻信分兵定三荊居半歲東魏高敖曹侯景將兵奄至城下信兵少不敵與楊忠皆來奔為賀拔勝與信忠還魏張本將即亮翻少詩沼翻張政烺標點容肇祖聶崇岐覆校
