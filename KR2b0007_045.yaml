body:
  text: 資治通鑑卷第四十五翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注漢紀三十七永平四年顯宗孝明皇帝下永平四年辛酉六一永平四年春帝近出觀覽城第城雒陽城第宅也賢曰有甲乙之次故曰第河內郡在雒陽北百二十里帝覽奏即還宮永平四年秋九月戊寅千乘哀王建薨無子國除乘繩證翻永平四年冬十月乙卯司徒郭丹司空馮魴免魴音房以河南尹沛國范遷為司徒太僕伏恭為司空恭湛之兄子也永平四年陵鄉侯梁松坐怨望縣飛書誹謗下獄死松嗣父統爵為陵鄉侯縣讀曰懸下遐稼翻初上為太子太中大夫鄭興子衆以通經知名知名者有名於時人皆知之也衆曰太子儲君無外交之義儲副也蕃王不宜私通賓客松曰長者意不可逆衆曰犯禁觸罪不如守正而死遂不往及松敗賓客多坐之唯衆不染於辭永平四年于填王廣德將諸國兵三萬人攻莎車誘莎車王賢殺之填徒賢翻莎素禾翻並其國胸奴發諸國兵圍于填廣德請降胸奴立賢質子不居徵為莎車王質音致廣德又攻殺之更立其弟齊黎為莎車王更工衡翻永平四年東平王蒼自以至親輔政蒼輔政始上卷中元二年意不自安前後纍上疏稱自漢興以來宗室子弟無得在公卿位者乞上驃騎將軍印綬退就藩國辭甚懇切帝乃許蒼還國而不聽上將軍印綬上時掌翻五年五年春二月章十二行本月下有庚戌二字乙十一行本同蒼罷歸藩東平國在雒陽東六百七十二里掾為中大夫令史為王家郎百官志將軍長史一人秩千石掾屬二十九人秩比四百石至比二百石令史及御屬三十一人百石帝特為蒼置掾史員四十人王國太傅秩二千石中大夫比六百石郎二百石掾俞絹翻布十萬匹五年冬十月上行幸鄴是月還宮五年十一月北胸奴寇五原十二月寇雲中南單于擊卻之五年是歲發遣邊民在內郡者賜裝錢人二萬賜錢為辦裝也五年安豐戴侯竇融年老子孫縱誕多不法長子穆尚內黃公主內黃縣屬魏郡令六安侯劉盱去婦以女妻之六安國屬廬江郡賢曰今之廬州按前漢以六安為王國後漢以六安為侯國屬廬江郡賢以唐之廬州為漢之廬江郡可也若漢之六安侯國實在唐壽州界劉昫地理志壽州安豐縣漢六國故城在縣南此為可據此後章帝元和二年徙江陵王恭為六安王以廬江郡為國卻可以用賢注妻七細翻帝大怒盡免穆等官諸竇為郎吏者皆將家屬歸故郡竇氏故扶風平陵人獨留融京師融尋薨後數歲穆等復坐事與子勳宣皆下獄死復扶又翻下遐稼翻久之詔還融夫人與小孫一人居雒陽六年六年春二月王雒山出寶鼎獻之據本紀王雒山在廬江郡甲子詔曰祥瑞之降以應有德方今政化多僻何以致茲易曰鼎象三公三公鼎足承君故云然此蓋易緯之辭其賜三公帛五十匹九卿二千石半之先帝詔書禁人上事言聖見四十二卷光武建武七年上時掌翻自今若有過稱虛譽尚書皆宜抑而不省省悉景翻示不為諂子蚩也蚩笑也六年冬十月上行幸魯十二月還幸陽城陽城縣屬潁川壬午還宮六年是歲南單于適死單于莫之子蘇立為丘除車林鞮單于鞮丁奚翻下同數月復死復扶又翻下同單于適之弟長立為湖邪尸逐侯鞮單于七年七年春正月癸卯皇太后陰氏崩二月庚申葬光烈皇后西京諸后皆從帝諡惟衛思后許恭哀后不以壽終而別追諡之從帝諡而又加一字自陰后始范曄曰漢世皇后皆因帝諡為稱明帝始建光烈之稱其後並以德為配至於賢愚優劣混同一貫賢曰諡法執德遵業曰烈七年北胸奴猶盛數寇邊數所角翻遣使求合市上冀其交通不復為寇許之七年以東海相宗均為尚書令初均為九江太守九江郡在雒陽東南一千五百里悉省掾史閉督郵府內屬縣無事郡有五部督郵監屬縣閉之府內者恐以司察為功能侵擾屬縣適以多事故也九江舊多虎暴常募設檻穽賢曰檻為機以捕獸穽謂穿地陷之均下記屬縣曰夫江淮之有猛獸猶北土之有雞豚也今為民害咎在殘吏而勞勤張捕張設也設為機穽以伺鳥獸曰張裴炎猩猩銘所謂奴欲張我是也其務退姦貪思進忠善可一去檻穽去羌呂翻除削課制其後無復虎患復扶又翻帝聞均名故任以樞機均謂人曰國家喜文法廉吏以為足以止姦也喜許記翻然文吏習為欺謾而廉吏清在一己謾音慢又莫連翻無益百姓流亡盜賊為害也均欲叩頭爭之時未可改也久將自苦之乃可言耳未及言會遷司隸校尉後上聞其言追善之八年八年春正月己卯司徒范遷薨八年三月辛卯以太尉虞延為司徒衛尉趙熹行太尉事八年越騎司馬鄭衆使北胸奴越騎校尉司馬一人秩千石衆不為屈單于圍守閉之不與水火衆拔刀自誓自誓以死不為單于屈也乃更發使隨衆還京師初大司農耿國上言宜置度遼將軍屯五原以防南胸奴逃亡朝廷不從南胸奴須卜骨都侯等知漢與北虜交使內懷嫌怨欲畔胸奴異姓大臣左右骨都侯也又異姓有呼衍氏須卜氏立林氏蘭氏皆胸奴國中名族常與單于婚姻令遣兵迎之鄭衆出塞疑有異伺候果得須卜使人伺相吏翻使疏吏翻乃上言宜更置大將以防二虜交通由是始置度遼營以中郎將吳棠行度遼將軍事將黎陽虎牙營士屯五原曼柏漢官儀曰光武以幽冀兵克定天下故於黎陽立營以謁者監領兵騎千人賢曰昭帝拜范明友為度遼將軍至此復置焉曼柏縣在今勝州銀城縣界八年秋郡國十四大水八年冬十月北宮成八年丙子募死罪繫囚詣度遼營有罪亡命者令贖罪各有差楚王英奉黃縑白紈詣國相曰漢成帝王國省內史令相治民職如太守秩二千石紈今之絹也師古曰紈素也縑並絲絹也相息亮翻託在藩輔過惡纍積歡喜大恩奉送縑帛以贖愆罪國相以聞詔報曰楚王誦黃老之微言尚浮屠之仁慈潔齊三月齊讀曰齋與神為誓何嫌何疑當有悔吝其還贖以助伊蒲塞桑門之盛饌塞悉則翻饌雛戀翻又雛皖翻初帝聞西域有神其名曰佛因遣使之天竺求其道得其書及沙門以來其書大抵以虛無為宗貴慈悲不殺以為人死精神不滅隨復受形生時所行善惡皆有報應故所貴修煉精神以至為佛善為宏闊勝大之言以勸誘愚俗精於其道者號曰沙門於是中國始傳其術圖其形像而王公貴人獨楚王英最先好之袁宏漢紀浮屠佛也西域天竺國有佛道焉佛者漢言覺也將以覺悟㣥生也其教以修善慈心為主不殺生專務清靜其精者為沙門沙門漢言息也蓋息意去欲以歸於無為長丈六尺黃金色初明帝夢見金人長大以問㣥臣或曰西方有神其名曰佛陛下所夢得無是乎於是遣使天竺問其道術而圖其形像焉賢曰伊蒲塞即優婆塞也中國翻為近住言受戒行堪近僧住也桑門即沙門梵云沙門那或曰桑門唐言勤息秦譯云勤行又云善覺魏收曰漢武帝遣霍去病討胸奴獲休屠王金人以為大神列於甘泉宮不祭祀但燒香禮拜而已此則佛道流通之漸也張騫使大夏傳其旁有身毒國一名天竺始聞有浮屠之教哀帝元壽元年博士弟子秦景憲受大月氏王使伊存口授浮屠經中國聞之未信了也後明帝夜夢金人項有白光飛行殿庭乃訪㣥臣傅毅始以佛對帝遣郎中蔡愔等使天竺寫浮屠遺範仍與沙門攝摩騰竺法蘭東還洛陽中國有沙門跪拜之法自此始愔之還以白馬負經而至漢因立白馬寺於洛城雍關西好呼到翻八年壬寅晦日有食之既既盡也極言無諱於是在位者皆上封事各言得失帝覽章深自引咎以所上班示百官上時掌翻詔曰㣥僚所言皆朕之過民冤不能理吏黠不能禁黠下八翻而輕用民力繕修宮宇出入無節喜怒過差永覽前戒竦然兢懼徒恐薄德久而致怠耳人主能切己省察然後能有是言八年北胸奴雖遣使入貢而寇鈔不息鈔楚交翻邊城晝閉帝議遣使報其使者鄭衆上疏諫曰臣聞北單于所以要致漢使者要一遙翻欲以離南單于之衆堅三十六國之心也賢曰武帝開通西域本三十六國余謂堅其心者欲使之專附胸奴誇示鄰敵令西域欲歸化者局足狐疑懷土之人絶望中國耳漢使既到便偃蹇自信信音申若復遣之虜必自謂得謀得謀猶言得計復扶又翻下同賢曰駁議謂勸單于歸漢駁北角翻南庭動搖烏桓有離心矣南單于庭在西河美稷動搖謂欲出塞北去烏桓本附胸奴漢置校尉領護使不得與胸奴交通離心謂其心不親附漢而二於胸奴也具知形勢萬分離析旋為邊害今幸有度遼之衆揚威北垂雖勿報答不敢為患帝不從復遣衆往衆因上言臣前奉使不為胸奴拜為于偽翻下同單于恚恨遣兵圍臣恚於避翻今復銜命必見陵折臣誠不忍持大漢節對氈裘獨拜前書胸奴傳曰自君王以下皆食畜肉衣其皮革被旃裘旃與氈同將有損大漢之強帝不聽衆不得已既行在路連上書固爭之詔切責衆追還繫廷尉會赦歸家其後帝見胸奴來者聞衆與單于爭禮之狀乃復召衆為軍司馬漢制大將軍營五部部校尉一人比二千石軍司馬一人比千石其不置校尉部但軍司馬一人帝召衆為軍司馬使與馬賡擊車師九年九年夏四月甲辰詔司隸校尉部刺史歲上墨綬長吏視事三歲已上治狀尤異者各一人與計偕上及尤不治者亦以聞杜佑曰後漢十三州部司隸治河南今府豫治譙今酇縣兗治昌邑今魯郡金鄉縣徐治郯今臨淮郡下邳縣青治臨淄今北海郡縣涼治隴今天水郡隴城縣並治晉陽今太原府冀治鄗今趙郡鄗縣幽治薊今范陽郡揚治歷陽今郡縣荊治漢壽今武陵郡武陵縣交治廣信今蒼梧郡蒼梧縣漢制千石六百石墨綬三采青赤紺長丈六尺八十首四百石三百石長同此墨綬長吏謂大縣令以下上時掌翻治直吏翻九年是歲大有年穀梁傳曰五穀皆熟書大有年九年賜皇子恭號曰靈壽王黨號曰重熹王賢曰取其美名也九年帝崇尚儒學自皇太子諸王侯及大臣子弟功臣子孫莫不受經又為外戚樊氏郭氏陰氏馬氏諸子立學於南宮號四姓小侯賢曰以非列侯故曰小侯禮記曰庶方小侯亦其義也余據東平王蒼傳送列侯印十九枚諸王子年五歲以上能趨拜者皆令帶之意四姓小侯亦猶是也搜選高能以授其業自期門羽林之士悉令通孝經章句胸奴亦遣子入學九年廣陵王荊復呼相工謂曰我貌類先帝先帝三十得天下我今亦三十可起兵未相者詣吏告之相息亮翻荊惶恐自繫獄帝加恩不考極其事詔不得臣屬吏民唯食租如故恐其復謀不軌故不得臣屬吏民唯食國之租稅荊又使巫祭祀祝詛祝職又翻詛莊助翻詔長水校尉樊鯈等雜治其獄鯈直留翻治直之翻事竟奏請誅荊帝怒曰諸卿以我弟故欲誅之即我子卿等敢爾邪鯈對曰天下者高帝天下非陛下之天下也春秋之義君親無將將而必誅賢曰春秋公羊傳之文也將者將為弒逆之事也帝與荊皆出於陰后加惻隱故敢請耳如令陛下子臣等專誅而已賢曰專謂不請也鯈宏之子也十年十年春二月廣陵思王荊自殺諡法追悔前過曰思十年夏四月戊子赦天下十年閏月甲午上幸南陽召校官弟子作雅樂賢曰校學也戶教翻雅樂注見上奏鹿鳴帝自奏塤篪和之以娛嘉賓鄭玄注周禮云塤燒土為之大如鴈子鄭衆云有六孔世本曰暴辛公作篪以竹為之長尺四寸有八孔孔穎達曰土曰塤竹曰篪周禮小師職作塤古今字異耳釋樂云大塤謂之嘂音叫孫炎曰音大如叫呼也郭璞曰塤燒土為之大如鵝子鋭上平底形似稱鎚六孔小者如雞子釋樂又云大篪謂之沂李巡曰大篪其聲非一也郭璞曰篪以竹為之長尺四寸圍三寸一孔上出徑三分橫吹之小者尺二寸廣雅云八孔鄭司農小師注云篪七孔蓋不數其上出者故七也世本云暴辛公作塤蘇成公作篪譙周古史考云古有塤篪尚矣周幽王時暴辛公善塤蘇成公善篪記者因以為作繆矣釋名塤喧也聲濁喧然塤況袁翻篪音池和戶臥翻幸南頓冬十二月甲午還宮十年初陵陽侯丁綝卒陵陽縣屬丹陽郡綝丑林翻上書稱病讓國於弟盛不報既葬乃挂衰絰於冢廬而逃去衰倉回翻友人九江鮑駿遇鴻於東海東海郡在雒陽東一千五百里昔伯夷吳札亂世權行故得申其志耳賢曰伯夷孤竹君之子讓其弟叔齊季札吳王壽夢之季子也諸兄欲讓以國季子乃舍其室而耕皆是權時所行非常道也伯夷當紂時季札當周末故言亂世也不以家事廢王事春秋衛靈公卒孫輒立父蒯聵與輒爭國公羊傳曰輒者蒯聵之子然則曷為不立蒯聵而立輒蒯聵無道靈公逐之而立輒然則輒之義可以立乎曰可不以父命辭於王父不以家事辭於王事故駿引以為言今子以兄弟私恩而絶父不滅之基可乎鴻感悟垂涕乃還就國鮑駿因上書薦鴻經學至行行下孟翻上徵鴻為侍中十一年十一年春正月東平王蒼與諸王俱來朝月餘還國帝臨送歸宮悽然懷思乃遣使手詔賜東平國中傅曰辭別之後獨坐不樂樂音洛下同因就車歸伏軾而吟瞻望永懷實勞我心誦及采菽以增歎息采菽詩小雅之章也其詩曰采菽采菽筐之筥之君子來朝何錫豫之毛詩注云菽所以芼太牢而待君子羊則苦豕則薇箋云菽大豆也采其葉以為藿三牲牛羊豕芼以藿正義曰傳既言羊則苦豕則薇則菽不總芼三牲而言菽所以芼太牢者舉牛之芼則羊豕之苦薇從可知矣王言為善最樂處昌呂翻樂音洛其言甚大副是要腹矣要讀曰腰蒼腰帶十圍今送列侯印十九枚諸王子年五歲已上能趨拜者皆令帶之十二年十二年春哀牢王柳貌率其民五萬餘戶內附以其地置哀牢博南二縣哀牢夷者九隆種也居牢山絶域荒外山川阻深未嘗通中國西南去雒陽七千里賢曰在今匡州匡州縣西張柬之曰姚州哀牢國地度蘭倉水華陽國志曰博南縣西山高三十里越之得蘭倉水有金沙洗取融為金歌曰漢德廣開不賓度蘭倉為他人為于偽翻十二年初平帝時河汴決壞久而不修建武十年光武欲修之浚儀令樂俊上言民新被兵革未宜興役乃止浚儀縣屬陳留郡被皮義翻日月彌廣兗豫百姓怨歎以為縣官恆興他役不先民急會有薦樂浪王景能治水者樂浪在雒陽東北五千里恆戶登翻先悉薦翻樂浪音洛琅四月詔發卒數十萬遣景與將作謁者王吳修汴渠隄自滎陽東至千乘海口千餘里謁者屬光祿勳王吳以謁者而將作故謂之將作謁者賢曰汴渠即莨蕩渠也汴自滎陽首受河所謂石門在滎陽山北一里過汴以東積石為隄亦號金隄成帝陽嘉中所作也令更相洄注爾雅曰逆流而上曰洄郭璞注云旋流也更工衡翻復扶又翻景雖簡省役費然猶以百億計焉十萬曰億十二年秋七月乙亥司空伏恭罷乙未以大司農牟融為司空風俗通牟子國祝融之後後因氏焉十二年是時天下安平人無徭役歲比登稔百姓殷富粟斛三十牛羊被野比毗至翻被皮義翻十三年十三年夏四月汴渠成河汴分流復其舊迹河汴之隄決壞則汴水東侵而與河合今隄成則河東北入海而汴東南入泗是分流復其舊迹也辛巳帝行幸滎陽巡行河渠行下孟翻遂渡河登太行幸上黨行戶剛翻壬寅還宮十三年冬十月壬辰晦日有食之十三年楚王英與方士作金龜玉鶴刻文字為符瑞男子燕廣姓譜燕召公之後為秦所滅子孫以國為氏燕於賢翻有逆謀事下案驗下遐稼翻有司奏英大逆不道請誅之帝以親親不忍十一月廢英徙丹陽涇縣賢曰今宣州縣賢曰湯沐者取其賦稅以供湯沐之具也食邑如故許太后勿上璽綬留住楚宮許太后者英母許氏上時掌翻先悉薦翻延以英藩戚至親不然其言及英事覺詔書切讓延十四年十四年春三月甲戌延自殺以太常周澤行司徒事頃之復為太常考異曰澤傳云十二年按十二年不闕司徒當是虞延免後邢穆未至間澤行司徒事爾故云數月四月丁巳以巨鹿太守南陽邢穆為司徒巨鹿郡在雒陽北一千一百里邢本周公之胤為衛所滅子孫以國為氏十四年楚王英至丹陽自殺詔以諸侯禮葬於涇封燕廣為折姦侯是時窮治楚獄遂至纍年治直之翻下同其辭語相連自京師親戚諸侯州郡豪桀及考按吏阿附坐死徙者以千數而繫獄者尚數千人初樊鯈弟鮪鯈除留翻鮪于軌翻為其子賞求楚王英女為于偽翻鯈聞而止之曰建武中吾家並受榮寵一宗五侯謂宏封長羅侯弟丹射陽侯兄子尋玄鄉侯族兄忠更父侯宏又封壽張侯也女可以配王男可以尚主賢曰宏為特進即為禍患故不為也且爾一子奈何棄之於楚乎鮪不從及楚事覺鯈已卒上追念鯈謹恪故其諸子皆得不坐英陰疏天下名士上得其録有吳郡太守尹興名吳郡在雒陽東三千二百里掾俞絹翻諸吏不勝掠治勝音升掠音亮治直之翻死者大半惟門下掾陸續主簿梁宏功曹史駟勳備受五毒門下掾在郡門下總録衆事功曹史主選署功勞五毒四肢及身備受楚毒也或云鞭箠及灼及徽纆為五毒終無異辭續母自吳來雒陽作食以饋續續雖見考辭色未嘗變而對食悲泣不自勝治獄使者問其故續曰母來不得見故悲耳問何以知之續曰母截肉未嘗不方斷蔥以寸為度斷丁管翻故知之使者以狀聞上乃赦興等禁錮終身顏忠王平辭引隧鄉侯耿建朗陵侯臧信濩澤侯鄧鯉曲成侯劉建耿純弟宿封隧鄉侯建蓋紹封者也朗陵侯臧信宮之子也鄧鯉劉建皆無可考濩澤侯國屬河東郡曲成侯國屬東萊郡賢曰故城在今萊州掖縣西北師古曰濩音烏虢翻是時上怒甚吏皆惶恐諸所連及率一切陷入無敢以情恕者侍御史寒朗心傷其冤考異曰范書作寒陸龜蒙離合詩云初寒朗詠徘徊立袁紀作寋按今有寋姓音件與袁紀合今從之余按姓譜有寒姓以為夏諸侯后寒之後又曰周武王子寒侯之後獨問忠平賢曰物色謂形狀也咢賢曰錯咢猶倉卒也錯音七故翻咢音五故翻乃上言建等無姦專為忠平所誣疑天下無辜類多如此帝曰即如是忠平何故引之對曰忠平自知所犯不道漢法有大逆不道冀以自明帝曰即如是何不早奏對曰臣恐海內別有發其姦者帝怒曰吏持兩端促提下捶之捶止蕊翻朗曰願一言而死帝曰誰與共為章對曰臣獨作之上曰何以不與三府議三府太尉司徒司空府也臣自知當必族滅不敢多汙染人汙烏故翻上曰何故族滅對曰臣考事一年不能窮盡姦狀反為罪人訟冤為于偽翻下同故知當族滅然臣所以言者誠冀陛下一覺悟而已臣見考囚在事者咸共言妖惡大故故事也囚也妖於驕翻今出之不如入之言出其罪不如入其罪也是以考一連十考十連百又公卿朝會陛下問以得失皆長跪言舊制大罪禍及九族陛下大恩裁止於身天下幸甚裁與才同口雖不言而仰屋竊歎莫不知其多冤無敢牾陛下言者牾五故翻逆也臣今所陳誠死無悔帝意解詔遣朗出後二日車駕自章十二行本自作因幸洛陽獄録囚徒師古曰省録之知其情狀為冤滯為不也今之慮囚本録聲之去者耳音力具翻而近俗不曉其意訛其文遂為思慮之慮失其源矣時天旱即大雨馬后亦以楚獄多濫乘間為帝言之間古莧翻帝惻然感悟夜起倣徨倣徨釋徘徊也莊子注猶翱翔也余謂倣徨不自安之貌任城令汝南袁安遷楚郡太守任城縣屬東平國任音壬先往按楚王英獄事理其無明驗者條上出之上時掌翻府丞掾史皆叩頭爭以為阿附反虜法與同罪不可安曰如有不合太守自當坐之不以相及也遂分別具奏別彼列翻帝感悟即報許得出者四百餘家十四年夏五月封故廣陵王荊子元壽為廣陵侯食六縣篤兄弟之恩也念功臣之世也十四年初作壽陵制令流水而已無得起墳萬年之後掃地而祭杅水脯糒而已説文曰杅飲器音于方言曰碗謂之盂過百日唯四時設奠置吏卒數人供給灑掃灑所賣翻掃悉報翻又並如字敢有所興作者以亶議宗廟法從事前書曰亶議宗廟者棄市十五年十五年春二月庚子上東巡癸亥耕于下邳下邳縣本屬東海郡是年以臨淮郡為下邳國下邳縣屬焉在雒陽東一千四百里至魯幸孔子宅親御講堂孔子宅在闕里講堂講授之堂魯共王升孔子堂聞金石絲竹之音即此又幸東平大梁浚儀縣本大梁四月庚子還宮十五年封皇子恭為巨鹿王黨為樂成王樂成國本信都郡帝更名在雒陽北二千里暢為汝南王昞為常山王長為濟陰王濟子禮翻帝親定其封域裁令半楚淮陽馬后曰諸子數縣於制不亦章十二行本亦作已乙十一行本同儉乎帝曰我子豈宜與先帝子等歲給二千萬足矣十五年乙巳赦天下十五年謁者僕射耿秉數上言請擊胸奴百官志謁者僕射秩比千石為謁者臺率主謁者古重習武有主射以督録之故曰僕射數所角翻爾雅曰父之昆弟先生為世父後生為叔父乃使秉固與太僕祭肜虎賁中郎將馬廖廖音聊下博侯劉張張齊王縯之孫畤音止耿秉曰昔者胸奴援引弓之類援于元翻並左衽之屬故不可得而制孝武既得河西四郡及居延朔方居延武帝置縣屬張掖郡賢曰故城在今甘州張掖縣北羌胡分離唯有西域俄復內屬復扶又翻故呼韓邪單于請事款塞其勢易乘也易以豉翻今有南單于形勢相似然西域尚未內屬北虜未有釁作臣愚以為當先擊白山西河舊事曰白山冬夏有雪故曰白山胸奴謂之天山過之皆下馬拜焉去蒲類海百里之內賢曰伊吾即伊吾盧地本屬胸奴後取其地置宜禾都尉以為屯田今伊州納職縣伊吾故城是也又曰伊吾故城在今瓜州晉昌縣北通使烏孫諸國以斷其右臂使疏吏翻斷丁管翻伊吾亦有胸奴南呼衍一部破此復為折其左角復扶又翻折而設翻然後胸奴可擊也上善其言議者或以為今兵出白山胸奴必並兵相助又當分其東以離其衆上從之十二月以秉為駙馬都尉固為奉車都尉以騎都尉秦彭為秉副三都尉皆武帝置奉車都尉掌乘輿駙馬都尉掌天子之副馬師古曰駙副也一曰近也疾也皆置從事司馬出屯涼州秉國之子忠弇之子廖援之子也十六年十六年春二月遣肜與度遼將軍吳棠將河東西河羌胡及南單于兵萬一千騎出高闕塞高闕在朔方北賢曰按湟水東經臨羌縣故城北又東盧溪水注之水出西南盧川即其地也余據西南夷傳冉駹夷北有黃石北地盧水胡郭徒門翻騎都尉來苖護烏桓校尉文穆將太原鴈門代郡上谷漁陽右北平定襄郡兵及烏桓鮮卑萬一千騎出平城塞伐北胸奴竇固耿忠至天山賢曰天山即祁連山一名雪山今名折羅漢山在伊州北漢一作漫斬首千餘級追至蒲類海賢曰蒲類海今名婆悉海在今庭州蒲昌縣東南置宜禾都尉留吏士屯田伊吾盧城耿秉秦彭擊胸林王胸林恐當作句林建武時胸奴嘗遣句林王迎盧芳句音古侯翻至三木樓山而還來苗文穆至胸河水上據前書胸河水去令居數千里臣瓚曰去令居千里無所獲祭肜與南胸奴左賢王信不相得出高闕塞九百餘里得小山信妄言以為涿邪山北史曰循弱水西行得涿邪山肜與吳棠坐逗留畏懦下獄免下遐稼翻考異曰袁紀棠皆作常今從范書肜自恨無功出獄數日歐血死臨終謂其子曰吾蒙國厚恩奉使不稱稱尺證翻身死誠慚恨義不可以無功受賞死後若悉簿上所得物若汝也皆為文簿而上之上時掌翻效死前行以副吾心既卒行戶剛翻卒子恤翻其子逢上疏具陳遺言帝雅重肜方更任用聞之大驚嗟嘆良久烏桓鮮卑每朝賀京師常過肜冢拜謁仰天號泣遼東吏民為立祠四時奉祭焉肜先為遼東太守威信行於烏桓鮮卑號戶刀翻為于偽翻加位特進固使假司馬班超與從事郭恂俱使西域百官志大將軍營五部部有校尉一人軍司馬一人又有軍假司馬為副二使疏吏翻下同鄯上扇翻鄯善王廣奉超禮敬甚備後忽更疏懈懈古隘翻超謂其官屬曰寧覺廣禮意薄乎官屬曰胡人不能常久無他故也超曰此必有北虜使來狐疑未知所從故也明者睹未萌況已著邪乃召侍胡詐之曰胸奴使來數日今安在乎侍胡惶恐曰到已三日去此三十里超乃閉侍胡侍胡鄯善所遣侍超者使疏吏翻與共飲酒酣因激怒之曰卿曹與我俱在絶域今虜使到裁數日而王廣禮敬即廢如令鄯善收吾屬送胸奴骸骨長為豺狼食矣為之奈何官屬皆曰今在危亡之地死生從司馬超曰不入虎穴不得虎子當今之計獨有因夜以火攻虜使彼不知我多少必大震怖可殄盡也怖普布翻滅此虜則鄯善破膽功成事立矣衆曰當與從事議之超怒曰吉凶決於今日從事文俗吏聞此必恐而謀泄死無所名非壯士也衆曰善初夜超遂將吏士往奔虜營初夜甲夜也超令十人持鼓藏虜舍後約曰見火然皆當鳴鼓大呼呼火故翻餘人悉持兵弩夾門而伏超乃順風縱火前後鼓噪虜衆驚亂超手格殺三人吏兵斬其使及從士三十餘級從才用翻餘衆百許人悉燒死明日乃還告郭恂還從宣翻又如字恂大驚既而色動意欲分超功而不能自掩於外故色動舉手曰掾雖不行班超何心獨亶之乎從事掾也掾俞絹翻超於是召鄯善王廣以虜使首示之一國震怖超告以漢威德自今以後勿復與北虜通復扶又翻廣叩頭願屬漢無二心遂納子為質還白竇固固大喜具上超功效質音致上時掌翻並求更選使使西域帝曰吏如班超何故不遣而更選乎今以超為軍司馬令遂前功固復使超使于填復扶又翻下同填徒賢翻欲益其兵超願但將本所從三十六人曰于填國大而遠今將數百人無益於強如有不虞多益為纍耳纍力瑞翻是時于填王廣德雄張南道賢曰雄張猶熾盛也張竹亮翻豫謂張者自大之意監古銜翻超既至于填廣德禮意甚疏且其俗信巫巫言神怒何故欲向漢漢使有騧馬急求取以祠我賢曰續漢及華嶠書並作騩説文馬淺黑色也音京媚翻余謂騧音瓜黃馬黑喙曰騧讀如本字章十二行本德下有乃字乙十一行本同遣國相私來比就超請馬相息亮翻超密知其狀報許之而令巫自來取馬有頃巫至超即斬其首收私來比鞭笞數百以巫首送廣德因責讓之廣德素聞超在鄯善誅滅虜使大惶恐即殺胸奴使者而降降戶江翻超重賜其王以下因鎮撫焉於是諸國皆遣子人侍西域與漢絶六十五載至是乃復通焉王莽天鳳三年焉耆擊殺王駿西域遂絶至此五十八載耳此言與漢絶六十五載蓋自始建國元年數之謂莽篡位而西域遂與漢絶也復扶又翻載子亥翻彪之子也十六年淮陽王延性驕奢而遇下嚴烈有上書告延與姬兄謝弇及姊壻韓光招姦猾作圖讖祠祭祝詛事下按驗讖楚譖翻祝職救翻詛莊助翻下遐稼翻五月癸丑弇光及司徒邢穆皆坐死所連及死徙者甚衆十六年戊午晦日有食之十六年六月丙寅以大司農西河王敏為司徒十六年有司奏請誅淮陽王延上以延罪薄於楚王英秋七月徙延為阜陵王食二縣賢曰阜陵縣名屬九江郡故城在今滁州全椒縣南十六年是歲北胸奴大入雲中雲中太守廉范拒之吏以衆少欲移書傍郡求救范不許會日暮范令軍士各交縛兩炬三頭爇火營中星列賢曰用兩炬交縛如十字爇其三頭手持一端使敵人望之疑兵士之多爇懦劣翻大驚待旦將退范令軍中蓐食晨往赴之賢曰蓐食早起食於寢蓐中也虜自相轔藉死者千餘人賢曰轔轢也藉相蹈藉也轔良刃翻復扶又翻范丹之孫也廉丹為王莽將十七年十七年春正月上當謁原陵夜夢先帝太后如平生歡既寤悲不能寐即案曆明旦日吉遂率百官上陵上時掌翻其日降甘露於陵樹考異曰帝紀云甘露降甘陵皇后紀云謁原陵甘露降於樹然則實降原陵也帝紀誤以原為甘會畢帝從席前伏御床視太后鏡奩中物奩鏡匣也音廉感動悲涕令易脂澤裝具左右皆泣莫能仰視沈約曰三代以前無墓祭至秦始出寢起於墓側漢因秦上陵皆有園寢故稱寢殿起居衣服象生人之具古寢之意也十七年北海敬王睦薨睦北海靖王興之子少詩照翻好呼到翻下同光武及上皆愛之嘗遣中大夫詣京師朝賀賢曰中大夫王國官也掌奉王使京師奉璧賀正月朝直遙翻朝廷設問寡人賢曰朝廷謂天子也使者曰大王忠孝慈仁敬賢樂士樂音洛睦曰吁子危我哉賢曰吁音于孔安國注尚書曰吁者疑怪之聲余按吁胸于翻此乃孤幼時進趣之行也趣讀曰趨又七喻翻行下孟翻大夫其對以孤襲爵以來志意衰惰聲色是娛犬馬是好乃為相愛耳其智慮畏慎如此時禁切藩王法憲頗峻故睦慮及此十七年二月乙巳司徒王敏薨十七年三月癸丑以汝南太守鮑昱為司徒昱永之子也十七年益州刺史梁國朱輔益州部漢中巴郡廣漢蜀郡犍為牂柯越巂益州永昌等郡益州剌史治廣漢郡雒縣威懷遠夷自汶山以西汶山在蜀郡湔氐道西徼外江水所出杜佑曰茂州漢汶山縣汶晉書音讀曰岷湔裴松之音剪正朔所未加白狼槃木等百餘國皆舉種稱臣奉貢種章勇翻白狼王唐菆作詩三章歌頌漢德菆側鳩翻又徂丸翻輔使犍為郡掾由恭譯而獻之犍為郡在雒陽西三千二百七十里夷言不與中國通故譯而後獻犍居言翻掾俞絹翻由姓也秦有由余或曰楚王孫由子之後十七年初龜茲王建為胸奴所立龜茲音見前倚恃虜威據有北道攻殺疏勒王立其臣兜題為疏勒王班超從間道至疏勒間古莧翻范史疏勒國去雒陽萬三百里去兜題所居槃橐城九十里逆遣吏田慮先往降之降戶江翻下同敕慮曰兜題本非疏勒種種章勇翻國人必不用命若不即降便可執之慮既到兜題見慮輕弱殊無降意降戶江翻慮因其無備遂前劫縛兜題左右出其不意皆驚懼奔走慮馳報超超即赴之悉召疏勒將吏説以龜茲無道之狀因立其故王兄子忠為王考異曰袁紀云求索故王近屬得兄榆勒立之更名忠續漢書云求得故王兄子榆勒立之更名忠今從超傳超問忠及官屬當殺兜題邪生遣之邪咸曰當殺之超曰殺之無益於事當令龜茲知漢威德遂解遣之十七年夏五月戊子公卿百官以帝威德懷遠祥物顯應並集朝堂奉觴上壽班固西都賦左右廷中朝堂百僚之位蕭曹丙魏謀謨乎其上蓋在殿庭左右也賢曰壽者人之所欲故卑下奉觴進酒皆言上壽朝直遙翻天生神物以應王者遠人慕化實由有德朕以虛薄何以享斯唯高祖光武聖德所被被皮義翻不敢有辭其敬舉觴太常擇吉日策告宗廟仍推恩賜民爵及粟有差時賜天下男子爵人二級三老孝悌力田人三級流人無名數欲占者人一級鰥寡孤獨篤癃貧不能自存者粟人三斛十七年冬十一月遣奉車都尉竇固駙馬都尉耿秉騎都尉劉張出敦煌昆侖塞擊西域賢曰昆侖山名因以為塞在今肅州酒泉縣西南山有昆侖之體故名之周穆王見西王母于此山有石室王母臺又曰前書敦煌郡廣至縣有昆侖障宜禾都尉居也廣至故城在今瓜州常樂縣東敦徒門翻侖盧昆翻符傳皆合之以為信符兵符也張晏曰傳若今過所也如淳曰兩行書繒帛分持其一出入關合之乃得過謂之傳此傳蓋亦行兵所用以為信非度關所用之傳也專將則有符傳今以兵屬固故去之去羌呂翻傳株戀翻擊破白山虜於蒲類海上遂進擊車師車師前王即後王之子也其廷相去五百餘里車師前王居交河城後王居務塗谷山谷深士卒寒苦欲攻前王秉以為先赴後王並力根本則前王自服固計未決秉奮身而起曰請行前乃上馬引兵北入衆軍不得已並進斬首數千級後王安得震怖走出門迎秉脫帽抱馬足降降戶江翻秉將以詣固其前王亦歸命遂定車師而還還從宣翻又如字於是固奏復置西域都護及戊己校尉宣帝置都護元帝置戊己校尉自王莽之亂西域與中國絶不復置今通西域復置之考異曰袁紀睦作穆今從范書屯後王部金蒲城賢曰金蒲城車師後王城廷也今庭州蒲昌縣城是也杜佑曰金蒲城即車師後王所治務塗谷今北庭府蒲類縣也屯前王部柳中城賢曰柳中今西州縣考異曰袁紀作折中今從范書恭況之孫也耿況以上谷歸光武子孫多著功名十八年十八年春二月詔竇固等罷兵還京師十八年北單于遣左鹿蠡王率二萬騎擊車師蠡盧奚翻耿恭遣司馬將兵三百人救之皆為所沒胸奴遂破殺車師後王安得而攻金蒲城恭以毒藥傅矢語胸奴曰漢家箭神其中瘡者必有異虜中矢者視瘡皆沸傅音附語牛倨翻中竹仲翻大驚會天暴風雨隨雨擊之殺傷甚衆胸奴震怖怖普布翻相謂曰漢兵神真可畏也遂解去十八年夏六月己未有星孛於太微晉天文志太微天子廷也十二諸侯府也孛蒲內翻十八年耿恭以疏勒城傍有澗水可固引兵據之此疏勒城在車師後部非疏勒國城也據西域傳疏勒國去長史所居五千里後部去長史所居五百里耿恭自後部金蒲城移據疏勒城其後范羌又自前部交河城從山北至疏勒迎恭審觀本末則非疏勒國城明矣七月胸奴復來攻復扶又翻擁絶澗水恭於城中穿井十五丈不得水吏士渴乏至笮馬糞汁而飲之賢曰笮謂壓笮也音側駕翻恭身自率士挽籠挽音晚師古曰籠所以盛土也音盧紅翻鄭氏周禮注竁土之器曰籠陸德明音力董翻朱熹曰蕢土籠也有頃水泉奔出衆皆稱萬歲乃令吏士揚水以示虜虜出不意以為神明遂引去十八年八月壬子帝崩於東宮前殿年四十八遺詔無起寢廟藏主於光烈皇后更衣別室賢曰禮藏主於廟既不起寢廟故藏於后之易衣別室更易也更工衡翻下同帝遵奉建武制度無所變更后之家不得封侯與政館陶公主為子求郎館陶公主光武女紅夫也送駙馬都尉韓光與讀曰預為于偽翻而賜錢千萬謂㣥臣曰郎官上應列宿史記曰太微宮後二十五星郎位也宿音秀苟非其人則民受其殃是以難之公車以反支日不受章奏陰陽書曰凡反支日用月朔為正戌亥朔一日反支申酉朔二日反支午未朔三日反支辰巳朔四日反支寅卯朔五日反支子丑朔六日反支民廢農桑遠來詣闕而復拘以禁忌復扶又翻豈為政之意乎於是遂蠲其制尚書閻章二妹為貴人章精力曉舊典久次當遷重職帝為後宮親屬竟不用是以吏得其人民樂其業樂音洛遠近畏服戶口滋殖焉十八年太子即位年十八尊皇后曰皇太后明帝初崩馬氏兄弟爭欲入宮北宮衛士令楊仁被甲持戟嚴勒門衛人莫敢輕進者東都南北宮皆有衛士令一人秩六百石各掌其宮衛士漢官曰北宮員吏七十二人衛士四百七十一人朱爵司馬主南掖門員吏四人衛士百二十四人東明司馬主東門員吏十三人衛士百八十人朔平司馬主北門員吏五人衛士百一十七人凡員吏皆隊長佐凡居宮中者皆有口籍於門之所屬宮名兩字為鐵印文符案省符乃內之若外人以事當入本宮長吏為封棨傳其有官位者令御者言其官胡廣曰符用木長可二寸鐵印以符之被皮義翻言其峻刻帝知其忠愈善之拜為什邡令什邡縣屬廣漢郡此即高帝封雍齒之什方也邡讀曰方十八年壬戌葬孝明皇帝于顯節陵帝王紀曰顯節陵故富壽亭也西北去雒陽三十七里十八年冬十月丁未赦天下十八年詔以行太尉事節鄉侯熹為太傅司空融為太尉並録尚書事光武不任三公事歸臺閣惟録尚書事者權任稍重自是迄于齊梁謂之録公賢曰武帝初以張子孺領尚書事録尚書事由此始晉百官志曰漢武時左右曹諸吏分平尚書奏事知樞要者始領尚書事張安世以車騎將軍霍光以大將軍王鳳以大司馬師丹以左將軍並領尚書事後漢章帝以太傅趙熹太尉牟融並録尚書事尚書有録名自此始亦西京領尚書之任猶唐虞大麓之職也沈約曰漢東京每帝即位輒置太傅録尚書事薨輒省十八年十一月戊戌以蜀郡太守第五倫為司空倫在郡公清所舉吏多得其人故帝自遠郡用之續漢志蜀郡在雒陽西三千一百里守式又翻十八年焉耆龜茲攻沒都護陳睦北胸奴圍關寵於柳中城會中國有大喪救兵不至車師復叛復扶又翻下同與胸奴共攻耿恭恭率厲士衆禦之數月食盡窮困乃煮鎧弩食其筋革鎧可亥翻恭與士卒推誠同死生故皆無二心而稍稍死亡餘數十人單于知恭已困欲必降之遣使招恭曰若降者當封為白屋王按李巡注爾雅五狄有白屋一種降戶江翻妻七細翻恭誘其使上城手擊殺之炙諸城上單于大怒更益兵圍恭不能下關寵上書求救詔公卿會議司空倫以為不宜救司徒鮑昱曰今使人於危難之地急而棄之外則縱蠻夷之暴內則傷死難之臣難乃旦翻誠令權時後無邊事可也胸奴如復犯塞為寇陛下將何以使將將即亮翻又二部兵人裁各數十賢曰二部謂關寵及恭也歷旬不下是其寡弱力盡之效也力盡猶言盡力也多其幡幟倍道兼行以赴其急幟昌志翻胸奴疲極之兵必不敢當四十日間足還入塞帝然之乃遣征西將軍耿秉屯酒泉行太守事遣酒泉太守段彭考異曰耿恭傳云秦彭今從帝紀姓譜宋有皇甫充石宋之公族也漢初有皇甫鸞自魯徙居茂陵改父為甫余按詩周亦有皇父卿士鄯上扇翻十八年甲辰晦日有食之十八年太后兄弟虎賁中郎廖及黃門郎防光百官志給事黃門侍郎六百石掌侍從左右漢舊儀曰黃門郎屬黃門令日暮入對青瑣門拜名曰夕郎帝以廖為衛尉防為中郎將光為越騎校尉廖等傾身交結冠蓋之士爭赴趣之趣七喻翻第五倫上疏曰臣聞書曰臣無作威作福其害于而家凶于而國尚書洪範之言而抑損陰氏不假以權勢謂陰后不為宗親求位也互有非法明帝即位竟多誅之謂梁松竇穆等也章十二行本洛作雒乙十一行本同下均同無復權戚書記請託一皆斷絶復扶又翻斷丁管翻又諭諸外戚曰苦身待士不如為國為于偽翻戴盆望天事不兩施司馬遷書曰戴盆何以望天復以馬氏為言竊聞衛尉廖以布三千匹城門校尉防以錢三百萬私贍三輔衣冠知與不知莫不畢給又聞臘日亦遺其在雒中者錢各五千遺于季翻越騎校尉光臘用羊三百頭米四百斛肉五千斤臣愚以為不應經義惶恐不敢不以聞陛下情欲厚之亦宜所以安之臣今言此誠欲上忠陛下下全后家也十八年是歲亦師及兗豫徐州大旱兗州部陳留東郡東平泰山濟北山陽濟陰等郡國豫州部汝南潁川二郡梁沛陳魯等國徐州部東海琅邪彭城廣陵下邳等郡國杜佑曰兗州蓋以沇水為名又兗之為言端也信也端言陽氣端端故其氣纖殺也徐州蓋取舒緩之義或云因徐丘以為名王崇武標點容肇祖聶崇岐覆校
