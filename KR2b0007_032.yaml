body:
  text: 資治通鑑卷第三十二翰林學士朝散大夫右諫議大夫知制誥兼侍講同提舉萬壽觀公事兼判集賢院上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣奉敕編集後學天台音注漢紀二十四永始四年孝成皇帝中永始四年戊申前一三永始四年春正月上行幸甘泉郊泰畤大赦天下三月行幸河東祠后土永始四年夏大旱永始四年四月癸未長樂臨華殿未央宮東司馬門皆災師古曰東面之司馬門也樂音洛甲午霸陵園門闕災永始四年秋七月辛未晦日有食之永始四年冬十一月庚申衛將軍王商病免永始四年梁王立驕恣無度立梁孝王武八世孫也相禹奏立對外家怨望有惡言梁相名禹相息亮翻因發其與姑園子姦事奏立禽獸行請誅漢法內亂為禽獸行行下孟翻太中大夫谷永上書曰臣聞禮天子外屏不欲見外也師古曰屏謂當門之牆以屏蔽者也外屏於門外為之不窺人閨門之私聽聞中冓之言韓詩云中冓中夜應劭曰中冓材冓在堂之中也晉灼曰魯詩以為夜也師古曰冓謂舍之交積材木也應說近之冓音工豆翻春秋公羊傳閔元年齊仲孫來齊仲孫者何公子慶父也公子慶父則曷為謂之齊仲孫外之也曷為外之春秋為親者諱為于僞翻下同少詩照翻下同頗有狂病始以惡言按驗既無事實而發閨門之私非本章所指王辭又不服猥強劾立傅致難明之事劾戶概翻師古曰傅讀曰附獨以偏辭成罪斷獄斷丁亂翻無益於治道治直吏翻汙衊宗室汙烏故翻孟康曰衊音漫師古曰衊音秣謂塗梁也以內亂之惡披布宣揚於天下非所以為公族隱諱為于僞翻下為公同增朝廷之榮華昭聖德之風化也臣愚以為王少而父同産長姑者父之同産長知兩翻梁國之富足以厚聘美女招致妖麗妖巧也艷也好也妖於驕翻師古曰言其姑亦當自恥必不與姦師古曰本所問者怨望朝廷之言也言何為而自發內亂之事殆非人情疑有所迫切過誤失言文吏躡尋不得轉移躡尋者謂躡其失言之後而尋其內亂之跡也加恩勿治上也如淳曰覆蓋之則計之上治直之翻下同舉憲者舉以法也詔廷尉選上德通理之吏更審考清問上與尚同書呂刑皇帝清問下民孔安國曰清問詳問也馬曰清訊定失誤之法著明也效驗也明其事之不然具有證驗也失誤謂誤入人罪為失師古曰使者還反以清白之狀付有司也附疏者使疏屬親附也師古曰刷謂拭刷除之也音所劣翻甚得治親之誼天子由是寢而不治永始四年是歲司隸校尉蜀郡何武為京兆尹姓譜何出自周成王母弟唐叔虞後封於韓韓滅子孫分散江淮間音以韓為何字隨音變遂為何氏武為吏守法盡公進善退惡所居無赫赫名去後常見思元延元年己酉前一二永始四年春正月己亥朔日有食之永始四年王戌王商復為大司馬衛將軍商去年以病免今復位永始四年三月上行幸雍祠五畤雍於用翻畤音止永始四年夏四月丁酉無雲而雷劉向曰雷當託於雲猶君之託於臣陰陽之合也人君不恤天下萬民有怨畔之心故無雲而雷四面耀耀如雨自晡及昏而止永始四年赦天下永始四年秋七月有星孛于東井孛蒲內翻以上災變博謀㣥臣北地太守谷永對曰王者躬行道德承順天地則五徵時序五徵即洪範之八庶徵曰雨曰暘曰寒曰燠曰風也符瑞並降失道妄行逆天暴物則咎徵著郵洪範之常雨常暘常寒常燠常風為咎徵著明也天見咎徵以明著人君之過也師古曰郵與尤同尤過也洪範五行傳說曰凡草木之類謂之妖妖猶夭胎言尚微也蟲豸之類謂之孽孽則芽孽矣見賢遍翻終不改寤惡洽變備不復譴告更命有德如魯哀禍大天不降譴是也復扶又翻更工衡翻百王之所同也加以功德有厚薄期質有修短時世有中季師古曰中讀曰仲天道有盛衰陛下承八世之功業八世高惠文景武昭宣元孟康曰陽九之末季也師古曰標音必遙翻孟康曰至平帝乃三七二百一十歲之厄今已涉向其節紀應劭曰天必先雲而後雷雷而後雨而今無雲而雷無妄者無所望也萬物無所望於天災異之最大者也師古曰取易之無妄卦為義項安世曰古妄與望通秦漢言一尢妄皆無望也朱英之說黃歇與揚子法言皆然故太玄以去準一尢妄謂其無所復望也在易則自為誠妄之妄厄易九厄曰初入元百六陽九孟康曰易傳也所謂陽九之厄百六之會也初入元百六歲有厄者則前元之餘氣也師古曰直當也孔穎達曰凡水旱之歲曆運有常按律曆志云十九歲為一章四章為一部二十部為一統三統為一元則一元有四千五百六十歲初入元一歲有陽九謂旱九年次三百七十四歲陰九謂水九年以一百六歲並三百七十四歲為四百八十歲注云六乘八之數次四百八十歲有陽九謂旱九年次七百二十歲陰七謂水七年次七百二十歲陽七謂旱七年又注云七百二十者九乘八之數次六百歲陰五謂水五年次六百歲陽五謂旱五年注云六百歲者以八乘八八八六十四又以七乘八七八五十六相並為一千二百歲於易七八不變氣不通故合而數之各得六百歲次四百八十歲陰三次四百八十歲陽三除入元至陽三除去災歲總有四千五百六十年其災歲兩個陽九年一個陰九年一個陰陽各七年一個陰陽各五年一個陰陽各三年總有五十七年並前四千五百六十年通為四千六百一十七歲此一元之氣終矣此是陰陽水旱之大數也所以正用七八九六相乘者以水數六火數七木數八金數九此交互相乘也以七八九六陰陽之數自然故有九年七年五年三年之災雜焉同會師古曰雜謂相參也一曰雜音先合翻雜焉總萃難乃旦翻二十載間載子亥翻㣥災大異交錯鋒起多於春秋所書內則為深宮後庭將有驕臣悍妾醉酒狂悖卒起之敗驕臣指淳于長等悍妾指趙昭儀姊弟也悍下罕翻又侯旰翻師古曰卒讀曰猝悖蒲內翻又蒲沒翻苑園也孔穎達曰有蕃曰園有牆曰囿園囿大同蕃牆異耳囿者域養禽獸之處園者種菜殖果之處毛晃曰苑亦以養禽獸直曰街曲曰巷師古曰閒讀曰間陳靈公淫于夏姬數如其家夏姬之子徵舒病之自廣既射而殺之齊莊公通于崔杼之妻姜氏數如崔氏杼伏甲殺之事並見左傳此指帝微行將有徵舒崔杼之禍也將有樊並蘇令陳勝項梁奪臂之禍樊並蘇令事見上卷永始三年陳勝項梁事見七卷秦二世元年夏戶雅翻下同宗廟之至憂師古曰分音扶問翻臣永所以破膽寒心豫言之纍年下有其萌然後變見於上見賢遍翻可不致慎禍起細微姦生所易易輕也忽也言姦生於所輕忽也易以豉翻無復與㣥小媟黷宴飲師古曰媟狎也音私列翻黷汙也復扶又翻下同勤三綱之嚴師古曰三綱君臣父子夫婦也余按君為臣綱父為子綱夫為婦綱所謂嚴也抑遠驕妬之寵崇近婉順之行遠于願翻近其靳翻行下孟翻朝覲法駕而後出朝直遙翻陳兵清道而後行無復輕身獨出飲食臣妾之家三者既除內亂之路塞矣三者謂微行崇飲好色也塞悉則翻萌在民饑饉而吏不恤興於百姓困而賦斂重發於下怨離而上不知永書曰諸夏舉兵以火角為期蓋言已有其萌而將至於興發也斂力贍翻茲謂泰厥咎亡師古曰洪範傳之辭余按五行志蓋京房易傳之辭也禾麥不收禾粟苗也又稼之總名比毗至翻謂此時宜減稅也甚繆經義逆於民心市怨趨禍之道也趨讀曰趣與促同臣願陛下勿許加賦之奏益減奢泰之費流恩廣施施式豉翻振贍困乏敕勸耕桑以慰綏元元之心諸夏之亂庶幾可息贍而豔翻幾居希翻又巨衣翻中壘校尉劉向武帝置中壘校尉掌北軍壘門之內又外掌西域八校尉之首也臣聞帝舜戒伯禹毋若丹朱傲師古曰事見虞書益稷篇丹朱堯子也敖讀曰傲仲馮曰此禹戒舜之語非舜戒禹之辭也上時掌翻尚書無逸篇周公戒成王曰毋若殷王紂之迷亂酗于酒德哉不諱廢興故臣敢極陳其愚唯陛下留神察焉謹按春秋二百四十二年日食三十六師古曰從隱公元年至哀公十四年獲麟凡二百四十二年日食三十六謂隱三年二月己巳桓三年七月壬辰朔十七年十月朔莊十八年三月二十五年六月辛未朔二十六年十二月癸亥朔三十年九月庚午朔僖五年九月戊申朔十二年三月庚午十五年五月文元年二月己亥朔十五年六月辛丑朔宣八年七月甲子十年四月丙辰十七年六月癸卯成十六年六月丙寅朔十七年十二月丁巳朔襄十四年二月乙未朔十五年秋八月丁巳二十年冬十月丙辰朔二十一年九月庚戌朔冬十月庚辰朔二十三年二月癸酉朔二十四年秋七月甲子朔八月癸巳朔二十七年冬十二月乙亥朔昭七年夏四月甲辰朔十五年六月丁巳朔十七年六月甲戌朔二十一年秋七月壬午朔二十二年十二月癸酉朔二十四年夏五月乙未朔三十一年十二月辛亥朔定五年正月辛亥朔十二年十一月丙寅朔十五年八月庚辰朔也比毗至翻自建始以來二十歲間而八食率二歲六月而一發古今罕有建始三年十二月戊申朔河平元年四月癸亥晦三年八月乙卯晦四年三月癸丑朔陽朔元年二月丁未晦永始二年二月乙酉晦三年正月己卯晦四年七月辛未晦凡八食而是年春正月己亥又不預此數占有舒疾緩急觀秦漢之易世覽惠昭之無後察昌邑之不終視孝宣之紹起皆有變異著於漢紀天之去就豈不昭昭然哉按向書曰秦始皇之末至二世時日月薄食山林淪亡辰星出於四孟太白經天而行無雲而雷枉矢夜光熒惑襲月㜸火燒宮野禽戲庭都門內崩長人見臨洮石隕于東郡星孛大角大角以亡及項籍之敗亦孛大角漢之入秦五星聚于東井得天下之象也孝惠時有雨血日食於衝滅光星見之異孝昭時有太山臥石自立上林僵柳復起大星如月西行衆星隨之此為特異孝宣興起之表天狗夾漢而西久陰不雨者二十餘日昌邑不終之異也誠見陛下寬明之德冀銷大異而興高宗成王之聲向書曰高宗成王亦有雊雉拔木之變能思其故故高宗有百年之福成王有復風之報向之所以望帝者如此崇增高也謂增高劉氏之業愈巍巍也師古曰懇懇款誠之意也奸犯也數所角翻奸音干臣雖圖上猶須口說然後可知願賜清燕之閒指圖陳狀上輒入之師古曰謂召入也上時掌翻閒讀曰間又如字上輒之上如字考異曰向傳云星孛東井岷山崩向懷不能已上此奏按岷山崩在三年此奏云自建始以來二十歲間而食八率二歲六月而一發則上此奏當在今年也胡旦亦載之三年余按劉向傳若以星孛東井為據則上奏當在今年若以岷山崩為據則上奏當在三年若以二十歲間日八食為據則上奏當在去年然向言日食之變率二歲六月而一發以班書考之自建始三年十二月至河平元年四月則一年五月而食至四年三月癸丑朔則才一年而食又至陽朔元年二月丁未晦則又期年而食永始元年九月丁巳晦志書食而紀不書至二年二月乙酉晦則凡九期而志所書永始元年九月丁巳晦不計也又至永始三年正月己卯晦則未及一期而食又至四年七月辛未晦則一年六月而食向所謂率二歲六月而一發亦通二十歲而約言之耳自建始三年至今年以紀考之則九食以志考之則十食此其差異又未有所折衷也永始四年紅陽侯立舉陳咸方正對策拜為光祿大夫給事中丞相方進復奏咸前為九卿坐為貪邪免咸免見上卷永始二年復扶又翻備內朝臣孟康曰內朝中朝也大司馬前後左右將軍侍中常侍散騎諸吏給事中為中朝官丞相以下至六百石為外朝官也紅陽侯立選舉故不以實漢制列侯選舉不以實削封戶劾戶概翻下同勿劾立永始四年十二月乙未王商為大將軍辛亥商薨其弟紅陽侯立次當輔政先是立使客因南郡太守李尚占墾草田數百頃先悉薦翻據孫寶傳占墾草田頗有民所假少府陂澤略皆開發師古曰隱度而取之也草田荒田也舊為陂澤本屬少府其後以假百姓百姓皆已田之而立總謂為草田占云新自墾占音之贍翻百畝為頃上書以入縣官師古曰立上書云新墾得此田請以入官也章十四行本億作萬乙十一行本同孔本同退齊校同萬以上師古曰直價直也貴者增於時價上由是廢立而用其弟光祿勳曲陽侯根庚申以根為大司馬驃騎將軍考異曰荀紀云十一月成紀云十二月按是歲十一月甲子朔無乙未辛亥庚申荀悅誤今按考異又有揚雄待詔一條注云雄傳云車騎將軍王音奇其文雅薦雄待詔按雄自序云上方郊祠甘泉泰畤召雄待詔承明之庭奏甘泉賦其十二月奏羽獵賦事在今年時王音卒已久蓋王根也胡旦遂誤以為曲陽侯云余按曲陽侯即王根也王音則封安陽侯永始四年特進安昌侯張禹請平陵肥牛亭地師古曰肥牛亭名禹欲得置亭之處為冢塋以為此地當平陵寢廟衣冠所出游道宜更賜禹他地請別以地賜之更工衡翻卒以賜禹卒子恤翻根由是害禹寵數毀惡之數所角翻下同師古曰惡謂言其過惡依顏注惡當讀如字後凡毀惡之惡皆同音天子愈益敬厚禹每病輒以起居聞師古曰謂其飲食寢臥之增損上親拜禹牀下禹頓首謝恩禹小子未有官禹數視其小子上即禹牀下拜為黃門郎給事中即就也以特進為天子師國家每有大政必與定議師古曰與讀曰豫余謂與讀如字言天子與禹定其可否也時吏民多上書言災異之應譏切王氏專政所致上時掌翻上意頗然之未有以明見未能灼見人言之常否也弟與第同舍也宅也師古曰辟讀曰闢親問禹以天變因用吏民所言王氏事示禹禹自見年老子孫弱又與曲陽侯不平恐為所怨則謂上曰春秋日食地震或為諸侯相殺夷狄侵中國為于僞翻災變之意深遠難見故聖人罕言命不語怪神師古曰罕稀也論語云子罕言利與命與仁又曰子不語怪力亂神自子貢之屬不得聞師古曰論語稱子貢曰夫子之言性與天道不可得而聞也謂孔子未嘗言性命及天道陛下宜修政事以善應之與下同其福喜漢書張禹傳喜作善新學小生亂道誤人宜無信用以經術斷之斷丁亂翻上雅信愛禹由此不疑王氏元帝師蕭望之成帝師張禹皆敬重之矣元帝不能聽望之言疏許史而去恭顯成帝則聽禹言而不疑王氏望之以此殺身禹以此苟富貴漢祚中衰實由此也又成帝之時吏民猶譏切王氏平帝之末吏民以王莽不受新野田上書者至四十八萬七千五百七十二人何元成之時吏民猶忠於漢平帝之時吏民則附王氏也政自之出久矣人心能無從之乎有國家者尚監茲哉皆喜說遂親就禹張氏安氏劉氏危矣說讀曰悅故槐里令朱雲元帝時雲為槐里令坐論石顯廢錮故稱故見賢遍翻公卿在前雲曰今朝廷大臣上不能匡主下無以益民皆尸位素餐師古曰尸主也素空也尸位者不舉其事但主其位而已素餐者德不稱官空當食祿苟患失之亡所不至者也師古曰論語所載孔子之言也苟患失其寵祿則言行僻邪無所不至也謹案孔子曰鄙夫可與事君也與哉其未得之也患得之既得之患失之苟患失之無所不至矣亡與無同師古曰尚方少府之屬官也作供御器物故有斬馬劍劍利可以斬馬斷丁管翻上問誰也對曰安昌侯張禹上大怒曰小臣居下訕上蓋引用論語惡居下流而訕上之言師古曰訕謗也音所諫翻又音刪罪死不赦御史將雲下雲攀殿檻檻折師古曰檻軒前欄也折而設翻臣得下從龍逄比干遊於地下足矣師古曰呼叫也音火故翻關龍逄桀臣王子比干紂臣皆以諫而死故云然逄音皮江翻未知聖朝何如耳師古曰言殺直臣其聲惡余謂雲蓋言亦將如夏殷之亡也朝直遙翻下入朝同每朝同將如字挾也攜也解印綬叩頭殿下曰此臣素著狂直於世師古曰著表也言此名久已章表不可誅其言非固當容之臣敢以死爭慶忌叩頭流血上意解然後得已言殺雲之事得止也治直之翻上曰勿易因而輯之以旌直臣師古曰輯與集同謂補合之也旌表也永始四年胸奴搜諧單于將入朝未入塞病死弟且莫車立為車牙若鞮單于以囊知牙斯為左賢王單音蟬且子余翻車尺遮翻鞮丁奚翻永始四年北地都尉張放到官數月復徵入侍中復扶又翻下同太后與上書曰前所道尚未效張晏曰謂太后言班侍中大將軍所舉宜寵異之詳見上卷永始二年其能默呼如淳曰富平侯張放又來太后安能默然不以為言請今奉詔上於是出放為天水屬國都尉地理志天水屬國都尉治勇士縣姓譜師古者掌樂之官因以為氏並侍中皆秩中二千石每朝東宮常從從才用翻及大政俱使諭指於公卿使傳上指以諭公卿也復修經書之業上為太子時好經書及即位幸酒樂宴樂今出放等復修經書業永始四年是歲左將軍辛慶忌卒慶忌為國虎臣爪牙扞禦之臣曰虎臣胸奴西域親附敬其威信二年二年春正月上行幸甘泉郊泰畤三月行幸河東祠后土既祭行遊龍門師古曰龍門山在今蒲州龍門縣北晉灼曰歷觀在河東蒲反縣師古曰歷山上有觀觀音古玩翻陟登也師古曰西嶽華山也二年夏四月立廣陵孝王子守為王廣陵孝王霸厲王胥之子也元帝初元二年紹封傳子意孫護人薨無後今立守以紹封考異曰荀紀守作憲今從漢書二年初烏孫小昆彌安日為降民所殺諸翎侯大亂降戶江翻翎許及翻詔徵故金城太守段會宗為左曹中郎將光祿大夫使安輯烏孫陽朔中會宗復為西域都護終更而還以亶發戊己校尉兵迎康居降者不遂劾乏興詔以贖論拜金城太守以病免故曰故金城太守守式又翻服虔曰末振將人姓名師古曰其名也昆彌之弟不可別舉姓也考異曰烏孫傳以末振將為安日弟段會宗傳以為兄兄字誤耳還從宣翻又如字時大昆彌雌栗靡勇健末振將恐為所並使貴人烏日領詐降刺殺雌栗靡刺七亦翻漢欲以兵討之而未能遣中郎將段會宗立公主孫伊秩靡為大昆彌公主謂楚主解憂也公主之孫於雌栗靡為季父大昆彌翎侯難栖殺末振將安日子安犂靡代為小昆彌漢恨不自誅末振將復遣段會宗發戊己校尉諸國兵復扶又翻校戶教翻即誅末振將太子番丘即就也師古曰番音盤驚番丘亡逃不可得即留所發兵墊婁地服虔曰墊音墊厄之墊鄭氏曰婁音羸師古曰墊音丁念翻婁音樓選精兵三十弩李奇曰三十人人持一弩召番丘責以末振將之罪即手劍擊殺番丘手執劍曰手劍記檀弓曰子手弓子射諸手守又翻馳歸小昆彌安犂靡靳兵數千騎圍會宗會宗為言來誅之意為言奉天子命來誅番丘之意為于僞翻今圍守殺我如取漢牛一毛耳司馬遷答任安書曰假令僕伏法受誅若九牛亡一毛與螻蟻何異自諭其身甚微也宛王事見二十一卷武帝太初三年郅支事見二十九卷元帝建昭三年宛於元翻昆彌以下服曰末振將負漢誅其子可也獨不可告我令飲食之邪師古曰飲於禁翻食讀曰飼下同會宗曰豫告昆彌逃匿之為大罪謂豫以誅番丘之事告昆彌昆彌以叔姪之情必使番丘逃匿漢欲誅之而昆彌匿之則於漢為有大罪也傷骨肉恩若飲食之而使之就死則於骨肉為傷恩昆彌以下號泣罷去號戶刀翻會宗還奏事天子賜會宗爵關內侯黃金百斤會宗以難栖殺末振將奏以為堅守都尉烏孫有大將都尉各一人以難栖能為雌栗靡復讎堅守臣節異於諸翎侯故以堅守二字寵之奪金印紫綬更與銅墨云宣帝甘露三年大祿大監賜金印紫綬師古曰疐音竹二翻本共謀殺大昆彌將衆八萬章十四行本萬下有餘口二字乙十一行本同孔本同張校同退齊校同北附康居謀欲借兵兼並兩昆彌卑爰疐自此強其後都護孫建襲殺之將即亮翻復扶又翻下同自烏孫分立兩昆彌漢用憂勞且無寧歲分立兩昆彌見二十七卷宣帝甘露元年元帝時康居遣子入侍陳湯上言其非王子今復遣子入侍既遣子入侍而又奉貢也此時郭舜為都護平帝元始間孫建始為都護上時掌翻本胸奴盛時非以兼有烏孫康居故也及其稱臣妾非以失二國也言胸奴之強弱不繫二國之叛服然三國內相輸遺交通如故三國謂胸奴烏孫康居質音致遺于季翻司讀曰伺見便則發合不能相親信離不能相臣役以今言之結配烏孫竟未有益反為中國生事謂自武帝以來以宗室女下嫁烏孫也為于僞翻今與胸奴俱稱臣義不可距而康居驕黠訖不肯拜使者師古曰訖竟也黠戶八翻坐之烏孫諸使下王及貴人先飲食已乃飲啖都護吏師古曰飲音於禁翻啖音徒濫翻故為無所省以夸旁國師古曰言故不省視漢使也余謂夸者自矜耀其能傲漢也旁國鄰國也省悉井翻何故遣子入侍其欲賈市為好辭之詐也謂特欲行賈以市易其為好辭者詐也度徒洛翻賈音古百蠻大國師古曰於百蠻中最大國也聞康居不拜且使單于有悔自卑之意師古曰言單于見康居不事漢以為高自以事漢為太卑而悔之也絶不復使師古曰不通使於其國也使疏吏翻章顯著也為于僞翻重致遠人師古曰以此聲名為重也三年三年春正月丙寅蜀郡岷山崩地理志岷山在蜀郡湔氏道西徼外禹貢所謂岷山導江即此山也水經注曰岷山即瀆山水曰瀆水亦曰汶阜山在氐道徼外江水所導也大江泉源發羊膊嶺下緣崖散漫小大百數殆未濫觴東南下百餘里至白馬嶺西歷天彭關亦謂之天谷天彭山兩山相對其高若闕謂之天彭門江水自此以上至微弱所謂其源濫觴者也漢元延中岷山崩壅江水三日不流即其處岷音武巾翻江水竭劉向大惡之惡音烏路翻惡其徵異也曰昔周岐山崩三川竭而幽王亡周幽王二年三川竭岐山崩師古曰三川涇渭洛也洛即漆沮也余按幽王時有是異後卒為犬戎所殺周所興也周自太王避狄去豳而邑于岐山之下周之王業遂興於此高帝始王漢中起兵還定三秦誅項羽遂有天下山崩川竭星孛又及攝提大角從參至辰天文志房南衆星曰騎官左角理右角將大角者天王帝坐廷其兩旁各有三星鼎足句之曰攝提攝提者直斗杓所指以建時節故曰攝提格晉天文志參十星於辰在申至辰者至大火也自氐五度至尾九度為大火於辰在卯如淳曰孛星尾長及攝提大角始發於參至辰也孛蒲內翻參疏簪翻三年二月丙午封淳于長為定陵侯恩澤侯表定陵侯國於汝南三年三月上行幸雍祠五畤三年上將大誇胡人以多禽獸秋命右扶風發民入南山西自褒斜師古曰褒斜南山二谷名余按自秦川徑南山通漢中南谷曰褒北谷曰斜徑五百里斜余遮翻長安南山連延東至弘農今商虢二州之山皆是也驅與驅同罔與網同古字通用罝音咨邪翻兔也罘音房尤翻翻車大網也熊似豕而大黑色羆似熊黃白色被髮人立而絶有力輸之長楊射熊館師古曰長楊宮中有射熊館李奇曰阹遮禽獸圍陳也師古曰阹音祛令胡人手搏之自取其獲上親臨觀焉考異曰成紀元延二年冬行幸長楊宮從胡客大校獵宿萯陽宮賜從官胡旦用之按揚雄傳祀甘泉河東之歲十二月羽獵雄上校獵賦明年從至射熊館還上長楊賦然則從胡客校獵當在今年紀因去年冬有羽獵事致此誤耳四年四年春正月上行幸甘泉郊泰畤四年中山王興定陶王欣皆來朝興帝少弟欣帝弟定陶共王康之子朝直遙翻定陶王盡從傅相中尉師古曰三官皆從王入朝相息亮翻以問定陶王對曰令諸侯王朝得從其國二千石傅相中尉皆國二千石故盡從之上令誦詩通習能說師古曰說其義也問中山王獨從傅在何法令不能對令誦尚書又廢師古曰中忘之也法令力政翻令誦力呈翻後飽起下襪係解師古曰食而獨在後飽及起又襪係解也襪音武伐翻余謂賜食於君前禮主於敬食而獨後又致飽而止皆非敬也及起而降階襪係解而不知是皆不能執禮夫禮所以固人股膚之會筋骸之束也襪足衣也係所以結襪而賢定陶王數稱其材數所角翻是時諸侯王唯二人於帝為至親定陶王祖母傅太后隨王來朝傅太后元帝傅昭儀定陶共王母也隨共王就國為定陶太后遺于季翻票匹妙翻后昭儀根見上無子亦欲豫自結為長久計皆更稱定陶王迭互稱其材美也師古曰更工衡翻帝亦自美其材為加元服而遣之師古曰為之冠也為于僞翻四年三月上行幸河東祠后土四年隕石于關東二據漢書關東當作都關師古曰都關山陽之縣四年王根薦谷永徵入為大司農自北地太守徵入上時掌翻略相反覆專攻上身與後宮而已黨於王氏上亦知之不甚親信也為大司農歲餘病滿三月上不賜告即時免故事公卿病輒賜告上以其黨於王氏故即時免卒史終言之綏和元年癸丑前八四年春正月大赦天下四年上召丞相翟方進御史大夫孔光右將軍廉褒後將軍朱博入禁中票騎將軍王根先勸帝立定陶王為嗣漢書孔光傳先書根勸立定陶王事下即書召方進光褒博入禁中通鑑因之亦不書根今但以下文觀之根亦召入禁中也中山定陶王誰宜為嗣者方進根褒博皆以為定陶王帝弟之子禮曰昆弟之子猶子也為其後者為之子也昆弟之子視猶子也以弟之子為兄後則為兄之子矣公羊春秋成十五年仲嬰齊卒此公孫嬰齊也曷為謂之仲嬰齊為兄後也為兄後則曷為謂之仲嬰齊為人後者為之子也為其子則其稱仲何孫以王父字為氏也光獨以為禮立嗣以親謂兄弟同父之親子其親親於兄弟之子兄終弟及兄終弟及殷法也殷自外丙仲壬至于盤庚率多兄弟代立而尚書無文光所引蓋今文尚書也師古曰比音必寐翻余謂當如字讀先帝之子帝親弟宜為嗣上以中山王不材又禮兄弟不得相入廟父為昭子為穆則兄弟不得相入廟也二月癸丑詔立定陶王欣為皇太子封中山王舅諫大夫馮參為宜鄉侯益中山國三萬戶以慰其意師古曰以不得繼統為帝之後恐其怨恨持節徵定陶王大鴻臚掌諸侯故任宏守大鴻臚之官以徵定陶王守者權守也任音壬臚陵如翻臣材質不足以假充太子之宮師古曰謙不言為太子故云假充若元非正余謂王謝意蓋以將有皇嗣今為太子特假充耳旦夕奉問起居謂昏定晨省記曰文王之為世子也朝於王季日三雞初鳴而衣服至于寢門外問內豎之御者曰今日安否何如內豎曰安文王乃喜及日中又至亦如之及莫再至亦如之其有不安節則內豎以告文王文王色憂行不能正履此旦夕問起居之禮也國邸謂定陶國邸也歸國守藩書奏天子報聞報聞報已覽其書而不從其請也戊午孔光以議不合意左遷廷尉何武為御史大夫光左遷廷尉而何武自廷尉為御史大夫四年初詔求殷後分散為十餘姓殷子姓也其後為宋為孔為華為戴為桓為向為樂等姓不能得匡衡梅福皆以為宜封孔子世為湯後匡衡議以為王者存二王後所以尊其先王而通三統也其犯誅絶之罪者絶而更封他親為始封君上承其王者之始祖春秋之義諸侯不能守其社稷者絶今宋國已不守其統而失國矣則宜更立殷後為始封君而上承湯統非當繼宋之絶侯也宜明得殷後而已今之故宋推求其嫡久遠不可得雖得其嫡嫡之先已絶不當得立禮孔子曰丘殷人也先師所傳宜以孔子世為湯後此元帝時議也是時梅福復言之封孔吉為殷紹嘉侯恩澤侯表殷紹嘉侯國於沛與周承休侯皆進爵為公地各百里四年上行幸雍祠五畤四年初何武之為廷尉也公卿表元延三年何武自沛郡太守為廷尉是年三月戊午為御史大夫末俗之敝政事煩多宰相之材不能及古而丞相獨兼三公之事所以久廢而不治也廢謂廢事也上從之夏四月賜曲陽侯根大司馬印綬置官屬罷票騎將軍官武帝初置大司馬以冠將軍之號宣帝地節三年置大司馬不冠將軍亦無印綬官屬今賜大司馬金印紫綬置官屬而大司馬為專官故根不復領票騎將軍封汜鄉侯武封泛鄉侯在琅邪不其縣後改食南陽博望鄉師古曰泛音凡其音基如淳曰律大司馬大將軍與丞相奉月錢六萬御史大夫奉月四萬也奉讀曰俸四年秋八月庚戌中山孝王興薨四年胸奴車牙單于死弟囊知牙斯立為烏珠留若鞮單于烏珠留單于立以弟樂為左賢王輿為右賢王樂呼韓邪單于大閼氏之子輿第五閼氏之子或說王根曰說輸芮翻胸奴有斗入漢地直張掖郡師古曰斗絶也地之斗曲入漢界者也直當也師古曰鷲大鵰也黃頭赤目其羽可為箭竿音工旱翻鷲音就余按鷲羽可為箭翎也山海經曰景山多鷲黑色多力所謂皂鵰是也於邊甚饒國家有廣地之實將軍顯功垂於無窮根為上言其利言得此地為中國利也為于僞翻下同師古曰直猶正也余謂直徑直也傷命損威師古曰詔命不行為傷命余謂天子之命不行於夷於為損中國之威令從藩所說而求之師古曰自以藩意說單于而求之說輸芮翻下同以語次說單于曰語次交語之次也竊見胸奴斗入漢地直張掖郡漢三都尉居塞上士卒數百人寒苦候望久勞張掖兩都尉一治日勒澤索谷一治居延又有農都尉治番和是為三者尉師古曰澤音鐸索音先各翻如淳曰番音盤直斷割之謂從直割地以其斗入者與漢也斷丁管翻上時掌翻下同以復天子厚恩師古曰復亦報也師古曰漢得此地必厚報單于此天子詔語邪邪音耶疑未定之辭將從使者所求也藩曰詔指也然藩亦為單于畫善計耳為于僞翻單于曰此溫偶駼王所居地也師古曰偶音五口翻駼音塗下同余按後漢書胸奴有溫禺犢王班固燕然銘曰斬溫禺以釁鼓血尸逐以梁鍔意溫偶即溫禺也後人妄加禺旁從人耳當讀曰禺未曉其形狀所生請遣使問之形狀謂地形之夷險可割與不可割之狀也師古曰所生謂山之所生草木鳥獸為用者藩容歸漢後復使胸奴復扶又翻至則求地單于曰父兄傳五世呼韓邪傳其長子復株絫復株絫傳其弟搜諧搜諧又傳其弟車牙車牙傳之囊知牙斯是為五世至知獨求何也單于名囊知牙斯王莽專政諷其慕中國不二名始名知史從簡便因以單名書於此胸奴西邊諸侯作穹廬及車皆仰此山材木師古曰謂諸小王為諸侯效中國之言耳仰音牛向翻不敢失也先父謂呼韓邪遷太原太守單于遣使上書以藩求地狀聞守式又翻使疏吏翻詔報單于章十四行本于下有曰字乙十一行本同孔本同藩亶稱詔從單于求地法當死更大赦二余按是年後至明年哀帝即位大赦又明年改元赦詔云更大赦二以此知夏侯藩再使胸奴必在建平初師古曰更經也音工衡翻不令當胸奴濟子禮翻四年冬十月甲寅王根病免四年上以太子既奉大宗後不得顧私親按禮父祖以上正嫡相傳為大宗別子為祖繼別為宗繼禰者為小宗定陶王以帝弟之子入奉大宗後義不得復顧定陶共王親也立楚孝王孫景為定陶王章十四行本王下有以奉共王後五字乙十一行本同共作恭孔本同張校同楚孝王囂宣帝之子太子議欲謝少傅閻崇以為為人後之禮不得顧私親不當謝少詩照翻下少府同太傅趙玄以為當謝太子從之詔問所以謝狀尚書劾奏玄左遷少府劾戶概翻以光祿勳師丹為太傅初太子之幼也王祖母傅太后躬自養視在定陶國時也詔傅太后章十四行本后下有與太子母四字乙十一行本同孔本同退齊校同丁姬自居定陶國邸丁姬事定陶共王實生太子頃之王太后欲令傅太后丁姬十日一至太子家帝曰太子承正統當共養陛下漢亦稱太后為陛下後世多稱殿下唯臨朝乃稱陛下共音居用翻養音弋尚翻此私親謂傅太后丁姬復扶又翻下同太子小而傅太后抱養之今至太子家以乳母恩耳謂抱養太子恩猶乳母也於是令傅太后得至太子家丁姬以不養太子獨不得四年衛尉侍中淳于長有寵於上大見信用貴傾公卿外交諸侯牧守賂遺牧州牧也守郡守也遺于季翻下同淫於聲色淫過也放也龍雒思侯韓寶增子也晉灼曰孊音靡余按韓寶已死故書諡諡法外內思索曰思追悔前過曰思長與孊私通因取為小妻孊雖皇后之姊列侯之夫人以淫放失身於長而長自有正室故為小妻記曰聘則為妻奔則為妾婦人女子之持身不可不慎也許后廢徙昭臺宮歲餘還徙長定宮師古曰三輔黃圖林光宮中有長定宮欲求復為婕妤長受許后金錢乘輿服御物前後千餘萬乘繩證翻詐許為白上立為左皇后許為于僞翻孊每入長定宮輒與孊書戲侮許后嫚易無不言師古曰嫚褻汙也易輕也易音弋豉翻賂遺連年時曲陽侯根輔政久病數乞骸骨數所角翻長以外親居九卿位長太后姊子於帝室為外家之親侍中騎都尉光祿大夫王莽心害長寵私聞其事莽侍曲陽侯病因言長見將軍久病意喜自以當代輔政至對衣冠議語署置衣冠當時士大夫及貴游子弟也師古曰自謂當輔政故豫言某人為某官某人主某事根怒曰即如是何不白也莽曰未知將軍意故未敢言根曰趣白東宮東宮太后宮師古曰趣讀曰促具言長驕佚欲代曲陽侯私與長定貴人姊通受取其衣物太后亦怒曰兒至如此長太后姊子故呼為兒白之帝莽白上上以太后故免長官勿治罪遣就國就定陵侯國治直之翻初紅陽侯立不得輔政疑為長毀譖常怨毒長毒苦也痛也怨之甚也及長當就國立嗣子融從長請車騎以長當就國所常從車騎無所用故請之師古曰嗣子謂適長子當為嗣者也立因上封事為長求留上時掌翻為于僞翻曰陛下既託文以皇太后故蘇林曰託於詔文也師古曰言不宜遣長就國帝知立素怨長今為長上封事求留疑心於是而起下戶稼翻下同吏捕融立令融自殺以滅口恐融就吏而事泄故令其自殺以滅口遂逮長繫洛陽詔獄凡詔所繫治皆為詔獄非必洛陽先有詔獄也考鞠以窮其姦也謀立左皇后罪至大逆死獄中妻子當坐者徙合浦母若歸故郡長母若即王太后姊故居魏郡元城師古曰若者其母名自殺丞相方進復劾奏紅陽侯立狡猾不道師古曰狡狂也猾亂也復扶又翻上曰紅陽侯朕之舅不忍致法遣就國於是方進復奏立黨友後將軍朱博巨鹿太守孫閎皆免官與故光祿大夫陳咸皆歸故郡朱博杜陵人孫閎亦京師世家陳咸本沛郡相人據漢書翟方進傳則博閎免官獨咸歸故郡耳與字皆字衍元延元年咸免光祿大夫故稱故以憂死方進智能有餘兼通文法吏事以儒雅緣飾章十四行本飾下有法律二字乙十一行本同孔本同張校同師古曰緣飾譬之於衣加純緣者純音之允翻號為通明相相息亮翻天子器重之又善求人主微指微指謂上意所嚮未著見於外者方淳于長用事方進獨與長交稱薦之據方進傳長初用事方進獨與長交及長寵盛與之交者不獨一方進矣上以方進大臣為之隱諱為于僞翻方進內慚上疏章十四行本疏下有謝罪二字乙十一行本同孔本同張校同退齊校同乞骸骨上時掌翻上報曰定陵侯長已伏其辜君雖交通傳不云乎朝過夕改君子與之師古曰與許也余謂此蓋論語傳傳音直戀翻其專心一意毋怠醫藥以自持方進起視事後條奏長所厚善京兆尹孫寶右扶風蕭育刺史二千石以上免二十餘人孫寶蕭育皆能吏也以急於求進比匪人以得罪是以君子慎交素與方進不平函谷關置都尉以譏出入業杜延年之孫素不事權貴與翟方進淳于長皆不平業受紅陽侯書聽請不敬免就國據業傳業與淳于長不平長當就國紅陽侯立與業書屬之勿復用前事相侵長出關後罪復發下洛陽獄丞相史搜得紅陽侯書奏業聽請不敬服虔曰受立屬請為不敬上以王莽首發大姦稱其忠直王根因薦莽自代丙寅以莽為大司馬年時三十八莽既拔出同列繼四父而輔政師古曰鳳商音根四人皆為大司馬而莽之諸父也欲令名譽過前人遂克己不倦聘諸賢良以為掾史賞賜邑錢悉以享士邑錢封邑所入之錢也掾俞絹翻母病公卿列侯遣夫人問疾莽妻迎之衣不曳地布蔽膝蔽膝韡也亦曰韍鄭玄曰韍太古蔽膝之象使問知其夫人此下依漢書有皆驚二字文意乃足他本皆有此二字四年丞相方進大司空武奏言春秋之義用貴治賤不以卑臨尊春秋首止之會殊會王世子世子貴也宋之盟楚駕晉而書先晉黃池之會吳主會而書先晉不以卑臨尊也治直之翻刺史六百石下大夫之秩也其朝位亦班於下大夫臣請罷刺史更置州牧以應古制古制九州一為畿內八州八伯以統諸侯之國今請置州牧以應古州伯之制更工衡翻下同罷刺史更置州牧秩二千石四年犍為郡於水濱得古磬十六枚師古曰濱水崖也音賓說文曰磬樂石也古者毋句氏作磬後或以玉為之犍居言翻劉向因是說上宜興辟雍記王制天子之學曰辟雍鄭玄曰辟明也雍和也所以明和天下說輸芮翻古者黨有庠遂有序庠者養也序者教也隆雅頌之聲盛揖讓之容以風化天下如此而不治者未之有也治直吏翻或曰不能具禮師古曰或曰者劉向設為難者之言而後答釋也如有過差師古曰過差猶失錯也刑罰之過或至死傷今之刑非皋陶之法也而有司請定法削則削筆則筆服虔曰言隨君意也師古曰削者言有所刪去以刀削簡牘也筆者謂有所增益以筆就而書也至於禮樂則曰不敢是敢於殺人不敢於養人也為其俎豆管絃之間小不備為于僞翻因是絶而不為是去小不備而就大不備惑莫甚焉為其不能具禮而廢禮是去小不備而就大不備也俎祭器如几盛牲體者也豆似籩亦所以盛肉籩用竹而豆用木管笙簫之屬也絃琴瑟之屬也刑法輕是舍所重而急所輕也師古曰舍廢也舍讀曰捨所恃以為治也刑法所以助治也治直吏翻今廢所恃而獨立其所助非所以致太平也自京師有悖逆不順之子孫師古曰悖乖也音布內翻至於陷大辟受刑戮者不絶由不習五常之道也師古曰五常仁義禮智信人性之所常行也辟毗亦翻繼暴秦之餘敝民漸漬惡俗貪叨險詖不間義理漸子廉翻師古曰貪甚曰叨言行險曰詖叨音吐高翻詖音彼義翻間習也不示以大化而獨驅以刑罰驅讀與驅同終已不改帝以向言下公卿議下遐稼翻丞相大司空奏請立辟雍按行長安城南營表未作而罷師古曰營度地也表立標也行下孟翻孔子布衣養徒三千人今天子太學弟子少詩沼翻於是增弟子員三千人歲餘復如故元帝設弟子員千人劉向自見得信於上故常顯訟宗室譏刺王氏及在位大臣其言多痛切發於至誠上數欲用向為九卿數所角翻輒不為王氏居位者及丞相御史所持師古曰持謂扶持佐助也居列大夫官前後三十餘年而卒後十三歲而王氏代漢容肇祖標點顧頡剛聶崇岐覆校
