body:
  text: 資治通鑑卷第一百二十七端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注宋紀九初太祖文皇帝下之下元嘉三十年癸巳四五三初春正月戊寅以南譙王義宣為司徒揚州刺史用義宣刺揚州至是始出命初蕭道成等帥氐羌攻魏武都魏高平鎮將苟莫于將突騎二千救之帥讀曰率將即亮翻騎奇計翻道成等引還南鄭南鄭宋梁南秦二州刺史治所兵志所謂知難而退蕭道成有焉初壬午以征北將軍始興王濬為荊州刺史帝怒未解故濬久留京口既除荊州乃聽入朝朝直遙翻初戊子詔江州刺史武陵王駿統諸軍討西陽蠻軍于五洲水經注江水東徑江夏軑縣故城南縣故弦國也城在山之陽南對五洲江中有五洲相接故以為名其地當在今黃州江州之間孟康曰軑音汰師古曰軑又音徒系翻初嚴道育之亡命也道育亡命事始上卷上年使疏吏翻道育變服為尼匿於東宮又隨始興王濬至京口或出止民張旿家旿疑古翻濬入朝復載還東宮復扶又翻欲與俱往江陵丁巳上臨軒濬入受拜受拜荊州刺史之命有告道育在張旿家者上遣掩捕得其二婢云道育隨征北還都濬為征北將軍故稱之而聞其猶與往來惆悵惋駭惆丑鳩翻惋烏貫翻乃命京口送二婢須至檢覆乃治劭濬之罪言待二婢至檢核覆審其事乃罪二子也治直之翻潘淑抱濬泣曰汝前祝詛事發事見上卷上年祝讀與呪同職救翻何意更藏嚴道育上怒甚我叩頭乞恩不能解今何用生為可送藥來當先自取盡謂欲先自殺也濬奮衣起曰天下事尋自當判願小寬慮必不上纍纍力瑞翻判決也欲決意為商臣之事也濬辭氣凶悖如此潘承帝寵又如此而不以濬言白上何也婦人之仁知愛子而欲掩覆之不知其變愈激也初己未魏京兆王杜元寶坐謀反誅建寧王崇及其子濟南王麗皆為元寶所引賜死史言魏難未已濟子禮翻初帝欲廢太子劭賜始興王濬死先與侍中王僧綽謀之使僧綽尋漢魏以來廢太子諸王典故典經常之籍也故舊事也送典故與二人也武陵王駿素無寵故屢出外藩不得留建康駿自彭城還復出刺江州鑠江湛之妹隨王誕徐湛之之女也湛勸帝立鑠湛之意欲立誕史言江徐各私其私以亂國殺身建立之事仰由聖懷臣謂唯宜速斷不可稽緩當斷不斷反受其亂按漢書齊相召平所引道家之言斷丁亂翻下同略小不忍論語孔子曰小不忍則亂大謀便應坦懷如初謂坦懷待之如父子天性之初也事機雖密易致宣廣不可使難生慮表取笑千載易以豉翻難乃旦翻載祖亥翻言禍難生於思慮之外將取笑於後世也帝曰卿可謂能斷大事然此事至重不可不殷勤三思且彭城始亡彭城王義康死見上卷二十八年三息暫翻又音如字復扶又翻僧綽曰臣恐千載之後言陛下惟能裁弟不能裁兒帝默然江湛同侍坐坐徂臥翻出閣謂僧綽曰卿向言將不太傷切直僧綽曰弟亦恨君不直僧綽年少於湛故自稱為弟鑠自壽陽入朝既至失旨帝欲立宏嫌其非次建平王宏之齒未也於兄弟長幼之序為非次每夜與湛之屏人語或連日纍夕常使湛之自秉燭繞壁檢行慮有竊聽者屏必郢翻帝自以為謀莫密於此矣帝以其謀告潘淑淑以告濬左氏傳有言謀及婦人宜其死也宋文帝處此事其識略又在吳孫亮之下劭乃密與腹心隊主陳叔兒齊帥張超之等謀為逆齊帥主齊內仗衛又掌湯沐燈燭汛掃鋪設帥所類翻初帝以宗室強盛慮有內難慮諸弟為難也難乃旦翻使與羽林相若事見一百二十三卷十六年考異曰宋元凶劭傳云二十八年彗星入太微掃帝座二十九年十一月霖雨連雪太陽罕曜三十年正月風霰且雷上憂有竊發輒加劭兵衆東宮實甲萬人按二十九年劭濬巫蠱事已發豈有因十二月及明年正月災異而更加劭兵今從宋略黠下八翻桀也慧也帝深倚之及將作亂每夜饗將士或親自行酒王僧綽密以啓聞王僧綽又啓聞此事劭之逆狀彰灼無可疑者而帝猶豫不斷殆天奪之鑒也將即亮翻癸亥夜考異曰劭傳云二十一日夜按長曆是月甲辰朔宋略云癸亥夜乃二十日也今從之魯秀謀反汝可平明守闕帥衆入帥讀曰率因使張超之等集素所畜養兵士二千餘人皆被甲畜許六翻被皮義翻召內外幢隊主副豫加部勒云有所討幢傳江翻夜呼前中庶子右軍長史蕭斌蕭斌前嘗為太子中庶子而此時則為右軍長史也斌音彬晉武帝泰始四年罷振威揚威護軍置左右積弩將軍宋齊之制東宮亦置左右積弩將軍劭流涕謂曰主上信讒將見罪廢內省無過不能受枉省所景翻明旦當行大事左傳楚潘崇謂商臣曰能行大事乎對曰能遂以宮甲圍其父成王而弒之因起遍拜之衆驚愕莫敢對淑章十二行本淑上有久之二字乙十一行本同孔本同張校同斌皆曰自古無此願加善思善思猶今人言好思量也變色斌懼與衆俱曰當竭身奉令淑叱之曰卿便謂殿下真有是邪殿下幼嘗患風或是疾動耳言病風喪心或致有是言因眄淑曰事當克不眄眠見翻目偏合而斜視也不讀曰否淑曰居不疑之地何患不克但恐既克之後不為天地所容大禍亦旋至耳旋還反也疾也猶將可息左右引淑出曰此何事而云可罷乎淑還省還左衛率省也至四更乃寢更工衡翻甲子宮門未開劭以朱衣加戎服上乘畫輪車朱衣太子入朝之服晉志曰畫輪車駕牛以綵漆畫輪轂故名曰畫輪車上起四夾杖左右開四望緑油幢朱絲絡其上形制事事如輦其下猶如犢車耳太子法駕亦謂之鸞路非法駕則乘畫輪車兩箱裏飾以金錦黃金塗五采衛從如常入朝之儀從才用翻朝直遙翻呼袁淑甚急淑眠不起劭停車奉化門奉化門東宮西門淑徐起至車後劭使登車又辭不上上時掌翻劭命左右殺之守門開停留以候門開曰守萬春門臺城東門東宮隊不得入城言不得入臺城也受敕有所收討令後隊速來張超之等數十人馳入雲龍門及齊閣拔刀徑上合殿李延壽曰晉世諸帝多處內房朝宴所臨東西二堂而已孝武末年清暑方構永初受命無所改作所居惟稱西殿不製嘉名文帝因之亦有合殿之稱燭猶未滅門階戶席直衛兵尚寢未起帝見超之入舉几捍之五指皆落遂弒之年四十七趣北戶未及開兵人殺之趣七喻翻劭進至合殿中閣聞帝已殂出坐東堂蕭斌執刀侍直呼中書舍人顧嘏嘏震懼不時出既至問曰欲共見廢何不早啓嘏未及答即於前斬之江湛直上省侍中省有上省下省上省在禁中湛時為侍中入直上省歎曰不用王僧綽言以至於此乃匿傍小屋中劭遣兵就殺之宿衛舊將羅訓徐罕皆望風屈附南史卜天與傳作徐牢將即亮翻宋宿衛之官有細鎧主細鎧將細仗主等被皮義翻執刀持弓疾呼左右出戰徐罕曰殿下入汝欲何為天與罵曰殿下常來云何於今乃作此語只汝是賊手射劭於東堂幾中之射而亦翻幾居希翻中竹仲翻劭黨擊之斷臂而死隊將張泓之朱道欽陳滿與天與俱戰死斷丁管翻將即亮翻左衛將軍尹弘惶怖通啓求受處分怖普布翻處昌呂翻分扶問翻劭使人從東閣入東閣東閣門也劭尊帝廟號中宗孝武帝即位改廟號曰太祖濬時在西州濬自京口入朝暫居西州帥讀曰率府舍人者濬府之舍人也自晉以來諸王府舍人十人臺內喧譟宮門皆閉道上傳太子反未測禍變所至濬陽驚曰今當奈何法瑜勸入據石頭濬未得劭信不知事之濟不濟不讀曰否騷擾不知所為將軍王慶曰今宮內有變未知主上安危凡在臣子當投袂赴難難乃旦翻憑城自守非臣節也濬不聽乃從南門出徑向石頭文武從者千餘人時南平王鑠戍石頭兵士亦千餘人從才用翻史言濬鑠之衆足以討除逆亂俄而劭遣張超之馳馬召濬濬屏人問狀屏必逞翻即戎服乘馬而去朱法瑜固止濬濬不從出中門王慶又諫曰太子反逆天下怨憤明公但當堅閉城門坐食積粟石頭倉城有積粟凶黨自離公情事如此今豈宜去濬曰皇太子令敢有復言者斬復扶又翻既入見劭劭章十二行本劭下有謂濬二字乙十一行本同孔本同張校同曰潘淑遂為亂兵所害濬曰此是下情由來所願梟食母破獍食父若濬者兼梟獍之心以為心劭詐以太祖詔召大將軍義恭尚書令何尚之入拘於內內謂臺內至者才數十人劭遽即位下詔曰徐湛之江湛弒逆無狀吾勒兵入殿已無所及號惋崩衄號戶刀翻惋烏貫翻衄女六翻肝心破裂今罪人斯得元凶克殄可大赦改元太初即位畢亟稱疾還永福省永福省太子所居也在禁中以白刃自守夜則列燈以防左右以蕭斌為尚書僕射領軍將軍以何尚之為司空前右衛率檀和之戍石頭征虜將軍營道侯義綦鎮京口義綦義慶之弟也義慶長沙王道憐第二子嗣臨川王道規國乙丑悉收先給諸處兵還武庫殺江徐親黨尚書左丞荀赤松右丞臧凝之等凝之燾之孫也以殷仲素為黃門侍郎王正見為左軍將軍張超之陳叔兒皆拜官賞賜有差輔國將軍魯秀在建康劭謂秀曰徐湛之常欲相危事見上卷二十八年為于僞翻使秀與屯騎校尉龐秀之對掌軍隊騎奇計翻校戶教翻軍隊軍主隊主所統之兵劭不知王僧綽之謀以僧綽為吏部尚書王僧綽於此時不受劭官繼之以死則人臣之節盡矣武陵王駿屯五洲沈慶之自巴水來咨受軍略水經巴水出廬江雩婁縣之巴山南歷蠻中又南流注于江今謂之巴河在蘄州界源出板石山去年帝使沈慶之討蠻是年使武陵王駿統討蠻諸軍故慶之來詣駿咨受軍略軍略謂用兵之策略也乙亥典籤董元嗣武陵王鎮彭城董元嗣已為府典籤具言太子殺逆殺讀曰弒章十二行本正作弒孔本同張校同駿使元嗣以告僚佐宣劭弒逆之罪將舉兵也蕭斌婦人言其怯弱無能為也皆易與耳易以豉翻東宮同惡不過三十人謂張超之陳叔兒等謂魯秀龐秀之等今輔順討逆順謂武陵王逆謂劭也沈慶之以此言作諸人義勇之氣初壬午魏主尊保太后為皇太后尊保太后見上卷上年以乳母為母非禮也官爵兄弟皆如外戚史言魏主寵秩私昵之過初太子劭分浙東五郡為會州以會稽名州也會古外翻立司隸校尉浙東五郡本屬揚州分為會州又改揚州為司隸校尉以統京畿欲倣魏晉都洛舊制沖融之曾孫也殷融見九十四卷晉成帝咸和三年荊嚴荊改揚州刺史南譙王義宣為太尉始興王濬為驃騎將軍驃匹妙翻騎奇計翻雍州刺史臧質為丹楊尹雍於用翻會稽太守隨王誕為會州刺史欲就會稽用誕統浙東五郡劭料檢文帝巾箱料音聊巾箱所以藏要密文書便於尋閲及江湛家書疏得王僧綽所啓饗士並前代故事即所上廢太子諸王典故疏所去翻甲申收僧綽殺之僧綽弟僧虔為司徒左西屬左西屬左西曹屬也舊制司徒府有東西曹曹有掾有屬宋於西曹又分左右僧虔泣曰吾兄奉國以忠貞撫我以慈愛今日之事苦不見及耳若得同歸九泉猶羽化也羽化猶言登仙神仙家所謂飛升也云與僧綽謀反諸王侯列第於臺城北故曰北第此皆穆武子孫也章十二行本弟下有楷字乙十一行本同孔本同張校同退齊校同臨川哀王燁臨川王義慶本長沙王道憐之子嗣臨川王道規今燁又以長沙王瑾弟嗣義慶瑾渠吝翻覬音冀新渝當作新喻考異曰劭傳作球今從長沙王道憐傳皆劭所惡也惡烏路翻瑾義欣之子義欣長沙王道憐之子義康之子覬玠義慶之弟子也劭密與沈慶之手書令殺武陵王駿慶之求見王王懼辭以疾慶之突入以劭書示王王泣求入內與母訣武陵王母路淑媛下官受先帝厚恩今日之事惟力是視殿下何見疑之深王起再拜曰家國安危皆在將軍慶之即命內外勒兵府主簿顏竣曰竣七倫翻今四方未知義師之舉劭據有天府天府謂建康首謂武陵已倡義於九江尾謂諸方征鎮宜待諸鎮協謀然後舉事慶之厲聲曰今舉大事而黃頭小兒皆得參預男女始生為黃頭小兒言其如嬰兒未有知識也宜斬以徇王令竣拜謝慶之慶之曰君但當知筆札事耳於是專委慶之處分旬日之間內外整辦人以為神兵宋帝紀曰三月乙未建牙于軍門是時多不悉舊儀有一翁班白自稱少從武帝征伐頗悉其事因使指麾事畢忽失所在余謂沈慶之甚練軍事西征北伐久在兵間安有不悉舊儀之理或者舉義之時託武帝神靈以昭神人之助順啓諸方赴義之心也通鑑不語怪故不書處昌呂翻分扶問翻延之之子也顏延之與謝靈運俱以文義著稱靈運死延之獨亶名於時時在建康庚寅武陵王戒嚴誓衆以沈慶之領府司馬襄陽太守柳元景隨郡太守宗慤為咨議參軍領中兵江夏內史朱修之行平東將軍記室參軍顏竣為咨議參軍領録事兼總內外柳元景宗慤以咨議參軍領中兵參軍以前驅之任命二人也顏竣本記室參軍升咨議領録事參軍以總録軍府之任命竣也記室參軍掌箋記夏戶雅翻行留府事延孫道産之子也劉道産鎮襄陽有政績見一百二十四卷十九年南譙王義宣及臧質皆不受劭命與司州刺史魯爽同舉兵以應駿質爽俱詣江陵見義宣司雍皆受督於義宣故俱詣之使疏吏翻辛卯臧質子敦等在建康者聞質舉兵皆逃亡考異曰宋略庚申武陵王戒嚴辛亥臧敷逃按長曆是月甲戌朔無庚申辛亥又宋略上有甲申下有癸巳此必庚寅辛卯字誤也宋書敷作敦今從之下詔曰臧質國戚勳臣臧質高祖敬皇后之姪故曰國戚有邊功故曰勳臣謂用為丹楊尹也良可怪歎迸北諍翻可遣宣譬令還咸復本位劭尋録得敦毛晃曰録收拾也以外戚子弟行杖以訓敕之故曰訓杖初癸巳劭葬太祖于長寧陵據齊書豫章王嶷傳長寧陵隧道出嶷第前路則陵近臺城矣廟號中宗史不用劭所上諡號而用孝武帝所改諡號正劭弒逆之罪絶之也初乙未武陵王發西陽丁酉至尋陽庚子王命顏竣移檄四方考異曰宋略移檄亦在庚申日按謝莊傳曰奉三月二十七日檄然則發檄在庚子日也州郡承檄翕然響應南譙王義宣遣臧質引兵詣尋陽與駿同下留魯爽於江陵劭以兗冀二州刺史蕭思話為徐兗二州刺史起張永為青州刺史思話自歷城引部曲還平城起兵以應尋陽濟南郡東平陵縣有平陸城余謂平城當作彭城還從宣翻又如字亦帥所領赴之帥讀曰率下同南譙王義宣版張永為冀州刺史永遣司馬崔勳之等將兵赴義宣將即亮翻義宣慮蕭思話與永不釋前憾思話繫張永於獄事見上卷上年使長史張暢為書與永張暢永之㣥從也故義宣使之為書隨王誕將受劭命受會州刺史之命說輸芮翻國家此禍開闢未聞今以江東驍鋭之衆此江東謂浙江之東也驍堅堯翻其誰不響應豈可使殿下北面凶逆受其僞寵乎琛曰江東忘戰日久雖逆順不同然強弱亦異琛意謂雖以順討逆然建康強而江東弱其勢異也須待也不為晚也正曰天下未嘗有無父無君之國寧可自安讎恥而責義於餘方乎今正以弒逆冤酷義不共戴天禮記曰父母之讎不共戴天豈求必全邪馮衍有言大漢之貴臣將不如荊齊之賤士乎此蓋馮衍責田邑之言荊齊之賤士謂申包胥赴秦求救以存荊王孫賈殺淖齒以存齊也事實國家者哉琛乃與正共入說誕誕從之說輸芮翻正田子之兄子也沈田子從武帝入關有功後以殺王鎮惡受誅劭自謂素習武事語朝士曰卿等但助我理文書勿措意戎旅若有寇難語牛倨翻朝直遙翻難乃旦翻吾自當之但恐賊虜不敢動耳及聞四方兵起始憂懼戒嚴悉召下番將吏宿衛分上下番更休迭代今悉召下番將吏以自備更不分番章十二行本南下有岸字乙十一行本同孔本同退齊校同居民於北岸秦淮南岸當新亭石頭來路北岸即臺城遷淮南居民於北岸欲阻淮以自固防其出奔也分義恭諸子處侍中下省處昌呂翻據南史侍中下省在神虎門外夏四月癸卯朔柳元景統寧朔將軍薛安都等十二軍發湓口湓音盆司空中兵參軍徐遺寶以荊州之衆繼之南譙王義宣既進位司空以徐遺寶為中兵參軍丁未武陵王發尋陽沈慶之總中軍以從從才用翻劭立殷氏為皇后庚戌武陵王檄書至建康劭以示太常顏延之曰彼誰筆也延之曰竣之筆也劭曰言辭何至於是延之曰竣尚不顧老臣安能顧陛下劭怒稍解悉拘武陵王子於侍中下省南譙王義宣子於太倉空舍劭欲盡殺三鎮士民家口三鎮謂雍荊江凡舉大事者不顧家且多是驅逼今忽誅其室纍正足堅彼意耳纍力瑞翻劭以為然乃下書一無所問劭疑朝廷舊臣皆不為己用乃厚撫魯秀及右軍參軍王羅漢悉以軍事委之二人皆驍勇善戰故厚撫之委以軍事冀得其力殷沖掌文符蕭斌勸劭勒水軍自上決戰不爾則保據梁山上時掌翻今太平州當塗縣西南三十里有天門山亦曰蛾眉山兩山夾大江對峙東曰博望山西曰梁山江夏王義恭以南軍倉猝船舫陋小不利水戰江水東流至武昌以下漸漸向北流蓋南紀諸山所迫坡陀之勢漸使之然也至于江寧江流愈北建康當下流都會望尋陽武昌皆直南望歷陽壽陽皆直西故建康謂歷陽皖城以西皆曰江西而江西亦謂建康為江東建康謂采石為南州京口為北府皆地勢然也江夏王義恭在建康以義師為南軍即此義舫甫妄翻賊駿小年未習軍旅遠來疲弊宜以逸待之今遠出梁山則京都空弱東軍乘虛或能為患東軍謂會稽隨王誕之兵也則兵散勢離不如養鋭待期坐而觀釁割棄南岸柵斷石頭此先朝舊法釁許靳翻斷丁管翻朝直遙翻先朝舊法謂晉明帝拒王含及武帝拒盧循時用兵之法不憂賊不破也劭善之斌厲色曰南中郎二十年少能建如此大事豈復可量時武陵王駿為南中郎將江州刺史故稱之武陵王時年二十四少詩照翻復扶又翻量音良勢據上流三方謂荊雍江柳元景宗慤屢嘗立功沈慶之常與蕭斌同在碻磝柳元景討蠻出關陝皆有功宗慤有平林邑之功又有討蠻之功故斌皆憚之實非小敵唯宜及人情未離尚可決力一戰端坐臺城何由得久今主相咸無戰意豈非天也弒逆事起蕭斌以宮僚之舊逼於凶威遂為同惡其心慙負天地無所自容唯欲幸一戰之勝相與苟活今劭不肯逆戰斌知必敗故歸之天相息亮翻或勸劭保石頭城劭曰昔人所以固石頭城者俟諸侯勤王耳我若守此誰當見救唯應力戰決之不然不克日日自出行軍慰勞將士行下孟翻勞力到翻親督都水治船艦都水漢官處處有之前漢屬水衡都尉後漢屬少府其後分屬郡國晉屬大司農治直之翻壬子焚淮南岸室屋淮內船舫悉驅民家渡水北秦淮水之北也立子偉之為皇太子以始興王濬父褚湛之為丹楊尹湛之裕之之兄子也褚裕之見一百十卷晉安帝義熙六年加南平王鑠開府儀同三司以南兗州刺史建平王宏為江州刺史欲以代武陵王人情由是大震劭委龐秀之以掌軍隊秀之先奔南軍故人情大震先息薦翻檀和之為雍州刺史欲以代臧質雍於用翻癸丑武陵王軍于鵲頭鵲頭在宣城郡界左傳楚以諸侯伐吳吳敗之于鵲岸唐志宣州南陵縣有鵲頭鎮兵蓋其地在鵲洲之頭未知所從客說之曰方今釁逆滔天說輸芮翻釁許覲翻古今未有為君計莫若承義師之檄移告傍郡苟在有心誰不響應謂凡有人心者皆若響之應聲如其不能可躬帥向義之徒帥讀曰率詳擇水陸之便致身南歸亦其次也僧達乃自候道南奔候道伺候邊上警急之道也今沿路列置烽臺者即候道王即以為長史僧達弘之子也王弘歷事武文位任隆重沈慶之謂人曰王僧達必來赴義人問其故慶之曰吾見其在先帝前議論開張意向明決以此言之其至必也王氏江南冠族僧達又名公之子也沈慶之於建義之初欲致之以為民望耳柳元景以舟艦不堅憚於水戰乃倍道兼行丙辰至江寧步上江寧縣臨江渚晉咸和之後以江外無事於南浦置江寧縣宋白曰江寧縣本秣陵之地晉置江寧縣在今縣南七十里故城存焉隋開皇十年移於冶城按宋白所謂今縣乃天祐十四年楊氏所置縣也艦戶黯翻上時掌翻秦淮之上也為陳逆順朝直遙翻為于僞翻觀柳元景用兵方略固有必勝之理矣劭加吳興太守汝南周嶠冠軍將軍隨王誕檄亦至嶠素恇怯回惑不知所從冠古玩翻恇去王翻府司馬丘珍孫殺之舉郡應誕戊午武陵王至南洲降者相屬南洲屬姑孰降戶江翻下同屬之欲翻己未軍于溧洲溧音栗王自發尋陽有疾不能見將佐唯顏竣出入臥內在室在舟凡寢臥之所皆謂之臥內將即亮翻親視起居疾屢危篤不任咨稟竣皆專決言病甚不能決事凡內外咨稟竣皆專決任音壬間以文教書檄應接遐邇間古莧翻昏曉臨哭若出一人臨力鴆翻如是纍旬自舟中甲士亦不知王之危疾也按是月丁未王發尋陽己未至溧洲十三日耳丙寅至江寧方二十日今曰纍旬當是以至江寧為限耳癸亥柳元景潛至新亭依山為壘考異曰宋略云壬戌元景次新林依山為壘按本紀癸亥元景至新亭元景傳元景至新亭經日劭乃水陸出軍今從之元景曰不然理順難恃同惡相濟輕進無防實啓寇心兵法所謂先為不可勝以待敵之可勝柳元景以之元景營未立劭龍驤將軍詹叔兒覘知之驤思將翻勸劭出戰劭不許甲子劭使蕭斌統步軍褚湛之統水軍與魯秀王羅漢劉簡之精兵合萬人史言唯魯秀王羅漢劉簡之所部之兵精耳劭自登朱雀門督戰元景宿令軍中曰鼓繁氣易衰叫數力易竭宿令者先未戰之日而令之也易以豉翻數所角翻一聽吾鼓聲劭將士懷劭重賞皆殊死戰元景水陸受敵意氣彌強麾下勇士悉遣出鬬左右唯留數人宣傳宣傳號令也魯秀擊退鼓劭衆遽止師之耳目在於旗鼓鼓疾所以進衆鼓徐所以退衆魯秀誤鳴退鼓天使之也劭衆大潰墜淮死者甚多劭更帥餘衆自來攻壘帥讀曰率元景復大破之所殺傷過於前戰士卒爭赴死馬澗澗為之溢死者塞澗故澗水溢復扶又翻為于僞翻不能禁劉簡之死蕭斌被創被皮義翻創初良翻劭僅以身免走還宮魯秀褚湛之檀和之皆南奔丙寅武陵王至江寧丁卯江夏王義恭單騎南奔夏戶雅翻騎奇計翻劭殺義恭十二子劭濬憂迫無計以輦迎蔣侯神像置宮中稽顙乞恩拜為大司馬封鍾山王蔣侯蔣子文也廟食鍾山吳孫氏以其祖諱鍾改曰蔣山稽音啓據齊書崔祖思傳蘇侯神即蘇峻驃匹妙翻騎奇計翻與南平王鑠並録尚書事戊辰武陵王軍于新亭大將軍義恭上表勸進散騎侍郎徐爰在殿中誑劭云自追義恭遂歸武陵王因出追義恭遂得歸順散悉亶翻誑居況翻不曉朝章爰素所諳練諳烏含翻乃以爰兼太常丞撰即位儀注己巳王即皇帝位大赦文武賜爵一等從軍者二等謂從軍自尋陽至新亭進爵二等以優之廟號太祖以大將軍義恭為太尉録尚書六條事南徐州刺史是日劭亦臨軒拜太子偉之大赦唯劉駿義恭義宣誕不在原例此劭所下赦文所該也庚子以南譙王義宣為中書監丞相録尚書六條事揚州刺史隨王誕為衛將軍開府儀同三司荊州刺史臧質為車騎將軍開府儀同三司江州刺史騎奇計翻下同沈慶之為領軍將軍蕭思話為尚書左僕射壬申以王僧達為右僕射柳元景為侍中左衛將軍宗慤為右衛將軍張暢為吏部尚書劉延孫顏竣並為侍中五月癸酉朔臧質以雍州兵二萬至新亭雍於用翻豫州刺史劉遵考遣其將夏侯獻之帥步騎五千軍于瓜步將即亮翻帥讀曰率先是世祖遣寧朔將軍顧彬之將兵東入受隨王誕節度孝武帝廟號世祖時初即位而遽以廟號書之蓋因舊史耳先悉薦翻誕自頓西陵為之後繼西陵今紹興府蕭山縣西興鎮是也其地西臨浙江吳越王錢鏐以陵非吉語改曰西興將音即亮翻相遇於曲阿奔牛塘今常州武進縣有奔牛鎮及奔牛堰故老相傳云古有金牛奔此因以名之劭於是緣淮樹柵以自守又決破岡方山埭以絶東軍破岡在晉陵郡延陵縣西北亦有埭埭音代召婦女供役甲戌魯秀等募勇士攻大航克之大航即朱雀航航戶剛翻考異曰元凶傳云其月三日按宋略甲戌乃二日也即放仗降緣渚幢隊以次奔散渚謂秦淮渚也時劭兵緣渚備守以禦義師即秦淮北岸也幢隊幢隊主副所領兵也降戶江翻充塞路衢塞悉則翻是夜劭閉守六門臺城六門大司馬門東華門西華門萬春門太陽門承明門也城中沸亂塹七豔翻丹楊尹尹弘等文武將吏爭踰城出降降戶江翻下同劭燒輦及袞冕服于宮庭蕭斌宣令所統使皆解甲自石頭戴白幡來降詔斬斌於軍門濬勸劭載寶貨逃入海劭以人情離散不果行乙亥輔國將軍朱修之克東府丙子諸軍克臺城各由諸門入會于殿庭獲王正見斬之張超之走至合殿御床之所為軍士所殺刳腸割心諸將臠其肉生噉之噉徒覽翻又徒濫翻建平等七王號哭俱出七王建平王宏及東海王禕義陽王昶武昌王渾湘東王彧建安王休仁餘一人當是休祐但未封劭蓋拘七王於宮中故號哭俱出號戶高翻入武庫井中隊副高禽執之劭曰天子何在禽曰近在新亭至殿前臧質見之慟哭劭曰天地所不覆載丈人何為見哭覆敷又翻臧質武敬皇后之姪故劭呼為丈人又謂質曰劭可啓得遠徙不不讀曰否質曰主上近在航南航南謂大航之南處昌呂翻分扶問翻縛劭於馬上防送軍門時不見傳國璽璽斯氏翻以問劭劭曰在嚴道育處就取得之斬劭及四子於牙下濬帥左右數十人挾南平王鑠南走帥讀曰率遇江夏王義恭於越城濬下馬曰南中郎今何所作義恭曰上已君臨萬國又曰虎頭來得無晚乎義恭曰殊當恨晚又曰故當不死邪義恭曰可詣行闕請罪天子出行幸所居之所謂之行宮豹尾之內同之禁中旌門之外謂之行闕未審能賜一職自效不不讀曰否史言劭濬狂愚望生義恭又曰此未可量量音良勒與俱歸於道斬之及其三子劭濬父子首並梟於大航梟堅堯翻暴尸於市劭殷氏及劭濬諸女妾媵皆賜死於獄媵以證翻汙瀦劭所居齊古者臣弒君子弒父殺無赦壞其室汙其宮而瀦焉鄭玄曰瀦都也南方人謂都為瀦釋停水曰瀦謂獄丞江恪曰汝家骨肉相殘何以枉殺無罪人恪曰受拜皇后非罪而何殷氏曰此權時耳當以鸚鵡為后褚湛之之南奔也濬即與褚離絶故免於誅史言褚得免死之由焚尸揚灰於江殷沖尹弘王羅漢及淮南太守沈璞皆伏誅璞纍為濬參佐守于湖不迎義師故誅庚辰解嚴辛巳帝如東府百官請罪詔釋之甲申尊帝母路淑媛為皇太后淑媛魏文帝所制晉武帝采漢魏之制淑淑媛淑儀修華修儀修容婕妤容華充華為九嬪位視九卿媛于眷翻丹楊人也乙酉立王氏為皇后后父偃導之玄孫也王導東晉元臣子孫為江左衣冠甲族戊子以柳元景為雍州刺史雍於用翻辛卯追贈袁淑為太尉諡忠憲公徐湛之為司空諡忠烈公江湛為開府儀同三司諡忠簡公王僧綽為金紫光祿大夫諡簡侯旌其死難也壬辰以太尉義恭為揚南徐二州刺史進位太傅領大司馬初劭以尚書令何尚之為司空領尚書令子征北長史偃為侍中父子並居權要及劭敗尚之左右皆散自洗黃閣舊制三公聽事置黃閣五代志曰三公府三門當中開黃閣設內屏人為之寒心為于僞翻帝以尚之偃素有令譽且居劭朝用智將迎時有全脫所謂全脫者活三鎮士民家口朝直遙翻復以尚之為尚書令偃為大司馬長史位遇無改甲午帝謁初寧長寧陵追贈卜天與益州刺史諡壯侯旌死節也長給稟祿卜天與袁淑徐湛之江湛四家稟筆錦翻賜穀也供給也又力錦翻廩食也旌其戰死也戊戌以南平王鑠為司空建平王宏為尚書左僕射蕭思話為中書令丹楊尹六月丙午帝還宮還自謁陵也初初帝之討西陽蠻也屯五州時及質起兵欲奉南譙王義宣為主潛使元景帥所領西還帥讀曰率還從宣翻元景即以質書呈帝語其信曰語牛倨翻信使也臧冠軍當是未知殿下義舉耳臧質以冠軍將軍鎮襄陽冠古玩翻方應伐逆不容西還質以此恨之及元景為雍州雍於用翻質慮其為荊江後患建議元景當為爪牙不宜遠出帝重違其言戊申以元景為護軍將軍領石頭戍事初己酉以司州刺史魯爽為南豫州刺史庚戌以衛軍司馬徐遺寶為兗州刺史為魯爽徐遺寶與臧質同反張本初庚申詔有司論功行賞封顏竣等為公侯竣七倫翻初辛未徙南譙王義宣為南郡王隨王誕為竟陵王立義宣次子宜陽侯愷為南譙王初閏月壬申以領軍將軍沈慶之為南兗州刺史鎮盱眙盱眙音吁怡癸酉以柳元景為領軍將軍初乙亥魏太皇太后赫連氏殂初丞相義宣固辭內任及子愷王爵甲午更以義宣為荊湘二州刺史沈約曰晉懷帝分荊州立湘州成帝咸和三年省安帝義熙八年復立十二年又省宋武帝永初三年又立文帝元嘉八年省十七年又立二十九年又省孝武帝孝建元年又立今按是年四月元凶劭以營道侯義綦為湘州刺史蓋以義宣以荊州舉義欲分其軍府耳帝既即位遂以義宣為荊湘二州刺史湘州之立實在是年也更工衡翻將佐以下並加賞秩將即亮翻以竟陵王誕為揚州刺史初秋七月辛酉章十二行本酉作丑乙十一行本同孔本同朔日有食之甲寅詔求直言辛酉詔省細作並尚方雕文塗飾貴戚競利悉皆禁絶宋有細作署令大明四年改為左右御府令中軍録事參軍周朗上疏以為毒之在體必割其緩處歷下泗間不足戍守歷下謂歷城泗間謂彭城湖陸當時議者蓋以魏連有內難遂謂之衰兵甲饋餫之費虛內以給外則吾國之病甚於胡運之衰徒費財役使虜但發輕騎三千更互出入騎奇計翻更工衡翻春來犯麥秋至侵禾水陸漕輸居然復絶虜騎至則江南之人不敢至彭泗水陸漕輸絶矣復扶又翻不至二年卒散民盡可蹻足而待也蹻巨驕翻今人知不以羊追狼蟹捕鼠而令重車弱卒與肥馬悍胡相逐其不能濟固宜矣言不濟事也悍下罕翻又侯旰翻三年之喪天下之達喪漢氏節其臣則可矣薄其子則亂也短喪自漢景帝始詳見十五卷漢文帝後七年則莫能順焉至乎敗於禮而安於身必遽而奉之今陛下以大孝始基宜反斯謬言帝既能討元凶劭之罪當行三年之喪以反短喪之謬舉天下以奉一君何患不給一體炫金不及百兩炫胡練翻炫金今之銷金是也一歲美衣不過數襲而必收寶連櫝集服纍笥目豈常視身未時親是櫝帶寶笥著衣也著陟略翻何糜蠹之劇惑鄙之甚邪且細作始並以為儉節而市造華怪即傳於民如此則遷也非罷也此等語切中當時之病凡欲言時政若此可也否則迎合以徼利祿耳制度日侈見車馬不辨貴賤視冠服不知尊卑尚方今造一物小民明已目辟睨明謂來旦也目辟與睥同匹詣翻庶家晚已裁學侈麗之源實先宮閫嗚呼我宋之將亡其習俗亦如此吾是以悲二宋之一轍也嗚呼先悉薦翻又設官者宜官稱事立人稱官置稱尺證翻王侯識未堪務不應強仕此強仕謂強之使仕也強其兩翻人誰謂賤但宜詳置賓友茂擇正人亦何必列長史參軍別駕從事然後為貴哉此言亦深切宋藩王出鎮之弊俗好以毀沈人不察其所以致毀好呼到翻沈持林翻沈言沒人之實也以譽進人不察其所以致譽譽音余下同毀徒皆鄙則宜擢其毀者譽黨悉庸則宜退其譽者如此則毀譽不妄善惡分矣論語子貢問孔子曰鄉人皆好之何如子曰未可也鄉人皆惡之何如子曰未可也不如鄉人之善者好之其不善者惡之周朗之言正得此意蓋晉宋以來諸州中正品定人物高下其手毀譽之失實也久矣無時不有下令然升平不至昏危相繼何哉設令之本非實故也朗指帝求言非實忤旨自解去職朗嶠之弟也周嶠為丘珍孫所殺事見上忤五故翻侍中謝莊上言詔云貴戚競利悉皆禁絶此實允愜民聽若有犯違則應依制裁糾若廢法申恩便為明詔既下而聲實乖爽也爽差也尤不宜與民爭利不審可得在此詔不不讀曰否莊弘微之子也謝弘微進用於元嘉之初上多變易太祖之制郡縣以三周為滿宋之善政於是乎衰元嘉之制守宰以六期為斷然自時厥後率以三周為滿而又有數更數易不及三周者初乙丑魏濮陽王閭若文征西大將軍永昌王仁皆坐謀叛仁賜死於長安若文伏誅初南平穆王鑠素負才能意常輕上又為太子劭所任出降最晚鑠為始興王濬所挾而走遇江夏王義恭乃降非本心也降戶江翻己巳鑠卒贈司徒以商臣之諡諡之楚世子商臣弒君父而自立卒後諡曰穆初南海太守蕭簡據廣州反簡斌之弟也蕭斌以逆黨誅其弟懼連坐而反考異曰蕭簡傳作劉玩今從本紀法系慶之之從弟也從才用翻簡誑其衆曰臺軍是賊劭所遣衆信之為之固守誑居況翻為于僞翻琬先至止為一攻道法系至曰宜四面並攻若守一道何時可拔琬不從法系曰更相申五十日申容也又緩為之期曰申乃從之八道俱攻一日即破之九月丁卯斬簡廣州平法系封府庫付琬而還史言沈氏兄弟皆能宣力於一時還從宣翻又如字初冬十一月丙午以左軍將軍魯秀為司州刺史為魯秀從臧質等稱兵張本初辛酉魏主如信都中山初十二月癸未以將置東宮省太子率更令等官中庶子等各減舊員之半懲元凶劭之禍也晉制東宮中庶子四人中舍人四人庶子四人舍人十六人洗馬八人更工衡翻初甲午魏主還平城聶崇岐標點王崇武覆校
