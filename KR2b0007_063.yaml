body:
  text: 資治通鑑卷第六十三翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註漢紀五十五建安四年孝獻皇帝戊建安四年己卯一九九建安四年春章甲十一行本春下有三月二字乙十一行本同張校同黑山賊帥張燕與公孫續率兵十萬三道救之帥所類翻未至瓚密使行人齎書告續使引五千鐵騎於北隰之中賢曰下溼曰隰孔穎達曰下溼謂土地窊下常沮洳名為隰也瓚欲自內出戰紹候得其書如期舉火瓚以為救至遂出戰紹設伏擊之瓚大敗復還自守復扶又翻紹為地道穿其樓下施木柱之度足達半便燒之樓輒傾倒稍至京中柱拄也易之中京瓚所居也度徒洛翻乃悉縊其姊妹妻子然後引火自焚紹趣兵登臺斬之縊於賜翻又於計翻趣讀曰促田楷戰死關靖歎曰前若不止將軍自行未必不濟吾聞君子陷人危必同其難難乃旦翻豈可以獨生乎策馬赴紹軍而死公孫瓚之計與陳宮之計一也陳宮之計呂布不能用公孫瓚之計關靖止之是知不惟決計之難贊決者亦難也屠各胡也屠直於翻漁陽田豫說太守鮮于輔曰輔既斬鄒丹遂領漁陽太守說輸芮翻守式又翻曹氏奉天子以令諸侯終能定天下宜早從之輔乃率其衆以奉王命詔以輔為建忠將軍都督幽州六郡初烏桓王丘力居死子樓班年少從子蹋頓有武略代立少詩照翻從才用翻下同賢曰蹋音大蠟翻楊正衡晉書音義蹋徒合翻總攝上谷大人難樓遼東大人蘇僕延右北平大人烏延等袁紹攻公孫瓚蹋頓以烏桓助之瓚滅紹承制皆賜蹋頓難樓蘇僕延烏延等單于印綬又以閻柔得烏桓心因加寵慰以安北邊其後難樓蘇僕延奉樓班為單于以蹋頓為王然蹋頓猶秉計策建安四年眭固屯射犬郡國志河內野王縣有射犬聚唐懷州河內縣有漢射犬故城眭息隨翻四月曹操進軍臨河使將軍史渙曹仁渡河擊之仁操從弟也固自將兵北詣袁紹求救與渙仁遇於犬城渙仁擊斬之操遂濟河圍射犬射犬降降戶江翻操還軍敖倉初操在兗州舉魏种孝廉种音沖兗州叛張邈舉兗州附呂布事見六十一卷興平元年唯魏种且不棄孤及聞种走操怒曰种不南走越北走胡不置汝也既下射犬生禽种操曰唯其才也釋其縛而用之以為河內太守屬以河北事屬之欲翻建安四年以衞將軍董承為車騎將軍建安四年袁術既稱帝淫侈滋甚媵御數百媵以證翻無不兼羅紈厭粱肉自下飢困莫之收恤既而資實空盡不能自立乃燒宮室奔其部曲陳簡雷薄於灊山灊縣屬廬江郡有天柱山賢曰灊縣之山也灊今壽州霍山縣也灊音潛遂大窮士卒散走憂懣不知所為復扶又翻懣音悶乃遣使歸帝號於從兄紹紹與術同祖袁湯以親則從以年則兄也祿去漢室久矣袁氏受命當王符瑞炳然今君擁有四州賢曰青冀幽幷謹歸大命君其興之袁譚自青州迎術欲從下邳北過曹操遣劉備及將軍清河朱靈邀之術不得過復走壽春六月至江亭坐簀床而歎曰袁術乃至是乎賢曰簀笫也謂無茵席也歐血死術從弟胤畏曹操不敢居壽春率其部曲奉術柩及妻子奔廬江太守劉勳於皖城皖縣屬廬江郡今舒州也師古曰皖胡管翻杜佑曰音患考異曰吳志孫策傳曰術死長史楊弘大將張勳等將其衆欲就策廬江太守劉勳邀擊悉虜之收其珍寶以歸與諸書不同今從范書陳志術傳及江表傳獻之璆渠尤翻傳國璽術拘孫堅妻所奪者璽斯氏翻建安四年袁紹既克公孫瓚心益驕貢御稀簡主簿耿包密白紹宜應天人稱尊號紹以包白事示軍府白事所白之事也宜誅妖於驕翻紹不得已殺包以自解紹簡精兵十萬騎萬匹欲以攻許沮授諫曰近討公孫瓚師出歷年百姓疲敝倉庫無積未可動也宜務農息民先遣使獻捷天子若不得通乃表曹操隔我王路沮子余翻王路謂尊王之路也然後進屯黎陽漸營河南益作舟船繕修器械分遣精騎抄其邊鄙令彼不得安我取其逸如此可坐定也使紹能用授言曹其殆乎抄楚交翻郭圖審配曰以明公之神武引河朔之強衆以伐曹操易如覆手易以豉翻何必乃爾授曰夫救亂誅暴謂之義兵恃衆憑強謂之驕兵義者無敵驕者先滅前漢魏相上書曰兵義者王兵驕者滅今舉師南向於義則違且廟勝之策不在強弱曹操法令既行士卒精練非公孫瓚坐而受攻者也今棄萬安之術而興無名之師前漢董公曰兵出無名事故不成為于偽翻下為之同圖配曰武王伐紂不為不義況兵加曹操而云無名且以公今日之強將士思奮不及時以定大業所謂天與不取反受其咎史記范蠡之言吳之所以滅也監軍之計在於持牢紹使授監護諸將故稱為監軍持牢猶今南人言把穩也監古銜翻幾居衣翻紹納圖言圖等因是譖授曰授監統內外監古銜翻威震三軍若其寖盛何以制之夫臣與主同者亡此黃石之所忌也臣與主同言作威作福與主無別也黃石即張良於下邳圯上所得之書也不宜知內紹乃分授所統為三都督使授及郭圖淳于瓊各典一軍騎都尉清河崔琰諫曰天子在許民望助順不可攻也紹不從許下諸將聞紹將攻許皆懼曹操曰吾知紹之為人志大而智小色厲而膽薄忌克而少威少詩沼翻下以少同兵多而分畫不明將驕而政令不壹將即亮翻土地雖廣糧食雖豐適足以為吾奉也孔融謂荀彧曰紹地廣兵強田豐許攸智士也為之謀審配逢紀忠臣也逢皮江翻任其事任音壬顏良文醜勇將也統其兵殆難克乎彧曰紹兵雖多而法不整田豐剛而犯上許攸貪而不治審配專而無謀逢紀果而自用此數人者勢不相容必生內變顏良文醜一夫之勇耳可一戰而禽也秋八月操進軍黎陽使臧霸等將精兵入青州以扞東方臧霸起於泰山稱雄於東方者也故使之為扞袁氏雖欲自平原而東無能為矣九月操還許分兵守官渡賢曰裴松之北征記曰中牟臺下臨汴水是為官渡袁紹曹操壘尚存焉在今鄭州中牟縣北據水經註汴水即莨蕩渠也杜佑曰鄭州中牟縣北十二里有中牟臺是為官渡城袁曹相持之所袁紹遣人招張繡幷與賈詡書結好繡欲許之詡於繡坐上好呼到翻坐徂臥翻顯謂紹使曰歸謝袁本初兄弟不能相容謂與袁術有隙各結黨與以相圖也顯者明言之於稠人中也繡驚懼曰何至於此竊謂詡曰若此當何歸詡曰不如從曹公繡曰袁強曹弱又先與曹為讎謂淯水之戰殺其子也詡曰此乃所以宜從也夫曹公奉天子以令天下其宜從一也紹強盛我以少衆從之少詩沼翻下同必不以我為重曹公衆弱其得我必喜其宜從二也夫有霸王之志者固將釋私怨以明德於四海其宜從三也願將軍無疑冬十一月繡率衆降曹操降戶江翻操執繡手與歡宴為子均取繡女為于偽翻取讀曰娶拜揚武將軍表詡為執金吾封都亭侯凡郡國縣道治所皆有都亭關中諸將以袁曹方爭皆中立顧望涼州牧韋端使從事天水楊阜詣許阜還關右諸將問袁曹勝敗孰在阜曰袁公寬而不斷好謀而少決不斷則無威斷丁亂翻下同少決則後事今雖強終不能成大業曹公有雄才遠略決機無疑法一而兵精能用度外之人所任各盡其力必能濟大事者也曹操使治書侍御史河東衞覬鎮撫關中治直之翻覬音冀時四方大有還民關中諸將多引為部曲覬書與荀彧曰關中膏腴之地頃遭荒亂人民流入荊州者十萬餘家聞本土安寧皆企望思歸企去智翻舉踵也而歸者無以自業諸將各競招懷以為部曲郡縣貧弱不能與爭兵家遂強一旦變動必有後憂夫鹽國之大寶也亂來放散宜如舊置使者監賣監古銜翻下同以其直益市犂牛若有歸民以供給之勤耕積粟以豐殖關中遠民聞之必日夜競還又使司隸校尉留治關中以為之主治直之翻則諸將日削官民日盛此強本弱敵之利也彧以白操操從之始遣謁者僕射監鹽官河東安邑鹽池舊有鹽官鹽之為利厚矣齊用管子鬻筴而霸晉之定都諸大夫必欲其近鹽至漢武之世斡之以佐軍興及唐安史之亂第五琦榷鹽以贍國用自此遂為經賦其利居天下歲入之半監工銜翻時以鍾繇為司隸校尉據魏略及三國志繇實治洛陽蓋暫治弘農以招撫關中也袁紹使人求助於劉表表許之而竟不至亦不援曹操從事中郎南陽韓嵩漢制惟司隸校尉有從事中郎至漢末則州牧亦有從事中郎矣說輸芮翻今兩雄相持天下之重在於將軍若欲有為起乘其敝可也如其不然固將擇所宜從豈可擁甲十萬坐觀成敗求援而不能助見賢而不肯歸此兩怨必集於將軍恐不得中立矣曹操善用兵賢俊多歸之其勢必舉袁紹然後移兵以向江漢恐將軍不能禦也今之勝計勝計謂諸計之中此計為勝也操必重德將軍長享福祚垂之後嗣此萬全之策也蒯越亦勸之蒯苦怪翻表狐疑不斷乃遣嵩詣許曰今天下未知所定而曹操擁天子都許君為我觀其釁為于偽翻下同嵩曰聖達節次守節左傳曹公子欣時之言守節者也夫君臣名定以死守之今策名委質質如字雖赴湯蹈火死無辭也以嵩觀之曹公必得志於天下將軍能上順天子下歸曹公使嵩可也如其猶豫嵩至京師天子假嵩一職不獲辭命則成天子之臣將軍之故吏耳在君為君則嵩守天子之命義不得復為將軍死也惟加重思為于偽翻重除用翻重思猶言三思也無為負嵩表以為憚使強之以其憚於使許強之使行使疏吏翻詔拜嵩侍中零陵太守及還盛稱朝廷曹公之德勸表遣子入侍表大怒以為懷貳大會寮屬陳兵持節將斬之持節以示將斬猶不敢專殺存漢制也韓嵩敢懷貳邪衆皆恐欲令嵩謝嵩不為動容數所具翻為于偽翻徐謂表曰將軍負嵩嵩不負將軍且陳前言表妻蔡氏諫曰韓嵩楚國之望也且其言直誅之無辭表猶怒考殺從行者從才用翻下同知無他意乃弗誅而囚之建安四年揚州賊帥鄭寶欲略居民以赴江表帥所類翻下同以淮南劉曄高族名人曄出於漢之宗室與蔣濟胡質俱為揚州名士曄患之會曹操遣使詣州有所案問曄要與歸家要讀曰邀寶來候使者曄留與宴飲手刃殺之斬其首以令寶軍曰曹公有令敢有動者與寶同罪其衆數千人皆讋服讋即涉翻失氣也推曄為主曄以其衆與廬江太守劉勳勳怪其故曄曰寶無法制其衆素以鈔略為利僕宿無資謂先無名位為之資也鈔楚交翻必懷怨難久故以相與耳天下殽亂之時設有不幸為衆推當以劉曄為法不能贍遣從弟偕求米於上繚諸宗帥不能滿數不滿其所求之數也繚讀曰僚孫策惡勳兵強偽卑辭以事勳曰上繚宗民數欺鄙郡惡烏路翻數所角翻欲擊之路不便上繚甚富實願君伐之請出兵以為外援且以珠寶葛越賂勳文選註曰葛越草布也今葛布謂之葛越白布謂之白越外內盡賀劉曄獨否勳問其故對曰上繚雖小城堅池深攻難守易易以豉翻不可旬日而舉也兵疲於外而國內虛策乘虛襲我則後不能獨守是將軍進屈於敵退無所歸若軍必出禍今至矣勳不聽遂伐上繚至海昏宗帥知之皆空壁逃遷勳了無所得時策引兵西擊黃祖行及石城海昏縣屬豫章郡當豫章大江之口有地名慨口永元中分海昏置建昌縣上繚在建昌界石城縣屬丹楊郡賢曰在今蘇州西南余據水經石城縣在牛渚東酈道元註又云牛渚在石城東減五百里未知孰是又據五代志宣城秋浦縣舊曰石城宋白曰池州貴池石埭二縣皆漢石城縣之地策乃分遣從兄賁輔將八千人屯彭澤宋白曰彭澤縣取彭蠡澤為名漢屬豫章郡今江州彭澤縣南康軍都昌縣皆漢彭澤縣地克之夏戶雅翻皖戶版翻得術勳妻子及部曲三萬餘人表汝南李術為廬江太守給兵三千人以守皖城為李術不附孫氏張本勳還至彭澤孫賁孫輔邀擊破之勳走保流沂流沂地名近西塞西塞山在今壽昌軍東北三十里祖遣其子射率船軍五千人助勳船軍即舟師也復扶又翻下同大破之勳北歸曹操射亦遁走策收得勳兵二千餘人船千艘遂進擊黃祖十二月辛亥策軍至沙羡沙羡縣屬江夏郡晉灼曰羡音夷水經註蒲圻江中有沙陽洲沙陽縣治縣本江夏之沙羡晉太康中改曰沙陽縣將長矛五千來救祖從才用翻將即亮翻甲寅策與戰大破之斬晞祖脫身走獲其妻子及船六千艘艘蘇刀翻士卒殺溺死者數萬人策盛兵將徇豫章屯于椒丘椒丘去豫章南昌縣數十里華子魚自有名字華歆字子魚自有名字言其名聞當時也若不開門讓城金鼓一震不得無所傷害卿便在前具宣孤意翻乃往見華歆曰竊聞明府與鄙郡故王府君齊名中州海內所宗雖在東垂常懷瞻仰歆曰孤不如王會稽王朗為會稽太守為策所破會工外翻不審豫章資糧器仗士民勇果孰與鄙郡復扶又翻歆曰大不如也翻曰明府言不如王會稽謙光之譚耳易曰謙尊而光譚與談同實如尊教孫討逆智略超世用兵如神前走劉揚州君所親見劉揚州謂劉繇亦君所聞也鄙郡即謂會稽自料資糧已知不足不早為計悔無及也今大軍已次椒丘僕便還去明日日中迎檄不到者與君辭矣歆曰久在江表常欲北歸孫會稽來吾便去也乃夜作檄明旦遣吏齎迎策便進軍歆葛巾迎策考異曰華嶠譜叙曰孫策略有揚州盛兵徇豫章一郡大恐官屬請出郊迎歆曰無然策稍進復白發兵又不聽及策至一府皆造閤請出避之乃笑曰今將自來何遽避之有頃門下白曰孫將軍至請見乃前與歆共坐談議良久夜乃別去義士聞之皆長歎而心自服也此說太不近人情今不取府君年德名望遠近所歸策年幼稚稚直利翻宜脩子弟之禮便向歆拜禮為上賓孫盛曰歆既無夷皓韜邈之風又失王臣匪躬之操夷皓謂伯夷四皓也易曰王臣蹇蹇匪躬之故言華歆不能高尚其志又失蹇蹇匪躬之節也交臂於陵肆之徒位奪節墮咎孰大焉邪儒謂虞翻陵肆謂孫策也橈奴教翻墮讀曰隳建安四年策分豫章為廬陵郡以孫賁為豫章太守孫輔為廬陵太守會僮芝病輔遂進取廬陵僮芝據廬陵事見上卷上年裴松之曰按孫策于時始得豫章廬陵尚未能得定江夏瑜之所鎮應在今巴丘縣也與後所屯巴丘處不同余據晉地理志廬陵郡有巴丘縣沈約曰晉立今撫州崇仁縣即其地梁改巴丘曰巴山孫策之克皖城也撫視袁術妻子及入豫章收載劉繇喪善遇其家士大夫以是稱之會稽功曹魏騰嘗迕策意迕五故翻策將殺之衆憂恐計無所出策母吳夫人倚大井謂策曰汝新造江南其事未集方當優賢禮士捨過錄功魏功曹在公盡規汝今日殺之則明日人皆叛汝吾不忍見禍之及當先投此井中耳策大驚遽釋騰初吳郡太守會稽盛憲舉高岱孝廉許貢來領郡岱將憲避難於營帥許昭家烏程鄒佗錢銅及嘉興王晟等難乃旦翻帥所類翻姓譜彭祖裔孫孚為周錢府上士因官命氏佗徒河翻沈約曰嘉興縣本名長水秦改曰由拳吳孫權黃龍四年由拳縣生嘉禾改曰禾興孫皓避父名改曰嘉興縣屬吳郡晟承正翻各聚衆萬餘或數千人不附孫策策引兵撲討皆破之撲普卜翻進攻嚴白虎白虎兵敗奔餘杭餘杭縣前漢屬會稽郡後漢分屬吳郡程普請擊昭策曰許昭有義於舊君有誠於故友此丈夫之志也裴松之曰許昭有義於舊君謂濟盛憲也有誠於故友則受嚴白虎也舍讀曰捨建安四年曹操復屯官渡復扶又翻操常從士徐他等謀殺操常從士常隨從在左右者也從才用翻他徒何翻見校尉許褚色變褚覺而殺之建安四年初車騎將軍董承稱受帝衣帶中密詔與劉備謀誅曹操操從容謂備曰從千容翻今天下英雄惟使君與操耳本初之徒不足數也備方食失匕箸備以操知其英雄懼將圖已故驚失匕筯也匕匙也箸挾也箸遲助翻備因曰聖人云迅雷風烈必變論語記孔子之容遂與承及長水校尉种輯將軍吳子蘭王服等同謀會操遣備與朱靈邀袁術程昱郭嘉董昭皆諫曰備不可遣也操悔追之不及術既南走朱靈等還備遂殺徐州刺史車冑留關羽守下邳行太守事身還小沛車尺遮翻考異曰蜀志先敍董承謀洩誅死備乃殺車冑魏志備殺車冑後明年董承乃死袁紀備據下邳亦在承死前蜀志誤也東海賊昌豨及郡縣多叛操為備據蜀志昌豨即昌霸豨許豈翻又音希呂布之敗太山諸屯帥皆降於曹操獨豨反側於其間蓋自恃其才略過於臧霸之徒也遣使與袁紹連兵操遣司空長史沛國劉岱中郎將扶風王忠擊之不克備謂岱等曰使汝百人來無如我何曹公自來未可知耳五年五年春正月董承謀洩壬子曹操殺承及王服种輯皆夷三族操欲自討劉備諸將皆曰與公爭天下者袁紹也今紹方來而棄之東言紹方來寇乃棄而不顧而東征備也若何操曰劉備人傑也今不擊必為後患郭嘉曰紹性遲而多疑來必不速備新起衆心未附急擊之必敗操師遂東冀州別駕田豐說袁紹曰曹操與劉備連兵未可卒解說輸芮翻卒讀曰猝公舉軍而襲其後可一往而定紹辭以子疾未得行豐舉杖擊地曰嗟乎遭難遇之時而以嬰兒病失其會惜哉事去矣曹操擊劉備破之考異曰魏書曰備謂操與大敵連不得東而候騎卒至言曹公來備大驚然猶未信自將數十騎出望公軍見麾旌便棄衆而走計備必不至此魏書多妄進拔下邳禽關羽又擊昌豨破之備奔青州因袁譚以歸袁紹紹聞備至去鄴二百里迎之紹遠出迎備重敬之也所亡士卒稍稍歸之曹操還軍官渡紹乃議攻許田豐曰曹操既破劉備則許下非復空虛復扶又翻且操善用兵變化無方衆雖少少詩沼翻下同未可輕也今不如以久持之將軍據山河之固擁四州之衆外結英雄內修農戰然後簡其精銳分為奇兵孫子兵法曰凡戰以正合以奇勝註曰正者當敵奇者擊其不備救右則擊其左救左則擊其右使敵疲於奔命民不得安業我未勞而彼已困不及三年可坐克也今釋廟勝之策定策於廟堂之上而決勝於千里之外謂之廟勝孫子曰未戰而廟勝得算多也未戰而廟不勝得算少也若不如志悔無及也紹不從豐強諫忤紹紹以為沮衆械繫之忤五故翻沮在呂翻於是移檄州郡數操罪惡數所具翻二月進軍黎陽沮授臨行會其宗族散資財以與之沮子余翻曰勢存則威無不加勢亡則不保一身哀哉其弟宗曰曹操士馬不敵君何懼焉授曰以曹操之明略又挾天子以為資我雖克伯珪公孫瓚字伯珪將即亮翻忲他蓋翻侈也軍之破敗在此舉矣揚雄有言六國蚩蚩為嬴弱姬其今之謂乎賢曰法言之文也嬴秦姓姬周姓方言曰蚩悖也六國悖惑侵弱周室終為秦所併也為于偽翻振威將軍程昱沈約曰振威將軍始於後漢初宋登為之鄄音絹曹操欲益昱兵二千昱不肯曰袁紹擁十萬衆自以所向無前今見昱少兵必輕易少詩沼翻下同易以豉翻不來攻若益昱兵過則不可不攻攻之必克徒兩損其勢願公無疑紹聞昱兵少果不往操謂賈詡曰程昱之膽過於賁育矣賁音奔袁紹遣其將顏良攻東郡太守劉延於白馬賢曰白馬縣屬東郡今滑州縣也故城在今縣東良性促狹雖驍勇不可獨任紹不聽驍堅堯翻夏四月曹操北救劉延荀攸曰今兵少不敵必分其勢乃可公到延津杜預曰陳留酸棗縣北有延津唐衞州新鄉縣有延津關關蓋在延津北岸曹操所向乃延津南岸紹必西應之然後輕兵襲白馬掩其不備顏良可禽也操從之紹聞兵渡即分兵西邀之操乃引軍兼行趣白馬趣七喻翻未至十餘里良大驚來逆戰操使張遼關羽先登擊之羽望見良麾蓋戎車大將所乘者設幢麾張蓋刺七亦翻斬其首而還還從宣翻又如字紹軍莫能當者遂解白馬之圍徙其民循河而西紹渡河追之沮授諫曰勝負變化不可不詳今宜留屯延津分兵官渡若其克獲還迎不晚還迎留屯大軍也難乃旦翻衆弗可還紹弗從授臨濟歎曰上盈其志下務其功悠悠黃河吾其濟乎遂以疾辭紹不許而意恨之復省其所部幷屬郭圖紹軍至延津南操勒兵駐營南阪下水經註白馬縣有神馬亭實中層峙南北二百步東西五十餘步自外耕耘墾斫削落平盡正南有陟足厂田坴陛下方軌西去白馬津可二十里南距白馬縣故城可五十里即開山圖所謂白馬山也南陂其在山之南歟此時操兵循河已入酸棗界當攷曰可五六百騎有頃復白騎稍多步兵不可勝數復扶又翻下同勝音升數所具翻操曰勿復白令騎解鞍放馬是時白馬輜重就道諸將以為敵騎多不如還保營荀攸曰此所以餌敵如何去之操顧攸而笑紹騎將文醜與劉備將五六千騎前後至諸將復白可上馬操曰未也有頃騎至稍多或分趣輜重趣七喻翻重直用翻操曰可矣乃皆上馬時騎不滿六百遂縱兵擊大破之斬醜醜與顏良皆紹名將也再戰悉禽之紹軍奪氣三軍以氣為主氣奪則其軍不振初操壯關羽之為人而察其心神無久留之意使張遼以其情問之羽歎曰吾極知曹公待我厚然吾受劉將軍恩誓以共死不可背之背蒲妹翻吾終不留要當立效以報曹公乃去耳遼以羽言報操操義之及羽殺顏良操知其必去重加賞賜羽盡封其所賜拜書告辭而奔劉備於袁軍袁紹軍也操曰彼各為其主為于偽翻勿追也操還軍官渡閻柔遣使詣操操以柔為烏桓校尉鮮于輔身見操於官渡操以輔為右度遼將軍還鎮幽土當是時幽州為紹所統與許隔遠而柔輔已歸心於操矣漢度遼將軍始於范明友中興之後置度遼將軍以護南匈奴屯於西河今使鮮于輔還鎮幽土故以為右度遼將軍自中國而北向以西河為左幽土為右也五年廣陵太守陳登治射陽射陽縣前漢屬臨淮郡後漢屬廣陵郡應劭曰在射水之陽今楚州山陽縣有射陽湖即其地賢曰射陽在今楚州安宜縣東登誘嚴白虎餘黨圖為後害策還擊登軍到丹徒丹徒縣前漢屬會稽郡後漢分屬吳郡春秋之朱方也秦時望氣者云其地有天子氣始皇使赭徒二千人鑿城以敗其勢改曰丹徒考異曰此事出江表傳據策傳云策謀襲許未發而死陳矯傳云登為孫權所圍於匡奇登令矯求救於太祖太祖遣赴救吳軍既退登設伏追奔大破之先賢行狀云登有吞滅江南之志孫策遣軍攻登於匡奇城登大破之斬虜以萬數賊忿喪軍尋復大興兵向登登使功曹陳矯求救於太祖此數者參差不同孫盛異同評云按袁紹以建安五年至黎陽策以四月遇害而志云策聞曹公與紹相拒於官渡謬矣伐登之言為有證也今從之初策殺吳郡太守許貢考異曰江表傳曰初貢上表於漢帝言策驍雄宜召還京邑若放於外必作世患候吏得表以示策策以讓貢貢辭無表策令武士絞殺之按貢先為朱治所迫已去郡依嚴白虎安能復爾蓋策破白虎時殺貢耳欲為貢報讎策性好獵數出驅馳為于偽翻好呼到翻數所角翻所乘馬精駿從騎絕不能及從才用翻卒遇貢客三人卒讀曰猝射策中頰後騎尋至皆刺殺之策創甚射而亦翻中竹仲翻刺七亦翻創初良翻召張昭等謂曰中國方亂以吳越之衆三江之固韋昭曰三江謂吳松江錢塘江浦陽江也吳地記云松江東北行七十里得三江口東北入海為婁江東南入海為東江幷松江為三江公等善相吾弟相息亮翻呼權佩以印綬謂曰舉江東之衆決機於兩陳之間陳讀曰陣與天下爭衡衡所以平輕重也爭衡言分爭之世兵力所加天下大勢為之輕重也舉賢任能各盡其心以保江東我不如卿丙午策卒考異曰虞喜志林云策以四月四日死故置此陳志策傳策陰欲襲許迎漢帝密治兵部署未發為許貢客所殺郭嘉傳曰策渡江北襲許衆聞皆懼嘉料之曰策輕而無備必死於匹夫之手果為貢客所殺嘉雖先見安能知策死於未襲許之前乎蓋時人見策臨江治兵疑其襲許嘉料其不能為耳權悲號未視事號戶刀翻張昭曰孝廉此寧哭時邪孫權先為陽羨長郡察孝廉故以稱之扶令上馬使出巡軍昭率僚屬上表朝廷下移屬城中外將校各令奉職周瑜自巴丘將兵赴喪遂留吳以中護軍與張昭共掌衆事秦置護軍都尉漢因之高祖以陳平為護軍中尉武帝復以為護軍都尉屬大司馬三國虎爭始有中護軍之官東觀記曰漢大將軍出征置中護軍一人魏晉以後資輕者為中護軍資重者為護軍將軍然吳又有左右護軍則吳制自是分中左右為三部然深險之地猶未盡從流寓之士皆以安危去就為意未有君臣之固而張昭周瑜等謂權可與共成大業遂委心而服事焉五年秋七月立皇子馮為南陽王壬午馮薨五年汝南黃巾劉辟等叛曹操應袁紹紹遣劉備將兵助辟郡縣多應之紹遣使拜陽安都尉李通為征南將軍劉表亦陰招之通皆拒焉或勸通從紹通按劍叱之曰曹公明哲必定天下紹雖強盛終為之虜耳吾以死不貳即斬紹使使疏吏翻送印綬詣操通急錄戶調調徒釣翻下同戶出帛丿糸絹謂之調錄收拾也朗陵長趙儼見通曰方今諸郡並叛獨陽安懷附復趣收其帛丿糸絹復扶又翻趣讀曰促小人樂亂樂音洛無乃不可乎通曰公與袁紹相持甚急左右郡縣背叛乃爾背蒲妹翻下同若帛丿糸絹不調送觀聽者必謂我顧望有所須待也儼曰誠亦如君慮然當權其輕重小緩調當為君釋此患為于偽翻乃書與荀彧曰今陽安郡百姓困窮鄰城並叛易用傾蕩易以豉翻乃一方安危之機也且此郡人執守忠節在險不貳以為國家宜垂慰撫而更急斂帛丿糸絹斂力贍翻何以勸善彧即白操悉以帛丿糸絹還民上下歡喜郡內遂安通擊㣥賊瞿恭等皆破之瞿姓也王僧孺百家譜有蒼梧瞿寶時操制新科下州郡頗增嚴峻而調帛丿糸絹方急長廣太守何夔長廣縣前漢屬琅邪郡後漢屬東萊郡此蓋操遣樂進入青州新收以為郡先王辨九服之賦以殊遠近周官職方氏辨九服之邦國方千里曰王畿其外方五百里曰侯服又其外方五百里曰甸服又其外方五百里曰男服又其外方五百里曰采服又其外方五百里曰衞服又其外方五百里曰蠻服又其外方五百里曰夷服又其外方五百里曰鎮服又其外方五百里曰藩服周官大司寇掌建邦之三典以佐王刑邦國一曰刑新國用輕典二曰刑平國用中典三曰刑亂國用重典治直吏翻其民間小事使長吏臨時隨宜上不背正法下以順百姓之心背蒲妹翻下同比及三年比必寐翻民安其業然後乃可齊之以法也操從之劉備略汝潁之間自許以南吏民不安曹操患之曹仁曰南方以大將章甲十一行本無將字乙十一行本同軍方有目前急其勢不能相救劉備以強兵臨之其背叛故宜也備新將紹兵未能得其用擊之可破也操乃使仁將騎擊備破走之將即亮翻盡復收諸叛縣而還備還至紹軍陰欲離紹還從宣翻又如字離力智翻去也乃說紹南連劉表紹遣備將本兵復至汝南說輸芮翻復扶又翻下同與賊龔都等合衆數千人曹操遣將蔡楊擊之為備所殺袁紹軍陽武陽武縣屬河南尹在官渡水北北兵雖衆而勁果不及南南軍穀少而資儲不如北南幸於急戰北利在緩師宜徐持久曠以日月紹不從八月紹進營稍前依沙塠為屯塠都回翻東西數十里操亦分營與相當五年九月庚午朔日有食之五年曹操出兵與袁紹戰不勝復還堅壁紹為高櫓賢曰釋名曰櫓者露上無覆屋也射營中射而亦翻營中皆蒙楯而行楯食尹翻賢曰今之旁排也操乃為霹靂車賢曰以其發石聲烈震呼之為霹靂即今之砲車也張晏曰范蠡兵法飛石重十二斤為機發行三百步操蓋祖其遺法耳魏氏春秋曰以古有矢石又傳云旝動而鼓說曰旝發石也於是造發石車車尺遮翻皆破紹復為地道攻操操輒於內為長塹以拒之操衆少糧盡少詩沼翻下同士卒疲乏百姓困於征賦多叛歸紹者操患之與荀彧書議欲還許以致紹師賢曰致猶至也兵法善戰者致人不致於人紹悉衆聚官渡欲與公決勝敗公以至弱當至強若不能制必為所乘是天下之大機也且紹布衣之雄耳能聚人而不能用以公之神武明哲而輔以大順何向而不濟今穀食雖少未若楚漢在滎陽成皋間也是時劉項莫肯先退者以為先退則勢屈也公以十分居一之衆賢曰言與紹衆相懸也賢曰言畫地作限隔也已半年矣搤於革翻情見勢竭必將有變見賢遍翻此用奇之時不可失也操從之乃堅壁持之操見運者撫之曰卻十五日卻後也晉人帖中多用少卻字其意猶言少退也不復勞汝矣為于偽翻復扶又翻下同紹運穀車數千乘至官渡乘繩證翻下同荀攸言於操曰紹運車旦暮至其將韓猛銳而輕敵擊可破也操曰誰可使者攸曰徐晃可乃遣偏將軍河東徐晃按沈約志曹魏置將軍四十號偏將軍裨將軍居其末破走之燒其輜重重直用翻下同冬十月紹復遣車運穀使其將淳于瓊等將兵萬餘人送之宿紹營北四十里沮授說紹可遣蔣奇別為支軍於表說輸芮翻支別也表外也以絕曹操之鈔鈔楚交翻紹不從許攸曰曹操兵少而悉師拒我許下餘守勢必空弱若分遣輕軍星行掩襲星行戴星而行也許拔則奉迎天子以討操操成禽矣如其未潰可令首尾奔命破之必也紹不從曰吾要當先取操會攸家犯法審配收繫之攸怒遂奔操考異曰魏志武紀曰攸貪財袁紹不能足來奔今從范書紹傳操聞攸來跣出迎之撫掌笑曰子卿遠來吾事濟矣許攸字子遠今呼為子卿貴之也或曰操字攸曰子遠卿來吾事濟矣於文為順坐徂臥翻謂操曰袁氏軍盛何以待之今有幾糧乎操曰尚可支一歲攸曰無是更言之又曰可支半歲攸曰足下不欲破袁氏邪何言之不實也操曰向言戲之耳其實可一月為之柰何攸曰公孤軍獨守外無救援而糧穀已盡此危急之日也袁氏輜重萬餘乘在故市烏巢據水經烏巢澤在陳留酸棗縣東南乘繩證翻若以輕兵襲之不意而至燔其積聚積七賜翻聚慈喻翻不過三日袁氏自敗也操大喜乃留曹洪荀攸守營自將步騎五千人皆用袁軍旗幟幟赤志翻銜枚縛馬口夜從間道出間古莧翻人抱束薪所歷道有問者語之曰語牛倨翻袁公恐曹操鈔略後軍遣兵以益備聞者信以為然皆自若既至圍屯大放火營中驚亂會明瓊等望見操兵少出陳門外陳讀曰陣操急擊之瓊退保營操遂攻之紹聞操擊瓊謂其子譚曰就操破瓊吾拔其營彼固無所歸矣就即也言即使操破淳于瓊而我攻拔其營將無所歸也郃曷閤翻又古盍翻郃曰曹公精兵往必破瓊等瓊等破則事去矣請先往救之郭圖固請攻操營郃曰曹公營固攻之必不拔若瓊等見禽吾屬盡為虜矣紹但遣輕騎救瓊而以重兵攻操營不能下紹騎至烏巢操左右或言賊騎稍近請分兵拒之操怒曰賊在背後乃白士卒皆殊死戰遂大破之斬瓊等盡燔其糧穀士章甲十一行本士上有殺字乙十一行本同孔本同張校同卒千餘人皆取其鼻牛馬割脣舌以示紹軍紹軍將士皆恟懼恟許勇翻郭圖慙其計之失復譖張郃於紹曰復扶又翻郃快軍敗郃忿懼遂與高覽焚攻具詣操營降降戶江翻下同曹洪疑不敢受荀攸曰郃計畫不用怒而來奔君有何疑乃受之於是紹軍驚擾大潰紹及譚等幅巾乘馬傅子曰漢末王公多委正服以幅巾為雅是以袁紹崔豹之徒雖為將帥皆著縑巾魏太祖以天下凶荒資財乏匱擬古皮弁裁縑帛以為帢合乎簡易隨時之義以色別其貴賤于今施行可謂軍容非國容也操追之不及盡收其輜重圖書珍寶餘衆降者操盡阬之前後所殺七萬餘人考異曰范書紹傳曰所殺八萬人按獻帝起居注曹公上言凡斬首七萬餘級沮授不及紹渡為操軍所執乃大呼曰呼火故翻授不降也為所執耳操與之有舊迎謂曰分野殊異遂用圮絕二十八宿布列於天各有足厂田坴度周天三百六十五度四分度之一分為十二次班固取三統曆十二次配十二野而分野之說行焉費直說周易蔡邕月令章句所言頗有先後魏太史令陳卓更言郡國所入宿度而分野之說詳矣皇甫謐曰黃帝推分星次以定律度天有十二次日月之所足厂田坴也地有十二分王侯之所國也分扶問翻圮當作否否隔也授曰冀州失策自取奔北紹牧冀州故稱之猶劉備以牧豫州稱之為劉豫州宜其見禽操曰本初無謀不相用計今喪亂未定知讀曰智喪息浪翻方當與君圖之授曰叔父母弟縣命袁氏縣讀曰懸若蒙公靈速死為福操歎曰孤早相得天下不足慮也遂赦而厚遇焉授尋謀歸袁氏操乃殺之操收紹書中得許下及軍中人書皆焚之曰當紹之強孤猶不能自保況衆人乎此光武安反側之意英雄處事世雖相遠若合符節冀州城邑多降於操降戶江翻袁紹走至黎陽北岸入其將軍蔣義渠營把其手曰孤以首領相付矣義渠避帳而處之處昌呂翻使宣號令衆聞紹在稍復歸之或謂田豐曰君必見重矣豐曰公貌寬而內忌不亮吾忠亮信也明也數所角翻迕五故翻若勝而喜猶能救章乙十一行本救作赦孔本同張校同我今戰敗而恚恚於避翻內忌將發吾不望生紹軍士皆拊膺泣曰向令田豐在此必不至於敗紹謂逢紀曰逢皮江翻冀州諸人聞吾軍敗皆當念吾惟田別駕前諫止吾與衆不同吾亦慙之紀曰豐聞將軍之退拊手大笑喜其言之中也中竹仲翻紹於是謂僚屬曰吾不用田豐言果為所笑遂殺之初曹操聞豐不從戎謂紹囚之不使從軍也紹必敗矣及紹奔遁復曰復扶又翻下同向使紹用其別駕計尚未可知也審配二子為操所禽紹將孟岱言於紹曰配在位專政族大兵強且二子在南必懷反計郭圖辛評亦以為然紹遂以岱為監軍代配守鄴監古銜翻護軍逄紀素與配不睦紹以問之紀曰配天性烈直每慕古人之節必不以二子在南為不義也願公勿疑紹曰君不惡之邪惡烏路翻紀曰先所爭者私情也今所陳者國事也紹曰善乃不廢配配由是更與紀親逢紀能為審配言而不肯救田豐之死果為國事乎紹稍復擊定之紹為人寬雅有局度喜怒不形於色而性矜愎自高愎平逼翻戾也狠也短於從善故至於敗五年冬十月辛亥有星孛于大梁賢曰大梁酉之分蔡邕曰自胃一度至畢六度謂之大梁之次皇甫謐曰自胃七度至畢十度曰大梁之次晉書天文志從謐孛蒲內翻五年廬江太守李術攻殺揚州刺史嚴象廬江梅乾雷緒陳蘭等各聚衆數萬在江淮間曹操表沛國劉馥為揚州刺史時揚州獨有九江時廬江丹陽會稽吳郡豫章皆屬孫氏馥刺揚州獨有九江耳建立州治郡國志漢揚州刺史治歷陽今馥移合肥後又移治壽春而江左揚州治建業揚州分矣造七到翻皆貢獻相繼數年中恩化大行流民歸者以萬數於是廣屯田興陂堨堨於葛翻以土壅水曰堨官民有畜乃聚諸生立學校又高為城壘多積木石以脩戰守之備為孫權攻合肥不能下張本五年曹操聞孫策死欲因喪伐之侍御史張紘諫曰三年策遣紘獻方物至許拜侍御史乘人之喪既非古義古不伐喪成讎棄好好呼到翻不如因而厚之操即表權為討虜將軍討虜將軍之號創置於此會工外翻操欲令紘輔權內附乃以紘為會稽東部都尉沈約曰臨海太守本會稽東部都尉治前漢都尉治鄞後漢分會稽為吳郡疑是都尉徙治章安也太夫人以權年少少詩照翻委紘與張昭共輔之紘思惟補察知無不為太夫人問揚武都尉會稽董襲曰江東可保不不讀曰否襲曰江東有山川之固而討逆明府恩德在民討虜承基大小用命討逆策也討虜權也襲等為爪牙此地利人和之時也萬無所憂權遣張紘之部或以紘本受北任嫌其志趣不止於此權不以介意介間也纖微也言其意不以纖微嫌間也魯肅將北還肅從孫策事見上卷三年考異曰肅傳曰劉子揚招肅往依鄭寶肅將從之瑜以權可輔止肅按劉曄殺鄭寶以其衆與劉勳勳為策所滅寶安得及權時也肅才宜佐時當廣求其比以成功業權即見肅與語悅之賓退獨引肅合榻對飲榻牀也有坐榻有臥榻今江南又呼几案之屬為卓牀卓高也以其比坐榻臥榻為高也合榻猶言合卓也今漢室傾危孤思有桓文之功君何以佐之肅曰昔高帝欲尊事義帝而不獲者以項羽為害也今之曹操猶昔項羽將軍何由得為桓文乎肅竊料之漢室不可復興曹操不可卒除復扶又翻卒讀曰猝為將軍計惟有保守江東以觀天下之釁耳若因北方多務勦除黃祖進伐劉表竟長江所極據而有之此王業也江東君臣上下本謀不過此耳今盡力一方冀以輔漢耳此言非所及也張昭毀肅年少粗疏少詩照翻權益貴重之賞賜儲偫富擬其舊魯肅家本饒富先嘗指囷以資周瑜矣偫直里翻權料諸小將兵少而用薄者幷合之料力條翻量也又力弔翻別部司馬汝南呂蒙續漢志大將軍營五部部各有校尉一人軍司馬一人其別營領屬為別部司馬其兵多少各隨時宜士卒練習權大悅增其兵寵任之功曹駱統勸權尊賢接士勤求損益饗賜之日人人別進問其燥濕人之居處避濕就燥問其燥濕者問其居處何如也誘諭使言察其志趣權納用焉統俊之子也駱俊見上卷二年誘音酉廬陵太守孫輔恐權不能保江東陰遣人齎書呼曹操行人以告權悉斬輔親近分其部曲徙輔置東置之吳東也曹操表徵華歆為議郎參司空軍事廬江太守李術不肯事權而多納其亡叛術本權兄策所樹置也嚴刺史昔為公所用而李術害之肆其無道宜速誅滅今術必復詭說求救明公居阿衡之任以伊尹況操復扶又翻下同願敕執事勿復聽受因舉兵攻術於皖城皖戶板翻術求救於操操不救遂屠其城梟術首梟堅堯翻徙其部曲二萬餘人五年劉表攻張羨連年不下羨叛表事始上卷三年未暇救之羨病死長沙復立其子懌表攻懌及零桂皆平之於是表地方數千里帶甲十餘萬遂不供職貢郊祀天地居處服用僭擬乘輿焉處昌呂翻五年張魯以劉璋闇懦不復承順襲別部司馬張脩殺之而幷其衆魯初與脩取漢中事見六十卷初平二年殺魯母及弟魯遂據漢中與璋為敵璋遣中郎將龐羲擊之不克璋以羲為巴郡太守屯閬中以禦魯閬中縣屬巴郡譙周巴記曰和帝永元中分宕渠之地置漢昌縣屬巴郡夷人歲入賨錢口四十謂之賨民賨徂宗翻璋疑之趙韙數諫不從亦恚恨數所角翻初南陽三輔民流入益州者數萬家劉焉悉收以為兵名曰東州兵璋性寬柔無威略東州人侵暴舊民璋不能禁趙韙素得人心趙韙從焉入蜀璋又韙所立益州之大吏也遂作亂引兵數萬攻璋厚賂荊州荊州劉表也蜀郡廣漢犍為皆應之犍居言翻何茲全標點容肇祖聶崇岐覆校
