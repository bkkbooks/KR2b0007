body:
  text: 資治通鑑卷第一百三十端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注宋紀十二太宗明皇帝上之上諱彧字休景小字榮期文帝第十一子也泰始元年乙巳四六五春正月乙未朔廢帝改元永光大赦是歲八月殺江夏王義恭柳元景顏師伯改元景和既弒廢帝改元泰始一年凡三改元丙申魏大赦二月丁丑魏主如樓煩宮樓煩縣漢屬鴈門郡魏晉棄之荒外魏收地形志鴈門郡原平縣有樓煩城賢曰樓煩故城在今代州崞縣東北余按唐書憲州古樓煩地也自孝建以來民間盜鑄濫錢事始一百二十八卷孝武帝孝建二年庚寅更鑄二銖錢更工衡翻形式轉細官錢每出民間即模效之而更薄小無輪郭不磨鑢謂之耒子鑢良倨翻錯也耒盧對翻杜佑通典耒子作來子三月乙巳魏主還平城夏五月癸卯魏高宗殂年二十六諡曰文成皇帝魏世祖經營四方國頗虛耗重以內難重直用翻難乃旦翻內難謂宗愛既弒世祖又弒南安王余朝野楚楚楚楚酸痛之貌朝直遙翻與時消息消衰減也息生長也懷集中外民心復安復扶又翻甲辰太子弘即皇帝位弘文成帝之長子也蕭子顯曰弘字萬民尊皇后曰皇太后顯祖魏獻文帝廟號顯祖侍中車騎大將軍乙渾專權騎奇寄翻矯詔殺尚書楊保年平陽公賈愛仁南陽公張天度于禁中侍中司徒平原王陸麗治疾於代郡溫泉魏土地記曰代城北九十里有桑乾城城西渡桑乾水去桑乾城十里有溫湯療疾有驗治直之翻魏官有司衛監典宿衛渾有無君之心今宮車晏駕王德望素重魏高宗之立麗有功焉而又忠篤故德望重於一時宜少淹留以觀之朝廷安靜然後入未晚也少詩沼翻麗曰安有聞君父之喪慮患而不赴者乎即馳赴平城乙渾所為多不法麗數爭之數所角翻戊申渾又殺麗及穆多侯多侯壽之弟也穆壽事魏世祖封宜都王己酉魏以渾為太尉録尚書事東安王劉尼為司徒尚書左僕射代人和其奴為司空殿中尚書順陽公郁謀誅乙渾渾殺之主少國疑姦臣亶命屠戮忠賢魏之不亡者幸也壬子魏以淮南王它為鎮西大將軍儀同三司鎮涼州魏章甲十一行本魏上有六月二字乙十一行本同孔本同張校同退齋校同開酒禁魏設酒禁見一百二十八卷孝武孝建三年壬午加柳元景南豫州刺史加顏師伯丹楊尹秋七月癸巳魏以太尉乙渾為丞相位居諸王上事無大小皆決於渾廢帝幼而狷暴狷吉掾翻及即位始猶難太后大臣及戴法興等未敢自恣太后既殂去年太后殂長知兩翻欲有所為法興輒抑制之謂帝曰官所為如此欲作營陽邪營陽王事見一百二十卷文帝元嘉元年廢帝固狂暴戴法興此言亦足以取死所幸閹人華願兒賜與無算華戶化翻法興常加裁減願兒恨之帝使願兒於外察聽風謠願兒言於帝曰道路皆言宮中有二天子法興真章甲十一行本真上有為字乙十一行本同孔本同天子官為贋天子贋五晏翻考異曰宋書作應天子宋略作鴈天子按字書贋偽物也韓愈詩曰居然見真贋書或作鴈今從宋略且官居深宮與人物不接法興與太宰顏柳共為一體義恭録尚書事柳元景為尚書令顏師伯為僕射而事皆法興專決故云然恆戶登翻內外士庶莫不畏服法興是孝武左右久在宮闈今與他人作一家深恐此坐席非復官有坐徂臥翻復扶又翻又如字帝遂發詔免法興免者免其所居官也仍徙遠郡八月辛酉賜法興死解巢尚之舍人巢尚之自孝武時為中書通事舍人員外散騎侍郎東海奚顯度散悉亶翻騎奇寄翻亦有寵於世祖常典作役課督苛虐捶撲慘毒捶止蕊翻撲普卜翻擊也人皆苦之帝常戲曰顯度為百姓患比當除之比毗寐翻左右因唱諾即宣旨殺之尚書右僕射領衛尉卿丹楊尹顏師伯居權日久孝武大明四年徵顏師伯於歷城自侍中遷尚書僕射居權要章甲十一行本驕上有海內輻湊四字乙十一行本同孔本同張校同退齋校同奢淫恣為衣冠所疾帝欲親朝政朝直遙翻庚午以師伯為尚書左僕射解卿尹解衛尉卿及丹楊尹分其權任師伯始懼彧於六翻初世祖多猜忌王公大臣重足屏息重直龍翻屏必郢翻莫敢妄相過從過古禾翻世祖殂太宰義恭等皆相賀曰今日始免橫死矣橫戶孟翻甫過山陵義恭與柳元景顏師伯等聲樂酣飲不捨晝夜酣戶甘翻帝內不能平既殺戴法興諸大臣無不震懾懾之涉翻各不自安於是元景師伯密謀廢帝立義恭日夜聚謀而持疑不能決元景以其謀告沈慶之慶之與義恭素不厚又師伯常專斷朝事不與慶之參懷斷丁亂翻朝直遙翻下同孝武遺詔令慶之參決大事見上卷上年謂令史曰尚書令史也沈公爪牙耳安得預政事慶之恨之乃發其事癸酉帝自帥羽林兵討義恭殺之並其四子斷絶義恭支體分裂腸胃挑取眼睛以蜜漬之謂之鬼目粽宋人以蜜漬物曰粽盧循以益智粽遺武帝即蜜漬益智也帥讀曰率斷丁管翻挑土雕翻睛子盈翻眼珠子也漬疾智翻粽子宋翻以兵隨之使疏吏翻下同左右奔告兵刃非常非常言異於常時也入辭其母整朝服乘車應召弟車騎司馬叔仁戎服帥左右壯士欲拒命元景苦禁之既出巷軍士大至元景下車受戮容色恬然並其八子六弟及諸姪獲顏師伯於道殺之並其六子又殺廷尉劉德願改元景和文武進位二等遣使誅湘州刺史江夏世子伯禽義恭命其世子曰伯禽是以周公自處矣皆被捶曳如奴隸矣卑賤之人有所附屬謂之隸人之下者謂之奴被皮義翻捶止蕊翻初帝在東宮多過失世祖欲廢之而立新安王子鸞侍中袁顗盛稱太子好學有日新之美世祖乃止帝由是德之既誅㣥公欲引進顗任以朝政遷為吏部尚書顗魚豈翻好呼到翻為袁顗寵衰求出張本與尚書右章甲十一行本右作左乙十一行本同孔本同熊校同丞徐爰皆以誅義恭等功賜爵縣子徐爰便僻善事人頗涉書傳便毗連翻傳直戀翻自元嘉初入侍左右豫參顧問既長於附會又飾以典文故為太祖所任遇大明之世委寄尤重時殿省舊人多見誅逐唯爰巧於將迎始終無忤廢帝待之益厚忤五故翻迎也㣥臣莫及帝每出常與沈慶之及山陰公主同輦爰亦預焉徐爰得志於大明景和之間宜也而啓寵實在於元嘉便僻之足以惑人雖明君不能免也漢宣用恭顯而遺禍於元帝事正如此山陰公主帝姊也適駙馬都尉何戢戢偃之子也何偃尚之之子戢疾立翻嘗謂帝曰妾與陛下男女雖殊俱託體先帝陛下六宮萬數而妾唯駙馬一人事太不均帝乃為公主置面首左右三十人面取其貌美首取其髮美秩同郡王為于偽翻長知兩翻吏部郎褚淵貌美公主就帝請以自侍帝許之淵侍公主十餘日備見逼迫以死自誓乃得免淵湛之之子也褚湛之進用於元嘉孝建之間帝令太廟別畫祖考之像畫讀曰一帝入廟指高祖像曰渠大英雄生擒數天子謂擒桓玄慕容超姚泓也大讀曰太渠亦不惡但末年不免兒斫去頭謂為元凶劭所弒也渠大齄鼻如何不齄立召畫工令齄之齄壯加翻鼻上夋包也柳宗元詩曰嗜酒鼻成齄以建安王休仁為雍州刺史雍於用翻湘東王彧為南豫州刺史皆留不遣甲戌以司徒揚州刺史豫章王子尚領尚書令以章甲十一行本以上有乙亥二字乙十一行本同孔本同張校同始興公沈慶之為侍中太尉慶之固辭徵青冀二州刺史王玄謨為領軍將軍魏葬文成皇帝于金陵廟號高宗九月癸巳帝如湖熟湖熟漢湖熟侯國屬丹陽郡晉宋為縣淳化中廢為鎮屬上元縣戊戌還建康新安王子鸞有寵於世祖事見上卷大明五年辛丑遣使賜子鸞死又殺其母弟南海王子師及其母妹發殷貴墓殷貴蓋生子鸞子師及一女母弟母妹謂同母弟妹也太史以為不利於帝乃止初金紫光祿大夫謝莊為殷貴誄誄魯水翻誄丈夫者述其功德誄婦人者述其容德也曰贊軌堯門帝以莊比貴於鉤弋夫人鉤弋事見二十二卷漢武帝太始三年或説帝曰死者人之所同一往之苦不足為困莊生長富貴説輸芮翻長知兩翻謝莊弘微之子謝萬之玄孫諸謝自晉以來貴盛故云然今繫之尚方使知天下苦劇劇甚也言莊享天下之所甚樂而未知天下之所甚苦今繫囚則使知之未晚也帝從之徐州刺史義陽王昶素為世祖所惡昶丑兩翻昶文帝子世祖之諸弟也惡烏路翻民間每訛言昶當反是歲訛言尤甚廢帝常謂左右曰我即大位以來遂未嘗戒嚴使人邑邑邑邑不得志也求入朝蘧姓也春秋時衛有大夫蘧伯玉蘧其於翻朝直遙翻義陽與太宰謀反我正欲討之今知求還甚善又屢詰問法生詰去吉翻義陽謀反何故不啓法生懼逃還彭城帝因此用兵己酉下詔討昶內外戒嚴帝自將兵渡江將即亮翻命沈慶之統諸軍前驅法生至彭城昶即聚兵反移檄統內諸郡沈約宋志以大明八年為止徐州統彭城沛郡下邳蘭陵東海東莞東安琅邪淮陽陽平濟陰北濟陰鍾離馬頭等郡斬昶使將佐文武悉懷異心昶知事不成棄母妻攜愛妾夜與數十騎開北門奔魏使疏吏翻將即亮翻騎奇寄翻昶頗涉學能屬文屬之欲翻魏人重之使尚公主拜侍中征南將軍駙馬都尉賜爵丹楊王為後魏挾劉昶以伐齊張本吏部尚書袁顗始為帝所寵任俄而失指待遇頓衰使有司糾奏其罪白衣領職顗懼詭辭求出甲寅以顗督雍梁章甲十一行本梁下有等四州三字乙十一行本同孔本同張校同諸軍事雍州刺史雍於用翻顗舅蔡興宗謂之曰襄陽星惡何可往興宗蓋以天道言之白刃交前不救流矢言白刃交乎前則流矢之來不暇救禍近而急故圖出外以求賒死後患非所計也唯願生出虎口耳且天道遼遠何必皆驗是時臨海王子頊為都督荊湘等八州諸軍事荊州刺史朝廷以興宗為子頊長史南郡太守行府州事興宗辭不行顗説興宗曰説輸芮翻朝廷形勢人所共見在內大臣朝不保夕舅今出居陝西為八州行事蕭子顯曰江左大鎮莫過荊揚弘農郡陝縣周世二伯主諸侯周公主陝東召公主陝西故稱荊州為陝西地勝兵強去江陵咫尺水陸流通襄陽至江陵水則由漢沔陸則由長林當陽沔彌兗翻可以共立桓文之功豈比受制凶狂臨不測之禍乎今得間不去間隙也謂得可行之隙而興宗不肯去間古莧翻豈可得邪復扶又翻興宗曰吾素門平進蔡興宗蔡廓之子蔡謨之玄孫以方嚴自處官以序遷謂之平進可也謂之素門可乎蓋江左以王謝為高門其餘有才望者或以姻戚擢用或以舊恩興宗此言蓋亦感切其甥指其在世祖之世調護昏狂階此以見寵任寵衰則求出以避禍進退皆無所據也未由有患宮省內外人不自保會應有變若內難得弭外釁未必可量難乃旦翻釁許覲翻量音良汝欲在外求全我欲居中免禍各行其志不亦善乎蔡興宗可謂先見矣顗於是狼狽上路狼狽者倉皇而行如恐不及之意上時掌翻行至尋陽喜曰今始免矣鄧琬為晉安王子勛鎮軍長史尋陽內史行江州事子勛以鎮軍將軍為江州刺史鎮尋陽鄧琬為長史行事每清間必盡日窮夜顗與琬人地本殊袁顗有清望又名門也鄧琬性貪鄙又寒族也故云人地本殊為顗琬起兵奉子勛張本復扶又翻戊午解嚴帝因自白下濟江至瓜步晉宋都建康新亭白下皆江津要地新亭在西白下在東白下蓋今之龍灣也按白下城合白石壘唐武德中移江寧縣於此名白下縣沈慶之復啓聽民私鑄錢慶之始議見一百二十八卷孝武帝孝建二年千錢長不盈三寸大小稱此謂之鵝眼錢稱尺證翻劣於此者謂之綖環錢綖與線同私箭翻貫之以縷入水不沈沈持林翻隨手破碎市井不復料數料音聊料量也料數者料其多少之數也十萬錢不盈一掬鄭玄曰兩手曰掬商貨不行冬十月丙寅帝還建康帝舅東陽太守王藻尚世祖女臨川長公主公主妬譖藻於帝己卯藻下獄死王太后晉丞相導之玄孫女藻后弟也下戶稼翻會稽太守孔靈符所至有政績以忤犯近臣近臣譖之帝遣使鞭殺靈符並誅其二子會工外翻忤立故翻使疏吏翻寧朔將軍何邁瑀之子也何瑀見一百二十八卷孝武孝建二年主文帝第十女也名英媚長知兩翻謂之謝貴嬪詐言公主薨殺宮婢送邁第殯葬行喪禮庚辰拜貴嬪為夫人嬪毗賓翻加鸞輅龍旗出警入蹕邁素豪俠多養死士俠戶頰翻謀因帝出遊廢之立晉安王子勛事泄十一月壬辰帝自將兵誅邁初沈慶之既發顏柳之謀遂自昵於帝數盡言規諫將即亮翻昵尼質翻數所角翻帝浸不悅慶之懼杜門不接賓客嘗遣左右范羡至吏部尚書蔡興宗所興宗使羡謂慶之曰公閉門絶客以避悠悠請託者耳如興宗非有求於公者也何為見拒慶之使羡邀興宗興宗往見慶之因説之曰主上比者所行人倫道盡言內亂也説輸芮翻比毗至翻無可復望行下孟翻復扶又翻下不復同今所忌憚唯在於公百姓喁喁喁魚容翻喁魚口向上也以喻百姓仰望如㣥魚然所瞻賴者亦在公一人而已瞻仰視也賴倚恃也天下所服今舉朝遑遑遑遑急也朝直遙翻怖普布翻指麾之日誰不響應如猶豫不斷斷丁亂翻欲坐觀成敗豈惟旦夕及禍四海重責將有所歸言慶之自昵於廢帝今忤帝意不惟行且及禍若他人舉事必謂慶之從君於昏慶之何所逃其責故敢盡言願公詳思其計慶之曰僕誠知今日憂危不復自保但盡忠奉國始終以之當委任天命耳言委之於天任命所至兵力頓闕頓讀曰鈍又讀如字雖欲為之事亦無成興宗曰當今懷謀思奮者非欲邀功賞富貴正求脫朝夕之死耳殿中將帥唯聽外間消息將即亮翻帥所類翻若一人唱首則俯仰可定況公統戎纍朝慶之自元嘉以來統兵歷事三世朝直遙翻布在宮省受恩者多謂宗越等沈攸之者慶之從父兄子也且公門徒義附並三吳勇士殿中將軍陸攸之公之鄉人陸攸之蓋亦吳興人大有鎧仗在青溪未發公取其器仗以配衣麾下鎧可亥翻衣於既翻使陸攸之帥以前驅帥讀曰率下同僕在尚書中自當帥百僚按前代故事更簡賢明以奉社稷天下之事立定矣又朝廷諸所施為民間傳言公悉豫之公今不決當有先公起事者公亦不免附從之禍此興宗所謂重責將有所歸也先悉薦翻貴第謂時貴之宅第也又聞屏左右屏必郢翻獨入閣內此萬世一時不可失也慶之曰感君至言然此大事非僕所能行事至固當抱忠以沒耳事至猶言若事果至如興宗所言當抱忠以死也青州刺史沈文秀慶之弟子也將之鎮帥部曲出屯白下亦説慶之曰説輸芮翻主上狂暴如此禍亂不久而一門受其寵任萬物皆謂與之同心盈天地之間者萬物人亦物也此萬物謂人猜忍特甚若人謂廢帝進退難免今因此衆力圖之易於反掌易以豉翻機會難值不可失也再三言之至於流涕慶之終不從文秀遂行沈慶之從君於昏狂杜門以待死伊霍之事固非常人所能行也及帝誅何邁量慶之必當入諫量音良度也先閉青溪諸橋以絶之慶之聞之果往不得進而還還從宣翻又如字帝乃使慶之從父兄子直閣將軍攸之賜慶之藥慶之不肯飲攸之以被掩殺之攸之隨慶之討隨王誕有功慶之抑其賞由是恨之故果於殺從才用翻慶之子侍中文叔欲亡恐如太宰義恭被支解被皮義翻謂其弟中書郎文季曰我能死爾能報中書郎即中書侍郎左傳楚平王信費無極之譖執伍奢無極曰奢之子材若在吳必憂楚國盍以免其父召之彼仁必來不然將為患王使召之曰來吾免而父棠君尚謂其弟員曰爾適吳我將歸死吾智不若我能死爾能報伍尚至楚並奢殺之員奔吳藉兵以報楚入郢鞭平王之墓弟祕書郎昭明亦自經死杜佑通典曰後漢馬融為祕書郎詣東觀典校書晉掌中外三閣經書校閲脫誤亦謂之郎中武帝分祕圖書籍為甲乙丙丁四部使祕書郎中四人各掌其一宋齊尤為美職皆為甲族起家之選居職例十日便遷齊梁末多以貴遊子弟為之無其才實追者不敢逼遂得免為後沈文季盡誅沈攸之親屬以報仇張本贈侍中太尉諡曰忠武公葬禮甚厚領軍將軍王玄謨數流涕諫帝以刑殺過差數所角翻帝大怒玄謨宿將有威名王玄謨自元嘉末為將孝建初有破臧質平義宣之功將即亮翻蔡興宗嘗為東陽太守玄謨典籤包法榮家在東陽玄謨使法榮至興宗所興宗謂法榮曰領軍殊當憂懼法榮曰領軍比日殆不復食夜亦不眠比日近日也比毗寐翻復扶又翻不保俄頃收謂帝將遣吏兵收之也恆戶登翻領軍憂懼當為方略那得坐待禍至因使法榮勸玄謨舉事玄謨使法榮謝曰此亦未易可行易以豉翻期當不泄君言右衛將軍劉道隆為帝所寵任專典禁兵興宗嘗與之俱從帝夜出從才用翻道隆過興宗車後興宗曰劉君比日思一間寫間寫者謂欲清間寫其所懷也解戶買翻曉也掐興宗手掐苦洽翻以爪掐之也曰蔡公勿多言廢昏立明非常之謀也蔡興宗建非常之謀既以告沈慶之又以告王玄謨又以擲發劉道隆而人不敢泄其言何也昏暴之朝人不自保時日害喪豫及汝皆亡蓋人心之所同然也壬寅立皇后路氏太皇太后弟道慶之女也帝畏忌諸父恐其在外為患皆聚之建康拘於殿內毆捶陵曳無復人理親親悌長人之常理廢帝悖之毆烏口翻捶止蕊翻復扶又翻又如字皆肥壯帝為竹籠盛而稱之彧於六翻盛時征翻下同稱敕陵翻稱其輕重也以彧尤肥謂之豬王謂休仁為殺王休祐為賊王以三王年長尤惡之長知兩翻惡烏路翻常録以自隨不離左右録收也攝也離力智翻劣弱也鄙也禕吁韋翻驢王桂陽王休範巴陵王休若年尚少故並得從容少詩照翻從千容翻嘗以木槽盛飯並雜食攪之攪古巧翻掘地為坑實以泥水裸彧內坑中使以口就槽食之用為歡笑裸郎果翻前後欲殺三王以十數休仁多智數每以談笑佞諛説之故得推遷推移也遷轉也言以談笑佞諛轉移帝意也或曰推遷延緩之意説讀曰悅少府劉曚妾孕臨月曚謨蓬翻將産之月曰臨月考異曰宋書帝紀作少府劉勝始安王休仁傳作廷尉劉曚宋略及南史帝紀皆作少府劉曚休仁傳作廷尉劉蒙今從其多者帝迎入後宮俟其生男欲立為太子彧嘗忤旨帝裸之縛其手足貫之以杖使人擔付太官忤五故翻裸郎果翻擔都甘翻荷也曰今日屠豬休仁笑曰豬未應死帝問其故休仁曰待皇子生殺豬取其肝肺帝怒乃解曰且付廷尉一宿釋之丁未曚妾生子名曰皇子為之大赦為于偽翻賜為父後者爵一級帝又以太祖世祖在兄弟數皆第三太祖高祖第三子世祖太祖第三子子勛世祖第三子惡烏路翻因何邁之謀使左右朱景雲送藥賜子勛死景雲至湓口停不進子勛典籤謝道邁主帥潘欣之侍書褚靈嗣聞之諸王有侍讀掌授王經有侍書掌教王書帥所類翻馳以告長史鄧琬泣涕請計考異曰子勛傳云景雲遣信使告琬宋略曰帝使道遇賫敕至潯陽琬謂道遇云云今從琬傳身南土寒士鄧琬南昌人起於寒素以愛子見託豈得惜門戶百口期當以死報效幼主昏暴社稷危殆雖曰天子事猶獨夫猶若也似也直造京邑帥讀曰率造七到翻與㣥公卿士廢昏立明耳戊申琬稱子勛教令所部戒嚴子勛戎服出聽事集僚佐使潘欣之口宣旨諭之四座未對録事參軍陶亮首請效死前驅衆皆奉旨乃以亮為咨議參軍領中兵總統軍事功曹張沈為咨議參軍統作舟艦沈持林翻艦戶黯翻南陽太守沈懷寶岷山太守薛常寶岷山即漢武帝所開汶山郡也宣帝地節三年併入蜀郡劉蜀復立沈懷寶薛常寶先常為郡守因各以其官稱之守手又翻將即亮翻帥所類翻初帝使荊州録送前軍長史荊州行事張悅至湓口琬稱子勛命釋其桎梏桎職日翻梏工沃翻迎以所乘車以為司馬悅暢之弟也張暢見一百二十五卷六卷文帝元嘉二十六年七年遣將軍俞伯奇帥五百人斷大雷帥讀曰率斷丁管翻禁絶商旅及公私使命遣使上諸郡民丁遣使詣江州部內諸郡籍民丁上之以為兵使疏吏翻上時掌翻旬日之內得甲士五千人出頓大雷於兩岸築壘又以巴東建平二郡太守孫沖之為咨議參軍領中兵與陶亮並統前軍移檄遠近戊午帝召諸主列於前強左右使辱之強其兩翻南平王鑠江氏不從即江湛之妹鑠式灼翻殺三子南平王敬猷廬陵王敬先安南侯敬淵鞭江一百先是民間訛言湘中出天子先悉薦翻帝將南巡荊湘二州以厭之厭一涉翻師古曰塞當也明旦欲先誅湘東王彧然後發初帝既殺諸公恐㣥下謀己以直閣將軍宗越談金童太一沈攸之等有勇力引為爪牙賞賜美人金帛充牣其家江左以直閣將軍出入省閣總領宿衛牣滿也衆所畏服皆為帝盡力為于偽翻帝恃之益無所顧憚恣為不道中外騷然左右宿衛之士皆有異志而畏越等不敢發時三王久幽不知所為湘東王彧主衣會稽阮佃夫內監始章甲十一行本始作吳乙十一行本同孔本同張校同興王道隆江左之制天子及諸王皆有內監內監齋監也齋內自主帥以下皆得監察之會工外翻佃音田晉制諸王國置學官令一人帝以立后故假諸王閹人閹於廉翻彧左右錢藍生亦在中彧密使候帝動止先是帝遊華林園竹林堂先悉薦翻竹林堂華林園後堂也使宮人倮相逐倮郎果翻一人不從命斬之夜夢在竹林堂有女子罵曰帝悖虐不道悖蒲妹翻明年不及熟矣帝於宮中求得一人似所夢者斬之又夢所殺者罵曰我已訴上帝矣通鑑不語怪而獨書此事者以明人不可妄殺而天聰明為不可欺也是日晡時帝出華林園建安王休仁山陽王休祐會稽公主並從覡刑狄翻晡奔謨翻從才用翻湘東王彧獨在祕書省祕書省藏圖書之所在禁中益憂懼被皮義翻帝素惡主衣吳興壽寂之見輒切齒惡烏路翻風俗通壽姓吳王壽夢之後又有大夫壽越阮佃夫以其謀告寂之及外監典事東陽朱幼李延壽恩幸傳論曰若徵兵動衆大興人役優劇遠近斷於內監之心譴辱詆訶恣於典事之口抑符緩詔姦偽非一書死為生請謁成市左臂揮金右手刊字紙為銅落筆為利染晉氏渡江立南彭城郡於晉陵界鎧可亥翻考異曰産或作彥宋書宋略南史皆作産今從之吳分吳郡無錫以西為毗陵郡晉東海王越世子名毗而東海國故食毗陵懷帝永嘉五年改為晉陵郡將即亮翻寂之等聞之皆響應幼豫約勒內外使錢藍生密報休仁休祐時帝欲南巡腹心宗越等並聽出外裝束唯隊主樊僧整防華林閣防守華林閣門也鄉人因密邀之僧整即受命柳氏本河東人僑居襄陽樊僧整蓋亦河東人也阮佃夫慮力少不濟更欲招合少詩沼翻壽寂之曰謀廣或泄不煩多人其夕帝悉屏侍衛屏必郢翻與㣥巫及綵女數百人綵女倣後漢采女之制射而亦翻下射之同事畢將奏樂壽寂之抽刀前入薑産之次之淳于文祖等皆隨其後休仁聞行聲甚疾謂休祐曰事作矣相隨奔景陽山文帝元嘉二十三年起景陽山於華林園引弓射之不中綵女皆迸走帝亦走大呼寂寂者三中竹仲翻迸北孟翻呼火故翻寂之追而弒之年十七湘東王受太皇太后令除狂主今已平定殿省惶惑未知所為休仁就祕書省見湘東王即稱臣引升西堂登御座召見諸大臣見賢遍翻于時事起倉猝王失履跣至西堂猶著烏帽著陟略翻坐定休仁呼主衣以白帽代之江南天子宴居著白紗帽雖未即位凡事悉稱令書施行宣太皇太后令數廢帝罪惡數所具翻命湘東王纂承皇極及明宗越等始入湘東王撫接甚厚廢帝母弟司徒揚州刺史豫章王子尚頑悖有兄風悖蒲內翻又蒲沒翻下同己未湘東王以太皇太后令賜子尚及會稽公主死會工外翻建安王休仁等始得出居外舍外舍外第也謝莊以誄殷貴被囚事見上蔡興宗謂尚書右僕射王彧曰此雖凶悖要是天下之主宜使喪禮粗足若直如此四海必將乘人言乘此以奉辭伐罪王彧湘東王兄也故蔡興宗與之言粗坐五翻葬於秣陵縣南郊壇西初湘東王母沈婕妤早卒婕妤音接豫卒子恤翻路太后養之王事太后甚謹太后愛王亦篤王既弒廢帝欲慰太后心下令以太后弟子休之為黃門侍郎茂之為中書侍郎論功行賞壽寂之等十四人皆封縣侯縣子十二月庚申朔以東海王禕為中書監太尉禕於湘東王兄也禕吁韋翻騎奇寄翻癸亥以建安王休仁為司徒尚書令揚州刺史以山陽王休祐為荊州刺史桂陽王休範為南徐州刺史乙丑徙安陸王子綏為江夏王丙寅湘東王即皇帝位大赦改元至此始改元泰始並皆刊削庚午以右衛將軍劉道隆為中護軍道隆昵於廢帝嘗無禮於建安太此廢帝使左右辱主時事昵尼質翻建安王休仁求解職明帝乃賜道隆死書明帝者因前史成文宗越談金童太一等雖為上所撫接內不自安上亦不欲使居中從容謂之曰從千容翻卿等遭罹暴朝朝直遙翻勤勞日久應得自養之地兵馬大郡隨卿等所擇越等素已自疑聞之皆相顧失色因謀作亂以告沈攸之攸之以聞上收越等下獄死攸之復入直閣沈攸之繼此有平尋陽之功遂總戎北討歷居方面之任下戶嫁翻復扶又翻辛未徙臨賀王子産為南平王晉熙王子輿為廬陵王壬申以尚書右僕射王景文為尚書僕射景文即彧也避上名以字行乙亥追尊沈太曰宣太后即上母沈婕妤也初豫州刺史山陽王休祐入朝以長史南梁郡太守章甲十一行本守下有陳郡二字乙十一行本同孔本同張校同殷琰行府州事晉孝武太元中僑立南梁郡於淮南安帝義熙中土斷始有淮南故地屬南豫州五代志淮南郡壽春縣舊有南梁郡朝直遙翻即以琰為督豫司二州諸軍事豫州刺史為殷琰舉州以附尋陽張本有司奏路太后宜即前號移居外宮上不許戊寅尊路太后為崇憲皇太后居崇憲宮供奉禮儀不異舊日立王氏為皇后后景文之妹也罷二銖錢禁鵝眼綖環錢二銖鵝眼綖環並見卷首綖與線同江州佐吏得上所下令書皆喜共造鄧琬曰暴亂既除殿下又開黃閣造七到翻時加子勛開府儀同三司故云開黃閣實為公私大慶琬以晉安王子勛次第居三又以尋陽起事與世祖同符世祖於兄弟次第三以尋陽起兵事見一百二十七卷文帝元嘉三十年取令書投地曰殿下當開端門天子開端門宮門正南門曰端門衆皆駭愕琬更與陶亮等繕治器甲徵兵四方治直之翻袁顗既至襄陽即與咨議參軍劉胡繕修兵械簡集士卒詐稱被太皇太后令使其起兵顗魚豈翻被皮義翻即建牙馳檄奉表勸子勛即大位辛巳更以山陽王休祐為江州刺史欲以代子勛更工衡翻休祐不之荊州留子頊本任以安之先是廢帝以邵陵王子元為湘州刺史先悉薦翻中兵參軍沈仲玉為道路行事未至州使為道路行事沿塗之事一以委之聞尋陽兵起不敢進琬遣數百人劫迎之令子勛建牙於桑尾桑尾即桑落洲尾稱孤志遵前典黜幽陟明子勛自稱曰孤黜幽陟明即廢昏立明矯害明茂明茂謂明德茂親謂上矯太皇太后令賜豫章王子尚死也章甲十一行本纂作篡乙十一行本同張校同竊大寶干我昭穆禮父為昭子為穆昭時招翻藐孤同氣猶有十三左傳晉獻公曰以是藐諸孤藐謂小也孝武帝二十八子時存者子勛子綏子房子頊子仁子真子元子輿子孟子嗣子趨子期子悅凡十三人藐妙小翻又亡解翻而當乏饗聖靈謂世祖之靈也乏饗不祀也郢州刺史安陸王子綏承子勛初檄欲攻廢帝言初檄者以別今此傳建康之檄即解甲下標初起兵立標以募兵罷兵故下標江謂鄧琬雍謂袁顗雍於用翻治直之翻嚴苟改荀卞之大懼郢州居江雍之間懼其夾攻以問罷兵之由並送軍糧帥讀曰率荊州行事孔道存奉刺史臨海王子頊會稽將佐奉太守尋陽王子房皆舉兵以應子勛會工外翻將即亮翻聶崇岐標點王崇武覆校
