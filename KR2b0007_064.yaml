body:
  text: 資治通鑑卷第六十四翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註漢紀五十六建安六年孝獻皇帝己建安六年辛巳二一建安六年春三月丁卯朔日有食之建安六年曹操就穀於安民據水經東平壽張縣西界有安民亭亭在濟水東亭北對安民山洪氏隸釋曰濟水逕須句城西水西有安民山趙明誠金石錄曰按地里志須句城即今中都縣欲以其間擊劉表間古莧翻荀彧曰紹既新敗其衆離心宜乘其困遂定之而欲遠師江漢若紹收其餘燼乘虛以出人後則公事去矣操乃止夏四月操揚兵河上擊袁紹倉亭軍破之紹蓋遣軍屯倉亭津九月操還許建安六年操自擊劉備於汝南備奔劉表龔都等皆散備合龔都事見上卷上年自出郊迎以上賓禮待之益其兵使屯新野水經註新野縣在安衆縣東南嘗於表坐起至廁慨然流涕表怪問備備曰平常身不離鞍坐徂臥翻離力智翻髀肉皆消今不復騎髀裏肉生日月如流老將至矣而功業不建是以悲耳史言備志氣不衰所以能成三分之業復扶又翻建安六年曹操遣夏侯淵張遼圍昌豨於東海豨叛操事見上卷三年豨許豈翻又音希糧盡議引軍還遼謂淵曰數日已來每行諸圍豨輒屬目視遼行下孟翻屬之欲翻又其射矢更稀此必豨計猶豫故不力戰遼欲挑與語射而亦翻挑徒了翻儻可誘也儻或然之辭誘音酉公有命使遼傳之豨果下與遼語遼為說操神武方以德懷四方先附者受大賞為于偽翻豨乃許降降戶江翻遼遂單身上三公山上時掌翻入豨家拜妻子豨歡喜隨遼詣操操遣豨還建安六年趙韙圍劉璋於成都東州人恐見誅滅相與力戰韙遂敗退追至江州賢曰江州縣屬巴郡今渝州巴縣趙韙隨劉焉入蜀將以圖富貴而卒以殺身行險以徼幸不如居易以俟命也遣吏程祁宣旨於其父漢昌令畿漢昌縣屬巴郡漢末分宕渠置索山客翻賨徂宗翻畿曰郡合部曲本不為亂縱有讒諛要在盡誠若遂懷異志不敢聞命羲更使祁說之畿曰我受牧恩當為盡節說輸芮翻為于偽翻下為之同汝為郡吏自宜效力謂父子當各盡節於所事也有死不為羲怒使人謂畿曰不從太守禍將及家畿曰樂羊食子非無父子之恩大義然也樂羊註見四十三卷光武建武十二年畿啜之矣羲乃厚謝於璋璋擢畿為江陽太守劉璋分犍為為江陽郡宋白曰瀘州之瀘川江安縣本江陽地朝廷聞益州亂以五官中郎將牛亶為益州刺史徵璋為卿不至卿九卿也建安六年張魯以鬼道教民使病者自首其過首式救翻為之請禱實無益於治病然小人昏愚競共事之犯法者三原然後乃行刑治直之翻原赦也不置長吏皆以祭酒為治魯以鬼道教民其來學者初名為鬼卒後號祭酒祭酒各領部衆長知兩翻治直吏翻樂音洛流移寄在其地者不敢不奉其道後遂襲取巴郡朝廷力不能征遂就寵魯為鎮民中郎將領漢寧太守袁山松書曰建安二十年分漢中之安陽置漢寧郡民有地中得玉印者㣥下欲尊魯為漢寧王功曹巴西閻圃諫曰譙周巴記曰初平六年趙韙分巴為二郡欲得巴舊名以墊江為治安漢以下為永寧郡建安六年劉璋分巴以永寧為巴東郡墊江為巴郡閬中為巴西郡漢川之民戶出十萬財富土沃四面險固上匡天子則為桓文次及竇融不失富貴今承制署置勢足斬斷斷丁亂翻不煩於王願且不稱勿為禍先魯從之七年七年春正月曹操軍譙譙縣屬沛國操之鄉里治睢陽渠浚儀縣屬陳留郡睢水於此縣首受莨蕩渠水東過睢陽縣故謂之睢陽渠睢音雖治直之翻玄識操於微時故祀之七年袁紹自軍敗慙憤發病嘔血夏五月薨初紹有三子譚熙尚紹後妻劉氏愛尚數稱於紹數所角翻紹欲以為後而未顯言之乃以譚繼兄後紹本司空逢之孽子出後伯父成成蓋先有子死而紹後之紹欲廢譚立尚故以譚繼兄後沮授諫曰沮子余翻世稱萬人逐兔一人獲之貪者悉止分定故也慎子曰兔走於街百人逐之貪心俱存人莫之非者以兔為未定分也積兔在市過而不顧非不欲兔也分定之後雖鄙不爭分扶問翻當為嗣而斥使居外禍其始此矣譚尚之爭沮授固知之矣長知兩翻下同吾欲令諸子各據一州以視其能於是以中子熙為幽州刺史中讀曰仲外甥高幹為幷州刺史此皆前事史因紹死而譚尚爭書之以先事逢紀審配素為譚所疾逢皮江翻辛評郭圖皆附於譚而與配紀有隙及紹薨衆以譚長欲立之配等恐譚立而評等為害遂矯紹遺命奉尚為嗣譚至不得立自稱車騎將軍袁紹初起兵自稱車騎將軍故譚亦稱之尚少與之兵少詩沼翻而使逢紀隨之譚求益兵審配等又議不與譚怒殺逢紀秋九月曹操渡河攻譚譚告急於尚尚留審配守鄴自將助譚與操相拒連戰譚尚數敗退而固守數所角翻尚遣所置河東太守郭援與高幹匈奴南單于共攻河東發使與關中諸將馬騰等連兵使疏吏翻騰等陰許之援所經城邑皆下河東郡吏賈逵守絳絳縣屬河東郡春秋晉所都也城將潰父老與援約不害逵乃降降戶江翻援許之援欲使逵為將將即亮翻以兵劫之逵不動左右引逵使叩頭逵叱之曰安有國家長吏為賊叩頭逵郡吏非長吏也以守絳故自謂縣長吏為于偽翻將斬之或伏其上以救之絳吏民聞將殺逵皆乘城呼曰呼火故翻負約殺我賢君寧俱死耳乃囚於壺關著土窖中壺關縣屬上黨郡著陟略翻窖居效翻掘地以藏粟之所逵謂守者曰此間無健兒邪而使義士死此中乎有祝公道者適聞其言乃夜往盜引出逵折械遣去不語其姓名語牛倨翻曹操使司隸校尉鍾繇圍南單于於平陽平陽縣屬河東郡時南單于呼廚泉居之章甲十一行本救作援乙十一行本同孔本同熊校同至繇使新豐令馮翊張既說馬騰新豐縣屬京兆太守說輸芮翻為于偽翻騰疑未決傅幹說騰曰古人有言順德章甲十一行本德作道乙十一行本同孔本同熊校同者昌逆德者亡新城三老董公之言法明政治上下用命可謂順道矣治直吏翻袁氏恃其強大背棄王命背蒲妹翻驅胡虜以陵中國可謂逆德矣今將軍既事有道章甲十一行本道下有不盡其力四字乙十一行本同孔本同張校同退齋校同陰懷兩端謂既附曹公又與袁氏通也吾恐成敗既定奉辭責罪將軍先為誅首矣於是騰懼幹因曰智者轉禍為福今曹公與袁氏相持而高幹郭援合攻河東曹公雖有萬全之計不能禁河東之不危也將軍誠能引兵討援內外擊之謂河東之兵擊之於內而馬騰之兵擊之於外也是將軍一舉斷袁氏之臂斷丁管翻解一方之急曹公必重德將軍將軍功名無與比矣騰乃遣子超將兵萬餘人與繇會初諸將以郭援衆盛欲釋平陽去鍾繇曰袁氏方強援之來關中陰與之通所以未悉叛者顧吾威名故耳若棄而去示之以弱所在之民誰非寇讎縱吾欲歸其得至乎此為未戰先自敗也言若退師避援則關中諸將必叛雖欲歸司隸治所亦不得而至也必易吾軍易輕也愎平逼翻好呼到翻易以豉翻水經註汾水南過平陽縣東可大克也援至果徑前渡汾衆止之不從濟水未半繇擊大破之戰罷衆人皆言援死而不得其首援繇之甥也晚後馬超校尉南安龐德於鞬中出一頭秦川記曰靈帝中平五年分漢陽置南安郡領䝠道新興中陶三縣鞬居言翻盛弓矢器德謝繇繇曰援雖我甥乃國賊也卿何謝之有南單于遂降降戶江翻考異曰魏志張既傳曰高幹及單于皆降非也七年劉表使劉備北侵至葉葉縣屬南陽郡春秋楚葉公子高之邑也葉之涉翻備一旦燒屯去惇等追之裨將軍鉅鹿李典曰裨將軍在偏將軍之下裨頻彌翻賊無故退疑必有伏南道窄狹窄側格翻草木深不可追也惇等不聽使典留守而追之果入伏裏兵大敗典往救之備乃退七年曹操下書責孫權任子任質任也操蓋以此覘孫權而觀其所以應之張昭秦松等猶豫不決權引周瑜詣吳夫人前定議吳夫人權母也昔楚國初封不滿百里之地繼嗣賢能廣土開境遂據荊揚章甲十一行本揚下有至於南海四字乙十一行本同孔本同退齋校同傳業延祚九百餘年周成王封熊繹於楚以子男之田國於丹陽漢南郡枝江縣是也其後浸強至若敖蚡冒封畛於汝武王文王奄有江漢之間莊王以後與中國爭盟威王破越至于南海及秦而滅凡九百餘年兼六郡之衆父謂孫堅兄謂孫策六郡會稽吳丹陽豫章廬陵廬江也將士用命鑄山為銅煮海為鹽境內富饒人不思亂有何逼迫而欲送質質音致下同質一入不得不與曹氏相首尾與相首尾則命召不得不往如此便見制於人也極不過一侯印僕從十餘人車數乘馬數匹豈與南面稱孤同哉建安十三年操自荊州東下約孫權會獵時周瑜未至魯肅說權其意亦與此同從才用翻乘繩證翻徐觀其變若曹氏能率義以正天下將軍事之未晚若圖為暴亂彼自亡之不暇焉能害人此數語所謂相時而動也然瑜之言不悖於大義魯肅呂蒙輩不能及也焉於虔翻公瑾議是也公瑾與伯符同年小一月耳周瑜字公瑾孫策字伯符瑾渠吝翻汝其兄事之遂不送質八年八年春二月曹操攻黎陽考異曰魏志武紀作三月今從范書袁紹傳又魏志紹傳云譚尚與太祖相拒黎陽自二月至九月當云自九月至二月譚尚敗走還鄴夏四月操追至鄴收其麥考異曰范書紹傳曰尚逆擊破操軍今從魏志紹傳余謂此諸葛孔明所謂偪於黎陽時也必有破操軍事魏人諱而不書耳郭嘉曰袁紹愛此二子莫適立也適丁歷翻主也今權力相侔各有黨與謂辛評郭圖等附譚審配等附尚也緩之則爭心生不如南向荊州荊州劉表變成而後擊之可一舉定也操曰善五月操還許留其將賈信屯黎陽譚謂尚曰我鎧甲不精故前為曹操所敗鎧可亥翻敗補邁翻今操軍退人懷歸志及其未濟出兵掩之可令大潰此策不可失也尚疑之既不益兵又不易甲譚大怒郭圖辛評因謂譚曰使先公出將軍為兄後者皆審配之謀也譚遂引兵攻尚戰於門外鄴城門外也引兵還南皮南皮縣屬勃海郡賢曰今滄州縣章武有北皮亭故此曰南皮宋白曰縣道記云景州之南皮在郡東六十里南皮縣北有迎河河之北有故皮城是後漢勃海郡所理與郡理城南北非遠中隔迎河故瀆別駕北海王脩率吏民自青州往救譚漢青州刺史治臨菑脩曰兄弟者左右手也譬人將鬬而斷其右手斷丁管翻曰我必勝其可乎夫棄兄弟而不親天下其誰親之彼讒人離間骨肉以求一朝之利願塞耳勿聽也間古莧翻塞悉則翻若斬佞臣數人復相親睦以御四方可橫行於天下譚不從譚將劉詢起兵漯陰以叛譚漯陰縣屬平原郡應劭曰漯水出東武陽東北入海賢曰縣在漯水之南故城在今齊州臨邑縣西師古曰漯音他答翻譚歎曰今舉州皆叛豈孤之不德邪王脩曰東萊太守管統雖在海表此人不反必來後十餘日統果棄其妻子來赴譚妻子為賊所殺譚更以統為樂安太守漢末樂安國除為郡八年秋八月操擊劉表軍于西平西平縣屬汝南郡從郭嘉之謀也八年袁尚自將攻袁譚大破之將即亮翻譚奔平原嬰城固守前書音義曰嬰謂以城自繞也尚圍之急譚遣辛評弟毗詣曹操請救劉表以書諫譚曰君子違難不適讎國左傳公山不狃之言難乃旦翻史記樂毅答燕惠王書之言棄親戚之好而為萬世之戒遺同盟之恥哉表與袁紹同盟好呼到翻遺于季翻下同左傳曰段不弟書曰象傲尚據冀州故稱之以濟事為務事定之後使天下平其曲直不亦為高義邪又與尚書曰金木水火以剛柔相濟然後克得其和能為民用金能勝木然執柯伐柯非木無以成金斲削之利水能勝火然水在火上非火無以成水烹飪之功此類非一可以概推也章甲十一行本青上有今字乙十一行本同孔本同張校同州天性峭急峭七笑翻譚據青州故稱之迷於曲直仁君度數弘廣綽然有餘當以大包小以優容劣先除曹操以卒先公之恨卒子恤翻事定之後乃議曲直之計不亦善乎若迷而不反則胡夷將有譏誚之言誚才笑翻況我同盟復能勠力為君之役哉此韓盧東郭自困於前而遺田父之獲者也淳于髡說齊威王曰韓盧者天下之俊犬也東郭狻者天下之狡兔也韓盧逐東郭狻騰山者五環山者三兔極於前犬疲於後犬兔俱疲各死其處田父見而獲之無勞苦而亶其功今齊魏相持頓兵敝衆恐秦楚乘其後而有田父之功也辛毗至西平見曹操致譚意㣥下多以為劉表強宜先平之譚尚不足憂也荀攸曰天下方有事而劉表坐保江漢之間其無四方之志可知矣袁氏據四州之地帶甲數十萬紹以寬厚得衆心使二子和睦以守其成業則天下之難未息也謂能為曹操患也難乃旦翻遘當作構或曰遘遇也謂以惡相遇也若有所幷則力專力專則難圖也謂譚尚若幷於一則能專力以禦操其勢難圖天下定矣此時不可失也操從之後數日操更欲先平荊州使譚尚自相敝辛毗望操色知有變以語郭嘉語牛倨翻嘉白操操謂毗曰譚必可信尚必可克不不讀曰否毗對曰明公無問信與詐也直當論其勢耳袁氏本兄弟相伐非謂他人能間其間乃謂天下可定於己也能間工莧翻言袁氏兄弟相攻其初計不謂他人能乘其間乃謂幷青冀為一則可乘勢以定天下耳今一旦求救於明公此可知也言其勢窮譚字顯思尚字顯甫兵革敗於外謀臣誅於內謂逢紀田豐等死也䦧馨激翻鬬也很也戾也國分為二連年戰伐介冑生蟣蝨加以旱蝗饑饉並臻天災應於上人事困於下民無愚智皆知土崩瓦解此乃天亡尚之時也今往攻鄴尚不還救即不能自守還救即譚踵其後以明公之威應困窮之敵擊疲敝之寇無異迅風之振秋葉矣秋葉易隕況遇迅風乎明公不取而伐荊州荊州豐樂樂音洛國未有釁仲虺有言取亂侮亡見尚書孔安國註曰亂則取之有亡形則侮之可謂亂矣居者無食行者無糧可謂亡矣朝不謀夕民命靡繼而不綏之欲待他年他年或登歲熟曰登失所以用兵之要矣今因其請救而撫之利莫大焉且四方之寇莫大於河北河北平則六軍盛而天下震矣觀毗之言非為譚請救也勸操以取河北也善乃許譚平冬十月操至黎陽尚聞操渡河乃釋平原還鄴尚將呂曠高翔畔歸曹操譚復陰刻將軍印以假曠翔操知譚詐乃為子整聘譚女以安之而引軍還操本有伐尚因而取譚之心況復有誘曠翔之事乎聘其女為子婦以安之所謂將欲取之必姑與之也復扶又翻下同為于偽翻八年孫權西伐黃祖破其舟軍惟城未克而山寇復動丹陽豫章廬陵皆有山越過豫章使征虜中郎將呂範平鄱陽會稽呂範傳止云鄱陽孫權傳則有會稽二字以地里攷之會稽二字衍晉志及宋志鄱陽郡有樂安縣吳立建安十五年孫權始分豫章立鄱陽郡盪寇中郎將權所置也和帝永元十六年分海昏立建昌縣屬豫章郡孫策分海昏建昌六縣以太史慈為建昌都尉治海昏劇艱也甚也言其地當山越之要最為艱劇之甚者也悉平之建安漢興南平民作亂聚衆各萬餘人建安本冶縣地會稽南部都尉治焉建安中分東侯官置建安縣用漢年號也今建寧府地漢興縣沈約曰漢末立吳更名吳興南平縣亦漢末立晉武平吳改曰延平今南劍州地時皆屬南部都尉皆平之復立縣邑料出兵萬人拜齊平東校尉會工外翻復如字料音聊校戶教翻九年九年春正月曹操濟河遏淇水入白溝以通糧道袁尚在鄴操將攻之故通糧道班志曰淇水至黎陽入河曹操於水口下大枋木以成堰遏淇水東入白溝水經註曰淇水東過內黃縣南為白溝二月袁尚復攻袁譚於平原復扶又翻留其將審配蘇由守鄴曹操進軍至洹水水經洹水出上黨泫氏縣東過隆慮縣北又東北出山逕鄴縣南洹于元翻又音桓謀泄出奔操操進至鄴為土山地道以攻之尚武安長尹楷屯毛城以通上黨糧道武安縣屬魏郡唐洺州地長知兩翻下同四月操留曹洪攻鄴自將擊楷破之而還又擊尚將沮鵠於邯鄲拔之裴松之曰沮音葅河朔間今猶有此姓鵠沮授子也沮子余翻邯鄲音寒丹易陽令韓範涉長梁岐皆舉縣降易陽縣屬趙國涉縣蓋漢末分上黨之潞縣置魏後置廣平郡二縣皆屬焉北齊廢涉縣入刈陵縣隋唐復置涉縣宋白曰涉縣因縣南涉河為名磁州昭義縣理故涉城永泰元年改名昭義二袁未破諸城未下者傾耳而聽宜旌賞二縣以示諸城操從之範岐皆賜爵關內侯黑山賊帥張燕遣使求助操拜平北將軍晉志曰四平止於喪亂時以河北未平授以此號及晉以後征鎮安平以次進號帥所類翻五月操毀土山地道鑿塹圍城周回四十里土山地道急攻也知非急攻可拔故鑿塹圍城絕其內外以久困之塹七艷翻示若可越配望見笑之不出爭利操一夜濬之廣深二丈廣古曠翻深悉禁翻度之廣深也後放此引漳水以灌之水經註漳水過鄴縣西魏武堨以圍鄴秋七月尚將兵萬餘人還救鄴未到欲令審配知外動止先使主簿鉅鹿李孚入城孚斫問事杖繫著馬邊問事卒也主行杖猶伍伯之類問事杖問事所執杖也著直略翻幘有顏題其顏卻摞施巾連題卻覆之平上幘者其上平也晉志引漢註曰冠惠文者宜短耳今平上幘也冠進賢者宜長耳今介幘也文吏服介幘武吏服平上幘著陟略翻投暮詣鄴下自稱都督歷北圍循表而東表圍城所立標表也騎奇寄翻隨輕重行其罰遂歷操營前至南圍當章門鄴城有七門正南曰章門亦曰中陽門收縛之因開其圍馳到城下呼城上人城上人以繩引孚得入不先經操營前則守圍者必疑不可得而收縛圍亦不可開矣孚之來也其定計固指從章門入也復扶又翻下同悲喜鼓譟稱萬歲守圍者以狀聞操笑曰此非徒得入也方且復出操知其復出非不欲嚴為之防也審孚所以得入之由服其多智有不可得而防者也不可復冒乃請配悉出城中老弱以省穀夜簡別數千人皆使持白幡從三門並出降鄴城南面三門曰鳳陽門中陽門廣陽門簡別彼列翻降戶江翻下同隨輩夜出突圍得去尚兵既至諸將皆以為此歸師人自為戰不如避之兵法曰歸師勿遏尚從大道來當避之若循西山來者此成禽耳從大道來則人懷救根本不顧勝敗有必死之志循山而來則其戰可前可卻人有依險自全之心無同力致命之意操所以料尚者如此兵法所謂觀敵之動者也東至陽平亭去鄴十七里臨滏水為營郡國志鄴有滏水左思魏都賦曰北臨漳滏則冬夏異沼註云鄴北有滏水水熱故名滏口舉火以示城中城中亦舉火相應配出兵城北欲與尚對決圍操逆擊之敗還尚亦破走依曲漳為營賢曰漳水之曲也未合尚懼遣使求降操不聽圍之益急尚夜遁保祁山陳壽魏武紀作祁山袁紹傳作濫口范史袁紹傳作藍口賢註曰相州安陽縣界有藍嵯山與鄴相近蓋藍山之口考異曰魏志紹傳云還走濫口范書作藍口今從魏武紀復扶又翻尚將馬延張顗等臨陳降衆大潰尚奔中山盡收其輜重陳讀曰陣重直用翻得尚印綬節鉞及衣物以示城中城中崩沮沮在呂翻審配令士卒曰堅守死戰操軍疲矣幽州方至幽州謂袁熙也配以此安衆心可謂忠勇矣巡行長圍也行下更翻幾中射而亦翻幾居希翻中竹仲翻配兄子榮為東門校尉鄴城東門曰建春門七門之名蓋皆石氏所命也戊寅榮夜開門內操兵內讀曰納配拒戰城中操兵生獲之辛評家繫鄴獄辛毗馳往欲解之已悉為配所殺操兵縛配詣帳下毗逆以馬鞭擊其頭罵之曰奴汝今日真死矣配顧曰狗輩正由汝曹破我冀州恨不得殺汝也且汝今日能殺生我邪言殺生由曹操不由辛毗操引見謂配曰曩日孤之行圍何弩之多也配曰猶恨其少謂射操不中也少詩沼翻卿忠於袁氏亦自不得不爾意欲活之配意氣壯烈終無橈辭橈奴教翻曲也而辛毗等號哭不已號戶刀翻遂斬之冀州人張子謙先降素與配不善笑謂配曰正南審配字正南配厲聲曰汝為降虜審配為忠臣雖死豈羨汝生邪臨行刑叱持兵者令北向曰我君在北也袁紹下士能盡死以效節者審配一人而已我君在北謂袁尚已北奔也哭之流涕慰勞紹妻還其家人寶物賜雜繒絮稟食之勞力到翻繒慈陵翻食讀曰飤初袁紹與操共起兵紹問操曰若事不輯則方面何所可據輯猶集也集成也觀紹此言則起兵之時固無勤王之心而有割據之志矣足下意以為何如紹曰吾南據河北阻燕代兼戎狄之衆南向以爭天下庶可以濟乎操曰吾任天下之智力以道御之無所不可九月詔以操領冀州牧操讓還兗州當時政自操出領則真領而讓非真讓也初袁尚遣從事安平牽招至上黨督軍糧牽姓招名尚走中山招說高幹以幷州迎尚幷力觀變說輸芮翻幹不從招乃東詣曹操操復以為冀州從事又辟崔琰為別駕操謂琰曰昨按戶籍可得三十萬衆故為大州也琰對曰今九州幅裂二袁兄弟親尋干戈左傳子產曰昔高辛氏有二子伯曰閼伯季曰實沈居于曠林不相能也日尋干戈以相征討杜預註曰尋用也暴骨原野未聞王師存問風俗救其塗炭而校計甲兵唯此為先斯豈鄙州士女所望於明公哉操改容謝之此操之所以重崔琰而亦不能不害崔琰也許攸恃功驕嫚烏巢之捷計出於攸故恃其功某甲裴松之曰操一名吉利小字阿瞞曰某甲者史隱其辭坐徂臥翻不得冀州也操笑曰汝言是也然內不樂樂音洛後竟殺之九年冬十月有星孛于東井晉天文志南方東井八星天之南門黃道所經天之亭候主水衡事法令所取平也孛蒲內翻九年高幹以幷州降操復以幹為幷州刺史為幹復叛張本降戶江翻復扶又翻九年曹操之圍鄴也袁譚復背之復扶又翻下同略取甘陵安平勃海河間攻袁尚於中山尚敗走故安故安縣屬涿郡賢曰故城在今易州易縣南譚悉收其衆還屯龍湊操與譚書責以負約與之絕婚女還然後進討袁尚破走操於是始討譚操軍其門譚拔平原走保南皮臨清河而屯水經清河過南皮縣西略定諸縣九年曹操表公孫度為武威將軍封永寧鄉侯度曰我王遼東何永寧也王于況翻藏印綬於武庫遼東郡之武庫也度卒子康嗣位以永寧鄉侯封其弟恭操以牽招嘗為袁氏領烏桓牽姓招名袁紹先嘗辟招為督軍從事兼領烏桓突騎撫慰烏桓值峭王嚴五千騎欲助袁譚又公孫康遣使韓忠假峭王單于印綬峭王大會㣥長烏桓部落各有君長峭七笑翻使疏吏翻長知兩翻坐才臥翻下同峭王問招昔袁公言受天子之命假我為單于今曹公復言當更白天子假我真單于遼東復持印綬來復扶又翻如此誰當為正招答曰昔袁公承制得有所拜假中間違錯天子命違異也背也錯乖也言當白天子更假真單于章甲十一行本于下有是也二字乙十一行本同遼東下郡何得亶稱拜假也忠曰我遼東在滄海之東擁兵百餘萬又有扶餘濊貊之用濊音穢貊莫百翻當今之勢強者為右曹操何得獨為是也招呵忠曰曹公允恭明哲孔安國尚書註曰允信也伐叛柔服寧靜四海汝君臣頑嚚嚚魚巾翻左傳曰不道忠信之言為嚚今恃險遠背違王命背蒲妹翻欲亶拜假侮弄神器威福帝王之神器何敢慢易咎毀大人大人謂曹公易以豉翻拔刀欲斬之峭王驚怖怖普布翻徒跣抱招以救請忠左右失色招乃還坐為峭王等說成敗之效禍福所歸皆下席跪伏敬受敕教敕戒也為于偽翻罷所嚴騎九年丹陽大都督媯覽郡丞戴員殺太守孫翊將軍孫河屯京城馳赴宛陵京城即漢吳郡丹徒縣也孫權自吳徙居之命曰京城亦曰京口余謂此京取爾雅丘絕高曰京之義宛陵丹陽郡治所媯覽戴員盛憲之黨也媯俱為翻姓也舜居媯汭其後因以為氏員音云復扶又翻遣人迎揚州刺史劉馥馥曹操所用也以丹陽應之歷陽與丹陽隔江使馥來屯以為聲援覽入居軍府中欲逼取翊妻徐氏徐氏紿之曰乞須晦日月終為晦陰之盡也紿蕩亥翻然後聽命覽許之徐氏潛使所親語翊親近舊將孫高傅嬰等與共圖覽語牛倨翻高嬰涕泣許諾密呼翊時侍養者二十餘人與盟誓合謀侍養謂侍翊左右而厚蒙給養者設祭徐氏哭泣盡哀畢乃除服薰香沐浴言笑懽悅大小悽愴悽悲也痛也愴傷也音初亮翻覽密覘無復疑意覘丑廉翻又丑艷翻復扶又翻徐氏呼高嬰置戶內使人召覽入徐氏出戶拜覽適得一拜徐大呼二君可起呼火故翻高嬰俱出共殺覽餘人即就外殺員徐氏乃還縗絰復著縗絰也縗倉回翻舉軍震駭孫權聞亂從椒丘還椒丘在豫章悉族誅覽員餘黨擢高嬰為牙門牙門將也河子韶年十七收河餘衆屯京城權引軍歸吳夜至京城下營試攻驚之兵皆乘城傳檄備警讙聲動地讙許元翻頗射外人權使曉喻乃止明日見韶拜承烈校尉統河部曲史言孫權能用人以保江東射而亦翻十年十年春正月曹操攻南皮袁譚出戰士卒多死操欲緩之議郎曹純曰今縣師深入純仁之弟也縣讀曰懸若進不能克退必喪威喪息浪翻乃自執桴鼓以率攻者桴音膚遂克之譚出走追斬之李孚自稱冀州主簿求見操曰今城中強弱相陵人心擾亂以為宜令新降為內所識信者宣傳明教降戶江翻操即使孚往入城告諭吏民使各安故業不得相侵城中乃安李孚小才也挾才以求知非懷才以待聘者也郭圖審配各有黨附交鬬譚尚使尋干戈以貽曹氏之驅除譚尚既敗二人亦誅禍福之報為不爽矣袁譚使王脩運糧於樂安聞譚急將所領兵往赴之至高密聞譚死下馬號哭曰無君焉歸號戶刀翻焉於虔翻遂詣曹操乞收葬譚尸操許之復使脩還樂安督軍糧譚所部諸城皆服唯樂安太守管統不下操命脩取統首使還運糧就取統首也解其縛使詣操操悅而赦之辟脩為司空掾郭嘉說操多辟青冀幽幷名士以為掾屬使人心歸附操從之官渡之戰袁紹使陳琳為檄書數操罪惡連及家世極其醜詆及袁氏敗琳歸操操曰卿昔為本初移書說輸芮翻下同數所具翻為于偽翻下同但可罪狀孤身何乃上及父祖邪按文選琳為紹檄豫州蓋帝都許許屬潁川郡豫州部屬也故選專以檄豫州為言琳檄略曰操祖父騰與左悺徐璜並作妖孽饕餮放橫傷化害人父嵩乞匄攜養因臧買位竊盜鼎司操姦閹遺醜僄狡鋒俠好亂樂禍又數其殘賢害善專制朝政發掘墳陵之罪文多不載操釋之使與陳留阮瑀俱管記室漢公府有記室令史主上章表報書記先是漁陽王松據涿郡先悉薦翻郡人劉放說松以地歸操操辟放參司空軍事為劉放因此管魏機密以亂魏張本袁熙為其將焦觸張南所攻與尚俱奔遼西烏桓遼西烏桓其酋曰蹋頓驅率諸郡太守令長背袁向曹長知兩翻背蒲妹翻陳兵數萬殺白馬而盟令曰敢違者斬衆莫敢仰視各以次歃歃色洽翻別駕代郡韓珩曰珩音行吾受袁公父子厚恩今其破亡智不能救勇不能死於義闕矣若乃北面曹氏所不能為也一坐為珩失色坐徂臥翻觸曰夫舉大事當立大義事之濟否不待一人可卒珩志以厲事君卒子恤翻乃捨之觸等遂降曹操皆封為列侯降戶江翻十年夏四月黑山賊帥張燕率其衆十餘萬降帥所類翻封安國亭侯十年故安趙犢霍奴等殺幽州刺史及涿郡太守三郡烏桓攻鮮于輔於獷平三郡烏桓遼西蹋頓遼東蘇僕延右北平烏延也獷平縣屬漁陽郡服虔曰獷音鞏師古曰音九勇翻又音鑛八月操討犢等斬之乃渡潞水救獷平烏桓走出塞十年冬十月高幹聞操討烏桓復以幷州叛復扶又翻執上黨太守舉兵守壺關口賢曰潞州上黨縣有壺山口因其險而置關焉二漢志壺關縣屬上黨郡河內張晟衆萬餘人寇崤澠間晟成正翻澠彌兗翻弘農張琰起兵以應之河東太守王邑被徵被皮義翻郡掾衞固及中郎將范先等詣司隸校尉鍾繇請留之掾俞絹翻繇不許固等外以請邑為名而內實與高幹通謀曹操謂荀彧曰關西諸將外服內貳張晟寇亂殽澠南通劉表固等因之將為深害當今河東天下之要地也高幹據幷州馬騰韓遂等據關中往來交通皆由河東故曰要地為于偽翻彧曰西平太守京兆杜畿漢末分金城置西平郡難乃旦翻下同智足以應變操乃以畿為河東太守鍾繇促王邑交符交郡符也徑從河北詣許自歸河北縣屬河東郡宋白曰陝州平陸縣本漢大陽縣地後漢改為河北縣衞固等使兵數千人絕陝津水經註河水東過陝縣北河北對茅城謂之茅津亦謂之陝津陝式冉翻數月不得渡操遣夏侯惇討固等未至畿曰河東有三萬戶非皆欲為亂也今兵迫之急欲為善者無主必懼而聽於固固等勢專章甲十一行本專下有必以死戰四字乙十一行本同孔本同張校同討之不勝為難未已討之而勝是殘一郡之民也且固等未顯絕王命外以請故君為名必不害新君吾單車直往出其不意固為人多計而無斷斷丁亂翻必偽受吾吾得居郡一月以計縻之足矣遂詭道從郖津渡水經註河水東逕湖縣故城北又東合柏谷水又東右合門水河水於此有郖津之名郖音竇范先欲殺畿以威衆且觀畿去就於門下斬殺主簿以下三十餘人畿舉動自若於是固曰殺之無損徒有惡名且制之在我遂奉之畿謂固先曰衞范河東之望也吾仰成而已仰牛向翻然君臣有定義成敗同之大事當共平議以固為都督行丞事領功曹既以為都督又令行郡丞事又領功曹也都督掌兵丞貳太守於郡事無所不關功曹掌選署功勞陽以郡權悉與之也皆范先督之將即亮翻校戶教翻固等喜雖陽事畿不以為意固欲大發兵畿患之說固曰今大發兵衆情必擾不如徐以貲募兵固以為然從之得兵甚少以貲募兵則郡計不足以繼故得兵甚少人情顧家諸將掾史可分遣休息掾于絹翻急緩召之不難固等惡逆衆心惡烏路翻又從之於是善人在外陰為己援惡人分散各還其家會白騎攻東垣白騎張白騎之衆相聚為賊者也垣縣屬河東郡東字衍續漢志垣縣註云山在東狀如垣蓋此時已有東垣之名騎奇寄翻濩澤縣屬河東郡賢曰今澤州縣師古曰濩音烏號翻乃出單將數十騎赴堅壁而守之將即亮翻堅壁壁壘之最堅者吏民多舉城助畿者舉城謂舉屬縣城也比必寐翻得四千餘人固等與高幹張晟共攻畿不下略諸縣無所得曹操使議郎張既西徵關中諸將馬騰等皆引兵會擊晟等破之斬固琰等首其餘黨與皆赦之於是杜畿治河東務崇寬惠治直之翻民有辭訟畿為陳義理遣歸諦思之為于偽翻諦丁計翻審也父老皆自相責怒不敢訟勸耕桑課畜牧百姓家家豐實然後興學校校戶教翻舉孝弟弟讀曰悌修戎事講武備河東遂安畿在河東十六年常為天下最為曹操因河東資實以平關中張本杜畿之子為杜恕恕之子為杜預其守河東觀其方略固未易才也余竊謂杜氏仕於魏晉累世貴盛必有家傳史因而書之固有過其實者十年祕書監侍中荀悅桓帝延熹二年置祕書監秩六百石奏之悅爽之兄子也時政在曹氏天子恭己言恭己南面而已政事無所預也孔子曰無為而治者其舜也歟夫何為哉恭己正南面而已後世遂以政在強臣己無所預為恭己舜之恭己果如是哉獻可替否故作是書其大略曰為政之術先屏四患屏必郢翻乃崇五政偽亂俗私壞法放越軌奢敗制壞音怪敗補邁翻四者不除則政末由行矣是謂四患興農桑以養其生審好惡以正其俗好呼到翻惡烏路翻宣文教以章其化立武備以秉其威明賞罰以統其法是謂五政人不畏死不可懼以罪人不樂生不可勸以善故在上者先豐民財以定其志是謂養生此說萬世不可易也樂音洛毀譽効於準驗書云無稽之言勿聽舉名察實無或詐偽以蕩衆心蕩謂動之也以詐偽動之則人之心亦必動於詐偽以應其上民無淫風是謂正俗榮辱者賞罰之精華也故禮教榮辱以加君子化其情也桎梏鞭撲以加小人化其形也桎之日翻梏工沃翻撲普卜翻若教化之廢推中人而墜於小人之域推吐雷翻教化之行引中人而納於君子之塗是謂章化在上者必有武備以戒不虞安居則寄之內政國語管仲相齊桓公作內政以寄軍令是謂秉威賞罰政之柄也人主不妄賞非愛其財也賞妄行則善不勸矣不妄罰非矜其人也罰妄行則惡不懲矣賞不勸謂之止善罰不懲謂之縱惡在上者能不止下為善不縱下為惡則國法立矣是謂統法四患既獨章甲十一行本獨作蠲乙十一行本同孔本同熊校同五政又立行之以誠守之以固簡而不怠疏而不失垂拱揖讓而海內平矣荀悅申鑒其立論精切關於國家興亡之大致過於彧攸至於揣摩天下之勢應敵設變以制一時之勝悅未必能也曹操姦雄親信彧攸而悅乃在天子左右悅非比於彧攸而操不之忌蓋知悅但能持論其才必不能辦也嗚呼東都之季荀淑以名德稱而彧攸以智略濟荀悅蓋得其祖父之彷彿耳其才不足以用世其言僅見於此書後之有天下國家者尚論其世深味其言則知悅之忠於漢室而有補於天下國家也蠲吉玄翻何茲全標點容肇祖聶崇岐覆校
