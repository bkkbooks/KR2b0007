body:
  text: 資治通鑑卷第五十八翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注漢紀五十光和四年孝靈皇帝中光和四年辛酉一八一光和四年春正月初置騄驥廣既丞領受郡國調馬賢曰騄驥善馬也調謂徵發也調徒釣翻下同前書音義曰辜障也榷專也謂障餘人買賣而自取其利榷古嶽翻馬一匹至二百萬光和四年夏四月庚子赦天下光和四年交趾烏滸蠻久為亂烏滸蠻反事始上卷光和元年滸呼古翻交趾人梁龍等復反攻破郡縣復扶又翻詔拜蘭陵令會稽朱俊為交趾刺史蘭陵縣屬東海郡會古外翻降者數萬人降戶江翻旬月盡定以功封都亭侯徵為諫議大夫光和四年六月庚辰雨雹如雞子雨于具翻光和四年秋九月庚寅朔日有食之光和四年太尉劉寬免衛尉許為太尉於六翻考異曰袁紀十月許郁坐辟召錯繆免楊賜為太尉今從范書光和四年閏月辛酉北宮東掖庭永巷署災光和四年司徒楊賜罷冬十月太常陳耽為司徒考異曰袁紀三年閏月楊賜久病罷十月陳耽為司徒蓋誤置閏於去年按長曆此年閏十月以袁紀考之閏九月為是恐長曆差一月今從范書帝紀光和四年鮮卑寇幽並二州檀石槐死子和連代立和連才力不及父而貪淫後出攻北地北地人射殺之射而亦翻其子騫曼尚幼兄子魁頭立後騫曼長大長知兩翻與魁頭爭國衆遂離散魁頭死弟步度根立光和四年是歲帝作列肆於後宮使諸采女販賣更相盜竊爭鬬更工衡翻帝著商賈服著陟略翻下同賈音古從之飲宴為樂樂音洛又於西園弄狗著進賢冠帶綬賢曰三禮圖曰進賢冠文官服之前高七寸後高三寸長八寸續漢志曰靈帝寵用便嬖子弟轉相汲引賣關內侯直五百萬強者貪如豺狼弱者略不類物真狗而冠也綬音受帝躬自操轡驅馳周旋續漢志曰驢者乃服重致遠上下山谷野人之所用耳何有帝王君子而驂駕之乎天意若曰國且大亂賢愚倒植凡執政者皆如驢也操千高翻驢價遂與馬齊帝好為私稸好呼倒翻稸與蓄同收天下之珍貨每郡國貢獻先輸中署名為導行費賢曰中署內署也導引也貢獻外別有所入以為所獻希之導引也天下之財莫不生之陰陽賢曰萬物稟陰陽而生豈有公私而今中尚方斂諸郡之寶中御府積天下之繒中尚方中御府皆屬少府天子私藏也繒慈陵翻中廣既聚太僕之馬中廣既即騄驥廣既輒有導行之財調廣民困費多獻少調徒弔翻少詩沼翻姦吏因其利百姓受其敝又阿媚之臣好獻其私好呼到翻容諂姑息自此而進舊典選舉委任三府尚書受奏御而已三府選其人而舉之尚書受其奏以進御責以成功功無可察然後付之尚書舉劾請下廷尉覆按虛實行其罪罰劾戶概翻又戶得翻下遐稼翻於是三公每有所選參議掾屬咨其行狀度其器能掾俞絹翻行下孟翻度徒洛翻然猶有曠職廢官荒穢不治治直之翻今但任尚書或有詔用詔用者不由三公尚書徑以詔書用之也三公得免選舉之負尚書亦復不坐責賞無歸豈肯空自勞苦乎書奏不省復扶又翻省悉井翻光和四年何皇后性強忌後宮王美人生皇子協后鴆殺美人帝大怒欲廢后諸中官固請得止光和四年大長秋華容侯曹節卒華容縣屬南郡五年五年春正月辛未赦天下五年詔公卿以謠言舉刺史二千石為民蠹害者太尉許司空張濟承望內官受取貨賂許六翻其宦者子弟賓客雖貪汙穢濁皆不敢問而虛糾邊遠小郡清修有惠化者二十六人吏民詣闕陳訴司徒陳耽上言公卿所舉率黨其私所謂放鴟梟而囚鸞鳳考異曰劉陶傳光和五年以謠言舉二千石耽與議郎曹操上言按耽已為司徒不應與議郎同上言王沈魏書曰是歲以災異博問得失太祖因此上書切諫不云與耽同上言也今但云陳耽由是諸坐謠言徵者悉拜議郎五年二月大疫五年三月司徒陳耽免五年夏四月旱五年以太常袁隗為司徒五年五月庚申永樂宮署災樂音洛五年秋七月有星孛于太微孛蒲內翻五年板楯蠻寇亂巴郡連年討之不能克寸帝欲大發兵以問益州計吏漢中程包對曰板楯七姓板楯七姓羅朴督鄂度夕龔皆渠帥也楯食尹翻復其租賦復方目翻其人勇猛善戰昔永初中羌入漢川郡縣破壞得板楯救之羌死敗殆盡事見四十九卷安帝元初元年注亦見是年傳語種輩勿復南行語牛倨翻種章勇翻復扶又翻下同至建和二年羌復大入實賴板楯連摧破之前車騎將軍馮緄南征武陵亦倚板楯以成其功近益州郡亂太守李顒亦以板楯討而平之緄古本翻又音昆顒魚容翻忠功如此本無惡心長吏鄉亭更賦至重長知兩翻更工衡翻僕役箠楚過於奴虜箠止蕊翻亦有嫁妻賣子或乃至自剄割雖陳冤州郡而牧守不為通理為于偽翻闕庭悠遠不能自聞含怨呼天無所叩訴故邑落相聚以章甲十一行本以下有致字乙十一行本同退齋校同叛戾非有謀主僭號以圖不軌今但選明能牧守守式又翻自然安集不煩征伐也帝從其言選用太守曹謙宣詔赦之即時皆降降戶江翻五年八月起四百尺觀於阿亭道觀古玩翻五年冬十月太尉許罷以太常楊賜為太尉五年帝校獵上林苑歷函谷關遂狩于廣成苑十二月還幸太學五年桓典為侍御史宦官畏之典常乘驄馬京師為之語曰行行且止避驄馬御史驄馬青白雜色焉之孫也順帝永建初焉為太傅焉榮之孫也六年六年春三月辛未赦天下六年夏大旱六年爵號皇后母為舞陽君六年秋金城河水溢出二十餘里六年五原山岸崩考異曰本紀云大有年按今夏大旱縱使秋成亦不得為大有年今不取六年初巨鹿張角奉事黃老以妖術教授號太平道呪符水以療病妖於驕翻呪職救翻令病者跪拜首過首式救翻今道家所施符水祖張道陵蓋同此術也或時病愈衆共神而信之角分遣弟子周行四方轉相誑誘誑居況翻誘音酉十餘年間徒衆數十萬自青徐幽冀荊揚兗豫八州之人莫不畢應或棄賣財産流移奔赴填塞道路塞悉則翻未至病死者亦以萬數郡縣不解其意解戶買翻反言角以善道教化為民所歸太尉楊賜時為司徒賜為司徒熹平五年也角誑曜百姓遭赦不悔稍益滋蔓蔓音萬今若下州郡捕討恐更騷擾速成其患宜切敕刺史二千石簡別流民下遐稼翻別彼列翻各護歸本郡以孤弱其黨然後誅其渠帥可不勞而定會賜去位事遂留中賢曰謂所論事留在禁中未施用之余據賜以熹平六年免帥所類翻掾俞絹翻復扶又翻角等陰謀益甚四方私言云角等竊入京師覘視朝政覘丑廉翻朝直遙翻鳥聲獸心私共鳴呼州郡忌諱不欲聞之但更相告語更工衡翻莫肯公文宜下明詔重募角等賞以國土有敢回避與之同罪帝殊不為意方詔陶次第春秋條例陶明春秋為之訓詁故詔之次第條例角遂置三十六方方猶將軍也大方萬餘人小方六七千考異曰袁紀作坊今從范書帥所類翻訛言蒼天已死黃天當立歲在甲子天下大吉以白土書京城寺門寺門在京城諸官寺舍之門皆作甲子字大方馬元義等先收荊揚數萬人期會發於鄴元義數往來京師數所角翻以中常侍封諝徐奉等為內應諝私呂翻約以三月五日內外俱起中平元年甲子一八四是年十二月改元六年春角弟子濟南唐周上書告之濟子禮翻考異曰袁紀云濟陰人唐客今從范書於是收馬元義車裂於雒陽考異曰袁紀曰五月乙卯馬元義等於京都謀反伏誅今從范書誅殺千餘人下冀州逐捕角等下遐稼翻角等知事已露晨夜馳敕諸方一時俱起皆著黃巾以為標幟著陟略翻幟尺志翻又音志故時人謂之黃巾賊二月角自稱天公將軍角弟寶稱地公將軍寶弟梁稱人公將軍考異曰司馬彪九州春秋云角弟梁梁弟寶袁紀云角弟良寶今從范書劫略聚邑聚才喻翻州郡失據長吏多逃亡長知兩翻旬月之間天下響應京師震動安平甘陵人各執其王應賊三月戊申以河南尹何進為大將軍封慎侯慎縣屬汝南郡修理器械以鎮京師置函谷太谷廣成伊闕轘轅旋門孟津小平津八關都尉函谷關在河南穀城縣賢曰太谷在雒陽東廣成在河南新城縣京相璠曰伊闕在雒陽西南五十里轘轅關在緱氏縣東南水經注曰旋門坂在成皋縣西南十里孟津在河內河陽縣南小平津在河南平縣北賢曰在今鞏縣西北杜佑曰洛州新安縣東北有漢八關城帝召㣥臣會議北地太守皇甫嵩以為宜解黨禁益出中藏錢西園廣既馬以班軍士中藏府令屬少府宦者為之中藏錢漢所謂禁錢也西園廣既馬即騄驥廣既馬藏徂浪翻規之兄子也上問計於中常侍呂強對曰黨錮久積人情怨憤若不赦宥輕與張角合謀為變滋大悔之無救今請先誅左右貪濁者大赦黨人料簡刺史二千石能否料音聊量也度也則盜無不平矣帝懼而從之壬子赦天下黨人還諸徙者謂黨人妻子徙邊者也發天下精兵遣北中郎將盧植討張角漢有三署中郎將五官及左右署又有使胸奴中郎將北中郎將則創置於此時蓋以討河北黃巾也是時中常侍趙忠張讓夏惲郭勝段圭宋典等皆封侯貴寵夏戶雅翻惲於粉翻上常言張常侍是我公趙常侍是我母由是宦官無所憚畏並起第宅擬則宮室上嘗欲登永安候臺據續漢志永安宮在北宮東北宮中有候臺洛陽宮殿名曰永安宮周回六百九十八丈故基在洛陽故城中乃使中大人尚但諫曰賢曰尚姓但名姓譜師尚父之後後漢有尚士尚子平天子不當登高登高則百姓虛散上自是不敢復升臺榭觀靈帝以尚但之言不敢復升臺榭誠恐百姓虛散也謂無愛民之心可乎使其以信尚但者信諸君子之言則漢之為漢未可知也賢曰春秋潛潭巴曰天子毋高臺榭高臺榭則下叛之蓋因此以誑帝也復扶又翻下同上詰責諸常侍曰詰去吉翻汝曹常言黨人欲為不軌皆令禁錮或有伏誅者今黨人更為國用汝曹反與張角通為可斬未皆叩頭曰此王甫侯覽所為也於是諸常侍人人求退各自徵還宗親子弟在州郡者趙忠夏惲等遂共譖呂強云與黨人共議朝廷數讀霍光傳言其欲謀廢立也數所角翻帝使中黃門持兵召強強聞帝召怒曰吾死亂起矣丈夫欲盡忠國家豈能對獄吏乎遂自殺忠惲復譖曰強見召未知所問而就外自屏賢曰自屏謂自殺也屏必郢翻遂收捕其宗親沒入財産侍中河內向栩上便宜譏刺左右栩況羽翻上時掌翻下同張讓誣栩與張角同心欲為內應收送黃門北寺獄殺之郎中中山張鈞上書曰竊惟張角所以能興兵作亂萬民所以樂附之者樂音洛其源皆由十常侍多放父兄子弟婚親賓客典據州郡辜榷財利榷古嶽翻侵掠百姓百姓之冤無所告訴故謀議不軌聚為盜賊宜斬十常侍縣頭南郊以謝百姓據宦者傳是時張讓趙忠夏惲郭勝孫璋畢嵐栗嵩段圭高望張恭韓悝宋典十二人皆為中常侍言十常侍舉大數也縣讀曰懸考異曰范書宦者傳上列常侍十二人名而下云十常侍未詳可不須師旅而大寇自消帝以鈞章示諸常侍皆免冠徒跣頓首乞自致雒陽詔獄並出家財以助軍費有詔皆冠履視事如故帝怒鈞曰此真狂子也十常侍固當有一人善者不不俯九翻御史承旨遂誣奏鈞學黃巾道收掠死獄中掠音亮六年庚子南陽黃巾張曼成攻殺太守褚貢六年帝問太尉楊賜以黃巾事賜所對切直帝不悅夏四月賜坐寇賊免以太僕弘農鄧盛為太尉已而帝閲録故事得賜與劉陶所上張角奏乃封賜為臨晉侯臨晉縣屬馮翊賢曰故城在今同州朝邑縣西南上時掌翻六年司空張濟罷以大司農張溫為司空六年皇甫嵩朱俊合將四萬餘人將即亮翻共討潁川張川下脫黃巾二字嵩俊各統一軍俊與賊波才戰敗嵩進保長社長社縣屬潁川郡賢曰今許州縣故城在長葛縣西六年汝南黃巾敗太守趙謙於邵陵邵陵縣屬汝南郡賢曰故城在今豫州郾陵縣東敗補邁翻六年波才圍皇甫嵩於長社嵩兵少少詩沼翻軍中皆恐賊依草結營會大風嵩約敕軍士皆束苣乘城賢曰苣音巨説文云東葦燒之使鋭士間出圍外縱火大呼間古莧翻呼火故翻城上舉燎應之嵩從城中鼓譟而出奔擊賊陳陳讀曰陳賊驚亂走會騎都尉沛國曹操將兵適至五月嵩操與朱俊合軍更與賊戰大破之斬首數萬級封嵩都鄉侯操父嵩為中常侍曹騰養子不能審其生出本末或云夏侯氏子也吳人作曹暪傳及郭頒世語並云嵩夏侯氏之子夏侯惇之叔父操於惇為從父兄弟有權數而任俠放蕩不治行業少詩照翻行下孟翻下同世人未之奇也唯太尉橋玄及南陽何顒異焉顒魚容翻玄謂操曰天下將亂非命世之才不能濟也能安之者其在君乎顒見操歎曰漢家將亡安天下者必此人也玄謂操曰君未有名可交許子將子將者訓之從子劭也許劭字子將許訓為公見上卷熹平三年四年從才用翻多所賞識與從兄靖俱有高名好共核論鄉黨人物每月輒更其品題故汝南俗有月旦評焉後置州郡中正本於此好呼到翻更工衡翻府中聞之莫不改操飾行曹操往造劭而問之造七到翻曰我何如人劭鄙其為人不答操乃劫之劭曰子治世之能臣亂世之姦雄言其才絶世也天下治則盡其能為世用天下亂則逞其智為時雄曹操事始此朱俊之擊黃巾也其護軍司馬北地傅燮上疏曰護軍司馬官為司馬而使監護一軍臣聞天下之禍不由於外皆興於內是故虞舜先除四凶然後用十六相尚書舜流共工于幽州放歡兜于崇山竄三苗于三危殛鯀于羽山四罪而天下咸服左傳曰高陽氏有才子八人蒼舒隤敱檮戭大臨厖降庭堅仲容叔達謂之八元高辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季貍謂之八愷舜臣堯流四凶族舉十六相則善人無由進也今張角起於趙魏黃巾亂於六州此皆釁發蕭牆而禍延四海者也臣受戎任奉辭伐罪始到潁川戰無不克寸黃巾雖盛不足為廟堂憂也臣之所懼在於治水不自其源末流彌增其廣耳治直之翻陛下仁德寬容多所不忍故閹豎弄權忠臣不進誠使張角梟夷黃巾變服謂其黨歸順去其黃巾而復服時人之服也梟堅堯翻梟夷謂梟斬而誅夷之甫益深耳何者夫邪正之人不宜共國亦猶冰炭不可同器彼知正人之功顯而危亡之兆見皆將巧辭飾説共長虛偽見賢遍翻長知兩翻夫孝子疑於屢至即曾母投杼事見三卷周赧王七年韓子龐共與魏太子質於邯鄲共謂魏王曰今一人言市有虎王信乎王曰否二人言信乎王曰否三人言信乎王曰寡人信矣共曰夫市無虎明矣然三人言誠市有虎今邯鄲去魏遠於市謗臣者過三人願王熟察之忠臣將復有杜郵之戮矣白起事見五卷周赧王五十八年復扶又翻郵音尤速行讒佞之誅則善人思進姦凶自息趙忠見其疏而惡之惡烏路翻燮擊黃巾功多當封忠譖訴之帝識燮言賢曰識記也音志得不加罪竟亦不封六年張曼成屯宛下百餘日宛於元翻六月南陽太守秦頡擊曼成斬之六年交趾土多珍貨前後刺史多無清行行下孟翻財計盈給輒求遷代故吏民怨叛執刺史及合浦太守來達自稱柱天將軍三府選京令東郡賈琮為交趾刺史京縣屬河南尹琮祖宗翻訊其反狀咸言賦斂過重斂力贍翻百姓莫不空單京師遙遠告冤無所民不聊生故聚為盜賊琮即移書告示各使安其資業招撫荒散蠲復徭役蠲吉玄翻復音方目翻除也誅斬渠帥為大害者帥所類翻簡選良吏試守諸縣歲間蕩定百姓以安巷路為之歌曰賈父來晚使我先反今見清平吏不敢飯言吏不敢過民家而飯也飯扶晚翻六年皇甫嵩朱俊乘勝進討汝南陳國黃巾追波才於陽翟擊彭脫於西華姓譜波姓也其先事王莽為波水將軍子孫以為氏陽翟縣屬潁川郡西華縣屬汝南郡賢曰西華故城在今陳州項城縣西又曰在今殷水縣西北餘賊降散降戶江翻三郡悉平嵩乃上言其狀以功歸俊於是進封俊西鄉侯遷鎮賊中郎將此因欲鎮安黃巾餘賊而置官俊討南陽北中郎將盧植連戰破張角斬獲萬餘人角等走保廣宗廣宗縣屬巨鹿郡賢曰今貝州宗城縣造作雲梯垂當拔之垂幾也塹七艷翻或勸植以賂送豐植不肯豐還言於帝曰廣宗賊易破耳易以豉翻盧中郎固壘息軍以待天誅帝怒檻車徵植減死一等遣東中郎將隴西董卓代之盧植先為北中郎將卓為東中郎將四中郎將始於此六年巴郡張修以妖術為人療病為于偽翻其法略與張角同令病家出五斗米號五斗米師秋七月修聚衆反寇郡縣時人謂之米賊考異曰范書靈帝紀有此張修陳壽魏志張魯傳有劉焉司馬張修劉艾典略有漢中張修裴松之以為張修應是張衡非典略之失則傳寫之誤案魯傳云祖父陵父衡皆為五斗米道衡死魯復行之劉焉司馬張修與魯同擊漢中魯襲殺修非其父也今此據范書六年八月皇甫嵩與黃巾戰於蒼亭蒼亭在東郡范縣界帥所類翻董卓攻張角無功抵罪乙巳詔嵩討角六年九月安平王續坐不道誅安帝延光元年改樂成國曰安平以孝王得紹封續得子也初續為黃巾所虜國人贖之得還朝廷議復其國議郎李燮曰續守藩不稱稱尺證翻損辱聖朝不宜復國朝廷不從燮坐謗毀宗室輸作左校校戶教翻未滿歲王坐誅乃復拜議郎京師為之語曰父不肯立帝謂李固不肯立質桓二帝也六年冬十月皇甫嵩與張角弟梁戰於廣宗梁衆精勇嵩不能克寸明日乃閉營休士以觀其變知賊意稍懈懈居隘翻乃潛夜勒兵雞鳴馳赴其陳陳讀曰陳戰至晡時大破之斬梁獲首三萬級赴河死者五萬許人角先已病死剖棺戮尸傳首京師十一月嵩復攻角弟寶於下曲陽斬之下曲陽縣屬巨鹿郡以常山有上曲陽故此稱下復扶又翻即拜嵩為左車騎將軍領冀州牧封槐里侯嵩能溫恤士卒每軍行頓止須營幔修立然後就舍軍士皆食爾乃嘗飯爾如此也六年北地先零羌及枹罕河關㣥盜反河關枹罕二縣皆屬隴西郡零音憐枹音膚北宮以所居為氏左傳有衛大夫北宮文子孟子有北宮黝從才用翻賢曰泠姓也周有泠州鳩音零金城人邊章韓遂素著名西州㣥盜誘而劫之使專任軍政誘音酉任音壬殺金城太守陳懿攻燒州郡初武威太守倚恃權貴恣行貪暴武威太守史失其姓名刺史梁鵠懼欲殺正和以免其負訪於漢陽長史敦煌蓋勳續漢志郡太守置丞一人郡當邊戍者丞為長史敦徒門翻蓋徒盍翻或勸勳因此報之勳曰謀事殺良非忠也乘人之危非仁也乃諫鵠曰夫紲食鷹隼欲其鷙也賢曰紲繫也廣雅曰鷙執也取其能服執衆鳥隼聳尹翻食讀曰飼亨讀作烹將何用哉鵠乃止正和詣勳求謝勳不見曰吾為梁使君謀不為蘇正和也為于偽翻怨之如初後刺史左昌盜軍穀數萬勳諫之昌怒使勳與從事辛曾孔常別屯阿陽以拒賊阿陽縣屬漢陽郡而勳數有戰功數所角翻及北宮伯玉之攻金城也勳勸昌救之昌不從陳懿既死邊章等進圍昌於冀昌召勳等自救辛曾等疑不肯赴勳怒曰昔莊賈後期穰苴奮劍齊景公時燕晉侵齊景公以司馬穰苴為將禦之令寵臣莊賈監軍穰苴與期旦日會賈素驕貴夕時乃至穰苴召軍正問曰軍法期而後者云何對曰當斬遂斬賈以徇于三軍監古銜翻曾等懼而從之勳至冀誚讓章等以背叛之罪誚才笑翻背蒲妹翻皆曰左使君若早從君言以兵臨我庶可自改今罪已重不得降也乃解圍去叛羌圍校尉夏育於畜官前書尹翁歸傳有論罪輸掌畜官音義曰右扶風畜牧所在有苑師之屬故曰畜官畜音許救翻至狐槃晉時秦苻生葬姚弋仲於狐槃載記曰在天水冀縣勳餘衆不及百人身被三創敗補邁翻被皮義翻創初良翻堅坐不動指木表曰尸我於此句就種羌滇吾以兵扞衆曰賢曰句就羌別種句音古侯翻種章勇翻滇音顛蓋長史賢人汝曹殺之者為負天勳仰罵曰死反虜汝何知促來殺我衆相視而驚滇吾下馬與勳勳不肯上上時掌翻遂為羌所執羌服其義勇不敢加害送還漢陽後刺史楊雍表勳領漢陽太守六年張曼成餘黨更以趙弘為帥衆復盛帥所類翻下同復扶又翻下同至十餘萬據宛城朱俊與荊州刺史徐璆等合兵圍之宛於元翻璆渠尤翻自六月至八月不拔有司奏徵俊司空張溫上疏曰昔秦用白起燕任樂毅皆曠年歷載乃能克寸敵史記白起事秦昭王為大良造攻魏破之後五年攻趙拔光狼城後七年攻楚拔鄢鄧五城明年拔郢燒夷陵遂東至竟陵樂毅事燕昭王為上將軍伐齊入臨災徇齊五歲下七十餘城引師南指方略已設臨軍易將將即亮翻兵家所忌宜假日月責其成功帝乃止俊擊弘斬之賊帥韓忠復據宛拒俊俊鳴鼓攻其西南賊悉衆赴之俊自將精卒掩其東北乘城而入忠乃退保小城惶懼乞降將即亮翻降戶江翻並下同諸將皆欲聽之俊曰兵固有形同而勢異者昔秦項之際民無定主故賞附以勸來耳今海內一統唯黃巾造逆納降無以勸善討之足以懲惡今若受之更開逆意賊利則進戰鈍則乞降縱敵長寇長知兩翻非良計也因急攻連戰不克寸俊登土山望之顧謂司馬張超曰吾知之矣賊今外圍周固內營逼急乞降不受欲出不得所以死戰也萬人一心猶不可當況十萬乎不如徹圍並兵入城忠見圍解勢必自出自出則意散破章甲十一行本破上有易字乙十一行本同孔本同張校同之道也既而解圍忠果出戰俊因擊大破之斬首萬餘級南陽太守秦頡殺忠餘衆復奉孫夏為帥還屯宛俊急攻之司馬孫堅率衆先登癸巳拔宛城孫夏走俊追至西鄂精山西鄂縣屬南陽郡賢曰故城在今鄧州向城縣南精山在其南斬萬餘級於是黃巾破散其餘州郡所誅一郡數千人六年十二月己巳赦天下改元六年豫州刺史太原王允破黃巾得張讓賓客書與黃巾交通上之上時掌翻上責怒讓讓叩頭陳謝竟亦不能罪也讓由是以事中允中竹仲翻中傷也遂傳下獄賢曰傳逮也傳株戀翻下遐稼翻還為刺史旬日間復以他罪被捕被皮義翻楊賜不欲使更楚辱賢曰更經也楚苦痛更工衡翻君以張讓之事故一月再徵凶慝難量量音良幸為深計賢曰深計謂令自死好呼到翻共流涕奉藥而進之允厲聲曰吾為人臣獲罪於君當伏大辟以謝天下辟毗亦翻豈有乳藥求死乎前書王嘉傳何謂咀藥而死乳當作咀出就檻車既至章甲十一行本至下有廷尉二字乙十一行本同孔本同張校同退齋校同大將軍進與楊賜袁隗共上疏請之得減死論考異曰允傳云太尉袁隗司徒楊賜按隗賜時皆不為此官恐誤二年二年春正月大疫二年二月己酉南宮雲臺災庚戌樂城門災據續漢志蓋樂成殿門也城當作成五行志作樂城門劉昭曰南宮中門也中常侍張讓趙忠説帝斂天下田畝十錢説輸芮翻斂力贍翻畝古畝字以修宮室鑄銅人樂安太守陸康上疏諫曰昔魯宣稅畝而蝝災自生公羊傳曰初稅畝者何履畝而稅也何休注云宣公無恩信於人人不肯盡力於公田起履踐案行其畝穀好者稅取之蝝螽子也傳曰冬蝝生此其言蝝生何上變古易常也注云上公上謂宣公變易公田舊制而稅畝也蝝余專翻左傳季孫欲以田賦使冉有訪諸仲尼仲尼私於冉有曰子季孫若欲行而法則周公之典在若欲苟而行又何訪焉捐捨聖戒自蹈亡王之法哉內幸譖康援引亡國以譬聖明援于元翻大不敬檻車徵詣廷尉侍御史劉岱表陳解釋得免歸田里康續之孫也陸續事見四十五卷明帝永平十四年又詔發州郡材木文石部送京師黃門常侍輒令譴呵不中者因強折賤買僅得本賈十分之一中竹仲翻賈讀曰價因復貨之宦官張宦官作中者復不為即受材木遂至腐積宮室連年不成刺史太守復增私調復扶又翻調徒弔翻百姓呼嗟又令西園騶分道督趣騶側尤翻趣讀曰促恐動州郡多受賕賂刺史二千石及茂才孝廉遷除皆責助軍修宮錢大郡至二三千萬餘各有差當之官者皆先至西園諧價然後得去賢曰諧謂平定其價也皆迫遣之時巨鹿太守河內司馬直新除以有清名減責三百萬直被詔悵然曰為民父母而反割剝百姓以稱時求被皮義翻稱尺證翻吾不忍也辭疾不聽行至孟津上書極陳當世之失即吞藥自殺書奏帝為暫絶修宮錢為于偽翻二年以朱俊為右車騎將軍二年自張角之亂所在盜賊並起博陵張牛角常山褚飛燕及黃龍左校于氐根張白騎劉石左髭文八張文作丈平漢大計司隸緣城雷公浮雲白雀楊鳳于毒五鹿李大目白繞眭固苦蝤之徒不可勝數朱俊傳曰輕便者言飛燕于氐根賢注曰左傳曰于思于思杜預云于思多須之貌騎白馬者為張白騎大聲者稱雷公大眼者為大目左髭文八作左髭丈八校戶教翻騎奇寄翻眭息隨翻蝤才由翻勝音升小者六七千人張牛角褚飛燕合軍攻癭陶癭於郢翻牛角中流矢中竹仲翻且死令其衆奉飛燕為帥帥所類翻改姓張飛燕名燕輕勇趫捷故軍中號曰飛燕趫丘妖翻山谷寇賊多附之部衆寖廣殆至百萬號黑山賊杜佑曰衛州衛縣漢朝歌縣也紂都朝歌在今縣西縣西北有黑山被皮義翻朝廷不能討燕乃遣使至京師奏書乞降降戶江翻遂拜燕平難中郎將難乃旦翻使領河北諸山谷事歲得舉孝廉計吏二年司徒袁隗免隗五罪翻三月以廷尉崔烈為司徒烈實之從兄也崔實作政論從才用翻是時三公往往因常侍阿保入錢西園而得之賢曰阿保謂傅母也余謂阿母保母也熲古迥翻然皆先輸貨財乃登公位烈因傅母入錢五百萬故得為司徒及拜日天子臨軒百僚畢會帝顧謂親幸者曰悔不少靳可至千萬賢曰靳固之也居焮翻崔公冀州名士豈肯買官賴我得是反不知姝邪賢曰姝美也言反不知斯事之美也姝春朱翻二年北宮伯玉等寇三輔詔左車騎將軍皇甫嵩鎮長安以討之時涼州兵亂不止徵發天下役賦無已崔烈以為宜棄涼州詔會公卿百官議之議郎傅燮厲言曰斬司徒天下乃安尚書奏燮廷辱大臣帝以問燮對曰樊噲以冒頓悖逆憤激思奮未失人臣之節季布猶曰噲可斬也事見十二卷惠帝三年國家藩衛高祖初興使酈商別定隴右高祖以將軍酈商為隴西都尉別定北地郡列置四郡武帝元狩二年胸奴渾邪王降太初元年置酒泉張掖郡四年以休屠王地為武威郡後元年分酒泉郡置敦煌郡斷丁管翻今牧御失和使一州叛逆烈為宰相不念為國思所以弭之之策為于偽翻乃欲割棄一方萬里之土臣竊惑之若使左袵之虜得居此地説文曰袵衣襟夷狄之人左袵因以為亂此天下之至慮社稷之深憂也若烈不知是極蔽也知而故言是不忠也帝善而從之二年夏四月庚戌大雨雹雨于具翻二年五月太尉鄧盛罷以太僕河南張延為太尉二年六月以討張角功封中常侍張讓等十二人為列侯二年秋七月三輔螟説文曰螟蟲食穀葉者二年皇甫嵩之討張角也過鄴見中常侍趙忠舍宅踰制奏沒入之又中常侍張讓私求錢五千萬嵩不與二人由是奏嵩連戰無功所費者多徵嵩還收左車騎將軍印綬削戶六千綬音受八月以司空張溫為車騎將軍執金吾袁滂為副以討北宮伯玉拜中郎將董卓為破虜將軍與蕩寇將軍周慎並統於溫二年九月以特進楊賜為司空冬十月庚寅臨晉文烈侯楊賜薨以光祿大夫許相為司空相訓之子也建寧二年許訓為司徒二年諫議大夫劉陶上言天下前遇張角之亂後遭邊章之寇今西羌逆類已攻河東恐遂轉盛豕突上京河東東南至雒陽五百里耳而無一前鬬生之計西寇浸前車騎孤危車騎謂張溫也其敗不救臣自知言數見厭數所角翻而言不自裁者以為國安則臣蒙其慶國危則臣亦先亡也謹復陳當今要急八事復扶又翻大較言天下大亂皆由宦官宦官共讒陶曰前張角事發詔書示以威恩自此以來各各改悔今者四方安靜而陶疾害聖政專言妖孽妖於驕翻孽魚列翻州郡不上上時掌翻陶何緣知疑陶與賊通情於是收陶下黃門北寺獄掠按日急下遐稼翻掠音亮陶謂使者曰臣恨不與伊呂同疇而以三仁為輩孔子曰殷有三仁焉微子去之箕子為之奴比干諫而死下有憔悴之民悴秦醉翻亦在不久後悔何及遂閉氣而死前司徒陳耽為人忠正宦官怨之亦誣陷死獄中二年張溫將諸郡兵步騎十餘萬屯美陽美陽縣屬扶風賢曰在今雍州武功縣北杜佑曰美陽本前漢頻陽縣溫與戰輒不利十一月董卓與右扶風鮑鴻等並兵攻章遂大破之章遂走榆中榆中縣屬金城郡賢曰故城在今蘭州金城縣東杜佑曰蘭州治五泉縣漢榆中故城在今縣東溫遣周慎將三萬人追之參軍事孫堅説慎曰賊城中無穀當外轉糧食堅願得萬人斷其運道參軍事之官始見於此杜佑曰漢靈帝時陶謙幽州刺史參司空車騎將軍張溫軍事時孫堅亦為參軍晉時軍府乃置為官員説輸芮翻斷丁管翻下同賊必困乏而不敢戰走入羌中並力討之則涼州可定也慎不從引軍圍榆中城而章遂分屯葵園峽反斷慎運道慎懼棄車重而退重直用翻溫又使董卓將兵三萬討先零羌零音憐羌胡圍卓於望垣北望垣縣屬漢陽郡陳壽三國志曰望垣峽名乃於所渡水中立章甲十一行本立上有偽字乙十一行本同以捕魚而潛從下過軍賢曰續漢書字作堰其字義則同但異體耳比必寐翻決水已深不得渡遂還屯扶風張溫以詔書召卓卓良久乃詣溫溫責讓卓卓應對不順孫堅前耳語謂溫曰耳語附耳而語也卓不怖罪怖普布翻而鴟張大語宜以召不時至陳軍法斬之溫曰卓素著威名於河隴之間今日殺之西行無依堅曰明公親率王師威震天下何賴於卓觀卓所言不假明公輕上無禮一罪也章遂跋扈經年當以時進討而卓云未可沮軍疑衆二罪也沮在呂翻卓受任無功應召稽留而軒昂自高三罪也古之名將仗鉞臨衆未有不斷斬以成功者也今明公垂意於卓垂意猶言降意也斷丁亂翻虧損威刑於是在矣溫不忍發乃曰君且還卓將疑人堅遂出二年是歲帝造萬金堂於西園引司農金錢繒帛牣積堂中賢曰牣滿也復扶又翻又於河間買田宅起第觀帝故封河間解瀆亭侯觀古玩翻三年三年春二月江夏兵趙慈反夏戶雅翻殺南陽太守秦頡三年庚戌赦天下三年太尉張延罷遣使者持節就長安拜張溫為太尉三公在外始於溫三年以中常侍趙忠為車騎將軍帝使忠論討黃巾之功執金吾甄舉謂忠曰甄之人翻傅南容前在東軍有功不侯傅燮字南容不侯事見上年今將軍親當重任宜進賢理屈以副衆心忠納其言遣弟城門校尉延致殷勤於傅燮延謂燮曰南容少答我常侍少詩沼翻萬戶侯不足得也燮正色拒之曰有功不論命也傅燮豈求私賞哉忠愈懷恨然憚其名不敢害出為漢陽太守考異曰袁紀在明年九月今從范書三年帝使鉤盾令宋典修南宮玉堂南宮有玉堂殿又鑄四鐘皆受二千斛賢曰銅人列於倉龍玄武闕外鐘懸於雲臺及玉堂殿前轉水入宮賢曰天祿獸也按今鄧州南陽縣北有宗資碑旁有兩石獸鐫其膊一曰天祿一曰辟邪此即天祿辟邪並獸名也漢有天祿閣亦因獸以立名施於橋西用灑南北郊路賢曰翻車設機車以引水渴烏為曲桶以氣引水上也車尺遮翻以為可省百姓灑道之費三年五月壬辰晦日有食之三年六月荊州刺史王敏討趙慈斬之三年車騎將軍趙忠罷三年冬十月武陵蠻反郡兵討破之三年前太尉張延為宦官所譖下獄死三年十二月鮮卑寇幽並二州三年徵張溫還京師四年四年春正月己卯赦天下四年二月滎陽賊殺中牟令中牟縣屬河南尹賢曰今鄭州縣河南尹何苗討滎陽賊破之拜苗為車騎將軍四年韓遂殺邊章及北宮伯玉李文侯擁兵十餘萬進圍隴西太守李相如叛與遂連和涼州刺史耿鄙率六郡兵討遂鄙任治中程球百官志州刺史置從事史員職略與司隸同無都官從事其功曹從事為治中從事主州選署及衆事士民怨之漢陽太守傅燮謂鄙曰使君統政日淺民未知教賊聞大軍將至必萬人一心邊兵多勇其鋒難當而新合之衆上下未和萬一內變雖悔無及不若息軍養德明賞必罰賊得寬挺賢曰挺解也又緩也㣥惡爭勢其離可必然後率已教之民討成離之賊其功可坐而待也鄙不從夏四月鄙行至狄道州別駕反應賊別駕從事刺史行部則奉引録衆事次害鄙賊遂進圍漢陽城中兵少糧盡燮猶固守時北地胡騎數千隨賊攻郡皆夙懷燮恩共於城外叩頭求送燮歸鄉里傅燮北地靈州人年十三言於燮曰國家昏亂遂令大人不容於朝朝直遙翻今兵不足以自守宜聽羌胡之請還鄉里徐俟有道而輔之言未終燮慨然歎曰汝知吾必死邪聖達節次守節左傳曹公子臧曰聖達節次守節下失節伯夷不食周粟而死吾遭世亂不能養浩然之志食祿又欲避其難乎難乃旦翻吾行何之必死於此汝有才智勉之勉之主簿楊會吾之程嬰也史記趙朔娶晉成公姊為夫人晉景公三年屠岸賈殺趙朔滅其族朔妻有遺腹走公宮朔客公孫杵臼謂客程嬰曰胡不死嬰曰朔之婦有遺腹即幸而生男吾奉之即女也吾徐死耳居無何朔妻生男屠岸賈聞之乃索於公宮朔妻置兒於褲中祝曰趙宗滅乎若啼即不滅若無聲及索兒竟無聲程嬰曰今一索不得後必復索之杵臼乃取他嬰兒負之匿山中諸將攻殺杵臼並兒然趙孤兒乃在程嬰所即趙武也居十五年景公乃立趙武為卿而復其田邑狄道人王國使故酒泉太守黃衍説燮曰天下已非復漢有府君寧有意為吾屬帥乎帥所類翻燮按劍叱衍曰若剖符之臣反為賊説邪遂麾左右進兵臨陳戰歿説輸芮翻為于偽翻陳讀曰陳考異曰袁紀在明年五月今從范書耿鄙司馬扶風馬騰亦擁兵反與韓遂合共推王國為主寇掠三輔四年太尉張溫以寇賊未平免以司徒崔烈為太尉五月以司空許相為司徒光祿勳沛國丁宮為司空四年初張溫發幽州烏桓突騎三千以討涼州故中山相漁陽張純請將之溫不聽而使涿令遼西公孫瓚將之涿郡治涿縣瓚藏旱翻烏桓以牢稟逋縣縣讀曰懸牢價直也稟給也賢曰前書音義牢廩食也古者名廩為牢多叛還本國張純忿不得將將即亮翻乃與同郡故泰山太守張舉及烏桓大人丘力居等連盟劫略薊中薊音計殺護烏桓校尉公綦稠公綦復姓衆至十餘萬屯肥如肥如縣屬遼西郡應劭曰肥子奔燕燕封於此賢曰故城今平州純稱彌天將軍安定王移書州郡云舉當代漢告天子避位敕公卿奉迎四年冬十月長沙賊區星自稱將軍區烏侯翻姓也又如字考異曰范書作觀鵠今從陳壽吳志衆萬餘人詔以議郎孫堅為長沙太守討擊平之封堅烏程侯烏程縣屬吳郡為堅以長沙兵討董卓張本四年十一月太尉崔烈罷以大司農曹嵩為太尉四年十二月屠各胡反屠各胡即胸奴也屠直於翻四年是歲賣關內侯直五百萬錢四年前太丘長陳實卒長知兩翻海內赴弔者三萬餘人實在鄉閭平心率物其有爭訟輒求判正判分也剖也剖析而見正理也退無怨者至乃歎曰寧為刑罰所加不為陳君所短楊賜陳耽每拜公卿㣥僚畢賀輒歎實大位未登愧於先之先悉薦翻容肇祖標點王崇武聶崇岐覆校
