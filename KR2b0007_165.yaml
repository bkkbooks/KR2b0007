body:
  text: 資治通鑑卷第一百六十五端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注梁紀二十一上甚懼世祖孝元皇帝下承聖二年癸酉五五三上甚懼春正月王僧辨發建康承制使陳霸先代鎮揚州使陳霸先自京口代鎮揚州上甚懼丙子山胡圍齊離石戊寅齊主討之未至胡已走因巡三堆魏收地形志永安郡平寇縣魏真君七年併三堆屬焉隋鴈門郡崞縣有平寇縣上甚懼以吏部尚書王褒為左僕射上甚懼己丑齊改鑄錢文曰常平五銖五代志齊文宣除魏永安五銖改鑄常平五銖重如其文其錢甚貴且制造甚精上甚懼二月庚子李洪雅力屈以空雲城降陸納去年吳藏攻李洪雅降戶江翻下同殺丁道貴納以沙門寶志詩讖有十八子以為李氏當王天監中寶志為讖云太歲龍將無理蕭經霜草應死餘人散十八子時言蕭氏當滅李氏代興讖楚讚翻甲辰推洪雅為主號大將軍使乘平肩輿列鼓吹納帥衆數千左右翼從吹尺瑞翻帥讀曰率下同從才用翻上甚懼魏太師泰去丞相大行臺去羌呂翻為都督中外諸軍事上甚懼王雄至東梁州黃衆寶帥衆降黃衆寶反見上卷上年遷其豪帥於雍州帥所類翻雍於用翻上甚懼齊主送柔然可汗鐵伐之父登注及兄庫提還其國登注等奔齊見上卷上年可從刊入聲汗音寒契欺訖翻又音喫國人立登注為可汗登注復為其大人阿富提所殺復扶又翻國人立庫提上甚懼突厥伊利可汗卒子科羅立號乙息記可汗厥君勿翻考異曰顏師古隋書突厥傳云弟逸可汗立今從周書及北史三月遣使獻馬五萬于魏使疏吏翻柔然別部又立阿那王褱叔父鄧叔子為可汗考異曰魏書北史蠕蠕傳皆云立鐵伐為可汗突厥傳皆云立鄧叔子為可汗蓋諸部分散各有所立也乙息記卒捨其子攝圖而立其弟俟斤號木杆可汗俟渠之翻杆公旦翻為後他鉢卒攝圖爭國張本考異曰周書作木汗隋書作俟斗木杆今從北史木杆狀貌奇異性剛勇多智略善用兵鄰國畏之上甚懼上聞武陵王紀東下使方士畫版為紀像畫與一同釘丁定翻厭於叶翻又執侯景之俘以報紀初紀之舉兵皆太子圓照之謀也圓照時鎮巴東巴東信州啓紀云侯景未平宜急進討已聞荊鎮為景所破紀信之趣兵東下使疏吏翻趣讀曰促上甚懼與魏書曰子糾親也請君討之左傳齊無知弒其君雍廩殺無知公子小白自莒入于齊魯莊公伐齊納子糾魯師敗績齊鮑叔帥師來言曰子糾親也請君討之乃殺子糾取蜀制梁在茲一舉諸將咸難之咸以為難也泰之甥也迥傳其先魏之別種號尉遲部因氏焉尉紆勿翻泰問以方略迥曰蜀與中國隔絶百有餘年恃其險章十二行本險下有遠字乙十一行本同孔本同張校同不虞我至若以鐵騎兼行襲之無不克矣騎奇寄翻下同泰乃遣迥督開府儀同三司原珍等六軍甲士萬二千騎萬匹自散關伐蜀考異曰典略在正月戊辰今從周紀上甚懼陸納遣其將吳藏潘烏黑李賢明等下據車輪將即亮翻下同按下文陸納夾岸為城甲子王僧辨攻拔之乙丑進圍長沙則車輪之地蓋據湘江之要去長沙不遠也考異曰梁紀云二月丙子按長曆二月無丙子梁紀誤王僧辨至巴陵考異曰典略云三月辛酉按長曆是月癸亥朔是月癸亥朔無辛酉典略誤考異曰僧辨傳云與陳霸先讓都督今從典略上乃以僧辨循為東西都督夏四月丙申僧辨軍于車輪考異曰典略作甲子非也今從梁紀上甚懼吐谷渾可汗夸呂雖通使於魏而寇抄不息吐從暾入聲谷音浴使疏吏翻下同抄楚交翻至姑臧討之夸呂懼請服既而復通使於齊涼州刺史史寧覘知其還襲之於赤泉唐志涼州姑臧縣有赤水軍本赤烏鎮有赤烏泉因名幅員五千一百八十里軍之最大者也復扶又翻覘丑鹽翻又丑豔翻嚴狀改拔上甚懼陸納夾岸為城以拒王僧辨納士卒皆百戰之餘僧辨憚之不敢輕進稍作連城以逼之納以僧辨為怯不設備五月甲子僧辨命諸軍水陸齊進急攻之僧辨親執旗鼓宜豐侯循親受矢石拔其二城納衆大敗步走保長沙乙丑僧辨進圍之僧辨坐壟上視築圍壘吳藏李賢明帥鋭卒千人開門突出蒙楯直進趨僧辨帥讀曰率楯食尹翻趨七喻翻時杜崱杜龕並侍左右甲士衛者止百餘人力戰拒之崱士力翻龕苦含翻僧辨據胡牀不動裴之橫從旁擊藏等藏等敗退賢明死李賢明本侯景將也景敗歸王琳上甚懼武陵王紀至巴郡聞有魏兵遣前梁州刺史巴西譙淹還軍救蜀初楊乾運求為梁州刺史紀以為潼州刺史章十二行本無刺史二字乙十一行本同張校同云無注本亦無五代志金山郡西魏置潼州蓋梁已置此州也治涪城楊法琛求為黎州刺史以為沙州蓋即以平興為沙州也潼音同琛丑林翻乾運兄子略說乾運曰今侯景初平宜同心戮力說式芮翻戮音留又音六並力也而兄弟尋戈左傳子産曰昔高辛氏有二子伯曰閼伯季曰實沈不相能也日尋干戈以相征討夫木朽不雕論語孔子曰朽木不可雕也不如送款關中可以功名兩全乾運然之令略將二千人鎮劍閣又遣其壻樂廣鎮安州五代志普安郡梁置南安州後改為安州普安舊曰南安西魏改普安將即亮翻魏太師泰密賜乾運鐵券授驃騎大將軍開府儀同三司梁州刺史西魏之官驃騎大將軍開府儀同三司位次柱國大將軍驃匹妙翻侯呂陵虜三字姓略退就樂廣翻城應始始入據安州甲戌迥至涪水涪水自龍州入潼州界潼州治涪其城西臨涪水涪音浮降戶江翻迥分軍守之進襲成都時成都見兵不滿萬人見賢遍翻倉庫空竭永豐侯撝嬰城自守迥圍之譙淹遣江州刺史景欣幽州刺史趙拔扈援成都五代志隆山郡隆山縣舊曰犍為縣置江州武陵王紀至巴東聞侯景已平乃自悔召太子圓照責之對曰侯景雖平江陵未服紀亦以既稱尊號紀稱尊號見上卷上年復扶又翻下上復復送乃復無復同欲遂東進將卒日夜思歸其江州刺史王開業以為宜還救根本更思後圖諸將皆以為然將即亮翻圓照及劉孝勝固言不可紀從之宣言於衆曰敢諫者死己丑紀至西陵軍勢甚盛舳艫翳川舳音逐艫音盧翳蔽也護軍陸法和築二城於峽口兩岸運石填江鐵鎖斷之斷音短帝拔任約於獄以為晉安王司馬帝封子方智為晉安王任音壬赤亭之戰法和活約是有舊恩故使助之汝罪不容誅我不殺本為今日因撤禁兵以配之仍許妻以廬陵王續之女使宣猛將軍劉棻與之俱為于僞翻妻七細翻棻符分翻上甚懼庚辰巴州刺史余孝頃將兵萬人會王僧辨於長沙將即亮翻下同上甚懼豫章太守觀寧侯永昏而少斷少詩沼翻斷丁亂翻左右武蠻奴用事軍主文重疾之永將兵討陸納至宮亭湖重殺蠻奴永軍潰奔江陵重將其衆奔開建侯蕃蕃殺之而有其衆開建侯蕃時鎮鄱陽沈約曰宋文帝分臨賀郡之封陽縣立開建縣上甚懼六月壬辰武陵王紀築連城攻絶鐵鎖陸法和告急相繼上復拔謝答仁於獄去年侯景敗得謝答仁不殺而囚之梁東宮有步兵等三校尉校戶教翻又遣使送王琳令說諭陸納使疏吏翻說式芮翻乙未琳至長沙僧辨使送示之納衆悉拜且泣使謂僧辨曰朝廷若赦王郎乞聽入城僧辨不許復送江陵陸法和求救不已上欲召長沙兵恐失陸納乃復遣琳許其入城琳既入納遂降湘州平降戶江翻考異曰梁紀乙酉湘州平按長曆是月無乙酉梁紀誤上復琳官爵使將兵西援峽口將即亮翻上甚懼甲辰齊章武景王庫狄干卒上甚懼武陵王紀遣將軍侯睿將衆七千築壘與陸法和相拒上遣使與紀書許其還蜀專制一方紀不從報書如家人禮不肯定君臣之分而用兄弟之禮使疏吏翻下同湘州諸軍相繼西上上時掌翻上復與紀書曰吾年為一日之長屬有平亂之功膺此樂推事歸當璧長陟丈翻屬之欲翻樂音洛左傳楚共王無冢適有寵子五人無適立焉乃大有事於㣥望而祈曰請神擇於五人者使主社稷乃遍以璧見于㣥望曰當璧而拜者神所立也既乃密埋璧於大室之庭使五人者齊而長入拜康王跨之靈王肘加焉子千子皙皆遠之平王弱抱以入再拜皆厭紐後平王卒有楚國儻遣使乎良所遲也遲直利翻待也如曰不然於此投筆友于兄弟分形共氣兄肥弟瘦無復相見之期讓棗推梨永罷歡愈之日漢孔融兄弟七人融第六四歲時與諸兄共食梨棗輒引小者人問其故答曰我小兒法當取小者人皆異之推吐雷翻書不盡言言兄弟之愛存之於心非書翰之間所能盡言也頻戰不利又聞魏寇深入成都孤危憂悶不知所為悶音悶又音滿乃遣其度支尚書樂奉業詣江陵求和請依前旨還蜀度徒洛翻奉業知紀必敗啓上曰蜀軍乏糧士卒多死危亡可待上遂不許其和史言上兄弟皆阻兵而安忍紀以黃金一斤為餅餅百為篋至有百篋銀五倍於金錦罽繒綵稱是每戰懸示將士不以為賞罽音計繒慈陵翻稱尺證翻將即亮翻下同寧州刺史陳智祖請散之以募勇士弗聽智祖哭而死有請事者紀稱疾不見由是將卒解體秋七月辛未巴東民苻升等斬峽口城主公孫晃降於王琳將即亮翻降戶江翻考異曰典略作丙戌今從梁書謝答仁任約進攻侯睿破之拔其三壘於是兩岸十四城俱降紀不獲退諸城已降江陵兵斷道故不獲退遊擊將軍章十二行本軍下有南陽二字乙十一行本同孔本同退齊校同樊猛追擊之紀衆大潰赴水死者八千餘人猛圍而守之上密敕猛曰生還不成功也猛引兵至紀所紀在舟中繞牀而走以金囊擲猛曰以此雇卿送我一見七官猛曰天子何由可見殺足下金將安之之往也陸法和收太子圓照兄弟三人送江陵上絶紀屬籍賜姓叨餮氏叨他刀翻餮他結翻貪財為叨貪食為餮以帝鴻氏不才子比紀也下劉孝勝獄已而釋之紀之稱帝舉兵劉孝勝實鼓成之此而不誅亦失刑也下遐嫁翻西軍已敗汝父不知存亡意欲使其自裁圓正見囚見上卷簡文帝大寶二年稱世子不絶聲咎圓照之誤紀也號戶刀翻知不能死移送廷尉獄見圓照曰兄何乃亂人骨肉使痛酷如此圓照唯云計誤上並命絶食於獄至齧臂啖之十三日而死遠近聞而悲之覘丑廉翻又丑豔翻齧魚結翻啖徒敢翻又徒濫翻乙未王僧辨還江陵詔諸軍各還所鎮上甚懼魏尉遲迥圍成都五旬永豐侯撝屢出戰皆敗乃請降諸將欲不許迥曰降之則將士全遠人悅攻之則將士傷遠人懼遂受之八月戊戌撝與宜都王圓肅帥文武詣軍門降撝許韋翻降戶江翻將即亮翻帥讀曰率迥以禮接之與盟於益州城北吏民皆復其業唯收奴婢及儲積以賞將士軍無私焉史言尉遲迥能凝蜀人之心以迥為大都督益潼等十二州諸軍事益州刺史上甚懼庚子下詔將還建康領軍將軍胡僧祐太府卿黃羅漢吏部尚書宗懍懍力荏翻又巨禁翻御史中丞劉瑴瑴訖嶽翻諫曰建業王氣已盡與虜正隔一江若有不虞悔無及也建業與齊止隔一江固也獨不思江陵介在江北逼近襄陽嶽陽有復讎之志宇文有啓疆之思乎當出天子今枝江生洲百數已滿盛弘之荊州記曰自枝江縣西至上明東及江津其中有九十九洲楚諺云洲不百故不出王者是其應也上令朝臣議之朝直遙翻黃門侍郎周弘正尚書右僕射王褒曰今百姓未見輿駕入建康謂是列國諸王願陛下從四海之望時㣥臣多荊州人皆曰弘正等東人也周顗王導自南渡以來世居建康故謂為東人恐非良計弘正面折之曰折之舌翻東人勸東謂非良計西章十二行本西上有君等二字乙十一行本同人欲西豈成長策上笑又議於後堂會者五百人上問之曰吾欲還建康諸卿以為如何衆莫敢先對上曰勸吾去者左袒左袒者過半武昌太守朱買臣言於上曰建康舊都山陵所在梁氏自簡文以上葬建康武帝以上葬晉陵守式又翻非王者之宅荊州被邊自晉以來為重鎮以致後悔臣家在荊州豈不願陛下居此但恐是臣富貴非陛下富貴耳上使術士杜景豪卜之不吉對上曰未去退而言曰此兆為鬼賊所留也上以建康雕殘江陵全盛意亦安之卒從僧祐等議史言上懷居違卜以成亡國之禍卒子恤翻上甚懼以湘州刺史王琳為衡州刺史上甚懼九月庚午詔王僧辨還鎮建康陳霸先復還京口復扶又翻丙子以護軍將軍陸法和為郢州刺史法和為政不用刑獄專以沙門法及西域幻術幻胡辦翻教化部曲數千人通謂之弟子上甚懼契丹寇齊邊契欺訖翻壬午齊主北巡冀定幽安冀定幽安四州名上甚懼齊主使郭元建治水軍二萬餘人於合肥治直之翻將襲建康納湘潭侯退退北奔見一百六十二卷武帝太清二年步大汗虜三字姓汗音寒薩桑葛翻考異曰梁書作邢杲遠步六汗薩今從北齊書北史白上上詔王僧辨鎮姑孰以禦之上甚懼冬十月丁酉齊主至平州從西道趣長塹曹操征烏桓出盧龍塞塹山堙谷五百餘里後人因謂之長塹趣七喻翻塹七豔翻辛丑至白狼城壬寅至昌黎城使安德王韓軌帥精騎四千東斷契丹走路魏收地形志營州統內建德郡治白狼城中興初分樂陵置安德郡治般縣帥讀曰率騎奇寄翻癸卯至陽師水唐志貞觀三年以契丹室韋部落置師州及陽師縣於營州之廢陽師鎮即此掩襲契丹齊主露髻肉袒晝夜不息行千餘里踰越山嶺為士卒先唯食肉飲水壯氣彌厲甲辰與契丹遇奮擊大破之虜獲十餘萬口雜畜數百萬頭畜許救翻潘相樂又於青山破契丹別部丁未齊主還至營州上甚懼己酉王僧辨至姑孰遣婺州刺史侯瑱東陽郡梁置婺州瑱他甸翻又音鎮以待齊師上甚懼丁巳齊主登碣石山臨滄海遂如晉陽以肆州刺史斛律金為太師乃章十二行本乃作召乙十一行本同孔本同還晉陽拜其子豐樂為武衛大將軍樂音洛命其孫武都尚義寧公主寵待之厚㣥臣莫及金子羡字豐樂武都光之子也樂音洛上甚懼閏月丁丑南豫州刺史侯瑱南豫州時治姑孰瑱他甸翻又音鎮齊師大敗溺死者萬計溺奴狄翻湘潭侯退復歸于鄴復扶又翻王僧辨還建康上甚懼吳州刺史開建侯蕃恃其兵強貢獻不入五代志鄱陽郡梁置吳州將即亮翻佛受使其徒詐為訟者詣蕃遂執之上以佛受為建安太守以侍中王質為吳州刺史質至鄱陽佛受置之金城自據羅城掌門管左傳秦子曰鄭人使我掌北門之管杜預注曰管籥也治直之翻艦戶黯翻質不敢與爭故開建侯部曲數千人攻佛受佛受奔南豫州侯瑱殺之質始得行州事上甚懼十一月戊戌以尚書右僕射王褒為左僕射湘東太守張綰為右僕射上甚懼己未突厥復攻柔然柔然舉國奔齊復扶又翻上甚懼癸亥齊主自晉陽北擊突厥迎納柔然廢其可汗庫提立阿那王褱子菴羅辰為可汗置之馬邑川給其廩餼繒帛餼許氣翻繒慈陵翻親追突厥於朔州突厥請降降戶江翻下同許之而還還從宣翻又如字自是貢獻相繼上甚懼魏尚書元烈謀殺宇文泰事泄泰殺之宇文泰於此獨不書其官因舊史成文也上甚懼丙寅上使侍中王琛使於魏琛丑林翻使疏吏翻太師泰陰有圖江陵之志梁王察聞之益重其貢獻梁王察欲倚魏以報河東王譽之讎通鑑至此復書梁王察上甚懼十二月齊宿預民東方白額以城降江西州郡皆起兵應之江淮之民苦於齊之虐政欲相率而歸江南三年甲戌五五四春正月癸巳齊主自離石道討山胡遣斛律金從顯州道魏收地形志永安中置顯州治汾州六壁城蓋在隋西河郡界大破之男子十三以上皆斬考異曰北史作十二以上今從典略遂平石樓石樓絶險自魏世所不能至水經河水東徑蒲川石樓山南又南徑蒲城東蓋其地在蒲子縣西五代志汾州樓山縣有北石樓山又有石樓縣舊置吐京郡宋白曰石樓縣本漢土軍縣後魏置吐京郡蓋胡俗譯言音訛變故曰吐京也隋改縣曰石樓攝之涉翻有都督戰傷其什長路暉禮不能救帝命刳其五藏什長十人之長也五藏心肺肝膽腎長陟丈翻藏徂浪翻肉及穢惡皆盡自是始為威虐陳霸先自丹徒濟江圍齊廣陵秦州刺史嚴超達自秦郡進圍涇州五代志江都郡永福縣舊曰沛梁置涇州領涇城東陽二郡陳廢涇州併二郡為沛郡後周改沛郡為石梁縣唐併石梁縣入六合北史梁涇州在石梁杜佑曰揚州天長縣梁於石梁置涇州為之聲援辛丑使晉陵太守杜僧明帥三千人助東方白額帥讀曰率魏太師泰始作九命之典以敍內外官爵改流外品為九秩五代志曰泰命尚書盧辨遠師周之建職置三公三孤以為論道之官次置六卿以分司庶務其內命謂王朝之臣三公九命三孤八命六卿七命上大夫六命中大夫五命下大夫四命上士三命中士再命下士一命外命謂諸侯及其臣諸公九命諸侯八命諸伯七命諸子六命諸男五命諸公之孤卿四命侯之孤卿公之大夫三命子男之孤卿侯伯之大夫公之上士再命公之中士侯伯之上士一命公之下士侯伯之中士下士子男之士不命其制祿秩下士一百二十五石中士以上至於上大夫各倍之上大夫是為四千石卿二分孤三分公四分各益其一公因盈數為一萬石其九秩一百二十石八秩至於七秩每二秩六分而下各去其一二秩俱為四十石凡頒祿視其年之上下畝至四釜為上年上年頒其正三釜為中年中年頒其半二釜為下年下年頒其一無年為凶荒不頒祿盧辨傳曰柱國大將軍建德四年增置上柱國上將軍也正九命驃騎大將軍開府儀同三司建德四年改為開府儀同大將軍仍增上將軍將軍二字衍開府儀同