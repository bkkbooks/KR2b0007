恆州恆戶登翻柔然散走帝以二千餘騎為殿殿丁練翻宿黃瓜堆柔然別部數萬騎奄至帝安臥平明乃起神色自若指畫形勢縱兵奮擊柔然披靡披普彼翻因潰圍而出柔然走追擊之伏尸二十餘里獲菴羅辰妻子虜三萬餘口令都督善無高阿那肱帥騎數千塞其走路時柔然軍猶盛阿那肱以兵少請益帥讀曰率塞悉則翻少詩沼翻帝更減其半阿那肱奮擊大破之菴羅辰超越巖谷僅以身免同一高阿那肱也齊文宣用之則致死以破敵後主用之則賣主以求生蓋厲威猶可使之知懼濫恩不足以得其死力也塞悉則翻丙寅上使散騎常侍庾信等聘於魏散悉亶翻騎奇寄翻癸酉以陳霸先為司空丁未齊主復自擊柔然大破之復扶又翻庚戌魏太師泰鴆殺廢帝五月魏直州人樂熾洋州人黃國等作亂五代志西城郡安康縣齊置安康郡魏置東梁州西魏改曰直州漢川郡西鄉縣舊曰豐寧置洋州及洋川郡考漢川志蜀分漢成固縣立南鄉縣晉改為西鄉縣魏廢縣仍於豐寧戍置豐寧縣不克若人者翻太師泰命車騎大將軍李遷哲與敦共討熾等平之仍與敦南出徇地至巴州後漢分宕渠北界置漢昌縣蜀先主置巴西郡宋武帝置歸化郡魏於漢昌縣治置大谷郡又於郡北置巴州五代志清化郡化成縣梁置歸化郡及巴州考異曰典略云斬梁巴州刺史牟安平今從周書北史春秋巴子之國三巴郡地是也春秋百濮之地在西城上庸之間濮博木翻酋慈秋翻遷哲擊之五子王遁去遷哲追擊破之泰以遷哲為信州刺史鎮白帝信州先無儲蓄遷哲與軍士共采葛根為糧時有異味輒分嘗之軍士感悅屢擊叛蠻破之㣥蠻懾服皆送糧餼遣子弟入質懾之涉翻餼許氣翻質音致由是州境安息軍儲亦贍柔然乙旃達官寇魏廣武魏收志東夏州偏城郡帶廣武縣五代志延安郡豐林縣後魏置廣武縣及偏城郡宋熙寧九年省豐林為鎮併屬膚施縣破之遣擊恐當作追擊章十二行本正作追乙十一行本同孔本同廣州刺史曲江侯勃自以非上所授陳霸先推蕭勃為廣州刺史見一百六十二卷武帝太清三年上亦疑之勃啓求入朝朝直遙翻五月乙巳上以王琳為廣州刺史勃為晉州刺史五代志同安郡梁置豫州後改曰晉州又得衆心故欲遠之遠于願翻琳與主書廣漢李膺厚善私謂膺曰琳小人也蒙官拔擢至此今天下未定遷琳嶺南如有不虞安得琳力竊揆官意不過疑琳琳分望有限言自揆分不敢懷非望也分扶問翻何不以琳為雍州刺史鎮武寧雍於用翻琳自放兵作田為國禦捍膺然其言而弗敢啓史言王琳忠於所事而帝不能用為國于僞翻散騎郎新野庾季才言於上曰去年八月丙申月犯心中星今月丙戌赤氣干北斗心為天王丙主楚分分扶問翻臣恐建子之月有大兵入江陵陛下宜留重臣鎮江陵整旆還都以避其患假令魏虜侵蹙止失荊湘在於社稷猶得無慮上亦曉天文知楚有災歎曰禍福在天避之何益天之警帝未棄帝也帝不知避是自棄也六月壬午齊步大汗薩將兵四萬趣涇州王僧辨使侯瑱張彪自石梁引兵助嚴超達拒之瑱彪遲留不進將軍尹令思將萬餘人謀襲盱眙盱眙音于怡齊冀州刺史段韶將兵討東方白額於宿預廣陵涇州皆來告急諸將患之韶曰梁氏喪亂喪息浪翻國無定主人懷去就強者從之霸先等外託同德內有離心諸君不足憂吾揣之熟矣揣初委翻乃留儀同三司敬顯擕等圍宿預敬顯擕當作敬顯俊塗出盱眙令思不意齊師猝至望風退走韶進擊超達破之回趣廣陵陳霸先解圍走趣七喻翻杜僧明還丹徒侯瑱張彪還秦郡吳明徹圍海西海西縣前漢屬東海郡後漢屬廣陵郡齊明帝置東海郡東魏武定七年改海西郡今西海州即其地削木為箭翦紙為羽圍之十旬卒不能克而還將即亮翻下同卒子恤翻柔然帥餘衆東徙且欲南寇齊主帥輕騎邀之於金川唐志單于府帶金河縣其即金川歟帥讀曰率遠遁營州刺史靈丘王峻設伏擊之獲其名王數十人鄧至羌檐桁失國檐余廉翻桁戶庚翻奔魏太師泰使秦州刺史宇文導將兵納之齊段韶還至宿預使辨士說東方白額說式芮翻白額開門請盟因執而斬之秋七月庚戌齊主還鄴魏太師泰西巡至原州八月壬辰齊以司州牧清河王嶽為太保司空尉粲為司徒太子太師侯莫陳相為司空尚書令平陽王淹録尚書事常山王演為尚書令中書令上黨王渙為左僕射乙亥齊儀同三司元旭坐事賜死丁丑齊主如晉陽齊主之未為魏相也相息亮翻太保録尚書事平原王高隆之常侮之及將受禪隆之復以為不可事見一百六十三卷簡文帝大寶元年復扶又翻崔季舒譖隆之每見訴訟者輒加哀矜之意以示非己能裁帝禁之尚書省崔季舒報徙邊之怨也謂旭曰與王交當生死不相負人有密言之者帝由是發怒令壯士築百餘拳而捨之辛巳卒於路卒子恤翻久之帝追忿隆之執其子慧登等二十人於前帝以鞭叩鞍一時頭絶並投尸漳水又發隆之冢出其尸斬截骸骨焚之棄於漳水齊主使常山王演上黨王渙清河王嶽平原王段韶帥衆於洛陽西南築伐惡城新城嚴城河南城帥讀曰率九月齊主巡四城欲以致魏師魏師不出史言齊強宇文泰畏之魏宇文泰命侍中崔猷開回車路以通漢中按北史崔猷傳泰欲開梁漢舊路乃命猷開通車路鑿山堙谷五百餘里至于梁州此特因舊路開而廣之以通車耳前史蓋誤以通字為回傳寫者又去其傍為回也泰不書官而書姓亦無義例之可言帝好玄談好呼到翻辛卯於龍光殿講老子曲江侯勃遷居始興王琳使副將孫瑒先行據番禺將即亮翻番禺音潘愚乙巳魏遣柱國常山公于謹中山公宇文護大將軍楊忠將兵五萬入寇冬十月壬戌發長安長孫儉問謹曰為蕭繹之計將如之何謹曰耀兵漢沔席卷渡江直據丹楊上策也謂東還建康也卷讀曰捲峻其陴堞以待援軍中策也陴頻彌翻堞達協翻若難於移動據守羅郭下策也儉曰揣繹定出何策揣初委翻下同謹曰下策儉曰何故謹曰蕭氏保據江南綿歷數紀十二年為一紀屬之欲翻未遑外略又以我有齊氏之患必謂力不能分且繹懦而無謀多疑少斷少詩沼翻斷丁亂翻愚民難與慮始皆戀邑居所以知其用下策也癸亥武寧太守宗均告魏兵且至帝召公卿議之領軍胡僧祐太府卿黃羅漢曰二國通好未有嫌隙必應不爾江陵諸將胡僧祐其巨擘也識見如此烏能敵于謹哉好呼到翻侍中王琛曰臣揣宇文容色必無此理去年王琛使魏故自謂揣其容色必無此事可謂不善於覘國者矣復扶又翻下復講同丙寅于謹至樊鄧梁王察帥衆會之辛章十二行本辛作丁乙十一行本同孔本同卯帝停講停講老子也帥讀曰率下同王琛至石林九杜佑曰石林九在沔州沔口上又據梁書安成王秀傳石林九時屬竟陵界馳書報黃羅漢曰吾至石林九境上帖然前言皆兒戲耳帝聞而疑之庚午復講百官戎服以聽辛未帝使主書李膺至建康徵王僧辨為大都督荊州刺史命陳霸先徙鎮揚州僧辨遣豫州刺史侯瑱帥程靈洗等為前軍兗州刺史杜僧明帥吳明徹等為後軍王僧辨一聞徵命當投袂勤王可也外言部分諸軍不聞星馳電赴江陵覆沒僧辨之罪也帥讀曰率甲戌帝夜登鳳皇閣徙倚歎息曰客星入翼軫倚欄而又徙處為徙倚翼軫楚荊州分嬪御皆泣嬪毗賓翻陸法和聞魏師至自郢州入漢口將赴江陵帝使逆之曰此自能破賊但鎮郢州不須動也法和還州堊其城門堊烏各翻以白土塗城門示有喪也著衰絰坐葦席終日乃脫之著陟略翻衰倉回翻此法和預為喪君之服設使法和果至江陵亦不能制魏兵之攻圍此其徒欲神法和之術託為之言以為能知來耳十一月帝大閲於津陽門外江左都建康外城十二門門名皆用洛城門名帝都江陵外城門亦依建康城門名之津陽門城南面東來第二門輕輦還宮癸未魏軍濟漢于謹令宇文護楊忠帥精騎先據江津斷東路斷音短甲申護克武寧執宗均是日帝乘馬出城行柵行下孟翻下巡行同周圍六十餘里以領軍將軍胡僧祐都督城東諸軍事尚書右僕射張綰為之副左僕射王褒都督城西諸軍事四廂領直元景亮為之副王公已下各有所守丙戌命太子巡行城樓令居人助運木石夜魏軍至黃華去江陵四十里丁亥至柵下戊子巂州刺史裴畿越巂郡梁置巂州巂音髓裴機殺魏儀同三司胡文伐畿之高之子也臺城既沒裴之高赴江陵帝徵廣州刺史王琳為湘東章十二行本東作州乙十一行本同刺史使引兵入援丁酉柵內火焚數千家及城樓二十五帝臨所焚樓望魏軍濟江四顧歎息是夜遂止宮外宿民家己亥移居祇洹寺祇巨支翻洹胡官翻于謹令築長圍中外信命始絶庚子信州刺史徐世譜晉安王司馬任約等築壘於馬頭江陵南岸謂之馬頭岸是夜帝巡城猶口占為詩㣥臣亦有和者和戶臥翻帝裂帛為書趣王僧辨曰趣讀曰促吾忍死待公可以至矣壬寅還宮癸卯出長沙寺戊申王褒胡僧祐朱買臣謝答仁等開門出戰皆敗還己酉帝移居天居寺癸丑移居長沙寺朱買臣按劍進曰唯斬宗懍黃羅漢可以謝天下買臣罪其諫還建康也懍力荏翻又力禁翻曩實吾意宗黃何罪二人退入衆中王琳軍至長沙鎮南府長史裴政請間道先報江陵王琳為鎮南將軍以裴政為府長史間古莧翻下間使同為魏人所獲梁王察謂政曰我武皇帝之孫也不可為爾君乎若從我計貴及子孫如或不然腰領分矣政詭對曰唯命察鎖之至城下使言曰王僧辨聞臺城被圍時都江陵上臺所在故亦謂之臺城王琳孤弱不能復來復扶又翻政告城中曰援兵大至各思自勉吾以間使被擒當碎身報國監者擊其口使疏吏翻監工銜翻察怒使速殺之西中郎參軍蔡大業梁置西中郎將於襄陽以蔡大業為參軍此民望也殺之則荊州不可下矣乃釋之政之禮之子裴之禮邃之子也大寶之弟也時徵兵四方皆未至甲寅魏人百道攻城考異曰梁紀作辛卯誤也今從典略楯食尹翻胡僧祐親當矢石晝夜督戰獎勵將士明行賞罰衆咸致死所向摧殄魏不得前俄而僧祐中流矢死中竹仲翻內外大駭魏悉衆攻柵反者開西門納魏師帝與太子王褒謝答仁朱買臣退保金城令汝南王大封晉熙王大圓質於于謹以請和大封大圓皆簡文帝之子質音致下同衆以王僧辨子侍中顗可為都督顗魚豈翻帝不用更奪其兵使與左右十人入守殿中及胡僧祐死乃用為都督城中諸軍事裴畿裴機歷陽侯峻皆出降降戶江翻下同于謹以機手殺胡文伐並畿殺之峻淵猷之子也淵猷長沙王懿之子而城北諸將猶苦戰日暝聞城陷乃散暝莫定翻帝入東閣竹殿命舍人高善寶焚古今圖書十四萬卷考異曰隋經籍志云焚七萬卷南史云十餘萬卷按周僧辨所送建康書已八萬卷並江陵舊書豈止七萬卷乎今從典略周當作王宮人左右共止之又以寶劍斫柱令折歎曰文武之道今夜盡矣焚書折劍以為文武道盡折而設翻謝答仁朱買臣諫曰城中兵衆猶強乘暗突圍而出賊必驚因而薄之可渡江就任約任約築壘馬頭岸與江陵僅隔一江耳曰事必無成祗增辱耳答仁求自扶帝以問王褒褒曰答仁侯景之黨豈足可信成彼之勳不如降也答仁又請守子城收兵可得五千人帝然之即授城中大都督配以公主既而召王褒謀之以為不可答仁請入不得歐血而去歐烏口翻于謹徵太子為質帝使王褒送之謹子以褒善書給之紙筆乃書曰柱國常山公家奴王褒謹為柱國大將軍封常山公褒以此自處安能為帝謀乎黃門郎裴政犯門而出帝遂去羽儀文物去羌呂翻白馬素衣出東門抽劍擊闔曰蕭世誠一至此乎左傳晉州綽攻齊東門以枚數闔杜預注曰闔門扇也世誠帝字也塹七豔翻至白馬寺北奪其所乘駿馬以駑馬代之遣長壯胡人手扼其背以行逢于謹胡人牽帝使拜考異曰典略云謹撝梁主令西至龍泉廟出武陵河東二王子孫於獄列於沙州鎖戒嚴酷瘡痍腐爛引梁主使視之謂曰此皆骨肉忍虐如此何以為君上無以應按武陵諸子先已餓死河東子孫亦應不存今不取囚于烏幔之下幔莫半翻詰去吉翻乙卯于謹令開府儀同三司長孫儉入據金城帝紿儉云城中埋金千斤欲以相贈儉乃將帝入城帝因述察見辱之狀謂儉曰向聊相紿欲言此耳紿蕩亥翻豈有天子自埋金乎儉乃留帝於主衣庫此主衣庫在江陵金城中之禁中帝性殘忍且懲高祖寬縱之弊故為政尚嚴及魏師圍城獄中死囚且數千人有司請釋之以充戰士帝不許悉令棓殺之棓蒲項翻事未成而城陷中書郎殷不害先於別所督戰城陷失其母時冰雪交積凍死者填滿溝塹不害行哭於道求其母尸無所不至見溝中死人輒投下捧視舉體凍濕水漿不入口號哭不輟聲號戶刀翻如是七日乃得之十二月丙辰徐世譜任約退戍巴陵于謹逼帝使為書召王僧辨帝不可使者曰王今豈得自由帝曰我既不自由僧辨亦不由我又從長孫儉求宮人王氏荀章十二行本荀作苟乙十一行本同孔本同熊校同氏及幼子犀首儉並還之或問何意焚書帝曰讀書萬卷猶有今日故焚之帝之亡國固不由讀書也庚申齊主北巡至達速嶺行視山川險要將起長城辛未帝為魏人所殺年四十七監工銜翻以土囊隕之察使以布帊纏尸帊普駕翻通俗文曰三幅為帊斂以蒲席束以白茅斂力贍翻葬於津陽門外並殺愍懷太子元良始安王方略桂陽王大成等世祖性好書梁王方智承制諡帝曰元廟號世祖好呼到翻晝夜不絶雖熟睡卷猶不釋或差誤及欺之帝輒驚寤作文章援筆立就常言我韜於文士今人謂器幣有餘用者為寬韜與此韜同義論者以為得言得言謂其自言者此為得之魏立梁王察為梁主資以荊州之地延袤三百里資以江陵緣江之地延袤三百里廣不及三百里也袤音茂雍於用翻察居江陵東城魏置防主將兵居西城名曰助防外示助察備禦內實防之魏克江陵因取襄樊之地此正滅虢取虞之計察雖悔之何及矣于謹收府庫珍寶及宋渾天儀梁銅晷表宋渾天儀元嘉十三年錢樂之所鑄也梁銅晷表武帝所造盡俘王公以下及選百姓男女數萬口為奴婢考異曰典略作五十萬今從梁紀南史驅歸長安小弱者皆殺之得免者三百餘家而人馬所踐及凍死者什二三踐慈演翻下同魏師之在江陵也梁王察將尹德毅說察曰魏虜貪婪說式芮翻婪與婪同盧含翻肆其殘忍殺掠士民不可勝紀勝音升江東之人塗炭至此咸謂殿下為之殿下既殺人父兄孤人子弟人盡讎也誰與為國今魏之精鋭盡萃於此若殿下為設享會下為于僞翻請于謹等為歡預伏武士因而斃之分命諸將掩其營壘大殲㣥醜俾無遺類殲息廉翻收江陵百姓撫而安之文武㣥寮隨材銓授魏人懾息未敢送死懾之涉翻王僧辨之徒折簡可致然後朝服濟江入踐皇極謂還建康即位也朝直遙翻大功可立古人云天與不取反受其咎漢蒯通之言勿懷匹夫之行匹夫之行小廉小謹以自託於鄉黨行下孟翻卿此策非不善也然魏人待我厚未可背德背蒲妹翻若遽為卿計人將不食吾餘左傳鄧祁侯之言又失襄陽被皮義翻察乃歎曰恨不用尹德毅之言王僧辨陳霸先等共奉江州刺史晉安王方智為太宰承制王褒王克劉瑴宗懍殷不害及尚書右丞吳興沈炯至長安瑴古嶽翻炯古迥翻太師泰皆厚禮之泰親至于謹第宴勞極歡勞力到翻賞謹奴婢千口及梁之寶物並雅樂一部別封新野公既封常山又封新野故曰別封不許謹自以久居重任功名既立欲保優閒乃上先所乘駿馬及所著鎧甲等上時掌翻著陟略翻鎧可亥翻泰識其意曰今巨猾未平公豈得遽爾獨善巨猾謂齊孟子曰達則兼善天下窮則獨善其身是歲魏秦州刺史章武孝公宇文導卒魏加益州刺史尉遲迥督六州通前十八州自劍閣以南得承制封拜及黜陟迥明賞罰布威恩綏輯新民經略未附華夷懷之容肇祖標點聶崇岐覆校
