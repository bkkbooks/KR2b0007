body:
  text: 資治通鑑卷第五十六翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注漢紀四十八永康元年孝桓皇帝下永康元年丁未一六七是年六月始改元永康元年春正月東羌先零圍祋祤掠雲陽二縣皆屬左馮翊宋白曰耀州華原同官縣本漢祋祤縣地雲陽故城在今縣西北六十里零音憐祋音丁活翻又音丁外翻祤音詡種章勇翻復扶又翻下同段熲擊之於鸞鳥熲高迥翻鸞音雚鳥讀曰雀大破之西羌遂定永康元年夫餘王夫台寇玄菟夫音扶菟同都翻玄菟太守公孫域擊破之守式又翻永康元年夏四月先零羌寇三輔攻沒兩營兩營京兆虎牙營扶風雍營零音憐永康元年五月壬子晦日有食之永康元年陳蕃既免朝臣震栗莫敢復為黨人言者復扶又翻朝直遙翻下同為于偽翻賈彪曰吾不西行大禍不解賈彪潁川定陵人自潁川至雒陽為西行説城門校尉竇武尚書魏郡霍諝等説翰苪翻諝私呂翻使訟之武上疏曰陛下即位以來未聞善政常侍黃門競行譎詐妄爵非人伏尋西京佞臣執政終喪天下譎古穴翻喪息浪翻今不慮前事之失復循覆車之軌臣恐二世之難難乃旦翻必將復及趙高之變不朝則夕謂望夷宮之事也遂收前司隸校尉李膺等逮考連及數百人曠年拘録事無效驗謂自去年興獄至今年事終無其實也校戶教翻志經王室此誠陛下稷坰人坰伊呂之佐坰人坰古契字音息列翻而虛為姦臣賊子之所誣枉天下寒心海內失望惟陛下留神澄省澄清也省察也省悉井翻賢曰時謂即時也章乙十六行本神作下乙十一行本同孔本同退齋校同鬼喁喁之心喁魚恭翻今臺閣近臣尚書朱宇荀緄劉祐魏朗劉矩尹勳等皆國之貞士朝之良佐緄古本翻考異曰武傳武上疏曰今臺閣近臣尚書令陳蕃僕射胡廣尚書朱宇等按蕃廣時不為令僕故去之尚書郎張陵媯皓媯俱為翻姓譜媯帝舜之後苑康姓譜苑姓商武丁之子受封於苑因以為氏左傳齊有大夫苑何忌陳留風俗傳邊祖于宋平公子戍字子邊又左傳周有大夫邊伯文質彬彬明達國典內外之職㣥才並列而陛下委任近習專樹叨餮叨吐刀翻餮他結翻外典州郡內幹心膂宜以次貶黜案罪糾罰信任忠良平決臧否使邪正毀譽各得其所否音鄙譽音余寶愛天官唯善是授天官言天命有德人君不可以私授咎徵可消天應可待間者有嘉禾芝草黃龍之見是年魏郡言嘉禾生巴郡言黃龍見見賢遍翻福至實由善人在德為瑞無德為災陛下所行不合天意不宜稱慶書奏因以病上還城門校尉槐里侯印綬霍諝亦為表請上時掌翻為于偽翻下同帝意稍解使中常侍王甫就獄訊黨人范滂等皆三木囊頭暴於階下賢曰三木頭及手足皆有械更以物蒙覆其頭也卿等更相拔舉更工衡翻迭為脣齒其意如何滂曰仲尼之言見善如不及見惡如探湯賢曰探湯喻去之疾也見論語探吐南翻惡惡同其汙謂王政之所願聞不悟更以為黨古之修善自求多福今之修善身陷大戮身死之日願埋滂於首陽山側上不負皇天下不愧夷齊賢曰伯夷叔齊餓死首陽山事見史記首陽山在雒陽東北杜佑曰偃師縣有首陽山乃得並解桎梏鄭玄注周禮曰木在手曰桎在足曰梏桎之日翻梏工沃翻宦官懼請帝以天時宜赦六月庚申赦天下改元黨人二百餘人皆歸田里書名三府禁錮終身考異曰帝紀於去年冬書李膺等二百餘人受誣為黨人並坐下獄書名三府按陳蕃以訟李膺兔即膺等下獄已在前後遇赦方得書名三府則帝紀所紀為兩無所用故去之又故書三府為王府劉攽曰當為三府范滂往候霍諝而不謝或讓之滂曰昔叔向不見祁奚晉范宜子囚叔向祁奚請而免之不見叔向而歸叔向亦不告免焉而朝滂南歸汝南南陽士大夫迎之者車數千兩兩音亮卿人殷陶黃穆侍衛於旁應對賓客滂謂陶等曰今子相隨是重吾禍也遂遁還鄉里初詔書下舉鉤黨賢曰鉤謂相連也下遐稼翻多至百數唯平原相史弼獨無所上上時掌翻詔書前後迫切州郡髡笞掾史從事坐傳舍責曰掾俞絹翻賢曰續漢志每州有從事史及諸曹掾史傳客舍也音知戀翻坐傳舍召弼而責余謂髡笞掾史句絶言詔書督迫州郡至於髡笞掾史青州從事則坐平原傳舍而責史弼也詔書疾惡黨人惡烏路翻皆意懇惻青州六郡其五有黨平原何治而得獨無弼曰先王疆理天下賢曰疆界也理正也水土異齊風俗不同記王制曰凡居民財必因天地寒暖燥濕廣谷大川異制民生其間者異俗剛柔輕重遲速異齊齊才細翻前書曰凡民函五常之性而其剛柔緩急音聲不同繫水土之風氣故謂之風好惡取舍動靜無常隨君上之情欲故謂之俗平原自無胡可相比若承望上司誣陷良善淫刑濫罰以逞非理則平原之人戶可為黨相有死而已相息亮翻所不能也從事大怒即收郡僚職送獄郡僚職謂郡諸曹掾史也會黨禁中解弼以俸贖罪所脫者甚衆竇武所薦朱宇沛人苑康勃海人楊喬會稽人會工外翻邊韶陳留人喬容儀偉麗數上言政事數所角翻帝愛其才貌欲妻以公主妻七細翻喬固辭不聽遂閉口不食七日而死永康元年秋八月巴郡言黃龍見見賢遍翻初郡人欲就池浴見池水濁因戲相恐此中有黃龍語遂行民間太守欲以為美故上之上時掌翻郡吏傅堅諫曰此走卒獻語耳太守不聽永康元年六月張月作州大水勃海張海下脫海字溢永康元年冬十月先零羌寇三輔零音憐張奐遣司馬尹端董卓拒擊大破之斬其酋豪首虜萬餘人酋慈由翻三州清定時奐督幽並涼三州以不事宦官故不果封唯賜錢二十萬除家一人為郎奐辭不受請徙屬弘農舊制邊人不得內徙詔以奐有功特許之奐燉煌淵泉人卓隴西人性粗猛有謀羌胡畏之董卓事始此永康元年十二月壬申復癭陶王悝為勃海王悝貶事見上卷延熹八年癭於郢翻悝苦回翻永康元年丁丑帝崩于德陽前殿年三十六戊寅尊皇后曰皇太后太后臨朝初竇后既立御其甚稀見賢遍翻唯采女田聖等有寵后素忌忍帝梓宮尚在前殿遂殺田聖城門校尉竇武議立嗣召侍御史河間劉鯈倏式和翻問以國中宗室之賢者鯈稱解瀆亭侯宏賢曰解瀆亭在今定州義豐縣東北杜佑曰義豐漢之安國縣也河間孝王之曾孫也祖淑父萇世封解瀆亭侯武乃入白太后定策禁中以鯈守光祿大夫與中常侍曹節並持節將中黃門虎賁羽林千人將即亮翻奉迎宏時年十二考異曰范書云即帝位年十三袁紀初立為嗣詔書云年十有二建寧二年誅黨人時云年十四袁紀是也孝靈皇帝上之上諱宏諡法亂而不損曰靈伏侯古今注宏之字曰大建寧元年戊申一六八永康元年春正月壬午以城門校尉竇武為大將軍考異曰袁紀延熹九年四月戊寅特進竇武為大將軍武移病固讓至于數十不許范書在今年正月壬午武傳為大將軍亦在迎立靈帝後今從之考異曰帝紀拜蕃太傳在即位後傳在前緣在蕃責尚書等語故知從傳是也三人謂之參時新遭大喪國嗣未立諸尚書畏懼多託病不朝陳蕃移書責之曰古人立節事亡如存賢曰言人主雖亡法度尚在當行之與不亡時同故曰如存余謂事死如事生事亡如事存中庸之文言人主雖死亡事之如生存也政事日蹙諸君奈何委荼蓼之苦息偃在牀詩國風曰誰謂荼苦其甘如薺周頌曰未堪家多難豫又集于蓼小雅曰或息偃在狀諸尚書惶怖怖普布翻皆起視事永康元年己亥解瀆亭侯至夏門亭使竇武持節以王青蓋車迎入殿中庚子即皇帝位改元永康元年二月辛酉葬孝桓皇帝于宣陵賢曰宣陵在雒陽東南三十里永康元年辛未赦天下永康元年初護羌校尉段熲既定西羌去年潁定西羌度遼將軍皇甫規中郎將張奐招之連年既降又叛桓帝延熹四年皇甫規招降東羌六年規薦張奐至永康元年七年之間羌之叛服無常降戶江翻下同先零東羌造惡反逆而皇甫規張奐各擁強衆不時輯定欲令熲移兵東討未識其宜可參思術略熲上言曰臣伏見先零東羌雖數叛逆數所角翻而降於皇甫規者己二萬許落善惡既分餘寇無幾今張奐躊躇久不進者躊躇猶豫也又住足也兵往必驚且自冬踐春屯結不散人畜疲羸有自亡之勢欲更招降坐制強敵耳臣以為狼子野心難以恩納勢窮雖服兵去復動復扶又翻唯當長矛挾脅白刃加頸耳計東種所餘三萬餘落種章勇翻下同近居塞內路無險折非有燕齊秦趙從橫之勢從子容翻而久亂並涼纍侵三輔西河上郡已各內徙事見五十二卷順帝永和五年復至單危復扶又翻下同自雲中五原西至漢陽二千餘里胸奴諸羌並亶其地是為癰疽伏疾留滯脅下如不加誅轉就滋大若以騎五千步萬人車三千兩兩音亮三冬二夏足以破定無慮用費為錢五十四億賢曰無慮都凡也毛晃曰總計曰無慮猶言多少如是無疑也則可令㣥羌破盡胸奴長服內徙郡縣得反本土伏計永初中諸羌反叛十有四年用二百四十億事見五十卷安帝元初五年復經七年用八十餘億事見五十二卷沖帝永嘉元年猶不誅盡餘孽復起于茲作害今不暫疲民則永寧無期臣庶竭駑劣伏待節度駑音奴帝許之悉聽如所上上時掌翻潁於是將兵萬餘人齎十五日糧從彭陽直指高平賢曰彭陽高平並縣名屬安定郡彭陽縣即今原州彭原縣也高平縣今原州也賢曰山在今原州平高縣杜佑曰平高縣即漢之高平也熲衆皆恐熲乃令軍中長鏃利刀范書段潁傳作張鏃利刀重直龍翻挾以強弩列輕騎為左右翼謂將士曰今去家數千里進則事成走必盡死努力共功名因大呼呼火故翻衆皆應聲騰赴張赴下脫熲字馳騎於傍突而擊之虜衆大潰斬首八千餘級太后賜詔書褒美曰須東羌盡定當并録功勤今且賜熲錢二十萬以家一人為郎中敕中藏府調金錢綵物增助軍費百官志中藏府令屬少府掌中幣帛金銀諸貨物調徒弔翻藏沮浪翻永康元年閏月甲午追尊皇祖為孝元皇沈約曰孝元皇諡法所不載今按周公諡法能思辨衆曰元行義説民曰元主義行德曰元靖民則法曰元夏戶雅翻考為孝仁皇諡法貴賢親親曰仁皇祖解瀆亭侯淑也皇考侯萇也賢曰慎園在今瀛州樂壽縣東南欲呼為二皇陵永康元年夏四月戊辰太尉周景薨司空宣酆免以長樂衛尉王暢為司空樂音洛永康元年五月丁未朔日有食之永康元年以太中大夫劉矩為太尉永康元年六月京師大水永康元年癸巳録定策功封竇武為聞喜侯武子機為渭陽侯考兩漢志無渭陽縣蓋因舅氏之親而為封國之名鄠音戶靖為西鄉侯中常侍曹節為長安鄉侯侯者凡十一人涿郡盧植上書説武曰説輪苪翻足下之於漢朝猶旦奭之在周室建立聖主四海有繫論者以為吾子之功於斯為重今同宗相後披圖案牒以次建之何勳之有自和帝無嗣安帝以肅宗之孫入立沖質短祚桓帝以肅宗曾孫入立桓帝無嗣又以肅宗玄孫入立是同宗相後以次建之也圖以族屬之遠近寫為圖也牒譜第之也橫戶孟翻宜辭大賞以全身名武不能用植身長八尺二寸長直亮翻音聲如鍾性剛毅有大節少事馬融少詩照翻融性豪侈多列女倡歌舞於前倡音昌植侍講積年未嘗轉盼融以是敬之太后以陳蕃舊德特封高陽鄉侯蕃上疏讓曰臣聞割地之封功德是為為于偽翻臣雖無素潔之行行下孟翻竊慕君子不以其道得之不居也孔子曰富與貴是人之所欲也不以其道得之不處也掩面就之詩云受爵不讓至于己斯亡災流下民於臣之身亦何所寄太后不許蕃固讓章前後前十上上時掌翻竟不受封永康元年段熲將輕兵追羌出橋門據東觀記橋門谷名水經注云橋門即橋山之長城門也與戰於奢延澤落川令鮮水上賢曰即上郡奢延縣界也水經注奢延水出奢延縣西南赤沙阜東流入于河落川在奢延水南賢曰令鮮水名在今甘州張掖縣界一名合黎水一名羌谷水余考鮮水既捷乃追戰於靈武谷此鮮水非甘州之鮮水明矣當在上郡北地界又戰於靈武谷賢曰靈武縣名有谷在今靈州懹遠縣西北余據前書地理志北地郡有靈武縣靈武谷當在此縣界非唐靈州之靈武縣也秋七月熲至涇陽涇陽縣屬安定郡賢曰故城在今原州平涼縣南悉散入漢陽山谷間護胸奴中郎將張奐上言東羌雖破餘種難盡種章勇翻段熲性輕果慮負敗難常宜且以恩降可無後悔詔書下熲下遐稼翻熲復上言臣本知東羌雖衆而軟弱易制復扶又翻下同軟乳兗翻柔也所以比陳愚慮比毗至翻思為永寧之算而中郎將張奐説虜強難破宜用招降降戶江翻聖朝明監信納瞽言故臣謀得行奐計不用事勢相反遂懹猜恨信叛羌之訴飾潤辭意云臣兵纍見折衄賢曰傷敗曰衄音女六翻不可誅盡賢曰言羌亦稟天之一氣所生誅之不可盡也不可空靜血流污野傷和致災污烏故翻臣伏念周秦之際戎狄為害中興以來羌寇最盛誅之不盡雖降復叛今先零雜種纍以反覆故攻沒縣邑剽略人物剽匹妙翻發冢露尸禍及生死上天震怒假手行誅昔邢為無道衛國伐之師興而雨左傳曰衛大旱卜有事于山川不吉寧莊子曰昔周飢克殷而年豐今邢方無道天其欲衛討邢乎從之師興而雨連獲甘澍澍音樹又音注時雨也歲時豐稔人無疵疫上占天心不為災傷下察人事衆和師克自橋門以西落川以東故宮縣邑更相通屬杜佑曰橋門以西落川以東今金城會寧平涼郡地屬之欲翻車騎安行無應折衄案奐為漢吏身當武職駐軍二年不能平寇桓帝延熹九年奐督三州二營招降獷敵賢曰獷惡貌也音各猛翻僭而無徵左傳臧會卜為信與僭杜預注曰僭不信也昔先零作寇趙充國徙令居內宣帝時趙充國擊西羌降者三萬餘人徙之金城置金城屬國以處之令使也音零馬援遷之三輔始服終叛至今為鯁賢曰鯁與梗同梗病也大雅云至今為梗以為深憂今傍郡戶口單少數為羌所創毒數所角翻下同創初良翻傷也而欲令降徒與之雜居降戶江翻是猶種枳棘於良田養蛇虺於室內也故臣奉大漢之威建長久之策欲絶其本根不使能殖賢曰殖生也左傳曰見惡如農夫之務去草焉絶其本根勿使能殖用五十四億今適期年所耗未半而餘寇殘燼杜預曰燼火餘木也臣每奉詔書軍不內御賢曰御制御也淮南子曰國不可從外理軍不可從中御卒子恤翻終也一以任臣臨時量宜量音亮不失權便永康元年八月司空王暢免宗正劉寵為司空永康元年初竇太后之立也陳蕃有力焉事見五十五卷桓帝延熹八年政無大小皆委於蕃蕃與竇武同心戮力以獎王室徵天下名賢李膺杜密尹勳劉瑜等皆列於朝廷與共參政事於是天下之士莫不延頸想望太平而帝乳母趙嬈及諸女尚書賢曰女尚書內官也嬈音乃了翻中常侍曹節王甫等共相朋結諂事太后太后信之數出詔命有所封拜蕃武疾之嘗共會朝堂數所角翻朝直遙翻蕃私謂武曰曹節王甫等自先帝時操弄國權操千高翻濁亂海內今不誅之後必難圖武深然之蕃大喜以手推章乙十六行本推作椎乙十一行本同孔本同熊校同席而起武於是引同志尚書令尹勳等共定計策會有日食之變蕃謂武曰昔蕭望之困一石顯事見二十八卷元帝初元二年蕃以八十之年欲為將軍除害今可因日食斥罷宦官以塞天變為于偽翻塞悉則翻武乃白太后曰故事黃門常侍但當給事省內張內下脫典字門戶主近署財物耳省內謂禁中也近署財物謂少府所掌中藏府尚方內者諸署也任重權與讀曰預子弟布列專為貪暴天下胸胸正以此故宜悉誅廢以清朝廷太后曰漢元以來故事漢元漢初也但當誅其有罪者豈可盡廢邪時中常侍管霸頗有才略專制省內武先白收霸及中常侍蘇康等皆坐死武復數白誅曹節等復扶又翻數所角翻太后冘豫未忍冘音淫故事久不發蕃上疏曰今京師囂囂道路喧譁言侯覽曹節公乘盺王甫鄭颯等與趙夫人諸尚書並亂天下公乘秦爵也此以爵為氏乘繩證翻昕許斤翻趙夫人即趙嬈颯音立忤逆者中傷忤五故翻中竹仲翻一朝㣥臣如河中木耳朝直遙翻謂舉朝之臣也泛泛東西耽祿畏害陛下今不急誅此曹必生變亂傾危社稷其禍難量量音良願出臣章宣示左右並令天下諸姦知臣疾之太后不納是月太白犯房之上將入太微晉書天文志房四星為明堂天子布政之宮也亦四輔也第一星上將也次次將也次次相也上星上相也太微天子庭也天官即天文也史記天官書猶後之天文志惡烏路翻上書皇太后曰案占書宮門當閉將相不利姦人在主傍願急防之又與武蕃書以星辰錯繆不利大臣宜速斷大計斷丁亂翻於是武蕃以朱宇為司隸校尉劉祐為河南尹虞祁為雒陽令武奏免黃門令魏彪以所親小黃門山冰代之姓譜周有山師之官子孫以為氏或云烈山氏之後長樂尚書蓋以太后臨朝置之以掌奏下外朝文書衆事也樂音洛下同蕃謂武曰此曹子便當收殺何復考為復扶又翻下同武不從令冰與尹勳侍御史祝雜考颯辭連及曹節王甫勳冰即奏收節等使劉瑜內奏九月辛亥武出宿歸府典中書者先以告長樂五官史朱瑀瑀盜發武奏長樂太后宮也太后宮有女尚書五人五官史主之考異曰范書帝紀作丁亥袁紀作辛亥按長曆是年九月乙巳朔無丁亥今從袁紀中官放縱者自可誅耳我曹何罪而當盡見族滅因大呼曰呼火故翻下同陳蕃竇武奏白太后廢帝為大逆乃夜召素所親壯健者長樂從官史共普張亮等十七人長樂從官史掌太后宮從官從才用翻共音龔喢色洽翻謀誅武等曹節白帝曰外間切切切切猶言迫急也令帝拔劍踊躍使乳母趙嬈等擁衛左右取棨信閉諸禁門賢曰棨有衣戟也漢官儀曰凡居宮中皆施籍於掖門按姓名當入者本官為封棨傳審印信然後受也脅以白刃使作詔板拜王甫為黃門令詔板所謂尺一也收尹勳山冰冰疑不受詔甫格殺之並殺勳出鄭颯還兵劫太后奪璽綬璽斯氏翻綬音受令中謁者守南宮閉門絶復道謁者掌守門戶文帝自代邸入立有謁者十人持戟衛端門是也雒陽南北宮有復道相通武不受詔馳入步兵營與其兄子步兵校尉紹共射殺使者射而亦翻召會北軍五校士數千人屯都亭雒陽都亭也校戶教翻黃門常侍反盡力者封侯重賞陳蕃聞難將官屬諸生八十餘人並拔刃突入承明門難乃旦翻考異曰袁紀蕃到承明門便者不內曰公未被詔召何得勒兵入宮蕃曰趙鞅專兵向宮以逐君側之惡春秋義之有便者出開門蕃到尚書門正色云云今從范書到尚書門攘臂呼曰呼火故翻大將軍忠以衛國黃門反逆何云竇氏不道邪王甫時出與蕃相遇適聞其言而讓蕃曰先帝新棄天下山陵未成武有何功兄弟父子並封三侯謂武子機封渭陽侯兄子紹封鄠侯紹弟靖封西鄉侯多取掖庭宮人旬日之間資財巨萬大臣若此為是道邪謂此非不道而何苟相阿黨復何求賊復扶又翻使劍士收蕃蕃拔劍叱甫辭色逾厲遂執蕃送北寺獄考異曰范書蕃傳曰蕃拔劍叱甫甫兵不敢近乃益人圍之數十重遂執蕃送獄今據袁紀從才用翻騶側尤翻賢曰騶騎士也踧子六翻死老魅魅明祕翻物老而能為精怪曰魅復能損我曹員數奪我曹稟假不稟給也假借也不俯九翻殺之時護胸奴中郎將張奐徵還京師曹節等以奐新至不知本謀矯制以少府周靖行車騎將軍加節與奐率五營士討武夜漏盡天且明也出屯朱雀掖門北宮南掖門曰朱雀門將即亮翻已而悉軍闕下與武對陳陳讀曰陳甫兵漸盛使其士大呼武軍曰竇武反汝皆禁兵當宿衛宮省何故隨反者乎先降有賞營府兵素畏服中官營府謂五營校尉也自旦至食時兵降略盡降戶江翻武紹走諸軍追圍之皆自殺梟首雒陽都亭梟工堯翻收捕宗親賓客姻屬悉誅之及侍中劉瑜屯騎校尉馮述皆夷其族宦官又譖虎賁中郎將河間劉淑故尚書會稽魏朗云與武等通謀皆自殺會工外翻遷皇太后於南宮徙武家屬於日南自公卿以下嘗為蕃武所舉者及門生故吏皆免官禁錮議郎勃海巴肅姓譜巴巴國之後後漢又有揚州刺史巴祗曹節等不知但坐禁錮後乃知而收之肅自載詣縣肅勃海高城縣人入閣解印綬欲與俱去肅曰為人臣者有謀不敢隱有罪不逃刑既不隱其謀矣又敢逃其刑乎遂被誅被皮義翻曹節遷長樂衛尉封育陽侯育陽縣屬南陽郡黃門令如故朱瑀共普張亮等六人皆為列侯共音龔姓譜共商諸侯之國晉有左行共華又云鄭共叔段之後十一人為關內侯於是㣥小得志士大夫皆喪氣喪息浪翻蕃友人陳留朱震收葬蕃尸匿其子逸事覺繫獄合門桎梏震受考掠桎之日翻梏工沃翻掠音亮誓死不言逸由是得免武府掾桂陽胡騰殯斂武尸行喪掾會絹翻斂力贍翻坐以禁錮武孫輔年二歲騰詐以為己子與令史南陽張敞百官志大將軍府令史及御屬三十一人亦得免張奐遷大司農以功封侯奐深病為曹節等所賣固辭不受永康元年以司徒胡廣為太傅録尚書事司空劉寵為司徒大鴻臚許栩為司空臚陵如翻栩況羽翻永康元年冬十月甲辰晦日有食之永康元年十一月太尉劉矩免以太僕沛國聞人襲為太尉聞人姓也風俗通曰少正卯魯之聞人其後氏焉永康元年十二月鮮卑及濊貊寇幽並二州濊音穢貃莫百翻永康元年是歲疏勒王季父和得殺其王自立永康元年烏桓大人上谷難樓有衆九千餘落遼西丘力居有衆五千餘落張落下脫皆字自稱王遼東蘇僕延有衆千餘落自稱峭王峭音七笑翻右北平烏延有衆八百餘落自稱汗魯王史言烏桓強盛二年永康二年春正月丁丑赦天下永康二年帝迎董貴人於河間三月乙巳尊為孝仁皇后居永樂宮樂音洛拜其兄寵為執金吾兄子重為五官中郎將永康二年夏四月壬辰有青蛇見於御坐上見賢遍翻坐徂臥翻癸巳大風雨雹霹靂霹靂震霆也考異曰帝紀建寧二年四月癸巳大風雨雹楊賜傳熹平元年青蛇見御坐續漢志熹平元年四月甲午青蛇見御坐袁紀建寧二年四月壬辰青蛇見癸巳大風按張奐傳論陳竇薦王李與袁紀相應今從之詔公卿以下各上封事大司農張奐上疏曰昔周公葬不如禮天乃動威尚書大傳曰周公薨成王欲葬之成周天乃雷電以風禾則盡偃大木斯拔邦人大恐王葬周公于畢示不敢臣也未被明宥被皮義翻妖眚之來皆為此也為于偽翻宜急為收葬為于偽翻徙還家屬其從坐禁錮一切蠲除蠲吉玄翻又皇太后雖居南宮而恩禮不接朝臣莫言遠近失望宜思大議顧復之報賢曰顧旋視也復反覆也小雅曰父兮生我母兮鞠我顧我復我出入腹我以問諸常侍左右皆惡之惡烏路翻帝不得自從奐又與尚書劉猛等共薦王暢李膺可參三公之選曹節等彌疾其言遂下詔切責之奐等皆自囚廷尉數日乃得出並以三月俸贖罪俸扶用翻郎中東郡謝弼上封事曰臣聞惟虺惟蛇女子之祥詩小雅無羊之辭鄭玄注云虺蛇穴處陰之祥也援立聖明書曰父子兄弟罪不相及左傳胥臣曰康誥曰父不慈子不祗兄不友弟不恭不相及也今尚書康誥無此語豈宜咎延太后幽隔空宮悉感天心如有霧露之疾陛下當何面目以見天下孝和皇帝不絶竇氏之恩事見四十七卷永元九年禮為人後者為之子今以桓帝為父豈得不以太后為母哉願陛下仰慕有虞蒸蒸之化凱章乙十六行本凱上有俯思二字乙十一行本同孔本同張校同風慰母之念書舜典曰蒸蒸乂不格姦孔安國注云蒸蒸猶進進也言舜進於善道詩凱風曰有子七人莫慰母心小人勿用易師卦上六爻辭未蒙爵秩阿母寵私乃享大封大風雨雹亦由於茲雨于具翻又故太傅陳蕃勤身王室而見陷㣥邪一旦誅滅其為酷濫駭動天下而門生故吏並離徙錮離遭也人百何贖詩國風黃鳥曰如可贖兮人百其身解除禁網夫台宰重器國命所繫今之四公唯司空劉寵斷斷守善餘皆素餐致寇之人必有折足覆餗之凶賢曰四公謂劉矩為太尉許訓為司徒胡廣為太傅及寵也書曰如有一介臣斷斷猗無他技孔安國注云斷斷猗然專一之臣也素空也無德而食其祿曰素餐易曰負且乘致寇至又曰鼎折足覆公餗鼎以喻三公餗鼎實也折足覆餗言不勝其任據是年聞人襲已代劉矩為太尉餘三公亦不與賢注合斷丁亂翻折而設翻餗音速並加罷黜徵故司空王暢長樂少府李膺並居政事庶災變可消國祚惟永左右惡其言惡烏路翻出為廣陵府丞府丞即郡丞也歸家曹節從子紹為東郡太守以他罪收弼掠死於獄掠音亮帝以蛇妖問光祿勳楊賜賜上封事曰夫善不妄來災不空發王者心有所想雖未形顏色而五星以之推移陰陽為其變度夫皇極不建則有龍蛇之孽子賢曰洪範五行傳曰皇大也極中也建立也孽災也君不合大中是謂不立蛇龍陰類也女子之祥惟陛下思乾剛之道別內外之宜抑皇甫之權割豔妻之愛賢曰豔妻周幽王后褒姒也皇甫卿士皆后之黨用后嬖寵而居位也詩云皇甫卿士豔妻煽方處別彼列翻禎祥立應賜秉之子也永康二年五月太尉聞人襲司空許栩免六月以司徒劉寵為太尉太常汝南許訓為司徒太僕長沙劉囂為司空囂素附諸常侍故致位公輔永康二年詔遣謁者馮禪説降漢陽散羌説輸苪翻降戶江翻段熲以春農百姓布野羌雖暫降而縣官無廩必當復為盜賊復扶又翻不如乘虛放兵放兵謂縱兵擊羌也熲於是自進營去羌所屯凡亭山四五十里魏收地形志安定鶉陰縣有凡亭杜佑作瓦亭山注云瓦亭山在今平涼都蕭關縣擊破之夏戶雅翻羌衆潰東奔復聚射虎谷復扶又翻下同分兵守谷上下門熲規一舉滅之不欲復令散走秋七月熲遣千人於西縣結木為柵西縣前漢屬隴西郡後漢屬漢陽郡參據二志皆云縣有嶓冢山西漢水所出是則禹貢所謂嶓冢導漾東流為漢其發源之地也段熲討羌起於安定高平羌敗則追至上郡奢延及大敗於靈武谷乃追至安定誙陽諸羌散入漢陽山谷間聚屯凡亭山凡亭既破復聚射虎谷熲乃於西縣結柵以遮之以羌奔潰所趨考之射虎谷在西縣東北凡亭山當在射虎谷東北蓋東羌為熲兵所追復欲西奔出塞師其舊來巢穴而殲於是谷也賢曰西縣故城在今秦州上邽縣西南長四十里遮之廣古曠翻長直亮翻分遣晏育等將七千人銜枚夜上西山結營穿塹去虜一里許又遣司馬張愷等將三千人上東山上時掌翻虜乃覺之熲因與愷等挾東西山縱兵奮擊破之追至谷上下門窮山深谷之中處處破之斬其渠帥以下萬九千級帥所類翻馮禪等所招降四千人分置安定漢陽隴西三郡於是東羌悉平熲凡百八十戰斬三萬八千餘級獲雜畜四十二萬七千餘頭畜許又翻費用四十四億軍士死者四百餘人更封新豐縣侯邑萬戶臣光曰書稱天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母周書泰誓之辭亶誠也氣類雖殊其就利避害樂生惡死樂音洛惡烏路翻亦與人同耳御之得其道則附順服從失其道則離叛侵擾固其宜也是以先王之政叛則討之服則懷之處之四裔裔邊也處昌呂翻若乃視之如草木禽獸不分臧否不辨去來悉艾殺之否音鄙艾讀曰刈豈作民父母之意哉且夫羌之所以叛者為郡縣所侵冤故也侵冤者為所侵刻而銜冤將帥非其人故也苟使良將驅而出之塞外擇良吏而牧之則疆場之臣也豈得專以多殺為快邪夫御之不得其道雖華夏之民亦將起而為寇又可盡誅邪然則段紀明之為將段熲字紀明犯太宗嫌諱故稱字君子所不與也永康二年九月江夏蠻反夏戶雅翻州郡討平之永康二年丹楊山越圍太守陳夤夤擊破之山越本亦越人依阻山險不納王租故曰山越寇擾郡縣蓋自此始其後孫吳悉取其地以民為兵遂為王土永康二年初李膺等雖廢錮事見上卷桓帝延熹九年希之者唯恐不及更共相標榜為之稱號賢曰標榜猶相稱揚也余謂立表以示人曰標揭書以示人曰榜標榜猶言表揭也更工衡翻君者言一世之所宗也李膺荀翌翌范書作昱俊者言人之英也郭泰范滂尹勳巴肅及南陽宗慈陳留夏馥汝南蔡衍泰山羊陟為八顧顧者言能以德行引人者也行下孟翻張儉翟超岑晊苑康翟萇伯翻晊之日翻及山陽劉表汝南陳翔魯國孔昱山陽檀敷為八及及者言其能導人追宗者也賢曰導引也言謂所宗仰者風俗通曰胡母姓本陳胡公之後也公子完奔齊遂有齊國齊宣王母弟別封母鄉遠取胡公近取母邑故曰胡母氏賢曰蕃姓也音皮東萊王章為八廚廚者言能以財救人者也及陳竇用事復舉拔膺等陳竇誅膺等復廢宦官疾惡膺等每下詔書輒申黨人之禁復扶又翻惡烏路翻下遐稼翻侯覽怨張儉尤甚以破其冢宅也事見上卷桓帝延熹九年為儉所棄承覽意指上書告儉與同鄉二十四人別相署號共為部黨圖危社稷而儉為之魁詔刊章捕儉等刊章者刊去並姓名而下其章也十月大長秋曹節因此諷有司奏諸鉤黨者故司空虞放及李膺杜密朱宇荀翌翟超劉儒范滂等賢曰鉤謂相牽引也下遐稼翻治直之翻是時上年十四問節等曰何以為銘黨對曰鉤黨者即黨人也上曰黨人何用為惡而欲誅之邪對曰皆相舉㣥輩欲為不軌上曰不軌欲如何對曰欲圖社稷上乃可其奏軌法度也君君臣臣所謂法也為人臣而欲圖危社稷謂之不法誠是也而諸閹以此罪加之君子帝不之悟視元帝之不省召致延尉為下獄者暗又甚焉惡夫或謂李膺曰可去矣對曰事不辭難罪不逃刑臣之節也左傳羊舌赤之言曰事君不辟難有罪不逃刑死生有命去將安之乃詣詔獄考死門生故吏並被禁錮被皮議翻侍御史蜀郡景毅子顧為膺門徒未有録牒不及於譴録紀也牒籍也時聚徒教授多者以千計各録記其姓名於譜牒本謂膺賢遣子師之豈可以漏脫名籍苟安而已遂自表免歸汝南督郵吳導受詔捕范滂至征羌抱詔書閉傳舍征羌縣屬汝南郡本當鄉縣光武以來歙有平羌之功改為征羌侯國以封之因名焉滂縣人也賢曰傳驛舍也音知戀翻征羌故城在今豫州郾陵縣東南一縣不知所為滂聞之曰必為我也為于偽翻即自詣獄縣令郭揖大驚出解印綬引與俱亡曰天下大矣子何為在此滂曰滂死則禍塞何敢以罪纍君塞悉則翻纍力瑞翻又令老母流離乎其母就與之訣滂白母曰仲博孝敬足以供養仲博滂弟字也供俱用翻養羊尚翻存亡各得其所惟大人割不可忍之恩勿增感戚仲博者滂弟也龍舒君者滂父龍舒侯相顯也相息帝翻母曰汝今得與李杜齊名死亦何恨李杜謂李膺杜密復求壽考可兼得乎復扶又翻滂跪受教再拜而辭顧其子曰吾欲使汝為惡惡不可為使汝為善則我不為惡行路聞之莫不流涕凡黨人死者百餘人妻子皆徙邊天下豪桀及儒學有行義者行下孟翻宦官一切指為黨人有怨隙者因相陷害睚眥之忿濫入黨中睚牛懈翻眥士懈翻州郡承旨或有未嘗交關亦離禍毒離與罹同遭也廢禁謂廢棄而禁錮郭泰聞黨人之死私為之慟曰詩云人之云亡邦國殄瘁為于偽翻詩大雅瞻卬之辭毛氏曰殄盡也瘁病也瘁似醉翻漢室滅矣但未知瞻烏爰止于誰之屋耳詩小雅正月之辭毛氏注曰富人之屋烏所集也鄭氏曰視烏集於富人之屋以言今民亦當求明君而歸之考異曰范書以泰此語為哭陳竇袁紀以為哭三君八俊今從之好呼到翻否音鄙而不為危言核論核謂深探其實也刻核也處昌呂翻張儉亡命困迫望門投止望門而投之以求止舍困急之甚也行下孟翻破家相容後流轉東萊止李篤家外黃令毛欽操兵到門考兩漢志外黃縣屬陳留郡黃縣屬東萊郡毛欽蓋為黃縣令外字衍操千高翻張儉負罪亡命篤豈得藏之若審在此此人名士明廷寧宜執之乎欽因起撫篤曰蘧伯玉恥獨為君子足下如何專取仁義篤曰今欲分之明廷載半去矣賢曰明廷猶言明府言不執儉得義之半也篤導儉經北海戲子然家戲許宜翻姓譜伏戲氏之後遂入漁陽出塞其所經歷伏重誅者以十數連引收考者布遍天下宗親並皆殄滅郡縣為之殘破為于偽翻儉與魯國孔褎有舊亡抵褎不遇賢曰抵歸也年十六匿之後事泄儉得亡走國相收褎融送獄相息亮翻未知所坐融曰保納舍藏者融也當坐謂自保無他而納儉因舍止而藏匿之彼來求我非弟之過吏問其母母曰家事任長任音壬長知兩翻妾當其辜一門爭死郡縣疑不能決乃上讞之賢曰前書音義曰讞請也上時掌翻讞音宜桀翻詔書竟坐褎及黨禁解儉乃還鄉里後為衛尉卒年八十四儉傳云建安初徵為衛尉不得已而起儉見曹氏世德已萌乃闔門縣車不豫政事歲餘卒於許下歎曰孽自己作空汙良善汙烏路翻一人逃死禍及萬家何以生為乃自翦須變形須與鬚同慮音廬隱姓名為冶家傭親突煙炭形貌毀瘁瘁似醉翻積二三年人無知者馥弟靜載縑帛追求餉之馥不受曰弟奈何載禍相餉乎黨禁未解而卒初中常侍張讓父死歸葬潁川雖一郡畢至而名士無往者讓甚恥之陳實獨弔焉及誅黨人讓以實故多所全宥南陽何顒素與陳蕃李膺善亦被收捕顒魚容翻被皮義翻乃變名姓匿汝南間與袁紹為奔走之交常私入雒陽從紹計議為諸名士罹黨事者求救援設權計使得逃隱所全免甚衆初太尉袁湯三子成逢隗成生紹逢生術據術字公路當讀如月令審端徑術之術音遂又據説文術邑中道讀從入聲則二音皆通隗五罪翻逢隗皆有名稱少歷顯官稱尺證翻少詩照翻時中常侍袁赦考異曰袁紀作袁朗今從范書袁隗傳與之同姓推崇以為外援故袁氏貴寵於世富奢甚不與他公族同紹壯健有威容愛士養名賓客輻湊歸之輜軿柴轂填接街陌賢曰説文曰軿車衣車也鄭玄注周禮曰軿猶屏也取其自蔽隱柴轂賤者之車袁紹事始此黨錮既死而誅宦官者二袁也人不為善而欲去害己者天其許之乎逢從兄子閎少有操行俠戶頰翻從才用翻少詩照翻行下孟翻以耕學為業逢隗數饋之無所受數所角翻閎見時方險亂而家門富盛常對兄弟歎曰吾先公福祚後世不能以德守之而競為驕奢與亂世爭權此即晉之三郤矣先公謂袁安也三郤謂晉大夫郤錡郤犨郤至也郤氏世為晉卿三子者憑藉世資驕奢侵權為厲公所殺閎欲投迹深林以母老不宜遠遁乃築土室四周於庭不為戶自牖納飲食母思閎時往就視母去便自掩閉兄弟妻子莫得見也潛身十八年卒於土室初范滂等非訐朝政賢曰訐謂橫議是非也訐居謁翻朝直遙翻折而設翻下遐稼翻大學生爭慕其風以為文學將興處士復用申屠蟠獨歎曰昔戰國之世處士橫議列國之王至為擁篲先驅史記鄒衍如燕昭王擁篲先驅請列弟子之座而受業築碣石宮身親往師之處昌呂翻復扶又翻橫戶孟翻為于偽翻篲祥歲翻事見七卷秦始皇三十四年三十五年卒子恤翻乃絶迹於梁碭之間碭音唐因樹為屋自同傭人居二年滂等果罹黨錮之禍唯蟠超然免於評論臣光曰天下有道君子揚于王庭以正小人之罪而莫敢不服天下無道君子囊括不言以避小人之禍而猶或不免坤之六四居近五之位而無相得之義乃上下閉隔之時㣥陰既盛故當括囊以避禍夬以五陽決一陰小人衰微君子道盛故可揚于玉庭以聲小人之罪不在其位四海橫流而欲以口舌救之臧否人物橫戶孟翻否音鄙激濁揚清撩虺蛇之頭撩連條翻蹺章乙十六行本蹺作踐乙十一行本同孔本同退齋校同熊校同虎狼之尾以至身被淫刑被皮義翻禍及朋友士類殲滅而國隨以亡不亦悲乎殲息廉翻夫唯郭泰既明且哲以保其身以尹吉甫美仲山甫者美郭泰不俟終日謂申屠蟠得豫之六二幾居希翻永康二年庚子晦日有食之永康二年十一月太尉劉寵免太僕扶溝郭禧為太尉永康二年鮮卑寇並州永康二年長樂太僕曹節病困詔拜車騎將軍有頃疾瘳上印綬上時掌翻復為中常侍位特進秩中二千石永康二年高句驪王伯固寇遼東玄菟太守耿臨討降之句如字又音駒驪力知翻三年永康三年春三月丙寅晦日有食之永康三年徵段熲還京師拜侍中熲在邊十餘年未嘗一日蓐寢熲古迥翻郭璞曰蓐席也與將士同甘苦故皆樂為死戰樂音洛所嚮有功永康三年夏四月太尉郭禧罷以太中大夫聞人襲為太尉永康三年秋七月司空劉囂羆八月以大鴻臚梁國橋玄為司空姓譜黃帝葬橋山子孫守冢因氏焉永康三年九月執金吾董寵坐矯永樂太后屬請下獄死屬之欲翻下遐稼翻永康三年冬鬱林太守谷永以恩信招降烏滸人十餘萬萬震曰烏滸之地在廣州之南交州之北賢曰烏滸南方夷號也廣州記曰其俗食人以鼻飲酒口中進噉如故劉昫曰貴州鬱平縣漢鬱林廣鬱縣地古西甌駱越所居谷永招降烏滸開置七縣即此也杜佑曰烏滸地在今南海郡之西南安南府北朔寧郡管滸呼古翻受寇帶開置七縣永康三年涼州刺史扶風孟他賢曰他音駝遣從事任涉將敦煌兵五百人與戊己校尉章乙十六行本校尉作司馬乙十一行本同曹寬西域長史張宴將焉耆龜茲車師前後部合三萬餘人討疏勒以元年疏勒弒其王也任音壬敦徒門翻校戶教翻龜茲音丘慈四十餘日不能下引去其後疏勒王連相殺害朝廷亦不能復治復扶又翻治直之翻初中常侍張讓有監奴典任家事威形喧赫喧況遠翻孟他資産饒贍贍而豔翻與奴朋結傾竭饋問無所遺愛言其泛愛無有遺者問其所欲他曰吾望汝曹為我一拜耳為于偽翻時賓客求謁讓者車常數百千兩兩音亮他詣讓後至不得進監奴乃率諸倉頭迎拜於路遂共輿車入門輿羊茹翻賓客咸驚謂他善於讓皆爭以珍玩賂之他分以遺讓遺于季翻讓大喜由是以他為涼州刺史四年永康四年春正月甲子帝加元服赦天下唯黨人不赦永康四年二月癸卯地震永康四年三月辛酉朔日有食之永康四年太尉聞人襲免以太僕汝南李咸為太尉永康四年大疫司徒許訓免以司空橋玄為司徒夏四月以太常南陽來豔為司空永康四年秋七月司空來豔免永康四年癸丑立貴人宋氏為皇后后執金吾酆之女也永康四年司徒橋玄免以太常南陽宗俱為司空前司空許栩為司徒永康四年帝以竇太后有援立之功冬十月戊子朔率㣥臣朝太后於南宮親饋上壽朝直遙翻饋進食也黃門令董萌因此數為太后訴冤數所角翻為于偽翻帝深納之供養資奉有加於前共居用翻養羊尚翻曹節王甫疾之誣萌以謗訕永樂宮帝母孝仁董太后所居也樂音洛下遐稼翻永康四年鮮卑寇並州王崇武標點容肇祖聶崇岐覆校
