body:
  text: 資治通鑑卷第一百五十端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注梁紀六高祖武皇帝六普通五年甲辰五二四春正月辛丑魏主祀南郊三月魏以臨淮王彧都督北討諸軍事討破六韓拔陵拔陵反見上卷上年夏四月高平鎮民赫連恩等反推敕勒酋長胡琛為高平王酋慈秋翻長知兩翻攻高平鎮以應拔陵魏將盧祖遷擊破之琛北走將即亮翻衛可孤攻懷朔鎮經年外援不至楊鈞使賀拔勝詣臨淮王彧告急勝募敢死少年十餘騎夜伺隙潰圍出賊騎追及之勝曰我賀拔破胡也少詩照翻騎奇寄翻伺相吏翻賀拔勝字破胡賊不敢逼勝見彧於雲中考異曰勝傳云至朔州見彧按後魏地理志雲中舊名朔州及改懷朔鎮為朔州不容更以雲中為朔州今但云雲中按魏氏初都平城北邊列置諸鎮孝昌以後改鎮為州尋即荒廢其地漫不可考杜佑以為魏都平城於郡北三百餘里置懷朔鎮又云遷洛之後於郡北三百餘里置朔州又云後魏初雲中在郡北三百餘里定襄故城北夫其曰皆在郡北三百餘里將是一處邪將是三處邪宋白曰朔州馬邑郡東北至故雲中二百六十里後魏為畿內之地亦曾為懷朔鎮孝文遷洛之後於州北三百八十里定襄故城置朔州又曰後魏初雲中定襄故城是則是朔州與後魏初雲中共一處通鑑此後書改懷朔鎮為朔州更命朔州為雲州此即魏志所謂雲中舊名朔州之證也是則懷朔鎮與雲中是兩處矣是後李崇自崔暹白道之敗引還雲中後又自雲中引還平城其退師道里先後可見而唐之雲中郡乃魏之平城詳而考之歷代建置州郡其名淆雜難指一處為定也懷朔被圍旦夕淪陷大王今頓兵不進懷朔若陷則武川亦危賊之鋭氣百倍雖有良平不能為大王計矣彧許為出師勝還復突圍而入鈞復遣勝出覘武川説式芮翻許為于偽翻復扶又翻下聊復同覘丑廉翻又丑廉翻又丑艷翻武川已陷勝馳還懷朔亦潰勝父子俱為可孤所虜五月臨淮王彧與破六韓拔陵戰於五原五原即漢五原郡地魏收志朔州治五原杜佑曰魏置朔州於懷朔鎮在唐朔州馬邑郡北三百餘里今榆林九原即漢之五原郡地蓋漢之五原壤地甚廣唐之豐勝朔三州皆漢之五原郡地魏收志朔州附化郡有五原縣彧與拔陵當戰于此彧坐削除官爵安北將軍隴西李叔仁又敗於白道武川鎮北有白道谷谷口有白道城自城北出有高阪謂之白道嶺魏主引丞相令僕尚書侍中黃門於顯陽殿問之曰今寇連恆朔逼近金陵魏未遷洛以前諸帝皆葬雲中之金陵恆戶登翻近其靳翻吏部尚書元修義請遣重臣督軍鎮恆朔以捍寇帝曰去歲阿那王褱叛亂遣李崇北征崇上表求改鎮為州朕以舊章難革不從其請尋崇此表開鎮戶非冀之心致有今日之患但既往難追聊復略論耳然崇貴戚重望李崇文成皇后兄誕之子歷方面有時望意欲遣崇行何如僕射蕭寶寅等皆曰如此實合㣥望崇曰臣以六鎮遐僻密邇寇戎杜佑曰六鎮並在今馬邑雲中單于界豈敢導之為亂臣罪當就死陛下赦之今更遣臣北行正是報恩改過之秋但臣年七十加之疲病不堪軍旅願更擇賢材帝不許修義天賜之子也天賜見一百三十三卷宋明帝泰始七年臣光曰李崇之表乃所以銷禍於未萌制勝於無形魏肅宗既不能用及亂生之後曾無愧謝之言乃更以為崇罪彼不明之君烏可與謀哉詩云聽言則對誦言如醉匪用其良覆俾我悖詩桑柔之辭也注云見道聽之言則應答之見誦詩書之言則冥臥如醉不能用善反使我為悖逆之行壬申加崇使持節開府儀同三司北討大都督使疏吏翻命撫軍將軍崔暹鎮軍將軍廣陽王深皆受崇節度深嘉之子也按魏收魏書作廣陽王淵李延壽北史作廣陽王深蓋避唐諱通鑑承用之廣陽王嘉見一百四十三卷齊東昏侯永元元年考異曰魏帝紀深作淵今從列傳及北史六月以豫州刺史裴邃督征討諸軍事以伐魏魏自破六韓拔陵之反二夏豳涼寇盜蜂起二夏夏州及東夏州也魏收地形志夏州治統萬領化政闡熙金明代名郡東夏州領偏城朔方定陽上郡宋白曰魏改統萬鎮為東夏州後改延州按魏克統萬以為鎮太和十一年改夏州延昌二年置東夏州治廣武唐始改為延州治膚施後魏太和元年置廣武縣後周改豐林縣隋分豐林金明置膚施縣唐延州治焉則魏東夏州治廣武非統萬也然魏收地形志以廣武為太原鴈門之廣武亦誤皇興二年置華州於北地太和十一年改為班州十四年為豳州領北地趙興襄樂郡涼州領武安臨松建昌番和泉城武興武威昌松東涇涼寧郡夏戶雅翻政刑殘虐在下皆怨是月城內薛珍等聚黨突入州門擒彥殺之推其黨莫折大提為帥莫折虜復姓帥所類翻魏遣雍州刺史元志討之雍於用翻初南秦州豪右楊松柏兄弟數為寇盜數所角翻刺史博陵崔遊誘之使降引為主簿接以辭色使説下㣥氐誘音酉説式芮翻既而因宴會盡收斬之由是所部莫不猜懼遊聞李彥死自知不安欲逃去未果城民張長命韓祖香孫掩等攻遊殺之以城應大提大提遣其黨卜胡襲高平克之殺鎮將赫連略行臺高元榮大提尋卒卒子恤翻子念生自稱天子置百官改元天建丁酉魏大赦秋七月甲寅魏遣吏部尚書元修義兼尚書僕射為西道行臺帥諸將討莫折念生帥讀曰率崔暹違李崇節度與破六韓拔陵戰于白道大敗單騎走還騎奇寄翻拔陵並力攻崇崇力戰不能禦引還雲中與之相持廣陽王深上言先朝都平城上時掌翻朝直遙翻以北邊為重盛簡親賢擁麾作鎮謂鎮將也以死防遏非唯不廢仕宦乃更獨得復除高門子弟謂其先世與魏同起於代北者所謂大姓九十九復方目翻欣慕為之太和中僕射李沖用事涼州土人悉免廝役李寶自敦煌入朝于魏至子沖親貴厚其鄉人故涼土之人悉免廝役仍防邊戍自非得罪當世莫肯與之為伍本鎮驅使但為虞候白直杜佑曰白直無月給不過軍主然其同族留京師者得上品通官在鎮者即為清途所隔或多逃逸乃峻邊兵之格鎮人不聽浮遊在外於是少年不得從師長者不得遊宦少詩照翻長知兩翻獨為匪人言之流涕自定鼎伊洛邊任益輕唯底滯凡才乃出為鎮將轉相模習專事聚斂或諸方姦吏犯罪配邊為之指蹤政以賄立邊人無不切齒及阿那王褱背恩縱掠斂力贍翻背蒲妹翻發奔命追之十五萬衆度沙漠不日而還事見上卷上年還從宣翻又如字遂自意輕中國師速而疾邊人見其不能盡敵而反意遂輕之抑亦先覺朝廷未許而高闕戍主御下失和酈道元曰趙武靈王既襲胡服自代並陰山下至高闕為塞山下有長城長城之際連山刺天其山中斷兩岸雙闕雲舉望若闕焉故有高闕之名自闕北出荒中闕口有城跨山結局謂之高闕戍遂相帥為亂帥讀曰率攻城掠地所過夷滅王師屢北賊黨日盛此段之舉指望銷平而崔暹隻輪不返臣崇與臣逡巡復路復路者還即舊路也將士之情莫不解體今日所慮非止西北將恐諸鎮尋亦如此天下之事何易可量書奏不省為魏主思崇深之言張本易以豉翻量音良省悉景翻詔徵崔暹繫廷尉暹以女妓田園賂元叉卒得不坐妓渠綺翻卒子恤翻下卒無同丁丑莫折念生遣其都督楊伯年攻仇鳩河池二戍河池即今鳳州河池縣有河池水仇鳩亦當與河池相近斬首千餘級東益州本氐王楊紹先之國天監五年魏克武興滅楊紹先之國置東益州二秦反者皆其族類請先收其器械子建曰城民數經行陳數所角翻行戶剛翻撫之足以為用急之則腹背為患乃悉召城民慰諭之既而漸分其父兄子弟外戍諸郡內外相顧卒無叛者卒子恤翻子建蘭根之族兄也魏涼州幢帥于菩提等執刺史宋穎據州反幢傳江翻帥所類翻菩薄乎翻八月庚寅徐州刺史成景俊拔魏童城童城即下邳僮縣城也魏員外散騎侍郎李苗上書曰凡食少兵精利於速戰散悉亶翻騎奇寄翻上時掌翻少詩沼翻糧多卒衆事宜持久今隴賊猖狂非有素蓄雖據兩城兩城謂天水及高平其勢在於疾攻日有降納降戶江翻遲則人情離沮坐待崩潰夫飈至風舉逆者求萬一之功高壁深壘王師有全制之策但天下久泰人不曉兵奔利不相待逃難不相顧難乃旦翻將無法令士非教習不思長久之計各有輕敵之心如令隴東不守汧軍敗散汧軍謂元志之軍也汧在隴阪之東將即亮翻汧口堅翻兩秦謂莫折念生及張長命等國之右臂於斯廢矣宜敕大將堅壁勿戰別命偏裨帥精兵數千出麥積崖以襲其後麥積崖在今秦州天水縣東百里狀如麥積故名裨賓彌翻帥讀曰率㣥妖自散妖於驕翻魏以苗為統軍與別將淳于誕俱出梁益章十二行本益下有隸魏子建四字乙十一行本同孔本同張校同退齋校同未至莫折念生遣其弟高陽王天生將兵下隴甲午都督元志與戰於隴口隴口隴坻之口也棄衆東保岐州魏岐州治雍城東西部敕勒皆叛魏附於破六韓拔陵魏主始思李崇及廣陽王深之言丙申下詔諸州鎮軍貫貫籍也皆免為民改鎮為州以懷朔鎮為朔州更命朔州曰雲州魏先置朔州於雲中之盛樂以漢五原郡地為懷朔鎮今以懷朔為朔州改舊朔州為雲州因雲中郡而得名也按後廣陽王深自五原拔軍向朔州則懷朔鎮雖置於漢五原郡地與五原別為兩城宋白曰漢五原故城在唐勝州榆林縣界後魏孝文於唐朔州北三百八十里定襄故城置朔州更工衡翻遣兼黃門侍郎酈道元為大使撫慰六鎮使疏吏翻時六鎮已盡叛道元不果行先是代人遷洛者多為選部所抑不得仕進先悉薦翻選須絹翻及六鎮叛元叉乃用代來人章十二行本人上有寒字乙十一行本同孔本同張校同退齋校同為傳詔以慰悅之廷尉評代人山偉奏記稱叉德美叉擢偉為尚書二千石郎廷尉評即漢之廷尉平魏晉以來平旁加言今大理評事即其職也後漢尚書有二千石曹魏置二千石郎魏收官氏志內入諸姓土難氏後改為山氏秀容人乞伏莫于聚衆攻郡殺太守水經注魏立秀容護軍以統胡人其治所去汾水六十里地形志永興二年置秀容郡屬肆州丁酉南秀容牧子萬于乞真章十二行本真下有反字乙十一行本同孔本同張校同退齋校同殺太僕卿陸延秀容酋長爾朱榮討平之榮羽健之玄孫也羽健見一百一十卷晉安帝隆安二年酋慈秋翻長知兩翻嘗出獵部民射虎誤中其髀代勤拔箭不復推問射而亦翻中竹仲翻復扶又翻所部莫不感悅官至肆州刺史賜爵梁郡公年九十餘而卒卒子恤翻子新興立新興時畜牧尤蕃息蕃扶元翻牛羊駝馬色別為㣥彌漫川谷不可勝數勝音升魏每出師新興輒獻馬及資糧以助軍高祖嘉之新興老請傳爵於子榮魏朝許之朝直遙翻榮神機明決御衆嚴整時四方兵起榮陰有大志散其畜牧資財招合驍勇結納豪桀爾朱榮事始此驍堅堯翻時魏於懷朔鎮置朔州並置太安郡顯度顯智之兄也戊戌莫折念生遣都督竇雙攻魏盤頭郡盤頭郡屬東益州五代志興州長舉縣魏置盤頭郡九月戊申成景俊拔魏睢陵戊午北兗州刺史趙景悅圍荊山梁北兗州治淮陰水經注曰地理志平阿縣有當塗山淮出於荊山之左當塗之右魏收志梁北徐州沛郡已吾縣有當塗山荊山今之懷遠軍正據荊山以沈約志言之皆屬馬頭郡界五代志鍾離郡塗山縣古當塗也後齊置荊山郡帥讀曰率騎奇寄翻壬戌夜斬關而入克其外郭魏揚州刺史長孫稚禦之一日九戰後軍蔡秀成失道不至邃引兵還別將擊魏淮陽此梁所遣別將也非裴邃所部將即亮翻下同琛丑林翻安樂王鑒救淮陽鑒詮之子也樂音洛詮丑緣翻安樂王詮事見一百四十六卷天監五年魏西道行臺元修義得風疾不能治軍治直之翻壬申魏以尚書左僕射齊王蕭寶寅為西道行臺大都督帥諸將討莫折念生為蕭寶寅以關中叛魏張本宋穎密求救於吐谷渾王伏連籌吐從暾入聲谷音浴于菩提棄城走追斬之城民趙天安等復推宋穎為刺史復扶又翻河間王琛軍至西硤石解渦陽圍復荊山戍青冀二州刺史王神念與戰為琛所敗敗補邁翻冬十月戊寅裴邃元樹攻魏建陵城克之辛巳拔曲木曲木當作曲沭水經注沭水過建陵縣故城東又南徑陵山西魏立大堰遏水西流兩瀆之會置城防之曰曲沭戍沭食聿翻魏營州城民劉安定就德興魏書官氏志菟賴氏改為就氏西方諸姓也據城反城民王惡兒斬安定以降德興東走自稱燕王降戶江翻燕因肩翻胡琛遣其將宿勤明達寇豳夏北華三州魏高祖太和十五年置東秦州於杏城後改為北華州領中部敷城凡二郡宿勤虜復姓夏戶雅翻華戶化翻章十二行本魏上有壬午二字乙十一行本同孔本同張校同遣都督北海王皓帥諸將討之皓詳之子也詳得罪見一百四十五卷天監三年帥讀曰率甲申彭寶孫拔檀丘辛卯裴邃拔狄城水經注肥水自荻丘過漢九江成德縣故城西王莽更曰平阿又北入芍陂丙申又拔甓城進屯黎漿壬寅魏東海太守韋敬欣以司吾城降漢東海郡司吾縣之故城也甲辰又拔秦墟魏守將多棄城走水經注洛水徑漢淮南郡曲陽故城東應劭曰縣在淮曲之陽洛水又北歷秦墟下注淮謂之洛口魏收志曲陽縣屬霍州北沛郡五代志曲陽縣後廢入鍾離定遠縣魏使黃門侍郎盧同持節詣營州慰勞就德興降而復反詔以同為幽州刺史兼尚書行臺同屢為德興所敗而還勞力到翻復扶又翻敗補邁翻還從宣翻又如字魏朔方胡反圍夏州刺史源子雍夏戶雅翻夏州治統萬城城中食盡煮馬皮而食之衆無二心子雍欲自出求糧留其子延伯守統萬將佐皆曰今四方離叛糧盡援絶不若父子俱去子雍泣曰吾世荷國恩當畢命此城但無食可守故欲往東州荷下可翻東州謂東夏州也為諸君營數月之食為于偽翻若幸而得之保全必矣乃帥羸弱詣東夏州運糧帥讀曰率羸倫為翻延伯與將佐哭而送之子雍行數日胡帥曹阿各拔邀擊擒之帥所類翻子雍潛遣人齎書敕城中努力固守闔城憂懼延伯諭之曰吾父吉凶未可知方寸焦爛但奉命守城所為者重為于偽翻下為陳同不敢以私害公諸君幸得此心於是衆感其義莫不奮勵子雍雖被擒胡人常以民禮事之子雍為陳禍福勸阿各拔降會阿各拔卒其弟桑生竟帥其衆隨子雍降降戶江翻子雍見行臺北海王皓具陳諸賊可滅之狀皓給子雍兵令其先驅時東夏州闔境皆反所在屯結子雍轉鬬而前九旬之中凡數十戰遂平東夏州徵稅粟以饋統萬二夏由是獲全子雍懷之子也史言源氏諸子皆有才具而天降喪亂終無救魏氏之衰也魏廣陽王深上言今六鎮盡叛高車二部亦與之同高車自阿伏至羅與窮奇分為二部所謂東西部敕勒也必無勝理不若選練精兵守恆州諸要諸要謂要衝之地恆戶登翻遂與李崇引兵還平城崇謂諸將曰雲中者白道之衝以此觀之則魏之雲中漢之盛樂縣唐之振武軍節度使治所皆雲山之陽咽音煙若此地不全則並肆危矣當留一人鎮之誰可者衆舉費穆崇乃請穆為朔州刺史請奏請也時雲中已改為雲州朔當作雲賀拔度拔父子及武川宇文肱糾合鄉里豪傑共襲衛可孤殺之度拔尋與鐵勒戰死肱逸豆歸之玄孫也肱宇文泰之父也逸豆歸晉康帝建元二年為慕容皓所滅李崇引國子博士祖瑩為長史廣陽王深奏瑩詐增首級盜沒軍資瑩坐除名崇亦免官削爵徵還深專總軍政為深內困於讒外困於賊張本莫折天生進攻魏岐州十一月戊申陷之執都督元志及刺史裴芬之送莫折念生殺之念生又使卜胡等寇涇州敗光祿大夫薛巒於平涼東魏置平涼郡治鶉陰縣有平涼城敗補邁翻安都之孫也宋泰始初薛安都降魏丙辰彭寶孫拔魏東莞莞音官壬戌裴邃攻壽陽之安城魏收志梁置新興郡治安城縣丙寅馬頭安城皆降高平人攻殺卜胡共迎胡琛魏以黃門侍郎楊昱兼侍中持節監北海王皓軍以救豳州豳州圍解監工銜翻蜀賊張映龍薑神達攻雍州蜀賊者蜀人之徙關中者也乘魏亂起而為盜因謂之蜀賊後爾朱天光西討蜀賊斷路皆其黨也雍於用翻一日一夜書移九通都督李叔仁遲疑不赴昱曰長安關中基本若長安不守大軍自然瓦散留此何益遂與叔仁進擊之斬神達餘黨散走十二月戊寅魏荊山降壬辰魏以京兆王繼為太師大將軍都督西道諸軍以討莫折念生乙巳武勇將軍李國興攻魏平靖關辛丑信威長史楊乾攻武陽關壬寅攻峴關此義陽之三關也峴戶典翻國興進圍郢州魏郢州刺史裴詢與蠻酋西郢州刺史田朴特相表裏以拒之魏郢州治義陽西郢州又當在義陽之西蠻中也酋慈秋翻近其靳翻魏援軍至國興引還詢駿之孫也裴駿見一百二十四卷宋文帝元嘉二十二年魏汾州諸胡反魏孝文帝太和十二年置汾州治蒲子領西河吐京五城定陽凡四郡將兵討之將即亮翻魏魏子建招諭南秦諸氐稍稍降附遂復六郡十二戍斬章十二行本斬下有賊帥二字乙十一行本同孔本同韓祖香魏以子建兼尚書為行臺刺史如故刺史謂子建本為東益州刺史魏置梁州於南鄭置巴州於漢巴西郡置益州於晉壽郡東益州於武興郡秦州於上邽南秦州於仇池莫折念生遣兵攻涼州城民趙天安復執刺史以應之復扶又翻是歲侍中太子詹事周捨坐事免散騎常侍錢唐朱代掌機密軍旅謀議方鎮改易朝儀詔敕皆典之好文義多藝能精力敏贍上以是任之為朱亂梁張本散悉亶翻騎奇寄翻羊吏翻好呼到翻朝直遙翻六年乙巳五二五春正月丙午雍州刺史晉安王綱遣安北長史柳渾破魏南鄉郡司馬董當門破魏晉城庚戌又破馬圈雕陽二城雍於用翻圈求遠翻辛亥上祀南郊大赦魏徐州刺史元法僧素附元叉見叉驕恣恐禍及己遂謀反魏遣中書舍人張文伯至彭城法僧謂曰吾欲與汝去危就安能從我乎文伯曰我寧死見文陵松柏文陵謂孝文帝陵法僧殺之庚申法僧殺行臺高諒稱帝考異曰法僧傳作高謨今從魏帝紀又魏紀云自稱宋王法僧傳及北史皆云稱尊號梁書法僧傳云稱帝按法僧立諸子為王必稱帝也今從梁書立諸子為王魏發兵擊之法僧乃遣其子景仲來降降戶江翻考異曰法僧傳云魏室大亂法僧據鎮議欲匡復既而魏亂稍定將討法僧法僧懼歸款按時魏亂未定今從北史安東長史元顯和麗之子也元麗見一百四十六卷天監五年法僧擒之執其手命使共坐顯和不肯曰與翁皆出皇家元法僧陽平王熙之曾孫熙道武子也元麗小新成之孫小新成景穆之子顯和麗之子也以族屬長幼之次呼法僧為翁獨不畏良史乎法僧猶欲慰諭之顯和曰我寧死為忠鬼不能生為叛臣乃殺之上使散騎常侍朱使於法僧以宣城太守元略為大都督元略來奔見上卷四年使疏吏翻將即亮翻莫折天生軍於黑水水經注就水出南山就谷北流與黑水合黑水上合三泉於就水之右三泉奇發言歸一瀆北流會于就水就水又北流注于渭魏以岐州刺史崔延伯為征西將軍西道都督帥衆五萬討之延伯與行臺蕭寶寅軍于馬嵬延伯素驍勇寶寅趣之使戰帥讀曰率嵬五回翻驍堅堯翻趣讀曰促延伯曰明晨為公參賊勇怯乃選精兵數千西渡黑水整陳向天生營為于偽翻陳讀曰陳寶寅軍于水東遙為繼援延伯直抵天生營下揚威脅之徐引兵還天生見延伯衆少少詩沼翻爭開營逐之其衆多於延伯十倍蹙延伯於水次寶寅望之失色延伯自為後殿殿丁練翻不與之戰使其衆先渡部伍嚴整天生兵不敢擊須臾渡畢延伯徐渡天生之衆亦引還寶寅喜曰崔君之勇關張不如關張謂關羽張飛也此賊非老奴敵也明公但安坐觀老奴破之癸亥延伯勒兵出寶寅舉軍繼其後天生悉衆逆戰延伯身先士卒先悉薦翻陷其前鋒將士盡鋭競進大破之俘斬十餘萬追奔至小隴隴山有大隴山小隴山大隴山在清水縣東北小隴山在岐州武都郡南田縣西北五代志南田作南由南由唐隴州之吳山縣即其地將士稽留採掠天生遂塞隴道塞悉則翻由是諸軍不能進寶寅破宛川五代志扶風郡陳倉縣後魏曰宛川以美女十人賞岐州刺史魏蘭根蘭根辭曰此縣介於強寇不能自立故附從以救死官軍之至宜矜而撫之奈何助賊為虐翦以為賤役乎悉求其父兄而歸之乙章十二行本乙作己乙十一行本同張校同巳裴邃拔魏新蔡郡魏收志新蔡郡治石母臺隋廢為縣唐以後屬蔡州南兗州刺史豫章王綜與諸將繼進將即亮翻癸酉裴邃拔鄭城水經注潁水過慎縣故城南而東南流徑蜩蟟郭東俗謂之鄭城又東南入淮所在響應魏河間王琛等憚邃威名軍於城父城父縣漢屬沛郡魏晉以來屬譙郡宋併城父為浚儀縣屬陳留郡郡寄治譙郡長垣縣界魏收志陳留郡浚儀縣注有城父城父音甫魏朝遣廷尉少卿崔孝芬持節齎齋庫刀以趣之齋庫刀千牛刀也齎刀以趣其進言若復逗留將斬之也朝直遙翻挺之子也琛至壽陽欲出兵決戰長孫稚以為久雨未可出琛不聽引兵五萬出城擊邃邃為四甄以待之使直閣將軍李祖憐先挑戰而偽退甄稽延翻挑徒了翻稚琛悉衆追之四甄競發魏師大敗斬首萬餘級琛走入城稚勒兵而殿遂閉門自固不敢復出殿丁練翻復扶又翻魏安樂王鑒將兵討元法僧擊元略於彭城南略大敗樂音洛考異曰魏帝紀敘元略等事便在庚申法僧叛下不應如此之速今移於月末與數十騎走入城鑒不設備法僧出擊大破之鑒單騎奔歸騎奇寄翻將軍王希聃拔魏南陽平宋僑置陽平郡於沛郡南界後入于魏為南陽平郡以別相州之古陽平郡也後又徙郡寄治彭城聃他甘翻曇尚虎子之子也薛虎子事魏孝文帝歷州鎮有聲績曇徒含翻甲戌以法僧為司空封始安郡公魏以安豐王延明為東道行臺臨淮王彧為都督以擊彭城魏以京兆王繼為太尉二月乙未趙景悅拔魏龍亢龍亢縣漢屬沛郡晉屬譙國魏太和十九年置下蔡郡龍亢屬焉五代志潁州潁上縣舊置下蔡郡晉灼曰亢音剛初魏劉騰既卒騰卒見上卷四年元叉亦自寬時出遊於外留連不返其所親諫叉不納太后察知之去秋太后對帝謂㣥臣曰今隔絶我母子不聽往來復何用我為復扶又翻下無復同我當出家修道於嵩山間居寺耳魏作間居寺見一百四十七卷天監八年帝及㣥臣叩頭泣涕殷勤苦請太后聲色愈厲帝乃宿於嘉福殿積數日遂與太后密謀黜叉然帝深匿形迹太后有忿恚欲得往來顯陽之言皆以告叉魏主常居顯陽殿故太后欲往來恚於避翻敘太后欲出家憂怖之心日有數四怖普布翻叉殊不以為疑乃勸帝從太后所欲於是太后數御顯陽殿二宮無復禁礙叉舉元法僧為徐州法僧反太后數以為言數所角翻叉深愧悔丞相高陽王雍雖位居叉上而深畏憚之會太后與帝遊洛水雍邀二宮幸其第日晏帝與太后至雍內室從官皆不得入從才用翻遂相與定圖叉之計於是太后謂叉曰元郎若忠於朝廷無反心何故不去領軍以餘官輔政去羌呂翻叉甚懼免冠求解領軍乃以叉為驃騎大將軍開府儀同三司尚書令侍中領左右驃匹妙翻騎奇寄翻戊戌魏大赦壬辰莫折念生遣都督楊鮓等攻仇池郡以上戊戌下三月己酉推之壬辰當作壬寅魏收志仇池郡屬東益州五代志漢陽郡上祿縣魏置仇池郡三月己酉上幸白下城履行六軍頓所行下孟翻乙丑命豫章王綜權頓彭城總督衆軍並攝徐州府事己巳以元法僧之子景隆為衡州刺史吳孫亮太平二年分長沙西部都尉立衡陽郡梁置衡州按五代志梁置衡州於南海含洭縣上召法僧及元略還建康法僧驅彭城吏民萬餘人南渡考異曰南史云武官戍彭城者三千餘人法僧皆印額為奴逼將南渡魏書梁書皆無此事上寵待甚厚元略惡其為人惡烏路翻與之言未嘗笑魏詔京兆王繼班師去年魏使繼西討今將誅其子叉故詔使班師北涼州刺史錫休儒等自魏興侵魏梁州攻直城梁置北梁州於魏興涼當作梁魏收志東梁州金城郡領直城縣五代志金州安康縣蕭察改直州蓋因直城以名州魏以其地出金故郡曰金城州曰金州錫姓也漢有錫光豎而庾翻休儒等敗還柔然王阿那王褱為魏討破六韓拔陵魏遣牒云具仁齎雜物勞賜之為于偽翻勞力到翻下同阿那王褱勒衆十萬自武川西向沃野屢破拔陵兵稽古録是年書蠕蠕殺破六韓拔陵在誅元叉之下四月魏主復遣中書舍人馮俊勞賜阿那王褱復扶又翻阿那王褱部落浸強自稱敕連頭兵豆伐可汗魏收曰魏言總攬也魏元叉雖解兵權猶總任內外殊不自意有廢黜之理胡太后意猶豫未決侍中穆紹勸太后速去之紹亮之子也穆氏從魏起於代北崇壽亮奕世貴顯去羌呂翻嬪毗賓翻宦官張景嵩説之云説式芮翻叉欲害嬪嬪泣訴於帝曰叉非獨欲害妾將不利於陛下帝信之因叉出宿解叉侍中明旦叉將入宮門者不納辛卯太后復臨朝攝政下詔追削劉騰官爵除叉名為民清河國郎中令韓子熙上書為清河王懌訟冤懌死見上卷元年復扶又翻書為于偽翻昔趙高柄秦令關東鼎沸事見秦紀使四方雲擾開逆之端起於宋維成禍之末良由劉騰宜梟首汙宮斬骸沈族以明其罪梟堅堯翻汙哀都翻沈持林翻太后命發劉騰之墓露散其骨籍沒家資盡殺其養子以子熙為中書舍人子熙麒麟之孫也韓麒麟見一百三十五卷齊武帝永明元年初宋維父辨常曰維性疏險必敗吾家李崇郭祚遊肇亦曰伯緒凶疏宋維字伯緒敗補邁翻若得殺身幸矣維阿附元叉超遷至洛州刺史魏初置洛州於洛陽荊州於上洛太和遷洛以洛州為司州又置荊州於穰城以上洛之荊州為洛州領上洛上庸魏興始平萇和郡尋賜死叉之解領軍也太后以叉黨與尚強未可猝制乃以侯剛代叉為領軍以安其意尋出剛為冀州刺史加儀同三司未至州黜為征虜將軍卒於家卒子恤翻太后欲殺賈粲以叉黨多恐驚動內外乃出粲為濟州刺史濟子禮翻尋追殺之籍沒其家唯叉以妹夫未忍行誅先是給事黃門侍郎元順以剛直忤叉意先悉薦翻忤五故翻出為齊州刺史太后徵還為侍中侍坐於太后坐徂臥翻叉妻在太后側順指之曰陛下奈何以一妹之故不正元叉之罪使天下不得伸其冤憤太后默然順澄之子也任城王雲及澄魏宗室之賢王也太后從容謂侍臣曰從千容翻劉騰元叉昔嘗邀朕求鐵券冀得不死朕賴不與韓子熙曰事關生殺豈繫鐵券且陛下昔雖不與何解今日不殺太后憮然憮罔甫翻朱元晦曰憮然猶悵然未幾有告叉及弟瓜謀誘六鎮降戶反於定州又招魯陽諸蠻侵擾伊闕伊闕在河南新城縣界隋開皇初改新城縣為伊闕縣幾居豈翻降戶江翻得其手書太后猶未忍殺之㣥臣固執不已魏主亦以為言太后乃從之賜叉及弟瓜死於家猶贈叉驃騎大將軍儀同三司尚書令驃匹妙翻騎奇寄翻江陽王繼廢於家病卒前幽州刺史盧同坐叉黨除名去年同為幽州刺史太后頗事粧飾數出遊幸元順面諫曰禮婦人夫沒自稱未亡人首去珠玉數所角翻去羌呂翻衣不文采陛下母臨天下年垂不惑四十而不惑何以儀刑後世太后慚而還宮召順責之曰千里相徵豈欲衆中見辱邪順曰陛下不畏天下之笑而恥臣之一言乎順與穆紹同直順因醉入其寢所紹擁被而起正色讓順曰身二十年侍中與卿先君亟連職事亟去吏翻數數也縱卿方進用何宜相排突也遂謝事還家詔諭久之乃起初鄭羲之兄孫儼為司徒胡國珍行參軍私得幸於太后人未之知蕭寶寅之西討以儼為開府屬開府有掾有屬儼請奉使還朝使疏吏翻朝直遙翻太后留之拜諫議大夫中書舍人領嘗張嘗作尚食典御晝夜禁中每休沐太后常遣宦者隨之儼見其妻唯得言家事而已中書舍人樂安徐紇粗有文學粗坐五翻先以諂事趙修坐徙枹罕趙修得罪見一百四十五卷天監二年枹音膚復除中書舍人又諂事清河王懌懌死出為鴈門太守還洛復諂事元叉叉敗太后以紇為懌所厚復召為中書舍人復扶又翻紇又諂事鄭儼儼以紇有智數仗為謀主仗直兩翻憑也紇以儼有內寵傾身承接共相表裏勢傾內外號為徐鄭儼纍遷至中書令車騎將軍騎奇寄翻紇纍遷至給事黃門侍郎仍領舍人總攝中書門下之事軍國詔令莫不由之紇有機辨強力終日治事略無休息不以為勞治直之翻時有急詔令數吏執筆或行或臥人別占之占口占也造七到翻不失事理人必小有才也然後能迎世取寵以竊一時之權朱徐紇是也專好小數見人矯為恭謹遠近輻湊附之為爾朱榮討徐鄭張本好呼到翻給事黃門侍郎袁翻李神軌皆領中書舍人為太后所信任時人云神軌亦得幸於太后衆莫能明也神軌求婚於散騎常侍盧義僖義僖不許黃門侍郎王誦謂義僖曰昔人不以一女易衆男引樂廣事事見八十五卷晉惠帝太安二年義僖曰所以不從者正為此耳為于偽翻從之恐禍大而速誦乃堅握義僖手曰我聞有命不敢以告人詩唐國風揚之水之辭也臨婚之夕太后遣中使宣敕停之內外惶怖義僖夷然自若使疏吏翻怖普布翻神軌崇之子義僖度世之孫也盧度世見宋紀胡琛據高平遣其大將萬俟醜奴宿勤明達等寇魏涇州琛丑林翻將即亮翻萬當作万音莫北翻章十二行本正作万孔本同張校同俟渠之翻万俟虜復姓北史曰万俟其先胸奴之別也將軍盧祖遷伊甕生討之不克蕭寶寅崔延伯既破莫折天生引兵會祖遷等於安定甲卒十二萬鐵馬八千軍威甚盛醜奴軍於安定西北七里時以輕騎挑戰騎奇寄翻挑徒了翻大兵未交輒委走延伯恃其勇且新有功遂唱議為先驅擊之別造大盾內為鎖柱使壯士負以趨謂之排城置輜重於中戰士在外自安定北緣原北上盾食尹翻重直用翻上時掌翻將戰有賊數百騎詐持文書云是降簿言是降人之名籍也降戶江翻下同寶寅延伯未及閲視宿勤明達引兵自東北至降賊自西競下覆背擊之覆或作腹逐北徑抵其營賊皆輕騎延伯軍雜步卒戰久疲乏賊乘間得入排城延伯遂大敗死傷近二萬人間古莧翻近其靳翻寶寅收衆退保安定延伯自恥其敗乃繕甲兵募驍勇驍堅堯翻下同復自安定西進去賊七里結營時賊屯安定西彭坑復扶又翻下復還復失同壬辰不告寶寅獨出襲賊大破之俄頃平其數柵賊見軍士採掠散亂復還擊之魏兵大敗延伯中流矢卒士卒死者萬餘人時大寇未平復失驍將朝野為之憂恐中竹仲翻卒子恤翻將即亮翻朝直遙翻為于偽翻於是賊勢愈盛而㣥臣自外來者太后問之皆言賊弱以求悅媚由是將帥求益兵者往往不與帥所類翻五月夷陵烈侯裴邃卒時邃卒于軍中諡法有功安民曰烈秉德尊業曰烈沈持林翻思相吏翻為政寬明將吏愛而憚之壬子以中護軍夏侯亶督壽陽諸軍事馳驛代邃益州刺史臨汝侯淵猷遣其將樊文熾蕭世澄等將兵圍魏益州長史和安於小劍魏益州刺史邴虯遣統軍河南胡小虎崔珍寶將兵救之文熾襲破其柵皆擒之使小虎於城下説和安令早降將即亮翻説式芮翻降戶江翻小虎遙謂安曰我柵失備為賊所擒觀其兵力殊不足言努力堅守魏行臺傅梁州援兵已至魏行臺子建傅梁州豎眼軍士以刀毆殺之毆烏口翻西南道軍司淳于誕引兵救小劍文熾置柵於龍鬚山上以防歸路戊辰誕密募壯士夜登山燒其柵梁軍望見歸路絶皆忷懼忷許拱翻誕乘而擊之文熾大敗僅以身免虜世澄等將吏十一人斬獲萬計魏子建以世澄購胡小虎之尸得而葬之魏魏昌武康伯李崇卒魏收地形志魏昌縣屬中山郡諡法克定禍亂曰武溫柔好樂曰康考異曰魏帝紀在五月戊子按長曆是月乙亥朔無戊子今不書日初帝納東昏侯寵姬吳淑媛魏文帝置淑媛宋明帝以淑媛為九嬪之首齊梁因之媛于眷翻宮中多疑之及淑媛寵衰怨望密謂綜曰汝七月生兒安得比諸皇子然汝太子次弟幸保富貴勿泄也與綜相抱而泣綜由是自疑晝則談謔如常謔迄卻翻夜則於靜室閉戶披髮席藁私於別室祭齊氏七廟又微服至曲阿拜齊太宗陵齊無太宗當是高宗滲則為父子滲所蔭翻遂潛發東昏侯冢並自殺一男試之皆驗由是常懷異志專伺時變伺相吏翻綜有勇力能手制奔馬輕財好士唯留附身故衣餘皆分施好呼到翻施式豉翻恆致罄乏屢上便宜求為邊任恆戶登翻上時掌翻上未之許常於內齋布沙於地終日跣行足下生胝胝丁尼翻皮厚也日能行三百里王侯主及外人皆知其志而上性嚴重人莫敢言又使通問於蕭寶寅謂之叔父為南兗州刺史不見賓客辭訟隔簾聽之出則垂帷於輿惡人識其面惡烏路翻及在彭城魏安豐王延明臨淮王彧將兵二萬逼彭城將即亮翻考異曰南史陳慶之傳云衆十萬今從梁書勝負久未決上慮綜敗沒敕綜引軍還綜恐南歸不復得至北邊復扶又翻下路復復取同乃密遣人送降款於彧魏人皆不之信彧募人入綜軍驗其虛實無敢行者殿中侍御史濟陰鹿悆為彧監軍鹿姓也風俗通漢有巴郡太守鹿旗濟子禮翻悆羊茹翻曰若綜有誠心與之盟約如其詐也何惜一夫時兩敵相對內外嚴固悆單騎間出騎奇寄翻間古莧翻徑趣彭城趣七喻翻為綜軍所執問其來狀悆曰臨淮王使我來欲有交易耳時元略已南還綜聞之謂成景俊等曰我常疑元略規欲反城規圖也反孚袁翻故遣左右為略使使疏吏翻下同入魏軍中呼彼一人今其人果來可遣人詐為略有疾在深室呼至戶外令人傳言謝之綜又遣腹心安定梁話迎悆密以意狀語之意者傳綜欲降之意狀者告以詭與成景俊設謀之狀語牛倨翻先引見胡龍牙龍牙曰元中山甚欲相見元略之南奔也梁封為中山王故稱之又曰安豐臨淮將少弱卒將即亮翻少詩沼翻規復此城容可得乎悆曰彭城魏之東鄙勢在必爭得否在天非人所測龍牙曰當如卿言又引見成景俊景俊與坐謂曰卿不為刺客邪悆曰今者奉使欲返命本朝朝直遙翻相刺之事更卜後圖景俊為設飲食為于偽翻乃引至一所詐令一人自室中出為元略致意曰我昔有以南向有以言有所為也欲聞鄉事晚來疾作不獲相見悆曰早奉音旨冒險祗赴不得瞻見內懷反側遂辭退諸將競問魏士馬多少悆盛陳有徑兵數十萬諸將相謂曰此華辭耳史記商君曰貌言華也將即亮翻少詩沼翻崇朝可驗何華之有鄭玄曰崇朝終朝也成景俊送之戲馬臺蘇軾曰彭城三面阻水樓堞之下以沂泗為池獨其南可通軍馬而戲馬臺在焉其廣百步其高十仞塹七豔翻謂曰險固如此豈魏所能取悆曰攻守在人何論險固悆還於路復與梁話申固盟約鹿悆既得綜之誠款知彭城之必可取與梁將語率多大言蓋其中心喜躍不能自掩於言語之間使梁將有如臾駢絺疵之流必能察知其情矣庚辰綜與梁話及淮陰苗文寵夜出步投魏章十二行本魏作彧乙十一行本同孔本同退齋校同軍考異曰南史綜傳綜夜潛與梁話苗寵三騎開北門涉汴河遂奔蕭城自稱隊主見延明而拜延明坐之問其名氏不答曰殿下問人有見識者延明召使視之曰豫章王也延明喜下地執其手答其拜送于洛陽按魏書及北史鹿悆傳皆豫有盟約魏豈得不知又魏書蕭贊傳作濟陰芮文寵北史作濟陰苗文寵今從南史齋內諸閣猶閉不開衆莫知所以唯見城外魏軍呼曰呼火故翻汝豫章王昨夜已來在我軍中汝尚何為城中求王不獲軍遂大潰魏人入彭城乘勝追擊章十二行本擊下有梁兵二字乙十一行本同孔本同張校同復取諸城至宿預而還還從宣翻又如字下同將佐士卒死沒者什七八唯陳慶之帥所部得還史言陳慶之臨亂能整異於諸將帥讀曰率上聞之驚駭有司奏削綜爵土絶屬籍更其子直姓悖氏更工衡翻下更名同未旬日詔復屬籍封直為永新侯吳立永新縣宋屬安成郡西豐侯正德自魏還事見上卷四年行下孟翻悛丑緣翻多聚亡命夜剽掠章十二行本掠下有殺人二字乙十一行本同孔本同於道剽匹妙翻以輕車將軍從綜北伐廾軍輒還上積其前後罪惡免官削爵徙臨海未至追赦之綜至洛陽見魏主還就館為齊東昏侯舉哀服斬衰三年見賢遍翻為于偽翻衰倉雷翻太后以下並就館弔之賞賜禮遇甚厚拜司空封高平郡公丹楊王更名贊考異曰梁書南史皆云改名纘今從魏書北史封鹿悆為定陶縣子除員外散騎常侍綜長史濟陽江革司馬范陽祖之皆為魏所虜散悉亶翻騎奇寄翻濟子禮翻居鄧翻安豐王延明聞其才名厚遇之革稱足疾不拜延明使之作欹器漏刻銘革唾罵之曰卿荷國厚恩乃為虜立銘荷下可翻為于偽翻下不為同孤負朝廷延明聞之令革作大小寺碑考異曰南史作丈八寺碑今從梁書彭城大彭氏之墟也故祭之延明將箠之箠止蘂翻江革行年六十今日得死為幸誓不為人執筆延明知不可屈乃止日給脫粟飯三升僅全其生而已上密召夏侯亶還使休兵合肥俟淮堰成復進夏戶雅翻復扶又翻癸未魏大赦改元孝昌破六韓拔陵圍魏廣陽王深於五原軍主賀拔勝募二百人開東門出戰斬首百餘級賊稍退深拔軍向朔州勝常為殿殿丁練翻雲州刺史費穆招撫離散四面拒敵時北境州鎮皆沒唯雲中一城獨存去年李崇使費穆守雲中章十二行本道上有久之二字乙十一行本同孔本同張校同退齋校同路阻絶援軍不至糧仗俱盡穆棄城南奔爾朱榮於秀容既而詣闕請罪詔原之長流參軍于謹長流參軍主禁防從公府置長流參軍小府無長流置禁防參軍今寇盜起未易專用武力勝也謹請奉大王之威命諭以禍福庶幾稍可離也易以豉翻幾居依翻深許之謹兼通諸國語乃單騎詣叛胡營見其酋長開示恩信於是西部鐵勒酋長乜列河等將三萬餘戶南詣深降騎奇寄翻酋慈秋翻長知兩翻乜母野翻虜姓也將即亮翻降戶江翻深欲引兵至折敷嶺迎之通典作折敦嶺破六韓拔陵兵勢甚盛聞乜列河等來降必引兵邀之若先據險要未易敵也不若以乜列河餌之而伏兵以待之必可破也深從之拔陵果引兵邀擊乜列河盡俘其衆伏兵發拔陵大敗復得乜列河之衆而還復扶又翻下輩復同柔然頭兵可汗大破破六韓拔陵可從刊入聲汗音寒拔陵避柔然南徙渡河此河謂北河也求援於廣陽王深深帥衆赴之帥讀曰率賊前後降附者二十萬人深與行臺元纂表乞於恆州北別立郡縣安置降戶隨宜賑貸息其亂心魏朝不從朝直遙翻詔黃門侍郎楊昱分處之冀定瀛三州就食處昌呂翻深謂纂曰此輩復為乞活矣乞活事見八十六卷晉惠帝光熙元年按繫年圖書是年蠕蠕殺破六韓拔陵通鑑明年書拔陵遣費律誘斬胡琛秋七月壬戌大赦八月魏柔玄鎮民杜洛周聚衆反於上谷改元真王攻沒郡縣高歡蔡俊尉景及段榮安定彭樂皆從之洛周圍魏燕州刺史博陵崔秉燕因肩翻九月丙辰魏以幽州刺史常景兼尚書為行臺與幽州都督元談討之景爽之孫也魏之儒風振於常爽皆置兵守險談屯居庸關盧龍關在遼西肥如縣唐改肥如為盧龍縣杜佑曰盧龍塞在平州盧龍縣城西北二百里軍都關在燕郡軍都縣唐志曰幽州昌平縣北十五里有軍都陘西北三十五里有納款關即居庸故關亦謂之軍都關考之漢志上谷郡有軍都居庸兩縣蓋各縣有關凡此屯守皆以防杜洛周水經注居庸關在上谷沮陽城東南六十里軍都關在居庸山南冬十月吐谷渾遣兵擊趙天安天安降涼州復為魏去年趙天安以涼州應莫折念生復扶又翻降戶江翻平西將軍高徽奉使嚈噠還至枹罕嚈益涉翻噠當割翻又宅軋翻枹音膚會河州刺史元祚卒卒子恤翻前刺史梁釗之子景進引莫折念生兵圍其城長史元永等推徽行州事勒兵固守景進亦自行州事徽請兵於吐谷渾吐谷渾救之吐從暾入聲谷音浴徽湖之孫也史述高徽與高歡同其所自出魏方有事於西北二荊西郢㣥蠻皆反斷三鴉路西荊治上洛北荊治襄城西郢治汝南真陽縣杜佑曰北荊州今即伊陽縣三鴉鎮在今汝州魯陽縣西南十九里名高平城古繞角城在縣東南又云百里山在鄧州向城縣北是三鴉之第一鴉又北分嶺山北即三鴉之第二鴉其第三鴉入汝州魯山縣界斷丁管翻寇掠北至襄城汝水有冉氏向氏田氏種落最盛三姓蓋皆居汝源種章勇翻小者千室各稱王侯屯據險要道路不通十二月壬午魏主下詔曰朕將親御六師掃蕩逋穢今先討荊蠻疆理南服時㣥蠻引梁將曹義宗等圍魏荊州此荊州治穰城將即亮翻至魯陽不敢進魏更以臨淮王彧為征南大將軍將兵討魯陽蠻更工衡翻司空長史辛雄為行臺左丞東趣葉城葉城時為襄州治所此即漢南陽郡之葉縣城也趣七喻翻葉式涉翻恆戶登翻考異曰周書羆傳羆未嘗為恆農太守今從魏書將兵一萬自武關出通三鴉路以救荊州衍等未至彧軍已屯汝上汝上汝水之上也彧以處分道別不欲應之被皮義翻處昌呂翻分扶問翻辛雄曰今裴衍未至王士衆已集蠻左唐突自宋以來豫部諸蠻率謂之蠻左所置蠻郡謂之左郡撓呼高翻擾也王秉麾閫外見可而進何論別道彧恐後有得失之責邀雄符下符尚書行臺符也下遐稼翻心必震動可乘勢破也遂符彧軍令速赴擊㣥蠻聞之果散走魏主欲自出討賊中書令袁翻諫而止辛雄自軍中上疏曰凡人所以臨陳忘身觸白刃而不憚者一求榮名二貪重賞三畏刑罰四避禍難陳讀曰陳難乃旦翻非此數者雖聖王不能使其臣慈父不能厲其子矣明主深知其情故賞必行罰必信使親疏貴賤勇怯賢愚聞鍾鼓之聲見旌旗之列莫不奮激競赴敵場豈懕久生而樂速死哉懕與厭同樂音洛欲罷不能耳自秦隴逆節蠻左亂常已歷數載載子亥翻三章十二行本三上有凡在戎役數十萬人扞禦十字乙十一行本同孔本同張校同方之師章十二行本無之師二字乙十一行本同孔本同張校同敗多勝少迹其所由不明賞罰之故也三方之師謂西討秦隴北禦邊鎮南擊蠻左也賞不移時然將士之勳歷稔不決歷稔猶言歷年一年五穀一稔故以年為稔晏然在家是使節士無所勸慕庸人無所畏懾懾之涉翻進而擊賊死交而賞賒賒遠也身全而無罪此其所以望敵奔沮不肯盡力者也陛下誠能號令必信賞罰必行則軍威必張盜賊必息矣疏奏不省省悉景翻曹義宗等取順陽馬圈圈求遠翻與裴衍等戰於淅陽漢弘農郡有析縣晉分屬順陽郡元魏置淅陽郡以其地在淅水之陽也即隋唐南鄉內鄉二縣之地衍等復取順陽進圍馬圈洛州刺史董紹以馬圈城堅衍等糧少上書言其必敗未幾義宗擊衍等破之復取順陽復扶又翻少詩沼翻上時掌翻幾居豈翻魏以王羆為荊州刺史邵陵王綸攝南徐州事在州喜怒不恆肆行非法遨遊市里問賣鱔者曰刺史何如對言躁虐綸怒令吞鱔而死鱔與鱓同音市演翻鱓魚似蛇今江東溝港皆有之躁則到翻道路以目道路相逢者但以目相視而不敢言奪孝子服而著之著則略翻匍匐號叫號戶刀翻下悲號同籤帥懼罪密以聞上始嚴責綸而不能改於是遣代綸悖慢逾甚帥所類翻悖蒲內翻又蒲沒翻乃取一老翁短瘦類上者加以袞冕置之高坐朝以為君自陳無罪使就坐剝褫坐徂臥翻朝直遙翻褫敕豸翻捶之於庭又作新棺貯司馬崔會意以轜車挽歌為送葬之法捶止蘂翻貯丁呂翻轜音而喪車也莊子曰紼謳所生必於斥苦紼謳挽歌也左傳公孫夏使其徒歌虞殯杜預注曰虞殯送葬歌曲田橫之死其徒有蒿里薤露之歌搜神記曰挽歌喪家之樂執紼者相和之聲嫗威遇翻會意不能堪輕騎還都以聞上恐其奔逸以禁兵取之將於獄賜盡太子統流涕固諫得免戊子免綸官削爵土魏山胡劉蠡升反自稱天子置百官山胡即汾州之稽胡初敕勒酋長斛律金事懷朔鎮將楊鈞為軍主行兵用胸奴法望塵知馬步多少嗅地知軍遠近酋慈秋翻長知兩翻將即亮翻少詩沼翻嗅許救翻及破六韓拔陵反金擁衆歸之拔陵署金為王既而知拔陵終無所成乃詣雲州降仍稍引其衆南出黃瓜堆水經注桑乾水與武周水合而東南流屈徑黃瓜堆南又東南流徑桑乾郡北脫身歸爾朱榮榮以為別將張政烺標點王崇武聶崇岐覆校
