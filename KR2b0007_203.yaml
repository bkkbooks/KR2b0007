包藏禍心竊窺神器君之愛子幽之於別宮謂居睿宗於別殿委之以重任謂用武承嗣等一抔之土未乾抔蒲侯翻乾音干六尺之孤安在又曰試觀今日之域中竟是誰家之天下太后見檄問曰誰所為或對曰駱賓王太后曰宰相之過也人有如此才而使之流落不偶乎敬業求得人貌類故太子賢者紿衆云賢不死亡在此城中令吾屬舉兵紿蕩亥翻因奉以號令楚州司馬李崇福帥所部三縣應敬業楚州本漢射陽鹽瀆縣地晉置山陽郡隋開皇初罷郡十二年置楚州大業初州廢唐初復置帥讀曰率所部三縣山陽鹽城安宜也敬業遣其將尉遲昭攻盱眙盱眙縣漢屬臨淮郡後漢屬下邳國晉安帝分置盱眙郡陳置北譙州隋廢為縣屬江都郡唐屬楚州盱眙音吁貽其將即亮翻尉紆勿翻章十二行本詔上有行舉拒卻之五字乙十一行本同孔本同張校同退齋校同以行舉為遊擊將軍以其弟行實為楚州刺史甲申以左玉鈐衛大將軍李孝逸為揚州道大總管是年改左右領軍衛為左右玉鈐衛以將軍李知十馬敬臣為之副以討李敬業永淳元年武承嗣與其從父弟右衛將軍三思以韓王元嘉魯王靈夔屬尊位重從才用翻二王皆高祖子屢勸太后因事誅之太后謀於執政劉禕之韋思謙皆無言禕吁韋翻內史裴炎獨固爭太后愈不悅三思元慶之子也及李敬業舉兵薛仲璋炎之甥也炎欲示間暇不汲汲議誅討太后問計於炎對曰皇帝年長長知兩翻不親政事故豎子得以為辭若太后返政則不討自平矣監察御史藍田崔察聞之上言監古銜翻上時掌翻炎受顧託大權在己若無異圖何故請太后歸政太后命左肅政大夫金城騫味道左肅政大夫左御史大夫也蘭州五泉縣本漢金城縣隋更名高宗咸亨二年復為金城縣風俗通騫姓閔子騫後漢高帝改櫟陽縣為萬年縣後世因之至隋並屬京兆唐改隋大興縣曰萬年以漢萬年縣復曰櫟陽屬華州櫟音藥下遐嫁翻考異曰新傳云炎謀乘太后出遊龍門以兵執之還政天子會久雨太后不出而止若炎實有此謀則太后殺之宜矣且炎為此謀必有同黨當炎下獄崔察李景諶輩無事猶欲陷之況有此迹其同黨能不首告乎又朝野僉載裴炎為中書令時徐敬業欲反令駱賓王畫計取裴炎同起事賓王足踏壁靜思食頃乃為謠曰一片火兩片火緋衣小兒當殿坐教炎莊上小兒誦之並都下童子皆唱炎乃訪學者令解之召賓王數啖以寶物錦綺皆不言又賂以音樂妓女駿馬亦不語乃將古忠臣烈士圖共觀之見司馬宣王賓王欻然起曰此英雄丈夫也即説自古大臣執政多移社稷炎大喜賓王曰但不知謠讖何如耳炎告以謠言片火緋衣之事賓王即下北面而拜曰此真人矣遂與敬業等合謀揚州兵起炎從內應書與敬業等合謀唯有青鵝字人有告者朝臣莫之能解則天曰此青字者十二月鵝字者我自與也遂誅炎此皆當時構陷炎者所言耳非其實也炎被收辭氣不屈或勸炎遜辭以免炎曰宰相下獄安有全理下遐嫁翻下同鳳閣舍人李景諶證炎必反鳳閣舍人中書舍人也諶氏壬翻義陽舊曰平陽隋開皇初改曰義陽劉昫曰義陽漢平氏縣之義陽鄉也魏分南陽置義陽郡晉自石城徙居仁順今申州理所是也炎社稷元臣有功於國悉心奉上天下所知臣敢明其不反太后曰炎反有端顧卿不知耳對曰若裴炎為反則臣等亦反也太后曰朕知裴炎反知卿等不反文武間證炎不反者甚衆太后皆不聽俄並景先元範下獄丁亥以騫味道檢校內史同鳳閣鸞臺三品李景諶同鳳閣鸞臺平章事永淳元年魏思溫説李敬業曰説輸芮翻明公以匡復為辭宜帥大衆鼓行而進直指洛陽帥讀曰率則天下知公志在勤王四面響應矣薛仲璋曰金陵有王氣且大江天險足以為固不如先取常潤潤州江左為京口重鎮隋為延陵縣屬江都郡唐武德三年置潤州取潤浦以為州名然後北向以圖中原進無不利退有所歸此良策也思溫曰山東豪傑以武氏專制憤惋不平惋烏貫翻聞公舉事皆自蒸麥飯為糧伸鋤為兵以俟南軍之至不乘此勢以立大功乃更蓄縮自謀巢穴遠近聞之其誰不解體敬業不從使唐之奇守江都將兵渡江攻潤州按舊志揚州至潤州四十八里潤州古朱方之地漢為丹徒縣吳為京口置京督以鎮又為徐陵督爾雅絶高曰京其城因山為壘緣江為境因謂之京口晉為南徐州隋置潤州取州東潤浦為名尋廢州唐復置兵勢合則強分則弱敬業不並力渡淮收山東之衆以取洛陽敗在眼中矣壬辰敬業陷潤州執刺史李思文考異曰唐紀云李思文拒守四十餘日而陷按敬業九月丁丑起兵十一月庚申敗才四十四日耳今不取思文敬業之叔父也知敬業之謀先遣使間道上變使疏吏翻間古莧翻上時掌翻為敬業所攻拒守久之力屈而陷思溫請斬以徇敬業不許謂思文曰叔黨於武氏宜改姓武潤州司馬劉延嗣不降降戶江翻敬業將斬之思溫救之得免與思文皆囚於獄劉延嗣審禮從父弟也劉審禮戰沒於青海從才用翻曲阿縣本雲陽秦始皇改曰曲阿前漢屬會稽郡後漢屬吳郡晉屬晉陵郡隋屬江都郡唐屬潤州河間漢州鄉縣地屬涿郡隋為河間縣屬瀛州為敬業所擒臨以白刃不屈而死永淳元年丙申斬裴炎于都亭洛陽都亭顧兄弟曰兄弟官皆自致炎無分毫之力今坐炎流竄不亦悲乎籍沒其家無甔石之儲甔都濫翻劉景先貶普州刺史章十二行本史下有又貶辰州刺史六字乙十一行本同孔本同張校同退齋校同胡元範流瓊州而死舊志瓊州至兩京與崖州道里相類胄直又翻年十七上封事請見言事太后召見詰之曰汝伯父謀反尚何言胄先曰臣為陛下畫計耳上時掌翻見賢遍翻詰去吉翻為于偽翻安敢訴冤陛下為李氏婦先帝棄天下遽攬朝政朝直遙翻變易嗣子疏斥李氏封崇諸武臣伯父忠於社稷反誣以罪戮及子孫陛下所為如是臣實惜之陛下早宜復子明辟高枕深居則宗族可全不然天下一變不可復救矣枕之任翻復扶又翻太后怒曰胡白胡何也白陳也言何等陳白也命引出胄先反顧曰今用臣言猶未晚如是者三太后命於朝堂杖之一百長流瀼州貞觀十二年李弘節遣欽州首領寧師古尋劉方故道行達交趾開拓夷獠置瀼州取瀼水以名州也舊志曰瀼州無兩京地里北至容州二百八十二里容州至京師五千九百一十里至東都五千四百八十五里瀼而章翻炎之下獄也郎將薑嗣宗使至長安劉仁軌問以東都事嗣宗曰嗣宗覺裴炎有異於常久矣仁軌曰使人覺之邪嗣宗曰然仁軌曰仁軌有奏事願附使人以聞下遐嫁翻將即亮翻使疏吏翻邪音耶嗣宗曰諾明日受仁軌表而還表言嗣宗知裴炎反不言太后覽之命拉嗣宗於殿庭絞於都亭先拉其幹而後絞殺之還從宣翻又音如字拉盧合翻永淳元年丁酉追削李敬業祖考官爵發冢斫棺復姓徐氏永淳元年李景諶罷為司賓少卿是年改鴻臚為司賓諶氏壬翻少始照翻永淳元年徐敬業聞李孝逸將至自潤州回軍拒之屯高郵之下阿溪高郵縣漢屬廣陵國魏省晉武帝復置梁置廣業郡隋廢郡以高郵縣屬江都郡唐屬揚州九域志在州西北一百里宋白曰揚州天長縣本廣陵縣地唐開元二十九年於下阿置千秋縣天寶五年改天長梁曾於石梁置涇州以此言之蓋下阿溪即今石梁河也淮陰縣漢屬臨淮郡晉屬廣陵郡後魏置淮陰郡隋廢入山陽縣乾封元年分山陽復置屬楚州盱眙縣有都梁山將即亮翻下同尉紆勿翻李孝逸軍至臨淮臨淮泗州孝逸懼按兵不進章十二行本進下有監軍二字乙十一行本同孔本同張校同殿中侍御史魏元忠謂孝逸曰天下安危在茲一舉四方承平日久忽聞狂狡注心傾耳以俟其誅今大軍久留不進遠近失望萬一朝廷更命他將以代將軍將即亮翻更工衡翻將軍何辭以逃逗撓之罪乎逗音豆撓奴教翻孝逸乃引軍而前壬寅馬敬臣擊斬尉遲昭於都梁山十一月辛亥以左鷹揚大將軍黑齒常之為江南道大總管討敬業是年改左右武衛為左右鷹揚衛韋超擁衆據都梁山諸將皆曰超憑險自固士無所施其勇騎無所展其足且窮寇死戰攻之多殺士卒不如分兵守之大軍直趣江都覆其巢穴支度使薛克楊章十二行本楊作構乙十一行本同孔本同張校同曰唐制凡天下邊軍有支度使以計軍資糧仗之用所費皆申度支會計以長行旨為準趣七喻翻使疏吏翻超雖據險其衆非多今多留兵則前軍勢分少留兵則終為後患少詩沼翻不如先擊之其勢必舉舉都梁則淮陰高郵望風瓦解矣魏元忠請先擊徐敬猷諸將曰不如先攻敬業敬業敗則敬猷不戰自擒矣若擊敬猷則敬業引兵救之是腹背受敵也元忠曰不然賊之精兵盡在下阿烏合而來利在一決萬一失利大事去矣敬猷出於博徒不習軍事其衆單弱人情易搖易以豉翻大軍臨之駐馬可克敬業雖欲救之計程必不能及我克敬猷乘勝而進雖有韓白不能當其鋒矣今不先取弱者而遽攻其強非計也孝逸從之引兵擊超超夜遁進擊敬猷敬猷脫身走庚申敬業勒兵阻溪拒守後軍總管蘇孝祥夜將五千人以小舟渡溪先擊之兵敗孝祥死士卒赴溪溺死者過半將即亮翻溺奴狄翻過古禾翻左豹韜衛果毅漁陽成三朗為敬業所擒是年改左右威衛為左右豹韜衛唐制諸府各有果毅都尉上府從五品下中府正六品上下府從六品下紿蕩亥翻此李孝逸也將斬之三朗大呼曰呼火故翻我果毅成三朗非李將軍也官軍今大至矣爾曹破在朝夕我死妻子受榮爾死妻子籍沒爾終不及我也遂斬之孝逸等諸軍繼至戰數不利孝逸懼欲引退魏元忠與行軍管記劉知柔言於孝逸曰風順荻乾數所角翻乾音干此火攻之利固請決戰敬業置陳既久士卒多疲倦顧望陳不能整孝逸進擊之因風縱火敬業大敗斬首七千級溺死者不可勝紀陳讀曰陳勝音升敬業等輕騎走入江都挈妻子奔潤州將入海奔高麗麗力知翻孝逸進屯江都分遣諸將追之乙丑敬業至海陵界阻風海陵縣漢屬臨淮後漢晉屬廣陵梁置海陵郡隋廢郡為縣屬江都郡唐屬揚州今為泰州九域志揚州東至海陵界九十八里又自海陵東至海一百七里考異曰唐紀初官軍逆風不利俄而風回甚徑孝逸縱火賊懼燒而潰敬業猷之奇求仁賓王走歸江都焚簿書攜妻子潛算山下手書召宗臣敬業初與宗臣木契為約時亡其契宗臣疑而不赴或云宗臣已歸順敬業入海欲奔東夷至海陵界阻風偽將王那相斬之來降餘黨赴水死今從實録唐統紀傳首神都揚潤楚三州平陳嶽論曰敬業苟能用魏思溫之策直指河洛專以匡復為事縱軍敗身戮亦忠義在焉而妄希金陵王氣是真為叛逆不敗何待敬業之起也使敬猷將兵五千循江西上將即亮翻上時掌翻略地和州前弘文館學士歷陽高子貢帥鄉里數百人拒之敬猷不能西以功拜朝散大夫成均助教歷陽縣漢屬九江郡晉置歷陽郡暨至北齊與梁通和置和州隋唐因之后改國子監為成均監按唐六典弘文館以五品以上為學士國子助教則從六品上耳掌佐博士分經以教授朝散大夫從五品下帥讀曰率朝直遙翻散悉亶翻永淳元年丁卯郭待舉罷為左庶子以鸞臺侍郎韋方質為鳳閣侍郎同平章事方質雲起之孫也韋雲起仕隋唐之間永淳元年十二月劉景先又貶吉州員外長史郭待舉貶嶽州刺史嶽州京師東南二千二百三十七里至東都一千八百一十六里初裴炎下獄單于道安撫大使左武衛大將軍程務挺密表申理由是忤旨下遐嫁翻單音蟬使疏吏翻忤五故翻務挺素與唐之奇杜求仁善或譖之曰務挺與裴炎徐敬業通謀癸卯遣左鷹揚將軍裴紹業即軍中斬之考異曰唐統紀曰既而太后震怒召㣥臣謂曰朕於天下無負㣥臣皆知之乎㣥臣曰唯太后曰朕事先帝二十餘年憂天下至矣公卿富貴皆朕與之天下安樂朕長養之及先帝棄㣥臣以天下託顧於朕不愛身而愛百姓今為戎首皆出於將相㣥臣何負朕之深也且卿輩有受遺老臣倔強難制過裴炎者乎有將門貴種能糾合亡命過徐敬業者乎有握兵宿將攻戰必勝過程務挺者乎此三人者人望也不利於朕朕能戮之卿等有能過此三者當即為之不然須革心事朕無為天下笑㣥臣頓首不敢仰視曰唯太后所使恐武后亦不至輕淺如此今不取突厥聞務挺死所在宴飲相慶又為務挺立祠為于偽翻每出師必禱之太后以夏州都督王方翼與務挺連職素相親善且廢后近屬徵下獄夏戶雅翻下遐嫁翻流崖州而死舊志崖州至京師七千四百六十里至東都六千三百里垂拱元年乙酉六八五永淳元年春正月丁未朔赦天下改元永淳元年太后以徐思文為忠特免緣坐拜司僕少卿緣坐者緣親黨而坐罪也光宅改太僕為司僕敬業改卿姓武朕今不復奪也復扶又翻考異曰實録云思文表請改姓武許之蓋太后有此言思文因請之也今從唐紀永淳元年庚戌以騫味道守內史內史中書令永淳元年戊辰文昌左相同鳳閣鸞臺三品樂城文獻公劉仁軌薨文昌左相即尚書左僕射永淳元年二月癸未制朝堂所置登聞鼓及肺石登聞鼓在西朝堂肺石在東朝堂朝直遙翻有撾鼓立石者令御史受狀以聞撾則瓜翻永淳元年乙巳以春官尚書武承嗣秋官尚書裴居道光宅以禮部為春官刑部為秋官尚辰羊翻嗣祥吏翻右肅政大夫右御史大夫永淳元年突厥阿史那骨篤祿等數寇邊以左玉鈐衛中郎將淳于處平為陽曲道行軍總管擊之厥九勿翻數所角翻鈐其廉翻將即亮翻處昌呂翻陽曲縣自漢以來屬太原郡隋惡其名改曰陽直武德三年分置汾陽縣七年省陽直縣改汾陽為陽曲縣仍移治陽直永淳元年正諫大夫同平章事沈君諒罷永淳元年三月正諫大夫同平章事崔察罷永淳元年丙辰遷廬陵王于房州舊志房州京師南一千一百九十五里至東都一千一百八十五里杜佑曰房州古麋庸二國之地春秋楚子敗麋師於房渚即此曹魏為新城郡竹山縣則古庸國秦漢之上庸縣也永淳元年辛酉武承嗣罷永淳元年辛未頒垂拱格永淳元年朝士有左遷詣宰相自訴者內史騫味道曰此太后處分朝直遙翻處昌呂翻分扶問翻同中書門下三品劉禕之曰緣坐改官由臣下奏請太后聞之夏四月丙子貶味道為青州刺史加禕之太中大夫太中大夫從四品上劉禕之本職豫王府司馬王府司馬從四品下君臣同體豈得歸惡於君引善自取乎永淳元年癸未突厥寇代州淳于處平引兵救之至欣州為突厥所敗敗補邁翻死者五千餘人永淳元年丙章十二行本丙上有五月二字乙十一行本同孔本同張校同午以裴居道為內史納言王德真流象州象州至京師四千九百八十九里永淳元年己酉以冬官尚書蘇良嗣為納言光宅改工部為冬官永淳元年壬戌制內外九品以上及百姓咸令自舉令有才者咸得自言以求進用令力丁翻永淳元年壬申韋方質同鳳閣鸞臺三品永淳元年六月天官尚書韋待價同鳳閣鸞臺三品光宅改吏部為天官萬石之兄也永淳元年同羅僕固等諸部叛遣左豹韜衛將軍劉敬同發河西騎士出居延海以討之甘州刪丹縣北渡張掖河西北行出合黎山峽口傍河東壖屈曲東北行千里有寧寇軍軍東北有居延海騎奇寄翻敕僑置安北都護府於同城以納降者同城即刪丹之同城守捉天寶二載改為寧寇軍降戶江翻永淳元年秋七月己酉以文昌左丞魏玄同為鸞臺侍郎同鳳閣鸞臺三品文昌左丞即尚書左丞永淳元年詔自今祀天地高祖太宗高宗皆配坐坐徂臥翻用鳳閣舍人元萬頃等之議也永淳元年九月丁卯廣州都督王果討反獠平之獠魯皓翻永淳元年冬十一月癸卯命天官尚書韋待價為燕然道行軍大總管以討吐蕃燕因肩翻吐從暾入聲初西突厥興昔亡繼往絶可汗既死十姓無主部落多散亡太后乃擢興昔亡之子左豹韜衛翊府中郎將元慶唐諸衛皆有翊府中郎將郎將將即亮翻兼昆陵都護襲興昔亡可汗押五咄陸部落鈐其廉翻可從刊入聲汗音寒咄當沒翻永淳元年麟臺正字射洪陳子昂光宅改祕書省為麟臺正字正九品下掌刊正文字射洪縣屬梓州漢郪縣地後魏分置射江縣以婁縷灘東六里有射江西魏訛為射洪以為朝廷遣使巡察四方不可任非其人上時掌翻使疏吏翻下同及刺史縣令不可不擇比年百姓疲於軍旅不可不安比毗至翻其略曰夫使不擇人則黜陟不明刑罰不中夫音扶中竹仲翻朋黨者進貞直者退徒使百姓修飾道路送往迎來無所益也諺曰欲知其人觀其所使不可不慎也又曰宰相陛下之腹心刺史縣令陛下之手足未有無腹心手足而能獨理者也又曰天下有危機禍福因之而生機靜則有福機動則有禍百姓是也百姓安則樂其生樂音洛不安則輕其死輕其死則無所不至祅逆乘釁天下亂矣祅於喬翻又曰隋煬帝不知天下有危機而信貪佞之臣冀收夷狄之利卒以滅亡卒子恤翻其為殷鑒豈不大哉永淳元年太后修故白馬寺以僧懷義為寺主姚思廉曰漢明帝時西域以白馬負佛經送洛因立白馬寺魏收曰漢立白馬寺於洛城雍關西按此故洛城也唐之洛城乃隋所遷鄠人鄠音戶本姓馮名小寶賣藥洛陽市因千金公主以進千金公主高祖女太后欲令出入禁中乃度為僧名懷義又以其家寒微令與駙馬都尉薛紹合族命紹以季父事之薛紹尚后女太平公主宦者十餘人侍從從才用翻士民遇之者皆奔避有近之者近其靳翻輒撾其首流血撾其瓜翻委之而去任其生死見道士則極意毆之仍髡其髮而去朝貴皆匍匐禮謁毆烏口翻朝直遙翻匍薄乎翻匐蒲北翻武承嗣武三思皆執僮僕之禮以事之為之執轡為于偽翻懷義視之若無人多聚無賴少年度為僧縱橫犯法少詩照翻橫下孟翻人莫敢言右臺御史馮思勗屢以法繩之右臺右肅政臺也令從者毆之幾死幾居依翻二年永淳二年春正月太后下詔復政於皇帝睿宗知太后非誠心奉表固讓太后復臨朝稱制復扶又翻朝直遙翻辛酉赦天下永淳二年二月辛未朔日有食之永淳二年右衛大將軍李孝逸既克徐敬業聲望甚重武承嗣等惡之數譖於太后左遷施州刺史惡烏路翻數所角翻施州漢巫縣地吳分巫立沙渠縣後周於縣置施州隋廢州為清江郡唐復置施州在京師南二千七百九里至東都二千八百一十里永淳二年三月戊申太后命鑄銅為匭章十二行本匭下有置之朝堂以受天下表疏銘十一字乙十一行本同孔本同張校同退齋校同匭居洧翻其東曰延恩獻賦頌求仕進者投之南曰招諫言朝政得失者投之西曰伸冤有冤抑者投之北曰通玄言天象災變及軍機祕計者投之四匭各依其方色正諫即諫議大夫也垂拱元年置左右補闕各一人從七品上左右拾遺各二人從八品上掌供奉諷諫行立次左右史之下左屬門下省右屬中書省識官猶今之保識疏所去翻徐敬業之反也侍御史魚承曄之子保家教敬業作刀車及弩敬業敗僅得免太后欲周知人間事保家上書請鑄銅為匭以受天下密奏上時掌翻其器共為一室中有四隔上各有竅以受表疏可入不可出太后善之考異曰統紀唐曆皆云八月作銅匭今從實録舊本紀又朝野僉載作魚思咺云上欲作匭召工匠無人作得者思咺應制為之甚合規矩遂用之今從御史臺記其怨家投匭怨於元翻幾居豈翻告保家為敬業作兵器殺傷官軍甚衆遂伏誅為于偽翻太后自徐敬業之反疑天下人多圖己又自以久專國事且內行不正行下孟翻知宗室大臣怨望心不服欲大誅殺以威之乃盛開告密之門有告密者臣下不得問皆給驛馬唐制乘傳日四驛乘驛日六驛凡給馬者一品八匹二品六匹三品五匹四品五品四匹六品三匹七品以下二匹給傳乘者一品十馬二品九馬三品八馬四品五品四馬六品七品二馬八品九品一馬三品已上敕召者給四馬五品三馬六品已下有差一驛三十里唐六典四品五品常食料七盤每日細米二升麥丏二升三合酒一升半羊肉三分瓜兩顆鹽豉蔥薑葵韭之屬各有差新唐志五品食料雜用錢月六百雖農夫樵人皆得召見廩於客館客館屬鴻臚寺典客令廩者廩給之見賢遍翻則不次除官稱尺證翻無實者不問於是四方告密者蜂起人皆重足屏息重直龍翻屏必郢翻有胡人索元禮索蘇各翻知太后意因告密召見擢為遊擊將軍令案制獄見賢遍翻令力丁翻元禮性殘忍推一人必令引數十百人太后數召見賞賜以張其權數所角翻張知亮翻於是尚書都事長安周興唐尚書都省有都事管諸司主事令史尚辰羊翻紛紛繼起興纍遷至秋官侍郎俊臣纍遷至御史中丞相與私畜無賴數百人畜吁玉翻專以告密為事欲陷一人輒令數處俱告事狀如一俊臣與司刑評事洛陽萬國俊光宅改大理為司刑評事從八品掌出使推劾教其徒網羅無辜織成反狀構造布置皆有支節太后得告密者輒令元禮等推之競為訊囚酷法章十二行本法下有作大枷三字乙十一行本同孔本同張校同有定百脈突地吼死豬愁求破家反是實等名號或以椽關手足而轉之謂之鳳皇曬翅或以物絆其腰引枷向前謂之驢駒拔撅椽重緣翻曬所賣翻絆博慢翻撅其月翻或使跪捧枷纍甓其上謂之仙人獻果或使立高木章十二行本木下有之上二字乙十一行本同孔本同引枷尾向後謂之玉女登梯或倒懸石縋其首或以醋灌鼻或以鐵圈其首而加楔枷音加甓扶歷翻縋馳偽翻圈丘員翻呼角翻急束也楔先結翻至有腦裂髓出者每得囚輒先陳其械具以示之皆戰栗流汗望風自誣每有赦令俊臣輒令獄卒先殺重囚然後宣示太后以為忠益寵任之中外畏此數人甚於虎狼麟臺正字陳子昂上疏上時掌翻疏所據翻以為執事者疾徐敬業首亂唱禍將息姦源窮其黨與遂使陛下大開詔獄重設嚴刑有迹涉嫌疑辭相逮引莫不窮捕考按至有姦人熒惑乘險相誣糾告疑似冀圖爵賞恐非伐罪弔人之意也臣竊觀當今天下百姓思安久矣故揚州構逆殆有五旬而海內晏然纖塵不動陛下不務玄默以救疲人而反任威刑以失其望臣愚暗昧竊有大惑伏見諸方告密囚纍百千輩及其窮竟百無一實陛下仁恕又屈法容之遂使姦惡之黨快意相讎睚眥之嫌即稱有密一人被訟被皮義翻百人滿獄使者推捕冠蓋如市或謂陛下愛一人而害百人天下喁喁喁魚容翻莫知寧所臣聞隋之末代天下猶平楊玄感作亂不踰月而敗天下之弊未至土崩蒸人之心猶望樂業蒸人猶蒸民也避太宗諱改民為人樂音洛遂使兵部尚書樊子蓋專行屠戮大窮黨與海內豪士無不罹殃遂至殺人如麻流血成澤事見一百八十二卷大業九年始思為亂於是雄傑並起而隋族亡矣夫大獄一起不能無濫冤人吁嗟感傷和氣㣥生癘疫水旱隨之人既失業則禍亂之心怵然而生矣古者明王重慎刑法蓋懼此也昔漢武帝時巫蠱獄起使太子奔走兵交宮闕無辜被害者以千萬數宗廟幾覆賴武帝得壺關三老書廓然感悟夷江充三族事見二十二卷漢武帝征和二年三年幾居依翻天下以安爾古人云前事之不忘後事之師史記太史公之言太后不聽永淳二年夏四月太后鑄大儀置北闕北闕蓋在玄武門外永淳二年以岑長倩為內史六月辛未以蘇良嗣為左相同鳳閣鸞臺三品韋待價為右相己卯以韋思謙為納言蘇良嗣遇僧懷義於朝堂懷義偃蹇不為禮良嗣大怒命左右捽曳批其頰數十捽昨沒翻批蒲列翻擊也又匹迷翻懷義訴於太后太后曰阿師當於北門出入阿烏葛翻南牙宰相所往來勿犯也太后託言懷義有巧思思相吏翻故使入禁中營造補闕長社王求禮上表長社漢縣隋改曰潁川武德四年復舊帶許州上時掌翻太宗時有羅黑黑善彈琵琶太宗閹為給使使教宮人陛下若以懷義有巧性欲宮中驅使者臣請閹之庶不亂宮闈表寢不出永淳二年秋九月丁未以西突厥繼往絶可汗之子斛瑟羅為右玉鈐衛將軍襲繼往絶可汗押五弩失畢部落永淳二年己巳雍州言新豐縣東南有山踊出雍於用翻考異曰統紀在十二月今從實録程大昌曰武后改新豐為慶山縣其説曰時因雷雨踊出一山故取以為名而其何以輒踊也不言其以也此即在位小人共加傅會也至兩京道里志則言其詳矣曰慶山踊出初時六七尺漸高至三百尺則非一旦驟為三百尺也自六七尺日日纍增至三百尺是積力為之非一夜雷雨頓能突兀如許也此為人力所成大不難見改新豐為慶山縣新豐自漢以來屬京兆江陵人俞文俊上書江陵縣帶荊州天氣不和而寒暑併人氣不和而疣贅生地氣不和而塠阜出疣音尤贅之芮翻塠都回翻今陛下以女主處陽位反易剛柔故地氣塞隔塞悉則翻處昌呂翻而山變為災陛下謂之慶山臣以為非慶也臣愚以為宜側身修德以答天譴不然殃禍至矣太后怒流於嶺外後為六道使所殺六道使見後二百五卷長壽二年使疏吏翻永淳二年突厥入寇左鷹揚衛大將軍黑齒常之拒之至兩井遇突厥三千餘人見唐兵皆下馬擐甲常之以二百餘騎衝之擐音宦騎奇寄翻皆棄甲走日暮突厥大至常之令營中然火東南又有火起虜疑有兵相應遂夜遁永淳二年狄仁傑為寧州刺史右臺監察御史晉陵郭翰巡察隴右所至多所按劾監古銜翻劾戶概翻又戶得翻入寧州境耆老歌刺史德美者盈路翰薦之於朝朝直遙翻徵為冬官侍郎王崇武標點容肇祖聶崇岐覆校
