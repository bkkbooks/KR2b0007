body:
  text: 資治通鑑卷第二百三端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀十九高宗天皇大聖大弘孝皇帝下永淳元年永淳元年壬午六八二時以皇孫重照生改元永淳元年春二月作萬泉宮於藍田藍田縣漢屬京兆後魏置藍田郡隋廢郡為縣復屬京兆永淳元年癸未改元赦天下永淳元年戊午立皇孫重照為皇太孫上欲令開府置官屬問吏部郎中王方慶吏部掌考天下之文吏之班秩階品晉及齊皆嘗立太孫晉惠帝立太孫臧齊武帝立太孫昭業未聞太子在東宮而更立太孫者也上曰自我作古可乎對曰三王不相襲禮叔孫通之言乃奏置師傅等官既而上疑其非法竟不補授方慶裒之曾孫也方慶梁王褒之曾孫江陵陷褒徙入關遂為咸陽人裒當作褒以字行綝丑林翻永淳元年西突厥阿史那車薄帥十姓反厥九勿翻帥讀曰率下同永淳元年夏四月甲子朔日有食之永淳元年上以關中飢饉米斗三百將幸東都丙寅發京師留太子監國監古銜翻下同使劉仁軌裴炎薛元超輔之時出幸倉猝扈從之士有餓死於中道者從才用翻下以從同上慮道路多草竊命監察御史魏元忠檢校車駕前後元忠受詔即閲視赤縣獄西京以長安萬年為赤縣神采語言異於衆命釋桎梏桎職日翻梏工沃翻襲冠帶乘驛以從從才用翻與之共食宿既與之共食又與之共宿詰去吉翻其人笑許諾比及東都比必利翻士馬萬數不亡一錢永淳元年辛未以禮部尚書聞喜憲公裴行儉為金牙道行軍大總管此指西突厥之金牙山也師未行行儉薨行儉有知人之鑒初為吏部侍郎前進士王勮勮其據翻咸陽尉欒城蘇味道劉昫曰欒城漢開縣後魏於漢開縣古城置欒城縣屬趙州余考漢書地理志常山郡有關縣又考宋白續通典鎮州欒城縣本漢關縣魏太和十一年於關縣故城置欒城縣則劉詬誤作開縣明矣行儉一見謂之曰二君後當相次掌銓衡僕有弱息願以為託弱息弱子也范陽漢涿縣地魏文帝改為范陽郡至隋廢郡復為涿縣屬幽州唐武德七年改為范陽縣華戶化翻炯古迥翻義烏漢烏傷縣地後漢分烏傷置長山縣晉以長山為東陽郡治所烏傷別為縣武德七年改烏傷為義烏縣屬婺州司列少常伯李敬玄尤重之少詩照翻以為必顯達行儉曰士之致遠當先器識而後才藝勃等雖有文華而浮躁淺露豈享爵祿之器邪楊子稍沈靜躁則到翻沈持林翻應至令長餘得令終幸矣既而勃度海墮水炯終於盈川令黔州彭水縣漢酉陽縣地武德二年分彭水於巴江西置盈隆縣先天元年避太子名改曰盈川非此也衢州龍丘縣武后如意元年分置盈川縣縣西有刑溪陳時土人留異惡刑字改曰盈川因為縣名長知兩翻赴水死賓王反誅謂同徐敬業反如行儉言選須絹翻行儉為將帥所引偏裨如程務挺張虔勗王方翼劉敬同李多祚黑齒常之後多為名將將即亮翻下同帥所類翻裨賓彌翻行儉常命左右取犀角麝香而失之又敕賜馬及鞍令史輒馳驟馬倒鞍破此禮部令史也行儉使人召還謂曰爾曹皆誤耳何相輕之甚邪謂懼罪責而逃是以常人見待相輕之甚也破阿史那都支見上卷調露元年廣二尺餘馬腦文石也琢以為盤廣古曠翻軍吏王休烈捧盤升階跌而碎之跌徒結翻惶恐叩頭流血行儉笑曰爾非故為何至於是不復有追惜之色詔賜都支等資産金器三千餘物雜畜稱是復扶又翻畜許救翻稱尺證翻並分給親故及偏裨數日而盡永淳元年阿史那車薄圍弓月城安西都護王方翼引軍救之破虜衆於伊麗水自弓月城過思渾川蟄失蜜城渡伊麗河至碎葉界俄而三姓咽麥丏與車薄合兵拒方翼方翼與戰於熱海碎葉城東有熱海地寒不凍咽於甸翻麥丏眠見翻方翼以佩刀截之左右不知所將胡兵謀執方翼以應車薄方翼知之悉召會議陽出軍資賜之以次引出斬之會大風方翼振金鼓以亂其聲誅七十餘人其徒莫之覺既而分遣裨將襲車薄咽麥丏大破之擒其酋長三百人酋慈由翻長知兩翻西突厥遂平閻懷旦竟不行方翼尋遷夏州都督徵入議邊事上見方翼衣有血漬夏戶雅翻漬疾智翻問之方翼具對熱海苦戰之狀上視瘡歎息竟以廢后近屬不得用而歸廢后方翼從祖女弟也歸者復歸夏州永淳元年乙酉車駕至東都永淳元年丁亥以黃門侍郎潁川郭待舉隋改長社為潁川縣武德四年復曰長社屬許州鼓城漢臨平下曲陽兩縣之地屬巨鹿郡隋分稿城於下曲陽故城東五里置昔陽縣尋改為鼓城時屬定州上欲用待舉等謂韋章十二行本韋作崔乙十一行本同孔本同知溫曰待舉等資任尚淺且令預聞政事未可與卿等同名自是外司四品已下知政事者始以平章事為名長倩文本之兄子也岑文本輔太宗先是玄同為吏部侍郎先悉薦翻上言銓選之弊上時掌翻以為人君之體當委任而責成功所委者當則所用者自精矣者當丁浪翻故周穆王命伯冏為太僕正曰慎簡乃僚見書冏命而天子命其大者也乃至漢氏得人皆自州縣補署五府辟召然後升於天朝見後漢紀朝直遙翻始專委選部選須絹翻夫以天下之大士人之衆而委之數人之手用刀筆以量才按簿書而察行量音良行下孟翻借使平如權衡明如水鏡猶力有所極照有所窮況所委非人而有愚暗阿私之弊乎願略依周漢之規以救魏晉之失疏奏不納永淳元年五月章十二行本月下有丙午二字乙十一行本同孔本同張校同東都霖雨乙卯洛水溢溺民居千餘家關中先水後旱蝗繼以疾疫米斗四百兩京間死者相枕於路枕之任翻人相食永淳元年上既封泰山欲遍封章十二行本空格作五嶽二字乙十一行本同孔本同秋七月作奉天宮於嵩山南奉天宮在洛州嵩陽縣裏行者資序未至未正除監察御史令於監察御史班裏行也監古銜翻陛下封泰山告太平致㣥瑞與三皇五帝比隆矣數年以來菽粟不稔餓殍相望四夷交侵兵車歲駕陛下宜恭默思道以禳災譴禳如羊翻乃更廣營宮室勞役不休天下莫不失望臣忝備國家耳目竊以此為憂上雖不納亦優容之自褚遂良韓瑗之死見二百卷顯慶三年四年瑗于眷翻無敢逆意直諫幾二十年及善感始諫天下皆喜謂之鳳鳴朝陽詩卷阿曰鳳皇鳴矣于彼高岡梧桐生矣于彼朝陽注云梧桐柔木也山東曰朝陽梧桐不生山岡太平而後生朝陽幾居依翻永淳元年上遣宦者緣江徙異竹欲植苑中宦者科舟載竹所在縱暴過荊州荊州長史蘇良嗣囚之上疏切諫上時掌翻下同以為致遠方異物煩擾道路恐非聖人愛人之意又小人竊弄威福虧損皇明上謂天后曰吾約束不嚴果為良嗣所怪手詔慰諭良嗣令棄竹江中良嗣世長之子也蘇世長見一百八十八卷高祖武德四年永淳元年黔州都督謝祐希天后意逼零陵王明令自殺明徙黔州見上卷永隆元年黔音琴黔府官屬皆坐免官祐後寢於平閣與婢妾十餘人共處處昌呂翻夜失其首垂拱中明子零陵王俊黎國公傑為天后所殺有司籍其家得祐首漆為穢器題云謝祐乃知明子使刺客取之也永淳元年太子留守京師頗事遊畋薛元超上疏規諫上聞之遣使者慰勞元超使疏吏翻勞力到翻仍召赴東都永淳元年吐蕃將論欽陵寇柘松翼等州顯慶三年開置柘州蓬山郡屬松州都督府宋白作拓曰以開拓為稱今按新舊書皆作柘翼州本漢蠶陵縣地故城在州西有蠶陵山隋為翼斜縣唐武德元年置翼州隋縣名唐州取州南翼水為名驍堅堯翻將即亮翻永淳元年冬十月丙寅黃門侍郎劉景先同中書門下平章事永淳元年是歲突厥餘黨阿史那骨篤祿骨篤祿亦曰骨咄祿頡利族人也雲中都督舍利元英之部酋世襲吐屯據黑沙城反杜佑曰阿史德元珍習知中國風俗邊塞虛實在單于府檢校降戶部落坐事為單于長史王本立所拘縶會骨咄祿入寇元珍請依舊檢校部落本立許之因便投骨咄祿骨咄祿得之甚喜以為阿波大達干令專統兵馬事單音蟬殺嵐州刺史王德茂右領軍衛將軍檢校代州都督薛仁貴將兵擊元珍於雲州虜問唐大將為誰應之曰薛仁貴虜曰吾聞仁貴流象州仁貴以大非川之敗除名起為雞林道總管復坐事貶象州何以紿我紿蕩亥翻仁貴免胄示之面虜相顧失色下馬列拜稍稍引去仁貴因奪擊大破之斬首萬餘級捕虜二萬餘人永淳元年吐蕃入寇河源軍軍使婁師德將兵擊之於白水澗白水澗有白水軍注見後使疏吏翻下同將即亮翻下同上以師德為比部員外郎左驍衛郎將河源軍經略副使曰卿有文武材勿辭也比音毗驍堅堯翻弘道元年癸未六八三是年十二月改元永淳元年春正月甲午朔上行幸奉天宮永淳元年二月庚午突厥寇定州刺史霍王元軌擊卻之乙亥復寇媯州復扶又翻下可復同媯居為翻三月庚寅阿史那骨篤祿阿史德元珍圍單于都護府執司馬張行師殺之遣勝州都督王本立夏州都督李崇義將兵分道救之永淳元年太子右庶子同中書門下三品李義琰改葬父母使其舅氏遷舊墓上聞之怒曰義琰倚勢乃陵其舅家不可復知政事義琰聞之不自安以足疾乞骸骨庚子以義琰為銀青光祿大夫致仕永淳元年癸丑守中書令崔知溫薨舊制凡九品已上職事官皆帶散位謂之本品職事則隨才敘用或去間入劇或去高就卑遷徙出入參差不定散位則一切以門蔭結品然後以勞考進敘武德令職事解散官欠一階不至為兼職事卑者不解散官貞觀令以職事高者為守職事卑者為行仍帶散位其欠一階仍舊為兼或帶散官或為守參而用之其兩職事亦為兼頗相錯亂咸亨二年始一切為守其欠一階之兼古念翻其兩職事之兼古恬翻字同音異耳永淳元年夏四月己未車駕還東都永淳元年綏州步落稽白鐵余步落稽稽胡也久之草生其上紿其鄉人曰吾於此數見佛光紿蕩亥翻數所角翻擇日集衆掘地果得之因曰得見聖佛者百疾皆愈遠近赴之鐵余以雜色囊盛之數十重得厚施乃去一囊盛時征翻重直龍翻施式豉翻去羌呂翻數年間歸信者衆遂謀作亂據城平縣自稱光明聖皇帝置百官進攻綏德大斌二縣城平及二縣皆屬綏州西魏所置也宋白曰二縣皆漢膚施縣地魏神龜元年置城中縣隋避諱改為城平大斌縣時理城平縣界魏平故城綏德縣亦膚施地魏大統十二年分上郡南界丘尼谷置縣歐陽修曰大斌者取稽胡懷化文武雜半以為名焚民居遣右武衛將軍程務挺與夏州都督王方翼討之甲申攻拔其城擒鐵余餘黨悉平考異曰僉載云延州稽胡又云自號月光王又云儀鳳中務挺斬平之蓋誤也今從實録永淳元年五月庚寅上幸芳桂宮儀鳳二年營紫桂宮於澠池縣西五里調露二年改曰避暑宮永淳元年又改曰芳桂宮遇大雨而還永淳元年乙巳突厥阿史那骨篤祿等寇蔚州殺刺史李思儉蔚州時為忠順軍節度朝丁度集韻音與邾同牛頭朝那山在豐州河北兵敗為虜所擒朝議欲廢豐州遷其百姓於靈夏豐州司馬唐休璟都督府司馬也唐制下都督府長史司馬從五品上以為豐州阻河為固居賊衝要自秦漢已來列為郡縣土宜耕牧隋季喪亂上時掌翻喪息浪翻遷百姓於寧慶二州致胡虜深侵以靈夏為邊境貞觀之末募人實之西北始安今廢之則河濱之地復為賊有復扶又翻又音如字靈夏等州人不安業非國家之利也乃止永淳元年六月突厥別部寇掠嵐州偏將楊玄基擊走之厥九勿翻將即亮翻永淳元年秋七月己丑立皇孫重福為唐昌王重直龍翻永淳元年庚嚴庚改壬辰詔以今年十月有事於嵩山尋以上不豫改用來年正月永淳元年甲辰徙相王輪為豫王更名旦相息亮翻更工衡翻永淳元年中書令兼太子左庶子薛元超病瘖乞骸骨許之瘖於今翻永淳元年八月己丑以將封嵩山召太子赴東都留唐昌王重福守京師以劉仁軌為之副冬十月己卯太子至東都永淳元年癸亥車駕幸奉天宮永淳元年十一月丙戌詔罷來年封嵩山上疾甚故也上苦頭重不能視召侍醫秦鳴鶴診之殿中省尚藥局有侍御醫四人從六品上診止忍翻可愈刺七亦翻天后在簾中不欲上疾愈怒曰此可斬也乃欲於天子頭刺血鳴鶴叩頭請命上曰但刺之未必不佳乃刺百會腦戶二穴針灸經百會一名三陽五會在前頂後寸半頂中央旋毛中可容豆針二分得氣即瀉腦戶一名合顱在枕骨上強後寸半禁針針令人啞舊傳鳴鶴針微出血頭疼立止吾目似明矣后舉手加額曰天賜也自負綵百匹以賜鳴鶴永淳元年戊戌以右武衛將軍程務挺為單于道安撫大使招討阿史那骨篤祿等永淳元年詔太子監國監古銜翻以裴炎劉景先郭正一同東宮平章事永淳元年上自奉天宮疾甚宰相皆不得見丁未還東都百官見於天津橋南見賢遍翻永淳元年十二月丁巳改元赦天下上欲御則天門樓宣赦氣逆不能乘馬乃召百姓入殿前宣之是夜召裴炎入受遺詔輔政上崩於貞觀殿年五十六觀古玩翻柩音舊軍國大事有不決者兼取天后進止廢萬泉芳桂奉天等宮庚申裴炎奏太子未即位未應宣敕有要速處分處昌呂翻分扶問翻望宣天后令於中書門下施行甲子中宗即位尊天后為皇太后政事咸取決焉太后以澤州刺史韓王元嘉等地尊望重澤州漢高都端氏泫氏之地西燕慕容永置建興郡後魏置建州隋改澤州大業廢州為長平郡唐復曰澤州宋白曰取濩澤為名並加三公等官以慰其心永淳元年甲戌以劉仁軌為左僕射裴炎為中書令戊寅以劉景先為侍中故事宰相於門下省議事謂之政事堂故長孫無忌為司空房玄齡為僕射魏徵為太子太師皆知門下省事及裴炎遷中書令始遷政事堂於中書省永淳元年壬午遣左威衛將軍王果左監門將軍令狐智通右金吾將軍楊玄儉右千牛將軍郭齊宗分往並益荊揚四大都督府與府司相知鎮守以國有大故備不虞也監古銜翻並卑經翻永淳元年中書侍郎同平章事郭正一為國子祭酒罷政事則天順聖皇后上之上后姓武氏諱曌並州文水人后自製曌字讀與照同音之笑翻天寶八載追上尊號曰則天順聖皇后光宅元年甲申六八四是年九月改元光宅永淳元年春正月甲申朔改元嗣聖此太子即位踰年所改之元也永淳元年立太子韋氏為皇后擢后父玄貞自普州參軍為豫州刺史此豫州本春秋沈蔡二國之地漢為汝南郡宋文帝立司州治懸瓠城以為重鎮魏改豫州唐因之後避代宗諱改為蔡州永淳元年癸巳以左散騎常侍杜陵韋弘敏為太府卿同中書門下三品自漢宣帝起杜陵邑至後魏為縣屬京兆隋遷京城始並杜陵入大興縣唐改大興曰萬年散悉亶翻騎奇寄翻永淳元年中宗欲以韋玄貞為侍中又欲授乳母之子五品官裴炎固爭中宗怒曰我以天下與韋玄貞何不可而惜侍中邪炎懼白太后密謀廢立二月戊午太后集百官於乾元殿裴炎與中書侍郎劉禕之羽林將軍程務挺張虔勗漢置南北軍掌衛京師南軍若唐諸衛也北軍若唐羽林軍也漢武帝名羽林曰建章營騎屬光祿勳後更名羽林騎取六郡良家子及死事之孤為之後漢置羽林監南朝因之後魏周曰羽林率隨左右屯衛所領兵名曰羽林貞觀中置北衙七營兵選才力驍勇者充龍朔二年曰左右羽林軍置大將軍各一員將軍各二員品同諸衛統領北衙禁兵之法令而督攝左右廂飛騎之儀仗以統諸曹之職取府兵越騎步射以為羽林軍士大朝會則執仗以衛階陛行幸則夾馳道為內仗邪音耶禕吁韋翻宣太后令廢中宗為廬陵王扶下殿下遐嫁翻中宗曰我何罪太后曰汝欲以天下與韋玄貞何得無罪乃幽于別所己未立雍州牧豫王旦為皇帝雍於用翻政事決於太后居睿宗於別殿不得有所預立豫王劉氏為皇后后德威之孫也劉德威審禮之父有飛騎十餘人飲於坊曲置飛騎見一百九十五卷貞觀十二年騎奇寄翻嚮知別無勳賞不若奉廬陵一人起出詣北門告之北門玄武門也皆捕得繫羽林獄言者斬餘以知反不告皆絞告者除五品官告密之端自此興矣永淳元年壬子以永平郡王成器為皇太子睿宗之長子也赦天下改元文明改嗣聖為文明庚申廢皇太孫重照為庶人命劉仁軌專知西京留守事流韋玄貞於欽州舊志欽州至京師五千二百五十一里太后與劉仁軌書曰昔漢以關中事委蕭何見漢高帝紀仁軌上疏辭以衰老不堪居守守式又翻因陳呂后禍敗事以申規戒呂氏禍敗事見漢高后紀今以皇帝諒暗不言璽斯氏翻暗音陰眇身且代親政遠勞勸戒復辭衰疾復扶又翻又云呂氏見嗤於後代祿産貽禍於漢朝朝直遙翻下同引喻良深愧慰交集公忠貞之操終始不渝徑直之風古今罕比初聞此語能不罔然靜而思之是為龜鏡況公先朝舊德遐邇具瞻願以匡救為懷無以暮年致請永淳元年辛酉太后命左金吾將軍丘神績詣巴州檢校故太子賢宅以備外虞其實風使殺之風讀曰諷神績行恭之子也丘行恭為將歷事高祖太宗永淳元年甲子太后御武成殿唐六典洛陽宮南三門中曰應天左曰興教右曰光政光政之內曰廣運其北曰明福明福之東曰武成門其內曰武成殿帥讀曰率上時掌翻丁卯太后臨軒遣禮部尚書武承嗣册嗣皇帝自是太后常御紫宸殿唐六典洛陽宮不載紫宸殿以西京大明宮準之紫宸殿內朝也其位置當在乾元殿後紫色之淺者為慘紫朝直遙翻永淳元年丁丑以太常卿檢校豫王府長史王德真為侍中句