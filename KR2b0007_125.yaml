body:
  text: 資治通鑑卷第一百二十五端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註宋紀七太祖文皇帝中之下元嘉二十四年丁亥四四七春正月甲戌大赦魏吐京胡及山胡曹僕渾等反二月征東將軍武昌王提等討平之癸未魏主如中山魏師之克敦煌也敦煌當作姑臧事見一百二十三卷十六年沮子余翻犍居言翻取金玉及寶器因不復閉復扶又翻下同小民爭入盜取之有司索盜不獲索山客翻下同至是牧犍所親及守藏者告之藏徂浪翻且言牧犍父子多蓄毒藥潛殺人前後以百數況復姊妹皆學左道謂學曇無讖之術也得所匿物魏主大怒賜沮渠昭儀死幷誅其宗族唯沮渠祖以先降得免祖降亦見十六年三月魏主遣崔浩就第賜牧犍死諡曰哀王魏人徙定州丁零三千家於平城六月魏西征諸將西征謂討蓋吳之將也將即亮翻處昌呂翻坐盜沒軍資及虜掠贓各千萬計並斬之初上以貨重物輕改鑄四銖錢元嘉七年鑄四銖錢見二百二十一卷取銅盜鑄上患之錄尚書事江夏王義恭建議請以大錢一當兩夏戶雅翻右僕射何尚之議曰夫泉貝之興以估貨為本估音古事存交易豈假多鑄數少則幣重少詩沼翻下同數多則物重多少雖異濟用不殊況復以一當兩徒崇虛價者邪復扶又翻若今制遂行富人之貲自倍貧者彌增其困懼非所以使之均壹也上卒從義恭議卒子恤翻下同秋八月乙未徐州刺史衡陽文王義季卒義季自彭城王義康之貶義康貶見一百二十三卷十七年帝以書誚責且戒之誚才笑翻義季猶酣飲自若以至成疾而終魏樂安宣王範卒冬十月壬午胡藩之子誕世殺豫章太守桓隆之據郡反胡藩家于豫章前交州刺史檀和之去官歸過豫章擊斬之過工禾翻十一月甲寅封皇子渾為汝陰王十二月魏晉王伏羅卒考異曰宋索虜傳曰燾所住屠蘇為疾雷所擊屠蘇倒見壓殆死左右皆號泣晉王獨不悲燾怒賜死此出於傳聞今從後魏書楊文德據葭蘆城水經註羌水出隴西羌道東南流逕宕昌城東西北去仇池五百餘里又東逕葭蘆城西武都等五郡氐皆附之魏取仇池置武都天水漢陽武階仇池五郡誘音酉二十五年戊子四四八春正月魏仇池鎮將皮豹子帥諸軍擊之將即亮翻帥讀曰率文德兵敗棄城奔漢中豹子收其妻子僚屬軍資及楊保宗所尚魏公主而還還從宣翻又如字初保宗將叛保宗叛魏見上卷二十年或曰柰何叛父母之國公主曰事成為一國之母豈比小縣公主哉魏主賜之死楊文德坐失守免官削爵土宋免削之也二月癸卯魏主如定州罷塞圍役者築塞圍見上卷二十三年誅潞縣叛民二千餘家徙河西離石民五千餘家于平城河西當作西河閏月己酉帝大蒐于宣武場建康倣洛都之制築宣武場於臺城北初劉湛既誅湛誅見一百二十三卷十七年累遷吏部尚書勢傾朝野炳之無文學性強急輕淺既居選部好詬詈賓客且多納貨賂士大夫皆惡之選須絹翻好呼報翻惡烏路翻炳之留令史二人宿於私宅尚書令史掌省中文案不當宿尚書私家上薄其過欲不問僕射何尚之因極陳炳之之短曰炳之見人有燭盤佳驢無不乞匄選用不平不可一二言其罪不可一二數也構扇是非亂俗傷風過於范曄所少賊一事耳言所少者唯不至如范曄作賊一事少詩沼翻故宜出之上欲以炳之為丹楊尹尚之曰炳之蹈罪負恩方復有尹京赫赫之授復扶又翻引用詩赫赫師尹以諭京尹然詩所謂師尹者乃太師尹氏也乃更成其形勢也古人云無賞無罰雖堯舜不能為治漢宣帝詔曰有功不賞有罪不誅雖唐虞不能以化治直吏翻事見一百二十三卷十七年苟白愚懷九死不悔言苟愚懷所欲吐者雖冒九死猶將言之而不悔未有衆過藉藉藉秦昔翻受貨數百萬更得高官厚祿如炳之者也上乃免炳之官以徐湛之為丹楊尹彭城太守王玄謨上言彭城要兼水陸魏人南寇水行自清入泗陸行自歷城瑕丘皆湊彭城故云要兼水陸夏四月乙卯以武陵王駿為安北將軍徐州刺史五月甲戌魏以交趾公韓拔為鄯善王魏書官氏志內入諸姓出大汗氏改為韓氏鄯上扇翻賦役其民比之郡縣當兩大錢行之經時公私不以為便己卯罷之六月丙寅荊州刺史南譙王義宣進位司空辛酉魏主如廣德宮魏主起殿於陰山北殿成而楊難當來朝因命曰廣德宮秋八月甲子封皇子彧為淮陽王彧於六翻西域般悅國去平城萬有餘里據北史般悅當作悅般般音鉢使疏吏翻請與魏東西合擊柔然魏主許之中外戒嚴九月辛未以尚書右僕射何尚之為左僕射領軍將軍沈演之為吏部尚書丙戌魏主如陰山魏成周公萬度歸擊焉耆大破之焉耆王鳩尸卑那奔龜茲龜茲音丘慈魏主詔唐和與前部王車伊洛帥所部兵會度歸討西域車伊洛車師大帥也世附於魏魏封為前部王帥讀曰率說輸芮翻因共擊波居羅城拔之冬十月辛丑魏弘農昭王奚斤卒子它觀張觀下脫應字襲魏主曰斤關西之敗事見一百二十一卷五年朕以斤佐命先朝朝直遙翻復其爵邑使得終天年君臣之分亦足矣分扶問翻乃降它觀爵為公癸亥魏大赦十二月魏萬度歸自焉耆西討龜茲留唐和鎮焉耆柳驢戍主乙直伽謀叛伽求迦翻和擊斬之由是諸胡咸服西域復平復扶又翻下復伐同魏太子朝于行宮陰山之行宮也朝直遙翻至受降城即漢武帝所築受降城降戶江翻因積糧於城內置戍而還還從宣翻又如字二十六年己丑四四九春正月戊辰朔魏主饗㣥臣於漠南甲戌復伐柔然高涼王那出東道略陽王羯兒出西道羯居謁翻魏主與太子出涿邪山邪讀曰耶行數千里柔然處羅可汗恐懼遠遁處昌呂翻可從刊入聲汗音寒二月己亥上如丹徒謁京陵三月丁巳大赦募諸州樂移者數千家以實京口樂音洛庚寅魏主還平城夏五月壬午帝還建康庚寅魏主如陰山帝欲經略中原㣥臣爭獻策以迎合取寵彭城太守王玄謨尤好進言守手又翻好呼到翻帝謂侍臣曰觀玄謨所陳令人有封狼居胥意漢霍去病伐匈奴封狼居胥禪于姑衍以臨瀚海陛下今當席卷趙魏卷讀曰捲檢玉岱宗封泰山用玉檢願上封禪書載子亥翻上時掌翻上悅淑耽之曾孫也袁耽見晉成帝紀秋七月辛未以廣陵王誕為雍州刺史雍於用翻上以襄陽外接關河欲廣其資力乃罷江州軍府文武悉配雍州沈約曰晉孝武始於襄陽立雍州幷立僑郡縣至是割荊州之襄陽南陽新野順陽隨五郡為雍州而僑郡縣猶寄寓在諸郡界悉給襄陽九月魏主伐柔然高涼王那出東道略陽王羯兒出中道柔然處羅可汗悉國內精兵圍那數十重那掘塹堅守章十二行本守下有相持數日四字乙十一行本同孔本同張校同退齋校同處羅數挑戰輒為那所敗重直龍翻掘其月翻塹七豔翻數所角翻挑徒了翻敗補邁翻以那衆少而堅少詩沼翻疑大軍將至解圍夜去那引兵追之九日九夜處羅益懼棄輜重踰穹隆嶺遠遁那收其輜重重直用翻引軍還與魏主會於廣澤略陽王羯兒收柔然民畜凡百餘萬自是柔然衰弱屏跡不敢犯魏塞屏必郢翻冬十二月戊申魏主還平城沔北諸山蠻寇雍州建威將軍沈慶之帥後軍中兵參軍柳元景隨郡太守宗慤等二萬人討之帥讀曰率八道俱進先是諸將討蠻者皆營於山下以迫之蠻得據山發矢石以擊官軍多不利乘高臨下矢石之勢所及過於平原相遇者故軍多不利先悉薦翻去歲蠻田大稔積穀重巖重直龍翻不可與之曠日相守也不若出其不意衝其腹心破之必矣乃命諸軍斬木登山鼓譟而前㣥蠻震恐因其恐而擊之所向奔潰斬木登山八道並進蠻救首救尾之不暇故震恐而奔潰若一道而進蠻聚兵據險拒戰雖欲斬木而登山庸可得乎二十七年庚寅四五建武司馬申元吉引兵趨碻磝春正月乙酉魏主如洛陽建武司馬申元吉引兵趨碻磝沈慶之自冬至春屢破雍州蠻因蠻所聚穀以充軍食前後斬首三千級虜二萬八千餘口降者二萬五千餘戶降下江翻幸諸山大羊蠻憑險築城守禦甚固慶之擊之命諸軍連營於山中開門相通各穿池於營內朝夕不外汲頃之風甚蠻潛兵夜來燒營諸軍以池水沃火多出弓弩夾射之射而亦翻蠻兵散走蠻所據險固不可攻慶之乃置六戍以守之久之蠻食盡稍稍請降悉遷於建康以為營戶史言沈慶之又能持久以弊諸蠻降戶江翻建武司馬申元吉引兵趨碻磝魏主將入寇二月甲午大獵於梁川梁川後魏天平二年置梁城郡於其地領參合旋鴻二縣敕淮泗諸郡若魏寇小至則各堅守大至則拔民歸壽陽邊戍偵候不明偵丑鄭翻辛亥魏主自將步騎十萬奄至將即亮翻騎奇寄翻考異曰宋書是月辛丑南平王鑠進號西平辛巳索虜寇汝南按長曆二月壬辰朔十日辛丑二十日辛亥巳當作亥南頓太守鄭琨南頓縣本屬汝南晉惠帝分置南頓郡章十二行本鄭作郭乙十一行本同孔本同張校同道隱並棄城走是時豫州刺史南平王鑠鎮壽陽遣左軍行參軍陳憲行汝南郡事守懸瓠水經註汝水自汝南上蔡縣東逕懸瓠城北今豫州刺史汝南郡治汝水枝別左出西北流又屈西東轉又西南會汝形若懸瓠故以名城瓠戶故翻又音乎魏主圍之三月以軍興減內外百官俸三分之一魏人晝夜攻懸瓠多作高樓臨城以射之射而亦翻矢下如雨城中負戶以汲施大鉤於衝車之端以牽樓堞壞其南城堞達叶翻壞音怪外立木柵以拒之魏人填塹肉薄登城薄迫也塹七豔翻將即亮翻積屍與城等魏人乘屍上城短兵相接憲銳氣愈奮戰士無不一當百殺傷萬計城中死者亦過半魏主遣永昌王仁將步騎萬餘驅所掠六郡生口北屯汝陽汝陽縣本屬汝南郡江左分立汝陽郡帝遣間使命駿發騎齎三日糧襲之間古莧翻使疏吏翻騎奇寄翻下同駿發百里內馬得千五百匹分為五軍遣參軍劉泰之考異曰後魏紀作劉坦之今從宋書田曹主營田集曹主安集流散猶漢之安集掾也時駿為安北將軍謙之等皆府僚也晉制王國置左右常侍各一人將即亮翻直趨汝陽趨七喻翻魏人唯慮救兵自壽陽來不備彭城丁酉泰之等潛進擊之殺三千餘人燒其輜重重直用翻魏人失章十二行本失作奔乙十一行本同孔本同張校同退齋校同熊校同散諸生口悉得東走魏人偵知泰之等兵無繼偵丑鄭翻復引兵擊之復扶又翻垣謙之先退士卒驚亂棄仗走泰之為魏人所殺肇之溺死天祚為魏所擒謙之定幼文及士卒免者九百餘人馬還者四百匹魏主攻懸瓠四十二日帝遣南平內史臧質詣壽陽與安蠻司馬劉康祖共將兵救懸瓠時南平王鑠領安蠻校尉以康祖為司馬魏殿中尚書知殿內兵馬倉庫任音壬康祖道錫之從兄也劉道錫見一百二十三卷十八年從才用翻夏四月魏主引兵還還從宣翻又如字癸卯至平城壬子安北將軍武陵王駿降號鎮軍將軍垣謙之伏誅尹定杜幼文付尚方輸作尚方也驤思將翻魏主遺帝書曰前蓋吳反逆扇動關隴彼復使人就而誘之丈夫遺以弓矢婦人遺以環釧復扶又翻誘音酉遺于季翻通使蓋吳事見上卷二十二年二十三年釧尺絹翻臂環也是曹正欲譎誑取賂譎古穴翻誑居況翻豈有遠相服從之理為大丈夫何不自來取之而以貨誘我邊民募往者復除七年是賞姦也復方目翻我今來至此土所得多少孰與彼前後得我民邪彼若欲存劉氏血食者當割江以北輸之攝守南渡攝收也言收江北守兵南渡江也章十二行本當上有如此二字乙十一行本同孔本同張校同釋江南使彼居之不然可善敕方鎮刺史守宰嚴供帳之具守式又翻帳當作張音竹亮翻來秋當往取揚州大勢已至終不相縱彼往日北通蠕蠕西結赫連沮渠吐谷渾東連馮弘高麗事並見前蠕人兗翻沮子余翻吐從暾入聲谷音浴麗力知翻我皆滅之以此而觀彼豈能獨立蠕蠕吳提吐賀真皆已死我今北征先除有足之寇柔然多馬故言其有足來秋當復往取之復扶又翻下復縱復非同以彼無足故不先討耳我往之日彼作何計為掘塹自守為築垣以自障也塹七豔翻我當顯然往取揚州不若彼翳行竊步也翳於計翻蔽也言隱蔽其身而行也彼來偵諜我已擒之復縱還其人目所盡見委曲善問之偵丑鄭翻彼前使裴方明取仇池既得之疾其勇功己不能容有臣如此尚殺之事見上卷二十年彼非我敵也彼常欲與我一交戰我亦不癡復非苻堅何時與彼交戰觀此魏人猶有憚南兵之心蓋高祖之餘威而邊垂諸將猶為有人也夜則離彼百里外宿騎奇寄翻離力智翻吳人正有斫營伎伎渠綺翻彼募人以來不過行五十里天已明矣彼募人之首豈得不為我有哉彼公時舊臣雖老猶有智策知今已殺盡謂謝晦檀道濟輩取彼亦不須我兵刃此有善呪婆羅門天竺國有婆羅門善呪術建武司馬申元吉引兵趨碻磝侍中左衞將軍江湛遷吏部尚書湛性公廉與僕射徐湛之並為主上所寵信時稱江徐建武司馬申元吉引兵趨碻磝魏司徒崔浩自恃才略及魏主所寵任專制朝權嘗薦冀定相幽幷五州之士數十人皆起家為郡守朝直遙翻相息亮翻守式又翻太子晃曰先徵之人亦州郡之選也先徵之人謂游雅李靈高允等勤勞未答宜先補郡縣以新徵者代為郎吏且守令治民宜得更事者守手又翻治直之翻更工衡翻浩固爭而遣之中書侍郎領著作郎高允聞之謂東宮博士管恬曰崔公其不免乎苟遂其非而校勝於上將何以堪之魏主以浩監祕書事監工銜翻使與高允等共譔國記譔雛免翻譔述也曰務從實錄著作令史閔湛郗標郗丑之翻性巧佞為浩所寵信浩嘗註易及論語詩書湛標上疏言馬鄭王賈不如浩之精微馬融鄭玄王肅賈逵也班浩所註令天下習業令習肄浩所註經以為家業傳直戀翻令後生得觀正義浩亦薦湛標有著述才湛標又勸浩刊所譔國史于石以彰直筆高允聞之謂著作郎宗欽曰湛標所營分寸之間恐為崔門萬世之禍吾徒亦無噍類矣噍才笑翻浩竟用湛標議刊石立於郊壇東方百步據水經註平城西郭外有郊天壇浩書魏之先世事皆詳實列於衢路往來見者咸以為言北人無不忿恚北人謂其先世從拓跋氏來自北荒者恚於避翻以為暴揚國惡帝大怒使有司按浩及祕書郎吏等罪狀初遼東公翟黑子有寵於帝奉使幷州使疏吏翻受布千匹事覺黑子謀於高允曰主上問我當以實告為當諱之允曰公帷幄寵臣有罪首實首式救翻庶或見原原赦也重直用翻中書侍郎崔覽公孫質曰若首實罪不可測不如諱之黑子怨允曰君柰何誘人就死地入見帝不以實對帝怒殺之誘音酉見賢遍翻帝使允授太子經及崔浩被收被皮義翻太子召允至東宮因留宿明旦與俱入朝朝直遙翻至宮門謂允曰入見至尊吾自導卿脫至尊有問但依吾語允曰為何等事也為于偽翻太子曰入自知之太子見帝言高允小心慎密且微賤制由崔浩請赦其死帝召允問曰國書皆浩所為乎對曰太祖記前著作郎鄧淵所為先帝記及今記臣與浩共為之然浩所領事多總裁而已謂總其大綱裁其可否也臣多於浩帝怒曰允罪甚於浩何以得生太子懼曰天威嚴重允小臣迷亂失次耳臣曏問皆云浩所為帝問允信如東宮所言乎對曰臣罪當滅族不敢虛妄殿下以臣侍講日久哀臣欲匄其生耳匄古大翻實不問臣臣亦無此言不敢迷亂帝顧太子曰直哉此人情所難而允能為之臨死不易辭信也為臣不欺君貞也宜特除其罪以旌之遂赦之於是召浩前臨詰之詰去吉翻浩惶惑不能對允事事申明皆有條理帝命允為詔誅浩及僚屬宗欽段承根等下至僮吏凡百二十八人皆夷五族允持疑不為帝頻使催切允乞更一見然後為詔帝引使前允曰浩之所坐若更有餘釁釁許覲翻非臣敢知若直以觸犯罪不至死觸犯謂直書國惡不為尊者諱也命武士執允太子為之拜請為于偽翻下欲為同帝意解乃曰無斯人當有數千口死矣六月己亥詔誅清河崔氏與浩同宗者無遠近及浩姻家范陽盧氏太原郭氏河東柳氏並夷其族浩所連姻皆士望也非有憑附屬請之罪以浩故皆赤其族擇耦可不謹哉縶浩置檻內送城南檻檻車也後魏刑人必於城南縶陟立翻溲所鳩翻小便也呼聲嗷嗷嗷五刀翻聞於行路聞音問宗欽臨刑歎曰高允其殆聖乎他日太子讓允曰人亦當知機吾欲為卿脫死既開端緒而卿終不從激怒帝如此每念之使人心悸悸其季翻允曰夫史者所以記人主善惡為將來勸戒故人主有所畏忌慎其舉措崔浩孤負聖恩以私欲沒其廉潔愛憎蔽其公直此浩之責也至於書朝廷起居言國家得失此為史之大體未為多違允言浩死非其罪死生榮辱義無獨殊誠荷殿下再造之慈荷下可翻違心苟免非臣所願也太子動容稱歎允退謂人曰我不奉東宮指導者恐負翟黑子故也初冀州刺史崔賾武城男崔模與浩同宗而別族賾士革翻別分也依宋祁國語補音彼列翻浩常輕侮之由是不睦及浩誅二家獨得免賾逞之子也崔逞歸魏為太祖所殺辛丑魏主北巡陰山魏主既誅崔浩而悔之會北部尚書章十二行本書下有宣城公三字乙十一行本同孔本同張校同李孝伯病篤魏北部尚書知北邊州郡魏主悼之曰李宣城可惜李孝伯封宣城公朕失言崔司徒可惜李宣城可哀孝伯順之從父弟也李順亦為魏主所寵任得罪而死從才用翻軍國謀議皆出孝伯寵眷亞於浩建武司馬申元吉引兵趨碻磝初車師大帥車伊洛世服於魏帥所類翻魏拜伊洛平西將軍封前部王伊洛將入朝沮渠無諱斷其路沮渠無諱時屯高昌朝直遙翻斷丁管翻破之無諱卒卒於元嘉二十一年伊洛遣人說乾壽乾壽遂帥其民五百餘家奔魏帥讀曰率伊洛又說李寶弟欽等五十餘人下之皆送于魏說輸芮翻伊洛西擊焉耆留其子歇守城沮渠安周引柔然兵間道襲之間古莧翻攻拔其城歇走就伊洛共收餘衆保焉耆鎮魏破焉耆以為鎮言為沮渠氏所攻首尾八年元嘉十九年無諱襲據高昌自此與車師相攻使疏吏翻無以自存臣今棄國出奔得免者僅三分之一已至焉耆東境乞垂賑救魏主詔開焉耆倉以賑之賑津忍翻建武司馬申元吉引兵趨碻磝吐谷渾王慕利延為魏所逼上表求入保越巂唐時吐蕃與雲南窺蜀即此路也蓋自漢武帝開昆明之後後人遂通此路耳巂音髓慕利延竟不至建武司馬申元吉引兵趨碻磝上欲伐魏丹楊尹徐湛之吏部尚書江湛彭城太守王玄謨等並勸之左軍將軍劉康祖以為歲月已晚請待明年上曰北方苦虜虐政義徒並起頓兵一周沮向義之心不可沮在呂翻太子步兵校尉沈慶之諫曰時東宮置兵與羽林等故亦有步兵校尉南史曰高祖永初二年置東宮屯騎步兵翊軍三校尉我步彼騎其勢不敵騎奇計翻檀道濟再行無功營陽王景平二年道濟出師元嘉七年至濟上皆無功而還見一百二十一卷七年未踰兩將將即亮翻六軍之盛不過往時恐重辱王師重直用翻上曰王師再屈別自有由道濟養寇自資彥之中塗疾動謂彥之目疾大動也今夏水浩汗河道流通汎舟北下碻磝必走滑臺小戍易可覆拔易以豉翻克此二城館穀弔民館穀就食敵人所積之穀自然不固比及冬初比必利翻城守相接虜馬過河即成擒也慶之又固陳不可上使徐湛之江湛難之難乃旦翻慶之曰治國譬如治家耕當問奴織當訪婢治直之翻陛下今欲伐國而與白面書生輩謀之事何由濟上大笑太子劭及護軍將軍蕭思話亦諫上皆不從魏主聞上將北伐復與上書曰彼此和好日久而彼志無厭復扶又翻和好呼到翻厭於鹽翻誘我邊民誘音酉今春南巡聊省我民省悉井翻驅之便還今聞彼欲自來設能至中山及桑乾川乾音干隨意而行來亦不迎去亦不送若厭其區宇者可來平城居我亦往揚州相與易地彼年已五十未嘗出戶雖自力而來如三歲嬰兒與我鮮卑生長馬上者果如何哉觀魏主與帝二書誠有憚江南之心大明以後北不復憚南矣長知兩翻可以相與今送獵馬十二匹幷氈藥等物彼來道遠馬力不足可乘或不服水土藥可自療也秋七月庚午詔曰虜近雖摧挫謂攻懸瓠不克而退也比得河朔秦雍華戎表疏比毗寐翻近也雍於用翻歸訴困棘棘急也跂丘弭翻又去智翻舉踵而望脚跟不著地也潛相糾結以候王師芮芮亦遣間使芮芮即蠕蠕南人語轉耳間古莧翻誓為掎角掎居蟻翻經略之會實在茲日可遣寧朔將軍王玄謨帥太子步兵校尉沈慶之鎮軍諮議參軍申坦水軍入河受督於青冀二州刺史蕭斌帥讀曰率斌音彬太子左衞率臧質驍騎將軍王方回徑造許洛率所律翻驍堅堯翻騎奇寄翻造七到翻徐兗二州刺史武陵王駿豫州刺史南平王鑠各勒所部東西齊舉梁南北秦三州刺史劉秀之震盪隴苦堅翻太尉江夏王義恭出次彭城為衆軍節度夏戶雅翻坦鍾之曾孫也申鍾見九十五卷晉成帝咸和九年是時軍旅大起王公主及朝士牧守下至富民各獻金帛雜物以助國用朝直遙翻又以兵力不足悉發青冀徐豫二兗六州二兗南兗北兗也倩使蹔行三五者三丁發其一五丁發其二倩七政翻自符到之日以十日為裝束過此期即行緣淮三郡集盱眙緣江五郡南東海南蘭陵南琅邪南東莞晉陵也緣淮三郡臨淮淮陵下邳也盱眙音吁怡皆加厚賞有司又奏軍用不充揚南徐兗江四州此兗謂南兗州僧尼滿二十萬並四分借一事息即還建武司馬申元吉引兵趨碻磝乙亥魏濟州刺史王買德棄城走魏明元帝泰常八年置濟州於碻磝城趨七喻翻濟子禮翻考異曰宋略云虜濟州刺史王淮敗走虜支解王淮傳示列戍今從宋書魏青州刺史張淮之亦棄城走樂安千乘博昌之地唐青州千乘縣此時樂安郡也使王玄謨進圍滑臺考異曰宋略九月庚申玄謨前軍次白馬與虜兗州刺史歌得跋戰破之玄謨進攻滑臺今從宋書雍於用翻遣中兵參軍柳元景振威將軍尹顯祖奮武將軍曾方平南史作魯方平參考水經作魯為是龐皮江翻將即亮翻後軍外兵參軍龐季明年七十餘自以關中豪右請入長安招合夷夏夏戶雅翻誕許之乃自貲谷入盧氏盧氏民趙難納之貲谷在盧氏縣南山之南盧氏縣漢屬弘農郡晉分屬上洛郡唐屬虢州誘音酉說輸芮翻應之者甚衆安都等因之自熊耳山出熊耳山在盧氏故縣東豫州刺史南平王鑠遣中兵參軍胡盛之出汝南梁坦出上蔡向長社考異曰鑠傳作到坦之今從宋略棄城走爽軌之子也軌魯宗之之子破之軍有幢主隊主總一軍者謂之軍主僕蘭亦姓拓跋魏書官氏志內入諸姓僕蘭氏改為僕氏幢傳江翻虎牢魏豫州刺史治所也進逼虎牢魏㣥臣初聞有宋師言於魏主請遣兵救緣河穀帛魏主曰馬今未肥天時尚熱速出必無功若兵來不止且還陰山避之國人本著羊皮袴何用綿帛國人謂同自北荒來之種人也著陟略翻吾無憂矣展寬也九月辛卯魏主引兵南救滑臺命太子晃屯漠南以備柔然吳王余守平城庚子魏發州郡兵五萬分給諸軍王玄謨士衆甚盛器械精嚴而玄謨貪愎好殺愎弼力翻好呼到翻初圍滑臺城中多茅屋衆請以火箭燒之杜佑曰以小瓢盛油冠矢端射城樓櫓板木上瓢敗油散因燒矢內簳中射油散處火立燃復以油瓢續之則樓櫓盡焚謂之火箭彼吾財也何遽燒之城中即撤屋穴處處昌呂翻時河洛之民競出租穀操兵來赴者日以千數操千高翻玄謨不即其長帥而以配私暱即就也言不能就其長帥而用之使各為部隊而以其人分配私所愛暱者長知兩翻帥所類翻暱尼質翻責大梨八百由是衆心失望攻城數月不下聞魏救將至衆請發車為營玄謨不從玄謨豈不知為車營可憑而戰哉蓋於時已有走心矣冬十月癸亥魏主至枋頭使關內侯代人陸真夜與數人犯圍潛入滑臺撫慰城中且登城視玄謨營曲折還報乙丑魏主渡河衆號百萬鞞鼓之聲震動天地鞞部迷翻玄謨懼退走魏人追擊之死者萬餘人麾下散亡略盡委棄軍資器械山積先是玄謨遣鍾離太守垣護之以百舸為前鋒據石濟鍾離縣漢屬九江郡晉屬淮南郡晉安帝分立鍾離郡屬南兗州沈約志屬徐州水經曰河水逕東燕縣故城北則有濟水自北來注之註云垣護之守石濟即此處先悉薦翻舸古我翻守手又翻護之聞魏兵將至馳書勸玄謨急攻曰昔武皇攻廣固死沒者甚衆事見一百一十五卷晉安帝義熙五年六年豈得計士衆傷疲願以屠城為急玄謨不從使玄謨從護之計急攻而得滑臺魏兵隨至固無以善其後也不暇報護之魏人以所得玄謨戰艦連以鐵鎖三重斷河艦戶黯翻重直龍翻斷音短以絕護之還路河水迅急護之中流而下每至鐵鎖以長柯斧斷之斷音短魏不能禁唯失一舸餘皆完備而返舸古我翻蕭斌遣沈慶之將五千人救玄謨將即亮翻慶之曰玄謨士衆疲老寇虜已逼得數萬人乃可進小軍輕往無益也斌固遣之會玄謨遁還斌將斬之慶之固諫曰佛貍威震天下魏主小字佛狸佛音弼豈玄謨所能當且殺戰將以自弱非良計也將即亮翻斌乃止斌欲固守碻磝慶之曰今青冀虛弱而坐守窮城若虜衆東過清東非國家有也東過謂越碻磝而過東入青冀界清東謂清水以東也復作朱脩之滑臺耳朱脩之事見一百二十二卷八年復扶又翻下復召同不聽斌等退師使疏吏翻斌復召諸將議之並謂宜留慶之曰閫外之事將軍得以專之詔從遠來不知事勢節下有一范增不能用引漢高帝之言斌及坐者並笑曰沈公乃更學問更經也歷也音工衡翻慶之厲聲曰衆人雖知古今不如下官耳學也耳學謂雖未嘗目覽書傳能以耳聽人所講說者而學之申坦垣護之據清口清水南通淮北通河此謂清水入河之口水經濟水東北過壽張縣西界安民亭南汶水從東北來注之註云戴延之所謂清口也帥讀曰率下同自此以上皆王玄謨攻滑臺事閏月龐法起等諸軍入盧氏斬縣令李封以趙難為盧氏令使帥其衆為鄉導鄉讀曰嚮柳元景自百丈崖從諸軍於盧氏百丈崖在溫谷南辛未拔之擒魏弘農太守李初古拔薛安都留屯弘農丙戌龐法起進向潼關自閏月以下皆柳元景攻關陝事魏主命諸將分道並進永昌王仁自洛陽趨壽陽尚書長孫真趣馬頭沈約曰馬頭郡故淮南當塗縣地晉安帝立馬頭郡因山形而名屬南豫州屬南豫州宋屬徐州將即亮翻趣七喻翻下同高涼王那自青州趣下邳魏主自東平趣鄒山十一月辛卯魏主至鄒山考異曰宋略云戊子至鄒山今從後魏書宋魯郡時治鄒山使人排而仆之秦始皇二十八年上鄒嶧山立石頌德楚王建自清西進屯蕭城步尼公自清東進屯留城魏收地形志沛郡蕭縣有蕭城彭城郡之留縣有留城江夏王義恭遣軍主嵇玄敬將兵向留城文恭為魏所敗敗補賣翻步尼公遇玄敬引兵趣苞橋欲渡清西沛縣民燒苞橋夜於林中擊鼓魏以為宋兵大至爭渡苞水水經註泡水亦曰豐水水上承大薺陂東逕已氏及平樂縣又東逕豐縣故城南又東合黃水水上舊有梁謂之苞橋沛縣民燒泡橋魏兵溺死之地也又東逕沛縣故城南自此以上魏主分遣諸將事也詔以柳元景為弘農太守元景使薛安都尹顯祖先引兵就龐法起等於陝元景於後督租陝城險固諸軍攻之不拔陝失冉翻魏洛州刺史張是連提考異曰宋略作張是連踶今從宋書自洛至陝有三崤之險帥讀曰率魏人縱突騎諸軍不能敵騎奇寄翻下同安都怒脫兜鍪解鎧鍪音牟唯著絳納兩當衫著陟略翻前當心後當背謂之兩當衫馬亦去具裝瞋目橫矛單騎突陳所向無前魏人夾射不能中如是數四殺傷不可勝數去羌呂翻瞋七人翻陳讀曰陣射而亦翻中竹仲翻勝音升會日暮別將魯元保引兵自函谷關至魏兵乃退元景遣軍副柳元怙將步騎二千救安都等一軍之將謂之軍主副將謂之軍副魏人不之知明日安都等陳於城西南陳讀曰陣曾方平謂安都曰今勍敵在前勍渠京翻堅城在後是吾取死之日卿若不進我當斬卿我若不進卿當斬我也安都曰善卿言是也遂合戰元怙引兵自南門鼓譟直出旌旗甚盛魏衆驚駭安都挺身奮擊流血凝肘矛折折而設翻易之更入諸軍齊奮自旦至日昃魏衆大潰斬張是連提及將卒三千餘級其餘赴河塹死者甚衆生降二千餘人昃阻力翻將即亮翻塹七豔翻降下江翻明日元景至讓降者曰汝輩本中國民今為虜盡力力屈乃降何也為于偽翻皆曰虜驅民使戰後出者滅族以騎蹙步未戰先死此將軍所親見也諸將欲盡殺之元景曰今王旗北指當使仁聲先路先悉薦翻盡釋而遣之皆稱萬歲而去甲午克陝城龐法起等進攻潼關魏戍主婁須棄城走法起等據之關中豪桀所在起及四山羌胡皆來送款關中之地四面阻山時羌胡皆依山而居自為聚落上以王玄謨敗退魏兵深入柳元景等不宜獨進皆召還元景使薛安都斷後斷丁管翻引兵歸襄陽詔以元景為襄陽太守此以上柳元景攻關陝事魏永昌王仁攻懸瓠項城拔之帝恐魏兵至壽陽召劉康祖使還癸卯仁將八萬騎追及康祖於尉武將即亮翻騎奇計翻考異曰宋略及南平王鑠傳皆作尉氏按康祖傳云去壽陽裁數十里然則非尉氏也今從康祖及索虜傳作尉武今按沈約志秦郡有尉氏縣秦郡治堂邑屬南兗州非南平王鑠所統其地又不在壽陽北數十里溫公之考覈精矣按北史拓跋崙傳尉武亭名劉康祖戰死于此康祖有衆八千人軍副胡盛之幢隊軍皆有主副間古莧翻取至謂取至壽陽也康祖怒曰臨河求敵遂無所見幸其自送柰何避之乃結車營而進下令軍中曰顧望者斬首轉步者斬足魏人四面攻之將士皆殊死戰自旦至晡殺魏兵萬餘人流血沒踝踝胡瓦翻足踝也康祖身被十創被皮義翻創初良翻意氣彌厲魏分其衆為三且休且戰會日暮風急魏以騎負草燒軍營康祖隨補其闕有流矢貫康祖頸墜馬死餘衆不能戰遂潰魏人掩殺殆盡考異曰康祖傳云大戰一日一夜又云虜死者太半今從宋略南平王鑠使左軍行參軍王羅漢以三百人戍尉武魏兵至衆欲依卑林以自固羅漢以受命居此不去魏人攻而擒之鎖其頸使三郎將掌之三郎將蓋主內三郎魏謂衞士曰三郎將將即亮翻斷丁管翻抱鎖亡奔盱眙盱眙音吁怡魏永昌王仁進逼壽陽焚掠馬頭鍾離南平王鑠嬰城固守自此以上魏兵向壽陽事魏兵在蕭城去彭城十餘里彭城兵雖多而食少少詩沼翻下同太尉江夏王義恭欲棄彭城南歸安北中兵參軍沈慶之以為歷城兵少食多欲為函箱車陳以精兵為外翼奉二王及女直趨歷城陳讀曰陣趨七喻翻分兵配護軍蕭思話使留守彭城太尉長史何勗欲席卷奔鬱洲東海郡贛榆縣東海中有鬱洲今東海軍是其地泰始三年於此僑立青州齊梁為青冀二州刺史治所卷讀曰捲鬱音聿義恭去意已判判亦決也沈慶之之議自彭城趨歷城猶曰主於進何勗之議則主於奔退耳若歷城鬱洲有可至之理下官敢不高贊時沛郡治蕭城張暢以安北長史帶沛郡太守高抗也贊助也言抗聲以助決其議也百姓咸有走志但以關扃嚴固欲去莫從耳扃古熒翻外閉之關也此言門守嚴固百姓無從得去一旦動足則各自逃散欲至所在何由可得今軍食雖寡朝夕猶未窘罄窘渠隕翻豈有捨萬安之術而就危亡之道若此計必行下官請以頸血汚公馬蹄汚烏故翻武陵王駿謂義恭曰阿父既為總統去留非所敢干義恭頓彭城為諸軍節度故曰總統阿讀從安入聲而委鎮奔逃實無顏復奉朝廷義恭於駿諸父也駿小字道民徐州刺史治彭城故曰城主復扶又翻張長史言不可異也義恭乃止壬子魏主至彭城立氈屋於戲馬臺以望城中戲馬臺在彭城城南其高十仞廣袤百步項羽所築也馬文恭之敗也隊主蒯應沒於魏此上蕭城之敗也蒯苦怪翻甘蔗說文所謂諸蔗也生於南方北人嗜之蔗之夜翻仍就求橐駝韋昭曰橐駝背肉似橐而善負物顏師古曰言能負橐而馱物故曰橐駝爾雅翼駝外國之奇畜背有兩封如鞍其足三節色蒼褐負物至千斤日三百里凡欲樁載必先屈足受之所載未盡其量終不起古語謂之橐佗橐囊也佗負荷也今云駱駝蓋橐音之轉魏主使尚書李孝伯至南門餉義恭貂裘餉駿橐駝及騾騾盧戈翻驢父馬母堅耐健走且曰魏主致意安北可蹔出見我蹔與暫同何為勞苦將士備守如此駿使張暢開門出見之曰安北致意魏主常遲面寫遲直利翻待也但以人臣無境外之交恨不蹔悉悉詳盡也言恨不蹔時得詳盡所懷也悅以使之則勞而無怨耳易兌卦彖辭曰悅以先民民忘其勞皆與之復餉氈及九種鹽胡豉孝伯傳曰凡此諸鹽各有所宜白鹽食鹽主上日所食黑鹽療腹脹氣滿末之六銖以酒而服胡鹽療目痛戎鹽療諸瘡赤鹽駮鹽馬齒鹽四種並非食鹽豉是義翻說文曰配鹽幽尗也胡豉胡人所造尗與菽同豆也復扶又翻種章勇翻義恭應之曰受任戎行行戶剛翻不齎樂具孝伯問暢何為怱怱閉門絕橋暢曰二王以魏主營壘未立將士疲勞此精甲十萬恐輕相陵踐故閉城耳待休息士馬然後共治戰場刻日交戲左傳晉楚將戰于城濮楚令尹子玉遣使謂晉曰請與君之士戲踐息演翻治直之翻賓有禮主則擇之左傳魯大夫羽父語薛侯之言昨見衆賓至門未為有禮魏主使人來言曰致意太尉安北何不遣人來至我所彼此之情雖不可盡要須見我小大知我老少觀我為人若諸佐不可遣亦可使僮幹來諸佐謂佐吏也僮幹則給使令者耳魏主此言猶知宋為有人魏主形狀才力久為來往所具李尚書親自銜命不患彼此不盡故不復遣使復扶又翻下無復同孝伯又曰王玄謨亦常才耳南國何意作如此任使以致奔敗自入此境七百餘里主人竟不能一相拒逆鄒山之險君家所憑前鋒始接崔邪利遽藏入穴諸將倒曳出之鄒山多石穴土人謂穴為嶧相率入保藏以避兵故孝伯云然今從在此暢曰王玄謨南土偏將不謂為才但以之為前驅大軍未至河冰向合玄謨因夜還軍致戎馬小亂耳崔邪利陷沒何損於國魏主自以數十萬衆制一崔邪利乃足言邪知入境七百里無相拒者此自太尉神算鎮軍聖略武陵王駿降號鎮軍將軍不用相語語牛倨翻孝伯曰魏主當不圍此城自帥衆軍直造瓜步瓜步山在秦郡尉氏縣界尉氏隋改為六合縣南北對境圖曰今桃葉山即瓜步鎮之地帥讀曰率造七到翻彭城不待圍若其不捷彭城亦非所須也我今當南飲江湖以療渴耳暢曰去留之事自適彼懷若虜馬遂得飲江便為無復天道先是童謠云先悉薦翻虜馬飲江水佛貍死卯年佛音弼故暢云然暢音容雅麗孝伯與左右皆歎息孝伯亦辯贍且去謂暢曰長史深自愛相去步武舉足而行曰步足迹曰武暢曰君善自愛冀蕩定有期君章十二行本君上有相見無遠四字乙十一行本同孔本同張校同退齋校同若得還宋朝今為相識之始兵交使在其間史言行人善於辭令亦足以增國威朝直遙翻上起楊文德為輔國將軍引兵自漢中西入搖動隴苦堅翻文德宗人楊高帥陰平平武㣥氐拒之帥讀曰率文德擊高斬之陰平平武悉平陰平縣漢屬廣漢屬國晉泰始中置陰平郡劉蜀分陰平置平廣縣晉太康元年更名平武陰平平武皆今龍州地也宋白曰陰平今文州平武今龍州不克執送荊州使文德從祖兄頭戍葭蘆啖徒覽翻又徒濫翻從才用翻建武司馬申元吉引兵趨碻磝丁未大赦建武司馬申元吉引兵趨碻磝魏主攻彭城不克十二月丙辰朔引兵南下使中書郎魯秀出廣陵高涼王那出山陽永昌王仁出橫江所過無不殘滅城邑皆望風奔潰戊午建康纂嚴己未魏兵至淮上考異曰魏本紀云丁卯至淮按宋略己未虜至淮西宋本紀乙丑胡崇之等敗今從之上使輔國將軍臧質將萬人救彭城將即亮翻至盱眙魏主已過淮盱眙音吁怡質使宀儿從僕射胡崇之積弩將軍臧澄之營東山宀儿而隴翻從才用翻考異曰序傳作臧證之今從帝紀質傳作澄之建威將軍毛熙祚據前浦東山前浦皆在盱眙城左右東山在今盱眙城東南東山之北則高家山高家山之東則陡山稍南則都梁山都梁山之東北則古盱眙城城臨遇明河又東逕楊茅澗口又東逕富陵河口則君山魏太武作浮橋於此自此渡淮稍東則龜山考異曰宋略云質屯盱眙城北今從宋書乙丑魏燕王譚攻崇之等三營皆敗沒質按兵不敢救澄之燾之孫臧燾高祖敬皇后之兄脩之之兄子也毛脩之從高祖為將青泥之敗沒于赫連後入于魏質軍亦潰質棄輜重器械單將七百人赴城重直用翻將即亮翻初盱眙太守沈璞到官盱眙縣前漢屬臨淮郡後漢屬下邳國晉復屬臨淮郡晉安帝分立盱眙郡今為招信軍江淮無警璞以郡當衝要乃繕城浚隍積財穀儲矢石為城守之備僚屬皆非之朝廷亦以為過及魏兵南向守宰多棄城走或勸璞宜還建康璞曰虜若以城小不顧夫復何懼夫音扶復扶又翻若肉薄來攻此乃吾報國之秋諸君封侯之日也薄伯各翻柰何去之諸君嘗見數十萬人聚於小城之下而不敗者乎昆陽合肥前事之明驗也王尋王邑以百萬敗於昆陽諸葛恪以二十萬敗於合肥故曰用兵之計攻城最下璞收集得二千精兵曰足矣及臧質向城衆謂璞曰虜若不攻城則無所事衆若其攻城則城中止可容見力耳見賢遍翻地狹人多鮮不為患鮮息淺翻且敵衆我寡人所共知若以質衆能退敵完城者則全功不在我若避罪歸都會資舟楫必更相蹂踐蹂人九翻踐慈演翻正足為患不若閉門勿受璞歎曰虜必不能登城敢為諸君保之為于偽翻舟楫之計固已久息虜之殘害古今未有屠剝之苦衆所共見其中幸者不過驅還北國作奴婢耳彼雖烏合寧不憚此邪所謂同舟而濟胡越一心者也王弼曰同舟而濟則胡越何患乎異心少則退緩吾寧可欲專功而留虜乎乃開門納質質見城中豐實大喜衆皆稱萬歲因與璞共守魏人之南寇也不齎糧用唯以抄掠為資及過淮民多竄匿抄掠無所得人馬飢乏抄初交翻聞盱眙有積粟欲以為北歸之資既破崇之等一攻城不拔即留其將韓元興以數千人守盱眙守言以兵相守也將即亮翻下同由是盱眙得益完守備為明年魏主還攻盱眙不克張本帥讀曰率庚午魏主至瓜步壞民廬舍壞音怪及伐葦為筏聲言欲渡江建康震懼民皆荷擔而立荷擔而立急則迸走荷戶可翻又如字擔丁濫翻壬午內外戒嚴丹楊統內盡戶發丁人凡戶見丁無論多少盡發之命領軍將軍劉遵考等將兵分守津要遊邏上接于湖下至蔡洲陳艦列營周亙江濱自採石至于暨陽今太平州當塗縣北三十里有采石山山下有采石磯暨陽今江陰軍邏郎佐翻艦戶黯翻亙古鄧翻太子劭出鎮石頭總統水軍丹楊尹徐湛之守石頭倉城吏部尚書江湛兼領軍軍事處置悉以委焉處昌呂翻上登石頭城有憂色謂江湛曰北伐之計同議者少謂唯江徐贊北伐之計㣥臣之議多不同也少詩沼翻不得無慚貽大夫之憂予之過也又曰檀道濟若在豈使胡馬至此上又登莫府山幕府山在今建康府城西二十五里晉元帝初渡江丞相王導建幕府於其上宋白曰元帝渡江秣陵荒落以府第居縣北幕府山幕府之名自此南史幕府山在臨沂縣購魏主及王公首許以封爵金帛又募人齎野葛酒置空村中欲以毒魏人竟不能傷野葛有毒食之殺人魏主鑿瓜步山為蟠道於其上設氈屋考異曰魏帝紀云癸未車駕臨江起行宮於瓜步山蓋謂此也今從宋書以橐駝負河北水自隨餉上橐駝名馬幷求和請婚上遣奉朝請田奇餉以珍羞異味奉朝請者奉朝會請召而已朝直遙翻即噉之甘即今之柑噉徒濫翻又徒覽翻荊州記曰長沙郡酃縣有酃湖周迴二里取湖水為酒酒極甘美杜佑曰衡州衡陽縣漢酃縣地孟康曰酃音零疑食中有毒魏主不應舉手指天以其孫示奇曰吾遠來至此非欲為功名實欲繼好息民永結姻援宋若能以女妻此孫我以女妻武陵王自今匹馬不復南顧好呼到翻妻七細翻復扶又翻奇還上召太子劭及㣥臣議之衆並謂宜許江湛曰戎狄無親許之無益劭怒謂湛曰今三王在阨謂江夏王義恭武陵王駿在彭城南平王鑠在壽陽也聲色甚厲坐散俱出坐徂臥翻劭使班劍及左右排湛湛幾至僵仆班劍持劍為班列在車前幾居希翻僵居良翻劭又言於上曰北伐敗辱數州淪破獨有斬江湛徐湛之可以謝天下上曰北伐自是我意江徐但不異耳言不持異議也史言劭於此時已有弒逆之心考異曰魏帝紀云甲申義隆使獻百牢貢其方物又請進女於皇孫以求和好帝以師婚非禮許和而不許婚使散騎侍郎夏侯野報之詔皇孫為書致馬通問此皆魏史夸辭今從宋書聶崇岐標點王崇武覆校
