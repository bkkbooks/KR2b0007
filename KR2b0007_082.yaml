body:
  text: 資治通鑑卷第八十二端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰權判西京留司御史臺上柱國河內郡開國侯食邑一千三百戶食實封四百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注晉紀四太康十年世祖武皇帝下太康十年己酉二八九太康十年夏四月太廟成乙巳祫祭祫大合祭也公羊傳曰大祫者何合祭也其合祭奈何毀廟之主陳于太祖未毀廟之主皆升合食於太祖祫胡夾翻太康十年慕容廆遣使請降降戶江翻五月詔拜廆鮮卑都督廆謁見何龕以士大夫禮巾衣到門魏晉間士大夫謁見尊貴以巾褠為禮褠單衣也龕口含翻廆乃改服戎衣而入人問其故廆曰主人不以禮待客客何為哉龕聞之甚慙深敬異之受降如受敵居邊之帥嚴兵以見四夷之客未為過也何必以為慙乎段氏東部鮮卑也杜佑曰宇文莫槐出於遼東塞外代為鮮卑東部大人徒河段疾六眷出遼西因亂被賣為漁陽烏桓大人庫傉家奴庫傉以其健使將人衆詣遼西逐食遂招誘亡叛以至強盛余按晉書王浚傳段疾六眷務勿塵之世子段氏自務勿塵以來強盛久矣疾六眷因亂被掠容或有之務勿塵既能為部落之帥恐不待其子招誘而後能強盛也廆卑辭厚幣以事之段國單于階以女妻廆生皓仁昭慕容段氏遂為婚姻之國數所角翻單音蟬妻七細翻徙居徒河之青山徒河縣前漢屬遼西後漢屬遼東屬國魏晉省併入昌黎郡界後慕容氏復置徒河縣拓跋魏太武真君八年併徒河入昌黎郡廣興縣杜佑曰徒河青山在營州郡城東百九十里太康十年冬十月復明堂及南郊五帝位明堂南郊除五帝座見七十九卷泰始二年太康十年十一月丙辰尚書令濟北成侯荀勗卒濟子禮翻勗有才思思相吏翻善伺人主意伺相吏翻以是能固其竉久在中書專管機事及遷尚書甚罔悵罔與惘同惘失志之貌悵亦恨望失志之貌勗曰奪我鳳皇池諸君何賀邪太康十年帝極意聲色遂至成疾楊駿忌汝南王亮排出之甲申以亮為侍中大司馬假黃鉞大都督督豫州諸軍事治章甲十一行本治作鎮乙十一行本同孔本同張校同許昌徙南陽王柬為秦王都督關中諸軍事始平王瑋為楚王都督荊州諸軍事濮陽王允為淮南王都督揚江二州諸軍事按惠帝元康元年有司奏荊揚二州疆土曠遠統理尤難於是割揚州之豫章鄱陽廬陵臨川南康建安晉安荊州之桂陽安成武昌合十郡置江州則此時未有江州也疑江二二字衍更俟博考濮博木翻晉制都督諸軍事有使持節有持節有假節使持節得殺二千石以下持節殺無官位人若軍事與使持節同假節惟軍事得殺犯軍令者穎為成都王晏為吳王熾為豫章王演為代王皇孫遹為廣陵王熾昌志翻遹以律翻又封淮南王子迪為漢王楚王子儀為毗陵王徙扶風王暢為順陽王暢弟歆為新野公暢駿之子也暢嗣駿爵而不居關中之任故徙封繇為東安公覲胄之子也晉制宗室封郡公者制度如小國王淡徒覽翻又徒濫翻胄音胄初帝以才人謝玖賜太子才人位次美人李延壽曰晉武帝采漢魏之制三夫人九嬪之下有美人才人中才人爵視千石以下玖舉有翻宮中嘗夜失火帝登樓望之遹年五歲牽帝裾入暗中曰暮夜倉猝宜備非常不可令照見人主帝由是奇之嘗對㣥臣稱遹似宣帝故天下咸歸仰之帝知太子不才然恃遹明慧故無廢立之心復用王佑之謀佑王濟從兄也與羊祜等並事文帝帝寵信之復扶又翻下復以同要害謂雍荊揚之地復以佑為北軍中候典禁兵帝為皇孫遹高選僚佐為于偽翻以散騎常侍劉實志行清素命為廣陵王傅自魏以來王國置師友晉避景帝諱改師為傅行下孟翻實以時俗喜進趣喜許記翻趣讀曰趨少廉讓少詩沼翻欲章甲十一行本欲上有嘗著崇讓論五字乙十一行本同孔本同退齋校同令初除官通謝章者必推賢讓能乃得通之一官缺則擇為人所讓最多者用之以為人情爭則欲發毀己所不如讓則競推於勝己故世爭則優劣難分時讓則賢智顯出當此時也能退身修己則讓之者多矣雖欲守貧賤不可得也馳騖進趨而欲人見讓猶卻行而求前也淮南相劉頌王國置相漢制也晉後改為內史陛下以法禁寬縱積之有素未可一旦以直繩御下此誠時宜也然至於矯世救弊自宜漸就清肅譬猶行舟雖不橫截迅流然當漸靡而往稍向所趨然後得濟也此引濟川為譬也濟大川者雖曰橫絶大川亂流而渡然必因水勢漸靡而行舟向其所趨以登陸之路然後汔濟否則為水勢所使不能制舟以向所趨不得登岸矣自泰始以來將三十年帝受禪改元泰始至是二十五年不茂既往言立事造業不加茂於往時也猶未反叔世之敝以成始初之隆傳之後世不無慮乎使夫異時大業或有不安其憂責猶在陛下也臣聞為社稷計莫若封建親賢然宜審量事勢量音良使諸侯率義而動者其力足以維帶京邑若包藏禍心其勢不足獨以有為其齊此甚難陛下宜與達古今之士深共籌之帝之使諸王分鎮而內不足以齊之此劉頌所為深慮也有罪誅放其身而國祚不泯如周烹齊哀公而立其弟靜宣王誅魯侯伯御而立孝公之類有罪或無子者國隨以亡見前後漢紀循周之舊則下固而上安矣余謂晉之所以待藩王者其宜不在此也天下至大萬事至衆人君至少少始紹翻同於天日是以聖王之化執要於己委務於下非惡勞而好逸好呼到翻誠以政體宜然也夫居事始以別能否甚難察也別彼列翻因成敗以分功罪甚易識也易以豉翻下居易同今陛下每精於造始而略於考終此政功所以未善也人主誠能居易執要考功罪於成敗之後則㣥下無所逃其誅賞矣古者六卿分職冢宰為師周禮天官冢宰地官司徒春官宗伯夏官司馬秋官司寇冬官司空是為六卿而冢宰總之九列執事丞相都總此西都以前制也諸卿奉成自漢光武以來以吏事責尚書事歸臺閣諸卿奉成而已斷丁亂翻可出衆事付外寺外寺謂諸卿寺尚書統領大綱若丞相之為歲終課功校簿賞罰而已斯亦可矣今動皆受成於上上之所失不得復以罪下復扶又翻歲終事功不建不知所責也夫細過謬妄人情之所必有而悉糾以法則朝野無立人矣近世以來為監司者類大綱不振而微過必舉御史臺官及諸州刺史皆監司也朝直遙翻監工銜翻則謹密網以羅微罪使奏劾相接狀似盡公而撓法在其中矣劾戶概翻又戶得翻撓奴教翻是以聖王不善碎密之案必責凶猾之奏則害政之姦自然禽矣夫創業之勳在於立教定制使遺風繫人心餘烈匡幼弱後世憑之雖昏猶明雖愚若智乃足尚也言法制修明雖後嗣昏愚有所據依則其治猶若明智之為也此言蓋指太子不能克隆堂構而帝又無典則以貽子孫也然苟非其人道不虛行以劉禪之庸而輔之以諸葛亮則昭烈雖死猶不死也孔明死則孔明治蜀之法制雖存禪不能守之矣至夫修飾官署凡諸作役恆傷太過恆戶登翻不患不舉此將來所不須於陛下而自能者也今勤所不須以傷所憑竊以為過矣帝皆不能用太康十年詔以劉淵為胸奴北部都尉時改胸奴五部帥為五部帥為五部都尉好呼到翻施式智翻傾心接物五部豪桀幽冀名儒多往歸之為劉淵得衆以移晉祚張本太康十年奚軻男女十萬口來降奚軻亦夷種也孝惠皇帝上之上諱衷字正度武帝第二子也諡法柔質慈民曰惠永熙元年庚戌二九太康十年春正月辛酉朔改元太熙太熙武帝所改至四月己酉太子即位改元永熙未踰年改元猶為非禮安有先帝初棄㣥臣太子即位而遽以是日改元乎太康十年己巳以王渾為司徒太康十年司空侍中尚書令衛瓘子宣尚繁昌公主宣嗜酒多過失楊駿惡瓘欲逐之惡烏路翻乃與黃門謀共毀宣勸武帝奪公主瓘慙懼告老遜位詔進瓘位太保以公就第瓘封災陽公太康十年劇陽康子魏舒薨太康十年三月甲子以右光祿大夫石鑒為司空晉志左右光祿大夫假金章紫綬及光祿大夫加金章紫綬者品秩第二太康十年帝疾篤未有顧命勳舊之臣多已物故侍中車騎將軍楊駿獨侍疾禁中大臣皆不得在左右駿因輒以私意改易要近樹其心腹會帝小間間如字間者病小差也正色謂駿曰何得便爾時汝南王亮尚未發去年遣亮出督豫州以亮與駿同輔政又欲擇朝士有聞望者數人佐之朝直遙翻聞音問駿從中書借詔觀之得便藏去中書監華廙恐懼華戶化翻廙逸職翻又羊至翻自往索之終不與會帝復迷亂索山客翻復扶又翻皇后奏以駿輔政帝頷之夏四月辛丑皇后召華廙及中書令何劭口宣帝旨作詔以駿為太尉太子太傅都督中外諸軍事侍中録尚書事詔成后對廙劭以呈帝帝視而無言廙歆之孫劭曾之子也華歆仕漢魏之間何曾仕魏晉之間位皆至公二人身名相似也趣讀曰促帝尋小間問汝南王來未左右言未至帝遂困篤己酉崩于含章殿年五十五坤之六三曰含章可貞坤以含弘為德后道也含章殿必在皇后宮中春秋書公薨于小寢即安也明達好謀好呼到翻容納直言未嘗失色於人太子即皇帝位大赦改元改太熙為永熙立賈氏為皇后楊駿入居太極殿前殿也六宮出辭而駿不下殿時梓宮蓋自含章殿徙殯太極殿賁音奔詔石鑒與中護軍張劭監作山陵監工銜翻汝南王亮畏駿不敢臨喪哭於大司馬門外亮自大司馬出鎮未行尚居府中不敢入宮臨喪而哭於大司馬府門外君父之喪哭於門外非禮也表求過葬而行或告亮欲舉兵討駿者駿大懼白太后令帝為手詔與石鑒張劭使帥陵兵討亮劭駿甥也即帥所領趣鑒速發帥讀曰率趣讀曰促鑒以為不然保持之保亮不舉兵而持討亮之兵不發也勗曰今朝野皆歸心於公朝直遙翻下同公不討人而畏人討邪亮不敢發夜馳赴許昌乃得免駿弟濟及甥河南尹李斌皆勸駿留亮駿不從濟謂尚書左丞傅咸曰家兄若徵大司馬退身避之門戶庶幾可全幾居希翻咸曰宗室外戚相恃為安但召大司馬還共崇至公以輔政無為避也濟又使侍中石崇見駿言之駿不從五月辛未葬武帝于峻陽陵楊駿自知素無美望欲依魏明帝即位故事普進封爵以求媚於衆左軍將軍傅祗晉志曰按魏明帝時有左軍則左軍魏官也未有帝王始崩臣下論功者也駿不從祗嘏之子也傅嘏仕魏顯於嘉平正元之間丙子詔中外㣥臣皆增位一等預喪事者增二等二千石已上皆封關中侯漢獻帝建安二十年魏武王置關中侯據晉書帝紀關中侯又在關內侯之下復方目翻調徒弔翻散騎常侍石崇前書侍中石崇此作散騎常侍必有一誤蓋因舊史成文也上時掌翻以為帝正位東宮二十餘年今承大業而班賞行爵優於泰始革命之初及諸將平吳之功輕重不稱稱尺證翻且大晉卜世無窮今之開制當垂于後若有爵必進則數世之後莫非公侯矣不從詔以太尉駿為太傅大都督假黃鉞録朝政百官總己以聽傅咸謂駿曰諒暗不行久矣自漢文短喪之詔嗣君即吉聽政諒暗三年之制不行久矣暗音陰委政於公而天下不以為善懼明公未易當也易以豉翻下同周公大聖猶致流言周成王幼沖周公攝政而四國流言武帝泰始二年帝為皇太子時年九歲至是三十二歲矣明公當審思進退之宜苟有以察其忠款言豈在多駿不從咸數諫駿漸不平欲出咸為郡守李斌曰斥逐正人將失人望乃止楊濟遺咸書曰數所角翻遣于季翻諺云生子癡了官事官事未易了也想慮破頭故具有白慮咸以直言致禍也衛公有言酒色殺人甚於作直坐酒色死人不為悔而逆畏以直致禍此由心不能正欲以苟且為明哲耳詩曰既明且哲以保其身此言世人不能直言特以苟且為保身之計耳當由矯枉過正或不忠篤欲以亢厲為聲亢口浪翻故致忿耳安有悾悾忠益而返見怨疾乎悾苦紅翻悾悾信也包咸曰慤也楊駿以賈后險悍多權略忌之悍下罕翻又侯旰翻故以其甥段廣為散騎常侍管機密張劭為中護軍典禁兵凡有詔命帝省訖省悉景翻入呈太后然後行之駿為政嚴碎專愎愎弼力翻很也中外多惡之惡烏路翻馮翊太守孫楚謂駿曰公以外戚居伊霍之任當以至公誠信謙順處之守式又翻處昌呂翻今宗室強盛而公不與共參萬機內懷猜忌外樹私昵禍至無日矣昵尼質翻駿不從楚資之孫也孫資事魏三祖掌機密弘訓少府蒯欽駿之姑子也數以直言犯駿他人皆為之懼景皇后居弘訓宮置少府數所角翻為于偽翻楊文長雖暗猶知人之無罪不可妄殺楊駿字文長我得疏乃可以免不然與之俱族矣駿辟胸奴東部人王彰為司馬胸奴東部即胸奴左部也居太原茲氏縣其友新興張宣子怪而問之漢獻帝建安二十年省雲中定襄五原朔方郡郡置一縣領其民合為新興郡屬並州自古一姓二后未有不敗況楊太傅昵近小人疏遠君子近其靳翻遠于願翻專權自恣敗無日矣吾踰海出塞以避之猶懼及禍奈何應其辟乎且武帝不惟社稷大計惟思也荷下可翻受遺者復非其人天下之亂可立待也楊駿之敗人皆知之獨駿不知耳凶人吉其凶其謂是乎復扶又翻太康十年秋八月壬午立廣陵王遹為皇太子以中書監何劭為太子太師衛尉裴楷為少師吏部尚書王戎為太傅前太常張華為少傅衛將軍楊濟為太保尚書和嶠為少保晉東宮六傅惟此時具官媛于眷翻晉志淑淑媛淑儀修華修容修儀婕妤容華充華是為九嬪銀印青綬賈后常置謝氏於別室不聽與太子相見初和嶠嘗從容言於武帝曰從千容翻皇太子有淳古之風而末世多偽恐不了陛下家事武帝默然後與荀勗等同侍武帝武帝曰太子近入朝差長進朝直遙翻長丁丈翻今知兩翻卿可俱詣之粗及世事粗坐五翻略也既還勗等並稱太子明識雅度誠如明詔嶠曰聖質如初武帝不悅而起及帝即位嶠從太子遹入朝賈后使帝問曰卿昔謂我不了家事今日定如何嶠曰臣昔事先帝曾有斯言言之不效國之福也太康十年冬十月辛酉以石鑒為太尉隴西王泰為司空太康十年以劉淵為建威將軍胸奴五部大都督淵為五部大都督則左國城大單于之權輿也元康元年辛亥二九一太康十年春正月乙酉朔改元永平永平楊駿執政所改元也駿誅改元元康太康十年初賈后之為太子也嘗以妬手殺數人又以戟擲孕妾子隨刃墮孕以證翻武帝大怒修金墉城將廢之荀勗馮紞楊珧紞丁感翻珧余招翻及充華趙粲共營救之曰賈年少妬者婦人常情長自當差少詩詔翻長知兩翻差楚懈翻楊后曰賈公閭有大勳於社稷賈充字公閭晉之代魏充力居多正復妬忌豈可遽忘其先德邪復扶目翻由是得不廢后數誡厲數所角翻不知后之助己返以后為搆己於武帝更恨之及帝即位賈后不肯以婦道事太后又欲干預政事而為太傅駿所抑殿中中郎渤海孟觀李肇皆駿所不禮也晉制二衛置殿中將軍中郎校尉司馬觀如字云將危社稷黃門董猛素給事東宮為寺人監寺人監主東宮諸閹陸德明曰寺如字又音侍廢太后又使肇報汝南王亮使舉兵討駿亮不可肇報都督荊州諸軍事楚王瑋瑋欣然許之乃求入朝駿素憚瑋勇鋭欲召之而未敢因其求敢因其求朝遂聽之二月癸酉瑋及都督揚州諸軍事淮南王允來朝朝直遙翻三月辛卯孟觀李肇啓帝夜作詔誣駿謀反中外戒嚴遣使奉詔廢駿以侯就第駿封臨晉侯帥讀曰率楚王瑋屯司馬門以淮南相劉頌為三公尚書漢成帝置三公尚書主斷獄光武以三公曹主歲盡考課諸州郡事段廣跪言於帝曰楊駿孤公無子豈有反理願陛下審之廣駿甥也使為近侍以防左右間己然終無益也時駿居曹爽故府在武庫南聞內有變召衆官議之太傅主簿朱振説駿曰今內有變其趣可知必是閹豎為賈后設謀不利於公宜燒雲龍門以脅之索造事者首開萬春門雲龍門洛陽宮城正南門萬春門東門也説輸芮翻為于偽翻索山客翻取姦人殿內震懼必斬送之不然無以免難難乃旦翻駿素怯懦不決乃曰雲龍門魏明帝所造功費甚大奈何燒之侍中傅祗白駿請與尚書武茂入宮觀察事勢因謂㣥僚曰宮中不宜空遂揖而下階衆皆走茂猶坐祗顧曰君非天子臣邪今內外隔絶不知國家所在國家謂天子也自東漢以來皆然茂乃驚起駿黨左軍將軍劉豫陳兵在門遇右軍將軍裴頠魏有左軍武帝又置前軍右軍泰始八年又置後軍是為四軍頠魚毀翻頠紿之曰紿徒亥翻向於西掖門遇公乘素車從二人西出矣豫曰吾何之頠曰宜至廷尉豫從頠言遂委而去委兵而去也屯萬春門頠秀之子也裴秀見七十八卷魏元帝咸熙元年射之城外射而亦翻下同曰救太傅者有賞賈后因宣言太后同反尋而殿中兵出燒駿府又令弩手於閣上臨駿府而射之駿兵皆不得出駿逃于馬廄就殺之孟觀等遂收駿弟珧濟張劭李斌段廣劉豫武茂及散騎常侍楊邈中書令蔣俊東夷校尉文鴦皆夷三族死者數千人珧臨刑告東安公繇曰表在石函珧表見八十卷武帝咸寧三年作石函藏之宗廟摯虞云廟主藏於戶之外西墉之中有石函名曰宗祏函中笥以盛主衆謂宜依鍾育例為之申理鍾育例見七十八卷魏元帝咸熙元年為于偽翻而賈氏族黨趣使行刑趣讀曰促珧號叫不已號戶刀翻刑者以刀破其頭繇諸葛誕之外孫也故忌文鴦以為駿黨而誅之諸葛誕文鴦事見七十七卷魏高貴鄉公甘露三年誅賞皆自繇出威振內外王戎謂繇曰大事之後宜深遠權勢繇不從遠于願翻壬辰赦天下改元改元元康賈后矯詔使後軍將軍荀悝送太后於永寧宮魏建永寧宮太后居之悝苦回翻聽就太后居龐皮江翻尋復諷㣥公有司奏曰皇太后陰漸姦謀履霜者堅冰之漸言陰始凝而至於堅冰也此誣楊太后以為與駿為姦謀非一日之積也復扶又翻下可復司復同漸如字飛箭繫書要募將士要讀曰邀將即亮翻同惡相濟自絶于天魯侯絶文薑春秋所許文薑魯桓公之夫人也齊襄公殺桓公文薑與焉魯莊公既立夫人孫于齊穀梁傳曰不言氏姓貶之也人之於天也以道受命於人也以言受命不若於道者天絶之也不若於人者人絶之也任至公於天下陛下雖懷無已之情臣下不敢奉詔詔曰此大事更詳之有司又奏宜廢太后曰峻陽庶人武帝陵曰峻陽太后非得罪於先帝今黨其所親為不母於聖世宜依漢廢趙太后為孝成后故事事見三十五卷漢哀帝元壽元年還稱武皇后居異宮以全始終之恩左僕射荀愷與太子少師下邳王晃等議曰皇太后謀危社稷不可復配先帝宜貶尊號廢詣金墉城於是有司奏從晃等議廢太后為庶人詔可又奏楊駿造亂家屬應誅詔原其妻龐命以尉太后之心今太后廢為庶人請以龐付廷尉行刑詔不許有司復固請乃從之龐臨刑太后抱持號叫截髮稽顙上表詣賈后稱妾請全母命不見省號戶刀翻稽音啓省悉景翻董養遊太學董養浚儀隱者也朝廷建斯堂將以何為乎言庠序所以申孝弟之義今滅母子之大倫則建學果何為也謀反大逆皆赦至於殺祖父母父母不赦者以為王法所不容故也奈何公卿處議文飾禮典乃至此乎處昌呂翻天人之理既滅大亂將作矣養後與妻荷擔入蜀不知所終有司收駿官屬欲誅之侍中傅祗啓曰昔魯芝為曹爽司馬斬關赴爽事見七十五卷魏邵陵厲公嘉平元年駿之僚佐不可悉加罪詔赦之壬寅徵汝南王亮為太宰與太保衛瓘皆録尚書事輔政以秦王柬為大將軍東平王楙為撫軍大將軍楚王瑋為衛將軍領北軍中候下邳王晃為尚書令東安公繇為尚書左僕射進爵為王楙望之子也封董猛為武安侯三兄皆為亭侯亮欲取悅衆心論誅楊駿之功督將侯者千八十一人將即亮翻御史中丞傅咸遺亮書曰今封賞熏赫震動天地自古以來未之有也無功而獲賞則人莫不樂國之有禍是禍原無窮也濫賞所以開覬幸之心其禍誠如此遺于季翻樂音洛由東安公人謂殿下既至當有以正之正之以道衆亦何怒衆之所怒者在於不平耳而今皆更倍論言亮論功行賞又倍於東安公之時也亮頗專權勢咸復諫曰楊駿有震主之威委任親戚此天下所以喧譁今之處重宜反此失靜默頤神有大得失乃維持之自非大事一皆抑遣比過尊門冠蓋車馬鎮塞街衢此之翕習既宜弭息翕衆也合也習重也因也仍也言衆人翕合相因而至也復扶又翻處昌呂翻比毗至翻塞悉則翻論者謂長容公之姻家夏侯駿字長容壻家女之所因故曰姻鄭玄曰壻父曰姻夏戶雅翻流聞四方非所以為益也亮皆不從賈后族兄車騎司馬模從舅右衛將軍郭彰晉文帝置中衛及衛將軍武帝受命分為左右衛將軍從才用翻賈后女弟賈午適韓壽生謐賈充無後以謐為後並預國政賈后暴戾日甚繇密謀廢后賈氏憚之繇兄東武公淡素惡繇惡烏路翻屢譖之於太宰亮曰繇專行誅賞欲亶朝政庚戌詔免繇官又坐有悖言廢徙帶方帶方縣漢屬樂浪郡公孫度置帶方郡杜佑曰建安中公孫康分屯有有鹽縣以南荒地置帶方郡於是賈謐郭彰權勢愈盛賓客盈門謐雖驕奢而好學喜延士大夫好呼到翻喜許記翻郭彰石崇陸機機弟雲和郁及滎陽潘嶽武帝泰始二年分河南置滎陽郡齊大夫崔氏之後姓譜越王句踐之後封於烏程歐陽子孫因以為氏是年分東海置蘭陵郡按毛詩傳摯國出於任姓子孫以國為氏詮且緣翻弘農王粹襄城杜育武帝泰始二年分汝南置襄城郡王褱泰始元年分河間涿郡置高陽國王褱姑回翻眕止忍翻號曰二十四友郁嶠之弟也崇與嶽尤諂事謐每候謐及廣城君郭槐出皆降車路左望塵而拜太康十年太宰亮太保瓘以楚王瑋剛愎好殺惡之愎蒲逼翻好呼到翻惡烏路翻下同欲奪其兵權以臨海侯裴楷代瑋為北軍中候瑋怒楷聞之不敢拜不敢拜受中候之職復扶又翻下復矯同遣瑋與諸王之國瑋益忿怨瑋長史公孫宏舍人岐盛姓譜古有岐伯為黃帝師又周太王居岐山文王遷豐其支庶留岐者為岐氏昵尼質翻后留瑋領太子少傅盛素善於楊駿衛瓘惡其反覆將收之盛乃與宏謀因積弩將軍李肇武帝泰始四年罷振威楊威護軍置左右積弩將軍一説晉太康中置積射積弩營營二千五百人並以將軍領之譖亮瓘於賈后云將謀廢立后素怨瓘以瓘撫牀事也見八十卷武帝咸康四年己不得專恣夏六月后使帝作手詔賜瑋曰太宰太保欲為伊霍之事王宜宣詔令淮南長沙成都王屯諸宮門免亮及瓘官夜使黃門齎以授瑋瑋欲覆奏黃門曰事恐漏泄非密詔本意也瑋亦欲因此復私怨遂勒本軍本軍瑋所掌北軍也晉洛城內外三十六軍二公潛圖不軌吾今受詔都督中外諸軍諸在直衛者皆嚴加警備其在外營便相帥徑詣行府助順討逆帥讀曰率又矯詔亮瓘官屬一無所問皆罷遣之若不奉詔便軍法從事遣公孫宏李肇以兵圍亮府侍中清河王遐收瓘亮帳下督李龍白外有變請拒之晉制諸公及諸大將軍皆置帳下督及門下督俄而兵登牆大呼呼火故翻亮驚曰吾無二心何故至此詔書其可見乎宏等不許趣兵攻之趣讀曰促長史劉準謂亮曰觀此必是姦謀府中俊乂如林猶可力戰又不聽遂為肇所執歎曰我之赤心可破示天下也與世子矩俱死衛瓘左右亦疑遐矯詔請拒之須自表得報就戮未晚瓘不聽初瓘為司空武帝太康三年瓘為司空永熙元年免姓譜榮姓周榮公之後莊子有榮啓期至是晦從遐收瓘輒殺瓘及子孫共九人遐不能禁岐盛説瑋説輸芮翻下同宜因兵勢遂誅賈郭以正王室安天下瑋猶豫未決會天明太子少傅張華使董猛説賈后曰楚王既誅二公則天下威權盡歸之矣人主何以自安宜以瑋專殺之罪誅之賈后亦欲因此除瑋深然之是時內外擾亂朝廷恟懼不知所出恟許勇翻張華白帝遣殿中將軍王宮齎騶虞幡出麾衆曰楚王矯詔勿聽也晉制有白虎幡騶虞幡白虎威猛主殺故以督戰騶虞仁獸故以解兵瑋左右無復一人窘迫不知所為遂執之下廷尉下遐稼翻乙丑斬之瑋出懷中青紙詔流涕以示監刑尚書劉頌監工銜翻曰幸託體先帝而受枉乃如此乎公孫宏岐盛並夷三族瑋之起兵也隴西王泰嚴兵將助瑋泰宣帝弟子公為宰相泰時為司空晉公府有西東閣祭酒且夜中倉猝宜遣人參審定問問音問也定問猶言實音問也泰乃止衛瓘女與國臣書曰先公名諡未顯每怪一國蔑然無言春秋之失其咎安在春秋公羊傳曰春秋君弒賊不討以為無臣子也子沈子曰君弒臣不討賊非臣也子不復讎非子也諡神至翻撾登聞鼓古者設諫鼓立謗木所以通下情也周禮太僕建路鼓於大寢之門外以待達窮者鄭司農注云窮謂窮寃失職者來擊此鼓以達於王若今時上變事擊鼓矣此則登聞鼓之始也登聞鼓之名蓋始於魏晉之間撾陟加翻擊也初矯詔者至公即奉送章綬單車從命綬音受如矯詔之文唯免公官而故給使榮晦輒收公父子及孫一時斬戮乞驗盡情偽加以明刑乃詔族誅榮晦追復亮爵位諡曰文成封瓘為蘭陵郡公諡曰成於是賈后專朝朝直遙翻下同委任親黨以賈模為散騎常侍加侍中賈謐與后謀以張華庶姓無逼上之嫌據杜預左傳注庶姓非同姓為衆望所依欲委以朝政疑未決以問裴頠頠贊成之廣城君郭槐頠從母也故賈氏親信頠頠為侍中又以安南將軍裴楷為中書令加侍中與右僕射王戎並管機要華盡忠帝室彌縫遺闕賈后雖凶險猶知敬重華賈模與華頠同心輔政故數年之間雖暗主在上而朝野安靜華等之功也太康十年秋七月分荊揚十郡為江州是時方因江水之名置江州太康十年八月辛未立隴西王泰世子越為東海王太康十年九月甲午秦獻王柬薨太康十年辛丑徵征西大將軍梁王肜為衛將軍録尚書事肜余中翻二年二年春二月己酉故楊太后卒于金墉城是時太后尚有侍御十餘人賈后悉奪之絶膳八日而卒卒子恤翻賈后恐太后有靈或訴冤於先帝乃覆而殯之仍施諸厭劾符書藥物等厭益涉翻伏也劾胡得翻治鬼曰劾二年秋八月壬子赦天下三年三年夏六月弘農雨雹深三尺雨于具翻度深曰深音式禁翻三年鮮卑宇文莫槐為其下所殺弟普撥立三年拓拔退拔作跋綽卒子章甲十一行本子上有弟字乙十一行本同孔本同退齋校同弗立四年四年春正月丁酉安昌元公石鑒薨考異曰本傳鑒封昌安縣侯今從帝紀四年夏五月胸奴郝散反攻上黨殺長吏秋八月郝散帥衆降馮翊都尉殺之郝呼各翻郝散若自上黨帥衆向洛陽歸降當入河內界今為馮翊都尉所殺蓋自穀遠歷河東界渡河至馮翊界而被殺也帥讀曰率降戶江翻四年是歲大飢四年司隸校尉傅咸卒考異曰三十國晉春秋元康四年七月傅咸為司隸五年五月始親職十月卒二書附年月多差舛故以本傳為定風格峻整初為司隸校尉上言貨賂流行所宜深絶時朝政寬弛權豪放恣咸奏免河南尹淡等官淡河南尹之名音徒濫翻又徒覽翻京師肅然四年慕容廆徙居大棘城廆自徒河之青山徙大棘城杜佑曰棘城即帝顓頊之墟在營州郡城東南一百七十里四年拓跋弗卒叔父祿官立五年五年夏六月東海雨雹深五寸雨于具翻深式浸翻五年荊揚兗豫青徐六州大水五年冬十月武庫火考異曰三十國晉春秋云閏月宋晉五行志云閏月庚寅今從晉書帝紀華傳曰趙王倫孫秀與華有隙疾華如讎武庫火華懼因此變作列兵固守然後救之故纍代之寶及漢高祖斬白蛇劍王莽頭孔子屐等盡焚焉據通鑑則倫秀之隙開於明年蓋數誅大臣禍皆從中起故華懼有變而列兵固守也十二月丙戌新作武庫大調兵器調徒釣翻五年拓跋祿官分其國為三部一居上谷之北濡源之西自統之水經注濡水出禦夷鎮東南鎮拓跋魏太武時所置也師古曰濡音乃官翻參合陂在代郡參合縣後漢晉省參合縣拓跋魏復置縣屬梁城郡一居定襄之盛樂故城定襄之盛樂二漢志曰成樂後漢志屬雲中郡魏晉省拓跋魏後置盛樂郡汗音寒色徒河翻猗盧善用兵西擊胸奴烏桓諸部皆破之代人衛操與從子雄及同郡箕淡姓譜箕商箕子之後又晉有大夫箕鄭父從才用翻説猗色猗盧招納晉人猗色悅之任以國事晉人附者稍衆史言拓跋氏益強當是時晉朝大臣宗室雖已自相屠而四方未為變也衛操箕淡輩何為去華就夷如是其早計也中國之人可為凜凜矣漢嚴邊關之禁懼有罪者亡命出塞耳若無威刑之迫乎其後一旦去桑梓而逐水草是必有見也邊關不之詰朝廷不之虞晉之無政亦可知矣説輸芮翻下之説同六年六年春正月赦天下六年下邳獻王晃薨以中書監張華為司空太尉隴西王泰行尚書令徙封高密王六年夏郝散弟度元與馮翊北地馬蘭羌盧水胡俱反北地有馬蘭山羌居其中因為種落之名又按馬蘭山唐時屬同州界時蓋屬馮翊北地二郡界也盧水胡居安定界敗馮翊太守歐陽建敗補邁翻征西大將軍趙王倫信用嬖人琅邪孫秀與雍州刺史濟南解系爭軍事更相表奏嬖卑義翻又博計翻濟子禮翻解戶買翻姓也春秋晉有大夫解揚更工衡翻歐陽建亦表倫罪惡朝廷以倫撓亂關右撓火高翻攪也擾也又音擾又女巧翻又尼交翻又女教翻徵倫為車騎將軍以梁王肜為征西大將軍都督雍涼二州諸軍事系與其弟御史中丞結皆表請誅秀以謝氐羌張華以告梁王肜使誅之肜許諾秀友人辛冉為之説肜曰為于偽翻氐羌自反非秀之罪秀由是得免倫至洛陽用秀計深交賈郭賈后大愛信之張華使梁王肜殺秀而不遂既至洛陽獨不能明正其罪而誅之邪又求尚書令張華裴頠固執以為不可倫秀由是怨之為倫秀殺華頠系張本秋八月解系為郝度元所敗敗補邁翻秦雍氐羌悉反立氐帥齊萬年為帝圍涇陽涇陽縣前漢屬安定郡後漢晉省賢曰涇陽故城在今原州平涼縣南帥所類翻彈劾不避權戚梁王肜嘗違法處按劾之劾戶概翻又戶得翻冬十章甲十一行本十下有一字乙十一行本同孔本同張校同退齋校同月詔以處為建威將軍與振威將軍盧播沈約志振威將軍始於東漢之時宋登為之以討齊萬年中書令陳準言於朝曰駿及梁王皆貴戚非將帥之才景懷皇后夏侯氏也故駿為外戚夏戶雅翻朝直遙翻退不畏罪周處吳人忠直勇果有仇無援宜詔積弩將軍孟觀以精兵萬人為處前鋒必能殄寇不然梁王當使處先驅以不救而陷之其敗必也朝廷不從齊萬年聞處來曰周府君嘗為新平太守袁山松曰漢獻帝興平元年分安定之鶉觚右扶風之漆置新平郡唐為邠州若專斷而來斷丁亂翻不可當也或受制於人此成禽耳六年關中飢疫六年初略陽清水氐楊駒略陽縣漢屬天水郡後漢改天水郡為漢陽郡獻帝初平四年分漢陽上郡置永陽郡魏改為廣魏郡武帝泰始中更名略陽郡清水縣前漢屬天水郡後漢志省晉志復見仇池方百頃其旁平地二十餘里四面斗絶而高為羊腸蟠道三十六回而上仇池漢書地理志所謂天池大澤在武都郡武都縣西水經注所謂瞿塘者也賢曰仇池山在今成州上祿縣南三秦記曰仇池山在倉洛二谷之間常為水所衝激故下石而上土形似覆壼仇池記曰仇池百頃周回九千四十步天形四方壁立千仞自然樓櫓卻敵分置調均竦起數丈有踰人力東西二門盤道下至上凡有七里上則岡阜低昂泉流交灌煮土成鹽封為百頃王千萬孫飛龍浸強盛徙居略陽飛龍以其甥令孤茂搜為子茂搜避齊萬年之亂十二月自略陽帥部落四千家還保仇池自號輔國將軍右賢王關中人士避亂者多依之茂搜迎接撫納欲去者衛護資送之是後楊氏遂世據仇池帥讀曰率六年是歲以揚烈將軍巴西趙廞為益州刺史發梁益兵糧助雍州討氐羌廞許今翻為趙廞亂蜀殺耿滕陳總以啓巴氐張本七年七年春正月齊萬年屯梁山有衆七萬前漢志扶風好畤縣有梁山處曰軍無後繼必敗不徒亡身為國取恥肜駿不聽逼遣之癸丑處與盧播解系攻萬年於六陌六陌在馬嵬山西肜促令速進自旦戰至暮斬獲甚衆弦絶矢盡救兵不至左右勸處退處按劍曰是吾效節致命之日也遂力戰而死朝廷雖以尤肜而亦不能罪也尤過也七年秋七月雍秦二州大旱疾疫米斛萬錢七年丁丑京陵元公王渾薨九月以尚書右僕射王戎為司徒太子太師何劭為尚書左僕射戎為三公與時浮沈無所匡救委事僚寀寀此宰翻説文曰同官為僚同地為寀爾雅曰寀僚官輕出遊放性復貪吝園田遍天下每自執牙籌晝夜會計常若不足復扶又翻會古外翻家有好李賣之恐人得種種章勇翻常鑽其核凡所賞拔專事虛名阮咸之子瞻嘗見戎戎問曰聖人貴名教老莊明自然其旨同異瞻曰將無同程大昌曰不直云同而云將無同者晉人語度自爾也庾亮辟孟嘉為從事正旦大會褚裒問嘉何在亮曰但自覓之裒歷觀指嘉曰將無是乎將無者猶言殆是此人也意以為是而未敢自主也阮瞻指孔老為同亦此意遂辟之時人謂之三語掾掾于絹翻是時王衍為尚書令南陽樂廣為河南尹皆善清談宅心事外宅居也朝野之人爭慕效之衍與弟澄好題品人物舉世以為儀準朝直遙翻好呼到翻衍神情明秀少時山濤見之嗟歎良久曰何物老嫗生寧馨兒少詩照翻楊正衡晉書音義嫗紆遇翻馨呼刑翻嫗老婦之稱今人傳讀寧如寧武子之寧洪邁隨筆曰今吳中人語尚多用寧馨字為言猶言若何也劉夢得詩為問中華學道者幾人雄猛得寧馨蓋得其義以寧字作平聲讀然誤天下蒼生者未必非此人也樂廣性沖約章甲十一行本約下有清遠二字乙十一行本同孔本同張校同與物無競每談論以約言析理厭人之心而其所不知默如也凡論人必先稱其所長則所短不言自見厭於叶翻伏也見賢遍翻毋音無姓譜齊宣王封母弟於毋鄉其鄉本胡國因曰胡毋氏漢有太史胡毋恭陳國謝鯤城陽王晉書作尼按古仁字又音夷王字孝孫或者當讀為仁字乎然永嘉三年書河內王尼即此王也晉書曰尼城陽人或云河內人若作尼則當音女夷翻皆以任放為達帝分汝陰置新蔡郡任者任物之自然放者縱其心而不制不以為非胡毋輔之嘗酣飲其子謙之窺而厲聲呼其父字曰彥國年老不得為爾輔之歡笑呼入共飲畢卓嘗為吏部郎比舍郎釀熟比毗寐翻近也卓因醉夜至甕間盜飲之為掌酒者所縛明旦視之乃畢吏部也樂廣聞而笑之曰名教內自有樂地樂音洛何必乃爾初何晏等祖述老莊立論以為天地萬物皆以無為本無也者開物成務易繫辭曰夫易開物成務韓康伯注曰言易通萬物之志成天下之務張氏曰物凡物也務事也開明之也成處之也事無大小不能明則何由處矣楊萬里曰開達物理成就世務余謂何晏之旨以為事事物物自無而有無者物之未生事之未形見者也故曰無者開物成務與諸儒説易之旨不同陰陽恃以化生賢者恃以成德故無之為用無爵而貴矣王衍之徒皆愛重之由是朝廷士大夫皆以浮誕為美弛廢職業裴頠著崇有論以釋其蔽曰夫利欲可損而未可絶有也事務可節而未可全無也蓋有飾為高談之具者深列有形之纍盛陳空無之美形器之纍有徵纍力瑞翻空無之義難檢辨巧之文可悅似象之言足惑衆聽眩焉溺其成説雖頗有異此心者辭不獲濟屈於所習濟通也謂虛無習以成俗崇有者辭不能通其意遂為所屈也蓋掩也和戶臥翻往而不反遂薄綜世之務賤功利嚴利改烈之用高浮遊之業卑經實之賢經實謂有經世之實用者名利從之於是文者衍其辭訥者贊其旨立言藉於虛無謂之玄妙處官不親所職謂之雅遠處昌呂翻奉身散其廉操謂之曠達故砥礪之風彌以陵遲砥礪謂砥節礪行也或悖吉凶之禮悖蒲內翻忽容止之表瀆長幼之序混貴賤之級甚者至於裸裎褻慢無所不至裸裎露體也裸郎果翻裎馳成翻行下孟翻夫萬物之有形者雖生於無然生以有為已分物之未生則有無未分既生而有則與無為已分矣遺棄也非無用之所能全也治既有之衆非無為之所能修也治直之翻心非事也而制事必由於心然不可謂心為無也匠非器也而制器必須於匠然不可謂匠非有也是以欲收重淵之鱗非偃息之所能獲也重直龍翻隕高墉之禽非靜拱之所能捷也由此而觀濟有者皆有也虛無奚益於已有之㣥生哉然習俗已成頠論亦不能救也七年拓跋猗色度漠北巡因西略諸國既度漠北遂西行略取諸國降附者三十餘國降戶江翻八年八年春三月壬戌赦天下八年秋九月荊豫徐揚冀五州大水八年初張魯在漢中賨人李氏自巴西宕渠往依之宕渠縣漢屬巴郡蜀先主分置宕渠郡晉屬巴西郡唐為渠州今渠州流江縣東北七十里有古賨國城李氏之先廩君之苗裔也世居巴中秦並天下以為黔中郡薄賦斂之口歲出錢四十巴人呼賦為賨因謂之賨人焉又按晉志劉璋分巴郡墊江置巴西郡劉備割巴郡之宕渠宣漢漢昌三縣置宕渠郡尋省以縣並屬巴西郡則宕渠之屬巴西蓋晉時也賨徂宗翻宕徒浪翻事見六十八卷漢獻帝建安二十年拜為將軍遷于略陽北土號曰巴氐魏分臨渭平襄略陽清水四縣置廣魏郡晉泰始中更各略陽郡皆有材武善騎射性任俠州黨多附之俠戶頰翻及齊萬年反關中荐飢荐才甸翻爾雅仍飢為荐略陽天水六郡民流移就穀入漢川者數萬家道路有疾病窮乏者特兄弟常營護振救之由是得衆心流民至漢中上書求寄食巴蜀朝議不許遣侍御史李苾持節慰勞朝直遙翻苾蒲必翻又蒲蔑翻勞力到翻且監察之監古銜翻不令入劍閣苾至漢中受流民賂表言流民十萬餘口非漢中一郡所能振贍蜀有倉儲人復豐稔復扶又翻宜令就食朝廷從之由是散在梁益不可禁止李特至劍閣太息曰劉禪有如此地面縛於人豈非庸才邪聞者異之李特事始此考異曰帝紀元康七年關中飢八年雍州有年而華陽國志三十國晉春秋皆云八年特就穀入蜀今從之八年張華陳準以趙王梁王相繼在關中皆雍容驕貴師老無功雍容和緩自得之貌驕貴以貴而自驕也師久不決坐自困敝為老言二王不任軍事沈持林翻使討齊萬年觀身當矢石大戰十數皆破之王崇武標點容肇祖聶崇岐覆校
