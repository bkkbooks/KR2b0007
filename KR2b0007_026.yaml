body:
  text: 資治通鑑卷第二十六翰林學士朝散大夫右諫議大夫知制誥兼侍講同提舉萬壽觀公事兼判集賢院上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣奉敕編集後學天台音注漢紀十八神爵元年中宗孝宣皇帝中神爵元年庚申前六一以神爵降集紀元神爵元年春正月上始行幸甘泉郊泰畤三月行幸河東祠后土上頗修武帝故事謹齋祀之禮以方士言增置神祠時以方士言為隨侯劍寶玉寶璧周康寶鼎立四祠於未央宮中又祠大室山於即墨三戶山於下密祠天封苑火井於鴻門又立歲星辰星太白熒惑南斗祠於長安城旁又祠參山八神於曲城蓬山石社石鼓於臨朐之罘山於腄成山於不夜萊山於黃成山祠日萊山祠月又祠四時於琅邪蚩尤於壽良京師近縣鄠則有勞谷五牀山日月五帝仙人玉女祠雲陽有徑路神祠又立五龍山仙人祠及黃帝天神帝原水凡四祠於膚施可醮祭而致後漢志越巂郡青蛉縣禺同山俗謂有金馬碧雞如淳曰金形似馬碧形似雞水經注曰禺同山神有金馬碧雞光景倏忽醮即召翻使疏吏翻初上聞褒有俊才召見見賢遍翻使為聖主得賢臣頌其辭曰夫賢者國家之器用也所任賢則趨舍省而功施普師古曰趨讀曰趣普博也趨七喻翻舍讀曰捨施式智翻器用利則用力少而就效衆故工人之用鈍器也勞筋苦骨終日矻矻應劭曰矻矻勞極貌如淳曰健作貌師古曰如説是也矻口骨翻干將吳寶劍名闔廬所鑄公輸削墨張晏曰離婁黃帝時明目者也應劭曰公輸魯般性巧者也師古曰督察視也工用相得也師古曰溷亂也音胡頓翻庸人之御駑馬亦傷吻敝策而不進於行師古曰吻口角也策所以擊馬孟康曰良馬低頭口至膝故曰齧膝張晏曰駕則旦至故曰乘旦乘食證翻張晏曰王良郵無恤字伯樂晉灼曰靶音霸謂轡也師古曰參驗左氏傳及國語孟子郵無恤郵良劉無止王良總一人也楚辭云驥躊躇於敝輦遇孫陽而得代王逸云孫陽伯樂姓名也列子云伯樂秦穆公時人考其年代不相當張説云良字伯樂斯失之矣應劭曰世本韓哀作御師古曰宋衷云韓哀韓哀侯也時已有御此復言作者加其精巧也然則善御者耳非始作也萬里一息何其遼哉人馬相得也故服絺綌之涼者不苦盛暑之鬱燠襲貂狐之暖者不憂至寒之悽愴師古曰鬱熱氣也燠溫也悽愴寒冷也燠於六翻暖乃短翻有其具者易其備賢人君子亦聖王之所以易海內也易以豉翻昔周公躬吐捉之勞故有圉空之隆師古曰一飯三吐食一沐三捉髮以賓賢士故能成太平之化而刑措不用故囹圄空虛也圉音圄同故有匡合之功應劭曰有以九九求見桓公桓公不內其人曰九九小術而君不內之況大於九九者乎於是桓公設庭燎之禮而見之居無幾隰朋自遠而至齊遂以霸師古曰九九計數之書若今算經也匡謂一匡天下合謂九合諸侯君人者勤於求賢而逸於得人人臣亦然昔賢者之未遭遇也圖事揆策則君不用其謀陳見悃誠王逸曰悃愊志純一也亦猶實也進仕不得施效斥逐又非其愆是故伊尹勤於鼎俎太公困於鼓刀師古曰勤於鼎俎謂負鼎俎以干湯也鼓刀者謂太公屠牛於朝歌也寧子飯牛師古曰鬻賣也呂氏春秋曰百里奚之未遇時也虞亡而虜縛鬻以五羊之皮公孫枝得而悅之獻諸穆公應劭曰齊桓公夜出迎客寧戚疾擊其牛角高歌曰南山矸白石爛生不逢堯與舜禪短布單衣適至骭從昏飯牛薄夜半長夜曼曼何時旦桓公遂召與語悅之以為大夫飯扶晚翻師古曰離遭也運籌合上意諫諍即見聽進退得關其忠任職得行其術剖符錫壤而光祖考故世必有聖知之君知讀曰智而後有賢明之臣故虎嘯而風冽師古曰冽冽風貌也音列蟋蟀俟秋吟蜉蝤出以陰孟康曰蜉蝤渠略也師古曰蟋蟀今之促織也蜉蝤甲蟲也好叢衆而生也朝生而夕死舍人曰南陽以東曰蜉蝤梁宋之間曰渠略郭璞曰似蛣蜣身狹而長有角黃黑色聚生糞土中朝生暮死豬好噉之陸璣疏云蜉蝣有角大如指長三四寸甲下有翅能飛夏月陰雨時地中出俟即俟字蝤音由利見大人師古曰乾卦九五爻辭也言王者居正陽之位賢才見之則利用也生此王國師古曰大雅文王之詩也思語辭也皇美也言美哉衆多賢士生此周王之國也俊艾將自至師古曰艾讀曰乂明明在朝穆穆布列聚精會神相得益章師古曰曰章明也晉灼曰遞音遞送之遞二十四鍾各有節奏擊之不常故曰遞臣瓚曰楚辭云奏伯牙之號鍾號鍾琴名也馬融笛賦曰號鍾高調伯牙以善鼓琴不聞其能擊鍾也師古曰琴名是也字既作遞則與楚辭不同不得即讀為號當依晉音耳逢門子彎烏號師古曰逢門善射者即逢蒙也應劭曰楚有柘桑烏栖其上枝下著地不得飛欲墮號呼故曰烏號張揖曰黃帝乘龍上天小臣不得上挽持龍拔墮黃帝弓臣下抱弓而號故名弓烏號師古曰應張二説皆有據逢皮江翻故聖主必待賢臣而弘功業俊士亦俟明主以顯其德上下俱欲歡然交欣千載一合論説無疑翼乎如鴻毛遇順風沛乎如巨魚縱大壑其得意若此則胡禁不止曷令不行師古曰胡曷皆何也橫被無窮被皮義翻是以聖主不遍窺望而視已明不殫傾耳而聽已聰師古曰殫盡也師古曰塞滿也塞悉則翻休徵自至壽考無疆何必偃仰屈伸若彭祖詬噓呼吸如僑松如淳曰五帝紀彭祖堯舜時人列仙傳彭祖殷大夫也歷夏至商末號年七百師古曰詬噓皆開口出氣也僑王僑松赤松子皆仙人也詬吁于翻噓音虛師古曰眇然高遠之意離力智翻故褒對及之好呼到翻下同京兆尹張敞亦上疏諫曰願明主時忘車馬之好斥遠方士之虛語遊心帝王之術太平庶幾可興也遠于願翻幾居希翻上由是悉罷尚方待詔此尚方非作器物之尚方尚主也主方藥也司馬相如大人賦詔岐伯使尚方是也趙廣漢死後為京兆尹者皆不稱職稱尺證翻唯敞能繼其迹其方略耳目不及廣漢然頗以經術儒雅文之神爵元年上頗修飾宮室車服盛於昭帝時外戚許史王氏貴寵諫大夫王吉上疏曰陛下躬聖質總萬方惟思世務將興太平詔書每下民欣然若更生臣伏而思之可謂至恩未可謂本務也師古曰言天子如此雖於百姓為至恩然未盡政務之本也師古曰言有時遇之不常值治直吏翻言聽諫從然未有建萬世之長策舉明主於三代之隆也其務在於期會簿書斷獄聽訟而已斷丁亂翻此非太平之基也臣聞民者弱而不可勝愚而不可欺也聖主獨行於深宮得則天下稱誦之失則天下咸言之故宜謹選左右審擇所使左右所以正身所使所以宣德此其本也孔子曰安上治民莫善於禮非空言也師古曰孝經載孔子之言治直之翻引先王禮宜於今者而用之臣願陛下承天心發大業與公卿大臣延及儒生述舊禮明王制驅一世之民躋之仁壽之域師古曰以仁撫下則㣥生安逸而壽考余謂此以仁壽二字並言仁者不鄙詐壽者不夭折也驅與驅同壽何以不若高宗師古曰高宗殷王武丁也享國百年謹條奏師古曰趨讀曰趣趣嚮也唯陛下財擇焉吉意以為世俗聘妻送女無節則貧人不及故不舉子又漢家列侯尚公主諸侯則國人承翁主晉灼曰娶天子女則曰尚公主國人娶諸侯女則曰承翁主尚承皆卑下之名也夫屈於婦逆陰陽之位故多女亂古者衣服車馬貴賤有章今上下僭差人人自制師古曰言無節度不畏死亡誅責也求也以其禁邪於冥冥絶惡於未萌也師古曰冥冥言未有端緒也治直吏翻舜湯不用三公九卿之世而舉皋陶伊尹李奇曰不繼世而爵也言皋陶伊尹非三公九卿之世陶音遙師古曰任用賢人放黜讒佞張晏曰子弟以父兄任為郎不通古今無益於民宜明選求賢除任子之令外家及故人可厚以財不宜居位去角抵減樂府省尚方明示天下以儉古者工不造雕瑑師古曰瑑者刻鏤為文瑑音篆非工商之獨賢政教使之然也上以其言為迂闊師古曰迂遠也音于不甚寵異也吉遂謝病歸神爵元年義渠安國至羌中召先零諸豪三十餘人以尤桀黠者皆斬之師古曰桀堅也言不順從也黠惡也為惡堅也零音憐黠戶八翻種章勇翻下同斬首千餘級於是諸降羌及歸義羌侯楊玉等怨怒無所信鄉師古曰恐中國泛怒不信其心而納嚮之仲馮曰恐怒且恐且怒也羌未有變而漢吏無故誅殺其人故楊玉等謂漢無所信鄉於是與他族皆叛也余謂恐怒仲馮説是無所信嚮不信漢不嚮漢也作怨怒者通鑑略改班書之文成一家言降戶江翻背畔犯塞攻城邑殺長吏背蒲妹翻安國以騎都尉將騎二章乙十一行本二作三孔本同張校同千屯備羌至浩亹浩亹縣屬金城郡有浩亹水出西塞外東至允吾入湟水孟康曰浩亹音合門師古曰浩音誥浩水名也亹者水流峽山岸深若門也詩大雅曰鳧鷖在門亦其義也今俗呼此水為閣門河蓋疾言之浩為閣耳杜佑曰浩亹縣即今金城郡廣武縣地又曰廣武縣西南有漢浩亹縣故城失亡車重兵器甚衆師古曰重音直用翻安國引還至令居以聞令音零時趙充國年七十餘上老之使丙吉問誰可將者將即亮翻下同充國對曰無踰於老臣者矣上遣問焉曰將軍度羌虜何如師古曰度計也音大各翻下同當用幾人充國曰百聞不如一見兵難遙度臣願馳至金城昭帝元始六年置金城郡唐蘭鄯廓州地師古曰圖其地形並為攻討方略俱奏上也上時掌翻下兵上同逆天背畔滅亡不久背蒲妹翻願陛下以屬老臣師古曰屬委也屬音之欲翻上笑曰諾乃大發兵詣金城夏四月遣充國將之以擊西羌將即亮翻神爵元年六月有星孛于東方孛蒲內翻神爵元年趙充國至金城須兵滿萬騎欲渡河恐為虜所遮即夜遣三校銜枚先渡師古曰銜枚者欲其無聲使虜不覺校戶教翻下同輒營陳立營陳則虜不得而犯諸軍可以相繼而渡河陳讀曰陳遂以次盡渡虜數十百騎來出入軍傍充國曰吾士馬新倦不可馳逐此皆驍騎難制又恐其為誘兵也驍堅堯翻誘音酉擊虜以殄滅為期小利不足貪令軍勿擊遣騎候四望狹中無虜文穎曰金城有三狹在南六百里師古曰山峭而夾水曰狹四望者狹名也狹音狹引兵上至落都服虔曰落都山名也據水經注破羌縣之西有樂都城後漢志浩亹縣有雒都谷劉昫曰唐鄯州治故樂都城吾知羌虜不能為兵矣使虜發數千人守杜四望狹中師古曰杜塞也充國常以遠斥候為務行必為戰備止必堅營壁尤能持重愛士卒先計而後戰遂西至西部都尉府孟康曰在金城師古曰饗飼之虜數挑戰數所角翻挑徒了翻充國堅守捕得生口言羌豪相數責曰語汝無反數所具翻語牛倨翻今天子遣趙將軍來年八九十矣善為兵今請欲一鬬而死可得邪言充國持重不戰羌欲一鬬而死不可得也罕幵豪靡當兒使弟雕庫來告都尉曰先零欲反後數日果反雕庫種人頗在先零中都尉即留雕庫為質金城西部都尉也種章勇翻質音致乃遣歸告種豪大兵誅有罪者明白自別毋取並滅師古曰言勿相和同並取滅亡別彼列翻除罪仍以功大小賜錢有差時募能斬大豪有罪者一人賜錢四十萬中豪十五萬下豪二萬女子及老弱千錢充國計欲以威信招降罕幵及劫略者解散虜謀徼其疲劇乃擊之師古曰徼要也音工堯翻時上已發內郡兵屯邊者合六萬人矣酒泉太守辛武賢姓譜夏啓封支子於莘莘辛相近遂為辛氏漢初申蒲為趙魏名將及徙家隴西遂為隴西人余按此敘辛武賢之世然既以莘為辛而又以申牽合之以其聲相近也然周自有太史辛甲郡兵皆屯備南山北邊空虛勢不可久若至秋冬乃進兵此虜在境外之册今虜朝夕為寇土地寒苦漢馬不耐冬不如以七月上旬齎三十日糧分兵出張掖酒泉合擊罕幵在鮮水上者劉昫曰漢金城郡之金城縣罕羌所處也後漢置西海郡晉乞伏乾歸都於此唐為蘭州五泉縣余據漢書羌豪獻鮮水海地於王莽置西海郡即此山海經云北鮮之山鮮水出焉北流注于徐吾非此鮮水也但奪其畜産虜其妻子復引兵還冬復擊之復扶又翻大兵仍出虜必震壞師古曰仍頻也下遐稼翻下同令議之充國以為一馬自負三十日食為米二斛四斗麥八斛又有衣裝兵器難以追逐虜必商軍進退師古曰商計度也逐水草入山林隨而深入虜即據前險守後厄以絶糧道必有傷危之憂為夷狄笑千載不可復復報也載子亥翻虜其妻子此殆空言非至計也師古曰殆僅也韻略云近也他種劫略師古曰言被劫略而反畔非其本心册謀也籌也隱而勿章先行先零之誅以震動之宜悔過反善因赦其罪選擇良吏知其俗者拊循和輯師古曰拊古撫字輯與集同天子下其書公卿議者咸以為先零兵盛而負罕幵之助師古曰負恃也則先零未可圖也上乃拜侍中許延壽為強弩將軍即拜酒泉太守武賢為破羌將軍師古曰即就也就其郡而拜之以書敕讓充國曰今轉輸並起百姓煩擾將軍將萬餘之衆不早及秋共水草之利爭其畜食師古曰此畜謂畜産牛羊之屬食謂穀麥之屬也或曰畜食畜之所食即謂草也虜皆當畜食師古曰此畜讀曰蓄蓄聚積也多臧匿山中依險阻臧古藏字手足皸瘃師古曰皸坼裂也瘃寒創也皸音軍瘃竹足翻將軍不念中國之費欲以歲數而勝敵師古曰久歷年歲乃勝小敵也數音所具翻師古曰言為將軍者皆樂此樂音洛以七月擊罕羌將軍其引兵並進勿復有疑復扶又翻充國上書曰陛下前幸賜書欲使人諭罕以大軍當至漢不誅罕以解其謀臣故遣幵豪雕庫宣天子至德罕幵之屬皆聞知明詔今先零羌楊玉阻石山木候便為寇師古曰謂阻依山之木石以自保固乃置先零先擊罕釋有罪誅無辜師古曰釋置也放也就兩害誠非陛下本計也臣聞兵法攻不足者守有餘又曰善戰者致人不致於人師古曰致人者引致而取之致於人為人所引也敦徒門翻宜飭兵馬練戰士以須其至師古曰須待也以逸擊勞取勝之道也今恐二郡兵少不足以守而發之行攻釋致虜之術而從為虜所致之道師古曰釋廢也先零羌虜欲為背畔故與罕幵解仇結約然其私心不能無恐漢兵至而罕幵背之也背蒲妹翻臣愚以為其計常欲先赴罕幵之急以堅其約先擊罕羌先零必助之今虜馬肥糧食方饒擊之恐不能傷害適使先零得施德於罕羌師古曰施德自樹恩德也合其黨虜交堅黨合精兵二萬餘人迫脅諸小種附著者稍衆著直略翻莫須之屬不輕得離也服虔曰莫須小種羌名也虜兵寖多誅之用力數倍臣恐國家憂纍纍力瑞翻下纍重同由十年數不二三歲而已於臣之計先誅先零已則罕幵之屬不煩兵而服矣先零已誅而罕幵不服涉正月擊之得計之理又其時也以今進兵誠不見其利戊申充國上奏上時掌翻秋七月甲寅璽書報從充國計焉充國乃引兵至先零在所虜久屯聚懈弛師古曰弛放也棄車重欲渡湟水重直用翻道厄狹充國徐行驅之或曰逐利行遲師古曰逐利宜速今行太遲此窮寇不可迫也緩之則走不顧急之則還致死師古曰謂更回還盡力而死戰善虜赴水溺死者數百降及斬首五百餘人降戶江翻虜馬牛羊十萬餘頭車四千餘兩兩音亮兵至罕地令軍毋燔聚落芻牧田中師古曰不得燔燒人居及於田畝之中刈芻放牧也喜曰漢果不擊我矣豪靡忘使人來言願得還復故地服虔曰靡忘羌帥名也未報靡忘來自歸充國賜飲食遣還諭種人護軍以下皆爭之曰此反虜不可亶遣充國曰諸君但欲便文自營師古曰苟取文墨之便以自營衛語未卒為于偽翻卒子恤翻璽書報令靡忘以贖論後罕竟不煩兵而下上詔破羌強弩將軍詣屯所以十二月與充國合進擊先零時羌降者萬餘人矣充國度其必壞度徒洛翻欲罷騎兵屯田以待其敝作奏未上上時掌翻會得進兵璽書充國子中郎將卬懼使客諫充國曰誠令兵出破軍殺將以傾國家將即亮翻將軍守之可也即利與病又何足爭一旦不合上意遣繡衣來責將軍師古曰繡衣謂御史何國家之安充國歎曰是何言之不忠也本用吾言羌虜得至是邪師古曰言豫防之可無今日之寇也行下孟翻吾舉辛武賢丞相御史復白遣義渠安國竟沮敗羌復扶又翻敗補邁翻金城湟中穀斛八錢吾謂耿中丞服虔曰耿壽昌也為司農中丞姓譜耿古國名為晉所滅子孫以為氏謂告語也羌人不敢動矣師古曰言豫儲糧食可以制敵乃得四十萬斛耳義渠再使使疏吏翻且費其半失此二册羌人致敢為逆失之豪釐差以千里是既然矣今兵久不決四夷卒有動搖卒讀曰猝下可卒同又卒死同相因而起雖有知者不能善其後知讀曰智羌獨足憂邪師古曰言儻如此則所憂不獨在羌明主可為忠言遂上屯田奏曰臣所將吏士馬牛食所用糧穀茭稿調度甚廣難久不解調徒弔翻難乃旦翻徭役不息恐生他變為明主憂誠非素定廟勝之册師古曰廟勝謂謀於廟堂而勝敵也難用兵碎也易以豉翻故臣愚心以為擊之不便計度臨羌東至浩亹羌虜故田及公田民所未墾可二千頃以上度徒洛翻其間郵亭多壞敗者臣前部士入山伐林木六萬餘枚在水次臣願罷騎兵留步兵萬二百八十一人分屯要害處冰解漕下繕鄉亭浚溝渠師古曰漕下以水運木而下也繕補也浚深治也令可至鮮水左右田事出賦人三章甲十五行本三作二乙十一行本同孔本同張校同十畝師古曰田事出謂至春人出營田也賦謂班與之也畝古畝字發郡騎及屬國胡騎各千就草為田者遊兵以充入金城郡益積畜省大費今大司農所轉穀至者足支萬人一歲食謹上田處及器用簿上時掌翻上報曰即如將軍之計虜當何時伏誅兵當何時得決孰計其便復奏孰與熟同復扶又翻充國上狀曰臣聞帝王之兵以全取勝是以貴謀而賤戰百戰而百勝非善之善者也故先為不可勝以待敵之可勝師古曰此兵法之辭言先自完堅令敵不能勝我乃可以勝敵也余據此言本之孫子然其欲避害就利愛親戚畏死亡一也今虜亡其美地薦草師古曰薦稠草遠遁骨肉心離人有畔志而明主班師罷兵鄧展曰班還也順天時因地利以待可勝之虜雖未即伏辜兵決可期月而望羌虜瓦解前後降者萬七百餘人及受言去者凡七十輩如淳曰羌胡言欲降受其言遣去者師古曰如説非也謂羌受充國之言歸相告喻者也羌虜即羌賊耳無預於胡臣謹條不出兵留田便宜十二事步兵九校師古曰一部為一校校戶教翻以為武備因田致穀威德並行一也又因排折羌虜令不得歸肥饒之地貧破其衆以成羌虜相畔之漸二也居民得並田作師古曰並且讀如本字又音步浪翻仲馮曰並亦俱也不失農業三也軍馬一月之食度支田士一歲罷騎兵以省大費四也度徒洛翻至春省甲士卒循河湟漕穀至臨羌臨羌縣屬金城郡其西北即塞外揚威武傳世折衝之具五也以間暇時下先所伐材繕治郵亭充入金城六也間與間同治直之翻乘危徼幸師古曰言不可必勝徼堅堯翻又一遙翻令反畔之虜竄於風寒之地離霜露疾疫瘃墮之患師古曰墮謂困寒瘃而墮指者七也無經阻遠追死傷之害八也內不損威武之重外不令虜得乘間之勢九也師古曰間謂軍之間隙者也間古莧翻服虔曰皆羌種在河西之河南也亡古無字通十也治隍狹中道橋令可至鮮水以制西域伸威千里從枕席上過師十一也鄭氏曰橋成軍行安易若於枕席上過也繇役豫息以戒不虞十二也繇古徭字通出兵失十二利唯明詔采擇上復賜報曰兵決可期月而望者復扶又翻下同期讀曰期謂今冬邪謂何時也將軍獨不計虜聞兵頗罷且丁壯相聚攻擾田者及道上屯兵復殺略人民將何以止之將軍孰計復奏充國復奏曰臣聞兵以計為本故多算勝少算孫子曰多算勝少算不勝今餘不過七八千人失地遠客分散飢凍畔還者不絶臣愚以為虜破壞可日月冀遠在來春故曰兵決可期月而望竊見北邊自敦煌至遼東萬一千五百餘里乘塞列地有吏卒數千人虜數以大衆攻之而不能害敦徒門翻數所角翻今騎兵雖罷虜見屯田之士精兵萬人從今盡三月虜馬羸瘦羸倫為翻必不敢捐其妻子於他種中種章勇翻遠涉河山而來為寇亦不敢將其纍重還歸故地師古曰纍重謂妻子也纍力瑞翻重直用翻師古曰各於其處自瓦解度徒洛翻册與策同時殺人民其原未可卒禁卒讀曰猝臣聞戰不必勝不苟接刃攻不必取不苟勞衆誠令兵出雖不能滅先零但能令虜絶不為小寇則出兵可也即今同是師古曰言俱不能止小寇盜從乘危之勢往終不見利空內自罷敝罷讀曰疲貶重以自損貶重謂貶中國之威重也又大兵一出還不可復留言大兵出塞而還人有歸志不可使復留屯以備羌如是徭役復更發也復扶又翻下同臣愚以為不便臣竊自惟念奉詔出塞引軍遠擊窮天子之精兵散車甲於山野雖亡尺寸之功亡古無字通下同師古曰偷苟且也此人臣不忠之利非明主社稷之福也充國奏每上輒下公卿議臣上時掌翻下遐稼翻初是充國計者什三中什五最後什八有詔詰前言不便者皆頓首服詰去吉翻魏相曰臣愚不習兵事利害後將軍數畫軍册數所角翻下同其言常是臣任其計必可用也師古曰任保也嘉納之亦以破羌強弩將軍數言當擊以是兩從其計詔兩將軍與中郎將卬出擊強弩出降四千餘人破羌斬首二千級中郎將卬斬首降者亦二千餘級而充國所降復得五千餘人詔罷兵獨充國留屯田神爵元年大司農朱邑卒上以其循吏閔惜之詔賜其子黃金百斤以奉其祭祀神爵元年是歲張歲下脫以字前將軍龍額侯韓增為大司馬車騎將軍龍額侯國屬平原郡師古曰今書本額字或作額而崔浩云有龍額村作額者非額音洛神爵元年丁令比三歲鈔盜胸奴令音零比毗至翻鈔楚交翻殺略數千人胸奴遣萬餘騎往擊之無所得史言胸奴漸衰二年神爵二年春正月以鳳皇甘露降集京師赦天下神爵二年夏五月趙充國奏言羌本可五萬人軍凡斬首七千六百級降者三萬一千二百人溺河湟餓死者五六千人定計遺脫與煎鞏黃羝俱亡者不過四千人定計以定數計算也師古曰詭責也自以為憂責言必能得之奏可充國振旅而還書班師振旅孔安國注曰兵入曰振旅振整也杜預曰振整也旅衆也言整衆而還也所善浩星賜迎説充國曰鄧展曰浩星姓賜名也孫愐曰漢又有浩星公治穀梁説輸芮翻衆人皆以破羌強弩出擊多斬首生降虜以破壞然有識者以為虜勢窮困兵雖不出即章甲十五行本即作必乙十一行本同孔本同張校同自服矣將軍即見見賢遍翻宜歸功於二將軍出擊非愚臣所及如此將軍計未失也充國曰吾年老矣爵位已極豈嫌伐一時事以欺明主哉言一時用兵之事當以實敷奏豈可以自矜伐為嫌國之大事當為後法老臣不以餘命一為陛下明言兵之利害卒死誰當復言之者卒以其意對為于偽翻卒子恤翻復扶又翻上然其計罷遣辛武賢歸酒泉太守官充國復為後將軍秋羌若零離留且種兒庫師古曰且音子閭翻共斬先零大豪猶非楊玉首文穎曰猶非人名也師古曰猶非及楊玉二人也帥讀曰率下同考異曰宣紀五月羌斬猶非楊玉降充國傳五月奏罷屯兵秋羌斬猶非楊玉降今從傳漢封若零弟澤二人為帥衆王餘皆為侯為君離留且種二人為侯兒庫為君陽雕為言兵侯良兒為君靡忘為獻牛君處昌呂翻詔舉可護羌校尉者護羌校尉之官始見於此范曄曰漢武帝時諸羌與胸奴通攻令居安故圍枹罕遣李息徐自為擊定之始置護羌校尉四府舉辛武賢小弟湯四府丞相御史車騎將軍前將軍府也併後將軍府為五府奏湯使酒不可典蠻夷師古曰使酒因酒而使氣若今言惡酒者使如字時湯已拜受節拜者拜官護羌校尉持節護諸羌更改也音工衡翻後臨衆病免五府復舉湯湯數醉酗羌人復扶又翻數所角翻下同師古曰酗況務翻即酗字也醉怒曰酗羌人反畔卒如充國之言史終言其事卒子恤翻以破羌希賞而格不行也章甲十五行本郎下有將字乙十一行本同孔本同卬泄省中語辛武賢在軍中時與卬宴語卬言張安世始不快上上欲誅之卬家將軍以為安世宜全度之由此安世得免武賢恨充國告卬以此罪自殺下遐稼翻神爵二年司隸校尉魏郡蓋寬饒百官表司隸校尉周官武帝征和四年初置持節從中都官徒千二百人捕巫蠱督大姦猾後罷其兵察三輔三河弘農師古曰以掌徒隸而巡察故云司隸蓋音古盍翻齊大夫陳戴食采於蓋其後以為氏至漢初齊有蓋公數干犯上意時上方用刑法任中書官武帝遊宴後庭用宦者為中書官宣帝因之遂基恭顯之禍賢曰中書內中之書也方今聖道浸微儒術不行以刑餘為周召師古曰言使奄人當權軸也召讀曰邵師古曰言以刑法成教化也傳直戀翻言五帝官天下三王家天下家以傳子孫官以傳賢聖書奏上以為寬饒怨謗下其書中二千石下遐稼翻下同時執金吾議據公卿表是歲也南陽太守賢為執金吾寬饒旨意欲求禪大逆不道師古曰言欲使天子傳位於己以言事不當意而為文吏所詆挫師古曰詆毀也挫折也訟者訟其冤也臣聞山有猛獸藜藿為之不采國有忠臣姦邪為之不起為于偽翻司隸校尉寬饒居不求安食不求飽師古曰論語稱孔子曰君子食無求飽居無求安故引之退有死節之義上無許史之屬下無金張之託應劭曰許伯宣帝皇后父史高宣帝外家也金金日磾也張張安世也此四家屬託無不聽師古曰此説非也許氏史氏有外屬之恩金氏張氏自託於近侍也屬讀如本字直道而行多仇少與師古曰仇怨讎也與黨與也有司劾以大辟劾戶概翻辟毗亦翻臣幸得從大夫之後官以諫為名不敢不言上不聽九月下寬饒吏寬饒引佩刀自剄北闕下剄古鼎翻衆莫不憐之神爵二年胸奴虛閭權渠單于將十餘萬騎旁塞獵旁步浪翻欲入邊為寇未至會其民題除渠堂亡降漢言狀漢以為言兵鹿奚鹿盧章甲十五行本無鹿盧鹿字乙十一行本同退齋校同侯此侯不見於表蓋無食邑猶前羌陽雕為言兵侯之類也文穎曰五原朔方之屬也師古曰九郡者五原朔方雲中代郡鴈門定襄北平上谷漁陽也四萬餘騎分屯之而充國總統領之據充國傳書此事於征羌之前通鑑因胸奴內亂書於此以先事月餘單于病歐血因不敢入還去即罷兵乃使題王都犂胡次等入漢請和親未報會單于死虛閭權渠單于始立而黜顓渠閼氏事見二十四卷地節二年閼氏音煙支右賢王會龍城而去顓渠閼氏語以單于病甚且勿遠語牛倨翻後數日單于死用事貴人郝宿王刑未央使人召諸王未至師古曰郝音呼各翻顓渠閼氏與其弟左大將章甲十五行本無將字乙十一行本同且渠都隆奇謀立右賢王為握衍朐鞮單于且子余翻朐音劬鞮丁奚翻握衍朐鞮單于者烏維單于耳孫也應劭曰耳孫玄孫之子也言去其高曾益遠但耳聞之也李斐曰耳孫曾孫也晉灼曰耳孫玄孫之曾孫也諸侯王表在八世師古曰耳孫諸説不同據平紀及諸侯王表説梁孝王玄孫之子耳孫音仍又胸奴傳説握衍朐鞮單于云烏維單于耳孫以此參之李云曾孫是也然漢書諸處又皆云曾孫非一不應雜兩稱而言據爾雅曾孫之子為玄孫玄孫之子為來孫來孫之子為昆孫昆孫之子為仍孫從己之數是為八葉則與晉説相同仍耳聲相近蓋一號也但班氏唯存古名而計其葉數則錯也握衍朐鞮單于立凶惡殺刑未央等而任用都隆奇又盡免虛閭權渠子弟近親而自以其子弟代之虛閭權渠單于子稽侯册既不得立師古曰册音先安翻又音所姦翻杜佑山諫翻師古曰禪音蟬烏禪幕者本康居烏孫間小國數見侵暴數所角翻率其衆數千人降胸奴狐鹿姑單于以其弟子日逐王姊妻之使長其衆居右地師古曰長其衆為之長帥妻七細翻長知兩翻鄭氏曰撣音纏束之纏晉灼曰音田師古曰晉音是也其父左賢王當為單于讓狐鹿姑單于狐鹿姑單于許立之事見二十二卷武帝太初元年日逐王素與握衍朐鞮單于有隙即帥其衆欲降漢帥讀曰率降戶江翻下同使人至渠犂與騎都尉鄭吉相聞吉發渠犂龜茲諸國五萬人迎日逐王口萬二千人小王將十二人小王將者以裨小王將兵者也一曰胸奴左右賢王左右谷蠡王左右大將以下凡二十四長為大王將其餘為小王將將即亮翻黃河千里一曲此當在金城郡界吉追斬之遂將詣京師將如字領也挾也功臣表歸德侯食邑於汝南吉既破車師事見上卷地節三年威震西域遂並護車師以西北道故號都護都護之置自吉始焉師古曰並護南北二道故謂之都都猶大也總也功臣侯表安遠侯食邑於汝南之慎縣師古曰中西域者言最處諸國之中遠近均也中音竹仲翻考異曰百官表曰西域都護加官地節二年初置蓋誤以神爵為地節也西域傳又云神爵三年亦誤去陽關二千七百餘里烏壘城與渠犂田官相近陽關在敦煌龍勒縣西宋白曰伊州伊吾郡漢伊吾盧地宣帝時鄭吉為西域都護治烏壘城即此永平末取此地置宜禾都尉不敢爭西域僮僕都尉由此罷西域諸國故皆役屬胸奴胸奴西邊日逐王置僮僕都尉使領西域常居焉耆危須尉犂間賦稅諸國取富給焉胸奴蓋以僮僕視西域也今日逐王既降西域諸國咸服於漢故僮僕都尉罷有變以聞可安輯安輯之不可者誅伐之漢之號令班西域矣師古曰班布也握衍朐鞮單于更立其從兄薄胥堂為日逐王為薄胥堂立為屠耆單于張本從才用翻神爵二年烏孫昆彌翁歸靡因長羅侯常惠上書願以漢外孫元貴靡為嗣元貴靡楚主解憂長男也結婚重親復扶又翻下同重直龍翻畔絶胸奴詔下公卿議下遐稼翻下同大鴻臚蕭望之以為烏孫絶域變故難保不可許臚陵如翻上美烏孫新立大功謂本始二年破胸奴也師古曰重難也故業謂先與胸奴婚親也盛為資送而遣之使常惠送之至敦煌敦音屯未出塞聞翁歸靡死烏孫貴人共從本約立岑娶子泥靡為昆彌號狂王本約見二十四卷本始二年岑娶漢書作岑陬願留少主敦煌少詩照翻下同敦徒門翻惠馳至烏孫責讓不立元貴靡為昆彌還迎少主事下公卿望之復以烏章甲十五行本烏上有為字乙十一行本同孔本同孫持兩端難約結復扶又翻今少主以元貴靡不立而還信無負於夷狄中國之福也少主不止繇役將興繇古徭字通徵還少主考異曰烏孫傳請昏在元康二年望之傳云神爵二年按元康二年望之未為鴻臚蓋誤以神爵為元康也三年神爵三年春三月丙辰高平憲侯魏相薨恩澤侯表高平侯食邑於淮陽柘縣諡法博聞多能曰憲四月戊辰丙吉為丞相吉上寬大好禮讓好呼到翻不親小事時人以為知大體神爵三年秋七月甲子大鴻臚蕭望之為御史大夫神爵三年八月詔曰吏不廉平則治道衰治直吏翻下同今小吏皆勤事而俸祿薄俸扶用翻欲無侵漁百姓難矣如淳曰漁奪也謂奪其利便也晉灼曰許慎云捕魚之字也師古曰漁者若言漁獵也晉説是也如淳曰律百石奉月六百韋昭曰若食一石則益五斗考異曰宣紀云益吏百石以下俸十五韋昭曰若食一石則益五斗荀紀云益吏百石以下俸五十斛蓋以十五難曉故改之然詔云以下恐難指五十斛也神爵三年是歲東郡太守韓延壽為左馮翊始延壽為潁川太守潁川承趙廣漢搆會吏民之後搆會吏民事見二十四卷本始三年師古曰搆結也延壽改更教以禮讓更工衡翻召故老與議定嫁娶喪祭儀品略依古禮不得過法百姓遵用其教賣偶車馬下里偽物者棄之市道張晏曰下里地下蒿里偽物也師古曰偶謂土木為之象真車馬之形也偶對也棄其物於市之道上也霸因其迹而大治延壽為吏上禮義好古教化好呼到翻所至必聘其賢士以禮待用廣謀議納諫爭表孝弟有行爭讀曰諍行下孟翻修治學官師古曰學官謂庠序之舍也治直之翻陳鍾鼓管弦盛升降揖讓周禮地官鄉大夫以鄉射之禮五物詢衆庶一曰和二曰容三曰主皮四曰和容五曰興舞設斧鉞旌旗習射御之事漢諸郡以八月都試講武事也如淳曰太守都尉令長丞尉會都試課殿最也收賦租先明布告其日以期會為大事吏民敬畏趨鄉之師古曰趨讀曰趣鄉讀曰嚮趣七喻翻又置正五長師古曰正若今之鄉正里正也伍長同伍之中置一人為長也長知兩翻弟讀曰悌下孝弟同不得舍姦人師古曰舍止也吏輒聞知姦人不敢入界其始若煩後吏無追捕之苦民無箠楚之憂師古曰箠杖也楚荊木也即今之荊子也箠止蕊翻接待下吏恩施甚厚而約誓明施式豉翻或欺負之者延壽痛自刻責豈其負之何以至此師古曰言豈我負之其人何以為此事其縣尉至自刺死刺七亦翻及門下掾自剄人救不殊掾于絹翻師古曰殊絶也以人救之故身首不相絶也剄古頂翻延壽涕泣遣吏醫治視治直之翻厚復其家復方目翻在東郡三歲令行禁止令之必行禁之必止無違者也斷丁亂翻由是入為馮翊延壽出行縣至高陵高陵縣屬左馮翊行下孟翻自言延壽大傷之曰幸得備位為郡表率不能宣明教化至令民有骨肉爭訟既傷風化重使賢長吏嗇夫三老孝弟受其恥重直用翻賢長吏謂縣令丞也續漢志縣有嗇夫皆主知民善惡為役先後知民貧富為賦多少平其差品三老掌教化凡有孝子順孫貞女義婦讓財救患及學士為民法式者皆扁表其民以興善行賢曰三老孝弟力田三者皆鄉官之名三老高帝置孝弟力田高后置所以勸導鄉里助成風化也咎在馮翊當先退是日移病不聽事因入臥傳舍閉閣思過傳知戀翻下傳相同一縣莫知所為令丞嗇夫三老亦皆自繫待罪於是訟者宗族傳相責讓此兩昆弟深自悔皆自髡肉袒謝願以田相移終死不敢復爭師古曰移猶傳也一説兄以讓弟弟又讓兄故云相移復扶又翻莫不傳相敕厲不敢犯歙與翕同許及翻延壽恩信周遍二十四縣馮翊統高陵櫟陽翟道池陽夏陽衙粟邑谷口蓮勺鄜頻陽臨晉重泉郃陽祋祤武城沈陽褱德徵雲陵萬年長陵陽陵雲陽二十四縣推其至誠吏民不忍欺紿師古曰紿誑也音蕩亥翻神爵三年胸奴單于又殺先賢撣兩弟烏禪幕請之不聽心恚師古曰恚恨也音於避翻其後左奧鞬王死單于自立其小子為奧鞬王留庭留單于庭也師古曰奧音郁鞬音居言翻與俱東徙單于右丞相將萬騎往擊之失亡數千人不勝容肇祖標點顧頡剛聶崇岐覆校
