body:
  text: 資治通鑑卷第二百四十八端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀六十四武宗至道昭肅孝皇帝下會昌四年會昌四年甲子八四四會昌四年閏月壬戌以中書侍郎同平章事李紳同平章事充淮南節度使會昌四年李德裕奏鎮州奏事官高迪方鎮遣牙職入奏事因謂之奏事官以為賊中好為偷兵術好呼到翻潛抽諸處兵聚於一處官軍多就迫逐以致失利經一兩月又偷兵詣他處官軍須知此情自非來攻城柵慎勿與戰彼淹留不過三日須散歸舊屯如此數四空歸自然喪氣喪息浪翻官軍密遣諜者詗其抽兵之處乘虛襲之無不捷矣詗翾正翻又火迥翻其二鎮魏屯兵雖多終不能分賊勢何則下營不離故處離力智翻每三兩月一深入燒掠而去賊但固守城柵城外百姓賊亦不惜宜令進營據其要害以漸逼之若止如今日賊中殊不以為懼望詔諸將各使知之劉稹腹心將高文端降言賊中乏食令婦人挼穗舂之以給軍挼奴禾翻兩手相切摩也德裕訪文端破賊之策文端以為官軍今直攻澤州恐多殺士卒城未易得易以豉翻澤州兵約萬五千人賊常分兵太半潛伏山谷伺官軍攻城疲弊則四集救之官軍必失利伺相吏翻今請令陳許軍過乾河立寨乾音干自寨城連延築為夾城環繞澤州環音宦日遣大軍布陳於外以扞救兵陳讀曰陳賊見圍城將合必出大戰待其敗北然後乘勢可取德裕奏請詔示王宰文端又言固鎮寨四崖懸絶勢不可攻九域志磁州武安縣有固鎮鎮武安西北至遼州三百餘里皆飲澗水在寨東章十二行本東下有南字乙十一行本同孔本同張校同約一里許宜令王逢進兵逼之絶其水道不過三日賊必棄寨遁去官軍即可追躡前十五里至青龍寨亦四崖懸絶水在寨外可以前法取也其東十五里則沁州城沁州治沁源縣漢上黨穀遠縣地沁七鴆翻文端又言都頭王釗將萬兵戍洺州劉稹既族薛茂卿又誅邢洺救援兵馬使談朝義兄弟三人釗自是疑懼稹遣使召之釗不肯入士卒皆譁譟釗必不為稹用但釗及士卒家屬皆在潞州又士卒恐已降為官軍所殺招之必不肯來惟有諭意於釗使引兵入潞州取稹事成之日許除別道節度使仍厚有賜與庶幾肯從幾居依翻德裕奏請詔何弘敬潛遣人諭以此意劉稹年少懦弱少詩照翻押牙王協宅內兵馬使李士貴用事專聚貨財府庫充溢而將士有功無賞由是人心離怨劉從諫妻裴氏冕之支孫也裴冕相肅代兩朝其弟問典兵在山東欲召之使掌軍政士貴恐問至奪己權且泄其姦狀乃曰山東之事仰成於五舅仰牛向翻裴問第五若召之是無三州也乃止三州邢洺磁王協薦王釗為洺州都知兵馬使釗得衆心而多不遵使府約束同列高元武安玉言其有二心稹召之釗辭以到洺州未立少功實所慚恨乞留數月然後詣府許之王協請稅商人每州遣軍將一人主之名為稅商實籍編戶家資編戶猶言編民也將即亮翻皆估為絹匹十分取其二率高其估民竭浮財及糗糧輸之不能充皆忷忷不安民財非地著轉易以致利者為浮財糗去久翻忷許拱翻軍將劉溪尤貪殘劉從諫棄不用溪厚賂王協協以邢州富商最多命溪主之裴問所將兵號夜飛多富商子弟溪至悉拘其父兄軍士訴於問問為之請為于偽翻溪不許以不遜語答之問怒密與麾下謀殺溪歸國並告刺史崔嘏嘏從之丙子嘏問閉城斬城中大將四人請降於王元逵時高元武在黨山聞之亦降黨山恐當作堯山先是使府賜洺州軍士布人一端尋有帖以折冬賜先悉薦翻以前所賜布折充冬賜折之舌翻會稅商軍將至洺州王釗因人不安謂軍士曰留後年少少詩照翻政非己出今倉庫充實足支十年豈可不少散之少詩沼翻以慰勞苦之士使帖不可用也乃亶開倉庫給士卒人絹一匹穀十二石士卒大喜釗遂閉城請降於何弘敬安玉在磁州聞二州降亦降於弘敬堯山都知兵馬使魏元談等降於王元逵元逵以其久不下皆殺之八月辛卯鎮魏奏邢洺磁三州降宰相入賀李德裕曰昭義根本盡在山東三州降則上黨不日有變矣上曰郭誼必梟劉稹以自贖德裕曰誠如聖料上曰於今所宜先處者何事處昌呂翻德裕請以章十二行本以下有給事中三字乙十一行本同孔本同張校同退齋校同盧弘止為三州留後考異曰舊紀傳皆作弘正實録新紀傳皆作弘止今從之萬一鎮魏請占三州占之贍翻朝廷難於可否上從之詔山南東道兼昭義節度使盧鈞乘驛赴鎮潞人聞三州降大懼郭誼王協謀殺劉稹以自贖稹再從兄中軍使匡周兼押牙再從兄同曾祖從才用翻言於稹曰十三郎在牙院劉匡周第十三牙院押牙治事之所恐為十三郎所疑而獲罪以此失山東今誠得十三郎不入則諸將始敢盡言采於衆人必獲長策稹召匡周諭之使稱疾不入匡周怒曰我在院中故諸將不敢有異圖我出院家必滅矣稹固請之匡周不得已彈指而出誼令稹所親董可武説稹曰説式芮翻山東之叛事由五舅城中人人誰敢相保留後今欲何如五舅謂裴問劉稹自為留後故稱之今城中尚有五萬人且當閉門堅守耳可武曰非良策也留後不若束身歸朝如張元益元益事見二百四十六卷文宗開成三年且以郭誼為留後俟得節之日徐奉太夫人及室家金帛歸之東都不亦善乎太夫人謂從諫妻裴氏誼安肯如是可武曰可武已與之重誓必不負也乃引誼入稹與之密約既定乃白其母母曰歸朝誠為佳事但恨已晚吾有弟不能保謂裴問以邢州降也汝自圖之稹乃素服出門以母命署誼都知兵馬使王協已戒諸將列於外廳誼拜謝稹已已猶畢也稹治裝於內廳治直之翻李士貴聞之帥後院兵數千攻誼帥讀曰率誼叱之曰何不自取賞物乃欲與李士貴同死乎軍士乃退共殺士貴誼易置將吏部署軍士一夕俱定明日使董可武入謁稹曰請議公事稹曰何不言之可武曰恐驚太夫人乃引稹步出牙門至北宅北宅昭義節度使別宅也在使宅之北故曰北宅酒酣乃言今日之事欲全太尉一家劉悟贈太尉則朝廷必垂矜閔稹曰如所言稹之心也可武遂前執其手崔玄度自後斬之因收稹宗族匡周以下至襁褓中子皆殺之襁舉兩翻褓音保穆宗長慶初劉悟始帥昭義三世二十六年而滅又殺劉從諫父子所厚善者張谷陳揚庭李仲京郭台王羽韓茂章茂實王渥賈庠等凡十二家並其子姪甥壻無遺仲京訓之兄台行餘之子羽涯之從孫茂章茂實約之子渥璠之子庠餗之子也甘露之亂仲京等亡歸從諫從諫撫養之李仲京等僅脫甘露之禍卒與劉從諫之族俱屠蓋天聚而殲之也誼日有所誅流血成泥乃函稹首遣使奉表及書降於王宰首過澤州劉公直舉營慟哭亦降於宰乙未宰以狀聞丙申宰相入賀李德裕奏今不須復置邢洺磁留後復扶又翻下同但遣盧弘止宣慰三州及成德魏博兩道上曰郭誼宜如何處之德裕曰劉稹騃孺子耳處昌呂翻騃五駭翻癡也阻兵拒命皆誼為之謀主及勢孤力屈又賣稹以求賞此而不誅何以懲惡宜及諸軍在境並誼等誅之上曰朕意亦以為然乃詔石雄將七千人入潞州以應謠言謠言見上卷三年謂誼等可赦上熟視不應德裕曰今春澤潞未平太原復擾自非聖斷堅定斷丁亂翻二寇何由可平外議以為若在先朝赦之久矣上曰卿不知文宗心地不與卿合安能議乎罷盧鈞山南東道專為昭義節度使戊戌劉稹傳首至京師詔昭義五州給復一年復方目翻除其賦役也軍行所過州縣今年秋稅昭義自劉從諫以來橫增賦斂橫戶孟翻斂力贍翻悉從蠲免所籍土團並縱遣歸農諸道將士有功者等級加賞郭誼既殺劉稹日望旌節既久不聞問乃曰必移他鎮於是閲鞍馬治行裝治直之翻及聞石雄將至懼失色雄至誼等參賀畢敕使張仲清曰郭都知告身來日當至郭誼為昭義都知兵馬使故稱之晚牙來受之諸高班謂諸將凡方鎮及州縣率早晚兩牙將校吏卒皆集河中兵石雄所統入潞州者環讀如宦誼等至唱名引入凡諸將桀黠拒官軍者黠下八翻悉執送京師加何弘敬同平章事丁未詔發劉從諫尸暴於潞州市三日石雄取其尸置毬場斬銼之戊申加李德裕太尉趙國公德裕固辭上曰恨無官賞卿耳卿若不應得朕必不與卿初李德裕以韓全義以來德宗遣韓全義討吳少誠敗於殷水其弊有三一者詔令下軍前日有三四下戶嫁翻宰相多不預聞二者監軍各以意見指揮軍事將師不得專進退三者每軍各有宦者為監使悉選軍中驍勇數百為牙隊其在陳戰鬬者皆怯弱之士每戰監使自有信旗信旗者別為一旗軍中視之以為進退監古銜翻使疏吏翻以牙隊自衛視軍勢小卻輒引旗先走陳從而潰陳讀曰陳德裕乃與樞密使楊欽義劉行深議約敕監軍不得預軍政每兵千人聽監使取十人自衛有功隨例霑賞二樞密皆以為然白上行之自禦回鶻至澤潞罷兵皆守此制自非中書進詔意更無他詔自中出者號令既簡將帥得以施其謀略故所向有功史因李德裕之事而敘之以見唐中世之所以敗武宗之所以勝自用兵以來河北三鎮每遣使者至京師李德裕常面諭之曰河朔兵力雖強不能自立須藉朝廷官爵威命以安軍情歸語汝使語牛倨翻使疏吏翻與其使大將邀宣慰敕使以求官爵何如自奮忠義立功立事結知明主使恩出朝廷不亦榮乎且以耳目所及者言之李載義在幽州為國家盡忠平滄景為于偽翻及為軍中所逐不失作節度使後鎮太原位至宰相楊志誠遣大將遮敕使馬求官及為軍中所逐朝廷竟不赦其罪事並見前紀德裕復以其言白上復扶又翻上曰要當如此明告之由是三鎮不敢有異志會昌四年九月詔以澤州隸河陽節度用李德裕三年之議也會昌四年丁巳盧鈞入潞州鈞素寬厚愛人劉稹未平鈞已領昭義節度事見上卷三年與潞人戰常對陳揚鈞之美陳讀曰陳及赴鎮入天井關昭義散卒歸之者鈞皆厚撫之人情大洽昭義遂安劉稹將郭誼王協劉公直安全慶李道德李佐堯劉武德董可武等至京師皆斬之臣光曰董重質之在淮西事見憲宗紀吳元濟劉稹如木偶人在伎兒之手耳伎渠綺翻彼二人始則勸人為亂終則賣主規利其死固有餘罪然憲宗用之於前武宗誅之於後臣愚以為皆失之何則賞姦非義也殺降非信也失義與信何以為國昔漢光武待王郎劉盆子止於不死知其非力竭則不降故也樊崇徐宣王元牛邯之徒豈非助亂之人乎而光武不殺事並見光武紀則不可復誅故也若既赦而復逃亡叛亂復扶又翻下同則其死固無辭矣如誼等免死流之遠方沒齒不還可矣殺之非也會昌四年王羽賈庠等已為誼所殺李德裕復下詔稱逆賊王涯賈餗等已就昭義誅其子孫宣告中外識者非之王涯賈餗非為逆也設以其附麗非人害于而家凶于而國罪亦不至於殄滅而無遺育李德裕明底其罪若真假手於郭誼而致天誅者宜識者之非之也又令昭義降將李丕高文端王釗等疏昭義將士與劉稹同惡者悉誅之死者甚衆盧鈞疑其枉濫奏請寬之不從昭義屬城有嘗無禮於王元逵者元逵推求得二十餘人斬之餘衆懼復閉城自守戊辰李德裕等奏寇孽既平盡為國家城鎮豈可令元逵窮兵攻討望遣中使賜城內將士敕招安之仍詔元逵引兵歸鎮並詔盧鈞自遣使安撫從之乙亥李德裕等請上尊號且言自古帝王成大功必告天地又宣懿太后祔廟上初即位追諡母韋曰宣懿太后上瞿然曰郊廟之禮誠宜亟行至於徽稱非所敢當凡五上表乃許之瞿紀具翻瞿然失其常度之貌徽美也稱昌孕翻會昌四年李德裕奏據幽州奏事官言詗知回鶻上下離心詗火迥翻又翾正翻可汗欲之安西其部落言親戚皆在唐不如歸唐又與室韋已相失計其不日來降或自相殘滅望遣識事中使欲遣識事宜者出使諭以鎮魏已平昭義惟回鶻未滅仲武猶帶北面招討使宜早思立功會昌四年李德裕怨太子太傅東都留守牛僧孺湖州刺史李宗閔言於上曰劉從諫據上黨十年太和中入朝僧孺宗閔執政不留之加宰相縱去事見二百四十四卷文宗太和七年竭天下力乃能取之皆二人之罪也德裕又使人於潞州求僧孺宗閔與從諫交通書疏無所得乃令孔目官鄭慶言從諫每得僧孺宗閔書疏皆自焚毀詔追慶下御史臺按問下遐嫁翻中丞李回知雜鄭亞以為信然唐制御史臺侍御史六人以久次者一人知雜事謂之雜端言稹破報至僧孺出聲歎恨此希德裕意而誣僧孺也上大怒以僧孺為太子少保分司宗閔為漳州刺史戊子再貶僧孺汀州刺史宗閔漳州長史垂拱元年分福州西南境置漳州以南有漳水為名舊志京師東南七千三百里會昌四年上幸鄠校獵鄠音戶會昌四年十一月復貶牛僧孺循州長史宗章十二行本宗上有李字乙十一行本同閔長流封州復扶又翻會昌四年十二月以忠武節度使王宰為河東節度使河中節度使石雄為河陽節度使考異曰實録九月盧鈞奏十七日石雄回軍赴孟州按雄於時未為河陽節度使實録誤也會昌四年上幸雲陽校獵五年五年春正月己酉朔㣥臣上尊號曰仁聖文武章天成功神德明道大孝皇帝尊號始無道字中旨令加之是時帝崇信道士趙歸真等至親受道籙故旨令㣥臣於尊號中加道字而不知其所謂道者非吾之所謂道也庚戌上謁太廟辛亥祀昊天上帝赦天下五年築望仙臺於南郊五年庚申義安太后王氏崩太和五年宰相建白以太皇太后與寶曆太后稱號未辨前代詔令不敢斥言皆以宮為稱今寶曆太后居義安殿宜曰義安太后詔可五年以祕書監盧弘宣為義武節度使弘宣性寬厚而難犯為政簡易易以豉翻其下便之河北之法軍中偶語者斬弘宣至除其法河北諸帥防其下相與聚謀以圖己故嚴軍中偶語之法以剛制之盧弘宣至中山乃除其法在飛狐西計運致之費踰於粟價弘宣遣吏守之會春旱弘宣命軍民隨意自往取之粟皆入境約秋稔償之時成德魏博皆飢獨易定之境無害五年淮南節度使李紳按江都令吳湘盜用程糧錢新書百官志主客郎中主蕃客東南蕃使還者給入海程糧西北蕃使還者給度磧程糧至於官吏以公事有遠行則須計程以給糧而糧重不可遠致則以錢準估故有程糧錢估其資裝為贓罪當死湘武陵之兄子也吳武陵見二百三十九卷憲宗元和十年惡烏路翻議者多言其冤諫官請覆按詔遣監察御史崔元藻李稠覆之還言湘盜程糧錢有實顏悅本衢州人嘗為青州牙推妻亦士族與前獄異德裕以為無與奪二月貶元藻端州司戶稠汀州司戶不復更推亦不付法司詳斷即如紳奏處湘死復扶又翻斷丁亂翻處昌呂翻為德裕以吳湘獄致禍張本諫議大夫柳仲郢敬晦皆上疏爭之不納稠晉江人宋白曰泉州治晉江縣晉為晉安縣地隋廢郡為邑昕之弟也敬昕見上卷三年五年李德裕以柳仲郢為京兆尹素與牛僧孺善謝德裕曰不意太尉恩獎及此仰報厚德敢不如奇章公門館德裕不以為嫌隋封牛弘為奇章公牛僧孺蓋其後也故時人亦呼之為奇章公宋白曰奇章縣屬巴州本漢葭萌縣地梁置奇章縣取縣東八里奇章山為名五年夏四月壬寅以陝虢觀察使李拭為册黠戛斯可汗使陝失冉翻五年五月壬戌葬恭僖皇后于光陵柏城之外義安太后諡曰恭僖后於穆宗非伉儷故陪葬光陵而不合五年門下侍郎同平章事杜悰罷為右僕射中書侍郎同平章事崔鉉罷為戶部尚書乙丑以戶部侍郎李回為中書侍郎同平章事判戶部如故五年祠部奏括天下寺四千六百蘭若四萬僧尼二十六萬五百祠部掌僧尼故使括之若人者翻釋氏要覽曰蘭若者梵言阿蘭若唐言無諍也四分律云空靜處智度經云遠離處大悲經云離諸忿五年詔册黠戛斯可汗為宗英雄武誠明可汗五年秋七月丙午朔日有食之五年上惡僧尼耗蠹天下欲去之惡烏路翻去羌呂翻道士趙歸真等復勸之復扶又翻乃先毀山野招提蘭若釋書曰招提菩薩皆佛名故號寺或謂之招提增輝記曰招提者梵言拓鬬提奢唐言四方僧物後人傳寫之誤以拓為招又省去鬬奢二字只稱招提即今十方寺院是也薩波論云西天度地以四肘為一弓去村店五百弓不遠不近以間靜為蘭若史照曰今若以唐尺計之度二里許章十二行本敕上有至是二字乙十一行本同孔本同張校同上都東都兩街各留二寺唐謂長安曰上都時左街留慈恩薦福右街留西明莊嚴天下節度觀察使治所及同華商汝州各留一寺華戶化翻分為三等上等留僧二十人中等留十人下等五人考異曰實録中書門下奏請上都東都兩街各留寺十所每寺留僧十人大藩鎮各一所僧亦依前詔敕上都東都每街各留寺兩所每寺僧各留三十人中書門下奏奉敕諸道所留僧尼數宜令更商量分為三等上至二十人中至十人下至五人今據天下諸道共五十處四十六道合配三等鎮州魏博淮南西川山南東道荊南嶺南汴宋幽州東川鄂嶽浙西浙東宣歙湖南江西河南府望每道許留僧二十人山南西道河東鄭滑陳許潞磁鄆曹徐泗鳳翔兗海淄青滄景易定福建同華州望令每道許留十人夏桂雍管黔中安南汝金商州容管望每道許留五人一道河中已敕下留十三人按鎮州等凡五十六州四十一道今云五十處四十六道誤也杜牧杭州南亭記曰武宗即位始去其山臺野邑四萬所冠其徒幾至十萬人後至會昌五年始命西京留佛寺四僧惟十人東都二寺天下所謂節度觀察同華汝三十四治所得留一寺僧準西京數其他刺史州不得有寺凡除寺四千六百僧尼筓冠二十六萬五百實録注又云按唐時石刻云兩都留寺僧各十人郡國留寺二僧各三人數皆不同今從實録前文大秦穆護又釋氏之外教如回鶻摩尼之類是時敕曰大秦穆護等祠釋教既已釐革邪法不可獨存其人並勒還俗遞歸本貫充稅戶如外國人送遠處收管祅呼煙翻胡神也唐制祠部歲再祀磧西諸州火祅而禁民祈祭官品令有祅正蓋主祅僧也立期令所在毀撤仍遣御史分道督之財貨田産並沒官寺材以葺公廨驛舍廨古隘翻銅像鍾磬以鑄錢五年以山南東道節度使鄭肅檢校右僕射同平章事五年詔發昭義騎兵五百步兵千五百戍振武節度使盧鈞出至裴村餞之潞卒素驕憚於遠戍乘醉回旗入城閉門大譟鈞奔潞城以避之宋白曰潞城縣春秋潞子嬰兒之國漢為潞縣十三州志云潞水出焉後魏太武改為刈陵縣隋開皇十三年置潞城縣九域志潞城在潞州東北四十里亂兵擊之傷旬日而卒李德裕奏請詔河東節度使王宰以步騎一千守石會關三千自儀州路據武安以斷邢洺之路斷音短又令河陽節度使石雄引兵守澤州河中節度使韋恭甫發步騎千人戍晉州如此賊必無能為分守四境使潞之亂卒不得越逸而奔他鎮五年八月李德裕等奏東都九廟神主二十六今貯於太微宮小屋玄宗天寶二年改東都玄元皇帝廟曰太微宮劉昫曰東都太微宮本武后家廟神龍初中宗反正廢武氏廟主立太祖已下神主祔主安祿山陷洛陽以廟為馬廣既棄其神主協律郎嚴郢收而藏之史思明再陷洛陽尋又散失賊平東都留守盧正己又募得之廟已焚毀乃寄主於太微宮貯丁呂翻五年壬午詔陳釋教之弊宣告中外凡天下所毀寺四千六百餘區歸俗僧尼二十六萬五百人大秦穆護祅僧二千餘人毀招提蘭若四萬餘區考異曰會要元和二年薛平奏請賜中條山蘭若額為大和寺蓋官賜額者為寺私造者為招提蘭若杜牧所謂山臺野邑是也奴婢十五萬人所留僧皆隸主客不隸祠部時中書門下奏據大唐六典祠部掌天地宗廟大祭與僧事殊不相當又萬務根本合歸尚書省隸鴻臚寺亦未為允當又據六典主客掌朝貢之國七十餘蕃五天竺國並在數內釋氏出自天竺國今陛下以其非中國之教已有釐革僧尼名籍便令係主客不隸祠部及鴻臚寺至為允當從之尋又詔東都止留僧二十人諸道留二十人者減其半留十人者減三人留五人者更不留五臺僧多亡奔幽州五臺在代州五臺縣山形五峙相傳以為文殊示現之地華嚴經疏云清涼山者即代州鴈門五臺山也以歲積堅冰夏仍飛雪曾無炎暑故曰清涼五峯聳出頂無林木有如壘土之臺故曰五臺古傳云山在長安東北一千六百餘里代州之所管山頂至州城一百餘里其山左鄰恆山右接天池南屬五臺縣北至繁畤縣環基所至五百餘里靈記云五臺山有四埵去臺各一百二十里據古經所載今北臺即是中臺中臺即是南臺大黃尖即是北臺栲栳山即是西臺漫天石即是東臺惟北臺中臺古時無異東臺西臺古今無別無恤臺恆山頂是也昔趙襄子名無恤曾登此山觀代國下瞰東海西瞢登山有宮池古廟隋煬帝避暑於此而居因天池造立宮室龍樓鳳閣遍滿池邊號為西埵南繫舟山上有銅環船軸猶在昔帝堯遭水繫舟於此世傳文殊見於南臺號為南埵北有覆宿堆即夏屋山也後魏孝文皇帝避暑往復宿此下見雲州謂之北埵中臺稍近西北有太華泉有古寺二十餘處東臺去太華泉四十二里臺上遙見滄瀛諸州日出時下視大海猶陂澤焉有古寺十五處西臺去太華泉四里危嶝干雲喬林拂日有古寺十二處南臺去太華泉八十里最為幽寂有古寺九處北臺去太華泉十二里有古寺八處唐末所添寺不在其數五臺縣本漢慮虒縣慮虒音驢夷隋大業二年改為五臺縣汝趣白本使趣讀曰促五臺僧為將必不如幽州將為卒必不如幽州卒何為虛取容納之名染於人口將即亮翻染如豔翻又而險翻獨不見近日劉從諫招聚無算間人竟有何益張仲武乃封二刀付居庸關曰有遊僧入境則斬之主客郎中韋博以為事不宜太過李德裕惡之惡烏路翻出為靈武節度副使五年昭義亂兵奉都將李文矩為帥帥所類翻文矩不從亂兵亦不敢害文矩稍以禍福諭之亂兵漸聽命乃遣人謝盧鈞於潞城鈞還入上黨復遣之戍振武行一驛乃潛選兵追之明日及於太平驛唐制三十里一驛太平驛在潞州北六十里宋白曰太平驛東南距潞州八十里考異曰獻替記上信任宰臣無不先訪問無獨斷之事唯誅討澤潞不肯捨赴振武官健及誅翦黨項此二事並禁中發詔處分更不顧問振武官健回旗不肯進發先害監軍傔一人監軍王惟直自出曉諭又被傷痍旬日而卒禁中兩軍樞密已下恨其不殺節將唯害中人所以激上之怒盡須勦戮上問宰臣曰我送石雄領兵至澤潞令盧鈞不誅討罪人如何德裕曰盧鈞已失律性又寬愞必恐自誅不得若便替卻盧鈞亂卒罪惡轉大須興兵討伐恐不如先除替令新帥誅翦上謂德裕曰勿惜盧鈞本非材將救澤潞叛兵疑李丕報嫌往劉稹平後處置澤潞與劉稹同惡僅五千餘人皆是取得高文端王釗狀通姓名勘李丕狀同然後處分其間有三兩人或王釗狀無名並不更問足明是李丕不能逞其憾又云惟務苟安因循為政凡方鎮發兵只合不出軍城嚴兵自衛於城門閲過部伍更令軍將慰安豈有自出送兵馬又令家口縱觀事同兒戲實不足惜緣大兵之後須有防虞臣不敢隱默由是中詔處分不復顧問按盧鈞還入潞州諭戍兵使赴振武尋遣兵追擊盡殺之非上不肯捨也既云不可便替又云不如先除替語自相違上云勿惜盧鈞是上語下云臣不敢隱默乃是德裕語獻替記至此差舛尤甚不可復據又處置澤潞五千餘人太多必是五十字誤耳且請罷河東河陽兵在境上者從之五年九月詔修東都太廟如李德裕所奏也五年李德裕請置備邊庫令戶部歲入錢帛十二萬緡匹度支鹽鐵歲入錢帛十二萬緡匹明年減其三之一凡諸道所進助軍財貨皆入焉以度支郎中判之五年王才人寵冠後庭冠古玩翻上欲立以為后李德裕以才人寒族且無子恐不厭天下之望厭益涉翻伏也合也乃止五年上餌方士金丹性加躁急喜怒不常冬十月上問李德裕以外事對曰陛下威斷不測斷丁亂翻外人頗驚懼嚮者寇逆暴橫橫戶孟翻固宜以威制之今天下既平願陛下以寬理之但使得罪者無怨為善者不驚則為寬矣五年以衡山道士劉玄靜為銀青光祿大夫崇玄館學士賜號廣成先生為之治崇玄館置吏鑄印唐有崇玄署令掌僧道屬宗正寺又有崇玄學博士掌教玄學生玄宗天寶二年改崇玄學曰崇玄館改博士曰學士為之于偽翻治直之翻乞還山許之五年李德裕秉政日久好徇愛憎好呼到翻人多怨之自杜悰崔鉉罷相宦官左右言其太專上亦不悅給事中韋弘質上疏言宰相權重不應更領三司錢穀德裕奏稱制置職業人主之柄弘質受人教導所謂賤人圖柄臣傳曰下輕其上爵賤臣圖柄臣則國家動搖而人不靜十二月弘質坐貶官由是衆怒愈甚史言李德裕以自專自用速禍五年上自秋冬以來覺有疾而道士以為換骨上祕其事外人但怪上希復遊獵復扶又翻下同宰相奏事者亦不敢久留詔罷來年正旦朝會以有疾也五年吐蕃論恐熱復糾合諸部擊尚婢婢婢婢遣厖結藏將兵五千拒之恐熱大敗與數十騎遁去婢婢傳檄河湟數恐熱殘虐之罪數恐所具翻曰汝輩本唐人吐蕃無主則相與歸唐毋為恐熱所獵如狐兔也於是諸部從恐熱者稍稍引去五年是歲天下戶四百九十五萬五千一百五十一五年朝廷雖為黨項置使帝以侍御史為使分三部招定黨項以邠寧延屬崔彥曾鹽夏長澤屬李鄠靈武麟勝屬鄭賀攻陷邠寧鹽州界城堡屯叱利寨宰相請遣使宣慰上決意討之六年六年春二月庚辰以夏州節度使米暨為東北道招討黨項使米姓出於西域唐居枝庶分為米國復入中國子孫遂以為姓六年上疾久未平以為漢火德改洛為雒漢光武改洛陽為雒陽不可以王氣勝君名三月下詔改名炎王于況翻唐以土德王而帝名瀍瀍旁從水土勝水故言以王氣勝君名今改名炎炎從火火能生土取以君名生王氣也帝未幾而晏駕厭勝果何益哉上自正月乙卯不視朝考異曰實録作十五日按獻替記自正月十三日後至三月二十日更不開延英時見中詔處分莫得預焉今從之不許見賢遍翻中外憂懼初憲宗納李錡妾鄭氏生光王怡怡幼時宮中皆以為不慧太和以後益自韜匿㣥居遊處處昌呂翻未嘗發言文宗幸十六宅宴集好誘其言以為戲笑章十二行本笑下有號曰光叔四字乙十一行本同孔本同張校同退齋校同好呼到翻上性豪邁尤所不禮考異曰韋昭度續皇王寶運録曰宣宗即憲皇第四子自憲皇崩便合紹位乃與姪文宗文宗崩武皇慮有他謀乃密令中常侍四人擒宣宗於永巷幽之數日沉於宮廁宦者仇公武慜之乃奏武宗曰前者王子不宜久於宮廁誅之武宗曰唯唯仇公武取出於車中以糞土雜物覆之將別路歸家密養之三年後武皇宮車晏駕百官奉迎於玉宸殿立之尋擢仇公武為軍容使尉遲偓中朝故事曰敬宗文宗武宗相次即位宣皇皆叔父也武宗初登極深忌焉一日會鞠於禁苑間武宗召上遙覩瞬目於中官仇士良士良躍馬向前曰適有旨王可下馬士良命中官輿出軍中奏云落馬已不救矣尋請為僧遊行江表間會昌末中人請還京遂即位令狐澄貞陵遺事曰上在藩時嘗從駕回而上誤墮馬人不之覺比二更方能興時天大雪四顧悄無人聲上寒甚會巡警者至大驚上曰我光王也不悟至此方困且渴若為我求水警者即於旁近得水以進遂委而去上良久起舉甌將飲顧甌中水盡為芳醪矣上獨喜自負一舉盡甌已而體微暖有力遂步歸藩邸此三事皆鄙妄無稽今不取旬日不能言諸宦官密於禁中定策辛酉下詔稱皇子沖幼須選賢德光王怡可立為皇太叔考異曰舊紀三月一日立為皇太叔武宗實録云壬戌宣宗實録云辛酉按獻替記云自正月十三日後至三月二十日更不開延英蓋二十一日則宣宗見百寮也今從宣宗實録更工衡翻忱時壬翻應軍國政事令權句當以武宗之英達李德裕之得君而不能定後嗣卒制命於宦豎北司掌兵且專宮禁之權也句古候翻當丁浪翻下咸當同哀戚滿容裁決庶務咸當於理人始知有隱德焉當丁浪翻甲子上崩年三十三丁卯宣宗即位宣宗素惡李德裕之專惡烏路翻即位之日德裕奉册既罷謂左右曰適近我者非太尉邪每顧我使我毛髮灑淅近其靳翻灑淅肅然之意言可畏憚也夏四月辛未朔上始聽政六年尊母鄭氏為皇太后六年壬申以門下侍郎同平章政事章十二行本無政字乙十一行本同李德裕同平章事充荊南節度使考異曰實録新表傳皆云德裕自守太尉檢校司徒為荊南節度使按制辭皆無責降之語豈可遽自守太尉檢校司徒今從舊紀又貞陵遺事曰上初即位於太極殿時宰相李德裕與行册禮及退上謂宦侍云云聽政之二日遂出為荊門舊德裕傳曰五年武宗上徽號纍表乞骸不許德裕病月餘堅請解機務乃以本官平章事兼江陵尹荊南節度使數月追復知政事宣宗即位罷相出為東都留守按舊紀新表及諸書武宗朝德裕未嘗罷免此年九月方自江陵除東都留守舊傳謬誤今從實録位重有功衆不謂其遽罷聞之莫不驚駭甲戌貶工部尚書判鹽鐵轉運使薛元賞為忠州刺史弟京兆少尹權知府事元龜為崖州司戶皆德裕之黨也六年杖殺道士趙歸真等數人流羅浮山人軒轅集于嶺南五月乙巳赦天下上京兩街先聽留兩寺外更各增置八寺左街先留慈恩薦福今增置興唐保壽二寺寶應寺改為資聖寺青龍寺改為護國寺菩提寺改為保唐寺清禪寺改為安國寺尼寺二所法雲寺改為唐安寺崇敬寺改為唐昌寺右街先留西明寺改為福壽寺莊嚴寺改為聖壽寺添置僧寺一所千福寺尼寺一所興聖寺依舊名化度寺改為崇福寺永泰寺改為萬壽寺清國寺改為崇聖寺經行寺改為龍興寺奉恩寺改為興福寺尼寺一所萬善寺改為延唐寺考異曰杭州南亭記曰今天子即位天下州率與二寺用齒衰男女為其徒各止三十人兩京數倍其四五焉實録準五日敕兩街先留寺兩所外更添置八所注唐石刻云京師兩街各置十寺寺僧五十人蓋謂二年正月赦後非今赦也不隸主客唐初天下僧尼道士女官皆隸鴻臚寺武后延載元年以僧尼隸祠部開元二十四年道士女官隸宗正寺天寶二載以道士隸司封貞元四年崇玄館罷大學士後復置左右街大功德使東都功德使修功德使總僧尼之籍及功役元和二年以道士女官隸左右街功德使會昌二年以僧尼隸主客太清宮置玄元館亦有學士至六年廢而僧尼復隸兩街功德使即是年也改武宗之政也牒即今祠部所給僧道度牒也六年以翰林學士兵部侍郎白敏中同平章事六年辛酉立皇子溫為鄆王渼為雍王渼音美涇為雅王滋為夔王沂為慶王六年六月禮儀使奏請復代宗神主於太廟開成五年文宗升祔代宗神主以親盡祧遷今請復之於廟東增置兩室為九代十一室從之六年秋七月壬寅淮南節度使李紳薨六年回鶻烏介可汗之衆稍稍降散及凍餒死所餘不及三千人國相逸隱啜殺烏介於金山烏介可汗自殺胡山之敗竄於黑車子族今為其下所殺捻奴協翻六年八月壬申葬至道昭肅孝皇帝于端陵端陵在京兆三原縣東十里初武宗疾困顧王才人曰我死汝當如何對曰願從陛下於九泉武宗以巾授之武宗崩才人即縊武宗之問王才人之死懲楊之禍也贈貴葬於端陵柏城之內考異曰蔡京王貴傳曰帝疾亟才人久視帝而歸燕息處濃粧潔服如常日乃取所玩用物散與內家淨盡持帝所授巾至帝前已見升遐容易自縊而仆於御座下以縊為名而得卒舊紀武宗葬端陵德王氏祔焉李德裕獻替記自上臨御王有專房之寵至是以嬌妬忤旨一夕而殞㣥情無不驚懼以謂上功成之後喜怒不測德裕因以進諫在五年十月與王貴傳不同恐獻替記誤康軿劇談録曰孟才人善歌有寵於武宗屬一旦聖體不豫召而問之曰我或不諱汝將何之對曰若陛下萬歲之後無復生為是日令於御前歌河滿子一曲聲調悽咽聞者涕零及宮車晏駕哀慟數日而殞窆於端陵之側此事恐正是王才人傳聞不同六年以循州司馬牛僧孺為衡州長史封州流人李宗閔為郴州司馬恩州司馬崔珙為安州長史安州漢安陸縣地京師東南二千五十一里昭州刺史李王玉為郴州刺史僧孺等五相皆武宗所貶逐楊嗣復貶見二百四十六卷元年三年崔玭罷相崔鉉代之奏珙妄費宋滑院鹽鐵錢九十萬緡又劾與劉從諫厚數護其姦貶澧州刺史再斥恩州司馬僧孺宗閔貶見上四年同日北遷宗閔未離封州而卒離力智翻六年九月以荊南節度使李德裕為東都留守解平章事以中書侍郎同平章事鄭肅同平章事充荊南節度使六年以兵部侍郎判度支盧商為中書侍郎同平章事商翰之族孫也盧翰相德宗於興元貞元之間六年册黠戛斯可汗使者以國喪未行或以為僻遠小國不足與之抗衡回鶻未平不應遽有建置詔百官集議事遂寢六年蠻寇安南經略使裴元裕帥鄰道兵討之帥讀曰率六年以右常侍李景讓為浙西觀察使右常侍右散騎常侍也初景讓母鄭氏性嚴明早寡家貧居於東都諸子皆幼母自教之宅後古牆因雨隤陷隤杜回翻下墜也得錢盈船奴婢喜走告母母往焚香祝之曰吾聞無勞而獲身之災也天必以先君餘慶矜其貧而賜之則願諸孤他日學問有成乃其志也此不敢取遽命掩而築之三子景讓景溫景莊皆舉進士及第景讓官達髮已斑白小有過不免捶楚捶止蕊翻景讓在浙西有左都押牙忤景讓意忤五故翻景讓杖之而斃軍中憤怒將為變母聞之景讓方視事母出坐聽事聽讀曰廳立景讓於庭而責之曰天子付汝以方面國家刑法豈得以為汝喜怒之資妄殺無罪之人乎萬一致一方不寧豈惟上負朝廷使垂年之母銜羞入地垂末垂也垂年猶言末垂之年命左右褫其衣坐之褫丑豸翻將撻其背將佐皆為之請為于偽翻拜且泣久乃釋之軍中由是遂安景莊老於場屋唐人謂貢院為場屋至今猶然母輒撻景讓然景讓終不肯屬主司屬之欲翻主司校文主司也禮部侍郎知貢舉者是也曰朝廷取士自有公道豈敢效人求關節乎久之宰相謂主司曰李景莊今歲不可不收可憐彼翁每歲受撻由是始及第六年冬十月禮院奏禘祭祝文於穆敬文武四室但稱嗣皇帝臣某昭告從之太常有禮院帝於穆宗弟也於敬文武叔也六年甲申上受三洞法籙於衡山道士劉玄靜既杖殺趙歸真而復受法籙所謂尤而效之會昌五年劉玄靜還衡山六年十二月戊辰朔日有食之宣宗元聖至明成武獻文睿智章仁神聰懿道大孝皇帝上諱怡即位改名忱憲宗第十二子按通鑑書唐諸帝號自玄宗以後皆以葬陵諡册為正宣宗諡聖武獻文孝皇帝若元聖至明成武獻文睿智章仁神聰懿道大孝則咸通十三年追崇之號也大中元年丁卯八四七六年春正月甲寅上祀圜丘赦天下改元六年二月加章十二行本加上有庚午二字乙十一行本同退齋校同張校同云無注本亦無盧龍節度使張仲武同平章事賞其破回鶻也石雄獨非破回鶻者乎六年癸未上以旱故減膳徹樂出宮女縱鷹隼隼聳尹翻止營繕命中書侍郎同平章事盧商與御史中丞封敖疏理京城繫囚大理卿馬植奏稱盧商等務行寬宥凡抵極法一切免死彼官典犯贓及故殺人平日大赦所不免今因疏理而原之使貪吏無所懲畏死者銜冤無告恐非所以消旱災致和氣也昔周飢克殷而年豐左傳寧莊子之言為討邢發也討邢而雨降是則誅罪戮姦式合天意雪冤決滯乃副聖心也乞再加裁定詔兩省五品以上議之兩省五品以上官自給事中中書舍人以上也六年初李德裕執政引白敏中為翰林學士見二百四十六卷會昌二年德裕失勢敏中乘上下之怒竭力排之使其黨李咸訟德裕罪考異曰實録白敏中令狐綯在會昌中德裕不以朋黨疑之置之臺閣及德裕失勢抵掌戟手同謀斥逐而崔鉉亦以會昌末罷相怨德裕大中初敏中復薦鉉在中書乃令其黨人李咸者訟德裕輔政時陰事罷德裕留守以太子少保分司東都按舊傳綯以大中二年自湖州刺史入知制誥鉉以三年自河中節度使入為相此時未也實録誤今按通鑑所書令狐綯知制誥在是年六七月之間湖州刺史有前字分司東都也左諫議大夫張鷺等上言陛下以旱理繫囚慮有冤滯今所原死罪無冤可雪恐凶險僥幸之徒常思水旱為災宜如馬植所奏詔從之皆論如法以植為刑部侍郎充鹽鐵轉運使植素以文學政事有名於時李德裕不之重及白敏中秉政凡德裕所薄者皆不次用之以盧商為武昌節度使以刑部尚書判度支崔元式為門下侍郎翰林學士戶部侍郎韋琮為中書侍郎並同平章事六年閏月敕應會昌五年所廢寺有僧能營葺者聽自居之有司毋得禁止是時君相務反會昌之政相息亮翻故僧尼之弊皆復其舊觀通鑑所書則會昌大中之是非可見矣六年己酉積慶太后蕭氏崩蕭后文宗之母也武宗時徙居積慶殿故以稱之六年五月幽州節度使張仲武大破諸奚六年吐蕃論恐熱乘武宗之喪誘黨項及回鶻餘衆寇河西誘音酉詔河東節度使王宰將代北諸軍擊之代北諸軍謂陘嶺以北諸軍也自麟州濟河與恐熱戰於鹽州破走之六年六月以鴻臚卿李業為册黠戛斯英武誠明可汗使六年上謂白敏中曰朕昔從憲宗之喪道遇風雨百官六宮四散避去惟山陵使長而多髯髯如占翻攀靈駕不去誰也對曰令狐楚上曰有子乎對曰長子緒今為隨州刺史上曰堪為相乎對曰緒少病風痹少詩照翻痹必至翻腳冷濕病也次子綯前湖州刺史有才器上即擢為考功郎中知制誥綯入謝上問以元和故事綯條對甚悉綯徒刀翻悉詳也上悅遂有大用之意為令狐綯柄用張本六年秋八月丙申以門下侍郎同平章事李回同平章事充西川節度使六年葬貞獻皇后于光陵之側積慶蕭后諡貞獻六年上敦睦兄弟作雍和殿於十六宅會要是年敕親親樓號雍和殿別造屋宇廊舍七百間宋白曰雍和殿在睦親院置酒作樂擊毬盡歡數所角翻諸王有疾常親至臥內存問憂形於色六年突厥掠漕米及行商振武節度使史憲忠擊破之考異曰按突厥亡已久蓋猶有餘種在振武之北者余謂此突厥餘種保塞內屬者也六年九月丁卯以金吾大將軍鄭光為平盧節度使光潤州人太后之弟也六年乙酉前永寧尉吳汝納訟其弟湘罪不至死李紳與李德裕相表裏欺罔武宗枉殺臣弟乞召江州司戶崔元藻等對辨吳湘死見上卷武宗會昌五年丁亥敕御史臺鞫實以聞鞫實窮治其實也十二月庚戌御史臺奏據崔元藻所列吳湘冤狀如吳汝納之言戊午貶太子少保分司李德裕為潮州司馬六年吏部奏會昌四年所減州縣官內復增三百八十三員讀者至此以減者為是邪以於既減之後而復增者為是邪二年二年正月甲子㣥臣上尊號曰聖敬文思和武光孝皇帝思相吏翻赦天下二年初李德裕執政有薦丁柔立清直可任諫官者德裕不能用上即位柔立為右補闕德裕貶潮州柔立上疏訟其冤丙寅坐阿附貶南陽尉史言丁柔立有是非之心南陽縣漢南陽郡所治宛縣地也隋改為南陽縣唐屬鄧州九域志在州東北一百二十里二年西川節度使李回桂管觀察使鄭亞坐前不能直吳湘冤乙酉回左遷湖南觀察使亞貶循州刺史李紳追奪三任告身李紳已薨故追奪己丑貶端州刺史二年回鶻遏捻可汗仰給於奚王石舍朗仰牛向翻及張仲武大破奚衆見去年五月日益耗散至是所存貴人以下不滿五百人依於室韋使者入賀正此回鶻使者也張仲武使歸取遏捻等遏捻聞之夜與妻葛祿子特勒毒斯等九騎西走餘衆追之不及相與大哭室韋分回鶻餘衆為七七姓共分之室韋有嶺西部山北部黃頭部如者部婆萵部訥北部駱丹部凡七姓悉居柳城東北近者三千里遠者六千里而贏黠戛斯遣其相阿播帥諸胡兵號七萬來取回鶻帥讀曰率大破室韋悉收回鶻餘衆歸磧北猶有數帳潛竄山林鈔盜諸胡鈔楚交翻其別部厖勒先在安西亦自稱可汗居甘州總磧西諸城種落微弱時入獻見見賢遍翻回鶻至五季時入獻見者皆厖勒種類也種章勇翻二年二月庚子以知制誥令狐綯為翰林學士上嘗以太宗所撰金鏡金鏡書太宗所著也使讀之至亂未嘗不任不肖至治未嘗不任忠賢治直吏翻上止之曰凡求致太平當以此言為首又書貞觀政要於屏風每正色拱手而讀之觀古玩翻上欲知百官名數令狐綯曰六品已下官卑數多皆吏部注擬五品以上則政府制授各有籍命曰具員上命宰相作具員御覽五卷上之上之時掌翻常置於案上二年立皇子澤為濮王上欲作五王院於大明宮以處皇子之幼者處昌呂翻召術士柴嶽明使相其地嶽明對曰臣庶之家遷徙不常故有自陽宅入陰宅陰宅入陽宅刑克禍福師有其説陰陽家所謂三刑謂寅刑巳巳刑申申刑寅丑刑戌戌刑未未刑丑子刑卯卯刑子辰刑辰午刑午酉刑酉亥刑亥克謂金克木木克土土克水水克火火克金如淳曰法宮路寢正殿也陰陽書本不言帝王家上善其言賜束帛遣之二年夏五月己未朔日有食之二年門下侍郎同平章事崔元式罷為戶部尚書以兵部侍郎判度支戶部周墀刑部侍郎鹽鐵轉運使馬植並同平章事並當作並初墀為義成節度使辟韋澳為判官及為相謂澳曰力小任重何以相助澳曰願相公無權墀愕然不知所謂澳曰官賞刑罰與天下共其可否勿以己之愛憎喜怒移之天下自理何權之有墀深然之澳貫之之子也澳烏到翻韋貫之元和中為相二年己卯太皇太后郭氏崩于興慶宮六月禮院檢討官王皞貶句容令唐太常寺有禮院修撰檢討官各一員宋白曰貞元九年四月敕太常寺宜署禮院修撰檢討官各一員使為定額句容縣屬升州宋白曰句容縣本漢縣以界內茅山本名句曲山因立名初憲宗之崩上疑郭太后預其謀又鄭太后本郭太后侍兒有宿怨故上即位待郭太后禮殊薄郭太后意怏怏一日登勤政樓即玄宗所起勤政務本之樓在興慶宮上聞之大怒是夕崩外人頗有異論上以鄭太后故不欲以郭后祔憲宗有司請葬景陵外園皞奏宜合葬景陵神主配憲宗室奏入上大怒白敏中召皞詰之皞曰太皇太后汾陽王之孫郭子儀封汾陽王逮事順宗為婦憲宗厭代之夕事出曖昧太皇太后母天下歷五朝五朝穆敬文武宣敏中怒甚皞辭氣愈厲諸相會食周墀立於敏中之門以俟之敏中使謝曰方為一書生所苦公弟先行弟與第同至敏中廳問其事見皞爭辨方急墀舉手加顙歎皞孤直明日皞坐貶官考異曰實録五月戊寅以太皇太后寢疾權不聽政宰臣帥百寮問太后起居己卯復問起居下遺令是日太后崩初上纂位以憲宗遇弒頗疑后在黨中至是暴得疾崩帝之志也甲申白敏中帥百寮上表請聽政不許乙酉又上表不許丙戌三上表乃依六月貶禮院檢討官王皡為潤州句容令舊傳曰宣宗繼統即后之諸子也恩禮愈異於前朝大中年崩祔景陵后歷位七朝五居太母之尊人君行子孫之禮福壽隆貴四十餘年雖漢之馬鄧無以加焉識者以為汾陽社稷之功未泯復鍾慶於懿安焉裴延裕東觀奏記曰憲宗皇帝晏駕之夕上雖幼頗記其事追恨光陵商臣之酷即位後誅鉏惡黨無漏網者郭太后以上英察孝果且懷慚懼時居興慶宮一日與一二侍兒同升勤政樓倚衡而望便欲殞於樓下欲成上過左右急持之即聞於上上大怒其夕太后暴崩上志也又曰懿安郭太后既崩喪服許如故事禮院檢討官王皞抗疏請后合葬景陵配饗憲宗廟室既入上大怒宰臣白敏中召皞詰其事皞對云云翌日皞貶潤州句容縣令周墀亦免相按實録所言暴崩事皆出於東觀奏記若實有此事則既云是夕暴崩何得前一日先下詔云以太后寢疾權不聽政若無此事則廷裕豈敢輒誣宣宗或者郭后實以病終而宣宗以平日疑忿之心欲黜其禮故皞爭之疑以傳疑今參取之東觀奏記又曰杜悰通貴日久門下有術士姓李悰任西川節度使馬植罷黔中赴闕至西川李術士一見植謂悰曰馬中丞非常人也相公厚遇之悰未之信術士一日密言於悰曰相公將有甚禍非馬中丞不能救乞厚結之悰始驚信發日厚幣贈之仍令邸吏為植於闕下買宅生生之費無闕焉植至門方知感悰不知其旨尋除光祿卿報狀至蜀悰謂術士曰貴人到闕作光祿勳矣術士曰姑待之稍進大理卿又遷刑部侍郎充諸道鹽鐵使悰始驚憂俄而作相懿安皇太后崩後悰懿安子壻也忽一日內榜子索檢責宰相元載故事植諭旨翌日延英上前萬端營救植素辨能回上旨事遂中寢按植會昌中已自黔中入為大理卿悰今年二月始為西川節度今不取按裴延裕後作廷裕必有一誤二年秋九月甲子再貶潮州司馬李德裕為崖州司戶湖南觀察使李回為賀州刺史崖州去京師七千四百六十里賀州京師東南四千一百三十里二年前鳳翔節度使石雄詣政府自陳黑山烏嶺之功政府即謂政事堂黑山烏嶺功並見上卷武宗會昌三年考異曰此出范攄雲溪友議彼以烏嶺為天井誤也執政以雄李德裕所薦曰嚮日之功朝廷以蒲孟岐三鎮酬之足矣蒲河中孟河陽岐鳳翔雄怏怏而薨二年十一月庚午萬壽公主適起居郎鄭皓皓絪之孫鄭絪為相於元和之初為校書郎右拾遺內供奉以文雅著稱公主上之愛女故選皓尚之有司循舊制請用銀裝車上曰吾欲以儉約化天下當自親者始令依外命婦以銅裝車唐制公主乘厭翟車外命婦一品乘白銅厭犢車皆如臣庶之法戒以毋得輕夫族毋得預時事又申以手詔曰苟違吾戒必有太平安樂之禍樂音洛皓弟顗嘗得危疾上遣使視之還問公主何在曰在慈恩寺觀戲場上怒歎曰我怪士大夫家不欲與我家為婚良有以也亟命召公主入宮立之階下不之視公主懼涕泣謝罪上責之曰豈有小郎病不往省視乃觀戲乎自晉以來嫂謂叔為小郎省悉景翻由是終上之世貴戚皆兢兢守禮法如山東衣冠之族二年壬午葬懿安皇后於景陵之側非禮也憲宗不為正其始以致宣宗不為正其終二年以中書侍郎同平章事韋琮為太子賓客分司二年十二月鳳翔節度使崔珙奏破吐蕃克清水清水先隸秦州宋白曰清水漢舊縣其地即秦仲始所封九域志清水縣在秦州九十里宋白曰長興中移清水縣於上邽鎮九域志之清水長興所移也權隸鳳翔二年上見憲宗朝公卿子孫多擢用之刑部員外郎杜勝次對上問其家世對曰臣父黃裳首請憲宗監國事見二百三十六卷永貞元年朝直遙翻翰林學士裴諗度之子也上幸翰林面除承旨諗式荏翻以裴度相元和之功自足以賞延于世但翰林學士承旨非賞功之官耳二年吐蕃論恐熱遣其將莽羅急藏將兵二萬略地西鄙尚婢婢遣其將拓跋懷光擊之於南谷大破之急藏降降戶江翻三年三年春正月上與宰相論元和循吏孰為第一周墀曰臣嘗守土江西聞觀察使韋丹功德被於八州被皮義翻八州洪江鄂嶽虔吉袁撫也沒四十年老稚歌思稚直利翻如丹尚存乙亥詔史館修撰杜牧撰丹遺愛碑以紀之仍擢其子河陽觀察判官宙為御史三年二月吐蕃論恐熱軍于河州尚婢婢軍于河源軍河源軍在鄯州東宋白曰河源軍置在涅湟本趙充國亭堠也婢婢諸將欲擊恐熱婢婢曰不可我軍驟勝而輕敵彼窮困而致死戰必不利諸將不從婢婢知其必敗據河橋以待之諸將果敗婢婢收餘衆焚橋歸鄯州據河橋則兵敗而退者有歸路敗兵既渡焚橋阻河則可以截論恐熱之追掩史言尚婢婢善兵三年吐蕃秦原安樂三州及石門等七關來降高宗時吐谷渾為吐蕃所逼徙于鄯州不安其居又徙于靈州之境咸亨三年以靈州故鳴沙縣地置安樂州以居之安史之亂吐蕃取安樂州吐谷渾又徙朔方河東之境原州界有石門驛藏制勝石峽木靖木峽六盤七關考異曰實録涇原節度使康季榮奏吐蕃宰相論恐熱殺東道節度使奉表以三州七關來降獻祖紀年録亦云殺東道節度使奉表按補國史敘論恐熱事甚詳至五年五月始來降此際未降也又不云殺東道節度使且恐熱若以三州七關來降朝廷必官賞之何故但賞邊將而不及恐熱蓋三州七關以吐蕃國亂自來降唐朝廷遣諸道應接撫納之非恐熱帥以來實録誤耳詔涇原靈武鳳翔邠寧振武皆出兵應接三年河東節度使王宰入朝以貨結權幸求以使相領宣武刑部尚書同平章事周墀上疏論之宰遂還鎮駙馬都尉韋讓求為京兆尹墀言京兆尹非才望不可為讓議竟寢墀又諫上開邊開邊謂經略河西也忤五故翻夏四月以墀為東川節度使以御史大夫崔鉉為中書侍郎同平章事兵部侍郎判戶部魏扶同平章事三年癸巳盧龍奏節度使張仲武薨軍中立其子節度押牙直方三年翰林學士鄭皓言於上曰周墀以直言入相亦以直言罷相上深感悟甲午墀入謝加檢校右僕射三年戊戌以張直方為盧龍留後三年五月徐州軍亂逐節度使李廓廓程之子也李程見二百四十三卷長慶四年治直之翻右補闕鄭魯上言其狀且曰臣恐新麥未登徐師必亂速命良帥救此一方帥所類翻上未之省省悉景翻徐州果亂上思魯言擢為起居舍人以義成節度使盧弘止為武寧節度使武寧士卒素驕有銀刀都尤甚屢逐主帥弘止至鎮都虞候胡慶方復謀作亂復扶又翻弘止誅之撫循其餘訓以忠義軍府由是獲安三年六月戊申以張直方為盧龍節度使三年涇原節度使康季榮取原州原州本治高平安史亂後沒於吐蕃秋七月丁巳靈武節度使朱叔明取長樂州長樂當作安樂宋白曰安樂州置於靈州鳴沙縣樂音洛下同甲子邠寧節度使張君緒取蕭關蕭關縣舊志屬原州甲戌鳳翔節度使李玭取秦州玭蒲蠲翻凡取言易也秦州本治上邽宋白曰時治成紀在舊州南一百里詔邠寧節度權移軍於寧州以應接河西八月乙酉改長樂州為威州宋白曰靈州鳴沙縣本漢富平縣地後周立會州隋立環州以大河環曲為名唐神龍中默啜寇掠移縣於廢豐安城咸通三年歸復以舊縣基置安樂州大中三年改為威州河隴老幼千餘人詣闕考異曰實録云數千人今從舊傳己丑上御延喜門樓見之延喜門在皇城東北角六典皇城東面二門北曰延喜南曰景風延喜門則承天門外橫街東直通化門解胡服襲冠帶觀者皆呼萬歲詔募百姓墾闢三州七關土田五年不租稅自今京城罪人應配流者皆配十處十處三州七關也官給牛及種糧四道涇原邠寧靈武鳳翔宋白曰史臣曰營田之名蓋緣邊多隙地蕃兵鎮戍課其播殖以助軍須謂之屯田其後中原兵興民戶減耗野多間田而治財賦者如沿邊例開置名曰營田行之歲久不以兵乃招致農民強戶謂之營田戶復有主務敗闕犯法之家沒納田宅亦係於此自此諸道皆有營田務種章勇翻委度支制置神龍元年置溫池縣屬靈州是年度屬威州縣有鹽池皆倍給衣糧言衣糧倍於其他戍卒道路建置堡柵有商旅往來販易及戍卒子弟通傳家信關鎮毋得留難其山南劍南邊境有沒蕃州縣亦令量力收復廣德以來西羌內侵山南巡內階成陷沒文州移治劍南西山諸州亦多有沒於吐蕃者按階州時為武州宋白曰階州漢武都之地後魏平武都築城於仙陵山置武都鎮西魏始置武州大曆初與秦州俱沒於吐蕃大中三年收復復立武州景曆元年改階州三年冬十月改備邊庫為延資庫備邊庫初置見上武宗會昌五年三年西川節度使杜悰奏取維州三年閏十一月丁酉宰相以克復河湟請上尊號上曰憲宗常有志復河湟見二百三十八卷元和五年謂方用兵於兩河也今乃克成先志耳其議加順憲二廟尊諡以昭功烈三年盧龍節度使張直方暴忍喜遊獵喜許記翻軍中將作亂直方知之託言出獵遂舉族逃歸京師軍中推牙將周綝為留後綝丑林翻考異曰舊紀十一月幽州軍亂逐張直方軍人推周綝為留後四年九月周綝卒軍人立張允伸為留後直方傳曰直方多不法慮為將卒所圖三年冬託以遊獵奔赴闕廷張允伸傳曰四年戎帥周綝寢疾表允伸為留後新紀四年八月幽州軍亂逐張直方張允伸自稱留後傳亦言直方出奔即以允伸為留後實録直方赴闕亦在去年八月至九月又云張允伸知留後皆無周綝姓名今從舊書直方至京師拜金吾大將軍三年甲戌追上順宗諡曰至德弘道大聖大安孝皇帝憲宗諡曰昭文章武大聖至神孝皇帝仍改題神主自天寶已來加上諸帝諡號陵中玉册及神主未嘗改題三年己未崖州司戶李德裕卒三年山南西道節度使鄭涯奏取扶州劉昫曰扶州治同昌縣歷代吐谷渾所據西魏逐吐谷渾於此置鄧州及鄧寧郡蓋以平定鄧至羌為名隋初改置扶州及同昌縣在長安西南一千六百九十里廣德後沒於吐蕃周一良容肇祖標點聶崇岐覆校
