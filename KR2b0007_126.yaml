body:
  text: 資治通鑑卷第一百二十六端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注宋紀八太祖文皇帝下之上元嘉二十八年辛卯四五一春正月丙戌朔魏主大會㣥臣於瓜步山上班爵行賞有差魏人緣江舉火太子左章十二行本左作右乙十一行本同退齋校同衛率尹弘言於上曰六夷如此必走北兵欲退慮南兵之追截故舉火以示威尹弘習知北人軍情因言於上自晉氏失馭劉石以來始有六夷之名率所律翻丁亥魏掠居民焚廬舍而去胡誕世之反也見上卷二十四年搖動民聽故不逞之族因以生心夏戶雅翻數所角翻不逞之族謂廢放之家不得逞志於時者也請徙義康廣州上將徙義康先遣使語之使疏吏翻語牛倨翻義康曰人生會死吾豈愛生必為亂階雖遠何益請死於此恥復屢遷復扶又翻屢力住翻又如字竟未及往魏師至瓜步人情忷懼忷許拱翻上慮不逞之人復奉義康為亂太子劭及武陵王駿尚書左僕射何尚之屢啓宜早為之所武陵王駿時在彭城蓋馳密啓言之也義康不肯服曰佛教不許自殺佛教謂自殺者不復得人身處昌呂翻分扶問翻使者以被掩殺之江夏王義恭以碻磝不可守召王玄謨還歷城魏人追擊敗之遂取碻磝敗蒲賣翻去年蕭斌使王玄謨戍碻磝初上聞魏將入寇命廣陵太守劉懷之逆燒城府船乘守手又翻敵未至而先燒故曰逆乘謂車也音繩證翻盡帥其民渡江帥讀曰率山陽太守蕭僧珍悉斂其民入城臺送糧仗詣盱眙及滑臺者以路不通皆留山陽晉安帝義熙中土斷分廣陵立山陽郡境內有地名山陽因以名郡今楚州即其地盱眙音吁怡須魏人至決以灌之須待也不敢留因攻盱眙魏主就臧質求酒質封溲便與之溲疏鳩翻便毗連翻築長圍一夕而合運東山土石以填塹作浮橋於君山絶水陸道今盱眙縣北七里有長圍山圖經云臧質守盱眙魏太武於都梁山築長城造浮橋絶水路即此塹七豔翻遺于季翻吾今所遣鬬兵盡非我國人國人謂與拓跋氏同出北荒之子孫也凡九十九姓南是氐羌設使丁零死正可減常山趙郡賊丁零自翟真叛慕容皆投常山趙郡界阻山而居故云然減並州賊自後漢納南胸奴分居並州界其地率皆雜處胡漢西河離石以西則皆稽胡據之為寇減關中賊自苻姚據關中其種類蕃滋雖其國已滅而其種實繁無所不利言於魏國無所不利省示具悉姦懷省示省來書所示也悉詳也盡也省悉景翻屢犯邊恃四足謂負戎馬足也申坦散於西按王玄謨自滑臺敗退蕭斌使申坦據清口戴延之所謂清口在壽張縣西界安民亭南以水經注考之其地不在滑臺之西此當謂梁坦出上蔡之帥至虎牢潰散耳爾獨不聞童謠之言乎蓋卯年未至故以二軍開飲江之路耳冥期使然非復人事謂冥冥之中大期將至天使之然非由人事為之也復扶又翻下容復同古者諸侯自稱曰寡人質自以當藩方之任自稱寡人師行未遠爾自送死豈容復令爾生全饗有桑乾哉白登山桑乾川皆在平城左右質言本期直指白登師行至淮而逢魏兵要當勦滅不容令魏主生歸饗有桑乾之地也此嫚書也兩陳相向惡聲至必反之毋庸以此為據也乾音干不幸則生相鎖縛載以一驢直送都市耳我本不圖全若天地無靈力屈於爾齏之粉之細切薑蒜謂之齏研碎米麥謂之粉齏箋西翻裂之猶未足以謝本朝朝直遙翻爾智識及衆力豈能勝苻堅邪今春雨已降兵方四集爾但安意攻城勿遽走糧食乏者可見語語牛倨翻下爾語同當出廩相貽得所送劍刃章十二行本刃作刀乙十一行本同張校同云無注本亦作刃欲令我揮之爾身邪魏主大怒作鐵牀於其上施鐵鑱鑱士衫翻又士懺翻刺也錐也曰破城得質當坐之此上質又與魏衆書曰爾語虜中諸士庶佛貍所與書相待如此以魏主書言其兵鬬死正減國中賊也因而攜之術莫近乎此矣魏主得質此書豈不悔前所與質書乎何為自取糜滅豈可不知轉禍為福邪中原之民本稟漢晉正朔故謂之正朔之民斬佛貍首封萬戶侯賜布絹各萬匹臺格宋臺所立賞格也佛讀如弼魏人以鉤車鉤城樓城內繫以彄緪彄恪侯翻緪古恆翻大索也數百人叫呼引之車不能退既夜縋桶懸卒出截其鉤獲之縋馳偽翻桶他董翻箍木為之明旦又以衝車攻城城土堅密每至句絶謂衝車至著城身也魏人乃肉薄登城分番相代墜而復升復扶又翻莫有退者殺傷萬計尸與城平凡攻之三旬不拔會魏軍中多疾疫或告以建康遣水軍自海入淮水軍自建康下江自江出海轉料角則入淮斷丁管翻二月丙辰朔魏主燒攻具退走盱眙人欲追之沈璞曰今兵不多雖可固守不可出戰但整舟楫示若欲北渡者示若欲自盱眙渡淮而北以追截其後者計不須實行也臧質以璞城主使之上露版露版者書獲捷之狀露版上聞使天下悉知之也上時掌翻歸功於質上聞益嘉之已嘉璞之功又益嘉其讓魏師過彭城江夏王義恭震懼不敢擊夏戶雅翻或告虜驅南口萬餘夕應宿安王陂去城數十里今追之可悉得諸將皆請行義恭禁不許明日驛使至使疏吏翻上敕義恭悉力急追魏師已遠義恭乃遣鎮軍司馬檀和之向蕭城魏人先已聞之盡殺所驅者而去程天祚逃歸天祚為魏所禽見上卷二十六年魏人凡破南兗徐兗豫青冀六州殘破六州之生聚耳六州城守未嘗失也勝音升丁壯者即加斬截嬰兒貫於槊上槊色角翻盤舞以為戲所過郡縣赤地無餘春燕歸巢於林木室廬焚蕩燕無所歸故巢林木國人皆尤之上每命將出師常授以成律交戰日時亦待中詔是以將帥趑趄莫敢自決將即亮翻帥所類翻趑取私翻趄七余翻趑趄不進也又江南白丁輕易進退易以豉翻此其所以敗也自是邑里蕭條元嘉之政衰矣史言亟用兵之禍癸酉詔賑恤郡縣民遭寇者蠲其稅調賑津忍翻蠲工玄翻調徒釣翻甲戌降太尉義恭為驃騎將軍開府儀同三司驃匹妙翻騎奇計翻戊寅魏主濟河自丙辰盱眙退師二十三日始濟河辛巳降鎮軍將軍武陵王駿為北中郎將壬午上如瓜步是日解嚴初魏中書學生盧度世玄之子也魏神麚四年徵盧玄匿高陽鄭羆家崔浩事見上卷二十七年高陽縣前漢屬涿郡後漢屬河間國晉分屬高陽郡掠治之掠音亮羆戒其子曰君子殺身成仁論語載孔子之言其子奉父命吏以火爇其體爇如悅翻終不言而死及魏主臨江上遣殿上將軍黃延年使於魏自晉以來有殿中將軍殿上將軍當是宋所置使疏吏翻盧度世亡命已應至彼延年曰都下不聞有度世也魏主乃赦度世及其族逃亡籍沒者凡度世之族逃亡而籍沒其家者並赦之魏主以為中書侍郎考異曰宋柳元景傳元景從祖弟光世先留鄉里索虜以為折衝將軍河北太守封西陵男光世姊夫為司徒崔浩虜之相也元嘉二十七年虜主拓跋燾南寇汝潁浩密有異圖光世要河北義士與浩應接謀泄被誅河東大姓坐連謀夷滅者甚衆光世南奔得免太祖以為振武將軍與魏事不同今從魏書為于偽翻三月乙酉帝還宮己亥魏主還平城魏主戊寅濟河行二十二日至平城左傳凡公行告于廟反行飲至舍爵策勳焉禮也又曰三年而治兵入而振旅歸而飲至以數軍實杜預注曰飲於廟以數車徒器械及所獲也近畿謂環平城千里之地降戶江翻初魏主過彭城遣人語城中曰語牛倨翻食盡且去須麥熟更來及期江夏王義恭議欲芟麥翦苗移民堡聚芟所銜翻鎮軍録事參軍王孝孫曰白氏六帖曰州主簿郡督郵並今録事參軍余按晉琅邪王睿都督揚州以陳頵為録事參軍當時自別有州主簿督郵之吏亦猶存古而録事之職掌正違失涖符印虜不能復來復扶又翻既自可保如其更至此議亦不可立百姓閉在內城飢饉日久方春之月野採自資一入堡聚餓死立至民知必死何可制邪虜若必來芟麥無晚四坐默然莫之敢對坐徂臥翻長史張暢曰孝孫之議實有可尋尋繹理也用也左傳將尋師焉又曰日尋干戈杜預注皆云尋用也進曰王録事議不可奪別駕王子夏曰此論誠然暢斂版白駿曰版手版僚佐於府公之前斂版白事崇敬也下官欲命孝孫彈子夏録事參軍掌糾彈故云然彈徒丹翻王別駕有何事邪暢曰芟麥移民可謂大議一方安危事繫於此子夏親為州端州別駕居㣥僚之右故曰州端及聞元嗣之言則歡笑酬答阿意左右何以事君子夏元嗣皆大慚義恭之議遂寢初魯宗之奔魏晉安帝義熙十一年魯宗之自襄陽奔秦十三年秦亡奔魏鎮長社常思南歸以昔殺劉康祖及徐湛之父劉康祖父虔之徐湛之父達之義熙十一年為魯軌所殺軌卒子爽襲父官爵爽少有武幹少詩照翻與弟秀皆有寵於魏主章十二行本主下有秀為中書郎五字乙十一行本同孔本同張校同退齋校同既而兄弟各有罪魏主詰責之爽粗中使酒多過失秀以檢校鄴人謀反事因病還遲並為魏主所詰責詰去吉翻從魏主自瓜步還至湖陸請曰奴與南有仇每兵來常恐禍及墳墓爽祖父皆葬長社魏主許之爽至長社殺魏戍兵數百人帥部曲及願從者千餘家奔汝南自長社至汝南不及三百里帥讀曰率爽遣秀詣壽陽奉書於南平王鑠以請降鑠式灼翻降戶江翻上聞之大喜以爽為司州刺史鎮義陽沈約曰司州刺史漢之司隸校尉也晉江左以來淪沒戎寇雖永和太元王化暫及及太和隆安還復湮陷武帝北平關洛河南底定置司州刺史治虎牢領河南滎陽弘農實土三郡少帝景平初司州復沒元嘉末僑立治汝南是後遂治義陽領義陽隨陽安陸南汝南郡考異曰宋略云滎陽太守今從宋書余謂帝蓋以秀兄弟自潁川來降遂因以潁川太守授秀賞賜甚厚魏人毀其墳墓徐湛之以為廟算遠圖特所奬納不敢苟申私怨乞屏居田里不許屏迸郢翻青州民司馬順則自稱晉室近屬聚衆號齊王梁鄒戍主崔勳之詣州五月乙酉順則乘虛襲梁鄒城梁鄒縣漢屬濟南郡晉省宋置梁鄒戍為平原太守治所水經注濟水自管縣東過梁鄒縣北又東北過臨濟縣南參而考之其地蓋在唐齊州臨濟縣界亦聚衆號安定王以應之壬寅魏大赦己巳以江夏王義恭領南兗州刺史徙鎮盱眙增督十二州諸軍事戊申以尚書左僕射何尚之為尚書令太子詹事徐湛之為僕射護軍將軍晉志曰自魏晉迄于江左僕射置二則分左右或不兩置但曰尚書僕射令闕則左為省主若左右並闕則置尚書僕射以主左事今湛之蓋以尚書僕射領護軍將軍也湛之帝之甥會稽公主之子每事推之詔湛之與尚之並受辭訴尚之雖為令而朝事悉歸湛之朝直遙翻六月壬戌魏改元正平魏主命太子少傅遊雅中書侍郎胡方回等更定律令多所增損凡三百九十一條魏太子晃監國監工銜翻頗信任左右又營園田收其利高允諫曰天地無私故能覆載覆敷又翻王者無私故能容養今殿下國之儲二萬方所則而營立私田畜養雞犬畜許六翻乃至酤販市廛與民爭利廛市中空地一曰居也説文曰廛一畝半一家之居也孔穎達曰市廛而不稅者廛謂公家邸舍使商人停物於中直稅其所舍之處不稅其在市所賣之物市內空地曰廛城內空地曰肆按載師云以廛里任國中之地鄭注云廛里邑居里矣廛民居之區域也司農云廛市中空地未有肆城中空地未有宅者也遂人授民田夫一廛田百畝詩胡取禾三百廛兮傳云一夫之居曰廛謂一夫之田百畝也揚子云有田一廛謂百畝之居與詩傳同夫田之廛與市廛之廛其義不同各有攸當也不可追掩夫天下者殿下之天下富有四海何求而無乃與販夫販婦競此尺寸之利乎昔虢之將亡神賜之土田注見前事見五十七卷光和元年藏徂浪翻前鑒若此甚可畏也武王愛周邵齊畢所以王天下史記周紀武王即位太公望為師周公旦為輔召公畢公之徒左右王師一戎衣而天下大定王于況翻所以喪其國飛廉多力惡來善走父子俱以才力事紂惡來善毀讒諸侯以此益疏喪息浪翻頃來侍御左右者恐非在朝之選少詩沼翻朝直遙翻願殿下斥去佞邪親近忠良去羌呂翻近其靳翻所在田園分給貧下販賣之物以時收散收謂收藏其物散謂散與貧民一曰以時收散者言穫斂之時民力可以償稱逋負則收之停滯居物至民所欲得之時則散之則休聲日至謗議可除矣不聽太子為政精察而中常侍宗愛性險暴多不法太子惡之惡烏故翻給事中仇尼道盛侍郎任平城侍郎即給事黃門侍郎仇尼復姓出於徒河任音壬頗用事皆與愛不協愛恐為道盛等所糾遂構告其罪魏主怒斬道盛等於都街都街即都市帝怒甚戊辰太子以憂卒考異曰宋索虜傳云燾至汝南瓜步晃私遣取諸營鹵獲甚衆燾歸聞知大加搜檢晃懼謀殺燾燾乃詐死使其近習召晃迎喪於道執之及國罩以鐵籠尋殺之蕭子顯齊書亦云晃謀殺佛貍見殺宋略曰燾既南侵晃淫于內謀欲殺燾燾知之歸而詐死召晃迎喪晃至執之罩以鐵籠捶之三百曳于叢棘以殺焉又索虜傳云晃弟秦王烏奕旰與晃對掌國事晃疾之訴其貪暴燾鞭之二百遣鎮枹罕此皆江南傳聞之誤今從後魏書壬申葬金陵諡曰景穆帝徐知太子無罪甚悔之為後宗愛弒帝張本秋七月丁亥魏主如陰山青冀二州刺史蕭斌遣振武將軍劉武之等擊司馬順則司馬百年皆斬之斌音彬癸亥梁鄒平蕭斌王玄謨皆坐退敗免官上問沈慶之曰斌欲斬玄謨而卿止之何也對曰諸將奔退莫不懼罪將即亮翻自歸而死將至逃散故止之慶之諫斬玄謨事見上卷上年九月癸巳魏主還平城冬十月庚申復如陰山復扶又翻上遣使至魏魏遣殿中將軍郎法祐來修好好呼到翻己巳魏上黨靖王長孫道生卒十二月丁丑魏主封景穆太子之子濬為高陽王既而以皇孫世嫡不當為藩王乃止觀此則魏世祖立孫之意定矣聰達過人魏主愛之常置左右徙秦王翰為東平王燕王談為臨淮王楚王建為廣陽王吳王余為南安王翰等皆魏主子以國王徙封郡王當考帝使沈慶之徙彭城流民數千家於瓜步征北參軍程天祚徙江西流民數千家於姑孰彭城江西流民皆避魏寇而南者帝以吏部郎王僧綽為侍中僧綽曇首之子也曇首輔政於元嘉之初曇徒含翻衆皆以國器許之好學有思理好呼到翻思相吏翻思理猶言思致也練悉朝典朝直遙翻下同尚帝女東陽獻公主在吏部諳悉人物舉拔咸得其分諳烏含翻分扶問翻言能隨其分量而授任也及為侍中年二十九沈深有局度有局則能處事有度則能容物沈持林翻帝頗以後事為念以其年少少詩照翻欲大相付託朝政大小皆與參焉帝之始親政事也委任王華王曇首殷景仁謝弘微劉湛次則范曄沈演之庾炳之最後江湛徐湛之何瑀之及僧綽凡十二人何瑀之恐當作何尚之唐和入朝于魏魏主厚禮之唐和鎮焉耆有撫安西域之功故厚禮之二十九年壬辰四五二魏世祖追悼景穆太子不已春正月魏所得宋民五千餘家在中山者謀叛州軍討誅之州軍定州之軍也賜死沮子余翻魏世祖追悼景穆太子不已魏世祖追悼景穆太子不已中常侍宗愛懼誅二月甲寅弒帝年四十五諡曰太武皇帝考異曰宋書作庚申今從魏書魏書官氏志北方諸姓烏洛蘭氏改為蘭氏章十二行本上有延字乙十一行本同孔本同張校同以皇孫濬沖幼欲立長君五下翻長知兩翻徵秦王翰置之祕室祕室祕密之室不可廢議久不決宗愛知之自以得罪於景穆太子而素惡秦王翰惡烏路翻善南安王余乃密迎余自中宮便門入禁中矯稱赫連皇后令召延等赫連皇后夏主勃勃之女也不以為疑皆隨入愛先使宦者三十人持兵伏於禁中延等入以次收縛斬之殺秦王翰於永巷而立余大赦改元承平尊皇后為皇太后以愛為大司馬大將軍太師都督中外諸軍事領中祕書封馮翊王史言魏亂魏世祖追悼景穆太子不已庚午立皇子休仁為建安王魏世祖追悼景穆太子不已三月辛卯魏葬太武皇帝于金陵葬雲中金陵魏世祖追悼景穆太子不已上聞魏世祖殂更謀北伐魯爽等復勸之復扶又翻上訪於㣥臣太子中庶子何偃以為淮泗數州淮泗數州謂青冀徐兗司豫也不宜輕動上不從偃尚之之子也夏五月丙申詔曰虐虜窮凶著於自昔未勞資斧已伏天誅拯溺蕩穢今其會也可符驃騎司空二府時江夏王義恭降號驃騎將軍鎮盱眙南譙王義宜鎮江陵進位司空驃匹妙翻騎奇計翻分扶問翻東西應接歸義建績者隨勞酬奬於是遣撫軍將軍蕭思話督冀州刺史張永等向碻磝魯爽魯秀程天祚將荊州甲士四萬出許洛據魯爽傳天祚去年助戍彭城為魏所獲勸爽弟秀南歸是年遂與爽秀俱來奔故並用之將即亮翻帥讀曰率考異曰索虜徐爰張永傳並云王玄謨亦北伐玄謨傳中不曾行蓋脫誤魏紀載六月劉義隆將檀和之寇濟州梁坦及魯安生軍于京索龐萌薛安都寇恆農都不言蕭思話等而宋紀亦無此數人者至七月云韓元興討之和之退梁坦安生亦走不言思話之歸宋略有臧質遣柳元景徇蒲阪元景傳亦有之今從宋書宋略今按考異所謂索虜徐爰張永傳亦宋書也永茂度之子也張裕字茂度避武帝諱以字行上以其異議不使行青州刺史劉興祖上言以為河南阻飢書曰黎民阻飢孔安國注曰阻難也脫諸城固守非旬月可拔稽留大衆轉輸方勞應機乘勢事存急速今偽帥始死帥所類翻兼逼暑時國內猜擾不暇遠赴愚謂宜長驅中山據其關要自中山至代有倒馬關飛狐關民人尚豐兼麥已向熟因資為易謂因敵取資於事為易易弋豉翻必應響赴若中州震動黃河以南自當消潰臣請發青冀七千兵遣將領之將即亮翻直入其心腹若前驅克勝張永及河南衆軍宜一時濟河使聲實兼舉並建司牧撫柔初附西拒太行北塞軍都欲因山險置兵以苞舉相定幽冀之地行戶剛翻塞息則翻隨宜加授加授謂仕於魏有官者加其官未有官而能聚衆以應宋師者先授之以官人百其懷言其懷恩百倍於常時也清一可待謂河南北肅清混一之功可待也不為大傷並催促裝束伏聽敕旨上意止存河南亦不從劉興祖之言上策也上策非命世之英不可行銜中旨授諸將方略臨時宣示散悉亶翻騎奇計翻魏世祖追悼景穆太子不已尚書令何尚之以老請置章十二行本置作致乙十一行本同孔本同仕退居方山方山在建康東北有方山埭截淮立埭於山南曰方山者山形方如印既而詔書敦諭者數四六月戊申朔尚之復起視事復扶又翻御史中丞袁淑録自古隱士有迹無名者為真隱傳以嗤之有迹無名如晨門荷蕢荷蓧野王二老漢陰丈人之類魏世祖追悼景穆太子不已秋七月張永等至碻磝引兵圍之考異曰宋略七月壬辰永師及碻磝下又有乙酉壬辰按長曆此月丁丑朔四日庚辰六日壬午十六日壬辰疑永以庚辰壬午至碻磝非壬辰也魏世祖追悼景穆太子不已壬辰徙汝陰王渾為武昌王淮陽王彧為湘東王彧於六翻魏世祖追悼景穆太子不已初潘淑生始興王濬考異曰太子劭傳云濬母卒使潘淑養之濬傳及文九王傳皆云濬實潘子南史亦云淑養為子淑愛濬濬心不附今從濬本傳以淑有寵於上恚恨而殂袁皇后諡曰元后殂於十七年恚於避翻由是太子劭深惡淑及濬惡烏故翻濬懼為將來之禍乃曲意事劭劭更與之善吳興巫嚴道育嚴道育女巫也其夫為劫坐沒入奚官役使鬼物因東陽公主婢王鸚鵡出入主家道育謂主曰神將有符賜主主夜臥見流光若螢飛入書笥笥相吏翻竹器也篋也圓曰簞方曰笥開視得二青珠由是主與劭濬皆信惑之劭濬並多過失數為上所詰責使道育祈請欲令過不上聞數所角翻詰去吉翻聞音問道育曰我已為上天陳請為于偽翻上時掌翻必不泄露劭等敬事之號曰天師其後遂與道育鸚鵡及東陽主奴陳天與黃門陳慶國共為巫蠱琢玉為上形像埋於含章殿前劭補天與為隊主東陽主卒卒子恤翻鸚鵡應出嫁劭濬恐語泄慮巫蠱之語泄也素為濬所厚以鸚鵡嫁之為妾上聞天與領隊以讓劭曰汝所用隊主副並是奴邪劭懼以書告濬濬復書曰彼人若所為不已正可促其餘命或是大慶之漸耳據此則弒逆之謀濬實啓之劭在都濬在京口故以書往來詳察書意則劭濬逆謀豈一朝一夕之故哉其所由來者漸矣此書乃贊決其逆謀非啓之也常謂上為彼人或曰其人謂江夏王義恭為佞人夏戶雅翻鸚鵡先與天與私通既適懷遠恐事泄白劭使密殺之陳慶國懼曰巫蠱事惟我與天與宣傳往來今天與死我其危哉乃具以其事白上上大驚即遣收鸚鵡封籍其家得劭濬書數百紙皆呪咀巫蠱之言呪職救翻咀莊助翻又得所埋玉人命有司窮治其事治直之翻道育亡命捕之不獲先是濬自揚州章十二行本州下有刺史二字乙十一行本同孔本同張校同出鎮京口十八年濬為揚州刺史出鎮京口史逸其事始先息薦翻紹帝第五子出繼廬陵王義真後既而上用南譙王義宣濬殊不樂乃求鎮江陵濬求代義宣鎮江陵然義宣未及離江陵濬自京口至都則弒逆之禍發矣復扶又翻下同樂音洛濬入朝朝直遙翻遣還京口為行留處分至京口數日而巫蠱事發上惋歎彌日處昌呂翻分扶問翻惋烏貫翻驚惋也謂潘淑曰太子圖富貴更是一理虎頭復如此濬小字虎頭汝母子豈可一日無我邪言一日無帝則淑及濬將為劭所殺也使疏吏翻劭濬惶懼無辭惟陳謝而已上雖怒甚猶未忍罪也當斷不斷反受其亂文帝之謂也魏世祖追悼景穆太子不已諸軍攻碻磝治三攻道張永等當東道濟南太守申坦等當西道揚武司馬崔訓當南道攻之纍旬不拔自帝經略河南到彥之之出師四鎮皆斂戍北去王玄謨之出師碻磝望風而下滑臺則堅壁矣今之出師碻磝亦固守以抗張永等魏人固習知宋人之情態以為無能為也治直之翻濟子禮翻辛亥夜魏人自地道潛出燒崔訓營及攻具癸丑夜又燒東圍及攻具尋復毀崔訓攻道復扶又翻張永夜撤圍退軍不告諸將將即亮翻士卒驚擾魏人乘之死傷塗地蕭思話自往增兵力攻旬餘不拔是時青徐不稔軍食乏丁卯思話命諸軍皆退屯歷城斬崔訓繫張永申坦於獄魯爽至長社魏戍主禿髡幡棄城走禿髡恐當作禿髮章髡十二行本正作髮孔本同張校同魯爽父子兄弟先居長社以南兵來聲勢既盛禿髮幡恐其有內應故不能守而走謂頓兵襄陽之近郊也杜子春周禮注曰五十里為近郊百里為遠郊獨遣冠軍司馬柳元景臧質以冠軍將軍鎮襄陽以柳元景為司馬冠古玩翻下同章十二行本等下有向潼關元景等六字乙十一行本同孔本同張校同退齋校同進據洪關水經注洛水自上洛縣東北於拒城之西北分為二水枝渠東北出為門水門水又北歷陽華之山又東北歷峽謂之鴻關水水東有城即關亭也水西有堡謂之鴻關堡帥讀曰率道成承之之子也蕭道成始見于此蕭承之有復漢中之功見一百二十二卷元嘉十年將即亮翻赴弘農水經注門水自鴻關東北流又北徑弘農縣故城東故城即故函谷關也其水側城北流而注于河河水於此有浢津之名浢音豆司空高平公兒烏干屯潼關魏書官氏志內入諸姓賀兒氏為兒氏魏世祖追悼景穆太子不已吐谷渾王慕利延卒樹洛干之子拾寅立樹洛干卒於晉安帝義熙十三年居伏羅川猶未敢遠離白蘭之險也亦請命于魏丁亥以拾寅為安西將軍西秦河沙三州刺史河南王魏以拾寅為鎮西大將軍沙州刺史西平王魏世祖追悼景穆太子不已庚寅魯爽與魏豫州刺史拓跋僕蘭戰于大索破之杜預曰咸皋東有大索城京相璠曰京縣有大索亭小索亭大小索氏兄弟居之故有大小之號括地志曰滎陽即大索城小索故城在滎陽縣北四里聞碻磝敗退與柳元景皆引兵還蕭道成馬汪等聞魏救兵將至還趣仇池趣七喻翻己丑詔解蕭思話徐州更領冀州刺史鎮歷城更工衡翻上以諸將屢出無功不可專責張永等賜思話詔曰虜既乘利方向盛冬若脫敢送死兄弟父子自共當之耳言諸將皆不可任也可以示張永申坦使示永坦欲以激厲之早知諸將輩如此恨不以白刃驅之今者悔何所及亦憤憤之辭也從之魏世祖追悼景穆太子不已魏南安隱王余自以違次而立余以少子為宗愛所立非次也諡法不顯尸國曰隱欲以收衆心旬月之間府藏虛竭藏徂浪翻又好酣飲及聲樂畋獵不恤政事好呼到翻宗愛為宰相録三省魏蓋以尚書侍中中祕書為三省亦猶今以尚書門下中書為三省也坐召公卿專恣日甚余患之謀奪其權愛憤怒冬十月丙午朔余夜祭東廟魏書明元帝永興四年立太祖道武廟於白登山歲一祭具太牢無常月又於白登山西太祖舊遊之處立昭成獻明太祖廟常以九月十月之交帝親祭牲用馬牛羊白登在平城東故曰東廟而祕之余立才二百二十餘日羽林郎自漢以來有之漢羽林郎秩比三百石郎中可以概推矣魏以劉尼為羽林郎中與殿中尚書俱典兵宿衛則其位任蓋重於漢朝也愛驚曰君大癡人皇孫若立豈忘正平時事乎景穆太子之死魏正平元年也正平元年即上年若爾今當立誰愛曰待還宮當擇諸王賢者立之尼恐愛為變密以狀告殿中尚書源賀賀時與尼俱典兵宿衛乃與南部尚書陸麗謀曰宗愛既立南安還復殺之復扶又翻今又不立皇孫將不利於社稷遂與麗定謀共立皇孫麗俟之子也史言陸俟父子皆有智略忠於後魏戊申賀與尚書長孫渴侯嚴兵守衛宮禁使尼麗迎皇孫於苑中魏都平城有鹿苑入平城賀渴侯開門納之尼馳還東廟大呼曰宗愛弒南安王大逆不道呼火故翻劉尼僅以弒南安王為宗愛罪不能正其弒世祖之罪也皇孫已登大位有詔宿衛之士皆還宮衆咸呼萬歲遂執宗愛賈周等勒兵而入奉皇孫即皇帝位帝諱濬太武皇帝之嫡孫景穆太子之長子也蕭子顯曰濬字烏雷直勒北史魏太武帝始光二年改東宮為萬壽宮起永安安樂二殿改元興安考異曰宋索虜傳燾以烏奕旰有武略用以為太子會燾死使嬖人宗愛立可博真為後宗愛博真恐為奕旰所危矯殺之而自立號年承平博真懦弱不為國人所附晃子濬字烏雷直勤素為燾所愛燕王謂國人曰博真非正不宜立直勤嫡孫應立耳乃殺博真及宗愛而立濬為主號年正平與後魏書不同又云在二十八年皆宋書之誤也皆具五刑夷三族魏世祖追悼景穆太子不已西陽五水㣥蠻反水經注蘄水出江夏蘄春縣北山水首受希水枝津西南流歷蘄山出蠻中故以此水為五水蠻五水謂巴水蘄水希水赤亭水西歸水蠻左憑阻山川世為抄暴宋沈慶之於西陽上下誅討即五水蠻也咸被其患南史曰蠻所在深阻種落熾盛北接淮汝南極江漢地方數千里沔迷遠翻被皮義翻下同為沈慶之以討蠻之兵輔武陵王駿起義張本雍於用翻魏世祖追悼景穆太子不已魏以驃騎大將軍拓跋壽樂為太宰都督中外諸軍録尚書事壽樂拓跋悉鹿之後驃匹妙翻騎奇計翻樂音洛加儀同三司賞定策之功也壽樂渴侯坐爭權並賜死魏世祖追悼景穆太子不已癸未魏廣陽簡王建臨淮宣王談皆卒魏世祖追悼景穆太子不已甲申魏主母閭氏卒按北史魏主母姓郁久閭氏河東王毗之妹也魏世祖追悼景穆太子不已魏南安王余之立也以古弼為司徒張黎為太尉及高宗立弼黎議不合旨黜為外都大官坐有怨言且家人告其為巫蠱皆被誅古弼張黎魏世祖之所親任者也宗愛弒逆不能聲其罪而誅之南安之立首居公位雖不為巫蠱罪固不容於死矣被皮義翻魏世祖追悼景穆太子不已壬寅廬陵昭王紹卒魏世祖追悼景穆太子不已魏追尊景穆太子為景穆皇帝皇妣閭氏為恭皇后尊乳母常氏為保太后魏世祖追悼景穆太子不已隴西屠各王景文叛魏屠直於翻署置王侯魏統萬鎮將南陽王惠壽外都大官于洛拔督四州之衆討平之四州謂秦雍河涼此言戰國時趙魏大界魏世祖追悼景穆太子不已十二月戊申魏葬恭皇后于金陵魏世祖追悼景穆太子不已魏世祖晚年佛禁稍弛魏禁佛見一百二十四卷二十三年及高宗即位㣥臣多請復之乙卯詔州郡縣衆居之所各聽建佛圖一區民欲為沙門者聽出家捨俗為僧謂之出家小州四十人於是嚮所毀佛圖率皆修復佛圖即浮屠或曰佛圖即佛寺為于偽翻下髮剃髮也亦謂之祝髮以師賢為道人統道人統猶宋之都僧録北人謂之僧總攝魏書沙門師賢本罽賓國王種人少入道東遊涼州涼平赴代罷佛法時師賢假為醫術還俗而守道不改於修復日即反沙門為道人統和平初師賢卒曇曜代之更名沙門統魏世祖追悼景穆太子不已丁巳魏以樂陵王周忸為太尉忸女九翻南部尚書陸麗為司徒鎮西將軍杜元寶為司空麗以迎立之功受心膂之寄朝臣無出其右者朝直遙翻下同賜爵平原王麗辭曰陛下國之正統世嫡皇孫故曰正統效順奉迎臣子常職不敢慆天之功慆義與叨同貪也再三不受魏主不許麗曰臣父奉事先朝忠勤著效陸俟事世祖威行北鎮功著關中桑榆晚景也帝曰朕為天下主豈不能使卿父子為二王邪戊午進其父建業公俟爵為東平王考異曰魏紀曰戊申按上有丁巳下有癸亥不當中有戊申蓋戊午字誤耳復其子孫復方目翻麗力辭不受帝益嘉之以東安公劉尼為尚書僕射西平公源賀為征北將軍並進爵為王帝班賜㣥臣謂源賀曰卿任意取之賀辭曰南北未賓府庫不可虛也謂魏南有宋北有柔然不可一日弛備府庫所以供軍國之用不可虛於賞賜乃取戎馬一匹示欲宣力於邊垂高宗之立也高允預其謀陸麗等皆受重賞而不及允允終身不言高允不言功其後位遇隆厚天豈嗇其報也甲子周忸坐事賜死時魏法深峻源賀奏謀反之家男子十三以下本不預謀者宜免死沒官從之魏世祖追悼景穆太子不已江夏王義恭還朝自盱眙還也夏戶雅翻朝直遙翻辛未以義恭為大將軍南徐州刺史欲以代始興王濬也魏世祖追悼景穆太子不已初魏入中原晉孝武帝太元二十一年魏伐燕至安帝隆安二年克中山始得中原景初曆楊偉所造曹魏明帝景初元年行之見二百二十三卷十六年沮子余翻遍考字書無字以偏傍從匪從文離而合之於上下讀如斐字是歲始行之聶崇岐標點王崇武覆校
