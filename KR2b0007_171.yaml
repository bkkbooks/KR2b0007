body:
  text: 資治通鑑卷第一百七十一端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注陳紀五高宗宣皇帝上之下太建四年太建四年壬辰五七二太建四年春正月丙午以尚書僕射徐陵為左僕射尚書置二僕射分為左右若省一僕射則止稱僕射勱莫敗翻太建四年己巳齊主祀南郊五代志後齊制圜丘方澤並三年一祭謂之禘祀其南北郊則歲一祀皆以正月上辛今書己巳以致齋之日為始也南郊為壇於國南廣輪三十六尺高九尺四面各一陛為三壝內壝去壇二十五步中壝外壝相去如內壝四面各通一門又為大營於外壝之外廣輪二百七十步營塹廣一丈深八尺四面各一門又為燎壇於中壝之外丙地廣輪二十七尺高一尺八寸四面各一陛祀所感帝靈威仰於壇以高祖神武皇帝配禮用四圭有邸幣各如方色其上帝及配帝各用騂特牲一太建四年庚午上享太廟太建四年辛未齊主贈琅邪王儼為楚恭哀帝以慰太后心儼死見上卷上年太建四年二月癸酉周遣大將軍昌城公深聘於突厥厥九勿翻司賓李除小賓部賀遂禮聘於齊後周倣成周之制以建官司賓蓋周官大行人之職小賓部其小行人之職歟杜佑曰後周秋官之屬有小賓部下大夫上士護之子也太建四年己卯齊以衛菩薩為太尉菩薄胡翻薩桑割翻考異曰北齊書北史並同不知菩薩何人亦不言何官辛巳以並省吏部尚書高元海為尚書左僕射自元魏置諸道行臺各置令僕尚書等官齊神武破爾朱兆得晉陽建大丞相府而居之文宣受禪遂置尚書省太建四年乙酉封皇子叔卿為建安王太建四年庚寅齊以尚書左僕射唐雍為尚書令侍中祖珽為左僕射珽他鼎翻初胡太后既幽於北宮事見上卷上年為令萱言魏保太后故事保太后事見百二十卷宋帝元嘉二年為令之為于偽翻陸雖婦人然實雄傑自女媧以來未之有也司馬貞曰女媧亦風姓有神聖之德代宓羲立號曰女希氏蓋宓羲之後已經數世金木輪環周而復始也孫愐曰女媧古女后也媧古華翻國師國寶由是得僕射太建四年三月癸卯朔日有食之太建四年初周太祖為魏相立左右十二軍總屬相府太祖殂皆受晉公護處分立十二軍事見百六十二卷梁簡文帝大寶元年敬帝太平元年周太祖殂十二軍受護處分始是年也世祖天嘉元年護歸政於周世宗實武成元年護猶總軍旅次年護弒世宗立高祖改元保定政悉歸護事具百六十六卷至百六十八卷相息亮翻處昌呂翻分扶問翻非護書不行護第屯兵侍衛盛於宮闕諸子僚屬皆貪殘恣橫橫戶孟翻士民患之周主深自晦匿無所關預人不測其淺深護問稍伯大夫庾季才曰比日天道何如後周稍伯蓋周官稍人之職周官稍人主為縣師令都鄙丘甸之政距王城三百里曰稍杜佑曰後周地官之屬有每方稍伯中大夫又每遂有小稍伯稍大夫皆下大夫又有小稍伯稍正上士中士庾季才明於天文故護問之稍所教翻比毗至翻荷恩深厚敢不盡言頃上台有變荷下可翻隋志曰三台六星兩兩而居起文昌列招搖三公之位也西近文昌二星謂之上台公宜歸政天子請老私門此則享期頤之壽曲禮百年曰期頤鄭玄曰期猶要也頤養也周公旦召公奭屏必郢翻不然非復所知復扶又翻護沈吟久之曰吾本志如此但辭未獲免耳沈持林翻沈吟者深味其言微發於聲而不能自決之貌公既為王官可依朝例朝直遙翻下同無煩別參寡人也自是疏之衛公直帝之母弟也深昵於護及沌口之敗沌口敗事見上卷臨海王光大二年昵尼質翻沌柱兗翻由是怨護勸帝誅之冀得其位帝乃密與直及右宮伯中大夫宇文神舉內史下大夫太原王軌右侍上士宇文孝伯謀之周官宮伯掌王宮宿衛次舍之職事內史掌詔王爵祿廢置殺生豫奪之法命諸侯孤卿大夫則策命之凡四方之事書內史讀之後周蓋髣佛其意以置官至隋諱忠字以中書為內史其位任尤重左右侍亦倣周官侍御以置官而創其名五代志周置左右宮伯掌侍衛之禁各更直於內小宮伯二之臨朝則在前侍之首行則夾路車左右中侍掌御寢之禁左右侍陪中侍之後左右前侍掌御寢南門之左右左右後侍掌寢北門之左右杜佑曰周制宮伯中大夫屬天官內史屬春官有中大夫下大夫顯和之子孝伯安化公深之子也安化公書爵以別護子深安化郡唐之慶州帝每於禁中見護常行家人禮以兄弟齒帝立侍於旁丙辰護自同州還長安帝御文安殿見之因引護入含仁殿謁太后且謂之曰太后春秋高頗好飲酒好呼到翻雖屢諫未蒙垂納兄今入朝願更啓請因出懷中酒誥授之周成王作酒誥戒毋彞酒毋敢崇飲以此諫太后護既入如帝所戒讀酒誥未畢帝以玉珽自後擊之記天子搢珽鄭玄曰珽亦笏也珽之言珽然無所屈也或謂之大圭長三尺杼上終葵首終葵首者於杼上又廣其首如椎頭隋志今制珽長尺二寸方而不折以球玉為之珽他頂翻踣蒲北翻帝令宦者何泉以御刀斫之泉惶懼斫不能傷衛公直匿於戶內躍出斬之時神舉等皆在外更無知者史言周主勇決帝召宮伯長孫覽等告以護已誅長知兩翻令收護子柱國談公會大將軍莒公至談莒古國名崇業正平皆郡公按隋書帝紀隨州有崇業郡而志不載五代志絳郡正平縣舊置正平郡蔚紆勿翻並柱國北地侯龍恩龍恩弟大將軍萬壽侯姓也護都督中外故置中外府其屬有長史司馬司録於殿中殺之覽稚之孫也長孫稚著功名於正光永安之間初護既殺趙貴等章十二行本等下有諸將多不自安六字乙十一行本同孔本同張校同護殺貴等事見百六十七卷高祖永定元年侯龍恩為護所親其從弟開府儀同三司植謂龍恩曰從才用翻主上春秋既富安危繫於數公若多所誅戮以自立威權豈唯社稷有纍卵之危恐吾宗亦緣此而敗兄安得知而不言龍恩不能從植又承間言於護曰間古莧翻公以骨肉之親當社稷之寄願推誠王室擬迹伊周則率土幸甚護曰我誓以身報國卿豈謂吾有他志邪邪音耶又聞其先與龍恩言陰忌之植以憂卒卒子恤翻及護敗龍恩兄弟皆死高祖以植為忠特免其子孫大司馬兼小冢宰雍州牧齊公憲素為護所親任雍於用翻賞罰之際皆得參預權勢頗盛護欲有所陳多令憲聞奏其間或有可不不讀曰否憲慮主相嫌隙相息亮翻每曲而暢之帝亦察其心及護死召憲入憲免冠拜謝帝慰勉之使詣護第收兵符及諸文籍衛公直素忌憲固請誅之帝不許護世子訓為蒲州刺史是夜帝遣柱國越公盛乘傳徵訓至同州賜死自蒲州西南至同州一百三十里同州西南至長安二百二十五里傳張戀翻使疏吏翻遣開府儀同三司宇文德齎璽書就殺之護長史代郡叱羅協叱羅虜復姓魏收官氏志拓跋內入諸姓有叱羅氏協時在同州璽斯氏翻皆除名丁巳大赦改元改元建德以宇文孝伯為車騎大將軍騎奇寄翻與王軌並加開府儀同三司初孝伯與帝同日生太祖愛之養於第中幼與帝同學及即位欲引致左右託言欲與孝伯講習舊經故護弗之疑也以為右侍上士出入臥內預聞機務孝伯為人沈正忠諒沈持林翻朝政得失外間細事無不使帝聞之朝直遙翻下同帝閲護書記有假託符命妄造異謀者皆坐誅唯得庾季才書兩紙盛言緯候災祥緯謂七緯日月五星之行失行則為災候謂月令七十二候失節則為災緯于貴翻帝賜季才粟三百石帛二百段遷太中大夫癸亥以尉遲迥為太師尉紆勿翻柱國竇熾為太傅李穆為太保齊公憲為大冢宰衛公直為大司徒陸通為大司馬柱國辛威為大司寇趙公招為大司空後周之制三公九命六官七命時帝始親覽朝政頗事威刑雖骨肉無所寬借齊公憲雖遷冢宰實奪之權又謂憲侍讀裴文舉曰昔魏末不綱後周諸王有侍讀之官不綱言人君不能操持大綱致衆目紊亂太祖輔政及周室受命晉公復執大權積習生常愚者謂法應如是豈有年三十天子而可為人所制乎詩云夙夜匪懈以事一人詩大雅蒸民之詩懈古隘翻謂天子耳卿雖陪侍齊公不得遽同為臣欲死於所事宜輔以正道勸以義方輯睦我君臣協和我兄弟勿令自致嫌疑文舉咸以白憲憲指心撫几曰吾之夙心公寧不知但當盡忠竭節耳知復何言復扶又翻衛公直性浮詭貪狠狠戶懇翻意望大冢宰既不得殊怏怏更請為大司馬欲據兵權帝揣知其意曰汝兄弟長幼有序豈可返居下列由是用為大司徒為後三年衛公直作亂張本怏於兩翻揣初委翻長知兩翻太建四年夏四月周遣工部成公建小禮部辛彥之聘於齊杜佑通典周制工部中大夫屬冬官五命禮部屬春官中大夫五命小禮部上士也三命太建四年庚寅周追尊略陽公為孝閔皇帝廢略陽公事見百六十七卷高祖永定元年太建四年癸巳周立皇子魯公贇為太子贇於倫翻大赦太建四年五月癸卯王勱卒勱音邁卒子恤翻太建四年齊尚書右僕射祖珽勢傾朝野左丞相咸陽王斛律光惡之珽他鼎翻朝直遙翻惡烏路翻遙見輒罵曰多事乞索小人乞索求取也小人求取無厭致國家多事索山客翻又嘗謂諸將曰兵章十二行本兵上有邊境消息四字乙十一行本同孔本同張校同馬處分趙令恆與吾輩參論趙令謂趙彥深為尚書令以其官稱之也處昌呂翻分扶問翻將即亮翻恆戶登翻祖珽病盲故詆之盲事始上卷臨海王光大元年正恐誤國家事耳光嘗在朝堂垂簾坐朝直遙翻下同珽不知乘馬過其前光怒曰小人乃敢爾爾猶言如此也齊蓋以門下省為內省光適過聞之又怒珽覺之私賂光從奴問之從才用翻奴曰自公用事相王每夜抱膝歎曰盲人入國必破矣相息亮翻穆提婆求娶光庶女不許齊王賜提婆晉陽田光言於朝曰此田神武帝以來常種禾飼馬數千匹以擬寇敵飼祥吏翻今賜提婆無乃闕軍務也由是祖穆皆怨之斛律后無寵珽因而間之間古莧翻光弟羡為都督幽州刺史行臺尚書令亦善治兵治直之翻士馬精強鄣候嚴整突厥畏之謂之南可汗可從刊入聲汗音寒為開府儀同三司梁兗二州刺史長知兩翻光雖貴極人臣性節儉不好聲色好呼到翻罕接賓客杜絶饋餉不貪權勢每朝廷會議常獨後言言輒合理或有表疏令人執筆口占之務從省實語省而事實營舍未定終不入幕或竟日不坐身不脫介胄常為士卒先士卒有罪唯大杖撾背撾側瓜翻未嘗妄殺衆皆爭為之死為于偽翻自結髮從軍未嘗敗北深為鄰敵所憚周勳州刺史韋孝寬高歡宇文泰兵爭泰使韋孝寬守玉壁歡盡力攻之不克而歸遂死宇文氏於此立勳州以旌其功其地在隋絳郡稷山縣百升飛上天明月照長安上時掌翻又曰高山不推自崩推吐雷翻槲木不扶自舉令諜人傳之於鄴諜達協翻鄴中小兒歌之於路珽因續之曰盲老公背受大斧饒舌老母不得語珽屯鼎翻今人猶謂多口為饒舌使其妻兄鄭道蓋奏之帝以問珽珽與陸令萱皆曰實聞有之珽因解之曰百升者斛也盲老公謂臣也與國同憂饒舌老母似謂女侍中陸氏也且斛律纍世大將明月聲震關西豐樂威行突厥斛律光字明月羡字豐樂將即亮翻樂音洛男尚公主謠言甚可畏也帝以問韓長鸞長鸞以為不可事遂寢珽又見帝請間間古莧翻又音如字唯何洪珍在側帝曰前得公啓即欲施行長鸞以為無此理珽未對洪珍進曰若本無意則可既有此意而不決行萬一泄露如何帝曰洪珍言是也然猶未決會丞相府佐封士讓密啓云光前西討還敕令散兵光引兵逼帝城將行不軌事不果而止還從宣翻又音如字令力丁翻事見上卷三年封士讓密啓亦珽等使之也家藏弩甲僮奴千數每遣使往豐樂武都所使疏吏翻下同陰謀往來若不早圖恐事不可測帝遂信之謂何洪珍曰人心亦大靈我前疑其欲反果然帝性怯恐即有變令洪珍馳召祖珽告之欲召光恐其不從命珽請遣使賜以駿馬語云使疏吏翻語牛倨翻明日將遊東山王可乘此同行光必入謝因而執之帝如其言六月戊辰光入至涼風堂劉桃枝自後撲之不仆撲弼角翻顧曰桃枝常為如此事齊自文宣以來每殺諸王大臣劉桃枝率攘臂為之故光云然桃枝與三力士以弓弦罥其頸拉而殺之罥古縣翻拉盧合翻血流於地剗之迹終不滅剗初限翻削也於是下詔稱其欲反並殺其子開府儀同三司世雄儀同三司恆伽齊制開府儀同三司從一品儀同三司第二品恆戶登翻伽求加翻祖珽使二千石郎邢祖信簿録光家齊制二千石郎掌畿外得失等事都省即尚書都省五代志後齊制録令僕射總理六尚書事謂之都省得弓十五宴射箭百刀七賜矟二明非私藏兵器矟色角翻更得何物曰得棗杖二十束擬奴僕與人鬬者不問曲直即杖之一百棗木堅而密理可以為杖乃下聲曰朝廷已加重刑郎中何宜為雪為于偽翻乃出人尤其抗直祖信慨然曰賢宰相尚死我何惜餘生齊主遣使就州斬斛律武都又遣中領軍賀拔伏恩乘驛捕斛律羡仍以洛州行臺僕射中山獨孤永業代羡與大將軍鮮于桃枝發定州騎卒續進騎奇寄翻伏恩等至幽州門者白使人衷甲使疏吏翻下同馬有汗宜閉城門羡曰敕使豈可疑拒敕使謂使者奉敕而來至唐時率以稱宦者伏恩執而殺之初羡常以盛滿為懼表解所職不許臨刑歎曰富貴如此女為皇后公主滿家常使三百兵何得不敗及其五子伏護世達世遷世辨世酋皆死酋慈由翻周主聞光死為之大赦幸其死也為于偽翻祖珽與侍中高元海共執齊政元海妻陸令萱之甥也元海數以令萱密語告珽數所角翻珽求為領軍齊主許之元海密言於帝曰孝徵漢人祖珽字孝徵豈可為領軍因言珽與廣寧王孝珩交結孝珩文襄之子齊主所忌也珩戶庚翻珽求見自辨見賢遍翻且言臣與元海素嫌必元海譖臣帝弱顏不能諱以實告之見人輒自羞而顏有怩忸者為弱顏今人猶有是言又以元海所泄密語告令萱令萱怒出元海為鄭州刺史地形志天平初置潁州治長社城武定七年改鄭州治潁陰城周滅齊改鄭州曰許州於滎陽置鄭州被皮義翻珽自是專主機衡尚書職掌機密任居銓衡後齊制尚書郎有中兵外兵各分左右左外兵掌河南及潼關已東諸州右外兵掌河北及潼關已西諸州丁帳及發召征兵等事騎奇寄翻皆得顯位帝常令中要人扶侍出入中要人宦官之親要者每同御榻論決政事委任之重㣥臣莫比太建四年秋七月遣使如周使疏吏翻下同太建四年八月庚午齊廢皇后斛律氏為庶人斛律光既死則其女廢矣湝戶皆翻又音皆馮翊王潤為太尉蘭陵王長恭為大司馬廣寧王孝珩為大將軍安德王延宗為大司徒太建四年齊使領軍封輔相聘于周相息亮翻太建四年辛未周使司城中大夫杜杲來聘宋以武公名改司空為司城侯國之卿也後周倣成周之遺制必不以諸侯之卿名官蓋髣佛周官掌固之職若欲合從圖齊從子容翻宜以樊鄧見與對曰合從圖齊豈弊邑之利必須城鎮宜待得之於齊先索漢南索山客翻使臣不敢聞命使疏吏翻太建四年初齊胡太后自愧失德胡太后失德久矣事發則見上卷上年乃飾其兄長仁之女置宮中令帝見之帝果悅納為昭儀元魏以來昭儀次於皇后位視大司馬陸令萱欲立穆夫人太后欲立胡昭儀力不能遂乃卑辭厚禮以求令萱結為姊妹令萱亦以胡昭儀寵幸方隆不得已與祖珽白帝立之戊子立皇后胡氏太建四年己丑齊以北平王仁堅為尚書令特進許季良為左僕射彭城王寶德為右僕射太建四年癸巳齊主如晉陽太建四年九月庚子朔日有食之太建四年辛亥大赦太建四年冬十月庚午周詔江陵所虜充官口者悉免為民梁元帝承聖三年江陵破士民皆為魏所虜入關太建四年辛未周遣小匠師楊協等來聘匠師大司空之屬也杜佑通典周小匠師下大夫屬冬官四命又有上士三命協音協太建四年周綏德公陸通卒綏德縣公也西魏於綏州上縣置綏德縣卒子恤翻太建四年乙酉上享太廟五代志陳立七廟一歲五祠春夏秋冬臘也每祭共以一太牢始祖以三牲首餘惟骨體而已太建四年齊陸令萱欲立穆昭儀為皇后私謂齊主曰豈有男為皇太子而身為婢妾者胡后有寵於帝不可離間間古莧翻令萱乃使人行厭蠱之術厭一琰翻旬朔之間胡后精神恍惚恍呼廣翻惚音忽言笑無恆帝漸畏而惡之恆戶登翻惡烏路翻令萱一旦忽以皇后服御衣被昭儀衣於既翻被皮義翻又別造寶帳爰及枕席器玩莫非珍奇坐昭儀於帳中謂帝曰有一聖女出將大家看之及見昭儀令萱乃曰如此人不作皇后遣何物人作帝納其言甲午立穆氏為右皇后以胡氏為左皇后太建四年十一月庚戌周主行如羌橋羌橋在長安東以苻姚諸羌而得名頒賜有差乙卯還宮以趙公招為大司馬壬申周主如斜谷斜音耶又似嗟翻谷音欲又古祿翻集長安已西都章十二行本都上有諸軍二字乙十一行本同孔本同督已上頒賜有差丙戌還宮太建四年庚寅周主遊道會苑以上善殿壯麗焚之太建四年十二月辛巳周主祀南郊五代志曰後周憲章姬周祭祀之式多依儀禮南郊為方壇於國南五里其崇一丈二尺其廣四丈其壝方百二十步內壝半之祭以正月上辛以始祖獻侯莫那配所感帝靈威仰於其上太建四年齊胡后之立非陸令萱意令萱一旦於太后前作色而言曰何物親姪作如此語太后問其故令萱曰不可道固問之乃曰語大家云語大牛倨翻太后行多非法不可以訓行下孟翻太后大怒呼后出立剃其髮送還家剃他計翻辛丑廢胡后為庶人然齊主猶思之每致物以通意自是令萱與其子侍中穆提婆勢傾內外賣官鬻獄聚斂無厭斂力贍翻厭一鹽翻每一賜與動傾府藏藏徂浪翻令萱則自太后以下皆受其指麾提婆則唐雍之徒皆重足屏氣重直龍翻屏必郢翻殺生豫奪唯意所欲太建四年乙巳周以柱國田弘為大司空太建四年乙卯周主享太廟五代志後周思復古之道右宗廟而左社稷置太祖之廟並高祖已下二昭二穆凡五親盡則遷其有德者謂之祧廟亦不毀太建四年是歲突厥木杆可汗卒復捨其子大邏便而立其弟是為他鉢可汗他鉢以攝圖為爾伏可汗統其東面又以其弟褥但可汗之子為步離可汗居西面厥九勿翻梁世祖承聖二年突厥土門可汗卒捨其子攝圖立其弟俟斗斤稱為木杆可汗褥但既他鉢之弟蓋小可汗也杆古按翻可從刊入聲汗音寒卒子恤翻復扶又翻他徒何翻周人與之和親歲給繒絮錦綵十萬段繒慈陵翻突厥在長安者衣錦食肉常以千數衣於既翻齊人亦畏其為寇爭厚賂之他鉢益驕謂其下曰但使我在南兩兒常孝何憂於貧在南兩兒謂爾伏步離二人所部分西北皆南近中國阿史那后無寵於周主考異曰周書曰后有姿貌善容止周帝甚敬焉按房玄齡唐高祖實録云武帝納突厥女陋而無寵太穆皇后勸帝強撫慰之今從之神武郡公拓跋魏置神武郡於尖山密言於帝曰今齊陳鼎峙齊陳及周三國鼎峙願舅抑情慰撫以生民為念帝深納之此女後適李淵是為唐高祖竇皇后五年五年春正月癸酉以吏部尚書沈君理為右僕射五年戊寅齊以並省尚書令高阿那肱録尚書事總知外兵及內省機密與侍中城陽王穆提婆領軍大將軍昌黎王韓長鸞共處衡軸處昌呂翻車軛曰衡持輪者曰軸車非二者不行故以為喻號曰三貴蠹國害民日月滋甚滋益也長鸞弟萬歲子寶行寶信並開府儀同三司萬歲仍兼侍中寶行寶信皆尚公主每㣥臣旦參參朝參也出後方引奏事官若不視事內省有急奏事皆附長鸞奏聞軍國要密無不經手尤疾士人朝夕宴私唯事譖訴常帶刀走馬未嘗安行瞋目張拳瞋昌真翻有噉人之勢朝士咨事莫敢仰視動致呵叱每罵云漢狗大不可耐唯須殺之呵虎何翻叱昌栗翻耐奴代翻五年庚辰齊遣崔象來聘五年辛巳上祀南郊甲午享太廟二月辛丑祀明堂五年乙巳齊立右皇后穆氏為皇后穆后母名輕霄本穆氏之婢也面有黥字北史輕霄本穆子倫婢轉入宋欽道家欽道之婦妬輕霄黥其面為宋字姦私而生此女莫知其姓穆提婆為外家號令萱曰太姬太姬者齊皇后母號也視一品班在長公主上長知兩翻由是不復問輕霄復扶又翻輕霄自療面欲求見后太姬使禁掌之竟不得見齊主頗好文學好呼到翻丙午祖珽奏置文林館多引文學之士以充之謂之待詔以中書侍郎博陵李德林黃門侍郎琅邪顏之推同判館事又命共撰修文殿御覽齊大統中毀東宮起修文等殿撰士免翻五年甲寅周太子贇巡省西土省悉景翻五年乙卯齊以北平王堅録尚書事按上年秋八月齊以北平王仁堅録尚書事此恐逸仁字丁巳齊主如晉陽五年壬戌周遣司會侯莫陳凱等聘於齊周官司會屬冢宰鄭玄曰會大計也司會主天下之大計計官之長若今尚書後周司會屬天官中大夫也會工外翻五年庚辰齊主還鄴五年三月己卯周太子於岐州獲二白鹿以獻因巡省而獲白鹿在德不在瑞五年帝謀伐齊公卿各有異同唯鎮前將軍吳明徹決策請行梁武帝置八鎮將軍東西南北止施在外左右前後止施在內朕意已決卿可共舉元帥帥所類翻衆議以中權將軍淳于量位重共署推之梁置四中將軍與八鎮將軍同擬官品第二然四中班四征之上八鎮班四征之下故以量位為重吳明徹家在淮左吳明徹秦郡人將略人才當今亦無過者將即亮翻下同都官尚書河東裴忌曰臣同徐僕射陵應聲曰非但明徹良將裴忌即良副也壬午分命衆軍以明徹都督征討諸軍事忌監軍事將即亮翻監工銜翻統衆十萬伐齊明徹出秦郡都督黃法出歷陽巨俱翻五年夏四月己亥周主享太廟五年癸卯前巴州刺史魯廣達與齊師戰于大峴破之梁置巴州於巴陵此大峴在合肥之南歷陽之北峴戶典翻五年戊申齊以蘭陵王長恭為太保南陽王綽為大司馬安德王延宗為太尉武興王普為司徒開府儀同三司宜陽王趙彥深為司空五年齊人於秦郡置秦州州前江浦通塗水今真州閘即其地塗讀曰滁辛亥吳明徹遣豫章內史程文季將驍勇拔其柵克之將即亮翻又音如字領也驍堅堯翻文季靈洗之子也梁陳之間程靈洗以勇鳴齊人議禦陳師開府儀同三司王紘曰官軍比屢失利人情騷動考之史比年以來齊師未嘗失利蓋爭宜陽汾北周齊更勝迭負周師雖退齊師亦疲也比毗至翻恐北狄西寇乘弊而來章十二行本來下有則世事去矣五字乙十一行本同孔本同張校同復扶又翻北狄謂突厥西寇謂周莫若薄賦省徭息民養士使朝廷輯睦遐邇歸心天下皆當肅清豈直陳氏而已不從遣軍救歷陽考異曰陳書帝紀云齊遣兵十萬救歷陽黃法傳云步騎五萬援歷陽蕭摩訶傳云尉破胡等帥衆十萬來援按源文宗之語恐無此數今不取庚申黃法擊破之又遣開府儀同三司尉破胡長孫洪略救秦州尉紆勿翻趙彥深私問計於祕書監源文宗曰吳賊侏張遂至於此侏舊音張流切蓋因書譸張為幻爾雅譸作侜遂有此音按類篇侏音張流切其義華也書所謂侜張其義誕也以文理求之皆於此不近姑闕之以待知者弟往為秦涇刺史齊置秦州於秦郡涇州於石梁今何術以禦之文宗曰朝廷精兵必不肯多付諸將將即亮翻數千已下適足為吳人之餌尉破胡人品王之所知彥深封宜陽王故稱之匪朝伊夕國家待遇淮南失之同於蒿箭唐高祖遺李密徇山東廷臣多諫帝曰如以蒿箭射蒿中耳言不足惜也乃知此語之來久矣不過專委王琳招募淮南三四萬人風俗相通能得死力兼令舊將將兵屯於淮北章十二行本北下有足以固守四字乙十一行本同孔本同張校同將即亮翻且琳之於頊必不肯北面事之明矣竊謂此計之上者若不推赤心於琳更遣餘人掣肘宓子賤為單父宰言於魯君請與二吏俱至邑使二吏書而掣其肘書不工輒怒之吏不能堪歸以告魯君魯君曰是慮我掣其肘耳宓賤是以能為單父後之言掣肘者本此掣昌列翻彌不可為是役卒如文宗之言復扶又翻弟此策誠足制勝千里但口舌爭之十日已不見從時事至此安可盡言因相顧流涕文宗名彪以字行子恭之子也源子恭以幹用稱於熙平永安之間文宗子師為左外兵郎中攝祠部嘗白高阿那肱龍見當雩阿那肱驚曰何處龍見其色如何師曰龍星初見禮當雩祭非真龍也阿那肱怒曰漢兒多事強知星宿遂不祭師出竊歎曰禮既廢矣齊能久乎見賢遍翻強其兩翻春秋左氏傳曰龍見而雩杜預注云龍見建巳之月蒼龍宿之體昏見東方萬物始盛待雨而大故祭天遠為百穀祈甘雨鄭玄曰雩吁嗟求雨之祭孔穎達曰天之四方皆有七宿各成一形東方成龍形西方成虎形皆南首而北尾南方成鳥形北方成龜形皆西首而東尾五代志後齊以孟夏龍見而雩祭太微五精帝於夏郊之東為圓壇於其上祈穀實以顯祖文宣帝配通鑑言國之將亡其禮先亡諸源本出於鮮卑禿髮高氏生長於鮮卑自命為鮮卑未嘗以為諱鮮卑遂自謂貴種率謂華人為漢兒率侮詬之諸源世仕魏朝貴顯習知典禮遂有雩祭之請冀以取重乃以取詬通鑑詳書之又一也因源文宗不敢盡言併及其子竊歎之事齊師選長大有膂力者為前隊又有蒼頭犀角大力其鋒甚鋭又有西域胡善射弦無虛發衆軍尤憚之辛酉戰于呂梁呂梁在彭城疑此即石梁吳明徹謂巴山太守蕭摩訶曰若殪此胡守式又翻殪一計翻則彼軍奪氣君才不減關羽矣摩訶曰願示其狀當為公取之為于偽翻明徹乃召降人有識胡者使指示之自酌酒以飲摩訶降戶江翻飲於禁翻摩訶飲畢馳馬衝齊軍胡挺身出陳前十餘步陳讀曰陳彀弓未發摩訶遙擲銑鋧銑蘇典翻鋧他典翻類篇曰銑鋧小鑿也正中其額應手而仆中竹仲翻齊軍大力十餘人出戰摩訶又斬之於是齊軍大敗尉破胡走考異曰北齊書破胡敗在五月今從齊書破胡之出師也齊人使侍中王琳與之俱琳謂破胡曰吳兵甚鋭宜以長策制之慎勿輕鬬破胡不從而敗琳單騎僅免騎奇寄翻還至彭城齊人即使之赴壽陽召募以拒陳師復以盧潛為揚州道行臺尚書復扶又翻盧潛在壽陽與王琳不協事見一百六十八卷世祖天嘉二年甲子南譙太守徐槾克石梁城槾謨干翻五代志石梁在江都郡永福縣齊置涇州於此五月己巳瓦梁城降以五代志考之瓦梁城當在江都郡六合縣界癸酉陽平郡降以地形志考之梁置淮州治淮陰城其屬有陽平郡治陽平城其地當在淮陰城西甲戌徐槾克廬江城按地形志梁置廬江郡治潛縣潛縣今屬無為軍界徐槾之師蓋漸西向黃法緩之則又拒守法怒帥卒急攻帥讀曰率丙子克之盡殺戍卒進軍合肥合肥望旗請降法禁侵掠撫勞戍卒勞力到翻與之盟而縱之五年丁丑周以柱國侯莫陳瓊為大宗伯滎陽公司馬消難為大司寇難乃旦翻江陵總管陸騰為大司空瓊崇之弟也侯莫陳崇八柱國之一也五年己卯齊北高唐郡降五代志同安郡宿松縣梁置高唐郡降戶江翻辛巳詔南豫州刺史黃法巨俱翻徙鎮歷陽晉氏南渡豫部殲覆刺史祖約自譙城退屯壽春咸和間庾亮治蕪湖咸康間毛寶治邾城永和初趙胤鎮牛渚二年謝尚鎮蕪湖四年進壽春九年鎮歷陽十一年進馬頭寧康初桓沖戍姑孰宋永初中分淮東為南豫州治歷陽淮西為豫州泰始中淮西陷沒以揚州之淮南宣城為南豫州治宣城蕭齊治姑孰梁武佳兵治無定所侯景之亂江淮之地皆歸高齊陳治宣城今復歷陽命徙鎮焉乙酉南齊昌太守黃詠克齊昌外城五代志蘄春郡蘄春縣舊曰蘄陽梁改蘄水後齊改曰齊昌置齊昌郡守式又翻丙戌廬陵內史任忠軍于東關克其東西二城東關東西二城吳諸葛恪所築也任音壬五代志廬江郡襄安縣梁曰蘄蘄居衣翻又音其戊子又克譙郡城此地形志合州之南譙郡城也亦在蘄縣界自四月辛亥拔秦州水柵至是三十八日州城始降癸巳瓜步胡墅二城降二城皆在六合縣界臨江降戶江翻吳明徹之鄉里詔具太牢令拜祠上冢上時掌翻文武羽儀甚盛鄉人榮之五年齊自和士開用事以來政體隳紊和士開用事始一百六十九卷世祖天嘉四年隳音揮紊扶問翻頗收舉才望內外稱美珽復欲增損政務沙汰人物汰音太官號服章並依故事又欲黜諸閹豎及㣥小輩為致治之方豎臣庾翻童僕未冠者也又音樹治直之翻陸令萱穆提婆議頗同異珽乃諷御史中丞麗伯律令劾主書王子沖納賂麗姓伯律名姓苑有麗姓後齊制中書省有舍人主書各十人劾戶概翻又戶得翻欲使贓罪相及望因此並坐及令萱猶恐齊主溺於近習溺奴狄翻欲引后黨為援乃請以胡后兄君瑜為侍中中領軍又徵君瑜兄梁州刺史君璧元魏置梁州於大梁城令萱聞而懷怒百方排毀出君瑜為金紫光祿大夫解中領軍出者自內省出就朝列金紫光祿大夫本晉之左右光祿大夫假金章紫綬後遂於左右光祿大夫之下又置金紫光祿大夫而光祿大夫假銀印青綬者為銀青光祿大夫後齊制金紫光祿大夫從二品中領軍第三品君瑜既解中領軍有品秩而無職事胡后之廢頗亦由此釋王子沖不問珽日以益疏諸宦者更共譖之帝以問陸令萱令萱憫默不對憫默憂而不敢言之貌乃下牀拜曰老婢應死言其罪應死也意謂善人故舉之比來觀之比毗至翻大是姦臣人實難知老婢應死帝令韓長鸞檢按檢察也搜也校也舉也按考驗也亦舉也惡烏路翻得其詐出敕受賜等十餘事帝以嘗與之重誓故不殺解珽侍中僕射出為北徐州刺史五代志琅邪郡舊置北徐州長鸞不許遣人推出柏閣見賢遍翻推吐雷翻珽坐不肯行長鸞令牽曳而出癸巳齊以領軍穆提婆為尚書左僕射侍中中書監段孝言為右僕射孝言韶之弟也段韶歷事高氏五世著忠孝戰功為多祖珽執政引孝言為助除吏部尚書孝言凡所進擢非賄則舊求仕者或於廣會膝行跪伏公自陳請孝言顏色揚揚以為己任隨事酬許將作丞崔成忽於衆中抗言曰尚書天下尚書豈獨段家尚書也孝言無辭以應唯厲色遣下而已既而與韓長鸞共搆祖珽逐而代之五年齊蘭陵武王長恭貌美而勇以邙山之捷威名大盛考異曰北齊書長恭與周戰於邙山後主謂曰入陳太深失利悔無所及對曰家事親切不覺遂然帝嫌其稱家事遂忌之按邙山之戰在河清三年後主時年九歲尚未即位何得有此問且稱家事亦何足致忌今不取為蘭陵王入陳曲杜佑曰北齊蘭陵王長恭才武而貌美常著假面以對敵嘗擊周師金墉城下勇冠三軍齊人壯之作此舞以效其指麾擊刺之容謂之蘭陵王入陳曲及代段韶督諸軍攻定陽頗務聚斂邙山之捷見一百六十九卷世祖天嘉五年攻定陽見上卷太建三年陳讀曰陳斂力贍翻尉紆勿翻問之曰王受朝寄何得如此朝直遙翻長恭未應相願曰豈非以邙山之捷欲自穢乎長恭曰然相願曰朝廷若忌王即當用此為罪無乃避禍而更速之乎長恭涕泣前膝問計俯身而問膝前於席故曰前膝王前既有功今復告捷復扶又翻威聲太重宜屬疾在家屬之欲翻勿預時事長恭然其言未能退及江淮用兵恐復為將復扶又翻將息亮翻歎曰我去年面腫今何不發自是有疾不療齊主遣使鴆殺之療力弔翻使疏吏翻五年六月章十二行本月下有庚子二字乙十一行本同孔本同張校同郢州刺史李綜克灄口城水經注江水徑魯山南左得湖口水又東合灄口水水上承沔水於安陸縣而東徑灄陽縣北東南注于江灄書涉翻乙巳任忠克合州外城按地形志及五代志皆云合州治合肥合肥前已降黃法今任忠又克合州外城何也當考庚戌淮陽沭陽郡皆棄城走五代志梁置淮陽郡於下邳郡之淮陽縣又置潼陽郡於東海郡之沭陽縣東魏改曰沭陽郡沭食聿翻五年壬子周皇孫衍生五年齊主遊南苑從官賜死者六十人史言齊主淫刑以逞從才用翻五年癸丑程文季攻齊涇州拔之按齊涇州治石梁是年四月徐槾已克石梁城乙卯宣毅司馬湛陀克新蔡城梁置鎮兵翊師宣惠宣毅四將軍代舊四中郎將蓋皆有長史司馬湛姓陀名後漢有大司農湛重五代志廬江郡淠水縣弋陽郡定城縣殷城縣皆有梁所置新蔡郡又固始縣有後齊所置新蔡郡未知孰是湛徒減翻陀徒何翻五年丙辰齊使開府儀同三司王紘聘於周五年癸亥黃法克合州以此觀之則前請降者合肥戍卒也巨俱翻地形志梁置仁州治赤坎城蓋在山陽縣界甲子克之五年治明堂五代志陳制明堂殿屋十二間中央六間安六座四方帝各依其方黃帝居坤維治直之翻五年秋七月戊辰齊遣尚書左丞陸騫將兵二萬救齊昌出自巴蘄出自巴水蘄水之間也將即亮翻蘄音機又音祁西陽郡在黃岡縣界炅枯迥翻又古惠翻設疑兵以當之身帥精鋭由間道邀其後大破之羸倫為翻帥讀曰率間古莧翻己巳征北大將軍吳明徹軍至峽口克其北岸城南岸守者棄城走峽口峽石口也夾岸築兩城以扼淮流吳明徹以功進律自從二品升第二品後齊置巴州於黃岡並殺其戍主以城降絳城蓋虹縣城音同而字異耳五代志彭城郡穀陽縣後齊置穀陽郡齊巴陵王王琳與揚州刺史王貴顯保壽陽外郭吳明徹以琳初入衆心未固丙戌乘夜攻之城潰齊兵退據相國城及金城二城皆在壽陽城中相國城劉裕伐長安所築故名金城壽陽中城也自晉以來率謂中城為金城八月乙未山陽城降五代志江都郡山陽縣舊置山陽郡壬寅盱眙城降盱眙縣亦屬江都舊置盱眙郡盱眙音吁怡壬子戎昭將軍徐敬辨克海安城陳制戎昭將軍品第八秩六百石海安城在海陵縣東今為海安鎮東海郡梁置南北二青州今胊山縣戊午平固侯敬泰等克晉州平固縣沈約志屬南康郡吳立曰平陽晉武帝太康元年更名五代志同安郡梁置晉州因晉熙以為名甲子陽平城降五代志江都郡安宜縣梁置陽平郡壬申高陽太守沈善慶克馬頭城五代志鍾離郡塗山縣古當塗也後齊置馬頭郡甲戌齊安城降五代志永安郡黃岡縣後齊置齊安郡丙子左衛將軍樊毅克廣陵楚子城此廣陵非江都之廣陵按魏太和中蠻帥田益宗納土於魏魏為立東豫州治廣陵城五代志汝南郡新息縣魏置東豫州則此廣陵乃新息之廣陵也又梁武帝置楚州於汝南郡之城陽縣治楚城即楚子城也水經淮水先過城陽縣而後過新息縣則知廣陵城與楚子城相近五年壬午周太子贇納楊氏大將軍隨公堅之女也為楊堅由后父而篡周張本太子好昵近小人好呼到翻昵尼質翻近其靳翻左宮正宇文孝伯言於周主曰皇太子四海所屬屬之欲翻而德聲未聞臣忝宮官實當其責且春秋尚少少詩照翻志業未成請妙選正人為其師友調護聖質猶望日就月將就從也將行也從事於學將以行之也鄭玄曰日就月將言當習之以積悔無及矣帝斂容曰卿世載鯁直鯁古杏翻毛晃曰鯁魚骨又骨不下咽世謂謇諤者為骨鯁謂直言難受如骨之咈咽也竭誠所事觀卿此言有家風矣孝伯拜謝曰非言之難受之難也帝曰正人豈復過卿復扶又翻於是以尉遲運為右宮正運迥之弟子也尉紆勿翻帝嘗問萬年縣丞南陽樂運曰卿言太子何如人對曰中人帝顧謂齊公憲曰百官佞我皆稱太子聰明睿智唯運所言忠直耳因問運中人之狀對曰如齊桓公是也管仲相之則霸豎貂輔之則亂相息亮翻可與為善可與為惡帝曰我知之矣乃妙選宮官以輔之仍擢運為京兆丞由赤縣丞擢京郡丞意甚不悅五年癸未沈君理卒卒子恤翻五年壬辰晦前鄱陽內史魯天念克黃城地形志譙州下蔡郡有黃城縣按東魏置譙州於渦陽則黃城亦其屬縣也蓋下蔡在淮北而黃城在壽陽西水經注柴水東徑黃城西故弋陽縣也城內二城西即黃城也柴水東北入于淮謂之淮口章十二行本甲上有冬十月三字乙十一行本同孔本同午郭默城降晉氏不競劉石強盛郭默轉徙而南築城以自保故有其名五年己亥以特進領國子祭酒周弘正為尚書右僕射五年齊國子祭酒張雕以經授齊主為侍讀帝甚重之雕與寵胡何洪珍相結穆提婆韓長鸞等惡之惡烏路翻洪珍薦雕為侍中加開府儀同三司奏度支事度徒洛翻後齊六尚書度支其一也統度支倉部左戶右戶金部庫部六曹凡度支事雕以奏聞大為帝所委信常呼博士雕自以出於微賤致位大臣欲立效以報恩論議抑揚無所回避省宮掖不急之費禁約左右驕縱之臣數譏切寵要獻替帷幄數所角翻帝亦深倚仗之雕遂以澄清為己任意氣甚高貴幸皆側目章十二行本目下有陰謀陷之四字乙十一行本同孔本同張校同尚書左丞封孝琰隆之之弟子封隆之高氏起兵佐命之臣皆為祖珽所厚孝琰嘗謂珽曰公是衣冠宰相異於餘人近習聞之大以為恨會齊主將如晉陽季舒與張雕議以為壽陽被圍被皮義翻大軍出拒之信使往還使疏吏翻須稟節度且道路小人或相驚恐以為大駕向並州畏避南寇若不啓諫恐人情駭動遂與從駕文官連名進諫從才用翻時貴臣趙彥深唐雍段孝言等意有異同季舒與爭未決長鸞遽言於帝曰諸漢官連名總署聲云諫幸並州其實未必不反宜加誅戮辛丑齊主悉召已署名者集含章殿斬季舒雕孝琰及散騎常侍劉逖黃門侍郎裴澤郭遵於殿庭家屬皆徙北邊婦女配奚官幼男下蠶室下戶嫁翻沒入資産癸卯遂如晉陽五年吳明徹攻壽陽堰肥水以灌城按水經注肥水過壽陽城而入淮然引流入城交絡城中吳明徹堰之以灌城其勢順易泄私列翻死者什六七齊行臺右僕射琅邪皮景和等救壽陽琅邪之下疑脫王字怯懦不敢前屯於淮口淮口蓋即潁口景和之師自潁上出至淮而屯因謂之淮口使疏吏翻下同然始渡淮然如此也如此始渡淮也去壽陽三十里頓軍不進諸將皆懼將即亮翻下同曰堅城未拔大援在近將若之何明徹曰兵貴神速而彼結營不進自挫其鋒吾知其不敢戰明矣乙巳躬擐甲胄擐音宦四面疾攻一鼓拔之生擒王琳王貴顯盧潛及扶風王可朱渾道裕尚書左丞李騊駼送建康可朱渾虜三字姓騊徒刀翻駼同都翻盡收其駝馬輜重重直用翻琳體貌間雅喜怒不形於色強記內敏軍府佐吏千數皆能識其姓名識職吏翻刑罰不濫輕財愛士得將卒心雖失地流寓在鄴齊人皆重其忠義及被擒故麾下將卒多在明徹軍中見者皆歔欷不能仰視爭為之請命將即亮翻被皮義翻歔音虛欷音希又許既翻為于偽翻及致資給明徹恐其為變遣使追斬之於壽陽東二十里使疏吏翻哭者聲如雷有一叟以酒脯來祭哭盡哀收其血而去田夫野老知與不知聞者莫不流涕齊穆提婆韓長鸞聞壽陽陷握槊不輟曰本是彼物從其取去南北兵爭壽陽本屬江南故云然史言齊之君臣以樂慆憂頗以為憂提婆等曰假使國家盡失黃河以南猶可作一龜茲國龜茲音丘慈唐人又讀為屈隹更可憐人生如寄唯當行樂樂音洛何用愁為左右嬖臣因共贊和之嬖卑義翻又匹計翻和戶臥翻帝即大喜酣飲鼓舞酣戶甘翻仍使於黎陽臨河築城戍懼陳兵之來真欲畫河自保丁未齊遣兵萬人至潁口潁水入淮之口辛亥遣兵援蒼陵又破之地形志揚州淮南郡壽春縣故楚有蒼陵城水經注淮水東流與潁口會東南徑蒼陵北又東北流徑壽春縣故城西賞之除尚書令還從宣翻又音如字丙辰詔以壽陽復為豫州復宋齊之舊也以明徹為都督豫合等六州諸軍事車騎大將軍豫州刺史遣謁者蕭淳風就壽陽册命騎奇寄翻陳依梁制謁者僕射秩千石於城南設壇士卒二十萬陳旗鼓戈甲明徹登壇拜受成禮而退將卒榮之上置酒舉杯屬徐陵曰賞卿知人將即亮翻屬之欲翻陵避席曰定策聖衷非臣力也以黃法為征西大將軍合州刺史巨俱翻戊午湛陀克齊昌城十一月甲戌淮陰城降五代志江都郡山陽縣有淮陰郡降戶江翻庚辰威虜將軍劉桃枝克胊山城陳制威虜將軍品第八秩六百石此劉桃枝自是陳將非齊之劉桃枝五代志東海郡有胊山縣胊音劬辛巳樊毅克濟陰城五代志鍾離郡化明縣故曰睢陵置濟陰郡濟子禮翻己丑魯廣達攻濟南徐州克之濟當作齊書齊南徐以別京口之南徐以五代史考之齊之南徐州本置於下邳郡宿豫縣詳又注於考異之下鎮其地考異曰陳書帝紀及廣達傳皆云北徐州按北齊書祖珽傳珽保全北徐州城不陷蓋南人謂京口為南徐州故謂此為北徐州其實乃北齊之南徐州也按此所謂齊南徐州乃舊琅邪郡宋泰始初琅邪沒魏莊帝永安二年置北徐州於琅邪時齊以祖珽為北徐州鎮琅邪魏收地形志太和中立北徐州於宿豫蕭衍置北徐州於鍾離南北兵爭疆場之間一彼一此各立州郡當隨其所立州名書之恐不可以齊之北徐州為齊南徐州也齊北徐州民多起兵以應陳逼其州城按五代志齊置北徐州於琅邪禁人不得出衢路爾雅四達謂之衢珽他鼎翻反者不測其故疑人走城空不設備珽忽令鼓譟震天反者皆驚走既而復結陳向城復扶又翻陳讀曰陳珽令録事參軍王君植將兵拒之自乘馬臨陳左右射射食亦翻反者先聞其盲謂其必不能出忽見之大驚穆提婆欲令城陷不遣援兵珽且戰且守十餘日反者竟散走詔懸王琳首於建康市故吏梁驃騎倉曹參軍朱瑒梁制將軍府有功曹倉曹中兵外兵騎兵長流城局等參軍驃匹妙翻騎奇寄翻瑒雉杏翻又音暢曰竊以典午將滅徐廣為晉家遺老典司也午屬馬故謂司馬為典午徐廣事見一百十九卷宋高祖永初元年馬孚稱魏室忠臣當塗高者魏也司馬孚事見七十九卷晉世祖泰始元年當離亂之辰總方伯之任天厭梁德尚思匡繼徒蘊包胥之志左傳吳破楚入郢申包胥赴秦請救以秦師破吳而復楚周靈王即位諸侯不朝萇弘乃明鬼神事設射諸侯之不來者欲依怪物以致諸侯諸侯不從而周室愈微後二世至敬王晉人殺萇弘頭行千里伏惟聖恩博厚明詔爰發赦王經之哭按魏元帝景元元年司馬昭弒高貴鄉公併收王經其吏向雄抱經哭於東市昭赦雄漢高帝葬田橫事見十一卷五年唯傳報葛之人魏高貴卿公甘露三年司馬昭破壽春諸葛誕麾下不降而死事見七十七卷獨有悲田之客即田橫事為于偽翻十二月壬辰朔並熊曇朗等首皆還其親屬熊曇朗誅見一百六十八卷世祖天嘉元年義故會葬者數千人瑒間道奔齊義故故舊以義結者瘞於計翻間古莧翻尋有壽陽人茅智勝等五人密送其柩於鄴柩音舊齊贈琳開府儀同三司録尚書事諡曰忠武王給轀輬車以葬之自秦漢以來天子葬用轀輬車轀音溫輬音涼五年癸巳周主集㣥臣及沙門道士帝自升高坐辨三教先後坐徂臥翻以儒為先道為次釋為後五年乙未譙城降五代志譙郡山桑縣梁置渦州東魏改曰譙州降戶江翻五年乙巳立皇子叔明為宜都王叔獻為河東王五年壬午任忠克霍州五代志廬江郡霍山縣梁置霍州任音壬按五代志西魏置安州於安陸梁陳無安州隋書周法尚傳炅為定州刺史或者安字其定字之誤歟朝直遙翻梁定州刺史田龍升以城降定州梁置治蒙蘢城水經注舉水出龜頭山西北流徑蒙蘢城南梁定州治五代志永安郡麻城縣陳置定州及炅入朝龍升以江北六州七鎮叛入于齊齊遣歷陽王景安將兵應之詔以炅為江北道大都督總衆軍以討龍升斬之景安退走盡復江北之地五年是歲突厥求婚於齊六年六年春正月壬戌朔周齊公憲等七人進爵為王六年己巳周主享太廟乙亥耕藉田藉秦昔翻六年壬子章十二行本子作午乙十一行本同張校同上享太廟六年甲申廣陵金城降去年九月樊毅克廣陵楚子城其金城至是始降降戶江翻六年二月壬午章孔本午作辰張校同朔日有食之六年乙未齊主還鄴去年十月如晉陽至是始還六年丁酉周紀國公賢等六人進爵為王六年辛亥上耕藉田梁初依宋齊以正月用事天監十二年武帝以為啓蟄而耕書云以殷仲春藉田理在建卯於是改用二月陳因而不改藉而亦翻六年齊朔州行臺南安王思好本高氏養子驍勇得邊鎮人心驍堅堯翻齊主使嬖臣斫骨光辨至州斫骨虜復姓嬖卑義翻又博計翻思好怒遂反云欲入除君側之惡進軍至陽曲五代志太原郡汾陽縣舊曰陽曲武衛將軍趙海在晉陽章十二行本陽下有掌兵二字乙十一行本同孔本同張校同蒼猝不暇奏矯詔發兵拒之帝聞變使尚書令唐雍等馳之晉陽之往也辛丑帝勒兵繼進未至思好軍敗投水死其麾下二千人劉桃枝圍之且殺且招終不降以至於盡先是有人告思好謀反降戶江翻先悉薦翻韓長鸞女適思好子奏言是人誣告貴臣不殺無以息後乃斬之思好既誅告者弟伏闕下求贈官長鸞不為通通鑑言齊嬖幸壅蔽之禍為于偽翻丁未齊主還鄴甲寅以唐雍為録尚書事六年乙卯周主如雲陽宮六年丙辰周大赦六年庚申周叱奴太后有疾叱奴虜復姓辛酉周主還長安癸酉太后殂帝居倚廬陸德明曰廬倚東牆而為之故曰倚廬考異曰隋書張衡傳云武帝居憂與左右出獵衡露髮輿襯切諫按帝居喪有禮疑衡自敘之妄鄭玄曰二十兩為溢於粟米之法一溢為米一升二十四分升之一溢音逸纍旬乃止命太子總釐庶政釐治也衛王直譖齊王憲於帝曰憲飲酒食肉無異平日帝曰吾與齊王異生異生謂異母也特以吾故同袒括髮袒者肉袒括者結也杜預曰以麻約髮何論得失汝親太后之子特承慈愛但當自勉無論他人六年夏四月乙卯齊遣侍中薛孤康買弔於周薛孤虜復姓初齊世祖為胡后造珠裙袴為于偽翻下同所費不可勝計勝音升為火所焚至是齊主復為穆后營之復扶又翻使商胡齎錦綵三萬與弔使偕往市珠使疏吏翻周人不與齊主竟自造之及穆后愛衰其侍婢馮小憐大幸拜為淑與齊主坐則同席出則並馬誓同生死六年五月庚申周葬文宣皇后於永固陵周主跣行至陵所辛酉詔曰三年之喪達於天子但軍國務重須自聽朝衰麻之節苫廬之禮率遵前典喪服小記斬衰括髮以麻寢苫居廬朝直遙翻衰七回翻苫息廉翻詩父兮生我母兮鞠我欲報之德昊天罔極既葬而除除服也帝不許卒申三年之制卒子恤翻五服之內亦令依禮五服者斬衰三年服齊衰期年服大功九月服小功五月服緦麻三月服六年庚午齊大赦六年齊人恐陳師渡淮使皮景和屯西兗州以備之西兗州治定陶六年丙子周禁佛道二教經像悉毀經謂二教之書像謂佛像天尊像並令還俗並禁諸淫祀非祀典所載者盡除之六年六月壬辰周弘正卒卒子恤翻六年壬子周更鑄五行大布錢一當十與布泉並行行布泉見一百六十八卷世祖天嘉元年更工衡翻六年戊午周立通道觀以一聖賢之教觀古玩翻六年秋七月庚申周主如雲陽以右宮正尉遲運兼司武左傳宋平公曰司武而梏于朝杜預注司武司馬周建六官已有大司馬司武蓋其屬也尉紆勿翻長知兩翻初帝取衛王直第為東宮建德元年立太子始建東宮直歷觀府署無如意者末取廢陟屺寺欲居之陟屺寺取望母為名直意欲以同母感動周主弟子孫多此無乃褊小屺墟里翻褊補辨翻直曰一身尚不自容何論子孫直嘗從帝校獵而亂行帝對衆撻之直積怨憤因帝在外遂作亂乙酉帥其黨襲肅章門肅章宮門名唐長安太極宮太極殿後兩儀殿前中為朱明門東則虔化門西則肅章門蓋周遺制帥讀曰率奔詣帝所尉遲運偶在門中直兵奄至手自闔門直黨與運爭門斫傷運指僅而得閉直不得入縱火焚門運恐火盡直黨得進取宮中材木及牀榻以益火膏油灌之火轉熾久之直不得進乃退運帥留守兵因其退而擊之帥讀曰率下同直大敗帥百餘騎奔荊州欲就梁騎奇寄翻戊子帝還長安八月辛卯擒直廢為庶人囚於別宮尋殺之以尉遲運為大將軍賜賚甚厚丙申周主復如雲陽復扶又翻六年癸丑齊主如晉陽甲辰寅齊以高勱為尚書右僕射勱音邁六年九月庚申周主如同州六年冬十月丙申周遣御正弘農楊尚希禮部盧愷來聘武成元年增御正四人位上大夫保定四年又改禮部為司宗大司禮為禮部杜佑曰周制禮部中大夫屬春官柔之子也盧柔仕魏為中書監六年甲寅周主如蒲州丙辰如同州十一月甲戌還長安六年十二月戊戌以吏部尚書王瑒為右僕射度支尚書孔奐為吏部尚書瑒沖之子也瑒雉杏翻又音暢度徒洛翻時新復淮泗攻戰降附功賞紛紜攻戰敘其功降附敘其賞降戶江翻不受請託事無凝滯人皆悅服湘州刺史始興王叔陵屢諷有司求為三公奐曰袞章之職本以德舉三公一命袞命服身之章也因以白帝帝曰始興那忽望公且朕兒為公須在鄱陽王後言世祖之子當先為公臣之所見亦如聖旨六年齊定州刺史南陽王綽喜為殘虐此定州治中山喜許既翻見婦人抱兒奪以飼狗婦人號哭飼祥吏翻號戶刀翻綽怒以兒血塗婦人縱狗使食之常云我學文宣伯之為人齊主聞之鎖詣行在至而宥之問在州何事最樂樂音洛下同對曰多聚蠍於器置狙其中觀之極樂帝即命夜索蠍一斗比曉得三二升置浴斛使人裸臥斛中號叫宛轉帝與綽臨觀喜噱不已蠍許竭翻螫人蟲渡淮以北即有之通俗文長尾曰蠆短尾曰蠍索山客翻比必寐翻及也浴斛浴器也裸郎果翻赤體也號戶刀翻噱其虐翻嗢噱笑不止因讓綽曰如此樂事何不馳驛奏聞樂音洛由是有寵拜大將軍朝夕同戲韓長鸞疾之是歲出為齊州刺史將發使人誣告其反奏云此犯國法不可赦帝不忍明誅使寵胡何猥薩與之手搏扼而殺之薩桑割翻扼於革翻章錫琛標點容肇祖聶崇岐覆校
