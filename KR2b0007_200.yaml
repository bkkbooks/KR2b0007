body:
  text: 資治通鑑卷第二百端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀十六高宗天皇大聖大弘孝皇帝上之下永徽六年永徽六年乙卯六五五永徽六年冬十月己酉下詔稱王皇后蕭淑謀行鴆毒廢為庶人母及兄弟並除名流嶺南許敬宗奏故特進贈司空王仁祐告身尚存使逆亂餘孽猶得為蔭唐制凡受官者皆給以符謂之告身司空正一品凡三品以上蔭及曾孫從之乙卯百官上表請立中宮上時掌翻下同乃下詔曰武氏門著勳庸地華纓黻往以才行選入後庭行下孟翻譽重椒闈德光蘭掖朕昔在儲二特荷先慈常得侍從弗離朝夕荷下可翻從才用翻離力智翻宮壼之內恆自飭躬恆戶登翻嬪嬙之間未嘗忤目嬙慈良翻婦官也忤五故翻逆而視之謂之忤目聖情鑒悉每垂賞歎遂以武氏賜朕事同政君政君事見二十七卷漢宣帝甘露三年丁巳赦天下是日皇后上表稱陛下前以妾為宸韓瑗來濟面折庭爭事見上卷上年瑗于眷翻折之舌翻爭讀曰諍豈非深情為國為于偽翻乞加褒賞上以表示瑗等瑗等彌憂懼屢請去位上不許十一月丁卯朔臨軒命司空李績齎璽綬册皇后武氏璽斯氏翻綬音受是日百官朝皇后於肅義門故后王氏故淑蕭氏並囚於別院上嘗念之間行至其所間古莧翻見其室封閉極密惟竅壁以通食器惻然傷之呼曰皇后淑安在王氏泣對曰妾等得罪為宮婢何得更有尊稱稱尺證翻又曰至尊若念疇昔使妾等再見日月乞名此院為回心院上曰朕即有處置處昌呂翻武后聞之大怒遣人杖王氏及蕭氏各一百斷去手足捉章十二行本捉作投乙十一行本同孔本同張校同酒甕中曰令二嫗骨醉斷丁管翻去羌呂翻嫗威遇翻數日而死又斬之王氏初聞宣敕再拜曰願大家萬歲昭儀承恩死自吾分淑罵曰阿武妖猾乃至於此願他生我為貓阿武為鼠生生扼其喉由是宮中不畜貓分扶問翻妖於喬翻畜吁玉翻尋又改王氏姓為蟒氏蟒莫朗翻蛇最大者曰蟒蕭氏為梟氏梟古堯翻武后數見王蕭為祟被髮瀝血如死時狀後徙居蓬萊宮復見之數所角翻祟雖遂翻復扶又翻大明宮接西內宮城之東北曰東內本永安宮貞觀八年置九月更名大明宮以備太上皇清暑後高宗以風痹厭西內湫濕龍朔三年始大興葺曰蓬萊宮故多在洛陽終身不歸長安己巳許敬宗奏曰永徽爰始國本未生權引彗星越升明兩易離卦大象曰明兩作離大人以繼明照四方彗祥歲翻正胤降神言代王弘武后之子當立爝暉宜息崔豹古今注曰漢文帝為太子樂人歌四章以贊太子之德一曰日重光二曰月重輪三曰星重暉四曰海重潤莊子曰日月出矣而爝火不息其於光也不亦難乎重直龍翻爝即略翻久易位於天庭倒襲裳衣使違方於震位震長子也以守社稷宗廟為祭主也父子之際人所難言漢武帝語田千秋之辭必嬰嚴憲驪龍頷下有逆鱗徑尺嬰之則死諭人主之威不可犯也臣亦甘心上召見問之對曰皇太子國之本也本猶未正萬國無所係心且在東宮者所出本微今知國家已有正嫡必不自安竊位而懷自疑恐非宗廟之福願陛下熟計之上曰忠已自讓對曰能為太伯願速從之永徽六年西突厥頡苾達度設數遣使請兵討沙鉢羅可汗厥九勿翻數所角翻使疏吏翻可從刊入聲汗音寒甲戌遣豐州都督元禮臣册拜頡苾達度設為可汗禮臣至碎葉城自弓月城過思渾川渡伊麗河至碎葉界又西行千里至碎葉城屬焉耆都督府界不得前頡苾達度設部落多為沙鉢羅所併餘衆寡弱不為諸姓所附禮臣竟不册拜而歸永徽六年中書侍郎李義府參知政事義府容貌溫恭與人語必嬉怡微笑而狡險忌克故時人謂義府笑中有刀又以其柔而害物謂之李貓顯慶元年丙辰六五六永徽六年春正月辛未以皇太子忠為梁王梁州刺史立皇后子代王弘為皇太子生四年矣忠既廢官屬皆懼罪亡匿無敢見者右庶子李安仁獨候忠泣涕拜辭而去安仁綱之孫也李綱著節於隋唐之間永徽六年壬申赦天下改元永徽六年二月辛亥贈武士彠司徒賜爵周國公彠一虢翻永徽六年三月以度支侍郎杜正倫為黃門侍郎同三品顯慶元年改戶部為度支度徒洛翻永徽六年夏四月壬子矩州人謝無靈舉兵反矩州諸蠻亦東謝蠻之種落武德四年置矩州黔音琴永徽六年己未上謂侍臣曰朕思養人之道未得其要公等為朕陳之為于偽翻來濟對曰昔齊桓公出遊見老而飢寒者命賜之食老人曰願賜一國之飢者賜之衣曰願賜一國之寒者公曰寡人之廩府安足以周一國之飢寒老人曰君不奪農時則國人皆有餘食矣不奪蠶要則國人皆有餘衣矣故人君之養人在省其征役而已今山東役丁歲別數萬役之則人大勞取庸則人大費臣願陛下量公家所須外餘悉免之量音良上從之永徽六年六月辛亥禮官奏停太祖世祖配祀高祖受禪追尊祖虎曰景皇帝廟號太祖考昺曰元皇帝廟號世祖太宗配五帝於明堂武德初立圜丘壇於明德門外道東二里壇制四成各廣八尺一寸下成廣二十丈再成廣十五丈三成廣十丈四成廣五丈每祀則昊天上帝及配帝設位于平座藉用藳秸器用陶匏五方上帝日月內官中官外官及衆星並皆從祀其五方帝及日月七座在壇之第二等內五星已下官五十五座在壇之第三等二十八宿已下官一百三十五座在壇之第四等外官一百二十二座在壇下外壝之內衆星三百六十座在外壝之外以景帝配圜丘元帝配明堂永徽六年秋七月乙丑西洱蠻酋長楊棟附顯和蠻酋長王郎祁郎章十二行本郎作羅乙十一行本同昆梨盤四州酋長王伽衝等帥衆內附梨州本西寧州武德七年分南寧州二縣置貞觀八年更名梨州其地北接昆州晉梁水郡地也盤州本西平州武德四年置貞觀八年更名晉興古郡地也洱乃吏翻酋慈由翻帥讀曰率永徽六年癸未以中書令崔敦禮為太子少師同中書門下三品八月丙申固安昭公崔敦禮薨諡法容儀恭美曰昭昭德有勞曰昭永徽六年辛丑蔥山道行軍總管程知節擊西突厥與歌邏章十二行本邏下有祿字乙十一行本同孔本同退齋校同處月二部戰於榆慕谷處月處密姑蘇歌邏祿弩失畢五姓之衆賀魯為葉護時所統也據新書歌邏祿即葛邏祿也榆慕谷舊書本紀作榆幕谷斬首千餘級副總管周智度攻突騎施處木昆等部於咽城拔之西突厥咄陸五啜處木昆律突騎施皆一啜也據新書咽城即處木昆所居處昌呂翻永徽六年乙巳龜茲王布失畢入朝龜茲音丘慈朝直遙翻永徽六年李義府恃寵用事洛州婦人淳于氏美色繫大理獄義府屬大理寺丞畢正義枉法出之屬之欲翻將納為妾大理卿段寶玄疑而奏之上命給事中劉仁軌等鞫之義府恐事泄逼正義自縊於獄中縊於計翻上知之原義府罪不問侍御史漣水王義方欲奏彈之漣水舊曰襄賁置東海郡東魏改曰海安郡隋開皇初廢郡改襄賁曰漣水屬海州唐屬泗水漣音連義方為御史視姦臣不糾則不忠糾之則身危而憂及於親為不孝二者不能自決奈何母曰昔王陵之母殺身以成子之名事見九卷漢高帝元年吾死不恨義方乃奏義府於輦轂之下亶殺六品寺丞唐六典大理寺丞從六品上亦由畏義府威殺身以滅口如此則生殺之威不由上出漸不可長請更加勘當長知兩翻當丁浪翻於是對仗叱義府令下義府顧望不退義方三叱上既無言義府始趨出義方乃讀彈文上釋義府不問而謂義方毀辱大臣言辭不遜貶萊州司戶永徽六年九月章十二行本月下有庚辰二字乙十一行本同括州暴風海溢溺四千餘家新志處州本括州永嘉郡時兼有永嘉之地上元元年始析置溫州永徽六年冬十一月丙寅生羌酋長浪我利波等帥衆內附以其地置柘栱二州柘州蓬山郡栱州以鉢南伏浪恐部置皆屬松州都督府宋白曰柘州以開拓為稱音達各翻永徽六年十二月程知節引軍至鷹娑川遇西突厥二萬騎別部鼠尼施等二萬餘騎繼至鼠尼施咄陸五啜之一也居鷹娑川後置鷹娑都督府娑素何翻西突厥大敗追奔二十里殺獲千五百餘人獲馬及器械綿亙山野不可勝計勝音升副大總管王文度害其功言於知節曰今茲雖云破賊官軍亦有死傷乘危輕脫乃成敗之法耳何急而為此自今常結方陳置輜重在內陳讀曰陳重直用翻遇賊則戰此萬全策也又矯稱別得旨以知節恃勇輕敵委文度為之節制遂收軍不許深入士卒終日跨馬被甲結陳不勝疲頓被皮義翻下同陳讀曰陳勝音升馬多瘦死定方言於知節曰出師欲以討賊今乃自守坐自困敝若遇賊必敗懦怯如此何以立功且主上以公為大將將即亮翻豈可更遣軍副專其號令事必不然請囚文度飛表以聞知節不從至恆篤城新書作怛篤城文度曰此屬伺我旋師還復為賊伺相吏翻復扶又翻不如盡殺之取其資財定方曰如此乃自為賊耳何名伐叛文度竟殺之分其財獨定方不受師旋文度坐矯詔當死特除名知節亦坐逗遛追賊不及減死免官永徽六年是歲以太常卿駙馬都尉高履行為益州長史高履行尚太宗女東陽公主永徽六年韓瑗上疏為褚遂良訟冤曰上時掌翻為于偽翻遂良體國忘家捐身徇物風霜其操鐵石其心社稷之舊臣陛下之賢佐無聞罪狀斥去朝廷內外氓黎咸嗟舉措論語孔子曰舉直錯諸枉則民服舉枉錯諸直則民不服不貽劉毅之誅事見八十一卷太康三年無恚周昌之直注已見前恚於避翻已經寒暑違忤陛下其罰塞焉忤五故翻塞悉則翻伏願緬鑒無辜緬遠也俯矜微款以順人情上謂瑗曰遂良之情朕亦知之然其悖戾好犯上悖蒲內翻又蒲沒翻好呼到翻故以此責之卿何言之深也對曰遂良社稷忠臣為讒諛所毀昔微子去而殷國以亡殷紂暴虐日甚微子抱樂器以奔周武王乃告諸侯曰殷有重罪不可不伐遂伐紂滅之事見八十二卷至八十三卷恐非國家之福上不納瑗以言不用乞歸田里上不許永徽六年劉洎之子訟其父冤稱貞觀之末為褚遂良所譖而死事見一百九十八卷貞觀十九年洎其翼翻復扶又翻上以問近臣衆希義府之旨皆言其枉給事中長安樂彥瑋獨曰劉洎大臣人主暫有不豫豈得遽自比伊霍今雪洎之罪謂先帝用刑不當乎當丁浪翻上然其言遂寢其事二年二年春正月癸巳分哥邏祿部置陰山大漠二都督府以謀落部置陰山府以熾侯部置大漠府俱屬北庭都護府邏郎佐翻二年閏月壬寅上行幸洛陽二年庚戌以左屯衛將軍蘇定方為伊麗道行軍總管伊麗河一名帝帝河燕然都護府在黃河北北至陰山七十里至回紇界七百里去京師二千七百里龍朔三年改曰瀚海都督府總章二年改為安北大都護府杜佑曰後為中受降城南去朔方千三百餘里後魏於渭南置渭南郡隋廢為縣屬京兆帥讀曰率燕因肩翻任音壬相息亮翻自北道討西突厥沙鉢羅可汗嗣業巨之子也蕭巨見一百八十一卷隋煬帝大業六年初右衛大將軍阿史那彌射及族兄左屯衛大將軍步真皆西突厥酋長酋慈由翻長知兩翻太宗之世帥衆來降彌射室點密可汗五世孫世為莫賀咄葉護貞觀中遣使立為可汗族兄步真謀殺彌射而自立彌射不能國即入朝步真遂自立為咄陸葉護衆不厭去之因亦與族人入朝帥讀曰率降戶江翻詔以彌射步真為流沙安撫大使考異曰舊西突厥咄陸傳咄陸可汗泥熟父莫賀設貞觀七年遣鴻臚少卿劉善因册為吞阿妻狀奚利苾咄陸可汗明年泥熟卒弟同娥設立為嘻利失可汗彌射傳云彌射者室點密可汗五代孫也世統十姓部落在本蕃為莫賀咄葉護貞觀六年詔遣鴻臚少卿劉善因就蕃立為奚利邲咄陸可汗其族兄步真欲自立謀殺彌射彌射既與步真有隙以貞觀十三年率所部處月處密部落入朝其後步真遂自立為咄陸葉護部落不服步真復攜家屬入朝彌射後從太宗征高麗有功封平襄縣伯顯慶二年轉右武衛大將軍新傳略同今欲以咄陸彌射為二人則事多相類以為一人則事又相違疑不能明故但云西突厥酋長余按彌射為咄陸可汗唐所册也步真為咄陸葉護自稱也咄陸之號雖同而可汗葉護位之尊卑有異不必泥咄陸之號而傳疑而彌射步真實二人也余前注所引者新傳也其辭略考異所引者舊傳也其辭詳大略同也又參考新舊書劉善因册可汗事與通鑑有六年七年之差而新舊書可汗號有婁拔妻狀之差舊書又多一奚字而貞觀中立彌射為奚利邲咄陸可汗則新舊書同詳而考之劉善因册泥孰為奚利邲咄陸可汗明年而泥孰死弟同娥設立為沙鉢羅嘻利失可汗又三年而嘻利失不為衆所歸西部又立欲谷設為乙毗咄陸可汗二可汗兵爭嘻利失乙毗相繼走死他國而射匱實承之太宗崩賀魯反而射匱為賀魯所併西突厥世次曉然可考而新舊書於彌射傳皆云貞觀中遣劉善因立彌射為奚利邲咄陸可汗以泥孰傳觀之則善因所立者泥孰也以彌射傳觀之則善因所立者彌射也考異所疑當以此耳二年二月辛酉車駕至洛陽宮二年庚午立皇子顯為周王壬申徙雍王素節為郇王雍於用翻郇音荀二年三月甲辰以潭州都督褚遂良為桂州都督桂州至京師水陸路四千七百六十里二年癸丑以李義府兼中書令二年夏五月丙申上幸明德宮避暑上自即位每日視事庚子宰相奏天下無虞請隔日視事許之二年秋七月丁亥朔上還洛陽宮二年王玄策之破天竺也見上卷貞觀二十二年娑素何翻自言有長生之術太宗頗信之深加禮敬使合長生藥太宗令娑婆寐於金飆門合延年藥合音閣又發使詣婆羅門諸國采藥使疏吏翻其言率皆迂誕無實苟欲以延歲月藥竟不就乃放還上即位復詣長安復扶又翻又遣歸玄策時為道王友道王元慶高祖之子唐諸王府置友一人從五品下掌陪侍規諷辛亥奏言此婆羅門實能合長年藥自詭必成今遣歸可惜失之玄策退上謂侍臣曰自古安有神仙秦始皇漢武帝求之疲弊生民卒無所成卒子恤翻果有不死之人今皆安在李績對曰誠如聖言此婆羅門今茲再來容髮衰白已改於前何能長生陛下遣之內外皆喜娑婆寐竟死於長安二年許敬宗李義府希皇后旨誣奏侍中韓瑗中書令來濟與褚遂良潛謀不軌以桂州用武之地授遂良桂州都督欲以為外援八月丁卯瑗坐貶振州刺史濟貶台州刺史終身不聽朝覲台州漢回浦縣地光武改回浦為章安縣吳孫亮分會稽東部都尉為臨海郡治章安江左皆因之隋平陳廢為臨海縣屬永嘉郡唐武德四年分置台州諸州刺史有朝集故禁絶二人不得至京師振州至京師八千六百六里台州在京師東南四千一百七十七里朝直遙翻榮州刺史柳奭為象州刺史榮州至京師二千九百七十三里象州至京師四千九百八十九里考異曰唐曆三月甲辰貶遂良為桂州都督奭愛州刺史據實録奭坐韓瑗又貶象州新舊書唐曆皆云愛州誤也今從實録遂良至愛州上表自陳上時掌翻往者濮王承乾交爭之際臣不顧死亡歸心陛下時岑文本劉洎奏稱承乾惡狀已彰身在別所其於東宮不可少時虛曠少詩沼翻請且遣濮王往居東宮臣又抗言固爭皆陛下所見卒與無忌等四人共定大策事見一百九十七卷貞觀十七年卒子恤翻獨臣與無忌同受遺詔見上卷貞觀二十三年朝直遙翻不勝哀慟臣以社稷寬譬陛下手抱臣頸臣與無忌區處衆事咸無廢闕數日之間內外寧謐力小任重動罹愆過螻蟻餘齒乞陛下哀憐表奏不省勝音升處昌呂翻省悉景翻二年己巳禮官奏四郊迎氣存太微五帝之祀南郊明堂廢緯書六天之義其方丘祭地之外別有神州亦請合為一祀從之歐陽修曰禮曰以禋祀祀昊天上帝此天也鄭玄以為天皇大帝者北辰耀魄寶也又曰兆五帝於四郊此五行精氣之神也玄以為青帝靈威仰赤帝赤熛怒黃帝含樞紐白帝白招矩黑帝叶光紀者五天也由是有六天之説唐初貞觀禮冬至祀昊天上帝於圓丘正月辛日祀感生帝靈威仰於南郊以祈穀而孟夏雩於南郊季春大享於明堂皆祀五天帝至高宗時禮官以謂太史圓丘圖昊天上帝在壇上而耀魄寶在壇第一等則昊天上帝非耀魄寶可知許敬宗與禮官議曰六天出於緯書而南郊圜丘一也玄以為二物郊及明堂本以祭天而玄皆以為祭太微五帝傳曰凡祀啓蟄而郊郊而後耕故郊祀后稷以祈農事而玄謂周祭感帝靈威仰配以后稷因而祈穀皆繆説也由是盡黜玄説又武德中冬至及孟夏雩祭皇地祇於方丘神州地祇於北郊今亦合為一祀二年辛未以禮部尚書許敬宗為侍中兼度支尚書杜正倫為兼中書令二年冬十月戊戌上行幸許州許州漢潁川郡地東魏立南鄭州後周改許州因古許國以名州也至京師一千二百里至東都四百里乙巳畋于滍水之南壬子至汜水曲滍直几翻汜水曲在鄭州新鄭縣界師古曰汜舊音凡今俗讀為祀十二月乙卯朔車駕還洛陽宮二年蘇定方擊西突厥沙鉢羅可汗厥九勿翻可從刊入聲汗音寒至金山北先擊處木昆部大破之其俟斤懶獨祿等帥萬餘帳來降俟渠之翻帥讀曰率下同降戶江翻定方撫之發其千騎與俱右領軍郎將薛仁貴上言泥孰部素不伏賀魯泥孰部弩失畢五俟斤之一也騎奇寄翻下同將即亮翻下同上時掌翻虜其妻子今唐兵有破賀魯諸部得泥孰妻子者宜歸之仍加賜賚使彼明知賀魯為賊而大唐為之父母則人致其死不遺力矣上從之泥孰喜請從軍共擊賀魯定方至曳嘻河西曳嘻河在伊麗河東來拒戰咄陸五啜弩失畢五俟斤是為西突厥十姓沙鉢羅輕定方兵少直進圍之紇下沒翻少詩沼翻定方令步兵據南原攢矟外向矟色角翻自將騎兵陳於北原陳讀曰陳下布陳同沙鉢羅先攻步軍三衝不動定方引騎兵擊之沙鉢羅大敗追奔三十里斬獲數萬人明日勒兵復進復扶又翻下可復同於是胡祿屋等五弩失畢悉衆來降沙鉢羅獨與處木昆屈律啜數百騎西走降戶江翻處昌呂翻啜陟劣翻騎奇寄翻時阿史那步真出南道五咄陸部落聞沙鉢羅敗皆詣步真降定方乃命蕭嗣業回紇婆閏將胡兵趨邪羅斯川舊書賀魯居多邏斯川在西州直北一千五百里此邪羅斯川當在伊麗水之西咄當沒翻嗣祥吏翻紇下沒翻趨讀曰趣音七喻翻邪讀曰耶定方與任雅相將新附之衆繼之任音壬相息亮翻將即亮翻又音如字會大雪平地二尺軍中咸請俟晴而行定方曰虜恃雪深謂我不能進必休息士馬亟追之可及若緩之彼遁逃浸遠不可復追省日兼功在此時矣乃踏雪晝夜兼行所過收其部衆至雙河與彌射步真合去沙鉢羅所居二百里布陳長驅徑至其牙帳賀魯牙帳在金牙山直石國東北復扶又翻陳讀曰陳定方掩其不備縱兵擊之斬獲數萬人得其鼓纛纛徒到翻又徒沃翻沙鉢羅與其子嘻運壻閻啜等脫走趣石國嘻徒結翻啜陟劣翻趣七喻翻定方於是息兵諸部各歸所居通道路置郵驛掩骸骨問疾苦畫疆埸復生業凡為沙鉢羅所掠者悉括還之十姓安堵如故乃命蕭嗣業將兵追沙鉢羅定方引軍還埸音亦嗣祥吏翻還從宣翻又音如字沙鉢羅至石國西北蘇咄城咄當沒翻人馬飢乏遣人齎珍寶入城市馬城主伊沮達官沮子余翻詐以酒食出迎誘之入誘音酉閉門執之送于石國蕭嗣業至石國石國人以沙鉢羅授之乙丑分西突厥地置濛池崑陵二都護府濛池都護府居碎葉川西崑陵都護府居碎葉川東考異曰舊書賀魯傳云定方行至曳嘻河西賀魯率胡祿居闕啜等二萬餘騎列陳而待定方率任雅相等與之交戰賊衆大敗斬大首領都搭達官等二百餘人賀魯及闕啜輕騎奔竄西渡伊麗河兵馬溺死者甚衆彌射進軍至伊麗水處月處密等部各帥衆來降彌射又進次雙河賀魯先使步失達官鳩集散卒據柵拒戰彌射步真攻之大潰又與蘇定方攻賀魯於碎葉水大破之舊書本紀三年二月定方平賀魯甲寅西域平以其地置濛池崑陵二都督府據實録擒賀魯置二都督皆在此月本紀又非奏到月日今從實録押五咄陸部落阿史那步真為右衛大將軍濛池都護繼往絶可汗押五弩失畢部落遣光祿卿盧承慶持節册命仍命彌射步真與承慶據諸姓降者準其部落大小位望高下授刺史以下官二年丁卯以洛陽宮為東都唐六典洛陽宮在東都皇城之北東西四里一百八十步南北二里八十五步周回十三里二百四十一步雍於用翻二年是歲詔自今僧尼不得受父母及尊者禮拜尼女夷翻所司明有法制禁斷有當作為斷音短二年以吏部侍郎劉祥道為黃門侍郎仍知吏部選事選須絹翻下同祥道以為今選司取士傷濫每年入流之數過一千四百雜色入流曾不銓簡雜色補官者謂之流外官入流內敘品謂之入流凡萬三千四百六十五員約準三十年則萬三千餘人略盡矣即日者即今日也別彼列翻足充所須之數望有釐革既而杜正倫亦言入流人太多上命正倫與祥道詳議而大臣憚於改作事遂寢祥道林甫之子也劉林甫貞觀初為吏部侍郎請四時聽選三年三年春正月戊子長孫無忌等上所修新禮詔中外行之上時掌翻先是議者謂貞觀禮節文未備先悉薦翻故命無忌等修之時許敬宗李義府用事所損益多希旨學者非之太常博士蕭楚材等以為豫備凶事非臣子所宜言敬宗義府深然之遂焚國恤一篇由是凶禮遂闕唐制太常博士從七品上掌六禮之儀式本先王之法制適變隨時而損益焉六禮既闕凶禮遂為五禮焉三年初龜茲王布失畢妻阿史那氏與其相那利私通布失畢不能禁布失畢歸國見上卷永徽元年龜茲音丘慈又音屈佳各有黨與互來告難難乃旦翻上兩召之既至囚那利遣左領軍郎將雷文成送布失畢歸國十四衛郎將正五品上龜茲大將羯獵顛發衆拒之仍遣使降於西突厥沙鉢羅可汗使疏吏翻布失畢據城自守不敢進詔左屯衛大將軍楊胄發兵討之會布失畢病卒胄與羯獵顛戰大破之擒羯獵顛及其黨盡誅之乃以其地為龜茲都督府戊申立布失畢之子素稽為龜茲王兼都督三年二月丁巳上發東都甲戌至京師三年夏五月癸未徙安西都護府於龜茲以舊安西復為西州都督府鎮高昌故地貞觀十四年平高昌置安西都護府於交河城今徙於龜茲三年六月營州都督兼東夷都護程名振右領軍中郎將薛仁貴將兵攻高麗之赤烽鎮拔之斬首四百餘級捕虜百餘人高麗遣其大將豆方婁帥衆三萬拒之名振以契丹逆擊大破之斬首二千五百級考異曰舊書仁貴傳云顯慶二年副程名振經略遼東破高麗於貴端城斬首三千級今從實録三年秋八月甲寅播羅哀獠酋長多胡桑等帥衆內附播羅哀羅竇生獠部落之名獠魯皓翻酋慈由翻長知兩翻三年冬十月庚申吐蕃贊普來請婚三年中書令李義府有寵於上諸子孩抱者並列清貴而義府貪冒無厭冒莫北翻厭於鹽翻母妻及諸子女壻賣官鬻獄其門如市多樹朋黨傾動朝野朝直遙翻中書令杜正倫每以先進自處處昌呂翻義府恃恩不為之下由是有隙與義府訟於上前上以大臣不和兩責之十一月乙酉貶正倫橫州刺史義府普州刺史正倫尋卒於橫州橫州漢廣鬱高梁之地晉武帝太康七年置寧浦郡梁分置簡陽郡隋置簡州大業廢為寧浦縣屬鬱林郡唐武德初復置南簡州貞觀八年更名橫州至京師五千五百三十九里至東都四千七百五里普州漢牛鞞墊江資中三縣地後周置安嶽縣並置普州隋廢州以縣屬資陽郡唐武德二年復置普州至京師二千三百六十里至東都三千二百三里卒子恤翻三年阿史那賀魯既被擒謂蕭嗣業曰我本亡虜為先帝所存事見上卷貞觀二十二年被皮義翻今日之敗天所怒也吾聞中國刑人必於市願刑我於昭陵之前以謝先帝上聞而憐之賀魯至京師甲午獻于昭陵敕免其死分其種落為六都督府以處木昆部為匐延都督府突騎施索葛莫賀部為嗢鹿都督府胡祿屋闕部為鹽泊都督府攝舍提暾部為雙河都督府鼠尼施處半部為鷹娑都督府突騎施阿利施部為潔山都督府種章勇翻西盡波斯並隸安西都護府四鎮都督府州三十四西域都督府十六州七十二葬於頡利墓側三年戊戌以許敬宗為中書令大理卿辛茂將為兼侍中三年開府儀同三司鄂忠武公尉遲敬德薨尉紆勿翻敬德晚年間居學延年術修飾池臺奏清商樂以自奉養不交通賓客凡十六年年七十四以病終朝廷恩禮甚厚三年是歲愛州刺史褚遂良卒三年雍州司士許禕與來濟善唐雍州士曹司士參軍事正七品下掌津梁舟車舍宅工藝雍於用翻禕吁韋翻吏部尚書唐臨奏以禕為江南道巡察使倫為劍南道巡察使使疏吏翻是時義府雖在外皇后常保護之以臨為挾私選授四年四年春二月乙丑免臨官四年三月壬午西突厥興昔亡可汗與真珠葉護戰于雙河斬真珠葉護真珠葉護事始上卷永徽四年四年夏四月丙辰以于志寧為太子太師同中書門下三品乙丑以黃門侍郎許圉師參知政事考異曰舊傳云二年同中書門下三品新傳無年今從實録按考異所謂舊傳新傳皆許圉師傳也四年武后以太尉趙公長孫無忌受重賜而不助己事見上卷永徽五年及議廢王后燕公于志寧中立不言事見上卷永徽六年燕因肩翻許敬宗屢以利害説無忌無忌每面折之敬宗亦怨説輸芮翻折之舌翻武后既立無忌內不自安后令敬宗伺其隙而陷之伺相吏翻會洛陽人李奉節告太子洗馬韋季方監察御史李巢朋黨事洗悉薦翻監古銜翻敕敬宗與辛茂將鞫之敬宗按之急季方自刺不死刺七亦翻敬宗因誣奏季方欲與無忌構陷忠臣近戚使權歸無忌伺隙謀反今事覺故自殺上驚曰豈有此邪舅為小人所間間古莧翻小生疑阻則有之何至於反敬宗曰臣始末推究反狀已露陛下猶以為疑恐非社稷之福考異曰實録洛陽人李奉節上封事告太子洗馬韋季方監察御史李巢交通朝貴有朋黨之事詔敬宗與侍中辛茂將鞫之敬宗按之甚急季方事迫自刺不死又搜奉節得私書有題與趙師者遂奏言趙師即無忌也陰為隱語欲陷忠良伺隙謀反上驚曰豈當有此或容惡人間搆小生疑阻至於即反猶恐不然敬宗奏曰臣始末推勘自奉節有趙師之言又得偽書是季方所作即疑無忌欲反使其潛行構間斥除忠臣近戚此計若行自然權歸無忌蹤迹已露陛下猶有所疑恐非社稷之福舊無忌傳云敬宗使人上封事稱監察御史李巢與無忌交通謀反詔敬宗與茂將鞫之唐曆統紀與實録略同按奉節乃告事之人推鞫者豈得反搜奉節之家且與趙師者誰之私書若是季方書安得在奉節家若在奉節家奉節當執以興訟何待搜而後得又既云趙師是無忌乃是實與無忌書何得謂之偽書實録敘此事殊鹵莽首尾差舛不可知其詳實故略取大意而已舊傳所云雖為簡徑然高宗初無疑無忌之心故李弘泰告無忌反高宗立斬之何至奉節而獨令敬宗鞫之也且實録在前而詳列傳在後而略故亦未可據也我家不幸親戚間屢有異志往年高陽公主與房遺愛謀反事見上卷永徽三年復扶又翻使朕慙見天下之人茲事若實如之何對曰遺愛乳臭兒與一女子謀反勢何所成無忌與先帝謀取天下天下服其智為宰相三十年無忌自貞觀初為相至是三十餘年若一旦竊發陛下遣誰當之今賴宗廟之靈皇天疾惡因按小事乃得大姦實天下之慶也臣竊恐無忌知季方自刺窘急發謀攘袂一呼呼火故翻同惡雲集必為宗廟之憂臣昔見宇文化及父述為煬帝所親任結以婚姻委以朝政述卒化及復典禁兵卒子恤翻復扶又翻下宗復同一夕於江都作亂先殺不附己者臣家亦豫其禍於是大臣蘇威裴矩之徒皆舞蹈馬首唯恐不及黎明遂傾隋室事見一百八十六卷高祖武德元年願陛下速決之上命敬宗更加審察明日敬宗復奏曰昨夜季方已承與無忌同反臣又問季方無忌與國至親纍朝寵任何恨而反季方答云韓瑗嘗語無忌云語牛倨翻柳奭褚遂良勸公立梁王為太子今梁王既廢上亦疑公故出高履行於外履行無忌舅子也去年出為益州長史漸為自安之計後見長孫祥又出韓瑗得罪日夜與季方等謀反臣參驗辭狀咸相符合請收捕準法上又泣曰舅若果爾朕決不忍殺之章十二行本之下有若殺之三字乙十一行本同張校同云無注本亦無天下將謂朕何後世將謂朕何敬宗對曰薄昭漢文帝之舅也文帝從代來昭亦有功所坐止於殺人文帝使百官素服哭而殺之事見漢文帝紀今無忌忘兩朝之大恩謀移社稷其罪與薄昭不可同年而語也幸而姦狀自發逆徒引服陛下何疑猶不早決古人有言當斷不斷反受其亂道家之言斷丁亂翻間不容髮無忌今之姦雄王莽司馬懿之流也陛下少更遷延少詩沼翻臣恐變生肘腋悔無及矣上以為然竟不引問無忌戊辰下詔削無忌太尉及封邑以為揚州都督於黔州安置準一品供給唐六典膳部郎中一品食料每日細白米二升粳米梁米各一斗五升粉一升油五升鹽一升半醋三升蜜三合粟一斗梨七顆蘇一合乾棗一升木橦十根炭十斤蔥韭豉蒜薑椒之類各有差每月給羊二十口者肉六十斤魚三十頭各一尺酒九斗黔音琴無忌之從父兄子也從才用翻前此自工部尚書出為荊州長史故敬宗以此誣之敬宗又奏無忌謀逆由褚遂良柳奭韓瑗構扇而成奭仍潛通宮掖謀行鴆毒于志寧亦黨附無忌於是詔追削遂良官爵除奭瑗名免志寧官于志寧欲以緘默免禍而卒不免不若褚遂良無愧於昭陵也使疏吏翻無忌子祕書監駙馬都尉沖等皆除名流嶺表長孫沖尚太宗女長樂公主於道殺之益州長史高履行纍貶洪州都督自大都督府長史為遠州都督為貶益州在京師西南二千三百七十九里至東都三千二百一十六里洪州在京師東南三千九十里至東都二千二百一十一里考異曰舊傳云三年誤也今從唐曆四年五月丙申兵部尚書任雅相度支尚書盧承慶並參知政事承慶思道之孫也盧思道仕於高齊以文稱任音壬相息亮翻度徒洛翻四年涼州刺史趙持滿多力善射喜任俠喜許記翻其從母為韓瑗妻從才用翻下之從同其舅駙馬都尉長孫銓無忌之族弟也銓坐無忌流巂州巂音髓許敬宗恐持滿作難難乃旦翻誣云無忌同反誣云之下恐脫與字下獄訊掠備至終無異辭曰身可殺也辭不可更下遐嫁翻掠音亮更工衡翻吏無如之何乃代為獄辭結奏結奏結其罪而奏之戊戌誅之尸於城西親戚莫敢視友人王方翼歎曰欒布哭彭越義也事見十二卷漢高帝十一年仁也下不失義上不失仁不亦可乎乃收而葬之上聞之不罪也方翼廢后之從祖兄也長孫銓至流所縣令希旨杖殺之四年六月丁卯詔改氏族志為姓氏録初太宗命高士廉等修氏族志事見一百九十五卷貞觀十二年時稱允當當丁浪翻至是許敬宗等以其書不敘武氏本望奏請改之乃命禮部郎中孔志約等比類升降以后族為第一等其餘悉以仕唐官品高下為準凡九等於是士卒以軍功致位五品豫士流時人謂之勳格四年許敬宗議封禪儀己巳奏請以高祖太宗俱配昊天上帝太穆文德二皇后俱配皇地祇從之四年秋七月命御史往高州追長孫恩象州追柳奭振州追韓瑗並枷鎖詣京師仍命州縣簿録其家恩無忌之族弟也壬寅命李績許敬宗辛茂將與任雅相盧承慶更共覆按無忌事考異曰唐曆是日以台州刺史來濟為庭州刺史按來濟與韓瑗事同一體瑗方下獄濟豈得移官舊書云五年徙庭州近是再鞫無忌反狀黔音琴至則逼無忌令自縊詔柳奭韓瑗所至斬決使者殺柳奭于象州考異曰舊傳云奭纍貶愛州刺史高宗就愛州殺之今從實録發驗而還發棺而驗其尸還從宣翻又如字考異曰舊瑗傳云四年卒官明年長孫無忌死遣使殺之使至瑗已死褚遂良傳三年卒官後二歲追削官爵實録或因無忌徙黔州終言之然諸書多在此月蓋因實録年代記云七月辛未遣使逼無忌自縊按長曆七月丙子朔無辛未不可據也近親皆流嶺南為奴婢常州刺史長孫祥坐與無忌通書處絞常州在京師東南二千八百四十三里至東都一千九百八十三里處昌呂翻檀州漢漁陽郡蹄奚縣地後魏置安州後周改曰玄州隋開皇十六年改檀州大業初廢州為安樂郡唐復為檀州在京師東北二千五百六十七里至東都一千八百四十四里考異曰唐統紀唐曆皆云長孫恩新書云族弟恩統紀唐曆長孫銓流巂州縣令希旨殺之在此下實録銓流巂州許敬宗懼其甥趙持滿作難遂殺持滿是銓流巂州在前今從之四年八月壬子以普州刺史李義府兼吏部尚書同中書門下三品義府既貴自言本出趙郡與諸李敘昭穆昭市招翻無賴之徒藉其權勢拜伏為兄叔者甚衆給事中李崇德初與同譜及義府出為普州即除之義府聞而銜之及復為相復扶又翻使人誣構其罪下獄自殺下遐稼翻四年乙卯長孫氏柳氏緣無忌奭貶降者十三人高履行貶永州刺史永州舊零陵郡隋平陳置永州在京師南三千二百七十四里至東都三千六百六十五里于氏貶者九人自是政歸中宮矣四年九月詔以石米史大安小安曹拔汗那悒怛疏勒朱駒半等國置州縣府百二十七米國或曰彌末或曰弭秣賀北百里距康國其王治鉢息德城大安一曰布豁又曰捕喝元魏謂忸密者東北至小安四百里西瀕烏滸河治河謐城即康居小君長罽王故地小安一曰東安曰喝汗在那密水之陽東距河二百里許治喝汗城曹亦有東西中國東曹居波悉山之陰漢二師城地也北至石西至康東北寧遠皆四百里西曹者隋時曹國也南接史及波覽治瑟底痕城中曹治迦底真城拔汗那即寧遠或曰鏺汗元魏所謂破洛那去京師八千里居西鞬城在真珠河之北後分為二一治呼悶城一治遏塞城悒怛國漢大月氏之種大月氏為烏孫所奪西過大宛擊大夏臣之大夏即吐火羅也嚈噠王姓也後世以姓為國訛為悒怛杜佑曰嚈噠或云高車之別種或云大月氏之別種悒怛亦大月氏別種如佑所云則嚈噠悒怛似是兩國疏勒一名佉沙距長安九千里而贏悒音邑怛當割翻四年冬十月丙午太子加元服赦天下太子加元服其儀備見於新書禮志四年初太宗疾山東士人自矜門地婚姻多責資財命修氏族志例降一等王主壻皆取勳臣家不議山東之族而魏徵房玄齡李績家皆盛與為婚常左右之左右讀曰佐佑由是舊望不減或一姓之中更分某房某眷高下懸隔李義府為其子求婚不獲恨之為于偽翻故以先帝之旨勸上矯其弊壬戌詔後魏隴西李寶太原王瓊滎陽鄭溫范陽盧子遷盧渾盧輔清河崔宗伯崔元孫前燕博陵崔懿晉趙郡李楷等子孫不得自為婚姻燕因肩翻仍定天下嫁女受財之數毋得受陪門財陪門財者女家門望未高而議姻之家非耦令其納財以陪門望終不能禁或載女竊送夫家或女老不嫁終不與異姓為婚其衰宗落譜昭穆所不齒者往往反自稱禁婚家益增厚價厚取陪門之財也昭市招翻四年閏月戊寅上發京師令太子監國太子思慕不已人少則慕父母遽召赴行在戊戌車駕至東都監古銜翻四年十一月丙午以許圉師為散騎常侍檢校侍中散悉亶翻騎奇寄翻四年戊午侍中兼左庶子辛茂將薨四年思結俟斤都曼帥疏勒朱俱波謁般陀三國反新書作喝盤陀或曰漢陀曰渴館檀亦謂渴羅陀由疏勒西南入劍末谷不忍嶺六百里則其國也距瓜州四千五百里直朱俱波西南距懸度山俟渠之翻帥讀曰率癸亥以左驍衛大將軍蘇定方為安撫大使以討之驍堅堯翻使疏吏翻四年以盧承慶同中書門下三品四年右領軍中郎將薛仁貴等與高麗將溫沙門戰於橫山破之將即亮翻麗力知翻四年蘇定方軍至業葉水自庭州輪臺縣西行三百許里至業葉河定方選精兵萬人騎三千匹馳往襲之一日一夜行三百里詰旦至城下騎奇寄翻詰去吉翻都曼大驚戰於城外都曼敗退保其城及暮諸軍繼至遂圍之都曼懼而出降降戶江翻五年五年春正月定方獻俘於乾陽殿乾陽殿在洛陽宮定方請曰臣許以不死故都曼出降願丐其餘生丐古太翻上曰朕屈法以全卿之信乃免之五年甲子上發東都二月辛巳至並州東都至並州八百八里丙午皇后宴親戚故舊鄰里於朝堂婦人於內殿班賜有差武后並州文水縣人天子行幸所至皆有朝堂太宗伐高麗張受降幕於朝堂之側是也皇后所居為內殿朝直遙翻並州婦人年八十以上皆版授郡君郡君有正四品從四品正五品之差五年百濟恃高麗之援數侵新羅數所角翻新羅王春秋上表求救辛亥以左武衛大將軍蘇定方為神丘道行軍大總管新書作神兵道帥讀曰率驍堅堯翻水陸十萬以伐百濟考異曰舊書定方傳新羅傳皆云定方為熊津道大總管實録定方傳亦同今從此年實録新唐書本紀又舊本紀唐曆皆云四年十二月癸亥以定方為神丘道大總管劉伯英為嵎夷道行軍總管按定方時討都曼未為神丘道總管舊書唐曆皆誤今從實録因堯典宅嵎夷曰暘谷而命之與之合勢將即亮翻五年夏四月丙章十二行本丙作戊乙十一行本同寅上發並州癸巳至東都五月作合璧宮時改八關宮為合璧宮在東都苑內壬戌上幸合璧宮五年戊辰以定襄都督阿史德樞賓左武候將軍延陀梯真梯真薛延陀之種因以為姓岍與同即冷徑山奚與契丹依阻此山以自固其地在潢水之南黃龍之北仍命尚書右丞崔餘慶充使總護三部兵奚尋遣使降將即亮翻下同使疏吏翻降戶江翻更以樞賓等為沙磚道行軍總管以討契丹擒契丹松漠都督阿卜固送東都磚職緣翻五年六月庚午朔日有食之五年甲午車駕還洛陽宮五年房州刺史梁王忠年浸長頗不自安或私衣婦人服以備刺客長知兩翻衣於既翻又數自占吉凶數所角翻或告其事秋七月乙巳廢忠為庶人徙黔州囚於承乾故宅太宗貞觀十七年徙太子承乾於黔州黔音琴五年丁卯度支尚書同中書門下三品盧承慶坐科調失所免官度支尚書凡徭賦職貢之方經費賙給之算藏貨贏縮之準悉以咨之今科調不得其所為不任其職故免所居官調徒弔翻五年八月吐蕃祿東贊遣其子起政將兵擊吐谷渾以吐谷渾內附故也吐從暾入聲谷音浴五年蘇定方引兵自成山濟海百濟據熊津江口以拒之定方進擊破之百濟死者數千人餘皆潰走定方水陸齊進直趣其都城北史百濟都俱拔城亦曰固麻城其外更有五方中方曰古沙城東方曰得安城南方曰久知下城西方曰刀先城北方曰熊津城趣七喻翻百濟傾國來戰大破之殺萬餘人追奔入其郭百濟王義慈及太子隆逃于北境定方進圍其城義慈次子泰自立為王帥衆固守隆子文思曰王與太子皆在而叔遽擁兵自王帥讀曰率下同王于況翻借使能卻唐兵我父子必不全矣遂帥左右踰城來降百姓皆從之泰不能止定方命軍士登城立幟泰窘迫開門請命於是義慈隆及諸城主皆降降戶江翻幟昌志翻百濟故有五部分統三十七郡二百城七十六萬戶詔以其地置熊津等五都督府熊津馬韓東明金連德安五都督府酋慈由翻長知兩翻五年壬午左武衛大將軍鄭仁泰將兵討思結拔也固僕骨同羅四部拔也固即拔野古僕骨即僕固將即亮翻追奔百餘里斬其酋長而還五年冬十月上初苦風眩頭重目不能視百司奏事上或使皇后決之后性明敏涉獵文史處事皆稱旨由是始委以政事權與人主侔矣史言后移唐祚至是而勢成處昌呂翻稱尺證翻五年十一月戊戌朔上御則天門樓唐六典東都宮城南面三門中曰應天後以武后號則天遂更曰則天也自其王義慈以下皆釋之蘇定方前後滅三國皆生擒其主謂賀魯都曼義慈也五年甲寅上幸許州十二月辛未畋於長社長社漢古縣屬潁川郡隋改長社曰潁川唐復舊帶許州己卯還東都五年壬午以左驍衛大將軍契苾何力為浿江道行軍大總管浿水在高麗國中驍堅堯翻契欺訖翻浿普蓋翻左驍衛將軍劉伯英為平壤道行軍大總管蒲州刺史程名振為鏤方道總管將兵分道擊高麗青州刺史劉仁軌坐督海運覆船以白衣從軍自效考異曰舊傳云監統水軍征遼以後期坐免官按仁軌從軍乃在百濟非征遼也今從張鷟朝野僉載龍朔元年辛酉六六一五年春正月乙卯募河南北淮南六十七州兵得四萬四千餘人詣平壤鏤方行營戊午以鴻臚卿蕭嗣業為扶餘道行軍總管帥回紇等諸部兵詣平壤臚陵如翻帥讀曰率紇下沒翻五年二月乙未晦改元五年三月丙申朔上與㣥臣及外夷宴於洛城門唐六典洛陽宮城西北出曰洛城西門其內曰德昌殿德昌殿南出曰延慶門又南曰韶暉門西南曰洛城南門其內曰洛城殿謂之一戎大定樂取一戎衣天下大定之義舞者百四十人被五采甲持槊而舞劉昫曰大定樂出自破陳樂自破陳舞以下皆雷大鼓雜以龜茲之樂聲振百里動蕩山谷大定樂加金鉦象平遼東而邊隅大定也杜佑曰大定樂歌云八紘同軌樂以象用武之勢也五年初蘇定方既平百濟留郎將劉仁願鎮守百濟府城又以左衛中郎將王文度為熊津都督撫其餘衆文度濟海而卒卒子恤翻百濟僧道琛故將福信聚衆據周留城將即亮翻迎故王子豐於倭國而立之倭烏禾翻引兵圍仁願於府城詔起劉仁軌檢校帶方州刺史帶方州置於百濟界因古地名以名州考異曰僉載云劉仁願以仁軌檢校帶方州刺史今從本傳便道發新羅兵以救仁願將即亮翻仁軌喜曰天將富貴此翁矣於州司請唐曆及廟諱以行按劉仁軌自青州刺史白衣從軍此蓋於青州州司請之也吾欲掃平東夷頒大唐正朔於海表仁軌御軍嚴整轉鬬而前所向皆下百濟立兩柵於熊津江口仁軌與新羅兵合擊破之殺溺死者萬餘人溺奴狄翻道琛乃釋府城之圍退保任存城任存城在百濟西部任存山考異曰實録或作任孝城未知孰是今從其多者引還道琛自稱領軍將軍福信自稱霜岑將軍招集徒衆其勢益張張知亮翻仁軌衆少與仁願合軍休息士卒少詩沼翻上詔新羅出兵新羅王春秋奉詔遣其將金欽將兵救仁軌等至古泗福信邀擊敗之將即亮翻敗補邁翻欽自葛嶺道遁還新羅不敢復出復扶又翻福信尋殺道琛專總國兵五年夏四月丁卯上幸合璧宮五年庚辰以任雅相為浿江道行軍總管契苾何力為遼東道行軍總管蘇定方為平壤道行軍總管與蕭嗣業及諸胡兵凡三十五軍水陸分道並進上欲自將大軍繼之癸巳皇后抗表諫親征高麗麗力知翻詔從之五年六月癸未以吐火羅嚈噠罽賓波斯等十六國罽賓隋漕國也居蔥嶺南距長安萬二千里而贏四國及訶達羅支國解蘇國骨咄施國帆延國石汗那國護時犍國怛沒國烏拉喝國多勒建國俱蜜國護蜜多國久越得犍國凡十六嚈益涉翻噠當割翻又宅軋翻罽音計州七十六考異曰唐曆云置州二十六今從統紀今按新書地理志時自于闐以西波斯以東凡十六國各以其王都為都督府吐火羅國都為月氏都督府領州二十五嚈噠國都為大汗都督府領州十五訶達羅支國都為條支都督府領州九解蘇國都為天馬都督府領州二骨咄施國都為高附都督府領州二罽賓國都為修鮮都督府領州十帆延國都為寫鳳都督府領州四石汗那國都為悅般州都督府領州二護時犍國都為奇沙州都督府領州二怛沒國都為姑墨州都督府領州一烏拉喝國都為旅獒州都督府多勒建國都為崑墟州都督府俱蜜國都為至拔州都督府護蜜多國都為鳥飛州都督府領州一久越得犍國都為王庭州都督府波斯國都為波斯都督府通鑑言置都督府八者蓋謂月氏大汗條支天馬高附修鮮寫鳳波斯八都督府餘悅般等八州都督府不預也新志所載領州七十二其數亦與通鑑所引統紀不合軍府一百二十六並隸安西都護府五年秋七月甲戌蘇定方破高麗於浿江屢戰皆捷遂圍平壤城五年九月癸巳朔特進新羅王春秋卒以其子法敏為樂浪郡王新羅王卒子恤翻樂浪音洛琅五年壬子徙潞王賢為沛王賢聞王勃善屬文屬之欲翻召為修撰撰士免翻勃通之孫也王通隋末大儒諡文中子勃戲為檄周王雞文考異曰舊傳云檄英王雞按中宗為英王時沛王賢已為太子當云周王怒曰此乃交構之漸斥勃出沛府五年高麗蓋蘇文遣其子男生以精兵數萬守鴨緑水諸軍不得渡契苾何力至值冰大合何力引衆乘冰渡水鼓譟而進高麗大潰追奔數十里斬首三萬級餘衆悉降降戶江翻男生僅以身免會有詔班師乃還五年冬十月丁卯上畋于陸渾陸渾古伊川春秋時秦晉遷陸渾戎於此漢因以名縣屬弘農郡後魏置伊川郡隋廢郡改縣曰伏流大業初復曰陸渾屬洛州戊申又畋于非山癸酉還宮五年回紇酋長婆閏卒姪比粟毒代領其衆紇下沒翻酋慈由翻長知兩翻卒子恤翻考異曰新書傳云婆閏卒子比粟嗣今從舊傳與同羅僕固犯邊詔左武衛大將軍鄭仁泰為鐵勒道行軍大總管燕然都護劉審禮左武衛將軍薛仁貴為副燕因肩翻鴻臚卿蕭嗣業為仙萼道行軍總管磧北有仙萼河將兵討之將即亮翻審禮德威之子也劉德威見一百五十四卷太宗貞觀十一年二年二年春正月辛亥立波斯都督卑路斯為波斯王二年二月甲子改百官名以門下省為東臺中書省為西臺尚書省為中臺侍中為左相中書令為右相僕射為匡政左右丞為肅機尚書為太常伯侍郎為少常伯其餘二十四司御史臺九寺七監十六衛並以義訓更其名而職任如故改吏部為司列司勳司封如故考功為司績戶部為司元度支為司度金部為司珍倉部為司庾禮部為司禮祠部為司禋主客為司蕃膳部為司膳兵部為司戎職方為司城駕部為司輿庫部為司庫刑部為司刑都官為司僕比部為司計司門為司關工部為司平屯田為司田虞部為司虞水部為司川凡二十四司郎中皆改為大夫改御史臺曰憲臺大夫曰大司憲中丞曰司憲大夫改太常寺曰奉常寺光祿寺曰司宰寺衛尉寺曰司衛寺宗正寺曰司宗寺太僕寺曰司馭寺大理寺曰詳刑寺鴻臚寺曰同文寺司農寺曰司稼寺太府寺曰外府寺凡九寺卿皆曰正卿少卿皆曰大夫改祕書省曰蘭臺監監曰太史少監曰侍郎丞曰大夫殿中省為中御府監監曰太監國子監為司成館祭酒曰大司成司業曰少司成少府監為內府監將作監為繕工監大匠曰大監少匠曰少監都水監為司津監凡七監左右衛府驍衛府武衛府皆省府字左右威衛曰左右武威衛左右領軍衛曰左右戎衛左右候衛曰左右金吾衛左右監門府曰左右監門衛左右千牛府曰左右奉宸衛凡十六衛二年甲戌浿江道大總管任雅相薨于軍雅相為將浿普大翻任音壬相息亮翻將即亮翻未嘗奏親戚故吏從軍皆移所司補授謂人曰官無大小皆國家公器豈可苟便其私由是軍中賞罰皆平人服其公二年戊寅左驍衛將軍白州刺史沃沮道總管龐孝泰白州本漢合浦縣地武德四年置南州六年改白州沮子余翻軍敗與其子十三人皆戰死蘇定方圍平壤久不下會大雪解圍而還二年三月鄭仁泰等敗鐵勒於天山敗補邁翻下所敗同鐵勒九姓聞唐兵將至合衆十餘萬以拒之選驍健者數十人挑戰薛仁貴發三矢殺三人餘皆下馬請降仁貴悉坑之度磧北擊其餘衆獲葉護兄弟三人而還驍堅堯翻挑徒了翻降戶江翻磧七亦翻軍中歌之曰將軍三箭定天山壯士長歌入漢關思結多濫葛等部落先保天山聞仁泰等將至皆迎降仁泰等縱兵擊之掠其家以賞軍虜相帥遠遁帥讀曰率將軍楊志追之為虜所敗候騎告仁泰虜輜重在近往可取也騎奇寄翻下同重直用翻仁泰將輕騎萬四千倍道赴之遂踰大磧至仙萼河新書回鶻牙北六百里至仙娥河糧盡而還值大雪士卒飢凍棄捐甲兵殺馬食之馬盡人自相食比入塞比必寐翻及也餘兵才八百人軍還司憲大夫楊德裔劾奏文泰等漢御史臺有二丞掌殿內祕書謂之中丞漢末改為御史長史後漢復為中丞後魏改為中尉正北齊復曰中丞後周曰司憲中大夫隋諱中改為治書御史唐因之貞觀末避高宗名改為中丞是年改為司憲大夫正五品上掌二大司憲持邦國憲章以肅正朝廷劾戶概翻又戶得翻降戶江翻使虜逃散不撫士卒不計資糧遂使骸骨蔽野棄甲資寇自聖朝開創以來未有如今日之喪敗者仁貴於所監臨貪淫自恣雖矜所得不補所喪並請付法司推科喪息浪翻監古銜翻推科者推問而科處其罪詔以功贖罪皆釋之以右驍衛大將軍契苾何力為鐵勒道安撫使左衛將軍薑恪副之以安輯其餘衆何力簡精騎五百馳入九姓中虜大驚何力乃謂曰國家知汝皆脅從赦汝之罪罪在酋長得之則已酋慈由翻其部落大喜共執其葉護及設特勒等二百餘人以授何力何力數其罪而斬之數所具翻九姓遂定二年甲午車駕發東都辛亥幸蒲州夏四月庚申朔至京師二年辛巳作蓬萊宮蓬萊宮即大明宮亦曰東內程大昌曰大明宮地本太極宮之後苑東北面射殿之地在龍首山上太宗初於其地營永安宮以備太上皇清暑雖嘗改名大明宮而太上皇仍居大安宮不曾徙入龍朔二年高宗苦風痹惡太極宮卑下故就修大明宮改名蓬萊宮取殿後蓬萊池以為名作營造也二年五月丙申以許圉師為左相相息亮翻二年六月乙丑初令僧尼道士女官致敬父母尼女夷翻二年秋七月戊子朔赦天下二年丁巳熊津都督劉仁願帶方州刺史劉仁軌大破百濟於熊津之東拔真峴城初仁願仁軌等屯熊津城考異曰去歲道琛福信圍仁願於百濟府城今云尚在熊津城或者共是一城不則圍解之後徙屯熊津城耳以平壤軍回一城不可獨固宜拔就新羅若金法敏藉卿留鎮宜且停彼若其不須即宜泛海還也將士咸欲西歸仁軌曰人臣徇公家之利有死無二豈得先念其私主上欲滅高麗故先誅百濟留兵守之制其心腹雖餘寇充斥而守備甚嚴宜礪兵秣馬擊其不意理無不克既捷之後士卒心安然後分兵據險開張形勢飛表以聞更求益兵朝廷知其有成必命將出師聲援才接凶醜自殲將即亮翻殲息廉翻非直不棄成功實亦永清海表今平壤之軍既還熊津又拔拔謂拔軍就新羅或拔軍西還也不日更興高麗逋寇何時可滅且今以一城之地居敵中央苟或動足即為擒虜縱入新羅亦為羈客脫不如意悔不可追況福信凶悖殘虐君臣猜離行相屠戮正宜堅守觀變乘便取之不可動也衆從之時百濟王豐與福信等以仁願等孤城無援遣使謂之曰大使等何時西還當遣相送使疏吏翻下同仁願仁軌知其無備忽出擊之拔其支羅城及尹城大山沙井等柵殺獲甚衆分兵守之福信等以真峴城險要加兵守之仁軌伺其稍懈引新羅兵夜傅城下攀草而上比明入據其城伺相吏翻懈古隘翻傅音附上時掌翻比必寐翻遂通新羅運糧之路仁願乃奏請益兵詔發淄青萊海之兵七千人以赴熊津史言劉仁軌能堅忍伺間待援兵以盡平百濟福信專權與百濟王豐浸相猜忌福信稱疾臥於窟室欲俟豐問疾而殺之豐知之帥親信襲殺福信果如劉仁軌所料帥讀曰率倭烏禾翻王崇武標點容肇祖聶崇岐覆校
