body:
  text: 資治通鑑卷第二百七十端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千六百戶食實封一千戶賜紫金魚袋臣司馬光奉敕編集後學天台音注後梁紀五均王中貞明三年貞明三年丁丑九一七貞明三年秋七月庚戌蜀主以桑弘志為西北面第一招討王宗宏為東北面第二招討己未以兼中書令王宗侃為東北面都招討武信節度使劉知俊為西北面都招討以伐岐也貞明三年晉王以李嗣源閻寶兵少未足以敵契丹辛未更命李存審將兵益之貞明三年蜀飛龍使唐文扆居中用事扆隱豈翻張格附之與司徒判樞密院事毛文錫爭權文錫將以女適左僕射兼中書侍郎同平章事庾傳素之子會親族於樞密院用樂不先表聞蜀主聞樂聲怪之文扆從而譖之八月庚寅貶文錫茂州司馬其子司封員外郎詢流維州籍沒其家貶文錫弟翰林學士文晏為榮經尉榮經漢嚴道縣地唐武德四年置榮經縣屬雅州九域志在州南一百一十里以翰林學士承旨庾凝績權判內樞密院事凝績傳素之再從弟也同曾祖之弟為再從弟從才用翻貞明三年清章十二行本清上有癸巳二字乙十一行本同孔本同張校同退齋校同海建武節度使劉巖即皇帝位於番禺漢書音義番音潘禺音愚國號大越大赦改元乾亨以梁使趙光裔為兵部尚書節度副使楊洞潛為兵部侍郎節度判官李殷衡為禮部侍郎並同平章事建三廟追尊祖安仁曰太祖文皇帝父謙曰代祖聖武皇帝兄隱曰烈宗襄皇帝以廣州為興王府貞明三年契丹圍幽州且二百日是年三月契丹圍幽州事始見上卷李嗣源閻寶李存審步騎七萬會於易州閻寶班在李存審之下而先書寶者嗣源與寶先進屯淶水而存審繼之也胸奴須知淶水西至易州四十里易州東北至幽州二百二十里虜衆吾寡虜多騎吾多步若平原相遇虜以萬騎蹂吾陳吾無遺類矣蹂人九翻又徐又翻陳讀曰陳嗣源曰虜無輜重重直用翻吾行必載糧食自隨若平原相遇虜抄吾糧抄楚交翻吾不戰自潰矣不若自山中潛行趣幽州趣七喻翻與城中合勢若中道遇虜則據險拒之甲午自易州北行庚子踰大房嶺水經注聖水出上谷郡西南谷東南流徑大防嶺又曰良鄉縣西北有大防山防水出其南按易州即漢上谷郡地范成大北使録自良鄉六十五里至幽州城外此又驛路也嗣源與養子從珂將三千騎為前鋒距幽州六十里與契丹遇契丹驚卻晉兵翼而隨之張左右翼而踵其後晉兵行澗下每至谷口契丹輒邀之嗣源父子力戰乃得進至山口契丹以萬餘騎遮其前將士失色嗣源以百餘騎先進免胄揚鞭胡語謂契丹曰汝無故犯我疆場晉王命我將百萬衆直抵西樓滅汝種族此史家以華言譯胡語而筆之於史也胡嶠入遼記曰自幽州西北入居庸關行幾一月乃至上京所謂西樓也西樓有邑屋市肆歐史四夷附録曰契丹好鬼而貴日每月朔旦東向而拜日其大會聚視國事皆以東向為尊西樓門屋皆東向薛史曰西樓距幽州三千里場音亦種章勇翻三入其陳斬契丹酋長一人檛側瓜翻陳讀曰陳下同酋慈秋翻長知兩翻後軍齊進契丹兵卻晉兵始得出李存審命步兵伐木為鹿角人持一枝止則成寨契丹騎環寨而過寨中發萬弩射之流矢蔽日契丹人馬死傷塞路環音患射而亦翻塞悉則翻將至幽州契丹列陳待之存審命步兵陳於其後陳於契丹陳後將夾擊之也一曰以騎兵前進令步兵陳於其後先令羸兵曳柴然草而進煙塵蔽天契丹莫測其多少因鼓譟合戰存審乃趣後陳起乘之羸倫為翻趣讀曰促契丹大敗席卷其衆自北山去取古北口路而去卷讀曰捲晉兵追之俘斬萬計辛丑嗣源等入幽州周德威見之握手流涕為虜所困得救而解喜極涕流契丹以盧文進為幽州留後其後又以為盧龍節度使文進常居平州帥奚騎歲入北邊殺掠吏民帥讀曰率下同晉人自瓦橋運糧輸薊城九域志瓦橋北至涿州一百二十里涿州北至薊城一百二十里薊音計不免抄掠契丹每入寇則文進帥漢卒為鄉導鄉讀曰嚮盧龍巡屬諸州為之殘弊盧龍諸州自唐中世以來自為一域外而捍禦兩蕃內而連兵河朔其力常有餘及並於晉則歲遣糧援繼之而不足此其故何也保有一隅者其心力專廣土衆民其心力有所不及也詩云無田甫田維莠驕驕信矣為于偽翻下為承誓為為吾請為同貞明三年劉鄩自滑州入朝朝議以河朔失守責之河朔失守事見上卷朝直遙翻落鄩平章事左遷亳州團練使當其時不能治也待其入朝而後責之失政刑矣貞明三年冬十月己亥加吳越王鏐天下兵馬元帥貞明三年晉王還晉陽自魏州還晉陽凡軍府政事一委監軍使張承業承業勸課農桑畜積金穀收市兵馬徵租行法不寬貴戚由是軍城肅清軍城謂晉陽軍城也王或時須錢蒱博及給賜伶人而承業靳之靳居焮翻吝惜也錢不可得王乃置酒錢庫令其子繼岌為承業舞承業以寶帶及幣馬贈之王指錢積呼繼岌小名謂承業曰和哥乏錢七哥宜以錢一積與之帶馬未為厚也張承業第七晉王以兄事承業呼之為七哥郎君纏頭皆出承業俸祿唐人凡為人舞人則以錢綵寶貨謝之謂之纏頭俸扶用翻大王所以養戰士也承業不敢以公物為私禮王不悅憑酒以語侵之承業怒曰僕老敕使耳非為子孫計惜此庫錢所以佐王成霸業也不然王自取用之何問僕為不過財盡民散一無所成耳晉王他日卒如張承業之言顧李紹榮索劍承業起挽王衣索山客翻挽武遠翻引也泣曰僕受先王顧託之命誓為國家誅汴賊朱氏居汴李氏名其為賊僕下見先王無愧矣先王謂晉王克用閻寶從旁解承業手令退承業奮拳毆寶踣地罵曰毆烏口翻踣蒲北翻閻寶朱溫之黨受晉大恩言閻寶背梁降晉晉不殺而寵貴之顧欲以諂媚自容邪曹太夫人聞之遽令召王史書曹太夫人者以見嫡母劉夫人不可得而令其子謝承業曰吾以酒失忤七哥忤丑故翻必且得罪於太夫人七哥為吾痛飲以分其過王連飲四卮承業竟不肯飲王入宮太夫人使人謝承業曰小兒忤特進張承業於時官特進意亦晉王承制授之也明日太夫人與王俱至承業第謝之史言晉王之在魏皆張承業足饋餉以輔之亦內有曹夫人故承業得行其志幾居豈翻承制授承業開府儀同三司左衛上將軍燕國公承業固辭不受但稱唐官以至終身掌書記盧質嗜酒輕傲嘗呼王諸弟為豚犬王銜之承業恐其及禍乘間言曰盧質數無禮間古莧翻數所角翻請為大王殺之王曰吾方招納賢才以就功業七哥何言之過也承業起立賀曰王能如此何憂不得天下質由是獲免史言張承業不惟能足兵且能保護士君子晉王元衛國韓夫人次燕國伊夫人次魏國劉夫人劉夫人最有寵書晉宮之次者以見其宮中貫魚失序成安漢斥丘縣北齊置成安縣唐屬相州時屬魏州九域志成安在魏州西一百里夫人幼時晉將袁建豐掠得之入于王宮性狡悍淫妬悍下罕翻又侯旰翻從王在魏父聞其貴詣魏宮上謁上時掌翻王召袁建豐示之建豐曰始得夫人時有黃鬚丈人護之此是也王以語夫人語牛倨翻夫人方與諸夫人爭寵以門地相高恥其家寒微大怒曰妾去鄉時略可記憶妾父不幸死亂兵妾守尸哭之而去今何物田舍翁敢至此命笞劉叟于宮門父且笞之而何有於君異日李存渥之事無足怪也貞明三年越主巖遣客省使劉瑭使於吳告即位是年八月劉巖稱帝貞明三年閏月戊申蜀主以判內樞密院庾凝績為吏部尚書內樞密使貞明三年十一月丙子朔日南至蜀主祀圜丘貞明三年晉王聞河冰合曰用兵數歲限一水不得渡貞明元年晉得魏博兵始窺河上若以破夾寨為用兵之始則已十年矣天贊我也亟如魏州貞明三年蜀主以劉知俊為都招討使見是年七月多不用其命且疾之故無成功伐岐無功也數所角翻蜀主亦忌其才嘗謂所親曰吾老矣知俊非爾輩所能馭也十二月辛亥收知俊稱其謀叛斬於炭市劉知俊懼不見容於梁而奔岐懼不見容於岐而奔蜀卒亦不為蜀所容挾虎狼之性而附人人必虞其搏噬其能容之乎貞明三年癸丑蜀大赦改明年元曰光天貞明三年壬戌以張宗奭為天下兵馬副元帥貞明三年帝論平慶州功賀王褱平慶州見上卷上年丁卯以左龍虎統軍賀王褱為宣義節度使同平章事尋以為北面行營招討使為賀王褱不能拒晉張本貞明三年戊辰晉王畋于朝城朝城本漢東武陽縣後周曰武陽唐改曰朝城九域志朝城縣在魏州東南八十里又三十里至河大寒晉王視河冰已堅引步騎稍渡梁甲士三千戍楊劉城緣河數十里列柵相望晉王急攻皆陷之進攻楊劉城使步兵斬其鹿角負葭葦塞塹陸佃埤雅曰葦即今之蘆一名葭葭葦之未秀者也萑即今之荻一名蒹蒹萑之未秀者也至秋堅成謂之萑葦萑小而葦大字説曰蘆謂之葭其小曰萑荻謂之蒹其小曰葦荻強而葭弱荻高而葭下塞悉則翻即日拔之獲其守將安彥之先是租庸使戶部尚書趙巖言於帝曰陛下踐阼以來尚未南郊議者以為無異藩侯先悉薦翻為四方所輕請幸西都行郊禮遂謁宣陵宣陵在河南伊闕縣故請帝因郊而謁陵自劉鄩失利以來劉鄩敗見上卷上年人心惴恐惴之睡翻今展禮圜丘必行賞賚是慕虛名而受實弊也且勍敵近在河上勍敵謂晉也勍渠京翻乘繩證翻俟北方既平報本未晚晉書曰郊祀者帝王之重事所以報本反始也己巳如洛陽閲車服飾宮闕郊祀有日聞楊劉失守道路訛言晉軍已至大梁扼汜水矣扼汜水謂扼虎牢之險也相顧涕泣從才用翻帝惶駭失圖遂罷郊祀奔歸大梁貞明三年甲戌以河南尹張宗奭為西都留守貞明三年是歲閩王審知為其子牙內都指揮使延鈞娶越主巖之女為于偽翻四年四年春正月乙亥朔蜀大赦復國號曰蜀蜀改國號見上卷二年四年帝至大梁自洛陽還至大梁晉拔楊劉楊劉屬鄆州界又西則濮州界鄆音運濮博木翻國家連年喪師上時掌翻喪息浪翻疆土日蹙陛下居深宮之中所與計事者皆左右近習豈能量敵國之勝負乎量音良先帝之時奄有河北開平之間幽滄鎮定魏皆附于梁故云然猶不得志謂夾寨柏鄉蓨縣之師皆不得志于晉陛下不能留意臣聞李亞子繼位以來于今十年開平元年晉王存勗嗣位于今十一年無不親當矢石近者攻楊劉身負束薪為士卒先一鼓拔之陛下儒雅守文晏安自若使賀王褱輩敵之而望攘逐寇讎非臣所知也陛下宜詢訪黎老黎衆也不然憂未艾也臣雖駑怯駑音奴受國重恩陛下必若乏才乞於邊垂自效疏奏趙張之徒言翔怨望帝遂不用四年吳以右都押牙王祺為虔州行營都指揮使將洪撫袁吉之兵擊談全播嚴可求以厚利募贛石水工故吳兵奄至虔州城下虔人始知之虔州水行至吉州有贛石之險吳先募水工習於水道故舟行無礙注詳見辨誤贛音紺四年蜀太子衍好酒色樂遊戲好呼到翻樂五教翻蜀主嘗自夾城過聞太子與諸王鬬雞擊毬喧呼之聲蜀蓋倣長安之制附夾城為諸王宅吾百戰以立基業此輩其能守之乎由是惡張格而徐賢為之內主竟不能去也張格贊立宗衍見二百六十八卷乾化二年惡烏路翻去羌呂翻屢陳時政蜀主賢之有廢立意二月癸亥宗傑暴卒蜀主深疑之四年河陽節度使北面行營排陳使謝彥章將兵數萬攻楊劉城甲子晉王自魏州輕騎詣河上彥章築壘自固決河水瀰浸數里以限晉兵晉兵不得進謝彥章梁之騎將也懼晉兵之衝突決河水以限之幽並之突騎非南兵之所能敵自古然也瀰音彌許州人也安彥之散卒多聚於兗鄆山谷為㣥盜以觀二國成敗晉王招募之多降於晉降戶江翻四年己亥蜀主以東面招討使王宗侃為東西兩路諸軍都統此伐岐東西兩路之兵也東路出寶雞西路出秦隴四年三月吳越王鏐初立元帥府置官屬前年梁加錢鏐諸道兵馬元帥去年又加天下兵馬元帥四年夏四月癸卯朔蜀主立子宗平為忠王宗特為資王四年岐王復遣使求好于蜀岐與蜀絶見二百六十七卷乾化元年復扶又翻四年己酉以吏部侍郎蕭頃為中書侍郎同平章事四年保大節度使高萬金卒癸亥以忠義節度使高萬興兼保大節度使並鎮鄜延太祖改保塞軍為忠義軍高萬興萬金之兄也兄弟並鎮今併為一四年司空兼門下侍郎同平章事趙光逢告老己巳以司徒致仕四年蜀主自永平末梁乾化元年蜀改元永平梁貞明二年蜀改元通正昏瞀瞀莫候翻至是增劇以北面行營招討使兼中書令王宗弼沉靜有謀五月召還以為馬步都指揮使乙亥召大臣入寢殿告之曰太子仁弱朕不能違諸公之請踰次而立之即謂張格令諸公署表時事可置諸別宮幸勿殺之但王氏子弟諸公擇而輔之徐兄弟止可優其祿位慎勿使之掌兵預政以全其宗族內飛龍使唐文扆久典禁兵參預機密欲去諸大臣去羌呂翻遣人守宮門王宗弼等三十餘人日至朝堂不得入見見賢遍翻文扆屢以蜀主之命慰撫之伺蜀主殂即作難伺相吏翻難乃旦翻遣其黨內皇城使潘在迎偵察外事偵丑鄭翻伺也在迎以其謀告宗弼等宗弼等排闥入言文扆之罪以天册府掌書記崔延昌權判六軍事蜀置天策府見上卷乾化四年將罪唐文扆先奪其判六軍事丙子貶唐文扆為眉州刺史翰林學士承旨王保晦坐附會文扆削官爵流瀘州在迎炕之子也潘炕亦蜀主所親任者也入管樞密出居方鎮炕苦浪翻丙申蜀主詔中外財賦中書除授諸司刑獄案牘專委庾凝績都城及行營軍旅之事委宣徽南院使宋光嗣丁酉削唐文扆官爵流雅州辛丑以宋光嗣為內樞密使與兼中書令王宗弼宗瑤宗綰宗夔並受遺詔輔政初蜀主雖因唐制置樞密使專用士人唐制樞密使本用宦者蜀主以諸將多許州故人蜀主本許州舞陽人其諸將亦多許人故以光嗣代之自是宦者始用事為蜀以宦者亡張本六月壬寅章十二行本寅下有朔字乙十一行本同孔本同張校同蜀主殂考異曰北夢瑣言云余聞宗弼親吏曹處琪言建疑信王暴卒唐文扆與徐張格陰謀使尚食進雞燒餅因置毒建疾困大臣魏弘夫等請誅文扆建曰太子好酒色若不克負荷幸無殺之徐氏兄弟勿與兵權言訖長吁而逝劉恕按舊史貶文扆後二十七日蜀主始殂疑曹處琪之妄孫光憲從而記之癸卯太子即皇帝位名衍字化源建幼子也衍母也以宋光嗣判六軍諸衛事乙卯殺唐文扆王保晦命西面招討副使王全章十二行本全作宗乙十一行本同孔本同昱殺天雄節度使唐文裔於秦州貞明二年蜀主遣唐文裔伐岐遂鎮秦州四年吳內外馬步都軍使昌化節度使同平章事徐知訓驕倨淫暴威武節度使知撫州李德誠歐史職方考曰五代之際外屬之州揚州曰淮南宣州曰寧國鄂州曰武昌洪州曰鎮南復州曰武威杭州曰鎮海越州曰鎮東江陵府曰荊南益州梓州曰劍南東西川遂州曰武信興元府曰山南西道洋州曰武定黔州曰黔南潭州曰武安桂州曰靜江容州曰寧遠雍州曰建武廣州曰清海皆唐故號更五代無所易而今因之者也其餘僭偽改置之名不可悉考而不足道其因著于今者略注于譜按歐公之時去五代未遠十國僭偽自相署置其當時節鎮之名已無所考況欲考之於二三百年之後乎今台州有魯洵作杜雄墓碑云唐僖宗光啓三年升台州為德化軍洵乃雄吏時為德化軍判官者也又嘉定中黃巖縣永寧江有泅於水者拾一銅印其文曰台州德化軍行營朱記宋太祖乾德元年錢昱以德化軍節度使本路安撫使兼知台州台州小郡猶置節度其他州郡從可知矣吳之昌化威武蓋亦置之境內屬城但不可得而考其地耳知訓求之妓渠綺翻德誠遣使謝曰家之所有皆長年長知兩翻謂年已長也或有子不足以侍貴人當更為公求少而美者為于偽翻少詩照翻知訓怒謂使者曰會當殺德誠並其妻取之知訓狎侮吳王無復君臣之禮嘗與王為優自為參軍使王為蒼鶻總角弊衣執帽以從優人為優以一人幞頭衣緑謂之參軍以一人髽角弊衣如僮奴之狀謂之蒼鶻從才用翻王先起知訓以彈彈之上彈徒旦翻下彈徒丹翻又嘗賞花於禪智寺宋白曰禪智寺在揚州城東寺前有橋跨舊官河王懼而泣悖蒲沒翻又蒲妹翻四座股栗左右扶王登舟知訓乘輕舟逐之不及以鐵撾殺王親吏撾側瓜翻將佐無敢言者父溫皆不之知知訓及弟知詢皆不禮於徐知誥以知誥養子也為徐知諫附於知誥以奪知詢金陵張本知誥不至知訓怒曰乞子不欲酒欲劍乎又嘗與知誥飲伏甲欲殺之知諫躡知誥足躡尼輒翻知誥陽起如廁遁去知訓以劍授左右刁彥能使追殺之彥能馳騎及於中塗舉劍示知誥而還以不及告還從宣翻又如字還告知訓以追之不及也余謂楊渥徐知訓之於知誥皆知所惡者也平盧節度使同平章事諸道副都統朱瑾遣家妓通候問於知訓妓渠綺翻知訓強欲私之瑾已不平知訓惡瑾位加己上惡烏路翻置靜淮軍於泗州出瑾為靜淮節度使瑾益恨之然外事知訓愈謹瑾有所愛馬冬貯於幄夏貯於幬貯丁呂翻幬徒到翻今之葛罩紗罩是也又直由翻唐韻曰單帳也冬貯於幄欲其暖也夏貯於幬既欲其涼且隔蚊虻以養人者養畜可謂愛之過矣寵妓有絶色知訓過別瑾過音戈過瑾而言別瑾置酒自捧觴出寵妓使歌以所愛馬為壽知訓大喜瑾因延之中堂伏壯士於戶內出妻陶氏拜之路振九國志瑾妻陶氏雅之女也瑾以笏自後擊之踣地踣蒲北翻呼壯士出斬之瑾先繫二悍馬於廡下將圖知訓密令人解縱之馬相蹄齧廡罔甫翻蹄大計翻齧魚結翻聲甚厲以是外人莫之聞瑾提知訓首出知訓從者數百人皆散走瑾馳入府以首示吳王曰僕已為大王除害從才用翻為于偽翻下吾為同王懼以衣障面走入內曰舅自為之我不敢知吳王行密先娶朱氏與瑾同姓因呼之為舅婢子不足與成大事以知訓首擊柱挺劍將出挺待鼎翻拔也子城使翟虔等已闔府門勒兵討之乃自後踰城墜而折足翟虔徐溫親將也使之防衛吳王翟直格翻折而設翻吾為萬人除害以一身任患遂自剄任音壬剄古頂翻徐知誥在潤州聞難揚潤夾江相去五十餘里難乃旦翻即日引兵濟江考異曰吳録九國志徐鉉江南録知訓死知誥過江皆無日江南録曰先主聞亂即日以州兵渡江至廣陵會瑾自殺因撫定其衆十國紀年吳史六月乙卯瑾殺知訓踰城自殺戊午知誥入揚州代知訓執政己未誅瑾黨與廣本戊午知誥親吏馬仁裕聞知訓死自蒜山渡白知誥知誥即日帥兵入揚州撫定吏民按揚潤相去至近知誥豈得四日然後聞之今從江南録按徐知誥勉就潤州以俟變本宋齊丘之策也事見上卷三年因撫定軍府時徐溫諸子皆弱溫乃以知誥代知訓執吳政沈朱瑾尸於雷塘而滅其族沈持林翻瑾之殺知訓也泰寧節度使米志誠從十餘騎問瑾所向聞其已死乃歸宣諭使李儼貧而困寓居海陵李儼宣諭淮南見二百六十三卷唐昭宗天復二年皆殺之嚴可求恐志誠不受命詐稱袁州大破楚兵將吏皆入賀伏壯士於戟門擒志誠斬之並其諸子四年壬戌晉王自魏州勞軍於楊劉勞力到翻自泛舟測河水其深沒槍王謂諸將曰梁軍非有戰意但欲阻水以老我師當涉水攻之甲子王引親軍先涉諸軍隨之褰甲橫槍結陳而進是日水落深才及膝匡國節度使北面行營排陳使謝彥章帥衆臨岸拒之前書河陽節度使謝彥章此書匡國節度使蓋自河陽徙匡國也陳讀曰陳帥讀曰率乃稍引卻梁兵從之及中流鼓譟復進復扶又翻彥章不能支稍退登岸晉兵因而乘之梁兵大敗死傷不可勝紀臨岸與涉水者戰則據高者得其利俱戰于水中則勇者勝此謝彥章之所以敗也勝音升彥章僅以身免是日晉人遂陷濱河四寨四年蜀唐文扆既死太傅門下侍郎同平章事張格內不自安張格附唐文扆見上三年禮部尚書楊玢自恐失勢謂格曰玢方貧翻公有援立大功謂草表使諸公請立宗衍庚午貶格為茂州刺史玢為榮經尉吏部侍郎許寂戶部侍郎潘嶠皆坐格黨貶官格尋再貶維州司戶庾凝績奏徙格於合水鎮九域志邛州蒲江縣有合水鎮王宗侃妻以格同姓欲全之謂承郾母曰戒汝子勿為人報仇郾於建翻為于偽翻他日將歸罪於汝承郾從之凝績怒因公事抵承郾罪秋七月壬申朔蜀主以兼中書令王宗弼為巨鹿王宗瑤為臨淄王宗綰為臨洮王洮土刀翻宗播為臨潁王宗裔宗夔及兼侍中宗黯皆為琅邪郡王自典午渡江以來江左以琅邪之王為衣冠甲族故三人皆封琅邪甲戌以王宗侃為樂安王丙子以兵部尚書庾傳素為太子少保兼中書侍郎同平章事蜀主不親政事內外遷除皆出於王宗弼宗弼納賄多私上下咨怨宋光嗣通敏善希合希指迎合也蜀由是遂衰有政事則國強無政事則國衰衰者亡之漸也可不戒哉四年吳徐溫入朝于廣陵自升州入朝欲大行誅戮徐知誥嚴可求具陳徐知訓過惡所以致禍之由溫怒稍解乃命網瑾骨於雷塘而葬之徐溫審知罪在其子故葬朱瑾皆抵罪獨刁彥能屢有諫書溫賞之戊戌以知誥為淮南節度行軍副使內外馬步都軍副使通判府事考異曰按十國紀年六月乙卯知訓被殺至此四十四日吳之政事必有所出蓋知誥至廣陵即代知訓執吳政至此方除官耳以徐知諫權潤州團練事代知誥也總吳朝大綱朝直遙翻自餘庶政皆決於知誥知誥悉反知訓所為事吳王盡恭接士大夫以謙御衆以寬約身以儉以吳王之命悉蠲天祐十三年以前逋稅梁既篡唐淮南仍稱天祐至是歲為天祐十五年徐知誥蠲天祐十三年以前逋稅是年以後其逋者徵之謂天祐十四年逋租也納規諫除姦猾杜請託於是士民翕然歸心雖宿將悍夫無不悅服章十二行本服下有以宋齊丘為謀主七字乙十一行本同孔本同張校同退齋校同史言徐知訓之驕倨淫暴適為徐知誥之資悍下罕翻又侯旰翻先是吳有丁口錢又計畝輸錢錢重物輕民甚苦之先悉薦翻齊丘説知誥以為錢非耕桑所得今使民輸錢是教民棄本逐末也請蠲丁口錢程大昌演繁露曰今之丁錢即漢世算錢也以其計口輸錢故亦名口賦也漢四年初為算賦如淳曰漢儀注民年十五以上至五十六出賦錢人百二十為一算治庫兵車馬至文帝時人多丁衆則遂取高帝本額歲減三之二則一口一年輸錢止於四十也賈捐之曰文帝偃武行文民賦四十丁男三年而一事如淳曰常賦歲百二十歲一事文帝時天下民多故出賦四十凡三歲而一事此之謂賦即高帝時百二十至此而減為四十者也此之謂事即古法一歲一丁供役無過三日者是也民年十五以上雖未成丁亦輸口錢所謂民賦四十者也及已成丁則每歲當供三日之役者至此減為三年而才受一年之役也唐制成丁而就役不役則計日收其庸末世所謂丁口錢本此説式芮翻紬絹匹直千錢者當稅三千以直千錢之物當稅額之三千如此縣官歲失錢億萬計齊丘曰安有民富而國家貧者邪知誥從之由是江淮間曠土盡闢曠土空曠不耕之土國以富強知誥欲進用齊丘而徐溫惡之宋齊丘為徐知誥謀奪徐氏之政使溫知之豈特惡之而已蓋齊丘之為人輕佻褊躁溫以此惡之耳惡烏路翻殿直使之入直吳殿軍判官行軍判官也常至夜分屏語屏左右而與齊丘密語也水亭則四旁空闊無耳屬于垣之虞夜分夜半也屏必郢翻悉去屏障獨置大爐相向坐不言以鐵筯畫灰為字隨以匙滅去之去屏障所以防左右隱蔽其身而竊窺者去羌呂翻人莫得而知也四年虔州險固吳軍攻之久不下是年二月吳攻虔州王祺病吳以鎮南節度使劉信為虔州行營招討使未幾祺卒幾居豈翻談全播求救於吳越閩楚吳越王鏐以統軍使傳球為西南面行營應援使將兵二萬攻信州統軍使吳越所置官閩兵屯雩都以救之雩都漢古縣唐屬虔州九域志在州南一百七十里逆戰不利吳越兵圍其城刺史周本啓關張虛幕於門內召僚佐登城樓作樂宴飲飛矢雨集安坐不動吳越疑有伏兵中夜解圍去吳以前舒州刺史陳璋為東南面應援招討使將兵侵蘇湖侵蘇湖以牽制吳越救虔州之兵力按九域志汀州北至虔州四百八十里移兵屯汀州示將救虔也吳人辭以虔州之難間古莧翻難乃旦翻四年晉王謀大舉入寇周德威將幽州步騎三萬李存審將滄景步騎萬人李嗣源將邢洺步騎萬人王處直遣將將易定步騎萬人及麟勝雲蔚新武等州諸部落奚契丹室韋吐谷渾皆以兵會之八月並河東魏博之兵大閲於魏州兵莫難於用衆是舉也晉兵先敗周德威父子死焉晉王特危而後濟耳蔚音鬱四年蜀諸王皆領軍使彭王宗鼎謂其昆弟曰親王典兵禍亂之本今主少臣強才間將興少詩照翻間古莧翻繕甲訓士非吾輩所宜為也因固辭軍使蜀主許之但營書舍植松竹自娛而已史言王宗鼎為保身之謀而無維城之助四年泰寧節度使張萬進輕險好亂好呼到翻時嬖幸用事多求賂於萬進嬖卑義翻又博計翻萬進聞晉兵將出己酉遣使附于晉且求援以亳州團練使劉鄩為兗州安撫制置使將兵討之考異曰莊宗實録天祐十五年八月己酉張萬進歸款薛史末帝紀貞明五年三月癸未削奪張守進官爵命劉鄩為制置使十月下兗州族守進萬進傳云貞明四年七月叛五年冬拔其城劉鄩傳云五年萬進反冬拔其城莊宗實録萬進傳云劉鄩攻圍歷年屠其城莊宗列傳云天祐十五年八月萬進歸于我均王無實録紀傳多不同難以為據今以莊宗實録列傳為定四年甲子蜀順德皇后殂周氏蜀主建正室也四年乙丑蜀主以內給事王廷紹歐陽晃李周輅朱光葆宋承薀田魯儔等為將軍及軍使朱光葆當作宋光葆薀音蘊驕縱貪暴大為蜀患周庠切諫不聽周庠與蜀主建同起於兵間歷事多矣夜因風縱火焚西鄰軍營數百間明旦召匠廣其居蜀主亦不之問光葆光嗣之從弟也從才用翻四年晉王自魏州如楊劉引兵略鄆濮而還循河而上軍於麻家渡還從宣翻上時掌翻麻家渡蓋在濮州界賀王褱謝彥章將梁兵屯濮州北行臺村相持不戰凡言相持不戰度其力未足以相勝而各伺其勢之有可乘者也晉王好自引輕騎迫敵營挑戰危窘者數四好呼到翻挑徒了翻窘巨隕翻賴李紹榮力戰翼衛之得免趙王鎔及王處直皆遣使致書曰元元之命繫於王本朝中興繫於王本朝謂唐也朝直遙翻王笑謂使者曰定天下者非百戰何由得之安可深居帷房以自肥乎晉王此語謂王鎔也然王鎔志守祖父業自豢養而已晉王則志於滅梁以雪讎恥者也及梁既滅莊宗之志滿矣馳騁田獵意以為不居帷房以自肥不知以帷房自禍也一旦王將出營都營使李存審扣馬泣諫曰大王當為天下自重彼先登陷陳將士之職也都營使都總行營之事一時署置之官名也為于偽翻下王為之同陳讀曰陳非大王之事也王為之攬轡而還他日伺存審不在策馬急出顧謂左右曰老子妨人戲以戰為戲何晉王之輕也至聞嗣源入大梁又何其衰也歟伺相吏翻王以數百騎抵梁營謝彥章伏精甲五千於隄下王引十餘騎度隄伏兵發圍王數十重重直龍翻王力戰於中後騎繼至者攻之於外僅得出會李存審救至梁兵乃退王始以存審之言為忠史言晉王勇而輕屢經危殆其得免者幸也然再危而再免者皆李存審援兵之力謂老子妨人戲可乎四年吳劉信遣其將張宣等夜將兵三千襲楚將張可求於古亭破之又遣梁詮等章十二行本等下有將兵二字乙十一行本同孔本同張校同擊吳越及閩兵二國聞楚兵敗俱引歸虔州之勢孤矣詮且緣翻四年梅山蠻寇邵州梅山蠻居邵州界宋熙寧五年開置新化縣在邵州東北二百五十里四年九月壬午蜀內樞密使宋光嗣以判六軍讓兼中書令王宗弼蜀主許之四年吳劉信晝夜急攻虔州斬首數千級不能克使人説談全播取質納賂而還説式芮翻質音致還從宣翻又如字徐溫大怒杖信使者信子英彥典親兵溫授英彥兵三千曰汝父居上遊之地將十倍之衆劉信本鎮洪州南江自洪州至湖口馬當而會于大江廣陵當江之下流是信所居者上遊之地也時淮南攻虔之兵十倍於虔人是反也汝可以此兵往與父同反又使升州牙內指揮使朱景瑜與之俱曰全播守卒皆農夫飢窘踰年妻子在外重圍既解重直龍翻相賀而去聞大兵再往必皆逃遁全播所守者空城耳往必克之史言徐溫既能御將又能料敵四年冬十一月壬申蜀葬神武聖文孝德明惠皇帝于永陵廟號高祖四年越主巖祀南郊大赦改國號曰漢四年劉信聞徐溫之言大懼引兵還擊虔州先鋒始至虔兵皆潰果如徐溫所料追執之唐僖宗光啓元年談全播推盧光稠據虔州中更二姓及全播自為之而亡領百勝節度使先是吳越王鏐常自虔州入貢至是道絶吳越自虔州道入貢詳見上卷二年今虔州入于吳故道絶先悉薦翻抵大梁此即閩越入貢大梁水程也但吳越必就許浦或定海就舟水程比閩為近耳四年初吳徐溫自以權重而位卑説吳王曰今大王與諸將皆為節度使雖有都統之名不足相臨制唐授吳王行密諸道行營都統其子渥隆演嗣位皆宣諭使李儼承制授之稱帝而治王不許嚴可求屢勸溫以次子知詢代徐知誥知吳政知誥與駱知祥謀出可求為楚州刺史可求既受命至金陵見溫説之曰説式芮翻吾奉唐正朔常以興復為辭今朱李方爭朱氏日衰李氏日熾一旦李氏有天下吾能北面為之臣乎不若先建吳國以繫民望溫大悅復留可求復扶又翻參總庶政使草具禮儀草具建國儀注去羌呂翻乃以女妻其子續妻千細翻其後嚴續遂相南唐四年晉王欲趣大梁趣七喻翻下同而梁軍扼其前堅壁不戰百餘日十二月庚子朔晉王進兵距梁軍十里而舍自麻家渡進兵逼行臺村初北面行營招討使賀王褱善將步兵排陳使謝彥章善將騎兵王褱惡其與己齊名史言賀王褱忌能以誤國事惡烏路翻王褱與彥章治兵於野治直之翻王褱指一高地曰此可以立柵至是晉軍適置柵於其上王褱疑彥章與晉通謀王褱屢欲戰謂彥章曰主上悉以國兵授吾二人社稷是賴今強寇壓吾門而逗遛不戰可乎彥章曰強寇憑陵利在速戰今深溝高壘據其津要彼安敢深入若輕與之戰萬一蹉跌則大事去矣謝彥章欲持久以老晉師賀王褱欲決勝負於一戰以此觀之其智識固有間矣蹉七何翻跌徒結翻王褱密譖之於帝與行營馬步都虞候曹州刺史朱圭謀因享士伏甲殺彥章及濮州刺史孟審澄別將侯溫裕以謀叛聞誣謝彥章等以謀叛聞奏於上亦騎將之良者也梁之騎將皆死獨王彥章在耳丁未以朱圭為匡國留後癸丑又以為平盧節度使兼行營馬步副指揮使以賞之賀王褱為之請也晉王聞彥章死喜曰彼將帥自相魚肉亡無日矣將即亮翻帥所類翻賀王褱殘虐失士卒心我若引兵直指其國都國都謂大梁幸而一與之戰蔑不勝矣王欲自將萬騎直趣大梁周德威曰梁人雖屠上將謂殺謝彥章也輕行徼利未見其福徼一遙翻不從戊午下令軍中老弱悉歸魏州起師趨汴趨七喻翻庚申毀營而進衆號十萬四年辛酉蜀改明年元曰乾德四年賀王褱聞晉王已西自行臺村趨大梁為自東徂西晉王發魏博白丁三萬從軍以供營柵之役所至營柵立成壬戌至胡柳陂胡柳陂在濮州西臨濮縣界癸亥候者言梁兵自後至矣周德威曰賊倍道而來未有所舍我營柵已固守備有餘既深入敵境動須萬全不可輕發此去大梁至近梁兵各念其家內懷憤激不以方略制之恐難得志王宜按兵勿戰德威請以騎兵擾之使彼不得休息至暮營壘未立樵爨未具乘其疲乏可一舉滅也此周德威所以破王景仁者也若晉王能用之賀王褱必不能支梁事去矣豈必待李嗣源取東平哉前在河上恨不見賊今賊至不擊尚復何待復扶又翻公何怯也顧李存審曰敕輜重先發吾為爾殿後破賊而去重直用翻為于偽翻殿丁練翻即以親軍先出德威不得已引幽州兵從之晉王既先出周德威若不以兵從之則為顧望不進此誠有不得已者矣史言其心吾無死所矣賀王褱結陳而至橫亙數十里王帥銀槍都陷其陳陳讀曰陳下同帥讀曰率衝蕩擊斬往返十餘里行營左廂馬軍都指揮使鄭州防禦使王彥章軍先敗西走趣濮陽梁之騎兵先敗走趣七喻翻下同望見梁旗幟驚潰晉輜重見梁騎兵西嚮謂其來犯故驚而潰幽州兵亦擾亂自相蹈藉藉慈夜翻周德威不能制父子皆戰死陳既擾亂周德威雖勇一夫敵耳亦死晉兵無復部伍梁兵四集勢甚盛晉王據高丘收散兵至日中軍復振據高丘則散兵望旗聞鼓而集故其軍復振復振者言其師徒已橈敗復振迅而起也賀王褱引兵據之晉王謂將士曰今日得此山者勝吾與汝曹奪之即引騎兵先登李從珂與銀槍大將王嚴王改李下同建及以步卒繼之梁兵紛紛而下遂奪其山用兵之勢據高以臨下者勝晉兵既奪土山賀王褱失地利矣珂丘何翻日向晡晡奔謨翻賀王褱陳於山西晉兵望之有懼色諸將以為諸軍未盡集不若斂兵還營詰朝復戰詰去吉翻復扶又翻天平節度使東南面招討使閻寶曰王彥章騎兵已入濮陽言王彥章所領騎兵已敗而西去山下謂土山之下此即指言賀王褱陳於山西之兵我乘高趣下擊之破之必矣今王深入敵境偏師不利謂周德威之兵喪敗必為所乘復扶又翻下同諸軍未集者聞梁再克必不戰自潰凡決勝料敵惟觀情勢情勢已得斷在不疑斷丁亂翻王之成敗在此一戰若不決力取勝縱收餘衆北歸河朔非王有也言晉大舉而敗退梁兵乘勝渡河則河朔必望風而歸梁賊無營壘日晚思歸但以精騎擾之使不得夕食俟其引退追擊可破也我若斂兵還營彼歸整衆復來勝負未可知也王建及擐甲橫槊而進擐音宦曰賊大將已遁大將指王彥章今擊此疲乏之衆如拉朽耳拉盧合翻王但登山觀臣為王破賊王愕然曰非公等言吾幾誤計為于偽翻幾居依翻嗣昭建及以騎兵大呼陷陳呼火故翻諸軍繼之梁兵大敗元城令吳瓊貴鄉令胡裝各帥白丁萬人於山下曳柴揚塵鼓譟以助其勢梁兵自相騰藉棄甲山積死亡者幾三萬人帥讀曰率幾居依翻裝證之曾孫也胡證在唐歷事憲穆位通顯家富於財證音正兩軍所喪士卒各三之二皆不能振此所謂俱傷而兩敗也喪息浪翻下喪吾同晉王還營聞周德威父子死哭之慟曰喪吾良將是吾罪也以其子幽州中軍兵馬使光輔為嵐州刺史晉王悔不用周德威之言致其戰死故罪己而擢其子嵐盧含翻李嗣源與李從珂相失見晉軍橈敗橈奴教翻勢屈為橈不知王所之或曰王以北渡河矣以當作已章乙十一行本正作已孔本同將之相州欲自相州歸邢州相息亮翻從珂從王奪山謂奪土山也甲子晉王進攻濮陽拔之九域志濮陽縣在濮州西九十里按唐志濮陽屬濮州九域志為澶州治所唐澶州治頓丘縣宋熙寧六年省頓丘入清豐縣清豐縣在澶州北六十里縣有舊州鎮即澶州所治頓丘城也蓋五代以前濮陽在河南而九域志之濮陽晉天福四年移就澶州南郭者也復來見王於濮陽王不悅曰公以吾為死邪渡河安之嗣源頓首謝罪王以從珂有功但賜大鍾酒以罰之自是待嗣源稍薄四年初契丹主之弟撒剌阿撥撒山割翻剌來葛翻號北大王謀作亂於其國事覺契丹主數之曰汝與吾如手足數所具翻兄弟之親如手如足而汝興此心我若殺汝則與汝何異乃囚之期年而釋之撒剌阿撥帥其衆奔晉帥讀曰率晉王厚遇之養為假子任為刺史官之為刺史而不釐務以其妻子來奔晉軍至德勝渡德勝渡在濮州北河津之要也曰晉人戰勝將至矣頃之晉兵有先至大梁問次舍者此亦晉之散兵也帝驅市人登城又欲奔洛陽遇夜而止敗卒至者不滿千人傷夷逃散各歸鄉里月餘僅能成軍五年五年春正月辛巳蜀主祀南郊大赦五年晉李存審於德勝南北章十二行本北下有夾河二字乙十一行本同孔本同張校同退齋校同築兩城而守之唐澶州治頓丘縣自築德勝南北城及晉天福三年遂移澶州及頓丘縣於德勝以防河津懼契丹南牧也宋景德澶淵之役猶在德勝熙寧以來澶州治濮陽又非石晉所移之地晉王還魏州遣李嗣昭權知幽州軍府事五年漢主巖立越國夫人馬氏為皇后殷之女也巖逆婦于楚見上卷元年五年三月丙戌蜀北路行營都招討武德節度使王宗播等自散關擊岐渡渭水此寶雞渭河也會大雨而還還從宣翻又如字分兵戍興元鳳州及威武城威武城在鳳州北蜀所築也戊子天雄節度使同平章事王宗昱攻隴州不克五年蜀主奢縱無度日與太后太遊宴於貴臣之家及遊近郡名山飲酒賦詩所費不可勝紀勝音升仗內教坊使嚴旭強取士民女子內宮中或得厚賂而免之以是纍遷至蓬州刺史太后太各出教令賣刺史令録等官令縣令録録事參軍數人爭納賂賂多者得之史言蜀朝政濁亂五年晉王自領盧龍節度使周德威死難其代且北邊大鎮士馬強鋭故自領之代李嗣昭以宦者代功臣失之矣宦者也本姓馬晉王賜姓名使與知嵐州事孟知祥俱為章十二行本為下有河東魏博四字乙十一行本同孔本同張校同退齋校同中門使知祥又薦教練使鴈門郭崇韜能治劇治直之翻王以為中門副使崇韜倜儻有智略倜他狄翻臨事敢決王寵待日隆郭崇韜由此佐晉王滅梁中門使吳圭張虔厚相繼獲罪吳圭薛史作吳珙先悉薦翻知祥懼禍稱疾辭位王乃以知祥為河東馬步都虞候自是崇韜專典機密為郭崇韜德孟知祥薦之帥蜀張本五年詔吳越王鏐大舉討淮南鏐以節度副大使傳瓘為諸軍都指揮使帥戰艦五百艘自東洲擊吳自常州東洲出海復泝江而入以擊吳帥讀曰率下同艦戶黯翻艘蘇遭翻五年吳徐溫帥將吏藩鎮請吳王稱帝吳王不許夏四月戊戌朔即吳國王位大赦改元武義建宗廟社稷置百官宮殿文物皆用天子禮以金繼土唐土行也吳欲繼唐故言以金德王改諡武忠王曰孝武王廟號太祖楊行密初諡武忠王楊渥初諡威王以徐溫為大丞相都督中外諸軍事諸道都統鎮海寧國節度使守太尉兼中書令東海郡王以徐知誥為左僕射參政事兼知內外諸軍事仍領江州團練使以揚府左司馬王令謀為內樞使吳都廣陵故謂揚州為楊府鹽鐵判官駱知祥為中書侍郎前中書舍人盧擇為吏部尚書兼太常卿前中書舍人蓋唐官也館驛巡官遊恭為知制誥前駕部員外郎楊迢為給事中擇醴泉人迢敬之之孫也敬之楊憑弟子也五年錢傳瓘與彭彥章遇傳瓘命每船皆載灰豆及沙乙巳戰于狼山江今通州靜海縣南五里有狼山山外即大江絶江南渡舟行八十里抵蘇州界自江順流出大海傳瓘引舟避之既過自後隨之自後隨之則風為傳瓘用陳侯瑱破王琳亦如此傳瓘使順風揚灰吳人不能開目及船舷相接舷胡田翻船邊也傳瓘使散沙於己船而散豆於吳船豆為戰血所漬吳人踐之皆僵仆漬疾智翻踐慈演翻僵居良翻傳瓘因縱火焚吳船吳兵大敗彥章戰甚力兵盡繼之以木身被數十創被皮義翻創初良翻陳汾按兵不救彥章知不免遂自殺傳瓘俘吳裨將七十人斬首千餘級吳章十二行本吳上有焚戰艦四百艘六字乙十一行本同孔本同張校同人誅汾籍沒家資以其半賜彥章家稟其妻子終身稟筆錦翻給也五年賀王褱攻德勝南城百道俱進以竹笮聯艨艟十餘艘蒙以牛革設睥睨戰格如城狀笮才各翻竹索也艨艟即蒙衝戰艦也城上短垣謂之睥睨睥匹計翻睨五計翻橫於河流以斷晉之救兵使不得渡斷音短晉王自引兵馳往救之陳於北岸不能進陳讀曰陳遣善遊者馬破龍入南城見守將氏延賞延賞言矢石將盡陷在頃刻晉王積金帛於軍門募能破艨艟者衆莫知為計親將李建及曰李建及即王建及時為銀槍大將銀槍晉王帳前親兵也故曰親將建及少事李罕之為養子後復姓王故史或書李建及或書王建及賀王褱悉衆而來冀此一舉若我軍不渡則彼為得計今日之事建及請以死決之乃選效節敢死士得三百人被鎧操斧被皮義翻操七刀翻帥之乘舟而進帥讀曰率將至艨艟流矢雨集建及使操斧者入艨艟間斧其竹笮又以木罌載薪沃油然火於上流縱之木罌蓋即用韓信舊法漢書注所載者為之操七刀翻罌於耕翻鼓譟攻之艨艟既斷隨流而下梁兵焚溺者殆半晉兵乃得渡王褱解圍走晉兵逐之至濮州而還德勝至濮州九十里還從宣翻又如字王褱五年蜀主命天策府諸將無得亶離屯戍離力智翻五月丁卯朔左散旗軍使王承諤承勳承會違命蜀主皆原之散悉但翻原者赦其罪也自是禁令不行五年楚人攻荊南高季昌求救于吳吳命鎮南節度使劉信等帥洪吉撫信步兵自瀏陽趣潭州帥讀曰率下同九域志瀏陽西南至潭州一百六十里瀏力求翻又音柳趣七喻翻武昌節度使李簡等帥水軍攻復州自鄂州以水軍攻復州由大江入漢口泝漢而上楚兵釋荊南引歸簡等入復州執其知州鮑唐五年六月吳人敗吳越兵于沙山敗補邁翻五年秋七月吳越王鏐遣錢傳瓘將兵三萬攻吳常州徐溫帥諸將拒之右雄武統軍陳璋以水軍下海門出其後海門在今通州東海門縣界大江至此入海遵海東南則太湖入海之口舟行由此入太湖可以達常州之東洲壬申戰于無錫會溫病熱不能治軍治直之翻吳越攻中軍飛矢雨集鎮海節度判官陳彥謙遷中軍旗鼓于左取貌類溫者擐甲胄號令軍事溫得少息俄頃疾稍間間如字時久旱草枯吳人乘風縱火吳越兵亂遂大敗殺其將何逢吳建斬首萬級傳瓘遁去追至山南復敗之復扶又翻敗補邁翻下同陳璋敗吳越于香彎溫募生獲叛將陳紹者賞錢百萬指揮使崔彥章獲之紹勇而多謀溫復使之典兵霍丘之役陳紹之功居多溫不討其外叛之罪而念其功故復使之典兵初衣錦之役見二百六十八卷乾化三年指揮之下當有使字厚遇之遣間使告之曰間古莧翻使汝不得志而去吾之過也汝無以妻子為念及是役筠復奔吳溫自數昔日不用筠言者三數所具翻而不問筠去來之罪歸其田宅復其軍職筠內愧而卒史言徐溫能御將知誥請帥步卒二千易吳越旗幟鎧仗躡敗卒而東襲取蘇州躡尼輒翻溫曰爾策固善然吾且求息兵未暇如汝言也諸將皆以為吳越所恃者舟楫今大旱水道涸此天亡之時也宜盡步騎之勢一舉滅之溫歎曰天下離亂久矣民困已甚錢公亦未易可輕若連兵不解方為諸君之憂今戰勝以懼之戢兵以懷之使兩地之民各安其業君臣高枕豈不樂哉易以豉翻戢則立翻枕職任翻樂音洛史言徐溫能保勝安民多殺何為遂引還還從宣翻又如字吳越王鏐見何逢馬悲不自勝故將士心附之勝音升史言錢鏐亦能結士心以保其國錢楊之勢所以莫能相尚也寵姬鄭氏父犯法當死左右為之請為于偽翻鏐曰豈可以一婦人亂我法出其女而斬之鏐自少在軍中少詩照翻夜未嘗寐倦極則就圓木小枕或枕大鈴寐熟輒欹而寤名曰警枕或枕職任翻記少儀茵席枕几熲鄭氏注曰熲警枕也孔穎達疏云以經枕外別言穎穎是穎發之義故為警枕余謂錢鏐枕圓木小枕或枕大鈴令欹而寤名曰警枕彼豈知有禮記注疏哉英雄之心雖寤寐之間不忘自警其暗與古合有如此者置粉盤于臥內有所記則書盤中比老不倦比必利翻及也或寢方酣外有白事者令侍女振紙即寤時彈銅丸於樓牆之外以警直更者直更者即持更之卒也更工衡翻夜叩北城門吏不肯啓關曰雖大王來亦不可啓乃自他門入明日召北門吏厚賜之史言錢鏐之公勤皆所以保其國五年丙戌吳王立其弟濛為廬江郡公溥為丹陽郡公潯為新安郡公徹為鄱陽郡公子繼明為廬陵郡公五年晉王歸晉陽以巡官馮道為掌書記中門使郭崇韜以諸將陪食者衆請省其數晉王與諸將同甘苦凡食召諸將侍食必有不當預而預者故郭崇韜請省之省所景翻減也孤為效死者設食為于偽翻亦不得專可令軍中別擇河北帥孤自歸太原帥所類翻即召馮道令草詞以示衆道執筆逡巡不為逡七倫翻曰大王方平河南定天下崇韜所請未至大過大讀曰太大王不從可矣何必以此驚動遠近使敵國聞之謂大王君臣不和非所以隆威望也會崇韜入謝王乃止五年初唐滅高麗唐高宗時滅高麗麗力知翻又力兮翻高麗石窟寺眇僧躬乂聚衆據開州稱王眇僧僧之眇目者此開州高麗所置在平壤之東今高麗以為國都謂之開城府亦曰蜀莫郡其地左溪右山眇彌沼翻考異曰薛史唐餘録歐陽史皆云唐末其國自立王前王姓高氏後王王建此據十國紀年至是遣佐良尉金立奇入貢于吳五年八月乙未朔宣義節度使賀王褱卒以開封尹王瓚為北面行營招討使代賀王褱也瓚藏旱翻自黎陽渡河掩擊澶魏至頓丘遇晉兵而旋初欲掩其不備遇晉兵而退旋與還同令行禁止治直吏翻據晉人上遊十八里楊村據德勝上遊也運洛陽竹木造浮橋自滑州饋運相繼晉蕃漢馬步副總管振武節度使李存進亦造浮梁於德勝或曰浮梁須竹笮鐵牛石囷竹笮所以維浮梁鐵牛石囷所以繫竹笮囷區倫翻何以能成存進不聽以葦笮維巨艦繫於土山巨木踰月而成人服其智五年吳徐溫遣使以吳王書歸無錫之俘於吳越吳越王鏐亦遣使請和於吳無錫之戰吳越兵敗走徐溫不窮追講和之計固已定於胸中矣三十餘州民樂業者二十餘年史言息兵之利是時吳有揚楚泗滁和光黃舒蘄廬壽濠海潤常升宣歙池饒信江鄂洪撫袁吉虔等州勸鏐自王其國遺唯季翻王于況翻鏐不從五年九月丙寅詔削劉巖官爵命吳越王鏐討之以劉巖稱大號而職貢不入也竟不行受命者不逆梁之意不行者不肯自弊其力以伐與國此割據者之常計也五年吳廬江公濛有材氣常歎曰我國家而為他人所有可乎徐溫聞而惡之為濛見殺張本惡烏路翻鄧廣銘標點聶崇岐覆校
