body:
  text: 資治通鑑卷第一百九十九端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀十五太宗文武大聖大廣孝皇帝下之下貞觀二十二年貞觀二十二年戊申六四八觀古玩翻貞觀二十二年夏四月丁巳右武候將軍梁建方擊松外蠻破之松外諸蠻依阻山谷亦屬古南中之地蓋以其在松州之外而得名也新志松外蠻在巂州昌明縣徼外初巂州都督劉伯英上言松外諸蠻暫降復叛請出師討之以通西洱天竺之道此即漢武帝欲通之道而為昆明所蔽者也巂州漢邛都夷之地武帝開置越巂郡後周武帝置嚴州唐為巂州巂音髓上時掌翻暫與暫同降戶江翻復扶又翻洱乃吏翻十三州益眉榮梓利綿遂巴盧渠達集渝也酋慈由翻帥讀曰率下同建方擊敗之敗補邁翻殺獲千餘人㣥蠻震懾亡竄山谷建方分遣使者諭以利害懾之涉翻使疏吏翻皆來歸附前後至者七十部戶十萬九千三百建方署其酋長蒙和等為縣令長知兩翻下同各統所部莫不感悅因遣使詣西洱河新書曰西洱河蠻道由郎州走三千里時建方自巂州道千五百里遣奇兵奄至其地具船將遁使者曉諭以威信盛遂請降帥所類翻降戶江翻其地有楊李趙董等數十姓各據一州大者六百小者二三百戶無大君長不相統一語雖小訛其生業風俗大略與中國同自云本皆華人其所異者以十二月為歲首貞觀二十二年己未契丹辱紇主曲據帥衆內附奚契丹酋領皆稱為辱紇主契欺訖翻又音喫帥讀曰率以曲據為刺史隸營州都督府貞觀二十二年甲子烏胡鎮將古神感烏胡鎮當置於海中烏胡島自登州東北海行過大謝島龜歆島淤島而後至烏湖島又三百里北渡烏湖海姓譜周太王去邠適岐稱古公因氏焉遇高麗步騎五千戰於易山破之易山新書作曷山將即亮翻麗力知翻騎奇寄翻高麗萬餘人襲神感船神感設伏又破之而還還從宣翻又如字貞觀二十二年初西突厥乙毗咄陸可汗厥九勿翻咄當沒翻可從刊入聲汗音寒以阿史那賀魯為葉護居多邏斯水在西州北千五百里邏郎佐翻統處月處密始蘇歌邏祿失畢五姓之衆乙毗咄陸奔吐火羅見一百九十六卷十六年部落亡散乙亥賀魯帥其餘衆數千帳內屬詔處之於庭州莫賀城庭州西延城西六十里有沙鉢城守捉蓋即莫賀城也以賀魯後立為沙鉢羅葉護可汗故改城名也處昌呂翻驍堅堯翻賀魯聞唐兵討龜茲請為鄉導龜茲音丘慈鄉讀曰嚮仍從數十騎入朝朝直遙翻上以為崑丘道行軍總管厚宴賜而遣之為賀魯後叛張本貞觀二十二年五月庚子右衛率長史王玄策擊帝那伏帝王阿羅那順大破之東宮十率府各有長史正七品上新書作那伏帝阿羅那順無王字率所律翻初中天竺王尸羅逸多兵最強四天竺皆臣之天竺國漢身毒國也或曰摩伽陀或曰婆羅門去京師九千六百里居蔥嶺南幅員三萬里分東西南北中五天竺南天竺瀕海北天竺距雪山東天竺際海與扶南林邑接西天竺與罽賓波斯接中天竺在四天竺之會都城曰茶餺和羅城杜佑曰天竺塞種也顏師古曰塞釋也諸國皆遣使入貢會尸羅逸多卒國中大亂其臣阿羅那順自立發胡兵攻玄策玄策帥從者三十人與戰使疏吏翻卒子恤翻帥讀曰率從才用翻力不敵悉為所擒阿羅那順盡掠諸國貢物玄策脫身宵遁抵吐蕃西境以書徵鄰國兵吐蕃遣精鋭千二百人泥婆國遣七千餘騎赴之泥婆羅國直吐蕃之西樂陵川臣於吐蕃吐從暾入聲騎奇寄翻帥讀曰率餺音博新書曰茶餺和羅城濱伽毗黎河連戰三日大破之斬首三千餘級赴水溺死者且萬人溺奴狄翻阿羅那順棄城走更收餘衆還與師仁戰又破之擒阿羅那順餘衆奉其及王子阻乾陀衛江水經注曰崑崙山釋氏曰阿耨達山河水出其東北陬屈從其東南流注于蒲昌海自蒲昌海潛行地下南出積石而為中國河其崑崙山西有大水出焉曰新頭河西南流徑烏長國又東南流徑中天竺國亦曰恆河又西徑四大塔北又西徑陀衛國北所謂乾陀衛江蓋即此也衆潰獲其及王子虜男女萬二千人於是天竺響震城邑聚落降者五百八十餘所降戶江翻俘阿羅那順以歸以玄策為朝散大夫唐制文散階朝散大夫從五品下朝直遙翻散悉亶翻貞觀二十二年六月乙丑以白霫部為居延州霫而立翻貞觀二十二年癸酉特進宋公蕭瑀卒太常議諡曰德尚書議諡曰肅周公諡法剛德克就曰肅諡時利翻諡者行之迹當得其實行下孟翻可諡曰貞褊公賀琛諡法直道不橈曰貞儉嗇無德曰褊心隘政急曰褊尚上女襄城公主上欲為之營第為于偽翻公主固辭曰婦事舅姑當朝夕侍側若居別第所闕多矣上乃命即瑀第而營之貞觀二十二年上以高麗困弊議以明年發三十萬衆一舉滅之或以為大軍東征須備經歲之糧非畜乘所能載宜具舟艦為水運隋末劍南獨無寇盜屬者遼東之役劍南復不預及畜許救翻乘繩證翻艦戶黯翻屬之欲翻復扶又翻其百姓富庶宜使之造舟艦上從之秋七月遣右領左右府長史強偉領左右府亦分為左右各有長史此即左右千牛府也強其兩翻姓也大者或長百尺其廣半之別遣使行水道長直亮翻行下孟翻自巫峽抵江揚趣萊州趣七喻翻貞觀二十二年庚寅西突厥相屈利啜請帥所部從討龜茲相息亮翻屈居勿翻啜陟劣翻帥讀曰率貞觀二十二年初左武衛將軍武連縣公武安李君羡直玄武門武連縣時屬始州始州後改劍州武安縣漢屬魏郡晉屬廣平郡後周隋屬洺州左右武衛將軍乃南牙諸衛將軍直玄武門則掌北門宿衛太史占云女主昌民間又傳祕記云唐三世之後女主武王代有天下上惡之見賢遍翻惡烏路翻下深惡同會與諸武臣宴宮中行酒令行酒令者一人為令伯餘人以次行之下文使各言小名即酒令也君羡自言名五娘上愕然因笑曰何物女子乃爾勇健又以君羡官稱封邑皆有武字深惡之後出為華州刺史華戶化翻有布衣員道信自言能絶粒曉佛法君羡深敬信之數相從屏人語員音運姓也數所角翻屏必郢翻御史奏君羡與妖人交通謀不軌妖於喬翻壬辰君羡坐誅籍沒其家上密問太史令李淳風祕記所云信有之乎對曰臣仰稽天象俯察曆數其人已在陛下宮中為親屬自今不過三十年當王天下王于況翻殺唐子孫殆盡其兆既成矣上曰疑似者盡殺之何如對曰天之所命人不能違也王者不死徒多殺無辜且自今以往三十年其人已老庶幾頗有慈心為禍或淺幾居希翻今借使得而殺之天或生壯者肆其怨毒恐陛下子孫無遺類矣上乃止貞觀二十二年司空梁文昭公房玄齡留守京師守手又翻疾篤上徵赴玉華宮肩輿入殿至御座側乃下相對流涕因留宮下聞其小愈則喜形於色加劇則憂悴悴秦醉翻玄齡謂諸子曰吾受主上厚恩今天下無事唯東征未已㣥臣莫敢諫吾知而不言死有餘責乃上表諫上時掌翻以為老子曰知足不辱知止不殆陛下功名威德亦可足矣拓地開疆亦可止矣且陛下每決一重囚必令三覆五奏進素膳止音樂者見一百九十三卷五年今驅無罪之士卒委之鋒刃之下使肝腦塗地獨不足愍乎明謹用刑重人命也踴躍用兵則忘人命之為重矣引彼形此玄齡之言可謂深切著明誅之可也侵擾百姓滅之可也他日能為中國患除之可也今無此三條而坐煩中國內為前代雪恥外為新羅報讎豈非所存者小所損者大乎説到此分明見得高麗不必征當時在朝之臣諫東征者未有能及此者也此是忠誠懇切中流出為于偽翻焚陵波之船罷應募之衆自然華夷慶賴遠肅邇安臣旦夕入地儻蒙録此哀鳴論語曾子有疾孟敬子問之曾子言曰鳥之將死其鳴也哀人之將死其言也善玄齡子遺愛尚上女高陽公主上謂公主曰彼病篤如此尚能憂我國家上自臨視握手與訣悲不自勝勝音升癸卯薨柳芳曰玄齡佐太宗定天下及終相位凡三十二年天下號為賢相相息亮翻然無迹可尋德亦至矣故太宗定禍亂而房杜不言功王魏善諫諍而房杜讓其賢英衛善將兵而房杜行其道新贊作房杜濟以文將即亮翻善歸人主為唐宗臣宜哉貞觀二十二年八月己酉朔日有食之貞觀二十二年丁丑敕越州都督府及婺洪等州造海船及雙舫千一百艘東陽郡隋平陳置婺州舫甫妄翻艘蘇遭翻貞觀二十二年辛未遣左領軍大將軍執失思力出金山道擊薛延陀餘寇貞觀二十二年九月庚辰崑丘道行軍大總管阿史那社爾擊處月處密破之餘衆悉降降戶江翻貞觀二十二年癸未薛萬徹等伐高麗還還從宣翻又如字萬徹在軍中使氣陵物裴行方奏其怨望坐除名流象州裴行方副萬徹東伐見上卷上年象州漢潭中中溜縣之地隋為始安郡桂林縣唐武德四年置象州桂林郡以象山名州貞觀二十二年己丑新羅奏為百濟所攻破其十三城貞觀二十二年己亥以黃門侍郎褚遂良為中書令貞觀二十二年強偉等發民造船役及山獠雅邛眉三州獠反強其兩翻邛渠容翻獠魯皓翻壬寅遣茂州都督張士貴右衛將軍梁建方發隴右峽中兵二萬餘人以擊之蜀人苦造船之役或乞輸直雇潭州人造船上許之州縣督迫嚴急民至賣田宅鬻子女不能供穀價踊貴劍外騷然自劍門關以南謂之劍外內京師而外諸夏也遣司農少卿長孫知人馳驛往視之知人奏稱蜀人脆弱不耐勞劇脆此芮翻大船一艘庸絹二千二百三十六匹山谷已伐之木挽曳未畢復徵船庸艘蘇遭翻復扶又翻二事人併集民不能堪宜加存養上乃敕潭州船庸皆從官給貞觀二十二年冬十月癸丑車駕還京師貞觀二十二年回紇吐迷度兄子烏紇蒸其叔母紇下沒翻烏紇與俱陸莫賀達官俱羅勃皆突厥車鼻可汗之壻也相與謀殺吐迷度以歸車鼻烏紇夜引十餘騎襲吐迷度殺之燕然副都護元禮臣使人誘烏紇許奏以為瀚海都督烏紇輕騎詣禮臣謝禮臣執而斬之以聞燕因肩翻誘音酉騎奇寄翻上恐回紇部落離散遣兵部尚書崔敦禮往安撫之久之俱羅勃入見上留之不遣回紇由是又微見賢遍翻貞觀二十二年阿史那社爾既破處月處密引兵自焉耆之西趨龜茲北境趨七喻翻分兵為五道出其不意焉耆王薛婆阿那支棄城奔龜茲保其東境社爾遣兵追擊擒而斬之十六年郭孝恪破焉耆立栗婆準為王而阿那支殺之今也罪人斯得新書曰立突騎支弟婆伽利為王此從舊書從才用翻龜茲大震守將多棄城走社爾進屯磧口去其都城三百里磧口新舊書作磧石龜茲都伊邏盧城北倚白山亦曰阿羯田山將即亮翻磧七迹翻帥讀曰率下同騎奇寄翻右衛將軍曹繼叔次之至多褐城龜茲王訶利布失畢其相那利羯獵顛帥衆五萬拒戰相息亮翻羯居謁翻鋒刃甫接威引兵偽遁龜茲悉衆追之行三十里與繼叔軍合龜茲懼將卻繼叔乘之龜茲大敗逐北八十里貞觀二十二年甲戌以回紇吐迷度子前左屯衛大將軍婆閏為左驍衛大將軍大俟利發瀚海都督驍堅堯翻俟渠之翻考異曰舊回紇傳云詔西突厥可汗阿史那賀魯統五啜五俟斤二十餘部居多羅斯水南去西州馬行十五日程回紇不肯西屬突厥按賀魯時為將軍自多邏斯水入居庭州永徽二年乃西遁自稱可汗所統咄陸五啜弩失畢五俟斤唐未嘗以回紇隸之也今不取貞觀二十二年十一月庚子契丹帥窟哥奚帥可度者並帥所部內屬帥所類翻下別帥同並帥讀曰率以契丹部為松漠府杜佑曰松漠之地在柳城郡之北又以其別帥達稽等部為峭落等九州各以其辱紇主為刺史峭落州無逢州羽陵州白連州徒何州萬丹州匹黎州赤山州並松漠府為九州峭七笑翻以可度者為都督樂音洛又以其別帥阿會等部為弱水等五州亦各以其辱紇主為刺史弱水州祁黎州洛王褱州太魯州渴野州辛丑置東夷校尉官於營州校戶教翻貞觀二十二年十二月庚午太子為文德皇后作大慈恩寺成西京雜記西京外城朱雀街東第三橋皇城之東第一街進業坊隋無漏寺之故基太子即其地建寺為文德皇后祈福竹木森邃為京城觀遊之最雍録曰慈恩寺在朱雀街東第三街自北次南第十五坊名曰進昌坊寺南臨黃渠竹木森邃為于偽翻貞觀二十二年龜茲王布失畢既敗走保都城阿史那社爾進軍逼之布失畢輕騎西走社爾拔其城使安西都護郭孝恪守之沙州刺史蘇海政尚輦奉御薛萬備帥精騎追布失畢行六百里布失畢窘急保撥換城自安西府西出柘厥關渡白馬河四百餘里至撥換城騎奇寄翻帥讀曰率下同閏月丁丑拔之擒布失畢及羯獵顛那利脫身走潛引西突厥之衆並其國兵萬餘人襲擊孝恪孝恪營於城外龜茲人或告之孝恪不以為意那利奄至孝恪帥所部千餘人將入城那利之衆已登城矣城中降胡與之相應降戶江翻下同共擊孝恪矢刃如雨孝恪不能敵將復出復扶又翻下利復同死於西門城中大擾倉部郎中崔義超倉部郎掌判天下倉儲受納租稅出給祿廩之事屬戶部義超以是官從軍衛軍資財物與龜茲戰於城中曹繼叔韓威亦營於城外自城西北隅擊之那利經宿乃退斬首三千餘級城中始定後旬餘日那利復引山北龜茲萬餘人趣都城山北蓋白山之北也趣七喻翻大破之斬首八千級那利單騎走龜茲人執之以詣軍門阿史那社爾前後破其大城五遣左衛郎將權祗甫詣諸城開示禍福皆相帥請降帥讀曰率降戶江翻凡得七百餘城虜男女數萬口社爾乃召其父老宣國威靈諭以伐罪之意立其王之弟葉護為王龜茲人大喜西域震駭西突厥于闐安國爭饋駝馬軍糧闐徒賢翻又徒見翻社爾勒石紀功而還還從宣翻又如字貞觀二十二年戊寅以崑丘道行軍總管左驍衛將軍阿史那賀魯為泥伏沙鉢羅葉護賜以鼓纛使招討西突厥之未服者假賀魯以羽翼正速其叛耳驍堅堯翻纛徒到翻貞觀二十二年癸未新羅相金春秋及其子文王入見相息亮翻見賢遍翻春秋真德之弟也上以春秋為特進文王為左武衛將軍春秋請改章服從中國內出冬服賜之二十三年二十三年春正月辛亥龜茲王布失畢及其相那利等至京師上責讓而釋之以布失畢為左武衛中郎將龜茲音丘慈又音屈佳將即亮翻考異曰實録云左武衛翊衛中郎將舊傳為武翊衛中郎將按會要武德五年改左右翊衛為左右衛然則於時已無翊衛之名且布失畢必不獨兼兩衛之官今去翊衛字按唐六典左右衛有親勳翊三衛中郎將其餘諸衛府各有翊衛中郎將翊衛二字恐不可去二十三年西南徒莫祗等蠻內附以其地為傍望覽丘四州隸朗州都督府徒莫祗蠻在爨蠻之西朗州當作郎州武德元年開南中仍舊置南寧州貞觀八年改為郎州以其地本夜郎國也二十三年上以突厥車鼻可汗不入朝遣右驍衛郎將高侃發回紇僕骨等兵襲擊之兵入其境諸部落相繼來降拔悉密吐屯肥羅察降以其地置新黎州舊書云車鼻長子羯漫陀先統拔悉密部遣其子菴鑠入朝帝嘉之為置新黎州朝直遙翻降戶江翻考異曰高宗實録云初突厥車鼻可汗遣其子車鉢羅入貢太宗遣使徵之不至太宗大怒遣右驍衛郎將高侃引回紇僕骨等兵襲擊之其下諸部落相次歸降其子羯漫陀先統拔悉密部泣諫其父請歸國車鼻不聽羯漫陀遂背父來降以其地為新黎州舊傳云二十三年遣右驍衛郎將高侃潛引回紇僕骨等兵衆襲擊之其酋長歌邏祿泥執闕俟利發乃拔塞匐處木昆莫賀咄俟斤等帥部落背車鼻相繼來降車鼻長子羯漫陀先統拔悉密部車鼻未敗前遣其子菴鑠入朝太宗嘉之拜左屯衛將軍更置新黎州以統其衆今從太宗實録二十三年二月丙戌置瑤池都督府此因穆天子傳西王母觴天子於瑤池之上而命名也戊子以左衛將軍阿史那賀魯為瑤池都督二十三年三月丙辰置豐州都督府使燕然都護李素立兼都督二十三年去冬旱至是始雨辛酉上力疾至顯道門外赦天下丁卯敕太子於金液門聽政按唐六典城門郎掌京城皇城宮殿諸門明德等門為京城門朱雀等門為皇城門承天等門為宮城門嘉德等門為宮門太極等門為殿門通內諸門並同上閣門顯道金液其亦通內諸門之門歟圖志不能盡載耳二十三年夏四月乙亥上行幸翠微宮二十三年上謂太子曰李世績才智有餘然汝與之無恩恐不能懷服我今黜之若其即行俟我死汝於後用為僕射親任之若徘徊顧望當殺之耳五月戊午以同中書門下三品李世績為疊州都督世績受詔不至家而去史言太宗以機數御李世績世績亦以機心而事君杜佑曰疊州去京師千三百四十里孫愐曰疊州自秦至魏諸羌據焉周武帝逐諸羌乃置疊州蓋以山重疊名之二十三年辛酉開府儀同三司衛景武公李靖薨二十三年上苦利增劇太子晝夜不離側離力智翻或纍日不食髮有變白者上泣曰汝能孝愛如此吾死何恨丁卯疾篤召長孫無忌入含風殿含風殿在翠微宮引手捫無忌頤無忌哭悲不自勝勝音升上竟不得有所言因令無忌出己巳復召無忌及褚遂良入臥內復扶又翻謂之曰朕今悉以後事付公輩太子仁孝公輩所知善輔導之謂太子曰無忌遂良在汝勿憂天下又謂遂良曰無忌盡忠於我我有天下多其力也我死勿令讒人間之武許之間二臣玉几之命猶在高宗之耳何遽忘之邪間古莧翻仍令遂良草遺詔有頃上崩年五十有三太子擁無忌頸號慟將絶無忌攬涕請處分衆事以安內外太子哀號不已號戶高翻處昌呂翻分扶問翻無忌曰主上以宗廟社稷付殿下豈得效匹夫唯哭泣乎乃祕不發喪庚午無忌等請太子先還飛騎徑兵及舊將皆從騎奇寄翻將即亮翻從才用翻辛未太子入京城大行御馬輿侍衛如平日繼太子而至頓於兩儀殿以太子左庶子于志寧為侍中少詹事張行成兼侍中以檢校刑部尚書右庶子兼吏部侍郎高季輔兼中書令壬申發喪太極殿宣遺詔太子即位太極殿西內正朝於此發喪太子於柩前即位不可停闕平常細務委之有司諸王為都督刺史者並聽奔喪濮王泰不在來限罷遼東之役及諸土木之功四夷之人入仕於朝及來朝貢者數百人聞喪皆慟哭翦髮剺面割耳流血灑地朝直遙翻剺里之翻六月甲戌朔高宗即位赦天下二十三年丁丑以疊州都督李績為特進檢校洛州刺史洛陽宮留守李世績去世字避太宗二名也守手又翻二十三年先是太宗二名令天下不連言者勿避先悉薦翻至是始改官名犯先帝諱者孔穎達曰曲禮卒哭乃諱注云敬鬼神之名也諱避也生者不相避名衛侯名惡大夫有名惡君臣同名春秋不非按昭七年衛侯惡卒穀梁傳云昭元年有衛齊惡今衛侯惡何謂君臣同名也君子不奪人親所名也二十三年癸未以長孫無忌為太尉兼檢校中書令知尚書門下二省事無忌固辭知尚書省事帝許之仍令以太尉同中書門下三品唐制三公正一品無忌既為太尉而令同中書門下三品當時朝議之失也癸巳以李績為開府儀同三司同中書門下三品二十三年阿史那社爾之破龜茲也行軍長史薛萬備請因兵威説于闐王伏闍信入朝説輸芮翻闍視遮翻朝直遙翻社爾從之秋七月己酉伏闍信隨萬備入朝詔入謁梓宮二十三年八月癸酉夜地震晉州尤甚壓殺五千餘人二十三年庚寅葬文皇帝于昭陵昭陵在京兆醴泉縣西北六十里九嵕山自唐太宗後為臣子者率稱其君之廟號豈非子孫臣民亦病其諡號太多非實而古者祖有功宗有德之義微乎上遣人諭以先旨不許蠻夷君長為先帝所擒服者頡利等十四人皆琢石為其像刻名列於北司馬門內二十三年丁酉禮部尚書許敬宗奏弘農府君廟應毀弘農府君魏弘農太守重耳也於高宗為七世祖親盡應毀從之太廟有東西夾室夾太室兩旁故謂之夾室二十三年九月乙卯以李績為左僕射行先帝之治命也二十三年冬十月以突厥諸部置舍利等五州隸雲中都督府五州舍利州思辟州阿史那州綽州白登州史只載蘇農州阿德州執失州拔延州餘二州逸二十三年乙亥上問大理卿唐臨繫囚之數對曰見囚五十餘人見賢遍翻唯二人應死上悅上嘗録繫囚前卿所處者多號呼稱冤臨所處者獨無言上怪問其故囚曰唐卿所處本自無冤號戶高翻處昌呂翻上歎息良久曰治獄者不當如是邪治直之翻二十三年上以吐蕃贊普弄讚為駙馬都尉漢武帝置三都尉曰奉車都尉曰駙馬都尉曰騎都尉唐以騎都尉為勳官駙馬都尉以授尚主者奉車都尉不復除授贊普致書于長孫無忌等云天子初即位臣下有不忠者當勒兵赴國討除之吐蕃以太宗晏駕固有輕中國之心矣二十三年十二月詔濮王泰開府置僚屬車服珍膳特加優異高宗天皇大聖大弘孝皇帝上之上諱治字為善小字雉奴太宗第九子也文明元年諡曰天皇大帝廟號高宗天寶八載加尊號高宗天皇大聖皇帝十三載加尊號高宗天皇大聖大弘孝皇帝永徽元年庚戌六五二十三年春正月辛丑朔改元二十三年丙午立王氏為皇后后思政之孫也王思政為西魏守潁川沒於東魏二十三年己未以張行成為侍中二十三年辛酉上召朝集使朝直遙翻使疏吏翻謂曰朕初即位事有不便於百姓者悉宜陳不盡者更封奏自是日引刺史十人入閣問以百姓疾苦及其政治治直吏翻有洛陽人李弘泰誣告長孫無忌謀反上命立斬之無忌與褚遂良同心輔政上亦尊禮二人恭己以聽之以帝之尊任二人如此武后譖而去之雖隊諸淵不悔也哲婦之為鴟梟也尚矣百姓阜安有貞觀之遺風觀古玩翻二十三年太宗女衡山公主應適長孫氏有司以為服既公除欲以今秋成婚于志寧上言漢文立制本為天下百姓公主服本斬衰上時掌翻為于偽翻衰倉回翻縱使服隨例除豈可情隨例改請俟三年喪畢成婚上從之二十三年二月辛卯立皇子孝為許王上金為王素節為雍王帝後宮鄭生孝楊生上金蕭淑生素節雍於用翻二十三年夏五月壬戌吐蕃贊普弄讚卒卒子恤翻其嫡子早死立其孫為贊普贊普幼弱政事皆決於國相祿東贊相息亮翻祿東贊性明達嚴重行兵有法吐蕃所以強大威服氐羌皆其謀也二十三年六月高侃擊突厥至阿息山車鼻可汗召諸部兵皆不赴與數百騎遁去侃帥精騎追至金山擒之以歸其衆皆降騎奇寄翻帥讀曰率降戶江翻二十三年初阿史那社爾虜龜茲王布失畢立其弟為王事見太宗貞觀二十六年其酋長爭立更相攻擊酋茲由翻長知兩翻更工衡翻秋八月壬午詔復以布失畢為龜茲王復扶又翻遣歸國撫其衆二十三年九月庚子高侃執車鼻可汗至京師釋之拜左武衛將軍處其餘衆於鬱督軍山處昌呂翻以高侃為衛將軍唐無衛將軍衛字之上須有脫字分置單于瀚海二都護府單于領狼山雲中桑乾三都督蘇農等一十四州瀚海領瀚海金徽新黎等七都督仙萼等八州各以其酋長為刺史都督新書作蘇農二十四州舊書作一十四州又考是後調露元年溫傅奉職二部反二十四州皆叛應之則二字為是然單于都護府所領見於史者蘇農等四州舍利等五州及桑乾府所領郁射藝失卑失叱略等四州呼延府所領賀魯葛邏跌等三州財十九州耳其五州逸無所考又有定襄呼延二都督而無狼山都督是其廢置離合不可詳也狼山府顯慶三年廢為州金徽當作金微瀚海都護府領瀚海金微新黎幽陵龜林堅昆六都督府其一逸仙萼浚稽余吾稽落居延置顏榆溪渾河燭龍凡八州宋白曰振武軍舊為單于都護府即漢定襄郡之盛樂縣也在陰山之陽黃河之北西南至東受降城百二十里瀚海都護後移於回紇本部乾音干二十三年癸亥上出畋遇雨問諫議大夫昌樂谷那律曰油衣若為則不漏炙轂子曰惟絹油之製及帽油陳始有之樂音洛以瓦為之必不漏上悅為之罷獵悅為之為于偽翻考異曰舊書那律傳云嘗從太宗出獵在塗遇雨有此語意欲太宗不為畋獵太宗悅賜帛二百段唐録政要高宗出獵有此月日唐統紀亦在此年今從之二十三年李績固求解職冬十月戊辰解績左僕射以開府儀同三司同中書門下三品二十三年己未監察御史陽武韋思謙陽武縣漢屬河南郡自晉以來屬滎陽郡監工銜翻中書掌受四方朝貢及通表疏故有譯語人劾戶概翻又戶得翻思謙奏曰估價之設備國家所須臣下交易豈得準估為定估音古睿册舞文附下罔上罪當誅是日左遷遂良為同州刺史睿册循州刺史思謙名仁約以字行二十三年十二月庚午梓州都督謝萬歲兗州都督謝法興與黔州都督李孟嘗討琰州叛獠梓州當作牂州武德三年牂柯蠻酋謝龍羽降以其地置牂州兗州當作充州武德三年以牂柯蠻別部置琰州亦蠻州貞觀四年置皆屬黔州都督府黔音琴獠魯皓翻為獠所殺二年二年春正月乙巳以黃門侍郎宇文節中書侍郎柳奭並同中書門下三品奭亨之兄子柳亨西魏尚書左僕射慶之孫竇誕之壻也亨妻即襄陽公主之女二年左驍衛將軍瑤池都督阿史那賀魯驍堅堯翻招集離散廬帳漸盛聞太宗崩謀襲取西庭二州庭州刺史駱弘義知其謀表言之上遣通事舍人橋寶明馳往慰撫寶明説賀魯令長子嘻運入宿衛授右驍衛中郎將尋復遣歸嘻運乃説其父擁衆西走説輸芮翻復扶又翻擊破乙毗射匱可汗人併其衆建牙于雙河及千泉自雙河西南抵賀魯牙帳二百里千泉屬石國界又在賀魯牙帳西南新書曰素葉城西四百里至千泉地贏二百里南雪山三垂平陸多泉地因名之咄陸五啜努失畢五俟斤皆歸之勝兵數十萬咄當沒翻啜步劣翻俟渠之翻勝音升與乙毗咄陸可汗連兵處月處密及西域諸國多附之以嘻運為莫賀咄葉護嘻徒結翻二年焉耆王婆伽利卒國人表請復立故王突騎支卒子恤翻復扶又翻騎奇寄翻夏四月詔加突騎支右武衛將軍遣還國二年金州刺史滕王元嬰驕奢縱逸居亮陰中畋遊無節數夜開城門勞擾百姓或引彈彈人或埋人雪中以戲笑數所角翻引彈徒旦翻上賜書切讓之且曰取適之方亦應多緒晉靈荒君何足為則左傳晉靈公不君從臺上彈人以觀其避丸不能張能作忍致王於法今書王下上考以愧王心元嬰與蔣王惲皆好聚斂惲於粉翻好呼到翻斂力贍翻上嘗賜諸王帛各五百段獨不及二王敕曰滕叔蔣兄自能經紀不須賜物給麻兩車以為錢貫二王大慙二年秋七月西突厥沙鉢羅可汗寇庭州攻陷金嶺城及蒲類縣西州交河縣北行八十里入谷又百三十里經柳谷渡金沙嶺百六十里至庭州蒲類縣屬西州後屬庭州又改為後庭縣詔左武候嚴候改衛大將軍梁建方右驍衛大將軍契苾何力為弓月道行軍總管弓月城在庭州西千有餘里嚴薛改薩孤吳仁為副發秦成岐雍府兵三萬人成州漢武都上祿下辨之地後魏置仇池郡漢陽郡南秦州西魏改曰成州雍州京兆郡雍於用翻紇下沒翻二年癸巳詔諸禮官學士議明堂制度以高祖配五天帝太宗配五人帝五天帝注已見七十九卷晉武帝泰始二年五人帝東方帝太皞西方帝少皞南方帝炎帝北方帝顓頊中央帝黃帝二年八月己巳以于志寧為左僕射張行成為右僕射高季輔為侍中志寧行成仍同中書門下三品二年己卯郎州白水蠻反寇麻州白水蠻與青蛉弄棟接隸郎州麻州貞觀二十二年分郎州置二年九月癸巳廢玉華宮為佛寺戊戌更命九成宮為萬年宮更工衡翻二年庚戌左武候引駕盧文操踰牆盜左藏物上以引駕職在糾繩左右武候掌宮中及京城晝夜巡警之法以執禦非違有引駕仗三衛六十人引駕佽飛六十六人左右藏晉始有之唐因而不改各有令一人宋白曰唐制左右金吾有引駕仗百四十人以三衛人數充左藏掌邦國庫藏右藏掌國寶貨藏徂浪翻命誅之諫議大夫蕭鈞諫曰文操情實難原然法不至死上乃免文操死顧侍臣曰此真諫議也二年閏月長孫無忌等上所刪定律令式上時掌翻甲戌詔頒之四方二年上謂宰相曰聞所在官司行事猶互觀顏面多不盡公長孫無忌對曰此豈敢言無然肆情曲法實亦不敢至於小小收取人情恐陛下尚不能免無忌以元舅輔政凡有所言上無不嘉納二年冬十有一月辛酉上祀南郊二年癸酉詔自今京官及外州有獻鷹隼及犬馬者罪之隼息允翻二年戊寅特浪羌酋董悉奉求辟惠羌酋卜簷莫各帥種落萬餘戶詣茂州內附特浪辟惠皆生羌也是年以其地置蓬魯等三十二州屬茂州都督府酋茲由翻簷余廉翻帥讀曰率種章勇翻二年竇州義州蠻酋李寶誠等反義州漢猛陵縣地梁置永業郡隋改為懷德縣屬瀧州唐武德五年置南義州貞觀二年曰義州二年郎州道總管趙孝祖討白水蠻蠻酋禿磨蒲及儉彌于帥衆據險拒戰孝祖皆擊斬之會大雪蠻飢凍死亡略盡孝祖奏言貞觀中討昆州烏蠻始開青蛉弄棟為州縣昆州漢益州郡地隋置昆州以亂廢唐武德初開南中復置柘東兩爨蠻自曲州靖州西南昆川曲軛晉寧喻獻安寧距龍和城通謂之西爨白蠻自彌鹿升麻二川南至步頭謂之東爨烏蠻青蛉漢武帝開為縣屬越巂郡弄棟縣屬益州郡晉並屬雲南郡後屬興寧郡隋亂與中國絶唐以青蛉地置髳州弄棟地置裒州勃弄屬漢永昌郡界唐武德七年置南雲州貞觀八年更名匡州欲使之反恆戶登翻其勃弄以西與黃瓜葉榆西洱河相接葉榆亦漢武帝開為縣有葉榆澤屬益州郡後漢屬永昌郡晉屬雲南郡後分屬東河陽郡多於蜀川無大酋長好結讎怨好呼到翻今因破白水之兵請隨便西討撫而安之敕許之二年十二月壬子處月朱邪孤注殺招慰使單道惠邪音耶單音善與突厥賀魯相結二年是歲百濟遣使入貢上戒之使勿與新羅高麗相攻不然吾將發兵討汝矣三年三年春正月己未朔吐谷渾新羅高麗百濟並遣使入貢三年癸亥梁建方契苾何力等大破處月朱邪孤注於牢山新書牢山亦曰賭蒲東北距烏德犍山度馬行十五日建方使副總管高德逸輕騎追之騎奇寄翻行五百餘里生擒孤注斬首九千級軍還御史劾奏梁建方兵力足以追討而逗留不進高德逸敕令市馬自取駿者劾戶概翻又戶得翻上以建方等有功釋不問大理卿李道裕奏言德逸所取之馬筋力異常請實中廣既中廣既猶言內廣既也道裕法官進馬非其本職妄希我意豈朕行事不為臣下所信邪朕方自咎故不復黜道裕耳復扶又翻三年己巳以同州刺史褚遂良為吏部尚書同中書門下三品三年丙子上饗太廟丁亥饗先農躬耕藉田漢儀天子正月親耕藉田告祠先農先農即神農也祠以太牢百官皆從唐制天子以孟冬吉亥享先農而遂以耕藉三年二月甲寅上御安福門樓唐六典長安皇城西面二門北曰安福南曰順義安福西直京城之開遠門乙卯上謂侍臣曰昨登樓欲以觀人情及風俗奢儉非為聲樂為于偽翻朕聞胡人善為擊鞠之戲鞠以韋為之實以柔物今謂之毬子昨初升樓即有㣥胡擊鞠意謂朕篤好之也好呼到翻帝王所為豈宜容易易以豉翻朕已焚此鞠冀杜胡人窺望之情亦因以為誡三年三月辛巳以宇文節為侍中柳奭為中書令以兵部侍郎三原韓瑗守黃門侍郎同中書門下三品瑗于眷翻三年夏四月趙孝祖大破西南蠻斬小勃弄酋長歿盛擒大勃弄酋長楊承顛自餘皆屯聚保險大者有衆數萬小者數千人孝祖皆破降之降戶江翻西南蠻遂定三年甲午澧州刺史彭思王元則薨澧音禮三年六月戊申遣兵部尚書崔敦禮等將並汾步騎萬人往茂州茂州考之新舊志無之當置之於薛延陀故地也將即亮翻置祁連州以處之三年秋七月丁巳立陳王忠為皇太子赦天下王皇后無子柳奭為后謀為于偽翻以忠母劉氏微賤勸后立忠為太子冀其親己外則諷長孫無忌等使請於上上從之乙丑以于志寧兼太子少師張行成兼少傅高季輔兼少保三年丁丑上問戶部尚書高履行去年進戶多少戶部尚書即民部尚書避太宗諱改焉進戶新增進之戶也少詩沼翻去年進戶總一十五萬因問隋代及今日見戶見賢遍翻履行奏隋開皇中戶八百七十萬即今戶三百八十萬即今猶言當今也唐人多有此語士廉之子也三年九月守中書侍郎來濟同中書門下三品三年冬十一月庚寅弘化長公主自吐谷渾來朝弘化公主貞觀十三年降吐谷渾慕容諾曷鉢長知兩翻三年癸巳濮章十二行本濮下有恭字乙十一行本同孔本同王泰薨於均州濮博木翻三年散騎常侍房遺愛尚太宗女高陽公主散悉亶翻騎奇寄翻房玄齡薨公主教遺愛與兄遺直異財既而反譖遺直遺直自言太宗深責讓主由是寵衰主怏怏不悅怏於兩翻會御史劾盜得浮屠辨機寶枕浮屠正號曰佛陀與浮屠音聲相近皆西方言其來轉為二音華言譯之則謂之淨覺言滅穢成明道為聖悟劾戶概翻又戶得翻云主所賜主與辨機私通餉遺億計餉遺唯季翻更以二女子侍遺愛太宗怒腰斬辨機殺奴婢十餘人主益怨望太宗崩無戚容上即位主又令遺愛與遺直更相訟直更工衡翻遺愛坐出為房州刺史房州古房陵上庸地西魏置光遷國後周改曰遷州隋改曰房州尋廢州為房陵郡唐復曰房州又浮屠智勗等數人私侍主主使掖庭令陳玄運伺宮省禨祥掖庭局令從七品下宦者為之屬內侍省掌宮禁女工之事凡宮人名籍司其除附禨居希翻又其既翻先是駙馬都尉薛萬徹高祖女丹陽公主下嫁薛萬徹先悉薦翻徙寧州刺史入朝與遺愛款昵朝直遙翻昵尼質翻對遺愛有怨望語且曰今雖病足坐置京師鼠輩猶不敢動因與遺愛謀若國家有變當奉司徒荊王元景為主元景女適遺愛弟遺則由是與遺愛往來元景嘗自言夢手把日月駙馬都尉柴令武紹之子也柴紹尚高祖女平陽公主巴陵公主太宗之女託以主疾留京師求醫因與遺愛謀議相結高陽公主謀黜遺直奪其封爵使人誣告遺直無禮於己遺直亦言遺愛及主罪云罪盈惡稔恐纍臣私門纍力瑞翻上令長孫無忌鞫之令力丁翻長知兩翻更獲遺愛及主反狀司空安州都督吳王恪母隋煬帝女也恪有文武才太宗常以為類己欲立為太子無忌固爭而止事見一百九十七卷貞觀十七年恪名望素高為物情所向無忌深忌之欲因事誅恪以絶衆望遺愛知之因言與恪同謀冀如紇干承基得免死事見一百九十六卷一百九十七卷貞觀十七年四年四年春二月甲申詔遺愛萬徹令武皆斬元景恪高陽巴陵公主並賜自盡上泣謂侍臣曰荊王朕之叔父吳王朕兄欲丐其死可乎丐居大翻兵部尚書崔敦禮以為不可乃殺之萬徹臨刑大言曰薛萬徹大健兒留為國家效死力豈不佳尚辰羊翻為于偽翻乃坐房遺愛殺之乎吳王恪且死罵曰長孫無忌竊弄威權構害良善宗社有靈當族滅不久乙酉侍中兼太子詹事宇文節特進太常卿江夏王道宗左驍衛大將軍駙馬都尉執失思力高祖女九江公主下嫁執失思力夏戶雅翻驍堅堯翻流嶺表節與遺愛親善及遺愛下獄下遐嫁翻節頗左右之左右讀曰佐佑江夏王道宗素與長孫無忌褚遂良不協故皆得罪戊子廢恪母弟蜀王愔為庶人置巴州愔於今翻房遺直貶春州銅陵尉銅陵縣漢允吾縣地屬合浦郡宋置瀧潭縣屬新寧郡隋改為銅陵縣屬端州唐初屬春州罷房玄齡配饗鄭樵曰盤庚云茲豫大享于先王爾祖其從與享之周制凡有功者祭于大蒸漢制祭功臣於庭生時侍燕於庭死則降在庭位謂之配饗四年開府儀同三司李績為司空四年初林邑王范頭利卒卒子恤翻子真龍立大臣伽獨弒之盡滅范氏伽獨自立國人弗從乃立頭利之壻婆羅門為王國人咸思范氏復罷婆羅門復扶又翻立頭利之女為王女不能治國治直之翻有諸葛地者頭利之姑子也父為頭利所殺南奔真臘真臘一名吉蔑本扶南屬國去京師二萬七百里東距車渠西屬驃南瀕海北與道明接東北抵歡州貞觀初並扶南有其地使疏吏翻下同妻以女王妻七細翻衆然後定夏四月戊子遣使入貢四年秋九月壬戌右僕射北平定公張行成薨諡法純行不爽曰定甲戌以褚遂良為右僕射同中書門下三品如故仍知選事選須絹翻四年冬十月庚子上幸驪山溫湯乙巳還宮四年初睦州女子陳碩真吳孫權分丹楊立新安郡隋仁壽三年置睦州大業初廢州為遂安郡唐復為睦州妖於喬翻下同與妹夫章叔胤舉兵反自稱文佳皇帝以叔胤為僕射甲子夜叔胤帥衆攻桐廬陷之吳分富春立桐廬縣屬吳郡隋唐屬睦州九域志縣在州東一百五里項安世曰桐廬縣魏黃初四年吳置以桐溪側有大椅樹垂條偃蓋旁蔭數畝遠望如廬因謂之桐廬帥讀曰率撞直江翻引兵二千攻陷睦州及於潛於潛縣漢屬丹楊郡晉宋屬吳興郡梁陳屬錢唐郡隋唐屬杭州宋白曰吳越春秋秦徙大越鳥語之人置之朁闞駰十三州志朁讀為潛吳録地理志縣西有朁山舊朁字無水至隋加水於如字不克歙音攝敕揚州刺史房仁裕發兵討之碩真遣其黨童文寶將四千人寇婺州將即亮翻下同刺史崔義玄發兵拒之民間訛言碩真有神犯其兵者必滅族士衆凶懼凶許勇翻司功參軍崔玄籍曰功倉戶兵法士參軍所謂州判司也起兵仗順猶且無成況憑妖妄其能久乎義玄以玄籍為前鋒自將州兵繼之至下淮戍遇賊與戰左右以楯蔽義玄楯食尹翻義玄曰刺史避箭人誰致死命撤之於是士卒齊奮賊衆大潰斬首數千級聽其餘衆歸首歸首式又翻進至睦州境降者萬計降戶江翻十一月庚戌房仁裕軍合獲碩真叔胤斬之餘黨悉平義玄以功拜御史大夫御史大夫天子耳目官也非以賞功厥後崔義玄承中宮旨繩長孫無忌等豈不忝厥官哉四年癸丑以兵部尚書崔敦禮為侍中四年十二月庚子侍中蓨憲公高季輔薨諡法博聞多能曰憲蓨音條四年是歲西突厥乙毗咄陸可汗卒其子頡苾達度設號真珠葉護始與沙鉢羅可汗有隙與五弩失畢共擊沙鉢羅破之斬首千餘級五年五年春正月壬戌羌酋凍就內附以其地置劍州凍就特浪生羌卜樓大首領也劍州羈縻屬松州都督府五年三月戊午上行幸萬年宮考異曰實録戊午以下皆為二月按長曆二月丁丑朔無戊午戊午三月十二日也五年庚申加贈武德功臣屈突通等十三人官初王皇后無子蕭淑有寵考異曰新舊唐書或作蕭淑或作蕭良娣實録皆作良娣廢王后詔亦曰良娣蕭氏按當時後宮位號無良娣名唯漢世太子宮有良娣疑高宗在東宮時蕭為良娣及即位拜淑也上之為太子也入侍太宗見才人武氏而悅之才人晉武帝所制爵視千石以下宋齊之時以為散職梁於九嬪之下置五職三職才人位列三職比駙馬都尉唐承隋制才人五人正五品武氏隨衆感業寺為尼長安志曰貞觀二十三年五月太宗上仙其年即以安業坊濟度尼寺為靈寶寺盡度太宗嬪御為尼以處之程大昌曰以通鑑及長安志及呂大防長安圖參定通鑑言武氏在感業寺長安志在安業寺惟此差不同然志能言寺之位置及始末則安業者是也上詣寺行香見之武氏泣上亦泣王后聞之陰令武氏長髮長知兩翻勸上內之後宮欲以間淑之寵間古莧翻武氏巧慧多權數初入宮卑辭屈體以事后后愛之數稱其美於上數所角翻未幾大幸幾居豈翻拜為昭儀后及淑寵皆衰更相與共譖之上皆不納昭儀欲追贈其父而無名故託以褒賞功臣章十二行本臣下有遍贈屈突通等六字乙十一行本同孔本同退齋校同而武士彠預焉為廢皇后淑張本彠一虢翻五年乙丑上幸鳳泉湯鳳泉湯在岐州郿縣章十二行本乙作己乙十一行本同孔本同張校同巳還萬年宮五年夏四月大食發兵擊波斯波斯國居達遏水之西距京師萬五千里而贏東與吐火羅康接北鄰突厥可薩部西南皆瀕海其先波斯匿王大月氏別裔王因以姓又以為國號杜佑曰波斯國即條支之故地大月氏之別種其先有波斯匿王因以為號大食本波斯地隋大業中有波斯國人牧于俱紛摩地山有獸言曰山西三穴有利兵黑質而白文得之者王走視如言石文言當反乃詭衆裒亡命於恆曷水劫商旅保西鄙自王移黑石寶之國人往討皆大敗而還於是遂強伊嗣侯之子卑路斯奔吐火羅大食兵去吐火羅發兵立卑路斯為波斯王而還五年閏月丙子以處月部置金滿州其地近古輪臺屬北庭都護府五年丁丑夜大雨山水漲溢衝玄武門此萬年宮之玄武門也唐離宮諸門蓋略倣宮城之制右領軍郎將薛仁貴曰唐制自左右衛至左右金吾衛其屬各有左右中郎將府有中郎將及左郎將右郎將將即亮翻安有宿衛之士天子有急而敢畏死乎乃登門桄大呼以警宮內桄枯黃翻門前橫木也呼火故翻上遽出乘高俄而水入寢殿水溺衛士及麟遊居人隋文帝於岐州之北置仁壽宮大業初置普潤縣義寧二年於宮獲白麟因分普潤於宮置麟遊縣仁壽宮唐改為九成宮又改曰萬年宮溺奴狄翻五年壬辰新羅女王金真德卒詔立其弟春秋為新羅王五年六月丙午恆州大水呼沱溢漂溺五千三百家恆戶登翻沱徒何翻五年中書令柳奭以王皇后寵衰內不自安請解政事癸亥罷為吏部尚書五年秋七章十二行本七作九乙十一行本同孔本同退齋校同月丁酉車駕至京師五年戊戌上謂五品以上曰頃在先帝左右見五品以上論事或仗下面陳唐制常朝諸衛皆立仗仗下宰執諫官奏事終日不絶上時掌翻豈今日獨無事邪何公等皆不言也五年冬十月雇雍州四萬一千人築長安外郭三旬而畢雇者以錢若物酬其功庸不徒役其力也雍於用翻癸丑雍州參軍薛景宣上封事言漢惠帝城長安尋晏駕事見十二卷漢惠帝三年五年上時掌翻下同復扶又翻必有大咎于志寧等以景宣言涉不順請誅之上曰景宣雖狂妄若因上封事得罪恐絶言路遂赦之五年高麗遣其將安固將高麗靺鞨兵擊契丹麗力知翻將即亮翻靺鞨音末曷契欺訖翻又音喫松漠都督李窟哥禦之大敗高麗於新城窟苦骨翻敗補邁翻五年是歲大稔洛州粟米斗兩錢半粳米斗十一錢粳音庚稻之不黏者五年王皇后蕭淑與武昭儀更相譖訴更工衡翻上不信后淑之語獨信昭儀后不能曲事上左右母魏國夫人柳氏及舅中書令柳奭入見六宮又不為禮武昭儀伺后所不敬者伺相吏翻必傾心與相結所得賞賜分與之由是后及淑動靜昭儀必知之皆以聞於上后寵雖衰然上未有意廢也會昭儀生女后憐而弄之后出昭儀潛扼殺之覆之以被覆敷又翻上至昭儀陽歡笑發被觀之女已死矣即驚啼問左右左右皆曰皇后適來此上大怒曰后殺吾女昭儀因泣數其罪數所具翻后無以自明上由是有廢立之志又畏大臣不從乃與昭儀幸太尉長孫無忌第酣飲極歡席上拜無忌寵姬子三人皆為朝散大夫朝直遙翻散悉亶翻仍載金寶繒錦十車以賜無忌上因從容言皇后無子以諷無忌從千容翻無忌對以他語竟不順旨上及昭儀皆不悅而罷昭儀又令母楊氏詣無忌第屢有祈請無忌終不許禮部尚書許敬宗亦數勸無忌無忌厲色折之上於無忌官及庶孽又有橫賜意可知矣無忌欲格其非心則辭而不受可也為無忌得罪張本數所角翻折之舌翻六年六年春正月壬申朔上謁昭陵甲戌還宮六年己丑巂州道行軍總管曹繼叔破胡叢顯養車魯等蠻於斜山拔十餘城胡叢劍山招討使所領五部落之一也顯養車魯亦各蠻種車魯新書作東魯巂音髓六年庚寅立皇子弘為代王賢為潞王六年高麗與百濟靺鞨連兵侵新羅北境取三十三城新羅王春秋遣使求援使疏吏翻二月乙丑遣營州都督程名振左衛中郎將蘇定方發兵擊高麗將即亮翻六年夏五月壬午名振等渡遼水高麗見其兵少開門渡貴端水逆戰按舊書程名振傳貴端水當在新城西南少詩沼翻大破之殺獲千餘人焚其外郭及村落而還六年癸未以右屯衛大將軍程知節為蔥山道行軍大總管蔥山即蔥領六年壬辰以韓瑗為侍中瑗于眷翻來濟為中書令六年六月武昭儀誣王后與其母魏國夫人柳氏為厭勝厭於葉翻又一琰翻考異曰舊傳云后懼不自安密與母柳氏求巫祝厭勝事發故廢今從實録敕禁后母柳氏不得入宮秋七月戊寅貶吏部尚書柳奭為遂州刺史奭行至扶風武德元年分岐山置湋川縣取湋水為名貞觀八年更名扶風屬岐州九域志縣在州東八十里復貶榮州刺史榮州漢南安江陽之地隋為大牢縣屬資州武德元年分置榮州復扶又翻唐因隋制後宮有貴淑德賢皆視一品上欲特置宸以武昭儀為之韓瑗來濟諫以為故事無之乃止考異曰唐曆在此年四月今據實録四月韓瑗來濟未為侍中中書令唐曆又云瑗濟諫帝不從按立武后詔書猶云昭儀武氏然則未嘗為宸也今從會要中書舍人饒陽李義府為長孫無忌所惡惡烏路翻左遷壁州司馬武德八年析巴州始寧縣地置壁州義府密知之問計於中書舍人幽州王德儉德儉曰上欲立武昭儀為后猶豫未決者直恐宰臣異議耳君能建策立之則轉禍為福矣義府然之是日代德儉直宿叩閣上表請廢皇后王氏立武昭儀以厭兆庶之心厭於葉翻上悅召見與語賜珠一斗留居舊職昭儀又密遣使勞勉之使疏吏翻勞力到翻尋超拜中書侍郎考異曰舊傳云高宗將立武后義府密申叶贊擢拜中書侍郎同中書門下三品監修國史賜爵廣平縣男新書本紀年表皆云是歲七月義府為中書侍郎參知政事實録但云超拜中書侍郎宰輔圖十一月自中書侍郎參知政事今從之六年乙酉以侍中崔敦禮為中書令六年八月尚藥奉御蔣孝璋員外特置仍同正員尚藥局奉御員二人掌合和御藥及診候方脈之事六年長安令裴行儉聞將立武昭儀為后以國家之禍必自此始與長孫無忌褚遂良私議其事袁公瑜聞之以告昭儀母楊氏行儉坐左遷西州都督府長史唐制長安萬年河南洛陽太原晉陽六縣謂之京縣京縣令正五品上西州中都督府中都督府長史亦正五品上但從輦轂下出佐邊州故為左遷仁基之子也裴仁基隋將歸李密為王世充所殺六年九月戊辰以許敬宗為禮部尚書上一日退朝朝直遙翻召長孫無忌李績于志寧褚遂良入內殿遂良曰今日之召多為中宮上意既決逆之必死太尉元舅司空功臣不可使上有殺元舅及功臣之名遂良起於草茅無汗馬之勞致位至此且受顧託不以死爭之何以下見先帝績稱疾不入無忌等至內殿上顧謂無忌曰皇后無子武昭儀有子今欲立昭儀為后何如遂良對曰皇后名家先帝為陛下所娶為于偽翻先帝臨崩執陛下手謂臣曰朕佳兒佳婦今以付卿此陛下所聞言猶在耳皇后未聞有過豈可輕廢臣不敢曲從陛下上違先帝之命上不悅而罷明日又言之遂良曰陛下必欲易皇后伏請妙擇天下令族何必武氏武氏經事先帝衆所具知天下耳目安可蔽也萬代之後謂陛下為如何願留三思臣今忤陛下罪當死忤五故翻因置笏於殿階解巾叩頭流血曰還陛下笏乞放歸田里上大怒命引出昭儀在簾中大言曰何不撲殺此獠無忌曰遂良受先朝顧命有罪不可加刑撲弼角翻又普木翻獠魯皓翻朝直遙翻顧音古考異曰唐曆云無忌等將入遂良曰今者多為中宮事遂良欲諫何如無忌曰公但極言無忌接公及入上再三顧無忌曰莫大之罪無過絶嗣皇后無子今欲廢之立武士彠女何如無忌曰自貞觀二十三年後先朝託付遂良望陛下問其可否按如此則是無忌賣遂良也今不取于志寧不敢言韓瑗因間奏事間古莧翻涕泣極諫上不納明日又諫悲不自勝勝音升上命引出瑗又上疏諫曰匹夫匹婦猶相選擇況天子乎皇后母儀萬國善惡由之故嫫母輔佐黃帝漢書古今人表幠母黃帝生倉林師古曰幠音謨即嫫母也何承天纂文曰嫫母醜人也黃帝愛幸之嫫音謨妲己有蘇氏之美女紂愛之唯妲己之言是從卒以亡殷妲當割翻褒姒滅之詩小雅正月之辭韓瑗之意謂嫫母以醜而佐黃帝有天下妲己褒姒以美豔而亡殷周女在德不在色也常興歎息不謂今日塵黷聖代作而不法後嗣何觀左傳曹劌諫魯莊公之辭無為後人所笑使臣張臣下脫言字有以益國葅醢之戮臣之分也分扶問翻昔吳王不用子胥之言而麋鹿遊於姑蘇漢伍被曰昔子胥諫吳王吳王不用乃曰臣今見麋鹿遊於姑蘇之臺也師古曰姑蘇因山為臺名西南去吳國二十五里范成大吳郡志曰姑蘇臺在姑蘇山舊圖經云在吳縣西三十里續圖經云三十五里史記正義曰在吳縣西南三十里橫山西北麓姑蘇山上棘荊生於闕庭宗廟不血食期有日矣來濟上表諫曰王者立后上法乾坤必擇禮教名家幽間令淑副四海之望稱神祇之意是故周文造舟以迎太姒而興關雎之化百姓蒙祚太姒文王之也詩云文定厥祥親迎于渭造舟為梁不顯其光太姒佐文王以興王業故關雎美其德稱尺證翻造七到翻以婢為后使皇統亡絶社稷傾淪事見漢成帝紀大漢之禍又如此惟陛下詳察上皆不納褚遂良韓瑗來濟言皆痛切此時去貞觀未遠士大夫敢言之氣未衰自三人者得罪在朝之臣唯承武后風旨安能言人所難言哉他日李績入見見賢遍翻上問之曰朕欲立武昭儀為后遂良固執以為不可遂良既顧命大臣事當且已乎對曰此陛下家事何必更問外人自李績有是言李林甫襲取之以成明皇殺三子之禍德宗舒王之議亦祖此説微李泌東宮殆哉許敬宗宣言於朝曰田舍翁多收十斛麥尚欲易婦況天子欲立后何豫諸人事而妄生異議乎以田舍翁況天子許敬宗之事君不敬莫大乎是朝直遙翻昭儀令左右以聞庚午貶遂良為潭州都督潭州在京師南二千四百四十五里王崇武標點容肇祖聶崇岐覆校
