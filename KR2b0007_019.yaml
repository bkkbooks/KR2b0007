body:
  text: 資治通鑑卷第十九翰林學士朝散大夫右諫議大夫知制誥兼侍講同提舉萬壽觀公事兼判集賢院上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣奉敕編集後學天台音注漢紀十一元朔五年世宗孝武皇帝中之上元朔五年丁巳前一二四元朔五年冬十一月乙丑薛澤免以公孫弘為丞相封平津侯勃海郡高成縣有平津鄉宋白曰滄州鹽山縣勃海高成縣也有平津鄉考異曰史記將相名臣表漢書公卿百官表弘為相皆在今年建元以來侯者表恩澤侯表皆云元朔三年封侯按三年弘始為御史大夫蓋誤書五為三因置於三年耳漢初常以列侯為丞相弘則既相而後封侯故丞相封侯自弘始時上方興功業弘於是開東閣以延賢人師古曰閣小門也東向開之避當庭門而引客別於掾史官屬也每朝覲奏事因言國家便宜上亦使左右文學之臣與之論難難乃旦翻弘嘗奏言十賊彍弩張晏曰彍音郭師古曰引滿曰彍請禁民毋得挾弓弩便上下其議下遐嫁翻侍中吾丘壽王對曰臣聞古者作五兵師古曰五兵謂矛戟弓劍戈吾讀曰虞以禁暴討邪也秦兼天下銷甲兵折鋒刃其後民以耰鉏箠梃相撻擊師古曰耰摩田之器也箠馬撾也梃大杖也折而設翻耰音憂梃大鼎翻撻音闥盜賊不勝師古曰滋益也不勝言不可勝也卒子恤翻故聖王務教化而省禁防知其不足恃也禮曰男子生桑弧蓬矢以舉之明示有事也記內則國君世子生三日射人以桑弧蓬矢六射天地四方注云天地四方男子之所有事也自天子降及庶人三代之道也古者天子射豹侯諸侯射熊侯卿大夫射麋侯士射鹿侯豕侯周官又以鄉射之禮詢衆庶未聞弓矢之為禁也且所為禁者為盜賊之以攻奪也為盜之為于偽翻攻奪之罪死然而不止者大姦之於重誅固不避也臣恐邪人挾之而吏不能止良民以自備而抵法禁師古曰抵觸也亶竊以為大不便書奏上以難弘弘詘服焉難乃旦翻詘與屈同弘性意忌外寬內深諸嘗與弘有隙無近遠雖陽與善後竟報其過董仲舒為人廉直以弘為從諛弘嫉之膠西王端驕恣數犯法端景帝子前三年受封數所角翻下同弘乃薦仲舒為膠西相仲舒以病免汲黯常毀儒面觸弘弘欲誅之以事以事致其罪而誅之右內史界部中多貴臣宗室難治非素重臣不能任請徙黯為右內史右內史後為右扶風治直之翻任音壬元朔五年春大旱元朔五年胸奴右賢王數侵擾朔方天子令車騎將軍青將三萬騎出高闕衛尉蘇建為遊擊將軍左內史李沮為強弩將軍沮音俎太僕公孫賀為騎將軍代相李蔡為輕車將軍皆領屬車騎將軍俱出朔方大行李息岸頭侯張次公為將軍俱出右北平凡十餘萬人擊胸奴右賢王以為漢兵遠不能至飲酒醉衛青等兵出塞六七百里夜至圍右賢王右賢王驚夜逃獨與壯騎數百馳潰圍北去得右賢裨王十餘人師古曰裨王小王也猶言裨將也裨頻移翻畜數十百萬師古曰數十萬以至百萬畜許救翻至塞天子使使者持大將軍印即軍中拜衛青為大將軍諸將皆屬焉夏四月乙未復益封青八千七百戶復扶又翻封青三子伉不疑登皆為列侯師古曰伉音杭又工郎翻伉為宜春侯不疑為陰安侯登為發干侯青固謝曰師古曰固謂再三也臣幸得待罪行間行戶剛翻賴陛下神靈軍大捷皆諸校尉力戰之功也陛下幸已益封臣青臣青子在襁褓中未有勤勞上列地封為三侯列漢書作裂天子曰我非忘諸校尉功也乃封護軍都尉公孫敖為合騎侯晉灼曰合騎侯猶冠軍從票之名也余據功臣表合騎侯食邑於渤海高成班志龍額侯國屬平原郡額音洛窖匹孝翻又普孝翻樂安功臣表作安樂食邑於琅邪之昌縣涉軹班史衛青傳作陟軹功臣表作軹食邑於齊郡之西安隨成侯功臣表食邑於千乘縣從平侯食邑於東郡樂昌班史豆作竇於是青尊寵於㣥臣無二公卿以下皆卑奉之獨汲黯與亢禮亢音抗人或説黯曰自天子欲㣥臣下大將軍説式芮翻師古曰下戶嫁翻大將軍尊重君不可以不拜黯曰夫以大將軍有揖客反不重邪師古曰言能降貴以禮士最為重也愈賢黯數請問國家朝廷所疑數所角翻遇黯加於平日大將軍青雖貴有時侍中上踞廁而視之如淳曰廁溷也孟康曰廁牀邊側也師古曰如説是也仲馮曰廁當從孟説古者見大臣則御坐為起然則踞廁者輕之也上或時不冠至如汲黯見見賢遍翻上不冠不見也上嘗坐武帳中應劭曰武帳織成帳為武士象也孟康曰今御武帳置兵闌五兵於帳中也師古曰孟説是韋昭曰以武名之示威上不冠望見黯避帳中使人可其奏其見敬禮如此元朔五年夏六月詔曰蓋聞導民以禮風之以樂師古曰風教也詩序曰上以風化下朕甚閔焉其令禮官勸學興禮以為天下先於是丞相弘等奏請為博士官置弟子五十人復其身為于偽翻復方目翻第其高下以補郎中文學掌故兒寬以射策為掌故功次補廷尉文學卒史蘇林曰卒史秩六百石臣瓚曰漢注卒史秩百石師古曰瓚説是余謂掌故掌故府之典籍者也以兒寬自掌故補卒史推之則掌故之品秩從可知也輒以名聞秀才異等謂有俊秀之才異於常等者輒罷之又吏通一藝以上者請皆選擇以補右職吏謂百石已上及比百石以下也右職謂中二千石二千石之卒史也自此公卿大夫士吏彬彬多文學之士矣元朔五年秋胸奴萬騎入代殺都尉朱英略千餘人元朔五年初淮南王安好讀書屬文喜立名譽好呼到翻屬之欲翻喜許記翻招致賓客方術之士數千人其㣥臣賓客多江淮間輕薄士常以厲王遷死感激安遷死見十四卷文帝前六年彗星見彗祥歲翻又徐醉翻又旋芮翻見賢遍翻或説王曰先吳軍時彗星出長數尺然尚流血千里説式芮翻先悉薦翻長直亮翻謂吳王濞起兵時也今彗星竟天天下兵當大起王心以為然乃益治攻戰具積金錢治直之翻下同郎中雷被獲罪於太子遷雷被善用劍與太子戲誤中太子故得罪師古曰被皮義翻姓譜雷古方雷氏後欲從軍者輒詣長安被即願奮擊胸奴太子惡被於王惡毀惡也如字欲以禁後師古曰令後人更不敢效之也被亡之長安上書自明事下廷尉治下遐嫁翻蹤迹連王公卿請逮捕治王太子遷謀令人衣衛士衣持戟居王旁漢使有非是者即刺殺之人衣於既翻刺七亦翻因發兵反天子使中尉宏即訊王師古曰即就也就問也遂不發公卿奏安壅閼奮擊胸奴者格明詔當棄市閼音遏師古曰格音閣謂閣止不行之詔削二縣既而安自傷曰吾行仁義反見削地恥之於是為反謀益甚安與衡山王賜相責望禮節間不相能賜即安之弟也孝文十六年與安同受封師古曰兄弟相責故有嫌恐為所並亦結賓客為反具以為淮南已西欲發兵定江淮之間而有之衡山王后徐來譖太子爽於王欲廢之而立其弟孝王囚太子而佩孝以王印令招致賓客賓客來者微知淮南衡山有逆計日夜從容勸之從千容翻王乃使孝客江都人枚赫陳喜作輣車鍛矢輣薄庚翻兵車也樓車也鍛都元翻冶鐵也刻天子璽將相軍吏印秋衡山王當入朝過淮南淮南王乃昆弟語師古曰為相親愛之言約束反具師古曰共契約為反具上賜書不朝六年六年春二月大將軍青出定襄擊胸奴杜佑曰漢定襄郡在今馬邑北三百餘里後魏置雲中郡太僕公孫賀為左將軍翕侯趙信為前將軍功臣表翕侯國在魏郡內黃界郎中令李廣為後將軍左內史李沮為強弩將軍師古曰沮音俎咸屬大將軍斬首數千級而還賢曰秦法斬首一賜爵一級故因謂斬首為級六年赦天下六年夏四月衛青復將六將軍出定襄擊胸奴復扶又翻斬首虜萬餘人右將軍建前將軍信並軍三千餘騎獨逢單于兵與戰一日餘漢兵且盡信故胡小王降漢漢封為翕侯信元光四年十月壬午受封胸奴誘之遂將其餘騎可八百降胸奴誘音酉將即亮翻降戶江翻建盡亡其軍脫身亡自歸大將軍議郎周霸曰班表議郎屬郎中令秩比六百石自大將軍出未嘗斬裨將今建棄軍可斬以明將軍之威軍正閎長史安曰不然凡軍行置軍正掌舉軍法以正軍中軍法曰正無屬將軍將軍有罪以聞劉昭志大將軍長史秩千石如淳曰律都軍官長史一人大敵之禽也孫子之言言大小不敵小雖堅於戰終必為大所禽力戰一日餘士盡不敢有二心自歸而斬之是示後無反意也不當斬大將軍曰青幸得以肺腑待罪行間不患無威而霸説我以明威甚失臣意言失為臣之意也行戶剛翻説式芮翻將即亮翻以臣之尊寵而不敢章十四行本敢下有自字乙十一行本同亶誅於境外而具歸天子天子自裁之於以見為人臣不敢專權不亦可乎軍吏皆曰善遂囚建詣行在所蔡雍獨斷曰天子以四海為家故謂所居為行在所初平陽縣吏霍仲孺給事平陽侯家與青姊衛少兒私通生霍去病霍姓以國為氏為侍中善騎射再從大將軍擊胸奴為票姚校尉服虔曰票姚音飄搖師古曰票匹妙翻姚羊召翻票姚徑疾之貌荀悅漢紀作票鷂字去病後為票騎將軍尚取票姚之字耳今讀者音飄搖則不當其義也與輕騎勇八百直棄大軍數百里赴利斬捕首虜過當師古曰計其所將人數則捕斬首為多過於所當一曰漢軍失亡者少而殺獲胸奴數多故曰過當也票姚校尉去病斬首虜二千餘級得相國當戶斬單于大父行藉若侯産生捕季父羅姑胸奴左右大當戶在左右大都尉之下左右骨都侯之上大父行單于祖行也張晏曰藉若胡侯也産其名也師古曰此人單于祖父之行也季父亦單于季父也羅姑其名行戶浪翻師古曰比頻也比毗至翻冠古玩翻帝以去病功冠諸軍以南陽穰縣盧陽鄉宛縣臨駣聚為冠軍侯國駣音桃捕斬首虜二千餘級封賢為衆利侯姓譜殷帝乙有子期封太原郝鄉後因氏焉功臣表衆利侯食邑於琅邪郡姑幕縣是歲失兩將軍亡翕侯軍功不多故大將軍不益封止賜千金右將軍建至天子不誅贖為庶人單于既得翕侯以為自次王師古曰自次者尊重次於單于妻七細翻與謀漢信教單于益北絶幕師古曰直度曰絶幕與漠同陰山以北皆大漠不生草木徼極而取之師古曰罷讀曰疲徼要也誘令疲徼其困極然後取之徼一遙翻無近塞單于從其計近其靳翻是時漢比歲發十餘萬衆擊胡比毗至翻斬捕首虜之士受賜黃金二十餘萬斤而漢軍士馬死者十餘萬兵甲轉漕之費不與焉與讀曰預於是大司農經用竭不足以奉戰士六月詔令民得買爵及贖禁錮免臧罪置賞官名曰武功爵級十七萬凡直三十餘萬金諸買武功爵至千夫者得先除為吏禁錮重繫也臣瓚曰茂陵中書有武功爵一級曰造士二級曰間輿衛三級曰良士四級曰元戎士五級曰官首六級曰秉鐸七級曰千夫八級曰樂卿九級曰執戎十級曰政戾庶長十一級曰軍衛此武帝所制以寵軍功師古曰下云級十七萬凡直三十餘萬金今瓚引茂陵中書説之不盡也貢父曰直三十餘萬金其價之差殊不可詳也或説七當作一與茂陵書合矣余謂賣爵當級級稍增其價豈可例云級十七萬若每級十七萬比至三十餘萬金當一萬七千餘級又非也然則誤衍此萬字蓋武功爵其級十七參考顏劉注皆因求其説而不得遂疑茂陵書所謂十一級為不足又疑史之正文萬字為衍皆未為允也蓋級十七萬者賣爵一級為錢十七萬至二級則三十四萬矣自此以上烏得不每級而增乎王莽時黃金一斤直錢萬以此推之則三十萬金為錢三十餘萬萬矣此當時鬻武功爵所直之數也夫民入錢買爵隨其錢之多少為爵級之高下爵之高下有定直而民錢之多少無定數若此而同之其失彌遠矣史記作直八十萬金索隱曰一金萬錢初一級十七萬自此以上每級加二萬至十七級合成三十四萬也官職耗廢矣師古曰耗亂也莫報翻元狩元年己未前一二二六年冬十月上行幸雍祠五畤雍於用翻畤音止獲獸一角而足有五蹄有司言陛下肅祗郊祀上帝報享錫一角獸蓋麟云麟麋身牛尾馬足五色圜蹄一角角端有肉音中鍾呂行中規矩遊必擇地詳而後處不履生蟲不踐生草不㣥居不侶行不入陷穽不罹羅網王者至仁則出今並州界有麟大小如鹿非瑞應麟也京房易傳曰麟麕身牛尾馬蹄有五采腹下黃高丈二爾雅麟麕身牛尾一角蓋麟似麕圓頂一角曰蓋云者意其為麟而未知其果為麟也於是以慶章十四行本慶作薦乙十一行本同五畤畤加一牛以燎畤音止久之有司又言元宜以天瑞命不宜以一二數一元曰建二元以長星曰光今元以郊得一角獸曰狩云於是濟北王濟北王勃淮南厲王子孝文十六年封衡山王孝景四年徙封濟北今王勃子成王胡也濟北王都盧後天漢四年國除入漢為泰山郡濟子禮翻上書獻泰山及其旁邑天子以他縣償之六年淮南王安與賓客左吳等日夜為反謀姓譜齊之公族有左右公子後因氏焉余按衛亦有左右公子姓譜之説非是魯有左丘明蘇林曰輿猶盡載之意索隱曰志林云輿地圖漢家所畫非出遠也諸使者道長安來為妄言言上無男漢不治即喜即言漢廷治有男王怒以為妄言非也治直吏翻王召中郎伍被被皮義翻姓譜伍姓出於楚伍舉與謀反事被曰王安得此亡國之言乎臣見宮中生荊棘露霑衣也王怒繫伍被父母囚之三月復召問之復扶又翻被曰昔秦為無道窮奢極虐百姓思亂者十家而六七高皇帝起於行陳之中行戶剛翻陳讀曰陳立為天子此所謂蹈瑕候間間古莧翻因秦之亡而動者也今大王見高皇帝得天下之易也易以豉翻獨不觀近世之吳楚乎事見十五卷景帝三年四郡東陽郡鄣郡吳郡豫章郡王王下于況翻計定謀成舉兵而西然破於大梁謂為梁孝王所破也身死祀絶者何誠逆天道而不知時也方今大王之兵衆不能十分吳楚之一天下安寧萬倍吳楚之時大王不從臣之計今見大王棄千乘之君賜絶命之書為㣥臣先死於東宮也如淳曰東宮淮南王所居也王有孽子不害最長庶生曰孽長知兩翻王后太子皆不以為子兄數言后不以為子太子不以為兄數秩數也材高有氣常怨望太子陰使人告太子謀殺漢中尉事事見上元朔五年下遐嫁翻王患之欲發復問伍被曰復扶又翻公以為吳興兵是邪非邪被曰非也臣聞吳王悔之甚願王無為吳王之所悔王曰吳何知反漢將一日過成皋者四十餘人今我絶成皋之口據三川之險漢河南秦三川郡也其地當伊洛河三川之會舉事如此左吳趙賢朱驕如皆以為什事九成公獨以為有禍無福何也必如公言不可徼幸邪師古曰徼要也幸非妄之福也徼工堯反必不得已被有愚計當今諸侯無異心百姓無怨氣可偽為丞相御史請書言偽為丞相御史奏請於天子之書益發甲卒急其會日又偽為詔獄書漢時左右都司空上林中都官皆有詔獄蓋奉詔以鞠囚因以為名逮追對獄也則民怨諸侯懼即使辨士隨而説之説式芮翻下同儻可徼幸什得一乎王曰此可也雖然吾以為不至若此言不須為此也於是王乃作皇帝璽丞相御史大夫將軍軍吏中二千石及旁近郡太守都尉印漢使節使疏吏翻欲使人偽得罪而西言使人詐為得罪而逃去西如京師一日發兵一日猶言一旦刺七亦翻且曰漢廷大臣獨汲黯好直諫好呼到翻守節死義難惑以非至如説丞相弘等如發蒙振落耳發蒙謂物所蒙覆發而去之振落謂木葉將落振而墜之皆言其易説式芮翻王欲發國中兵恐其相二千石不聽王乃與伍被謀先殺相二千石又欲令人衣求盜衣求盜卒也掌逐捕盜賊漢書本紀高帝時為亭長令求盜之薛治竹皮冠人衣於既翻呼曰南越兵入界呼火故翻欲因以發兵會廷尉逮捕淮南太子淮南王聞之與太子謀召相二千石欲殺而發兵召相相至內史中尉皆不至王念獨殺相無益也即罷相罷遣出去也相息亮翻計未決太子即自剄不殊晉灼曰不殊不死也師古曰言雖自剄而身首不能絶也剄古頂翻下同伍被自詣吏告與淮南王謀反蹤迹如此吏因捕太子王后圍王宮盡求捕王所與謀反賓客在國中者索得反具以章十四行本以下有聞字乙十一行本同孔本同退齋校同上下公卿治其黨與索山客翻求也搜也以上時掌翻下公戶嫁翻以上句斷使宗正以符節治王未至章十四行本至下有十一月三字乙十一行本同張校作十二月云無注本作十一月淮南王安自剄殺王后荼太子遷諸所與謀反者皆族天子以伍被雅辭多引漢之美欲勿誅雅素也雅辭素來言語也被首為王畫反計為于偽翻罪不可赦乃誅被侍中莊助素與淮南王相結交私論議王厚賂遺助遺于季翻上薄其罪欲勿誅張湯爭以為助出入禁門腹心之臣而外與諸侯交私如此不誅後不可治助竟棄市衡山王上書請廢太子爽立其弟孝為太子爽聞即遣所善白嬴之長安上書言孝作輣車鍛矢與王御者姦欲以敗孝敗蒲邁翻會有司捕所與淮南王謀反者得陳喜於衡山王子孝家吏劾孝首匿喜師古曰為頭首而藏匿之律先自告除其罪即先自告所與謀反者枚赫陳喜等公卿請逮捕衡山王治之王自剄死王后徐來太子爽及孝皆棄市所與謀反者皆族凡淮南衡山二獄所連引列侯二千石豪傑等死者數萬人六年夏四月赦天下六年丁卯立皇子據為太子年七歲六年五月乙巳晦日有食之六年胸奴萬人入上谷殺數百人六年初張騫自月氏還事見上卷元朔四年氏音支為于偽翻大宛在漢正西可萬里其俗土著耕田土著謂有城郭常居不隨水草移徙也宛於元翻著直略翻馬汗血孟康曰大宛國有高山其上有馬不可得因取五色母馬置其下與集生駒皆汗血因號天馬子云一説汗血者汗從肩膊出如血號能一日千里如中國其東北則烏孫東則于填于填國在南山下居西城填徒賢翻又徒見翻則水皆西流注西海水經注崑崙山西有大水名新頭河度蔥嶺入北天竺境又西南流屈而東南流徑中天竺國又西徑安息南注於雷翥海雷翥海即西海也在安息之西犂靬之東東南連交州海水東流注鹽澤水經注河水一源出于填國南山北流與蔥嶺河合東注蒲昌海西域傳鹽澤一名蒲昌海去玉門陽關三百餘里廣袤三百里其水停居冬夏不增減皆以為潛行地下南出於積石為中國河云玉門陽關皆在敦煌西界括地志蒲昌海一名泑澤亦名鹽澤亦名輔日海亦名穿蘭亦名臨海在沙州西南玉門關在沙州壽昌縣西六里其南則河源出焉索隱曰按漢書西南夷傳云河有兩源其一出蔥嶺一出于填山海經云河出崑崙東北隅郭璞云河出崑崙潛行地下至蔥嶺山于填國復分流歧出合而東注泑澤已而復行積石為中國河泑澤即鹽澤也西域傳云于填在南山下與郭璞注山海經不同廣志云蒲昌海在蒲類海東唐長慶中劉元鼎為盟會使言河之上流由洪濟西南行二千里水益狹冬春可涉夏秋乃勝舟其南三百里三山中高四下曰歷山直大羊同國古所謂昆侖者也虜曰悶摩黎山東距長安五千里河源其間流澄緩下稍合衆流色赤行益遠他水並注則濁河源東北直莫賀延磧尾隱測其地蓋劍南之西胸奴右方居鹽澤以東至隴西長城即秦所築長城也秦築長城起臨洮臨洮縣漢屬隴西郡鬲漢道焉鬲與隔同皆行國隨畜牧奄蔡國在康居西北臨大澤無涯蓋北海云隨畜牧逐水草而居無城郭常處故曰行國大夏在大宛西南與大宛同俗臣在大夏時見邛竹杖蜀布臣瓚曰邛山名生竹高節可作杖服虔曰蜀布細布也史記正義曰邛都邛山出此竹因名邛竹節高實中或奇生可為杖布土蘆布邛渠容翻大夏國人曰吾賈人往市之身毒孟康曰身毒即天竺也所謂浮屠胡也鄧展曰毒音篤李奇曰一名天篤師古曰亦曰捐毒賈音古索隱曰身音乾其俗土著與大夏同以騫度之著直略翻度徒洛翻大夏去漢萬二千里居漢西南今身毒國又居大夏東南數千里有蜀物此其去蜀不遠矣今使大夏從羌中險羌人惡之使疏吏翻惡烏路翻少北則為胸奴所得少詩沼翻從蜀宜徑又無寇師古曰宜當也徑直也從蜀向大夏其道當直天子既聞大宛及大夏安息之屬安息治番兜城臨媯水去長安萬一千六百里其俗亦土著多奇物土著頗與中國同業而兵弱貴漢財物其北有大月氏康居之屬兵強可以賂遺設利朝也師古曰設施也施之以利誘令入朝遺于季翻朝直遙翻師古曰謂不以兵革重九譯譯傳言之人周官象胥之職也遠方之人言語不同更歷九譯乃能通於中國重直龍翻威德遍於四海欣然以騫言為然乃令騫因蜀犍為發間使王然于等四道並出師古曰間使者求間隙而行間古莧翻使疏吏翻出冉出徙出邛僰指求身毒國徙斯榆也以手點物為指使之出求路指身毒而行徙讀與斯同僰蒲墨翻其北方閉氐莋南方閉巂昆明服虔曰漢使見閉於夷也師古曰巂即今巂州也昆明又在其西南即今南寧州諸爨所居是其地莋音昨又音作巂先蘂翻善寇盜輒殺略漢使終莫得通於是漢以求身毒道始通滇國滇國地有滇池因以名國楚使莊蹻以兵定夜郎諸國至滇池因留王其地華陽國志滇池周回三百里所出深廣下流淺狹如倒流故謂之滇池漢為益州郡後改為永昌郡魏晉之間為晉寧郡唐為昆州括地志滇池澤在昆州晉寧縣西南三十里長知兩翻滇音顛漢孰與我大及夜郎侯亦然以道不通故各自以為一州主不知漢廣大使者還因盛言滇大國足事親附天子注意焉乃復事西南夷元朔三年罷西南夷至是復通師古曰事謂經略通之專以為事也復扶又翻二年二年冬十月上幸雍祠五畤雍於用翻畤音止二年三月戊寅平津獻侯公孫弘薨壬辰以御史大夫樂安侯李蔡為丞相廷尉張湯為御史大夫考異曰漢書百官公卿表元狩三年三月壬辰廷尉張湯為御史大夫六年有罪自殺史記將相名臣表元狩二年御史大夫湯按李蔡既遷湯即應補其缺豈可留之期年復與李蔡為丞相月日正同乎又按長曆三年三月無壬辰又以得罪之年推之在今年明矣今從史記表二年霍去病為票騎將軍票騎將軍始此票頻妙翻擊胸奴歷五王國轉戰六日過焉支山千餘里括地志焉支山一名刪丹山在甘州刪丹縣東南五十里焉音煙斬盧侯王張晏曰折蘭盧侯胡國名也殺者殺之而已斬者獲其首也師古曰折蘭胸奴中姓也今鮮卑中有是蘭姓者即其種也折上列翻師古曰渾下昆翻及相國都尉獲首虜八千九百餘級收休屠王祭天金人孟康曰胸奴祭天處本在雲陽甘泉山下秦擊奪其地後徙之休屠王右地故休屠王有祭天金人像也如淳曰祭天以金人為主也張晏曰佛徒祠金人也師古曰作金人以為天神之像而祭之今之佛像是其遺法屠音儲夏去病復與合騎侯公孫敖將數萬騎俱出北地異道復扶又翻衛尉張騫郎中令李廣俱出右北平異道廣將四千騎先行可數百里騫將萬騎在後胸奴左賢王將四萬騎圍廣廣軍士皆恐廣乃使其子敢獨與數十騎馳貫胡騎貫穿也告廣曰胡虜易與耳易以豉翻軍士乃安廣為圜陳外嚮陳讀曰陳胡急擊之矢下如雨漢兵死者過半漢矢且盡廣乃令士持滿毋發師古曰注矢於弓弩而引滿之不發矢也殺數人徐廣曰南都賦黃間機張善弩之名裴駰曰按鄭德曰黃肩弩淵中黃朱之孟康曰太公六韜云陷堅敗強敵用大黃連弩韋昭曰角弩色黃而體大也射而亦翻會日暮吏士皆無人色師古曰言懼甚師古曰自如猶云如舊師古曰巡部曲整行陳也治直之翻明日復力戰復扶又翻死者過半所殺亦過當會博望侯軍亦至張騫從大將軍擊胸奴知水草處軍得以不乏封博望侯師古曰取其能廣博瞻望班志博望侯國屬南陽郡括地志博望故城在鄧州向城縣東南四十五里漢軍罷罷讀曰疲弗能追罷歸漢法博望侯留遲後期當死贖為庶人廣軍功自如無賞自如言功過正相當也廣軍失亡多而殺虜亦過當故曰自如與合騎侯失不相得票騎將軍踰居延居延澤古文以為流沙帝開置居延縣屬張掖郡使路博德築遮虜障於其北胸奴破大月氏月氏西擊大夏而臣之其餘小衆不能去者保南山羌號小月氏至祁連山得單桓酋塗王張晏曰單桓酋塗皆胡王也師古曰酋才猶翻塗音塗降戶江翻斬首虜三萬二百級獲裨小王七十餘人天子益封去病五千戶封其裨將有功者鷹擊司馬趙破奴為從票侯以從票騎有功因以為號功臣侯表不書食邑之地功臣表宜冠侯食邑於琅邪之昌縣僕多本胸奴種來降漢功臣表僕多作僕朋輝渠侯食邑於南陽之魯陽縣當斬贖為庶人是時諸宿將所將士馬兵皆不如票騎票騎所將常選師古曰選取驍鋭索隱曰選宜變翻常與壯騎先其大軍先悉薦翻軍亦有天幸未嘗困絶也而諸宿將常留落不偶師古曰留謂遲留落謂墜落故不諧耦而無功也比大將軍矣胸奴入代鴈門殺略數百人二年江都王建建易王非之子景帝之孫淖鄭氏音卓師古音奴教翻淖姓也戰國時楚有淖齒建遊雷陂雷陂即廣陵之雷塘在今揚州堡城之北平岡之上建使郎二人乘小船入陂中船覆兩郎溺攀船乍見乍沒見賢遍翻令勿救皆死凡殺不辜三十五人專為淫虐自知罪多恐誅與其后成光共使越婢下神祝詛上祝織救翻詛莊助翻又聞淮南衡山陰謀建亦作兵器刻皇帝璽為反具事發覺有司請捕誅建自殺后成光等皆棄市國除二年膠東康王寄薨寄景帝子中二年受封二年秋胸奴渾邪王降是時單于怒渾邪王休屠王居西方為漢所殺虜數萬人欲召誅之渾邪王與休屠王恐謀降漢先遣使向邊境要遮漢人要一遙翻令報天子是時大行李息將城河上得渾邪王使使疏吏翻馳章十四行本馳上有即字乙十一行本同張校同云無注本亦無即字傳以聞傳株戀翻下同天子聞之恐其以詐降而襲邊乃令票騎將軍將兵往迎之休屠王後悔渾邪王殺之並其衆票騎既渡河與渾邪王衆相望渾邪王裨將見漢軍而多不欲降者師古曰恐被掩覆也票騎乃馳入得與渾邪王相見斬其欲亡者八千人遂獨遣渾邪王乘傳詣至章十四行本傳下有先字無至字乙十一行本同孔本同張校同行在所傳張戀翻盡將其衆渡河降者四萬餘人號稱十萬既至長安天子所以賞賜者數十巨萬封渾邪王萬戶為漯陰侯班志漯陰縣屬平原郡漯他合翻呼毒尼為下摩侯倠疪為輝渠侯禽黎為何綦侯文當戶調雖為常樂侯文穎曰倠音鷹疪音疪廕之庇師古曰疪匹履翻渾邪之降也漢發車二萬乘以迎之考異曰漢書食貨志云三萬兩今從史記平準書汲黯傳從民貰馬貰始制翻貸也師古曰賒買也民或匿馬馬不具上怒欲斬長安令右內史汲黯曰長安令無罪獨斬臣黯民乃肯出馬且胸奴畔其主而降漢漢徐以縣次傳之何至令天下騷動罷敝中國罷讀曰疲而以事夷狄之人乎上默然及渾邪至賈人與市者坐當死五百餘人黯請間見高門晉灼曰三輔黃圖未央宮中有高門殿賈音古見賢遍翻夫胸奴攻當路塞言塞障當胸奴所入之路也中國興兵誅之死傷者不可勝計勝音升而費以巨萬百數師古曰即數百巨萬也皆以為奴婢以賜從軍死事者家所鹵獲因豫之鹵與虜同豫讀曰與塞百姓之心師古曰塞滿也塞悉則翻渾邪率數萬之衆來降虛府庫賞賜發良民侍養譬若奉驕子愚民安知市買長安中物而文吏繩以為闌出財物于邊關乎應劭曰闌妄也律胡市吏民不得持兵器及錢出關雖於京師市買其法一也臣瓚曰無符傳出入為闌也又以微文殺無知者五百餘人是所謂庇其葉而傷其枝者也臣竊為陛下不取也為于偽翻上默然不許曰吾久不聞汲黯之言今又復妄發矣居頃之乃分徙降者邊五郡故塞外而皆在河南因其故俗為五屬國五郡謂隴西北地上郡朔方雲中也故塞秦之先與胸奴所關之塞自秦使蒙恬奪胸奴地而邊關益斥秦項之亂冒頓南侵與中國關於故塞及衛青收河南而邊關復蒙恬之舊所謂故塞外其地在北河之南也師古曰凡言屬國存其國號而屬漢朝故曰屬國史記正義曰以來降之民徙置五郡各依本國之俗而屬於漢故曰屬國河水出金城河關縣西南塞外積石山東流徑金城郡界自允吾以西通謂之金城河渡河而西則武威等四郡之地然金城郡昭帝於元始六年方置史追書也空無胸奴並步浪翻胸奴時有候者到而希矣休屠王太子日磾與母閼氏弟倫俱沒入官輸黃門養馬久之磾丁奚翻班表黃門屬少府師古曰黃門之署職任親近以供天子百物在焉閼氏音煙支帝遊宴見馬師古曰方於遊宴之時而召閲諸馬日磾等數十人牽馬過殿下莫不竊視師古曰視宮人日磾長八尺二寸長直亮翻容貌甚嚴馬又肥好上異而問之具以本狀對上奇焉即日賜湯沐衣冠拜為馬監黃門有馬監狗監侍中得出入禁中駙馬都尉帝所置秩比二千石師古曰駙副馬也非正駕車皆為副馬一曰駙近也疾也光祿大夫本中大夫帝改其名近其靳翻未嘗有過失上甚信愛之賞賜纍千金出則驂乘乘繩正翻入侍左右貴戚多竊怨曰陛下妄得一胡兒反貴重之上聞愈厚焉以休屠作金人為祭天主故賜日磾姓金氏為金氏貴顯張本三三原誤二年辛酉前一二二年春有星孛于東方孛蒲內翻二年夏五月赦天下二年淮南王之謀反也膠東康王寄微聞其事私作戰守備及吏治淮南事辭出之師古曰獄辭所連發出其事即皇太后之女弟也於上最親意自傷發病而死不敢置後上聞而憐之立其長子賢為膠東王康王寄去年薨今年方置後王故衡山王地衡山國都六故改為六安二年秋胸奴入右北平定襄各數萬騎殺略千餘人二年山東大水民多飢乏天子遣使者虛郡國倉廥以振貧民廥工外翻芻藳之藏也一曰庫廣既名猶不足又募豪富吏民能假貸貧民者以名聞尚不能相救乃徙貧民於關以西及充朔方以南新秦中應劭曰秦遣蒙恬卻胸奴得其河南造陽之地千里地甚好於是為築城郭徙民充之名曰新秦四方錯雜奢儉不同今俗名新富貴者為新秦由是名也衣食皆仰給縣官數歲假豫産業使者分部護之仰牛向翻豫讀曰與分扶問翻冠蓋相望其費以億計不可勝數勝音升二年漢既得渾邪王地隴西北地上郡益少胡寇詔減三郡戍卒之半以寬天下之繇繇讀曰徭二年上將討昆明以其閉漢使故也乃作昆明池以習水戰昆明池在長安西南周回四十里三輔舊事昆明池蓋地三百二十頃吏多廢免兵革數動數所角翻民多買復師古曰入財於官以取優復復方目翻五大夫舊爵二十等之第九級也漢法至此始免徭役鮮少也先淺翻於是除千夫五大夫為吏不欲者出馬師古曰千夫五大夫不欲為吏者使之出馬也千夫武功爵第七級皆謫令伐棘上林穿昆明池二年是歲得神馬於渥窪水中李斐曰南陽新野有暴利長當武帝時遭刑屯田敦煌界數於此水旁見㣥野馬中有奇馬與凡馬異來飲此水利長先作土人持勒絆於水傍後馬玩習久之代土人持勒絆收得其馬獻之欲神異此馬云從水中出渥音握窪於佳翻樂府有安世房中歌十七章郊祀歌十九章使童男女七十人歌之師古曰始置之也樂府之名蓋起於此哀帝時罷之以宦者李延年為協律都尉協律都尉先無此官武帝始置於此絃次初詩以合八音之調詩多爾雅之文初詩新造之詩也八音金石絲竹匏土革木也調徒釣翻爾雅三卷二十篇文帝時列於學官張晏曰爾近也雅正也必集會五經家相與共講習讀之乃能通知其意漢時五經之學各專門名家故通一經者不能盡通歌詩之辭意必集五經家相與講讀乃得通也及得神馬次以為歌汲黯曰凡王者作樂上以承祖宗下以化兆民今陛下得馬詩以為歌協於宗廟先帝百姓豈能知其音邪詩大序曰聲成文謂之音注云聲謂宮商角徵羽也成文謂五聲上下相應鄭康成曰五聲雜比曰音單出曰聲上默然不説説讀曰悅考異曰史記樂書武帝作十九章歌常以正月上辛祠太乙甘泉使僮男僮女七十人俱歌又嘗得神馬渥窪水中復次以為太一之歌後伐大宛得千里馬次以為歌中尉汲黯進曰陛下得馬詩以為歌云云丞相公孫弘曰黯誹謗聖制當族漢書禮樂志武帝定郊祀之禮祠太一於甘泉祭后土於汾陰乃立樂府作十九章之歌以正月上辛用事甘泉圜丘按天馬歌本志云元狩三年馬生渥窪水中作武紀云元鼎四年秋馬生渥窪水中五年十一月立泰畤於甘泉太初四年二師獲汗血馬作西極天馬之歌公孫弘以元狩二年薨汲黯以元狩三年免右內史五年為淮陽太守元鼎五年卒又黯未嘗為中尉或者馬生渥窪水作歌在元狩三年汲黯為右內史而譏之言當族者非公孫弘也雖未立泰畤或以歌之於郊廟其十九章之歌當時未能盡備也上招延士大夫常如不足然性嚴峻㣥臣雖素所愛信者或小有犯法或欺罔輒按誅之無所寬假汲黯諫曰陛下求賢甚勞未盡其用輒已殺之以有限之士恣無已之誅臣恐天下賢才將盡陛下誰與共為治乎黯言之甚怒上笑而諭之黯言之甚怒上乃笑而喻之即其怒笑之間而觀其君臣相與之意則帝之於黯非但能容其直而從容不迫方喻之以其所見使他人處此固將順之不暇矣而黯自言其心猶以為非此豈面從退有後言者哉黯之事君固人所難能而帝之容黯亦非後世之君所可及矣治直吏翻何世無才患人不能識之耳苟能識之何患無人夫所謂才者猶有用之器也有才而不肯盡用與無才同不殺何施黯曰臣雖不能以言屈陛下而心猶以為非願陛下自今改之無以臣為愚而不知理也上顧㣥臣曰黯自言為便辟則不可朱熹曰便者便人之所好辟者避人之所惡便毗連翻辟讀曰僻豈不信然乎四年四年冬有司言縣官用度太空而富商大賈冶鑄煮鹽財或絫萬金不佐國家之急賈音古絫古纍字請更錢造幣以贍用而摧浮淫並兼之徒是時禁苑有白鹿而少府多銀錫乃以白鹿皮方尺緣以藻繢緣以絹翻師古曰繢繡也繢五采而為之繢黃外翻為皮幣直四十萬王侯宗室朝覲聘享必以皮幣薦璧然后得行后與後同如淳曰雜銀錫為白金其文龍直三千次方之其文馬直五百小者橢之其文龜直三百時議以為天用莫如龍地用莫如馬人用莫如龜故以為白金三品之文師古曰橢圜而長也音他果翻更鑄三銖錢建元五年廢三銖錢行半兩錢更工衡翻而吏民之盜鑄白金者不可勝數勝音升於是以東郭咸陽孔僅為大農丞領鹽鐵事師古曰二人也姓東郭名咸陽姓孔名僅班表大農令有兩丞齊有大夫東郭氏姓譜桑秦大夫子桑之後齊之大煮鹽僅南陽大冶皆致生絫千金弘羊洛陽賈人子以心計心計者不必用籌算而知其數也賈音古下同三人言利事析秋毫矣毫至秋而鋭小言其剖析微細雖秋毫之小亦可分而為二也詔禁民敢私鑄鐵器煮鹽者釱左趾韋昭曰釱以鐵為之著左足以代刖也索隱曰三蒼云釱踏腳鉗也張斐漢晉律序狀如跟衣著足下重六斤以代刖至魏武改以滅代釱也晉律鉗重二斤長翹一尺五寸師古曰釱徒計翻公卿又請令諸賈人末作各以其物自占師古曰占隱度也各隱度其財物之多少而為名簿送之於官也占之贍翻下同李斐曰緡絲也以貫錢一貫千錢出算二十也瓚曰此緡錢為是儲緡錢也故隨其用所施而出算余謂率計緡錢二千而出一算算百二十錢緡眉巾翻皆有算軺小車也弋招翻匿不自占占不悉戍邊一歲沒入緡錢匿藏也悉盡也藏匿而不自占占而不盡者罰戍邊一歲沒其錢入官以其半畀之其法大抵出張湯湯每朝奏事語國家用日晏師古曰論事既多至於日晚朝直遙翻丞相充位但充其位無所建明百姓騷動不安其生咸指怨湯四年初河南人卜式數請輸財縣官以助邊數所角翻天子使使問式欲官乎式曰臣少田牧不習仕宦不願也少詩照翻使者問曰家豈有冤欲言事乎式曰臣生與人無分爭邑人貧者貸之不善者教之所居人皆從式式何故見冤於人無所欲言也使者曰苟如此子何欲而然式曰天子誅胸奴愚以為賢者宜死節於邊有財者宜輸委委於偽翻蓄也宜輸其所蓄也如此而胸奴可滅也上由是賢之欲尊顯以風百姓師古曰風讀曰諷又如字乃召拜式為中郎爵左庶長賜田十頃布告天下使明知之未幾又擢式為齊太傅齊王次昌元朔三年薨無後國除元狩六年始封皇子閎為齊王式蓋傅閎也史因其輸財得官而終書之幾居豈翻四年春有星孛于東北孛蒲內翻夏有長星出于西北四年上與諸將議曰翕侯趙信為單于畫計為于偽翻常以為漢兵不能度幕輕留幕沙漠也師古曰言輕易漢軍留而不去也一曰謂漢軍不能輕入而久留也余謂後説是其勢必得所欲乃粟馬十萬師古曰以粟秣馬也私負從馬復四萬匹師古曰私負衣裝及私將馬自從者皆非公家所發之限從才用翻師古曰轉者謂運輜重也踵接也票騎始為出定襄當單于捕虜言單于東乃更令票騎出代郡令大將軍出定襄郎中令李廣數自請行數所角翻天子以為老弗許良久乃許之以為前將軍太僕公孫賀為左將軍主爵都尉趙食其為右將軍食其音異箕平陽侯曹襄為後將軍皆屬大將軍趙信為單于謀曰漢兵既度幕人馬罷胸奴可坐收虜耳師古曰言收虜漢軍人馬可不費力故言坐罷讀曰疲師古曰送輜重遠去令處北也大將軍既出塞捕虜知單于所居乃自以精兵走之走音奏而令前將軍廣並於右將軍軍出東道師古曰並合也合軍而同道師古曰回繞也曲也戶悔翻廣自請曰臣部為前將軍今大將軍乃徙令臣出東道且臣結髮而與胸奴戰今乃一得當單于結髮者言始勝冠即在戰陳及今得當單于也先死單于師古曰致死而取單于以為李廣老數奇孟康曰奇隻不偶也如淳曰數為胸奴所敗為奇不耦師古曰言廣命隻不耦合也孟説是矣數所角翻奇居宜翻恐不得所欲師古曰謂不勝敵也余謂指欲禽單于脫有邂逅失之為不得所欲大將軍亦欲使敖與俱當單于敖失侯見上二年青本與敖友又脫青於厄故青欲使當單于而立功廣知之固自辭於大將軍大將軍不聽廣不謝而起行意甚慍怒慍於運翻大將軍出塞千餘里度幕見單于兵陳而待言結陳以待敵也陳與陳同張晏曰武剛車兵車也師古曰環繞也續漢志諸軍有矛戟其飾幡斿旗幟有巾有蓋謂之武剛車環音宦胸奴亦縱可萬騎會日且入言日欲沒也砂礫擊面師古曰礫小石也音歷兩軍不相見漢益縱左右翼繞單于師古曰翼謂左右舒引其兵如鳥之張翼自度戰不能如漢兵度徒洛翻單于遂乘六騾壯騎可數百直冒漢圍西北馳去師古曰騾者驢種馬子堅忍單于自乘善走騾而壯騎隨之也冒犯也騾來戈翻冒莫克翻漢胸奴相紛拏師古曰紛拏亂相持搏也拏女居翻殺傷各大相當單于未昏而去漢軍發輕騎夜追之大將軍軍因隨其後胸奴兵亦散走遲明遲直二翻行二百餘里不得單于捕斬首虜萬九千級遂至填顏山趙信城填徒賢翻如淳曰趙信降胸奴築城居之得胸奴積粟食軍師古曰食讀曰飼留一日悉燒其城餘粟而歸前將軍廣與右將軍食其軍無導惑失道後大將軍師古曰惑迷也在後不及期也大將軍引還過幕南乃遇二將軍大將軍使長史責問廣食其失道狀急責廣之幕府對簿師古曰簿謂文狀也諸校尉無罪乃我自失道吾今自上簿至莫府上時掌翻廣謂其麾下曰廣結髮與胸奴大小七十餘戰今幸從大將軍出接單于兵而大將軍徙廣部行回遠而又迷失道豈非天哉且廣年六十餘矣終不能復對刀筆之吏復扶又翻遂引刀自剄剄古頂翻廣為人廉得賞賜輒分其麾下飲食與士共之為二千石四十餘年家無餘財猿臂善射如淳曰臂如猿臂通肩也度徒洛翻中竹仲翻將兵乏絶之處孔穎達曰暫無曰乏不續曰絶士卒不盡飲廣不近水近其靳翻士卒不盡食廣不嘗食士以此愛樂為用樂音洛及死一軍皆哭百姓聞之知與不知無老壯皆為垂涕師古曰知謂素相識知也為于偽翻下遐嫁翻當死贖為庶人單于之遁走其兵往往與漢兵相亂而隨單于單于久不與其大衆相得其右谷蠡王以為單于死乃自立為單于谷蠡音鹿黎十餘日真單于復得其衆而右谷蠡王乃去其單于號師古曰去除也丘呂翻票騎將軍騎兵車重與大將軍軍等重直用翻而無裨將悉以李敢等為大校當裨將校戶教翻出代右北平二千餘里絶大幕直左方兵師古曰直當也胸奴分其國為左右諸左王將居東方直上谷以東接濊貊朝鮮右王將居西方直上郡以西接氐羌故謂之左右方亦謂之左右地將軍相國當戶都尉八十三人封狼居胥山禪於姑衍登臨翰海張晏曰登海邊山以望海也有大幼故增山而廣地也如淳曰翰海北海名也崔浩曰㣥鳥之所解羽故曰翰海廣志翰海在沙漠北師古曰積土增高曰封為墠祭地曰禪天子以五千八百戶益封票騎將軍又封其所部右北平太守路博德等四人為列侯路博德為邳離侯衛山為義陽侯復陸支為杜侯伊即靬為衆利侯校尉敢為關內侯食邑軍吏卒為官賞賜甚多而大將軍不得益封軍吏卒皆無封侯者兩軍之出塞塞閲官及私馬凡十四萬匹而復入塞者不滿三萬匹乃益置大司馬位大將軍票騎將軍皆為大司馬定令令票騎將軍秩祿與大將軍等應劭曰司馬主武事諸武官亦以為號漢官儀曰時議者以為軍中有侯司馬故加大為大司馬以別異之自此票騎將軍同大將軍品秩位亞丞相大將軍青日退而票騎日益貴大將軍故人門下士多去事票騎輒得官爵唯任安不肯票騎將軍為人少言不泄孔文祥曰謂質重少言膽氣在中也天子嘗欲教之孫吳兵法孫孫武吳吳起也顧方略何如耳不至學古兵法天子為治第令票騎視之對曰胸奴未滅無以家為也治直之翻由此上益重愛之然少貴不省士師古曰省視也言不恤視軍士也少詩照翻天子為遣太官齎數十乘班表太官有令有丞主膳食師古曰齎與資同余謂音則兮翻亦通裝也為于偽翻乘繩證翻重車餘棄粱肉師古曰重直用翻粱粟類也米之善者而士有飢者其在塞外卒乏糧或不能自振而票騎尚穿域踏鞠服虔曰穿域作鞠室也師古曰鞠以皮為之實以毛蹴踏為戲也劉向別録曰蹴鞠相傳以為黃帝所作或曰起戰國之時所以講武知有材也踏徒臘翻鞠居六翻大將軍為人仁喜士退讓師古曰喜許吏翻以和柔自媚於上兩人志操如此操七到翻是時漢所殺虜胸奴合八九萬而漢士卒物故亦數萬魏臺訪議高堂隆曰聞之先師物無也故事也言無復所能於事也索隱曰漢以來謂死為物故就朽故也師古曰物故謂死也言其同於鬼物而故也蓋漢軍死者亦數萬而幕南無王庭冒頓之強盡取蒙恬所奪胸奴地而王庭列置於幕南今胸奴為漢所攻遠遁幕北故幕南無王庭也班志令居縣屬金城郡令音零置田官置官以主屯田稍蠶食胸奴以北蠶食言如蠶之食葉以漸而侵其地也不復大出擊胸奴矣少詩沼翻復扶又翻下同胸奴用趙信計遣使於漢好辭請和親天子下其議下遐嫁翻下同或言和親或言遂臣之丞相長史任敞曰班表丞相有二長史秩二千石任音壬胸奴新破困宜可使為外臣朝請於邊漢使任敞於單于單于大怒留之不遣朝直遙翻請才性翻使疏吏翻是時博士狄山議以為和親便姓譜狄春秋狄國之後又曰周文王封少子於狄城湯曰此愚儒無知狄山曰臣固愚愚忠若御史大夫湯乃詐忠於是上作色曰吾使生居一郡師古曰博士儒官也故呼為生曰不能曰居一縣對曰不能復曰居一障間師古曰障謂塞上要險之處別築為城因置吏士而為蔽障以禦寇也障之尚翻又漢制每塞要處別築為城置人鎮守謂之候城此即障也辨窮且下吏師古曰度計也見詰辨而辭窮當下吏也下遐嫁翻能於是上遣山乘障師古曰乘登也登而守之胸奴斬山頭而去自是之後㣥臣震懾師古曰震動也懾失氣也懾之涉翻忤五故翻四年是歲汲黯坐法免以定襄太守義縱為右內史河內太守王溫舒為中尉守式又翻先是寧成為關都尉函谷關都尉也先悉薦翻寧見乳虎無值寧成之怒師古曰猛虎産乳護養其子則搏噬過當故以為喻乳人喻翻義姓也縱其名寧成側行送迎側行不敢正行言恭甚遂按寧氏破碎其家南陽吏民重足一迹言纍足也畏懼之甚重直龍翻初至掩定襄獄中重罪輕繫二百餘人及賓客昆弟私入視亦二百餘人一捕鞫曰為死罪解脫一切皆捕而鞫問之也服虔曰律諸囚徒私解脫桎梏鉗赭加罪一等為人解脫與同罪縱鞫相賂餉者二百人以為解脫死罪盡殺之師古曰鞫窮也謂窮治也皆報殺四百餘人師古曰奏請得報而論殺原父曰縱掩定襄獄一切捕鞫而云是日皆報殺則非奏請報可之報矣然則以論決為報也是時趙禹張湯以深刻為九卿然其治尚輔法而行縱專以鷹擊為治師古曰言如鷹隼之擊也治直吏翻王溫舒始為廣平都尉廣平本屬趙國景武之間分為廣平郡征和元年立為平干國師古曰豪桀而性果敢一往無所顧者以為吏也皆把其陰重罪而縱使督盜賊師古曰縱放也督察視也此人雖有百罪弗法師古曰言所捕盜賊得其人而快溫舒意則不問其先所犯罪也弗法謂弗行法也因其事夷之亦滅宗師古曰避謂不盡意捕擊也齊趙之郊盜賊不敢近廣平近其靳翻廣平聲為道不拾遺遷河內太守以九月至令郡具章十四行本具下有私字乙十一行本同孔本同退齋校同馬五十匹為驛師古曰以私馬於道上往往置驛自河內至長安相連坐千餘家上書請大者至族小者乃死家盡沒入償臧師古曰以臧獲罪者既沒入之又令出倍臧或收入官或還其主也余謂沒入其家以償所受之臧其義似徑臧讀曰贓奏而天子可之謂之得可河內皆怪其奏以為神速盡十二月郡中毋聲毋敢夜行古毋無通其頗不得失之旁郡國追求會春溫舒頓足歎曰嗟乎令冬月益展一月足吾事矣師古曰立春之後不復行刑故云然展伸也天子聞之皆以為能故擢為中二千石郡守二千石正卿及列卿皆中二千石四年齊人少翁以鬼神方見上上有所幸王夫人卒王夫人齊王閎之母如王夫人之貌天子自帷中望見焉考異曰漢書以此事置李夫人傳中古今相承皆以為李夫人事史記封禪書少翁見上上有所幸王夫人卒少翁以方夜致王夫人及竈鬼之貌云按李夫人卒時少翁死已久漢書誤也今從史記賞賜甚多以客禮禮之文成又勸上作甘泉宮中為臺室畫天地太一諸鬼神而置祭具以致天神居歲餘其方益衰神不至乃為帛書以飯牛師古曰謂雜草以飯牛也飯扶晚翻言曰此牛腹中有奇殺視得書書言甚怪天子識其手書謂識其親書手迹也果是偽書於是誅文成將軍而隱之隱謂祕誅文成之事不令人知之也張政烺標點容肇祖聶崇岐覆校
