body:
  text: 資治通鑑卷第七十五翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事柱國河內郡開國侯食邑一千三百戶食實封二百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注魏紀七正始七年邵陵厲公中正始七年丙寅二四六正始七年春二月吳車騎將軍朱然寇柤中柤讀如祖楊正衡側瓜翻殺略數千人而去正始七年幽州刺史毌丘儉以高句驪王位宮數為侵叛句如字又音駒驪力知翻數所角翻下同督諸軍討之位宮敗走儉遂屠丸都高句驪都於丸都之下多大山深谷毌丘儉傳謂懸車束馬以上丸都可知矣唐志自鴨淥江口舟行百餘里乃小舫泝流東北行凡五百三十里而至丸都城句驪之臣得來數諫位宮位宮不從得來歎曰立見此地將生蓬蒿遂不食而死儉令諸軍不壞其墓壞音怪不伐其樹得其妻子皆放遣之位宮單將妻子逃竄儉引軍還未幾復擊之幾居豈翻復扶又翻位宮遂奔買溝後漢書東夷傳買溝婁北沃沮之地去南沃沮八百餘里句驪名城為溝婁杜佑曰北沃沮一名買溝婁又曰高句麗居紇升骨城漢為縣屬玄菟郡賜以衣幘朝服鼓吹常從郡受之後稍驕恣不復詣郡但於東界築小城以受之遂名此城為幘溝漊溝漊者高麗名城也建安中其王伊夷模更作新國都於丸都山下在沸流水西魏正始中毌丘儉屠丸都銘不耐城而還又曰東沃沮在蓋馬大山之東北沃沮一名買溝漊去南沃沮八百餘里與挹婁接過沃沮千有餘里沃沮之地在蓋馬大山之東漢武帝滅朝鮮開置玄菟郡治沃沮城後玄菟內徙沃沮更屬樂浪光武廢省就以其渠帥為縣侯其國小迫於句驪遂臣屬焉菟同都翻頎渠希翻沮千余翻魏東夷挹婁之國即古肅慎氏也所誅納八千餘口言誅殺者及納降者總八千餘口還從宣翻又如字侯者百餘人正始七年秋九月吳主以驃騎將軍步騭為丞相驃匹妙翻車騎將軍朱然為左大司馬衛將軍全琮為右大司馬分荊州為二部以鎮南將軍呂岱為上大將軍督右部自武昌以西至蒲圻水經注陸水出長沙下雋縣西徑蒲圻縣北又徑蒲山幾山北入大江謂之陸口江水又徑蒲山幾山北對蒲山幾洲洲頭即蒲圻縣治武昌志曰蒲山幾山今在嘉魚縣境蓋蒲圻縣初置于此宋白曰蒲圻縣漢沙羡縣地吳黃武二年於沙羡縣置蒲圻縣在荊江口因湖以稱故曰蒲圻督左部代陸遜鎮武昌正始七年漢大赦大司農河南孟光光河南洛陽人漢末逃入蜀夫赦者偏枯之物木之一邊碩茂一邊焦槁者謂之偏枯赦者赦有罪也有罪者赦則姦惡之人抵法而獲免於罪良善之人受抑而不獲伸故謂之偏枯之物衰敝窮極必不得已然後乃可權而行之耳今主上仁賢百僚稱職何有旦夕之急而數施非常之恩稱尺證翻數所角翻以惠姦宄之惡乎禕但顧謝踧踖而已踧子六翻踖資息翻初丞相亮時有言公惜赦者亮答曰治世以大德不以小惠治直之翻故匡衡吳漢不願為赦匡衡疏見三十八卷元帝永光二年吳漢言見四十三卷光武建武二十年陳紀字元方鄭玄字康成曾不語赦也治直吏翻若劉景升季玉父子劉琮字季玉何益於治治直吏翻由是蜀人稱亮之賢知禕不及焉蜀人賢孔明而劣費禕固不特惜赦一事而已陳壽評曰諸葛亮為政軍旅數興而赦不妄下數所角翻下同下遐稼翻不亦卓乎正始七年吳人不便大錢乃罷之青龍四年吳鑄大錢一當五百景初二年吳又鑄大錢一當千正始七年漢主以涼州刺史姜維為衛將軍與大將軍費禕並録尚書事費父沸翻汶山平康夷反維討平之漢武帝元封二年分蜀郡北部置汶山郡宣帝地節三年合蜀郡蜀又分為汶山郡又立平康縣屬焉杜佑曰汶山郡今蜀郡西北通化郡地冉駹所居也宋白曰茂州通化郡古汶山郡劉昫曰維州薛城縣蜀將姜維討汶山叛羌即此地也今州城即姜維故壘汶讀曰岷漢主數出遊觀增廣聲樂太子家令巴西譙周上疏諫曰昔王莽之敗豪桀並起以爭神器才智之士思望所歸未必以其勢之廣狹惟其德之厚薄也於時更始公孫述等多已廣大更工衡翻然莫不快情恣欲怠於為善世祖初入河北馮異等勸之曰當行人所不能為者遂務理冤獄崇節儉北州歌歎聲布四遠於是鄧禹自南陽追之事見三十九卷漢更始元年舉兵助之其餘望風慕德邳肜耿純劉植之徒至於輿病齎棺襁負而至不可勝數事並見更始二年肜余中翻勝音升及在洛陽嘗欲小出銚期進諫即時還車銚期傳曰光武嘗與期門近出期頓首車前曰臣聞古今之誡變生不意誠不願陛下微行數出帝為之回輿而還銚音姚寇恂請世祖身往臨賊聞言即行事見四十二卷建武八年欲小出不敢至於急務欲自安不為帝者之欲善如此故傳曰百姓不徒附誠以德先之也傳直戀翻先悉薦翻今漢遭厄運天下三分雄哲之士思望之時也言思望賢主混一復扶又翻且承事宗廟所以率民尊上也今四時之祀或有不臨而池苑之觀或有仍出臣之愚滯私不自安夫憂責在身者不暇盡樂樂音洛下同先帝之志堂構未成書大誥曰若考作室既底法厥子乃弗肯堂矧肯構願省減樂官後宮凡所增造但奉修先帝所施施式支翻設也下為子孫節儉之教漢主不聽八年八年春正月吳全琮卒八年二月日有食之時尚書何晏等朋附曹爽好變改法度太尉蔣濟上疏曰昔大舜佐治戒在比周舜之佐堯也歡兜共工自相稱引則流放之讒說殄行則堲之戒比周也好呼到翻治直吏翻下同比毗至翻慎於其朋書洛誥周公戒成王曰孺子其朋孺子其朋其往孔安國注曰少子慎其朋黨少子慎其朋黨戒其自今已往惟命世大才乃能張其綱維以垂於後豈中下之吏所宜改易哉終無益於治適足傷民宜使文武之臣各守其職率以清平則和氣祥瑞可感而致也八年吳主詔徙武昌宮材瓦繕修建業宮有司奏言武昌宮已二十八歲吳以漢獻帝建安二十四年都武昌至是已二十八年宜下所在下遐稼翻通更伐致伐致謂伐材木而致之通者凡吳境內悉然也大禹以卑宮為美今軍事未已所在賦斂斂力贍翻若更通伐妨損農桑徙武昌材瓦自可用也乃徙居南宮三月改作太初宮晉太康地記曰吳有太初宮方三百丈以下奉上義當助作宮室八年大將軍爽用何晏鄧揚丁謐之謀遷太后於永寧宮據後魏起永寧寺於銅駝街西意即前魏永寧殿故處也又據陳壽志太后稱永寧宮非徙也意者晉諸臣欲增曹爽之惡以遷字加之耳晉書五行志曰爽遷太后於永寧宮太后與帝相泣而別蓋亦承晉諸臣所記也亶朝直遙翻多樹親黨屢改制度太傅懿不能禁與爽有隙五月懿始稱疾不與政事為司馬懿誅曹爽等張本與讀曰預八年吳丞相步騭卒八年帝好褻近㣥小近其靳翻遊宴後園秋七月尚書何晏上言自今御幸式乾殿參考魏晉所記式乾殿當在皇后宮坤為母乾為父言皇后為天下母以乾為式從夫之義也宜皆從大臣詢謀政事講論經義為萬世法冬十二月散騎常侍諫議大夫孔乂上言秦置諫大夫掌論議後漢增為諫議大夫今天下已平陛下可絶後園習騎乘馬騎奇寄翻出必御輦乘車天下之福臣子之願也帝皆不聽八年吳主大發衆集建業揚聲欲入寇揚州刺史諸葛誕使安豐太守王基策之安豐縣漢屬六安國後漢屬廬江郡魏分置安豐郡屬豫州策之者計之也今陸遜等已死孫權年老內無賢嗣中無謀主權自出則懼內釁卒起卒讀曰猝癰疽發潰遣將則舊將已盡新將未信疽千余翻將即亮翻此不過欲補綻支黨綻丈澗翻縫也還自保護耳已而吳果不出八年是歲雍涼羌胡叛降漢雍於用翻降戶江翻漢姜維將兵出隴右以應之與雍州刺史郭淮討蜀護軍夏侯霸戰于洮西水經注洮水與蜀白水俱出西傾山山南即白水源山東即洮水源洮水東流徑吐谷渾中又東徑臨洮安故狄道又北至枹罕入于河諸縣皆在洮東若洮西則羌虜所居也洮土刀翻維徙之入蜀蜀志曰居于繁縣據姜維傳則白虎文與治無戴二人也又魏志曹真討破叛胡治元多蓋諸胡有治姓也皆平之九年九年春二月中書令孫資癸巳中書監劉放三月甲午司徒衛臻各遜位以侯就第位特進雞棲樹之言固中而三馬食一槽矣九年夏四月以司空高柔為司徒光祿大夫徐邈為司空邈嘆曰三公論道之官無其人則缺書曰三公論道經邦燮理陰陽官不必備惟其人忝辱也九年五月漢費禕出屯漢中自蔣琬及禕雖身居於外慶賞刑威皆遙先咨斷斷丁亂翻咨斷者咨之使斷決也然後乃行禕雅性謙素當國功名略與琬比九年秋九月以車騎將軍王淩為司空九年涪陵夷反涪陵縣漢屬巴郡蜀分置涪陵郡唐之涪州宋白曰涪州涪陵郡漢為涪陵縣地蜀先主以地控江源於此立涪陵郡領漢平漢葭二縣四夷縣道記云故城在蜀江之南涪江之西其涪江南自黔中來由城之西泝蜀江十五里有雞鳴峽上有枳城即漢枳縣也李雄據蜀後枳縣荒廢桓溫定蜀別立枳縣於今郡東北十里周武帝保定四年涪陵首領田思鶴歸化於故枳城立涪陵鎮隋開皇三年移漢平縣於鎮城仍改漢平為涪陵縣因鎮為名唐為涪州元和三年以涪州疆理與黔中接近敕隸黔中按華陽國志云涪陵巴之南鄙從枳縣入泝涪水秦司馬錯由之取楚黔中地漢興常為都尉理山險水灘人多獽蛋唯出丹漆蜜枳縣即涪州所理漢建安中涪陵謝本以涪陵廣大白州牧劉璋分置丹興漢葭二縣以為郡璋乃分涪陵立永寧兼丹興漢葭合四縣置屬國都尉理涪陵蜀先主改為郡改永寧曰萬寧又增立漢復縣後主又立漢平縣晉太康地志省丹興縣郡移理漢復又言萬寧在郡南水道九百里其萬寧蓋今費州是蜀後主延熙中涪陵大姓徐巨反鄧芝討平之漢涪陵蓋在今涪州東南三百三十里黔州是其故理在江之東又言漢復縣北至涪陵九十里蓋今黔州所管洪杜縣是其故理又言漢葭在郡東百里澧源出界蓋今州東九十里故黔州城是其丹興縣蓋在今黔州東二百里黔江縣是又按漢平縣在今涪州東百二十里羅浮山之北岷江之南白水入江處側近又按十三州志枳在郡東北涪陵在郡東按今黔州亦與巴郡東南相抵據謝本所論晉志所云今夷費思播及黔府等五州悉是涪陵故地又隋圖經黔中是武陵郡酉陽縣地按漢酉陽在今溪州犬鄉縣界與黔州約相去千餘里今三亭縣西北九百餘里別有酉陽城乃劉蜀所置非漢之酉陽隋圖經及貞觀地志並言蜀所置酉陽為漢酉陽蓋誤認漢涪陵之地也自永嘉後沒於夷獠元魏後圖記不傳至後周田思鶴歸化初於其地立奉州續改黔州大業中又改黔安郡因問隋州郡名遂與秦漢黔中郡交互難辨其秦黔中郡理在今辰州西二十里黔中故城是漢改黔中為武陵郡移治義陵即今辰州溆浦縣是後漢移理臨沅即今朗州所理是今辰錦敍奬溪澧朗施八州是秦漢黔中郡地與今黔州及夷費思播隔越峻嶺東有沅江水及諸溪並合而東注洞庭湖嶺西有巴江水一名涪陵江自牂柯北歷播費思黔等州北注岷江以山川言之巴郡之涪陵與黔中故地炳然自分矣九年大將軍爽驕奢無度飲食衣服擬於乘輿乘繩證翻尚方珍玩充牣其家又私取先帝才人以為伎樂伎渠綺翻作窟室綺疏四周窟室掘地為室也賢曰綺疏謂鏤為綺文弟羲深以為憂數涕泣諫止之爽不聽爽兄弟數俱出遊數所角翻司農沛國桓範謂曰總萬機典禁兵不宜並出若有閉城門誰復內入章甲十六行本入作人乙十一行本同孔本同者復扶又翻下同爽曰誰敢爾邪初清河平原爭界八年不能決冀州刺史孫禮請天府所藏烈祖封平原時圖以決之烈祖明帝也封平原王畫壤分國有地圖在天府周禮有天府鄭玄注云掌祖廟之寶藏又賢能之書及功書皆藏于天府云圖不可用禮上疏自辨辭頗剛切爽大怒劾禮怨望結刑五歲結刑五歲者但結以徒作五歲之罪而不使之輸作也劾戶概翻又戶得翻章甲十六行本而作之乙十一行本同孔本同張校同退齊校同復為並州刺史往見太傅懿有忿色而無言懿曰卿得並州少邪恚理分界失分乎魏並州統太原上黨西河鴈門新興冀州大於諸州並州遠接荒外故意其觖望懿多權數以此言擲發禮耳少詩沼翻恚於避翻分扶問翻何明公言之乖也禮雖不德豈以官位往事為意邪本謂明公齊蹤伊呂匡輔魏室上報明帝之託下建萬世之勳今社稷將危天下凶凶凶許拱翻此禮之所以不悅也因涕泣橫流懿曰且止忍不可忍至此禮入懿數中矣冬河南尹李勝出為荊州刺史過辭太傅懿懿令兩婢侍持衣衣落指口言渴婢進粥懿不持杯而飲粥皆流出霑胸勝曰衆情謂明公舊風發動魏武之辟懿也懿辭以風痹故勝以為舊風發動懿使聲氣才屬詐為羸惙之狀也屬之欲翻年老枕疾死在旦夕枕之鴆翻君當屈並州並州近胡近其靳翻好為之備恐不復相見以子師昭兄弟為託勝曰當還忝本州李勝南陽人故謂荊州為本州懿乃錯亂其辭曰君方到並州勝復曰當忝荊州懿曰年老意荒不解君言解戶買翻曉也今還為本州盛德壯烈好建功勳勝退告爽曰司馬公尸居餘氣形神已離不足慮矣言其形神已離惟尸在而餘殘喘耳又向爽等垂泣曰無聲而出涕曰垂泣太傅病不可復濟令人愴然故爽等不復設備何晏聞平原管輅明於術數請與相見十二月丙戌輅往詣晏晏與之論易時鄧揚在坐坐徂臥翻謂輅曰君自謂善易而語初不及易中辭義何也輅曰夫善易者不言易也晏含笑贊之曰可謂要言不煩也因謂輅曰試為作一卦為于僞翻知位當至三公不不讀曰否又問連夢見青蠅數十來集鼻上驅之不去何也輅曰昔元凱輔舜左傳高陽氏有才子八人蒼舒隤敳檮戭大臨尨降庭堅仲容叔達齊聖廣淵明允篤誠天下之民謂之八愷高辛氏有才子八人伯奮仲堪叔獻季仲伯虎仲熊叔豹季狸忠肅共懿宣慈惠和天下之民謂之八元皆以和惠謙恭享有多福此非卜筮所能明也今君侯位尊勢重而懷德者鮮鮮息淺翻畏威者衆殆非小心求福之道也又鼻者天中之山相書以鼻為天中自脣以上為人中裴松之曰相書謂鼻之所在為天中鼻有山象故曰天中之山所以長守貴今青蠅臭惡而集之位峻者顛輕豪者亡不可不深思也願君侯裒多益寡裒蒲侯翻與掊同取也爾雅裒鳩樓聚也徐云樓斂也此言晏據權勢揆分為多當思自減損也非禮勿履然後三公可至青蠅可驅也揚曰此老生之常談輅曰夫老生者見不生常談者見不談言必見其死也談與談同邑舍平原邑邸也語牛倨翻舅責輅言太切至輅曰與死人語何所畏邪舅大怒以輅為狂九年吳交趾九真夷賊攻沒城邑交部騷動吳主以衡陽督軍都尉陸胤為交州刺史安南校尉胤入境喻以恩信降者五萬餘家州境復清九年太傅懿陰與其子中護軍師散騎常侍昭謀誅曹爽懿雖稱疾先已置二子於要地矣嘉平元年己巳二四九是年四月方改元九年春正月甲午帝謁高平陵高平陵明帝陵也水經注大石山在洛陽南山阿有魏明帝高平陵孫盛曰高平陵去洛城九十里從才用翻太傅懿以皇太后令閉諸城門勒兵據武庫授兵出屯洛水浮橋水經注洛城南出西頭第二門曰宣陽門漢之小苑門也對閶闔南直洛水浮桁據爽營太僕王觀行中領軍事據羲營因奏爽罪惡於帝曰臣昔從遼東還先帝詔陛下秦王及臣升御牀把臣臂深以後事為念事見上卷明帝景初三年屬之欲翻按晉紀懿自為文帝所信重太祖未嘗以後事屬之也若文帝則以明帝屬懿此自陛下所見無所憂苦萬一有不如意臣當以死奉明詔今大將軍爽背棄顧命背蒲妹翻陸德明曰顧音古敗亂國典內則僭擬外則專權破壞諸營敗補邁翻壞音怪盡據禁兵㣥官要職皆置所親殿中宿衛易以私人根據盤互縱恣日甚又以黃門張當為都監監古銜翻伺察至尊離間二宮伺相吏翻間古莧翻傷害骨肉天下洶洶人懷危懼陛下便為寄坐寄坐謂雖處天子之位猶寄寓也此非先帝詔陛下及臣升御牀之本意也臣雖朽邁朽邁謂年老衰朽日月已過也太尉臣濟等皆以爽為有無君之心兄弟不宜典兵宿衛奏永寧宮皇太后令敕臣如奏施行臣輒敕主者及黃門令罷爽羲訓吏兵以侯就弟不得逗留以稽車駕敢有稽留便以軍法從事臣輒力疾將兵屯洛水浮橋伺察非常輒專也懿雖挾太后以臨爽而其奏自言輒者至再以天子在爽所也不通迫窘不知所為留車駕宿伊水南水經注來儒之水出于半石之山西南流徑大石山又西至高都城東西入伊水伊水又東北過伊闕中又東北至洛陽縣南北入于洛發屯田兵數千人以為衛魏武創業令州郡例置田官故洛陽亦有屯田兵懿使侍中高陽許允及尚書陳泰說爽宜早自歸罪說輸芮翻又使爽所信殿中校尉尹大目謂爽唯免官而已魏晉之制有殿中將軍中郎校尉司馬尹大目說爽猶未疑司馬氏也至其追語文欽乃覺耳泰㣥之子也初爽以桓範鄉里老宿範沛國人譙沛鄉里也老耆也宿舊也然不甚親也及懿起兵以太后令召範欲使行中領軍範欲應命其子止之曰車駕在外不如南出範乃出至平昌城門水經注平昌門故平門也洛城南出西頭第三門門候司蕃故範舉吏也司姓也左傳鄭有司臣矯曰有詔召我卿促開門蕃欲求見詔書以此觀之此時猶用版詔至晉時則有青紙詔矣卿非我故吏邪何以敢爾乃開之範出城顧謂蕃曰太傅圖逆卿從我去蕃徒行不能及遂避側避於道旁也智囊往矣濟曰範則智矣然駑馬戀棧豆爽必不能用也駑音奴言爽顧戀室家而慮不及遠必不能用範計棧士限翻範至勸爽兄弟以天子詣許昌發四方兵以自輔爽疑未決範謂羲曰此事昭然卿用讀書何為邪於今日卿等門戶求貧賤復可得乎復扶又翻且匹夫質一人尚欲望活此謂漢末劫質也質音致令於天下誰敢不應也俱不言範又謂羲曰卿別營近在闕南中領軍營懿已遣王觀據之惟別營在耳洛陽典農中郎將典農都尉所治也今詣許昌不過中宿中宿次宿也左傳曰命汝三宿汝中宿至陸德明曰中丁仲翻足相被假許昌別庫貯兵甲洛陽有武庫故曰別庫被假謂授兵也被皮義翻而大司農印章在我身羲兄弟默然不從自甲夜至五鼓甲夜初夜也夜有五更一更為甲夜二更為乙夜三更為丙夜四更為丁夜五更為戊夜我亦不失作富家翁範哭曰曹子丹佳人生汝兄弟㹠犢耳曹真字子丹㹠與豚同小豕曰㹠小牛曰犢爽乃通懿奏事白帝下詔免己官奉帝還宮爽兄弟歸家懿發洛陽吏卒圍守之洛陽令所主吏卒也令人在樓上察視爽兄弟舉動爽挾彈到後園中彈徒案翻樓上便唱言故大將軍東南行爽愁悶不知為計戊戌有司奏黃門張當私以所擇才人與爽疑有姦收當付廷尉考實辭云爽與尚書何晏鄧揚丁謐司隸校尉畢軌荊州刺史李勝等陰謀反逆須三月中發於是收爽羲訓晏揚謐軌勝並桓範皆下獄劾以大逆不道下遐稼翻劾戶概翻又戶得翻與張當俱夷三族考異曰魏氏春秋曰宣王使晏典治爽等獄晏窮治黨與冀以獲宥宣王曰凡有八族晏疏丁鄧等七姓宣王曰未也晏窮急乃曰豈謂晏乎宣王曰是也乃收晏按宣王方治爽黨安肯使晏典其獄就令有之晏豈不自知與爽最親而冀獨免乎此殆孫盛承說者之妄耳初爽之出也司馬魯芝留在府聞有變將營騎斫津門出赴爽營騎大將軍營騎士也津門洛城南出西頭第一門也亦曰建城門騎奇寄翻綬音受將出主簿楊綜止之曰公挾主握權捨此以至東市乎言必將見誅於市也治直之翻太傅懿曰彼各為其主也為于僞翻宥之頃之以芝為御史中丞綜為尚書郎魯芝將出呼參軍辛敞欲與俱去敞毗之子也其姊憲英為太常羊耽妻敞與之謀曰天子在外太傅閉城門人云將不利國家於事可得爾乎爾猶云如此也以吾度之度徒洛翻太傅此舉不過以誅曹爽耳敞曰然則事就乎憲英曰得無殆就殆近也偶匹也然則敞可以無出乎憲英曰安可以不出職守人之大義也凡人在難難乃旦翻猶或恤之為人執鞭而棄其事不祥莫大焉且為人任為人死親昵之職也昵尼質翻左傳晏子曰君為社稷死則死之若為己死非其私昵誰敢任之昵私愛也此言親者則可為質任愛昵者則可為之死從衆而已敞遂出事定之後敞歎曰吾不謀於姊幾不獲於義幾居希翻先是爽辟王沈及太山羊祜沈勸祜應命祜曰委質事人復何容易先悉薦翻沈持林翻下同質如字復扶又翻易以豉翻沈遂行及爽敗沈以故吏免乃謂祜曰吾不忘卿前語祜曰此非始慮所及也言始慮亦不料爽至此不欲受知幾之名也爽從弟文叔妻夏侯令女夏侯氏之女名令女夏戶雅翻其父文寧欲嫁之令女刀截兩耳以自誓居常依爽爽誅其家上書絶昏強迎以歸復將嫁之強其兩翻復扶又翻下同令女竊入寢室引刀自斷其鼻斷丁管翻其家驚惋惋烏貫翻驚歎也謂之曰人生世間如輕塵棲弱草耳何至自苦乃爾且夫家夷滅已盡守此欲誰為哉為于僞翻令女曰吾聞仁者不以盛衰改節義者不以存亡易心曹氏前盛之時尚欲保終況今衰亡何忍棄之此禽獸之章甲十六行本之作不乙十一行本同孔本同熊校同行吾豈為乎司馬懿聞而賢之聽使乞子字養為曹氏後何晏等方用事自以為一時才傑人莫能及晏嘗為名士品目曰唯深也故能通天下之志夏侯泰初是也唯幾也故能成天下之務司馬子元是也唯神也不疾而速不行而至吾聞其語未見其人蓋欲以神況諸己也夏侯玄字泰初司馬師字子元晏引易大傳之辭以為品目幾居希翻選部郎劉陶曄之子也少有口辨少詩照翻鄧揚之徒稱之以為伊呂陶嘗謂傅玄曰仲尼不聖何以知之智者於㣥愚如弄一丸於掌中而不能得天下何以為聖玄不復難難乃旦翻但語之曰語牛倨翻天下之變無常也今見卿窮及曹爽敗陶退居里舍乃謝其言之過管輅之舅謂輅曰爾前何以知何鄧之敗輅曰鄧之行步筋不束骨脈不制肉起立傾倚若無手足此為鬼躁何之視候則魂不守宅血不華色精爽煙浮容若槁木此為鬼幽二者皆非遐福之象也管輅之與何鄧言也其陳義近於古人至答其舅論何鄧之所以敗則相者之說耳何前後之相戾也何晏性自喜喜許記翻粉白不去手以自塗澤也尤好老莊之書好呼到翻與夏侯玄荀粲及山陽王弼之徒競為清談祖尚虛無謂六經為聖人糟粕莊子曰桓公讀書於堂上輪扁斫輪於堂下釋椎鑿而上問桓公曰敢問公所讀者何言邪公曰聖人之言也曰聖人在乎公曰已死矣曰然則君之所讀者古人之糟粕已矣古之人與其不可傳者死矣糟酒滓也司馬云爛食曰粕又云糟爛為粕許慎曰粕已漉粗糟也音匹各翻又普白翻由是天下士大夫爭慕效之遂成風流不可復制焉清談之禍始此彧之子也九年丙午大赦九年丁未以太傅懿為丞相加九錫懿固辭不受九年初右將軍夏侯霸為曹爽所厚以其父淵死於蜀事見六十八卷漢獻帝建安二十四年為討蜀護軍屯於隴西統屬征西屬征西將軍府所統霸之從子爽之外弟也曹氏夏侯氏之出也玄父尚又娶於曹氏故玄於爽為外弟司馬懿召玄詣京師為後司馬師殺玄張本霸素與淮不叶以為禍必相及大懼遂奔漢漢主謂曰卿父自遇害於行間耳行戶剛翻非我先人之手刃也遇之甚厚姜維問於霸曰司馬懿既得彼政當復有征伐之志不復扶又翻不讀曰否霸曰彼方營立家門未遑外事有鍾士季者其人雖少少詩照翻若管朝政吳蜀之憂也朝直遙翻士季者鍾繇之子尚書郎會也為司馬昭用會以伐蜀張本九年三月吳左大司馬朱然卒然長不盈七尺氣候分明內行修潔行下孟翻終日欽欽若章甲十六行本若上有常字乙十一行本同在戰埸毛萇曰欽欽言使人樂進也過絶於人雖世無事每朝夕嚴鼓嚴鼓疾擊鼓也今人謂之擂鼓咸行裝就隊以此玩敵使不知所備故出輒有功雖不出兵而常為行備敵人之覘者玩以為常則不知所以備豫矣吳主晝為減膳夜為不寐為于僞翻下同中使醫藥口食之物相望於道然每遣使表疾病消息吳主輒召見口自問訊入賜酒食出賜布帛及卒吳主為之哀慟九年夏四月乙丑改元曹爽誅後方改元嘉平九年曹爽之在伊南也昌陵景侯蔣濟與之書諡法由義而濟曰景耆意大慮曰景不過免官而已爽誅濟進封都鄉侯上疏固辭不許濟病其言之失以失言於爽為己病也丙子卒九年秋漢衛將軍姜維寇雍州依麴山築二城麴山蓋在羌中魏雍州西南界據郭淮傳麴山在翅上翅為翅也為翅要地也魏屯兵守之句音鉤又古候翻姓也姓譜句芒氏之後史記有句彊今蜀中猶有句姓聚羌胡質任侵逼諸郡質音致征西將軍郭淮與雍州刺史陳泰禦之泰曰麴城雖固去蜀險遠當須運糧羌夷患維勞役必未肯附今圍而取之可不血刃而拔其城雖其有救山道阻險非行兵之地也淮乃使泰率討蜀護軍徐質南安太守鄧艾進兵圍麴城斷其運道及城外流水安等挑戰不許斷丁管翻挑徒了翻將士困窘分糧聚雪以引日月窘巨隕翻維引兵救之出自牛頭山牛頭山蓋在洮水之南以形名山魏收地形志後魏真君四年置仇池郡治階陵縣縣有牛頭山五代志牛頭山在成州上祿縣界泰曰兵法貴在不戰而屈人孫子曰百戰百勝非善之善者也不戰而屈人善之善者也維無反道則我之禽也敕諸軍各堅壘勿與戰遣使白淮使淮趣牛頭截其還路趣七喻翻淮從之進軍洮水洮土刀翻維懼遁走安等孤絶遂降淮因西擊諸羌鄧艾曰賊去未遠或能復還復扶又翻宜分諸軍以備不虞於是留艾屯白水北水經注白水出隴西臨洮縣西南西傾山東南流徑鄧至城南即艾所屯地以鄧艾至此故以名城維遣其將廖化自白水南向艾結營廖力救翻今力弔翻艾謂諸將維今卒還卒讀曰猝吾軍人少少詩照翻法當來渡而不作橋此維使化持吾令不得還維必自東襲取洮城洮城在水北去艾屯六十里艾即夜潛軍徑到維果來渡而艾先至據城得以不敗漢軍遂還九年兗州刺史令狐愚姓譜周文王之子高封於畢其後有畢萬萬子犨封於魏為魏氏犫子顆封於令狐為令狐氏令力呈翻屯於平阿水經注淮水過當塗縣北又北沙水注之淮之西有平阿縣故城晉志平阿縣屬淮南郡有塗山專淮南之任淩與愚陰謀以帝暗弱制於強臣聞楚王彪有智勇欲共立之迎都許昌九月愚遣其將張式至白馬與彪相聞楚王彪武帝子黃初三年徙王白馬白馬縣屬東郡勞姓也精名也姓譜其先居東海勞山因氏焉後漢有琅邪勞丙語牛倨翻廣曰凡舉大事應本人情曹爽以驕奢失民何平叔虛華不治何晏字平叔皆專競於世加變易朝典朝直遙翻下同政令數改數所角翻所存雖高而事不下接言雖存心於高曠而不切事情與下不接也衆莫之從故雖勢傾四海聲震天下同日斬戮名士減半而百姓安之莫之或哀失民故也今司馬懿情雖難量量音良事未有逆而擢用賢能廣樹勝己謂蔣濟高柔孫禮陳泰郭淮鄧艾等朝直遙翻副衆心之所求爽之所以為惡者彼莫不必改必當作畢以恤民為先懈古隘翻父子兄弟並握兵要未易亡也易以豉翻淩不從冬十一月令狐愚復遣張式詣楚王復扶又翻未還會愚病卒九年十二月辛卯即拜王淩為太尉即拜者就壽春拜為太尉庚子以司隸校尉孫禮為司空九年光祿大夫徐邈卒邈以清節著名盧欽嘗著書稱邈曰徐公志高行潔行下孟翻才博氣猛其施之也高而不狷狷吉掾翻潔而不介博而守約猛而能寬聖人以清為難而徐公之所易也易以豉翻或問欽徐公當武帝之時人以為通自為涼州刺史明帝太和初邈為涼州刺史人以為介何也欽答曰往者毛孝先崔季圭用事貴清素之士于時皆變易車服以求名高事見六十五卷漢獻帝建安十三年毛玠字孝先崔琰字季圭故人以為通比來天下奢靡轉相倣效比毗寐翻近也比來猶言近來也而徐公雅尚自若不與俗同故前日之通乃今日之介也是世人之無常而徐公之有常也欽育之子也育余六翻二年二年夏五月以征西將軍郭淮為車騎將軍二年初會稽潘夫人有寵於吳主會古外翻生少子亮少詩照翻吳主愛之全公主既與太子和有隙事見上卷正始六年數稱亮美以其夫之兄子尚女妻之為後孫綝殺尚廢亮遷全公主張本數所角翻妻七細翻心亦惡之惡烏路翻謂侍中孫峻曰子弟不睦臣下分部分部謂各分部黨若漢甘陵南北部事見六十四卷建安七年若使一人立者安得不亂乎遂有廢和立亮之意然猶沈吟者歷年沈吟者欲決而未決之意今人猶有此語沈持林翻靜之曾孫也孫靜堅之季弟見六十二卷建安元年秋吳主遂幽太子和驃騎將軍朱據諫曰太子國之本根加以雅性仁孝天下歸心昔晉獻用驪姬而申生不存注已見前事見二十二卷漢武帝征和二年雖立思子之宮無所復及矣吳主不聽據與尚書僕射屈朝屈居勿翻率諸將吏泥頭自縛連日詣闕請和吳主登白爵觀見甚惡之白爵觀在建業宮中觀古玩翻無事匆匆匆匆急遽不諦細也吳主置左右無難營兵又置五營營兵各置督領之吳主大怒族誅正象牽據晃入殿據晃猶口諫叩頭流血辭氣不撓撓奴教翻吳主杖之各一百左遷據為新都郡丞晃斥歸田里㣥司坐諫誅放者以十數遂廢太子和為庶人徙故鄣故鄣縣屬丹陽郡賢曰秦鄣郡所治也在今湖州安吉縣界師古曰鄣師古曰鄣音章殺楊竺流其尸於江又誅全寄吳安孫奇皆以其黨霸譖和故也黨霸譖和事見上卷正始六年楊竺少獲聲名少詩照翻而陸遜謂之終敗勸竺兄穆令與之別族別彼列翻分也及竺敗穆以數諫戒竺得免死數所角翻中書令孫弘以詔書追賜死二年冬十月廬江太守文章甲十六行本文上有譙郡二字乙十一行本同孔本同張校同欽僞叛以誘吳偏將軍朱異誘音酉欲使異自將兵迎己異知其詐表吳主以為欽不可迎吳主曰方今北土未一欽欲歸命宜且迎之若嫌其有譎者譎古穴翻但當設計網以羅之盛重兵以防之耳乃遣偏將軍呂據督二萬人與異並力至北界北界謂魏吳分界之地在魏廬江郡南於吳為北降戶江翻異桓之子據範之子也二年十一月大利景侯孫禮卒據孫禮傳禮封大利亭侯二年吳主立子亮為太子二年吳主遣軍十萬作堂邑塗塘以淹北道堂邑縣前漢屬臨淮郡後漢屬廣陵郡魏吳在兩界之間為棄地賢曰堂邑今揚州六合縣杜佑曰揚州六合縣春秋楚之棠邑漢為堂邑淹北道以絶魏兵之窺建業吳主老矣良將多死為自保之規摹而已塗當作涂讀曰滁二年十二月甲辰東海定王霖卒諡法純行不爽曰定安民法古曰定二年征南將軍王昶上言孫權流放良臣良臣謂朱據等昶丑兩翻適讀曰嫡可乘釁擊吳朝廷從之遣新城太守南陽州泰襲巫秭歸州姓也泰名也晉有州綽風俗通云其先食采於州因氏焉魏荊州刺史與征南府並屯宛時已徙屯新野引竹絙為橋渡水擊之絙居登翻大索也吳引沮漳之水浸江陵以北之地以限魏兵故昶為橋以渡水吳大將施績夜遁入江陵績朱然之子也然本施氏朱治以為子魏人本其所自出之姓稱之乃先遣五軍按大道發還使吳望見而喜又以所獲鎧馬甲首環城以怒之鎧可亥翻環音宦設伏兵以待之績果來追昶與戰大破之斬其將鍾離茂許旻二年漢姜維復寇西平不克復扶又翻三年三年春正月王基州泰擊吳兵皆破之降者數千口三年二章乙十一行本二作三張校同退齊校同月以尚書令司馬孚為司空三年夏四月甲申以王昶為征南大將軍以破吳兵進律也三年壬辰大赦三年太尉王淩聞吳人塞涂水即前所作堂邑塗塘也楊正衡曰涂音滁據今滁河自滁州至真州塞悉則翻大嚴諸軍表求討賊詔報不聽淩遣將軍楊弘以廢立事告兗州刺史黃華華弘連名以白司馬懿懿將中軍乘水道討淩先下赦赦淩罪又為書諭淩已而大軍掩至百尺水經注沙水東南過陳縣又東南流注于潁謂之交口水次有大堰即古百尺堰司馬宣王討王淩大軍掩至百尺即此地杜佑曰百尺在陳州宛丘縣不意其至而至曰掩至掩者掩其不備也我朝析汝陰之百尺鎮置萬壽縣乃乘船單出迎懿遣掾王彧謝罪送印綬節鉞掾俞絹翻懿軍到丘頭水經潁水過南頓縣又東巡丘頭丘頭南枕水魏書郡國志曰王淩面縛於此故號武丘杜佑曰即今潁州沈丘縣懿承詔遣主簿解其縛淩既蒙赦加恃舊好不復自疑好呼到翻復扶又翻徑乘小船欲趨懿趨逡遇翻懿使人逆止之住船淮中水經注潁水自丘頭東南至慎縣又東南入于淮懿蓋進軍已近淮淩知見外淩與懿同為公初以為蒙赦而欲趨懿懿逆拒之乃知以罪而見外卿直以折簡召我我當敢不至邪而乃引軍來乎懿曰以卿非肯逐折簡者故也古者簡長二尺四寸短者半之漢制簡長二尺短者半之蓋單執一札謂之簡折簡者折半之簡言其禮輕也又按南史孔暗為孔圭草表圭以示謝朓朓嗟吟良久手自折簡寫之卿負我懿曰我寧負卿不負國家遂遣步騎六百送淩西詣京師自潁河泝流而西詣洛陽懿命給之給棺釘者示之以必死索山客翻釘音丁甲寅淩行到項遂飲藥死懿進至壽春張式等皆自首首式救翻懿窮治其事治直之翻諸相連者悉夷三族發淩愚冢剖棺暴尸於所近市三日近其靳翻燒其印綬章服親土埋之孟子曰比化者毋使土親膚親土者羸葬也綬音受初令狐愚為白衣時常有高志衆人謂愚必興令狐氏令力呈翻族父弘農太守卲獨以為愚性倜儻倜他歷翻倜儻卓異也不修德而願大必滅我宗愚聞之心甚不平及卲為虎賁中郎將而愚仕進已多所更歷更工衡翻所在有名稱稱昌孕翻凡名號謂之稱孟子題辭曰子者男子之通稱愚從容謂卲曰從千容翻先時聞大人謂愚為不繼先悉薦翻今竟云何邪卲熟視而不答私謂妻子曰公治性度猶如故也令狐愚字公治終當敗滅但不知我久當坐之不邪不讀曰否將逮汝曹耳卲沒後十餘年而愚族滅此晉人作魏史所書云爾愚在兗州辟山陽單固為別駕單音善與治中楊康並為愚腹心及愚卒康應司徒辟至洛陽露愚陰事愚由是敗懿至壽春見單固問曰令狐反乎曰無有楊康白事事與固連康所白愚陰事事與固連也考實數十固固云無有上固其名下固固執也録收也詰去吉翻固辭窮乃罵康曰老傭傭雇也奴僕受雇者曰傭老傭猶言老奴也又滅我族使君謂令狐愚也康初自冀封侯後以辭頗參錯言獄辭與單固參雜也臨刑俱出獄固又罵康曰老奴汝死自分耳分扶問翻若令死者有知汝何面目以行地下乎詔以揚州刺史諸葛誕為鎮東將軍都督揚州諸軍事王淩死而用諸葛誕誕亦終於為魏以司馬懿之明達豈不知誕之乃心魏氏哉大敵在境帥難其才也三年吳主立潘夫人為皇后大赦改元太元三年六月賜楚王彪死盡録諸王公置鄴使有司察之不得與人交關慮復如楚王彪為變也三年秋七月壬戌皇后甄氏殂甄之人翻三年辛未以司馬孚為太尉三年八月戊寅舞陽宣文侯司馬懿卒史以懿死為王淩之崇信乎儻其果能然固忠勇之鬼也通鑑不語怪今著之以示為人臣者録尚書事魏晉之制驃騎車騎衛將軍伏波撫軍都護鎮軍中軍四征四鎮龍驤典軍上軍輔國等大將軍位皆從公至録尚書事則專制朝政矣三年初南胸奴自謂其先本漢室之甥因冒姓劉氏太祖留單于呼廚泉於鄴分其衆為五部居並州境內事見六十七卷漢獻帝建安二十一年單于於扶羅之子也為左部帥部族最強帥所類翻城陽太守鄧艾前漢置城陽國後漢省入琅邪國魏武帝平青州復置城陽郡單于在內羌夷失統合散無主今單于之尊日疏而外土之威日重謂南單于留鄴雖有尊名日與部落疏而左賢王豹居外部族最強其威日重也聞劉豹部有叛胡可因叛割為二國以分其勢去卑功顯前朝謂去卑侍衛漢獻帝東還也事見六十一卷興平元年朝直遙翻宜加其子顯號使居鴈門離國弱寇離國者離胸奴劉豹之國為二也此御邊長計也又陳羌胡與民同處者處昌呂翻宜以漸出之使居民表表外也使居編民之外也塞姦宄之路塞悉則翻司馬師皆從之鄧艾所陳先於徙戎論司馬師既從之矣然卒不能杜其亂華之漸抑所謂漸出之者行之而不究邪豈天將啓胡羯氐羌非人之所能為也三年吳立節中郎將陸抗屯柴桑詣建業治病病差差楚懈翻病瘳也當還吳主涕泣與別謂曰吾前聽用讒言與汝父大義不篤以此負汝前後所問一焚滅之莫令人見也一焚滅之言一切悉焚滅之也責問陸遜事見上卷正始六年是時吳主頗寤太子和之無罪冬十一月吳主祀南郊還得風疾欲召和還全公主及侍中孫峻中書令孫弘固爭之爭者恐和復立為己患也吳主以太子亮幼少議所付託孫峻薦大將軍諸葛恪可付大事此時通吳國上下皆以恪為才而峻薦之峻本無殺恪之心也恪死於峻手其罪在恪峻既竊權授之弟綝以亂吳國其罪在峻讀史者其審諸很戶懇翻峻曰當今朝臣之才無及恪者乃召恪於武昌恪將行上大將軍呂岱戒之曰世方多難難乃旦翻子每事必十思恪曰昔季文子三思而後行夫子曰再思可矣見論語季文子魯大夫季孫行父也明恪之劣也岱無以答時咸謂之失言虞喜論曰夫託以天下至重也以人臣行主威至難也兼二至而管萬機能勝之者鮮矣勝音升鮮息淺翻呂侯國之元耆元耆猶言元老也甫以十思戒之而便以示劣見拒此元遜之疏機神不俱者也諸葛恪字元遜疏讀曰疏機者逢事會而發神者人之靈明逢事會而靈明無以應之則為不俱矣廣咨當世之務聞善速於雷動從諫急於風移豈得隕身殿堂死於凶豎之刃謂恪後為孫峻所殺也造次可觀造七到翻而哂呂侯無對為陋哂矢忍翻不思安危終始之慮是樂春藻之繁華樂音洛忘秋實之甘口也昔魏人伐蜀蜀人禦之精嚴垂發而費禕方與來敏對棋意無厭倦敏以為必能辦賊事見上卷正始五年貌無憂色也況長寧以為君子臨事而懼好謀而成臨事而懼好謀而成論語記孔子之言而所謂長寧者未知其為誰也蕞祖外翻而方向大敵所規所圖唯守與戰何可矜己有餘晏然無戚斯乃禕性之寬簡不防細微卒為降人郭偱章甲十六行本作循乙十一行本同下均同所害偱當作修注見後卒子恤翻豈非兆見於彼而禍成於此哉見賢遍翻往聞長寧之甄文偉甄別也二事體同皆足以為世鑒也三年恪至建業見吳主於臥內受詔牀下以大將軍領太子太傅孫弘領少傅詔有司諸事一統於恪惟殺生大事然後以聞為制㣥官百司拜揖之儀各有品序諸葛恪本盛氣者也吳主既任之又為制百司拜揖之儀品是其氣愈盛矣使無東關之捷合肥之敗恪亦不能濟吳之國事也為于僞翻胤吳主壻也為恪胤皆敗張本會古外翻三年十二月以光祿勳滎陽鄭沖為司空三年漢費禕還成都費父沸翻望氣者云都邑無宰相位乃復北屯漢壽以禕之才識乃復信望氣者之說邪葭萌縣漢屬廣漢郡蜀先主改曰漢壽縣屬梓潼郡三年是歲漢尚書令呂乂卒以侍中陳祗守尚書令祗為尚書令黃皓自此愈用事矣四年四年春正月癸卯以司馬師為大將軍四年吳主立故太子和為南陽王使居長沙仲姬子奮為齊王居武昌王夫人子休為琅邪王居虎林虎林濱大江吳置督守之其後孫綝遣朱異自虎林襲夏口兵至武昌而夏口督孫一奔魏則虎林又在武昌之下四年二月立皇后張氏大赦后故涼州刺史既之孫東莞太守緝之女也東莞縣漢屬琅邪郡魏分為郡沈約曰晉武帝泰始元年分琅邪立東莞郡當是魏既分而復合於琅邪晉又分也莞音官為下司馬師殺緝張本四年吳改元神鳳大赦四年吳潘后性剛戾吳主疾病后使人問孫弘以呂后稱制故事左右不勝其虐勝音升伺其昏睡縊殺之託言中惡縊於賜翻又於計翻中惡暴病而死也中竹仲翻後事泄坐死者六七人斯事也實吳用事之臣所為也潘后欲求稱制左右小人正當相與從臾為之安有不勝其虐而縊殺之之理吳史緣飾後人遂因而書之云爾孟子曰盡信書不如無書誠哉吳主病困召諸葛恪孫弘滕胤及將軍呂據侍中孫峻入臥內屬以後事屬之欲翻夏四月吳主殂年七十一懼為恪所治治直之翻祕不發喪欲矯詔誅恪孫峻以告恪恪請弘咨事謀事曰咨坐徂臥翻乃發喪諡吳主曰大皇帝沈約曰諡大諡法所不載孫亮字子明權少子也即位時年十歲改元建興閏月以諸葛恪為太傅滕胤為衛將軍呂岱為大司馬恪乃命罷視聽息校官吳主權置校官典校諸官府及州郡文書專任以為耳目今息校官即所謂罷視聽也除關稅古者關譏而不征後世始征之關之有稅非古也除之是也衆莫不悅恪每出入百姓延頸思見其狀恪不欲諸王處濱江兵馬之地處昌呂翻乃徙齊王奮於豫章琅邪王休於丹陽奮休皆吳主亮之兄也恪章甲十六行本恪上有又數越法度五字乙十一行本同退齊校同張校同云無注本亦無此五字為箋以遺奮曰遺于季翻帝王之尊與天同位是以家天下臣父兄仇讎有善不得不舉親戚有惡不得不誅所以承天理物先國後家先後皆去聲百代不易之道也昔漢初興多王子弟至於大強輒為不軌上則幾危社稷謂吳楚七國淮南濟北燕廣陵也王于況翻幾居希翻謂如廣川王去之類自光武以來諸王有制惟得自娛於宮內不得臨民干與政事其與交通皆有重禁光武設科禁藩王不得交通賓客干與讀曰預各保福祚此則前世得失之驗也大行皇帝覽古戒今防牙遏萌牙與芽同載于亥翻是以寢疾之日分遣諸王各早就國詔策勤渠科禁嚴峻其所戒敕無所不至誠欲上安宗廟下全諸王各早就國承章甲十六行本作使百世相承五字乙十一行本同孔本同熊校同無凶國害家之悔也書洪範曰凶于而國害于而家承當作永周太王三子長曰太伯次曰仲雍次曰季歷季歷之子曰昌有聖德太王欲傳國季歷以及昌太伯仲雍遂逃之荊蠻讓國季歷以成父之志惟思也漢河間獻王德於武帝兄也東海王彊於明帝異母兄也二王之事二帝極為恭順事並見漢紀而聞頃至武昌以來多違詔敕不拘制度亶發諸將兵治護宮室治直之翻又左右常從有罪過者當以表聞公付有司而亶私殺事不明白吳諸王有常從吏兵置常從督以領之明顯也白奏也謂不顯奏其罪而亶殺之也從才用翻親受詔敕所當恭肅乃云正自不聽禁謂不聽禁約也聞此之日小大驚怪莫不寒心里語曰明鑑所以照形古事所以知今大王宜深以魯王為戒謂魯王霸也行下孟翻戰戰兢兢盡禮朝廷如此則無求不得若棄忘先帝法教懷輕慢之心臣下寧負大王不敢負先帝遺詔寧為大王所怨疾豈敢忘尊主之威而令詔敕不行於藩臣邪向使魯王早納忠直之言懷驚懼之慮驚當作兢豈有滅亡之禍哉夫良藥苦口唯病者能甘之忠言逆耳唯達者能受之今者恪等慺慺慺盧侯翻慺慺恭謹貌欲為大王除危殆於萌牙為于僞翻廣福慶之基原是以不自知言至至極也切也王得箋懼遂移南昌南昌縣豫章郡治所四年初吳大帝築東興隄以遏巢湖吳主權黃龍二年築東興隄敗以內船遂廢不復治謂正始二年芍陂之敗也遏巢湖所以利舟師而反為湖內之船所敗故廢而不治復扶又翻治直之翻十月太傅恪會衆於東興更作大隄左右結山俠築兩城今柵江口有兩山濡須山在和州界謂之東關七寶山在無為軍界謂之西關兩山對峙中為石梁鑿石通水唐志廬州巢縣東南四十里有故東關俠讀曰夾古者俠夾二字通漢靈帝光和二年華山亭碑其文有云吏卒俠路晉宋書諸王有俠轂隊皆以夾為俠使將軍全端守西城都尉留略守東城留姓也漢功臣表有強園圉姓譜曰衛大夫留封人之後漢末避地會稽遂居東陽為郡豪族引軍而還鎮東將軍諸葛誕言於大將軍師曰今因吳內侵使文舒逼江陵仲恭向武昌王昶字文舒毌丘儉字仲恭然後簡精卒攻其兩城比救至可大獲也比必寐翻是時征南大將軍王昶征東將軍胡遵鎮南將軍毌丘儉等各獻征吳之計朝廷以三征計異漢置四征將軍謂征東征西征南征北也其後又置四鎮將軍有功進號則自鎮為征毌丘儉方為鎮南而曰三征史概言之嘏對曰議者或欲泛舟徑濟橫行江表或欲四道並進攻其城壘或欲大佃疆埸佃讀曰田觀釁而動誠皆取賊之常計也然自治兵以來出入三載非掩襲之軍也治直之翻賊之為寇幾六十年矣自漢建安十三年赤壁之戰吳魏始為寇敵至是年凡五十五年吳魏通者三年耳幾居希翻吉凶共患又喪其元帥喪息浪翻上下憂危設令列船津要堅城據險橫行之計其殆難捷今邊壤之守與賊相遠賊設羅落又特重密謂設烽燧遠候望以羅落邊面也羅布也落與絡同聯絡也莊子曰牛馬四足是謂天落馬首穿牛鼻是謂人用此落字重直龍翻間古莧翻下同諜達協翻耳目無聞夫軍無耳目校察未詳而舉大衆以臨巨險此為希幸徼功徼一遙翻先戰而後求勝非全軍之長策也唯有進軍大佃最差完牢可詔昶遵等擇地居險審所錯置錯倉故翻及令三方一時前守奪其肥壤使還塉土一也塉秦昔翻兵出民表寇鈔不犯二也鈔楚交翻招懷近路降附日至三也降戶江翻羅落遠設間構不來四也賊退其守羅落必淺佃作易立五也易以豉翻坐食積穀士不運輸六也釁隙時聞討襲速決七也凡此七者軍事之急務也不據則賊亶便資據之則利歸於國不可不察也夫屯壘相逼形勢已交智勇得陳巧拙得用策之而知得失之計角之而知有餘不足虜之情僞將焉所逃焉於虔翻夫以小敵大則役煩力竭以貧敵富則斂重財匱斂力贍翻故曰敵逸能勞之飽能飢之孫武子兵法之言也司馬師不從十一月詔王昶等三道擊吳十二月王昶攻南郡毌丘儉向武昌胡遵諸葛誕率衆七萬攻東興甲寅吳太傅恪將兵四萬晨夜兼行救東興胡遵等敕諸軍作浮橋以渡陳於堤上陳讀曰陳分兵攻兩城城在高峻不可卒拔卒讀曰猝諸葛恪使冠軍將軍丁奉與呂據留贊唐咨為前部從山西上上時掌翻下同奉謂諸將曰今諸軍行緩若賊據便地則難以爭鋒我請趨之趨七喻翻乃辟諸軍使下道辟讀如闢辟諸軍使避路而己軍前進也奉自率麾下三千人徑進時北風奉舉帆二日即至東關遂據徐塘徐塘蓋近東關寒胡遵等方置酒高會奉見其前部兵少謂其下曰取封侯爵賞正在今日乃使兵皆解鎧去矛戟去羌呂翻但兜鍪刀楯倮身緣堨兜鍪首鎧鍪莫侯翻楯食尹翻倮魯果翻堨阿葛翻大笑之不即嚴兵吳兵得上便鼓譟斫破魏前屯呂據等繼至魏軍驚擾散走爭渡浮橋橋壞絶自投於水更相蹈藉更工衡翻前部督韓綜樂安太守桓嘉等皆沒死者數萬綜故吳叛將綜叛吳事見七十卷明帝太和元年數所角翻吳大帝常切齒恨之諸葛恪命送其首以白大帝廟獲車乘牛馬騾驢各以千數乘繩證翻騾盧戈翻資器山積振旅而歸四年初漢姜維寇西平見上卷嘉平二年偱遍考字書無其字又考三國志三少帝紀作郭修蜀志張嶷傳亦作郭修裴松之注亦云修字孝先費禕傳作郭循後主傳亦然今三國志舊本凡書循者多從偱余謂此偱即修字之誤也後人以偱字無所出又改人為彳遂為循字耳盤洲洪氏曰自東漢以來凡盾字皆作偱字又曰漢隸循修頗相近隸法只爭一畫偱欲刺漢主不得親近每因上壽且拜且前刺七亦翻近其靳翻上時掌翻為左右所遏事輒不果為下偱殺費禕張本王崇武標點容肇祖聶崇岐覆校
