body:
  text: 資治通鑑卷第九十一端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰權判西京留司御史臺上柱國河內郡開國侯食邑一千三百戶食實封四百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注晉紀十三太興二年中宗元皇帝中太興二年己卯三一九太興二年春二月劉遐徐龕擊周撫於寒山破斬之魏收地形志彭城郡彭城縣有寒山龕苦含翻掖人蘇峻帥鄉里數千家結壘以自保遠近多附之掖縣屬東萊郡蘇峻傳云長廣掖人據志長廣郡有挺縣無掖縣帥讀曰率將攻之峻率衆浮海來奔嶷魚力翻惡烏路翻帝以峻為鷹揚將軍沈約志鷹揚將軍建安中曹公以命曹洪詔以遐為臨淮太守峻為淮陵內史惠帝元康七年分臨淮置淮陵郡其地當在唐沂州臨沂縣界宋白曰泗洲招信縣本漢淮陵縣太興二年石勒遣左長史王修獻捷於漢漢主曜遣兼司徒郭汜授勒太宰領大將軍進爵趙王加殊禮出警入蹕如曹公輔漢故事汜音祀拜王修及其副劉茂皆為將軍封列侯修舍人曹平樂從修至粟邑樂音洛因留仕漢言於曜曰大司馬遣修等來曜初即位以勒為大司馬故稱之內覘大駕強弱俟其復命將襲乘輿覘丑廉翻乘繩證翻時漢兵實疲弊曜信之乃追汜還斬修於市三月勒還至襄國劉茂逃歸言修死狀勒大怒曰孤事劉氏於人臣之職有加矣彼之基業皆孤所為今既得志還欲相圖趙王趙帝孤自為之何待於彼邪乃誅曹平樂三族為劉石相攻張本太興二年帝令㣥臣議郊祀尚書令刁協等以為宜須還洛乃修之司徒荀組等曰漢獻帝都許即行郊祀范書漢獻帝建安元年郊祀上帝於安邑是年七月至洛陽復郊祀上帝八月遷許無郊祀之事或別見他書也晉書禮志載組議云獻帝遷許即便立郊蓋郊祀不在遷許之年也帝從之立郊丘於建康城之巳地辛卯帝親祀南郊以未有北郊按成帝咸和八年始於覆舟山南立北郊詔琅邪恭王宜稱皇考賀循曰禮子不敢以己爵加於父此前漢師丹引禮以為言事見三十三卷漢哀帝建平元年太興二年初蓬陂塢主陳川蓬陂即左傳之蓬澤在浚儀縣守式又翻祖逖之攻樊雅也川遣其將李頭助之頭力戰有功逖厚遇之頭每嘆曰得此人為主吾死無恨川聞而殺之頭黨馮寵帥其衆降逖川益怒大掠豫州諸郡逖遣兵擊破之夏四月川以浚儀叛降石勒浚儀縣屬陳留郡故大梁也帥讀曰率降戶江翻下同太興二年周撫之敗走也徐龕部將于藥追斬之及朝廷論功而劉遐先之先悉薦翻龕怒以泰山叛降石勒自稱兗州刺史太興二年漢主曜還都長安自粟邑還長安遂定都也即惠帝羊皇后曜納羊后見八十七卷懷帝永嘉五年封子襲為長樂王樂音洛闡為太原王沖為淮南王敞為齊王高為魯王徽為楚王諸宗室皆進封郡王羊氏即故惠帝后也曜嘗問之曰吾何如司馬家兒羊氏曰陛下開基之聖主彼亡國之暗夫何可並言彼貴為帝王有一婦一子及身三耳曾不能庇妾於爾時實不欲生意謂世間男子皆然自奉巾櫛已來始知天下自有丈夫耳曜甚寵之頗干預國事太興二年南陽王保自稱晉王改元建康置百官以張實為征西大將軍開府儀同三司陳安自稱秦州刺史降于漢又降于成上邽大飢士衆困迫張春奉保之南安祁山之往也陳安退保帛丿糸諸帛丿糸諸道前漢屬天水郡後漢晉省水經注帛丿糸諸水歷帛丿糸諸故道北東南入清水清水東南注渭未幾保復為安所逼幾居豈翻復扶又翻實遣其將宋毅救之安乃退太興二年江東大飢詔百官各上封事益州刺史應詹上疏曰詹自益州刺史還建康元康以來賤經尚道以玄虛弘放為夷達夷曠也宜崇獎儒官以新俗化太興二年祖逖攻陳川于蓬關石勒遣石虎將兵五萬救之戰于浚儀逖兵敗退屯梁國勒又遣桃豹將兵至蓬關逖退屯淮南此淮南郡治壽春留豹守川故城太興二年石勒遣石虎擊鮮卑日六延於朔方大破之斬首二萬級俘虜三萬餘人孔萇攻幽州諸郡悉取之段匹磾士衆飢散欲移保上谷晉志上谷郡治沮陽縣秦置郡在谷之上頭故名焉匹磾棄妻子奔樂陵依邵續樂陵郡治厭次續保之以奉晉太興二年曹嶷遣使賂石勒請以河為境勒許之嶷已緣河置戍矣今賂勒請以河為境者懼勒之侵軼也太興二年梁州刺史周訪擊杜曾大破之馬雋等執曾以降訪斬之並獲荊州刺史第五猗送於武昌訪以猗本中朝所署朝直遙翻加有時望白王敦不宜殺敦不聽而斬之猗從杜曾事始八十九卷愍帝建興四年敦患杜曾難制謂訪曰若擒曾當相論為荊州及曾死而敦不用王廙在荊州廙羊至翻又逸職翻多殺陶侃將佐將即亮翻以皇甫方回為侃所敬責其不詣己收斬之士民怨怒上下不安帝聞之徵廙為散騎常侍以周訪代廙為荊州刺史王敦忌訪威名意難之從事中郎郭舒説敦曰鄙州雖荒弊乃用武之國不可以假人宜自領之郭舒先在荊州歷事劉弘王澄説輸芮翻敦從之六月丙子詔加訪安南將軍餘如故訪大怒敦手書譬解並遺玉環玉碗以申厚意遺于季翻訪抵之於地曰吾豈賈豎可以寶悅邪賈音古訪在襄陽務農訓兵陰有圖敦之地守宰有缺輒補然後言上上時掌翻敦患之而不能制魏該為胡寇所逼自宜陽率衆南遷新野魏該自懷帝末屯宜陽界一泉塢宜陽縣屬弘農郡新野縣漢屬南陽郡晉屬義陽郡拜順陽太守趙固死郭誦留屯陽翟陽翟縣漢屬潁川郡晉屬河南郡不能克太興二年漢主曜立宗廟社稷南北郊於長安詔曰吾之先興於北方光文立漢宗廟以從民望見八十五卷惠帝永興元年以單于為祖亟議以聞㣥臣奏光文始封盧奴伯晉成都王穎封劉淵為盧奴伯中山趙分也王于況翻分扶問翻請改國號為趙從之以冒頓配天冒莫北翻光文配上帝太興二年徐龕寇掠濟岱岱泰山也龕寇掠濟岱之間濟子禮翻沈約志武帝太康元年分琅邪立東莞郡晉志東莞故魯鄆邑劉昫曰唐沂州沂水縣漢東莞縣地宋白曰春秋莒魯爭鄆杜預注云城陽姑幕縣南有員亭即鄆也俗變其字耳十三州志云有東西二鄆魯昭公所居者為西鄆兗州東平郡是也莒魯所爭者為東鄆漢東莞縣是也莞音官將即亮翻帥所類翻導以為太子左衛率泰山羊鑒龕之州里冠族冠古玩翻必能制之鑒深辭才非將帥郗鑒亦表鑒非才不可使導不從秋八月以羊鑒為征虜將軍征討都督督徐州刺史蔡豹臨淮太守劉遐鮮卑段文鴦等討之段文鴦時從其兄匹磾在厭次太興二年冬石勒左右長史張敬張賓左右司馬張屈六程遐等勸勒稱尊號勒不許十一月將佐等復請勒稱大將軍大單于領冀州牧趙王復扶又翻單音蟬依漢昭烈在蜀魏武在鄴故事以河內等二十四郡為趙國太守皆為內史準禹貢復冀州之境時以河內魏汲頓丘平原清河巨鹿常山中山長樂樂平趙國廣平陽平章武勃海河間上黨定襄范陽漁陽武邑燕國樂陵二十四郡為趙國準禹貢魏武復冀州之境南至孟津西達龍門東至于河北至塞垣罷並朔司三州晉未嘗置朔州此罷朔州未知誰所置也勒許之戊寅即趙王位石勒字世龍依春秋時列國稱元年初勒以世亂律令煩多命法曹令史貫志貫姓也志其名作辛亥制五千文施行十餘年乃用律令以理曹參軍上黨續咸為律學祭酒姓譜帝舜七友有續牙曰晉大夫孤鞫居食采於續號續簡伯後以為氏國人稱之以中壘將軍支雄中壘將軍後趙創置勒置經學祭酒律學祭酒史學祭酒門臣祭酒重禁胡人不得陵侮衣冠華族華族中華之族也勒胡人也能禁其醜類不使陵暴華人及衣冠之士晉文公初欲俘陽樊之民殆有愧焉遣使循行州郡勸課農桑朝會始用天子禮樂衣冠儀物從容可觀矣朝直遙翻從千容翻加張賓大執法專總朝政朝直遙翻下同以石虎為單于元輔都督禁衛諸軍事尋加驃騎將軍侍中開府賜爵中山公驃匹妙翻自餘㣥臣授位進爵各有差張賓任遇優顯㣥臣莫及而謙虛敬慎開懷下士屏絶阿私屏必郢翻以身帥物帥讀曰率入則盡規出則歸美勒甚重之每朝常為之正容貌簡辭令呼曰右侯而不敢名史言張賓有大臣之節所以膺石勒之體貌為于偽翻太興二年十二月乙亥大赦太興二年平州刺史崔毖自以中州人望鎮遼東毖崔琰之曾孫琰在魏時為冀州人士之首子孫遂為冀州冠族毖音祕廆戶罪翻心不平數遣使招之皆不至數所角翻意廆拘留之乃陰説高句麗段氏宇文氏使共攻之説輸芮翻句音如字又音駒麗力知翻約滅廆分其地毖所親勃海高瞻力諫毖不從三國合兵伐廆諸將請擊之廆曰彼為崔毖所誘欲邀一切之利軍勢初合其鋒甚鋭不可與戰當固守以挫之彼烏合而來飛烏見食㣥集而聚啄之人或驚之則四散飛去故兵以利合無所統一者謂之烏合莫相歸服久必攜二一則疑吾與毖詐而覆之二則三國自相猜忌待其人情離二然後擊之破之必矣三國進攻棘城廆閉門自守遣使獨以牛酒犒宇文氏使疏吏翻犒苦告翻二國疑宇文氏與廆有謀各引兵歸兵法所謂合則能離之慕容廆有焉二國雖歸吾當獨取之宇文氏士卒數十萬連營四十里廆使召其子翰於徒河翰自愍帝建興元年鎮徒河悉獨官舉國為寇彼衆我寡易以計破難以力勝今城中之衆足以禦寇翰請為奇兵於外伺其間而擊之間古莧翻下同內外俱奮使彼震駭不知所備破之必矣今並兵為一彼得專意攻城無復他虞虞防也備也復扶又翻下同且示衆以怯恐士氣不戰先沮矣沮在莒翻廆猶疑之遼東韓壽言於廆曰悉獨官有憑陵之志將驕卒惰軍不堅密若奇兵卒起卒讀曰猝掎其無備必破之策也掎舉綺翻偏引曰掎又從後牽曰掎廆乃聽翰留徒河悉獨官聞之曰翰素名驍果驍堅堯翻今不入城或能為患當先取之城不足憂乃分遣數千騎襲翰翰知之詐為段氏使者逆於道曰慕容翰久為吾患聞當擊之吾已嚴兵相待宜速進也使者既去翰即出城設伏以待之宇文氏之騎見使者大喜馳行不復設備進入伏中翰奮擊盡獲之乘勝徑進遣間使語廆出兵大戰投間隙而行故謂之間使間古莧翻廆使其子皓與長史裴嶷將精鋭為前鋒皓呼廣翻自將大兵繼之悉獨官初不設備聞廆至驚悉衆出戰前鋒始交翰將千騎從旁直入其營縱火焚之將即亮翻衆皆惶擾不知所為遂大敗悉獨官僅以身免廆盡俘其衆獲皇帝玉璽三紐皇帝璽即宇文大人普回出獵所得者璽斯氏翻崔毖聞之懼使其兄子燾詣棘城偽賀會三國使者亦至請和曰非我本意崔平州教我耳廆以示燾臨之以兵燾懼首服首式救翻廆乃遣燾歸謂毖曰降者上策走者下策也引兵隨之毖與數十騎棄家奔高句麗其衆悉降於廆降戶江翻廆以其子仁為征虜將軍鎮遼東為仁以遼東與皓爭國張本按堵如故高句麗將如奴子據于河城廆遣將軍張統掩擊擒之俘其衆千餘家以崔燾高瞻韓恆石琮歸于棘城待以客禮恆安平人琮鑒之孫也石鑒事武帝惠帝位通顯瞻稱疾不就廆數臨候之數所角翻撫其心曰君之疾在此不在他也今晉室喪亂孤欲與諸君共清世難喪息浪翻難乃旦翻翼戴帝室君中州望族宜同斯願奈何以華夷之異介然疏之哉介然堅正不移之貌惟問志略何如耳華夷何足問乎以瞻薄廆起於東夷不肯委身事之故有是言廆頗不平龍驤主簿宋該與瞻有隙廆進號龍驤將軍以該為府主簿驤思將翻廆不從瞻以憂卒初鞠羡既死鞫羡死見八十六卷懷帝永嘉元年復扶又翻會曹嶷徇青州事見八十七卷永嘉三年嶷魚力翻嶷兵雖強郡人皆為彭死戰為于偽翻嶷不能克久之彭歎曰今天下大亂強者為雄曹亦鄉里彭與嶷皆齊人相悉亮翻即為民主何必與之力爭使百姓肝腦塗地吾去此則禍自息矣郡人以為不可爭獻拒嶷之策彭一無所用與鄉里千餘家浮海歸崔毖北海鄭林客於東萊彭嶷之相攻林情無彼此嶷賢之不敢侵掠彭與之俱去比至遼東比必寐翻毖已敗乃歸慕容廆廆以彭參龍驤軍事遺鄭林車牛粟帛遺于季翻皆不受躬耕於野宋該勸廆獻捷江東廆使該為表裴嶷奉之並所得三璽詣建康獻之高句麗數寇遼東句如字又音駒麗力知翻數所角翻廆遣慕容翰慕容仁伐之高句麗王乙弗利逆來求盟翰仁乃還還從宣翻又如字太興二年是歲蒲洪降趙考異曰三十國晉春秋洪降劉曜在太興元年按元年曜未都長安晉書洪載記無年但云曜僭號長安洪歸曜故置是年太興二年屠各路松多起兵於新平扶風以附晉王保屠直於翻保使其將楊曼王連據陳倉張顗周庸據陰密松多據草壁水經注隴山西南降隴城北有松多川蓋松多據此因以為地名草壁在陰密之東顗魚豈翻趙主曜遣諸將攻之不克曜自將擊之將即亮翻三年三年春正月曜攻陳倉王連戰死楊曼奔南氐氐種之居陳倉南者即仇池楊氏也路松多奔隴城又拔陰密晉王保懼遷于桑城水經注洮水自臨洮縣東北流過索西城又北出門峽又東北徑桑城東又北徑安故縣保欲自桑城奔河西也以劉雅為大司徒張春謀奉晉王保奔涼州張實遣其將陰監將兵迎之聲言翼衛其實拒之三年段末杯攻段匹磾破之磾丁奚翻匹磾謂邵續曰吾本夷狄以慕義破家君不忘久要要一遙翻久要舊約也請相與共擊末杯續許之遂相與追擊末杯大破之匹磾與弟文鴦攻薊匹磾奔邵續薊為石氏所取薊音計是時劉石國號皆曰趙史以石趙為後趙以別之厭於琰翻孔萇攻續別營十一皆下之二月續自出擊虎虎伏騎斷其後斷丁管翻遂執續使降其城欲使續降厭次城也降戶江翻下同吾志欲報國不幸至此汝等努力奉匹磾為主勿有二心匹磾自薊還未至厭次聞續已沒衆懼而散復為虎所遮復扶又翻下同文鴦以親兵數百力戰始得入城與續子緝兄子存竺等嬰城固守虎送續於襄國勒以為忠釋而禮之以為從事中郎因下令自今克敵獲士人毋得亶殺必生致之勒禮續而終於殺續所以令生致士人者不過欲使之從己耳吏部郎劉胤聞續被攻被皮義翻言於帝曰北方藩鎮盡矣惟餘邵續而已如使復為石虎所滅孤義士之心阻歸本之路愚謂宜發兵救之胤續所遣也事見八十九卷愍帝建興二年聞續已沒乃下詔以續位任授其子緝三年趙將尹安宋始宋恕趙慎四軍屯洛陽叛降後趙漢主曜改國號曰趙石勒稱趙王同在上年而勒併曜始得中原故以後趙別之安等復叛降司州刺史李矩復扶又翻矩使潁川太守郭默將兵入洛石生虜宋始一軍北渡河於是河南之民皆相帥歸矩帥讀曰率洛陽遂空三年三月裴嶷至建康嶷魚力翻盛稱慕容廆之威德賢雋皆為之用朝廷始重之朝廷始以裔夷待慕容今以嶷言始重之卿中朝名臣朝直遙翻當留江東朕別詔龍驤送卿家屬嶷曰臣少蒙國恩出入省闥嶷仕西朝歷中書侍郎給事黃門郎故云然少詩照翻臣之至榮但以舊京淪沒山陵穿毀雖名臣宿將莫能雪恥復扶反翻將即亮翻獨慕容龍驤竭忠王室志除凶逆故使臣萬里歸誠今臣來而不返必謂朝廷以其僻陋而棄之孤其嚮義之心使懈體於討賊體當依載記作怠懈居隘翻是以不敢徇私而忘公也謂留江東乃是徇一身之私計歸棘城則可輔廆以討賊乃天下之公義也嶷之心蓋以廆可與共功名鄙晉之君臣宴安江沱為不足與共事而已卿言是也乃遣使隨嶷拜廆安北將軍平州刺史使疏吏翻三年閏月以周顗為尚書左僕射顗魚豈翻三年晉王保將張春楊次與別將楊韜不協勸保誅之且請擊陳安保皆不從夏五月春次幽保殺之保體肥大重八百斤喜睡好讀書喜許記翻好呼到翻而暗弱無斷故及於難斷丁亂翻難乃旦翻保無子張春立宗室子瞻為世子稱大將軍保衆散奔涼州者萬餘人陳安表於趙主曜請討瞻等曜以安為大將軍擊瞻殺之張春奔枹罕枹罕縣前漢屬金城後漢屬隴西郡張軌分屬晉興郡唐為河州枹音膚於保柩前斬之因以祭保安以天子禮葬保於上邽諡曰元王三年羊鑒討徐龕頓兵下邳不敢前蔡豹敗龕於檀丘檀丘在魯國卞縣東南敗補邁翻後趙王勒遣其將王伏都救之又使張敬將兵為之後繼勒多所邀求而伏都淫暴龕患之張敬至東平龕疑其襲己乃斬伏都等三百餘人復來請降復扶又翻降戶江翻下同勒大怒命張敬據險以守之據險守龕欲持久以弊之也不受其降惡烏路翻敕鑒豹以時進討鑒猶疑憚不進尚書令刁協劾奏鑒免死除名以蔡豹代領其兵王導以所舉失人乞自貶帝不許三年六月後趙孔萇攻段匹磾磾丁奚翻恃勝而不設備段文鴦襲擊大破之三年京兆人劉弘客居涼州天梯山武威姑藏城南有天梯山從受道者千餘人妖於驕翻西平元公張實左右皆事之帳下閻涉牙門趙卬皆弘鄉人弘謂之曰天與我神璽應王涼州璽斯氏翻王于況翻涉卬信之密與實左右十餘人謀殺實奉弘為主實弟茂知其謀請誅弘實令牙門將史初收之未至涉等懷刃而入殺實於外寢考異曰晉書作閻沙趙仰又云實知其謀收劉弘殺之據晉春秋作閻涉趙卬又弘死在實被殺後今從之謂曰使君已死殺我何為初怒截其舌而囚之轘於姑臧市轘胡悍翻車裂也涼州及武威郡皆治姑藏縣誅其黨與數百人左司馬陰元等以實子駿尚幼推張茂為涼州刺史西平公赦其境內以駿為撫軍將軍三年丙辰趙將解虎及長水校尉尹車謀反與巴酋句徐厙彭等相結解戶買翻酋慈由翻下同句古侯翻厙音舍皆姓也事覺虎車皆伏誅趙主曜囚徐彭等五十餘人于阿房將殺之阿房即秦阿房宮舊基亦謂之阿城聖王用刑惟誅元惡而已不宜多殺爭之叩頭流血曜怒以為助逆而囚之盡殺徐彭等尸諸市十日乃投於水於是巴衆盡反推巴酋句渠知為主自稱大秦改元曰平趙四山氐羌巴羯應之者三十餘萬關中大亂城門晝閉子遠又從獄中上表諫爭爭讀曰諍曜手毀其表曰大荔奴大荔戎種落之名子遠蓋戎出也猶敢如此嫌死晚邪叱左右速殺之中山王雅郭汜朱紀呼延晏等諫曰子遠幽囚禍在不測猶不忘諫爭汜音祀爭謂曰諍忠之至也陛下縱不能用奈何殺之若子遠朝誅臣等亦當夕死以彰陛下之過天下將皆捨陛下而去陛下誰與居乎曜意解乃赦之曜敕內外戒嚴將自討渠知子遠又諫曰陛下誠能用臣策一月可定大駕不必親征也曜曰卿試言之子遠曰彼非有大志欲圖非望也謂帝王之事非常人所望欲逃死耳陛下莫若廓然大赦與之更始更工衡翻應前日坐虎車等事其家老弱沒入奚官者皆縱遣之使之自相招引聽其復業彼既得生路何為不降降戶江翻下同若其中自知罪重屯結不散者願假臣弱兵五千必為陛下梟之梟不孝鳥説文日至捕梟磔之以頭挂木上故今謂挂首為梟首為于偽翻梟堅堯翻今反者彌山被谷彌滿也被皮義翻恐非歲月可除也曜大悅即日大赦以子遠為車騎大將軍開府儀同三司都督雍秦征討諸軍事子遠屯于雍城雍于用翻降者十餘萬移軍安定反者皆降惟句氏宗黨五千餘家保于陰密進攻滅之遂引兵巡隴右先是氐羌十餘萬落據險不服先悉薦翻其酋虛除權渠自號秦王子遠進造其壁造七到翻權渠出兵拒之五戰皆敗權渠欲降其子伊餘大言於衆曰往者劉曜自來猶無若我何況此偏師何謂降也帥徑卒五萬晨壓子遠壘門帥讀曰率諸將欲擊之子遠曰伊餘勇悍當今無敵所將之兵復精於我復扶又翻又其父新敗怒氣方盛其鋒不可當也不如緩之使氣竭而後擊之乃堅壁不戰伊餘有驕色子遠伺其無備伺相吏翻夜勒兵蓐食旦值大風塵昏子遠悉衆出掩之生擒伊餘盡俘其衆權渠大懼被髮剺面請降被皮義翻剺力之翻以刀劃面也子遠啓曜以權渠為征西將軍西戎公啓開也開陳其事以白於上謂之啓曜以子遠為大司徒録尚書事曜立太學選民之神志可教者千五百人擇儒臣以教之作酆明觀觀古玩翻下同及西宮起陵霄臺於滈池司馬彪曰鎬在上林苑中孟康曰長安西南有鎬池古史考曰武王遷鎬長安豐亭鎬池也滈與鎬同下老翻侍中喬豫和苞上疏諫以為衛文公承亂亡之後節用愛民營建宮室得其時制故能興康叔之業延九百之祚衛為狄人所滅文公徙居楚丘大布之衣大帛之冠務材訓農通商惠工始建城市而營宮室得其時制百姓悅之國家殷富衛以復興自康叔始封於衛至秦始滅延祚九百餘年市道細民咸譏其奢曰以一觀之功足以平涼州矣言以起一觀之功力足以平河西張氏法瓊臺而起陵霄其為勞費億萬酆明若以資軍旅乃可兼吳蜀而一齊魏矣吳謂晉蜀謂李特齊謂曹嶷魏謂石勒周圍四里深三十五丈深式禁翻以銅為椁飾以黃金功費若此殆非國內所能辦也秦始皇下錮三泉土未乾而發毀詳見三十一卷漢成帝永始元年劉向封事乾音干不掘之墓故聖王之儉葬乃深遠之慮也陛下奈何於中興之日曜平靳氏之難而自立故其臣謂之中興曜下詔曰二侍中懇懇有古人之風可謂社稷之臣矣其悉罷宮室諸役壽陵制度一遵霸陵之法封豫安昌子苞平輿子輿音豫並領諫議大夫仍布告天下使知區區之朝欲聞其過也朝直遙翻又省酆水囿以與貧民豐水出京兆南山東北流注于渭曜立囿於豐水左右三年祖逖將韓潛與後趙將桃豹分據陳川故城豹居西臺潛居東臺豹由南門潛由東門出入相守四旬逖以布囊盛土如米狀盛時征翻使千餘人運上臺上時掌翻又使數人擔米息於道豹兵逐之擔他甘翻棄擔而走擔都濫翻豹兵久飢得米以為逖士衆豐飽益懼先以囊盛土運之潛所以疑之也又使人擔米以餌豹兵示之以實也逖使韓潛及別將馮鐵邀擊於汴水水經注蒗草碭渠水自中牟東流至浚儀縣分為二水南流者曰沙水東注者曰汴水汴水東流入梁郡豹宵遁屯東燕城即漢東郡燕縣也後魏置東燕縣屬陳留郡隋改為胙城縣屬東郡唐屬滑州豹兵已有懼心糧又為逖所獲故宵遁也馮鐵據二臺逖鎮雍丘封丘雍丘二縣皆屬陳留郡春秋傳敗狄于長丘在封丘界雍丘故國也數所角翻後趙鎮戍歸逖者甚多境土漸蹙先是趙固上官巳李矩郭默互相攻擊逖馳使和解之先悉薦翻使疏吏翻下同示以禍福遂皆受逖節度秋七月詔加逖鎮西將軍逖在軍與將士同甘苦約己務施施式豉翻勸課農桑撫納新附雖疏賤者皆結以恩禮河上諸塢先有任子在後趙者皆聽兩屬居兩界之上者聽其兩屬因以為間抄楚交翻明其未附塢主皆感恩後趙有異謀輒密以告由是多所克獲自河以南多叛後趙歸于晉逖練兵積穀為取河北之計後趙王勒患之乃下幽州為逖修祖父墓置守冢二家逖范陽人其祖父墓在焉下遐嫁翻求通使及互市逖不報書而聽其互市收利十倍逖牙門童建殺新蔡內史周密降于後趙姓譜顓頊子老童之後以為氏送首於逖曰叛臣逃吏吾之深仇將軍之惡猶吾惡也惡烏路翻逖深德之自是後趙人叛歸逖者逖皆不納禁諸將不使侵暴後趙之民邊境之間稍得休息逖聽河上諸塢兩屬此用間之智也然石勒為逖修祖父墓斬童建而送其首亦所以懈逖推鋒越河之心三年八月辛未梁州刺史周訪卒訪善於撫章甲十一行本撫下有納字乙十一行本同孔本同張校同士衆皆為致死為于偽翻知王敦有不臣之心私常切齒切齒上下齒相磨切也未敢為逆敦遣從事中郎郭舒監襄陽軍監工銜翻帝以湘州刺史甘卓為梁州刺史督沔北諸軍事鎮襄陽王敦憚周訪而不敢為逆至其舉兵也不以甘卓為虞亦可謂姦雄矣帝徵為右丞敦留不遣三年後趙王勒遣中山公虎帥步騎四萬擊徐龕帥讀曰率下同龕送妻子為質乞降勒許之勒許龕降力未能取龕耳觀其後殺龕足以知其心質音致卞縣屬魯國劉昫曰隋於卞縣古城置泗水縣唐屬兗州豹退守下邳為徐龕所敗敗補邁翻虎引兵城封丘而旋徙士族三百家置襄國崇仁里崇仁里勒所命名以處衣冠之族三年後趙王勒用法甚嚴諱胡尤峻勒本胡人故以為諱初有門戶之禁有醉胡乘馬突入止車門勒大怒責宮門小執法馮翥執法御史之官也紫宮南蕃中二星曰左右執法晉之故臣為勒定官制取此置宮門執法即以張賓為大執法總朝政故宮門置小執法翥章庶翻對曰向有醉胡乘馬馳入甚呵禦之而不可與語勒笑曰胡人正自難與言恕而不罪勒使張賓領選初定五品後更定九品命公卿及州郡歲舉秀才至孝廉清賢良直言武勇之士各一人選須絹翻石勒立國粗有綱紀石虎繼之無復有是三年西平公張茂立兄子駿為世子三年蔡豹既敗將詣建康歸罪北中郎將王舒止之帝聞豹退遣使收之使疏吏翻舒夜以兵圍豹豹以為他寇帥麾下擊之聞有詔乃止舒執豹送建康冬十月丙辰斬之三年王敦殺武陵內史向碩史書王敦專殺以著其無君之罪帝之始鎮江東也敦與從弟導同心翼戴帝亦推心任之敦總征討懷帝永嘉五年帝以敦刺揚州加都督征討諸軍事其討華軼杜韜王機杜曾皆其功也從才用翻尚書萬機之本導録尚書事是專機政也從才用翻時人為之語曰王與馬共天下後敦自恃有功且宗族強盛稍益驕恣帝畏而惡之惡烏路翻乃引劉隗刁協等以為腹心稍抑損王氏之權導亦漸見疏外中書郎孔愈陳導忠賢有佐命之勳宜加委任帝出愈為司徒左長史導能任真推分淡如也分扶問翻淡杜覽翻有識皆稱其善處興廢而敦益懷不平史言導所以福祚流子孫敦所以隕身喪元禍及王含父子處昌呂翻初敦辟吳興沈充為參軍充薦同郡錢鳳於敦敦以為鎧曹參軍二人皆巧諂凶狡知敦有異志陰贊成之為之畫策敦寵信之勢傾內外敦上疏為導訟屈辭語怨望導封以還敦導録尚書先見敦疏故封還之為于偽翻下隗為同復扶又翻左將軍譙王氶氶音拯以此觀之則前作承誤也忠厚有志行行下孟翻帝親信之夜召氶以敦疏示之曰王敦以頃年之功位任足矣而所求不已言至於此將若之何氶曰陛下不早裁之以至今日敦必為患劉隗為帝謀出心腹以鎮方面會敦表以宣城內史沈充代甘卓為湘州刺史帝謂氶曰王敦姦逆已著朕為惠皇其勢不遠言當如惠帝受制於強臣也控三州之會三州謂荊交廣何如古者同姓諸侯天子謂之伯父叔父氶宣帝之從孫而帝宣帝之曾孫於屬亦叔父也臣奉承詔命惟力是視何敢有辭然湘州經蜀寇之餘蜀寇謂杜韜之亂也若得之部比及三年乃可即戎用論語冉有對孔子之言即從也朱熹曰即就也戎兵也比必寐翻雖復灰身亦無益也復扶又翻十二月詔曰晉室開基方鎮之任親賢並用其以譙王氶為湘州刺史長沙鄧騫聞之歎曰湘州之禍其在斯乎氶行至武昌敦與之宴謂氶曰大王雅素佳士雅素猶言平常也將即亮翻帥所類翻氶曰公未見知耳鉛刀豈無一割之用後漢班超之言彼不知懼而學壯語足知其不武無能為也乃聽之鎮氶雖忠有餘而才不足敦窺見而知其無能為公私困弊氶躬自儉約傾心綏撫甚有能名三年高句麗寇遼東句如字又音駒麗力知翻慕容仁與戰大破之自是不敢犯仁境四年四年春二月徐龕復請降復扶又翻下同四年張茂築靈鈞臺基高九仞高居傲翻武陵閻曾夜叩府門武陵疑當作武威武公遣我來張軌諡武公呼火故翻有司以為妖請殺之茂曰吾信勞民曾稱先君之命以規我何謂妖乎乃為之罷役妖於驕翻為于偽翻下同四年三月癸亥日中有黑子日中有黑子陰侵陽而磨蕩之也時王敦驕悖浸甚故象見于天上疏以為陰陽錯繆皆繁刑所致赦不欲數數所角翻然子産知鑄刑書非政之善不得不作者須以救弊故也左傳鄭鑄刑書叔向詒子産書曰國將亡必多制復書曰吾以救世也須待也理亦如之四年後趙中山公虎攻幽州刺史段匹磾於厭次磾丁奚翻厭於琰翻孔萇攻其統內諸城悉拔之段文鴦言於匹磾曰我以勇聞故為民所倚望今視民被掠而不救是怯也被皮義翻下同民失所望誰復為我致死遂帥壯士數十騎出戰復扶又翻為于偽翻帥讀曰率殺後趙兵甚衆馬乏伏不能起虎呼之曰兄與我俱夷狄久欲與兄同為一家今天不違願於此得相見何為復戰請釋仗文鴦罵曰汝為寇賊當死日久吾兄不用吾策事見七十八卷懷帝永嘉六年我寧鬬死不為汝屈遂下馬苦戰槊折執刀戰不已槊色角翻矛長丈八者曰槊折而設翻自辰至申後趙兵四面解馬羅披自鄣馬羅披意即障泥也文鴦力竭被執城內奪氣匹磾欲單騎歸朝騎奇寄翻朝直遙翻邵續之弟樂安內史洎勒兵不聽洎復欲執臺使王英送於虎臺使晉朝所遣者也使疏吏翻卿不能遵兄之志逼吾不得歸朝亦已甚矣復欲執天子使者我雖夷狄所未聞也洎與兄子緝竺等輿櫬出降櫬初覲翻降戶江翻匹磾見虎曰我受晉恩志在滅汝不幸至此不能為汝敬也後趙王勒及虎素與匹磾結為兄弟虎即起拜之勒以匹磾為冠軍將軍冠古玩翻文鴦為左中郎將散諸流民三萬餘戶復其本業置守宰以撫之於是幽冀並三州皆入於後趙匹磾不為勒禮常著朝服持晉節著陟略翻久之與文鴦邵續皆為後趙所殺厭次既破無復後患匹磾兄弟與邵續皆被害石勒志趣從可知矣四年五月庚申詔免中州良民遭難為揚州諸郡僮客者以備征役難乃旦翻尚書令刁協之謀也由是衆益怨之四年終南山崩終南山長安南山也時劉曜據關中亡國之徵晉書書於曜載記四年秋七月甲戌以尚書僕射戴淵為征西將軍都督司兗豫並雍冀六州諸軍事司州刺史鎮合肥合肥縣屬淮南郡雍於用翻鎮淮陰淮陰縣前漢屬臨淮郡後漢屬下邳郡晉屬廣陵郡名為討胡實備王敦也隗雖在外而朝廷機事進退士大夫帝皆與之密謀敦遺隗書曰遺于季翻頃承聖上顧眄足下今大賊未滅中原鼎沸欲與足下及周生之徒周生謂周顗敦素憚顗見輒扇面不休故舉以為言共靜海內若其泰也則帝祚於是乎隆若其否也否皮鄙翻則天下永無望矣隗答曰魚相忘於江湖人相忘於道術引莊子大宗師之言效之以忠貞晉大夫荀息之言敦得書甚怒壬午以驃騎將軍王導為侍中司空假節録尚書領中書監驃匹妙翻帝以敦故並疏忌導御史中丞周嵩上疏以為導忠素竭誠輔成大業不宜聽孤臣之言惑疑似之説放逐舊德以佞伍賢用兵列陳五人為伍伍同列也以佞伍賢言賢佞同列也招將來之患向者親倚導而今疏忌之是虧既往之恩也導或自疑外而與敦同是招將來之患也招之遙翻導由是得全史言周顗兄弟保護王導四年八月常山崩常山在常山郡上曲陽縣西北其地時屬石勒四年豫州刺史祖逖以戴淵吳士淵廣陵人廣陵故吳王濞都也無弘致遠識且已翦荊棘收河南地而淵雍容一旦來統之意甚怏怏怏於兩翻又聞王敦與劉刁構隙將有內難難乃旦翻知大功不遂感激發病九月壬寅卒於雍丘豫州士女若喪父母譙梁間皆為立祠喪息浪翻為于偽翻王敦久懷異志聞逖卒益無所憚王敦之所忌周訪祖逖訪卒而逖繼之宜其益無所憚也然溫嶠郗鑒諸人已在晉朝卒藉之以清大憝以此知上天生材以應世世變無窮而人才亦與之無窮固非姦雄所能逆睹也冬十月壬午以逖弟約為平西將軍豫州刺史領逖之衆約無綏御之才不為士卒所附初范陽李産避亂依逖見約志趣異常謂所親曰吾以北方鼎沸故遠來就此冀全宗族今觀約所為有不可測之志吾託名姻親當早自為計無事復陷身於不義也爾曹不可以目前之利而忘長久之策乃帥子弟十餘人間行歸鄉里李産父子後事慕容俊復扶又翻帥讀曰率間古莧翻四年十一月皇孫衍生四年後趙王勒悉召武鄉耆舊詣襄國與之共坐歡飲初勒微時與李陽鄰居數爭漚麻池相毆數所角翻漚於候翻久漬也詩云東門之池可以漚麻毛氏曰漚柔也考工記㡆氏以涗水漚其絲注云漚漸也楚人曰漚齊人曰委委烏禾翻然則漚是漸漬之名云漚柔者謂漸漬使之柔韌也魏收地形志武鄉郡三臺嶺上有李陽墓有麻池石勒與李陽爭漚麻處也毆於口翻擊也陽由是獨不敢來勒曰陽壯士也漚麻布衣之恨孤方兼容天下豈讎匹夫乎遽召與飲引陽臂曰孤往日厭卿老拳卿亦飽孤毒手因拜參軍都尉以武鄉比豐沛復之三世勒欲並驅漢光武光武復南頓不敢遠期十歲而勒復武鄉三世多見其不知量也復方目翻勒以民始復業資儲未豐於是重制禁釀郊祀宗廟皆用醴酒酒一宿而熟者曰醴無復釀者四年十二月以慕容廆為都督幽平二州東夷諸軍事車騎將軍平州牧考異曰燕書云車騎大將軍平州刺史按晉書載記先拜平州刺史尋加車騎州牧今從之單于如故遣謁者即授印綬聽承制置官司守宰廆於是備置僚屬以裴嶷遊邃為長史嶷魚力翻裴開為司馬韓壽為別駕陽耽為軍咨祭酒崔燾為主簿黃泓鄭林參軍事鄭林不受廆車牛粟帛而躬耕於野廆蓋以是取之作東橫橫與黌同學舍也載記作東庠皓呼廣翻使皓與諸生同受業廆得暇亦親臨聽之得暇者言廆惟於國事無暇財得一息之暇亦親臨東橫聽其講説史言廆之能崇儒喜經術國人稱之喜許記翻廆徙慕容翰鎮遼東慕容仁鎮平郭平郭縣漢屬遼東郡晉省唐新書曰高麗建安城古平郭縣也甚有威惠仁亦次之四年拓跋猗色妻惟氏忌氏王鬱律之強恐不利於其子乃殺鬱律而立其子賀傉鬱律立見八十九卷愍帝建興四年傉奴沃翻鬱律之子什翼犍犍居言翻幼在襁褓其母王氏匿於袴中祝之曰天苟存汝則勿啼久之不啼乃得免惟氏專制國政遣使聘後趙後趙人謂之女國使以惟氏專政故謂之女國史言拓跋所以中衰使疏吏翻何茲全標點王崇武聶崇岐覆校
