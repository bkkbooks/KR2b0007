body:
  text: 資治通鑑卷第一百四十六端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註梁紀二先是高祖武皇帝二天監四年乙酉五五先是春正月癸卯朔詔曰二漢登賢莫非經術服膺雅道名立行成行下孟翻朱元晦曰服著也膺胸也奉持而著之心胸之間著則略翻魏晉浮蕩儒教淪歇風節罔樹樹立也歇許竭翻可置五經博士各一人廣開館宇招內後進於是以賀瑒及平原明山賓吳興沈峻建平嚴植之補博士各主一館館有數百生給其餼廩瑒徒杏翻又音暢餼許既翻鄭玄曰餼廩稍食也稍所教翻其射策通明者即除為吏漢書音義曰作簡策難問列置案上在試者意投射取而答之謂之射策朞年之間懷經負笈者雲會瑒循之玄孫也笈其劫翻又楚洽翻書箱也晉氏南渡之初以賀循為儒宗又選學生往會稽雲門山從何胤受業胤時隱雲門山今在會稽南三十一里有雲門寺會工外翻行下孟翻具以名聞分遣博士祭酒巡州郡立學先是初譙國夏侯道遷以輔國將軍從裴叔業鎮壽陽為南譙太守按魏收地形志晉孝武置南譙郡蓋治渦陽又按蕭子顯齊志武帝永明二年割揚州宣城淮南南豫譙廬江臨江六郡置南豫州四年冠軍長史沈憲啟二豫分置以桑堁子亭為斷潁川汝陽在南譙歷陽界悉屬西豫廬江居晉熙汝陰之中屬南豫求以潁川汝陽屬南豫廬江屬西豫則齊之南譙蓋置於歷陽西界而渦陽已入於魏矣南北建置郡縣最為難考者率如此夏戶雅翻守式又翻單騎奔魏魏以道遷為驍騎將軍騎奇寄翻驍堅堯翻從王肅鎮壽陽使道遷守合肥肅卒率子恤翻下同道遷棄戍來奔從梁秦二州刺史莊丘黑鎮南鄭以道遷為長史領漢中太守黑卒詔以都官尚書王珍國為刺史未至道遷陰與軍主考城江忱之嚴忱改悅等謀降魏降戶江翻先是魏仇池鎮將楊靈珍叛魏來奔事見一百四十一卷齊明帝建武四年先悉薦翻將即亮翻助戍漢中有部曲六百人道遷憚之上遣左右吳公之等使南鄭道遷遂殺使者發兵擊靈珍父子斬之幷使者首送於魏使疏吏翻白馬戍主尹天寶聞之引兵擊道遷敗其將龐樹敗補邁翻遂圍南鄭道遷求救於氐王楊紹先楊集起楊集義皆不應集義弟集朗引兵救道遷擊天寶殺之魏以道遷為平南將軍豫州刺史豐縣侯考異曰梁帝紀天監三年二月魏陷梁州而列傳皆無其事魏帝紀正始元年閏十二月癸卯朔蕭衍行梁州事夏侯道遷據漢中來降道遷傳具言其事按長曆梁閏二月癸卯即天監四年正月朔也故置於此將兵赴之道遷受平南辭豫州辭豫州者欲得梁州也魏主不許先是辛亥上祀南郊大赦先是乙丑魏以驃騎大將軍高陽王雍為司空驃匹妙翻騎奇寄翻加尚書令廣陽王嘉儀同三司先是二月丙子魏以宕昌世子梁彌博為宕昌王宕徒浪翻先是上謀伐魏壬午遣衞尉卿楊公則將宿衞兵塞洛口自漢以來衞尉與太常太僕廷尉大鴻臚宗正大司農少府為九卿而職名未帶卿字至梁分十二寺始各帶卿字水經註洛澗北逕秦虛下注淮謂之洛口塞悉則翻先是壬辰交州刺史李凱據州反長史李畟討平之畟初力翻先是魏邢巒至漢中擊諸城戍所向摧破晉壽太守王景胤據石亭水經註漢水自武興城北西南流逕關城北又西逕石亭戍又逕晉壽城西魏以巒為梁秦二州刺史巴西太守龐景民據郡不下龐皮江翻郡民嚴玄思聚衆自稱巴州刺史附於魏攻景民斬之楊集起集義聞魏克漢中而懼閏月帥㣥氐叛魏斷漢中糧道帥讀曰率斷丁管翻巒屢遣軍擊破之先是夏四月丁巳以行宕昌王梁彌博為河涼二州刺史宕昌王先是冠軍將軍孔陵等將兵二萬戍深杭冠古玩翻將即亮翻考異曰梁鄧元起傳魏將王景胤孔陵寇東西晉壽並遣告急按魏邢巒傳曰蕭衍晉壽太守王景胤據石亭又曰蕭衍遣其將軍孔陵等據深杭然則景胤陵皆梁將也元起傳誤魯方達戍南安五代志始州普安縣舊曰南安始州唐之劍州以拒魏任音壬邢巒遣統軍王足將兵擊之所至皆捷遂入劍閣陵等退保梓潼足又進擊破之梁州十四郡地東西七百里南北千里皆入于魏蕭子顯齊志梁州注籍者二十二郡荒郡不預焉今魏取十四郡初益州刺史章十二行本史下有當陽侯三字乙十一行本同張校同退齋校同鄧元起以母老乞歸詔徵為右衞將軍以西昌侯淵藻代之淵藻懿之子也懿死於東昏之手尹天寶馳使報元起使疏吏翻及魏寇晉壽王景胤等並遣告急衆勸元起急救之元起曰朝廷萬里軍不猝至若寇賊侵淫侵淫以癰疽為喻侵毒好肉為淫肉董督之任非我而誰何事怱怱救之史言鄧元起乞歸非由衷之請撲普木翻救漢中而晉壽已陷蕭淵藻將至元起營還裝糧儲器械取之無遺淵藻入城恨之又求其良馬元起曰年少郎子何用馬為淵藻恚因醉殺之元起養寇自資而卒不免於死雖淵藻以私忿殺之亦不為無罪也少詩照翻恚於避翻哭且問故淵藻曰天子有詔衆乃散遂誣以反上疑焉元起故吏廣漢羅研詣闕訟之上曰果如我所量也使讓淵藻曰元起為汝報讎謂協力誅東昏報其父讎也量音良為于偽翻下同忠孝之道如何乃貶淵藻號為冠軍將軍冠古玩翻考異曰梁書元起傳藻以粮儲無遺甚怨望之因表元起逗留不憂軍事收付州獄自縊死按若止以逗留表元起安敢亶收前刺史付獄殺之必誣以反也今從南史又梁書藻本以冠軍為益州刺史與南史異贈元起征西將軍諡曰忠侯李延壽論曰元起勤乃胥附毛萇曰幸下親上曰胥附謂開梁益之土也禍機先陷冠軍之貶於罰已輕梁之政刑於斯為失私戚之端自斯而啟年之不永不亦宜乎先是益州民焦僧護聚衆作章十二行本作上有數萬二字乙十一行本同孔本同張校同亂蕭淵藻年未弱冠人生二十曰弱冠冠古玩翻或陳不可淵藻大怒斬于階側乃乘平肩輿巡行賊壘平肩輿使人就掆肩之故曰平肩行下孟翻矢下如雨從者舉楯禦矢淵藻命去之射而亦翻從才用翻去羌呂翻由是人心大安擊僧護等皆平之先是六月庚戌初立孔子廟先是豫州刺史王超宗以五代志考之此時梁置豫州於晉熙今安慶府懷寧縣地峴戶典翻丁卯魏揚州刺史薛真度遣兼統軍李叔仁等擊之超宗兵大敗先是冠軍將軍王景胤李畎輔國將軍魯方達等與魏王足戰屢敗秋七月足進逼涪城畎姑泫翻涪音浮先是八月壬寅魏中山王英寇雍州雍於用翻先是庚戌秦梁二州刺史魯方達與魏王足統軍紀洪雅盧祖遷戰敗方達等十五將皆死壬子王景胤等又與祖遷戰敗景胤等二十四將皆死先是楊公則至洛口與魏豫州長史石榮戰斬之甲寅將軍姜慶真與魏戰於羊石不利羊石蓋即陳伯之所屯之陽石也先是雍州蠻沔東太守田青喜叛降魏考之北史青喜所據之地蓋在襄陽之東竟陵之西沔彌兗翻先是魏有芝生於太極殿之西序殿廡曰序光上表以為此莊子所謂氣蒸成菌者也菌巨隕翻地蕈也柔脆之物生於墟落穢濕之地不當生於殿堂高華之處今忽有之厥狀扶疏誠足異也夫野木生朝野鳥入廟古人皆以為敗亡之象故太戊中宗懼災脩德殷道以昌商王太戊之時亳有祥桑穀共生于朝一暮大拱太戊懼而脩德祥桑枯死殷道復興高宗祭成湯有飛雉升鼎耳而雊祖己曰惟先格王正厥事朝諸侯有天下猶運之於掌中宗當作高宗朝直遙翻國興而妖豫者也妖於遙翻今西南二方兵革未息郊甸之內大旱踰時民勞物悴莫此之甚悴秦醉翻承天育民者所宜矜恤伏願陛下側躬聳意惟新聖道節夜飲之樂養方富之年則魏祚可以永隆皇壽等於山岳矣於是魏主好宴樂樂音洛好呼到翻故光言及之先是九月己巳楊公則等與魏揚州刺史元嵩戰公則敗績先是冬十月丙午上大舉伐魏以揚州刺史臨川王宏都督北討諸軍事尚書右僕射柳惔為副惔徒甘翻王公以下各上國租及田穀以助軍國租者封國所入之租田穀者職田所入之穀各上時掌翻先是楊集起集義立楊紹先為帝自皆稱王十一月戊辰朔魏遣光祿大夫楊椿將兵討之將即亮翻先是魏王足圍涪城蜀人震恐益州城戍降魏者什二三民自上名籍者五萬餘戶上時掌翻下西上同邢巒表於魏主請乘勝進取蜀以為建康成都相去萬里陸行既絕自襄陽西行遵陸可以至蜀梁州既入于魏則陸路斷矣水軍西上非周年不達益州外無軍援一可圖也頃經劉季連反鄧元起攻圍事見上卷元年二年吏民無復固守之志二可圖也蕭淵藻裙屐少年復扶又翻裙渠云翻下裳也屐竭戟翻蹻也少詩沼翻未洽治務宿昔名將多見囚戮治直吏翻將即亮翻下同今之所任皆左右少年三可圖也蜀之所恃唯在劍閣今既克南安已奪其險據彼竟內竟讀曰境三分已一自南安向涪方軌無礙前軍累敗後衆喪魄四可圖也喪息浪翻淵藻是蕭衍骨肉至親必無死理若克涪城淵藻安肯城中坐而受困必將望風逃去若其出鬬庸蜀士卒駑怯弓矢寡弱五可圖也武王之伐紂也庸蜀八國皆從庸上庸之地蜀蜀郡之地不習軍旅賴將士竭力頻有薄捷既克重阻省悉景翻重直龍翻重阻猶言重險也民心懷服瞻望涪益時梓潼太守治涪城益州刺史治成都正以兵少糧匱未宜前出少詩沼翻今若不取後圖便難況益州殷實戶口十萬比壽春義陽其利三倍魏先此已得壽春義陽故云然時不可失若欲保境寧民則臣居此無事乞歸侍養養余亮翻魏主詔以平蜀之舉當更聽後敕寇難未夷何得以養親為辭巒又表稱昔鄧艾鍾會帥十八萬衆傾中國資儲僅能平蜀事見七十八卷魏元帝景元四年難乃旦翻帥讀曰率鬬實力也況臣才非古人何宜以二萬之衆而希平蜀所以敢者正以據得要險士民慕義此往則易易以豉翻下未易同彼來則難任力而行理有可克今王足已逼涪城脫得涪則益州乃成擒之物但得之有早晚耳且梓潼已附民戶數萬謂已上名籍之民也又劍閣天險得而棄之良可惜矣諸葛孔明相蜀以大劍小劍有隘束之路故曰劍門以閣道三十里至險乃有閣尉姜維拒鍾會於此晉以其地入梓潼郡桓溫入蜀於晉壽置劍閣縣屬梁州未易可為自軍度劍閣以來鬢髮中白中竹仲翻日夜戰懼何可為心所以勉強者強其兩翻既得此地而自退不守恐負陛下之爵祿故也且臣之意算正欲先取涪城以漸而進若得涪城則中分益州之地斷水陸之衝魏已得劍閣進取成都涪當其衝梁兵由內水而上救成都涪亦當其衝斷丁管翻孤城自守何能復持久哉復扶又翻臣今欲使軍軍相次聲勢連接先為萬全之計然後圖功得之則大利不得則自全又巴西南鄭相距千四百里去州迢遰迢田聊翻遰徒計翻迢遰遠也恆多擾動恆戶登翻昔在南之日以其統綰勢難曾立巴州鎮靜夷獠立巴州見一百三十五卷齊高帝建元二年省巴州見武帝永明二年獠魯皓翻下同因而表罷彼土民望嚴蒲何楊非唯一族雖率居山谷而豪右甚多文學風流亦為不少但以去州既遠不獲仕進至於州綱無由廁迹州之上佐是謂州綱少詩沼翻多生異圖怏於兩翻比道遷建義之始比毗至翻嚴玄思自號巴州刺史克城以來仍使行事巴西廣袤千里戶餘四萬若於彼立州鎮攝華獠巴西之地華人與獠雜居故云華獠袤音茂帖靜也安也伏也不勞征伐自為國有李雄譙縱取蜀東不能過墊江以苻秦兵力之盛取梁益如反掌墊江以東苻秦不能有也邢巒之圖蜀亦規墊江以西而已蓋地利足恃也我朝自紹定失蜀彭大雅遂城渝為制府支持四蜀且四十年渝古墊江之地也墊音疊先是魏主以王足行益州刺史先悉薦翻上遣天門太守張齊將兵救益州未至將即亮翻魏主更以梁州軍司泰山羊祉為益州刺史更工衡翻王足聞之不悅輒引兵還還從宣翻又如字遂不能定蜀久之足自魏來奔邢巒在梁州接豪右以禮撫小民以惠州人悅之巒之克巴西也使軍主李仲遷守之仲遷溺於酒色費散兵儲公事諮承無能見者巒忿之切齒仲遷懼謀叛城人斬其首以城來降史言魏所以不能定蜀降戶江翻先是十二月庚申魏遣驃騎大將軍源懷討武興氐邢巒等並受節度驃匹妙翻騎奇寄翻先是司徒尚書令謝朏以母憂去職朏敷尾翻先是是歲大穰穰豐也詩豐年穰穰五年丙戌五六春正月丁卯朔魏于后生子昌大赦楊集義圍魏關城此即陽平關城也豎而庾翻集義逆戰豎眼擊破之乘勝逐北壬申克武興執楊紹先送洛陽楊集起楊集義亡走遂滅其國晉惠帝元康六年氐王楊茂搜始據仇池百頃其後浸盛盡有漢武都郡之地北侵隴西天水南侵漢中拓跋既盛取武都仇池之地楊氏僅據武興今魏既取漢中遂滅楊氏又改為東益州東益州領武興仇池盤頭廣長廣業梓潼洛叢郡乙亥以前司徒謝朏為中書監司徒朏敷尾翻冀州刺史桓和擊魏南青州不克梁青冀二州治鬱洲魏顯祖取三齊置東徐州於圂城領東安東莞郡高祖太和二十二年改為南青州五代志沂州沂水縣舊置南青州魏秦州屠各王法智聚衆二千屠直於翻推秦州主簿呂苟兒為主改元建明置百官攻逼州郡涇州民陳瞻亦聚衆稱王改元聖明魏置涇州治臨涇城領安定隴東新平趙平平涼平原等郡己卯楊集起兄弟相帥降建魏帥讀曰率降戶江翻甲申封皇子綱為晉安王二月丙辰魏主詔王公以下直言忠諫治書侍御史陽固上表治直之翻上時掌翻以為當今之務宜親宗室勤庶政貴農桑賤工賈賈音古絕談虛窮微之論簡桑門無用之費以救飢寒之苦時魏主委任高肇疏薄宗室好桑門之法好呼到翻不親政事故固言及之戊午魏遣右衞將軍元麗都督諸軍討呂苟兒麗小新成之子也小新成見一百二十九卷宋孝武大明五年乙丑徐州刺史歷陽昌義之與魏平南將軍陳伯之戰於梁城晉孝武太元中僑立梁郡於淮南壽春界故有梁城其地在壽陽東北鍾離西南將軍蕭昞將兵擊魏徐州圍淮陽角城在淮水之陽淮陽又在角城北十八里治宿預梁後於角城置淮陽郡昞音丙三月丙寅朔日有食之己卯魏荊州刺史趙怡平南將軍奚康生救淮陽魏咸陽王禧之子翼遇赦求葬其父禧誅見一百四十四卷齊和帝中興元年魏主不許癸未翼與其弟昌曄來奔上以翼為咸陽王翼以曄嫡母李之子也請以爵讓之上不許輔國將軍劉思效敗魏青州刺史元繫於膠水魏收志光州長廣郡即墨縣有膠水水經膠水出黔陬縣膠山北流過夷安縣東又東北過膠東縣城北百里注于海敗補邁翻臨川王宏使記室吳興丘遲為書遺陳伯之曰遺于季翻尋君去就之際非有他故直以不能內審諸己外受流言沈迷猖蹶以至於此沈持林翻主上屈法申恩吞舟是漏漢懲秦法之苛禁罔疏闊時稱為漏吞舟之魚親戚安居高臺未傾愛妾尚在松柏不翦謂不毀夷其先世墳墓也親戚安居謂其親戚在江南者皆不以叛黨連坐安居自若也高臺未傾謂居第未嘗汙瀦池臺如故也愛妾尚在謂其婢妾猶守其家不沒于官及流落于他家也昔雍門子見孟嘗君吟曰高臺既已傾曲池既已平墳墓生荊棘牧豎游其上孟嘗君亦如是乎孟嘗君為之喟然歎息鷰巢於飛幕之上魚游釜中古人多有是言言將必至於焦爛左傳吳季札謂孫林父曰夫子之居此也猶燕之巢于幕上杜預註曰言至危也想早勵良圖自求多福庚寅伯之自壽陽梁城擁衆八千來降伯之元年奔魏今復還降下江翻詔復以伯之為西豫州刺史未之任復以為通直散騎常侍不使之出當邊鎮恐其復叛也復扶又翻卒於家初魏御史中尉甄琛甄七人翻琛丑林翻表稱周禮山林川澤有虞衡之官為之厲禁蓋取之以時不使戕賊而已故雖置有司實為民守之也周禮山虞掌山林之政令物為之厲而為之守禁令萬民時斬材有期日凡竊木者有刑罰林衡掌林麓之禁令而平其守以時計林麓而賞罰之川衡掌巡川澤之禁令而平其守以時舍其守犯禁者執而誅罰之澤虞掌國澤之政令為之厲禁使其地之人守其財物以時入于王府頒其餘於萬民為于偽翻下專為同必惠養子孫長知兩翻天下之君必惠養兆民未有為人父母而吝其醯醢富有㣥生而榷其一物者也榷古岳翻今縣官鄣護河東鹽池而收其利是專奉口腹而不及四體也蓋天子富有四海何患於貧乞弛鹽禁與民共之錄尚書事勰尚書邢巒奏勰彭城王勰也音協以為琛之所陳坐談則理高行之則事闕竊惟古之善治民者必汚隆隨時豐儉稱事治直之翻稱尺證翻役養消息以成其性命若任其自生隨其飲啄乃是芻狗萬物老子曰天地不仁以萬物為芻狗註云天施地化不以仁恩天地生萬物視之如芻草狗畜任自然也是故聖人斂山澤之貨以寬田疇之賦收關市之稅以助什一之儲此謂田疇什一之賦不足以供國用故斂山澤稅關市以助之也皆非為身為于偽翻下同所謂資天地之產惠天地之民也今鹽池之禁為日已久積而散之以濟軍國非專為供太官之膳羞給後宮之服玩既利不在己則彼我一也然自禁鹽以來有司多慢出納之間或不如法是使細民嗟怨負販輕議此乃用之者無方非作之者有失也一旦罷之恐乖本旨一行一改法若弈棋左傳曰弈者舉棋不定不勝其耦今此以喻一行一改無定法也宜如舊式自此以上合載於一百四十三卷齊東昏永明二年琛議既行於景明初年隨格於景明四年今復罷鹽禁是卒從其議也卒子恤翻四月乙未罷鹽池禁復收鹽利見上卷二年庚戌魏以中山王英為征南將軍都督揚徐二州諸軍事帥衆十餘萬以拒梁軍帥讀曰率指授諸節度所至以便宜從事江州刺史王茂將兵數萬侵魏荊州誘魏邊民及諸蠻更立宛州將即亮翻誘音酉更魏荊州為宛州也更工衡翻宛於元翻遣其所署宛州刺史雷豹狼等襲取魏河南城蕭子顯齊志雍州有河南郡所領五縣惟棘陽為實土則河南郡當在南陽棘陽縣界五代志鄧州新野縣舊曰棘陽辛酉茂戰敗失亡二千餘人考異曰大眼傳云俘馘七千有餘今從魏帝紀茂逃還大眼追至漢水攻拔五城魏征虜將軍宇文福寇司州俘千餘口而去五月辛未太子右衞率張惠紹等侵魏徐州拔宿預執城主馬成龍晉安帝立宿預縣屬淮陽郡魏高祖以為南徐州治所乙亥北徐州刺史昌義之拔梁城南徐治京口故以鍾離為北徐豫州刺史韋叡遣長史王超等攻小峴未拔叡行圍柵行下孟翻魏出數百人陳於門外陳讀曰陣叡欲擊之諸將皆曰將即亮翻下同向者輕來未有戰備徐還授甲乃可進耳叡曰不然魏城中二千餘人足以固守今無故出人於外必其驍勇者也驍堅堯翻苟能挫之其城自拔衆猶遲疑叡指其節曰朝廷授此非以為飾韋叡法不可犯也遂進擊之士皆殊死戰魏兵敗走因急攻之中宿而拔中讀曰仲又竹仲翻考異曰魏帝紀六月辛丑陷小峴戍今從叡傳遂至合肥先是右軍司馬胡景略等攻合肥久未下先悉薦翻叡按山川夜帥衆堰肥水頃之堰成水通舟艦繼至帥讀曰率艦戶黯翻魏築東西小城夾合肥叡先攻二城魏將楊靈胤帥衆五萬奄至衆懼不敵請奏益兵叡笑曰賊至城下方求益兵將何所及且吾求益兵彼亦益兵兵貴用奇豈在衆也遂擊靈胤破之叡使軍主王懷靜築城於岸以守堰魏攻拔之城中千餘人皆沒魏人乘勝至堤下兵勢甚盛諸將欲退還漅湖或欲保三叉考異曰南史作三丈今從梁書蓋漅湖之水於此分三汊故名退保於此利於入船故衆欲之寧有此邪命取繖扇麾幢樹之堤下示無動志繖蘇旱翻又蘇旰翻幢傳江翻魏人來鑿堤叡親與之爭魏兵卻因築壘於堤以自固叡起鬬艦高與合肥城等四面臨之城中人皆哭守將杜元倫登城督戰中弩死將即亮翻中竹仲翻辛巳城潰俘斬萬餘級獲牛羊以萬數叡體素羸未嘗跨馬羸倫為翻每戰常乘板輿督厲將士勇氣無敵晝接賓旅夜半起算軍書張燈達曙撫循其衆常如不及故投募之士爭歸之所至頓舍館宇藩牆皆應準繩諸軍進至東陵水經註廬江金蘭縣西北東陵鄉大蘇山灌水之所出也考之諸志無金蘭縣未知何世所置班師之詔必在洛口師潰之後史因書叡事而終言之據姚思廉梁書時魏守甓城去東陵二十里叡悉遣輜重居前身乘小輿殿後重直用翻殿丁練翻魏人服叡威名望之不敢逼全軍而還於是遷豫州治合肥豫州自晉熙遷合肥壬午魏遣尚書元遙南拒梁兵癸未魏遣征西將軍于勁節度秦隴諸軍丁亥廬江太守聞喜裴邃克魏羊石城庚寅又克霍丘城水經註曹魏安豐都尉治安豐津南後以其故城立霍丘戍隋立霍丘縣今在壽春東百餘里杜佑曰霍丘漢松滋縣地考異曰梁裴邃傳云五年征邵陽洲魏人為長橋以濟邃築壘逼橋密作沒突艦會淮水暴漲邃乘艦徑造橋側魏衆驚潰邃乘勝追擊大破之進克羊石霍丘城平小峴攻合肥魏帝紀辛巳衍將陷合肥己丑又陷羊石霍丘按韋叡傳叡攻邵陽洲方使邃乘艦焚橋事在克合肥後又梁帝紀辛巳叡克合肥丁亥邃克羊石庚寅克霍丘今從之邃傳載取二城在破邵陽洲後誤也六月庚子青冀二州刺史恆和克胊山城胊音劬乙巳魏安西將軍元麗擊王法智破之斬首六千級張惠紹與假徐州刺史宋黑水陸俱進趣彭城圍高塚戍水經註彭城同孝山陰有楚元王冢高十許丈廣百許步意者魏立戍於此乎趣七喻翻將即亮翻丁未惠紹兵不利黑戰死太子統生五歲能遍誦五經庚戌始自禁中出居東宮丁巳魏以度支尚書邢巒都督東討諸軍事度徒洛翻魏驃騎大將軍馮翊惠公源懷卒懷性寬簡不喜煩碎驃匹妙翻騎奇寄翻喜許記翻常曰為貴人當舉綱維何必事事詳細譬如為屋但外望高顯楹棟平正基壁完牢足矣斧斤不平斲削不密非屋之病也秋七月丙寅桓和擊魏兗州拔固城固城疑即抱犢固城也抱犢固在蘭陵界呂苟兒率衆十餘萬屯孤山圍逼秦州此孤山當在上邽左右魏秦州治上邽領天水略陽漢陽郡大破之行秦州事李韶掩擊孤山獲其父母妻子庚辰苟兒帥其徒詣麗降帥讀曰率降戶江翻兼太僕卿楊椿別討陳瞻瞻據險拒守諸將或請伏兵山蹊斷其出入斷丁管翻待糧盡而攻之或欲斬木焚山然後進討椿曰皆非計也自官軍之至所向輒克賊所以深竄正避死耳今約勒諸軍勿更侵掠賊必謂我見險不前待其無備然後奮擊可一舉平也乃止屯不進賊果出抄掠椿復以馬畜餌之抄楚交翻復扶又翻不加討逐久之陰簡精卒銜枚夜襲之斬瞻傳首秦涇二州皆平戊子徐州刺史王伯敖與魏中山王英戰於陰陵陰陵縣漢屬九江郡晉屬淮南郡梁北譙郡治陰陵城隋改北譙郡為全椒縣屬江都郡唐全椒縣屬滁州失亡五千餘人己丑魏發定冀瀛相幷肆六州十萬人以益南行之兵相息亮翻上遣將軍角念將兵一萬屯蒙山招納兗州之民降者甚衆魏收志南青州東安郡新泰縣東南有蒙山蓋蒙山即古所謂東蒙也與固城孤山皆近魏兗州東界故梁連兵據之以招兗州之民北史邢巒傳謂是時梁人侵軼徐兗是矣角姓也姓苑漢有角善叔將即亮翻降戶江翻將軍蕭及屯固城桓和屯孤山魏收志蘭陵郡蘭陵縣有石孤山又昌慮縣有孤山別將元恆攻及恆戶登翻統軍畢祖朽攻念壬寅魯大破和於孤山恆拔固城祖朽擊念走之己酉魏詔平南將軍安樂王詮督後發諸軍赴淮南詮長樂之子也安樂王長樂見一百三十三卷宋蒼梧王元徽三年樂音洛詮且緣翻將軍藍懷恭與魏邢巒戰于睢口姓譜藍魯甘翻姓也戰國策有中山大夫藍諸水經註睢水過睢陵縣故城北而東南流逕下相縣故城南又東南流入于泗謂之睢口睢音雖懷恭敗績巒進圍宿預懷恭復於清南築城清南清水之南也復扶又翻九月癸酉拔之斬懷恭殺獲萬計張惠紹棄宿預此與後張惠紹聞洛口敗引兵退本一事耳解見後遁還臨川王宏以帝弟將兵將即亮翻下同器械精新軍容甚盛北人以為百數十年所未之有軍次洛口水經註洛澗在西曲陽縣北劉牢之斬秦將梁成處北歷秦墟下注淮謂之洛口即謂昌義之克梁城也宏性懦怯部分乖方分扶問翻魏詔邢巒引兵渡淮與中山王英合攻梁城宏聞之懼召諸將議旋師呂僧珍曰知難而退不亦善乎宏曰我亦以為然柳惔曰自我大衆所臨何城不服何謂難乎裴邃曰是行也固敵是求何難之避馬仙琕曰王安得亡國之言天子掃境內以屬王惔徒甘翻琕部田翻屬之欲翻有前死一尺無卻生一寸昌義之怒須髮盡磔磔陟格翻張開也曰呂僧珍可斬也豈有百萬之師出未逢敵望風遽退何面目得見聖主乎朱僧勇胡辛生拔劍而退退據南史宏傳當作起欲退自退下官當前向取死議者罷出僧珍謝諸將曰殿下昨來風動謂宏心風發動也深恐大致沮喪故欲全師而返耳沮在呂翻喪息浪翻宏不敢遽違㣥議停軍不前魏人知其不武遺以巾幗遺于季翻幗古獲翻且歌之曰不畏蕭娘與呂姥言其怯懦如婦人女子也姥莫補翻虎謂韋叡也僧珍歎曰使始興吳平為帥而佐之豈有為敵人所侮如是乎始興王憺吳平侯昺帥所類翻大衆停洛口宏固執不聽令軍中曰人馬有前行者斬於是將士人懷憤怒魏奚康生馳遣楊大眼謂中山王英曰梁人自克梁城已後久不進軍其勢可見必畏我也王若進據洛水彼自奔敗英曰蕭臨川雖騃其下有良將韋裴之屬未可輕也騃古駭翻將即亮翻宜且觀形勢勿與交鋒張惠紹號令嚴明所至獨克軍于下邳前已言張惠紹棄宿預遁還矣宿預在下邳東南百餘里此言軍于下邳是未棄宿預之前事李延壽以此事載之臨川王宏傳通鑑因亦連而書之惠紹諭之曰我若得城諸卿皆是國人國人猶言王民也降戶江翻下同徒使諸卿失鄉里非朝廷弔民之意也今且安堵復業勿妄自辛苦降人咸悅己丑夜洛口暴風雨軍中驚臨川王宏與數騎逃去將士求宏不得皆散歸考異曰梁書宏傳云會征役久有詔班師殊為不實今從南史填滿水陸捐棄病者及羸老死者近五萬人羸倫為翻近其靳翻宏乘小船濟江夜至白石壘叩城門求入臨汝侯淵猷登城謂曰百萬之師一朝鳥散國之存亡未可知也恐姦人乘間為變間古莧翻城不可夜開宏無以對乃縋食饋之縋馳偽翻淵猷淵藻之弟時昌義之軍梁城聞洛口敗與張惠紹皆引兵退此即張惠紹棄宿預一事也通鑑因南史臨川王宏傳所載者書之遂致複出魏主詔中山王英乘勝平蕩東南逐北至馬頭攻拔之城中糧儲魏悉遷之歸北議者咸曰魏運米北歸當不復南向復扶又翻上曰不然此必欲進兵為詐計耳乃命脩鍾離城敕昌義之為戰守之備馬頭城在鍾離之西馬頭既陷魏必東攻鍾離故預為之備冬十月英進圍鍾離魏主詔邢巒引兵會之巒上表以為南軍雖野戰非敵而城守有餘今盡銳攻鍾離得之則所利無幾不得則虧損甚大且介在淮外借使束手歸順猶恐無糧難守況殺士卒以攻之乎又征南士卒從戎二時從戎二時謂兵連不解自夏迄秋也不問可知雖有乘勝之資懼無可用之力若臣愚見謂宜脩復舊戍撫循諸州以俟後舉江東之釁不患其無詔曰濟淮掎角事如前敕釁許覲翻掎居蟻翻何容猶爾盤桓盤桓不進貌可速進軍巒又表以為今中山進軍鍾離實所未解解戶買翻曉也若為得失之計謂為一切之計或得或失未可必也直襲廣陵出其不備或未可知若正欲以八十日糧取鍾離城者臣未之前聞也英期以八十日糧取鍾離故巒云然不與人戰城塹水深非可填塞塞悉則翻空坐至春士卒自弊若遣臣赴彼從何致糧夏來之兵不齎冬服脫遇冰雪何方取濟臣寧荷怯懦不進之責不受敗損空行之罪荷下可翻鍾離天險朝貴所具謂朝之貴臣所具知也朝直遙翻則所不知如其無也必無克狀言必無可克之狀願賜臣停若謂臣憚行求還臣所領兵乞盡付中山任其處分處昌呂翻分扶問翻臣止以單騎隨之東西臣屢更為將騎奇寄翻更工衡翻將即亮翻頗知可否臣既謂難何容強遣強其兩翻乃召巒還更命鎮東將軍蕭寶寅與英同圍鍾離侍中盧昶素惡巒更工衡翻惡烏路翻與侍中領右衞將軍元暉共譖之使御史中尉崔亮彈巒在漢中掠人為奴婢巒傳云巒初至漢中接豪右以禮撫衆以惠歲餘之後頗因其去就誅滅百姓籍為奴婢者二百餘口彈徒丹翻暉言於魏主曰巒新有大功不當以赦前小事案之謂是年正月生皇子赦也遂不問暉與盧昶皆有寵於魏主而貪縱時人謂之餓虎將軍飢鷹侍中暉尋遷吏部尚書用官皆有定價大郡二千匹次郡下郡遞減其半餘官各有等差選者謂之市曹以選曹貨賂為市因謂之市曹選須絹翻丁酉梁兵圍義陽者夜遁聞洛口師潰故亦遁破之柔然庫者可汗卒子伏圖立號佗汗可汗佗汗魏言緒也可從刊入聲汗音寒佗徒河翻戊申佗汗遣使者紇奚勿六跋如魏請和魏主不報其使謂勿六跋曰蠕蠕遠祖社崙乃魏之叛臣事見一百八卷晉孝武太元十九年使疏吏翻蠕人兗翻崙盧昆翻蹔聽通使事見一百三十六卷齊武帝永明五年蹔與暫同不及疇昔大魏之德方隆周漢正以江南未平少寬北略少詩沼翻通和之事未容相許若脩藩禮款誠昭著者當不爾孤也孤負也魏京兆王愉廣平王懷國臣多驕縱公行屬請屬之欲翻魏主詔中尉崔亮窮治之治直之翻坐死者三十餘人其不死者悉除名為民惟廣平右常侍楊昱文學崔楷以忠諫獲免昱椿之子也自晉以來王國置師友文學各一人左右常侍各一人楊椿見一百三十七卷齊武帝永明八年十一月乙丑大赦詔右衞將軍曹景宗都督諸軍二十萬救鍾離上敕景宗頓道人洲道人洲在邵陽洲之東景宗固啟求先據邵陽洲尾上不許景宗欲專其功違詔而進值暴風猝起頗有溺者溺奴狄翻復還守先頓謂還守道人洲也復扶又翻景宗不進蓋天意也若孤軍獨往城不時立必致狼狽今破賊必矣初漢歸義侯勢之末㣥獠始出北自漢中南至邛笮布滿山谷事見九十七卷晉孝宗永和二年獠魯皓翻邛渠容翻笮音昨蜀民多東徙山谷空地皆為獠所據其近郡縣與華民雜居者頗輸租賦遠在深山者郡縣不能制梁益二州歲伐獠以自潤公私利之及邢巒為梁州獠近者皆安堵樂業樂音洛遠者不敢為寇巒既罷去魏以羊祉為梁州刺史傅豎眼為益州刺史去年魏得晉壽置益州豎而庾翻不得物情獠王趙清荊引梁兵入州境為寇祉遣兵擊破之豎眼施恩布信大得獠和十二月癸卯都亭靖侯謝朏卒朏敷尾翻魏人議樂久不決三年魏命議樂事見上卷六年丁亥五七上命景宗等豫裝高艦春正月公孫崇請委衞軍將軍尚書右僕射高肇監其事監工衡翻魏主知肇不學詔太常卿劉芳佐之上命景宗等豫裝高艦魏中山王英與平東將軍楊大眼等衆數十萬攻鍾離鍾離城北阻淮水魏人於邵陽洲兩岸為橋樹柵數百步跨淮通道英據南岸攻城大眼據北岸立城以通糧運城中衆纔三千人昌義之督帥將士隨方抗禦魏人以車載土填塹使其衆負土隨之嚴騎蹙其後人有未及回者因以土迮之帥讀曰率將即亮翻塹七豔翻騎奇寄翻迮側百翻迫也俄而塹滿衝車所撞撞傳江翻城土輒頹義之用泥補之衝車雖入而不能壞魏人晝夜苦攻分番相代墜而復升復扶又翻下同莫有退者一日戰數十合前後殺傷萬計魏人死者與城平二月魏主召英使還英表稱臣志殄逋寇而月初已來已以字通若三月晴霽城必可克願少賜寬假少詩沼翻魏主復詔曰彼土蒸濕無宜久淹勢雖必取乃將軍之深計兵久力殆亦朝廷之所憂也英猶表稱必克魏主遣步兵校尉范紹詣英議攻取形勢紹見鍾離城堅勸英引還英不從元英違衆議志在必克鍾離恃義陽之勝而驕也兵法曰常勝之家難與慮敵又曰兵驕者敗其謂是歟校戶教翻上命豫州刺史韋叡將兵救鍾離將即亮翻下同受曹景宗節度叡自合肥取直道由陰陵大澤行水經註濠水出陰陵縣之陽亭東北流逕鍾離城下而注于淮陰陵蓋自在鍾離西南合肥東北也輒飛橋以濟師人畏魏兵盛多勸叡緩行叡曰鍾離今鑿穴而處處昌呂翻負戶而汲車馳卒奔猶恐其後而況緩乎魏人已墮吾腹中卿曹勿憂也旬日至邵陽上豫敕曹景宗曰韋叡卿之鄉望曹景宗新野人韋叡以京兆著姓居襄陽既同州鄉而韋為望族景宗見叡禮甚謹上聞之曰二將和師必濟矣景宗與叡進頓邵陽洲叡於景宗營前二十里夜掘長塹樹鹿角截洲為城去魏城百餘步南梁太守馮道根能走馬步地計馬足以賦功比曉而營立賦布也給與也功力也計一夫之力所任作謂之功杜佑通典曰凡築城下闊與高倍上闊與下倍城高五丈下闊二丈五尺上闊一丈二尺五寸高下闊狹以此為準料功上闊加下闊得三丈七尺五寸半之得一丈八尺七寸五分以高五丈乘之一尺之城積數得九十三丈七尺五寸每一功日築土二尺計功約四十七人一步五尺之城計役二百三十五人一百步計役二萬三千五百人率一里則十里可知其出土負簣並計之大功之內城濠面闊二丈深一丈底闊一丈以面闊加底積數太半之得數一丈五尺以深一丈乘之鑿濠一尺得數一十五丈每一人計功日出三丈計功五人一步五尺計功二十五人十步計功二百五十人一里計功七萬五百人以此為數則百里可知比必利翻及也以杖擊地曰是何神也景宗等器甲精新軍容甚盛魏人望之奪氣景宗慮城中危懼募軍士言文達等言姓孔門言偃吳人今吳人猶有言姓齎敕入城城中始知有外援勇氣百倍楊大眼勇冠軍中將萬餘騎來戰所向皆靡叡結車為陳冠古玩翻將即亮翻騎奇寄翻陳讀曰陣大眼聚騎圍之叡以強弩二千一時俱發洞甲穿中中如字矢貫大眼右臂大眼退走明旦英自帥衆來戰帥讀曰率叡乘素木輿執白角如意以麾軍如意檛類英乃退魏師復夜來攻城復扶又翻飛矢雨集叡子黯請下城以避箭叡不許軍中驚叡於城上厲聲呵之乃定此確鬬也兩軍營壘相逼旦暮接戰勇而無剛者不能支久韋叡於此是難能也比年襄陽之守使諸將連營而前如韋叡之略城猶可全不至誤國矣嗚呼痛哉皆為楊大眼所略曹景宗募勇敢士千餘人於大眼城南數里築壘大眼來攻景宗擊卻之壘成使別將趙草守之有抄掠者皆為草所獲是後始得縱芻牧上命景宗等豫裝高艦使與魏橋等為火攻之計將即亮翻抄楚交翻艦戶黯翻令景宗與叡各攻一橋叡攻其南景宗攻其北魏於邵陽洲兩岸立橋南橋以接元英之兵北橋以接楊大眼之兵淮水暴漲六七尺考異曰梁帝紀四月癸未景宗等破魏軍魏帝紀四月戊戌鍾離大水英敗績按曹景宗傳云三月春水生淮水暴漲梁魏二史蓋據奏到月日書之耳今從景宗傳沈約曰晉武帝分扶風為秦國中原亂其民南流寄居堂邑堂邑本為縣前漢屬臨淮後漢屬廣陵晉又屬臨淮惠帝永興元年以臨淮淮陵立堂邑郡安帝改堂邑為秦郡五代志揚州六合縣舊曰尉氏置秦郡擊魏洲上軍盡殪殪於計翻別以小船載草灌之以膏從而焚其橋風怒火盛烟塵晦冥敢死之士拔柵斫橋水又漂疾焂忽之間橋柵俱盡道根等皆身自搏戰軍人奮勇呼聲動天地呼火故翻無不一當百魏軍大潰英見橋絕脫身棄城走大眼亦燒營去諸壘相次土崩悉棄其器甲爭投水死者十餘萬斬首亦如之叡遣報昌義之義之悲喜不暇答語但叫曰更生更生諸軍逐北至濊水上魏收志睢州穀陽郡連城縣有濊水按水經註服虔云穀水在沛國相縣界蓋睢水逕穀熟而兩分穀水之名蓋因地變然則穀水即泗水也魏收又云睢州即梁之潼州治取慮城又按水經註睢水自穀熟東流逕取慮城北又東逕睢陵城北又東與潼水會參而考之則濊水當在沛臨淮二郡界丁度集韻曰濊呼外翻一作渙音同水名在亳州是則濊水即渙水音同而字異耳緣淮百餘里尸相枕藉生擒五萬人枕之任翻藉慈夜翻考異曰韋叡傳云其餘釋甲稽顙乞為囚奴者猶數十萬按魏軍共止數十萬如叡傳所言似為太過今從景宗傳收其資糧器械山積牛馬驢騾不可勝計騾盧戈翻勝音升義之德景宗及叡請二人共會設錢二十萬官賭之樗蒲賭博私相與為戲耳不設於公庭今官賭之於徐州府廨公賭之也博以取財曰賭音丁古翻叡徐擲得盧遽取一子反之曰異事遂作塞反讀曰翻又如字樗蒲得盧者勝反一子而作塞塞者擲采未成次擲者塞之以決勝負塞與簺同先代翻異事猶言怪事也景宗與㣥帥爭先告捷帥所類翻叡獨居後世尤以此賢之史言韋叡有功不伐義之等受賞各有差上命景宗等豫裝高艦夏四月己酉以江州刺史王茂為尚書右僕射安成王秀為江州刺史秀將發主者求堅船以為齋舫以船載齋庫物因曰齋舫舫甫妄翻並兩船曰舫吾豈愛財而不愛士乎乃以堅者給參佐下者載齋物既而遭風齋舫遂破時諸王並下士建安王偉與秀尤好人物時人方之四豪上命景宗等豫裝高艦丁巳以臨川王宏為驃騎將軍開府儀同三司驃匹妙翻騎奇寄翻建安王偉為揚州刺史右光祿大夫沈約為尚書左僕射左僕射王瑩為中軍將軍上命景宗等豫裝高艦六月丙午馮翊等七郡叛降魏馮翊等郡江左僑立於雍州界降戶江翻上命景宗等豫裝高艦秋七月丁亥以尚書右僕射王茂為中軍嚴中軍改中衞將軍上命景宗等豫裝高艦八月戊子大赦上命景宗等豫裝高艦魏有司奏中山王英經算失圖齊王蕭寶寅等守橋不固皆處以極法處昌呂翻己亥詔英寶寅免死除名為民楊大眼徙營州為兵魏世祖真君五年置營州治和龍城領昌黎建德遼東樂浪冀陽郡崇多事產業征南長史狄道辛琛屢諫不從琛丑林翻遂相糾舉詔並不問崇因置酒謂琛曰長史後必為刺史但不知得上佐何如人耳琛曰若萬一叨忝得一方正長史朝夕聞過是所願也崇有慙色上命景宗等豫裝高艦九月己亥張亥作未魏以司空高陽王雍為太尉尚書令廣陽王嘉為司空上命景宗等豫裝高艦甲子魏開斜谷舊道漢高祖之為漢王也從杜南入蝕中張良送至褒中褒斜一谷也南谷曰褒北谷曰斜意此即斜谷舊道諸葛亮揚聲由斜谷取郿非杜南舊道也以事勢言之承平舊時自長安入蜀其取道就平易南北分爭塞故道而開新路以依險今魏欲就平易以通梁益故復開舊道斜余遮翻谷音浴上命景宗等豫裝高艦冬十月壬寅以五兵尚書徐勉為吏部尚書勉精力過人雖文案填積坐客充滿應對如流手不停筆又該綜百氏皆為避諱為于偽翻嘗與門人夜集客虞暠求詹事五官太子詹事亦有五官掾暠古老翻今夕止可談風月不可及公事時人咸服其無私上命景宗等豫裝高艦閏月乙丑以臨川王宏為司徒行太子太傅尚書左僕射沈約為尚書令行太子少傅吏部尚書袁昂為右僕射上命景宗等豫裝高艦丁卯魏皇后于氏殂是時高貴嬪有寵而妬高肇勢傾中外后暴疾而殂人皆歸咎高氏宮禁事祕莫能詳也為魏皇子昌卒張本上命景宗等豫裝高艦甲申以光祿大夫夏侯詳為尚書左僕射上命景宗等豫裝高艦乙酉魏葬順皇后于永泰陵上命景宗等豫裝高艦十二月丙辰豐城景公夏侯詳卒沈約曰吳立富城縣晉武太康元年更名豐城屬豫章郡上命景宗等豫裝高艦乙丑魏淮陽鎮都軍主常邕和以城來降降戶江翻考異曰魏帝紀十月庚午淮陽太守安樂以城南叛今從梁帝紀張政烺標點王崇武聶崇岐覆校
