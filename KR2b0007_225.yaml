body:
  text: 資治通鑑卷第二百二十五端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀四十一代宗睿文孝武皇帝中之下大曆九年大曆九年甲寅七七四大曆九年春正月壬寅田神功薨於京師田神功入朝見上卷上年大曆九年澧朗鎮遏使楊猷自澧州沿江而下亶出境至鄂州詔聽入朝猷遂泝漢江而上澧音禮使疏吏翻朝直遙翻泝蘇故翻下遐稼翻上時掌翻復州郢州皆閉城自守復郢二州皆濱漢此時蓋為山南東道巡屬守式又翻大曆九年二月辛未徐州軍亂刺史梁乘逾城走徐州治彭城大曆九年諫議大夫吳損使吐蕃留之纍年竟病死虜中吐從暾入聲損出使見上卷六年大曆九年庚辰汴宋兵防秋者千五百人盜庫財潰歸汴皮變翻考異曰唐曆作十日己酉按長曆是月庚午朔十日乃己卯也今從實録田神功薨故也己丑以神功弟神玉知汴宋留後大曆九年癸巳郭子儀入朝上言朔方國之北門中間戰士耗散什才有一今吐蕃兼河隴之地雜羌渾之衆朝直遙翻史照曰羌党項之屬渾吐谷渾也勢強十倍願更於諸道各發精卒成四五萬人則制勝之道必矣大曆九年三月戊申以皇女永樂公主許妻魏博節度使田承嗣之子華樂音洛妻七細翻嗣祥吏翻上意欲固結其心而承嗣益驕慢史言狼子野心不可以恩結大曆九年以章十二行本以上有戊午二字乙十一行本同退齊校同澧朗鎮遏使楊猷為洮州刺史隴右節度兵馬使澧音禮使疏吏翻洮土刀翻洮州時已陷吐蕃楊猷特領刺史耳大曆九年夏四月甲申郭子儀辭還邠州子儀自邠入朝今還還從宣翻又音如字考異曰唐曆作癸未今從實録復扶又翻為于僞翻下為己仍為同至涕泗交流大曆九年壬辰赦天下大曆九年五月丙午楊猷自澧州入朝是年正月已書楊猷離澧州沿江泝漢今方至京師朝直遙翻大曆九年涇原節度使馬璘入朝諷將士為己表求平章事璘離珍翻將即亮翻丙寅以璘為左僕射璘離珍翻大曆九年六月盧龍節度使朱泚遣弟滔奉表請入朝且請自將步騎五千防秋上許之泚且禮翻又音此將即亮翻又音如字騎奇寄翻大曆九年癸未興善寺胡僧不空卒贈開府儀同三司司空賜爵肅國公諡曰大辨正廣智不空三藏和尚釋典云佛在多羅奈最初為五人說契經修多羅藏佛在羅閲祗最初為須那提說毗眉藏佛在毗舍離獼猴池最初為跂耆說阿毗曇藏五百羅漢夜集阿毗曇相續解說經此為三藏學又三藏學經律論也卒子恤翻藏徂浪翻大曆九年京師旱京兆尹黎幹作土龍祈雨自與巫覡更舞覡刑狄翻更工衡翻彌月不雨又禱於文宣王上聞之命撤土龍減膳節用秋七月戊午雨大曆九年朱泚入朝至蔚州有疾蔚紆勿翻此自幽州西出山後取太原路入朝宋白曰蔚州西南至代州四百六十里諸將請還俟間而行待病間而行也將即亮翻間讀如字死則輿尸而前諸將不敢復言復扶又翻九月庚子至京師士民觀者如堵安史亂後河北諸帥阻兵不朝朱泚之來長安士民以為美事辛丑宴泚及將士於延英殿盧文紀曰上元以來置延英殿或宰相欲有奏對或天子欲有咨度皆非時召見程大昌曰高宗初創蓬萊宮諸門殿亭皆已立名至上元二年延英殿當御座生玉芝則是初有大明宮即有延英殿顧召對宰臣則始於代宗耳代宗以苗晉卿年老蹇甚聽入閣不趨為御延英此優禮也按六典宣政殿前西上閣門之西即為延英門延英門之左即延英殿故陽城欲救陸贄約拾遺王仲舒守延英殿上疏伏閣不去也近時未有大曆九年壬寅回紇亶出鴻臚寺白晝殺人紇下沒翻臚陵如翻有司擒之上釋不問大曆九年甲辰命郭子儀李抱玉馬璘朱泚分統諸道防秋之兵璘離珍翻泚且禮翻又音此大曆九年冬十月壬申信王瑝薨乙亥梁王璿薨二王皆玄宗子信以州為國名瑝戶盲翻又音皇璿似宣翻大曆九年魏博節度使田承嗣誘昭義將吏使作亂使疏吏翻嗣祥吏翻誘羊久翻將即亮翻十年十年春正月丁酉昭義兵馬使裴志清逐留後薛崿帥其衆歸承嗣帥讀曰率承嗣聲言救援引兵襲相州取之相息亮翻下同崿奔洺州洺音名上表請入朝許之上時掌翻朝直遙翻十年辛丑郭子儀入朝十年壬寅壽王瑁薨瑁亦玄宗子音莫報翻十年乙巳朱泚表請留闕下以弟滔知幽州盧龍留後許之十年昭義裨將薛擇為相州刺史薛雄為衛州刺史薛堅為洺州刺史皆薛嵩之族也相衛洺本皆昭義巡屬戊申上命內侍魏章十二行本魏作孫乙十一行本同下同退齊校同知古如魏州諭田承嗣使各守封疆承嗣不奉詔癸丑遣大將盧子期取洺州楊光朝攻衛州十年乙卯西川節度使崔寧奏破吐蕃數萬於西山吐從暾入聲捕虜數千人十年丙辰詔諸道兵有逃亡者非承制敕無得輒召募十年二月乙丑田承嗣誘衛州刺史薛雄雄不從使盜殺之屠其家盡據相衛四州之地相衛已陷於承嗣磁洺雖未下而承嗣已據其地相衛二州自此屬魏博掠其精兵良馬悉歸魏州逼魏知古與共巡磁相二州磁疾之翻使其將士割耳剺面剺力之翻請承嗣為帥帥所類翻下同十年辛未立皇子述為睦王逾為郴王連為恩王遘為鄜王郴丑林翻鄜芳無翻迅為隨王造為欣王暹為韶王運為嘉王遇為端王遹為循王遹余律翻通為恭王達為原王逸為雅王諸皇子皆以州為王國名十年丙子以華州刺史李承昭知昭義留後華戶化翻十年河陽三城使常休明河陽縣本屬懷州顯慶二年分屬河南府城臨大河長橋架水古稱設險此城後魏之北中城也東西魏兵爭又築中灘及南城謂之河陽三城乾元中史思明再陷東京李光弼以重兵守河陽及雍王平賊令魚朝恩守河陽乃以河南之河清濟源溫四縣租稅入河陽三城使河南尹但禮領其縣額尋又以汜水軍賦屬之使疏吏翻其軍士防秋者歸休明出城勞之少詩沼翻勞力到翻防秋兵與城內兵合謀攻之休明奔東都軍士奉兵馬使王惟恭為帥大掠數日乃定上命監軍冉庭蘭慰撫之監古銜翻十年三月甲午陝州軍亂逐兵馬使趙令珍陝失冉翻考異曰唐曆三月二十八日辛卯陝州軍亂實録唐統紀云甲午朔今從之觀察使李國清不能禁卑辭遍拜將士乃得脫去陝失冉翻將即亮翻軍士大掠庫物會淮西節度使李忠臣入朝過陜朝直遙翻過古禾翻上命忠臣按之將士畏忠臣兵威不敢動忠臣設棘圍令軍士匿名投庫物設棘四圍周之令投所掠庫物於其中獲萬緡盡以給其從兵為賞緡眉巾翻從才用翻十年乙巳薛崿常休明皆詣闕請罪上釋不問十年初成德節度使李寶臣淄青節度使李正己皆為田承嗣所輕使疏吏翻淄莊持翻嗣祥吏翻寶臣弟寶正娶承嗣女在魏州與承嗣子維擊毬馬驚誤觸維死承嗣怒囚寶正以告寶臣寶臣謝教敕不謹封杖授承嗣使撻之承嗣遂杖殺寶正由是兩鎮交惡及承嗣拒命寶臣正己皆上表請討之上時掌翻上亦欲因其隙討承嗣夏四月乙未敕貶承嗣為永州刺史永州漢零陵郡隋廢郡為永州若承嗣尚或稽違即令進討罪止承嗣及其姪悅自餘將士弟姪苟能自拔一切不問令力丁翻將即亮翻時朱滔方恭順與寶臣及河東節度使薛兼訓攻其北正己與淮西節度使李忠臣等攻其南五月乙未承嗣將霍榮國以磁州降磁州滏陽郡本漢廣平縣地隋廢郡於滏陽縣置磁州治滏陽本漢成安縣地將即亮翻降戶江翻下同磁牆之翻丁未李正己攻德州拔之德州自此屬平盧軍統他綜翻俗讀從上聲六月辛未田承嗣遣其將裴志清等攻冀州志清以其衆降李寶臣甲戌承嗣自將圍冀州寶臣使高陽軍使張孝忠將精騎四千禦之寶臣大軍繼至承嗣燒輜重而遁重直用翻冀州治信都縣將即亮翻又音如字騎奇寄翻高陽軍當置於瀛州高陽縣兵志橫海北平高陽等軍皆屬平盧道蓋安史之亂以兵授張孝忠統制而屬於李寶臣因授高陽軍使耳孝忠本奚也張孝忠奚人世為乙失活部酋長田承嗣以諸道兵四合部將多叛而懼秋八月遣使奉表請束身歸朝嗣祥吏翻將即亮翻使疏吏翻朝直遙翻十年辛巳郭子儀還邠州入朝而還所鎮還從宣翻又音如字邠卑旻翻考異曰汾陽家傳作丁丑今從實録不報僚佐相謂曰以令公勳德奏一屬吏而不從何宰相之不知體子儀聞之謂僚佐曰自兵興以來方鎮武臣多跋扈凡有所求朝廷常委曲從之此無他乃疑之也今子儀所奏事人主以其不可行而置之是不以武臣相待而親厚之也諸君可賀矣又何怪焉聞者皆服史言郭子儀忠純十年己丑田承嗣遣其將盧子期寇磁州將即亮翻磁牆之翻十年九月戊申回紇白晝刺市人腸出紇下沒翻刺七亦翻有司執之繫萬年獄其酋長赤心馳入縣獄酋才由翻長知兩翻斫傷獄吏劫囚而去上亦不問十年壬子吐蕃寇臨涇吐從暾入聲臨涇漢縣屬安定郡隋大業初改曰湫谷縣尋復曰臨涇縣唐屬涇州癸丑寇隴州及普潤大掠人畜而去百官往往遣家屬出城竄匿丙辰鳳翔節度使李抱玉奏破吐蕃於義寧隴州華亭縣大曆八年置義寧軍十年李寶臣正己會于棗強棗強縣前漢屬清河郡後漢省晉復置屬廣川郡魏隋以來屬冀州田承嗣出兵救之兩軍各饗士卒成德賞厚平盧賞薄既罷平盧士卒有怨言正己恐其為變引兵退寶臣亦退李忠臣聞之釋衛州南渡河屯陽武陽武縣屬鄭州本原武城武德四年置陽武縣北至衛州五十許里承嗣從父弟庭玠守之從才用翻寶臣不能克十年吐蕃寇涇州涇原節度使馬璘破之於百里城吐從暾入聲使疏吏翻璘離珍翻考異曰汾陽家傳九月吐蕃略潘原西而還八日至小石門白草川十八日下朝那川二十三日至里城營支磨原入華亭十月公遣渾瑊李懷光等與幽州義寧汴宋軍會于故平涼縣三日詰朝大破之今從實録戊午命盧龍節度使朱泚出鎮奉天行營泚且禮翻又音此十年冬十月辛酉朔日有食之十年盧子期攻磁州磁牆之翻考異曰舊李寶臣傳作攻邢州今從實録城幾陷幾居依翻李寶臣與昭義留後李承昭共救之大破子期于清水按新書田承嗣傳清水作臨水晉置臨水縣於滏口之右屬廣平郡後魏及隋屬魏郡唐初省永泰元年薛嵩表於臨水故城置昭義縣屬磁州斬之河南諸將又大破田悅於陳留陳留漢縣後魏廢隋開皇六年復置時屬汴州九域志在州東五十二里將即亮翻初李正己遣使至魏州承嗣囚之至是禮而遣之遣使盡籍境內戶口甲兵穀帛之數以與之曰承嗣今年八十有六嗣祥吏翻考異曰按承嗣卒時年七十五此云八十六者蓋欺正己溘死無日溘口答翻奄也莊子曰溘然而死謂奄然也諸子不肖悅亦孱弱孱士山翻凡今日所有為公守耳為于僞翻豈足以辱公之師旅乎立使者於庭南向拜而授書又圖正己之像焚香事之正己悅遂按兵不進於是河南諸道兵皆不敢進承嗣既無南顧之虞得專意北方上嘉李寶臣之功遣中使馬承倩齎詔勞之勞力到翻將還寶臣詣其館遺之百縑遺于季翻承倩詬詈擲出道中寶臣慙其左右為承倩詈辱顧見左右而自慚也詬許候翻又古候翻使疏吏翻說式芮翻下客說同今公在軍中新立功豎子尚爾況寇平之後以一幅詔書召歸闕下一匹夫耳不如釋承嗣以為己資寶臣遂有玩寇之志承嗣知范陽寶臣鄉里心常欲之寶臣本范陽內屬奚范陽將張瑣高畜為假子因冒其姓歸唐又賜姓李二帝同功勢萬全將田為侶入幽燕密令瘞寶臣境內讖楚譖翻瘞於計翻使望氣者言彼有王氣寶臣掘而得之又令客說之曰公與朱滔共取滄州得之則地歸國非公所有公能捨承嗣之罪請以滄州歸公仍願從公取范陽以自效公以精騎前驅承嗣以步卒繼之蔑不克矣令力丁翻說式芮翻騎奇寄翻寶臣喜謂事合符讖遂與承嗣通謀密圖范陽承嗣亦陳兵境上寶臣謂滔使者曰聞朱公儀貌如神願得畫像觀之滔與之寶臣置於射堂與諸將共觀之曰真神人也滔軍於瓦橋將即亮翻瓦橋古易京之地在莫州北三十里唐置瓦橋關宋白曰涿州歸義縣瓦子濟橋在涿州南易州東當九河之末舊置瓦橋關後周置雄州寶臣選精騎二千通夜馳三百里襲之戒曰取貌如射堂者時兩軍方睦滔不虞有變狼狽出戰而敗會衣他服得免衣於既翻寶臣欲乘勝取范陽滔使雄武軍使昌平劉怦守留府怦普耕翻寶臣知有備不敢進承嗣聞幽恆兵交即引軍南還嗣祥吏翻恆戶登翻還從宣翻又音如字使謂寶臣曰河內有警不暇從公石上讖文吾戲為之耳寶臣慙怒而退考異曰舊王武俊傳曰代宗嘉其功使中貴人馬承倩齎詔宣勞承倩將歸止傳舍寶臣親遺百縑承倩詬罵擲出道中王武俊勸玩養承嗣以為己資寶臣曰今與承嗣有釁矣可推腹心哉武俊曰勢同患均轉寇讎為父子咳唾間耳若傳虛言無益也今中貴人劉清談在驛斬首送承嗣承嗣立質妻孥矣寶臣曰吾不能如此武俊曰朱滔為國屯兵滄州請擒送承嗣以取信許之按承嗣方求解於寶臣何必擒滔以取信且承倩尚在傳舍武俊何不勸斬承倩而斬清談乎寶臣自以承嗣誘之共取幽州故襲朱滔非因承倩之辱也今從唐紀以張孝忠為易州刺史使將精騎七千以備之史言田承嗣凶狡過於諸帥宋白曰易州東至幽州二百一十四里將即亮翻又音如字騎奇寄翻十年丙寅貴獨孤氏薨丁卯追諡貞懿皇后諡神至翻十年十一月丁酉田承嗣將吳希光以瀛州降十年嶺南節度使路嗣恭擢流人孟瑤敬冕為將考異曰鄴侯家傳作敬俯今從舊傳瑤以大軍當其衝冕自間道輕入間古莧翻輕墟正翻丁未克廣州斬哥舒晃考異曰舊嗣恭傳曰嗣恭平廣州商舶之徒多因晃事誅之嗣恭前後沒其家財寶數百萬貫盡入私室不以貢獻代宗心甚銜之故嗣恭雖有平方面功止轉檢校兵部尚書無所酬勞建中實録曰自兵興以來諸軍殺將帥而要君者多矣皆因授其任以苟安之其王師征討不失有罪始斯役也既而有謗其收南海府庫閲上不實不得用久之按代宗以嗣恭附元載遺載琉璃盤惡之故不用耳事見鄴侯家傳或當時亦有人迎合以匿貨謗嗣恭不可知也今不取李肇國史補云路嗣恭初平五嶺元載奏言嗣恭多取南人金寶是欲為亂陛下不信試召必不入朝三伏中追詔至嗣恭不慮請待秋涼以修覲禮江西判官柳渾入雨泣曰公有功方暑而追是為執政所中今少遷延必族滅也嗣恭懼曰為之奈何渾曰健步追還表緘公今日過江宿石頭驛乃可從之代宗謂元載曰嗣恭不俟駕行矣載無以對按嗣恭素附元載載誅賴李泌營救得免事見鄴侯家傳載豈有譖嗣恭云欲為亂之理蓋載已被誅而召嗣恭適在三伏渾有此疑時人因以為渾美事耳今不取余按去年命路嗣恭為嶺南節度使討哥舒晃嗣恭既誅晃而平廣州則當在廣州柳渾若以江西判官從嗣恭亦當在廣州今諫嗣恭請奉詔就道乃言過江宿石頭驛石頭驛在豫章江之西岸嗣恭自江西觀察赴召可言宿石頭驛自嶺南節度赴召安得宿石頭驛哉亦可以明李肇之誤嗣恭之討晃也容管經略使王翃遣將將兵助之西原賊帥覃問乘虛襲容州姓譜梁有東寧州刺史覃元先則蠻中有覃姓尚矣十年十二月回紇千騎寇夏州考異曰此事出汾陽家傳實録新舊紀皆無之按實録明年二月加朔方戍兵以備回紇則是回紇嘗入寇也烏水在夏州朔方縣貞觀七年開延化渠引烏水入庫狄澤將即亮翻回紇遁去夏戶雅翻紇下沒翻十年元載王縉奏魏州鹽貴請禁鹽入其境以困之載祖亥翻又音如字縉音晉上不許曰承嗣負朕百姓何罪十年田承嗣請入朝李正己屢為之上表乞許其自新嗣祥吏翻朝直遙翻為于僞翻上時掌翻十一年十一年春正月壬辰遣諫議大夫杜亞使魏州宣慰使疏吏翻十一年辛亥西川節度使崔寧奏破吐蕃四節度及突厥吐谷渾氐羌㣥蠻衆二十餘萬斬首萬餘級吐從暾入聲厥九勿翻十一年二月庚辰田承嗣復遣使上表請入朝復扶又翻上乃下詔赦承嗣罪復其官爵聽與家屬入朝其所部拒朝命者一切不問十一年辛巳增朔方五城戍兵以備回紇朔方先統三受降城並振武豐安定遠為六城時三受降城屬振武軍使朔方統豐安定遠新昌豐寧保寧謂之塞下五城紇下沒翻十一年三月戊子河陽軍亂逐監軍冉庭蘭出城大掠三日庭蘭成備而入誅亂者數十人乃定監古銜翻十一年五月汴宋留後田神玉卒都虞候李靈曜殺兵馬使濮州刺史孟鑒北結田承嗣為援汴皮變翻卒子恤翻使疏吏翻濮博木翻嗣祥吏翻癸巳以永平節度使李勉兼汴宋等八州留後汴宋曹濮兗鄆徐泗八州濮博木翻乙未以靈曜為濮州刺史靈曜不受詔六月戊午以靈曜為汴宋留後遣使宣慰十一年秋九章十二行本九作七乙十一行本同孔本同張校同月田承嗣遣兵寇滑州敗李勉滑州永平節度治所敗補邁翻十一年吐蕃寇石門入長澤川長澤川後魏置闡熙郡隋廢郡為長澤縣屬夏州吐蕃寇原州遂北入夏州界也宋白曰長澤縣漢朔方郡三封縣之地三封故城赫連勃勃據之築為統萬城又按原州北有長澤監吐從暾入聲十一年八月丙寅加盧龍節度使朱泚同平章事考異曰實録閏八月己亥遣朱泚如奉天行營按去年已云泚出鎮奉天行營至此又云明年九月又云蓋泚每年往奉天防秋至春還京師但實録不載其入朝耳十一年李靈曜既為留後益驕慢悉以其黨為管內八州刺史縣令欲效河北諸鎮甲申詔淮西節度使李忠臣永平節度使李勉河陽三城使馬燧討之淮南節度使陳少遊淄青節度使李正己皆進兵擊靈曜汴宋兵馬使攝節度副使李僧惠少始照翻考異曰汾陽家傳作李思惠今從舊傳靈曜之謀主也宋州牙門將劉昌遣僧嚴僧改曾神表潛說僧惠僧惠召問計昌為之泣陳逆順將即亮翻說式芮翻為于僞翻僧惠乃與汴宋牙將高憑石隱金遣神表奉表詣京師請討靈曜九月壬戌以僧惠為宋州刺史憑為曹州刺史隱金為鄆州刺史乙丑李忠臣馬燧軍于鄭州汴皮變翻鄆音運靈曜引兵逆戰兩軍不意其至退軍滎澤隋分滎陽縣置滎澤縣唐屬鄭州九域志在州西北四十五里鄭州士民皆驚走入東都忠臣將歸淮西燧固執不可曰以順討逆何憂不克奈何自棄功名堅壁不動忠臣聞之稍收散卒數日皆集軍勢復振史言李忠臣因馬燧以成功復扶又翻戊辰李正己奏克鄆濮二州壬申李僧惠敗靈曜兵于雍丘濮博木翻敗補邁翻下敗永同冬十月李忠臣馬燧進擊靈曜忠臣行汴南燧行汴北屢破靈曜兵壬寅與陳少遊前軍合與靈曜大戰於汴州城西靈曜敗入城固守癸卯忠臣等圍之田承嗣遣田悅將兵救靈曜敗永平淄青兵於匡城少始照翻匡城漢長垣縣隋開皇十六年更名時屬滑州乘勝進軍汴州章十二行本州下有乙巳二字乙十一行本同張校同云無注本亦無營於城北數里丙午忠臣遣裨將李重倩將輕騎數百夜入其營縱橫貫穿縱子容翻穿尺絹翻斬數十人而還還從宣翻又如字營中大駭忠臣燧因以大軍乘之鼓譟而入悅衆不戰而潰悅脫身北走將士死者相枕藉不可勝數譟則竈翻枕職任翻藉慈夜翻勝音升開門夜遁汴州平重倩本奚也丁未靈曜至韋城隋分白馬縣置韋城縣於古韋國之墟故曰韋城時屬滑州九域志韋城縣在滑州東南五十里燧知忠臣暴戾以己功讓之不入汴城將即亮翻汴皮變翻引軍西屯板橋忠臣入城果專其功宋州刺史李僧惠與之爭功忠臣因會擊殺之又欲殺劉昌昌遁逃得免甲寅李勉械送李靈曜至京師斬之十一年十二月丁亥李正己李寶臣並加同平章事十一年涇原節度使馬璘疾亟以行軍司馬段秀實知節度事付以後事秀實嚴兵以備非常丙申璘薨使疏吏翻璘離珍翻考異曰實録庚寅璘薨段公別傳曰十二月十三日景申馬公薨十二年正月八日奉制除涇州刺史知節度事實録又云丁酉以段秀實知河東留後按時馬璘新薨秀實涇原留後備禦吐蕃豈可輟之使攝河東蓋奏報未至有斯命尋聞璘薨遂除涇原耳亟紀力翻軍中奔哭者數千人喧咽門屏秀實悉不聽入命押牙馬頔治喪事於內頔徒歷翻治直之翻李漢惠接賓客於外妻妾子孫位於堂宗族位於庭將佐位於前牙士卒哭於營伍百姓各守其家有離立偶語於衢路輒執而囚之記曲禮曰離立者不出中間注云離兩也致祭拜哭皆有儀節送喪近遠皆有定處違者以軍法從事都虞候史廷幹兵馬使崔珍十將張景華謀因喪作亂秀實知之奏廷幹入宿衛徙珍屯靈臺補景華外職不戮一人軍府晏然自高仙芝喪師於大食段秀實始見於史其後責李嗣業不赴難滏水之潰保河清以濟歸師在邠州誅郭晞暴橫之卒與馬璘議論不阿及治喪曲防周慮以安軍府最後笏擊朱泚以身徇國其事業風節卓然表出於唐諸將中璘家富有無算治第京師甲於勳貴以功勳致貴顯故曰勳貴治直之翻他室所減無幾幾居豈翻其子孫無行行下孟翻家資尋盡史言殖貨無厭者適以為不肖子孫之資十一年戊戌昭義節度使李承昭表稱疾篤以澤潞行軍司馬李抱真兼知磁邢兩州留後使疏吏翻磁牆之翻十一年庚戌加淮西節度使李忠臣同平章事仍領汴州刺史治汴州李忠臣破李靈曜得汴州即以與之汴皮變翻十二年十二年春三月乙卯兵部尚書同平章事鳳翔懷澤潞秦隴節度使李抱玉薨尚辰羊翻弟抱真仍領懷澤潞留後十二年癸亥以河東行軍司馬鮑防為河東節度使防襄州人也十二年田承嗣竟不入朝又助李靈曜上復命討之承嗣乃復上表謝罪嗣祥吏翻朝直遙翻復扶又翻上時掌翻上亦無如之何庚午悉復承嗣官爵仍令不必入朝令力丁翻十二年中書侍郎同平章事元載專橫載祖亥翻又音如字橫戶孟翻黃門侍郎同平章事王縉附之二人俱貪載妻王氏載妻王忠嗣之女縉音晉縉弟妹及尼出入者爭納賄賂尼女夷翻又以政事委㣥吏士之求進者不結其子弟及主書卓英倩等無由自達上含容纍年載縉不悛悛丑緣翻上欲誅之恐左右漏泄無可與言者獨與左金吾大將軍吳湊謀之湊上之舅也吳湊章敬皇后弟也庚辰上御延英殿命湊收載縉於政事堂政事堂在東省屬門下自中宗後徙堂於中書省則堂在右省也按裴炎傳故事宰相於門下省議事謂之政事堂故長孫無忌為司空房玄齡為僕射魏徵為太子太師皆知門下省事至中宗時裴炎為中書令執政事筆故徙政事堂於中書省載祖亥翻又音如字縉音晉命吏部尚書劉晏與御史大夫李涵等同鞫之尚辰羊翻問端皆出禁中問端猶今言問頭也載縉皆伏罪使疏吏翻詰去吉翻是日先杖殺左衛將軍知內侍省事董秀於禁中乃賜載自盡於萬年縣載請主者願得快死主者曰相公須受少汚辱相息亮翻少詩沼翻勿怪乃脫穢襪塞其口而殺之襪勿伐翻足衣塞悉則翻王縉初亦賜自盡劉晏謂李涵等曰故事重刑覆奏況大臣乎且法有首從首謂罪首從謂從坐從才用翻涵等從之上乃貶縉栝州刺史宋白曰栝州晉為永嘉郡隋改處州尋為栝州因栝蒼山為名劉昫曰京師東南四千二百七十八里忠嗣之女也及子伯和仲武季能皆伏誅有司籍載家財胡椒至八百石嗣祥吏翻本草曰胡椒生西戎形如鼠李子調食用之味甚辛辣徐表南中記曰生南海諸國他物稱是稱尺證翻十二年夏四月壬午以太常卿楊綰為中書侍郎禮部侍郎常袞為門下侍郎並同平章事綰性清儉簡素制下之日朝野相賀郭子儀方宴客聞之減坐中聲樂五分之四朝直遙翻坐徂臥翻京兆尹黎幹騶從甚盛騶仄尤翻從才用翻即日省之止存十騎中丞崔寬第舍宏侈亟毀撤之十二年癸未貶吏部侍郎楊炎諫議大夫韓洄包佶佶巨乙翻起居舍人韓會等章十二行本等下有十餘人三字乙十一行本同退齊校同皆載黨也炎鳳翔人載常引有文學才望者一人親厚之異日欲以代己故炎及於貶載祖亥翻又音如字洄滉之弟會南陽人也上初欲盡誅炎等吳湊諫救百端始貶官十二年丁酉吐蕃寇黎雅州武后大足元年以雅州之漢源飛越巂州之陽山置黎州吐從暾入聲十二年元載以仕進者多樂京師惡其逼己樂音洛惡烏路翻乃制俸祿厚外官而薄京官京官不能自給常從外官乞貸楊綰常袞奏京官俸太薄貸他代翻又土得翻俸扶用翻己酉詔加京官俸歲約十五萬六千餘緡唐會要開元二十四年敕百官料錢宜合為一色都以月俸為名各據本官隨月給付一品三十千二品二十四千三品十七千四品十一千五品九千二百六品五千三百七品四千五十八品二千四百七十五九品一千九百一十七至大曆十二年加京官俸三師三公侍中中書令每月各一百二十貫文中書門下侍郎月各一百貫文東宮三太左右僕射各八十貫文東宮三少各七十貫文尚書御史大夫太常卿各六十貫文常侍宗正卿太子詹事國子祭酒各五十貫文左右丞及諸司侍郎給舍中丞賓客殿中祕書監司農等卿將作等監各四十五貫文太子二庶子太常少卿各四十貫文諫議諸司少卿少監各三十五貫文國子司業內侍東宮三卿各三十貫文郎中侍御史司天監少詹事諸王傅國子博士諭德中允中舍殿中祕書太常宗正丞各二十五貫文殿中侍御史著作郎大理正都水使者總監內常侍內給事各二十貫文員外郎通事舍人起居王府長史各十八貫文監察御史臺主簿補闕王府司馬司天少監太子典內太常博士主簿宗正主簿門下録事中書主書各十五貫文拾遺司議太子文學祕書著作佐郎國子太學四門廣文博士大理司直詹事府丞及諸寺監丞謁者監中書門下主事各十二貫文洗馬贊善諸寺監主簿詹事府司直各十貫文評事八貫文諸校正各六貫文諸奉御九成總監諸王咨議友諸陵令各六貫二百文城門符寶國子助教六局郎王府掾屬太常侍醫文學録事參軍主簿記室諸衛及六軍長史兩市令諸副總監武庫署令太公廟令各五貫三百文太子通事舍人東宮三寺丞太學廣文助教內坊丞諸直長內寺伯千牛衛及諸率府長史諸陵丞諸陵署諸王府判司司竹溫泉監尚書都事都水及諸總監丞司天臺丞太子侍醫諸司上局署令王府國令苑四面副監公主邑司令各四貫一百一十六文國子四門助教律醫學博士協律郎內謁者諸衛六軍左右衛率府等衛佐諸王府參軍大農都省兵吏禮房考功主事春坊録事司竹副監諸司中局署令都水主簿諸司上局署及監廟司丞司天臺靈臺郎保章挈壺正太常針醫及醫監尚醫局司醫各二貫四百七十文太祝奉禮省中諸行主事門下典儀御史臺殿中祕書內侍省春坊詹事府主事諸寺監諸衛六軍諸司録事諸司中局署丞及大理獄丞諸司監作監事諸率府録事殿中省醫佐食醫奉輦司庫司廩奉乘鴻臚寺掌客司儀太僕主乘內坊典直司天臺司辰司曆監內侍省宮教博士東宮三寺主簿太常太樂鼓吹丞醫正按摩呪禁卜筮博士及針醫卜助教國子書算博士及助教諸王府國丞尉諸總監主簿各一貫九百一十七文武官左右金吾大將軍各四十五貫文六軍大將軍左右金吾將軍各四十貫文諸衛大將軍六軍將軍各三十貫文諸衛將軍各二十五貫文諸衛及六軍中郎將諸率府率副率各一十貫五百六十七文諸衛及六軍郎將諸王府典軍副各九貫二百文諸衛及六軍司陛千牛及左右備身各五貫三百文諸衛及六軍中候太子千牛各四貫一百六十六文諸衛及六軍司戈太子備身各二貫四百七十五文諸衛及六軍執戟及長上各一貫九百一十七文京兆及諸府尹各八十貫文少尹兩縣令各五十貫文奉先昭應醴泉等縣令司録各四十五貫文畿令各四十貫文判司兩縣丞各三十五貫文兩縣簿尉奉先等縣丞各三十貫文奉先縣簿尉諸畿令各二十五貫文畿簿尉各二十貫文參軍文學博士録事各一十貫文應給百司正員文武官月料錢外檢校官同中書門下平章事每月一百二十貫文內侍省監每月四十五貫文每年約加一十五萬六千貫文五月辛亥詔自都團練使外悉罷諸州團練守捉使又令諸使非軍事要急無得亶召刺史及停其職務差人權攝又定諸州兵皆有常數其召募給家糧春冬衣者謂之官健差點土人春夏歸農秋冬追集給身糧醬菜者謂之團結自兵興以來州縣官俸給不一重以元載王縉隨情徇私俸扶用翻重直用翻載祖亥翻又音如字縉音晉刺史月給或至千緡或數十緡至是始定節度使以下至主簿尉俸祿緡眉巾翻使疏吏翻自是年定俸之後至于會昌則又倍之節度使三十萬都防禦使副使監軍十五萬觀察使十萬諸府尹大都督府長史都團練使副使上州刺史八萬節度副使中下州刺史知軍事七萬上州別駕五萬五千長史司馬五萬觀察團練判官掌書記五萬諸大都督府司録參軍事鴘赤縣令四萬五千節度推官支使防禦判官上州録事參軍畿縣上縣令四萬諸大都督府判官赤縣丞三萬五千觀察防禦團練推官巡官鴘赤縣丞兩赤縣主簿尉上州功曹參軍以下上縣丞三萬畿縣丞鴘赤縣簿尉二萬五千畿縣上縣主簿尉二萬由會昌以前其間世有增減不可詳也按類篇鴘翻阮切鷹二歲色新地理志唐京兆有赤縣次赤縣諸負郭亦皆為次赤縣鴘赤字義不可曉蓋次赤也掊多益寡上下有敍法制粗立粗坐五翻十二年庚午上遣中使發元載祖父墓斫棺棄尸毀其家廟焚其木主戊寅卓英倩等皆杖死英倩之用事也弟英璘橫於鄉里璘離珍翻橫戶孟翻及英倩下獄下戶嫁翻英璘遂據險作亂上發禁兵討之乙巳金州刺史孫道平擊擒之十二年上方倚楊綰使釐革弊政會綰有疾秋七月己巳薨上痛悼之甚謂㣥臣曰天不欲朕致太平何奪朕楊綰之速十二年八月癸未賜東川節度使鮮于叔明姓李氏使疏吏翻十二年元載王縉之為相也上日賜以內廚御饌可食十人饌雛戀翻又雛晥翻食祥吏翻遂為故事癸卯常袞與朱泚上言餐錢已多餐錢蓋所謂食料錢也泚直禮翻又音此上時掌翻許之袞又欲辭堂封同列不可而止唐制堂封歲三千六百縑興元後才千一百德宗尋復舊以為朝廷厚祿所以養賢不能當辭位不當辭祿朝直遙翻臣光曰君子恥食浮於人袞之辭祿廉恥存焉與夫固位貪祿者不猶愈乎夫音扶詩云彼君子兮不素餐兮詩伐檀之辭亦未可以深譏也十二年楊綰常袞薦湖州刺史顏真卿大曆元年真卿以攻元載貶峽州別駕尋改為吉州司馬遷撫湖二州刺史還從宣翻又音如字甲辰以為刑部尚書尚辰羊翻綰袞又薦淮南判官汲人關播擢為都官員外郎唐都官郎掌配役隸簿録俘囚以給衣糧藥療以理訴競雪冤凡公私良賤必周知之屬刑部十二年九月辛酉以四鎮北庭行營兼涇原鄭潁節度副使段秀實為節度使考異曰段公別傳曰自授鉞三五年間西鄰無烽燧之警又曰戎帥論乞力陀慕公清德不敢侵陵我疆舊傳亦曰三四年間吐蕃不敢犯塞按是月吐蕃寇原州十二月朱泚拒吐蕃自涇州還明年九月吐蕃逼涇州云三四年間不敢犯塞蓋史家溢美之辭耳有威惠奉身清儉室無姬妾非公會未嘗飲酒聽樂十二年吐蕃八萬衆軍於原州北長澤監蓋長澤川唐舊置馬監於此吐從暾入聲下同己巳破方渠方渠漢縣屬北地郡後省中宗神龍三年分馬嶺置方渠縣屬慶州宋白續通典靈州方渠鎮宋初置通遠軍秦長城在城北一里郭子儀使裨將李懷光救之吐蕃退庚午吐蕃寇坊州十二年冬十月乙酉西川節度使崔寧奏大破吐蕃於望漢城吐蕃築城於西山以望蜀因名望漢城使疏吏翻十二年先是秋霖河中府池鹽多敗河中府管下安邑解縣皆有鹽池先悉薦翻丁亥奏雨雖多不害鹽仍有瑞鹽生度徒洛翻滉呼廣翻宋白曰大曆初韓滉進漫生鹽以為靈瑞後又奏乳鹽生上疑其不然遣諫議大夫義興蔣鎮往視之義興漢陽羡縣地晉置義興郡及縣隋廢郡存縣以屬常州十二年吐蕃寇鹽夏州又寇長武邠州宜祿縣有長武城時郭子儀遣李懷光築長武城據原首臨涇水俯瞰通道吐蕃自是不敢輕犯宋白曰長武鎮在鳳翔府麟遊縣界西至涇州四十里夏戶雅翻將即亮翻十二年以永平軍押牙匡城劉洽為宋州刺史考異曰舊劉玄佐傳云李靈曜據汴州洽將兵乘其無備徑入宋州按劉昌以宋州牙門將說李僧惠歸順則是僧惠先已為靈曜守宋州朝廷因授宋州刺史耳若僧惠未降則洽不能得宋州已降則不敢取宋州蓋僧惠已為李忠臣所殺洽因引兵據宋州耳舊傳欲以為洽功故云然其實非也永平軍治滑州十二年京兆尹黎幹奏秋霖損稼韓滉奏幹不實上命御史按視丁未還奏所損凡三萬餘頃渭南令劉澡渭南縣唐初屬華州時屬雍州宋白曰郭緣生述征記云渭南縣夷狄所置謂苻姚也謂阿附韓滉度徒洛翻御史趙計奏與澡同上曰霖雨溥博豈得渭南獨無更命御史朱敖視之損三千餘頃上歎息久之曰縣令字人之官不損猶應言損乃不仁如是乎貶澡南浦尉後魏分胊䏰縣置漁泉縣後周改曰萬川隋改曰南浦唐帶萬州而不問滉澧音禮滉呼廣翻十二年十一月壬子山南西道節度使張獻恭奏破吐蕃萬餘衆於岷州使疏吏翻吐從暾入聲十二年丙辰蔣鎮還奏言瑞鹽實如韓滉所言仍上表賀還從宣翻又音如字上時掌翻請宣付史臣章十二行本臣下有並置神祠四字乙十一行本同退齊校同錫以嘉名上從之賜號寶應靈應池賜號者安邑池也十二年十二月丙戌朱泚自涇州還京師朱泚自幽州入朝遂留京師因遣防秋而還還從宣翻又音如字十二年丁亥崔寧奏破吐蕃十餘萬衆斬首八千餘級吐從暾入聲十二年庚子以朱泚兼隴右節度使知河西澤潞行營十二年平盧節度使李正己先有淄青齊海登萊沂密德棣十州之地及李靈曜之亂諸道合兵攻之所得之地各為己有正己又得曹濮徐兗鄆五州因自青州徙治鄆州使其子前淄州刺史納守青州章十二行本州下有癸卯以納為青州刺史九字乙十一行本同退齊校同張校同云無注本亦無濮博木翻鄆音運考異曰實録此年二月丙戌以納為青州刺史充淄青留後至此又云為青州刺史舊正己傳云正己自青州徙居鄆州使子納及腹心之將分理其地納傳云正己擊田承嗣署奏留後尋遷青州刺史今從之正己用刑嚴峻所在不敢偶語然法令齊一賦均而輕擁兵十萬雄據東方鄰藩皆畏之是時田承嗣據魏博相衛洺貝澶七州澶州漢東郡頓丘縣地隋開皇十六年分頓丘置澶淵縣唐改曰澶水避高祖諱也武德四年分黎州之澶水魏州之頓丘觀州置澶州貞觀元年州廢大曆七年田承嗣表以魏州之頓丘臨黃復置澶州嗣祥吏翻相息亮翻洺音名澶時連翻各擁衆五萬梁崇義據襄鄧均房復郢六州有衆二萬相與根據蟠結雖奉事朝廷而不用其法令恆戶登翻朝直遙翻官爵甲兵租賦刑殺皆自專之上寬仁一聽其所為朝廷或完一城增一兵輒有怨言以為猜二常為之罷役為于僞翻而自於境內築壘繕兵無虛日以是雖在中國名藩臣而實如蠻貊異域焉十三年十三年春正月辛酉敕毀白渠支流碾磑以溉田碾尼展翻磑五對翻磨也公輸班作磑後人又激水為之不煩人力引水激輪使自旋轉謂之水磨史照曰碾磨也磑䃺也升平公主有二磑入見於上請存之見賢遍翻上曰吾欲以利蒼生汝識吾意當為衆先公主即日毀之十三年戊辰回紇寇太原河東押牙泗水李自良曰紇下沒翻唐節度使置都押牙牙前重職也即今制置使司帳前都提舉之職泗水縣屬兗州漢之卞縣也隋時分西界為汶陽縣於卞縣古城置泗水縣回紇精鋭遠來求鬬難與爭鋒不如築二壘於歸路以兵戍之虜至堅壁勿與戰彼師老自歸乃出軍乘之二壘抗其前大軍蹙其後無不捷矣留後鮑防不從遣大將焦伯瑜等逆戰癸酉遇虜於陽曲將即亮翻宋白曰陽曲漢舊縣後漢末移於太原北四十五里後魏南移於陽曲古城隋改曰陽直又移於汾陽故城改曰汾陽縣因漢汾陽縣名也煬帝又改陽直移理木井城今縣是也大敗而還死者萬餘人回紇縱兵大掠二月代州都督張光晟擊破之於羊武谷還從宣翻又音如字紇下沒翻晟成正翻九域志代州崞縣有陽武寨乃引去上亦不問回紇入寇之故待之如初十三年己亥吐蕃遣其將馬重英帥衆四萬寇靈州吐從暾入聲帥讀曰率史照曰三渠謂填漢渠御史渠尚書渠也填讀曰鎮十三年三月甲戌回紇使還過河中朔方軍士掠其輜重朔方軍士之留屯河中者使疏吏翻過古禾翻又古臥翻輜莊持翻重直用翻十三年夏四月甲辰吐蕃寇靈州朔方留後常謙光擊破之十三年六月戊戌隴右節度使朱泚獻猫鼠同乳不相害者以為瑞泚且禮翻又音此乳如住翻常袞帥百官稱賀帥讀曰率中書舍人崔祐甫獨不賀曰物反常為妖猫捕鼠乃其職也今同乳妖也妖於驕翻何乃賀為宜戒法吏之不察奸邊吏之不禦寇者以承天意上嘉之祐甫沔之子也崔沔開元名臣沔彌兗翻七月章十二行本月下有壬子二字乙十一行本同以祐甫知吏部選事祐甫數以公事與常袞爭由是惡之為袞奏貶祐甫張本選須絹翻數所角翻惡烏路翻十三年戊午郭子儀奏以回紇猶在塞上邊人恐懼請遣邠州刺史渾瑊將兵鎮振武軍邠卑旻翻瑊古咸翻將即亮翻又音如字振武軍在單于都護府城內秦漢之雲中郡城也宋白曰振武軍即漢定襄郡之盛樂縣也在陰山之陽黃河之北從之回紇始去十三年辛未吐蕃將馬重英二萬衆寇鹽慶二州重直龍翻郭子儀遣朔章十二行本朔上有河東二字乙十一行本同方都虞候李懷光擊卻之十三年八月乙亥成德節度使李寶臣請復姓張許之寶臣賜姓見二百二十二卷寶應元年使疏吏翻十三年吐蕃二萬衆寇銀麟州略党項雜畜吐從暾入聲銀州漢西河郡圁陰縣地麟州漢新秦中之地党底朗翻畜許救翻十三年上悼念貞懿皇后不已貞懿皇后獨孤也十年薨纍年不忍葬丁酉始葬于莊陵莊陵在京兆三原縣西北五里十三年九月庚午吐蕃萬騎下青石嶺逼涇州青石嶺在涇州保定縣西宋白曰臨涇城直涇州西北九十里其界有青石嶺騎奇寄翻十三年冬十二月丙戌以吏部尚書轉運鹽鐵等使劉晏為左僕射知三銓及使職如故尚辰羊翻射寅謝翻歐陽修曰凡選有文武文選吏部主之武選兵部主之皆為三銓尚書侍郎分主之尚書掌其一侍郎分其二十三年郭子儀入朝命判官京兆杜黃裳主留務李懷光陰謀代子儀矯為詔書欲誅大將溫儒雅等黃裳察其詐以詰懷光朝直遙翻將即亮翻詰去吉翻懷光流汗服罪於是諸將之難制者黃裳矯子儀之命皆出之於外軍府乃安十三年以給事中杜亞為江西觀察使十三年上召江西判官李泌入見泌毗必翻李泌出佐江西見上卷五年見賢遍翻語以元載事曰與卿別八年乃能誅此賊賴太子發其陰謀此歸功於太子耳語牛倨翻幾不見卿對曰臣昔日固嘗言之陛下知㣥臣有不善則去之幾居依翻去羌呂翻含容太過故至於此上曰事亦應十全不可輕發上因言朕面屬卿於路嗣恭屬之欲翻而嗣恭取載意奏卿為虔州別駕嗣恭初平嶺南獻琉璃盤徑九寸朕以為至寶及破載家得嗣恭所遺載琉璃盤徑尺遺于季翻程大昌曰漢西域傳罽賓國有琥珀流離師古注曰魏略云大秦國出赤白黑黃青緑縹紺紅紫十種流離此蓋自然之物采澤光潤踰於衆玉今俗所用皆消冶石汁加以衆藥灌而為之虛脆不耐實非真物按流離今書附玉旁為琉璃字師古之記是矣亦未得其詳也穆天子傳天子東征有采石之山凡好石之器于是出升山取采石鑄以成器注云采石文采之石也則鑄石為器古有之矣顏氏謂為自然之物恐不詳也北史大月氏傳魏太武時月氏人商販京師自云能鑄石為五色琉璃於是采礦於山中即京師鑄之既成光澤乃美於西方來者自是琉璃遂賤用此言推之則雖西域琉璃亦用石鑄無自然生成者兼外國奇産中國未始無之獨不聞有所謂真琉璃也然中國所鑄有與西域異者鑄之中國色甚光鮮而質則輕脆沃以熱酒隨手破裂其來自海舶者製差鈍朴而色亦微暗其可異者雖百沸湯注之與磁銀無異了不復動是名蕃琉璃也蕃琉璃之異於中國其別蓋如此而未嘗聞以石琢之也余謂路嗣恭所獻者蓋師古所謂大秦琉璃自然之物否則代宗何以謂之至寶哉程大昌考之不詳耳俟其至當與卿議之泌曰嗣恭為人小心善事人畏權勢精勤吏事而不知大體昔為縣令有能名路嗣恭始名劍客為蕭關令連徙神烏姑臧二縣考績為天下最玄宗以為可嗣漢魯恭因賜名而為載所用故為之盡力陛下誠知而用之彼亦為陛下盡力矣為之亦為于僞翻虔州別駕臣自欲之非其罪也且嗣恭新立大功即謂平嶺南之功上意乃解以嗣恭為兵部尚書邪音耶尚辰羊翻十三年郭子儀以朔方節度副使張曇性剛率謂其以武人輕己銜之曇徒含翻銜戶緘翻孔目官吳曜為子儀所任諸鎮州皆有孔目官以綜理衆事吏職也言一孔一目皆所綜理也子儀怒誣奏曇扇動軍衆誅之掌書記高郢力爭之子儀不聽奏貶郢猗氏丞猗氏縣屬河中府宋白曰本郇國地猗頓於此起富故曰猗氏子儀悔之悉薦之於朝曰吳曜誤我遂逐之史言郭子儀過而能改朝直遙翻十三年常袞言於上曰陛下久欲用李泌泌毗必翻昔漢宣帝欲用人為公卿必先試理人請且以為刺史使周知人間利病俟報政而用之太公治齊五月而報政伯禽治魯三年而報政常袞用此語也十四年十四年春正月壬戌以李泌為澧州刺史澧音禮十四年二月癸未魏博節度使田承嗣薨使疏吏翻嗣祥吏翻有子十一人以其姪中軍兵馬使悅為才使知軍事而諸子佐之甲申以悅為魏博留後為田緒殺悅張本十四年淮西節度使李忠臣貪殘好色將吏妻女美者多逼淫之悉以軍政委妹壻節度副使張惠光惠光挾勢暴橫軍州苦之忠臣復以惠光子為牙將暴橫甚於其父好呼到翻橫戶孟翻復扶又翻將即亮翻左廂都虞候李希烈忠臣之族子也為衆所服希烈因衆心怨怒三月丁未與大將丁皓等皓古老翻殺惠光父子而逐忠臣忠臣單騎奔京師騎奇寄翻上以其有功吐蕃寇京師忠臣先諸鎮赴援又有平李靈曜之功以希烈為蔡州刺史淮西留後為李希烈以淮蔡畔援張本增領汴潁二州徙鎮汴州永平軍本治滑州汴皮變翻十四年辛酉以容管經略使王翃為河中少尹知府事河東副元帥留後部將凌正暴橫翃抑之使疏吏翻翃戶萌翻少始照翻帥所類翻將即亮翻橫戶孟翻正與其徒乘夜作亂翃知之故縮漏水數刻以差其期賊驚潰走擒正誅之軍府乃安十四年成德節度使張寶臣既請復姓去年寶臣請復姓張更請賜姓夏四月癸未復賜姓李復扶又翻十四年五月癸卯上始有疾辛酉制皇太子監國監古銜翻是夕上崩于紫宸之內殿上年五十二紫宸殿在東內宣政殿之北蓬萊殿之南癸亥德宗即位在諒陰中動遵禮法嘗召韓王迥食迥德宗弟也不設鹽酪馬齒莧也酪音洛乳酪也十四年常袞性剛急為政苛細不合衆心時㣥臣朝夕臨臨力鴆翻哭也袞哭委頓從吏或扶之從才用翻中書舍人崔祐甫指以示衆曰臣哭君前有扶禮乎袞聞益恨之會議㣥臣喪服袞以為禮臣為君斬衰三年為于僞翻衰倉回翻漢文權制猶三十六日事見十五卷前漢文帝後七年皆遵漢制及玄宗肅宗之喪始服二十七日今遺詔云天下吏人三日釋服古者卿大夫從君而服皇帝二十七日而除在朝㣥臣亦當如之祐甫以為遺詔無朝臣庶人之別朝直遙翻下同別彼列翻朝野內外莫非天下凡百執事孰非吏人皆應章十二行本應下有三日二字乙十一行本同退齊校同釋服相與力爭聲色陵厲袞不能堪乃奏祐甫率情變禮請貶潮州刺史上以為太重閏月壬申貶祐甫為河南少尹初肅宗之世天下務殷宰相常有數人更直決事更工衡翻或休沐各歸私第詔直事者代署其名而奏之自是踵為故事時郭子儀朱泚雖以軍功為宰相皆不預朝政袞獨居政事堂唐初政事堂在門下省裴炎自侍中遷中書令乃徙政事堂於中書省三省長官議事於此祐甫既貶二人表言其非罪上問卿向言可貶今云非罪何也二人對初不知上初即位以袞為欺罔大駭甲辰百官衰絰序立于月華門程大昌曰按六典宣政殿前有兩廡兩廡各自有門其東曰日華日華之東則門下省也西廊有門曰月華月華之西則中書省也衰倉回翻貶袞為潮州刺史潮州去京師五千許里聞者震悚祐甫至昭應而還昭應縣本新豐縣垂拱二年改曰應山神龍元年復故名玄宗更名昭應隋新豐治古新豐城北天寶昭應縣治昭應宮北還從宣翻又音如字上時居諒陰庶政皆委於祐甫所言無不允初至德以後天下用兵諸將競論功賞故官爵不能無濫及永泰以來天下稍平而元載王縉秉政四方以賄求官者相屬於門將即亮翻論魯昆翻載祖亥翻又音如字縉音晉屬之欲翻大者出於載縉小者出於卓英倩等皆如所欲而去及常袞為相思革其弊杜絶僥幸四方奏請一切不與而無所甄別賢愚同滯相息亮翻僥堅堯翻甄稽延翻察也別彼列翻崔祐甫代之欲收時望推薦引拔常無虛日作相未二百日除官八百人考異曰舊紀云祐甫作相未逾年凡除吏幾八百員多稱允當今從建中實録終不得其適上嘗謂祐甫曰人或謗卿所用多涉親故何也對曰臣為陛下選擇百官為于僞翻不敢不詳慎苟平生未之識何以諳其才行而用之諳烏含翻行下孟翻下同上以為然臣光曰臣聞用人者無親疏新故之殊惟賢不肖之為察其人未必賢也以親故而取之固非公也苟賢矣以親故而捨之亦非公也夫天下之賢固非一人所能盡也若必待素識熟其才行而用之所遺亦多矣夫音扶行下孟翻古之為相者則不然舉之以衆取之以公衆曰賢矣己雖不知其詳姑用之待其無功然後退之有功則進之所舉得其人則賞之非其人則罰之進退賞罰皆衆人所共然也己不置豪髮之私於其間苟推是心以行之又何遺賢曠官之足病哉十四年詔罷省四方貢獻之不急者又罷梨園使及樂工三百餘人使疏吏翻梨園事始二百一十一卷玄宗開元二年程大昌曰梨園在光化門北光化門者禁苑南面西頭第一門所留者悉隸太常十四年郭子儀以司徒中書令領河中尹靈州大都督單于鎮北大都護關內河東副元帥朔方節度關內支度鹽池六城水運大使押蕃部並營田及河陽道觀察等使河中靈夏皆有鹽池朔方塞下有六城單音蟬帥所類翻使疏吏翻功名復大復扶又翻性寬大政令頗不肅代宗欲分其權而難之久不決甲申詔尊子儀為尚父太公望為周師尚父說者謂可尚可父天子師也增實封滿二千戶月給千五百人糧二百馬食子弟諸壻遷官者十餘人所領副元帥諸使悉罷之以其裨將河東朔方都虞候李懷光為河中尹邠寧慶晉絳慈隰節度使以朔方留後兼靈州長史常謙光為靈州大都督西受降城定遠天德鹽夏豐等軍州節度使振武軍使渾瑊為單于大都護東中二受降城振武鎮北綏銀麟勝等軍州節度使分領其任將即亮翻邠卑旻翻長知兩翻降戶江翻夏戶雅翻渾戶昆翻又戶本翻瑊古咸翻十四年丙戌詔曰澤州刺史李鷃鷃烏諫翻上慶雲圖上時掌翻下得上上言同朕以時和年豐為嘉祥以進賢顯忠為良瑞如卿雲靈芝珍禽奇獸怪草異木何益於人卿雲即慶雲也自今有此無得上獻內莊宅使上言諸州有官租萬四千餘斛上令分給所在充軍儲先是諸國屢獻馴象凡四十有二令力丁翻先悉薦翻上曰象費豢養而違物性將安用之命縱於荊山之陽此禹貢所謂導及岐至于荊山者也唐屬京兆富平縣界悉縱之貀似豹無前足音女滑翻史照曰貀似狸蒼黑無前足善捕鼠又出宮女數百人於是中外皆悅淄青軍士至投兵相顧曰明主出矣吾屬猶反乎淄莊持翻十四年戊子以淮西留後李希烈為節度使使疏吏翻十四年辛卯以河陽鎮遏使馬燧為河東節度使河東承百井之敗謂去年鮑防之敗也按東都事略張齊賢傳柏井在並州城北四十里宋朝徙並州城於陽曲縣燧悉召牧馬廝役得數千人教之數月皆為精騎騎奇寄翻造甲必為長短三等稱其所衣稱尺證翻衣於既翻以便進趨又造戰車行則載兵甲止則為營陳或塞險以遏奔衝陳讀曰陳塞悉則翻器械無不精利居一年得選兵三萬辟兗州人張建封為判官署李自良代州刺史委任之十四年兵部侍郎黎幹狡險諛佞與宦官特進劉忠翼相親善忠翼本名清潭恃寵貪縱二人皆為衆所惡惡烏路翻時人或言幹忠翼嘗勸代宗立獨孤貴為皇后子韓王迥為太子上即位幹密乘輿詣忠翼謀事事覺丙申幹忠翼並除名長流至藍田賜死十四年以戶部侍郎判度支韓滉為太常卿以吏部尚書劉晏判度支度徒洛翻滉呼廣翻尚辰羊翻先是晏滉分掌天下財賦先悉薦翻大曆六年韓滉判度支分掌財賦當在此時晏掌江章十二行本江作河乙十一行本同退齊校同南山南江淮嶺南滉掌關內河東劍南至是晏始兼之上素聞滉掊克過甚掊蒲侯翻故罷其利權尋出為晉州刺史晉州治臨汾縣古平陽也京師東北七百二十五里至德初第五琦始榷鹽以佐軍用事見二百一十九卷至德元載琦音奇榷古嶽翻法益精密初歲入錢六十萬緡末年所入逾十倍而人不厭苦大曆末計一歲章十二行本歲下有征賦二字乙十一行本同所入總一千二百萬緡緡眉巾翻而鹽利居其太半以鹽為漕傭自江淮至渭橋此東渭橋也傭七千緡自淮以北列置巡院擇能吏主之不煩州縣而集事十四年六月己亥朔赦天下十四年西川節度使崔寧永平節度使李勉並同平章事使疏吏翻十四年詔天下冤滯州府不為理為于僞翻聽詣三司使所謂三司使即御史中丞中書省舍人門下省給事中也三人者各以一司官來朝堂受詞故謂之三司非五代時理財之三司使也日於朝堂受詞推決尚未盡者聽撾登聞鼓唐時登聞鼓在西朝堂之前撾側瓜翻復扶又翻及請度僧尼於是撾登聞鼓者甚衆右金吾將軍裴諝上疏諝私呂翻以為訟者所爭皆細故若天子一一親之則安用吏理乎上乃悉歸之有司十四年制應山陵制度務從優厚當竭帑藏以供其費帑他朗翻藏徂浪翻刑部員外郎令狐峘上疏諫令力丁翻峘胡登翻上時掌翻其略曰臣伏讀遺詔務從儉約若制度優厚豈顧命之意邪邪音耶上答詔略曰非唯中朕之病中竹仲翻抑亦成朕之美敢不聞義而徙峘德棻之玄孫也令狐德棻事太宗棻扶分翻十四年庚子立皇子誦為宣王謨為舒王諶為通王諒為虔王詳為肅王乙巳立皇弟乃為益王傀為蜀王諶氏壬翻傀口猥翻又公回翻皆以州名為王國名十四年丙午舉先天故事六品以上清望官雖非供奉侍衛之官日令二人更直待制以備顧問新志曰初太宗即位命京官五品以上更宿中書門下兩省以備訪問永徽中命弘文館學士一人日待制於武德殿西門文明元年詔京官五品以上清官日一人待制于章善明福門先天末又命朝集使六品以上隨仗待制永泰時勳臣罷節制無職事皆待制於集賢門凡十三人崔祐甫為相建議文官一品以下更直待制其後著令正衙待制官日二人宋白曰時祐甫奏准元敕文官一品以下更直待制其待制官待奏事官盡然後趨出便於內廊賜待進止至酉時然後放令力丁翻更工衡翻下同十四年庚戌以朱泚為鳳翔尹泚且禮翻又音此十四年代宗優寵宦官奉使四方者不禁其求取嘗遣中使賜族還問所得頗少使疏吏翻還從宣翻又音如字少詩沼翻代宗不悅以為輕我命懼遽以私物償之由是中使公求賂遺無所忌憚遺于季翻宰相嘗貯錢於閣中每賜一物宣一旨無徒還者相息亮翻貯丁呂翻出使所歷州縣移文取貨與賦稅同皆重載而歸上素知其弊遣中使邵光超賜李希烈旌節希烈贈之僕馬及縑七百匹黃茗二百斤茗莫迥翻茶之晚取者上聞之怒杖光超六十而流之於是中使之未歸者皆潛棄所得於山谷雖與之莫敢受十四年甲子以神策都知兵馬使右領軍大將軍王駕鶴為東都園苑使東都園苑使唐初苑總監之職也琇息救翻更名志貞駕鶴典禁兵十餘年權行中外章十二行本外下有詔下二字乙十一行本同上恐其生變崔祐甫召駕鶴與語留連久之琇圭已視事矣十四年李正己畏上威名表獻錢三十萬緡上欲受之恐見欺卻之則無辭崔祐甫請遣使慰勞淄青將士使疏吏翻勞力到翻將即亮翻因以正己所獻錢賜之使將士人人戴上恩又諸道聞之知朝廷不重貨財上悅從之正己大慙服天下以為太平之治庶幾可望焉治直吏翻幾居衣翻十四年秋七月戊辰朔日有食之十四年禮儀使吏部尚書顏真卿上言上元中政在宮壼始增祖宗之諡尚辰羊翻上時掌翻壼苦本翻宮中道也按咸亨五年八月十五日改元上元是日追尊高祖太宗政在宮壼謂武后專政也玄宗末姦臣竊命纍聖之諡有加至十一字者按天寶十三載加祖宗諡號並廟號皆為九字而㣥臣上玄宗尊號凡十四字未知顏真卿所謂加至十一字何帝也諡神至翻稱文不稱武言武不稱文豈盛德所不優乎蓋㣥臣稱其至者故也故諡多不為褒少不為貶少始紹翻今纍聖諡號太廣有踰古制請自中宗以上皆從初諡初諡高祖太武皇帝太宗文皇帝高宗天皇大帝中宗孝和皇帝玄宗曰孝明皇帝肅宗曰宣皇帝以省文尚質正名敦本上命百官集議儒學之士皆從真卿議獨兵部侍郎袁傪傪昌含翻又七感翻官以兵進奏言陵廟玉冊木主皆已刊勒不可輕改事遂寢不知陵中玉冊所刻乃初諡也按唐陵中玉冊自睿宗聖真皇帝以上所刻皆初諡然玄宗諡冊曰至道大聖大明孝皇帝肅宗諡冊曰文明武德大聖大宣孝皇帝袁傪所謂木主玉冊皆已刊勒有見乎此耳十四年初代宗之世事多留滯四夷使者及四方奏計或連歲不遣乃於右銀臺門使疏吏翻右銀臺門在東內宮城西面又北則九仙門置客省以處之處昌呂翻及上書言事章十二行本事下有孟浪者三字乙十一行本同退齊校同失職未敍亦置其中動經十歲常有數百人並部曲畜産動以千計度支廩給其費甚廣度徒洛翻上悉命疏理拘者出之事竟者遣之當敍者任之歲省穀萬九千二百斛十四年壬申毀元載馬璘劉忠翼之第載祖亥翻又音如字璘離珍翻初天寶中貴戚第舍雖極奢麗而垣屋高下猶存制度然李靖家廟已為楊氏馬廣既矣及安史亂後法度墮弛墮讀曰隳大臣將帥章十二行本帥下有宦官二字乙十一行本同競治第舍各窮其力而後止時人謂之木妖將即亮翻帥所類翻治直之翻妖於驕翻上素疾之故毀其尤者仍命馬氏獻其園隸宮司宮司掌宮禁園籞者也雍録奉成園在安邑坊自丹鳳門南出東街第六坊為安邑坊十四年癸丑嚴丑改酉減常貢宮中服用錦千匹服玩數千事十四年庚辰詔回紇諸胡在京師者各服其服無得效華人先是回紇留京師者常千人紇下沒翻先悉薦翻商胡僞服而雜居者又倍之縣官日給饔餼熟曰饔生曰餼餼許既翻開第舍市肆美利皆歸之日縱貪橫橫戶孟翻吏不敢問或衣華服衣於既翻華服中華之服也誘取妻妾故禁之誘羊久翻十四年辛卯罷天下榷酒收利唐初無酒禁乾元元年京師酒貴肅宗以廩食方屈乃禁京師酤酒期以麥熟如初二年饑復禁酤廣德二年定天下酤戶以月收稅榷古嶽翻十四年上之在東宮也國子博士河中張涉為侍讀太宗時晉王府有侍讀及為太子亦置焉即位之夕召涉入禁中事無大小皆咨之明日置於翰林為學士翰林故事曰翰林院者在銀臺門內以藝能伎術召見者之所處也玄宗初置翰林待詔掌四方表疏批答應和文章又以詔敕文告悉由中書多壅滯始選朝官有才藝學識者入居翰林供奉別旨然亦未定名制詔書敕猶或分在集賢開元二十六年始以翰林供奉改稱學士別建學士院於翰林苑之南俾專內命其後又置東翰林院於金鑾殿之西隨上所在凡學士無定員下自校書郎上及諸曹尚書皆為之入院一歲則遷知制誥未知制誥者不作文書久次者一人為承旨為張涉以贓賄得罪張本乙未以涉為右散騎常侍仍為學士散悉亶翻騎奇寄翻容肇祖標點聶崇岐覆校
