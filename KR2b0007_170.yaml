body:
  text: 資治通鑑卷第一百七十端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注陳紀四臨海王光大元年光大元年丁亥五六七光大元年春正月癸酉朔日有食之光大元年尚書左僕射袁樞卒卒子恤翻光大元年乙亥大赦改元改元光大光大元年辛卯帝祀南郊光大元年壬辰齊上皇還鄴去年八月如晉陽今還光大元年己亥周主耕藉田藉秦昔翻光大元年二月壬寅朔齊主加元服大赦光大元年初高祖為梁相高祖殺王僧辨立梁敬帝遂相之因以受禪相息亮翻下同師知涉學工文練習儀體儀體謂朝儀國體雖位宦不遷而委任甚重朝直遙翻下同與揚州刺史安成王頊尚書僕射到仲舉同受遺詔輔政師知仲舉恆居禁中參決衆事恆戶登翻頊與左右三百人入居尚書省師知見頊地望權勢為朝野所屬心忌之屬之欲翻與尚書左丞王暹等謀出頊於外暹思廉翻衆猶豫未敢先發東宮通事舍人殷不佞素以名節自任按蕭子顯齊志東宮職僚未有通事舍人五代志梁東宮官有通事守舍人典事守舍人典法守舍人員陳因之言在東宮為上所親委是時以尚書省為相府今四方無事王可還東府經理州務州務謂揚州事務頊將出中記室毛喜五代志梁制蕃王國及庶姓有持節府有中録事中記室陳有天下日淺國禍繼臻謂八年之間國連有大喪太后深惟至計惟思也今日之言必非太后之意宗壯章十二行本壯作社乙十一行本同孔本同之重願王三思三息暫翻又如字須更聞奏無使姦人得肆其謀今出外即受制於人譬如曹爽願作富家翁其可得邪曹爽事見四十五卷魏邵陵厲公嘉平元年明徹曰嗣君諒暗暗音陰萬機多闕殿下親實周邵當輔安社稷願留中勿疑頊乃稱疾召劉師知留之與語使毛喜先入言於太后太后曰今伯宗幼弱政事並委二郎文帝居長頊居次故稱為二郎喜又言於帝帝曰此自師知等所為朕不知也喜出以報頊頊因囚師知自入見太后及帝見賢遍翻極陳師知之罪仍自草敕請畫請畫可也其夜於獄中賜死以到仲舉為金紫光祿大夫王暹殷不佞並付治付治付有司治罪也或作付冶付東冶使徒作也以下文不害免官言之治字為是暹息廉翻不害之弟也少有孝行不佞少居父喪以至孝稱江陵之陷不佞母死於亂兵不佞在吳道路隔絶久不得奔赴四年之中晝夜號泣居處飲食常為居喪之禮後其兄不齊迎母喪歸葬不佞居處之節如始聞問若此者又三年身自負土手植松柏每歲時伏臘必三日不食少詩照翻行下孟翻故獨得不死免官而已王暹伏誅自是國政盡歸於頊劉師知之事大類楊愔右衛將軍會稽韓子高鎮領軍府在建康諸將中士馬最盛會工外翻將即亮翻與仲舉通謀事未發毛喜請簡士馬配子高並賜鐵炭使修器甲頊驚曰子高謀反方欲收執何為更如是邪邪音耶喜曰山陵始畢邊寇尚多而子高受委前朝名為杖順若收之恐不即授首或能為人患宜推心安誘朝直遙翻誘音酉使不自疑伺間圖之一壯士之力耳頊深然之間古莧翻考異曰陳書文沈后傳云安成王既專沈太后憂悶計無所出乃密賂宦者蔣裕令誘建安人張安國使據郡反冀因此以圖高宗安國事覺並為高宗所誅時后左右近侍頗知其事后恐連逮黨與並殺之按后欲圖高宗而令安國據建安反理不相涉且后若實有此謀高宗既立后豈得自全今刪去仲舉既廢歸私第心不自安子郁尚世祖妹信義長公主信義郡名五代志吳郡常熟縣梁置信義郡長知兩翻未之官子高亦自危求出為衡廣諸鎮郁每乘小輿蒙婦人衣與子高謀會前上虞令陸昉及子高軍主告其謀反昉分罔翻頊在尚書省因召文武在位議立皇太子平旦仲舉子高入省皆執之到仲舉既廢歸私第非在位者蓋頊召其會議因而執之下詔於獄賜死考異曰陳書子高傳死在光大元年八月按華皎傳子高誅後皎始謀叛帝紀此年五月皎已謀反又慈訓太后令先言劉師知子高誅後乃及余孝頃始興王伯茂傳師知等誅後伯茂乃進號中衛然則子高傳誤也光大元年辛亥南豫州刺史余孝頃坐謀反誅光大元年癸丑以東揚州刺史始興王伯茂為中衛大將軍開府儀同三司梁置四中將軍軍衛撫護止施於內帝之母弟也劉師知韓子高之謀伯茂皆預之司徒頊恐扇動內外故以為中衛專使之居禁中與帝遊處處昌呂翻光大元年三月甲午以尚書右僕射沈欽為侍中左僕射史言沈欽官兼兩省光大元年夏四月癸丑齊遣散騎常侍司馬幼之來聘散悉亶翻騎奇寄翻光大元年湘州刺史華皎華戶化翻聞韓子高死內不自安皎與劉師知韓子高皆為文帝所親任二人既死故皎不自安撫循所部啓求廣州以卜朝廷之意司徒頊偽許之而詔書未出皎遣使潛引周兵又自歸於梁以其子玄響為質使疏吏翻質音致五月癸巳頊以丹楊尹吳明徹為湘州刺史光大元年甲午齊以東平王儼為尚書令光大元年司徒頊遣吳明徹帥舟師三萬趣郢州帥讀曰率下同趣七喻反下同丙申遣征南大將軍淳于量帥舟師五萬繼之又遣冠武將軍楊文通從安成步道出茶陵梁置冠武將軍與折衝同班五代志廬陵郡安復縣舊置安成郡茶陵縣漢屬長沙郡吳分屬湘東郡隋並入衡山郡湘潭縣九域志茶陵縣屬衡州在州東三百五十五里宜陽即豫章郡宜春縣也晉孝武帝更名宜陽避太后諱也隋復曰宜春縣帶袁州後漢立醴陵縣屬長沙郡九域志在郡東一百六十里自宜春至醴陵二百二十里守式又翻並與江州刺史章昭達郢州刺史程靈洗合謀進討六月壬寅以司空徐度為車騎將軍總督建康諸軍步道趣湘州光大元年辛亥周主尊其母叱奴氏為皇太后按魏收官氏志拓跋興於代北兼並他部以本部中別族為內姓其他諸部隨方分之北方有叱奴氏光大元年己未齊封皇弟仁機為西河王仁約為樂浪王樂音洛下同浪音琅仁儉為潁川王仁雅為安樂王仁直為丹楊王考異曰北齊書帝紀名統今從列傳統謂仁直皆郡王也五代志安樂郡密雲縣舊置安樂郡光大元年華皎使者至長安梁王亦上書言狀且乞師華戶化翻使疏吏翻上時掌翻周人議出師應之司會崔猷曰前歲東征死傷過半謂攻齊洛陽也事見上卷文帝天嘉五年會古外翻瘡痍未復今陳氏保境息民共敦鄰好比毗至翻好呼到翻豈可利其土地納其叛臣違盟約之信興無名之師乎晉公護不從閏六月戊寅遣襄州總管衛公直督柱國陸通大將軍田弘權景宣元定等將兵助之將即亮翻又音如字領也光大元年辛巳齊左丞相咸陽武王斛律金卒年八十長子光為大將軍相息亮翻卒子恤翻長知兩翻次子羡及孫武都並開府儀同三司出鎮方嶽斛律羡鎮幽州武都鎮梁兗二州門中一皇后二太子金子光長女孝昭納為太子次女武成納為太子後主受內禪立為皇后按後祖珽言光男尚公主蓋光子武都世雄恆伽皆尚主也三世無比自肅宗以來禮敬尤重每朝見常聽乘步挽車至階朝直遙翻見賢遍翻步挽車不用牛馬令人步挽之或以羊車迎之然金不以為喜嘗謂光曰我雖不讀書聞古來外戚鮮有能保其族者鮮息淺翻女若有寵為諸貴所嫉無寵為天子所憎我家直以勳勞致富貴何必藉女寵也史言斛律金有識光大元年壬午齊以東平王儼録尚書事以左僕射趙彥深為尚書令並省尚書左僕射婁定遠為左僕射自並省入為鄴省左僕射定遠昭之子也昭婁后之弟光大元年秋七月戊申立皇子至澤為太子光大元年八月齊以任城王湝為太師任音壬湝音皆又戶皆翻馮翊王潤為大司馬段韶為左丞相賀拔仁為右丞相侯莫陳相為太宰婁睿為太傅斛律光為太保韓祖念為大將軍趙郡王睿為太尉東平王儼為司徒儼有寵於上皇及胡后時兼京畿大都督領軍大將軍領御史中丞魏朝故事中丞出與皇太子分路分路而行不引車避道朝直遙翻去牛頓軛於地以待其過去羌呂翻軛於革翻其或遲違不即駐車頓軛是遲遲為違法棒部項翻自遷鄴以後此儀廢絶上皇欲尊寵儼命一遵舊制儼初從北宮出將上中丞將上時掌翻今人謂領職視事為禮上凡京畿步騎領軍官屬中丞威儀司徒鹵簿莫不畢從騎奇寄翻從才用翻上皇與胡后張幕於華林園東門外而觀之遣中使驟馬趣仗趣儼前導儀仗也使疏吏翻趣七喻翻自言奉敕赤棒卒應聲碎其鞍馬驚人墜上皇大笑以為善更敕駐車勞問良久勞問儼也勞力到翻儼恆在宮中坐含光殿視事恆戶登翻下同諸父皆拜之上皇或時如並州晉陽宮在並州恆戶登翻守式又翻每送行或半路或至晉陽乃還還從宣翻又音如字器玩服飾皆與齊主同所須悉官給嘗於南宮見新冰早李齊主時居鄴之南宮儼從上皇胡后居北宮怒曰尊兄已有我何意無儼常謂齊主為尊兄屬官及工人必獲罪儼性剛決嘗言於上皇曰尊兄懦何能帥左右上皇每稱其才有廢立意胡后亦勸之既而中止儼與齊主既定君臣之分而常以兄弟相呼又有奪嫡之意史歷言之為儼怙寵致禍張本帥讀曰率光大元年華皎遣使誘章昭達昭達執送建康又誘程靈洗靈洗斬之華戶化翻使疏吏翻誘音酉下並同皎以武州居其心腹五代志武陵郡梁置武州子隆不從遣兵攻之不克巴州刺史戴僧朔等並隸於皎文帝命皎都督湘巴等四州五代志巴陵郡梁置巴州本隸皎下遂為之用湘州與長沙郡同治所以州統郡故曰本隸皎下守手又翻乃曲赦湘巴二州九月乙巳悉誅皎家屬梁以皎為司空遣其柱國王操將兵二萬助之周權景宣將水軍元定將陸軍衛公直總之與皎俱下將即亮翻又音如字領也淳于量軍夏口直軍魯山使元定以步騎數千圍郢州騎奇寄翻考異曰陳帝紀云步騎二萬蓋夸誕之辭今從周帝紀皎軍于白螺水經江水過長沙下雋縣北湘水從南來注之江水又東過彭城口又東過如山北又東過白螺山南螺盧戈翻雋辭兗翻徐度楊文通由嶺路襲湘州嶺路即前所出安成宜陽步道也皎自巴陵與周梁水軍順流乘風而下軍勢甚盛戰于沌口沌柱兗翻量明徹募軍中小艦多賞金銀令先出當西軍大艦受其拍西軍諸艦發拍皆盡然後量等以大艦拍之西軍艦皆碎沒于中流戰船置拍竿發之以拍敵船艦戶黯翻因風縱火俄而風轉自焚西軍大敗皎與戴僧朔單舸走舸古我翻過巴陵不敢發岸發恐當作登衛公直亦奔江陵元定孤軍進退無路斫竹開徑且戰且引欲趣巴陵趣七喻翻巴陵已為徐度等所據度等遣使偽與結盟許縱之還國定信之解仗就度度執之盡俘其衆考異曰陳書云獲萬餘人馬四千匹亦恐夸誕今不取定憤恚而卒恚於避翻卒子恤翻皎黨曹慶等四十餘人並伏誅唯以嶽陽太守章昭裕昭達之弟桂陽太守曹宣高祖舊臣衡陽內史汝陰任忠嘗有密啓皆宥之吳明徹乘勝攻梁河東拔之守式又翻五代志巴陵郡湘陰縣梁置嶽陽郡桂陽郡郴縣梁置桂陽郡長沙郡衡山縣舊置衡陽郡陳以衡陽為王國故置內史南郡松滋縣舊置河東郡任音壬周衛公直歸罪於梁柱國殷亮梁主知非其罪然不敢違遂誅之周與陳既交惡周沔州刺史裴寬白襄州總管請益戍兵並遷城於羊蹄山以避水五代志沔陽郡甑山縣梁置梁安郡西魏改曰魏安郡置江州廢帝三年改曰沔州甑山有陽臺山在漢川之南三十五里土俗訛為羊蹄山程靈洗舟師奄至城下會大雨水暴漲靈洗引大艦臨城發拍擊樓堞皆碎堞徒協翻矢石晝夜攻之三十餘日陳人登城寬猶帥衆執短兵拒戰帥讀曰率又二日乃擒之光大元年丁巳齊上皇如晉陽山東水飢按李百藥書山東大水人飢僵居良翻光大元年冬十月甲申帝享太廟光大元年十一月戊戌朔日有食之光大元年丙午齊大赦光大元年癸丑周許穆公宇文貴自突厥還卒于張掖宇文貴與陳公純等如突厥逆女突厥留之貴以疾先得還厥九勿翻還從宣翻又音如字卒子恤翻掖音亦光大元年齊上皇還鄴光大元年十二月周晉公護母卒卒子恤翻詔起令視事令力丁翻光大元年齊祕書監祖珽與黃門侍郎劉逖友善珽欲求宰相乃疏趙彥深元文遙和士開罪狀令逖奏之逖不敢通彥深等聞之先詣上皇自陳上皇大怒執珽詰之珽他鼎翻詰去吉翻珽因陳士開文遙彥深等朋黨弄權賣官鬻獄事上皇曰爾乃誹謗我珽曰臣不敢誹謗陛下取人女上皇曰我以其飢饉收養之耳珽曰何不開倉振給乃買入後宮乎上皇益怒以刀環築其口鞭杖亂下將撲殺之撲弼角翻珽呼曰陛下勿殺臣臣為陛下合金丹呼火故翻為于偽翻合音閣遂得少寬少詩照翻珽曰陛下有一范增不能用漢高帝之言爾自比范增以我為項羽邪邪音耶珽曰項羽布衣帥烏合之衆五年而成霸業帥讀曰率陛下藉父兄之資才得至此臣以為項羽未易可輕上皇愈怒令以土塞其口易以豉翻塞悉則翻珽且吐且言乃鞭二百配甲坊尋徙光州五代志東萊郡舊置光州別駕張奉福曰牢者地牢也乃置地牢中桎梏不離身離力智翻夜以蕪菁子為燭眼為所熏由是失明本草曰蕪菁主明目今珽由是失明蓋其子餌之則明目以之為燭則煙熏眼而失明衍義曰蕪菁今世俗謂之蔓菁夏則枯蔬圃復種之謂之雞毛菜正在春時採擷之餘收子為油審是則菜油也東南之人多以之照夜未嘗熏眼失明杜佑曰魏始置五兵尚書謂中兵外兵別兵都兵騎兵也晉分中外各為左右雖與舊為七曹唯有五兵尚書無七兵尚書之名至後魏始有七兵尚書今諸家著述或謂晉太康中置七兵尚書誤矣非人理所及治直吏翻於家尤甚夜為盜所殺遺其刀驗之其子善昭所佩刀也有司執善昭誅之史書此以垂戒然以情觀之善昭果弒其父必不遺刀以待驗蓋盜為此計以殺其子二年光大二年春正月己亥安成王頊進位太傅領司徒加殊禮光大二年辛丑周主祀南郊光大二年癸亥齊主使兼散騎常侍鄭大護來聘光大二年湘東忠肅公徐度卒卒子恤翻光大二年二月丁卯周主如武功光大二年突厥木杆可汗二於周厥九勿翻杆公旦翻可從刊入聲汗音寒更許齊人以婚留陳公純等數年不返純等逆女見上卷文帝天嘉六年壞其穹廬壞音怪旬日不止木杆懼以為天譴即備禮送其女於周純等奉之以歸三月癸卯至長安周主行親迎之禮迎魚敬翻古者天子娶于諸侯使同姓諸侯為之主桓八年祭公來遂逆王后于紀杜預注云祭公來受命於魯是也周主行親迎與突厥為敵國之禮甲辰周大赦光大二年乙巳齊以東平王儼為大將軍南陽王綽為司徒開府儀同三司徐顯秀為司空廣寧王孝珩為尚書令珩音行光大二年戊午周燕文公于謹卒燕因肩翻卒子恤翻謹勳高位重而事上益恭每朝參所從不過二三騎朝廷有大事多與謹謀之朝直遙翻騎奇寄翻謹盡忠補益於功臣中特被親信禮遇隆重始終無間被皮義翻間古莧翻教訓諸子務存靜退而子孫蕃衍蕃音煩率皆顯達光大二年吳明徹乘勝進攻江陵乘沌口之勝也梁主出頓紀南以避之劉昭曰江陵縣北十餘里有紀南城晝夜拒戰十旬梁將馬武吉徹擊明徹敗之將即亮翻收補邁翻明徹退保公安梁主乃得還光大二年夏四月辛巳周以達奚武為太傅尉遲迥為太保齊公憲為大司馬光大二年齊上皇如晉陽光大二年齊尚書左僕射徐之才善醫上皇有疾之才療之既愈中書監和士開欲得次遷乃出之才為兗州刺史為齊主疾作追之才不及張本五代志魯郡舊兗州治瑕丘癸卯以尚書右僕射胡長仁為左僕射士開為右僕射長仁太上皇后之兄也光大二年庚戌周主享太廟庚申如醴泉宮醴泉宮即漢甘泉宮之舊地在漢馮翊池陽縣西後魏於此置寧夷縣隋改曰醴泉縣光大二年壬戌齊上皇還鄴還從宣翻又音如字光大二年秋七月壬寅周隨桓公楊忠卒卒子恤翻子堅襲爵堅為開府儀同三司小宮伯周禮宮伯屬天官中士二人下士二人鄭玄注云伯長也掌王宮宿衛之官及其政令行其秩敘作其徒役之事後周置左右宮伯掌侍衛之禁各更直於內小宮伯二之堅以白忠忠曰兩姑之間難為婦汝其勿往堅乃辭之史以楊忠有識因書其卒而書之楊堅始見于此光大二年丙午帝享太廟光大二年戊午周主還長安光大二年壬戌封皇弟伯智為永陽王伯謀為桂陽王光大二年八月齊請和於周周遣軍司馬陸程聘于齊九月丙申齊使侍中斛斯文略報之光大二年冬十月癸亥周主享太廟光大二年庚午帝享太廟光大二年辛巳齊以廣寧王孝珩録尚書事左僕射胡長仁為尚書令右僕射和士開為左僕射中書監唐雍為右僕射光大二年十一月壬辰朔日有食之光大二年齊遣兼散騎常侍李諧來聘散悉亶翻騎奇寄翻光大二年甲辰周主如岐陽五代志太原郡雍縣有岐陽宮光大二年周遣開府儀同三司崔彥等聘于齊光大二年始興王伯茂以安成王頊專政意甚不平屢肆惡言頊吁玉翻甲寅以太皇太后令誣帝云與劉師知華皎等通謀言以者明太皇太后令頊為之也華戶化翻文皇知子之鑒事等帝堯傳弟之懷又符太伯今可還申曩志崇立賢君遂廢帝為臨海王以安成王入纂又下令黜伯茂為溫麻侯溫麻縣侯也沈約曰晉武帝以溫麻船屯立縣屬晉安郡晉安隋改為建安安成王使盜邀之於道殺之車中光大二年齊上皇疾作驛追徐之才未至辛未疾亟以後事屬和士開屬之欲翻握其手曰勿負我也遂殂於士開之手殂祚乎翻年三十二明日之才至復遣還州還兗州也復扶又翻士開祕喪三日不發黃門侍郎馮子琮問其故士開曰神武文襄之喪皆祕不發神武卒見一百六十卷梁武帝太清元年文襄卒見一百六十二卷太清三年少詩照翻恐王公有二心者意欲盡追集於涼風堂然後與公議之士開素忌太尉録尚書事趙郡王睿及領軍婁定遠子琮恐其矯遺詔出睿於外奪定遠禁兵乃説之曰説式芮翻大行先已傳位於今上㣥臣富貴者皆至尊父子之恩但令在內貴臣一無改易王公必無異志令力丁翻世異事殊豈得與霸朝相比高歡高澄未即篡魏握魏之政北齊君臣皆謂之霸朝朝直遙翻下同升遐之事鄭玄曰升上也遐已也上已者若仙去云耳久而不舉謂不舉哀成服也士開乃發喪丙子大赦戊寅尊太上皇后為皇太后侍中尚書左僕射元文遙以馮子琮胡太后之妹夫恐其贊太后干預朝政朝直遙翻與趙郡王睿和士開謀出子琮為鄭州刺史世祖驕奢淫泆役繁賦重吏民苦之史言亡齊者武成甲申詔所在百工細作悉罷之鄴下晉陽中山宮人官口之老病者悉簡放齊有鄴宮晉陽宮中山宮官口罪人家口沒官為奴婢者聽還緣坐謂罪非正犯緣親戚而坐罪者光大二年周梁州恆稜獠叛據趙文表傳恆稜地名所在險固方數百里㣥獠居之文表既平獠遂置為蓬州恆戶登翻獠魯皓翻下同趙文表為梁州總管府長史長知兩翻將即亮翻文表曰四面攻之獠無生路必盡死以拒我未易可克今吾示以威恩為惡者誅之從善者撫之善惡既分破之易矣易以豉翻遂以此意遍令軍中時有從軍熟獠多與恆稜親識即以實報之境上內附者謂之熟獠文表軍已至其境獠中先有二路一平一險有獠帥數人來見帥所類翻請為鄉導鄉讀曰嚮文表曰此路寬平不須為導卿但先行慰諭子弟使來降也降戶江翻下同乃遣之文表謂諸將曰獠帥謂吾從寬路而進必設伏以邀我當更出其不意乃引兵自險路入乘高而望果有伏兵獠既失計爭帥衆來降降戶江翻文表皆慰撫之仍徵其租稅無敢違者周人以文表為蓬州長史蓬州本漢宕渠之地李勢時為獠所據蕭齊立歸化郡梁置安固縣及伏虞郡後周置蓬州因蓬山而以為名也高宗宣皇帝上之上光大太建元年太建元年己丑五六九光大太建元年春正月辛卯朔周主以齊世祖之喪罷朝會朝直遙翻遣司會李綸弔賻賻音附公羊傳曰貨財曰賻會古外翻且會葬光大太建元年甲午安成王即皇帝位改元大赦復太皇太后為皇太后皇太后為文皇后立柳氏為皇后世子叔寶為太子封皇子叔陵為始興王奉昭烈王祀文帝以子伯茂奉始興昭烈王祀帝既殺伯茂以叔陵奉祀乙未上謁太廟丁酉以尚書僕射沈欽為左僕射度支尚書王勱為右僕射勱份之孫也度徒洛翻勱音邁份府巾翻份奐之弟肅之叔父也光大太建元年辛丑上祀南郊光大太建元年壬寅封皇子叔英為豫章王叔堅為長沙王光大太建元年戊午上享太廟光大太建元年齊博陵文簡王濟世祖之母弟也為定州刺史語人曰次敘當至我矣言以兄弟之次亦當為天子也語牛倨翻陰使人就州殺之葬贈如禮光大太建元年二月乙亥上耕藉田藉秦昔翻光大太建元年甲申齊葬武成帝于永平陵廟號世祖光大太建元年乙章十二行本乙作己乙十一行本同孔本同張校同丑齊徙東平王儼為琅邪王邪音耶光大太建元年齊遣侍中叱列長叉聘于周姓纂叱列復姓出於拓跋氏西部光大太建元年齊以司空徐顯秀為太尉並省尚書令婁定遠為司空初侍中尚書右僕射和士開為世祖所親狎出入臥內無復期度復扶又翻遂得幸於胡后及世祖殂齊主以士開受顧託深委任之威權益盛與婁定遠及録尚書事趙彥深侍中尚書左僕射元文遙開府儀同三司唐雍領軍綦連猛高阿那肱李延壽曰綦連其先姬姓六國末避亂出塞保祁連山因以山為姓北人語訛故曰綦連魏收官氏志綦連氏出於西方諸部時號八貴樂音洛太尉趙郡王睿大司馬馮翊王潤安德王延宗與婁定遠元文遙皆言於齊主請出士開為外任會胡太后觴朝貴於前殿朝直遙翻睿面陳士開罪失云士開先帝弄臣城狐社鼠受納貨賂穢亂宮掖掖音亦臣等義無杜口冒死陳之太后曰先帝在時王等何不言今日欲欺孤寡邪邪音耶且飲酒勿多言睿等辭色愈厲儀同三司安吐根曰臣本商胡安吐根本安息胡人天平初柔然主使至晉陽吐根密啓柔然情狀高歡因為之備柔然入掠無獲而返其後歡與柔然和親結成婚媾皆吐根為行人既而歸歡由是見親待行戶剛翻既受厚恩豈敢惜死不出士開朝野不定太后曰異日論之王等且散睿等或投冠於地或拂衣而起明日睿等復詣雲龍門復扶又翻令文遙入奏之三返太后不聽左丞相段韶使胡長粲傳太后言曰梓宮在殯事太匆匆欲王等更思之睿等遂皆拜謝長粲復命太后曰成妹母子家者兄之力也長粲胡太后之兄故云然罷之太后及齊主召問士開對曰先帝於㣥臣之中待臣最厚陛下諒暗始爾暗音陰大臣皆有覬覦覬音冀覦音俞今若出臣正是翦陛下羽翼宜謂睿云文遙與臣俱受先帝任用豈可一去一留並可用為州且出納如舊尚書出納帝命令且如舊領職然後遣之睿等謂臣真出心必喜之喜許記翻帝及太后然之告睿等如其言乃以士開為兗州刺史文遙為西兗州刺史西兗州時治滑臺睿等促士開就路太后欲留士開過百日古者葬日虞既三虞用剛日卒哭後人百日而卒哭至今猶然數日之內太后數以為言后數所角翻有中人知太后密旨者謂睿曰太后意既如此殿下何宜苦違睿曰吾受委不輕今嗣主幼沖豈可使邪臣在側不守之以死何面戴天遂更見太后苦言之太后令酌酒賜睿睿正色曰今論國家大事非為巵酒為于偽翻言訖遽出士開載美女珠簾詣婁定遠謝曰諸貴欲殺士開蒙王力武成帝封婁定遠臨淮郡王故稱之用為方伯今當奉別謹上二女子一珠簾上時掌翻定遠喜謂士開曰欲還入不不讀曰否士開曰在內久不自安今得出實遂本志不願更入但乞王保護長為大州刺史足矣定遠信之送至門士開曰今當遠出願得一辭覲二宮定遠許之士開由是得見太后及帝進説曰見賢遍翻説式芮翻先帝一旦登遐臣愧不能自死觀朝貴意勢欲以陛下為乾明乾明齊濟南王年號也事見一百六十八卷文帝天嘉元年必有大變臣何面目見先帝於地下因慟哭帝太后皆泣問計安出士開曰臣已得入復何所慮正須數行詔書耳復扶又翻下將復后復復以同行戶剛翻於是詔出定遠為青州刺史責趙郡王睿以不臣之罪旦日睿將復入諫妻子咸止之睿曰社稷事重吾寧死事先皇不忍見朝廷顛沛至殿門又有人謂曰殿下勿入恐有變睿曰吾上不負天死亦無恨入見太后見賢遍翻太后復以為言睿執之彌固出至永巷遇兵執送華林園雀離佛院釋氏西域記龜茲國北四十里山上有寺名曰雀離大清淨故倣以建佛院拉盧合翻考異曰北齊帝紀天統三年六月以並省尚書左僕射婁定遠為尚書左僕射五年二月殺趙郡王睿三月以並省尚書令婁定遠為司空蓋定遠既為僕射復為並省尚書令也按和士開傳先出定遠然後殺睿睿死必在定遠作司空後帝紀誤也但不知果在何時耳又士開傳云出為青州定遠傳云尋除瀛州蓋先出為青州後乃除瀛州也睿久典朝政文宣帝時濟南以太子監國立大都督府與尚書省分理衆事以睿攝大都督府長史至武成之世拜尚書令又進攝録尚書事又進太尉朝直遙翻下同朝野冤惜之復以士開為侍中尚書左僕射定遠歸士開所遺遺于季翻加以餘珍賂之光大太建元年三月齊主如晉陽夏四月甲子以並州尚書省為大基聖寺晉祠為大崇皇寺魏收志太原郡晉陽縣有晉祠乙丑齊主還鄴光大太建元年齊主年少多嬖寵少詩照翻武衛將軍高阿那肱素以諂佞為世祖及和士開所厚世祖多令在東宮侍齊主由是有寵纍遷並省尚書令封淮陰王世祖簡都督二十人使侍衛東宮齊左右衛府領左右府其御仗屬官各有正副都督齊主獨親愛長鸞長鸞名鳳以字行纍遷侍中領軍總知內省機密宮婢陸令萱者其夫漢陽駱超坐謀叛誅令萱配掖庭子提婆亦沒為奴齊主之在襁褓令萱保養之令萱巧黠善取媚黠戶八翻有寵於胡太后宮掖之中獨亶威福封為郡君和士開高阿那肱皆為之養子齊主以令萱為女侍中後魏孝文改定內官左右昭儀三夫人九嬪世婦御女之外又置內職典內司視尚書令僕作司大監女侍中三官視二品監朝夕戲狎纍遷至開府儀同三司武衛大將軍宮人穆舍利者斛律后之從婢也從才用翻有寵於齊主令萱欲附之乃為之養母薦為弘德夫人河清新令弘德崇德正德三夫人位比三公然和士開用事最久諸幸臣皆依附之以固其寵齊主思祖珽齊主受內禪祖珽啓其謀故思之祖珽去年徙光州五代志東海郡梁置南北二青州東魏改為海州趙彥深心腹深沈欲行伊霍事遺于季翻媼烏老翻陸媼即謂令萱沈持林翻儀同姊弟豈得平安何不早用智士邪和士開亦以珽有膽略欲引為謀主乃棄舊怨虛心待之與陸媼言於帝曰襄宣昭三帝之子皆不得立謂文襄文宣孝昭之子也祖孝徵之力也祖珽字孝徵事見上卷文帝天嘉元年不可不報孝徵心行雖薄行下孟翻奇略出人緩急可使且其人已盲必無反心請呼取問以籌策齊主從之召入為祕書監加開府儀同三司士開譖尚書令隴東王胡長仁驕恣出為齊州刺史長仁怨憤謀遣刺客殺士開事覺士開與珽謀之珽引漢文帝誅薄昭故事薄昭事見十四卷漢文帝十年胡長仁帝舅也故引此事以誅之使疏吏翻光大太建元年五月庚戌周主如醴泉宮光大太建元年丁巳以吏部尚書徐陵為左僕射光大太建元年秋七月辛卯皇太子納沈氏考異曰陳書南史沈后傳皆云太建三年拜皇太子誤也今從帝紀光大太建元年辛亥周主還長安光大太建元年八月庚辰盜殺周孔城防主以其地入齊魏收志漢晉河南新城縣後魏置新城郡治孔城其地在隋河南郡伊闕縣界九月辛卯周遣齊公憲與柱國李穆將兵趣宜陽杜佑曰宜陽郡今福昌縣趣七喻翻光大太建元年歐陽紇在廣州十餘年武帝永定二年紇與父頠定廣州至是凡十二年紇下沒翻自華皎之叛帝心疑之華戶化翻徵為左衛將軍紇恐懼其下多勸之反遂舉兵攻衡州刺史錢道戢此始興之衡州五代志南海郡始興縣梁置安遠郡及東衡州帝遣中書侍郎徐儉持節諭旨紇初見儉盛仗衛言辭不恭儉曰呂嘉之事誠當已遠呂嘉事見二十卷漢武帝元鼎五年六年周迪陳寶應皆以叛換敗死事並見文帝紀未為晚也紇默然不應置儉於孤園寺纍旬不得還紇嘗出見儉儉謂之曰將軍業已舉事儉須還報天子儉之性命雖在將軍將軍成敗不在於儉幸不見留紇乃遣儉還儉陵之子也徐陵時貴顯於陳朝冬十月辛未詔車騎將軍章昭達討紇光大太建元年壬午上享太廟光大太建元年十一月辛亥周鄫文公長孫儉卒鄫茲陵翻長知兩翻卒子恤翻光大太建元年辛丑齊以斛律光為太傅馮翊王潤為太保琅邪王儼為大司馬十二月庚午以蘭陵王長恭為尚書令庚辰以中書監魏收為左僕射光大太建元年周齊公憲等圍齊宜陽絶其糧道光大太建元年自華皎之亂與周人絶至是周遣御正大夫杜杲來聘請復修舊好杜杲屢聘于陳故使來修舊好復扶又翻好呼到翻遣使如周使疏吏翻二年光大二年春正月乙酉朔齊改元武平光大二年齊東安王婁睿卒東安郡王五代志琅邪郡沂水縣舊置東安郡也光大二年丙午上享太廟光大二年戊申齊使兼散騎常侍裴讞之來聘散悉亶翻騎奇寄翻讞魚蹇翻又魚列翻光大二年齊太傅斛律光將步騎三萬救宜陽屢破周軍築統關豐化二城章十二行本城字下有以通宜陽糧道六字乙十一行本同孔本同張校同而還還從宣翻又如字周軍追之光縱擊又破之獲其開府儀同三司宇文英梁景興周軍雖屢敗而攻宜陽不輟己巳齊以斛律光為右丞相並州刺史又以任城王湝為太師賀拔仁録尚書事任音壬湝音皆又戶皆翻光大二年歐陽紇召陽春太守馮僕至南海五代志高涼郡陽春縣梁置陽春郡廣州治南海郡守式又翻僕遣使告其母洗夫人夫人曰我為忠貞經今兩世僕及父融為兩世誘音酉使疏吏翻洗息典翻遂發兵拒境帥諸酋長迎章昭達帥讀曰率酋慈秋翻長知兩翻昭達倍道兼行至始興紇聞昭達奄至恇擾不知所為出頓洭口水經洭水出桂陽縣盧聚東南過含洭縣南出洭浦關右合溱水謂之洭口洭去王翻盛以竹籠盛時征翻置于水柵之外用遏舟艦昭達居上流裝艦造拍艦戶黯翻下同令軍人銜刀潛行水中以斫籠篾皆解篾莫結翻因縱大艦隨流突之紇衆大敗生擒紇送之癸未斬於建康市紇之反也士人流寓在嶺南者皆惶駭前著作佐郎蕭引獨恬然曰管幼安袁曜卿亦但安坐耳管寧字幼安依公孫度度安其賢魏文帝初卒還鄉里袁渙字曜卿為呂布所拘而不為布所脅布敗歸魏武何憂懼乎紇平上徵為金部侍郎唐六典曰漢置尚書郎四人其一人主財帛委輸蓋金部郎曹之任也歷魏晉宋齊後魏北齊並有金部郎中梁陳隋為侍郎煬帝但曰郎允之弟也蕭允見一百六十二卷梁武帝太清三年史言蕭允兄弟處大難而不懾馮僕以其母功封信都侯遷石龍太守五代志石龍縣屬高涼郡蓋梁陳置郡也今為化州賜繡幰油絡駟馬安車一乘幰許偃翻安車加繡幰油絡也乘繩證翻給鼓吹一部並麾幢旌節吹尺瑞翻幢傳江翻其鹵簿一如刺史之儀光大二年三月丙申皇太后章氏殂光大二年戊戌齊安定武王賀拔仁卒光大二年丁未大赦光大二年夏四月甲寅周以柱國宇文盛為大宗伯光大二年周主如醴泉宮光大二年辛酉齊以開府儀同三司徐之才為尚書左僕射光大二年戊寅葬武宣皇后於萬安陵章太后諡武宣光大二年閏月戊申上謁太廟光大二年五月壬午齊遣使來弔使疏吏翻光大二年六月乙酉齊以廣寧王孝珩為司空珩音行光大二年甲辰齊穆夫人生子恆恆戶登翻齊主時未有男為之大赦為于偽翻下請為為之同陸令萱欲以恆為太子恐斛律后恨怒乃白齊主使斛律后母養之光大二年己丑齊以開府儀同三司唐雍為尚書右僕射光大二年秋七月章十二行本月下有癸丑二字乙十一行本同孔本同張校同齊立肅宗子彥基為城陽王彥忠為梁郡王甲寅以尚書令蘭陵王長恭為録尚書事中領軍和士開為尚書令賜爵淮陽王士開威權日盛朝士不知廉恥者或為之假子與富商大賈同在伯仲之列朝直遙翻賈音古嘗有一人士參士開疾參者候問其疾王傷寒極重章十二行本重下有他藥無效四字乙十一行本同孔本同張校同應服黃龍湯陶弘景曰今近城寺別塞空罌口內糞倉中久年得汁甚黑而苦名為黃龍湯治溫病垂死者皆差人士曰此物甚易服易以豉翻王不須疑請為王先嘗之一舉而盡士開感其意為之強服強其兩翻遂得愈光大二年乙卯周主還長安光大二年癸酉齊以華山王凝為太傅華山郡王五代志京兆郡鄭縣後魏置華山郡華戶化翻光大二年司空章昭達攻梁章昭達破歐陽紇而還遂引兵攻梁周人於峽口南岸築安蜀城峽口西陵峽口也杜佑曰安蜀城在夷陵郡界編葦為橋以度軍糧昭達命軍士為長戟施於樓船上仰割其索索斷糧絶索昔洛翻因縱兵攻安蜀城下之梁主告急于周襄州總管衛公直直遣大將軍李遷哲將兵救之遷哲以其所部守江陵外城自帥騎兵出南門使步出北門將即亮翻帥讀曰率步下有兵字文意較明首尾邀擊陳兵陳兵多死夜陳兵竊於城西以梯登城登者已數百人遷哲與陸騰力戰拒之乃退昭達又決龍川寧朔隄水經注紀南城西南有赤坂岡岡下有瀆水東北流入城又東北出城西南注于龍陂陂在靈溪東江堤內水至淵深有龍見於其中故曰龍陂寧朔周書陸騰傳作寧邦騰出戰於西隄昭達兵不利乃引還還從宣翻又如字光大二年八月辛卯齊主如晉陽光大二年九月乙巳齊立皇子恆為太子光大二年冬十月辛巳朔日有食之光大二年齊以廣寧王孝珩為司徒上洛王思宗為司空上洛古郡名復扶又翻許以興復竟不果及齊亡莊憤邑卒於鄴史終言之卒子恤翻光大二年乙酉上享太廟光大二年己丑齊復威宗諡曰文宣皇帝廟號顯祖齊改文宣諡號見上卷文帝天嘉六年諡神至翻光大二年丁酉周鄭桓公達奚武卒諡法辟土服遠曰桓卒子恤翻光大二年十二月丁亥齊主還鄴光大二年周大將軍鄭恪將兵平越巂置西寧州西寧州後改曰巂州巂音髓光大二年周齊爭宜陽久而不決勳州刺史韋孝寬謂其下曰周置勳州於玉壁宜陽一城之地不足損益兩國爭之勞師彌年彼豈無智謀之士若棄崤東宜陽在三崤之東我必失地今宜速於華谷及長秋築城以杜其意水經涑水出河內聞喜縣黍葭谷注云涑水所出俗謂之華谷又曰汾水過臨汾縣東又屈從縣南西流又西過長修縣南又西與華水合水出於北山華谷此所謂長秋蓋即漢長修縣故墟也俗語訛以修為長秋耳先悉薦翻圖之實難乃畫地形具陳其狀晉公護謂使者曰韋公子孫雖多數不滿百汾北築城遣誰守之事遂不行齊斛律光果出晉州道於汾北築華谷龍門二城五代志絳郡稷山縣有後魏龍門郡與孝寬相見光曰宜陽一城久勞爭戰今已舍彼舍讀曰捨欲於汾北取償幸勿怪也孝寬曰宜陽彼之要衝汾北我之所棄我棄彼取其償安在君輔翼幼主位望隆重不撫循百姓而極武窮兵苟貪尋常之地塗炭疲弊之民竊為君不取也為于偽翻光進圍定陽築南汾城以逼之魏收志後魏延興四年置定陽縣及定陽郡五代志文城郡吉昌縣後魏置定陽縣及定陽郡文城郡東魏置南汾州後周改曰汾州吉昌縣後唐避李國昌諱又改為吉鄉縣九域志屬汾州宋白曰慈州吉鄉縣本漢北屈縣後魏孝文帝置定陽郡及定陽縣時會有河西定陽胡人渡河居此因以為名晉公護問計於齊公憲憲曰兄宜暫出同州以為聲勢憲請以精兵居前隨機攻取護從之汾扶云翻三年光大三年春正月乙章十二行本乙作癸乙十一行本同孔本同丑以尚書右僕射徐陵為左僕射光大三年丁巳齊使兼散騎常侍劉環俊來聘散悉亶翻騎奇寄翻光大三年辛酉上祀南郊辛未祀北郊光大三年齊斛律光築十三城於西境汾北之地於鄴為西拓地五百里而未嘗伐功又與周韋孝寬戰於汾北破之齊公憲督諸將東拒齊師將即亮翻光大三年二月辛巳上祀明堂丁酉耕藉田藉秦昔翻光大三年壬寅齊以蘭陵王長恭為太尉趙彥深為司空和士開録尚書事徐之才為尚書令唐雍為左僕射吏部尚書馮子琮為右僕射仍攝選仍攝吏部選選須絹翻下典選同子琮素諂附士開至是自以太后親屬且典選頗亶引用人不復啓稟由是與士開有隙為子琮勸琅邪王儼殺士開張本復扶又翻光大三年三月丁丑大赦光大三年周齊公憲自龍門渡河此自夏陽渡汾陰也考異曰北齊書段韶傳云二月周師來寇周書帝紀云三月憲渡河今從之憲攻拔其新築五城齊太宰段韶蘭陵王長恭將兵禦周師攻柏谷城拔之而還此齊遺段韶等出伊洛以牽制汾北也將即亮翻下同光大三年夏四月戊寅朔日有食之光大三年壬午齊以琅邪王儼為太保邪音耶光大三年壬辰齊遣使來聘使疏吏翻光大三年周陳公純取齊宜陽等九城考異曰北齊斛律光傳云周柱國紇干廣略圍宜陽今從周帝紀騎奇寄翻光大三年五月癸亥周使納言鄭詡來聘唐六典後周天官府置御伯中大夫二人天子出入則侍于左右武帝改御伯為納言蓋侍中之職也光大三年周晉公護使中外府參軍郭榮城於姚襄城南定陽城西姚襄城者襄為桓溫所敗奔平陽所築後人因以為名杜佑曰今汾州吉昌縣西則姚襄所築城西臨黃河控帶龍門之險春秋時晉之北屈也郭榮之下有築字文意乃明破之六月韶圍定陽城考異曰韶傳七月屠其外城周書北齊帝紀皆云六月陷汾州今從之周汾州治定陽城隋改為吉昌縣汾州唐改為慈州屠其外城時韶臥病謂蘭陵王長恭曰此城三面重澗重直龍翻皆無走路唯慮東南一道耳賊必從此出宜簡精兵專守之此必成擒長恭乃令壯士千餘人伏於東南澗口城中糧盡齊公憲總兵救之憚韶不敢進敷帥見兵突圍夜走帥讀曰率見賢遍翻伏兵擊擒之盡俘其衆考異曰周書齊王憲傳屢破齊師北齊書斛律光段韶傳屢破周師要之周失汾州齊師勝耳乙巳齊取周汾州及姚襄城唯郭榮所築城獨存敷愔之族子也楊愔以死殉齊而敷為周死於城郭各盡忠於其所事也愔於今翻敷子素少多才藝少詩照翻有大志不拘小節以其父守節陷齊未蒙贈諡上表申理周主不許至於再三帝大怒命左右斬之素大言曰臣事無道天子死其分也分扶問翻帝壯其言贈敷大將軍諡曰忠壯諡法武而不遂曰壯漸見禮遇帝命素為詔書下筆立成詞義兼美帝曰勉之勿憂不富貴素曰但恐富貴來逼臣臣無心圖富貴也光大三年齊斛律光與周師戰於宜陽城下取周建安等四戍捕虜千餘人而還軍未至鄴齊主敕使散兵光以軍士多有功者未得慰勞乃密通表請遣使宣旨宣慰勞之旨也勞力到翻使疏吏翻下待使同齊朝發使遲留朝直遙翻下同軍還將至紫陌光乃駐營待使帝聞光軍已逼心甚惡之惡烏路翻亟令舍人召光入見然後宣勞散兵史言齊主已有疑斛律光之心見賢遍翻勞力到翻光大三年齊琅邪王儼以和士開穆提婆等專橫奢縱意甚不平橫戶孟翻二人相謂曰琅邪王眼光奕奕數步射人向者暫對不覺汗出吾輩見天子奏事尚不然由是忌之乃出儼居北宮北宮在鄴之北城不得無時見太后見賢遍翻儼之除太保也餘官悉解猶帶中丞及京畿士開等以北城有武庫欲移儼於外然後奪其兵權京畿大都督總京畿兵治直之翻與儼所親開府儀同三司高舍洛中常侍劉辟強説儼曰殿下被疏正由士開間搆説式芮翻被皮義翻疏與疏同間古莧翻何可出北宮入民間也儼謂侍中馮子琮曰士開罪重兒欲殺之何如馮子琮胡太后之妹夫故儼自稱曰兒因勸成之儼令子宜表彈士開罪請禁推請收禁而推鞫之彈徒丹翻帝主不審省而可之主字衍據北齊書琅邪王儼傳云後主不審省而可之通鑑就舊史刪潤以成一家言本云帝不審省而可之書吏繕寫因舊史之文遂衍主字杭本作齊主章十二行本正作齊主乙十一行本同孔本同張校同省悉井翻奉敕令領軍收士開魏收官氏志次南諸姓有庫狄氏誑居況翻且請覆奏子琮曰琅邪受敕何必更奏伏連信之發京畿軍士伏於神虎門外神虎門即神武門南北國四史成於唐臣之手避唐諱凡虎字悉改為武此獨存舊秋七月庚午旦士開依常早參依常日早入禁中朝參今有一大好事王子宜授以一函云有敕令王向臺因遣軍士護送儼遣都督馮永洛就臺斬之儼本意唯殺士開其黨因逼儼曰事既然不可中止儼遂帥京畿軍士三千餘人屯千秋門帥讀曰率帝使劉桃枝將禁兵八十人召儼將即亮翻桃枝遙拜儼命反縛將斬之禁兵散走帝又使馮子琮召儼儼辭曰士開昔來實合萬死謀廢至尊剃家家髮為尼剃他計翻臣為是矯詔誅之尊兄若欲殺臣不敢逃罪若赦臣願遣姊姊來迎臣即入見齊諸王皆呼嫡母為家家乳母為姊姊婦為妹妹為于偽翻見賢遍翻謂陸令萱也儼欲誘出殺之誘羊久翻令萱執刀在帝後聞之戰栗帝又使韓長鸞召儼儼將入劉辟強牽衣諫曰若不斬穆提婆母子殿下無由得入廣寧王孝珩安德王延宗自西來珩音行曰何不入辟強曰兵少少詩沼翻下謂少同延宗顧衆而言曰孝昭帝殺楊遵彥殺楊愔事見百六十八卷文帝天嘉元年今有數千何謂少帝泣啓太后曰有緣復見家家復扶又翻無緣永別乃急召斛律光儼亦召之光聞儼殺士開撫掌大笑曰龍子所為固自不似凡人以儼帝子故謂之龍子見帝於永巷見賢遍翻帝帥宿衛者步騎四百授甲將出戰帥讀曰率光曰小兒輩弄兵與交手即亂鄙諺云奴見大家心死大家謂主也臣妾呼天子為大家亦此義琅邪必不敢動帝從之光步道道讀曰導言步而前導也使人走出曰大家來儼徒駭散帝駐馬橋上遙呼之儼猶立不進光就謂曰天子弟殺一夫何所苦執其手強引以前強其兩翻請於帝曰琅邪王年少腸肥腦滿輕為舉措稍長自不復然邪音耶少詩照翻長謂年長音展兩翻願寬其罪帝拔儼所帶刀鐶亂築辮頭辮頭示將斬之也乃釋之收庫狄伏連高舍洛王子宜劉辟強都督翟顯貴翟萇伯翻又音狄於後園支解暴之都街帝欲盡殺儼府文武職吏光曰此皆勳貴子弟誅之恐人心不安趙彥深亦曰春秋責帥春秋左氏傳韓獻子謂中行桓子曰子為元帥師不用命誰之罪也帥所類翻於是罪之各有差太后責問儼儼曰馮子琮教兒太后怒遣使就內省以弓絃絞殺子琮使疏吏翻使內參以庫車載尸歸其家內參宦者也庫車載庫物者也每食必自嘗之慮鴆毒也光大三年八月己亥齊主如晉陽光大三年九月辛亥齊以任城王湝為太宰任音壬湝音皆又戶皆翻馮翊王潤為太師光大三年己未齊平原忠武王段韶卒韶有謀略得將士死力卒子恤翻將即亮翻出總軍旅入參幃幄功高望重而雅性溫慎得宰相體事後母孝閨門雍肅齊勳貴之家無能及者光大三年齊祖珽説陸令萱出趙彥深為兗州刺史齊主以珽為侍中陸令萱説帝曰人稱琅邪王聰明雄勇當今無敵觀其相表邪音耶説式芮翻相息亮翻殆非人臣自專殺以來常懷恐懼宜早為之計幸臣何洪珍等亦請殺之帝未決以食輿密迎珽問之食輿載梁肉以輸太官者也周公誅管叔周公使管叔監殷管叔以殷畔周公誅之左傳魯莊公有疾問後於叔牙對曰慶父材問於季友季友曰臣以死奉般乃使針季鴆叔牙而立般慶父使人弒般季友立閔公慶父又使人弒之季友以僖公適邾慶父奔莒季友乃入立僖公以賂求慶父于莒莒人歸之及密使公子奚斯請弗許哭而往慶父聞之曰奚斯之聲也乃縊慶父叔牙季友皆桓公之子兄弟也然而以鴆死者叔牙也夫漢儒固有以經義斷獄者若祖珽者舞經義以成其獄者也不可不察使右衛大將軍趙元侃誘儼執之誘音酉元侃曰臣昔事先帝見先帝愛王今寧就死不忍行此帝出元侃為豫州刺史庚午帝啓太后曰明旦欲與仁威早出獵儼字仁威帝召儼儼疑之陸令萱曰兄呼兒何為不去儼出至永巷劉桃枝反接其手儼呼曰乞見家家尊兄桃枝以袖塞其口呼火故翻塞悉則翻反袍蒙頭負出至大明宮鼻血滿面拉殺之拉盧合翻時年十四裹之以席埋於室內帝使啓太后太后臨哭十餘聲即擁入殿遺腹四男皆幽死冬十月罷京畿府入領軍以儼以京畿兵弄兵故罷之光大三年壬午周冀公通卒光大三年甲申上享太廟上二條據宋刻通鑑無注本增光大三年乙未周遣右武伯谷會琨等聘於齊五代志周置左右武伯掌內外衛之禁令兼六率之士左右小武伯各二人二之谷會虜復姓光大三年齊胡太后出入不節與沙門統曇獻通諸僧至有戲呼曇獻為太上皇者齊主聞太后不謹而未之信後朝太后朝直遙翻見二尼悅而召之乃男子也於是曇獻事亦發皆伏誅己亥帝自晉陽奉太后還鄴至紫陌遇大風舍人魏僧伽習風角伽戍迦翻奏言即時當有暴逆事帝詐云鄴中有變彎弓纏弰馳入南城弰所交翻弓末也北齊書胡后傳作纏矟鄴都有南北城遣宦者鄧長顒幽太后於北宮幽母之事隱於心而未發而暴風已應於上天人之際可畏哉顒魚容翻仍敕內外諸親皆不得與胡太后相見太后或為帝設食為于偽翻帝亦不敢嘗光大三年庚戌齊遣侍中赫連子悅聘于周光大三年十一月丁巳周主如散關散悉亶翻光大三年丙寅齊以徐州行臺廣寧王孝珩珩音行録尚書事庚午又以為司徒癸酉以斛律光為左丞相光大三年十二月己丑周主還長安光大三年壬辰邵陵公章昭達卒光大三年是歲梁華皎將如周華戶化翻過襄陽説衛公直曰梁主既失江南諸郡吳明徹章昭達再攻梁江南諸郡皆為陳所取説式芮翻朝廷興亡繼絶理宜資贍望借數州以資梁國直然之遣使言狀周主詔以基平鄀三州與之五代志竟陵郡豐鄉縣西魏置基州及章山郡又竟陵郡樂鄉縣舊置武寧郡西魏置鄀州又南郡紫陵縣其城南面梁置鄀州今周以與梁者蓋武寧之鄀州也當陽縣後周置平州少詩沼翻贍昌豔翻使疏吏翻鄀音若章錫琛標點容肇祖聶崇岐覆校
