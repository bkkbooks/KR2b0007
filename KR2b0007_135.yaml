body:
  text: 資治通鑑卷第一百三十五端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千六百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注齊紀一宋順帝下詔禪位于齊按蕭子顯齊書崔祖思傳宋朝初議封太祖為梁公祖思啓太祖曰讖書云金刀利刃齊刈之今宜稱齊實應天命太祖從之遂以齊建國太祖高皇帝諱道成姓蕭氏字紹伯小字鬬將本居東海蘭陵縣中都鄉中都里晉惠帝分東海為蘭陵郡故為蘭陵郡人高祖整過江居晉陵武進縣之東城里時寓居江左者皆僑置本土加以南名更為南蘭陵人整生雋雋生樂子樂子生承之承之生帝建元元年己未四七九是年四月受禪始改元建元宋順帝下詔禪位于齊春正月甲辰以江州刺史蕭嶷為都督荊湘等八州諸軍事荊州刺史嶷魚力翻尚書左僕射王延之為江州刺史安南長史蕭子良為督會稽等五郡諸軍事會稽太守去年已命蕭映蕭晃分鎮兗豫矣嶷道成次子也子良道成之孫也江左之勢莫重於上流莫富於東土故又分布子孫以居之會工外翻守式又翻初沈攸之欲聚衆開民相告士民坐執役者甚衆嶷至鎮一日罷遣三千餘人府州儀物務存儉約輕刑薄斂斂力贍翻所部大悅宋順帝下詔禪位于齊辛亥以竟陵世子賾為尚書僕射進號中軍大將軍開府儀同三司道成進爵竟陵郡公故賾為竟陵世子賾七革翻宋順帝下詔禪位于齊太傅道成以謝朏有重名必欲引參佐命以為左長史嘗置酒與論魏晉故事因曰石苞不早勸晉文死方慟哭方之馮異非知機也晉文王薨石苞自揚州奔喪慟哭曰基業如此而以人臣終乎馮異勸漢光即尊位道成言石苞不能早勸晉文為禪代之事比之馮異勸漢光苞非知機者也欲以此言感動謝朏耳朏敷尾翻晉文世事魏室必將身終北面借使魏依唐虞故事亦當三讓彌高言三以天下讓則節行彌高也甲寅以朏為侍中更以王儉為左長史更工衡翻宋順帝下詔禪位于齊丙辰以給事黃門侍郎蕭長懋為雍州刺史長懋道成嫡長孫也宋順帝下詔禪位于齊二月丙子邵陵殤王友卒宋順帝下詔禪位于齊辛巳魏太皇太后及魏主如代郡溫泉宋順帝下詔禪位于齊甲午詔申前命命太傅贊拜不名前命見上卷上年宋順帝下詔禪位于齊己亥魏太皇太后及魏主如西宮西宮魏太祖天賜元年所築宋順帝下詔禪位于齊三月癸卯朔日有食之宋順帝下詔禪位于齊甲辰以太傅為相國總百揆封十郡為齊公時以青州之齊郡徐州之梁郡南徐州之蘭陵魯郡琅邪東海晉陵義興揚州之吳郡會稽十郡封其驃騎大將軍揚州牧南徐州刺史如故驃匹妙翻騎奇寄翻己章甲十一行本己作乙乙十一行本同張校同巳詔齊國官爵禮儀並倣天朝朝直遙翻丙午以世子賾領南豫州刺史宋順帝下詔禪位于齊楊運長去宣城郡還家齊公遣人殺之楊運長守宣城見上卷宋升明元年蕭子顯齊志臨淮郡有淩縣應劭曰淩水出淩縣西南入淮酈道元曰淩水出淩縣東流徑其縣故城東而東南流入淮義慶之孫也義慶長沙王第二子襲道規封説輸芮翻君先帝舊人身是宗室近屬如此形勢豈得久全若招合內外計多有從者臺城內人常有此心苦無人建意耳智即以告齊公庚戌誅綽兄弟及其黨與宋順帝下詔禪位于齊甲寅齊公受策命赦其境內以石頭為世子宮一如東宮褚淵引何曾自魏司徒為晉承相故事求為齊官齊公不許以王儉為齊尚書右僕射領吏部儉時年二十八夏四月壬申朔進齊公爵為王增封十郡時又增徐州之南梁陳潁川陳留南兗州之盱眙山陽秦廣陵海陵南沛等十郡甲戌武陵王贊卒非疾也史言齊殺之丙戌加齊王殊禮進世子為太子辛卯宋順帝下詔禪位于齊壬辰帝當臨軒不肯出逃于佛蓋之下自晉以來宮中有佛屋以嚴事佛像上為寶蓋以覆之宋帝逃於其下以板輿入迎帝太后懼自帥閹人索得之帥讀曰率閹衣廉翻索止客翻敬則啓譬令出引令升車帝收淚謂敬則曰欲見殺乎敬則曰出居別宮耳官先取司馬家亦如此帝泣而彈指曰願後身世世勿復生天王家復扶又翻宮中皆哭帝拍敬則手曰必無過慮當餉輔國十萬錢敬則時為輔國將軍史言帝庸暗百僚陪位侍中謝朏在直當解璽綬陽為不知曰有何公事傳詔云解璽綬授齊王傳詔屬中書舍人出入宣傳詔旨又考南史郡府謂之傳教天臺謂之傳詔璽斯氏翻綬音受齊自應有侍中乃引枕臥傳詔懼使朏稱疾欲取兼人欲取兼侍中者我無疾何所道遂朝服步出東掖門仍登車還宅朝直遙翻乃以王儉為侍中解璽綬禮畢帝乘畫輪車畫輪車者車輪施文畫也晉志云畫輪車上開四望緑油幢朱絲絡兩箱裏飾以金錦黃金塗五采蕭子顯曰漆畫輪車金塗校飾如輦微有減降杜佑曰晉制駕車以采漆畫輪轂上起四夾杖左右開四望緑油纁朱絲青交絡其上形如輦其下猶犢車掖音亦問今日何不奏鼓吹左右莫有應者右光祿大夫王琨華之從父弟也王華早入宋公霸府元嘉初輔政吹尺睡翻從才用翻下同至是攀車獺尾慟哭獺毛可以辟塵故懸之於車人以壽為歡老臣以壽為戚既不能先驅螻蟻謂不能早死也嗚咽不自勝復扶又翻勝音升百官雨泣言涕泣如雨也宋永初元年受晉禪歲在庚申八主六十年而亡司空兼太保褚淵等奉璽綬帥百官詣齊宮勸進帥讀曰率王辭讓未受淵從弟前安成太守照謂淵子賁曰司空今日何在賁曰奉璽綬在齊大司馬門照曰不知汝家司空將一家物與一家亦復何謂照與照同之笑翻復扶又翻下乃復同賁後辭爵廬墓蓋深感照之言也甲午王即皇帝位于南郊還宮大赦改元奉宋順帝為汝陰王優崇之禮皆倣宋初築宮丹楊丹楊南史作丹徒丹楊為是齊史云築宮於丹楊故縣宋神主遷汝陰廟諸王皆降為公自非宣力齊室餘皆除國獨置南康華容蓱鄉三國以奉劉穆之王弘何無忌之後王弘之後不除國以王儉佐命耳蓱與萍同萍鄉縣吳寶鼎二年置宋白曰楚昭王渡江獲萍實於此今縣北有萍實里楚王臺因以名縣二臺官僚依任攝職二臺謂宋臺齊臺也別更詳議長直亮翻多而有餘也以褚淵為司徒賓客賀者滿座褚照歎曰彥回少立名行何意披猖至此披猖言披靡而猖獗也披普皮翻少詩照翻行下孟翻乃復有今日之拜使彥回作中書郎而死不當為一名士邪名德不昌乃復有期頤之壽曲禮曰人生百年曰期頤鄭注云期要也頤養也不知衣服食味孝子要盡養道而已奉朝請河東裴顗上表數帝過惡挂冠徑去帝怒殺之奉朝請者奉朝會請召而已非有職任也裴顗在宋朝既無職任又無卓犖奇節惟不食齊粟遂得垂名青史君子惡沒世而名不稱正為此也朝直遙翻顗魚豈翻數所具翻帝曰殺之遂成其名正應容之度外耳久之因事廢于家帝問為政於前撫軍行參軍沛國劉瓛瓛胡官翻對曰政在孝經凡宋氏所以亡陛下所以得者皆是也陛下若戒前車之失加之以寬厚雖危可安若循其覆轍雖安必危矣帝歎曰儒者之言可寶萬世宋順帝下詔禪位于齊丙申魏主如崞山崞音郭宋順帝下詔禪位于齊丁酉以太子詹事張緒為中書令齊國左衛將軍陳顯達為中護軍右衛將軍李安民為中領軍緒岱之兄子也宋順帝下詔禪位于齊戊戌以荊州刺史嶷為尚書令驃騎大將軍開府儀同三司揚州刺史嶷魚力翻驃匹妙翻騎奇寄翻南兗州刺史映為荊州刺史宋順帝下詔禪位于齊帝命㣥臣各言得失淮南宣城二郡太守劉善明江左僑立淮南郡於宣城郡界故善明兼守二郡請除宋氏大明泰始以來諸苛政細制以崇簡易易以豉翻又以為交州險遠宋末政苛遂至怨叛宋明帝泰始四年李長仁據交州而叛宜懷以恩德且彼土所出唯有珠寶實非聖朝所須之急朝直遙翻討伐之事謂宜且停給事黃門郎清河崔祖思亦上言以為人不學則不知道禮記學記之言上時掌翻悖蒲內翻又蒲沒翻今無員之官空受祿力雕耗民財無員之官員外官也下所謂限外之人是也祿者所食之祿力者所役之人課臺府州國限外之人各從所樂依方習業漢書賈山傳使皆務其方而高其節注云方道也樂音洛遣還故郡經藝優殊者待以不次又今陛下雖躬履節儉而㣥下猶安習侈靡宜褒進朝士之約素清修者朝直遙翻貶退其驕奢荒淫者則風俗可移矣宋元嘉之世凡事皆責成郡縣世祖徵求急速以郡縣遲緩始遣臺使督之使疏吏翻下同自是使者所在旁午競作威福營私納賂公私勞擾會稽太守聞喜公子良上表極陳其弊會工外翻以為臺有求須但明下詔敕為之期會則人思自竭若有稽遲自依糾坐之科今雖臺使盈湊會取正屬所辦謂使者雖多亦當取辦於所屬也反更淹懈宜悉停臺使懈居隘翻員外散騎郎劉思效上言散悉亶翻騎奇寄翻宋自大明以來漸見凋弊徵賦有加而天府尤貧天府謂天子之府藏也殆無生意而貴族富室以侈麗相高乃至山澤之民不敢采食其水草陛下宜一新王度王度王法也上皆加褒賞或以表付外使有司詳擇所宜奏行之己亥詔二宮諸王悉不得營立屯邸封略山湖二宮謂上宮及東宮上宮諸王皇子也東宮諸王皇孫也杜預曰不以道取曰略又曰略封界也宋順帝下詔禪位于齊魏主還平城還從宣翻又如字宋順帝下詔禪位于齊魏秦州刺史尉洛侯雍州刺史宜都王目辰長安鎮將陳提等皆坐貪殘不法洛侯目辰伏誅提徙邊尉紆勿翻雍於用翻將即亮翻又詔以候官千數魏太祖置候官以伺察內外輕罪吹毛發舉言吹毛求疵也更置謹直者數百人使防邏街術更工衡翻邏郎佐翻術讀曰遂又食聿翻説文曰術邑中道執喧鬬者而已自是吏民始得安業宋順帝下詔禪位于齊自泰始以來內外多虞將帥各募部曲屯聚建康將即亮翻帥所類翻李安民上表以為自非淮北常備外餘軍悉皆輸遣輸送也聽限人數上從之五月辛亥詔斷衆募斷丁管翻宋順帝下詔禪位于齊壬子上賞佐命之功褚淵王儉等進爵增戶各有差考異曰南史崔祖思傳曰帝將加九錫內外皆贊成之祖思獨曰公以仁恕匡社稷執股肱之義君子愛人以德不宜如此帝聞而非之曰祖思遠同荀令豈孤所望也由此不復處任職而禮貌甚重垣崇祖受密旨參訪朝臣光祿大夫垣閎曰身受宋氏厚恩復蒙明公眷接進不敢同退不敢異冠軍將軍崔文仲與崇祖意同及帝受禪閎存故爵文仲崇祖皆封侯祖思加官而已按宋朝初議封帝為梁公祖思啓高帝曰讖云金刀利刃齊刈之今宜稱齊實應天命從之然則祖思安得盡誠節於宋今刪之處昌呂翻我作齊書已竟贊云淵既世族儉亦國華不賴舅氏遑恤國家點尚之孫也何尚之仕宋貴顯於太祖世祖之時繼母吳郡公主又尚巴西公主儉母武康公主又尚陽羡公主故點云然宋順帝下詔禪位于齊己未或走馬過汝陰王之門衛士恐有為亂者奔入殺王而以疾聞上不罪而賞之辛酉殺宋宗室陰安公燮等無少長皆死前豫州刺史劉澄之遵考之子也少詩照翻長知兩翻劉遵考見一百二十八卷孝武孝建二年與褚淵善淵為之固請為于偽翻曰澄之兄弟不武且於劉宗又疏故遵考之族獨得免遵考弟思考有子季連亂蜀宋順帝下詔禪位于齊丙寅追尊皇考曰宣皇帝皇妣陳氏曰孝皇后考異曰南史在四月甲午今從齊書宋順帝下詔禪位于齊丁卯封皇子鈞為衡陽王宋順帝下詔禪位于齊上謂兗州刺史垣崇祖曰吾新得天下索虜必以納劉昶為辭侵犯邊鄙南謂北為索虜以魏本索頭種也索昔各翻非卿無以制此虜也乃徙崇祖為豫州刺史宋順帝下詔禪位于齊六月丙子嚴子改申誅遊擊將軍姚道和以其二於沈攸之也事見上卷宋順帝升明之元年也宋順帝下詔禪位于齊甲子立王太子賾為皇太子皇子嶷為豫章王映為臨川王晃為長沙王曄為武陵王皓為安成王鏘為鄱陽王鑠為桂陽王鑑為廣陵王曄筠輒翻皓古老翻鏘于羊翻鑠書藥翻皇孫長懋為南郡王宋順帝下詔禪位于齊乙酉葬宋順帝于遂寧陵宋順帝下詔禪位于齊帝以建康居民舛雜多姦盜欲立符伍以相檢括右僕射王儉諫曰京師之地四方輻湊必也持符於事既煩理成不曠謝安所謂不爾何以為京師也乃止宋順帝下詔禪位于齊初交州刺史李長仁卒從弟叔獻代領州事以號令未行遣使求刺史於宋從才用翻使疏吏翻宋以南海太守沈煥為交州刺史以叔獻為煥寧遠司馬武平新昌二郡太守吳孫晧建衡三年討扶嚴夷以其地置武平郡是年又分交趾立新興郡晉武帝泰康三年更名新昌皆屬交州隋廢武平郡為隆平縣廢新昌郡為嘉寧縣並屬交趾郡唐改隆平為太平仍屬交趾以嘉寧縣為峯州朝直遙翻人情服從遂發兵守險不納煥煥停鬱林病卒秋七月丁未詔曰交趾比景獨隔書朔言其拒命不受正朔也古者天子常以季冬頒來歲十二月之朔于諸侯諸侯受而藏之祖廟至月朔則以特羊告廟請而行之因迷遂往宜曲赦交州即以叔獻為刺史撫安南土宋順帝下詔禪位于齊魏葭蘆鎮主楊廣香請降降戶江翻丙辰以廣香為沙州刺史以輿地記參考此沙州當置於唐利州景谷縣界宋順帝下詔禪位于齊八月乙亥魏主如方山方山在平城北如渾水上魏主與馮太后將營壽陵於此故數至其地丁丑還宮宋順帝下詔禪位于齊上聞魏將入寇九月乙巳以豫章王嶷為荊湘二州刺史都督如故是年春正月以嶷刺荊州都督八州今兼刺湘州宋順帝下詔禪位于齊丙午以司空褚淵領尚書令宋順帝下詔禪位于齊壬子魏以侍中司徒東陽王丕為太尉侍中尚書右僕射陳建為司徒侍中尚書代人苟頽為司空魏書官氏志神元時餘部內入諸姓有若干氏後改為苟氏宋順帝下詔禪位于齊己未魏安樂厲王長樂謀反賜死樂音洛宋順帝下詔禪位于齊庚申魏隴西宣王源賀卒宋順帝下詔禪位于齊冬十月己巳朔魏大赦宋順帝下詔禪位于齊癸未嚴癸未改辛巳汝陰太王氏卒即宋明帝王皇后也順帝禪位封汝陰王太后降為太宋順帝下詔禪位于齊初晉壽民李烏奴與白水氐楊成等寇梁州水經注白水西北出臨洮縣東南西傾山水色白濁東南入陰平界氐居水上者號白水氐擊成破之説輸芮翻降戶江翻及沈攸之事起見上卷宋順帝升明元年聲云入援實候望形勢事平朝廷遣王玄邈代之詔柏年與烏奴俱下烏奴勸柏年不受代柏年計未決玄邈已至柏年乃留烏奴於漢中還至魏興盤桓不進左衛率豫章胡諧之嘗就柏年求馬柏年曰馬非狗也安能應無已之求待使者甚薄使者還語諧之曰柏年云胡諧之何物狗所求無厭語牛倨翻厭於鹽翻諧之恨之譖於上曰柏年恃險聚衆欲專據一州上使雍州刺史南郡王長懋誘柏年啓為府長史雍於用翻誘音酉柏年至襄陽上欲不問諧之曰見虎格得而縱上山乎格捕也鬬也甲午賜柏年死李烏奴叛入氐依楊文弘引氐兵千餘人寇梁州陷白馬戍白馬戍在沔水北即陽平關也降戶江翻烏奴輕兵襲州城玄邈伏兵邀擊大破之烏奴挺身復走入氐初玄邈為青州刺史宋泰始初玄邈據盤陽以拒魏因用為青州刺史為宋太宗所疑事見一百三十二卷泰始六年遣書結玄邈玄邈長史清河房叔安曰將軍居方州之重無故舉忠孝而棄之三齊之士寧蹈東海而死耳自項羽分立諸侯王分齊地為三王後遂稱齊地為三齊猶關中稱三秦也玄邈乃不答上書考異曰南史云仍遣叔安奉表詣闕告之帝於路執之並求玄邈表叔安曰王將軍表上天子不上將軍且僕之所言利國家不利將軍無所應問荀伯玉勸帝殺之帝曰物各為主無所責也按太祖時為邊將若執叔安又不殺便應不復為宋臣齊書無此事今不取至淮陰嚴軍直過至建康啓太宗稱上有異志及上為驃騎蒼梧既弒上進驃騎大將軍玄邈甚懼而上待之如初及破烏奴上曰玄邈果不負吾意遇也叔安為寧蜀太守宋永初中分廣漢為寧蜀郡欲用為梁州會病卒宋順帝下詔禪位于齊十一月辛亥立皇太子裴氏宋順帝下詔禪位于齊癸丑魏遣假梁郡王嘉督二將出淮陰隴西公琛督三將出廣陵河東公薛虎子督三將出壽陽奉丹楊王劉昶入寇景和之初昶奔魏將即亮翻下同世胙江南稱藩于魏建置社稷曰胙又守社稷曰胙宋明泰豫元年誕降魏酋慈由翻義陽民謝天蓋自稱司州刺史欲以州附魏魏樂陵鎮將韋珍引兵渡淮應接魏置樂陵鎮於比陽在今唐州界韋珍略七千餘戶而去考異曰齊蕭景先傳云天蓋與虜相構扇景先言於督府豫章王遣惠朗助景先討天蓋黨與虜尋遣偽南部尚書類跋屯汝南洛州刺史昌黎王馮莎屯清丘景先嚴備待敵虜退魏韋珍傳云天蓋自署司州刺史規以內附事泄為道成將崔慧景所攻圍詔珍帥在鎮士馬渡淮援接時道成聞珍將至遣將荀元賓據淮逆拒珍珍腹背奮擊破之天蓋尋為左右所殺降於慧景珍乘勝馳進又破慧景擁降民七千餘戶內徙表置城陽剛陵義陽三郡以處之按魏將無類跋馮莎而慧景亦非討天蓋之將蓋時二國之史各出傳聞互有訛謬今約取二史大概而用之上之從子也從才用翻南兗州刺史王敬則聞魏將濟淮委鎮還建康士民驚散既而魏竟不至上以其功臣不問上之輔宋也遣驍騎將軍王洪範使柔然約與共攻魏洪範自蜀出吐谷渾歷西域乃得達驍堅堯翻騎奇寄翻下同使疏吏翻吐從暾入聲谷音浴考異曰齊書作王洪軌今從齊紀至是柔然十餘萬騎寇魏至塞上而還還從宣翻又如字宋順帝下詔禪位于齊是歲魏詔中書監高允議定律令允雖篤老而志識不衰詔以允家貧養薄令樂部絲竹十人五日一詣允以娛其志朝晡給膳朔望致牛酒月給衣服綿絹入見則備几杖問以政治晡奔謨翻見賢遍翻治直吏翻宋順帝下詔禪位于齊契丹莫賀弗勿干帥部落萬餘口入附于魏居白狼水東契丹酋帥曰莫賀弗隋書曰契丹與庫莫奚皆東胡種為慕容氏所破竄於松漠之間是時為高麗所侵求內附于魏水經注白狼水出右北平白狼縣東南東北流徑龍城西南又東南流至遼東房縣入于遼水初學記狼河附黃龍城東北下即白狼水契欺訖翻又音喫帥讀曰率二年庚申四八以司空褚淵為司徒春正月戊戌朔大赦以司空褚淵為司徒以司空褚淵為司徒尚書右僕射王儉為左僕射淵不受考異曰齊書建元二年正月以淵為司徒十二月戊戌以淵為司徒四年六月癸卯以司徒褚淵為司空八月癸卯司徒褚淵薨淵傳三年為司徒又固讓四年寢疾遜位改授司空及薨詔曰司徒奄至薨逝蓋二年正月辭十二月受耳紀傳前後各不相顧以司空褚淵為司徒辛丑上祀南郊以司空褚淵為司徒魏隴西公琛等攻拔馬頭戍殺太守劉從琛丑林翻乙卯詔內外纂嚴發兵拒魏徵南郡王長懋為中軍將軍鎮石頭以司空褚淵為司徒魏廣川莊王略卒以司空褚淵為司徒魏師攻鍾離徐州刺史崔文仲擊破之文仲遣軍主崔孝伯渡淮攻魏茌眉戍主龍得侯等殺之茌仕疑翻孫愐曰龍姓也考異曰齊紀作龍渴侯今從齊書文仲祖思之族人也㣥蠻依阻山谷連帶荊湘雍郢司五州之境雍於用翻聞魏師入寇章甲十一行本空格作官字乙十一行本同孔本同盡發民丁南襄城蠻秦遠乘虛寇潼陽殺縣令蕭子顯齊志寧蠻府領郡有南襄城東襄城北襄城中襄城郡蓋因㣥蠻部落分署為郡也五代志淮安郡慈丘縣有後魏襄城郡沈約宋志汶陽郡領潼陽沮陽高安三縣蓋皆宋初置也水經注曰東汶陽郡沮陽縣沮水出其西北東南徑汶陽郡北即高安縣界郡治錫城縣故新城郡之下邑義熙初分新城立郡其地當在臨沮縣西蕭子顯曰桓溫以臨沮西界水陸紆險道帶蠻蛋田土肥美立為汶陽郡以處流民平昌戍主苟元賓擊破之北上黃蠻文勉德寇汶陽考異曰齊紀作文施德今從齊書嚴賓改孫棄城奔江陵晉武帝平吳割中廬之南鄉臨沮之北鄉立上黃縣治軨鄉屬襄陽郡晉安帝分屬長寧郡宋明帝以名與文帝陵同改為永寧郡五代志竟陵郡章山縣西魏置上黃郡今荊門軍長林縣即古之長寧縣有章山九域志曰山即禹貢所謂內方也宋白曰上黃縣隋改南漳縣至當陽章懷太子賢曰當陽縣西北即臨沮故城將即亮翻下同秦遠遁去降戶江翻魏將薛道標引兵趣壽陽上使齊郡太守劉懷慰作冠軍將軍薛淵書以招道標趣七喻翻冠古玩翻魏人聞之召道標還還從宣翻又如字使梁郡王嘉代之懷慰乘民之子也劉乘民見一百三十一卷宋明帝泰始二年丁卯朔嘉與劉昶寇壽陽將戰昶四向拜將士流涕縱橫縱子容翻曰願同戮力以雪讎恥魏步騎號二十萬騎奇寄翻豫州刺史垣崇祖集文武議之欲治外城堰肥水以自固皆曰昔佛貍入寇見一百二十五卷宋文帝元嘉二十七年治直之翻佛音弼數倍於今猶以郭大難守退保內城且自有肥水未嘗堰也恐勞而無益崇祖曰若棄外城虜必據之外修樓櫓內築長圍則坐成擒矣守郭築堰是吾不諫之策也言策已先定足以制敵不為人所諫止據水經肥水自黎漿亭北流過壽春城東此立堰於西北者西北虜衝也又因上流之勢可決以灌虜今安豐軍有小史埭即崇祖決堰處周為深塹塹七豔翻使數千人守之曰虜見城小以為一舉可取必悉力攻之以謀破堰吾縱水衝之皆為流尸矣魏人果蟻附攻小城崇祖著白紗帽肩輿上城著則略翻上時掌翻晡時決堰下水魏攻城之衆漂墜塹中人馬溺死以千數溺奴狄翻魏師退走以司空褚淵為司徒謝天蓋部曲殺天蓋以降降戶江翻以司空褚淵為司徒宋自孝建以來政綱弛紊簿籍訛謬上詔黃門郎會稽虞玩之等更加檢定曰黃籍民之大紀國之治端杜佑曰黃籍者戶口版籍也會工外翻治直吏翻下求治同何以釐革玩之上表以為元嘉中故光祿大夫傅隆年出七十猶手自書籍躬加隱校隱者痛核其實也必在勤明令長長知兩翻愚謂宜以元嘉二十七年籍為正更立明科一聽首悔首式又翻迷而不返依制必戮若有虛昧州縣同科上從之以司空褚淵為司徒上以㣥蠻數為叛亂數所角翻分荊益置巴州以鎮之壬申以三巴校尉明慧昭為巴州刺史領巴東太守宋明帝泰始二年以三峽險隘山蠻寇賊議立三巴校尉以鎮之尋省順帝升明二年復置校戶教翻齊之境內有州二十三郡三百九十縣千四百八十五州二十三揚南徐豫南豫南兗北兗北徐青冀江廣交越荊巴郢司雍湘梁秦益寧也郡三百九十有寄治者有新置者有俚郡獠郡荒郡左郡無屬縣者有或荒無民戶者郡縣之建置雖多而名存實亡境土蹙於宋大明之時矣乙酉崔文仲遣軍主陳靖拔魏竹邑殺戍主白仲都崔叔延破魏睢陵殺淮陽太守梁惡竹邑漢沛郡之竹縣也後漢晉曰竹邑後廢魏蓋於故地置戍也賢曰竹故城在今徐州符離縣睢陵漢縣屬臨淮後漢晉屬下邳宋孝武大明元年度屬濟陰時入魏置淮陽郡以司空褚淵為司徒三月丁酉朔以侍中西昌侯鸞為郢州刺史鸞帝兄始安貞王道生之子也早孤為帝所養恩過諸子為後鸞奪國殺帝子孫張本以司空褚淵為司徒魏劉昶以雨水方降表請還師魏人許之丙午遣車騎大將軍馮熙將兵迎之騎奇寄翻將即亮翻以司空褚淵為司徒夏四月辛巳魏主如白登山五月丙申朔如火山杜佑曰雲州治雲中縣縣界有白登山白登臺水經注曰白登南有武周川川東南有火山山上有火井南北六十七步廣減尺許源深不見底炎勢上升常若微雷發響以草爨之則煙騰火發壬寅還平城以司空褚淵為司徒自晉以來建康宮之外城唯設竹籬而有六門會有發白虎樽者晉志正旦元會設白虎樽於殿庭樽蓋上施白獸若有能獻直言者則發此樽飲酒按禮白獸樽乃杜舉之遺式為白獸蓋是後代所為示忌憚也白獸即白虎晉書避唐諱改曰獸白門三重關竹籬穿不完重直龍翻上感其言命改立都牆以司空褚淵為司徒李烏奴數乘間出寇梁州數所角翻間古莧翻豫章王嶷遣中兵參軍王圖南將益州兵從劍閣掩擊之梁南秦二州刺史崔慧景發梁州兵屯白馬與圖南覆背擊烏奴嶷魚力翻將即亮翻覆當作腹大破之烏奴走保武興考異曰魏書帝紀八月慧景寇武興今從慧景傳祖思之族人也以司空褚淵為司徒秋七月辛亥魏主如火山以司空褚淵為司徒戊午皇太子穆裴氏卒卒諡曰穆以司空褚淵為司徒詔南郡王長懋移鎮西州以司空褚淵為司徒角城戍主舉城降魏角城注見下年降戶江翻八月丁酉魏遣徐州刺史梁郡王嘉迎之又遣平南將軍郎大檀等三將出胊城魏收志琅邪胊縣有胊城胊音劬海西即漢海西縣地也宋明帝失淮北僑立青州於贛榆縣泰始七年割贛榆置鬱縣立海西郡齊明帝以為東海郡東魏武定七年改海西郡又分襄賁置海西縣連口漣水入淮之口也時在襄賁縣界隋改襄賁縣為漣水縣杜佑曰楚州漣水縣有連口渡應劭曰賁音肥鎮南將軍賀羅出下蔡據班志下蔡春秋之州來國也為楚所滅後吳取之至夫差遷蔡昭侯于此後四世侯齊竟為楚所滅故曰下蔡漢為縣屬沛郡後省東魏武定六年以梁黃城戍為下蔡郡隋為縣屬汝陰郡以下垣崇祖徙下蔡戍考之則此戍置於淮水之西五代時周世宗徙壽春治下蔡即其地以司空褚淵為司徒甲辰魏主如方山戊申遊武州山石窟寺水經注曰武周川水東南流水側有石祇洹舍並諸窟室比丘尼所居也其水又東轉靈巖南鑿石開山因巖結構真容巨壯法世所稀據道元之言浮屠氏巨麗處也庚戌還平城以司空褚淵為司徒崔慧景遣長史裴叔保攻李烏奴於武興為氐王楊文弘所敗敗補邁翻以司空褚淵為司徒九月甲午朔日有食之以司空褚淵為司徒丙午柔然遣使來聘使疏吏翻以司空褚淵為司徒汝南太守常元真龍驤將軍胡青苟降於魏驤思將翻降戶江翻以司空褚淵為司徒閏月辛巳遣領軍李安民循行清泗諸戍以備魏行下孟翻以司空褚淵為司徒魏梁郡王嘉帥衆十萬圍胊山帥讀曰率胊山戍主玄元度嬰城固守孫愐曰玄姓也將即亮翻下同庚寅元度大破魏師臺遣軍主崔靈建等將萬餘人自淮入海夜至各舉兩炬魏師望見遁去以司空褚淵為司徒冬十月王儉固請解選職許之加儉侍中以太子詹事何戢領選選須絹翻戢阻立翻又疾立翻上以戢資重欲加常侍褚淵曰聖旨每以蟬冕不宜過多臣與王儉既已左珥若復加戢則八座遂有三貂自漢以來侍中常侍皆左貂令僕與列曹尚書為八座據戢傳帝為領軍戢為司徒左長史相與來往數與歡宴戢蓋龍潛之舊也復扶又翻亦為不少沈約曰驍騎將軍遊擊將軍並漢雜號將軍也魏置為中軍及晉以領護左右衛驍遊為六軍不少者謂其取數已多也少詩沼翻加驍騎將軍驍堅堯翻騎奇寄翻以司空褚淵為司徒甲辰以沙州刺史楊廣香為西秦州刺史又以其子炅為武都太守炅古迥翻又古惠翻以司空褚淵為司徒丁未魏以昌黎王馮熙為西道都督與征南將軍桓誕出義陽鎮南將軍賀羅出鍾離同入寇以司空褚淵為司徒淮北四州民不樂屬魏四州入魏事見一百三十三卷宋明帝泰始三年樂音洛上多遣間諜誘之間古莧翻諜徒協翻誘音酉於是徐州民桓標之考異曰魏書蘭陵民桓富蓋即標之也今從齊書聚衆保五固推司馬朗之為主魏遣淮陽王尉元平南將軍薛虎子等討之尉紆勿翻以司空褚淵為司徒十一月戊寅丹陽尹王僧虔上言郡縣獄相承有上湯殺囚名為救疾實行寃暴因囚有時行瘟疫宜汗遂上湯以蒸殺之上時掌翻而潛制下邑愚謂囚病必先刺郡刺謂州刺史郡謂郡守也或曰書病囚之姓名而白之於郡曰刺職司謂郡曹掌刑獄者然後處治處治謂處方治病也省悉景翻處昌呂翻治直之翻以司空褚淵為司徒戊子以楊難當之孫後起為北秦州刺史武都王鎮武興以司空褚淵為司徒十二月戊戌以司空褚淵為司徒淵入朝以腰扇障日腰扇佩之於腰今謂之摺疊扇朝直遙翻下同曰作如此舉止羞面見人扇障何益淵曰寒士不遜祥曰不能殺袁劉安得免寒士謂殺袁粲劉秉也穆之之孫也祥好文學而性韻剛疏撰宋書譏斥禪代王儉密以聞坐徙廣州而卒劉穆之宋朝佐命元臣祥以是得罪於齊可謂無忝厥祖矣好呼到翻太子宴朝臣於玄圃東宮有玄圃文季怒曰淵自謂忠臣不知死之日何面目見宋明帝太子笑曰沈率醉矣史言褚淵失節人得以面斥之率所律翻以司空褚淵為司徒壬子以豫章王嶷為中書監司空揚州刺史以臨川王映為都督荊雍等九州諸軍事荊州刺史嶷魚力翻雍於用翻以司空褚淵為司徒是歲魏尚書令王睿進爵中山王加鎮東大將軍置王官二十二人以中書侍郎鄭羲為傅郎中令以下皆當時名士又拜睿妻丁氏為此事傳之史策可以為王睿榮邪三年辛酉四八一垣崇祖之敗魏師也春正月封皇子鋒為江夏王夏戶雅翻垣崇祖之敗魏師也魏人寇淮陽圍軍主成買於甬城甬城當作角城水經注角城在下邳睢陵縣南臨淮水其地據濟水入淮之口後梁武帝置淮陽郡角城為縣屬焉高閭曰角城去淮陽十八里杜佑曰角城晉安帝義熙中置在宿遷縣界五代志作甬城與軍主周盤龍等救之魏人緣淮大掠江北民皆驚走渡江成買力戰而死盤龍之子奉叔以二百人陷陳深入陳讀曰陳下魏陳同魏以萬餘騎張左右翼圍之騎奇寄翻下同或告盤龍云奉叔已沒盤龍馳馬奮矟直突魏陳所向披靡矟色角翻披普彼翻奉叔已出復入求盤龍復扶又翻父子兩騎縈擾魏數萬之衆莫敢當者魏師遂敗殺傷萬計魏師退李安民等引兵追之戰於孫溪渚又破之孫溪渚在淮陽之北清水之濱垣崇祖之敗魏師也己卯魏主南巡司空苟頽留守丁亥魏主至中山垣崇祖之敗魏師也二月丁章甲十一行本丁作辛乙十一行本同孔本同卯朔魏大赦垣崇祖之敗魏師也丁酉遊擊將軍桓康復敗魏師於淮陽復扶又翻下復如同敗蒲邁翻進攻樊諧城拔之考異曰齊紀作樊階城今從齊書垣崇祖之敗魏師也魏主自中山如信都癸卯復如中山庚戌還至肆州魏收志曰肆州治九原天賜二年為鎮真君七年置肆州領永安秀容鴈門三郡宋白曰魏置肆州理秀容城秀容本漢陽曲縣地周武帝徙肆州於鴈門沙門法秀以妖術惑衆謀作亂於平城妖於遙翻苟頽帥禁兵收掩悉擒之帥讀曰率魏主還平城有司囚法秀加以籠頭鐵鎖無故自解魏人穿其頸骨祝之曰若果有神當令穿肉不入遂穿以徇三日乃死議者或欲盡殺道人考異曰齊書魏虜傳咸陽王欲盡殺道人按咸陽王禧時尚幼太和九年始封恐非也乃止垣崇祖之敗魏師也垣崇祖之敗魏師也恐魏復寇淮北敗蒲邁翻復扶又翻下今復同乃徙下蔡戍於淮東既而魏師果至欲攻下蔡聞其內徙欲夷其故城己酉崇祖引兵渡淮擊魏大破之殺獲千計考異曰齊書作丁卯按是月辛卯朔無丁卯今從齊紀垣崇祖之敗魏師也晉宋之際荊州刺史多不領南蠻校尉校戶教翻下偏校同別以重人居之豫章王嶷為荊湘二州刺史領南蠻嶷魚力翻嶷罷更以侍中王奐為之奐固辭曰西土戎燼之後痍毀難復復如字自晉永嘉之亂張氏亶命河西以都府為太府今復扶又翻崇望不足助強語實交能相弊且資力既分職司增廣衆勞務倍文案滋煩竊以為國計非允癸丑罷南蠻校尉官晉武帝置南蠻校尉至是罷垣崇祖之敗魏師也三月辛酉朔魏主如肆州己巳還平城垣崇祖之敗魏師也魏法秀之亂事連蘭臺御史張求等百餘人皆以反法當族尚書令王睿請誅首惡宥其餘黨乃詔應誅五族者降為三族三族者門誅門誅止其身所免千餘人垣崇祖之敗魏師也夏四月己亥魏主如方山馮太后樂其山川樂音洛曰他日必葬我於是不必祔山陵也乃為太后作壽陵為于偽翻又建永固石室於山上欲以為廟水經注曰方嶺上有文明太后陵陵之東北有高祖陵二陵之南有永固堂堂之四隅雉列榭階欄檻及扉戶梁壁椽瓦悉文石也簷前兩柱採洛陽之八風谷石為之雕鏤隱起以金銀間雲雉有若錦焉堂之內外四側結兩石扶帳青石屏風以文石為緣並隱起忠孝之容題刻貞順之名廟前鐫石為碑獸碑石至佳左右列柏四周迷禽暗日南川表二石闕御路下望靈泉宮池皎若圖鏡垣崇祖之敗魏師也桓標之等有衆數萬寨險求援庚子詔李安民督諸將往迎之將即亮翻又使兗州刺史周山圖自淮入清倍道應接淮北民桓磊磈破魏師於抱犢固磊落猥翻磈口猥翻魏收志蘭陵郡承縣有抱犢山李安民赴救遲留標之等皆為魏所滅餘衆得南歸者尚數千家魏人亦掠三萬餘口歸平城考異曰魏書云南征諸將擊破蕭道成遊擊將軍桓康於淮陽道成豫州刺史垣崇祖寇下蔡昌黎王馮熙擊破之假梁郡王嘉大破道成將俘獲三萬餘口送平城今從齊書齊紀亦以魏書參之垣崇祖之敗魏師也魏任城康王雲卒任音壬垣崇祖之敗魏師也五月壬戌鄧至王像舒遣使入貢于魏鄧至者羌之別種國於宕昌之南北史曰鄧至者白水羌也世為羌豪因地名號曰鄧至其地自街亭以東平武以西汶嶺以北宕昌以南或曰鄧至者因鄧艾所至因以為名杜佑曰鄧至今交川郡之南通化郡之北交川臨翼同昌郡之地也使疏吏翻種章勇翻垣崇祖之敗魏師也六月壬子大赦垣崇祖之敗魏師也甲辰魏中山宣王王睿卒睿疾病太皇太后魏主屢至其家視疾及卒贈太宰立廟於平城南文士為睿作哀詩及誄者百餘人為于偽翻哀詩起於黃鳥古者卿大夫沒君命有司纍其功德為文以哀之曰誄孔穎達曰誄纍也纍列生時行迹誄之以作諡音魯水翻及葬自稱親姻義舊縗絰哭送者千餘人縗倉回翻魏主以睿子中散大夫襲代睿為尚書令領吏部曹散悉亶翻垣崇祖之敗魏師也戊午魏封皇叔簡為齊郡王猛為安豐王垣崇祖之敗魏師也秋七月己未朔日有食之垣崇祖之敗魏師也上使後軍參軍車僧朗使於魏朗使疏吏翻下同甲子僧朗至平城魏主問曰齊輔宋日淺何故遽登大位對曰虞夏登庸身陟元后夏戶雅翻虞夏事見尚書魏晉匡輔貽厥子孫事見漢魏晉紀垣崇祖之敗魏師也辛酉柔然別帥他稽帥衆降魏別帥所類翻稽帥讀曰率降戶江翻垣崇祖之敗魏師也楊文弘遣使請降詔復以為北秦州刺史復扶又翻宋順帝升明元年文弘降魏先是楊廣香卒先悉薦翻其衆半奔文弘半奔梁州文弘遣楊後起進據白水上雖授以官爵而陰敕晉壽太守楊公則使伺便圖之伺相吏翻垣崇祖之敗魏師也宋升明中遣使者殷靈誕苟昭先如魏聞上受禪靈誕謂魏典客曰典客秦官也漢武帝太初元年更名大鴻臚至晉大鴻臚屬官又有典客令宋魏通好好呼到翻憂患是同宋今滅亡魏不相救何用和親及劉昶入寇靈誕請為昶司馬不許九月庚午魏閲武於南郊因宴㣥臣置車僧朗於靈誕下僧朗不肯就席曰靈誕昔為宋使今為齊民乞魏主以禮見處處昌呂翻靈誕遂與相忿詈劉昶賂宋降人解奉君於會刺殺僧朗魏人收奉君誅之解戶買翻姓也刺七亦翻厚送僧朗之喪放靈誕等南歸及世祖即位昭先具以靈誕之語啓聞靈誕坐下獄死史竟言其事下遐稼翻垣崇祖之敗魏師也辛未柔然主遣使來聘與上書謂上為足下自稱曰吾遺上師子皮袴褶遺于季翻袴褶騎服也褶實入翻約共伐魏垣崇祖之敗魏師也魏尉元薛虎子克五固斬司馬朗之東南諸州皆平東南諸州謂淮北四州於魏境為東南也薛虎子為彭城鎮將將即亮翻遷徐州刺史時州鎮戍兵資絹自隨不入公庫虎子上表以為國家欲取江東先須積穀彭城切惟在鎮之兵不減數萬資糧之絹人十二匹用度無準未及代下代更也下替也公私損費今徐州良田十萬餘頃水陸肥沃清汴通流足以溉灌若以兵絹市牛可得萬頭興置屯田一歲之中且給官食半兵藝殖餘兵屯戍且耕且守不妨捍邊一年之收過於十倍之絹暫時之耕足充數載之食暫與暫同載子亥翻貯丁呂翻五稔之後穀帛俱溢非直戍卒豐飽亦有吞敵之勢魏人從之虎子為政有惠愛兵民懷之會沛郡太守邵安下邳太守張攀以贓汙為虎子所按沛下邳皆徐州所統告虎子與江南通魏主曰虎子必不然推按果虛詔安攀皆賜死二子各鞭一百張一百作二百垣崇祖之敗魏師也吐谷渾王拾寅卒吐從暾入聲谷音浴冬十月戊子朔以度易侯為西秦河二州刺史河南王垣崇祖之敗魏師也魏中書令高閭等更定新律成更工衡翻凡八百三十二章門房之誅十有六大辟二百三十五雜刑三百七十七辟毗亦翻垣崇祖之敗魏師也初高昌王闞伯周卒高昌建國稱王自伯周始是歲其從兄首歸殺義成自立從才用翻高車王可至羅殺首歸兄弟可至羅蓋即阿伏至羅可當作阿立馬儒為王敦徒門翻四年壬戌四八二春正月壬戌詔置學生二百人以中書令張緒為國子祭酒晉武帝咸寧四年初立國子學置國子祭酒甲戌魏大赦三月庚申上召司徒褚淵尚書左僕射王儉受遺詔輔太子壬戌殂于臨光殿年五十六大赦高帝沉深有大量博學能文性清儉主衣中有玉導主衣主供御衣服禁中有主衣庫留此正是興長病源長丁丈翻今知兩翻即命擊碎仍檢按有何異物皆隨此例每曰使我治天下十年治直之翻當使黃金與土同價乙丑以褚淵録尚書事王儉為侍中尚書令車騎將軍張敬兒開府儀同三司丁卯以前將軍王奐為尚書左僕射庚午以豫章王嶷為太尉騎奇寄翻嶷魚力翻庚辰魏主臨虎圈圈求遠翻詔曰虎狼猛暴取捕之日每多傷害既無所益損費良多從今勿復捕貢復扶又翻夏四月庚寅上大行諡曰高皇帝廟號太祖丙午葬泰安陵在晉陵武進縣上考承之先葬于此所謂武進陵也辛卯追尊穆為皇后建元二年太子裴氏卒諡曰穆甲申朔立南郡王長懋為皇太子丙申立太子王氏琅邪人也王韶之之孫臨汝公子卿為廬陵王應城公子敬為安陸王臨汝縣屬汝南郡蕭子顯齊志應城縣屬安陸郡枝江公子隆為隨郡王子真為建安王皇孫昭業為南郡王司徒褚淵寢疾自表遜位世祖不許書新君廟號以別大行癸卯以淵為司空領驃騎將軍侍中録尚書如故驃匹妙翻騎奇寄翻秋七月魏發州郡五萬人治靈丘道靈丘道自代郡靈丘南越大山至中山即古之飛狐道也治直之翻吏部尚書濟陽江謐濟子禮翻性諂躁躁則到翻太祖殂謐恨不豫顧命上即位謐又不遷官以此怨望誹謗會上不豫謐詣豫章王嶷請間曰嶷魚力翻至尊非起疾東宮又非才公今欲作何計上知之使御史中丞沈沖奏謐前後罪惡庚寅賜謐死沈攸之之反江謐建假黃鉞之議以此位通顯既以諂躁徼幸則以諂躁致禍亦宜也癸卯南康文簡公褚淵卒世子侍中賁恥其父失節服除遂不仕以爵讓其弟蓁屏居墓下終身蓁側詵翻屏必郢翻九月丁巳以國哀罷國子學氐王楊文弘卒諸子皆幼乃以兄子後起為嗣九月辛酉魏以後起為武都王文弘子集始為白水太守五代史志武都郡建威縣魏置白水郡唐貞觀初省建威入將利縣後起擊破之魏以荊州巴氐擾亂魏世祖泰延五年置荊州於上洛領上洛上庸魏興等郡巴與氐各是一種崇顯祖之舅子也將之鎮敕發陝秦二州兵送之魏收地形志太和十一年置陝州是年太和七年也當考陝失冉翻邊人失和本怨刺史今奉詔代之自然安靖但須一詔而已不煩發兵自防使之懷懼也魏朝從之崇遂輕將數十騎馳至上洛朝直遙翻將即亮翻騎奇寄翻宣詔慰諭民夷帖然崇命邊戍掠得齊人者悉還之由是齊人亦還其生口二百許人二境交和無復烽燧之警復扶又翻久之徙兗州刺史兗土舊多劫盜崇命村置一樓樓皆懸鼓盜發之處亂擊之旁村始聞者以一擊為節次二次三俄頃之間聲布百里皆發人守險要由是盜發無不擒獲其後諸州皆效之自崇始也辛未以征南將軍王僧虔為左光祿大夫開府儀同三司以尚書右僕射王奐為湘州刺史宋故建平王景素主簿何昌宇記室王摛及所舉秀才劉璡摛抽知翻璡資辛翻前後上書陳景素德美為之訟冤景素死見一百三十四卷宋蒼梧王元徽四年為于偽翻十月辛丑詔聽以士禮還葬舊塋璡瓛之弟也瓛胡官翻十一月魏高祖將親祠七廟命有司具儀法依古制備牲牢器服及樂章自是四時常祀皆舉之世祖武皇帝上之上諱賾字宣遠高帝長子也永明元年癸亥四八三春正月辛亥上祀南郊大赦改元詔以邊境寧晏治民之官普復田秩宋文帝元嘉二十七年有魏師以軍興減百官奉祿淮南太守諸葛闡求減俸祿比內百官於是諸州郡縣丞尉並悉同減至明帝時軍旅不息府藏空虛內外百官並斷奉祿治直之翻下同以太尉豫章王嶷領太子太傅嶷不參朝務而常密獻謀畫上多從之嶷魚力翻朝直遙翻壬戌立皇弟鋭為南平王鏗為宜都王皇子子明為武昌王子罕為南海王二月辛巳以征虜將軍楊炅為沙州刺史陰平王炅楊廣香之子也炅古迥翻又古惠翻辛丑以宕昌王梁彌機為河涼二州刺史宕徒浪翻鄧至王像舒為西涼州刺史宋末以治民之官六年過久乃以三年為斷斷丁亂翻下專斷同謂之小滿而遷換去來又不能依三年之制三月癸丑詔自今一以小滿為限有司以天文失度請禳之禳而羊翻上曰應天以實不以文我克己求治思隆惠政若災眚在我治直吏翻眚所景翻禳之何益夏四月壬午詔袁粲劉秉沈攸之雖末節不終而始誠可録皆命以禮改葬三人死見一百三十四卷宋順帝升明三年上之為太子也自以年長長知兩翻與太祖同創大業晉安王子勛之亂帝亦起兵沈攸之反帝據湓城為衆軍節度率皆專斷朝直遙翻斷丁亂翻多違制度信任左右張景真景真驕侈被服什物僭擬乘輿被皮義翻乘繩證翻內外畏之莫敢言者司空咨議荀伯玉素為太祖所親厚咨議即咨議參軍太子所為官終不知豈得畏死蔽官耳目我不啓聞誰當啓者因太子拜陵拜永安泰安陵也皆在武進太祖怒命檢校東宮太子拜陵還至方山晚將泊舟建康城東北有方山埭直瀆所經也據沈瑀傳方山埭在湖熟縣界杜佑曰東晉至陳西有石頭津東有方山津各置津主一人賊曹一人直水五人以檢察禁物宋白曰丹陽記云秦始皇鑿金陵方山斷處為瀆則今淮水經城中入大江是曰秦淮飛燕名馬也太子夜歸入宮太祖亦停門籥待之明日太祖使南郡王長懋聞喜公子良宣敕詰責詰去吉翻並示以景真罪狀使以太子令收景真殺之太子憂懼稱疾月餘太祖怒不解晝臥太陽殿王敬則直入叩頭啓太祖曰官有天下日淺太子無事被責被皮義翻人情恐懼願官往東宮解釋之太祖無言敬則因大聲宣旨裝束往東宮又敕太官設饌饌雛戀翻又雛睆翻呼左右索輿索山客翻太祖了無動意敬則索衣被太祖仍牽強登輿被皮義翻強其兩翻太祖不得已至東宮召諸王宴於玄圃長沙王晃捉華蓋捉亦執也雉尾扇編雉尾為之以障乘輿鎗楚庚翻盛酒之器按太平御覽鎗即鐺字但鐺非可持者南郡王長懋行酒太子及豫章王嶷王敬則自捧酒饌至暮盡醉乃還還從宣翻又如字太祖嘉伯玉忠藎愈見親信軍國密事多委使之權動朝右朝直遙翻遭母憂去宅二里許冠蓋已塞路左率蕭景先侍中王晏共弔之塞悉則翻左率左衛率也率所律翻自旦至暮始得前比出飢乏氣息惙然比必寐翻惙積雪翻疲乏也憤悒形於聲貌悒乙及翻明日言於太祖曰臣等所見二宮門庭比荀伯玉宅可張雀羅矣門外可設雀羅用漢書語師古注曰言其寂靜無人行也敬弘之從子也王敬弘見用於元嘉中從才用翻驍騎將軍陳胤叔先亦白景真及太子得失而語太子皆云伯玉以聞驍堅堯翻騎奇寄翻語牛倨翻太子由是深怨伯玉太祖陰有以豫章王嶷代太子之意而嶷事太子愈謹嶷魚力翻故太子友愛不衰豫州刺史垣崇祖不親附太子會崇祖破魏兵見上太祖建元三年與之密謀朝直遙翻太子疑之曲加禮待謂曰世間流言我已豁懷自今以富貴相付崇祖拜謝會太祖復遣荀伯玉復扶又翻敕以邊事受旨夜發不得辭東宮太子以為不盡誠益銜之太祖臨終指伯玉以屬太子屬之欲翻上即位崇祖纍遷五兵尚書伯玉纍遷散騎常侍散悉亶翻伯玉內懷憂懼上以伯玉與崇祖善恐其為變加意撫之丁亥下詔誣崇祖招結江北荒人欲與伯玉作亂皆收殺之庚子魏主如崞山崞音郭壬寅還宮閏月癸丑魏主後宮平涼林氏生子恂後魏分安定郡置平涼郡領鶉陰陰密二縣文明太后以恂當為太子賜林氏死自撫養恂五月戊寅朔魏主如武州山石窟佛寺車騎將軍張敬兒好信夢好呼到翻初為南陽太守其妻尚氏夢一手熱如火及為雍州夢一胛熱雍於用翻胛音甲為開府夢半身熱敬兒意欲無限常謂所親曰吾妻復夢舉體熱矣復扶又翻又自言夢舊村社樹高至天上聞而惡之惡烏路翻垣崇祖死敬兒內自疑會有人告敬兒遣人至蠻中貨易貨易即貿易也以我所有易我所無會上於華林園設八關齋釋氏之戒一不殺生二不偷盜三不邪淫四不妄語五不飲酒食肉六不著花鬘瓔珞香油塗身歌舞倡伎故往觀聽七不得坐高廣大床八不得過齋後喫食已上八戒故為八關雜録名義云八戒者俗衆所受一日一夜戒也謂八戒一齋通謂八關齋明以禁防為義也於坐收敬兒朝直遙翻坐徂臥翻敬兒脫冠貂投地曰此物誤我丁酉殺敬兒並其四子敬兒弟恭兒常慮為兄禍所及居於冠軍冠軍縣自漢以來屬南陽郡唐為鄧州臨湍縣我朝建隆初廢臨湍入穰縣冠古玩翻村落深阻牆垣重復敬兒每遣信輒上馬屬鞬重直龍翻屬之欲翻鞬居言翻馬上盛弓矢之器然後見之敬兒敗問至席卷入蠻卷讀曰捲後自出上恕之敬兒女為征北咨議參軍謝超宗子婦超宗謂丹楊尹李安民曰往年殺韓信今年殺彭越尹欲何計用漢書薛公語激發安民使之作亂也上素惡超宗輕慢惡烏路翻使兼御史中丞袁彖奏彈超宗丁巳收付廷尉徙越嶲於道賜死嶲音髓以彖語不刻切又使左丞王逡之奏彈彖輕文略奏撓法容非撓奴教翻彖坐免官禁錮十年超宗靈運之孫超宗靈運子鳳之子顗之弟子也袁顗死於義嘉之難顗魚豈翻秋七月丁丑魏主及太后如神淵池魏太和元年起永樂遊觀殿於北苑穿神淵池甲申如方山魏使假員外散騎常侍頓丘李彪來聘侍中左光祿大夫開府儀同三司王僧虔固辭開府去年王僧虔除開府汝任重於朝行登三事朝直遙翻我若復有此授復扶又翻下亦復同乃是一門有二台司吾實懼焉纍年不拜上乃許之戊戌加僧虔特進儉作長梁齋制度小過僧虔視之不悅竟不入戶儉即日毀之初王弘與兄弟集會任子孫戲適僧達跳下地作虎子僧綽正坐采蠟燭珠為鳳皇僧達奪取打壞亦復不惜僧虔纍十二博棋既不墜落亦不重作重直龍翻弘歎曰僧達俊爽當不減人然恐終危吾家僧達死見一百二十八卷末世祖孝建三年僧虔必為長者位至公台長知兩翻已而皆如其言八月庚申驍騎將軍王洪範自柔然還經塗三萬餘里經塗謂所經由之路王洪範出使事見高帝建元二年還從宣翻又如字冬十月丙寅遣驍騎將軍劉纘聘於魏魏主客令李安世主之主客令即典客令也使賈人鬻之於市藏徂浪翻賈音古纘曰魏金玉大賤當由山川所出安世曰聖朝不貴金玉故賤同瓦礫礫郎狄翻纘初欲多市聞其言內慚而止纘屢奉使至魏馮太后遂私幸之史言馮后淫縱使疏吏翻下同十二月乙巳朔日有食之癸丑魏始禁同姓為婚王儉進號衛將軍參掌選事選須絹翻是歲省巴州置巴州見上高帝建元二年魏秦州刺史于洛侯性殘酷刑人必章甲十一行本必作或乙十一行本同張校同斷腕拔舌斷丁管翻腕烏貫翻分懸四體合州驚駭州民王元壽等一時俱反有司劾奏之劾戶概翻又戶得翻魏主遣使至州於洛侯常刑人處宣告吏民然後斬之齊州刺史韓麒麟為政尚寬從事劉普慶説麒麟曰公杖節方夏而無所誅斬何以示威麒麟曰刑罰所以止惡仁者不得已而用之今民不犯法又何誅乎若必斷斬然後可以立威當以卿應之普慶慚懼而起説輸芮翻夏戶雅翻斷丁亂翻聶崇岐標點王崇武覆校
