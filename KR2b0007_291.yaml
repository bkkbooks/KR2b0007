body:
  text: 資治通鑑卷第二百九十一端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千六百戶食實封一千戶臣司馬光奉敕編集後學天台音注後周紀二太祖聖神恭肅文武孝皇帝中廣順二年壬子九五二九月甲寅朔吳越丞相裴堅卒以台州刺史吳延福同參相府事庚午敕北邊吏民毋得入契丹境俘掠契丹將高謨翰以葦筏渡胡盧河入寇胡盧河在深冀之間橫亙數百里丁度曰胡盧河即衡漳之別名成德節度使何福進遣龍捷都指揮使劉誠誨等屯貝州以拒之九域志貝州北至冀州一百二十里遽引兵北渡所掠冀州丁壯數百人望見官軍爭鼓譟欲攻契丹官軍不敢應契丹盡殺之蜀山南西道節度使李廷圭奏周人聚兵關中請益兵為備蜀主遣奉鑾肅衛都虞候趙進將兵趣利州趣七喻翻既而聞周人聚兵以備北漢乃引還還從宣翻又如字唐武安節度使邊鎬昏懦無斷斷丁亂翻在湖南政出多門不合衆心吉水人歐陽廣上書吉水古吉陽縣地久廢唐置吉水縣屬吉州九域志在州東北四十里宋白曰隋開皇十年廢吉陽縣入廬陵縣大業分廬陵縣水東十一鄉為吉水縣鎬非將帥才必喪湖南將即亮翻帥所類翻喪息浪翻宜別擇良帥益兵以救其敗不報唐主使鎬經略朗州有自朗州來者多言劉言忠順鎬由是不為備唐主召劉言入朝朝直遙翻言不行謂王逵曰唐必伐我奈何逵曰武陵負江湖之險朗州武陵郡安能拱手受制於人邊鎬撫御無方士民不附可一戰擒也言猶豫未決周行逢曰機事貴速緩則彼為之備不可圖也言乃以逵行逢及牙將何敬真張倣蒲公益朱全琇琇音秀宇文瓊彭萬和潘叔嗣張文表十人皆為指揮使部分發兵分扶問翻叔嗣文表皆朗州人也行逢能謀文表善戰叔嗣果敢三人多相須成功情款甚昵昵尼質翻諸將欲召漵州酋長苻彥通為援漵音敘苻讀曰蒲酋慈由翻長知兩翻苻彥通自謂苻秦苗裔行逢曰蠻貪而無義前年從馬希萼入潭州焚掠無遺事見二百八十九卷漢隱帝乾祐三年往無不克烏用此物使暴殄百姓哉乃止然亦畏彥通為後患以蠻酋土團都指揮使劉瑫為㣥蠻所憚瑫他牢翻補西境鎮遏使以備之冬十月逵等將兵分道趣長沙趣七喻翻以孫朗曹進為先鋒使孫朗曹進奔朗州見上卷是年正月戊子逵等克沅江沅音元沅江漢益陽縣地隋改為安樂又改為沅江乾寧中改為橋江楚復為沅江屬朗州九域志在嶽州西南一百二十六里執都監劉承遇裨將李師德帥衆五百降之帥讀曰率降戶江翻壬辰逵等命軍士舉小舟自蔽直造益陽造七到翻四面斧寨而入遂克之殺戍兵二千人邊鎬告急於唐甲午逵等克橋口及湘陰九域志潭州長沙縣有橋口鎮乙未至潭州邊鎬嬰城自守救兵未至城中兵少丙申夜鎬棄城走吏民俱潰醴陵門橋折醴陵門潭州城東門折而設翻道州刺史廖偃為亂兵所殺丁酉旦王逵入城自稱武平節度副使權知軍府事武平當作武安軍府謂潭州軍府也遣敬真等追鎬不及斬首五百級蒲公益攻嶽州風俗通漢有詹事蒲昌又晉書載記氐酋蒲洪之先其家池中蒲生長五丈如竹形時咸謂之蒲家因以為氏其後改姓苻則蒲之所自出有二焉劉言以公益權知嶽州唐將守湖南諸州者聞長沙陷相繼遁去劉言盡復馬氏嶺北故地惟郴連入于南漢郴尹林翻契丹瀛莫幽州大水流民入塞散居河北者數十萬口契丹州縣亦不之禁詔所在賑給存處之賑津忍翻處昌呂翻中國民先為所掠得歸者什五六丁未穀以病臂久未愈李穀病臂始上卷是年六月穀上須有李字文乃明章十二行本正有李字孔本同熊校云宋本無李字不知所據何宋本帝遣中使諭指曰卿所掌至重謂李穀掌三司金穀也苟事功克集何必朝禮朝直遙翻朕今於便殿待卿可暫入相見穀入見于金祥殿見賢遍翻面陳悃款悃苦本翻誠也帝不許穀不得已復視事復扶又翻穀未能執筆詔以三司務繁令刻名印用之辛亥敕民有訴訟必先歷縣州及觀察使處決不直處昌呂翻乃聽訟於章十二行本訟作詣無於字乙十一行本同孔本同張校同臺省或自不能書牒倩人書者必書所倩姓名居處若無可倩聽執素紙所訴必須己事毋得挾私客訴倩七政翻假倩也事不干己妄興詞訴謂之客訴慶州刺史郭彥欽性貪野雞族多羊馬五代會要黨項野雞族居慶州北野雞族遂反剽掠綱商剽匹妙翻綱商往沿邊販易者薛史慶州北十五里寡婦山有蕃部曰野雞族刺史郭彥欽亶加糴鹽錢民夷流怨蕃族獷悍好為不法彥欽乃奏野雞族掠奪綱商帝命寧環二州合兵討之唐於古鳴沙之地置威州周改曰環州九域志寧州北至慶州一百二十里環州南至慶州一百八十里劉言遣使來告稱湖南世事朝廷不幸為鄰寇所陷鄰寇謂唐也輒糾合義兵削平舊國言削平湖南舊楚之地唐主削邊鎬官爵流饒州初鎬以都虞候從查文徽克建州事見二百八十五卷晉齊王開運二年唐主之保大三年也建人謂之邊佛子及克潭州市不易肆事見上卷元年唐之保大九年也邊菩薩菩薄乎翻薩桑葛翻釋典菩普也薩濟也言能普濟衆生也既而為節度使政無綱紀惟日設齋供供居用翻盛修佛事潭人失望謂之邊和尚矣左僕射同平章事馮延己右僕射同平章事孫晟上表請罪皆釋之晟陳請不已乃與延己皆罷守本官唐主以比年出師無功比毗至翻乃議休兵息民或曰願陛下數十年不用兵可小康矣唐主曰將終身不用何數十年之有人非金石唐主自謂真能享無疆之壽乎然欲終身不用兵而周兵已至淮上矣拜本縣令以歐陽廣言邊鎬必敗其言驗也十一月辛未徙保義節度使折從阮為靜難節度使折從阮自陝州徙邠州難乃旦翻下同癸酉敕約每歲民間所輸牛皮三分減二計田十頃稅取一皮餘聽民自用及賣買惟禁賣於敵國先是兵興以來先悉薦翻禁民私賣買牛皮悉令輸官受直唐明宗之世有司止償以鹽晉天福中並鹽不給漢法犯私牛皮一寸抵死然民間日用實不可無帝素知其弊至是李穀建議均於田畝公私便之十二月丙戌河決鄭滑遣使行視修塞行下孟翻塞悉則翻甲午前靜難節度使侯章獻買宴絹千匹銀五百兩帝不受曰諸侯入覲天子宜有宴犒豈待買邪五代之時不特方鎮入朝買宴唐明宗天成二年三月幸會節園㣥臣買宴則在朝之臣亦買宴矣犒苦到翻皆不受王逵將兵及洞蠻五萬攻郴州郴丑林翻南漢將潘崇徹救之遇于蠔石蠔石在郴州義章縣蠔音豪曰疲而不整可破也縱擊大破之伏尸八十里翰林學士徐台符請誅誣告李嵩者葛延遇及李澄誣李嵩事見二百八十八卷漢乾祐元年徐台符素與李嵩善故為請誅誣告者不許更工衡翻王峻嘉台符之義白於帝癸卯收延遇澄誅之劉言表稱潭州殘破乞移使府治朗州使疏吏翻且請貢獻賣茶悉如馬氏故事許之唐江西觀察使楚王馬希萼入朝唐主留之後數年卒於金陵諡曰恭孝初麟州土豪楊信自為刺史受命于周信卒子重訓嗣考異曰崇訓或作崇勳世宗實録作崇訓後蓋避梁王宗訓改名也按考異則重訓當作崇訓至是為㣥羌所圍復歸款復扶又翻求救於夏府二州夏州李彞殷府州折德扆九域志麟州西北至夏州一百二十里東北至府州一百二十里三年癸丑九五三帝命趣草制春正月丙辰以武平留後劉言為武平節度使制置武安靜江等軍事同平章事以王逵為武安節度使何敬真為靜江節度使周行逢為武安行軍司馬王逵既得潭州則殺何敬真既殺何敬真則攻劉言而併朗州帝命趣草制詔折從阮野雞族能改過者拜官賜金帛不則進兵討之壬戌從阮奏酋長李萬全等受詔立誓外酋慈秋翻長知兩翻自餘猶不服方討之帝命趣草制前世屯田皆在邊地使戍兵佃之佃亭年翻唐末中原宿兵所在皆置營田以耕曠土其後又募高資戶使輸課佃之輸舂遇翻下歲輸同戶部別置官司總領不隸州縣或丁多無役或容庇姦盜州縣不能詰詰去吉翻梁太祖擊淮南掠得牛以千萬計朱全忠大掠淮南見二百六十五卷唐昭宗天祐元年使歲輸租自是歷數十年牛死而租不除民甚苦之帝素知其弊會閣門使知青州張凝上便宜請罷營田務李穀亦以為言乙丑敕悉罷戶部營田務以其民隸州縣其田廬牛農器並賜見佃者為永業見賢遍翻悉除租牛課是歲戶部增三萬餘戶民既得為永業始敢葺屋植木獲地利數倍或言營田有肥饒者不若鬻之可得錢數十萬緡以資國帝曰利在於民猶在國也朕用此錢何為帝命趣草制萊州刺史葉仁魯帝之故吏也按葉仁魯漢高祖之親將也天福十二年嘗破契丹于承天軍今曰帝之故吏必嘗事帝於樞密院或討河中鎮鄴都時也錢千緡庚午賜死帝遣中使賜以酒食曰汝自抵國法吾無如之何當存恤汝母仁魯感泣帝命趣草制帝以河決為憂王峻自請往行視許之行下孟翻鎮寧節度使榮屢求入朝峻忌其英烈每沮止之沮在呂翻閏月榮復求入朝復扶又翻會峻在河上帝乃許之帝命趣草制契丹寇定州圍義豐軍時置義豐軍於定州義豐縣大獲契丹遁去又寇鎮州本道兵擊走之帝命趣草制丙申鎮寧節度使榮入朝故李守貞騎士馬全乂從榮入朝帝召見補殿前指揮使謂左右曰全乂忠於所事昔在河中屢挫吾軍謂漢乾祐間帝討李茂貞時也王峻聞榮入朝遽自河上歸戊戌至大梁帝命趣草制彰武節度使高允權卒其子牙內指揮使紹基謀襲父位詐稱允權疾病表己知軍府事觀察判官李彬切諫紹基怒斬之辛巳以彬謀反聞帝命趣草制王峻固求領藩鎮帝不得已以章十二行本以上有壬寅二字乙十一行本同孔本同張校同退齋校同峻兼平盧節度使帝命趣草制高紹基屢奏雜虜犯邊冀得承襲帝遣六宅使張仁謙詣延州巡檢職官分紀曰唐置十宅六宅使以諸王所屬為名或總云十六宅後止曰六宅始發父喪帝命趣草制戊申折從阮奏降野雞二十一族帝命趣草制唐草澤邵棠上言布衣未有朝命者謂之草澤上時掌翻近遊淮上聞周主恭儉增修德政吾兵新破於潭朗謂邊鎬潭州之敗也宜為之備智識之士何國無之顧用與不用耳帝命趣草制初王逵既得潭州事見上卷十月朱全琇為武安節度副使張文表為武平節度副使周行逢為武安行軍司馬敬真全琇各置牙兵與逵分廳視事吏民莫知所從每宴集諸將使酒紛拏如市無復上下之分拏奴加翻分扶問翻唯行逢文表事逵盡禮逵親愛之敬真與逵不協辭歸朗州又不能事劉言與全琇謀作亂言素忌逵之強疑逵使敬真伺己將討之逵聞之甚懼伺相吏翻行逢曰劉言素不與吾輩同心何敬真朱全琇恥在公下公宜早圖之逵喜曰與公共除凶黨同治潭朗周行逢之據有潭朗自此造端矣治直之翻夫音扶復扶又翻會南漢寇全道永州行逢請身至朗州説言説式芮翻遣敬真全琇南討南討者拒南漢之兵以計取之如掌中物耳逵從之行逢至朗州言以敬真為南面行營招討使全琇為先鋒使將牙兵百餘人會潭州兵以禦南漢二人至長沙逵出郊迎相見甚歡宴飲連日多以美妓餌之妓渠綺翻敬真因淹留不進朗州指揮使李仲遷部兵三千人久戍潭州敬真使之先發趣嶺北全道永三州皆在大庾嶺之北趣七喻翻劫仲遷亶還朗州逵乘敬真醉使人詐為言使者責敬真以南寇深侵不亟捍禦而專務荒宴太師命械公歸西府太師謂劉言朗府在潭州之西故謂之西府全琇逃去遣兵追捕之二月辛亥朔斬敬真以徇未幾幾居豈翻獲全琇及其黨十餘人皆斬之帝命趣草制癸丑鎮寧節度使榮歸澶州澶時連翻帝命趣草制初契丹主德光北還見二百八十六卷天福十二年至是更以玉作二寶傳國寶及受命寶也五代會要曰時製寶兩座用白玉方六寸螭虎紐馮道書寶文其一以皇帝承天受命之寶為文其一以皇帝神寶為文宋白曰時內司製二寶詔太常具制度以聞有司言唐六典符寶郎掌天子八璽其一曰神寶二曰受命寶其神寶方六寸高四寸六分厚一寸七分蟠龍紐文與傳國璽同傳國璽秦皇以藍田玉刻之李斯篆方四寸面文曰受命于天既壽永昌紐盤五龍二寶歷代相傳以為神器別有六寶一曰皇帝行璽二曰皇帝之璽三曰皇帝信璽四曰天子行璽五曰天子之璽六曰天子信璽此六璽因文為名並白玉螭虎紐歷代傳受或亡失則補之北朝鑄之以金貞觀十六年別製玄璽一座文曰皇天景命有德者昌白玉螭虎紐同光中製寶一座文曰皇帝受命之寶天福四年製寶一座文曰皇帝神寶其同光天福二寶內司製造不見紐篆分寸制度敕今製國寶兩座其一宜以皇帝承天受命之寶為文其一以皇帝神寶為文命中書令馮道書寶議者曰國以玉璽為傳授神器邃古無聞運斗樞曰舜禹天子黃龍負璽世本曰魯昭公始作璽秦兼六國稱皇帝禮取藍田之玉玉工孫壽刻之方四寸李斯為大篆書之形制如龍魚鳳鳥之狀希世之至寶也秦亡子嬰以璽降漢漢世世傳寶之王莽之篡求璽於元后后投之於階一角微缺莽誅歸之更始更始敗歸之盆子及熊耳之敗盆子以璽降光武漢末黃巾亂投璽於井孫堅入洛見井有五色氣取得之以歸袁術術敗荊州刺史徐璆得之詣許以進獻帝魏受漢得之以傳于晉洛陽之陷劉聰得之劉曜為石勒所禽璽歸于鄴石氏之亂冉閔得之閔敗晉將戴施入鄴得之送江東傳之宋齊梁臺城之破侯景得之景敗其將侯子鑒以璽走為追兵所迫投於栖霞寺井中僧永杼得而匿之陳永定二年永弟子普智以璽上陳文帝隋平陳始得秦真傳國璽煬帝江都之禍宇文化及得之化及敗璽歸竇建德建德敗其妻曹氏以璽獻于唐唐禪楊涉送寶于大梁莊宗滅梁得之同光末內難作寶為火灼文字訛缺明宗得之清泰敗以寶隨身自焚而死寶遂亡失其神寶者方六寸厚一寸七分高四寸六分蟠龍隱起文與秦璽同但玉色不及形制高大耳不知何代製造東晉孝武十九年雍州刺史郗恢得之慕容永送於金陵傳之宋齊梁臺城之破侯景得之景敗侍中趙思齊攜走江北獻之齊文宣帝宇文滅齊得之宇文亡入隋隋文帝改號傳國璽又改為受命璽及平陳始得秦真傳國璽仍以秦璽後出得於亡陳以北朝所傳神璽為第一秦璽次之隋亡竇建德妻與神璽俱獻長安唐末不知所在其説頗有源委因載于此更工衡翻帝命趣草制王逵遣使以斬何敬真告劉言言不得已庚申斬符會等數人以符會等亶歸召變也帝命趣草制樞密使平盧節度使同平章事王峻晚節益狂躁奏請以端明殿學士顏衎衎苦旱翻又苦旦翻樞密直學士陳觀代范質李穀為相帝曰進退宰輔不可倉猝俟朕更思之峻力論列語浸不遜日向中帝尚未食峻爭之不已帝曰今方寒食俟假開如卿所奏峻乃退舊制寒食節休假前後共五日假居訝翻癸亥帝亟召宰相樞密使入幽峻於別所帝見馮道等泣曰王峻陵朕太甚欲盡逐大臣翦朕羽翼朕惟一子專務間阻暫令詣闕已懷怨望間古莧翻令詣闕謂聽皇子榮自澶州入朝也豈有身典樞機復兼宰相又求重鎮復扶又翻峻求領藩鎮見上月觀其志趣殊未盈厭厭於豔翻又於鹽翻無君如此誰則堪之甲子貶峻商州司馬制辭略曰肉視㣥后孩撫朕躬言視朝臣如機上肉撫天子如嬰孩王峻王殷佐命有功一體之人峻得罪故慮殷猜懼尚食使唐尚食奉御之職峻至商州得腹疾帝猶愍之命其妻往視之未幾而卒幾居豈翻帝命趣草制帝命折從阮分兵屯延州折從阮時為靜難帥帥兵討野雞族而還師屢有貢獻又命供奉官張懷貞將禁兵兩指揮屯鄜延鄜方無翻紹基乃悉以軍府事授副使張匡圖甲戌以客省使向訓權知延州帝命趣草制三月甲申以鎮寧節度使榮為開封尹晉王王峻既貶始召榮丙戌以樞密副使鄭仁誨為鎮寧節度使帝命趣草制初殺牛族與野雞族有隙聞官軍討野雞饋餉迎奉官軍利其財畜而掠之殺牛族反與野雞合敗寧州刺史張建武于包山敗補邁翻帝以郭彥欽擾㣥胡致其作亂事見上年十月帝命趣草制初解州刺史浚儀郭元昭與榷鹽使李溫玉有隙漢隱帝分河中之解安邑聞喜為解州解戶買翻榷古嶽翻晉有尚書都令史八人秩二百石與左右丞總知都臺事梁五人謂之五都令史隋開皇初改都令史為都事置八人後魏於尚書諸司置主事令史隋於諸省又各置主事令史煬帝並去令史之名更曰主事初雜用士人至唐並用流外至五代樞密院亦置主事會李守貞反溫玉有子在河中元昭收繫溫玉奏言其叛事連仁浦帝時為樞密使知其誣釋不問至是仁浦為樞密承旨元昭代歸甚懼過洛陽以告仁浦弟仁滌仁滌曰吾兄平生不與人為怨況肯以私害公乎既至丁亥仁浦白帝以元昭為慶州刺史帝命趣草制己丑以棣州團練使太原王仁鎬為宣徽北院使兼樞密副使帝命趣草制唐主復以左僕射馮延己同平章事去年十月唐失潭州馮延己罷相帝命趣草制周行逢惡武平節度副使張倣惡烏路翻言於王逵曰何敬真倣之親戚臨刑以後事屬倣公宜備之屬之欲翻夏四月庚申逵召倣飲醉而殺之帝命趣草制丙寅歸德節度使兼侍中常思入朝戊辰徙平盧節度使將行奏曰臣在宋州舉絲四萬餘兩在民間謹以上進請徵之舉絲者以貨物貸與民至絲熟而徵其絲上時掌翻五月丁亥敕榜宋州凡常思所舉悉蠲之思章十二行本思上有已輸者復歸之六字乙十一行本同孔本同退齋校同亦無怍色怍疾各翻帝命趣草制自唐末以來所在學校廢絶蜀毋昭裔出私財百萬營學館校戶教翻毋音無姓也齊宣王封母弟於毋鄉其後因以為氏且請刻板印九經蜀主從之由是蜀中文學復盛自漢司馬相如揚雄以來蜀中號為多士而斯文之盛衰則繫乎上之人帝命趣草制六月壬子滄州奏契丹知盧臺軍事范陽張藏英來降帝命趣草制初唐明宗之世宰相馮道李愚請令判國子監田敏校正九經刻板印賣朝廷從之丁巳板成獻之雕印九經始二百七十七卷唐明宗長興三年至是而成凡涉二十八年雖亂世九經傳布甚廣史言聖人之道所以不墜者以其有方策之傳也帝命趣草制王逵以周行逢知潭州自將兵襲朗州克之殺指揮使鄭珓珓古孝翻執武安節度使同平章事劉言幽于別館劉言為武平節度使鎮朗州非武安也安當作平言以元年七月得朗州至是而敗帝命趣草制秋七月王殷三表請入朝帝疑其不誠遣使止之帝命趣草制唐大旱井泉涸淮水可涉飢民渡淮而北者相繼濠壽發兵禦之民與兵鬬而北來觀民心之向背唐之君臣可以岌岌矣彼我之民一也聽糴米過淮唐人遂築倉多糴以供軍八月己未詔唐民以人畜負米者聽之以舟車運載者勿豫豫讀曰與帝命趣草制王逵遣使上表誣劉言謀以朗州降唐又欲攻潭州其衆不從廢而囚之臣已至朗州撫安軍府訖且請復移使府治潭州去年劉言表移使府於朗州甲戌遣通事舍人翟光裔詣湖南宣撫從其所請翟萇伯翻又徒歷翻逵還長沙以周行逢知朗州事又遣潘叔嗣殺劉言於朗州為潘叔嗣殺王逵周行逢殺叔嗣張本帝命趣草制九月己亥武成節度使白重贊奏塞決河滑州自唐以來置義成節度宋朝太平興國元年以太宗舊名始改為武成軍於此時武當作義塞悉則翻帝命趣草制契丹寇樂壽齊州戍兵右保寧都頭劉漢章殺都監杜延熙謀應契丹不克並其黨伏誅帝命趣草制南漢主立其子繼興為衛王璇興為桂王慶興為荊王保興為禎王崇興為梅王帝命趣草制東自青徐南至安復西至丹慈丹州在龍門河之西慈州在龍門河之東宋朝熙寧五年廢慈州以吉鄉縣屬隰州九域志吉鄉縣在隰州西南一百六十里皆大水帝命趣草制帝自入秋得風痹疾痹必至翻又毗至翻害於食飲及步趨術者言宜散財以禳之帝欲祀南郊又以自梁以來郊祀常在洛陽疑之執政曰天子所都則可以祀百神何必洛陽於是始築圜丘社稷壇作太廟於大梁自梁都大梁以來建立郊廟皆所未遑晉天福四年太常禮院奏唐廟制度請以至德宮正殿隔為五室而已今始作太廟癸亥遣馮道迎太廟社稷神主于洛陽帝命趣草制南漢大赦帝命趣草制冬十一月己丑太常請準洛陽築四郊諸壇從之十二月丁未朔神主至大梁帝迎于西郊祔享于太廟帝命趣草制鄴都留守天雄節度使兼侍衛親軍都指揮使同平章事王殷恃功專橫恃佐命之功也橫戶孟翻殷即以帖行之又多掊斂民財處昌呂翻分扶問反掊蒲侯翻帝聞之不悅使人謂曰卿與國同體鄴都帑庾甚豐帑他朗翻卿欲用則取之何患無財成德節度使何福進素惡殷惡烏路翻甲子福進入朝密以殷陰事白帝帝由是疑之乙丑殷入朝詔留殷充京城內外巡檢帝命趣草制戊辰府州防禦使折德扆奏北漢將喬贇入寇贇於倫翻擊走之帝命趣草制王殷每出入從者常數百人殷請量給鎧仗以備巡邏從才用翻量音良邏郎佐翻因充京城內外巡檢遂有此請帝難之時帝體不平將行郊祀而殷挾震主之勢在左右衆心忌之壬申帝力疾御滋德殿殷入起居遂執之下制誣殷謀以郊祀日作亂流登州出城殺之命鎮寧節度使鄭仁誨詣鄴都安撫仁誨利殷家財亶殺殷子遷其家屬於登州帝命趣草制唐祠部郎中知制誥徐鉉言貢舉初設不宜遽罷乃復行之唐罷貢舉事見上卷上年先是楚州刺史田敬洙請修白水塘溉田以實邊先悉薦翻白水塘在楚州寶應縣西八十里鄧艾所築也馮延己以為便李德明因請大闢曠土為屯田修復所在渠塘堙廢者吏因緣侵擾大興力役奪民田甚衆民愁怨無訴徐鉉以白唐主唐主命鉉按視之鉉籍民田悉歸其主或譖鉉亶作威福唐主怒流鉉舒州然白水塘竟不成唐主又命少府監馮延魯巡撫諸州右拾遺徐鍇表延魯無才多罪舉措輕淺不宜奉使唐主怒貶鍇校書郎分司東都鍇鉉之弟也鍇口駭翻唐以揚州為東都史言唐主惑於二馮而罪二徐路振九國志鉉鍇皆徐延休之子帝命趣草制道州盤容洞蠻酋盤崇聚衆自稱盤容州都統屢寇郴道州酋慈秋翻盤姓也即盤瓠之後郴道二州時皆屬南漢帝命趣草制乙亥帝朝享太廟被袞冕左右掖以登階朝直遙翻被皮義翻掖羊益翻才及一室酌獻俯首不能拜而退俯音免命晉王榮終禮是夕宿南郊疾尤劇幾不救夜分小愈劇甚也增也幾居依翻顯德元年甲寅九五四帝命趣草制春正月丙子朔帝祀圜丘僅能瞻仰致敬而已進爵奠幣皆有司代之大赦改元聽蜀境通商晉天福初蜀猶與中國通開運以後中國多事蜀有吞併關西之志不復與中國通矣帝命趣草制戊寅罷鄴都唐莊宗始以魏州為東京後罷東京以為鄴都帝命趣草制庚辰加晉王榮兼侍中判內外兵馬事時㣥臣希得見帝見賢遍翻中外恐懼聞晉王典兵人心稍安帝命趣草制軍士有流言郊賞薄於唐明宗時者唐明宗以軍士流言濫賞養成其驕莫肯效命何足法也壬午召諸將至寢殿讓之曰朕自即位以來惡衣菲食專以贍軍為念府庫蓄積四方貢獻贍軍之外鮮有贏餘贍力豔翻鮮息善翻贏餘經翻汝輩豈不知之今乃縱凶徒騰口不顧人主之勤儉察國之貧乏又不思己有何功而受賞惟知怨望於汝輩安乎皆惶恐謝罪退索不逞者戮之流言乃息驕兵於分外希賞苟非以法齊之其無厭之心庸有極乎索山客翻帝命趣草制初帝在鄴都漢隱帝天祐三年帝在鄴都使之事晉王榮榮鎮澶州以為牙將榮入為開封尹去年三月榮為開封尹翰自至榮怪之翰請間間古莧翻言曰大王國之儲嗣今主上寢疾大王當入侍醫藥奈何猶決事於外邪榮感悟即日入止禁中丙戌帝疾篤停諸司細務皆勿奏有大事則晉王榮稟進止宣行之帝命趣草制以鎮寧節度使鄭仁誨為樞密使同平章事帝命趣草制戊子以義武留後孫行友保義留後韓通朔方留後馮繼業皆為節度使通太原人也帝命趣草制帝屢戒晉王曰昔吾西征謂討李守貞王景崇趙思綰時唐高祖太宗高宗中宗睿宗玄宗肅宗代宗德宗順宗憲宗穆宗敬宗文宗武宗宣宗懿宗僖宗凡十八帝皆葬關中陵名各見前紀惟多藏金玉故也我死當衣以紙衣斂以瓦棺速營葬勿久留宮中壙中無用石以甓代之當衣於既翻斂力贍翻甓蒲歷翻搏直而陶之今謂之甎工人役徒皆和雇勿以煩民葬畢募近陵民三十戶蠲其雜徭使之守視勿修下宮勿置守陵宮人勿作石羊虎人馬惟刻石置陵前云周天子平生好儉約遺令用紙衣瓦棺嗣天子不敢違也汝或吾違吾不福汝又曰李洪義當與節鉞以李洪義發漢隱帝密詔也事見二百八十九卷乾祐二年離力智翻帝命趣草制庚寅詔前登州刺史周訓等塞決河先是河決靈河魚池酸棗陽武常樂驛河陰六明鎮原武凡八口九域志滑州白馬縣有靈河鎮魚池亦在滑州界酸棗津在大梁東北陽武在鄭州河陰在孟州東南六明鎮在大通軍大通軍即胡梁渡也晉天福四年建浮橋置大通軍原武在鄭州之北塞悉則翻先悉薦翻分遣使者塞之帝命趣草制帝命趣草制趣讀曰促以端明殿學士戶部侍郎王溥為中書侍郎同平章事壬辰宣制畢左右以聞帝曰吾無恨矣以樞密副使王仁鎬為永興軍節度使以殿前都指揮使李重進領武信節度使重直龍翻馬軍都指揮使樊愛能領武定節度使步軍都指揮使何徽領昭武節度使殿前都指揮使總殿前諸班馬軍都指揮使總侍衛司馬軍步軍都指揮使總侍衛司步軍宋朝三衙之職昉於此武信軍遂州武定軍洋州昭武軍利州三鎮皆屬蜀李重進等遙領也帝召入禁中屬以後事仍命拜榮以定君臣之分長知兩翻屬之欲翻分扶問翻是日帝殂于滋德殿年五十一乙未宣遺制丙申晉王即皇帝位考異曰太祖實録乙未宣遺制晉王榮可於柩前即皇帝位世宗實録丙申內出太祖遺制㣥臣奉帝即皇帝位蓋以乙未宣遺制丙申即位也帝命趣草制初靜海節度使吳權卒吳權據交州見二百八十一卷晉高祖天福三年南漢高祖之大有十一年也昌岌卒岌魚及翻弟昌文立是月始請命於南漢南漢以昌文為靜海節度使兼安南都護帝命趣草制北漢主聞太祖晏駕甚喜謀大舉入寇遣使請兵于契丹二月契丹遣其武定節度使政事令楊袞將萬餘騎如晉陽考異曰晉陽見聞録袞帥騎五七萬號十萬來會今從世宗實録以義成節度使白從暉為行軍都部署武寧節度使張元徽為前鋒都指揮使義成軍滑州武寧軍徐州皆屬周白從暉等亦遙領考異曰世宗實録賊將張暉領三千騎為前鋒今從晉陽聞見録趣七喻翻帝命趣草制蜀左匡聖馬步都指揮使保寧節度使安思謙譖殺張業廢趙廷隱二事並見二百八十八卷漢乾祐元年惡烏路翻蜀主使將兵救王景崇思謙逗橈無功見二百八十八卷漢乾祐二年蜀之明德十二年也橈奴教翻不自安自張業之誅宮門守衛加嚴思謙以為疑己言多不遜思謙典宿衛多殺士卒以立威蜀主閲衛士有年尚壯而為思謙所斥者復留隸籍思謙殺之蜀主不能平思謙三子扆嗣裔倚父勢暴橫為國人患橫戶孟翻翰林使王藻職官分紀唐有翰林使掌伎術之待詔者五代有翰林茶酒使蜀蓋仍唐舊制將反丁巳思謙入朝蜀主命壯士擊殺之及其三子藻亦坐亶啓邊奏並誅之帝命趣草制北漢兵屯梁侯驛昭義節度使李筠遣其將穆令均將步騎二千逆戰筠自將大軍壁於太平驛宋白曰梁侯驛在團柏谷南太平驛西北太平驛東南距潞州八十里陽不勝而北令均逐之伏發殺令均俘斬士卒千餘人筠遁歸上黨潞州治上黨筠即李榮也天福十二年李榮有逐麻答之功見二百八十七卷世宗聞北漢主入寇欲自將兵禦之㣥臣皆曰劉崇自平陽遁走以來謂廣順元年劉崇圍晉州不克而歸也事見上卷必不敢自來沮在呂翻陛下新即位山陵有日人心易搖易以豉翻不宜輕動宜命將禦之帝曰崇幸我大喪輕朕年少新立少詩照翻有吞天下之心此必自來朕不可不往馮道固爭之帝曰昔唐太宗定天下未嘗不自行朕何敢偷安道曰未審陛下能為唐太宗否帝曰以吾兵力之強破劉崇如山壓卵耳道曰未審陛下能為山否馮道歷事八姓身為宰輔不聞獻替唯諫世宗親征一事惟王溥勸行帝從之帝命趣草制三月乙亥朔蜀主加捧聖控鶴都指揮使兼中書令孫漢韶武信節度使賜爵樂安郡王罷軍職罷其掌禁兵之職也命山南西道節度使李廷圭等十人分典禁兵帝命趣草制北漢乘勝進逼潞州乘梁侯驛之勝也丁丑詔天雄節度使符彥卿引兵自磁州固鎮出北漢軍後磁州武安縣有固鎮自此西北行至遼州北漢軍時已攻潞州符彥卿若至遼州界則出其後矣磁牆之翻又詔河中節度使王彥超引兵自晉州東出邀北漢章十二行本漢下有軍字乙十一行本同孔本同張校同退齋校同九域志晉州東至潞州三百八十五里以保義節度使韓通副之又命馬軍都指揮使寧江節度使樊愛能步軍都指揮使清淮節度使何徽寧江軍夔州屬蜀清淮軍壽州屬唐樊何亦遙領也重直龍翻鄭州防禦使史彥超前耀州團練使符彥能將兵先趣澤州趣七喻翻宣徽使向訓監之監古銜翻重贊憲州人也帝命趣草制辛巳大赦帝命趣草制癸未帝命馮道奉梓宮赴山陵山陵在鄭州新鄭縣乙酉帝發大梁庚寅至懷州九域志大梁至懷州三百二十五里控鶴都指揮使真定趙朝私謂通事舍人鄭好謙曰朝直遙翻好呼到翻賊勢方盛宜持重以挫之好謙言於帝帝怒曰汝安得此言必為人所使言其人則生不然必死好謙以實對帝命並朝械於州獄懷州獄也壬辰帝過澤州九域志懷州北至澤州一百二十里北漢主不知帝至過潞州不攻引兵而南是夕軍於高平之南劉昫曰高平漢泫氏縣地宋白曰漢泫氏縣後魏改玄氏北齊改高平九域志高平縣在澤州東北六十五里癸巳前鋒與北漢軍遇擊之考異曰世宗實録甲午賊陳於高平南之高原按下又有甲午此必癸巳誤也今從十國紀年帝慮其遁去趣諸軍亟進趣讀曰促北漢主以中軍陳於巴公原陳讀曰陳下同巴公鎮在晉城縣東北張元徽軍其東楊袞軍其西衆頗嚴整時河陽節度使劉詞將後軍未至衆心危懼而帝志氣益鋭命白重進與侍衛馬步都虞候李重進將左軍居西白重進當作白重贊章十二行本正作贊乙十一行本同孔本同張校同退齋校同向訓史彥超將精騎居中央殿前都指揮使張永德將禁兵衛帝帝介馬自臨陳督戰北漢主見周軍少悔召契丹謂諸將曰吾自用漢軍可破也北漢主未戰而先有輕敵之心宜其敗也今日不惟克周亦可使契丹心服諸將皆以為然楊袞策馬前望周軍退謂北漢主曰勍敵也勍渠京翻北人望塵知敵數又觀敵人置陳而知其強弱楊袞必有見於此未可輕進北漢主奮髯曰髯如占翻時不可失請公勿言試觀我戰袞默然不悅時東北風方盛俄而忽轉南風北漢副樞密使王延嗣使司天監李義白北漢主云時可戰矣北漢主從之樞密直學士王得中扣馬諫曰義可斬也風勢如此豈助我者邪北漢主曰吾計已決老書生勿妄言且斬汝麾東軍先進張元徽將千騎擊周右軍合戰未幾幾居豈翻樊愛能何徽引騎兵先遁右軍潰步兵千餘人解甲呼萬歲降于北漢帝見軍勢危自引親兵犯矢石督戰太祖皇帝時為宿衛將謂同列曰主危如此吾屬何得不致死又謂張永德曰賊氣驕力戰可破也公麾下多能左射者請引兵乘高出為左翼我引兵為右翼以擊之國家安危在此一舉永德從之各將二千人進戰太祖皇帝身先士卒馳犯其鋒士卒死戰無不一當百先悉薦翻太祖皇帝自此肇基皇業北漢兵披靡披普彼翻內殿直夏津馬仁瑀謂衆曰使乘輿受敵安用我輩躍馬引弓大呼連斃數十人士氣益振內殿直周所置殿前諸班之號夏津漢鄃縣唐天寶元年改曰夏津屬貝州九域志屬大名府在府東北二百五十里瑀王矩翻乘繩證翻呼火故翻去年馬全乂自澶州從帝入朝已補殿前指揮使未至散員指揮使也右番行首居殿前右番班行之首其官猶在散員指揮使之下行戶剛翻賊勢極矣將為我擒願陛下按轡勿動徐觀諸將破之即引數百騎進陷陳北漢主知帝自臨陳陳讀曰陳下同褒賞張元徽趣使乘勝進兵趣讀曰促元徽前略陳馬倒為周兵所殺元徽北漢之驍將也北軍由是奪氣時南風益盛周兵爭奮北漢兵大敗北漢主自舉赤幟以收兵不能止北漢雖出於沙陀自謂劉氏纂高光之緒故旗幟尚赤幟昌志翻不敢救且恨北漢主之語全軍而退考異曰五代史補劉崇求援於契丹得飛騎數千及覩世宗兵少悔之召諸將謀曰吾觀周師易與耳契丹之衆宜勿使但以本軍決戰不唯破敵亦足使契丹見而心服諸將皆以為然乃使人謂契丹主將曰柴氏與吾主客之勢已見必不煩足下餘刃敢請勒兵登高觀之可也契丹不知其謀從之洎世宗之入陳也三軍皆賈勇爭進莫不一當百契丹望而畏之故不敢救而崇敗今從世宗實録薛史樊愛能何徽引數千騎南走控弦露刃剽掠輜重剽匹妙翻重直用翻役徒驚走失亡甚多帝遣近臣及親軍校追諭止之校戶教翻莫肯奉詔使者或為軍士所殺揚言契丹大至官軍敗績餘衆已降虜矣劉詞遇愛能等於塗愛能等止之詞不從引兵而北時北漢主尚有餘衆萬餘人阻澗而陳薄暮詞至復與諸軍擊之薄迫也復扶又翻下卒復同殺王延嗣追至高平僵尸滿山谷委棄御物及輜重器械雜畜不可勝紀僵居良翻勝音升是夕帝宿於野次得步兵之降敵者皆殺之樊愛能等聞周兵大捷與士卒稍稍復還還從宣翻有達曙不至者甲午休兵于高平選北漢降卒數千人為效順指揮命前武勝行軍司馬唐景思將之使戍淮上餘二千餘人賜資裝縱遣之資當作資潛竄山谷數日乃出丁酉帝至潞州北漢主自高平被褐戴笠被皮義翻褐毛衫也無柄曰笠有柄曰簦乘契丹所贈黃騮騮力求翻詩駉注赤馬黑髦曰騮黃色近於赤帥百餘騎由雕窠嶺遁歸雕窠嶺在高平西北由江者嶺路入帥讀曰率夜行而迷失道也誤之晉州行百餘里乃覺之殺導者晝夜北走所至得食未舉筯或傳周兵至輒蒼黃而去北漢主衰老力憊憊蒲拜翻伏於馬上晝夜馳驟殆不能支僅得入晉陽帝欲誅樊愛能等以肅軍政猶豫未決己亥晝臥行宮帳中張永德侍側帝以其事訪之張永德太祖壻既親且專掌殿前兵侍衛左右故訪以其事決可否愛能等素無大功忝冒節鉞望敵先逃死未塞責塞悉則翻且陛下方欲削平四海苟軍法不立雖有熊羆之士百萬之衆安得而用之帝擲枕於地大呼稱善呼火故翻即收愛能徽及所部軍使以上七十餘人使疏吏翻責之曰汝曹皆纍朝宿將非不能戰朝直遙翻將即亮翻下同今望風奔遁者無他正欲以朕為奇貨賣與劉崇耳悉斬之帝以何徽先守晉州有功事見二百九十卷太祖廣順元年既而以法不可廢遂並誅之而給槥車歸葬槥車小棺也槥音衛不行姑息之政矣庚子賞高平之功以李重進兼忠武節度使向訓兼義成節度使張永德兼武信節度使兼者以本職兼節鎮祿賜優於遙領者此正除節鎮帝擢太祖皇帝為殿前都虞候後魏之末宇文置虞候都督以主候騎虞候之官蓋始於此五代殿前都虞候在副都指揮使之下與都副指揮使同掌殿前班直嚴州隸嶺南時為南漢所有遙領刺史耳今武臣所領遙郡刺史正此類而落階官正除刺史者謂之正任刺史然亦未嘗臨郡治民也劉昫曰嚴州秦桂林郡地唐乾封間招致生獠置嚴州宋開寶七年廢嚴州以來賓縣隸象州馬全乂為散員指揮使自餘將校遷拜者凡數十人校戶教翻士卒有自行間擢主軍廂者行戶剛翻時諸軍皆分左右廂廂各有主帥按薛史自五季至宋武官有軍主廂主曹威為奉國軍主遷本軍廂主劉延欽為控鶴主是其徵也釋趙朝之囚囚趙朝所以威衆戰勝則釋之北漢主收散卒繕甲兵完城塹以備周楊袞將其衆北屯代州北漢主遣王得中送袞因求救於契丹契丹主遣得中還報許發兵救晉陽壬寅以符彥卿為河東行營都部署兼知太原行府事以郭崇副之向訓為都監李重進為馬步都虞候史彥超為先鋒都指揮使將步騎二萬發潞州仍詔王彥超韓通自陰地關入北漢既敗走移晉州東出之師北攻汾並又以劉詞為隨駕部署保大節度使白重贊副之乘勝進攻晉陽隨駕之下當有都字帝命趣草制漢昭聖皇太后李氏殂于西宮周太祖既踐阼漢太后李氏遷居西宮事見上卷廣順元年帝命趣草制夏四月北漢盂縣降盂古縣唐屬太原府九域志在府東北二百里然宋下太原徙治陽曲宋白曰盂縣本晉大夫盂丙之邑漢為盂縣按前此盂縣在今縣西陽曲縣東北八十里故盂縣城是也後魏省屬石艾縣隋開皇十六年分石艾縣置原仇縣屬遼州因原仇故城為名即今縣是也大業二年改原仇為盂縣從漢舊名王彥超攻汾州九域志晉州北至汾州三百五十里帝遣萊州防禦使康延沼攻遼州遼州唐之儀州也梁開平三年敕兗州管內已有沂州其儀州改為遼州九域志潞州東北至遼州二百四十三里皆不下唐置沁州至宋太平興國五年廢沁州以和川縣隸晉州熙寧五年省和川縣入冀氏九域志冀氏縣在晉州東二百八十里沁音七鴆翻説式芮翻漢超即降帝命趣草制乙卯葬聖神恭肅文武孝皇帝于嵩陵三月乙酉梓宮赴山陵四月乙卯方葬與北漢交兵葬備多闕故緩帝命趣草制南漢主以高王弘邈為雄武節度使鎮雍州弘邈以齊鎮二王相繼死於雍州固辭齊王弘弼死見二百八十三卷晉天福八年鎮王弘澤死見二百八十四卷晉開運元年不許至鎮委政僚佐日飲酒禱鬼神或上書誣弘邈謀作亂戊午南漢主遣甘泉宮使林延遇賜鴆殺之帝命趣草制初帝遣符彥卿等北征但欲耀兵於晉陽城下未議攻取既入北漢境其民爭以食物迎周師泣訴劉氏賦役之重願供軍須助攻晉陽北漢州縣繼有降者帝聞之始有兼並之意史言謀不先定者非廟勝之策諸將皆言芻糧不足請且班師以俟再舉帝不聽師有歸志宜其無功軍士不免剽掠北漢民失望剽匹妙翻稍稍保山谷自固帝聞之馳詔禁止剽掠安撫農民止徵今歲租稅及募民入粟拜官有差仍發澤潞晉絳慈隰及山東近便諸州民運糧以饋軍山東近便諸州謂邢趙鎮定己未遣李穀詣太原計度芻糧度徒洛翻帝命趣草制庚申太師中書令瀛文懿王馮道卒考異曰五代通録諡曰文愍今從世宗實録薛史以此知名人所難能也少詩照翻馮道事劉守光位不過參軍入唐始貴顯離力智翻唐制太師太傅太保為三師太尉司徒司空為三公為人清儉寬弘人莫測其喜慍滑稽多智浮沈取容滑音骨沈持林翻嘗著長樂老敘自述纍朝榮遇之狀馮道長樂老敘既自陳其榮遇又自謂孝於家忠於國為子為弟為人臣為師長為夫為父有子有孫時開一卷時飲一杯食味別聲被色老安於當代老而自樂何樂如之其自述如此歐陽修論曰禮義廉恥國之四維四維不張國乃滅亡管子之言治人之大法治直之翻廉恥立人之大節況為大臣而無廉恥天下其有不亂國家其有不亡者乎豫讀馮道長樂老敘見其自述以為榮其可謂無廉恥者矣則天下國家可從而知也豫於五代得全節之士三謂王彥章裴約劉仁贍謂張源德夏魯奇姚洪王思同張敬達翟進宗沈斌王清史彥超孫晟馬彥超宋令珣李遐張彥卿鄭昭業凡十五人豈於儒者果無其人哉得非高節之士惡時之亂惡烏路翻薄其世而不肯出歟抑君天下者不足顧而莫能致之歟豫嘗聞五代時有王凝者家青齊之間為虢州司戶參軍以疾卒于官凝家素貧一子尚幼妻李氏攜其子負其遺骸以歸東過開封止於旅舍主人不納李氏顧天已暮不肯去主人牽其臂而出之李氏仰天慟曰我為婦人不能守節而此手為人所執邪即引斧自斷其臂見者為之嗟泣斷音短為之于偽翻開封尹聞之白其事於朝厚恤李氏而笞其主人此事歐陽公得之於五代小説朝直遙翻下同士不自愛其身而忍恥以偷生者聞李氏之風宜少知愧哉少詩沼翻臣光曰天地設位聖人則之以制禮立法內有夫婦外有君臣婦之從夫終身不改臣之事君有死無二此人道之大倫也苟或廢之亂莫大焉范質稱馮道厚德稽古宏才偉量雖朝代遷貿人無間言貿音茂易也間古莧翻山乞若巨山不可轉也夷考范質之為人蓋學馮道者也山乞與屹同魚迄翻忠臣不事二君為女不正雖復華色之美織絍之巧不足賢矣為臣不忠雖復材智之多治行之優不足貴矣絍汝鴆翻治直吏翻行下孟翻何則大節已虧故也道之為相歷五朝八姓五朝唐晉遼漢周八姓唐莊宗明宗潞王各為一姓石晉邪律劉漢周太祖世宗各為一姓朝為仇敵暮為君臣易面變辭曾無愧怍怍疾各翻大節如此雖有小善庸足稱乎或以為自唐室之亡㣥雄力爭帝王興廢遠者十餘年近者四三年雖有忠智將若之何當是之時失臣節者非道一人豈得獨罪道哉臣愚以為忠臣憂公如家見危致命君有過則強諫力爭國敗亡則竭節致死智士邦有道則見見賢遍翻邦無道則隱或滅迹山林或優遊下僚今道尊龍則冠三師權任則首諸相冠古玩翻相息亮翻國存則依違拱默竊位素餐國亡則圖全苟免迎謁勸進君則興亡接踵道則富貴自如茲乃姦臣之尤安得與他人為比哉或謂道能全身遠害於亂世斯亦賢已遠于願翻臣謂君子有殺身成仁無求生害仁引論語夫子之言然則盜跖病終而子路醢果誰賢乎盜跖從卒九千橫行天下而以壽終子路仕衛孔悝之難子路死之菹於衛東門之上抑此非特道之愆也愆過也時君謂五朝八姓之君不正之女中士羞以為家不忠之人中君羞以為臣中士中君以人品言謂識見不及上而可以語上者語其忠則反君事讎語其智則社稷為墟後來之君不誅不棄乃復用以為相復扶又翻彼又安肯盡忠於我而能獲其用乎故曰非特道之愆亦時君之責也溫公以此警後世之君臣深矣帝命趣草制辛酉符彥卿奏北漢憲州刺史太原韓光願嵐州刺史郭言皆舉城降屬郡雖降而都府未克終於無益大軍既退則其地復為敵有矣帝命趣草制初符彥卿有女適李守貞之子崇訓相者言其貴當為天下母守貞喜曰吾婦猶母天下況我乎反意遂決及敗崇訓先刃其弟妹次及符氏符氏匿幃下崇訓倉猝求之不獲遂自剄剄古頂翻亂兵既入符氏安坐堂上叱亂兵曰吾父與郭公為昆弟汝曹勿無禮太祖遣使歸之於彥卿及帝鎮澶州廣順元年帝鎮澶州三年入為開封尹為于偽翻壬戌立為皇后后性和惠而明決帝甚重之帝命趣草制王彥超韓通攻石州克之執刺史安彥進癸亥沁州刺史李廷誨降庚午帝發潞州趣晉陽趣七喻翻癸酉北漢欣州監軍李勍殺刺史趙皋及契丹通事楊耨姑勍渠京翻耨奴篤翻舉城降以勍為欣州刺史帝命趣草制王逵表請復徙使府治朗州去年王逵移使府於潭州復扶又翻治直之翻容肇祖標點聶崇岐覆校
