body:
  text: 資治通鑑卷第五朝散大夫右諫議大夫權御史中丞充理檢使上護軍賜紫金魚袋臣奉敕編集後學天台音注周紀五赧王下四十三年四十三年楚以左徒黃歇侍太子完為質於秦左徒楚官名史記正義曰蓋今在左右拾遺補闕之類質音致按去年秦欲與韓魏伐楚黃歇上書止之歸而報楚楚遂使歇侍太子為質於秦為楚王疾病歇使太子亡歸楚張本歇許竭翻四十三年秦置南陽郡凡山南水北皆謂之南陽晉南陽在修武以在太行之南大河之北也秦置南陽郡以在南山之南漢水之北也四十三年秦魏楚共伐燕燕因肩翻四十三年燕惠王薨子武成王立四十四年四十四年趙藺相如伐齊至平邑括地志平邑故城在魏州昌樂縣東北四十里藺力刃翻樂音洛四十四年趙田部吏趙奢收租稅田部吏部收田之租稅者也趙奢以法治之殺平原君用事者九人治直之翻平原君之家臣用事而不肯出租稅者也平原君怒將殺之趙奢曰君於趙為貴公子今縱君家而不奉公則法削法削則國弱國弱則諸侯加兵是無趙也削侵也奪也弱劣也懦也以君之貴奉公如法則上下平上下平則國強國強則趙固而君為貴戚豈輕於天下邪邪音耶戚親也言平原君於趙則王族親戚之貴者也平原君以為賢賢善也能也王使治國賦國賦太平民富而府庫實觀此則趙奢豈特善兵哉可使治國也治直之翻四十五年四十五年秦伐趙圍閼與司馬彪志上黨郡涅縣有閼與聚水經注上黨沾縣有梁榆城即閼與故城盧謀征艱賦曰訪梁榆之虛郭乃閼與之舊平史記正義曰閼與在潞州銅鞮縣西北二十里又儀州和順縣亦有閼與城儀潞相近二所未詳又閼與山在潞州武安縣西南五十里趙奢拒秦軍於閼與即山北也河東圖遼州和順縣晉大夫梁餘子養邑秦伐閼與趙奢救之是此遼州即唐之儀州閼阿葛翻又於達翻康音曷又音嫣與音預又音余史記正義曰閼於連翻漢書音義涅乃結翻聚才喻翻沾他兼翻諶時壬翻鞮丁兮翻潞魯故翻索隱曰樂乘樂毅之宗人也頗普河翻可救否皆曰道遠險狹難救狹與狹同隘也趙奢對曰道遠險狹譬猶兩鼠鬬於穴中將勇者勝言將是勇者勝也將平聲或曰帥勇者則勝將去聲去邯鄲三十里而止令盧經翻邯鄲音寒丹令軍中曰有以軍事諫者死令力正翻趙奢此令非以禁約所部以愚秦軍也秦師軍武安西班志武安縣屬魏郡宋白曰洺州治永年縣隋改廣平為永年屬武安郡秦軍勒兵武安西即此地劉昫曰磁州治滏陽縣漢武安縣地隋又置武安縣亦屬磁州磁祥之翻昫吁句翻武安屋瓦盡振趙軍中候有一人言急救武安趙奢立斬之此軍之中候也漢北軍中候之官本此或曰軍中之候軍吏也章十二行本璧作壁乙十一行本同孔本同十二行本二上有留字乙十一行本同孔本同退齊校同十八日不行復益增壘復扶又翻又音如字壘力水翻秦間入趙軍趙奢善食遣之間以報秦將間古莧翻此孫子所謂反間也食祥吏翻將即亮翻秦將大喜曰夫去國三十里而軍不行乃增壘閼與非趙地也趙奢既已遣間卷甲而趨卷讀曰捲凡捲舒之卷皆同音一章十二行本一作二乙十一行本同日一夜而至去閼與五十里而軍軍壘成秦師聞之悉甲而往趙軍士許歷請以軍事諫趙奢進之姓譜許姓本自姜姓炎帝之後太嶽之胤其後以國為氏秦人不意趙至此其來氣盛將軍必厚集其陳以待之陳讀曰陳不然必敗趙奢曰請受教許歷請刑趙奢曰胥後令邯鄲索隱曰按胥須古人通用今者胥後令謂胥為須須者待也待後令謂許歷之言更不擬誅之故更待後令也邯鄲二字當為欲戰謂臨戰之時許歷復諫也余謂胥語絶許歷請刑趙奢令其且待也蓋謂敢諫者死邯鄲之令耳今既自邯鄲進軍近閼與矣許歷之諫固在邯鄲之後不當用邯鄲之令以殺之故曰後令邯鄲令力正翻邯鄲音寒丹奢令力丁翻曰先據北山上者勝後至者敗趙奢許諾即發萬人趨之秦師後至爭山不得上趨七喻翻又音如字得上時掌翻趙奢縱兵擊秦師秦師大敗解閼與而還還從宣翻又音如字趙王封奢為馬服君服虔曰馬服猶言服馬也括地志邯鄲縣西北有馬服山以許歷為國尉四十五年穰侯言客卿竈於秦王穰人羊翻使伐齊取剛壽以廣其陶邑括地志故剛城在兗州龔丘縣壽鄆州之縣也余據唐志鄆州壽張縣武德初置壽州通鑑書此以發范睢間穰侯之事間古莧翻初魏人范睢姓譜范本陶唐氏之後隨會為晉大夫食采於范後有因睢音雖從中大夫須賈使於齊戰國之時仍周之制置上中下三大夫漢百官表中大夫掌論議須姓密須氏之後風俗通須姓太昊之後蓋本之須句使疏吏翻句音胊私賜之金及牛酒須賈以為睢以國陰事告齊也歸而告其相魏齊魏齊怒笞擊范睢折脅摺齒睢佯死卷以簀置廁中使客醉者更溺之索隱曰折脅摺齒謂擊折其脅又拉折其齒也簀謂葦狄之薄用之以卷其尸也余謂簀字從竹蓋竹為之非葦荻之薄也又謂竹東南之産北人貴之自江以北饒葦荻人率織之以為薄寢或以為薦籍索隱以葦薄為簀習於所見而從俗所呼者耳相息亮翻笞丑之翻摺力答翻卷讀曰捲簀竹革翻更工衡翻溺奴弔翻令無妄言者令力丁翻范睢謂守者曰能出我我必有厚謝守者乃請棄簀中死人魏齊醉曰可矣范睢得出魏齊悔復召求之令盧經翻復扶又翻又音如字魏人鄭安平遂操范睢亡匿更姓名曰張祿操七刀翻秦謁者王稽使於魏謁者秦官漢因之志云主殿上時節威儀謁者僕射一人為謁者臺率其下有給事謁者有灌謁者使疏吏翻率讀曰帥稽潛載與俱歸薦之於王王見之於離宮離宮別宮也佯音羊古字多作陽詐也如淳曰周宣王姜后脫簪珥待罪永巷後改為掖庭師古曰永長也本謂宮中之長巷也或曰宮中獄也王來而宦者怒逐之曰王室范睢謬曰秦安得王秦獨有太后穰侯耳謬靡幼翻誤也詐也穰人羊翻王微聞其言乃屏左右跽而請曰先生何以幸教寡人對曰唯唯如是者三屏卑郢翻又卑正翻後凡屏退之屏皆同音跽忌己翻跪也唯于癸翻蓋應聲也凡唯諾之唯皆同音王曰先生卒不幸教寡人邪卒子恤翻終也邪音耶范睢曰非敢然也睢音雖然猶言如是也臣羇旅之臣也交疏於王而所願陳者皆匡君之事處人骨肉之間處昌呂翻願效愚忠而未知王之心也此所以王三問而不敢對者也臣知今日言之於前明日伏誅於後然臣不敢避也且死者人之所必不免也苟可以少有補於秦而死此臣之所大願也少始紹翻獨恐臣死之後天下杜口裹足莫肯鄉秦耳謂天下之士懲睢之死不敢復言鄉讀曰嚮先生是何言也今者寡人得見先生是天以寡人溷先生而存先王之宗廟也溷謂溷瀆之也漢陸賈曰毋久溷公即此義音戶困翻毛晃曰溷濁也又汚辱也上及太后下至大臣願先生悉以教寡人無疑寡人也范睢拜王亦拜范睢曰以秦國之大士卒之勇以治諸侯譬若走韓盧而博蹇兔也韓盧天下之駿犬蹇兔病足之兔韓盧搏兔無不獲者况蹇兔乎治直之翻不敢窺兵於山東者是穰侯為秦謀不忠而大王之計亦有所失也穰人羊翻為于僞翻王跽曰寡人願聞失計然左右多竊聽者范睢未敢言內先言外事以觀王之俯仰因進曰夫穰侯越韓魏而攻齊剛壽非計也夫音扶齊湣王南攻楚破軍殺將謂殺唐昧也見上卷十四年湣讀曰閔將即亮翻辟讀曰闢昧莫葛翻而齊尺寸之地無得焉者豈不欲得地哉形勢不能有也諸侯見齊之罷敝起兵而伐齊大破之齊幾於亡事見上卷三十一年罷讀曰疲幾居依翻今王不如遠交而近攻得寸則王之寸也得尺亦王之尺也今夫韓魏中國之處夫音扶康曰處敞呂翻余謂處昌據翻於世俗常言音義為長而天下之樞也以門戶為喻門戶之闔闢皆由於樞章十二行本用作欲乙十一行本同孔本同退齊校同霸必親中國以為天下樞以威楚趙用霸者請謂用霸天下之術趙強則附楚強者未易柔服故先親附弱者易以豉翻齊必懼矣齊附則韓魏因可虜也王曰善乃以范睢為客卿與謀兵事范睢謀反事則三晉受兵禍而穰侯兄弟皆為秦所逐矣四十六年四十六年秦中更胡傷攻趙閼與不拔更工衡翻胡傷意謂即上卷客卿之胡陽閼於葛翻又於連翻與音預四十七年四十七年秦王用范睢之謀使五大夫綰伐魏拔懷班志懷縣屬河內郡括地志曰懷縣在懷州武陟縣西十一里睢息隨翻四十八年四十八年秦悼太子質於魏而卒質音致卒子恤翻四十九年四十九年秦拔魏邢丘范睢日益親用事因承間說王曰睢息隨翻間古莧翻說式芮翻臣居山東時聞齊之有孟嘗君不聞有王聞秦有太后穰侯不聞有王夫亶國之謂王能利害之謂王制殺生之謂王今太后亶行不顧穰侯出使不報華陽涇陽擊斷無諱夫音扶使疏吏翻華戶化翻斷丁亂翻凡斷決之斷皆同音高陵進退不請四貴備而國不危者未之有也為此四貴者下乃所謂無王也穰侯使者操王之重決制於諸侯剖符於天下操七刀翻謂剖符而出使也征敵伐國莫敢不聽戰勝攻取則利歸於陶陶穰侯封邑臣又聞之木實繁者披其枝披其枝者傷其心大其都者危其國左傳祭仲曰都城過百雉國之害也辛伯曰大都耦國亂之本也申無宇曰鄭京櫟實殺曼伯宋蕭亳實殺子游衛蒲戚實出獻公齊渠丘實殺無知而陳蔡不羹亦殺楚靈王此皆大都危國也傳直戀翻祭則介翻陸德明櫟音立曼音萬羹音郎如下事之類射王股擢王筋懸之於廟梁宿昔而死管掌也擢拔也宿昔一夕之間也淖齒弒齊湣王事見上卷三十一年淖女教翻射而亦翻囚主父於沙丘百日而餓死事見上卷二十年此亦淖齒李兌之類也夫三代之所以亡國者君專授政於臣縱酒弋獵其所授者妬賢疾能御下蔽上以成其私不為主計而主不覺悟故失其國夫音扶今自有秩以上至諸大吏漢承秦制鄉置有秩漢官曰鄉戶五千則置有秩掌一鄉之入風俗通曰有秩則田間大夫言其官裁有秩耳大吏謂左右中更以上為吏者也秩直乙翻無非相國之人者見王獨立於朝臣竊為王恐萬世之後有秦國者非王子孫也相息亮翻朝直遙翻為于僞翻王以為然於是廢太后逐穰侯高陵華陽涇陽君於關外以范睢為丞相封為應侯應於陵翻國名周武王之子封於應其地在唐安州界魏王使須賈聘於秦應侯敝衣間步而往見之間步投間隙徒步而行也間古莧翻范叔固無恙乎范睢字叔恙憂也病也又噬蟲善食人心者也古人相問率曰無恙朱熹曰古者草居多被噬蟲之毒故相問曰無恙乎恙餘亮翻噬時制翻取一綈袍贈之綈田黎翻厚繒也袍步刀翻長襦也記玉藻曰纊為繭縕為袍孔穎達曰純著新綿者為襺雜用舊絮者為袍遂為須賈御而至相府曰我為君先入通於相君須賈怪其久不出問於門下門下曰無范叔鄉者吾相張君也相息亮翻為于僞翻睢更姓名曰張祿故云然鄉讀曰嚮須賈知見欺乃膝行入謝罪膝行屈膝就地而行以示跪伏責讓之且曰爾所以得不死者以綈袍戀戀尚有故人之意耳乃大供具請諸侯賓客坐須賈於堂下置莝豆於前而馬食之莝寸斬之藳雜豆以飼馬莝豆兩物也莝寸臥翻食祥吏翻速斬魏齊頭來不然且屠大梁屠殺也自古以來以攻下城而盡殺城中人為屠城亦曰洗城以告魏齊魏齊奔趙匿於平原君家還從宣翻又音如字平原君趙勝趙王之貴介弟也貴盛於趙以好士聞於侯故魏齊奔歸之而就匿焉四十九年趙惠文王薨子孝成王丹立以平原君為相相息亮翻五十年五十年秦宣太后薨九月穰侯出之陶薨呼肱翻穰人羊翻臣光曰穰侯援立昭王除其災害事見三卷十年援于元翻手引也見上卷二十三年將即亮翻東屬地於齊言拓地東聯於齊也事並見上卷鄢於晚翻郢以井翻屬之欲翻稽音啓秦益強大者穰侯之功也雖其專恣驕貪足以賈禍賈音古言其致禍如商賈之賈物也凡商賈之賈皆同音亦未至盡如范睢之言若睢者亦非能為秦忠謀直欲得穰侯之處故扼其吭而奪之耳睢息隨翻為于僞翻扼音厄說文曰捉也吭音剛咽也遂使秦王絶母子之義失舅甥之恩要之睢真傾危之士哉五十年秦王以子安國君為太子為安國君立子異人為嗣張本嗣祥吏翻五十年秦伐趙取三城趙王新立太后用事求救於齊齊人曰必以長安君為質索隱曰趙亦有長安今其地闕孔衍曰長安君惠文王之少子也史記正義曰長安君以長安善故名也質音致索山客翻少始照翻齊師不出大臣強諫強諫猶力諫也復言長安君為質者老婦必唾其面復扶又翻唾吐臥翻口液也明謂左右者顯言之也左師觸龍願見太后太后盛氣而胥之入胥待也言盛氣以待其入也自謝曰老臣病足不得見久矣竊自恕而恐太后體之有所苦也故願望見太后太后曰老婦恃輦而行曰食得毋衰乎曰恃粥耳太后不和之色稍解左師公曰老臣賤息舒祺春秋時宋國之官有左右師上卿也趙以觸龍為左師蓋冗散之官以優老臣者也息子也祺音其冗而隴翻散悉亶翻不肖而臣衰竊憐愛之願得補黑衣之缺以衛王宮昧死以聞黑衣衛士之服也觸龍先為其少子言以發太后之問也昧死言忘其死也少失照翻又音小昧莫佩翻諾年幾何矣對曰十五歲矣雖少願及未填溝壑而託之幾居豈翻謙言死必填溝壑願及未死而託少子也太后曰丈夫亦愛少子乎對曰甚於婦人太后笑曰婦人異甚對曰老臣竊以為媼之愛燕后賢於長安君媼烏浩翻婦之老者之稱趙太后之女嫁於燕故稱之曰燕后燕因肩翻太后曰君過矣不若長安君之甚左師公曰父母愛其子則為之計深遠媼之送燕后也持其踵而泣念其遠也亦哀之矣已行非不思也祭祀則祝之曰必勿使反豈非為之計長久為子孫相繼為王也哉太后曰然左師公曰今三世以前至於趙王之子孫為侯者其繼有在者乎曰無有曰此其近者禍及身遠者及其子孫豈人主之子侯則不善哉位尊而無功奉厚而無勞奉讀曰俸凡奉祿之奉皆同音而挾重器多也今媼尊長安君之位而封之以膏腴之地多與之重器而不及今令有功於國令力丁翻使也一旦山陵崩長安君何以自託於趙哉太后曰諾恣君之所使之於是為長安君約車百乘質於齊為于僞翻乘繩證翻質音致齊師乃出秦師退五十年齊安平君田單將趙師以伐燕取中陽徐廣曰陽一作人史記正義曰燕無中陽括地志中山故城一名中人亭在定州唐縣北四十一里是時蓋屬燕將即亮翻燕因肩翻取注人括地志注城在汝州梁縣西四十五里五十年齊襄王薨子建立建年少國事皆決於君王后少失照翻五十一年五十一年秦武安君伐韓拔九城斬首五萬五十一年田單為趙相五十二年秦武安君伐韓取南陽攻太行道絶之秦封白起為武安君韓之南陽即河內野王之地班志太行山在野王西北括地志在懷州河內縣北四十五里行戶剛翻楚頃襄王疾病疾至於甚曰病今楚王疾恐不起秦不如歸其太子太子得立其事秦必重而德相國無窮是親與國而得儲萬乘也不歸則咸陽布衣耳四十三年黃歇與楚太子為質於秦應於陵翻相息亮翻乘繩證翻歇許竭翻必不事秦更工衡翻是失與國而絶萬乘之和非計也應侯以告王王曰令太子之傅先往問疾反而後圖之黃歇與太子謀曰秦之留太子欲以求利也今太子力未能有以利秦也令力丁翻歇許竭翻而陽文君子二人在中王若卒大命謂死也卒終也音子恤翻陽文君子必立為後太子不得奉宗廟矣不如亡秦與使者俱出逃去為亡使疏吏翻以死當之太子因變服為楚使者御而出關而黃歇守舍常為太子謝病度太子已遠歇許竭翻守舍者守楚太子所寓館舍常為于僞翻度徒洛翻乃自言於王曰楚太子已歸出遠矣歇願賜死王怒欲聽之應侯曰歇為人臣出身以徇其主太子立必用歇不如無罪而歸之言無以罪加歇而歸之於楚以結其和親也應於陵翻王從之黃歇至楚三月秋頃襄王薨考烈王即位頃音傾秋即是年秋考烈王即太子完以黃歇為相封以淮北地號曰春申君史記歇初封春申君賜淮北十四縣後徙封江東因城吳故墟以為都邑今蘇州是也相息亮翻五十三年五十三年楚人納州于秦以平司馬彪志南郡州陵縣注云楚考烈王納州于秦即其地五十三年武安君伐韓拔野王上黨路絶武安君上逸秦字史記正義曰從太行西北澤潞等州皆上黨郡地釋名云上黨所治在山上其所最高故曰上黨姓譜畢公高之子食采於馮城因以命氏鄭有大夫馮簡子守式又翻鄭道已絶韓都新鄭自上黨趣鄭由野王渡河今秦拔野王故鄭道絶韓不能應不如以上黨歸趙趙受我秦必攻之趙被秦兵必親韓應於證翻被皮義翻韓趙為一則可以當秦矣乃遣使者告於趙曰韓不能守上黨入之秦謂韓獻上黨於秦使疏吏翻章十一行本於作為乙十一行本同孔本同張校同退齊校同趙不樂為秦為于僞翻樂音洛下同有城市邑十七城市邑言邑之有城市者指言大邑也趙王以告平陽君豹對曰聖人甚禍無故之利甚禍者言甚以為禍也人樂吾德何謂無故對曰秦蠶食韓地中絶不令相通固自以為坐而受上黨也韓氏所以不入於秦者欲嫁其禍於趙也毛晃曰推惡與人曰嫁怨嫁禍推吐雷翻雖強大不能得之於弱小弱小固能得之於強大乎豈得謂之非無故哉不如勿受王以告平原君平原君請受之王乃使平原君往受地秦有吞天下之心使趙不受上黨而秦得之亦必據上黨而攻趙故趙之禍不在於受上黨而在於用趙括守式又翻以千戶都三封其縣令為侯吏民皆益爵三級馮亭垂涕不見使者曰吾不忍賣主地而食之也使疏吏翻五十五年五十五年秦左庶長王齕攻上黨拔之長知丈翻齕音紇杜佑恨勿翻康胡骨切上黨民走趙趙廉頗軍於長平司馬彪志上黨泫氏縣有長平亭括地志長平故城在上黨縣西四十一里杜佑曰白起坑趙卒於長平有頭顱山築臺於壘中因山為臺宋白曰秦坑趙卒於長平今澤州之北高平縣西北二十一里長平故城是也頗普何翻泫工玄翻顱音盧壘魯水翻毛晃曰按於旰翻抑也止也據也余謂此據按二字按字當以抑止為義據依據也引援也拒守也言廉頗依據上黨地險引援上黨之民而拒守也康曰按音遏此義亦通但按字無遏音王齕因伐趙趙軍數戰不勝數所角翻止章十二行本止作亡乙十一行本同孔本同退齊校同一裨將四尉裨將軍之副將也尉軍中諸部都尉也裨頻彌翻將即亮翻風俗通曰凡氏之興九事氏於號者唐虞夏殷是也氏於國者齊魯宋衛是也氏於事者巫卜陶匠是也氏於字者伯仲叔季是也氏於諡者戴武宣穆是也媾音構和也虞卿曰今制媾者在秦秦必欲破王之軍矣雖往請媾秦將不聽不如發使以重寶附楚魏楚魏受之則秦疑天下之合從從子容翻媾乃可成也王不聽使鄭朱媾於秦秦受之王謂虞卿曰秦內鄭朱矣虞卿時為趙之相王必不得媾而軍破矣何則天下之賀戰勝者皆在秦矣夫鄭朱貴人也秦王應侯必顯重之以示天下夫音扶應於陵翻天下見王之媾於秦必不救王秦知天下之不救王則媾不可得成矣既而秦果顯鄭朱而不與趙媾史言趙之喪師蹙國不特以趙括代廉頗之故亦由不用虞卿之計也秦數敗趙兵廉頗堅壁不出趙王以頗失亡多而更怯不戰怒數讓之數所角翻屢也敗補邁翻應侯又使人行千金於趙為反間曰秦之所畏獨畏馬服君之子趙括為將耳間古莧翻將即亮翻廉頗易與且降矣易弋豉翻降戶江翻趙王遂以趙括代頗將藺相如曰王以名使括若膠柱鼓瑟耳鼓瑟者絃有緩急調絃之緩急在柱之運轉若膠其柱則絃不可得而調緩者一於緩急者一於急無活法矣不知合變也兵以正合以奇變傳直戀翻初趙括自少時學兵法以天下莫能當嘗與其父奢言兵事奢不能難少詩照翻難乃旦翻辨折之也然不謂善括母問其故奢曰兵死地也而括易言之易以豉翻輕也使趙不將括則已若必將之將即亮翻下同破趙軍者必括也及括將行其母上書言括不可使王曰何以上時掌翻言以何事知其不可使也對曰始妾事其父時為將身所奉飯而進食者以十數奉讀曰捧所友者以百數王及宗室所賞賜者盡以與軍吏士大夫受命之日不問家事今括一旦為將東鄉而朝軍吏無敢仰視之者將即亮翻朝直遙翻王所賜金帛歸藏於家而日視便利田宅可買者買之王以為如其父父子異心願王勿遣王曰母置之吾已決矣置止也廢也置之言廢置此事止勿言也即如有不稱妾請無隨坐稱尺證翻不稱言不勝任也隨坐相隨而坐罪也觀此則知古者敗軍之將罪併及其家趙王許之秦王聞括已為趙將乃陰使武安君為上將軍而王齕為裨將令軍中有敢泄武安君將者斬趙括至軍悉更約束齕恨勿翻更工衡翻易置軍吏出兵擊秦師武安君佯敗而走佯音羊詐也張二奇兵以劫之劫勢脅也說文人欲去以力脅止曰劫造七到翻詣也壁堅拒不得入奇兵二萬五千人絶趙軍之後又五千騎絶趙壁間騎奇寄翻趙軍分而為二糧道絶武安君出輕兵擊之趙戰不利因築壁堅守以待救至秦王聞趙食道絶自如河內發民年十五以上悉詣長平遮絶趙救兵及糧食如往也上時掌翻遮者遮斷其路趙人乏食請粟于齊王章十二行本王上有齊字乙十一行本同孔本同張校同退齊校同弗許周子曰夫趙之於齊楚扞蔽也夫音扶猶齒之有脣也脣亡則齒寒今日亡趙明日患及齊楚矣救趙之務宜若奉漏甕沃焦釜然奉讀曰捧言惟恐不及也且救趙高義也卻秦師顯名也義救亡國威卻強秦不務為此而愛粟為國計者過矣齊王弗聽九月趙軍食絶四十六日皆內陰相殺食急來攻章十二行本攻下有秦字乙十一行本同孔本同張校同退齊校同壘史言急來攻壘趙括為計如此耳下言欲出而不能出趙括自出而死其勢可見四五復之不能出言括欲分其卒為四隊更攻秦壘自一隊至四隊至五則復之而不能出也秦人射殺之射而亦翻趙師大敗卒四十萬人皆降降戶江翻武安君曰秦已拔上黨上黨民不樂為秦而歸趙趙卒反覆非盡殺之恐為亂乃挾詐而盡坑殺之遺其小者二百四十人歸趙樂為上音洛下于僞翻又音如字四十餘萬人皆死而獨遺小者二百四十人得歸趙此非得脫也白起之譎也強壯盡死則小弱得歸者必言秦之兵威所以破趙人之膽將以乘勝取邯鄲也為應侯所沮故白起之計不得行耳譎古穴翻邯鄲音寒丹應於陵翻沮在呂翻卒子恤翻前後斬首虜四十五萬人趙人大震此言秦兵自挫廉頗至大破趙括前後所斬首虜之數耳兵非大敗四十萬人安肯束手而死邪五十六年五十六年十月武安君分軍為三王齕攻趙武安皮牢拔之史記正義曰皮牢故城在絳州龍門縣西一里余謂秦兵已至上黨不應復回攻絳州之皮牢宋白曰蒲州龍門縣秦為皮氏縣今縣西一里八十步古皮氏城是也恐可不以皮氏為皮牢太原即漢太原郡地在上黨西北韓魏使章十二行本使上有恐字乙十一行本同孔本同張校同退齊校同蘇代厚幣說應侯曰武安君即圍邯鄲乎說式芮翻邯鄲音寒丹曰然蘇代曰趙亡則秦王王矣秦之稱王自王其國耳今破趙國則將王天下也君能為之下乎雖欲無為之下固不得已矣秦嘗攻韓圍邢丘困上黨四十九年通鑑書秦拔魏邢丘豈其時邢丘之地固屬韓邪天下不樂為秦民之日久矣樂音洛今亡趙北地入燕東地入齊南地入韓魏則君之所得民無幾何人矣不如因而割之無以為武安君功也應侯言於秦王曰秦兵勞請許韓趙之割地以和且休士卒王聽之割韓垣雍趙六城以和應於陵翻司馬彪志河南卷縣有垣雍城或曰古衡雍注曰今縣所治城是也史記正義曰垣雍城在今鄭州原武縣西北七里雍於用翻正月皆罷兵觀此則亦用十月為歲首蓋因秦記而書之也為秦殺白起張本趙王將使趙郝約事於秦割六縣約事約結和之事也郝音釋徐廣曰一作赦秦之攻王也倦而歸乎王以其力尚能進愛王而弗攻乎王曰秦不遺餘力矣必以倦而歸也遺失也秦以其力攻其所不能取倦而歸王又以其力之所不能取以送之是助秦自攻也來年秦攻王王無救矣言無救於講和之失計也樓緩至趙趙王與之計之樓緩曰虞卿得其一不得其二秦趙構難而天下皆說難乃旦翻說讀曰悅何也曰吾且因強而乘弱矣今趙不如亟割地為和以疑天下緩謂趙與秦和則天下疑趙有秦之援將不敢乘弱而國之不然天下將因秦之怒乘趙之敝瓜分之趙且亡何秦之圖乎虞卿聞之復見曰危哉樓子之計是愈疑天下復扶又翻又音如字卿親謂趙與秦和則天下愈疑而不肯親趙也而何慰秦之心哉獨不言其示天下弱乎且臣言勿與者非固勿與而已也秦索六城於王而王以六城賂齊齊秦之深讎也索山客翻齊自宣湣以來楚而讎秦孟嘗君嘗率諸侯伐秦至函谷湣讀曰閔其聽王不待辭之畢也則是王失之於齊而取償於秦而示天下有能為也言趙失地於賂齊而能攻秦取其地以償所失兵未窺於境臣見秦之重賂至趙而反媾於王也從秦為媾韓魏聞之必盡重王媾居候翻說文媾重婚也引易匪寇婚媾夫已婚而夫妻反目而不和既而復和者為媾此言秦趙為寇讎而交兵至今而復和故以媾為言也重直隴翻是王一舉而結三國之親而與秦易道也秦脅韓魏使事秦趙結韓魏使親趙是與秦易道易音如字善使虞卿東見齊王與之謀秦虞卿未返秦使者已在趙矣求和於趙也使疏吏翻亡去趙王封虞卿以一城秦之始伐趙也魏王問於章十二行本於下有諸字乙十一行本同孔本同退齊校同大夫皆以為秦伐趙於魏便孔斌曰斌悲巾翻何謂也曰勝趙則吾因而服焉不勝趙則可承敝而擊之子順曰不然秦自孝公以來戰未嘗屈今又屬其良將良將謂白起也屬之欲翻將即亮翻大夫曰縱其勝趙於我何損鄰之羞國之福也子順曰秦貪暴之國也勝趙必復他求復扶又翻吾恐於時魏受其師也於時猶言於此時也處昌呂翻子母相哺詬詬焉相樂也哺音步詬或作姁音況羽翻康吁句切樂音洛自以為安矣竈突炎上突陀勿翻竈窗謂之突陸德明曰上時掌翻又如字棟宇將焚燕雀顏不變不知禍之將及己也今子不悟趙破患將及己可以人而同於燕雀乎子順者孔子六世孫也孔子生伯魚伯魚生子思子思生子上子上生子家子家生子京子京生子高子高生子順魏王聞子順賢遣使者奉黃金束帛聘以為相使疏吏翻相息亮翻子順章十二行本順下有謂使者三字乙十一行本同孔本同張校同退齊校同曰若王能信用吾道吾道固為治世也為于僞翻治直之翻雖蔬食飲水吾猶為之若徒欲制服吾身委以重祿吾猶一夫耳魏王奚少於一夫食祥吏翻少始紹翻使者固請子順乃之魏之如也往也子順改嬖寵之官以事賢才奪無任之祿以賜有功嬖卑義翻又博計翻無任之祿謂不任事而食祿者諸喪職章十二行本職下有秩字乙十一行本同孔本同張校同退齊校同者咸不悅乃造謗言喪息浪翻文咨以告子順文姓也越有大夫文種民之不可與慮始久矣古之善為政者其初不能無謗子産相鄭三年而後謗止左傳子産相鄭一年輿人誦之曰取我衣冠而褚之取我田疇而伍之孰殺子産吾其與之及三年又誦之曰我有子弟子産誨之我有田疇子産殖之子産而死誰其嗣之褚丁呂翻褚所以貯藏衣物左傳鄭賈人欲脫智罃將置諸褚中而出三月而後謗止今吾為政日新雖不能及賢庸知謗乎文咨曰未識先君之謗何也子順曰先君相魯人誦之曰麛裘而芾投之無戾芾而麛裘投之無郵及三月政化既成民又誦曰裘衣章甫實獲我所章甫裘衣惠我無私麛鹿子也以其皮為裘記曰一命縕芾黝珩再命赤芾黝珩三命赤芾葱珩大夫以上赤芾乘軒戾罪也郵與尤同過也章甫殷冠孔子曰丘長居宋冠章甫之冠古者大夫羔裘以居狐裘以朝麛裘而芾謂芾與麛裘相稱也刺孔子裘衣而章甫言孔子相魯能行古之道也麛莫兮翻康綿披切芾分勿翻協韻方蓋翻戾郎計翻康曰力結切曲也音義非乃今知先生不異乎聖賢矣子順相魏凡九月陳大計輒不用乃喟然曰喟去貴翻喟然發歎之聲言不見用是吾言不當也言不當於主當丁浪翻居人之官食人之祿是尸利素餐吾罪深矣尸主也素空也尸利言仕不能行道而主於利也索餐言空食君之祿而不能有所為也致仕言致其仕事王不用子子其行乎答曰行將何之山東之國將並於秦秦為不義義所不入遂寢於家新垣固請子順曰新垣姓也陳留風俗傳周畢公之後居於梁為新垣氏梁有新垣衍漢有新垣平是也賢者所在必興化致治治直吏翻今子相魏未聞異政而即自退意者志不得乎何去之速也子順曰以無異政所以自退也且死病無良醫病不可為則良醫束手故無良醫以義事之固不獲安救亡不暇何化之興昔伊摯在夏伊摯即伊尹伊尹五就桀五就湯摯音至史記曰太公博聞嘗事紂紂無道去之游說諸侯無所遇而卒西歸周西伯豈伊呂之不欲哉勢不可也治直吏翻當今山東之國敝而不振三晉割地以求安二周折而入秦燕齊楚已屈服矣燕因肩翻以此觀之不出二十年天下其盡為秦乎自此至秦始皇二十五年並天下凡三十八年五十六年秦王欲為應侯必報其仇為于僞翻應於陵翻聞魏齊在平原君所四十九年魏齊奔趙匿於平原君家誘音酉遣使謂趙王曰不得齊首吾不出王弟於關魏齊窮抵虞卿虞卿棄相印與魏齊偕亡使疏吏翻相息亮翻至魏欲因信陵君以走楚信陵君意難見之魏齊怒自殺趙王卒取其首以與秦卒子恤翻秦乃歸平原君九月五大夫王陵復將兵章十二行本作將兵復乙十一行本同孔本同伐趙復扶又翻武安君病不任行任如林翻不任謂不堪也五十七年五十七年正月王陵攻邯鄲少利邯鄲音寒丹少利謂兵頗失利也少始紹翻益發卒佐陵陵亡五校校戶教翻校猶部隊也立軍之法一人曰獨二人曰比三人曰參比參曰伍五人為列列有頭二列為火十人有長立火子五火為隊隊五十人有頭二隊為官官百人立長二官為曲曲二百人立候二曲為部部四百人立司馬二部為校校八百人立尉二校為裨將千六百人立將軍二裨將軍三千二百人有將軍副將軍武安君病愈王欲使代之武安君曰邯鄲實未易攻也易以豉翻且諸侯之救日至彼諸侯怨秦之日久矣秦雖勝於長平士卒死者過半國內空遠絶河山而爭人國都自秦而攻邯鄲有大河及王屋太行諸山之阻橫度曰絶諸侯攻其外破秦軍必矣王自命不行秦王親命之行而不肯行也武安君終辭疾不肯行乃以王齕代王陵應於陵翻齕恨勿翻趙王使平原君求救於楚平原君約其門下食客文武備具者二十人與之俱得十九人餘無可取者毛遂自薦於平原君姓譜毛本自周武王母弟毛公夫賢士之處世也譬若錐之處囊中其末立見夫音扶毛晃曰錐鋭也又器如鑽囊袋也有底曰囊處昌呂翻見賢遍翻今先生處勝之門下三年於此矣左右未有所稱誦勝未有所聞是先生無所有也先生不能先生留以毛遂為不能而使之留也臣乃今日請處囊中耳使遂蚤得處囊中乃脫穎而出非特其末見而已處昌呂翻見賢遍翻毛晃曰錐鋩曰穎平原君乃與之俱十九人相與目笑之索隱曰謂目視而侮笑之與楚王言合從之利害日出而言之日中不決毛遂按劍歷階而上謂平原君曰從之利害兩言而決耳兩言謂利與害也從子容翻上時掌翻日中不決何也楚王怒叱曰胡不下胡何也而猶汝也毛遂按劍而前曰王之所以叱遂者以楚國之衆也今十步之內王不得恃楚國之衆也王之命懸於遂手吾君在前叱者何也且遂聞湯以七十里之地王天下王于況翻文王以百里之壤而臣諸侯豈其士卒衆多哉誠能據其勢而奮其威也今楚地方五千里持戟百萬此霸王之資也以楚之強天下弗能當白起小豎子耳率數萬之衆興師以與楚戰一戰而舉鄢郢再戰而燒夷陵事見上卷三十七年史記正義曰鄢鄉故城在襄州率道縣西南九里安郢城在荊州江陵縣東北七里鄢於幰翻郢以井翻謂焚夷楚之陵廟也而王弗之惡焉合從者為楚非為趙也吾君在前叱者何也楚王曰唯唯惡烏路翻為于僞翻唯于癸翻誠若先生之言謹奉社稷以從從如字從定乎楚王曰定矣毛遂謂楚王之左右曰取雞狗馬之血來索隱曰盟之所用牲貴賤不同天子用牛及馬諸侯用犬及豭大夫以下用雞今此總言盟之用血故云取雞狗馬之血來耳索山客翻豭居牙翻王當歃血以定從索隱曰歃血若周禮則用珠盤奉讀曰捧歃色洽翻又所甲翻從子容翻次者遂遂定從於殿上毛遂左手持盤血而右手招十九人曰公等相與歃此血於堂下公等録録所謂因人成事者也說文録録隨從之貌音祿索隱曰音六王劭曰録借字耳平原君已定從而歸至於趙曰勝不敢章十二行本敢下有復字乙十一行本同孔本同張校同退齊校同相天下士矣相息亮翻遂以毛遂為上客於是楚王使春申君將兵救趙魏王亦使將軍晉鄙將兵十萬救趙晉以國為氏吾攻趙旦暮且下諸侯敢救之者吾已拔趙必移兵先擊之魏王恐遣人止晉鄙留兵壁鄴班志鄴縣屬魏郡實挾兩端兩端名為救趙實二於秦間入出間道而入也間古莧翻邯鄲音寒丹欲共尊秦為帝以卻其兵齊人魯仲連在邯鄲聞之往見新垣衍曰彼秦者棄禮義而上首功之國也秦以戰而能斬首有功者為上故曰上首功上尚也索隱曰秦法斬首多為上功斬一人首則賜爵一級故謂秦為上首功之國則連有蹈東海而死耳不願為之民也且梁未睹秦稱帝之害故耳吾將使秦王烹醢梁王新垣衍怏然不悅怏於兩翻曰先生惡能使秦王烹醢梁王惡音烏魯仲連曰固也吾將言之昔者九侯鄂侯文王紂之三公也九侯有子而好獻之於紂紂以為惡醢九侯醢呼改翻肉醬也鄂侯爭之強辨之疾故脯鄂侯文王聞之喟然而歎故拘之牖里之庫百日欲令之死司馬彪志河內郡蕩陰縣有牖里城紂囚文王於此史記正義曰其地在蕩陰縣北九里喟于貴翻牖音酉令力丁翻萬乘之國也梁亦萬乘之國也俱據萬乘之國各有稱王之名奈何睹其一戰而勝欲從而帝之卒就脯醢之地乎乘繩證翻卒子恤翻且秦無已而帝則將行其天子之禮以號令於天下則且變易諸侯之大臣彼將奪其所不肖而與其所賢奪其所憎而與其所愛彼又將使其子女讒妾為諸侯姬處梁之宮處昌呂翻梁王安得晏然而已乎而將軍又何以得故寵乎新垣衍起再拜曰吾乃今知先生天下之士也吾請出不敢復言帝秦矣復扶又翻考異曰史記魯仲連傳云新垣衍謝請出不敢復言帝秦秦將聞之為卻軍五十里按仲連所言不過論帝秦之利害耳使新垣衍慚怍而去則有之秦將何預而退軍五十里乎此亦游談者之誇大也今不取垣子于元翻怍才各翻將即亮翻為于僞翻五十七年燕武成王薨子孝王立五十七年初魏公子無忌仁而下士下遐稼翻致食客三千人魏有隱士曰侯嬴洪氏隸釋有漢金鄉守長侯君之碑云其先出自豳岐周文王之後封於鄭鄭共仲賜氏曰侯厥胤宣多以功佐國審如是則侯姓出於侯宣多嬴音盈曹植音羸瘦之羸家貧為大梁夷門監者大梁魏都夷門蓋大梁城北門監古銜翻賓客坐定公子從車騎虛左自迎侯生古者乘車尊者在左虛左以迎尊侯生而禮之也騎奇寄翻直上載公子上坐不讓直上時掌翻上坐之坐才臥翻公子執轡愈恭侯生又謂公子曰臣有客在市屠中願枉車騎過之公子引車入市侯生下見其客朱亥姓譜朱本高陽周封其後於邾後為楚所滅子孫乃去邑氏朱故久立與其客語睥睨不正視也睥匹詣翻睨研計翻公子色愈和乃謝客就車至公子家公子引侯生坐上坐遍贊賓客賓客皆驚索隱曰贊告也謂以侯生遍告賓客遍與遍同趙平原君之夫人公子無忌之姊也平原君使者冠蓋相屬於魏屬之欲翻下乃屬同讓公子曰勝所以自附於婚姻者以公子之高義能急人之困也今邯鄲旦暮降秦而魏救不至縱公子輕勝棄之獨不憐公子姊邪邯鄲音寒丹降戶江翻邪音耶公子患之數請魏王敕晉鄙令救趙數所角翻令力丁翻及賓客辨士游說萬端王終不聽公子乃屬賓客說式芮翻屬之欲翻約車騎百餘乘欲赴鬬以死於趙過夷門見侯生侯生曰公子勉之矣老臣不能從乘繩證翻從才用翻公子去行數里心不快以侯生既不從行又不為之畫計謀也侯生笑曰臣固知公子之還也復扶又翻又音如字還從宣翻又音如字今公子無他端而欲赴秦軍無他端言無他奇策以發端也何功之有公子再拜問計侯嬴屏人曰吾聞晉鄙兵符在王臥內而如姬最幸力能竊之嘗聞公子為如姬報其父仇屏必郢翻史記曰如姬之父為人所殺公子使客斬其仇頭以進如姬屏卑郢翻為于僞翻下同如姬欲為公子死無所辭公子誠一開口則得虎符虎威猛之獸故以為兵符漢有銅虎符北救趙西卻秦此五伯之功也伯讀曰霸公子如其言果得兵符公子行侯生曰將在外君令有所不受孫武子之言將即亮翻令力定翻復請之則事危矣復扶又翻臣客朱亥其人力士可與俱晉鄙若聽大善不聽可使擊之於是公子請朱亥與俱至鄴晉鄙合符疑之舉手視公子曰吾擁十萬之衆屯於境上章十二行本上下有國之重任四字乙十一行本同孔本同張校同退齊校同今單車來代之何如哉朱亥袖四十斤鐵椎椎殺晉鄙椎直追翻齊人謂之終葵鐵椎以鐵為之椎殺擊殺也與槌同公子遂勒兵下令軍中曰父子俱在軍中者父歸兄弟俱在軍中者兄歸獨子無兄弟者歸養養羊尚翻後養上為養同得選兵八萬人將之而進王齕久圍邯鄲不拔諸侯來救戰數不利齕恨勿翻邯鄲音寒丹數所角翻武安君聞之曰王不聽吾計今何如矣白起以為邯鄲未易攻而王齕軍果不利故以為言怒強起武安君強其兩翻武安君稱病篤不肯起五十八年五十八年十月免武安君為士伍遷之陰密如淳曰律有罪失官爵稱士伍師古曰謂奪其爵令為士伍言使從士卒之伍也班志陰密縣屬安定郡古密國詩所謂密人不恭者也括地志陰密故城在涇州鶉觚縣西古密須氏之國益發卒軍汾城旁汾城即漢河東臨汾縣城也去邯鄲尚遠秦蓋屯兵於此為王齕聲援括地志臨汾故城在絳州正平縣東北三十五里未行諸侯攻王齕齕數卻齕恨勿翻數所角翻使者日至使疏吏翻王乃使人遣武安君不得留咸陽中武安君出咸陽西門十里至杜郵水經注渭水故渠徑安陵南渠側有杜郵亭又徑渭城北秦咸陽漢之渭城也史記正義曰今咸陽縣城本秦時杜郵也在雍州西北三十五里郵音尤雍於用翻白起之遷意尚怏怏有餘言怏於兩翻王乃使使者賜之劍武安君遂自殺秦人憐之鄉邑皆祭祀焉魏公子無忌大破秦師於邯鄲下王齕解邯鄲圍走鄭安平為趙所困將二萬人降趙邯鄲音寒丹降戶江翻應侯由是得罪鄭安平匿范睢以見王稽因此入秦為相故睢保任安平而用之今安平降趙故睢由此得罪秦法保任其人而不稱者與同罪應於陵翻公子無忌既存趙遂不敢歸魏與賓客留居趙使將將其軍還魏將即亮翻還從宣翻又音如字趙王與平原君計以五城封公子趙王掃除自迎執主人之禮引公子就西階公子側行辭讓從東階上記曲禮主人就東階客就西階客若降等則就主人之階上時掌翻罪古罪字秦始皇以罪字近皇字改為罪無功於趙趙王與公子飲至暮口不忍獻五城以公子退讓也趙王以鄗為公子湯沐邑師古曰凡言湯沐邑謂以其賦稅供湯沐之具也鄗呼各翻杜佑曰信陵君邑于今宋州寧陵縣薛公隱於賣漿家處昌呂翻姓譜薛本自黃帝任姓之後裔孫奚仲居薛歷夏殷周六十四代為諸侯後因氏焉欲見之兩人不肯見公子乃間步從之游平原君聞而非之公子曰吾聞平原君之賢故背魏而救趙今平原君所與遊徒豪舉耳間古莧翻背蒲妹翻索隱曰謂豪者舉之不求士也以無忌從此兩人遊尚恐其不我欲也平原君乃以為羞乎為裝欲去為裝者為行裝也乃止平原君欲封魯連以其折新垣衍言帝秦也終不肯受使疏吏翻又以千金為魯連壽魯連笑曰所貴於天下士章十二行本下下有之字士下有者字乙十一行本同孔本同為人排患釋難解紛亂而無取也為人之為于僞翻難乃旦翻即有取章十二行本取下有者字乙十一行本同孔本同是商賈之事也賈音古下同遂章十二行本遂上有而連不忍為也六字乙十一行本同孔本同張校同退齊校同辭平原君而去終身不復見復扶又翻五十八年秦太子之曰華陽夫人蓋食湯沐邑於華陽因以為號華戶化翻夏姬生子異人異人質於趙秦數伐趙趙人不禮之夏戶雅翻質音致數所角翻異人以庶孽孫質於諸侯車乘進用不饒張晏曰孺子曰孽子何休曰孽子賤子也非嫡正之子曰孽師古曰孽庶子也唐韻曰猶木之有孽生也異人於秦太子為庶子於秦王為庶孽孫孽魚列翻索隱曰進者財也宜依小顏讀為賮古字多假借用之進音才刃翻陽翟大賈呂不韋適邯鄲見之曰此奇貨可居賈音古邯鄲音寒丹賈人居積滯貨同時以牟利以異人方財貨也乃往見異人說曰吾能大子之門說式芮翻異人笑曰且自大君之門不韋曰子不知也吾門待子門而大異人心知所謂乃引與坐深語不韋曰秦王老矣太子愛華陽夫人夫人無子子之兄弟二十餘人子傒有秦章十二行本秦作承乙十一行本同孔本同退齊校同國之業華戶化翻下同子傒蓋秦太子之子愛而居長者康曰傒胡啓切余謂傒字即左傳高傒之傒陸德明曰傒音兮士倉又輔之姓譜士姓晉士蒍之後不甚見幸久質諸侯太子即位子不得爭為嗣矣質音致嗣祥吏翻異人曰然則奈何不韋曰能立適嗣者獨華陽夫人耳適讀曰嫡下為適同不韋雖貧請以千金為子西遊立子為嗣異人曰必如君策請得分秦國與君共之不韋乃以五百金與異人令結賓客復以五百金買奇物玩好復扶又翻好呼到翻自奉而西見華陽夫人之姊而以奇物獻於夫人因譽子異人之賢譽音余賓客遍天下常日夜泣思太子及夫人曰異人也以夫人為天夫人大喜不韋因使其姊說夫人曰說式芮翻夫以色事人者色衰則愛弛夫音扶今夫人愛而無子不以繁華時蚤自結於諸子中賢孝者舉以為適適讀曰嫡即色衰愛弛雖欲開一言尚可得乎今子異人賢而自知中子中讀曰仲不得為適夫人誠以此時拔之是子異人無國而有國夫人無子而有子也則終身有寵於秦矣夫人以為然承間言於太子曰間古莧翻子異人絶賢毛晃曰絶奇冠也相去遼遠也因泣曰妾不幸無子願得子異人立以為子章十二行本子作嗣乙十一行本同孔本同以託妾身太子許之與夫人刻玉符約以為嗣因厚餽遺異人嗣詳吏翻遺于季翻而請呂不韋傅之異人名譽盛於諸侯呂不韋娶邯鄲諸章十二行本無諸字乙十一行本同孔本同姬絶美者與居娶字當從史記作取邯鄲音寒丹應劭曰娠震動懷任之意左傳曰邑姜方娠孟康曰娠音身漢書娠多作身古今字也師古曰孟說是也漢書皆以娠為任身字邑姜方震自為震動之震不作娠見而請之不韋佯怒既而獻之孕期年而生子政佯音羊期讀曰朞蓋任身十二月而生也子政是為始皇為呂不韋以此賈禍張本異人遂以為夫人邯鄲之圍趙人欲殺之異人與不韋行金六百斤豫守者豫讀曰與脫亡赴秦軍遂得歸異人楚服而見華陽夫人楚服為楚人之服或曰楚楚盛服也吾楚人也當自子之因更其名曰楚更更衡翻五十九年五十九年秦將軍摎伐韓摎史記正義紀虬翻康曰居由切斬首四萬伐趙取二十餘縣斬首虜九萬赧王恐背秦與諸侯約從將天下鋭師出伊闕攻秦令無得通陽城從子容翻將即亮翻令力丁翻秦王使將軍摎攻西周赧王入秦頓首受罪盡獻其邑三十六口三萬秦受其獻歸赧王於周是歲赧王崩皇甫謐曰周凡三十七王八百六十七年齊思和標點顧頡剛聶崇岐覆校
