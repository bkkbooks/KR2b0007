body:
  text: 資治通鑑卷第七十七翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事柱國河內郡開國侯食邑一千三百戶食實封二百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注魏紀九甘露元年高貴鄉公下甘露元年丙子二五六是年六月改元甘露元年春正月漢姜維進位大將軍甘露元年二月丙辰帝宴㣥臣於太極東堂與諸儒論夏少康漢高祖優劣以少康為優帝謂少康生於滅亡之後降為諸侯之隸能布其德而兆其謀卒滅過戈克復禹績祀夏配天不失舊物非至德弘仁豈濟斯勳漢祖因土崩之勢杖一時之權專任智力以成功業行事動靜多違聖檢為人子則數危其親為人君則囚繫賢相為人父則不能衛子身沒之後社稷幾傾若與少康易時而處未必能復大禹之績嗚呼帝固有志於少康矣然而不能殲澆豷而身死人乎者不能布其德而兆其謀也余觀帝之所以論二君優劣書生之談耳未能如石勒辭氣之雄爽也夏戶雅翻少詩照翻甘露元年夏四月章甲十一行本月下有庚戌二字乙十一行本同孔本同張校同賜大將軍昭袞冕之服赤舄副焉九錫之漸也甘露元年丙辰帝幸太學與諸儒論書易及禮諸儒莫能及時帝與博士淳于俊論易庾峻論書馬照論禮記考其難疑答問不過擲抉經義及王鄭之異同耳非人君之學也並屬文論沈持林翻散悉亶翻騎奇寄翻屬之欲翻特加禮異謂秀為儒林丈人沈為文籍先生帝性急請召欲速以望職在外特給追鋒車虎賁五人望為中護軍其職在外傅子曰追鋒車施通幰遽則乘之令虎賁五人舁之也晉志曰追鋒車去小平蓋加通幰如軺車駕二馬追鋒之名取其迅速也施於戎陳之間是為傳乘賁音奔輒奔馳而至秀潛之子也裴潛事武帝守代郡著名甘露元年六月丙午改元蓋以甘露降而改元也甘露元年姜維在鍾提議者多以為維力已竭未能更出安西將軍鄧艾曰洮西之敗見上卷上年士卒凋殘倉廩空虛百姓流離今以策言之彼有乘勝之勢我有虛弱之實一也彼上下相習五兵犀利管子曰蚩尤受盧山之金而作五兵孔穎達曰步卒之五兵謂弓矢一殳二矛三戈四戟五也鄭司農所謂戈矛戟酉矛夷矛車之五兵也犀堅也古以犀兕為甲故謂堅為犀器仗未復二也將易艾自謂初代王經也兵新謂遣還洮西敗卒更差軍守也將即亮翻吾以陸軍勞逸不同三也言蜀船自涪戍白水可以上沮水由沮水入武都下辨自此而西北水路漸峻狹小舟猶可入也魏軍度隴而西皆陸行彼專為一我分為四四也從南安隴西因食羌穀若趣祁山趣七喻翻下同熟麥千頃為之外倉章甲十一行本倉下有五也二字乙十一行本同孔本同張校同退齊校同賊有黠計其來必矣黠下八翻桀黠也秋七月姜維復率衆出祁山復扶又翻聞鄧艾已有備乃回從董亭趣南安水經注董亭在南安郡西南谷水歷其下東北注于渭水經注渭水過獂道南獂道南安郡治也又東徑武城縣西武城川水入焉蓋以山名縣也酈道元後魏人武城縣必後魏所立而魏收地形志無之蓋廢省也其夜渡渭東行緣山趣上邽艾與戰於段谷水經注上邽之南有段溪水水出西南馬門溪東北流合籍水杜佑曰秦州上邽縣有段谷水趣七喻翻以艾為鎮西將軍都督隴右諸軍事維與其鎮西大將軍胡濟期會上邽濟失期不至故敗士卒星散死者甚衆言士卒迸散如星不能收拾成隊伍維上書謝求自貶黜乃以衛將軍行大將軍事甘露元年八月庚午詔司馬昭加號大都督奏事不名假黃鉞癸酉以太尉司馬孚為太傅九月以司徒高柔為太尉甘露元年文欽說吳人以伐魏之利說輸芮翻孫峻使欽與驃騎將軍呂據驃匹妙翻及車騎將軍劉纂鎮南將軍朱異前將軍唐咨自江都入淮泗江都縣屬廣陵郡此自邗溝入淮自淮入泗也魏青州統齊濟南樂安城陽東萊徐州統下邳彭城東海琅邪東莞東安廣陵臨淮晉志曰周禮曰正東曰青州蓋取士居少陽其色為青徐州取舒緩之義或云因徐丘以立名遇暴疾以後事付從父弟偏將軍綝從才用翻綝丑林翻丁亥峻卒吳人以綝為侍中武衛將軍都督中外諸軍事召呂據等還還從宣翻又如字甘露元年己丑吳大司馬呂岱卒年九十六始岱親近吳郡徐原慷慨有才志岱知其可成賜巾褠釋名巾謹也二十成人士冠庶人巾言當自謹修於四教褠單衣漢魏以來士庶以為禮服褠古侯翻後遂薦拔官至侍御史原性忠壯好直言好呼到翻岱時有得失原輒諫爭爭讀曰諍又公論之公然於衆中論其得失岱歎曰是我所以貴德淵者也徐原字德淵岱哭之甚哀曰徐德淵呂岱之益友論語孔子曰益者三友友直友諒友多聞論語曰不幸短命死矣復扶又翻談者美之甘露元年呂據聞孫綝代孫峻輔政大怒與諸督將連名共表薦滕胤為丞相將即亮翻綝更以胤為大司馬代呂岱駐武昌據引兵還使人報胤欲共廢綝冬十月綝章甲十一行本綝上有丁未二字乙十一行本同孔本同退齊校同遣從兄憲將兵逆據於江都使中使敕文欽劉纂唐咨等共擊取據又遣侍中左將軍華融中書丞丁晏魏晉之制中書無丞此吳所置華戶化翻言宜速往武昌否則且有誅罰因留融晏勒兵自衛召典軍楊崇將軍孫咨楊崇蓋胤帳下典軍迫融等使有章乙十一行本有作作書難綝有者對無之稱於此則文義不為通通鑑既因三國志舊文今亦不欲輕改難乃旦翻表言胤反許將軍劉丞以封爵使率兵騎攻圍胤胤又劫融等使詐為詔發兵融等不從皆殺之或勸胤引兵至蒼龍門蒼龍門吳建業宮之東門也必委綝就公委棄也胤恃與據期又難舉兵向宮乃約令部曲約勒而號令之故皆為胤盡死無離散者為于僞翻胤顏色不變談笑如常時大風比曉據不至比必寐翻綝兵大會遂殺胤及將士數十人夷胤三族己酉大赦改元太平或勸呂據奔魏者據曰吾恥為叛臣遂自殺據父範佐孫策以造吳故恥為叛臣自殺以明節甘露元年以司空鄭沖為司徒左僕射盧育為司空晉志曰尚書僕射漢本置一人至漢獻帝建安四年以執金吾榮郃為尚書左僕射僕射分置左右蓋自此始經魏至晉迄于江左省置無常置二則為左右僕射或不兩置但曰尚書僕射令闕則左為省主若左右並闕則置尚書僕射以主省事育余六翻詔不許祥性至孝繼母朱氏遇之無道祥愈恭謹朱氏子覽年數歲每見祥被楚撻楚荊也撻擊也被皮義翻母以非理使祥覽輒與祥俱往及長娶妻長知兩翻母虐使祥妻覽妻亦趨而共之母患之為之少止為于僞翻祥漸有時譽母深疾之密使鴆祥覽知之徑起取酒祥爭而不與母遽奪反之漢書齊悼惠王傳奪反孝惠卮師古曰反音幡母賜祥饌饌雛戀翻又雛皖翻覽輒先嘗母懼覽致斃遂止漢末遭亂祥隱居三十餘年不應州郡之命母終毀瘁瘁秦醉翻病勞也杖而後起徐州刺史呂虔檄為別駕委以州事州界清靜政化大行時人歌之曰海沂之康實賴王祥徐州之地東際海西北距泗沂故曰海沂別駕之功甘露元年十一月吳孫綝遷大將軍綝負貴倨傲多行無禮峻從弟憲嘗與誅諸葛恪與讀曰預峻厚遇之官至右將軍無難督平九官事九官即九卿也魏明帝太和二年吳主還建業留尚書九官於武昌憲怒與將軍王惇謀殺綝事泄綝殺惇憲服藥死二年甘露二年春三月大梁成侯盧育卒甘露二年夏四月吳主臨正殿大赦始親政事孫綝表奏多見難問難乃旦翻又科兵子弟十八已下十五以上三千餘人科程也程其長短小大也或曰科當作料音聊量度也使將之少詩照翻將即亮翻日於苑中教習曰吾立此軍欲與之俱長長丁丈翻今知兩翻又數出中書視大帝時舊事問左右侍臣曰先帝數有特制特制謂特出上意以手詔宣行也數所角翻問事猶言奏事不言奏者自卑挹之意書可畫可也使黃門至中藏取蜜中藏中藏府也掌幣帛金銀諸貨物蜜蜂糖也藏徂浪翻下同召問藏吏藏吏叩頭吳主曰黃門從爾求蜜邪吏曰向求謂向者嘗求蜜也黃門不服吳主令破鼠矢矢中燥因大笑謂左右曰若矢先在蜜中中外當俱濕今外濕裏燥此必黃門所為也詰之果服詰去吉翻左右莫不驚悚甘露二年征東大將軍諸葛誕素與夏侯玄鄧揚等友善玄等死玄死見上卷正元元年揚死見七十五卷邵陵厲公嘉平元年揚余章翻又余亮翻王凌死見七十五卷嘉平三年毌丘儉死見上卷正元二年乃傾帑藏振施帑他朗翻施式智翻曲赦有罪以收衆心畜養揚州輕俠數千人以為死士畜許六翻因吳人欲向徐堨徐堨即徐塘在東關之東堨烏葛翻又求臨淮築城以備吳寇司馬昭初秉政長史賈充請遣參佐慰勞四征魏置征東將軍屯淮南征南將軍屯襄沔以備吳征西將軍屯關隴以備蜀征北將軍屯幽並以備鮮卑皆授以重兵司馬昭初當國故充請慰勞以觀其志趣勞力到翻昭遣充至淮南充見誕論說時事因曰洛中諸賢皆願禪代君以為如何誕厲聲曰卿非賈豫州子乎充父逵先為豫州而卒故稱之豈可欲以社稷輸人乎若洛中有難難乃旦翻吾當死之充默然還言於昭曰諸葛誕再在揚州誕先督揚州東關之敗改督豫州毌丘儉既死復督揚州今召之必不來然反疾而禍小不召則反遲而禍大不如召之昭從之甲子詔以誕為司空召赴京師誕得詔書愈恐疑揚州刺史樂綝間己遂殺綝征東將軍與揚州刺史同治壽春魏四征之任率以其州刺史為儲帥故誕疑綝間己間古莧翻魏郡縣皆置屯田凡屯田口悉官兵也勝音升聚穀足一年食為閉門自守之計遣長史吳綱將少子靚至吳將如字少詩照翻靚疾郢翻又疾正翻並請以牙門子弟為質牙門諸將之子弟也質音致甘露二年吳滕胤呂據之妻皆夏口督孫一之妹也一孫奐庶子也夏戶雅翻孫綝使鎮南將軍朱異自虎林將兵襲一異至武昌一將部曲來奔乙巳詔拜一車騎將軍交州牧封吳侯開府辟召儀同三司袞冕赤舄事從豐厚崇異孫一者以招攜二也甘露二年司馬昭奉帝及太后討諸葛誕昭若自行恐後有挾兩宮為變者故奉之以討誕吳綱至吳吳人大喜使將軍全懌全端唐咨王祚將三萬衆與文欽同救誕以誕為左都護假節大司徒驃騎將軍青州牧封壽春侯懌琮之子端其從子也六月甲子車駕次項司馬昭督諸軍二十六萬進屯丘頭是役也司馬昭改丘頭曰武丘以旌武功武丘唐為沈丘縣與安東將軍陳騫等圍壽春基始至圍城未合文欽全懌等從城東北因山乘險得將其衆突入城壽春城外他無山唯城北有八公山耳基纍求進討會吳朱異率三萬人進屯安豐為文欽外勢安豐縣漢屬廬江郡魏分屬安豐郡今安豐縣在壽春南八十里基謂諸將曰今圍壘轉固兵馬向集但當精修守備以待越逸而更移兵守險使得放縱雖有智者不能善其後矣遂守便宜上疏曰今與賊家對敵當不動如山若遷移依險人心搖蕩於勢大損諸軍並據深溝高壘衆心皆定不可傾動此御兵之要也書奏報聽報基聽行其策時帝在軍故諸軍節度皆稟詔指而裁其可否者實司馬昭也表裏再重重直龍翻塹壘甚峻文欽等數出犯圍數所角翻逆擊走之司馬昭又使奮武將軍監青州諸軍事石苞監古銜翻督兗州刺史州泰徐州刺史胡質簡鋭卒為游軍以備外寇泰擊破朱異於陽淵水經注決水出廬江雩婁縣北過安豐縣東又北右會陽泉水水西有陽泉縣故城故陽泉鄉也漢靈帝封黃琬為侯國決水又北入于淮泰追之殺傷二千人秋七月吳大將軍綝大發兵出屯鑊里後吳王責孫綝以留湖中不上岸一步則鑊里當在巢縣界復扶又翻帥讀曰率異留輜重於都陸水經注博鄉縣王莽改曰楊陸泄水出焉北過芍陂又西北入于淮意者都陸即楊陸歟又據晉紀都陸在黎漿南重直用翻水經注芍陂瀆水東注黎漿水水東徑黎漿亭南又東注肥水謂之黎漿水口也太山太守胡烈以奇兵五千襲都陸盡焚異資糧異將餘兵食葛葉走歸孫綝綝使異更死戰異以士卒乏食不從綝命綝怒九月己巳綝斬異於鑊里辛未引兵還建業壽春之圍已固雖使周瑜呂蒙陸遜復生不能解也若孫綝能舉荊揚之衆出襄陽以向宛洛壽春城下之兵必分歸以自救諸葛誕文欽等於此時決圍力戰猶庶幾焉而喪敗士衆喪息浪翻敗補邁翻自戮名將由是吳人莫不怨之為後吳誅孫綝張本司馬昭曰異不得至壽春而吳人殺之非其罪也章甲十一行本作非其罪也而吳人殺之乙十一行本同退齊校同張校同云無注本亦同下非其罪也四字衍欲以謝壽春而堅誕意使其猶望救耳今當堅圍備其越逸而多方以誤之乃縱反間間古莧翻揚言吳救方至大軍乏食分遣羸疾就穀淮北勢不能久誕等益寬恣食俄而城中乏糧外救不至將軍蔣班焦彞皆誕腹心謀主也言於誕曰朱異等以大衆來而不能進孫綝殺異而歸江東外以發兵為名內實坐須成敗須待也士卒思用並力決死攻其一面雖不能盡克猶有可全者空坐守死無為也言不若決死而求生無為坐守而待斃公今舉十餘萬之衆歸命於吳而欽與全端等皆同居死地父兄子弟盡在江表就孫綝不欲來主上及其親戚豈肯聽乎且中國無歲無事軍民並疲今守我一年內變將起奈何舍此舍讀曰捨欲乘危徼幸乎徼堅堯翻班彞固勸之欽怒誕欲殺班彞二人懼十一月棄誕踰城來降全懌兄子輝儀在建業輝儀懌兄全緒之二子輝一作禕攜其母將部曲數十家來奔於是懌與兄子靖及全端弟翩緝皆將兵在壽春城中司馬昭用黃門侍郎鍾會策密為輝儀作書為于僞翻使輝儀所親信齎入城告懌等說吳中怒懌等不能拔壽春言不能拔壽春之衆於重圍也故逃來歸命十二月懌等帥其衆數千人開門出降帥讀曰率降戶江翻城中震懼不知所為詔拜懌平東將軍封臨湘侯端等封拜各有差甘露二年漢姜維聞魏分關中兵以赴淮南欲乘虛向秦川秦地四塞以為固渭水貫其中渭川左右沃壤千里世謂之秦川至沈嶺時長城積穀甚多而守兵少征西將軍都督雍涼諸軍事司馬望雍於用翻及安西將軍鄧艾進兵據之以拒維維壁於芒水水經注駱谷水出郿塢東南山駱谷北流徑長城西又北流注于渭渭水又東芒水從南來注之水出南山芒谷北徑盩厔縣竹圃中又北流注于渭余按駱谷在今洋州真符縣屈回八十里凡八十四盤數所角翻挑徒了翻望艾不應是時維數出兵蜀人愁苦中散大夫譙周作仇國論以諷之續漢志曰中散大夫秩六百石漢官曰秩比二千石胡廣曰光祿大夫本為中大夫武帝元狩五年置諫大夫為光祿大夫世祖中興以為諫議大夫又有太中中散大夫此四等於古者為天子之下大夫視列國之上卿或問往古能以弱勝強者其術如何曰吾聞之處大無患者常多慢處小有憂者常思善處昌呂翻多慢則生亂思善則生治理之常也故周文養民以少取多句踐恤衆以弱斃強此其術也文王治岐由方百里起三分天下有其二所謂以少取多也句踐歸越弔死問疾十年生聚十年教訓以弱越斃強吳項強漢弱相與戰爭項羽與漢約分鴻溝各歸息民張良以為民志已定則難動也率兵追羽終斃項氏事見十卷漢高帝四年曰當商周之際王侯世尊言世世居尊位也民習所專民習見君臣之分明故專於戴上據固者難遷當此之時雖漢祖安能杖劍鞭馬而取天下乎及秦罷侯置守之後謂罷列國諸侯分置三十六郡郡置守也天下土崩或歲易主或月易公鳥驚獸駭莫知所從於是豪強並爭虎裂狼分疾搏者獲多遲後者見吞今我與彼皆傳國易世矣既非秦末鼎沸之時實有六國並據之勢故可為文王難為漢祖夫民之疲勞則騷擾之兆生上慢下暴則瓦解之形起諺曰射幸數跌不如審發跌差也射數差而不中不如審而後發也書曰若虞機張往省括于度則釋不為意似改步孔穎達曰舉足謂之步為于僞翻數合而後舉故湯武之師不再戰而克湯伐桀鳴條一戰而革夏命武王伐紂一戎衣而天下大定度徒洛翻如遂極武黷征征伐不欲數數則黷不幸遇難難乃旦翻雖有智者將不能謀之矣姜維以數戰亡蜀卒如譙周之言三年甘露三年春正月文欽謂諸葛誕曰蔣班焦彞謂我不能出而走全端全懌又率衆逆降逆迎也降戶江翻可以戰矣誕及唐咨等皆以為然遂大為攻具晝夜五六日攻南圍欲決圍而出圍上諸軍臨高發石車火箭石車即炮車也車昌遮翻矢石雨下死傷蔽地血流盈塹塹七豔翻復還城城內食轉竭出降者數萬口欽欲盡出北方人省食與吳人堅守誕不聽由是爭恨欽素與誕有隙徒以計合事急愈相疑言誕欽初以詭計苟合事急愈相猜疑誕遂殺欽欽子鴦虎將兵在小城中鴦虎欽二子也時壽春蓋別有小城勒兵赴之衆不為用遂單走踰城出自歸於司馬昭軍吏請誅之昭曰欽之罪不容誅其子固應就戮然鴦虎以窮歸命且城未拔殺之是堅其心也乃赦鴦虎使將數百騎巡城呼曰呼火故翻文欽之子猶不見殺其餘何懼又表鴦虎皆為將軍賜爵關內侯城內皆喜且日益饑困司馬昭身自臨圍見城上持弓者不發曰可攻矣知其衆無拒守之心也同時鼓譟登城二月乙酉克之誕窘急單馬將其麾下突小城欲出司馬胡奮部兵擊斬之夷其三族誕麾下數百人皆拱手為列不降每斬一人輒降之降戶江翻下同卒不變以至於盡史言諸葛誕得人心人蒙其恩而為之死卒子恤翻詮且緣翻大丈夫受命其主以兵救人既不能克又束手於敵吾弗取也乃免胄冒陳而死陳讀曰陳唐咨王祚等皆降唐咨本魏人降吳見七十卷文帝黃初六年器仗山積司馬昭初圍壽春王基石苞等皆欲急攻之昭以為壽春城固而衆多攻之必力屈若有外寇表裏受敵此危道也今三叛相聚於孤城之中三叛謂諸葛誕文欽唐咨也吾當以全策縻之但堅守三面若吳賊陸道而來軍糧必少吾以游兵輕騎絶其轉輸可不戰而破也吳賊破欽等必成禽矣乃命諸軍按甲而守之卒不煩攻而破卒子恤翻議者又以為淮南仍為叛逆仍相因也不可縱宜悉坑之昭曰古之用兵全國為上戮其元惡而已言全其國之人民止戮其君所謂誅其君而弔其民也適可以示中國之大度耳一無所殺分布三河近郡以安處之河南都也河東河內皆近京師處昌呂翻其餘裨神將咸假位號衆皆悅服其淮南將士吏民為誕所脅略者皆赦之聽文鴦兄弟收斂父喪給其車牛致葬舊墓文欽譙人也舊墓在焉斂力贍翻昭遺王基書曰遺于季翻初議者云云求移者甚衆謂前詔諸軍轉據北山亦謂宜然臨履謂親臨其地而履行營壘處所也獨秉固志上違詔命下拒衆議終至制敵禽賊雖古人所述不是過也昭欲遣諸軍輕兵深入招迎唐咨等子弟因釁有滅吳之勢王基諫曰昔諸葛恪乘東關之勝竭江表之兵以圍新城城既不拔而衆死者大半事見上卷邵陵厲公嘉平五年輕兵深入糧餉不繼軍覆上邽謂段谷之敗也上下輕敵輕敵則慮難不深難乃旦翻今賊新敗於外又內患未弭謂孫綝君臣相猜且兵出踰年人有歸志今俘馘十萬罪人斯得謂禽諸葛誕也書曰周公居東二年則罪人斯得未有全兵獨克如今之盛者也武皇帝克袁紹於官渡自以所獲已多不復追奔復扶又翻懼挫威也事見六十三卷漢獻帝建安五年以基為征東將軍都督揚州諸軍事進封東武侯習鑿齒曰君子謂司馬大將軍於是役也可謂能以德攻矣左傳晉文公城濮之勝君子謂晉於是役也能以德攻各有所尚而不能兼並也故窮武之雄斃於不仁如夫差智伯是也喪於懦退如宋襄公是也喪息浪翻大虜吳衆席卷淮浦俘馘十萬生虜為俘截耳為馘古者戰勝馘所格之左耳而獻之而未及安坐賞王基之功種惠吳人結異類之情書曰皋陶邁種德孔安國注曰種布也夫種則有穫種惠於吳人使歸心中國以成他日混一之功如種藝之有秋也忘疇昔之隙不咎誕衆使揚土懷愧功高而人樂其成業廣而敵懷其德樂音洛翻武昭既敷文算又洽推是道也天下其孰能當之哉鑿齒晉人其辭蓋有溢美者甘露三年司馬昭之克壽春鍾會謀畫居多昭親待日隆委以腹心之任時人比之子房比之張良也甘露三年漢姜維聞諸葛誕死復還成都復拜大將軍維以段谷之敗貶行大將軍事甘露三年夏五月詔以司馬昭為相國漢書百官表曰相國丞相皆秦官又按蕭何傳何自丞相拜相國則相國尊於丞相食邑八郡晉書帝紀曰以並州之太原上黨西河樂平新興鴈門司州之河東平陽凡八郡封為晉公昭前後九讓乃止甘露三年秋七月吳主封故齊王奮為章安侯奮徙章安見上卷邵陵厲公嘉平五年甘露三年八月以驃騎將軍王昶為司空昶丑兩翻甘露三年詔以關內侯王祥為三老鄭小同為五更帝率㣥臣詣太學行養老乞言之禮記曰凡養老五帝憲三王又乞言五帝憲養氣體而不乞言有善則記之以為惇史三王亦憲既養老而後乞言亦微其禮皆有惇史鄭玄注曰憲法也養之為法其德行三王又從之求善言可施行也惇史惇厚者也微其禮者依違言之更工衡翻玄之孫也鄭玄別傳曰玄有子為孔融吏舉孝廉融之被圍往赴為賊所害有遺腹子以丁卯日生而玄以丁卯歲生故名曰小同甘露三年吳孫綝以吳主親覽政事多所難問難乃旦翻甚懼返自鑊里遂稱疾不朝朝直遙翻使弟威遠將軍據入倉龍門宿衛古倉蒼字通用闓音開又苦亥翻分屯諸營欲以自固吳主惡之惡烏路翻乃推朱公主死意朱公主死見上卷正元二年推尋也尋問公主所以見殺之意我實不知皆朱據二子熊損所白是時熊為虎林督損為外部督吳外部督建業外營兵損妻即孫峻妹也綝諫不從由是益懼吳主陰與全公主及將軍劉丞謀誅綝全后父尚為太常衛將軍吳主謂尚子黃門侍郎紀曰孫綝專勢輕小於孤謂輕視之以為幼小也為唐咨等作援而留湖中不上岸一步上時掌翻又委罪於朱異亶殺功臣不先表聞築第橋南綝蓋築第於朱雀橋南此為自在無所復畏自在謂居處自如不復知有君上復扶又翻見賢遍翻今規取之規圖也衛將軍督中軍孤當自出臨橋率宿衛虎騎左右無難一時圍之吳有左右無難督督無難營兵不得舉手正爾自當得之正爾猶言正如此也但當使密耳卿宣詔卿父勿令卿母知之女人既不曉大事且綝同堂姊邂逅漏泄誤孤非小也解戶廨翻逅戶茂翻紀承詔以告尚尚無遠慮以語紀母母使人密語綝語牛倨翻九月戊午綝夜以兵襲尚執之遣弟恩殺劉承於蒼龍門外劉承即劉丞遂圍宮比必寐翻吳主大怒上馬帶鞬執弓欲出鞬居言翻戢弓矢器曰孤大皇帝適子適讀曰嫡在位已五年誰敢不從者侍中近臣及乳母共牽攀止之不得出嘆咤不食咤陟駕翻罵全后曰爾父憒憒憒烏外翻類篇曰悶也敗我大事敗補邁翻又遣呼紀紀曰臣父奉詔不謹負上無面目復見復扶又翻下同因自殺綝使光祿勳孟宗告太廟廢吳主為會稽王吳主亮時年十六會丁外翻少帝荒病昏亂不可以處大位承宗廟少詩昭翻處昌呂翻下同已告先帝廢之諸君若有不同者下異議皆震怖怖普布翻曰唯將軍令綝遣中書郎李崇奪吳主璽綬璽斯氏翻綬音受以吳主罪班告遠近尚書桓彞不肯署名綝怒殺之典軍施正勸綝迎立琅邪王休綝從之吳制中營置左右典軍己未綝使宗正楷與中書郎董朝楷以吳同姓為宗正中書郎即晉中書侍郎之職吳建興元年休徙丹陽既又徙會稽會工外翻亮時年十六徙全尚於零陵尋追殺之遷全公主於豫章冬十月戊午琅邪王行至曲阿杜佑曰曲阿今丹陽郡丹陽縣事久變生天下喁喁喁魚容翻師古曰喁喁衆口向上也又相應和聲是日進及布塞亭孫綝以琅邪王未至欲入居宮中召百官會議皆惶怖失色徒唯唯而已唯以水翻諾也選曹郎虞汜曰明公為國伊周處將相之任汜音祀處昌呂翻亶廢立之威將上安宗廟下惠百姓大小踴躍自以伊霍復見今迎王未至而欲入宮如是㣥下搖蕩衆聽疑惑非所以永終忠孝揚名後世也綝不懌而止汜翻之子也綝命弟恩行丞相事率百僚以乘輿法駕迎琅邪王於永昌亭章甲十一行本亭下有築宮以武帳為便殿設御坐己卯王至便殿止東廂二十字乙十一行本同張校同退齊校同孫恩奉上璽符乘繩證翻上時掌翻王三讓乃受㣥臣以次奉引引讀曰靷王就乘輿百官陪位綝以兵千人迎於半野拜于道側王下車答拜即日御正殿大赦改元永安吳主休字子烈吳主權第六子草莽臣詣闕上書上印綬節鉞求避賢路謂他有賢者進用恐妨其路求引身避之見賢遍翻下詔以綝為丞相荊州牧增邑五縣綝遷大將軍封永寧侯今休以援立之功增其封邑封縣侯孫據幹闓皆拜將軍封侯又以長水校尉張布為輔義將軍封永康侯初休為王時布為左右督素見信愛及即位遂寵任之為布亶吳立孫晧以亡國喪身張本宋白曰吳赤烏八年分烏傷之上浦立永康縣屬東陽郡先是丹陽太守李衡數以事侵琅邪王休徙丹陽見七十五卷邵陵厲公嘉平四年先悉薦翻數所角翻下同習姓按風俗通漢有外黃令習一琅邪王上書乞徙他郡詔徙會稽及琅邪王即位李衡憂懼謂妻曰不用卿言以至於此吾欲奔魏何如妻曰不可君本庶民耳先帝相拔過重既數作無禮而復逆自猜嫌復扶又翻逃叛求活以此北歸何面目見中國人乎章甲十一行本乎下有衡曰計何所出妻曰八字乙十一行本同張校同退齊校同琅邪王素好善慕名好呼到翻方欲自顯於天下終不以私嫌殺君明矣可自囚詣獄表列前失顯求受罪如此乃當逆見優饒逆迎也言將優加其官以饒益之衡從之吳主詔曰丹陽太守李衡以往事之嫌自拘司敗左傳楚針尹克黃自拘於司敗司敗即司寇也在君為君齊桓公與公子糾爭國管仲射桓公中帶鉤子糾死桓公以管仲為相遂霸諸侯晉獻公使寺人披伐蒲公子重耳踰垣而走披斬其袪及重耳反國與披謀國事發呂卻之謀薦趙衰守原為于僞翻勿令自疑又加威遠將軍授以棨戟果如習氏所料己丑吳主封故南陽王和子晧為烏程侯和死晧全見上卷邵陵厲公嘉平五年㣥臣奏立皇后太子吳主曰朕以寡德奉承洪業涖事日淺恩澤未敷后之號嗣子之位非所急也有司固請吳主不許孫綝奉牛酒詣吳主吳主不受齎詣左將軍張布酒酣出怨言曰初廢少主時多勸吾自為之者吾以陛下賢明故迎之帝非我不立今上禮見拒是與凡臣無異當復改圖耳上時掌翻復扶又翻布以告吳主綝以布為吳主所信倚故詣之酒酣失言遂以賈禍綝之凶愚其赤族宜矣恐其有變數加賞賜數所角翻戊戌吳主詔曰大將軍掌中外諸軍事事統煩多其加衛將軍御史大夫恩侍中與大將軍分省諸事分綝之權也欲圖反者吳主執以付綝綝殺之由是益懼因孟宗求出屯武昌吳主許之綝盡敕所督中營精兵萬餘人皆令裝載中營兵即中軍也吳人謂裝船為裝載綝欲以此兵自隨上武昌載才再翻車船裝物皆曰載詩云載輸爾載吳主咸令給與綝求中書兩郎典知荊州諸軍事主者奏中書不應外出吳主特聽之其所請求一無違者將軍魏邈說吳主曰綝居外必有變說輸芮翻武衛士施朔又告綝謀反武衛士武衛之士也密問輔義將軍張布布曰左將軍丁奉雖不能吏書而計略過人能斷大事斷丁亂翻吳主召奉告之且問以計畫奉曰丞相兄弟支黨甚盛恐人心不同不可卒制卒讀曰猝可因臘會有陛兵以誅之陛兵宿衛之兵夾殿陛者所謂陛戟之士十二月丁卯建業中謠言明會有變明會明日臘會也吳以土德王用辰臘不悅夜大風發屋揚沙綝益懼戊辰臘會綝稱疾不至吳主強起之強其兩翻使者十餘輩綝不得已將入衆止焉綝曰國家屢有命不可辭可豫整兵令府內起火因是可得速還遂入尋而火起尋繼時也吳主曰外兵自多不足煩丞相也綝起離席離力智翻奉布目左右縛之綝叩頭曰願徙交州吳主曰卿何不徙滕胤呂據於交州乎綝復曰復扶又翻願沒為官奴吳主曰卿何不以胤據為奴乎胤據死見上甘露元年以綝首令其衆曰諸與綝同謀者皆赦之放仗者五千人孫闓乘船欲降北追殺之闓音開又可亥翻綝之諸弟據恩幹蓋已就誅獨闓走欲投北降戶工翻夷綝三族發孫峻棺取其印綬斫其木而埋之古者棺椁厚薄皆有度斫而薄之以示貶己巳吳主以張布為中軍督改葬諸葛恪滕胤呂據等其罹恪等事遠徒章甲十一行本徒作徙乙十一行本同張校同者一切召還朝臣有乞為諸葛恪立碑者為于僞翻吳主詔曰盛夏出軍士卒傷損無尺寸之功不可謂能受託孤之任死於豎子之手不可謂智遂寢恪死見上卷嘉平五年甘露三年初漢昭烈留魏延鎮漢中事見六十八卷漢獻帝建安二十四年敵若來攻使不得入及興勢之役王平捍拒曹爽事見七十四卷邵陵厲公正始五年及姜維用事建議以為錯守諸圍錯倉故翻適可禦敵不獲大利不若使敵至諸圍皆斂兵聚穀退就漢樂二城諸葛亮築漢樂二城見七十一卷明帝太和三年謂縱敵使入平地也令游軍旁出以伺其虛敵攻關不克野無散穀千里運糧自然疲乏引退之日然後諸城並出與游軍並力搏之此殄敵之術也於是漢主令督漢中胡濟卻住漢壽監軍王含守樂城樂城在沔陽東山上周三十里甚嶮固諸葛亮所築沔水徑其北又北徑西樂城東而北流注于漢姜維自棄險要以開狡焉啓疆之心書此為亡蜀張本斌音彬四年甘露四年春正月黃龍二見寧陵井中見賢遍翻下同先是頓丘冠軍陽夏井中屢有龍見陳壽志曰去年青龍仍見頓丘冠軍陽夏縣界井中寧陵縣前漢屬陳留郡後漢魏屬梁國頓丘縣漢屬東郡魏屬魏郡冠軍縣屬南陽郡陽夏縣漢屬陳國魏屬梁國先悉薦翻夏音賈帝曰龍者君德也上不在天下不在田而數屈於井數所角翻非嘉兆也作潛龍詩以自諷司馬昭見而惡之帝有誅昭之志不務養晦而憤鬱之氣見於辭而不能自掩蓋亦淺矣此其所以死於權臣之手乎惡烏路翻甘露四年夏六月京陵穆侯王昶卒甘露四年漢主封其子諶為北地王諶時壬翻詢為新興王虔為上黨王尚書令陳祗以巧佞有寵於漢主姜維雖位在祗上而多率衆在外希親朝政權任不及祗秋八月丙子祗卒漢主以僕射義陽董厥為尚書令尚書諸葛瞻為僕射甘露四年冬十一月車騎將軍孫一為婢所殺二年孫一來降甘露四年是歲以王基為征南將軍都督荊州諸軍事據晉書文帝紀時分荊州為二都督基鎮新野州泰鎮襄陽元皇帝上諱奐字景明武帝之孫燕王宇之子也甘露二年封安次縣常道鄉公諡法行義說民曰元帝本名璜即位改名奐景元元年庚辰二六是年六月方改元甘露四年春正月朔日有食之甘露四年夏四月詔有司率遵前命復進大將軍昭位相國封晉公加九錫遵前年之命也復扶又翻甘露四年帝見威權日去不勝其忿勝音升五月己丑召侍中王沈沈持林翻下同尚書王經散騎常侍王業謂曰司馬昭之心路人所知也言路人亦知其將篡今日當與卿自出討之卿下當有等字昔魯昭公不忍季氏敗走失國為天下笑魯季氏世執魯國之政至昭公時伐之不勝公孫于齊次于陽州死于乾侯事見左傳為日久矣朝廷四方皆為之致死為于僞翻不顧逆順之理非一日也且宿衛空闕兵甲寡弱陛下何所資用而一旦如此無乃欲除疾而更深之邪禍殆不測宜見重詳重直用翻重再也詳審也帝乃出懷中黃素詔投地說文曰素白緻繒也此黃素詔者蓋以白緻繒染為黃色以書詔行之決矣正使死何懼況不必死邪於是入白太后沈業奔走告昭呼經欲與俱經不從帝禮遇王沈呼為文籍先生而臨變乃爾吁考異曰世語曰經因沈業申意今從晉諸公贊率殿中宿衛蒼頭官僮鼓譟而出昭弟屯騎校尉胄遇帝於東止車門左右呵之胄衆奔走胄讀曰胄中護軍賈充自外入逆與帝戰於南闕下帝自用劍衆欲退騎督成倅弟太子舍人濟問充曰事急矣當云何充曰司馬公畜養汝等畜許六翻騎督督騎兵晉志太子舍人職比散騎中書等侍郎時未立太子不應置東宮官屬濟本昭之私人授以是官耳騎奇寄翻倅七內翻正為今日為于僞翻今日之事無所問也濟即抽戈前刺帝殞于車下時年二十刺七亦翻大驚自投於地太傅孚奔往枕帝股而哭甚哀枕帝於股也左傳齊崔杼弒其君光晏子枕尸股而哭之三踊而出枕職任翻殺陛下者臣之罪也昭入殿中召㣥臣會議尚書左僕射陳泰不至昭使其舅尚書荀顗召之泰曰世之論者以泰方於舅方比也言顗阿附司馬氏而己忠於魏室乃入見昭悲慟昭亦對之泣曰玄伯陳泰字玄伯處昌呂翻泰曰獨有斬賈充少可以謝天下耳少詩沼翻考異曰魏氏春秋曰帝之崩也太傅司馬孚尚書右僕射陳泰枕帝尸於股號哭盡哀大將軍入禁中泰見之悲慟大將軍亦對之泣謂曰玄伯其如我何泰曰獨有斬賈充少可以謝天下耳大將軍久之曰卿更思其他泰曰豈可使泰復發後言遂歐血薨裴松之以為違實今從干寶晉紀昭久之曰卿更思其次泰曰泰言惟有進於此言當以弒君之罪罪昭昭乃不復更言復扶又翻顗彧之子也彧於六翻太后下令罪狀高貴鄉公廢為庶人葬以民禮收王經及其家屬付廷尉經謝其母母顏色不變笑而應曰人誰不死正恐不得其所以此並命何恨之有非此母不生此子故吏向雄哭之哀動一市向姓也音式亮翻王沈以功封安平侯庚寅太傅孚等上言請以王禮葬高貴鄉公太后許之使中護軍司馬炎迎燕王宇之子常道鄉公璜於鄴水經注曰白祀溝水出廣陽縣之婁城東東南徑常道城西故鄉亭也西去良鄉城四十里魏少帝璜所封也廣陽故燕國炎昭之子也甘露四年辛卯㣥公奏太后自今令書皆稱詔制㣥公自上公三公至諸從公也甘露四年癸卯司馬昭固讓相國晉公九錫之命太后詔許之甘露四年戊申昭上言成濟兄弟大逆不道夷其族甘露四年六月癸丑太后詔常道鄉公更名奐更工衡翻甲寅常道鄉公入洛陽是日即皇帝位年十五大赦改元甘露四年丙辰詔進司馬昭爵位九錫如前昭固讓乃止甘露四年癸亥以尚書右僕射王觀為司空甘露四年吳都尉嚴密建議作浦里塘據范書方術傳浦里塘在丹陽郡宛陵縣界陳志濮陽興傳亦云嚴密建丹陽湖田作浦里塘唯衛將軍陳留濮陽興以為可成濮陽以邑為姓陳留風俗傳漢有長沙太守濮陽逸吳主休居會稽時興為太守深與相結及即位遂與張布並見信用功費不可勝數勝音升士卒多死亡民大愁怨甘露四年會稽郡謠言王亮當還為天子而亮宮人告亮使巫禱祠有惡言有司以聞吳主黜亮為候官侯遣之國晉志曰建安郡故秦閩中郡漢高祖以封閩越王及武帝滅之徙其人名為東冶後漢改為候官都尉吳置建安郡以候官為縣屬焉宋白曰漢武帝元鼎六年立都尉居候官以禦兩越所謂南北一候也衛送者皆伏罪甘露四年冬十月陽鄉肅侯王觀卒諡法剛德克就曰肅甘露四年十一月詔尊燕王待以殊禮甘露四年十二月甲午以司隸校尉王祥為司空甘露四年尚書王沈為豫州刺史初到下教敕屬城及士民曰若有能陳長吏可否長知兩翻說百姓所患者給穀五百斛若說刺史得失朝政寬猛者給穀千斛主簿陳廞褚丰刀石廞許今翻丰刀石力灼翻入白曰教旨思聞苦言示以勸賞竊恐拘介之士或憚賞而不言貪昧之人將慕利而妄舉苟不合宜賞不虛行則遠聽者未知當否之所在當丁浪翻徒見言之不用因謂設而不行愚以為告下之事可少須後須待也夫興益於上受分於下興益謂進言有益於上也受分謂受賞也何不言之有褚丰刀石復白曰復扶又翻下同堯舜周公所以能致忠諫者以其款誠之心著也冰炭不言而冷熱之質自明者以其有實也若好忠直好呼到翻如冰炭之自然則諤諤之言將不求而自至若德不足以配唐虞配合也實不可以同冰炭雖懸重賞忠諫之言未可致也沈乃止二年甘露二年春三月襄陽太守胡烈襄陽縣漢屬南郡沈約曰魏武平荊州分南郡編以北及南陽之山都立襄陽郡吳將鄧由李光等十八屯同謀歸化遣使送質任質音致欲令郡兵臨江迎拔詔王基部分諸軍徑造沮水以迎之造七到翻應劭曰沮水出漢中房陵東入江師古曰沮千余翻南郡臨沮縣以臨沮水得名水經注曰自臨沮界東南過枝江縣又東南入于江若由等如期到者便當因此震蕩江表基馳驛遺司馬昭書遺于季翻下同說由等可疑之狀且當清澄謂事之虛實未定如水之混濁莫測其淺深且當清澄以俟之蓋亦當時常語也又曰夷陵東西皆險狹狹與狹同卒有要害弩馬不陳蔚音尉又紆勿翻卒讀曰猝謂猝然敵人於要害之地設伏邀擊弩馬不得陳其力也今者筋角濡弱考工記弓人為弓冬析幹春液角夏治筋秋合三材春液角夏治筋以陽煦而筋角濡滑也冬析幹秋合三材以陰凝而堅緻也春夏之交陽氣蒸潤筋角濡弱則弓弩之力不徑廢盛農之務要難必之利此事之危者也要一遙翻姜維之趣上邽趣七喻翻文欽之據壽春皆深入求利以取覆沒此近事之鑒戒也嘉平已來纍有內難謂曹爽兄弟既死纍有廢立之事毌丘儉諸葛誕相繼而舉兵也難乃旦翻當務鎮安社稷撫寧上下力農務本懷柔百姓未宜動衆以求外利也昭纍得基書意狐疑敕諸軍已上道者且權停住所在令各就其所至之地而住軍也須待也昔漢祖納酈生之說欲封六國寤張良之謀而趣銷印事見十卷漢高帝三年復扶又翻下同趣讀曰促誠不及留侯亦懼襄陽有食其之謬食其音異基昭於是罷兵報基書曰凡處事者多曲相從順鮮能確然共盡理實處昌呂翻鮮息淺翻誠感忠愛每見規示輒依來旨已罷軍嚴既而由等果不降降戶江翻烈奮之弟也甘露二年秋八月甲寅復命司馬昭進爵位如前不受甘露二年冬十月漢主以董厥為輔國大將軍諸葛瞻為都護衛將軍共平尚書事以侍中樊建為尚書令時中常侍黃皓用事厥瞻皆不能矯正揉曲使直曰矯唯建不與皓往來祕書令郤正久在內職與皓比屋比毗至翻近也並也聯也又簿必翻相次也周旋三十餘年淡然自守以書自娛既不為皓所愛亦不為皓所憎故官不過六百石祕書令秩六百石漢主弟甘陵王永憎皓皓譖之使十年不得朝見朝直遙翻見賢遍翻吳主使五官中郎將薛珝聘于漢珝況羽翻及還吳主問漢政得失對曰主暗而不知其過臣下容身以求免罪入其朝不聞直言經其野民皆菜色臣聞燕雀處堂子母相樂以為至安也突決棟焚而燕雀怡然不知禍之將及其是之謂乎魏相子順引先人之言也嗚呼蜀之亡形成矣薛珝見而知之濮陽興張布用事浦里塘之役吳民愁怨韋昭盛沖以切直而不得居王所珝亦知之否邪知而不言無亦容身而求免罪邪處昌呂翻樂音洛綜之子也薛綜見七十二卷明帝青龍元年甘露二年是歲鮮卑索頭部大人拓跋力微始遣其子沙漠汗入貢因留為質索昔各翻汗音寒質音致力微之先世居北荒不交南夏魏收曰魏之先出自黃帝黃帝子曰昌意昌意少子受封北國有大鮮卑山因以為號黃帝以土德王北人謂土為托謂后為拔故以為氏或曰自謂托天而生拔地而長故為托拔氏蕭子顯曰胸奴女名托跋妻李陵胡俗以母為姓故為李陵之後而甚諱之有言其是陵後者輒見殺夏戶雅翻始強大可汗北方之尊稱猶漢時之單于也宋白曰虜俗呼天為汗可讀如渴汗何干翻大姓九十九後五世至可汗推寅魏書曰漢桓帝時鮮卑檀石槐分其地為東西三部其大人曰置鞬落羅曰律推演宴荔游等皆為大帥推演蓋即推寅也按魏收魏書帝紀毛死貸立貸死觀立觀死樓立樓死越立越死推寅立推寅蓋俗云鑽研之義又七世至可汗鄰推寅死利立利死俟立俟死肆立肆死機立機死蓋立蓋死儈立儈死鄰立車昌遮翻惃胡昆翻又公渾翻又古本翻分統部衆為十族按魏書官氏志毛統國有九十九姓至鄰七分國人使諸兄弟各攝領之乃分其民以兄為紇骨氏後改為胡氏次兄為普氏後改為周氏次兄為拔拔氏後改為長孫氏弟為達奚氏後改為奚氏次弟為伊婁氏後改為伊氏次弟為丘敦氏後改為丘氏次弟為侯氏後改亥氏七族之興自此始也又命叔父之胤曰乙旃氏後改為叔孫氏又命疏族為車惃氏後改為車氏凡與托拔氏為十姓百世不通婚以位授其子詰汾使南遷遂居胸奴故地詰汾卒力微立復徙居定襄之盛樂漢定襄郡有成樂縣後漢屬雲中郡建安二十年併雲中定襄五原朔方為新興郡郡止置一縣以屬新興而盛樂故縣棄之荒外故力微得居之後魏既盛南都平城置盛樂宮於其地永熙中又置盛樂郡復扶又翻諸部皆畏服之拓跋氏始見于此鮮卑軻比能與魏為敵者也軻比能死北邊差安而拓跋氏盛矣為後魏張本王崇武標點容肇祖聶崇岐覆校
