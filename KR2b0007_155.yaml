body:
  text: 資治通鑑卷第一百五十五端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注梁紀十一魏高歡將起兵討爾朱氏高祖武皇帝十一中大通三年辛亥五三一魏高歡將起兵討爾朱氏春正月辛巳上祀南郊大赦魏高歡將起兵討爾朱氏魏尚書右僕射鄭先護聞洛陽不守士衆逃散遂來奔去年魏敬宗遣鄭先護討東郡丙申以先護為征北大將軍魏高歡將起兵討爾朱氏二月辛丑上祀明堂魏高歡將起兵討爾朱氏魏自敬宗被囚宮室空近百日被皮義翻近其靳翻去年十二月壬寅爾朱兆渡河囚敬宗甲寅遷晉陽是月己巳節閔帝即位始入宮爾朱世隆鎮洛陽商旅流通盜賊不作世隆兄弟密議以長廣王疏遠又無人望欲更立近親更工衡翻儀同三司廣陵王恭羽之子也廣陵王羽魏孝文帝之弟正光中領給事黃門侍郎以元叉亶權託瘖病居龍華佛寺好呼到翻瘖於今翻華讀曰花無所交通永安末有白敬宗言王陽瘖將有異志考異曰伽藍記云莊帝疑恭姦詐夜遣人盜掠衣物拔刀劍欲殺之恭張口以手拈舌竟乃不言莊帝信其真放令歸第今從魏書逃於上洛山上洛山在洛州上洛郡上洛縣界魏洛州刺史治上洛以無狀獲免無狀者無反狀也治直之翻廣陵王高祖猶子禮曰兄弟之子猶子也廣陵王羽高祖之弟恭則猶子也高祖孝文廟號說式芮翻沈晦不言沈持林翻多歷年所若奉以為主必天人允叶天光與世隆等謀之疑其實瘖使爾朱彥伯潛往敦諭且脅之恭乃曰天何言哉用論語孔子之言孝通聰之子也薛聰見一百四十卷齊明帝建武元年己巳長廣王至邙山南世隆等為之作禪文為于僞翻使泰山太守遼西竇瑗執鞭獨入守式又翻瑗于眷翻啓長廣王曰天人之望皆在廣陵願行堯舜之事遂署禪文廣陵王奉表三讓然後即位帝諱恭字修業廣陵惠王羽之子也改元普泰黃門侍郎邢子才為赦文敍敬宗枉殺太原王榮之狀節閔帝曰永安手翦強臣非為失德直以天未厭亂故逢成濟之禍耳成濟弒高貴鄉公事見七十七卷魏元帝景元元年自作赦文直言門下魏晉以來出命皆由門下省故其發端必曰敕門下運屬樂推思與億兆同茲大慶肆眚之科一依常式屬之欲翻樂音洛春秋莊二十二年肆大眚杜預注曰赦有罪也易稱赦過宥罪書稱眚災肆赦傳稱肆眚圍鄭皆放赦罪人蕩滌衆故以新其心帝閉口八年至是乃言中外欣然以為明主望至太平至一作致庚午詔以三皇稱皇五帝稱帝三代稱王蓋遞為沖挹謂皇降稱帝帝降稱王蓋遞為謙下也競稱皇帝豫今但稱帝亦已褒矣加爾朱世隆儀同三司贈爾朱榮相國晉王加九錫世隆使百官議榮配饗司直劉季明曰杜佑通典曰後魏永安三年高道穆奏廷尉置司直十人位在正監上不署曹事唯覆理御史檢劾事若配世宗於時無功宣武帝廟號世宗親害其母謂殺胡后也為臣不終孝武帝始改諡敬宗曰莊帝此時當稱為懷帝無所可配世隆怒曰汝應死季明曰下官既為議首依禮而言不合聖心翦戮唯命世隆亦不之罪以榮配高祖廟廷又為榮立廟於首陽山為于僞翻因周公舊廟而為之以為榮功可比周公廟成尋為火所焚因周公舊廟而祀爾朱榮周公豈以奪余饗為嫌哉天人之心固不許也爾朱兆以不預廢立之謀大怒欲攻世隆世隆使爾朱彥伯往諭之乃止初敬宗使安東將軍史仵龍平北將軍陽文義各領兵三千守太行嶺侍中源子恭鎮河內及爾朱兆南向仵龍文義帥衆先降由是子恭之軍望風亦潰兆遂乘勝直入洛陽事見上卷上年仵疑古翻行戶剛翻帥讀曰率降下江翻爾朱世隆論仵龍文義之功各封千戶侯魏主曰仵龍文義於王有功於國無勳竟不許爾朱仲遠鎮滑臺表用其下都督為西兗州刺史魏收志西兗州領沛濟陰郡詔答曰已能近補何勞遠聞爾朱天光之滅万俟醜奴也事見上卷上年万莫北翻俟渠夷翻送洛陽波斯獻師子見一百五十二卷大通二年詔曰禽獸囚之則違其性命送歸本國使者以波斯道遠不可達於路殺之而返有司劾違旨帝曰豈可以獸而罪人遂赦之史言節閔帝賢明而不終者制於強臣也使疏吏翻劾戶概翻又戶得翻魏高歡將起兵討爾朱氏魏鎮遠將軍清河崔祖螭等聚青州七郡之衆圍東陽青州領齊北海樂安勃海高陽河間樂陵七郡治東陽衆十餘萬刺史東萊王貴平帥城民固守帥音率使太傅咨議參軍崔光伯出城慰勞其兄光韶曰城民陵縱日久蓋言東陽之民挾州家之勢陵暴屬郡恣縱之日久矣勞力到翻非慰諭所能解家弟往必不全貴平強之強其兩翻既出外人射殺之射而亦翻魏高歡將起兵討爾朱氏幽安營並四州行臺劉靈助自謂方術可以動人又推算知爾朱氏將衰乃起兵自稱燕王開府儀同三司大行臺聲言為敬宗復讎燕因肩翻為于僞翻且妄述圖讖云劉氏當王讖七譖翻由是幽瀛滄冀之民多從之魏熙平二年分瀛冀二州置滄州治饒安城領浮陽樂陵安德三郡不舉火者諸村共屠之引兵南至博陵之安國城魏收志博陵郡安國縣有安國城北平蒲陰縣亦有安國城故稱博陵以別之爾朱兆遣監軍孫白鷂至冀州監工咸翻鷂弋照翻託言調發民馬調徒釣翻欲俟高乾兄弟送馬而收之乾等知之與前河內太守封隆之等合謀潛部勒壯士襲據信都殺白鷂考異曰北史作白雞今從北齊書嶷魚力翻乾等欲推其父翼行州事翼曰和集鄉里我不如封皮皮封隆之小字也為敬宗舉哀為于僞翻將士皆縞素將即亮翻下同縞古老翻升壇誓衆移檄州郡共討爾朱氏仍受劉靈助節度隆之磨奴之族孫也封磨奴見一百一十九卷宋高祖永初元年殷州刺史爾朱羽生將五千人襲信都高敖曹不暇擐甲將十餘騎馳擊之擐音宦騎奇計翻乾在城中繩下五百人追救未及敖曹已交兵羽生敗走敖曹馬矟絶世矟色角翻左右無不一當百時人比之項籍高歡屯壺關大王山魏收地形志上黨郡屯留縣有鳳凰山一名大王山按魏太平真君九年二月詔於壺關東北大王山纍石為三封又斬其北鳳凰山南足以斷之以其有王氣也後高歡果屯兵於其地乃引兵東出聲言討信都信都人皆懼高乾曰吾聞高晉州雄略蓋世爾朱榮用歡為晉州刺史故稱之且爾朱無道弒君虐民正是英雄立功之會今日之來必有深謀吾當輕馬迎之密參意旨參候也乃將十餘騎與封隆之子子繪潛謁歡於滏口說歡曰爾朱酷逆痛結人神凡曰有知孰不思奮明公威德素著天下傾心若兵以義立則屈強之徒不足為明公敵矣屈與倔同其勿翻強其兩翻屈強之徒指爾朱氏之黨也鄙州雖小戶口不下十萬穀秸之稅足濟軍資秸工八翻藁也願公熟思其計乾辭氣慷慨歡大悅與之同帳寢初河南太守趙郡李顯甫喜豪俠喜許既翻集諸李數千家於殷州西山方五六十里居之殷州西山廣阿之西山也子元忠繼之家素富多出貸求利元忠悉焚券契約也即古所謂券也章胡注契約也與正文不應當是刻誤甲十一行本正作契乙十一行本同孔本同鄉人甚敬之免責不責其償也清河有五百人西戍還經趙郡以路梗共投元忠梗塞也曰若逢賊但道李元忠遣如言賊皆舍避舍讀曰捨及葛榮起元忠帥宗黨作壘以自保帥讀曰率坐大槲樹下槲胡谷翻前後斬違命者凡三百人賊至元忠輒擊卻之葛榮曰我自中山至此連為趙李所破李氏趙郡之大姓時號為趙李乃悉衆攻圍執元忠以隨軍賊平就拜南趙郡太守此言爾朱榮平葛榮時事魏太和之十一年分趙郡之平鄉柏人中丘巨鹿之南蠻巨鹿廣阿為南巨鹿郡後改為南趙郡屬殷州好呼到翻及爾朱兆弒敬宗元忠棄官歸謀舉兵討之會高歡東出元忠乘露車載素箏濁酒以奉迎歡聞其酒客未即見之元忠下車獨坐酌酒擘脯食之謂門者曰本言公招延俊傑今聞國士到門不吐哺輟洗其人可知以周公漢祖之事責歡也洗先典翻勿通也門者以告歡遽見之引入觴再行元忠車上取箏鼓之長歌慷概歌闋闋苦穴翻歌終也謂歡曰天下形勢可見明公猶事爾朱邪歡曰富貴皆因彼所致安敢不盡節元忠曰非英雄也高乾雍兄弟來未高乾字乾雍歡紿之曰從叔輩粗何肯來歡與乾兄弟同出於勃海故稱從叔紿待亥翻從才用翻雖粗並解事解胡買翻曉也歡曰趙郡醉矣使人扶出元忠不肯起孫騰進曰此君天遣來不可違也歡乃復留與語復扶又翻元忠慷慨流涕歡亦悲不自勝勝音升元忠因進策曰殷州小無糧仗不足以濟大事若向冀州高乾雍兄弟必為明公主人魏冀州治信都高乾雍兄弟據之故云然冀殷既合滄瀛幽定自然弭服唯劉誕黠胡或當乖拒劉誕亦契胡種也時為相州刺史鎮鄴黠下八翻歡急握元忠手而謝焉歡至山東約勒士卒絲毫之物不聽侵犯每過麥地歡輒步牽馬遠近聞之皆稱高儀同將兵整肅益歸心焉爾朱氏加歡儀同三司故當時以稱之史言高歡能收衆心以傾爾朱將即亮翻歡求糧於相州刺史劉誕誕不與相息亮翻有車營租米車營北齊紀作軍營進至信都封隆之高乾等開門納之高敖曹時在外略地聞之以乾為婦人遺以布裙裙渠云翻婦人下裳也遺于季翻歡使世子澄以子孫禮見之敖曹乃與俱來敖曹以歡敍㣥從子姪之禮乃來孰謂其粗也魏高歡將起兵討爾朱氏癸酉魏封長廣王曄為東海王以青州刺史魯郡王肅為太師淮陽王欣為太傅爾朱世隆為太保長孫稚為太尉趙郡王諶為司空諶氏壬翻徐州刺史爾朱仲遠雍州刺史爾朱天光並為大將軍並州刺史爾朱兆為天柱大將軍賜高歡爵勃海王徵使入朝高歡之先本勃海人爾朱氏爵之為本郡王欲以誘致之朝直遙翻世衰難佐故辭驃匹妙翻騎奇計翻爾朱兆辭天柱曰此叔父所終之官我何敢受固辭不拜尋加都督十州諸軍事十州南盡汾晉北極雲朔高歡辭不就徵爾朱仲遠徙鎮大梁復加兗州刺史大梁兗州統內故加兗州復扶又翻下無復不復同爾朱世隆之初為僕射也大通二年魏爾朱榮入洛以世隆為尚書僕射深自刻厲留心几案案亦几屬應文書皆陳於几案而省覽之留心几案謂留心於尚書省文書也又案據也凡官文書留以為據者亦謂之案有開敏之名及榮死無所顧憚為尚書令家居視事坐符臺省事無大小不先白世隆有司不敢行使尚書郎宋遊道邢昕在其聽事東西別坐受納辭訟稱命施行稱命者稱世隆之命也昕許斤翻聽讀曰廳生殺自恣又欲收軍士之意泛加階級皆為將軍無復員限自是勳賞之官大致猥濫人不復貴猥雜也天光專制關右兆奄有並汾仲遠亶命徐兗世隆居中用事競為貪暴而仲遠尤甚所部富室大族多誣以謀反籍沒其婦女財物入私家私家謂仲遠私家也如是者不可勝數勝音升自滎陽已東租稅悉入其軍不送洛陽東南州郡自牧守以下至士民畏仲遠如豺狼由是四方之人皆惡爾朱氏而憚其強莫敢違也為爾朱氏敗張本守式又翻惡烏路翻魏高歡將起兵討爾朱氏己丑魏以涇州刺史賀拔嶽為岐州刺史渭州刺史侯莫陳悅為秦州刺史並加儀同三司涇渭荒殘而秦岐差完故以內遷為進律魏高歡將起兵討爾朱氏魏使大都督侯淵驃騎大將軍代人叱列延慶討劉靈助至固城叱列虜復姓固城當在中山城東北安國城西南欲引兵西入據關拒險以待其變延慶曰靈助庸人假妖術以惑衆妖於驕翻大兵一臨彼皆恃其符厭厭一協翻謂劉靈助書為符敕以厭勝也豈肯戮力致死與吾兵爭勝負哉不如出營城外詐言西歸靈助聞之必自寬縱然後潛軍擊之往則成擒矣淵從之出頓城西聲云欲還丙申簡精騎一千夜發直抵靈助壘靈助戰敗斬之傳首洛陽初靈助起兵自占勝負曰三月之末我必入定州爾朱氏不久當滅及靈助首函入定州果以是月之末史言用兵不可徒信占驗而無方略魏高歡將起兵討爾朱氏夏四月乙巳昭明太子統卒太子自加元服天監十四年太子加元服省悉景翻朝直遙翻百司進事填委於前太子辨析詐謬秋毫必睹但令改正不加按劾劾戶概翻又戶得翻平斷法獄多所全宥寬和容衆喜慍不形於色好讀書屬文斷丁亂翻好呼報翻屬之欲翻引接才俊賞愛無倦出宮二十餘年言自禁中出居東宮也每霖雨積雪遣左右周行閭巷視貧者賑之行下孟翻賑之忍翻此所謂好行小惠也天性孝謹在東宮雖燕居坐起恆西向必西向者不敢背上臺也恆戶登翻謹居忍翻隔夜為宿被皮義翻及寢疾恐貽帝憂敕參問輒自力手書言帝出敕候問太子輒力疾手書自為奏答朝野惋愕建康男女奔走宮門號泣道路卒子恤翻朝直遙翻惋烏貫翻愕五各翻奔甫門翻走音奏號戶刀翻魏高歡將起兵討爾朱氏癸丑魏以高歡為大都督東道大行臺冀州刺史東道謂太行恆山以東也魏高歡將起兵討爾朱氏魏爾朱天光出夏州遣將討宿勤明達癸亥擒明達送洛陽斬之爾朱天光既擒万俟醜奴又擒宿勤明達河隴平矣不知乃以為宇文泰之資也夏戶雅翻將即亮翻魏高歡將起兵討爾朱氏丙寅魏以侍中驃騎大將軍爾朱彥伯為司徒魏高歡將起兵討爾朱氏魏詔有司不得復稱僞梁魏不競於梁故也復扶又翻下同魏高歡將起兵討爾朱氏五月丙子魏荊州城民斬趙修延復推李琰之行州事趙修延執李琰之見上卷上年魏高歡將起兵討爾朱氏魏爾朱仲遠使都督魏僧勗等討崔祖螭於東陽斬之考異曰北齊李渾傳普泰中崔社客反於海岱攻圍青州以渾為征東將軍都官尚書行臺赴援而社客宿將多謀諸城各自保固堅壁清野諸將議有異同渾曰社客賊之根本若簡練驍勇銜枚夜襲徑趨營下出其不意咄嗟之間便可擒殄如社客就擒則諸郡可傳檄而定諸將遲疑渾乃速行未明達城下賊徒驚散擒社客斬首送洛陽按其年時事迹與祖螭略同未知社客即祖螭為別一人也今從魏帝紀魏高歡將起兵討爾朱氏初昭明太子葬其母丁貴嬪普通七年丁貴嬪卒或賂宦者俞三副求賣地云若得錢三百萬以百萬與之三副密啓上言太子所得地不如今地於上為吉今地謂求賣之地也即命市之葬畢有道士云此地不利長子若厭之長知兩翻厭一協翻又於琰翻下厭禱同或可申延申寬也宮監鮑邈之魏雅初皆有寵於太子五代志梁制東宮有外監殿局內監殿局宮監者即唐內直局之職也龍朔二年改監曰內直郎邈之晚見疏於雅乃密啓上云雅為太子厭禱上遣檢掘果得鵝物大驚將窮其事徐勉固諫而止但誅道士由是太子終身慚憤不能自明及卒上徵其長子南徐州刺史華容公歡至建康欲立以為嗣銜其前事猶豫久之卒不立卒子恤翻庚寅遣還鎮史因帝不立孫究言事始嗚呼帝於豫章王綜臨賀王正德雖犯惡逆猶容忍之至於昭明被讒則終身銜其事蓋天奪其魄也為昭明子察仇視諸父張本臣光曰君子之於正道不可少頃離也少詩沼翻離力智翻不可跬步失也跬窺婢翻以昭明太子之仁孝武帝之慈愛一染嫌疑之迹身以憂死罪及後昆求吉得凶不可湔滌可不戒哉湔將仙翻是以詭誕之士奇邪之術君子遠之奇居宜翻異也遠于願翻魏高歡將起兵討爾朱氏丙申立太子母弟晉安王綱為皇太子朝野多以為不順立世適孫為順朝直遙翻按陳書周弘正傳普通中初置司文義郎直壽光省以弘正為司義侍郎議當作義乃奏記曰謙讓道廢多歷年所伏惟明大王殿下天挺將聖論語太宰問於子貢曰夫子聖者歟子貢曰固天縱之將聖朱元晦注曰將殆也謙若不敢知之辭或曰將大也是以皇上發德音以大王為儲副意者願聞殿下抗目夷上仁之義左傳宋桓公疾太子茲父固請曰目夷長且仁君其立之公命子魚子魚辭曰能以國讓仁孰大焉臣弗及也遂走而退子魚目夷字也左傳成十三年諸侯伐秦曹宣公卒于師曹人使公子負芻守公子欣時逆曹伯之喪負芻殺太子而自立既葬子臧將亡國人皆將從之成公乃懼告罪且請焉子臧乃反諸侯討曹成公執而歸諸京師將見子臧于王而立之辭曰聖達節次守節為君非吾節也雖不能聖敢失守乎遂逃奔宋負芻立是為成公子臧欣時字也張玉作王輿而弗乘玉輿當作王輿莊子讓王篇曰越人三世弒其君王子搜患之逃乎丹穴而越國無君求王子搜不得從之丹穴王子搜不出越人薰之以艾乘以王輿王子搜援綏登車仰天而呼曰君乎君獨不可以捨我乎孟子曰舜視棄天下猶棄敝屣也乘繩正翻屣所是翻以大吳國之風謂太伯以天下讓逃而君吳也澆堅堯翻薄也今聞其語能行之者非殿下而誰使無為之化復生於遂古復扶又翻朱元晦曰遂往也讓王之道不墜於來葉莊子外篇有讓王述堯舜以天下讓來葉來世也王不能從弘正捨之兄子也周捨柄用於天監之初太子以侍讀東海徐摛為家令晉王紹宗遷祕書少監仍侍皇太子讀書此侍讀之始也兼管記尋帶領直管記職同公府記室梁制上臺東宮皆有領直領直者領直衛兵也春坊盡學之東宮謂之春宮宮坊謂之春坊上聞之怒召摛欲加誚責及見誚才笑翻見賢遍翻應對明敏辭義可觀意更釋然因問經史及釋教摛商較從橫較古榷翻從子容翻應對如響上甚加歎異上崇信釋氏意謂徐摛業儒但知經史而已扣擊之餘及於釋教商較從橫應對如響遂加歎異殊不思上有好者下必有甚者焉釋教盛行可以媒富貴利達江東人士孰不從風而靡乎領軍朱不悅羊至翻謂所親曰徐叟出入兩宮漸來見逼我須早為之所遂乘間白上曰摛年老又愛泉石意在一郡自養上謂摛真欲之乃召摛謂曰新安大好山水遂出為新安太守史言朱固寵忌前間古莧翻六月癸丑立華容公歡為豫章王其弟枝江公譽為河東王曲阿公察為嶽陽王察與察同謂不順也用慰其心久之鮑邈之坐誘掠人誘音酉罪不至死太子綱追思昭明之冤揮淚誅之魏高歡將起兵討爾朱氏魏高歡將起兵討爾朱氏鎮南大將軍斛律金軍主善無庫狄千善無縣前漢屬鴈門郡後漢屬定襄郡魏晉省後魏天平二年始以善無為郡也歡乃詐為書稱爾朱兆將以六鎮人配契胡為部曲衆皆憂懼契欺訖翻又為並州符徵兵討步落稽爾朱兆亶命並汾此亦高歡僞為兆符也步落稽即稽胡將遣之孫騰與都督尉景為請留五日如此者再孫騰尉景既為鎮人請留必又因其願留之情扇動之於下此當以意會也為于僞翻雪涕執別衆皆號慟聲震原野歡乃諭之先感動其心而後諭之號戶刀翻與爾俱為失鄉客義同一家高歡亦鎮戶故云然今直西向已當死自信都赴並汾為西向又當死配國人又當死爾朱契胡種也故謂契胡為國人衆曰唯有反耳歡曰反乃急計然當推一人為主誰可者衆共推歡歡曰爾鄉里難制不見葛榮乎雖有百萬之衆曾無法度終自敗滅今以吾為主當與前異毋得陵漢人犯軍令生死任吾則可不然不能為天下笑高歡先立法制以齊其衆故能成大事史言盜亦有道死生唯命歡乃椎牛饗士庚申起兵於信都考異曰魏書帝紀起兵在庚申北齊書帝紀在庚子北史魏紀齊紀亦然今從魏書紀會李元忠舉兵逼殷州歡令高乾帥衆救之高乾預歡密謀而使之救殷州此不過使之誘禽爾朱羽生耳章甲十一行本見下有刺史二字乙十一行本同張校同退齊校同爾朱羽生與指畫軍計騎其計翻羽生與乾俱出因擒斬之持羽生首謁歡歡撫膺曰今日反決矣高歡反謀非一日矣及爾朱羽生授首方言反決蓋其初猶有疑李元忠高乾雍之心元忠既舉兵逼殷州乾雍又斬羽生歡於是深悉二人之心而冀殷之勢已合於是決反鎮廣阿歡於是抗表罪狀爾朱氏爾朱世隆匿之不通世隆為尚書令故得匿歡表魏高歡將起兵討爾朱氏魏楊播及弟椿津皆有名德播剛毅椿津謙恭家世孝友緦服同爨凡三從之服服緦麻人無間言間古莧翻異也椿津皆至三公一門七郡太守三十二州刺史史言楊氏貴盛播子侃預其謀事見上卷上年皆其姻戚也爾朱兆入洛侃逃歸華陰華戶化翻爾朱天光使侃婦父韋義遠招之與盟許貰其罪貰貸也音始制翻侃曰彼雖食言死者不過一人猶冀全百口乃出應之天光殺之時椿致仕與其子昱在華陰椿弟冀州刺史順司空津順子東雍州刺史辨正平太守仲宣皆在洛雍於用翻秋七月爾朱世隆誣奏楊氏謀反請收治之治直之翻魏主不許世隆苦請帝不得已命有司檢按以聞壬申夜世隆遣兵圍津第天光亦遣兵掩椿家於華陰東西之族無少長皆殺之世隆天光先已約同夷楊氏故東西一時俱發居華陰者為西族居洛者為東族少詩照翻長知兩翻世隆奏云楊氏實反與收兵相拒已皆格殺帝惋悵久之不言而已惋烏貫翻悵丑亮翻朝野聞之無不痛憤津子逸為光州刺史爾朱仲遠遣使就殺之唯津子愔於被收時適出在外逃匿獲免往見高歡於信都使疏吏翻愔於今翻被皮義翻考異曰北齊書愔傳云愔父津為並州刺史愔隨之任俄而孝莊幽崩愔時適欲還都行達邯鄲過津義從楊寬家為寬所執至相州見刺史劉誕以愔名家盛德甚相哀念遣隊主鞏榮貴防禁送都至安陽亭榮貴遂與俱逃乃投高昂兄弟潛竄纍載屬齊神武至信都遂投刺轅門即署行臺郎中按時齊神武已在信都言潛竄纍載誤矣又云孝莊幽崩而愔欲還都見執皆非也泣訴家禍因為言討爾朱氏之策為于僞翻歡甚重之即署行臺郎中楊愔門地既高又有幹用高歡起兵之初藉人望以為重藉才幹以為用所以擢而用之士無賢不肖入朝見嫉田橫島之逃實基於此魏高歡將起兵討爾朱氏乙亥上臨軒策拜太子大赦魏高歡將起兵討爾朱氏丙戌魏司徒爾朱彥伯以旱遜位戊子以彥伯為侍中開府儀同三司彥伯於兄弟中差無過惡爾朱世隆固讓太保魏主特置儀同三司章甲十一行本司作師乙十一行本同之官位次上公之下太師太傅太保為三司位上公庚寅以世隆為之斛斯椿譖朱瑞於世隆世隆殺之以朱瑞為敬宗所親遇也魏高歡將起兵討爾朱氏庚寅詔凡宗戚有服屬者有服屬諸緦麻以上食鄉亭侯婦人賜湯沐邑男子食鄉侯亭侯也隨服屬之遠近以為等差魏高歡將起兵討爾朱氏壬辰以吏部尚書何敬容為尚書右僕射敬容昌㝢之子也何昌㝢尚之之弟子魏高歡將起兵討爾朱氏魏爾朱仲遠度律等聞高歡起兵恃其強不以為慮獨爾朱世隆憂之爾朱兆將步騎二萬出井陘趣殷州將即亮翻騎奇計翻陘音刑趣七喻翻李元忠棄城奔信都八月丙午爾朱仲遠度律將兵討高歡九月己卯魏以仲遠為太宰庚辰以爾朱天光為大司馬魏高歡將起兵討爾朱氏癸巳魏主追尊父廣陵惠王為先帝支子入繼大宗尊所生父為皇自漢哀帝始尊之為帝自吳孫晧始封弟永業為高密王子恕為勃海王魏高歡將起兵討爾朱氏冬十月己酉上幸同泰寺升法坐講涅槃經涅奴結翻七日而罷魏高歡將起兵討爾朱氏樂山侯正則先有罪徙鬱林五代志樂山縣屬鬱林郡鬱林漢古郡唐為鬱林州欲攻番禺誘音酉番禺音潘愚廣州刺史元仲景討斬之仲景當作景仲正德之弟也史言臨川王宏諸子皆凶悖魏高歡將起兵討爾朱氏孫騰說高歡曰今朝廷隔絶號令無所稟說式芮翻受命曰稟音必錦翻不權有所立則衆將沮散沮在呂翻歡疑之騰再三固請乃立勃海太守元朗為帝朗融之子也章武王融為葛榮所殺壬寅朗即位於信都城西改元中興廢帝諱朗字仲哲章武王融第三子也高乾為侍中司空高敖曹為驃騎大將軍儀同三司冀州刺史時廢帝除昂為冀州刺史終其身驃匹妙翻騎奇計翻魏蘭根為右僕射去年敬宗以魏蘭根為河北行臺己酉爾朱仲遠度律與驃騎大將軍斛斯椿車騎大將軍儀同三司賀拔勝車騎大將軍賈顯智軍於陽平此陽平縣也漢時屬東郡魏晉以來屬陽平郡唐魏州莘縣陽平之地也以字行顯度之弟也爾朱兆出井陘軍于廣阿衆號十萬高歡縱反間云世隆兄弟謀殺兆復云兆與歡同謀殺仲遠等間古莧翻復扶又翻由是迭相猜二徘徊不進仲遠等屢使斛斯椿賀拔勝往諭兆兆帥輕騎三百來就仲遠帥讀曰率同坐幕下意色不平手舞馬鞭長嘯凝望鄭玄曰嘯蹙口而出聲遂趨出馳還仲遠遣椿勝等追曉說之兆執椿勝還營仲遠度律大懼引兵南遁兆數勝罪將斬之說式芮翻數所具翻曰爾殺衛可孤罪一也事見一百五十卷普通五年爾不與世隆等俱來而東征仲遠罪二也事見上卷上年今復何言復扶又翻勝曰可孤為國巨患勝父子誅之其功不小反以為罪乎天柱被戮以君誅臣被皮義翻勝寧負王不負朝廷今日之事生死在王但寇賊密邇骨肉構隙自古及今未有如是而不亡者勝不憚死恐王失策兆乃捨之高歡將與兆戰而畏其衆強以問親信都督段韶親信都督魏末諸將亶兵始置是官以領親兵所謂衆者得衆人之死言得衆人之死力也得天下之心爾朱氏上弒天子中屠公卿下暴百姓王以順討逆如湯沃雪何衆強之有歡曰雖然吾以小敵大恐無天命不能濟也韶曰韶聞小能敵大小道大淫皇天無親惟德是輔小能敵大小道大淫左傳記隨大夫季梁之言也皇天無親唯德是輔書蔡仲之命之辭也段韶父子起於北邊以騎射為工安能作書語魏收以其於北齊為勳戚宗門強盛從而為之辭耳孟子曰盡信書不如無書信哉內失英雄心智者不為謀勇者不為鬬為于僞翻人心已去天意安有不從者哉韶榮之子也段榮與高歡親善辛亥歡大破兆於廣阿俘其甲卒五千餘人魏高歡將起兵討爾朱氏十一月乙未上幸同泰寺講般若經七日而罷般北末翻若人者翻魏高歡將起兵討爾朱氏庚辰魏高歡引兵攻鄴相州刺史劉誕嬰城固守相息亮翻魏高歡將起兵討爾朱氏是歲魏南兗州城民王乞得劫刺史劉世明舉州來降魏正光中置南兗州治譙城領陳留梁譙沛下蔡北梁馬頭等郡降戶江翻芳之族子也劉芳以儒學用於孝文宣武二帝鎮譙城以世明為征西大將軍郢州刺史加儀同三司世明不受固請北歸上許之世明至洛陽奉送所持節歸鄉里不仕而卒陳力就列不能者止劉世明有焉劉氏世居彭城四年壬子五三二春正月丙寅以南平王偉為大司馬元法僧為太尉袁昂為司空立西豐侯正德為臨賀王正德自結於朱上既封昭明諸子言正德失職言帝嘗養正德為子既而還本爵秩不得與諸子齒也音羊至翻以太子右衛率薛法護為司州牧衛送魏王悅入洛庚午立太子綱之長子大器為宣城王長知兩翻魏高歡攻鄴為地道施柱而焚之城陷入地穴城下為地道而未成恐其土頽落而不得究功故施柱地道既成乃焚其柱故城陷入地壬午拔鄴擒劉誕以楊愔為行臺右丞時軍國多事文檄教令皆出於愔及開府咨議參軍崔㥄㥄逞之五世孫也㥄力膺翻崔逞去燕歸魏為道武帝所殺二月以太尉元法僧為東魏王上既以元悅為魏王使自西道入又使元法僧從東道入故謂之東魏王兗州刺史羊侃為軍司馬與法僧偕行揚州刺史邵陵王綸遣人就市賒買錦綵絲布數百匹市人皆閉邸店不出少府丞何智通依事啓聞綸被責還弟被皮義翻弟與第同下於弟同乃遣防閣戴子高等以槊刺智通於都巷都巷猶前言京巷也槊色角翻刺七亦翻智通識子高取其血以指畫車壁為邵陵字乃絶由是事覺庚戌綸坐免為庶人鎖之於弟經二旬乃脫鎖頃之復封爵辛亥魏安定王追諡敬宗曰武懷皇帝朗既禪位孝武帝封為安定王甲子以高歡為丞相柱國大將軍太師三月丙寅以高澄為驃騎大將軍丁丑安定王帥百官入居於鄴帥讀曰率爾朱兆與爾朱世隆等互相猜阻世隆卑辭厚禮諭兆欲使之赴洛唯其所欲又請節閔帝納兆女為后兆乃悅並與天光度律更立誓約復相親睦斛斯椿陰謂賀拔勝曰天下皆怨毒爾朱而吾等為之用亡無日矣不如圖之勝曰天光與兆各據一方欲盡去之甚難去之不盡必為後患奈何椿曰此易致耳乃說世隆追天光等赴洛共討高歡復扶又翻去羌呂翻說式芮翻世隆屢徵天光天光不至使椿自往邀之曰高歡作亂非王不能定豈可坐視宗族夷滅邪天光不得已將東出問策於雍州刺史賀拔嶽賀拔嶽自岐州遷刺雍州雍於用翻王家跨據三方兆北據並汾天光西奄關隴仲遠亶命徐兗是跨據三方高歡烏合之衆豈能為敵但能同心戮力往無不捷若骨肉相疑則圖存之不暇安能制人如下官所見莫若且鎮關中以固根本分遣鋭師與衆軍合勢進可以克敵退可以自全天光不從閏月壬寅天光自長安兆自晉陽度律自洛陽仲遠自東郡皆會於鄴衆號二十萬夾洹水而軍水經注洹水徑鄴城南洹于元翻總督之高歡令吏部尚書封隆之守鄴癸丑出頓紫陌水經注漳水東出山過鄴又北徑祭陌西戰國之世俗巫為河伯娶婦祭於此陌田融以為紫陌趙建武十一年造紫陌浮橋於水上將即亮翻下同從才用翻歡曰高都督所將皆漢兵恐不足集事欲割鮮卑兵千餘人相雜用之何如敖曹曰敖曹所將練習已久前後格鬬不減鮮卑今若雜之情不相洽勝則爭功退則推罪推吐雷翻不煩更配也庚申爾朱兆帥輕騎三千夜襲鄴城叩西門不克而退壬戌歡將戰馬不滿二千步兵不滿三萬衆寡不敵乃於韓陵為圓陳五代志鄴縣有韓陵山杜佑曰在相州安陽縣東北陳讀曰陳塞息則翻於是將士皆有死志將即亮翻兆望見歡遙責歡以叛己歡曰本所以勠力者共輔帝室今天子何在兆曰永安枉害天柱我報讎耳敬宗年號永安故以稱之我昔聞天柱計汝在戶前立豈得言不反邪對兩軍發其陰謀以正爾朱之罪何報之有今日義絶矣遂戰歡將中軍高敖曹將左軍歡從父弟嶽將右軍將即亮翻從才用翻歡戰不利兆等乘之嶽以五百騎衝其前別將斛律敦收散卒躡其後敖曹以千騎自栗園出橫擊之兆等大敗賀拔勝與徐州刺史杜德於陳降歡陳音陳同兆對慕容紹宗撫膺曰不用公言以至於此謂紹宗諫兆使歡統州鎮兵而兆不用也自鄴西走歸晉陽徐廣車服儀制曰角前代書記所不載或云本出羌胡以驚中國之馬杜佑曰大角即後魏簸邏回是也兆還晉陽仲遠奔東郡秦置東郡晉改為濮陽國後復曰東郡治滑臺城欲自將兵守河橋將即亮翻世隆不從度律天光將之洛陽大都督斛斯椿謂都督賈顯度賈顯智曰今不先執爾朱氏吾屬死無類矣乃夜於桑下盟約倍道先還世隆使其外兵參軍陽叔淵章甲十一行本淵下有單騎二字乙十一行本同孔本同馳赴北中北中即北中郎府城在河橋北岸以次內之內讀曰納椿至不得入城乃詭說叔淵曰說式芮翻天光部下皆是西人聞欲大掠洛邑遷都長安宜先內我以為之備叔淵信之夏四月甲子朔椿等入據河橋盡殺爾朱氏之黨度律天光欲攻之會大雨晝夜不止士馬疲頓弓矢不可施遂西走至灅陂津為人所擒送於椿所灅陂津在河橋西亦曰雷波即爾朱兆犯洛帥騎踏淺涉渡之處灅力水翻別遣賈顯智張歡帥騎掩襲世隆執之帥讀曰率騎奇計翻彥伯時在禁直長孫稚於神虎門啓陳高歡義功既振請誅爾朱氏節閔帝使舍人郭崇報彥伯彥伯狼狽走出為人所執與世隆俱斬於閶闔門外送其首並度律天光於高歡節閔帝使中書舍人盧辨勞歡於鄴勞力到翻歡使之見安定王辨抗辭不從歡不能奪乃捨之辨同之兄子也盧同始附元叉以進辛未驃騎大將軍行濟州事侯景降於安定王以景為尚書僕射南道大行臺濟州刺史濟子禮翻降下江翻下同爾朱仲遠來奔仲遠帳下都督喬寧張子期自滑臺詣歡降歡責之曰汝事仲遠亶其榮利盟契百重許同生死契約也重直龍翻汝為戎首謂前年仲遠舉兵向洛時也汝復叛之復扶又翻事天子則不忠事仲遠則無信犬馬尚識飼之者飼祥吏翻汝曾犬馬之不如遂斬之爾朱天光之東下也留其弟顯壽鎮長安召秦州刺史侯莫陳悅欲與之俱東賀拔嶽知天光必敗欲留悅共圖顯壽以應高歡計未有所出宇文泰謂嶽曰今天光尚近悅未必有二心若以此告之恐其驚懼然悅雖為主將不能制物將即亮翻若先說其衆必人有留心悅進失爾朱之期退恐人情變動乘此說悅事無不遂嶽大喜即令泰入悅軍說之悅遂與嶽俱襲長安嶽為雍州刺史本治長安蓋天光東下使之出捍西北也顯壽棄城走追至華陰擒之帥讀曰率騎奇計翻華戶化翻歡以嶽為關西大行臺考異曰北史薛孝通為中書郎以關中險固秦漢舊都須預謀鎮遏以為後計縱河北失利猶足據之節閔帝深以為然問誰可任者孝通與賀拔嶽同事天光又與周文帝有舊二人並先在關右並推薦之乃超授嶽督岐華秦雍諸軍事關西大行臺雍州牧周文帝為左丞孝通為右丞齎詔書馳驛入關授嶽等同鎮長安後天光敗於韓陵節閔遂不得入關為齊神武幽廢按天光尚在節閔安敢除嶽鎮關中今從魏書領府司馬事無巨細皆委之爾朱世隆之拒高歡也使齊州行臺尚書房謨募兵趣四瀆四瀆津名在臨濟縣水經注河水東北流四瀆津津西側岸臨河有四瀆祠以其自河入濟自泗入淮自淮達江水徑周流故有四瀆之名趣七喻翻揚聲北渡為掎角之勢掎居蟻翻及韓陵既敗弼還東陽聞世隆等死欲來奔數與左右割臂為盟帳下都督馮紹隆素為弼所信待說弼曰今方同契闊數所角翻說式芮翻詩擊鼓曰死生契闊毛萇注曰契闊勤苦也契苦結翻宜更割心前之血以盟衆弼從之大集部下披胸令紹隆割之紹隆因推刃殺之推吐雷翻傳首洛陽丙子安東將軍辛永以建州降於安定王辛巳安定王至邙山高歡以安定王疏遠章武王太洛文成之子獻文之季弟也太洛生融融生安定王於孝明帝緦麻親也故以為疏遠魏收書章武王太洛景穆之子以彬為後彬子融審爾則愈疏遠矣且觀節閔帝之為人欲復奉之復扶又翻蘭根以帝神采高明恐於後難制與高乾兄弟及黃門侍郎崔㥄共勸歡廢之㥄力膺翻歡集百官問所宜立莫有應者太僕代人綦毋俊盛稱節閔帝賢明宜主社稷歡欣然是之㥄作色曰若言賢明自可待我高王徐登大位廣陵既為逆胡所立節閔帝本廣陵王若從俊言王師何名義舉歡遂幽節閔帝於崇訓佛寺歡入洛陽斛斯椿謂賀拔勝曰今天下事在吾與君耳若不先制人將為人所制高歡初至圖之不難勝曰彼有功於時害之不祥比數夜與歡同宿比毗至翻且章甲十一行本且作具乙十一行本同孔本同序往昔之懷兼荷兄恩意甚多荷下可翻古以儋負為義故以受任為荷受恩為荷而感恩者亦曰荷何苦憚之椿乃止史言賀拔勝有才武而無遠識高歡能以姦詐玩弄時輩而悅其心斛斯椿者小有才反覆人也其圖歡之志固在孝武帝未立之前矣歡以汝南王悅高祖之子召欲立之聞其狂暴無常乃止考異曰魏書悅傳云神武令人示意悅既至清狂如故動為罪失不可扶立乃止按悅時猶在梁境比召至洛往返幾日蓋神武聞其所為而止耳時諸王多逃匿尚書左僕射平陽王修懷之子也廣平王懷高祖之子修於孝明帝從兄弟也歡欲立之使斛斯椿求之椿見修所親員外散騎侍郎太原王思政問王所在思政曰須知問意椿曰欲立為天子思政乃言之椿從思政見修修色變謂思政曰得無賣我邪曰不也曰敢保之乎曰變態百端何可保也椿馳報歡歡遣四百騎迎修入氈帳騎奇計翻氈帳胡夷酋帥所居漢人謂之穹廬陳誠泣下霑襟修讓以寡德歡再拜修亦拜歡出備服御進湯沐達夜嚴警嚴為警備也孔安國曰昧冥爽明早旦馬曰昧未旦也陸德明曰爽謂早旦也軍中不能備朝服故執鞭以為敬朝直遙翻椿入帷門磬折延首而不敢前張守節曰磬折謂曲體揖之若石磬之形曲折也磬形皆中屈垂兩頭言人屈腰則似也曰便不得不稱朕矣書曰天位艱哉又曰毋安厥位惟危雖天人樂推神器歸屬賢君處此之時栗栗乎懼其不勝也平陽王視勸進表而發此言驕滿之氣溢出於肝鬲之上君子以是知其不能終為于僞翻戊子孝武帝即位於東郭之外帝諱修字孝則廣平武穆王懷之第三子也東郭洛城東郭也以黑氈蒙七人歡居其一帝於氈上西向拜天畢入御太極殿魏自孝文帝用夏變夷宣武孝明即位皆用漢魏之制今復用夷禮朝直遙翻下同升閶闔門大赦改元太昌以高歡為大丞相天柱大將軍太師世襲定州刺史庚寅加高澄侍中開府儀同三司初歡起兵信都爾朱世隆知司馬子如與歡有舊自侍中驃騎大將軍出為南岐州刺史歡入洛召子如為大行臺尚書朝夕左右參知軍國廣州刺史廣寧韓賢魏收志廣寧郡屬朔州領石門中川二縣五代志馬邑郡善陽縣後齊置朔州及廣寧郡歡入洛凡爾朱氏所除官爵例皆削奪唯賢如故以前御史中尉樊子鵠兼尚書左僕射為東南道大行臺與徐州刺史杜德追爾朱仲遠仲遠已出境遂攻元樹於譙丞相歡徵賀拔嶽為冀州刺史嶽畏歡欲單馬入朝行臺右丞薛孝通說說式芮翻嶽曰高王以數千鮮卑破爾朱百萬之衆誠亦難敵然諸將或素居其上或與之等夷屈首從之勢非獲已今或在京師或據州鎮高王除之則失人望留之則為腹心之疾且吐萬人雖復敗走爾朱兆字吐萬人高王方內撫㣥雄外抗勍敵勍其京翻安能去其巢穴與公爭關中之地乎今關中豪俊皆屬心於公屬之欲翻願效其智力公以華山為城黃河為塹華戶化翻塹七豔翻進可以兼山東退可以封函谷後漢王元說隗囂曰元請以一丸泥為大王東封函谷關奈何欲束手受制於人乎言未卒卒子恤翻君言是也乃遜辭為啓而不就徵壬辰丞相歡還鄴送爾朱度律天光於洛陽斬之五月丙申魏主鴆節閔帝於門下外省年三十五西魏諡帝曰節閔葬用殊禮加九旒鑾輅黃屋左纛班劍百二十人蓋其禮特異於諸王之喪耳以沛郡王欣為太師趙郡王諶為太保諶世壬翻南陽王寶炬為太尉長孫稚為太傅寶炬愈之子也京兆王愈亦孝文帝之子戊戌許之己酉清河王亶為司徒侍中河南高隆之本徐氏養子丞相歡命以為弟恃歡勢驕公卿南陽王寶炬毆之曰鎮兵何敢爾魏遷洛陽北人留居北鎮者率隸尺籍故詈之曰鎮兵毆烏口翻六月丁卯黜寶炬為驃騎大將軍歸第魏主避廣平武穆王之諱改諡武懷皇帝曰孝莊皇帝諡法武而不遂曰莊死於原野曰莊兵甲亟作曰莊秋七月庚子魏復以南陽王寶炬為太尉壬寅魏丞相歡引兵入滏口大都督庫狄干入井陘擊爾朱兆滏音父陘音刑庚戌魏主使驃騎大將軍儀同三司高隆之帥步騎十萬會丞相歡于太原因以隆之為丞相軍司歡軍於武鄉晉置武鄉縣屬上黨郡石勒分置武鄉郡唐為武鄉縣屬潞州我朝屬威勝軍北走秀容並州平走音奏歡以晉陽四塞太原郡之地東阻太行常山西有蒙山南有霍太山高壁嶺北厄東陘西陘關故亦以為四塞之地自此至于高齊建國遂以晉陽為陪都魏夏州遷民郭遷據青州反郭遷自夏州遷青州必叛黨也嶷魚力翻詔行臺侯景等討之拔其城遷來奔魏東南道大行臺樊子鵠圍元樹於譙城分兵攻取蒙縣等五城去年梁遣元樹鎮譙城蒙縣漢晉屬梁國魏屬譙郡隋並入山桑縣唐改山桑為蒙城縣屬亳州樹請帥衆南歸以地還魏帥讀曰率子鵠等許之與之誓約樹衆半出子鵠擊之擒樹及譙州刺史朱文開以歸羊侃行至官竹水經注睢水自睢陽東南流歷竹圃水次緑竹蔭渚菁菁彌望世人謂之梁王竹園官收其利因曰官竹還音旋九月樹至洛陽久之復欲南奔魏人殺之復扶又翻乙巳以司空袁昂領尚書令冬十一月丁酉日南至夏至之日日北至冬至之日日南至杜預曰冬至之日日南極班志日行光道夏至至於東井北近極故晷短冬至至於牽牛遠極故晷長司馬彪志曰日道發南去極彌遠其景彌長遠長乃極冬乃至日道斂北去極彌近其景彌短近短乃極夏乃至古者因天事天故祭天於圜丘其圜象天甲辰魏殺安定王朗東海王曄二王皆嘗擁立雖已廢退居嫌疑之地故見殺己酉以汝南王悅為侍中大司馬魏葬靈太后胡氏爾朱榮沈靈后於河今乃克葬上聞魏室已定十二月庚辰復以太尉元法僧為郢州刺史是年春以元法僧為東魏王魏主以汝南王悅屬近地尊悅魏主之叔父也丁亥殺之魏大赦改元永興以與太宗同號永興魏太宗即位之初元也復扶又翻魏主納丞相歡女為后命太常卿李元忠納幣於晉陽歡與之宴論及舊事元忠曰昔日建義轟轟大樂樂音洛比來寂寂無人問比毗至翻歡撫掌笑曰此人逼我起兵元忠戲曰若不與侍中當更求建義處歡曰建義不慮無止畏如此老翁不可遇耳元忠曰止為此翁難遇所以不去因捋歡須大笑為于僞翻捋盧括翻歡悉其雅意深重之悉諳究也知也雅素也爾朱兆既至秀容分守險隘出入寇抄抄楚交翻魏丞相歡揚聲討之師出復止者數四兆意怠歡揣其歲首當宴會復扶又翻揣初委翻遣都督竇泰以精騎馳之一日一夜行三百里歡以大軍繼之為明年竇泰破爾朱兆張本騎奇計翻張政烺標點王崇武聶崇岐覆校
