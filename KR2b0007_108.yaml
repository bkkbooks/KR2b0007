body:
  text: 資治通鑑卷第一百八端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢院修撰權判西京留司御史臺上柱國河內郡開國侯食邑一千三百戶食實封四百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注晉紀三十烈宗孝武皇帝下太元十七年壬辰三九二春正月己巳朔大赦秦主登立昭儀隴西李氏為皇后二月壬寅燕主垂自魯口如河間渤海平原翟釗遣其將翟都侵館陶屯蘇康壘蘇康人姓名館陶縣漢屬魏郡晉屬陽平郡將即亮翻下同垂引兵南擊釗秦驃騎將軍沒奕干帥衆降于後秦驃匹妙翻騎奇寄翻帥讀曰率降戶江翻後秦以為車騎將軍封高平公後秦主萇寢疾命姚碩德鎮李潤尹緯守長安召太子興詣行營萇時屯安定萇音長今寇敵未滅上復寢疾復扶又翻王統等皆有部曲終為人患宜盡除之興從之殺王統王廣苻胤徐成毛盛皆苻氏舊臣也王統兄弟吾之州里實無他志徐成等皆前朝名將朝直遙翻吾方用之奈何輒殺之使萇果以殺統等為非罪當按誅始造謀者但怒而已豈真怒邪燕主垂進逼蘇康壘夏四月翟都南走滑臺走音奏翟釗求救於西燕西燕主永謀於㣥臣尚書郎渤海鮑遵曰使兩寇相弊吾承其後此卞莊子之策也中書侍郎太原張騰曰垂強釗弱何弊之承不如速救之以成鼎足之勢今我引兵趨中山趨七喻翻下趣同晝多疑兵夜多火炬垂必懼而自救我衝其前釗躡其後此天授之機不可失也永不從翟釗敗則西燕之亡形成矣燕大赦五月丁卯朔日有食之六月燕主垂軍黎陽臨河欲濟翟釗列兵南岸以拒之辛亥垂徙營就西津去黎陽西四十里為牛皮船百餘艘偽列兵仗泝流而上艘蘇遭翻上時掌翻釗亟引兵趣西津趣七喻翻垂潛遣中壘將軍桂林王鎮等自黎陽津夜濟營于河南比明而營成比必寐翻及也釗聞之亟還攻鎮等營垂命鎮等堅壁勿戰釗兵往來疲暍暍於歇翻傷暑也攻營不能拔將引去鎮等引兵出戰驃騎將軍農自西津濟與鎮等夾擊大破之燕主垂用兵於河上者再溫詳則引兵徑濟而取之翟釗則張疑兵於西而潛軍東渡亦以決勝視敵之堅脆何如也驃匹妙翻騎奇寄翻農燕之驃騎大將軍此逸大字將妻子收遺衆北濟河登白鹿山水經注河內修武縣北有白鹿山燕兵不得進農曰釗無糧不能久居山中乃引兵還留騎候之釗果下山還兵掩擊盡獲其衆釗單騎奔長子西燕主永以釗為車騎大將軍兗州牧封東郡王歲餘釗謀反永殺之初郝晷崔逞及清河崔宏新興張卓遼東夔騰夔姓也石趙之臣有夔安避秦亂來奔詔以為冀州諸郡各將部曲營於河南將即亮翻既而受翟氏官爵翟氏敗皆降於燕降戶江翻燕主垂各隨其材而用之釗所統七郡三萬餘戶皆按堵如故以章武王宙為兗豫二州刺史鎮滑臺徙徐州民七千餘戶于黎陽以彭城王脫為徐州刺史鎮黎陽徐州之民蓋為翟釗所掠者垂之弟子也垂以崔蔭為宙司馬初陳留王紹為鎮南將軍太原王楷為征西將軍樂浪王溫為征東將軍樂浪音洛琅垂皆以蔭為之佐蔭才幹明敏強正善規諫四王皆嚴憚之所至簡刑法輕賦役流民歸之戶口滋息秋七月垂如鄴以太原王楷為冀州牧右光祿大夫餘蔚為左僕射蔚紆勿翻秦主登聞後秦主萇疾病大喜疾甚曰病苻堅廟號世祖進位二等秣馬厲兵進逼安定去城九十餘里八月萇疾小瘳出拒之登引兵出營將逆戰萇遣安南將軍姚熙隆別攻秦營登懼而還還從宜翻又如字萇夜引兵旁出以躡其後旦而候騎告曰騎奇寄翻賊諸營已空不知所向登驚曰彼為何人去令我不知來令我不覺謂其將死忽然復來復扶又翻朕與此羌同世何其厄哉苻登屢為姚萇所挫故有懼萇之心蓋至於是登氣衰矣雍於用翻下同萇亦還安定三河王光遣其弟右將軍寶等攻金城王乾歸寶及將士死者萬餘人又遣其子虎賁中郎將纂擊南羌彭奚念纂亦敗歸光自將擊奚念於枹罕克之奚念奔甘松甘松郡乞伏國仁所置及將即亮翻下同賁音奔枹音膚冬十月辛亥荊州刺史王忱卒忱是壬翻雍州刺史朱序以老病求解職詔以太子右衛率郗恢為雍州刺史代序鎮襄陽恢曇之子也郗曇見一百卷穆帝升平三年率所律翻郗丑之翻曇徒含翻巴蜀人在關中者皆叛後秦據弘農以附秦秦主登以竇衝為左丞相衝徙屯華陰華戶化翻郗恢遣將軍趙睦守金墉河南太守楊佺期帥衆軍湖城帥讀曰率擊衝走之十一月癸酉以黃門郎殷仲堪為都督荊益寧三州諸軍事荊州刺史鎮江陵仲堪雖有英譽資望猶淺議者不以為允到官好行小惠好呼到翻綱目不舉南郡公桓玄負其才地以雄豪自處負其才與其門地也處昌呂翻年二十三始拜太子洗馬洗悉薦翻玄嘗詣琅邪王道子值其酣醉酣戶甘翻張目謂衆客曰桓溫晚塗欲作賊云何玄伏地流汗不能起由是益不自安常切齒於道子後出補義興太守守式又翻鬱鬱不得志歎曰父為九州伯兒為五湖長虞翻曰太湖有五湖隔湖洮湖射湖貴湖及太湖為五湖並太湖之小支俱連太湖故太湖兼得五湖之名韋昭曰胥湖蠡湖洮湖滆湖就太湖而五酈善長謂長塘湖射湖貴湖隔湖與太湖而五吳中志謂貢湖遊湖胥湖梅梁湖金鼎湖為五也長知兩翻遂棄官歸國玄襲封南郡公先臣勤王匡復之勳朝廷遺之臣不復計上時掌翻復扶又翻下同至於先帝龍飛陛下繼明謂桓溫廢海西立簡文帝而帝繼統也易曰明兩作離大人以繼明照四方誰之由邪疏寢不報玄在江陵仲堪甚敬憚之桓氏纍世臨荊州玄復豪橫橫戶孟翻士民畏之過於仲堪嘗於仲堪聽事前戲馬以矟擬仲堪聽讀曰廳矟色角翻通俗文長丈八者謂之矟擬者舉矟向之若將刺之也仲堪中兵參軍彭城劉邁謂玄曰元帝謂江東置參軍十三曹有中兵外兵騎兵馬矟有餘精理不足玄不悅仲堪為之失色為于偽翻玄出仲堪謂邁曰卿狂人也玄夜遣殺卿我豈能相救邪使邁下都避之都謂建康邁僅而獲免征虜參軍豫章胡藩過江陵見仲堪説之曰説輸芮翻桓玄志趣不常每怏怏於失職怏於兩翻節下崇待太過恐非將來之計也仲堪不悅藩內弟章十二行本弟下有同郡二字乙十一行本同孔本同羅企生為仲堪功曹藩退謂企生曰殷侯倒戈以授人必及於禍君不早圖去就後悔無及矣為後桓玄殺企生仲堪張本企區智翻庚寅立皇子德文為琅邪王徙琅邪王道子為會稽王會工外翻十二月燕主垂還中山以遼西王農為都督兗豫荊徐雍五州諸軍事鎮鄴雍於用翻休官權千成據顯親自稱秦州牧休官雜夷部落之名顯親縣漢光武置屬漢陽郡晉改顯親為顯新復漢陽為天水郡晉書姚興載記權千成作權干城略陽豪族也清河人李遼上表請敕兗州修孔子廟孔子廟在魯魯郡前漢屬徐州後漢晉屬豫州江表始分屬兗州灑所賣翻掃素報翻又各如字仍立庠序收教學者曰事有如賒而實急者此實義與虛實之實同表不見省省悉景翻十八年癸巳三九三春正月燕陽平孝王柔卒權千成為秦所逼請降於金城王乾歸降戶江翻乾歸以為東秦州刺史休官大都統顯親公夏四月庚子燕主垂加太子寶大單于以安定王庫傉官偉為太尉單音蟬傉奴沃翻范陽王德為司徒太原王楷為司空陳留王紹為尚書右僕射五月立子熙為河間王朗為渤海王鑒為博陵王秦右丞相竇衝矜才尚人尚人者陵人而出其上秦主登不許六月衝自稱秦王改元元光金城王乾歸立其子熾磐為太子熾昌志翻熾磐勇略明決過於其父秋七月秦主登攻竇衝於野人堡衝求救於後秦尹緯言於後秦主萇曰太子仁厚之稱緯于貴翻稱尺證翻名稱也著於遠近而英略未著請使擊苻登以著之萇從之太子興將兵攻胡空堡登解衝圍以赴之興因襲平涼大獲而歸苻登自大界之敗以平涼為根本魏王圭以薛干太悉伏不送劉勃勃事見上卷十六年襲其城屠之太悉伏奔秦氐帥楊佛嵩叛奔後秦帥所類翻楊佺期趙睦追之佺且緣翻九月丙戌敗佛嵩於潼關後秦將姚崇救佛嵩敗晉兵敗補邁翻趙睦死冬十月後秦主萇疾甚還長安燕主垂議伐西燕諸將皆曰永未有釁我連年征討士卒疲弊未可也范陽王德曰永既國之枝葉又僭舉位號惑民視聽宜先除之以一民心士卒雖疲庸得已乎垂曰司徒意正與吾同吾比老叩囊底智足以取之比必寐翻及也終不復留此賊以纍子孫也垂不欲留慕容永以纍子孫而不知拓跋圭已窺於代北矣是以有國有家者不恃無敵國外患恃吾所以傳國承家者足以待之耳纍力瑞翻復扶又翻十一月垂發中山步騎七萬遣鎮西將軍丹楊王纘纘當作瓚驤思將翻陘音刑攻西燕武鄉公友于晉陽征東將軍平規攻鎮東將軍段平于沙亭沙亭在鄴西南帥讀曰率友永之弟也十二月垂至鄴己亥後秦主萇召太尉姚旻僕射尹緯姚晃將軍姚大目尚書狄伯支入禁中受遺詔輔政萇謂太子興曰有毀此諸公者慎勿受之汝撫骨肉以恩接大臣以禮待物以信遇民以仁四者不失吾無憂矣姚萇所以詔其子者勝於苻健萇曰今大業垂成興才智足辦奚所復問復扶又翻庚子萇卒年六十四以其叔父緒鎮安定碩德鎮陰密弟崇守長安或謂碩德曰公威名素重部曲最強今易世之際必為朝廷所疑不如且奔秦州碩德本起兵隴上據冀城碩德曰太子志度寬明必無他慮今苻登未滅而骨肉相攻是自亡也吾有死而已終不為也遂往見興興優禮而遣之興自稱大將軍以尹緯為長史狄伯支為司馬帥衆伐秦帥讀曰率十九年甲午三九四春章十二行本春下有正月二字乙十一行本同孔本同張校同秦主登聞後秦主萇卒卒子恤翻下同喜曰姚興小兒吾折杖笞之耳乃大赦盡衆而東輕敵者敗宜苻登所以不亡於姚萇之時而亡於姚興之初立也雍於用翻太子崇守胡空堡遣使拜金城王乾歸為左丞相河南王領秦梁益涼沙五州牧加九錫使疏吏翻下同初禿髮思復鞬卒鞬居言翻子烏孤立烏孤雄勇有大志與大將紛陀謀取涼州欲並呂光也將即亮翻公必欲得涼州宜先務農講武禮俊賢修政刑然後可也烏孤從之三河王光遣使拜烏孤冠軍大將軍河西鮮卑大都統冠古玩翻烏孤與其㣥下謀之曰可受乎皆曰吾士馬衆多何為屬人石真若留不對烏孤曰卿畏呂光邪石真若留曰吾根本未固小大非敵若光致死於我何以待之不如受以驕之俟釁而動蔑不克矣烏孤乃受之紛陀與石真若留皆能審宜應事者也史言禿髮烏孤所以興紛與石真蓋皆夷姓二月秦主登攻屠各姚奴帛蒲二堡克之二堡在胡空堡之東屠直於翻燕主垂留清河公會鎮鄴發司冀青兗兵遣太原王楷出滏口滏音釜遼西王農出壺關垂自出沙庭以擊西燕庭當作亭其地在鄴西南軍各就頓分處置兵以疑敵使不知所備趣七喻翻下同嚴兵分道拒守聚糧臺壁水經注潞縣北對故臺壁漳水出其南本潞子所立也魏收地形志襄垣郡刈陵縣漢晉之潞縣也有臺壁時西燕之臣有二逸豆歸故此稱小逸豆歸從才用翻帥讀曰率夏章十二行本夏下有四月二字乙十一行本同孔本同張校同退齋校同秦主登自六陌趣廢橋趣七喻翻後秦始平太守姚詳據馬嵬堡以拒之嵬五回翻太子興遣尹緯將兵救詳將即亮翻緯據廢橋以待秦秦兵爭水不能得渴死者什二三因急攻緯興馳遣狄伯支謂緯曰苻登窮寇宜持重以挫之緯曰先帝登遐鄭玄曰登上也遐已也上已者若仙去云耳上時掌翻今不因思奮之力以禽敵大事去矣遂與秦戰秦兵大敗其夜秦衆潰登單騎奔雍騎奇寄翻雍於用翻太子崇及安成王廣聞敗皆棄城走登至無所歸乃奔平涼收集遺衆入馬毛山平涼城在漢安定鶉陰縣界後周始置平涼郡及縣唐為原州縣赫連定之敗魏亦據馬髦嶺以禽奚斤蓋平涼之險要處也燕主垂頓軍鄴西南月餘不進西燕主永怪之以為太行道寬行戶剛翻疑垂欲詭道取之乃悉斂諸軍屯軹關軹知氏翻杜太行口惟留臺壁一軍甲戌垂引大軍出滏口入天井關前漢書地理志上黨郡高都縣有天井關蔡雍曰太行山上有天井關在井北遂因名焉余按今澤州晉城縣有太行關關內有天井泉三所即天井關也乙酉燕軍至臺壁永遣從兄太尉大逸豆歸救之從才用翻平規擊破之小逸豆歸出戰遼西王農又擊破之斬勒馬駒禽王次多遂圍臺壁永召太行軍還自將精兵五萬以拒之刁雲慕容鍾震怖帥衆降燕永誅其妻子將即亮翻怖普布翻帥讀曰率降戶江翻己亥垂陳于臺壁南陳讀曰陳遣驍騎將軍慕容國伏千騎於澗下驍堅堯翻騎奇寄翻庚子與永合戰垂偽退永衆追之行數里國騎從澗中出斷其後斷丁管翻諸軍四面俱進大破之斬首八千餘級永走歸長子晉陽守將聞之棄城走丹楊王瓚等進取晉陽瓚藏旱翻後秦太子興始發喪即皇帝位于槐里興字子略萇之長子也槐里縣漢屬扶風晉屬始平郡宋白曰漢槐里縣故城在唐岐州興平縣東南七里興既破苻登始發喪襲位改元皇初遂如安定諡後秦主萇曰武昭皇帝廟號太祖六月壬子追尊會稽王太鄭氏曰簡文宣太后會工外翻諡法聖善周聞曰宣㣥臣謂宣太后應配食元帝太子前率徐邈曰晉志惠帝建東宮稱中衛率泰始五年分為左右各領一軍惠帝時愍懷太子在東宮又加前後二率江左省前後二率孝武太元中又置率所類翻宣太后平素之時不伉儷於先帝言非正伉苦浪翻敵也儷力計翻並也豈可為祖考立配為于偽翻國學明教東莞臧燾曰據晉書儒林傳元帝運鍾百六光啓中興雖尊儒勸學亟降於綸言然東序西膠未聞於絃誦明皇雅愛流略簡文敦悅典墳乃招集學徒引獎風烈國學明教之官當置於明帝簡文時也莞音官今尊號既正則罔極之情申別建寢廟則嚴禰之義顯嚴尊也禰父廟也兼明貴之所由繫子為稱簡文繫之宣太后之上也春秋傳曰母以子貴稱尺證翻不亦善乎乃立廟於太廟路西燕主垂進軍圍長子西燕主永欲奔後秦侍中蘭英曰昔石虎伐龍都太祖堅守不去事見九十六卷晉成帝咸康四年卒子恤翻今垂七十老翁厭苦兵革終不能頓兵連歲以攻我也但當城守以疲之永從之兵交之變其應無窮惟知彼知己者乃能百戰不殆耳慕容永欲以棘城之事自況當時與之共守長子者果能效死不去若慕容皓之諸臣乎秦主登遣其子汝陰王宗為質於河南王乾歸以請救質音致進封乾歸梁王納其妹為梁王后乾歸遣前軍將軍乞伏益州等帥騎一萬救之帥讀曰率騎奇寄翻秋七月登引兵出迎乾歸兵後秦主興自安定如涇陽與登戰于山南馬髦山南也殺之年五十二使歸農業徙陰密三萬戶於長安以李后賜姚晃益州等聞之引兵還還從宣翻又如字即帝位改元延初諡登曰高皇帝廟號太宗後秦安南將軍強章十二行本強作楊乙十一行本同熙鎮遠將軍強多叛推竇衝為主後秦主興自將討之軍至武功多兄子良國殺多而降強其兩翻將即亮翻降戶江翻熙奔秦州衝奔汧川汧川即扶風汧縣之地汧苦堅翻三河王光以子覆為都督玉門以西諸軍事西域大都護鎮高昌命大臣子弟隨之八月己巳尊皇太李氏為皇太后居崇訓宮西燕主永困急遣其子常山公弘等求救於雍州刺史郗恢郗丑之翻並獻玉璽一紐璽斯氏翻恢上言垂若並永為患益深不如兩存之可以乘機雙斃帝以為然詔青兗二州刺史王恭豫州刺史庾楷救之楷亮之孫也庾氏為桓溫所誅楷復不能振自此微矣又遣其太子亮來為質質音致平規追亮及於高都獲之高都縣屬上黨郡隋為澤州丹川縣唐為晉城縣魏王圭遣陳留公虔將軍庾嶽帥騎五萬東渡河屯秀容以救之此北秀容也在漢定襄郡界後魏置秀容郡秀容縣又立秀容護軍於汾水西北六十里徙北秀容胡人居之此南秀容也劉昫曰欣州秀容縣漢汾陽縣地隋自秀容故城移於此因更名帥讀曰率騎奇寄翻紇根之子也紇根見一百四卷元年紇戶骨翻大逸豆歸部將伐勤等開門內燕兵燕人執永斬之並斬其公卿大將刁雲大逸豆歸等三十餘人將即亮翻得永所統八郡七萬餘戶及秦乘輿服御伎樂珍寶甚衆乘繩證翻燕主垂以丹楊王瓚為並州刺史鎮晉陽宜都王鳳為雍州刺史鎮長子永尚書僕射昌黎屈遵瓚藏旱翻雍於用翻屈居勿翻尚書陽平王德祕書監中山李先太子詹事渤海封則黃門郎太山胡母亮中書郎張騰尚書郎燕郡公孫表皆隨才擢敘李先公孫表後皆仕魏位通顯九月垂自長子如鄴冬十月秦主崇為梁王乾歸所逐奔隴西王楊定定留司馬邵強守秦州帥衆二萬與崇共攻乾歸乾歸遣涼州牧軻彈秦州牧益州立義將軍詰歸帥騎三萬拒之軻彈益州詰歸皆乞伏氏也涼秦二州牧乾歸所置非能有其地軻彈晉書載記作軻殫帥讀曰率下同敗於平州載記作平川當從之軻彈司馬翟瑥奮劍怒曰瑥音溫主上以雄武開基所向無敵威振秦蜀將軍以宗室居元帥之任帥所類翻當竭力致命以佐國家今秦州雖敗二軍尚全奈何望風退衄衄女六翻將何面以見主上乎瑥雖無任獨不能以便宜斬將軍乎軻彈謝曰向者未知衆心何如耳果能若是吾敢愛死乃帥騎進戰益州詰歸亦勒兵繼之大敗定兵敗補邁翻殺定及崇斬首萬七千級穆帝永和七年秦王健改元即位歷六主四十二年而亡乞伏始得秦州定無子其叔父佛狗之子盛先守仇池自稱征西將軍秦州刺史仇池公諡定為武王仍遣使來稱藩使疏吏翻秦太子宣奔盛分章十二行本分上有盛字乙十一行本同孔本同氐羌為二十部護軍各為鎮戍不置郡縣燕主垂東巡陽平平原命遼西王農濟河與安南將軍尹國略地青兗農攻廩丘國攻陽城皆拔之東平太守韋簡戰死高平泰山琅邪諸郡皆委城奔潰農進軍臨海臨東海也柔然曷多汗棄其父與社崙率衆西走柔然降魏見上卷十六年汗音寒崙盧昆翻及於上郡跋那山斬曷多汗社崙收其餘衆數百奔候跋候跋處之南鄙處昌呂翻社崙襲候跋殺之候跋子啓跋吳頡等皆奔魏社崙掠五原以西諸部走度漠北柔然自此遂為魏患據載記以社崙為河西鮮卑則柔然亦鮮卑種也十一月燕遼西王農敗辟閭渾於龍水郭緣生述征記曰逢山在廣固南二十里洋水歷其陰而東北流世謂之石溝水出委粟山北而東注于巨洋水謂之石溝口然是水下流亦有時通塞及其春夏水泛川瀾無輟亦或謂之龍泉水敗補邁翻十二月燕主垂召農等還秦主興遣使與燕結好使疏吏翻好呼到翻是歲前秦滅通鑑始書後秦為秦並送太子寶之子敏於燕燕封敏為河東公梁王乾歸自稱秦王大赦自此以後史以西秦別之二十年乙未三九五春正月燕主垂遣散騎常侍封則報聘于秦散悉亶翻騎奇寄翻遂自平原狩于廣川勃海長樂而歸漢高祖置信都郡景帝二年為廣川國明帝更名樂成安帝改曰安平晉改曰長樂郡又別立廣川郡樂音洛西秦王乾歸以太子熾磐領尚書令熾昌志翻左長史邊芮為左僕射右長史祕宜為右僕射置官皆如魏武晉文故事然猶稱大單于大將軍單音蟬邊芮等領府佐如故薛干太悉伏自長安亡歸嶺北嶺北謂九嵕嶺北十八年太悉伏奔秦二月甲寅尚書令陸納卒三月庚辰朔日有食之皇太子出就東宮以丹楊尹王雅領少傅時會稽王道子專權奢縱嬖人趙牙本出倡優少詩照翻會工外翻倡音昌茹千秋本錢唐捕賊吏錢唐縣前漢屬會稽郡後漢屬吳郡錢唐記曰郡議曹華信議立此塘以防海水始開募能致土一斛者即與錢一千旬月之間來者雲集塘未成而不復取於是載土石者皆委之而去塘以之成故名錢塘楊正衡曰茹音如又而據翻浙間舊有此姓道子以牙為魏郡太守千秋為驃騎咨議參軍驃頻召翻今匹妙翻騎奇寄翻牙為道子開東第築山穿池為于偽翻功用巨萬帝嘗幸其第謂道子曰府內乃有山甚善然修飾太過道子無以對帝去道子謂牙曰上若知山是人力所為爾必死矣牙曰公在牙何敢死營作彌甚千秋賣官招權聚貨纍億博平令吳興聞人奭上疏言之博平縣漢屬東郡晉屬平原郡江左屬魏郡與郡皆僑置惡烏路翻而逼於太后不忍廢黜乃擢時望及所親幸王恭郗恢殷仲堪王珣王雅等使居內外要任以防道子道子亦引王國寶及國寶從弟琅邪內史緒以為心腹從才用翻由是朋黨競起無復嚮時友愛之歡矣太后每和解之中書侍郎徐邈從容言於帝曰從千容翻漢文明主猶悔淮南世祖聰達負愧齊王淮南事見十四卷漢文帝六年齊王事見八十一卷武帝太康四年實為深慎會稽王雖有酣媟之纍媟私列翻纍力瑞翻宜加弘貸消散㣥議外為國家之計內慰太后之心帝納之復委任道子如故復扶又翻初楊定之死也天水薑乳襲據上邽夏四月西秦王乾歸遣乞伏益州帥騎六千討之左僕射邊芮民部尚書王松壽曰益州屢勝而驕不可專任必以輕敵取敗乾歸曰益州驍勇諸將莫及帥讀曰率騎奇寄翻驍堅堯翻將即亮翻當以重佐輔之耳乃以平北將軍韋虔為長史左禁將軍務和為司馬務姓也古有務光大寒嶺在上邽西聽將士遊畋縱飲令曰敢言軍事者斬虔等諫不聽乳逆擊大破之魏王圭叛燕侵逼附塞諸部五月甲戌燕主垂遣太子寶遼西王農趙王麟帥衆八萬自五原伐魏范陽王德陳留王紹別將步騎萬八千為後繼散騎常侍高湖諫曰散悉亶翻騎奇寄翻魏與燕世為婚姻代王什翼犍兩娶於慕容皆早卒哀帝隆和元年什翼犍納女於燕燕又以女妻之燕實存之事見一百六卷十一年及一百七卷十二年難乃旦翻結好久矣間以求馬不獲而留其弟事見上卷十六年好呼到翻下同奈何遽興兵擊之拓跋涉圭沈勇有謀蕭子顯曰圭字涉圭沈持林翻兵精馬強未易輕也皇太子富於春秋志果氣鋭今委之專任章十二行本任作征乙十一行本同張校同必小魏而易之易以豉翻萬一不如所欲傷威毀重願陛下深圖之言頗激切垂怒免湖官湖泰之子也前燕時垂為車騎將軍以泰為從事中郎六月癸丑燕太原元王楷卒西秦王乾歸遷于西城苑川西城也秋七月三河王光帥衆十萬伐西秦帥讀曰率西秦左輔密貴周左衛將軍莫者羖羝密以國為氏姓譜漢有尚書密忠據通鑑下文則以密貴為姓莫者夷復姓以子敕勃為質質音致光引兵還乾歸悔之殺周及羖羝羖音古羝音氐魏張袞聞燕軍將至言於魏王圭曰燕狃於滑臺長子之捷滑臺事見上十七年長子事見上年狃與忸同杜預曰忸忲也有輕我之心宜羸形以驕之乃可克也羸倫為翻圭從之悉徙部落畜産西渡河千餘里以避之燕軍至五原降魏別部三萬餘家降戶江翻收穄田百餘萬斛置黑城黑城在五原河北按魏書帝紀登國五年劉衛辰遣子直力鞮出稒陽塞侵及黑城從可知矣水經河水自新秦中屈而南流過五原西安陽成宜宜梁臨沃稒陽等縣南圭遣右司馬許謙乞師於秦禿髮烏孤擊乙弗折掘等諸部皆破降之築廉川堡而都之乙弗折掘二部皆在禿髮氏之西廉川在湟中降戶江翻少好奇略少詩照翻好呼到翻聞烏孤在廉川棄家從之烏孤喜曰吾得趙生大事濟矣拜左司馬三河王光封烏孤為廣武郡公有長星見自須女至于哭星天文志須女四星須賤妾之稱婦職之卑者也斗牛女揚州分虛二星危三星皆主死喪哭泣墳墓四星屬危之下主死喪哭泣為墳墓也見賢遍翻於華林園舉酒祝之曰晉都建康倣洛都起華林園惡烏路翻長星勸汝一杯酒自古何有萬歲天子邪八月魏王圭治兵河南治直之翻九月進軍臨河燕太子寶列兵將濟暴風起漂其船數十艘泊南岸漂紕招翻艘蘇遭翻魏獲其甲士三百餘人皆釋而遣之寶之發中山也燕主垂已有疾既至五原圭使人邀中山之路伺其使者盡執之伺相吏翻使疏吏翻圭使所執使者臨河告之曰若父已死何不早歸寶等憂恐士卒駭動圭使陳留公虔將五萬騎屯河東東平公儀將十萬騎屯河北河水自金城過武威天水安定北地郡界率東北流至朔方沃野縣界始屈而東南流虔屯河東儀屯河北皆河曲之地未渡河也北史曰儀據朔方將即亮翻下同遵壽鳩之子也壽鳩見一百四卷元年燕術士靳安言於太子寶曰靳居欣翻天時不利燕必大敗速去可免寶不聽安退告人曰吾輩皆當棄尸草野不得歸矣燕魏相持積旬趙王麟將慕輿嵩等以垂為實死謀作亂奉麟為主事泄嵩等皆死寶麟等內自疑冬十月辛未燒船夜遁時河冰未結寶以魏兵必不能渡不設斥候十一月己卯暴風冰合魏王圭引兵濟河留輜重重直用翻選精鋭二萬餘騎急追之燕軍至參合陂有大風黑氣如堤自軍後來臨覆軍上覆扶又翻沙門支曇猛支者曇猛之俗姓曇徒含翻風氣暴迅魏兵將至之候宜遣兵禦之寶以去魏軍已遠笑而不應曇猛固請不已麟怒曰以殿下神武師徒之盛足以橫行沙漠索虜何敢遠來太元十八年慕容麟已知拓跋圭之必為燕患矣今乃輕之如此豈其心自疑而欲敗寶之師邪其後寶不能守中山而麟亦不能自立同歸于亂而已矣索昔各翻當斬以徇曇猛泣曰苻氏以百萬之師敗於淮南正由恃衆輕敵不信天道故也事見一百四卷五卷七年八年寶乃遣麟帥騎三萬居軍後以備非常帥讀曰率騎奇寄翻下同麟以曇猛為妄縱騎遊獵不肯設備寶遣騎還詗魏兵詗古永翻又翾正翻騎行十餘里即解鞍寢魏軍晨夜兼行乙酉暮至參合陂西燕軍在陂東營於蟠羊山南水上水經注可不埿水出鴈門沃陽縣東南六十里山下西北流注沃水合流而東徑參合縣南分扶問翻掩覆燕軍士卒銜枚束馬口潛進丙戌日出魏軍登山下臨燕營燕軍將東引引而東行也士卒大驚擾亂圭縱兵擊之燕兵走赴水人馬相騰躡壓溺死者以萬數略陽公遵以兵邀其前燕兵四五萬人一時放仗斂手就禽其遺迸去者不過數千人迸北孟翻太子寶等皆單騎僅免殺燕右僕射陳留悼王紹生禽魯陽王倭奴倭烏禾翻桂林王道成濟陰公尹國等文武將吏數千人濟子禮翻兵甲糧貨以巨萬計道成垂之弟子也魏王圭擇燕臣之有才用者代郡太守廣川賈閏閏從弟驃騎長史昌黎太守彝太史郎朝章十二行本朝上有遼東二字乙十一行本同孔本同張校同崇等留之朝直遙翻其餘欲悉給衣糧遣還以招懷中州之人中部大人王建曰燕衆強盛今傾國而來我幸而大捷不如悉殺之則其國空虛取之為易易以豉翻且獲寇而縱之無乃不可乎乃盡坑之十二月圭還雲中之盛樂通鑑於惠帝元康五年書定襄之盛樂故城此書雲中之盛樂蓋歷代郡縣廢徙無常前漢成樂縣屬定襄後漢成樂縣屬雲中前書定襄之盛樂此前漢之故城也此書雲中之盛樂此後漢之故城也燕太子寶恥於參合之敗請更擊魏司徒德言於燕主垂曰虜以參合之捷有輕太子之心宜及陛下神略以服之不然將為後患垂乃以清河公會録留臺事領幽州刺史代高陽王隆鎮龍城以陽城王蘭汗為北中郎將代長樂公盛鎮薊樂音洛薊音計命隆盛悉引其精兵還中山期以明年大舉擊魏是歲秦主興封其叔父緒為晉王碩德為隴西王弟崇為齊公顯為常山公二十一年丙申三九六春正月燕高陽王隆引龍城之甲入中山軍容精整燕人之氣稍振漢人有言戰勝之威士氣百倍敗軍之卒沒世不復正此之謂也休官權萬世帥衆降西秦前年乞伏乾歸稱秦王故稱西秦以別於姚秦帥讀曰率降戶江翻燕主垂遣征東將軍平規發兵冀州二月規以博陵武邑長樂三郡兵反於魯口其從子冀州刺史喜諫不聽從才用翻規弟海陽令翰亦起兵於遼西以應之海陽縣自漢以來屬遼西郡平規兄弟以燕兵敗故叛之嵩敗死垂自將擊規至魯口規棄衆將妻子及平喜等數十人走渡河垂引兵還翰引兵趣龍城趣七喻翻清河公會遣東陽公根等擊翰破之翰走山南白狼徐無等山之南三月庚子燕主垂留范陽王德守中山引兵密發踰青嶺經天門青嶺蓋即廣昌嶺在代郡廣昌縣南所謂五回道也其南層崖刺天積石之峻壁立直上蓋即天門也出魏不意直指雲中魏陳留公虔帥部落三萬餘家鎮平城垂至獵嶺獵嶺在夏屋山東北魏都平城常獵於此是時燕兵新敗皆畏魏惟龍城兵勇鋭爭先虔素不設備閏月乙卯燕軍至平城虔乃覺之帥麾下出戰敗死燕軍盡收其部落魏王圭震怖欲走諸部聞虔死皆有二心圭不知所適虔勇蓋代北既敗而死故諸部皆二然天將亡燕垂繼以殞此固非人力所能為也帥讀曰率怖普布翻垂之過參合陂也見積骸如山為之設祭為于偽翻軍士皆慟哭聲震山谷垂慙憤嘔血由是發疾乘馬輿而進頓平城西北三十里太子寶等聞之皆引還燕軍叛者奔告於魏云垂已死輿尸在軍魏王圭欲追之聞平城已沒乃引還陰山魏人有言死諸葛走生仲達拓跋圭聞慕容垂之死而不敢進亦類是耳垂在平城積十日疾轉篤乃築燕昌城而還水經燕昌城在平城北四十里四月癸未卒於上谷之沮陽賢曰沮陽縣故城在今媯州東沮音阻垂年七十一丙申至中山戊戌發喪諡曰成武皇帝廟號世祖壬寅太子寶即位寶字道祐垂第四子也改元永康五月辛亥以范陽王德為都督冀兗青徐荊豫六州諸軍事車騎大將軍冀州牧鎮鄴遼西王農為都督並雍益梁秦涼六州諸軍事並州牧鎮晉陽雍於用翻又以安定王庫傉官偉為太師傉奴沃翻夫餘王蔚為太傅餘蔚夫餘王子也燕王皓破夫餘得之燕亡入秦秦亂復歸燕燕主垂封為扶餘王甲寅以趙王麟領尚書左僕射高陽王隆領右僕射長樂公盛為司隸校尉宜都王鳳為冀州刺史乙卯以散騎常侍彭城劉該為徐州刺史鎮鄄城散悉亶翻騎奇寄翻鄄吉掾翻甲子以望蔡公謝琰為尚書左僕射望蔡縣屬豫章郡沈約曰漢靈帝中平中汝南上蔡民分徙此城立縣名上蔡晉武帝太康元年更名宋白曰以上蔡人思本土故曰望蔡初燕王垂先段后生子令寶後段后生子朗鑒愛諸姬子麟農隆柔熙寶初為太子有美稱稱昌孕翻名譽也已而荒怠中外失望後段后嘗言於垂曰燕王垂初娶段氏以可足渾后之讒而死後即位追尊為后復納段氏為后故史書後段后以別之太子遭承平之世足為守成之主今國步艱難恐非濟世之才遼西高陽二王陛下之賢子宜擇一人付以大業趙王麟姦詐強愎愎弼力翻異日必為國家之患宜早圖之寶善事垂左右左右多譽之譽音余故垂以為賢謂段氏曰汝欲使我為晉獻公乎晉獻公信驪姬之讒殺太子申生告其妹范陽王曰太子不才天下所知吾為社稷言之為于偽翻主上乃以吾為驪姬何其苦哉觀太子必喪社稷喪息浪翻范陽王有非常器度若燕祚未盡其在王乎寶及麟聞而恨之乙丑寶使麟謂段氏曰后常謂主上不能守大業今竟能不不讀曰否宜早自裁以全段宗段氏怒曰汝兄弟不難逼殺其母況能守先業乎吾豈愛死但念國亡不久耳遂自殺寶議以段后謀廢適統適讀曰嫡無母后之道不宜成喪㣥臣咸以為然中書令眭邃揚言於朝曰眭息惟翻揚音揚大言而疾曰揚朝直遙翻子無廢母之義漢安思閻后親廢順帝事見五十卷漢安帝延光三年況先后曖昧之言虛實未可知乎乃成喪六月癸酉魏王圭遣將軍王建等擊燕廣寧太守劉亢泥斬之廣寧縣漢屬上谷郡晉太康中分置廣寧郡亢苦浪翻燕上谷太守開封公詳棄郡走詳皓之曾孫也丁亥魏賀太卒魏王圭之母也燕主寶定士族舊籍分辨清濁校閲戶口罷軍營封蔭之戶悉屬郡縣軍營封蔭之戶蓋諸軍庇占以為部曲者始有離心斯事行之未必非也但慕容寶即位之初國師新敗又遭大喪下之懷反側者多未可遽行耳大學曰物有本末事有先後知所先後則近道矣三河王呂光即天王位國號大涼大赦改元龍飛呂光字世明略陽氐也父婆樓為苻堅佐命以世子紹為太子封子弟為公侯者二十人以中書令王詳為尚書左僕射著作郎段業等五人為尚書光遣使者拜禿髮烏孤為征南大將軍益州牧左賢王烏孤謂使者曰呂王諸子貪淫光諸子見於史者纂弘紹覆光甥石聰譖殺杜進餘二人當考吾安可違百姓之心受不義之爵乎吾當為帝王之事耳乃留其鼓吹羽儀吹昌瑞翻謝而遣之平規收合餘黨據高唐高唐縣自漢以來屬平原郡將即亮翻東土之民素懷隆惠迎候者屬路相屬於路也屬之欲翻七月隆進軍臨河規棄高唐走隆遣建威將軍慕容進等濟河追之斬規於濟北於濟子禮翻平喜奔彭城納故中書令王獻之女為太子獻之羲之之子也羲之王導之從子魏㣥臣勸魏王圭稱尊號圭始建天子旌旗出警入蹕改元皇始圭什翼犍之嫡孫實之子詳見一百四卷元年自苻堅淮淝之敗至是十有四年矣關河之間戎狄之長更興迭仆晉人視之漠然不關乎其心拓跋圭興而南北之形定矣南北之形既定卒之南為北所並嗚呼自隋以後名稱揚于時者代北之子孫十居六七矣氏族之辨果何益哉圭善之燕遼西王農悉將部曲數萬口之並州將即亮翻之往也並州素乏儲㣥㣥丈里翻是歲早霜民不能供其食又遣諸部護軍分監諸胡監工銜翻由是民夷俱怨潛召魏軍八月己亥魏王圭大舉伐燕兵無內應與必勝之計不可大舉南出馬邑踰句注句音鉤旌旗二千餘里鼓行而進左將軍鴈門李栗將五萬騎為前驅別遣將軍封真等從東道出軍都襲燕幽州魏書官氏志拓跋詰汾時餘部諸姓內入者有是賁氏後改為封氏軍都縣前漢屬上谷郡後漢屬廣陽郡晉屬燕國有軍都關賢曰今幽州昌平縣有軍都山在西北燕征北大將軍幽平二州牧清河公會母賤而年長長知兩翻雄俊有器藝燕主垂愛之寶之伐魏也垂命會攝東宮事總録禮遇一如太子總録謂總録朝政也命會鎮龍城委以東北之任國官府佐皆選一時才望垂疾篤遺言命寶以會為嗣而寶愛少子濮陽公策意不在會長樂公盛與會同年恥為之下少詩照翻濮博木翻樂音洛乃與趙王麟共勸寶立策寶從之乙亥立段氏為皇后策為皇太子會盛皆進爵為王策年十一素憃弱憃與戇同陟降翻愚也會聞之心慍懟慍於問翻懟直類翻九月章武王宙奉燕主垂及成哀段后之喪葬于龍城宣平陵成哀后即寶所殺後母段氏也隆去年自龍城還中山會實代之故令遣還其部曲參佐多留部曲不遣宙年長屬尊長知兩翻會每事陵侮之見者皆知其有異志為寶會父子相圖張本戊午魏軍至陽曲陽曲縣自漢以來屬太原郡宋白曰陽曲縣故城在太原縣北四十五里後漢末所移也隋文帝改為陽直尋又改為汾陽縣臨晉陽遣騎環城大譟而去騎奇寄翻環音宦燕遼西王農出戰大敗奔還晉陽司馬慕輿嵩閉門拒之前有慕輿嵩以謀奉趙王麟為變而誅此又一人魏中領將軍長孫肥追之中領將軍魏所置猶魏晉之中領軍也帥讀曰率嚴川改州獲農妻子燕軍盡沒農被創獨與三騎逃歸中山被皮義翻創初良翻魏王圭遂取並州初建臺省置刺史太守尚書郎以下官悉用儒生為之士大夫詣軍門無少長皆引入存慰使人人盡言少詩照翻長知兩翻少有才用咸加擢敘史言拓跋圭所以能取中原少詩沼翻己未遣輔國將軍奚收略地汾川奚收當作奚牧離石縣自漢以來屬西河郡燕置護軍以統稽胡招撫離散勸課農桑燕主寶聞魏軍將至議于東堂中山尹苻謨曰今魏軍衆強千里遠鬬乘勝氣鋭若縱之使入平土不可敵也宜杜險以拒之苻謨降燕見一百六卷十一年魏多騎兵往來剽速剽匹妙翻馬上齎糧不過旬日宜令郡縣聚民千家為一堡深溝高壘清野以待之彼至無所掠不過六旬食盡自退尚書封懿曰今魏兵數十萬天下之勍敵也勍渠京翻民雖築堡不足以自固是聚兵及糧以資之也且動搖民心示之以弱不如阻關拒戰計之上也趙王麟曰魏今乘勝氣鋭其鋒不可當宜完守中山待其弊而乘之於是修城積粟為持久之備不據險拒戰而嬰城自守此慕容寶所以敗也安喜前漢之安險縣也後漢章帝改曰安喜屬中山郡悉以委麟為麟叛寶張本帝嗜酒流連內殿醒治嚴治改日既少言昏醉之時多醒而治事之時少也見賢遍翻張貴人寵冠後宮冠古玩翻後宮皆畏之庚申帝與後宮宴妓樂盡侍妓渠綺翻時貴人年近三十帝戲之曰汝以年亦當廢矣吾意更屬少者近其靳翻屬之欲翻少詩照翻貴人潛怒向夕帝醉寢於清暑殿清暑殿帝所作散遣之使婢以被蒙帝面弒之重賂左右云因魘暴崩飲於鴆翻魘於琰翻廣韻曰睡中魘毛晃曰氣窒心懼而神亂則魘時太子暗弱會稽王道子昏荒會工外翻遂不復推問復扶又翻下同王國寶夜叩禁門欲入為遺詔侍中王爽拒之曰大行晏駕皇太子未至敢入者斬國寶乃止爽恭之弟也辛酉太子即皇帝位大赦癸亥有司奏會稽王道子宜進位太傅揚州牧假黃鉞詔內外衆事動靜咨之安帝幼而不慧杜預曰不慧世所謂白癡至於寒暑飢飽亦不能辨飲食寢興皆非己出母弟琅邪王德文性恭謹常侍左右為之節適始得其宜節適謂事為之節以適其口體為于偽翻初王國寶黨附會稽王道子王國寶黨附道子事始一百五卷八年屢為御史中丞褚粲所糾國寶起齋侔清暑殿孝武帝甚惡之惡烏路翻國寶懼遂更求媚於帝而疏道子帝復寵昵之昵尼質翻道子大怒嘗於內省面責國寶以劍擲之舊好盡矣好呼到翻及帝崩國寶復事道子與王緒共為邪諂道子更惑之倚為心腹遂參管朝權威震內外並為時之所疾王恭入赴山陵每正色直言道子深憚之恭罷朝歎曰榱棟雖新朝直遙翻下同榱所追翻秦曰屋椽齊魯曰桷周曰榱便有黍離之歎周大夫行役過故宗廟宮室盡為禾黍故作黍離之詩説輸芮翻因恭入朝勸相王伏兵殺之國寶不許道子欲輯和內外乃深布腹心於恭冀除舊惡而恭每言及時政輒厲聲色道子知恭不可和協遂有相圖之志或勸恭因入朝以兵誅國寶恭以豫州刺史庾楷士馬甚盛黨於國寶憚之不敢發王珣謂恭曰國寶雖終為禍亂要之罪逆未彰今遽先事而發必大失朝野之望況擁強兵竊發於京輦誰謂非逆國寶若遂不改惡布天下然後順衆心以除之亦無憂不濟也恭乃止既而謂珣曰比來視君一似胡廣謂依違於權姦之間以保祿位比毗至翻近也王陵廷爭陳平慎默但問歲晏何如耳謂王陵以廷爭失位陳平以慎默終能安劉爭讀曰諍冬十月甲申葬孝武帝于隆平陵王恭還鎮將行謂道子曰主上諒暗暗讀如陰冢宰之任伊周所難願大王親萬幾納直言放鄭聲遠佞人幾與機同遠于願翻魏王圭使冠軍將軍代人于栗磾魏書官氏志拓跋詰汾時餘部諸姓內入者有勿忸于氏後改為于氏冠古玩翻磾丁奚翻潛自晉陽開韓信故道韓信自井陘伐趙之故路也帥讀曰率騎奇寄翻己酉圭自井陘趨中山李先降魏去年李先自西燕歸燕趨七喻翻降戶江翻西秦涼州牧軻彈與秦州牧益州不平軻彈奔涼魏王圭進攻常山拔之獲太守苟延自常山以東守宰或走或降諸郡縣皆附於魏惟中山鄴信都三城為燕守中山燕都慕容德守鄴慕容鳳守信都皆重鎮也為于偽翻圭命東平公儀將五萬騎攻鄴冠軍將軍王建左將軍李栗攻信都戊午圭進軍中山己未攻之燕高陽王隆守南郭帥衆力戰自旦至晡殺傷數千人魏兵乃退圭謂諸將曰中山城固寶必不肯出戰急攻則傷士久圍則費糧不如先取鄴信都然後圖之丁卯圭引兵而南章武王宙自龍城還聞有魏寇馳入薊與鎮北將軍陽城王蘭乘城固守蘭垂之從弟也從才用翻魏別將石河頭攻之不克魏書官氏志拓跋詰汾時餘部諸姓內入者有嗢石蘭氏後為石氏漁陽縣漢屬漁陽郡晉省圭軍于魯口博陵太守申永奔河南高陽太守崔宏奔海渚海渚海中州也遣騎追求獲之以為黃門侍郎與給事黃門侍郎張袞對掌機要創立制度為崔宏父子貴顯於魏張本屈居勿翻降戶江翻圭以為中書令出納號令兼總文誥燕范陽王德使南安王青等夜擊魏軍於鄴下破之魏軍退屯新城新城即燕主垂攻鄴所築者也別駕韓曰音卓古人先計而後戰魏軍不可擊者四懸軍遠客利在野戰一也深入近畿頓兵死地二也前鋒既敗後陳方固三也彼衆我寡四也官軍不宜動者三自戰其地一也自戰其地者衆易敗散衆心難固二也城隍未修敵來無備三也今魏無資糧不如深壘固軍以老之德從之召青還青詳之兄也十二月魏遼西公賀賴盧帥騎二萬會東平公儀攻鄴賴盧訥之弟也為賀賴盧降慕容德張本按魏書官氏志內入諸姓有賀賴氏北方有賀蘭氏後皆為賀氏蓋內入者為賀賴氏留北方者為賀蘭氏蘭賴語轉耳又胸奴諸種亦有賀賴氏魏別部大人沒根有膽勇魏王圭惡之惡烏路翻沒根懼誅己丑將親兵數十人降燕燕主寶以為鎮東大將軍封鴈門公沒根求還襲魏寶難與重兵給百餘騎沒根效其號令夜入魏營至中仗圭乃覺之狼狽驚走沒根以所從人少不能壞其大衆多獲首虜而還史言慕容寶不能因降人為間以破魏少詩沼翻壞音怪楊盛遣使來請命詔拜盛鎮南將軍仇池公盛表苻宣為平北將軍是歲越質詰歸帥戶二萬叛西秦降于秦越質詰歸降西秦見上卷十六年帥讀曰率下同成紀縣自漢以來屬天水郡處昌呂翻秦隴西王碩德攻薑乳於上邽乳率衆降秦以碩德為秦州牧鎮上邽徵乳為尚書強熙權千成帥衆三萬共圍上邽碩德擊破之熙奔仇池遂來奔碩德西擊千成於略陽千成降西燕既亡其所署河東太守柳恭等各擁兵自守秦主興遣晉王緒攻之恭等臨河拒守緒不得濟初永嘉之亂汾陰薛氏聚其族黨阻河自固不仕劉石及苻氏興乃以禮聘薛強拜鎮東將軍強引秦兵自龍門濟魏土地記曰梁山北有龍門山大禹所鑿通孟津河口廣八十步巖際鐫迹遺功尚存梁山在馮翊夏陽縣西北恭等皆降興以緒為並冀二州牧鎮蒲阪王崇武標點容肇祖聶崇岐覆校
