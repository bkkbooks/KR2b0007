body:
  text: 資治通鑑卷第二百一十八端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註唐紀三十四肅宗文明武德大聖大宣孝皇帝上之下至德元載至德元載丙申七五六載祖亥翻至德元載五月丁巳炅衆潰走保南陽炅古迥翻炅不書姓承上卷安祿山將攻魯炅事也炅自潁川走保南陽考異曰玄宗實錄云炅攜百姓數千人奔順陽川今從舊傳賊就圍之太常卿張垍薦夷陵太守虢王巨有勇略上徵吳王祗為太僕卿垍其冀翻夷陵郡峽州守式又翻上亦謂玄宗自靈武即位後玄宗稱上皇稱肅宗為上以巨為陳留譙郡太守河南節度使兼統嶺南節度使何履光陳留郡汴州譙郡亳州此二郡太守也是年升五府經略討擊使為嶺南節度使領廣韶循潮康瀧端新封春勤羅潘高思恩藤治廣州黔中節度使趙國珍趙國珍牂柯別部充州蠻酋趙君道之裔楊國忠兼劍南節度以國珍有方略授黔中都督護五溪十餘年天下方亂其所部獨寧按新書方鎮表開元二十六年黔州置五溪諸州經略使天寶十四載增領守捉使代宗大曆四年始置辰溪巫錦業五州都團練守捉觀察處置使憲宗元和三年黔州觀察增領涪州唐末始於黔州置節鎮疑此時趙國珍未得建節至明年通鑑書置黔中節度必有所據國珍本牂柯夷也牂音臧柯音哥戊辰巨引兵自藍田出趣南陽趣七喻翻賊聞之解圍走至德元載令狐潮復引兵攻雍丘潮與張巡有舊於城下相勞苦如平生潮因說巡曰復扶又翻勞力到翻說式芮翻天下事去矣足下堅守危城欲誰為乎為于偽翻巡曰足下平生以忠義自許今日之舉忠義何在潮慚而退至德元載郭子儀李光弼還常山還從宣翻又音如字史思明收散卒數萬踵其後子儀選驍騎更挑戰驍堅堯翻騎奇寄翻更工衡翻挑徒了翻三日至行唐即漢南行唐縣屬常山郡九域志在郡北五十五里乃退子儀乘之又敗之於沙河沙河在新樂行唐二縣之間敗補邁翻安祿山復使將步騎二萬人北就思明復扶又翻將即亮翻又音如字又使牛廷玠發范陽等郡兵萬餘人助思明合五萬餘人而同羅曳落河居五分之一子儀至恆陽思明隨至恆戶登翻子儀深溝高壘以待之賊來則守去則追之晝則耀兵夜斫其營賊不得休息數日子儀光弼議曰賊倦矣可以出戰考異曰河洛春秋以此為光弼語汾陽家傳作子儀語蓋二人共議耳壬午戰于嘉山據舊史安祿山傳嘉山在常山郡東魏收地形志中山郡上曲陽縣有嘉山上曲陽即唐之恆陽也考異曰實錄云六月壬午按長曆六月癸未朔壬午五月二十九日也汾陽家傳舊祿山傳亦云六月戰嘉山河洛春秋云六月二十五日光弼破賊於嘉山今從實錄而改其月斬首四萬級捕虜千餘人思明墜馬露髻跣足步走至暮杖折槍歸營折而設翻奔于博陵光弼就圍之軍聲大振於是河北十餘郡皆殺賊守將而降將即亮翻下同降戶江翻下同考異曰河洛春秋云五月蔡希德從東都見祿山祿山又與馬步二萬人至邢州取堯山招慶射趙州東界效曲鼓鹿城間渡洿池水入無極至定州牛介從幽州占歸檀幽易兼大同紇蠟共萬餘人帖思明思明軍既壯共五萬餘人其中精騎萬人悉是同羅曳落河精於馳突光弼以十五萬衆頓軍恆陽樵採往來人有難色召有策者試之時趙州司戶參軍先臣亡父包處遂上書與光弼曰思明用軍惟將勁悍觀其布措實謂無謀昔秦趙爭山先居者勝豈不為勞逸勢倍高下相懸今宜重出軍人有膂力者五萬被甲兩重陌刀各二東有高山甚大先令五千甲士於山上設伏後出二千人山東取糧賊見必追之則奔山上伏兵馬與一百面鼓應山上避賊百姓壯者亦與器械令隨大軍老弱者令居險固守遙為聲援賊必圍山攻之城內出五萬人擇將二人統之各領二萬一將於南面一將於城北門出賊營悉在山東其軍夜出長去賊三十里行廣張左右翼以天曉合圍其軍每二十五為隊每隊置旗兩口鼕鼕鼓子一具圍落纔合則動鼓子賊必不測人之多少然於城東門出軍一萬人布掌底陳山上亦擊鼓而下齊攻之必克勝光弼尤然此計乃出朔方計會出人取糧賊果然來襲即奔山上至六月二十五日依前計大破賊於嘉山陣斬首數萬餘級生擒數千思明落馬步遁至暮拄折槍歸營希德中槍索押衙劉旻斫斷而走生擒得旻至二十六日覆陣二十七日有詔至恆陽云潼關失守駕幸劍南包諝專欲歸功其父而他書皆無之今不取漁陽路再絕漁陽即謂范陽也范陽郡幽州其後又分置薊州漁陽郡二郡始各有分界然范陽節度盡統幽易平檀媯燕等州賊之根本實在范陽也唐人於此時多以范陽漁陽通言之白居易詩所謂漁陽鼙鼓動地來是以范陽通為漁陽也前此顏杲卿以常山返正漁陽路絕矣杲卿敗而復通今郭李破史思明故再絕多為官軍所獲將士家在漁陽者無不搖心祿山大懼召高尚嚴莊詬之曰汝數年教我反以為萬全今守潼關數月不能進北路已絕諸軍四合吾所有者止汴鄭數州而已萬全何在汝自今勿來見我尚莊懼數日不敢見田乾真自關下來為尚莊說祿山曰為于偽翻說式芮翻下密說同自古帝王經營大業皆有勝敗豈能一舉而成今四方軍壘雖多皆新募烏合之衆未更行陳更工衡翻行戶剛翻陳讀曰陣豈能敵我薊北勁銳之兵何足深憂尚莊皆佐命元勳陛下一旦絕之使諸將聞之誰不內懼若上下離心臣竊為陛下危之祿山喜曰阿浩汝能豁我心事即召尚莊置酒酣宴自為之歌以侑酒待之如初阿浩乾真小字也為于偽翻考異曰祿山事迹作阿法今從唐曆統紀舊傳祿山議棄洛陽走歸范陽計未決是時天下以楊國忠驕縱召亂莫不切齒又祿山起兵以誅國忠為名王思禮密說哥舒翰使抗表請誅國忠說式芮翻考異曰玄宗實錄云或勸翰留兵二萬守關悉以精銳回誅楊國忠此漢挫七國之計也公以為何如翰心許之未發有客泄其謀於國忠國忠大懼按翰若回兵誅國忠則正與祿山無異思禮勸翰抗表言國忠罪猶不敢況敢舉兵乎事必不然且翰雖心許他人安得知之正由翰按兵不進故國忠及其黨疑懼恐翰回兵誅之其實翰無此心也若果欲誅國忠則安肯慟哭出關乎幸蜀記云翰使王思禮至陝郡見賊偽御史中丞無敵將軍平西大使崔乾祐令傳檄與祿山數其干紀亂常背天逆理且曰若面縛而來束身歸死赦爾九族罪爾一身如更屈強王師遲疑未決大軍一鼓玉石俱焚爾審思之悔無及矣按翰與乾祐方對壘相攻思禮軍中大將豈可使齎罵祿山之檄詣乾祐乎必無此理今不取翰不應思禮又請以三十騎劫取以來至潼關殺之翰曰如此乃翰反非祿山也或說國忠今朝廷重兵盡在翰手翰若援旗西指說式芮翻援于元翻於公豈不危哉國忠大懼乃奏潼關大軍雖盛而後無繼萬一失利京師可憂請選監牧小兒三千於苑中訓練時監牧五坊禁苑之卒率謂之小兒使劍南軍將李福德等領之又募萬人屯灞上令所親杜乾運將之將即亮翻名為禦賊實備翰也翰聞之亦恐為國忠所圖乃表請灞上軍隸潼關六月癸未召杜乾運詣關因事斬之國忠益懼會有告崔乾祐在陝兵不滿四千皆羸弱無備此祿山之用間也陝失冉翻趣讀曰促下以義推翰奏曰祿山久習用兵今始為逆豈肯無備是必羸師以誘我若往正墮其計中羸倫為翻誘羊久翻且賊遠來利在速戰官軍據險以扼之利在堅守況賊殘虐失衆兵勢日蹙將有內變因而乘之可不戰擒也要在成功何必務速今諸道徵兵尚多未集請且待之郭子儀李光弼亦上言請引兵北取范陽覆其巢穴質賊黨妻子以招之上時掌翻質音致賊必內潰潼關大軍唯應固守以弊之不可輕出國忠疑翰謀己言於上以賊方無備而翰逗留將失機會上以為然續遣中使趣之項背相望翰不得已撫膺慟哭丙戌引兵出關逗音豆使疏吏翻趣讀曰促考異曰幸蜀記曰賊將崔乾祐於陝郡西潛鋒蓄銳臥鼓偃旗而偵者奏云賊全無備上然之又曰玄宗久處太平不練軍事既被國忠眩惑中使相繼督責於公不得已撫膺慟哭久之乃引師出關國忠又令杜乾運領所募兵於馮翊境上潛備哥舒公公曰今軍出關勢十全矣更置乾運於側以為疑軍人心憂疑即不俟見賊吾軍潰矣必當併之以除內憂遂令衙前總管叱萬進追軍誡之曰若不受追即便斬頭來乾運果不肯赴進詐詞如欲叛哥舒竊請見乾運遂喜遽見之與語進忽抽佩刀曰奉處分取公頭乾運驚懼其左右悉新招募者悉投仗散走進遂斬乾運攜首至於軍門衆皆攝氣乃統其軍赴關按翰若亶殺乾運而奪其軍則是已反也朝廷安能趣之出關乎蓋奏乞以其軍隸潼關朝廷已許之翰召乾運受處分或有所違拒因託軍法以斬之耳凌準邠志云郭子儀李光弼將進軍聞朝廷議出潼關圖復陝洛二公議曰哥舒公老疾昏耄賊素知諸軍烏合不足以戰今祿山悉銳南馳宛洛賊之餘衆盡委思明我且破之便覆其巢質叛徒之族取祿山之首其勢必矣若潼關出師有戰必敗關城不守京室有變天下之亂何可平之乃陳利害以聞且請固關無出唐曆會偵人自陝至云崔乾祐所將衆不滿四千不足圖也上大悅舊翰傳翰既斬乾運心不自安又素有風疾至是頗甚軍中之務不復躬親委政於行軍司馬田良丘良丘復不敢專斷教令不一頗無部伍其將王思禮李承光又爭長不叶人無鬬志今兼采之己丑遇崔乾祐之軍於靈寶西原靈寶縣更名見二百十五卷天寶元年南薄山北阻河隘道七十里庚寅官軍與乾祐會戰薄伯各翻隘烏介翻考異曰肅宗實錄乙酉翰與乾祐會戰舊傳四日次靈寶西原八日與賊交戰新傳丙戌次靈寶西原庚寅與乾祐戰按翰軍既遇賊必不留四日然後戰玄宗實錄丙戌翰出關己丑遇賊庚寅戰此近是今從之幸蜀記亦然乾祐伏兵於險翰與田良丘浮舟中流以觀軍勢見乾祐兵少趣諸軍使進王思禮等將精兵五萬居前龐忠等將餘兵十萬繼之翰以兵三萬登河北阜望之鳴鼓以助其勢少始紹翻趣讀曰促將即亮翻又音如字乾祐所出兵不過萬人什什伍伍散如列星或疏或密或前或卻官軍望而笑之乾祐嚴精兵陳於其後兵既交賊偃旗如欲遁者官軍懈不為備須臾伏兵發賊乘高下木石擊殺士卒甚衆道隘士卒如束槍槊不得用翰以氈車駕馬為前驅欲以衝賊日過中東風暴急乾祐以草車數十乘塞氈車之前縱火焚之乘繩證翻塞悉則翻考異曰幸蜀記曰野中先有官草積數十堆因風焚之今從舊傳煙焰所被被皮義翻官軍不能開目妄自相殺謂賊在煙中聚弓弩而射之射而亦翻日暮矢盡乃知無賊乾祐遣同羅精騎自南山過出官軍之後擊之官軍首尾駭亂不知所備於是大敗或棄甲竄匿山谷或相擠排入河溺死囂聲振天地賊乘勝蹙之後軍見前軍敗皆自潰河北軍望之亦潰章十二行本潰下有瞬息間兩岸皆空七字乙十一行本同孔本同張校同退齋校同河北軍翰所自將者也翰獨與麾下數百騎走自首陽山西渡河入關首陽山當是首山衍陽字首山在蒲州河東縣界與湖城縣之荊山隔河相對皆廣二丈深丈廣古曠翻深式浸翻人馬墜其中須臾而滿餘衆踐之以度踐息淺翻士卒得入關者纔八千餘人辛卯乾祐進攻潼關克之翰至關西驛揭牓收散卒欲復守潼關復扶又翻蕃將火拔歸仁等以百餘騎圍驛入謂翰曰賊至矣請公上馬翰上馬出驛歸仁帥衆叩頭曰公以二十萬衆一戰棄之何面目復見天子帥讀曰率復扶又翻且公不見高仙芝封常清乎謂軍敗必誅也事見上卷上年翰不可欲下馬歸仁以毛縶其足於馬腹及諸將不從者皆執之以東將即亮翻下同會賊將田乾真已至遂降之俱送洛陽降戶江翻安祿山問翰曰汝常輕我事見二百十六卷天寶十一載翰伏地對曰臣肉眼不識聖人今天下未平李光弼在常山李祗在東平李祗即謂吳王祗炅古迥翻陛下留臣使以尺書招之不日皆下矣祿山大喜以翰為司空同平章事謂火拔歸仁曰汝叛主不忠不義執而斬之翰以書招諸將皆復書責之祿山知不效乃囚諸苑中東都苑中也於是河東華陰馮翊上洛防禦使皆棄郡走河東郡蒲州華陰郡華州馮翊郡同州上洛郡商州華戶化翻是日翰麾下來告急上不時召見見賢遍翻但遣李福德等將監牧兵赴潼關及暮平安火不至六典唐鎮戍烽候所至大率相去三十里每日初夜放煙一炬謂之平安火時守兵已潰無人復舉火壬辰召宰相謀之楊國忠自以身領劍南聞安祿山反即令副使崔圓陰具儲偫以備有急投之相息亮翻令力丁翻使疏吏翻偫直里翻至是首唱幸蜀之策上然之癸巳國忠集百官於朝堂惶懅流涕朝直遙翻下同懅巨魚翻急也問以策略皆唯唯不對唯于癸翻國忠曰人告祿山反狀已十年上不之信今日之事非宰相之過仗下朝罷則左右三衞立仗者皆休下不知所之市里蕭條國忠使韓虢入宮勸上入蜀甲午百官朝者什無一二上御勤政樓下制云欲親征聞者皆莫之信以京兆尹魏方進為御史大夫兼置頓使京兆少尹靈昌崔光遠為京兆尹充西京留守將軍邊令誠掌宮闈管鑰託以劍南節度大使潁王璬將赴鎮令本道設儲偫璬公了翻偫直里翻是日上移仗北內唐都長安以太極宮為西內大明宮為東內興慶宮為南內北內當在玄武門內又以地望言之則自興慶宮移仗歸大明宮興慶宮在南大明宮在北故亦謂大明宮為北內考異曰幸蜀記上遣中使曹仙領千人擊鼓於春明門外又令燒閑广既草積煙焰燎天上將乘馬楊國忠諫以為當謹守宗祧不可輕動韋見素力爭以為賊勢逼近人心不固陛下不可不出避狄國忠暗與賊通其言不可聽往返數四上乃從見素議加魏方進御史大夫充前路知頓使按賊陷潼關鑾輿將出人心已危豈有更擊鼓燒草以驚之國忠久蓄幸蜀之謀見素乃其所引豈得上前有此爭論此蓋宋巨欲歸功見素事乃近誣今不取命龍武大將軍陳玄禮整比六軍比毗寐翻厚賜錢帛選閑广既馬九百餘匹外人皆莫之知乙未黎明上獨與貴姊妹皇子主皇孫楊國忠韋見素魏方進陳玄禮及親近宦官宮人出延秋門延秋門唐長安禁苑之西門也程大昌雍祿有漢唐要地參出圖唐禁苑西北包漢長安故城未央宮唐後改為通光殿西出即延秋門考異曰幸蜀記云丙申百官尚赴朝此乙未日事宋巨誤也皆委之而去上過左藏藏徂浪翻楊國忠請焚之曰無為賊守上愀然曰賊來不得必更斂於百姓不如與之無重困吾赤子史記玄宗有君人之言愀子小翻斂力贍翻百官猶有入朝者至宮門猶聞漏聲三衞立仗儼然唐朝會之制三衞番上分為五仗號衙內五衞一曰供奉仗以左右衞為之二曰親仗以親衞為之三曰勳仗以勳衞為之四曰翊仗以翊衞為之五曰散手仗以親勳翊衞為之平明傳點畢內門開百官入立班皇帝升御坐金吾將軍一人奏左右廂內外平安通事舍人贊宰相兩省官再拜升殿內謁者承旨喚仗左右羽林將軍勘以木契自東西閤而入朝罷皇帝步入東序門然後放仗內外仗隊七刻乃下常參輟朝日六刻即下則宮人亂出中外擾攘不知上所之於是王公士民四出逃竄山谷細民爭入宮禁及王公第舍盜取金寶或乘驢上殿又焚左藏大盈庫崔光遠邊令誠帥人救火帥讀曰率又募人攝府縣官分守之殺十餘人乃稍定光遠遣其子東見祿山令誠亦以管鑰獻之上過便橋楊國忠使人焚橋上曰士庶各避賊求生柰何絕其路留內侍監高力士使撲滅乃來玄宗始置內侍監秩三品以高力士及袁思藝為之撲普卜翻告諭郡縣置頓食時至咸陽望賢宮咸陽縣在京城西四十里望賢宮在縣東中使徵召吏民莫有應者日向中上猶未食楊國忠自市胡餅以獻胡餅今之蒸餅高似孫曰胡餅言以胡麻著之也崔鴻前趙錄石虎諱胡改胡餅曰麻餅緗素雜記曰有鬻胡餅者不曉名之所謂易其名曰爐餅以為胡人所啗故曰胡餅也糲盧達翻粗也雜以麥豆皇孫輩爭以手掬食之須臾而盡猶未能飽考異曰唐曆至望賢頓御馬病上曰殺此馬拆行宮舍木煮食之衆不忍食幸蜀記至望賢宮行從皆飢上入宮憩於樹下怫然若有棄海內之意高力士覺之遂抱上足嗚咽開諭上乃止肅宗實錄楊國忠自入市衣袖中盛餬餅獻上皇天寶亂離記六月十一日大駕幸蜀至望賢宮官吏奔竄迨曛黑百姓有稍稍來者上親問之卿家有飯否不擇精粗但且將來老幼於是競擔挈壺漿雜之以麥子飯送至上前先給兵士六宮及皇孫已下咸以手掬而食頃時又盡猶不能飽既乏器用又無釭燭從駕者枕藉寢止長幼莫之分別賴月入戶庭上與六宮皇孫等差異焉按上九日幸蜀溫畬云十一日非也餘則兼采之慰勞之勞力到翻衆皆哭上亦掩泣有老父郭從謹進言曰祿山包藏禍心固非一日亦有詣闕告其謀者陛下往往誅之事見上卷上年致陛下播越是以先王務延訪忠良以廣聰明蓋為此也臣猶記宋璟為相數進直言天下賴以安平為于偽翻數所角翻自頃以來在廷之臣以言為諱惟阿諛取容是以闕門之外陛下皆不得而知草野之臣必知有今日久矣但九重嚴邃區區之心無路上達事不至此臣何由得睹陛下之面而訴之乎上曰此朕之不明悔無所及慰諭而遣之俄而尚食舉御膳而至尚主也主御膳之官有奉御有直長而一作以從才用翻下時從同然後食之令軍士散詣村落求食期未時皆集而行夜將半乃至金城金城縣屬京兆本始平縣中宗景龍二年送金城公主降吐蕃至此更名金城在京城西八十五里縣民皆脫身走飲食器皿具在士卒得以自給時從者多逃內侍監袁思藝亦亡去驛中無燈人相枕藉而寢貴賤無以復辨枕即任翻藉慈夜翻復扶又翻王思禮自潼關至始知哥舒翰被擒以思禮為河西隴右節度使即令赴鎮收合散卒以俟東討丙申至馬嵬驛金人疆域圖馬嵬驛在京兆興平縣皆憤怒陳玄禮以禍由楊國忠欲誅之因東宮宦者李輔國以告太子太子未決會吐蕃使者二十餘人遮國忠馬訴以無食國忠未及對軍士呼曰國忠與胡虜謀反或射之中鞍國忠走至西門內馬嵬驛之西門也呼火故翻射而亦翻中竹仲翻屠割支體以槍揭其首於驛門外幷殺其子戶部侍郎暄及韓國秦國夫人御史大夫魏方進曰汝曹何敢害宰相衆又殺之韋見素聞亂而出為亂兵所檛腦血流地衆曰勿傷韋相公救之得免軍士圍驛上聞諠譁問外何事左右以國忠反對上杖屨出驛門慰勞軍士令收隊軍士不應上使高力士問之玄禮對曰國忠謀反貴不宜供奉願陛下割恩正法上曰朕當自處之處昌呂翻入門倚杖傾首而立久之京兆司錄韋諤前言曰京兆府司錄參軍正七品上武德初改州主簿曰錄事參軍掌正違失涖符印開元元年改曰司錄今衆怒難犯引左傳鄭子產之言願陛下速決因叩頭流血上曰貴常居深宮安知國忠反謀高力士曰貴誠無罪然將士已殺國忠而貴在陛下左右豈敢自安願陛下審思之將士安則陛下安矣將即亮翻下同上乃命力士引貴於佛堂縊殺之輿尸寘驛庭召玄禮等入視之玄禮等乃免冑釋甲頓首請罪上慰勞之勞力到翻令曉諭軍士玄禮等皆呼萬歲再拜而出於是始整部伍為行計諤見素之子也國忠妻裴柔裴柔故蜀倡也皆走至陳倉縣令薛景仙帥吏士追捕誅之帥讀曰率下同丁酉上將發馬嵬朝臣惟韋見素一人乃以韋諤為御史中丞充置頓使朝直遙翻使疏吏翻將士皆曰國忠謀反其將吏皆在蜀不可往或請之河隴或請之靈武或請之太原之往也上意在入蜀慮違衆心竟不言所向韋諤曰還京當有禦賊之備今兵少未易東向易以豉翻不如且至扶風徐圖去就考異曰幸蜀記曰上意將幸西蜀有中使常清奏曰國忠久在劍南又諸將吏或有連謀慮遠防微須深詳議中官陳全節奏曰太原城池固莫之比可以久處請幸北京中官郭希奏曰朔方地近被帶山河鎮遏之雄莫之與比以臣愚見不及朔方中使駱承休奏曰姑臧一郡嘗霸中原秦隴河蘭皆足徵取且巡隴右駐蹕涼州翦彼鯨鯢事將取易左右各陳其意見者十餘輩高力士在側而無言上顧之曰以卿之意何道堪行力士曰太原雖固地與賊鄰本屬祿山人心難測朔方近塞半是蕃戎不達朝章卒難教馭西涼懸遠沙漠蕭條大駕順動人馬非少先無備擬必有闕供賊騎起來恐見狼狽劍南雖窄土富人繁表裏江山內外險固以臣所料蜀道可行上然之即除韋諤御史中丞充置頓使今從唐曆衆以為然乃從之及行父老皆遮道請留曰宮闕陛下家居陵寢陛下墳墓今捨此欲何之上為之按轡久之乃令太子於後宣慰父老父老因曰至尊既不肯留某等願帥子弟從殿下東破賊取長安帥讀曰率若殿下與至尊皆入蜀使中原百姓誰為之主須臾衆至數千人太子不可曰至尊遠冒險阻吾豈忍朝夕離左右離力智翻且吾尚未面辭當還白至尊更稟進止涕泣跋馬欲西還從宣翻跋馬者勒馬使回轉也跋蒲撥翻建寧王倓倓徒甘翻與李輔國執鞚諫曰逆胡犯闕四海分崩不因人情何以興復今殿下從至尊入蜀若賊兵燒絕棧道鞚苦貢翻棧士限翻則中原之地拱手授賊矣人情既離不可復合雖欲復至此其可得乎復扶又翻又音如字不如收西北守邊之兵召郭李於河北與之併力東討逆賊克復兩京削平四海使社稷危而復安宗廟毀而更存掃除宮禁以迎至尊豈非孝之大者乎何必區區溫凊為兒女之戀乎記曰凡為人子冬溫而夏凊昏定而晨省凊七政翻考異曰舊宦者傳李靖忠啟太子請留張良娣贊成之按太子獨還宣慰百姓良娣不在旁何以得贊成留計今不取天寶亂離記大駕至岐州上取褒斜路幸蜀儲皇取彭原路抵靈武此誤也俶昌六翻父老共擁太子馬不得行太子乃使俶馳白上上總轡待太子久不至使人偵之偵丑鄭翻還白狀上曰天也乃分後軍二千人及飛龍广既馬從太子仗內六广既飛龍广既為最上乘馬太子仁孝可奉宗廟汝曹善輔佐之將即亮翻又諭太子曰汝勉之勿以吾為念西北諸胡吾撫之素厚汝必得其用太子南向號泣而已上已南邁而太子留在後故南向號泣號戶刀翻張良娣在軍中自此搆建寧之禍太子不受俶倓皆太子之子也至德元載己亥上至岐山岐山縣在扶風郡東北後周天和四年割涇州鶉觚縣之南界置三龍縣隋開皇十六年移於岐山南十里改為岐山縣大業九年移於今縣東北八里唐武德元年移於岐陽縣界張堡壘七年移理龍尾驛城貞觀八年又移理石者驛上遽過宿扶風郡士卒潛懷去就往往流言不遜陳玄禮不能制上患之會成都貢春綵十餘萬匹至扶風上命悉陳之於庭召將士入臨軒諭之曰朕比來衰耄比毗至翻託任失人致逆胡亂常須遠避其鋒知卿等皆蒼猝從朕不得別父母妻子茇涉至此草行為茇水行為涉朕甚愧之蜀路阻長郡縣褊小人馬衆多或不能供今聽卿等各還家朕獨與子孫中官前行入蜀亦足自達今日與卿等訣別可共分此綵以備資糧若歸見父母及長安父老為朕致意為于偽翻各好自愛也因泣下霑襟衆皆哭曰臣等死生從陛下不敢有貳上良久曰去留聽卿自是流言始息玄宗於此有楚昭王去國諭父老之意然玄宗之為是言也出於不得已至德元載太子既留莫知所適廣平王俶曰日漸晏此不可駐衆欲何之皆莫對建寧王倓曰殿下昔嘗為朔方節度大使事見二百十三卷開元十五年倓略識其姓名今河西隴右之衆皆敗降賊將即亮翻降戶江翻父兄子弟多在賊中或生異圖朔方道近士馬全盛裴冕衣冠名族必無貳心時裴冕為河西行軍司馬未暇徇地乘此速往就之徐圖大舉此上策也衆皆曰善至渭濱遇潼關敗卒誤與之戰死傷甚衆已乃收餘卒擇渭水淺處乘馬涉渡無馬者涕泣而返太子自奉天北上文明元年分京兆之醴泉始平好畤武功豳州之永壽縣置奉天縣以奉乾陵在長安西北一百五十里上時掌翻比必寐翻及也通夜馳三百里士卒器械失亡過半所存之衆不過數百新平太守薛羽棄郡走太子斬之是日至安定太守徐瑴亦走又斬之新平郡豳州安定郡涇州守手又翻下同瑴訖岳翻至德元載庚子以劍南節度留後崔圓為劍南節度等副大使辛丑上發扶風宿陳倉至德元載太子至烏氏彭原太守李遵出迎烏氏漢縣故墟在彭原東南據舊書烏氏驛名康曰是年改烏氏曰保定余按保定縣本漢安定縣唐為涇州治所在彭原西一百二十里保定縣固是此年更名然非烏氏之地彭原郡寧州本北地郡天寶元年更郡名氏音支至彭原募士得數百人是日至平涼糗去久翻平涼郡原州閱監牧馬得數萬匹又募士得五百餘人軍勢稍振至德元載壬寅上至散關散關在陳倉縣西南散蘇旱翻從才用翻將即亮翻下同使潁王璬先行詣劍南璬公了翻考異曰肅宗實錄七月景寅上皇入劍門幸普安郡命潁王璬先入蜀今從玄宗實錄康駢劇談錄上至駱谷山登高望遠嗚咽流涕謂高力士曰吾昔若取九齡語不到此命中使往韶州祭之按玄宗入蜀不自駱谷康駢誤也舊張九齡傳曰上皇在蜀思張九齡之先覺下詔贈司徒仍遣就韶州致祭按其詔乃德宗贈九齡司徒詔也張九齡事迹云建中元年七月詔舊傳誤也壽王瑁等分將六軍以次之瑁莫報翻將同上音又音如字丙午上至河池郡河池郡鳳州具陳蜀土豐稔甲兵全盛上大悅即日以圓為中書侍郎同平章事蜀郡長史如故以隴西公瑀為漢中王梁州都督山南西道采訪防禦使瑀璡之弟也長知兩翻瑀音禹使疏吏翻璡則鄰翻汝陽王璡寧王憲之嫡長子至德元載王思禮至平涼聞河西諸胡亂還詣行在初河西諸胡部落聞其都護皆從哥舒翰沒於潼關故爭自立相攻擊而都護實從翰在北岸不死又不與火拔歸仁俱降賊降戶江翻上乃以河西兵馬使周泌為河西節度使隴右兵馬使彭元耀為隴右節度使泌薄必翻考異曰肅宗實錄即位之日以泌為河西耀為隴右節度使或者玄宗已命以二鎮二人至靈武見肅宗又加新命乎唐曆作周祕今從玄宗實錄與都護思結進明等俱之鎮突厥之皋蘭州興昔府思結之蹛林州金水州賀蘭州盧山府皆羈屬河西又隴右道有突厥州三府二十七以思禮為行在都知兵馬使至德元載戊申扶風民康景龍等自相帥擊賊所署宣慰使薛總斬首二百餘級庚戌陳倉令薛景仙殺賊守將克扶風而守之帥讀曰率將即亮翻下同至德元載安祿山不意上遽西幸遣使止崔乾祐兵留潼關凡十日乃遣孫孝哲將兵入長安考異曰肅宗實錄祿山事迹惟載七月丁卯己巳祿山害諸主諸書皆無賊入長安之日惟亂離記云六月二十三日孫孝哲等攻陷長安害諸主皇孫七月一日祿山遣殿中御史張通儒為西京留守此書多牴牾不足為據然以月日計之賊以六月八日破潼關其入長安必在此月內矣新傳云賊不謂天子能遽去駐兵潼關十日乃西行時已至扶風按玄宗十六日至扶風縣十七日至扶風郡若賊駐潼關十日則於時未能至長安也又云祿山使張通儒守東京田乾真為京兆尹又云祿山未至長安士人皆逃入山谷㣥不逞剽左藏大盈庫百司帑藏竭乃火其餘祿山至怒乃大索三日按舊傳通儒為西京留守徧檢諸書祿山自反後未嘗至長安新傳誤也崔光遠為京兆尹使安忠順嚴忠順改守忠將兵屯苑中以鎮關中此西京苑中也尤用事常與嚴莊爭權祿山使監關中諸將監工銜翻通儒等皆受制於孝哲孝哲豪侈果於殺戮賊黨畏之祿山命搜捕百官宦者宮女等每獲數百人輒以兵衞送洛陽王侯將相扈從車駕家留長安者誅及嬰孩從才用翻陳希烈以晚節失恩怨上與張均張垍等皆降於賊陳希烈以罷相失職張均張垍恨不大用故皆降賊自餘朝士皆授以官於是賊勢大熾西脅隴南侵江漢北割河東之半得扶風則西脅隴圍南陽則南侵江漢崔乾祐乘潼關之捷北取河東口堅翻既克長安以為得志日夜縱酒專以聲色寶賄為事無復西出之意復扶又翻下始復同故上得安行入蜀太子北行亦無追迫之患至德元載李光弼圍博陵未下聞潼關不守解圍而南史思明踵其後光弼擊卻之與郭子儀皆引兵入井陘留常山太守王俌將景城河間團練兵守常山俌音甫平盧節度使劉正臣將襲范陽未至史思明引兵逆擊之正臣大敗棄妻子走士卒死者七千餘人初顏真卿聞河北節度使李光弼出井陘即斂軍還平原以待光弼之命聞郭李西入井陘真卿始復區處河北軍事處昌呂翻至德元載太子至平涼數日朔方留後杜鴻漸六城水陸運使魏少遊朔方所統有三受降城及豐安定遠振武三城皆在黃河外靈鹽二州皆有鹽池故置判官平涼散地非屯兵之所靈武兵食完富靈武郡靈州朔方節度使治所北收諸城兵西發河隴勁騎南向以定中原此萬世一時也乃使涵奉牋於太子且籍朔方士馬甲兵穀帛軍須之數以獻之涵至平涼太子大悅會河西司馬裴冕入為御史中丞至平涼見太子亦勸太子之朔方太子從之鴻漸暹之族子杜暹開元中為相道之曾孫也道永安王孝基兄子嗣孝基後葺次舍庀資儲庀卑婢翻具也自迎太子於平涼北境說太子曰朔方天下勁兵處也今吐蕃請和回紇內附說輸芮翻紇下沒翻四方郡縣大抵堅守拒賊以俟興復殿下今理兵靈武按轡長驅移檄四方收攬忠義則逆賊不足屠也少遊盛治宮室帷帳皆倣禁中飲膳備水陸秋七月辛酉太子至靈武悉命撤之史言肅宗以此成興復之功至德元載甲子上至普安普安郡劍州見賢遍翻上之發長安也㣥臣多不知至咸陽謂高力士曰朝臣誰當來誰不來對曰張均張垍父子受陛下恩最深且連戚里謂垍尚主也垍其冀翻時論皆謂房琯宜為相而陛下不用琯古緩翻相息亮翻又祿山嘗薦之恐或不來上曰事未可知及琯至上問均兄弟對曰臣帥與偕來逗遛不進觀其意似有所蓄而不能言也帥讀曰率逗音豆上顧力士曰朕固知之矣即日以琯為文部侍郎同平章事天寶十一載改刑部曰憲部吏部曰文部初張垍尚寧親公主寧親公主自興信徙封上女也寵渥無比陳希烈求解政務事見上卷天寶十三載問可為相者垍未對上曰無若愛壻垍降階拜舞既而不用故垍懷怏怏上亦覺之怏於兩翻是時均垍兄弟及姚崇之子尚書右丞奕蕭嵩之子兵部侍郎華韋安石之子禮部侍郎陟太常少卿斌皆以才望至大官上嘗曰吾命相當徧舉故相子弟耳既而皆不用自初張垍以下史皆追敍前事斌音彬至德元載裴冕杜鴻漸等上太子牋請遵馬嵬之命即皇帝位太子不許上時掌翻嵬五回翻冕等言曰將士皆關中人日夜思歸所以崎嶇從殿下遠涉沙塞者冀尺寸之功若一朝離散不可復集願殿下勉徇衆心為社稷計牋五上將即亮翻復扶又翻上時掌翻太子乃許之是日肅宗即位於靈武城南樓㣥臣舞蹈上流涕歔欷自此以後凡書上者皆謂肅宗也歔音虛欷許既翻又音希赦天下改元至是方改天寶十四載為至德元載裴冕為中書侍郎同平章事改關內采訪使為節度使徙治安化以前蒲關防禦使呂崇賁為之關內采訪使以京官領無治所今改為節鎮治安化領京兆同岐金商五州安化縣本隋之弘化縣天寶元年更名併更慶州弘化郡為安化郡蒲關即蒲津關使疏吏翻兼防禦使隴右節度使郭英乂為天水太守兼防禦使守式又翻天水郡秦州惟餘老弱守邊文武官不滿三十人披草萊立朝廷制度草創武人驕慢大將管崇嗣在朝堂背闕而坐言笑自若監察御史李勉奏彈之朝直遙翻將即亮翻背蒲妹翻監工銜翻繫於有司上特原之歎曰吾有李勉朝廷始尊勉元懿之曾孫也鄭王元懿高祖之子歸附者漸衆張良娣性巧慧能得上意從上來朔方時從兵單寡娣大計翻時從才用翻良娣每寢常居上前上曰禦寇非婦人所能良娣曰蒼猝之際妾以身當之殿下可從後逸去至靈武產子三日起縫戰士衣上止之對曰此非妾自養之時上以是益憐之為良娣挾寵竊權得禍張本良娣秩正三品至德元載丁卯上皇制以太子亨充天下兵馬元帥領朔方河東河北平盧節度都使南取長安洛陽甲子太子即位於靈武丁卯上皇下此制蓋道里相去遼遠蜀中未之知也帥所類翻使疏吏翻隴西郡司馬劉秩試守右庶子隴西郡渭州劉秩必房琯所薦以少府監竇紹為之傅璘離珍翻黔音琴少始照翻長沙太守李峴為都副大使節度都副大使也領江南東路及淮南河南等路節度都使以前江陵都督府長史劉彙為之傳廣陵郡長史李成式為都副大使廣陵郡揚州仍領河西隴右安西北庭等路節度都使以隴西太守濟陰鄧景山為之傅充都副大使諸道各有節度使以諸王為都使以統之其不赴鎮者都副大使攝統濟子禮翻並於當路自供其諸路本節度使虢王巨等並依前充使依前為節度使也並任自簡擇署訖聞奏時琦珙皆不出閤惟璘赴鎮為璘舉兵作亂張本領襄陽等九郡領襄州襄陽郡鄧州南陽郡隨州漢東郡唐州淮安郡均州武當郡房州房陵郡安州安陸郡金州安康郡商州上洛郡領南海等二十二郡升五溪經略使為黔中節度領黔中等諸郡註見上年黔音琴東道領餘杭西道領豫章等諸郡餘杭郡杭州豫章郡洪州莫知上所之及是制下始知乘輿所在先悉薦翻守式又翻乘繩證翻彙秩之弟也至德元載安祿山使孫孝哲殺霍國長公主霍國長公主睿宗女下嫁裴虛己長知兩翻刳其心以祭安慶宗安慶宗誅見上卷上年惡烏路翻凡八十三人或以鐵棓揭其腦蓋棓蒲項翻人顖門有骨蓋其上謂之腦蓋今方書所云天靈蓋即其物流血滿街己巳又殺皇孫及郡縣主二十餘人至德元載庚午上皇至巴西太守崔渙迎謁隆州巴西郡先天二年避上皇諱更名閬州天寶元年更名閬中郡更綿州金山郡曰巴西郡考異曰肅宗實錄作辛未今從玄宗實錄次柳氏舊聞上始入斜谷天尚早煙霧甚昧知頓使給事中韋倜於墅中得新熟酒一壺跪獻于馬首者數四上不為之舉倜懼乃注于他器自引滿於前上曰卿以我為疑也始吾御宇之初嘗大醉損一人吾悼之因以為戒迨今四十年矣未嘗甘酒味指力士近臣曰此皆知之非紿卿也從者聞之無不感悅幸蜀記上皇在巴西郡宰臣請高力士奏蜀中氣候溫瘴宜數進酒上皇令高力士宣旨曰朕本嗜酒斷之已久終不再飲深愧卿等意也力士因說上皇開元四年因醉怒殺一人明日都不記得猶召之左右具奏上愴然不言乃賜御庫絹五百匹用給喪事更令力士就宅宣旨致祭從茲斷酒雖下藥亦不輒飲按玄宗荒于聲色幾喪天下斷酒小善夫何足言今不取悅之房琯復薦之復扶又翻即日拜門下侍郎同平章事以韋見素為左相渙玄暐之孫也中宗之復辟也崔玄暐之功列於五王至德元載初京兆李泌幼以才敏著聞玄宗使與忠王遊忠王為太子泌已長長知兩翻上書言事玄宗欲官之不可使與太子為布衣交太子常謂之先生楊國忠惡之奏徙蘄春蘄春郡蘄州惡烏路翻居潁陽武后載初元年分河南伊闕嵩陽置武臨縣開元十五年更名潁陽屬河南府遣使召之謁見於靈武考異曰舊傳云謁見於彭原今從泌子繁所為鄴侯家傳云即位八九日矣見賢遍翻出則聯轡寢則對榻如為太子時事無大小皆咨之言無不從至於進退將相亦與之議上欲以泌為右相泌固辭曰陛下待以賓友則貴於宰相矣何必屈其志上乃止考異曰舊傳泌稱山人固辭官秩得以散官寵之得當作特解褐拜銀青光祿大夫俾掌樞務鄴侯家傳曰初欲拜為右相恐戎事固辭爵願以客從曰陛下待以賓友則貴於宰相矣何必屈其志上無以逼今從之至德元載同羅突厥從安祿山反者屯長安苑中甲戌其酋長阿史那從禮帥五千騎竊广既馬二千匹逃歸朔方帥讀曰率下同騎奇寄翻謀邀結諸胡盜據邊地上遣使宣慰之降者甚衆考異曰肅宗實錄忽聞同羅突厥背祿山走投朔方與六州㣥胡共圖河朔諸將皆恐上曰因之招諭當益我軍威上使宣慰果降者過半舊崔光遠傳云同羅背祿山以广既馬二千出至滻水孫孝哲安神威從而召之不得神威憂死陳翃汾陽王家傳云祿山多譎詐更謀河曲熟蕃以為己屬使蕃將阿史那從禮領同羅突厥五千騎偽稱叛乃投朔方出塞門說九姓府六胡州悉已來矣甲兵五萬部落五十萬蟻聚於經略軍北按同羅叛賊則當西出豈得復至滻水此舊傳誤也若祿山使從禮偽叛則孝哲何故召之神威何為怖死又必須先送降款於肅宗如此則諸將當喜而不恐賊之陰計豈徒取河曲熟蕃也蓋同羅等久客思歸故叛祿山欲乘世亂結諸胡據邊地耳肅宗錄所謂共圖河朔者欲據河朔西方兩道猶言河隴也肅宗從而招之必有降者若云太半則似太多今參取諸書可信者存之至德元載賊遣兵寇扶風薛景仙擊卻之至德元載安祿山遣其將高嵩以敕書繒綵誘河隴將士大震關使郭英乂擒斬之大震關在隴州源縣西隴山繒慈陵翻誘音酉至德元載同羅突厥之逃歸也長安大擾官吏竄匿獄囚自出京兆尹崔光遠以為賊且遁矣遣吏卒守孫孝哲宅孝哲以狀白祿山光遠乃與長安令蘇震帥府縣官十餘人來奔府京兆府也縣長安萬年己卯至靈武上以光遠為御史大夫兼京兆尹使之渭北招集吏民考異曰天寶亂離記祿山以張通儒為西京留守通儒素憚侍中苗公晉卿內史崔公光遠二人並偽於通儒處請復本職通儒許之由是微申存撫兩街百姓長安稍見寧帖密宣諭人主蒼惶西幸之意老幼對泣悲不自勝皆感恩旨苗公乘驢間道赴蜀奔駕光遠亦潛去焉通儒素憚兩公名德內特寬之按舊苗晉卿傳潛遁山谷南投金州未嘗受賊官今不取震王褱之孫也蘇王褱事武后中睿三朝歷位台輔侍御史呂諲右拾遺楊綰奉天令安平崔器相繼詣靈武以諲器為御史中丞綰為起居舍人知制誥唐制誥皆中書舍人掌之以他官掌制誥者謂之知制誥諲音因上命河西節度副使李嗣業將兵五千赴行在考異曰段秀實別傳曰詔嗣業將安西五萬衆赴行在今從舊傳且緩師以觀變綏德府折衝段秀實讓嗣業曰豈有君父告急而臣子晏然不赴者乎特進常自謂大丈夫今日視之乃兒女子耳據新書秀實自大堆府果毅遷綏德府折衝李嗣業以戰功散階轉至特進故稱之即白宰如數發兵以秀實自副將之詣行在上又徵兵於安西行軍司馬李栖筠發精兵七千人勵以忠義而遣之至德元載敕改扶風為鳳翔郡至德元載庚辰上皇至成都從官及六軍至者千三百人而已從才用翻至德元載令狐潮圍張巡於雍丘相守四十餘日是年五月令狐潮再攻雍丘潮聞玄宗已幸蜀復以書招巡復扶又翻下後復敢復同有大將六人官皆開府特進白巡以兵勢不敵且上存亡不可知不如降賊巡陽許諾明日堂上設天子畫像帥將士朝之將即亮翻帥讀曰率朝直遙翻人人皆泣巡引六將於前責以大義斬之士心益勸城中矢盡巡縛藳為人千餘被以黑衣夜縋城下潮兵爭射之被皮義翻縋馳偽翻射而亦翻下弩射同久乃知其藳人得矢數十萬其後復夜縋人復扶又翻下同賊笑不設備乃以死士五百斫潮營潮軍大亂焚壘而遁追奔十餘里潮慚益兵圍之巡使郎將雷萬春於城上與潮相聞章十二行本聞下有語未絕三字乙十一行本同孔本同張校同退齋校同賊弩射之面中六矢而不動中竹仲翻潮疑其木人使諜問之乃大驚諜達協翻遙謂巡曰向見雷將軍方知足下軍令矣然其如天道何巡謂之曰君未識人倫焉知天道言叛君附賊未識君臣之倫也焉於乾翻出戰幾居豈翻擒賊將十四人斬首百餘級賊乃夜遁收兵入陳留不敢復出頃之賊步騎七千餘衆屯白沙渦九域志開封中牟縣有白沙鎮杜預曰梁國寧陵縣北沙陽亭春秋之沙隨地也大破之還至桃陵司馬彪郡國志東郡燕縣有桃城燕縣唐為滑州胙城縣悉擒之分別其衆別彼列翻媯檀及胡兵悉斬之滎陽陳留脅從兵皆散令歸業媯州漢潘縣地檀州漢白檀縣地續書云白檀縣即右北平考異曰張中丞傳自三月二日潮至雍丘城下攻守六十餘日潮大敗而走然則於時已五月初矣又云未幾潮又帥衆來攻謂巡曰本朝危蹙兵不出關則是潼關未破也又巡答潮書主上緣哥舒被衂幸于西蜀孝義皇帝收河隴之馬取太原之甲蕃漢雲集不減四十萬衆前月二十七日已到土門蜀漢之兵吳楚驍勇循江而下永王申王部統已到申息之南門竊料胡虜遊魂終不臘矣則是七月十五日丁卯以後也其曰前月二十七日兵到土門蓋圍城中傳聞之誤也又云相守四十餘日潮收兵入陳留不敢出其下乃云五月魯炅敗於葉六月哥舒翰敗於潼關上皇幸蜀皇帝北巡靈武六月九日賊將瞿伯玉據圉城十二日賊屯白沙渦十四日夜巡襲破之七月十二日潮伯玉至雍丘又破之其日月前後差舛不可考蓋李翰亦得於傳聞不能精審今但置關破以前事於五月關破以後事於七月耳民去賊來歸者萬餘戶至德元載河北諸郡猶為唐守為于偽翻常山太守王俌欲降賊諸將怒因擊毬縱馬踐殺之時信都太守烏承恩麾下有朔方兵三千人諸將遣使者宗仙運帥父老詣信都迎承恩鎮常山承恩辭以無詔命仙運說承恩曰說式芮翻常山地控燕薊路通河洛有井陘之險足以扼其咽喉頃屬車駕南遷咽音煙屬之欲翻南遷謂自長安南幸蜀也蜀在長安南山之南李大夫收軍退守晉陽李大夫謂光弼也欲舉城降賊衆心不從身首異處大將軍兵精氣肅遠近莫敵若以家國為念移據常山與大夫首尾相應則洪勳盛烈孰與為比若疑而不行又不設備常山既陷信都豈能獨全承恩不從仙運又曰將軍不納鄙夫之言必懼兵少故也今人不聊生咸思報國競相結聚屯據鄉村若懸賞招之不旬日十萬可致與朔方甲士三千餘人相參用之足成王事若捨要害以授人居四通而自安言信都之地夷庚四達非可居之以自安取敗之道也承恩竟疑不決承恩承玼之族兄也烏承玼見二百十三卷開元二十年玼音此又且禮翻考異曰韓愈烏氏先廟碑云承恩承洽之兄今從新傳是月史思明蔡希德將兵萬人南攻九門旬日九門偽降伏甲於城上思明登城伏兵攻之思明墜城鹿角傷其左脅夜奔博陵至德元載顏真卿以蠟丸達表於靈武以真卿為工部尚書兼御史大夫依前河北招討采訪處置使幷致赦書亦以蠟丸達之真卿頒下河北諸郡處昌呂翻下遐嫁翻又遣人頒於河南江淮由是諸道始知上即位於靈武徇國之心益堅矣至德元載郭子儀等將兵五萬自河北至靈武靈武軍威始盛人有興復之望矣八月壬午朔以子儀為武部尚書靈武長史以李光弼為戶部尚書北都留守武后天授元年以太原為北都中宗神龍元年罷開元十一年復置天寶元年曰北京是年復曰北都餘如故光弼以景城河間兵五千赴太原先是河東節度使王承業軍政不脩朝廷遣侍御史崔衆交其兵尋遣中使誅之衆侮易承業先悉薦翻易弋豉翻光弼素不平至是敕交兵於光弼衆見光弼不為禮又不時交兵光弼怒收斬之軍中股栗考異曰肅宗實錄八月壬午子儀光弼皆於常山郡嘉山大破賊子儀等俱奉詔領士馬五萬至自河北以子儀為某官光弼為某官汾陽家傳六月八日破史思明於嘉山之下公謂光弼曰賊散矣其餘幾何可長驅而南以定天下其月發恆陽至常山中使邢延恩至奉詔取河北路席卷而南會哥舒翰敗績玄宗幸蜀肅宗如朔方公聞之獨總精兵五萬奔肅宗行在玄宗有誥以肅宗嗣皇帝位肅宗奉誥歔欷哀不自勝公諫云云跪上天子璽以七月十三日即皇帝位二十七日制可武部尚書平章事幸蜀記六月十一日玄宗追郭子儀赴京李光弼守太原河洛春秋六月二十五日大破賊於嘉山二十六日覆陳二十七日有詔至恆陽云潼關失守駕幸劍南儲君又往靈武由是拔軍入井陘口邠志六月八日敗史思明于嘉山會潼關失守二公班師唐曆七月二十八日子儀光弼並加平章事又詔子儀收軍赴朔方光弼赴太原河洛春秋又云光弼至太原殺王承恩固守晉陽舊紀與實錄同子儀傳七月肅宗即位以賊據兩京方謀收復詔子儀班師八月子儀與光弼帥步騎五萬至自河北光弼傳肅宗理兵於靈武遣中使劉智達追光弼子儀赴行在又云以景城河間之卒五千赴太原玄宗實錄六月壬午光弼子儀破史思明於嘉山舊紀六月癸未朔庚寅哥舒翰敗於靈寶其日光弼破史思明於嘉山子儀光弼傳皆云六月無日諸書言李郭事不同如此按歲朔曆六月癸未朔與舊紀同玄宗實錄云壬午誤也肅宗實錄八月壬午朔日也子儀光弼皆於嘉山大破賊領士馬至自河北以為某官某官蓋壬午乃拜官日因言已前事耳汾陽家傳邠志皆云六月八日破思明與舊紀同家傳云勸肅宗即位上璽則恐不然哥舒翰以六月八日敗亦須旬日方傳至河北肅宗七月十三日即位若六月二十七日班師七月十三日豈能便達靈武也河洛春秋二十五日破賊與諸書皆不合恐太後也今據舊玄宗紀汾陽家傳邠志唐曆皆云六月八日破史思明宜可從幸蜀記十一日玄宗召子儀光弼事或如此但二傳皆云肅宗召之恐是二人在河北聞潼關不守已收軍赴難在道遇肅宗中使遂趨靈武今從舊傳唐曆拜相在七月二十八日汾陽家傳二十七日肅宗實錄八月一日三書皆不相遠子儀傳云八月雖無日與實錄亦略相應今從實錄據舊傳光弼亦曾到靈武疑朔方兵盡從肅宗故光弼但領河北兵赴太原耳河洛春秋月日尤疏所云殺王承恩固守晉陽必誤也至德元載回紇可汗吐蕃贊普相繼遣使請助國討賊宴賜而遣之至德元載癸未上皇下制赦天下考異曰玄宗實錄舊紀皆云八月癸未朔肅宗實錄唐曆舊紀長曆皆云壬午朔今從之是時上皇尚未知太子即位於靈武北海太守賀蘭進明遣錄事參軍第五琦入蜀奏事琦言於上皇以為今方用兵財賦為急財賦所產江淮居多乞假臣一職可使軍無乏用上皇悅即以琦為監察御史江淮租庸使開元十一年宇文融除句當租庸地稅使此租庸使之始也其後韋堅楊國忠相繼為之至德元載史思明再攻九門辛卯克之所殺數千人引兵東圍藳城至德元載李庭望將蕃漢二萬餘人東襲寧陵襄邑夜去雍丘城三十里置營張巡帥短兵三千掩擊大破之殺獲太半庭望收軍夜遁至德元載癸巳靈武使者至蜀七月甲子即位至是凡三十日使者方至蜀吾兒應天順人吾復何憂復扶又翻下不復同丁酉制自今改制敕為誥表疏稱太上皇四海軍國事皆先取皇帝進止仍奏朕知俟克復上京朕不復預事己亥上皇臨軒命韋見素房琯崔渙奉傳國寶玉冊詣靈武傳位考異曰肅宗實錄癸未上奉表至蜀玄宗實錄八月癸未朔赦天下時皇太子已至靈武七月甲子即位道路險止表疏未達及下是詔數日北使方至具陳㣥臣懇請太子辭避之旨辛卯下詔稱太上皇庚子遣韋見素等奉冊今從舊紀唐曆至德元載辛丑史思明陷藳城至德元載初上皇每酺宴先設太常雅樂坐部立部繼以鼓吹胡樂教坊府縣散樂雜戲太常雅樂唐初祖孝孫張文收所定樂也玄宗分樂為二部堂下立奏謂之立部伎堂上坐奏謂之坐部伎立部八一安舞二太平樂三破陣樂四慶善樂五大定樂六上元樂七聖壽樂八光聖樂坐部六一燕樂二長壽樂三天授樂四鳥歌萬歲樂五龍池樂六小破陣樂鼓吹鼓吹署令所掌鐃歌鼓吹曲也胡樂者龜茲疏勒高昌天竺諸部樂也教坊者內教坊及棃園法曲也府縣者京兆府及長安萬年兩赤縣散樂雜戲也酺音蒲山車者車上施棚閣加以綵繒為山林之狀陸船者縛竹木為船形飾以繒綵列人於中舁之以行玄宗時河西節度使楊敬述獻霓裳羽衣曲十二遍凡曲終必遽惟霓裳羽衣曲終引聲益緩俚俗相傳以為帝遊月宮見素娥數百舞于廣庭帝記其曲歸製霓裳羽衣舞非也銜盃上壽帝以馬百匹盛飾分左右施三重榻舞傾盃數十曲壯士舉榻馬不動劉昫曰帝即內广既引蹀馬三十匹為傾杯樂曲奮首鼓尾縱橫應節又施三層板牀乘馬而上抃轉而舞或拜或舞五坊使引大象入場或拜或舞動容鼓旅中於音律安祿山見而悅之既克長安命搜捕樂工運載樂器舞衣驅舞馬犀象皆詣洛陽臣光曰聖人以道德為麗仁義為樂樂音洛故雖茅茨土階惡衣菲食不恥其陋惟恐奉養之過以勞民費財明皇恃其承平不思後患殫耳目之玩窮聲技之巧技渠綺翻自謂帝王富貴皆不我如欲使前莫能及後無以踰非徒娛己亦以誇人豈知大盜在旁已有窺窬之心卒致鑾輿播越生民塗炭卒子恤翻乃知人君崇華靡以示人適足為大盜之招也至德元載祿山宴其㣥臣於凝碧池唐六典洛陽禁苑中有芳樹金谷二亭凝碧之池棃園弟子往往歔欷泣下棃園弟子見二百十一卷開元二年睨五計翻衺視也樂工雷海清不勝悲憤勝音升擲樂器於地西向慟哭祿山怒縛於試馬殿前支解之祿山聞嚮日百姓乘亂多盜庫物既得長安命大索三日索山客翻幷其私財盡掠之又令府縣推按銖兩之物無不窮治治直之翻連引搜捕支蔓無窮民間騷然益思唐室自上離馬嵬北行離力智翻民間相傳太子北收兵來取長安長安民日夜望之或時相驚曰太子大軍至矣則皆走市里為空賊望見北方塵起輒驚欲走京畿豪傑往往殺賊官吏遙應官軍誅而復起復扶又翻相繼不絕賊不能制其始自京畿鄜坊至于岐隴皆附之至是西門之外率為敵壘西門謂長安城西門也南不出武關北不過雲陽雲陽縣漢屬馮翊後魏屬北地郡隋以來屬京兆武功縣漢晉屬扶風隋唐屬京兆之往也上津漢漢中長利縣地梁置南洛州後魏改曰上州隋廢州為上津縣唐屬商州皆薛景仙之功也至德元載九月壬子史思明圍趙郡丙辰拔之又圍常山旬日城陷殺數千人至德元載建寧王倓性英果有才略從上自馬嵬北行兵衆寡弱屢逢寇盜倓自選驍勇居上前後血戰以衞上上或過時未食倓悲泣不自勝軍中皆屬目向之過古禾翻又古臥翻勝音升屬之欲翻下所屬同上欲以倓為天下兵馬元帥使統諸將東征帥所類翻統他綜翻將即亮翻李泌曰建寧誠元帥才然廣平兄也若建寧功成豈可使廣平為吳太伯乎上曰廣平冢嗣也泌毗必翻嗣祥吏翻何必以元帥為重泌曰廣平未正位東宮今天下艱難衆心所屬在於元帥若建寧大功既成陛下雖欲不以為儲副同立功者其肯已乎太宗上皇即其事也謂皆以有定天下功承大統諸將皆以屬焉考異曰鄴侯家傳曰以李光弼為元帥左廂兵馬使出井陘以攻常山圖范陽郭子儀為右廂兵馬使帥衆南取馮翊河東按汾陽家傳時郭子儀方北討同羅未向河東也鄴侯家傳又曰上召光弼子儀議征討計二人有遷延之言上大怒作色叱之二人皆仆地不畢詞而罷上告公曰二將自偏裨一年遇國家有難朕又即位於此遂至三公將相看已有驕色商議征討欲遷延適來叱之皆倒方圖克復而將已驕朕深憂之朕今委先生戎事府中議事宜示以威令使其知懼對曰陛下必欲使畏臣二人未見廣平伏望令王亦暫至府二人至時寒臣與飲酒二人必請謁王臣因為酒令約不起王至但談笑共臣同慰安酒散乃諭其脩謁於元帥則二人見元帥以帝子之尊俯從臣酒令可以知陛下方寵任臣軍中之令必行他時或失律能死生之也上稱善又奏曰伏望言於廣平知是聖意欲李郭之畏臣非臣敢恃恩然也上曰廣平於卿豈有形迹對曰帝子國儲以陛下故親臣臣何人敢不懼明日將曉王亦至及李郭至具軍容脩敬乃坐飲二人因言未見元帥乃使報王王將至執盞為令並不得起及王至先公曰適有令許二相公不起王曰寡人不敢遽就座飲李郭失色談笑皆歡先公云二人起謝廣平曰先生能為二相公如此復何憂寡人亦盡力今者同心成宗社大計以副聖意既出李謂郭曰適來飲令非行軍意皆上旨也欲令吾徒禀令耳按肅宗溫仁二公沈勇必無面叱仆地之事今不取謝泌曰此固倓之心也上與泌出行軍行下孟翻軍士指之竊言曰衣黃者聖人也衣白者山人也衣於既翻下且衣同上聞之以告泌曰艱難之際不敢相屈以官且衣紫袍以絕㣥疑泌不得已受之服之入謝上笑曰既服此豈可無名稱稱尺證翻出懷中敕以泌為侍謀軍國元帥府行軍長史創侍謀之官以處泌上曰朕非敢相臣以濟艱難耳俟賊平任行高志泌乃受之置元帥府於禁中俶入則泌在府泌入俶亦如之泌又言於上曰諸將畏憚天威在陛下前敷陳軍事或不能盡所懷萬一小差為害甚大乞先令與臣及廣平熟議臣與廣平從容奏聞從千容翻可者行之不可者已之上許之時軍旅務繁四方奏報自昏至曉無虛刻上悉使送府泌先開視有急切者及烽火重封隔門通進重直龍翻凡宮禁官府門側置輪盤或遇夜門已閉外有急切文書納諸輪盤旋轉向內以通之餘則待明禁門鑰契悉委俶與泌掌之為泌請還鑰契張本至德元載阿史那從禮說誘九姓府六胡州諸胡數萬衆聚於經略軍北時九姓胡皆居河曲猶各帶舊置府號按舊書李吉甫傳經略軍唐末之宥州是也天寶移經略軍於靈州城內以宥州寄治經略軍元和九年遂於經略軍故城置宥州六胡州於郭下置延恩縣宋白曰經略軍在夏州西北三百里天寶中王忠嗣奏於榆多勒城置軍今屬靈武去靈武六百餘里說式芮翻上命郭子儀詣天德軍發兵討之天德軍在大同川天寶十二年安思順奏廢橫塞軍請於大同城西築城置軍玄宗賜名天安軍乾元後改為天德軍東南至中受降城二百里西渡河至豐州百六十里西至西受降城百八十里北至磧口三百里西北至橫塞軍二百里考異曰汾陽家傳云甲兵五萬部落五十萬今從舊子儀傳汾陽家傳又云九月十九日駕欲幸彭原命公赴天德軍伐叛蕃按實錄戊辰行幸彭原戊辰十七日也汾陽傳誤兵敗降之既而復逃歸懷恩叱而斬之玢方貧翻復扶又翻將士股栗無不一當百遂破同羅上雖用朔方之衆欲借兵於外夷以張軍勢張知亮翻以豳王守禮之子承寀為敦煌王與僕固懷恩使于回紇以請兵又發拔汗那兵且使轉諭城郭諸國北狄逐水草為行國西域諸國皆有城郭故謂之城郭諸國使從安西兵入援李泌勸上且幸彭原俟西北兵將至進幸扶風以應之於時庸調亦集調徒弔翻可以贍軍上從之戊辰發靈武至德元載內侍邊令誠復自賊中逃歸復扶又翻上斬之至德元載丙子上至順化上改慶州安化郡為順化郡奉上寶冊上不肯受曰比以中原未靖權總百官豈敢乘危遽為傳襲㣥臣固請上不許寘寶冊於別殿朝夕事之如定省之禮禮記凡為人子者昏定而晨省奉上時掌翻比毗至翻省悉景翻事見上卷天寶十三載十四載素聞房琯名虛心待之琯見上言時事辭情慷慨上為之改容為于偽翻由是軍國事多謀於琯琯亦以天下為己任知無不為章十二行本為下有專決於胸臆五字乙十一行本同孔本同張校同退齋校同諸相拱手避之至德元載上皇賜張良娣七寶鞍李泌言於上曰今四海分崩當以儉約示人良娣不宜乘此請撤其珠玉付庫吏以俟有戰功者賞之良娣自閤中言曰鄉里之舊何至於是良娣母家新豐泌居京兆故云然先生為社稷計也遽命撤之建寧王倓泣於廊下聲聞於上聞音問上驚召問之對曰臣比憂禍亂未已比毗至翻今陛下從諫如流不日當見陛下迎上皇還長安是以喜極而悲耳良娣由是惡李泌及倓為良娣譖殺倓泌不自安張本惡烏路翻下亦惡同上嘗從容與泌語及李林甫欲敕諸將克長安發其冢焚骨揚灰泌曰陛下方定天下柰何讎死者彼枯骨何知徒示聖德之不弘耳李林甫動搖東宮見二百十五卷天寶五載六載從千容翻若聞此舉恐阻其自新之心上不悅曰此賊昔日百方危朕當是時朕弗保朝夕朕之全特天幸耳林甫亦惡卿但未及害卿而死耳柰何矜之對曰臣豈不知章十二行本知下有所以言者四字乙十一行本同孔本同張校同退齋校同上皇有天下向五十年太平娛樂一朝失意遠處巴蜀惡烏路翻樂音洛處昌呂翻南方地惡上皇春秋高聞陛下此敕意必以為用韋之故廢韋事亦見二百十五卷天寶五載萬一感憤成疾是陛下以天下之大不能安君親言未畢上流涕被面被皮義翻降階仰天拜曰朕不及此是天使先生言之也遂抱泌頸泣不已他夕上又謂泌曰良娣祖母昭成太后之妹也上皇所念玄宗幼失昭成后母視良娣祖母鞠愛篤備帝即位封為鄧國夫人其子去逸生良娣泌毗必翻娣大計翻何如對曰陛下在靈武以㣥臣望尺寸之功故踐大位非私己也至於家事宜待上皇之命不過晚歲月之間耳上從之史言李泌能引君當道至德元載南詔乘亂陷越巂會同軍據清溪關越巂郡巂州會同軍當在越巂會川縣當瀘津關要路清溪關在大定城北考異曰唐曆是月吐蕃陷巂州新傳是歲閤羅鳳乘釁取巂州會同軍云云蓋二國兵共陷巂州也新書尋傳蠻俗無絲纊跣履荊棘不以為苦射豪豬生食其肉戰以竹籠頭如兜鍪驃古朱波也在永昌南二千里去京師萬四千里南屬海北南詔驃匹妙翻降戶江翻容肇祖標點何茲全顧頡剛聶崇岐覆校
