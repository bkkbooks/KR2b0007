body:
  text: 資治通鑑卷第一百七端明殿學士兼翰林侍讀學士右諫議大夫充集賢殿修撰權判西京留司御史臺上柱國河內郡開國侯食邑一千三百戶食實封四百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注晉紀二十九烈宗孝武皇帝中之下太元十二年丁亥三八七春正月乙巳以朱序為青兗二州刺史代謝玄鎮彭城序求鎮淮陰許之序求鎮淮陰以燕方強必進取河南彭城去建康道遠聲援不接故也優玄以內地也會工外翻丁未大赦燕主垂觀兵河上韋昭曰觀示也陳兵以示威武觀古玩翻溫詳之徒皆白面儒生烏合為㣥徒恃長河以自固若大軍濟河必望旗震壞不待戰也垂從之戊午遣鎮北將軍蘭汗護軍將軍平幼於碻磝西四十里濟河隆以大衆陳於北岸陳讀曰陳溫攀溫楷果走趣城蓋趣東阿城也趣七喻翻大破之詳夜將妻子奔彭城其衆三萬餘戶皆降於燕降戶江翻垂以太原王楷為兗州刺史鎮東阿初垂在長安秦王堅嘗與之交手語章十二行本語下有垂出二字乙十一行本同孔本同退齋校同冗從僕射光祚言於堅曰冗而隴翻從才用翻陛下頗疑慕容垂乎垂非久為人下者也堅以告垂及秦主丕自鄴奔晉陽事見上卷十年祚從苻丕在鄴見上卷九年奕之子也封奕仕燕燕興於昌黎奕有力焉見一百五卷九年詔以祚等為河北諸郡太守皆營於濟北濮陽濟北濮陽二郡濟子禮翻濮博木翻師古曰言羈縻屬之而已俱詣燕軍降降戶江翻垂赦之撫待如舊垂見光祚流涕沾襟襟音今曰秦王待我深吾事之亦盡但為二公猜忌二公謂長樂公丕平原公暉也事見一百五卷九年中宵不寐祚亦悲慟垂賜祚金帛祚固辭垂曰卿猶復疑邪復扶又翻祚曰臣昔者惟知忠於所事不意陛下至今懷之臣敢逃其死垂曰此乃卿之忠固吾所求也前言戲之耳用孔子語以為中常侍光祚秦之宦者故處以此官翟遼遣其子釗寇陳潁朱序遣將軍秦膺擊走之秦主登立毛氏為皇后勃海王懿為太弟后興之女也遣使拜東海王纂為使持節都督中外諸軍事太師領大司馬封魯王使疏吏翻纂弟師奴為撫軍大將軍並州牧封朔方公纂怒謂使者曰勃海王先帝之子南安王何以不立而自立乎長史王旅諫曰南安已立理無中改今寇虜未滅不可宗室之中自為仇敵也纂乃受命於是盧水胡彭沛穀屠各董成張龍世新平羌雷惡地等皆附於纂有衆十餘萬以登纂連兵聲勢浸盛故相與歸之屠直於翻後秦主萇徙秦州豪傑三萬戶于安定去年萇徙安定民以實長安今又徙秦州豪傑以實安定蓋萇起兵以安定為根本而欲都長安故因道里遠近為次以漸徙之初安次人齊涉聚衆八千餘家據新柵降燕安次縣前漢屬勃海後漢屬廣陽國晉屬燕國新柵蓋在魏郡界降戶江翻既而復叛連張願願自帥萬餘人進屯祝阿之甕口祝阿縣漢屬平原郡晉屬濟南郡願自泰山進屯焉劉昫曰齊州禹城縣漢祝阿縣天寶元年更名宋白曰祝阿猶東阿也古祝國黃帝之後按古東阿齊為東阿漢為祝阿縣故城在今豐齊縣東北二里唐改禹城復扶又翻帥讀曰率甕烏貢翻共應涉高陽王隆言於垂曰新柵堅固攻之未易猝拔易以豉翻若久頓兵於其城下張願擁帥流民西引丁零丁零謂翟遼帥讀曰率願衆雖多然皆新附未能力鬬因其自至宜先擊之願父子恃其驍勇驍堅堯翻必不肯避去可一戰擒也願破則涉不能自存矣垂從之二月遣范陽王德陳留王紹龍驤將軍張崇驤思將翻帥步騎二萬會隆擊願軍至斗城去甕口二十餘里解鞍頓息願引兵奄至燕人驚遽德兵退走隆勒兵不動願子龜出衝陳陳讀曰陳隆遣左右王末逆擊斬之隆徐進戰願兵乃退德行里餘復整兵還與隆合復扶又翻謂隆曰賊氣方鋭宜且緩之隆曰願乘人不備宜得大捷而吾士卒皆以懸隔河津勢迫之故人思自戰言兵為河津所隔前有強敵退則溺死故思之而各自為戰也今賊不得利氣竭勢衰皆有進退之志不能齊奮宜亟擊之德曰吾唯卿所為耳遂進戰於甕口大破之斬首七千八百級願脫身保三布口燕人進軍歷城歷城縣自漢以來屬濟南郡降戶江翻垂以陳留王紹為青州刺史鎮歷城德等還師新柵人冬鸞執涉送之果如慕容隆所料唐韻冬姓也餘悉原之三月秦主登以竇衝為南秦州牧楊定為益州牧楊壁為司空梁州牧乞伏國仁為大將軍大單于苑川王杜佑曰苑川在蘭州五泉縣近大小榆谷余謂杜佑以意言之單音蟬燕上谷人王敏殺太守封戢代郡人許謙逐太守賈閏各以郡附劉顯為燕擊劉顯張本燕樂浪王溫為尚書右僕射燕下當有以字樂浪音洛琅夏四月戊辰尊帝母李氏為皇太儀服如太后後秦征西將軍姚碩德為楊定所逼退守涇陽涇陽縣前漢屬安定郡後漢晉省秦屬隴東郡杜佑曰漢涇陽縣在今平涼郡界涇陽故城是戰于涇陽碩德大敗後秦主萇自陰密救之纂退屯敷陸陰密縣屬安定郡殷時密國也敷陸唐坊州鄜城縣即其地燕主垂自碻磝還中山慕容柔慕容盛慕容會來自長子柔等去年自長子逃歸今始達中山庚子章十二行本子作辰乙十一行本同孔本同張校同退齋校同垂為之大赦喜子孫得全而東歸故為之肆赦為于偽翻長子人情如何為可取乎盛曰西軍擾擾人有東歸之志陛下唯當修仁政以俟之耳若大軍一臨必投戈而來若孝子之歸慈父也垂悅癸未封柔為陽平王盛為長樂公樂音洛會為清河公高平人翟暢執太守徐含遠以郡降翟遼降戶江翻燕主垂謂諸將曰遼以一城之衆反覆三國之間三國謂晉及燕西燕五月以章武王宙監中外諸軍事監工銜翻輔太子寶守中山垂自帥諸將南攻遼帥讀曰率下同以太原王楷為前鋒都督遼衆皆燕趙之人聞楷至皆曰太原王子吾之父母也楷父恪相燕燕趙之人懷之故云然遼懼遣使請降垂以遼為徐州牧封河南公前至黎陽受降而還降戶江翻井陘人賈鮑井陘縣屬常山郡陘音刑夜襲中山陷其外郭章武王宙以奇兵出其外太子寶鼓譟於內合擊大破之盡俘其衆唯遙鮑單馬走免劉顯地廣兵強雄於北方會其兄弟乖爭魏長史張袞言於魏王圭曰顯志在並吞今不乘其內潰而取之奴真肺埿相繼來降故云然然吾不能獨克請與燕共攻之圭從之復遣安同乞師於燕去年魏遣安同乞師於燕以破窟咄故此言復復扶又翻詔徵會稽處士戴逵會工外翻處昌呂翻逵纍辭不就郡縣敦逼不已逵逃匿于吳謝玄上疏曰逵自求其志論語曰隱居以求其志將罹風霜之患陛下既已愛而器之亦宜使其身名並存請絶召命帝許之玄為會稽內史故為逵上疏彖之兄也戴彖見一百四卷四年秦主登以其兄同成為司徒守尚書令封潁川王弟廣為中書監封安成王子崇為尚書左僕射封東平王燕主垂自黎陽還中山吳深殺燕清河太守丁國章武人王祖殺太守白欽勃海人張申據高城以叛高城縣屬勃海郡賢曰高城故城在今滄州鹽山縣南苑川王國仁帥騎三萬襲鮮卑大人密貴裕苟提倫三部于六泉密貴為一部裕苟為一部提倫為一部六泉在高平帥讀曰率騎奇寄翻七月與沒奕干金熙戰于渴渾川據載記國仁襲三部而沒奕干金熙連兵襲國仁故遇戰于渴渾川其地當在天水勇士縣東北三部皆降降戶江翻秦主登軍于瓦亭後秦主萇攻彭沛穀堡拔之穀奔杏城彭沛穀盧水胡也立堡於二縣杜佑曰杏城在坊州西以太子興鎮長安燕趙王麟討王敏于上谷斬之劉衛辰獻馬於燕劉顯掠之燕主垂怒遣太原王楷將兵助趙王麟擊顯大破之將即亮翻顯奔馬邑西山魏王圭引兵會麟擊顯於彌澤按魏書帝紀彌澤在馬邑南顯奔西燕麟悉收其部衆獲馬牛羊以千萬數劉顯滅而拓跋氏強矣為慕容氏計者莫若兩利而俱存之可以無他日亡國之禍呂光將彭晃徐炅攻張大豫于臨洮破之張大豫奔臨洮見上卷上年洮土刀翻王穆奔建康八月廣武人執大豫送姑臧斬之穆襲據酒泉自稱大將軍涼州牧辛巳立皇子德宗為太子大赦燕主垂立劉顯弟可泥為烏桓王以撫其衆徙八千餘落于中山秦馮翊太守蘭櫝帥衆二萬自頻陽入和寧頻陽縣秦厲公置自漢以來屬馮翊應劭曰在頻水之陽據載記和寧在嶺北杏城之東南帥讀曰率纂弟師奴勸纂稱尊號纂不從師奴殺纂而代之櫝遂與師奴絶西燕主永攻櫝櫝章十二行本櫝下有遣使二字乙十一行本同孔本同張校同請救於後秦後秦主萇欲自救之尚書令姚旻左僕射尹緯曰苻登近在瓦亭將乘虛襲吾後萇曰苻登衆盛非旦夕可制嚴制改至登遲重少決必不能輕軍深入比兩月間比必寐翻及也吾必破賊而返登雖至無能為也九月萇軍于泥源漢書地理志北地郡有泥陽縣應劭注云泥水出郁郅北蠻中大敗亡奔鮮卑後秦盡收其衆屠各董成等皆降苻纂兄弟既敗苻登之勢孤矣屠直於翻秦主登進據胡空堡秦屯騎校尉胡空所築堡也在新平界夏戶雅翻冬十月翟遼復叛燕復扶又翻下同遣兵與王祖張申寇抄清河平原抄楚交翻後秦主萇進擊西燕王永於河西西燕王當作西燕主此龍門至華陰河之西也蘭櫝復列兵拒守萇攻之十二月禽櫝遂如杏城後秦姚方成攻秦雍州刺史徐嵩壘拔之執嵩而數之雍於用翻數所具翻嵩罵曰汝姚萇罪當萬死符黃眉欲斬之先帝止之謂穆帝升平元年姚襄敗時也榮寵極矣曾不如犬馬識所養之恩親為大逆謂殺秦王堅於新平佛寺也何不速殺我章十二行本我下有早見先帝取姚萇於地下治之十二字乙十一行本同孔本同張校同退齋校同方成怒三斬嵩三斬者斬其足斬其腰斬其頸也以妻子賞軍後秦主萇掘秦主堅尸鞭撻無數剝衣倮形薦之以棘坎土而埋之堅葬於徐嵩胡空二壘之間徐嵩之壘既陷故姚萇得掘墓鞭尸以逞其忿倮郎果翻薦藉也涼州大飢米斗直錢五百人相食死者太半呂光西平太守康寧自稱胸奴王殺湟河太守強禧以叛西平郡東漢之末分金城置唐之鄯州即其地也湟河郡河西張氏置蓋亦在鄯州界內強其兩翻東結康寧西通王穆光欲自擊晃諸將皆曰今康寧在南伺釁而動伺相吏翻若晃穆未誅康寧復至復扶又翻進退狼狽勢必大危光曰實如卿言然我今不往是坐待其來也若三寇連兵三寇謂康寧彭晃王穆則城外皆非吾有大事去矣今晃初叛與寧穆情契未密出其倉猝取之差易耳易以豉翻乃自帥騎三萬帥讀曰率騎奇寄翻倍道兼行既至攻之二旬拔其城誅晃初王穆起兵遣使招敦煌處士郭瑀使疏吏翻敦徒門翻處昌呂翻瑀歎曰今民將左袵吾忍不救之邪乃與同郡索嘏起兵應穆索昔各翻運粟三萬石以餉之穆以瑀為太府左長史軍師將軍嘏為敦煌太守既而穆聽讒言引兵攻嘏瑀諫不聽出城大哭舉手謝城曰吾不復見汝矣復扶又翻還而引被覆面覆敷又翻不與人言不食而卒卒子恤翻呂光聞之曰二虜相攻此成禽也不可以憚屢戰之勞而失永逸之機也一勞永逸古語有之克之進屯涼興涼興郡河西張氏置在唐瓜州常樂縣界未至衆潰穆單騎走騂馬令郭文斬其首送之騂馬縣屬酒泉郡蓋魏晉間所置也騂思榮翻呂光新得河西黨叛於內敵攻於外雖數戰數勝而根本不固宜不足以貽子孫也十三年戊子三八八春正月康樂獻武公謝玄卒樂音洛康樂縣屬豫章郡二月秦主登軍朝那朝那縣自漢以來屬安定郡此武都亦當在安定界五代志朝那縣西魏置安武郡安武漢舊縣名武都之名當是因安武而名翟遼遣司馬眭瓊詣燕謝罪眭姓也師古息隨翻類篇宜為翻燕主垂以其數反覆斬瓊以絶之數所角翻遼乃自稱魏天王改元建光置百官燕青州刺史陳留王紹為平原太守辟閭渾所逼退屯黃巾固漢末黃巾保聚於其地因以為名齊人謂壘堡為固紹自歷城退屯焉其地在濟南郡章丘城北渾蔚之子也辟閭蔚見一百卷穆帝永和十二年蔚紆忽翻據齊地來降後辟閭渾為慕容德所殺降戶江翻三月乙亥燕主垂以太子寶録尚書事授之以政自總大綱而已燕趙王麟擊許謙破之去年許謙叛燕附劉顯遂廢代郡悉徙其民於龍城呂光之定涼州也杜進功居多光以為武威太守事見上卷十年㣥僚莫及光甥石聰自關中來光問之曰中州人言我為政何如聰曰但聞有杜進耳不聞有舅光由是忌進而殺之光與㣥寮宴語及政事參軍京兆段業曰明公用法太峻光曰吳起無恩而楚強商鞅嚴刑而秦興業曰起喪其身鞅亡其家皆殘酷之致也吳起事見一卷周安王十五年商鞅事見二卷顯王三十一年喪息浪翻景行堯舜詩曰高山仰止景行行止毛萇曰景大也鄭玄曰景明庶幾古人有高德者則慕仰之有明行者則而行之行下孟翻乃慕起鞅之為治治直吏翻豈此州士女所望哉光改容謝之沮渠蒙遜兄弟舉兵所以推段業為重亦由此言為涼州人士所歸敬也夏四月戊午以朱序為都督司雍梁秦四州諸軍事雍州刺史戍洛陽雍於用翻以譙王恬代序為都督兗冀幽並章十二行本並下有四州二字乙十一行本同孔本同諸軍事青兗二州刺史苑川王國仁破鮮卑越質叱黎於平襄平襄縣漢屬天水郡晉屬略陽郡越質蓋鮮卑部落之號後以為氏丁亥燕主垂立夫人段氏為皇后以太子寶領大單于單音蟬段氏右光祿大夫儀之女其妹適范陽王德儀寶之舅也為後寶逼殺段后張本段氏死見一百卷穆帝升平二年五月秦太弟懿卒諡曰獻哀翟遼徙屯滑臺遼自黎陽徙屯滑臺既與燕絶欲阻河為固也滑臺城在白馬縣西春秋鄭廩延邑也唐為滑州六月苑川王乞伏國仁卒諡曰宣烈廟號烈祖其子公府尚幼㣥下推國仁弟乾歸為大都督大將軍大單于河南王時乞伏氏跨有涼州河南之地遂為國號為後公府殺乾歸張本單音蟬改元太初魏王圭破庫莫奚於弱落水南新唐書曰奚亦東胡種為胸奴所破保烏丸山漢曹操斬踏頓蓋其後也弱落水即饒樂水在奚中七月庫莫奚復襲魏營復扶又翻圭又破之庫莫奚者本屬宇文部與契丹同類而異種其先皆為燕王皓所破徙居松漠之間契丹國自西樓東去四十里至真珠寨又東行地勢漸高西望松林鬱然數十里遂入平川契欺訖翻洪邁曰契丹之讀如喫惟新唐書有音種章勇翻秦後秦自春相持屢戰互有勝負至是各解歸關西豪桀以後秦久無成功多去而附秦河南王乾歸立其妻邊氏為王后置百官倣漢制以南川侯出連乞都為丞相出連亦以部落之號為氏金城邊芮為左長史東秦州刺史祕宜為右長史乞伏氏置東秦州於南安勍渠京翻略陽王松壽為主簿從弟軻彈為梁州牧弟益州為秦州牧屈眷為河州牧乞伏乾歸所置州牧不過分居河隴之間從才用翻八月秦主登立子崇為皇太子辨為南安王尚為北海王燕護軍將軍平幼會章武王宙討吳深破之深走保繹幕繹幕縣自漢以來屬清河郡魏王圭陰有圖燕之志遣九原公儀奉使至中山燕主垂詰之曰使疏吏翻詰去吉翻魏王何以不自來儀曰先王與燕並事晉室世為兄弟魏與燕皆鮮卑種也拓跋力微與慕容涉歸並事晉室於理未失垂曰吾今威加四海豈得以昔日為比儀曰燕若不修德禮欲以兵威自強此乃將帥之事將即亮翻帥所類翻非使臣所知也儀還言於圭曰燕主衰老太子暗弱范陽王自負材氣是時慕容德在燕宗室中固自有與人不同者少詩照翻燕主既沒內難必作難乃旦翻於時乃可圖也今則未可圭善之為後魏攻燕張本圭母弟嚴母弟改從父翰之子也九月河南王乾歸遷都金城張申攻廣平王祖攻樂陵壬午燕高陽王隆將兵討之冬十月後秦主萇還安定秦主登就食新平帥衆萬餘圍萇營帥讀曰率四面大哭萇命營中哭以應之登乃退十二月庚子尚書令南康襄公謝石卒燕太原王楷趙王麟將兵會高陽王隆於合口水經衡漳水過勃海建成縣又東左會呼沱別河故瀆又東北入清河謂之合口魏收地形志曰浮陽縣西接漳水衡水入焉今謂之合口王祖帥諸壘共救之帥讀曰率夜犯燕軍燕人逆擊走之隆欲追之楷麟曰王祖老賊或恐詐而設伏不如俟明隆曰此白地㣥盜烏合而來徼幸一決徼堅堯翻非素有約束能一其進退也今失利而去衆莫為用乘勢追之不過數里可盡擒也申之所恃唯在於祖祖破則申降矣降戶江翻下同乃留楷麟守申壘隆與平幼分道擊之比明比必利翻及也大獲而還懸所獲之首以示申甲寅申出降祖亦歸罪秦以潁川王同成為太尉同成秦主登之兄十四年己丑三八九春正月燕以陽平王柔鎮襄國遼西王農在龍城五年庶務修舉乃上表曰臣頃因征即鎮農誅餘巖擊高句麗因鎮龍城見上卷十年青徐荊雍遺寇尚繁雍於用翻願時代還展竭微效生無餘力沒無遺恨臣之志也庚申燕主垂召農為侍中司隸校尉以高陽王隆為都督幽平二州諸軍事征北大將軍幽州牧建留臺於龍城以隆録留臺尚書事又以護軍將軍平幼為征北長史散騎常侍封孚為司馬散悉亶翻騎奇寄翻並兼留臺尚書隆因農舊規修而廣之遼碣遂安遼碣謂遼水碣石碣其謁翻後秦主萇以秦戰屢勝謂得秦王堅之神助亦於軍中立堅像而禱之曰臣兄襄敕臣復讎穆帝升平元年姚襄為秦所殺見上卷十年非臣罪也苻登陛下疏屬猶欲復讎況臣敢忘其兄乎且陛下命臣以龍驤建業見一百五卷八年驤思將翻今為陛下立像為于偽翻陛下勿追計臣過也秦主登升樓遙謂萇曰為臣弒君而立像求福庸有益乎因大呼曰呼火故翻弒君賊姚萇何不自出吾與汝決之萇不應久之以戰未有利軍中每夜數驚數所角翻乃斬像首以送秦秦主登以河南王乾歸為大將軍大單于金城王單音蟬甲寅魏王圭襲高車破之二月呂光自稱三河王呂光字世明光時有涼州河西之地未能兼有三河也改元麟嘉置百官光妻石氏子紹弟德世自仇池來至姑臧長安之亂呂光之家奔仇池依楊氏紹為世子癸巳魏王圭擊吐突鄰部於女水女水在弱落水西去平城三千餘里後魏顯祖改曰武川盡徙其部落而還秦主登留輜重於大界大界當在安定新平之間重直用翻克之將即亮翻騎奇寄翻保當作堡夏四月翟遼寇滎陽執太守張卓燕以長樂公盛鎮薊城修繕舊宮燕主俊初自龍城徙都薊有舊宮在焉樂音洛薊音計五月清河民孔金斬吳深送首中山吳深反事始上卷十一年金城王乾歸擊侯年部大破之於是秦涼鮮卑羌胡多附乾歸乾歸悉授以官爵後秦主萇與秦主登戰數敗數所角翻乃遣中軍將軍姚崇襲大界登邀擊之於安丘魏收地形志安定陰盤縣有安城敗補邁翻燕范陽王德趙王麟擊賀訥追奔至勿根山訥窮迫請降降戶江翻徙之上谷質其弟染干於中山質音致秋七月以驃騎長史王忱為荊州刺史都督荊益寧三州諸軍驃匹妙翻騎奇寄翻忱是壬翻忱國寶之弟也秦主登攻後秦右將軍吳忠等於平涼克之八月登據苟頭原以逼安定諸將勸後秦主萇決戰萇曰與窮寇競勝兵家之忌也吾將以計取之乃留尚書令姚旻守安定夜帥騎三萬帥讀曰率下同襲秦輜重于大界克之重戰輕防此苻登所以敗也重直用翻章十二行本王下有辨北海王四字乙十一行本擠刻字數同孔本同張校同尚尚秦主登之子也驅掠男女五萬餘口而還毛氏美而勇善騎射後秦兵入其營毛氏猶彎弓跨馬帥壯士數百人章十二行本人作力乙十一行本同孔本同張校同戰衆章十二行本衆上有殺七百餘人五字乙十一行本同孔本同張校同退齋校同寡不敵為後秦所執萇將納之毛氏罵且哭曰姚萇汝先已殺天子謂殺秦王堅也皇天后土寧汝容乎萇殺之諸將欲因秦軍駭亂擊之萇曰登衆雖亂怒氣猶盛未可輕也遂止兵勝者驕兵怒者奮以奮乘驕則先敗而後勝者多矣姚萇見兵勢所以收衆而止萇使姚碩德鎮安定徙安定千餘家于陰密遣其弟征南將軍靖鎮之九月庚午以左僕射陸納為尚書令秦主登之東也後秦主萇使姚碩德置秦州守宰以從弟常戍隴城從才用翻隴城縣漢屬天水郡晉省此時當屬略陽郡邢奴戍冀城姚詳戍略陽楊定攻隴冀克之斬常執邢奴詳棄略陽奔陰密定自稱秦州牧隴西王秦因其所稱而授之冬十月秦主登以竇衝為大司馬都督隴東諸軍事雍州牧雍於用翻楊定為左丞相都督中外諸軍事秦梁二州牧章十二行本牧下有楊壁為都督隴右諸軍事南秦益二州牧十六字孔本同張校同按乙十一行本亦脫約共攻後秦又約監河西諸軍事并州刺史楊政都督河東諸軍事冀州刺史楊楷各帥其衆會長安帥讀曰率下同政楷皆河東人秦主丕既敗政楷收集流民數萬戶政據河西楷據湖陝之間遣使請命於秦登因而授之大界既陷苻登之兵勢衰矣故約竇衝等共攻後秦陝式冉翻使疏吏翻燕樂浪悼王溫為冀州刺史燕冀州刺史治信都樂浪音洛琅何承天姓苑有故姓帳謂帳下章十二行本正作帳下帳上有為溫二字乙十一行本擠刻均同孔本同張校同乙酉刺溫殺之刺七亦翻並其長史司馬驅帥守兵二百戶奔西燕燕遼西王農邀擊刺溫者於襄國盡獲之惟堤走免十一月枹罕羌彭奚念附於乞伏乾歸以奚念為北河州刺史枹罕舊為河州治所乞伏氏先於境內置河州以屈眷為牧故以枹罕為北河州以奚念為刺史枹音膚初帝既親政事太元元年崇德太后歸政帝始親政事有人主之量已而溺於酒色委事於琅邪王道子道子亦嗜酒日夕與帝以酣歌為事又崇尚浮屠窮奢極費所親昵者皆姏姆僧尼昵尼質翻姏姑三翻老女稱姆莫補翻女師也又音茂左右近習爭弄權柄交通請託賄賂公行官賞濫雜刑獄謬亂尚書令陸納望宮闕歎曰好家居纖兒欲撞壞之邪撞丈降翻纖者小之至言為纖兒謂不及小兒也左衛領營將軍會稽許營以左衛將軍領營兵是為左衛領營將軍許營一作榮今臺府局吏直衛武官及僕隸婢兒取母之姓者官婢私合而生子不能審知其父取母之姓為姓皆得為郡守縣令或帶職在內及僧尼乳母競進親黨又受貨賂輒臨官領衆政教不均暴濫無罪禁令不明劫盜公行昔年下書敕㣥下盡規而衆議兼集無所採用臣聞佛者清遠玄虛之神今僧尼往往依傍法服傍步浪翻謂依傍佛法服僧尼之服而不遵其教也五誡粗法尚不能遵況精妙乎佛有五戒不淫不盜不殺不妄語不遭酒敗競加敬事又侵漁百姓取財為惠亦未合布施之道也施式吏翻疏奏不省省悉景翻道子勢傾內外遠近奔湊帝漸不平然猶外加優崇侍中王國寶以讒佞有寵於道子扇動朝衆朝直遙翻諷八座啓道子宜進位丞相楊州牧假黃鉞加殊禮晉氏渡江有吏部祠部五兵左民度支五尚書二僕射一令為八坐沈約曰秦時有護軍都尉漢陳平為護軍中尉盡護諸將李廣為驍騎將軍屬護軍將軍蓋護軍護諸將軍魏武以韓浩為護軍資重為護軍將軍資輕為中護軍車尺遮翻此乃成王所以尊周公也今主上當陽人主南面鄉明而立以治天下故曰當陽相王在位豈得為周公乎乃稱疾不署不署名也帝大怒而嘉胤有守中書侍郎范寧徐邈為帝所親信數進忠言數所角翻補正闕失指斥姦黨王國寶寧之甥也寧尤疾其阿諛勸帝黜之陳郡袁悅之有寵於道子國寶使悅之因尼章十二行本尼下有支字乙十一行本同孔本同張校同妙音致書於太子母陳淑媛云國寶忠謹宜見親信帝知之發怒以他事斬悅之國寶大懼與道子共譖范寧出為豫章太守寧臨發上疏言今邊烽不舉而倉庫空匱古者使民歲不過三日記王制古者用民之力歲不過三日任老者之事食壯者之食殆無三日之休至有生兒不復舉養復扶又翻鰥寡不敢嫁娶章十二行本娶下有臣恐社稷之憂六字乙十一行本同孔本同張校同退齋校同厝火積薪不足喻也厝火積薪賈誼之言中原士民流寓江左歲月漸久人安其業凡天下之人原其先祖皆隨世遷移何至於今而獨不可謂宜正其封疆戶口皆以土斷晉時中原士民南渡者皆於江左僑立郡縣以居之不以土著為斷斷丁亂翻人性無涯奢儉由勢今並兼之室亦多不贍非其財力不足蓋由用之無節爭以靡麗相高無有限極故也禮十九為長殤以其未成人也未成人而死曰殤其喪禮殺於成人長知兩翻十三為半丁所任非復童幼之事任音壬豈不傷天理困百姓乎謂宜以二十為全丁十六為半丁則人無夭折生長繁滋矣夭於兆翻長知兩翻帝多納用之寧在豫章遣十五議曹下屬城豫章領南昌海昏新淦建成望蔡永修建昌吳平豫章彭澤艾康樂豐城新昌宜豐鍾陵十六縣一縣負郭餘十五縣各遣一議曹下遐稼翻並吏假還訊問官長得失假居訝翻假還謂吏休假日滿而還府者徐邈與寧書曰足下聽斷明允庶事無滯則吏慎其負負謂罪也吏畏罪則每事加謹斷丁亂翻人聽即民聽晉書史臣避唐太宗諱改民為人通鑑因之飾其遊聲哉非徒不足致益實乃蠶漁之所資蠶漁謂所遣者蠶食漁取於民鄭玄曰趙魏之東實實同聲實是也詩實墉實壑實畝實籍實當作實言韓侯之先祖微弱所受之國多滅絶今復舊職繼絶世故築治是城修是壑井牧是田畝收斂是賦稅使如故常孔穎達曰凡言實者已有其事而後實之今此方説所為不宜為實故轉為實訓之為是也趙魏之東實實同聲鄭以時事驗之也春秋桓六年州公實來是由聲同故字有變異也余按徐邈所謂實訓之為是於義亦通多所告白者乎自古以來欲為左右耳目無非小人皆先因小忠而成其大不忠先藉小信而成其大不信遂使讒諂並進善惡倒置可不戒哉足下慎選綱紀郡以僚佐為綱紀諸曹皆得良吏以掌文按攝總也整也按據也文按謂諸曹文書留為按據者監工銜翻則清濁能否與事而明足下但平心處之處昌呂翻何取於耳目哉昔明德馬后未嘗顧左右與言漢明帝后馬氏諡明德皇后況大丈夫而不能免此乎十二月後秦主萇使其東門將軍任瓫東門將軍萇使守安定東門者也任音壬瓫與盆同音蒲奔翻許開門納之使疏吏翻登將從之征東將軍雷惡地將兵在外將即亮翻馳騎見登騎奇寄翻曰姚萇多詐不可信也登乃止萇聞惡地詣登謂諸將曰此羌見登事不成矣登以惡地勇略過人陰憚之惡地懼降於後秦降戶江翻萇以惡地為鎮軍將軍秦以安成王廣為司徒十五年庚寅三九春正月乙亥譙敬王恬薨西燕主永引兵向洛陽朱序自河陰北濟河擊敗之章十二行本之下有永走還上黨五字乙十一行本同孔本同張校同敗補邁翻序追至白水水經注白水出上黨高都縣故城西東流歷天井關序所至處去長子一百六十里會翟遼謀向洛陽序乃引兵還擊走之留鷹揚將軍朱黨戍石門使其子略督護洛陽以參軍趙蕃佐之身還襄陽琅琊王道子恃寵驕恣侍宴酣醉或虧禮敬帝益不能平欲選時望為藩鎮以潛制道子問於太子左衛率王雅曰吾欲用王恭殷仲堪何如雅曰王恭風神簡貴志氣方嚴仲堪謹於細行行下孟翻以文義著稱然皆峻狹自是且幹略不長若委以方面天下無事足以守職若其有事必為亂階矣帝不從為後王殷稱兵張本蘊之子王蘊后父也融之孫也殷融見九十六卷成帝咸康五年辛巳以中書令王恭為都督青兗幽並冀五州諸軍事兗青二州刺史鎮京口三月戊辰大赦後秦主萇攻秦扶風太守齊益男於新羅堡克之益男走秦主登攻後秦天水太守張業生于隴東隴東安定涇陽縣之地登引去夏四月秦鎮東將軍魏揭飛自稱衝天王晉書載記作魏褐飛太元元年秦遣庭中將軍魏曷飛擊氐羌意即此人也帥讀曰率鎮軍將軍雷惡地叛應之攻鎮東將軍姚漢得於李潤李潤地名在邢望南李延壽曰馮翊東有李潤鎮按魏書宗室列傳安定王燮除華州刺史表曰謹惟州居李潤堡雖是少梁舊地晉芮錫壤然胡夷內附遂為戎落請徙馮翊古城㣥臣皆曰陛下不憂六十里苻登時登趣長安據新豐之千戶固何也萇曰登非可猝滅吾城亦非登所能猝拔惡地智略非常若南引揭飛東結董成董成屠各種也時據北地長安東北非吾有也乃潛引精兵一千六百赴之揭飛惡地有衆數萬氐胡赴之者前後不絶萇每見一軍至輒喜㣥臣怪而問之萇曰揭飛等扇誘同惡種類甚繁種章勇翻吾雖克其魁帥帥所類翻餘黨未易猝平易以豉翻今烏集而至吾乘勝取之可一舉無餘也此曹操取馬超韓遂故智耳少詩沼翻悉衆攻之萇固壘不戰示之以弱潛遣其子中軍將軍崇帥騎數百出其後揭飛兵擾亂萇遣鎮遠將軍王超等縱兵擊之斬揭飛及其將士萬餘級惡地請降降戶江翻萇待之如初惡地謂人曰吾自謂智勇傑出一時而每遇姚翁輒困固其分也分扶問翻史言姚萇能服雷惡地之心萇命姚當成於所營之地每柵孔中輒樹一木以旌戰功掘地作孔豎木以為柵故有柵孔問之當成曰營地太小已廣之矣萇曰吾自結髮以來與人戰未嘗如此之快以千餘兵破三萬之衆營地惟小為奇豈以大為貴哉吐谷渾視連遣使獻見於金城王乾歸乾歸拜視連沙州牧白蘭王河西張茂以敦煌晉昌西域都護校尉玉門大護軍三郡三營為沙州吐谷渾未能有其地也李延壽曰此以吐谷渾部內有黃沙周回數百里不生草木因號沙州使疏吏翻見賢遍翻丙寅魏王圭會燕趙王麟於意辛山意辛山在牛川北賀蘭部所居也據北史踰陰山而北即賀蘭部破之紇突鄰紇奚皆降於魏史言燕為魏驅除降戶江翻秋七月馮翊人郭質起兵於廣鄉以應秦魏收地形志鄭縣有廣鄉原鄭縣時屬京兆姚萇凶虐毒被神人被皮義翻吾屬世蒙先帝堯舜之仁先帝謂秦主堅常伯侍中也納言尚書也校戶教翻與其含恥而存孰若蹈道而死於是三輔壁壘皆應之獨鄭縣人苟曜章十二行本曜下有不從二字乙十一行本同孔本同聚衆數千附於後秦秦以質為馮翊太守後秦以曜為豫州刺史苟曜後持兩端為後秦所殺事見後劉衛辰遣子直力鞮攻賀蘭部賀訥困急請降於魏丙子魏王圭引兵救之直力鞮退鞮田黎翻圭徙訥部落處之東境處昌呂翻八月劉牢之擊翟釗於鄄城釗走河北又敗翟遼於滑臺張願來降翟遼張願叛見上卷十一年走音奏敗補邁翻鄄音絹九月北平人吳柱聚衆千餘立沙門法長為天子破北平郡轉寇廣都入白狼城白狼縣前漢屬右北平郡後漢晉省魏收地形志後魏真君八年置建德郡治白狼城廣都縣屬焉燕時當屬北平郡郡縣守宰皆會之衆聞柱反請隆還城遣大兵討之隆曰今閭閻安業民不思亂柱等以詐謀惑愚夫誘脅相聚無能為也誘音酉遂留葬訖遣廣平太守廣都令先歸廣平當作北平趨七喻翻柱衆聞之皆潰窮捕斬之以侍中王國寶為中書令俄兼中領軍道子主之也丁未以吳郡太守王珣為尚書右僕射吐谷渾視連卒子視羆立視羆以其父祖慈仁為四鄰所侵侮吐谷渾辟奚視連慈仁見一百三卷簡文帝咸安元年欲建功業冬十月金城王乾歸遣使拜視羆沙州牧白蘭王視羆不受為後乞伏乾歸伐吐谷渾張本十二月郭質及苟曜戰于鄭東質敗奔洛陽鄭東鄭縣之東也越質詰歸據平襄叛金城王乾歸十二年越質詰歸附于乞伏氏十六年辛卯三九一春正月燕置行臺於薊加長樂公盛録行臺尚書事薊音計樂音洛金城王乾歸擊越質詰歸詰歸降降戶江翻乾歸以宗女妻之妻七細翻賀染干謀殺其兄訥訥知之舉兵相攻魏王圭告于燕請為鄉導以討之鄉讀曰嚮二月甲戌燕主垂遣趙王麟將兵擊訥鎮北將軍蘭汗帥龍城之兵擊染干賀染干部落蓋居賀蘭部之東偏故燕以龍城之兵擊之將即亮翻帥讀曰率三月秦主登自雍攻後秦安東將軍金榮于范氏堡克之雍於用翻遂渡渭水攻京兆太守韋範于段氏堡不克進據曲牢曲牢在杜縣東北夏四月燕蘭汗破賀染干於牛都都聚也其地當在牛川夷人放牧於此聚會因名苟曜有衆一萬密召秦主登許為內應登自曲牢向繁川繁川蓋即杜陵縣之樊川也五月後秦主萇引兵逆戰登擊破之斬其右將軍吳忠萇收衆復戰復扶又翻下同姚碩德曰陛下慎於輕戰每欲以計取之今戰失利而更前逼賊何也萇曰登用兵遲緩不識虛實今輕兵直進遙據吾東馬頭原之地蓋在長安東善用兵者觀敵之動而察知其情是以能制勝故及其交之未合急擊之以敗散其事耳敗補邁翻遂進戰大破之登退屯於郿郿音媚今音眉秦兗州刺史強金槌據新平降後秦以其子逵為質強其兩翻降戶江翻質音致後秦主萇將數百騎入金槌營㣥下諫之萇曰金槌既去符登又欲圖我將安所歸乎且彼初來款附宜推心以結之奈何復以不信疑之乎復扶又翻既而㣥氐欲取萇金槌不從強金槌氐種秦之戚黨也姚萇推心待之以攜苻登之黨六月甲辰燕趙王麟破賀訥於赤城禽之水經河水自雲中楨陵縣南過赤城東又南過定襄桐過縣西又魏書帝紀登國三年幸東赤城明元泰常八年築長城於長川之南起自赤城西至五原延袤二千餘里降戶江翻燕主垂命麟歸訥部落徙染干於中山麟歸言於垂曰臣觀拓跋圭舉動終為國患不若攝之還朝使其弟監國事垂不從攝録也收也慕容麟之姦詐知拓跋圭之終不可制而慕容垂不從其言天將啓圭以滅燕雖以垂之明略不之覺也監工銜翻西燕主永寇河南太守楊佺期擊破之秋七月壬申燕主垂如范陽范陽縣漢屬涿郡魏文帝改涿郡為范陽郡魏王圭遣其弟觚獻見於燕見賢遍翻燕主垂衰老子弟用事留觚以求良馬魏王圭弗與遂與燕絶為燕魏搆難張本好呼到翻觚逃歸燕太子寶追獲之垂待之如初秦主登攻新平後秦主萇救之登引去秦驃騎將軍沒奕干驃匹妙翻騎奇寄翻以其二子為質於金城王乾歸質音致請共擊鮮卑大兜乾歸與沒奕干攻大兜於鳴蟬堡克之據載記大兜時據安陽城安陽城在唐秦州隴城縣界鳴蟬堡亦當在其地乾歸收其部衆而還還從宣翻又如字歸沒奕干二子沒奕干尋叛東合劉衛辰八月乾歸帥騎一萬討沒奕干帥讀曰率沒奕干奔他樓城他樓城在高平唐太宗貞觀六年以突厥降戶置緣州治平高之他樓城高宗置他樓縣後省入原州蕭關縣界中目射而亦翻中竹仲翻九月癸未以尚書右僕射王珣為左僕射太子詹事謝琰為右僕射太學博士范弘之論殷浩宜加贈諡因敘桓溫不臣之迹是時桓氏猶盛王珣溫之故吏也王珣先為溫府主簿有忠貞之節黜弘之為餘杭令餘杭縣漢屬會稽郡顧來曰縣秦始皇立後漢分屬吳郡吳分屬吳興郡汪之孫也范汪得罪於桓溫見一百一卷哀帝升平五年冬十月壬辰燕主垂還中山自范陽還也初柔然部人世服於代魏收曰神元之末掠騎得一奴髮始齊肩忘本姓名其主字之曰木骨閭木骨閭者首禿也木骨閭與郁久閭聲相近故後子孫因以為氏木骨閭既壯免奴為騎卒穆帝時坐後期當斬亡匿廣漠溪谷間收合逋逃得百餘人依紇突鄰木骨閭死子車鹿會雄健始有部衆自號柔然部落分為二長子匹候跋繼父居東邊次子縕紇提別居西邊長知兩翻縕於粉翻紇戶骨翻秦王堅滅代滅代見一百四卷元年及魏王圭即位攻擊高車等諸部率皆服從獨柔然不事魏戊戌圭引兵擊之柔然舉部遁走圭追奔六百里諸將因張袞言於圭曰賊遠糧盡不如早還圭問諸將若殺副馬為三日食足乎凡北人用騎兵各乘一馬又有一馬為副馬足乃復倍道追之及於大磧南牀山下是時魏盛跨有代北柔然西奔南牀山蓋在大磧之西北史帝紀作南商山復扶又翻虜其半部匹候跋及別部帥屋擊各收餘衆遁走帥所類翻圭遣長孫嵩長孫肥追之圭謂將佐曰卿曹知吾前問三日糧意乎曰不知也圭曰柔然驅畜産奔走數日至水必留我以輕騎追之計其道里不過三日及之矣皆曰非所及也嵩追斬屋擊於平望川肥追匹候跋至涿邪山匹候跋舉衆降降戶江翻下同獲縕紇提之子曷多汗汗音寒兄子社崙斛律等宗黨數百人崙盧昆翻縕紇提將奔劉衛辰圭追及之縕紇提亦降圭悉徙其部衆於雲中為社崙復叛去而建國張本翟遼卒子釗代立改元定鼎攻燕鄴城燕遼西王農擊卻之為燕滅翟釗張本三河王光遣兵乘虛伐金城王乾歸乘其伐沒奕干之虛也引兵還光兵亦退劉衛辰遣子直力鞮帥衆八九萬攻魏南部鞮田黎翻又丁奚翻帥讀曰率十一月己卯魏王圭引兵五六千人拒之壬午大破直力鞮於鐵岐山南直力鞮單騎走騎奇寄翻下同乘勝追之戊子自五原金津南濟河金津當在五原郡宜梁九原二縣間衛辰部落駭亂辛卯圭直抵其所居悅跋城考之載記悅跋城即代來城也壬辰分遣諸將輕騎追之將軍伊謂禽直力鞮於木根山魏書官氏志拓跋鄰以次弟為伊婁氏後改為伊氏木根山在五原河西十二月圭軍于鹽池漢地理志五原郡成宜縣有鹽官唐鹽州五原縣有烏白等池鹽宋白曰青白鹽池在鹽州北皆投尸于河報元年衛辰藉兵於秦以滅代之怨也降戶江翻獲馬三十餘萬匹牛羊四百餘萬頭國用由是遂饒衛辰少子勃勃亡奔薛干部少詩照翻圭使人求之薛干部帥太悉仗張太悉作大悉章十二行本仗作伏乙十一行本同張校同退齋校同出勃勃以示使者曰帥所類翻使疏吏翻勃勃國破家亡以窮歸我我寧與之俱亡何忍執以與魏乃送勃勃於沒奕干沒奕干以女妻之為勃勃殺沒奕干復建國張本妻七細翻戊申燕主垂如魯口秦主登攻安定後秦主萇如陰密以拒之謂太子興曰苟曜聞吾北行自長安如陰密為北行汝執誅之曜果見興於長安興使尹緯讓而誅之善制敵者能因事而為功苟曜反覆於苻姚之間而長安去鄭三百里耳此姚氏腹脅之癰疽也使萇召之曜必不來萇在長安曜亦畏憚而不敢來萇外出以誘之曜亦疑而不敢來二秦交兵邊遽狎至萇之北行若不得已者苟曜無疑畏之心謂姚興居守為無能為者輕於一來卒以送死姚氏腹脅之疾去矣此非能因事而為功乎萇敗登於安定城東敗補邁翻登退據路承堡路承人姓名築堡自守時因以為名萇置酒高會諸將皆曰若值魏武王姚萇僭號追諡兄襄為魏武王陛下將牢太過耳將牢謂先自固而不妄動也猶今人之言把穩吾不如亡兄有四身長八尺五寸長直亮翻臂垂過膝人望而畏之一也將十萬之衆與天下爭衡望麾而進前無橫陳二也將即亮翻陳讀曰陳溫古知今講論道藝收羅英雋三也董帥大衆上下咸悅人盡死力四也帥讀曰率所以得建立功業驅策㣥賢者正望算略中有片長耳㣥臣咸稱萬歲王崇武標點容肇祖聶崇岐覆校
