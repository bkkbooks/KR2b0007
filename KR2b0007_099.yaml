body:
  text: 資治通鑑卷第九十九端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰權判西京留司御史臺上柱國河內郡開國侯食邑一千三百戶食實封四百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註晉紀二十一永和七年孝宗穆皇帝中之上永和七年辛亥三五一永和七年春正月丁酉日有食之永和七年苻健左長史賈玄碩等請依劉備稱漢中王故事事見六十八卷漢獻帝建安二十四年玄碩欲表言之於晉朝單音蟬吾豈堪為秦王邪且晉使未返使疏吏翻我之官爵非汝曹所知也既而密使梁安諷玄碩等上尊號上時掌翻健辭讓再三然後許之丙辰健即天王大單于位苻健字建業洪第三子大赦改元皇始追尊父洪為武惠皇帝廟號太祖立妻強氏為天王后強其兩翻氐姓也子萇為太子靚為平原公萇仲良翻靚疾正翻生為淮南公覿為長樂公樂音洛方為高陽公碩為北平公騰為淮陽公柳為晉公桐為汝南公廋為魏公廋所鳩翻武為燕公幼為趙公以苻雄為都督中外諸軍事丞相領車騎大將軍雍州牧東海公雍於用翻苻菁為衞大將軍平昌公宿衞二宮二宮健所居及子萇所居也毛貴為司空略陽姜伯周為尚書令梁楞為左僕射楞盧登翻王墮為右僕射魚遵為太子太師強平為太傅段純為太保呂婆樓為散騎常侍散悉亶翻騎奇寄翻健之舅平王后之弟婆樓本略陽氐酋也酋慈由翻永和七年段龕請以青州內附二月戊寅以龕為鎮北將軍封齊公段龕據廣固始上卷上年龕苦含翻永和七年魏主閔攻圍襄國百餘日去年十一月閔攻襄國乃去皇帝之號稱趙王去羌呂翻遣太尉張舉乞師於燕許送傳國璽璽斯氏翻中軍將軍張春乞師於姚弋仲弋仲遣其子襄帥騎二萬八千救趙帥讀曰率誡之曰冉閔棄仁背義屠滅石氏事見上卷五年六年背蒲妹翻我受人厚遇謂石虎遇之厚也老病不能自行汝才十倍於閔若不梟擒以來不必復見我也為于偽翻梟堅堯翻復扶又翻弋仲亦遣使告於燕使疏吏翻下同燕主儁遣禦難將軍悅綰禦難將軍蓋慕容氏創置難乃旦翻冉閔聞儁欲救趙遣大司馬從事中郎廣寧常煒使於燕儁使封裕詰之曰冉閔石氏養息息子也詰去吉翻何敢輒稱大號煒曰湯放桀武王伐紂以興商周之業曹孟德養於宦官莫知所出卒立魏氏之基曹操事見六十八卷漢靈帝中平元年操字孟德卒子恤翻安能成功推此而言何必致問裕曰人言冉閔初立鑄金為己像以卜成敗而像不成信乎煒曰不聞裕曰南來者皆云如是何故隱之煒曰姦偽之人欲矯天命以惑人者乃假符瑞託蓍龜以自重蓍升脂翻魏主握符璽據中州受命何疑而更反真為偽取決於金像乎裕曰傳國璽果安在煒曰在鄴裕曰張舉言在襄國煒曰殺胡之日在鄴者殆無孑遺孑吉列翻孤也單也言無孤單得遺者時有迸漏者皆潛伏溝瀆中耳爾雅水注谷曰溝水注澮曰瀆迸比諍翻彼求救者為妄誕之辭無所不可況一璽乎儁猶以張舉之言為信乃積柴其旁使裕以其私誘之曰君更熟思無為徒取灰滅誘音酉煒正色曰石氏貪暴親帥大兵攻燕國都雖不克而返事見九十六卷成帝咸康四年帥讀曰率故運資糧聚器械於東北者非以相資乃欲相滅也事見九十六卷咸康四年六年雖不為燕臣子之心聞仇讎之滅義當如何而更為彼責我不亦異乎異猶言可怪也為于偽翻下戶嫁翻精魂升于天蒙君之惠速益薪縱火使僕得上訴於帝足矣左右請殺之儁曰彼不憚殺身以徇其主忠臣也且冉閔有罪使臣何預焉使疏吏翻使出就館夜使其鄉人趙瞻往勞之勞力到翻且曰君何不以實言王怒欲處君於遼碣之表遼海及碣石為遼碣杜佑曰盧龍漢肥如縣有碣石山碣然而立在海旁秦築長城所起自碣石在今高麗舊界非此碣石也趙瞻所謂遼碣蓋即杜佑所言者也處昌呂翻煒曰吾結髮以來尚不欺布衣況人主乎曲意苟合性所不能直情盡言雖沈東海不敢避也沈持林翻遂臥向壁不復與瞻言復扶又翻瞻具以白儁儁乃囚煒於龍城永和七年趙幷州刺史張平遣使降秦使疏吏翻降戶江翻秦王以平為大將軍冀州牧永和七年燕王儁還薊自龍城還薊薊音計永和七年三月姚襄及趙汝陰王琨各引兵救襄國琨自信都進兵救襄國水經註漳水過堂陽縣西分為二水其右水東北注出石門謂之長蘆水長蘆水西逕堂陽縣故城南又東逕九門陂又東逕扶都縣五代志隋置長蘆縣屬河間郡劉昫曰長蘆漢參戶縣地魏收地形志鉅鹿郡郻縣有黃丘郻苦翻士卒略盡閔欲自出擊之衞將軍王泰諫曰今襄國未下外救雲集若我出戰必覆背受敵覆當作腹章孔本正作腹十二行本乙十一行本仍作覆不若固壘以挫其銳徐觀其釁而擊之釁隙也行戶剛翻陳讀曰陣如失萬全則大事去矣閔將止道士法饒進曰陛下圍襄國經年無尺寸之功今賊至又避不擊將何以使將士乎將即亮翻且太白入昴當殺胡王晉天文志昴七星為旄頭胡星也不可失也閔攘袂大言曰吾戰決矣敢沮衆者斬攘如羊翻沮在呂翻乃悉衆出與襄琨戰悅綰適以燕兵至去魏兵數里疏布騎卒曳柴揚塵疏讀與疎同騎奇寄翻下同魏人望之恟懼自棘城之敗趙人固畏燕兵見其至而勢盛故恟懼恟許拱翻趙王祗自後衝之魏兵大敗果如王泰之言腹背受敵而敗降胡栗特康等執大單于胤及左僕射劉琦以降趙趙王祗殺之果如韋謏之言史言冉閔不能用㣥策以取敗降戶江翻單音蟬劉隗盧諶不能為晉死而卒死於兵人誰不死貴得其死所耳諶是壬翻人無知者鄴中震恐訛言閔已沒射聲校尉張艾請閔親郊以安衆心親郊親出郊祀也訛言乃息閔支解法饒父子解剝其支體而殺之謏死見上卷上年謏蘇鳥翻灄書涉翻姚弋仲怒其不擒閔杖之一百初閔之為趙相也相息亮翻悉散倉庫以樹私恩與羌胡相攻無月不戰趙所徙青雍幽荊四州之民石虎破曹嶷徙青州之民破劉胤石生再徙雍州之民破段匹磾及為燕所敗徙幽州之民石勒南掠江漢徙荊州之民雍於用翻以趙法禁不行各還本土道路交錯互相殺掠其能達者什有二三中原大亂因以饑疫人相食無復耕者復扶又翻趙王祗使其將劉顯帥衆七萬攻鄴帥讀曰率軍于明光宮此明光宮石氏所建也魏主閔恐召王泰欲與之謀泰恚前言之不從辭以瘡甚戰敗被傷故因以瘡甚辭恚於避翻泰固稱疾篤閔怒還宮謂左右曰巴奴乃公豈假汝為命邪王泰蓋巴蠻也乃公冉閔自謂也自漢高祖已有是語卻斬王泰乃悉衆出戰大破顯軍追奔至陽平陽平縣漢屬東郡魏晉分屬陽平郡而陽平郡治在魏郡東北宋白曰魏州莘縣漢為陽平縣後趙移陽平理館陶縣顯懼密使請降使疏吏翻降戶江翻求殺祗以自效閔乃引歸有告王泰欲叛入秦者閔殺之夷其三族永和七年秦王健分遣使者問民疾苦搜羅雋異寬重斂之稅弛離宮之禁趙修長安宮殿亦有離宮之禁斂力贍翻去侈靡之服去羌呂翻凡趙之苛政不便於民者皆除之史言苻健所以能據有關中永和七年杜洪張琚遣使召梁州刺史司馬勳夏四月勳帥步騎三萬赴之帥讀曰率騎奇寄翻秦王健禦之於五丈原勳屢戰皆敗退歸南鄭健以中書令賈玄碩始者不上尊號銜之上時掌翻使人告玄碩與司馬勳通幷其諸子皆殺之永和七年渤海人逄約逄皮江翻因趙亂擁衆數千家附於魏魏以約為渤海太守故太守嚴守改尉劉準隗之兄子也土豪封放奕之從弟也從才用翻別聚衆自守閔以準為幽州刺史與約中分渤海燕王儁使封奕討約使昌黎太守高開討準放開瞻之子也高瞻見九十一卷元帝太興二年奕引兵直抵約壘遣人謂約曰相與鄉里隔絕日久封奕本渤海人懷帝永嘉五年託於慕容廆見八十七卷時事利害人皆有心非所論也願單出一相見以寫佇結之情久立而待之曰佇企望之情鬱積而不散曰結即出見奕於門外各屏騎卒屏必郢翻騎奇寄翻單馬交語奕與論敍平生畢因說之曰與君累世同鄉情相愛重誠欲君享祚無窮今既獲展奉展省視也奉承也事也說輸芮翻冉閔乘石氏之亂奄有成資是宜天下服其強矣而禍亂方始固知天命不可力爭也燕王奕世載德奕世載德班彪王命論之言師古曰載乘也言相因不絕所征無敵今已都薊南臨趙魏遠近之民襁負歸之民厭荼毒孔安國曰荼毒苦也襁居兩翻冉閔之亡匪朝伊夕成敗之形昭然易見易以豉翻且燕王肇開王業虛心賢雋君能翻然改圖則功參絳灌慶流苗裔孰與為亡國將守孤城以待必至之禍哉將即亮翻約聞之悵然不言奕給使張安有勇力給使在左右給使令者也俟約氣下安突前持其馬鞚鞚空貢翻因挾之而馳至營奕與坐謂曰君計不能自決故相為決之為于偽翻非欲取君以邀功乃欲全君以安民也高開至渤海準放迎降降戶江翻儁以放為渤海太守準為左司馬約參軍事以約誘於人而遇獲誘音酉更其名曰釣更工衡翻永和七年劉顯弒趙王祗及其丞相樂安王炳太宰趙庶等十餘人傳首于鄴驃騎將軍石寧奔柏人柏人縣自漢以來屬趙國劉昫曰唐邢州堯山縣古之柏人城驃匹妙翻騎奇寄翻拜顯上大將軍大單于冀州牧單音蟬永和七年五月趙兗州刺史劉啟自鄄城來奔鄄城縣漢屬濟陰郡晉屬濮陽國唐為濮州治所鄄吉縣翻永和七年秋七月劉顯復引兵攻鄴復扶又翻魏主閔擊敗之敗蒲邁翻顯還稱帝於襄國永和七年八月魏徐州刺史周成兗州刺史魏統荊州刺史樂弘豫州牧張遇以廩丘許昌等諸城來降時周成據廩丘張遇據許昌降戶江翻下同以其地來降時崇護以三河之地來降永和七年燕王儁遣慕容恪攻中山慕容評攻王午于魯口魏中山太守上谷侯龕閉城拒守龕苦含翻恪南徇常山軍于九門九門縣自漢以來屬常山郡恪厚撫之將邽還圍中山侯龕乃降恪入中山遷其將帥土豪數十家詣薊將即亮翻帥所類翻薊音計餘皆安堵軍令嚴明秋豪不犯慕容評至南安王午遣其將鄭生拒戰評擊斬之悅綰還自襄國儁乃知張舉之妄而殺之常煒有四男二女在中山儁釋煒之囚使諸子就見之煒上疏謝恩儁手令答曰卿本不為生計孤以州里相存耳儁居昌黎煒居廣寧二郡皆屬幽州諸子盡至豈非天所念邪天且念卿況於孤乎賜妾一人穀三百斛使居凡城以北平太守孫興為中山太守興善於綏撫中山遂安永和七年庫傉官偉帥部衆自上黨降燕傉奴沃翻庫傉官漁陽烏桓大人庫傉之餘種按溫公與劉道原書以為庫當作厙詳見前例庫音舍永和七年姚弋仲遣使來請降趙亡弋仲乃降晉史言其盡忠於石氏使疏吏翻下同十章十二行本十下有一字乙十一行本同孔本同月以弋仲為使持節六夷大都督督江嚴江改淮北諸軍事江北恐當作河北騎奇寄翻單音蟬又以其子襄為持節平北將軍都督幷州諸軍事幷州刺史平鄉縣公永和七年逄釣亡歸渤海招集舊衆以叛燕樂陵太守賈堅考異曰燕書賈堅傳烈祖問堅年對以受新命始及三載烈祖悅其言拜樂陵太守按堅以去年九月獲於燕至明年始三年若未為樂陵太守豈能安集諸縣告諭逄釣故知堅先巳為樂陵太守非因問年而授示以成敗釣部衆稍散遂來奔永和七年吐谷渾葉延卒子碎奚立晉書作辟奚按一百三卷簡文帝咸安元年鍾惡地殺三弟事亦當作辟奚永和七年初桓溫聞石氏亂上疏請出師經略中原溫蓋上疏於五年出屯安陸之時溫知朝廷杖殷浩以抗己甚忿之然素知浩之為人亦不之憚也以國無他釁遂得相持彌年章十二行本年下有雖有君臣之跡六字乙十一行本同孔本同張校同退齋校同羈縻而已八州士衆資調殆不為國家用永和元年溫都督荊司雍益梁寧六州五年遣滕畯帥交廣之兵伐林邑蓋是時已加督交廣二州矣資財也調賦也調徒釣翻詔書不聽十二月辛未溫拜表輒行帥衆四五萬順流而下軍於武昌帥讀曰率朝廷大懼殷浩欲去位以避溫又欲以騶虞幡駐溫軍吏部尚書王彪之言於會稽王昱曰此屬皆自為計非能保社稷為殿下計也會工外翻若殷浩去職人情離駭天子獨坐當此之際必有任其責者非殿下而誰乎又謂浩曰彼若抗表問罪卿為之首事任如此謂浩當朝政也謂浩與溫有隙也豈有全地邪且當靜以待之令相王與手書相息亮翻示以款誠為陳成敗彼必旋師若不從則遣中詔又不從乃當以正義相裁謂正溫舉兵向闕之罪先自猖獗乎怱倉紅翻浩曰決大事正自難頃日來欲使人悶聞卿此謀意始得了了決也彬之子也王敦之亂彬能守正彪之可謂克紹矣撫軍司馬高崧昱為撫軍大將軍以崧為司馬王宜致書諭以禍福自當返旆如其不爾便六軍整駕逆順於茲判矣言溫若不還則當整六師奉順討逆也寇難宜平時會宜接謂是時中原豪傑相繼來降有恢復之會宜應接之也難乃旦翻坐徂臥翻為于偽翻下同經略大算能弘斯會非足下而誰但以比興師動衆要當以資實為本比毗寐翻運轉之艱古人所難不可易之於始而不熟慮易以豉翻頃所以深用為疑惟在此耳然異常之舉衆之所駭遊聲噂噂祖本翻徒合翻噂聚語也想足下亦少聞之少詩沼翻苟患失之無所不至論語孔子之言一時崩散如此則望實並喪喪息浪翻社稷之事去矣皆由吾闇弱德信不著不能鎮靜㣥庶保固維城詩曰宗子維城外慚良友吾與足下雖職有內外安社稷保國家其致一也致極也言事理詣極之地則一也繫之明德當先思寧國而後圖其外使王基克隆大義弘著所望於足下區區誠懷豈可復顧嫌而不盡哉復扶又翻溫即上疏惶恐致謝回軍還鎮永和七年朝廷將行郊祀會稽王昱問於王彪之曰郊祀應有赦否彪之曰自中興以來郊祀往往有赦愚意常謂非宜凶愚之人以為郊必有赦將生心於徼幸矣徼堅堯翻昱從之永和七年燕王儁如龍城永和七年丁零翟鼠帥所部降燕封為歸義王丁零居中山其後翟斌等皆其種類也帥讀曰率八年八年春正月辛卯日有食之八年秦丞相雄等請秦王健正尊號依漢晉之舊不必效石氏之初謂石虎兄弟皆先稱天王後即皇帝位即皇帝位大赦諸公皆進爵為王且言單于所以統壹百蠻非天子所宜領此亦雄等之言也單音蟬八年司馬勳既還漢中杜洪張琚屯宜秋水經註鄭渠自中山西瓠口東流逕宜秋城北又東逕中山南又東逕池陽縣故城北琚遂殺洪自立為秦王改元建昌八年劉顯攻常山魏主閔留大將軍蔣幹使輔太子智守鄴自將八千騎救之顯大司馬清河王寧以棗強降魏棗強縣前漢屬清河郡後漢晉省尋復置屬信都郡敗之敗補邁翻追奔至襄國顯大將軍曹伏駒開門納閔閔殺顯及其公卿已下百餘人考異曰閔殺顯晉帝紀在正月十六國春秋鈔在二月燕書在三月己酉未知孰是今從帝紀遷其民於鄴趙汝陰王琨以其妻妾來奔斬於建康市石氏遂絕自古無不亡之國宗族誅夷固亦有之未有至於絕姓者石氏窮凶極暴而子孫無遺種足以見天道之不爽矣八年尚書左丞孔嚴言於殷浩曰比來衆情良可寒心比毗至翻不知使君當何以鎮之愚謂宜明受任之方韓彭專征伐蕭曹守管籥事見漢高帝紀曹參當高帝時從韓信用兵其後相齊未嘗守管籥嚴以蕭曹相繼為相而言之各有攸司深思廉藺屈身之義事見四卷周赧王三十六年事見十三卷漢高后七年穆然和而靜之貌間古莧翻嚴欲浩與桓溫兩釋猜嫌降心相從以圖國事也保大定功左傳楚莊王所謂武有七德此其二也皆人面獸心貪而無親恐難以義感也段龕張遇姚襄之徒孔嚴固見其肺肝矣降戶江翻嚴愉之從子也從才用翻浩上疏請北出許洛詔許之以安西將軍謝尚北中郎將荀羨為督統晉志曰四中郎將並後漢置歷魏及晉並有其職江左彌重時謝尚鎮壽春荀羨鎮京口浩欲兩道俱進故使二人並為督統各統其方之兵謝尚不能撫尉張遇尉與慰同據許昌叛使其將上官恩據洛陽樂弘攻督護戴施於倉垣浩軍不能進三月命荀羨鎮淮陰尋加監青州諸軍事監工銜翻又領兗州刺史鎮下邳八年乙巳燕王儁還薊稍徙軍中文武兵民家屬於薊自北徙其家屬而南又恐其懷居而無樂遷之心故稍徙之八年姚弋仲有子四十二人及病謂諸子曰石氏待吾厚吾本欲為之盡力為于偽翻今石氏已滅中原無主我死汝亟自歸於晉當固執臣節無為不義也弋仲卒子襄祕不發喪帥戶六萬南攻陽平元城發干破之屯于碻磝津帥讀曰率下同襄自灄頭而南也元城縣漢屬魏郡晉屬陽平郡發干縣漢屬東郡晉屬陽平郡劉昫曰唐魏州莘縣漢陽平縣地碻磝城即漢東郡茌平縣故城其西南即河津謂之碻磝津後魏置濟州於碻磝城杜佑曰碻磝即今濟陽郡城碻口交翻磝音敖楊正衡曰碻五勞翻磝口勞翻毛晃曰碻丘交翻磝牛交翻或曰碻音確磝音爻以太原王亮為長史天水尹赤為司馬太原薛瓚略陽權翼為參軍姓譜權本顓頊之後楚武王使鬬緡尹權因以為氏韓愈權德輿墓碑曰殷武丁之子降封於權權江漢間國也周衰入楚為權氏瓚藏旱翻襄與秦兵戰敗亡三萬餘戶南至滎陽始發喪又與秦將高昌李歷戰于麻田高昌李歷本趙將也時附於秦故稱秦將滎洛之間地名有豆田麻田各因人所種藝而名之中竹仲翻弟萇以馬授襄萇仲良翻襄曰汝何以自免萇曰但令兄濟豎子必不敢害萇會救至俱免尹赤奔秦秦以赤為幷州刺史鎮蒲阪襄遂帥衆歸晉送其五弟為質質音致詔襄屯譙城襄單騎渡淮見謝尚于壽春尚聞其名命去仗衞幅巾待之騎奇寄翻去丘呂翻歡若平生襄博學善談論江東人士皆重之八年魏主閔既克襄國因遊食常山中山諸郡趙立義將軍段勤聚胡羯萬餘人保據繹幕繹幕縣自漢以來屬清河郡夏四月甲子燕王儁遣慕容恪等擊魏慕容霸等擊勤魏主閔將與燕戰大將軍董閏車騎將軍張溫諫曰騎奇寄翻下同鮮卑乘勝鋒銳且彼衆我寡宜且避之俟其驕惰然後益兵以擊之閔怒曰吾欲以此衆平幽州斬慕容儁今遇恪而避之人謂我何司徒劉茂特進郎闓相謂曰吾君此行必不還矣吾等何為坐待戮辱皆自殺闓苦亥翻又音開閔軍于安喜安喜縣前漢曰安險屬中山郡後漢章帝更名唐復為安險縣屬定州而定州所治之安喜縣漢盧奴縣也閔趣常山趣七喻翻下同恪追之及章十二行本及上有丙子二字乙十一行本同孔本同張校同于魏昌之廉臺魏昌縣屬中山郡本苦陘漢章帝改為漢昌魏文帝改為魏昌唐為定州唐昌縣魏收地形志中山毋極縣有廉臺蓋晉省無極縣廉臺遂在魏昌界燕兵皆不勝閔素有勇名所將兵精銳將即亮翻燕人憚之慕容恪巡陳陳讀曰陣謂將士曰冉閔勇而無謀一夫敵耳其士卒飢疲甲兵雖精其實難用不足破也閔以所將多步卒將即亮翻而燕皆騎兵引兵將趣林中恪參軍高開曰吾騎兵利平地若閔得入林不可復制復扶又翻宜亟遣輕騎邀之既合而陽走誘致平地然後可擊也誘音酉恪從之魏兵還就平地恪分軍為三部謂諸將曰閔性輕銳又自以衆少必致死於我我厚集中軍之陳以待之少詩沼翻陳讀曰陣下同俟其合戰卿等從旁擊之無不克矣乃擇鮮卑善射者五千人以鐵鎖連其馬為方陳而前閔所乘駿馬曰朱龍日行千里閔左操兩刃矛右執鉤戟以擊燕兵斬首三百餘級望見大幢知其為中軍直衝之燕兩軍從旁夾擊大破之恪以鐵鎖連馬則閔兵雖致死而陳不可破兩軍從旁夾擊則閔兵三面受敵不敗何待操千刀翻幢直江翻圍閔數重重直龍翻閔潰圍東走二十餘里朱龍忽斃為燕兵所執燕人殺魏僕射劉㣥執董閔張溫及閔皆送於薊董閔當作董閏章孔本正作閏冉閔自立事始上卷六年至是而滅高開被創而卒創初良翻慕容恪進屯常山儁命恪鎮中山己卯冉閔至薊儁大赦立閔而責之曰汝奴僕下才何得妄稱帝閔曰天下大亂爾曹夷狄禽獸之類猶稱帝況我中土英雄何得不章十二行本何得不作何為不得四字乙十二行本同孔本同張校同稱帝邪儁怒鞭之三百送於龍城慕容霸軍至繹幕段勤與弟思聰舉城降降戶江翻下同甲申儁遣慕容評及中尉侯龕帥精騎萬人攻鄴龕苦含翻癸巳至鄴魏蔣幹及太子智閉城拒守城外皆降於燕劉寧及弟崇帥胡騎三千奔晉陽劉寧劉顯將也以棗強降閔帥讀曰率八年秦以張遇為征東大將軍豫州牧八年五月秦主健攻張琚於宜秋斬之八年鄴中大饑人相食故趙時宮人被食略盡被皮義翻蔣幹使侍中繆嵩詹事劉猗奉表請降且求救於謝尚繆靡幼翻庚寅燕王儁遣廣威將軍慕容軍殿中將軍慕輿根右司馬皇甫真等帥步騎二萬助慕容評攻鄴八年辛卯燕人斬冉閔於龍城會大旱蝗燕王儁謂閔為祟祟雖遂翻神禍曰祟遣使祀之諡曰悼武天王八年初謝尚使戴施據枋頭遣施之時指令據枋頭乃自倉垣徙屯棘津棘津即石濟南津有棘津亭璽斯氏翻劉猗使繆嵩還鄴白幹幹疑尚不能救沈吟未決沈持林翻六月施帥壯士百餘人入鄴助守三臺紿之曰今燕寇在外道路不通璽未敢送也卿且出以付我我當馳白天子天子聞璽在吾所信卿至誠必多發兵糧以相救餉幹以為然出璽付之施宣言使督護何融迎糧陰令懷璽送于枋頭江南之未得璽也中原謂之白版天子傳國璽至此歸晉藺相如全璧歸趙趙王擢之自繆賢舍人為上大夫戴施能復致累代傳國之寶未聞晉朝以顯賞甄之也何居甲子蔣幹帥銳卒五千及晉兵出戰慕容評大破之斬首四千級幹脫走入城八年甲申秦主健還長安自宜秋還長安也八年謝尚姚襄共攻張遇于許昌秦主健遣丞相東海王雄衞大將軍平昌王菁略地關東帥步騎二萬救之丁亥戰于潁水之誡橋據晉紀誡橋在許昌死者萬五千人尚奔還淮南襄棄輜重送尚于芍陂重直用翻尚悉以後事付襄謝尚既敗姚襄知晉之不足恃固有去晉之心矧殷浩又從而速之乎退屯壽春秋七月秦丞相雄徙張遇及陳潁許洛之民五萬餘戶於關中張遇據有許潁豈肯斂手受羈制於人乎苻雄乘勝以兵威徙之自此遇之死命制於苻氏矣鎮許昌謝尚降號建威將軍八年趙故西中郎將王擢遣使請降拜擢秦州刺史王擢自石虎時當秦隴之任降戶江翻下同八年丁酉以武陵王晞為太宰八年丙辰燕王儁如中山八年王午聞魏敗時鄧恆已死恆戶登翻午自稱安國王八月戊辰燕王儁遣慕容恪封奕陽騖攻之午閉城自守送冉操詣燕軍燕人掠其禾稼而還慕容恪善用兵知魯口之未可取徒久攻以斃士卒故掠其禾稼全師而退金城湯池非粟不守孤城之外春取其麥而秋取其禾彼將焉仰哉還方宣翻又如字八年庚午魏長水校尉馬願等開鄴城納燕兵戴施蔣幹懸縋而下縋直偽翻奔于倉垣慕容評送魏后董氏太子智太尉申鍾司空條枚嚴枚改攸等條姓也周亞夫封條侯其後以為氏乘繩證翻尚書令王簡左僕射張乾右僕射郎肅皆自殺燕王儁詐云董氏得傳國璽獻之賜號奉璽君賜冉智爵海賓侯以申鍾為大將軍右長史命慕容評鎮鄴八年桓溫使司馬勳助周撫討蕭敬文於涪城斬之蕭敬文據涪城始九十七卷永和三年涪音浮八年謝尚自枋頭迎傳國璽至建康百僚畢賀八年秦以雷弱兒為大司馬毛貴為太尉張遇為司空八年殷浩之北伐也中軍將軍王羲之以書止之不聽既而無功復謀再舉復扶又翻下所復故復同羲之遺浩書曰今以區區江左天下寒心固已久矣寒心者恐不能自保遺于季翻非所當作作為也處昌呂翻下而處同未有深謀遠慮而疲竭根本各從所志竟無一功可論遂令天下將有土崩之勢任其事者豈得辭四海之責哉言殷浩不得辭其責也資竭於內保淮之志非所復及莫若還保長江督將各復舊鎮將即亮翻自長江以外羈縻而已引咎責躬更為善治治直吏翻省其賦役與民更始庶可以救倒懸之急也保江之說此王導佐元帝之規摹世之議者譏其忘讎忍恥置中原於度外若以量時度力保固本根言之此策未為非也至於引咎責躬省民賦役所謂善敗不亡諸葛孔明街亭喪師之後正亦如是而已任天下之重當董統之任而敗喪至此喪息浪翻恐闔朝㣥賢未有與人分其謗者朝直遙翻若猶以前事為未工故復求之分外分扶問翻宇宙雖廣自容何所此愚智所不解也解胡買翻曉也其後殷浩廢黜卒如羲之之言又與會稽王昱牋曰為人臣誰不願尊其主比隆前世況遇難得之運哉顧力有所不及豈可不權輕重而處之也處昌呂翻今雖有可喜之會內求諸己而所憂乃重於所喜功未可期遺黎殲盡勞役無時徵求日重以區區吳越經緯天下十分之九不亡何待而不度德量力度徒洛翻量音良不弊不已此封內所痛心歎悼而莫敢吐誠者也往者不可諫來者猶可追論語載楚狂接輿之言先為不可勝之基須根立勢舉謀之未晚兵法曰先為不可勝以待敵之可勝此處文意短蹙恐有脫文將不止林藪而已吳伍子胥曰臣恐麋鹿游於姑蘇此祖其意而微其言澤無水曰藪羲之此言蓋譏昱好談清虛玄遠也蹔與暫同可謂以亡為存轉禍為福也不從九月浩屯泗口遣河南太守戴施據石門滎陽太守劉遯據倉垣浩以軍興罷遣太學生徒學校由此遂廢元帝建武元年始立太學今復以軍興廢校戶教翻冬十月謝尚遣冠軍將軍王俠攻許昌克之冠古玩翻俠戶頰翻秦豫州刺史楊㣥退屯弘農徵尚為給事中戍石頭八年丁卯燕王儁還薊八年故趙將擁兵據州郡者各遣使降燕將即亮翻使疏吏翻降戶江翻燕王儁以王擢為益州刺史夔逸為秦州刺史張平為幷州刺史李歷為兗州刺史高昌為安西將軍劉寧為車騎將軍八年慕容恪屯安平安平縣前漢屬涿郡後漢屬安平國晉屬博陵郡唐屬深州治攻具將討王午治直之翻丙戌中山蘇林起兵於無極無極縣漢屬中山國晉省無本作毋唐武后萬歲通天二年始改毋字為無此當作毋恪自魯口還討林閏月戊子燕王儁遣廣威將軍慕輿根助恪攻林斬之王午為其將秦興所殺呂護殺興復自稱安國王復扶又翻燕㣥僚共上尊號於燕王儁儁許之上時掌翻十一月丁卯始置百官以國相封奕為太尉左長史陽騖為尚書令右司馬皇甫真為尚書左僕射典書令張悕為右僕射悕香衣翻其餘文武拜授有差戊辰儁即皇帝位大赦自謂獲傳國璽改元元璽追尊武宣王為高祖武宣皇帝文明王為太祖文明皇帝廆諡武宣王皝諡文明王使疏吏翻儁謂曰汝還白汝天子我承人乏為中國所推已為帝矣謂中國無主己為士民所推遂承人乏而即尊位也建留臺於龍都趙置司州於鄴燕初都龍城時遷于薊故建留臺於龍城謂之龍都專委留務菟同都翻八年秦丞相雄攻王擢于隴西擢奔涼州雄還屯隴東隴東漢汧縣地特寵待之重華寵待王擢以圖秦隴豈知擢非苻雄之敵也九年九年春正月乙卯朔大赦九年二月庚子燕主儁立其可足渾氏為皇后為可足渾后亂燕張本可足渾北方三字姓皆自龍城遷于薊宮九年張重華遣將軍張弘宋修會王擢帥步騎萬五千伐秦帥讀曰率騎奇寄翻秦丞相雄衞將軍菁拒之大敗涼兵於龍黎新唐書地理志隴州吳山縣有龍盤府龍盤城吳山後魏之南由縣地疑龍黎即龍盤也敗補邁翻下所敗同虜張弘宋修王擢棄秦州奔姑臧秦主健以領軍將軍苻願為秦州刺史鎮上邽九年三月交州刺史阮敷討林邑破五十餘壘九年趙故衞尉常山李犢聚衆數千人叛燕九年西域胡劉康詐稱劉曜子聚衆於平陽自稱晉王夏四月秦左衞將軍苻飛討擒之九年以安西將軍謝尚為尚書僕射九年五月張重華復使王擢帥衆二萬伐上邽復扶又翻秦州郡縣多應之苻願戰敗奔長安重華因上疏請伐秦詔進重華涼州牧九年燕主儁遣衞將軍恪討李犢犢降降戶江翻下同遂東擊呂護於魯口九年六月秦苻飛攻氐王楊初於仇池為初所敗楊初據險以拒秦秦兵雖強故為初所敗敗補邁翻秦主健納張遇繼母韓氏為昭儀數於衆中謂遇曰數所角翻卿吾假子也遇恥之因雄等精兵在外陰結關中豪傑欲滅苻氏以其地來降秋七月遇與黃門劉晃謀夜襲健晃約開門以待之會健使晃出外晃固辭不得已而行遇不知引兵至門門不開事覺伏誅於是孔持嚴持改特起池陽劉珍夏侯顯起鄠喬秉起雍胡陽赤起司竹呼延毒起灞城池陽縣漢屬馮翊晉屬扶風唐為雲陽縣屬京兆鄠縣漢屬扶風晉屬始平郡唐屬京兆雍縣漢屬扶風唐改為天興縣為鳳翔府治所霸陵縣漢屬京兆晉改曰霸城喬秉載記作喬景避唐諱也孔持作孔特鄠音戶雍於用翻各遣使來請兵使疏吏翻下同九年秦以左僕射魚遵為司空九年九月秦丞相雄帥衆二萬還長安帥讀曰率下同遣平昌王菁略定上洛置荊州于豐陽川上洛縣漢西都屬弘農郡東漢屬京兆武帝泰始二年分置上洛郡豐陽川在郡界續漢志南陽郡析縣有豐陽城後魏太安二年置豐陽縣左傳所謂司馬起豐析即其地劉昫曰唐商州豐陽縣漢商縣地晉分商縣置豐陽縣因豐陽川為名雄與清河王法苻飛分討孔持等九年姚襄屯歷陽以燕秦方強未有北伐之志乃夾淮廣興屯田訓厲將士將即亮翻殷浩在壽春惡其強盛惡烏路翻下同囚襄諸弟屢遣刺客刺之刺之七亦翻刺客皆以情告襄安北將軍魏統卒魏統來降見上七年浩潛遣憬帥衆五千襲之襄斬憬幷其衆憬古迥翻浩愈惡之使龍驤將軍劉啟守譙驤思將翻遷襄于梁國蠡臺司馬彪郡國志睢陽縣有廬門亭城內有高臺甚秀廣巍然介立超焉獨上謂之蠡臺杜預曰盧門宋城南門也續述征記曰迥道似蠡故謂之蠡臺蠡如字若如述征記之說音盧戈翻魏憬子弟數往來壽春數所角翻襄益疑懼遣參軍權翼使於浩浩曰身與姚平北共為王臣休戚同之平北每舉動自專甚失輔車之理豈所望也左傳曰輔車相依杜預註曰輔頰輔車牙車車尺奢翻平北英姿絕世擁兵數萬遠歸晉室者以朝廷有道宰輔明哲故也今將軍輕信讒慝之言與平北有隙愚謂猜嫌之端在此不在彼也浩曰平北姿性豪邁生殺自由又縱小人掠奪吾馬王臣之體固若是乎翼曰平北歸命聖朝朝直遙翻豈肯妄殺無辜姦宄之人亦王法所不容也殺之何害浩曰然則掠馬何也翼曰將軍謂平北雄武難制終將討之故取馬欲以自衞耳浩笑曰何至是也權翼之言得浩之情故笑史言浩不能綏御新附初浩陰遣人誘梁安雷弱兒使殺秦主健許以關右之任弱兒偽許之且請兵應接浩聞張遇作亂健兄子輔國將軍黃眉自洛陽西奔以為安等事已成冬十月浩自壽春帥衆七萬北伐帥讀曰率欲進據洛陽修復園陵吏部尚書王彪之上會稽王昱牋上時掌翻以為弱兒等容有詐偽浩未應輕進不從藉使梁雷果受浩間而殺健浩亦未能越關陝以取長安其欲乘苻黃眉之去而據洛陽不過欲以修復園陵為功耳昱遂以為真可立功而不聽王彪之之言宜桓溫得因以廢浩而制昱也浩以姚襄為前驅襄引兵北行度浩將至度徒洛翻詐令部衆夜遁陰伏甲以邀之浩聞而追襄至山桑山桑縣前漢屬沛郡後漢屬汝南郡晉屬譙郡按山桑六朝兵爭為渦陽之地唐為亳州蒙城縣地浩大敗棄輜重走保譙城重直龍翻襄俘斬萬餘悉收其資仗使兄益守山桑襄復如淮南復扶又翻會稽王昱謂王彪之曰君言無不中中竹仲翻張陳無以過也張陳謂張良陳平九年西平敬烈公張重華有疾子曜靈纔十歲立為世子赦其境內重華庶兄長寧侯祚有勇力吏幹水經註金城西平西北四十里有長寧亭晉室西平郡有長寧縣與重華嬖臣趙長尉緝等結異姓兄弟尉姓也左傳有鄭大夫尉止嬖卑義翻又博計翻重華曰吾方以祚為周公使輔幼子君是何言也託孤之難尚矣況張重華乎謝艾以枹罕之功事見九十七卷永和三年枹音膚左右疾之譖艾出為酒泉太守艾上疏言權倖用事公室將危乞聽臣入侍且言長寧侯祚及趙長等將為亂宜盡逐之十一月己未重華疾甚手令徵艾為衞將軍監中外諸軍事輔政監工銜翻祚長等匿而不宣丁卯重華卒世子曜靈立稱大司馬涼州刺史西平公趙長等矯重華遺令以長寧侯祚為都督中外諸軍事撫軍大將軍輔政史言張氏之亂九年殷浩使部將劉啟王彬之攻姚益于山桑姚襄自淮南擊之啟彬之皆敗死啟劉輿之孫也九年趙末樂陵朱禿平原杜能清河丁嬈嬈乃了翻又如紹翻陽平孫元各擁兵分據城邑至是皆請降於燕降戶江翻燕主儁以禿為青州刺史能為平原太守嬈為立節將軍元為兗州刺史各留撫其營九年秦丞相雄克池陽斬孔持十二月清河王法苻飛克鄠斬劉珍夏侯顯九年姚襄濟淮屯盱眙盱眙音吁怡招掠流民衆至七萬分置守宰勸課農桑姚襄所為僅如此而晉人已為之震懼蓋姦雄所竊笑也幷自陳謝使疏吏翻詔以謝尚都督江西淮南諸軍事豫州刺史鎮歷陽以尚得襄之歡心既以招撫之又以備之九年涼右長史趙長等建議以為時難未夷宜立長君難乃旦翻長知兩翻曜靈沖幼請立長寧侯祚張祚先得幸於重華之母馬氏馬氏許之乃廢張曜靈為涼寧侯立祚為大都督大將軍涼州牧涼公祚既得志恣為淫虐殺重華裴氏及謝艾淫者烝其君母虐者殺裴謝艾即此二端他所淫虐又其餘毒也九年燕衞將軍恪撫軍將軍軍左將軍彪嚴彪改彭等屢薦給事黃門侍郎霸有命世之才宜總大任是歲燕主儁以霸為使持節安東將軍北冀州刺史鎮常山冀州刺史鎮信都今置北冀州於常山十年十年春正月張祚自稱涼王改建興四十二年為和平元年河西張氏乃心晉室奉建興年號至四十餘年張祚凶淫改元僭擬祖父之所不相也子太和為太子封弟天錫為長寧侯子庭堅為建康侯建康郡蓋張氏所置張茂分屬涼州靚疾正翻置百官郊祀天地用天子禮樂尚書馬岌切諫坐免官岌魚及翻郎中丁琪復諫曰我自武公以來張軌諡武公復扶又翻抱忠履謙五十餘年履謙謂未嘗建國自王也惠帝永寧元年張軌鎮涼土至是五十四年抗舉世之虜師徒歲起民不告疲殿下勳德未高於先公而亟謀革命臣未見其可也彼士民所以用命四遠所以歸嚮者以吾能奉晉室故也今而自尊則中外離心安能以一隅之地拒天下之強敵乎祚大怒斬之於闕下自古戮諫臣未有不亡者也十年故魏降將周成反周成降見上七年降戶江翻將即亮翻宛於兄翻辛酉河南太守戴施奔鮪渚水經註河水過河南鞏縣北有山臨河謂之崟原丘其下有穴謂之鞏穴言達于河直穴有渚謂之鮪渚鮪于軌翻十年秦丞相雄克司竹胡陽赤奔霸城依呼延毒十年中軍將軍揚州刺史殷浩連年北伐師徒屢敗糧械都盡征西將軍桓溫因朝野之怨上疏數浩之罪請廢之數所具翻朝廷不得已免浩為庶人徙東陽之信安東陽郡本會稽西部都尉吳孫晧寶鼎元年立郡信安縣漢獻帝初平三年分太末立新安縣武帝太康元年更名信安東陽郡唐為婺州信安縣唐為衢州治所史言晉氏失權由用殷浩違其才浩少與溫齊名少詩照翻而心競不相下溫常輕之浩既廢黜雖愁怨不形辭色常書空作咄咄怪事字咄當沒翻咄咄嗟咨語也久之溫謂掾郗超曰掾于絹翻郗丑之翻浩有德有言嚮為令僕足以儀刑百揆朝廷用違其才耳將以浩為尚書令以書告之浩欣然許焉將答書慮有謬誤開閉者十數竟達空函溫大怒由是遂絕卒於徙所以前會稽內史王述為揚州刺史卒子恤翻會工外翻十年二月乙丑桓溫統步騎四萬發江陵水軍自襄陽入均口至南鄉水經註順陽郡筑陽縣有涉都城沔水逕東北均水於縣入沔謂之均口筑陽與南鄉縣漢皆屬南陽郡漢建安中分南陽右壤立南鄉郡二縣屬焉武帝更名順陽郡成帝咸康四年復曰南鄉郡析縣前漢屬弘農郡後漢屬南陽郡春秋之白羽也武關在其西文穎曰武關去析縣百七十里賢曰析即今鄧州內鄉縣後魏置淅川縣有淅水後周併入內鄉縣命勳從梁州出師十年燕衞將軍恪圍魯口三月拔之呂護奔野王遣弟奉表謝罪於燕燕以護為河內太守十年姚襄遣使降燕使疏吏翻降戶江翻十年燕王儁以慕容評為鎮南將軍都督秦雍益梁江揚荊徐兗豫十州諸軍事權鎮洛水雍於用翻以慕容強為前鋒都督督荊徐二州緣淮諸軍事進據河南此河南謂大河之南十年桓溫別將攻上洛獲秦荊州刺史郭敬進擊青泥破之青泥城在藍田縣南涼秦州刺史王擢攻陳倉以應溫趙亡王擢歸張氏故以涼繫之萇仲良翻丞相雄淮南王生平昌王菁北平王碩帥衆五萬軍于嶢柳以拒溫土地記曰藍田縣南有嶢關地名嶢柳道通荊州晉地道記曰關當上洛縣西北帥讀曰率下同嶢五聊翻四月己亥溫與秦兵戰于藍田秦淮南王生單騎突陳騎奇寄翻下同陳讀曰陣出入以十數殺傷晉將士甚衆溫督衆力戰秦兵大敗將軍桓沖又敗秦丞相雄于白鹿原水經註霸川之西有白鹿原三秦記曰麗山西有白鹿原魏收地形志京兆藍田縣有白鹿原又敗補邁翻溫之弟也溫轉戰而前壬寅進至灞上秦太子萇等退屯城南秦主健與老弱六千固守長安小城悉發精兵三萬遣大司馬雷弱兒等與萇合兵以拒溫三輔郡縣皆來降降戶江翻溫撫諭居民使安堵復業民爭持牛酒迎勞勞力到翻男女夾路觀之耆老有垂泣者曰不圖今日復覩官軍復扶又翻秦丞相雄帥騎七千襲司馬勳於子午谷破之勳退屯女媧堡十年戊申燕主儁封撫軍將軍軍為襄陽王左將軍彭為武昌王以衞將軍恪為大司馬侍中大都督錄尚書事封太原王鎮南將軍評為司徒驃騎將軍封上庸王驃匹妙翻封安東將軍霸為吳王左賢王友為范陽王散騎常侍厲為下邳王散騎常侍宜為廬江王散悉亶翻樂浪音洛琅又封弟桓為宜都王逮為臨賀王徽為河間王龍為歷陽王納為北海王秀為蘭陵王嶽為安豐王德為梁公默為始安公僂為南康公僂隴主翻子咸嚴咸改臧參考後卷咸當作臧為樂安王亮為勃海王溫為帶方王涉為漁陽王暐為中山王以尚書令陽騖為司空仍守尚書令命冀州刺史吳王霸徙治信都去年霸治常山燕王皝奇霸之才故名之曰霸將以為世子㣥臣諫而止然寵遇猶踰於世子由是儁惡之惡烏路翻下同以其嘗墜馬折齒更名曰更工衡翻下同傾雪翻尋以其應讖文更名曰垂遷侍中錄留臺事徙鎮龍城垂大得東北之和儁愈惡之復召還儁雖忌垂卒之復燕祚者垂也天之所置其可廢乎十年五月江西流民郭敞等章十二行本等下有千餘人三字乙十一行本同孔本同執陳留內史劉仕降于姚襄晉南渡後陳留郡寄治譙郡長垣縣界按載記劉仕時在堂邑以吏部尚書周閔為中軍將軍屯中堂豫州刺史謝尚自歷陽還衞京師固江備守十年王擢拔陳倉殺秦扶風內史毛難十年北海王猛少好學少詩照翻好呼到翻倜儻有大志不屑細務人皆輕之猛悠然自得隱居華陰王猛傳猛北海劇人家于魏郡徐統召而不應遂隱于華陰山華陰縣前漢屬京兆後漢晉屬弘農郡倜他狄翻華戶化翻披褐詣之捫蝨而談當世之務褐毛布蝨色櫛翻溫異之問曰吾奉天子之命將銳兵十萬為百姓除殘賊將即亮翻為于偽翻而三秦豪傑未有至者何也猛曰公不遠數千里深入敵境今長安咫尺而不渡灞水百姓未知公心所以不至溫嘿然無以應徐曰江東無卿比也猛蓋指出溫之心事以為溫之伐秦但欲以功名鎮服江東非真有心於伐罪弔民恢復境土不然何以不渡灞水徑攻長安此溫所以無以應也然余觀桓溫用兵伐秦至灞上伐燕至枋頭皆乘勝進兵逼其國都乃持重觀望卒以取敗蓋溫姦雄也乘勝進兵逼其國都冀其望風畏威有內潰之變也逼其國都而敵無內變故持重以待之情見勢屈敵因而乘之故至於敗蘇子由所謂以智遇智則其智不足恃者此也溫與秦丞相雄等戰于白鹿原溫兵不利死者萬餘人初溫指秦麥以為糧既而秦人悉芟麥清野以待之溫軍乏食六月丁丑徙關中三千餘戶而歸以王猛為高官督護職為督護而加之以高官也魏晉之間凡居節鎮者其部將有督護其後又置高官督護王敦鎮武昌有高官督護繆坦猛辭不就猛不肯從溫溫豈不欲殺之邪蓋溫軍已敗怱怱退師不暇殺之也呼延毒帥衆一萬從溫還帥讀曰率秦太子萇等隨溫擊之比至潼關比必寐翻溫軍屢敗失亡以萬數溫之屯灞上也順陽太守薛珍勸溫徑進逼長安成帝改順陽曰南鄉郡既而復舊珍以偏師獨濟頗有所獲及溫退乃還顯言於衆自矜其勇而咎溫之持重溫殺之十年秦丞相雄擊司馬勳王擢於陳倉勳自女媧堡會擢攻陳倉擢奔略陽十年秦以光祿大夫趙俱為洛陽章十二行本陽作州乙十一行本同孔本同張校同刺史鎮宜陽十年秦東海敬武王雄攻喬秉于雍雍於用翻丙申卒秦主健哭之嘔血曰天不欲吾平四海邪何奪吾元才之速也苻雄字元才葬禮依晉安平獻王故事雄以佐命元勳章十二行本勳下有位兼將相四字乙十一行本同退齋校同權侔人主而謙恭汎愛遵奉法度故健重之常曰元才吾之周公也子堅襲爵堅襲爵東海王幼有志度博學多能交結英豪呂婆樓強汪及略陽梁平老皆與之善苻堅事始此十年燕樂陵太守慕容鉤翰之子也慕容翰有破高句麗滅宇文之功厭於琰翻鉤自恃宗室每陵侮禿禿不勝忿勝音升秋七月襲鉤殺之南奔段龕為後燕主誅禿張本十年秦太子萇攻喬秉于雍八月斬之關中悉平秦主健賞拒桓溫之功以雷弱兒為丞相毛貴為太傅魚遵為太尉淮南王生為中軍大將軍平昌王菁為司空健勤於政事數延公卿數所角翻咨講治道治直吏翻承趙人苛虐奢侈之後易以寬簡節儉崇禮儒士由是秦人悅之十年燕大調兵衆調徒釣翻發也因發詔之日號曰丙戌舉十年九月桓溫還自伐秦帝遣侍中黃門勞溫于襄陽侍中黃門侍郎自魏以來為要近之職勞力到翻十年或告燕黃門侍郎宋斌等謀奉冉智為主而反皆伏誅斌燭之子也宋燭見九十六卷成帝咸康四年斌音彬十年秦太子萇之拒桓溫也為流矢所中中竹仲翻冬十月卒諡曰獻哀十年燕王儁如龍城十年桓溫之入關也王擢遣使告涼王祚使疏吏翻言溫善用兵其志難測祚懼且畏擢之叛己遣人刺之刺七亦翻事泄祚益懼大發兵聲言東伐實欲西保敦煌敦徒門翻會溫還而止既而遣秦州刺史牛霸等帥兵三千擊擢破之十一月擢帥衆降秦帥讀曰率降戶江翻秦以擢為尚書以上將軍啖鐵為秦州刺史啖氐姓也毛晃曰音徒覽翻十年秦王健叔父武都王安自晉還健遣安來請朝命見上卷六年以為洛州刺史十二月安亡歸秦健以安為大司馬驃騎大將軍幷州刺史鎮蒲阪驃匹妙翻十年是歲秦大饑米一升直布一匹王崇武標點容肇祖聶崇岐覆校
