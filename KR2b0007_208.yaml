body:
  text: 資治通鑑卷第二百八端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀二十四中宗大和大聖大昭孝皇帝中神龍元年神龍元年乙巳七五神龍元年二月辛亥帝帥百官詣上陽宮問太后起居帥讀曰率考異曰實録唐曆皆云乙亥誤也當是辛亥自是每十日一往神龍元年甲寅復國號曰唐天授元年武后更國號曰周今復舊幟昌志翻復以神都為東都光宅元年改東都曰神都復扶又翻又如字天授元年以並州為北都並卑經翻高宗乾封元年上老子尊號曰玄元皇帝武后革命改曰老君神龍元年乙卯鳳閣侍郎同平章事韋承慶貶高要尉高要縣帶端州至京師五千七百五十里東都五千一百五十里流高州舊志高州京師南六千二百六十二里至東都五千五百二十里舊志欽州至京師五千二百五十一里尚辰羊翻守手又翻太后之遷上陽宮也見上卷是年正月桓彥範張柬之謂曰今日豈公涕泣時邪恐公禍由此始元之曰元之事則天皇帝久乍此辭違悲不能忍且元之前日從公誅姦逆人臣之義也今日別舊君亦人臣之義也雖獲罪實所甘心是日出為亳州刺史此姚元之所以為多智也舊志亳州至京師一千七百里至東都八百九十八里神龍元年甲子立韋氏為皇后赦天下追贈后父玄貞為上洛王母崔氏為左拾遺賈虛己上疏以為異姓不王古今通制上時掌翻疏所去翻今中興之始萬姓喁喁喁魚容翻以觀陛下之政而先王后族王于況翻非所以廣德美於天下也且先朝贈后父太原王高宗贈武后父士彠太原郡王朝直遙翻須防其漸若以恩制已行宜令皇后固讓則益增謙沖之德矣不聽初韋后生邵王重潤長寧安樂二公主重直龍翻樂音洛上之遷房陵也遷房陵見二百三卷光宅元年垂拱元年上特愛之上在房陵與后同幽閉備嘗艱危情愛甚篤上每聞敕使至輒惶恐欲自殺使疏吏翻后止之曰禍福無常寧失一死何遽如是上嘗與后私誓曰異時幸復見天日復扶又翻又如字當惟卿所欲不相禁制及再為皇后遂干預朝政如武后在高宗之世桓彥範上表以為易稱無攸遂在中饋貞吉易家人卦六二爻辭王弼注曰六二居內處中履得其位以陰應陽盡婦人之正義無所必遂職乎中饋巽順而已是以貞吉也朝直遙翻上時掌翻惟家之索書牧誓之辭辰作晨孔安國曰索盡也喻婦人知外事雌代雄鳴則家盡婦奪夫政則國亡索西各翻朝直遙翻皇后必施帷幔坐殿上幔莫半翻預聞政事臣竊觀自古帝王未有與婦人共政而不破國亡身者也且以陰乘陽違天也以婦陵夫違人也伏願陛下覽古今之戒以社稷蒼生為念令皇后專居中宮治陰教記曰天子聽男教后聽女順天子理陽道后治陰德天子聽外治后聽內職教順成俗外內和順國家理治此之謂盛德治直之翻朝直遙翻先是胡僧慧範以妖妄遊權貴之門與張易之兄弟善韋后亦重之及易之誅復稱慧範預其謀以功加銀青光祿大夫賜爵上庸縣公出入宮掖上數微行幸其舍彥範復表言慧範執左道以亂政請誅之先悉薦翻復扶又翻數所角翻下又數同記王制執左道以亂政者殺上皆不聽神龍元年初武后誅唐宗室有才德者先死惟吳王恪之子鬱林侯千里褊躁無才躁則到翻又數獻符瑞故獨得免上即位立為成王拜左金吾大將軍武后所誅唐諸王主駙馬等皆無人葬埋子孫或流竄嶺表或拘囚歷年或逃匿民間為人傭保至是制州縣求訪其柩以禮改葬柩音舊追復官爵召其子孫使之承襲無子孫者為擇後置之既而宗室子孫相繼而至皆召見為于偽翻見賢遍翻涕泣舞蹈各以親疏襲爵拜官有差神龍元年二張之誅也洛州長史薛季昶謂張柬之敬暉曰二凶雖除産祿猶在産祿謂武三思等終當復生去羌呂翻復扶又翻下可復同二人曰大事已定彼猶機上肉耳夫何能為所誅已多不可復益也季昶歎曰吾不知死所矣朝邑尉武強劉幽求武強縣漢河間之武隧也晉更名屬武邑郡唐屬冀州朝直遙翻武三思尚存公輩終無葬地若不早圖噬臍無及不從左傳鄧三甥勸鄧侯殺楚子曰若不早圖後君噬臍考異曰御史臺記曰張柬之勒兵於景運門將收諸武誅之彥範以事既竟不欲廣誅遽解其兵柬之固爭不果狄梁公傳曰袁謂張公曰昔有遺言使先收梁王武三思豈可捨諸張公曰但大事畢功此皆機上之物豈有逃乎按舊唐書薛季昶傳敬暉傳唐統紀唐曆狄梁公傳皆云張柬之敬暉不欲誅武三思唯御史臺記以為柬之固爭而彥範不從新唐書彥範傳亦云薛季昶勸誅三思會日暮事遽彥範不欲廣殺因曰三思機上肉耳留為天子藉手季昶歎曰吾無死所矣按柬之時為宰相首建此謀當是與桓敬等皆不可不應獨由彥範也上女安樂公主適三思子崇訓上官婉兒儀之女孫也儀死上官儀死見二百一卷高宗麟德元年辨慧善屬文屬之欲翻明習吏事則天愛之自聖曆以後百司表奏多令參決及上即位又使專掌制命益委任之拜為婕妤婕妤音接豫用事於中三思通焉故黨於武氏又薦三思於韋后引入禁中上遂與三思圖議政事張柬之等皆受制於三思矣考異曰舊傳云誅易之明日三思因韋后之助潛入宮中內行相事反易國政居數日五王皆失柄受制於三思矣事似傷速今微加刪改雙陸者投瓊以行十二棋各行六棋故謂之雙陸三思遂與后通由是武氏之勢復振張柬之等數勸上誅諸武上不聽為于偽翻復扶又翻又如字數所角翻下上數同柬之等曰革命之際宗室諸李誅夷略盡今賴天地之靈陛下返正而武氏濫官僭爵按堵如故豈遠近所望邪願頗抑損其祿位以慰天下又不聽柬之等或撫牀歎憤或彈指出血曰主上昔為英王時稱勇烈吾所以不誅諸武者欲使上自誅之以張天子之威耳張知亮翻今反如此事勢已去知復奈何復扶又翻上數微服幸武三思第監察御史清河崔皎密疏諫曰清河漢縣後漢和帝改曰甘陵晉復舊名唐帶貝州國命初復則天皇帝在西宮上陽宮在洛陽宮城之西故曰西宮周之舊臣列居朝廷陛下奈何輕有外遊不察豫且之禍白龍魚服見困豫且且子余翻三思之黨切齒丙寅以太子賓客武三思為司空同中書門下三品神龍元年左散騎常侍譙王重福上之庶子也散悉亶翻騎奇寄翻重直龍翻下同張易之之甥韋后惡之惡烏路翻譖於上曰重潤之死重福為之也重潤死見上卷長安元年又改均州刺史舊志濮州京師東北一千五百七十里至東都七百二十五里均州京師東南九百三十里至東都九百一十七里神龍元年丁卯以右散騎常侍安定王武攸暨為司徒定王神龍元年辛未相王固讓太尉及知政事許之又立為皇太弟相王固辭而止相息亮翻神龍元年甲戌以國子祭酒始平祝欽明同中書門下三品黃門侍郎知侍中事韋安石為刑部尚書罷知政事神龍元年丁丑武三思武攸暨固辭新官爵及政事許之並加開府儀同三司神龍元年立皇子義興王重俊為衛王北海王重茂為溫王仍以重俊為洛州牧重直龍翻神龍元年三月甲申制文明已來破家子孫皆復舊資廕唯徐敬業裴炎不在免限韋武之意也神龍元年丁亥制酷吏周興來俊臣等已死者追奪官爵存者皆流嶺南惡地按舊書此時酷吏之存者唐奉一李秦授曹仁哲神龍元年己丑以袁恕己為中書令神龍元年以安車徵安平王武攸緒於嵩山武攸緒隱嵩山見二百五卷萬歲通天元年除太子賓客固請還山許之神龍元年制梟氏蟒氏皆復舊姓梟蟒氏見二百卷高宗永徽六年梟工堯翻神龍元年術士鄭普思尚衣奉御葉靜能葉舊音攝後音木葉之葉吳志孫晧傳有都尉葉雄皆以妖妄為上所信重妖於喬翻夏四月墨敕以普思為祕書監靜能為國子祭酒墨敕出於禁中不由中書門下上曰已用之無容遽改彥範曰陛下初即位下制云政令皆依貞觀故事貞觀中魏徵虞世南顏師古為祕書監孔穎達為國子祭酒豈普思靜能之比乎庚戌左拾遺李雍上疏以為詩三百一言以蔽之曰思無邪引論語孔子之言上時掌翻疏所去翻則秦始皇漢武帝得之矣佛能為人福利則梁武帝得之矣堯舜所以為帝王首者亦修人事而已尊寵此屬何補於國上皆不聽神龍元年上即位之日驛召魏元忠於高要魏元忠貶見上卷長安三年丁卯至都拜衛尉卿同平章事神龍元年甲戌以魏元忠為兵部尚書韋安石為吏部尚書李懷遠為右散騎常侍唐休璟為輔國大將軍璟俱永翻崔玄暐檢校益府長史楊再思檢校楊府長史祝欽明為刑部尚書並同中書門下三品元忠等皆以東宮舊僚褒之也史言中宗命相非以德授神龍元年乙亥以張柬之為中書令神龍元年戊寅追贈故邵王重潤為懿德太子神龍元年五月壬午遷周廟七主於西京崇尊廟周立七廟見二百四卷武后天授元年崇尊廟見天授二年武氏三代諱奏事者皆不得犯神龍元年乙酉立太廟社稷於東都神龍元年以張柬之等及武攸暨武三思鄭普思等十六人皆為立功之人賜以鐵券自非反逆各恕十死神龍元年癸巳敬暉等帥百官上表以為五運迭興五運謂五德之運帥讀曰率天授革命之際宗室誅竄殆盡豈得與諸武並封今天命惟新而諸武封建如舊並居京師開闢以來未有斯理願陛下為社稷計順遐邇心降其王爵以安內外上不許敬暉等畏武三思之讒以考功員外郎崔湜為耳目伺其動靜湜常職翻伺相吏翻湜見上親三思而忌暉等乃悉以暉等謀告三思反為三思用三思引為中書舍人湜仁師之孫也崔仁師見一百九十二卷太宗貞觀元年先是殿中侍御史南皮鄭愔諂事二張南皮縣漢屬勃海郡唐武德初屬景州貞觀初屬滄州先悉薦翻愔於今翻貶宣州司士參軍坐贓亡入東都舊志宣州至東都二千五百一十里初見三思哭甚哀既而大笑三思素貴重甚怪之愔曰始見大王而哭哀大王將戮死而滅族也後乃大笑喜大王之得愔也大王雖得天子之意彼五人皆據將相之權五人謂張柬之敬暉桓彥範崔玄暐袁恕己也廢太后如反掌大王自視勢位與太后孰重彼五人日夜切齒欲噬大王之肉非盡大王之族不足以快其志大王不去此五人危如朝露去羌呂翻朝露易晞而晏然尚自以為泰山之安此愔所以為大王寒心也為于偽翻下因為同三思大悅與之登樓問自安之策引為中書舍人與崔湜皆為三思謀主三思與韋后日夜譖暉等云恃功專權將不利於社稷上信之三思等因為上畫策不若封暉等為王罷其政事外不失尊寵功臣內實奪之權上以為然甲午以侍中齊公敬暉為平陽王桓章十二行本桓上有譙公二字乙十一行本同孔本同張校同彥範為扶陽王中書令漢陽公張柬之為漢陽王南陽公袁恕己為南陽王特進同中書門下三品博陵公崔玄暐為博陵王考異曰統紀曰太后善自粉飾雖子孫在側不覺其衰老及在上陽宮不復櫛頮形容羸悴上入見大驚太后泣曰我自房陵迎汝來固以天下授汝矣而五賊貪功驚我至此上悲泣不自勝伏地拜謝死罪由是三思等得入其謀按中宗頑鄙不仁太后雖毀容涕泣未必能感動移其意其所以疏忌五王自用韋后三思之言耳今不取五王尊卑先後不定實録誅張易之時以張柬之為首賜鐵券以崔玄暐為首封王及謫為司馬長流皆以敬暉為首舊傳及開元復官詔並以桓彥範為首按長安四年六月玄暐為鸞臺侍郎平章事十月張柬之自秋官侍郎同平章事十一月守鳳閣侍郎誅易之時唯此二人為相神龍元年正月袁恕己自司刑少卿為鳳閣侍郎同平章事庚戌張柬之為夏官尚書玄暐守內史敬暉桓彥範並為納言三月恕己守中書令四月柬之為中書令敬暉為侍中五王遷轉先後如此疑實録但以誅易之時柬之首謀故以柬之為首暉與彥範同為侍中疑侍中在中書令上故削諸武表及罷政事皆以暉為首賜鐵券時玄暐已加特進暉等罷政方加特進而玄暐如舊疑特進雖散階而品秩最高故以玄暐為首彥範與暉同為侍中而彥範被禍最酷疑開元詔及史官特以為首未必以當時位次也天后中宗時侍中疑在中書令上賜金帛鞍馬令朝朔望朝直遙翻仍賜彥範姓韋氏與皇后同籍尋又以玄暐檢校益州長史知都督事又改梁州刺史益州京師西南二千三百七十九里至東都三千二百一十六里梁州至京師一千二百二十三里東都二千七十八里復扶又翻下溫復同不附武氏者斥之為五王所逐者復之大權盡歸三思矣五王之請削武氏諸王也求人為表衆莫肯為中書舍人岑羲為之語甚激切中書舍人偃師畢構次當讀表辭色明厲三思既得志羲改祕書少監出構為潤州刺史潤州京師東南二千八百二十一里至東都一千七百九十七里易州刺史趙履溫桓彥範之妻兄也彥範之誅二張稱履溫預其謀召為司農少卿履溫以二婢遺彥範遺于季翻及彥範罷政事履溫復奪其婢上嘉宋璟忠直屢遷黃門侍郎武三思嘗以事屬璟屬之欲翻璟正色拒之曰今太后既復子明辟王當以侯就第何得尚干朝政朝直遙翻獨不見産祿之事乎神龍元年以韋安石兼檢校中書令魏元忠兼檢校侍中又以李湛為右散騎常侍趙承恩為光祿卿楊元琰為衛尉卿先是元琰知三思浸用事請棄官為僧上不許敬暉聞之笑曰使我早知勸上許之髡去胡頭豈不妙哉先悉薦翻去羌呂翻元琰多鬚類胡故暉戲之元琰曰功成名遂不退將危此乃由衷之請衷誠也由衷言出於誠心暉知其意瞿然不悅瞿九遇翻瞿然驚視貌及暉等得罪元琰獨免神龍元年上官婕妤勸韋后襲則天故事上表請天下士庶為出母服喪三年上時掌翻為于偽翻所以感動帝心令其念武后也又請百姓年二十三為丁五十九免役唐制二十一為丁六十為老制皆許之神龍元年癸卯制降諸武梁王三思為德靜王定王攸暨為樂壽王皆降封縣王也德靜縣屬夏州樂壽縣屬深州以厭人心樂音洛厭於協翻神龍元年甲辰以唐休璟為左僕射同中書門下三品如故璟俱永翻豆盧欽望為右僕射神龍元年六月壬子以左驍衛大將軍裴思説充靈武軍大總管以備突厥驍堅堯翻説讀曰悅厥九勿翻神龍元年癸亥命右僕射豆盧欽望有軍國重事中書門下可共平章先是僕射為正宰相先悉薦翻其後多兼中書門下之職午前決朝政朝直遙翻午後決省事省事尚書省事也欽望專為僕射不敢預政事故有是命是後專拜僕射者不復為宰相矣復扶又翻又以韋安石為中書令魏元忠為侍中楊再思檢校中書令神龍元年丁卯祔孝敬皇帝於太廟號義宗故太子弘諡孝敬皇帝帝兄也神龍元年戊辰洛水溢流二千餘家神龍元年秋七月辛巳以太子賓客韋巨源同中書門下三品西京留守如故守式又翻神龍元年特進漢陽王張柬之表請歸襄州養疾乙未以柬之為襄州刺史不知州事給全俸唐制特進正二品郡王從一品從品高給一品月俸八千食料一千八百雜用一千二百上州刺史從三品月俸五千一百雜用九百神龍元年河南北十七州大水八月戊申以水災求直言右衛騎曹參軍西河宋務光上疏唐諸衛府有倉兵騎胄四曹參軍騎曹參軍掌外內雜畜簿帳牧養凡府馬承直以遠近分七番月一易之以敕出宮城者給馬西河縣屬汾州騎奇寄翻上時掌翻疏所去翻水陰類臣妾之象恐後庭有干外朝之政者朝直遙翻宜杜絶其萌今霖雨不止乃閉坊門以禳之至使里巷謂坊門為宰相言朝廷使之燮理陰陽也宋白曰唐制久雨則閉坊市北門以祈晴太子國本宜早擇賢能而立之又外戚太盛如武三思等宜解其機要厚以祿賜又鄭普思葉靜能以小技竊大位亦朝政之蠹也疏奏不省技渠綺翻朝直遙翻省悉景翻神龍元年壬戌追立趙氏為恭皇后趙死見二百二卷高宗上元二年考異曰舊本紀云甲子今從實録神龍元年九月壬午上祀昊天上帝皇地祇于明堂以高宗配神龍元年初上在房陵州司制約甚急刺史河東張知謇靈昌崔敬嗣河東舊蒲阪也帶河東郡隋廢郡改蒲阪為河東縣唐因之帶蒲州隋分酸棗縣置靈昌縣因河津以為名唐屬滑州謇九輦翻供給豐贍贍而豔翻上德之擢知謇自貝州刺史為左衛將軍賜爵范陽公敬嗣已卒求得其子汪嗜酒不堪釐職除五品散官唐六典隋煬帝置朝請大夫為正五品散官隋文帝置朝散大夫為正四品散官煬帝改從五品下神龍元年改葬上洛王韋玄貞其儀皆如太原王故事武士彠封太原王神龍元年癸巳太子賓客同中書門下三品韋巨源罷為禮部尚書以其從父安石為中書令故也從才用翻神龍元年以左衛將軍上邽紀處訥兼檢校太府卿處訥娶武三思之妻姊故也處昌呂翻神龍元年冬十月命唐休璟留守京師守式又翻神龍元年癸亥上幸龍門乙丑獵於新安而還還從宣翻又如字神龍元年辛未以魏元忠為中書令楊再思為侍中神龍元年十一月戊寅㣥臣上皇帝尊號曰應天皇帝皇后曰順天皇后上時掌翻壬午上與后謁謝太廟赦天下相王太平公主加實封皆滿萬戶相息亮翻神龍元年己丑上御洛城南樓洛陽皇城之西南曰洛城門門內即洛城殿潑寒胡戲即乞寒胡戲本出於胡中西域康國十一月鼓舞乞寒以水交潑為樂武后末年始以季冬為之以為謀時寒若清源縣屬並州隋於古梗陽城置以水為名書洪範曰謀時寒若注云君能謀則時寒順之若順也上時掌翻疏所去翻鼓舞衢路以索之裸郎果翻索山客翻疏奏不納神龍元年壬寅則天崩於上陽宮年八十二遺制去帝號去羌呂翻稱則天大聖皇后王蕭二族及褚遂良韓瑗柳奭親屬皆赦之武后之立也王皇后蕭淑幽廢不得良死褚遂良韓瑗以諫死柳奭以王后親屬死其親屬皆流竄上居諒陰以魏元忠攝冢宰三日元忠素負忠直之望中外賴之武三思憚之矯太后遺制慰諭元忠賜實封百戶元忠捧制感咽涕泗見者曰事去矣知其不敢復論武氏事也十二月丁卯上始御同明殿見㣥臣見賢遍翻六典東都皇宮南面三門中曰應天左曰興教右曰光政光政之北曰明福明福之西曰崇賢門其內曰集賢殿集賢之東曰億歲殿又東曰同明殿神龍元年太后將合葬乾陵給事中嚴善思上疏以為乾陵玄宮以石為門鐵錮其縫縫扶用翻今啓其門必須鐫鑿神明之道體尚幽玄動衆加功恐多驚黷況合葬非古漢時諸陵皇后多不合葬魏晉已降始有合者望於乾陵之傍更擇吉地為陵若神道有知幽塗自當通會若其無知合之何益不從神龍元年是歲戶部奏天下戶六百一十五萬口三千七百一十四萬有畸二年神龍二年春正月戊戌以吏部尚書李嶠同中書門下三品中書侍郎于惟謙同平章事神龍二年閏月丙午制太平長寧安樂宜城新都定安金城公主並開府置官屬自長寧以下皆皇女也樂音洛神龍二年武三思以敬暉桓彥範袁恕己尚在京師忌之乙卯出為滑洺豫三州刺史舊志滑州去京師一千四百四十里東都五百三十里洺州京師東北一千五百八十五里至東都八百五十七里豫州去京師一千五百四十里至東都六百七十里考異曰實録新紀新舊列傳皆不見崔玄暐及暉等出為刺史年月惟舊紀及統紀唐曆有此三人蓋玄暐先已出矣但不知何時然暉等貶為司馬時乃刺朗亳郢均四州蓋於後又經遷徙矣唐曆統紀以為在王同皎誅後今從之神龍二年賜閺鄉僧萬回號法雲公萬回姓張氏初母祈於觀音像而妊回回生而愚八九歲乃能語雖父母亦以豚犬畜之其兄戍役於安西音問隔絶父母遣其問訊一日朝齎所備而往夕返其家父母異之弘農去安西萬里以其萬里而回因號萬回武后賜之錦袍金帶神龍二年甲戌以突騎施酋長烏質勒為懷德郡王騎奇寄翻酋長上慈由翻下知兩翻神龍二年二月乙未以刑部尚書韋巨源同中書門下三品仍與皇后敘宗族神龍二年丙申僧慧範等九人並加五品階賜爵郡縣公道士史崇恩等加章十一行本加上有三人二字乙十一行本同五品階除國子祭酒同正唐會要曰永徽五年蔣孝璋除尚藥奉御員外特置仍同正員員外官自此始也神龍二年選左右臺及內外五品以上官二十人為十道巡察使使疏吏翻委之察吏撫人薦賢直獄二年一代考其功罪而進退之易州刺史魏人薑師度禮部員外郎馬懷素殿中侍御史臨漳源乾曜監察御史靈昌盧懷慎衛尉少卿滏陽李傑皆預焉魏縣漢屬魏郡時屬魏州晉愍帝諱鄴改鄴為臨漳時鄴城已淪覆矣後趙復為鄴縣東魏分鄴內黃斥丘肥鄉置臨漳縣屬魏郡周隋唐屬相州滏陽漢武安縣地後周置滏陽縣屬相州滏音釜神龍二年三月甲辰中書令韋安石罷為戶部尚書戶部尚書蘇王褱為侍中西京留守守手又翻王褱頲之父也頲他鼎翻唐休璟致仕神龍二年初少府監丞弘農宋之問及弟兗州司倉之遜弘農縣帶虢州治弘農川唐制倉曹司倉參軍事掌租調公廨庖廚倉庫市肆逃歸東都匿於友人光祿卿駙馬都尉王同皎家同皎疾武三思及韋后所為每與所親言之輒切齒之遜於簾下聞之密遣其子曇及甥校書郎李悛告三思欲以自贖三思使曇悛及撫州司倉冉祖雍撫州漢南昌南城縣地吳孫亮分置臨川郡隋平陳置撫州曇徒含翻悛丑緣翻壽春縣漢屬淮南郡晉避鄭太后諱改曰壽陽隋復曰壽春縣帶壽州憬俱永翻謀殺三思因勒兵詣闕廢皇后上命御史大夫李承嘉監察御史姚紹之按其事又命楊再思李嶠韋巨源參驗仲之言三思罪狀事連宮壼壼苦本翻再思巨源陽寐不聽嶠與紹之命反接送獄仲之還顧言不已紹之命檛之折其臂仲之大呼曰檛則瓜翻折而設翻呼火故翻吾已負汝死當訟汝於天庚戌同皎等皆坐斬考異曰御史臺記曰同皎與張仲之等謀誅三思為宋曇所發御史大夫李承嘉御史姚紹之按問事連椒宮內敕宰相問對諸宰佯假寐無所聞獨嶠與承嘉竊議同皎仲之等遇族又曰張仲之等謀誅武三思宋之遜子曇知其謀將發之未果會冉祖雍李恮於路白之雍恮以聞又曰張仲之宋之遜祖延慶謀於衣袖中發銅弩射三思伺其便未果之遜子曇密發之敕李承嘉與紹之按於新開門內初紹之將直其事未定敕宰相對問諸相畏三思但僶俯佯不聞仲之延慶言諸相中有附會三思者屢與承嘉耳言復説誘紹之事乃變遂密置人力十餘命引仲之對問至則塞口反接送繫所紹之還謂仲之曰張三事不諧矣仲之固言三思反狀紹之命檛之而臂折仲之大呼天者六七謂紹之反賊我臂且折矣已輸你當訴爾於天曹乃自誣反而遇族朝野僉載曰初之遜諂附張易之兄弟出為兗州司倉遂亡歸王同皎匿之於小房皎慷慨之士也忿逆韋與武三思亂國與一二所親論之每至切齒之遜於簾下竊聽之遣姪曇上書告之以希逆韋之旨武三思等果大怒奏誅同皎之黨實録同皎與周憬等潛謀誅三思乃招集將士期以則天靈駕發引因劫殺三思李悛等知而告三思三思因言同皎等謀反竟坐斬唐曆統紀亦與實録略同而云仲之誤泄於友人宋之問之問偽應之祖雍之遜亦預其謀既而背之李悛之問甥也命以告三思因言同皎謀反舊傳云之問左遷瀧州參軍未幾逃還匿於張仲之家仲之與同皎等謀殺武三思之問令兄子發其事以自贖及同皎等獲罪起之問為鴻臚主簿按三思得幸於中宗韋后權傾天下同皎等若亶殺之豈得晏然無事苟無脅君之志豈得輕為此謀又云袖中發銅弩此則殆同兒戲蓋忿疾三思或與仲之憬等有欲殺之言而之遜等以告三思三思因教曇等誣告同皎云謀於靈駕發引日劫殺三思因廢皇后謀反耳今從僉載周憬亡入比干廟中大言曰比干古之忠臣知吾此心三思與皇后淫亂傾危國家行當梟首都市恨不及見耳遂自剄梟堅堯翻剄古頂翻之問之遜曇悛祖雍並除京官京官謂在京職官也亦謂之京司官朝直遙翻散悉亶翻神龍二年武三思與韋后日夜譖敬暉等不已復左遷暉為朗州刺史崔玄暐為均州刺史桓彥範為亳州刺史袁恕己為郢州刺史郢州漢竟陵縣地江左置竟陵郡西魏置溫州後周置郢州復扶又翻章十二行本皆上有薛思行等四字乙十一行本同孔本同張校同退齋校同以為黨與坐貶神龍二年大置員外官自京司及諸州凡二千餘人宦官超遷七品以上員外官者又將千人魏元忠自端州還為相魏元忠先貶高要尉高要縣帶端州相息亮翻復扶又翻惟與時俯仰中外失望酸棗尉袁楚客酸棗縣漢晉屬陳留郡後齊廢隋開皇六年復置屬鄭州唐屬滑州以為主上新服厥命惟新厥德引書咸有一德之文退小人以興大化豈可安其榮寵循默而已今不早建太子擇師傅而輔之一失也公主開府置僚屬二失也崇長緇衣使遊走權門借勢納賂三失也俳優小人盜竊品秩四失也有司選進賢才皆以貨取勢求五失也寵進宦者殆滿千人為長亂之階六失也長知兩翻王公貴戚賞賜無度競為侈靡七失也廣置員外官傷財害民八失也先朝宮女得自便居外出入無禁交通請謁九失也九失指言上官婕妤賀婁尚宮之類朝直遙翻熒惑主聽盜竊祿位十失也十失指言葉靜能鄭普思之類君侯不正誰與正之哉元忠得書愧謝而已神龍二年夏四月改贈后父韋玄貞為酆王后四弟皆贈郡王四弟洵浩洞泚也神龍二年己丑左散騎常侍同中書門下三品李懷遠致仕神龍二年處士韋章十二行本韋上有京兆二字乙十一行本同孔本同月將上書告武三思潛通宮掖必為逆亂處昌呂翻上大怒命斬之黃門侍郎宋璟奏請推按璟俱永翻上益怒不及整巾屣履出側門側門非正出之門程大昌曰唐大明宮朝堂外左右金吾仗之側有曰側門者以其在端門旁側也以長安大明宮之側門推之則洛陽宮之側門從可知也屣所徙翻履不躡跟也朕謂已斬乃猶未邪命趨斬之趨與趣同尺玉翻璟曰人言宮中私於三思陛下不問而誅之臣恐天下必有竊議固請按之上不許璟曰必欲斬月將請先斬臣不然臣終不敢奉詔上怒少解少詩沼翻左御史大夫蘇珦珦式亮翻給事中徐堅大理卿長安尹思貞皆以為方夏行戮有違時令上乃命與杖流嶺南過秋分一日平曉廣州都督周仁軌斬之考異曰朝野僉載曰周仁軌過秋分一日平曉斬之有敕捨之而不及統紀月將死附於此年末唐紀在二月舊傳唐曆皆在五王死後按此年七月殺敬暉等若在後徐堅表不得云朱夏在辰思貞不得云發生之月也今約其事附於此月神龍二年御史大夫李承嘉附武三思詆尹思貞於朝朝直遙翻思貞曰公附會姦臣將圖不軌先除忠臣邪承嘉怒劾奏思貞出為青州刺史舊志青州京師東北二千五百二十里至東都一千五百七里公平日訥於言及廷折承嘉何其敏邪折之舌翻思貞曰物不能鳴者激之則鳴承嘉恃威權相陵僕義不受屈亦不知言之從何而至也神龍二年武三思惡宋璟惡烏路翻出之檢校貝州刺史舊志貝州京師東北一千七百八十二里至東都九百九十三里神龍二年五月庚申葬則天大聖皇后於乾陵神龍二年武三思使鄭愔告朗州刺史敬暉亳州刺史韋彥範桓彥範時賜姓韋因而稱之愔於今翻亳旁各翻六月戊寅貶暉崖州司馬彥範瀧州司馬柬之新州司馬恕己竇州司馬玄暐白州司馬瀧所江翻白州漢合浦縣地武德初置南州仍分合浦置博白縣六年改曰白州考異曰唐曆統紀皆於王同皎誅後即云三思令宣州司功鄭愔誣柬之等與王同皎謀反又貶玄暐等四人為僻遠州刺史按愔若於時已告云謀反則豈應猶得刺史又云告柬之等而柬之豈得獨不貶今從實録並員外置仍長任削其勳封復彥範姓桓氏神龍二年初韋玄貞流欽州而卒流欽州見二百三卷武后光宅元年卒子恤翻酋慈由翻妻崔氏不與承基等殺之及其四男洵浩洞泚洵音荀泚且禮翻上命廣州都督周仁軌使將兵二萬討之將即亮翻承基等亡入海仁軌追斬之以其首祭崔氏墓殺掠其部衆殆盡上喜加仁軌鎮國大將軍唐武散官無鎮國大將軍蓋中宗創置以寵仁軌也五府廣桂雍容瓊五都督府也使疏吏翻韋后隔簾拜仁軌以父事之及韋后敗仁軌以黨與誅考異曰朝野僉載曰韋氏遭則天廢廬陵之後后父韋玄貞與妻女等並流嶺南被首領寧氏大族逼奪其女不伏遂殺貞夫妻七娘等並奪去及孝和即位皇后當途廣州都督周仁軌將兵誅寧氏走入南海軌追之殺掠並盡韋后隔簾拜以父事之用為並州長史後阿韋作逆軌以黨與誅今從實録參取諸書神龍二年秋七月戊申立衛王重俊為太子重直龍翻太子性明果而官屬率貴遊子弟所為多不法左庶子姚珽屢諫不聽為太子不終張本珽待鼎翻璹之弟也姚璹相武后璹殊玉翻神龍二年丙寅以李嶠為中書令神龍二年上將還西京辛未左散騎常侍李懷遠同中書門下三品充東都留守散悉亶翻騎奇寄翻守式又翻神龍二年武三思陰令人疏皇后穢行榜於天津橋行下孟翻請加廢黜上大怒命御史大夫李承嘉窮核其事承嘉奏言敬暉桓彥範張柬之袁恕己崔玄暐使人為之雖云廢后實謀大逆請族誅之三思又使安樂公主譖之於內安樂公主下嫁三思子崇訓故得使之譖五王樂音洛上命法司結竟結竟者結其罪竟其獄也或曰竟盡也盡其命也愔於今翻暉等未經推鞫不可遽就誅夷朝直遙翻大理丞裴談奏稱暉等宜據制書處斬籍沒不應更加推鞫處昌呂翻上以暉等嘗賜鐵券許以不死乃長流暉於瓊州考異曰實録初云嘉州後云崔州新本紀作嘉州舊傳作崔州今從統紀新傳柬之於瀧州武德四年平蕭銑分隋永熙郡之瀧水縣置瀧州瀧所江翻瀼州隋將劉方始開此路貞觀十二年尋劉方故道行達交趾開拓夷獠置瀼州州在鬱林西南交趾之東北有瀼水以為州名貞觀十二年李弘節開拓生蠻置環州取環王國為名屬嶺南道古州亦李弘節開夷獠置皆流嶺外擢承嘉為金紫光祿大夫進爵襄武郡公談為刑部尚書出李朝隱為聞喜令三思又諷太子上表請夷暐等三族上不許中書舍人崔湜説三思曰暉等異日北歸終為後患不如遣使矯制殺之三思問誰可使者湜薦大理正周利用嚴用改貞下同利用先為五王所惡貶嘉州司馬乃以利用攝右臺侍御史奉使嶺外比至柬之玄暐已死遇彥範於貴州説輸芮翻使疏吏翻惡烏路翻比毗至翻貴州漢廣鬱縣地古西甌駱越所居後漢谷永為鬱林太守降烏滸人十餘萬開置七縣即此處也地在廣州西南安南府之北雍管所管郡縣是也隋分鬱林置鬱平縣屬南定州武德曰南尹州貞觀八年曰貴州令左右縛之曳於竹槎之上槎鉏加翻肉盡至骨然後杖殺得暉咼而殺之恕己素服黃金利用逼之使飲野葛汁本草鉤吻一名野葛陶弘景曰言其入口鉤人喉吻核事而言乃是兩物未詳云何嶺表録異曰野葛毒草也俗呼為胡蔓草誤食之則用羊血解之陳藏器曰人食其葉飲冷水即死冷水發其毒也彼人以野葛飼人勿與冷水至肥大以冷水飲之至死懸尸於樹汁滴地生菌子收之名菌藥烈於野葛不勝毒憤掊地勝音升掊薄侯翻爪甲殆盡仍捶殺之捶止蕊翻利用還擢拜御史中丞薛季昶纍貶儋州司馬飲藥死儋都甘翻三思既殺五王權傾人主常言我不知代間何者謂之善人何者謂之惡人但於我善者則為善人於我惡者則為惡人耳時兵部尚書宗楚客將作大匠宗晉卿大府卿紀處訥鴻臚卿甘元柬皆為三思羽翼臚陵如翻御史中丞周利用侍御史冉祖雍太僕丞李俊光祿丞宋之遜監察御史姚紹之皆為三思耳目時人謂之五狗神龍二年九月戊午左散騎常侍同中書門下三品李懷遠薨神龍二年初李嶠為吏部侍郎欲樹私恩再求入相奏大置員外官廣引貴勢親識既而為相銓衡失序府庫減耗相息亮翻乃更表言濫官之弊且請遜位上慰諭不許冬十月己卯車駕發東都以前檢校並州長史張仁願檢校左屯衛大將軍兼洛州長史戊戌車駕至西京十一月乙巳赦天下神龍二年丙辰以蒲州刺史竇從一為雍州刺史雍於用翻從一德玄之子也竇德玄見二百一卷高宗麟德元年避皇后父諱更名從一更工衡翻多諂附權貴太平公主與僧寺爭碾磑碾魚蹇翻磑五對翻激水為之不勞人功而自運雍州司戶李元紘判歸僧寺唐制戶曹司戶參軍事掌戶籍計帳道路過所蠲符雜徭逋負良賤芻藁逆旅婚姻田訟旌別孝悌亟命元紘改判元紘大署判後曰南山可移此判無動從一不能奪元紘道廣之子也李道廣見二百五卷武后萬歲通天元年神龍二年初祕書監鄭普思納其女於後宮監察御史靈昌崔日用劾奏之上不聽監古銜翻劾戶概翻又戶得翻普思聚黨於雍岐二州謀作亂事覺西京留守蘇王褱收繫窮治之普思妻第五氏以鬼道得幸於皇后上敕王褱勿治及車駕還西京王褱廷爭之守式又翻王褱古回翻治直之翻爭讀曰諍上抑王褱而佑普思侍御史范獻忠進曰請斬蘇王褱上曰何故對曰王褱為留守大臣不能先斬普思然後奏聞使之熒惑聖聽其罪大矣且普思反狀明白而陛下曲為申理臣聞王者不死殆謂是乎臣願先賜死不能北面事普思魏元忠曰蘇王褱長者用刑不枉普思法當死上不得已戊午流普思於儋州儋都甘翻餘黨皆伏誅神龍二年十二月己卯突厥默啜寇鳴沙靈州有鳴沙府武德二年以鳴沙縣置會州貞觀六年州廢更置環州以大河環曲為名九年州廢以縣還屬靈州是年為默啜所寇移治故豐安城宋白曰鳴沙本漢富平縣地後周於此置會州尋立鳴沙鎮隋立環州以大山環曲為名此地人馬行沙有聲異於餘沙故曰鳴沙軍敗死者六千餘人吒初加翻丁嚴丁改辛巳突厥進寇原會等州武德二年以平涼郡會寧鎮置西會州貞觀八年更名會州免忠義官神龍二年安西大都護郭元振詣突騎施烏質勒牙帳議軍事騎奇寄翻天大風雪元振立於帳前與烏質勒語久之雪深元振不移足烏質勒老不勝寒勝音升會罷而卒卒子恤翻其子娑葛勒兵將攻元振娑素何翻副使御史中丞解琬知之使疏吏翻解戶買翻姓也勸元振夜逃去元振曰吾以誠心待人何所疑懼且深在寇庭逃將安適安臥不動明旦入哭甚哀娑葛感其義待元振如初戊戌以娑葛襲嗢鹿州都督懷德王高宗顯慶元年以突騎施索葛莫賀部置嗢鹿州都督府嗢烏沒翻神龍二年安樂公主恃寵驕恣賣官鬻獄勢傾朝野朝直遙翻或自為制敕掩其文令上署之上笑而從之竟不視也自請為皇太女上雖不從亦不譴責考異曰統紀云安樂公主私請廢皇太子而立己為皇太女帝以問魏元忠元忠曰皇太子國之儲君生人之本今既無罪豈得輒有動搖欲以公主為皇太女駙馬復若為名號天下必甚怪愕恐非公主自安之道公主知之乃奏曰元忠山東木強田舍漢豈足與論國家權宜盛事儀注好惡阿母子尚自為天子況兒是公主作皇太女有何不可按中宗雖愚豈不知立皇太女為不可何必待元忠之言今從舊傳景龍元年丁未七七是年九月方改元神龍二年春正月庚戌制以突厥默啜寇邊命內外官各進平突厥之策右補闕盧俌上疏俌方矩翻以為郤縠悅禮樂敦詩書為晉元帥左傳晉文公搜于被廬作三軍謀元帥趙衰曰郤縠可臣亟聞其言矣説禮樂而敦詩書詩書義之府也禮樂德之則也德義利之本也君其試之乃使郤縠將中軍帥所類翻建平吳之勳見八十一卷晉武帝太康元年不取一夫之勇左傳曰中權後徑注曰中軍制謀驍將之材本不足以當大任又鳴沙之役主將先逃鳴沙之敗亦指言沙吒忠義驍堅堯翻將即亮翻賞罰既明敵無不服又邊州刺史宜精擇其人使之搜卒乘積資糧乘繩證翻來則禦之去則備之去歲四方旱災未易興師易以豉翻當理內以及外綏近以來遠俟倉廩實士卒練然後大舉以討之上善之神龍二年二月丙戌上遣武攸暨武三思詣乾陵祈雨既而雨降上喜制復武氏崇恩廟及昊陵順陵帝既復辟改武氏崇尊廟為崇恩廟太后崩廢崇恩廟昊陵順陵見二百四卷天授二年考異曰舊本紀正月己巳遣武攸暨武三思往乾陵祈雨於則天皇后新本紀甲午褒德榮先陵置令丞按長曆正月庚子朔無己巳二月庚午朔無甲午今從實録陵曰榮先去年追封后父韋玄貞為酆王太常博士楊孚曰太廟皆取七品已下子為齋郎今崇恩廟取五品子未知太廟當如何上命太廟亦準崇恩廟孚曰以臣準君猶為僭逆況以君準臣乎上乃止神龍二年庚寅敕改諸州中興寺觀為龍興唐會要神龍元年敕天下諸州各置大唐中興寺觀觀古玩翻示襲武氏後不改其政也以為天地日月等字改制字見二百四卷武后天授元年賊臣敬暉等輕紊前規今削之無益於淳化存之有光於孝理又神龍元年制書一事以上並依貞觀故事豈可近捨母儀遠尊祖德疏奏手制褒美史言中宗無是非之心神龍二年三月庚子吐蕃遣其大臣悉薰熱入貢吐從暾入聲神龍二年夏四月辛巳以上所養雍王守禮女金城公主妻吐蕃贊普雍於用翻妻七細翻神龍二年五月戊戌以左屯衛大將軍張仁願為朔方道大總管以備突厥神龍二年上以歲旱穀貴召太府卿紀處訥謀之明日武三思使知太史事迦葉志忠奏是夜攝提入太微宮姓譜迦葉天竺姓迦居伽翻晉天文志攝提六星直斗杓之南主建時節伺禨祥三思特使志忠傅會以獻諛耳太微宮中有太帝之座上以為然史言帝愚暗為下所罔見賢遍翻徹於玄象賜衣一襲帛六十段神龍二年六月丁卯朔日有食之神龍二年姚巂道討擊使監察御史晉昌唐九徵擊姚州叛蠻破之晉昌漢敦煌郡冥安縣地河西張氏置晉昌郡隋置瓜州改冥安為常樂縣武德四年復改常樂為晉昌縣巂音髓使疏吏翻監古銜翻神龍二年皇后以太子重俊非其所生惡之重俊後宮所生史失其姓氏惡烏路翻上官婕妤以三思故每下制敕推尊武氏安樂公主與駙馬左衛將軍武崇訓常陵侮太子或呼為奴婕妤音接豫樂音洛崇訓又教公主言於上請廢太子立己為皇太女太子積不能平秋七月辛丑太子與左羽林大將軍李多祚將軍李思沖李承況獨孤禕章十二行本禕下有之字乙十一行本同孔本同沙吒忠義等禕吁韋翻吒初加翻矯制發羽林千騎兵三百餘人騎奇寄翻殺三思崇訓于其第並親黨十餘人又使左金吾大將軍成王千里及其子天水王禧分兵守宮城諸門太子與多祚引兵自肅章門斬關而入叩閣索上官婕妤索山客翻下同考異曰舊紀作庚子今從實録實録云斬關而入索韋氏所在舊重俊傳亦云求韋庶人及安樂公主所在今從舊后傳婕妤大言曰觀其意欲先索婉兒婉兒上官婕妤名也次及大家上乃與韋后安樂公主上官婕妤登玄武門樓以避兵鋒使右羽林大將軍劉景仁帥飛騎百餘人屯於樓下以自衛楊再思蘇王褱李嶠與兵部尚書宗楚客左衛將軍紀處訥擁兵二千餘人屯太極殿前閉門自守多祚先至玄武樓下欲升樓宿衛拒之多祚與太子狐疑按兵不戰冀上問之宮闈令石城楊思勗在上側唐制宮闈局令從七品下屬內侍省掌侍奉宮闈出入管籥石城縣屬羅州漢合浦縣地劉昫曰宋將檀道濟於綾羅江口築石城後因置羅州唐置石城縣歐陽修曰以石城水為名多祚壻羽林中郎將野呼利為前鋒總管將即亮翻下同思勗挺刃斬之挺拔也上據檻俯謂多祚所將千騎曰汝輩皆朕宿衛之士何為從多祚反苟能斬反者勿患不富貴於是千騎斬多祚承況禕之忠義餘衆皆潰成王千里天水王禧攻右延明門閣本太極宮圖太極殿之左曰左延明門右曰右延明門不克而死太子以百騎走終南山至鄠西能屬者才數人走音奏鄠音戶屬之欲翻憩於林下為左右所殺上以其首獻太廟及祭三思崇訓之柩然後梟之朝堂柩音舊梟堅堯翻朝直遙翻更成王千里姓曰蝮氏同黨皆伏誅更工衡翻蝮芳福翻東宮僚屬無敢近太子尸者近其靳翻唯永和縣丞寧嘉勗解衣裹太子首號哭貶興平丞永和漢狐囁縣地後周置臨河縣及臨河郡隋廢郡改縣曰永和唐屬隰州囁之涉翻興平新書作平興平興漢高要縣地宋置平興縣帶宋熙郡隋廢郡以平興縣屬端州岐州有興平畿內也永和外縣嘉勗若自外縣丞得畿縣丞則非貶矣此必貶嶺外之興平也當從新書號戶高翻太子兵所經諸門守者皆坐流韋氏之黨奏請悉誅之上更命法司推斷大理卿宋城鄭惟忠曰大獄始決人心未安若復有改推則反仄者衆矣上乃止守手又翻更工衡翻斷丁亂翻復扶又翻以楊思勗為銀青光祿大夫行內常侍唐內常侍正五品下漢世之中常侍也六典內侍省內侍四人內常侍六人內侍之職掌在內侍奉出入宮掖宣傳詔令總掖庭宮闈奚官內僕內府五局之官屬內常侍為之二癸卯赦天下贈武三思太尉梁宣王武崇訓開府儀同三司魯忠王安樂公主請用永泰公主故事以崇訓墓為陵給事中盧粲駮之以為永泰事出特恩永泰主死見上卷元年帝復辟以主禮改葬特恩號墓為陵亦非禮也駮北角翻不可為比上手敕曰安樂與永泰無異同穴之義今古不殊粲又奏陛下以膝下之愛施及其夫施以豉翻豈可使上下無辨君臣一貫哉上乃從之公主怒出粲為陳州刺史舊志陳州京師一千五百二十里東都七百一十七里襄邑尉襄陽席豫襄邑縣漢晉屬陳留郡後魏屬陽夏郡後齊廢隋開皇十六年復置屬宋州襄陽縣帶襄州歎曰梅福譏切王氏梅福事見三十一卷漢成帝永始三年乃上書請立太子言甚深切太平公主欲表為諫官豫恥之逃去神龍二年八月戊寅皇后及王公已下表上尊號曰應天神龍皇帝改玄武門為神武門樓為制勝樓宗楚客又帥百官表請加皇后尊號曰順天翊聖皇后帥讀曰率上並許之神龍二年初右臺大夫蘇珦治太子重俊之黨囚有引相王者珦密為之申理珦許亮翻治直之翻重直龍翻相息亮翻為于偽翻上乃不問自是安樂公主及兵部尚書宗楚客日夜謀譖相王樂音洛尚辰羊翻使侍御史冉祖雍誣奏相王及太平公主云與重俊通謀請收付制獄上召吏部侍郎兼御史中丞蕭至忠使鞫之至忠泣曰陛下富有四海不能容一弟一妹而使人羅織害之乎相王昔為皇嗣固請於則天以天下讓陛下事見二百六卷武后聖曆元年嗣祥吏翻此海內所知奈何以祖雍一言而疑之上素友愛遂寢其事右補闕浚儀吳兢聞祖雍之謀浚儀古大梁也自漢以來屬陳留郡竹書紀年梁惠王為大溝以行圃田之水縣北有浚水像而儀之故曰浚儀以為自文明以來國之祚胤不絶如線上時掌翻疏所去翻線私箭翻陛下龍興恩及九族求之瘴海升之闕庭事見上神龍元年六合無二而賊臣日夜連謀乃欲陷之極法禍亂之根將由此始夫任以權則雖疏必重奪其勢則雖親必輕夫音扶自古委信異姓猜忌骨肉以覆國亡家者幾何人矣況國家枝葉無幾陛下登極未久而一子以弄兵受誅一子以愆違遠竄受誅謂重俊遠竄謂重福尺布斗粟之譏不可不慎尺布斗粟見十四卷漢文帝七年良可畏也青蠅之詩周人刺幽王信讒也考異曰實録載此事於今年八月而兢疏云陛下登極于今四稔則是明年所上也蓋至忠所對在今年而實録因載兢疏耳相王寬厚恭謹安恬好讓故經武韋之世竟免於難好呼到翻難乃旦翻神龍二年初右僕射中書令魏元忠以武三思亶權意常憤鬱及太子重俊起兵遇元忠子太僕少卿升於永安門唐六典太極宮城南面三門中曰承天東曰長樂西曰永安太子死並章十二行本並作升乙十一行本同孔本同退齋校同熊校同為亂兵所殺元忠揚言曰元惡已死雖鼎鑊何傷但惜太子隕沒耳上以其有功且為高宗武后所重故釋不問兵部尚書宗楚客太府卿紀處訥等共證元忠云與太子通謀請夷其三族制不許元忠懼表請解官爵以散秩還第散悉亶翻丙戌上手敕聽解僕射以特進齊公致仕考異曰實録元忠致仕在九月今從舊本紀朝直遙翻神龍二年九月丁卯以吏部侍郎蕭至忠為黃門侍郎兵部尚書宗楚客為左衛將軍兼太府卿紀處訥為太府卿並同中書門下三品中書侍郎同中書門下三品于惟謙罷為國子祭酒神龍二年庚子赦天下改元改元景龍神龍二年宗楚客等引右衛郎將姚廷筠為御史中丞使劾奏魏元忠劾戶概翻又戶得翻以為侯君集社稷元勳及其謀反太宗就㣥臣乞其命而不得竟流涕斬之見一百九十七卷太宗貞觀十七年雖復懿親皆從國法齊王祐見一百九十六卷貞觀十七年房薛見一百九十九卷高宗永徽四年復扶又翻下一復同身又非國戚與李多祚等謀反男入逆徒是宜赤族汚宮但有朋黨飾辭營救以惑聖聽陛下仁恩欲掩其過臣所以犯龍鱗忤聖意者忤五故翻正以事關宗社耳上頗然之元忠坐繫大理貶渠州司馬渠州漢宕渠縣地後魏置流江縣及流江郡梁置渠州後周又為北宕渠郡隋復置渠州舊志渠州京師西南二千二百七十里至東都三千一百九十里宗楚客令給事中冉祖雍奏言元忠既犯大逆不應出佐渠州楊再思李嶠亦贊之上謂再思等曰元忠驅使日久朕特矜容制命已行豈容數改數所角翻輕重之權應自朕出卿等頻奏殊非朕意再思等惶懼拜謝監察御史袁守一復表彈元忠曰重俊乃陛下之子猶加昭憲元忠非勳非戚焉得獨漏嚴刑甲辰又貶元忠務川尉務川漢西陽縣地隋開皇末招慰蟄獠置務川縣屬巴東郡唐置思州監古銜翻下同彈徒丹翻重直龍翻焉於虔翻頃之楚客又令袁守一奏言令力丁翻則天昔在三陽宮不豫狄仁傑奏請陛下監國元忠密奏以為不可此則元忠懷逆日久請加嚴誅上謂楊再思等曰以朕思之人臣事主必在一心豈有主上小疾遽請太子知事此乃仁傑欲樹私恩未見元忠有失守一欲借前事以陷元忠其可乎楚客乃止元忠行至涪陵而卒涪音浮卒子恤翻神龍二年銀青光祿大夫上庸公聖善中天西明三寺主慧範於東都作聖善寺聖善寺蓋為武后資福取母氏聖善之義唐會要聖善寺在長安城中章善坊神龍二年中宗為武后追福西明寺在延康坊本隋越國公楊素宅貞觀初賜濮長王泰死乃立為寺長樂坡作大像長樂坡在長安城東亦謂之滻坡樂音洛為于偽翻上及韋后皆重之勢傾內外無敢指目者戊申侍御史魏傳弓發其姦贓四十餘萬請置極法上欲宥之傳弓曰刑賞國之大事陛下賞已妄加豈宜刑所不及上乃削黜慧範放于家宦官左監門大將軍薛簡等有寵於安樂公主監古銜翻樂音洛縱暴不法傳弓奏請誅之御史大夫竇從一懼固止之時宦官用事從一為雍州刺史及御史大夫雍於用翻誤見訟者無須必曲加承接意以為宦官而然須與鬚同神龍二年以楊再思為中書令韋巨源紀處訥並為侍中考異曰新表九月辛亥蘇王褱罷為行吏部尚書按二年王褱請察正員官殿負者擇員外官代之三年面折祝欽明請皇后亞獻於時更為侍中表云今年罷誤也神龍二年壬戌改左右羽林千騎為萬騎騎奇寄翻神龍二年冬十月丁丑命左屯衛將軍張仁願充朔方道大總管以擊突厥左屯衛之下逸大字虜已退比必利翻追擊大破之神龍二年習藝館內教蘇安恆習藝館本名內文學館選官人有文學者一人為學士教習宮人武后改為習藝館又改為翰林內教坊以地在禁中故也新書曰掌教習宮人書算衆藝恆戶登翻好呼到翻太子重俊之誅武三思也安恆自言此我之謀太子敗或告之戊寅伏誅神龍二年十二月乙丑朔日有食之神龍二年是歲上遣使者分道詣江淮贖生帝以江淮之人採捕魚鱉為傷生分道遣使以錢物贖之使疏吏翻房子縣漢屬常山郡晉後魏屬趙郡隋唐屬趙州江南鄉人鄉人猶言鄉民避太宗諱改民曰人上時掌翻疏所去翻魚鱉之利黎元所資雖雲雨之私有霑於末利章十二行本利作類乙十一行本同孔本同而生成之惠未洽於平人何則江湖之饒生育無限府庫之用支供易殫易以豉翻費之若少則所濟何成少詩沼翻用之儻多則常支有闕在其拯物豈若憂人且鬻生之徒惟利是視錢刀日至古有金刀錢布故曰錢刀施之一朝營之百倍施式豉翻未若回救贖之錢物減貧無之徭賦活國愛人其福勝彼齊思和標點聶崇岐覆校
