body:
  text: 資治通鑑卷第九十三端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰權判西京留司御史臺上柱國河內郡開國侯食邑一千三百戶食實封四百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注晉紀十五太寧二年肅宗明皇帝下太寧二年甲申三二四太寧二年春正月王敦誣周嵩周莚與李脫謀為不軌收嵩莚於軍中殺之遣參軍賀鸞就沈充於吳盡殺周札諸兄子進兵襲會稽會工外翻札拒戰而死太寧二年後趙將兵都尉石瞻寇下邳彭城取東莞東海東莞縣漢屬琅邪郡莞音官武帝泰始元年分琅邪立東莞郡將即亮翻劉遐退保泗口水經注泗水自淮陽城東流徑角城北而東南流注于淮謂之泗口杜佑曰泗口在今臨淮郡宿遷縣界司州刺史石生擊趙河南太守尹平於新安斬之新安縣漢屬弘農郡晉屬河南郡守式又翻下同自是二趙構隙日相攻掠河東弘農之間民不聊生矣河東弘農二趙之界上也石生寇許潁許昌潁川同是一郡地攻郭誦于陽翟誦與戰大破之生退守康城魏收地形志陽翟縣有康城馳救之進攻司州刺史李矩潁川太守郭默皆破之太寧二年成主雄后任氏無子任音壬有妾子十餘人雄立其兄蕩之子班為太子使任后母之㣥臣請立諸子雄曰吾兄先帝之嫡統有奇材大功事垂克而早世朕常悼之蕩死見八十五卷惠帝太安二年必能負荷先烈太傅驤司徒王達諫曰先王立嗣必子者所以明定分而防篡奪也好呼到翻荷下可翻又如字驤思將翻分扶問翻宋宣公吳餘祭足以觀矣漢書曰立嗣必子所從來遠矣公羊傳曰宋宣公謂繆公曰以吾愛與夷則不若愛汝以為社稷宗廟主則與夷不若汝盍終為君矣宣公死繆公立逐其二子莊公馮與左師勃而致國乎與夷故君子大居正宋之禍宣公為之也吳子謁餘祭夷昧與季子同母季子弱而才兄弟皆愛之同欲立之以為君謁曰今若迮而與季子國季子猶不受也請無與子而與弟弟兄迭為君而致國乎季子夷昧死則國宜之季子季子使而亡焉僚者長庶也即之季子使反而君之闔閭曰先君所以不與子國而與弟者凡為季子故也將從先君之命歟則國宜之季子如不從先君之命則我宜立者也僚惡得為君乎於是使專諸刺僚張守節曰祭側界翻昧莫葛翻驤退而流涕曰亂自此始矣為下雄諸子殺班張本下遐稼翻動遵禮法雄每有大議輒令豫之太寧二年夏五月甲申張茂疾病執世子駿手泣曰吾家世以孝友忠順著稱今雖天下大亂汝奉承之不可失也且下令曰吾官非王命苟以集事豈敢榮之死之日當以白帢入棺勿以朝服斂是日薨帢苦洽翻朝直遙翻斂力贍翻愍帝使者史淑在姑臧長安覆沒淑無所歸故留姑臧使疏吏翻泛音凡禕吁韋翻使淑拜駿大將軍涼州牧西平公赦其境內前趙主曜遣使贈茂太宰諡曰成烈王拜駿上大將軍涼州牧涼王太寧二年王敦疾甚矯詔拜王應為武衛將軍以自副以王含為驃騎大將軍開府儀同三司驃匹妙翻錢鳳謂敦曰脫有不諱便當以後事付應邪敦曰非常之事非常人所能為司馬相如難蜀父老曰蓋世必有非常之人然後有非常之事少詩沼翻豈堪大事我死之後莫若釋兵散衆歸身朝廷保全門戶上計也退還武昌收兵自守貢獻不廢中計也及吾尚存悉衆而下萬一僥幸下計也鳳謂其黨曰公之下計乃上策也遂與沈充定謀俟敦死即作亂以王敦之很戾而濟之以沈充錢鳳所謂凶德參會奏令三番休二初帝親任中書令溫嶠敦惡之惡烏路翻請嶠為左司馬嶠乃繆為勤敬繆靡幼翻詐也綜其府事時進密謀以附其欲深結錢鳳為之聲譽每曰錢世儀精神滿腹嶠素有藻鑑之名錢鳳字世儀藻鑑謂善於人倫藻鑑也人有美質而加之褒飾謂之黼藻如衣裳之加藻火黼黻也鑑所以別妍醜故明於知人而能褒獎後進者有藻鑑之名深與嶠結好好呼到翻會丹楊尹缺晉都建康以丹楊太守為尹宋齊梁皆因之洪適曰西漢丹陽郡則治宛陵丹陽縣則今之建康也東漢史皆作丹陽西晉移郡於建業元帝改太守為丹楊尹地理志曰山多赤柳故名他書載漢晉此郡少有從木者至唐天寶年始以京口為丹陽郡改曲阿為丹陽縣皆非漢舊壤也京尹咽喉之地咽音煙公宜自選其才恐朝廷用人或不盡理敦然之問嶠誰可者嶠曰愚謂無如錢鳳鳳亦推嶠嶠僞辭之敦不聽六月表嶠為丹楊尹且使覘伺朝廷覘丑廉翻又丑豔翻嶠恐既去而錢鳳於後間止之間古莧翻因敦餞別嶠起行酒至鳳鳳未及飲嶠僞醉以手版擊鳳幘墜作色曰錢鳳何人溫太真行酒而敢不飲溫嶠字太真兩釋之嶠臨去與敦別涕泗橫流出閣復入者再三復扶又翻行後鳳謂敦曰嶠於朝廷甚密而與庾亮深交未可信也敦曰太真昨醉小加聲色何得便爾相讒嶠至建康盡以敦逆謀告帝請先為之備又與庾亮共畫討敦之謀敦聞之大怒曰吾乃為小物所欺與司徒導書曰太真別來幾日作如此事當募人生致之自拔其舌王敦遙制朝權其所甚害者如郗鑒溫嶠終不得以肆其毒以此知建康綱紀尚能自立也帝將討敦以問光祿勳應詹詹勸成之帝意遂決丁卯加司徒導大都督領揚州刺史以溫嶠都督東安北部諸軍事以下文應詹都督橋南諸軍觀之則東安北部謂秦淮水北諸軍也考異曰敦傳云王敦表為征虜將軍都督石頭軍事明帝討敦以為鎮南將軍假節今從明帝紀郗鑒行衛將軍都督從駕諸軍事郗丑之翻從才用翻庾亮領左衛將軍以吏部尚書卞壼行中軍將軍壼苦本翻郗鑒以為軍號無益事實固辭不受請召臨淮太守蘇峻兗州刺史劉遐同討敦夫理順者難恃勢弱則不支以敦鳳同惡相濟率大衆以犯闕雖諸公忠赤若只以臺中見兵拒之是復周戴石頭之事微郗鑒建請而召劉遐蘇峻殆矣帝屯于中堂按蕭子顯齊書高帝紀桂陽王休範之反諸貴會議帝曰中堂舊是置兵地領軍宜屯宣陽門為諸軍節度則中堂當在宣陽門外司徒導聞敦疾篤帥子弟為敦發哀帥讀曰率為于僞翻衆以為敦信死咸有奮志於是尚書騰詔下敦府下遐嫁翻列敦罪惡曰敦輒立兄息以自承代未有宰相繼體而不由王命者也息子也謂以兄含子應為嗣也無所顧忌志騁凶醜以窺神器天不長姦騁丑郢翻長丁丈翻敦以隕斃鳳承凶宄彌復煽逆復扶又翻今遣司徒導等虎旅三萬十道並進平西將軍邃等精鋭三萬水陸齊勢朕親統諸軍討鳳之罪有能殺鳳送首封五千戶侯考異曰晉春秋此詔在王導為敦發喪前故云有能斬送敦首封萬戶侯賞布萬匹按此詔云敦以隕斃是稱敦已死也不應復購敦首今從敦傳一無所問無或猜嫌以取誅滅敦之將士從敦彌年違離家室將即亮翻下自將親將同離力智翻朕甚愍之其單丁在軍皆遣歸家終身不調單丁謂家止有男丁一人無兼次者調徒釣翻假居訝翻休訖還臺當與宿衛同例三番謂三番休二也敦見詔甚怒而病轉篤不能自將將舉兵伐京師使記室郭璞筮之璞曰無成敦素疑璞助溫嶠庾亮及聞卦凶乃問璞曰卿更筮吾壽幾何璞曰思向卦明公起事必禍不久若住武昌壽不可測敦大怒曰卿壽幾何曰命盡今日日中敦乃收璞斬之敦使錢鳳及冠軍將軍鄧嶽前將軍周撫等帥衆向京師冠古玩翻帥讀曰率王含謂敦曰此乃家事吾當自行於是以含為元帥帥所類翻鳳等問曰事克之日天子云何敦曰尚未南郊何得稱天子便盡卿兵勢保護東海王及裴而已元帝以第三子沖奉東海王越後裴越也秋七月壬申朔王含等水陸五萬奄至江寧南岸武帝太康二年分秣陵立臨江縣二年更名江寧南岸即秦淮南岸也考異曰敦傳及晉春秋皆云三萬今從明帝紀溫嶠移屯水北燒朱雀桁以挫其鋒恟許拱翻桁與航同含等不得渡帝欲親將兵擊之聞橋已絶大怒嶠曰今宿衛寡弱徵兵未至若賊豕突危及社稷宗廟且恐不保何愛一橋乎司徒導遺含書曰近承大將軍困篤參問起居謂之參承詗候安否謂之詗承遺于季翻尋知錢鳳大嚴欲肆姦逆謂兄當抑制不逞言當抑制鳳等使不得逞其凶逆也今乃與犬羊俱下兄之此舉謂可得如大將軍昔年之事乎謂如元帝永昌元年敦克石頭時也謂刁協劉隗也朝直遙翻如導之徒心思外濟言思投外以自濟也大將軍來屯于湖漸失人心君子危怖怖普布翻百姓勞弊臨終之日委重安期安期斷乳幾日又於時望便可襲宰相之迹邪王應字安期斷讀曰短頗有宰相以孺子為之者乎諸有耳者皆知將為禪代非人臣之事也謂此事深駭衆聽皆知敦應謀篡遺愛在民聖主聰明德洽朝野兄乃欲妄萌逆節凡在人臣誰不憤歎導門小大受國厚恩今日之事明目張膽為六軍之首寧為忠臣而死不為無賴而生矣含不答或以為王含錢鳳衆力百倍苑城小而不固苑城蓋孫氏都秣陵所築晉置建康於秣陵水北南渡建都依苑城以為守大駕自出拒戰郗鑒曰㣥逆縱逸勢不可當可以謀屈難以力競且含等號令不一抄盜相尋抄楚交翻吏民懲往年暴掠皆人自為守乘逆順之勢何憂不克且賊無經略遠圖惟恃豕突一戰曠日持久必啓義士之心令智力得展今以此弱力敵被強寇決勝負於一朝定成敗於呼吸萬一蹉跌蹉七何翻跌徒結翻雖有申胥之徒義存投袂左傳吳人入郢楚大夫申包胥赴秦求救卒以存楚投袂言匆遽也傳曰楚子聞之投袂而起帝乃止帝帥諸軍出屯南皇堂癸酉夜募壯士遣將軍段秀中軍司馬曹渾等帥甲卒千人渡水掩其未備平旦戰於越城越城在秦淮南帥讀曰率下同斬其前鋒將何康秀匹磾之弟也磾丁奚翻敦聞含敗大怒曰我兄老婢耳門戶衰世事去矣顧謂參軍呂寶曰我當力行因作勢而起困乏復臥氣不能充體為困力不能舉身為乏少詩沼翻我死應便即位先立朝廷百官然後營葬事敦尋卒應祕不發喪裹尸以席蠟塗其外埋於廳事中與諸葛瑤等日夜縱酒淫樂樂音洛帝使吳興沈楨說沈充說輸芮翻許以為司空充曰三司具瞻之重豈吾所任任音壬幣厚言甘古人所畏也詩節南山曰赫赫師尹民具爾瞻左傳晉郤芮曰幣重而言甘誘我也終始當同豈可中道改易人誰容我乎遂舉兵趣建康趣七喻翻宗正卿虞潭以疾歸會稽按漢晉以來宗正列於九卿然未以卿字繫官梁置十一寺始繫卿字此卿字衍會工外翻起兵餘姚以討充餘姚縣屬會稽郡前安東將軍劉超宣城內史鍾雅皆起兵以討充義興人周蹇殺王敦所署太守劉芳晉惠帝永興元年分吳興之陽羡丹楊之永世立義興郡約屯壽春故得逐台任音壬沈充帥衆萬餘人與王含軍合司馬顧揚說充曰今舉大事而天子已扼其咽喉咽音煙鋒摧氣沮相持日久必致禍敗沮在呂翻今若決破柵塘因湖水以灌京邑此即玄武湖水也在建康城北今在上元縣北十里縱舟師以攻之此上策也藉初至之鋭並東西軍之力東軍謂沈充軍西軍謂王含錢鳳等軍也衆寡過倍理必摧陷中策也轉禍為福召錢鳳計事因斬之以降降戶江翻下策也充皆不能用揚逃歸于吳丁亥劉遐蘇峻等帥精卒萬人至帝夜見勞之勞力到翻賜將士各有差沈充錢鳳欲因北軍初到疲困擊之乙未夜充鳳從竹格渚渡淮秦淮在今建康上元縣南三里秦始皇時望氣者言金陵有天子氣使鑿山為瀆以斷地脈故曰秦淮或云淮水發源屈曲不類人工充鳳至宣陽門晉都建康外城環之以籬諸門皆用洛城門名宣陽門在城南面將戰劉遐蘇峻自南塘橫擊大破之晉都建康自江口沿淮築堤南塘秦淮之南塘岸也遐又破沈充于青溪青溪水發源於鍾山接於秦淮吳孫權鑿城北塹以泄玄武湖水帥千餘人來赴沈約曰尋陽本縣名因水名縣水南注江漢屬廬江郡惠帝永興元年分廬江武昌立尋陽郡治柴桑縣求見敦王應辭以疾光退曰今我遠來而不得見公其死乎遽見其兄撫曰王公已死兄何為與錢鳳作賊衆皆愕然丙申王含等燒營夜遁丁酉帝還宮大赦惟敦黨不原命庾亮督蘇峻等追沈充於吳興溫嶠督劉遐等追王含錢鳳於江寧分命諸將追其黨與劉遐軍人頗縱虜掠嶠責之曰天道助順故王含勦絶勦子小翻豈可因亂為亂也遐惶恐拜謝王含欲奔荊州王應曰不如江州荊州王舒江州王彬大將軍平素與江州云何而欲歸之應曰此乃所以宜歸也江州當人強盛時能立同異此非常人所及今覩困厄必有愍惻之心荊州守文豈能意外行事邪王應之見猶能出乎尋常此敦所以以之為後歟能立同異謂哭周顗數敦罪及諫敦為逆也遂奔荊州王舒遣軍迎之沈含父子於江沈持林翻王彬聞應當來密具舟以待之不至深以為恨錢鳳走至闔廬洲闔廬洲在江中賀循曰江中劇地惟有闔廬一處地勢險奧亡逃所聚詣闕自贖考異曰晉春秋云戴淵弟良斬鳳今從敦傳誤入故將吳儒家儒誘充內重壁中重壁復壁也重直龍翻三千戶侯矣時臺格募斬錢鳳者封五千戶侯斬沈充者封三千戶侯爾以義存我我家必厚報汝若以利殺我我死汝族滅矣儒遂殺之傳首建康敦黨悉平充子徑當坐誅鄉人錢舉匿之得免其後徑竟滅吳氏有司發王敦瘞瘞於計翻出尸焚其衣冠跽而斬之跽巨几翻跪也與沈充首同懸於南桁南桁即朱雀桁前朝誅楊駿等朝直遙翻皆先極官刑後聽私殯臣以為王誅加於上私義行於下宜聽敦家收葬於義為弘帝許之司徒導等皆以討敦功受封賞周撫與鄧嶽俱亡周光欲資給其兄而取嶽撫怒曰我與伯山同亡鄧嶽字伯山會嶽至撫出門遙謂之曰何不速去今骨肉尚欲相危況他人乎嶽回舟而走與撫共入西陽蠻中明年詔原敦黨撫嶽出首首式救翻得免死禁錮故吳內史張茂妻陸氏傾家産帥茂部曲為先登以討沈充報其夫仇沈充殺張茂見上卷元帝永昌元年帥讀曰率陸氏詣闕上書為茂謝不克之責詔贈茂太僕克能也謝茂守郡不能式遏寇虐為充所殺也為于僞翻有司奏王彬等敦之親族皆當除名詔曰司徒導以大義滅親猶將百世宥之況彬等皆公之近親乎悉無所問有詔王敦綱紀除名參佐禁錮綱紀綜理府事者也參佐諸僚屬也王敦剛愎不仁忍行殺戮朝廷所不能制骨肉所不能諫處其朝者恆懼危亡朝府朝也愎蒲逼翻朝直遙翻處昌呂翻下晏處同恆戶登翻道路以目但以目相視不敢發言遵養時晦之辰也周頌酌之詩曰遵養時晦毛氏注云遵率養取晦昧也鄭氏箋云養是暗昧之君以老其惡豈遑晏處晏處猶言安處備知之矣必其贊導凶悖悖蒲內翻又蒲沒翻自當正以典刑如其枉陷姦黨謂宜施之寬貸臣以玩等之誠聞於聖聽當受同賊之責苟默而不言實負其心惟陛下仁聖裁之郗鑒以為先王立君臣之教貴於伏節死義王敦佐吏雖多逼迫然進不能止其逆謀退不能脫身遠遁準之前訓宜加義責謂以大義責之卒子恤翻太寧二年冬十月以司徒導為太保領司徒加殊禮西陽王羕領太尉羕余亮翻應詹為江州刺史劉遐為徐州刺史代王邃鎮淮陰蘇峻為歷陽內史為蘇峻以歷陽稱兵張本溫嶠前將軍導固辭不受應詹至江州吏民未安詹撫而懷之莫不悅服太寧二年十二月涼州將辛晏據枹罕不服將即亮翻枹罕縣前漢屬金城郡後漢屬隴西郡晉自張軌鎮河西表分西平界置晉興郡枹罕縣屬焉枹音膚張駿將討之從事劉慶諫曰霸王之師必須天時人事相得然後乃起辛晏凶狂安忍其亡可必殺人而心不矜惻顏不顰蹙者為忍忍而安之則其亡必矣盛寒攻城乎駿乃止駿遣參軍王騭聘於趙騭之日翻趙主曜謂之曰貴州款誠和好卿能保之乎騭曰不能侍中徐邈曰君來結好而云不能保何也好呼到翻騭曰齊桓貫澤之盟憂心兢兢諸侯不召自至葵丘之會振而矜之叛者九國公羊傳僖三年齊侯宋公江人黃人盟于貫澤江人黃人者何遠國之辭也遠國至矣則中國曷為獨言齊宋至爾大國言齊宋小國言江黃則其餘為莫敢不至也九年九月戊辰諸侯盟于葵丘桓之盟不日此何以日危之也何危爾貫澤之會桓公有憂中國之心不召而至者江人黃人也葵丘之會桓公震而矜之叛者九國震之者何猶曰振振然矜之者何猶曰莫若我也常如今日可也若政教陵遲尚未能察邇者之變況鄙州乎曜曰此涼州之君子也擇使可謂得人矣使疏吏翻厚禮而遣之太寧二年是歲代王賀傉始親國政元帝大興四年賀傉立至是始能親政傉奴沃翻乃築城於東木根山河西有木根山在五原郡東北此木根山在河東故曰東木根山三年三年春二月張駿承元帝凶問大臨三日臨力鳩翻會黃龍見嘉泉據駿傳嘉泉在武威揖次縣揖次前漢作揟次孟康曰揟子如翻次音咨駿不許泛音凡禕吁韋翻辛晏以枹罕降駿復收河南之地涼州諸郡獨金城在河南三年贈故譙王承甘卓戴淵周顗虞望郭璞王澄等官承當作氶王敦之難諸人死之故贈以官為于僞翻尚書卞壼議以為札守石頭開門延寇事見上卷元帝永昌元年壼苦本翻司徒導以為往年之事敦姦逆未彰自臣等有識以上皆所未悟與札無異既悟其姦札便以身許國尋取梟夷事見上太寧二年梟堅堯翻郗鑒以為周戴死節周札延寇事異賞均何以勸沮沮在呂翻如司徒議謂往年有識以上皆與札無異則譙王周戴皆應受責何贈諡之有今三臣既褒則札宜受貶明矣導曰札與譙王周戴雖所見有異同皆人臣之節也鑒曰敦之逆謀履霜日久易曰履霜堅冰至令王師不振若敦前者之舉義同桓文則先帝可為幽厲邪然卒用導議卒子恤翻贈札衛尉三年後趙王勒加宇文乞得歸官爵使之擊慕容廆以元年廆執其使送建康也廆戶罪翻皓呼廣翻索頭即拓跋氏索昔各翻以遼東相裴嶷為右翼慕容仁為左翼乞得歸據澆水以拒皓澆水即澆洛水也嶷魚力翻澆古堯翻考異曰燕書征虜仁傳作悉拔堆後魏書宇文莫槐傳作乞得龜悉拔堆載記亦作龜燕書武宣紀作乞得歸悉拔雄今從之斬之乘勝與皓攻乞得歸大破之乞得歸棄軍走皓仁進入其國城使輕兵追乞得歸過其國三百餘里而還盡獲其國重器畜産以百萬計民之降附者數萬降戶江翻三年三月段末柸卒弟牙立三年戊辰立皇子衍為太子大赦三年趙主曜立皇后劉氏三年北羌王盆句除附於趙句古侯翻又權俱翻又音駒後趙將石他自鴈門出上郡襲之將即亮翻俘三千餘落獲牛馬羊百餘萬而歸趙主曜遣中山王嶽追之曜屯于富平為嶽聲援嶽與石他戰於河濱斬之富平縣屬北地郡河濱大河之濱也水經河水過富平縣西他徒河翻唐勝州河濱縣隋榆林縣地杜佑曰富平本漢舊縣後漢移富平縣於今彭原郡界富平故城是也按靈州乃漢富平縣地今京兆富平縣西南有漢懷德故城此富平蓋漢懷德縣地嶽悉收所虜而歸三年楊難敵襲仇池克之執田嵩立之於前左右令嵩拜嵩瞋目叱之曰氐狗安有天子牧伯而向賊拜乎難敵字謂之曰子岱田嵩字子岱趙使嵩鎮仇池見上卷太寧元年瞋七人翻子忠於劉氏豈不能忠於我乎嵩厲色大言曰賊氐汝本奴才何謂大業我寧為趙鬼不為汝臣顧排一人奪其劍前刺難敵不中刺七亦翻中竹仲翻難敵殺之三年都尉魯潛以許昌叛降于後趙降戶江翻下同三年夏四月後趙將石瞻攻兗州刺史檀斌于鄒山晉本紀斌作贇載記作斌將即亮翻斌音彬考異曰帝紀作石良今從石勒載記三年後趙西夷中郎將王騰殺並州刺史崔琨上黨內史王眘據並州降趙劉琨鎮並州愍帝建興四年為石勒所破置並州刺史治上黨王眘章武人初起兵擾勒渤海河間諸郡後歸于勒使守上黨眘古慎字三年五月以陶侃為征西大將軍都督荊湘雍梁四州諸軍事荊州刺史雍於用翻荊州士女相慶侃性聰敏恭勤終日斂膝危坐軍府衆事檢攝無遺攝録也整也少詩沼翻常語人曰大禹聖人乃惜寸陰禹不貴尺璧而重寸陰語牛倨翻當惜分陰豈可但逸遊荒醉生無益於時死無聞於後是自棄也諸參佐或以談戲廢事者命取其酒器蒱博之具悉投之於江將吏則加鞭撲曰樗蒱者牧者奴戲耳晉人多好樗蒱以五木擲之其采有黑犢有雉有盧得盧者勝撲蒱卜翻非先王之法言不益實用君子當正其威儀何有蓬頭跣足自謂宏達邪有奉饋者必問其所由若力作所致雖微必喜慰賜參倍參猶三也則切厲訶辱切峻切厲嚴厲也嘗出遊見人持一把未熟稻侃問用此何為人云行道所見聊取之耳侃大怒曰汝既不佃而戲賊人稻佃停年翻治田也執而鞭之是以百姓勤於農作家給人足嘗造船其木屑竹頭侃皆令籍而掌之皆令籍記而典掌之解胡買翻曉也以猶用也後正會積雪始晴聽事前餘雪猶濕聽他經翻乃以木屑布地及桓溫代蜀又以侃所貯竹頭作丁裝船貯丁呂翻其綜理微密皆此類也三年後趙將石生屯洛陽寇掠河南司州刺史李矩潁川太守郭默軍數敗又乏食乃遣使附於趙趙主曜使中山王嶽將兵萬五千人趣孟津數所角翻趣七喻翻鎮東將軍呼延謨帥荊司之衆自崤澠而東時荊州仍屬晉司州之地多入後趙劉曜得其民處之關中者使謨帥而東耳或曰劉聰以洛陽為荊州此所謂荊司皆晉司州之衆也帥讀曰率下同嶽克孟津石梁二戍此孟津戍蓋置於河陰石梁戍在洛北進圍石生於金墉後趙中山公虎帥步騎四萬入自成皋關與嶽戰于洛西嶽兵敗中流矢中竹仲翻退保石梁虎作塹柵環之環音宦遏絶內外嶽衆飢甚殺馬食之虎又擊呼延謨斬之曜自將兵救嶽虎帥騎三萬逆戰趙前軍將軍劉黑擊虎將石聰於八特阪水經注澗水出河南新安縣東南東北流徑函谷東阪東謂之八特阪曜屯于金谷水經注金谷水出太白原東南流歷金谷又東南流徑晉石崇故居在河南界軍中無故大驚士卒奔潰乃退屯澠池澠彌兗翻夜又驚潰遂歸長安六月虎拔石梁禽嶽及其將佐八十餘人氐羌三千餘人皆送襄國坑其士卒九千人遂攻王騰於並州執騰殺之坑其士卒七千餘人曜還長安素服郊次哭七日乃入城因憤恚成疾恚於避翻郭默復為石聰所敗棄妻子南奔建康李矩將士陰謀叛降後趙矩不能討亦帥衆南歸復扶又翻敗補邁翻帥讀曰率衆皆道亡惟郭誦等百餘人隨之卒於魯陽魯陽縣屬南陽郡於是司豫徐兗之地率皆入於後趙以淮為境矣三年趙主曜以永安王胤為大司馬大單于徙封南陽王置單于臺于渭城單音蟬其左右賢王以下皆以胡羯鮮卑氐羌豪桀為之羯居謁翻三年秋七月辛未以尚書令郗鑒為車騎將軍都督徐兗青三州諸軍事兗州刺史鎮廣陵三年閏月以尚書左僕射荀松章甲十一行本松作嵩乙十一行本同孔本同為光祿大夫録尚書事尚書鄧攸為左僕射三年右衛將軍虞胤元敬皇后之弟也元帝為琅邪王虞為即位追諡曰敬皇后祔廟從元帝諡曰元敬宗汝南王亮之子也典禁兵直殿內多聚勇士以為羽翼王導庾亮皆忌之頗以為言帝待之愈厚宮門管鑰皆以委之管鍵也鑰關牡也今謂之鎖匙亮夜有所表從宗求鑰宗不與叱亮使曰此汝家門戶邪亮益忿之為下亮殺宗張本使疏吏翻不欲見人㣥臣無得進者亮疑宗胤及宗兄西陽王羕有異謀排闥入升御床見帝流涕言羕與宗等謀廢大臣自求輔政請黜之帝不納羕余亮翻壬午帝引太宰羕司徒導尚書令卞壼車騎將軍郗鑒護軍將軍庾亮領軍將軍陸曄按晉制領軍將軍在護軍將軍之上今先書庾亮而後陸曄亮以外戚受遺專權故也並受遺詔輔太子更入殿將兵直宿更工衡翻迭也復拜壼右將軍亮中書令曄録尚書事復扶又翻丁亥降遺詔戊子帝崩年二十七斷丁亂翻故能以弱制強誅翦逆臣克復大業己丑太子即皇帝位生五年矣㣥臣進璽進璽於嗣君也璽斯氏翻卞壼正色於朝曰朝直遙翻下同王公豈社稷之臣邪大行在殯嗣皇未立寧是人臣辭疾之時也導聞之輿疾而至大赦增文武位二等尊庾后為皇太后㣥臣以帝幼沖奏請太后依漢和熹皇后故事言臨朝稱制也乃從之秋九月癸卯太后臨朝稱制以司徒導録尚書事與中書令庾亮尚書令卞壼參輔朝政然事之大要皆決於亮加郗鑒車騎大將軍陸曄左光祿大夫皆開府儀同三司以南頓王宗為驃騎將軍驃匹妙翻虞胤為大宗正尚書召樂廣之子謨為郡中正樂廣南陽人蓋召謨為本郡中正漢置廷尉平晉曰廷尉評卞壼奏曰人非無父而生職非無事而立有父必有命居職必有悔易繫辭曰悔吝者憂虞之象也則為王者無民君臣之道廢矣樂廣庾珉受寵聖世身非己有況及後嗣而可專哉所居之職若順夫㣥心則戰戍者之父母皆當命子以不處也言人莫不惡死若各順其心則有戰戍之事為父母者皆不欲使其子就死地也處昌呂翻各就職三年辛丑葬明帝于武平陵三年冬十一月癸巳朔日有食之三年慕容廆與段氏方睦為段牙謀使之徙都牙從之即去令支國人不樂為于僞翻樂音洛令音鈴師古郎定翻支音祗段疾陸眷之孫遼欲奪其位以徙都為牙罪十二月帥國人攻牙殺之帥讀曰率自立句斷日益強盛其地西接漁陽東界遼水所統胡晉三萬餘戶控弦四五萬騎三年荊州刺史陶侃以寧州刺史王堅不能禦寇是歲表零陵太守南陽尹奉為寧州刺史以代之先是王遜在寧州先悉薦翻蠻酋梁水太守爨量益州太守李逖沈約曰梁水太守晉成帝分興古郡立蓋先以授蠻酋殺爨量之後始用王官也益州郡後漢置蜀更名建寧郡惠帝太安二年分建寧以西七縣別立益州郡懷帝永嘉二年更名晉寧郡此復有益州太守蓋亦以為位號授蠻酋也逖他歷翻遜討之不能克奉至州重募徼外夷刺爨量殺之諭降李逖徼吉弔翻刺七亦翻降戶江翻州境遂安三年代王賀傉卒傉奴沃翻弟紇那立顯宗成皇帝上之上諱衍字世根明帝長子也諡法安民立政曰成咸和元年丙戌三二六三年春二月大赦改元三年趙以汝南王咸為太尉録尚書事光祿大夫劉綏為大司徒卜泰為大司空劉后疾病趙主曜問所欲言劉氏泣曰妾幼鞠於叔父昶鞠養也昶丑兩翻叔父皚之女芳有德色皚魚開翻願以備後宮言終而卒曜以昶為侍中大司徒録尚書事立芳為皇后尋又以昶為太保三年三月後趙主勒夜微行檢察諸營衛齎金帛以賂門者求出永昌門候王假欲收捕之從者至乃止從才用翻旦召假以為振忠都尉爵關內侯振忠都尉後趙所置也光醉不至黜為牙門光侍直有慍色慍於問翻慍色者含怒而見於色也勒怒並其妻子囚之三年夏四月後趙將石生寇汝南執內史祖濟三年六月癸亥泉陵公劉遐卒泉陵縣屬零陵郡癸酉以車騎大將軍郗鑒領徐州刺史征虜將軍郭默為北中郎將監淮北諸軍事領遐部曲遐子肇尚幼遐妹夫田防及故將史迭等不樂他屬樂音洛共以肇襲遐故位而叛臨淮太守劉矯掩襲遐營劉遐屯泗口在臨淮下邳之間故矯得以掩襲其營遐妻邵續女也驍果有父風驍古堯翻遐嘗為後趙所圍妻單將數騎拔遐出於萬衆之中及田防等欲作亂遐妻止之不從乃密起火燒甲仗都盡故防等卒敗卒子恤翻詔以肇襲遐爵襲爵泉陵公司徒導稱疾不朝朝直遙翻下同而私送郗鑒卞壼奏導虧法從私無大臣之節請免官雖事寢不行舉朝憚之壼儉素廉潔裁斷切直當官幹實性不弘裕不肯苟同時好斷丁亂翻好呼到翻故為諸名士所少重之曰多輕之曰少少始紹翻卿常無閒泰如含瓦石不亦勞乎壼曰諸君子以道德恢弘風流相尚執鄙吝者非壼而誰時貴游子弟多慕王澄謝鯤為放達壼厲色於朝曰悖禮傷教罪莫大焉中朝傾覆實由於此欲奏推之中朝謂西晉奏推奏之於上推按其罪也乃止三年成人討越巂斯叟破之討斯叟事始上卷明帝太興元年巂音髓三年秋七月癸丑觀陽烈侯應詹卒觀陽縣屬零陵郡吳立三年初王導輔政以寬和得衆及庾亮用事任法裁物頗失人心豫州刺史祖約自以名輩不後郗卞名為一時所稱輩以年齒為等又望開府復不得晉制四征四鎮大將軍乃得開府約平西將軍耳烏得望開府邪復扶又翻遂懷怨望及遺詔褒進大臣又不及約與陶侃二人皆疑庾亮刪之刪削除也有功於國謂破沈充錢鳳也有鋭卒萬人器械甚精朝廷以江外寄之而峻頗懷驕溢有輕朝廷之志招納亡命衆力日多皆仰食縣官運漕相屬仰牛向翻屬之欲翻稍不如意輒肆忿言亮既疑峻約又畏侃之得衆八月以丹楊尹溫嶠為都督江州諸軍事江州刺史鎮武昌尚書僕射王舒為會稽內史會工外翻以廣聲援又修石頭以備之亮修石頭適以資蘇峻拒義師耳丹楊尹阮孚以太后臨朝政出舅族謂所親曰今江東創業尚淺主幼時艱庾亮年少少詩照翻德信未孚以吾觀之亂將作矣遂求出為廣州刺史孚咸之子也三年冬十月立帝母弟嶽為吳王三年南頓王宗自以失職怨望宗解兵衛故自以為失職庾亮欲誅之宗亦欲廢執政御史中丞鍾雅劾宗謀反劾戶概翻又戶得翻亮使右衛將軍趙胤收之宗以兵拒戰為胤所殺貶其族為馬氏三子綽超演皆廢為庶人免太宰西陽王羕降封弋陽縣王大宗正虞胤左遷桂陽太守宗宗室近屬羕先帝保傅羕宗兄弟也宗言近屬羕言保傅宗敍族羕敍官也由是愈失遠近之心宗黨卞闡亡奔蘇峻亮符峻送闡峻保匿不與宗之死也帝不之知久之帝問亮曰常日白頭公何在亮對以謀反伏誅帝泣曰舅言人作賊便殺之人言舅作賊當如何亮懼變色三年趙將黃秀等寇酇酇縣漢屬南陽郡及晉分為順陽郡治所酇音贊帥讀曰率三年後趙王勒用程遐之謀營鄴宮使世子弘鎮鄴配禁兵萬人車騎所統五十四營悉配之以驍騎將軍領門臣祭酒王陽專統六夷以輔之驍堅堯翻中山公虎自以功多無去鄴之意及修三臺遷其家室虎由是怨程遐為後虎殺遐及弘張本三年十一月後趙石聰攻壽春祖約屢表請救朝廷不為出兵為于僞翻聰遂寇逡遒阜陵二縣皆屬淮南郡師古曰逡音峻遒音才由翻春秋公會吳于橐皋杜預云淮南逡遒縣劉昫曰唐廬州慎縣漢逡遒縣地建康大震詔加司徒導大司馬假黃鉞都督中外諸軍事以禦之軍于江寧蘇峻遣其將韓晃擊石聰走之導解大司馬朝議又欲作涂塘以遏胡寇祖約曰是棄我也益懷憤恚作涂塘則壽春在涂塘之外朝直遙翻涂讀曰滁恚於避翻三年十二月濟岷太守劉闓等晉志曰或云魏平蜀徙其豪將家於濟河北為濟岷郡太康地志無此郡未詳濟子禮翻以下邳叛降于後趙夏戶雅翻降戶江翻石瞻攻河南太守王瞻嚴瞻改羡于邾拔之劉薈鄒山記曰邾城在魯國鄒縣鄒山之南去山二里左傳文十三年邾遷于繹即此城也魏收地形志蘭陵縣有石城山復扶又翻三年後趙王勒以牙門將王波為記室參軍典定九流始立秀孝試經之制秀孝試經晉制也後趙至此始行之三年張駿畏趙人之逼是歲徙隴西南安民二千餘家于姑臧又遣使修好於成以書勸成主雄去尊號稱藩於晉使疏吏翻下同好呼到翻去羌呂翻下乃去同雄復書曰吾過為士大夫所推然本無心於帝王思為晉室元功之臣掃除氛埃而晉室陵遲德聲不振引領東望有年月矣會獲來貺情在暗至言引領望晉此情常在而駿書適至暗與之合也自是聘使相繼二年二年春正月朱提太守楊術與成將羅恆戰于臺登兵敗術死朱提音銖時二年夏五月甲申朔日有食之二年趙武衛將軍劉朗帥騎三萬襲楊難敵於仇池弗克帥讀曰率下同掠三千餘戶而歸二年張駿聞趙兵為後趙所敗敗補邁翻下同乃去趙官爵去羌呂翻復稱晉大將軍涼州牧遣武威太守竇濤金城太守張閬武興太守辛巖惠帝永寧中張軌表請合秦雍流移人於姑臧西北置武興郡閬音浪會韓璞攻掠趙秦州諸郡韓璞時在冀帥讀曰率將即亮翻屯狄道枹罕護軍辛晏告急枹音膚秋駿使韓璞辛巖救之璞進度沃干嶺沃干嶺在晉興郡大夏縣東南洮水西北璞曰夏末以來日星數有變數所角翻不可輕動且曜與石勒相攻胤必不能久與我相守也與胤夾洮相持七十餘日水經注洮水過狄道城西洮土刀翻十月璞遣辛巖督運於金城胤聞之曰韓璞之衆十倍於吾吾糧不多難以持久今虜分兵運糧天授我也若敗辛巖璞等自潰乃帥騎三千襲巖于沃干嶺敗之敗補邁翻遂前逼璞營璞衆大潰胤乘勝追奔濟河攻拔令居令居縣漢屬金城郡張實置廣武郡令居分屬焉進據振武振武在姑臧東南廣武西北張閬辛晏帥其衆數萬降趙駿遂失河南之地二年庾亮以蘇峻在歷陽終為禍亂欲下詔徵之訪於司徒導導曰峻猜險必不奉詔不若且苞容之亮言於朝曰峻狼子野心終必為亂左傳楚令尹子文曰諺曰狼子野心是乃狼也其可畜乎朝直遙翻今日徵之縱不順命為禍猶淺若復經年不可復制猶七國之於漢也漢鼂錯議削吳楚曰今削之亦反不削亦反削之反疾禍小不削反遲禍大亮以為比復扶又翻獨光祿大夫卞壼爭之曰峻擁強兵逼近京邑路不終朝歷陽之與建康一江之隔耳難乃旦翻近其靳翻易為蹉跌易以豉翻蹉七何翻跌徒結翻宜深思之亮不從壼知必敗與溫嶠書曰元規召峻意定庾亮字元規峻已出狂意而召之是更速其禍也必縱毒蠚以向朝廷朝廷威力雖盛不知果可擒不蠚呼各翻螫也不讀曰否王公亦同此情吾與之爭甚懇切不能如之何本出足下以為外援謂以嶠鎮尋陽也不得相與共諫止之或當相從耳嶠亦纍書止亮舉朝以為不可朝直遙翻亮皆不聽峻聞之遣司馬何仍詣亮曰討賊外任遠近惟命至於內輔實非所堪亮不許召北中郎將郭默為後將軍領屯騎校尉郭默時監淮北軍騎奇寄翻皆將兵以備峻冰亮之弟也於是下優詔徵峻為大司農加散騎常侍位特進以弟逸代領部曲峻上表曰昔明皇帝親執臣手使臣北討胡寇今中原未靖臣何敢即安乞補青州界一荒郡以展鷹犬之用復不許復扶又翻峻嚴裝將赴召猶豫未決參軍任讓謂峻曰將軍求處荒郡而不見許任音壬處昌呂翻事勢如此恐無生路不如勒兵自守阜陵令匡術亦勸峻反阜陵縣屬淮南郡晉志曰阜陵漢明帝時淪為麻湖麻湖在今和州歷陽縣西三十里溫嶠聞之即欲帥衆下衛建康帥讀曰率三吳亦欲起義兵亮並不聽而報嶠書曰吾憂西陲過於歷陽西陲謂陶侃也雷池即在大雷之東今池州界水經注青林水西南歷尋陽分為二水一水東流通大雷原缺十八字使疏吏翻峻曰臺下云我欲反豈得活邪我寧山頭望廷尉不能廷尉望山頭往者國家危如纍卵非我不濟狡兔既死獵犬宜烹越范蠡遺大夫種曰狡兔死走狗烹言欲報庾亮也峻知祖約怨朝廷乃遣參軍徐會推崇約請共討庾亮約大喜其從子智衍並勸成之從才用翻譙國內史桓宣謂智曰本以強胡未滅將勠力討之使君若欲為雄霸何不助國討峻則威名自舉今乃與峻俱反此安得久乎智不從宣詣約請見約知其欲諫拒而不內內讀曰納宣遂絶約不與之同約於是赴歷陽宣將其衆營於馬頭山約遣兄子沛內史渙女壻淮南太守許柳以兵會峻逖妻柳之姊也固諫不從詔復以卞壼為尚書令領右衛將軍以鄶稽內史王舒行揚州刺史事鄶稽即會稽音古外翻王舒傳曰時徵蘇峻王導欲出舒為外援授會稽內史舒以父名會辭朝議以字同音異於禮無嫌舒復陳音雖異而字同求改他郡於是改會字為鄶吳興太守虞潭督三吳等諸郡軍事尚書左丞孔坦司徒司馬丹楊陶回言於王導請及峻未至急斷阜陵守江西當利諸口阜陵有麻湖之阻守當利諸口則峻兵不得渡江一戰決矣少詩沼翻若峻未來可往逼其城今不先往峻必先至峻至則人心危駭難與戰矣此時不可失也導然之庾亮不從十二月辛亥蘇峻使其將韓晃張健等襲陷姑孰取鹽米姑孰臨江渚舟船所湊晉積鹽米於此壬子彭城王雄章武王休叛奔峻雄釋之子也彭城王釋宣帝弟穆王權之子章武王休義陽王望之孫庚申京師戒嚴假庾亮節都督征討諸軍事以左衛將軍趙胤為歷陽太守使左將軍司馬流將兵據慈湖以拒峻慈湖在姑孰今在太平州當塗縣北六十五里泝江而上過三山十餘里至溧洲自溧洲過白土磯入慈湖夾侍中褚翜典征討軍事翜色洽翻亮使弟翼以白衣領數百人備石頭二年丙寅徙琅邪王昱為會稽王吳王嶽為琅邪王二年宣城內史桓彞欲起兵以赴朝廷其長史裨惠姓譜裨姓鄭裨諶之後山民易擾宣城之西南山越居之自吳以來屢為寇亂易以豉翻彞厲色曰見無禮於其君者若鷹之逐鳥雀左傳魯大夫臧文仲之言義無宴安辛未彞進屯蕪湖韓晃擊破之因進攻宣城宣城郡治宛陵縣宣城別為縣賢曰宣城故城在今宣州南陵縣東何承天曰廣德漢舊縣沈約曰二漢志並無疑是吳所立屬宣城郡桐川志後漢置廣德縣晉並入宣城今廣德軍是也還從宣翻又如字徐州刺史郗鑒欲帥所領赴難帥讀曰率難乃旦翻詔以北寇不許二年是歲後趙中山公虎擊代王紇那戰于句注陘北張守節曰句注山在代州鴈門縣西北三十里據唐志鴈門縣有東陘關西陘關即其地也句音鉤徙都大寧以避之據水經注大寧即廣寧也廣寧前漢曰廣寧屬上谷郡後漢曰廣寧晉武帝太康中分置廣寧郡二年代王鬱律之子翳槐居於其舅賀蘭部紇那遣使求之賀蘭大人藹頭擁護不遣紇那與宇文部共擊藹頭不克何茲全標點王崇武聶崇岐覆校
