body:
  text: 資治通鑑卷第二百一十四端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註唐紀三十玄宗至道大聖大明孝皇帝中之中開元二十二年開元二十二年甲戌七三四開元二十二年春正月己巳上發西京己丑至東都張九齡自韶州入見見賢遍翻考異曰唐紀二十六日戊子至東都己丑張九齡至自韶州今從實錄求終喪不許開元二十二年二月壬寅秦州地連震壞公私屋殆盡吏民壓死者四千餘人命左丞相蕭嵩賑恤壞音怪賑津忍翻開元二十二年方士張果自言有神仙術誑人云堯時為侍中於今數千歲多往來恆山中恆山時屬定州恆陽縣界誑居況翻恆戶登翻屢徵不至相州刺史韋濟薦之上遣中書舍人徐嶠齎璽書迎之相息亮翻璽斯氏翻庚寅至東都肩輿入宮恩禮甚厚開元二十二年張九齡請不禁鑄錢三月庚辰敕百官議之裴耀卿等皆曰一啟此門恐小人棄農逐利而濫惡更甚自武后以來民間多惡錢官不能禁若稅銅折役則官冶可成計估度庸則私鑄無利易而可久簡而難誣沔彌兗翻折之舌翻易以豉翻且夫錢之為物貴以通貨利不在多何待私鑄然後足用也右監門錄事參軍劉秩曰唐十六衞府皆有錄事參軍正八品下掌受諸曹及五府之外府事句稽抄目印給紙筆監古銜翻夫人富則不可以賞勸貧則不可以威禁若許其私鑄貧者必不能為之臣恐貧者益貧而役於富富者益富而逞其欲漢文帝時吳王濞富埒天子鑄錢所致也事見十四卷漢文帝五年濞匹備翻埒力輟翻秩子玄之子也劉子玄即知幾避帝嫌名以字行開元二十二年夏四月壬辰以朔方節度使信安王禕兼關內道采訪處置使增領涇原等十二州處昌呂翻開元二十二年吏部侍郎李林甫柔佞多狡數深結宦官及嬪家伺候上動靜無不知之伺相吏翻由是每奏對常稱旨上悅之稱尺證翻時武惠寵幸傾後宮生壽王清諸子莫得為比太子浸疏薄林甫乃因宦官言於惠願盡力保護壽王惠德之陰為內助由是擢黃門侍郎考異曰舊傳云初侍中裴光庭妻武三思女詭譎有材略與林甫私中官高力士本出三思家及光庭卒武氏銜哀祈於力士請林甫代其夫位力士未敢言玄宗使中書令蕭嵩擇相久之以右丞韓休對玄宗然之乃令草詔力士遽漏於武氏乃令林甫白休休既入相甚德林甫與嵩不和乃薦林甫堪為宰相惠陰助之因拜黃門侍郎玄宗眷遇益深按光庭妻一寡婦耳豈敢遽引所私代其夫為相韓休正直雖得林甫先報必不至薦之為相今不取戊子以裴耀卿為侍中張九齡為中書令林甫為禮部尚書同中書門下三品為李林甫得權太子廢張本顏真卿疏曰天寶已後閹官袁思藝日宣詔至中書玄宗動靜必告林甫林甫先意奏請玄宗驚喜若神以此權柄恩寵日甚開元二十二年上種麥於苑中帥太子以下親往芟之帥讀曰率芟所銜翻謂曰此所以薦宗廟故不敢不親且欲使汝曹知稼穡艱難耳又徧以賜侍臣曰比遣人視田中稼多不得實故自種以觀之種藝之事天有雨暘之不時地有肥磽之不等而人力又有至不至故所收有厚薄之異也若人君不奪農時人得盡其力則地無遺利矣豈必待自種而觀其實哉開元二十二年六月壬辰幽州節度使張守珪大破契丹使疏吏翻下同契欺訖翻又音喫考異曰實錄守珪大破林胡按會要契丹事二十二年守珪大破之蓋實錄以契丹即戰國時林胡地故云然遣使獻捷開元二十二年薛王業疾病上憂之容髮為變為于偽翻七月己巳薨贈諡惠宣太子開元二十二年上以裴耀卿為江淮河南轉運使考異曰舊紀云充江淮以南回造使今從舊食貨志八月壬寅於輸場東置河陰倉西置柏崖倉高宗咸亨二年於洛州河陽縣柏崖置倉開元十年廢今復因舊基置之西置鹽倉鑿漕渠十八里以避三門之險參考新舊志乃是鑿山開車路十八里非漕渠也舟運江淮之米至東都含嘉倉僦車陸運三百里至陝率兩斛用十嚴十改千錢耀卿令江淮舟運悉輸河陰倉更用河舟運至含嘉倉及太原倉自太原倉入渭輸關中凡三歲運米七百萬斛省僦車錢三十萬緡按舊志東都含嘉倉積江淮之米載以大輿運而西至于陝三百里率兩斛計庸錢千此耀卿所省之大數也十錢誤當從千錢為是先悉薦翻僦即就翻陝失冉翻更工衡翻考異曰舊志云四十萬貫今從耀卿傳舊志又云明年耀卿拜侍中蕭炅代焉按耀卿二十一年建此議今年為侍中始置河陰倉後三年方見成效則非作侍中時解此職也說式芮翻耀卿曰此公家贏縮之利耳柰何以之市寵乎悉奏以為市糴錢糴徒歷翻開元二十二年張果固請歸恆山制以為銀青光祿大夫號通玄先生厚賜而遣之後卒好異者奏以為尸解解佳買翻仙家所謂尸解譬猶蟬蛻蟬飛而蛻在也卒子恤翻好呼到翻上由是頗信神仙明皇改集仙為集賢殿是其初心不信神仙也至是則頗信矣又至晚年則深信矣史言正心為難漸入於邪而不自覺開元二十二年冬十二月戊子朔日有食之開元二十二年乙巳幽州節度使張守珪斬契丹王屈烈及可突干傳首考異曰舊守珪傳屈烈作屈剌契丹傳來年正月傳首今從實錄時可突干連年為邊患趙含章薛楚玉皆不能討守珪到官屢擊破之可突干困迫遣使詐降守珪使管記王悔就撫之悔至其牙帳察契丹上下殊無降意降戶江翻下同但稍徙營帳近西北密遣人引突厥謀殺悔以叛悔知之近其靳翻牙官李過折考異曰舊契丹傳作遇折今從實錄及守珪傳爭權不叶悔說過折使圖之說式芮翻過折夜勒兵斬屈烈及可突干盡誅其黨帥餘衆來降帥讀曰率守珪出師紫蒙州章十二行本州作川乙十一行本同孔本同據晉書載記秦漢之間東胡邑于紫蒙之野唐書地理志平州有紫蒙白狼昌黎等戍蓋平州之北境契丹之南界也大閱以鎮撫之梟屈烈可突干首于天津之南梟堅堯翻開元二十二年突厥毗伽可汗為其大臣梅錄啜所毒厥九勿翻伽求迦翻可從刊入聲汗音寒啜陟劣翻未死討誅梅錄啜及其族黨既卒子伊然可汗立尋卒弟登利可汗立卒子恤翻舊史曰登利華言果報也考異曰舊傳伊然立詔宗正卿李詮弔祭冊立伊然為立碑廟無幾伊然病卒又立其弟為登利可汗按張九齡集敕登利可汗書云今又遣從叔金吾大將軍佺弔祭又云建碑立廟貽範紀功然則告喪時登利已立矣實錄詮亦作佺庚戌來告喪開元二十二年禁京城匄者置病坊以廩之時病坊分置於諸寺以悲田養病本於釋教也匄古太翻二十三年二十三年春正月契丹知兵馬中郎李過折來獻捷制以過折為北平王檢校松漠州都督考異曰實錄云同幽州節度副大使舊傳云授特進檢校松漠州都督按過折雖有功唐未必肯使為幽州節度使今從舊傳乙亥上耕藉田九推乃止杜佑曰是年親耕有司進儀注天子三推公卿九推庶人終畝帝欲重耕藉遂進耕五十餘步盡隴乃止推吐雷翻赦天下都城酺三日都城謂東都城酺音蒲上御五鳳樓酺宴觀者諠隘樂不得奏金吾白梃如雨不能遏隘烏懈翻梃待鼎翻上患之高力士奏河南丞嚴安之為理嚴唐赤縣丞從七品理治也唐諱治改曰理請使止之上從之安之至以手板繞場畫地曰犯此者死於是盡三日人指其畫以相戒無敢犯者時命三百里內刺史縣令各帥所部音樂集於樓下各較勝負帥讀曰率懷州刺史以車載樂工數百皆衣文繡服箱之牛皆為虎豹犀象之狀詩大東曰睆彼牽牛不以服箱註云服牝服也箱大車之箱也疏云兩較之間謂之箱甫田云乃求萬斯箱書傳云長幾充箱是車內容物之處丘氏曰服箱猶言駕車也衣於既翻連袂歌于蒍魯山古魯縣夏孔甲時豢龍氏劉累所遷之地漢為魯陽縣屬南陽郡後魏置魯陽郡隋復為魯縣屬汝州唐為魯山縣以縣有魯山故名于蒍者德秀所為歌也蒍韋委翻考異曰明皇雜錄作于蒍新傳作于蒍于未詳其義今從雜錄懷州之人其塗炭乎立以刺史為散官散官無職事散蘇旱翻士大夫皆服其高二十三年上美張守珪之功欲以為相張九齡諫曰宰相者代天理物非賞功之官也上曰假以其名而不使任其職可乎對曰不可惟名與器不可以假人君之所司也左傳記孔子之言陛下即以為宰相若盡滅奚厥奚厥謂奚與突厥厥九勿翻上乃止二月守珪詣東都獻捷拜右羽林大將軍兼御史大夫賜二子官賞賚甚厚賚來代翻二十三年初殿中侍御史楊汪既殺張審素事見上卷十九年更工衡翻審素二子瑝琇皆幼瑝戶盲翻又音皇琇音秀坐流嶺表尋逃歸謀伺便復讎伺相吏翻三月丁卯手殺萬頃於都城繫表於斧言父冤狀欲之江外殺與萬頃同謀陷其父者至汜水為有司所得汜音祀議者多言二子父死非罪穉年孝烈能復父讎宜加矜宥穉直利翻張九齡亦欲活之裴耀卿李林甫以為如此壞國法壞音怪上亦以為然謂九齡曰孝子之情義不顧死然殺人而赦之此塗不可啟也乃下敕曰國家設法期於止殺各伸為子之志誰非徇孝之人展轉相讎何有限極咎繇作士咎與皋同古勞翻繇與陶同餘招翻法在必行曾參殺人亦不可恕宜付河南府杖殺士民皆憐之為作哀誄牓於衢路為于偽翻誄魯水翻市人斂錢葬之於北邙恐萬頃家發之仍為疑冢數處多作冢以疑之使莫知其所葬之的處二十三年唐初公主實封止三百戶中宗時太平公主至五千戶率以七丁為限開元以來皇妹止千戶皇女又半之皆以三丁為限駙馬皆除三品員外官而不任以職事公主邑入至少至不能具車服少詩沼翻左右或言其太薄上曰百姓租賦非我所有戰士出死力賞不過束帛女子何功而享多戶邪且欲使之知儉嗇耳秋七月咸宜公主將下嫁咸宜公主下嫁楊洄公主武惠之女也於是諸公主皆加至千戶二十三年冬十月戊申突騎施寇北庭及安西撥換城騎奇寄翻二十三年閏月壬午朔日有食之考異曰舊紀作十一月壬申朔按長曆十一月壬子朔今從實錄唐曆二十三年十二月乙亥冊故蜀州司戶楊玄琰女為壽王為帝納於後宮以亂國張本考異曰實錄載冊文云玄璬長女按陳鴻長恨歌傳云詔高力士潛搜外宮得楊玄琰女於壽邸舊楊貴傳云玄琰女早孤養於叔父玄璬又云或奏玄琰女容色冠代宜蒙召見時衣道士服號太真新傳云始為壽王云云遂召內禁中即為自出意者匄籍女官號太真更為壽王娶韋昭訓女而太真得幸舊史蓋諱之耳汪之曾孫也楊汪見一百八十三卷隋煬帝大業十二年二十三年是歲契丹王過折為其臣涅禮所殺涅奴結翻考異曰舊傳過折為可突干餘黨泥裏所殺不云朝廷如何處置泥裏今據張九齡集有此賜契丹都督涅禮敕又有賜張守珪敕云涅禮自亶難以義責而未有名位恐其不安卿可宣示朝旨使知無他也蓋泥裏即涅禮也幷其諸子一子剌乾奔安東得免剌盧達翻乾音干開元二年移安東都護府於平州涅禮上言過折用刑殘虐衆情不安故殺之上赦其罪因以涅禮為松漠都督且賜書責之曰卿之蕃法多無義於君長長知兩翻自昔如此朕亦知之然過折是卿之王有惡輒殺之為此王者不亦難乎但恐卿為王後人亦爾常不自保誰願作王亦應防慮後事豈得取快目前突厥尋引兵東侵奚契丹涅禮與奚王李歸國擊破之二十四年二十四年春正月庚寅敕天下逃戶聽盡今年內自首有舊產者令還本貫無者別俟進止踰限不首首式又翻當命專使搜求散配諸軍使疏吏翻二十四年北庭都護蓋嘉運擊突騎施大破之蓋古盍翻姓也二十四年二月甲寅宴新除縣令於朝堂上作令長新戒一篇賜天下縣令朝直遙翻長知兩翻二十四年庚午更皇子名更工衡翻考異曰舊紀唐曆二十三年七月景子皇太子諸王皆改名今從實錄鴻曰瑛潭曰琮浚曰璵洽曰琰涓曰瑤滉曰琬涺曰琚濰曰璲璲音遂澐曰璬璬公了翻澤曰璘清曰瑁瑁音冒洄曰玢玢方貧翻沭曰琦溢曰環沔曰理嚴理改瑝泚曰玼漼曰珪澄曰珙潓曰瑱瑱他甸翻漎曰璿璿從宣翻滔曰璥璥居影翻二十四年舊制考功員外郎掌試貢舉人有進士李權陵侮員外李昂議者以員外郎位卑不能服衆三月壬辰敕自今委禮部侍郎試貢舉人二十四年張守珪使平盧討擊使左驍衞將軍安祿山討奚契丹叛者擊使疏吏翻驍堅堯翻下同祿山恃勇輕進為虜為敗夏四月辛亥守珪奏請斬之祿山臨刑呼曰敗蒲邁翻呼火故翻大夫不欲滅奚契丹邪柰何殺祿山守珪亦惜其驍勇章十二行本勇下有欲活之三字乙十一行本同孔本同張校同乃更執送京師張九齡批曰昔穰苴誅莊賈史記齊景公使司馬穰苴為將穰苴曰願得君之寵臣以監軍景公使莊賈往賈素驕貴穰苴與之約日中會于軍門夕時乃至穰苴以賈後期斬之以令三軍批匹迷翻判也今人謂之批判孫武以兵法見吳王闔廬吳王曰可以勒兵小試於婦人乎曰可於是出宮中美女百八十人分為二隊以王寵姬二人各為隊長皆令持戟約束既布三令五申於是鼓之右婦人大笑孫子曰約束不行申令不熟將之罪也復三令五申而鼓之左婦人復大笑孫子斬左右隊長以徇用其次為隊長而復鼓婦人左右前後跪起皆中繩墨規矩於是吳王知孫子能用兵以為將祿山不宜免死上惜其才敕令免官以白衣將領將即亮翻九齡固爭曰祿山失律喪師於法不可不誅且臣觀其貌有反相不殺必為後患喪息浪翻相息亮翻上曰卿勿以王夷甫識石勒枉害忠良晉石勒年十四隨邑人行販洛陽倚嘯上東門王衍見而異之顧謂左右曰向者胡雛吾觀其聲視有奇志恐將為天下之患馳遣收之會勒已去考異曰玄宗實錄四月辛亥張守珪奏祿山統戎失律挫敗軍威請依軍法斬決許之祿山臨刑抗聲言曰兩蕃未和忍殺壯士豈為大夫謀也守珪以祿山嘗捷於擒生聞其言遂捨之以聞肅宗實錄云祿山為互市牙郎盜羊事發守珪怒追捕至欲擊殺之祿山大呼曰大夫不欲滅奚契丹兩蕃邪而殺壯士守珪奇其貌壯其言遂釋之姚汝能作祿山事迹其盜羊事與肅宗實錄同又云二十一年守珪令祿山奏事中書令張九齡見之謂侍中裴光庭曰亂幽州者此胡也又云二十四年祿山為平盧將討奚契丹失利守珪奏請斬之九齡批曰穰苴出軍必誅莊賈孫武行令亦斬宮嬪守珪軍令若行祿山不宜免死玄宗惜其勇銳但令免官白衣展效九齡執奏誅之玄宗曰卿豈以王夷甫識石勒便臆斷祿山難制邪竟不誅之孫樵作西齋錄其序曰張守珪以安祿山叛者何貸刑咈教稔禍階也祿山乃張守珪部將嘗犯令張曲江令守珪斬之不從果使亂天下故書曰張守珪以安祿山叛舊張九齡傳云張守珪以裨將安祿山討奚契丹敗衂執送京師請行朝典九齡奏劾曰穰苴出軍必誅莊賈孫武教戰亦斬宮嬪守珪軍令必行祿山不宜免死上特捨之九齡奏曰祿山狼子野心面有逆相臣請因罪戮之冀絕後患上曰卿勿以王夷甫知石勒故事誤害忠良遂放歸蕃新傳語裴光庭事如事迹執送京師事如舊傳舊祿山傳盜羊事如事迹而無失利請斬事新傳亦然舊傳仍云二十年守珪為幽州節度使祿山盜羊事覺按裴光庭二十一年卒是年冬九齡乃為相云與光庭語誤也孫樵云曲江令守珪斬之尤為失實實錄二十一年守珪猶在隴右與吐蕃立分界碑未至幽州舊傳云二十年為節度亦誤也按祿山若始為互市牙郎守珪安能知其終亂天下釋而不殺孫樵豈得遽以叛罪加之邪若如舊九齡傳守珪執送京師玄宗自赦之則守珪何罪而時人咎之也若謂盜羊喪師兩次當死則祿山豈祗用辭而得免兩死邪若如玄宗實錄守珪奏請行法得報聽許感其一言輒舍之則守珪必不敢輕易反覆如此且九齡何從得見其面而云面有逆相邪若云守珪未嘗奏請行法則張九齡集有賜守珪敕云祿山等輕我兵威曾不審料致令損失宜其就誅卿既行之軍法合爾又賜平盧將士敕云安祿山之誅緣輕敵太過勿因此畏懦致失後圖是當時曾許之行誅矣若云守珪自捨之非玄宗意則又賜守珪敕云祿山勇而無謀遂至失利衣甲資盜挫我軍威論其輕敵合加重罪然初聞勇鬬亦有誅殺又寇戎未滅軍令從權故不以一敗棄之將欲收其後效也不行薄責又無所懲宜且停官令白衣將領卿更審量本狀亦任隨事處之今以諸書參考蓋祿山失律守珪奏請行法故前敕云卿既行之軍法合爾又云祿山之誅緣輕敵太過似謂守珪已誅之矣既而守珪感其所言惜其驍勇欲殺則不忍欲捨則先已奏聞且恐不能厭服將士之心或者報未到故執送京師使上自裁之冀上見其材力而赦之亦猶陳平執樊噲衞青囚蘇建耳上因是欲赦之而九齡執奏云守珪軍令若行祿山不宜免死是幷劾守珪不斷於閫外乃更執以諉上之辭也九齡因此見之而云面有逆相上終欲赦之故九齡不得已草敕云卿更審量本狀隨事處之守珪得此敕即捨之以聞如此則與玄宗實錄相應而於人情差似相近安祿山者本營州雜胡初名阿犖山其母巫也新書曰祿山本姓康其母居突厥中禱于軋犖山虜所謂戰鬬神者而生祿山故以為字從母冒姓安氏阿烏葛翻犖呂角翻母攜之再適突厥安延偃會其部落破散與延偃兄子思順俱逃來故冒姓安氏名祿山又有史窣干者窣蘇骨翻與祿山同里閈先後一日生考異曰舊傳云思明除日生祿山元日生按祿山事迹天寶十載正月二十日上及貴為祿山作生日今不取相親愛皆為互市牙郎以驍勇聞牙郎駔儈也南北物價定於其口而後相與貿易祿山每與數騎出輒擒契丹數十人而返狡猾善揣人情將即亮翻騎奇寄翻揣初委翻守珪愛之養以為子窣干嘗負官債亡入奚中為奚遊弈所得欲殺之窣干紿曰我唐之和親使也給湯亥翻使疏吏翻汝殺我禍且及汝國遊弈信之送詣牙帳窣干見奚王長揖不拜奚王雖怒而畏唐不敢殺以客禮館之館古玩翻使百人隨窣干入朝窣干謂奚王曰王遣人雖多觀其才皆不足以見天子聞王有良將瑣高者何不使之入朝瑣高者蓋奚中酋豪之號非人名也前已有李詩瑣高將即亮翻朝直遙翻窣干將至平盧先使人謂軍使裴休子曰奚使瑣高與精銳俱來聲云入朝實欲襲軍城宜謹為之備先事圖之休子乃具軍容出迎至館悉阬殺其從兵執瑣高送幽州使疏吏翻先悉薦翻從才用翻張守珪以窣干為有功奏為果毅累遷將軍後入奏事上與語悅之賜名思明安史事始此二十四年故連州司馬武攸望之子溫眘坐交通權貴杖死帝平韋氏武攸望貶死眘時刃翻乙丑朔方河東節度使信安王禕貶衢州刺史廣武王承宏貶房州別駕涇州刺史薛自勸貶澧州別駕皆坐與溫眘交遊故也承宏守禮之子也豳王守禮章懷太子賢之子辛未蒲州刺史王琚貶通州刺史坐與禕交書也二十四年五月醴泉妖人劉志誠作亂驅掠路人將趣咸陽妖於喬翻趣七喻翻村民走告縣官焚橋斷路以拒之斷音短其衆遂潰數日悉擒斬之二十四年六月初分月給百官俸錢二十四年初上因藉田赦命有司議增宗廟籩豆之薦及服紀未通者太常卿韋縚奏請宗廟每坐籩豆十二縚土刀翻坐徂臥翻兵部侍郎張均職方郎中韋述議曰聖人知孝子之情深而物類之無限故為之節制人之嗜好本無憑準宴私之饌與時遷移故聖人一切同歸於古屈到嗜芰屈建不以薦以為不以私欲干國之典國語楚屈到嗜芰有疾召其宗老而屬之曰祭我必以芰及祥宗老將薦芰屈建命去之曰國君有牛享大夫有羊饋士有豚犬之奠庶人有魚炙之薦籩豆脯醢則上下共之不羞珍異不陳庶侈不以其私欲干國之典遂不用芰奇寄翻蔆一名芰說文曰楚謂之芰秦謂之薢茩今俗但言蔆芰武陵記四角三角曰芰兩角曰蔆好呼到翻去羌呂翻皆充祭用苟踰舊制其何限焉書曰黍稷非馨明德惟馨書成王命君陳之言平生所習求神無方何必泥古則簠簋可去而盤盂盃案當在御矣韶濩可息而箜篌箏笛當在奏矣舜樂曰韶湯樂曰濩箜篌漢武帝使樂人侯調所作或云侯輝所作今按其形似瑟而小七絃用撥彈之如琵琶舊唐書曰箜篌胡樂也漢靈帝好之體曲而長二十三絃豎抱于懷用兩手齊奏俗名擘箜篌鳳首箜篌有項加軫七絃鄭善子作開元中進形如阮咸其下鈌小而身大旁有小鈌取其身便也一曰箜篌乃鄭衞之音權輿以其亡國之聲故號空國之侯亦曰坎侯風俗通云漢武帝時丘仲作笛按周禮笙師掌教篪遂又云起於羌人後漢馬融所賦橫笛空洞無底剡其二孔五孔一出其背正似今之尺八李善為之註七孔今一尺四寸此乃今之橫笛耳太常鼓吹部中所謂橫吹非融所賦者融賦易京君明識音律故本四孔加以一君明所加孔後出是謂商聲五音畢沈約宋書亦云京房備其五音周禮笙師註杜子春云遂乃今時所吹五孔遂以融約所記論之則古遂不應有五孔子春之說亦未為然今三禮圖畫遂亦橫設而有五孔不知出何典據遂與笛同簠音甫簋居洧翻後嗣何觀夫神以精明臨人者也不求豐大苟失於禮雖多何為豈可廢棄禮經以從流俗且君子愛人以禮不求苟合況在宗廟敢忘舊章太子賓客崔沔議曰祭祀之興肇於太古茹毛飲血則有毛血之薦未有麴糵則有玄酒之奠司烜氏以鑒取明水於月為玄酒糵魚列翻禮物漸備施弋智翻然以神道致敬不敢廢也籩豆簠簋樽罍之實皆周人之時饌也其用通於宴饗賓客而周公制禮與毛血玄酒同薦鬼神國家由禮立訓因時制範清廟時饗禮饌畢陳用周制也如簠簋籩豆鉶羹之類饌雛戀翻又雛睆翻時膳具設遵漢法也如叔孫通請薦含桃之類上時掌翻致遠物也有新必薦順時令也苑囿之內躬稼所收蒐狩之時親發所中莫不薦而後食盡誠敬也若此至矣復何加焉中竹仲翻復扶又翻但當申敕有司無或簡怠則鮮美肥濃盡在是矣不必加籩豆之數也自此以上諸人之議皆因舊禮而申之上固欲量加品味量音良縚又奏每室加籩豆各六四時各實以新果珍羞從之縚又奏喪服舅緦麻三月從母外祖父母皆小功五月外祖至尊同於從母之服姨舅一等服則輕重有殊姨即從母也從才用翻恩絕不相為服舅母來承外族不如同爨之禮竊以古意猶有所未暢者也請加外祖父母為大功九月姨舅皆小功五月堂舅堂姨舅母並加至袒免五服止於緦麻此外有袒免之服袒者偏脫衣袒而露其肩免者以布廣一寸從項中而前交於額上又卻向後繞於髻袒音但免音問崔沔議曰正家之道不可以貳總一定義理歸本宗是以內有齊斬齊音咨外皆緦麻尊名所加不過一等此先王不易之道也願守八年明旨一依古禮崔沔所謂詔旨見二百十二卷七年曰八年者通帝即位先天之年數之也韋述議曰喪服傳曰禽獸知母而不知父野人曰父母何等章十二行本等作筭乙十一行本同退齋校同焉都邑之士則知尊禰矣傳直戀翻禰奴禮翻大夫及學士則知尊祖矣聖人究天道而厚於祖禰繫族姓而親其子孫母黨比於本族不可同貫明矣今若外祖與舅加服一等堂舅及姨列於服紀則中外之制相去幾何廢禮徇情所務者末古之制作者知人情之易搖恐失禮之將漸別其同異輕重相懸易以豉翻別彼列翻欲使後來之人永不相雜微旨斯在豈徒然哉苟可加也亦可減也往聖可得而非則禮經可得而隳矣先王之制謂之彞倫彞常也倫道理次敍猶恐失墜一紊其敍庸可止乎請依儀禮喪服為定紊音問禮部員外郎楊仲昌議曰唐禮部郎掌五禮舉其儀制而辯其名數鄭文貞公魏徵始加舅服至小功五月雖文貞賢也而周孔聖也以賢改聖後學何從竊恐內外乖序親疏奪倫情之所沿何所不至昔子路有姊之喪而不除孔子曰先王制禮行道之人皆不忍也子路除之見記檀弓記曰毋輕議禮禮器之言並彼日月賢者由之安敢損益也敕姨舅既服小功舅母不得全降宜服緦麻堂姨舅宜服袒免均說之子也說讀曰悅二十四年秋八月壬子千秋節㣥臣皆獻寶鏡張九齡以為以鏡自照見形容以人自照見吉凶乃述前世興廢之源為書五卷謂之千秋金鏡錄上之上時掌翻上賜書褒美二十四年甲寅突騎施遣其大臣胡祿達干來請降許之騎奇寄翻降戶江翻二十四年御史大夫李適之承乾之孫也以才幹得幸於上數為承乾論辯甲戌追贈承乾恆山愍王承乾廢見一百九十七卷太宗貞觀十七年數所角翻為于偽翻恆戶登翻二十四年乙亥汴哀王璥薨二十四年冬十月戊申車駕發東都先是敕以來年二月二日行幸西京先悉薦翻會宮中有怪明日上召宰相即議西還裴耀卿張九齡曰今農收未畢請俟仲冬李林甫潛知上指二相退林甫獨留言於上曰長安洛陽陛下東西宮耳往來行幸何更擇時借使妨於農收但應蠲所過租稅而已蠲圭玄翻臣請宣示百司即日西行上悅從之過陝州以刺史盧奐有善政題贊於其聽事而去稱人之美曰贊陝失冉翻聽讀曰廳懷慎之子也丁卯至西京二十四年朔方節度使牛仙客前在河西能節用度勤職業倉庫充實器械精利上聞而嘉之欲加尚書張九齡曰不可尚書古之納言唐興以來惟舊相及揚歷中外有德望者乃為之仙客本河湟使典事見上卷十五年相息亮翻使疏吏翻恐羞朝廷上曰然則但加實封可乎對曰不可封爵所以勸有功也邊將實倉庫修器械乃常務耳將即亮翻不足為功陛下賞其勤賜之金帛可也裂土封之恐非其宜上默然李林甫言於上曰仙客宰相才也何有於尚書九齡書生不達大體考異曰舊林甫傳曰林甫以九齡言告仙客仙客翌日見上泣讓官爵按時不聞仙客在京今從唐曆明日復以仙客實封為言復扶又翻九齡固執如初上怒變色曰事皆由卿邪九齡頓首謝曰陛下不知臣愚使待罪宰相事有未允臣不敢不盡言上曰卿嫌仙客寒微如卿有何閥閱九齡曰臣嶺海孤賤九齡韶州人牛仙客涇州人典司誥命有年矣九齡歷司勳員外郎中書舍人目不知書若大任之恐不愜衆望愜苦叶翻苟有才識何必辭學天子用人有何不可十一月戊戌賜仙客爵隴西縣公食實封三百戶初上欲以李林甫為相問於中書令張九齡九齡對曰宰相繫國安危陛下相林甫臣恐異日為廟社之憂上不從時九齡方以文學為上所重林甫雖恨猶曲意事之侍中裴耀卿與九齡善林甫幷疾之是時上在位歲久漸肆奢欲怠於政事而九齡遇事無細大皆力爭林甫巧伺上意日思所以中傷之伺相吏翻中竹仲翻上之為臨淄王也趙麗皇甫德儀劉才人皆有寵帝置六儀德儀其一也德儀生鄂王瑤才人生光王琚及即位幸武惠麗等愛皆弛惠生壽王瑁寵冠諸子太子與瑤琚會於內第時太子諸王皆居禁中冠古玩翻駙馬都尉楊洄尚咸宜公主常伺三子過失以告惠咸宜公主武惠之女故楊洄黨於惠太子陰結黨與將害妾母子亦指斥至尊上大怒以語宰相欲皆廢之語牛倨翻九齡曰陛下踐阼垂三十年太子諸王不離深宮離力智翻日受聖訓天下之人皆慶陛下享國久長子孫蕃昌蕃音煩今三子皆已成人不聞大過陛下柰何一旦以無根之語喜怒之際盡廢之乎且太子天下本不可輕搖昔晉獻公聽驪姬之讒殺申生三世大亂左傳晉獻公殺其世子申生立驪姬之子里克殺之公子夷吾重耳及子圉爭國三世大亂京城流血事見漢紀中原塗炭事見晉紀立煬帝遂失天下事見隋紀不可不慎陛下必欲為此臣不敢奉詔上不悅林甫初無所言退而私謂宦官之貴幸者曰此主上家事何必問外人上猶豫未決惠密使官奴牛貴兒謂九齡曰有廢必有興公為之援宰相可長處九齡叱之以其語白上上為之動色處昌呂翻上為于偽翻故訖九齡罷相太子得無動林甫日夜短九齡於上上浸疏之考異曰明皇雜錄云林甫請見屢陳仙客實封九齡頗懷誹謗于時方秋上命高力士以白羽扇賜之九齡惶恐作賦以獻新傳亦云然按實錄仙客加實封在十月而九齡集白羽扇賦序云開元二十四年夏盛暑奉敕使大將軍高力士賜宰相白羽扇九齡與焉竊有所感立獻賦云云敕報曰朕頃賜羽扇聊以滌暑佳彼勁翮方資利用與夫棄捐篋笥義不同也然則上以盛夏遍賜宰臣扇非以秋日獨賜九齡但九齡因此獻賦自寄意耳林甫引蕭炅為戶部侍郎炅素不學炅古迥翻嘗對中書侍郎嚴挺之讀伏臘為伏獵挺之言於九齡曰省中豈容有伏獵侍郎由是出炅為岐州刺史故林甫怨挺之九齡與挺之善欲引以為相嘗謂之曰李尚書方承恩李林甫時以禮部尚書相與之款暱挺之素負氣薄林甫為人竟不之詣林甫恨之益深挺之先娶妻出之更嫁蔚州刺史王元琰元琰坐贓罪下三司按鞫挺之為之營解林甫因左右使於禁中白上上謂宰相曰挺之為罪人請屬所由造七到翻更工衡翻蔚紆勿翻下遐嫁翻為于偽翻屬之欲翻九齡曰此乃挺之出妻不宜有情上曰雖離乃復有私復扶又翻下無復同於是上積前事以耀卿九齡為阿黨壬寅以耀卿為左丞相九齡為右丞相並罷政事以林甫兼中書令仙客為工部尚書同中書門下三品領朔方節度如故考異曰唐曆曰宰相遙領節度自仙客始按蕭嵩已遙領河西非始此舊志洺州京師東北一千五百八十五里上即位以來所用之相姚崇尚通宋璟尚法張嘉貞尚吏張說尚文李元紘杜暹尚儉韓休張九齡尚直各其所長也九齡既得罪自是朝廷之士皆容身保位無復直言李林甫欲蔽塞人主視聽自專大權明召諸諫官謂曰今明主在上㣥臣將順之不暇烏用多言諸君不見立仗馬乎食三品料一鳴輒斥去悔之何及塞悉則翻去羌呂翻唐舊儀每日尚乘以广既馬八匹分為左右廂立於正殿側宮門外候仗下即散若大陳設則馬在樂懸之北與大象相次進馬二人戎服執鞭侍立於馬之左隨馬進退補闕杜璡嘗上書言事璡資辛翻上時掌翻考異曰唐曆作杜珽今從新書明日黜為下邽令唐制上縣令從六品上補闕從七品上以此言之則非黜也蓋唐人重內官而品之高下不論也況遺補供奉官地居清要乎牛仙客既為林甫所引專給唯諾而已爭讀曰諍唯于癸翻然二人皆謹守格式百官遷除各有常度雖奇才異行不免終老常調其以巧諂邪險自進者則超騰不次自有他蹊矣林甫城府深密人莫窺其際好以甘言啗人而陰中傷之不露辭色凡為上所厚者始則親結之及位勢稍逼輒以計去之行下孟翻調徒弔翻中竹仲翻去羌呂翻雖老姦巨猾無能逃於其術者如韋堅楊慎矜王鉷之類是也二十五年二十五年春正月初置玄學博士崇玄學習老子莊子文子列子亦曰道舉二十五年二月敕曰進士以聲韻為學多昧古今明經以帖誦為功罕窮旨趣自今明經問大義十條對時務策三首進士試大經十帖二十五年戊辰新羅王興光卒卒子恤翻子承慶襲位二十五年乙酉幽州節度使張守珪破契丹於捺祿山使疏吏翻契欺訖翻又音喫捺奴剌翻二十五年己亥河西節度使崔希逸襲吐蕃破之於青海西初希逸遣使謂吐蕃章十二行本蕃下有邊將二字乙十一行本同退齋校同張校同云無註本亦無乞力徐曰兩國通好今為一家何必更置兵守捉妨人耕牧請皆罷之乞力徐曰常侍忠厚吐從暾入聲崔希逸蓋帶散騎常侍鎮河西故稱之使疏吏翻好呼到翻捉仄角翻然朝廷未必專以邊事相委萬一有姦人交鬬其間掩吾不備悔之何及希逸固請乃刑白狗為盟各去守備於是吐蕃畜牧被野朝直遙翻去羌呂翻被皮義翻畜許救翻時吐蕃西擊勃律勃律來告急上命吐蕃罷兵吐蕃不奉詔遂破勃律上甚怒會希逸傔人孫誨入奏事傔苦念翻傔從也唐制凡諸軍鎮大使副使以下皆有傔人別奏以為之使大使傔二十五人別奏十人副使傔二十人別奏八人自欲求功奏稱吐蕃無備請掩擊必大獲上命內給事趙惠琮與誨偕往審察事宜唐內侍省有內給事十人從五品下掌承旨勞問分判省事凡元日冬至百官賀皇后則出入宣傳宮人衣服費用則具品秩計其多少春秋宣送中書則矯詔令希逸襲之希逸不得已發兵自涼州南入吐蕃二千餘里至青海西與吐蕃戰大破之斬首二千餘級乞力徐脫身走惠琮誨皆受厚賞自是吐蕃復絕朝貢復扶又翻下而復同朝直遙翻二十五年夏四月辛酉監察御史周子諒彈牛仙客非才引讖書為證薛居正五代史曰天后朝有讖辭云首尾三鱗六十年兩角犢子自狂顛龍蛇相鬬血成川當時好事者解云兩角犢子牛也必有牛姓干唐祚監古銜翻彈徒丹翻命左右㩧於殿庭㩧蒲角翻擊也又匹角翻絕而復蘇仍杖之朝堂流瀼州至藍田而死瀼如羊翻又而章翻藍田縣漢晉屬京兆後魏真君七年併入霸城太和十一年復後周置藍田郡隋廢郡為縣屬京兆府九域志在府東南七十里考異曰舊紀云子諒以妄陳休咎於朝堂決殺實錄此月則曰子諒彈奏仙客非才引妖讖為證上怒召入禁中責之左右拉者數四氣絕而蘇及仙客傳則云子諒竊言於御史大夫李適之曰牛仙客不才濫登相位大夫國之懿親豈得坐觀其事適之遽奏子諒之言上大怒廷詰子諒子諒辭窮於朝堂決杖配流瀼州行至藍田死舊仙客傳亦然今從此月實錄及舊紀柳宗元周君墓碣云有唐貞臣汝南周氏諱某字某又曰在天寶年有以諂諛至相位賢臣放退公為御史抗言以白其事得死于墀下宗元集此碣雖無名字然其事則子諒也云在天寶年誤矣李林甫言子諒張九齡所薦也甲子貶九齡荊州長史二十五年楊洄又奏章十二行本奏作譖乙十一行本同太子瑛鄂王瑤光王琚云與太子兄駙馬薛鏽潛搆異謀鏽息六翻又息救翻考異曰新傳曰二十五年洄復搆瑛瑤琚與之兄薛鏽異謀惠使人詭召太子二王曰宮中有賊請介以入太子從之白帝曰太子二王謀反甲而來帝使中人視之如言遽召宰相林甫議答曰陛下家事非臣所宜豫帝意決乃廢瑛等按瑛等與惠相猜忌已久雖承言豈肯遽被甲入宮又按廢太子制書云陷元良於不友誤二子於不義不言被甲入宮也蓋洄譖瑛等云欲害壽王瑁耳今從舊傳但云潛構異謀上召宰相謀之李林甫對曰此陛下家事非臣等所宜豫上意乃決乙丑使宦者宣制於宮中廢瑛瑤琚為庶人於宮中廢之用李林甫家事之言也考異曰獨孤及作裴稹行狀云公為起居郎三庶人以罪廢壽王以母寵子愛議者頗有奪宗之嫌道路憫默朝野疑懼公乃從容請間慷慨獻諫上述新城之殷鑒下陳戾園之元龜謂興亡之由在廢立之地天子感悟改容以謝因詔以給事中授公公曰陛下絕招諫之路為日固久今臣一言而荷殊寵則言者衆矣何以錫之上善其敏而多其讓乃止不拜尋除尚書祠部員外郎按稹光庭之子當是時周子諒杖死張九齡遠貶稹若敢為太子直冤則聲振宇宙豈得湮沒無聞而諸書皆不言此事蓋出於及之虛美耳瑛瑤琚尋賜死城東驛鏽賜死於藍田瑤琚皆好學有才識死不以罪人皆惜之好呼到翻丙寅瑛舅家趙氏家薛氏瑤舅家皇甫氏坐流貶者數十人惟瑤家韋氏以賢得免二十五年五月夷州刺史楊濬坐贓當死上命杖之六十流古州夷州漢牂柯地其後為徼外隋開置綏陽縣屬明陽郡武德四年置夷州於思州寧夷縣明陽屬焉而綏陽屬義州貞觀元年廢夷州而明陽寧夷屬務州四年復置夷州於黔州都上縣尋又自都上移於綏陽貞觀十二年李弘節開夷獠置古州屬容州都督府以為決杖贖死恩則甚優解體受笞事頗為辱止可施之徒隸不當及於士人上從之二十五年癸未敕以方隅底定令中書門下與諸道節度使量軍鎮閒劇利害審計兵防定額於諸色征人及客戶中召募丁壯長充邊軍增給田宅務加優恤二十五年辛丑上命有司選宗子有才者授以臺省及法官京縣官敕曰違道慢常義無私於王法修身效節恩豈薄於他人期於帥先勵我風俗帥讀曰率二十五年秋七月己卯大理少卿徐嶠考異曰舊紀作徐岵今從刑法志通典今歲天下斷死刑五十八大理獄院由來相傳殺氣太盛鳥雀不栖今有鵲巢其樹於是百官以幾致刑措上表稱賀斷丁亂翻幾居依翻上時掌翻上歸功宰輔庚辰賜李林甫爵晉國公牛仙客豳國公考異曰實錄七月戊寅有司奏囚減少上歸美宰臣制曰斷獄五十殆至無刑遂封二人又十月丙午上因聽政問京城囚徒有司奏有五十人怡然有喜色下制曰日者叢棘之地烏鵲來巢今結諸刑名纔逾五十其刑部侍郎鄭少微等各賜中上考二者未詳其為一事二事今從舊紀上命李林甫牛仙客與法官刪脩律令格式成九月壬申頒行之二十五年先是西北邊數十州多宿重兵先悉薦翻地租營田皆不能贍贍而豔翻始用和糴之法有彭果者因牛仙客獻策請行糴法於關中戊子敕以歲稔穀賤傷農命增時價什二三和糴東西畿粟各數百萬斛東畿都畿也西畿京畿也糴他歷翻自是關中蓄積羨溢羨延面翻車駕不復幸東都矣復扶又翻癸巳敕河南北租應輸含嘉太原倉者據李泌傳太原倉在陝州西二十五年太常博士王璵璵音余考異曰舊傳不言璵鄉里世系新傳云方慶六世孫又新舊傳皆云抗疏請置春壇因遷太常博士不知其本何官也新表王方慶五世孫璵事肅宗按方慶長安二年卒距此才三十六年不應已有五世六世孫能上疏恐璵偶與之同名實非也今不取上疏請立青帝壇以迎春從之冬十月辛丑制自今立春親迎春於東郊時上頗好祀神鬼好呼到翻故璵專習祠祭之禮以干時上悅之以為侍御史領祠祭使璵祈禱或焚紙錢類巫覡漢以來喪葬有瘞錢後世俚俗稍以紙寓錢為鬼事使疏吏翻覡刑狄翻二十五年壬申上幸驪山溫泉乙酉還宮二十五年己丑開府儀同三司廣平文貞公宋璟薨二十五年十二月丙午惠武氏薨贈諡貞順皇后二十五年是歲命將作大匠康諐素嚴諐改之東都毀明堂諐與愆同籀文也新書禮樂志作諐素毀之勞人請去上層去羌呂翻卑於舊九十五尺仍舊為乾元殿從之二十五年初令租庸調租資課調徒弔翻皆以土物輸京都西京東都租庸調高祖太宗之法租資課必開元以來之法二十六年二十六年春正月乙亥以牛仙客為侍中二十六年丁丑上迎氣於滻水之東滻音產二十六年制邊地長征兵召募向足自今鎮兵勿復遣復扶又翻在彼者縱還二十六年令天下州縣里別置學二十六年壬辰以李林甫領隴右節度副大使以鄯州都督杜希望知留後鄯時戰翻又音善二月乙卯以牛仙客兼河東節度副大使牛仙客先已領朔方今兼河東二十六年己未葬貞順皇后于敬陵武惠諡貞順皇后敬陵在京兆萬年縣東南四十里二十六年壬戌敕河曲六州胡坐康待賓散隸諸州者聽還故土於鹽夏之間置宥州以處之徙六胡州見二百十二卷十年今併六胡州之地以為宥州舊志宥州去京師一千一百里夏戶雅翻處昌呂翻二十六年三月吐蕃寇河西節度使崔希逸擊破之鄯州都督知隴右留後杜希望攻吐蕃新城拔之以其地為威戎軍鄯州星宿川西北三百五十里有威戎軍考異曰舊傳作威武軍今從實錄二十六年夏五月乙酉李林甫兼河西節度使已領隴右又兼河西丙申以崔希逸為河南尹希逸自念失信於吐蕃以背乞力徐之盟也未幾而卒幾居豈翻二十六年太子瑛既死李林甫數勸上立壽王瑁上以忠王璵年長且仁孝恭謹又好學意欲立之猶豫歲餘不決自念春秋浸高三子同日誅死繼嗣未定常忽忽不樂寢膳為之減高力士乘間請其故數所角翻長知兩翻好呼到翻樂音洛為于偽翻間古莧翻上曰汝我家老奴豈不能揣我意揣初委翻力士曰得非以郎君未定邪上曰然對曰大家何必如此虛勞聖心但推長而立長知兩翻考異曰統紀敍力士語云但從大枒註謂肅宗也大枒語不可曉今從新傳誰敢復爭復扶又翻上曰汝言是也汝言是也由是遂定六月庚子立璵為太子二十六年辛丑以岐州刺史蕭炅為河西節度使總留後事鄯州都督杜希望為隴右節度使太僕卿王昱為劍南節度使考異曰舊傳作王昊今從實錄唐曆仍毀所立赤嶺碑立碑見上卷二十一年二十六年突騎施可汗蘇祿素廉儉每攻戰所得輒與諸部分之不留私蓄由是衆樂為用樂音洛既尚唐公主又潛通突厥及吐蕃突厥吐蕃各以女妻之蘇祿以三國女為可敦又立數子為葉護用度浸廣由是攻戰所得不復更分晚年病風一手攣縮妻七細翻復扶又翻下而復同攣閭緣翻諸部離心酋長莫賀達干都摩度兩部最強酋慈由翻長知兩翻考異曰會要作莫賀咄達干今從實錄新傳作都摩支今從實錄舊傳其部落又分為黃姓黑姓互相乖阻突騎施種人自謂娑葛後者為黃姓蘇祿部為黑姓殺之都摩度初與莫賀達干連謀既而復與之異立蘇祿之子骨啜為吐火仙可汗以收其餘衆與莫賀達干相攻莫賀達干遣使告磧西節度使蓋嘉運磧七迹翻吐火仙與都摩度據碎葉城黑姓可汗爾微特勒據怛邏斯城碎葉川長千里西屬怛邏斯城其城初屬石國石常分兵鎮之蓋古盍翻騎奇寄翻可從刊入聲汗音寒怛當割翻邏郎佐翻考異曰唐曆作恒邏斯今從實錄二十六年太子將受冊命儀注有中嚴外辦及絳紗袍唐制皇帝大祀致齋之日晝漏上水一刻侍中版奏請中嚴諸衞入陳于殿庭文武五品已上袴褶陪位諸侍從之官服其器服諸侍臣齋者結佩詣閤奉迎二刻侍中版奏外辦乘輿乃出朝會諸衞立仗百官就列已定侍中亦奏外辦不請中嚴皇帝將出駕發前七刻擊一鼓為一嚴前五刻擊二鼓為再嚴侍中版奏請中嚴有司陳鹵簿前二刻擊三鼓為三嚴諸衞以次入立于殿庭㣥官立朝堂侍中中書令已下奉迎于西階侍中奉寶乘黃令進路於太極殿西階南向千牛將軍執長刀立路前北向黃門侍郎立侍臣之前贊者二人既外辦太僕卿攝衣而升正立執轡乘輿出升路太后皇后亦有中嚴外辦皆尚儀版奏皇太子中嚴外辦左庶子版奏皇帝冠通天冠則服絳紗袍冬至受朝賀祭還燕㣥臣養老之服也太子冠遠遊冠亦服絳紗袍謁朝還宮元日朔日入朝釋奠之服也表請易之左丞相裴耀卿奏停中嚴改外辦曰外備改絳紗袍為朱明服秋七月己巳上御宣政殿冊太子考異曰元載肅宗實錄云二十七年七月壬辰行典禮今從玄宗實錄太子乘輅至殿門至是太子不就輅自其宮步入是日赦天下己卯冊忠王韋氏為太子二十六年杜希望將鄯州之衆奪吐蕃河橋築鹽泉城於河左吐蕃發兵三萬逆戰希望衆少不敵將即亮翻又音如字鄯音善又時戰翻吐從暾入聲少始紹翻將卒皆懼左威衞郎將王忠嗣帥所部先犯其陳所向闢易殺數百人虜陳亂將即亮翻嗣祥吏翻帥讀曰率陳讀曰陣希望縱兵乘之虜遂大敗置鎮西軍於鹽泉鎮西軍在河州西百八十里二十六年八月辛巳勃海王武藝卒子欽茂立二十六年九月丙申朔日有食之二十六年初儀鳳中吐蕃陷安戎城而據之初劍南度茂州之西築安戎城戍之以迮吐蕃南鄙生羌導吐蕃取之因守之遂幷西洱河諸蠻東與松茂巂接唐屢攻之不克劍南節度使王昱築兩城於其側頓軍蒲婆嶺下新書作蓬婆嶺其地在雪山外杜甫詩所謂次取蓬婆雪外城是也吐蕃大發兵救安戎城昱衆大敗死者數千人考異曰舊傳將士數萬人皆沒于賊今從實錄糧仗軍資皆棄之貶昱栝州刺史再貶高要尉而死二十六年戊午冊南詔蒙歸義為雲南王水經註雲南郡本雲山縣地也蜀劉氏建興二年置郡自唐戎州開邊縣而南七十里至曲州又二千五百里至雲南城歸義之先本哀牢夷地哀牢夷漢明帝之時內附東南接交趾西北接吐蕃蠻語謂王曰詔先有六詔曰蒙舍曰蒙越曰越析曰浪穹曰樣備曰越澹考異曰新書六詔曰蒙巂越析浪穹邆晱施浪蒙舍今從竇滂雲南別錄莫能相壹埒力輟翻歷代因之以分其勢蒙舍最在南故謂之南詔高宗時蒙舍細奴邏初入朝細奴邏生邏盛邏盛生盛邏皮盛邏皮生皮邏閤朝直遙翻邏郎佐翻考異曰新傳云蒙氏父子以名相屬細奴邏生邏盛炎邏盛炎生炎閤武后時邏盛炎身入朝妻方娠生盛邏皮喜曰我又有子雖死唐地足矣炎閤立死開元時弟盛邏皮立生皮邏閤授特進封臺登郡王炎閤未有子時以閤羅鳳為嗣及生子還其宗而名承閤遂不改按邏盛炎之子盛邏皮豈得云以名相屬既有炎閤豈得云我又有子雖死唐地足矣今從舊南詔傳及楊國忠傳雲南別錄又舊南詔傳閤皆作閣今從新傳皮邏閤浸強大而五詔微弱會有破渳河蠻之功渳河即西洱河渳音乃吏翻求合六詔為一昱為之奏請為于偽翻朝廷許之仍賜名歸義於是以兵威脅服㣥蠻不從者滅之遂擊破吐蕃徙居大和城其後卒為邊患南詔事始此其先烏蠻別種夷語山陂陀為和故謂之大和城卒子恤翻二十六年冬十月戊寅上幸驪山溫泉壬辰上還宮二十六年是歲於西京東都往來之路作行宮千餘間二十六年分左右羽林置龍武軍以萬騎營隸焉騎奇寄翻二十六年潤州刺史齊澣奏自瓜步濟江迂六十里請自京口埭下直濟江穿伊婁河二十五里即達揚子縣立伊婁埭從之埭音代按舊書本紀齊澣開伊婁河於揚州南瓜州浦則今之瓜洲運河是也但揚子縣今為真州治所安能二十五里即達揚子縣若自瓜洲達揚子橋則二十五里而近今之揚子橋或者唐之揚子縣治所橋以此得名也二十七年二十七年春正月壬寅命隴右節度大使榮王琬自至本道巡按處置諸軍處昌呂翻選募關內河東壯士三五萬人詣隴右防遏至秋末無寇聽還二十七年㣥臣請加尊號曰聖文二月己巳許之因赦天下免百姓今年田租二十七年夏四月癸酉敕諸陰陽術數自非婚喪卜擇皆禁之二十七年己丑以牛仙客為兵部尚書兼侍中李林甫為吏部尚書兼中書令總文武選事蓋令牛仙客總武選李林甫總文選也選須絹翻二十七年六月癸酉以御史大夫李適之兼幽州節度使幽州將趙堪白真陁羅矯節度使張守珪之命使平盧軍使烏知義擊叛奚餘黨於橫水之北橫水當作潢水新書作湟水舊書張守珪傳作潢水今從之潢水在遼國今臨潢府界志云自營州度松陘嶺北行四百里至潢水使疏吏翻將即亮翻白真陁羅矯稱制指以迫之知義不得已出師與虜遇先勝後敗守珪隱其敗狀以克獲聞事頗泄上令內謁者監牛仙童往察之內謁者監唐正六品下掌內宣傳及諸親命婦朝會所司籍其人數送內侍省歸罪於白真陁羅逼令自縊死縊於計翻仙童有寵於上衆宦官疾之共發其事上怒甲戌命楊思勗杖殺之思勗縛格杖之數百刳取其心割其肉啗之啗徒濫翻又徒覽翻守珪坐貶括州刺史太子太師蕭嵩嘗賂仙童以城南良田數頃李林甫發之嵩坐貶青州刺史二十七年秋八月乙亥磧西節度使蓋嘉運擒突騎施可汗吐火仙磧七迹翻蓋古盍翻吐火仙出戰敗走擒之於賀邏嶺分遣疏勒鎮守使夫蒙靈詧與拔汗那王阿悉爛達干潛引兵突入怛邏斯城擒黑姓可汗爾微遂入曳建城取交河公主交河公主事始二百一十二卷十一年威震西陲二十七年壬午吐蕃寇白草安人等軍白草軍在蔚茹水之西又鄯州星宿川之西有安人軍蔚茹水在原州蕭關縣此時吐蕃兵不能至疑白草軍當作白水軍炅火迥翻二十七年甲申追諡孔子為文宣王先是祀先聖先師周公南向孔子東向坐制自今孔子南向坐被王者之服釋奠用宮懸先悉薦翻被皮義翻周禮王宮懸諸侯軒懸卿大夫判懸士特懸註云宮懸四面懸象宮室四面有牆故謂之宮懸軒懸三面其形曲判懸又去其一面特懸又去其一面追贈弟子皆為公侯伯顏淵兗公閔子騫費侯冉伯牛鄆侯仲弓薛侯冉有徐侯季路衞侯宰我齊侯子貢黎侯子游吳侯子夏魏侯曾參成伯顓孫師陳伯澹臺滅明江伯宓子賤單伯原憲原伯公冶長莒伯南宮适郯伯公皙哀郳伯曾點宿伯顏路伯商瞿蒙伯高柴共伯漆雕開滕伯公伯寮任伯司馬牛向伯樊遲樊伯有若卞伯公西赤邵伯巫馬期鄫伯梁鱣梁伯顏柳蕭伯冉孺郜伯曹恤豐伯伯虔鄒伯公孫龍黃伯冉季產東平伯秦子南少梁伯漆雕斂武城伯顏子驕琅邪伯漆雕徒父須句伯壤駟赤北徵伯商澤睢陽伯石作蜀郈邑伯任不齊任城伯公夏首亢父伯公良孺東牟伯后處營丘伯秦開彭衙伯奚容箴下邳伯公肩定新田伯顏襄臨沂伯鄡單銅鞮伯句井彊淇陽伯罕父黑乘丘伯秦商上洛伯申黨召陵伯公祖子之期思伯榮子期雩婁伯縣成鉅野伯左人郢臨淄伯燕伋漁陽伯鄭子徒滎陽伯秦非陽伯施常乘氏伯顏噲朱虛伯步叔乘淳于伯顏之僕東武伯原亢籍萊蕪伯樂欬昌平伯廉潔莒父伯顏何開陽伯叔仲會瑕丘伯狄黑臨濟伯邦巽平陸伯孔患汶陽伯公西與如重丘伯公西箴祝阿伯二十七年九月戊午處木昆鼠尼施弓月等諸部先隸突騎施者皆帥衆內附帥讀曰率仍請徙居安西管內二十七年太子更名紹更工衡翻二十七年冬十月辛巳改脩東都明堂按舊書帝紀即東都乾元殿改脩明堂二十七年丙戌上幸驪山溫泉十一月辛丑還宮二十七年甲辰明堂成二十七年劍南節度使張宥文吏不習軍旅悉以軍政委團練副使章仇兼瓊據舊志上元後置團練使余考唐制凡有團結兵之地則置團練使此時蜀有黎雅邛翼茂五州鎮防團結兵故置團練副使安史亂後諸州皆置團練使矣盛言安戎城可取上悅之丁巳以宥為光祿卿十二月以兼瓊為劍南節度使二十七年初睿宗喪既除祫于太廟自是三年一祫五年一禘是歲夏既禘冬又當祫祫疾夾翻太常議以為祭數則瀆數所角翻請停今年祫祭自是通計五年一祫一禘從之史言如此乃合於五年再殷祭之義二十八年二十八年春正月癸巳上幸驪山溫泉庚子還宮二十八年二月荊州長史張九齡卒上雖以九齡忤旨逐之卒子恤翻忤五故翻然終愛重其人每宰相薦士輒問曰風度得如九齡不不讀曰否二十八年三月丁亥朔日有食之二十八年章仇兼瓊潛與安戎城中吐蕃翟都局及維州別駕董承晏結謀使局開門引內唐兵盡殺吐蕃將卒使監察御史許遠將兵守之將即亮翻監古莧翻遠敬宗之曾孫也永徽顯慶之閒許敬宗以姦佞致位公輔安史之亂遠乃能效死節以報國史故著其世以勉為臣者二十八年甲寅蓋嘉運入獻捷上赦吐火仙罪以為左金吾大將軍嘉運請立阿史那懷道之子昕為十姓可汗從之考異曰舊傳云嘉運欲立懷道之子昕為可汗以鎮撫之莫賀達干不肯曰討平蘇祿本是我之元謀若立史昕為主則國家何以酬賞於我乃不立史昕便令莫賀達干統衆二十七年嘉運詣闕獻俘仍令將吐火仙獻于太廟會要二十九年以解瑟羅之孫懷道之子昕為可汗遣兵送之天寶元年昕至碎葉西南俱南城為莫賀咄達干所殺三年安西節度使馬靈詧斬之更立其酋長為伊地米里骨咄祿毗伽可汗按實錄開元二十八年三月甲寅蓋嘉運俘吐火仙來獻四月辛未冊十姓可汗阿史那昕妻李氏為交河公主十二月乙卯突騎施可汗莫賀達干率其妻子及纛官首領百餘人內屬初莫賀達干與烏蘇萬洛扇誘諸蕃叛于我上命蓋嘉運宣恩招諭皆相率而降新傳云達干不肯立昕即誘部落叛詔嘉運招諭乃率妻子等降遂命統其衆後數年復以昕為可汗遣兵護送昕至俱蘭城為莫賀咄所殺莫賀咄自為可汗安西節度使夫蒙靈詧誅斬之若如舊傳所言嘉運便以莫賀達干為可汗統衆則莫賀不應復叛且立可汗當須朝廷冊命嘉運豈得亶立於塞外也若未以為可汗則實錄十二月不應謂之突騎施可汗莫賀達干也若如會要所言二十九年始立昕為可汗則實錄二十八年四月不應已謂昕為十姓可汗也蓋嘉運既平突騎施即奏立昕為十姓可汗故莫賀達干不服而叛明皇乃以莫賀達干為小可汗止統突騎施之衆使嘉運招諭之故來降然昕為十姓可汗兼統諸部故明皇遣兵送之而為莫賀達干所殺事或然也但實錄脫略疑不敢質故略采諸書所見存其梗概書之四月辛未以昕妻李氏為交河公主二十八年六月吐蕃圍安戎城二十八年上嘉蓋嘉運之功以為河西隴右節度使使之經略吐蕃嘉運恃恩流連不時發蓋嘉運恃其邊功以自昵於人主是從流於上也在京師以酒色自娛而不即赴鎮是從流於下也史以流連二字言之旨哉上時掌翻疏所去翻以為臣近與嘉運同班觀其舉措誠勇烈有餘然言氣矜誇恐難成事昔莫敖忸於蒲騷之役卒喪楚師左傳楚莫敖屈瑕既敗鄖師於蒲騷復伐羅鬬伯比送之曰莫敖必敗舉趾高心不固矣遂見楚子楚子入告夫人鄧曼鄧曼曰莫敖忸於蒲騷之役將自用也君若不鎮撫其不設備乎莫敖果不設備及羅羅與盧戎兩軍之大敗之忸女九翻陸德明曰騷音蕭又音縿卒子恤翻臣竊憂之況防秋非遠未言發日若臨事始去則士卒尚未相識何以制敵且將軍受命鑿凶門而出今乃酣飲朝夕殆非憂國愛人之心若不可改易宜速遣進塗仍乞聖恩嚴加訓勵上乃趣嘉運行趣讀曰促已而嘉運竟無功蓋嘉運小器易盈志氣惰矣安能有功二十八年秋八月甲戌幽州奏破奚契丹二十八年冬十月甲子上幸驪山溫泉辛巳還宮二十八年吐蕃寇安戎城及維州發關中彍騎救之騎奇寄翻吐蕃引去更命安戎城曰平戎更工衡翻二十八年十一月罷牛仙客朔方河東節度使二十八年突騎施莫賀達干聞阿史那昕為可汗怒曰首誅蘇祿我之謀也今立史昕何以賞我遂帥諸部叛上乃立莫賀達干為可汗使統突騎施之衆命蓋嘉運招諭之十二月乙卯莫賀達干降帥讀曰率降戶江翻二十八年金城公主薨金城公主事始二百八卷中宗景龍元年且請和上不許二十八年是歲天下縣千五百七十三戶八百四十一萬二千八百七十一口四千八百一十四萬三千六百九西京東都米斛直錢不滿二百絹匹亦如之海內富安行者雖萬里不持寸兵以開元之承平而戶口猶不及漢之盛時唐興以來治日少而亂日多也二十九年二十九年春正月癸巳上幸驪山溫泉二十九年丁酉制承前諸州饑饉皆待奏報然始開倉賑給承前猶今言從前也然始猶今言然後也何救懸絕自今委州縣長官與采訪使量事給訖奏聞長知兩翻使疏吏翻量音良二十九年庚子上還宮二十九年上夢玄元皇帝告云吾有像在京城西南百餘里汝遣人求之吾當與汝興慶宮相見有宋大中祥符之事皆唐明皇教之也盩厔縣漢屬扶風後魏併入武功尋復後周為周南郡隋廢郡以盩厔縣屬雍州唐屬岐州蘇軾曰樓觀山今為崇聖觀乃尹喜舊宅山腳有授經臺尚在使疏吏翻盩厔音舟窒觀古玩翻下同閏四月迎置興慶宮五月命畫玄元真容分置諸州開元觀二十九年六月吐蕃四十萬衆入寇至安仁軍安仁軍當作安人軍騎奇寄翻將即亮翻帥讀曰率考異曰舊傳作盛希液今從唐曆二十九年秋七月丙寅突厥遣使來告登利可汗之喪初登利從叔二人分典兵馬號左右殺從才用翻登利患兩殺之專與其母謀誘右殺斬之誘音酉自將其衆將即亮翻左殺判闕特勒勒兵攻登利殺之立毗伽可汗之子為可汗俄為骨咄葉護所殺更立其弟伽求迦翻咄當沒翻更工衡翻尋又殺之骨咄葉護自立為可汗考異曰舊傳云左殺自立為烏蘇米施可汗唐曆新傳皆云判闕特勒子為烏蘇米施可汗天寶初立今從之癸酉命左羽林將軍孫老奴招諭回紇葛邏祿拔悉密等部落紇下沒翻邏郎佐翻二十九年乙亥東都洛水溢溺死者千餘人溺奴狄翻二十九年平盧兵馬使安祿山傾巧善事人人多譽之譽音余上左右至平盧者祿山皆厚賂之由是上益以為賢御史中丞張利貞為河北采訪使至平盧祿山曲事利貞乃至左右皆有賂利貞入奏盛稱祿山之美八月乙未以祿山為營州都督充平盧軍使考異曰實錄此年八月乙未以幽州節度副大使安祿山為營州刺史充平盧渤海黑水軍使舊紀以幽州節度副使安祿山為營州刺史平盧軍節度副使會要二十八年王斛斯為平盧節度使遂為定額按舊傳祿山自平盧兵馬使為平盧軍使蓋以平盧兵馬使帶幽州節度副使之名耳實錄衍大字也天寶元年始以平盧為節度會要誤也唐謂奚契丹為兩蕃二十九年冬十月丙申上幸驪山溫泉二十九年壬寅分北庭安西為二節度二十九年十一月庚戌司空邠王守禮薨守禮庸鄙無才識每天將雨及霽守禮必先言之已而皆驗岐薛諸王言於上曰邠兄有術上問其故對曰臣無術則天時以章懷之故幽閉宮中十餘年守禮幽閉事見二百四卷武后天授元年背瘢甚厚將雨則沈悶瘢蒲官翻沈持林翻將霽則輕爽臣以此知之耳因流涕霑襟上亦為之慘然為于偽翻二十九年辛酉上還宮二十九年辛未太尉寧王憲薨上哀惋特甚曰天下兄之天下也兄固讓於我事見二百十卷睿宗景雲元年惋烏貫翻常名不足以處之處昌呂翻乃諡曰讓皇帝其子汝陽王璡璡資辛翻上表追述先志謙沖不敢當帝號上不許斂日斂力贍翻內出服天子之服也書稱隆基白又名其墓曰惠陵惠陵在同州奉先縣西北十里祔葬焉二十九年十二月乙巳吐蕃屠達化縣達化古澆河之地後周置達化郡及縣隋廢郡以縣屬廓州縣西百二十里有澆河城蓋嘉運不能禦果如裴耀卿之言齊思和標點聶崇岐覆校
