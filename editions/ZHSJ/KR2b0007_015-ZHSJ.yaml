body:
  text: 資治通鑑卷第十五翰林學士朝散大夫右諫議大夫知制誥兼侍講同提舉萬壽觀公事兼判集賢院上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣奉敕編集後學天台音註漢紀七前十一年太宗孝文皇帝下前十一年壬申前一六九前十一年冬十一月上行幸代春正月自代還前十一年夏六月梁懷王揖薨揖受封事見十三卷二年賈誼復上疏曰復扶又翻陛下即不定制如今之勢不過一傳再傳服虔曰一二傳世也言人人自恣而不可制也言其矜豪自植立太過於強也陛下所以為藩扞及皇太子之所恃者唯淮陽代二國耳淮陽王武代王參帝之子而太子之弟也故云所恃唯此二國北邊匈奴與強敵為鄰能自完則足矣而淮陽之比大諸侯廑如黑子之著面廑與僅同師古曰黑子今所謂黶子也著則略翻下北著同言國小如魚餌適足為所吞食方今制在陛下制國而令子適足以為餌豈可謂工哉臣之愚計願舉淮南地以益淮陽而為梁王立後為于偽翻割淮陽北邊二三列城與東郡以益梁不可者可徙代王而都睢陽睢陽故宋國微子所封班志屬梁國括地志宋州宋城縣在州南二里外城中本漢之睢陽縣也漢文帝封子武於大梁以其地卑濕徙睢陽故改曰梁睢音雖班志新郪縣屬汝南郡應劭曰秦為郪丘漢興為新郪師古曰潁川縣郪千移翻陳即謂古陳國之地也晉灼曰包取也如淳曰揵謂立封界也或曰揵接也師古曰揵巨偃翻梁足以扞齊趙淮陽足以禁吳楚陛下高枕終無山東之憂矣枕職任翻此二世之利也如淳曰從誼言可二世安耳師古曰言帝身及太子嗣位之時適遇諸侯之皆少師古曰恬安也少謂年少少時照翻陛下且見之矣夫秦日夜苦心勞力以除六國之禍今陛下力制天下頤指如意如淳曰但動頤指麾則所欲皆如意仲馮曰頤指兩事難以言智苟身無事畜亂宿禍畜讀曰蓄孰視而不定孰古熟字通傳之老母弱子將使不寧不可謂仁帝於是從誼計徙淮陽王武為梁王北界泰山西至高陽得大縣四十餘城後歲餘賈誼亦死死時年三十三矣前十一年徙城陽王喜為淮南王喜城陽王章之子齊悼惠王肥之孫前十一年匈奴寇狄道狄道縣為隴西郡治所師古曰其地有狄種故曰狄道時匈奴數為邊患數所角翻太子家令潁川鼂錯上言兵事太子家令屬詹事張晏曰太子稱家故曰家令臣瓚曰茂陵中書太子家令秩八百石潁川本韓國秦置郡漢因之鼂與朝同風俗通衞大夫史鼂之後姓譜王子朝之後錯倉故翻音錯雜之錯者非兵法曰有必勝之將無必勝之民繇此觀之安邊境立功名在於良將不可不擇也將即亮翻下同臣又聞用兵臨戰合刃之急者三一曰得地形二曰卒服習三曰器用利兵法步兵車騎弓弩長戟矛鋌劍楯之地師古曰鋋鐵杷短矛也孔穎達曰方言云矛吳揚江淮南楚五湖之間謂之金㐌或謂之鋋或謂之鏦其柄謂之矜金㐌音蛇晉陳安執丈八蛇矛蓋蛇即方言之所謂金㐌也鋋上延翻楯食尹翻不得其宜者或十不當一士不選練卒不服習起居不精動靜不集趨利弗及避難不畢趨七喻翻難乃旦翻前擊後解與金鼓之指相失師古曰金金鉦鼓所以進衆金所以止衆指當作音百不當十兵不完利與空手同甲不堅密與袒裼同應劭曰袒裼肉袒裼音錫與短兵同射不能中與無矢同中不能入與無鏃同中竹仲翻師古曰鏃矢鋒也鏃子木翻此將不省兵之禍也師古曰省視也悉井翻五不當一故兵法曰器械不利以其卒予敵也卒不可用以其將予敵也將不知兵以其主予敵也君不擇將以其國予敵也予讀曰與四者兵之至要也臣又聞小大異形強弱異勢險易異備師古曰易平勢也易以豉翻下同小國之形也合小以攻大敵國之形也師古曰彼我之力不能相勝則須連結外援共制之也中國之形也師古曰不煩華夏之兵使其同類自相攻擊也出入溪澗中國之馬弗與也弗與猶言不如也技渠綺翻下同仄古側字中國之騎弗與也風雨罷勞罷讀曰疲飢渴不困中國之人弗與也此匈奴之長技也若夫平原易地輕車突騎則匈奴之衆易橈亂也師古曰突騎言其驍銳可用衝突敵人也橈攪也音火高翻其字從手一曰橈曲也弱也音女教翻其字從木射疏及遠師古曰疏亦闊遠也仲馮曰長戟恐誤或者勁弩如今九牛大弩以槍為矢歟故可射疏及遠也然戟有鈎又不可射余謂文意各有所屬勁弩所以射疏長戟所以及遠也堅甲利刃長短相雜遊弩往來什伍俱前師古曰五人為伍十人為什材官騶發矢道同的如淳曰騶矢也處平易之地可以矢相射也臣瓚曰材官騎射之官也射者騶發其用矢者同中一的言其工妙也師古曰騶矢之善者春秋傳作菆其音同耳材官有材力者騶發發騶矢以射也手工矢善故中則同的的謂所射之準臬也騶側鳩翻孟康曰革笥以皮作如鎧者被之木薦以木板作如楯一曰革笥木薦之以當人心也師古曰一說非也笥音息嗣翻劍戟相接去就相薄薄伯各翻師古曰迫也則匈奴之足弗能給也師古曰給謂相連及以此觀之匈奴之長技三中國之長技五陛下又興數十萬之衆以誅數萬之匈奴衆寡之計以一擊十之術也雖然兵凶器戰危事也故以大為小以強為弱在俛仰之間耳師古曰言不知其術則雖大必小雖強必弱俛亦俯字余謂俛音免亦通跌而不振服虔曰蹉跌不可復起也師古曰跌足失據也跌徒結翻帝王之道出於萬全今降胡義渠蠻夷之屬來歸誼者其衆數千飲食長技與匈奴同章甲十五行本同下有可字乙十一行本同孔本同張校同賜之堅甲絮衣勁弓利矢益以邊郡之良騎令明將能知其習俗和輯其心者師古曰輯與集同即有險阻以此當之平地通道則以輕車材官制之兩軍相為表裏各用其長技衡加之以衆衡與橫同帝嘉之賜錯書寵答焉錯又上言曰臣聞秦起兵而攻胡粵者非以衞邊地而救民死也貪戾而欲廣大也故功未立而天下亂且夫起兵而不知其勢戰則為人禽屯則卒積死夫胡貉之人其性耐寒揚粵之人其性耐暑秦之戍卒不耐其水土戍者死於邊輸者僨於道耐乃代翻服虔曰僨仆也如淳曰僨音奮秦民見行如往棄市因以讁發之名曰讁戍先發吏有讁及贅壻賈人後以嘗有市籍者又後以大父母父母嘗有市籍者後入閭取其左應劭曰秦以讁發戍先自吏有過至于大父母父母嘗有市籍者曹輩盡復入閭取其左者發之未及取右而秦亡孟康曰秦時復除者居閭之左後發役不供復役之也師古從應說閭里門也居閭之左者一切發之行者憤怨有萬死之害而亡銖兩之報亡古無字通不得一算之復漢律人出一算算百二十錢師古曰猛火曰烈取以喻耳至於大澤為天下先倡事見七卷二世元年秦以威劫而行之之敝也胡人衣食之業不著於地著直略翻其勢易以擾亂邊境易以豉翻往來轉徙時至時去此胡人之生業而中國之所以離南畮也師古曰南畮所以耕種處也離力智翻數所角翻以候備塞之卒卒少則入陛下不救則邊民絕望而有降敵之心救之少發則不足多發遠縣纔至則胡又已去師古曰纔淺也猶言僅至也他皆類此為費甚大罷之則胡復入復扶又翻如此連年則中國貧苦而民不安矣陛下幸憂邊境遣將吏發卒以治塞甚大惠也治直之翻然今章甲十五行本今作令孔本同遠方之卒守塞一歲而更歲更見十三卷高后五年更工衡翻不如選常居者家室田作且以備之以便為之高城深塹因山川地形之便而為之城塹通川之道調立城邑毋下千家師古曰調謂算度之也摠計城邑之中令有千家以上也調徒釣翻具田器乃募民免罪拜爵謂有罪者免其罪無罪者拜爵以勸其徙謂民之欲往者復除其家征役復方目翻能自給而止師古曰初徙之時縣官且稟給其衣食於後能自供贍乃止也予讀曰與下同祿利不厚不可使久居危難之地難乃旦翻胡人入驅而能止其所驅者以其半予之孟康曰謂胡入為寇驅收中國能奪得之者以半予之師古曰孟說非也言胡人入為寇驅略漢人及畜產也人能止得其所驅者令其本主以半賞之張晏曰得漢人官為贖也師古曰張說非也此承上句之言謂官為備價贖之耳為于偽翻下同則邑里相救助赴胡不避死非以德上也師古曰言非以此事欲立德義於主上也此與東方之戍卒不習地勢而心畏胡者功相萬也言其功萬倍於東方之戍卒也徙民實邊使遠方無屯戍之事塞下之民父子相保無係虜之患利施後世名稱聖明其與秦之行怨民相去遠矣師古曰行怨民言發怨恨之民使行戍役也上從其言募民徙塞下錯復言陛下幸募民徙以實塞下使屯戍之事益省輸將之費益寡如淳曰將送也或曰資也復扶又翻下吏誠能稱厚惠稱尺證翻奉明法存卹所徙之老弱善遇其壯士和輯其心而勿侵刻使先至者安樂而不思故鄉樂音洛則貧民相募章甲十五行本募作慕乙十一行本同孔本同而勸往矣臣聞古之徙民者相其陰陽之和相息亮翻嘗其水泉之味然後營邑立城製里割宅先為築室家置器物焉民至有所居作有所用此民所以輕去故鄉而勸之新邑也之往也以脩祭祀男女有昏師古曰昏謂婚姻配合也墳墓相從種樹畜長師古曰種樹謂桑果之屬張晏曰畜長六畜也貢父曰所種所樹畜積長茂余謂畜長當從張說畜許六翻長知兩翻此所以使民樂其處而有長居之心也樂音洛臣又聞古之制邊縣以備敵也使五家為伍伍有長長知兩翻十長一里里有假士四里一連連有假五百十連一邑邑有假候服虔曰假音假借之假五百帥名也師古曰假大也工雅翻仲馮曰假服說是古者戍皆有期代則不置古曰假謂其權設猶假司馬之類亦非常置也余謂五百即後所謂伍伯也賈公彥曰伍伯者漢制五人為伍伯長也沈約曰舊說古者君行師從卿行旅從旅者五百人也今諸官府至郡各置五百四以象師從旅從依古義也候即軍候也皆擇其邑之賢材有護師古曰有保護之能者也居則習民於射法出則教民於應敵故卒伍成於內則軍政定於外服習以成勿令遷徙師古曰各守其業也長則共事長知兩翻夜戰聲相知則足以相救晝戰目相見則足以相識驩愛之心足以相死如此而勸以厚賞威以重罰則前死不還踵矣師古曰還踵回旋其足也還音旋但費衣糧不可用也雖有材力不得良吏猶亡功也亡古無字通陛下絕匈奴不與和親臣竊意其冬來南也師古曰意儗也則終身創矣師古曰創懲艾也初亮翻始於折膠蘇林曰秋氣至膠可折弓弩可用匈奴常以為候而出軍折而設翻使得氣去師古曰使之得勝逞志氣而去易以豉翻錯為人陗直刻深師古曰陗與峭同陗謂峻陿也章笑翻韋昭曰岸高曰峭臣瓚曰陗峻陗太子家號曰智囊師古曰言其一身所有皆是智算若囊橐之盛物也十二年十二年冬十二月河決酸棗東潰金隄東郡大興卒塞之班志酸棗縣屬陳留郡師古曰金隄在東郡白馬界今滑州括地志金隄一名千里隄在白馬縣東五里余據河隄自汴口以東緣河積石為堰通河古口咸曰金隄又水經註濮陽縣故城在河南與衞縣分水城北十里有瓠河口有金隄塞悉則翻十二年春三月除關無用傳張晏曰傳信也若今過所也如淳曰兩行書繒帛分持其一出入關合之乃得過謂之傳也李奇曰傳棨也師古曰張說是也古者或用棨或用繒帛棨者刻木為合符也康曰傳以木為之長尺五書符於上為信傳張戀翻十二年鼂錯言於上曰聖王在上而民不凍飢者非能耕而食之織而衣之也為開其資財之道也食祥吏翻衣於既翻為于偽翻故堯有九年之水湯有七年之旱而國亡捐瘠者孟康曰肉腐為瘠捐骨不埋者或曰捐謂有飢相棄捐者或謂貧乞者為捐蘇林曰瘠音漬師古曰瘠瘦病也言無相棄捐而瘦病者耳不當音漬也貧乞之釋尤疏僻焉亡古無字通今海內為一土地人民之衆不減湯禹加以無天災數年之水旱而畜積未及者何也地有遺利民有餘力生穀之土未盡墾山澤之利未盡出游食之民未盡歸農也夫寒之於衣不待輕暖師古曰苟禦風霜不求美麗也不待甘旨師古曰旨美也不顧廉恥人情一日不再食則飢終歲不製衣則寒夫腹飢不得食膚寒不得衣雖慈父不能保其子君安能以有其民哉明主知其然也故務民於農桑薄賦斂斂力贍翻廣畜積以實倉廩備水旱故民可得而有也民者在上所以牧之民之趨利如水走下四方無擇也趨七喻翻走音奏夫珠玉金銀飢不可食寒不可衣然而衆貴之者以上用之故也其為物輕微易藏易以豉翻下同在於把握可以周海內而無飢寒之患師古曰周謂周遍而遊行背蒲妹翻而民易去其鄉盜賊有所勸亡逃者得輕資也粟米布帛生於地長於時聚於力非可一日成也長知兩翻下同數石之重中人弗勝師古曰中人者處強弱之中也勝音升一日弗得而飢寒至是故明君貴五穀而賤金玉今農夫五口之家其服役者不下二人師古曰服事也服公事之役也百畮之收不過百石春耕夏耘秋穫冬藏伐薪樵治官府給繇役治直之翻繇與傜同後以義推春不得避風塵夏不得避暑熱秋不得避陰雨冬不得避寒凍四時之間無日休息又私自送往迎來弔死問疾養孤長幼在其中勤苦如此尚復被水旱之災復扶又翻被皮義翻急政暴賦賦斂不時朝令而暮改斂力贍翻有者半賈而賣師古曰本直千錢止得五百也賈讀曰價如淳曰取一償二為倍稱師古曰稱舉也今俗所謂舉錢者也余謂如說是稱尺證翻鬻妻子章甲十五行本妻子作子孫乙十一行本同退齋校同以償責者矣而商賈大者積貯倍息小者坐列販賣師古曰行賣曰商坐販曰賈列市列也若今市中賣物行也賈音古貯丁呂翻日游都市操千高翻師古曰奇贏謂有餘財而蓄聚奇異之物也一說奇謂殘餘物也居宜翻乘上之急所賣必倍師古曰上所急求則其價倍貴女不蠶織衣必文采食必粱肉師古曰粱好粟也即今之粱米有仟伯之得師古曰仟謂千錢伯謂百錢也伯莫白翻今俗猶謂百錢為一伯交通王侯力過吏勢以利相傾千里游敖冠蓋相望乘堅策肥履絲曳縞乘堅車策肥馬師古曰堅謂好車也縞皓素也繒之精白者也農人所以流亡者也方今之務莫若使民務農而已矣欲民務農在於貴粟貴粟之道在於使民以粟為賞罰今募天下入粟縣官得以拜爵得以除罪如此富人有爵農民有錢粟有所渫師古曰渫散也先列翻夫能入粟以受爵皆有餘者也取於有餘以供上用則貧民之賦可損師古曰損減也補不足令出而民利者也今令民有車騎馬一匹者復卒三人如淳曰復三卒之算錢也或曰除三夫不作甲卒也師古曰當為卒者免其三人不為卒者復其錢復方目翻天下武備也故為復卒為于偽翻神農之教曰有石城十仞應劭曰仞六尺五寸也師古曰此說非也八尺曰仞取人伸臂之一尋也師古曰池城邊池也以沸湯為池不可輒近言嚴固之甚而無粟弗能守也以是觀之粟者王者大用政之本務今民入粟受爵至五大夫以上師古曰五大夫第九爵此其與騎馬之功相去遠矣爵者上之所亶師古曰亶專也粟者民之所種生於地而不乏夫得高爵與免罪人之所甚欲也使天下人入粟於邊以受爵免罪不過三歲塞下之粟必多矣帝從之令民入粟於邊拜爵各以多少級數為差時令入粟六百石爵上造稍增至四千石為五大夫萬二千石為大庶長錯復奏言陛下幸使天下入粟塞下以拜爵甚大惠也復扶又翻下同竊恐塞卒之食不足用大渫天下粟邊食足以支五歲可令入粟郡縣矣師古曰入諸郡縣以備凶災也可時赦勿收農民租如此德澤加於萬民民愈勤農大富樂矣樂音洛上復從其言詔曰道民之路在於務本道讀曰導朕親率天下農十年于今而野不加辟師古曰辟讀曰闢開也歲一不登民有飢色師古曰登成也言五穀一歲不成則衆庶飢餒是無蓄積故也師古曰從事謂從農事也吾詔書數下歲勸民種樹而功未興是吏奉吾詔不勤而勸民不明也且吾農民甚苦而吏莫之省將何以勸焉數所角翻省悉井翻其賜農民今年租稅之半十三年十三年春二月甲寅詔曰朕親率天下農耕以供粢盛稷曰明粢在器曰盛盛時征翻其具禮儀十三年初秦時祝官有祕祝應劭曰祕祝之官移過於下國家諱之故曰祕也輒移過於下夏詔曰蓋聞天道禍自怨起而福繇德興百官之非宜由朕躬今祕祝之官移過於下以彰吾之不德朕甚弗取其除之十三年齊太倉令淳于意有罪太倉令齊王國官也姓譜淳于出於姜姓州公之後詔獄逮繫長安師古曰逮及也辭之所及則追捕之故謂之逮一曰逮者在道將送防禦不絕若今之傳送囚師古曰緹他弟翻索隱音啼縈於營翻妾父為吏齊中皆稱其廉平今坐法當刑妾傷夫死者不可復生刑者不可復屬夫音扶復扶又翻下同師古曰屬聯也之欲翻雖後欲改過自新其道無繇也繇古由字通用漢制永巷令典官婢使得自新天子憐悲其意五月詔曰詩曰愷弟君子民之父母師古曰大雅泂酌之詩也言君子有和樂簡易之德則其下尊之如父親之如母也教未施而刑已加焉或欲改行為善而道無繇至朕甚憐之夫刑至斷支體刻肌膚終身不息行下孟翻斷端管翻師古曰息生也何其刑之痛而不德也豈為民父母之意哉其除肉刑有以易之及令罪人各以輕重不亡逃有年而免孟康曰其不亡逃者滿其年數得免為庶人師古曰使更為條例丞相張蒼御史大夫馮敬奏請定律曰諸當髡者為城旦舂髡也謂去其髮及其耏鬢應劭曰城旦者旦起行治城舂者婦人不豫外傜但舂作米皆四歲刑也章乙十一行本作當黥者髡鉗為城旦舂鉗者以鐵束其頸當斬左止者笞五百當斬右止及殺人先自告及吏坐受賕枉法守縣官財物而即盜之已論而復有笞罪者皆棄市師古曰止足也當斬右足者以其罪次重故從棄市也殺人先自告謂殺人先自首得免罪者也吏受賕枉法謂受賂而曲公法者也守縣官財物而即盜之即今律所謂主守自盜者也殺人害重受賕盜物贓汙之身故此三罪已被論而又犯笞亦皆棄市各有歲數以免城旦舂滿三歲為鬼薪白粲鬼薪白粲一歲為隸臣妾隸臣妾一歲免為庶人隸臣妾滿二歲為司寇司寇一歲及作如司寇二歲皆免為庶人可是時上既躬修玄默而將相皆舊功臣少文多質懲惡亡秦之政惡烏露翻論議務在寬厚恥言人之過失化行天下告訐之俗易自下告上曰訐師古曰面相斥罪也居謁翻民樂其業樂音洛畜積歲增戶口寖息風流篤厚禁罔疏闊疏與疎同師古曰從輕斷予讀曰與至於斷獄四百師古曰謂普天之下重罪者也斷丁亂翻應劭曰錯置也民不犯法無所刑也錯千故翻十三年六月詔曰農天下之本務莫大焉今勤身從事而有租稅之賦是為本末者無以異也李奇曰本農也末賈也言農與賈俱出租無異也故除田租其除田之租稅十四年十四年冬匈奴老上單于十四萬騎入朝那蕭關班志朝那縣屬安定郡應劭曰史記故戎那邑也蕭關在朝那界唐屬原州之境後置蕭關縣為武州治所史記正義曰蕭關今古隴山關在原州平涼縣界徐廣曰卬姓段師古曰非也姓孫卬五郎翻遂至彭陽使奇兵入燒回中宮候騎至雍甘泉班志彭陽縣屬安定郡師古曰即今彭原縣括地志彭陽縣故城在今涇州臨涇縣東二十里彭原寧州雍縣班志屬扶風騎奇寄翻下同發車千乘乘繩證翻騎卒十萬軍長安旁以備胡寇而拜昌侯盧卿為上郡將軍甯侯魏遫為北地將軍隆慮侯周竈為隴西將軍屯三郡昌侯盧卿功臣表作旅卿古字借用也姓譜姜姓之後封於盧以國為氏與甯侯隆慮侯皆高祖功臣昌侯國屬琅邪郡甯侯國在河內脩武縣界隆慮侯國亦屬河內郡三人分屯三郡故各以郡為將軍號遫古速字勒兵申教令賜吏卒自欲征匈奴㣥臣諫不聽皇太后固要上乃止勞力到翻文穎曰要劫也哀痛祝誓之言余謂固要力止也要讀曰邀康力笑翻非也於是以東陽侯張相如為大將軍成侯董赤成侯董赤高帝功臣董渫之子成侯國屬涿郡赤史記正義音赫擊匈奴單于留塞內月餘乃去漢逐出塞即還不能有所殺十四年上輦過郎署問郎署長馮唐曰署郎舍也長知兩翻父家何在對曰臣大父趙人父徙代上曰吾居代時吾尚食監高祛尚食監主膳食之官祛音區戰於鉅鹿下當是秦將王離圍鉅鹿時數所角翻為于偽翻每食時念高祛所言其心未嘗不在鉅鹿唐對曰尚不如廉頗李牧之為將也上搏髀曰搏拊也左傳曰搏膺而踊髀音陛嗟乎吾獨不得廉頗李牧為將吾豈憂匈奴哉唐曰陛下雖得廉頗李牧弗能用也上怒起入禁中良久召唐讓曰公柰何衆辱我獨無間處乎師古曰何不於隙間之處而言鄙人不知忌諱上方以胡寇為意乃卒復問唐曰卒子恤翻公何以知吾不能用廉頗李牧也唐對曰臣聞上古王者之遣將也跪而推轂曰閫以內者寡人制之閫以外者將軍制之推吐雷翻閫苦本翻門橛也軍功爵賞皆決於外歸而奏之此非虛言也臣大父言李牧為趙將居邊軍市之租索隱曰軍中立市市有稅稅即租也賞賜決於外不從中覆也師古曰覆謂覆白之也一說不從中覆校其所用之數亦通故李牧乃得盡其智能選車千三百乘乘繩證翻彀騎萬三千百金之士十萬弓弩引滿為彀謂騎兵能射者服虔曰良士直百金晉灼曰百金喻貴重也彀古候翻騎奇寄翻破東胡滅澹林澹林即襜襤澹丁甘翻南支韓魏當是之時趙幾霸幾居依翻其後會趙王遷立用郭開讒卒誅李牧事見六卷始皇十八年卒子恤翻是以兵破士北為秦所禽滅今臣竊聞魏尚為雲中守守式又翻其軍市租盡以饗士卒私養錢服虔曰私廩假錢索隱曰按漢市肆租稅之入為私奉養服虔曰私廩假錢是也或云官所別給也余謂當從漢書以私養錢屬下句自饗賓客軍吏舍人是以匈奴遠避不近雲中之塞近其靳翻虜曾一入尚率車騎擊之所殺甚衆夫士卒盡家人子師古曰家人子謂庶人家之子也安知尺籍伍符李奇曰尺籍所以書軍令伍符軍士伍伍相保之符信也如淳曰漢軍法曰吏卒斬首以尺籍書下縣移郡令人故行不行奪勞二歲伍符亦什五之符要節度也或曰以尺簡書故曰尺籍也索隱曰按尺籍者謂書其斬首之功於一尺之板伍符者令軍人伍伍相保不容姦詐也斬首捕虜上功幕府上時掌翻一言不相應索隱曰應一陵翻謂數不同也余謂相應之應當從去聲文吏以法繩之其賞不行而吏奉法必用臣愚以為陛下賞太輕罰太重且雲中守魏尚坐上功首虜差六級陛下下之吏削其爵罰作之蘇林曰一歲刑為罰作下之遐嫁翻陛下雖得廉頗李牧弗能用也上說說讀曰悅是日令唐持節赦魏尚復以為雲中守而拜唐為車騎都尉詳考班表漢無車騎都尉官時使唐主中尉及郡國車士十四年春詔廣增諸祀壇場珪幣師古曰築土為壇除土為場珪幣所以薦神吾聞祠官祝釐如淳曰釐福也師古曰釐本作禧假借用耳音禧祝職救翻不為百姓為于偽翻朕甚愧之夫以朕之不德而專饗獨美其福百姓不與焉是重吾不德也與讀曰預師古曰重直用翻其令祠官致敬無有所祈十四年是歲河間文王辟彊薨十四年初丞相張蒼以為漢得水德魯人公孫臣以為漢當土德其應黃龍見蒼以為非章甲十五行本非下有是字乙十一行本同孔本同罷之公孫臣上書曰始秦得水德推終始傳漢當土德土德之應黃龍見宜改正朔服色尚黃張蒼以為漢乃水德河決金隄其符也公孫臣言非是罷之見賢遍翻十五年十五年春黃龍見成紀班志成紀縣屬天水郡庖犧所生處見賢遍翻拜為博士與諸生申明土德草改曆服色事師古曰草謂創造之十五年夏四月上始幸雍郊見五帝秦立白帝赤帝黃帝青帝畤於雍漢高帝又立黑帝畤故雍有五帝畤雍於用翻見賢遍翻十五年九月詔諸侯王公卿郡守舉賢良能直言極諫者守式又翻上親策之太子家令鼂錯對策高第擢為中大夫錯又上言宜削諸侯及法令可更定者更工衡翻書凡三十篇上雖不盡聽然奇其材十五年是歲齊文王則河間哀王福皆薨無子國除齊王則哀王襄之子悼惠王肥之孫河間王福辟彊之子趙幽王子遂之孫十五年趙人新垣平以望氣見上言長安東北有神氣成五采於是作渭陽五帝廟韋昭曰在渭城師古曰郊祀志云在長安東北非渭城也韋說謬矣余據水北為陽長安在渭南渭城在渭北五帝廟或在渭城界韋說未可非也括地志渭陽五帝廟在雍州咸陽縣東三十里十六年十六年夏四月上郊祀五帝于渭陽五帝廟於是貴新垣平至上大夫周官有上大夫漢官有太中大夫中大夫諫大夫爵十九級有大夫五大夫而上大夫不見於表而使博士諸生刺六經中作王制師古曰刺采取也七賜翻即今禮記王制篇是也謀議巡狩封禪事又於長門道北立五帝壇如淳曰長門亭名在長安城東南括地志長門故亭在雍州萬年縣東北苑中十六年徙淮南王喜復為城陽王又分齊為六國丙寅立齊悼惠王子在者六人楊虛侯將閭為齊王安都侯志為濟北王武成侯賢為菑川王白石侯雄渠為膠東王平昌侯卬為膠西王扐侯辟光為濟南王淮南厲王子在者三人阜陵侯安為淮南王安陽侯勃為衡山王陽周侯賜為廬江王十一年徙城陽王喜王淮南今復其舊將復以淮南地分王厲王三子安勃賜也楊虛據水經河水過楊虛縣註引地理志曰楊虛平原之隸縣也城在高唐之西南而班志無此縣不知酈道元所謂志者何志也史記正義曰安都故城在瀛州高陽縣西南三十九里濟北王都盧武成史記作武城索隱曰武城縣屬平原正義曰貝州縣菑川王都劇班志金城郡有白石縣正義曰白石故城在德州安德縣北二十里膠東王都即墨班志平昌侯國屬平原郡膠西王都高苑扐侯國屬平原郡濟南王都東平陵阜陵縣屬九江郡淮南王都壽春安陽屬汝南郡衡山王都六陽周縣屬上郡廬江王都江南濟子禮翻扐音力十六年秋九月新垣平使人持玉杯上書闕下獻之平言上曰闕下有寶玉氣來者已視之果有獻玉杯者刻曰人主延壽平又言臣候日再中居頃之日卻復中於是始更以十七年為元年復扶又翻令天下大酺漢律三人無故㣥飲罰金四兩今詔橫賜得會聚飲食師古曰酺布也言王德布於天下而合聚飲食為酺周禮族師春秋祭酺註酺者為人烖害之神也有馬酺有蝝螟之酺與人鬼之酺亦為壇位如雩禜族長無飲酒之禮因祭酺而與其民以長幼相獻酬焉正義曰古者祭酺聚錢飲酒故後世聽民聚飲皆謂之酺漢書每有嘉慶令民大酺是其事也彼註云因祭酺而與其民長幼相酬鄭註所謂祭酺合醵也酺音蒲周鼎亡在泗水中今河決通於泗臣望東北汾陰直有金寶氣班志汾陰縣屬河東郡師古曰直謂正當汾陰也宋白曰蒲州寶鼎縣古綸氏地夏少康所邑也汾水南流過縣漢置汾陰縣今縣北九十里汾陰故城是也兆見不迎則不至於是上使使治廟汾陰南臨河欲祠出周鼎見賢遍翻後元年戊寅前一六三十六年冬十月人有上書告新垣平所言皆詐也下吏治誅夷平師古曰夷者平也謂盡平除其家室宗族下遐嫁翻上亦怠於改正服鬼神之事師古曰正正朔也服服色也正之成翻使祠官領以時致禮不往焉十六年春三月孝惠皇后張氏薨孝惠皇后張敖之女諸呂之誅徙居北宮張晏曰后黨於呂氏故不曰崩十六年詔曰間者數年不登又有水旱疾疫之災朕甚憂之愚而不明未達其咎意者朕之政有所失而行有過與與與歟同下同地利或不得人事多失和鬼神廢不享與何以致此將百官之奉養或廢無用之事或多與何其民食之寡乏也夫度田非益寡師古曰度謂量計之度徒各翻以口量地量音良其於古猶有餘而食之甚不足者其咎安在無乃百姓之從事於末以害農者蕃師古曰蕃多也扶元翻為酒醪以靡穀者多師古曰醪汁滓酒也靡散也醪來高翻靡音糜六畜馬牛羊犬豕雞畜許救翻吾未得其中師古曰中竹仲翻其與丞相列侯吏二千石博士議之有可以佐百姓者率意遠思無有所隱二年二年夏上行幸雍棫陽宮黃圖曰棫陽宮秦昭王所起括地志在岐州扶風縣東北棫音域二年六月代孝王參薨參前二年封於太原三年徙代二年匈奴連歲入邊殺略人民畜產甚多雲中遼東最甚遼東戰國時燕之東北境秦置郡上患之乃使使遺匈奴書遺于季翻單于亦使當戶報謝匈奴官自左右賢王至左右大當戶凡二十四長二年八月戊戌丞相張蒼免帝以皇后弟竇廣國賢有行欲相之相息亮翻行下孟翻曰恐天下以吾私廣國久念不可而高帝時大臣餘見無可者謂高帝大臣薨逝之餘其見存之臣無可相者見賢遍翻莊子有申徒狄夏之賢人也一曰申徒楚官號姓譜申侯之後支子居安定屠原因為申屠氏梁國本秦碭郡漢為梁國如淳曰材官之多力者能脚蹋強弩張之故曰蹶張律有蹶張士師古曰今之弩以手張者為擘張以足蹋者為蹶張蹶音厥庚午以嘉為丞相封故安侯班志故安縣屬涿郡括地志今易州界武陽城中東南隅故城是也門不受私謁是時太中大夫鄧通方愛幸賞賜累鉅萬帝嘗燕飲通家其寵幸無比嘉嘗入朝而通居上旁有怠慢之禮嘉奏事畢因言曰陛下幸愛㣥臣則富貴之至於朝廷之禮不可以不肅師古曰肅敬也君勿言吾私之師古曰言欲私告戒之坐府中風俗通府聚也公卿牧守道德之所聚也又舍也師古曰檄木書也長二尺且斬通通恐入言上上曰汝第往吾令使人召若通詣丞相府章乙十一行本無府字孔本同免冠徒跣頓首謝嘉嘉坐自如弗為禮責曰夫朝廷者高帝之朝廷也通小臣戲殿上大不敬當斬吏今行斬之如淳曰嘉語其吏曰今便行斬之首盡出血不解上度丞相已困通度徒洛翻使使持節召通而謝丞相此吾弄臣君釋之鄧通既至為上泣曰丞相幾殺臣為于偽翻幾居希翻三年三年春二月上行幸代三年是歲匈奴老上單于死子軍臣單于立四年四年夏四月丙寅晦日有食之月末為晦天文書晦則日月相沓月在日後則光體伏矣四年五月赦天下四年上行幸雍五年五年春正月上行幸隴西三月行幸雍秋七月行幸代六年六年冬匈奴三萬騎入上郡三萬騎入雲中所殺略甚衆烽火通於甘泉長安文穎曰邊方備胡寇作高土櫓上作桔槔桔槔頭兜零以薪草置其中常低之有寇即燃火舉之以相告曰烽又多積薪寇至即燃之以望其煙曰燧屯飛狐師古曰中大夫官名其人姓令名免耳此諸將軍下至徐厲皆書姓而徐廣以為中大夫令是官名此說非也據百官表景帝初改衞尉為中大夫令文帝時無此官而中大夫是郎中令屬官秩比二千石索隱曰據風俗通令姓楚令尹子文之後虞世南曰中大夫令是史家追書耳屯句注句音鈎將軍張武屯北地秦滅義渠置北地郡次細柳項羽以河內郡為殷國高帝滅殷復置河內郡服虔曰細柳在長安西北如淳曰長安細柳倉在渭北近石徼張揖曰在昆明池南今有柳市是也臣瓚曰一宿曰宿再宿曰信過信為次師古曰匈奴傳云置三將軍軍長安西細柳渭北棘門霸上此則細柳不在渭北揖說是也索隱曰按三輔故事細柳在直城門外阿房宮西北維舊唐書肅宗母元獻楊后葬細柳原次霸上祝茲侯徐厲為將軍次棘門宗正秦官掌親屬漢因之徐厲高祖功臣呂后四年封祝茲侯史記表作松滋班志松滋縣屬廬江郡孟康曰棘門在長安北秦時宮門也如淳曰棘門在橫門外橫門長安城北出西頭第一門上自勞軍至霸上及棘門軍直馳入將以下騎送迎勞力到翻將即亮翻下其將同騎奇寄翻已而之細柳軍之往也銳兵刃彀弓弩持滿被皮義翻彀古候翻天子先驅至不得入先驅曰師古曰先驅導駕若今之武候隊矣天子且至軍門都尉曰將軍令曰軍中聞將軍令不聞天子之詔居無何上至又不得入於是上乃使使持節詔將軍吾欲入營勞軍亞夫乃傳言開壁門壁門士請車騎曰將軍約軍中不得馳驅於是天子乃按轡徐行至營將軍亞夫持兵揖曰介冑之士不拜請以軍禮見禮介者不拜見賢遍翻改容式車為于偽翻使人稱謝皇帝敬勞將軍成禮而去既出軍門㣥臣皆驚上曰嗟乎此真將軍矣曩者霸上棘門軍若兒戲耳其將固可襲而虜也至於亞夫可得而犯耶稱善者久之月餘漢兵至邊匈奴亦遠塞遠于願翻漢兵亦罷乃拜周亞夫為中尉為以亞夫屬太子張本六年夏四月大旱蝗師古曰蝗即螽也食苗為災今俗呼為簸蝩說文曰一曰蝝一曰蝗蝗戶光翻蝩音鍾弛山澤師古曰弛解也解而不禁與衆庶同其利損郎吏員發倉庾以振民應劭曰水漕倉曰庾胡公曰在邑曰倉在野曰庾康曰凡倉無屋曰庾七年七年夏六月己亥帝崩于未央宮臣瓚曰壽四十六朕聞之蓋天下萬物之萌生靡不有死死者天地之理萬章乙十一行本無萬字物之自然奚可甚哀當今之世咸嘉生而惡死惡烏路翻厚葬以破業重服以傷生吾甚不取且朕既不德無以佐百姓今崩又使重服久臨師古曰臨哭也力禁翻下出臨服臨當臨夕臨哭臨音同以罹寒暑之數師古曰罹音離遭也哀人父子傷長老之志損其飲食絕鬼神之祭祀以重吾不德謂天下何朕獲保宗廟以眇眇之身師古曰眇眇猶言細末也二十有餘年矣賴天之靈社稷之福方內安寧方內四方之內也朕既不敏常懼過行以羞先帝之遺德師古曰過行行有過失也羞謂忝辱也行下孟翻懼于不終今乃幸以天年得復供養於高廟其奚哀念之有帝自謙以謂得終其天年以從先帝幸矣奚哀念之有乎供居用翻養羊亮翻其令天下吏民令到出臨三日皆釋服毋禁取婦嫁女祠祀飲酒食肉取讀曰娶自當給喪事服臨者皆無跣跣先典翻足親地也絰帶毋過三寸毋布車及兵器應劭曰毋以布衣車及兵器也服虔曰不施輕車介士也師古曰應說是也殿中當臨者皆以旦夕各十五舉音禮畢罷非旦夕臨時禁毋得亶哭臨已下棺服大功十五日小功十四日纖七日釋服喪禮大功之服七升八升九升小功十升十一升十二升再期而大祥踰月而禫禫而纖無所不佩鄭註云大祥除衰杖黑經白緯曰纖舊說纖冠者采纓也無所不佩者紛帨之屬如平常也孔氏正義曰禫而纖者禫祭之時玄冠朝服禫祭既訖而首著纖冠身著素端黃裳以至吉祭無所不佩者吉祭之時身尋常吉服平常所服之物無不佩也服虔曰大功小功布也纖細布衣也應劭曰凡三十六日而釋服矣此以日易月也師古曰此喪制者文帝自率己意創而為之非有取於周禮也何為以日易月乎三年之喪其實二十七月豈有三十六月之文禫又無七月也應氏既失之於前近代學者因循繆說未之思也貢父曰文帝制此喪服斷自已葬之後其未葬之前則服斬衰漢諸帝自崩至葬有百餘日者未葬則服不除矣翟方進傳後母終既葬三十六日起視事其證也說者遂以日易月又不通計葬之日皆大謬也攷之文帝意既葬除重服制大功小功所以漸即吉耳賈公彥曰布之精粗斬衰三升齊衰有三等或四升或五升或六升小功大功如前說緦麻十五升抽去半朝服十五升皆以此令比類從事師古曰言此詔中無文者皆以類比而行事使明知朕意霸陵山川因其故毋有所改應劭曰因山為藏不復起墳山下川流不遏絕就其水名以為陵號耳師古曰霸陵在長安東南應劭曰夫人已下有美人良人八子七子長使少使皆遺歸家重絕人類乙巳葬霸陵帝即位二十三年宮室苑囿車騎服御無所增益有不便輒弛以利民嘗欲作露臺召匠計之直百金上曰百金中人十家之產也吾奉先帝宮室嘗恐羞之何以臺為師古曰中謂不富不貧今新豐縣南驪山之頂有露臺鄉極為高顯猶有文帝所欲作臺之處如淳曰弋皁也師古曰弋黑色衣於既翻衣不曳地帷帳無文繡以示敦朴為天下先治霸陵皆瓦器不得以金銀銅錫為飾因其山不起墳古者墓而不墳墳者聚土使之高大也皇甫謐曰漢長陵高十三丈陽陵高十四丈安陵三十餘丈則不度甚矣治直之翻賜以几杖㣥臣袁盎等諫說雖切常假借納用焉張武等受賂金錢覺更加賞賜以媿其心專務以德化民是以海內安寧家給人足後世鮮能及之鮮息淺翻七年丁未太子即皇帝位鄭樵曰漢大歛畢三公奏尚書顧命太子即日即天子位于柩前請太子即皇帝位皇后為皇太后奏可㣥臣皆出吉服入會如儀太尉升自阼階當柩御坐北面稽首讀冊畢以傳國玉璽綬東面跪授皇太子即皇帝位告令㣥臣㣥臣皆伏稱萬歲或大赦天下㣥臣百僚罷入成喪服如禮皇后曰皇太后帝祖母曰太皇太后帝母曰皇太后七年九月有星孛于西方孛蒲內翻七年是歲長沙王吳著薨無子國除高帝封吳芮為長沙王傳成王臣共哀至著而絕著漢書作差初高祖賢文王芮制詔御史長沙王忠其定著令鄧展曰漢約非劉氏不王而芮王故著令使特王也或曰以芮至忠故著令也仲馮曰兼用鄧二說乃著令之意也貢父曰長沙王忠其定著令定著令者謂於令著長沙王車服土地之類也封芮庶子二人為列侯傳國數世絕孝景皇帝上荀悅曰諱啟之字曰開文帝長子也應劭曰禮諡法布義行剛曰景元年元年冬十月丞相嘉等奏功莫大於高皇帝德莫盛於孝文皇帝高皇帝廟宜為帝者太祖之廟孝文皇帝廟宜為帝者太宗之廟天子宜世世獻祖宗之廟郡國諸侯宜各為孝文皇帝立太宗之廟應劭曰始取天下者曰祖高帝稱高祖是也始治天下者曰宗文帝稱太宗是也師古曰應說非也祖始也始受命也宗尊也有德可尊貢父曰顏說非也始受命稱太祖耳有功亦稱祖商祖甲是也可元年夏四月乙卯赦天下元年遣御史大夫青至代下與匈奴和親開封侯陶青高祖功臣陶舍之子元年五月復收民田半租文帝十二年賜民田租之半次年盡除田之租稅今復收半租元年初文帝除肉刑事見文帝十三年內實殺人斬右止者又當死斬左止者笞五百當劓者笞三百率多死是歲下詔曰加笞與重罪無異孟康曰重罪謂死刑不可為人師古曰謂不能自起居也笞三百曰二百元年以太中大夫周仁為郎中令張歐為廷尉孟康曰歐音驅索隱曰於后翻楚元王子平陸侯禮為宗正平陸戰國時齊邑班志東平國有東平陸縣又西河郡有平陸縣意禮所封者齊地仁始為太子舍人內史掌治京邑武帝建元六年始分左右內史疑左字衍續漢志太子舍人更直宿衞如三署郎中鼂音朝直遙翻張歐亦事帝於太子宮雖治刑名家為人長者治直之翻長知兩翻帝由是重之用為九卿歐為吏未嘗言按人專以誠長者處官官屬以為長者亦不敢大欺處昌呂翻二年二年冬十二月有星孛于西南孛蒲內翻二年令天下男子年二十始傳師古曰舊制二十三而傅今此二十更為異制也傅讀曰附二年春三月甲寅立皇子德為河間王閼為臨江王餘為淮陽王非為汝南王彭祖為廣川王發為長沙王河間王都樂成臨江王都江陵淮陽王都陳汝南王都平輿廣川王都信都長沙王都長沙閼一曷翻二年夏四月壬午太皇太后薄氏崩薄太皇文帝母也二年六月丞相申屠嘉薨時內史鼂錯數請間言事輒聽寵幸傾九卿漢正卿九奉常郎中令衞尉太僕廷尉典客宗正治粟內史少府是也數所角翻更工衡翻丞相嘉自絀所言不用疾錯錯為內史東出不便更穿一門南出南出者太上皇廟堧垣也三輔黃圖太上皇廟在長安香室街南馮翊府北武帝分內史為左右後又改左內史為左馮翊括地志漢太上皇廟在雍州長安縣西北長安故城中酒池之北服虔曰堧垣宮外垣餘地也師古曰內垣之外餘地也堧而緣翻為奏請誅錯客有語錯語牛倨翻錯恐夜入宮上謁自歸上上謁時掌翻至朝朝直遙翻下同嘉請誅內史錯上曰錯所穿非真廟垣乃外堧垣故宀儿官居其中師古曰宀儿謂散輩也如今之散官宀儿如隴翻錯無罪丞相嘉謝罷朝嘉謂長史曰吾悔不先斬錯乃請之為錯所賣至舍因歐血而死歐於后翻錯以此愈貴二年秋與匈奴和親二年八月丁未以御史大夫開封侯陶青為丞相班志開封縣屬河南郡姓譜陶陶唐氏之後丁巳以內史鼂錯為御史大夫二年彗星出東北彗祥歲翻又徐醉翻又旋芮翻二年秋衡山雨雹大者五寸深者二尺大戴禮曰孔會子云陽之專氣為霰陰之專氣為雹盛陽之氣在雨水則溫暖而為雨陰氣薄而脅之不相入則搏而為雹也盛陰之氣在雨水則凝滯而為雪陽氣薄而脅之不相入則消散而下因水而為霰雨于具翻二年熒惑逆行守北辰月出北辰間歲星逆行天廷中熒惑火星北辰中宮天極星也月有九行黑道二出黃道北自立冬冬至行之青道二出黃道東立春春分行之赤道二出黃道南立夏夏至行之白道二出黃道西立秋秋分行之其去極有遠近終不能出北辰之間出北辰間失其行也歲星木星也太微為天廷據天文志北極及太微人君之位或守之或出之或逆行經之皆變也又石氏星傳曰龍左角為天田右角為天廷孔穎達曰春秋緯文紫微宮為大帝太微為天庭中有五帝座二年梁孝王以竇太后少子故有寵王四十餘城少詩沼翻王于況翻居天下膏腴地賞賜不可勝道府庫金錢且百巨萬巨萬萬萬也勝音升築東苑方三百餘里廣睢陽城七十里唐宋州治宋城縣即漢睢陽治直之翻為複道自宮連屬於平臺三十餘里如淳曰平臺在梁東北離宮所在師古曰今其城東二十里所有故臺基其處寬博俗云平臺也屬之欲翻如吳人枚乘嚴忌齊人羊勝公孫詭鄒陽蜀人司馬相如之屬皆從之遊姓譜枚姓也六國有賢人枚被嚴忌本姓莊漢書避明帝諱改為嚴羊晉羊舌大夫之後鄒以國為氏上使使持節以乘輿駟馬迎梁王於關下既至寵幸無比入則侍上同輦出則同車射獵上林中因上疏請留且半歲梁侍中郎謁者著籍引出入天子殿門史記正義曰籍謂名簿也若今通引出入門也著竹略翻聶崇岐標點容肇祖覆校
