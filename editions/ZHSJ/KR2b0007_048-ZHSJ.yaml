body:
  text: 資治通鑑卷第四十八翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註漢紀四十永元四年孝和皇帝下永元四年壬辰九二永元四年春正月遣大將軍左校尉耿夔授於除鞬印綬校戶教翻鞬九言翻使中郎將任尚持節衞護屯伊吾如南單于故事任音壬初廬江周榮辟袁安府安舉奏竇景事見上卷元年見上卷上年竇氏客太尉掾徐齮深惡之掾俞絹翻齮魚倚翻惡烏路翻脅榮曰子為袁公腹心之謀排奏竇氏竇氏悍士刺客滿城中謹備之矣悍下罕翻又侯旰翻榮曰榮江淮孤生得備宰士賢曰榮辟司徒府故稱宰士誠所甘心因敕妻子敕戒也若卒遇飛禍卒讀曰猝賢曰飛禍言倉卒而死也余謂飛禍者言刺客竊發不可得而備若鳥之飛集也無得殯斂斂力贍翻冀以區區腐身覺悟朝廷永元四年三月癸丑司徒袁安薨永元四年閏月丁丑以太常丁鴻為司徒永元四年夏四月丙辰竇憲還至京師還從宣翻又如字永元四年六月戊戌朔日有食之丁鴻上疏曰昔諸呂亶權統嗣幾移事見高后紀幾居希翻廟不血食事見王莽紀鴻引此事以指言外之禍不得行其勢也賢曰言親賢兼重方可執政不敢僭差然而天下遠近皆惶怖承旨怖普布翻刺史二千石初除謁辭求通待報初除而謁之官則辭求通者求通名也待報者得謁與不得謁得辭與不得辭皆待報也受臺敕符璽所以為信初除者詣尚書臺受敕璽斯氏翻久者至數十日背王室背蒲妹翻向私門此乃上威損下權盛也人道悖於下效驗見於天雖有隱謀神照其情垂象見戒以告人君悖蒲內翻見賢遍翻禁微則易易以豉翻救末則難人莫不忽於微細以致其大恩不忍誨義不忍割去事之後未然之明鏡也言禍伏於隱微人多忽之及發見之後昭昭而不可掩是為未然之明鏡不剛則三光不明王不可以不強不強則宰牧從橫從子用翻又子容翻橫戶孟翻又加字宜因大變改政匡失以塞天意塞悉則翻永元四年丙辰郡國十三地震永元四年旱蝗永元四年竇氏父子兄弟並為卿校卿九卿校諸校尉校戶教翻穰侯鄧叒冝叒冝弟步兵校尉磊及母元憲女壻射聲校尉郭舉舉父長樂少府璜共相交結賢曰太后居長樂宮故有少府秩二千石樂音洛舉得幸太后遂共圖為殺害謀弒逆也是時憲兄弟專權帝與內外臣僚莫由親接所與居者閹宦而已閹宦周禮謂之奄鄭玄註曰奄精氣蔽藏者今謂之宦人閹衣廉翻又衣檢翻獨中常侍鉤盾令鄭衆謹敏有心幾百官志鉤盾令秩六百石宦者為之典諸近池苑囿遊觀之處屬少府幾事也心幾謂心事也今人謂人胸中有城府者為有心事朝直遙翻盾食尹翻幾居希翻遂與衆定議誅憲以憲在外謂出屯涼州時也忍而未發會憲與鄧叒冝皆還京師還從宣翻又如字時清河王慶恩遇尤渥渥厚漬也省禁中也欲得外戚傳賢曰前書外戚傳傳直戀翻不敢使令慶私從千乘王求千乘王伉帝長兄也乘繩證翻獨內之又令慶傳語鄭衆求索故事賢曰謂文帝誅薄昭武帝誅竇嬰故事索山客翻庚申帝幸北宮詔執金吾五校尉勒兵屯衞南北宮執金吾掌宮外戒司非常北軍五校尉主五營士故令勒兵屯衞收捕郭璜郭舉鄧叒冝鄧磊皆下獄死下遐稼翻遣謁者僕射收憲大將軍印綬更封為冠軍侯憲先已封冠軍侯不受今復封以侯就國更居孟翻王褱王褱古回翻帝以太后故不欲名誅憲言不欲正名誅之為于偽翻憲篤景到國皆迫令自殺初河南尹張酺數以正法繩治竇景酺薄乎翻酺薄乎翻酺先為魏郡太守郡人鄭據奏竇景罪景遣掾夏猛私謝酺使罪據子酺收猛繫獄及入為河南尹景家人擊傷市卒吏捕得之景怒遣緹騎侯海毆傷市丞酺部吏楊章窮究正海罪徙朔方數所角翻治直之翻及竇氏敗酺上疏曰方憲等寵貴㣥臣阿附唯恐不及皆言憲受顧命之託懷伊呂之忠至乃復比鄧夫人於文母賢曰按鄧夫人即穰侯鄧叒冝母元張酺論憲兼及其黨稱鄧夫人猶如前書霍光妻稱霍顯祁大伯母號祁夫人之類復扶又翻皆言當死不章甲十六行本不下有復字張校同顧其前後考折厥衷折之舌翻衷竹仲翻臣伏見夏陽侯王褱每存忠善前與臣言常有盡節之心檢敕賓客未嘗犯法臣聞王政骨肉之刑有三宥之義禮記公族有罪獄成有司讞于公曰某之罪在大辟公曰宥之有司又曰在大辟公又曰宥之有司又曰在辟公又曰宥之及三宥不對走出致刑于甸人公又使人追之曰必宥之有司對曰無及也反命於公公素服如其倫之喪今議者欲為王褱選嚴能相為于偽翻相息亮翻侯國相也恐其迫切必不完免宜裁加貸宥以崇厚德帝感其言由是王褱獨得全竇氏宗族賓客以憲為官者皆免歸故郡初班固奴嘗醉罵洛陽令种兢姓譜种本仲氏避難改焉收捕固死獄中固嘗著漢書尚未就詔固女弟曹壽妻昭踵而成之昭即曹大家也華嶠論曰固之序事不激詭不抑抗賢曰激揚也詭毀也抑退也抗進也余謂激詭抑抗皆指史家作意以為文之病華戶化翻詳而有體使譯之者斖斖而不厭爾雅曰斖斖猶勉勉也音無匪翻信哉其能成名也固譏司馬遷是非頗謬於聖人賢曰言遷所是非與聖人乖謬即崇黃老而薄六經輕仁義而賤守節是也常排死節謂言龔勝竟夭天年之類謂言王陵汲黯之戇之類謂不立忠義傳賤守節甚矣永元四年初竇憲納妻天下郡國皆有禮慶漢中郡亦當遣吏漢中郡在洛陽西千九百九十里郡有戶曹主民戶祠祀農桑郃曷閤翻竇將軍椒房之親不修德禮而專權驕恣危亡之禍可翹足而待翹舉也勿與交通太守固遣之郃不能止請求自行許之郃遂所在遲留以觀其變行至扶風潘岳關中記曰三輔舊治長安城中長吏各居其縣治民東都之後扶風出治槐里馮翊出治高陵凡交通者皆坐免官漢中太守獨不與焉與讀曰預帝賜清河王慶奴婢輿馬錢帛珍寶充牣其第慶或時不安帝朝夕問訊進膳藥所以垂意甚備慶亦小心恭孝自以廢黜尤畏事慎法故能保其寵祿焉永元四年帝除袁安子賞為郎任隗子屯為步兵校尉以安隗守正不附竇氏也任音壬隗五罪翻百官志大長秋秩二千石承秦將行景帝更為大長秋或用士人中興常用宦者職掌奉宜中宮命凡給賜宗親及宗親當謁見者關通之中宮出則從張晏曰皇后卿師古曰秋者收成之時長者恆久之義故以為皇后官名衆每辭多受少帝由是賢之常與之議論政事宦官用權自此始矣永元四年秋七月己丑太尉宋由以竇氏黨策免自殺永元四年八月辛亥司空任隗薨永元四年癸丑以大司農尹睦為太尉太傅鄧彪以老病上還樞機職上時掌翻尚書樞機之職鄧彪錄尚書詔許焉以睦代彪錄尚書事永元四年冬十月章甲十六行本月下有己亥二字乙十一行本同孔本同退齋校同以宗正劉方為司空永元四年武陵零陵澧中蠻叛永元四年護羌校尉鄧訓卒吏民羌胡旦夕臨者日數千人臨力鴆翻哭也羌胡或以刀自割又刺殺其犬馬牛羊刺七逆翻又七四翻曰鄧使君已死我曹亦俱死耳前烏桓吏士皆奔走道路賢曰訓前任烏桓校尉時吏士也吏執不聽以狀白校尉徐傿傿蓋為烏桓校尉傿於建翻傿歎息曰此為義也乃釋之遂家家為訓立祠為于偽翻下同每有疾病輒請禱求福蜀郡太守聶尚代訓為護羌校尉欲以恩懷諸羌乃遣譯使招呼迷唐使還居大小榆谷迷唐去大小榆谷事見上卷章和二年鄧訓驅逐迷唐而聶尚招呼之欲以反鄧訓之政也聶缺昵使疏吏翻迷唐既還遣祖母卑缺詣尚卑缺蓋迷吾之母為設祖道令譯田汜等五人護送至廬落迷唐遂反與諸種共生屠裂汜等以血盟詛種章勇翻汜詳里翻詛莊助翻復寇金城塞復扶又翻尚坐免五年五年春正月乙亥宗祀明堂登靈臺赦天下五年戊子千乘貞王伉薨諡法臣諡直道不撓曰貞事君無猜曰貞清白守節曰貞固節幹事曰貞伉音抗五年辛卯封皇弟萬歲為廣宗王廣宗縣屬鉅鹿郡賢曰今貝州宗城縣隋煬帝諱廣故改為宗城五年甲寅太傅鄧彪薨五年戊午隴西地震五年夏四月壬子紹封阜陵殤王兄魴為阜陵王諡法未家短折曰殤阜陵殤王沖質王延之子元年嗣封三年薨無嗣今以魴紹封魴符方翻五年九月辛酉廣宗殤王萬歲薨無子國除五年初竇憲既立於除鞬為北單于欲輔歸北庭事見上卷三年鞬居言翻於除鞬自畔還北詔遣將兵長史王輔以千餘騎與任尚共追討斬之破滅其衆五年耿夔之破北匈奴也事見上卷三年拓拔氏自北荒南徙蓋此時也種章勇翻皆自號鮮卑鮮卑由此漸盛五年冬十月辛未太尉尹睦薨五年十一月乙丑太僕張酺為太尉酺與尚書張敏等奏射聲校尉曹褒亶制漢禮破亂聖術宜加刑誅書凡五奏帝知酺守學不通言守其家學也而漢禮遂不行褒制禮事見上卷章帝章和元年五年是歲武陵郡兵破叛蠻降之降戶江翻五年梁王暢與從官卞忌祠祭求福姓譜卞本自有周曹叔振鐸之後曹之支子封於下遂以建族余按魯有卞莊子楚有卞和神言王當為天子暢與相應答為有司所奏請徵詣詔獄帝不許但削成武單父二縣成武單父二縣本屬山陽後屬濟陰章帝以益梁國賢曰成武今曹州縣單父今宋州縣單音善上疏深自刻責曰臣天性狂愚不知防禁自陷死罪分伏顯誅分扶問翻陛下聖德枉法曲平賢曰曲平曲法申恩平處其罪為臣受汙橫胡孟翻汙惡也天下以赦暢為納汙是為暢受汙為于偽翻自誓束身約妻子不敢復出入失繩墨不敢復有所橫費橫戶孟翻復扶又翻租入有餘乞裁食睢陽穀熟虞蒙寧陵五縣還餘所食四縣四縣下邑尉氏薄郾也睢音雖凡非正室者皆小妻也願還本家自選擇謹敕奴婢二百人其餘所受虎賁官騎及諸工技鼓吹倉頭奴婢兵弩广既馬皆上還本署虎賁士屬虎賁中郎將官騎騶騎也漢官儀曰騶騎王家名官騎與广既馬皆屬太僕工技屬尚方鼓吹屬黃門倉頭奴婢屬永巷御府奚官等令兵弩屬考工令各有本署也賁音奔技渠綺翻吹昌瑞翻上時掌翻亂聖化汙清流汙烏故翻既得生活誠無心面目以凶惡復居大宮食大國張官屬藏雜物賢曰古者師行二五為什食器之類必共之故曰什物食具今人通謂生生之具為什物復扶又翻上優詔不聽五年護羌校尉貫友貫姓也漢初有趙相貫高誘以財貨由是解散使疏吏翻誘音酉乃遣兵出塞攻迷唐於大小榆谷獲首虜八百餘人收麥數萬斛遂夾逢留大河築城塢此大河即黃河河水至此有逢留之名在二榆谷北造河橋欲度兵擊迷唐酈道元水經註曰於河狹作橋航戶剛翻依賜支河曲西羌傳賜支者禹貢所謂析支者也羌居河關之西南濱於賜支至於河首帛丿糸地千里司馬彪曰西羌自析支以西濱河首在右居也河水屈而東北流逕於析支之地是為河曲矣應劭曰禹貢析支屬雍州在河關之西東去河關千餘里羌人所居謂之河曲羌五年單于屯屠何死單于宣弟安國立安國初為左賢王無稱譽及為單于單于適之子右谷蠡王師子以次轉為左賢王谷音鹿蠡盧奚翻師子素勇黠多知黠下八翻知古智字通通單于宣及屯屠何皆愛其氣決數遣將兵出塞數所角翻下同掩擊北庭還受賞賜天子亦加殊異由是國中盡敬師子而不附安國安國欲殺之諸新降胡初在塞外數為師子所驅掠在塞外謂先屬北部時降戶剛翻安國章甲十六行本國下有因是二字乙十一行本同孔本同張校同委計降者與同謀議師子覺其謀乃別居五原界每龍庭會議匈奴龍庭本在塞外是時南單于居塞內亦謂所居為龍庭度遼將軍皇甫稜知之亦擁護不遣單于懷憤益甚六年六年春正月皇甫稜免以執金吾朱徽行度遼將軍時單于與中郎將杜崇不相平乃上書告崇崇諷西河太守令斷單于章中郎將使匈奴中郎將也斷音短單于居西河美稷故諷令太守斷其章使不上聞崇因與朱徽上言南單于安國疏遠故胡親近新降遠于願翻近其靳翻降戶江翻欲殺左賢王師子及左臺且渠劉利等又右部降者謀共迫脅安國起兵背畔且子余翻背蒲妹翻請西河上郡安定為之儆備帝下公卿議下遐稼翻皆以為蠻夷反覆雖難測知然大兵聚會必未敢動搖今宜遣有方略使者之單于庭之往也使疏吏翻觀其動靜如無他變可令崇等就安國會其左右大臣責其部衆橫暴為邊害者共平罪誅相與平處其罪當誅者則誅之橫戶孟翻令為權時方略事畢之後裁行賞賜賢曰裁量賜物不多與也章甲十六行本蠻下有帝從之三字乙十一行本同張校同於是徽崇遂發兵造其庭造七到翻安國夜聞漢軍至大驚棄帳而去帳單于所居即謂之穹廬又謂之廬帳師子先知乃悉將廬落入曼柏城曼柏縣屬五原郡門閉不得入朱徽遣吏譬章甲十六行本譬上有曉字乙十一行本同退齋校同和之安國不聽城既不下乃引兵屯五原崇徽因發諸郡騎追赴之急衆皆大恐安國舅骨都侯喜為等慮幷被誅乃格殺安國被皮義翻考異曰帝紀在去年誤今從南匈奴傳立師子為亭獨尸逐侯鞮單于鞮丁奚翻六年己卯司徒丁鴻薨六年二月丁未以司空劉方為司徒太常張奮為司空六年夏五月城陽懷王淑薨無子國除六年秋七月京師旱六年西域都護班超發龜茲鄯善等八國兵合七萬餘人龜茲音兵慈鄯上扇翻討焉耆到其城下誘焉耆王廣尉犂王汎等於陳睦故城斬之傳首京師誘音酉考異曰袁紀汎作沈今從超傳因縱兵鈔掠鈔楚交翻斬首五千餘級獲生口萬五千人更立焉耆左侯元孟為焉耆王焉耆國有左右將左右侯更工衡翻慰撫之於是西域五十餘國悉納質內屬至于海濱西海之濱也所謂條支大秦蒙奇兜勒諸國也質音致皆重譯貢獻重直龍翻班超所以成西域之功者以匈奴衰困力不能及西域也六年南單于師子立降胡五六百人夜襲師子降戶江翻安集掾王恬將衞護士與戰破之使匈奴中郎將置掾隨事為員安集掾以安集匈奴為稱也光武在河北亦置安集掾以天下未定使之安集斯民也建武二十六年使匈奴中郎將置安集掾史將弛刑五十人持兵弩隨單于所處參辭訟察動靜掾俞絹翻十五部二十餘萬人皆反脅立前單于屯屠何子薁鞮日逐王逢侯為單于鞮當作鞬賢曰前鞮鞬兩字通今不改亦可薁於六翻鞬九言翻燔燒郵亭廬帳將車重向朔方欲度幕北郵音尤重直用翻九月癸丑以光祿勳鄧鴻行車騎將軍事與越騎校尉馮柱行度遼將軍朱徽將左右羽林北軍五校士及郡國迹射緣邊兵賢曰漢有迹射士言尋迹而射也時南單于及中郎將杜崇珥牧師城漢邊郡有牧師菀以養馬此牧師菀城也當在西河郡美稷縣界冬十一月鄧鴻等至美稷逢侯乃解圍去向漢夷谷南單于遣子將萬騎及杜崇所領四千騎與鄧鴻等追擊逢侯於大城塞大城縣故屬西河郡郡國志屬朔方郡任尚率鮮卑烏桓要擊逢侯於滿夷谷要一遙翻復大破之復扶又翻下同前後凡斬萬七千餘級逢侯遂率衆出塞漢兵不能追而還還從宣翻又如字六年以大司農陳寵為廷尉寵性仁矜數議疑獄數所角翻每附經典務從寬恕刻敝之風於此少衰少詩沼翻六年帝以尚書令江夏黃香為東郡太守香辭以典郡從政才非所宜乞留備宂官宂而隴翻散也賜以督責小職任之宮臺煩事宮謂宮中臺謂尚書臺也尚書出納王命故云宮臺煩事增秩二千石按百官志尚書令秩千石今特增秩二千石以香在尚書日久又辭不拜郡故復留為尚書令而祿以郡守祿香亦祗勤物務憂公如家七年七年春正月鄧鴻等軍還馮柱將虎牙營留屯五原鴻坐逗留失利下獄死後帝知朱徽杜崇失胡和又禁其上書以致胡反皆徵下獄死下遐稼翻七年夏四月辛亥朔日有食之七年秋七月乙巳易陽地裂余按地理志及郡國志易陽縣屬趙國應劭曰易水出涿郡故安師古及賢皆曰縣在易水之陽此皆承應劭之誤也易水在燕南界漢屬河間郡界此時趙國僅有唐邢洺二州之地安得有屬縣遠在易水之陽邪五代史志洺州臨洺縣舊曰易陽後齊廢入襄國縣後周改為易陽縣別置襄國縣隋開皇六年改易陽縣為邯鄲縣十年改邯鄲縣為臨洺而別置邯鄲縣由是觀之漢易陽縣當在邯鄲襄國二縣之間七年九月癸卯京師地震七年樂成王黨坐賊殺人削東光鄡二縣東光縣本屬勃海郡鄡縣本屬鉅鹿郡章帝以益樂成國鄡音羌堯翻舊禁宮人出嫁不得適諸國有故掖庭技人哀置嫁男子章初黨召入宮與通初欲上書告之黨賂哀置姊昭殺初八年八年春二月立貴人陰氏為皇后后識之曾孫也八年夏四月章甲十六行本月下有癸亥二字乙十一行本同退齋校同樂成靖王黨薨子哀王崇立尋死無子國除八年五月河內陳留蝗八年南匈奴右溫禺犢王烏居戰畔出塞賢曰溫禺犢王名烏居戰七月度遼將軍龐奮越騎校尉馮柱追擊破之徙其餘衆及諸降胡二萬餘人於安定北地安定郡在雒陽西千七百里北地郡在雒陽西千一百里八年車師後部王涿鞮反擊前王尉畢大獲其妻子尉畢大西域傳作尉卑大時戊己校尉索頵欲廢後部王涿鞮涿鞮忿前王尉卑大賣己因反擊尉卑大鞮丁奚翻八年九月京師蝗八年冬十月乙丑北海王威以非敬王子又坐誹謗自殺八年十二月辛亥陳敬王羨薨八年丁巳南宮宣室殿火八年護羌校尉貫友卒以漢陽太守史充代之充至遂發湟中羌胡出塞擊迷唐迷唐迎敗充兵敗補邁翻殺數百人充坐徵以代郡太守吳祉代之九年九年春三月庚辰隴西地震九年癸巳濟南安王康薨諡法好和不爭曰安寬裕和平曰安濟子禮翻九年西域長史王林擊車師後王斬之後王涿鞮九年夏四月丁卯封樂成王黨子巡為樂成王九年五月封皇后父屯騎校尉陰綱為吳房侯郡國志吳房縣屬汝南郡有棠谿亭左傳房國楚靈王所滅又楚昭王封吳王夫概於棠谿地道記有吳城吳房蓋合吳城房國以名縣也九年六月旱蝗九年秋八月鮮卑寇肥如遼東太守祭參坐沮敗下獄死賢曰肥如縣屬遼西郡前書音義曰肥子奔燕封於此今平州也按祭肜傳參守遼東鮮卑入郡界參坐沮敗下獄死蓋寇遼之肥如遂入遼東郡界也沮在呂翻九年閏月辛巳皇太后竇氏崩初梁貴人既死事見四十六卷章帝建初八年莫有知帝為梁氏出者舞陰公主子梁扈遣從兄䄠奏記三府扈梁松子也帝母梁貴人少失母為伯母舞陰公主所養從才用翻賢曰䄠古禪字漢家舊典崇貴母氏而梁貴人親育聖躬不蒙尊號求得申議賢曰求申理而議之也帝感慟良久曰毛晃曰良頗也良久頗久也或曰良久少久也一曰良略也聲輕故轉略為良慟徒弄翻大哭也哀過也於君意若何酺請追上尊號存錄諸舅錄采也收拾也會貴人姊南陽樊調妻嫕嫕音於計翻考異曰袁紀嫕皆作憑今從皇后紀梁竦傳上書自訟曰妾父竦冤死牢獄骸骨不掩母氏年踰七十及弟棠等遠在絕域不知死生願乞收竦朽骨使母弟得歸本郡帝引見嫕乃知貴人枉歿之狀三公上奏請依光武黜呂太后故事事見四十五卷光武中元元年按此事乃光武之失而可引之為故典乎不宜合葬先帝百官亦多牙言者帝手詔曰竇氏雖不遵法度而太后常自減損朕奉事十年自嗣位至是十年惟思也臣子無貶尊上之文恩不忍離義不忍虧按前世上官太后亦無降黜謂上官桀父子誅不累及上官后也事見二十二卷昭帝元鳳元年復扶又翻丙申葬章德皇后九年燒唐章甲十六行本唐作當乙十一行本同熊校同羌迷唐率衆八千人寇隴西脅塞內諸種羌合步騎三萬人擊破隴西兵殺大夏長大夏縣屬隴西郡宋白曰今大夏縣屬河州夏戶雅翻種章勇翻長知兩翻以趙世副劉尚也考異曰西羌傳作趙代今從帝紀余謂唐太宗諱世民賢註范史偶檢點及此遂改世為代耳尚屯狄道世屯枹罕狄道枹罕二縣皆屬隴西郡宋白曰狄道縣屬蘭州枹罕縣河州治所枹音膚四面並會監古銜翻迷唐懼棄老弱奔入臨洮南奔入臨洮南山也大破之斬虜千餘人迷唐引去漢兵死傷亦多不能復追復扶又翻乃還九年九月庚申司徒劉方策免自殺九年甲子追尊梁貴人為皇太后諡曰恭懷追復喪制冬十月乙酉改葬梁太后及其姊大貴人于西陵西陵蓋以其地在敬陵之西故稱西陵猶薄太后陵在霸陵南因謂之南陵也賢曰初后葬有闕故改葬追封諡皇太后父竦為褒親愍侯諡法在國逢難曰愍葬於恭懷皇后陵旁徵還竦妻子封子棠為樂平侯樂平侯國屬東郡故清縣也章帝更名乘氏侯國屬濟陰郡春秋之乘丘也乘繩證翻單父音善甫位皆特進賞賜以巨萬計寵遇光於當世梁氏自此盛矣清河王慶始敢求上母宋貴人冢宋貴人冢在雒陽城北樊濯聚上時掌翻詔太官四時給祭具慶垂涕曰生雖不獲供養供俱用翻養羊尚翻終得奉祭祀私願足矣欲求作祠堂恐有自同恭懷梁后之嫌遂不敢言常泣向左右以為沒齒之恨齒年也外祖母王年老乞詣雒陽療疾於是詔宋氏悉歸京師宋氏歸故郡事見四十六卷章帝建初七年九年十一月癸卯以光祿勳河南呂蓋為司徒九年十二月丙寅司空張奮罷壬申以太僕韓稜為司空九年西域都護定遠侯班超遣掾甘英使大秦條支東觀記曰以漢中郡南鄭縣之西鄉千戶封超為定遠侯賢曰定遠故城在今洋州西鄉縣南西域傳曰自皮山西南經烏秅涉懸度歷罽賓六十餘日行至烏弋山離國復西南馬行百餘日至條支條支臨西海海水曲環其南及東北三面路絕唯西北隅通陸道大秦國西漢之犂靬也在西海西其人民長大平正有類中國故謂之大秦今拂菻國是也掾俞絹翻使疏吏翻皆前世所不至莫不備其風土傳其珍怪焉及安息西界自條支轉北而東馬行六十餘日至安息欲渡船人謂英曰海水廣大往來者逢善風善風謂順風也若遇遲風亦有二歲者故入海人皆齎三歲糧海中善使人思土戀慕數有死亡者數所角翻英乃止十年十年夏五月京師大水十年秋七月己巳司空韓稜薨八月丙子以太常太山巢堪為司空十年冬十月五州雨水十年行征西將軍劉尚越騎校尉趙世坐畏懦徵下獄免謁者王信領尚營屯枹罕謁者耿譚領世營屯白石白石縣本屬金城郡時屬隴西郡水經註白石川水南逕白石城西而注灘水水又逕白石縣故城南鬫駰曰白石縣在狄道縣西北二百八十五里賢曰白石山在今蘭州或曰河州鳳林縣本漢白石縣張駿改為永固唐為烏州後廢州置安昌縣後又更名鳳林杜佑曰直道縣有白石山諸種頗來內附迷唐恐乃請降信譚遂受降罷兵十二月迷唐等帥種人詣闕貢獻帥讀曰率種章勇翻十年戊寅梁節王暢薨十年初居巢侯劉般薨居巢縣屬廬江郡般建初三年薨稱父遺意讓其弟憲遁逃久之有司奏絕愷國肅宗美其義特優假之愷猶不出積十餘歲有司復奏之復扶又翻侍中賈逵上書曰孔子稱能以禮讓為國乎何有見論語樂音洛而繩以循常之法懼非長克讓之風成含弘之化也長知兩翻帝納之下詔曰王法崇善成人之美其聽憲嗣爵遭事之宜後不得以為比乃徵愷拜為郎十年南單于師子死單于長之子檀立為萬氏尸逐鞮單于十一年十一年夏四月丙寅赦天下十一年帝因朝會召見諸儒朝直遙翻見賢遍翻使中大夫魯丕與侍中賈逵尚書令黃香等相難數事難乃旦翻以經疑相難也下同帝善丕說罷朝特賜衣冠丕因上疏曰臣聞說經者傳先師之言非從己出不得相讓相讓則道不明若規矩權衡之不可枉也賢曰規圓也矩方也權秤錘衡秤衡也說者務立其義漢儒專門名家各守師說故發難者必明其師之說以為據答難者亦必務立大義以申其師之說不陳於前故精思不勞而道術愈章章明也思相吏翻博觀其義無令芻蕘以言得罪自此於芻蕘謙也蕘如招翻十二年十二年夏四月戊辰秭歸山崩賢曰秭歸縣屬南郡古之夔國今歸州也袁山松曰屈原此縣人既被流放忽然蹔歸其姊亦來因名其地為秭歸秭亦姊也音蔣兕翻十二年秋七月辛亥朔日有食之十二年九月戊午太尉張酺免丙寅以大司農張禹為太尉十二年燒當羌豪迷唐既入朝其餘種人不滿二千飢窘不立不能自立也種章勇翻下同帝令迷唐將其種人還大小榆谷迷唐以漢作河橋即五年貫友所作之橋故地不可復居復扶又翻下同辭以種人飢餓不肯遠出護羌校尉吳祉等多賜迷唐金帛令糴穀市畜畜許又翻促使出塞種人更懷猜驚是歲迷唐復叛脅將湟中諸胡寇鈔而去鈔楚交翻王信耿譚吳祉皆坐徵十三年十三年秋八月己亥北宮盛饌門閣火盛饌門閣御廚門閣也晉書天文志曰紫宮垣西南角外二星內二星曰內廚主六宮之內飲食后夫人與太子宴飲東北維外六星曰天廚主盛饌皇居則象於天極故北宮有盛饌門閣十三年迷唐復還賜支河曲將兵向塞護羌校尉周鮪與金城太守侯霸金城郡在洛陽西二千八百里鮪于軌翻章甲十六行本人下有出塞二字乙十一行本同孔本同張校同退齋校同至允川水經註曰允川去賜支河曲數十里在大小榆谷之西種人瓦解降者六千餘口種章勇翻降戶江翻分徙漢陽安定隴西迷唐遂弱遠踰賜支河首依發羌居發羌羌之別種或曰唐之吐蕃即其後也病死其子來降戶不滿數十十三年荊州雨水十三年冬十一月丙辰詔曰幽幷涼州戶口率少幽州部涿郡廣陽代郡上谷漁陽右北平遼西遼東玄菟樂浪等郡幷州部上黨上郡西河五原雲中定襄鴈門朔方等郡幽州大郡戶猶十萬餘唯玄菟戶一千五百二十四幷州大郡三萬餘小郡不滿二千涼州大郡不滿三萬敦煌七百四十八而已少詩沼翻束脩良吏進仕路狹束脩謂束髮自脩者也以人為本其令緣邊郡口十萬以上歲舉孝廉一人不滿十萬二歲舉一人五萬以下三歲舉一人十三年鮮卑寇右北平右北平郡在雒陽北二千三百里漁陽太守擊破之十三年戊辰司徒呂蓋以老病致仕十三年巫蠻許聖以郡收稅不均怨恨遂反賢曰巫縣屬南郡故城在今夔州巫山縣辛卯寇南郡十四年十四年春安定降羌燒何種反燒當與燒何各是一種種章勇翻下同時西海及大小榆谷左右無復羌寇水經河水自東河曲逕西海郡南又東逕允川而歷大小榆谷北復扶又翻隃麋侯國屬右扶風隃音踰麋音眉賢曰隃麋故城在今隴州汧陽縣東南自建武以來西羌犯法者常從燒當種起所以然者以其居大小榆谷土地肥美有西海魚鹽之利西海有允谷鹽池又近塞諸種易以為非易以豉翻難以攻伐故能強大常雄諸種恃其拳勇詩云無拳無勇毛萇註云拳力也今者衰困黨援壞沮誘音酉沮在呂翻亡逃棲竄遠依發羌臣愚以為宜及此時建復西海郡縣建立也立策復置郡縣也置西海郡見三十六卷平帝元始四年規圖也謀也隔塞羌胡交關之路塞悉則翻遏絕狂狡窺欲之源又殖穀富邊省委輸之役委於偽翻輸舂遇翻國家可以無西方之憂上從之繕脩故西海郡徙金城西部都尉以戍之孟康曰金城西部都尉府在金城縣屯龍耆賢曰龍耆即龍支也今鄯州縣宋白曰鄯州龍支縣本漢允吾縣地取縣西龍支堆為名列屯夾河合三十四部其功垂立會永初中諸羌叛乃罷十四年三月戊辰臨辟雍饗射赦天下十四年夏四月遣使者督荊州兵萬餘人分道討巫蠻許聖等大破之聖等乞降悉徙置江夏晉宋之荊州蠻分居沔中西陽者即巫蠻之餘種也降戶江翻十四年陰皇后多妬忌寵遇浸衰數懷恚恨數所角翻恚衣避翻后外祖母鄧朱出入宮掖有言后與朱共挾巫盡道者賢曰巫師為蠱故曰巫蠱左傳註曰蠱惑也劾以大逆無道劾戶概翻又戶得翻朱二子奉毅后弟輔皆考死獄中六月辛卯后坐廢遷于桐宮以憂死父特進綱自殺后弟軼敞及朱家屬徒日南比景日南郡秦象郡也武帝更名在雒陽南萬三千四百里比景縣屬焉如淳曰日中於頭上景在己下故名之師古曰日南言其在日之南所謂開北戶以向日者軼音逸十四年秋七月壬子常山殤王側薨無子立其兄防子侯章為常山王房子縣屬常山國十四年三州大水十四年班超久在絕域超始出西域見四十五卷明帝永平十六年上書乞歸曰臣不敢望到酒泉郡但願生入玉門關酒泉郡在雒陽西四千七百里賢曰玉門關屬敦煌郡今沙州也去長安三千六百里關在敦煌縣西北酒泉郡今肅州也去長安二千八百五十里及臣生在令勇目見中土朝廷久之未報超妹曹大家超妹昭嫁扶風曹壽博學高才有節行法度帝數召入宮令皇后諸貴人師事焉號曰大家家今人相傳讀曰姑又據皇后紀沖帝母虞貴人梁冀秉政抑而不加爵號但稱大家而已則大家者宮中相尊之稱也蠻夷之性悖逆侮老悖蒲內翻又蒲沒翻而超旦暮入地久不見代恐開姦宄之原生逆亂之心而卿大夫咸懷一切莫肯遠慮如有卒暴卒讀曰猝下同超之氣力不能從心便為上損國家累世之功下棄忠臣竭力之用誠可痛也故超萬里歸城自陳苦急延頸踰望賢曰踰遙也高祖踰謂黥布曰何苦而反余按前書當作隃讀曰遙傳寫誤作踰未蒙省錄省悉景翻妾竊聞古者十五受兵六十還之賢曰周禮鄉大夫職曰國中七尺以及六十有五皆征之征謂賦稅從征役也韓詩外傳曰二十行役六十免役與周禮國中同即知一與周禮七尺同禮國中六十免役野即六十有五晚於國中五年國中七尺從役野六尺即是野又早於國中五年七尺謂二十六尺即十五也此言十五受兵據野外為言六十還之據國中為說也不任職也任音壬故妾敢觸死為超求哀匄超餘年為于偽翻賢曰匄乞也一得生還復見闕庭使國家無勞遠之慮西域無倉卒之憂超得長蒙文王葬骨之恩新序曰周文王作靈臺掘地得死人之骨王曰更葬之吏曰此無主矣文王曰有天下者天下之主也有一國者一國之主也寡人固其主又安求之主遂更葬之天下皆曰文王賢矣澤及朽骨而況於人乎賢曰田子方魏文侯之師也見君之老馬棄之曰少盡其力老而棄之非仁也於是收而養之乃徵超還八月超至雒陽拜為射聲校尉九月卒考異曰本傳稱超十二年上疏十四年至雒陽而妹昭上書曰延頸踰望三年於今註引東觀記曰安息遣使獻大雀師子超遺子勇隨入塞按帝紀十三年安息國入貢袁紀載超書亦在十三年今幷置其書於此袁紀又云超到數月薨今從本傳超之被徵被皮義翻以戊己校尉任尚代為都護尚謂超曰君侯在外國三十餘年而小人猥承君後任重慮淺宜有以誨之超曰年老失智君數當大位數所角翻豈班超所能及哉必不得已願進愚言塞外吏士本非孝子順孫皆以罪過徙補邊屯而蠻夷懷鳥獸之心難養易敗易以豉翻今君性嚴急水清無大魚察政不得下和家語孔子曰水至清則無魚人至察則無徒易以豉翻寬小過總大綱而已超去尚私謂所親曰我以班君當有奇策今所言平平耳尚後竟失邊和如超所言為任尚徵還漢失西域張本十四年初太傅鄧禹嘗謂人曰吾將百萬之衆未嘗妄殺一人後世必有興者其子護羌校尉訓有女曰綏性孝友好書傳好呼到翻傳柱戀翻常晝修婦業暮誦經典家人號曰諸生叔父陔曰嘗聞活千人者子孫有封兄訓為謁者使修石臼河歲活數千人陔柯開翻石臼河事見四十六卷章帝建初三年天道可信家必蒙福綏後選入宮為貴人恭肅小心動有法度承事陰后接撫同列常克己以下之謂克去有己之私不欲上人也下遐稼翻皆加恩借既有以恩之又假借以辭色嘗有疾帝特令其母兄弟入親醫藥不限以日數貴人辭曰宮禁至重而使外舍久在內省外舍猶言外家內省猶言內禁也私幸謂私於所幸者上下交損謂交有所損帝曰人皆以數入為榮數所角翻下同貴人反以為憂邪每有讌會諸姬競自修飾貴人獨尚質素其衣有與陰后同色者即時解易若並時進見見賢遍翻下同則不敢正坐離立賢曰離並也禮記曰離坐離立僂力主翻俯也帝每有所問常逡巡後對不敢先后言先悉薦翻陰后短小舉指章甲十六行本指作止乙十一行本同時失儀左右掩口而笑貴人獨愴然不樂為之隱諱若己之失樂音洛為于偽翻帝知貴人勞心曲體歎曰修德之勞乃如是乎後陰后寵衰貴人每當御見御進也見賢遍翻時帝數失皇子貴人憂繼嗣不廣數選進才人以博帝意西漢宮中爵號有美人良人若才人蓋東都所置也博廣也稱尺證翻深疾之疾與嫉同妬也危甚陰后密言我得意不令鄧氏復有遺類復扶又翻貴人聞之流涕言曰我竭誠盡心以事皇后竟不為所祐今我當從死從才用翻上以報帝之恩中以解宗族之禍下不令陰氏有人豕之譏人豕即人彘事見十二卷惠帝元年宮人趙玉者固禁止之因詐言屬有使來屬之欲翻會也使疏吏翻上疾已愈貴人乃止明日上果瘳瘳丑留翻及陰后之廢貴人請救不能得帝欲以貴人為皇后貴人愈稱疾篤深自閉絕冬十月辛卯詔立貴人鄧氏為皇后后辭讓不得已然後即位郡國貢獻悉令禁絕漢郡國貢獻進御之外別上皇后宮毛晃曰楮籍不知所始後漢蔡倫以魚網木皮為紙俗以為紙始於倫非也按前書外戚傳已有赫蹏紙矣墨膠煤以為之后輒哀請謙讓故兄騭終帝世不過虎賁中郎將騭職日翻賢曰東觀記騭作陟十四年丁酉司空巢堪罷十四年十一月癸卯以大司農沛國徐防為司空防上疏以為漢立博士十有四家漢官儀曰光武中興恢弘稽古易有施孟梁丘賀京房書有歐陽和伯夏侯勝建詩有申公轅固韓嬰春秋有嚴彭祖顏安樂禮有戴德戴聖凡十四博士前書博士弟子歲課甲科四十人為郎中乙科二十人為太子舍人丙科四十人為文學掌故伏見太學試博士弟子皆以意說不修家法賢曰諸經為業各自名家開生姦路每有策試策編簡也策試即射策也漢書音義曰作簡策難問列置案上在試者意投射取而答之謂之射策諍讀與爭同論議紛錯互相是非孔子稱述而不作見論語賢曰祖述先聖之言不自制作亦見論語賢曰古者史官於書有所不知則闕以待能者孔子言吾少時猶及見古史官之闕文今則無之疾時多穿鑿也妄生穿鑿以遵師為非義意說為得理意說者創意而為之說浸以成俗誠非詔書實選本意改薄從忠三代常道賢曰太史公曰夏之政忠忠之敝小人以野故殷人承之以敬敬之敝小人以鬼故周人承之以文文之敝小人以僿故救僿莫若以忠三王之道若循環周而復始僿音西志翻史記僿作薄儒學所先先悉薦翻臣以為博士及甲乙策試宜從其家章句開五十難以試之難乃旦翻解釋多者為上第引文明者為高說若不依先師義有相伐賢曰伐謂相攻伐也上從之十四年是歲初封大長秋鄭衆為鄛鄉侯賞誅竇憲功也宦官封侯自此始賢曰南陽郡棘陽縣有鄛鄉鄛音上交翻十五年十五年夏四月甲子晦日有食之時帝遵肅宗故事兄弟皆留京師有司以日食陰盛奏遣諸王就國詔曰甲子之異責由一人諸王幼穉早離顧復詩小雅蓼莪之篇曰父兮生我母兮鞠我顧我復我出入腹我鄭氏箋曰顧旋視也復反覆也離力智翻冠古玩翻常有蓼莪凱風之哀詩小雅曰蓼蓼者莪匪莪伊蒿哀哀父母生我劬勞又國風曰凱風自南吹彼棘心棘心夭夭母氏劬勞蓼力竹翻知非國典且復宿留賢曰選懦慈戀不決之意也懦音人兗翻復扶又翻宿音秀留音溜十五年秋九月壬午車駕南巡清河濟北河間三王並從濟子禮翻從才用翻十五年四州雨水十五年冬十月戊申帝幸章陵戊午進幸雲夢賢曰雲夢今安州縣也即在雲夢澤中守手又翻聞車駕當幸江陵以為不宜冒險遠遊驛馬上諫上時掌翻詔報曰祠謁既訖謂幸章陵祠謁四親陵廟會得君奏臨漢回輿而旋十一月甲申還宮十五年嶺南舊貢生龍眼荔枝十里一置五里一候賢曰交州記曰龍眼樹高五六丈似荔支而小廣州記曰子似荔支而圓七月熟荔支樹高五六丈大如桂樹實如雞子甘而多汁似安石榴有甜醋者至日禺中翕然俱赤即可食置謂驛也候即堠也立之道旁荔立計翻傳直戀翻臨武長汝南唐羌賢曰臨武縣屬桂陽郡今郴州縣嶺南入獻道經臨武長知兩翻臣聞上不以滋味為德下不以貢膳為功伏見交趾七郡交趾州部南海蒼梧鬱林合浦交趾九真日南七郡鳥驚風發言其疾也惡蟲猛獸不絕於路至於觸犯死亡之害死者不可復生來者猶可救也復扶又翻下同此二物升殿未必延年益壽帝下詔曰遠國珍羞本以薦奉宗廟宗廟之薦各以其土之所有致之貴遠物也豈愛民之本其敕太官勿復受獻十五年是歲初令郡國以日北至按薄刑時有司奏以為夏至則微陰起靡草死可以決小事遂令以日北至按薄刑賢曰禮記月令曰孟夏之月靡草死麥秋至斷薄刑決小罪按五月一陰爻生可以言微陰今月令云孟夏乃是純陽之月此言夏至者與月令不同余按安帝永初元年魯恭言自永元十五年按薄刑改用孟夏則夏至乃謂夏之初至范史以日北至書之其誤後人甚矣十六年十六年秋七月旱十六年辛酉司徒魯恭免十六年庚午以光祿勳張酺為司徒八月己酉酺薨冬十月辛卯以司空徐防為司徒大鴻臚陳寵為司空臚陵如翻十六年十一月己丑帝行幸緱氏登百岯山緱氏縣屬河南尹賢曰即柏岯山也在洛州緱氏縣南爾雅云山一成曰岯緱工侯翻岯平眉翻十六年北匈奴遣使稱臣貢獻願和親脩呼韓邪故約帝以其舊禮不備未許而厚加賞賜不答其使元興元年乙巳一五十六年春高句驪王宮入遼東塞寇略六縣句驪至宮浸強數犯邊句如字又音駒驪力知翻十六年夏四月庚午赦天下改元十六年秋九月遼東太守耿夔擊高句驪破之十六年冬十二月辛未帝崩于章德前殿年二十七帝失皇子前後十數後生者輒隱祕養於民間㣥臣無知者及帝崩鄧皇后乃收皇子於民間長子勝有痼疾痼音固痼疾堅久之疾也長知兩翻少子隆生始百餘日少詩照翻迎立以為皇太子是夜即皇帝位廢長立幼卒以不終為㣥臣疑勝疾非痼周章有異謀張本太后臨朝朝直遙翻是時新遭大憂法禁未設宮中亡大珠一篋篋詰協翻竹笥也太后念欲考問必有不辜考問則下之獄辭所連及必有無辜而被逮者觀察顏色即時首服首式救翻又和帝幸人吉成御者共枉吉成以巫蠱事下掖庭考訊辭證明白幸人常見幸於和帝者也御者即侍者辭謂告者之辭證謂證佐也下遐稼翻待之有恩平日尚無惡言今反若此不合人情謂婦人之情有寵則上僭而生譖愬吉成在先帝之時后待之以恩尚未嘗挾寵而有惡言加於后今帝已晏駕太后臨朝不應反為巫蠱果御者所為實覈者審考其實也十六年北匈奴重遣使詣敦煌貢獻重直用翻敦音屯辭以國貧未能備禮願請大使當遣子入侍賢曰天子降大使至其國即遣子隨大使入侍加賜而已十六年雒陽令廣漢王渙居身平正能以明察發擿姦伏擿他狄翻外行猛政內懷慈仁凡所平斷斷丁亂翻人莫不悅服京師以為有神是歲卒官卒于官也卒子恤翻張市作帀道莫不咨嗟流涕渙喪西歸道經弘農民庶皆設槃案於路以祭渙也槃以盛祭物案以陳槃今野人之祭猶然咸言平常持米到雒為吏卒所鈔賢曰鈔掠也余謂此言鈔者非至如盜賊之鈔掠特不以道而侵取之故曰鈔音楚交翻恆戶登翻自王君在事在事謂在官當事也故來報恩雒陽民為立祠作詩每祭輒弦歌而薦之以所作詩被之弦歌也為于偽翻夫忠良之吏國家之所以為治也治直之翻求之甚勤得之至寡今以渙子石為郎中以勸勞勤王崇武標點容肇祖聶崇岐覆校
