body:
  text: 資治通鑑卷第六十一翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註漢紀五十三興平元年孝獻皇帝丙興平元年甲戌一九四興平元年春正月辛酉赦天下興平元年甲子帝加元服興平元年二月戊寅有司奏立長秋宮詔曰皇妣宅兆未卜孝經卜其宅兆而安厝之兆塋域也壬午三公奏改葬皇妣王夫人追上尊號曰靈懷皇后王夫人死見五十八卷靈帝光和四年皇后紀曰改葬文昭陵上時掌翻興平元年陶謙告急於田楷楷與平原相劉備救之備自有兵數千人謙益以丹陽兵四千備遂去楷歸謙謙表為豫州刺史屯小沛沛國治相縣而沛自為縣屬沛國時人謂沛縣為小沛由此時呼備為劉豫州豫州刺史本治譙備領刺史而屯小沛按此時又有豫州刺史郭貢朝命不行私相署置者也引兵還興平元年馬騰私有求於李傕傕古岳翻不獲而怒欲舉兵相攻帝遣使者和解之不從韓遂率衆來和騰傕既而復與騰合遂知傕之不足與也復扶又翻己為內應以誅傕等壬申騰遂勒兵屯長平觀种音沖觀古玩翻卲等謀泄出奔槐里傕使樊稠郭汜及兄子利擊之騰遂敗走還涼州又攻槐里卲等皆死庚申詔赦騰等傕等力不能制騰遂因下詔赦之四月以騰為安狄將軍遂為安降將軍二將軍號一時暫置耳後世不復置降戶江翻興平元年曹操使司馬荀彧壽張令程昱守甄城甄城縣屬濟陰郡水經註曰沇州舊治魏武創業始於此河上之邑最為峻固甄當作鄄續漢志兗州刺史治昌邑宋白曰漢獻帝於鄄城置兗州蓋曹操以刺史始治此復扶又翻遂略地至琅邪東海所過殘滅還擊破劉備於郯東謙恐欲走歸丹陽謙丹陽人也操乃引軍還還從宣翻又如字初張邈少時好游俠少詩照翻好呼到翻俠戶頰翻袁紹曹操皆與之善及紹為盟主有驕色盟主事見五十九卷初平元年紹怒使操殺之操不聽曰孟卓親友也是非當容之今天下未定柰何自相危也操之前攻陶謙見上卷上年敕家曰我若不還往依孟卓後還見邈垂泣相對泣垂淚也陳留高柔謂鄉人曰曹將軍雖據兗州本有四方之圖未得安坐守也而張府君恃陳留之資將乘間為變間古莧翻欲與諸君避之何如衆人皆以曹張相親柔又年少不然其言柔從兄幹自河北呼柔柔舉宗從之高斡從袁紹在河北呂布之捨袁紹從張楊也事見上卷上年過工禾翻臨別把手共誓紹聞之大恨邈畏操終為紹殺己也為于偽翻心不自安前九江太守陳留邊讓嘗譏議操操聞而殺之幷其妻子讓素有才名由是兗州士大夫皆恐懼陳宮性剛直壯烈內亦自疑乃與從事中郎許汜王楷及邈弟超共謀叛操宮說邈曰說輸芮翻下同今天下分崩雄傑並起君以千里之衆當四戰之地撫劍顧盼亦足以為人豪而反受制於人不亦鄙乎今州軍東征謂操兵征徐州也呂布壯士善戰無前若權迎之共牧兗州觀天下形勢俟時事之變此亦縱橫之一時也縱子容翻邈從之時操使宮將兵留屯東郡遂以其衆潛迎布為兗州牧布至邈乃使其黨劉翊告荀彧曰呂將軍來助曹使君擊陶謙宜亟供其軍食衆疑惑彧知邈為亂即勒兵設備急召東郡太守夏侯惇於濮陽惇來布遂據濮陽濮博木翻時操悉軍攻陶謙留守兵少少詩沼翻而督將大吏多與邈宮通謀督將領兵大吏通掌州郡事者將即亮翻其夜誅謀叛者數十人衆乃定豫州刺史郭貢率衆數萬來至城下或言與呂布同謀衆甚懼貢求見荀彧彧將往惇等曰君一州鎮也謂一州倚之為重也不可彧曰貢與邈等分非素結也分扶問翻今來速計必未定及其未定說之縱不為用可使中立賢曰不令其有所去就也說輸芮翻下同彼將怒而成計貢見彧無懼意謂鄄城未易攻易以豉翻遂引兵去是時兗州郡縣皆應布唯鄄城范東阿不動賢曰范縣屬東郡今濮陽縣東阿縣屬東郡今濟州縣也陳宮欲自將兵取東阿又使氾嶷取范降戶江翻氾符咸翻皇甫謐云本姓凡氏遭秦亂避地於氾水因氏焉嶷鄂力翻吏民皆恐程昱本東阿人彧謂昱曰今舉州皆叛唯有此三城宮等以重兵臨之非有以深結其心三城必動君民之望也宜往撫之昱乃歸過范說其令靳允曰過工禾翻說輸芮翻靳居焮翻姓也戰國楚有幸臣靳尚聞呂布執君母弟妻子孝子誠不可為心今天下大亂英雄並起必有命世能息天下之亂者此智者所宜詳擇也得主者昌失主者亡陳宮叛迎呂布而百城皆應似能有為然以君觀之布何如人哉夫布麤中少親剛而無禮匹夫之雄耳宮等以勢假合不能相君也相如字言不能相與定君臣之分也終必無成曹使君智略不世出殆天所授君必固范我守東阿則田單之功可立也田單事見五卷周赧王三十六年唯君詳慮之允流涕曰不敢有貳心時氾嶷已在縣允乃見嶷伏兵刺殺之刺七亦翻歸勒兵自守徐衆評曰允於曹公未成君臣母至親也於義應去衞公子開方仕齊積年不返管仲以為不懷其親安能愛君齊桓公問管仲曰開方何如對曰棄親以適君非人情難親允宜先救至親徐庶母為曹公所得劉備遣庶歸北欲為天下者恕人子之情也事見後六十五卷建安十三年興平元年昱又遣別騎絕倉亭津水經註河水過東阿縣北河水於范縣東北流為倉亭津述征記曰倉亭津在范縣界去東阿六十里不得渡昱至東阿東阿令潁川棗祗已率厲吏民拒城堅守潁川文士傳棗氏本姓棘避難改焉卒子恤翻操還執昱手曰微子之力吾無所歸矣表昱為東平相屯范呂布攻鄄城不能下西屯濮陽曹操曰布一旦得一州不能據東平斷亢父泰山之道乘險要我東平國當亢父泰山之道亢父本屬東平章帝元和元年分屬任城賢曰亢父故城在今兗州任城縣斷丁管翻亢父音抗甫要一遙翻吾知其無能為也乃進攻之興平元年五月以揚武將軍郭汜為後將軍安集將軍樊稠為右將軍安集將軍亦一時暫置合為六府時太傅馬日磾出使李傕以車騎將軍開府汜稠又開府與三公合為六府李傕等各欲用其所舉若一違之便忿憤喜怒主者患之乃以次第用其所舉主者蓋尚書也汜次之稠次之三公所舉終不見用興平元年河西四郡以去涼州治遠隔以河寇涼州刺史本治漢陽郡冀縣時寇賊繁興遂與河西隔絕河寇蓋㣥盜阻河為寇者六月丙子詔以陳留邯鄲商為雍州刺史典治之風俗通邯鄲以國為姓余謂邯鄲非國也蓋以邑為姓左傳晉有邯鄲午時置雍州治武威治直之翻興平元年丁丑京師地震戊寅又震興平元年乙酉晦日有食之興平元年秋七月壬子太尉朱儁免興平元年戊午以太常楊彪為太尉錄尚書事興平元年甲子以鎮南將軍楊定為安西將軍開府如三公興平元年自四月不雨至于是月穀一斛直錢五十萬長安中人相食帝令侍御史侯汶出太倉米豆為貧人作糜汶音聞糜粥也為于偽翻餓死者如故帝疑稟賦不實稟給也賦與也得二盆乃杖汶五十於是悉得全濟觀此則獻帝非昏蔽而無知也然終以失天下者威權去己而小惠不足以得民也興平元年八月馮翊羌寇屬縣郭汜樊稠等率衆破之興平元年呂布有別屯在濮陽西曹操夜襲破之未及還會布至身自搏戰自旦至日昳昳徒結翻日昃也數十合相持甚急操募人陷陳陳讀曰陣司馬陳留典韋將應募者進當之典姓韋名矢至如雨韋不視謂等人曰等人者立等以募人及等者謂之等人或曰等人一等應募之人也虜來十步乃白之等人曰十步矣又曰五步乃白等人懼疾言虜至矣韋持戟大呼而起呼火故翻所抵無不應手倒者布衆退會日暮操乃得引去拜韋都尉令常將親兵數百人繞大帳左右濮陽大姓田氏為反間間古莧翻操得入城燒其東門示無反意及戰軍敗布騎得操而不識問曰曹操何在操曰乘黃馬走者是也布騎乃釋操而追黃馬者操突火而出至營自力勞軍令軍中促為攻具進復攻之既自力勞軍又促軍進攻者恐既敗之後士氣衰沮也勞力到翻復扶又翻蝗蟲起百姓大餓布糧食亦盡各引去九月操還鄄城布到乘氏乘氏縣屬濟陰郡應劭曰春秋魯敗宋師於乘丘即其地宋白曰今濟州鉅野縣西南五十七里乘氏故城是也乘繩證翻東屯山陽冬十月操至東阿袁紹使人說操欲使操遣家居鄴說輸芮翻操新失兗州軍食盡將許之程昱曰意者將軍殆臨事而懼不然何慮之不深也夫袁紹有幷天下之心而智不能濟也將軍自度能為之下乎度徒洛翻將軍以龍虎之威可為之韓彭邪今兗州雖殘尚有三城能戰之士不下萬人以將軍之神武與文若昱等收而用之荀彧字文若願將軍更慮之操乃止興平元年十二月司徒淳于嘉罷以衞尉趙溫為司徒錄尚書事興平元年馬騰之攻李傕也劉焉二子範誕皆死議郎河南龐羲素與焉善乃募將焉諸孫入蜀龐皮江翻將如字領也攜也挾也會天火燒城焉徙治成都劉焉初居帛丿糸竹說文曰疽久癰共上璋為益州刺史韙羽鬼翻上時掌翻詔拜潁川扈瑁為刺史瑁音冒璋將沈彌婁發甘寧反擊璋不勝走入荊州詔乃以璋為益州牧璋以韙為征東中郎將率衆擊劉表屯朐䏰朐䏰縣屬巴郡師古曰朐音劬晉書音義朐音蠢䏰如允翻賢曰朐䏰故城在今夔州雲安縣西萬戶故城是也䏰音閏劉昫曰開州盛山縣漢朐䏰地余據今雲安軍漢朐䏰縣地土地下濕多朐䏰蟲故名劉禹錫曰朐䏰蚯蚓也裴松之曰䏰如振翻興平元年徐州牧陶謙疾篤謂別駕東海麋竺曰姓譜楚大夫受封於南郡麋亭因以為氏或言工尹麋之後以名為氏非劉備不能安此州也謙卒竺率州人迎備備未敢當曰袁公路近在壽春袁術字公路典農校尉下邳陳登曰據裴松之註三國志云陶謙表登為典農校尉魏志曰曹公置典農校尉秩比二千石蓋先已有此官曹公增其秩耳公路驕豪非治亂之主治直之翻今欲為使君合步騎十萬為于偽翻上可以匡主濟民下可以割地守境觀登此言固未易才也登亦未敢聽使君也北海相孔融謂備曰袁公路豈憂國忘家者邪冢中枯骨何足介意據陳壽志備謂竺等曰袁公路近在壽春此君四世五公君可以州歸之融言冢中枯骨何足介意正為四世五公發也百姓與能天與不取悔不可追易曰人謀鬼謀百姓與能言百姓惟能者是與也前書曰天與不取反受其咎興平元年初太傅馬日磾與趙岐俱奉使至壽春磾丁奚翻岐守志不橈橈奴教翻袁術憚之日磾頗有求於術術侵侮之從日磾借節視之因奪不還條軍中十餘人使促辟之日磾從術求去術留不遣又欲逼為軍師日磾病其失節嘔血而死杜預曰病者以為己病也興平元年初孫堅娶錢唐吳氏生四男策權翊匡及一女堅從軍於外留家壽春策年十餘歲已交結知名舒人周瑜與策同年亦英達夙成夙早也自舒來造焉便推結分好造七到翻分扶問翻推分而結好也好呼到翻下同勸策徙居舒策從之瑜乃推道旁大宅與策推吐雷翻升堂拜母有無通共及堅死策年十七還葬曲阿曲阿縣屬吳郡賢曰今潤州縣余據曲阿古雲陽縣也秦時言其地有天子氣始皇鑿北阬以敗其勢截直道使阿曲故謂之曲阿杜佑曰曲阿今丹陽郡丹陽縣居江都結納豪俊有復讎之志以父堅為黃祖所殺也丹陽太守會稽周昕與袁術相惡會工外翻術上策舅吳景領丹陽太守上時掌翻攻昕奪其郡以策從兄賁為丹陽都尉從才用翻下賢從同策以母弟託廣陵張紘徑到壽春見袁術涕泣言曰亡父昔從長沙入討董卓與明使君會於南陽同盟結好不幸遇難勳業不終事見五十九卷初平元年二年難乃旦翻欲自憑結願明使君垂察其誠術甚奇之然未肯還其父兵謂策曰孤用貴舅為丹陽太守賢從伯陽為都尉舅謂吳景孫賁字伯陽丹陽號為天下精兵處策遂與汝南呂範及族人孫河迎其母詣曲阿依舅氏因緣召募得數百人而為涇縣大帥祖郎所襲涇縣屬丹陽郡賢曰今宣州縣姓譜祖商祖己之後帥所類翻於是復往見術幾居希翻復扶又翻下同術以堅餘兵千餘人還策表拜懷義校尉策騎士有罪逃入術營隱於內广既策指使人就斬之訖詣術謝謝入術營專殺也兵人好叛當共疾之好呼到翻何為謝也由是軍中益畏憚之術初許以策為九江太守已而更用丹陽陳紀更工衡翻後術欲攻徐州從廬江太守陸康求米三萬斛康不與術大怒遣策攻康謂曰前錯用陳紀錯誤也今若得康廬江真卿有也策攻康拔之術復用其故吏劉勳為太守復扶又翻策益失望侍御史劉繇岱之弟也素有盛名詔書用為揚州刺史州舊治壽春續漢志揚州本治歷陽蓋中世以後徙治壽春也繇欲南渡江吳景孫賁迎置曲阿及策攻廬江繇聞之以景賁本術所置懼為袁孫所幷遂構嫌隙迫逐景賁景賁退屯歷陽歷陽縣屬九江郡今和州張英屯當利口以拒之橫江渡在今和州正對江南之采石即今之楊林渡口當利浦在今和州東十二里惠姓也戰國時梁有惠施與賁共將兵擊英等二年興平二年春正月癸丑赦天下考異曰袁紀作癸酉按長曆是月癸卯朔無癸酉今從范書興平二年曹操敗呂布於定陶敗補邁翻興平二年詔即拜袁紹為右將軍即拜者就拜之也時紹在鄴就鄴拜之考異曰袁紀作後將軍今從范書興平二年董卓初死三輔民尚數十萬戶李傕等放兵劫掠加以饑饉二年間民相食略盡李傕郭汜樊稠各相與矜功爭權欲鬬者數矣數所角翻賈詡每以大體責之雖內不能善外相含容樊稠之擊馬騰韓遂也李利戰不甚力稠叱之曰人欲截汝父頭利傕兄子也故云然我不能斬卿邪及騰遂敗走稠追至陳倉遂語稠曰語牛倨翻本所爭者非私怨王家事耳與足下州里人韓遂金城人與樊稠皆涼州人也乃俱卻騎前接馬交臂相加共語良久而別軍還李利告傕韓樊交馬語不知所道意愛甚密傕亦以稠勇而得衆忌之稠欲將兵東出關從傕索益兵索山客翻二月傕請稠會議便於坐殺稠坐徂臥翻由是諸將轉相疑貳傕數設酒請郭汜數所角翻或留汜止宿汜妻恐汜愛傕婢妾思有以間之間工莧翻會傕送饋餉食曰饋擿以示汜曰豉是義翻擿他歷翻挑也一栖不兩雄我固疑將軍信李公也以雞為喻也一栖而兩雄必鬬傕復請汜飲大醉復扶又翻下同汜疑其有毒絞糞汁飲之糞汁解衆毒治直之翻帝使侍中尚書和傕汜傕汜不從汜謀迎帝幸其營夜有亡者告傕三月丙寅傕使兄子暹將數千兵圍宮以車三乘迎帝暹息廉翻將即亮翻乘繩證翻下同太尉楊彪曰自古帝王無在人家者諸君舉事柰何如是暹曰將軍計定矣於是㣥臣步從乘輿以出兵即入殿中掠宮人御物帝至傕營傕又徙御府金帛置其營遂放火燒宮殿官府民居悉盡帝復使公卿和傕汜汜留楊彪及司空張喜尚書王隆光祿勳劉淵衞尉士孫瑞太僕韓融廷尉宣璠璠孚袁翻大鴻臚榮郃榮姓也前書有男子榮畜姓譜周榮公之後郃曷閤翻又古合翻質音致下同朱儁憤懣發病死懣音悶又音滿興平二年夏四月甲子立貴人琅邪伏氏為皇后以后父侍中完為執金吾興平二年郭汜饗公卿議攻李傕楊彪曰㣥臣共鬬一人劫天子一人質公卿可行乎質音致欲手刃之彪曰卿尚不奉國家吾豈求生邪中郎將楊密固諫汜乃止傕召羌胡數千人先以御物繒綵與之繒慈陵翻許以宮人婦女欲令攻郭汜汜陰與傕黨中郎將張苞等謀攻傕丙申汜將兵夜攻傕門矢及帝簾帷中又貫傕左耳苞等燒屋火不然楊奉於外拒汜汜兵退苞等因將所領兵歸汜是日傕復移乘輿幸北塢據傕汜和後然後帝得出長安宣平門則此塢蓋在長安城中傕汜於城中各築塢而居也復扶又翻監工銜翻內外隔絕侍臣皆有飢色帝求米五斗牛骨五具以賜左右傕曰朝晡上卞上時掌翻卞與飯同何用米為乃以臭牛骨與之帝大怒欲詰責之侍中楊琦諫曰傕自知所犯悖逆欲轉車駕幸池陽黃白城池陽縣屬馮翊賢曰故城在今涇陽縣西北水經註曰黃白城本曲梁宮也詰去吉翻悖蒲妹翻又蒲沒翻帝乃止司徒趙溫與傕書曰公前屠陷王城殺戮大臣今爭睚眥之隙睚牛懈翻怒視也眥疾智翻目際也毛晃曰厓眥舉目相忤貌亦作眦士懈翻以成千鈞之讎千鈞言重也詔命不行而復欲轉乘輿於黃白城此誠老夫所不解也乘繩證翻解胡買翻曉也於易一為過再為涉三而弗改滅其頂凶易大過上六曰過涉滅頂凶溫依此而分一再三之義傕大怒欲殺溫其弟應諫之數日乃止據獻帝起居注應溫故掾也傕信巫覡厭勝之術覡奴歷翻國語在女曰巫在男曰覡厭益涉翻常以三牲祠董卓於省門外每對帝或言明陛下或言明帝為帝說郭汜無狀為于偽翻帝亦隨其意應答之傕喜自謂良得天子歡心也良信也閏月己卯帝使謁者僕射皇甫酈和傕汜考異曰袁紀酈作麗今從范書汜從命又詣傕傕不肯曰郭多盜馬虜耳英雄記曰郭汜一名多必誅之君觀吾方略士衆足辦郭多否邪郭多又劫質公卿質音致下同所為如是而君苟欲左右之邪左右助也音佐佑酈曰近者董公之強將軍所知也呂布受恩而反圖之斯須之間身首異處此有勇而無謀也今將軍身為上將荷國寵榮荷下可翻汜質公卿而將軍脅主誰輕重乎張濟與汜有謀楊奉白波賊帥耳帥所類翻猶知將軍所為非是將軍雖寵之猶不為用也傕呵之令出酈出詣省門白傕不肯奉詔辭語不順天子所居曰禁中亦曰省中省門即禁門也亟令酈去傕遣虎賁王昌呼欲殺之昌知酈忠直縱令去還答傕言追之不及辛巳以車騎將軍李傕為大司馬在三公之右興平二年呂布將薛蘭李封屯鉅野鉅野縣屬山陽郡郭周於此置濟州布救蘭等不勝而走操遂斬蘭等操軍乘氏乘繩證翻以陶謙已死欲遂取徐州還乃定布荀彧曰昔高祖保關中光武據河內高祖取天下令蕭何守關中光武經營河北令寇恂守河內皆以為王業根本進足以勝敵退足以堅守故雖有困敗而終濟大業將軍本以兗州首事平山東之難賢曰曹操初從東郡守鮑信等迎領兗州牧遂進兵破黃巾等故能平定山東也余據此時山東猶未盡平彧誇之耳難乃旦翻且河濟天下之要地也禹貢兗州之域孔安國曰東南據濟西北距河濟子禮翻猶易以自保易以豉翻是亦將軍之關中河內也不可以不先定今已破李封薛蘭若分兵東擊陳宮宮必不敢西顧以其間章甲十一行本間下有勒兵二字乙十一行本同孔本同張校同收熟麥約食畜穀一舉而布可破也破布然後南結揚州謂結劉繇也以臨淮泗若舍布而東舍讀作捨多留兵則不足用少留兵則民皆保城不得樵采布乘虛寇暴民心益危唯甄城范衞可全衞謂濮陽杜預曰濮陽古衞地甄當作鄄是無兗州也若徐州不定將軍當安所歸乎且陶謙雖死徐州未易亡也易以豉翻彼懲往年之敗將懼而結親結親猶言親結也今東方皆已收麥必堅壁清野以待將軍攻之不拔略之無獲不出十日則十萬之衆未戰而先自困耳前討徐州威罰實行謂多所屠戮也必人自為守無降心就能破之尚不可有也徐州子弟既有父兄之讎必不心服於操縱破其兵猶不能有其地也降戶江翻章甲十一行本故作固乙十一行本同孔本同有棄此取彼者以大易小可也以安易危可也權一時之勢不患本之不固可也今三者莫利惟將軍熟慮之操乃止布復從東緡東緡縣屬山陽郡春秋之緡邑也宋白曰今濟州金鄉縣本漢東緡縣復扶又翻下同緡眉巾翻操兵皆出收麥在者不能千人屯營不固屯西有大隄其南樹木幽深操隱兵隄裏出半兵隄外布益進乃令輕兵挑戰挑徒了翻既合伏兵乃悉乘隄前書音義曰乘登也步騎並追章甲十一行本追作進乙十一行本同孔本同熊校同大破之追至其營而還布夜走操復攻拔定陶分兵平諸縣布東奔劉備張邈從布使其弟超將家屬保雍丘雍丘縣屬陳留郡故國也布初見備甚尊敬之謂備曰我與卿同邊地人也布五原人備涿郡人五原涿郡皆邊地欲誅董卓布殺卓東出關東諸將無安布者皆欲殺布耳請備於帳中坐婦牀上令婦向拜酌酒飲食名備為弟備見布語言無常外然之而內不悅興平二年李傕郭汜相攻連月死者以萬數六月傕將楊奉謀殺傕事泄遂將兵叛傕傕衆稍衰果如皇甫酈之言庚午鎮東將軍張濟自陝至陝縣屬弘農張濟初平三年出戍焉陝式冉翻遷乘輿權幸弘農乘繩證翻下同帝亦思舊京謂雒陽也十反汜傕許和欲質其愛子質音致下同傕妻愛其男和計未定而羌胡數來闚省門數所角翻曰天子在此中邪李將軍許我宮人今皆何在帝患之使侍中劉艾謂宣義將軍賈詡曰宣義將軍亦一時暫置卿前奉職公忠故仍升榮寵今羌胡滿路宜思方略詡乃召羌胡大帥飲食之帥所類翻飲於禁翻食讀曰飤許以封賞羌胡皆引去傕由此單弱於是復有言和解之計者復扶又翻傕乃從之各以女為質秋七月甲子車駕出宣平門宣平門長安城東出北頭第一門汜兵數百人遮橋曰此天子非也車不得前傕兵數百人皆持大戟在乘輿車前兵欲交侍中劉艾大呼曰是天子也使侍中楊琦高舉車帷帝曰諸君章甲十一行本君作兵乙十一行本同何敢迫近至尊邪呼火故翻近其靳翻汜兵乃卻既渡橋士衆皆稱萬歲夜到霸陵從者皆飢從才用翻張濟賦給各有差傕出屯池陽丙寅以張濟為票騎將軍開府如三公票匹妙翻郭汜為車騎將軍楊定為後將軍楊奉為興義將軍皆封列侯以楊奉自白波賊帥勤王故以興義寵之蜀志曰承獻帝舅也裴松之曰承靈帝母董太后之姪於獻帝為丈人蓋古無丈人之名故謂之舅也郭汜欲令車駕幸高陵高陵縣屬馮翊大會議之不決帝遣使諭汜曰弘農近郊廟近其靳翻勿有疑也汜不從帝遂終日不食汜聞之曰可且幸近縣八月甲辰車駕幸新豐丙子郭汜復謀脅帝還都郿復扶又翻下同侍中种輯知之密告楊定董承楊奉令會新豐郭汜自知謀泄乃棄軍入南山自新豐驪山西接終南謂之南山興平二年曹操圍雍丘張邈詣袁術求救未至為其下所殺興平二年冬十月以曹操為兗州牧興平二年戊戌郭汜黨夏育高碩等謀脅乘輿西行夏戶雅翻侍中劉艾見火起不止請帝出幸一營以避火時郭汜楊定董承楊奉各自為營艾不敢指言故請幸一將營惟帝意所向也夏育等勒兵欲止乘輿楊定楊奉力戰破之乃得出壬寅行幸華陰華戶化翻寧輯將軍段煨具服御及公卿已下資儲欲上幸其營寧輯之號猶安集亦一時暫置也煨烏回翻定黨种輯左靈言煨欲反太尉楊彪司徒趙溫侍中劉艾尚書梁紹皆曰段煨不反臣等敢以死保董承楊定脅弘農督郵令言郭汜來在煨營帝疑之乃露次於道南野宿無廬舍謂之露次丁未楊奉董承楊定將攻煨使种輯左靈請帝為詔帝曰煨罪未著奉等攻之而欲令朕有詔邪輯固請至夜半猶弗聽奉等乃輒攻煨營十餘日不下煨供給御膳稟贍百官無有二意贍而豔翻詔使侍中尚書告諭定等令與煨和解定等奉詔還營李傕郭汜悔令車駕東聞定攻煨相招共救之因欲劫帝而西楊定聞傕汜至欲還藍田為汜所遮單騎亡走荊州張濟與楊奉董承不相平乃復與傕汜合十二月帝幸弘農張濟李傕郭汜共追乘輿大戰於弘農東澗承奉軍敗百官士卒死者不可勝數棄御物符策典籍略無所遺凡乘輿服御之物皆為御物符銅虎符竹使符之類符之為言扶也兩相扶合而不差也又曰符輔也所以輔信又合也驗也策編簡為之古者誥命皆書之策漢制天子策書長二尺典籍內府圖籍及尚書中故事之類勝音升沮子余翻創初良翻傕謂左右曰尚可活否儁罵之曰汝等凶逆逼劫天子使公卿被害被皮義翻宮人流離亂臣賊子未有如此也傕乃殺之壬申帝露次曹陽賢曰曹陽澗名在今陝州西南七里俗謂之七里澗崔皓云自南山北通於河魏武帝改曰好陽杜佑曰陝郡西四十五里有曹陽澗以下文觀之杜佑說是而密遣間使至河東譎古穴翻間古莧翻使疏吏翻招故白波帥李樂韓暹胡才帥所類翻暹息廉翻及南匈奴右賢王去卑並率其衆數千騎來與承奉共擊傕等大破之斬首數千級於是董承等以新破傕等可復東引庚申車駕發東自曹陽發而東行也胡才楊奉韓暹匈奴右賢王於後為拒傕等復來戰奉等大敗死者甚於東澗光祿章甲十一行本祿下有勳字乙十一行本同孔本同退齋校同鄧淵廷尉宣璠璠孚袁翻少府田芬大司農張義皆死司徒趙溫太常王絳衞尉周忠司隸校尉管郃為傕所遮欲殺之郃古合翻又曷閤翻賈詡曰此皆大臣卿柰何害之乃止李樂曰事急矣陛下宜御馬上曰不可舍百官而去此何辜哉觀帝此言發於臨危之時豈可以亡國之君待之哉特為強臣所制耳舍讀曰捨方得至陝杜佑曰陝春秋虢國之地所謂北虢也時殘破之餘虎賁羽林不滿百人傕汜兵繞營叫呼呼火故翻吏士失色各有分散之意李樂懼欲令車駕御船過砥柱出孟津水經註河水逕大陽縣南又東過底柱間底柱山名也昔禹治洪水山陵當水者鑿之故破山以通河河水分流包山而過山見水中若柱然故曰底柱三穿既決水勢疏分指狀表目亦曰三門山在虢城東北大陽城東自底柱而下至五戶灘其間一百二十里有一十九漢水流濬急破舟船自古所患河水又東過平陰縣北又東過河陽縣南則孟津也非萬乘所宜乘萬乘繩證翻下乘輿同乃使李樂夜渡潛具船舉火為應上與公卿步出營皇后兄伏德扶后一手挾絹十匹董承使符節令孫徽從人間斫之百官志符節令屬少府秩六百石為符節臺率主符節事凡遣使掌授節血濺后衣濺子賤翻河岸高十餘丈高居傲翻不得下乃以絹為輦使人居前負帝餘皆匍匐而下或從上自投冠幘皆壞既至河邊士卒爭赴舟董承李樂以戈擊之手指於舟中可掬左傳晉荀林父帥師戰于邲而敗中軍與下軍爭舟舟中之指可掬也同濟者皇后及楊彪以下纔數十人其宮女及吏民不得渡者皆為兵所掠奪衣服俱盡髮亦被截凍死者不可勝計勝音升衞尉士孫瑞為傕所殺傕見河北有火遣騎候之適見上渡河呼曰汝等將天子去邪董承懼射之以被為幔懼傕兵射之故以被為幔以禦箭幔莫半翻幕也射而亦翻賢曰大陽縣屬河東郡前書音義曰在大河之陽即今陝州河北縣是也河內太守張楊使數千人負米來貢餉乙亥帝御牛車幸安邑安邑縣屬河東郡悉賦公卿以下賦給與也分畀也拜胡才為征東將軍張楊為安國將軍安國將軍之號蓋始於此其壘壁㣥帥競求拜職帥所類翻刻印不給至乃以錐畫之乘輿居棘籬中門戶無關閉天子與㣥臣會兵士伏籬上觀互相鎮壓以為笑鎮側人翻帝又遣太僕韓融至弘農與傕汜等連和傕乃放遣公卿百官頗歸所掠宮人及乘輿器服已而糧穀盡宮人皆食菜果乙卯張楊自野王來朝野王縣屬河內郡隋唐為河內縣諸將不聽楊復還野王是時長安城空四十餘日強者四散羸者相食羸倫為翻二三年間關中無復人跡沮授說袁紹曰將軍累葉台輔世濟忠義今朝廷播越播流也遷也越顛墜也走也賢曰播遷也越逸也言失其所居說輸芮翻下同觀諸州郡雖外託義兵內實相圖未有憂存社稷卹民之意今州域粗定州域謂冀州之域也粗坐五翻西迎大駕即宮鄴都即就也畜士馬以討不庭不庭謂不朝者杜預曰下之事上皆成禮於庭中一曰庭直也不庭謂不直者潁川郭圖淳于瓊曰漢室陵遲為日久矣王肅註家語曰言若丘陵之漸逶遲不亦難乎且英雄並起各據州郡連徒聚衆動有萬計所謂秦失其鹿先得者王今迎天子自近近其靳翻動輒表聞從之則權輕違之則拒命非計之善者也授曰今迎朝廷於義為得於時為宜若不早定必有先之者矣紹不從紹不能從授之言果為曹操所先帝既都許乃欲移以自近不亦晚乎先悉薦翻考異曰魏志紹傳曰天子在河東紹遣郭圖使焉圖還說紹迎天子都鄴紹不從今從范書興平二年初丹陽朱治嘗為孫堅校尉治從堅討長沙零桂賊表行都尉又從破董卓於陽人表行督軍校尉勸孫策歸取江東時吳景攻樊能張英等歲餘不克策說術曰家有舊恩在東願助舅討橫江橫江拔因投本土召募可得三萬兵以佐明使君定天下策本江東人故謂之本土謂許以九江廬江而不用也王朗在會稽會工外翻謂策未必能定乃許之表策為折衝校尉將兵千餘人騎數十匹校戶教翻將即亮翻騎奇寄翻行收兵比至歷陽比必寐翻衆五六千時周瑜從父尚為丹陽太守從才用翻瑜將兵迎之仍助以資糧策大喜曰吾得卿諧也諧偶也合也史言推結分好正當於此觀之又當於此別分好二字英雄相遇於草澤一見之頃靡然為之服役此豈聲音笑貌所能為哉皆拔之樊能張英敗走策渡江轉鬬所向皆破莫敢當其鋒者百姓聞孫郎至皆失魂魄江表傳曰策年少雖有位號而吳人皆謂之孫郎竄伏山草山草言深山茂草之中也李固對策曰臣伏從山草痛心傷臆則山草二字當時常談也長知兩翻軍士奉令不敢虜略雞犬菜茹一無所犯茹亦菜也競以牛酒勞軍策為人美姿顏能笑語闊章甲十一行本闊上有性字乙十一行本同孔本同張校同達聽受善於用人是以士民見者莫不盡心樂為致死勞力到翻樂音洛為于偽翻考異曰魏志袁紀皆云初平四年策受袁術使渡江漢獻帝紀吳志孫策傳皆云興平元年虞溥江表傳云策興平二年渡江按術初平四年始得壽春策傳云術欲攻徐州從陸康求米事必在劉備得徐州後也劉繇傳稱吳景攻繇歲餘不克則策渡江不應在興平元年已前今依江表傳為定策攻劉繇牛渚營郡國志丹陽郡秣陵縣南有牛渚杜佑曰牛渚圻即宣城郡當塗縣采石今太平州當塗縣北三十里有牛渚山是也邸至也言所歸至也閣庋置也邸閣謂轉輸之歸至而庋置之也禮據秣陵城沈約曰秣陵其地本名金陵本治去京邑六十里今故治村是也元豐九域志江寧府江寧縣有秣陵鎮丁度集韻笮側格切姓也風俗通楚有笮倫策皆擊破之又破繇別將於梅陵唐書地理志宣州南陵縣有梅根鎮今有梅根港皆下之郡國志丹陽郡有湖孰江乘二縣元豐九域志江寧府上元縣有湖孰鎮繇同郡太史慈時自東萊來省繇太史以官為氏繇與慈皆東萊人也省悉景翻或勸繇可以慈為大將繇曰我若用子義太史慈字子義以其覈論人品也偵丑正翻候視也時獨與一騎卒遇策於神亭神亭在今鎮江府丹陽縣界卒讀曰猝從才用翻皆堅舊將遼西韓當零陵黃蓋輩也慈便前鬬正與策對策刺慈馬刺七亦翻而擥得慈項上手戟擥與攬同會兩家兵騎並各來赴於是解散若隆技擊則慈策適相當耳然慈終困於策何也繇與策戰兵敗走丹徒考異曰帝紀繇敗走在興平元年今從江表傳勞賜將士勞力到翻發恩布令告諭諸縣其劉繇笮融等故鄉部曲來降首者一無所問首式救翻樂從軍者一身行樂音洛下同復除門戶復方目翻一人以身行除其門戶賦役也不樂者不強強其兩翻旬日之間四面雲集得見兵二萬餘人見賢遍翻馬千餘匹威震江東丙辰袁術表策行殄寇將軍殄寇將軍號蓋始於此今將軍事業日大士衆日盛而綱紀猶有不整者範願暫領都督佐將軍部分之分扶問翻策曰子衡既士大夫呂範字子衡立功於外範先領宛陵令破丹陽賊而還知軍中細事乎範曰不然今捨本土而託將軍者非為妻子也呂範汝南人復扶又翻為于偽翻譬猶同舟涉海一事不牢即俱受其敗此亦範計非但將軍也策笑無以答範出便釋褠著袴褶褠居侯翻單衣也著陟略翻褶席入翻袴褶騎服也執鞭詣閣下啟事自稱領領都督策乃授傳傳株戀翻符傳也委以衆事由是軍中肅睦威禁大行老子曰盜亦有道儻無其道安能為盜哉策以張紘為正議校尉彭城張昭為長史常令一人居守守手又翻一人從征討及廣陵秦松陳端等亦參與謀謨與讀曰預策待昭以師友之禮文武之事一以委昭昭每得北方士大夫書疏專歸美於昭策聞之歡笑曰昔管子相齊一則仲父二則仲父而桓公為霸者宗新序曰有司請吏於齊桓公公曰以告仲父有司又請公曰以告仲父在側者曰一則告仲父二則告仲父易哉為君公曰吾未得仲父則難巳得仲父曷為其不易故王者勞於求賢佚於得人我能用之張昭字子布策任張昭昭何足以當管仲策之斯言蓋因北方人士書疏從而歸重耳英雄胸次可易測邪袁術以從弟胤為丹陽太守從才用翻周尚周瑜皆還壽春劉繇自丹徒將奔會稽會工外翻許劭曰會稽富實策之所貪且窮在海隅不可往也不如豫章北連豫壤西接荊州若收合吏民遣使貢獻與曹兗州相聞雖有袁公路隔在其間其人豺狼不能久也豫章在大江東南豫兗之壤在淮北袁術時據九江廬江之間故云隔在其中孟德景升必相救濟曹操字孟德劉表字景升興平二年初陶謙以笮融為下邳相使督廣陵下邳彭城糧運融遂斷三郡委輸以自入斷讀曰短委於偽翻流所聚曰委毛晃曰凡以物送之曰輸則音平聲指所送之物曰輸則音去聲委輸之委亦音去聲大起浮屠祠課人誦讀佛經招致旁郡好佛者至五千餘戶好呼到翻每浴佛釋氏謂佛以四月八日生事佛者以是日為浴佛會布席於路經數十里費以鉅億計鉅億計言以億億計也徐土不安融乃將男女萬口走廣陵將即亮翻廣陵太守趙昱待以賓禮先是彭城相薛禮為陶謙所逼屯秣陵融利廣陵資貨遂乘酒酣殺昱放兵大掠因過江依禮既而復殺之先悉薦翻復扶又翻劉繇使豫章太守朱皓攻袁術所用太守諸葛玄玄退保西城西城在豫章南昌縣西考異曰袁暐獻帝春秋云劉表上玄領豫章太守范書陶謙傳亦云劉表所用而陳志諸葛亮傳云術所用按許劭勸繇依表必不攻其所用矣今從亮傳駐於彭澤彭澤縣屬豫章郡彭蠡澤在西上時掌翻許劭謂繇曰笮融出軍不顧名義者也朱文明喜推誠以信人朱皓字文明喜許記翻章甲十一行本更作宜乙十一行本同孔本同退齋校同使密防之融到果詐殺皓代領郡事繇進討融融敗走入山為民所殺詔以前太傅掾華歆為豫章太守掾于絹翻丹陽都尉朱治逐吳郡太守許貢而據其郡貢南依山賊嚴白虎嚴白虎有衆萬餘人阻山屯聚在吳郡之南興平二年張超在雍丘曹操圍之急超曰惟臧洪當來救吾張超先為廣陵太守請臧洪為功曹委之以政袁曹方睦洪為袁所表用洪為超使劉虞路梗因寓於袁紹紹表為東郡太守治東武陽敗補邁翻好呼到翻招音翹又如字召也超曰子源天下義士臧洪字子源背蒲妹翻但恐見制強力強力謂強有力也洪時為東郡太守徒跣號泣從紹請兵將赴其難號戶刀翻難乃旦翻紹不與請自率所領以行亦不許雍丘遂潰張超自殺操夷其三族洪由是怨紹絕不與通紹興兵圍之歷年不下紹令洪邑人陳琳以書喻之洪復書曰僕小人也本乏志用中因行役蒙主人傾蓋家語孔子之郯遇程子於塗傾蓋而語遂竊大州寧樂今日自還接刃乎分扶問翻樂音洛當受任之初自謂究竟大事共尊王室豈悟本州被侵郡將遘戶乙郡將謂張超也將即亮翻辭行被拘使洪故君遂至淪滅區區微節無所獲申豈得復全交友之道重虧忠孝之名乎復扶又翻重直用翻斯所以忍悲揮戈收淚告絕行矣孔璋足下徼利於境外陳琳字孔璋徼一遙翻吾子託身於盟主盟主謂袁紹也帝在長安僕亦笑子生而無聞焉紹見洪書知無降意降戶江翻增兵急攻城中糧穀已盡外無強救洪自度必不免度徒洛翻呼將吏士民謂曰袁氏無道所圖不軌且不救洪郡將洪於大義不得不死念諸君無事空與此禍與讀曰預可先城未敗將妻子出先悉薦翻將如字領也皆垂泣曰明府與袁氏本無怨隙今為本朝郡將之故自致殘困吏民何忍當舍明府去也初尚掘鼠煑筋角後無可復食者舍讀曰捨復扶又翻下同主簿啟內廚米三升請稍以為饘粥杜預曰饘糜也之連翻洪歎曰何能獨甘此邪使作薄糜徧班士衆又殺其愛妾以食將士食讀曰飤將士咸流涕無能仰視者男女七八千人相枕而死枕職任翻莫有離叛者城陷生執洪紹大會諸將見洪謂曰臧洪何相負若此今日服未洪據地瞋目曰諸袁事漢四世五公自袁安至袁隗四世安為司徒子敞為司空孫湯為司空曾孫逢為司空隗為太傅凡五公瞋昌真翻今王室衰弱無扶翼之意欲因際會希冀非望多殺忠良以立姦威洪親見呼張陳留為兄張陳留為超兄邈也同共戮力為國除害為于偽翻下刃為欲為舉為同柰何擁衆觀人屠滅洪惜力劣劣弱也公羊傳曰事君猶事父也父受誅子復讎推刃之道推吐雷翻紹本愛洪意欲令屈服原之見洪辭切知終不為己用乃殺之洪邑人陳容少親慕洪時在紹坐少詩照翻坐徂臥翻下同起謂紹曰將軍舉大事欲為天下除暴而先誅忠義豈合天意臧洪發舉為郡將柰何殺之紹慙使人牽出謂曰汝非臧洪儔空復爾為爾為猶如此也仁義豈有常蹈之則君子背之則小人背蒲妹翻今日寧與臧洪同日而死不與將軍同日而生也遂復見殺復扶又翻在坐無不歎息竊相謂曰如何一日殺二烈士興平二年公孫瓚既殺劉虞事見上卷初平四年志氣益盛恃其才力不恤百姓記過忘善睚眦必報睚牛懈翻眦士懈翻衣冠善士名在其右者必以法害之有材秀者必抑困使在窮苦之地或問其故瓚曰衣冠皆自以職分當貴不謝人惠分扶問翻故所寵愛類多商販庸兒與為兄弟或結婚姻所在侵暴百姓怨之劉虞從事漁陽鮮于輔等姓譜鮮于子姓周武王封箕子於朝鮮支子仲食采於于因以鮮于為氏以燕國閻柔素有恩信推為烏桓司馬應劭漢官曰護烏桓校尉有司馬二人秩六百石燕於賢翻與瓚所置漁陽太守鄒丹戰于潞北誘音酉潞縣屬漁陽郡斬丹等四千餘級烏桓峭王亦率種人峭七肖翻種章勇翻及鮮卑七千餘騎隨輔南迎虞子和與袁紹將麴義合兵十萬共攻瓚破瓚於鮑丘鮑丘水名水經註鮑丘水從塞外來南過漁陽縣東和等破瓚處也又南過潞縣西賢曰鮑丘水又謂之潞水俗又謂之大榆河在今幽州漁陽縣於是代郡廣陽上谷右北平各殺瓚所置長吏復與鮮于輔劉和兵合瓚軍屢敗先是有童謠曰長知兩翻復扶又翻先悉薦翻燕南垂趙北際中央不合大如礪唯有此中可避世瓚自謂易地當之遂徙鎮易為圍塹十重於塹裏築京皆高五六丈為樓其上中塹為京特高十丈水經註易京在易城西四五里易水逕其南賢曰前書易縣屬涿郡續漢志曰屬河間瓚所居易京故城在今幽州歸義縣南十八里爾雅曰絕高謂之京非人力謂之丘重直龍翻下同高居傲翻塹七豔翻以鐵為門斥去左右去羌呂翻男人七歲以上不得入門專與姬妾居其文簿書記皆汲而上之以繩索引之而上若汲水然上時掌翻使聞數百步聞音問以傳宣教令疏遠賓客無所親信遠于願翻謀臣猛將稍稍乖散自此之後希復攻戰復扶又翻或問其故瓚曰我昔驅畔胡於塞表事見五十九卷靈帝中平五年事見上卷初平二年謂天下指麾可定至於今日兵革方始觀此非我所決不如休兵力耕以救凶年兵法百樓不攻今吾諸營樓樐數十重賢曰樐即櫓字見說文釋名曰櫓露也上無覆屋食盡此穀足以待天下之事矣興平二年南單于於扶羅死弟呼廚泉立居于平陽平陽縣屬河東郡王崇武標點容肇祖聶崇岐覆校
