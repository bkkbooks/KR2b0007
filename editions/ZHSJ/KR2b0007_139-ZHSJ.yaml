body:
  text: 資治通鑑卷第一百三十九端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註齊紀五夏高宗明皇帝上諱鸞字景栖小字玄度高帝兄始安貞王道生之子建武元年甲戌四九四是年十月始改元建武夏春正月丁未改元隆昌此鬱林王改元也夏雍州刺史晉安王子懋雍於用翻以主幼時艱密為自全之計令作部造仗諸州各有作部主造器仗去年秋武帝以魏將入寇遣顯達鎮樊城將即亮翻下同顯達密啟西昌侯鸞鸞徵顯達為車騎大將軍騎奇寄翻徙子懋為江州刺史仍令留部曲助鎮襄陽單將白直俠轂自隨諸王有白直有夾轂隊俠讀曰夾過音戈子懋謂曰朝廷令身單身而返身是天王豈可過爾輕率子懋自稱天王蓋謂是天家諸王也公意何如顯達曰殿下若不留部曲乃是大違敕旨其事不輕且此間人亦難可收用此間人謂襄陽人也顯達因辭出即發去子懋計未立乃之尋陽夏西昌侯鸞將謀廢立引前鎮西諮議參軍蕭衍與同謀隨王子隆初以鎮西將軍鎮荊州引衍為諮議參軍性溫和有文才鸞欲徵之恐其不從衍曰隨王雖有美名其實庸劣既無智謀之士爪牙唯仗司馬垣歷生武陵太守卞白龍耳二人唯利是從若啗以顯職無有不來隨王止須折簡耳鸞從之徵歷生為太子左衞率白龍為游擊將軍啗徒濫翻折之舌翻帥所律翻二人並至續召子隆為侍中撫軍將軍此時西昌侯已有殺諸王之心矣蕭衍由是以籌略見用高武舊將將即亮翻鸞疑之以蕭衍為寧朔將軍戍壽陽慧景懼白服出迎白服若得罪而白衣領職者夏辛亥鬱林王祀南郊戊午拜崇安陵鬱林王即位追尊父文惠太子曰文帝陵曰崇安廟號世宗據竟陵王子良傳陵在夾右夏癸亥魏主南巡戊辰過比干墓水經註河內朝歌縣南有牧野有比干冢前有石銘題隸云殷大夫比干之墓不知誰所誌也魏主自為祝文曰烏呼介士胡不我臣夏帝寵幸中書舍人綦毋珍之朱隆之直閤將軍曹道剛周奉叔宦者徐龍駒等帝謂鬱林王事無不允允信也肯也皆先論價旬月之間家累千金亶取官物及役作不俟詔旨有司至相語云語牛倨翻寧拒至尊敕不可違舍人命帝以龍駒為後閤舍人後閤禁中後閤也南史曰龍駒日夜在六宮房內著黃綸帽被貂裘著陟略翻被皮義翻南面向案代帝畫敕左右侍直與帝不異帝自山陵之後即與左右微服遊走市里好於世宗崇安陵隧中擲塗賭跳好呼到翻文惠太子廟號世宗塗泥也以塗泥相擲為樂也跳躍也賭跳者以跳躍高出者為勝跳他弔翻作諸鄙戲極意賞賜左右動至百數十萬每見錢曰我昔思汝十章十二行本十作一乙十一行本同孔本同熊校同枚不得今日得用汝未世祖聚錢上庫五億萬齋庫亦出三億萬上庫所儲以備軍國之用齋庫以供齋內所須人主之好用出者出三億萬數之外也勝音升鬱林王即位未朞歲所用垂盡入主衣庫令何后及寵姬以諸寶器相投擊破碎之用為笑樂樂音洛蒸於世祖幸姬霍氏更其姓曰徐更工衡翻李延壽史以霍為文帝幸姬則世祖當作世宗朝事大小皆決於西昌侯鸞朝直遙翻下同鸞數諫爭數所角翻爭讀曰諍帝多不從心忌鸞欲除之以尚書右僕射鄱陽王鏘為世祖所厚世祖恐亦當作世宗公聞鸞於法身如何鬱林王小字法身對曰臣鸞於宗戚最長且受寄先帝臣等皆年少長知兩翻少詩照翻朝廷所賴唯鸞一人願陛下無以為慮帝退謂徐龍駒曰我欲與公共計取鸞公既不同我不能獨辦且復小聽復扶又翻下無復同言且又小時聽鸞專政也衞尉蕭諶世祖之族子也蕭子顯齊書曰諶於太祖為絕服族子諶氏壬翻諶已為腹心宋元徽末世祖在郢州欲知都下消息太祖遣諶就世祖宣傳謀計留為腹心常典宿衞機密之事無不預聞征南諮議蕭坦之諶之族人也嘗為東宮直閤為世宗所知蕭子顯齊書曰坦之以懃直為世祖所知既為東宮直閤則從世宗為是東宮亦有直閤將軍甚親信之諶每請急出宿帝通夕不寐諶還乃安坦之得出入後宮帝褻狎宴遊坦之皆在側帝醉後常裸袒裸郎果翻坦之輒扶持諫諭西昌侯鸞欲有所諫帝在後宮不出唯遣諶坦之徑進乃得聞達何后亦淫泆泆音逸泆淫放也私於帝左右楊珉與同寢處如伉儷處昌呂翻下處之同杜預曰伉敵也儷耦也伉苦浪翻儷力計翻又與帝相愛狎故帝恣之迎后親戚入宮以耀靈殿處之齋閤通夜洞開外內淆雜無復分別別彼列翻西昌侯鸞遣坦之入奏誅珉何后流涕覆面覆敷又翻曰楊郎好年少無罪何可枉殺少詩照翻坦之附耳語帝曰語牛倨翻下每語同外間並云楊珉與皇后有情事彰遐邇不可不誅帝不得已許之俄敕原之已行刑矣鸞又啟誅徐龍駒帝亦不能違而心忌鸞益甚蕭諶蕭坦之見帝狂縱日甚無復悛改悛丑緣翻恐禍及己乃更回意附鸞勸其廢立陰為鸞耳目帝不之覺也周奉叔恃勇挾勢陵轢公卿轢郎狄翻常翼單刀二十口自隨翼者分列左右若兩翼然也門衞不敢訶訶虎何翻每語人曰周郎刀不識君鸞忌之使蕭諶蕭坦之說帝出奉叔為外援說輸芮翻下鸞說此說同己巳以奉叔為青州刺史蕭子顯曰宋泰始中淮北沒虜徙青州治鬱洲齊建元四年徙治胊山後復舊奉叔就帝求千戶侯許之鸞以為不可封曲江縣男食三百戶奉叔大怒於衆中攘刀厲色鸞說諭之乃受說輸芮翻下同奉叔辭畢將之鎮部伍已出鸞與蕭諶稱敕召奉叔於省中毆殺之省中尚書省中也毆烏口翻奉叔慢朝廷帝不獲已可其奏溧陽令錢唐杜文謙嘗為南郡王侍讀溧陽縣自漢以來屬丹陽郡其地在建康東南帝初封南郡王溧音栗天下事可知灰盡粉滅匪朝伊夕不早為計吾徒無類矣珍之曰計將安出文謙曰先帝舊人多見擯斥今召而使之誰不慷慨近聞王洪範王洪範即轉言日月相者也皆攘袂搥牀將即亮翻搥傳追翻君其密報周奉叔使萬靈會等殺蕭諶則宮內之兵皆我用也蕭諶時以衞軍司馬兼衞尉卿掌宿衞兵斬蕭令尚書省在雲龍門內都伯行刑者也今謂之劊子不舉事亦死二死等耳死社稷可乎若遲疑不斷復少日錄君稱敕賜死復扶又翻少詩沼翻少日言無多日也鸞錄尚書事故稱為錄君父母為殉謂皆將從坐而死也珍之不能用及鸞殺奉叔幷收珍之文謙殺之夏乙亥魏主如洛陽西宮中書侍郎韓顯宗上書陳四事其一以為竊聞輿駕今夏不巡三齊當幸中山往冬輿駕停鄴當農隙之時猶比屋供奉不勝勞費比毗必翻又毗至翻勝音升況今蠶麥方急將何以堪命且六軍涉暑恐生癘疫臣願早還北京以省諸州供張之苦北京謂平城張竹亮翻其二以為洛陽宮殿故基皆魏明帝所造前世已譏其奢今茲營繕宜加裁損又頃來北都富室競以第舍相尚北都亦謂平城魏既遷洛以平城為北都為之制度及端廣衢路通利溝渠其三以為陛下之還洛陽輕將從騎從才用翻王者於闈闥之內宮中門曰闈韓詩門屏間曰闥況涉履山河而不加三思乎三息暫翻其四以為陛下耳聽法音法音謂雅樂也目翫墳典謂三墳五典書序伏羲神農黃帝之書謂之三墳言大道也少昊顓頊高辛唐虞之書謂之五典言常道也孔子序書斷自唐虞三墳五典後世不復見其全此特大概言之心虞萬機景昃而食虞度也景昃日昃也日景過中則昃昃音側加以孝思之至隨時而深謂文明太后之殂已久而帝孝思不忘也日成篇卷雖叡明所用未足為煩然非所以嗇神養性嗇愛也伏願陛下垂拱司契而天下治矣老子曰有德司契司主也契要也治直吏翻顯宗麒麟之子也韓麒麟見一百三十五卷武帝永明元年顯宗又上言以為州郡貢察徒有秀孝之名而無秀孝之實貢察者謂察舉秀才孝廉而貢之於朝不復彈坐復扶又翻彈坐者彈劾其違而坐之以罪如此則可令別貢門望以敍士人何假冒秀孝之名也夫門望者乃其父祖之遺烈亦何益於皇家益於時者賢才而已苟有其才雖屠釣奴虜聖王不恥以為臣太公屠牛於朝歌釣於渭濱又紂時箕子為奴周文王武王皆禮而用之雖三后之胤墜於皁隸矣左傳申無宇曰人有十等士臣皁皁臣輿輿臣隸釋曰皁直馬者隸附屬者三后謂夏商周之王也今世等無奇才不若取士於門此亦失矣豈可以世無周邵遂廢宰相邪但當校其寸長銖重者先敍之言其人比之衆人稍有一寸之長一銖之重則先敍用之又刑罰之要在於明當當丁浪翻不在於重苟不失有罪雖捶撻之薄人莫敢犯若容可僥幸雖參夷之嚴不足懲禁參夷謂夷三族也捶止橤翻僥堅堯翻欲邀當時之名爭以深刻為無私迭相敦厲敦迫也厲嚴以勉之陛下居九重之內視人如赤子百司分萬務之任遇下如仇讎是則堯舜止一人而桀紂以千百和氣不至蓋由於此謂宜敕示百僚以惠元元之命又昔周居洛邑猶存宗周周成王宅洛以豐為宗周存故都也京兆置尹後漢都雒陽置河南尹而長安仍置京兆尹亦存故都也章十二行本察作案乙十一行本同孔本同張校同退齋校同春秋之義有宗廟曰都無曰邑況代京宗廟山陵所託王業所基其為神鄉福地實亦遠矣今便同之郡國臣竊不安謂宜建畿置尹一如故事魏初都平城分畫甸畿置司州於平城置代尹光示萬葉又古者四民異居欲其業專志定也管仲相齊使士農工商各㣥萃而州處其言曰四民者勿使雜處雜處則其言口厂尨其事易昔聖王之處士也使就閒燕處工就官府處商就市井處農就田野長而安焉不見異物而遷焉日不暇給然猶分別士庶不令雜居工伎屠沽各有攸處別彼列翻伎渠綺翻處昌呂翻下同處同但不設科禁久而混殽今聞洛邑居民之制專以官位相從不分族類夫官位無常朝榮夕悴悴秦醉翻則是衣冠皁隸不日同處矣借使一里之內或調習歌舞或構章十二行本構作講乙十一行本同孔本同熊校同肄詩書肄羊至翻縱㣥兒隨其所之則必不棄歌舞而從詩書矣然則使工伎之家習士人風禮百年難成士人之子效工伎容態一朝而就是以仲尼稱里仁之美孟母勤三徙之訓論語孔子曰里仁為美擇不處仁焉得知列女傳曰孟軻母其舍近墓孟子少嬉遊為墓間之事孟母曰此非吾所以處子也乃去舍市旁其嬉戲乃賈人衒賣之事又曰此非吾所以處子也復徙舍學宮之旁其嬉戲乃設俎豆揖遜進退孟母曰此真可以居吾子矣遂居焉不可不察朝廷每選人士校其一婚一宦以為升降何其密也至於度地居民則清濁連甍何其略也度徒洛翻甍謨耕翻屋棟所以承瓦今因遷徙之初皆是空地分別工伎在於一言有何可疑而闕盛美又南人昔有淮北之地自比中華僑置郡縣如豫州界止於汝陽而僑置譙梁陳潁等郡縣又於青州界僑置冀州諸郡縣是也僑渠驕翻仍而不改名實交錯文書難辨宜依地理舊名一皆釐革小者幷合大者分置及中州郡縣昔以戶少併省魏初得河南止置四鎮郡縣多所併省少詩沼翻亦可復舊又君人者以天下為家不可有所私倉庫之儲以供軍國之用自非有功德者不可加賜在朝諸貴受祿不輕比來賜賚動以千計朝直遙翻比毗至翻若分以賜鰥寡孤獨之民所濟實多今直以與親近之臣殆非周急不繼富之謂也論語孔子曰君子周急不繼富甚善之夏二月乙丑魏主如河陰規方澤規度其地以立方澤夏辛卯帝祀明堂夏司徒參軍劉斅等聘于魏斅胡教翻夏丙申魏徙河南王幹為趙郡王潁川王雍為高陽王將以河南潁川為畿甸故二王徙封夏壬寅魏主北巡癸卯濟河三月壬申至平城考異曰魏帝紀作閏月按魏閏二月齊曆之三月也各言其志燕州刺史穆羆曰魏營洛以洛為司州改平城之司州為恆州分恆州東部置燕州治昌平今四方未定未宜遷都且征伐無馬將何以克帝曰广既牧在代何患無馬今代在恆山之北九州之外非帝王之都也恆戶登翻尚書于果曰臣非以代地為勝伊洛之美也但自先帝以來久居於此百姓安之一旦南遷衆情不樂樂音洛平陽公丕曰遷都大事當訊之卜筮帝曰昔周召聖賢乃能卜宅書洛誥曰召公既相宅周公往營成周傅來告卜曰我卜河朔黎水我又卜澗水東瀍水西惟洛食我又卜瀍水東亦惟洛食卜之何益且卜以決疑不疑何卜左傳載鬬廉之言天老曰吉黃帝從之杜預曰龜焦兆不成也字書釋灼龜不兆為焦審於龜矣王者以四海為家或南或北何常之有朕之遠祖世居北荒平文皇帝始都東木根山拓跋鬱律諡平文皇帝晉明帝大寧二年通鑑書惠帝賀傉徙居東木根山拓跋什翼犍諡昭成皇帝通鑑晉成帝咸康元年烈帝翳槐城盛樂次年昭成嗣國咸康七年築盛樂新城更工衡翻晉安帝隆安二年道武帝遷都平城論語孔子曰善人為邦百年亦可以勝殘去殺矣朱元晦曰勝殘謂化善人不為惡也屬之欲翻會也勝音升章十二行本作何為獨三字乙十一行本同孔本同不得遷乎㣥臣不敢復言復扶又翻羆壽之孫穆壽事魏太武帝烈之弟也癸酉魏主臨朝堂部分遷留分扶問翻夏夏四月庚辰魏罷西郊祭天考異曰魏帝紀禮志北史紀皆云三月庚辰按長曆三月丙午朔無庚辰魏閏二月齊閏四月魏三月乙亥朔齊曆之四月也故置於此夏辛巳武陵昭王曄卒夏戊子竟陵文宣王子良以憂卒帝常憂子良為變聞其卒甚喜鬱林但虞子良為變而不知鸞諶之謀已成矣臣光曰孔子稱鄙夫不可與事君未得之患得之既得之患失之苟患失之無所不至見論語徼堅堯翻謀易嗣君子良當時賢王雖素以忠慎自居不免憂死迹其所以然正由融速求富貴而已輕躁之士烏可近哉躁則到翻近其靳翻夏己亥魏罷五月五日七月七日饗祖考魏端午七夕之饗猶寒食之饗皆夷禮也夏魏錄尚書事廣陵王羽奏令文每歲終州鎮列屬官治狀及再考則行黜陟治直吏翻去十五年京官盡經考為三等去十五年猶云昨太和十五年也臣輒準外考以定京官治行欲以考州鎮屬官之法考京官載子亥翻行下孟翻考績事重應關朕聽不可輕發且俟至秋史言魏孝文明於君人之體不使權在臣下夏閏月丁卯鎮軍將軍鸞即本號開府儀同三司本號鎮軍將軍也夏戊辰以新安王昭文為揚州刺史夏五月甲戌朔日有食之考異曰齊魏書帝紀皆無此食今據齊書志南史紀夏六月己巳魏遣兼員外散騎常侍盧昶兼員外散騎侍郎王清石來聘昶度世之子也盧度世避崔浩之禍其後自出魏太武寵任之散悉亶翻騎奇寄翻昶丑兩翻魏主謂清石曰卿勿以南人自嫌彼有知識欲見則見欲言則言凡使人以和為貴勿迭相矜夸見於辭色使疏吏翻下同見賢遍翻失將命之體也將奉也奉命而行謂之將命夏秋七月乙亥魏以宋王劉昶為使持節都督吳越楚諸軍事大將軍鎮彭城江南皆春秋時吳越楚三國之地以王肅為昶府長史昶至鎮不能撫接義故宋蒼梧王初昶鎮彭城棄鎮奔魏故義故在焉卒子恤翻夏壬午魏安定靖王休卒自卒至殯魏主三臨其第葬之如尉元之禮尉紆勿翻送之出郊慟哭而返夏壬戌魏主北巡夏西昌侯鸞既誅徐龍駒周奉叔而尼媼外入者頗傳異語媼烏皓翻異語謂外人籍籍口語言鸞等相與有異謀也中書令何胤以后之從叔從才用翻為帝所親使直殿省帝與胤謀誅鸞令胤受事胤不敢當依違諫說帝意復止乃謀出鸞於西州中敕用事不復關咨於鸞復扶又翻是時蕭諶蕭坦之握兵權左僕射王晏總尚書事諶密召諸王典籤約語之不許諸王外接人物約語者約束而語之語牛倨翻衆皆憚而從之鸞以其謀告王晏晏聞之響應又告丹楊尹徐孝嗣孝嗣亦從之驃騎錄事南陽樂豫謂孝嗣曰外傳籍籍似有伊周之事君蒙武帝殊常之恩荷託付之重徐孝嗣為王儉所薦武帝擢而用之遺詔託以尚書衆事驃匹妙翻騎奇寄翻荷下可翻人笑褚公至今齒冷謂褚淵也笑則啟齒故云齒冷帝謂蕭坦之曰人言鎮軍與王晏蕭諶欲共廢我鸞時領鎮軍將軍故稱之卿所聞云何坦之曰天下寧當有此誰樂無事廢天子邪樂音洛朝貴不容造此論當是諸尼姥言耳豈可信耶朝直遙翻姥莫補翻女老稱官若無事除此三章十二行本三作二乙十一行本同人誰敢自保直閤將軍曹道剛疑外間有異密有處分謀未能發言曹道剛密有圖鸞等之謀而未能發處昌呂翻分扶問翻時始興內史蕭季敞南陽太守蕭穎基皆內遷諶欲待二人至藉其勢力以舉事以二人方自外郡歸各有兵力自送為可藉也以告坦之坦之馳謂諶曰廢天子古來大事比聞曹道剛朱隆之等轉已猜疑比毗至翻衞尉明日若不就事無所復及復扶又翻弟有百歲母豈能坐聽禍敗正應作餘計耳諶惶遽從之壬辰鸞使蕭諶先入宮遇曹道剛及中書舍人朱隆之皆殺之直後徐僧亮盛怒直後亦宿衞之官侍衞於乘輿之後者也吾等荷恩荷下可翻今日應死報又殺之鸞引兵自尚書入雲龍門戎服加朱衣於上比入門三失履懼而失其常度也比必寐翻及也帝在壽昌殿壽昌殿武帝所起宴居常居之猶密為手敕呼蕭諶又使閉內殿諸房閤俄而諶引兵入壽昌閤帝走趨徐姬房拔劍自刺不入趨七喻翻刺七亦翻以帛纏頸輿接出延德殿諶初入殿宿衞將士皆操弓楯欲拒戰操千高翻楯食尹翻諶謂之曰所取自有人卿等不須動宿衞素隸服於諶皆信之及見帝出各欲自奮帝竟無一言行至西弄弒之此延德殿之西弄也丁度集韻曰弄廈也屏也亦作弄帝死時年二十二葬以王禮徐姬及諸嬖倖皆伏誅鸞既執帝欲作太后令徐孝嗣於袖中出而進之鸞大悅癸巳以太后令追廢帝為鬱林王又廢何后為王迎立新安王昭文吏部尚書謝瀹方與客圍棋左右聞有變驚走報瀹瀹每下子子棋子也其當有意竟局乃還齋臥竟不問外事謝瀹為此兄朏之教也王徐遂縛袴廢天子天下豈有此理邪大匠卿即漢將作大匠之官蕭子顯曰掌宗廟土木悰徂宗翻嘯父之孫也虞嘯父虞潭之子事晉孝武帝父音甫朝直遙翻被皮義翻國子祭酒江斅至雲龍門託藥發吐車中而去吐土故翻嘔也西昌侯鸞欲引中散大夫孫謙為腹心散悉亶翻謙不欲與之同輒散甲士鸞亦不之罪也史言謝瀹江斅以名義自將僅能如此而已特立不懼孫謙庶幾焉丁酉新安王即皇帝位時年十五王諱昭文字季尚文惠太子第二子也大赦改元延興夏辛丑魏主至朔州魏收地形志雲州舊置朔州又有朔州本漢五原郡魏為懷朔鎮孝昌中始改為朔州今此朔州當置於雲中之盛樂時置朔州於定襄故城領盛樂廣牧二郡宋白曰孝文遷洛之後於今朔州北三百八十里定襄故城置朔州後亂廢夏八月甲辰以司空王敬則為太尉鄱陽王鏘為司徒車騎大將軍陳顯達為司空鏘千羊翻騎奇寄翻尚書左僕射王晏為尚書令夏魏主至陰山夏以始安王遙光為南郡太守不之官遙光鸞之兄子也鸞兄鳳生遙光遙欣遙光嗣始安王爵遙光贊成之凡大誅賞無不預謀戊申以中書郎蕭遙欣為兗州刺史遙欣遙光之弟也鸞欲樹置親黨故用之夏癸丑魏主如懷朔鎮己未如武川鎮辛酉如撫宜鎮甲子如柔玄鎮此六鎮自西徂東之次第也水經註懷朔鎮城在漢光祿城東北考其地當在漢五原稒陽塞外杜佑曰在馬邑郡北三百餘里武川鎮城在白道中溪水上白道在陰山之北又北出大漠柔玄鎮在于延水東于延水出塞外柔玄鎮西長川城南小山東南流逕漢代郡且如縣故城南則魏柔玄鎮城在漢且如縣西北塞外也且音子閭翻撫冥鎮城未考其地若以前說六鎮自五原抵濡源分置於三千里中則撫冥當在武川柔玄之間相距各五百里據前高閭之說則相距各一百七十許里耳按北史宜當作冥乙丑南還辛未至平城夏九月壬申朔魏詔曰三載考績三考黜陟唐虞之制三考黜陟三考九年也載子亥翻可進者大成賒緩朕今三載一考即行黜陟欲令愚滯無妨於賢者才能不擁於下位各令當曹考其優劣為三等其上下二等仍分為三上等下等各又分為三等尚書重問重直用翻五品已上朕將親與公卿論其善惡上上者遷之下下者黜之中者守其本任魏主之北巡也留任城王澄銓簡舊臣自公侯已下有官者以萬數澄品其優劣能否為三等人無怨者史言任城王澄之平明壬午魏主臨朝堂黜陟百官朝直遙翻謂諸尚書曰尚書樞機之任非徒總庶務行文書而已朕之得失盡在於此卿等居官年垂再期未嘗獻可替否進一賢退一不肖此最罪之大者又謂錄尚書事廣陵王羽曰汝為朕弟居機衡之右無勤恪之聲有阿黨之迹今黜汝錄尚書廷尉但為特進太子太保又謂尚書令陸叡曰叔翻到省之初甚有善稱比來偏頗懈怠廣陵王羽字叔翻稱昌孕翻比毗至翻頗傍禾翻亦偏也懈居隘翻由卿不能相導以義雖無大責宜有小罰今奪卿祿一期又謂左僕射拓跋贊曰叔翻受黜卿應大辟辟毗亦翻但以咎歸一人不復重責今解卿少師削祿一期又謂左丞公孫良右丞乞伏義受曰卿罪亦應大辟可以白衣守本官冠服祿卹魏官本祿之外別有恤親之祿若三年有成還復本任無成永歸南畝又謂尚書任城王澄曰叔神志驕傲可解少保澄於魏主叔也卿不勤職事數辭以疾數所角翻可解長兼削祿一朞其餘守尚書尉羽盧淵等並以不職或解任或黜官或奪祿皆面數其過而行之尉紆勿翻數所具翻唐虞三載考績三考黜陟幽明其黜陟行於九年之後非賒緩也俗淳事簡在位者各思盡其職不為姦欺就有不稱者一考而未黜冀其能自盡也其不能盡者才力有所不逮耳再考不稱而猶未黜謂才有短長臨事有過誤前考已稱其職而今考不稱者必過誤也前考不稱而今考能稱其職者能自勉也三考皆不稱則其人信不可用矣於是乎黜之此唐虞忠厚之至也周官計㣥吏之治旬終則令正日成月終則令正月要歲終則令正歲會三歲則大計㣥吏之治而誅賞之是蓋無日而不考覈而誅賞則行於三年大計之時蓋俗益薄人益媮而行九年之黜陟則為賒緩觀魏孝文之考績不過慕古而務名非能行考績之實也淵昶之兄也昶丑兩翻帝又謂陸叡曰北人每言北俗質魯何由知書朕聞之深用憮然憮罔甫翻憮然者悵然失意之貌今知書者甚衆豈皆聖人顧學與不學耳朕脩百官興禮樂其志固欲移風易俗朕為天子何必居中原正欲卿等子孫漸染美俗漸子廉翻聞見廣博若永居恆北恆戶登翻復值不好文之主復扶又翻好呼到翻不免面牆耳書曰不學牆面言猶正牆面而立無所睹見也誠如聖言金日磾不入仕漢朝何能七世知名金日磾事見七十一卷漢武帝後元元年七世知名謂七世內侍也磾丁奚翻朝直遙翻夏鬱林王之廢也鄱陽王鏘初不知謀及宣城公鸞權勢益重中外皆知其蓄不臣之志鏘每詣鸞鸞常屣履至車後迎之言急於出迎不暇躡履至跟也言淚俱發鏘以此信之宮臺之內皆屬意於鏘宮臺猶言宮省也屬之欲翻制局監謝粲說鏘及隨王子隆曰二王但乘油壁車入宮李延壽恩倖傳曰武官有制局監外監皆領器仗兵役油壁車者加青油衣於車壁也王儉議曰今衣書車十二乘古副車之象也榆轂輪簟子壁綠油衣說輸芮翻下之說說子因說同夾輔號令朝直遙翻粲等閉城門上仗誰敢不同上時掌翻下直上西上同東城人正共縛送蕭令耳東城謂東府城也按蕭子顯齊書世祖遺詔以鸞為侍中尚書令此時已進錄尚書事粲曰蕭令蓋以舊官稱之鏘以上臺兵力既悉度東府海陵王既即位鸞出鎮東府上臺兵力悉割以自隨度過也意甚猶豫馬隊主劉巨世祖時舊人詣鏘請間叩頭勸鏘立事鏘命駕將入復還內復扶又翻與母陸太別日暮不成行典籤知其謀告之癸酉鸞遣兵二千人圍鏘第殺鏘遂殺子隆及謝粲等於時太祖諸子子隆最壯大有才能太祖當作世祖江州刺史晉安王子懋聞鄱陽隨王死欲起兵謂防閤吳郡陸超之曰事成則宗廟獲安不成猶為義鬼諸王置防閤以勇略之士為之以防衞齋閤杜佑通典唐制親王府並給防閤庶僕白直下至州縣亦有白直此州雖小宋孝武常用之謂宋孝武帝自江州起兵誅元凶劭也誰能禦之子懋母阮氏在建康密遣書迎之阮氏報其同母兄于瑤之為計瑤之馳告宣城公鸞乙亥假鸞黃鉞內外纂嚴考異曰齊帝紀作乙未按是月壬申朔而上有癸未下有乙酉丁亥蓋癸未當作癸酉乙未當作乙亥耳又遣軍主裴叔業與于瑤之先襲尋陽聲云為郢府司馬子懋知之遣三百人守湓城叔業泝流直上上時掌翻至夜回襲湓城城局參軍樂賁開門納之諸州刺史各有城局參軍掌脩浚備禦帥府州兵力據城自守子懋部曲多雍州人皆勇躍願奮子懋自雍州徙為江州故部曲多雍州人勇當作踴帥讀曰率雍於用翻遣于瑤之說子懋曰今還都必無過憂正當作散官不失富貴也說輸芮翻散悉但翻子懋既不出兵攻叔業衆情稍沮中兵參軍于琳之瑤之兄也說子懋重賂叔業可以免禍子懋使琳之往琳之因說叔業取子懋叔業遣軍主徐玄慶將四百人隨琳之入州城僚佐皆奔散沮在呂翻說輸芮翻將即亮翻琳之從二百人拔白刃入齋子懋罵曰小人何忍行此琳之以袖鄣面使人殺之王玄邈執董僧慧將殺之僧慧曰晉安舉義兵僕實預其謀得為主人死不恨矣願至大斂畢退就鼎鑊為于偽翻斂力贍翻下殯斂同鑊戶郭翻玄邈義之具以白鸞免死配東冶子懋子昭基九歲以方二寸絹為書參其消息幷遺錢五百遺于季翻行金得達僧慧視之曰郎君書也悲慟而卒卒子恤翻于琳之勸陸超之逃亡超之曰人皆有死此不足懼吾若逃亡非唯孤晉安之眷亦恐田橫客笑人田橫客事見十一卷漢高帝五年超之守死故以此言愧琳之超之端坐俟命超之門生謂殺超之當得賞密自後斬之頭墜而身不僵僵居良翻玄邈厚加殯斂門生亦助舉棺棺墜壓其首折頸而死史言董僧慧陸超之之義烈折而設翻鸞遣平西將軍王廣之襲南兗州刺史安陸王子敬廣之至歐陽歐陽今真州閘即其地也將即亮翻濟子禮翻伯之因城開獨入斬子敬鸞又遣徐玄慶西上害諸王上時掌翻臨海王昭秀為荊州刺史西中郎長史何昌㝢行州事玄慶至江陵欲以便宜從事昌㝢曰僕受朝廷意寄意寄謂屬意寄託之殿下未有愆失君以一介之使來何容即以相付邪使疏吏翻若朝廷必須殿下當自啟聞更聽後旨昭秀由是得還建康考異曰南史明帝使裴叔業齎旨詔昌㝢令以便宜從事昌㝢拒之曰臨海王未有失寧得從君單詔邪即時自有啟聞須反更議叔業曰若爾便是拒詔拒詔軍法行事耳答曰能見殺者君也能拒詔者僕也叔業不敢逼而退昭秀由此得還都今從齊書尚之之弟子也何昌㝢於此有周昌之節矣鸞以吳興太守孔琇之行郢州事欲使之殺晉熙王銶琇音秀銶音求琇之辭不許遂不食而死琇之靖之孫也孔靖見一百二十三卷晉安帝元興二年裴叔業自尋陽仍進向湘州欲殺湘州刺史南平王銳防閤周伯玉大言於衆曰此非天子意今斬叔業舉兵匡社稷誰敢不從銳典籤叱左右斬之乙酉殺銳又殺郢州刺史晉熙王銶南豫州刺史宜都王鏗丁亥以廬陵王子卿為司徒桂陽王鑠為中軍將軍開府儀同三司冬十月丁酉解嚴尋陽已定諸藩王已死故解嚴夏以宣城公鸞為太傅領大將軍揚州牧都督中外諸軍事加殊禮進爵為王宣城王謀繼大統多引朝廷名士與參籌策侍中謝朏心不願乃求出為吳興太守至郡致酒數斛遺其弟吏部尚書瀹朏敷尾翻遺于季翻為書曰可力飲此勿豫人事臣光曰臣聞衣人之衣者懷人之憂食人之食者死人之事史記載淮陰侯答蒯徹之言衣人之衣於既翻比肩貴近安享榮祿危不預知為臣如此可謂忠乎世多有如此而得名者夏宣城王雖專國政人情猶未服王胛上有赤誌胛古洽翻肩背之間為胛驃騎諮議參軍考城江祏勸王出以示人祏音石考城前漢之甾縣也屬梁國後漢章帝改曰考城屬陳留郡晉惠帝分屬濟陽郡蕭子顯齊志南徐州南濟陽郡有考城縣皆晉氏因郡人南渡而僑置也王以示晉壽太守王洪範曰人言此是日月相卿幸勿泄洪範曰公日月在軀如何可隱當轉言之王洪範禁衞舊臣鸞以此覘之其言如此鸞益無所忌矣相息亮翻祏之姑也夏戊戌殺桂陽王鑠衡陽王鈞江夏王鋒建安王子真巴陵王子倫鑠與鄱陽王鏘齊名鏘好文章鑠好名理好呼到翻時人稱為鄱桂鏘死鑠不自安至東府見宣城王還謂左右曰向錄公見接慇勤鸞以太傅錄尚書事太傅上公故稱錄公流連不能相捨之意此必欲殺我是夕遇害宣城王每殺諸王常夜遣兵圍其第斬關踰垣呼譟而入家貲皆封籍之江夏王鋒有才行行下孟翻宣城王嘗與之言遙光才力可委鋒曰遙光之於殿下猶殿下之於高皇衞宗廟安社稷實有攸寄東昏侯之世遙光卒如鋒言及殺諸王鋒遺宣城王書誚責之遺于季翻誚才笑翻宣城王深憚之不敢於第收鋒使兼祠官於太廟祠官使行祭事遣兵廟中收之鋒出登車兵人欲上車上時掌翻鋒有力手擊數人皆仆地然後死宣城王遣典籤柯令孫殺建安王子真姓譜柯姓也吳公子柯廬之後令孫手牽出之叩頭乞為奴不許而死又遣中書舍人茹法亮殺巴陵王子倫茹音如子倫性英果時為南蘭陵太守鎮琅邪城有守兵晉置南琅邪郡於江乘蒲洲上齊徙治白下北臨江滸故有守兵以問典籤華伯茂華戶化翻伯茂曰公若以兵取之恐不可即辦若委伯茂一夫力耳乃手自執鴆逼之子倫正衣冠出受詔謂法亮曰先朝昔滅劉氏見一百三十五卷高祖建元元年朝直遙翻理數固然君是身家舊人茹法亮事世祖權寄甚重當由事不獲已使疏吏翻此酒非勸酬之爵因仰之而死時年十六法亮及左右皆流涕初諸王出鎮皆置典籤主帥一方之事悉以委之帥所類翻下同時入奏事一歲數返時主輒與之間語間讀曰閑訪以州事刺史美惡專繫其口自刺史以下莫不折節奉之恆慮弗及恆戶登翻於是威行州部州部謂一州之部內也武陵王曄為江州性烈直不可干典籤趙渥之謂人曰今出都易刺史及見世祖盛毀之曄遂免還南海王子罕戍琅邪欲暫游東堂典籤姜秀不許子罕還泣謂母曰兒欲移五步亦不得與囚何異邵陵王子貞嘗求熊白本草圖經曰熊形類大豕而性輕健好攀緣上高木見人則顛倒自投而下冬多入穴而藏蟄始春而出其脂謂之熊白十一月取之須其背上者陸佃埤雅曰熊當心有白脂如玉味甚美俗呼熊白不敢與永明中巴東王子響殺劉寅等事見一百三十八卷永明八年謂㣥臣曰子響遂反戴僧靜大言曰諸王都自應反豈唯巴東上問其故對曰天王無罪而一時被囚被皮義翻取一挺藕一杯漿皆諮籤帥籤帥不在則竟日忍渴諸州唯聞有籤帥不聞有刺史何得不反竟陵王子良嘗問衆曰士大夫何意詣籤帥參軍范雲曰詣長史以下皆無益詣籤帥立有倍本之價謂所持以詣籤帥而其所得倍其所持之本也子良有愧色及宣城王誅諸王皆令典籤殺之竟無一人能抗拒者孔珪聞之流涕曰齊之衡陽江夏最有意言有意於翼輔帝室復扶又翻下勿復同若不立籤帥故當不至於此此上歷敍典籤之弊乃詔自今諸州有急事當密以奏聞勿復遣典籤入都自是典籤之任浸輕矣蕭子顯論曰帝王之子生長富厚長知兩翻朝出閨閫暮司方岳防驕翦逸積代常典故輔以上佐簡自帝心勞舊左右用為主帥飲食起居動應聞啟處地雖重處昌呂翻行己莫由威不在身恩未下及一朝艱難總至望其釋位扶危何可得矣左傳諸侯釋位以間王室杜預註曰間猶與也去其位與治王之政事至齊室而尤弊也諸王置典籤始於宋故云然夏癸卯以寧朔將軍蕭遙欣為豫州刺史黃門郎蕭遙昌為郢州刺史輔國將軍蕭誕為司州刺史遙昌遙欣之弟誕諶之兄也史言宣城王用其親黨分據方面諶氏壬翻夏甲辰魏以太尉東陽王丕為太傅錄尚書事留守平城守手又翻戊申魏主親告太廟使高陽王雍于烈奉遷神主于洛陽辛亥發平城夏海陵王在位起居飲食皆諮宣城王而後行嘗思食蒸魚菜太官令答無錄公命竟不與辛亥皇太后令曰嗣主沖幼庶政多昧且早嬰尫疾嬰纏也尫烏黃翻弱也杜預曰瘠疾也荷下可翻又如字太傅宣城王胤體宣皇鍾慈太祖蕭承之追諡宣皇帝太祖之父而鸞之祖也太祖又素愛鸞故云然帝可降封海陵王吾當歸老別館蕭子顯齊書自此以上著於海陵王紀蕭子顯齊書此語著於明帝紀癸亥高宗即皇帝位大赦改元此時方改元建武司空陳顯達為太尉尚書令王晏加驃騎大將軍驃匹妙翻騎奇寄翻左僕射徐孝嗣加中軍大將軍中領軍蕭諶為領軍將軍度支尚書虞悰稱疾不陪位悰徂宗翻帝以悰舊人欲引參佐命使王晏齎廢立事示悰悰曰主上聖明公卿戮力寧假朽老以贊惟新乎詩曰其命維新因慟哭史言虞悰柔而能正過謝瀹兄弟遠甚朝直遙翻徐孝嗣曰此亦古之遺直乃止帝與㣥臣宴會詔功臣上酒王晏等興席上時掌翻興起也謝瀹獨不起曰陛下受命應天順人王晏妄叨天功以為己力帝大笑解之座罷晏呼瀹共載還令省章十二行本省下有欲相撫悅四字乙十一行本同孔本同退齋校同令省謂尚書令所舍也瀹正色曰卿巢窟在何處晏甚憚之夏丁卯詔藩牧守宰或有薦獻事非任土謂非如禹貢任土作貢也斷音短夏己巳魏主如信都庚午詔曰比聞緣邊之蠻多竊掠南土比毗至翻使父子乖離室家分絕朕方蕩壹區宇子育萬姓若苟如此南人豈知朝德哉謂江南之人將不知魏朝之德也朝直遙翻禁勒蠻民勿有侵暴魏初置荊州於上洛太和中徙治穰城置郢州於真陽真陽漢汝南郡之慎陽縣也置東荊州於沘陽夏十一月癸酉以始安王遙光為揚州刺史夏丁丑魏主如鄴夏庚辰立皇子寶義為晉安王寶玄為江夏王夏戶雅翻寶源為廬陵王寶寅為建安王寶融為隨郡王寶攸為南平王夏甲申詔曰邑宰祿薄雖任土恆貢自今悉斷觀此則江左之政縣邑不由郡州亦得入貢天臺矣夏乙酉追尊始安貞王為景皇為懿后夏丙戌以聞喜公遙欣為荊州刺史豐城公遙昌為豫州刺史時上長子晉安王寶義有癈疾痼疾不可復用為癈疾長知兩翻故以遙光居中居中謂為揚州刺史夏戊子立皇子寶卷為太子卷讀曰捲夏魏主至洛陽欲澄清流品以尚書崔亮兼吏部郎亮道固之兄孫也宋泰始初崔道固降魏夏魏主敕後軍將軍宇文福行牧地福表石濟以西河內以東距河凡十里行下孟翻牧地縱則石濟以西河內以東橫則距河十里按杜佑通典衞州汲縣古牧野之地則其地宜畜牧有自來矣魏主自代徙雜畜置其地使福掌之畜無耗失畜許救翻以為司衞監初世祖平統萬及秦涼宋文帝元嘉四年魏平統萬八年赫連定滅秦定尋西奔為吐谷渾所禽秦地皆入于魏十六年魏平涼州用為牧地畜甚蕃息蕃讀如繁馬至二百餘萬匹橐駝半之牛羊無數及高祖置牧場於河陽常畜戎馬十萬匹河陽牧場即宇文福所規牧地畜許六翻稍復南徙復扶又翻欲其漸習水土不至死傷而河西之牧愈更蕃滋及正光以後皆為寇盜所掠無孑遺矣梁武帝普通元年魏改元正光史歷言魏之馬政夏永明中御史中丞沈淵表百官年七十皆令致仕用古者七十而致事之說庚子詔依舊銓敍上輔政所誅諸王皆復屬籍封其子為侯夏上詐稱海陵恭王有疾數遣御師瞻視數所角翻御師醫師也以其供御故謂之御師至于隋世尚藥局有侍御醫又有醫師因而殞之葬禮並依漢東海恭王故事漢東海王彊以天下讓葬用殊禮夏魏郢州刺史韋珍韋珍先以樂陵鎮將與東荊州刺史桓誕同鎮沘陽尋為郢州刺史魏主賜以駿馬穀帛珍集境內孤貧者悉散與之謂之曰天子以我能綏撫卿等故賜以穀帛吾何敢獨有之夏魏主以上廢海陵王自立謀大舉入寇會邊將言雍州刺史下邳曹虎遣使請降於魏將即亮翻雍於用翻使疏吏翻降戶江翻十一章十二行本一作二張校同月辛丑朔魏遣行征南將軍薛真度督四將向襄陽大將軍劉昶平南將軍王肅向義陽徐州刺史拓跋衍向鍾離平南將軍廣平劉藻向南鄭真度安都從祖弟也從才用翻以尚書僕射章十二行本無僕射二字乙十一行本同孔本同盧淵為安南將軍督襄陽前鋒諸軍淵辭以不習軍旅不許淵曰但恐曹虎為周魴耳周魴事見七十一卷魏明帝太和二年魴符方翻夏魏主欲變易舊風壬寅詔禁士民胡服國人多不悅國人者與魏同起於北荒之子孫也通直散騎常侍劉芳纘之族弟也劉纘臣於齊而屢使於魏與芳皆彭城人蓋同出於楚元王之後皆以文學為帝所親禮多引與講論及密議政事大臣貴戚皆以為疏己怏怏有不平之色怏許兩翻帝使給事黃門侍郎陸凱私諭之曰至尊但欲廣知古事詢訪前世法式耳終不親彼而相疏也衆意乃稍解凱馛之子也陸馛見一百三十三卷宋明帝泰始七年馛蒲撥翻夏魏主欲自將入寇癸卯中外戒嚴戊申詔代民遷洛者復租賦三年復方目翻相州刺史高閭相息亮翻上表稱洛陽草創曹虎既不遣質任必無誠心質音致無宜輕舉魏主不從久之虎使竟不再來使疏吏翻魏主引公卿問行留之計公卿或以為宜止或以為宜行帝曰衆人紛紜莫知所從必欲盡行留之勢宜有客主共相起發任城鎮南為留議鎮南為鎮軍任音壬諸公坐聽得失長者從之衆皆曰諾鎮軍章十二行本軍作南乙十一行本同孔本同將軍李沖曰臣等正以遷都草創人思少安少詩沼翻為內應者未得審諦諦音帝亦審也不宜輕動帝曰彼降款虛實誠未可知降中江翻若其虛也朕巡撫淮甸訪民疾苦使彼知君德之所在有北向之心若其實也今不以時應接則失乘時之機孤歸義之誠敗朕大略矣孤負也敗補邁翻虎無質任又使不再來其詐可知也今代都新遷之民皆有戀本之心扶老攜幼始就洛邑居無一椽之室椽重緣翻食無甔石之儲應劭曰齊人名小甕為甔甔受二石甔音都濫翻東作將起乃百堵皆興俶載南畝之時百堵皆興謂新遷之人當作室也俶載南畝謂入春當東作也二語皆詩語俶昌六翻始也泣當白刃殆非歌舞之師也武王伐紂前歌後舞擐音宦非無應接若降款有實待既平樊沔然後鑾輿順動亦何晚之有今率然輕舉率然輕易之意若空行空返恐挫損天威更成賊氣非策之得者也司空穆亮以為宜行公卿皆同之澄謂亮曰公輩在外之時見張旗授甲皆有憂色平居論議不願南征何得對上即為此語面背不同事涉欺佞豈大臣之義國士之體乎萬一傾危皆公輩所為也沖曰任城王可謂忠於社稷帝曰任城以從朕者為佞不從朕者豈必皆忠夫小忠者大忠之賊無乃似諸澄曰臣愚闇雖涉小忠要是竭誠謀國不知大忠者竟何所據帝不從辛亥發洛陽以北海王詳為尚書僕射統留臺事李沖兼僕射同守洛陽給事黃門侍郎崔休為左丞趙郡王幹都督中外諸軍事始平王勰將宗子軍宿衞左右將即亮翻休逞之玄孫也魏道武伐中山崔逞降之戊辰魏主至懸瓠己巳詔壽陽鍾離馬頭之師所掠男女皆放還南曹虎果不降降戶江翻魏主命盧淵攻南陽淵以軍中乏糧請先攻赭陽以取葉倉魏主許之赭陽即漢晉之堵陽縣堵亦音者至宋時猶屬南陽郡至蕭子顯齊書赭陽葉二縣皆不見於志下言北襄城太守成公期拒魏則北襄城郡置於赭陽明矣葉式涉翻乃與征南大將軍城陽王鸞安南將軍李佐荊州刺史韋珍共攻赭陽考異曰齊書作盧陽烏韋靈智按陽烏淵小字靈智珍字也長壽之子城陽王長壽見一百三十二卷宋蒼梧王元徽三年寶之子也宋文帝元嘉二十一年李寶入朝于魏薛真度軍於沙堨堨烏葛翻堨壅也聚沙以壅水故以為地名南陽太守房伯玉新野太守劉思忌拒之晉武帝太康中分南陽置義陽郡惠帝又分義陽南陽置新野郡夏先是魏主遣中書監高閭治古樂先悉薦翻治直之翻會閭出為相州刺史是歲表薦著作郎韓顯宗大樂祭酒公孫崇參知鍾律帝從之大樂祭酒蓋太和中初置是官聶崇岐標點王崇武覆校
