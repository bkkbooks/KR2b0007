body:
  text: 資治通鑑卷第二百七十三端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千六百戶食實封一千戶臣司馬光奉敕編集後學天台音註後唐紀二莊宗光聖神閔孝皇帝中同光二年同光二年甲申九二四同光二年春正月甲辰幽州奏契丹入寇至瓦橋李存審奏也陝州留後霍彥威副之宣徽使李紹宏為監軍將兵救幽州陝失冉翻監古銜翻將即亮翻同光二年孔謙復言於郭崇韜曰首座相公萬機事繁居第且遠復扶又翻豆盧革時為首相故稱之為首座相公租庸簿書多留滯宜更圖之請改用人為租庸使孔謙意欲自得之也更工衡翻今俗謂借錢為便錢言借貸以便用也時租庸錢皆入省庫崇韜微以諷革革懼奏請崇韜專判租庸崇韜固辭上曰然則誰可者崇韜曰孔謙雖久典金穀自帝得魏博孔謙即為支度務使恐不叶物望請復用張憲帝即命召之謙彌失望謙自去年四月帝即位之初即望為租庸使事見上卷同光二年岐王聞帝入洛內不自安聞帝自大梁入洛懼移兵西伐也李繼曮以鳳翔行軍司馬領涇州節帝以其前朝耆舊與太祖比肩前朝謂唐僖昭之朝帝即位追尊考晉王克用曰武皇帝廟號太祖上時掌翻朝直遙翻下同每賜詔但稱岐王而不名庚戌加繼曮中章十二行本中上有兼字乙十一行本同書令遣還曮魚險翻還從宣翻又如字同光二年敕內官不應居外應前朝內官及諸道監軍幷私家先所畜者不以貴賤並遣詣闕唐末誅宦官其有逃逸者散投外鎮及為私家所養畜旴玉翻至是殆及千人皆給贍優厚委之事任以為腹心內諸司使自天祐以來以士人代之唐昭宗天復三年誅宦官以士人為內諸司使時所存者九使而已至梁有客省使改小馬坊使為天驥使飛龍使莊宅使儀鸞使文思使五坊使如京使尚食使改御食使為司膳使洛苑使教坊使東上閤門使西上閤門使內園栽接使弓箭庫使大內皇牆使武備庫使引進使左藏庫使閑广既使宮苑使翰林使大和庫使豐德庫使乾文院使後唐雖不用梁制而復唐之舊內諸司使其官亦多浸干政事既而復置諸道監軍節度使出征或留闕下軍府之政皆監軍決之陵忽主帥怙勢爭權由是藩鎮皆憤怒為後諸藩鎮乘變殺監軍張本同光二年契丹出塞召李嗣源旋師命泰寧節度使李紹欽澤州刺史董璋戍瓦橋同光二年李繼曮見唐甲兵之盛歸語岐王語牛倨翻岐王益懼癸丑表請正藩臣之禮優詔不許同光二年孔謙惡張憲之來時自魏召張憲復為租庸使憲方正故謙惡其來惡烏路翻錢穀細事一健吏可辦耳魏都根本之地顧不重乎興唐尹王正言操守有餘智力不足必不得已使之居朝廷衆人輔之猶愈於專委方面也革為之言於崇韜為于偽翻崇韜乃奏留張憲於東京甲寅以正言為租庸使正言昏懦謙利其易制故也易以豉翻同光二年李存審奏契丹去復得新州新州陷見二百六十九卷梁均王貞明三年同光二年戊午敕鹽鐵度支戶部三司並隸租庸使租庸使之權愈重矣同光二年上遣皇弟存渥皇子繼岌迎太后太於晉陽太曰陵廟在此若相與俱行歲時何人奉祀遂留不來帝即位尊曾祖執宜廟號懿祖陵曰永興國昌廟號獻祖陵曰長寧克用廟號太祖陵曰建極三陵皆在代州鴈門縣親廟在晉陽太之不來夫豈專陵廟之為其心固有所見也且其辭義甚正為太后太俱以憂邑成疾張本庚申上出迎於河陽辛酉從太后入洛陽同光二年二月己巳朔上祀南郊大赦孔謙欲聚斂以求媚斂力贍翻凡赦文所蠲者謙復徵之蠲圭淵翻除也復扶又翻自是每有詔令人皆不信百姓愁怨郭崇韜初至汴洛頗受藩鎮饋遺遺唯季翻所親或諫之崇韜曰吾位兼將相郭崇韜為樞密使加侍中領成德節樞密使天下事無所不關侍中三省長官又領節鎮故言位兼將相豈藉外材章十二行本材作財乙十一行本同孔本同熊校同但以偽梁之季賄賂成風今河南藩鎮皆梁之舊臣主上之仇讎也若拒其意能無懼乎吾特為國家藏之私室耳為于偽翻郭崇韜受饋遺未足以安藩鎮疑懼之心乃所以成其主好貨之惡及將祀南郊崇韜首獻勞軍錢十萬緡先是宦官勸帝分天下財賦為內外府勞力到翻先悉薦翻州縣上供者入外府充經費供居用翻方鎮貢獻者入內府充宴遊及給賜左右於是外府常虛竭無餘而內府山積及有司辦郊祀乏勞軍錢崇韜言於上曰臣已傾家所有以助大禮願陛下亦出內府之財以助有司上默然久之曰吾晉陽自有儲積積子賜翻又如字可令租庸輦取以相助於是取李繼韜私第金帛數十萬以益之李繼韜父嗣昭從晉王克用起於晉陽故私第在焉繼韜以反誅其家貲沒官始怨恨有離心矣為後諸軍離叛張本同光二年河中節度使李繼麟請榷安邑解縣鹽每季輸省課每三月一輸鹽課於省也榷古岳翻解戶買翻己卯以繼麟充制置兩池榷鹽使同光二年辛巳進岐王爵為秦王考異曰茂貞改封秦王薛史無的確年月實錄同光元年十一月壬寅已稱秦王茂貞遣使賀收復自後皆稱秦王至二年辛巳制秦王李茂貞可封秦王豈有秦王封秦王之理必是至是時始自岐王封秦王也通鑑考異正本在二年正月岐王上表稱臣之下今移置於此同光二年郭崇韜知李紹宏怏怏乃置內句使掌句三司財賦以紹宏為之冀弭其意而紹宏終不悅李紹宏恨郭崇韜見上卷元年句音鉤按薛史云同光元年十一月以李紹宏兼內句凡天下錢穀簿書悉委裁遣自是州縣供帳煩費議者非之與此有歲月之差崇韜位兼將相復領節旄以天下為己任權侔人主旦夕車馬填門性剛急遇事輒發嬖倖僥求多所摧抑嬖卑義翻又必計翻僥堅堯翻宦官疾之朝夕短之於上崇韜扼腕欲制之不能腕烏貫翻豆盧革韋說嘗問之曰汾陽王本太原人徙華陰說讀曰悅華戶化翻公世家鴈門豈其枝派邪崇韜因曰遭亂亡失譜諜嘗聞先人言上距汾陽四世耳譜博古翻籍錄也諜徒協翻漢郊祀歌披圖按諜蘇林註曰諜譜第也汾陽王謂郭子儀也革曰然則固從祖也從才用翻崇韜由是以膏粱自處多甄別流品處昌呂翻別彼列翻引拔浮華鄙棄勳舊有求官者崇韜曰深知公功能然門地寒素不敢相用恐為名流所嗤嗤丑之翻笑也由是嬖倖疾之於內勳舊怨之於外崇韜屢請以樞密使讓李紹宏上不許又請分樞密院事歸內諸司以輕其權而宦官謗之不已崇韜鬱鬱不得志與所親謀赴本鎮以避之其人曰不可蛟龍失水螻蟻足以制之先是上欲以劉夫人為皇后先悉薦翻而有正韓夫人在歐史曰莊宗正室曰衞國夫人韓氏其次曰燕國夫人伊氏次魏國夫人劉氏按歐史劉氏為袁建豐所得內之太后宮教以吹笙歌舞莊宗悅之太后以賜莊宗然而惡之者以其所出微而妬悍也上以是不果於是所親說崇韜曰說式芮翻公若請立劉夫人為皇后上必喜內有皇后之助則伶宦輩不能為患矣崇韜從之與宰相帥百官共奏劉夫人宜正位中宮癸未立魏國夫人劉氏為皇后郭崇韜以是求自全乃所以自禍也為殺郭從韜張本帥讀曰率下同既貴專務蓄財其在魏州薪蘇果茹皆販鬻之採木為薪採草為蘇果覈也茹菜也四方貢獻皆分為二一上天子一上中宮上時掌翻以是寶貨山積惟用寫佛經施尼師而已施式豉翻是時皇太后誥皇后教與制敕交行於藩鎮奉之如一婦言與王言並行自古亂政未有如同光之甚者也同光二年詔蔡州刺史朱勍浚索水通漕運水經註車關水出于嵩渚之山發于層阜之上一源兩枝分流瀉注世謂之石泉水東流為索水西注為車關水索水在成皋北勍渠京翻索山客翻同光二年三月己亥朔蜀主宴近臣於怡神亭酒酣君臣及宮人皆脫冠露髻喧譁自恣知制誥京兆李龜禎諫曰君臣沈湎不憂國政沈持林翻臣恐啟北敵之謀北敵謂唐也同光二年乙巳鎮州言契丹將犯塞此據諜報而上言也天平節度使李嗣源屯邢州紹斌本姓趙名行實幽州人也斌悲巾翻同光二年丙午加高季興兼尚書令進封南平王同光二年李存審自以身為諸將之首李存審時為蕃漢馬步軍都總管感憤疾益甚李存審自滄徙幽時已寢疾郭崇韜抑而不許存審疾亟表乞生覩龍顏乃許之初帝嘗與右武衞上將軍李存賢手搏存賢不盡其技存賢本許州王賢少為軍卒善角觝晉王克用得之賜以姓名養為子技渠綺翻汝能勝我當授藩鎮存賢乃奉詔僅仆帝而止及許存審入覲帝以存賢為盧龍行軍司馬旬日除節度使曰手搏之約吾不食言矣以手搏而得大藩是節鎮可以戲取矣同光二年庚戌幽州奏契丹寇新城新城縣屬涿州唐大和六年以故督亢地置匈奴須知新城縣北至涿州六十里同光二年勳臣畏伶官宦之讒皆不自安蕃漢內外馬步副總管李嗣源求解兵柄帝不許同光二年自唐末喪亂喪息浪翻搢紳之家或以告赤鬻於族姻赤當作敕鬻於族姻則既非矣安知後世有鬻於非其族類者乎昭上招翻至有舅叔拜甥姪者言舅拜其甥叔拜其姪也郭崇韜欲革其弊請令銓司精加考覈銓司吏部也選須絹翻覈下革翻凡郊祀預執事者皆謂之行事官塗毀告身者十之九選人或號哭道路號戶刀翻或餒死逆旅同光二年唐室諸陵先為溫韜所發帝不能正溫韜之罪見上卷上年庚申以工部郎中李途為長安按視諸陵使同光二年皇子繼岌代張全義判六軍諸衞事同光二年夏四月己巳朔㣥臣上尊號曰昭文睿武至德光孝皇帝唐諸帝尊號皆有孝字蓋因漢制今此又因唐制也同光二年帝遣客省使李嚴使于蜀嚴盛稱帝威德有混一天下之志且言朱氏篡竊諸侯曾無勤王之舉王宗儔以其語侵蜀請斬之蜀主不從宣徽北院使宋光葆上言晉王有憑陵我國家之志宜選將練兵屯戍邊鄙積糗糧治戰艦以待之上時掌翻糗去久翻治直之翻艦戶黯翻言治戰艦欲以防峽江蜀主乃以光葆為梓州觀察使充武德節度留後蜀置武德軍於梓州同光二年乙亥加楚王殷兼尚書令同光二年庚辰賜前保義留後霍彥威姓名李紹真唐既滅梁改陝州鎮國軍為保義軍同光二年秦忠敬王李茂貞卒遺奏以其子繼曮權知鳳翔軍府事同光二年初安義牙將楊立有寵於李繼韜李繼韜之求世襲也改昭義軍為安義軍見上卷上年會發安義兵三千戍涿州立謂其衆曰前此潞兵未嘗戍邊晉與梁兵爭潞兵未嘗北戍蓋以備梁耳蓋不欲置之潞州耳與其暴骨沙場不若據城自守涿州在幽州之南未為絕塞也唐人謂沙漠之地為沙場豈涿州之地乎楊立以此言激怒潞兵耳不成為㣥盜耳因聚譟攻子城東門焚掠市肆節度副使李繼珂監軍張弘祚棄城走立自稱留後遣將士表求旌節詔以天平節度使李嗣源為招討使武寧節度使李紹榮為部署部署之官始見于通鑑本在招討使之下其後有都部署遂為專任主帥之任同光二年孔謙貸民錢使以賤估償絲估音古價也以錢貸民而以賤價徵絲償所貸錢屢檄州縣督之翰林學士承旨權知汴州盧質上言梁趙巖為租庸使舉貸誅斂結怨于人斂力贍翻陛下革故鼎新為人除害易雜卦曰革去故也鼎取新也為于偽翻是趙巖復生也復扶又翻今春霜害稼章十二行本稼作桑乙十一行本同張校同云無註本亦誤稼繭絲甚薄但輸正稅猶懼流移況益以稱貸稱舉也貸借也臣惟事天子不事租庸敕旨未頒省牒頻下省牒謂租庸使所下文書下戶嫁翻帝不報同光二年漢主引兵侵閩屯於汀漳境上閩之汀漳二州皆與漢之潮州接境漢主敗走同光二年初胡柳之役見二百七十卷梁均王貞明四年帝每思之帝思周匝而不思周德威此其所以亡也匝謁見於馬前入汴見上卷上年見賢遍翻匝涕泣言曰臣之所以得生全者皆梁教坊使陳俊內園栽接使儲德源之力也梁內園栽接使猶唐之內園使也宋白曰栽接使貞元中已有之職官分紀五代有內園栽接使國朝止名內園使帝許之郭崇韜諫曰陛下所與共取天下者皆英豪忠勇之士今大功始就封賞未及一人而先以伶人為刺史恐失天下心以是不行踰年伶人屢以為言帝謂崇韜曰吾已許周匝矣使吾慚見此三人三人謂周匝陳俊儲德源也周匝李存賢之事帝自以為踐言矣可以為政乎當章十二行本當上有然字乙十一行本同為我屈意行之為于偽翻五月壬寅以俊為景州刺史德源為憲州刺史憲州本樓煩監牧唐昭宗龍紀元年晉王克用表置憲州莫不憤歎宜其離叛也同光二年乙巳右諫議大夫薛昭文上疏以為諸道僭竊者尚多當是時諸道奉貢者有所不論如蜀如吳如漢皆唐之諸道也未可遽息又士卒久從征伐賞給未豐貧乏者多此正時病也羨弋戰翻更加頒賚又河南諸軍皆梁之精銳恐僭竊之國潛以厚利誘之宜加收撫又戶口流亡者宜寬傜薄賦以安集之又土木不急之役宜加裁省又請擇隙地牧馬勿使踐京畿民田皆不從同光二年戊申蜀主遣李嚴還李嚴四月入蜀至是而還還從宣翻又如字考異曰實錄七月戊午蜀遣歐陽彬朝貢十月癸巳遣客省使李嚴充蜀川回信使三年八月戊辰嚴自西川回蜀書四月己巳朔唐使李嚴來聘五月戊申遣嚴歸本國十一月己未朔遣彬為唐國通好使按錦里耆舊傳是歲遣歐陽彬通聘洛京莊宗遣李嚴來脩好笏記云豈謂大蜀皇帝特遣蘇張之士來追唐蜀之歡吾皇廻感於蜀皇復禮遠酬於厚禮然則嚴為回信使也或者歐陽彬之前蜀已有入洛之使乎若如實錄年月則李嚴以二年十月奉使至三年八月方歸何留之久乎十國紀年蜀史又云九月己亥唐帝遣李彥稠來使十一月辛丑遣彥稠東還又八月以後遣王宗鍔等戍洋利以備東師似用宋光葆之言十一月以後以唐國通好召諸軍還似因彥稠來而罷之今並從蜀書年月帝因嚴入蜀令以馬市宮中珍玩而蜀法禁錦綺珍奇不得入中國其粗惡者乃聽入中國謂之入草物粗讀曰麤自盛唐以來蜀貢賦歲至京師此法乃王衍之法也嚴還以聞帝怒曰王衍寧免為入草之人乎嚴因言於帝曰衍童騃荒縱不親政務斥遠故老昵比小人騃語駭翻遠丁願翻昵尼質翻比毗至翻其用事之臣王宗弼宋光嗣等諂諛專恣黷貨無厭賢愚易位刑賞紊亂厭於鹽翻紊音問君臣上下專以奢淫相尚以臣觀之大兵一臨瓦解土崩可翹足而待也帝深以為然為伐蜀張本同光二年帝以潞州叛故庚戌詔天下州鎮無得脩城濬隍悉毀防城之具毀防城之具慮天下將卒有憑城而拒命者耳然趙在禮攻魏而魏不能守趙在禮據魏而攻不能拔而帝由是亦死於亂兵防患之道固不在此也同光二年壬子新宣武節度使兼中書令蕃漢馬步總管李存審卒于幽州李存審受宣武之命而未離幽州也常戒諸子曰爾父少提一劍去鄉里少詩照翻存審陳州宛丘人從李罕之歸晉王四十年間位極將相言以節度使同平章事也破骨出鏃者凡百餘因授以所出鏃命藏之曰爾曹生於膏粱當知爾父起家如此也同光二年幽州言契丹將入寇甲寅以橫海節度使李紹斌充東北面行營招討使將大軍渡河而北契丹屯幽州東南城門之外虜騎充斥饋運多為所掠同光二年壬戌以李繼曮為鳳翔節度使嗣李茂貞帥岐同光二年乙丑以權知歸義留後曹義金為節度使時瓜沙與吐蕃雜居義金遣使間道入貢故命之唐懿宗咸通八年張義潮入朝以族子惟深守歸義十三年惟深卒以義金權知留後自咸通十三年至是五十四年蓋曹義金亦已老矣間古莧翻同光二年李嗣源大軍前鋒至潞州日已暝暝莫定翻夕也泊軍方定張廷蘊帥麾下壯士百餘輩踰塹坎城而上帥讀曰率上時掌翻守者不能禦即斬關延諸軍入比明比必利翻及也下比起同嗣源及李紹榮至城已下矣嗣源等不悅以張廷蘊不待其至而先取城也丙寅嗣源奏潞州平六月丙子磔楊立及其黨於鎮國橋磔陟格翻潞州城池高深帝命夷之夷平也同光二年丙戌以武寧節度使李紹榮為歸德節度使同平章事梁都汴移宣武軍於宋州唐滅梁復以汴州為宣武軍以宋州為歸德軍寵遇甚厚帝或時與太后皇后同至其家帝有幸姬色美嘗生子矣劉后妬之會紹榮喪妻喪息浪翻一日侍禁中帝問紹榮汝復娶乎復扶又翻為汝求婚為于偽翻下為之同后因指幸姬曰大家憐紹榮何不以此賜之帝難言不可微許之后趣紹榮拜謝趣讀曰促比起顧幸姬已肩輿出宮矣帝為之託疾不食者累日史言帝憚劉后之妬悍同光二年壬辰以天平節度使李嗣源為宣武節度使代李存審為蕃漢內外馬步總管自副總管陞都總管同光二年秋七月壬寅蜀以禮部尚書許寂為中書侍郎同平章事同光二年孔謙復短王正言於郭崇韜復扶又翻又厚賂伶官章十二行本官作宦乙十一行本同求租庸使終不獲意怏怏癸卯表求解職帝怒以為避事將置於法景進救之得免同光二年梁所決河連年為曹濮患梁決河見二百七十卷均王貞明四年濮博木翻甲辰命右監門上將軍婁繼英督汴滑兵塞之未幾復壞塞悉則翻幾居豈翻同光二年庚申置威塞軍於新州同光二年契丹恃其強盛遣使就帝求幽州以處盧文進處昌呂翻時東北諸夷皆役屬契丹惟勃海未服契丹主謀入寇恐勃海掎其後勃海時為海東盛國置五京十五府六十二州盡有高麗肅慎之地掎居蟻翻遣其將禿餒及盧文進據營平等州以擾燕地燕於賢翻同光二年八月戊辰蜀主以右定遠軍使王宗鍔為招討馬步使帥二十一軍屯洋州帥讀曰率乙亥以長直馬軍使林思鍔為昭武節度使戍利州以備唐同光二年租庸使王正言病風恍惚不能治事恍許昉翻惚音忽治直之翻景進屢以為言癸酉以副使衞尉卿孔謙為租庸使右威衞大將軍孔循為副使循即趙殷衡也梁亡復其姓名歐史曰孔循不知其家世何人也少孤流落於汴州富人李讓闌得之養以為子梁太祖以李讓為養子循乃冒姓朱氏給事太祖帳中太祖諸兒乳母有愛之者養循為子乳母之夫姓趙又冒姓趙名殷衡梁亡事唐始改孔名循按唐天祐二年趙殷衡已權判宣徽院事見二百六十五卷重斂急徵以充帝欲民不聊生癸未賜謙號豐財贍國功臣記曰與其有聚斂之臣寧有盜臣而以是為功臣之號以寵孔謙唐之君臣不知其非也民困軍怨其能久乎為明宗誅謙張本同光二年帝復遣使者李彥稠入蜀九月己亥至成都復扶又翻下復蹂同同光二年癸卯帝獵于近郊時帝屢出遊獵從騎傷民禾稼洛陽令何澤伏於叢薄草聚生曰叢草木交錯曰薄遮馬諫曰陛下賦斂既急今稼穡將成復蹂踐之蹂人九翻又如又翻踐慈演翻使吏何以為理民何以為生臣願先賜死帝慰而遣之諫獵一也中牟令幾不免於死洛陽令乃蒙勞遣者意必有伶官為之容也夷考何澤終身之行實非亮直之士廣州人也薛史何澤廣州人梁貞明中清海節度使劉陟薦其才以進士擢第同光二年契丹攻渤海無功而還還從宣翻又如字同光二年蜀前山南節度使兼中書令王宗儔以蜀主失德與王宗弼謀廢立宗弼猶豫未決庚戌宗儔憂憤而卒宗弼謂樞密使宋光嗣景潤澄等曰宗儔教我殺爾曹今日無患矣光嗣輩俯伏泣謝宗弼子承班聞之謂人曰吾家難乎免矣同光二年乙卯蜀主以前鎮江軍節度使張武為峽路應援招討使蜀置鎮江軍於夔州同光二年丁巳幽州言契丹入寇同光二年冬十月辛未天平節度使李存霸平盧節度使符習言屬州多稱直奉租庸使帖指揮公事使司殊不知有紊規程使司謂節度使司也紊音問近例皆直下時租庸使帖下諸州調發不關節度觀察使謂之直下下戶嫁翻朝廷故事制敕不下支郡節鎮為會府巡屬諸州為支郡今兩道所奏乃本朝舊規租庸所陳是偽廷近事時以梁為偽廷黜之也皆須本道騰奏租庸徵催亦須牒觀察使唐制節度使掌兵事觀察使掌民事故敕租庸徵催止牒觀察使司竟不行史言徵斂嚴急但期趣辦竟不奉敕而行同光二年易定言契丹入寇同光二年蜀宣徽北院使王承休請擇諸軍驍勇者萬二千人置駕下左右龍武步騎四十軍兵械給賜皆優異於他軍以承休為龍武軍馬步都指揮使以裨將安重霸副之舊將無不憤恥重霸雲州人以狡佞賄賂事承休故承休悅之為安重霸背王承休而降唐張本同光二年吳越王鏐復脩本朝職貢錢鏐本唐臣唐亡事梁梁亡復事唐故云復脩本朝職貢壬午帝因梁官爵而命之鏐厚貢獻幷賂權要求金印玉冊賜詔不名稱國王有司言故事惟天子用玉冊王公皆用竹冊竹冊編竹為之以存古意無封國王者帝皆曲從鏐意同光二年吳王如白沙觀樓船更命白沙曰迎鑾鎮路振九國志曰楊溥巡白沙太學博士王穀上書請改白沙為迎鑾其略曰日月所經星辰盡為黃道鑾輿所止井邑皆為赤縣白沙楊子縣地五季之末改楊子為永貞縣宋朝乾德二年以揚州永貞縣迎鑾鎮為建安軍大中祥符六年升為真州而永貞縣先是復改為楊子其地東至揚州六十里南臨大江渡江而南至金陵亦六十里更工衡翻溫以親吏翟虔為閤門宮城武備等使使察王起居先悉薦翻虔防制王甚急使鍾泰章殺張顥閉牙城門討朱瑾皆翟虔也故徐溫親任之翟直格翻王對溫名雨為水溫請其故王曰翟虔父名吾諱之熟矣因謂溫曰公之忠誠我所知也然翟虔無禮宮中及宗室所須多不獲須者意所欲也求也請斬之王曰斬則太過遠徙可也乃徙撫州同光二年十一月蜀主遣其翰林學士歐陽彬來聘考異曰實錄七月戊午蜀主遣戶部侍郎歐陽彬來使致書用敵國禮蜀書後主紀十一月乙未命翰林學士兵部侍郎歐陽彬為唐國通好使今從之衡山人也又遣李彥稠東還李彥稠至蜀見上九月還從宣翻又如字同光二年癸卯帝帥親軍獵于伊闕伊闕縣在洛陽南二百餘里有伊闕山大禹所鑿也宋朝省伊闕縣為鎮入伊陽縣帥讀曰率梁祖帝之仇讎前欲發墓斲棺今使從官拜之何前後之相違也從才用翻涉歷山險連日不止或夜合圍士卒墜崖谷死及折傷者甚衆史言帝荒於從禽而不恤士卒折而設翻丙午還宮同光二年蜀以唐脩好罷威武城戍召關宏業等二十四軍還成都戊申又罷武定武興招討劉潛等三十七軍同光二年丁巳賜護國節度使李繼麟鐵券以其子令德令錫皆為節度使諸子勝衣者即拜官勝音升寵冠列藩朱友謙之寵乃所以速禍也是其反覆多矣能無及乎冠工喚翻同光二年庚申蔚州言契丹入寇同光二年辛酉蜀主罷天雄軍招討命王承騫等二十九軍還成都同光二年十二月乙丑朔蜀主以右僕射張格兼中書侍郎同平章事初格之得罪事見二百七十卷梁均王貞明四年窘渠隕翻及再為相用事杖殺之許寂謂人曰張公才高而識淺戮一魯柔他人誰敢自保此取禍之端也張格則失矣許寂同在相位不知蜀有垂亡之勢但知張格有取禍之端蜀亡為相者得免禍乎同光二年蜀主罷金州屯戍命王承勳等七軍還成都蜀主恃與唐和而徹邊備是馴狎虎豹而不嚴設圈檻也同光二年己巳命宣武節度使李嗣源將宿衞兵三萬七千人赴汴州遂如幽州禦契丹命李嗣源將兵赴鎮因而北出備邊同光二年庚午帝及皇后如張全義第全義大陳貢獻酒酣皇后奏稱妾幼失父母見老者輒思之請父事全義帝許之全義惶恐固辭再三強之竟受皇后拜復貢獻謝恩劉后利張全義之財此如倡婢屈膝於人志在求貨耳惡可以母天下乎強其兩翻復扶又翻明日后命翰林學士趙鳳草書謝全義鳳密奏自古無天下之母拜人臣為父者帝嘉其直然卒行之卒子恤翻自是后與全義日遣使往來問遺不絕遺唯季翻同光二年初唐僖昭之世宦官雖盛未嘗有建節者蜀安重霸勸王承休求秦州節度使承休言於蜀主曰秦州多美婦人請為陛下采擇以獻為于偽翻蜀主許之庚午以承休為天雄節度使封魯國公史言蜀政之亂有唐末之所無者是年十月蜀方置龍武軍同光二年乙亥蜀主以前武德節度使兼中書令徐延瓊為京城內外馬步都指揮使蜀以成都城為京城衆皆不平蜀主之母之皆徐氏也蜀主建遺命不以徐氏兄弟典兵雖王衍昏縱而蜀之臣亦無以建遺命為衍言者王宗弼亦何足任衆之所以不平徐延瓊者但以非次耳同光二年壬午北京言契丹寇嵐州同光之初以鎮州為北都太原為西京尋廢北都復為鎮州以太原為北京嵐盧含翻同光二年辛卯蜀主改明年元曰咸康同光二年盧龍節度使李存賢卒同光二年是歲蜀主徙普王宗仁為衞王雅王宗輅為豳王褒王宗紀為趙王榮王宗智為韓王興王宗澤為宋王彭王宗鼎為魯王忠王宗平為薛王資王宗特為莒王宗輅宗智宗平皆罷軍役章十二行本役作使乙十一行本同蜀以諸王為軍使見二百七十卷梁均王貞明四年三年三年春正月甲午朔蜀大赦三年丙申敕有司改葬昭宗及少帝以其遭朱溫之弒葬故多闕也少詩照翻後唐自以為承唐後終不能改葬昭宗少帝後漢自以為纂漢緒而長陵原陵終乾祐之世不沾一奠史書之以見譏三年契丹寇幽州三年庚子帝發洛陽庚戌至興唐時以魏州為興唐府三年詔平盧節度使符習治酸棗遙隄以禦決河遙隄者遠於平地為之以捍水治直之翻三年初李嗣源北征謂去年北禦契丹時也東京庫有供御細鎧嗣源牒副留守張憲取五百領憲以軍興不暇奏而給之帝怒曰憲不奉詔亶以吾鎧給嗣源何意也罰憲俸一月令自往軍中取之往嗣源軍中取細鎧帝以義武節度使王都將入朝欲闢毬場憲曰比以行宮闕廷為毬場前年陛下即位於此其壇不可毀比毗至翻同光元年帝築壇於魏州牙城之南告天即位請闢毬場於宮西數日未成帝命毀即位壇憲謂郭崇韜曰此壇主上所以禮上帝始受命之地也若之何毀之崇韜從容言於帝從千容翻帝立命兩虞候毀之兩虞候馬軍虞候及步軍虞候一曰左右兩虞候忘天背本不祥莫大焉背蒲妹翻張憲郭崇韜相與私議而不敢廷爭以帝之鷙悍而不可回也三年二月甲戌以橫海節度使李紹斌為盧龍節度使李紹斌至明宗時復姓趙賜名德鈞德鈞守幽州不為無功其後乘危以邀君外與契丹為市不但父子為虜幽州亦為虜有矣三年丙子李嗣源奏敗契丹於涿州敗補邁翻三年上以契丹為憂與郭崇韜謀以威名宿將零落殆盡李紹斌位望素輕欲徙李嗣源鎮真定為紹斌聲援崇韜深以為便時崇韜領真定上欲徙崇韜鎮汴州欲使二人兩易節鎮臣內典樞機外預大政富貴極矣何必更領藩方且㣥臣或從陛下歲久身經百戰所得不過一州臣無汗馬之勞徒以侍從左右侍從才用翻時贊聖謨致位至此常不自安今因委任勳賢使臣得解旄節乃大願也且汴州關東衝要汴州在成皋關之東南通淮泗北接滑魏衝要之地也臣既不至治所徒令他人攝職何異空城非所以固國基也上曰深知卿忠盡然卿為朕畫策襲取汶陽保固河津既而自此路直章十二行本直上有乘虛二字乙十一行本同趨大梁成朕帝業為于偽翻取汶陽謂取鄆州保固河津謂築壘馬家口與取大梁事並見上卷元年汶音問趨七喻翻豈百戰之功可比乎今朕貴為天子豈可使卿曾無尺寸之地乎崇韜固辭不已上乃許之庚辰徙李嗣源為成德節度使三年漢主聞帝滅梁而懼遣宮苑使何詞入貢且覘中國強弱覘丑廉翻又丑豔翻甲申詞至魏時帝在魏都還從宣翻又如字言帝驕淫無政不足畏也漢主大悅自是不復通中國復扶又翻無敵國外患者國恆亡漢主既知唐之不足畏奢虐亦由是滋矣三年帝性剛好勝好呼到翻不欲權在臣下入洛之後信伶宦之讒頗疏忌宿將李嗣源家在太原三月丁酉表衞州刺史李從珂為北京內牙馬步都指揮使以便其家帝怒曰嗣源握兵權居大鎮軍政在吾安得為其子奏請得為于偽翻乃黜從珂為突騎指揮使帥數百人戍石門鎮石門鎮即唐之橫水柵帥讀曰率上章申理久之方解上時掌翻申者重也重自理說辛丑嗣源乞至東京朝覲不許郭崇韜以嗣源功高位重亦忌之私謂人曰總管令公非久為人下者李嗣源為中書令蕃漢內外馬步軍都總管故以稱之密勸帝召之宿衞罷其兵權又勸帝除之帝皆不從為李嗣源疑懼張本郭崇韜其亦自知為伶宦所忌乎三年己酉帝發興唐自德勝濟河歷楊村戚城觀昔時戰處指示㣥臣以為樂此即帝自言我於十指上得天下之故態也樂音洛三年洛陽宮殿宏邃宦者欲上增廣嬪御詐言宮中夜見鬼物上欲使符呪者攘之符水厭祝巫覡挾術以欺世者為之攘卻也臣昔逮事咸通乾符天子逮及也咸通唐懿宗年號乾符僖宗年號六宮貴賤不減萬人今掖庭太半空虛故鬼物遊之耳上乃命宦者王允平伶人景進采擇民間女子遠至太原幽鎮以充後庭不啻三千人不問所從來上還自興唐還從宣翻又如字載以牛車纍纍盈路張憲奏諸營婦女亡逸者千餘人慮扈從諸軍挾匿以行其實皆入宮矣諸營謂魏州諸營也史言帝之結怨於魏卒者非一事從才用翻庚辰帝至洛陽辛酉詔復以洛陽為東都興唐府為鄴都唐之盛時以洛陽為東都同光之初以晉陽為西京魏州為東京尋以洛陽為洛都今復唐舊以洛陽為東都則亦復以長安為西京矣晉陽之西京先已改為北都洛陽既復東京之舊又改魏州之東京為鄴都然相州乃古鄴地魏州治元城非鄴地也鄴戰國時為魏邑漢為鄴縣魏郡治焉漢末曹操為魏王居鄴前燕慕容暐都鄴置貴鄉縣屬昌樂郡水經註所謂沙丘堰有貴鄉者也隋開皇三年罷昌樂郡貴鄉縣屬魏州遂為州治所此時與興唐縣並置於郭下興唐本元城莊宗以魏州為鄴都特以漢魏郡治鄴曹操以魏王都鄴而名之耳然相州自隋以來治安陽而鄴為屬縣魏州相州治所皆非古鄴也三年夏四月癸亥朔日有食之三年初五臺僧誠惠以妖妄惑人自言能降伏天龍降戶江翻命風召雨帝尊信之親帥后及皇弟皇子拜之帥讀曰率誠惠安坐不起㣥臣莫敢不拜章十二行本拜下有獨郭崇韜不拜六字乙十一行本同時大旱帝自鄴都迎誠惠至洛陽使祈雨士民朝夕瞻仰數旬不雨或謂誠惠謂者告語之也官以師祈雨無驗將焚之官謂莊宗師謂誠惠慚懼而卒史言異端率妖妄不足信三年庚寅中書侍郎同平章事趙光胤卒三年太后自與太別二年正月太后離晉陽樂音洛雖娛玩盈前未嘗解顏太既別太后亦邑邑成疾太后遣中使醫藥相繼於道聞疾稍加輒不食又謂帝曰吾與太恩如兄弟欲自往省之省悉景翻帝以天暑道遠苦諫久之乃止但遣皇弟存渥等往迎侍五月丁酉北都奏太薨太后悲哀不食者累日帝寬譬不離左右太后自是得疾又欲自往會太葬帝力諫而止離力智翻太后之悲慕以太有以得其心耳三年閩王審知寢疾命其子節度副使延翰權知軍府事三年自春夏大旱六月壬申始雨三年帝苦溽暑溽儒欲翻溽暑濕熱也於禁中擇高涼之所皆不稱旨稱尺證翻宦者因言臣見長安全盛時大明興慶宮樓觀以百數唐都長安大明宮東內也興慶宮南內也觀工喚翻宮殿之盛曾不及當時公卿第舍耳帝乃命宮苑使王允平別建一樓以清暑宦者曰郭崇韜常不伸眉為孔謙論用度不足為于偽翻恐陛下雖欲營繕終不可得上曰吾自用內府錢無關經費經費謂國之經常調度其費仰於租庸使者遣中使語之曰語牛倨翻今歲盛暑異常朕昔在河上與梁人相拒行營卑濕被甲乘馬被皮義翻親當矢石猶無此暑今居深宮之中而暑不可度柰何對曰陛下昔在河上勍敵未滅勍渠京翻深念讎恥雖有盛暑不介聖懷今外患已除海內賓服故雖珍臺閒館猶覺鬱蒸也陛下儻不忘艱難之時則暑氣自消矣郭崇韜之言其指明居養之移人可謂婉切其如帝不聽何宦者曰崇韜之第無異皇居宜其不知至尊之熱也帝卒命允平營樓卒子恤翻日役萬人所費巨萬崇韜諫曰今兩河水旱軍食不充願且息役以俟豐年帝不聽三年帝將伐蜀辛卯詔天下括市戰馬三年吳鎮海節度判官楚州團練使陳彥謙有疾陳彥謙徐溫所親信者也遺之醫藥金帛相屬於道遺唯季翻下同屬之欲翻彥謙臨終密留書遺徐溫請以所生子為嗣以父子血氣所屬之親感動徐溫三年太后疾甚秋七月甲午成德節度使李嗣源以邊事稍弭表求入朝省太后省悉景翻帝不許壬寅太后殂帝哀毀過甚五日方食三年八月癸未杖殺河南令羅貫初貫為禮部員外郎性強直為郭崇韜所知用為河南令為政不避權豪伶宦請託書積几案一不報皆以示崇韜崇韜奏之由是伶宦切齒河南尹張全義亦以貫高伉惡之伉苦浪翻惡烏路翻遣婢訴於皇后劉后以父事張全義故得遣婢出入宮掖帝含怒未發會帝自往壽安視坤陵役者九域志壽安縣在洛陽西南七十里五代會要曰上欲祔太后於代州太祖園陵中書門下奏議曰人君以四海為家不當分南北洛陽是帝王之宅四時朝拜理須便近不能遠幸代州漢朝諸陵皆近秦雍國家園寢布列京畿後魏文帝自代遷洛之後園陵皆在河南兼敕應勳臣之家不許北葬今魏氏諸陵尚在京畿祔葬代州理未為允於是作坤陵濘乃定翻淖也橋多壞帝問主者為誰宦官對屬河南帝怒下貫獄獄吏榜掠下戶嫁翻榜音彭掠音亮體無完膚明日傳詔殺之崇韜諫曰貫坐橋道不脩法不至死帝怒曰太后靈駕將發天子朝夕往來橋道不脩卿言無罪是黨也崇韜曰陛下以萬乘之尊怒一縣令使天下謂陛下用法不平臣之罪也帝曰既公所愛任公裁之拂衣起入宮崇韜隨之論奏不已帝自闔殿門崇韜不得入貫竟死暴尸府門遠近冤之羅貫之死崇韜可以去而不能去自致夷滅哀哉三年丁亥遣吏部侍郎李德休等賜吳越國王玉冊金印紅袍御衣三年九月蜀主與太后太遊青城山歷丈人觀上清宮青城山在蜀州青城縣北三十三里杜光庭曰岷山連峯接岫千里不絕青城山乃第一峯也丈人觀在青城北二十里上清宮在高臺山丈人祠之側高臺山在岷山上有天池晉朝立天宮於上號上清宮彭州濛陽縣北四十里有葛仙山二十四化之第五化也還從宣翻又如字三年乙未立皇子繼岌為魏王三年丁酉帝與宰相議伐蜀威勝節度使李紹欽素諂事宣徽使李紹宏紹宏薦紹欽有蓋世奇才雖孫吳不如可以大任郭崇韜曰段凝亡國之將姦諂絕倫不可信也改鄧州宣化軍為威勝軍段凝降賜姓名李紹欽事並見上卷元年崇韜曰契丹方熾總管不可離河朔離力智翻魏王地當儲副未立殊功請依故事以為伐蜀都統安祿山之亂玄宗分命諸子為諸道都統此唐故事也帝曰兒幼豈能獨往當求其副既而曰無以易卿庚子以魏王繼岌充西川四面行營都統崇韜充東北面行營都招討制置等使軍事悉以委之又以荊南節度使高季興充東南面行營都招討使鳳翔節度使李繼曮充都供軍轉運應接等使同州節度使李令德充行營副招討使陝州節度使李紹琛充蕃漢馬步軍都排陳斬斫使兼馬步軍都指揮使李令德朱友謙之子也李紹琛康延孝也皆降唐賜姓名陳讀曰陣華州節度使毛璋充左廂馬步都虞候邠州節度使董璋充右廂馬步都虞候客省使李嚴充西川管內招撫使將兵六萬伐蜀仍詔季興自取夔忠萬三州為巡屬唐時夔忠萬三州本屬荊南節度唐末之亂王建據蜀併而有之以供奉官李從襲充中軍馬步都指揮監押高品李廷安呂知柔充魏王府通謁李從襲等皆宦官也辛丑以工部尚書任圜翰林學士李愚並參預都統軍機三年自六月甲午雨罕見日星江河百川皆溢凡七十五日乃霽三年郭崇韜以北都留守孟知祥有薦引舊恩事見二百七十卷梁均王貞明五年言於上曰孟知祥信厚有謀若得西川而求帥無踰此人者帥所類翻又薦鄴都副留守張憲謹重有識可為相戊申大軍西行三年蜀安重霸勸王承休請蜀主東遊秦州承休到官即毀府署作行宮大興力役強取民間女子教歌舞圖形遺韓昭遺唯季翻韓昭諛佞蜀主狎而信之使言於蜀主又獻花木圖盛稱秦州山川土風之美蜀主將如秦州㣥臣諫者甚衆皆不聽王宗弼上表諫蜀主投其表於地太后涕泣不食止之亦不能得前秦州節度判官蒲禹卿上表幾二千言上時掌翻幾居依翻其略曰先帝艱難創業欲傳之萬世陛下少長富貴少詩照翻長知兩翻荒色惑酒秦州人雜羌胡地多瘴癘萬衆困於奔馳郡縣罷於供億瘴之亮翻罷讀曰疲鳳翔久為仇讎必生釁隙唐國方通歡好恐懷疑貳好呼到翻言無事舉兵東出恐因而致寇先皇未嘗無故盤游陛下率意頻離宮闕離力智翻秦皇東狩鑾駕不還見秦紀龍舟不返見隋紀雄視鄰邦邊庭無烽火之虞境內有腹心之疾百姓失業盜賊公行昔李勢屈於桓溫見九十七卷晉孝宗永和三年見七十七卷魏元帝景元四年降戶江翻不足憑恃韓昭謂禹卿曰吾收汝表俟主上西歸自秦州歸成都曰西歸蜀主歸未及以問蒲禹卿而韓昭身首已異處矣蜀主私焉故銳意欲行三年冬十月排陳斬斫使李紹琛與李嚴將驍騎三千步兵萬人為前鋒招討判官陳乂至寶雞稱疾乞留李愚厲聲曰陳乂見利則進懼難則止今大軍涉險自寶雞入散關則涉棧閣之險易以豉翻宜斬以徇由是軍中無敢顧望者乂薊州人也薊音計三年癸亥蜀主引兵數萬發成都甲子至漢州武興節度使王承捷告唐兵西上蜀置武興軍於鳳州唐自關東進兵攻蜀為西上上時掌翻沮在呂翻猶不信大言曰吾方欲耀武遂東行在道與㣥臣賦詩殊不為意三年丁丑李紹琛攻蜀威武城蜀指揮使唐景思將兵出降城使周彥禋等知不能守亦降考異曰實錄十月戊寅魏王繼岌至鳳州王承捷以鳳興文成四州降前一日康延孝李嚴至故鎮威武城唐景思等降按今故鎮在鳳州西四程延孝未下鳳州何能先至故鎮又蜀之守禦必在鳳州之東或者當時鳳州之東別有威武城亦名故鎮非今之故鎮歟秦州人也得城中糧二十萬斛紹琛縱其敗兵萬餘人逸去因倍道趣鳳州縱敗兵先去以懼蜀人而倍道踵其後以趣鳳州趣七喻翻李繼曮竭鳳翔蓄積以饋軍不能充人情憂恐郭崇韜入散關指其山曰吾輩進無成功不得復還此矣當盡力一決一決者一決戰也復扶又翻下同宜先取鳳州因其糧諸將皆言蜀地險固未可長驅宜按兵觀釁崇韜以問李愚愚曰蜀人苦其主荒淫莫為之用宜乘其人心崩離風驅霆擊彼皆破膽雖有險阻誰與守之兵勢不可緩也是日李紹琛告捷是日崇韜入散關之日也蓋即丁丑謂李愚曰公料敵如此吾復何憂乃倍道而進復扶又翻戊寅王承捷以鳳興文扶四州印節迎降四州州印及武興節度使印及旌節也糧四十萬斛崇韜曰平蜀必矣兵威已振有糧可因知功必成己卯蜀主至利州威武敗卒奔還始信唐兵之來王宗弼宋光嗣言於蜀主曰東川山南兵力尚完東川謂梓遂諸州山南謂興元諸州唐人安敢懸兵深入從之庚辰以隨駕清道指揮使王宗勳王宗儼兼侍中王宗昱為三招討將兵三萬逆戰從駕兵自綿漢至深渡從才用翻深渡在利州綿谷縣北大漫天小漫天之間千里相屬屬之欲翻皆怨憤曰龍武軍糧賜倍於他軍龍武糧賜優厚事見上年李紹琛等過長舉長舉漢沮縣地西魏置盤頭郡隋置長舉縣唐屬興州九域志在州西一百里且請先治橋棧以俟唐軍璉力展翻治直之翻棧士限翻由是軍行無險阻之虞辛巳興州刺史王承鑒棄城走紹琛等克興州考異曰實錄甲申魏王至故鎮康延孝收興州十國紀年辛巳承鑒出奔甲申繼岌郭崇韜至威武城今從之乙酉成州刺史王承朴棄城走九域志興州西至成州二百一十五里三泉縣唐屬興元府九域志興州東南至三泉一百四十五里有百牢關金牛道之險斬首五千級餘衆潰走又得糧十五萬斛於三泉由是軍食優足優饒也三年戊子葬貞簡太后于坤陵三年蜀主聞王宗勳等敗自利州倍道西走斷桔柏津浮梁桔古屑翻斷音短命中書令判六軍諸衞事王宗弼將大軍守利州且令斬王宗勳等三招討以三泉之敗也李紹琛晝夜兼行趣利州九域志三泉西至利州一百八十九里趣七喻翻遺唯季翻請唐兵不入境當舉巡屬內附苟不如約則背城決戰以報本朝背蒲昧翻宋光葆謂蜀為本朝朝直遙翻崇韜復書撫納之乙章十二行本乙作己乙十一行本同張校同云無註本亦誤乙丑魏王繼岌至興州光葆以梓綿劍龍普五州武定節度使王承肇以洋蓬壁三州山南節度使章十二行本使下有兼侍中三字乙十一行本同王宗威以梁開通渠麟五州渠州潾山縣唐武德元年置潾州八年州廢以潾山縣屬渠州當是蜀復置潾州也麟當作潾音力珍翻又唐貞觀中置麟州以處生羌歸附者屬松州都督府唐至德後淪沒久矣當以渠潾之潾為是皆降承肇宗侃之子也自餘城鎮皆望風款附天雄節度使王承休與副使安重霸謀掩擊唐軍欲自秦州掩擊唐軍之後擊之不勝則大事去矣蜀中精兵十萬天下險固唐兵雖勇安能直度劍門邪然公受國恩聞難不可不赴難乃旦翻願與公俱西言自秦州西赴成都以為然重霸請賂羌人買文扶州路以歸承休從之使重霸將龍武軍及所募兵萬二千人以從將行州人餞於城外承休上道以從才用翻上時掌翻重霸拜於馬前曰國家竭力以得秦隴蜀得秦隴見二百六十九卷梁均王貞明元年朝直遙翻誰當守之開府行矣重霸請為公留守蜀蓋加王承休開府儀同三司故稱之為于偽翻下為陳同守式又翻無如之何遂與招討副使王宗汭自扶文而南其地皆不毛羌人抄之抄楚交翻且戰且行士卒凍餒比至茂州餘衆二千而已此自秦州取道文扶循山至茂州也為王承休宗汭為魏王繼岌所誅張本比必利翻三年高季興常欲取三峽畏蜀峽路招討使張武威名不敢進至是乘唐兵勢使其子行軍司馬從誨權軍府事自將水軍上峽取施州張武以鐵鎖斷江路斷音短季興遣勇士乘舟斫之會風大起舟絓於鎖不能進退絓音掛矢石交下壞其戰艦壞音怪季興輕舟遁去使蜀之邊帥盡如張武散關豈易入哉為後孟知祥復用張武張本以夔忠萬三州遣使詣魏王降三年郭崇韜遺王宗弼等書為陳利害遺唯季翻李紹琛未至利州宗弼棄城引兵西歸王宗勳等三招討追及宗弼於白芀九域志簡州金水縣有白芀鎮芀都聊翻探吐南翻宋光嗣令我殺爾曹因相持而泣遂合謀送款於唐鄧廣銘標點聶崇岐覆校
