body:
  text: 資治通鑑卷第二百九十二端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千六百戶食實封一千戶臣司馬光奉敕編集後學天台音註後周紀三太祖聖神恭肅文武孝皇帝下顯德元年甲寅九五四五月甲戌朔王逵自潭州遷于朗州以周行逢知潭州事以潘叔嗣為岳州團練使已而潘叔嗣殺王逵而周行逢收田父漁者之功矣丙子帝至晉陽城下帝自上黨趣晉陽七日而至史言周兵之盛幟昌志翻環音宦召與計事欲圖之處謙知之不往袞使胡騎數十守其城門處謙殺之因閉門拒袞袞奔歸契丹契丹主怒其無功囚之處謙舉城來降丁丑置靜塞軍於代州以鄭處謙為節度使創置方鎮以懷撫鄭處謙處昌呂翻契丹數千騎屯忻代之間為北漢之援庚辰遣符彥卿等將步騎萬餘擊之彥卿入忻州契丹退保忻口九域志忻州秀容縣有忻口寨在石嶺關南丁亥置寧化軍於汾州以石沁二州隸之代州將桑珪解文遇殺鄭處謙沁七鴆翻解戶買翻姓也姓苑云自唐叔虞食邑於解晉有解狐解揚誣奏云潛通契丹符彥卿奏請益兵癸巳遣李筠張永德將兵三千赴之契丹游騎時至忻州城下丙申彥卿與諸將陳以待之陳讀曰陣史彥超將二十騎為前鋒二十太少恐當作二千與戰李筠引兵繼之殺契丹二千人彥超恃勇輕進去大軍浸遠衆寡不敵為契丹所殺筠僅以身免周兵死傷甚衆彥卿退保忻州尋引兵還晉陽還從宣翻又如字下同府州防禦使折德扆將州兵來朝將即亮翻辛丑復置永安軍於府州復扶又翻漢乾祐三年罷永安軍見二百八十九卷以德扆為節度使時大發兵夫東自懷孟西及蒲陝以攻晉陽不克會久雨士卒疲病章十二行本病下有及史彥超死五字乙十一行本同孔本同張校同退齋校同乃議引還陝失冉翻考異曰世宗實錄徵懷孟蒲陝丁夫數萬攻城旦夕之間期於必取會大雨軍士勞苦又聞忻口之師不振帝數日憂沮不食遂決還京之意晉陽見聞錄六月旦周師南轅返旆惟數百騎間之以步卒千人長槍赤甲衒趫捷跳梁於城隅晡晚殺行而抽退今從世宗實錄初王得中返自契丹北漢主遣王得中求救於契丹見上卷本年三月留止代州及桑珪殺鄭處謙囚得中送于周軍帝釋之賜以帶馬問虜兵何時當至得中曰臣受命送楊袞他無所求或謂得中曰契丹許公發兵公不以實告契丹兵即至公得無危乎得中太息曰吾食劉氏祿有老母在圍中若以實告周人必發兵據險以拒之如此家國兩亡吾獨生何益不若殺身以全家國所得多矣甲辰帝以得中欺罔縊殺之王得中之死知所惡有甚於死者也乙巳帝發晉陽匡國節度使藥元福言於帝曰進軍易退軍難進軍者或乘初至之銳或乘屢勝之勢敵人畏讋自守不敢迎戰故易退軍者士有歸志敵人據險遮其前率衆躡其後輜重老弱皆足為吾之累故難易以豉翻朕一以委卿元福乃勒兵成列而殿殿丁練翻北漢果出兵追躡元福擊走之然軍還怱遽還從宣翻芻糧數十萬在城下悉焚棄之軍中訛言相驚或相剽掠軍須失亡不可勝計剽匹妙翻凡行軍所欲得以為用者皆謂之軍須勝音升所得北漢州縣周所置刺史等皆棄城走惟代州桑珪既叛北漢又不敢歸周嬰城自守北漢遣兵攻拔之前所謂都府未拔雖得屬郡而無益者要其終也乙酉帝至潞州甲子至鄭州以乙巳發晉陽甲子至鄭州考之中間不應以乙酉至潞州恐是乙卯丙寅謁嵩陵嵩陵復土帝適有軍旅之事不獲親之此其謁陵與彞制謁陵其情有不同者庚午至大梁帝違衆議破北漢自是政事無大小皆親決百官受成於上而已河南府推官高錫上書諫以為四海之廣萬機之衆雖堯舜不能獨治治直之翻必擇人而任之今陛下一以身親之天下不謂陛下聰明睿智足以兼百官之任皆言陛下褊迫疑忌舉不信㣥臣也褊補典翻不若選能知人公正者以為宰相能愛民聽訟者以為守令守式又翻能豐財足食者使掌金穀能原情守法者使掌刑獄陛下但垂拱明堂視其功過而賞罰之天下何憂不治何必降君尊而代臣職屈貴位而親賤事無乃失為政之本乎帝不從錫河中人也北漢主憂憤成疾悉以國事委其子侍衞都指揮使承鈞河西節度使申師厚不俟詔亶棄鎮入朝太祖廣順元年申師厚鎮河西事見二百九十卷秋七月癸酉朔責授率府副率唐制東宮十率府皆有副率其後遂以為宀儿散之官申師厚以藩府失職牙將而得節棄鎮亶歸雖加責授猶勝故吾丁丑加吳越王錢弘俶天下兵馬都元帥癸巳加門下侍郎同平章事范質守司徒以樞密直學士工部侍郎長山景範為中書侍郎同平章事判三司長山漢於陵縣地江左僑置廣川郡及武強縣隋廢郡改武強曰長山唐屬淄州九域志在州北五十五里景姓也姓苑云齊景公之後余姑以春秋時言之晉宋皆有景公何獨齊哉乙未以樞密副使魏仁浦為樞密使范質既為司徒司徒竇貞固歸洛陽府縣以民視之府縣謂河南府及洛陽縣也貞固訴於留守向訓訓不聽以竇貞固漢之舊臣故也考古驗今今何足怪初帝與北漢主相拒於高平命前澤州刺史李彥崇將兵守江豬嶺遏北漢主歸路彥崇聞樊愛能等南遁引兵退北漢主果自其路遁去八月己酉貶彥崇率府副率己巳廢鎮國軍唐末以華州為鎮國軍初太祖以建雄節度使王晏有拒北漢之功王晏拒北漢事見二百九十卷太祖廣順元年徙晏為武寧節度使武寧軍徐州滕縣屬焉九域志滕縣在州北一百九十里少詩照翻至鎮悉召故黨贈之金帛鞍馬謂曰吾鄉素名多盜昔吾與諸君皆嘗為之想後來者無能居諸君之右諸君幸為我語之使勿復為幸為于偽翻下請為同語牛倨翻復扶又翻為者吾必族之於是一境清肅九月徐州人請為之立衣錦碑衣於既翻許之冬十月甲辰左羽林大將軍孟漢卿坐納藳稅藳禾稈也多取耗餘場官藳場之官耗餘者於納藳束正數之外又多取之言以備耗折也有司奏漢卿罪不至死上曰朕知之欲以懲衆耳己酉廢安遠永清軍唐以安州為安遠軍晉以貝州為永清軍初宿衞之士累朝相承務求姑息不欲簡閱恐傷人情由是羸老者居多羸倫為翻但驕蹇不用命實不可用每遇大敵不走即降其所以失國亦多由此如唐閔帝潞王是也始知其弊癸亥謂侍臣曰凡兵務精不務多今以農夫百未能養甲士一柰何浚民之膏澤養此無用之物乎且健懦不分衆何所勸乃命大簡諸軍精銳者升之上軍羸者斥去之去羌呂翻又以驍勇之士多為藩鎮所蓄詔募天下壯士咸遣詣闕命太祖皇帝選其尤者為殿前諸班今之班直是也五代會要曰時詔募天下豪傑不以草澤為阻送於闕下躬親閱試選武藝超絕及有身首者分署為殿前諸班因有散員散指揮使內殿直散都頭鐵騎控鶴之號各命將帥選之帥所類翻由是士卒精強近代無比征伐四方所向皆捷選練之力也史言周世宗強兵之效戊辰帝謂侍臣曰諸道盜賊頗多討捕終不能絕蓋由累朝分命使臣巡檢致藩侯守令皆不致力宜悉召還專委節鎮州縣責其清肅河自楊劉至于博州百二十里連年東潰分為二派匯為大澤派普拜翻匯戶罪翻水回合也彌漫數百里又東北壞古堤而出壞音怪古隄前代所築以防河者河屢徙故古隄在平地灌齊棣淄諸州至于海涯漂沒民田廬不可勝計流民採菰稗捕魚以給食勝音身菰音孤蔣也稗旁卦翻草似穀者朝廷屢遣使者不能塞塞悉則翻下同十一月戊戌帝遣李穀詣澶鄆齊按視隄塞役徒六萬三十日而畢北漢主疾病命其子承鈞監國疾甚曰病年六十考異曰劉恕云世宗實錄薛史帝紀僭偽傳皆云顯德二年十一月劉崇卒大定錄云顯德二年春旻病死紀年通譜顯德二年崇之乾祐八年冬崇死顯德三年承鈞改元天會開寶元年承鈞之天會十三年死開寶二年繼元改元廣運興國四年繼元之廣運十一年也河東劉氏有國全無記錄惟其舊臣中書舍人直翰林院王保衡歸朝後所纂晉陽偽署見聞要錄云甲寅年春南伐敗歸夏周師攻圍旻積憂勞成心疾是冬卒鈞即位丁巳年正月旦改乾祐十年為天會元年又云鈞丙戌年二十九嗣位年四十三卒右諫議大夫楊夢申奉敕撰大漢都統追封定王劉繼顒神道碑云天會十二年今皇帝踐阼之初年也十七年繼顒卒末題廣運元年歲次甲戌九月丙午朔今按周廣順元年辛亥旻即帝位稱乾祐四年顯德元年甲寅旻之乾祐七年也旻卒鈞立顯德四年丁巳鈞改乾祐十年為天會元年宋開寶元年戊辰鈞之天會十二年也鈞卒繼元立開寶七年甲戌繼元改天會十八年為廣運元年據曆是歲九月丙午朔興國四年己卯繼元之廣運六年也鈞以唐天成元年丙戌生至顯德元年甲寅嗣位乃二十九歲矣鈞及繼元踰年未改元蓋孟蜀後主漢隱帝周世宗之比也諸書皆傳聞相因前後相戾惟晉陽見聞錄劉繼顒碑歲月最可考正故以為據契丹遣驃騎大將軍知內侍省事劉承訓冊命承鈞為帝更名鈞鈞漢主旻次子也更工衡翻既嗣位勤於為政愛民禮士境內粗安粗坐五翻每上表於契丹主稱男契丹主賜之詔謂之兒皇帝馬希萼之帥㣥蠻破長沙也事見二百八十九卷漢隱帝乾祐三年帥讀曰率皆為漵州蠻酋苻彥通所掠漵音敍酋慈由翻彥通由是富強稱王於溪洞間王逵既得湖南去年六月王逵殺劉言始盡得湖南故地事見上卷募能往者其將王虔朗請行既至彥通盛侍衞而見之禮貌甚倨虔朗厲聲責之曰足下自稱苻秦苗裔苻秦之亡苻宏奔晉從諸桓於荊楚其後無聞彥通自以為苻秦苗裔蓋言出於宏之後有以異於㣥蠻昔馬氏在湖南足下祖父皆北面事之今王公盡得馬氏之地足下不早往乞盟致使者先來又不接之以禮異日得無悔乎言大兵若至雖悔無及起執虔朗手謝之虔朗知其可動因說之曰溪洞之地隋唐之世皆為州縣著在圖籍說式芮翻溪洞之地隋唐列為郡縣皆屬黔中道今足下上無天子之詔下無使府之命使府謂湖南都府王于況翻不過蠻夷一酋長耳酋慈秋翻長知兩翻曷若去王號自歸於王公王公必以天子之命授足下節度使與中國侯伯等夷豈不尊榮哉彥通大喜即日去王號去羌呂翻因虔朗獻銅鼓數枚於王逵谿峒諸蠻鑄銅為大鼓初成懸於庭中置酒以招同類豪富子女則以金銀為大釵執以扣鼓竟乃留遺主人名為銅鼓釵俗好相殺多構仇怨欲相攻則鳴此鼓至者如雲虔朗一言勝數萬兵真國士也承制以彥通為黔中節度使黔中自唐末至二蜀為武泰軍節度黔其今翻預聞府政章十二行本政下有虔朗桂州人也六字乙十一行本同孔本同退齋校同預聞湖南都府之政逵慮西界鎮遏使錦州刺史劉瑫為邊患王逵之逐邊鎬也以劉瑫鎮遏㣥蠻鎮南軍洪州屬唐王逵表以其號寵劉瑫耳是歲湖南大饑民食草木實武清節度使知潭州事周行逢自彭師暠等擁立馬希萼於衡山自署武清節度使王逵因之以授周行逢全活甚衆行逢起於微賤知民間疾苦勵精為治嚴而無私治直吏翻辟署僚屬皆取廉介之士約束簡要章十二行本要下有吏民便之四字乙十一行本同孔本同張校同其自奉甚薄或譏其太儉行逢曰馬氏父子窮奢極靡不恤百姓今子孫乞食於人又足效乎為行逢跨有潭朗張本世宗睿武孝文皇帝上諱榮本姓柴氏邢州龍岡人柴氏女適太祖是為聖穆皇后后兄守禮生帝從姑長於太祖家以謹厚見愛太祖遂以為子顯德二年乙卯九五五春正月庚辰上以漕運自晉漢以來不給斗耗綱吏多以虧欠抵死詔自今每斛給耗一斗定難節度使李彞興李彞興即彞殷也避宋朝宣祖廟諱始改名彞興史以後來所更名書之難乃旦翻與己並列恥之夏州自唐以來為緣邊大鎮李氏又世襲節度使府州漢氏方置節鎮折氏父子又晚出故恥與並列塞悉則翻癸未上謀於宰相對曰夏州邊鎮朝廷向來每加優借府州褊小得失不繫重輕且宜撫諭彞興庶全大體上曰德扆數年以來盡忠戮力以拒劉氏柰何一旦棄之且夏州惟產羊馬貿易百貨悉仰中國貿音茂仰牛向翻我若絕之彼何能為乃遣供奉官齊藏珍齎詔書責之風俗通云凡氏之興九事氏於國者齊魯宋衞是也余按左傳衞有大夫齊氏此豈氏於國乎戊子蜀置威武軍於鳳州辛卯初令翰林學士兩省官舉令錄除官之日仍署舉者姓名若貪穢敗官並當連坐敗補邁翻契丹自晉漢以來屢寇河北輕騎深入無藩籬之限郊野之民每困殺掠言事者稱深冀之間有胡盧河橫亙數百里可浚之以限其奔突胡盧河俗謂之葫蘆河即衡漳水在東光縣西三十里詔忠武節度使王彥超彰信節度使韓通周改曹州威信軍為彰信軍避太祖諱也築城於李晏口留兵戍之冀州蓨縣東北有李晏鎮時築城屯軍以為靜安軍按薛史其軍南距冀州百里北距深州三十里夾胡盧河為壘將即亮翻問以備邊之策藏英具陳地形要害請列置戍兵募邊人驍勇者厚其稟給自請將之隨便宜討擊帝皆從之以藏英為沿邊巡檢招收都指揮使藏英到官數月募得千餘人王彥超等行視役者行下孟翻嘗為契丹所圍藏英引所募兵馳擊大破之自是契丹不敢涉胡盧河河南之民始得休息此河南謂胡盧河之南也二月庚子朔日有食之蜀夔恭孝王仁毅卒仁毅蜀主之弟也壬戌詔㣥臣極言得失其略曰朕於卿大夫才不能盡知面不能盡識若不采其言而觀其行行下孟翻審其意而察其忠則何以見器略之淺深知任用之當否當丁浪翻若言之不入罪實在予苟求之不言咎將誰執唐主以中書侍郎知尚書省嚴續為門下侍郎同平章事三月辛未以李晏口為靜安軍帝常憤廣明以來中國日蹙唐僖宗廣明元年黃巢入長安自此之後強藩割據中國日蹙矣慨然有削平天下之志會秦州民夷有詣大梁獻策請恢復舊疆者以唐全盛版圖言之蜀亦舊疆也以漢晉事言之則契丹入中原重以王景崇之亂階成秦鳳遂入於蜀為取階成秦鳳張本蜀主聞之遣客省使趙季札按視邊備季札素以文武才略自任使還奏稱雄武節度使韓繼勳蜀置雄武節度於秦州使疏吏翻還從宣翻又如字不足以禦大敵蜀主問誰可往者季札請自行丙申以季札為雄武監軍使仍以宿衞精兵千人為之部曲帝以大梁城中迫隘隘烏懈翻夏四月乙卯詔展外城先立標幟幟昌志翻俟今冬農隙興板築東作動則罷之更俟次年以漸成之且令自今葬埋皆出所標七里之外其標內俟縣官分畫街衢倉場營廨之外廨古隘翻聽民隨便築室丙辰蜀主命知樞密院王昭遠按行北邊城寨及甲兵以備周也行下孟翻上謂宰相曰朕每思致治之方未得其要寢食不忘治直吏翻又自唐晉以來吳蜀幽幷皆阻聲教未能混壹吳李氏蜀孟氏幽入於契丹幷為北漢朕將覽焉比部郎中王朴獻策比音毗以為中國之失吳蜀幽幷皆由失道梁失吳後唐得蜀而復失之晉失幽周失幷然後知所以取之之術其始失之也莫不以君暗臣邪兵驕民困姦黨內熾武夫外橫橫戶孟翻因小致大積微成著今欲取之莫若反其所為而已夫進賢退不肖所以收其才也恩隱誠信所以結其心也隱卹也所以盡其力也去奢節用所以豐其財也去羌呂翻時使薄斂所以阜其民也時使者使之以時也斂力贍翻政事既治財用既充士民既附然後舉而用之功無不成矣彼之人觀我有必取之勢則知其情狀者願為間諜知其山川者願為鄉導間古莧翻下伺間同諜達協翻鄉讀曰嚮民心既歸天意必從矣凡攻取之道必先其易者唐與吾接境幾二千里其勢易擾也唐與中國以淮為境自淮源東至海幾二千里易以豉翻備東則擾西備西則擾東彼必奔走而救之奔走之間可以知其虛實強弱然後避實擊虛避強擊弱未須大舉且以輕兵擾之南人懦怯聞小有警必悉師以救之師數動則民疲而財竭數所角翻不悉師則我可以乘虛取之如此江北諸州將悉為我有帝之取江北王朴之計也則用彼之民行我之法江南亦易取也得江南則嶺南巴蜀可傳檄而定時劉氏據嶺南孟氏據巴蜀王朴欲乘勝勢以先聲下之則燕地必望風內附時契丹跨有燕地燕於賢翻移兵攻之席卷可平矣卷讀如捲凡兵之動知敵之主此以其時契丹主言之也惟河東必死之寇言北漢據河東與周為世仇也誘音酉當以強兵制之然彼自高平之敗事見上卷上年三月必未能為邊患宜且以為後圖俟天下既平然後伺間一舉可擒也是後世宗用兵以至宋朝削平諸國皆如王朴之言惟幽燕不可得而取至於宣和則舉國以殉之矣伺相吏翻甲兵有備㣥下畏法諸將效力期年之後可以出師期讀曰朞宜自夏秋蓄積實邊矣蓄積於邊上以為用兵之備上欣然納之時㣥臣多守常偷安所對少有可取者少詩沼翻惟朴神峻氣勁有謀能斷斷丁亂翻凡所規畫皆稱上意稱尺證翻上由是重其氣章十二行本氣作器乙十一行本同孔本同退齋校同識未幾遷左諫議大夫知開封府事開封在輦轂下事繁職重史言世宗屬任王朴自此而重然朴先事上於潛藩其君臣相得亦有素矣上謀取秦鳳求可將者將即亮翻王溥薦宣徽南院使鎮安節度使向訓五代會要漢天福十二年廢陳州鎮安軍周廣順二年復高唐縣屬博州九域志縣在州東北一百七十里昝姓也音子感翻戊辰朔景出兵自散關趣秦州趣七喻翻敕天下寺院非敕額者悉廢之敕額者敕賜寺額如慈恩安國興唐之類凡欲出家者必俟祖父母父母伯叔之命惟兩京大名府唐以魏州為鄴都興唐府晉改為廣晉府大名府蓋漢所改也戒壇僧尼受戒之所煉指者束香於指而燃之掛燈者裸體以小鐵鉤徧鉤其膚凡鉤皆掛小燈圈燈盞貯油而燃之俚俗謂之燃肉身燈今人帶布枷以化誘流俗者亦幻惑之餘敝斷音短幻戶辦翻有死亡歸俗皆隨時開落是歲天下寺院存者二千六百九十四廢者三萬三百三十六見僧四萬二千四百四十四尼一萬八千七百五十六見賢遍翻王景拔黃牛等八寨黃牛等八寨皆當在秦州界戊寅蜀主以捧聖控鶴都指揮使保寧節度使李廷珪為北路行營都統蜀以秦鳳為北路武寧節度使呂彥珂副之武寧軍徐州屬周呂彥珂遙領也珂丘何翻蜀趙季札至德陽聞周師入境懼不敢進德陽縣屬漢州去成都未遠已懼而不敢進先遣輜重及妓妾西歸重直用翻妓渠綺翻丁亥單騎馳入成都衆以為奔敗莫不震恐蜀主問以機事皆不能對蜀主怒繫之御史臺庚章十二行本庚作甲乙十一行本同孔本同午斬之於崇禮門趙季札雖誅無救於秦鳳之喪失是以用人當審之於其初也六月庚子上親錄囚於內苑有汝州民馬遇父及弟為吏所冤死屢經覆按不能自伸上臨問始得其實人以為神由是諸長吏無不親察獄訟史言帝明謹於庶獄長知兩翻壬寅西師與蜀李廷珪等戰于威武城東不利威武城前蜀所築也在鳳州東北陳讀曰陣濮博木翻丁未蜀主遣間使如北漢及唐間古莧翻使疏吏翻欲與之俱出兵以制周北漢主唐主皆許之己酉以彰信節度使韓通充西南行營馬步軍都虞候戊午南漢主殺禎州節度使通王弘政禎州漢博羅縣之地梁置梁化郡隋置循州治歸善縣唐因之至南漢改唐之河源縣為龍川縣徙循州治焉以循州舊治歸善縣置禎州宋朝避仁宗諱改曰惠州九域志循州南至惠州三百里南漢主龔廟號高祖壬戌以樞密院承旨清河張美為右領軍大將軍權點檢三司事清河縣帶貝州權點檢三司事未除為正使帝在澶州美掌州之金穀隸三司者帝或私有所求美曲為供副供副者供辦以應副所求澶時連翻恐傷帝意但徙美為濮州馬步軍都虞候濮博木翻美治財精敏當時鮮及治直之翻鮮息淺翻故帝以利權授之章十二行本之下有帝征伐四方用度不乏美之力也十三字乙十一行本同孔本同張校同退齋校同然思其在澶州所為終不以公忠待之自漢以來能如此者吳主孫權及周世宗而已秋七月丁卯朔以王景兼西南行營都招討使向訓兼行營兵馬都監宰相以景等久無功饋運不繼固請罷兵帝命太祖皇帝往視之還言秦鳳可取之狀還從宣翻又如字帝從之八月丁未中書侍郎同平章事景範罷判三司尋以父喪罷政事王景等敗蜀兵敗補邁翻獲將卒三百己未蜀主遣通奏使知樞密院武泰節度使伊審徵如行營慰撫仍督戰帝以縣官久不鑄錢而民間多銷錢為器皿及佛像錢益少九月丙寅朔敕始立監采銅鑄錢自非縣官法物軍器及寺觀鍾磬鈸鐸之類觀古玩翻鈸蒲撥翻聽留外句斷五十日內悉令輸官給其直過期隱匿不輸五斤以上其罪死不及者論刑有差輸舂遇翻時敕有隱藏銅器及埋窖使用者一兩至一斤徒二年一斤至五斤處死若納到熟銅每斤官給錢一百五十生銅每斤一百上謂侍臣曰卿輩勿以毀佛為疑夫佛以善道化人苟志於善斯奉佛矣彼銅像豈所謂佛邪且吾聞佛在利人雖頭目猶捨以布施施式豉翻若朕身可以濟民亦非所惜也臣光曰若周世宗可謂仁矣不愛其身而愛民若周世宗可謂明矣不以無益廢有益蜀李廷珪遣先鋒都指揮使李進據馬嶺寨又遣奇兵出斜谷屯白澗九域志鳳州梁泉縣有白澗鎮絕周糧道黃花鎮亦在梁泉縣界有黃花川大敗水入焉王景遣裨將張建雄將兵二千抵黃花又遣千人趣唐倉扼蜀歸路趣七喻翻蜀染院使王巒將兵出唐倉與建雄戰於黃花蜀兵敗奔唐倉遇周兵又敗虜巒及其將士三千人馬嶺白澗兵皆潰李廷珪高彥儔等退保青泥嶺蜀雄武節度使兼侍中韓繼勳棄秦州奔還成都觀察判官趙玭舉城降斜谷援兵亦潰玭蒲眠翻考異曰十國紀年玭召官屬告之曰周兵無敵今朝廷所遣勇將精兵不死即逃我輩不能去危就安禍且至矣衆皆聽命舉城叛降周斜谷援兵亦潰五代通錄官軍之圍鳳州偽秦州節度使高處儔引兵往復援之中塗聞黃花之敗奔秦州玭與城中將校閉門不納處儔遂西奔玭即以城歸國今從實錄成階二州皆降蜀人震恐玭澶州人也澶時連翻帝欲以玭為節度使范質固爭以為不可乃以為郢州刺史壬子百官入賀帝舉酒屬王溥曰邊功之成卿擇帥之力也屬之欲翻擇帥事見上四月帥所類翻甲子上與將相食於萬歲殿因言兩日大寒朕於宮中食珍膳深愧無功於民而坐享天祿既不能躬耕而食惟當親冒矢石為民除害差可自安耳冒莫北翻為于偽翻差之為言稍也乙丑蜀李廷珪上表待罪冬十月壬申伊審徵至成都請罪章十二行本罪下有皆釋之三字乙十一行本同孔本同退齋校同皆以蹙國喪師也蜀主致書於帝請和自稱大蜀皇帝帝怒其抗禮不答蜀主愈恐聚兵糧於劍門白帝為守禦之備守劍門以備北兵之自岐雍來者守白帝以備北兵之泝峽而上者用度不足始鑄鐵錢榷境內鐵器民甚苦之榷古岳翻唐主性和柔好文章而喜人佞己好呼到翻喜許記翻由是諂諛之臣多進用諂諛之臣謂馮延己兄弟魏岑陳覺等既克建州破湖南克建州見二百八十四卷晉開運二年破湖南見二百九十卷太祖廣順二年有吞天下之志李守貞慕容彥超之叛皆為之出師遙為聲援援李守貞見二百八十八卷漢隱帝乾祐元年又援慕容彥超見二百九十卷太祖廣順二年皆為于偽翻約共圖中國值中國多事未暇與之校先是每冬淮水淺涸唐人常發兵戍守謂之把淺先悉薦翻把淺之處自霍丘以上西盡光州界壽州監軍吳廷紹以為疆場無事坐費資糧悉罷之史先敍唐所以蹙國之由場音亦不能得十一月乙未朔帝以李穀為淮南道前軍行營都部署兼知廬壽等行府事以忠武節度使王彥超副之督侍衞馬軍都指揮使韓令坤等十二將以伐唐令坤磁州武安人也磁詳之翻汴水自唐末潰決自埇橋東南悉為汚澤上謀擊唐先命武寧節度使武行德發民夫因故堤疏導之自埇橋東南抵唐境皆武寧巡屬也埇余拱翻議者皆以為難成上曰數年之後必獲其利謂淮南既平藉以通漕將獲其利也丁未上與侍臣論刑賞上曰朕必不因怒刑人因喜賞人先是大梁城中民侵街衢為舍通大車者蓋寡先悉薦翻上命悉直而廣之廣者至三十步此言橫廣也立標幟見上四月近廣京城於存歿擾動誠多怨謗之語朕自當之他日終為人利世宗志識宏遠不顧人言然仁人不忍為也王景等圍鳳州韓通分兵城固鎮以絕蜀之援兵戊申克鳳州擒蜀威武節度使王環是年正月蜀置威武節度於鳳州崇溥不食而死環真定人也蜀將士多中原人蓋後唐遣之戍蜀為孟知祥所留者也乙卯制曲赦秦鳳階成境內所獲蜀將士願留者優其俸賜願去者給資裝而遣之詔曰用慰衆情免違物性其四州之民二稅徵科之外凡蜀人所立諸色科傜悉罷之唐人聞周兵將至而懼劉仁贍神氣自若部分守禦無異平日衆情稍安劉仁贍之善守於此已見其方略分扶問翻將兵二萬趣壽州趣七喻翻奉化節度使同平章事皇甫暉為應援使唐置奉化軍於江州將兵三萬屯定遠舊唐書地理志曰定遠漢曲陽縣地隋置定遠縣唐屬濠州九域志在州南八十里謀國難還從宣翻又如字難乃旦翻以翰林承旨戶部尚書殷崇義為吏部尚書知樞密院李穀等為浮梁自正陽濟淮十二月甲戌穀奏王彥超敗唐兵二千餘人於壽州城下敗補邁翻下同己卯又奏先鋒都指揮使白延遇敗唐兵千餘人於山口鎮此時唐蓋置鎮於六安山口按薛史本紀顯德四年劉重遇奏殺紫金山潰兵三千人於壽州東山口又疑置鎮於此地未知孰是丙戌樞密使兼侍中韓忠正公鄭仁誨卒上臨其喪近臣奏稱歲道非便上曰君臣義重何日時之有往哭盡哀吳越王弘俶遣元帥府判官陳彥禧入貢朝廷授弘俶天下都元帥故置元帥府判官使出兵擊唐使出兵常州以擊之則唐有反顧之憂為吳越兵為唐所敗張本三年丙辰九五六潘叔嗣屬將士而告之曰春正月丙午以王環為右驍衞大將軍賞其不降也以王環堅守鳳州城陷而後就擒也潘叔嗣屬將士而告之曰丁酉李穀奏敗唐兵千餘人於上窰窰餘招翻又作窯潘叔嗣屬將士而告之曰戊戌發開封府曹滑鄭州之民十餘萬築大梁外城曹滑鄭皆近京之州九域志開封府西至鄭州界一百一十五里北至滑州界一百里東北至曹州界一百四十五里陳許亦近郡而不發者以方征淮南道上供億故也潘叔嗣屬將士而告之曰庚子帝下詔親征淮南以宣徽南院使鎮安節度使向訓權東京留守端明殿學士王朴副之彰信節度使韓通權點檢侍衞司及在京內外都巡檢命侍衞都指揮使歸德節度使李重進將兵先赴正陽河陽節度使白重贊將親兵三千屯潁上潁上縣隋置唐屬潁州九域志在州東一百一十七里宋白曰潁上縣漢慎縣也南北畫淮為守關防莫謹於此隋大業二年於今縣南故鄭城置潁上縣以地枕潁水上游為名壬寅帝發大梁李穀攻壽州久不克唐劉彥貞引兵救之至來遠鎮九域志壽州安豐縣有來遠鎮今按來遠鎮即東正陽西至卑河十里又以戰艦數百艘趣正陽趣七喻翻下同為攻浮梁之勢李穀畏之召將佐謀曰我軍不能水戰若賊斷浮梁斷音短則腹背受敵皆不歸矣不如退守浮梁以待車駕上至圉鎮九域志開封雍丘縣有圉城鎮亟遣中使乘驛止之比至比必利翻及也已焚芻糧退保正陽丁未帝至陳州九域志開封府南至陳州三百三十里辛亥李穀奏賊艦中流而進弩礮所不能及艦戶黯翻礮與砲同普教翻若浮梁不守則衆心動搖須至退軍今賊艦日進淮水日漲春水方生故李穀慮淮水日漲萬一糧道阻絕其危不測願陛下且駐蹕陳潁陳潁二州名臣與之共度賊艦可禦浮梁可完立具奏聞度徒洛翻先為不可勝以待敵之可勝李穀之退未為失計也但若厲兵秣馬春去冬來足使賊中疲弊取之未晚帝覽奏不悅劉彥貞素驕貴無才略不習兵所歷藩鎮專為貪暴積財巨億以賂權要萬萬為億億億為巨億詩所謂萬億及秭孔穎達所謂大數也譽音余以為治民如龔黃用兵如韓彭龔遂黃霸漢之良吏韓信彭越漢之良將治直之翻唐主首用之其裨將咸師朗等皆勇而無謀聞李穀退喜引兵直抵正陽旌旗輜重數百里重直用翻劉仁贍及池州刺史張全約固止之仁贍曰公軍未至而敵人先遁是畏公之威聲也安用速戰萬一失利則大事去矣彥貞不從既行仁贍曰果遇必敗乃益兵乘城為備以城中戰兵乘城益守兵逆戰於正陽東大破之淮水西岸謂之西正陽屬潁州潁上縣界東岸謂之東正陽屬壽州下蔡縣界此據九域志地里生擒咸師朗等斬首萬餘級伏尸三十里收軍資器械三十餘萬是時江淮久安民不習戰彥貞既敗唐人大恐張全約收餘衆奔壽州劉仁贍表全約為馬步左廂都指揮使皇甫暉姚鳳退保清流關梁置南譙州於桑根山之陽在滁州清流縣西南八十里隋始置清流縣唐為滁州治所清流關在縣西南二十餘里南唐所置也壬子帝至永寧鎮九域志黃州麻城縣有永寧鎮此非也麻城在壽州西南數百里帝猶未渡淮安得至麻城之永寧邪又考九域志潁州汝陰縣有永寧鎮又東百餘里至正陽此則是也聞壽州圍解農民多歸村落今聞大軍至必復入城憐其聚為餓殍復扶又翻殍被表翻宜先遣使存撫各令安業甲寅帝至正陽以李重進代李穀為淮南道行營都招討使以穀判壽州行府事宋敏求曰凡節度州為三品刺史州為五品國初曹翰以觀察使判潁州是以四品臨五品州也同品為知隔品為判自後唯輔臣宣徽使太子太保僕射為判餘並為知州丙辰帝至壽州城下營於淝水之陽淝水自安豐縣界流入壽春縣界經壽春城北入于淮去城二里水北為陽徙正陽浮梁於下蔡鎮唐潁州有下蔡縣時廢縣為鎮西抵正陽五十五里丁巳徵宋亳陳潁徐宿許蔡等州丁夫數十萬以攻城晝夜不息唐兵萬餘人維舟於淮營於塗山之下塗山在濠州本塗山氏之邑禹會諸侯處也今在鍾離縣西九十五里濱淮有漢當塗縣故城南北朝兵爭之際為馬頭郡城淮水逕城北而東流渦水自西北來注于淮謂之渦口南岸正對馬頭城庚申帝命太祖皇帝擊之太祖皇帝遣百餘騎薄其營而偽遁伏兵邀之大敗唐兵于渦口敗補邁翻渦音戈斬其都監何延錫等奪戰艦五十餘艘艘蘇遭翻潘叔嗣屬將士而告之曰詔以武平節度使兼中書令王逵為南面行營都統使攻唐之鄂州逵引兵過岳州岳州團練使潘叔嗣厚具燕犒奉事甚謹逵左右求取無厭犒苦到翻厭於鹽翻不滿望者譖叔嗣於逵云其謀叛逵怒形於詞色叔嗣由是懼而不自安為潘叔嗣殺王逵張本唐主聞湖南兵將至命武昌節度使何敬洙徙民入城為固守之計敬洙不從使除地為戰場曰敵至則與軍民俱死於此耳何敬洙為將亦唐之良也因王逵有潘叔嗣之難又以成其名潘叔嗣屬將士而告之曰二月丙寅下蔡浮梁成上自往視之戊辰廬壽光黃巡檢使司章十二行本司上有元城二字乙十一行本同孔本同超司姓也左傳鄭有司臣敗補邁翻盛唐本唐初之霍山縣也開元二十七年更名盛唐屬壽州宋朝開寶四年改為六安縣九域志六安縣在壽州南二百一十里擒都監高弼等獲戰艦四十餘艘上命太祖皇帝倍道襲清流關皇甫暉等陳於山下陳讀曰陣方與前鋒戰太祖皇帝引兵出山後暉等大驚走入滁州宋白曰滁州之地劉宋為新昌郡梁立南譙州於桑根山西今州西南十八里南譙故城是也北齊自南譙徙新昌郡今州城是也隋廢州以其地為清流縣唐為滁州斷音短太祖皇帝躍馬麾兵涉水直抵城下暉曰人各為其主為于偽翻願容成列而戰皇甫暉受唐莊宗畜養之恩一旦作亂莊宗以之喪亡棄中國而奔江南委質於唐乃言人各為其主蓋兵鋒所迫倉皇失措為是言以款敵耳太祖自審智勇足以辦皇甫暉故許之太祖皇帝擁馬頸突陳而入陳讀曰陣大呼曰吾止取皇甫暉他人非吾敵也手劍擊暉中腦生擒之呼火故翻手式又翻中竹仲翻幷擒姚鳳遂克滁州後數日宣祖皇帝為馬軍副都指揮使宣祖諱弘殷傳呼開門太祖皇帝曰父子雖至親城門王事也不敢奉命章十二行本命下有明旦乃得入五字乙十一行本同孔本同張校同退齋校同史言太祖勇於戰謹於守上遣翰林學士竇儀籍滁州帑藏帑他朗翻藏徂浪翻下同太祖皇帝遣親吏取藏中絹儀曰公初克城時雖傾藏取之無傷也今既籍為官物非有詔書不可得也竇儀有守太祖之識度豈一時將帥所能及哉初永興節度使劉詞遺表薦其幕僚薊人趙普有才可用會滁州平范質薦普為滁州軍事判官太祖皇帝與語悅之時獲盜百餘人皆應死普請先訊鞫然後決所活十七八太祖皇帝益奇之太祖重竇儀奇趙普皆在潛躍之時普自此為佐命元功儀乃為普所忌而不至相位太祖皇帝威名日盛每臨陳必以繁纓飾馬鎧仗鮮明或曰如此為敵所識陳讀曰陣繁蒲官翻太祖皇帝曰吾固欲其識之耳唐主遣泗州牙將王知朗齎書抵徐州稱唐皇帝奉書大周皇帝請息兵脩好願以兄事帝歲輸貨財以助軍費好呼到翻輸舂遇翻甲戌徐州以聞九域志泗州西北至徐州七百五十里王知朗不敢詣軍前而抵徐州恐犯兵鋒而死也以唐主猶敢抗禮欲為兄弟之國也戊寅命前武勝節度使侯章等攻壽州水寨決其壕之西北隅導壕水入于淝太祖皇帝遣使獻皇甫暉等暉傷甚見上臥而言曰臣非不忠於所事但士卒勇怯不同耳臣曏日屢與契丹戰皇甫暉本魏兵唐莊宗使戍瓦橋拒契丹因而作亂其自謂屢與契丹戰蓋戍瓦橋時也因盛稱太祖皇帝之勇上釋之後數日卒帝詗知揚州無備詗古永翻又翾正翻己卯命韓令坤等將兵襲之戒以毋得殘民其李氏陵寢遣人與李氏人共守護之唐主兵屢敗懼亡乃遣翰林學士戶部侍郎鍾謨工部侍郎文理院學士李德明奉表稱臣來請平獻御服湯章十二行本湯作茶乙十一行本同孔本同藥及金器千兩銀器五千兩繒錦二千匹繒慈陵翻犒軍牛五百頭酒二千斛壬午至壽州城下謨德明素辯口上知其欲遊說犒苦到翻說式芮翻下欲說同盛陳甲兵而見之曰爾主自謂唐室苗裔南唐祖唐太宗之子吳王恪異於他國與朕止隔一水謂南唐與周以淮為界好呼到翻惟泛海通契丹捨華事夷禮義安在自徐溫執吳政屢泛海使契丹欲與共圖中國至唐烈祖及今主皆然我非六國愚主豈汝口舌所能移邪言六國皆愚主故蘇張得行其遊說使遇英明之君雖辯如蘇張不能移也語牛倨翻亟來見朕再拜謝過則無事矣不然朕欲觀金陵城借府庫以勞軍勞力到翻汝君臣得無悔乎謨德明戰栗不敢言潘叔嗣屬將士而告之曰吳越王弘俶遣兵屯境上以俟周命蘇州營田指揮使陳滿言於丞相吳程曰周師南征唐舉國驚擾常州無備易取也九域志蘇州西北至常州一百八十餘里易以豉翻江陰縣本晉毗陵之暨陽縣也江左分置蘭陵縣梁敬帝時嘗置江陰郡及江陰縣隋廢唐置暨州南唐始置江陰軍九域志在常州東北九十里周詔書已至程為之言於弘俶為于偽翻請亟發兵從其策丞相元德昭曰唐大國未可輕也若我入唐境而周師不至誰與幷力能無危乎請姑俟之程固爭以為時不可失弘俶卒從程議卒子恤翻癸未遣程督衢州刺史鮑脩讓中直都指揮使羅晟趣常州趣七喻翻程謂將士曰元丞相不欲出師將士怒流言欲擊德昭吳越將士狃福州之勝謂唐之可乘也兵驕者破豈虛言哉令捕言者歎曰方出師而士卒欲擊丞相不祥甚哉潘叔嗣屬將士而告之曰乙酉韓令坤奄至揚州平旦先遣白延遇以數百騎馳入城城中不之覺令坤繼至唐東都營屯使賈崇焚官府民舍棄城南走副留守工部侍郎馮延魯髡髮被僧服匿於佛寺唐以揚州為東都故置留守髡苦昆翻被皮義翻令坤慰撫其民使皆安堵庚寅王逵奏拔鄂州長山寨長山在鄂州南界唐立寨以備潭朗獻之辛卯太祖皇帝奏唐天長制置使耿謙降唐天寶元年分江都六合高郵三縣地置千秋縣七載改名天長九域志天長縣在揚州西一百一十里潘叔嗣屬將士而告之曰唐主遣園苑使尹延範如泰州梁有宮苑使又有內園栽接使唐置園苑使亦猶是也晉天福四年唐烈祖自潤州遷讓皇之族于泰州今以周師攻逼復遷潤州恐楊氏為變盡殺其男子六十人還報唐主怒腰斬之潘叔嗣屬將士而告之曰韓令坤等攻泰章十二本行泰上有唐字乙十一行本同孔本同退齋校同州拔之南唐升海陵鎮為泰州九域志揚州東至泰州一百一十五里自泰州南奔泰興縣渡江取潤州至金陵潘叔嗣屬將士而告之曰唐主遣人以蠟丸求救於契丹壬辰靜安軍使何繼筠獲而獻之去年帝置靜安軍於李晏口潘叔嗣屬將士而告之曰以給事中高防權知泰州潘叔嗣屬將士而告之曰癸巳吳越王弘俶遣上直都指揮使路彥銖攻宣州羅晟帥戰艦屯江陰唐靜海制置使姚彥洪帥兵民萬人奔吳越帥讀曰率南唐於海陵之東境置靜海都鎮制置院周取其地置靜海軍尋升為通州通州南至大江二十四里絕江而南即吳越之蘇州界潘叔嗣屬將士而告之曰潘叔嗣屬將士而告之曰吾事令公至矣屬之欲翻集會也王逵兼中書令故稱為令公今乃信讒疑怒軍還必擊我吾不能坐而待死汝輩能與吾俱西乎衆憤怒請行叔嗣帥之西襲朗州九域志岳州西至朗州五百五十里帥讀曰率還軍追之及於武陵城外朗州武陵郡逵敗死考異曰湖湘故事云王逵奉詔伐吳有蜜蜂無萬數集逵傘蓋周行逢內喜潛與潘叔嗣張文表等謀曰我覩王公妖怪入傘他時忽落別人之手我輩處身何地我等若三人同心共保馬氏舊基同取富貴豈不是男兒哉叔嗣文表聞行逢之言已會深意遂乃拜受此語各散歸營廣本逵命行營副使毛立為袁州營統軍使潘叔嗣張文表為前鋒軍次醴陵縣吏請具牛酒犒軍立不許叔嗣文表因士卒之怒縛立送于行逢以兵叛告逵逵大懼乘輕舟奔朗州叔嗣追至朗州殺之湖湘故事逵連夜走歸朗州去經數日潘叔嗣始到潭州既聞王逵走歸朗州亦以舟棹倍程而趨至朗州殺之今按世宗實錄顯德三年二月丙寅朗州王進逵言領大軍入淮南界庚寅言入鄂州界攻下長山寨癸巳荊南高保融言進逵自鄂州領兵復歸本道又云潘叔嗣為先鋒行及鄂州叔嗣回戈襲武陵進逵聞之倍道先入武陵叔嗣攻其城進逵敗走為叔嗣所殺又云三月壬寅進逵差牙將押送淮南將陳澤等蓋進逵未敗前奏事三月始達行在與薛史承襲傳及湖南傳記略同惟湖湘故事及丁璹馬氏行事記載逵攻袁州叔嗣叛事曹衍云逵三月至潭州四月叔嗣叛丁璹云五月五日叔嗣殺逵于朗州皆妄也周行逢據湖南仕進尚門蔭衍屢獻文章不得調退居鄉里教授及張文表叛辟為幕職事敗逃遁會赦乃敢出窮困無以自進採摭舊聞撰湖湘馬氏故事二十卷如京師獻之太宗憫其窮且老授將作監丞衍本小人言辭鄙俚非有意著書故敍事顛倒前後自相違背以無為有不可勝數素怨周行逢尤多誣毀不欲行逢不預叔嗣之謀乃妄造此說凡載行逢罪惡之甚者皆出於衍云璹亦國初人疑其說得於衍書皆不可為據今從十國紀年或勸叔嗣遂據朗州叔嗣曰吾救死耳安敢自尊宜以督府歸潭州太尉時湖湘以朗州為督府潭州太尉謂周行逢也言行逢必將以潭州處己處昌呂翻使團練判官李簡潘叔嗣為岳州團練使判官其屬也帥讀曰率下同衆謂行逢必以潭州授叔嗣謂告也語也叔嗣賊殺主帥罪當族所可恕者得武陵而不有以授吾耳若遽用為節度使天下謂我與之同謀何以自明宜且以為行軍司馬俟踰年授以節鉞可也觀此則周行逢本有奉辭討潘叔嗣之心以其迎己故不發耳帥衆入朗州自稱武平武安留後告于朝廷行逢欲兼有潭朗也叔嗣怒稱疾不至行逢曰行軍司馬吾嘗為之周行逢為武安行軍司馬見上卷太祖廣順三年埒龍輟翻等也叔嗣猶不滿望更欲圖我邪或說行逢授叔嗣武安節鉞以誘之說式芮翻誘以九翻令至都府受命此乃机上肉耳行逢從之叔嗣將行其所親止之叔嗣自恃素以兄事行逢相親善行逢叔嗣親善事始見二百九十一卷太祖廣順二年九月行逢遣使迎候道路相望既至自出郊勞勞力到翻相見甚懽叔嗣入謁未至聽事聽讀曰廳遣人執之立於庭下責之曰汝為小校無大功校戶教翻王逵用汝為團練使一旦反殺主帥帥所類翻吾以疇昔之情未忍斬汝以為行軍司馬乃敢違拒吾命而不受乎叔嗣知不免以宗族為請遂斬之容肇祖標點聶崇岐覆校
