body:
  text: 資治通鑑卷第一百六十端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註梁紀十六高祖武皇帝十六太清元年丁卯五四七是年四月始改元太清春正月朔日有食之不盡如鈎壬寅荊州刺史廬陵威王續卒諡法猛以強果曰威雍於用翻續素貪婪婪盧南翻臨終有啟遣中錄事參軍謝宣融獻金銀器千餘件中錄事參軍蓋使之錄閤中事在左右親近者也件其輦翻因問宣融曰王之金盡此乎宣融曰此之謂多安可加也大王之過如日月之食欲令陛下知之故終而不隱終謂卒也初湘東王繹為荊州刺史有微過續代之以狀聞按繹在荊州有宮人李桃兒者以才慧得進及還以李氏行時得營戶禁重續具狀以聞繹對使者泣訴於太子綱太子和之不得繹懼送李氏還荊州繹聞其死入閤而躍屧為之破屧蘇協翻屐也又履中薦也史言繹續生無友于之情死則從而忻快為于偽翻丙午東魏勃海獻武王歡卒年五十二終日儼然人不能測機權之際變化若神制馭軍旅法令嚴肅聽斷明察斷丁亂翻不可欺犯擢人受任受當作授苟其所堪無問廝養廝音斯養余亮翻有虛聲無實者皆不任用雅尚儉素刀劍鞍勒無金玉之飾少能劇飲自當大任不過三爵知人好士全護勳舊如尉景司馬子如孫騰諸人是也少詩照翻好呼到翻多不之罪如泉企裴讓之是也樂音洛世子澄祕不發喪用歡遺言也侯景自念己與高氏有隙內不自安辛亥據河南叛歸于魏潁州刺史司馬世雲以城應之景誘執豫州刺史高元成襄州刺史李密廣州刺史懷朔暴顯等誘音酉遣軍士二百人載仗暮入西兗州欲襲取之刺史邢子才覺之掩捕盡獲之因散檄東方諸州各為之備由是景不能取侯景之變當時覺之而能發其姦者邢子才一人耳孰謂文士不可以當藩翰哉諸將皆以景之叛由崔暹崔暹糾劾權貴諸將恨之故以景叛為暹罪將即亮翻下同欲殺暹以謝景陳元康諫曰今雖四海未清綱紀已定若以數將在外苟悅其心枉殺無辜虧廢刑典豈直上負天神何以下安黎庶晁錯前事願公慎之晁錯事見十六卷漢景帝三年遣司空韓軌督諸軍討景辛酉上祀南郊大赦甲子祀明堂三章乙十一行本三作二張校同退齋校同月魏詔自今應宮刑者直沒官勿刑魏以開府儀同三司若干惠為司空侯景為太傅河南道行臺上谷公庚辰景又遣其行臺郎中丁和來上表言臣與高澄有隙請舉函谷以東瑕丘以西豫廣郢章十二行本郢作潁乙十一行本同孔本同張校同退齋校同荊襄兗南兗濟東豫洛陽北荊北揚等十三州內附洛陽二州名註已見前魏收志武定二年置北荊州領伊陽新城汝北郡五代志河南郡陸渾縣有東魏北荊州淮陽郡項城縣東魏置北揚州及丹楊郡秣陵郡濟子禮翻考異曰梁書景傳云與豫州刺史高成廣州刺史暴顯潁州刺史司馬世雲荊州刺史郎椿襄州刺史李密兗州刺史邢子才南兗州刺史石長宣濟州刺史許季良東豫州刺史丘元征洛州刺史爾朱渾願揚州刺史樂恂北荊州刺史梅季昌北揚州刺史元神和等陰結私圖剋相影會蕭韶太清紀又有兗州刺史胡延豫州刺史傅士哲揚州刺史可足渾洛無邢子才典略有荊州刺史庫狄暢無高成暴顯許季良爾朱渾願樂恂梅季昌今依梁書而太清紀有兩豫州蓋前官也僅須折簡且黃河以南皆臣所職易同反掌易弋豉翻若齊宋一平齊謂青州宋謂徐州燕趙謂河北之地尚書僕射謝舉等皆曰頃歲與魏通和大同二年東魏請和自是交聘使命不絕今納其叛臣竊謂非宜上曰雖然得景則塞北可清機會難得豈宜膠柱謂不能圓轉如膠柱鼓瑟是歲正月乙卯上夢中原牧守皆以其地來降舉朝稱慶守式又翻降戶江翻朝直遙翻考異曰典略云去年十二月夜夢今從梁書旦見中書舍人朱告之且曰吾為人少夢少詩沼翻若有夢必實曰此乃宇宙章十二行本宙作內乙十一行本同孔本同混壹之兆也及丁和至稱景定計以正月乙卯上愈神之帝不能自治其國而妖夢是踐其亡宜矣嘗獨言我國家如金甌無一傷缺今忽受景地詎是事宜脫致紛紜悔之何及獨言者宴閒之時非因與侍臣問答獨言其事蓋帝欲受景地念茲在茲而不能自已於言也對曰聖明御宇南北歸仰正以事無機會未達其心今侯景分魏土之半以來自非天誘其衷杜預曰衷中也揣初委翻誘音酉何以至此若拒而不內恐絕後來之望此誠易見易弋豉翻願陛下無疑上乃定議納景壬午以景為大將軍封河南王都督河南北諸軍事大行臺承制如鄧禹故事平西諮議參軍周弘正善占候前此謂人曰國家數年後當有兵起及聞納景曰亂階在此矣為侯景亂梁張本丁亥上耕藉田藉在亦翻三月庚子上幸同泰寺捨身如大通故事大通元年帝捨身之始也事見一百五十一卷甲辰遣司州刺史羊鴉仁督兗州刺史桓和梁紀作土州刺史桓和五代志漢東郡土山縣梁曰龍巢置土州及東西二永寧真陽三郡魏收志梁置仁州治赤坎城帶臨淮郡領己吾義城縣己吾之下註云州郡治五代志彭城穀陽縣有己吾義城二縣後齊併以為臨淮縣將即亮翻趣七喻翻運糧食應接侯景魏大赦東魏高澄慮諸州有變乃自出巡撫留段韶守晉陽委以軍事以丞相功曹趙彥深為大行臺都官郎中使陳元康豫作丞相歡條教數十紙付韶及彥深在後以次行之臨發握彥深手泣曰以母弟相託幸明此心夏四月壬申澄入朝于鄴朝直遙翻東魏主與之宴澄起舞識者知其不終昔周景王喪太子及后以喪賓宴晉叔向曰王其不終乎吾聞之所樂必卒焉今王樂憂若卒以憂不可謂終景王之喪伉儷及冢適也既葬而宴賢者非之高澄則喪父也祕喪不發死肉未寒忘雞斯徒跣之哀縱蹮蹮僛僛之樂尚為有人心乎是故榮錡之禍猶輕柏堂之禍為慘蒼蒼之報應固不爽也雞斯讀為笄纚丙子㣥臣奉贖自庚子捨身至丙子奉贖凡三十七日萬機之事不可一日曠廢而荒於佛若是帝忘天下矣三十七日之間天下不知為無君天下亦忘君矣丁亥上還宮丁亥當作丁丑改元如大通故事甲午東魏遣兼散騎常侍李系來聘系繪之弟也李繪見一百五十八卷大同八年考異曰魏帝紀作李緯今從本傳五月丁酉朔東魏大赦戊戌東魏以襄城王旭為太尉旭吁玉翻高澄遣武衞將軍元柱等將數萬衆晝夜兼行以襲侯景將即亮翻遇景於潁川北柱等大敗景以羊鴉仁等軍猶未至乃退保潁川侯景不敢乘勝北向者蓋以高歡雖死高澄猶能用其衆也甲辰東魏以開府儀同三司庫狄干為太師錄尚書事孫騰為太傅汾州刺史賀拔仁為太保司徒高隆之錄尚書事司空韓軌為司徒青州刺史尉景為大司馬領軍將軍可朱渾道元為司空僕射高洋為尚書令領中書監徐州刺史慕容紹宗為尚書左僕射高陽王斌為右僕射斌蓋因玉儀而進用斌音彬戊午尉景卒韓軌等圍侯景於潁川景懼割東荊北兗州魯陽長社四城賂魏以求救東魏東荊州治北陽城荊州治魯陽潁州治長社時無北兗州唯北荊州治伊陽與西魏接境豈史家誤以荊為兗邪景少習兵姦詐難測少詩照翻不如厚其爵位以觀其變未可遣兵也荊州刺史王思政以為若不因機進取後悔無及即以荊州步騎萬餘從魯陽關向陽翟先是王思政蓋自恆農遷刺荊州陽翟縣漢屬潁川郡晉屬河南尹魏收志興和元年分置陽翟郡屬潁州加景大將軍兼尚書令遣太尉李弼儀同三司趙貴將兵一萬赴潁川按趙貴開府儀同三司此逸開府二字景恐上責之遣中兵參軍柳昕奉啟於上以為王旅未接謂羊鴉仁等軍未至也昕許斤翻遂求援關中自救目前臣既不安於高氏豈見容於宇文但螫手解腕蝮蛇螫手壯士解腕螫音釋腕烏貫翻本圖為國為于偽翻願不賜咎臣獲其力不容即棄今以四州之地為餌敵之資已令宇文遣人入守自豫州以東齊海以西悉臣控壓見有之地盡歸聖朝見賢遍翻朝直遙翻懸瓠項城徐州南兗事須迎納願陛下速敕境上各置重兵與臣影響言若影之隨形響之應聲彼此相應不失機會也上報之曰大夫出境尚有所專春秋之義大夫出疆專之可也上引此義欲以綏懷侯景不知狼子野心之難馴擾也將建大業理須適事而行隨方以應卿誠心有本何假詞費上報此詔已為侯景所窺矣魏以開府儀同三司獨孤信為大司馬六月戊辰以鄱陽王範為征北將軍總督漢北征討諸軍事擊穰城使範擊魏荊州欲以應接侯景穰如羊翻東魏韓軌等圍潁川聞魏李弼趙貴等將至乙章十二行本乙作己乙十一行本同孔本同巳引兵還鄴考異曰周書帝紀三月李弼救侯景今從典略奪其軍貴疑之不往貴欲誘景入營而執之弼止之李弼之計以為執侯景不能猝兼河南之地徒為東魏去疾故止貴誘音酉弼引兵還長安東魏之師已退而梁之援兵始來弼若不還師則梁魏之兵必浪戰於汝潁之間矣引兵而還則禍集於梁景陽稱略地引兵出屯懸瓠景引兵出潁川以城與魏為王思政守潁川沒於東魏張本景復乞兵於魏復扶又翻丞相泰使同軌防主韋法保及都督賀蘭願德等將兵助之五代志河南宜陽縣後周分置熊耳縣同軌郡周齊以宜陽為界以同軌名郡者言將自此出兵混壹東西使天下車同軌也侯景之於高歡始敦鄉黨之情終定君臣之契高歡侯景皆懷朔鎮人少相友善中間同事爾朱歡滅爾朱景遂委質於歡位重台司今歡始死景遽外叛蓋所圖甚大終不為人下故也且彼能背德於高氏將即亮翻背蒲妹翻豈肯盡節於朝廷今益之以勢援之以兵竊恐貽笑將來也史言西魏多智士宇文泰能用善謀侯景之姦詐不得逞而其禍移於梁矣朝直遙翻下同景陰謀叛魏事計未成厚撫韋法保等冀為己用外示親密無猜間間古莧翻每往來諸軍間侍從至少魏軍中名將皆身自造詣從才用翻少詩沼翻將即亮翻造七到翻同軌防長史裴寬謂法保曰侯景狡詐必不肯入關言其不肯應召而入朝也恐未可信若伏兵斬之此亦一時之功也如其不爾即應深為之防不得信其誑誘自貽後悔誑居況翻誘音酉法保深然之不敢圖景但自為備而已尋辭還所鎮辭景而還同軌也密召賀蘭願德等還分布諸軍據景七州十二鎮景果辭不入朝遺丞相泰書曰吾恥與高澄鴈行安能比肩大弟記王制父之齒隨行兄之齒鴈行鴈行言如鴈並飛而進也景知泰覺其情且知梁之可侮弄也故以書絕泰而決意附梁遺于季翻行戶剛翻景遂決意來降魏將任約以所部千餘人降於景史言西魏諸將唯任約為侯景所誘降戶江翻任音壬泰以所授景使持節太傅大將軍兼尚書令河南大行臺都督河南諸軍事回授王思政思政並讓不受頻使敦諭使疏吏翻下同唯受都督河南諸軍事高澄將如晉陽以弟洋為京畿大都督留守於鄴使黃門侍郎高德政佐之德政顥之子也高顥見一百四十七卷天監七年考異曰北史作德正今從北齊書丁丑澄還晉陽始發喪秋七月魏長樂武烈公若干惠卒若干惠魏司空樂音洛丁酉東魏主為丞相歡舉哀服緦縗記閒傳緦麻之縗十五升去其半有事其縷無事其布曰緦為于偽翻縗倉回翻凶禮猶言喪禮也備九錫殊禮戊戌以高澄為使持節大丞相都督中外諸軍錄尚書事大行臺勃海王澄啟辭爵位壬寅詔太原公洋攝理軍國遣中使敦諭澄庚申羊鴉仁入懸瓠城甲子詔更以懸瓠為豫州壽春為南豫州改合肥為合州後漢豫州治譙魏治汝南安成晉治陳國晉氏南渡石氏強盛祖約自譙城退屯壽春始僑立豫州於壽春是後庾亮以豫州刺史鎮蕪湖毛寶治邾城趙胤治牛渚謝尚鎮歷陽又進馬頭桓沖戍姑孰蓋不常厥居也宋武帝欲開拓河南綏定豫土割揚州大江以西悉屬豫州豫州基址因此而立永初二年分淮東為南豫州治歷陽淮西為豫州然猶治壽春也大明以後豫州治懸瓠常珍奇歸北懸瓠入魏豫州復治壽陽齊東昏之時裴叔業又以壽陽附魏遂以歷陽為豫州至帝天監中韋叡克合肥以為豫州復以歷陽為南豫州後復壽陽又徙豫州復舊治今得懸瓠復宋之舊為豫州以壽陽為南豫以合肥為合州南北兵爭疆場之間一彼一此易置州郡類如是矣鎮懸瓠西陽太守羊思達為殷州刺史鎮項城改東魏之北揚州為殷州八月乙丑下詔大舉伐東魏遣南豫州刺史貞陽侯淵明南兗州刺史南康王會理分督諸將將即亮翻淵明懿之子會理續之子也始上欲以鄱陽王範為元帥朱异取急在外謂取休假在外舍也帥所類翻异羊至翻遽入曰鄱陽雄豪蓋世得人死力然所至殘暴非弔民之材且陛下昔登北顧亭以望謂江右有反氣骨肉為戎首登北顧亭謂幸京口時也江郢揚南徐之地為江左豫南豫南兗之地為江右朱异告帝以防鄱陽而不知防臨賀帝知江右有反氣而不料侯景自壽陽舉兵天邪人邪尤宜詳擇上默然曰會理何如對曰陛下得之矣會理懦而無謀所乘襻輿襻普患翻襻輿者輿掆施襻人以肩舉之施板屋冠以牛皮冠古玩翻上聞不悅貞陽侯淵明時鎮壽陽屢請行上許之會理自以皇孫復為都督言既以皇孫之貴自高又以都督之尊自處復扶又翻殆不對接淵明與諸將密告朱异追會理還遂以淵明為都督辛未高澄入朝于鄴固辭大丞相以通鑑書法言之辛未之下當有東魏二字朝直遙翻餘如前命甲申虛葬齊獻武王於漳水之西潛鑿成安鼓山石窟佛寺之旁為穴魏收志魏郡臨漳縣有鼓山成安縣後齊分臨漳置宋白曰成安縣本漢斥丘縣地春秋時乾侯邑也土地斥鹵故曰斥丘其地在鄴北齊分鄴置成安縣按臨漳縣亦分鄴縣所置柩音舊塞悉則翻殺其㣥匠及齊之亡也一匠之子知之發石取金而逃史言潛葬之無益戊子武州刺史蕭弄璋攻東魏磧泉呂梁二戍拔之五代志下邳郡下邳縣梁曰歸政置武州魏收志彭城郡呂縣有呂梁城水經註曰泗水之上有石梁焉故曰呂梁或告東魏大將軍澄云侯景有北歸之志會景將蔡道遵北歸言景頗知悔過景母及妻子皆在鄴澄乃以書諭之語以闔門無恙若還許以豫州刺史終其身還其寵妻愛子所部文武更不追攝語牛倨翻攝收也景使王偉復書曰今已引二邦二邦謂梁及西魏也熊豹齊奮克復中原幸自取之何勞恩賜昔王陵附漢母在不歸事見九卷漢高帝元年乞羹自若事見十卷高帝四年而可介意脫謂誅之有益欲止不能殺之無損徒復阬戮家累在君何關僕也復扶又翻累力瑞翻戊子詔以景錄行臺尚書事東魏靜帝美容儀旅力過人旅與膂同脊骨也射無不中好文學從容沈雅中竹仲翻好呼到翻從千容翻沈持林翻時人以為有孝文風烈大將軍澄深忌之始獻武王自病逐君之醜謂逐孝武帝使入關也禮甚恭事無大小必以聞可否聽旨言不敢專決也俯伏上壽帝設法會乘輦行香歡執香爐步從上時掌翻從才用翻鞠躬屏氣屏必郢翻承望顏色故其下奉帝莫敢不恭及澄當國倨慢頓甚使中書黃門郎崔季舒察帝動靜大小皆令季舒知之晉書職官志曹魏黃初初中書既置監令又置通事郎次黃門郎及晉改曰中書侍郎環濟要略漢置中書掌密詔有令僕丞郎漢舊儀云置中書領尚書事魏黃初中書置監令又置通事郎次黃門郎即中書侍郎之任也按二書皆謂黃門中書通為一官而五代志紀北齊之制黃門侍郎屬門下省中書侍郎屬中書省分為二官高澄以崔季舒為中書黃門郎者蓋澄欲使季舒伺察靜帝以為黃門郎則侍從左右以為中書郎則典掌詔命故兼領二職也癡人比復何似比毗至翻復扶又翻癡勢小差未差楚懈翻本作瘥疾稍愈謂之差宜用心檢校帝嘗獵于鄴東馳逐如飛監衞都督烏那羅受工伐從後呼曰天子勿走馬大將軍嗔監工銜翻監衞都督高氏置此官以監宿衞所以防制其君者也烏那羅虜三字姓呼火故翻嗔昌真翻怒也澄嘗侍飲酒舉大觴屬帝曰臣澄勸陛下酒屬之欲翻舉酒相屬如儕輩然無復君臣之敬帝不勝忿曰自古無不亡之國朕亦何用此生為澄怒曰朕朕狗脚朕使崔季舒毆帝三拳奮衣而出明日澄使季舒入勞帝勝音升毆烏口翻勞力到翻帝亦謝焉賜季舒絹百匹帝不堪憂辱徐知訓陵侮其主與高澄異世同轍皆不能保其身詩云人而無禮胡不遄死諒哉韓亡子房奮秦帝仲連恥本自江海人忠義動君子謝靈運作詩事見一百二十二卷宋文帝元嘉十年荀濟以散騎常侍侍講大器鷙之子也東魏華山王鷙卒於大同六年華戶化翻濟子禮翻欲以何日開講乃詐於宮中作土山開地道向北城至千秋門門者覺地下響以告澄澄勒兵入宮見帝不拜而坐曰陛下何意反臣父子功存社稷何負陛下邪此必左右嬪輩所為欲殺胡夫人及李嬪帝正色曰自古唯聞臣反君不聞君反臣王自欲反何乃責我我殺王則社稷安不殺則滅亡無日我身且不暇惜況於嬪必欲弒逆緩速在王澄乃下牀叩頭大啼謝罪高澄雖悖逆不能不屈於靜帝之言理所在也夜久乃出居三日幽帝於含章堂含章堂蓋取坤卦含章可貞之義必在鄴宮之內殿左右幽者閉帝於內不使出而專殺於外也壬辰烹濟等於市初濟少居江東少詩照翻博學能文與上有布衣之舊知上有大志然負氣不服常謂人曰會於盾鼻上磨墨檄之言上若有非常之舉亦當起兵於盾鼻上磨墨作檄以聲其罪及即位或薦之於上上曰人雖有才亂俗好反不可用也濟上書諫上崇信佛法為塔寺奢費上大怒欲集朝衆斬之朝衆即謂在朝百官好呼到翻朝直遙翻濟逃奔東魏澄為中書監大同十年東魏以高澄領中書監獻武王曰我愛濟欲全之故不用濟濟入宮必敗澄固請乃許之史言高歡識鑒非澄所及侍中楊遵彥謂之曰楊愔字遵彥衰暮何苦復爾復扶又翻濟曰壯氣在耳言年雖衰而氣不衰也辨獄辭也自傷年紀摧頹功名不立故欲挾天子誅權臣澄欲宥其死親問之曰荀公何意反濟曰奉詔誅高澄何謂反有司以濟老病鹿車載詣東市幷焚之章懷太子賢曰鹿車小車僅容一鹿也澄疑諮議溫子昇子昇蓋為大將軍府諮議參軍方使之作獻武王碑既成餓於晉陽獄食弊襦而死棄尸路隅沒其家口沒其家口為官奴婢填晉陽宮澄謂遊道曰吾近書與京師諸貴諸貴謂司馬子如孫騰等以卿僻於朋黨將為一病今乃知卿真是重故舊尚節義之人天下人代卿怖者是不知吾心也史言士之徇義者固不計身之死亡亦未必死也怖普布翻辛丑澄還晉陽上命蕭淵明堰泗水於寒山以灌彭城俟得彭城乃進軍與侯景掎角左傳曰譬如捕鹿晉人角之諸戎掎之角者當其前掎者亢其下掎居綺翻癸卯淵明軍于寒山去彭城十八里斷流立堰斷音短侍中羊侃監作堰再旬而成監工銜翻東魏徐州刺史太原王則嬰城固守侃勸淵明乘水攻彭城不從諸將與淵明議軍事淵明不能對但云臨時制宜冬十一月魏丞相泰從魏主狩于岐陽岐陽岐山之陽也五代志扶風雍縣有岐陽宮東魏大將軍澄使大都督高岳救彭城欲以金門郡公潘樂為副五代志河南郡宜陽縣有東魏所置金門郡因金門山以名郡樂緩於機變不如慕容紹宗且先王之命也高歡令澄用慕容紹宗以敵侯景見上卷上年景不足憂也時紹宗在外澄欲召見之恐其驚叛元康曰紹宗知元康特蒙顧待新使人來餉金近時之事謂之新受之而厚答其書保無異也言保紹宗必無所違異乙酉以紹宗為東南道行臺與岳樂偕行初景聞韓軌來曰噉豬腸兒何能為噉吐濫翻聞高岳來曰兵精人凡諸將無不為所輕者及聞紹宗來叩鞍有懼色曰誰教鮮卑兒解遣紹宗來解胡買翻若然若然猶今人言若如此也澄以廷尉卿杜弼為軍司攝行臺左丞臨發問以政事之要杜弼臨發從軍澄方問以政事之要蓋弼在歡府夙有聲稱故問之也使錄一二條弼請口陳之曰天下大務莫過賞罰賞一人使天下之人喜罰一人使天下之人懼苟二事不失自然盡美澄大悅曰言雖不多於理甚要紹宗帥衆十萬據橐駝峴帥讀曰率峴戶典翻羊侃勸貞陽侯淵明乘其遠來擊之不從旦日又勸出戰亦不從侃乃帥所領出屯堰上羊侃知淵明必敗故出屯堰上欲全所領而退若以行兵之節制言之則安營次舍皆當聽命於元帥豈有亶移屯之理哉丙午紹宗至城下引步騎萬人攻潼州刺史郭鳳營魏收志梁置潼州武定七年改曰睢州治取慮城領淮陽穀陽睢南南濟陰臨潼郡五代志下邳郡夏丘縣東魏置臨潼郡梁置潼州淵明醉不能起命諸將救之皆不敢出北兗州刺史胡貴孫謂譙州刺史趙伯超曰魏收志景明中置譙郡於渦陽城孝昌中陷領南譙汴龍亢蘄城下蔡臨渙蒙郡五代志譙郡山桑縣後魏置渦州渦陽郡東魏改曰譙州吾屬將兵而來將即亮翻下同本欲何為今遇敵而不戰乎伯超不能對貴孫獨帥麾下與東魏戰斬首二百級伯超擁衆數千不敢救謂其下曰虜盛如此與戰必敗不如全軍早歸章十二行本歸下有可以免罪四字乙十一行本同孔本同張校同退齋校同皆曰善遂遁還初侯景常戒梁人曰逐北不過二里紹宗將戰以梁人輕悍悍侯旰翻又下罕翻恐其衆不能支一一引將卒謂之曰我當陽退誘吳兒使前誘音酉爾擊其背東魏兵實敗走梁人不用景言乘勝深入魏將卒以紹宗之言為信爭共掩擊之梁兵大敗貞陽侯淵明及胡貴孫趙伯超等皆為東魏所虜失亡士卒數萬人羊侃結陳徐還陳讀曰陣上方晝寢宦者張僧胤白朱异啟事上駭之非時啟事故駭至文德殿閣文德殿建康宮前殿也韓山失律韓山即寒山怳然將墜牀怳呼廣翻僧胤扶而就坐坐徂臥翻乃歎曰吾得無復為晉家乎謂為夷狄所取也史言帝危亡將至神不守舍復扶又翻郭鳳退保潼州慕容紹宗進圍之十二月甲子朔鳳棄城走東魏使軍司杜弼作檄移梁朝朝直遙翻下同曰皇家垂統光配彼天唯彼吳越獨阻聲教元首懷止戈之心上宰薄兵車之命元首謂東魏主上宰謂高歡左傳楚伐鄭鄭人軍楚師囚鄖公鍾儀獻諸晉晉人囚諸軍府晉侯觀於軍府見鍾儀問曰南冠而縶者誰也有司對曰鄭人所獻楚囚也命稅之使歸合晉楚之成大同三年梁初與東魏通和好呼到翻下同爰自我始罷戰息民彼獲其利侯景豎子自生猜貳遠託關隴依憑姦偽逆主定君臣之分偽相結兄弟之親謂侯景先降西魏也分扶問翻相息亮翻終成難養俄而易慮親尋干戈釁暴惡盈側首無託謂侯景不見容於西魏也江南流寓之地甘辭卑禮進孰圖身此以下皆言侯景歸梁之心迹孰古熟字通言進軟熟之辭於梁以為容身之圖抑可知矣而偽朝大小幸災忘義主荒於上臣蔽於下連結姦惡斷絕鄰好徵兵保境縱盜侵國蓋物無定方事無定勢或乘利而受害或因得而更失是以吳侵齊境遂得句踐之師左傳吳伐齊敗齊師於艾陵遂與晉侯會于黃池越子句踐乘虛伐吳獲其太子遂入吳吳王歸及越平其後越遂伐吳滅之句音鉤終有長平之役事見五卷周赧王五十三年至五十五年侵軼徐部築壘擁川舍舟徼利軼徒結翻又音逸杜預曰軼突也擁當作壅舍讀曰捨徼一遙翻是以援枹秉麾之將拔距投石之士師古曰拔距者有人連坐相把據地以為堅而能拔取之投石者以石投人皆言其有勇力也援于元翻枹音膚將即亮翻如赴私讎彼連營擁衆依山傍水傍步浪翻舉螳蜋之斧被蛣蜣之甲螳蜋舉臂以捍物微有鋒利故以諭斧蛣蜣蜣蜋也翼在甲下故以諭甲言梁兵之輕弱也蛣音詰古語云螳蜋怒臂以當車轍陸佃曰螳蜋有斧蟲也兗人謂之拒斧奮之當轍不避釋蟲不虫過蟷蠰其子螵蛸舍人云不虫過名蟷蠰今之螳蜋也方言云譚魯以南謂之蟷蠰三河之域謂之螳蜋燕趙之際謂之食庬齊以東謂之馬穀然名其子同云螵蛸也及鋒刃纔交埃塵且接已亡戟棄戈土崩瓦解掬指舟中衿甲鼓下左傳晉荀林父帥師及楚子戰于邲楚乘晉師林父不知所為鼓於軍中曰先濟者有賞中軍與下軍爭舟舟中之指可掬也又晉伐齊齊師夜遁晉師從之夙沙衞連大車塞隧以殿殖綽郭最曰子殿齊師國之辱也乃代之殿衞殺馬於隘以塞道晉州綽及之射殖綽中肩弛弓而自後縛之其右具丙亦舍兵而縛郭最皆衿甲面縛坐於中軍之鼓下衿其鴆翻縲紲相望曲直既殊強弱不等獲一人而失一國左傳宋猛獲與南宮萬弒其君宋討之猛獲奔衞宋人請之衞人欲弗許石祁子曰天下之惡一也惡於宋而保於我保之何補得一夫而失一國與惡而棄好非謀也衞人歸之穽疾正翻智者所不為仁者所不向誠既往之難逮猶將來之可追逮及也此二語以誘梁欲再與講和以攜侯景遭風雲之會位班三事邑啟萬家揣身量分久當止足而周章向背離披不已周章征營貌離披分散不可收束之意揣初委翻量音良分扶問翻背蒲妹翻意亦可見彼乃授之以利器誨之以慢藏老子曰國之利器不可以授人易曰慢藏誨盜藏徂浪翻時堪乘便今見南風不競左傳晉圍齊楚乘其間伐鄭晉人聞之師曠曰不害吾驟歌南風又歌北風南風不競多死聲楚必無功果如其言徵讀曰證老賊姦謀將復作矣然推堅強者難為功復扶又翻推吐雷翻摧枯朽者易為力計其雖非孫吳猛將燕趙精兵猶是久涉行陳將即亮翻燕因肩翻易弋豉翻行戶剛翻陳讀曰陣曾習軍旅豈同剽輕之師漢張良曰楚兵剽輕剽匹妙翻輕牽正翻脆此芮翻拒此則作氣不足攻彼則為勢有餘終恐尾大於身踵粗於股倔強不掉倔其勿翻強其兩翻狼戾難馴狼當作很釁許覲翻不徵則叛遲而禍大會應遙望廷尉不肯為臣用蘇峻事見九十三卷晉成帝咸和二年亦欲稱帝用黥布事見十二卷漢高帝十一年禍延林木城門失火殃及池魚池魚人姓名風俗通有池仲魚城門失火仲魚燒死故諺曰城門失火殃及池魚一曰城門失火汲城下之池水以救之池涸則魚受其殃荊揚人物死亡矢石之下夭折霧露之中橫戶孟翻夭於紹翻折而設翻又之舌翻彼梁主者操行無聞輕險有素射雀論功蕩舟稱力國語晉平公射鷃不死使豎襄搏之失公怒將殺之以告叔向叔向曰君必殺之昔先君唐叔射兕於徒林以為大甲以封于晉今君嗣先君唐叔射鷃不死搏之不得是揚吾君之恥者也必殺之君忸怩顏乃赦之鷃扈小鳥即鷃雀也左傳齊桓公與蔡姬乘舟于囿蕩公杜預註曰蕩搖也操七到翻行下孟翻射而亦翻耄又及之政散民流禮崩樂壞加以用舍乖方廢立失所用舍乖方謂免周捨責顧琛而用朱异廢立失所謂銜昭明而不立世適孫乃立太子綱也舍讀曰捨飾智驚愚毒螫滿懷妄敦戒業躁競盈胸謬治清淨此數語曲盡帝之心事螫音釋躁則到翻治直之翻怨讟興於下人人厭苦家家思亂履霜有漸堅冰且至易坤卦初六爻辭曰履霜堅冰至象曰屢霜堅冰陰始凝也馴致其道至堅冰也文言曰臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辯之不早辯也任輕薄之子孫朋黨路開兵權在外必將禍生骨肉釁起腹心強弩衝城長戈指闕徒探雀鷇無救府藏之虛探雀鷇趙武靈王事見四卷周赧王二十年探吐南翻藏徂浪翻詎延晷刻之命左傳楚世子商臣圍其父成王王請食熊蹯而死不許乃縊杜預註曰熊蹯難熟冀久將有外救蹯音煩今實其時鷸蚌相持我乘其弊戰國策趙且伐燕蘇代為燕謂惠王曰今者臣來過易水蚌方出曝而鷸啄其肉蚌合而拑其喙鷸曰今日不雨明日不雨即有死蚌蚌亦謂鷸曰今日不出明日不出即有死鷸兩者不肯相舍漁父得而幷禽之今趙且伐燕燕趙久相支以弊大衆臣恐強秦之為漁父也精甲輝日四七並列漢光武用二十八將以定天下後人贊之曰授鉞四七以轉石之形孫子曰任勢者其戰人也如轉木石木石之性安則靜危則動方則止圓則行故善戰人之勢如轉圓石於千仞之山者勢也破竹杜預之言見八十一卷晉武帝太康元年青蓋入洛荊棘生於建業之宮麋鹿遊於姑蘇之館青蓋入洛事見七十九卷晉武帝泰始八年漢淮南王安陰有邪謀伍被諫曰昔子胥諫吳王吳王不用乃曰臣今見麋鹿遊姑蘇之臺也今臣亦見宮中將生荊棘露霑衣也車蘭力刃翻踐也轢來各翻碾也劍騎之所蹂踐梓於焉傾折竹箭以此摧殘梓竹箭東南之嘉產也蹂人九翻踐息淺翻折而設翻蜀之公子晉左思設為東吳王孫西蜀公子以賦三都弼引用之委命下吏當即授客卿之秩特加驃騎之號凡百君子勉求多福李斯自楚入秦為客卿孫秀自吳奔晉為驃騎將軍弼以此誘南人要亦書檄之常談耳皆如弼言侯景圍譙城不下退攻城父拔之壬申遣其行臺左丞王偉等詣建康說上曰說式芮翻鄴中文武合謀召臣共討高澄事泄澄幽元善見於金墉殺諸元六十餘人河北物情俱念其主請立元氏一人以從人望如此則陛下有繼絕之名臣景有立功之效河之南北為聖朝之邾莒言為小國以附於大國朝直遙翻為大梁之臣妾上以為然此杜弼所謂進孰圖身者也帝早在兵間曾不見此蓋天奪其鑒也乙亥下詔以太子舍人元貞為咸陽王考異曰梁紀作戊辰遣貞今從典略使還北主魏須渡江許即位須待也乘繩證翻貞樹之子也元樹來奔中大通四年為樊子鵠所禽蕭淵明至鄴東魏主升閶闔門受俘讓而釋之送於晉陽大將軍澄待之甚厚為澄因淵明約和以間侯景張本慕容紹宗引軍擊侯景景輜重數千兩馬數千匹士卒四萬人退保渦陽輜重之上當有景字文意乃明重直用翻兩音亮渦音戈旗甲耀日鳴鼓長驅而進景使謂之曰公等為欲送客為欲定雌雄邪紹宗曰欲與公決勝負遂順風布陳陳譖曰陣下魏陳同俟風止乃出戰不逆風故景俟風止乃出侯景多詭計好乘人背使備之果如其言景命戰士皆被短甲好呼到翻被皮義翻執短刀入東魏陳但低視斫人脛馬足東魏兵遂敗被短甲執短刀入敵陳力戰此必死之兵也紹宗之敗不亦宜乎其後景用此以敵陳霸先亦此術耳惟陳堅不可破是以一敗不能復振卒以走死儀同三司劉豐生被傷顯州刺史張遵業為景所擒魏收志永安中置顯州治汾州六玉領定戎建平真君郡紹宗豐生俱奔譙城裨將斛律光張恃顯尤之尤之者責過之也將即亮翻吾戰多矣未見如景之難克者也君輩試犯之光等被甲將出紹宗戒之曰勿渡渦水二人軍於水北光輕騎射之被皮義翻渦工禾翻射而亦翻下為射遷射同景臨渦水謂光曰爾求勳而來我懼死而去我汝之父友光父斛律金與景同事爾朱高歡故自謂父友汝豈自解不渡水南解戶買翻慕容紹宗教汝也光無以應景使其徒田遷射光馬洞胸光易馬隱樹又中之中竹仲翻退入於軍景擒恃顯既而捨之光走入譙城紹宗曰今定何如而尤我也光金之子也開府儀同三司段韶夾渦而軍潛於上風縱火景帥騎入水出而卻走草濕火不復然斛律光之勇雖不利段韶之智雖不獲逞然東魏之士氣未衰也故慕容紹宗乘機而運其巧得以成功觀史者若祗以一時勝負論人非有識略者也帥讀曰率復扶又翻魏岐州久經喪亂喪息浪翻刺史鄭穆初到有戶三千穆撫循安集數年之間至四萬餘戶考績為諸州之最丞相泰擢穆為京兆尹侯景與東魏慕容紹宗相持數月景食盡司馬世雲降於紹宗至是則侯景潰敗之形成矣張政烺標點容肇祖聶崇岐覆校
