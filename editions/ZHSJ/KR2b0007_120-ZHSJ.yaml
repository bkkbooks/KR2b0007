body:
  text: 資治通鑑卷第一百二十端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註宋紀二春太祖文皇帝上之上諱義隆小字車兒武帝第三子也元嘉元年甲子四二四是年八月始改元春春正月考異曰宋本紀正月癸巳朔日有食之宋紀二月己巳宋略二月癸巳李延壽南史二月己卯朔皆誤也按長曆是年正月丁巳二月丁亥朔後魏書紀志是年無日食今從之春丙寅魏安定殤王彌卒春營陽王居喪無禮好與左右狎暱好呼到翻下情好同遊戲無度特進致仕范泰上封事曰伏聞陛下時在後園頗習武備鼓鞞在宮聲聞于外鞞與鼙同音駢迷翻聞音問黷武掖庭之內諠譁省闥之間非徒不足以威四夷祗生遠近之怪陛下踐阼委政宰臣實同高宗諒闇之美闇讀如陰而更親狎小人懼非社稷至計經世之道也不聽泰甯之子也范甯汪之子以儒學為孝武帝所親南豫州刺史廬陵王義真警悟愛文義而性輕易易以豉翻與太子左衞率謝靈運員外常侍顏延之曹魏之末置員外散騎常侍率所律翻嘗云得志之日以靈運延之為宰相慧琳為西豫州都督西豫州即豫州也宋南豫州治歷陽豫州治壽陽壽陽在歷陽西故亦謂豫州為西豫州玄之孫也靈運玄子瑍之子也不遵法度褊方緬翻朝廷但以文義處之處昌呂翻不以為有實用靈運自謂才能宜參權要常懷憤邑延之含之曾孫也顏含見九十六卷晉成帝咸康四年徐羨之等惡義真與靈運等遊義真故吏范晏從容戒之義真曰靈運空疏延之隘薄魏文帝所謂古今文人類不護細行者也惡烏路翻從千容翻行下孟翻但性情所得未能忘言於悟賞耳悟開覺也賞褒嘉也非毀執政出靈運為永嘉太守延之為始安太守守式又翻義真至歷陽多所求索執政每裁量不盡與裁剸節也量概度也索山客翻量音良數有不平之言數所角翻又表求還都諮議參軍廬江何尚之屢諫不聽時羨之等已密謀廢帝而次立者應在義真乃因義真與帝有隙先奏列其罪惡廢為庶人徙新安郡前吉陽令堂邑張約之上疏曰吉陽縣屬廬陵郡今吉州有吉水縣蓋吳立縣於吉水之陽因以為名也廬陵王少蒙先皇優慈之遇長受陛下睦愛之恩故在心必言所懷必亮亮信也明也導也言義真凡有所懷自信以為是必明而導之無所回避也少詩照翻長知兩翻致招驕恣之愆言容有犯臣道之事以致招驕恣之罪實有卓然之美宜在容養錄善掩瑕訓盡義方進退以漸今猥加剝辱幽徙遠郡剝辱謂褫爵為庶人下令遠近恇然失圖恇去王翻臣伏思大宋開基造次造七到翻根條未繁宜廣樹藩戚敦睦以道人誰無過貴能自新以武皇之愛子陛下之懿弟豈可以其一眚長致淪棄哉書奏以約之為梁州府參軍尋殺之春夏四月甲辰魏主東巡大寧春秦王熾磐遣鎮南將軍吉毗等帥步騎一萬南伐白苟車孚崔提旁為四國皆降之白狗國至唐猶存蓋生羌也其地與東會州接車孚崔提旁為無所考帥讀曰率騎奇寄翻降戶江翻春徐羨之等以南兗州刺史檀道濟沈約曰中原亂北州流民多南渡晉成帝立南兗州寄治京口文帝始割江淮間為境治廣陵威服殿省且有兵衆乃召道濟及江州刺史王弘入朝將即亮翻朝直遙翻五月皆至建康以廢立之謀告之甲申謝晦以領軍府屋敗悉令家人出外聚將士於府內又使中書舍人邢安泰潘盛為內應夜邀檀道濟同宿晦悚動不得眠道濟就寢便熟晦以此服之服其處大事而不變其常度也時帝於華林園為列肆親自沽賣又與左右引船為樂夕遊天淵池即龍舟而寢樂音洛魏氏作華林園天淵池於洛中晉氏南渡放其制作之於建康華林園在宮城北隅乙酉詰旦詰去吉翻道濟引兵居前羨之等繼其後入自雲龍門安泰等先誡宿衞莫有禦者帝未興軍士進殺二侍者傷帝指扶出東閣收璽綬璽斯氏翻綬音受㣥臣拜辭衞送故太子宮侍中程道惠勸羨之等立皇弟南豫州刺史義恭羨之等以宜都王義隆素有令望又多符瑞景平初有黑龍見西方五色雲隨之二年江陵城上有紫雲望氣者皆以為帝王之符當在西方又江陵西至上明東及江津其間有九十九洲楚諺云洲滿百當出王者時忽有一洲自生汀流迴薄而成皆為上龍飛之應數帝過惡數所具翻廢為營陽王以宜都王纂承大統赦死罪以下又稱皇太后令奉還璽紱紱音弗幷廢皇后為營陽王遷營陽王於吳使檀道濟入守朝堂朝直遙翻王至吳止金昌亭六月癸丑羨之等使邢安泰就弒之王多力突走出昌門金昌亭在昌門內孫權記注云閶門吳西郭門夫差作以天門通閶闔故名之後春申君改為昌門金昌亭以其在西門內故曰金昌踣蒲北翻裴子野論曰古者人君養子能言而師授之辭能行而傅相之禮相息亮翻宋之教誨雅異於斯居中則任僕妾處外則近趨走處昌呂翻近其靳翻趨走執役者也太子皇子有帥有侍帥所類翻是二職者皆臺皁也左傳申無宇曰士臣皁僕臣臺授其法則導達臧否否音鄙罔弗由之言不及於禮義識不達於今古謹敕者能勸之以吝嗇狂愚者或誘之以凶慝誘音酉慝吐得翻雖有師傅多以耆艾大夫為之雖有友及文學多以膏粱年少為之具位而已亦弗與遊王置文學師友各一人晉制至也禮五十曰艾服官政六十曰耆指使孔穎達曰艾者年至五十氣力已衰髮蒼白如艾也賀瑒曰耆至也至老之境也少詩照翻長史行事宣傳教命行事行府州事也往往專恣竊弄威權南史曰故事府州部內論事皆籤前直敍所論之事後云謹籤日月下又云某官某籤故府州置典籤以領之本五品吏宋初改為士職宋末多以幼少皇子為藩鎮時主以左右親近領典籤其權任遂重嗣君沖幼世繼姦回雖惡物醜類天然自出然習則生常其流遠矣降及太宗舉天下而棄之亦昵比之為也昵尼質翻比毗至翻嗚呼有國有家其鑒之矣裴子野究言宋氏亡國之禍通鑑載之於此欲使有國有家謹於其初也春傅亮帥行臺百官奉法駕迎宜都王于江陵帥讀曰率祠部尚書蔡廓晉氏渡江始有祠部尚書常與右僕射通職不常置以右僕射攝之若右僕射闕則祠部尚書攝知右事遇疾不堪前亮與之別廓曰營陽在吳宜厚加供奉一旦不幸卿諸人有弒主之名欲立於世將可得邪時亮已與羨之議害營陽王乃馳信止之不及羨之大怒曰與人共計議如何旋背即賣惡於人邪旋背猶今人言轉背也背如字考異曰宋南史本紀二月廢義真徙新安之下即云執政使使者誅義真于新安宋義真傳六月癸未羨之等遣使殺義真於徙所羨之傳亦云廢帝後殺義真於新安殺帝於吳縣按長曆六月庚寅朔無癸未蓋癸丑也羨之以荊州地重恐宜都王至或別用人乃亟以錄命除領軍將軍謝晦行都督荊湘等七州諸軍事荊州刺史錄命錄尚書自出命也精兵舊將悉以配之羨之亮晦所以為身謀者如此而亦無救於廢弒之誅伊霍以至公血誠處之而師春所紀有異於書蓋不羨於伊尹霍光僅能保其身而不能保其族此天地之大變固人臣之所難居也將即亮翻秋七月行臺至江陵立行門於城南題曰大司馬門傅亮帥百僚詣門上表進璽紱儀物甚盛帥讀曰率上時掌翻璽斯氏翻紱音弗宜都王時年十八下教曰猥以不德謬降大命顧己兢悸何以克堪悸其季翻輒當暫歸朝廷展哀陵寢幷與賢彥申寫所懷望體其心勿為辭費府州佐史並稱臣請題牓諸門一依宮省王皆不許教州府國綱紀宥所統內見刑原逋責州荊州府都督府國宜都國綱紀上佐掾屬也見賢遍翻逋欠也負也責如字又仄懈翻漢書高紀兩家折券棄責無音淮陽王傳張博負責仄懈翻諸將佐聞營陽廬陵王死皆以為疑勸王不可東下司馬王華曰先帝有大功於天下四海所服雖嗣主不綱人望未改徐羨之中才寒士傅亮布衣諸生非有晉宣帝王大將軍之心明矣王大將軍敦也未容遽敢背德畏廬陵嚴斷背蒲妹翻斷丁亂翻將來必不自容以殿下寬叡慈仁遠近所知且越次奉迎冀以見德冀以定策為德也殆必不然又羨之等五人同功並位孰肯相讓五人謂徐羨之傅亮謝晦檀道濟王弘也勢必不行廢主若存慮其將來受禍致此殺害蓋由貪生過深寧敢一朝頓懷逆志不過欲握權自固以少主仰待耳殿下但當長驅六轡以副天人之心王曰卿復欲為宋昌邪少詩照翻復扶又翻宋昌事見十三卷漢高后八年長史王曇首南蠻校尉到彥之皆勸王行姓譜到本自高陽氏楚令尹屈到之後後漢有東平太守到質曇徒含翻王乃曰諸公受遺不容背義背蒲妹翻且勞臣舊將內外充滿今兵力又足以制物夫何所疑乃命王華總後任留鎮荊州王欲使到彥之將兵前驅彥之曰了彼不反了決知也將即亮翻朝直遙翻若使有虞此師既不足恃更開嫌隙之端非所以副遠邇之望也彥之此言誠合大理而亦自知其才不足以制檀道濟也雍於用翻乃遣彥之權鎮襄陽甲戌王發江陵引見傅亮號泣哀動左右見賢遍翻號戶高翻既而問義真及少帝薨廢本末少詩照翻悲哭嗚咽侍側者莫能仰視亮流汗沾背不能對乃布腹心於到彥之王華等深自結納王以府州文武嚴兵自衞臺所遣百官衆力不得近部伍近其靳翻中兵參軍朱容子抱刀處王所乘舟戶外不解帶者累旬防非常也處昌呂翻春魏主還宮春秦王熾磐遣太子暮末帥征北將軍木弈干等步騎三萬出貂渠谷攻河西白草嶺臨松郡皆破之水經註西平鮮谷塞東南有白草嶺帥讀曰率騎奇寄翻還從宣翻春八月丙申宜都王至建康㣥臣迎拜於新亭徐羨之問傅亮曰王可方誰亮曰晉文景以上人羨之曰必能明我赤心亮曰不然亮固知其不得免矣丁酉王謁初寧陵還止中堂晉孝武以太學在秦淮南去臺城懸遠權以中堂為太學親釋奠於先聖則中堂亦在秦淮北但在臺城之外耳百官奉璽綬綬音受乃受之即皇帝位于中堂備法駕入宮御太極前殿大赦改元文武賜位二等戊戌謁太廟詔復廬陵王先封迎其柩及孫脩華謝還建康孫脩華義真之母謝義真之也南史云晉武帝采漢魏之制以淑淑媛淑儀脩華脩容脩儀婕妤容華充華是為九嬪位視九卿李延壽曰貴嬪魏文帝所制夫人魏武初建魏國所制貴人漢光武所制晉為三夫人位視三公淑魏明帝所制淑媛魏文帝所制淑儀脩華晉武帝所制脩容魏文帝所制修儀魏明帝所制婕妤容華前漢舊號充華晉武帝所制美人漢光武所制庚子以行荊州刺史謝晦為真晦將行與蔡廓別屏人問曰屏必郢翻吾其免乎廓曰卿受先帝顧命任以社稷廢昏立明義無不可但殺人二兄而以之北面挾震主之威據上流之重以古推今自免為難蔡廓父子以亮直名于宋朝觀其抗言無所避就若不足以保身而卒能以身名終何也蓋其素行巳孚乎人而言事無所依違又所以遂其直彼其問者方怵於利害就以求決則聽之也固合於心而焉敢以為諱乎既發顧望石頭城喜曰今得脫矣癸卯徐羨之進位司徒王弘進位司空傅亮加開府儀同三司謝晦進號衞將軍檀道濟進號征北將軍謝晦自領軍將軍進號檀道濟自鎮北將軍進號有司奏車駕依故事臨華林園聽訟詔曰政刑多所未悉可如先者二公推訊二公謂徐羨之王弘帝以王曇首王華為侍中曇首領右衞將軍華領驍騎將軍朱容子為右軍將軍魏明帝有左軍將軍晉武帝置前軍右軍又置後軍是為四軍驍騎將軍游擊將軍並漢雜號將軍也魏置為中軍及晉以領護左右衞驍騎游擊為六軍驍堅堯翻騎奇寄翻春甲辰追尊帝母胡婕妤曰章皇后婕妤音接予諡法敬慎高明曰章封皇弟義恭為江夏王夏戶雅翻義宣為竟陵王義季為衡陽王仍以義宣為左將軍鎮石頭徐羨之等欲即以到彥之為雍州雍於用翻帝不許徵彥之為中領軍委以戎政彥之自襄陽南下謝晦已至鎮慮彥之不過己過古禾翻彥之至楊口步往江陵深布誠款晦亦厚自結納彥之留馬及利劍名刀以與晦晦由此大安春柔然紇升蓋可汗聞魏太宗殂將六萬騎入雲中殺掠吏民攻拔盛樂宮魏之先什翼犍始居雲中之盛樂宮築盛樂城於故城南八里紇戶骨翻可從刊入聲汗音寒將即亮翻騎奇寄翻樂音洛三日二夜至雲中紇升蓋引騎圍魏主五十餘重騎逼馬首相次如堵將士大懼魏主顏色自若衆情乃安紇升蓋以弟子於陟斤為大將魏人射殺之紇升蓋懼遁去重直龍翻射而亦翻考異曰後魏本紀云赭陽子尉普文率輕騎討之虜乃退走李延壽北史紀云帝帥輕騎討之虜乃退走今據蠕蠕傳從北史尚書令劉絜言於魏主曰大檀自恃其衆必將復來復扶又翻請俟收田畢大發兵為二道東西並進以討之魏主然之春九月丙子立袁氏為皇后耽之曾孫也袁耽見九十五卷成帝咸康元年春冬十月吐谷渾威王阿柴卒阿柴有子二十人疾病召諸子弟謂之曰先公車騎以大業之故捨其子拾虔而授孤孤敢私於緯代而忘先君之志乎先公謂樹洛干也樹洛干自號車騎將軍授阿柴國見一百一十八卷晉安帝義熙十三年緯于貴翻汝曹當奉慕璝為主緯代者阿柴之長子慕璝者阿柴之母弟叔父烏紇提之子也烏紇提之立也妻樹洛干母生二子慕璝慕利延緯于貴翻璝姑回翻提當作堤阿柴又命諸子各獻一箭取一箭授其弟慕利延使折之慕利延折之又取十九箭使折之慕利延不能折折而設翻阿柴乃諭之曰汝曹知之乎孤則易折易以豉翻衆則難摧汝曹當勠力一心然後可以保國寧家言終而卒慕璝亦有才略撫秦涼失業之民及氐羌雜種至五六百落部衆轉盛種章勇翻春十二月魏主命安集將軍長孫翰安北將軍尉眷北擊柔然魏主自將屯柞山柞山在平城之西大河之東柞則洛翻諸軍追之大獲而還翰肥之子也長孫肥事魏主珪為將數有功春詔拜營陽王母張氏為營陽太春林邑王范陽邁寇日南九德諸郡沈約曰九德郡故屬九真孫吳分立九德郡隋唐為驩州春宕昌王梁彌怱遣子彌黃入見于魏宕徒浪翻見賢遍翻宕昌羌之別種也羌地東接中國西通西域長數千里長直亮翻各有酋帥部落分地不相統攝而宕昌最強有民二萬餘落諸種畏之北史曰宕昌蓋三苗之胤杜佑曰其界自仇池以西東西千里席水以南南北八百里地多山阜宕徒浪翻酋慈由翻帥所類翻種章勇翻春夏主將廢太子璝而立少子酒泉公倫璝聞之將兵七萬北伐倫璝錄南臺自長安北伐倫璝姑回翻少詩照翻將即亮翻下同戰于高平倫敗死倫兄太原公昌將騎一萬襲璝殺之幷其衆八萬五千歸于統萬夏主大悅立昌為太子夏主好自矜大好呼到翻名其四門東曰招魏南曰朝宋西曰服涼北曰平朔朝直遙翻二年乙丑四二五十一月春正月徐羨之傅亮上表歸政表三上上時掌翻帝乃許之丙寅始親萬機羨之仍遜位還第徐佩之程道惠及吳興太守王韶之等並謂非宜守式又翻敦勸甚苦乃復奉詔視事速徐傅之死者佩之諸公也復扶又翻十一月辛未帝祀南郊大赦十一月己卯魏主還平城十一月二月燕有女子化為男燕主以問㣥臣尚書左丞傅權對曰西漢之末雌雞化為雄猶有王莽之禍漢書五行志宣帝黃龍元年未央殿輅軨中雌雞化為雄毛衣變化而不鳴不將無距元帝初元丞相府史家雌雞伏子漸化為雄冠距鳴將其後王后㣥弟世權以至於莽遂篡天下臣將為君之兆也十一月三月丙寅魏主尊保母竇氏為保太后密后之殂也密后即魏主之母杜貴嬪太宗以竇氏慈良有操行行下孟翻使保養之竇氏撫視有恩訓導有禮世祖德之故加以尊號奉養不異所生養羊亮翻十一月丁巳魏以長孫嵩為太尉長孫翰為司徒奚斤為司空十一月夏四月秦王熾磐遣平遠將軍叱盧犍等襲河西鎮南將軍沮渠白蹄於臨松擒之徙其民五千餘戶于枹罕犍居言翻沮子余翻枹音膚十一月魏主遣龍驤將軍步堆等來聘始復通好魏書官氏志西方步鹿孤氏改為步氏驤思將翻復扶又翻好呼到翻十一月六月武都惠文王楊盛卒初盛聞晉亡不改義熙年號謂世子玄曰吾老矣當終為晉臣汝善事宋帝及盛卒卒子恤翻玄自稱都督隴右諸軍事征西大將軍開府儀同三司秦州刺史武都王遣使來告喪始用元嘉年號使疏吏翻十一月秋七月秦王熾磐遣鎮南將軍吉毗等南擊黑水羌酋丘擔大破之黑水羌在鄧至西北水經註曰白水出臨洮縣西南西傾山東南流與黑水合黑水出羌中西南逕黑水城西又西南入于白水擔都甘翻十一月八月夏武烈帝殂葬嘉平陵廟號世祖太子昌即皇帝位昌字還國勃勃第二子也改元承光十一月王弘自以始不預定策不受司空表讓彌年乃許之弘以此得免徐傅之禍乙酉以弘為車騎大將軍開府儀同三司騎奇寄翻十一月冬十月丘擔以其衆降秦降戶江翻秦以擔為歸善將軍拜折衝將軍乞伏信帝為平羌校尉以鎮之十一月癸卯魏主大章甲十六行本大下有舉字乙十一行本同孔本同熊校同伐柔然五道並進長孫翰等從東道出黑漠考異曰翰傳云與娥清出長川今從蠕蠕傳長川牛川同是大漠之地拓跋分其地名耳長川有白黑二漠黑在東白在西東平公娥清出栗園栗園在中道之西西道之東考異曰清傳云與長孫翰出長川今從蠕蠕傳出爾寒山諸軍至漠南舍輜重舍讀曰捨重直用翻輕騎齎十五日糧度漠擊之騎奇寄翻柔然部落大驚絕迹北走十一月十一月以武都世子玄為北秦州刺史武都王時南秦州治漢中故以武都為北秦州考異曰宋本紀癸酉南史庚午按十一月壬午朔無癸酉及庚午今不書日十一月初會稽孔甯子為帝鎮西諮議參軍會工外翻及即位以甯子為步兵校尉與侍中王華並有富貴之願疾徐羨之傅亮專權日夜構之於帝史言徐傅偪上固當誅而王華等之構間亦非也遣其妻曹氏及長子世休送女至建康帝欲誅羨之亮幷發兵討晦聲言當伐魏又章甲十六行本又上有取河南三字乙十一行本同孔本同張校同退齋校同言拜京陵京陵興寧陵也治直之翻艦戶黯翻亮與晦書曰薄伐河朔事猶未已朝野之慮憂懼者多又言朝士多諫北征朝直遙翻上當遣外監萬幼宗往相諮訪南史曰制局監外監領器仗兵役多以嬖倖為之其謀頗泄處昌呂翻分扶問翻三年丙寅四二六樂冏復遣使告謝晦以徐傅及㬭等已誅春正月謝晦弟黃門侍郎㬭馳使告晦㬭子肖翻晦猶謂不然以傅亮書示諮議參軍何承天曰計幼宗一二日必至傅公慮我好事故先遣此書承天曰外間所聞咸謂西討已定幼宗豈有上理好事猶言好生事微省其辭若隱語然好呼到翻上時掌翻使承天豫立答詔啟草言伐虜宜須明年江夏內史程道惠得尋陽人書夏戶雅翻下同言朝廷將有大處分其事已審使其輔國府中兵參軍樂冏封以示晦道惠蓋帶輔國將軍也若果爾卿令我云何對曰蒙將軍殊顧常思報德事變至矣何敢隱情然明日戒嚴動用軍法區區所懷懼不得盡晦懼曰卿豈欲我自裁邪承天曰尚未至此以王者之重舉天下以攻一州大小既殊逆順又異境外求全上計也其次以腹心將兵屯義陽將軍自帥大衆戰於夏口若敗即趨義陽以出北境其次也承天二策皆勸晦奔魏以求全將即亮翻帥讀曰率趨七喻翻荊州用武之地兵糧易給聊且決戰走復何晚易以豉翻復扶又翻乃使承天造立表檄又與衞軍諮議參軍琅邪顏卲謀舉兵晦帶衞將軍晦立幡戒嚴謂司馬庾登之曰今當自下欲屈卿以三千人守城備禦劉粹登之曰下官親老在都又素無部衆情計二三不敢受此旨晦仍問諸將佐戰士三千足守城否南蠻司馬周超對曰非徒守城而已若有外寇可以立功超蓋為南蠻校尉府司馬超必能辨下官請解司馬南郡以授之登之晦府司馬領南郡太守乞解以授超領南義陽太守沈約曰晉末以義陽流民僑立南義陽郡屬荊州領厥西平氏二縣坐徂臥翻南郡如故登之蘊之孫也庾蘊死於海西之廢帝以王弘檀道濟始不預廢弒之謀弘弟曇首又為帝所親委事將發密使報弘且召道濟欲使討晦王華等皆以為不可帝曰道濟止於脅從本非創謀殺害之事又所不關吾撫而使之必將無慮乙丑道濟至建康丙寅下詔暴羨之亮晦殺營陽廬陵王之罪命有司誅之且曰晦據有上流或不即罪即就也帥讀曰率可遣中領軍到彥之即日電發征北將軍檀道濟駱驛繼路符衞軍府州以時收翦符衞軍府及荊州官屬使收誅晦也雍於用翻斷其走伏走逃也伏匿也斷其逃匿之路也斷丁管翻餘無所問是日詔召羨之亮羨之行至西明門外洛城西面有廣陽西明閶闔三門建康倣之㬭為黃門侍郎正入直省內也殿內有異處分亮辭以嫂病暫還遣使報羨之羨之還西州揚州刺史治臺城西故曰西州步走至新林新林浦去建康城二十里亮乘車出郭門乘馬奔兄迪墓屯騎校尉郭泓收之至廣莫門廣莫門建康城北門亦放洛城之制騎奇寄翻校戶教翻幷謂曰以公江陵之誠謂亮迎帝於江陵也亮讀詔書訖曰亮受先帝布衣之眷遂蒙顧託黜昏立明社稷之計也欲加之罪其無辭乎晉大夫里克之言誅羨之二子而宥其兄子佩之又誅晦子世休收繫謝㬭帝將討謝晦問策於檀道濟對曰臣昔與晦同從北征事見一百十八卷晉安帝義熙十三年晦有其九才略明練殆為少敵少詩沼翻然未嘗孤軍決勝戎事恐非其長其下當有所字晦悉臣勇今奉王命以討之可未陳而擒也陳與陣同丁卯徵王弘為侍中司徒錄尚書事揚州刺史以彭城王義康為都督荊湘等八州諸軍事荊州刺史樂冏復遣使告謝晦以徐傅及㬭等已誅復扶又翻下磐復同使疏吏翻晦先舉羨之亮哀次發子弟凶問既而自出射堂勒兵晦從高祖征討指麾處分莫不曲盡其宜數日間四遠投集得精兵三萬人乃奉表稱羨之亮等忠貞橫被冤酷橫戶孟翻且言臣等若志欲執權不專為國為于偽翻初廢營陽陛下在遠武皇之子尚有童幼擁以號令誰敢非之豈得泝流三千里自建康至江陵泝流而上凡三千里仰望鸞旗者哉景平二年五月乙酉廢少帝八月丙申帝至建康凡七旬於營陽之世積怨犯上自貽非命不有所廢將何以興亦晉里克之言此耿弇討張步之言晦引以為言自謂殺廬陵所以除偪不以累帝也遺于季翻此皆王弘王曇首王華險躁猜忌讒構成禍躁則到翻今當舉兵以除君側之惡樂冏復遣使告謝晦以徐傅及㬭等已誅秦王熾磐復遣使如魏請用師于夏秦入貢于魏以請伐夏事始上卷營陽王景平元年復扶又翻使疏吏翻樂冏復遣使告謝晦以徐傅及㬭等已誅初袁皇后生皇子劭后自詳視使馳白帝曰此兒形貌異常必破國亡家不可舉即欲殺之帝狼狽至后殿戶外手撥幔禁之乃止為劭弒逆張本幔莫半翻闇音陰故祕之閏月丙戌始言劭生樂冏復遣使告謝晦以徐傅及㬭等已誅帝下詔戒嚴大赦諸軍相次進路以討謝晦晦以弟遯為竟陵內史將萬人總留任帥衆二萬發江陵列舟艦自江津至于破冢將即亮翻帥讀曰率艦戶黯翻冢知隴翻旌旗蔽日歎曰恨不得以此為勤王之師晦欲遣兵襲湘州刺史張卲何承天以卲兄益州刺史茂度與晦善曰卲意趣未可知不宜遽擊之晦以書招卲卲不從樂冏復遣使告謝晦以徐傅及㬭等已誅二月戊午以金紫光祿大夫王敬弘為尚書左僕射晉制左右光祿大夫金章紫綬後遂為金紫光祿大夫敬弘廙之曾孫也王廙見八十九卷晉愍帝建興三年廙羊至翻又逸職翻庚申上發建康命王弘與彭城王義康居守入居中書下省中書有上省下省守手又翻帝姊會稽長公主留止臺內總攝六宮臺內即禁中會工外翻長知兩翻謝晦自江陵東下何承天留府不從晦至江口江口即西江口從才用翻庾登之據巴陵畏懦不敢進會霖雨連日參軍劉和之曰彼此共有雨耳檀征北尋至東軍方強惟宜速戰登之恇怯使小將陳祐作大囊貯茅懸於帆檣云可以焚艦恇去王翻將即亮翻貯丁呂翻艦戶黯翻用火宜須晴以緩戰期晦然之停軍十五日乃使中兵參軍孔延秀攻將軍蕭欣於彭城洲破之水經註江水過長沙下雋縣北又東逕彭城口水東有彭城磯陷之諸將咸欲退還夏口到彥之不可乃保隱圻水經註江水自彭城磯東逕如山北山北對隱磯且自矜其捷曰陛下若梟四凶於廟庭懸三監於絳闕以王弘王曇首王華比虞之共工驩兜苗鯀周之管叔蔡叔霍叔也梟堅堯翻還保所任初晦與徐羨之傅亮為自全之計以為晦據上流而檀道濟鎮廣陵各有強兵足以制朝廷羨之亮居中秉權可得持久及聞道濟帥衆來上惶懼無計道濟既至與到彥之軍合牽艦緣岸晦始見艦數不多輕之不即出戰至晚因風帆上前後連咽上時掌翻連謂沿江戰艦連接不斷咽謂戰艦塞江前後填咽西人離沮無復鬬心戊辰臺軍至忌置洲尾沮在呂翻水經注江水東過長沙下雋縣北湘水自南注之又東左得二夏浦俗謂之西江口又東逕忌置山南又東過彭城口復扶又翻列艦過江晦軍一時皆潰晦夜出投巴陵得小船還江陵先是帝遣雍州刺史劉粹自陸道帥步騎襲江陵至沙橋先悉薦翻雍於用翻帥讀曰率下同騎奇寄翻沙橋在江陵北周超帥萬餘人逆戰大破之士卒傷死者過半俄而晦敗問至初晦與粹善以粹子曠之為參軍帝疑之王弘曰粹無私必無憂也及受命南討一無所顧帝以此嘉之晦亦不殺曠之遣還粹所丙子帝自蕪湖東還晦至江陵無他處分唯愧謝周超而已其夜超捨軍單舸詣到彥之降舸古我翻晦衆散略盡乃攜其弟遯等七騎北走遯肥壯不能乘馬晦每待之行不得速己卯至安陸延頭水經註武湖水上通安陸之延頭九域志武湖在黃洲界蓋此湖上接延頭也杜佑曰武湖在黃洲黃陂縣東黃祖習戰閱武之所戍主戍副宋齊以下至隋咸有其官姓譜光姓也晉書有光逸到彥之至馬頭何承天自歸彥之因監荊州府事監工銜翻以周超為參軍劉粹以沙橋之敗告乃執之於是誅晦㬭遯及其兄弟之子幷同黨孔延秀周超等晦女彭城王被髮徒跣與晦訣曰大丈夫當橫尸戰場柰何狼藉都市被皮義翻藉而亦翻庾登之以無任免官禁錮何承天及南蠻行參軍新興王玄謨等皆見原據南史王玄謨太原祁縣人漢建安二十年集塞下荒地置新興郡魏黃初初遷于陘嶺之南玄謨蓋本新興人而居太原之祁縣界也左右皆棄之唯延陵蓋追隨不捨帝以蓋為鎮軍功曹督護延陵複姓蓋吳延陵季子之後蓋其名也為鎮軍府功曹又兼督護之官也晉氏渡江有參軍督護功曹參軍兼督護即參軍督護之任也洪适曰參軍督護江左置皆有部曲宋則無矣晦之起兵引魏南蠻校尉王慧龍為援魏以王慧龍為南蠻校尉以擾汝潁之間思陵戍在陳郡西北聞晦敗乃退益州刺史張茂度受詔襲江陵晦敗茂度軍始至白帝議者疑茂度有貳心帝以茂度弟卲有誠節赦不問代還三月辛巳帝還建康徵謝靈運為祕書監顏延之為中書侍郎賞遇甚厚帝以惠琳道人善談論因與議朝廷大事遂參權要賓客輻湊門車常有數十兩門車謂門前候見之車兩音亮方筵七八座上恆滿琳著高屐著陟略翻披貂裘置通呈書佐通呈典謁之職書佐掌書翰遇賓客填咽暄涼而已言但敍寒溫不及餘語會工外翻覬音冀遂有黑衣宰相可謂冠屨失所矣廬陵廢而三人斥徐傅誅而三人進可謂矯枉過正矣夏五月乙未以檀道濟為征南大將軍開府儀同三司江州刺史到彥之為南豫州刺史遣散騎常侍袁渝等十六人分行諸州郡縣觀察吏政訪求民隱散悉亶翻騎奇寄翻行下孟翻丙午上臨延賢堂聽訟延賢堂在建康華林園周禮秋官以三刺斷庶民獄訟之中一曰訊㣥臣二曰訊㣥吏三曰訊萬民註云刺殺也三訊罪定則殺之訊言也左僕射王敬弘性恬淡有重名關署文案初不省讀省悉景翻嘗預聽訟上問以疑獄敬弘不對上變色問左右何故不以訊牒副僕射謂不以訊牒副本納呈敬弘也臣乃得訊牒讀之正自不解解戶買翻曉也上甚不悅雖加禮敬不復以時務及之復扶又翻禮敬不替而不以時務及之此法正勸蜀先主以加禮許靖之智也六月以右衞將軍王華為中護軍侍中如故華以王弘輔政王曇首為上所親任與己相埒埒龍輟翻自謂力用不盡每歎息曰宰相頓有數人天下何由得治治直吏翻是時宰相無常官唯人主所與議論政事委以機密者皆宰相也故華有是言亦有任侍中而不為宰相者然尚書令僕中書監令侍中侍郎給事中皆當時要官也華與劉湛王曇首殷景仁俱為侍中風力局幹冠冕一時上嘗與四人於合殿宴飲甚悅合殿在齋閣之後李延壽曰晉世諸帝多處內房朝宴所臨東西二堂而已孝武末年清暑方構永初受命無所改作所居惟稱西殿不製嘉名文帝因之亦有合殿之稱上目送良久歎曰此四賢一時之秀同管喉脣恐後世難繼也喉脣言出納王命也黃門侍郎謝弘微與華等皆上所重當時號曰五臣弘微琰之從孫也琰安之子也從才用翻下同時然後言婢僕之前不妄語笑由是尊卑大小敬之若神從叔混特重之常曰微子異不傷物同不害正吾無間然呂大臨曰無間隙可言其失謝顯道曰猶言我無得而議之也嗚呼此江左所謂清談也間古莧翻上欲封王曇首王華等拊御牀曰此坐非卿兄弟無復今日因出封詔以示之以誅徐傅等為曇首華之功坐徂臥翻近日之事賴陛下英明罪人斯得臣等豈可因國之災以為身幸上乃止樂冏復遣使告謝晦以徐傅及㬭等已誅魏主詔問公卿今當用兵赫連蠕蠕二國何先杜佑曰柔然後魏太武以其無知狀類於蟲故改其號曰蠕蠕宋齊謂之芮芮蠕人兗翻赫連土著著直略翻未能為患不如先伐蠕蠕若追而及之可以大獲不及則獵於陰山取其禽獸皮角以充軍實太常崔浩曰蠕蠕鳥集獸逃言其來則如鳥之集走則如獸之逃也輕兵追之又不足以制敵赫連氏土地不過千里政刑殘虐人神所棄宜先伐之尚書劉絜武京侯安原請先伐燕於是魏主自雲中西巡至五原因畋於陰山東至和兜山和兜山蓋在陰山之東長川之南八月還平城樂冏復遣使告謝晦以徐傅及㬭等已誅詔殿中將軍吉恆聘于魏恆戶登翻樂冏復遣使告謝晦以徐傅及㬭等已誅燕太子永卒立次子翼為太子樂冏復遣使告謝晦以徐傅及㬭等已誅秦王熾磐伐河西至廉川遣太子暮末等步騎三萬攻西安不克又攻番禾河西王蒙遜發兵禦之且遣使說夏主騎奇寄翻番音盤使疏吏翻說輸芮翻使乘虛襲枹罕枹音膚夏主遣征南大將軍呼盧古將騎二萬攻苑川車騎大將軍韋伐將騎三萬攻南安熾磐聞之引歸蒙遜借助於夏以退秦師秦既敝於夏夏亦僨於魏而涼亦不能以自立是以親仁善鄰國之寶也徙其境內老弱畜產於澆河杜佑曰澆河城在廓州達化縣西一百二十里留左丞相曇達守枹罕韋伐攻拔南安獲秦秦州刺史翟爽南安太守李亮樂冏復遣使告謝晦以徐傅及㬭等已誅吐谷渾握逵等帥部衆二萬落叛秦奔昴川附於吐谷渾王慕璝史言乞伏兵勢漸衰帥讀曰率璝姑回翻樂冏復遣使告謝晦以徐傅及㬭等已誅大旱蝗樂冏復遣使告謝晦以徐傅及㬭等已誅左光祿大夫范泰上表曰婦人有三從之義婦人在室從父母既嫁從夫夫死從子謝晦婦女猶在尚方唯陛下留意有詔原之樂冏復遣使告謝晦以徐傅及㬭等已誅魏主聞夏世祖殂諸子相圖謂倫璝昌相殺也欲伐之長孫嵩等皆曰彼若城守以逸待勞大檀聞之乘虛入寇此危道也崔浩曰往年以來熒惑再守羽林鉤己而行其占秦亡事見一百十七卷晉安帝義熙十一年利以西伐天人相應不可失也嵩固爭之帝大怒責嵩在官貪污命武士頓辱之嵩歷事四朝魏之元臣也頓辱捽其首使頓地以辱之阪音反宋兵將軍周幾帥萬人襲陝城陝失冉翻以河東太守薛謹為鄉導謹辯之子也薛辯見一百十八卷晉安帝義熙十三年鄉讀曰嚮魏主欲以中書博士平棘李順總前驅之兵平棘縣二漢屬常山晉魏屬趙郡浩曰順誠有籌略然臣與之婚姻深知其為人果於去就不可專委帝乃止浩與順由是有隙為後魏主以浩言誅順張本冬十月丁巳魏主發平城樂冏復遣使告謝晦以徐傅及㬭等已誅秦左丞相曇達與夏呼盧古戰於嵻㟍山曇徒含翻嵻丘岡翻㟍盧當翻曇達兵敗十一月呼盧古韋伐進攻枹罕枹音膚秦王熾磐遷保定連呼盧古入南城南城枹罕南城卻之呼盧古韋伐又攻沙州刺史出連虔于湟河虔遣後將軍乞伏萬年擊敗之敗補邁翻又攻西平執安西將軍庫洛干阬戰士五千餘人掠民二萬餘戶而去樂冏復遣使告謝晦以徐傅及㬭等已誅仇池氐楊興平求內附梁南秦二州刺史吉翰晉泰始之初立梁州於漢中至安帝之世秦州又治漢中自是鎮漢中者帶梁南秦二州刺史武興漢武都郡之沮縣也蜀以其地當衝要置武興督以守之宋立東益州梁立武興蕃王國西魏改東益為興州因武興郡為名至我本朝以吳曦之變改為沔州將即亮翻諮擊走之樂冏復遣使告謝晦以徐傅及㬭等已誅魏主行至君子津會天暴寒冰合戊寅帥輕騎二萬濟河襲統萬帥讀曰率騎奇寄翻壬午冬至夏主方燕㣥臣魏師奄至上下驚擾魏主軍於黑水去城三十餘里夏主出戰而敗退走入城門未及閉內三郎豆代田帥衆乘勝入西宮內三郎魏宿衞之官也三郎將領之又按魏道武帝天興初置幢主幢將主內三郎內三郎衞士也宮門閉代田踰宮垣而出魏主拜代田勇武將軍勇武將軍之號魏始置癸未分兵四掠殺獲數萬得牛馬十餘萬魏主謂諸將曰將即亮翻下守將同統萬未可得也他年當與卿等取之乃徙其民萬餘家而還還從宣翻又如字夏弘農太守曹達聞周幾將至不戰而走魏師乘勝長驅遂入三輔會幾卒于軍中蒲阪守將東平公乙斗聞奚斤將至遣使詣統萬告急使者至統萬坂音反使疏吏翻下同魏軍已圍其城還告乙斗曰統萬已敗矣乙斗懼棄城西奔長安斤遂克蒲阪夏主之弟助興先守長安乙斗至與助興棄長安西奔安定考異曰奚斤傳作乙升今從帝紀斤入長安秦雍氐羌皆詣斤降雍於用翻降戶江翻河西王蒙遜及氐王楊玄聞之皆遣使附魏兵以氣勢為用者也統萬圍而諸鎮失守氣勢然也樂冏復遣使告謝晦以徐傅及㬭等已誅前吳郡太守徐佩之聚黨百餘人謀以明年正會於殿中作亂事覺壬戌收斬之正會明年正月朔旦朝會也亦曰元會樂冏復遣使告謝晦以徐傅及㬭等已誅營陽太張氏卒樂冏復遣使告謝晦以徐傅及㬭等已誅秦征南將軍吉毗鎮南漒乞伏國仁置十二郡漒川其一也南漒當又在漒川之南漒其良翻毗走還枹罕澹南奔仇池澹徒覽翻帥讀曰率樂冏復遣使告謝晦以徐傅及㬭等已誅魏初得中原民多逃隱天興中詔采諸漏戶令輸繒帛魏皇始二年克中山始得中原晉安帝之隆安元年也明年改元天興繒慈陵翻占之贍翻紬除留翻穀戶谷翻不隸郡縣賦役不均是歲始詔一切罷之以屬郡縣四年丁卯四二七春正月辛巳帝祀南郊乙酉魏主還平城統萬徙民在道多死能至平城者什纔六七己亥魏主如幽州夏主遣平原公定帥衆二萬向長安魏主聞之伐木陰山大造攻具再謀伐夏山羌叛秦羌分居武始洮陽南山者曰山羌秦王熾磐遣左丞相曇達招慰武始諸羌征南將軍吉毗招慰洮陽諸羌晉惠帝置洮陽縣屬狄道郡曇徒含翻吉毗為羌所擊奔還士馬死傷者什八九魏主還平城乙卯帝如丹徒己巳謁京陵初高祖既貴命藏微時耕具以示子孫帝至故宮晉之東遷也劉氏自彭城移居晉陵丹徒之京口里陵墓及故宮在焉有慚色近侍或進曰大舜躬耕歷山伯禹親事水土舜耕于歷山歷山之人皆讓畔伯禹親事水土手足胼胝安知先帝之至德稼穡之艱難乎二章甲十六行本二作三乙十一行本同張校同月丙子魏主遣高涼王禮鎮長安禮斤之孫也拓跋斤見一百四卷晉孝武太元元年丁丑魏廣平王連卒丁亥帝還建康戊子尚書右僕射鄭鮮之卒秦王熾磐以輔國將軍段暉為涼州刺史鎮樂都樂音洛平西將軍麴景為沙州刺史鎮西平寧朔將軍出連輔政為梁州刺史鎮赤水夏四月丁未魏員外散騎常侍步堆等來聘曹魏之末置員外散騎常侍散悉亶翻騎奇寄翻庚戌以廷尉王徽之為交州刺史徵前刺史杜弘文弘文有疾自輿就路或勸之待病愈弘文曰吾杖節三世弘文父慧度祖瑗三世鎮交州況被徵乎遂行卒於廣州被皮義翻卒子恤翻弘文慧度之子也魏奚斤與夏平原公定相持於長安魏主欲乘虛伐統萬簡兵練士部分諸將分扶問翻命司徒長孫翰等將三萬騎為前驅常山王素等將步兵三萬為後繼南陽王伏真等將步兵三萬部送攻具將軍賀多羅將精騎三千為前候前候者居前為候騎將即亮翻騎奇寄翻下同遵之子也拓跋遵見一百八卷晉孝武太元二十年魏主發平城命龍驤將軍代人陸俟督諸軍鎮大磧以備柔然魏書官氏志內入諸姓步六孤氏後改為陸氏驤思將翻磧七迹翻辛巳濟君子津壬午中護軍王華卒魏主至拔鄰山拔鄰山在黑水東北捨輜重北史捨作舍當從之讀如字重直用翻以輕騎三萬倍道先行㣥臣咸諫曰統萬城堅非朝夕可拔今輕軍討之進不可克退無所資不若與步兵攻具一時俱往帝曰用兵之術攻城最下必不得已然後用之今以步兵攻具皆進彼必懼而堅守若攻不時拔食盡兵疲外無所掠進退無地不如以輕騎直抵其城彼見步兵未至意必寬弛吾羸形以誘之羸倫為翻誘音酉彼或出戰則成擒矣所以然者吾之軍士去家二千餘里又隔大河所謂置之死地而後生者也去國遠鬬人皆致死故其鋒不可當決戰則有餘矣遂行六月癸卯朔日有食之魏主至統萬分軍伏於深谷以少衆至城下藏匿其衆以少衆至城下誘其出戰少詩沼翻將即亮翻降戶江翻言夏主聞有魏師遣使召平原公定定曰統萬堅峻未易攻拔易以豉翻待我擒奚斤然後徐往內外擊之蔑不濟矣故夏主堅守以待之魏主患之患其不出戰也遣娥清及永昌王健帥騎五千西掠居民帥讀曰率騎奇寄翻下同魏軍士有得罪亡奔夏者言魏軍糧盡士卒食菜輜重在後步兵未至宜急擊之夏主從之使魏主用間亦不如是之巧殆天啟之也重直用翻甲辰將步騎三萬出城長孫翰等皆言夏兵步陳難陷陳讀曰陣宜避其鋒魏主曰吾遠來求賊惟恐不出今既出矣乃避而不擊彼奮我弱非計也遂收衆偽遁引而疲之夏兵為兩翼鼓譟追之行五六里會有風雨從東南來揚沙晦冥宦者趙倪頗曉方術言於魏主曰今風雨從賊上來我向之彼背之背蒲妹翻天不助人且將士飢渴願陛下攝騎避之攝收也崔浩叱之曰是何言也吾千里制勝一日之中豈得變易言先定必勝之計故千里行師不可以風雨之故變易成算於一日之間後軍已絕宜隱軍分出掩擊不意風道在人豈有常也言風在人用之分兵出其後順風擊之則風為我用豈有常勢哉善乃分騎為左右隊以掎之掎居蟻翻魏主馬蹶而墜幾為夏兵所獲拓跋齊以身捍蔽決死力戰夏兵乃退魏主騰馬得上刺夏尚書斛黎文殺之又殺騎兵十餘人身中流矢幾巨依翻上時掌翻刺七亦翻中竹仲翻斛黎虜複姓奮擊不輟夏衆大潰齊翳槐之玄孫也翳槐什翼犍之兄晉成帝咸和四年立魏人乘勝逐夏主至城北殺夏主之弟河南公滿及兄子蒙遜死者萬餘人夏主不及入城遂奔上邽魏主微服逐奔者入其城拓跋齊固諫不聽夏人覺之諸門悉閉魏主因與齊等入其宮中得婦人裙繫之槊上魏主乘之而上僅乃得免會日暮夏尚書僕射問至奉夏主之母出走問姓至名孫愐曰襄州有問姓不及而還乙巳魏主入城獲夏王公卿將校及諸母后姊妹宮人以萬數馬三十餘萬匹牛羊數千萬頭府庫珍寶車旗器物不可勝計將即亮翻校戶教翻勝音升頒賜將士有差初夏世祖性豪侈夏王勃勃廟號世祖事見一百十六卷晉安帝義熙九年基厚三十步上廣十步宮牆高五仞高古號翻厚戶遘翻廣古曠翻其堅可以厲刀斧臺榭壯大皆雕鏤圖畫被以綺繡窮極文采魏主顧謂左右曰蕞爾國而用民如此被皮義翻蕞徂內翻欲不亡得乎得夏太史令張淵徐辯復以為太史令得故晉將毛脩之秦將軍庫洛干歸庫洛干於秦以毛脩之善烹調用為太官令毛脩之為夏所禽見一百十八卷晉安帝義熙十四年庫洛干被禽見上年譽夏主太過譽音余怒曰此豎無道何敢如是誰所為邪當速推之欲按其罪也文士褒貶多過其實蓋非得已不足罪也乃止魏主納夏世祖三女為貴人奚斤與夏平原公定猶相拒於長安魏主命宗正娥清太僕丘堆帥騎五千略地關右定聞統萬已破遂奔上邽斤追至雍不及而還雍於用翻清堆攻夏貳城拔之魏主詔斤等班師斤上言赫連昌亡保上邽鳩合餘燼未有蟠據之資今因其危滅之為易易以豉翻請益鎧馬平昌而還鎧可亥翻魏主不許斤固請乃許之給斤兵萬人遣將軍劉拔送馬三十章甲十六行本十作千乙十一行本同孔本同匹幷留娥清丘堆使共擊夏辛酉魏主自統萬東還以常山王素為征南大將軍假節與執金吾桓貸莫雲留鎮統萬魏書官氏志內入諸姓烏丸氏為桓氏題之弟也莫題見一百十四卷晉安帝義熙四年秦王熾磐還枹罕夏既破故熾磐還枹音膚秋七月己卯魏主至柞嶺柞嶺即柞山之嶺柞則洛翻聞魏已克統萬乃遁去秦王熾磐謂㣥臣曰孤知赫連氏必無成冒險歸魏事見上卷營陽王景平元年八月遣其叔父平遠將軍渥頭等入貢于魏壬子魏主還至平城以所獲頒賜留臺百官有差魏主為人壯健鷙勇臨城對陳陳讀曰陣親犯矢石左右死傷相繼神色自若由是將士畏服咸盡死力將即亮翻下同性儉率服御飲膳取給而已㣥臣請增峻京城及脩宮室曰易云王公設險以守其國易坎卦彖辭不壯不麗無以重威事見十一卷漢高帝七年古人有言在德不在險吳起之言豈在城也今天下未平方須民力土功之事朕所未為蕭何之對非雅言也雅正也不可輕費至於賞賜皆死事勳績之家親戚貴寵未嘗橫有所及橫戶孟翻命將出師指授節度違之者多致負敗明於知人或拔士於卒伍之中唯其才用所長不論本末聽察精敏下無遁情賞不違賤罰不避貴雖所甚愛之人終無寬假常曰法者朕與天下共之何敢輕也然性殘忍果於殺戮往往已殺而復悔之如崔浩之類是也復扶又翻九月丁酉安定民舉城降魏夏都既破安定亦降降戶江翻下同氐王楊玄遣將軍苻白作圍秦梁州刺史出連輔政于赤水城中糧盡民執輔政以降輔政至駱谷逃還冬十月秦以驍騎將軍吳漢為平南將軍梁州刺史鎮南漒驍堅堯翻騎奇寄翻漒其良翻十一月魏主遣軍司馬公孫軌兼大鴻臚持節策拜楊玄為都督荊梁等四州諸軍事梁州刺史南秦王封玄為南秦王以別乞伏熾磐臚陵如翻玄不出迎軌責讓之欲奉策以還玄懼而郊迎魏主善之以軌為尚書軌表之子也表死於營陽王景平元年十二月秦梁州刺史吳漢為㣥羌所攻帥戶二千還于枹罕帥讀曰率魏主行如中山癸卯還平城聶崇岐標點王崇武覆校
