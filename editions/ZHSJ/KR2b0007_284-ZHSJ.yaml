body:
  text: 資治通鑑卷第二百八十四端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千六百戶食實封一千戶臣司馬光奉敕編集後學天台音註後晉紀五齊王中十二月開運元年甲辰九四四十二月二月甲辰朔命前保義節度使石贇守麻家口前威勝節度使何重建守楊劉鎮護聖都指揮使白再榮守馬家口西京留守安彥威守河陽贇於倫翻按是時凡緣河津要皆以兵守之亦由燕冀瀛莫既入于北遼人南寇了無關山塘濼之阻其兵可以徑造河上故不得不緣河為備也未幾周儒引契丹將麻荅自馬家口濟河營於東岸攻鄆州北津以應楊光遠麻荅契丹主之從弟也幾居豈翻從才用翻鄆音運乙巳遣侍衞馬軍都章十二行本都下有指字乙十一行本同孔本同熊校同揮使義成節度使李守貞神武統軍皇甫遇陳州防禦使梁漢璋懷州刺史薛懷讓將兵萬人緣河水陸俱進守貞河陽漢璋應州懷讓太原人也丙午契丹圍高行周符彥卿及先鋒指揮使石公霸於戚城春秋時戚屬衞地河上邑也東坡指掌圖以為衞之戚今在博州界按是時晉與契丹相拒於澶衞之間此戚城當在澶州之北魏州之南疑不在博州之界也無得相救行周等告急延廣徐白帝帝自將救之契丹解去三將泣訴救兵之緩幾不免幾居衣翻戊申李守貞等至馬家口契丹遣步卒萬人築壘散騎兵於其外餘兵數萬屯河西船數千艘渡兵未已艘蘇遭翻晉兵薄之契丹騎兵退走晉兵進攻其壘拔之契丹大敗乘馬赴河溺死者數千人俘斬亦數千人河西之兵慟哭而去由是不敢復東楊光遠之援絕矣復扶又翻十二月辛亥定難節度使李彞殷奏將兵四萬自麟州濟河侵契丹之境定難軍夏州九域志麟州西北至夏州一百二十里自麟州東北至府州又自府州東北行入契丹境難乃旦翻壬子以彞殷為契丹西南面招討使初契丹主得貝州博州皆撫慰其人或拜官賜服章及敗於戚城及馬家口忿恚恚於避翻所得民皆殺之得軍士燔炙之由是晉人憤怒戮力爭奮楊光遠將青州兵欲西會契丹戊午詔石贇分兵屯鄆州以備之石贇時屯麻家口詔劉知遠將部兵自土門出恆州擊契丹又詔會杜威馬全節於邢州知遠引兵屯樂平不進樂平離太原二百餘里耳十二月帝居喪期年即於宮中奏細聲女樂細聲女樂欲其不聞於外也常令左右奏三絃琵琶和以羌笛和戶臥翻擊鼓歌舞曰此非樂也庚申百官表請聽樂詔不許居喪而納叔母尚何責乎聽樂十二月壬戌楊光遠圍棣州刺史李瓊出兵擊敗之楊光遠自青州歷淄州而圍棣州敗補賣翻還從宣翻又如字癸亥以前威勝節度使何重建為東面馬步都部署將兵屯鄆州十二月階成義軍指揮使王君懷帥所部千餘人叛降蜀請為鄉道以取階成鄉讀曰向階成二州名甲子蜀人攻階州十二月契丹偽棄元城去伏精騎於古頓丘城頓丘漢古縣爾雅丘一成曰頓丘後移治所於陰安城唐頓丘縣又移治於陰安城之南天福三年徙澶州跨德勝津併頓丘縣徙焉頓丘凡三徙矣古城蓋陰安城也時詔杜威馬全節以兵來會契丹欲俟其合而邀擊之大軍欲進追之會霖雨而止契丹設伏旬日人馬飢疲趙延壽曰晉軍悉在河上畏我鋒銳必不敢前不如即其城下即就也奪其浮梁謂澶州德勝渡之河梁也契丹主從之三月癸酉朔自將兵十餘萬陳於澶州城北宋白曰契丹時駐兵澶州鐵丘陳讀曰陣下同登城望之不見其際高行周前軍在戚城之南與契丹戰自午至晡互有勝負契丹主以精兵當中軍而來帝亦出陳以待之契丹主望見晉軍之盛謂左右曰楊光遠言晉兵半已餒死楊光遠誘契丹入寇見上卷上年以精騎左右略陳晉軍不動萬弩齊發飛矢蔽地契丹稍卻又攻晉陳之東偏不克苦戰至暮兩軍死者不可勝數勝音升昏後契丹引去營於三十里之外不敢逼城而營懼晉軍攻劫也乙亥契丹主帳中小校竊其馬亡來云契丹已傳木書收軍北去校戶教翻木書者書之於木以為信契景延廣疑其詐閉壁不敢追十二月漢主命中書令都元帥越王弘昌謁烈宗陵於海曲劉龔舉大號追尊其兄隱為烈宗使盜殺之十二月契丹主自澶州北分為兩軍一出滄德一出深冀而歸所過焚掠方廣千里廣古曠翻民物殆盡留趙延照為貝州留後麻荅陷德州擒刺史尹居璠璠音煩十二月閩拱宸都指揮使朱文進閤門使連重遇既弒康宗見二百八十二卷天福四年相與結婚以自固閩主曦果於誅殺嘗遊西園因醉殺控鶴指揮使魏從朗從朗朱連之黨也又嘗酒酣誦白居易詩云惟有人心相對間咫尺之情不能料因舉酒屬二人易以豉翻屬之欲翻二人起流涕再拜曰臣子事君父安有他志曦不應二人大懼李后妬尚賢之寵欲弒曦而立其子亞澄尚賢有寵見上卷天福八年閩王之永隆四年也亞澄時封閩王主上殊不平於二公柰何會后父李真有疾乙酉曦如真第問疾文進重遇使拱宸馬步使錢達弒曦於馬上召百官集朝堂告之曰太祖昭武皇帝光啟閩國朝直遙翻閩主王鏻舉大號追尊其父審知曰太祖昭武皇帝今子孫淫虐荒墜厥緒天厭王氏宜更擇有德者立之更工行翻衆莫敢言重遇乃推文進升殿被袞冕被皮義翻帥㣥臣北面再拜稱臣帥讀曰率文進自稱閩主悉收王氏宗族延喜以下少長五十餘人皆殺之延喜閩主之弟也少詩照翻長知兩翻諡曰睿文廣武明聖元德隆道大孝皇帝廟號景宗以重遇總六軍禮部尚書判三司鄭元弼抗辭不屈黜歸田里將奔建州欲奔王延政也文進下令出宮人罷營造以反曦之政殷主延政遣統軍使吳成義將兵討文進不克文進加樞密使鮑思潤同平章事以羽林統軍使黃紹頗為泉州刺史左軍使程文緯為漳州刺史汀州刺史同安許文稹舉郡降之九域志泉州同安縣在州西一百三十五里蓋王氏所置也宋白曰開元十九年析泉州南安縣界四鄉置大同場閩王升為同安縣稹章忍翻十二月丁亥詔太原恆安章十二行本安作定乙十一行本同孔本同退齋校同兵各還本鎮契丹已退故也十二月辛卯馬全節攻契丹泰州拔之五代會要後唐天成三年升奉化軍為泰州以清苑縣為理所至晉開運二年九月移治滿城縣至周廣順二年二月廢州其滿城縣割隸易州時馬全節自定州攻泰州十二月敕天下籍鄉兵每七戶共出兵械資一卒十二月秦州兵救階州出黃階嶺敗蜀兵於西平敗補賣翻十二月漢以戶部侍郎陳偓同平章事十二月夏四月丁未緣河巡檢使梁進以鄉社兵復取德州鄉社兵民兵也時契丹寇掠緣河之民自備兵械各隨其鄉團結為社以自保衞契丹陷德州而北歸梁進乘其去而復取之己酉命歸德節度使高行周保義節度使王周留鎮澶州庚戌帝發澶州甲寅至大梁侍衞馬步都指揮使天平節度使同平章事景延廣既為上下所惡上謂將相大臣下謂軍民惡烏路翻桑維翰引其不救戚城之罪引牽也牽發其罪猶人收捲衣物於懷袖間從而牽出之然辛酉加延廣兼侍中出為西京留守晉徙都汴以河南府為西京延廣鬱鬱不得志橛豎小人得權則驕溢使氣失權則鬱鬱不得志乃其常也始憂國破身危遂日夜縱酒自知無復全地苟取朝夕之樂朝廷因契丹入寇國用愈竭復遣使者三十六人分道括率民財各封劍以授之示使專斷斬此以威脅取民財也復扶又翻使者多從吏卒攜鎖械刀杖入民家小大驚懼求死無地州縣吏復因緣為姦復扶又翻下同河南府出緡錢二十萬此括率合出之數也景延廣增率十七萬欲以入己章十二行本官下有河南二字乙十一行本同孔本同張校同盧億言於延廣曰公位兼將相富貴極矣今國家不幸府庫空竭不得已取於民公何忍復因而求利為子孫之累乎累力瑞翻延廣慙而止史言景延廣差愈於杜重威先是詔以楊光遠叛命兗州脩守備青兗鄰鎮故命之為備先昔薦翻以治樓堞為名堞達協翻率民財以實私藏藏徂浪翻下同大理卿張仁愿為括率使至兗州賦緡錢十萬值審信不在不在者適不在鎮指取錢一囷已滿其數史言晉之藩鎮利國有難浚民以肥家十二月戊寅命侍衞馬步軍都虞候泰寧節度使李守貞將步騎二萬討楊光遠於青州李守貞蓋代安審信帥泰寧也以備契丹契丹遣兵救青州齊州防禦使堂陽薛可言邀擊敗之堂陽縣屬冀州宋皇祐四年省縣為鎮入南宮縣九域志曰地在堂水之陽敗補賣翻十二月丙戌詔諸州所籍鄉兵號武定軍凡得七萬餘人時兵荒之餘復有此擾民不聊生異時契丹入汴武定軍曷嘗能北向發一矢乎復扶又翻十二月丁亥鄴都留守張從恩上言趙延照雖據貝州麾下兵皆久客思歸宜速進軍攻之詔以從恩為貝州行營都部署督諸將擊之辛卯從恩奏趙延照縱火大掠棄城而遁屯於瀛莫阻水自固瀛莫之間多水濼故趙延照阻以為固瀛莫相去一百一十里十二月朱文進遣使如唐唐主囚其使將伐之唐主欲討朱文進弒君之罪十二月六月辛酉官軍拔淄州斬其刺史劉翰淄州楊光遠之巡屬也十二月太尉侍中馮道雖為首相馮道自唐潞王之時已正拜三公晉高祖入洛用以為相位任在執政之右無所操決此馮道保身固位之術一生所受用者也操七刀翻馮道承平之良相今艱難之際譬如使禪僧飛鷹耳言禪以靜寂為宗僧以慈悲不殺為教為禪僧者第能機辯無窮而不能應物使之飛鷹搏擊非其任也癸卯以道為匡國節度使兼侍中出馮道鎮同州將別命相也十二月乙巳漢主幽齊王弘弼于私第十二月或謂帝曰陛下欲禦北狄安天下非桑維翰不可請罷馮道請用桑維翰蓋出一人之口前史謂維翰倩人以言於帝通鑑皆曰或者疑其辭丙午復置樞密院罷樞密院見二百八十二卷高祖天福四年事無大小悉以委之數月之間朝廷差治治直吏翻十二月滑州河決浸汴曹單濮鄆五州之境環梁山合于汶梁山在鄆州壽張縣汶水自東北來與濟水會于梁山東北今決河之水瀰漫環梁山而合于汶單音善濮音卜環音宦汶音問塞昔則翻既塞帝欲刻碑紀其事中書舍人楊昭儉諫曰陛下刻石紀功不若降哀痛之詔染翰頌美不若頒罪己之文帝善其言而止十二月初高祖割北邊之地以賂契丹事見二百八十卷高祖天福元年府州領府谷一縣後唐以麟州東北河濱之地置宋白曰府州本河西蕃界府谷鎮土人折嗣倫世為鎮將後唐莊宗天佑七年升鎮為府谷縣八年升建府州以扼蕃界以嗣倫男從遠為刺史折姓從遠名姓氏略折常列翻州人大恐從遠因保險拒之及帝與契丹絕遣使諭從遠使攻契丹從遠引兵深入拔十餘寨戊午以從遠為府州團練使從遠雲州人也歐史曰折從遠雲中人蓋指古雲中郡大界言之十二月甲子復置翰林學士廢翰林學士見二百八十二卷天福五年戊辰以右散騎常侍李慎儀為兵部侍郎翰林學士承旨都官郎中劉溫叟金部郎中知制誥武強徐台符武強縣屬深州九域志在州東北六十里皆為學士溫叟岳之子也劉岳見二百五十卷唐明宗天成元年十二月秋七月辛未朔大赦改元改元開運十二月己丑以太子太傅劉昫為司空兼門下侍郎同平章事十二月八月辛丑朔以河東節度使劉知遠為北面行營都統順國節度使杜威為都招討使督十三節度以備契丹桑維翰兩秉朝政出楊光遠景延廣於外楊光遠景延廣先皆嘗總宿衞兵天福初桑維翰秉政出楊光遠是時再秉政出景延廣朝直遙翻節度使十五人無敢違者劉知遠杜威幷十三節度為十五人按薛史載十三節度鄆州張從恩充馬步都監西京留守景延廣充都排陣使徐州趙在禮充都虞候晉州安叔千充左廂排陣使前兗帥安審信充右廂河中安審琦充馬步都指揮使河陽符彥卿充馬軍左廂滑州皇甫遇充右廂右神武統軍張彥澤充馬軍排陣使滄州王廷胤充步軍左廂都指揮使陝州宋彥筠充右廂前金帥田武充步軍左廂排陣使右龍武統軍潘環充右廂朔方節度使馮暉上章自陳未老可用而制書見遺維翰詔禁直學士詔禁直學士者以詔旨詔之也禁直學士學士之入直禁地者也非制書忽忘忘巫放翻實以朔方重地非卿無以彈壓比欲移卿內地比毗至翻受代亦須奇才受當作授甚喜時軍國多事百司及使者咨請輻湊維翰隨事裁決初若不經思慮人疑其疏略退而熟議之亦終不能易也然為相頗任愛憎一飯之恩睚眦之怨必報人以此少之史稱桑維翰之長而併及其短所以明是非示勸警睚五懈翻眦士懈翻少詩照翻契丹之入寇也帝再命劉知遠會兵山東太原以河北之地為山東帝初詔劉知遠自土門出恆州尋又詔會兵邢州並見上帝疑之謂所親曰太原殊不助朕必有異圖果有分何不速為之言若有分為天子何不速為之怒之之辭也分扶問翻而實無臨制之權密謀大計皆不得預知遠亦自知見疏但慎事自守而已郭威見知遠有憂色謂知遠曰河東山川險固河東治晉陽東阻太行常山西限龍門西河南有霍太山雀鼠谷之隘北有鴈門五臺諸山之險故云然土多戰馬此所謂恃險與馬也動則習軍旅此霸王之資也王于況翻何憂乎十二月朱文進自稱威武留後權知閩國事遣使奉表稱藩于晉癸丑以文進為威武節度使知閩國事十二月癸亥置鎮寧軍於澶州以濮州隸焉割天平巡屬之濮州以隸鎮寧軍十二月初吳濠州刺史劉金卒子仁規代之仁規卒子崇俊代之唐烈祖置定遠軍於濠州唐置定遠軍於濠州通鑑書於天福八年三月元宗即位之後見上卷會清淮節度使姚景卒唐置清淮軍於壽州求兼領壽州唐主陽為不知其意徙崇俊為清淮節度使以楚州刺史劉彥貞為濠州觀察使馳往代之崇俊悔之彥貞信之子也劉信事吳楊氏四世有戰功十二月九月庚午朔日有食之十二月丙子契丹寇遂城樂壽遂城縣屬易州宋太平興國六年置威虜軍景德元年改廣信軍在易州東南八十里當五迴嶺及狼山之要金置遂州樂壽縣屬深州宋分屬瀛州九域志在瀛州之南八十里十二月冬十月丙午漢主毒殺鎮王弘澤于邕州十二月殷主延政遣其將陳敬佺以兵三千屯尤溪及古田唐永泰二年分候官尤溪置古田縣屬福州九域志在州西北一百八十里尤溪縣在南劍州南一百九十五里宋白曰按尤溪縣理今當延平東南二百四十里在福州西北八百三十五里其地與漳州龍巖縣劍州沙縣及福州候官縣三處交界山洞幽深灘溪險峻內有千里諸境逃人多投此洞開元二十八年經略使唐脩忠招諭其人因以名縣此源先號尤溪因名古田縣亦開元二十九年開山洞置唐武德六年置長溪縣屬福州九域志在州東北三百四十五里宋白曰長溪縣本漢閩縣地唐置溫麻縣以縣界溫麻溪為名天寶九年改為長溪縣泉州散員指揮使桃林留從效九域志泉州有桃林溪蓋留從效所居之地散昔亶翻朱文進屠滅王氏遣腹心分據諸州吾屬世受王氏恩而交臂事賊一旦富沙王克福州殷主延政本封富沙王衆以為然十一月從效等各引軍中所善壯士夜飲於從效之家從效紿之曰富沙王已平福州密旨令吾屬討黃紹頗朱文進時以黃紹頗為泉州刺史皆非久處貧賤者從吾言富貴可圖不然禍且至矣衆皆踊躍操白梃踰垣而入執紹頗斬之處昌呂翻操七刀翻梃大鼎翻從效持州印詣王繼勳第請主軍府從效自稱平賊統軍使函紹頗首遣副兵馬使臨淮陳洪進齎詣建州唐長安四年分徐城南界兩鄉於沙熟淮口置臨淮縣開元二十三年移治泗州郭下陳洪進蓋本臨淮人而從軍泉州洪進至尤溪福州戍兵數千遮道洪進紿之曰義師已誅朱福州朱文進據福州故以稱之嗣君謂殷主延政當嗣有閩國以紹頗首示之衆遂潰大將數人從洪進詣建州延政以繼勳為侍中泉州刺史從效忠順思安洪進皆為都指揮使漳州將程謨聞之按九域志泉州西南至漳州三百六十里鄰郡也章乙十一行本亡作立孔本作亦殺刺史程文緯亡當作立筆誤也否則亦字繼勳繼成皆延政之從子也從才用翻朱文進之滅王氏事見上三月汀州刺史許文稹奉表請降於殷稹止忍翻十二月十二月癸丑加朱文進同平章事封閩國王癸丑大梁出命之日也命未達而文進誅矣十二月李守貞圍青州經時是年五月李守貞圍青州餓死者太半契丹援兵不至楊光遠遙稽首於契丹稽音啟曰皇帝皇帝誤光遠矣其子承勳承祚承信勸光遠降冀全其族光遠不許曰吾昔在代北嘗以紙錢祭天池而沈楊光遠本沙陀部人居代北天池即汾陽縣之天池時屬嵐州靜樂縣界沈持林翻姑待之丁巳承勳斬勸光遠反者節度判官丘濤等送其首於守貞縱火大譟劫其父出居私第上表待罪開城納官軍十二月朱文進聞黃紹頗死大懼以重賞募兵二萬遣統軍使林守諒內客省使李廷鍔將之攻泉州鉦鼓相聞五百里福州至泉州不及四百里史家張大以言其聲勢耳將即亮翻留從效開門與福州兵戰大破之斬守諒執廷鍔延政遣統軍使吳成義帥戰艦千艘攻福州艦戶黯翻艘疏刀翻朱文進遣子弟為質於吳越以求救質音致初唐翰林待詔臧循盛唐之時有翰林待詔以處伎藝之人循常為賈人習福建山川為文徽畫取建州之策賈音古為文于偽翻文徽表請用兵擊王延政國人多以為不可唐主以文徽為江西安撫使循行境上覘其可否行下孟翻覘丑廉翻又丑豔翻文徽至信州奏言攻之必克唐主以洪州營屯都虞候邊鎬為行營招討諸軍都虞候將兵從文徽伐殷文徽自建陽進屯蓋竹唐武德四年分建安縣置建陽縣屬建州建陽在建州西一百三十里建陽縣之南二十五里有地名蓋竹殷將張漢卿章十二行本卿作真乙十一行本同孔本同自鏞州將兵八千將至文徽懼退保建陽臧循屯邵武邵武亦本漢治縣之地吳於此立昭武鎮晉平吳更昭武鎮曰邵武縣隋廢而復置唐屬建州九域志在州西南二百七十里宋白曰邵武縣本東候官縣之北鄉也孫策置南平縣吳景帝三年置昭武縣晉太康三年改為邵武執循送建州斬之十二月朝廷以楊光遠罪大而諸子歸命難於顯誅命李守貞以便宜從事閏月癸酉守貞入青州遣人拉殺光遠於別第以病死聞拉盧合翻丙戌起復楊承勳除汝州防禦使昔楚令尹子南以罪誅其子棄疾以不忍棄父事讎而死李懷光之反河中既破唐德宗欲活其子璀而不可得彼二子者以父子之親居君臣之變審義安命以死殉親夫豈不樂生義不可也若楊承勳兄弟出於蕃落梟獍其心囚父歸命以希苟活晉朝以不殺降為說於理且未安又從而錄用之宜異時契丹得假大義以洩其憤也十二月殷吳成義聞有唐兵詐使人告福州吏民曰唐助我討賊臣大兵今至矣福人益懼乙未朱文進遣同平章事李光準等奉國寶于殷丁酉福州南廊承旨林仁翰南廊承旨閩所置官蓋亦侍衞武臣之職也吾曹世事王氏今受制賊臣富沙王至何面見之帥其徒三十人被甲趣連重遇第帥讀曰率被皮義翻趣七喻翻重遇方嚴兵自衞三十人者望之稍稍遁去仁翰執槊直前刺重遇殺之刺七亦翻富沙王且至汝輩族矣今重遇已死何不亟取文進以贖罪衆踊躍從之遂斬文進迎吳成義入城函二首送建州十二月契丹復大舉入寇復扶又翻盧龍節度使趙延壽引兵先進契丹復以趙延壽為軍鋒順國節度使杜威遣使間道告急契丹前鋒已至邢州恆州信使路絕故間道而來間古莧翻會有疾將即亮翻命天平節度使張從恩鄴都留守馬全節護國節度使安審琦會諸道兵屯邢州武寧節度使趙在禮屯鄴都馬全節自鄴都進屯邢州令趙在禮自徐州進屯鄴都為後鎮契丹主以大兵繼至建牙於元氏元氏縣屬恆州九域志在州南九十八里詔從恩等引兵稍卻於是諸軍恟懼無復部伍恟許拱翻復扶又翻下同委棄器甲所過焚掠比至相州不復能整比毗至翻二年乙巳九四五春正月詔趙在禮還屯澶州馬全節還鄴都還從宣翻又遣右神武統軍張彥澤屯黎陽西京留守景延廣自滑州引兵守胡梁渡庚子張從恩奏契丹逼邢州詔滑州鄴都復進軍拒之義成節度使皇甫遇將兵趣邢州皇甫遇奉詔自滑州進兵趣七喻翻殺掠殆盡入鄴都境九域志鄴都之境西距磁州五十五里西北距洺州五十里磁牆之翻壬子張從恩馬全節安審琦悉以行營兵數萬陳於相州安陽水之南陳讀曰陣相息亮翻皇甫遇與濮州刺史慕容彥超將數千騎前覘契丹覘丑廉翻又丑豔翻至鄴縣鄴漢古縣唐屬相州在州東北劉昫曰鄴魏相州治所隋文輔政尉遲迥舉兵既討平之乃焚鄴城徙其居人南遷四十五里以安陽城為相州治所隋煬帝於鄴故都大慈寺置鄴縣唐貞觀八年始築今治所小城余按此皆言鄴縣也若五代唐晉之所謂鄴都則今魏州大名府是也非鄴縣也夷考此時契丹與晉兵相距本末前所謂入鄴都境當作入相州境一說虜騎散漫大勢兵馬向相州遊騎亦有入鄴都境者遇契丹數萬遇等且戰且卻至榆林店契丹大至二將謀曰吾屬今走死無遺矣乃止布陳陳讀曰陣下同自午至未力戰百餘合相殺傷甚衆遇馬斃因步戰其僕杜知敏以所乘馬授之遇乘馬復戰復扶又翻久之稍解顧知敏已為契丹所擒遇曰知敏義士不可棄也與彥超躍馬入契丹陳取知敏而還還從宣翻下同俄而契丹繼出新兵來戰二將曰吾屬勢不可走以死報國耳日且暮安陽諸將怪覘兵不還安審琦曰皇甫太師寂無音問必為虜所困語未卒卒子恤翻有一騎白遇等為虜數萬所圍審琦即引騎兵出將救之張從恩曰此言未足信必若虜衆猥至猥雜也雜然而至言其數多不可勝計也恐未足以當之公往何益審琦曰成敗天也萬一不濟當共受之借使虜不南來坐失皇甫太師按皇甫遇未必加官至太師也而安審琦以太師稱之蓋五季之亂官賞無章當時相稱謂不復論其品秩就人臣極品而稱之遂踰水而進契丹望見塵起即解去知援兵來故解而去與諸將俱歸相州軍中皆服二將之勇彥超本吐谷渾也與劉知遠同母吐谷渾慕容涉歸之庶長子故其種姓慕容氏契丹亦引軍退其衆自相驚曰晉軍悉至矣時契丹主在邯鄲聞之即時北遁不再宿至鼓城邯鄲縣屬磁州在州東北七十里鼓城縣屬恆州宋端拱二年以鼓城隸祁州在州西南一百里自邯鄲至鼓城約三百餘里是夕張從恩等議曰契丹傾國而來吾兵不多城中糧不支一旬萬一姦人往告吾虛實虜悉衆圍我死無日矣不若引軍就黎陽倉南倚大河以拒之可以萬全議未決從恩引兵先發諸軍繼之擾亂失亡復如發邢州之時復扶又翻從恩留步兵五百守安陽橋夜四鼓知相州事符彥倫謂將佐曰此夕紛紜人無固志五百弊卒安能守橋即召入乘城為備至曙望之契丹數萬騎已陳於安陽水北契丹主雖先北遁而趙延壽與惕隱諸軍猶南向而不去陳讀曰陣下同約束者申嚴號令也日加辰趙延壽與契丹惕隱帥衆踰水環相州而南帥讀曰率環音宦詔右神武統軍張彥澤將兵趣相州延壽等至湯陰聞之湯陰本漢蕩陰後幷入安陽唐武德四年分安陽置湯源縣貞觀元年改為湯陰屬相州九域志在州南四十里甲寅引還還從宣翻又如字馬全節等擁大軍在黎陽不敢追延壽悉陳甲騎於相州城下若將攻城狀符彥倫曰此虜將走耳出甲卒五百陳於城北以待之契丹果引去以天平節度使張從恩權東京留守庚申振武節度使折從遠擊契丹圍勝州遂攻朔州時折從遠守府州命領振武節度使勝州不係天福初所割十六州之數契丹乘勢併取之也匈奴須知朔州東至燕京一千里宋白曰勝州正東至黃河四十里去朔州四百二十里帝疾小愈河北相繼告急帝曰此非安寢之時乃部分諸將為行計分扶問翻更命武定軍曰天威軍去年夏籍諸州鄉兵為武定軍更工行翻北面副招討使馬全節等奏據降者言虜衆不多宜乘其散歸種落種章勇翻大舉徑襲幽州帝以為然徵兵諸道壬戌下詔親征乙丑帝發大梁閩之故臣共迎殷主延政請歸福州改國號曰閩延政以方有唐兵未暇徙都以從子門下侍郎同平章事繼昌都督南都內外諸軍事鎮福州殷主居建州故以福州為南都將兵衞之林仁翰至福州林仁翰既誅朱連故自福州至建州見王延政福州當作建州仁翰未嘗自言其功發南都侍衞及兩軍甲士萬五千人詣建州以拒唐福州侍衞之外有左右軍置軍使以領之或曰兩軍謂拱宸控鶴兩都也二月壬辰朔帝至滑州章十二行本州下有壬申二字乙十一行本同孔本同退齋校同命安審琦屯鄴都甲戌帝發滑州乙亥至澶州己卯馬全節等諸軍以次北上上時兩翻劉知遠聞之曰中國疲弊自守恐不足乃橫挑強胡挑徒了翻勝之猶有後患況不勝乎契丹自恆州還還從宣翻又如字以羸兵驅牛羊羸倫為翻過祁州城下以誘城中也斌悲巾翻契丹以精騎奪其城門州兵不得還還從宣翻趙延壽知城中無餘兵引契丹急攻之斌在上在字之下當逸城字沈使君吾之故人擇禍莫若輕語牛倨翻擇禍莫若輕引文子之言何不早降斌曰侍中父子失計陷身虜庭言趙延壽與其父德鈞不能救張敬達邀契丹求帝中國玩寇致禍並為俘虜也趙延壽聞斌言尚欲復求帝乎陷身事見二百八十卷高祖天福元年趙延壽在唐時加侍中沈斌稱其舊官帥讀曰率不自愧恥更有驕色何哉沈斌弓折矢盡寧為國家死耳折而設翻為于偽翻終不效公所為明日城陷斌自殺丙戌詔北面行營都招討使杜威以本道兵會馬全節等進軍端明殿學士戶部侍郎馮玉宣徽北院使權侍衞馬步都虞候太原李彥韜皆挾恩用事惡中書令桑維翰數毀之惡烏路翻數所角翻帝欲罷維翰政事李崧劉昫固諫而止維翰知之請以玉為樞密副使玉殊不平丙申中旨以玉為戶部尚書樞密使以分維翰之權馮玉以后兄進故旨由中出詩云婦有長舌維厲之階信矣彥韜少事閻寶少詩照翻為僕夫後隸高祖帳下高祖自太原南下留彥韜侍帝為腹心高祖留帝守太原見二百八十卷天福元年性纖巧與嬖幸相結以蔽帝耳目帝委信之至於升黜將相亦得預議常謂人曰吾不知朝廷設文官何所用且欲澄汰徐當盡去之去音羌呂翻嗚呼此等氣習自唐劉蕡已為文宗言之李彥韜史弘肇當右武之世張其氣而奮其舌以其人品夫何足責然非有國者之福也雖然吾黨亦有過焉盍亦反其本矣唐查文徽表求益兵唐主以天威都虞候何敬洙為建州行營招討馬步都指揮使將軍祖全恩為應援使姚鳳為都監監工銜翻將兵數千會攻建州自崇安進屯赤嶺九域志建州有崇安縣在州北二百五十里亦王氏所置也宋白曰崇安場本建陽縣東北三里南唐保大九年割為場蓋宋方置縣也列柵水南旬餘不戰唐人不敢逼思恭以延政之命督望戰望曰江淮兵精其將習武事國之安危繫此一舉不可不萬全而後動思恭怒曰唐兵深侵陛下寢不交睫睫即涉翻委之將軍今唐兵不出數千將軍擁衆萬餘不乘其未定而擊之有如唐兵懼而自退將軍何面目以見陛下乎楊思恭急於破敵以為功不知一跌而危國也引兵涉水與唐戰全恩等以大兵當其前使奇兵出其後大破之望死思恭僅以身免亡閩者楊思恭也然其所以亡閩者不在於此戰而在於得楊剝皮之名延政大懼嬰城自守召董思安王忠順使將泉州兵五千詣建州分守要害初高祖置德清軍於故澶州城澶州本治頓丘天福三年徙澶州於德勝幷頓丘徙焉九域志澶州清豐縣有舊州鎮即置德清軍之地置德清軍將以接澶魏聲援然城池未固也澶州鄴都之間城戍俱陷議者以為澶州鄴都相去百五十里宜於中塗築城以應接南北從之三月戊戌更築德清軍城合德清南樂之民以實之樂音洛初光州人李仁達仕閩為元從指揮使王潮兄弟本光州人乘唐末之亂割據閩中其後兵多光州人今福州人多能自言其上世出於浮光者從才用翻閩主曦之世叛奔建州閩主延政以為將是時王延政國號殷事見去年三月陳取建州之策文進惡其反覆黜居福清九域志福州有福清縣在州東南一百七十七里王氏所置也宋白曰福清本閩縣地唐聖曆元年析閩縣東南之地置萬安縣天寶元年改為福唐縣朱梁改永昌縣晉天福初改南臺縣尋改為福清縣張浦上脫先是二字城人陳繼珣新唐書地理志浦城縣本名吳興唐武德初改為唐興天寶元年更名浦城屬建州九域志浦城縣在建州東北三百三十里宋白曰城臨柘浦故曰浦城為曦畫策取建州為于偽翻曦以為著作郎及延政得福州二人皆不自安王繼昌闇弱嗜酒不恤將士將士多怨仁達潛入福州章十二行本州下有與繼珣三字乙十一行本同孔本同張校同說黃仁諷曰說式芮翻今唐兵乘勝建州孤危富沙王不能保建州安能保福州昔王潮兄弟光山布衣耳取福建如反掌事見唐紀自圖富貴何患不如彼乎仁諷然之是夕仁達等引甲士突入府舍殺繼昌及吳成義考異曰閩中實錄閩王列傳九國志皆云四月殺繼昌今從十國紀年仁達欲自立恐衆心未服以雪峯寺僧卓巖明素為衆所重雪峯在福州候官縣西百餘里此僧目重瞳子手垂過膝重直龍翻瞳音同過音戈真天子也相與迎之己亥立為帝考異曰閩錄啟運圖啟國實錄江南錄作巖明閩中實錄閩王列傳九國志薛史唐餘錄王審知傳吳越備史作儼明按啟運圖巖明本名偃為僧名體明即位改巖明今從之江南錄云繼昌為裨將王延諷所殺旬日故內臣李義殺諷立巖明為主今從十國紀年被以袞冕去羌呂翻衲汝答翻被皮義翻帥將吏北面拜之帥讀曰率然猶稱天福十年遣使奉表稱藩于晉延政聞之族黃仁諷家命統軍使張漢真將水軍五千會漳泉兵討巖明乙巳杜威等諸軍會于定州以供奉官蕭處鈞權知祁州事庚戌諸軍攻契丹泰州刺史晉廷謙舉州降晉姓也以國為氏甲寅取滿城按五代會要是年九月徙泰州治滿城是時泰州猶治清苑宋白曰滿城本漢北平縣後魏置永樂縣天寶元年改滿城縣酋慈秋翻長知兩翻剌來達翻及其兵二千人乙卯取遂城趙延壽部曲有降者言契丹主還至虎北口太原汾水之北亦有地名虎北口時契丹兵自祁易北去非其路也此乃幽檀以北之古北口宋人使遼行程記云自檀州北行八十里又八十里至虎北口館則檀州之古北口亦名虎北口也復擁衆南向復扶又翻約八萬餘騎計來夕當至宜速為備杜威等懼丙辰退保泰州戊午契丹至泰州己未晉軍南行契丹踵之晉軍至陽城續漢志中山蒲陰縣有陽城水經註博水出中山望都縣東逕陽城縣散為澤渚世謂之陽城澱陽城在蒲陰縣東南三十里庚申契丹大至晉軍與戰逐北十餘里契丹踰白溝而去此南白溝也水經註所謂淇水北出為白溝者也北白溝在涿州新城縣南六十里宋人北使行程記曰雄州之北界河之南有白溝驛又范成大北使錄曰自安肅軍出北門十五里至白溝河又一百五里至涿州此言北白溝也壬戌晉軍結陳而南陳讀曰陣胡騎四合如山諸軍力戰拒之是日纔行十餘里人馬飢乏癸亥晉軍至白團衞村考異曰漢高祖實錄作白檀今從晉少帝實錄契丹圍之數重奇兵出寨後斷糧道重直龍翻斷音短是夕東北風大起破屋折樹折而設翻營中掘井方及水輒崩士卒取其泥帛絞而飲之人馬俱渴至曙風尤甚契丹主坐大奚車中沈括曰奚人業伐山陸種斲車契丹之車皆資於奚其輜車之制如中國後廣前殺而無般材儉易敗不能任重而利於行山長轂廣輪輪之牙其厚不能四寸而軫之材不能五寸其乘車駕之以駝上施㡛惟富者加氈幰文繡之飾蜀本奚車之上無大字晉軍止此耳當盡擒之然後南取大梁命鐵鷂四面下馬拔鹿角而入奮短兵以擊晉軍契丹謂精騎為鐵鷂謂其身被鐵甲而馳突輕疾如鷂之搏鳥雀也鷂弋召翻軍士皆憤怒大呼呼火故翻曰都招討使何不用兵令士卒徒死諸將請出戰杜威曰俟風稍緩徐觀可否馬步都監李守貞曰彼衆我寡風沙之內莫測多少惟力鬬者勝此風乃助我也若俟風止吾屬無類矣即呼曰諸軍齊擊賊又謂威曰令公善守禦杜威時帶中書令故稱之馬軍左廂都排陳使張彥澤召諸將問計皆曰虜得風勢宜俟風回與戰彥澤亦以為然諸將退馬軍右廂副排陳使太原藥元福獨留謂彥澤曰今軍中飢渴已甚若俟風回吾屬已為虜矣敵謂我不能逆風以戰宜出其不意急擊之此兵之詭道也矢不逆風此古法也若用短兵薄戰則逆風而勝者多矣與其束首就擒章十二行本首作手乙十一行本同孔本同曷若以身殉國乃與彥澤元福及左廂都排陳使皇甫遇引精騎出西門擊之行寨之西門也風從東北來出西門接戰亦順風勢也契丹卻數百步彥卿等謂守貞曰且曳隊往來乎曳讀為拽音羊列翻直前奮擊以勝為度乎守貞曰事勢如此安可迴鞚鞚苦貢翻馬勒也宜長驅取勝耳彥卿等躍馬而去風勢益甚昏晦如夜彥卿等擁萬餘騎橫擊契丹呼聲動天地呼火故翻契丹大敗而走勢如崩山李守貞亦令步兵盡拔鹿角出鬬步騎俱進逐北二十餘里鐵鷂既下馬蒼皇不能復上復扶又翻下同上時掌翻皆委棄馬及鎧仗蔽地契丹散卒至陽城東南水上稍復布列杜威曰賊已破膽不宜更令成列遣精騎擊之皆渡水去契丹主乘奚車走十餘里追兵急獲一橐駝乘之而走諸將請急追之杜威揚言曰逢賊幸不死更索衣囊邪言逢賊被劫而幸不死而更從賊求衣囊則必將怒而殺之索山客翻兩日人馬渴甚今得水飲之皆足重難以追寇不若全軍而還還從宣翻又如字乃退保定州契丹主至幽州散兵稍集以軍失利杖其酋長各數百唯趙延壽得免乙丑諸軍自定州引歸詔以泰州隸定州隸定州義武軍夏四月辛巳帝發澶州甲申還大梁是年正月下詔親征二月至澶州今諸軍以勝歸故復還大梁己丑復以鄴都為天雄軍唐莊宗同光元年以魏州為東京興唐府罷天雄節鎮三年罷東京以為鄴都晉興因之改興唐府為廣晉府今復為天雄軍閩張漢真至福州攻其東關黃仁諷聞家夷滅開門力戰大破閩兵執漢真入城斬之卓巖明無他方略但於殿上噀水散豆作諸法事而已噀蘇困翻含水而噴之為噀作諸佛事以為厭勝又遣使迎其父於莆田唐武德初分南安縣置莆田縣屬泉州宋太平興國四年分置興化軍在泉州東北一百六十里李仁達既立巖明自判六軍諸衞事使黃仁諷屯西門陳繼珣屯北門仁諷從容謂繼珣曰從千容翻人之所以為人者以有忠信仁義也吾頃嘗有功於富沙中間叛之非忠也人以從子託我而與人殺之非信也王繼昌閩主延政從子也從才用翻屬之欲翻屬者猶言頃者也所殺皆鄉曲故人非仁也棄妻子使人魚肉之非義也此身十沈九浮沈持林翻死有餘愧因拊膺慟哭繼珣曰大丈夫徇功名何顧妻子宜置此事勿以取禍仁達聞之使人告仁諷繼珣謀反皆殺之由是兵權盡歸仁達五月丙申朔大赦順國節度使杜威久鎮恆州高祖天福七年杜威始鎮恆州見二百八十三卷恆戶登翻自恃貴戚杜威尚高祖妹宋國長公主每以備邊為名斂吏民錢帛以充私藏藏徂浪翻富室有珍貨或名姝駿馬皆虜取之姝逡須翻或誣以罪殺之籍沒其家又畏懦過甚每契丹數十騎入境威已閉門登陴或數騎驅所掠華人千百過城下威但瞋目延頸望之無意邀取陴頻眉翻瞋昌真翻由是虜無所忌憚屬城多為所屠威竟不出一卒救之千里之間暴骨如莽暴骨如莽左傳語如莽者如草之生於廣野莽莽然暴步卜翻威見所部殘弊為衆所怨又畏契丹之強累表請入朝帝不許威不俟報遽委鎮入朝朝廷聞之驚駭桑維翰言於帝曰威固違朝命亶離邊鎮離力智翻居常憑恃勳舊邀求姑息及疆場多事場音亦曾無守禦之意宜因此時廢之庶無後患帝不悅維翰曰陛下不忍廢之宜授以近京小鎮勿復委以雄藩復扶又翻帝曰威朕之密親必無異志言其無他志長知兩翻公勿以為疑維翰自是不敢復言國事以足疾辭位杜威不可去而桑維翰求去晉殆矣復扶又翻丙辰威至大梁丁巳李仁達大閱戰士請卓巖明臨視仁達陰教軍士突前登階刺殺巖明刺七亦翻仁達陽驚狼狽而走軍士共執仁達使居巖明之坐坐徂臥翻仁達乃自稱威武留後用保大年號是年南唐保大三年亦遣使入貢于晉幷殺巖明之父唐以仁達為威武節度使同平章事賜名弘義編之屬籍以其同姓也編之屬籍而賜名弘義齒於諸子之列為李仁達背唐而附吳越張本好呼到翻己未杜威獻部曲步騎合四千人幷鎧仗庚申又獻粟十萬斛芻二十萬束云皆在本道言皆在恆州也使誠有之皆虐取於民倉皇離鎮不可運而實私家故獻之耳步兵隸護國威復請以為衙隊而稟賜皆仰縣官杜威之愚弄朝廷如此而帝不能察其姦所以成恆州中渡之變復扶又翻稟筆錦翻給也仰牛向翻求天雄節鉞帝許之唐兵圍建州屢破泉州兵泉州兵董思安王忠順所將以救建州者也稹止忍翻敗補賣翻執其將時厚卿六月癸酉以杜威為天雄節度使契丹連歲入寇契丹入寇自去年正月陷貝州始左傳申公巫臣遺子重子反書曰吾必使爾疲於奔命而死奔命者邊境有急奔而赴救契丹人畜亦多死國人厭苦之述律太后謂契丹主曰使漢人為胡主可乎曰不可太后曰然則汝何故欲為漢主曰石氏負恩不可容太后曰汝今雖得漢地不能居也後卒如述律后之言蹉七何翻跌徒結翻悔何所及又謂其㣥下曰漢兒何得一向眠人寢不安席則輾轉反側而不成寐一向眠則其眠安矣未聞蕃和漢漢兒果能回意我亦何惜與和桑維翰屢勸帝復請和於契丹以紓國患復扶又翻紓音舒緩也帝假開封軍將張暉供奉官開封軍將開封府之軍將也卑辭謝過契丹主曰使景延廣桑維翰自來仍割鎮定兩道隸我則可和朝廷以契丹語忿謂其無和意乃止及契丹主入大梁謂李崧等曰曏使晉使再來則南北不戰矣史言契丹通國上下本自厭兵秋七月閩人或告福州援兵謀叛是年正月閩主發福州兵赴建州以拒唐遣還伏兵於隘還從宣翻隘烏戒翻險狹之道也盡殺之死者八千餘人脯其肉以歸為食唐邊鎬拔鐔州鐔州東至建州一百八十里皆踴躍贊成之徵求供億府庫為之耗竭為于偽翻洪饒撫信之民尤苦之延政遣使奉表稱臣於吳越請為附庸以求救楚王希範疑靜江節度使兼侍中知朗州希杲得人心遣人伺之希杲懼稱疾求歸不許遣醫往視疾因毒殺之希範忌希杲事始二百八十卷高祖天福元年章錫琛標點聶崇岐覆校
