body:
  text: 資治通鑑卷第二百九十端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千六百戶食實封一千戶臣司馬光奉敕編集後學天台音註後周紀一周自以為周虢叔之後春秋戰國之世傳記謂虢叔之後有國者為虢公後謂之郭公虢郭音相近也虞大夫宮之奇曰虢仲虢叔王季之穆也郭之得姓本於周故建國號曰周通鑑因謂之後周太祖聖神恭肅文孝皇帝上楚王希萼既克長沙廣順元年辛亥九五一楚王希萼既克長沙春正月丁卯漢太后下誥授監國符寶即皇帝位監國自皋門入宮皋門大梁城外村名制曰朕周室之裔虢叔之後國號宜曰周改元大赦楊邠史弘肇王章等皆贈官官為斂葬楊邠等死見上卷上年為于偽翻斂力贍翻凡倉場庫務掌納官吏無得收斗餘稱耗斗餘概量之外又取其餘也稱耗稱計斤鈞石之外又多取之以備耗折今悉除之矯王章苛斂之弊也稱尺證翻悉罷之羨弋戰翻羨餘唐之流弊也至五季而愈甚犯竊盜及姦者並依晉天福元年以前刑名罪人非反逆無得誅及親族籍沒家貲矯史弘肇虐刑之弊也漢高祖陵職員宮人時月薦享及守陵戶並如故初唐衰多盜不用律文更定峻法竊盜贓三匹者死晉天福中加至五匹姦有夫婦人無問強和男女並死強謂男以威力加女女不得已而與之通姦者和謂男女相慕欲動情生而通姦者竊盜一錢以上皆死又罪非反逆往往族誅籍沒故帝即位首革其弊初楊邠以功臣國戚為方鎮者多不閑吏事閑習也其人自恃敕補多專橫橫下孟翻節度使不能制至是悉罷之帝命史弘肇親吏上黨李崇矩訪弘肇親族崇矩言弘肇弟弘福今存初弘肇使崇矩掌其家貲之籍由是盡得其產皆以授弘福帝賢之使隸皇子榮帳下楚王希萼既克長沙戊辰以前復州防禦使王彥超權武寧節度使時劉贇將鞏延美等守徐州楚王希萼既克長沙漢李太后遷居西宮按薛史漢太平宮蓋即西宮己巳上尊號曰昭聖皇太后上時掌翻楚王希萼既克長沙開封尹兼中書令劉勳卒楚王希萼既克長沙癸酉加王峻同平章事楚王希萼既克長沙以衞尉卿劉皞主漢隱帝之喪劉勳既卒他無親屬故也楚王希萼既克長沙初河東節度使兼中書令劉崇聞隱帝遇害欲舉兵南向聞迎立湘陰公乃止曰吾兒為帝吾又何求太原少尹李驤陰說崇曰說式芮翻觀郭公之心終欲自取公不如疾引兵逾太行據孟津行戶剛翻俟徐州相公即位湘陰公本鎮徐州故稱之則郭公不敢動矣不然且為所賣崇怒曰腐儒欲離間吾父子命左右曳出斬之間古莧翻曳讀曰拽音羊列翻驤呼曰吾負經濟之才而為愚人謀事呼火故翻為于偽翻死固甘心家有老妻願與之同死崇幷其妻殺之且奏於朝廷示無二心及贇廢崇乃遣使請贇歸晉陽詔報以湘陰公比在宋州比毗至翻今方取歸京師必令得所公勿以為憂公能同力相輔當加王爵永鎮河東鞏廷美楊溫聞湘陰公失位奉贇董氏據徐州拒守以俟河東援兵劉贇令鞏廷美等守徐州事始見上卷上年廷美溫欲降而懼死降戶江翻帝復遺贇書曰爰念斯人盡心於主復扶又翻遺唯季翻主謂劉贇足以賞其忠義何由責以悔尤俟新節度使入城新節度使謂王彥超公可更以委曲示之唐末主帥以手書諭示將佐率謂之委曲楚王希萼既克長沙契丹之攻內丘也事見上卷上年又值月食軍中多妖異契丹主懼不敢深入引兵還胡人用兵以月為候月食又多妖異故懼而不敢進妖一遙翻還從宣翻又如字會漢亡安國節度使劉詞送其使者詣大梁帝遣左千牛衞將軍朱憲報聘且敍革命之由以金器玉帶贈之楚王希萼既克長沙帝以鄴都鎮撫河北控制契丹欲以腹心處之處昌呂翻乙亥以寧江節度使侍衞親軍都指揮使王殷為鄴都留守天雄節度使同平章事領軍如故仍領侍衞親軍也楚王希萼既克長沙丙子帝帥百官詣西宮為漢隱帝舉哀成服皆如天子禮去年遷隱帝梓宮於西宮事見上卷帥讀曰率為于偽翻楚王希萼既克長沙慕容彥超遣使入貢帝慮其疑懼賜詔慰安之曰今兄事已至此言不欲繁望弟扶持同安億兆漢祖慕容彥超之兄也今兄薛史作令兄當從之楚王希萼既克長沙戊寅殺湘陰公於宋州楚王希萼既克長沙是日劉崇即皇帝位於晉陽劉崇漢祖母弟也所有者幷汾忻代嵐憲隆蔚沁遼麟石十二州之地宋白曰憲州故樓煩監牧唐昭宗龍紀元年李克用奏置憲州宋太宗之平太原折御卿自府州會兵攻劉繼元先克岢嵐軍次克隆州次克嵐州則隆州蓋晉漢間所置其地在岢嵐嵐谷之間沁千鴆翻珙居勇翻觀察判官滎陽趙華為戶部侍郎並同平章事以次子承鈞為侍衞親軍都指揮使太原尹以節度副使李存王褱為代州防禦使裨將武安張元徽為馬步軍都指揮使九域志武安縣屬洺州在州西九十五里北漢主謂李存王褱張元徽曰通鑑書嶺南之漢為南漢河東之漢為北漢朕以高祖之業一朝墜地今日位號不得已而稱之顧我是何天子汝曹是何節度使邪由是不建宗廟祭祀如家人宰相月俸止百緡節度使止三十緡按唐世百官俸錢自會昌以後不復增減三師二百萬三公百六十萬侍中百五十萬中書令兩省侍郎兩僕射東宮三師百四十萬尚書御史大夫東宮三少百萬節度使三十萬至梁開平五年宰臣俸二百千後唐同光四年定節度副使每月料錢四十千則節度使當又多今北漢主皆減其數俸扶用翻故其國中少廉吏少詩沼翻客省使河南李光美嘗為直省官三省有直省官凡百官詣宰相皆差直省官引接其職則外鎮客司通引之職也諳烏含翻北漢朝廷制度皆出於光美北漢主聞湘陰公死哭曰吾不用忠臣之言以至於此為李驤立祠為于偽翻歲時祭之楚王希萼既克長沙己卯以太師馮道為中書令加竇貞固侍中蘇禹珪司空楚王希萼既克長沙王彥超奏遣使齎敕詣徐州鞏廷美等猶豫不肯啟關詔進兵攻之楚王希萼既克長沙帝謂王峻曰朕起於寒微備嘗艱苦遭時喪亂喪息浪翻一旦為帝王豈敢厚自奉養以病下民乎命峻疏四方貢獻珍美食物庚辰下詔悉罷之按薛史本紀詔應天下州府舊貢滋味食饌之物所宜除減其兩浙進細酒海味薑瓜湖南木尤子茶乳糖白沙糖橄欖子鎮州高公米水梨易定栗子河東白杜梨米粉菉豆粉玉屑籸子麥丏永興御田紅秔米新大麥麥丏興平蘇栗子華州麝香羚羊角熊膽獺肝朱柿熊白河中樹紅棗五味子輕餳同州石金敖餅晉絳蒲萄黃消梨陝府鳳栖梨襄州紫薑新笋橘子安州折粳米糟味青州水梨河陽諸雜果子許州御李子鄭州新笋鵝梨懷州寒食杏仁申州蘘荷亳州萆薢沿淮州郡淮白魚今後不須進奉所奉止於朕躬所損被於甿庶被皮義翻甿謨耕翻又曰積於有司之中甚為無用之物又詔曰朕生長軍旅長知兩翻不親學問未知治天下之道治直之翻文武官有益國利民之術各具封事以聞咸宜直書其事勿事辭藻帝以蘇逢吉之第賜王峻峻曰是逢吉所以族李崧也事見二百八十八卷漢乾祐元年使王峻處權勢之間皆以是心處之必不至有商州之禍矣處昌呂翻楚王希萼既克長沙初契丹主北歸見二百八十七卷漢高祖天福十二年契丹主以聿撚為西南路招討使撚乃殄翻及北漢主立契丹主使聿撚遺劉承鈞書北漢主使承鈞復書稱本朝淪亡紹襲帝位欲循晉室故事求援北朝遺唯季翻晉室故事謂晉祖事契丹以求援故事也朝直遙翻下同契丹主大喜北漢主發兵屯陰地黃澤團柏屯陰地者欲窺晉隰屯黃澤者欲窺邢趙屯團柏者欲窺鎮定丁亥以承鈞為招討使與副招討使白從暉都監李存王褱將步騎萬人寇晉州從暉吐谷渾人也楚王希萼既克長沙郭崇威更名崇曹威更名英皆避帝名也更工衡翻楚王希萼既克長沙二月丁酉以皇子天雄牙內都指揮使榮為鎮寧節度使選朝士為之僚佐以侍御史王敏為節度判官右補闕崔頌為觀察判官校書郎王朴為掌書記為王朴見任於世宗張本協之子崔協相後唐明宗東平人也楚王希萼既克長沙戊戌北漢兵五道攻晉州節度使王晏閉城不出劉承鈞以為怯蟻附登城晏伏兵奮擊北漢兵死傷者千餘人承鈞遣副兵馬使安元寶焚晉州西城元寶來降承鈞乃移軍攻隰州九域志晉州西北至隰州二百五十里癸卯隰州刺史許遷遣步軍都指揮使孫繼業迎擊北漢兵於長壽村唐武德二年分隰州石樓置長壽縣貞觀元年省入石樓殺之未幾北漢兵攻州城幾居豈翻數日不克死傷甚衆乃引去遷鄆州人也楚王希萼既克長沙甲辰楚王希萼遣掌書記劉光輔入貢于唐考異曰湖湘故事光輔作光瀚今從十國紀年楚王希萼既克長沙帝悉出漢宮中寶玉器數十碎之於庭曰凡為帝王安用此物聞漢隱帝日與嬖寵於禁中嬉戲珍玩不離側嬖卑義翻又必計翻離力智翻茲事不遠宜以為鑑仍戒左右自今珍華悅目之物無得入宮楚王希萼既克長沙丁未契丹主遣其臣鳥衣骨支與朱憲偕來鳥衣奴鳥翻歐史作䮍朱憲使契丹見上正月賀即位楚王希萼既克長沙戊申敕前資官各聽自便居外州漢隱帝乾祐二年冬楊邠奏前資官分居兩京事見二百八十八卷楚王希萼既克長沙陳思讓未至湖南馬希萼已克長沙思讓留屯郢州敕召令還去年十一月漢朝議發兵救潭州內難作而不果劉郭易姓之際必未暇遣將南略未知陳思讓為誰朝所遣當考按薛史周太祖登極遣陳思讓帥偏師至安郢以圖進取長沙陷乃班師則帝所遣也楚王希萼既克長沙丁巳遣尚書左丞田敏使契丹北漢主遣通事舍人李言使于契丹言俗辯字從從言宋景文手記曰北齊時里俗多作偽字始以巧言為辯至隋有柳言其字又以易巧矣楚王希萼既克長沙詔加泰寧節度使慕容彥超中書令遣翰林學士魚崇諒詣兗州諭指崇諒即崇遠也魚崇諒先因避漢祖諱改名三月壬戌朔詔報之曰向以前朝失德少主用讒少詩照翻倉猝之間召卿赴闕卿即奔馳應命信宿至京救國難而不顧身聞君召而不俟駕難乃旦翻以至天亡漢祚兵散梁郊降將敗軍相繼而至卿即便回馬首徑反龜陰兗州在龜山之陰慕容彥超赴大梁還兗州事並見上卷上年為于偽翻有終有始所謂危亂見忠臣之節疾風知勁草之心若使為臣者皆能如茲則有國者誰不欲用所言朕潛龍河朔之際平難浚郊之時難乃旦翻浚郊謂大梁之郊大梁有浚水詩云孑孑干旄在浚之郊韓愈從董晉於汴州賦曰非夫子之洵美兮吾何為乎浚之都緣不奉示喻之言亦不得差人至行闕且事主之道何必如斯若或二三於漢朝朝直遙翻又安肯忠信於周室以此為懼不亦過乎卿但悉力推心安民體國事朕之節如事故君不惟黎庶獲安抑亦社稷是賴但堅表率未議替移由衷之誠言盡於此以慕容彥超不自安故以此詔撫諭之楚王希萼既克長沙唐以楚王希萼為天策上將軍武安武平靜江寧遠節度使兼中書令楚王以右僕射孫忌孫忌即孫晟歐史曰晟一名忌又名鳳楚王希萼既克長沙丙寅遣前淄州刺史陳思讓將兵戍磁州扼黃澤路磁州西北當黃澤關路口磁牆之翻楚王希萼既克長沙楚王希萼既得志多思舊怨殺戮無度晝夜縱酒荒淫悉以軍府事委馬希崇希崇復多私曲政刑紊亂復扶又翻紊音問府庫既盡於亂兵籍民財以賞賚士卒或封其門而取之士卒猶以不均怨望雖朗州舊將佐從希萼來者亦皆不悅有離心劉光輔之入貢于唐也入貢見上月光輔密言湖南民疲主驕可取也唐主乃以營屯都虞候邊鎬為信州刺史將兵屯袁州潛謀進取小門使謝彥顒顒魚容翻考異曰湖湘故事作謝彥敍周羽沖三楚新錄作謝延澤今從十國紀年本希萼家奴以首面有寵於希萼首面龍陽之色也恃恩專橫橫戶孟翻常肩隨希崇或拊其背記曲禮年長以倍則父事之十年以長則兄事之五年以長則肩隨之註云肩隨者與之並行差退若拊背則狎之矣故事府宴小門使執兵在門外希萼使彥顒預坐或居諸將之上諸將皆恥之希萼以府舍焚蕩命朗州靜江指揮使王逵副使周行逢帥所部兵千餘人治之帥讀曰率下同治直之翻執役甚勞又無犒賜犒苦到翻士卒皆怨竊言曰囚免死則役作之我輩從大王出萬死取湖南何罪而囚役之且大王終日酣歌豈知我輩之勞苦乎逵行逢聞之相謂曰衆怨深矣不早為計禍及吾曹壬申旦帥其衆各執長柯斧白梃逃歸朗州柯斧柄也梃徒鼎翻左右不敢白癸酉始白之希萼遣湖南指揮使唐師翥將千餘人追之不及直抵朗州逵等乘其疲乏伏兵縱擊士卒死傷殆盡師翥脫歸翥章恕翻逵等黜留後馬光贊去年馬希萼以子光贊鎮朗州更工衡翻光惠希振之子也希振馬殷之嫡長子也逵等與何敬真及諸軍指揮使張倣參決軍府事希萼具以狀言於唐唐主遣使以厚賞招諭之逵等納其賞縱其使不答其詔唐亦不敢詰也使疏吏翻詰去吉翻為王逵等以朗州攻潭州張本楚王希萼既克長沙王彥超奏克徐州殺鞏廷美等鞏廷美等以無援敗死楚王希萼既克長沙北漢李言至契丹契丹主使拽剌梅里報之拽羊列翻剌來達翻楚王希萼既克長沙丙子敕朝廷與唐本無仇怨緣淮軍鎮各守疆域無得縱兵民亶入唐境商旅往來無得禁止楚王希萼既克長沙己卯潞州送涉縣所獲北漢將卒二百六十餘人各賜衫袴巾履遣還涉漢縣唐屬潞州九域志在州東北一百九十八里楚王希萼既克長沙加吳越王弘俶諸道兵馬都元帥楚王希萼既克長沙夏四月壬辰朔濱淮州鎮上言淮南飢民過淮糴穀未敢禁止詔曰彼之生民與此何異宜令州縣津鋪無得禁止鋪普故翻楚王希萼既克長沙蜀通奏使高延昭固辭知樞密院丁未以前雲安榷鹽使太原伊審徵為通奏使知樞密院事雲安漢巴郡之胊䏰縣地周武帝置雲安縣唐屬夔州以其產鹽置雲安監蜀高祖妹褒國公主之子也少與蜀主相親狎少詩照翻及知樞密政之大小悉以咨之審徵亦以經濟為己任而貪侈回邪與王昭遠相表裏蜀政由是浸衰楚王希萼既克長沙吳越王弘俶徙廢王弘倧居東府自衣錦軍徙居東府吳越以越州為東府治園圃娛悅之為于偽翻治直之翻歲時供饋甚厚楚王希萼既克長沙契丹主遣使如北漢告以周使田敏來約歲輸錢十萬緡輸舂遇翻北漢主使鄭珙以厚賂謝契丹珙居勇翻自稱姪皇帝致書於叔天授皇帝請行冊禮楚王希萼既克長沙五月己巳遣左金吾將軍姚漢英等使于契丹契丹留之契丹以北漢交之厚遂留周使楚王希萼既克長沙辛未北漢禮部侍郎同平章事鄭珙卒于契丹考異曰晉陽見聞錄鄭珙既達虜庭虜君恩禮周厚虜俗以酒池肉林為名雖不飲酒如韋曜輩者亦加灌注縱成疾無復信之珙魁岸善飲罹無量之逼宴罷載歸一夕腐脇於穹廬之氈堵間輿尸而復命九國志契丹宴犒漢使必厚具酒肉以示夸大高祖鎮河東嘗命韋曜北使曜羸瘠不能飲酒虜人強之遂卒按韋曜孫晧時人韋昭也不能飲酒王保衡引以為文章而路振云高祖時人誤也楚王希萼既克長沙甲戌義武節度使孫方簡避皇考諱更名方諫更工衡翻楚王希萼既克長沙定難節度李彞殷遣使奉表于北漢節度之下當有使字難乃旦翻楚王希萼既克長沙六月辛亥以樞密使同平章事王峻為左僕射兼門下侍郎樞密副使兵部侍郎范質判章十二行本判上有戶部侍郎四字乙十一行本同孔本同張校同退齋校同三司李穀為中書侍郎並同平章事穀仍判三司司徒兼侍中竇貞固司空兼中書侍郎同平章事蘇禹珪並罷守本官癸丑范質參知樞密院事丁巳以宣徽北院使翟光鄴兼樞密副使翟萇伯翻又徒歷翻初帝討河中已為人望所屬帝討河中見二百八十八卷漢乾祐元年屬之欲翻帝數以微言動之穀但以人臣盡節為對帝以是賢之即位首用為相時國家新造四方多故王峻夙夜盡心知無不為軍旅之謀多所裨益范質明敏強記謹守法度李穀沈毅有器略在帝前議論辭氣忼慨善譬諭以開主意數所角翻沈持林翻忼苦廣翻史言周朝新造輔相者能盡心營職以濟多艱楚王希萼既克長沙武平節度使馬光惠愚懦嗜酒不能服諸將王逵周行逢何敬真謀以辰州刺史廬陵劉言驍勇得蠻夷心劉言從彭玕奔楚因為楚將言知逵等難制曰不往將攻我乃單騎赴之九域志辰州東至朗州五百六十六里衆廢光惠送于唐推言權武平留後為王逵等殺劉言張本唐人未許亦稱藩于周楚王希萼既克長沙吳越王弘俶以前內外馬步都統軍使仁俊無罪復其官爵錢仁俊被幽見二百八十五卷晉齊王開運二年楚王希萼既克長沙契丹遣燕王述軋等冊命北漢主為大漢神武皇帝為皇后北漢主更名旻更工衡翻楚王希萼既克長沙秋七月按五代會要是月周追尊四廟博興即唐青州之博昌縣後唐避獻祖諱改曰博興九域志縣在州西北一百二十里請兵以攻周楚王希萼既克長沙八月壬戌葬漢隱帝于穎陵穎陵在許州陽翟縣楚王希萼既克長沙義武節度使孫方諫入朝壬子徙鎮國節度使以其弟易州刺史行友為義武留後又徙建雄節度使王晏鎮徐州以武寧節度使王彥超代之王晏與王彥超兩易所鎮楚王希萼既克長沙戊午追立故夫人柴氏為皇后柴氏先卒去年不死於劉銖之手楚王希萼既克長沙九月北漢主遣招討使李存王褱將兵自團柏入寇契丹欲引兵會之契丹之下當有主字魏土地記曰沮陽城東八十里有牧牛山山下有九十九泉即滄河之上源也按魏收魏書天賜三年八月魏主登武要北原觀九十九泉武要縣漢屬定襄郡東部都尉治所宋白曰九十九泉在幽州西北一千餘里契丹主強之癸亥行至新州之章十二行本之下有西字乙十一行本同孔本同張校同火神淀契丹雖破晉其力亦疲諸部瘡痍未瘳羸耗未復故不欲南寇宋白曰火神淀在新州西強其兩翻淀徒練翻淺水曰淀漚烏侯翻弒契丹主而立述軋契丹主德光之子章十二行本子下有齊王二字乙十一行本同孔本同張校同述律逃入南山諸部奉述律以攻述軋漚僧殺之幷其族黨立述律為帝改元應曆自火神淀入幽州遣使告于北漢北漢主遣樞密直學士上黨王得中如契丹賀即位復以叔父事之請兵以擊晉州契丹主年少好遊戲不親國事每夜酣飲達旦乃寐日中方起國人謂之睡王後更名明少詩照翻好呼到翻更工衡翻楚王希萼既克長沙壬申蜀以吏部尚書御史中丞范仁恕為中書侍郎兼吏部尚書同平章事楚王希萼既克長沙楚王希萼既克長沙不賞許可瓊許可瓊降希萼見上卷漢隱帝乾祐三年出為蒙州刺史唐武德五年析荔州之隋化縣置南恭州貞觀八年更名蒙州宋朝熙寧五年廢蒙州以立山縣隸昭州宋白曰蒙州漢荔浦縣地唐置蒙州以州東面有蒙山山下有泉源流為蒙水山下人皆姓蒙故名以備朗兵帥讀曰率下同不存撫役者將卒皆怨怒謀作亂希崇知其謀戊寅希萼宴將吏徐威等不預希崇亦辭疾不至威等使人先驅踶齧馬十餘入府自帥其徒執斧斤白梃聲言縶馬奄至座上縱橫擊人顛踣滿地踶大計翻齧魚結翻縶陟立翻縱子容翻踣蒲北翻希萼踰垣走威等執囚之考異曰十國紀年作丁丑按湖湘故事在十九日今從之自頂及踵剉之立希崇為武安留後縱兵大掠幽希萼於衡山縣三國時吳分湘南縣置衡山縣唐屬衡州宋朝淳化四年分屬潭州九域志衡山縣在潭州西南三百二十里劉言聞希崇立遣兵趣潭州趣七喻翻聲言討其篡奪之罪壬午軍于益陽之西希崇懼癸未發兵二千拒之又遣使如朗州求和請為鄰藩掌書記桂林李觀象說言曰時人謂桂州為桂林說式芮翻希萼舊將佐猶在長沙此必不欲與公為鄰不若先檄希崇取其首然後圖湖南可兼有也言從之希崇畏言即斷都軍判官楊仲敏掌書記劉光輔牙內指揮使魏師進都押牙黃勍等十餘人首斷丁管翻勍渠京翻遣前辰陽縣令李翊齎送朗州辰陽地名馬氏置縣屬辰州宋白曰辰溪縣本漢辰陵縣後漢曰辰陽以縣在辰水之陽也隋改曰辰溪如此則馬氏用後漢縣名也言與王逵等皆以為非仲敏等首怒責翊翊惶恐自殺希崇既襲位亦縱酒荒淫為政不公語多矯妄國人不附初馬希萼入長沙事見上卷上年十二月猶杖背黜為民希崇以為師暠必怨之使送希萼于衡山實欲師暠殺之師暠曰欲使我為弒君之人乎奉事逾謹暠古老翻丙戌至衡山衡山指揮使廖偃匡圖之子也晉天福四年廖匡圖與蠻戰死吾家世受馬氏恩今希萼長而被黜必不免禍長知兩翻被皮義翻盍相與輔之於是帥莊戶及鄉人悉為兵佃豪家之田而納其租謂之莊戶帥讀曰率以縣為行府斷江為柵斷丁管翻江即謂湘江也編竹為戰艦以師暠為武清節度使武清節度使廖偃等自相署置耳數日至萬餘人州縣多應之遣判官劉虛己求援于唐徐威等見希崇所為知必無成又畏朗州衡山之逼恐一朝喪敗俱及禍喪息浪翻欲殺希崇以自解希崇微覺之大懼密遣客將范守牧奉表請兵于唐唐主命邊鎬自袁州將兵萬人西趣長沙將即亮翻趣七喻翻楚王希萼既克長沙冬十月辛卯潞州巡檢陳思讓敗北漢兵於虒亭敗補邁翻虒亭在潞州銅鞮縣九域志潞州襄垣縣有虒亭鎮虒音斯楚王希萼既克長沙唐邊鎬引兵入醴陵舊唐書地理志曰漢臨湘縣界有醴陵後漢立為縣隋廢唐武德四年分長沙縣置醴陵縣並屬潭州九域志醴陵縣在潭州東一百六十里范成大行程記袁州萍鄉縣至潭州醴陵縣兩日程耳癸巳楚王希崇遣使犒軍壬寅遣天策府學士拓跋恆奉牋詣鎬請降恆歎曰吾久不死乃為小兒送降狀癸卯希崇帥弟姪迎鎬望塵而拜鎬下馬稱詔勞之犒苦到翻帥讀曰率下同勞力到翻甲辰希崇等從鎬入城鎬舍於瀏陽門樓瀏音留湖南將吏畢賀鎬皆厚賜之時湖南饑饉鎬大發馬氏倉粟賑之楚人大悅馬殷據潭朗傳子希聲希範希廣希萼希崇至是而亡楚歸吳敗將苗璘許德勳謂之曰待衆駒爭皁棧而後湖湘可圖今果如其言楚王希萼既克長沙契丹遣彰國節度使蕭禹厥將奚契丹五萬會北漢兵入寇北漢主自將兵二萬自陰地關寇晉州丁未軍于城北三面置寨晝夜攻之遊兵至絳州時王晏已離鎮離力智翻王彥超未至巡檢使王萬敢權知晉州與龍捷都指揮使史彥超虎捷指揮使何徽共拒之薛史本紀廣順元年改侍衞馬步軍額馬軍舊稱護聖改為龍捷步軍舊稱奉國改為虎捷雲州人也楚王希萼既克長沙癸丑唐武昌節度使劉仁贍帥戰艦二百取岳州撫納降附人忘其亡劉仁贍善將故能為唐堅守壽州金之子也劉金為楊氏將唐百官共賀湖南平起居郎高遠曰我乘楚亂取之甚易易以豉翻觀諸將之才但恐守之難耳遠幽州人也司徒致仕李建勳曰禍其始於此乎唐之禍敗後果如二臣所料唐主自即位以來未嘗親祠郊廟禮官以為請唐主曰俟天下一家然後告謝及一舉取楚謂諸國指麾可定魏岑侍宴言臣少遊元城樂其風土少詩照翻樂音洛俟陛下定中原乞魏博節度使唐主許之岑趨下拜謝其主驕臣佞如此馬希萼望唐人立己為潭帥而潭人惡希萼惡烏路翻共請邊鎬為帥帥所類翻下同唐主乃以鎬為武安節度使為邊鎬為朗兵所逐張本楚王希萼既克長沙王峻有故人曰申師厚嘗為兗州牙將失職飢寒望峻馬拜謁於道會涼州留後折逋嘉施上表請帥於朝廷折逋羌族也因以為姓募率府供奉宮願行者率府謂東宮十率府也無人應募峻薦師厚於帝丁巳以師厚為河西節度使楚王希萼既克長沙唐邊鎬趣馬希崇帥其族入朝趣讀曰促帥讀曰率朝直遙翻馬氏聚族相泣欲重賂鎬奏乞留居長沙鎬微哂曰國家與公家世為仇敵殆六十年哂矢忍翻唐昭宗光啟三年馬殷從孫儒攻楊行密乾寧三年得湖南自此與江淮為敵國自光啟三年至是年適六十年然未嘗敢有意窺公之國今公兄弟鬬鬩困窮自歸若復二三復扶又翻恐有不測之憂希崇無以應十一月辛酉與宗族及將佐千餘人號慟登舟鬩馨激翻鬬也很也戾也詩云兄弟鬩于牆復扶又翻號戶刀翻送者皆哭響振川谷楚王希萼既克長沙帝以北漢契丹之兵猶在晉州甲子以王峻為行營都部署將兵救之詔諸軍皆受峻節度聽以便宜從事得自選擇將吏乙丑峻行帝自至城西餞之大梁城西也楚王希萼既克長沙楚靜江節度副使知桂州馬希隱武穆王殷之少子也楚王希廣希萼兄弟爭國南漢主以內侍吳懷恩為西北招討使將兵屯境上伺間密謀進取少詩照翻伺相吏翻間古莧翻希廣遣指揮使彭彥暉將兵屯龍峒以備之桂州溪南有白龍洞在平地半山上希隱惡之惡烏路翻潛遣人告蒙州刺史許可瓊可瓊方畏南漢之逼即棄蒙州引兵趣桂州蒙桂相去四百餘里趣七喻翻彥暉敗奔衡山可瓊留屯桂州吳懷恩據蒙州進兵侵掠桂管大擾希隱可瓊不知所為但相與飲酒對泣南漢主遺希隱書遺唯季翻言武穆王奄有全楚富強安靖五十餘年正由三十五舅三十舅兄弟尋戈自相魚肉三十五舅謂希廣三十舅謂希萼漢主龑娶楚王殷女故呼希廣等為舅北面仇讎言舉國臣唐也竊計桂林繼為所取當朝世為與國重以婚姻朝直遙翻重直用翻覩茲傾危忍不赴救已發大軍水陸俱進當令相公舅永擁節旄常居方面希隱得書與僚佐議降之支使潘玄珪以為不可丙寅吳懷恩引兵奄至城下希隱可瓊帥其衆夜斬關奔全州九域志桂州北至全州一百六十三里晉高祖時馬氏改永州之湘源縣為清湘縣置全州本漢洮陽縣地也有洮水在清湘縣北帥讀曰率懷恩因以兵略定宜連梧嚴富昭柳龔象等州唐乾封二年招致生獠以秦故桂林郡地置嚴州富州當是置於賀州富川縣楚王希萼既克長沙辛未唐邊鎬遣先鋒指揮使李承戩將兵如衡山趣馬希萼入朝戩子踐翻趣讀曰促庚辰希萼與將佐士卒萬餘人自潭州東下楚王希萼既克長沙王峻留陝州旬日帝以北漢攻晉州急憂其不守議自將由澤州路與峻會兵救之帝欲自澤州而西王峻自陝渡河而北取絳州而會于晉州陝失冉翻將即亮翻十二月戊子朔下詔以三日西征使者至陝峻因使者言於帝曰晉州城堅未易可拔易以豉翻劉崇兵鋒方銳不可力爭所以駐兵待其氣衰耳非臣怯也陛下新即位不宜輕動若車駕出汜水則慕容彥超引兵入汴大事去矣帝聞之自以手提耳曰幾敗吾事王峻之言出於帝防虞之所不及而犂然有當於心故不覺自提其耳幾居依翻敗補邁翻庚寅敕罷親征初泰寧節度使兼中書令慕容彥超聞徐州平謂鞏廷美等死乃招納亡命畜聚薪糧潛以書結北漢吏獲其書以聞又遣人詐為商人求援於唐帝遣通事舍人鄭好謙就申慰諭與之為誓彥超益不自安屢遣都押牙鄭麟詣闕偽輸誠款實覘機事覘丑廉翻又丑豔翻又獻天平節度使高行周書其言皆謗毀朝廷與彥超相結之意帝笑曰此彥超之詐也以書示行周行周上表謝恩漢初彥超與行周同攻魏因而結隙且兗鄆鄰藩彥超舉兵恐行周擬其後故偽為其書欲以間之帝反以其書示行周以結其心丙申遣閤門使張凝將兵赴鄆州巡檢以備之職官分紀閤門使副掌供奉乘輿朝會游幸大宴及贊引親王宰相百寮蕃客朝見辭糾彈失儀五代以來多以處武臣出將使命及總戎旅楚王希萼既克長沙庚子王峻至絳州乙巳引兵趣晉州趣七喻翻晉州南有蒙阬最為險要峻憂北漢兵據之是日聞前鋒已度蒙阬喜曰吾事濟矣楚王希萼既克長沙慕容彥超奏請入朝帝知其詐即許之既而復稱境內多盜未敢離鎮復扶又翻離力智翻楚王希萼既克長沙北漢主攻晉州久不克是年十月庚子攻晉州至是五十餘日民相聚保山寨野無所掠軍乏食契丹思歸聞王峻至蒙阬燒營夜遁峻入晉州諸將請亟追之峻猶豫未決明日乃遣行營馬軍都指揮使仇弘超都排陳使藥元福左廂排陳使陳思讓康延沼將騎兵追之及於霍邑九域志霍邑在晉州北一百三十五里北漢兵墜崖谷死者甚衆霍邑道隘延沼畏懦不急追由是北漢兵得渡藥元福曰劉崇悉發其衆挾胡騎而來志吞晉絳今氣衰力憊狼狽而遁不乘此翦撲必為後患憊蒲拜翻撲普卜翻諸將不欲進王峻復遣使止之復扶又翻王峻自晉州遣使遂還契丹比至晉陽士馬什喪三四還從宣翻又如字比必利翻喪息浪翻蕭禹厥恥無功釘大酋長一人於市旬餘而斬之釘丁定翻酋慈秋翻長知兩翻北漢主始息意於進取北漢土瘠民貧內供軍國外奉契丹賦繁役重民不聊生逃入周境者甚衆楚王希萼既克長沙唐主以鎮南節度使兼中書令宋齊丘為太傅以馬希萼為江南西道觀察使鎮章十二行本鎮上有守中書令四字乙十一行本同孔本同張校同洪州仍賜爵楚王以馬希崇為永泰節度使鎮章十二行本鎮上有兼侍中三字乙十一行本同孔本同張校同舒州唐蓋置永泰軍於舒州位高者拜刺史將軍卿監卑者以次拜官唐主嘉廖偃彭師暠之忠以偃為左殿直軍使萊州刺史萊州屬周境廖偃遙領耳賜予甚厚予讀曰與湖南刺史皆入朝于唐永州刺史王贇獨後至唐主毒殺之楚王希萼既克長沙南漢主遣內侍省丞潘崇徹唐內侍省有監有少監未嘗有丞此南漢創置也唐邊鎬發兵救之崇徹敗唐兵於義章郴丑林翻宋白曰郴州漢郴縣隋置郴州敗補邁翻隋末蕭銑分郴置義章縣唐屬郴州九域志在州南八十五里宋朝避太宗潛藩舊名改曰宜章宋白曰縣北臨章水遂取郴州邊鎬請除全道二州刺史以備南漢丙辰唐主以廖偃為道州刺史以黑雲指揮使張巒知全州全道二州與南漢賀昭桂三州接界楚王希萼既克長沙是歲唐主以安化節度使鄱陽王王延政為山南西道節度使興元山南西道屬蜀唐使王延政遙領耳更工衡翻王延政之先本光山人故以爵之初蒙城鎮將咸師朗將部兵降唐見二百八十八卷漢乾祐二年將即亮翻從邊鎬平湖南唐悉收湖南金帛珍玩倉粟乃至舟艦亭館花果之美者皆徙於金陵遣都官郎中楊繼勳等收湖南租賦以贍戍兵繼勳等務為苛刻湖南人失望行營糧料使王紹顏減士卒糧賜奉節指揮使孫朗曹進怒曰昔吾從咸公降唐唐待我豈如今日湖南將士之厚哉今有功不增祿賜又減之不如殺紹顏及鎬據湖南歸中原富貴可圖也二年壬子九五二春正月庚申夜孫朗曹進帥其徒作亂帥讀曰率束藳潛燒府門火不然邊鎬覺之出兵格鬬且命鳴鼓角朗進等以為將曉斬關奔朗州王逵問朗曰吾昔從武穆王與淮南戰屢捷馬殷諡武穆王易以豉翻今欲以朗州之衆復取湖南可乎朗曰朗在金陵數年備見其政事朝無賢臣軍無良將忠佞無別賞罰不當朝直遙翻將即亮翻別彼列翻當丁浪翻如此得國存幸矣何暇兼人朗請為公前驅取湖南如拾芥耳逵悅厚遇之為于偽翻王逵等本有圖湖南之志於此遂決壬戌發開封府民夫五萬脩大梁城旬日而罷慕容彥超發鄉兵入城引泗水注壕中為戰守之備又多以旗幟授諸鎮將令募㣥盜剽掠鄰境幟昌志翻剽匹妙翻所在奏其反狀甲子敕沂密二州不復隸泰寧軍先收其巡屬以弱慕容彥超復扶又翻討彥超昭武軍利州屬蜀曹英遙領耳皇城使河內向訓為都監向姓也本自有殷宋文公支子向文旰旰孫戍以王父字為氏余按春秋左氏傳向戍宋桓公之後向式亮翻監古銜翻帝以元福宿將藥元福歷事唐漢晉為將有功將即亮翻二人皆父事之唐主發兵五千軍于下邳以援彥超聞周兵將至退屯沭陽下邳縣屬徐州東南至沭陽縣百里劉昫曰沭陽漢廩丘縣後魏改曰沭陽唐屬海州九域志在海州西南一百八十里杜佑曰海州沭陽縣漢原丘縣地梁置潼陽郡沭食聿翻大破唐兵殺溺死者千餘人獲其將燕敬權燕於賢翻初彥超以周室新造謂其易搖易以豉翻故北召北漢及契丹南誘唐人使侵邊鄙冀朝廷奔命不暇然後乘間而動誘音酉間古莧翻及北漢契丹自晉州北走唐兵敗於沭陽彥超之勢遂沮沮在呂翻永興節度使李洪信自以漢室近親心不自安李洪信漢李太后之㣥從也王峻在陝以救晉州為名發其數百及北漢兵遁去遣禁兵千餘人戍長安洪信懼遂入朝壬申王峻自晉州還入見還從宣翻又如字見賢遍翻曹英等至兗州設長圍慕容彥超屢出戰藥元福皆擊敗之敗補邁翻彥超不敢出十餘日長圍合遂進攻初彥超將反判官崔周度諫曰魯詩書之國自伯禽以來不能霸諸侯然以禮義守之可以長世公於國家非有私憾胡為自疑況主上開諭勤至苟撤備歸誠則坐享太山之安矣獨不見杜中令安襄陽李河中竟何所成乎杜中令謂杜重威安襄陽謂安從進李河中謂李守貞皆以反而敗死事並見前紀及官軍圍城彥超括士民之財以贍軍坐匿財死者甚衆前陝州司馬閻弘魯寶之子也閻寶背梁歸唐歷節鎮傾家為獻彥超猶以為有所匿命周度索其家索山客翻周度謂弘魯曰君之死生繫財之豐約宜無所愛弘魯泣拜其妻妾曰悉出所有以救吾死皆曰竭矣周度以白彥超彥超不信收弘魯夫妻繫獄有乳母於泥中掊得金纏臂獻之冀以贖其主掊蒲溝翻以手爬土也彥超曰所章十二行本所上有果然二字乙十一行本同孔本同張校同匿必猶多榜掠弘魯夫妻肉潰而死以周度為阿庇斬於市北漢遣兵寇府州防禦使折德扆敗之敗補邁翻殺二千餘人二月庚子德扆奏攻拔北漢岢嵐軍以兵戍之舊唐書地理志曰嵐州嵐谷縣舊岢嵐軍也在嵐州宜芳縣北界長安二年分宜芳於岢嵐舊軍置嵐谷縣神龍二年廢縣置軍開元十二年復置縣此蓋後唐復置軍也九域志岢嵐軍治嵐谷縣南至嵐州九十里岢枯我翻甲辰帝釋燕敬權等使歸唐謂唐主曰叛臣天下所共疾也不意唐主助之得無非計乎唐主大慙先所得中國人皆禮而歸之唐之言事者猶獻取中原之策中書舍人韓熙載曰郭氏有國雖淺為治已固治直吏翻我兵輕動必有害無益唐自烈祖以來唐主昇廟號烈祖欲與之共制中國更相饋遺更工衡翻遺唯季翻約為兄弟然契丹利其貨徒以虛語往來實不為唐用也唐主好文學好呼到翻故熙載與馮延己延魯江文蔚潘佑徐鉉之徒皆至美官佑幽州人也蔚紆勿翻當時唐之文雅於諸國為盛然未嘗設科舉多因上書言事拜官至是始命翰林學士江文蔚知貢舉進士廬陵王克貞等三人及第廬陵漢縣唐帶吉州蔚紆勿翻卿取士何如前朝對曰前朝公舉私謁相半臣專任至公耳唐主悅中書舍人張緯前朝登第聞而銜之時執政皆不由科第相與沮毀竟罷貢舉南唐罷貢舉時中國未嘗罷貢舉也三月戊辰以內客省使恩州團練使晉陽鄭仁誨為樞密副使按是時中國無恩州此即南漢之恩州也鄭仁誨遙領團練使耳宋慶曆八年平王則改貝州為恩州始以嶺南之恩州為南恩州以別之甲戌改威勝軍曰武勝軍舊以鄧州為威勝軍今避上名而改之唐主以太弟太保昭義節度使馮延己為左僕射前鎮海節度使徐景運為中書侍郎及右僕射孫晟皆同平章事既宣制戶部尚書常夢錫衆中大言曰白麻甚佳但不及江文蔚疏耳江文蔚疏見二百八十七卷漢天福十二年謂人曰金盃玉盌乃貯狗矢乎盌烏管翻貯丁呂翻延己言於唐主曰陛下躬親庶務故宰相不得盡其才此治道所以未成也治直吏翻唐主乃悉以政事委之奏可而已既而延己不能勤事文書皆仰成胥史仰牛向翻軍旅則委之邊將頃之事益不治唐主乃復自覽之復扶又翻大理卿蕭儼惡延己為人數上疏攻之會儼坐失入人死罪惡烏路翻數所角翻上時掌翻誤入人死罪謂之失入鍾謨李德明輩必欲殺之延己曰儼誤殺一婦人諸君以為當死儼九卿也可誤殺乎獨上言儼素有直聲今所坐已會赦宜從寬宥儼由是得免人亦以此多之景運尋罷為太子少傅按唐既置太弟官屬不應復有太子少傅當考夏四月丙戌朔日有食之帝以曹英等攻兗州久未克乙卯下詔親征以李穀權東京留守兼判開封府鄭仁誨權大內都巡章十二行本巡作點乙十一行本同孔本同張校同檢又以侍衞馬軍都指揮使郭崇充在京都巡檢唐主既克湖南遣其將李建期屯益陽以圖朗州以知全州張巒兼桂州招討使以圖桂州久之未有功唐主謂馮延己孫晟曰楚人求息肩於我言湖南之人苦其主之虐政暴斂而求息肩於唐非所以副來蘇之望書曰后來其蘇言楚人望唐之休息而唐又興兵役以疲之非所以副其望使唐主言而能行不搖於衆口烏有他日之敗乎斂益陽之戍以旌節授劉言何如晟以為宜然宜然猶言宜如此也吾出偏將舉湖南遠近震驚一旦三分喪二得潭而失朗桂故謂之三分喪二喪息浪翻請委邊將察其形勢唐主乃遣統軍使侯訓將兵五千自吉州路趣全州趣七喻翻與張巒合兵攻桂州南漢伏兵於山谷巒等始至城下罷乏罷讀曰疲伏兵四起城中出兵夾擊之唐兵大敗訓死巒收散卒數百奔歸全州五月庚申帝發大梁戊辰至兗州己巳帝使人招諭慕容彥超城上人語不遜庚午命諸軍進攻先是術者紿彥超云鎮星行至角亢角亢兗州之分先悉薦翻鎮星土星也亢苦郎翻分扶問翻其下有福彥超乃立祠而禱之令民間皆立黃幡土色黃彥超令立幡以從其色人心悅則天意得人有離心厭勝何益官軍攻城急猶瘞藏珍寶瘞於計翻由是人無鬬志將卒相繼有出降者乙亥官軍克城彥超方禱鎮星祠帥衆力戰帥讀曰率不勝乃焚鎮星祠與妻赴井死子繼勳出走追獲殺之官軍大掠城中死者近萬人近其靳翻初彥超將反募㣥盜置帳下至者二千餘人皆山林獷悍獷古猛翻悍侯旰翻又下罕翻竟不為用帝欲悉誅兗州將吏翰林學士竇儀見馮道范質與之共白帝曰彼皆脅從耳乃赦之丁丑以端明殿學士顏衎權知兗州事衎苦旱翻又苦旰翻赦章十二行本赦上有壬午二字乙十一行本同孔本同張校同退齋校同兗州管內彥超黨逃匿者期一月聽自首首式又翻前已伏誅者赦其親戚癸未降泰寧軍為防禦州以慕容彥超據兗州拒命降節鎮為防禦州唐司徒致仕李建勳卒且死戒其家人曰時事如此吾得良死幸矣勿封土立碑聽人耕種於其上免為他日開發之標及江南之亡也謂宋平金陵時惟建勳冢莫知其處李建勳知國事之日非而骸骨得保其藏可不謂智乎六月乙酉朔帝如曲阜謁孔子祠昔少皞氏自窮桑而徙曲阜魯侯伯禽所宅少皞氏之墟也應劭曰曲阜在魯城中委曲長七八里劉昭曰曲阜有闕里孔子所居後人立孔子祠自唐以來兗州治瑕丘而曲阜為屬縣九域志在州東四十里宋大中祥符五年改曲阜為仙源縣將拜左右曰孔子陪臣也不當以天子拜之帝曰孔子百世帝王之師敢不敬乎遂拜之又拜孔子墓命葺孔子祠禁孔林樵採孔子廟在曲阜城西南隅闕里孔子墓在曲阜城北泗水上去城一里葬地蓋一頃墳南北十步東西十三步高一丈二尺前有瓴甋為祠壇方六尺與地平塋中異木以百數皆諸弟子自四方致之植於塋中魯人莫之識也以為曲阜令及主簿丙戌帝發兗州乙未吳越順德太夫人吳氏卒丁酉蜀大水入成都秦時蜀守李冰穿二江成都中皆可行舟郡縣志曰李冰鑿離堆又開二渠由永康過新繁入成都謂之外江又一渠由永康過郫入成都謂之內江高駢未築羅城內外江皆從城西入自駢築城遂從西北作縻棗堰外江遶城北而東注於合江內江循城南而與外水俱注江江自西來其地勢高所以有水患溺死五千餘人壞太廟四室壞音怪戊戌蜀大赦賑水災之家己亥帝至大梁自兗州還至大梁朔方節度使兼中書令陳留王馮暉卒其子牙內都虞候繼業殺其兄繼勳自知軍府事太子賓客李濤之弟澣在契丹為勤政殿學士與幽州節度使蕭海真善海真契丹主兀欲之妻弟也澣說海真內附海真欣然許之澣因定州諜者田重霸齎絹表以聞說式芮翻諜達協翻重直龍翻且與濤書言契丹主童騃騃五駭翻癡也專事宴遊無遠志非前人之比前人謂阿保機德光等必克不然與和必得二者皆利於速度其情勢他日終不能力助河東者也度徒洛翻河東謂北漢壬寅重霸至大梁會中國多事不果從北不得燕雲西不得河鄯靈夏宋人以為千古之恨觀溫公書此事則元祐初棄米脂等四寨知中國之力不足也辛亥以馮繼業為朔方留後樞密使王峻性輕躁多計數好權利喜人附己躁則到翻好呼到翻喜許記翻自以天下為己任每言事帝從之則喜或時未允輒慍懟慍於運翻懟直類翻往往發不遜語帝以其故舊且有佐命功帝自鄴都入汴以至即位王峻之功為多每優容之峻年長於帝帝即位猶以兄呼之或稱其字峻以是益驕副使鄭仁誨皇城使向訓恩州團練使李重進皆帝在藩鎮時腹心將佐也重直龍翻將即亮翻帝即位稍稍進用峻心嫉之累表稱疾求解機務以詗帝意詗古永翻又翾正翻帝屢遣左右敦諭峻對使者辭氣亢厲亢苦浪翻又遺諸道節度使書求保證遺唯季翻諸道各獻其書帝驚駭久之復遣左右慰勉令視事復扶又翻且曰卿儻不來朕且自往猶不至帝知樞密直學士陳觀與峻親善令往諭指觀曰陛下但聲言臨幸其第章十二行本第下有嚴駕以待之五字乙十一行本同孔本同峻必不敢不來章十二行本來下有從之二字乙十一行本同孔本同秋七月戊子峻入朝帝慰勞令視事勞力到翻為貶王峻張本重進滄州人其母即帝妹福慶長公主也長知兩翻李穀足跌傷右臂跌徒結翻在告月餘帝以穀職業繁劇趣令入朝在告在假也趣讀曰促朝直遙翻下同任音壬癸巳詔免朝參但令視事蜀工部尚書判武德軍郭延鈞不禮於監押王承丕承丕謀作亂辛丑左奉聖都指揮使安次孫欽安次縣屬幽州孫欽本燕人而仕於蜀往辭承丕承丕邀與俱見府公府公謂郭延鈞也公者人之尊稱一府所尊故謂之府公從之承丕至則令左右擊殺延鈞屠其家稱奉詔處置軍府處昌呂翻即開府庫賞士卒出繫囚發屯戍將吏畢集欽謂承丕曰今延鈞已伏辜公宜出詔書以示衆承丕曰我能致公富貴勿問詔書欽始知承丕反因紿曰今內外未安我請以部兵為公巡察為于偽翻即躍馬而出承丕連呼之不止欽至營曉諭其衆帥以入府攻承丕帥讀曰率承丕左右欲拒戰欽叱之皆棄兵走遂執承丕斬之幷其親黨傳首成都天平節度使守中書令高行周卒行周有勇而知義功高而不矜策馬臨敵叱咤風生平居與賓僚宴集侃侃和易人以是重之咤陟駕翻易以豉翻史言高行周所以能以功名終癸卯蜀主遣客省使趙季札如梓州慰撫吏民以新經王承丕之亂也漢法犯私鹽麴無問多少抵死鄭州民有以屋稅受鹽於官過州城吏以為私鹽執而殺之其妻訟冤癸丑始詔犯鹽麴者以斤兩定刑有差時敕諸色犯鹽麴所犯一斤已下至一兩杖八十配役五斤已下一斤已上徒三年五斤已上重杖一頓處死容肇祖標點聶崇岐覆校
