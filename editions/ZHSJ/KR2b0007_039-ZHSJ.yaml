body:
  text: 資治通鑑卷第三十九翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註漢紀三十一淮陽王諱玄字聖公光武族兄也帝王世紀曰舂陵戴侯熊渠生蒼梧太守利利生子張子張生玄後敗降赤眉光武詔封為淮陽王更始元年癸未二三更工衡翻是年二月即位改元春正月甲子朔漢兵與下江兵共攻甄阜梁丘賜斬之甄之人翻殺士卒二萬餘人王莽納言將軍嚴尤秩宗將軍陳茂引兵欲據宛宛於元翻劉縯與戰於淯陽下續漢志淯陽縣屬南陽郡賢曰故城在今鄧州南陽縣南淯水之陽因名淯音育遂圍宛先是青徐賊衆雖數十萬人訖無文書號令旌旗部曲師古曰文謂文章號謂大位號也一曰號謂號令也先悉薦翻皆稱將軍攻城略地移書稱說稱說者數莽之罪也始懼舂陵戴侯曾孫玄在平林兵中號更始將軍更工衡翻時漢兵已十餘萬諸將議以兵多而無所統一欲立劉氏以從人望南陽豪桀及王常等皆欲立劉縯而新市平林將帥樂放縱樂音洛憚縯威明貪玄懦弱先共定策立之然後召縯示其議縯曰諸將軍幸欲尊立宗室甚厚然今赤眉起青徐衆數十萬聞南陽立宗室恐赤眉復有所立其後赤眉果立盆子復扶又翻是疑天下而自損權言宗室爭立則天下莫知所從是疑天下之心而自損其權也舂陵去宛三百里耳遽自尊立為天下準的使後人得承吾敝非計之善者也不如且稱王以號令王勢亦足以斬諸將若赤眉所立者賢相率而往從之必不奪吾爵位若無所立破莽降赤眉降戶江翻然後舉尊號亦未晚也諸將多曰善張卬拔劍擊地考異曰司馬彪續漢書卬作印袁宏後漢紀作斤皆誤今從范曄後漢書疑事無功戰國策肥義對趙武靈王之言不得有二衆皆從之二月辛巳朔設壇場於淯水上沙中水經註淯水出弘農盧氏縣攻離山東南過南陽西鄂縣西北又東過宛縣南諸將立聖公於斯水之上南面立朝㣥臣朝直遙翻羞愧流汗舉手不能言於是大赦改元以族父良為國三老王匡為定國上公王鳳為成國上公朱鮪為大司馬劉縯為大司徒陳牧為大司空餘皆九卿將軍匡鳳皆位上公而加定國成國美號也九卿將軍職為九卿各帶將軍之號仍王莽之制也多不服豪桀欲立縯而今立玄故失望王莽欲外示自安乃染其須髮立杜陵史諶女為皇后諶時壬翻置後宮位號視公卿大夫元士者凡百二十人三夫人視三公九嬪視九卿二十七世婦視二十七大夫八十一御妻視八十一元士莽赦天下詔王匡哀章等討青徐盜賊嚴尤陳茂等討前隊醜虜明告以生活青之信師古曰生活謂來降者不殺之也丹青之信言明著也復扶又翻將遣大司空隆新公將百萬之師劋絕之矣師古曰劋絕也音子小翻司空隆新公王邑三月王鳳與太常偏將軍劉秀等徇昆陽定陵郾皆下之賢曰昆陽定陵郾皆縣名並屬潁川郡昆陽故城在今許州葉縣北二十五里郾今豫州郾城縣也定陵在今郾城西北郾音於建翻余按舊唐書高宗咸亨二年冬校獵於許州葉縣昆水之陽王莽聞嚴尤陳茂敗乃遣司空王邑馳傳傳知戀翻與司徒王尋發兵平定山東徵諸明兵法六十三家以備軍吏以長人巨毋霸為壘尉鄭玄曰軍壁曰壘賢曰壘尉主壁壘之事邑至洛陽州郡各選精兵牧守自將守式又翻將即亮翻定會者四十三章十二行本三作二乙十一行本同孔本同退齋校同萬人號百萬餘在道者旌旗輜重千里不絕賢曰周禮曰析羽為旌熊虎為旗輜車名釋名曰輜廁也謂軍糧什物雜廁載之以其累重故稱輜重重音直用翻五月尋邑南出潁川與嚴尤陳茂合諸將見尋邑兵盛皆反走入昆陽惶怖憂念妻孥賢曰孥子也音奴欲散歸諸城劉秀曰今兵穀既少少詩沼翻而外寇強大幷力禦之功庶可立如欲分散勢無俱全且宛城未拔賢曰謂伯升圍宛未拔也昆陽即拔一日之間諸部亦滅矣今不同心膽共舉功名反欲守妻子財物邪諸將怒曰劉將軍何敢如是秀笑而起會候騎還言大兵且至城北軍陳數百里不見其後陳讀曰陣諸將素輕秀及迫急乃相謂曰更請劉將軍計之秀復為圖畫成敗復扶又翻為于偽翻諸將皆曰諾時城中唯有八九千人秀使王鳳與廷尉大將軍王常守昆陽夜與五威將軍李軼等十三騎賢曰王莽置五威將軍其衣服依五方之色以威天下李軼初起猶假以為號余謂如太常偏將軍廷尉大將軍之類亦猶莽之納言大將軍秩宗大將軍是即前所云九卿將軍也於外收兵時莽兵到城下者且十萬秀等幾不得出幾居希翻尋邑縱兵圍昆陽嚴尤說邑曰說輸芮翻昆陽城小而堅今假號者在宛假號者謂更始也彼必奔走宛敗昆陽自服邑曰吾昔圍翟義坐不生得翟義事見三十六卷王莽居攝二年賢曰坐才臥翻今將百萬之衆遇城而不能下非所以示威也當先屠此城蹀血而進師古曰蹀音大頰翻蹀謂履涉之也前歌後舞顧不快邪遂圍之數十重列營百數鉦鼓之聲聞數十里重直龍翻聞音問或為地道衝輣撞城賢曰衝橦車也詩曰臨衝閑閑許慎曰輣樓車也輣音步耕翻撞丈江翻矢下如雨城中負戶而汲王鳳等乞降不許降戶江翻尋邑自以為功在漏刻不以軍事為憂嚴尤曰兵法圍城為之闕師古曰此兵法之言也闕不合也孫子曰圍師必闕曹操註云司馬法云圍其三面闕其一面所以示生路也怖普布翻邑又不聽棘陽守長岑彭姓譜岑古岑子國之後呂氏春秋周文王封異母弟耀之子渠為岑子其地梁國岑亭是也彭棘陽人守本縣長長知兩翻貳副也莽使說為前隊大夫甄阜之副也漢兵攻之數月城中人相食乃舉城降更始入都之諸將欲殺彭劉縯曰彭郡之大吏執心固守是其節也今舉大事當表義士不如封之更始乃封彭為歸德侯賢曰歸德縣名屬北地郡宋白曰慶州華池縣本漢歸德縣地又通遠軍西北有歸德川劉秀至郾定陵悉發諸營兵諸將貪惜財物欲分兵守之秀曰今若破敵珍寶萬倍大功可成如為所敗敗補邁翻首領無餘何財物之有乃悉發之六月己卯朔秀與諸營俱進自將步騎千餘為前鋒去大軍四五里而陳陳讀曰陣尋邑亦遣兵數千合戰秀奔之斬首數十級賢曰秦法斬首一賜爵一級因謂斬首為級劉將軍平生見小敵怯今見大敵勇甚可怪也且復居前請助將軍秀復進尋邑兵卻諸部共乘之斬首數百千級自數百級以至千級也復扶又翻遂前諸將膽氣益壯無不一當百秀乃與敢死者三千人從城西水上衝其中堅賢曰敢死謂果敢而死者凡軍事中軍將軍至尊以堅銳自輔故曰中堅也余謂敢死者敢於致死者也易以豉翻自將萬餘人行陳師古曰巡行軍陳也行音下更翻陳讀曰陣下同獨迎與漢兵戰不利大軍不敢亶相救尋邑陳亂漢兵乘銳崩之遂殺王尋城中亦鼓譟而出中外合勢震呼動天地呼火故翻莽兵大潰走者相騰踐伏尸百餘里會大雷風屋瓦皆飛雨下如注滍川盛溢水經曰滍水出南陽魯陽縣西堯山東南經昆陽城北東入汝滍音直理翻士卒赴水溺死者以萬數賢曰數過於萬故以萬為數為于偽翻王邑嚴尤陳茂輕騎乘死人渡水逃去盡獲其軍實輜重不可勝算重直用翻勝音升舉之連月不盡或燔燒其餘士卒奔走各還其郡王邑獨與所將長安勇敢數千人還洛陽關中聞之震恐於是海內豪桀翕然響應響應若響之應聲也自稱將軍用漢年號以待詔命旬月之間徧於天下莽聞漢兵言莽鴆殺孝平皇帝乃會公卿於王路堂開所為平帝請命金縢之策事見三十六卷平帝元始六年為于偽翻劉秀復徇潁川攻父城不下賢曰父城縣名故城在今許州葉縣東北汝州郟城縣亦有父城復扶又翻下同賢曰巾車鄉名也在父城界掾俞絹翻監古銜翻為漢兵所獲異曰異有老母在父城願歸據五城以效功報德秀許之異歸謂父城長苗萌曰諸將多暴橫長知兩翻橫戶孟翻獨劉將軍所到不虜略觀其言語舉止非庸人也遂與萌率五縣以降降戶江翻新市平林諸將以劉縯兄弟威名益盛陰勸更始除之秀謂縯曰事欲不善言更始欲相圖也常如是耳更始大會諸將取縯寶劍視之綉衣御史申徒建隨獻玉玦申徒即申屠賢曰玦決也令早決斷縯舅樊宏謂縯曰建得無有范增之意乎范增事見九卷高帝元年李軼初與縯兄弟善後更諂事新貴新貴謂朱鮪等此人不可復信復扶又翻縯不從縯部將劉稷勇冠三軍冠古玩翻聞更始立怒曰本起兵圖大事者伯升兄弟也今更始何為者邪更始以稷為抗威將軍稷不肯拜不肯拜受抗威之命也先收稷將誅之縯固爭李軼朱鮪因勸更始幷執縯即日殺之以族兄光祿勳賜為大司徒賜與更始同祖蒼梧太守利自父城馳詣宛謝賢曰以伯升見害心不自安故謝縯之官屬也還嫌也引過以歸己又不敢為縯服喪為于偽翻飲食言笑如平常更始以是慙拜秀為破虜大將軍封武信侯道士西門君惠謂王莽衞將軍王涉曰讖文劉氏當復興復扶又翻下同國師公姓名是也涉遂與國師公劉秀大司馬董忠司中大贅孫伋謀以所部兵劫莽降漢以全宗族涉欲全王氏之族也降戶江翻七月伋以其謀告莽莽召忠詰責因格殺之使虎賁以斬馬劍剉忠收其宗族以醇醯毒藥白刃叢棘幷一坎而埋之秀涉皆自殺莽以其骨肉舊臣惡其內潰故隱其誅師古曰王涉骨肉劉歆舊臣余按莽傳涉曲陽侯根子也惡烏路翻大臣內畔左右亡所信古亡無字通乃召王邑還為大司馬以大長秋張邯為大司徒崔發為大司空司中壽容苗訢為國師邯下甘翻訢音欣莽憂懣不能食懣音悶又音滿但飲酒蜭鰒魚師古曰此鰒海魚也音雹郭璞註三蒼曰鰒似蛤偏著石廣志曰鰒無鱗有殼一面附石細孔雜雜或七或九本草曰石決明一名鰒魚讀軍書倦因馮几寐師古曰馮讀曰憑不復就枕矣成紀隗崔隗義成紀縣屬天水郡賢曰故城在今秦州隴城縣西北陴姓出於赤狄上邽縣屬隴西郡賢曰故邽戎邑今秦州縣冀縣屬天水郡秦武公伐冀戎因縣之宋白曰秦州治隴城縣即故冀城章十二行本漢下有衆數千人四字乙十一行本同孔本同張校同攻平襄殺莽鎮戎大尹李育賢曰平襄縣名屬天水郡故城在今秦州伏羌縣西北王莽改天水郡曰鎮戎素有名好經書好呼到翻崔等共推為上將軍崔為白虎將軍義為左將軍崔本自署右將軍白虎居右又起兵於西方白虎主之因改右將軍號白虎將軍以為軍師賢曰平陵昭帝陵因以為縣故城在今咸陽縣西北武王伐紂以太公為師尚父田單守即墨以一卒為神師韓信既破趙師事李左車皆軍師也後遂以為官稱平襄邑之東也說輸芮翻己巳祠高祖太宗世宗囂等皆稱臣執事殺馬同盟以興輔劉宗移檄郡國數莽罪惡數所具翻勒兵十萬擊殺雍州牧陳慶安定大尹王向莽改漢涼州曰雍州向平阿侯王譚之子也考異曰王莽傳作卒正王旬袁紀作太守王向今從范書敦徒門翻皆下之初茂陵公孫述為清水長賢曰清水縣名屬天水郡今秦州縣遷導江卒正治臨邛賢曰王莽改蜀郡曰導江臨邛今邛州縣班志臨邛縣屬蜀郡邛音渠容翻南陽宗成商人王岑起兵徇漢中以應漢宗成南陽人也地理志商縣屬弘農郡賢曰今商州商雒縣也衆合數萬人述遣使迎成等成等至成都地理志成都縣屬蜀郡橫戶孟翻述召郡中豪桀謂曰天下同苦新室思劉氏久矣故聞漢將軍到馳迎道路今百姓無辜而婦子係獲此寇賊非義兵也乃使人詐稱漢使者假述輔漢將軍蜀郡太守兼益州牧印綬選精兵西擊成等殺之按臨邛在成都西南述兵自臨邛迎擊宗成等非西向也此承范史之誤前鍾武侯劉望起兵汝南按王子侯表鍾武節侯度長沙定王之孫成帝元延二年侯則紹封其後不見或者望其則之子歟鍾武在義陽郡界水經註師水過義陽郡城東逕鍾武故城南考異曰王莽傳作劉聖今從范書劉玄傳八月望即皇帝位以尤為大司馬茂為丞相王莽使太師王匡國將哀章守洛陽將即亮翻考異曰袁紀作襃章今從范書更始遣定國上公王匡攻洛陽西屏大將軍申屠建丞相司直李松攻武關李松通之從弟屏必郢翻析人鄧曄于匡起兵南鄉以應漢師古曰析南陽之縣南鄉析縣之鄉名也宋白曰鄧州內鄉縣古之析邑析音先歷翻萌降降戶江翻進攻右隊大夫宋綱殺之莽改弘農郡曰右隊師古曰湖弘農之縣也本屬京兆不知所出崔發言古者國有大災則哭以厭之師古曰周禮春官之屬女巫之職曰凡邦之大災歌哭以請哭者所以告哀也春秋左氏傳宣十二年楚子圍鄭旬有七日鄭人大臨守陴者皆哭故發引之以為言也厭音一葉翻莽乃率㣥臣至南郊陳其符命本末仰天大哭氣盡伏而叩頭諸生小民旦夕會哭為設餐粥為于偽翻師古曰餐音千安翻甚悲哀者除以為郎郎至五千餘人莽拜將軍九人皆以虎為號將北軍精兵數萬人以東內其妻子宮中以為質質音致時省中黃金尚六十餘萬斤他財物稱是稱尺證翻莽愈愛之賜九虎士人四千錢衆重怨無鬬意師古曰重音直用翻九虎至華陰回谿賢曰回谿今俗所謂回阬在洛州永寧縣東北其谿長四里闊二丈深二丈五尺華戶化翻于匡鄧曄擊之六虎敗走二虎詣闕歸死莽使使責死者安在皆自殺其四虎亡二虎自殺者史熊王況也四虎亡者史逸其名三虎郭欽陳翬成重也師古曰京師倉在華陰灌北渭口也鄧曄開武關迎漢兵李松將三千餘人至湖與曄等共攻京師倉未下曄以弘農掾王憲為校尉掾俞絹翻將數百人北渡渭入左馮翊界李松遣偏將軍韓臣等徑西至新豐擊章十二行本擊下有破字乙十一行本同孔本同張校同退齋校同莽波水將軍據竇融傳莽拜融為波水將軍前書音義曰波水在長安南王憲北至頻陽所過迎降師古曰所過之處人皆來迎而降附也章十二行本無軍字乙十一行本同孔本同率衆隨憲李松鄧曄引軍至華陰而長安旁兵四會城下又聞天水隗氏方到皆爭欲章十二行本欲下有先字乙十一行本同孔本同張校同入城貪立大功鹵掠之利言入城誅莽既立大功又得鹵掠貪二者之利也皆授兵殺豨飲其血與誓曰有不為新室者社鬼記之豨許豈翻又音希為于偽翻使更始將軍史諶將之諶氏壬翻渡渭橋皆散走諶空還衆兵發掘莽妻子父祖冢燒其棺椁及九廟明堂辟雍火照城中九月戊申朔兵從宣平城門入師古曰長安城東出北頭第一門王邑王林王巡䠠惲等分將兵距擊北闕下䠠師古曰音帶又音徒蓋翻䠠姓惲名惲於粉翻會日暮官府邸第盡奔亡己酉城中少年朱弟張魚等恐見鹵掠趨讙並和師古曰衆㣥行讙而自相和也讙許元翻和音乎臥翻程大昌曰作室者未央宮西北織室暴室之類黃圖謂為尚方工作之所者也作室門則工徒出入之門蓋未央宮之便門也師古曰敬法殿名也闥小門也謂斧斫之也反虜王莽何不出降師古曰呼音火故翻火及掖庭承明黃皇室主所居黃皇室主曰何面目以見漢家自投火中而死莽避火宣室前殿火輒隨之莽紺袀服師古曰紺深青而揚赤色也袀純也純為紺服也袀音均又音弋旬翻虞帝安得有匕首蓋莽自為之以愚夫人師古曰式所以占時日天文郎今之用式者也曰天生德於予漢兵其如予何莽引孔子之言以自況庚戌且明㣥臣扶掖莽自前殿之漸臺章十二行本臺下有欲阻池水四字乙十一行本同孔本同張校同退齋校同此未央宮之漸臺也水經未央漸臺在滄池中建章漸臺在太液池中程大昌曰漸者漬也言臺在水中受其漸漬也凡臺之環浸于水者皆可名為漸臺漸子廉翻公卿從官尚千餘人隨之從才用翻王邑晝夜戰罷極師古曰罷讀曰疲士死傷略盡馳入宮間關至漸臺師古曰間關猶言崎嶇展轉也邑叱之令還父子共守莽軍人入殿中聞莽在漸臺衆共圍之數百重重直龍翻臺上猶與相射射而亦翻矢盡短兵接王邑父子䠠惲王巡戰死莽入室下餔時衆兵上臺晡後謂之下晡按前書天文志旦至食時食時至日昳日昳至晡晡至下晡下晡至日入訢音欣商人杜吳殺莽校尉東海公賓就斬莽首師古曰公賓姓就名也風俗通曰魯大夫公賓庚之後王莽五十一居攝五十四即真六十八誅死節解臠分爭相殺者數十人公賓就持莽首詣王憲憲自稱漢大將軍城中兵數十萬皆屬焉舍東宮師古曰舍止宿也乘其車服癸丑李松鄧曄入長安將軍趙萌申屠建亦至以王憲得璽綬不上璽斯氏翻綬音受上時掌翻多挾宮女建天子鼓旗收斬之傳莽首詣宛縣於市百姓共提擊之縣讀曰懸提音徒計翻或切食其舌班固贊曰王莽始起外戚折節力行以要名譽折而設翻要一遙翻及居位輔政勤勞國家直道而行豈所謂色取仁而行違者邪師古曰論語載孔子答子張之言也不仁之人假仁者之色而行則違之行下孟翻又乘四父歷世之權四父謂王鳳王音王商王根相繼秉政皆莽諸父也遭漢中微國統三絕成哀平皆絕為之宗主故得肆其姦慝以成篡盜之禍推是言之亦天時非人力之致矣及其竊位南面顛覆之勢險於桀紂而莽晏然自以黃虞復出也黃帝虞舜莽祖之復扶又翻奮其威詐師古曰睢音呼季翻毒流諸夏亂延蠻貉猶未足以逞其欲焉是以四海之內囂然喪其樂生之心師古曰囂然衆口愁貌也音五高翻喪息浪翻遠近俱發城池不守支體分裂遂令天下城邑為虛虛讀曰墟害徧生民自書傳所載亂臣賊子考其禍敗未有如莽之甚者也昔秦燔詩書以立私議莽誦六藝以文姦言師古曰以六經之事文飾姦言俱用滅亡皆聖王之驅除云爾蘇林曰聖王光武也為光武驅除也師古曰言驅逐蠲除以待聖人也定國上公王匡拔洛陽生縛莽太師王匡哀章皆斬之冬十月奮威大將軍劉信擊殺劉望於汝南信大司徒賜兄顯之子郡縣皆降降戶江翻更始將都洛陽以劉秀行司隸校尉使前整脩宮府司隸校尉察三輔三河弘農故使整脩宮府作文移東觀記曰文書移與屬縣也一如舊章續漢書司隸置從事史十二人秩皆百石主督促文書察舉非法見諸將過皆冠幘而服婦人衣漢官儀曰幘者古之卑賤不冠者之所服也方言曰覆髻謂之幘或謂之承露劉昭志曰秦雄諸侯乃加武將首飾為絳袙以表貴賤其後稍作顏題漢興續其顏卻摞之施巾連題卻覆之名之曰幘幘者賾也頭首嚴賾也至孝文乃高顏題崇其巾為屋合後施收上下㣥臣貴賤皆服之文者長耳武者短耳及見司隸僚屬皆觀喜不自勝勝音升老吏或垂涕曰不圖今日復見漢官威儀復扶又翻下同由是識者皆屬心焉皆屬音之欲翻更始北都洛陽分遣使者徇郡國曰先降者復爵位降戶江翻下同使者至上谷漢上谷郡治沮陽上印綬上時掌翻使者納之一宿無還意功曹寇恂勒兵入見使者請之姓譜蘇忿生為周武王司寇其後以官為寇氏百官志郡功曹主選署功勞在諸曹之上曰天王使者功曹欲脅之邪恂曰非敢脅使君竊傷計之不詳也今天下初定使君建節銜命郡國莫不延頸傾耳今始至上谷而先墮大信賢曰墮毀也讀曰隳將復何以號令他郡乎使者不應恂叱左右以使者命召況況至恂進取印綬帶況使者不得已乃承制詔之況受而歸宛人彭寵吳漢亡命在漁陽鄉人韓鴻為更始使徇北州承制拜寵偏將軍行漁陽太守事為彭寵據漁陽張本賢曰安樂縣名屬漁陽郡故城在今幽州潞縣西北樂音洛更始遣使降赤眉遣使者招諭之使降而釋兵也後以意推降戶江翻即留其兵將章十二行本將上有自字孔本同張校同渠帥二十餘人隨使者至洛陽帥所類翻更始皆封為列侯崇等既未有國邑而留衆稍有離叛者乃復亡歸其營崇等時營在濮陽為赤眉攻更始張本王莽廬江連率潁川李憲據郡自守稱淮南王率所類翻故梁王立之子永詣洛陽立死見三十六卷平帝元始四年都睢陽為永據梁連㣥盜張本睢音雖更始欲令親近大將徇河北大司徒賜言諸家子獨有文叔可用諸家子謂南陽諸宗子也光武諱秀字文叔更始狐疑賜深勸之更始乃以劉秀行大司馬事持節北渡河鎮慰州郡為光武自河北定天下張本以大司徒賜為丞相令先入關脩宗廟宮室將都長安也大司馬秀至河北所過郡縣考察官吏黜陟能否平遣囚徒除王莽苛政賢曰說文苛小草也言政令繁細吏民喜悅爭持牛酒迎勞勞力到翻秀皆不受南陽鄧禹杖策追秀及於鄴秀曰我得專封拜生遠來寧欲仕乎禹曰不願也秀曰即如是何欲為禹曰但願明公威德加於四海禹得效其尺寸垂功名於竹帛耳漢初未有紙以竹簡及縑素書故言竹帛因留宿間語賢曰間私也說輸芮翻下同今山東未安赤眉青犢之屬動以萬數更始既是常才而不自聽斷斷丁亂翻諸將皆庸人屈起賢曰屈音求勿翻志在財幣爭用威力朝夕自快而已非有忠良明智深慮遠圖欲尊主安民者也歷觀往古聖人之興二科而已天時與人事也今以天時觀之更始既立而災變方興以人事觀之帝王大業非凡夫所任任音壬分崩離析形勢可見明公雖建藩輔之功猶恐無所成立也況明公素有盛德大功為天下所嚮服軍政齊肅賞罰明信為今之計莫如延攬英雄務悅民心立高祖之業救萬民之命以公而慮天下不足定也鄧禹為中興元功實本諸此因令禹章十二行本禹下有常字乙十一行本同孔本同張校同宿止於中與定計議每任使諸將多訪於禹皆當其才秀自兄縯之死每獨居輒不御酒肉御進也主簿馮異獨叩頭寬譬馮異自父城歸光武為司隸主簿及渡河為大司馬主簿寬釋也譬曉也譬曉也譬曉以寬釋其哀戚之情卿勿妄言異因進說曰更始政亂百姓無所依戴夫人久飢渴易為充飽孟子曰飢者易為食渴者易為飲賢曰猶言凋殘之後易流德澤易以豉翻宜分遣官屬徇行郡縣行下孟翻宣布惠澤秀納之騎都尉宋子耿純謁秀於邯鄲先是李軼承制拜耿純為騎都尉賢曰宋子縣屬鉅鹿郡故城在今趙州平棘縣北三十里邯鄲縣屬趙國今洛州縣見官屬將兵法度不與他將同遂自結納故趙繆王子林賢曰繆王景帝七代孫名元前書曰坐殺人為大鴻臚所奏諡曰繆音謬續漢書林言於秀曰赤眉可破秀問其故對曰赤眉今在河東河水從列人北流如決河水灌之可令為魚列人縣屬鉅鹿郡賢曰故城在今洛州肥鄉縣東北去之真定賢曰真定縣名屬真定國今恆州縣也王莽時長安中有自稱成帝子子輿者莽殺之如淳曰相與信為任同是非為俠所謂權行州里力折公侯者也或曰俠之為言挾也以權力夾輔人者也子輿事見三十七卷王莽始建國二年云母故成帝謳者嘗見黃氣從上下遂任身任音壬趙后欲害之偽易他人子以故得全林等信之與趙國大豪李育張參等謀共立郎會民間傳赤眉將渡河林等因此宣言赤眉當立劉子輿以觀衆心百姓多信之十二月林等率車騎數百晨入邯鄲城止於王宮賢曰故趙王之宮也邯鄲音寒丹分遣將帥徇下幽冀移檄州郡趙國以北遼東以西皆望風響應二年二年春正月大司馬秀以王郎新盛乃北徇薊賢曰薊縣名屬涿郡今幽州縣也薊音計二年申屠建李松自長安迎更始遷都二月更始發洛陽初三輔豪桀假號誅莽者謂假漢將軍號也申屠建既斬王憲又揚言三輔兒大黠黠下八翻桀黠也共殺其主吏民惶恐屬縣屯聚建等不能下更始至長安乃下詔大赦非王莽子他皆除其罪於是三輔悉平時長安唯未央宮被焚其餘宮室供帳倉庫官府皆按堵如故市里不改於舊更始居長樂宮樂音洛升前殿郎吏以次列庭中更始羞怍俛首刮席不敢視賢曰怍顏色變也俛俯也刮爬也怍才各翻俛音免更始問虜掠得幾何左右侍官皆宮省久吏驚愕相視給事天子左右者謂之侍官李松與棘陽趙萌說更始宜悉王諸功臣說諭芮翻王于況翻朱鮪爭之以為高祖約非劉氏不王鮪于軌翻更始乃先封諸宗室祉為定陶王班志定陶縣屬濟陰郡宋白曰定陶故城在曹州東北三十七里燕於賢翻歙為元氏王元氏縣屬常山郡闞駰曰趙公子元之封邑故曰元氏祉舂陵康侯敞之子大宗也慶敞之弟嘉敞之弟子歙更始之叔父歙許及翻宛縣屬南陽郡宋白曰鄧州南陽縣漢之宛縣班志汝陰縣屬汝南郡故胡國唐潁州治所泚陽後漢書作比陽比陽縣屬南陽郡唐屬唐州班志宜城縣屬南郡故鄢宋為大堤之地立華山郡後魏改宜城郡唐為縣屬襄州膠東漢王國都即墨賢曰故城在今萊州膠水縣東南鄧縣屬南陽郡故鄧國唐為鄧城縣屬襄州班志平氏縣屬南陽郡有桐柏山唐為桐柏縣屬唐州賢曰陰平縣屬廣漢郡宋白曰唐文州曲水縣漢陰平道也淮陽本陳國漢為淮陽國賢曰淮陽故城在今陳州宛丘縣東南穰縣屬南陽郡師古曰今鄧州穰縣是也隨縣屬南陽郡古隨國唐為隨州賢曰西平縣屬汝南郡故城在今豫州郾城縣南舞陰縣屬南陽郡宋白曰唐州泌陽縣本漢舞陰縣地舞陽故城在葉縣東十里襄邑縣屬陳留郡國圈宋地本承匡襄陵鄉也宋襄公所葬故曰襄陵秦始皇以承匡卑濕徙縣於襄陵故曰襄邑縣西十里有承匡故城賢曰今襄邑縣在宋州西驃騎大將軍宗佻為潁陰王佻他彫翻又田聊翻班志潁陰縣屬潁川郡尹尊為郾王班志郾縣屬潁川郡宋白曰七國時魏之下邑今許州郾城縣是也括地志豫州褒信縣本漢郾縣地師古曰郾一戰翻乃以鮪為左大司馬宛王賜為前大司馬使與李軼等鎮撫關東又使李通鎮荊州王常行南陽太守事以李松為丞相趙萌為右大司馬共秉內任內任謂朝廷之內更始納趙萌女為夫人故委政於萌日夜飲讌後庭㣥臣欲言事輒醉不能見時不得已乃令侍中坐帷中與語韓夫人尤嗜酒每侍飲見常侍奏事中常侍受外朝臣奏事而奏之天子帝方對我飲正用此時持事來邪起抵破書案賢曰抵擊也生殺自恣郎吏有說萌放縱者更始怒拔劍斬之自是無敢復言復扶又翻以至㣥小膳夫皆濫授官爵長安為之語曰竈下養中郎將公羊傳曰炊烹為養音弋亮翻爛羊胃騎都尉爛羊頭關內侯言以烹煮熟爛為功也陛下定業雖因下江平林之勢斯蓋臨時濟用不可施之既安唯名與器聖人所重孔子曰唯名與器不可以假人望其裨益萬分猶緣木求魚升山采珠賢曰言求之非所不可得也有以窺度漢祚度徒洛翻更始怒囚之諸將在外者皆專行誅賞各置牧守州郡交錯不知所從由是關中離心四海怨叛二年更始徵隗囂及其叔父崔義等囂將行方望以更始成敗未可知固止之囂不聽望以書辭謝而去囂等至長安更始以囂為右將軍崔義皆即舊號就其舊號以授之隗囂違方望之言而從更始違馬援之言而叛光武始則幾至殺身後則終於滅族擇木之難也二年耿況遣其子弇奉奏詣長安弇時年二十一弇古含翻行至宋子會王郎起弇從吏孫倉衞包曰劉子輿成帝正統捨此不歸遠行安之弇按劍曰子輿弊賊卒為降虜耳從才用翻卒終也音子恤翻我至長安與國家陳上谷漁陽兵馬歸發突騎賢曰突騎言能衝突軍陳如摧枯折腐耳賢曰轔轢也音力刃翻觀公等不識去就族滅不久也倉包遂亡降王郎弇聞大司馬秀在盧奴賢曰盧奴縣名屬中山國故城在今定州安喜縣水經註曰縣有黑水故池水黑曰盧不流曰奴因以為名上時掌翻下異上同秀留署長史與俱北至薊薊故燕都昭帝改燕為廣陽國亦治薊秀令功曹令史潁川王霸至市中募人擊王郎漢舊註公府令史秩百石霸時為大司馬功曹令史舉手邪揄之霸慚懅而反賢曰說文曰歋手相笑也歋音弋支翻音踰或音由此云邪揄語輕重不同懅亦慙也音遽耿弇曰今兵從南方來不可南行漁陽太守彭寵公之邑人彭寵南陽宛人即弇父也發此兩郡控弦萬騎邯鄲不足慮也秀官屬腹心皆不肯曰死尚南首奈何北行入囊中賢曰漁陽上谷北接塞垣至彼路窮如入囊中也首音式救翻是我北道主人也會故廣陽王子接起兵薊中以應郎賢曰廣陽王名嘉武帝五代孫言邯鄲使者方到二千石以下皆出迎於是秀趣駕而出賢曰趣急也音促至南城門門已閉攻之得出遂晨夜南馳不敢入城邑舍食道傍至蕪蔞亭賢曰蕪蔞亭名在今饒陽東北蔞音力于翻馮異上豆粥至饒陽賢曰饒陽縣名屬安平國在饒河之陽故城在今瀛州饒陽縣東北秀乃自稱邯鄲使者入傳舍賢曰傳舍客館也傳音知戀翻下同從者飢爭奪之從才用翻傳吏疑其偽乃椎鼓數十通紿言邯鄲將軍至賢曰椎直追翻紿言期誑也音殆官屬皆失色秀升車欲馳既而懼不免徐還坐曰請邯鄲將軍入久乃駕去晨夜兼行蒙犯霜雪面皆破裂至下曲陽賢曰下曲陽縣名屬鉅鹿郡常山郡有上曲陽故此言下劉昭曰下曲陽有鼓聚故翟鼓子國宋白曰鎮州鼓城縣漢下曲陽縣地從者皆恐從才用翻至滹沱河賢曰山海經云大戲之山滹沱之水出焉在今代州繁畤縣東流經定州深澤縣東南即光武所渡處今俗猶謂之危渡口臣賢按滹沱河舊在饒陽南至魏太祖曹操因饒河故瀆決令北注新溝水所以今在饒陽縣北河水流澌賢曰澌音斯冰澌也無船不可濟秀使王霸往視之霸恐驚衆欲且前阻水還即詭曰冰堅可度官屬皆喜秀笑曰候吏果妄語也遂前比至河比必寐翻及也河冰亦合乃令王霸護渡賢曰監護渡也至南宮賢曰南宮縣名屬信都國今冀州縣也秀引車入道傍空舍馮異抱薪鄧禹爇火賢曰爇音而悅翻秀對竈燎衣賢曰燎炙也復扶又翻進至下博城西賢曰下博縣屬信都國在博水之下故曰下博故城在今冀州下博縣南有白衣老父在道旁賢曰蓋神人也今下博縣西有祠堂努力信都郡為長安城守賢曰信都郡今冀州為于偽翻秀即馳赴之是時郡國皆已降王郎獨信都太守南陽任光和戎太守信都邳肜不肯從東觀記曰王莽分信都為和戎居下曲陽邳肜傳作和成成字為是風俗通奚仲為夏車正封於邳其後以為氏彤余中翻恐不能全賢曰獨守無援故恐大喜吏民皆稱萬歲邳肜亦自和戎來會議者多言可因信都兵自送西還長安邳肜曰吏民歌吟思漢久矣故更始舉尊號而天下響應三輔清宮除道以迎之今卜者王郎假名因勢驅集烏合之衆遂振燕趙之地振舉也明公奮二郡之兵以討之二郡信都和成今釋此而歸豈徒空失河北必更驚動三輔墮損威重墮讀曰隳非計之得者也若明公無復征伐之意復扶又翻則雖信都之兵猶難會也何者明公既西則邯鄲勢成民不肯捐父母背成主而千里送公謂光武西歸則王郎之位號定故曰成主背蒲妹翻考異曰范書邳彤傳邯鄲成民不肯背成主字皆作城袁紀作邯鄲和城民不肯捐和城而千里送公漢春秋作邯鄲之民不能捐父母背成主按文意城皆當作成邯鄲成謂邯鄲勢成也成主謂王郎為已成之主也秀乃止秀以二郡兵弱欲入城頭子路力子都軍中爰曾起兵盧城頭曾字子路故號城頭子路考異曰范書作力子都同編修劉攽曰力當作刁音彫乃發傍縣得精兵四千人拜任光為左大將軍信都都尉李忠為右大將軍邳肜為後大將軍和戎太守如故信都令萬脩為偏將軍萬姓也孟子弟子有萬章留南陽宗廣領信都太守事使任光李忠萬脩將兵以從從才用翻下使從同邳肜將兵居前任光乃多作檄文曰大司馬劉公將城頭子路力子都兵百萬衆從東方來擊諸反虜遣騎馳至鉅鹿界中吏民得檄傳相告語傳知戀翻語牛倨翻秀投暮入堂陽界賢曰堂陽縣屬鉅鹿郡在堂水之陽故城在今冀州鹿城縣南彌滿澤中堂陽即降又擊貰縣降之賢曰貰縣屬鉅鹿郡音時夜翻師古音式制翻城頭子路者東平爰曾也寇掠河濟間有衆二十餘萬濟子禮翻力子都有衆六七萬故秀欲依之昌城人劉植聚兵數千人據昌城迎秀賢曰昌城縣屬信都郡故城在今冀州西北杜佑曰故城在冀州信都縣北水經註引應劭曰在堂陽縣北三十里耿純率宗族賓客二千餘人老病老皆載木自隨賢曰左傳曰又如是而嫁將就木焉木謂棺也老病老恐死故載以從軍賢曰育縣名故城在冀州余考兩漢志無育縣蓋貰字之誤進攻下曲陽降之衆稍合至數萬人復北擊中山賢曰中山國一名中人亭故城在今定州唐縣東北張曜中山記曰城中有山故曰中山也復扶又翻乃使從弟訢宿歸燒廬舍以絕其反顧之望秀進拔盧奴杜佑曰定州安喜縣漢盧奴也移檄邊郡共擊邯鄲郡縣還復響應復扶又翻下同時真定王楊起兵附王郎衆十餘萬秀遣劉植說楊楊乃降楊常山憲王舜六世孫舜景帝子也說輸芮翻納楊甥郭氏為夫人以結之進擊元氏防子皆下之賢曰元氏防子屬常山郡並今趙州縣也防與房古字通用擊斬王郎將李惲鄗縣屬常山郡賢曰今趙州高邑縣也鄗音呼各翻惲於粉翻復破郎將李育賢曰柏人縣名屬趙國今邢州縣故城在縣之西北攻之不下二年南鄭人延岑起兵據漢中延姓岑名有衆數十萬校尉南陽賈復見更始政亂乃說嘉曰說輸芮翻今天下未定而大王安守所保所保得無不可保乎所保謂漢中也卿言大非吾任也大司馬在河北必能相用乃為書薦復及長史南陽陳俊於劉秀復等見秀於柏人秀以復為破虜將軍俊為安集掾劉玄傳玄初從陳牧等為其軍安集掾賢曰欲以安集軍衆故權以為官名余謂光武用俊之意不特安集軍衆蓋為民也掾俞絹翻秀舍中兒犯法軍市令潁川祭遵格殺之從軍者非一處人故於軍中立市使相貿易置令以治之姓譜周公第五子祭伯其後以為氏賢曰祭音側介翻命收遵主簿陳副諫曰明公常欲衆軍整齊今遵奉法不避是教令所行也乃貰之賢曰貰猶赦也王莽置左右刺姦使督姦猾光武因以為將軍號當備祭遵吾舍中兒犯法尚殺之必不私諸卿也二年初王莽既殺鮑宣事見三十六卷平帝元始三年太守苟諫保護之永由是得全更始徵永為尚書僕射行大將軍事將兵安集河東幷州河東郡本屬司隸令永安集河東及幷州所部諸郡永至河東擊青犢大破之以馮衍為立漢將軍屯太原與上黨太守田邑等繕甲養士以扞衞幷土二年或說大司馬秀以守柏人不如定鉅鹿說輸芮翻下同秀乃引兵東北拔廣阿賢曰廣阿縣名屬鉅鹿郡故城在今趙州象城縣西北杜佑曰趙州昭慶縣漢廣阿縣武帝時㣥臣請王皇子御史奏輿地圖索隱曰謂地為輿者天地有覆載之德故謂天為蓋謂地為輿故地圖稱輿地圖疑自古有此名非始漢也天下郡國如是今始乃得其一子前言以吾慮天下不足定何也禹曰方今海內殽亂人思明君猶赤子之慕慈母古之興者在德薄厚不以大小也二年薊中之亂耿弇與劉秀相失北走昌平賢曰昌平縣屬上谷郡今幽州縣故城在縣東因說況擊邯鄲說輸芮翻下同時王郎遣將徇漁陽上谷急發其兵北州疑惑多欲從之上谷功曹寇恂門下掾閔業閔姓也魯有大夫閔馬父孔子弟子有閔子騫邯鄲拔起賢曰拔猝也大司馬劉伯升母弟尊賢下士可以歸之下遐稼翻況曰邯鄲方盛力不能獨拒如何對曰今上谷完實控弦萬騎可以詳擇去就恂請東約漁陽齊心合衆邯鄲不足圖也況然之遣恂東約彭寵欲各發突騎二千匹步兵千人詣大司馬秀安樂令吳漢護軍蓋延狐奴令王梁亦勸寵從秀樂音洛蓋古劫翻狐奴縣屬漁陽郡寵以為然而官屬皆欲附王郎寵不能奪漢出止外亭外亭城門外之亭也召而食之食讀曰飤問以所聞生言大司馬劉公所過為郡縣所稱邯鄲舉尊號者實非劉氏漢大喜即詐為秀書移檄漁陽使生齎以詣寵令具以所聞說之說輸芮翻會寇恂至寵乃發步騎三千人以吳漢行長史與蓋延王梁將之南攻薊殺王郎大將趙閎寇恂還遂與上谷長史景丹及耿弇將兵俱南與漁陽軍合所過擊斬王郎大將九卿校尉以下凡斬首三萬級定涿郡中山鉅鹿清河河間凡二十二縣前及廣阿聞城中車騎甚衆丹等勒兵問曰此何兵曰大司馬劉公也諸將喜即進至城下城下初傳言二郡兵為邯鄲來為于偽翻下同衆皆恐劉秀自登西城樓勒兵問之耿弇拜於城下即召入具言發兵狀秀乃悉召景丹等入笑曰邯鄲將帥數言我發漁陽上谷兵數所角翻下同吾聊應言我亦發之賢曰王郎將帥數云欲發二郡兵以拒光武光武聊亦應云然猶今兩軍相戲弄也孔穎達曰聊且略之辭考異曰袁紀作良牧為吾來今從景丹傳韻釋良首也信也乃以景丹寇恂耿弇蓋延吳漢王梁皆為偏將軍使還領其兵加耿況彭寵大將軍封況寵丹延皆為列侯吳漢為人質厚少文造次不能以辭自達少詩沼翻朱子曰造次急遽苟且之時造七到翻然沈厚章十二行本厚作勇乙十一行本同孔本同張校同有智略沈持林翻鄧禹數薦之於秀秀漸親重之更始遣尚書令謝躬率六將軍討王郎不能下秀至與之合軍東圍鉅鹿月餘未下王郎遣將攻信都大姓馬寵等開門內之更始遣兵攻破信都秀使李忠還行太守事王郎遣將倪宏劉奉率數萬人救鉅鹿秀逆戰於南䜌不利賢曰南䜌縣名屬鉅鹿郡故城在今邢州柏人縣東北左傳齊國夏伐晉取欒即其地也其後南徙故加南今謂之倫城聲之轉也杜佑曰唐鉅鹿漢南䜌地漢鉅鹿縣今平鄉也䜌音力全翻宏等大敗秀曰吾聞突騎天下精兵今見其戰樂可言邪樂音洛耿純言於秀曰久守鉅鹿士衆疲弊不如及大兵精銳進攻邯鄲若王郎已誅鉅鹿不戰自服矣秀從之夏四月留將軍鄧滿守鉅鹿進軍邯鄲連戰破之郎乃使其諫大夫杜威請降威雅稱郎實成帝遺體秀曰設使成帝復生復扶又翻天下不可得況詐子輿者乎威請求萬戶侯秀曰顧得全身可矣威怒而去秀急攻之二十餘日五月甲辰郎少傅李立開門內漢兵遂拔邯鄲郎夜亡走王霸追斬之秀收郎文書得吏民與郎交關謗毀者數千章關通也省悉井翻會諸將軍燒之曰令反側子自安賢曰反側不安詩曰展轉反側秀部分吏卒各隸諸軍句絕大樹將軍者偏將軍馮異也為人謙退不伐敕吏士非交戰受敵常行諸營之後每所止舍諸將並坐論功異常獨屏樹下屏必郢翻蔽也坐樹下以自蔽也故軍中號曰大樹將軍護軍宛人朱祐言章十二行本言上有從容二字乙十一行本同孔本同於秀曰長安政亂公有日角之相此天命也考異曰范書袁紀朱祜皆作祐按東觀記祐皆作福避安帝諱許慎說文祜字無解云上諱然則祐名當作示旁古古今之古不當作左右之右也章十二行本正作祜乙十一行本同孔本同張校同云廿九葉前三行同相息亮翻召刺姦收護軍祜事伯升為大司徒護軍光武為大司馬復以為護軍百官表護軍都尉秦官平帝元始元年更名護軍復扶又翻下同更始遣使立秀為蕭王賢曰蕭縣屬沛郡今徐州縣也與諸將有功者詣行在所蔡邕獨斷曰天子以四海為家故謂所居為行在所韋順為上谷太守蔡充為漁陽太守並北之部蕭王居邯鄲宮晝臥溫明殿賢曰趙王如意之殿也故基在今洺州邯鄲縣內水經註溫明殿在叢臺西造牀下請間造七到翻因說曰吏士死傷者多請歸上谷益兵蕭王曰王郎已破河北略平復用兵何為復扶又翻弇曰王郎雖破天下兵革乃始耳今使者從西方來欲罷兵不可聽也銅馬赤眉之屬數十輩輩數十百萬人所向無前聖公不能辦也賢曰辦猶成也音蒲莧翻余據史記項梁曰使公主某事不能辦即此意今人謂了事為辦事敗必不久蕭王起坐曰卿失言我斬卿弇曰大王哀厚弇如父子故敢披赤心蕭王曰我戲卿耳何以言之弇曰百姓患苦王莽復思劉氏聞漢兵起莫不歡喜如去虎口得歸慈母今更始為天子而諸將亶命於山東貴戚縱橫於都內橫戶孟翻都內謂長安虜掠自恣元元叩心更思莽朝朝直遙翻是以知其必敗也公功名已著以義征伐天下可傳檄而定也天下至重公可自取毋令他姓得之蕭王乃辭以河北未平不就徵始貳於更始賢曰貳離異也是時諸賊銅馬大彤高湖重連鐵脛大槍尤來上江青犢五校五幡五樓富平獲索等各領部曲衆合數百萬人賢曰諸賊或以山川土地為名或以軍容強盛為號銅馬賊帥東山荒禿上淮況等大彤渠帥樊重尤來渠帥樊崇五校賊帥高扈檀鄉賊帥董次仲五樓賊帥張文富平賊帥徐少獲索賊帥古師郎等並見東觀記脛形定翻富平縣名屬平原郡今棣州厭次縣蕭王欲擊之乃拜吳漢耿弇俱為大將軍持節北發幽州十郡突騎幽州十郡涿郡廣陽代郡上谷漁陽遼西遼東玄菟樂浪郡是也陰敕諸郡不得應調賢曰調發也調徒弔翻賢曰無終本山戎國也無終山名因以為國號漢為縣名屬右北平故城在今幽州漁陽縣是時苗曾蓋治無終漢即收曾斬之耿弇到上谷亦收韋順蔡充斬之北州震駭於是悉發其兵秋蕭王擊銅馬於鄡賢曰鄡縣名屬鉅鹿郡故城在冀州鹿城縣東鄡音苦堯翻賢曰清陽縣名屬清河郡今貝州縣故城在州西北漢悉上兵簿於莫府賢曰莫大也兵簿軍士之名帳上時掌翻不敢自私王益重之王以偏將軍沛國朱浮為大將軍幽州牧使治薊城銅馬食盡夜遁蕭王追擊於館陶大破之賢曰館陶縣屬魏郡今魏州縣降戶江翻下同而高湖重連從東南來與銅馬餘衆合蕭王復與大戰於蒲陽悉破降之賢曰前書音義曰蒲陽山蒲水所出在今定州北平縣西北余按此乃班書地理志中山曲逆縣下分註非音義也復扶又翻封其渠帥為列侯帥所類翻諸將未能信賊降者亦不自安王知其意敕令降者各歸營勒兵自乘輕騎按行部陳降者更相語曰蕭王推赤心置人腹中安得不投死乎賢曰投死猶言致死余謂投託也託以死也行下孟翻陳讀曰陣更工衡翻悉以降人分配諸將衆遂數十萬赤眉別帥與青犢上江大彤鐵脛五幡十餘萬衆在射犬賢曰續漢志野王有射犬聚故城在今懷州武德縣北大破之南徇河內河內太守韓歆降二年初謝躬與蕭王共滅王郎數與蕭王違戾數所角翻常欲襲蕭王畏其兵強而止雖俱在邯鄲遂分城而處處昌呂翻然蕭王章十二行本王下有每字乙十一行本同孔本同有以慰安之躬勤於吏職蕭王常稱之曰謝尚書真吏也故不自疑其妻知之常戒之曰君與劉公積不相能而信其虛談終受制矣躬不納既而躬率其兵數萬還屯於鄴鄴縣屬魏郡使躬邀擊尤來於隆慮山地理志隆慮縣屬河內郡應劭曰隆慮山在縣北避殤帝名改曰林慮師古曰慮音廬蕭王因躬在外使吳漢與刺姦大將軍岑彭襲據鄴城躬不知輕騎還鄴漢等收斬之其衆悉降二年更始遣枉章十二行本枉作柱乙十一行本同孔本同功侯李章十二行本李作張乙十一行本同張校同寶益州刺史李忠將兵萬餘人徇蜀漢公孫述遣其弟恢擊寶忠於綿竹賢曰綿竹縣名屬廣漢郡今益州縣也故城今在縣東述遂自立為蜀王都成都述先居臨邛今徙成都二年冬更始遣中郎將歸德侯颯大司馬護軍陳遵使匈奴授單于漢舊制璽綬王莽篡漢易單于璽綬事見三十七卷始建國二年今復授之颯音立璽斯氏翻綬音受天鳳五年莽脅云當至長安莽敗云當亦死所餘親屬貴人從者今送還匈奴從才用翻謂遵颯曰匈奴本與漢為兄弟匈奴中亂師古曰言中間之時也讀如本字又音竹仲翻孝宣皇帝輔立呼韓邪單于故稱臣以尊漢今漢亦大亂為王莽所篡匈奴亦出兵擊莽空其邊境令天下騷動思漢莽卒以敗而漢復興亦我力也當復尊我遵與相牚拒卒子恤翻復扶又翻師古曰掌謂支拄也音人庚翻又丑庚翻單于終持此言二年赤眉樊崇等將兵入潁川分其衆為二部崇與逢安為一部東觀記曰逢音龐徐宣謝祿楊音為一部赤眉雖數戰勝數所角翻而疲弊厭兵皆日夜愁泣思欲東歸崇等計議慮衆東向必散不如西攻長安於是崇安自武關宣等從陸渾關賢曰武關在今商州上洛縣東文穎曰弘農析縣西百七十里有武關前書曰陸渾縣有關在今洛州伊闕縣西南地理志陸渾縣屬弘農郡師古曰渾音胡昆翻更始使王匡成丹與抗威將軍劉均等分據河東弘農以拒之二年蕭王將北徇燕趙度赤眉必破長安度徒洛翻又欲乘釁幷關中而未知所寄乃拜鄧禹為前將軍中分麾下精兵二萬人遣西入關令自選偏裨以下可與俱者時朱鮪李軼田立陳僑將兵號三十萬僑音喬與河南太守武勃共守洛陽鮑永田邑在幷州蕭王以河內險要富實河內北有太行之險南據河津之要賢曰非其人不可故難之鄧禹曰寇恂文武備足有牧人御衆之才非此子莫可使也乃拜恂河內太守行大將軍事考異曰袁紀鄧禹初見王於鄴即言欲據河內至是又云更始武陰王李軼據洛陽尚書謝躬據鄴各十餘萬衆王患焉將取河內以迫之謂鄧禹曰卿言吾之有河內猶高祖之有關中關中非蕭何誰能使一方晏然高祖無西顧之憂吳漢之能卿舉之矣復為吾舉蕭何禹曰寇恂才兼文武有御衆才非恂莫可安河內也按世祖既貳更始先得河內魏郡因欲守之以比關中非本心造謀即欲指取河內也今依范書為定昔高祖留蕭何關中吾今委公以河內當給足軍糧率厲士馬防遏他兵勿令北渡而已拜馮異為孟津將軍賢曰孟地名古今以為津在河內郡河陽縣南門以拒洛陽蕭王親送鄧禹至野王禹既西蕭王乃復引兵而北寇恂調糇糧復扶又翻調徒弔翻糇音侯乾食也治器械以供軍治直之翻軍雖遠征未嘗乏絕二年隗崔隗義謀叛歸天水隗囂恐幷及禍乃告之更始誅崔義以囂為御史大夫武帝元鼎三年置天水郡秦州記云郡前湖水冬夏無增減因以名焉二年梁王永據國起兵招諸郡豪桀沛人周建等並署為將帥攻下濟陰山陽沛楚淮陽汝南凡得二十八城將即亮翻帥所類翻濟子禮翻又遣使拜西防賊帥山陽佼彊為橫行將軍賢曰西防縣名故城在今宋州單父縣北傚音絞姓也周大夫原伯佼之後姓譜曰春秋絞國即佼也後改從人漢有佼彊杜佑曰佼音效余考兩漢志無西防縣琅邪賊帥張步為輔漢大將軍督青徐二州與之連兵遂專據東方二年巳人秦豐起兵於黎丘攻得巳宜城等十餘縣有衆萬人自號楚黎王按王莽之末秦豐已起兵矣通鑑書於上卷地皇二年巳宜城二縣屬南郡孟康曰巳音忌師古曰巳音其劉昭曰巳有黎丘城賢曰習鑿齒襄陽記曰秦豐黎丘鄉人黎丘楚地故稱楚黎王黎丘故城在今襄州率道縣北杜佑曰襄州宜城縣舊率道也水經註黎丘在中廬縣西北沔水逕其西二年汝南田戎攻陷夷陵賢曰夷陵縣名屬南郡有夷山故曰夷陵今峽州縣故城在今縣西北水經註吳改夷陵為西陵轉寇郡縣衆數萬人容肇祖標點顧頡剛聶崇岐覆校
