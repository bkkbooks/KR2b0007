body:
  text: 資治通鑑卷第二百二十端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註唐紀三十六肅宗文明武德大聖大宣孝皇帝中之下至德二載至德二載丁酉七五七至德二載九月丁丑希德以輕騎至城下挑戰千里帥百騎開門突出欲擒之會救至章十二行本至下有千里二字乙十一行本同孔本同張校同收騎退還橋壞墜塹中反為希德所擒為將者不可恃勇輕脫程千里欲擒蔡希德反為希德所擒恃勇輕脫之禍也騎奇寄翻挑徒了翻帥讀曰率吾不幸至此天也歸語諸將從才用翻語牛倨翻善為守備寧失帥不可失城帥所類翻希德攻城竟不克送千里於洛陽安慶緒以為特進囚之客省至德二載郭子儀以回紇兵精勸上益徵其兵以擊賊懷仁可汗遣其子葉護及將軍帝德等將精兵四千餘人來至鳳翔上引見葉護宴勞賜賚惟其所欲見賢遍翻勞力到翻丁亥元帥廣平王俶將朔方等軍及回紇西域之衆十五萬號二十萬發鳳翔俶見葉護約為兄弟葉護大喜謂俶為兄回紇至扶風郭子儀留宴三日葉護曰國家有急遠來相助何以食為宴畢即行日給其軍羊二百口牛二十頭米四十斛庚子諸軍俱發壬寅至長安西陳於香積寺北灃水之東此皆漢上林苑地也地說云豐水出鄠南豐谷北流逕漢龍臺觀東南與渭水會于短陰山程大昌曰香積寺呂圖在子午谷正北微西郭子儀收長安陳于寺北距灃水臨大川大川者沈水交水唐永安渠也蓋寺在灃水之東交水之西也呂圖云在鎬水發源之北則近昆明池矣子儀先敗于清渠至此則循南山出都城後據地勢以待之也陳讀曰陣下陳於其陳於陳陳乃賊陳同郭子儀為中軍王思禮為後軍賊衆十萬陳於其北李歸仁出挑戰官軍逐之逼於其陳賊軍齊進官軍卻為賊所乘軍中驚亂賊爭趣輜重重直用翻李嗣業曰今日不以身餌賊軍無孑遺矣乃肉袒執長刀立於陳前大呼奮擊呼火故翻當其刀者人馬俱碎殺數十人陳乃稍定於是嗣業帥前軍各執長刀如牆而進身先士卒先悉薦翻所向摧靡都知兵馬使王難得救其裨將王難得為鳳翔都知兵馬使時上在鳳翔蓋御營大將也皮垂鄣目難得自拔箭掣去其皮血流被面射而亦翻中竹仲翻掣昌列翻去羌呂翻被皮義翻前戰不已賊伏精騎於陳東欲襲官軍之後偵者知之騎奇寄翻偵丑鄭翻朔方左廂兵馬使僕固懷恩引回紇就擊之翦滅殆盡賊由是氣索索昔各翻盡也李嗣業又與回紇出賊陳後與大軍夾擊自午及酉斬首六萬級填溝塹死者甚衆賊遂大潰餘衆走入城迨夜囂聲不止塹七豔翻囂五羔翻僕固懷恩言於廣平王俶曰賊棄城走矣請以二百騎追之縛取安守忠李歸仁等俶昌六翻騎奇寄翻俶曰將軍戰亦疲矣且休息俟明旦圖之懷恩曰歸仁守忠賊之驍將驟勝而敗此天賜我也柰何縱之使復得衆驍堅堯翻將即亮翻復扶又翻下而復可復復修復為敢復同還為我患悔之無及戰尚神速何明旦也言何用俟明旦使還營還從宣翻又音如字懷恩固請往而復反一夕四五起遲明諜至遲直二翻諜達叶翻守忠歸仁與張通儒田乾真皆已遁矣廣平王若用僕固懷恩之言固不假新店之戰可以徑取東京矣癸卯大軍入西京初上欲速得京師與回紇約曰克城之日土地士庶歸唐金帛子女皆歸回紇至是葉護欲如約廣平王俶拜於葉護馬前曰今始得西京若遽俘掠則東京之人皆為賊固守紇下沒翻為于偽翻下當為同不可復取矣願至東京乃如約葉護驚躍下馬答拜跪捧王足夷禮以拜跪捧足為敬當為殿下徑往東京即與僕固懷恩引回紇西域之兵自城南過營於滻水之東過京城南歷安化門明德門啟夏門外遶京城東南角轉北歷延興春明通化三門之外至滻水滻水出藍田縣境之西北行過白鹿原西又北入于霸水滻音產皆泣曰廣平王真華夷之主上聞之喜曰朕不及也俶整衆入城百姓老幼夾道歡呼悲泣俶留長安鎮撫三日引大軍東出東出京城門取洛陽俶昌六翻少始照翻守式又翻甲辰捷書至鳳翔百寮入賀上涕泗交頤即日遣中使啖庭瑤入蜀奏上皇使疏吏翻啖徒敢翻姓也命左僕射裴冕入京師告郊廟及宣慰百姓上以駿馬召李泌於長安射寅謝翻泌毗必翻李泌時從軍在長安既至上曰朕已表請上皇東歸朕當還東宮復脩臣子之職泌曰表可追乎上曰已遠矣泌曰上皇不來矣上驚問故泌曰理勢自然上曰為之柰何泌曰今請更為㣥臣賀表言自馬嵬請留靈武勸進更古孟翻嵬五回翻請留勸進事並見二百十八卷至德元載及今成功聖上思戀晨昏請速還京以就孝養之意則可矣養羊尚翻上即使泌草表上讀之泣曰朕始以至誠願歸萬機今聞先生之言乃寤其失立命中使奉表入蜀因就泌飲酒同榻而寢而李輔國請取契鑰付泌泌請使輔國掌之上許之泌掌契鑰見二百十八卷上年九月今付輔國宮禁之權盡歸之矣為輔國專亶張本泌曰臣今報德足矣復為閒人何樂如之上曰朕與先生累年同憂患今方相同娛樂樂音洛柰何遽欲去乎泌曰臣有五不可留願陛下聽臣去免臣於死上曰何謂也對曰臣遇陛下太早陛下任臣太重寵臣太深臣功太高迹太奇此其所以不可留也上曰且眠矣異日議之對曰陛下今就臣榻臥猶不得請況異日香案之前乎唐制凡朝日殿上設黼扆躡席熏爐香案皇帝升御座宰執當香案前奏事是殺臣也上曰不意卿疑朕如此豈有如朕而辦殺卿邪是直以朕為句踐也邪音耶范蠡既與越王句踐報吳之恥蠡乃扁舟五湖遺大夫文種書以為句踐長頸鳥喙可與同患難不可與同安樂文種見書遂稱疾句踐賜文種死句音鉤對曰陛下不辦殺臣故臣求歸若其既辦臣安敢復言復扶又翻且殺臣者非陛下也乃五不可也陛下曏日待臣如此臣於事猶有不敢言者況天下既安臣敢言乎上良久曰卿以朕不從卿北伐之謀乎謂不從使建寧王自媯檀取范陽之策也肅宗以意言之非也所不敢言者乃建寧耳上曰建寧朕之愛子性英果艱難時有功謂馬嵬勸留及北赴靈武血戰以衞上也事見二百十八卷元載六月但因此為小人所教欲害其兄圖繼嗣朕以社稷大計不得已而除之事見上卷本年正月嗣祥吏翻對曰若有此心廣平當怨之廣平每與臣言其冤輒流涕嗚咽臣今必辭陛下去始敢言之耳上曰渠嘗夜捫廣平意欲加害對曰此皆出讒人之口豈有建寧之孝友聰明肯為此乎且陛下昔欲用建寧為元帥臣請用廣平事見二百十八卷元載九月帥所類翻當深憾於臣而以臣為忠益相親善陛下以此可察其心矣上乃泣下曰先生言是也既往不咎引論語孔子之言泌曰臣所以言之者非咎既往乃欲使陛下慎將來耳昔天后有四子長曰太子弘天后方圖稱制惡其聰明酖殺之見二百二卷高宗上元二年賢內憂懼作黃臺瓜辭冀以感悟天后天后不聽賢卒死於黔中賢廢見二百二卷永隆元年死見二百三卷武后光宅元年卒子恤翻黔音禽瓜熟子離離一摘使瓜好再摘使瓜稀三摘猶為可四摘抱蔓歸今陛下已一摘矣慎無再摘上愕然曰安有是哉卿錄是辭朕當書紳對曰陛下但識之於心識職吏翻記也何必形於外也是時廣平王有大功良娣忌之潛搆流言故泌言及之章十二行本之下有泌復固請歸山上曰俟將發此議之十四字乙十一行本同退齋校同張校同云無註本亦無李泌歷事肅代德三朝皆能言人所難言奇士也至德二載郭子儀引蕃漢兵追賊至潼關斬首五千級克華陰弘農二郡關東獻俘百餘人敕皆斬之監察御史李勉言於上曰今元惡未除為賊所汚者半天下汚烏故翻聞陛下龍興咸思洗心以承聖化今悉誅之是驅之使從賊也上遽使赦之至德二載冬十月丁未談章十二行本談作啖乙十一行本同孔本同庭瑤至蜀至德二載壬子興平軍奏破賊於武關克上洛郡時王難得領興平軍至德二載吐蕃陷西平西平郡鄯州至德二載尹子奇久圍睢陽城中食盡議棄城東走張巡許遠謀以為睢陽江淮之保障若棄之去賊必乘勝長驅是無江淮也考異曰唐人皆以全江淮為巡遠功按睢陽雖當江淮之路城既被圍賊若欲取江淮繞出其外睢陽豈能障之哉蓋巡善用兵賊畏巡為後患不滅巡則不敢越過其南耳走必不達古者戰國諸侯尚相救恤謂春秋列國同盟有急則相救恤也㣥帥謂張鎬尚衡許叔冀等帥所類翻茶紙既盡遂食馬馬盡羅雀掘鼠雀鼠又盡巡出愛妾殺以食士食祥吏翻遠亦殺其奴然後括城中婦人食之章十二行本之下有既盡二字乙十一行本同孔本同退齋校同繼以男子老弱人知必死莫有叛者所餘纔四百人癸丑賊登城將士病不能戰巡西向再拜曰臣力竭矣不能全城生既無以報陛下死當為厲鬼以殺賊鬼無所歸者為厲巡遠俱被執尹子奇問巡曰聞君每戰眥裂齒碎何也眥疾智翻又才詣翻目眥也巡曰吾志吞逆賊但力不能耳子奇以刀抉其口視之抉一決翻所餘纔三四子奇義其所為欲活之其徒曰彼守節者也終不為用且得士心存之將為後患乃幷南霽雲雷萬春等三十六人皆斬之考異曰新傳曰虢王巨之走臨淮巡有妹嫁陸氏遮巨勸勿行不納賜百縑弗受為巡補縫行間軍中號陸家姑先巡被害按巨在彭城若走臨淮陸姊在睢陽城何以得遮之今不取顏色不亂揚揚如常生致許遠於洛陽巡初守睢陽時卒僅萬人城中居人亦且數萬巡一見問姓名其後無不識者前後大小戰凡四百餘殺賊卒十二萬人巡行兵不依古法教戰陳令本將各以其意教之本將謂本部之將陳讀曰陣巡曰今與胡虜戰雲合鳥散變態不恆數步之間勢有同異臨機應猝在於呼吸之間而動詢大將事不相及非知兵之變者也故吾使兵識將意將識士情投之而往如手之使指兵將相習人自為戰不亦可乎自興兵器械甲仗皆取之於敵未嘗自脩每戰將士或退散巡立於戰所謂將士曰我不離此離力智翻汝為我還決之將士莫敢不還死戰卒破敵為于偽翻卒子恤翻又推誠待人無所疑隱臨敵應變出奇無窮號令明賞罰信與衆共甘苦寒暑故下爭致死力張鎬聞睢陽圍急倍道亟進張鎬代賀蘭進明見上卷八月按新書方鎮表浙東浙西明年方置節度使時崔渙在浙東李希言在浙西皆非節度使淮南則李成式北海尚為賊將能元皓所據然去年已置北海節度使是雖未復北海而已置北海帥矣使共救之曉素傲很不受鎬命比鎬至比必利翻及也睢陽城已陷三日鎬召曉杖殺之考異曰舊傳作豪州刺史新傳作濠州刺史統紀作亳州刺史按濠州在淮南去睢陽遠亳州與睢陽接境必亳州也今從統紀余按通鑑改統紀之亳州為譙郡以此時未復郡為州也讀者宜知之至德二載張通儒等收餘衆走保陝自長安東走保陝使其御史大夫嚴莊將之就通儒以拒官軍幷舊兵步騎猶十五萬舊兵謂張通儒等所領自西京東走之兵己未廣平王至曲沃此非春秋晉莊叔所封之曲沃按其地在弘農靈寶二縣之間水經註弘農縣東十三里有好陽亭又東有曲沃城因駐軍嶺北旁步浪翻郭子儀等與賊遇於新店據舊書新店在陝城西子儀等初與之戰不利賊逐之下山回紇自南山襲其背於黃埃中發十餘矢賊驚顧曰回紇至矣遂潰官軍與回紇夾擊之賊大敗僵尸蔽野嚴莊張通儒等棄陝東走廣平王俶郭子儀入陝城僕固懷恩等分道追之嚴莊先入洛陽告安慶緒庚申夜慶緒帥其黨自苑門出東都苑門也考異曰實錄無新店戰日但云子儀與嗣業等至新店遇賊大破之逐北五十餘里人馬相枕藉器械戈甲自陝至洛城委棄道路無空地庚申慶緒走其夜自東都苑門帥其衆黨奔河北壬戌元帥廣平王與子儀收陝郡汾陽家傳九月安慶緒自洛疾使諸將至陝兼收敗卒猶十五萬十月四日於陝西依山而陳彼則憑高下擊此乃進軍上衝賊屹立不動公使偽退引令下山使回紇驀澗走險以襲其背賊乃敗績斬九萬級擒一萬人汾陽家傳十月四日破賊於陝西八日收洛陽年代記十月己未破賊于新店辛酉慶緒聞軍敗率其黨投相州舊紀庚申慶緒奔河北壬戌廣平王入東京新紀戊申敗賊新店克陝郡壬子復東京按陝洛之間幾三百里汾陽傳新紀太早實錄壬戌收陝郡太晚今從年代記幸蜀記許遠死於偃師考異曰實錄舊傳皆曰尹子奇執送洛陽與哥舒翰程千里俱囚於客省及安慶緒敗渡河北走使嚴莊皆害之張中丞傳相里造誄曰唐故御史中丞張許二君以守城睢陽陷張君遇害許君為羯賊所擒求死不得降逼至偃師縣亦被兵焉今從之壬戌廣平王俶入東京回紇意猶未厭俶患之父老請率羅錦萬匹以賂回紇回紇乃止至德二載成都使還此還者啖庭瑤也還音旋當與我劍南一道自奉不復來矣復扶又翻下嗣復同上憂懼不知所為章十二行本為下有數日二字乙十一行本同孔本同張校同後使者至此奉㣥臣賀表中使繼還也上皇初得上請歸東宮表彷徨不能食欲不歸及㣥臣表至乃大喜命食作樂下誥定行日定東行歸京之日也皆卿力也泌求歸山不已上固留之不能得乃聽歸衡山衡山在衡陽郡衡山縣西三十里南嶽也漢武帝以霍山為南嶽隋文帝以衡山為南嶽按泌傳泌願隱衡山詔聽之為于偽翻給三品料至德二載癸亥上發鳳翔遣太子太師韋見素入蜀奉迎上皇至德二載乙丑郭子儀遣左兵馬使張用濟右武鋒使渾釋之將兵取河陽及河內嚴莊來降陳留人殺尹子奇舉郡降田承嗣圍來瑱於潁川亦遣使來降郭子儀應之緩承嗣復叛與武令珣皆走河北走音奏考異曰舊魯炅傳云炅保南陽賊使武令珣攻之令珣死又令田承嗣攻之下又云王師收兩京承嗣令珣奔河北唐曆慶緒據鄴武令珣自唐鄧至炅傳云武令珣死誤也制以瑱為河章十二行本河作淮乙十一行本同孔本同南節度使至德二載丙寅上至望賢宮雍錄望賢宮在咸陽縣東數里丁卯上入西京百姓出國門奉迎二十里不絕舞躍呼萬歲有泣者上入居大明宮高宗咸亨元年改蓬萊宮為大明宮即東內含元殿東內前殿也當丹鳳門內環之以兵環音宦使百官臨視之太廟為賊所焚上素服向廟哭三日是日上皇發蜀郡至德二載安慶緒走保鄴郡改鄴郡為安成嚴安成改成安府改元天成考異曰唐曆曰改元天和薊門紀亂曰改元至成與實錄年號不同紀年通譜兩存之今從實錄步卒不過千人諸將阿史那承慶等散投常山趙郡范陽旬日間蔡希德自上黨田承嗣自潁川武令珣自南陽各帥所部兵歸之又召募河北諸郡人衆至六萬軍聲復振復扶又翻至德二載廣平王俶之入東京也百官受安祿山父子官者陳希烈等三百餘人皆素服悲泣請罪俶以上旨釋之尋勒赴西京己巳崔器令詣朝堂請罪此東內之朝堂也在含元殿左右左曰東朝堂右曰西朝堂朝直遙翻然後收繫大理京兆獄其府縣所由祗承人等受賊驅使追捕者皆收繫之所由人有所監典祗承人聽指呼給使令而已初汲郡甄濟有操行隱居青巖山五代志汲郡隋興縣有蒼巖山隋興縣唐時當省入汲縣甄之人翻操七到翻行下孟翻奏掌書記此天寶間事詐得風疾舁歸家祿山反使蔡希德引行刑者二人封刀召之濟引首待刀希德以實病白祿山後安慶緒亦使人強舁至東京強其兩翻月餘會廣平王俶平東京濟起詣軍門上謁上時掌翻俶遣詣京師上命館之於三司時令三司按受賊官爵者因館濟於三司署舍使受賊官爵者羅拜之館音貫以愧受賊官爵者之心國子司業蘇源明稱病不受祿山官上擢為考功郎中知制誥壬申上御丹鳳門下制士庶受賊官祿為賊用者令三司條件聞奏其因戰被虜或所居密近因與賊往來者皆聽自首除罪其子女為賊所汚者勿問東內端門曰丹鳳門樓曰丹鳳樓首手又翻汚烏故翻至德二載癸酉回紇葉護自東京還上命百官迎之於長樂驛長樂驛在滻東長樂陂自含元殿入宣政門為宣政殿東內之中朝也軍中馬少請留其兵於沙苑沙苑在馮翊渭曲李吉甫郡國圖沙苑一名沙阜在同州馮翊縣南十二里東西八十里南北三十里余靖曰唐沙苑監今之同州少詩沼翻還為陛下掃除范陽餘孼為于偽翻上賜而遣之至德二載十一月廣平王俶郭子儀來自東京上勞子儀曰吾之家國由卿再造勞力到翻至德二載張鎬帥魯炅來瑱吳王祗李嗣業李奐五節度徇河南河東郡縣皆下之惟能元皓據北海高秀巖據大同未下能奴代翻姓也北海屬河南道大同屬河東道至德二載己丑以回紇葉護為司空忠義王歲遺回紇絹二萬匹遺于季翻使就朔方軍受之至德二載以嚴莊為司農卿至德二載上之在彭原也更以栗為九廟主禮虞主用桑練主用栗作栗主則埋桑主上皇幸蜀九廟之主委之賊手故彭原更以栗為之庚寅朝享於長樂殿長樂殿考雍錄及呂圖皆無之以下文上皇入大明宮御含元殿見百官次詣長樂殿謝九廟主則是殿亦在大明宮中也大明宮圖有長樂門則長樂殿蓋在長樂門內至德二載丙申上皇至鳳翔從兵六百餘人從才用翻上皇命悉以甲兵輸郡庫上發精騎三千奉迎十二月丙午上皇至咸陽上備法駕迎於望賢宮上皇在宮南樓上釋黃袍著紫袍望樓下馬趨進拜舞於樓下上皇降樓撫上而泣上捧上皇足嗚咽不自勝上皇索黃袍自為上著之著陟略翻勝音升索山客翻為于偽翻上伏地頓首固辭上皇曰天數人心皆歸於汝使朕得保養餘齒汝之孝也上不得已受之父老在仗外歡呼且拜上令開仗車駕所在衞士立仗曰臣等今日復睹二聖相見死無恨矣復扶又翻上皇不肯居正殿此行宮正殿也此天子之位也上固請自扶上皇登殿尚食進食上品嘗而薦之品品必嘗而後進丁未將發行宮上親為上皇習馬而進之上皇上皇章十二行本上皇二字不重乙十一行本同張校同熊校同上馬上親執鞚行數步為于偽翻鞚苦貢翻考異曰幸蜀記云執轡鞚出宮門上皇令左右扶上馬今從實錄上皇止之上乘馬前引不敢當馳道上皇謂左右曰吾為天子五十年未為貴今為天子父乃貴耳左右皆呼萬歲玄宗失國得反宜痛自刻責以謝天下乃以為天子父之貴誇左右是全無心腸矣開遠門長安城西面北來第一門慰撫百官乃詣長樂殿謝九廟主慟哭久之樂音洛即日幸興慶宮遂居之上累表請避位還東宮上皇不許至德二載辛亥以禮部尚書李峴兵部侍郎呂諲為詳理使因按獄特置此官峴以殿中侍御史李栖筠為詳理判官栖筠多務平恕故人皆怨諲器之刻深而峴獨得美譽至德二載戊午上御丹鳳樓赦天下惟與安祿山同反及李林甫王鉷楊國忠子孫不在免例立廣平王俶為楚王加郭子儀司徒李光弼司空鉷戶公翻俶昌六翻考異曰實錄光弼舊守司徒按舊傳光弼檢校司徒耳實錄誤也自餘蜀郡靈武扈從立功之臣從才用翻皆進階賜爵加食邑有差李憕盧奕顏杲卿袁履謙許遠張巡張介然蔣清龐堅等皆加贈官差初加翻憕持陵翻李憕盧奕蔣清以守洛死顏杲卿袁履謙以守常山死許遠張巡以守睢陽死張介然以守滎陽死龐堅以守潁川死其子孫戰亡之家給復二載復方目翻除其賦役也載祖亥翻郡縣來載租庸三分蠲一近所改郡名官名一依故事天寶元年改兩省長官為左右相州為郡刺史為太守十一載又改吏部為文部兵部為武部刑部為憲部今皆復舊蠲圭淵翻鳳翔為西京西京為中京以長安在洛陽鳳翔蜀郡太原之中故為中京立皇子南陽王係為趙王新城王僅為彭王潁川王僴為兗王東陽王侹為涇王僙為襄王倕為王偲為召王佋為興王侗為定王娣大計翻僴戶簡翻侹他頂翻僙戶剛翻召讀曰邵佋時昭翻侗吐公翻考異曰實錄係為傑僙為傜倕為傀今從唐曆統紀新舊紀傳年代記議者或罪張巡以守睢陽不去與其食人曷若全人其友人李翰為之作傳表上之睢音雖為于偽翻傳直戀翻上時掌翻下獻上同以為巡以寡擊衆以弱制強保江淮以待陛下之師師至而巡死謂張鎬之師至而睢陽之城已陷三日也而議者或罪巡以食人愚巡以守死以巡食人為巡罪守死為巡愚錄瑕棄用張用作功臣竊痛之巡所以固守者以待諸軍之救救不至而食盡食既盡而及人乖其素志設使巡守城之初已有食人之心損數百之衆以全天下臣猶曰功過相掩況非其素志乎今巡死大難難乃旦翻不睹休明唯有令名是其榮祿若不時紀錄恐遠而不傳使巡生死不遇誠可悲焉臣敢撰傳一卷獻上乞編列史官衆議由是始息是後赦令無不及李憕等而程千里獨以生執賊庭不沾褒贈史言唐褒忠之典有遺恨至德二載甲子上皇御宣政殿以傳國寶授上上始涕泣而受之上不敢受傳國寶見二百一十八卷元載九月至德二載安慶緒之北走也謂自東京北走渡河所過俘掠人物無遺史思明厚為之備且遣使逆招之范陽境曳落河六州胡皆降同羅不從思明縱兵擊之同羅大敗悉奪其所掠餘衆走歸其國慶緒忌思明之強遣阿史那承慶安守忠往徵兵因密圖之判官耿仁智耿仁智蓋為范陽節度判官大夫崇重人莫敢言仁智願一言而死思明曰何也仁智曰大夫所以盡力於安氏者迫於凶威耳今唐室中興天子仁聖大夫誠帥所部歸之帥讀曰率此轉禍為福之計也裨將烏承玼亦說思明曰今唐室再造慶緒葉上露耳朝日一出葉上之露即晞故以為諭說式芮翻若歸款朝廷以自湔洗易於反掌耳易以豉翻思明以為然承慶守忠以五千勁騎自隨考異曰舊傳云三千騎今從實錄思明悉衆數萬逆之相距一里所使人謂承慶等曰相公及王遠至將士不勝其喜勝音升然邊兵怯懦懼相公之衆不敢進願弛弓以安之承慶等從之思明引承慶入內廳樂飲樂音洛別遣人收其甲兵諸郡兵皆給糧縱遣之願留者厚賜分隸諸營明日囚承慶等遣其將竇子昂奉表以所部十三郡及兵八萬來降十三郡范陽北平媯川密雲漁陽柳城文安河間上谷博陵勃海饒陽常山乙丑子昂至京師考異曰河洛春秋乾元元年四月烏承恩受命入幽州陳禍福思明乃有表今從實錄實錄曰明日遂拘承慶斬守忠之首以徇舊傳亦曰遂拘承慶斬守忠李立節之首以徇新烏承玼傳曰思明斬承慶按實錄明年二月承慶守忠遣人齎表狀歸順舊郭子儀傳明年七月破賊河上擒安守忠然則此際未死也蓋二人既被拘則降於思明復為之用耳以思明為歸義王范陽節度使考異曰河洛春秋及舊傳皆云河北節度使按安祿山為范陽節度使兼河北采訪使思明蓋襲祿山舊官耳今從實錄遣內侍李思敬與烏承恩往宣慰句斷將即亮翻先是慶緒以張忠志為常山太守先悉薦翻思明召忠志還范陽以其將薛萼攝恆州刺史開井陘路開太原兵自井陘出常山之路降之命其子朝義將兵五千人攝冀州刺史以其將令狐彰為博州刺史烏承恩所至宣布詔旨滄瀛安深德棣等州皆降後魏置安州治方城唐檀州即其地也唐無安州在河北或者安史以莫州文安郡為安州歟謂安慶緒據鄴也因史思明降史言一時之事至德二載上皇加上尊號曰光天文武大聖孝感皇帝至德二載郭子儀還東都經營河北至德二載崔器呂諲上言諸陷賊官背國從偽準律皆應處死上時掌翻背蒲妹翻處昌呂翻上欲從之李峴以為賊陷兩京天子南巡人自逃生此屬皆陛下親戚或勳舊子孫今一概以叛法處死恐乖仁恕之道且河北未平㣥臣陷賊者尚多若寬之足開自新之路若盡誅是堅其附賊之心也書曰殲厥渠魁脅從罔理書胤征之辭李峴避唐諱改治為理不達大體惟陛下圖之爭之累日上從峴議以六等定罪重者刑之於市次賜自盡次重杖一百次三等流貶壬申斬達奚珣等十八人於城西南獨柳樹下劉昫曰獨柳樹在長安子城西南隅應受杖者於京兆府門上欲免張均張垍死上皇曰均垍事賊皆任權要均仍為賊毀吾家事為于偽翻下垍為同罪不可赦上叩頭再拜曰臣非張說父子無有今日上皇之為太子也太平公主忌之東宮左右持兩端纖悉必聞於主元獻楊后方娠上皇不自安密語侍讀張說曰用事者不欲吾多子柰何命說挾劑而入上皇於曲室自煮之夢若有介而戈者環鼎三而三煮盡覆以告說說曰天命也乃止遂生帝及帝在東宮李林甫動搖者數矣均垍保護得免使死者有知何面目見說於九泉因俯伏流涕上皇命左右扶上起曰張垍為汝長流嶺表張均必不可活汝更勿救上泣而從命考異曰柳珵常侍言旨云太上皇召肅宗謂曰張均弟兄皆與逆賊作權要官就中張均更與賊毀阿奴三哥家事雖犬彘之不若也其罪無赦肅宗下殿叩頭再拜曰臣比在東宮彼人誣譖三度合死皆張說保護得全首領以至今日說兩男一度合死臣不能力爭儻死者有知臣將何面目見張說於地下嗚咽俯伏太上皇命左右曰扶皇帝起乃曰與阿奴處置張垍宜長流遠惡處張均宜棄市阿奴更不要苦救這賊也肅宗掩泣奉詔按肅宗為李林甫所危時說已死乃得均垍之力均垍以說遺言盡心於肅宗耳今略取其意安祿山所署河南尹張萬頃獨以在賊中能保庇百姓不坐頃之有自賊中來者言唐㣥臣從安慶緒在鄴者聞廣平王赦陳希烈等皆自悼恨失身賊庭及聞希烈等誅乃止上甚悔之臣光曰為人臣者策名委質有死無貳希烈等或貴為卿相或親連肺腑於承平之日無一言以規人主之失救社稷之危迎合苟容以竊富貴及四海橫潰乘輿播越偷生苟免顧戀妻子媚賊稱臣為之陳力為于偽翻此乃屠酤之所羞犬馬之不如儻各全其首領復其官爵是諂諛之臣無往而不得計也彼顏杲卿張巡之徒世治則擯斥外方沈抑下僚治直吏翻沈持林翻世亂則委棄孤城齏粉寇手齏牋西翻何為善者之不幸而為惡者之幸朝廷待忠義之薄而保姦邪之厚邪至於微賤之臣巡徼之隸徼吉弔翻謀議不預號令不及朝聞親征之詔夕失警蹕之所事見二百十八卷至德元載不亦難哉復扶又翻從才用翻六等議刑斯亦可矣又何悔焉至德二載故韋氏既廢為尼居禁中是歲卒韋廢見二百十五卷天寶六載至德二載置左右神武軍取元從子弟充元從子弟謂從帝馬嵬北行及自靈武還京師者從才用翻總謂之北牙六軍左右羽林左右龍武左右神武謂之北牙六軍分左右廂號曰英武軍騎奇寄翻至德二載升河中防禦使為節度領蒲絳等七州至德元載置河中防禦守捉蒲關使今升為節度領蒲絳隰慈晉虢同七州治蒲州考異曰諸地理書皆云某郡乾元元年復為某州不見在何月日是歲十二月戊午赦云近日所改百官額及郡名官名一切依故事蓋此即復以郡為州之文也比頒下四方已涉明年矣故皆云乾元元年也東川領梓遂等十二州東川領梓遂綿劍龍閬普陵瀘榮資簡十二州治梓州領荊澧等五州夔峽節度領夔峽等五州荊南節度本領十州今分兩鎮荊澧兼領朗郢復共五州夔峽兼領涪忠萬共五州更工衡翻乾元元年戊戌七五八是年二月改元至德二載春正月戊寅上皇御宣政殿授冊加上尊號考異曰實錄戊寅玄宗御宣政殿授上傳國寶禮畢冊上加尊號上上言讓曰伏奉聖旨賜臣典冊曰光天文武大聖孝感皇帝授傳國寶符受命寶符各一按去年十二月癸亥上已受國璽告太清宮甲子玄宗御宣政殿授上傳國璽於殿下涕泣拜受今又云授寶事似複重唐曆統紀年代記舊紀皆云去年十二月授傳國璽此年正月戊寅冊尊號今從之大聖之號上皇不許上尊上皇曰太上至道聖皇天帝寇逆未平九廟未復而父子之間迭加徽稱此何為者也先是官軍既克京城先悉薦翻宗廟之器及府庫資財多散在民間遣使檢括頗有煩擾乙酉敕盡停之乃命京兆尹李峴安撫坊市至德二載二月癸卯朔以殿中監李輔國兼太僕卿輔國依附張淑判元帥府行軍司馬勢傾朝野為輔國得權與淑交惡張本朝直遙翻至德二載安慶緒所署北海節度使能元皓舉所部來降能奴代翻降戶江翻以為鴻臚卿充河北招討使至德二載丁未上御明鳳門唐會要曰至德三載改丹鳳門曰明鳳門通化門為達禮門安上門為先天門凡坊名有安者悉改之尋卻如舊改元改元乾元復以載為年改年為載自上皇天寶三載始復扶又翻至德二載庚午以安東副大都護王玄志為營州刺史充平盧節度使至德二載三月甲戌徙楚王俶為成王至德二載戊寅立張淑為皇后至德二載鎮西北庭行營節度使李嗣業屯河內行營節度使始此癸巳北庭兵馬使王惟良謀作亂嗣業與裨將荔非元禮討誅之荔非虜複姓姓譜荔非西羌種隋有荔非雄涇州人至德二載安慶緒之北走也其平原太守王暕暕古限翻清河太守宇文寬皆殺其使者來降慶緒使其將蔡希德安太清攻拔之生擒以歸於鄴市凡有謀歸者古瓦翻歸字下當有國字誅及種族胡人種誅之華人族誅之種章勇翻連坐死者甚衆又與其㣥臣歃血盟於鄴南而人心益離慶緒聞李嗣業在河內夏四月與蔡希德崔乾祐將步騎二萬涉沁水攻之沁水出沁州沁源縣東南出山而東流過河內縣北慶緒自鄴攻河內須渡沁水沁七鴆翻還從宣翻又如字至德二載癸卯以太子少師虢王巨為河南尹充東京留守至德二載辛卯辛卯當作辛亥傳寫誤也新書肅宗紀作四月辛亥此又逸四月二字奉栗主自長樂殿入太廟甲寅上享太廟遂祀昊天上帝乙卯御明鳳門赦天下至德二載五月壬午制停采訪使改黜陟使為觀察使觀察使始此貞觀初遣大使十人巡省天下諸州水旱則有巡察安撫存撫之名神龍二年以五品以上二十人為十道巡察使按舉州縣再周而代景雲二年置都督二十四人察刺史以下善惡當時以為權重難制罷之置十道按察使開元二年曰十道按察采訪處置使四年罷八年復置按察使秋冬巡視州縣二十年曰採訪處置使分十五道天寶末又兼黜陟使是年改曰觀察處置使至德二載張鎬性簡澹不事中要中要謂中人居權要者如李輔國之類上言思明凶險因亂竊位力強則衆附勢奪則人離彼雖人面心如野獸難以德懷願勿假以威權又言滑州防禦使許叔冀狡猾多詐臨難必變請徵入宿衞思明叔冀後皆如鎬言滑州靈昌郡使疏吏翻難乃旦翻張以作已寵納思明以當作已唐人多通用以已二字但於此作以文意不通皆言思明叔冀忠懇可信思明在范陽滑州治白馬縣漢古縣也許叔冀屯焉戊子罷為荊州防禦使以禮部尚書崔光遠為河南節度使尚辰羊翻至德二載張后生興王佋佋音韶纔數歲欲以為嗣上疑未決從容謂考功郎中知制誥李揆曰嗣祥吏翻從千容翻成王長且有功長知兩翻朕欲立為太子卿意何如揆再拜賀曰此社稷之福臣不勝大慶勝音升上喜曰朕意決矣庚寅立成王俶為皇太子揆玄道之玄孫也俶昌六翻李玄道武德中為天策府學士至德二載乙未以崔圓為太子少師李麟為少傅皆罷政事上頗好鬼神少始照翻好呼到翻太常少卿王璵璵音余專依鬼神以求媚每議禮儀多雜以巫祝俚俗上悅之以璵為中書侍郎同平章事俚音里考異曰舊傳云三年七月今從實錄至德二載贈故常山太守顏杲卿太子太保諡曰忠節以其子威明為太僕丞杲卿之死也顏杲卿死事見二百十七卷至德元載守式又翻竟無褒贈上在鳳翔顏真卿為御史大夫泣訴於上上乃出通幽為普安太守劍州普安郡上皇杖殺通幽杲卿子泉明為王承業所留因寓居壽陽晉置壽陽縣屬樂平郡後魏廢樂平郡以壽陽縣屬太原郡九域志在太原府東一百八十里然本朝太原府已移治陽曲宋白曰壽陽縣本漢榆次縣地後魏風土記晉末山戎內侵太原之民來向山東戎即居之真君十年出徙壽陽之戶於大陵城南置壽陽縣隋開皇改壽陽為文水縣又於壽陽故城置壽陽縣即今縣是也去年史思明攻太原因虜泉明送於范陽會安慶緒初立有赦得免思明降乃得歸求其父尸於東京得之遂幷袁履謙尸棺斂以歸棺古玩翻斂力贍翻杲卿姊妹女及泉明之子皆流落河北真卿時為蒲州刺史使泉明往求之泉明號泣求訪哀感路人久乃得之泉明詣親故乞索號戶高翻索山客翻隨所得多少贖之先姑姊妹而後其子姑女為賊所掠泉明有錢二百緡欲贖己女閔其姑愁悴先悉薦翻後戶遘翻悴秦醉翻先贖姑女比更得錢比必例翻及也求其女已失所在遇㣥從姊妹從才用翻及父時將吏袁履謙等妻子流落者皆與之歸凡五十餘家三百餘口均減資糧資糧則均分之其或有不足則減常數而均之至蒲州真卿悉加贍給久之隨其所適而資送之袁履謙妻疑履謙衣衾儉薄發棺視之與杲卿無異乃始慚服顏杲卿之忠節固照映千古而其子之孝義亦非人所及也至德二載六月己酉立太一壇於南郊之東漢武帝始祀太一至唐復祀之蓋參用九宮貴神之說項安世曰中宮天極一星其神太一列宿之中最尊所臨之方則嘉應洊臻漢武帝始祠之上嘗不豫卜云山川為祟祟雖遂翻神禍也璵請遣中使與女巫乘驛分禱天下名山大川巫恃勢所過煩擾州縣干求受贓黃州有巫盛年美色從無賴少年數十為蠹尤甚使疏吏翻少始照翻至黃州宿於驛舍刺史左震晨至驛門扃鎖不可啟扃古營翻鎖蘇果翻震怒破鎖而入曳巫於階下斬之所從少年悉斃之籍其贓數十萬具以狀聞且請以其贓代貧民租遣中使還京師上無以罪也至德二載以開府儀同三司李嗣業為懷州刺史充鎮西北庭行營節度使李嗣業以鎮西北庭兵屯懷州就用為刺史征調以給軍嗣祥吏翻至德二載山人韓穎改造新曆丁巳初行穎曆時韓穎上言大衍曆或誤帝疑之以穎直司天臺損益其術每節增二日更名至德曆至德二載戊午敕兩京陷賊官三司推究未畢者皆釋之貶降者續處分去年十二月始命三司推究陷賊官處昌呂翻分扶問翻至德二載太子少師房琯既失職謂罷相也多稱疾不朝怏於兩翻朝直遙翻而賓客朝夕盈門其黨為之揚言於朝云琯有文武才宜大用上聞而惡之下制數琯罪貶豳州刺史為于偽翻惡烏路翻數所具翻又所主翻前祭酒劉秩貶閬州刺史京兆尹嚴武貶巴州刺史皆琯黨也閬州閬中郡巴州清化郡漢巴郡宕渠縣地閬音浪至德二載初史思明以列將事平盧軍使烏知義考異曰舊傳知義為節度使按安祿山始為平盧節度使舊傳誤也知義子承恩為信都太守以郡降思明事見上卷至德元載及安慶緒敗承恩勸思明降唐去年十二月事而承恩為思明所親信陰使圖之又勸上以承恩為范陽節度副使賜阿史那承慶鐵券令共圖思明上從之承恩多以私財募部曲又數衣婦人服詣諸將營說誘之數所角翻衣於既翻說輸芮翻誘音酉諸將以白思明思明疑未察會承恩入京師上使內侍李思敬與之俱至范陽宣慰承恩既宣旨思明留承恩館於府中按經典釋文館古玩翻帷其床伏二人於床下承恩少子在范陽思明使省其父少詩照翻省悉景翻思明雖伏二人以察承恩然不使其子與父共處則謀無自而露姦雄之智數固非人所及也夜中承恩密謂其子曰吾受命除此逆胡當以吾為節度使二人於床下大呼而出呼火故翻思明乃執承恩索其裝囊凡行者之裝盛以囊橐故曰裝囊有底曰囊無底曰橐索山客翻牒云承慶事成則付鐵券不然不可付也又得簿書數百紙皆先從思明反者將士名烏承恩持鐵券入不測之虜使阿史那承慶之事不成承恩其能奉鐵券以還天子乎使思明果授首則宜宥其同惡而先籍其姓名果能悉誅之乎余謂李光弼之明智必不為此蓋思明因承恩言偽為此牒抗表以罪狀光弼又偽為簿書籍將士姓名以激怒之使與己同反而無他志我何負於汝而為此承恩謝曰死罪此皆李光弼之謀也思明乃集將佐吏民西向大哭曰臣以十三萬衆降朝廷何負陛下而欲殺臣遂榜殺承恩父子榜音彭考異曰唐曆舊傳皆云四月殺承恩今據河洛春秋四月始為節度副使六月死連坐死者二百餘人承恩弟承玼走免玼音此又且禮翻思明囚思敬表上其狀上時掌翻上遣中使慰諭思明曰此非朝廷與光弼之意皆承恩所為殺之甚善會三司議陷賊官罪狀至范陽思明謂諸將曰陳希烈輩皆朝廷大臣上皇自棄之幸蜀今猶不免於死況吾屬本從安祿山反乎思明又以此激怒其將士思明從之命判官耿仁智與其僚張不矜為表云陛下不為臣誅光弼不為于偽翻臣當自引兵就太原誅之不矜草表以示思明及將入函凡表皆函封寫表者以白思明思明命執二人斬之仁智事思明久思明憐欲活之復召入去羌呂翻復扶又翻謂曰我任使汝垂三十年今日非我負汝仁智大呼曰人生會有一死得盡忠義死之善者也今從大夫反不過延歲月豈若速死之愈乎思明怒亂捶之腦流于地史言耿仁智去逆從順以死全節呼火故翻烏承玼奔太原李光弼表為昌化郡王充石嶺軍使石嶺軍在忻州秀容縣至德二載秋七月丙戌初鑄當十大錢文曰乾元重寶乾元錢徑一寸每緡重十斤與開元通寶並行至德二載丁亥冊命回紇可汗曰英武威遠毗伽闕可汗以上幼女寧國公主妻之妻七細翻以殿中監漢中王瑀為冊禮使右司郎中李巽副之命左僕射裴冕送公主至境上戊子又以司勳員外郎鮮于叔明為瑀副叔明仲通之弟也天寶中鮮于仲通黨附楊國忠致位通顯甲子嚴子改午上送寧國公主至咸陽公主辭訣曰國家事重死且無恨上流涕而還瑀等至回紇牙帳可汗衣赭袍胡帽衣於既翻坐帳中榻上儀衞甚嚴引瑀等立於帳外瑀不拜而立可汗曰我與天可汗兩國之君君臣有禮何得不拜瑀與叔明對曰曏者唐與諸國為婚皆以宗室女為公主今天子以可汗有功自以所生女妻可汗妻七細翻恩禮至重可汗柰何以子壻傲婦翁坐榻上受冊命邪可汗改容起受冊命明日立公主為可敦自突厥有國以來可汗號其正室曰可賀敦至德二載乙未郭子儀入朝考異曰實錄郭子儀擒逆賊將安太清送闕下按上元元年李光弼拔懷州始擒太清實錄誤也唐曆本紀等皆無之舊子儀傳七月破賊河上擒安守忠以獻諸書亦無之今不取至德二載八月壬寅以青登等五州節度使許叔冀為滑濮等六州節度使考異曰實錄云青徐等五州節度使季廣琛青登等五州節度使許叔冀按青州豈可屬兩節度又廣琛先為荊州長史今年五月為右常侍九月討安慶緒時實錄稱鄭蔡節度使汾陽家傳稱淮西荊澧舊紀稱荊州未嘗鎮青徐實錄於此稱青徐恐誤也余按新書方鎮表至德元載置青密節度使領北海高密東牟東萊四郡乾元元年青密節度增領滑濮二州青密節度即前所云北海節度也領青密登萊四州增領滑濮是為六州節度使若以青登五州增滑濮二州則七州矣其數不合至德二載庚戌李光弼入朝丙辰以郭子儀為中書令光弼為侍中丁巳子儀詣行營至德二載回紇遣其臣骨啜特勒及帝德將驍騎三千助討安慶緒上命朔方左武鋒使僕固懷恩領之至德二載九月庚午朔以右羽林大將軍趙泚為蒲同虢三州節度使去年置河中節度使領蒲絳等七州今趙玼節度蒲同虢三州而已蓋兵興之際分命節帥以扼險要其所統之增減離合隨時制宜耳至德二載丙子招討党項使王仲昇斬党項酋長拓跋戎德傳首貞觀以後吐蕃浸盛党項拓跋諸部畏逼請內徙詔慶州置靜邊軍州處之又置芳池都督府於慶州懷安縣界管小州十以處党項野利氏部落至德以來中國亂党項因寇邠寧二州至德二載安慶緒之初至鄴也雖枝黨離析猶據七郡六十餘城汲鄴趙魏平原清河博平凡七郡慶緒不親政事專以繕臺沼樓船酣飲為事其大臣高尚張通儒等爭權不叶無復綱紀蔡希德有才略部兵精銳而性剛好直言通儒譖而殺之復扶又翻好呼到翻下好殺同考異曰河洛春秋十月蔡希德有密款歸國將襲殺慶緒以為內應左右泄之慶緒斬希德於鄴中又曰慶緒既殺希德始有土崩之兆矣薊門紀亂史思明常畏希德自知謀策果斷英武皆不及之時希德在相州為慶緒竭節展効思明未敢顯背無何希德為慶緒所殺思明初聞驚疑不信及知其實大喜見於顏色焉今從實錄麾下數千人皆逃散諸將怨怒不為用以崔乾祐為天下兵馬使總中外兵乾祐愎戾好殺將即亮翻愎弼力翻很也士卒不附庚寅命朔方郭子儀淮西魯炅興平李奐滑濮許叔冀鎮西北庭李嗣業鄭蔡季廣琛河南崔光遠七節度使及平盧兵馬使董秦將步騎二十萬討慶緒炅古迥翻濮博木翻嗣祥吏翻琛丑林翻將即亮翻又音如字騎奇寄翻又命河東李光弼關內澤潞王思禮王思禮先為關內節度使時兼領澤潞節度使鎮潞州考異曰實錄有李奐無崔光遠而云凡九節度汾陽家傳有光遠無奐又有河東兵馬使薛兼訓蓋實錄脫光遠汾陽傳脫奐名耳兼訓蓋光弼裨將光弼未至間先遣赴鄴城也汾陽傳又以炅為襄鄧廣琛為淮西荊澧舊本紀廣琛為荊州今從實錄汾陽傳又云公九月十二日出洛師涉河而東今從實錄涉庚二十一日也余按涉庚當作庚寅難相統屬故不置元帥諸軍並行步騎數十萬而不置元帥號令不一所以有安陽之敗處昌呂翻觀軍容之名自此始至德二載癸巳廣州奏大食波斯圍州城廣州治南海縣本漢番禺縣二國兵掠倉庫焚廬舍浮海而去至德二載冬十月甲辰冊太子考異曰實錄云可大赦天下頃者頻興大典累洽殊私率土之間屢經蕩滌猶慮近者或滯狴牢其天下見禁囚徒已下罪一切放免按既云大赦則死罪皆免豈有但免徒以下罪邪恐可大赦天下是衍字耳今不書赦初太子生之歲豫州獻嘉禾於是以為祥更名豫更工衡翻㣥下無復賜物復扶又翻至是始有新鑄大錢乾元重寶錢也至德二載郭子儀引兵自杏園濟河東至獲嘉九域志衞州汲縣有杏園鎮獲嘉縣本汲縣之新中鄉漢武帝行幸至此聞獲呂嘉因置獲嘉縣唐屬懷州九域志獲嘉縣在衞州西九十里斬首四千級捕虜五百人太清走保衞州子儀進圍之丙午遣使告捷魯炅自陽武濟季廣琛崔光遠自酸棗濟陽武縣武德四年置於故原武城屬鄭州慶緒悉舉鄴中之衆七萬救衞州分三軍以崔乾祐將上軍田承嗣將下軍慶緒自將中軍子儀使善射者三千人伏于壘垣之內令曰我退賊必逐我汝乃登壘鼓譟而射之既而與慶緒戰偽退賊逐之至壘下伏兵起射之射而亦翻矢如雨注賊還走子儀復引兵逐之復扶又翻慶緒大敗獲其弟慶和殺之遂拔衞州慶緒走子儀等追之至鄴許叔冀董秦王思禮及河東兵馬使薛兼訓皆引兵繼至慶緒收餘兵拒戰於愁思岡愁思岡在鄴城西據歐史在相州湯陰縣薛居正曰湯陰縣界有一岡土人謂之愁死岡考異曰汾陽家傳十月五日戰愁岡據實錄癸丑子儀破賊擒安慶和癸丑十四日也蓋捷奏始到前後斬首三萬級捕虜千人慶緒乃入城固守子儀等圍之章十二行本之下有李光弼引兵繼至七字乙十一行本同孔本同張校同慶緒窘急遣薛嵩求救於史思明且請以位讓之思明發范陽兵十三萬欲救鄴觀望未敢進先遣李歸仁將步騎一萬軍于滏陽磁州治滏陽南至鄴城六十里至德二載甲寅上皇幸華清宮十一月丁丑還京師至德二載崔光遠拔魏州魏州治漢元城縣郭下又置貴鄉縣與元城為二縣丙戌以前兵部侍郎蕭華為魏州防禦使會史思明分軍為三一出邢洺一出冀貝一自洹水趣魏州洹水縣漢長樂縣地魏郡國志曰周建德六年分臨漳縣東北置洹水縣在魏州西趣七喻翻十二月癸卯敕以光遠領魏州刺史至德二載甲辰置浙江西道節度使領蘇潤等十州以昇州刺史韋黃裳為之浙西道節度使兼江寧軍使領昇潤宣歙饒江蘇常杭湖十州治昇州庚戌置浙江東道節度使領越睦等八州以戶部尚書李峘為之浙東道節度使領越睦衢婺台明處溫八州治越州此宜參考下卷上元元年都統李峘註至德二載己未㣥臣請上尊號曰乾元大聖光天文武孝感皇帝許之至德二載史思明乘崔光遠初至引兵大下光遠使將軍李處崟拒之崟魚今翻賊勢盛處崟連戰不利還趣城趣七喻翻賊追至城下揚言曰處崟召我來何為不出光遠信之腰斬處崟處崟驍將衆所恃既死衆無鬬志姚聳夫若在未必能為宋保守河南而聳夫之死宋人惜之李處崟若在未必能為唐保守魏州而處崟之死唐人惜之以兩敵相持而自戮鬬將乃自翦其手足也丁卯思明陷魏州所殺三萬人至德二載平盧節度使王玄志薨上遣中使往撫將士且就察軍中所欲立者授以旌節高麗人李懷玉為裨將殺玄志之子推侯希逸為平盧軍使希逸之母懷玉姑也故懷玉立之立侯希逸者李懷玉而逐侯希逸者亦李懷玉也懷玉後賜名正己節度使由軍士廢立自此始臣光曰夫民生有欲無主則亂書仲虺之誥之言治直之翻自天子諸侯至於卿大夫士庶人尊卑有分分扶問翻大小有倫若綱條之相維書說命曰若網在綱有條而不紊賈誼曰如身之使臂臂之使指莫不制從而下無覬覦覬音冀覦音俞其在周易上天下澤履象曰君子以辨上下定民志此之謂也凡人君所以能有其臣民者以八柄存乎己也周禮王以八柄馭㣥臣一曰爵以馭其貴二曰祿以馭其富三曰予以馭其幸四曰置以馭其行五曰生以馭其福六曰奪以馭其貧七曰廢以馭其罪八曰誅以馭其過則彼此之勢均何以使其下哉肅宗遭唐中衰幸而復國是宜正上下之禮以綱紀四方而偷取一時之安不思永久之患彼命將帥統藩維國之大事也乃委一介之使徇行伍之情行戶剛翻無問賢不肖惟其所欲與者則授之自是之後積習為常君臣循守以為得策謂之姑息姑且也息安也且求目前之安也殺逐主帥亦不治其罪因以其位任授之然則爵祿廢置殺生予奪此即周禮所謂八柄也治直之翻予讀曰與亂之生也庸有極乎且夫有國家者賞善而誅惡故為善者勸為惡者懲彼為人下而殺逐其上惡孰大焉乃使之擁旄秉鉞師長一方長知兩翻是賞之也賞以勸惡惡其何所不至乎書云遠乃猷書康誥之言猷謀也猷之未遠是用大諫詩大雅板之辭人無遠慮必有近憂見論語其憂患可勝校乎勝音升由是為下者常眄眄焉伺其上眄眠見翻目偏合而衺視也苟得間則攻而族之為上者常惴惴焉畏其下苟得間則掩而屠之二語曲盡唐末藩鎮將卒之情狀間古莧翻惴之睡翻憂懼貌非有相保養為俱利久存之計也如是而求天下之安其可得乎迹其厲階肇於此矣言其禍肇於命侯希逸帥平盧也毛萇曰厲惡也鄭氏曰犯政為惡曰厲蓋古者治軍必本於禮故晉文公城濮之戰見其師少長有禮知其可用左傳晉楚戰于城濮晉侯登有莘之虛以觀師曰少長有禮其可用也遂戰楚師敗績治直之翻下同少詩照翻長知兩翻使士卒得以陵偏裨偏裨得以陵將帥則將帥之陵天子自然之勢也賈誼廉陛之論正此意由是禍亂繼起兵革不息民墜塗炭無所控訴凡二百餘年然後大宋受命太祖始制軍法使以階級相承小有違犯咸伏斧質是以上下有敍令行禁止四征不庭庭直也不庭諸侯之不直者近世儒者以不朝為不庭謂其不來庭也宇內乂安兆民允殖以迄于今皆由治軍以禮故也豈非詒謀之遠哉至德二載是歲置振武節度使領鎮北大都護府麟勝二州鎮北大都護府領大同長寧二縣振武節度使治單于都護府因舊振武軍而建節鎮兼押蕃落使宋白曰振武軍舊為單于都護府即漢定襄郡之盛樂縣也在陰山之陽黃河之北後魏所都盛樂是也唐平突厥於此置雲中都督府麟德三年改為單于大都護府至德後振武節度治焉安南經略使為節度使領交陸等十一州安南節度使領交陸峯愛驩長福祿芝武莪演武安十一州治交州宋白曰陸州玉山郡本玉州上元二年改為陸州以州界有陸水為名至德二載吐蕃陷河源軍容肇祖標點聶崇岐覆校
