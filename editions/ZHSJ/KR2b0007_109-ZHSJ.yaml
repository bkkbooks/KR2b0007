body:
  text: 資治通鑑卷第一百九端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑二千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註晉紀三十一中山飢甚安皇帝甲諱德宗字德宗孝武帝長子也諡法好和不爭曰安又曰生而少斷曰安帝即位後桓玄篡奪劉裕反正南征北召伐而中原亦多事通鑑所書凡十卷故以十干書卷數隆安元年丁酉三九七中山飢甚春正月己亥朔帝加元服改元以左僕射王珣為尚書令領軍將軍王國寶為左僕射領選領選者領吏部選選須戀翻會稽王道子悉以東宮兵配國寶使領之會工外翻中山飢甚燕范陽王德求救於秦秦兵不出鄴中恟懼恟許洪翻賀賴盧自以魏王珪之舅不受東平公儀節度由是與儀有隙儀司馬丁建陰與德通從而構間之間古莧翻射書入城中言其狀射而亦翻甲辰風霾晝晦霾謨皆翻風雨土曰霾賴盧營有火建言於儀曰賴盧燒營為變矣儀以為然引兵退賴盧聞之亦退建帥其衆詣德降帥讀曰率降戶江翻且言儀師老可擊德遣桂陽王鎮南安王青帥騎七千追擊魏軍大破之師克在和將帥不和敗之本也燕主寶使左衞將軍慕輿騰攻博陵殺魏所置守宰王建等攻信都六十餘日不下士卒多死庚申魏王珪自攻信都壬戌夜燕宜都王鳳踰城奔中山鳳知珪至膽破而走癸亥信都降魏中山飢甚涼王光以西秦王乾歸數反覆謂乾歸既稱藩於光而悔之也數所角翻乾歸㣥下請東奔成紀以避之成紀縣自漢以來屬天水郡治小坑川唐併顯親縣入成紀縣移成紀縣治顯親川軍之勝敗在於巧拙不在衆寡光兵雖衆而無法其弟延勇而無謀不足憚也且其精兵盡在延所延敗光自走矣光軍于長最遣太原公纂等帥步騎三萬攻金城乾歸帥衆二萬救之未至纂等拔金城光又遣其將梁恭等以甲卒萬餘出陽武下峽陽武下峽在高平西河水所經也將即亮翻天水公延以枹罕之衆攻臨洮武始河關皆克之臨洮縣漢屬隴西郡惠帝分屬狄道郡武始郡故狄道縣地河關縣前漢屬金城郡後漢屬隴西郡晉屬狄道郡枹音膚洮土刀翻紿待亥翻乾歸衆潰奔成紀延欲引輕騎追之司馬耿稚諫曰乾歸勇略過人安肯望風自潰前破王廣楊定皆羸師以誘之破楊定見上卷孝武太元十九年太元十一年王廣為鮮卑匹蘭所執送於後秦此時乾歸未統國事也乾歸破廣當在乞伏國仁之時稚直利翻羸倫為翻殆必有姦宜整陳而前使步騎相屬陳讀曰陣屬之欲翻俟諸軍畢集然後擊之無不克矣延不從進與乾歸遇延戰死稚與將軍姜顯收散卒還屯枹罕光亦引兵還姑臧中山飢甚禿髮烏孤自稱大都督大將軍大單于西平王單音蟬大赦改元太初治兵廣武攻涼金城克之涼王光遣將軍竇苟伐之戰于街亭涼兵大敗中山飢甚燕主寶聞魏王珪攻信都出屯深澤深澤縣前漢屬涿郡後漢屬安平國晉屬博陵郡宋白曰深澤縣以界內水澤深廣為名郡國志中山蒲陰縣有楊城寶悉出珍寶及宮人募郡國㣥盜以擊魏二月己巳朔珪還屯楊城沒根兄子醜提為幷州監軍聞其叔父降燕懼誅帥所部兵還國張國作縣作亂監工銜翻降戶江翻帥讀曰率下同珪欲北還遣其國相涉延求和於燕且請以其弟為質相息亮翻質音致寶聞魏有內難不許兵法曰知彼知己百戰不殆慕容寶徒欲乘拓跋珪之有內釁而困之而不知己之才略不足辦也難乃旦翻宀儿宀儿而隴翻從才用翻悉發其衆步卒十二萬騎三萬七千屯於曲陽之柏肆此趙國之下曲陽縣也有柏肆塢隋開皇十六年置柏肆縣後廢入常山稾城縣魏書帝紀作鉅鹿之柏肆塢按地形志鉅鹿郡治曲陽滹音呼沱徒河翻丁丑魏軍至營於水南寶潛師夜濟募勇敢萬餘人襲魏營寶陳於營北以為之援陳讀曰陣下同募兵因風縱火急擊魏軍魏軍大亂珪驚起棄營跣走燕將軍乞特真帥百餘人至其帳下得珪衣鞾鞾許戈翻既而募兵無故自驚互相斫射射而亦翻珪於營外望見之乃擊鼓收衆左右及中軍將士稍稍來集多布火炬於營外縱騎衝之募兵大敗敵出其不意故走見敵之不整乃還戰善用兵者固觀變而動也寶引兵復渡水北戊寅魏整衆而至與燕相持燕軍奪氣寶引還中山魏兵隨而擊之燕兵屢敗寶懼棄大軍帥騎二萬奔還時大風雪凍死者相枕枕職任翻寶恐為魏軍所及命士卒皆棄袍仗兵器數十萬寸刃不返燕之朝臣將卒降魏及為魏所係虜者甚衆朝直遙翻將即亮翻降戶江翻先是張袞嘗為魏王珪言燕祕書監崔逞之材據張袞傳袞未嘗與逞相識也聞其才而稱之先悉薦翻甚喜以逞為尚書使錄三十六曹漢光武分尚書為六曹置郎三十四人並左右丞為三十六人至魏尚書郎有殿中吏部駕部金部虞曹比部南主客祠部度支庫部農部水部儀曹三公倉部民曹二千石中兵外兵都兵別兵考功定課凡二十三郎明帝青龍二年置都官騎兵合二十五郎晉武帝罷農部定課置直事殿中祠部儀曹吏部三公比部金部倉部度支都官二千石左民右民虞曹屯田起部水部左右主客駕部車部庫部左右中兵左右外兵別兵都兵騎兵左右士北主客南主客凡三十四曹後又置運曹凡三十五曹置郎二十三人更相統攝今魏又增為三十六曹魏軍士有自柏肆亡歸者言大軍敗散不知王處道過晉陽晉陽守將封真因起兵攻幷州刺史曲陽侯素延素延擊斬之南安公順守雲中聞之欲自攝國事幢將代人莫題曰此大事不可輕爾宜審待後問不然為禍不細順乃止順什翼鞬章鞬十二行本作犍乙十一行本同孔本同之孫也幢直江翻將即亮翻鞬居言翻賀蘭部帥附力眷紇鄰部帥匿物尼紇奚部帥叱奴根皆舉兵反紇戶骨翻帥所類翻順討之不克珪遣安遠將軍庾岳帥萬騎還討三部皆平之國人乃安珪欲撫慰新附深悔參合之誅事見上卷孝武帝太元二十年珪以燕人懲參合之禍苦戰不下故深悔之免官以奚牧為幷州刺史牧與東秦主興書稱頓首與之均禮時乞伏氏建國隴西號秦故史書姚秦為東秦以別之以告珪珪為之殺牧為于偽翻己卯夜燕尚書郎慕輿皓謀弒燕主寶立趙王麟不克斬關出奔魏麟由是不自安為麟奔西山張本中山飢甚三月燕以儀同三司武鄉張崇為司空石勒分上黨置武鄉郡及武鄉縣唐遼州榆社縣即其地中山飢甚初燕清河王會聞魏軍東下表求赴難難乃旦翻燕主寶許之會初無去意初無去龍城之意也崇嵩之子也餘嵩見上卷孝武帝太元二十一年傉奴沃翻遼東新昌縣有盧龍山唐為平州盧龍縣慕容令所謂守肥如之險即其地也此遼東新昌後人置於漢遼西郡界非漢舊郡縣地也近其靳翻噉馬牛且盡會不發寶怒累詔切責會不得已以治行簡練為名復留月餘治直之翻復扶又翻時道路不通偉欲使輕軍前行通道偵魏強弱且張聲勢偵丑鄭翻諸將皆畏避不欲行餘崇奮曰今巨寇滔天京都危逼京都謂中山諸君荷國寵任而更惜生乎荷下可翻若社稷傾覆臣節不立死有餘辱諸君安居於此崇請當之偉喜簡給步騎五百人崇進至漁陽遇魏千餘騎崇謂其衆曰彼衆我寡不擊則不得免乃鼓譟直進崇手殺十餘人魏騎潰去崇亦引還斬首獲生具言敵中闊狹衆心稍振會乃上道徐進上時掌翻是月始達薊城薊音計魏圍中山既久城中將士皆思出戰征北大將軍隆言於寶曰涉珪雖屢獲小利然頓兵經年涉歲為經年去年十一月魏攻中山沮在呂翻士馬死傷太半人心思歸諸部離解謂賀蘭紇鄰紇奚三部加之舉城思奮若因我之銳乘彼之衰往無不克如其持重不決將卒氣喪將即亮翻喪息浪翻日益困逼事久變生後雖欲用之不可得也寶然之而衞大將軍麟每沮其議麟有異志故沮隆議前後數四寶使人請於魏王珪欲還其弟觚觚留燕事見一百七卷孝武太元十六年常山以西幷州之地也既而寶悔之己酉珪如盧奴魏書地形志中山郡治盧奴酈道元曰盧奴城內西北隅有水淵而不流南北一百步東西百餘步水色正黑曰盧不流曰奴故城以此得名辛亥復圍中山杜佑曰後燕都中山今博陵郡唐昌縣唐昌本漢苦陘縣章帝改漢昌曹魏改魏昌隋改隋昌唐武德中改唐昌復扶又翻今坐守窮城終於困弊臣等願得一出樂戰士皆赴死願戰為樂戰也樂音洛此為坐自摧敗也且受圍歷時無他奇變徒望積久寇賊自退今內外之勢強弱懸絕彼必不自退明矣宜從衆一決寶許之隆退而勒兵召諸參佐謂之曰皇威不振寇賊內侮臣子同恥義不顧生今幸而破賊吉還固善若其不幸亦使吾志節獲展卿等有北見吾母者為吾道此情也隆初鎮龍城與母俱北及垂召隆伐魏其母留龍城為于偽翻詣門俟命麟復固止寶被皮義翻復扶又翻衆大忿恨隆涕泣而還還從宣翻又如字下同是夜麟以兵劫左衞將軍北地王精使帥禁兵弒寶帥讀曰率精以義拒之麟怒殺精出奔西山依丁零餘衆中山西北二百里有狼山自狼山而西南連常山山谷深險漢末黑山張燕五代孫方簡兄弟皆依阻其地丁零餘衆翟真之黨也為燕所敗退聚西山西山曲陽之西山也寶不知麟所之之往也恐麟奪會軍先據龍城乃召隆及驃騎大將軍農驃匹妙翻騎奇寄翻謀去中山走保龍城隆曰先帝櫛風沐雨以成中興之業崩未期年而天下大壞豈得不謂之孤負邪今外寇方盛而內難復起難乃旦翻復扶又翻下復朝同骨肉乖離百姓疑懼誠不可以拒敵北遷舊都亦事之宜然龍川地狹民貧龍川即謂和龍之地復朝夕望有大功此必不可若節用愛民務農訓兵數年之中公私充實而趙魏之間厭苦寇暴民思燕德庶幾返旆克復故業幾居希翻如其未能則憑險自固猶足以優游養銳耳寶曰卿言盡理朕一從卿意耳隆策固善其如運命何兵家因敗為成隆之智不足以及此也使寶始終一從隆之說猶可以免蘭汗之禍遼東高撫善卜筮素為隆所信厚私謂隆曰殿下北行終不能達太亦不可得見若使主上獨往殿下潛留於此必有大功隆曰國有大難難乃旦翻主上蒙塵且老母在北吾得北首而死猶無所恨卿是何言也首式救翻乃遍召僚佐問其去留唯司馬魯恭參軍成岌願從從才用翻餘皆欲留隆並聽之農部將谷會歸說農曰說輸芮翻城中之人皆涉珪參合所殺者父兄子弟泣血踊躍欲與魏戰而為衞軍所抑慕容麟為衞大將軍故稱之為衞軍皆曰得慕容氏一人奉而立之以與魏戰死無所恨大王幸而留此以副衆望擊退魏軍撫寧畿甸奉迎大駕亦不失為忠臣也農欲殺歸而惜其材力謂之曰必如此以望生不如就死農隆皆號為有智略而所見類如此天之廢燕智者失其智矣壬子夜寶與太子策遼西王農高陽王隆長樂王盛等萬餘騎出赴會軍河間王熙勃海王朗博陵王鑒皆幼不能出城隆還入迎之自為鞁乘鞁平義翻說文曰車駕具俱得免燕將王嚴王改李沈等降魏沈持林翻樂浪王惠中書侍郎韓範員外郎段宏太史令劉起等帥工伎三百奔鄴樂浪音洛琅帥讀曰率伎渠綺翻中山城中無主百姓惶惑東門不閉魏王珪欲夜入城冠軍將軍王建志在虜掠乃言恐士卒盜府庫物請俟明旦珪乃止燕開封公詳從寶不成章十二行本成作及乙十一行本同孔本同張校同退齋校同城中立以為主閉門拒守珪盡衆攻之連日不拔使人登巢車杜預曰巢車車上為櫓陸德明曰兵車高如巢以望敵也杜佑曰以八輪車上樹高竿竿上安轆轤以繩挽板屋上竿首以窺城中板屋方四尺高五尺有十二孔四面別布車可進退圜城而行於營中遠視如鳥之巢亦謂之巢車慕容寶已棄汝走汝曹百姓空自取死欲誰為乎為于偽翻皆曰㣥小無知恐復如參合之衆復扶又翻下復出同故苟延旬月之命耳珪顧王建而唾其面唾土賀翻王建既鼓成參合之誅又沮止珪乘夜入中山失計者再故唾其面使中領將軍長孫肥左將軍李栗將三千騎追寶至范陽不及破其新城戍而還前漢志中山國有北新城縣郡國志涿郡有北新城縣晉省水經註新城縣在武遂縣南燕督亢之地也中山飢甚甲寅尊皇太后李氏為太皇太后戊午立皇后王氏中山飢甚燕主寶出中山與趙王麟遇于开城考之字書無开字有阱字疾郢翻驚駭帥其衆奔蒲陰蒲陰縣屬中山郡前漢之曲逆縣也後漢章帝醜其名改曰蒲陰帥讀曰率下同復扶又翻土人頗供給之慕容詳遣兵掩擊麟獲其妻子麟脫走入山中甲寅寶至薊殿中親近散亡略盡惟高陽王隆所領數百騎為宿衞清河王會帥騎卒二萬迎于薊南寶怪會容止怏怏有恨色恨不得為嗣也事見上卷孝武帝太元二十一年怏於兩翻農隆俱曰會年少少詩照翻專任方面習驕所致豈有他也臣等當以禮責之寶雖從之然猶詔解會兵以屬隆隆固辭乃減會兵分給農隆又遣西河公庫傉官驥帥兵三千助守中山傉奴沃翻丙辰寶盡徙薊中府庫北趣龍城趣七喻翻魏石河頭引兵追之戊午及寶於夏謙澤石河頭時屯漁陽夏謙澤在薊北二百餘里清河王會曰臣撫教士卒惟敵是求今大駕蒙塵人思效命而虜敢自送衆心忿憤兵法曰歸師勿遏又曰置之死地而後生孫武子之言何患不克若其捨去賊必乘人或生餘變寶乃從之會整陳與魏兵戰陳讀曰陣農隆等將南來騎衝之魏兵大敗追奔百餘里斬首數千級隆又獨追數十里而還謂故吏留臺治書陽璆曰留臺治書為留臺治書侍御史也燕建留臺於龍城見一百七卷孝武太元十四年隆時錄留臺故璆為故吏璆渠幽翻中山城中積兵數萬不得展吾意今日之捷令人遺恨因慷慨流涕會既敗魏兵敗補邁翻矜很滋甚隆屢訓責之會益忿恚很戶墾翻恚於避翻會以農隆皆嘗鎮龍城孝武太元十年農鎮龍城十四年隆代農名望素出己右恐至龍城權政不復在己復扶又翻又知終無為嗣之望以寶違垂命立策為太子也幽平嚴平改幷之兵皆懷會恩不樂屬二王樂音洛請於寶曰清河王勇略高世臣等與之誓同生死願陛下與皇太子諸王留薊宮臣等從王南解京師之圍還迎大駕寶左右皆惡會惡烏路翻言於寶曰清河王不得為太子神色甚不平且其才武過人善收人心陛下若從衆請臣恐解圍之後必有衞輒之事衞靈公世子蒯聵出奔靈公立其子輒靈公卒輒立蒯聵復入輒拒而不納道通年少會字道通少詩照翻二王謂農隆且朕方自統六師杖會以為羽翼何可離左右也離力智翻衆不悅而退左右勸寶殺會侍御史仇尼歸聞之告會曰大王所恃者父父已異圖所杖者兵兵已去手欲於何所自容乎不如誅二王廢太子大王自處東宮處昌呂翻兼將相之任將即亮翻相息亮翻以匡復社稷此上策也會猶豫未許寶謂農隆曰觀道通志趣必反無疑宜早除之農隆曰今寇敵內侮中土紛紜社稷之危有如累卵會鎮撫舊都遠赴國難難乃旦翻其威名之重足以震動四鄰逆狀未彰而遽殺之豈徒傷父子之恩亦恐大損威望寶曰會逆志已成卿等慈恕不忍早殺恐一旦為變必先害諸父然後及吾至時勿悔自負也會聞之益懼夏四月癸酉寶宿廣都黃榆谷魏收地形志廣都縣屬建德郡在漢北平白狼縣界隋省入遼西柳城縣帥讀曰率下同分道襲農隆殺隆於帳下農被重創被皮義翻創初良翻執仇尼歸逃入山中會以仇尼歸被執事終顯發乃夜詣寶曰農隆謀逆臣已除之寶欲討會陽為好言以安之曰吾固疑二王久矣除之甚善甲戌旦會立仗嚴備乃引道會欲棄隆喪餘崇涕泣固請乃聽載隨軍農出自歸寶呵之曰何以自負邪寶陽責農而以前言相擿發行十餘里寶顧召㣥臣食且議農罪會就坐坐徂臥翻寶目衞軍將軍慕輿騰使斬會傷其首不能殺會走赴其軍勒兵攻寶寶帥數百騎馳二百里晡時至龍城會遣騎追至石城不及石城縣漢屬北平郡後魏屬建德郡隋併入柳城縣乙亥會遣仇尼歸攻龍城寶夜遣兵襲擊破之會遣使請誅左右佞臣幷求為太子使疏吏翻寶不許會盡收乘輿器服以後宮分給將帥乘繩證翻將即亮翻帥所類翻署置百官自稱皇太子錄尚書事引兵向龍城以討慕輿騰為名丙子頓兵城下寶臨西門會乘馬遙與寶語寶責讓之會命軍士向寶大譟以耀威城中將士皆憤怒向暮出戰大破之會兵死傷太半走還營侍御郎高雲夜帥敢死士百餘人襲會軍寶之為太子雲以武藝給事侍東宮拜侍御郎會將十餘騎奔中山開封公詳殺之寶殺會母及其三子丁丑寶大赦凡與會同謀者皆除罪復舊職論功行賞拜將軍封侯者數百人遼西王農骨破見腦寶手自裹創創初良翻僅而獲濟以農為左僕射尋拜司空領尚書令餘崇出自歸寶嘉其忠拜中堅將軍使典宿衞贈高陽王隆司徒諡曰康寶以高雲為建威將軍封夕陽公養以為子雲高句麗之支屬也高句麗自云高陽氏之後裔故以高為氏句如字又音駒麗力知翻徙於青山破高句麗見九十七卷成帝咸康八年青山遼西徒河縣之青山也雲沈厚寡言沈持林翻時人莫知惟中衞將軍長樂馮跋魏收曰漢高帝置信都郡景帝二年為廣川國明帝更名樂成國安帝改為安平國晉改為長樂郡考之晉志有安平而無長樂不知何時更名也樂音洛與之為友高雲馮跋事始見於此為後得燕張本事西燕主永為將軍永敗徙和龍中山飢甚僕射王國寶建威將軍王緒依附會稽王道子會工外翻納賄窮奢不知紀極惡王恭殷仲堪惡烏路翻勸道子裁損其兵權中外恟恟不安恟許拱翻恭等各繕甲勒兵表請北伐道子疑之詔以盛夏妨農悉使解嚴恭遣使與仲堪謀討國寶等遣使疏吏翻桓玄以仕不得志欲假仲堪兵勢以作亂玄仕不得志事見孝武太元十七年國寶與君諸人素已為對事始一百七卷孝武太元十五年對敵也說輸芮翻下同今既執大權與王緒相表裏其所迴易無不如志孝伯居元舅之地必未敢害之王恭字孝伯孝武王皇后之兄弟也超居方任人情皆以君為雖有思致非方伯才亦見太元十五年思相吏翻用殷覬為荊州南蠻校尉資次可為荊州故云覬音冀處昌呂翻仲堪曰憂之久矣計將安出玄曰孝伯疾惡深至君宜潛與之約興晉陽之甲以除君側之惡春秋公羊傳曰趙鞅興晉陽之甲以除君側之惡江陵在西京口在東故曰東西齊舉也願帥荊楚豪傑荷戈先驅帥讀曰率荷下可翻此桓文之勳也仲堪心然之乃外結雍州刺史郗恢雍於用翻郗丑之翻內與從兄南蠻校尉覬南郡相陳留江績謀之從才用翻南蠻府南郡相與荊州刺史府同治江陵覬曰人臣當各守職分朝廷是非豈藩屏之所制也分扶問翻屏必郢翻晉陽之事不敢預聞仲堪固邀之覬怒曰吾進不敢同退不敢異績亦極言其不可覬恐績及禍於坐和解之坐徂臥翻績曰大丈夫何至以死相脅邪江仲元行年六十但未獲死所耳江績字仲元以楊佺期代之朝廷聞之徵績為御史中丞覬遂稱散發辭位晉人多服寒食散其藥毒發或致死今千金方中有數方散悉亶翻省悉景翻謂覬曰兄病殊為可憂覬曰我病不過身死汝病乃當滅門宜深自愛勿以我為念郗恢亦不肯從仲堪疑未決會王恭使至使疏吏翻仲堪許之恭大喜甲戌恭上表罪狀國寶舉兵討之初孝武帝委任王珣及帝暴崩不及受顧命珣一旦失勢循默而已循默者循常而無一言也丁丑王恭表至內外戒嚴道子問珣曰二藩作逆卿知之乎珣曰朝政得失珣弗之預朝直遙翻王殷作難難乃旦翻何由可知王國寶惶懼不知所為遣數百人戍竹里竹里今建康府竹篠鎮是其地在行宮城東北三十許里各散歸王緒說國寶矯相王之命召王珣車胤殺之以除時望因挾君相發兵以討二藩國寶許之說輸芮翻相息亮翻車尺遮翻珣胤至國寶不敢害更問計於珣珣曰王殷與卿素無深怨所競不過勢利之間耳國寶曰將曹爽我乎謂珣如蔣濟說曹爽釋權而司馬懿終族之也事見七十五卷魏邵陵厲公嘉平元年是何言歟卿寧有爽之罪王孝伯豈宣帝之儔邪又問計於胤胤曰昔桓公圍壽陽彌時乃克見一百二卷海西公太和五年及一百三卷簡文帝咸安元年恭必城守若京口未拔而上流奄至君將何以待之國寶尤懼遂上疏解職詣闕待罪既而悔之詐稱詔復其本官道子闇懦欲求姑息姑且也息止也姑息猶言且止遣驃騎諮議參軍譙王尚之收國寶付廷尉洪景伯曰諮議參軍晉江左初置因軍諮祭酒也其位在諸參軍之右驃匹妙翻騎奇寄翻恬之子也甲申賜國寶死斬緒於市遣使詣恭深謝愆失恭乃罷兵還京口國寶兄侍中愷驃騎司馬愉並請解職道子以愷愉與國寶異母又素不協皆釋不問戊子大赦殷仲堪雖許王恭猶豫不敢下聞國寶等死乃始抗表舉兵遣楊佺期屯巴陵沈約曰巴陵縣晉武太康元年置屬長沙酈道元曰湘水北至巴丘山入江山在右岸有巴陵故城本吳之巴丘邸閣晉立巴陵縣後置建昌郡仲堪乃還會稽世子元顯年十六有儁才為侍中說道子以王殷終必為患請潛為之備說輸芮翻道子乃拜元顯征虜將軍以其衞府及徐州文武悉配之為元顯討王殷張本中山飢甚魏王珪以軍食不給命東平公儀去鄴徙屯鉅鹿積租楊城慕容詳出步卒六千人伺間襲魏諸屯伺相吏翻間古莧翻珪擊破之斬首五千生擒七百人皆縱之縱之所以攜中山城中之人心中山飢甚初張掖盧水胡沮渠羅仇匈奴沮渠王之後也盧水胡分居安定張掖史各以其所居郡繫之沮子余翻北史曰沮渠世居張掖臨松盧水帥所類翻涼王光以羅仇為尚書從光伐西秦及呂延敗死羅仇弟三河太守麴粥謂羅仇曰呂光得涼州自號三河王此郡蓋光置也賢曰三河謂金城河賜支河湟河此郡當置於漢張掖金城郡界主上荒耄信讒今軍敗將死將即亮翻正其猜忌智勇之時也吾兄弟必不見容與其死而無名不若勒兵向西平出苕藋河西張氏置西平郡唐為鄯州之地苕藋地名在漢張掖郡番禾縣界藋徒弔翻番如淳音盤呼火故翻涼州不足定也羅仇曰誠如汝言然吾家世以忠孝著於西土寧使人負我我不忍負人也光果聽讒以敗軍之罪殺羅仇及麴粥羅仇弟子蒙遜雄傑有策略涉獵書史以羅仇麴粥之喪歸葬諸部多其族姻會葬者凡萬餘人蒙遜哭謂衆曰呂王昏荒無道多殺不辜吾之上世虎視河西蒙遜之先世為匈奴左沮渠河西匈奴左地也世居盧水為酋豪其高曾皆雄健有勇名復上世之業何如衆咸稱萬歲遂結盟起兵攻涼臨松郡拔之臨松郡張天錫置後周廢入張掖郡張掖縣五代史志張掖刪丹縣有金山沮渠蒙遜事始此中山飢甚司徒左長史王廞導之孫也廞許金翻以母喪居吳王恭之討王國寶也版廞行吳國內史以白版授官非朝命也三吳皆在建康之東父音甫赴者萬計未幾國寶死幾居豈翻恭罷兵符廞去職反喪服廞以起兵之際誅異己者頗多勢不得止遂大怒不承恭命使其子泰將兵伐恭牋於會稽王道子稱恭罪惡將即亮翻會工外翻道子以其牋送恭五月恭遣司馬劉牢之帥五千人擊泰斬之帥讀曰率又與廞戰於曲阿衆潰廞單騎走不知所在騎奇寄翻收虞嘯父下廷尉以其祖潭有功虞潭有討蘇峻之功下遐嫁翻中山飢甚燕庫傉官驥入中山與開封公詳相攻慕容寶遣驥助守中山因與詳相攻傉奴沃翻盡滅庫傉官氏又殺中山尹苻謨夷其族中山城無定主民恐魏兵乘之男女結盟人自為戰使慕容農慕容隆留中山而用之未可知也甲辰魏王珪罷中山之圍就穀河間督諸郡義租甲寅以東平公儀為驃騎大將軍都督中外諸軍事兗豫雍荊徐揚六州牧左丞相封衞王驃匹妙翻騎奇寄翻雍於用翻慕容詳自謂能卻魏兵威德已振乃即皇帝位改元建始置百官以新平公可足渾潭為車騎大將軍尚書令潭當作譚觚先使燕為燕所留珪之弟也鄴中官屬勸范陽王德稱尊號會有自龍城來者知燕主寶猶存乃止中山飢甚涼王光遣太原公纂將兵擊沮渠蒙遜於怱谷破之怱谷當在刪丹縣界蒙遜從兄男成為涼將軍從才用翻聞蒙遜起兵亦合衆數千屯樂涫樂涫縣漢屬酒泉郡後周廢入福祿縣涫姑歡翻又古玩翻兵敗澄死壘姓澄名男成進攻建康遣使說建康太守段業曰說輸芮翻呂氏政衰權臣亶命刑殺無常人無容處一州之地處昌呂翻叛者相望瓦解之形昭然在目百姓嗷然無所依附府君柰何以蓋世之才欲立忠於垂亡之國男成等既唱大義欲屈府君撫臨鄙州使塗炭之餘蒙來蘇之惠書曰傒我后后來其蘇業不從相持二旬外救不至郡人高逵史惠等勸業從男成之請業素與涼侍中房晷僕射王詳不平懼不自安乃許之男成等推業為大都督龍驤大將軍涼州牧建康公驤思將翻改元神璽璽斯氏翻以男成為輔國將軍委以軍國之任蒙遜帥衆歸業帥讀曰率業以蒙遜為鎮西將軍光命太原公纂將兵討業不克將即亮翻中山飢甚六月西秦王乾歸徵北河州刺史彭奚念為鎮衞將軍以鎮西將軍屋弘破光為河州牧屋弘當作屋引魏書官氏志內入諸姓有屋引氏後改為房氏張駿分興晉金城武始南安永晉大夏武成漢中為河州北河州乞伏氏所置也治枹罕鎮衞將軍劉聰所置鎮枹罕張茂分武興金城西平安故為定州興晉郡亦張氏置枹罕縣漢屬金城郡後漢屬隴西郡後又分屬西平郡張駿分屬晉興郡後又分置興晉郡瑥音溫枹音膚中山飢甚秋七月慕容詳殺可足渾潭詳嗜酒奢淫不恤士民刑殺無度所誅王公以下五百餘人㣥下離心城中飢窘詳不聽民出采禾呂禾呂音呂禾不布種而自生曰禾呂死者相枕枕職任翻舉城皆謀迎趙王麟詳遣輔國將軍張驤帥五千餘人督租於常山驤思將翻帥讀曰率麟自丁零入驤軍潛襲中山城門不閉執詳斬之麟遂稱尊號聽人四出采禾呂人既飽求與魏戰麟不從稍復窮餒復扶又翻魏王珪軍魯口遣長孫肥帥騎七千襲中山入其郛麟追至泒水泒水在中山新市縣輿地志云盧奴城北臨滱水面泒河泒攻乎翻敗補邁翻還從宣翻又如字下同八月丙寅朔魏王珪徙軍常山之九門常山郡有九門縣人畜多死將士皆思歸珪問疫於諸將對曰在者纔什四五珪曰此固天命將若之何四海之民皆可為國在吾所以御之耳何患無民㣥臣乃不敢言遣撫軍大將軍略陽公遵襲中山入其郛而還中山飢甚燕以遼西王農為都督中外諸軍事大司馬錄尚書事中山飢甚涼散騎常侍太常西平郭黁善天文數術散悉亶翻騎奇寄翻黁奴昆翻國人信重之會熒惑守東井黁謂僕射王詳曰涼之分野將有大兵分扶問翻主上老病太子闇弱太原公凶悍悍下罕翻又侯旰翻一旦不諱禍亂必起吾二人久居內要彼常切齒將為誅首矣田胡王乞基部落最強田胡胡之一種也多其舊衆吾欲與公舉大事推乞基為主二苑之衆盡我有也涼州治姑臧有東西苑城徐更議之詳從之黁夜以二苑之衆燒洪範門使詳為內應事泄詳被誅被皮義翻黁遂據東苑以叛民間皆言聖人舉兵事無不成從之者甚衆涼王光召太原公纂使討黁纂將還諸將皆曰段業必躡軍後宜潛師夜發纂曰業無雄才憑城自守若潛師夜去適足張其氣勢耳張知亮翻乃遣使告業曰郭黁作亂吾今還都都謂姑臧使疏吏翻可早出戰於是引還業不敢出纂司馬楊統謂其從兄桓曰從才用翻郭黁舉事必不虛發吾欲殺纂推兄為主西襲呂弘據張掖號令諸郡此千載一時也桓怒曰吾為呂氏臣安享其祿危不能救豈可復增其難乎復扶又翻難乃旦翻呂氏若亡吾為弘演矣春秋衞懿公與狄人戰于熒澤為狄人所殺弘演納肝以殉之桓女配纂其見親異於他臣故云然遂叛歸黁番禾縣漢屬張掖郡晉屬武威郡唐天寶中改為天寶縣番音盤纂之弟也纂與西安太守石元良共擊黁大破之乃得入姑臧黁得光孫八人於東苑及敗而恚恚於避翻悉投於鋒上枝分節解飲其血以盟衆衆皆掩目涼人張捷宋生等招集戎夏三千人反於休屠城夏戶雅翻休屠縣漢屬武威郡因休屠王城以為名也晉省縣水經註姑臧城西有馬城東城即休屠縣故城也屠直於翻與黁共推涼後將軍楊軌為盟主軌略陽氐也將軍程肇諫曰卿棄龍頭而從虵尾非計也軌不從自稱大將軍涼州牧西平公纂擊破黁將王斐于城西黁兵勢漸衰遣使請救于禿髮烏孤使疏吏翻九月烏孤使其弟驃騎將軍利鹿孤帥騎五千赴之帥讀曰率騎奇寄翻中山飢甚秦太后虵氏卒虵以者翻虜姓也又食遮翻又音他秦主興哀毀過禮不親庶政㣥臣請依漢魏故事既葬即吉尚書郎李嵩上疏曰孝治天下先王之高事也治直之翻宜遵聖性以光道訓既葬之後素服臨朝朝直遙翻尹緯駮曰嵩矯常越禮尹緯習於聞見反謂李嵩為矯常越禮嗚呼自短喪之制行人之不知禮也久矣駮北角翻興曰嵩忠臣孝子有何罪乎其一從嵩議中山飢甚鮮卑薛勃叛秦薛勃據貳城為魏所攻而降於秦將即亮翻勃敗奔沒弈干沒弈干執送之中山飢甚秦泫氏男姚買得謀弒秦主興不克而死泫師古曰工玄翻楊正衡胡犬翻中山飢甚秦主興入寇湖城弘農太守陶仲山華山太守董邁皆降之遂至陝城進寇上洛拔之置湖陝二戍見一百六卷孝武太元十一年華山郡晉分弘農之華陰京兆之鄭馮翊之夏陽郃陽置上洛縣前漢屬弘農後漢屬京兆晉武帝泰始二年分京兆南部置上洛郡華戶化翻陝失冉翻河南太守夏侯宗之固守金墉崇攻之不克乃徙流民二萬餘戶而還武都氐屠飛啖鐵等據方山以叛秦據晉書載記時飛鐵殺隴東太守姚迴屯據方山則方山當在隴東郡界祝穆曰方山在武都郡東西四十里斬飛鐵興勤於政事延納善言京兆杜瑾等皆以論事得顯拔天水姜龕等以儒學見尊禮瑾渠吝翻龕口含翻給事黃門侍郎古成詵等以文章參機密古成姓也詵疎臻翻以風教為己任京兆韋高慕阮籍之為人居母喪彈琴飲酒詵聞之而泣持劍求高欲殺之高懼而逃匿中山飢甚中山飢甚慕容麟帥二萬餘人出據新市新市縣自漢以來屬中山劉昫曰新市古鮮虞子國唐為定州新樂縣杜佑曰唐鎮州治真定縣漢新市縣故城在東北帥讀曰率甲子魏王珪進軍攻之太史令鼂崇曰不吉昔紂以甲子亡謂之疾日左傳辰在子卯謂之疾日杜預註云疾惡也紂以甲子喪桀以乙卯亡故以為忌日鼂直遙翻珪曰紂以甲子亡周武不以甲子興乎崇無以對冬十月丙寅麟退阻泒水泒音觚甲戌珪與麟戰於義臺大破之據李延壽北史義臺塢名魏收地形志新市縣有義臺城麟與數十騎馳取妻子入西山遂奔鄴甲申魏克中山燕公卿尚書將吏士卒降者二萬餘人將即亮翻降戶江翻張驤李沈先嘗降魏復亡去復扶又翻珪入城皆赦之得燕璽綬圖書府庫珍寶以萬數璽斯氏翻綬音受班賞㣥臣將士有差追諡弟觚為秦愍王發慕容詳冢斬其尸收殺觚者高霸程同皆夷五族五族謂五服內親也丁亥遣三萬騎就衞王儀將攻鄴中山飢甚秦長水校尉姚珍奔西秦西秦王乾歸以女妻之妻七細翻中山飢甚河南鮮卑吐秣等十二部大人皆附於禿髮烏孤此金城河南也中山飢甚燕人有自中山至龍城者言拓跋涉珪衰弱司徒德完守鄴城會德表至勸燕主寶南還寶於是大簡士馬將復取中原遣鴻臚魯邃冊拜德為丞相冀州牧臚陵如翻南夏公侯牧守皆聽承制封拜夏戶雅翻十一月癸丑燕大赦十二月調兵悉集戒嚴在頓調徒弔翻頓者次舍之所遣將軍啟崙南視形勢崙盧昆翻乙亥慕容麟至鄴復稱趙王說范陽王德曰魏既克中山將乘勝攻鄴鄴中雖有蓄積然城大難固且人心恇懼說輸芮翻恇去王翻不可守也不如南趣滑臺趣七喻翻阻河以待魏伺釁而動河北庶可復也時魯陽王和鎮滑臺和垂之弟子也亦遣使迎德德許之使疏吏翻王崇武標點容肇祖聶崇岐覆校
