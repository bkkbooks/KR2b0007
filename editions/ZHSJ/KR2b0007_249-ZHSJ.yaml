body:
  text: 資治通鑑卷第二百四十九端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註唐紀六十五宣宗元聖至明成武獻文睿智章仁神聰懿道大孝皇帝下大中四年大中四年庚午八五大中四年春正月庚辰朔赦天下大中四年二月以秦州隸鳳翔秦州本屬隴右節度是時新復以屬鳳翔大中四年夏四月庚戌以中書侍郎同平章事馬植為天平節度使上之立也左軍中尉馬元贄有力焉武宗之大漸也馬元贄為左神策護軍中尉立上為皇太叔冠古玩翻植與之敍宗姓上賜元贄寶帶元贄以遺植遺唯季翻植服之以朝朝直遙翻上見而識之植變色不敢隱明日罷相收植親吏董侔下御史臺鞫之盡得植與元贄交通之狀下戶嫁翻再貶常州刺史常州古延陵季子之邑後為毗陵晉為晉陵唐為常州京師東南二千八百四十三里大中四年六月戊申兵部侍郎同平章事魏扶薨以戶部尚書判度支崔龜從同平章事大中四年秋八月以白敏中判延資庫去年改備邊庫為延資庫大中四年盧龍節度使周綝薨軍中表請以押牙兼馬步都知兵馬使張允伸為留後九月丁酉從之考異曰四年七月周綝薨張允伸為留後註曰舊紀亦無朝廷命綝為節度使年月至此但云幽州節度使周綝卒軍人立張允伸為留後實錄九月幽州大將表請押衙張允伸知留後事舊允伸傳曰大中四年戎帥周綝寢疾表允伸為留後朝廷可其奏今參取之今按通鑑書八月周綝薨考異以為七月大中四年党項為邊患發諸道兵討之連年無功戍饋不已右補闕孔溫裕上疏切諫上怒貶柳州司馬溫裕戣之兄子也孔戣見二百四十卷憲宗元和十二年大中四年吐蕃論恐熱遣僧莽羅藺真將兵於雞項關南造橋以擊尚婢婢軍於白土嶺水經註左南津西六十里有白土城城西北有白土川水其地在唐河州鳳林縣西以此推之雞項關亦在河州界不利復遣磨離羆子燭盧鞏力復扶又翻將兵據氂牛峽以拒之氂力之翻鞏力請按兵拒險勿與戰以奇兵絕其糧道使進不得戰退不得還不過旬月其衆必潰羆子不從鞏力曰吾寧為不用之人不為敗軍之將稱疾歸鄯州羆子逆戰敗死婢婢糧乏留拓跋懷光守鄯州帥部落三千餘人就水草於甘州西帥讀曰率宋白曰甘州西南至肅州福祿縣界赤柳澗三百三十里肅州南至吐蕃界四百里恐熱聞婢婢棄鄯州自將輕騎五千追之至瓜州宋白曰瓜州東南至肅州界三百四十里遂大掠河西鄯廓等八州宋白曰廓州北至鄯州百八十里東南至河州鳳林縣二百八十里劓刖其羸老劓魚氣翻刖魚決翻羸倫為翻及婦人以槊貫嬰兒為戲焚其室廬五千里間赤地殆盡大中四年冬十月辛未以翰林學士承旨兵部侍郎令狐綯同平章事考異曰舊紀在十一月今從實錄新紀大中四年十一月壬寅以翰林學士劉瑑為京西招討党項行營宣慰使瑑持兗翻大中四年以盧龍留後張允伸為節度使大中四年十二月以鳳翔節度使李業河東節度使李拭並兼招討党項使大中四年吏部侍郎孔溫業白執政求外官白敏中謂同列曰我輩須自點檢孔吏部不肯居朝廷矣溫業戣之弟子也孔溫業之操行不見於史時人蓋以其家世而敬之五年五年春正章十二行本正作二乙十一行本同退齋校同月壬戌天德軍奏攝沙州刺史張義潮遣使來降降戶江翻下同沙州東南至長安三千八百五十九里義潮沙州人也時吐蕃大亂義潮陰結豪傑謀自拔歸唐一旦帥衆被甲譟於州門帥讀曰率被皮義翻唐人皆應之吐蕃守將驚走義潮遂攝州事奉表來降考異曰補國史作議潮今從實錄新舊紀傳五年以兵部侍郎裴休為鹽鐵轉運使休肅之子也裴肅見二百三十五卷德宗貞元十二年歲運江淮米不過四十萬斛吏卒侵盜沈沒舟達渭倉者什不三四大墮劉晏之法沈持林翻墮讀曰隳劉晏法見二百二十六卷德宗建中元年休窮究其弊立漕法十條歲運米至渭倉者百二十萬斛五年上頗知党項之反由邊帥利其羊馬數欺奪之或妄誅殺党項不勝憤怨故反帥所類翻數所角翻勝音升乃以右諫議大夫李福為夏綏節度使自是繼選儒臣以代邊帥之貪暴者行日復面加戒勵復扶又翻党項由是遂安福石之弟也五年上以南山平夏党項久未平党項居慶州者號東山部居夏州者號平夏部其竄居南山者為南山党項趙珣聚米圖經党項部落在銀夏以北居川澤者謂之平夏党項在安鹽以南居山谷者謂之南山党項考異曰唐年補錄曰松州南有雪山故曰南山平夏川名也余按唐年補錄乃末學膚受者之為耳今不欲復言地理姑以通鑑義例言之考異者考㣥書之同異而審其是訓釋其義付之後學南山之說既無同異之可考今而引之疑非考異本指也崔鉉建議宜遣大臣鎮撫三月以白敏中為司空同平章事充招討党項行營都統制置等使職源曰制置使始此敏中請用裴度故事擇廷臣為將佐許之裴度故事見二百四十卷憲宗元和十二年四月以左諫議大夫孫景商為左庶子充邠寧行軍司馬知制誥蔣伸為右庶子充節度副使伸係之弟也蔣係見二百四十四卷文宗太和五年初上令白敏中為萬壽公主選佳壻為于偽翻敏中薦鄭顥時顥已婚盧氏行至鄭州堂帖追還萬壽公主適鄭顥見上卷上年鄭州去京師一千一百五里由是數毀敏中於上敏中將赴鎮言於上曰鄭顥不樂尚主數所角翻樂音洛怨臣入骨髓臣在政府無如臣何今臣出外顥必中傷臣死無日矣中竹仲翻上曰朕知之久矣卿何言之晚邪命左右於禁中取小檉函以授敏中曰此皆鄭郎譖卿之書也朕若信之豈任卿以至今日敏中歸置檉函於佛前焚香事之檉丑貞翻說文曰河柳也敏中軍於寧州壬子定遠城使史元破党項九千餘帳於三交谷三交谷在夏州界辛未詔平夏党項已就安帖平夏地名在夏州界宋朝李繼遷之叛也徙綏州吏民之半置平夏以為巢穴蓋銀夏之要地也聞出山者迫於飢寒猶行鈔掠鈔楚交翻平夏不容窮無所歸宜委李福存諭於銀夏境內授以閒田如能革心向化則撫如赤子從前為惡一切不問或有抑屈聽於本鎮投牒自訴若再犯疆場或復入山林復扶又翻下同不受教令則誅討無赦將吏有功者甄獎甄稽延翻死傷者優恤靈夏邠鄜四道百姓給復三年鄰道量免租稅鄜音膚復方目翻量音良曏由邊將貪鄙致其怨叛自今當更擇廉良撫之若復致侵叛當先罪邊將後討寇虜五年吐蕃論恐熱殘虐所部多叛拓跋懷光使人說誘之說式芮翻誘以久翻導引也其衆或散居章十二行本居作歸乙十一行本同孔本同張校同部落或降於懷光恐熱勢孤乃揚言於衆曰吾今入朝於唐借兵五十萬來誅不服者然後以渭州為國城請唐冊我為贊普誰敢不從五月恐熱入朝上遣左丞李景讓就禮賓院問所欲恐熱氣色驕倨語言荒誕誕徒旱翻誇大也求為河渭節度使上不許召對三殿如常日胡客勞賜遣還勞力到翻還從宣翻恐熱怏怏而去復歸落門川聚其舊衆恐熱本吐蕃落門討擊使會久雨乏食衆稍散纔有三百餘人奔于廓州五年六月立皇子潤為鄂王五年進士孫樵上言百姓男耕女織不自溫飽而㣥僧安坐華屋美衣精饌饌雛晥翻又雛戀翻率以十戶不能養一僧武宗憤其然憤其然猶言憤其如此也言使僧長髮復為齊民也陛下即位以來修復廢寺天下斧斤之聲至今不絕度僧幾復其舊矣幾居依翻陛下縱不能如武宗除積弊柰何興之於已廢乎日者陛下欲脩國東門諫官上言遽為罷役為于偽翻今所復之寺豈若東門之急乎所役之功豈若東門之勞乎願早降明詔僧未復者勿復寺未脩者勿脩庶幾百姓猶得以息肩也秋七月中書門下奏陛下崇奉釋氏㣥下莫不奔走恐財力有所不逮因之生事擾人望委所在長吏量加撙節撙慈損翻所度僧亦委選擇有行業者行下孟翻若容凶粗之人則更非敬道也鄉村佛舍請罷兵日脩時用兵以復河湟五年八月白敏中奏南山党項亦請降時用兵歲久國用頗乏詔幷赦南山党項使之安業五年冬十月乙卯中書門下奏今邊事已息而州府諸寺尚未畢功望且令成之其大縣遠於州府者聽置一寺其鄉村毋得更置佛舍從之五年戊辰以戶部侍郎魏謩同平章事仍判戶部時上春秋已高未立太子㣥臣莫敢言謩入謝因言今海內無事惟未建儲副使正人輔導臣竊以為憂且泣時人重之重之者以其能言人所不敢言也五年蓬果㣥盜依阻雞山寇掠三川雞山在蓬果二州之界而㣥盜依阻以寇掠三川則其結根也廣矣三川謂東西川及山南西道也五年制以党項既平罷白敏中都統但以司空平章事充邠寧節度使五年張義潮發兵略定其旁瓜伊西甘肅蘭鄯河岷廓十州遣其兄義澤奉十一州圖籍入見十州幷沙州為十一州見賢遍翻宋白曰瓜州西至沙州二百八十里西北至伊州九百里西州東至伊州七百五十里甘州西至肅州四百二十里肅州南至瓜州五百二十六里蘭州西至鄯州四百九十里鄯州西至廓州二百八十里河州東北至蘭州三百里岷州北至蘭州狄道縣五百三十四里西北至河州大夏縣三百六十三里十一月置歸義軍於沙州以義潮為節度使考異曰唐年補錄舊紀義潮降在五年八月獻祖紀年錄及新紀在十月按實錄五年二月壬戌天德軍奏沙州刺史張義潮安景旻及部落使閻英達等差使上表請以沙州降十月義潮遣弟義澤以本道瓜沙伊肅等十一州地圖戶籍來獻河隴陷沒百餘年至是悉復故地十一月建沙州為歸義軍以張義潮為節度使河沙等十一州觀察營田處置等使新紀五年十月沙州人張義潮以瓜沙伊肅鄯甘河西蘭岷廓十一州歸于有司新傳三州七關降之明年沙州首領張義潮奉十一州地圖以獻擢義潮沙州防禦使俄號歸義軍遂為節度使參考諸書蓋二月義潮使者始以得沙州來告除防禦使十月又遣義澤以十一州圖籍來上除節度使也今從實錄新傳云三州降之明年誤也又以義潮判官曹義金為歸義軍長史按新書百官志節度使有行軍司馬節度副使判官支使等其兼都督都護則有長史五年以中書侍郎同平章事崔龜從同平章事充宣武節度使五年右羽林統軍張直方坐出獵累日不還宿衞貶左驍衞將軍六年六年春二月王贄弘討雞山賊平之是時山南西道節度使封敖奏巴南妖賊言辭悖慢上怒甚妖於驕翻悖蒲妹翻又蒲沒翻崔鉉曰此皆陛下赤子迫於飢寒盜弄陛下兵於谿谷間不足辱大軍但遣一使者可平矣乃遣京兆少尹劉潼詣果州招諭之潼上言請不發兵攻討且曰今以日月之明燭愚迷之衆使之稽顙歸命其勢甚易稽音啟易以豉翻所慮者武臣恥不戰之功議者責欲速之效耳潼至山中盜彎弓待之潼屏左右直前屏必郢翻又卑正翻曰我面受詔赦汝罪使汝復為平人聞汝木弓射二百步今我去汝十步汝真欲反者可射我射而亦翻賊皆投弓列拜請降降戶江翻潼歸館而王贄弘與中使似先義逸引兵已至山下竟擊滅之六年三月敕先賜右衞大將軍鄭光鄠縣及雲陽莊並免稅役中書門下奏以為稅役之法天下皆同陛下屢發德音欲使中外畫一漢書蕭何為法講若畫一師古註曰畫一言整齊也似稍乖前意事雖至細繫體則多敕曰朕以鄭光元舅之尊貴欲優異令免征稅初不細思況親戚之間人所難議卿等苟非愛我豈進嘉言庶事能盡如斯天下何憂不理有始有卒卒子恤翻當共守之並依所奏六年夏四月甲辰以邠寧節度使白敏中為西川節度使六年湖南奏團練副使馮少端討衡州賊帥鄧裴平之帥所類翻下同六年党項復擾邊上欲擇可為邠寧帥者而難其人從容與翰林學士中書舍人須昌畢諴論邊事諴援古據今具陳方略從千容翻諴戶嵓翻援于元翻上悅曰吾方擇帥不意頗牧近在禁廷卿其為朕行乎諴欣然奉命上欲重其資履為于偽翻資以序進履所歷之官也六月壬申先以諴為刑部侍郎癸酉乃除邠寧節度使考異曰舊傳懿宗召問邊事今從實錄六年雍王渼薨追諡靖懷太子渼音美六年河東節度使李業縱吏民侵掠雜虜又妄殺降者由是北邊擾動閏月庚子以太子少師盧鈞為河東節度使業內有所恃人莫敢言魏謩獨請貶黜上不許但徙義成節度使盧鈞奏度支郎中韋宙為副使宙徧詣塞下悉召酋長諭以禍福酋慈由翻長知丈翻禁唐民毋得入虜境侵掠犯者必死雜虜由是遂安掌書記李璋杖一牙職明日牙將百餘人訴於鈞鈞杖其為首者謫戍外鎮餘皆罰之曰邊鎮百餘人無故橫訴橫戶孟翻不可不抑璋絳之子也李絳相憲宗以直諒聞帥梁為亂卒所殺六年八月甲子以禮部尚書裴休同平章事六年獠寇昌資二州獠魯皓翻資州漢資中縣地宋齊為資陽戍西魏置資州至京師三千五百六十里六年冬十月邠寧節度使畢諴奏招諭党項皆降六年驍衞將軍張直方坐以小過屢殺奴婢貶恩州司戶六年十一月立憲宗子惴為棣王惴之捶翻六年十二月中書門下奏度僧不精則戒法墮壞墮讀曰隳造寺無節則損費過多請自今諸州準元敕許置寺外有勝地靈迹許脩復繁會之縣許置一院繁會謂人物浩繁舟車所會之地若官度僧尼有闕則擇人補之仍申祠部給牒此今所謂度牒者須有本州公驗從之公驗者自本州給公文所至以為照驗七年七年春正月戊申上祀圜丘赦天下七年夏四月丙寅敕自今法司處罪處昌呂翻用常行杖杖脊一折法杖十法杖謂常行臀杖也脊資昔翻折之截翻折笞五臀徒渾翻使吏用法有常準七年冬十二月左補闕趙璘請罷來年元會止御宣政上以問宰相對曰元會大禮不可罷況天下無事上曰近華州奏有賊光火劫下邽明火行劫言盜無所憚華戶化翻少詩沼翻皆朕之憂何謂無事雖宣政亦不可御也七年上事鄭太后甚謹不居別宮朝夕奉養養余亮翻舅鄭光歷平盧河中節度使上章十二行本上上有入朝二字乙十一行本同孔本同張校同退齋校同與之論為政光應對鄙淺上不悅留為右羽林統軍使奉朝請太后數言其貧數所角翻上輒厚賜金帛終不復任以民官復扶又翻民官謂治民之官七年度支奏自河湟平每歲天下所納錢九百二十五萬餘緡內五百五十萬餘緡租稅八十二萬餘緡榷酤二百七十八萬餘緡鹽利榷古岳翻酤工護翻考異曰續皇王寶運錄具載是歲度支支收之數舛錯不可曉今特存其可曉者溫公拳拳於史之闕文蓋其所重者制國用也八年八年春正月丙戌朔日有食之罷元會八年上自即位以來治弒憲宗之黨宦官外戚乃至東宮官屬誅竄甚衆宣宗絕郭后景陵之合葬誅元和東宮之官屬則以為穆宗母子誠預陳弘志之謀者然文宗於穆宗父子也文宗憤元和逆黨欲盡誅之而不克以成甘露之禍使父果為商臣則子必為潘崇諱矣丙申詔長慶之初亂臣賊子頃搜擿餘黨流竄已盡溫公於郭后之崩王皞之貶既詳書之矣復書此詔然王皞之議卒伸於咸通之初通鑑又書之懿宗以子繼父而天理所在者公議所在不可得而違也不可得而揜也讀通鑑者宜以是觀之一切不問從一從再從三從兄之親族袒免以外之親也從才用翻八年二月中書門下奏拾遺補闕缺員請更增補上曰諫官要在舉職不必人多如張道符牛叢趙璘輩數人使朕日聞所不聞足矣叢僧孺之子也李德裕排牛僧孺上惡德裕故親僧孺之子久之叢自司勳員外郎出為睦州刺史睦州吳置新都郡隋置睦州取俗阜人和內外輯睦為義京師東南三千六百五十九里上賜之紫叢既謝前言曰謝恩之後前進而言臣所服緋刺史所借也上遽曰且賜緋上重惜服章有司常具緋紫衣數襲從行以備賞賜或半歲不用其一故當時以緋紫為榮上重翰林學士至於遷官必校歲月以為不可以官爵私近臣也八年秋九月丙戌以右散騎常侍高少逸為陝虢觀察使有敕使過硤石硤石隋之崤縣貞觀十四年移治硤石塢改名硤石屬陝州陝失冉翻鞭驛吏見血少逸封其餅以進敕使還還音旋又如字上責之曰深山中如此食豈易得易以豉翻讁配恭陵八年立皇子洽為懷王汭為昭王汶為康王汶音問考異曰唐年補錄五年正月甲戌朔封三王今從實錄新紀八年上獵於苑北此又出苑城而北獵問其縣曰涇陽人也令為誰曰李行言為政何如曰性執有強盜數人軍家索之軍家謂北司諸軍也唐人謂諸道節度及觀察為使家諸州為州家諸縣為縣家索山客翻盡殺之上歸帖其名於寢殿之柱冬十月行言除海州刺史入謝上賜之金紫問曰卿知所以衣紫乎衣於既翻下至衣紫衣黃並同對曰不知上命取殿柱之帖示之八年上以甘露之變見二百四十五卷文宗大和八年自餘王涯賈餗等無罪詔皆雪其冤上召翰林學士韋澳託以論詩屏左右與之語曰近日外間謂內侍權勢何如對曰陛下威斷非前朝之比澳音奧屏必郢翻又卑正翻斷丁亂翻朝直遙翻上閉目搖首曰全未全未尚畏之在句斷對曰若與外廷議之恐有太和之變不若就其中擇有才識者與之謀上曰此乃末策章十二行本策下有朕已試之矣五字乙十一行本同孔本同張校同自衣黃衣綠至衣緋皆感恩纔衣紫則相與為一矣唐自上元以後三品已上服紫四品服深緋五品服淺緋六品服深綠七品服淺綠八品服綠九品深青流外官及庶人服黃太宗定制內侍省不置三品官內侍是長官階四品其職但在閤門守禦黃衣廩食而已至玄宗宦官至三品將軍門施棨戟得衣紫矣衣於既翻綯恐濫及無辜密奏曰但有罪勿捨有闕勿補自然漸耗至於盡矣宦者竊見其奏由是益與朝士相惡南北司如水火矣九年九年春正月甲申成德軍奏節度使王元逵薨軍中立其子節度副使紹鼎癸卯以紹鼎為成德留後九年二月以醴泉令李君奭為懷州刺史初上校獵渭上有父老以十數聚於佛祠上問之對曰醴泉百姓也縣令李君奭有異政考滿當罷詣府乞留故此祈佛冀諧所願耳及懷州刺史闕上手筆除君奭宰相莫之測君奭入謝上以此獎厲以所得於父老之言獎厲九年三月詔邠寧節度使畢諴還邠州先是以河湟初附党項未平移邠寧軍於寧州事見上卷三年先悉薦翻南山平夏章十二行本夏下有党項二字乙十一行本同孔本同張校同皆安威鹽武三州軍食足五年以原州之蕭關置武州理所猶言治所邠寧軍本理邠州北至寧州一百二十五里九年夏閏四月詔以州縣差役不均自今每縣據人貧富及役輕重作差科簿送刺史檢署訖鏁於令廳鏁蘇果翻令廳縣令廳事也每有役事委令據簿定章十二行本定作輪乙十一行本同孔本同張校同差今之差役簿始此九年五月丙寅以王紹鼎為成德節度使九年上聰察強記宮中廝役給灑掃者廝音斯灑所買翻又所賣翻掃蘇老翻又素報翻皆能識其姓名識職吏翻才性所任任音壬呼召使令無差誤者天下奏獄吏卒姓名一覽皆記之度支奏漬汚帛汚烏故翻誤書漬為清樞密承旨孫隱中謂上不之見輒足成之唐末樞密承旨以院吏充五代以諸衞將軍充宋朝以士人充遂為清選內出度支奏付中書中書宣署申覆還而奏之謂之覆入推按亶改章奏者罰讁之上密令翰林學士韋澳纂次諸州境土風物及諸利害為一書自寫而上之而上時掌翻下上疏同雖子弟不知也號曰處分語他日鄧州刺史薛弘宗入謝鄧州京師東南九百三十里謂澳曰上處分本州事驚人澳詢之皆處分語中事也處昌呂翻分扶問翻澳在翰林上或遣中使宣旨草詔事有不可者澳輒曰茲事須降御札方敢施行淹留至旦上疏論之上多從之九年秋七月浙東軍亂逐觀察使李訥訥遜之弟子也李遜見二百三十九卷憲宗元和十年杜預曰卞躁疾也音皮彥翻遇將士不以禮故亂作九年淮南饑民多流亡節度使杜悰荒於遊宴政事不治上聞之甲午以門下侍郎同平章事崔鉉同平章事充淮南節度使丁酉以悰為太子太傅分司九年九月乙亥貶李訥為朗州刺史監軍王宗景杖四十配恭陵仍詔自今戎臣失律幷坐監軍以禮部侍郎沈詢為浙東觀察使詢傳師之子也傳師者沈既濟之子九年冬十一月以吏部侍郎柳仲郢為兵部侍郎充鹽鐵轉運使有閭閻醫工劉集醫工無職於尚藥局不待詔於翰林院但以醫術自售於閭閻之間故謂之閭閻醫工上敕鹽鐵補場官凡銅鐵鹽場皆有官主之醫工術精宜補醫官若委務銅鹽何以課其殿最殿丁練翻且場官賤品非特敕所宜親臣未敢奉詔上遽批劉集宜賜絹百匹遣之他日見仲郢勞之曰批匹迷翻勞力到翻卿論劉集事甚佳上嘗苦不能食召醫工梁新診脈診止忍翻切脈以候驗受病之原治之數日良已治直之翻新因自陳求官上不許但敕鹽鐵使月給錢三千章十二行本千作十乙十一行本同孔本同熊校同緡而已九年右威衞大將軍康季榮前為涇原節度使亶用官錢二百萬緡事覺季榮請以家財償之上以季榮有開河湟功季榮有功見上卷三年給事中封還敕書唐制凡詔敕有不便者給事中塗竄而奏還之謂之塗歸十二月庚辰貶季榮夔州長史夔州京師南二千二百四十三里九年江西觀察使鄭祗德以其子顥尚主通顯固求散地散悉但翻甲午以祗德為賓客分司太子賓客分司東都十年十年春正月丁巳以御史大夫鄭朗為工部尚書同平章事十年上命裴休極言時事休請早建太子上曰若建太子則朕遂為閒人孰謂唐宣宗明察吾不信也復扶又翻二月丙戌休以疾辭位不許十年三月辛亥詔以回鶻有功於國世為婚姻有功於國謂討安史世為婚姻謂世尚公主北邊無警會昌中虜廷喪亂喪息浪翻可汗奔亡屬姦臣當軸屬之欲翻姦臣謂李德裕此大中君臣愛憎之論也遽加殄滅近有降者云已厖歷今為可汗尚寓安西已厖歷即厖勒以華言譯夷言語轉耳厖勒立見上卷二年當加冊命十年上以京兆久不理夏五月丁卯以翰林學士工部侍郎韋澳為京兆尹考異曰貞陵遺事東觀奏記皆曰帝以崔罕崔郢併敗官面除澳京兆尹按大中制集澳代罕郢代澳云罕郢併敗官誤也今從實錄新紀舊紀新傳既視事豪貴斂手鄭光莊吏恣橫章十二行本橫下有為閭里患四字乙十一行本同孔本同張校同退齋校同莊吏掌主家田租者也橫戶孟翻積年租稅不入澳執而械之上於延英問澳澳具奏其狀上曰卿何以處之處昌呂翻澳曰欲置於法上曰鄭光甚愛之何如對曰陛下自內庭用臣為京兆翰林學士院在內庭若鄭光莊吏積年為蠹得寬重辟辟毗亦翻是陛下之法獨行於貧戶臣未敢奉詔上曰誠如此言韋澳所奏誠合於理此實言牽於母黨之愛殢他計翻貸其死可乎對曰臣不敢不奉詔願聽臣且繫之俟徵足乃釋之上曰灼然可言韋澳之言灼然可行也為于偽翻橈奴巧翻又奴教翻殊以為愧澳歸府府謂京兆府督租數百斛足乃以吏歸光考異曰東觀奏記曰太后為上言之上於延英問澳澳具奏本末上曰今日納租足放否澳曰尚在限內明日則不得矣上入奏太后曰韋澳不可犯且與送錢納卻頃刻而租入今從柳玭續貞陵遺事十年六月戊寅以中書侍郎同平章事裴休同平章事充宣武節度使十年司農卿韋厪欲求夏州節度使厪渠遴翻夏戶雅翻有術士知之詣厪門曰吾善醮星辰求官無不如意厪信之夜設醮具於庭術士曰請公自書官階一通既得之仰天大呼曰呼火故翻韋厪有異志令我祭天厪舉家拜泣曰願山人賜百口之命家之貨財珍玩盡與之邏者怪術士服鮮衣邏郎佐翻執以為盜術士急乃曰韋厪令我祭天我欲告之彼以家財求我耳事上聞上時掌翻秋九月上召厪面詰之具知其冤謂宰相曰韋厪城南甲族京城之南韋杜二族居之謂之韋曲杜曲語云城南韋杜去天尺五勿使獄吏辱之立以術士付京兆杖死貶厪永州司馬考異曰東觀奏記實錄貶司農卿韋厪為永州司馬厪夜令術士為厭勝之術御史臺劾奏故也范攄雲谿友議曰太僕卿韋厪欲求夏州節度使云云貶潘州司馬今官名從東觀奏記及實錄事采雲谿友議十年戶部侍郎判戶部駙馬都尉鄭顥唐自中世以後天下財賦皆屬戶部度支鹽鐵率以他官分判戶部侍郎判戶部乃得知戶部一司錢貨穀帛出入之事駙馬都尉尚主者為之其父祗德章十二行本德下有聞之二字乙十一行本同孔本同與書曰聞汝已判戶部是吾必死之年又聞欲求宰相是吾必死之日也考異曰劉崇遠金華子雜編顥既判戶部馳逐台司甚切時家君猶鎮山東聞之遣書謂顥云云按實錄九年十二月顥父祗德以賓客分司金華子云鎮山東誤也累表辭劇務戶部之務繁劇十月乙酉以顥為祕書監十年上遣使詣安西鎮撫回鶻使者至靈武會回鶻可汗遣使入貢十一月辛亥冊拜為嗢祿登里羅日沒密施合俱錄毗伽懷建可汗以衞尉少卿王端章充使十年吏部尚書李景讓上言穆宗乃陛下兄敬宗文宗武宗乃兄之子陛下拜兄尚可拜姪可乎是使陛下不得親事七廟也宜遷四主出太廟四主謂穆敬文武四宗神主詔百官議其事不決而止時人以是薄景讓薄其逢君之惡也十年敕於靈感會善二寺置戒壇僧章十二行本僧上有諸道二字乙十一行本同孔本同張校同尼應填闕者委長老僧選擇給公憑赴兩壇受戒兩京各選大德十人主其事僧之能持戒行者謂之大德宋白曰唐制諸寺有綱維有大德大德主教授堪者給牒遣歸本州不見戒壇公牒毋得私容仍先選舊僧尼舊僧尼無堪者乃選外人十年壬辰以戶部侍郎判戶部崔慎由為工部尚書同平章事上每命相左右無知者前此一日令樞密宣旨於學士院以兵部侍郎判度支蕭鄴同平章事樞密使王歸長馬公儒覆奏鄴所判度支應罷否上以為歸長等佑之佑助也仍云落判戶部事鄴明之八世孫也明梁貞陽侯蕭淵明也唐諱淵故止曰明十年內園使李敬寔內園使亦內諸司之一五代時有內園栽接使朗奏之上責敬寔對曰供奉官例不避上曰汝銜敕命橫絕可也橫度曰絕命剝色配南牙褫其本色使配役南牙也十一年十一年春正月丙午以御史中丞兼尚書右丞夏侯孜為戶部侍郎判戶部事先是判戶部有缺先悉薦翻京兆尹韋澳奏事上欲以澳補之辭曰臣比年心力衰耗難以處繁劇比毗至翻處昌呂翻屢就陛下乞小鎮聖恩未許上不悅及歸其甥柳玭尤之玭蒲蠲翻又蒲賓翻澳曰主上不與宰輔僉議私欲用我人必謂我以他歧得之歧路也且爾知時事浸不佳乎由吾曹貪名位所致耳丙辰以澳為河陽節度使考異曰舊傳云十二年誤也今從實錄仲郢之子也柳仲郢見上卷武宗會昌五年十一年上欲幸華清宮諫官論之甚切上為之止為于偽翻上樂聞規諫樂音洛凡諫官論事門下封駮苟合於理多屈意從之得大臣章疏必焚香盥手而讀之史炤曰盥手澡手也十一年二月辛巳以門下侍郎同平章事魏謩同平章事充西川節度使謩為相議事於上前他相或委曲規諷謩獨正言無所避上每歎曰謩綽有祖風謂有魏徵之風然竟以剛直為令狐綯所忌而出之十一年嶺南溪洞蠻屢為侵盜夏四月壬申以右千牛大將軍宋涯為安南邕管宣慰使五月乙巳以涯為安南經略使容州軍亂逐經略使王球六月癸巳以涯為容管經略使十一年甲午立皇子灌為衞王澭為廣王澭紆容翻又紆用翻十一年秋七月庚子以兵部侍郎判度支蕭鄴同平章事仍判度支十一年教坊祝漢貞滑稽敏給史記索隱曰滑謂亂也稽同也以言辯捷之人言非若是說是若非能亂同異也崔浩云滑音骨稽流酒器也轉注吐酒終日不已言出口成章辭不窮竭若滑稽之吐酒故揚雄酒賦云鴟夷滑稽腹大如壺盡日盛酒人復借沽是也又姚察曰滑稽俳諧也滑讀如字稽音計以言諧語滑利其智計捷出故云滑稽也摹詠有如宿構由是寵冠諸優冠古玩翻一日在上前抵掌詼諧頗及外事上正色謂曰我畜養爾曹正供戲笑耳畜吁玉翻豈得輒預朝政邪自是疏之會其子坐贓杖死流漢貞於天德軍考異曰實錄大中十一年七月貶嗣韓王乾裕於嶺外初伶人祝漢貞寵冠諸優復出入宮邸乾裕以金帛結之求刺史雖已納賂而未敢言至是為御史臺劾奏故貶杖漢貞流天德軍今從貞陵遺事樂工羅程善琵琶自武宗朝已得幸上素曉音律尤有寵程恃恩暴橫以睚眦殺人橫戶孟翻睚五懈翻眦士懈翻睚眦恨視也又瞋目貌顏師古曰睚舉眼也眦即眥字謂目匡睚眦言舉目相斥也繫京兆獄諸樂工欲為之請因上幸後苑奏樂為于偽翻乃設虛坐坐徂臥翻置琵琶而羅拜於庭且泣上問其故對曰羅程負陛下萬死然臣等惜其天下絕藝不復得奉宴遊矣復扶又翻上曰汝曹所惜者羅程藝朕所惜者高祖太宗法竟杖殺之十一年八月成德節度使王紹鼎薨紹鼎沈湎無度沈持林翻湎面善翻飲酒齊色曰湎韓詩云飲酒閉門不出客曰湎好登樓彈射人以為樂好呼到翻彈徒案翻又徒丹翻射而亦翻樂音洛衆欲逐之會病薨軍中立其弟節度副使紹懿戊寅以紹懿為成德留後十一年九月辛酉以太子太師盧鈞同平章事充山南西道節度使十一年冬十月己巳以秦成防禦使李承勛為涇原節度使承勛光弼之孫也勛與勳同吐蕃酋長尚延心以河渭二州部落來降拜武衞將軍先悉薦翻酋慈由翻長知丈翻承勛利其羊馬之富誘之入鳳林關河州鳳林縣北有鳳林關鳳林漢之白石縣地天寶元年以關名縣誘音酉承勛與諸將謀執延心誣云謀叛盡掠其財徙其衆於荒遠延心知之因承勛軍宴坐中謂承勛曰宴於軍中曰軍宴坐徂臥翻河渭二州土曠人稀因以饑疫唐人多內徙三川三川平涼川蔚茹川落門川也宕徒浪翻二千里間寂無人煙延心欲入見天子見賢遍翻請盡帥部衆分徙內地為唐百姓帥讀曰率使西邊永無揚塵之警其功亦不愧於張義潮矣張義潮以沙瓜等州歸唐猶豫未許延心復曰延心既入朝部落內徙但惜秦州無所復恃耳復扶又翻下同承勛與諸將相顧默然明日諸將言於承勛曰明公首開營田置使府擁萬兵仰給度支使府謂秦成防禦使府仰牛向翻有耕市之利耕謂營田之利市謂互市之利則西陲無事朝廷必罷使府省戍兵還以秦州隸鳳翔吾屬無所復望矣承勛以為然即奏延心為河渭都遊弈使使統其衆居之史言唐之邊鎮自將帥至於偏裨詳於身謀略於國事故夷人窺見其肺肝亦得行其自全之謀考異曰此事出補國史按張義潮以十一州降河渭已在其間今延心復以河渭降者義潮所帥者漢民延心所帥者蕃族也又補國史不云延心以何年月降新傳但云張義潮降其後河渭州虜將尚延心以國破亡亦獻款秦州刺史高駢誘降延心及渾末部萬帳遂收二州拜延心武衞將軍駢收鳳林關以延心為河渭等州都遊弈使按舊傳高駢懿宗時始為秦州刺史新傳誤也今從補國史因承勛移鎮涇原幷延心事置於此十一年中書侍郎同平章事鄭朗以疾辭位壬申以朗為太子太師十一年上晚節頗好神仙遣中使迎道士軒轅集於羅浮山流軒轅集見上卷會昌六年羅浮山在循州博羅縣西北三十里漢志曰浮山自會稽浮來博於羅山故曰博羅山亦曰羅浮山十一年王端章冊立回鶻可汗道為黑車子所塞不至而還王端章去年十一月使回鶻還從宣翻又如字辛卯貶端章賀州司馬十一年十一月壬寅以成德軍留後王紹懿為節度使十一年十二月蕭鄴罷判度支十二年十二年春正月以康王傅分司王式為安南都護經略使康王汶上子也考異曰舊紀式為安南在二月今從實錄至交趾樹芀木為柵可支數十年史炤曰芀都聊切又音調余按廣韻芀都聊切又音調者葦華也其字從艸從刀又類篇有從艸從力者香菜也歷得切昔嘗見一書從艸從力者讀與棘同棘羊矢棗也此木可以支久深塹其外泄城中水塹外植竹寇不能冒范成大桂海虞衡志竻竹刺竹也芒刺森然廣東新州素無城桂林人黃齊守郡始以此竹植之羔豚不能徑號竹城至今以為利傳聞交趾外城亦是此竹正王式所植者也竻盧得翻頃之南蠻大至章十二行本至下有屯錦田步四字乙十一行本同孔本同張校同退齋校同南蠻謂南詔蠻也去交趾半日程唐制凡陸行之程馬日七十里步及驢日五十里車三十里水行之程舟之重者泝河日三十里江四十里餘水四十五里空舟泝河四十里江五十里餘水六十里沿流之舟則輕重同制河日一百五十里江一百里餘水七十里思相吏翻遣譯諭之中其要害中竹仲翻要害謂諭之以守禦之事於我為要於彼為害者蠻一夕引去遣人謝曰我自執叛獠耳非為寇也安南都校羅行恭久專府政都校猶言都將也獠魯皓翻校戶教翻都護中軍纔羸兵數百式至杖其背黜於邊徼羸倫為翻徼吉弔翻十二年初戶部侍郎判度支劉瑑瑑柱兗翻為翰林學士上器重之時為河東節度使手詔徵入朝瑑奏發河東外人始知之戊午以瑑同平章事考異曰東觀奏記曰十一年上手詔追之既至拜戶部侍郎判度支十二月十七日次對上以御案曆日付瑑令於下旬擇一吉日瑑不諭上旨上曰但擇一拜官日即得瑑跪奏二十五日甚佳上笑曰此日命卿為相祕世無知者高湜為鳳翔從事湜即瑑舊僚也二十四日辭瑑於宣平里私第湜曰竊度旬時必副具瞻之望瑑笑曰來日具瞻何旬時也湜不敢發詰旦果爰立矣始以此事洩於湜實錄瑑傳曰明年正月十七日次對帝以曆日付瑑令擇吉日瑑跪奏二十五日今從之仁軌之五世孫也劉仁軌事高宗武后出入將相瑑與崔慎由議政於上前慎由曰惟當甄別品流甄稽延翻別彼列翻上酬萬一瑑曰昔王夷甫祖尚浮華晉王衍字夷甫致中原丘墟今盛明之朝當循名責實使百官各稱其職朝直遙翻稱尺證翻而遽以品流為先臣未知致理之日慎由無以對十二年軒轅集至長安上召入禁中問曰長生可學乎對曰王者屏欲而崇德屏必郢翻則自然受大章孔本大作天張校同遐福何處更求長生留數月堅求還山乃遣之軒轅集之求還懲會昌末年之事也十二年二月甲子朔罷公卿朝拜光陵及忌日行香悉移宮人於諸陵以陳弘志弒逆之罪歸穆宗也唐初皇帝有謁陵之禮天子不躬謁則以太常卿行陵高宗顯慶五年詔歲春秋季一巡宜以三公行陵太常少卿貳之太常給鹵簿仍著於令始貞觀禮歲以春秋仲月巡陵至武后時乃以四季月生日忌日遣使詣陵起居貞元四年國子祭酒包佶言歲二月八月公卿朝拜諸陵陵臺所由導至陵下禮略無以盡恭於是太常約舊禮草定其儀公卿衆官以次奉行朝拜而還忌日行香即詣陵起居之禮也又有忌日詣僧寺行香之禮宋白曰唐制國忌行香初只行於京城寺觀貞元五年八月敕天下諸上州並宜國忌日准式行香之禮凡諸帝升遐宮人無子者悉遣詣山陵供奉朝夕具盥櫛治衾枕事死如事生朝直遙翻十二年戊辰以中書侍郎同平章事崔慎由為東川節度使考異曰唐闕史曰丞相太保崔公一日備顧問於便殿上欲御樓肆赦太保奏云云後旬日罷知政事舊傳初慎由與蕭鄴同在翰林情不相洽及慎由作相罷鄴學士俄而鄴自度支平章事恩顧甚隆鄴引瑑同知政事遂出慎由東川東觀奏記劉瑑既入相與慎由議政於上前慎由曰唯當甄別品流瑑云云慎由不能對因此恩澤浸衰尋罷相為東川節度使削平章事今從唐闕史上欲御樓肆赦唐初天子居西內肆赦率御承天門樓自高宗以後天子居東內肆赦率御丹鳳門樓御樓所費甚廣事須有名且赦不可數唐制凡御樓肆赦六軍十二衞皆有恩賚故云所費甚廣劉溫叟曰故事非肆大眚不御樓軍庶皆有恩給數所角翻曰遣朕於何得名慎由曰陛下未建儲宮四海屬望屬之欲翻若舉此禮雖郊祀亦可況於御樓時上餌方士藥已覺躁渴而外人未知疑忌方深聞之俛首不復言史言宣宗不早定國本使王宗實得以立長而竊定策之功復扶又翻慎由罷相十二年勃海王彞震卒癸未立其弟虔晃為勃海王十二年夏四月以右街使駙馬都尉劉異為邠寧節度使左右街使與左右金吾將軍掌分察六街徼巡上妹也十二年庚子嶺南都將王令寰作亂囚節度使楊發發蘇州人也十二年戊申以兵部侍郎鹽鐵轉運使夏侯孜同平章事十二年五月丙寅工部尚書同平章事劉瑑薨瑑病篤猶手疏論事上甚惜之十二年以右金吾大將軍李燧為嶺南節度使已命中使賜之節給事中蕭倣封還制書上方奏樂不暇別召中使使優人追之節及燧門而返考異曰此出東觀奏記而璲不知以何時除嶺南按實錄大中九年韋曙除嶺南節度使今年正月薨楊發代之三月蕭倣言柳珪四月璲自司農卿為右金吾大將軍五月聞嶺南亂蓋於此除璲嶺南而倣封還以璲為非定亂之才故也今置於此俛之從父弟也蕭俛穆宗長慶初為相辛巳以涇原節度使李承勛為嶺南節度使發鄰道兵討亂者平之十二年是日湖南軍亂都將石載順等逐觀察使韓悰殺都押牙王桂直悰待將士不以禮故及於難難乃旦翻十二年六月丙申江西軍亂都將毛鶴逐觀察使鄭憲十二年初安南都護李涿考異曰實錄或作琢或作涿樊綽蠻書亦作涿實錄及新書皆有李琢傳聽之子也大中三年自洺州刺史除義昌節度使九年九月自金吾將軍除平盧節度使不云曾為安南都護按都護位卑琢既為義昌節度使不應為都護疑作都護者別一李涿非聽子也強市蠻中馬牛一頭止與鹽一斗又殺蠻酋杜存誠㣥蠻怨怒導南詔侵盜邊境考異曰舊紀琢侵刻獠民㣥獠引林邑蠻攻安南府按蠻書寇安南者南詔非林邑也峯州有林西原峯州在安南西北林西原當又在峯州西南方炎瘴至冬瘴輕蠻乘此時為寇故置防冬兵其酋長曰李由獨常助中國戍守輸租賦酋慈由翻長知丈翻知峯州者言於涿請罷戍兵專委由獨防遏於是由獨勢孤不能自立南詔拓東節度使以書誘之以甥妻其子補拓東押牙妻七細翻交趾在南詔東南詔於東境置拓東節度言將開拓東境也又新志自戎州開邊縣七十里至曲州又一千九百七十五里至柘東城柘從木又曰柘東城有諸葛亮石刻文曰碑即仆蠻為漢奴夷畏誓常以石榰梧由獨遂帥其衆臣於南詔帥讀曰率自是安南始有蠻患是月蠻寇安南考異曰實錄無涿除安南年月蠻書云大中八年安南都護亶罷林西原防冬戍卒洞主李由獨等七綰首領被蠻誘引復為親情日往月來漸遭侵軼又曰桃花蠻本屬由獨管轄亦為界上戍卒自大中八年被峯州知州官申文狀與李涿請罷防冬將健六千人不要味真登等州界上防遏其由獨兄弟力不禁被蠻柘東節度使與書信將外甥嫁與由獨小男補柘東押衙自此後七綰洞悉為蠻收管舊紀咸通四年十一月劉蛻等言令狐綯受李涿賄除安南生蠻寇實錄咸通二年六月詔如聞李琢在安南日殺害杜存誠貪殘頗甚致令溪洞懷怨據此則本因李涿貪暴無謀以致蠻寇明矣然則大中八年至十一年舊紀實錄不言蠻為邊患蓋但時於邊境小有鈔盜未敢犯州縣至此寇安南而舊紀實錄始載之又不知此寇安南即鄭言平剡錄所謂至錦田步時非也十二年秋七月丙寅宣州都將康全泰作亂逐觀察使鄭薰薰奔揚州十二年丁卯右補闕內供奉張潛上疏以為藩府代移之際皆奏倉庫蓄積之數以羨餘多為課績羨弋線翻朝廷亦因而甄獎甄稽延翻竊惟藩府財賦所出有常苟非賦斂過差及停廢將士減削衣糧則羨餘何從而致比來南方諸鎮數有不寧皆此故也一朝有變所蓄之財悉遭剽掠比毗至翻數所角翻剽匹妙翻又發兵致討費用百倍然則朝廷竟有何利乞自今藩府長吏不增賦斂不減糧賜獨節遊宴省浮費能致羨餘者然後賞之上嘉納之十二年容管奏都虞候來正謀叛經略使宋涯捕斬之初忠武軍精兵皆以黃冒首號黃頭軍李承勛以百人定嶺南宋涯使麾下效其服裝亦定容州安南有惡民屢為亂聞之驚曰黃頭軍渡海求襲我矣求當作來章乙十一行本正作來鼓譟願送都護北歸我須此城禦黃頭軍王式方食或勸出避之式曰吾足一動則城潰矣徐食畢擐甲擐音宦率左右登城建大將旗坐而責之亂者反走明日悉捕誅之有杜守澄者自齊梁以來擁衆據溪洞不可制言杜守澄之先自齊梁以來不可制也守澄走死間古莧翻參考本末則杜守澄杜存誠之子也存誠後為安南都護李鄠所殺前又云李涿所殺未知孰是安南饑亂相繼六年無上供上供者錢帛之輸京師以供上用者也式始脩貢賦饗將士占城真臘皆復通使占城在大海中西直三佛齊南與崖州對岸真臘一名吉蔑本扶南屬國去長安二萬八百里東距車渠西屬驃南濱海北與道明接東北抵驩州十二年淮南節度使崔鉉奏已出兵討宣州賊八月甲午以鉉兼宣歙觀察使己亥以宋州刺史溫璋為宣州團練使璋造之子也溫造見二百四十四卷文宗太和四年十二年河南北淮南大水徐泗水深五丈深式禁翻漂沒數萬家十二年冬十月建州刺史于延陵入辭上曰建州去京師幾何對曰八千里舊志建州在長安東南四千九百三十五里卿到彼為政善惡朕皆知之勿謂其遠此階前則萬里也遠于願翻卿知之乎延陵悸懾失緒悸其季翻懾之涉翻絲端曰緒言延陵悸懾應對錯亂失其端緒上撫而遣之到官竟以不職貶復州司馬復州京師東南一千八百里令狐綯擬李遠杭州刺史吳分餘杭立臨水縣晉改臨水為臨安陳為錢塘郡隋置杭州自臨安移居錢塘尋移州於柳浦西依山築城京師東南三千五百五十六里吾聞遠詩云長日惟消一局棊安能理人綯曰詩人託此為高興耳興許應翻未必實然上曰且令往試觀之上詔刺史毋得外徙必令至京師面察其能否然後除之令狐綯嘗徙其故人為鄰州刺史便道之官上見其謝上表謝上時掌翻今諸州守臣有謝到任表以問綯對曰以其道近省送迎耳上曰朕以刺史多非其人為百姓害故欲一一見之訪問其所施設知其優劣以行黜陟而詔命既行直廢格不用格音閣宰相可畏嚴畏改謂有權如令狐綯之欺蔽罷其相而罪之可也若任之為相而畏其有權則宰相取充位而已綯汗透重裘重直龍翻上臨朝接對㣥臣如賓客朝直遙翻雖左右近習未嘗見其有惰容每宰相奏事旁無一人立者威嚴不可仰視奏事畢忽怡然曰可以閒語矣因問閭閻細事或談宮中遊宴無所不至一刻許漏上一刻許也卿輩善為之朕常恐卿輩負朕後日不復得相見復扶又翻乃起入宮令狐綯謂人曰吾十年秉政大中四年令狐綯為相至懿宗即位方罷然每延英奏事未嘗不汗霑衣也十二年初山南東道節度使徐商以封疆險闊素多盜賊選精兵數百人別置營訓練號捕盜將及湖南逐帥事見上五月將即亮翻帥所類翻詔商討之商遣捕盜將二百人討平之十二年崔鉉奏克宣州斬康全泰及其黨四百餘人十二年上以光祿卿韋宙父丹有惠政於江西事見上卷三年發鄰道兵以討毛鶴十二年崔鉉以宣州已平辭宣歙觀察使十一月戊寅以溫璋為宣歙觀察使十二年兵部侍郎判戶部蔣伸從容言於上曰近日官頗易得人思徼幸從千容翻易以豉翻徼堅堯翻上驚曰如此則亂矣對曰亂則未亂但徼幸者多亂亦非難上稱歎再三伸章十二行本伸下有三字乙十一行本同孔本同起上三留之曰異日不復得獨對卿矣次對官獨坐宰相皆同入對復扶又翻不諭者不解上旨甲寅以伸同平章事十二年韋宙奏克洪州斬毛鶴及其黨五百餘人宙過襄州徐商遣都將韓季友帥捕盜將從行宙至江州季友請夜帥其衆自陸道間行比明至洪州帥讀曰率間古莧翻比必利翻及也江州西南至洪州一百九十五里州人不知即日討平之宙奏留捕盜將二百人於江西以季友為都虞候十三年十三年春正月戊午朔赦天下十三年三月割河東雲蔚朔三州隸大同軍時置大同軍節度治雲州宋白曰朔州東至蔚州四百六十里東北至故雲州二百六十里今雲州治雲中本古平城地十三年夏四月辛卯以校書郎于琮為左拾遺內供奉初上欲以琮尚永福公主既而中寢宰相請其故上曰朕近與此女子會食對朕輒折匕筯性情如是豈可為士大夫妻乃更命琮尚廣德公主折而設翻更工衡翻二公主皆上女琮敖之子也十三年武寧節度使康季榮不卹士卒士卒譟而逐之上以左金吾大將軍田牟嘗鎮徐州有能名新書曰牟三為武寧帥皆有能名按武宗會昌四年田牟方為天德軍使則其初除武寧必在會昌之間而史不記其歲月一方遂安貶季榮於嶺南十三年六月癸巳封憲宗子惕為彭王惕他歷翻十三年初上長子鄆王溫無寵居十六宅餘子皆居禁中夔王滋第三子也上愛之欲以為嗣為其非次為其于偽翻故久不建東宮上餌醫官李玄伯道士虞紫芝山人王樂藥疽發於背八月疽甚宰相及朝士皆不得見見賢遍翻上密以夔王屬樞密使王歸長馬公儒宣徽南院使王居方使立之屬之欲翻三人及右軍中尉王茂玄皆上平日所厚也獨左軍中尉王宗實素不同心三人相與謀出宗實為淮南監軍宗實已受敕於宣化門外將自銀臺門出左軍副使亓元實考異曰或作邢元實今從東觀奏記懿宗實錄开苦堅翻海陵本作亓渠之切姓也聖人不豫踰月中尉止隔門起居中尉謂王宗實未可辨也何不見聖人而出宗實感寤復入諸門已踵故事增人守捉矣亓元實翼導宗實直至寢殿上已崩年五十首式又翻環音宦宗實叱歸長等責以矯詔皆捧足乞命乃遣宣徽北院使齊元簡迎鄆王壬辰下詔立鄆王為皇太子權句當軍國政事仍更名漼句古候翻當丁浪翻鄆音運更工衡翻漼七罪翻收歸長公儒居方皆殺之癸巳宣遺制以令狐綯攝冢宰宣宗性明察沈斷沈持林翻斷丁管翻考異曰續貞陵遺事曰越守嘗進女樂有絕色者上初悅之數月錫賚盈積一旦晨興忽不樂曰玄宗只一楊天下至今未平我豈敢忘乃召美人曰應留汝不得左右或奏可以放還上曰放還我必思之可命賜酒一盃此太不近人情恐譽之太過今不取用法無私從諫如流重惜官賞恭謹節儉惠愛民物故大中之政訖於唐亡人思詠之謂之小太宗衞嗣君之聰察不足以延衞唐宣宗之聰察不足以延唐丙申懿宗即位癸卯尊皇太后為太皇太后以王宗實為驃騎上將軍李玄伯虞紫芝王樂皆伏誅考異曰東觀奏記畢諴在翰林上恩顧特異許用為相深為丞相令狐綯緩其入相之謀諴思有以結綯在北門求得絕色非人世所有盛飾珠翠專使獻綯綯一見之心動謂其子曰畢太原於吾無分今以是餌吾將傾吾家族也一見立返之諴又瀝血輸啟事於綯綯終不納乃命邸貨之東頭醫官李玄伯上所狎昵者以錢七十萬致於家乃舍正堂坐之玄伯夫妻執賤役以事焉踰月盡得其歡心矣乃進于上上一見惑之寵冠六宮玄伯燒伏火丹砂連進以市恩澤致上瘡疾皆玄伯之罪也懿宗即位玄伯與山人王岳道士虞紫芝俱棄市今從實錄十三年九月追尊上母晁昭容為元昭皇太后十三年加魏博節度使何弘敬兼中書令考異曰東觀奏記大中十三年三月魏博何弘敬就加中書令據實錄二月弘敬加太傅此月乃加中書令在懿宗即位後東觀奏記誤也十三年冬十月辛卯赦天下十三年十一月戊午以門下侍郎同平章事蕭鄴同平章事充荊南節度使十三年十二月甲申以翰林學士承旨兵部侍郎杜審權同平章事審權元穎之弟子也杜元穎穆宗長慶初為相後以帥西川致寇貶十三年浙東賊帥裘甫攻陷象山孫愐曰裘本仇氏避仇改作裘或曰衞大夫柳莊邑於裘氏神龍元年分寧海及鄮置象山縣屬台州廣德二年度屬明州帥所類翻考異曰實錄作仇甫按平剡錄作裘甫今從之明州城門晝閉進逼剡縣剡漢古縣唐屬越州九域志在州東南一百八十里浙東騷動觀察使鄭祗德遣討擊副使劉勍勍渠京翻副將范居植將兵三百合台州軍共討之十三年司空門下侍郎同平章事令狐綯執政歲久忌勝己者中外側目其子滈頗招權受賄滈湖老翻宣宗既崩言事者競攻其短丁酉以綯同平章事充河中節度使以前荊南節度使同平章事白敏中守司徒兼門下侍郎同平章事十三年初韋皋在西川開青溪道以通㣥蠻青溪道即清溪關路又選㣥蠻子弟聚之成都教以書數欲以慰悅羈縻之業成則去復以他子弟繼之復扶又翻如是五十年㣥蠻子弟學於成都者殆以千數軍府頗厭於稟給又蠻使入貢利於賜與所從傔人浸多傔苦念翻杜悰為西川節度使奏請節減其數詔從之南詔豐祐怒其賀冬使者留表付巂州而還又索習學子弟移牒不遜還從宣翻又如字下同索山客翻自是入貢不時頗擾邊境會宣宗崩遣中使告哀時南詔豐祐適卒子酋龍立酋慈秋翻怒曰我國亦有喪朝廷不弔祭又詔書乃賜故王遂置使者於外館禮遇甚薄使者還具以狀聞上以酋龍不遣使來告喪又名近玄宗諱龍字近玄宗諱酋龍乃自稱皇帝國號大禮至今雲南國號大理遣兵陷播州為南詔攻蜀攻交趾張本考異曰舊紀實錄今年皆無陷播州事惟新紀有之實錄咸通六年三月盧潘奏云大中十三年南蠻陷播州補國史曰雲南自大中初朝貢使及西川質子人數漸多節度使奏請釐革減省有詔許之錄詔報雲南雲南回牒不遜新南詔傳曰朝貢歲至從者多杜悰自西川入朝表無多內蠻傔豐祐怒即慢言索質子蓋謂蠻子弟學成都者也按杜悰以咸通二年十月入朝而豐祐大中十三年已死則建議減蠻傔者必非悰入朝後事新傳誤也容肇祖標點聶崇岐覆校
