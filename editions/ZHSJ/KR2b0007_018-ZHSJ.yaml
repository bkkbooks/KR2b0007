body:
  text: 資治通鑑卷第十八翰林學士朝散大夫右諫議大夫知制誥兼侍講同提舉萬壽觀公事兼判集賢院上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣奉敕編集後學天台音註漢紀十元光二年世宗孝武皇帝上之下元光二年戊申前一三三元光二年冬十月上行幸雍祠五畤雍於用翻畤音止元光二年李少君以祠竈卻老方見上祠竈者祭竈以致鬼物化丹砂以為黃金以為飲食器可以延年方士之言云爾少詩照翻少君者故深澤侯舍人高祖功臣有深澤侯趙將夕景帝三年孫脩嗣侯七年有罪耐為司寇少君當是為脩舍人班志涿郡有南深澤縣謂其生時及長時所居止處也長知兩翻無妻子人聞其能使物及不死如淳曰物謂鬼物也更工衡翻遺于季翻常餘金錢衣食人皆以為不治生業而饒給又不知其何所人愈信爭事之治直之翻少君善為巧發奇中如淳曰時時發言有所中也中竹仲翻田蚡封武安侯坐徂臥翻下同少君乃言與其大父游射處老人為兒時從其大父識其處師古曰識記也式志翻一坐盡驚少君言上曰祠竈則致物致物而丹沙可化為黃金壽可益蓬萊仙者可見見之以封禪則不死黃帝是也臣嘗游海上見安期生列仙傳安期生琅邪人賣藥東海邊時人皆言千歲大如瓜食祥吏翻安期生仙者通蓬萊中合則見人不合則隱於是天子始親祠竈遣方士入海求蓬萊安期生之屬而事化丹沙諸藥齊為黃金矣藥之分齊齊才計翻李少君病死天子以為化去不死而海上燕齊怪迂之方士多更來言神事矣更工衡翻元光二年亳人謬忌奏祠太一如淳曰亳亦薄也晉灼曰亳縣屬濟陰郡予據班志亳屬山陽郡亳作薄謬姓也音靡幼翻與繆同戰國時趙有宦者令繆賢太一者天之尊神天文志中宮天極星其一明者太一常居也淮南子太微者太一之庭紫宮者太一之居索隱曰樂汁徵圖云天宮紫微北極天一太一宋均云天一太一北極神之別名春秋佐助期云紫宮天皇耀魄寶之所理也石氏云天一太一各一星在紫宮門外立承事天皇大帝天神貴者太一太一佐曰五帝五帝謂東方青帝靈威仰南方赤帝赤熛怒西方白帝白招矩北方黑帝叶光紀中央黃帝含樞紐也一說蒼帝名靈符赤帝名文祖白帝名顯記黑帝名玄矩黃帝名神斗元光二年鴈門馬邑豪聶壹馬邑縣屬鴈門郡豪謂以貲財武力雄於鄉曲者聶姓也姓譜曰楚大夫食采於聶因以為氏壹其名聶尼輒翻匈奴初和親親信邊可誘以利致之伏兵襲擊必破之道也上召問公卿王恢曰臣聞全代之時戰國之初代自為一國故曰全代其後為趙襄子所滅代始屬趙服虔曰代未分之時也李奇曰六國之時代為一國尚能以擊匈奴況今加以漢之大乎內連中國之兵然尚得養老長幼長知兩翻種樹以時倉廩常實匈奴不輕侵也今以陛下之威海內為一然匈奴侵盜不已者無他以不恐之故耳言不示以威故匈奴不知懼也韓安國曰臣聞高皇帝嘗圍於平城事見十一卷高祖七年及解圍反位而無忿怒之心夫聖人以天下為度者也師古曰言當隨天下人心而寬大其度量也故遣劉敬結和親至今為五世利臣竊以為勿擊便恢曰不然高帝身被堅執銳行幾十年被皮義翻幾居衣翻所以不報平城之怨者非力不能所以休天下之心也今邊境數驚數所角翻士卒傷死中國槥車相望應劭曰槥小棺也今謂之櫝金布令曰不幸死所為櫝傳歸所居縣師古曰從軍死者以槥送致其喪載槥之車相望於道言其多也槥音衞隱惻也張晏曰痛也安國曰不然臣聞用兵者以飽待飢正治以待其亂定舍以待其勞故接兵覆衆伐國墮城師古曰覆敗也墮毀也言兵與敵接則敗其衆所伐之國則墮其城也墮讀曰隳此聖人之兵也今將卷甲輕舉卷讀曰捲深入長敺難以為功敺與驅同衡行則中絕從子容翻衡讀曰橫疾則糧乏徐則後利師古曰後利謂不及於利後戶遘翻人馬乏食兵法曰遺人獲也言以軍遺敵人令其禽獲也遺于季翻恢曰不然臣今言擊之者固非發而深入也將順因單于之欲誘而致之邊誘音酉吾選梟騎壯士陰伏而處以為之備梟古堯翻騎奇寄翻審遮險阻以為其戒吾勢已定或營其左或營其右或當其前或絕其後單于可禽百全必取上從恢議考異曰史記韓長孺傳元光元年聶壹畫馬邑事而漢書武紀在二年蓋元年壹始言之二年議乃決也夏六月以御史大夫韓安國為護軍將軍衞尉李廣為驍騎將軍太僕公孫賀為輕車將軍大行王恢為將屯將軍司馬彪曰輕車古之戰車李奇曰將屯主監諸屯將車騎材官三十餘萬匿馬邑旁谷中約單于入馬邑縱兵陰使聶壹為間間古莧翻亡入匈奴謂單于曰吾能斬馬邑令丞以城降縣有令有丞長吏也單于愛信以為然而許之聶壹乃詐斬死罪囚縣其頭馬邑城下縣古懸字通曰馬邑長吏已死長知兩翻可急來於是單于穿塞將十萬騎入武州塞班志武州縣屬鴈門郡崔浩曰今平城首西百里有武州城是也杜佑曰武州塞在朔州善陽縣界見畜布野畜許救翻而無人牧者怪之乃攻亭得鴈門尉史欲殺之師古曰漢律近塞皆置尉百里一人士史尉史各二人時鴈門尉史行徼見寇因保此亭單于大驚曰吾固疑之乃引兵還出曰吾得尉史天也以尉史為天王塞下傳言單于已去漢兵追至塞度弗及乃皆罷兵度徒洛翻王恢主別從代出擊胡輜重重直用翻聞單于還兵多亦不敢出上怒恢恢曰始約為入馬邑城兵與單于接而臣擊其輜重可得利今單于不至而還臣以三萬人衆不敵祇取辱固知還而斬然完陛下士三萬人於是下恢廷尉下遐嫁翻廷尉當恢逗橈當斬應劭曰逗曲行避敵也橈顧望也如淳曰軍行而逗留畏懦者要斬師古曰應說非也逗留止也橈謂屈弱也逗音豆又音住橈奴教翻蚡不敢言上而言於太后曰王恢首為馬邑事今不成而誅恢是為匈奴報仇也蚡房吻翻是為于偽翻上朝太后朝直遙翻太后以蚡言告上上曰首為馬邑事者恢故發天下兵數十萬從其言為此且縱單于不可得恢所部擊其輜重猶頗可得以尉士大夫心尉與慰同無以謝天下於是恢聞乃自殺自是之後匈奴絕和親攻當路塞師古曰塞之當行道處者不可勝數然尚貪樂關市匈奴與漢人於邊為互市如今之回易場也勝音升樂音洛漢亦關市不絕以中其意中竹仲翻三年三年春河水徙從頓丘東南流師古曰頓丘丘名因以為縣本衞地也地理志屬東郡今則在魏州界考異曰漢書武紀云東南流入勃海按頓丘屬東郡勃海乃在頓丘東此恐誤今不取五月丙子復決濮陽瓠子濮陽縣屬東郡服虔曰瓠子隄名在東郡蘇林曰甄城以南濮陽以北為瓠子河廣百步深五丈水經瓠子河出濮陽縣北十里即瓠河口復扶又翻瓠戶故翻考異曰史記河渠書元光中河決瓠子東注鉅野服虔註漢書武紀曰瓠子隄名在東郡白馬蘇林曰在甄城以南濮陽以北將相名臣表曰五月丙子河決瓠子然則瓠子即濮陽縣境隄名也班志鉅野縣屬山陽郡大野澤在其北師古曰即今鄆州鉅野縣決河之水由鉅野而通泗水由泗水而通淮也汎敷劍翻天子使汲黯鄭當時發卒十萬塞之輒復壞塞悉則翻復扶又翻下同是時田蚡奉邑食鄃奉扶用翻鄃音輸鄃縣屬清河郡鄃居河北河決而南則鄃無水災邑收多蚡言於上曰江河之決皆天事未易以人力強塞易以豉翻強其兩翻塞之未必應天而望氣用數者亦以為然於是天子久之不復事塞也三年初孝景時魏其侯竇嬰為大將軍武安侯田蚡乃為諸郎諸郎諸曹郎也已而蚡日益貴幸為丞相魏其失勢賓客益衰師古曰言素為嬰之賓客者漸以衰退不復往也燕王定國王澤之孫也夫自太僕出相之班志潁陰縣屬潁川郡相息亮翻相為引重張晏曰相薦達為聲勢也師古曰相牽引以致於尊重也為于偽翻夫為人剛直使酒諸有勢在己之右者必陵之數因酒忤丞相數所角翻忤五故翻丞相乃奏案灌夫家屬橫潁川民苦之夫宗族賓客為權利橫於潁川小兒歌之曰潁水清灌氏寧潁水濁灌氏族橫戶孟翻皆得棄市罪刑人於市與衆棄之故殺之於市者謂之棄市景帝中元年改磔曰棄市應劭曰先諸死刑皆磔於市今改曰棄市自非妖逆不復磔也師古曰磔謂張其尸也棄市殺之於市也上令與武安東朝廷辨之東朝謂太后居長樂宮在未央宮之東也令於長樂宮見太后廷辨其是非也朝直遙翻下同訐居謁翻上問朝臣兩人孰是唯汲黯是魏其韓安國兩以為是鄭當時是魏其後不敢堅上怒當時曰吾幷斬若屬矣若屬猶言汝輩也起入上食太后上時掌翻太后怒不食曰今我在也而人皆藉吾弟晉灼曰藉蹈也藉慈夜翻皆魚肉之乎師古曰以比魚肉而食啖也遂族灌夫使有司案治魏其得棄市罪四年四年冬十二月晦論殺魏其於渭城漢法以冬月行重刑遇春則赦若贖故以十二月晦論殺魏其侯此武安侯蚡之意也渭城縣屬扶風秦之咸陽也考異曰班固漢武故事曰上召大臣議之㣥臣多是竇嬰上亦不復窮問兩罷之田蚡大恨欲自殺先與太后訣兄弟共號哭訴太后太后亦哭弗食上不得已遂乃殺嬰按漢武故事語多誕妄非班固書蓋後人為之託固名耳三月乙卯武安侯蚡亦薨考異曰武安侯傳云元光四年春丞相按灌夫事其夏取夫人五年十月論灌夫及家屬十二月晦魏其棄市徐廣引武帝本紀侯表以為蚡薨在嬰死後分明四年當是三年五年當是四年今從之廣又疑十二月為二月按漢制常以立春下寬大詔書蚡恐魏其得釋故以十二月晦殺之何必改為二月也見後十九卷元狩元年有不順語見上卷建元二年使武安侯在者族矣四年夏四月隕霜殺草四年御史大夫安國行丞相事引墮車蹇如淳曰為天子導引而墮車蹇跛也余據漢制大駕則公卿奉引安國蓋因奉引而墮車也墮杜火翻丁巳以平棘侯薛澤為丞相薛澤高祖功臣廣平侯薛歐之孫廣平侯國景帝中二年罪絕中五年復封澤平棘侯班志平棘縣屬常山郡四年地震赦天下四年九月以中尉張歐為御史大夫韓安國疾愈復為中尉四年河間王德脩學好古實事求是德景帝子帝之兄也景帝前二年受封師古曰實事求是務得其實每求真是也好呼到翻下同得書多與漢朝等朝直遙翻下同是時淮南王安亦好書所招致率多浮辯獻王所得書皆古文先秦舊書師古曰先秦猶言秦先謂未焚書之前余據獻王傳舊書即謂周官尚書禮記孟子老子之書也稍稍增輯至五百餘篇被服造次師古曰被服言常居處其中也造次謂所向必行也余謂被服者言以儒術衣被其身也被皮義翻造千到翻山東諸儒多從之遊五年五年冬十月河間王來朝獻雅樂對三雍宮應劭曰辟雍明堂靈臺也雍和也言天地君臣人民皆和也余謂對三雍宮者對三雍之制度非召對於三雍宮其對推道術而言得事之中文約指明師古曰中竹仲翻約少也指謂義之所趨若人以手指物也天子下太樂官常存肄河間王所獻雅聲班表太樂官屬大常肄以至翻習也下遐嫁翻然不常御也春正月河間王薨中尉常麗以聞姓譜常姓黃帝相常先之後王身端行治師古曰端直也治理也行下孟翻篤敬愛下明知深察惠于鰥寡大行令奏諡法聰明睿知曰獻諡曰獻王知讀曰智班固贊曰昔魯哀公有言寡人生於深宮之中長於婦人之手未嘗知憂未嘗知懼師古曰哀公與孔子言也事見孫卿子長知兩翻雖欲不危亡不可得已師古曰巳語終辭師古曰左氏傳管敬仲曰宴安鴆毒不可懷也漢興至於孝平諸侯王以百數率多驕淫失道何則沈溺放恣之中沈持林翻居勢使然也自凡人猶繫于習俗而況哀公之倫乎夫唯大雅卓爾不㣥河間獻王近之矣近其靳翻五年初王恢之討東越也見上卷建元六年南越食蒙以蜀枸醬班志番陽縣屬豫章郡番蒲何翻風讀曰諷劉德曰枸樹如桑其椹長二三寸味酢取其實以為醬美師古曰枸者緣木而生非樹也子形如桑椹又不長一二寸味尤辛不酢劉說非也裴駰曰按漢書音義枸木似穀樹其葉似桑葉用其葉作醬酢美蜀人以為珍味廣志曰枸黑色味辛下氣消穀晉灼曰枸音矩索隱從徐廣音求羽翻唐本本草註曰蒟蔓生葉似王瓜而厚大味辛香實似桑椹皮黑肉白劉淵林曰蒟醬緣木而生其子如桑椹熟時正青長二三寸以蜜藏而食辛香調五藏李心傳曰蒟醬廣蜀皆有之實草類也蜀中者緣木而生如桑椹熟時正青長二三寸以蜜藏而食之廣中者蔓生葉似王瓜而厚大味辛香實似桑椹皮黑肉白其苗如浮留藤取葉合檳榔食之西戎亦時時持來細而辛烈唐蒙所見謂來自牂柯則廣生殆蜀本也蒟醬之味全類蓽撥而蓽撥辛烈尤甚世人唯用蓽撥不用蒟醬故鮮有知者曰道西北牂柯江牂柯江廣數里出番禺城下南越志曰番禺之西有江浦焉師古曰牂柯繫船杙華陽國志云楚遣莊蹻伐夜郎軍至且蘭椓船於岸而步戰既滅夜郎以且蘭有椓船牂柯處乃改為䍧牱又後漢志註牂柯江中名山或曰牂柯江東通四會至番禺入海水經牂柯水東至鬱林廣鬱縣為鬱水南流入交趾界劉昫曰唐邕州治宣化縣漢鬱林郡之領方縣地也驩水在縣北本牂柯河俗呼為鬱狀江即駱越水也蓋廣鬱縣漢亦屬鬱林郡水經所謂交趾界者漢交趾州界也牂音臧柯音歌班志番禺縣屬南海郡時為南越王都廣古曠翻番音潘禺音愚問蜀賈人賈人曰獨蜀出枸醬多持竊出市夜郎華陽國志夜郎王竹王三郎之後武帝開為縣屬牂柯郡史記正義曰今瀘州南大江南岸協州曲州本夜郎國賈音古臨牂柯江江廣百餘步足以行船南越以財物役屬夜郎西至桐師桐師亦西南夷種其地在夜郎之西葉榆之西南蒙乃上書說上曰乃上時掌翻說式芮翻南越王黃屋左纛地東西萬餘里名為外臣實一州主也今以長沙豫章往水道多絕難行竊聞夜郎所有精兵可得十餘萬浮船牂柯江出其不意此制越一奇也誠以漢之強巴蜀之饒通夜郎道為置吏甚易為于偽翻下同易以豉翻上許之乃拜蒙為中郎將將千人食重萬餘人師古曰食糧及衣重也重直用翻李文子曰筰關在沈黎郡又云在犍為郡界宋白曰眉州青神縣臨青衣江郡國志漢武帝使唐蒙開西南夷路始此眉州漢犍為郡地筰才各翻遂見夜郎侯多同多同夜郎侯之名也喻以威德約為置吏使其子為令自此以下為如字以為漢道險終不能有也乃且聽蒙約還報上以為犍為郡李文子曰犍為郡治鄨元光五年又治南廣水經註曰鄨水出符縣南不狼山縣有犍山後漢志鄨水過牂柯郡入延江水水經註沅水出且蘭東至鐔城為沅水寰宇記唐播州夷州費州莊州即秦且蘭夜郎之西北隅今珍州亦其地又西高州有夜郎縣牂州建安縣有古夜郎城西近施黔東近辰沅皆其境也犍居言翻章懷太子賢曰犍為故城在今眉州隆山縣西北自僰道指牂柯江班志僰道屬犍為郡宋白曰古僰國縣有蠻夷曰道故為僰道今戎州治所康曰僰國在馬湖江唐蒙鑿石開道以通之治直之翻僰蒲北翻士卒多物故有逃亡者用軍興法誅其渠率鄭玄曰縣官徵聚曰興今云軍興是也率所類翻上聞之使司馬相如責唐蒙等因諭告巴蜀民以非上意相如還報是時邛筰之君長華陽國志雅州邛崍山本名邛筰山故邛人筰人界韋昭曰筰縣在越巂文穎曰邛者今為邛都縣筰者今為定筰縣史記正義曰邛都西有邛僰山在雅州榮經縣界山巖峭峻曲回九折乃至上下有疑冰即王尊叱馭處康曰邛都夷其地陷為汙澤因名邛池南人呼為邛河師古曰邛都今之邛州本其地邛渠容翻筰才各翻得賞賜多多欲願為內臣妾請吏比南夷天子問相如相如曰邛筰冉駹者近蜀道亦易通師古曰今開州夔州等首領多姓冉者本皆冉種也後漢書冉駹其山有六夷七羌九蠻各有部落括地志蜀西徼外羌茂州冉州本冉駹國康曰其人依山居土累石為室至十餘丈駹音厖易以豉翻為郡縣至漢興而罷今誠復通為置郡縣愈於南夷張揖曰愈差也又云愈猶勝也晉灼曰南夷謂牂柯犍為西夷謂越巂益州也為置之為于偽翻乃拜相如為中郎將建節往使及副使王然于等乘傳因巴蜀吏幣物以賂西夷邛筰冉駹斯榆之君康曰本葉榆澤其君長因以立號後隨畜移於徙師古曰徙音斯故又號為徙榆使疏吏翻傳張戀翻除邊關關益斥西至沬若水斥開廣也張揖曰沬水出蜀廣平徼外與青衣水合若水出旄牛徼外至僰道入江華陽國志漢嘉縣有沬水李文子曰若水南至大作入繩水師古曰沫音妹通零關道班志零關屬越巂郡張揖曰鑿靈山為道寰宇記靈關山在雅州盧山縣北二十里靈關鎮在盧山縣北八十二里零靈通用徼吉弔翻張揖曰孫水出臺登縣南至會無入若水康曰一名白沙江李文子曰孫水本名長河水為置一都尉十餘縣屬蜀為于偽翻天子大說說讀曰悅五年詔發卒萬人治鴈門阻險師古曰阻險所以為固用止匈奴之寇貢父曰治險阻者通道令平易以便伐匈奴治直之翻五年秋七月大風拔木五年女巫楚服等教陳皇后祠祭厭勝挾婦人媚道事覺厭一涉翻賈公彥曰按漢書婦人蠱惑媚道更相祝詛作木偶人埋之於地漢法又有官禁敢行媚道者上使御史張湯窮治之湯深竟黨與相連及誅者三百餘人楚服梟首於市梟堅堯翻乙巳賜皇后冊收其璽綬罷退居長門宮長門宮如淳曰長門在長安城東南東方朔傳竇太主獻長門園上以為宮稽顙謝上竇太主陳皇后母也稽音啟皇后所為不軌於大義不得不廢主當信道以自慰勿受妄言以生嫌懼后雖廢供奉如法長門無異上宮也五年初上嘗置酒竇太主家主見所幸賣珠兒董偃上賜之衣冠尊而不名稱為主人翁使之侍飲由是董君貴寵天下莫不聞考異曰漢武故事曰陳皇后廢處長門宮竇太主以宿恩猶自親近後置酒主家主見所幸董偃按東方朔傳爰叔為偃畫計令主獻長門園更名曰長門宮則偃見上在陳后廢前明矣馳逐平樂觀平樂觀在未央宮北周回十五里高祖時制度草創至帝增修之三輔黃圖曰上林苑中有平樂觀樂音洛觀古玩翻鬬雞及蹴踘也鞠毬也以皮為之鞠音居六翻師古曰角猶校也上為竇太主置酒宣室蘇林曰宣室未央前殿正室也如淳曰宣室布政教之室也樂音洛為于偽翻是時中郎東方朔陛戟殿下師古曰持戟立列陛側也辟頻亦翻董偃有斬罪三安得入乎上曰何謂也朔曰偃以人臣私侍公主其罪一也敗男女之化而亂婚姻之禮傷王制其罪二也敗補邁翻陛下富於春秋方積思於六經偃不遵經勸學反以靡麗為右師古曰右尊之也思相吏翻盡狗馬之樂極耳目之欲是乃國家之大賊人主之大蜮師古曰蜮魅也音或說者以為短狐非也短狐射工耳於此不當其義今俗猶云魅蜮也貢父曰劉向說春秋蜮南方淫氣所生以應哀姜然則朔正用指偃耳何必遷就魅蜮也余按洪範五行傳曰蜮如鱉三足生於南越南越婦人多淫故其地多蜮淫女惑亂之氣所生也陸璣草木疏曰一名射影江淮水皆有之人在岸上影見水中投水影則殺之故曰射影南人將入水先以瓦石投水中令水濁然後入或曰含沙射人皮肌其瘡如疥陸佃埤雅曰蜮一名射工有長角橫在口前如弩檐臨其角端曲如上弩以氣為矢因水勢以射人故俗呼為水弩其罪三也上默然不應良久曰吾業已設飲後而自改朔曰章乙十一行本曰下有不可二字孔本同退齋校同夫宣室者先帝之正處也非法度之政不得入焉故淫亂之漸其變為篡是以豎貂為淫而易牙作患慶父死而魯國全豎貂易牙皆齊桓公之臣也管仲有疾桓公問之曰將何以教寡人仲曰願君之遠豎貂易牙公曰易牙烹其子以快寡人尚可疑邪對曰人之情非不愛其子其子之忍又將何有於君公曰豎貂自宮以近寡人尚可疑邪對曰人之情非不愛其身其身之忍又將何有於君公曰諾管仲死盡逐之而公食不甘宮不治居三年公曰仲父不亦過乎於是復皆召而反之明年公病豎貂易牙相與作亂塞門築牆不通人有一婦人踰垣至公所公曰我欲食婦人曰吾無所得又曰我欲飲婦人曰吾無所得公曰何故曰豎貂易牙作亂故無所得公慨然嘆曰若死者有知吾何面目見仲父乎蒙衣袂而絕乎壽宮蟲流出於戶蓋以楊門之扉三月不葬慶父魯桓公庶子莊公之兄通于哀姜莊公薨慶父弒其子般及閔公欲為亂而不克奔莒莒人歸之縊于密魯乃定父音甫善有詔止更置酒北宮引董君從東司馬門入未央宮有東闕北闕東闕曰蒼龍東司馬門蒼龍闕內之司馬門也更工衡翻董君之寵由是日衰是後公主貴人多踰禮制矣五年上以張湯為太中大夫與趙禹共定諸律令務在深文拘守職之吏作見知法吏傳相監司用法益刻自此始蘇林曰拘刻於守職之吏師古曰見知人犯法而不舉告謂之故縱晉志曰見知而不舉劾各與同罪失不舉劾以贖論其不見不知不坐也傳張戀翻監古銜翻五年八月螟食心曰螟五年是歲徵吏民有明當世之務習先聖之術者縣次續食令與計偕師古曰計者上計簿使也郡國每歲遣詣京師上之偕者俱也令所徵之人與上計者俱來而縣次給其食後世訛誤因乘此語遂謂上計為計偕闞駰不詳妄為解說云秦漢謂諸侯朝使曰計偕偕次也晉代有計偕簿又改偕為階失之彌遠致誤後學菑川人公孫弘對策曰臣聞上古堯舜之時不貴爵賞而民勸善不重刑罰而民不犯躬率以正而遇民信也末世貴爵厚賞而民不勸深刑重罰而姦不止其上不正遇民不信也夫厚賞重刑未足以勸善而禁非必信而已矣是故因能任官則分職治去無用之言則事情得不作無用之器則賦斂省治直吏翻去羌呂翻斂力贍翻不奪民時不妨民力則百姓富有德者進無德者退則朝廷尊有功者上無功者下則㣥臣逡李奇曰言有次第也師古曰逡七旬翻則姦邪止賞當賢則臣下勸凡此八者治之本也故民者業之則不爭理得則不怨有禮則不暴愛之則親上師古曰各得其業則無爭心各申其理則無所怨使之由禮則無暴慢子而愛之則知親上也禮義者民之所服也而賞罰順之則民不犯禁矣臣聞之氣同則從聲比則應比頻寐翻音毗和也今人主和德於上百姓和合於下故心和則氣和氣和則形和形和則聲和聲和則天地之和應矣故陰陽和風雨時甘露降五穀登六畜蕃畜許又翻蕃扶元翻嘉禾興朱草生山不童澤不涸此和之至也時對者百餘人太常奏弘第居下策奏天子擢弘對為第一拜為博士待詔金馬門如淳曰武帝時相馬者東方京作銅馬法獻之立馬於魯班門外更名魯班門為金馬門三輔黃圖曰金馬門宦者署武帝得大宛馬以銅鑄作立於署門因以為名齊人轅固年九十餘亦以賢良徵公孫弘仄目而事固固曰公孫子務正學以言無曲學以阿世諸儒多疾毀固者固遂以老罷歸是時巴蜀四郡四郡蜀郡廣漢郡犍為郡巴郡也千餘里戍轉相餉數歲道不通士罷餓離暑濕死者甚衆罷讀曰疲西南夷又數反數所角翻發兵興擊費以巨萬計而無功上患之詔使公孫弘視焉還奏事盛毀西南夷無所用上不聽弘每朝會章乙十一行本會下有議字孔本同退齋校同朝直遙翻開陳其端使人主自擇不肯面折廷爭於是上察其行慎厚辯論有餘習文法吏事緣飾以儒術師古曰譬之於衣加純緣也折之舌翻爭讀曰諍行下孟翻說讀曰悅一歲中遷至左內史考異曰漢書武紀云元光元年五月詔策賢良於是董仲舒公孫弘等出焉按弘傳元光五年復徵賢良文學菑川國推上弘其策文頗與武紀元年策文相類又云一歲中至左內史百官表元光五年弘為左內史然則弘之再舉賢良不在元光元年明矣荀紀著於此年徵吏民明當世之務下葛洪西京雜記亦云弘以元光五年為國士所推上為賢良若此續食之詔在八月則弘不容於今年巳為左內史蓋此詔在今年不知何月故班氏繫之於年末耳其策文相類蓋出偶然或者此策乃弘先舉賢良時所對班氏誤以為此年之策疑未能明今從漢紀弘奏事有不可不廷辨常與汲黯請間師古曰求空隙之暇弘推其後天子常說說讀曰悅所言皆聽以此日益親貴弘嘗與公卿約議至上前皆倍其約以順上旨倍蒲妹翻汲黯廷詰弘曰齊人多詐而無情實始與臣等建此議今皆倍之不忠上問弘弘謝曰夫知臣者以臣為忠不知臣者以臣為不忠上然弘言左右幸臣每毀弘上益厚遇之六年六年冬初算商車李奇曰始稅商賈車船令出算六年大司農鄭當時言穿渭為渠下至河渠起長安旁南山下至河三百餘里易以豉翻又可以溉渠下民田萬餘頃春詔發卒數萬人穿渠如當時策三歲而通人以為便六年匈奴入上谷殺略吏民遣車騎將軍衞青出上谷騎將軍公孫敖出代輕車將軍公孫賀出雲中驍騎將軍李廣出鴈門各萬騎擊胡關市下衞青至龍城龍城匈奴祭天大會諸部處公孫賀無所得公孫敖為胡所敗亡七千騎李廣亦為胡所敗胡生得廣置兩馬間絡而盛臥敗補邁翻盛時征翻行十餘里廣佯死暫騰而上胡兒馬上師古曰騰跳躍也上時掌翻鞭馬南馳遂得脫歸漢下敖廣吏下遐嫁翻當斬贖為庶人唯青賜爵關內侯青雖出於奴虜青本平陽公主家騎奴材力絕人遇士大夫以禮與士卒有恩衆樂為用有將帥材騎奇寄翻樂音洛將即亮翻帥所類翻故每出輒有功天下由此服上之知人六年夏大旱蝗六年六月上行幸雍六年秋匈奴數盜邊數所角翻漁陽尤甚以衞尉韓安國為材官將軍屯漁陽元朔元年癸丑前一二八應劭曰朔蘇也孟軻曰后來其蘇蘇息也言萬民品物大繁息也師古曰朔猶始也言更為初始也蘇息之息非息生義應說失之六年冬十一月詔曰朕深詔執事興廉舉孝庶幾成風紹休聖緒師古曰休美也緒業也言紹先聖之休緒也幾居衣翻必有忠信三人並行厥有我師論語曰十室之邑必有忠信如丘者焉又曰三人行必有我師焉師古曰闔閉也總一郡之中故曰闔而積行之君子壅於上聞也師古曰究竟也言見壅遏不得聞達於天子也行下孟翻蔽賢蒙顯戮古之道也其議二千石不舉者章孔本者作孝者罪有司奏不舉孝不奉詔當以不敬論張晏曰謂其不勤求士報國不勝任也當免張晏曰二千石當率身化下今親宰牧而無賢人為不勝任也勝音升六年十二月江都易王非薨非景帝子前二年封汝南三年徙江都六年皇子據生衞夫人之子也是為戾太子考異曰漢書武五子傳贊曰建元六年春戾太子生外戚傳衞皇后元朔元年生男據按枚皋傳云武帝春秋二十九乃有皇子與外戚傳合蓋贊語因蚩尤之旗致此誤亦猶五星聚在秦二世末年誤為漢元年也甲子立衞夫人為皇后赦天下六年秋匈奴二萬騎入漢殺遼西太守略二千餘人圍韓安國壁又入漁陽鴈門各殺略千餘人安國益東徙屯北平數月病死考異曰安國死在明年於此終言之拜為右北平太守匈奴號曰漢之飛將軍避之數歲不敢入右北平六年車騎將軍衞青將三萬騎出鴈門將軍李息出代青斬首虜數千人六年東夷薉君南閭等共章乙十一行本共作孔本同熊校同二十八萬人降為蒼海郡服虔曰薉貊在辰韓之北高麗沃沮之南東窮大海師古曰南閭薉君名食貨志彭吳開道通薉貊朝鮮置滄海郡陳壽夫餘傳魏時夫餘庫有玉璧珪瓚傳世以為寶耆老言先代所賜其印文言濊王之印國有故城名濊城蓋本濊貊之地又濊傳云武帝滅朝鮮置樂浪郡自單單大嶺以西屬樂浪自嶺以東七縣都尉主之皆以濊為民今不耐濊皆其種也班志樂浪東部都尉治不耐縣薉音濊降戶江翻考異曰史記平準書曰彭吳賈滅朝鮮置蒼海之郡按滅朝鮮置蒼海兩事也不知何者出賈之謀擬於南夷燕齊之間靡然騷動六年是歲魯共王餘長沙定王發皆薨二王皆景帝子餘以前二年受封淮陽三年徙魯發亦以前二年受封長沙六年臨菑人主父偃趙武靈王自號主父支庶因以為氏無終人徐樂班志無終縣屬右北平郡春秋無終子之國始偃游齊燕趙皆莫能厚遇諸生相與排擯不容家貧假貸無所得乃西入關上書闕下朝奏暮召入所言九事其八事為律令一事諫伐匈奴其辭曰司馬法曰國雖大好戰必亡天下雖平忘戰必危師古曰司馬穰苴善用兵著書言兵法謂之司馬法一說司馬古主兵之官有軍陳用師之法余據史記齊威王使大夫追論古者司馬兵法而附穰苴於其中因號司馬穰苴兵法好呼到翻兵者凶器也爭者末節也夫務戰勝窮武事者未有不悔者也昔秦皇帝幷吞戰國務勝不休欲攻匈奴李斯諫曰不可夫匈奴無城郭之居委積之守委于偽翻積子智翻委積者倉廩之藏也鄭氏曰少曰委多曰積遷徙鳥舉難得而制也輕兵深入糧食必絕踵糧以行重不及事得其地不足以為利也得其民不可調而守也李奇曰不可和調也非民父母也靡敝中國師古曰靡散也音縻快心匈奴非長策也秦皇帝不聽遂使蒙恬將兵攻胡辟地千里辟讀曰闢以河為境地固沮澤鹹鹵不生五穀沮將預翻五穀黍稷菽麥稻或曰黍稷秫稻粱然後發天下丁男以守北河河水逕安定北地朔方界皆北流至高闕始屈而東流過雲中楨陵縣又屈而南流故朔方雲中之北謂之北河杜佑曰衞青渡西河至高闕破匈奴河自今靈武郡之西南便北流千餘里過九原郡乃東流時帝都在秦所謂西河疑是此處其高闕當在河之西也史記趙武靈王築長城自代並陰山下至高闕則與漢書符矣其河自九原東流千里在京師直北漢史即云北河斯則西河之側者死者不可勝數勝音升終不能踰河而北是豈人衆不足兵革不備哉其勢不可也又使天下蜚芻輓粟師古曰運載芻槁令其疾至故曰飛芻輓謂引車船也轉輸北河率三十鍾而致一石東腄漢書作黃腄師古曰黃腄二縣並在東萊言自東萊及琅邪緣海諸郡皆令轉輸至北河六斛四斗為鍾計其道路所費凡用一百九十二斛乃得一石至杜佑曰腄即今文登縣腄直睡翻又音誰不足於糧餉女子紡績不足於帷幕百姓靡敝靡美為翻孤寡老弱不能相養道路死者相望蓋天下始畔秦也及至高皇帝定天下略地於邊聞匈奴聚於代谷之外而欲擊之御史成進諫曰不可夫匈奴之性獸聚而鳥散從之如搏影師古曰搏擊也搏人之陰影言不可得余謂影隨物而生者也存滅不常難得而搏之臣竊危之高帝不聽遂北至於代谷果有平城之圍高皇帝蓋悔之甚乃使劉敬往結和親之約事見高帝紀夫匈奴難得而制非一世也行盜侵驅師古曰來侵邊竟而驅掠人畜也天性固然上及虞夏殷周固弗程督師古曰程課也督視責也畜許六翻不屬為人夫上不觀虞夏殷周之統而下循近世之失此臣之所大憂百姓之所疾苦也嚴安上書曰今天下人民用財侈靡車馬衣裘宮室皆競修飾調五聲使有節族蘇林曰族音奏師古曰節止也奏準也雜五色使有文章重五味方丈於前以觀欲天下孟康曰觀猶顯也師古曰顯示之使其慕欲也重直龍翻觀古玩翻見美則願之是教民以侈也侈而無節則不可贍民離本而徼末矣師古曰贍足也離力智翻徼要求也於堯翻故搢紳者不憚為詐帶劍者夸殺人以矯奪師古曰夸大也競也矯偽也是以犯法者衆臣願為民制度以防其淫使貧富不相燿以和其心心志定則盜賊消刑罰少陰陽和萬物蕃也師古曰蕃扶元翻多也昔秦王意廣心逸欲威海外使蒙恬將兵以北攻胡又使尉屠睢將樓船之士以攻越睢音雖當是時秦禍北構於胡南挂於越師古曰挂縣也進而不得退行十餘年丁男被甲丁女轉輸苦不聊生自經於道樹自經縊也及秦皇帝崩天下大畔滅世絕祀窮兵之禍也故周失之弱秦失之強不變之患也今徇西章乙十一行本西作南孔本同退齋校同夷朝夜郎降羌僰略薉州朝直遙翻降戶江翻僰蒲北翻薉音穢建城邑深入匈奴燔其龍城議者美之此人臣之利非天下之長策也徐樂上書曰臣聞天下之患在於土崩不在瓦解古今一也何謂土崩秦之末世是也陳涉無千乘之尊尺土之地身非王公大人名族之後鄉曲之譽非有孔曾墨子之賢陶朱猗頓之富也范蠡居於陶自號為陶朱公治產至鉅萬猗頓魯人用盬鹽起與王者埒富奮棘矜棘與戟同師古曰矜者戟之把也矜讀曰其巾翻呼火故翻天下從風此其故何也由民困而主不恤下怨而上不知俗已亂而政不脩此三者陳涉之所以為資也此之謂土崩故曰天下之患在乎土崩何謂瓦解吳楚齊趙之兵是也七國謀為大逆號皆稱萬乘之君帶甲數十萬威足以嚴其境內財足以勸其士民然不能西攘尺寸之地師古曰攘謂侵取漢也此其故何也非權輕於匹夫而兵弱於陳涉也當是之時先帝之德未衰而安土樂俗之民衆樂音洛故諸侯無竟外之助師古曰竟讀曰境此之謂瓦解故曰天下之患不在瓦解此二體者安危之明要賢主之所宜留意而深察也間者關東五穀數不登年歲未復民多窮困重之以邊境之事數所角翻師古曰復扶目翻重直用翻推數循理而觀之民宜有不安其處者矣不安故易動易動者土崩之勢也易以豉翻故賢主獨觀萬化之原明於安危之機脩之廟堂之上而銷未形之患也其要期使天下無土崩之勢而已矣書奏天子召見三人謂曰公等皆安在何相見之晚也皆拜為郎中考異曰漢書主父偃傳云元光元年三人上書按嚴安書云徇南夷朝夜郎降羌僰略薉州此等事皆在元光元年後蓋誤以朔字為光字耳一歲中凡四遷為中大夫大臣畏其口賂遺累千金或謂偃曰太橫矣遺于季翻橫戶孟翻偃曰吾生不五鼎食死即五鼎烹耳張晏曰五鼎牛羊豕魚麋也諸侯五卿大夫三孔穎達曰少牢陳五鼎羊一豕二膚三魚四腊五師古曰五鼎烹謂被鑊烹之誅為主父偃被誅張本二年二年冬賜淮南王几杖毋朝朝直遙翻考異曰漢書武紀曰賜淮南菑川王几杖毋朝顏師古曰淮南王安菑川王志皆武帝諸父列也故賜几杖按諸侯表菑川王志在位三十五年以元光五年薨齊悼惠王世家高五王傳皆同此云菑川王志誤也二年主父偃說上曰古者諸侯不過百里強弱之形易制今諸侯或連城數十地方千里緩則驕奢易為淫亂急則阻其強而合從以逆京師說式芮翻易以豉翻從子容翻以法割削之則逆節萌起師古曰萌謂事之始生如草木之萌芽也事見十六卷景帝前三年鼂直遙翻錯千故翻而適嗣代立適讀曰嫡餘雖骨肉無尺地之封則仁孝之道不宣願陛下令諸侯得推恩分子弟以地侯之彼人人喜得所願上以德施實分其國不削而稍弱矣上從之春正月詔曰諸侯王或欲推私恩分子弟邑者令各條上上時掌翻朕且臨定其號名於是藩國始分而子弟畢侯矣二年匈奴入上谷漁陽殺略吏民千餘人遣衞青李息出雲中以西至隴西擊胡之樓煩白羊王於河南得胡首虜數千牛羊百餘萬走白羊樓煩王遂取河南地詔封青為長平侯班志長平侯國屬汝南郡封建為平陵侯次公為岸頭侯據功臣表平陵侯食邑於南陽郡武當縣界晉灼曰河東皮氏縣有岸頭亭校戶教翻主父偃言河南地肥饒外阻河蒙恬城之以逐匈奴內省轉輸戍漕廣中國滅胡之本也上下公卿議皆言不便下遐嫁翻上竟用偃計立朔方郡使蘇建興十餘萬人築朔方城括地志夏州朔方縣北什賁故城按是蘇建築什賁之號蓋出蕃語也宋白曰漢朔方郡治三封縣今長澤縣有三封故城什賁故城今為德靜縣治因河為固轉漕甚遠自山東咸被其勞被皮義翻費數十百鉅萬府庫並虛漢亦棄上谷之斗辟縣造陽地以予胡孟康曰縣斗僻曲近胡師古曰斗絕也縣之斗曲入匈奴界者其中造陽地也杜佑曰造陽在今媯川郡之北辟讀曰僻予讀曰與二年三月乙亥晦日有食之二年夏募民徙朔方十萬口二年主父偃說上曰茂陵初立初立於建元二年幷兼之家亂衆之民皆可徙茂陵內實京師外銷姦猾此所謂不誅而害除上從之徙郡國豪傑及訾三百萬以上于茂陵訾與貲同軹人郭解班志軹縣屬河內郡音止關東大俠也亦在徙中衞將軍為言郭解家貧不中徙為于偽翻言其貧不當在見徙之數中竹仲翻上曰解布衣權至使將軍為言師古曰將軍為之言是為其所使也卒徙解家卒子恤翻解平生睚眦殺人甚衆師古曰睚音厓舉眼也眦即眥字謂目匡也言舉眼相忤者即殺之也一說睚五懈翻眦士懈翻睚眦瞋目貌二說並通上聞之下吏捕治解下遐嫁翻所殺皆在赦前軹有儒生侍使者坐客譽郭解譽音余生曰解專以姦犯公法何謂賢解客聞殺此生斷其舌斷丁管翻吏以此責解解實不知殺者殺者亦章乙十一行本亦下有竟字孔本同絕莫知為誰吏奏解無罪公孫弘議曰解布衣為任俠行權以睚眦殺人解雖弗知此罪甚於解殺之當大逆無道當謂處斷其罪蓋以大逆無道之罪坐郭解也考異曰荀紀以郭解事著於建元二年按武紀建元二年初置茂陵邑三年賜徙茂陵者錢當是時衞青公孫弘皆未貴又元朔二年徙郡國豪傑于茂陵此乃徙解之時也班固曰古者天子建國諸侯立家自卿大夫以至于庶人各有等差是以民服事其上而下無覬覦師古曰覬幸也覦欲也幸得其所欲也覬音冀覦音俞又音喻禮樂征伐自諸侯出桓文之後大夫世權陪臣執命師古曰陪重也大夫世權晉六卿魯三桓齊田氏是也陪臣執命陽虎之類是也諸侯之臣於天子為陪臣大夫之家臣於諸侯為陪臣合從連衡從子容翻衡讀曰橫繇是列國公子魏有信陵趙有平原齊有孟嘗楚有春申皆藉王公之勢競為游俠雞鳴狗盜事見三卷赧王十七年而趙相虞卿棄國捐君以周窮交魏齊之厄事見五卷周赧王五十六年竊符矯命戮將專師以赴平原之急事見五卷赧王五十七年將即亮翻顯名天下搤腕而游談者以四豪為稱首師古曰搤捉持也音戹腕烏貫翻四豪即魏信陵以下也於是背公死黨之議成守職奉上之義廢矣背蒲妹翻及至漢興禁網疏闊未知匡改也是故代相陳豨從車千乘而吳濞淮南皆招賓客以千數從才用翻濞普懿翻外戚大臣魏其武安之屬競逐於京師布衣游俠劇孟郭解之徒馳騖於閻閭權行州域力折公侯衆庶榮其名迹覬而慕之雖其陷於刑辟辟毗亦翻自與殺身成名若季路仇牧死而不悔季路死於衞侯輒之難仇牧死於宋閔公之難事並見左傳上失其道民散久矣見論語示之以好惡好呼到翻惡烏路翻齊之以禮法民曷由知禁而反正乎古之正法五伯三王之罪人也而六國五伯之罪人也伯讀曰霸夫四豪者又六國之罪人也況於郭解之倫以匹夫之細竊殺生之權其罪已不容於誅矣觀其溫良泛愛振窮周急謙退不伐亦皆有絕異之姿惜乎不入於道德苟放縱於末流殺身亡宗非不幸也荀悅論曰世有三遊德之賊也一曰遊俠二曰遊說三曰遊行說式芮翻行下孟翻立氣勢作威福結私交以立強於世者謂之遊俠飾辯辭設詐謀馳逐於天下以要時勢者謂之遊說要一遙翻色取仁以合時好好呼到翻連黨類立虛譽以為權利者謂之遊行此三者亂之所由生也傷道害德敗法惑世敗補邁翻先王之所慎也國有四民各修其業不由四民之業者謂之姦民四民士農工商也王道乃成凡此三遊之作生於季世周秦之末尤甚焉上不明下不正制度不立綱紀弛廢以毀譽為榮辱不核其真譽音余下同以愛憎為利害不論其實以喜怒為賞罰不察其理上下相冒萬事乖錯是以言論者計薄厚而吐辭選舉者度親疏而舉筆度徒洛翻善惡謬於衆聲功罪亂於王法然則利不可以義求害不可以道避也是以君子犯禮小人犯法奔走馳騁越職僭度飾華廢實競趣時利趣七喻翻簡父兄之尊而崇賓客之禮薄骨肉之恩而篤朋友之愛忘脩身之道而求衆人之譽割衣食之業以供饗宴之好好呼到翻苞苴盈於門庭聘問交於道路裹曰苞藉曰苴詩箋以果實相遺者苞苴之又曰苞苴裹魚肉或以葦或以茅左傳註云聘執玉帛以相存問私務衆於官事於是流俗成而正道壞矣是以聖王在上經國序民正其制度善惡要於功罪而不淫於毀譽要一遙翻聽其言而責其事舉其名而指其實故實不應其聲者謂之虛情不覆其貌者謂之偽覆敷又翻毀譽失其真者謂之誣言事失其類者謂之罔虛偽之行不得設行下孟翻誣罔之辭不得行有罪惡者無僥倖無罪過者不憂懼請謁無所行請求也謁告也息華文去浮辭去羌呂翻禁偽辯絕淫智放百家之紛亂壹聖人之至道養之以仁惠文之以禮樂則風俗定而大化成矣二年燕王定國與父康王姬姦奪弟妻為姬殺肥如令郢人肥如燕之屬縣燕國除入漢屬遼西郡應劭曰肥子奔燕燕封於此主父偃從中發其事公卿請誅定國上許之定國自殺國除文帝初王澤始封於燕傳子康王嘉文帝九年嘉薨定國嗣蓋立四十二年矣齊厲王次昌亦與其姊紀翁主通齊孝王將閭文帝十六年受封傳子懿王壽壽傳次昌齊紀太后不許偃因言於上曰齊臨菑十萬戶市租千金人衆殷富鉅於長安非天子親弟愛子不得王此王于況翻今齊王於親屬益疏疏與疎同請治之於是帝拜偃為齊相且正其事偃至齊急治王後宮宦者辭及王王懼飲藥自殺偃少時游齊及燕趙少詩照翻及貴連敗燕齊敗補邁翻趙王彭祖懼彭祖景帝子前二年封廣川五年徙趙以故諸侯子弟多以得封者及齊王自殺上聞大怒以為偃劫其王令自殺乃徵下吏章乙十一行本吏下有治字孔本同張校同下遐嫁翻偃服受諸侯金實不劫王令自殺上欲勿誅公孫弘曰齊王自殺無後國除為郡入漢主父偃本首惡陛下不誅偃無以謝天下乃遂族主父偃二年張歐免上欲以蓼侯孔臧為御史大夫班志蓼縣屬衡山國春秋之蓼國也音了康曰音六未知其何據蓼侯孔聚高祖功臣臧其子也臧自言世修經學蓋謂孔子後也安國為從弟安國孔子十三世孫臧辭曰臣世以經學為業乞為太常典臣家業與從弟侍中安國百官表侍中加官得出入禁中應劭曰入侍天子故曰侍中續漢書曰侍中比二千石無員漢官儀曰侍中左蟬右貂本秦丞相史往來殿內故謂之侍中分掌乘輿服物下至褻器虎子之屬武帝時孔安國為侍中以其儒者特聽掌御座唾壺朝廷榮之從才用翻使永垂來嗣上乃以臧為太常其禮賜如三公三年三年冬匈奴軍臣單于死其弟左谷蠡王伊稚斜自立為單于匈奴左右谷蠡王在左右賢王之下谷蠡音鹿黎索隱曰稚持利翻斜士嗟翻鄒誕生音直牙翻蓋稚斜胡人語近得其實於單亡降漢於單音丹降戶江翻三年以公孫弘為御史大夫是時方通西南夷東置蒼海北築朔方之郡公孫弘數諫以為罷敝中國以奉無用之地願罷之數所角翻為罷讀曰疲天子使朱買臣等難以置朔方之便發十策弘不得一師古曰言其利害十條弘無以應之難乃旦翻山東鄙人不知其便若是願罷西南夷蒼海而專奉朔方上乃許之春罷蒼海郡弘為布被食不重肉言不重肉味也重音直龍翻弘位在三公奉祿甚多奉扶用翻然為布被此詐也上問弘弘謝曰有之夫九卿與臣善者無過黯然今日廷詰弘誠中弘之病中竹仲翻夫以三公為布被與小吏無差誠飾詐欲以釣名師古曰釣取也言若釣魚之謂也且無汲黯忠陛下安得聞此言天子以為謙讓愈益尊之三年三月赦天下三年夏四月丙子封匈奴太子於單為涉安侯數月而卒三年初匈奴降者言月氏故居敦煌祁連間為強國降戶江翻氏音支敦煌張掖匈奴破月氏使昆邪王居之漢開置郡祁連山名即天山也匈奴呼天為祁連在張掖西北敦徒門翻匈奴冒頓攻破之老上單于殺月氏王以其頭為飲器餘衆遁逃遠去怨匈奴無與共擊之上募能通使月氏者使疏吏翻漢中張騫以郎應募出隴西徑匈奴中單于得之留騫十餘歲騫得間亡鄉月氏間古莧翻鄉讀曰嚮西走數十日至大宛西域傳大宛國治貴山城去長安萬二千五百七十里西南至大月氏所居六百九十里宛於元翻欲通不得見騫喜為發導譯抵康居導者引路之人譯者傳言之人也康居國治樂越匿地到卑闐城去長安萬二千三百里為于偽翻傳張戀翻大月氏太子為王既擊大夏分其地而居之大夏國在大宛西南都媯水南月氏居媯水北少寇少詩沼翻殊無報胡之心騫留歲餘竟不能得月氏要領李奇曰要領要契也師古曰要衣要也領衣領也凡持衣者執要與領言騫不能得月氏意趣無以持歸於漢故以要領為喻要一遙翻並南山史記曰南山即連終南山從京南東至華山東北連延至海即中條山也從京南而西連接至葱嶺萬餘里故云並南山也西域傳云其南山東出金城與漢南山屬還從宣翻又如字下同並步浪翻復為匈奴所得復扶又翻留歲餘會伊稚斜逐於單匈奴國內亂騫乃與堂邑氏奴甘父逃歸服虔曰堂邑姓也漢人其奴名甘父父音甫甘父為奉使君騫初行時百餘人去十三歲唯二人得還考異曰史記西南夷傳曰元狩元年張騫使大夏來言通身毒國之利按年表騫以元朔六年二月甲辰封博望侯必非元狩元年始歸也或者元狩元年天子始令騫通身毒國疑不能明故因是歲伊稚斜立終言之三年匈奴數萬騎入塞殺代郡太守恭代郡唐蔚州武州界三年六月庚午皇太后崩武帝母王太后也三年秋罷西夷獨置南夷夜郎兩縣一都尉稍令犍為自葆就師古曰葆與保同令自保守且成其郡縣三年匈奴又入鴈門殺略千餘人三年是歲中大夫張湯為廷尉湯為人多詐舞智以御人時上方鄉文學鄉讀曰嚮湯陽浮慕事董仲舒公孫弘等以千乘兒寬為奏讞掾兒本郳姓以國為氏其後去邑以為廷尉掾專主奏讞也兒五奚翻讞魚蹇翻掾俞絹翻所治即上意所欲罪與監史深禍者班表廷尉有左右監秩千石漢官曰廷尉獄史二十七人深禍謂持文深刻欲致人於禍者與監史輕平者上由是悅之湯於故人子弟調護之尤厚師古曰調和適之令得其所護謂保佑之也師古曰造詣至也請謁問也造七到翻是以湯雖文深意忌不專平文深謂持文深意忌謂其意忌前也不專平謂不專於持平也汲黯數質責湯於上前質對也對面責之也或曰質正也以正義責之數所角翻公為正卿漢官九卿之外又有列於九卿者故謂九卿為正卿下不能抑天下之邪心安國富民使囹圄空虛何空取高皇帝約束紛更之為師古曰言何為乃紛亂而改更也更工衡翻言當誅及子孫種章勇翻湯辯常在文深小苛黯伉厲守高伉口浪翻健也高也厲嚴也不能屈忿發罵曰天下謂刀筆吏不可以為公卿果然必湯也令天下重足而立累足而立懼之甚也重直龍翻四年四年冬上行幸甘泉四年夏匈奴入代郡定襄上郡上郡唐延綏銀之地高祖置定襄郡括地志定襄故城在朔州善陽縣北三百八十里殺略數千人聶崇岐標點容肇祖覆校
