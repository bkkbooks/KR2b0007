body:
  text: 資治通鑑卷第一百五端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰權判西京留司御史臺上柱國河內郡開國侯食邑一千三百戶食實封四百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註晉紀二十七烈宗孝武皇帝上之下太元八年癸未三八三春正月秦呂光發長安以鄯善王休密馱車師前部王彌窴為鄉導鄯上扇翻馱唐何翻窴徒賢翻又唐見翻鄉讀曰嚮三月丁巳大赦夏五月桓沖帥衆十萬伐秦攻襄陽帥讀曰率遣前將軍劉波等攻沔北諸城沔彌兗翻輔國將軍楊亮攻蜀拔五城進攻涪城涪音浮鷹揚將軍郭銓攻武當六月沖別將攻萬歲筑陽拔之萬歲城名蓋近筑陽筑陽縣漢屬南陽郡晉屬順陽郡春秋穀伯之國也唐為襄州穀城縣師古曰筑音逐冠故玩翻騎奇寄翻後將軍張蚝步兵校尉姚萇救涪城蚝七吏翻萇仲良翻叡軍于新野垂軍于鄧城鄧城縣屬襄陽郡蓋晉置也秋七月郭銓及冠軍將軍桓石虔敗張崇于武當敗補邁翻掠二千戶以歸鉅鹿公叡遣慕容垂為前鋒進臨沔水垂夜命軍士人持十炬繫于樹枝光照數十里沖懼退還上明沖鎮上明見上卷二年斜余遮翻谷音浴又古祿翻楊亮引兵還沖表其兄子石民領襄城張城作陽太守戍夏口沖自求領江州刺史詔許之秦王堅下詔大舉入寇民每十丁遣一兵其良家子年二十已下有材勇者皆拜羽林郎又曰其以司馬昌明為尚書左僕射謝安為吏部尚書桓沖為侍中勢還不遠謂以勢言之克晉之期近在旦夕還師不遠也還音旋又如字為于偽翻良家子至者三萬餘騎騎奇寄翻下同拜秦州主簿章十二行本簿下有金城二字乙十一行本同孔本同張校同趙盛之為少年都統都統官名起於此少詩照翻下同朝臣皆不欲堅行朝直遙翻獨慕容垂姚萇及良家子勸之陽平公融言於堅曰鮮卑羌虜我之仇讎慕容垂鮮卑也姚萇羌也其國皆為秦所滅雖曰臣服其實仇讎所陳策畫何可從也良家少年皆富饒子弟不閑軍旅苟為諂諛之言以會陛下之意會會合也輕舉大事臣恐功既不成仍有後患悔無及也堅不聽八月戊午堅遣陽平公融督張蚝慕容垂等步騎二十五萬為前鋒以兗州刺史姚萇為龍驤將軍督益梁州諸軍事堅謂萇曰昔朕以龍驤建業堅以龍驤將軍殺苻生得秦國驤思將翻卿其勉之左將軍竇衝曰王者無戲言此不祥之徵也堅默然慕容楷慕容紹言於慕容垂曰主上驕矜已甚叔父建中興之業在此行也垂曰然非汝誰與成之至此垂知堅必敗方與兄子明言之甲子堅發長安戎卒六十餘萬騎二十七萬旗鼓相望前後千里九月堅至項城涼州之兵始達咸陽蜀漢之兵方順流而下幽冀之兵至于彭城東西萬里水陸齊進運漕萬艘艘蘇遭翻陽平公融等兵三十萬先至潁口潁水入淮之口也地理志潁水出陽城縣陽乾山東至下蔡入淮詔以尚書僕射謝石為征虜將軍征討大都督以徐兗二州刺史謝玄為前鋒都督與輔國將軍謝琰西中郎將桓伊等衆共八萬拒之使龍驤將軍胡彬以水軍五千援壽陽琰安之子也是時秦兵既盛都下震恐謝玄入問計於謝安安夷然夷坦也平也言坦然無異平日也已別有旨既而寂然玄不敢復言乃令張玄重請復扶又翻重直用翻安遂命駕出遊山墅墅承與翻園廬也親朋畢集與玄圍棋賭墅安棋常劣於玄是日玄懼便為敵手而又不勝敵手謂下子爭行劫智算相敵也玄意不在棋故不能勝安至夜乃還還從宣翻又如字桓沖深以根本為憂遣精銳三千入衞京師謝安固卻之曰朝廷處分已定處昌呂翻分扶問翻兵甲無闕西藩宜留以為防沖對佐吏歎曰諸藩府參佐為佐吏謝安石有廟堂之量不閑將略將即亮翻今大敵垂至方遊談不暇遣諸不經事少年拒之衆又寡弱天下事已可知吾其左衽矣以琅邪王道子錄尚書六條事錄尚書六條事始於劉聰冬十月秦陽平公融等攻壽陽癸酉克之執平虜將軍徐元喜等融以其參軍河南郭褒為淮南太守淮南郡本治壽陽秦既得之以郭褒為太守杜預曰江夏雲杜縣東南有鄖城鄖于分翻退保硤石水經註淮水東過壽春縣北右合肥水又北逕山峽中謂之峽石對岸山上結二城以防津要杜佑曰硤石今汝陰郡下蔡縣秦衞將軍梁成等帥衆五萬屯于洛澗柵淮以遏東兵水經註洛澗上承死馬塘水北歷秦墟下注淮謂之洛口帥讀曰率下同憚成不敢進胡彬糧盡潛遣使告石等曰今賊盛糧盡恐不復見大軍復扶又翻秦人獲之送於陽平公融融馳使白秦王堅曰賊少易擒但恐逃去宜速赴之使疏吏翻下同融持議以為晉不可伐今臨敵乃輕脫如此亦天奪其鑒也少詩沼翻易以豉翻堅乃留大軍於項城引輕騎八千兼道就融於壽陽遣尚書朱序來說謝石等以為強弱異勢不如速降三年堅執朱序於襄陽拜為度支尚書說輸芮翻降戶江翻若秦百萬之衆盡至誠難與為敵今乘諸軍未集宜速擊之若敗其前鋒敗補邁翻則彼已奪氣可遂破也石聞堅在壽陽甚懼欲不戰以老秦師謝琰勸石從序言十一月謝玄遣廣陵相劉牢之帥精兵五千趣洛澗趣七喻翻未至十里梁成阻澗為陳以待之陳讀曰陣下同牢之直前渡水擊成大破之斬成及弋陽太守王詠曹魏分西陽蘄春置弋陽郡秦未能有其地也王詠領太守耳弋陽唐為光蘄黃三州之地斷丁管翻秦步騎崩潰爭赴淮水士卒死者萬五千人執秦揚州刺史王顯等盡收其器械軍實於是謝石等諸軍水陸繼進秦王堅與陽平公融登壽陽城望之見晉兵部陣嚴整又望八公山上草木皆以為晉兵八公山在今壽春縣北四里世傳漢淮南王安好神仙忽有八公皆鬚眉皓素詣門求見門者曰吾王好長生今先生無駐衰之術未敢以聞八公皆變成童遂立廟於山上或言今廟食于此山者乃左吳朱驕伍被雷被等八人皆淮南王客世以八公為仙誤也此亦勍敵何謂弱也勍渠京翻強也憮然始有懼色憮罔甫翻悵然失意貌秦兵逼肥水而陳晉兵不得渡謝玄遣使謂陽平公融曰君懸軍深入而置陳逼水此乃持久之計非欲速戰者也若移陳少卻少詩沼翻下同使晉兵得渡以決勝負不亦善乎秦諸將皆曰我衆彼寡不如遏之使不得上上時掌翻可以萬全堅曰但引兵少卻使之半渡我以鐵騎蹙而殺之蔑不勝矣融亦以為然遂麾兵使卻秦兵遂退不可復止兩陳相向退者先敗此用兵之常勢也復扶又翻融馳騎略陳欲以帥退者帥讀曰率馬倒為晉兵所殺秦兵遂潰玄等乘勝追擊至于青岡青岡去今壽春縣三十里自相蹈藉而死者蔽野塞川言敗兵自相蹈踐枕藉而死也藉慈夜翻塞悉則翻皆以為晉兵且至晝夜不敢息草行露宿草行者涉草而行不敢山路露宿者宿於野次不敢入人家皆懼追兵也重直用翻死者什七八初秦兵少卻朱序在陳後呼曰呼火故翻秦兵敗矣衆遂大奔序因與張天錫徐元喜皆來奔獲秦王堅所乘雲母車章十二行本車下有及儀服器械軍資珍寶畜產不可勝計十五字乙十一行本同孔本同張校同退齋校同晉制雲母車以雲母飾犢車臣下不得乘以賜王公耳趙彥絟續古今註石虎皇后乘輦以純雲母代紗四望皆通徹復取壽陽執其淮南太守郭褒晉復取壽陽故秦所置太守見執堅中流矢中竹仲翻單騎走至淮北飢甚民有進壺飧豚髀者飧蘇昆翻熟食曰飧字林曰水澆飯也堅食之賜帛十匹綿十斤辭曰陛下厭苦安樂樂音洛自取危困臣為陛下子陛下為臣父安有子飼其父而求報乎弗顧而去飼祥吏翻堅謂張夫人曰吾今復何面目治天下乎復扶又翻治直之翻潸然流涕潸所姦翻涕流貌又所版翻所晏翻是時諸軍皆潰惟慕容垂所將三萬人獨全垂別擊鄖城不與淝水之戰且持軍嚴整故諸軍皆潰而垂軍獨全將即亮翻世子寶言於垂曰家國傾覆天命人心皆歸至尊但時運未至故晦迹自藏耳今秦主兵敗委身於我是天借之便以復燕祚此時不可失也願不以意氣微恩忘社稷之重意氣微恩謂堅厚禮垂父子也汝言是也然彼以赤心投命於我若之何害之天苟棄之不患不亡不若保護其危以報德徐俟其釁而圖之既不負宿心且可以義取天下慕容垂此言猶有君人之度秦強而幷燕秦弱而圖之此為報仇雪恥非負宿心也兄柰何得而不取釋數萬之衆以授人乎垂曰吾昔為太傅所不容置身無所逃死於秦見一百二卷海西公太和四年恩禮備至後復為王猛所賣復扶又翻下尚復德復同無以自明秦主獨能明之見太和五年若氐運必窮吾當懷集關東以復先業耳關西會非吾有也冠軍行參軍趙秋曰明公當紹復燕祚著於圖讖冠古玩翻讖楚譖翻今天時已至尚復何待若殺秦主據鄴都鼓行而西三秦亦非苻氏之有也垂親黨多勸垂殺堅垂皆不從悉以兵授堅平南將軍慕容暐屯鄖城聞堅敗棄其衆遁去至滎陽慕容德復說暐起兵以復燕祚尚復德復扶又翻說輸芮翻暐不從謝安得驛書知秦兵已敗時方與客圍棋攝書置牀上了無喜色攝收也客問之徐答曰小兒輩遂已破賊既罷還內過戶限不覺屐齒之折言其喜甚也史言安矯情鎮物人臣以安社稷為悅者也大敵壓境一戰而破之安得不喜乎屐齒之折亦非安之訾也丁亥謝石等歸建康得秦樂工能習舊聲於是宗廟始備金石之樂永嘉之亂伶官樂器皆沒於劉石江左初立宗廟以無雅樂及伶人省太樂幷鼓吹令是後頗得登歌食舉之樂猶有未備太寧末明帝又訪阮孚等增益之咸和中成帝乃復置太樂官鳩集遺工而尚未有金石也及慕容儁平冉閔兵戈之際鄴下樂人頗亦有來者謝尚鎮壽陽採拾樂人以備太樂幷制石磬雅樂始頗具而王猛平鄴慕容氏所得樂聲又入關右今破苻堅獲其樂工楊蜀等閑習舊樂於是金石始備焉乙未以張天錫為散騎常侍散悉亶翻騎奇寄翻秦王堅收集離散比至洛陽比必寐翻衆十餘萬百官儀物軍容粗備粗坐五翻慕容農謂慕容垂曰尊不迫人於險尊謂其父垂也慕容令亦呼垂為尊蓋其父子間常稱也農聞祕記曰燕復興當在河陽燕於賢翻夫取果於未熟與自落不過晚旬日之間然其難易美惡相去遠矣易以豉翻垂心善其言行至澠池澠彌兗翻言於堅曰北鄙之民聞王師不利輕相扇動臣請奉詔書以鎮慰安集之因過謁陵廟垂欲因行自謁其祖父陵廟也權翼諫曰國兵新破四方皆有離心宜徵集名將置之京師以固根本鎮枝葉將即亮翻垂勇略過人世豪東夏頃以避禍而來其心豈止欲作冠軍而已哉夏戶雅翻冠古玩翻譬如養鷹飢則附人每聞風飆之起常有陵霄之志正宜謹其絛籠飊扶搖風也釋曰疾風自下而上曰飊音卑遙翻絛他刀翻絲繩也所以紲鷹任其所欲哉堅曰卿言是也然朕已許之匹夫猶不食言孔安國曰食言者食盡其言偽不實乘繩證翻若天命有廢興固非智力所能移也翼曰陛下重小信而輕社稷臣見其往而不返關東之亂自此始矣堅不聽遣將軍李蠻閔亮尹固章十二行本固作國乙十一行本同帥衆三千送垂又遣驍騎將軍石越帥精卒三千戍鄴驃騎將軍張蚝帥羽林五千戍幷州鎮軍將軍毛當帥衆四千戍洛陽驍堅堯翻騎奇寄翻下同帥讀曰率下同驃匹妙翻蚝七吏翻權翼密遣壯士邀垂於河橋南空倉中垂疑之自涼馬臺結草筏以渡水經註東郡白馬縣有涼城河水逕其北有神馬亭西去白馬津可二十許里實中層峙南北二百步東西五十許步今按神馬亭既在東郡白馬正對黎陽岸垂安得越滎洛而至此渡河乎此涼馬臺蓋在富平津橋之西也涼馬臺由昔人於河渚浴馬浴竟驅馬就高納涼因名乘己馬與僮僕趣河橋典軍蓋王國官垂在燕為吳王時所置也同衣於既翻趣七喻翻同馳馬獲免十二月秦王堅至長安哭陽平公而後入諡曰哀公大赦復死事者家復方目翻復其家之賦役也庚午大赦以謝石為尚書令進謝玄號前將軍固讓不受謝安壻王國寶坦之之子也安惡其為人惡烏路翻每抑而不用以為尚書郎國寶自以望族故事唯作吏部不為餘曹尚書郎晉制三十五曹置郎二十三人更相統攝及江左無直事右民屯田車部別兵都兵騎兵左右士運曹十曹郎康穆以後又無虞曹二千石二郎但有殿中祠部吏部儀曹三公比部金部倉部度支都官左民起部水部主客駕部庫部中兵外兵十八曹後又省主客起部水部餘十五曹而吏部最為清選由是怨安國寶從妹為會稽王道子帝與道子皆嗜酒狎昵邪諂從才用翻昵尼質翻國寶乃譖安於道子使離間之於帝間古莧翻安功名既盛而險詖求進之徒多毀短安帝由是稍疎忌之詖彼義翻初開酒禁漢建安中曹公嚴酒禁口五石咸和五年成帝始度百姓田取十分之一率畝稅米三升哀帝即位減田租畝收二升太元二年帝除度田收租之制公王以下口稅三斛唯蠲在役之身至是年又增稅米口五石秦呂光行越流沙三百餘里自玉門出渡流沙西行至鄯善北行至車師又且末國在鄯善西其國之西北有流沙數百里夏日有熱風為行旅之患風之所至唯老駝預知之即嗔而聚立埋其口鼻於沙中人每以為候亦即將氈擁蔽鼻口其風迅駛斯須過盡若不防者必致危斃桑欽曰流沙地在張掖居延縣西北杜佑曰流沙在沙州敦煌郡西八十里酈道元曰弱水入流沙流沙與水流行也亦言出鍾山西行極崦嵫之山在西海郡北流沙又逕浮渚歷壑市之國又逕于鳥山之東朝雲國西歷崐山西南出于過瀛之山大荒山經曰西南海之外流沙出焉衍降戶江翻惟龜茲王帛純拒之龜茲音丘慈嬰城固守光進軍攻之秦王堅之入寇也以乞伏國仁為前將軍領先鋒騎騎奇寄翻會國仁叔父步頹反於隴西堅遣國仁還討之國仁代司繁鎮勇士見上卷元年大喜迎國仁於路國仁置酒大言曰苻氏疲民逞兵殆將亡矣吾當與諸君共建一方之業及堅敗國仁遂迫脅諸部有不從者擊而併之衆至十餘萬慕容垂至安陽安陽在鄴城西南樂音洛丕聞垂北來疑其欲為亂然猶身自迎之趙秋勸垂於座取丕因據鄴起兵垂不從丕謀襲擊垂侍郎天水姜讓諫曰晉制王國置侍郎二人垂反形未著而明公亶殺之非臣子之義不如待以上賓之禮嚴兵衞之密表情狀聽敕而後圖之丕從之館垂於鄴西館音貫垂潛與燕之故臣謀復燕祚會丁零翟斌起兵叛秦丁零種落本居中山苻堅之滅燕也徙於新安斌仕秦為衞軍從事中郎斌音彬秦王堅驛書使垂將兵討之將即亮翻石越言於丕曰王師新敗民心未安負罪亡匿之徒思亂者衆故丁零一唱旬日之中衆已數千此其驗也慕容垂燕之宿望有興復舊業之心今復資之以兵此為虎傅翼也今復扶又翻為于偽翻傅讀曰附丕曰垂在鄴如藉虎寢蛟藉慈夜翻常恐為肘腋之變腋音亦今遠之於外不猶愈乎遠于願翻且翟斌凶悖悖蒲內翻又蒲沒翻必不肯為垂下使兩虎相斃吾從而制之此卞莊子之術也乃以羸兵二千及鎧仗之弊者給垂羸倫為翻鎧可亥翻又遣廣武將軍苻飛龍帥氐騎一千為垂之副帥讀曰率騎奇寄翻密戒飛龍曰垂為三軍之帥卿為謀垂之將行矣勉之成都王穎使和演圖王浚殷浩使魏憬圖姚襄苻丕使苻飛龍圖慕容垂智略不足以濟其敗同一轍也帥所類翻將即亮翻垂請入鄴城拜廟燕都鄴故廟在鄴城乃潛服而入亭吏禁之垂怒斬吏燒亭而去石越言於丕曰垂敢輕侮方鎮殺吏燒亭反形已露可因此除之丕曰淮南之敗垂侍衞乘輿乘繩證翻此功不可忘也越曰垂尚不忠於燕安能盡忠於我失今不取必為後患丕不從越退告人曰公父子好為小仁不顧大計終當為人禽耳丕父子後卒如越之言好呼到翻垂留慕容農慕容楷慕容紹於鄴行至安陽之湯池閔亮李毗自鄴來以丕與苻飛龍所謀告垂幾事不密則害成苻飛龍固不足以辦垂況其謀已泄邪吾盡忠於苻氏而彼專欲圖吾父子吾雖欲已得乎已止也少詩沼翻停河內募兵旬日間有衆八千平原公暉遣使讓垂趣使進兵遣使疏吏翻趣讀曰促垂謂飛龍曰今寇賊不遠河內距新安洛陽止隔大河耳故云然襲其不意飛龍以為然壬午夜垂遣世子寶將兵居前少子隆勒兵從己將即亮翻少詩照翻令氐兵五人為伍陰與寶約聞鼓聲前後合擊氐兵及飛龍盡殺之參佐家在西者皆遣還幷以書遺秦王堅言所以殺飛龍之故蓋言丕使飛龍圖己故殺之也遺于季翻初垂從堅入鄴見一百二卷海西公太和五年事見太和四年然猶不忍殺麟置之外舍希得侍見見賢遍翻及殺苻飛龍麟屢進策畫啟發垂意垂意所欲為而思慮偶有所未及麟能迎其機言之故謂之啟發寵待與諸子均矣為後麟亂燕張本慕容鳳及燕故臣之子燕郡王騰遼西段延等段延蓋段國之種燕於賢翻各帥部曲歸之帥讀曰率平原公暉使武平武侯毛當討斌慕容鳳曰鳳今將雪先王之恥燕之亡也鳳父桓死難事見一百二卷海西公太和五年為于偽翻乃擐甲直進擐音宦丁零之衆隨之大敗秦兵敗補邁翻斬毛當遂進攻陵雲臺戍克之收萬餘人甲仗陵雲臺魏文帝所築在洛城西秦置戍焉癸未慕容垂濟河焚橋有衆三萬留遼東鮮卑可足渾譚集兵於河內之沙城言河內以別魏郡之沙城燕主皝后可足渾氏譚蓋亦燕之戚黨也密告慕容農等使起兵相應時日已暮農與慕容楷留宿鄴中慕容紹先出至蒲池蒲池在鄴城外慕容儁與㣥臣宴處甲申晦農楷將數十騎微服出鄴遂同奔列人列人縣漢屬鉅鹿郡魏晉屬廣平郡其地在鄴城東北魏收地形志魏郡臨漳縣有列人城又別有列人縣亦屬魏郡九年甲申三八四春正月乙酉朔秦長樂公丕大會賓客樂音洛請慕容農不得始覺有變遣人四出求之三日乃知其在列人已起兵矣慕容鳳王騰段延皆勸翟斌奉慕容垂為盟主斌從之垂欲襲洛陽且未知斌之誠偽乃拒之曰吾來救豫州秦平原公暉以豫州牧鎮洛陽君既建大事成享其福敗受其禍吾無預焉丙戌垂至洛陽平原公暉聞其殺苻飛龍閉門拒之翟斌復遣長史郭通往說垂復扶又翻說輸芮翻下同垂猶未許通曰將軍所以拒通者豈非以翟斌兄弟山野異類無奇才遠略必無所成故邪獨不念將軍今日憑之可以濟大業乎謂憑其衆可以成功也於是斌帥其衆來與垂會帥讀曰率下同勸垂稱尊號垂曰新興侯吾主也秦獲慕容暐封為新興侯垂以洛陽四面受敵欲取鄴而據之乃引兵而東故扶餘王餘蔚為滎陽太守餘蔚即太和五年開鄴北門納秦兵者蔚音紆勿翻降戶江翻垂至滎陽㣥下固請諡尊號垂乃依晉中宗故事晉元帝廟號中宗上時掌翻承制行事晉元帝稱王承制見九十卷建武元年㣥下稱臣文表奏疏封拜官爵皆如王者以弟德為車騎大將軍封范陽王騎奇寄翻兄子楷為征西大將軍封太原王燕本封德為范陽王今復其故楷恪子也恪封太原王今令楷襲父爵封河南王餘蔚為征東將軍統府左司馬封扶餘王衞駒為鷹揚將軍慕容鳳為建策將軍建策將軍亦慕容垂一時所署置也帥讀曰率自石門濟河長驅向鄴慕容農之奔列人也止於烏桓魯利家魯利本烏桓種而家於列人為于偽翻饌雛皖翻又雛戀翻饔也農笑而不食利謂其妻曰惡奴句絕惡奴蓋詈其妻之語家貧無以饌之柰何妻曰郎有雄才大志今無故而至必將有異非為飲食來也為于偽翻君亟出遠望以備非常利從之農謂利曰吾欲集兵列人以圖興復卿能從我乎利曰死生唯郎是從今世俗多呼其主為郎主又呼其主之子為郎君說之曰驤思將翻說輸芮翻下同家王已舉大事翟斌等咸相推奉遠近響應故來相告耳驤再拜曰得舊主而奉之敢不盡死於是農驅列人居民為士卒斬桑榆為兵裂襜裳為旗襜昌占翻爾雅曰衣蔽前也郭璞曰衣蔽膝也使趙秋說屠各畢聰聰與屠各卜勝張延李白郭超及東夷餘和敕勃屠直於翻餘和敕勃蓋二人易陽烏桓劉大易陽縣漢屬趙國魏晉屬陽平郡劉昫曰唐洺州臨洺縣古易陽縣也隋開皇六年更名帥讀曰率農假張驤輔國將軍劉大安遠將軍魯利建威將軍農自將攻破館陶館陶縣漢屬魏郡魏晉屬陽平郡將即亮翻收其軍資器械遣蘭汗段讚趙秋慕輿悕略取康臺牧馬數千匹悕香衣翻魏收地形志廣平郡平恩縣有康臺澤杜預曰不以道取曰略汗燕王垂之從舅讚聰之子也從才用翻於是步騎雲集衆至數萬驤等共推農為使持節都督河北諸軍事驃騎大將軍監統諸將使疏吏翻驃匹妙翻騎奇寄翻監工銜翻隨才部署上下肅然農以燕王垂未至不敢封賞將士趙秋曰軍無賞士不往言無賞以獎激之則士不往赴戰也皆欲建一時之功規萬世之利規圖也以廣中興之基農從之於是赴者相繼垂聞而善之農間章十二行本間作西乙十一行本同孔本同張校同招庫嚴庫改厙下同傉官偉於上黨東引乞特歸於東阿北召光烈將軍平叡及叡兄汝陽太守幼於燕國偉等皆應之間古莧翻遣間使招之也傉奴沃翻東阿縣漢屬東郡晉屬濟北郡唐屬濟州汝陽縣漢晉屬汝南郡後分為汝陽郡平幼蓋先嘗為汝陽太守時居燕國也偉等皆燕之舊臣故招之而應光烈將軍蓋亦前燕以授平叡又遣蘭汗攻頓丘克之頓丘縣漢屬東郡武帝泰始二年分置頓丘郡軍無私掠言其軍不敢掠居民而私其物長樂公丕使石越將步騎萬餘討之農曰越有智勇之名今不南拒大軍而來此是畏王而陵我也王謂慕容垂可以計取之衆請治列人城治直之翻下同農曰善用兵者結士以心不以異物異物猶言別物也唯敵是求當以山河為城池何列人之足治也辛卯越至列人西農使趙秋及參軍綦毌滕擊越前鋒破之越之氣已挫矣越甲仗雖精人心危駭易破也易以豉翻宜急擊之農曰彼甲在外我甲在心士心欲鬬則雖無甲冑而勇於赴戰故曰甲在心則士卒見其外貌而憚之不如待暮擊之可以必克令軍士嚴備以待毋得妄動越立柵自固農笑謂諸將曰越兵精士衆不乘初至之銳以擊我方更立柵吾知其無能為也向暮農鼓譟出陳于城西陳讀曰陣牙門劉木請先攻越柵農笑曰凡人見美食誰不欲之何得獨請然汝猛銳可嘉當以先鋒惠汝木乃帥壯士四百騰柵而入秦兵披靡帥讀曰率下同披普彼翻農督大衆隨之大敗秦兵斬越送首於垂敗補邁翻越與毛當皆秦之驍將也驍堅堯翻將即亮翻故秦王堅使助二子鎮守既而相繼敗沒人情騷動騷愁也擾也庚戌燕王垂至鄴改秦建元二十年為燕元年服色朝儀皆如舊章朝直遙翻以前岷山公庫傉官偉為左長史前尚書段崇為右長史滎陽鄭豁等為從事中郎凡帶前字者皆前燕所授官也垂因其所稱之官而授之即張驤等所推之官也封從弟拔等十七人及甥宇文輸嚴輸改翰舅子蘭審皆為王從才用翻其餘宗族及功臣封公者三十七人侯伯子男者八十九人可足渾譚集兵得二萬餘人攻野王拔之垂使譚集兵於河內之沙城遂因而攻拔野王平幼及其弟叡規亦帥衆數萬會垂於鄴長樂公丕使姜讓誚讓燕王垂且說之曰過而能改今猶未晚也誚才笑翻說輸芮翻垂曰孤受主上不世之恩故欲安全長樂公使盡衆赴京師京師謂長安也與秦永為鄰好好呼到翻何故闇於機運不以鄴城見歸若迷而不復當窮極兵勢恐單馬求生亦不可得也讓厲色責之曰將軍不容於家國投命聖朝朝直遙翻燕之尺土將軍豈有分乎分扶問翻主上與將軍風殊類別言氐處關西鮮卑在東北既不同風族類又別也親如宗戚寵踰勳舊自古君臣際遇有如是之厚者乎一旦因王師小敗遽有異圖長樂公主上元子受分陝之任陝失冉翻寧可束手輸將軍以百城之地乎將軍欲裂冠毀冕左傳晉率陰戎伐潁景王使詹桓伯辭於晉曰我在伯父猶衣服之有冠冕木水之有本原民人之有謀主也伯父若裂冠毀冕拔本塞原專棄謀主雖戎狄其何有余一人奚更云云但惜將軍以七十之年懸首白旗武王斬紂首懸於大白之旗更為逆鬼耳垂默然姜讓之辭直垂心內愧故默然無以答垂曰彼各為其主耳何罪禮而歸之遺丕書及上秦王堅表陳述利害請送丕歸長安堅及丕怒復書切責之為于偽翻遺于季翻上時掌翻鷹揚將軍劉牢之攻秦譙城拔之桓沖遣上庸太守郭寶攻秦魏興上庸新城三郡拔之將軍楊佺期進據成固擊秦梁州刺史潘猛走之佺期亮之子也楊亮見上卷太元二年壬子燕王垂攻鄴拔其外郭長樂公丕退守中城關東六州郡縣多送任請降於燕降戶江翻癸丑垂以陳留王紹行冀州刺史屯廣阿廣阿縣前漢屬鉅鹿郡後漢併入鉅鹿縣有廣阿澤在鉅鹿縣界即大陸澤也豐城宣穆公桓沖聞謝玄等有功自以失言謂去年吾其左衽之言也二月辛巳卒朝議欲以謝玄為荊江二州刺史朝直遙翻謝安自以父子名位太盛又懼桓氏失職怨望乃以梁郡太守桓石民為荊州刺史河東太守桓石虔為豫州刺史豫州刺史桓伊為江州刺史燕王垂引丁零烏桓之衆二十餘萬為飛梯地道以攻鄴不拔乃築長圍守之分處老弱於肥鄉晉志肥鄉縣屬廣平郡魏收曰天平初併入魏郡臨漳縣隋復分置肥鄉縣唐屬洺州處昌呂翻重直用翻秦征東府官屬疑參軍高泰燕之舊臣有貳心苻丕為征東大將軍高泰先仕燕慕容垂以為從事中郎與同郡虞曹從事吳韶逃歸勃海秦征東府置虞曹從事掌所部山澤泰與韶皆勃海人也燕軍近在肥鄉宜從之泰曰吾以避禍耳去一君事一君吾所不為也申紹見而歎曰去就以道可謂君子矣燕范陽王德擊秦枋頭取之置戍而還還音旋又讀如字東胡王晏據館陶為鄴中聲援鮮卑烏桓及郡縣民據塢壁不從燕者尚衆燕王垂遣太原王楷與鎮南將軍陳留王紹討之楷謂紹曰鮮卑烏桓及冀州之民本皆燕臣今大業始爾人心未洽所以小異唯宜綏之以德不可震之以威吾當止一處為軍聲之本汝巡撫民夷示以大義彼必當聽從楷乃屯于辟陽地理風俗記曰廣川西南六十里有辟陽亭故縣也漢高帝封審食其為侯國魏收地形志長樂郡信都縣有辟陽城為陳禍福帥讀曰率說輸芮翻為于偽翻晏隨紹詣楷降於是鮮卑烏桓及塢民降者數十萬口降戶江翻楷留其老弱置守宰以撫之發其丁壯十餘萬與王晏詣鄴垂大悅曰汝兄弟才兼文武足以繼先王矣言足以繼慕容恪也三月以衞將軍謝安為太保秦北地長史慕容泓聞燕王垂攻鄴亡奔關東收集鮮卑衆至數千還屯華陰敗秦將軍強永華戶化翻敗補邁翻強其兩翻其衆遂盛自稱都督陝西諸軍事大將軍雍州牧濟北王陝式冉翻雍於用翻濟子禮翻推垂為丞相都督陝東諸軍事領大司馬冀州牧吳王秦王堅謂權翼曰不用卿言謂不用翼之言而遣慕容垂也關東之地吾不復與之爭復扶又翻將若泓何乃以廣平公熙為雍州刺史鎮蒲阪阪音反徵雍州牧鉅鹿公叡為都督中外諸軍事衞大將軍錄尚書事配兵五萬以左將軍竇衝為長史龍驤將軍姚萇為司馬以討泓驤思將翻平陽太守慕容沖亦起兵於平陽有衆二萬進攻蒲坂堅使竇衝討之庫傉官偉帥營部數萬至鄴燕王垂封偉為安定王秦冀州刺史阜城侯定守信都高城男紹在國高城縣屬勃海郡唐為滄州鹽山縣重直龍翻固安侯鑒守中山燕王垂遣前將軍樂浪王溫督諸軍攻信都不克樂浪音洛琅夏四月丙辰遣撫軍大將軍麟益兵助之定鑒秦王堅之從叔紹謨從弟亮從子也從才用翻溫燕王垂之弟子也慕容泓聞秦兵且至懼帥衆將奔關東帥讀曰率下同秦鉅鹿愍公叡粗猛輕敵欲馳兵邀之姚萇諫曰鮮卑皆有思歸之志故起而為亂宜驅令出關不可遏也夫執鼷鼠之尾猶能反噬於人鼷鼠一名甘口鼠食物不痛爾雅曰有螫毒者鼷音奚致死於我萬一失利悔將何及但可鳴鼓隨之彼將奔敗不暇矣使苻叡能用姚萇之言慕容泓必東奔慕容沖敗而無所歸必亦就禽矣戰于華澤華澤即華陰之澤也華戶化翻為泓所殺萇遣龍驤長史趙都參軍姜協詣秦王堅謝罪驤思將翻堅怒殺之萇懼奔渭北馬牧馬牧牧馬之地猶漢之牧苑也龐皮江翻糾扇羌豪帥其戶口歸萇者五萬餘家帥讀曰率推萇為盟主萇自稱大將軍大單于萬年秦王大赦改元白雀通鑑目錄年經國緯自此以後姚萇繫之後秦單音蟬南安姚晃及尹緯為左右司馬天水狄伯支等為從事中郎羌訓等為掾屬王據等為參軍王欽盧姚方成等為將帥掾以絹翻將即亮翻帥所類翻秦竇衝擊慕容沖于河東大破之沖帥鮮卑騎八千奔慕容泓泓衆至十餘萬遣使謂秦王堅曰吳王已定關東可速資備大駕奉送家兄皇帝暐泓之兄也還返鄴都乘繩證翻還音旋又如字與秦以虎牢為界永為鄰好好呼到翻堅大怒召慕容暐責之曰今泓書如此卿欲去者朕當相資卿之宗族可謂人面獸心不可以國士期也暐叩頭流血涕泣陳謝堅久之曰此自三豎所為非卿之過三豎謂垂泓沖待之如初命暐以書招諭泓沖及垂暐密遣使謂泓曰吾籠中之人必無還理且燕室之罪人也暐不能保燕之社稷故自謂為罪人復扶又翻汝勉建大業以吳王為相國中山王為太宰領大司馬汝可為大將軍領司徒承制封拜聽吾死問汝便即尊位泓於是進向長安改元燕興燕王垂以鄴城猶固會僚佐議之右司馬封衡請引漳水灌之用曹操攻鄴故智也垂行圍行下孟翻因飲於華林園洛都鄴都皆有華林園鄴之華林則魏武所築也矢下如雨垂幾不得出幾居依翻冠軍大將軍隆將騎衝之垂僅而得免將即亮翻騎奇寄翻竟陵太守趙統攻襄陽秦荊州刺史都貴奔魯陽五月秦洛州刺史張五虎據豐陽來降降戶江翻梁州刺史楊亮帥衆五萬伐蜀帥讀曰率遣巴西太守費統將水陸兵三萬為前鋒費扶沸翻將即亮翻亮屯巴郡秦益州刺史王廣遣巴西太守康回等拒之姓譜西胡自有康姓秦苻定苻紹皆降於燕定以信都降紹以高城降降戶江翻下同苻謨守常山後秦王萇進屯北地姚萇書後秦以別於苻秦也六月癸丑朔崇德太后褚氏崩秦王堅自帥步騎二萬以擊後秦軍于趙氏塢據晉書載記趙氏塢在北地帥讀曰率騎奇寄翻後秦兵屢敗斬後秦王萇之弟鎮軍將軍尹買後秦軍中無井秦人塞安公谷堰同官水以困之安公谷同官水皆在今耀州界魏收地形志北地郡有銅官縣真君七年置杜佑曰銅官本漢祋祤縣地晉為頻陽苻秦於祋祤北銅官川置銅官護軍後魏太武罷護軍置銅官縣後周武帝移於今所隋以後唯作同官塞悉則翻有渴死者恟許拱翻會天大雨後秦營中水三尺繞營百步之外寸餘而已後秦軍復振復扶又翻秦王堅歎曰天亦佑賊乎天不助秦不可復支矣慕容泓謀臣高蓋等以泓德望不如慕容沖且持法苛峻乃殺泓立沖為皇太弟承制行事置百官以蓋為尚書令後秦王萇遣子嵩為質於沖以請和欲連兵以斃秦且畏沖兵之強也質音致將軍劉春攻魯陽都貴奔還長安後秦王萇帥衆七萬擊秦秦王堅遣楊璧等拒之為萇所敗敗補邁翻獲楊璧及右將軍徐成鎮軍將軍毛盛等將吏數十人萇皆禮而遣之燕慕容麟拔常山秦苻亮苻謨皆降降戶江翻麟進圍中山秋七月克之執苻鑒冀州皆為燕有惟苻丕守鄴而已留屯中山秦幽州刺史王永平州刺史苻沖帥二州之衆以擊燕帥讀曰率燕王垂遣平章十二行本平作甯乙十一行本同張校同朔將軍平規擊永此平規別是一平規平幼之弟非與苻洛同反之平規也敞兵敗規進據薊南薊音計秦平原公暉帥洛陽陝城之衆七萬歸于長安陝失冉翻秦章十二行本秦上有益州刺史王廣遣將軍王虬帥蜀漢之衆三萬北救長安二十二字乙十一行本同孔本同張校同退齋校同王堅聞慕容沖去長安浸近乃引兵歸歸自北地趙氏塢使沖不逼長安堅尚與萇相持勝負之勢未有所定也沖兵既逼堅不容不還長安萇得收嶺北以為資堅沖血戰而萇伺其敝堅死而鮮卑東出萇坐而取關中真所謂鷸蚌相持漁人之利也章十二行本方上有高陽公三字乙十一行本同孔本同張校同戍驪山驪力知翻拜平原公暉為都督中外諸軍事車騎大將軍錄尚書事配兵五萬以拒沖沖與暉戰于鄭西大破之堅又遣前將軍姜宇與少子河間公琳帥衆三萬拒沖於灞上少詩照翻琳宇皆敗死沖遂據阿房城即秦之阿房宮城秦康回兵數敗數所角翻退還成都梓潼太守壘襲以涪城來降此晉西師之捷姓譜曰後趙錄有壘澄本姓裴氏遣河南太守高茂北戍洛陽此晉自襄沔北向之師也己酉葬康獻皇后于崇平陵燕翟斌恃功驕縱邀求無厭斌音彬厭於鹽翻又以鄴城久不下潛有貳心太子寶請除之燕王垂曰河南之盟不可負也斌引兵會垂於洛陽垂與之盟蓋在河南縣難乃旦翻罪由於斌今事未有形而殺之人必謂我忌憚其功能吾方收攬豪傑以隆大業不可示人以狹失天下之望也藉彼有謀吾以智防之無能為也范陽王德陳留王紹驃騎大將軍農皆曰翟斌兄弟恃功而驕必為國患垂曰驕則速敗焉能為患焉於乾翻何也當聽其自斃耳禮遇彌重斌諷丁零及其黨請斌為尚書令垂曰翟王之功宜居上輔但臺既未建此官不可遽置耳斌怒密與前秦長樂公丕通謀通鑑凡苻秦事書曰秦此前字衍燕引漳水以灌鄴故斌欲決隄以潰之垂殺斌及其弟檀敏餘皆赦之斌兄子真夜將營衆北奔邯鄲將即亮翻邯鄲音寒丹引兵還向鄴圍欲與丕內外相應太子寶與冠軍大將軍隆擊破之冠古玩翻真還走邯鄲走音奏太原王楷陳留王紹言於垂曰丁零非有大志但寵過為亂耳今急之則屯聚為寇緩之則自散散而擊之無不克矣垂從之龜茲王帛純窘急呂光自去年進軍攻龜茲龜茲音丘慈窘渠隕翻獪胡蓋又在龜茲之西楊正衡曰獪古邁翻吶龍一人馗又一人侯將官稱也漢時西域諸國各有輔國侯安國侯左右將其後蓋併侯將為一官吶女劣翻又女鬱翻將即亮翻馗渠追翻嚴頭改須等諸國兵合七十餘萬以救龜茲秦呂光與戰于城西大破之帛純出走王侯降者三十餘國降戶江翻光入其城城如長安市邑宮室甚盛光撫寧西域威恩甚著遠方諸國前世所不能服者皆來歸附上漢所賜節傳上時掌翻傳張戀翻光皆表而易之立帛純弟震為龜茲王八月翟真自邯鄲北走燕王垂遣太原王楷驃騎大將軍農帥騎追之及章十二行本及上有甲寅二字乙十一行本同孔本同張校同退齋校同於下邑楷欲戰農曰士卒飢倦且視賊營不見丁壯殆有他伏楷不從進戰燕兵大敗真北趨中山屯于承營羸師示弱者必有伏兵衆所通知也然而往往墮其中而不自覺以致覆軍者多矣趨七諭翻下同鄴中芻糧俱盡削松木以飼馬飼祥吏翻燕王垂謂諸將曰苻丕窮寇必無降理降戶江翻不如退屯新城即肥鄉之新興城也以謝秦王疇昔之恩且為討翟真之計丙寅夜垂解圍趨新城遣慕容農徇清河平原徵督租賦農明立約束均適有無軍令嚴整無所侵暴由是穀帛屬路軍資豐給屬之欲翻戊寅南昌文穆公郗愔薨郗丑之翻愔挹淫翻太保安奏請乘苻氏傾敗開拓中原以徐兗二州刺史謝玄為前鋒都督帥豫州刺史桓石虔伐秦帥讀曰率玄至下邳秦徐州刺史趙遷棄彭城走玄進據彭城此晉自淮泗北向之師也秦王堅聞呂光平西域以光為都督玉門以西諸軍事西域校尉道絕不通秦幽州刺史王永求救於振威將軍劉庫仁先是秦蓋授劉庫仁振武將軍大破平規於薊南乘勝長驅進據唐城章十二行本城下有與慕容麟相持六字乙十一行本同孔本同張校同退齋校同中山郡之唐縣城也九月謝玄使彭城內史劉牢之攻秦兗州刺史張崇辛卯崇棄鄄城奔燕牢之據鄄城鄄吉掾翻河南城堡皆來歸附太保安上疏自求北征章十二行本征下有甲午二字乙十一行本同退齋校同加安都督揚江等十五州諸軍事加黃鉞十五州蓋揚徐南徐兗南兗豫南豫江青冀幽幷司荊雍也慕容沖進逼長安秦王堅登城觀之歎曰此虜何從出哉大呼責沖曰呼火故翻奴何苦來送死沖曰奴厭奴苦欲取汝為代耳沖少有寵於堅沖少有龍陽之色得幸於堅少詩照翻遺于季翻沖遣詹事稱皇太弟令答之曰孤今心在天下豈顧一袍小惠苟能知命君臣束手早送皇帝皇帝謂慕容暐好呼到翻堅大怒曰吾不用王景略陽平公之言事見一百三卷寧康三年及上卷太元七年載記曰秦人率謂鮮卑為白虜冬十月辛亥朔日有食之乙丑大赦謝玄遣陰陵太守高素攻秦青州刺史苻朗陰陵縣漢屬九江郡晉書謝玄傳作淮陵淮陵縣前漢屬臨淮郡後漢屬下邳郡晉復屬臨淮郡惠帝元康七年分置淮陵郡陰當作淮朗來降朗堅之從子也降戶江翻從才用翻翟真在承營與公孫希宋敞遙相首尾公孫希劉庫仁所遣宋敞王永所遣宀儿姓譜光姓燕人田光之後秦末子孫避地以光為氏宀儿而隴翻從才用翻與真相結又遣陽平太守邵興將數千騎招集冀州故郡縣與祚期會襄國是時燕軍疲弊秦勢復振復扶又翻冀州郡縣皆觀望成敗趙郡人趙粟等起兵柏鄉以應興魏收地形志南趙郡柏人縣有柏鄉城九域志曰柏鄉故城春秋時晉鄗邑五代志隋文帝開皇十六年置柏鄉縣屬趙郡命驃騎大將軍農自清河引兵會之冠古玩翻驤思將翻驃匹妙翻騎奇寄翻隆與興戰于襄國大破之興走至廣阿遇慕容農執之光祚聞之循西山走歸鄴隆遂擊趙粟等皆破之冀州郡縣復從燕復扶又翻劉庫仁聞公孫希已破平規欲大舉兵以救長樂公丕發鴈門上谷代郡兵屯繁畤畤音止燕太子太保慕輿句之子文零陵公慕輿虔之子常慕輿句見九十八卷穆帝永和六年慕輿虔見一百一卷哀帝興寧三年句音鉤知三郡兵不樂遠征樂音洛因作亂夜攻庫仁殺之竊其駿馬奔燕公孫希之衆聞亂自潰希奔翟真庫仁弟頭眷代領庫仁部衆秦長樂公丕遣光祚及參軍封孚召驃騎將軍張蚝幷州刺史王騰於晉陽以自救蚝騰以衆少不能赴秦以鄧羌張蚝為萬人敵是時鄧羌死矣張蚝卒不能救秦之亡是知徒勇而無謀者無益於成敗之數也蚝七吏翻謀於僚佐司馬楊膺請自歸於晉丕未許會謝玄遣龍驤將軍劉牢之等據碻磝碻磝城濟北郡治所沿河要地也碻丘交翻磝牛交翻楊正衡曰碻口勞翻杜佑曰碻口交翻磝音敖沈約曰晉惠帝分陳留為濟陽國滑臺漢之白馬唐之滑州也宋南渡後遣范成大北使時河已南徙滑州及白馬縣皆在河北古滑州已淪於河中矣剩水在濬州西南積水若湖對濬州城即黎陽山濟子禮翻河北滑臺之北岸也劉襲夜襲據走之遂克黎陽丕懼乃遣從弟就與參軍焦逵請救於玄從才用翻致書稱欲假塗求糧西赴國難難乃旦翻須援軍既接以鄴與之若西路不通長安陷沒請帥所領保守鄴城帥讀曰率逵與參軍姜讓密謂膺曰今喪敗如此喪息浪翻長安阻絕存亡不可知屈節竭誠以求糧援猶懼不獲而公豪氣不除方設兩端事必無成宜正書為表許以王師之至當致身南歸如其不從可逼縛與之膺自以力能制丕楊膺丕之兄故自以為力能制丕謝玄遣晉陵太守滕恬之渡河守黎陽恬之脩之曾孫也滕脩為吳將孫晧之亡脩歸晉加玄都督徐兗青司冀幽幷七州諸軍事後秦王萇聞慕容沖攻長安會㣥僚議進止皆曰大王宜先取長安建立根本然後經營四方萇曰不然燕人因其衆有思歸之心以起兵若得其志必不久留關中吾當移屯嶺北嶺北謂九嵕之北凡新平北地安定之地皆是也以待秦亡燕去然後拱手取之耳乃留其長子興守北地長知兩翻使寧北將軍姚穆守同官川自將其衆攻新平將即亮翻初新平人殺其郡將秦王堅缺其城角以恥之石虎之末清河崔悅為新平相為郡人所殺悅子液仕堅為尚書郎自表父仇不同天地請還冀州堅愍之禁錮新平人缺其城角以恥之將即亮翻民望郡之賢豪為一郡所宗嚮者及後秦王萇至新平新平太守南安苟輔欲降之苟輔氐也秦之外戚降戶江翻下同昔田單以一城存齊傑等皆新平人太康地志曰汶山郡漢武帝立孝宣地節三年合蜀郡劉蜀又立郡蓮音輦汶讀曰岷田單事見四卷周赧王三十六年猶連城過百柰何遽為叛臣乎輔喜曰此吾志也但恐久而無救郡人橫被無辜橫戶孟翻諸君能爾吾豈顧生哉於是憑城固守後秦為土山地道輔亦於內為之或戰地下或戰山上後秦之衆死者萬餘人輔詐降以誘萇萇將入城覺之而返輔伏兵邀擊幾獲之幾巨依翻又殺萬餘人隴西處士王嘉隱居倒虎山水經註倒虎山在新豐縣南處昌呂翻能知未然秦人神之秦王堅後秦王萇及慕容沖皆遣使迎之十一月嘉入長安衆聞之以為堅有福故聖人助之三輔堡壁及四山氐羌歸堅者四萬餘人堅置嘉及沙門道安於外殿動靜咨之燕慕容農自信都西擊丁零翟遼於魯口破之遼退屯無極農屯藳城以逼之無極縣漢屬中山晉省後魏復置無極縣唐末為祁州治所藳城縣前漢屬真定後漢屬鉅鹿晉省今所屯蓋故縣城也唐復置藳城縣屬恆州真之從兄也從才用翻鮮卑在長安城中者猶千餘人慕容紹之兄肅與慕容暐陰謀結鮮卑為亂十二月暐白堅以其子新昏請堅幸其家置酒欲伏兵殺之堅許之會天大雨不果往事覺堅召暐及肅肅曰事必洩矣入則俱死今城內已嚴已嚴者謂鮮卑之衆也既得出門大衆便集暐不從遂俱入堅曰吾相待何如而起此意暐飾辭以對肅曰家國事重何論意氣意氣謂堅相待之厚乃殺暐及其宗族城內鮮卑無少長男女皆殺之少詩照翻長知兩翻燕王垂幼子柔養於宦者宋牙家為牙子故得不坐與太子寶之子盛乘間得出奔慕容沖為後慕容盛等自長子歸燕張本間古莧翻燕慕容麟慕容農合兵襲翟遼大破之遼單騎奔翟真燕王垂以秦長樂公丕猶據鄴不去乃更引兵圍鄴開其西走之路垂志在得鄴故開其走路所謂圍城為之缺也玄欲徵丕任子然後出兵逵固陳丕款誠幷述楊膺之意玄乃遣劉牢之滕恬之等帥衆二萬救鄴帥讀曰率丕告飢玄水陸運米二千斛以饋之秦梁州刺史潘猛棄漢中奔長安梁州之地自此復歸于晉王崇武標點容肇祖聶崇岐覆校
