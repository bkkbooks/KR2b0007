body:
  text: 資治通鑑卷第六十翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註漢紀五十二初平二年孝獻皇帝乙初平二年辛未一九一初平二年春正月辛丑赦天下初平二年關東諸將議以朝廷幼沖迫於董卓遠隔關塞關塞謂函谷關桃林塞也幽州牧劉虞宗室賢儁欲共立為主曹操曰吾等所以舉兵而遠近莫不響應者以義動故也今幼主微弱制於姦臣非有昌邑亡國之釁昌邑謂昌邑王賀也天下其孰安之諸君北面我自西向幽州在北長安在西故操云然帝非孝靈子欲依絳灌誅廢少主迎立代王故事少詩照翻奉大司馬虞為帝術陰有不臣之心不利國家有長君長知兩翻乃外託公義以拒之紹復與術書曰今西名有幼君無血脈之屬謂帝非靈帝子也復扶又翻下同安可復信復扶又翻下同但當使兵往屯關要皆自蹙死東立聖君太平可冀如何有疑又室家見戮不念子胥謂子胥能報父兄之讎也以殺袁隗等為出於帝聖主聰叡有周成之質賊卓因危亂之際威服百寮此乃漢家小厄之會乃云今上無血脈之屬豈不誣乎又曰室家見戮可復北面此卓所為豈國家哉慺慺赤心慺力侯翻志在滅卓不識其他馥紹竟遣故樂浪太守張岐等齎議上虞尊號樂浪音洛琅上時掌翻虞見岐等厲色叱之曰今天下崩亂主上蒙塵吾被重恩被皮義翻未能清雪國恥諸君各據州郡宜共勠力盡心王室而反造逆謀以相垢汙邪汙烏故翻固拒之馥等又請虞領尚書事承制封拜復不聽欲奔匈奴以自絕紹等乃止初平二年二月丁丑以董卓為太師位在諸侯王上初平二年孫堅移屯梁東為卓將徐榮所敗敗補邁翻復收散卒進屯陽人賢曰梁縣屬河南郡今汝州縣陽人聚故城在梁縣西以呂布為騎督軫與布不相得堅出擊大破之梟其都督華雄梟古堯翻華戶化翻或謂袁術曰堅若得雒不可復制此為除狼而得虎也術疑之不運軍糧堅夜馳見術陽人去魯陽百餘里所以出身不顧者上為國家討賊為于偽翻下慰將軍家門之私讎堅與卓非有骨肉之怨也而將軍受浸潤之言浸潤之譖出論語何也術踧踖踧子六翻踖資昔翻踧踖不自安貌即調發軍糧調徒釣翻堅還屯卓遣將軍李傕說堅傕克角翻說輸芮翻後同欲與和親令堅疏子弟任刺史郡守者許表用之堅曰卓逆天無道今不夷汝三族縣示四海縣讀曰懸則吾死不瞑目瞑莫定翻豈將與乃和親邪乃汝也距雒九十里賢曰大谷口在故嵩陽西北八十五里北出對雒陽故城張衡東京賦云盟津達其後大谷通其前是也距至也與堅戰於諸陵間卓敗走卻屯澠池聚兵於陝澠彌兗翻陝式冉翻堅進至雒陽擊呂布復破走堅乃掃除宗廟祠以太牢得傳國璽於城南甄官井中甄官署之井中也晉職官志少府之屬有甄官令而續漢志無之蓋屬於他署未置專官也甄官掌琢石陶土之事為後建安元年袁術奪璽張本璽斯氏翻卓謂長史劉艾曰關東軍敗數矣要一遙翻數所角翻皆畏孤無能為也惟孫堅小戇說文曰戇愚也音都降翻當語諸將使知忌之語牛倨翻下同孤昔與周慎西征邊韓於金城孤語張溫求引所將兵為慎作後駐溫不聽溫又使孤討先零叛羌零音憐孤知其不克而不得止遂行留別部司馬劉靖將步騎四千屯安定以為聲勢叛羌欲雀戈歸道雀戈即截字畏安定有兵故也虜謂安定當數萬人不知但靖也而孫堅隨周慎行謂慎求先將萬兵造金城將即亮翻造七到翻使慎以二萬作後駐邊韓畏慎大兵不敢輕與堅戰而堅兵足以斷其運道斷丁管翻兒曹用其言涼州或能定也溫既不能用孤慎又不能用堅卒用敗走事見五十八卷靈帝中平二年卒子恤翻固自為可言其才可用也終亦死耳乃使東中郎將董越屯澠池中郎將段煨屯華陰煨烏回翻華戶化翻中郎將牛輔屯安邑姓譜牛本自殷周封微子於宋其裔司寇牛父敗狄於長丘死之其子孫以王父字為氏以禦山東輔卓之壻也卓引還長安孫堅脩塞諸陵塞悉則翻引軍還魯陽初平二年夏四月董卓至長安公卿皆迎拜車下卓抵手謂御史中丞皇甫嵩曰義真怖未乎皇甫嵩字義真怖普布翻明公以德輔朝廷大慶方至何怖之有若淫刑以逞將天下皆懼豈獨嵩乎考異曰范書嵩傳及山陽公載記記嵩語與此不同今從張璠漢紀稱尚父卓以問蔡邕邕曰明公威德誠為巍巍然比之太公愚意以為未可宜須關東平定車駕還反舊京然後議之卓乃止卓使司隸校尉劉囂籍吏民有為子不孝為臣不忠為吏不清為弟不順者皆身誅財物沒官於是更相誣引更工衡翻冤死者以千數百姓囂囂道路以目囂五羔翻韋昭曰不敢發言以目相眄而已初平二年六月丙戌地震初平二年秋七月司空种拂免以光祿大夫濟南淳于嘉為司空濟子禮翻太尉趙謙罷以太常馬日磾為太尉磾丁奚翻初平二年初何進遣雲中張楊還幷州募兵會進敗楊留上黨有衆數千人袁紹在河內楊往歸之與南單于於扶羅屯漳水濁漳水出上黨長子而東過鄴鄴則韓馥所居也忌之陰貶節其軍糧欲使其衆離散會馥將麴義叛姓譜漢有平原鞠譚其子閟避難改曰麴氏後遂為西平著姓紹因與義相結紹客逢紀謂紹曰逢蒲江翻將軍舉大事而仰人資給仰牛向翻不據一州無以自全紹曰冀州兵強吾士飢乏設不能辦無所容立紀曰韓馥庸才可密要公孫瓚要讀曰邀使取冀州馥必駭懼因遣辯士為陳禍福為于偽翻馥迫於倉卒卒讀曰猝必肯遜讓紹然之即以書與瓚瓚遂引兵而至外託討董卓而陰謀襲馥馥與戰不利會董卓入關紹還軍延津續漢志酸棗縣北有延津諶時壬翻說輸芮翻公孫瓚將燕代之卒乘勝來南而諸郡應之其鋒不可當袁車騎引軍東向自河內至延津為東向量音良竊為將軍危之為于偽翻馥懼曰然則為之柰何諶曰君自料寬仁容衆為天下所附孰與袁氏馥曰不如也臨危吐決吐決謂吐奇決策也又孰與袁氏馥曰不如也世布恩德天下家受其惠又孰與袁氏馥曰不如也諶曰袁氏一時之傑將軍資三不如之勢久處其上處昌呂翻彼必不為將軍下也夫冀州天下之重資也彼若與公孫瓚幷力取之危亡可立而待也夫袁氏將軍之舊且為同盟謂同盟討董卓若舉冀州以讓袁氏彼必厚德將軍瓚亦不能與之爭矣是將軍有讓賢之名而身安於泰山也馥性恇怯因然其計恇去王翻馥長史耿武別駕閔純治中李歷聞而諫曰考異曰九州春秋作耿彧今從范書魏志袁紀又范書騎都尉沮授諫無李歷今從魏志袁紀冀州帶甲百萬穀支十年袁紹孤客窮軍仰我鼻息鼻息氣一出入之頃也鼻氣噓之則溫吸之則寒故云然醫書云血為脈氣為息脈息之名自是而分呼吸者氣之橐籥動應者血之波瀾其經以身寸度之計十六丈二尺一呼脈再動一吸脈再動呼吸定息脈五動閏以大息則六動一動一寸故一息脈行六寸十息六尺百息六丈二百息十二丈七十息四丈二尺計二百七十息漏水下二刻盡十六丈二尺營周一身百刻之中得五十營故曰脈行陽二十五度行陰二十五度也息者以呼吸定之一日計一萬三千五百息呼吸進退既遲於脈故一日一夜方行盡十六丈二尺經絡而氣周於一身大會於風府脈屬陰陰行速猶太陰一月一周天息屬陽陽行遲猶太陽一歲一周天如是則應天常度閏當作間絕其哺乳立可餓殺柰何欲以州與之馥曰吾袁氏故吏且才不如本初度德而讓度徒洛翻古人所貴諸君獨何病焉先是馥從事趙浮程渙將強弩萬張屯孟津先悉薦翻將即亮翻聞之率兵馳還時紹在朝歌清水據水經清水出河內脩武縣逕獲嘉汲縣而入于河不至朝歌惟淇水則逕朝歌耳蓋俗亦呼淇水為清水據九州春秋紹時在朝歌清水口浮等自孟津東下則兩軍皆舟行大河而向鄴也清水口即淇口南岸即延津船數百艘衆萬餘人整兵鼓夜過紹營紹甚惡之惡烏路翻浮等到謂馥曰袁本初軍無斗糧各已離散雖有張楊於扶羅新附未肯為用不足敵也小從事等請以見兵拒之見賢遍翻旬日之間必土崩瓦解明將軍但當開閤高枕枕職任翻何憂何懼馥又不聽乃避位出居中常侍趙忠故舍遣子送印綬以讓紹紹將至從事十人爭棄馥去獨耿武閔純杖刀拒之不能禁乃止紹皆殺之紹遂領冀州牧承制以馥為奮威將軍而無所將御將即亮翻將御猶言統御也亦無官屬紹以廣平沮授為奮武將軍廣平縣屬鉅鹿郡沮千余翻又音諸姓也黃帝史官沮誦之後寵遇甚厚監古銜翻魏郡審配鉅鹿田豐並以正直不得志於韓馥紹以豐為別駕配為治中及南陽許攸逄紀潁川荀諶皆為謀主紹以河內朱漢為都官從事紹置都官從事則猶領司隸校尉也且欲徼迎紹意徼一遙翻亶發兵圍守馥第拔刃登屋馥走上樓上時掌翻收得馥大兒槌折兩腳折而設翻紹立收漢殺之馥猶憂怖從紹索去怖普布翻索山客翻往依張邈後紹遣使詣邈有所計議與邈耳語耳語附耳而語也坐徂臥翻謂為見圖無何起至溷以書刀自殺溷戶困翻圊也廁也時雖已有紙猶多用刀筆書故有書刀鮑信謂曹操曰袁紹為盟主因權專利將自生亂是復有一卓也復扶又翻若抑之則力不能制祗以遘難遘與構同難乃旦翻操善之會黑山于毒白繞眭固等十餘萬衆略東郡王肱不能禦曹操引兵入東郡擊白繞於濮陽破之眭息為翻濮博木翻袁紹因表操為東郡太守治東武陽東武陽縣屬東郡應劭曰縣在武水之陽水經註曰武水即漯水賢曰故城在今魏州莘縣南守式又翻初平二年南單于劫張楊以叛袁紹屯於黎陽董卓以楊為建義將軍河內太守初平二年太史望氣言當有大臣戮死者董卓使人誣衞尉張溫與袁術交通冬十月壬戌笞殺溫於市以應之張溫不能斬卓於西征之時反死於卓手可哀也巳初平二年青州黃巾寇勃海衆三十萬欲與黑山合公孫瓚率步騎二萬人逆擊於東光南大破之東光縣屬勃海賢曰今滄州縣賊棄其輜重重直用翻奔走渡河瓚因其半濟薄之賊復大破復扶又翻下同死者數萬流血丹水言水為之丹也車甲財物不可勝算勝音升威名大震初平二年劉虞子和為侍中帝思東歸使和偽逃董卓潛出武關詣虞令將兵來迎考異曰范書劉虞傳虞使田疇使長安時和為侍中因遣從武關出按魏志公孫瓚傳但云天子思歸不云因疇至也若爾當令和與疇俱還不應出武關又疇未還劉虞已死虞死在初平四年冬界橋戰在三年春范書誤也袁術利虞為援留和不遣許兵至俱西令和為書與虞虞得書遣數千騎詣和公孫瓚知術有異志止之虞不聽瓚恐術聞而怨之亦遣其從弟越將千騎詣術從才用翻下同而陰教術執和奪其兵由是虞瓚有隙虞先與瓚有隙至是而隙愈深復為袁紹所留是時關東州郡務相兼幷以自強大袁紹袁術亦自離章甲十一行本離上有相字乙十一行本同孔本同貳術遣孫堅擊董卓未返紹以會稽周昂為豫州刺史襲奪堅陽城陽城縣屬潁川郡堅領豫州刺史屯陽城同舉義兵將救社稷逆賊垂破而各若此吾當誰與戮力乎引兵擊昂走之袁術遣公孫越助堅攻昂越為流矢所中死中竹仲翻公孫瓚怒曰余弟死禍起於紹遂出軍屯磐河水經大河故瀆東北逕西平昌縣故城北分派東入般縣為般河余據賢註般音卜滿翻此作磐讀當如字賢又曰般即爾雅九河鉤磐河也其枯河在今滄州樂陵縣東南魏收地形志安德郡般縣有故般河數所具翻進兵攻紹冀州諸城多叛紹從瓚紹懼以所佩勃海太守印綬授瓚從弟範遣之郡而範遂背紹領勃海兵以助瓚背蒲妹翻瓚乃自署其將帥嚴綱為冀州刺史田楷為青州刺史單經為兗州刺史單音善姓也姓譜周卿士單襄公之後又悉改置郡縣守令初涿郡劉備中山靖王之後也蜀書云備中山靖王勝子陸城亭侯貞之後然自祖父以上世系不可攷與母以販履為業少詩照翻長七尺五寸垂手下䣛顧自見其耳長直亮翻䣛與膝同言其有異相也有大志少語言喜怒不形於色少詩沼翻嘗與公孫瓚同師事盧植由是往依瓚瓚使備與田楷徇青州有功因以為平原相備少與河東關羽涿郡張飛相友善少詩照翻以羽飛為別部司馬分統部曲備與二人寢則同牀恩若兄弟而稠人廣坐坐徂臥翻侍立終日隨備周旋不避艱險常山趙雲為本郡將吏兵詣公孫瓚為于偽翻將即亮翻瓚曰聞貴州人皆願袁氏願下當有從字雲曰天下訩訩訩許容翻衆語喧嘵之貌未知孰是民有倒縣之厄縣讀曰懸鄙州論議從仁政所在不為忽袁公私明將軍也為于偽翻下同劉備見而奇之深加接納雲遂從備至平原為備主騎兵劉備事始此初平二年初袁術之得南陽戶口數百萬而術奢淫肆欲徵斂無度斂力贍翻百姓苦之稍稍離散既與袁紹有隙各立黨援以相圖謀術結公孫瓚而紹連劉表豪傑多附於紹術怒曰㣥豎不吾從而從吾家奴乎據袁山松書紹司空逢之孼子出後伯父成故術云然紹非袁氏子紹聞大怒術使孫堅擊劉表表遣其將黃祖逆戰於樊鄧之間鄧縣屬南陽郡樊城周仲山甫之邑在漢水北杜佑曰樊城今襄州安養縣劉㫬曰鄧城縣漢之鄧縣古樊城也宋改安養縣天寶元年改為臨漢縣貞元二十一年移縣古鄧城乃改為鄧城縣遂圍襄陽表夜遣黃祖潛出發兵祖將兵欲還堅逆與戰祖敗走竄峴山中峴山去襄陽十里峴戶典翻夜追祖祖部曲章甲十一行本無曲字乙十一行本同兵從竹木間暗射堅殺之射而亦翻考異曰范書初平三年春堅死吳志孫堅傳亦云初平三年英雄記曰初平四年正月七日死袁紀初平三年五月山陽公載記載策表曰臣年十七喪失所怙裴松之按策以建安五年卒時年二十六計堅之亡策應十八而此表云十七則為不符張璠漢紀及胡沖吳曆並以堅初平二年死此為是而本傳誤也今從之堅所舉孝廉長沙桓階詣表請堅喪表義而許之堅兄子賁率其士衆就袁術術復表賁為豫州刺史復扶又翻下同術由是不能勝表初平二年初董卓入關留朱儁守雒陽而儁潛與山東諸將通謀懼為卓所襲出奔荊州卓以弘農楊懿為河南尹儁復引兵還雒擊懿走之儁以河南殘破無所資乃東屯中牟移書州郡請師討卓徐州刺史陶謙上儁行車騎將軍上時掌翻遣精兵三千助之餘州郡亦有所給謙丹陽人丹陽縣屬丹陽郡今潤州縣用謙為刺史謙至擊黃巾大破走之州境晏然初平二年劉焉在益州陰圖異計沛人張魯自祖父陵以來世為五斗米道陵即今所謂天師者也後魏寇謙之祖其道魯母以鬼道常往來焉家焉乃以魯為督義司馬洪氏隸釋曰劉焉在蜀創置督義司馬助義褒義校尉劉表在荊州亦置綏民校尉漢衰諸侯亶命率意各置官屬與合兵掩殺漢中太守蘇固斷絕斜谷閣斜谷在漢中西北今興元府西北入斜谷路至鳳州界百五十里有棧閣二千九百八十九間板閣二千八百九十二間郡國志曰褒城縣北有褒谷北口曰斜南口曰褒長四百七十里同為一谷兩山高峻中間谷道褒水所流曹操謂斜谷道為五百里石穴者此也余據班志斜水出衙嶺山北至郿入渭褒水亦出衙嶺南至南鄭入沔則褒斜雖同為一谷而衙嶺乃其分水處也斷丁管翻斜音余奢翻谷音穀又音浴焉上書言米賊斷道不得復通斷丁管翻又託他事殺州中豪強王咸李權等十餘人以立威刑犍為太守任岐及校尉賈龍由此起兵攻焉焉擊殺岐龍焉意漸盛作乘輿車具千餘乘乘繩證翻劉表上焉有似子夏在西河疑聖人之論禮記檀弓曾子責子夏曰吾與子事夫子於洙泗之間退歸老於西河之上使西河之人疑汝於夫子而罪一也表蓋言焉在蜀僭擬使蜀人疑為天子也上時掌翻誕為治書御史續漢志曰治書侍御史二人秩六百石掌選明法律者為之凡天下諸讞疑事掌以法律當其是非蔡質曰選御史高第補之胡廣曰宣帝幸宣室齋居而決事令御史二人治書治書御史起此治直之翻皆從帝在長安惟小子別部司馬瑁素隨焉帝使璋曉喻焉焉留璋不遣初平二年公孫度威行海外中國人士避亂者多歸之北海管寧邴原王烈皆往依焉寧少時與華歆為友少詩照翻華戶化翻嘗與歆共鋤菜見地有金寧揮鋤不顧與瓦石無異歆捉而擲之人以是知其優劣邴原遠行遊學八九年而歸師友以原不飲酒會米肉送之原曰本能飲酒但以荒思廢業故斷之耳思相吏翻斷音短今當遠別可一飲燕於是共坐飲酒終日不醉寧原俱以操尚稱度虛館以候之操七到翻候者伺其至也寧既見度乃廬於山谷時避難者多居郡南難乃旦翻而寧獨居北示無還志後漸來從之旬月而成邑寧每見度語唯經典不及世事還山專講詩書習俎豆非學者無見也由是度安其賢民化其德邴原性剛直清議以格物格正也寧謂原曰潛龍以不見成德乾初九潛龍勿用孔子曰君子以成德為行潛之為言也隱而未見行而未成是以君子弗用見賢遍翻皆招禍之道也密遣原逃歸度聞之亦不復追也復扶又翻王烈器業過人少時名聞在原寧之右少詩照翻聞文運翻名聲所至曰聞善於教誘鄉里有盜牛者主得之盜請罪曰刑戮是甘乞不使王彥方知也王烈字彥方遺布一端布帛六丈曰端一曰八丈曰端按古以二丈為端遺于貴翻烈曰盜懼吾聞其過是有恥惡之心既知恥惡則善心將生故與布以勸為善也後有老父遺劍於路行道一人見而守之至暮老父還尋得劍怪之以事告烈烈使推求推尋也諸有爭訟曲直將質之於烈質正也或望廬而還還旬緣翻皆相推以直推移也前書韓延壽傳以田相移即此義也度欲以為長史烈辭之為商賈以自穢乃免賈音古三年三年春正月丁丑赦天下三年董卓遣牛輔將兵屯陝輔分遣校尉北地李傕張掖郭汜武威張濟將步騎數萬擊破朱儁於中牟傕古岳翻汜音祀又孚梵翻因掠陳留潁川諸縣所過殺虜無遺初荀淑有孫曰彧少有才名少詩照翻何顒見而異之曰王佐才也及天下亂彧謂父老曰潁川四戰之地言其地平四面受敵鄉人多懷土不能去彧獨率宗族去依韓馥會袁紹已奪馥位待彧以上賓之禮彧度紹終不能定大業度徒洛翻聞曹操有雄略乃去紹從操操與語大悅曰吾子房也比之張良操初起兵為奮武將軍故以彧為奮武司馬多為傕汜等所殺三年袁紹自出拒公孫瓚與瓚戰於界橋南二十里水經大河右瀆東北逕鉅鹿郡廣宗縣故城南又東北逕界城亭北又東北逕信都郡武強縣故城東此蓋於河瀆上作橋註又云清河東北逕界城亭東水上有大梁謂之界城橋賢曰今貝州宗城縣側有古界城此城近枯漳水界橋當在此水上杜佑曰界橋在貝州宗城縣東其鋒甚銳紹令麴義領精兵八百先登強弩千張夾承之瓚輕其兵少縱騎騰之義兵伏楯下不動未至十數步一時同發讙呼動地讙許元翻瓚軍大敗斬其所置冀州刺史嚴綱考異曰九州春秋作劉綱今從范書魏志追至界橋瓚斂兵還戰義復破之復扶又翻遂到瓚營拔其牙門賢曰真人水鏡經曰凡軍始出必令完堅若有折將軍不利牙門旗竿軍之精也即周禮司職云軍旅會同置旌門是也初兗州刺史劉岱與紹瓚連和紹令妻子居岱所瓚亦遣從事范方將騎助岱及瓚擊破紹軍語岱令遣紹妻子語牛倨翻別敕范方若岱不遣紹家將騎還吾定紹將加兵於岱岱與官屬議連日不決聞東郡程昱有智謀召而問之昱曰若棄紹近援而求瓚遠助此假人於越以救溺子之說也言勢不能相及也越人習水故以為能救溺溺奴歷翻今雖壞紹軍壞音怪然終為紹所禽岱從之范方將其騎歸未至而瓚敗三年曹操軍頓丘頓丘縣屬東郡師古曰以丘名縣也丘一成為頓丘謂一頓而成也或曰成重也一重之丘也操引兵西入山攻毒等本屯毒等時掠魏郡屯于西山操曰使賊聞我西而還武陽自解也不還我能敗其本屯虜不能拔武陽必矣敗蒲邁翻遂行毒聞之棄武陽還操遂擊眭固及匈奴於扶羅於內黃內黃縣屬魏郡陳留有外黃故加內眭息隨翻三年董卓以其弟旻為左將軍兄子璜為中軍校尉皆典兵事宗族內外並列朝廷卓侍妾懷抱中子皆封侯弄以金紫卓車服僭擬天子召呼三臺三臺尚書臺御史臺符節臺也晉書曰漢官尚書為中臺御史為憲臺謁者為外臺是謂三臺又築塢於郿英雄記曰郿去長安二百六十里漢書郿音媚地名積穀為三十年儲自云事成雄據天下不成守此足以畢老卓忍於誅殺諸將言語有蹉跌者蹉倉何翻跌徒結翻便戮於前人不聊生司徒王允與司隸校尉黃琬僕射士孫瑞尚書楊瓚密謀誅卓中郎將呂布便弓馬膂力過人膂脊骨也行止常以布自衞甚愛信之誓為父子然卓性剛褊嘗小失卓意卓拔手戟擲布手戟小戟便於擊刺者勇力為拳迅疾為捷而改容顧謝卓意亦解布由是陰怨於卓卓又使布守中閣而私於傅婢益不自安王允素善待布布見允自陳卓幾見殺之狀幾居希翻允因以誅卓之謀告布使為內應布曰如父子何曰君自姓呂本非骨肉今憂死不暇何謂父子擲戟之時豈有父子情邪布遂許之夏四月丁巳帝有疾新愈大會未央殿卓朝服乘車而入魏祕書監秦靜曰漢氏承秦改六冕之制朝服俱玄冠絳衣而已晉名曰五時朝服有四時朝服又有朝服自營至宮左步右騎屯衞周帀帀作答翻令呂布等扞衞前後王允使士孫瑞自書詔以授布使尚書僕射自書詔者懼其泄也考異曰袁紀作李順今從范書魏志著陟略翻守北掖門內以待卓卓入門肅以戟刺之刺七亦翻下同卓衷甲不入衷甲者被甲於內而加衣甲上墮車顧大呼曰呼火故翻呂布何在布曰有詔討賊臣卓大罵曰庸狗敢如是邪布應聲持矛刺卓趣兵斬之趣讀曰促主簿田儀及卓倉頭前赴其尸布又殺之凡所殺三人布即出懷中詔版以令吏士曰詔討卓耳餘皆不問吏士皆正立不動大稱萬歲百姓歌舞於道長安中士女賣其珠玉衣裝市酒肉相慶者填滿街肆弟旻璜等及宗族老弱在郿皆為其㣥下所斫射死射而亦翻暴卓尸於市暴薄木翻又薄報翻天時始熱卓素充肥脂流於地守尸吏為大炷炷燈也燼所著者光明達曙如是積日諸袁門生聚董氏之尸焚灰揚之於路塢中有金二三萬斤銀八九萬斤錦綺奇玩積如丘山以王允錄尚書事呂布為奮威將軍假節儀比三司奮威將軍始於漢元帝用任千秋為之沈約曰呂布為奮武將軍儀比三司猶儀同三司也溫縣屬河內郡周大夫蘇忿生之邑朝直遙翻卓之死也左中郎將高陽侯蔡邕在王允坐高陽縣屬涿郡又陳留圉縣有高陽亭坐徂臥翻允勃然叱之曰董卓國之大賊幾亡漢室幾居希翻君為王臣所宜同疾而懷其私遇反相傷痛豈不共為逆哉即收付廷尉邕謝曰身雖不忠古今大義耳所厭聞口所常玩豈當背國而嚮卓也背蒲妹翻願黥首刖足繼成漢史初邕徙朔方自徒中上書乞續漢書諸志蓋其所學所志者在此不能得太尉馬日磾謂允曰伯喈曠世逸才蔡邕字伯喈當續成後史為一代大典而所坐至微誅之無乃失人望乎允曰昔武帝不殺司馬遷使作謗書流於後世賢曰凡史官記事善惡必書謂遷所記但是漢家不善之事皆為謗也非獨指武帝之身即高祖善家令之言武帝算緡榷酤之類是也班固集云史遷著書成一家之言至以身陷刑故微文譏刺貶損當世非義士也中竹仲翻戎馬在郊不可令佞臣執筆在幼主左右既無益聖德復使吾黨蒙其訕議復扶又翻日磾退而告人曰王公其無後乎善人國之紀也制作國之典也滅紀廢典其能久乎邕遂死獄中初黃門侍郎荀攸與尚書鄭泰侍中种輯等謀曰董卓驕忍無親雖資強兵實一匹夫耳可直刺殺也刺七亦翻考異曰魏志云攸與何顒伍瓊同謀按顒瓊死已久恐誤事垂就而覺收攸繫獄泰逃奔袁術攸言語飲食自若會卓死得免三年青州黃巾寇兗州劉岱欲擊之濟北相鮑信諫曰今賊衆百萬百姓皆震恐士卒無鬬志不可敵也然賊軍無輜重唯以鈔略為資重直用翻今不若畜士衆之力先為固守彼欲戰不得攻又不能其勢必離散然後選精銳據要害擊之可破也岱不從遂與戰果為所殺曹操部將東郡陳宮謂操曰州今無主而王命斷絕宮請說州中綱紀綱紀即謂州別駕及治中諸從事也說輸芮翻下同牧之謂為州牧此霸王之業也宮因往說別駕治中曰今天下分裂而州無主曹東郡命世之才也若迎以牧州必寧生民鮑信等亦以為然乃與州吏萬潛等至東郡迎操領兗州刺史操遂進兵擊黃巾於壽張東不利賊衆精悍悍下罕翻又侯旰翻操兵寡弱操撫循激勵明設賞罰承間設奇間古莧翻晝夜會戰戰輒禽獲賊遂退走鮑信戰死操購求其喪不得乃刻木如信狀祭而哭焉詔以京兆金尚為兗州刺史將之部操逆擊之尚奔袁術為後建安二年尚不屈於術張本三年五月考異曰范書丁酉大赦袁紀丁未大赦按是年正月丁丑大赦及李傕求赦王允曰一歲不再赦然則五月必無赦也三年初呂布勸王允盡殺董卓部曲允曰此輩無罪不可布欲以卓財物班賜公卿將校允又不從允素以劍客遇布布負其功勞多自誇伐既失意望漸不相平允性剛稜疾惡賢曰稜威稜也音力登翻余謂稜方稜也剛稜猶言剛方初懼董卓故折節下之下遐稼翻卓既殲滅自謂無復患難殲息廉翻復扶又翻難乃旦翻頗自驕傲以是㣥下不甚附之允始與士孫瑞議特下詔赦卓部曲既而疑曰部曲從其主耳今若名之惡逆而赦之恐適使深自疑非所以安之也乃止又議悉罷其軍或說允曰涼州人素憚袁氏而畏關東今若一旦解兵開關必人人自危可以皇甫義真為將軍就領其衆因使留陝以安撫之允曰不然關東舉義兵者皆吾徒也今若距險屯陝雖安涼州而疑關東之心不可也陝失冉翻時百姓訛言當悉誅涼州人卓故將校遂轉相恐動皆擁兵自守將即亮翻校戶教翻更相謂曰蔡伯喈但以董公親厚尚從坐今既不赦我曹而欲使解兵今日解兵明日當復為魚肉矣更工衡翻復扶又翻呂布使李肅至陝以詔命誅牛輔輔等逆與肅戰肅敗走弘農布誅殺之輔恇怯失守恇去王翻會營中無故自驚輔欲走為左右所殺李傕等還傕等自陳留潁川還也傕等無所依遣使詣長安求赦王允曰一歲不可再赦不許傕等益懼不知所為欲各解散間行歸鄉里間古莧翻討虜校尉武威賈詡曰諸君若棄軍單行則一亭長能束君矣長知兩翻不如相率而西以攻長安為董公報仇為于偽翻事濟奉國家以正天下若其不合不合謂事不濟不與本計合也傕等然之乃相與結盟率軍數千晨夜西行王允以胡文才楊整脩皆涼州大人賢曰大人謂大家豪右又曰大人長老之稱言尊事之也解釋之不假借以溫顏謂曰關東鼠子欲何為邪卿往呼之於是二人往實召兵而還傕隨道收兵比至長安比必寐翻及也已十餘萬與卓故部曲樊稠李蒙等合圍長安城城峻不可攻守之八日考異曰魏志云十日今從范書賢曰叟兵即蜀兵也漢代謂蜀為叟戊午引傕衆入城放兵虜掠布與戰城中不勝將數百騎以卓頭繫馬鞍出走駐馬青瑣門外衞瓘曰青瑣戶邊青鏤也一曰天子門內有眉格再重裏青畫曰瑣允曰若蒙社稷之靈上安國家吾之願也如其不獲則奉身以死之朝廷幼少朝廷謂天子也臨難茍免吾不忍也難乃旦翻努力謝關東諸公勤以國家為念太常种拂曰為國大臣不能禁暴禦侮使白刃向宮去將安之遂戰而死傕汜屯南宮掖門殺太僕魯馗馗音逵大鴻臚周奐臚陵如翻城門校尉崔烈越騎校尉王頎頎音祈吏民死者萬餘人狼籍滿道王允扶帝上宣平門避兵三輔黃圖曰長安城東面北頭門號宣平門上時掌翻帝謂傕等曰卿等放兵縱橫欲何為乎橫戶孟翻傕等曰董卓忠於陛下而無故為呂布所殺臣等為卓報讎為于偽翻非敢為逆也請事畢詣廷尉受罪傕等圍門樓共表請司徒王允出問太師何罪允窮蹙乃下見之己未赦天下以李傕為揚武將軍郭汜為揚烈將軍揚武將軍始於建武之初馬成為之揚烈將軍蓋始於是時傕等收司隸校尉黃琬殺章甲十一行本殺上有下獄二字乙十一行本同之初王允以同郡宋翼為左馮翊王宏為右扶風允太原人恐二郡為患乃先徵翼宏宏遣使謂翼曰郭汜李傕以我二人在外故未危王公危謂殺也明日俱族計將安出翼曰雖禍福難量量音良然王命所不得避也宏曰關東義兵鼎沸欲誅董卓今卓已死其黨與易制耳易以豉翻若舉兵共討傕等與山東相應此轉禍為福之計也翼不從宏不能獨立遂俱就徵甲子傕收允及翼宏幷殺之允妻子皆死宏臨命詬曰詬許候翻又古候翻怒罵也宋翼豎儒不足議大計賢曰豎者言賤劣如僮豎莫敢收者故吏平陵令京兆趙戩棄官收而葬之戩子踐翻始允自專討卓之勞士孫瑞歸功不侯故得免於難難乃旦翻臣光曰易稱勞謙君子有終吉易繫辭曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也程頤註曰有勞而能謙又須君子行之有終則吉夫樂高喜勝人之常情平時能謙固已鮮矣況有功勞可尊乎雖使知謙之善勉而為之若矜負之心不忘則不能常久欲其有終不可得也惟君子安履謙順故久而不變乃所謂有終則吉也以保其身可不謂之智乎三年傕等以賈詡為左馮翊欲侯之詡曰此救命之計何功之有固辭不受又以為尚書僕射詡曰尚書僕射官之師長長知兩翻天下所望詡名不素重非所以服人也乃以為尚書三年呂布自武關奔南陽袁術待之甚厚布自恃有功於袁氏謂殺董卓為袁氏報仇也鈔楚交翻術患之布不自安去從張楊於河內李傕等購求布急布又逃歸袁紹三年丙子以前將軍趙謙為司徒三年秋七月庚子以太尉馬日磾為太傅錄尚書事磾丁奚翻八月以車騎將軍皇甫嵩為太尉三年詔太傅馬日磾太僕趙岐杖節鎮撫關東三年九月以李傕為車騎將軍領司隸校尉假節郭汜為後將軍樊稠為右將軍張濟為驃騎將軍皆封侯驃匹妙翻傕汜稠筦朝政筦與管同三年司徒趙謙罷三年甲申以司空淳于嘉為司徒光祿大夫楊彪為司空錄尚書事三年初董卓入關說韓遂馬騰與共圖山東說輸芮翻遂騰率衆詣長安會卓死李傕等以遂為鎮西將軍遣還金城騰為征西將軍遣屯郿晉書職官志曰四征起於漢代四鎮通於柔遠三年冬十月荊州刺史劉表遣使貢獻以表為鎮南將軍荊州牧封成武侯成武縣前漢屬山陽郡後漢屬濟陰郡三年十二月太尉皇甫嵩免以光祿大夫周忠為太尉參錄尚書事三年曹操追黃巾至濟北悉降之濟子禮翻降戶江翻得戎卒三十餘萬男女百餘萬口收其精銳者號青州兵所降者青州黃巾也故號青州兵操辟陳留毛玠為治中從事玠言於操曰今天下分崩乘輿播蕩生民廢業饑饉流亡公家無經歲之儲百姓無安固之志難以持久夫兵義者勝魏相嘗引是言易大傳曰何以聚人曰財何以守位曰仁脩耕植以畜軍資操之所以芟㣥雄者在迎天子都許屯田積穀而巳二事乃玠發其謀也則霸王之業可成也操納其言遣使詣河內太守張楊欲假塗西至長安楊不聽定陶董昭說楊曰說輸芮翻袁曹雖為一家勢不久㣥曹今雖弱然實天下之英雄也當故結之故者結交之因也謂因事而結之宜通其上事上時掌翻下同幷表薦之若事有成永為深分分扶問翻契分也楊於是通操上事仍表薦操昭為操作書與李傕郭汜等為于偽翻各隨輕重致殷勤傕汜見操使以為關東欲自立天子今曹操雖有使命非其誠實使疏吏翻議留操使黃門侍郎鍾繇說傕汜曰方今英雄並起各矯命專制唯曹兗州乃心王室而逆其忠款非所以副將來之望也傕汜乃厚加報答當是時董昭在河內鍾繇在長安操不能使也而各為操道地蓋聞其雄略先為效用以自結也皓之曾孫也鍾皓見五十三卷桓帝建和三年三年徐州刺史陶謙與諸守相共奏記推朱儁為太師守式又翻相悉亮翻因移檄牧伯欲以同討李傕等奉迎天子會李傕用太尉周忠尚書賈詡策徵儁入朝儁乃辭謙議而就徵復為太僕三年公孫瓚復遣兵擊袁紹至龍湊龍湊地名在平原界漢晉春秋載紹與瓚書曰龍河之師羸兵前誘大兵未濟而足下膽破衆散不鼓而敗則龍湊蓋河津也詳味紹書龍湊宜在勃海界又袁譚軍龍湊曹操攻之拔平原走保南皮蓋在平原界也復扶又翻下同瓚遂還幽州不敢復出三年揚州刺史汝南陳溫卒袁紹使袁遺領揚州袁術擊破之遺走至沛為兵所殺術以下邳陳瑀為揚州刺史考異曰獻帝紀四年三月袁術殺陳溫據淮南魏志術傳云術殺溫領其州裴松之按英雄記溫自病死不為術所殺九州春秋曰初平三年揚州刺史陳禕死術以瑀領揚州蓋陳禕當為陳溫實以三年卒四年四年春正月甲寅朔日有食之四年丁卯赦天下考異曰袁紀五月丁卯赦今從范書四年曹操軍甄城甄城縣屬濟陰郡賢曰今濮州縣也甄音絹蜀本作鄄為是章甲十一行本正作鄄乙十一行本同張校同引兵屯封丘黑山別部及匈奴於扶羅皆附之曹操擊破術軍遂圍封丘術走襄邑又走寧陵封丘襄邑二縣屬陳留郡寧陵縣屬梁國宋白曰封丘古封國之地左傳所謂封父之繁弱是也漢為封丘縣寧陵縣古甯城漢高祖改為寧陵縣連破之術走九江揚州刺史陳瑀拒術不納術退保陰陵集兵於淮北復進向壽春陰陵壽春二縣皆屬九江郡壽春揚州刺史治所復扶又翻走歸下邳術遂領其州兼稱徐州伯李傕欲結術為援以術為左將軍封陽翟侯陽翟縣屬潁川郡四年袁紹與公孫瓚所置青州刺史田楷連戰二年士卒疲困糧食並盡互掠百姓野無青草紹以其子譚為青州刺史楷與戰不勝會趙岐來和解關東瓚乃與紹和親各引兵去四年三月袁紹在薄落津續漢志安平國經縣西有漳水津名薄落津鉅鹿郡癭陶縣有薄落亭水經註漳水逕鉅鹿縣故城西水有故津謂之薄落津與黑山賊于毒等數萬人共覆鄴城殺其太守紹還屯斥丘斥丘縣屬鉅鹿郡賢曰故城在今相州成安縣東南十三州志云土地斥鹵故云斥丘四年夏曹操還軍定陶四年徐州治中東海王朗及別駕琅邪趙昱說刺史陶謙曰求諸侯莫如勤王左傳晉大夫孤偃之言說輸芮翻宜遣使奉貢謙乃遣昱奉章至長安詔拜謙徐州牧加安東將軍封溧陽侯溧陽縣屬丹陽郡朗為會稽太守是時徐方百姓殷盛古語多謂州為方故八州八伯謂之方伯書曰惟此陶唐有此冀方詩曰徐方不庭是也流民多歸之而謙信用讒邪疏遠忠直遠于願翻刑政不治由是徐州漸亂許劭避地廣陵謙禮之甚厚劭告其徒曰陶恭祖外慕聲名內非真正陶謙字恭祖其勢必薄遂去之後謙果捕諸寓士人乃服其先識四年六月扶風大雨雹雨于具翻四年華山崩裂華戶化翻四年太尉周忠免以太僕朱儁為太尉錄尚書事四年下邳闕宣聚衆數千人賢曰風俗通曰闕姓也承闕黨童子之後縱橫家有闕子著書陶謙擊殺之考異曰范書謙傳作閻宣今從魏志武紀及謙傳魏武紀又曰謙與宣共舉兵取泰山華費掠任城謙傳亦云謙始與合從後遂殺之幷其衆按謙據有徐州託義勤王何藉宣數千之衆而與之合從蓋謙別將與宣共襲曹嵩故曹操以此為謙罪而伐之耳四年大雨晝夜二十餘日漂沒民居四年袁紹出軍入朝歌鹿腸山朝歌縣屬河內郡賢曰朝歌故城在今衞縣西續漢志曰朝歌有鹿腸山圍攻五日破之斬毒及其衆萬餘級紹遂尋山北行進擊諸賊左髭丈八等皆斬之又擊劉石青牛角黃龍左校郭大賢李大目于氐根等復斬數萬級皆屠其屯壁遂與黑山賊張燕及四營屠各鴈門烏桓戰於常山復扶又翻屠直於翻屠各匈奴種燕精兵數萬騎數千匹紹與呂布共擊燕連戰十餘日燕兵死傷雖多紹軍亦疲遂俱退呂布將士多暴橫橫戶孟翻紹患之布因求還雒陽紹承制以布領司隸校尉遣壯士送布而陰圖之布使人鼓箏於帳中說文箏樂也鼓絃竹身十三絃蒙恬所造一說秦人薄義父子爭瑟而分之因以為名按箏制與瑟同瑟二十五絃而箏十三絃故云然風俗通箏秦聲五絃筑身箏者上圓象天下平象地中空準六合絃柱十二擬十二月乃仁智之器也今幷涼二州箏形如瑟不知誰改也釋名箏施絃高箏箏然音爭送者夜起斫帳被皆壞明旦紹聞布尚在懼閉城自守布引軍復歸張楊四年前太尉曹嵩避難在琅邪難乃旦翻其子操令泰山太守應劭迎之嵩輜重百餘兩重直用翻兩音亮陶謙別將守陰平陰平縣屬東海郡賢曰故城在今沂州承縣西南掩襲嵩於華費間殺之前漢志華費二縣皆屬泰山郡續漢志泰山有費縣無華縣蓋併省也水經時水南過華縣東又南過費縣東入沂賢曰費縣故城在費縣東北費音祕操引兵擊謙攻拔十餘城至彭城大戰謙兵敗走保郯郯縣屬東海郡徐州刺史治所初京雒遭董卓之亂民流移東出多依徐土遇操至坑殺男女數十萬口於泗水水為不流為于偽翻操攻郯不能克乃去攻取慮睢陵夏丘三縣皆屬下邳國杜佑曰泗州下邳縣北有漢武原故城又北有郯縣故城睢陵故城在下邳東南夏丘堯封禹為夏伯邑於此漢為夏丘縣師古曰取音趨又音秋慮音廬睢音雖夏戶雅翻雞犬亦盡墟邑無復行人四年冬十月辛丑京師地震四年有星孛于天市孛蒲內翻四年司空楊彪免丙午以太常趙溫為司空錄尚書事四年劉虞與公孫瓚積不相能瓚數與袁紹相攻數所角翻下同虞禁之不可而稍節其稟假瓚怒屢違節度又復侵犯百姓虞不能制乃遣驛使奉章陳其暴掠之罪瓚亦上虞稟糧不周上時掌翻二奏交馳互相非毀朝廷依違而已依違言甲奏上則依甲而違乙乙奏上則依乙而違甲無決然之是非也薊縣屬廣陽國幽州牧所治也薊音計瓚輒稱病不應虞恐其終為亂乃率所部兵合十萬人以討之時瓚部曲放散在外倉卒掘東城欲走卒與猝同不習戰又愛民廬舍敕不聽焚燒戒軍士曰無傷餘人殺一伯珪而已公孫瓚字伯珪瓚乃簡募銳士數百人因風縱火直衝突之虞衆大潰虞與官屬北奔居庸居庸縣屬上谷郡胡嶠曰自幽州西北入居庸關宋祁曰唐媯州懷戎縣東南五十里有居庸塞東連盧龍碣石西屬太行常山實天下之險三日城陷執虞幷妻子還薊猶使領州文書會詔遣使者段訓增虞封邑督六州事拜瓚前將軍封易侯易縣前漢屬涿郡後漢省脅訓斬虞及妻子於薊市故常山相孫瑾掾張逸張瓚等相與就虞罵瓚極口然後同死掾俞絹翻瓚傳虞首於京師故吏尾敦於路劫虞首歸葬之賢曰尾姓敦名余按古有尾生北州百姓流舊莫不痛惜流者他州人流入幽州者也舊者舊著籍幽州者也初虞欲遣使奉章詣長安而難其人衆咸曰右北平田疇年二十二年雖少少詩照翻然有奇材虞乃備禮請以為掾具車騎將行疇曰今道路阻絕寇虜縱橫稱官奉使為衆所指願以私行期於得達而已虞從之疇乃自選家客二十騎俱上西關出塞傍北山傍步浪翻西關即居庸關北山即陰山直趣朔方循間道至長安致命趣七喻翻間古莧翻詔拜疇為騎都尉疇以天子方蒙塵未安不可以荷佩榮寵荷下可翻固辭不受得報馳還比至虞已死比必寐翻疇謁祭虞墓陳發章表章表當依下文作章報公孫瓚怒購求獲疇謂曰汝不送章報我何也疇曰漢室衰穨人懷異心唯劉公不失忠節章報所言於將軍未美恐非所樂聞樂音洛故不進也且將軍既滅無罪之君又讎守義之臣疇恐燕趙之士皆將蹈東海而死莫有從將軍者也瓚乃釋之疇北歸無終無終縣屬右北平郡春秋無終子之國疇蓋其縣人宋白曰無終唐為薊州玉田縣掃地而盟曰君仇不報吾不可以立於世遂入徐無山中徐無縣屬右北平郡有徐無山躬耕以養父母養羊亮翻百姓歸之數年間至五千餘家疇謂其父老曰今衆成都邑而莫相統一又無法制以治之治直之翻恐非久安之道疇有愚計願與諸君共施之可乎皆曰可疇乃為約束相殺傷犯盜諍訟者諍讀曰爭晉王沈釋時論闟茸勇敢於饕諍叶韻平聲隨輕重抵罪重者至死凡一十餘條又制為婚姻嫁娶之禮與學校講授之業校戶教翻班行於衆衆皆便之至道不拾遺北邊翕然服其威信烏桓鮮卑各遣使致饋疇悉撫納令不為寇四年十二月辛丑地震四年司空趙溫免乙巳以衞尉張喜為司空張政烺標點容肇祖聶崇岐覆校
