body:
  text: 資治通鑑卷第一百三十三端明殿學士兼翰林侍讀學士朝散大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註宋紀十五五月太宗明皇帝下泰始七年辛亥四七一五月春二月戊戌分交廣置越州治臨漳劉昫曰廉州治合浦縣秦象郡地吳改為珠官郡宋分置臨漳郡及越州領郡三治於此又據沈約志越州領百梁龍蘇永寧永昌富昌南流臨漳合浦宋壽九郡蕭子顯曰臨漳郡本合浦郡之北界也按沈約宋志作臨障宋白續通典作臨瘴以臨界內瘴江為名瘴江一名合浦江五月初上為諸王寬和有令譽獨為世祖所親即位之初義嘉之黨多蒙全宥晉安王子勛改元義嘉有如舊臣及晚年更猜忌忍虐好鬼神好呼到翻多忌諱言語文書有禍敗凶喪及疑似之言應回避者數百千品有犯必加罪戮改騧字為騧古花翻以其似禍字故也左右忤意往往有刳斮者忤五故翻斮側略翻斬也時淮泗用兵府藏空竭內外百官並斷俸祿藏徂浪翻斷丁管翻考異曰宋本紀云日給料祿俸今從南史自失青徐之後宋魏交兵於淮泗之間而奢費過度每所造器用必為正御副御次副各三十枚嬖倖用事貨賂公行嬖卑義翻又博計翻後同上素無子密取諸王姬有孕者內宮中生男則殺其母孕以證翻考異曰宋書云閉其母於幽房今從宋略使寵姬子之至是寢疾以太子幼弱深忌諸弟南徐州刺史晉平刺王休祐前鎮江陵貪虐無度休祐鎮江陵事始上百三十一卷二年刺來葛翻留之建康遣上佐行府州事上佐謂長史司馬也前後忤上非一狠戶墾翻忤五故翻上積不能平且慮將來難制欲方便除之施方略乘便利而殺之也甲寅休祐從上於巖山射雉據休祐傳巖山在建康城南又據宋紀巖山在秣陵縣界世祖景寧陵在焉射而亦翻從才用翻日欲闇上遣左右壽寂之等數人逼休祐令墜馬因共毆拉殺之傳呼驃騎落馬毆烏口翻拉盧合翻驃匹妙翻騎奇寄翻上陽驚遣御醫絡驛就視絡驛猶絡繹也休祐已絕比必寐翻及也絕氣絕也去車輪輿還第去羌呂翻下悉去同追贈司空葬之如禮建康民間訛言荊州刺史巴陵王休若有至貴之相上以此言報之休若憂懼戊午以休若代休祐為南徐州刺史休若腹心將佐皆謂休若還朝必不免禍中兵參軍京兆王敬先說休若曰相息亮翻將即亮翻朝直遙翻下同說輸芮翻今主上彌留書顧命曰疾大漸惟幾病日臻既彌留呂祖謙曰疾大進而瀕於死病日加則愈留夏撰曰重疾謂之病言重病日至而又久留於體曾不減去將必死也㣥豎恟恟欲悉去宗支以便其私恟許拱翻去起呂翻殿下聲著海內受詔入朝必往而不返荊州帶甲十餘萬地方數千里上可以匡天子除姦臣下可以保境土全一身孰與賜劍邸第使臣妾飲泣而不敢葬乎呂向曰泣淚也淚入口曰飲偽許之敬先出使人執之以白於上而誅之五月三月辛酉魏假員外散騎常侍邢祐來聘散悉亶翻騎奇寄翻五月魏主使殿中尚書胡莫寒簡西部敕勒為殿中武士魏書官氏志拓跋鄰以兄為紇骨氏後改為胡氏自魏世祖破柔然高車敕勒皆來降其部落附塞下而居自武周塞外以西謂之西部以東謂之東部依漠南而居者謂之北部衆怒殺莫寒及高平假鎮將奚陵假鎮將者未得為真將即亮翻下同四月諸部敕勒皆叛魏主使汝陰王天賜將兵討之以給事中羅雲為前鋒敕勒詐降襲雲殺之降戶江翻天賜僅以身免五月晉平剌王既死剌來達翻建安王休仁益不自安上與嬖臣楊運長等為身後之計運長等亦慮上晏駕後休仁秉政己輩不得專權彌贊成之上疾嘗暴甚內外莫不屬意於休仁屬之欲翻主書以下皆往東府訪休仁所親信豫自結納其或在直不得出者皆恐懼上聞愈惡之惡烏路翻五月戊午召休仁入見見賢遍翻既而謂曰今夕停尚書下省宿明可早來其夜遣人齎藥賜死休仁罵曰上得天下誰之力邪事見一百三十一卷元年二年子孫滅絕孝武誅鉏兄弟謂殺南平王鑠竟陵王誕海陵王休茂也子孫滅絕於泰始之世事並見前復扶又翻下已復同宋祚其能久乎上慮有變力疾乘輿出端門休仁死乃入下詔稱休仁規結禁兵謀為亂逆朕未忍明法申詔詰厲詰起吉翻休仁慙恩懼罪遽自引決可宥其二子降為始安縣王聽其子伯融襲封上慮人情不悅乃與諸大臣及方鎮詔稱休仁與休祐深相親結語休祐云汝但作佞此法自足安身我從來頗得此力休祐之隕本欲為民除患而休仁從此日生嬈懼語牛倨翻為于偽翻嬈集韻爾紹翻擾也吾每呼令入省便入辭楊太楊太休仁所生母也射而亦翻或陰雨不出休仁輒語左右云我已復得今一日休仁既經南討謂南拒尋陽之兵故也將即亮翻帥所類翻吾前者積日失適失適謂體中不安和也無不和顏厚相撫勞如其意趣人莫能測事不獲已反覆思惟不得不有近日處分恐當不必即解勞力到翻處昌呂翻分扶問翻解戶買翻曉也故相報知上與休仁素厚雖殺之每謂人曰我與建安年時相鄰謂年齒不相遠也景和泰始之間勳誠實重事計交切不得不相除痛念之至不能自己因流涕不自勝少詩照翻勝音升史言帝殘害骨肉不能自揜其天性之傷初上在藩與褚淵以風素相善風素相善者以其風標雅素而與之善也蕭子顯齊書風作夙深相委仗上寢疾淵為吳郡太守蕭子顯齊書淵傳云為吳興太守按吳郡近畿大郡也吳興次郡也淵以大尚書出守當得大郡吳郡為是既至入見見賢遍翻上流涕曰吾近危篤近其靳翻故召卿欲使著黃耳黃者乳母服也著則略翻力賀翻女人上衣也言託孤於淵上與淵謀誅建安王休仁淵以為不可上怒曰卿癡人不足與計事淵懼而從命復以淵為吏部尚書泰始之初淵為吏部尚書今去郡還朝復為之復扶又翻庚午以尚書右僕射袁粲為尚書令褚淵為左僕射五月上惡太子屯騎校尉壽寂之勇健會有司奏寂之亶殺邏尉徙越州惡烏路翻邏郎左翻徙合浦也於道殺之五月丙戌追廢晉平王休祐為庶人五月巴陵王休若至京口聞建安王死益懼上以休若和厚能諧緝物情恐將來傾奪幼主欲遣使殺之慮不奉詔欲徵入朝又恐猜駭使疏吏翻朝直遙翻六月丁酉以江州刺史桂陽王休範為南徐州刺史以休若為江州刺史手書殷勤召休若使赴七月七日宴五月丁未魏主如河西五月秋七月巴陵哀王休若至建康乙丑賜死於第贈侍中司空復以桂陽王休範為江州刺史復扶又翻時上諸弟俱盡唯休範以人才凡劣不為上所忌故得全為後休範稱兵張本沈約論曰聖人立法垂制所以必稱先王蓋由遺訓餘風足以貽之來世也太祖經國之義雖弘隆家之道不足彭城王照不窺古徒見昆弟之義未識君臣之禮冀以家情行之國道主猜而猶犯恩薄而未悟致以呵訓之微行遂成滅親之大禍謂文帝殺彭城王義康也沈約言義康之罪文帝當呵而訓之不當遂殺之也行下孟翻垂之後人太宗因易隙之情據已行之典翦落洪枝謂據文帝已行之典而翦除兄弟也洪大也枝兄弟也嫡統為本支庶為枝易弋豉翻既而本根無庇幼主孤立神器以勢弱傾移靈命隨樂推回改樂音洛斯蓋履霜有漸堅冰自至所由來遠矣裴子野論曰夫噬虎之獸知愛己子搏貍之鳥非護異巢太宗保字螟蛉剿拉同氣既迷在原之天屬未識父子之自然詩曰螟蛉之子蜾臝負之教誨爾子式穀似之故世俗謂抱養者為螟蛉又曰脊令在原兄弟急難剿子小翻絕也拉盧合翻非天廢也夫危亡之君未嘗不先棄本枝嫗煦旁孼鄭康成曰體曰嫗氣曰煦陸德明曰嫗於具翻徐於甫翻煦許具翻徐況甫翻孼魚列翻說文庶子為孼旁孼旁枝之庶子也嬖卑義翻又博計翻疾惡父兄惡烏路翻前乘覆車後來幷轡借使叔仲有國猶不失配天而他人入室將七廟絕祀曾是莫懷甘心揃落揃子踐翻晉武背文明之託而覆中州者賈后事見晉武帝紀背蒲妹翻而登合殿者元凶事見文帝紀奚其豫擇友于兄弟不亦安乎五月丙寅魏主至陰山五月初吳喜之討會稽也言於上曰得尋陽王子房及諸賊帥皆即於東戮之會工外翻帥所類翻既而生送子房釋顧琛等事見一百三十一卷之二年不問而心銜之及克荊州剽掠贓以萬計尋陽既平建安王休仁遣喜進克荊州剽匹妙翻喜為淮陵太守督豫州諸軍事淮陵漢縣屬臨淮郡後屬下邳國晉復屬臨淮惠帝永寧元年以為淮陵國宋為郡屬南徐州宋白曰泗州招信縣本漢淮陵縣內懼啟乞中散大夫漢大夫掌論議中散大夫後漢志始有之魏晉以來以為宀儿散散悉亶翻或譖蕭道成在淮陰有貳心於魏考異曰南齊書太祖紀云帝常嫌太祖非人臣相而民間流言蕭諱當為天子帝愈以為疑今從宋略使喜自持賜道成道成懼欲逃喜以情告道成且先為之飲道成即飲之為于偽翻考異曰南齊紀云太祖戎服出門迎即酌飲之喜還帝意乃解宋略云道成懼弗肯飲將出奔喜語以情先為之酌於是喜得罪而道成被徵蓋南齊書欲成太祖之美故云爾今從宋略喜還朝保證道成朝直遙翻或密以啟上上以喜多計數素得人情恐其不能事幼主乃召喜入內殿與共言謔甚款既出賜以名饌謔迄却翻饌雛戀翻又雛皖翻然猶發詔賻賜賻音附又與劉勔等詔曰吳喜輕狡萬端苟取物情昔大明中黟歙有亡命數千人攻縣邑殺官長劉子尚遣三千精甲討之再往失利孝武第二子曰豫章王子尚與景和同母也黟音伊歙音攝長知兩翻說誘㣥賊將即亮翻說輸芮翻誘音酉賊即歸降詭數幻惑詭過委翻幻戶辦翻乃能如此及泰始初東討止有三百人直造三吳造七到翻凡再經薄戰薄伯各翻而自破岡以東至海十郡無不清蕩十郡謂晉陵義興吳郡吳興南東海會稽東陽臨海永嘉新安等郡也便望風自退若非積取三吳人情何以得弭伏如此弭帛丿糸婢翻豈可奉守文之主遭國家可乘之會邪譬如餌藥當人羸冷資散石以全身散如寒食散之類石謂丹石也羸倫為翻散悉但翻去堅積以止患非忘其功勢不獲已耳用人如此人不自保其肯終為之用乎五月戊寅以淮陰為北兗州淮陰為南兗州事見上卷上年朝直遙翻下同道成所親以朝廷方誅大臣勸勿就徵道成曰諸卿殊不見事主上自以太子稚弱稚持利翻翦除諸弟何預他人今唯應速發淹留顧望必將見疑且骨肉相殘自非靈長之祚禍難將興方與卿等戮力耳史言骨肉相殘則姦雄生心因之而起為蕭氏取宋張本難乃旦翻拜散騎常侍太子左衞率散悉但翻騎奇寄翻率所律翻五月八月丁亥魏主還平城五月戊子以皇子躋繼江夏文獻王義恭景和之初義恭父子皆死事見一百三十一卷夏戶雅翻五月庚寅上疾有間間讀如字大赦五月戊戌立皇子準為安成王實桂陽王休範之子也五月魏顯祖聰睿夙成剛毅有斷而好黃老浮屠之學每引朝士及沙門共談玄理雅薄富貴常有遺世之心以叔父中都大官京兆王子推沈雅仁厚素有時譽欲禪以帝位中都大官即穆帝之子斷丁亂翻沈持林翻馳傳召之傳株戀翻既至會公卿大議皆莫敢先言任城王雲子推之弟也任音壬對曰陛下方隆太平臨覆四海覆敷又翻豈得上違宗廟下棄兆民且父子相傳其來久矣陛下必欲委棄塵務則皇太子宜承正統夫天下者祖宗之天下陛下若更授旁支恐非先聖之意啟姦亂之心斯乃禍福之原不可不慎也源賀曰陛下今欲禪位皇叔臣恐紊亂昭穆後世必有逆祀之譏春秋魯莊公薨子般弒季友立閔公閔公復弒立僖公閔公弟也僖公兄也及僖公薨魯人以先大後小為順遂躋僖公於閔公之上仲尼以臧文仲不知者三縱逆祀其一也言宗廟之祀姪為昭而叔為穆亂也後世必以逆祀貽譏更工衡翻紊亡運翻昭時招翻東陽公丕等曰皇太子雖聖德早彰然實沖幼陛下富於春秋始覽萬機柰何欲隆獨善不以天下為心其若宗廟何其若億兆何尚書陸馛曰陛下若捨太子更議諸王臣請刎頸殿庭不敢奉詔馛蒲撥翻刎扶粉翻帝怒變色以問宦者選部尚書酒泉趙黑黑曰臣以死奉戴皇太子不知其他帝默然陵馛之言則怒而變色趙黑之言則默然心服者以衆屬於正嫡也但朝廷大議作色於陸馛而默爾於宦官臣庶何觀魏之朝綱可想而見矣選須絹翻帝以其幼故欲傳位子推中書令高允曰臣不敢多言願陛下上思宗廟託付之重追念周公抱成王之事帝乃曰然則立太子㣥公輔之有何不可高允之言婉而當且發於衆言交進之後故轉移上意為力差易陸馛直臣也必能保吾子乃以馛為太保與源賀持節奉皇帝璽紱傳位於太子璽斯氏翻考異曰後魏天象志云上迫於太后傳位太子按馮太后若迫顯祖傳位當奪其大政安得猶總萬機今從帝紀丙午高祖即皇帝位諱宏顯祖獻文皇帝之長子也改元延興高祖幼有至性前年顯祖病癰高祖親吮吮徂兗翻及受禪悲泣不自勝勝音升顯祖問其故對曰代親之感內切於心丁未顯祖下詔曰朕希心玄古志存澹泊爰命儲宮踐升大位澹徒覽翻踐慈衍翻朕得優遊恭己栖心浩然㣥臣奏曰昔漢高祖稱皇帝尊其父為太上皇明不統天下也見十一卷漢高帝六年萬機大政猶宜陛下總之謹上尊號曰太上皇帝太上皇帝之號始此上時掌翻己酉上皇徙居崇光宮采椽不斲徐廣曰采一名櫟一作柞索隱曰采木名即今之櫟木也余謂采椽者蓋自山采來之椽因而用之不施斧斤示樸也椽重緣翻國之大事咸以聞崇光宮在北苑中又建鹿野浮圖於苑中之西山釋子相傳以為尸迦國波羅柰城東北十里許有鹿野苑本辟支佛住此常有野鹿故以名苑今倣西國而建浮圖也又據魏書道武帝天興二年破高車以其衆起鹿苑於南臺陰北距長城東苞白登屬之西山廣輪數百里蓋因代都鹿苑之舊名附合西國鹿野之事而建此浮圖也禪時連翻五月冬十月魏沃野統萬二鎮敕勒叛沃野即漢朔方郡沃野縣也統萬即赫連故都魏以為鎮置鎮將陸恭之風土記朔方故城後魏改為沃野鎮去統萬八百餘里降二千餘落帥讀曰率降戶江翻追擊餘黨至枹罕金城大破之枹音膚斬首八千餘級虜男女萬餘口雜畜三萬餘頭詔賀都督三道諸軍屯于漠南先是魏每歲秋冬發軍三道並出以備柔然春中乃還還從宣翻又如字下同賀以為往來疲勞不可支久請募諸州鎮武健者三萬餘人築三城以處之先悉薦翻處昌呂翻使冬則講武春則耕種此即古屯田之說也五月庚寅魏以南安王楨為都督涼州及西戎諸軍事領護西域校尉鎮涼州校戶教翻五月上命北琅邪蘭陵二郡太守垣崇祖經略淮北守式又翻崇祖自郁洲將數百人入魏境七百里據蒙山此指言舊琅邪蘭陵郡也本屬徐州彭城既沒崇祖率部曲據郁洲使領二郡太守未能有其地也魏收志蒙山在東安郡新泰縣東南水經註胊山縣東北海中有大洲謂之郁洲山海經所謂郁山在海中者是也杜佑曰鬱洲在海州東海縣亦曰郁洲魏東兗州刺史于洛侯擊之崇祖引還五月上以故第為湘宮寺始封湘東王故以故第為湘宮寺欲造十級浮圖而不能乃分為二新安太守巢尚之罷郡入見見賢遍翻上謂曰卿至湘宮寺未此是我大功德用錢不少少詩沼翻通直散騎侍郎會稽虞愿侍側散騎侍郎曹魏初與散騎常侍同置至晉武帝置員外散騎侍郎及元帝太興元年使員外二人與散騎侍郎同員直故謂之通直散騎侍郎後增為四人散悉亶翻騎奇寄翻會工外翻此皆百姓賣兒貼婦錢所為貼婦謂夫先有婦苦於上之征求而不能贍縱之外求淫夫貼以贍之又帖亦賣也通典北齊武平以後聽人帖賣園田當慈悲嗟愍罪高浮圖何功德之有侍坐者失色坐徂臥翻上怒使人驅下殿愿徐去無異容上好圍棋好呼到翻下同棋甚拙與第一品彭城丞王抗圍棋當時圍棋之品王抗為第一曰皇帝飛棋臣抗不能斷圍棋之勢聯屬不斷然後可以勝人若為人斷之則為所勝斷如字好之愈篤愿又曰堯以此教丹朱博物志堯造圍棋以教子丹朱或云舜以子商均愚故作圍棋以教之其法非智者不能也胡旦曰以棋為易則聰明者而或不能以為難則愚下小人往往精絕上雖怒甚以愿王國舊臣上為湘東王愿為國常侍五月王景文常以盛滿為憂屢辭位任上不許然中心以景文外戚貴盛張永累經軍旅疑其將來難信乃自為謠言曰一士不可親弓長射殺人射而亦翻景文彌懼自表解揚州情甚切至詔報曰人居貴要但問心若為耳言但問其存心如何耳巢徐二戴位不過執戟權亢人主巢謂巢尚之徐謂徐爰二戴謂法興明寶亢口浪翻高也選須絹翻而人往往不知有粲粲遷為令居之不疑人情向粲淡然亦復不改常日以此居貴位要任當有致憂競不袁粲之簡淡雅素自足以鎮雅俗而明帝謂其可以託孤則真違才易務矣然粲才雖不足以死繼之無愧於為臣之大節其視褚淵相去豈不遠哉復扶又翻競當作兢不讀曰否卑賤有填壑之憂有心於避禍不如無心於任運存亡之要巨細一揆耳泰豫元年壬子四七二五月春正月甲寅朔上以疾久不平改元戊午皇太子會四方朝賀者於東宮幷受貢計朝直遙翻五月大陽蠻酋桓誕擁沔水以北滍葉以南八萬餘落降於魏此即五水蠻也宋置大陽戍於蘄陽縣西此縣即漢江夏郡蘄春縣也沔水以北滍葉以南皆㣥蠻所居誕擁以降魏而誕實大陽蠻酋也酋慈由翻沔彌兗翻滍直里翻葉式涉翻降戶江翻亡匿蠻中以智略為㣥蠻所宗魏以誕為征南將軍東荊州刺史襄陽王東荊州治比陽縣使起部郎京兆韋珍與誕安集新民區置諸事皆得其所據晉志武帝置起部郎杜佑通典曰晉宋有起部而不常置起部工部也取虞書百工起哉為義自是之後諸蠻皆倚魏以侵擾南國五月二月柔然侵魏上皇遣將擊之將即亮翻下同柔然走東部敕勒叛奔柔然上皇自將追之至石磧磧七迹翻石磧即石漠五月上疾篤慮晏駕之後皇后臨朝江安懿侯王景文以元舅之勢必為宰相景文皇后兄也朝直遙翻相息亮翻或有異圖己未遣使齎藥賜景文死使疏吏翻手敕曰與卿周旋欲全卿門戶故有此處分處昌呂翻分扶問翻敕至景文正與客棋叩函看已已畢也神色不變方與客思行爭劫棋有行有劫行者欲擊東而聲出於西也劫者先有彼我兩急之勢彼欲出此則我劫彼以制之也行下孟翻斂子內匳畢子棋子也弈戲既畢則斂而納諸匳中匳力鹽翻奉敕見賜以死方以敕示客句斷中直兵典親兵將官也洪适曰宋有中直兵外兵騎兵參軍大丈夫安能坐受死州中文武數百足以一奮王景文時為揚州刺史知卿至心若見念者為我百口計乃作墨啟答敕致謝飲藥而卒考異曰南史云帝使謂景文曰朕不謂卿有罪然吾不能獨死請子先之若使者有此語則坐客不容不知更終棋局又曰景文酌酒謂客曰此酒不可相勸自仰而飲之按焦度勸拒命必不對坐客言之何得死時客猶在坐也今從宋書上夢有人告曰豫章太守劉愔反既寤遣人就郡殺之愔於含翻五月魏顯祖還平城書顯祖以別魏主五月庚午魏主耕籍田五月夏四月以垣崇祖行徐州事徙戍龍沮魏收地形志東彭城郡有龍沮縣縣有即丘城五代志琅邪郡治臨沂縣舊曰即丘沮子余翻五月己亥上大漸書顧命云疾大漸呂祖謙註曰疾大進而瀕於死也又以尚書右僕射褚淵為護軍將軍加中領軍劉勔右僕射勔彌兗翻詔淵勔與尚書令袁粲荊州刺史蔡興宗郢州刺史沈攸之並受顧命褚淵素與蕭道成善引薦於上詔又以道成為右衞將軍領衞尉左右衞晉官衞尉漢官也史言禁衞兵柄皆歸道成是夕上殂年三十四庚子太子即皇帝位大赦時蒼梧王方十歲袁粲褚淵秉政承太宗奢侈之後務弘節儉欲救其弊而阮佃夫王道隆等用事貨賂公行不能禁也佃音田五月乙巳以安成王準為揚州刺史五月五月戊寅葬明皇帝于高寧陵據南史陵在臨沂縣莫府山六月乙巳尊皇后曰皇太后考異曰宋略本紀作癸未今從宋本紀五月秋七月柔然部帥無盧真將三萬騎寇魏敦煌鎮將尉多侯擊走之多侯眷之子也尉眷事魏太武有平赫連之功帥所類翻將即亮翻下同騎奇寄翻敦徒門翻尉紆勿翻守將薛奴擊走之魏書官氏志西方諸姓叱干氏改為薛氏五月戊午魏主如陰山五月戊辰尊帝母陳貴為皇太更以諸國太為太姬更工衡翻姬音怡五月右軍將軍王道隆以蔡興宗強直不欲使居上流閏月甲辰以興宗為中書監更以沈攸之為都督荊襄等八州諸軍事荊州刺史興宗辭中書監不拜王道隆每詣興宗躡履到前不敢就席良久去竟不呼坐沈攸之自以材略過人自至夏口以來陰蓄異志夏口郢州也攸之鎮郢州見上卷五年夏戶雅翻擇郢州士馬器仗精者多以自隨到官以討蠻為名大發兵力招聚才勇部勒嚴整常如敵至重賦斂以繕器甲斂力贍翻舊應供臺者皆割留之養馬至二千餘匹治戰艦近千艘治直之翻艦戶黯翻近其靳翻艘蘇遭翻倉廩府庫莫不充積士子商旅過荊州者多為所羈留四方亡命歸之者皆蔽匿擁護所部或有逃亡無遠近窮追必得而止舉錯專恣不復承用符敕錯千故翻復扶又翻朝廷疑而憚之為後攸之稱兵張本臺省所下者為符出命經中書門下者為敕或鞭撻士大夫上佐以下面加詈辱詈力智翻然吏事精明人不敢欺境內盜賊屏息屏必郢翻夜戶不閉攸之賧罰㣥蠻太甚何承天纂文曰賧蠻夷贖罪貨也音徒濫翻蠻怨叛酉溪蠻王田頭擬死水經酉水導源巴郡臨江縣東逕遷陵縣故城北又東逕酉陽故縣南又東逕沅陵縣北又南注沅水其子田都走入獠中獠魯皓翻於是㣥蠻大亂掠抄至武陵城下抄楚交翻武陵內史蕭嶷遣隊主張英兒擊破之誅婁侯立田都㣥蠻乃定嶷賾之弟也史言蕭道成二子皆有幹時之用嶷魚力翻賾士革翻五月八月戊午樂安宣穆公蔡興宗卒五月九月辛巳魏主還平城五月冬十月柔然侵魏及五原十一月上皇自將討之將即亮翻將度漠柔然北走數千里上皇乃還還從宣翻又如字五月丁亥魏封上皇之弟略為廣川王五月己亥以郢州刺史劉秉為尚書左僕射秉道憐之孫也和弱無幹能以宗室清令令善也史言袁褚尚虛名而無實用所以受制於姦雄也五月中書通事舍人阮佃夫晉初初置中書舍人通事各一人江左令舍人通事謂之中書通事舍人佃音田權任轉重欲用其所親吳郡張澹為武陵郡袁粲等皆不同佃夫稱敕施行粲等不敢執史言袁粲等橈於權倖不能裁之以正澹徒覽翻五月魏有司奏諸祠祀合一千七十五所歲用牲七萬五千五百上皇惡其多殺惡烏路翻詔自今非天地宗廟社稷皆勿用牲薦以酒脯而已蒼梧王上諱昱字德融明帝長子也小字慧震元徽元年癸丑四七三五月春正月戊寅朔改元大赦五月庚辰魏員外散騎常侍崔演來聘散悉亶翻騎奇寄翻五月戊戌魏上皇還至雲中還自討柔然五月癸丑魏詔守令勸課農事同部之內貧富相通家有兼牛通借無者若不從詔一門終身不仕五月戊午魏上皇至平城自雲中至平城五月甲戌魏詔縣令能靜一縣劫盜者兼治二縣即食其祿能靜二縣者兼治三縣治直之翻下同三年遷為郡守守式又翻二千石能靜二郡上至三郡亦如之三年遷為刺史五月桂陽王休範素凡訥少知解凡庸常也訥言難也少詩沼翻解戶買翻解曉也齒列也遇待也不以諸弟之列待之也故太宗之末得免於禍及帝即位年在沖幼素族秉政近習用權素族謂袁褚也近習謂阮佃夫王道隆楊運長也帝諸父皆誅死唯休範在故謂尊親莫二既不如志怨憤頗甚典籤新蔡許公輿為之謀主令休範折節下士折而設翻下戶嫁翻厚相資給於是遠近赴之歲中萬計收養勇士繕治器械朝廷知其有異志亦陰為之備會夏口闕鎮夏戶雅翻朝廷以其地居尋陽上流欲使腹心居之二月乙亥以晉熙王燮為郢州刺史燮始四歲以黃門郎王奐為長史行府州事黃門郎即黃門侍郎使鎮夏口夏戶雅翻復恐其過尋陽為休範所劫留復扶又翻使自太洑徑去南史休範傳作太子洑此蓋即劉胡自江外趣沔口之路大怒密與許公輿謀襲建康表治城隍多解材板而蓄之奐景文之兄子也五月吐谷渾王拾寅寇魏澆河夏四月戊申魏以司空長孫觀為大都督發兵討之吐從暾入聲谷音浴澆堅堯翻長知兩翻五月魏以孔子二十八世孫乘為崇聖大夫崇聖大夫以尊崇先聖名官洒所賣翻掃素報翻又並上聲五月秋七月魏詔河南六州之民河南六州青徐兗豫齊東徐也綿一斤租三十石五月乙亥魏主如陰山五月八月庚申魏上皇如河西長孫觀入吐谷渾境芻其秋稼吐谷渾王拾寅窘急請降窘巨隕翻降戶江翻遣子斤入侍自是歲脩職貢九月辛巳上皇還平城五月遣使如魏報聘也使疏吏翻五月冬十月癸酉割南兗豫州之境置徐州治鍾離鍾離禹塗山氏之國春秋鍾離子之國漢為縣屬九江郡晉屬淮南郡晉安帝分立鍾離郡宋立徐州於此宋白曰今鍾離縣東四十里有鍾離城五月魏上皇將入寇詔州郡之民十丁取一以充行以充征行也五月魏武都氐反攻仇池詔長孫觀回師討之五月武都王楊僧嗣卒於葭蘆從弟文度自立為武興王從才用翻遣使降魏魏以文度為武興鎮將將即亮翻下同五月十一月丁丑尚書令袁粲以母憂去職五月癸巳魏上皇南巡至懷州魏天安二年以河內郡置懷州因古地名以名州也先為馮太后所黜為門士魏有宰士門士宰士掌酒食門士守門戶枋音方先悉薦翻盜賊競起相州民孫誨等五百人稱虎子在鎮境內清晏乞還虎子上皇復以虎子為枋頭鎮將相息亮翻下同復扶又翻又如字即日之官數州盜賊皆息數州謂冀相懷等州五月十二月癸卯朔日有食之五月乙巳江州刺史桂陽王休範進位太尉五月詔起袁粲以衞軍將軍攝職所謂起復也五月壬子柔然侵魏柔玄鎮二部敕勒應之據水經註柔玄鎮在長川城東城南小山于延水所出也此即六鎮之一五月魏州鎮十一水旱相州民餓死者二千八百餘人五月是歲魏妖人劉舉聚衆自稱天子妖於遙翻齊州刺史武昌王平原討斬之平原提之子也武昌王提見一百二十五卷宋文帝元嘉二十四年二年甲寅四七四夏春正月丁丑魏太尉源賀以疾罷夏二月甲辰魏上皇還平城夏三月丁亥魏員外散騎常侍許赤虎來聘夏夏五月壬午桂陽王休範反考異曰宋書作壬子按長曆此月辛未朔無壬子今從宋略使軍隊稱力請受軍有軍主副隊有隊主副稱力請受者稱其衆力之多少而請船也稱尺證翻合手裝治合音閤治直之翻數日即辦丙戌休範率衆二萬騎五百發尋陽騎奇寄翻晝夜取道以書與諸執政稱楊運長王道隆蠱惑先帝使建安巴陵二王無罪被戮事見上明帝泰始七年蠱音古被皮義翻以謝冤魂豎常句翻庚寅大雷戍主杜道欣馳下告變朝廷惶駭護軍褚淵征北將軍張永領軍劉勔僕射劉秉右衞將軍蕭道成游擊將軍戴明寶驍騎將軍阮佃夫右軍將軍王道隆中書舍人孫千齡員外郎楊運長員外郎即員外散騎侍郎驍堅堯翻騎奇寄翻莫有言者道成曰昔上流謀逆皆因淹緩致敗謂南郡王義宣晉安王子勛等也輕兵急下乘我無備今應變之術不宜遠出若偏師失律則大沮衆心沮在呂翻宜頓新亭白下堅守宮城東府石頭以待賊至千里孤軍後無委積委於偽翻積子智翻周禮遺人凡賓客會同師役掌其道路之委積註云少曰委多曰積又宰夫掌牢禮委積註云委積謂牢米薪芻左傳居則具一日之積杜預註云芻米薪求戰不得自然瓦解我請頓新亭以當其鋒征北守白下領軍屯宣陽門為諸軍節度諸貴安坐殿中不須競出我自破賊必矣因索筆下議衆並注同並注名同道成議也索山客翻孫千齡陰與休範通謀獨曰宜依舊遣軍據梁山道成正色曰賊今已近梁山豈可得至新亭既是兵衝所欲以死報國耳常時乃可屈曲相從今不得也坐起坐徂臥翻道成顧謂劉勔曰領軍已同鄙議不可改易袁粲聞難扶曳入殿袁粲居喪毀瘠故扶曳而入難乃旦翻內外戒嚴道成將前鋒兵出屯新亭將即亮翻張永屯白下前南兗州刺史沈懷明戍石頭袁粲褚淵入衞殿省時倉猝不暇授甲開南北二武庫隨將士意所取蕭道成至新亭治城壘未畢將即亮翻下同治直之翻辛卯休範前軍已至新林新林浦去今建康城二十里徐索白虎幡索山客翻登西垣使寧朔將軍高道慶羽林監陳顯達員外郎王敬則帥舟師與休範戰頗有殺獲帥讀曰率壬辰休範自新林捨舟步上上時掌翻其將丁文豪請休範直攻臺城休範遣文豪別將兵趣臺城趣七喻翻自以大衆攻新亭壘道成率將士悉力拒戰自巳至午外勢愈盛衆皆失色道成曰賊雖多而亂尋當破矣休範白服乘肩輿自登城南臨滄觀臨滄觀在勞山上江寧縣南十五里亦曰勞勞亭觀古玩翻考異曰張敬兒傳云左右數百人皆散走按休範左右若有數百人黃回敬兒雖勇何敢徑往取之今從休範傳騎奇寄翻校戶教翻降戶江翻下同回謂敬兒曰卿可取之我誓不殺諸王敬兒以白道成道成曰卿能辦事當以本州相賞敬兒南陽冠軍人本州謂雍州也為後敬兒求雍州張本放仗走大呼稱降休範喜召至輿側回陽致道成密意休範信之以二子德宣德嗣付道成為質呼火故翻質音致二子至道成即斬之休範置回敬兒於左右所親李恆鍾爽諫不聽恆戶登翻時休範日飲醇酒回見休範無備目敬兒敬兒奪休範防身刀斬休範首左右皆散走敬兒馳馬持首歸新亭道成遣隊主陳靈寶送休範首還臺靈寶道逢休範兵廾首於水考異曰南齊書云埋首道側宋略云廾諸溝中今從宋書唱云已平而無以為驗衆莫之信休範將士亦不之知其將杜黑騾攻新亭甚急將即亮翻騾盧戈翻考異曰宋書南齊書作黑蠡今從宋略蕭道成在射堂司空主簿蕭惠朗帥敢死士數十人突入東門休範先為司空以惠朗為主簿帥讀曰率下同道成上馬帥麾下搏戰惠朗乃退道成復得保城復扶又翻惠朗惠開之弟也蕭惠開見一百三十一卷明帝泰始之元年二年惠朗兄黃門郎惠明時為道成軍副在城內了不自疑左傳宋元公與華氏戰于新里翟僂新居于新里既戰說甲于公而歸華姓居于公里亦如之杜預註曰古之為軍不呰小忿僂力主翻姓他口翻呰子斯翻又音紫道成與黑騾拒戰自晡達旦矢石不息其夜大雨鼓叫不復相聞復扶又翻將士積日不得寢食軍中馬夜驚城內亂走道成秉燭正坐厲聲呵之如是者數四丁文豪破臺軍於皂莢橋皂莢橋當在新亭之北朱雀桁即大航也在秦淮水上以其在朱雀門外故名桁與航同音戶剛翻趣七喻翻右軍將軍王道隆將羽林精兵在朱雀門內急召鄱陽忠昭公劉勔於石頭勔至命撤桁以折南軍之勢道隆怒曰賊至但當急擊寧可開桁自弱邪勔不敢復言道隆趣勔進戰折之舌翻復扶又翻趣讀曰促勔渡桁南戰敗而死黑騾等乘勝渡淮道隆廾衆走還臺黑騾兵追殺之蕭道成所謂諸貴不須競出者正慮此也踣於御溝之側踣蒲北翻或扶之以免蘊景文之兄子也於是中外大震道路皆云臺城已陷白下石頭之衆皆潰張永沈懷明逃還宮中傳新亭亦陷太后執帝手泣曰天下敗矣先是月犯右執法太白犯上將先悉薦翻太微南蕃中二星曰端門東曰左執法西曰右執法東蕃四星其北曰上將西蕃四星南第一星亦曰上將或勸劉勔解職勔曰吾執心行己無愧幽明若災眚必至避豈得免勔晚年頗慕高尚立園宅名為東山遺落世務罷遣部曲蕭道成謂勔曰將軍受顧命輔幼主當此艱難之日而深尚從容從千容翻廢省羽翼一朝事至悔可追乎勔不從而敗甲午撫軍長史褚澄開東府門納南軍考異曰宋書作撫軍典籤茅恬開東府納賊南齊書作車騎典籤茅恬蓋皆為褚澄諱耳今從宋略稱桂陽王教曰安成王吾子也勿得侵犯澄淵之弟也杜黑騾徑進至杜姥宅晉成帝杜皇后母裴氏立第南掖門外世謂之杜姥宅姥莫補翻文帝元嘉二十五年新作閶闔廣莫二門改廣莫門曰承明門降戶江翻恇去王翻時府藏已竭藏徂浪翻皇太后太剔取宮中金銀器物以充賞衆莫有鬬志俄而丁文豪之衆知休範已死稍欲退散文豪厲聲曰我獨不能定天下邪許公輿詐稱桂陽王在新亭士民惶惑詣蕭道成壘投刺者以千數凡求見之禮先投刺以自達毛晃曰書姓名以自白故曰刺皆焚之登北城謂曰劉休範父子昨已就戮尸在南岡下南岡即勞山之岡也以在新亭城南故謂之南岡道成之出屯新亭也加平南將軍諦音帝審也名刺皆已焚勿憂懼也道成遣陳顯達張敬兒及輔師將軍任農夫馬軍主東平周盤龍等將兵自石頭濟淮從承明門入衞宮省袁粲慷慨謂諸將曰今寇賊已逼而衆情離沮孤子受先帝付託不能綏靜國家粲時居喪故自稱孤子任音壬將即亮翻沮在呂翻被甲上馬將驅之被皮義翻於是陳顯達等引兵出戰大破杜黑騾於杜姥宅飛矢貫顯達目丙申張敬兒等又破黑騾等於宣陽門斬黑騾及丁文豪進克東府餘黨悉平蕭道成振旅還建康還從宣翻又如字百姓緣道聚觀曰全國家者此公也道成與袁粲褚淵劉秉皆上表引咎解職不許丁酉解嚴大赦夏柔然遣使來聘使疏吏翻夏六月庚子以平南將軍蕭道成為中領軍南兗州刺史留衞建康道成自此得政矣號為四貴夏桂陽王休範之反也使道士陳公昭作天公書題云沈丞相付荊州刺史沈攸之門者攸之不開視推得公昭送之朝廷考異曰宋略云桂陽遺攸之書署曰沈丞相攸之斬其使今從宋書攸之謂僚佐曰桂陽必聲言我與之同若不顛沛勤王顛沛勤王者危難之際奔走顛仆以從王事也乃與南徐州刺史建平王景素郢州刺史晉熙王燮湘州刺史王僧虔雍州刺史張興世雍於用翻同舉兵討休範休範留中兵參軍毛惠連等守尋陽燮遣中兵參軍馮景祖襲之癸卯惠連等開門請降降戶江翻考異曰宋略作癸亥按下有戊申今從宋書殺休範二子諸鎮皆罷兵景素宏之子也建平王宏文帝之子也夏乙卯魏詔曰下民兇戾不顧親戚一人為惡殃及闔門朕為民父母深所愍悼自今非謀反大逆外叛罪止其身於是始罷門房之誅門誅者誅其一門房誅者誅其一房時河北大族如崔如李子孫分派各自為房魏顯祖勤於為治治直吏翻賞罰嚴明慎擇牧守守式又翻進廉退貪諸曹疑事舊多奏決又口傳詔敕或致矯亶上皇命事無大小皆據律正名不得為疑奏合則制可違則彈詰盡用墨詔制可者手詔可其所奏彈詰者劾問之合謂與律合也違謂悖於律也詰去吉翻尤重刑罰大刑多令覆鞫大刑謂死罪㣥臣頗以為言上皇曰滯獄誠非善治治直吏翻不猶愈於倉猝而濫乎夫人幽苦則思善故智者以囹圄為福堂囹盧丁翻圄音語朕特苦之欲其改悔而加矜恕爾由是囚繫雖滯而所刑多得其宜又以赦令長姦故自延興以後不復有赦泰始七年魏改元延興長知兩翻復扶又翻夏秋七月庚辰立皇弟友為邵陵王夏乙酉加荊州刺史沈攸之開府儀同三司攸之固辭執政欲徵攸之而憚於發命乃以太后令遣中使謂曰使疏吏翻公久勞于外宜還京師任寄實重未欲輕之進退可否在公所擇攸之曰臣無廊廟之資居中實非其才至於撲討蠻蜑蜑亦蠻屬音蕩旱翻毛晃曰蜑南夷海種也范成大桂海漁虞海上水居蠻也以舟為家沿海蜑有三種漁蜑取魚蠔蜑取蠔木蜑伐山取材大率皆取海物為糧生食之入水能視陳師道曰二廣居山谷間不隸州縣謂之傜人舟居謂之蜑人島居謂之黎人余謂巴黔亦自有蜑人克清江漢不敢有辭雖自上如此上時掌翻去留伏聽朝旨朝直遙翻乃止夏癸巳柔然寇魏敦煌尉多侯擊破之尚書奏敦煌僻遠介居西北強寇之間西謂吐谷渾北柔然也敦徒門翻尉紆勿翻請內徙就涼州㣥臣集議皆以為然給事中昌黎韓秀獨以為敦煌之置為日已久雖逼強寇人習戰鬬縱有草竊不為大害循常置戍足以自全而能隔閡西北二虜使不得相通閡五慨翻今徙就涼州不唯有蹙國之名且姑臧去敦煌千有餘里防邏甚難邏力佐翻二虜必有交通闚之志漢武帝開河西四郡以隔絕西羌月氏不得與匈奴通其規畫正如此也音俞則關中不得安枕又士民或安土重遷招引外寇為國深患不可不慮也乃止夏九月考異曰後魏帝紀使將軍元蘭五將三萬騎及假東陽王丕為後繼伐蜀漢不言勝負列傳及宋書皆無之今不取丁酉以尚書令袁粲為中書監領司徒加褚淵尚書令劉秉丹楊尹粲固辭求反居墓所不許粲受遺輔政適罹艱棘國有大難釋衰絰以從金革之事大難既平求歸終喪禮也淵以褚澄為吳郡太守司徒左長史蕭惠明言於朝朝直遙翻考異曰宋略作惠朗按惠朗不為司徒長史今從南史曰褚澄開門納賊更為股肱大郡王蘊力戰幾死棄而不收幾居希翻又音祁賞罰如此何憂不亂淵甚慙冬十月庚申以侍中王蘊為湘州刺史夏十一月丙戌帝加元服大赦夏十二月癸亥立皇弟躋為江夏王贊為武陵王躋牋西翻夏戶雅翻夏是歲魏建安貞王陸馛卒馛蒲撥翻三年乙卯四七五春正月辛巳帝祀南郊明堂二祀並舉也蕭道成以襄陽重鎮張敬兒人位俱輕不欲使居之而敬兒求之不已蓋道成先許之也沈攸之在荊州公知其欲何所作不出敬兒以表裏制之恐非公之利道成笑而無言道成居內敬兒居外以制其後故曰表裏制之也己巳以驍騎將軍張敬兒為都督雍梁二州諸軍事雍州刺史驍堅堯翻騎奇寄翻雍於用翻沈攸之聞敬兒上上時掌翻恐其見襲陰為之備敬兒既至奉事攸之親敬甚至動輒咨稟信饋不絕攸之以為誠然酬報款厚累書欲因遊獵會境上敬兒報以為心期有在影迹不宜過敦謂動則有影行則有迹人將窺見之也敦厚也敬兒得其事迹皆密白道成道成與攸之書問張雍州遷代之日將欲誰擬攸之即以示敬兒欲以間之史言攸之墮敬兒術中而不悟且為襲江陵張本間古莧翻夏五月丙午魏主使員外散騎常侍許赤虎來聘丁未魏主如武州山辛酉如車輪山地形志秀容郡敷城縣有車輪泉車尺遮翻六月庚午魏初禁殺牛馬牛者農之所資馬者兵之所資禁殺當也魏興於北荒畜牧蕃庶殺之者不禁今始禁之袁粲褚淵皆固讓新官秋七月庚戌復以粲為尚書令復扶又翻八月庚子加護軍將軍褚淵中書監冬十二月丙寅魏徙建昌王長樂為安樂王樂音洛己丑魏城陽王長壽卒南徐州刺史建平王景素孝友清令服用儉素又好文學好呼到翻禮接士大夫由是有美譽太宗特愛之異其禮秩時太祖諸子俱盡諸孫唯景素為長帝凶狂失德朝野皆屬意於景素帝外家陳氏深惡之長知兩翻屬之欲翻惡烏路翻楊運長阮佃夫等欲專權勢不利立長君亦欲除之其腹心將佐多勸景素舉兵鎮軍參軍濟陽江淹獨諫之景素時以鎮北將軍鎮京口以淹為主簿鎮軍當作鎮北濟子禮翻是歲防閤將軍王季符得罪於景素江左之制禁衞有直閤將軍王國有防閤將軍告景素謀反騎奇寄翻運長等即欲發兵討之袁粲蕭道成以為不可景素亦遣世子延齡詣闕自陳乃徙季符於梁州奪景素征北將軍開府儀同三司征北亦當作鎮北聶崇岐標點王崇武覆校
