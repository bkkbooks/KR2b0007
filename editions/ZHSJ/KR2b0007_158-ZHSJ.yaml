body:
  text: 資治通鑑卷第一百五十八端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註梁紀十四五月高祖武皇帝十四大同四年戊午五三八五月春正月辛酉朔日有食之五月東魏碭郡獲巨象送鄴魏收志孝昌二年置碭郡治下邑城屬徐州碭徒朗翻丁卯大赦改元元象五月二月己亥上耕藉田五月東魏大都督善無賀拔仁攻魏南汾州刺史韋子粲降之降戶江翻下同丞相泰滅子粲之族東魏大行臺侯景等治兵於虎牢治直之翻將復河南諸州魏梁迥韋孝寬趙繼宗皆棄城西歸梁迥在潁川韋孝寬在汝南未知趙繼宗所棄何城也章甲十一行本州下有數旬二字乙十一行本同孔本同退齋校同未拔廣州治襄城集諸將議之行洛州事盧勇請進觀形勢東魏洛州治洛陽諸將即亮翻下同班志河南郡密縣有大騩山魏收志密縣屬滎陽郡五代志滎陽郡新鄭縣有大騩山帥讀曰率騎奇寄翻騩隗同五賄翻又音歸日已暮勇多置幡旗於樹顛夜分騎為十隊鳴角直前擒魏儀同三司程華斬儀同三司王征蠻而還還從宣翻又如字廣州守將駱超退超作越遂以城降東魏丞相歡以勇行廣州事勇辯之從弟也盧辯仕於西魏而勇仕於東魏從才用翻考異曰典略侯景克廣州在十一月按北史魏文帝紀二月東魏陷南汾潁豫廣四州今從之五月初柔然頭兵可汗始得返國事見一百四十九卷普通二年可從刊入聲汗音寒及永安以後雄據北方禮漸驕倨雖信使不絕不復稱臣使疏吏翻下同復扶又翻頭兵嘗至洛陽心慕中國乃置侍中黃門等官後得魏汝陽王典籤淳于覃親寵任事以為祕書監使典文翰及兩魏分裂頭兵轉不遜數為邊患數所角翻魏丞相泰以新都關中方有事山東欲結婚以撫之以舍人元翌女為化政公主妻頭兵弟塔寒妻七細翻又言於魏主請廢乙弗后納頭兵之女甲辰以乙弗后為尼魏立乙弗后見上卷大同元年頭兵遂留東魏使者元整不報其使五月三月辛酉東魏丞相歡以沙苑之敗敗見上卷上年詔許之頃之復故考異曰北齊帝紀止有高祖解丞相年月而無復故之文按興和元年議曆有丞相田曹參軍信都芳蓋因邙山之捷而復也五月柔然送悼后於魏郁久閭后諡曰悼馬萬匹駝二千頭至黑鹽池唐志鹽州五原縣有烏池白池烏池蓋即黑鹽池也乘繩證翻柔然營幕戶席皆東向扶風王孚請正南面后曰我未見魏主固柔然女也魏仗南面我自東向丙子立皇后郁久閭氏丁丑大赦以王盟為司徒丞相泰朝于長安還屯華州朝直遙翻下同華戶化翻五月夏四月庚寅東魏高歡朝于鄴既解丞相遂不書官而書姓通鑑紀實非如春秋之有所褒貶也壬辰還晉陽五月五月甲戌東魏遣兼散騎常侍鄭伯猷來聘考異曰魏帝紀在二月丙辰蓋始受命時也今從梁帝紀五月秋七月東魏荊州刺史王則寇淮南此淮南謂光城弋陽之地在淮水上流之南非指古淮南郡治壽春之淮南五月癸亥詔以東冶徒李胤之得如來舍利大赦如來猶言佛也五月東魏侯景高敖曹等圍魏獨孤信于金墉太師歡帥大軍繼之帥讀曰率下同景悉燒洛陽內外官寺民居存者什二三魏主將如洛陽拜園陵魏自孝文帝遷洛以後孝武帝西遷以前園陵皆在洛州遂與丞相泰俱東命尚書左僕射周惠達輔太子欽守長安開府儀同三司李弼車騎大將軍達奚武帥千騎為前驅八月庚寅丞相泰至穀城漢志河南郡有穀成縣師古註曰即今新安水經註曰穀城縣城西臨穀水騎奇寄翻下同陳讀曰陣儀同三司太安莫多婁貸文請帥所部擊其前鋒莫多婁虜三字姓貸文勇而專不受命與可朱渾道元以千騎前進夜遇李弼達奚武於孝水五代志新安縣有孝水水經註孝水出廆山之陰北流注于穀在河南城西四十里曳柴揚塵貸文走弼追斬之道元單騎獲免悉俘其衆送恆農恆戶登翻泰進軍瀍東瀍水出河南穀城縣北山東與千金渠合又東過洛陽縣南又東過偃師縣又東入于洛辛卯泰帥輕騎追景至河上景為陳北據河橋南屬邙山陳讀曰陣下陵陳置陳陷陳同屬之欲翻景置陳北據河橋者慮兵有利鈍先保固其北歸之路也南屬邙山可以見其兵多矣景軍參用馬步其置陳堅固宇文泰以輕騎來見其陳勢如此斂兵不進可也遽前合戰亦屢勝而驕耳與泰合戰泰馬中流矢驚逸遂失所之泰墜地東魏兵追及之左右皆散都督李穆下馬以策抶泰背罵曰籠東軍士抶丑栗翻打也荀子曰仁人之兵當之者潰觸之者角摧按角鹿埵隴種東籠而退耳楊倞註曰其義未詳蓋皆摧敗披靡之貌陸德明曰東籠沾濕貌也如衣服之沾濕然爾曹王章甲十一行本王作主乙十一行本同孔本同熊校同何在而獨留此追者不疑其貴人捨之而過穆以馬授泰與之俱逸魏兵復振擊東魏兵大破之宇文泰先以輕騎合戰而不利大兵繼至軍勢復振故大破東魏京兆忠武公高敖曹意輕泰建旗蓋以陵陳魏人盡銳攻之一軍皆沒敖曹單騎走投河陽南城河陽南城在河橋南岸北岸即北中城歡之從祖兄子也樂音洛從才用翻下其從同與敖曹有怨閉門不受敖曹仰呼求繩不得拔刀穿闔未徹而追兵至杜預曰闔門扇也未徹未透也徹敕列翻追者見其從奴持金帶從才用翻問敖曹所在奴指示之敖曹知不免奮頭曰來與汝開國公言得其頭西魏將以開國賞之也高歡聞之如喪肝膽喪息浪翻杖高永樂二百贈敖曹太師大司馬太尉泰賞殺敖曹者布絹萬段歲歲稍與之比及周亡猶未能足比必利翻魏又殺東魏西兗州刺史宋顯等虜甲士萬五千人赴河死者以萬數初歡以万俟普尊老爵尊而齒老也万莫北翻俟渠之翻嘗親扶上馬其子洛免冠稽首曰上時掌翻稽音啟願出死力以報深恩及邙山之戰諸軍北渡橋北渡河橋也謂魏人曰万俟受洛干在此能來可來也魏人畏之而去歡名其所營地為回洛唐志河陽關南有回洛故城是日東西魏置陳既大首尾懸遠從旦至未戰數十合史言兩軍確鬬塞悉則翻魏獨孤信李遠居右趙貴怡峯居左戰並不利又未知魏主及丞相泰所在皆棄其卒先歸開府儀同三司李虎念賢等為後軍見信等退即與俱去泰由是燒營而歸留儀同三司長孫子彥守金墉王思政下馬舉長矟左右橫擊一舉輒踣數人矟色角翻踣蒲北翻陷陳既深從者盡死思政被重創悶絕會日暮敵亦收兵思政每戰常著破衣弊甲從才用翻被皮義翻創初良翻下裹創同著陟略翻敵不知其將帥故得免將即亮翻帥所類翻帳下督雷五安於戰處哭求思政會其已蘇割衣裹創扶思政上馬夜久始得還營平東將軍蔡祐下馬步鬬左右勸乘馬以備倉猝謂兵有邂逅乘馬則倉猝可以奔馳丞相愛我如子今日豈惜生乎帥左右十餘人合聲大呼擊東魏兵殺傷甚衆東魏圍之十餘重帥讀曰率呼火故翻重直龍翻祐彎弓持滿四面拒之東魏人募厚甲長刀者直進取之去祐可三十步左右勸射之祐曰吾曹之命在此一矢豈可虛發將至十步祐乃射之應弦而倒射而亦翻東魏兵稍卻祐徐引還魏主至恆農守將已棄城走所虜降卒在恆農者相與閉門拒守恆戶登翻將即亮翻降戶江翻丞相泰攻拔之誅其魁首數百人蔡祐追及泰於恆農夜見泰泰曰承先蔡祐字承先吾無憂矣泰驚不得寢枕祐股然後安史言泰氣衰膽失枕之任翻常為士卒先戰還諸將皆爭功祐終無所言泰每歎曰承先口不言勳我當代其論敍史言蔡祐沈勇不伐除侍中東道行臺魏之東伐關中留守兵少少詩沼翻前後所虜東魏士卒散在民間聞魏兵敗謀作亂李虎等至長安計無所出與太尉王盟僕射周惠達等奉太子欽出屯渭北百姓互相剽掠關中大擾剽匹妙翻於是沙苑所虜東魏都督趙青雀雍州民于伏德等遂反據章甲十一行本據上有青雀二字乙十一行本同孔本同退齋校同長安子城伏德保咸陽雍於用翻後魏置咸陽郡於石安縣石安漢渭城縣秦之咸陽也石勒改曰石安五代志京兆渭陽縣舊置咸陽郡與咸陽太守慕容思慶各收降卒以拒還兵降卒東魏之卒降于西魏散在民間者也還兵西魏之兵自洛西還者也降戶江翻日與之戰帥讀曰率大都督侯莫陳順擊賊屢破之賊不敢出順崇之兄也扶風公王羆鎮河東大開城門悉召軍士謂曰今聞大軍失利青雀作亂諸人莫有固志王羆受委於此以死報恩有能同心者可共固守必恐城陷任自出城衆感其言皆無異志魏主留閿鄉閿音旻丞相泰以士馬疲弊不可速進且謂青雀等烏合不能為患曰我至長安以輕騎臨之必當面縛通直散騎常侍吳郡陸通諫曰陸通本吳人曾祖載從宋武帝入關及劉義真之敗沒于赫連遂居關中賊逆謀久定必無遷善之心蜂蠆有毒左傳臧文仲之言蠆丑邁翻且賊詐言東寇將至東寇謂東魏之兵百姓謂為信然以賊言為信也今軍雖疲弊精銳尚多以明公之威總大軍以臨之何憂不克泰從之引兵西入父老見泰至莫不悲喜士女相賀華州刺史宇文導引兵入咸陽斬思慶禽伏德南渡渭與泰會攻青雀破之華戶化翻太保梁景睿以疾留長安與青雀通謀泰殺之五月東魏太師歡自晉陽將七千騎至孟津未濟聞魏師已遁遂濟河遣別將追魏師至崤魏收志太和十一年置崤縣屬恆農郡因三崤山以名縣隋幷崤縣入河南熊耳縣程大昌曰三崤山一名嶔崟山元和志曰自東崤至西崤三十五里東崤長阪數里峻阜絕澗車不得方軌西崤全是石阪十二里險不異東崤此二崤皆在秦關之東漢關之西還從宣翻又如字下同歡攻金墉長孫子彥棄城走焚城中室屋俱盡歡毀金墉而還東魏之遷鄴也見一百五十六卷中大通六年獨孤信之敗也謂邙山之敗信先棄軍西還為大行臺倉曹郎中歡囚讓之兄弟五人讓之曰昔諸葛亮兄弟事吳蜀各盡其心謂亮事蜀瑾事吳也不忠不孝必不為也明公推誠待物物亦歸心若用猜忌去霸業遠矣歡皆釋之九月魏主入長安丞相泰還屯華州華戶化翻五月東魏大都督賀拔仁擊邢磨納盧仲禮等平之磨納等起兵見上卷上年盧景裕本儒生太師歡釋之召館於家使教諸子景裕講論精微難者或相詆訶大聲厲色言至不遜而景裕神采儼然風調如一從容往復難乃旦翻詆丁禮翻訶虎何翻調徒釣翻從千容翻無際可尋性清靜歷官屢有進退無得失之色弊衣粗食恬然自安終日端嚴如對賓客五月冬十月魏歸高敖曹竇泰莫多婁貸文之首于東魏五月散騎常侍劉孝儀等聘于東魏散悉亶翻騎奇寄翻五月十二月魏是云寶襲洛陽東魏洛州刺史王元軌棄城走都督趙剛襲廣州拔之於是自襄廣以西城鎮復為魏魏收志孝昌中置襄州領襄城舞陰南安期城北南陽建城郡五代志潁川郡葉縣後齊置襄州復扶又翻下孫復同五月魏自正光以後四方多事民避賦役多為僧尼至二百萬人寺有三萬餘區至是東魏始詔牧守令長亶立寺者計其功庸守式又翻長知兩翻庸用也勞也雇也以枉法論五月初魏伊川土豪李長壽為防蠻都督五代志河南郡陸渾縣齊置伊川郡領南陸渾縣春秋時秦晉遷陸渾之戎於伊川故郡以為名伊闕以南大山長谷蠻多居之魏置都督以防焉孝武帝西遷長壽帥其徒拒東魏華戶化翻帥讀曰率魏以長壽為廣州刺史侯景攻拔其壁殺之其子延孫復收集父兵以拒東魏魏之貴臣廣陵王欣錄尚書長孫稚等皆攜家往依之長知兩翻延孫資遣衞送使達關中東魏高歡患之數遣兵攻延孫不能克數所角翻魏以延孫為京南行臺節度河南諸軍事廣州刺史京南謂洛京以南也魏以延孫兵少少詩沼翻更以長壽之壻京兆韋法保為東洛州刺史西魏洛州治上洛以洛陽之地為東洛州法保名祐以字行既至與延孫連兵置柵於伏流伏流城伊川郡治所隋改南陸渾縣曰伏流水經註曰陸渾故城東南八十許里有三塗山伊水逕其下又東北逕伏流嶺東劉澄之永初記稱伏流縣西有伏流坂者今山在縣南崖口北三十里許西則非也欲繕脩宮室使外兵郎中天水權景宣曹魏置二十三郎有中兵外兵都兵別兵元魏以後中兵外兵又分左右採運者使之採木運入洛陽城也河南皆叛景宣間道西走間古莧翻與李延孫相會攻孔城拔之魏收志天平中置新城郡治孔城屬北荊州五代志河南郡伊闕縣舊曰新城置新城郡杜佑曰孔城防今伊闕縣東南故城是又曰高齊置孔城防於壽安縣丞相泰即留景宣守張白塢塢在宜陽西北水經註河內軹縣有張白騎塢在溟水北原上據二溪之會北帶深隍三面阻險唯西面板築而已是歲延孫為其長史楊伯蘭所殺韋法保即引兵據延孫之柵東魏將段琛等據宜陽將即亮翻琛丑林翻遣陽州刺史牛道恆誘魏邊民魏收志天平初置陽州領宜陽金門郡治宜陽恆戶登翻誘音酉按韋孝寬傳時西魏令孝寬領宜陽郡事遷南兗州刺史然南兗州治譙城在東魏境內孝寬未能取其地也論歸款之意使諜人遺之於琛營諜徒協翻遺如字墜失也琛果疑道恆孝寬乘其猜阻出兵襲之擒道恆及琛崤澠遂清崤澠崤山及澠池也澠彌兗翻五代志絳郡稷山舊置勳州勳州即玉壁也杜佑曰稷山縣南十二里即玉壁城詔加都督汾晉幷州諸軍事幷州刺史行臺如故東西魏蓋於汾州據險為界晉幷皆入於東魏五月東魏以高澄攝吏部尚書始改崔亮年勞之制崔亮制停年格見一百四十九卷天監十八年又沙汰尚書郎妙選人地以充之凡才名之士雖未薦擢皆引致門下與之遊宴講論賦詩士大夫以是稱之史言高澄收拾人物以傾元氏五年己未五三九春正月乙卯以尚書左僕射蕭淵藻為中衞將軍丹楊尹何敬容為尚書令吏部尚書張纘為僕射纘弘策之子也張弘策帝舅也佐帝創業宰相皆以文義自逸敬容獨勤簿領日旰不休為時俗所嗤鄙旰古按翻嗤丑之翻自徐勉周捨既卒普通五年周捨卒大同元年徐勉卒卒子恤翻外朝則何敬容內省則朱三公卿監尚書為外朝官門下省為內省朝直遙翻羊至翻以綱維為己任文華敏洽曲營世譽二人行異而俱得幸於上行下孟翻善伺候人主意為阿諛用事三十年廣納貨賂欺罔視聽遠近莫不忿疾園宅玩好飲膳聲色窮一時之盛每休下休沐之日自省中出還私第為休下伺相吏翻好呼到翻下遐嫁翻唯王承王稚及褚翔不往承稚暕之子王暕儉之子帝用之官至侍中尚書僕射淵之曾孫也褚淵蕭齊佐命丁巳御史中丞參禮儀事賀琛奏南北二郊及藉田往還並宜御輦不復乘輅詔從之祀宗廟仍乘玉輦駕馬為輅駕人為輦瑒之弟子也賀瑒以儒學進瑒雉杏翻又音暢辛酉東魏以尚書令孫騰為司徒辛未上祀南郊魏丞相泰於行臺置學取丞郎府佐德行明敏者充學生行下孟翻悉令旦治公務晚就講習時就學者苟能以其所治之事質之於經傳有所感發此其所學之進又豈螢窗雪案搜經摘傳者所能及邪治直之翻東魏丞相歡歡以沙苑之敗求自貶既復其官史復以丞相書之廣宗縣漢屬鉅鹿郡後屬安平國後魏太和二十一年立廣宗郡東魏屬司州瑗丁眷翻與諸刺史書褒稱謨等以勸之夏五月甲戌東魏立丞相歡女為皇后乙亥大赦魏以開府儀同三司李弼為司空秋七月章乙十一行本月下有魏字退齋校同以扶風王孚為太尉九月甲子東魏發畿內十萬人城鄴四十日罷冬十月癸亥以新宮成大赦改元興和魏置紙筆於陽武門外以求得失十一月乙亥東魏使散騎常侍王元景魏收來聘東魏人以正光曆浸差魏行正光曆見一百四十九卷普通三年杜佑曰漢之蘭臺及後漢東觀皆藏書之室當時文學之士使讎校於其中故有校書之職蓋有校書之任而未為官也故以郎居其任則謂之校書郎以郎中居其任則謂之校書郎中至後魏始置祕書校書郎甲子號曰興光曆既成行之散騎常侍朱奏頃來置州稍廣而小大不倫請分為五品其位秩高卑參僚多少皆以是為差參僚即參佐於是上品二十州次品十州次品八州次品二十三州下品二十一州時上方事征伐恢拓境宇北踰淮汝東距彭城西開牂柯牂柯音臧哥南平俚洞交廣界表俚人依阻深險各自為洞俚音里故請分之其下品皆異國之人徒有州名而無土地或因荒徼之民所居村落置州及郡縣刺史守令皆用彼人為之就彼土以土人為之徼吉弔翻山川險遠職貢罕通五品之外又有二十餘州不知處所凡一百七州又以邊境鎮戍雖領民不多欲重其將帥皆建為郡或一人領二三郡太守州郡雖多而戶口日耗矣務廣地者荒貪人有者殘信哉將即亮翻帥所類翻魏自西遷以來禮樂散逸丞相泰命左僕射周惠達吏部郎中北海唐瑾損益舊章至是稍備瑾渠吝翻六年庚申五四春正月壬申東魏以廣平公庫狄干為太保丁丑東魏主入新宮東魏作新宮於鄴見上卷大同元年魏扶風王孚卒二月己亥上耕藉田魏鑄五銖錢東魏大行臺侯景出三鵶杜佑曰三鵶在今汝州魯陽縣西南十九里有平高城周以禦齊高齊於縣東北十七里置魯城以禦周三年西魏乘沙苑之勝取荊州景乃還將即亮翻騎奇寄翻魏文后既為尼居別宮大通四年魏廢文后為尼尼女夷翻乃以其子武都王戊為泰州刺史使文后隨之官魏主雖限以大計謂以國事廢乙弗而立柔然女也好呼到翻密令養髮有追還之意養羊尚翻會柔然舉國渡河南侵渡河南侵靈夏帝曰豈有興百萬之衆為一女子邪為于偽翻雖然致人此言朕亦何顏以見將帥將即亮翻帥所類翻乃遣中常侍曹寵齎手敕賜文后自盡文后泣謂寵曰願至尊千萬歲天下康寧死無恨也遂自殺鑿麥積崖而葬之號曰寂陵夏丞相泰召諸軍屯沙苑以備柔然右僕射周惠達發士馬守京城塹諸街巷召雍州刺史王羆議之塹七豔翻雍於用翻羆不應召謂使者曰若蠕蠕至渭北者王羆自帥鄉里破之王羆京兆人使疏吏翻蠕人兗翻帥讀曰率何為天子城中作如此驚擾由周家小兒恇怯致此恇去王翻柔然至夏州而退未幾悼后遇疾殂幾居豈翻五月乙酉張乙酉作己酉魏行臺宮延和陝州刺史宮延慶降于東魏陝式冉翻降戶江翻東魏以河北馬場為義州以處之按杜佑通典衞州汲郡古牧野之地魏孝文帝太和十七年徙代畜於石濟之西故有河北馬場魏收志是時置義州治汲郡陳城領五城義寧新安澠池恆農宜陽金門郡五代志汲郡汲縣東魏置義州僑置七郡二十八縣則七郡皆僑置於汲縣界又據朱元旭傳時分河內汲郡二郡界扶風之地立義州以置關西歸正之民後周武帝滅齊改義州為衞州治汲處昌呂翻東魏陽州武公高永樂卒據北齊書高永樂封陽州縣公閏月丁丑朔日有食之己丑東魏封皇兄景植為宜陽王皇弟威為清河王謙為潁川王六月壬子東魏華山王鷙卒二年東魏以鷙為大司馬華戶化翻秋七月丁亥東魏使兼散騎常侍李象等來聘八月戊午大赦九月據張校增戊戌司空袁昂卒遺疏不受贈諡敕諸子勿上行狀及立銘誌行狀狀其平生之行實上之於朝以請諡銘誌立碑於墓以傳後洪适曰東漢自路都尉始建墓闕蓋表阡碑銘之濫觴也有文而傳於今則自謁者景君墓表始君以安帝元初元年卒齊葬穆議立石誌王儉以為非禮經所出元嘉中顏延之輩為之遂相祖述爾任昉作文章緣起又云墓碑自晉始予考酈氏水經所載漢刻已不少後魏與齊梁時相先後也豈碑碣多在北方南人未之見乎然郭林宗傳云林宗既葬同志者立碑蔡邕為其文謂盧植曰吾為碑銘多矣唯郭有道無愧色史稱王儉晉宋以來故事該憶無遺范書所載豈不知之今漢人舊刻猶存數十百碑云始於晉宋非也行下孟翻上時掌翻贈本官諡穆正公冬十一月魏太師念賢卒吐谷渾自莫折念生之亂不通于魏伏連籌卒子夸呂立始稱可汗居伏俟城五代志隋破吐谷渾以伏俟城置西海郡其地有西王母石窟青海鹽池即在漢金城郡臨羌縣西北塞外王莽受卑和羌所獻地置西海郡者也北史伏俟城在青海西十五里吐從暾入聲谷音浴可從刊入聲汗音寒南北千餘里官有王公僕射尚書郎中將軍之號是歲始遣使假道柔然聘於東魏使疏吏翻七年辛酉五四一春正月辛巳上祀南郊大赦辛丑祀明堂宕昌王粱仚定為其下所殺弟彌定立宕徒浪翻仚許延翻考異曰梁帝紀作彌泰今從典略二月乙巳以彌定為河梁二州刺史宕昌王辛亥上耕藉田藉秦昔翻魏幽州刺史順陽王仲景坐事賜死西魏無幽州意豳州也三月魏夏州刺史劉平伏據上郡反魏收志上郡屬東夏州領石門因城縣隋志延安郡有因城縣夏戶雅翻夏五月遣兼散騎常侍明少遐等聘于東魏秋七月己卯東魏宜陽王景植卒魏以侍中宇文測為大都督行汾州事五代志龍泉郡後周置汾州隋改隰州治隰川縣深之兄也為政簡惠得士民心地接東魏隰川東接東魏晉州界測擒獲之命解縛引與相見為設酒殽待以客禮數所角翻抄楚交翻為于偽翻幷給糧餼餼許氣翻衞送出境東魏人大慚不復為寇復扶又翻汾晉之間遂通慶弔時論稱之或告測交通境外者丞相泰怒曰測為我安邊我知其志何得間我骨肉間古莧翻命斬之魏丞相泰欲革易時政為強國富民之法大行臺度支尚書兼司農卿蘇綽盡其智能贊成其事減官員置二長度徒洛翻長知兩翻下令長同幷置屯田以資軍國又為六條詔書九月始奏行之一曰清心二曰敦教化三曰盡地利四曰擢賢良五曰恤獄訟六曰均賦役泰甚重之嘗置諸坐右坐徂臥翻又令百司習誦之其牧守令長非通六條及計帳不得居官守式又翻計帳見上卷大同元年東魏詔㣥官於麟趾閤議定法制謂之麟趾格冬十月甲寅頒行之乙巳東魏發夫五萬築漳濱堰三十五日罷十一月丙戌東魏以彭城王韶為太尉度支尚書胡僧敬為司空僧敬名虔以字行國珍之兄孫東魏主之舅也胡國珍靈后之父十二月東魏遣兼散騎常侍李騫來聘交趾李賁世為豪右仕不得志同郡據張校增有幷韶者富於詞藻詣選求官吏部尚書蔡撙以幷姓無前賢除廣陽門郎廣陽門建康城西面南頭第一門姓譜原有脫字幷府盈翻撙祖本翻賁與韶還鄉里章甲十一行本里下有謀作亂三字乙十一行本同孔本同張校同退齋校同會交州刺史武林侯諮以刻暴失衆心沈約志永平郡有武林縣宋文帝立永平晉穆帝升平五年分蒼梧立五代志日南郡梁置德州監工銜翻諮輸賄于賁奔還廣州上遣諮與高州刺史孫冏新州刺史盧子雄將兵擊之五代志梁大通中割番州合浦縣立高州在隋海康縣界端州新興縣梁立新州將即亮翻恢之子也鄱陽王恢上之弟也是歲魏又益新制十二條宇文泰前已行二十四條今又益十二條故曰新制東魏丞相歡以諸州調絹不依舊式調徒釣翻謂尺度不依舊式也民甚苦之奏令悉以四十尺為匹魏自喪亂以來謂孝昌以來也喪息浪翻六鎮之民相帥內徙就食齊晉歡因之以成霸業事見一百五十五卷中大通三年四年齊晉直謂春秋列國大界帥讀曰率連年戰爭河南州郡鞠為茂草小弁之詩曰踧踧周道鞠為茂草註云鞠窮也民多餓死歡命諸州濱河及津梁凡江河濟渡之處皆曰津橫絕水為橋以通往來曰梁供軍旅備饑饉又於幽瀛滄青四州傍海煑鹽軍國之費傍步浪翻粗得周贍粗坐五翻贍而豔翻至是東方連歲大稔穀斛至九錢山東之民稍復蘇息矣史言高歡於兵荒之餘能紓民力復扶又翻又如字東魏尚書令高澄尚靜帝妹馮翊長公主生子孝琬朝貴賀之長知兩翻朝直遙翻澄曰此至尊之甥先賀至尊三日帝幸其第賜錦綵布絹萬匹於是諸貴競致禮遺遺于季翻貨滿十室東魏臨淮王孝友表曰令制百家為族二十五家為閭五家為比百家之內有帥二十五徵發皆免苦樂不均羊少狼多復有蠶食使狼將羊羊雖衆終為狼所噬況羊少而狼多乎諭族帥並緣侵漁閭帥閭帥又侵漁比帥比帥又侵漁其所領四家也比毘至翻帥所類翻樂音洛少詩沼翻復扶又翻京邑諸坊或七八百家唯一里正二史庶事無闕而況外州乎請依舊置三正之名不改三正即李沖建議所置三長計族省十一章甲十一行本一作二乙十一行本同張校同丁貲絹番兵所益甚多事下尚書寢不行貲絹謂計貲輸絹番兵謂番代為兵下遐嫁翻安成望族劉敬躬以妖術惑衆人多信之妖於驕翻考異曰南史作敬宮今從梁書八年壬戌五四二春正月敬躬據郡反改元永漢署官屬進攻廬陵逼豫章南方久不習兵人情擾駭豫章內史張綰募兵以拒之綰纘之弟也二月戊戌江州刺史湘東王繹遣司馬王僧辯中兵曹子郢討敬躬受綰節度二月戊辰擒敬躬送建康斬之僧辯神念之子也天監七年王神念自魏來奔器宇肅然雖射不穿札左傳潘尪之徹七札焉編甲如櫛齒相比曰札而志氣高遠魏初置六軍夏四月丙寅東魏使兼散騎常侍李繪來聘繪元忠之從子也李元忠勸成高歡討爾朱之謀從才用翻東魏丞相歡朝于鄴朝直遙翻司徒孫騰坐事免乙酉以彭城王韶錄尚書事侍中廣陽王湛為太尉尚書右僕射高隆之為司徒初太尉章甲十一行本尉作傅乙十一行本同孔本同張校同尉景與丞相歡同歸爾朱榮見一百五十二卷大通二年歡之姊也自恃勳戚貪縱不法為有司所劾繫獄歡三詣闕泣請乃得免死史言高歡為是使勳貴知有王法劾戶概翻又戶得翻丁亥降為驃騎大將軍開府儀同三司驃匹妙翻騎奇寄翻歡往造之景臥不起大叫曰殺我時趣邪造七到翻趣讀曰促後趣之同歡撫而拜謝之辛卯以庫狄干為太傅以領軍將軍婁昭為大司馬封祖裔為尚書右僕射六月甲辰歡還晉陽八月庚戌東魏以開府儀同三司吏部尚書侯景為兼尚書僕射河南道大行臺隨機防討既委景以備梁魏又使討叛貳隨機則便宜從事其任重矣為侯景叛東魏張本魏以王盟為太保東魏丞相歡擊魏入自汾絳連營四十里丞相泰使王思政守玉壁以斷其道斷音短後於玉壁置勳州杜佑曰玉壁城在絳州稷山縣西南十二里歡以書招思政曰若降當授以幷州高歡以晉陽為根本幷州之任要重於諸州降戶江翻可朱渾道元降道元降見上卷元年冬十月己亥歡圍玉壁凡九日遇大雪士卒飢凍多死者遂解圍去魏遣太子欽鎮蒲坂丞相泰出軍蒲坂至皂莢聞歡退渡汾追之不及十一月東魏以可朱渾道元為幷州刺史激於王思政之書也十二月魏主狩於華陰大享將士丞相泰帥諸將朝之華戶化翻將即亮翻帥讀曰率朝直遙翻起萬壽殿於沙苑北辛亥東魏遣兼散騎常侍楊斐來聘考異曰典略作陽斐今從魏書紀孫冏盧子雄討李賁以春瘴方起請待至秋廣州刺史新渝侯映不許吳立新喻縣屬安成郡渝當作喻冏等至合浦死者什六七趣讀曰促瘴之亮翻熱病也南方瘴熱春氣深則瘴起染之者必死軍行尤畏之衆潰而歸映憺之子也始興王憺上弟也憺徒敢翻又徒濫翻逗留不進敕於廣州賜死子雄弟子略子烈主帥廣陵杜天合及弟僧明新安周文育等帥子雄之衆攻廣州欲殺映諮為子雄復冤主帥所類翻等帥讀曰率下同為于偽翻西江督護高要太守吳興陳霸先帥精甲三千救之高要縣漢屬蒼梧梁置高要郡隋為高要縣端州治所元和郡縣志曰端州當西江口入廣西要道祝穆曰西江源出邕州經潯融象柳等州入封州界合桂江漢武帝自巴蜀發夜郎兵下牂柯江會番禺即此水蕭子顯曰廣州統內西南二江川源深遠別置督護專征討之任殺天合擒僧明文育霸先以僧明文育驍勇過人釋之以為主帥驍堅堯翻詔以霸先為直閤將軍陳霸先事始此魏丞相泰妻馮翊公主生子覺東魏以光州刺史李元忠為侍中元忠雖處要任處昌呂翻不以物務干懷唯飲酒自娛丞相歡欲用為僕射世子澄言其放達常醉不可委以臺閣其子搔聞之請節酒搔蘇遭翻元忠曰我言作僕射不勝飲酒樂樂音洛爾愛僕射宜勿飲酒九年癸亥五四三春正月壬戌東魏大赦改元武定東魏御史中尉高仲密取吏部郎崔暹之妹既而棄之由是與暹有隙仲密選用御史多其親戚鄉黨高澄奏令改選暹方為澄所寵任仲密疑其搆己愈恨之仲密後妻李氏豔而慧崔暹之妹既去李氏繼室故曰後妻李氏不從衣服皆裂以告仲密仲密益怨尋出為北豫州刺史北豫州治虎牢丞相歡疑之遣鎮城奚壽興典軍事鎮城之職猶防城都督仲密置酒延壽興伏壯士執之二月壬申以虎牢叛降魏降戶江翻魏以仲密為侍中司徒歡以仲密之叛由崔暹將殺之高澄匿暹為之固請為于偽翻下為之同歡曰我匄其命匄居大翻又居曷翻須與苦手言必痛杖之也而謂大行臺都官郎陳元康曰卿使崔暹得杖勿復相見復扶又翻元康為之言於歡曰為于偽翻大王方以天下付大將軍大將軍有一崔暹不能免其杖父子尚爾況於他人歡乃釋之高季式在永安戍永安縣古彘邑也漢屬河東郡後漢順帝改曰永安縣魏收志曰建義元年置永安郡治永安城屬晉州時季式罷晉州戍之隋廢永安郡改為霍邑縣季式走告歡歡待之如舊魏丞相泰帥諸軍以應仲密帥讀曰率以太子少傅李遠為前驅至洛陽遣開府儀同三司于謹攻柏谷拔之三月壬申嚴申改辰圍河橋南城東魏丞相歡將兵十萬至河北將即亮翻泰退軍瀍上縱火船於上流以燒河橋斛律金使行臺郎中張亮以小艇百餘載長鎖伺火船將至以釘釘之艇徒鼎翻小船也伺相吏翻上釘音丁下釘丁定翻引鎖向岸橋遂獲全歡渡河據邙山為陳不進者數日泰留輜重於瀍曲陳讀曰陣重直用翻瀍曲或作瀍西夜登邙山以襲歡候騎白歡曰賊距此四十餘里蓐食乾飯而來歡曰自當渴死乃正陣以待之歡欲堅陣以持之待其疲渴而後戰故云然乾音干戊申黎明泰軍與歡軍遇東魏彭樂以數千騎為右甄甄稽延翻衝魏軍之北垂所向奔潰遂馳入魏營人告彭樂叛歡甚怒俄而西北塵起樂使來告捷使疏吏翻虜魏侍中開府儀同三司大都督臨洮王柬蜀郡王榮宗江夏王昇鉅鹿王闡譙郡王亮詹事趙善及督將僚佐四十八人夏戶雅翻諸將乘勝擊魏大破之斬首三萬餘級洮土刀翻將即亮翻考異曰北齊書云俘斬六萬級今從北史彭樂傳歡使彭樂追泰泰窘窘巨隕翻謂樂曰汝非彭樂邪癡男子今日無我明日豈有汝邪何不急還營收汝金寶樂從其言獲泰金帶一囊以歸言於歡曰黑獺漏刃破膽矣歡雖喜其勝而怒其失泰令伏諸地親捽其頭連頓之捽昨沒翻捽持其髻也幷數以沙苑之敗事見上卷三年數所具翻噤齘良久噤齘切齒怒也噤直禁翻亦作禁頁齘胡介翻乞五千騎復為王取之復扶又翻為于偽翻歡曰汝縱之何意而言復取邪復扶又翻下日復同命取絹三千匹壓樂背因以賜之為歡屬其子澄令防彭樂張本明日復戰泰為中軍中山公趙貴為左軍領軍若于章甲十一行本于作干乙十一行本同下同孔本同張校同退齋校同惠等為右軍令狐德棻曰若干之先與魏俱起以國為姓魏書官氏志內入諸姓有若干氏于作干孫愐曰若人者翻大破之悉俘其步卒歡失馬赫連陽順下馬以授歡歡上馬走從者步騎七人上時掌翻從才用翻追兵至親信都督尉興慶曰王速去興慶腰有百箭足殺百人歡曰事濟以爾為懷州刺史魏收志天安二年置懷州於河內太和八年罷天平初復置領河內武德二郡用爾子興慶曰兒少願用兄歡許之少詩沼翻興慶拒戰矢盡而死考異曰典略作尉興敬今從北齊書北史東魏軍士有逃奔魏者告以歡所在考異曰周賀拔勝傳云太祖見齊神武旗鼓識之今從典略皆執短兵配大都督賀拔勝以攻之勝識歡於行間行戶剛翻執槊與十三騎逐之馳數里槊刃垂及槊色角翻因字之曰賀六渾賀拔破胡必殺汝歡氣殆絕河州刺史劉洪徽從傍射勝中其二騎河州時屬西魏境東魏使劉洪徽遙領刺史耳射而亦翻下同中竹仲翻斃之比副馬至比必利翻歡已逸去勝歎曰今日不執弓矢天也魏南郢州刺史耿令貴大呼獨入敵中魏收志梁置南郢州治赤石關領定城光城邊城郡五代志光州定城縣後齊置南郢州非西魏境也耿令貴亦遙領刺史耳呼火故翻人皆謂已死俄奮刀而還還從宣翻又如字如是數四當令貴前者死傷相繼乃謂左右曰吾豈樂殺人樂音洛壯士除賊不得不爾若不能殺賊又不為賊所傷何異逐坐人也逐坐人指當時持文墨議論者但能相隨逐坐談而坐食也左軍趙貴等五將戰不利東魏兵復振復扶又翻泰與戰又不利會日暮魏兵遂遁東魏兵追之獨孤信于謹收散卒自後擊之追兵驚擾魏諸軍由是得全若于惠夜引去東魏兵追之惠徐下馬顧命廚人營食食畢謂左右曰長安死此中死有以異乎乃建旗鳴角收散卒徐還追騎疑有伏兵不敢逼泰遂入關屯渭上歡進至陝陝失冉翻泰遣開府儀同三司達奚武等拒之行臺郎中封子繪言於歡曰混壹東西正在今日昔魏太祖平漢中不乘勝取巴蜀事見六十七卷漢獻帝建安二十年後悔無及願大王不以為疑歡深然之集諸將議進止咸以為野無青草人馬疲瘦不可遠追陳元康曰兩雄交爭歲月已久今幸而大捷天授我也時不可失當乘勝追之歡曰若遇伏兵孤何以濟元康曰王前沙苑失利彼尚無伏今奔敗若此何能遠謀若捨而不追必成後患歡不從為歡悔不用陳元康之言張本余謂邙山之戰蓋俱傷而兩敗宇文泰雖力屈而遁高歡之氣亦衰矣安敢復深入乎遂東歸泰召王思政於玉壁將使鎮虎牢未至而泰敗乃使守恆農恆戶登翻思政入城令開門解衣而臥慰勉將士示不足畏後數日劉豐生至城下憚之不敢進引軍還思政乃脩城郭起樓櫓營農田積芻粟由是恆農始有守禦之備丞相泰求自貶魏主不許是役也魏諸將皆無功唯耿令貴與太子武衞率王胡仁魏蓋改東宮武衞將軍為武衞率泰欲以雍岐北雍三州授之以州有優劣使探籌取之雍於用翻探吐南翻仍賜胡仁名勇令貴名豪文達名傑用彰其功於是廣募關隴豪右以增軍旅高仲密之將叛也陰遣人扇動冀州豪傑使為內應高乾兄弟本起兵於信都仲密故扇動其豪傑使為應於河北由是得安高澄密書與隆之曰仲密枝黨與之俱西者宜悉收其家屬以懲將來隆之以為恩旨既行理無追改若復收治復扶又翻治直之翻示民不信脫致驚擾所虧不細乃啟丞相歡而罷之以太子詹事謝舉為尚書僕射夏四月林邑王攻李賁賁將范脩破林邑於九德吳分九真立九德郡五代志曰日南郡九德縣梁置德州將即亮翻清水氐酋李鼠仁清水縣漢屬天水郡晉屬略陽郡五代志曰後魏置清水郡隋廢郡為縣屬秦州酋慈秋翻據險作亂隴右大都督獨孤信屢遣軍擊之不克丞相泰遣典籤天水趙昶往諭之諸酋長聚議長知兩翻或從或否其不從者欲加刃於昶昶神色自若辭氣逾厲鼠仁感悟遂相帥降帥讀曰率降戶江翻氐酋梁道顯叛泰復遣昶諭降之酋慈秋翻復扶又翻下州復同徙其豪帥四千章甲十一行本千作十乙十一行本同孔本同餘人幷部落於華州帥所類翻華戶化翻泰即以昶為都督使領之泰使諜潛入虎牢令守將魏光固守諜徒協翻將即亮翻侯景獲之改其書云宜速去縱諜入城光宵遁景獲高仲密妻子送鄴北豫洛二州復入于東魏五月壬辰東魏以克復虎牢降死罪已下囚唯不赦高仲密家丞相歡以高乾有義勳謂起兵於信都以奉歡也謂戰死於河陽也謂先自永安戍奔告歡也為于偽翻仲密妻李氏當死高澄盛服見之曰今日何如李氏默然遂納之高澄以漁色使宗勳外叛其父幾死於兵長惡不悛衒服以誘納之他日楊燕之禍叔姪相屠釁由李氏豈天也邪乙未以侯景為司空賞平虎牢之功也秋七月魏大赦以王盟為太傅廣平王贊為司空八月乙丑東魏以汾州刺史斛律金為大司馬東魏遣兼散騎常侍李渾等來聘冬十一月甲午東魏主狩于西山鄴西無山蓋邯鄲之西山也乙巳還宮高澄啟解侍中東魏主以其弟幷州刺史太原公洋代之丞相歡築長城於肆州北山西自馬陵東至土墱馬陵蓋東魏置戍之地九域志代州崞縣有土墱寨墱北史作隥音丁鄧翻魏諸牧守共謁丞相泰泰命河北太守裴俠別立魏收志河北郡屬陝州本漢晉河東郡之河北縣地也隋廢郡復為縣屬河東郡守式又翻俠戶頰翻裴俠清慎奉公為天下最有如俠者可與俱立衆默然無敢應者泰乃厚賜俠朝野歎服號為獨立君朝直遙翻下同十年甲子五四四春正月李賁自稱越帝置百官改元大章甲十一行本大作天乙十一行本同孔本同熊校同德三月癸巳東魏丞相歡巡行冀定二州行下孟翻校河北戶口損益因朝于鄴甲午上幸蘭陵謁建寧陵使太子入守京城辛丑謁脩陵晉置南東海郡於京口南蘭陵郡於延陵建寧陵梁紀曰建陵皇妣張皇后陵也脩陵皇后郗氏陵也丙午東魏以開府儀同三司孫騰為太保己酉上幸京口城北固樓更名北顧鎮江府圖經曰京口城因山為壘緣江為境爾雅丘絕高曰京故曰京口又府治東五里有京峴山京口得名以此北固山在府北一里迴嶺下臨長江即府治所據及甘露寺基蕭正義傳曰京城之西有別嶺入江高數十丈三面臨水號曰北固蔡謨起樓其上以置軍實帝登望久之曰此嶺不足須固守然於京口實乃壯觀於是改曰北顧庚戌幸回賓亭宴鄉里故老及所經近縣迎候者少長數千人少詩照翻長知兩翻各賚錢二千壬子東魏以高澄為大將軍領中書監元弼為錄尚書事左僕射司馬子如為尚書令侍中高洋為左僕射丞相歡多在晉陽孫騰司馬子如高岳高隆之皆歡之親黨也委以朝政朝直遙翻鄴中謂之四貴其權勢熏灼中外率多專恣驕貪歡欲損奪其權故以澄為大將軍領中書監移門下機事總歸中書門下省衆事侍中給事中等掌之今高歡移而總歸中書所以重澄之權孫騰見澄不肯盡敬澄叱左右牽下於牀築以刀環立之門外太原公洋於澄前拜高隆之呼為叔父澄怒罵之隆之本洛陽人歡命為弟故洋以叔父呼之兒子浸長長知兩翻公宜避之於是公卿以下見澄無不聳懼庫狄干澄姑之壻也干娶歡妹立於門外三日乃得見澄欲置腹心於東魏主左右擢中兵參軍崔季舒為中書侍郎澄每進書於帝有所諫請或文辭繁雜季舒輒脩飾通之帝報澄父子之語常與季舒論之曰崔中書我乳母也季舒挺之從子也從才用翻夏四月乙卯上還自蘭陵五月甲申朔魏丞相泰朝于長安朝直遙翻甲午東魏遣散騎常侍魏季景來聘季景收之族叔也尚書令何敬容妾弟盜官米以書屬領軍河東王譽屬之欲翻丁酉敬容坐免官東魏廣陽王湛卒魏琅琊貞獻公賀拔勝諸子在東者丞相歡盡殺之脩邙山之怨也丞相泰常謂人曰諸將對敵神色皆動唯賀拔公臨陳如平時陳讀曰陣真大勇也秋七月魏更權衡度量更工衡翻命尚書蘇綽損益三十六條之制總為五卷頒行之二十四條幷新制十二條總為三十六條二十四條見上卷大同元年皆依新制而遣焉守手又翻長知兩翻數年之間百姓便之魏自正光以後政刑弛縱在位多貪汙丞相歡啟以司州中從事宋遊道為御史中尉五代志後齊司州置牧屬官有別駕從事史治中從事史以遊道為尚書左丞澄謂暹遊道曰卿一人處南臺一人處北省處昌呂翻御史臺謂之南臺尚書省謂之北省杜佑曰御史臺在宮闕西南故名南臺尚書省在北故曰北省當使天下肅然暹選畢義雲等為御史時稱得人義雲衆敬之曾孫也宋明帝初畢衆敬降魏澄欲假暹威勢諸公在坐坐徂臥翻令暹後至通名高視徐步兩人挈裾而入澄分庭對揖暹不讓而坐觴再行即辭去澄留之食暹曰適受敕在臺檢校遂不待食而去澄降階送之他日澄與諸公出之東山時於鄴都治東山為遊宴之地前驅為赤棒所擊澄回馬避之尚書令司馬子如以丞相歡故人當重任意氣自高與太師咸陽王坦黷貨無厭厭於鹽翻暹前後彈子如坦及幷州刺史可朱渾道元等罪狀無不極筆宋遊道亦劾子如坦及太保孫騰司徒高隆之司空侯景尚書元羨等劾戶概翻又戶得翻澄收子如繫獄一宿髮盡白辭曰司馬子如從夏州策杖投相王中大通四年歡破爾朱氏召子如於南岐州蓋雍華路阻取道夏州東歸也夏戶雅翻乘繩證翻觠牸牛犢觠巨員翻曲角也牸音字犢在道死唯觠角存此外皆取之於人丞相歡以書敕澄曰司馬令吾之故舊汝宜寬之澄駐馬行街出子如脫其鎖子如懼曰非作事邪懼澄殺之也癸酉削子如官爵九月甲申以濟陰王暉業為太尉濟子禮翻太師咸陽王坦以王還第罷太師也其餘死黜者甚衆久之歡見子如哀其憔悴憔慈消翻悴秦醉翻以膝承其首親為擇蝨為于偽翻蝨色櫛翻賜酒百缾羊五百口米五百石澄繩之以公法歡接之以舊恩此其父子駕御勳貴之術也高澄對諸貴極言褒美崔暹且戒屬之屬之欲翻丞相歡書與鄴下諸貴曰崔暹居憲臺咸陽王司馬令皆吾布衣之舊尊貴親暱無過二人暱尼質翻過工禾翻同時獲罪吾不能救諸君其慎之宋遊道奏駁尚書違失數百條省中豪吏王儒之徒並鞭斥之令僕已下皆側目駁北角翻高隆之誣遊道有不臣之言罪當死給事黃門侍郎楊愔曰畜狗求吠愔於今翻畜許竹翻養也今以數吠殺之恐將來無復吠狗復扶又翻遊道竟坐除名澄謂遊道曰卿早從我向幷州不爾彼經略殺卿遊道從澄至晉陽以為大行臺吏部部下當有郎字己丑大赦東魏以喪亂之後戶口失實傜賦不均喪息浪翻冬十月丁巳以太保孫騰大司徒高隆之魏齊官制司徒未嘗加大大字衍分行諸州使疏吏翻行下孟翻得無籍之戶六十餘萬僑居者皆勒還本屬十一月甲申以高隆之錄尚書事以前大司馬婁昭為司徒庚子東魏主祀圜丘東魏丞相歡襲擊山胡破之山胡即汾州山中稽胡也分配諸州是歲東魏以散騎常侍魏收兼中書侍郎脩國史自梁魏通好好呼到翻魏書每云想彼境內寧靜此率土安和上復書去彼字而已收始定書云想境內清晏今萬里安和上亦效之張政烺標點容肇祖聶崇岐覆校
