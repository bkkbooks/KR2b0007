body:
  text: 資治通鑑卷第二十五翰林學士朝散大夫右諫議大夫知制誥兼侍講同提舉萬壽觀公事兼判集賢院上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣奉敕編集後學天台音註漢紀十七地節三年中宗孝宣皇帝上之下地節三年甲寅前六七地節三年春三月詔曰蓋聞有功不賞有罪不誅雖唐虞不能章甲十五行本能下有以字乙十一行本同孔本同化天下今膠東相王成勞來不怠師古曰謂勸勉招懷百姓勞郎到翻來郎代翻師古曰隱度名數而來附業也占音之贍翻師古曰異於常等治直吏翻秩中二千石未及徵用會病卒官卒子恤翻後詔使丞相御史問郡國上計長史守丞以政令得失貢父曰郡使守丞國使長史皆一物也故總言郡國上計長史守丞後漢百官志諸侯王相如太守長史如郡丞又邊郡有丞元有長史長史上計無疑矣上時掌翻前膠東相成偽自增加以蒙顯賞是後俗吏多為虛名云地節三年夏四月戊申立子奭為皇太子以丙吉為太傅太中大夫疏廣為少傅疏姓也考異曰荀紀立皇太子在去年四月戊申漢書舊本亦然顏師古據疏廣及丙吉傳並云地節三年立皇太子知在此年者是也平恩侯國屬魏郡宋白曰魏為縣屬廣平郡唐屬洺州有平恩川恩澤侯表冠陽侯食邑於南陽郡霍顯聞立太子怒恚不食歐血曰恚於避翻歐烏口翻此乃民間時子安得立即后有子反為王邪復教皇后令毒太子皇后數召太子賜食保阿輒先嘗之保母阿母也復扶又翻數所角翻地節三年五月甲申丞相賢以老病乞骸骨賜黃金百斤安車駟馬罷就第丞相致仕自賢始地節三年六月壬辰以魏相為丞相辛丑丙吉為御史大夫疏廣為太子太傅廣兄子受為少傅太子外祖父平恩侯許伯以為太子少白使其弟中郎將舜監護太子家許伯即許廣漢稱伯者蓋尊之也少詩照翻監古銜翻廣對曰太子國儲副君師友必於天下英俊不宜獨親外家許氏且太子自有太傅少傅官屬已備今復使舜護太子家示陋師古曰言獨親外家示天下以淺陋復扶又翻上善其言以語魏相語牛倨翻相免冠謝曰此非臣等所能及廣由是見器重地節三年京師大雨雹大行丞東海蕭望之上疏言大臣任政一姓專權之所致據望之傳為大行治禮丞拜為謁者時上博延賢俊民多上書言便宜輒下望之問狀下遐稼翻高者請丞相御史師古曰望之以其人所言之狀請於丞相御史或以奏聞即見超擢滿歲以狀聞師古曰試令行其所言之事或以諸他職事試之劉仲馮曰觀其意共是一條不當中分卻煩解說也顏說非也高者則令丞相御史試事歲滿各以狀聞誤斷其文爾余謂高者則請丞相御史試事次者中二千石試事文意固是一貫而分高次則非誤斷也罷其言不可用故報聞而罷歸田里也師古曰當主上之意也處昌呂翻地節三年冬十月詔曰乃者九月壬申地震朕甚懼焉有能箴朕過失及賢良方正直言極諫之士以匡朕之不逮毋諱有司師古曰箴戒也匡正也李奇曰諱避也雖有司在顯職皆言其過勿避之不能附遠是以邊境屯戍未息今復飭兵重屯久勞百姓師古曰飭整也復扶又翻下同其罷車騎將軍右將軍屯兵又詔池籞未御幸者假與貧民蘇林曰折竹以繩綿連禁禦使人不得往來律名為籞服虔曰籞在池水中作室可用棲鳥鳥入中則捕之應劭曰池者陂池也籞者禁苑也臣瓚曰籞者所以養鳥也設為藩落周覆其上令鳥不得出猶苑之畜獸池之畜魚也師古曰蘇應二說是治直之翻下同流民還歸者假公田貸種食師古曰貸音吐戴翻種五穀種也音之勇翻且勿算事師古曰不出算賦及給徭役地節三年霍氏驕侈縱橫橫戶孟翻太夫人顯廣治第室作乘輿輦加畫繡絪馮黃金塗韋絮薦輪如淳曰絪亦茵馮謂所馮者也以黃金塗飾之師古曰茵蓐也以繡為茵馮而黃金塗于輦也晉灼曰御輦以韋緣輪著之以絮師古曰取其行安不搖動也馮與憑同著音張呂翻師古曰輓謂牽引車輦也音晚與監奴馮子都亂師古曰監奴謂奴之監知家務者走馬馳逐平樂館雲當朝請數稱病私出樂音洛朝直遙翻請才性翻數所角翻下同多從賓客張圍獵黃山苑中使倉頭奴上朝謁文穎曰朝當用謁不自行而令奴上謁者也師古曰上謁若今參見尊貴而通人也孔穎達曰漢家僕隸謂之蒼頭以蒼巾為飾異於民也上時掌翻顯及諸女晝夜出入長信宮殿中亡期度師古曰長信宮上官太后所居亡古無字通帝自在民間聞知霍氏尊盛日久內不能善既躬親朝政御史大夫魏相給事中顯謂禹雲山女曹不務奉大將軍餘業師古曰女音汝曹輩也今大夫給事中他人壹間女能復自救邪間古莧翻復扶又翻下同後兩家奴爭道師古曰謂霍氏及御史家欲躢大夫門御史為叩頭謝乃去躢與蹋同為于偽翻師古曰告語也會魏大夫為丞相數燕見言事見賢遍翻下同平恩侯與侍中金安上等徑出入省中時霍山領尚書上令吏民得奏封事不關尚書㣥臣進見獨往來師古曰謂各各得盡言於上也惡烏路翻上頗聞霍氏毒殺許后而未察乃徙光女壻度遼將軍未央衞尉平陵侯范明友為光祿勳功臣侯表平陵侯食邑於南陽郡之武當縣任音壬守式又翻下同數月復出光姊壻給事中光祿大夫張朔為蜀郡太守㣥孫壻中郎將王漢為武威太守頃之復徙光長女壻長樂衞尉鄧廣漢為少府戊戌更以張安世為衞將軍兩宮衞尉城門北軍兵屬焉兩宮未央長樂也城門京城十二門屯兵也北軍北軍八校兵也更工衡翻冠小冠大司馬大將軍冠武弁大冠今貶禹故使冠小冠冠小之冠古玩翻亡古無字通特使禹官名與光俱大司馬者蘇林曰特但也但為光祿勳及光中女壻趙平為散騎騎章甲十五行本騎字不重乙十一行本同孔本同都尉光祿大夫將屯兵又收平騎都尉印綬散騎騎都尉以騎都尉而加散騎官也百官表云散騎中常侍皆加官中常侍得入禁中散騎騎並乘輿車如淳曰自列侯下至郎中皆得有散騎及中常侍加官是時散騎及中常侍各自一官無員也中讀曰仲悉易以所親信許史子弟代之地節三年初孝武之世徵發煩數百姓貧耗窮民犯法姦軌不勝數所角翻勝音升又如字於是使張湯趙禹之屬條定法令作見知故縱監臨部主之法師古曰見知人犯法不舉告為故縱而所監臨部主有罪併連坐之也監古銜翻孟康曰孝武欲急刑吏深害及故入人罪者皆寬緩之也師古曰吏釋罪人疑以為縱出則急誅之亦言尚酷禁罔寖密律令煩苛文書盈於几閣典者不能徧睹是以郡國承用者駮師古曰不曉其指用意不同也姦吏因緣為市師古曰弄法而受財若市賈之交易傅讀曰附所欲陷則予死比師古曰比以例相比況也廷尉史鉅鹿路溫舒上書曰臣聞齊有無知之禍而桓公以興齊襄公為公子無知所殺雍廩復殺無知齊國大亂桓公自莒入立晉獻公信驪姬之讒殺世子申生逐公子重耳夷吾而立驪姬之子奚齊卓子皆為里克所殺夷吾入立復為秦所執既而歸之卒而子圉嗣秦納重耳子圉死而文公遂霸諸侯難乃旦翻伯讀曰霸諸呂作亂而孝文為太宗事見十三卷禍亂之作將以開聖人也夫繼變亂之後必有異舊之恩此賢聖所以昭天命也往者昭帝即世無嗣昌邑淫亂乃皇天所以開至聖也臣聞春秋正即位大一統而慎始也春秋之法繼弒君不言即位繼正即位正也與天合符宜改前世之失正始受命之統滌煩文除民疾以應天意臣聞秦有十失其一尚存治獄之吏是也治直之翻夫獄者天下之大命也死者不可復生絕者不可復屬復扶又翻師古曰屬連也音之欲翻書曰與其殺不辜寧失不經師古曰虞書大禹謨載咎繇之言辜罪也經常也言人命至重治獄宜慎寧失不常之過不濫殺無罪之人所以崇寬恕也上下相敺敺與驅同深者獲公名平者多後患故治獄之吏皆欲人死非憎人也自安之道在人之死是以死人之血流離於市被刑之徒比肩而立被皮義翻大辟之計歲以萬數辟毗亦翻此仁聖之所以傷也太平之未洽凡以此也夫人情安則樂生樂音洛痛則思死棰楚之下何求而不得故囚人不勝痛則飾辭以示之勝音升吏治者利其然則指導以明之治直吏翻上奏畏卻則鍛練而周內之上時掌翻晉灼曰精熟周悉致之法中也師古曰卻退也畏為上所卻退卻丘略翻蓋奏當之成師古曰當謂處其罪也猶以為死有餘辜師古曰皋陶作士善聽獄訟故以為喻也陶音遙成練者衆文致之罪明也故俗語曰畫地為獄議不入刻木為吏期不對師古曰畫獄木吏尚不入對況真實乎期猶必也議必不入對悲痛之辭也唯陛下省法制寬刑罰則太平之風可興於世上善其言地節三年十二月詔曰間者吏用法巧文寖深是朕之不德也夫決獄不當使有罪興邪不辜蒙戮晉灼曰當重而輕使有罪者起邪惡之心也師古曰有罪者更興邪惡無辜者反陷重刑是決獄不平故也當丁浪翻朕甚傷之今遣廷史與郡鞠獄任輕祿薄如淳曰廷史廷尉史也以囚辭決獄事為鞠謂疑獄也李奇曰鞠窮也獄事窮竟也師古曰李說是也秩六百石員四人其務平之以稱朕意於是每季秋後請讞時為于偽翻稱尺證翻讞語蹇翻又魚戰翻又魚列翻議獄也上常幸宣室齋居而決事如淳曰宣室布政教之室也重用刑故齋戒以決事晉灼曰未央宮中有宣室殿師古曰晉說是也賈誼傳亦云受釐坐宣室蓋其殿在前殿之側也齋則居之涿郡太守鄭昌上疏言今明主躬垂明聽雖不置廷平獄將自正若開後嗣不若刪定律令師古曰刪刊也有不便者則刊而除之愚民知所避姦吏無所弄矣今不正其本而置廷平以理其末政衰聽怠則廷平將召權而為亂首矣孟康曰召求也招致權著己也猶賣弄也師古曰孟說是也地節三年昭帝時匈奴使四千騎田車師及五將軍擊匈奴事見上卷本始三年車師復通於漢匈奴怒召其太子軍宿欲以為質軍宿焉耆外孫不欲質匈奴亡走焉耆車師王更立子烏貴為太子復扶又翻下同質音致走音奏更工衡翻及烏貴立為王與匈奴結婚姻教匈奴遮漢道通烏孫者是歲侍郎會稽鄭吉與校尉司馬憙會古外翻憙許吏翻將免刑罪人田渠犂積穀罪人免其刑使屯田西域諸國有逐水草與匈奴同俗者謂之行國其城居者謂之城郭諸國也破之車師王請降降戶江翻匈奴發兵攻車師吉憙引兵北逢之匈奴不敢前吉憙即留一候與卒二十人留守王吉等引兵歸渠犂考異曰西域傳云地節二年以匈奴傳校之知在三年乃輕騎奔烏孫吉即迎其妻子傳送長安傳知戀翻匈奴更以車師王昆弟兜莫為車師王收其餘民東徙不敢居故地而鄭吉始使吏卒三百人往田車師地以實之為下元康二年匈奴爭車師張本地節三年上自初即位數遣使者求外家數所角翻久遠多似類而非是是歲求得外祖母王媼文穎曰幽州及漢中皆謂老嫗曰媼師古曰媼女老稱也音烏老翻無故及武皆媼子也旬日章甲十五行本日作月乙十一行本同孔本同間賞賜以鉅萬計四年四年春二月賜外祖母號為博平君據外戚傳以博平蠡吾二縣為湯沐邑而地理志博平縣屬東郡平昌侯國屬平原郡樂昌侯國屬東郡恩澤侯表武封樂昌侯食邑於汝南四年夏五月山陽濟陰雹如雞子深二尺五寸深式浸翻殺二十餘人飛鳥皆死四年詔自今子有匿父母妻匿夫孫匿大父母皆勿治四年立廣川惠王孫文為廣川王本始四年廣川王去以罪自殺今復立文嗣封王四年霍顯及禹山雲自見日侵削數相對啼泣自怨數所角翻山曰今丞相用事縣官信之盡變易大將軍時法令發揚大將軍過失又諸儒生多窶人子師古曰窶貧而無禮孔穎達曰貧無可為禮謂之窶音其羽翻喜妄說狂言喜許吏翻不避忌諱大將軍常讎之師古曰言嫉之如仇讎也好呼到翻人人自書對事多言我家者嘗有上書言我家昆弟驕恣其言絕痛山屏不奏後上書者益黠盡屏必郢翻黠下八翻奏封事輒使中書令出取之不關尚書益不信人又聞民間讙言霍氏毒殺許皇后師古曰讙衆聲也音許爰翻毒許后事見上卷本始三年顯恐急即具以實告禹山雲禹山雲驚曰如是何不早告禹等縣官離散斥逐諸壻用是故也此大事誅罰不小柰何於是始有邪謀矣雲舅李竟所善張赦見雲家卒卒師古曰卒讀曰猝怱遽之貌也謂竟曰今丞相與平恩侯用事可令太夫人言太后太夫人謂霍顯上官太后霍氏外孫也移徙陛下在太后耳長安男子張章告之事下廷尉下遐稼翻執金吾捕張赦等後有詔止勿捕山等愈恐相謂曰此縣官重太后故不竟也師古曰重難也竟窮竟其事也見賢遍翻久之猶發發即族矣不如先也師古曰言先反皆曰安所相避師古曰言無處相避當受禍也會李竟坐與諸侯王交通辭語及霍氏有詔雲山不宜宿衞免就第山陽太守張敞上封事曰臣聞公子季友有功於魯趙衰有功於晉田完有功於齊皆疇其庸延及子孫終後田氏篡齊趙氏分晉季氏顓魯魯公子季友殺慶父立僖公以安魯國遂世為上卿專魯國之政晉公子重耳出亡趙衰從及其反國伯諸侯衰皆有功遂世為晉卿有軍行至趙鞅遂與智韓魏分晉國田完自陳奔齊桓公禮而用之桓公之伯完與有功其後陳成子得齊國之政至田和遂篡齊而有之迹盛衰譏世卿最甚乃者大將軍決大計安宗廟定天下功亦不細矣夫周公七年耳周公輔成王七年而反政於成王自武帝後元二年至地節二年適二十歲斷丁亂翻方其隆盛時感動天地侵迫陰陽朝臣宜有明言曰陛下褒寵故大將軍以報功德足矣間者輔臣顓政貴戚太盛君臣之分不明分扶問翻請罷霍氏三侯皆就第及衞將軍張安世宜賜几杖歸休時存問召見見賢遍翻以列侯為天子師明詔以恩不聽㣥臣以義固爭而後許之天下必以陛下為不忘功德而朝臣為知禮朝直遙翻下同霍氏世世無所患苦今朝廷不聞直聲師古曰言朝臣不進直言以陳其事非策之得者也師古曰言失計也人情不相遠以臣心度之度徒洛翻大司馬及其枝屬必有畏懼之心夫近臣自危非完計也臣敞願於廣朝白發其端直守遠郡師古曰直讀曰值朝直遙翻其路無由唯陛下省察省悉井翻上甚善其計然不召也禹山等家數有妖怪數所角翻妖於驕翻舉家憂愁山曰丞相亶減宗廟羔菟鼃可以此罪也如淳曰高后時定令輒有亶議宗廟者棄市師古曰羔菟鼃所以供祭也菟吐故翻鼃古蛙字為于偽翻召丞相平恩侯以下使范明友鄧廣漢承太后制引斬之因廢天子而立禹約定未發雲拜為玄菟太守菟同都翻太中大夫任宣為代郡太守會事發覺秋七月雲山明友自殺顯禹廣漢等捕得禹要斬要古腰字通與霍氏相連坐誅滅者數十家太僕杜延年以霍氏舊人亦坐免官八月己酉皇后霍氏廢處昭臺宮師古曰在上林苑中處昌呂翻乙丑詔封告霍氏反謀者男子張章期門董忠左曹楊惲百官表侍中左右曹皆加官晉灼曰漢儀注諸吏給事中日上朝謁平尚書奏事分為左右曹惲於粉翻章為博成侯忠高昌侯惲平通侯安上都成侯高為樂陵侯丞相敞子安上車騎將軍日磾弟子高史良娣兄子也初霍氏奢侈茂陵徐生曰霍氏必亡夫奢則不遜不遜則章甲十五行本則作必乙十一行本同張校同侮上侮上者逆道也在人之右師古曰右上也霍氏秉權日久害之者多矣天下害之而又行以逆道不亡何待乃上疏言霍氏泰盛陛下即愛厚之宜以時抑制無使至亡書三上輒報聞漢制上書不行者輒報聞罷而告霍氏者皆封人為徐生上書曰臣聞客有過主人者為于偽翻過古禾翻見其竈直突傍有積薪客謂主人更為曲突突竈突囪也更工衡翻不者且有火患主人嘿然不應俄而家果失火鄰里共救之幸而得息於是殺牛置酒謝其鄰人灼爛者在於上行師古曰灼謂被燒炙者也行戶郎翻而不錄言曲突者人謂主人曰鄉使聽客之言不費牛酒終亡火患鄉讀曰嚮亡古無字通今論功而請賓曲突徙薪無恩澤焦頭爛額為上客邪主人乃寤而請之今茂陵徐福數上書言霍氏且有變宜防絕之鄉使福說得行數所角翻鄉讀曰嚮則國無裂土出爵之費臣無逆亂誅滅之敗往事既已而福獨不蒙其功唯陛下察之貴徙薪曲突之策使居焦髮灼爛之右上乃賜福帛十匹後以為郎帝初立謁見高廟見賢遍翻大將軍光驂乘漢制大駕大將軍驂乘乘繩證翻下同若有芒刺在背後車騎將軍張安世代光驂乘天子從容肆體甚安近焉從千容翻師古曰肆放也展也近其靳翻及光身死而宗族竟誅故俗傳霍氏之禍萌於驂乘師古曰萌謂始生也霍后復徙雲林館復扶又翻下同乃自殺班固贊曰霍光受襁褓之託任漢室之寄匡國家安社稷擁昭立宣雖周公阿衡何以加此師古曰阿衡伊尹官號也阿倚也衡平也言天下所倚㣥下取平也亡古無字通陰妻邪謀晉灼曰不揚其過也湛溺盈溢之欲湛讀曰沈以增顛覆之禍死財三年宗族誅夷哀哉臣光曰霍光之輔漢室可謂忠矣然卒不能庇其宗何也卒子恤翻夫威福者人君之器也人臣執之久而不歸鮮不及矣鮮息淺翻以孝昭之明十四而知上官桀之詐固可以親政矣況孝宣十九即位聰明剛毅知民疾苦而光久專大柄不知避去多置私章甲十五行本私作親乙十一行本同孔本同黨充塞朝廷塞悉則翻使人主蓄憤於上吏民積怨於下切齒側目待時而發其得免於身幸矣況子孫以驕侈趣之哉趣讀曰促雖然曏使孝宣專以祿秩賞賜富其子孫使之食大縣奉朝請亦足以報盛德矣乃復任之以政授之以兵及事叢釁積更加裁奪遂至怨懼以生邪謀豈徒霍氏之自禍哉亦孝宣醞釀以成之也昔鬬椒作亂於楚楚若敖之支庶為鬬氏以為子文無後何以勸善事見左傳宣四年子文鬬穀於菟也箴尹楚官名克黃子文之孫箴之金翻雖應夷滅而光之忠勳不可不祀遂使家無噍類噍才肖翻孝宣亦少恩哉四年九月詔減天下鹽賈賈讀曰價又令郡國歲上繫囚以掠笞若瘐死者上時掌翻蘇林曰瘐病也囚徒病律名為瘐如淳曰律囚以飢寒而死曰瘐師古曰瘐病是也此言囚或以掠笞及飢寒及疾病而死如說非也瘐音庾或作瘉其音亦同或讀作瘦誤據本紀瘐死上有飢寒二字掠音亮所坐縣名爵里漢書本紀作名縣爵里師古曰名者其人名也縣所屬縣也爵其身之官爵也里所居邑里也師古曰凡言殿最者殿後也課居後也最凡要之首也課居先也殿音丁見翻四年十二月清河王年坐內亂廢遷房陵武帝元光二年立清河王義以嗣代孝王後年義之孫也四年是歲北海太守廬江朱邑以治行第一入為大司農行下孟翻勃海太守龔遂入為水衡都尉先是勃海左右郡歲饑師古曰左右謂側近相次者先悉薦翻二千石不能禽制上選能治者治直之翻下同丞相御史舉故昌邑郎中令龔遂上拜為勃海太守召見見賢遍翻問何以治勃海息其盜賊對曰海瀕遐遠師古曰瀕涯也音頻又音賓不霑聖化其民困於飢寒而吏不恤故使陛下赤子盜弄陛下之兵於潢池中耳師古曰赤子猶言初生幼小之意也嬰孩初生體赤故曰赤子積水曰潢音黃將安之也師古曰勝謂以威力克而殺之安謂以德化撫而安之選用賢良固欲安之也遂曰臣聞治亂民猶治亂繩不可急也唯緩之然後可治治直之翻臣願丞相御史且無拘臣以文法得一切便宜從事上許焉加賜黃金贈遣乘傳至勃海界傳知戀翻郡聞新太守至發兵以迎遂皆遣還移書敕屬縣悉罷逐捕盜賊吏諸持鉏鉤田器者師古曰鉤鎌也吏毋得問持兵者乃為賊遂單車獨行至府盜賊聞遂教令即時解散棄其兵弩而持鉤鉏於是悉平民安土樂業樂音洛遂乃開倉廩假貧民師古曰假謂給與遂見齊俗奢侈好末技好呼到翻技渠綺翻不田作乃躬率以儉約勸民務農桑各以口率種樹畜養遂令民口種一樹榆百本䪥五十本葱一畦韭家三母彘五雞畜許六翻使賣劍買牛賣刀買犢曰何為帶牛佩犢勞來循行勞力到翻來力代翻行下孟翻郡中皆有畜積獄訟止息通鑑書龔遂自勃海入為列卿因敍其政績四年烏孫公主女為龜茲王絳賓夫人絳賓上書言得尚漢外孫願與公主女俱入朝朝直遙翻元康元年丙辰前六五四年春正月龜茲王及其夫人來朝皆賜印綬夫人號稱公主賞賜甚厚四年初作杜陵徙丞相將軍列侯吏二千石訾百萬者杜陵時以京兆杜縣東原上為初陵更名杜縣曰杜陵訾讀曰貲四年三月詔以鳳皇集泰山陳留甘露降未央宮赦天下四年有司復言悼園宜稱尊號曰皇考本始元年諡親曰悼置園邑復扶又翻五月立皇考廟四年冬置建章衞尉未央長樂建章甘泉皆有衞尉各掌其宮門衞屯兵四年趙廣漢好用世吏子孫新進年少者師古曰言舊吏家子孫而其人後出求進又年少也好呼到翻少詩照翻師古曰與鋒同言鋒銳之氣無所回避師古曰風生言其速疾不可當也回曲也莫為持難終以此敗廣漢以私怨論殺男子榮畜初廣漢客私酤酒長安市丞相吏逐去客疑男子蘇賢言之以語廣漢案賢賢父上書訟罪廣漢坐貶秩疑其邑子榮畜教令以他法論殺畜榮姓也周有榮公子孫以為氏事下丞相御史按驗下遐稼翻下同廣漢疑丞相夫人殺侍婢欲以此脅丞相丞相按之愈急廣漢乃將吏卒入丞相府召其夫人跪庭下受辭師古曰受其對辭也丞相上書自陳事下廷尉治實丞相自以過譴笞傅婢出至外第乃死不如廣漢言帝惡之惡烏路翻下廣漢廷尉獄吏民守闕號泣者數萬人號戶刀翻臣生無益縣官願代趙京兆死使牧養小民漢書本傳臣生之上有或言二字章甲十五行本臣上正有或言二字乙十一行本同孔本同退齋校同要與腰同考異曰本紀元康二年冬廣漢有罪要斬百官表本始三年廣漢為京兆尹六年要斬元康元年守京兆尹彭城太守遺按廣漢傳司直蕭望之劾奏廣漢摧辱大臣望之自司直為平原太守元康元年自平原太守為少府然則廣漢死當在元康元年本紀誤也廣漢傳又云地節三年七月丞相婢自絞死蓋婢死已數年而廣漢追發其事也廉明威制豪強小民得職師古曰得職各得其常所也四年是歲少府宋疇坐議鳳皇下彭城未至京師不足美貶為泗水太傅傅泗水王綜四年上選博士諫大夫通政事者補郡國守相以蕭望之為平原太守望之上疏曰陛下哀愍百姓恐德之不究師古曰究竟也謂周徧於天下朝無爭臣則不知過朝直遙翻爭讀曰諍所謂憂其末而忘其本者也上迺徵望之入守少府四年東海太守河東尹翁歸以治郡高第入為右扶風翁歸為人公廉明察郡中吏民賢不肖及姦邪罪名盡知之縣縣各有記籍自聽其政師古曰言決斷諸縣姦邪之事不委令長也吏民小解輒披籍服虔曰披有罪者籍也師古曰解讀曰懈師古曰於大會之中及行縣時則取罪人以警衆行下孟翻下改行以行同其有所取也以一警百吏民皆服恐懼改行自新其為扶風選用廉平疾姦吏以為右職職居諸吏之上為右職章甲十五行本有作以乙十一行本同孔本同禮好惡與同之好呼到翻惡烏路翻其負翁歸罰亦必行然溫良謙退不以行能驕人故尤得名譽於朝廷四年初烏孫公主少子萬年有寵於莎車王班書莎車國王治莎車城去長安九千九百五十里莎蘇禾翻時萬年在漢莎車國人計欲自託於漢又欲得烏孫心上書請萬年為莎車王漢許之遣使者奚充國送萬年姓譜奚姓夏車正奚仲之後暴惡國人不說說讀曰悅下同上令㣥臣舉可使西域者前將軍韓增舉上黨馮奉世以衞候使持節送大宛諸國客至伊循城衞候衞士候也伊循城在鄯善國漢於其中置屯田吏士使疏吏翻自立為王時匈奴又發兵攻車師城不能下而去莎車遣使揚言北道諸國已屬匈奴矣揚言謂宣揚其言於外也與歃盟畔漢從鄯善以西皆絕不通歃色甲翻鄯上扇翻都護鄭吉校尉司馬憙皆在北道諸國間奉世與其副嚴昌計以為不亟擊之則莎車日強其勢難制必危西域遂以節諭告諸國王因發其兵南北道合萬五千人進擊莎車攻拔其城莎車王自殺傳其首詣長安更立他弟昆弟子為莎車王更工衡翻諸國悉平威振西域奉世乃罷兵以聞帝召見韓增曰賀將軍所舉得其人奉世遂西至大宛大宛聞其斬莎車王敬之異於他使得其名馬象龍而還師古曰言馬形似龍者仲馮曰此馬名曰象龍也宛於元翻還從宣翻又如字說讀曰悅議封奉世丞相將軍皆以為可獨少府蕭望之以為奉世奉使有指師古曰本為送諸國客亶章甲十五行本亶下有矯字乙十一行本同孔本同制違命發諸國兵雖有功效不可以為後法即封奉世開後奉使者利以奉世為比師古曰比必寐翻余謂當音毗寐翻爭逐發兵要功萬里之外師古曰逐競也要一遙翻漸不可長為于偽翻長知兩翻奉世不宜受封上善望之議以奉世為光祿大夫二年二年春正月赦天下二年上欲立皇后時館陶主母華倢伃館陶縣屬魏郡華戶化翻倢伃音接予下同淮陽憲王欽楚孝王囂久之懲艾霍氏欲害皇太子艾音乂乃更選後宮無子而謹慎者二月乙丑立長陵王倢伃為皇后令母養太子封其父奉光為邛成侯恩澤侯表邛成侯食邑於濟陰邛渠容翻希得進見見賢遍翻二年五月詔曰獄者萬民之命能使生者不怨死者不恨則可謂文吏矣今則不然用法或持巧心析律貳端深淺不平師古曰析分也謂分破律條妄生端緒以出入人罪上亦亡由知師古曰上者天子自謂也亡古無字通二千石各察官屬勿用此人吏或亶興傜役飾廚傳稱過使客韋昭曰廚謂飲食傳謂傳舍言修飾意氣以稱過使而已師古曰使人及賓客來者稱其意而遣之令過去也傳知戀翻稱音尺孕翻過者過度之過也譬如踐薄冰以待白日豈不殆哉師古曰殆危也朕甚愍之其令郡國被災甚者被皮義翻毋出今年租賦二年又曰聞古天子之名難知而易諱也其更諱詢易以豉翻更工衡翻二年匈奴大臣皆以為車師地肥美近匈奴近其靳翻使漢得之多田積穀必害人國不可不爭由是數遣兵擊車師田者數所角翻鄭吉將渠犂田卒七千餘人救之為匈奴所圍吉上言車師去渠犂千餘里漢兵在渠犂者少勢不能相救願益田卒上與後將軍趙充國等議欲因匈奴衰弱出兵擊其右地使不得章甲十五行本得作敢乙十一行本同孔本同復擾西域復扶又翻魏相上書諫曰臣聞之救亂誅暴謂之義兵兵義者王敵加於己不得已而起者謂之應兵兵應者勝爭恨小故不忍憤怒者謂之忿兵兵忿者敗利人土地貨寶者謂之貪兵兵貪者破恃國家之大務章甲十五行本務作矜乙十一行本同孔本同熊校同民人之衆欲見威於敵者見賢遍翻謂之驕兵兵驕者滅此五者非但人事乃天道也間者匈奴嘗有善意所得漢民輒奉歸之未有犯於邊境雖爭屯田車師不足致意中謂不足介意也丞相不預中朝之議故言聞諸將軍大將軍車騎將軍前後左右將軍皆中朝官今邊郡困乏父子共犬羊之裘食草萊之實常恐不能自存難以動兵師古曰不可以兵事動之也必有凶年師古曰此引老子道經之語出兵雖勝猶有後憂恐災害之變因此以生今郡國守相多不實選師古曰言不得其人水旱不時按今年章甲十五行本年下有計字乙十一行本同孔本同子弟殺父兄妻殺夫者凡二百二十二人臣愚以為此非小變也今左右不憂此師古曰左右謂近臣在天子左右者殆孔子所謂吾恐季孫之憂不在顓臾而在蕭牆之內也師古曰論語季氏將伐顓臾孔子謂冉有季路曰云云故相引之顓臾魯附庸國蕭牆者屏牆也止遣長羅侯常惠將張掖酒泉騎往車師迎鄭吉及其吏士還渠犂召故車師太子軍宿在焉耆者立以為王盡徙車師國民令居渠犂遂以車師故地與匈奴以鄭吉為衞司馬使護鄯善以西南道二年魏相好觀漢故事及便宜章奏師古曰既觀國家故事又觀前人所奏便宜之章也好呼到翻奏請施行之數所角翻相敕掾史按事郡國及休告從家還至府輒白四方異聞或有逆賊風雨災變郡不上相輒奏言之上時掌翻與御史大夫丙吉同心輔政上皆重之丙吉為人深厚不伐善自曾孫遭遇師古曰遭遇謂升大位也章甲十五行本言作吉乙十一行本同孔本同熊校同絕口不道前恩故朝廷莫能明其功也會掖庭宮婢則令民夫上書自陳嘗有阿保之功師古曰謂未為宮婢時有舊夫見在俗間者下遐稼翻則辭引使者丙吉知狀掖庭令將則詣御史府以視吉師古曰視讀曰示吉識謂則曰汝嘗坐養皇曾孫不謹督笞汝師古曰督謂視察之獨渭城胡組淮陽郭徵卿有恩耳分別奏組等共養勞苦狀別彼列翻共居用翻養弋亮翻詔吉求組徵卿已死有子孫皆受厚賞詔免則為庶人賜錢十萬上親見問然後知吉有舊恩而終不言上大賢之二年帝以蕭望之經明持重議論有餘材任宰相師古曰任堪也復以為左馮翊宋白曰馮輔也翊佐也義取輔佐京師復扶又翻下同少府正九卿三輔祿秩視九卿故為左遷即移病師古曰移病謂移書言病一曰以病而移居余謂前說是使侍中成都侯金安上諭意曰所用皆更治民以考功功臣表及霍光傳皆作都成侯此承望之本傳之誤師古曰更猶經歷也更工衡翻治直之翻故復試之於三輔非有所聞也望之即起視事師古曰所聞謂聞其短失二年初掖庭令張賀數為弟車騎將軍安世稱皇曾孫之材美及徵怪師古曰徵證也數所角翻為于偽翻以為少主在上少詩照翻不宜稱述曾孫及帝即位而賀已死上謂安世曰掖庭令平生稱我將軍止之是也上追思賀恩欲封其冢為恩德侯師古曰身死追封故曰封冢也賀有子蚤死子安世小男彭祖師古曰子者言養以為子也欲封之先賜爵關內侯安世深辭賀封又求損守冢戶數稍減至三十戶上曰吾自為掖庭令非為將軍也為于偽翻安世乃止不敢復言二年上心忌故昌邑王賀賜山陽太守張敞璽書令謹備盜賊察往來過客昌邑王廢歸昌邑國除為山陽郡故令太守謹察之師古曰密令警察不欲宣露也下遐稼翻處昌呂翻著其廢亡之效師古曰著明也故昌邑王為人青黑色小目鼻末銳卑少須眉身體長大疾痿行步不便少詩沼翻師古曰痿風痹疾也音人隹翻臣敞嘗與之言欲動觀其意即以惡鳥感之曰昌邑多梟故王應曰然前賀西至長安殊無梟復來東至濟陽乃復聞梟聲梟不孝鳥一名流離詩註少好而長醜爾雅作畱鳥黎鳥草木疏曰梟也大則食其母劉子曰炎州有鳥曰梟傴伏其子百日而長羽翼既成食母而飛蓋稍長從母索食母無以應從是而死漢使東郡送梟五月五日作梟羹以賜百官音堅堯翻又于驕翻乃復扶又翻清狂不惠蘇林曰凡狂者陰陽脈盡濁今此人不狂似狂者故言清狂也或曰色理清徐而心不慧曰清狂清狂如今白癡者也韓子曰心不能審得失之地則謂之狂留守哀王園賀父髆諡哀王故王聞之曰中人守園疾者當勿治治直之翻相殺傷者當勿法欲令亟死太守柰何而欲罷之其天資喜由亂亡終不見仁義如此師古曰喜好也由從也喜許吏翻三年三年春三月詔封故昌邑王賀為海昏侯海昏縣屬豫章郡後漢分立建昌縣宋白曰今建昌縣舊海昏縣也宋元嘉二年廢海昏縣移建昌居焉考異曰王子侯表賀以四月壬子封宣紀賀封在丙吉之前按是歲四月癸亥朔無壬子表誤三年乙未詔曰朕微眇時御史大夫丙吉中郎將史曾史玄長樂衞尉許舜侍中光祿大夫許延壽皆與朕有舊恩及故掖庭令張賀輔導朕躬修文學經術恩惠卓異厥功茂焉詩不云乎無德不報師古曰大雅抑之詩追賜賀諡曰陽都哀侯吉為博陽侯曾為將陵侯玄為平臺侯舜為博望侯延壽為樂成侯地理志城陽國有陽都縣恩澤侯表博陽侯食邑於汝南郡之南頓縣平臺屬常山郡博望屬南陽郡樂成侯食邑於南陽之平氏年七歲拜為散騎中郎將賜爵關內侯散悉亶翻騎奇寄翻故人下至郡邸獄復作師古曰復扶目翻嘗有阿保之功者皆受官祿田宅財物各以恩深淺報之吉臨當封病上憂其不起將使人就加印紼而封之及其生存也應劭曰吉時疾不能起欲如君視疾加朝服拖紳就封之也師古曰紼繫印之組也音弗此未死也臣聞有陰德者必饗其樂以及子孫樂音洛今吉未獲報而疾甚非其死疾也後病果愈張安世自以父子封侯在位太盛乃辭祿詔都內別藏張氏無名錢以百萬數文穎曰都內主藏官也張晏曰安世以還官官不簿也百官表大司農屬官有都內令丞每定大政已決輒移病出聞有詔令乃驚使吏之丞相府問焉自朝廷大臣莫知其與議也與讀曰豫嘗有所薦其人來謝安世大恨以為舉賢達能豈有私謝邪絕弗復為通師古曰有欲謝者皆不通也一曰告此人而絕之更不與相見也復扶又翻下同為于偽翻余謂絕弗為通者安世敕其閽人之辭也師古曰調選也音徒釣翻自言安世安世應曰君之功高明主所知人臣執事何長短而自言乎絕不許已而郎果遷師古曰安世外陽距之而實令其遷懷不自安為子延壽求出補吏為于偽翻下同上以為北地太守歲餘上閔安世年老復徵延壽為左曹太僕以太僕而加左曹官也三年夏四月丙子立皇子欽為淮陽王皇太子年十二通論語孝經太傅疏廣謂少傅受曰吾聞知足不辱知止不殆師古曰此老子之言而廣引之官成名立如此不去懼有後悔即日父子俱移病上疏乞骸骨上皆許之加賜黃金二十斤皇太子贈以五十斤公卿故人設祖道供張東都門外供居共翻張竹亮翻送者車數百兩兩音亮道路觀者皆曰賢哉二大夫或歎息為之下泣廣受歸鄉里廣受東海蘭陵人師古曰日日設之也共讀曰供下同與相娛樂樂音洛下同或勸廣以其金為子孫頗立產業者為于偽翻廣曰吾豈老誖不念子孫哉師古曰誖惑也音布內翻顧自有舊田廬師古曰顧思念也足以共衣食與凡人齊今復增益之以為贏餘但教子孫怠墮耳賢而多財則損其志愚而多財則益其過且夫富者衆之怨也吾既無以教化子孫不欲益其過而生怨又此金者聖主所以惠養老臣也故樂與鄉黨宗族共饗其賜以盡吾餘日不亦可乎於是族人悅服三年潁川太守黃霸使郵亭鄉官皆畜雞豚師古曰郵亭書舍謂傳送文書所止處亦如今之驛館矣鄉官者鄉所治處也沈約曰漢制五家為伍伍長主之二五為什什長主之十什為里里魁主之十里為亭亭長主之十亭為鄉有鄉佐三老有秩嗇夫游徼各一人鄉佐有秩主賦稅三老主教化嗇夫主爭訟游徼主姦非畜吁玉翻下同然後為條教置父老師帥伍長帥所類翻長知兩翻下同班行之於民間勸以為善防姦之意及務耕桑節用殖財種樹畜養去浮淫之費去羌呂翻下同其治米鹽靡密師古曰米鹽言雜而且細然霸精力能推行之吏民見者語次尋繹師古曰繹謂抽引而出也聰明識事吏民不知所出師古曰不知其用何術也豪釐不敢有所欺姦人去入他郡盜賊日少霸力行教化而後誅罰師古曰力猶勤也言先以德教化於下若有弗從然後用刑罰也後戶遘翻師古曰不欲易代及損傷之也病聾督郵白欲逐之如淳曰許縣丞據地理志許縣屬潁川郡郡有郡督郵分部屬縣許丞廉吏雖老尚能拜起送迎正頗重聽何傷且善助之毋失賢者意或問其故霸曰數易長吏數所角翻送故迎新之費及姦吏因緣絕簿書盜財物師古曰緣因也因交代之際而弆匿簿書以盜官物也皆當出於民所易新吏又未必賢或不如其故徒相益為亂凡治道去其泰甚者耳霸以外寬內明得吏民心戶口歲增治為天下第一治直之翻徵守京兆尹頃之坐法連貶秩有詔復歸潁川為太守以八百石居太守秩二千石連貶故以八百石居四年四年春正月詔年八十以上非誣告殺傷人他皆勿坐師古曰誣告人及殺傷人皆如舊法其餘則不論四年右扶風尹翁歸卒家無餘財秋八月詔曰翁歸廉平鄉正鄉讀曰嚮治民異等治直之翻其賜翁歸子黃金百斤以奉祭祀四年上令有司求高祖功臣子孫失侯者得槐里公乘周廣漢等百三十六人皆賜黃金二十斤復其家令奉祭祀世世勿絕公乘爵第八復方目翻考異曰宣紀元康元年五月復高皇帝功臣絳侯周勃等百三十六人家子孫四年又賜功臣適後黃金人二十斤按功臣表詔復家者皆云元康四年其數非一不容盡誤蓋紀誤耳四年丙寅富平敬侯張安世薨四年初扶陽節侯韋賢薨恩澤侯表扶陽侯食邑於沛郡蕭縣諡法好廉自克曰節弘為太常坐宗廟事繫獄以次子大河都尉玄成為後服虔曰今東平郡也本為濟東國國除為大河郡師古曰矯託也即陽為病狂臥便利妄笑語昏亂師古曰便利大小便音毗連翻當襲爵以狂不應召大鴻臚奏狀章下丞相御史按驗下遐稼翻按事丞相史迺與玄成書師古曰即按驗玄成事者古之辭讓必有文義可觀故能垂榮於後今子獨壞容貌蒙恥辱為狂癡光曜晻而不宣壞音怪晻讀與暗同微哉子之所託名也李奇曰名聲名也過為丞相執事師古曰過猶謬也不然恐子傷高而僕為小人也玄成友人侍郎章侍郎名章史逸其姓聖王貴以禮讓為國宜優養玄成勿枉其志師古曰枉屈也師古曰衡門謂橫一木於門上貧者之所居也劾奏之劾戶概翻下同有詔勿劾引拜玄成不得已受爵帝高其節以玄成為河南太守四年車師王烏貴之走烏孫也烏孫留不遣漢遣使責烏孫烏孫送烏貴詣闕四年初武帝開河西四郡隔絕羌與匈奴相通之路斥逐諸羌不使居湟中地河西武威張掖酒泉敦煌四郡本匈奴昆邪休屠王地武帝開之置郡縣羌與匈奴隔遠不復得通湟中湟水左右地也其地肥美故斥逐諸羌不使居之水經註金城郡臨羌縣西北至塞外有西王母石室仙海鹽池北則湟水所出東流逕湟中城北故小月氏之地也又東逕臨羌破羌允街枝陽金城而合于大河光祿大夫義渠安國使行諸羌戰國時西戎有義渠君為秦所滅子孫以國為姓願時渡湟水北逐民所不田處畜牧師古曰湟水出金城臨羌塞外東入河湟水之北是漢地仲馮曰湟北非謂漢地也羌意欲稍北遷與匈奴合而為寇安國不知其情故受其詞詳下文可見余謂羌依南山渡湟水而北固欲與匈奴合而湟北則漢地所以隔絕羌與匈奴通之路正在此零音憐後將軍趙充國劾安國奉使不敬劾戶概翻是後羌人旁緣前言抵冒渡湟水師古曰旁依也抵冒犯突而前也旁音步浪翻冒音莫北翻既而先零與諸羌種豪二百餘人解仇交質盟詛師古曰羌人無大君長而諸種豪遞相殺伐故每有仇讎往來相報今解仇交質者自相親結欲入漢為寇也零音憐種章勇翻詛莊助翻以問趙充國對曰羌人所以易制者易以豉翻以其種自有豪數相攻擊勢不壹也數所角翻下同往三十餘歲西羌反時亦先解仇合約攻令居與漢相距五六年乃定武帝元鼎五年西羌反攻故安枹罕次年即平至是五十一年師古曰合約共為要契也令音鈴欲與之共擊張掖酒泉地使羌居之數所角翻誘音酉間者匈奴困於西方謂本始三年為烏孫所破臣恐羌變未止此且復結聯他種復扶又翻宜及未然為之備師古曰未然者其計未成羌侯狼何果遣使至匈奴藉兵師古曰藉借也據充國傳狼何小月氏種鄯上扇翻燉音屯充國以為狼何勢不能獨造此計疑匈奴使已至羌中先零䍐幵乃解仇作約蘇林曰䍐幵在金城南師古曰䍐幵羌之別種也此下言遣幵豪雕庫宣天子至德䍐幵之屬皆聞知明詔其下又云河南大幵小幵則䍐羌幵羌姓族殊矣幵音口堅翻而地理志天水有䍐幵縣蓋以此二種羌來降處之此地因以名縣也而今之羌姓有䍐幵者總是䍐幵之類合而言之因為姓耳變幵為井字之訛也零音憐䍐即罕字變必起矣宜遣使者行邊兵行下孟翻下同豫為備敕視諸羌毋令解仇師古曰視讀曰示示語之也以發覺其謀於是兩府復白遣義渠安國行視諸羌兩府丞相御史府也此視觀也別彼列翻四年是時比年豐稔穀石五錢比毗至翻顧頡剛標點聶崇岐覆校
