body:
  text: 資治通鑑卷第二百二十七端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註唐紀四十三德宗神武聖文皇帝二建中二年建中二年辛酉七八一建中二年六月庚寅以浙江東西觀察使蘇州刺史韓滉為潤州刺史浙江東西節度使蘇州治吳縣滉呼廣翻潤州治京口使疏吏翻建中二年張著至襄陽是年四月遣著今至襄陽蓋張著亦疑梁崇義遲遲不進也陳兵而見之藺杲得詔不敢發得除鄧州之詔也請免其死竟不受詔號戶刀翻著復命癸巳進李希烈爵南平郡王渝州南平郡督諸道兵討之考異曰德宗實錄五月己巳加淮寧節度李希烈南平郡王漢南漢北通知諸道兵馬使招撫處置使希烈傳曰山南東道節度使梁崇義拒捍朝命迫脅使臣二年六月詔諸道節度率兵討之加希烈南平郡王兼漢南北都知諸道兵馬招撫處置使今從建中實錄希烈為董秦養子親任無比卒逐秦而奪其位事見二百二十五卷代宗大曆十四年董秦賜姓名李忠臣卒子恤翻狼當作很倔渠勿翻強其兩翻使平崇義何以制之上不聽炎固爭之上益不平荊南牙門將吳少誠以取梁崇義之策干李希烈希烈以少誠為前鋒少誠幽州潞人也將即亮翻少始照翻潞縣漢屬漁陽郡晉屬燕國隋屬涿郡唐屬幽州以潞水自塞北來經縣界名縣時內自關中西暨蜀漢南盡江淮閩越北至太原所在出兵而李正己遣兵扼徐州甬橋渦口閩眉巾翻甬橋在徐州南界汴水上後置宿州於此渦口渦水入淮之口渦音戈梁崇義阻兵襄陽運路皆絕人心震恐江淮進奉船千餘艘泊渦口不敢進艘蘇遭翻上以和嚴和改利州刺史張萬福為濠州刺史使之通渦口水路立馬岸上發進奉船淄青將士停岸睥睨不敢動淄莊持翻睥匹詣翻睨研計翻建中二年辛丑汾陽忠武王郭子儀薨薨呼肱翻子儀為上將擁強兵程元振魚朝恩讒毀百端詔書一紙徵之無不即日就道由是讒謗不行事並見代宗紀朝直遙翻承嗣西望拜之曰此膝不屈於人若干年矣李靈曜據汴州作亂事見二百二十五卷代宗大曆十一年使疏吏翻嗣祥吏翻汴皮變翻惟子儀物不敢近近其靳翻校中書令考凡二十四月入俸錢二萬緡私產不在焉校古效翻俸扶用翻緡眉巾翻府庫珍貨山積家人三千人八子七壻皆為朝廷顯官郭子儀八子曜晞旰日我晤曖曙映每問安不能盡辯頷之而已僕固懷恩李懷光渾瑊皆出麾下渾戶昆翻又戶本翻瑊古咸翻雖貴為王公常頤指役使趨走於前家人亦以僕隸視之天下以其身為安危殆三十年殆近也將也郭子儀奮自朔方是年肅宗至德元載也至建中二年而薨是年歲在重光作噩自柔兆涒灘至重光作噩二十六年耳故云殆三十年位極人臣而衆不疾窮奢極欲而人不非之年八十五而終其將佐至大官為名臣者甚衆將即亮翻建中二年壬子以懷鄭河陽節度副使李艽為河陽懷州節度使割東畿五縣隸焉艽居包翻使疏吏翻東畿東都畿也五縣河陽河清濟源溫王屋建中二年北庭安西自吐蕃陷河隴隔絕不通陷河隴見二百二十三卷代宗廣德元年吐從暾入聲昕許斤翻帥讀曰率數遣使奉表皆不達聲問絕者十餘年至是遣使間道歷諸胡自回紇中來數所角翻間古莧翻上嘉之秋七月戊午朔加元忠北庭大都護賜爵寧塞郡王廓州寧塞郡賜爵武威郡王涼州武威郡元忠姓名朝廷所賜也本姓曹名令忠昕子儀弟也建中二年李希烈以久雨未進軍上怪之盧密言於上曰希烈遷延以楊炎故也因炎諫用希烈而間之墮讀曰隳不若暫免炎相以悅之事平復用無傷也相息亮翻復扶又翻又音如字上以為然庚申以炎為左僕射罷政事射寅謝翻考異曰舊傳曰初炎之南來途經襄漢固勸梁崇義入朝崇義不能從已懷反側尋又使其黨李舟奉使馳說崇義因而拒命遂圖叛逆皆炎迫而成之至是德宗欲假希烈兵勢以討崇義炎又固言不可上不能平會德宗嘗訪宰相㣥臣中可以大任者盧薦張鎰嚴郢而炎舉崔昭趙惠伯上以炎論議疏闊遂罷炎相建中實錄曰炎與盧同執大政形神詭陋夙為人所褻而炎氣岸高峻罕防細故方病飲食無節或為糜餐別食閤中每登堂會食辭不能偶讒者乘之謂曰楊公鄙公不欲同食銜之舊制中書舍人分署尚書六曹以平奏報中廢其職議復之以疏其煩炎不可曰不才幸措足於斯亦當有運用以答天造寧常拳之手乎因密啟中書主書有過局者有詔逐之炎怒曰中書吾局也政之不脩吾自理之設不理當共議何陰訴而越官邪因不相平時淮西節度使李希烈寵任方盛上欲以之平襄陽炎以為不可上曰卿勿復言遂以希烈統之時夏潦方壯澶漫數百里故希烈軍久不得發會炎病請急累日啟免炎相以悅之上以為然乃使中官朱如玉就第先喻旨翌日遷左僕射謁謝之日恩旨甚渥大懼按沈既濟為炎所引故建中實錄言炎罷相與德宗實錄頗異今取其可信者書之然舊傳云梁崇義之反炎迫而成之亦近誣也以前永平節度使張鎰為中書侍郎同平章事鎰齊丘之子也使疏吏翻鎰弋質翻張齊丘玄宗時為朔方節度使以朔方節度使崔寧為右僕射射寅謝翻建中二年丙子贈故伊州刺史袁光庭工部尚書光庭天寶末為伊州刺史吐蕃陷河隴光庭堅守累年吐蕃百方誘之不下伊州治伊吾縣漢伊吾盧地尚辰羊翻吐從暾入聲誘音酉城且陷光庭先殺妻子然後自焚郭昕使至朝廷始知之昕許斤翻朝直遙翻故贈官建中二年辛巳以邠寧節度使李懷光兼朔方節度使邠卑旻翻建中二年癸未河東節度使馬燧昭義節度使李抱真神策先鋒都知兵馬使李晟大破田悅於臨洺時悅攻臨洺累月不拔城中食且盡府庫竭士卒多死傷張伾飾其愛女使出拜將士曰諸君守戰甚苦伾家無他物請鬻此女為將士一日之費衆皆哭曰願盡死力不敢言賞李抱真告急於朝朝直遙翻詔馬燧將步騎二萬與抱真討悅又遣李晟將神策兵與之俱又詔幽州留後朱滔討惟岳李惟岳也燧等軍未出險先遣使持書諭悅為好語悅謂燧畏之不設備燧與抱真合兵八萬東下壼關考異曰舊田悅傳曰七月三日師自壺關東下收賊盧家砦燧傳云十一月師次邯鄲恐誤今從悅傳燕南記擊悅支軍破之悅方急攻臨洺分李惟岳兵五千助楊朝光明日燧等進攻朝光柵悅將萬餘人救之燧命大將李自良等禦之於雙岡雙岡在邯鄲西北臨洺之西亦名盧家疃悅得過必斬爾自良等力戰悅軍卻燧推火車焚朝光柵推吐雷翻車尺遮翻斬朝光獲首虜五千餘級居五日燧等進軍至臨洺悅悉衆力戰凡百餘合悅兵大敗斬首萬餘級考異曰舊李晟傳戰于臨洺諸軍皆卻晟引兵渡洺水乘水而濟橫擊悅軍王師復振擊悅大破之據此則是臨洺戰在冬也與馬燧傳十一月師次邯鄲相應實錄十二月庚寅馬燧加左僕射又云先是悅遣將康愔領兵圍邢州楊朝光圍臨洺燧與抱真及神策將李晟合勢救之大敗賊於雙岡斬楊朝光擒其大將盧子昌乘勝進軍又破悅於臨洺故燧等加官按實錄此戰無月日但於馬燧加官時言之今據燧傳先敗悅於雙岡斬楊朝光居五日乃進至臨洺即實錄此月癸未衆軍破悅於臨洺也實錄在此年冬與此相違燕南記亦云七月燧與抱真兵八萬自潞府東下壺關先收邯鄲盧家砦朝光戰死臨洺城又大破悅悅退走在李正己死前與實錄此月相應臨洺之戰疑諸軍已集燧等若未至張伾必不能獨破悅軍新本紀十一月丁丑馬燧及田悅戰于雙岡敗之不知此日何出亦與諸書相違今止從七月邢州圍亦解是年五月悅使其將康愔圍邢州悅敗走而圍亦解時平盧節度使李正己已薨子納祕之亶領軍務悅求救於納及李惟岳納遣大將衞俊將兵萬人惟岳遣兵三千人救之悅收合散卒得二萬餘人軍于洹水淄青軍其東成德軍其西首尾相應馬燧帥諸軍進屯鄴洹于原翻帥讀曰率洹水縣屬魏州本漢內黃地後周武帝置洹水縣因水而名淄莊持翻鄴縣屬相州奏求河陽兵自助詔河陽節度使李艽將兵會之艽居包翻建中二年八月李納始發喪奏請襲父位上不許建中二年梁崇義發兵攻江陵至四望今隨州隨縣之東有四望山其山最高四望皆可見乃收兵襄鄧李希烈引軍循漢而上上時掌翻與諸道兵會崇義遣其將翟暉杜少誠逆戰於蠻水希烈大破之追至疎口又破之將即亮翻翟萇伯翻少始照翻水經漢水自襄陽東流又屈而西南流又東南流逕黎丘故城西又南與疎水合疎水出中廬縣西南東流至邙縣北界東入漢水謂之疎口漢水又南過宜城東夷水出自房陵縣東流注之桓溫以其父名彞改曰蠻水二將請降希烈使將其衆先入襄陽慰諭軍民將即亮翻降戶江翻使將同上音又音如字崇義閉城拒守守者開門爭出不可禁崇義與妻赴井死傳首京師建中二年范陽節度使朱滔將討李惟岳軍于莫州張孝忠將精兵八千守易州范陽節度使治幽州莫州在幽州南二百八十里易州成德巡屬在幽州西二百一十四里說式芮翻惟岳乳臭兒敢拒朝命今昭義河東軍已破田悅淮寧李僕射克襄陽計河南諸軍朝夕北向恆魏之亡可佇立而須也使君誠能首舉易州以歸朝廷則破惟岳之功自使君始此轉禍為福之策也朝直遙翻射寅謝翻恆戶登翻使疏吏翻孝忠然之遣牙官程華詣滔遣錄事參軍董稹奉表詣闕稹章忍翻滔又上表薦之上時掌翻上悅九月辛酉以孝忠為成德節度使命惟岳護喪歸朝惟岳不從孝忠德滔為子茂和娶滔女為于偽翻深相結建中二年壬戌加李希烈同平章事建中二年初李希烈請討梁崇義上對朝士亟稱其忠亟去吏翻黜陟使李承自淮西還還從宣翻又音如字言於上曰希烈必立微功但恐有功之後偃蹇不臣更煩朝廷用兵耳上不以為然希烈既得襄陽遂據之為己有上乃思承言時承為河中尹甲子以承為山南東道節度使上欲以禁兵送上上時掌翻承請單騎赴鎮至襄陽希烈置之外館迫脅萬方承誓死不屈希烈乃大掠闔境所有而去承治之期年軍府稍完騎奇寄翻闔戶臘翻治直之翻希烈留牙將於襄州守其所掠財由是數有使者往來將即亮翻數所角翻承亦遣其腹心臧叔雅往來許蔡李希烈既自襄陽還蔡州尋徙鎮許州故李承陰遣人至許蔡結其諸將以圖之與之陰圖希烈為周曾等圖希烈不克而死張本建中二年初蕭嵩家廟臨曲江玄宗以娛遊之地非神靈所宅命徙之楊炎為相惡京兆尹嚴郢相息亮翻惡烏路翻左遷大理卿盧欲陷炎引郢為御史大夫先是炎將營家廟先悉薦翻憑河南尹趙惠伯賣之惠伯買以為官廨郢按之以為有羨利羨于線翻召大理正田晉議法唐志大理正從五品下掌議獄正科條凡丞斷罪不當則以法正之律監臨官市買有羨利以乞取論當奪官怒監古銜翻下同貶晉衡州司馬衡州京師東南三千四百三里田晉自朝士貶衡州司馬更工衡翻以為監主自盜罪當絞炎廟正直蕭嵩廟地因譖炎云茲地有王氣王于況翻故玄宗令嵩徙之炎有異志故於其地建廟冬十月乙未炎自左僕射貶崖州司馬令力丁翻射寅謝翻舊志崖州至京師七千四百六十里未章十二行本未上有遣中使護送五字乙十一行本同至崖州百里縊殺之惠伯自河中尹貶費州多田尉費州漢牂柯郡隋黔安郡涪川縣地貞觀四年分思州之涪川扶陽二縣置費州多田縣武德四年務州刺史奏置以土地稍平墾田盈畛故以多田為名貞觀四年改費州為思州乾元元年復為費州京師南四千七百里至東都四千九百里因州界費水為名河中尹當作河南尹建中二年辛巳冊太子蕭氏建中二年癸卯祫太廟先是太祖既正東向之位獻懿二祖皆藏西夾室不饗至是復奉獻祖東嚮而饗之先悉薦翻復扶又翻獻祖宣皇帝熙太祖之祖也懿祖光皇帝天賜太祖之父也太祖景皇帝虎始封於唐者也唐初饗四廟宣光二帝太祖世祖也貞觀九年祔高祖于太廟朱子奢請準禮立七廟三昭三穆各置神主太祖依晉宋已來故事虛其位待遞遷方處之東向位於是始祔弘農府君重耳及高祖為六室虛太祖之位而行禘祫至二十三年太宗祔廟遷弘農府君乃藏于西夾室文明元年高宗祔廟始遷宣皇帝于西夾室至開元十年玄宗特立九廟於是追尊宣皇帝為獻祖復列於室光皇帝為懿祖以備九室禘祫猶虛太祖之位祝文於三祖不稱臣明全廟數而已至德三載克寸復後新作九室神主遂不作弘農府君神主明禘祫不及故也至寶應二年祔玄宗肅宗於廟遷獻懿二祖於西夾室始以太祖當東向位至是年將祫饗禮儀使顏真卿奏合出獻懿二祖行事其布位次第及東向之位請準東晉蔡謨議為定遂以獻祖當東向懿祖於昭位南向太祖於穆位北向左昭右穆陳列行事建中二年徐州刺史李洧正己之從父兄也李納寇宋州彭城令太原白季庚說洧舉州歸國洧于軌翻從才用翻說式芮翻洧從之遣攝巡官崔程奉表詣闕且使口奏幷白宰相以徐州不能獨抗納乞領徐海沂三州觀察使況海沂二州今皆為納有洧與刺史王涉馬萬通素有約使疏吏翻考異曰此據舊傳也實錄萬通以密州降蓋自沂移密苟得朝廷詔書必能成功程自外來言自外方來先白張鎰鎰以告盧怒其不先白己不從其請相息亮翻鎰戍質翻戊申加洧御史大夫充招諭使建中二年十一月戊午以永樂公主適檢校比部郎中田華上不欲違先志故也永樂公主許降田華見二百二十五卷代宗大曆九年樂音洛建中二年蜀王傀嚴傀改遂更名遂嚴遂改遡傀苦猥翻更工衡翻建中二年辛酉宣武節度使劉洽神策都知兵馬使曲環滑州刺史襄平李澄朔方大將唐朝臣大破淄青魏博之兵於徐州按新書李澄傳澄遼東襄平人唐自高宗世遼東之地已棄而不有李澄時以本貫在遼東襄平耳朝直遙翻淄莊持翻先是李納遣其將王溫會魏博將信都崇慶先悉薦翻將即亮翻信都複姓共攻徐州李洧遣牙官溫人王智興詣闕告急溫古縣唐初屬懷州顯慶二年度屬洛州不五日而至舊志徐州京師東二千六百四里為于偽翻以朝臣將之朝直遙翻將直亮翻又音如字與洽環澄共救之時朔方軍資裝不至旗服弊惡宣武人嗤之曰乞子能破賊乎朝臣以其言激怒士卒且曰都統有令嗤丑之翻都統謂李勉也統他綜翻俗音從上聲先破賊營者營中物悉與之士皆憤怒爭奮崇慶溫攻彭城二旬不能下請益兵於納納遣其將石隱金將萬人助之考異曰實錄前作隱金後作隱全今從其前日向暮洽引軍稍卻朔方馬軍使楊朝晟言於唐朝臣曰公以步兵負山而陳以待兩軍我以騎兵伏於山曲賊見懸軍勢孤必搏之我以伏兵絕其腰必敗之使疏吏翻晟成正翻陳讀曰陣敗補邁翻騎奇寄翻朝臣從之崇慶等果將騎二千踰橋而西追擊官軍伏兵發橫擊之崇慶等兵中斷狼狽而返阻橋以拒官軍其兵有爭橋不得涉水而渡者朝晟指之曰彼可涉吾何為不涉遂涉水擊據橋者皆走崇慶等兵大潰洽等乘之斬首八千級溺死過半朔方軍盡得其輜重溺奴狄翻重直用翻旗服鮮華乃謂宣武人曰乞子之功孰與宋多宋指宣武兵也時以宋亳為宣武軍劉洽自宋州刺史為宣武節度使故云然官軍乘勝逐北至徐州城下魏博淄青軍解圍走江淮漕運始通淄莊持翻漕在到翻建中二年己巳詔削李惟岳官爵募所部降者赦而賞之降戶江翻建中二年甲申淮南節度使陳少遊遣兵擊海州其刺史王涉以州降海州李納巡屬使疏吏翻少始照翻降戶江翻建中二年十二月李納密州刺史馬萬通乞降丁酉以為密州刺史宋白曰密州居海得禹貢嵎夷之地春秋時為莒魯之地州理即魯之諸城也漢為高密國晉立東莞郡後魏立膠州隋改曰密州取境中密水為名建中二年崔漢衡至吐蕃崔漢衡使吐蕃見上卷是年三月吐從暾入聲全以臣禮見處處昌呂翻又雲州之西當以賀蘭山為境五代志靈武弘靜縣有賀蘭山弘靜縣唐改為保靜雲州當作靈州史誤也丁未漢衡遣判官與吐蕃使者入奏上為之改敕書為于偽翻境土皆如其請關東河北方用兵不暇與吐蕃較也建中二年加馬燧魏博招討使三年三年春正月河陽節度使李艽引兵逼衞州田悅守將任履虛詐降既而復叛衞州治汲艽居苞翻將即亮翻任音壬降戶江翻復扶又翻又音如字三年馬燧等諸軍屯于漳濱田悅遣其將王光進築月城以守長橋長橋在漳水上月城兩頭抱河形如半月燧以鐵鎖連車數百實以土囊塞其下流乘繩證翻塞悉則翻按新書燧於長橋下流以土囊遏之水淺諸軍涉渡時軍中乏糧悅等深壁不戰燧命諸軍持十日糧進屯倉口與悅夾洹水而軍洹于元翻洹水與漳水分流又在漳水之東李抱真李艽問曰糧少而深入何也燧曰糧少則利速戰今三鎮連兵不戰三鎮謂魏博淄青成德艽居包翻少始紹翻我若分軍擊其左右悅必救之則我腹背受敵戰必不利故進軍逼悅所謂攻其所必救也兵法有是言必為諸君破之為于偽翻乃為三橋逾洹水日往挑戰挑徒了翻悅不出燧令諸軍夜半起食潛師循洹水直趨魏州令力正翻趨逡喻翻令曰賊至則止為陳陳讀曰陣下結陳同留百騎擊鼓鳴角於營中仍抱薪持火俟諸軍畢發則止鼓角匿其旁俟悅軍畢渡焚其橋軍行十里所悅聞之帥淄青成德步騎四萬踰橋掩其後騎奇寄翻帥讀曰率乘風縱火鼓譟而進譟則竈翻先除其前草莽百步為戰場結陳以待之募勇士五千餘人為前列悅軍至火止氣衰燧縱兵擊之悅軍大敗神策昭義河陽軍小卻神策李晟軍昭義李抱真軍河陽李艽軍還鬬又破之還從宣翻又音如字追奔至三橋已焚三橋即在洹水上者赴水溺死不可勝紀斬首二萬餘級捕虜三千餘人尸相枕藉三十餘里勝音升枕職任翻藉慈夜翻考異曰實錄閏月庚戌馬燧等破田悅於洹水按舊馬燧傳洹水之戰李惟岳救兵與田悅兵猶連營相拒又燕南記惟岳見悅在圍故謀歸順然則洹水戰必在惟岳死前實錄誤也燕南記又曰燧與抱真雖頻破悅聞李納助軍到乃駐軍候勢畫必取之計去悅軍三十里下營夜坐帳中使心手人潛領悅兵及小將等五十餘人立帳外燧因矯與兵馬衙官已下高語曰昨日所以頻破田悅兵馬者蓋偶然之事本亦不料有此勝也看悅兵雖敗其將健皆能死戰亦天下之強敵矣今更得李納兵助其勢不小我雖頻利利則有鈍他日田悅更戰大將必須審看便宜如悅直進不可當鋒耳悅帳外兵將往往共聞燧語良久曰昨日陣上獲得田悅將健所由領過既至燧大罵曰田悅小賊菽麥未分敢肆猖狂妄動兵馬你有何所解與我相敵汝皆不自由被驅入陳又何過也今矜汝放去兵等大歡叫拜謝而去具燧前後言見悅悅召大將喜而謂曰馬燧放言懼我對人罵我此可知矣吾再戰必捷也又恃李納助軍新到乃引兵出洹水又陳燧先伏兵要處佯不勝引退悅使兵盡出逐燧燧引至伏兵處伏兵齊發橫截悅軍兩段與抱真縱兵擊之大破悅軍三萬餘人今從馬燧傳悅收餘兵千餘人走魏州走音奏馬燧與李抱真不協頓兵平邑浮圖章十二行本圖下有遷延不進四字乙十一行本同退齋校同張校同云無註本亦無據舊書田悅傳平邑浮圖在魏州南浮圖佛寺也悅夜至南郭魏州南郭也以俟官軍久之天且明長春乃開門內之悅殺長春嬰城拒守城中士卒不滿數千死者親戚號哭滿街將即亮翻號戶刀翻悅憂懼乃持佩刀乘馬立府門外悉集軍民流涕言曰悅不肖蒙淄青成德二丈人保薦嗣守伯父業淄青李正己成德李寶臣田悅以丈人行事之伯父田承嗣也淄莊持翻嗣祥吏翻其子不得承襲悅不敢忘二丈人大恩不量其力量音良輒拒朝命喪敗至此朝直遙翻喪息浪翻使士大夫肝腦塗地皆悅之罪也悅有老母不能自殺願諸公以此刀斷悅首持出城降馬僕射斷音短下各斷同降戶江翻馬僕射謂馬燧射寅謝翻自取富貴無為與悅俱死也因從馬上自投地將士爭前抱持悅曰尚書舉兵徇義非私己也一勝一負兵家之常某輩累世受恩何忍聞此願奉尚書一戰不勝則以死繼之尚辰羊翻悅曰諸公不以悅喪敗而棄之悅雖死敢忘厚意於地下乃與諸將各斷髮約為兄弟誓同生死悉出府庫所有及斂富民之財得百餘萬以賞士卒衆心始定田悅善敗不亡所謂盜亦有道使之整部伍繕守備軍勢復振悅不用邢曹俊見上卷上年復扶又翻又音如字李納軍於濮陽為河南軍所逼奔還濮州考異曰時濮州治鄄城別有濮陽縣按九域志濮陽縣東至濮州九十里濮博木翻田悅遣軍使符璘將三百騎送之使疏吏翻璘離珍翻將即亮翻騎奇寄翻璘父令奇謂璘曰吾老矣歷觀安史輩叛亂者今皆安在田氏能久乎汝因此棄逆從順是汝揚父名於後世也齧臂而別璘遂與其副李瑤帥衆降於馬燧齧魚結翻帥讀曰率降戶江翻悅收族其家令奇慢罵而死瑤父再春以博州降悅從兄昂以洺州降從才用翻洺音名王光進以長橋降悅入城旬餘日馬燧等諸軍始至城下攻之不克三年丙寅李惟岳遣兵與孟祐守束鹿束鹿本鹿城縣安祿山反玄宗改縣為束鹿以厭之屬深州九域志在州西四十五里宋白曰束鹿縣本漢西梁縣地今縣南六十里有西梁故城尚存進圍深州惟岳憂懼掌書記邵真復說惟岳密為表先遣弟惟簡入朝復扶又翻說式芮翻朝直遙翻然後誅諸將之不從命者身自入朝使妻父冀州刺史鄭詵權知節度事以待朝命惟簡既行孟祐知其謀密遣告田悅悅大怒使衙官扈岌往見惟岳讓之曰尚書舉兵正為大夫求旌節耳事始見上卷二年岌魚及翻尚辰羊翻為于偽翻下非為相為同今大夫乃信邵真之言遣弟奉表悉以反逆之罪歸尚書自求雪身尚書何負於大夫而至此邪尚辰羊翻邪音耶若相為斬邵真則相待如初不然當與大夫絕矣判官畢華言於惟岳曰田尚書以大夫之故陷身重圍為于季翻重直龍翻大夫一旦負之不義甚矣且魏博淄青兵強食富足抗天下事未可知柰何遽為二三之計乎惟岳素怯不能守前計乃引邵真對扈岌斬之淄莊持翻岌魚及翻發成德兵萬人與孟祐俱圍束鹿丙寅朱滔張孝忠與戰於束鹿城下惟岳大敗燒營而遁考異曰實錄及舊惟岳傳止言惟岳一敗按滔傳曰滔與孝忠征之大破惟岳於束鹿滔命偏師守束鹿進圍深州惟岳乃統萬餘衆及田悅援兵圍束鹿惟岳將王武俊以騎三千方陳橫進滔繢帛為狻猊象使猛士百人蒙之鼓譟奮馳賊馬驚亂隨擊大破之惟岳焚營而遁據此則是惟岳再敗也燕南記孟祐先敗惟岳又敗與滔傳相應今從之兵馬使王武俊為左右所構惟岳疑之惜其才未忍除也束鹿之戰使武俊為前鋒私自謀曰我破朱滔則惟岳軍勢大振歸殺我必矣故戰不甚力而敗朱滔欲乘勝攻恆州使疏吏翻恆戶登翻張孝忠引軍西北軍于義豐義豐縣屬定州孝忠將佐皆怪之孝忠曰恆州宿將尚多未易可輕將即亮翻易以豉翻迫之則幷力死鬬緩之則自相圖諸君第觀之吾軍義豐坐待惟岳之殄滅耳且朱司徒言大而識淺可與共始難與共終也朱滔後卒如張孝忠所料不敢進惟岳將康日知以趙州歸國惟岳益疑王武俊武俊甚懼或謂惟岳曰先相公委腹心於武俊先相公謂李寶臣相息亮翻又有骨肉之親謂武俊子士真壻於李氏今危難之際復加猜阻若無武俊欲使誰為大夫卻敵乎冠古玩翻難乃旦翻復扶又翻為于偽翻惟岳以為然乃使步軍使衞常寧與武俊共擊趙州又使王士真將兵宿府中以自衞將即亮翻又音如字三年癸未蜀王遂更名遡更工衡翻三年淮南節度使陳少遊拔海密二州李納復攻陷之使疏吏翻少始照翻復扶又翻又音如字下不復同三年王武俊既出恆州謂衞常寧曰武俊今幸出虎口不復歸矣當北歸張尚書恆戶登翻尚辰羊翻張尚書謂張孝忠也常寧曰大夫暗弱信任左右觀其勢終為朱滔所滅今天子有詔得大夫首者以其官爵與之中丞素為衆所服與其出亡曷若倒戈以取大夫轉禍為福特反掌耳事苟不捷歸張尚書未晚也武俊深以為然會惟岳使要藉謝遵至趙州城下要藉官亦唐時節度衙前之職中宗景雲二年解琬為朔方大總管分遣隨軍要藉官河陽丞張冠宗肥鄉令韋景駿普安令于處忠校料三城兵募則唐邊鎮有要藉官尚矣又據新書忠義傳朱泚統幽州行營為涇原鳳翔節度使詔蔡廷玉以大理少卿為司馬朱體微為要藉則要藉乃節度使之腹心也朱滔王武俊之相王改要藉官曰承令遵還密告王士真閏月甲辰武俊常寧自趙州引兵還襲惟岳還從宣翻又音如字遵與士真矯惟岳命啟城門內之黎明武俊帥數百騎突入府門帥讀曰率騎奇寄翻士真應之於內殺十餘人武俊令曰大夫叛逆將士歸順敢違拒者族衆莫敢動遂執惟岳收鄭詵畢華王它奴等皆殺之令力定翻將即亮翻詵疏臻翻武俊以惟岳舊使之子李寶臣已死故曰舊使使疏吏翻常寧曰彼見天子將復以叛逆之罪歸咎於中丞復扶又翻下復榷同又音如字中丞謂王武俊乃縊殺之縊於賜翻又於計翻傳首京師卒如谷從政之言代宗廣德元年李寶臣帥成德凡二世十九年而滅惟岳姊夫也降於朱滔滔使復其位姊蔣兕翻降戶江翻三年復榷天下酒惟西京不榷罷榷酒見二百二十五卷大曆十四年七月榷古岳翻三年二月戊午李惟岳所署定州刺史楊政義降時河北略定惟魏州未下河南諸軍攻李納於濮州濮博木翻濮州治鄄城縣納勢日蹙朝廷謂天下不日可平甲子以張孝忠為易定滄三州節度使朝直遙翻使疏吏翻王武俊為恆冀都團練觀察使康日知為深趙都團練觀察使以德棣二州隸朱滔令還鎮滔固請深州不許由是怨望留屯深州朱滔討李惟岳再戰再勝及瓜分成德巡屬以賞降將尺寸之地滔不預焉又欲使之取德棣此左氏所以知桓王之失鄭也自以手誅李惟岳功在康日知上而孝忠為節度使己與康日知俱為都團練使又失趙定二州亦不悅又詔以糧三千石給朱滔馬五百匹給馬燧武俊以為朝廷不欲使故人為節度使王武俊恆州舊將故云然必取恆冀故分其糧馬以弱之疑未肯奉詔田悅聞之遣判官王侑許士則間道至深州說朱滔曰司徒奉詔討李惟岳旬朔之間拔束鹿下深州惟岳勢䠞間古莧翻說式芮翻下說王人說同䠞與蹙同故王大夫因司徒勝勢得以梟惟岳之首此皆司徒之功也又天子明下詔書梟堅堯翻下遐嫁翻令司徒得惟岳城邑皆隸本鎮今乃割深州以與日知是自棄其信也且今上志欲掃清河朔不使藩鎮承襲將悉以文臣代武臣魏亡則燕趙為之次矣令力丁翻燕因虔翻若魏存則燕趙無患然則司徒果有意矜魏博之危而救之非徒得存亡繼絕之義亦子孫萬世之利也同舟遇風則胡越可使相救是以善用兵者必先離其交貝州魏博巡屬聞之大喜即遣王侑歸報魏州使將士知有外援各自堅又遣判官王郅將即亮翻考異曰舊傳王郅作王郢今從燕南記與許士則俱詣恆州說王武俊曰大夫出萬死之計誅逆首拔亂根謂誅李惟岳也豈得與大夫同日論功而朝廷褒賞略同誰不為大夫憤邑者朝直遙翻為于偽翻今又聞有詔支糧馬與鄰道朝廷之意蓋以大夫善戰章十二行本戰下有無敵二字乙十一行本同退齋校同張校同云無註本亦無恐為後患先欲貧弱軍府俟平魏之日使馬僕射北首射寅謝翻馬僕射謂馬燧時攻魏州首式又翻朱司徒南向共相滅耳朱司徒亦不敢自保使郅等效愚計欲與大夫共救田尚書而存之尚辰羊翻田悅拒命宜削官而當時猶稱其朝銜可以見朝命之重大夫自留糧馬以供軍朱司徒不欲以深州與康日知願以與大夫請早定刺史以守之三鎮連兵此三鎮謂范陽恆冀魏博則他日永無患矣武俊亦喜許諾利害同故說之易入使疏吏翻且令知深州事令力丁翻相與刻日舉兵南向滔又遣人說張孝忠孝忠不從說式芮翻三年宣武節度使劉洽攻李納於濮州克其外城納於城上涕泣求自新李勉又遣人說之癸卯納遣其判官房說以其母弟經及子成務入見說式芮翻見賢遍翻房說讀曰悅通鑑本文作癸卯然自上文二月戊午推至下文三月乙未其間不容有癸卯當作己卯會中使宋鳳朝稱納勢窮蹙不可捨上乃囚說等於禁中納遂歸鄆州復與田悅等合使疏吏翻朝直遙翻鄆音運復扶又翻又音如字朝廷以納勢未衰三月乙未始以徐州刺史李洧兼徐海沂都團練觀察使海沂已為納所據洧竟無所得洧于軌翻史言帝銳意削平藩鎮而不能應機撫接以自遺患李納之初反也其所署德州刺史李西華備守甚嚴都虞候李士真密毀西華於納納召西華還府以士真代之士真又以詐召棣州刺史李長卿長卿過德州士真劫之與同歸國夏四月戊午以士真長卿為二州刺史德州治安德縣棣州治厭次縣本皆淄青巡屬今皆歸國棣大計翻長知丈翻考異曰燕南記云授士真德棣兩州觀察團練使今從實錄滔已有異志遣大將李濟時將三千人聲言助士真守德州且召士真詣深州議軍事至則留之使濟時領州事將即亮翻時將音同上又音如字德宗以德棣與朱滔滔卒以詐力得之不知又以為王武俊之資也三年庚申吐蕃歸曏日所俘掠兵民八百人自吐蕃陷河隴入京師俘掠唐人可以數計邪德宗先歸所俘者以懷之其歸向日所俘者八百人而已狼子野心姑以此報塞中國其志果如何哉觀異日平涼劫盟之事可見也吐從暾入聲三年上遣中使發盧龍恆冀易定兵萬人盧龍朱滔恆冀王武俊易定張孝忠使疏吏翻恆戶登翻王武俊不受詔執使者送朱滔滔言於衆曰將士有功者吾奏求官勳皆不遂將即亮翻唐制官有品勳有級今欲與諸君敕裝敕與飭同飭治也趨逡諭翻擊破馬燧以取溫飽何如皆不應三問乃曰幽州之人自安史之反從而南者無一人得還今其遺人痛入骨髓還從宣翻又音如字髓息委翻況太尉司徒皆受國寵榮太尉謂滔兄泚誠且願保目前不敢復有僥冀復扶又翻下俊復同滔默然而罷乃誅大將數十人厚撫循其士卒康日知聞其謀以告馬燧燧以聞上以魏州未下王武俊復叛力未能制滔壬戌賜滔爵通義郡王冀以安之眉州通義郡分兵營於趙州以逼康日知將即亮翻又音如字趙州治平棘縣以深州授王巨源朱滔如前約以結王武俊將兵圍趙州恆戶登翻將即亮翻又音如字涿州刺史劉怦章十二行本怦下有與滔同縣人其母滔之姑也滔使知幽州留後十八字乙十一行本同退齋校同張校同云無註本亦無代宗大曆四年朱希彩表分幽州之范陽歸義固安置涿州治范陽縣距幽州一百二十里涿竹角翻怦普耕翻聞滔欲救田悅以書諫之曰今昌平故里朝廷改為太尉鄉司徒里此亦丈夫不朽之名也朝直遙翻朱泚朱滔本昌平人朝廷以其官名其鄉里以寵其兄弟之功但以忠順自持則事無不濟竊思近日務大樂戰樂音洛不顧成敗而家滅身屠者安史是也怦忝密親默而無告是負重知惟司徒圖之無貽後悔滔雖不用其言亦嘉其盡忠卒無疑貳滔將起兵恐張孝忠為後患復遣牙官蔡雄往說之孝忠曰昔者司徒發幽州遣人語孝忠曰卒子恤翻復扶又翻說式芮翻下解說同語牛倨翻李惟岳負恩為逆謂孝忠歸國即為忠臣孝忠性直用司徒之教今既為忠臣矣不復助逆也復扶又翻又音如字且孝忠與武俊皆出夷落張孝忠本奚乞失活種王武俊出契丹怒皆部喜許記翻司徒勿忘鄙言他日必相念矣其後滔武俊交惡果如孝忠之言復扶又翻下復以同孝忠怒欲執送京師雄懼逃歸滔乃使劉怦將兵屯要害以備之怦普耕翻將即亮翻又音如字下文滔將同孝忠完城礪兵獨居強寇之間莫之能屈滔將步騎二萬五千發深州至束鹿詰旦將行騎奇寄翻詰起吉翻吹角未畢士卒忽大亂喧譟曰天子令司徒歸幽州柰何違敕南救田悅譟則竈翻令力丁翻下旨令同走入驛後堂避匿蔡雄與兵馬使宗頊等矯謂士卒曰汝輩勿喧聽司徒傳令衆稍止使疏吏翻頊吁玉翻令力定翻雄又曰司徒將發范陽恩旨令得李惟岳州縣即有之司徒以幽州少絲纊故與汝曹竭力血戰以取深州冀得其絲纊以寬汝曹賦率少詩沼翻纊苦謗翻細綿也賦率猶言賦斂也不意國家無信復以深州與康日知又朝廷以汝曹有功賜絹人十匹至魏州西境盡為馬僕射所奪復扶又翻又音如字朝直遙翻下各還同射寅謝翻司徒但處范陽富貴足矣今茲南行乃為汝曹非自為也處昌呂翻為于偽翻下行為不為同汝曹不欲南行任自歸北何用喧悖悖蒲昧翻又蒲沒翻乖失軍禮衆聞言不知所為乃曰敕使何得不為軍士守護賞物遂入敕使院擘裂殺之軍中別置館舍以居敕使謂之敕使院使疏吏翻雖知司徒此行為士卒終不如且奉詔歸鎮呼火故翻雄曰然則汝曹各還部伍詰朝復往深州休息數日相與歸鎮耳衆然後定滔即引軍還深州密令諸將訪察唱率為亂者得二百餘人悉斬之詰去吉翻復音如字令力丁翻將即亮翻餘衆股慄乃復引軍而南衆莫敢前卻呼火故翻復扶又翻又音如字觀田庭玠之諫田悅谷從政邵真之諫李惟岳范陽之兵不肯從朱滔南救魏州河朔三鎮之人豈皆好亂哉上之人御失其道耳進取寧晉寧晉縣屬趙州本癭陶縣天寶元年更名九域志在趙州南四十一里武俊將步騎萬五千取元氏元氏縣漢為常山郡治後魏屬趙郡唐屬趙州將即亮翻又音如字趣七喻翻宋白曰寧晉漢楊氏縣也後漢為癭陶侯國後魏為癭陶縣唐天寶元年改寧晉縣九域志寧晉縣在趙州東南四十一里武俊之始誅李惟岳也遣判官孟華入見章十二行本見下有上問以河朔利害七字乙十一行本同退齋校同張校同云無註本亦無見賢遍翻華性忠直有才略應對慷慨上悅以為恆冀團練副使慷苦廣翻恆戶登翻會武俊與朱滔有異謀上遽遣華歸諭旨華至武俊已出師華諫曰聖意於大夫甚厚苟盡忠義何患官爵之不崇土地之不廣不日天子必移康中丞於他鎮康中丞謂康日知何苦遽自同於逆亂乎異日無成悔之何及華曏在李寶臣幕府以直道已為同列所忌至是為副使同列尤疾之言於武俊曰華以軍中陰事奏天子請為內應故得超遷是將覆大夫之軍大夫宜備之武俊以其舊人不忍殺奪職使歸私第田悅恃援兵將至遣其將康愔將萬餘人出城西與馬燧等戰於御河上將即亮翻愔於今翻愔將音同上又音如字燧音遂御河即隋煬帝所開永濟渠也開元二十八年魏州刺史盧暉徙永濟渠自石灰窰引流至城西注魏橋以通江淮之貨杜佑曰御河在魏州魏縣煬帝引白溝水為永濟渠即此大敗而還還從宣翻又音如字考異曰悅傳曰五月悅以救軍將至盡率其衆出戰於御河之上大敗而還燧傳曰悅恃燕趙之援又出兵二萬背城而陳燧復與諸軍擊破之今從實錄三年時兩河用兵月費百餘萬緡緡眉巾翻府庫不支數月太常博士韋都賓陳京建議以為貨利所聚皆在富商請括富商錢出萬緡者借其餘以供軍計天下不過借一二千商則數年之用足矣上從之甲子詔借商人錢令度支條上度徒洛翻上時掌翻判度支杜佑大索長安中商賈所有貨意其不實輒加搒捶人不勝苦有縊死者索山客翻賈音古搒音彭捶止橤翻勝音升縊於賜翻又於計翻長安囂然如被寇盜囂五羔翻又許驕翻被皮義翻計所得纔八十餘萬緡又括僦櫃質錢民間以物質錢異時贖出於母錢之外復還子錢謂之僦櫃僦即就翻皆借四分之一封其櫃窖蓄錢帛者以櫃積粟麥者以窖窖古教翻為于偽翻相帥遮宰相馬自訴以千萬數帥讀曰率盧始慰諭之勢不可遏乃疾驅自他道歸計幷借商所得纔二百萬緡考異曰實錄借商統計田宅奴婢等估纔餘八萬貫今從舊盧傳傳又曰杜佑計京師帑廩不支數月且得五百萬貫可支半歲用則兵濟矣於是戶部侍郎判度支趙贊與韋都賓等謀行括借約罷兵後以公錢還敕既下京兆少尹韋貞督責頗峻長安尉薛萃荷校乘車搜人財貨計富戶田宅奴婢等估纔及八十八萬貫又借僦匱質錢共纔及二百萬貫今從實錄京叔明之五世孫也陳叔明陳宣帝子封宜都王三年甲戌以昭義節度副使磁州刺史盧玄卿為洺州刺史兼魏博招討副使使疏吏翻磁牆之翻洺音名初李抱真為澤潞節度使馬燧領河陽三城抱真欲殺懷州刺史楊鉥鉥奔燧鉥時迄翻燧納之且奏其無罪抱真怒及同討田悅數以事相恨望二人怨隙遂深不復相見由是諸軍逗橈久無成功數所角翻下上數同復扶又翻逗者逗留不進勢屈為橈橈奴教翻上數遣中使和解之數所角翻使疏吏翻及王武俊逼趙州抱真分麾下二千人戍邢州燧大怒曰餘賊未除宜相與戮力乃分兵自守其地章十二行本地下有我甯得獨戰邪六字乙十一行本同退齋校同張校同云無註本亦無欲引兵歸李晟說燧曰李尚書以邢趙連壤九域志趙州南至邢州界七十四里自界首至邢州七十里晟成正翻說式芮翻尚辰羊翻誠未有害今公遽自引去衆謂公何燧悅乃單騎造抱真壘騎奇寄翻造七到翻相與釋憾結歡會洺州刺史田昂請入朝燧奏以洺州隸抱真洺州自此遂屬昭義洺音名朝直遙翻兼充招討之副李晟軍先隸抱真又請兼隸燧以示協和上皆從之晟成正翻燧音遂三年盧龍節度行軍司馬蔡廷玉惡判官鄭雲逵章十二行本逵下有言於朱泚四字乙十一行本同退齋校同張校同云無註本亦無奏貶莫州參軍雲逵妻朱滔之女也滔復奏為掌書記惡烏路翻復扶又翻又音如字雲逵深構廷玉於滔廷玉又與檢校大理少卿朱體微言於泚曰蔡廷玉朱體微皆事朱泚者也校古孝翻少始照翻滔在幽鎮事多專亶其性非長者不可以兵權付之滔知之大怒數與泚書請殺二人者長知丈翻數所角翻泚不從由是兄弟頗有隙及滔拒命上欲歸罪於廷玉等以悅滔甲子貶廷玉柳州司戶體微萬州南浦尉柳州漢潭州縣地唐置柳州以分野當柳星之下而名去京師水陸相乘五千四百七十里萬州治南浦縣春秋夔國之地秦漢為胊䏰縣地後周置萬州郡唐置萬州以郡為稱京師西南一千六百二十四里三年宣武節度使劉洽攻李納之濮陽降其守將高彥昭使疏吏翻濮博木翻降戶江翻將即亮翻三年朱滔遣人以蠟書置髻中遺朱泚遺唯季翻欲與同反馬燧獲之幷使者送長安泚不之知上驛召泚於鳳翔至以蠟書幷使者示之泚惶恐頓首請罪上曰相去千里初不同謀非卿之罪也因留之長安私第大曆九年朱泚請入朝代宗為之築大第於京師事見二百二十五卷考異曰幸奉天錄曰上命還私第但絕朝謁日給酒肉而已以內侍一人監之今從實錄及舊傳以安其意其幽州盧龍節度太尉中書令並如故為朱泚失兵權乘時逆上張本上以幽州兵在鳳翔幽州兵朱泚所將以入朝防秋者盧忌張鎰忠直為上所重欲出之於外己得專總朝政鎰弋質翻朝直遙翻乃對曰朱泚名位素崇鳳翔將校班秩已高非宰相信臣無以鎮撫臣請自行上俛首未言泚且禮翻又音此將即亮翻校戶教翻相息亮翻俛音免又曰陛下必以臣貌寢不為三軍所伏貌不揚曰寢上乃顧鎰曰才兼文武望重內外無以易卿鎰知為所排而無辭以免因再拜受命戊寅以鎰兼鳳翔尹隴右節度等使為張鎰為李楚琳所殺張本初盧與御史大夫嚴郢共搆楊炎趙惠伯之獄事見上二年復忌郢復扶又翻會蔡廷玉等貶官殿中侍御史鄭詹誤遞文符至昭應送之廷玉等行已至藍田召還而東還從宣翻又音如字廷玉等以為執己送朱滔至靈寶西赴河死靈寶縣屬陝州古桃林地漢為弘農縣開元末改為靈寶縣弘農縣故城在今縣西南二十里駭異盧因奏朱泚必疑以為詔旨請遣三司使案詹此謂遣兩省官及御史臺官為三司使使案詹等獄使疏吏翻御史所為必稟大夫請幷郢案之獄未具壬午奏杖殺詹於京兆府貶郢費州刺史費州治涪州江岸因州界費水為名舊志費州京師南四千七百里費扶未翻考異曰舊盧傳云貶郢驩州刺史今從新傳卒子恤翻上初即位崔祐甫為相務崇寬大故當時政聲藹然以為有貞觀之風相息亮翻觀古玩翻及盧為相知上性多忌因以疑似離間㣥臣間古莧翻始勸上以嚴刻御下中外失望三年淮南節度使陳少遊奏本道稅錢每千請增二百使疏吏翻少始照翻舊志淮南道督揚滁常潤和宣歙七州此貞觀中之制也以今觀之唐中世以後當統揚楚滁和濠廬壽光蘄黃申安舒等州稅錢謂田稅及商稅錢也五月丙戌詔增他道稅錢皆如淮南又鹽每斗價皆增百錢鹽每斗價幾何而頓增百錢人誰堪之三年朱滔王武俊自寧晉南救魏州是年四月王武俊進屯寧晉辛卯詔朔方節度使李懷光將朔方及神策步騎萬五千人東討田悅且拒滔等將即亮翻又音如字騎奇寄翻滔行至宗城掌書記鄭雲逵參謀田景仙棄滔來降宗城縣屬魏州漢廣宗縣地降戶江翻三年丁酉加河東節度使馬燧同平章事三年辛亥置義武軍節度於定州以易定滄三州隸之以命張孝忠三年張光晟之殺突董也事見上卷元年晟成正翻召冊可汗使源休還太原久之乃復遣休送突董及翳密施大小梅錄等四喪還其國紇下沒翻可從刊入聲汗音寒還從宣翻又音如字下同復扶又翻可汗遣其宰相頡子斯迦等迎之頡子斯迦坐大帳新書回鶻傳作頡干伽相息亮翻頡奚結翻迦求加翻詰以殺突董之狀欲殺者數四供待甚薄留五十餘日乃得歸可汗使人謂之曰國人皆欲殺汝以償怨我意則不然汝國已殺突董等我又殺汝如以血洗血汚益甚耳詰去吉翻汚烏故翻今吾以水洗血不亦善乎唐負我馬直章十二行本直下有絹字乙十一行本同退齋校同張校同云無註本亦無百八十萬匹當速歸之遣其散支將軍康赤心隨休入見見賢遍翻休竟不得見可汗而還還從宣翻又音如字己張己上脫六月卯至長安詔以帛十萬匹金銀十萬兩償其馬直休有口辯盧恐其見上得幸乘其未至先除光祿卿為源休以賞薄怨望從朱泚反張本三年朱滔王武俊軍至魏州田悅具牛酒出迎魏人懽呼動地呼火故翻滔營於愜山嚴愜山改連篋山是日李懷光軍亦至馬燧等盛軍容迎之滔以為襲己遽出陳懷光勇而無謀欲乘其營壘未就擊之燧請且休將士觀釁而動懷光曰彼營壘既立將為後患此時不可失也遂擊滔於愜山之西魏氏土地記曰渤海高城縣東北五十里有篋山余按此愜山當在魏州界近永濟渠陳讀曰陣燧音遂將即亮翻釁許覲翻愜詰叶翻滔軍崩沮沮在呂翻懷光按轡觀之有喜色士卒爭入滔營取寶貨王武俊引二千騎橫衝懷光軍軍分為二滔引兵繼之官軍大敗蹙入永濟渠溺死者不可勝數人相蹈藉其積如山水為之不流騎奇寄翻溺奴狄翻勝音升為于偽翻馬燧等各收軍保壘是夕滔等堰永濟渠入王莽故河酈道元曰漢溝洫志云河為中國害尤甚故禹導河自積石歷龍門釃二渠以引河一則漯川今河所流也一則北瀆王莽時絕故世俗名是瀆為王莽河明日水深三尺餘深式禁翻馬燧懼遣使卑辭謝滔求與諸節度歸本道奏天子請以河北事委五郎處之使疏吏翻朱滔第五故稱之為五郎若尊之然處昌呂翻滔欲許之王武俊以為不可滔不從秋七月燧與諸軍涉水而西退保魏縣以拒滔九域志魏縣在魏州城西三十五里武俊由是恨滔後數日滔等亦引兵營魏縣東南與官軍隔水相拒考異曰實錄六月辛巳朱滔王武俊兵至魏州是日李懷光之師亦至七月庚子馬燧等四節度兵退保魏縣又曰田悅等築堰欲決御河水灌王莽故河以絕我糧道燧令白懷光欲退軍懷光不可抱真晟亦欲決死守之賊築堰愈急勢迫會夜乃俱引退燕南記曰六月朱滔武俊懷光俱至懷光即欲戰馬燧抱真不得已從之七月六日懷光等擊滔勝之尋為王武俊所敗其夜決河水絕懷光等西歸之路明日水深三尺餘馬燧與朱滔有外族之親呼滔為表姪使人說滔曰老夫不度氣力與李相公等昨日先陳王大夫善戰海內所知也司徒五郎與商議放老夫等卻歸太原諸節度亦各還本道當為聞奏河北地任五郎收取滔見武俊戰勝私心忌其勝己乃謂武俊曰大夫二兄破懷光等氣已沮喪馬司徒既屈服如此且放去漸圖未晚武俊曰豈有四五節度兵逾十萬使打賊始經一陣被殺卻五萬人將何面目歸見天子今窮蹙詐求退去料不過到洺州界必築壘相待悔難及也滔心明知其事竟絕水放燧等既離魏府城下退行三十里遂連魏縣河列營相拒滔雖慙謝武俊終有恨意又同進軍魏橋河東南去懷光營五里移營在七月中旬也邠志曰三年夏詔懷光率邠甲五千兼統諸軍東征六月師及魏郛戰焉陷燕人之衆師入賊營收其寶貨馬公燧曰我二年困此賊彼旦至而夕破之人其謂我何乃稍抽戰卒以孤其勢田悅曰馬太原妬功也朔方軍可襲矣乃使步卒七百人負刀而趨乘我失度擠之于河死者數百人皆精騎也馬公遽命平射三百人爭橋以出我軍故步軍不敗軍勢大衂詔唐朝臣自河南引軍會之舊田悅傳曰王武俊以二千騎橫擊懷光陳滔軍繼踵而進禁軍大敗人相蹈藉投尸于河二十里河水為之不流馬燧收軍保壘是夜王武俊決河水入王莽故河欲隔官軍水已深三尺糧餉路絕王師計無從出乃遣人告朱滔云云時武俊戰勝滔心忌之即曰大夫二兄已敗官軍馬司徒卑屈若此不宜迫人於險也武俊曰燧等連兵十萬皆是國之名臣一戰而北貽國之恥不知此等何面目見天子邪然吾不惜放還但不行五十里必反相拒按長曆六月壬子朔七月壬午朔然則辛巳六月三十日庚子七月十九日也滔與懷光至魏之日滔營壘猶未立懷光即與之戰豈得至七月六日邪戰于愜山之夜武俊決水明日燧等即退保魏縣豈得至十九日邪實錄燕南記所載日皆不可據也然實錄多據奏到之日不知戰與移營的在何日要之必在六七月之際故但記七月退保魏縣耳朱滔與王武俊同舉兵志在破馬燧軍豈有一戰纔勝遽忌武俊縱燧令去自貽後患邪直是滔無遠識謂燧等不足畏得其卑辭而縱去耳又舊悅傳云決河水若決黃河不須築堰決水經日不止三尺既決之後不可復壅今從實錄決御河水灌王莽河耳三年李納求救於滔等滔遣魏博兵馬使信都承慶將兵助之納攻宋州不克遣兵馬使李克信李欽遙戍濮陽南華以拒劉洽使疏吏翻將即亮翻又音如字濮博木翻濮陽縣時屬濮州南華縣屬曹州漢離狐縣也三年甲辰以淮寧節度使李希烈兼平盧淄青兗鄆登萊齊州節度使討李納又以河東節度使馬燧兼魏博澶相節度使加朔方邠寧節度使李懷光同平章事前此改淮西節度為淮寧軍鄆音運燧音遂澶時連翻相息亮翻邠卑旻翻三年神策行營招討使李晟請以所將兵北解趙州之圍與張孝忠分勢圖范陽上許之晟自魏州引兵北趨趙州晟成正翻將即亮翻又音如字趨逡諭翻王士真解圍去晟留趙州三日與孝忠合兵北略恆州恆戶登翻三年演州司馬李孟秋舉兵反演州漢咸驩縣之地唐武德初置驩州貞觀九年改曰演州十六年省改咸驩為懷驩屬驩州廣德二年分驩州後置安南都護輔良交討斬之新書方鎮表乾元元年升安南管內經略使為安南節度使三年八月丁未置河章十二行本河作汴乙十一行本同孔本同退齋校同熊校同東西水陸運兩稅鹽鐵使二人度支總其大要而已汴皮變翻度徒洛翻三年辛酉以涇原留後姚令言為節度使三年盧惡太子太師顏真卿欲出之於外惡烏路翻真卿謂曰先中丞傳首至平原中丞謂父弈也事見二百一十七卷天寶十四載舐直氏翻今相公忍不相容乎矍然起拜然恨之益甚三年九月癸卯殿中少監崔漢衡自吐蕃歸去年崔漢衡使吐蕃見賢遍翻三年冬十月辛亥以湖南觀察使曹王皋為江南西道節度使皋至洪州悉集將佐簡閱其才得牙將伊慎王鍔等擢為大將引荊襄判官許孟容置幕府慎兗州人孟容長安人也慎常從李希烈討梁崇義希烈愛其才欲留之慎逃歸希烈聞皋用慎恐為己患遺慎七屬甲遺唯季翻周禮函人為甲犀甲七屬鄭註云屬讀如灌注之注謂上旅下旅札屬之數凡七也詐為復書墜之境上上聞之遣中使即軍中斬慎皋為之論雪皋為于偽翻未報會江賊三千餘衆入寇江賊江中㣥盜也自湖口入寇江南西道慎擊破之斬首數百級而還由是得免三年盧秉政知上必更立相相息亮翻恐其分己權乘間薦吏部侍郎關播儒厚可以鎮風俗間古莧翻丙辰以播為中書侍郎同平章事考異曰舊播傳曰播為吏部侍郎轉刑部尚書十月拜銀青光祿大夫中書侍郎同中書門下平章事今實錄自吏部侍郎為相與傳不同疑傳誤明年罷相乃改刑部尚書播但斂袵無所可否上嘗從容與宰相論事播意有所不可起立欲言目之而止還至中書謂播曰以足下端慤少言故相引至此曏者柰何發口欲言邪播自是不復敢言從千容翻少詩沼翻復扶又翻三年戊辰遣都官員外郎樊澤章十二行本樊上有河中二字乙十一行本同使于吐蕃告以結盟之期三年丙子肅王詳薨詳皇子也三年十一月己卯朔加淮南節度使陳少遊同平章事三年田悅德朱滔之救與王武俊議奉滔為主稱臣事之滔不可曰愜山之捷皆大夫二兄之力二兄謂王武俊也武俊第二於是幽州判官李子千恆冀判官鄭濡等考異曰舊傳作李子牟鄭儒今從燕南記請與鄆州李大夫為四國鄆州李大夫謂李納也如昔諸侯奉周家正朔築壇同盟有不如約者衆共伐之不然豈得常為叛臣茫然無主用兵既無名有功無官爵為賞使將吏何所依歸乎滔等皆以為然滔乃自稱冀王田悅稱魏王王武俊稱趙王仍請李納稱齊王是日滔等築壇於軍中告天而受之考異曰實錄於十一月末云是月朱滔僭稱大冀王燕南記云十月十一日於下營處各築壇場設儀注告天稽首稱名同日偽立為王舊本紀朱滔王武俊傳皆云十一月而無日惟田悅傳云十一月一日今從之稱孤武俊悅納稱寡人所居堂曰殿處分曰令處昌呂翻分扶問翻令力定翻㣥下上書曰牋妻曰長子曰世子各以其所治州為府置留守兼元帥以軍政委之又置東西曹視中書門下省左右內史視侍中中書令餘官皆倣天朝而易其名武俊以孟華為司禮尚書華竟不受嘔血死上時掌翻長知丈翻守式又翻帥所類翻司禮尚書視天朝禮部尚書朝直遙翻以兵馬使衞常寧為內史監彼所謂內史監當位於左右內史之上使疏吏翻常寧謀殺武俊武俊腰斬之武俊遣其將張終葵寇趙州康日知擊斬之將即亮翻李希烈帥所部三萬徙鎮許州遣所親詣李納與謀共襲汴州帥讀曰率汴皮變翻九域志許州東至汴州二百一十五里遣使告李勉云已兼領淄青欲假道之官勉為之治橋具饌以待之為于偽翻淄莊持翻治直之翻饌雛戀翻又雛晥翻而嚴為之備希烈竟不至又密與朱滔等交通納亦數遣遊兵渡汴以迎希烈數所角翻由是東南轉輸者皆不敢由汴渠自蔡水而上蔡河古之琵琶溝在浚儀縣杜佑曰漢運路出浚儀十里路入琵琶溝至陳州而合宋白曰建中初杜佑改漕路自浚儀西十里路其南涯引流入琵琶溝經蔡河至陳州合潁是秦漢故道自隋開汴河利涉揚楚故官漕不復由此道佑始開之上時掌翻三年十二月丁丑李希烈自稱天下都元帥太尉建興王時朱滔等與官軍相拒累月官軍有度支饋糧諸道益兵而滔與王武俊孤軍深入專仰給於田悅度徒洛翻仰牛向翻客主日益困弊客謂滔武俊之軍主謂田悅頗怨望乃相與謀遣使詣許州勸希烈稱帝希烈由是自稱天下都元帥使疏吏翻帥所類翻三年司天少監徐承嗣請更造建中正元曆從之乾元元年改太史局為司天臺以令為監正三品少監正四品上掌察天文稽曆數凡日月星辰風雲氣色之異率其屬占之肅宗時韓潁損益大衍曆為至德曆寶應元年代宗以至德曆不與天合詔司天臺官屬郭獻之等復用麟德元紀更立歲差增損遲疾交會及五星差數以寫大衍術曰五紀曆至是五紀曆氣朔加時稍後天推測星度與大衍差率頗異乃詔承嗣等雜麟德大衍之旨治新曆名建中正元曆少始照翻嗣祥吏翻更工衡翻容肇祖標點聶崇岐覆校
