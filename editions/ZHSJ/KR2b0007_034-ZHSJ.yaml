body:
  text: 資治通鑑卷第三十四翰林學士朝散大夫右諫議大夫知制誥兼侍講同提舉萬壽觀公事兼判集賢院上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣奉敕編集後學天台音註漢紀二十六建平二年孝哀皇帝中建平二年丙辰前五建平二年春正月有星孛于牽牛晉天文志牽牛六星天之關梁主犧牲事孛蒲內翻建平二年丁傅宗族驕奢皆嫉傅喜之恭儉又傅太后欲求稱尊號與成帝母齊尊喜與孔光師丹共執以為不可上重違大臣正議師古曰重難也依違者連歲如淳曰依違不決事之言也余謂上二語即依違之意上不得已先免師丹以感動喜師丹免見上卷上年朱博與孔鄉侯傅晏連結共謀成尊號事數燕見數所角翻見賢遍翻奏封事毀短喜及孔光毀短者譖毀而言其短也丁丑上遂策免喜以侯就第御史大夫官既罷成帝綏和元年罷御史大夫置大司空事見三十二卷漢自天子之號下至佐史皆不同於古漢官至斗食佐史而止言漢承秦號為皇帝下至百官稱號皆不與古同職事難分明無益於治亂治直吏翻於是朱博奏言故事選郡國守相高第為中二千石守式又翻相息亮翻選中二千石為御史大夫任職者為丞相言御史大夫能任其職則進而為相所以尊聖德重國相也今中二千石未更御史大夫而為丞相師古曰更經也音工衡翻權輕非所以重國政也臣愚以為大司空官可罷復置御史大夫遵奉舊制臣願盡力以御史大夫為百僚率上從之夏四月戊午更拜博為御史大夫又以丁太后兄陽安侯明為大司馬衞將軍置官屬大司馬冠號如故事復綏和以前之制也冠古玩翻建平二年傅太后又自詔丞相御史大夫曰高武侯喜附下罔上與故大司空丹同心背畔放命圮族應劭曰謂放棄教令圮其族類背蒲妹翻圮皮美翻朝直遙翻請才性翻又如字其遣就國建平二年丞相孔光自先帝時議繼嗣有持異之隙又重忤傅太后指持異事見三十二卷成帝綏和元年重忤傅太后指謂不使居北宮奏傅遷持稱尊號之議也師古曰重音直用翻忤五故翻共毀譖光表外也裏內也傅氏譖之於內朱博毀之於外也乙亥策免光為庶人師古曰漢舊儀云丞相有他過使者奉策書即時步出府乘棧車歸田里封陽鄉侯恩澤侯表陽鄉侯國於山陽湖陵考異曰公卿表四月乙未孔光免朱博為丞相又曰四月戊午博為御史大夫乙亥遷五行志五月乙亥朔博為丞相荀紀乙亥孔光免按長磿是月丁巳朔無乙未十九日乙亥非朔也表志皆有誤成帝綏和元年趙玄自太子太傅左遷今復進用皆丁傅之意也師古曰延入而登殿也漢舊儀云丞相御史大夫初拜皇帝延登親詔也殿中郎吏陛者皆聞焉師古曰陛者謂執兵列於陛側上以問黃門侍郎蜀郡揚雄續漢志給事黃門侍郎六百石掌侍從左右給事中關通中外及諸王朝見於殿上引王就坐揚雄解嘲所謂官不過侍郎擢纔給事黃門者也揚雄自謂其先出年有周伯僑者食采於晉之楊因氏焉不知伯僑周何別也尋對曰此洪範所謂鼓妖者也師法以為人君不聰為衆所惑空名得進則有聲無形不知所從生洪範五行傳曰聽之不聰是謂不謀時則有鼓妖君嚴猛而閉下臣戰栗而塞耳則妄聞之氣發於音聲故有鼓妖妖於驕翻則正卿受之今以四月日加辰巳有異是為中焉以一歲三分之則四月已為歲之中以一日三分之則辰巳已為日之中謂執政大臣也宜退丞相御史以應天變然雖不退不出期年其人自蒙其咎師古曰期年十二月也蒙猶被也期音基鼓妖聽失之象也朱博為人強毅多權謀宜將不宜相將即亮翻相息亮翻恐有凶惡亟疾之怒師古曰亟急也音居力翻上不聽朱博既為丞相上遂用其議下詔曰定陶共皇之號不宜復稱定陶復扶又翻尊共皇太后曰帝太太后稱永信宮共皇后曰帝太后稱中安宮為共皇立寢廟於京師為于偽翻比宣帝父悼皇考制度宣帝既立八年有司言禮父為士子為天子祭以天子悼園宜稱皇考立廟因園為寢以時薦享焉然悼園在廣明成鄉長安東郭之外也定陶共王葬定陶而立廟京師則非因園為寢矣秩皆中二千石傅太后丁太后趙太后與太皇太后為四太后尤驕與太皇太后語至謂之嫗嫗威遇翻時丁傅以一二年間暴興尤盛為公鄉列侯者甚衆然帝不甚假以權勢不如王氏在成帝世也建平二年丞相博御史大夫玄奏言前高昌侯宏首建尊號之議而為關內侯師丹所劾奏免為庶人事見上卷綏和二年劾戶概翻嚴下改子衰粗委政於丹師古曰言新有成帝之喪斬衰粗服故天子不親政事也衰音倉回翻惟思也抑貶尊號虧損孝道不忠莫大焉陛下仁聖昭然定尊號宏以忠孝復封高昌侯丹惡逆暴著雖蒙赦令不宜有爵邑請免為庶人奏可又奏新都侯莽前為大司馬不廣尊尊之義抑貶尊號虧損孝道事亦見上卷綏和二年幸蒙赦令不宜有爵土請免為庶人上曰以莽與章乙十一行本與下有太字孔本同皇太后有屬勿免遺就國及平阿侯仁臧匿趙昭儀親屬皆遣就國仁譚之子也臧古藏字通天下多冤王氏者為下元壽二年王莽復柄國張本孝成皇帝深惟宗廟之重稱述陛下至德以承天序天序謂帝王正統相傳之次天所命也上時掌翻恩德至厚惟念先帝之意豈不欲以陛下自代奉承東宮哉師古曰言供養太后數更憂傷謂先罹元帝之喪而又哭成帝也數所角翻更工衡翻師古曰引領自引道領而退也為于偽翻況於陛下登高遠望獨不慚於延陵乎言王氏斥逐而丁傅貴寵若登高而望成帝陵寢寧不有慚於付託乎復封成都侯商中子邑為成都侯綏和二年商子況以罪奪侯今以邑紹封中讀曰仲建平二年朱博又奏言漢家故事置部刺史秩卑而賞厚漢刺史秩六百石耳居部九歲舉為守相秩二千石其有異材功效著者輒登擢師古曰勸功自勸勉而立功也樂音洛更置州牧事見三十二卷成帝綏和元年更工衡翻位次九卿九卿缺以高第補其中材則苟自守而已恐功效陵夷師古曰陵夷謂漸廢替臣請罷州牧置刺史如故上從之建平二年六月庚申帝太后丁氏崩詔歸葬定陶共皇之園從夫也共皇葬於其國賢曰在今曹州濟陰縣北共讀曰恭近郡國謂郡國之近定陶者前書音義曰穿復土謂穿壙填塞事也言下棺訖復以土為墳故曰復土近其靳翻建平二年初成帝時齊人甘忠可詐造天官曆包元太平經十二卷言漢家逢天地之大終當更受命於天以教渤海夏賀良等夏戶雅翻中壘校尉劉向奏忠可假鬼神罔上惑衆忠可詐稱天帝使真人赤精子下教我故向奏之治服服其挾詐也下遐稼翻病死斷丁亂翻賀良等復私以相教復扶又翻下同上即位司隸校尉解光騎都尉李尋白賀良等皆待詔黃門應劭曰諸以材技徵召未有正官故曰待詔董巴曰黃門禁門黃闥數所角翻見賢遍翻陳說漢曆中衰當更受命成帝不應天命故絕嗣今陛下久疾變異屢數師古曰數音所角翻天所以譴告人也宜急改元易號乃得延年益壽皇子生災異息矣得道不得行師古曰言知道而不能行洪水將出災火且起滌盪民人上久寢疾班固曰上即位痿痹末年浸劇逐從賀良等議詔大赦天下以建平二年為太初元年號曰陳聖劉太平皇帝李婓曰陳道也言得神道聖者劉也如淳曰陳舜後王莽陳之後謬語陳當立而不知韋昭曰敷陳聖劉之德也師古曰如韋二說是也余謂韋說不詭於正如說則流於巫顏以為二說皆是將安從乎師古曰舊漏晝夜共百刻今增其二十建平二年秋七月以渭城西北原上永陵亭部為初陵勿徙郡國民建平二年上既改號月餘寢疾自若夏賀良等復欲妄變政事大臣爭以為不可許賀良等奏言大臣皆不知天命宜退丞相御史以解光李尋輔政上以其言無驗八月詔曰待詔賀良等建言改元易號增益漏刻可以永安國家朕信道不篤過聽其言師古曰過誤也卒無嘉應為于偽翻卒子恤翻夫過而不改是謂過矣論語載孔子之言甲子非赦令皆蠲除之如淳曰悔前赦令不蒙其福故收令還之臣瓚曰改元易號大赦天下以求延祚而不蒙福哀帝悔之故更下制書諸非赦事皆除之謂改制易號今皆復故也師古曰如說非也瓚說是矣唯赦令不改餘皆除之姦態當窮竟皆下獄伏誅下遐稼翻尋及解光減死一等徙敦煌郡此漢法所謂減死徙邊也減列者罪至死而特為末減也減死罪一等為城旦舂建平二年上以寢疾盡復前世所嘗興諸神祠凡七百餘所成帝建始初匡衡張譚奏罷諸神祠不應禮者今盡復之神祠既多而有歲五祠者有歲四祠者故其數若是之多建平二年傅太后怨傅喜不已使孔鄉侯章乙十一行本侯有晏字孔本同張校同風丞相朱博令奏免喜侯師古曰風讀曰諷博與御史大夫趙玄議之玄言事已前決謂前已決遣就國罪無重科也師古曰得無猶言無乃也已許孔侯矣匹夫相要尚相得死要一遙翻得死謂得其死力一曰得其相為死也何況至尊至尊謂傅太后大臣以道事君而博以死奉私屬貪權藉勢之心為之也博惡獨斥奏喜惡烏故翻以故大司空氾鄉侯何武前亦坐過免就國事見上卷綏和二年即幷奏喜武前在位皆無益於治治直吏翻雖已退免爵土之封非所當也皆請免為庶人上知傅太后素嘗怨喜疑博玄承指即召玄詣尚書問狀玄辭服丞相御史同奏而獨召問玄者以博強毅多權詐難遽得其情而玄易以窮詰也左將軍彭宣與中朝者雜問宣等奏劾博玄晏皆不道不敬劾戶概翻請召詣廷尉詔獄上減玄死罪三等削晏戶四分之一減死罪三等為隸臣妾晏封五千戶削其千二百五十博自殺國除建平二年九月以光祿勳平當為御史大夫冬十月甲寅遷為丞相以冬月故且賜爵關內候如淳曰漢儀注御史大夫為丞相更春乃封故先賜爵關內侯也李奇曰以冬月非封侯時故且賜爵關內侯也師古曰李說是也按表傳喜當作嘉詳見下年及審是建平二年上欲令丁傅處爪牙官處昌呂翻是歲策免左將軍淮陽彭宣以關內侯歸家而以光祿勳丁望代為左將軍上策宣曰前有司數奏言諸侯國人不得宿衞將軍不宜典兵馬處大位朕惟將軍任漢將之重而子又前娶淮陽王女婚姻不絕非國之制其上左將軍印綬余按彭宣以連姻藩國而免官丁傅以戚黨而見用卒之奪劉氏者非藩國乃外戚也丁傅於國有大故之時拱手授柄於王氏而彭宣乃能辭三公位於王莽專權之初任官惟賢材烏得拘小嫌乎建平二年烏孫卑爰疐侵盜匈奴西界單于遣兵擊之殺數百人略千餘人敺牛畜去卑爰疐恐遣子趨逯為質匈奴疐竹二翻師古曰敺與驅同逯音錄質音致下同單于受以狀聞漢遣使者責讓單于告令還歸卑爰疐質子責以匈奴烏孫並為漢臣單于不當亶受卑疐質子三年三年春正月立廣德夷王弟廣漢為廣平王廣德夷王雲客成帝鴻嘉二年封又二年薨無後今立廣漢以奉中山靖王嗣諡法安心好靜曰夷克殺秉政曰夷三年帝太太后章乙十一行本帝上有癸卯二字孔本同退齊校同所居桂宮正殿火考異曰五行志云桂宮鴻寧殿災荀紀云桂宮正殿火今從哀紀三年上使使者召丞相平當欲封之當病篤不應不應召也不可強起受侯印為子孫邪室家當之妻子也謂受侯印而死得以封爵遺子孫也強其兩翻為于偽翻下同吾居大位已負素餐責矣起受侯印還臥而死死有餘罪今不起者所以為子孫也遂上書乞骸骨上不許三月己酉當薨三年有星孛于河鼓天文志河鼓在牽牛北大星上將左右星左將孛蒲內翻三年夏四月丁酉王嘉為丞相河南太守王崇為御史大夫守式又翻崇京兆尹駿之子也嘉以時政苛急郡國守相數有變動數所角翻乃上疏曰臣聞聖王之功在於得人孔子曰材難不其然與師古曰論語載孔子之言也材難言有賢材者難得也與讀曰歟余謂材難二語古語也孔子引之謂其言之是也象賢也禮記郊特牲之文師古曰象其先父祖之賢耳非必皆賢也天子為擇臣立命卿以輔之記王制大國三卿皆命於天子次國三卿二卿命於天子一卿命於其君小國二卿皆命於其君春秋之時如晉之六卿以中軍師為正卿亦其君先命之而後聞於天子耳齊之高國魯之三桓皆世卿也漢之王國傅相中尉命於天子猶古之命卿也累世尊重然後士民之衆附焉是以教化行而治功立治直吏翻今之郡守重於古諸侯周初班爵五等公侯地方百里伯七十里子男五十里其後齊晉秦楚以兼幷而地始廣大耳漢郡守方制千里連城以十數是重於古諸侯也守式又翻下同致極也拔擢可用者或起於囚徒昔魏尚坐事繫文帝感馮唐之言遣使持節赦其罪拜為雲中太守匈奴忌之事見十四卷文帝十四年拜為梁內史骨肉以安按韓安國傳安國坐法扺罪會梁內史缺漢使使者拜安國為梁內史起徒中為二千石此景帝時事也武帝當作景帝師古曰骨肉以安言梁孝王免罪也有罪當免黠吏知而犯敞黠下八翻敞收殺之其家自冤自言其冤也劾敞賊殺人上逮捕不下上奏請逮捕敞而天子不下其奏也上時掌翻下遐嫁翻會免亡命十數日宣帝徵敞拜為冀州刺史卒獲其用事見二十七卷宣帝甘露元年卒子恤翻貪其材器有益於公家也孝文時吏居官者或長子孫章乙十一行本孫下有以官為氏四字孔本同張校同退齋校同長知兩翻下同倉氏庫氏則倉庫吏之後也其二千石長吏亦安官樂職樂音洛然後上下相望莫有苟且之意其後稍稍變易公卿以下傳相促急又數改更政事傳知戀翻數所角翻更工衡翻司隸部刺史舉劾苛細發揚陰私司隸部三輔三河弘農其餘部刺史分部諸郡國劾戶概翻送故迎新交錯道路中材苟容求全師古曰不敢操持㣥下也師古曰常恐獲罪每為私計也二千石益輕賤吏民慢易之或持其微過增加成罪言於司隸刺史或上書告之衆庶知其易危師古曰言易可傾危易以豉翻前山陽亡徒蘇令等縱橫事見三十一卷成帝永始三年師古曰橫音胡孟翻難乃旦翻莫肯伏節死義以守相威權素奪也師古曰守郡守也相諸侯相也素奪謂不先假之威權也下詔書二千石不為故縱孟康曰不以故縱為罪所以優之也尉厚其意誠以為國家有急取辦於二千石二千石尊重難危乃能使下孝宣皇帝愛其善治民之吏有章劾事留中會赦壹解師古曰不即下治其事恐為擾重故每留中或經赦令壹切皆解散也余謂善治民之吏宣帝愛其材或有章劾留中不下會赦則其事得釋治直之翻劾戶概翻為煩擾百姓證驗繫治或死獄中章文必有敢告之字乃下師古曰所以丁寧告者之辭絕其相誣也余謂此乃防其誣告耳下遐稼翻為于偽翻記善忘過容忍臣子勿責以備師古曰不求備於一人也余謂責備者求全也人情不能不有過差宜可闊略師古曰當寬恕其小罪也此方今急務國家之利也前蘇令發欲遣大夫使逐問狀使之逐盜而問其狀也師古曰謂見在大夫皆不堪為使見賢遍翻拜為諫大夫遣之盩厔音舟窒今諸大夫有材能者甚少宜豫畜養可成就者則士赴難不愛其死臨事倉卒乃求非所以明朝廷也人材當聚於朝廷事會之來無可用者倉猝求之適所以明朝廷之無人耳少詩沼翻畜許六翻難乃旦翻卒讀曰猝風俗通荊蠻有瞞氏音舛變為滿國語路潞泉余滿皆赤狄隗姓及能吏蕭咸薛脩皆故二千石有名稱者天子納而用之按嘉此疏誠中當時之病然為相者在於朝夕納誨隨事矯正天下不能窺其際而自臻於治平不在著見於奏疏以騰口說也自宣帝之後為相者始加詳於奏疏而考其治迹愈不逮前相業固不在乎此也稱尺證翻三年六月立魯頃王子部鄉侯閔為王魯共王會孫頃王封傳國於其子文王晙睃薨無後今立閔紹封部鄉據紀表及傳當作郚鄉師古曰郚音吾又音魚睃音子緣翻地理志東海郡有郚鄉侯國三年上以寢疾未定定猶安也十一月壬子令太皇太后下詔復甘泉泰畤汾陰后士祠罷南北郊成帝崩皇太后詔罷甘泉汾陰祠復南北郊畤音止遣有司行事而禮祠焉三年無鹽危山土自起覆草如馳道狀無鹽縣屬東平國危山山名言土自起覆草成路如人力開掘作馳道狀也瓠山石轉立晉灼曰漢書作報山山脅石一枚轉側起立高九尺六寸旁行一丈廣四尺也師古曰報山山名也古作瓠字為其形似瓠耳晉說是也治石象瓠山立石束倍草幷祠之雲元帝子東平王宇之子也謁后名也蘇林曰於宮中作山象師古曰倍草黃倍草也倍音步賄翻原父曰立石屬上句治直之翻息夫複姓姓譜媯姓之國為息氏公子邊受爵為大夫又有息夫氏出焉曰此取封侯之計也乃與中郎右師譚張晏曰右師姓譚名余謂右師以官為氏告焉上時掌翻是時上被疾多所惡事下有司逮王后謁下獄驗治服祠祭詛祝上為雲求為天子被皮義翻下遐稼翻詛莊助翻祝職救翻為雲于偽翻以為石立宣帝起之表也事見二十三卷昭帝元鳳三年有詔廢徙房陵雲自殺謁及舅伍宏及成帝舅安成共侯夫人放皆棄市安成共侯王崇時已死矣故稱帝舅及諡以別下御史大夫王崇也伍宏以醫伎得幸出入禁門蓋放薦之故幷得禍共音恭左遷大司農擢寵為南陽太守譚潁川都尉弘躬皆光祿大夫左曹給事中四年四年春正月大旱四年關東民無故驚走持稿或掫一枚如淳曰掫麻幹也師古曰稾禾稈也音工老翻掫音鄒又音側九翻曰行西王母籌師古曰西王母元后壽考之象行籌又言執國家籌策行於天下多至千數或被髮徒跣或夜折關或踰牆入或乘車騎奔馳以置驛傳行被皮義翻折而設翻傳知戀翻經郡國二十六至京師不可禁止民又聚會里巷阡陌設博具師古曰博戲之具至秋乃止五行志曰此異乃王太后莽之應也四年上欲封傅太后從父弟侍中光褖大夫商從才用翻尚書僕射平陵鄭崇諫曰孝成皇帝封親舅五侯天為赤黃書昏日中有黑氣事見三十卷成帝建始元年為于偽翻皇后父高武侯以三公封尚有因緣孔鄉侯傅晏高武侯傅喜言皇后父及三公封侯尚有漢家舊比可因緣也壞亂制度復扶又翻壞音怪逆天人之心非傅氏之福也臣願以身命當國咎崇因持詔書案起李奇曰持當受詔書案起也師古曰李說非也案者即寫詔之文余按更始時常侍奏事韓夫人起扺破書案則案非文案之案也李說是何有為天子乃反為一臣所顓制邪二月癸卯上逐下詔封商為汝昌侯恩澤侯表汝昌侯國於東郡須昌之陽榖考異曰哀紀及恩澤侯表皆云商以今年二月封而孫寶傳云制詔丞相大司空按建平二年已罷大司空官疑傳誤四年駙馬都尉侍中雲陽董賢得幸於上出則參乘入御左右乘繩證翻御侍也賞賜累鉅萬貴震朝廷常與上臥起嘗晝寢偏藉上袖師古曰藉謂身臥其上也賢未覺師古曰覺寐之寤也覺音工效翻乃斷袖起斷丁管翻又詔賢妻得通引籍殿中止賢廬師古曰廬謂殿中所宿止處位次皇后昭儀及賢與妻旦夕上下並侍左右上時掌翻以賢父恭為少府賜爵關內侯詔將作大匠為賢起大第北闕下重殿洞門師古曰重殿謂有前後殿洞門謂闕門相當也皆僭天子之制度者也為于偽翻重直龍翻窮極技巧技渠綺翻賜武庫禁兵上方珍寶禁中謂之上方選物物之選其尤者上第於衆物之中等第居上也弟與第同乘繩證翻及至東園秘器珠襦玉匣章乙一十行本匣作柙師古曰東園署名屬少府漢舊儀云東園祕器作棺梓素木長三丈崇廣四尺珠襦以珠為襦如鎧狀連縫之以黃金為縷腰以下玉為柙長尺廣二寸半為甲至足亦縫以黃金縷豫以賜賢無不備具又令將作為賢起冢塋義陵旁義陵帝壽陵也塋余傾翻墓域剛柏題湊服虔曰便房藏中便坐也蘇林曰以柏木黃心致累棺外曰黃腸木頭皆內向故曰題湊師古曰便房小曲室也周垣數里徼道徼循之道師古曰徼謂遮繞也音工釣翻垣牆也罘音浮罳音思鄭崇以賢貴寵過度諫上由是重得罪師古曰重音直用翻數以職事見責數所角翻發疾頸癰欲乞骸骨不敢尚書令趙昌佞讇讇古諂字知見疏因奏崇與宗族通疑有姦請治治直之翻下同上責崇曰君門如市人師古曰言請求者多交通賓客崇對曰臣門如市臣心如水師古曰言至清也上怒下崇獄下遐稼翻司隸孫寶上書曰成帝元延四年省司隸校尉綏和二年上復置但曰司隸冠進賢冠屬大司空按尚書令昌奏僕射崇獄覆治榜掠將死卒無一辭師古曰榜掠謂笞擊而考問之也榜音彭掠音亮卒音子恤翻疑昌與崇內有纖介師古曰言有細故宿嫌也自禁門樞機近臣蒙受冤譖虧損國家為謗不小臣請治昌以解衆心書奏上下詔曰司隸寶附下罔上以春月作詆欺遂其姦心蓋國之賊也免寶為庶人崇竟死獄中四年三月諸章乙十一行本諸上有丁卯二字孔本同吏散騎光祿勳賈延為御史大夫延為光祿勳而加諸吏散騎也百官表諸吏得輿法散騎騎旁乘輿車師古曰騎而散從無常職也散悉亶翻四年上欲侯董賢而未有緣侍中傅嘉勸上定息夫躬孫寵告東平本章去宋弘更言因董賢以聞更定告章刊去宋弘名而入董賢名師古曰定謂改治其章也去羌呂翻更工衡翻皆先賜爵關內侯頃之上欲封賢等而心憚王嘉乃先使孔鄉侯晏持詔書示丞相御史於是嘉與御史大夫賈延上封事言竊見董賢等三人始賜爵衆庶匈匈咸曰賢貴其餘幷蒙恩師古曰言董賢以貴寵故妄得封而躬寵等遂蒙恩陛下仁恩於賢等不已宜暴賢等本奏語言師古曰暴謂章露也考合古今明正其義然後乃加爵土不然恐大失衆心海內引領而議引領猶言引頸也項背曰領必有言當封者在陛下所從天下雖不說師古曰說讀曰悅咎有所分不獨在陛下前定陵侯淳于長初封其事亦議事見三十一卷成帝永始二年衆人歸咎於永先帝不獨蒙其譏臣嘉臣延材駑不稱稱尺證翻死有餘責知順指不迕師古曰迕逆也音五故翻可得容身須臾所以不敢者思報厚恩也上不得已且為之止為于偽翻下同四年夏六月尊帝太太后為皇太太后傅太后也四年秋八月辛卯上下詔切責公卿曰昔楚有子玉得臣晉文公為之側席而坐晉文公與楚戰勝於城濮文公猶有憂色曰得臣猶在憂未歇也記曰有憂者側席而坐汲黯折淮南之謀事見十九卷武帝元狩元年是公卿股肱莫能悉心務聰明以銷厭未萌故也師古曰悉盡也務聰明者廣視聽也厭音一涉翻侍中駙馬都尉賢等發覺以聞咸伏厥辜書不云乎用德章厥善師古曰尚書盤庚之辭也恩澤侯表高安侯國於朱扶而朱扶之地無所考恩澤侯表方陽侯國於沛郡龍亢恩澤侯表宜陵侯國於南陽杜衍又封傅太后同母弟鄭惲子業為陽信侯恩澤侯表陽信侯國於南陽新野惲於粉翻數進見言事近其靳翻數所角翻見賢遍翻議論無所避上疏歷詆公卿大臣衆畏其口見之仄目四年上使中黃門續漢志中黃門比百石掌給事禁中送董賢及上乳母王阿舍執金吾毋將隆奏言武庫兵器天下公用國家武備繕治造作皆度大司農錢毋將複姓治直之翻蘇林曰用度皆出大司農自乘輿不以給共養共養勞賜一出少府乘繩證翻師古曰共音居用翻養音弋尚翻勞郎到翻蓋不以本臧給末用不以民力共浮費臧古藏字通音徂浪翻師古曰共讀曰供下同別公私示正路也別彼列翻古者諸侯方伯得顓征伐乃賜斧鉞禮記曰諸侯賜斧鉞然後征王制八州八伯謂之方伯各統其州之國亦賜武庫兵皆任事然後蒙之任音壬春秋之誼家不臧甲春秋公羊傳載孔子墮三都之言臧與藏通讀從平聲損私力也今賢等便僻弄臣便頻連翻私恩微妾而以天下公用給其私門契國威器共其家備李奇曰契缺也晉灼曰契取也師古曰李說是也音詰結翻武兵設於微妾建立非宜以廣驕僭非所以示四方也孔子曰奚取於三家之堂師古曰論語云三家者以雍徹孔子曰相維辟公天子穆穆奚取於三家之堂言以雍徹食乃天子之禮何為在三家之堂也三家謂魯叔孫仲孫季孫也余謂隆引孔子之言以謂武庫兵器不當以共臣妾之家猶歌雍不當在三家之堂也上不說說讀曰悅頃之傅太后使謁者賤買執金吾官婢八人隆奏言買賤請更平直漢書作賈賤賈讀曰價下同隆位九卿既無以匡朝廷之不逮而反奏請與永信宮爭貴賤之賈傅太后稱永信宮以隆前有安國之言左遷為沛郡都尉初成帝末隆為諫大夫嘗奏封事言古者選諸侯入為公卿以褒功德如衞武公鄭武公莊公是也以填萬方師古曰填讀曰鎮音竹刃翻故上思其言而宥之四年諫大夫渤海鮑宣上書曰姓譜鮑本自夏禹之裔因封為鮑氏齊之鮠氏世為上卿竊見孝成皇帝時外親持權人人牽引所私以充塞朝廷塞悉則翻妨賢人路濁亂天下奢泰亡度亡古無字通是以日食且十彗星四起日食十註已見三十二卷元延二年建始元年星孛于營室元延元年星孛于營室元延元年星孛于東井後又晨出東方十三日又夕見西方是四起也彗祥歲翻延芮翻又徐醉翻陛下所親見也今奈何反覆劇於前乎覆當作復劇增也甚也今民有七亡師古曰亡謂失其作業也水旱為災一亡也縣官重責更賦租稅二亡也師古曰更謂為更卒也音工衡翻貪吏並公受取不已三亡也師古曰並依也音步浪翻豪強大姓蠶食亡厭四亡也亡厭上古無字通下音於鹽翻苛吏繇役失農桑時五亡也繇古傜字通男女遮列六亡也師古曰言聞桴鼓之聲以為有盜賊皆當遮列而追捕取民財物七亡也七亡尚可又有七死酷吏毆殺一死也師古曰毆擊也音一口翻治獄深刻二死也治直之翻寃陷亡辜三死也亡古無字通下同四死也師古曰橫音戶孟翻怨讎相殘五死也歲惡饑餓六死也時氣疾疫七死也天有六氣陰陽風雨晦明也分為四時序為五節過則為災而生疾疫亦非時之氣所為也欲望國安誠難民有七死而無一生欲望刑措誠難此非公卿守相貪殘成化之所致邪㣥臣幸得居尊官食重祿豈有肯加惻隱於細民助陛下流教化者邪師古曰惻隱皆痛也稱賓客為姦利而已師古曰務稱賓客所求也稱尺證翻以拱默尸祿為智拱默拱手而默然不言也師古曰尸主也不憂其職但主食祿而已陛下擢臣巖穴誠冀有益豪毛豈徒使臣美食大官重高門之地哉晉灼曰高門殿名也師古曰在未央宮中余謂宣蓋言徒知養賢為朝廷之重而不計其有益於時與否天下乃皇天之天下也陛下上為皇天子下為黎庶父母為天牧養元元為天之為于偽翻視之當如一合尸鳩之詩師古曰尸鳩曹國風之篇也其詩曰尸鳩在桑其子七兮淑人君子其儀一兮言尸鳩養其子七平均如一善人君子布德施惠亦當然也毛氏曰尸鳩秸鞠也尸鳩之養其子朝從上下暮從下上平均如一秸音居八翻又音吉衣又穿空師古曰厭飽足也空孔也穿空言破敝也誠可為酸鼻陛下不救安將安所歸命乎奈何獨養外親與幸臣董賢多賞賜以大萬數使奴從賓客漿酒藿肉劉德曰視酒如漿視肉如藿也師古曰藿豆葉也貧人茹之從才用翻皆用致富孟康曰黎民黔首黔黎皆黑也下民陰類故以黑為號漢名奴為蒼頭非純黑以別於良人也諸給事殿中者所居為廬蒼頭侍從因呼為廬兒臣瓚曰漢儀注官奴給書計從侍中已下為蒼頭青幘及汝昌侯傅商亡功而封古亡無字通下同乃天下之官爵也陛下取非其官官非其人師古曰此官不當加於此人此人不當受此官也豈不難哉說讀曰悅方陽侯孫寵宜陵侯息夫躬辯足以移衆強可用獨立姦人之雄惑世尤劇者也宜以時罷退及外親幼童未通經術者皆宜令休就師傅急徵故大司馬傅喜使領外親故大司空何武師丹故丞相孔光故左將軍彭宣經皆更博士言經學有師法也更工衡翻位皆歷三公龔勝為司直郡國皆慎選舉司直掌佐丞相舉不法勝守正不阿郡國懼為所舉奏故皆慎於選舉陛下前以小不忍退武等師古曰少有不快於心不能忍也陛下尚能容亡功德者甚衆曾不能忍武等邪治天下者當用天下之心為心治直之翻不得自專快意而已也宣語雖刻切上以宣名儒優容之四年匈奴單于上書願朝五年朝直遙翻下同時帝被疾被皮義翻或言匈奴從上游來厭人服虔曰游猶流也河水從西北來故曰上游也師古曰上游亦總謂地形耳不必係於河水也厭音一涉翻厭勝也自黃龍竟寧時單于朝中國輒有大故師古曰大故謂國之大喪以問公卿亦以為虛費府帑師古曰府物所聚也帑藏金帛之所也帑音他莽翻又音奴單于使辭去未發已辭而未行也使疏吏翻臣聞六經之治貴於未亂兵家之勝貴於未戰書周官曰制治于未亂兵法曰戰不必勝不苟接刃師古曰已亂而後治之戰鬬而後獲勝則不足貴治直吏翻師古曰微謂精妙也不可不察也今單于上書求朝國家不許而辭之臣愚以為漢與匈奴從此隙矣言嫌隙從此而開也三王所不能制其不可使隙明甚臣不敢遠稱請引秦以來明之以秦始皇之強蒙恬之威然不敢窺西河乃築長城以界之蒙恬斥逐匈奴以北河為竟漢朔方郡地是也若西河則漢武威張掖敦煌酒泉地是也秦不能取築長城起臨洮以界之以高祖之威靈三十萬衆困於平城事見十一卷高帝七年鄧展曰石大也師古曰石言堅固如石也畫計策也音獲世莫得而言也師古曰卒終也莫得而言謂自免之計其事醜惡故不傳卒子恤翻匈奴悖慢大臣權書遺之然後得解事見十二卷惠帝三年杜佑曰以權道為書順辭以答遺于季翻匈奴侵暴北邊候騎至雍甘泉京師大駭發三將軍屯棘門細柳霸上以備之數月乃罷事見十五卷文帝後六年雍於用翻設馬邑之權欲誘匈奴徒費財勞師一虜不可得見況單于之面乎事見十七卷武帝元光二年言欲見匈奴一人且不可得況使單于面來獻見乎規恢萬載之策載子亥翻乃大興師數十萬使衞青霍去病操兵前後十餘年於是浮西河絕大幕破窴顏襲王庭窮極其地追奔逐北封狼居胥山禪於姑衍以臨瀚海虜名王貴人以百數自是之後匈奴震怖益求和親然而未肯稱臣也事並見武帝紀操千高翻窴音填怖普布翻且夫前世豈樂傾無量之費役無罪之人快心狼望之北哉師古曰狼望匈奴中地名余謂邊人謂舉燧為狼煙狼望謂狼煙候望之地樂音洛不暫費者不永寧是以忍百萬之師以摧餓虎之喙師古曰喙口也摧百萬之師於獸口也喙許穢翻余謂順文而為說其義自通唐諱虎故師古改曰獸師古曰盧山匈奴中山也余按衞青薨起冢象盧山青唯絕幕至窴顏山耳或者窴顏山即盧山歟孟康曰盧山單于南庭也匈奴有桀心師古曰桀堅也言其起立不順侵公主乃發五將之師十五萬騎以擊之時鮮有所獲徒奮揚威武明漢兵若雷風耳雖空行空反尚誅兩將軍事見二十四卷宣帝本始三年鮮息踐翻兵若雷風言師速而疾風驅霆行一過而不留也中國未得高枕安寢也枕職任翻逮至元康神爵之間大化神明鴻恩溥洽而匈奴內亂五單于爭立日逐呼韓邪攜國歸死扶伏稱臣事並見宣帝紀歸死者歸死命於漢也扶伏猶言匍匐也師古曰伏音蒲北翻計不顓制師古曰顓與專同專制謂以為臣妾也欲朝者不距朝直遙翻不欲者不強師古曰強音其兩翻何者外國天性忿鷙形容魁健負力怙氣難化以善易肄以惡師古曰鷙音竹二翻鷙狠也魁大也負恃也余謂肄習也言易習於為惡也其強難詘詘與屈同故未服之時勞師遠攻傾國殫貨伏尸流血破堅拔敵如彼之難也既服之後慰薦撫循交接賂遺威儀俯仰如此之備也往時嘗屠大宛之城事見二十一卷武帝太初三年宛於元翻事見二十三卷昭帝元鳳三年事見二十三卷昭帝始元四年探吐南翻劉德曰蕩姐羌屬師古曰藉猶蹈也姐音紫余據元帝永光三年隴西羌姐反豈是邪事見二十一卷武帝元封三年師古曰艾讀曰刈刈絕也朝音潮見二十卷武帝元鼎六年遠不離二時之勞師古曰離歷也三月為一時師古曰犂耕也郡縣而置之雲徹席卷後無餘災如雲之徹如席之卷天清地淨無纖毫之塵翳也真中國之堅敵也三垂比之懸矣師古曰懸絕也師古曰茲益也余謂茲此也茲甚此為甚也易以豉翻今單于歸義懷款誠之心欲離其庭陳見于前離力智翻此乃上世之遺策神靈之所想望國家雖費不得已者也柰何距以來厭之辭謂或言從上游來厭人也止其來朝辭以他日而無一定之期則匈奴與漢疏開將來之隙夫疑而隙之使有恨心負前言緣往辭歸怨於漢師古曰言單于因緣往昔和好之辭以怨漢也余謂負恃也負前言者恃前者有和好之言也終無北面之心威之不可諭之不能焉得不為大憂乎焉於虔翻夫明者視於無形聰者聽於無聲誠先於未然先悉薦翻即兵革不用而憂患不生不然壹有隙之後雖智者勞心於內辯者轂擊於外師古曰轂擊言使車交馳其轂相擊也轂戶谷翻且往者圖西域制車師置城郭都護三十六國事並見武帝宣帝紀章乙十一行本豈上有費歲以大萬計者七字孔本同張校同退齋校同為康居烏孫能踰白龍堆而寇西邊哉為于偽翻下同乃以制匈奴也夫百年勞之一日失之費十而愛一謂向者不憚十分之費以制匈奴今來朝之費十分之一耳乃愛惜之為于偽翻唯陛下少留意於未亂未戰少詩沼翻以遏邊萌之禍萌與氓同謂邊民也天子寤焉召還匈奴使者更報單于書而許之更工衡翻改也賜雄帛五十匹黃金十斤單于未發會病復遣使願朝明年復扶又翻上許之四年董賢貴幸日盛丁傅害其寵孔鄉侯晏與息夫躬謀欲求居位輔政會單于以病未朝躬因是而上奏上時掌翻以為單于當以十一月入塞後以病為解師古曰自解說云病烏孫兩昆彌弱卑爰疐強盛東結單于遣子往侍事見上建平二年疐竹二翻烏孫幷則匈奴盛而西域危矣可令降胡詐為卑爰疐使者來上書欲因天子威告單于歸臣侍子因下其章降戶江翻下遐稼翻令匈奴客聞焉則是所謂上兵伐謀匈奴客謂匈奴使者也服虔曰謀者舉兵伐解之也師古曰此說非也言知敵有謀者則以事而應之沮其所為不用兵革所以為貴耳上兵伐謀其次伐交孫武子之言者也師古曰知敵有外交連結相援者則間而誤之令其解散也書奏上引見躬見賢遍翻下屢見之見同召公卿將軍大議左將軍公孫祿以為中國常以威信懷伏夷狄躬欲逆詐逆詐者敵之詐謀未見欲迎測其情也不可許且匈奴賴先帝之德保塞稱藩今單于以疾病不任奉朝賀遣使自陳不失臣子之禮任音壬臣祿自保沒身不見匈奴為邊竟憂也竟讀曰境躬掎祿曰師古曰掎從後引之也謂引躡其言也音居綺翻臣為國家計為于偽翻冀先謀將然師古曰謂彼欲有其事則為謀策以壞之師古曰圖謀也未有形兆而圖之而祿欲以其犬馬齒保目所見臣與祿異議未可同日語也上曰善乃罷㣥臣獨與躬議躬因建言災異屢見恐必有非常之變可遣大將軍行邊兵敕武備師古曰行音下孟翻敕整也斬一郡守以立威震四夷守手又翻因以厭應變異師古曰厭音一涉翻上然之以問丞相嘉對曰臣聞動民以行不以言行下孟翻應天以實不以文下民微細猶不可詐況於上天神明而可欺哉天之見異師古曰見謂顯示也欲令覺悟反正推誠行善民心說而天意得矣說讀曰悅辯士見一端或妄以意傅著星曆師古曰傅讀曰附著音治略翻虛造匈奴章乙十一行本奴下有烏孫二字孔本同西羌之難難乃旦翻謀動干戈設為權變非應天之道也守相有罪相息亮翻車馳詣闕交臂就死恐懼如此而談說者欲動安之危師古曰之往也言搖動安全之計往就危殆也其實未可從夫議政者苦其讇諛傾險辯惠深刻也讇古諂字以敗其師其悔過自責疾詿誤之臣思黃髮之言名垂於後世秦穆公欲襲鄭蹇叔百里奚諫不聽遂出師晉襄公要而敗諸殽還歸作秦誓以悔過其辭曰惟古之謀人則曰未就予忌惟今之謀人姑將以為親雖則云然尚猷詢茲黃髮則罔所愆又曰惟截截善諞言俾君子易辭我皇多有之昧昧我思之敗補邁翻詿戶卦翻反覆參考無以先入之語為主師古曰謂躬為此計先入於帝耳為董賢沮躬策躬遂得罪張本容肇祖標點顧頡剛聶崇岐覆校
