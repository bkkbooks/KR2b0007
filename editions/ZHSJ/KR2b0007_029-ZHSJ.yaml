body:
  text: 資治通鑑卷第二十九翰林學士朝散大夫右諫議大夫知制誥兼侍講同提舉萬壽觀公事兼判集賢院上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣奉敕編集後學天台音註漢紀二十一永光三年孝元皇帝下永光三年庚辰前四一永光三年春二月馮奉世還京師更為左將軍賜爵關內侯永光三年三月立皇子康為濟陽王濟子禮翻永光三年夏四月平章乙十一行本平上有癸未二字孔本同張校同退齋校同傳校同昌考侯王接薨諡法大慮行方曰考七月壬戌以平恩侯許嘉為大司馬車騎將軍永光三年冬十一月己丑地震雨水永光三年復鹽鐵官置博士弟子員千人罷鹽鐵官博士弟子毋置員事見上卷初元五年民多復除復方目翻無以給中外繇役故也繇古傜字通四年四年春二月赦天下四年三月上行幸雍祠五畤雍於用翻畤音止四年夏六月甲戌考宣園東闕災四年戊寅晦日有食之上於是召諸前言日變在周堪張猛者責問皆稽首謝譖堪猛事見上卷元年稽音啟章乙十一行本無猛字傳校同之美徵詣行在所拜為光祿大夫秩中二千石領尚書事猛復為太中大夫給事中中書令石顯管尚書師古曰言管主其事按帝紀及百官表成帝建始四年初置尚書員五人此蓋言顯與牢梁五鹿充宗伊嘉陳順五人皆典領尚書事雖未置定員實亦五人也見賢遍翻常因顯白事事決顯口會堪疾瘖不能言而卒師古曰瘖音於今翻顯誣譖猛令自殺於公車四年初貢禹奏言孝惠孝景廟皆親盡宜毀按貢禹傳定漢宗廟迭毀之禮未及施行而卒其後韋玄成等毀廟之議又不純用禹說觀其奏言天子七廟孝惠孝景親盡宜毀蓋以悼考廟足為七廟也宜正定惠帝尊高帝廟為太祖廟景帝尊文帝廟為太宗廟行所嘗幸郡國各立太祖太宗廟宣帝復尊武帝為世宗廟行所巡狩亦立焉凡祖宗廟在郡國者六十八合百六十七所春秋之義王不祭於下土諸侯故以為不應古禮秋七月戊子罷昭靈后武哀王昭哀后衞思后戾太子戾后園皆不奉祠裁置吏卒守焉師古曰昭靈后高祖母也武哀王高祖兄也昭哀后高祖姊也衞思后戾太子母也戾后即史良娣也十月乙丑罷祖宗廟在郡國者四年諸陵分屬三輔師古曰先是諸陵總屬太常今各依其地界屬三輔服虔曰元帝所置陵也未有名故曰初五年五年春正月上行幸甘泉郊泰畤畤音止三月幸河東祠后土五年秋潁川水流殺人民五年冬上幸長楊射熊館師古曰長楊宮名也在盩厔縣其中有射熊館五年十二月乙酉毀太上皇孝惠皇帝寢廟園用韋玄成等之議也玄成等奏曰祖宗之廟世世不毀繼祖以下五廟而迭毀今高皇帝為太祖孝文皇帝為太宗孝景皇帝為昭孝武皇帝為穆孝昭皇帝與孝宣皇帝俱為昭皇考廟親未盡太上皇孝惠廟皆親盡宜毀五年上好儒術文辭頗改宣帝之政言事者多進見好呼到翻見賢遍翻人人以章乙十一行本以上有自字孔本同為得上意又傅昭儀及子濟陽王康愛幸外戚傳曰元帝加昭儀之號位視丞相爵比諸侯王師古曰昭顯其儀示隆重也濟子禮翻昭儀位次皇后今寵逾之疏所據翻條陳也臣聞治亂安危之機在乎審所用心蓋受命之王章乙十一行本王作主傳校同務在創業垂統傳之無窮繼體之君心存於承宣先王之德而褒大其功昔者成王之嗣位思述文武之道以養其心休烈盛美章乙十一行本美下有皆字孔本同張校同傳校同歸之二后而不敢專其名師古曰休亦美也烈業也后君也二君文王武王也鬼神祐焉陛下聖德天覆子愛海內覆敷又翻然而陰陽未和姦邪未禁者殆議者未丕揚先帝之盛功師古曰丕大也務變更之所更或不可行而復復之更工衡翻下同上復扶又翻又也下復扶目翻反也是以㣥下更相是非吏民無所信臣竊恨國家釋樂成之業而虛為此紛紛也師古曰釋廢也樂成謂已成之業人情所樂也樂音洛留神於遵制揚功遵先帝之法制揚先帝之功烈也詩大雅曰無念爾祖聿脩厥德師古曰大雅文王之詩也無念念也聿述也傳曰審好惡理情性而王道畢矣衡守詩學此必詩傳之言傳直戀翻好呼到翻惡烏路翻必審己之所有餘而強其所不足治直之翻師古曰強勉也音其兩翻蓋聰明疏通者戒於太察寡聞少見者戒於壅蔽少詩沼翻勇猛剛強者戒於太暴仁愛溫良者戒於無斷斷丁亂翻湛靜安舒者戒於後時廣心浩大者戒於遺忘師古曰湛讀曰沈忘巫放翻必審己之所當戒而齊之以義然後中和之化應而巧偽之徒不敢比周而望進比毗至翻唯陛下戒之所以崇聖德也臣又聞室家之道脩則天下之理得故詩始國風禮本冠婚始乎國風原情性以明人倫也本乎冠婚正基兆以防未然也師古曰關睢美后之德而為國風之首禮記冠義曰冠者禮之始也婚義曰婚者禮之本也冠古玩翻下同別適長之位師古曰適讀曰嫡下同長知兩翻禮之於內也卑不踰尊新不先故先悉薦翻所以統人情而理陰氣也其尊適而卑庶也適子冠乎阼禮之用醴師古曰阼主階也醴甘酒也貴於衆酒適讀曰嫡所以貴正體而明嫌疑也非虛加其禮文而已乃中心與之殊異故禮探其情而見之外也探吐南翻聖人動靜游燕所親物得其序師古曰言凡物大小高卑皆有次序百姓從化如當親者疏疏讀曰疎當尊者卑師古曰如若也以亂國家故聖人慎防其端禁於未然不以私恩害公義傳曰正家而天下定矣師古曰易家人卦之彖辭五年初武帝既塞宣房事見二十一卷武帝元封二年塞翻則翻下同分為屯氏河館陶縣屬魏郡河水自此別出為屯氏河東北至勃海章武縣入海過魏郡清河信都勃海四郡行千五百里師古曰屯音大門翻而隋氏分析州縣誤以為毛氏河乃置毛州失之甚矣復扶又翻廣深與大河等故因其自然不隄塞也是歲河決於清河靈鳴犢口而屯氏河絕據溝洫志靈鳴犢口在清河東界師古曰清河之靈縣鳴犢河口也按唐博州高唐縣漢靈縣地鳴犢河在縣西宋白曰魏州夏津縣本漢靈縣地漢初為鄃縣故城在今德州西南五十里天寶元年改為夏津縣建昭元年癸未前三八五年春正月戊辰隕石于梁據五行志隕石于梁國五年三月上行幸雍祠五畤雍於用翻畤音止五年冬河間王元坐賊殺不辜廢遷房陵元河間獻王德之來孫也五年罷孝文太后寢祠園孝文太后薄氏葬霸陵之南五年上幸虎圈鬬獸圈求阮翻下同後宮皆坐熊逸出圈攀檻欲上殿上時掌翻左右貴人傅倢伃等皆驚走傅倢伃即傅昭儀蓋後進號也倢伃音接予當熊而立左右格殺熊上問人情驚懼何故前當熊倢伃對曰猛獸得人而止妾恐熊至御坐坐徂臥翻故以身當之帝嗟嘆倍敬重焉傅倢伃慚由是與馮倢伃有隙為後傅太后誣殺中山馮太后張本左將軍奉世之女也二年二年春正月上行幸甘泉郊泰畤三月行幸河東祠后土二年夏四月赦天下二年六月立皇子興為信都王考異曰荀紀興作譽今從漢書二年東郡京房學易於梁人焦延壽風俗通云鄭武公子段封於京其後氏焉姓譜云周武王封神農之後於焦後以國為氏又左傳云虞虢焦滑皆姬姓也董正工曰京房本姓李吹律自定為京氏洪氏隸釋云漢中黃門譙敏碑云其先故國師譙贛傳道與京君房此碑以焦贛為譙左傳楚師伐陳取焦夷註謂焦今譙縣若是則焦譙可以通用得我道以亡身者京生也其說長於災變分六十卦更直日用事以風雨寒溫為候梁國名孟康曰分卦直日之法一爻各主一日六十卦為三百六十日餘四卦震離兌坎為方伯監司之官所以用震離兌坎者是二至二分用事之日又是四時各專王之氣各卦主時其占法各以其日觀其善惡也更工衡翻房用之尤精以孝廉為郎上疏屢言災異有驗天子說之數召見問說讀曰悅數所角翻房對曰古帝王以功舉賢則萬化成瑞應著師古曰萬化萬機之事施教化者也一曰萬物之類也譽音余故功業廢而致災異宜令百官各試其功災異可息詔使房作其事房奏考功課吏法晉灼曰令丞尉治一縣崇教化亡犯法者輒遷有盜賊滿三日不覺者則尉事也令覺之自除丞尉負其罪率相準如此法皆以房言煩碎令上下相司不可許上意鄉之師古曰鄉讀曰嚮時部刺史奏事京師上召見諸刺史令房曉以課事刺史復以為不可行武帝置十三州刺史各部一州故曰部刺史復扶又翻後善之是時中書令石顯顓權顯友人五鹿充宗為尚書令二人用事房嘗宴見師古曰以閒宴時而入見天子見賢遍翻幽厲之君何以危所任者何人也上曰君不明而所任者巧佞房曰知其巧佞而用之邪將以為賢也上曰賢之房曰然則今何以知其不賢也上曰以其時亂而君危知之房曰若是任賢必治任不肖必亂必然之道也治直吏翻下同幽厲何不覺悟而更求賢曷為卒任不肖以至於是師古曰卒終也音子恤翻上曰臨亂之君各賢其臣令皆覺寤天下安得危亡之君房曰齊桓公秦二世亦嘗聞此君而非笑之然則任豎刁趙高政治日亂盜賊滿山豎刁註見十八卷武帝元光五年趙高事見秦紀以龜卜所以驗吉凶以幽厲卜所以驗治亂唯有道者能以往知來耳房因免冠頓首曰春秋紀二百四十二年災異以示萬世之君今陛下即位以來日月失明星辰逆行山崩泉湧地震石隕夏霜冬靁春凋秋榮隕霜不殺水旱螟蟲民人饑疫盜賊不禁刑人滿市春秋所記災異盡備師古曰言今皆備有之靁古雷字春秋所記隱十一年桓十八年莊公三十二年閔公二年僖公三十三年文公十八年宣公十八年成公十八年襄公三十一年昭公三十二年定公十五年哀公十四年凡二百四十二年亂邪上曰亦極亂耳尚何道房曰今所任用者誰與道言也師古曰與讀曰歟考異曰故資政殿學士邵亢得兩浙錢王寫本漢書無亂邪二字有上曰亦極亂耳尚何道房曰今十二字今取之然幸其愈於彼又以為不在此人也師古曰愈猶勝也言今之災異及政道猶幸勝於往日又不由所任之人夫前世之君亦皆然矣臣恐後之視今猶今之視前也上良久乃曰今為亂者誰哉房曰明主宜自知之上曰不知也如知何故用之房曰上最所信任與圖事帷幄之中師古曰圖謀也房指謂石顯上亦知之謂房曰已諭師古曰言已曉此意後上亦不能退顯也臣光曰人君之德不明則臣下雖欲竭忠何自而入乎觀京房所以曉孝元可謂明白切至矣而終不能寤悲夫詩曰匪面命之言提其耳匪手攜之言示之事又曰誨爾諄諄聽我藐藐皆大雅抑詩之辭也鄭氏箋曰言我非但以手攜掣之親示以其事之是非我非但對面告語之親提撕其耳此言以教導之熟不可啟覺也藐藐然不入也我教告王口語諄諄然王聽聆之藐藐然諄之純翻又之閏翻藐美角翻爾雅云悶也二年上令房上弟子曉知考功課吏事者欲試用之房上中郎任良姚平願以為刺史試考功法臣得通籍殿中為奏事以防壅塞石顯五鹿充宗皆疾房欲遠之上時掌翻為于偽翻塞悉則翻遠于頤翻師古曰欲出之令遠去建言宜試以房為郡守師古曰立議云然也得以考功法治郡治直之翻房自請歲竟乘傳奏事歲竟歲終也傳知戀翻下同房自知數以論議為大臣所非數所角翻與石顯等有隙不欲遠離左右離力智翻乃上封事曰臣出之後恐為用事所蔽身死而功不成故願歲盡乘傳奏事蒙哀見許言蒙帝哀憐而許之辛巳蒙氣復乘卦太陽侵色張晏曰晉卦解卦也太陽侵色謂大壯也原父曰蒙氣起而太陽侵色則太陽指日也大壯解卦可云太陽而非所侵色也京房易傳曰蒙如塵雲臣私祿及親茲謂罔辟厥異蒙大臣厭小臣茲謂蔽蒙微日不明若解不解晉書天文志曰凡連陰十日晝不見日夜不見月亂風四起欲雨而無雨名曰蒙復扶又翻下同據孟康註房以消息卦為辟辟君也息卦曰太陰消卦曰太陽其餘卦曰少陰少陽謂臣下也上大夫覆陽蓋以是候之師古曰覆掩蔽也音敷救翻己卯庚辰必有欲隔絕臣令不得乘傳奏事者以辛巳蒙氣占己卯庚辰二日也房未發上令陽平侯王鳳承制詔房止無乘傳奏事鳳陽平侯王禁之子秋房去至新豐因郵上封事師古曰郵行書者也若今傳送文書矣郵音尤臣前以六月中言遯卦不效法曰道人始去寒涌水為災法者房占候之法著之於書者也師古曰道人有道術之人也天氣寒又有水涌出也涌水出臣弟子姚平謂臣曰房可謂知道未可謂信道也房言災異未嘗不中中竹仲翻涌水已出道人當逐死尚復何言臣曰陛下至仁於臣尤厚雖言而死臣猶言也師古曰自云不避死也未可謂大忠也小忠謂以諫殺身而無益於國大忠謂諫行言聽而身與國同休也有正先者非刺高而死孟康曰姓正名先秦博士也姓譜正姓宋上卿正考父之後故秦之亂正先趣之師古曰趣讀曰促今臣得出守郡自詭效功恐未效而死惟陛下毋使臣塞涌水之異師古曰塞當也為姚平所笑房至陝陝縣屬弘農郡周召二伯東西分治以陝為界即此地也陝音式冉翻臣前白願出任良試考功臣得居內議者知如此於身不利臣不可蔽故云使弟子不若試師臣為刺史又當奏事故復云為刺史恐太守不與同心不若以為太守此其所以隔絕臣也陛下不違其言而遂聽之此乃蒙氣所以不解太陽無色者也臣去稍遠太陽侵色益甚願陛下毋難還臣而易逆天意師古曰易輕也音弋豉翻邪說雖安于人天氣必變言人君雖安其邪說而不之覺天氣必為之變而失其常天不可欺也願陛下察焉房去月餘竟徵下獄初淮陽憲王舅張博傾巧無行淮陽憲王欽宣帝張倢伃之子帝弟也下遐稼翻行下孟翻欲為王求入朝博從京房學以女妻房房每朝見退輒為博道其語師古曰所與天子言者皆具說之為于偽翻妻七細翻令房為王作求朝奏草師古曰草謂為文之藳草也論語孔子曰為命裨諶草創之以為信驗淮陽國在關東告房與張博通謀非謗政治歸惡天子詿誤諸侯王治直吏翻詿古賣翻皆下獄棄市考異曰元紀及荀紀京房死皆在此年末按房傳二月末上封事去月餘徵下獄百官表八月癸亥匡衡為御史大夫房死必不在歲末也紀不知月日故繫之歲末耳鄭弘坐與房善免為庶人免御史大夫也二年御史中丞陳咸數毀石顯數所角翻下同久之坐與槐里令朱雲善漏泄省中語時丞相韋玄成言雲暴虐無狀陳咸在前聞之以語雲雲上書自訟顯以此奏咸漏泄省中語高帝三年改廢丘為槐里屬右扶風與雲皆下獄髡為城旦石顯威權日盛公卿以下畏顯重足一迹師古曰言極恐懼不敢自寬縱也重直龍翻重足累足也累足而立故一迹姓譜牢姓孔子弟子琴牢之後民歌之曰牢邪石邪五鹿客邪印何纍纍綬若若邪師古曰纍纍重積也若若長貌纍音力追翻顯內自知亶權事柄在掌握恐天子一旦納用左右耳目以間己間音工莧翻乃時歸誠取一信以為驗顯嘗使至諸官有所徵發使疏吏翻將命曰使諸官諸官府也顯先自白恐後漏盡宮門閉請使詔吏開門上許之顯故投夜還稱詔開門入後果有上書告顯顓命矯詔開宮門天子聞之笑以其書示顯顯因泣曰陛下過私小臣屬任以事師古曰過猶誤也屬委也屬音之欲翻欲陷害臣者事類如此非一唯獨明主知之愚臣微賤誠不能以一軀稱快萬衆稱音尺孕翻任天下之怨師古曰任猶當也任音壬受後宮掃除之役死無所恨唯陛下哀憐財幸師古曰財與裁同天子以為然而憐之數勞勉顯加厚賞賜數所角翻勞力到翻賞賜及賂遺訾一萬萬遺于季翻師古曰賂遺謂百官㣥下所遺也訾讀與貲同初顯聞衆人匈匈言己殺前將軍蕭望之事見上卷初元二年師古曰訕謗也音所諫翻以諫大夫貢禹明經著節乃使人致意深自結納因薦禹天子歷位九卿禮事之甚備議者於是或稱顯以為不妬譖望之矣薦貢禹事當在顯譖殺京房陷陳咸之前故以初字發語取信人主者皆此類也荀悅曰夫佞臣之惑君主也甚矣故孔子曰遠佞人論語孔子告顏淵之言遠于頤翻下同乃遠而絕之隔塞其源塞悉則翻戒之極也孔子曰政者正也論語孔子答季康子之言正己而已矣平直真實者正之主也故德必核其真然後授其位能必核其真然後授其事功必核其真然後授其賞罪必核其真然後授其刑行必核其真然後貴之言必核其真然後信之物必核其真然後用之事必核其真然後脩之核與覈同謂精確得其實也行下孟翻萬事實於下先王之道如斯而已矣二年八月癸亥以光祿勳匡衡為御史大夫鄭弘坐京房免以衡代之二年閏月丁酉太皇太后上官氏崩此昭帝上官后也二年冬十一月齊楚地震此指齊楚古國之大界樹折屋壞雨于具翻折而設翻三年三年夏六月甲辰扶陽共侯韋玄成薨共音恭三年秋七月匡衡為丞相戊辰衞尉李延壽為御史大夫三年冬使西域都護騎都尉北地甘延壽副校尉山陽陳湯師古曰言延壽及湯本充西域之使故先言使而後序其官職及姓名使疏吏翻章乙十一行本斬下有匈奴二字孔本同郅支單于於康居始郅支單于自以大國威名尊重又乘勝驕郅支嘗破殺閏振攻破呼韓邪又殺伊利目屢破烏孫兵故乘勝氣而驕也怒殺康居王女康居王以女妻郅支事見上卷初元五年或支解投都賴水中師古曰支解謂截其四支都賴郅支水名余謂都賴水在康居國郅支城旁日作五百人二歲乃已又遣使責闔蘇大宛諸國歲遺師古曰胡廣云康居北可一千里有國名奄蔡一名闔蘇然則闔蘇即奄蔡也歲遺者年常所獻之物遺弋季翻予讀曰與漢遣使三輩至康居求谷吉等死殺谷吉見上卷初元五年師古曰死尸也不肯奉詔而因都護上書言居困戹願歸計強漢遣子入侍師古曰故為此言以調戲也歸計謂歸附而受計策也湯為人沈勇有大慮沈持林翻多策略喜奇功師古曰喜音許吏翻與延壽謀曰夷狄畏服大種其天性也種章勇翻西域本屬匈奴武帝雖通西域匈奴猶役屬之至宣帝時朝呼韓邪降日逐西域乃咸屬漢聞音問侵陵烏孫大宛宛於元翻常為康居畫計欲降服之為于偽翻降戶江翻如得此二國數年之間城郭諸國危矣且其人剽悍師古曰剽輕也悍勇也剽平妙翻又匹妙翻悍胡幹翻又下罕翻數取勝久畜之必為西域患好呼到翻數所角翻畜許六翻雖所在絕遠蠻夷無金城強弩之守如發屯田吏士即屯田車師者師古曰驅率之令隨從也敺與驅同下同彼亡則無所之守則不足自保師古曰之往也保安也載子亥翻延壽以為然欲奏請之湯曰國家與公卿議此時已稱天子為國家非至東都始然也事必不從師古曰言凡庸之人不能遠見將壞其事也與讀曰豫即猶豫也會其久病湯獨矯制發城郭諸國兵車師戊己校尉屯田吏士戊己校尉屯田車師驚起欲止焉湯怒按劍叱延壽曰大衆已集會豎子欲沮衆邪師古曰沮止也壞也音材汝翻延壽遂從之部勒行陳行戶剛翻陳讀曰陣漢兵胡兵合四萬餘人延壽湯上疏自劾奏矯制劾戶概翻自劾自奏其矯制之罪也陳言兵狀即日引軍分行別為六校別彼列翻分也按湯傳益置陽威合騎白虎之校併副校尉戊校尉己校尉為六校校戶教翻其三校從南道踰葱領徑大宛其三校都護自將發溫宿國從北道入赤谷過烏孫溫宿國東至都護治所二千三百八十里北至烏孫赤谷六百一十里至闐池西而康居副王抱闐將數千騎寇赤谷城東文穎曰闐音填殺略大昆彌千餘人敺畜產甚多從後與漢軍相及頗寇盜後重師古曰重謂輜重也音直用翻湯縱胡兵擊之殺四百六十人得其所略民四百七十人還付大昆彌其馬牛羊以給軍食又捕得抱闐貴人伊奴毒入康居東界令軍不得為寇師古曰勿抄掠也師古曰間謂密呼也間古莧翻與飲盟遣去既與之飲又與之盟也未至單于城可六十里止營復捕得康居貴人具章乙十一行本具作貝下同退齋校同色子男開牟以為導復扶又翻具色子即屠墨母之弟師古曰母之弟即謂舅者由是具知郅支情明日引行未至城三十里止營單于遣使問漢兵何以來應曰單于上書言居困戹願歸計強漢身入朝見朝直遙翻見賢遍翻天子哀閔單于棄大國屈意康居故使都護將軍來迎單于妻子當此時甘延壽止為西域都護以將兵故稱將軍至光武時遂以賈復為都護將軍復之都護蓋護諸將也故未敢至城下使數往來相答報數所角翻下同延壽湯因讓之師古曰讓責也我為單于遠來為于偽翻而至今無名王大人見將軍受事者師古曰名王諸王之貴者受事受教命而供事也失客主之禮也師古曰忽忘也又輕也人畜罷極食度且盡師古曰罷讀曰疲度音大各翻恐無以自還願單于與大臣審計策明日前至郅支城都賴水上離城三里離力智翻止營傅陳師古曰傅讀曰敷布也陳讀曰陣下同望見單于城上立五采幡幟幟昌志翻數百人被甲乘城師古曰乘謂登之備守也被皮義翻下同步兵百餘人夾門魚鱗陳師古曰言其相接次形若魚鱗城上人更招漢軍曰鬬來師古曰更互也音工衡翻百餘騎馳赴營營皆張弩持滿指之騎引卻頗遣吏士射城門騎步兵射而亦翻下同騎步兵皆入延壽湯令軍聞鼓音皆薄城下薄伯各翻四面圍城各有所守穿塞門戶即塹字音尺艷翻塞悉則翻鹵楯為前戟弩為後楯食尹翻仰射城樓上人樓上人下走土城外有重木城重直龍翻從木城中射頗殺傷外人外人發薪燒木城孔穎達曰薪樵也大樵曰薪詩云析薪如之何匪斧不克是大故用斧也數百騎欲出外迎射殺之初單于聞漢兵至欲去疑康居怨己為漢內應又聞烏孫諸國兵皆發自以無所之言郅支自計無所往而可也復還復扶又翻曰不如堅守漢兵遠來不能久攻單于乃被甲在樓上被皮義翻諸閼氏夫人數十皆以弓射外人外人射中單于鼻中竹仲翻諸夫人頗死單于乃下夜過半木城穿中人卻入土城乘城呼中人木城中人也師古曰呼音火故翻下同分為十餘處四面環城亦與相應和師古曰環繞也音宦和胡臥翻夜數奔營不利輒卻平明四面火起吏士喜大呼乘之師古曰乘逐也余謂乘駕也乘火起之勢而駕之也鉦音征鐃也其狀似鈴杜佑曰鐲鉦也形如小鍾軍行鳴之以為鼓節周禮以金鐲節鼓近代有大銅疊懸而擊之以節鼓曰鉦康居兵引卻漢兵四面推鹵楯推吐雷翻並入土城中單于男女百餘人走入大內師古曰大內單于之內室也吏士爭入單于被創死被皮義翻創初良翻軍候假丞杜勳斬單于首漢制軍行有各部校尉部下有曲曲有軍候一人又都護有副校尉秩比二千石丞一人司馬候千人各二人杜勳本為軍候而假丞也諸鹵獲以畀得者師古曰畀與也各以與所得人音必寐翻凡斬閼氏太子名王以下千五百一十八級閼於焉翻氏音支生虜百四十五人降虜千餘人賦予城郭諸國所發十五王降戶江翻師古曰賦謂班與之也所發十五王謂所發諸國之王領兵共圍郅支單于者也予讀曰與四年四年春正月郅支首至京師延壽湯上疏曰臣聞天下之大義當混為一師古曰混同也音胡本翻余謂混為一者合四海之內同稟命於一人天下之治出於一也昔有唐虞今有強漢匈奴呼韓邪單于已稱北藩唯郅支單于叛逆未伏其辜大夏之西以為強漢不能臣也大夏西域國名在大宛西南師古曰謂漢為不能使郅支臣服也大惡通於天臣延壽臣湯將義兵行天誅賴陛下神靈陰陽並應天氣精明陷陳克敵陳讀曰陣斬郅支首及名王以下宜縣頭槀街蠻夷邸間晉灼曰槀街黃圖在長安城門內師古曰槀街街名蠻夷邸在此街也邸若今客館也又曰蠻夷邸若今鴻臚館崔浩以為槀當為橐橐街即銅駝街也此說失之銅駝街在雒陽西京無也縣讀曰懸下同明犯強漢者雖遠必誅丞相匡衡等以為方春掩骼埋胔之時禮記月令孟春掩骼埋胔註云謂死氣逆生氣也應劭曰禽獸之骨曰骼骼大也鳥鼠之骨曰胔胔可惡也臣瓚曰枯骨曰骼有肉曰胔師古曰瓚說是也骼音工客翻胔音才賜翻詔縣十日乃埋之仍告祠郊廟赦天下㣥臣上壽置酒四年六月甲申中山哀王竟薨哀王者帝之少弟與太子游學相長大游謂宴游學謂講學師古曰同處長養以至於壯大少詩照翻長知兩翻太子前弔上望見太子感念哀王悲不能自止太子既至前不哀上大恨曰安有人不慈仁而可以奉宗廟為民父母者乎是時駙馬都尉侍中史丹護太子家護監護也師古曰謂者告語也臣誠見陛下哀痛中山王至以感損謂哀感而神氣為之耗損見賢遍翻下同臣竊戒屬毋涕泣感傷陛下師古曰屬音之欲翻罪乃在臣當死上以為然意乃解四年藍田地震山崩壅霸水安陵岸崩壅涇水涇水逆流藍田縣屬京兆水經霸水出藍田縣藍田谷過霸陵縣西北流注于渭孟康曰安陵岸惠帝陵旁涇水岸也五年五年春三月赦天下五年夏六月庚申復戾園五年壬申晦日有食之五年秋七月庚子復太上皇寢廟園原廟昭靈后武哀王昭哀后衞思后園時上寢疾久不平以為祖宗譴怒故盡復之唯郡國廟遂廢云永光四年罷園廟五年是歲徙濟陽王康為山陽王濟子禮翻五年匈奴呼韓邪單于聞郅支既誅且喜且懼喜者以郅支既誅而己無後患也懼者以漢威強懼復得罪而滅亡如郅支也願入朝見朝直遙翻竟寧元年戊子前三三應劭曰呼韓邪單于願保塞邊竟得以安寧故以冠元也師古曰據如應說竟讀為境古之用字境竟實同但詔云長無兵革之事竟者終極之言言永永安寧也既無兵革中外安寧豈止境上若依本字而讀義更弘通也五年春正月匈奴呼韓邪單于來朝自言願壻漢氏以自親師古曰言欲取漢女而身為漢家壻嬙音牆單于驩喜上書願保塞上谷以西至敦煌師古曰保守也自請保守之令無寇盜敦徒門翻請罷邊備塞吏卒以休天子人民天子下有司議下遐稼翻議者皆以為便郎中侯應習邊事以為不可許上問狀應曰周秦以來匈奴暴桀寇侵邊境漢興尤被其害被皮義翻下同臣聞北邊塞至遼東外有陰山東西千餘里草木茂盛多禽獸本冒頓單于依阻其中治作弓矢來出為寇是其苑囿也冒如字又莫北翻治直之翻至孝武世出師征伐斥奪此地攘之於幕北師古曰斥開也攘卻也音人羊翻起亭隧徼吉弔翻境也小路也循察也師古曰隧謂深開小道而行避敵抄寇也音遂築外城設屯戍以守之然後邊境用得少安幕北地平少草木多大沙所謂大磧也少詩沼翻下同少所蔽隱從塞以南徑深山谷往來差難邊長老言匈奴失陰山之後過之未嘗不哭也長知兩翻如罷備塞吏卒示夷狄之大利不可一也今聖德廣被天覆匈奴師古曰如天之覆也被皮義翻覆敷又翻稽首來臣夫夷狄之情困則卑順強則驕逆天性然也前已罷外城事見二十四卷宣帝地節二年章乙十一行本隧下有令字孔本同張校同纔足以候望通烽火而已古者安不忘危不可復罷二也復扶又翻中國有禮義之教刑罰之誅愚民猶尚犯禁又況單于能必其衆不犯約哉三也師古曰必極也極保之也毛晃曰必定辭也關梁設於水陸要會之處因山陿而設塞以譏陸行者為關或立石或架木或維舟絕水以譏舟行者為梁師古曰覬音冀設塞徼置屯戍非獨為匈奴而已亦為諸屬國降民本故匈奴之人恐其思舊逃亡四也為于偽翻近西羌保塞與漢人交通吏民貪利侵盜其畜產妻子以此怨恨起而背畔背蒲妹翻今罷乘塞則生嫚易分爭之漸五也師古曰乘塞登之而守也嫚易猶欺侮也易音弋豉翻子孫貧困一旦亡出從其親戚六也又邊人奴婢愁苦欲亡者多曰張曰作日聞匈奴中樂樂音洛無柰候望急何然時有亡出塞者七也盜賊桀黠㣥輩犯法如其窘急亡走北出則不可制八也黠下八翻起塞以來百有餘年自武帝起塞時至此時百有餘年或因山巖石木谿谷水門稍稍平之卒徒築治功費久遠不可勝計治直之翻下同勝音升臣恐議者不深慮其終始欲以壹切省繇戍師古曰壹切者權時之事非經常也猶如以刀切物荀取整齊不顧長短縱橫故言一切繇古傜字通百歲之內卒有他變障塞破壞亭隧滅絕當更發屯繕治累歲章乙十一行本歲作世孔本同之功不可卒復九也師古曰卒皆讀曰猝如罷戍卒省候望單于自以保塞守禦必深德漢師古曰於漢自稱恩德也小失其意則不可測開夷狄之隙虧中國之固十也非所以永持至安威制百蠻之長策也對奏天子有詔勿議罷邊塞事使車騎將軍嘉口諭單于師古曰將軍許嘉也諭謂曉告單于上書願罷北塞吏士屯戍子孫世世保塞單于鄉慕禮義鄉讀曰嚮所以為民計者甚厚此長久之策也朕甚嘉之中國四方皆有關梁障塞非獨以備塞外也亦以防中國姦邪放縱出為寇害故明法度以專衆心也專壹也師古曰言已曉知其意也為單于怪其不罷為于偽翻下同故使嘉曉單于毛晃曰曉開諭也愚不知大計天子幸使大臣告語甚厚語牛倨翻初左伊秩訾為呼韓邪畫計歸漢事見二十七卷宣帝甘露元年其後或讒伊秩訾自伐其功師古曰伐謂矜其功力余謂此言其矜畫計定匈奴之功耳非力也呼韓邪疑之伊秩訾懼誅將其衆千餘人降漢漢以為關內侯食邑三百戶令佩其王印綬師古曰雖於漢為關內侯而依匈奴王號與印綬與伊秩訾相見謝曰王為我計甚厚令匈奴至今安寧王之力也德豈可忘我失王意使王去不復顧留師古曰言不復顧念而留住匈奴中今欲白天子請王歸庭歸單于庭也單于賴天命自歸於漢得以安寧單于神靈天子之祐也我安得力既已降漢又復歸匈奴是兩心也願為單于侍使於漢不敢聽命師古曰言為單于充使留侍於漢不能還匈奴使疏吏翻不能得而歸單于號王昭君為寧胡閼氏師古曰言胡得之國以安寧也為右日逐王五年皇太子冠冠古玩翻五年二月御史大夫李延壽卒五年初石顯見馮奉世父子為公卿著名女又為昭儀在內馮昭儀即馮倢伃進號昭儀薦言昭儀兄謁者逡脩敕宜侍幄帷師古曰逡音千旬翻敕整也天子召見欲以為侍中見賢遍翻逡請間言事上聞逡言顯專權大怒罷逡歸郎官及御史大夫缺在位多舉逡兄大鴻臚野王臚陵如翻上使尚書選第中二千石選第者選其有行能者而第其高下之次也行下孟翻上以問顯顯曰九卿無出野王者然野王親昭儀兄臣恐後世必以陛下度越衆賢師古曰度過也上曰善吾不見是師古曰言不見此理吾用野王為三公後世必謂我私後宮親屬以野王為比師古曰比例也音必寐翻當音毗寐翻三月丙寅詔曰剛強堅固確然亡欲大鴻臚野王是也亡古無字通言心辨於是非而善於辭令辨別也少府五鹿充宗是也使疏吏翻廉潔節儉太子少傅張譚是也其以少傅為御史大夫以詔褒之次第不用五鹿充宗而用張譚何也帝亦知充宗為石顯之黨也五年河南太守九江召信臣為少府信臣先為南陽太守後遷河南治行常第一視民如子好為民興利躬勸耕稼開通溝瀆戶口增倍吏民親愛號曰召父師古曰召讀曰邵治直吏翻行下孟翻好呼到翻五年癸卯章乙十一行本卯作未孔本同張校同退齋校同傳校同復孝惠皇帝寢廟園孝文太后孝昭太后寢園永光五年毀惠園建昭元年罷孝文太后孝昭太后寢園孝昭太后孝武帝鉤弋趙倢伃也葬雲陽甘泉宮南五年初中書令石顯嘗欲以姊妻甘延壽妻七細翻延壽不取及破郅支還還從宣翻又如字丞相御史亦惡其矯制惡烏路翻皆不與延壽等師古曰與猶許也所鹵獲財物入塞多不法師古曰不法者私自取之不依軍法余謂不法者以外國財物闌入邊關也移書所過道上郡縣也按驗之湯上疏言臣與吏士共誅郅支單于幸得禽滅萬里振旅師古曰師入曰振旅勞來到翻今司隸反逆收繫按驗當勞來面收繫是於事理為反也逆迎也為于偽翻上立出吏士令縣道出章乙十一行本出作具傳校同酒食以過軍漢制縣有蠻夷曰道論功石顯匡衡以為延壽湯亶興師矯制幸得不誅如復加爵土復扶又翻則後奉使者爭欲乘危徼幸生事於蠻夷為國招難徼古堯翻又一遙翻難乃旦翻帝內嘉延壽湯功而重違衡顯之議師古曰重難也故宗正劉向上疏曰帝初即位劉向為宗正免官久矣故曰故宗正向本名更生至是改名郅支單于囚殺使者吏士以百數事暴揚外國傷威毀重㣥臣皆閔焉師古曰閔病也意未嘗有忘西域都護延壽副校尉湯承聖指倚神靈總百蠻之君攬城郭之兵意之所向為指師古曰攬總持之也入絕域遂蹈康居屠三重城郅支城木城再重井土城為三重重直龍翻師古曰搴拔也音騫歙許及翻斬郅支之首縣旌萬里之外縣讀曰懸揚威昆山之西昆山指言崑崙山也谷吉為郅支所殺見上卷初元五年昭明謂顯功也師古曰慴恐也音之涉翻莫不懼震呼韓邪單于見郅支已誅且喜且懼鄉風馳義鄉讀曰嚮師古曰馳義慕義驅馳而來也稽首來賓願守北藩累世稱臣立千載之功載子亥翻建萬世之安㣥臣之勳莫大焉昔周大夫方叔吉甫為宣王誅獫狁而百蠻從為于偽翻其詩曰嘽嘽焞焞如霆如雷顯允方叔征伐獫狁蠻荊來威師古曰小雅采芑之詩也嘽嘽衆也焞焞盛也言車徒既衆且盛故能克定獫狁而令荊土之蠻亦畏威而來也顯明也允信也獫音虛檢翻狁音庾準翻嘽音他丹翻焞音土回翻獲匪其醜師古曰離上九爻辭也嘉善也醜類也言王者出征克勝斬首多獲非類故以為善而諸不順者皆來從也今延壽湯所誅震雖易之折首詩之雷霆不能及也論大功者不錄小過舉大美者不疵細瑕司馬法曰軍賞不踰月欲民速得為善之利也蓋急武功重用人也吉甫之歸周厚賜之其詩曰吉甫燕喜既多受祉來歸自鎬我行永久師古曰小雅六月之詩也鎬地名非豐鎬之鎬此鎬及方皆在周之北時獫狁侵鎬及方至于涇陽吉甫薄伐自鎬而還王以宴禮樂之多受福賜以其行役有功日月長久故地吉甫尹吉甫也況萬里之外其勤至矣延壽湯既未獲受祉之報反屈捐命之功久挫於刀筆之前師古曰捐其軀命言無所願也挫屈折也刀筆吏也勸戎士也昔齊桓前有尊周之功後有滅項之罪君子以功覆過而為之諱師古曰尊周謂伐楚責苞茅及會王世子于首止項國名也春秋僖十七年夏滅項公羊傳曰齊滅之也不言齊為桓公諱也桓嘗有繼絕存亡之功故君子為之諱覆敷救翻為于偽翻捐五萬之師靡億萬之費經四年之勞而僅獲駿馬三十匹雖斬宛王母寡之首猶不足以復費其私罪惡甚多孝武以為萬里征伐不錄其過遂封拜兩侯三卿二千石百有餘人事見二十一卷武帝太初三年四年師古曰靡散也音縻僅少也復償也音扶目翻強於大宛郅支之號重於宛王殺使者罪甚於留馬而延壽湯不煩漢士不費斗糧比於貳師功德百之師古曰百倍勝之事見二十四卷宣帝本始三年事見二十六卷宣帝神爵二年故言威武勤勞則大於方叔吉甫列功覆過則優於齊桓貳師覆敷又翻近事之功則高於安遠長羅師古曰安遠侯鄭吉長羅侯常惠也小惡數布數所角翻臣竊痛之宜以時解縣通籍孟康曰縣罪未竟也如言縣罰也通籍者不禁止令得出入也縣讀曰懸尊寵爵位以勸有功於是天子下詔赦延壽湯罪勿治令公卿議封焉議者以為宜如軍法捕斬單于令匡衡石顯以為郅支本亡逃失國竊號絕域非真單于帝取安遠侯鄭吉故事封千戶衡顯復爭復扶又翻下同夏四月戊辰封延壽為義成侯地理志沛郡有義成侯國食邑各三百戶加賜黃金百斤拜延壽為長水校尉湯為射聲校尉於是杜欽上疏追訟馮奉世前破莎車功事見二十五卷宣帝元康元年不復錄欽故御史大夫延年子也荀悅論曰誠其功義足封追錄前事可也春秋之義毀泉臺則惡之舍中軍則善之春秋公羊傳文公十六年毀泉臺何以書譏何譏爾先祖為之己毀之不如勿居而已矣昭五年舍中軍舍中軍者何復古也穀梁之義略同惡烏路翻夫矯制之事先王之所慎也不得已而行之若矯大而功小者罪之可也矯小而功大者賞之可也功過相敵如斯而已可也權其輕重而為之制宜焉為于偽翻五年初太子少好經書少詩照翻好呼到翻下同寬博謹慎其後幸酒樂燕樂晉灼曰幸酒好酒也師古曰樂燕樂若論語稱孔子云損者三樂樂驕樂樂逸游樂燕樂損矣燕樂燕私之樂也上樂讀如本字又音五孝翻下樂音來各翻而山陽王康有才藝母傅昭儀又愛幸上以故常有意欲以山陽王為嗣上晚年多疾不親政事留好音樂孟康曰留意於音樂或置鼙鼓殿下天子自臨軒檻上隤銅丸以擿鼓師古曰鼙本騎上之鼓音步迷翻檻軒闌版也隤下也擿投也隤音頹擿音持益翻一曰擿磓也音丁力翻磓音丁回翻聲中嚴鼓之節李奇曰莊嚴之鼓節也晉灼曰疾擊之鼓也師古曰晉說是中竹仲翻而山陽王亦能之上數稱其材數所角翻下同史丹進曰凡所謂材者敏而好學溫故知新師古曰敏速疾也溫厚也溫故厚蓄故事也何晏曰溫尋也尋繹故者又知新者余謂何說是若乃器人於絲竹鼙鼓之間則是陳惠李微高於匡衡可相國也如淳曰器人取人器能也陳惠李微二人好音者也服虔曰二人皆黃門鼓吹也聞丹言而嘿然已而笑及上寢疾傅昭儀山陽王康常在左右而皇后太子希得進見見賢遍翻上疾稍侵意忽忽不平師古曰稍侵言漸篤也平和也事見十六卷景帝前六年長知兩翻下同與皇后太子皆憂不知所出師古曰不知計所出候上間獨寢時丹直入臥內頓首伏青蒲上服虔曰青緣蒲席也應劭曰以青規地曰青龍自非皇后不得至此孟康曰蒲青為席用蔽地也師古曰應說是也皇太子以適長立積十餘年師古曰適讀曰嫡名號繫於百姓天下莫不歸心臣子師古曰自託為臣子仲馮曰臣子當屬下句不當斷之余以下文大意觀之顏說為是今者道路流言為國生意為于偽翻以為太子有動搖之議審若此公卿以下必以死爭不奉詔臣願先賜死以示㣥臣天子素仁不忍見丹涕泣言又切至意大感寤喟然太息曰吾日困劣劣弱也章乙十一行本太上有而字孔本同子兩王幼少兩王山陽王康信都王興亦何不念乎然無有此議且皇后謹慎先帝又愛太子事見二十七卷宣帝甘露三年駙馬都尉安所受此語師古曰安焉也余謂安何也頓首曰愚臣妄聞罪當死師古曰卻退也離青蒲上謂丹曰吾病寖加恐不能自還納者納其言也師古曰寖漸也不自還者言當遂至崩亡也還讀曰旋毋違我意丹噓唏而起師古曰道讀曰導噓音虛唏音許既翻太子由是遂定為嗣而右將軍光祿大夫王商中書令石顯亦擁佑太子頗有力焉夏五月壬辰帝崩于未央宮臣瓚曰帝年二十七即位即位十六年壽四十三班彪贊曰臣外祖兄弟為元帝侍中應劭曰外祖金敞也元帝多材藝善史書應劭曰周宣王太史史籀所作大篆語牛倨翻吹洞簫如淳曰簫之無底者也杜佑曰前代有洞簫今無其器被歌聲應劭曰自隱度作新曲因持新曲以為歌詩聲也荀悅曰被聲能播樂也臣瓚曰度曲謂歌終更授其次謂之度曲西京賦曰度曲未終雲起雪飛張衡舞賦亦曰度終復位次受三八師古曰應荀二說皆是也度音大洛翻被音皮義翻窮極幼眇蘇林曰刌度也知曲之終始節度也韋昭曰刌切也謂能分切句絕為之節制也師古曰韋說是也刌音千本翻幼眇讀曰要妙少詩照翻好呼到翻及即位徵用儒生委之以政貢薛韋匡迭為宰相師古曰貢禹薛廣德韋玄成匡衡迭互而為丞相也優游不斷孝宣之業衰焉師古曰為文義所牽制故不斷決斷丁亂翻出於恭儉號令溫雅有古之風烈五年匡衡奏言前以上體不平故復諸所罷祠卒不蒙福師古曰卒終也卒子恤翻親未盡師古曰言不當毀也親盡宜毀及太上皇孝文孝昭太后昭靈后昭哀后武哀王祠請悉罷勿奉奏可五年六月己未太子即皇帝位謁高廟尊皇太后曰太皇太后宣帝卬成王皇后也以元舅侍中衞尉陽平侯王鳳為大司馬大將軍領尚書事王氏得權自此始五年秋七月丙戌葬孝元皇帝于渭陵臣瓚曰自崩及葬凡五十五日渭陵在長安北五十六里五年大赦天下五年丞相衡上疏曰陛下秉至孝哀傷思慕不絕於心未有游虞弋射之宴師古曰虞與娛同無窮已也師古曰慎終慎孝道之終也追遠不忘本也論語稱孔子曰慎終追遠民德歸厚矣故衡引之猶復加聖心焉師古曰言天性已自然矣又當加意也復扶又翻師古曰周頌閔予小子之詩焭焭憂貌也疚病也焭與煢同渠營翻意氣未能平也蓋所以就文武之業崇大化之本也臣又聞之師曰匹之際生民之始萬福之原婚姻之禮正然後品物遂而天命全師古曰遂成也此綱紀之首王教之端也自上世以來三代興廢未有不由此者也願陛下詳覽得失盛衰之效以定大基采有德戒聲色近嚴敬遠技能師古曰無德之人雖有技能則斥遠之近其靳翻遠于願翻技渠綺翻聖人所以統天地之心著善惡之歸明吉凶之分師古曰分音扶問翻通人道之正使不悖於其本性者也師古曰悖乖也音布內翻及論語孝經聖人言行之要宜究其意行下孟翻臣又聞聖王之自為動靜周旋奉天承親臨朝享臣物有節文以章人倫師古曰物事也事事皆有節文事天之容也溫恭敬遜承親之禮也正躬嚴恪臨衆之儀也師古曰嚴讀曰儼嘉惠和說饗下之顏也師古曰饗宴饗也說讀曰悅物遵其儀故形為仁義動為法則今正月初幸路寢路寢大寢也置酒以饗萬方傳曰君子慎始願陛下留神動靜之節使㣥下得望盛德休光以立基楨天下幸甚上敬納其言容肇祖標點顧頡剛聶崇岐覆校
