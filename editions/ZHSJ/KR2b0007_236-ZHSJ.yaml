body:
  text: 資治通鑑卷第二百三十六端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註唐紀五十二德宗神武聖文皇帝十一貞元十七年貞元十七年辛巳八一貞元十七年春正月甲寅韓全義至長安竇文場為掩其敗迹為于偽翻下同上禮遇甚厚全義稱足疾不任朝謁任音壬朝直遙翻考異曰舊全義傳云令中使就第賜宴自還至辭都不謁見而去議者以隳敗法制從古以還未如貞元之甚按實錄壬戌宴全義於麟德殿又云自還及歸不見不辭于正朝蓋非不謁也但不於正朝耳遣司馬崔放入對放為全義引咎謝無功為于偽翻上曰全義為招討使能招來少誠其功大矣何必殺人然後為功邪德宗之耳目為宦官所聾瞽率類此甲戌歸夏州夏戶雅翻貞元十七年韋士宗既入黔州去年士宗復入黔州事見上卷黔渠今翻又其廉翻人心大擾士宗懼三月脫身亡走夏四月辛亥以右諫議大夫裴佶為黔州觀察使佶其吉翻貞元十七年五月壬戌朔日有食之貞元十七年朔方邠寧慶節度使楊朝晟朔方兵分居邠故仍以朔方軍號冠之其實只節度邠寧慶三州乙酉薨初渾瑊遣兵馬使李朝寀將兵戍定平武德二年分寧州定安縣置定平縣仍屬寧州九域志在州南六十里朝直遙翻寀倉宰翻將即亮翻朝寀請以其衆隸神策軍詔許之楊朝晟疾亟亟汜力翻召僚佐謂曰朝晟必不起朔方命帥多自本軍雖徇衆情殊非國體帥所類翻下同寧州刺史劉南金練習軍旅宜使攝行軍且知軍事比朝廷擇帥比必利翻及也必無虞矣又以手書授監軍劉英倩英倩以聞軍士私議曰朝廷命帥吾納之即命劉君吾事之若命帥於他軍彼必以其麾下來吾屬被斥矣必拒之己丑上遣中使往察軍情軍中多與南金辛卯上復遣高品薛盈珍齎詔詣寧州唐內侍省有高品一千九百六十六人復扶又翻甲午盈珍至軍宣詔曰朝寀所將本朔方軍今將幷之以壯軍勢威戎狄以李朝寀為使南金副之軍中以為何如諸將皆奉詔丙申都虞候史經言於衆曰李公命收弓刀而送甲冑二千軍士皆曰李公欲內麾下二千為腹心吾輩妻子其可保乎夜造劉南金造七到翻欲奉以為帥南金曰節度使固我所欲然非天子之命則不可軍中豈無他將乎將即亮翻衆曰弓刀皆為官所收惟軍事府尚有甲兵軍事府知軍事所居也南金曰諸君不願朝寀為帥宜以情告敕使若操甲兵操七刀翻乃拒詔也命閉門不內軍士去詣兵馬使高固固逃匿搜得之固曰諸君能用吾言則可衆曰惟命固曰毋殺人毋掠金帛衆曰諾乃共詣監軍請奏之衆曰劉君既得朝旨為副帥必撓吾事撓奴巧翻詐稱監軍命召計事至而殺之戊戌制以李朝寀為邠寧節度使是日寧州告變者至上追還制書復遣薛盈珍往詗軍情復扶又翻下同詗火迥翻又翾正翻壬寅至軍軍中以高固為請盈珍即以上旨命固知軍事或傳戊戌制書至邠州邠軍惑不知所從薛盈珍已命高固知寧州軍事而又有傳李朝寀制書至邠者故留邠之軍惑而不知所適從且為變留後孟子周悉內精甲於府廷日饗士卒內以悅衆心外以威姦黨邠軍無變子周之謀也貞元十七年李錡既執天下利權十五年李錡為諸道鹽鐵轉運使事見上卷以饋遺結權貴遺唯季翻恃此驕縱無所忌憚盜取縣官財所部官屬無罪受戮者相繼浙西布衣崔善貞詣闕上封事言宮市進奉及鹽鐵之弊因言錡不法事上覽之不悅命械送錡錡聞其將至先鑿阬於道旁己亥善貞至幷鎖械內阬中生瘞之瘞於計翻遠近聞之不寒而慄錡復欲為自全計增廣兵衆選有材力善射者謂之挽強言其力能挽強弓也杜甫詩挽弓當挽強胡奚之俘配隸江南者錡收養之轉運判官盧坦屢諫不悛悛丑緣翻與幕僚李約等皆去之約勉之子也李勉歷事肅代德三朝貞元中為相貞元十七年己酉以高固為邠寧節度使固宿將以寬厚得衆節度使忌之置於散地散悉但翻同列多輕侮之及起為帥一無所報復章十二行本復下有由是二字乙十一行本同軍中遂安貞元十七年丁巳成德節度使王武俊薨貞元十七年秋七月戊寅吐蕃寇鹽州貞元十七年辛巳以成德節度副使王士真為節度使貞元十七年己丑吐蕃陷麟州殺刺史郭鋒夷其城郭掠居人及党項部落而去鋒曜之子也曜郭子儀之子也僧延素為虜所得虜將有徐舍人者謂延素曰我英公五代孫也李勣封英國公吾高祖建義不成謂敬業也事見二百二卷武后光宅元年雖代居祿位典兵然思本之心不忘顧宗族大無由自拔耳今聽汝歸遂縱之上遣使敕韋皋出兵深入吐蕃以分其勢紓北邊患紓緩也攻吐蕃維保松州及棲雞老翁城宋白曰保州本維州之定廉縣南接吐蕃為夷落之極塞開元二十八年羌夷內附置奉州天寶改雲山郡八載移治天保軍改為天保郡尋沒乾元元年復歸附乃改為保州按王涯傳曰綿州威蕃柵西抵棲雞城蓋在茂州界貞元十七年河東節度使鄭儋暴薨不及命後事軍中喧譁將有他變中夜十餘騎執兵召掌書記令狐楚至軍門諸將環之環音宦使草遺表楚在白刃之中操筆立成楚德棻之族也令狐德棻事太宗疑族字下有孫及曾玄等字棻撫文翻戊午以河東行軍司馬嚴綬為節度使貞元十七年九月韋皋奏大破吐蕃於雅州宋白曰雅州即秦嚴道縣地後魏立蒙山郡唐立雅州按郡國志漢源縣有離山蜀守李冰所鑿離即古雅字也州以此為名舊志雅州京師西南二千七百二十三里貞元十七年左神策中尉竇文場致仕以副使楊志廉代之貞元十七年韋皋屢破吐蕃轉戰千里凡拔城七軍鎮五焚堡百五十斬首萬餘級捕虜六千降戶三千遂圍維州及昆明城冬十月庚子加皋檢校司徒兼中書令賜爵南康郡王南詔王異牟尋虜獲尤多上遣中使慰撫之貞元十七年戊午鹽州刺史杜彥先棄城奔慶州為吐蕃所逼也鹽州修築距是年纔八年十八年十八年春正月驃王摩羅思那遣其子悉利移入貢驃國在南詔西南六千八百里新書驃古朱波也在永昌南二千里去京師萬四千里驃毗召翻因南詔入見見賢遍翻仍獻其樂十八年吐蕃遣其大相兼東鄙五道節度使論莽熱將兵十萬解維州之圍西川兵據險設伏以待之吐蕃至出千人挑戰挑徒了翻虜悉衆追之伏發虜衆大敗擒論莽熱士卒死者太半維州昆明竟不下引兵還還從宣翻又如字乙亥皋遣使獻論莽熱考異曰舊韋皋傳云十月遣使獻論莽熱今從實錄十八年浙東觀察使裴肅既以進奉得進裴肅以進奉得廉車事見上卷十二年張判上脫肅卒官齊總代掌後務據新唐書肅卒于官齊總代掌後務三月癸酉詔擢總為衢州刺史給事中長安許孟容封還詔書封還詔書不肯書讀所謂糾駮也亦謂之塗歸唐人語也曰衢州無他虞齊總無殊績忽此超獎深駭㣥情若總必有可錄願明書勞課然後超資改官以解衆疑詔遂留中己亥上召孟容慰獎之十八年秋七月辛未嘉王府諮議高弘本正牙奏事嘉王運代宗之子諮議參軍正五品上掌計謀議事唐東內以含元殿為正牙西內以太極殿為正牙唐制天子居曰衙行曰駕牙與衙同逋欠也乙亥詔公卿庶僚自今勿令正牙奏事如有陳奏宜延英門請對議者以為正牙奏事自武德以來未之或改所以達㣥情講政事弘本無知黜之可也不當因人而廢事十八年淮南節度使杜佑累表求代冬十月丁亥以刑部尚書王鍔為淮南副節度使兼行軍司馬鍔五各翻副節度使恐當作節度副使十八年己酉鄜坊節度使王栖曜薨中軍將何朝宗謀作亂夜縱火都虞候裴玢潛匿不救火朝直遙翻玢府巾翻旦擒朝宗斬之以同州刺史劉公濟為鄜坊節度使以玢為行軍司馬十九年十九年春二月丁亥名安黃軍曰奉義以寵伊慎也十九年己亥安南牙將王季元逐其觀察使裴泰泰奔朱鳶劉昫曰朱鳶漢縣名今縣吳軍平縣地晉武帝更名海平江左置武平郡隋廢郡為朱鳶縣唐屬交州左兵馬使趙勻斬季元及其黨迎泰而復之十九年甲辰杜佑入朝自淮南入朝壬子朔以佑檢校司空同平章事以王鍔為淮南節度使十九年鴻臚卿王權請遷獻懿二祖於德明興聖廟玄宗天寶二年尊咎繇為德明皇帝涼武昭王為興聖皇帝立廟京師臚陵如翻正太祖東向之位從之建中二年奉獻祖正東向之位事見二百二十七卷十九年乙亥以司農卿李實兼京兆尹實為政暴戾上愛信之實恃恩驕傲許人薦引不次拜官及誣譖斥逐皆如期而效士大夫畏之側目十九年夏四月涇原節度使劉昌奏請徙原州治平涼從之七年劉昌築平涼事見二百三十三卷原州本治高平唐為平高縣為吐蕃所陷十九年乙亥吐蕃遣其臣論頰熱入貢十九年六月辛卯以右神策中尉副使孫榮義為中尉與楊志廉皆驕縱招權楊志廉時為左軍中尉考異曰實錄十七年六月以中官楊志廉充左神策護軍中尉七月丙戌以內給事楊志廉孫榮義為左右神策護軍中尉副使九月戊寅以志廉為左神策中尉十九年六月辛卯以榮義為右神策中尉二十年十月戊申以志廉為特進右監軍將軍左軍中尉其重複差互如此蓋十七年六月攝領耳七月始為副使九月及十九年六月始正為中尉二十年十月但進階加官耳舊傳又云先是竇文場致仕十五年以後志廉榮義為左右軍中尉亦踵竇之事此蓋言其大略耳未必為中尉適在十五年也余按右監軍將軍當作右監門將軍宦官之勢益盛十九年壬辰遣右龍武大將軍薛伾使于吐蕃十九年陳許節度使上官涗薨其壻田偁欲脅其子使襲軍政偁齒繩翻牙將王沛亦涗之壻也知其謀以告監軍范日用討擒之乙未以陳許行軍司馬劉昌裔為節度使沛許州人也十九年自正月不雨至于秋七月十九年己未中書侍郎同平章事齊抗以疾罷為太子賓客十九年初翰林待詔王伾善書山陰王叔文善棋山陰漢古縣隋廢山陰入會稽縣唐初復分會稽置山陰縣二縣俱在越州郭下娛侍太子伾杭州人也叔文譎詭多計自言讀書知治道乘間常為太子言民間疾苦譎古穴翻治直吏翻乘間古莧翻為于偽翻太子嘗與諸侍讀及叔文等論及宮市事太宗時晉王府有侍讀及為太子亦置焉其後或置或否無常員掌講導經學太子曰寡人方欲極言之衆皆稱贊獨叔文無言既退太子自留叔文謂曰向者君獨無言豈有意邪叔文曰叔文蒙幸太子有所見敢不以聞太子職當視膳問安世子之記曰朝夕至于大寢之門外問內豎曰今日安否何如內豎曰安世子乃有喜色其有不安節則內豎以告世子世子色憂不滿容內豎言復初然後亦復初朝夕之食上世子必在視寒煖之節食下問所膳羞必知所進以命膳宰然後退若內豎言疾則世子親齊玄而養膳宰之饌必敬視之疾之藥必親嘗之嘗饌善則世子亦能食嘗饌寡則世子亦不能飽以至於復初然後亦復初陛下在位久如疑太子收人心何以自解太子大驚因泣曰非先生寡人無以知此遂大愛幸與王伾相依附叔文因為太子言為于偽翻某可為相某可為將幸異日用之密結翰林學士韋執誼及當時朝士有名而求速進者陸淳呂溫李景儉韓曄韓泰陳諫柳宗元劉禹錫等定為死友而凌準程等又因其黨以進日與遊處處昌呂翻蹤跡詭祕莫有知其端者藩鎮或陰進資幣與之相結淳吳人嘗為左司郎中溫渭之子時為左拾遺呂渭見上卷十六年瑀之孫進士及第瑀寧王憲之子也封漢中王滉之族子韓滉休之子貞元中為相嘗為侍御史宗元禹錫時為監察御史左補闕張正一上書得召見考異曰順宗實錄作張正買今從德宗實錄考異曰韓愈集有仲舒神道碑云諱弘中字某按實錄新舊傳皆名仲舒字弘中愈又作燕喜亭記稱為王弘中然則弘中必字也碑文誤耳順宗實錄云正買與王仲舒劉伯芻裴茞常仲孺呂洞相善數遊止今從德宗實錄令執誼反譖正一等於上云其朋黨遊宴無度九月甲寅正一等皆坐遠貶人莫知其由為伾叔文等亂順宗初政張本迺之子也劉迺見二百三十卷興元元年十九年鹽夏節度判官崔文先權知鹽州為政苛刻冬閏十月庚戌部將李庭俊作亂殺而臠食之左神策兵馬使李興幹戍鹽州殺庭俊以聞十九年丁巳門下侍郎同平章事崔損薨十九年十一月戊寅朔以李興幹為鹽州刺史得專奏事李興幹出於神策軍宦官因其定亂之功而崇獎之貞元三年置夏州節度使領綏鹽二州今鹽州得專達於朝廷其後鹽州屬朔方節度夏州節度又增銀宥威三州隸之十九年十二月庚申以太常卿高郢為中書侍郎吏部侍郎鄭珣瑜為門下侍郎並同平章事珣瑜餘慶之從父兄弟也鄭餘慶貞元十四年為相十六年坐于䪹貶從才用翻十九年建中初敕京城諸使及府縣繫囚每季終委御史巡按有冤濫者以聞冤枉屈也濫淫刑也北軍移牒而已宦官勢橫御史不敢復入北軍按囚但移文北司牒取繫囚姓名及事因應故事而已不問其有無冤濫下吏欲陷之引以入右神策軍軍使以下駭懼具奏其狀上怒杖薳四十流崖州薳韋委翻十九年京兆尹嗣道王實務徵求以給進奉言於上曰今歲雖旱而禾苗甚美由是租稅皆不免人窮至壞屋賣瓦木麥苗以輸官壞音怪優人成輔端為謠嘲之徒歌曰謠杖殺之朝直遙翻監察御史韓愈上疏以京畿百姓窮困應今年稅錢及草粟等徵未得者請俟來年蠶麥愈坐貶陽山令陽山漢縣屬桂陽郡後漢省晉平吳分浛洭縣復置唐屬連州神龍元年移縣治於浛水之北考異曰韓愈河南令張署墓誌曰自京兆武功尉拜監察御史為幸臣所讒與同輩韓愈李方叔三人俱為縣令南方又祭署文曰貞元十九君為御史余以無能同詔並峙又曰我落陽山以尹鼯猱君飄臨武山林之牢歲弊寒兇雪虐風饕與署同貶當在此年冬二十年二十年春正月丙戌天德軍都防禦團練使豐州刺史李景略卒初景略嘗宴僚佐行酒者誤以醯進醯呼西翻醋也判官京兆任迪簡以景略性嚴恐行酒者得罪強飲之任音壬強其兩翻歸而嘔血軍士聞之泣下及李景略卒軍士皆曰判官仁者欲奉以為帥帥所類翻監軍抱置別室軍士發扃取之監軍以聞詔以代景略二十年吐蕃贊普死其弟嗣立考異曰實錄及舊傳皆云贊普以貞元十三年四月卒長子立一歲又卒次子嗣立韓愈順宗實錄張薦傳云二十年贊普死遣薦弔贈新傳云十三年贊普死其子足之煎立二十年贊普死遣工部侍郎張薦弔祠其弟嗣立疑實錄舊傳誤以是字為一字今從順宗錄及新傳按字當作事二十年夏四月丙寅名陳許軍曰忠武二十年左金吾大將軍李昇雲將禁兵鎮咸陽疾病其子政諲諲音因與虞候上官望等謀效山東藩鎮使將士奏攝父事六月壬子昇雲卒甲寅詔追削昇雲官爵籍沒其家二十年昭義節度使李長榮薨上使中使以手詔授本軍大將但軍士所附者即授時大將來希皓為衆所服中使將以手詔付之希皓言於衆曰此軍取人合是希皓但作節度使不得唐人多讀作如佐音若朝廷以一束草來希皓亦必敬事言若束草為節度使亦必敬而事之來希皓之忠純如此而其後不復見於史必盧從史畏偪而去之也面奉進止只令此軍取大將拔與節鉞朝廷不別除人希皓固辭兵馬使盧從史考異曰杜牧上李司徒書作押衙盧從史今從實錄潛與監軍相結起出伍曰出儔伍之中而言若來大夫不肯受詔從史請且句當此軍句古候翻當丁浪翻監軍曰盧中丞若如此此亦固合聖旨中使因探懷取詔以授之探吐南翻從史捧詔再拜舞蹈希皓亟迴揮同列北面稱賀軍士畢集更無一言秋八月己未詔以從史為節度使二十年九月太子始得風疾不能言順宗至德弘道大聖大安孝皇帝諱誦德宗長子按此宣宗大中三年追崇諡號也考之會要葬陵諡冊與此追崇諡號一同蓋會要所載初諡誤也永貞元年乙酉八五是年八月始改元永貞二十年春正月辛未朔諸王親戚入賀德宗太子獨以疾不能來德宗涕泣悲歎由是得疾日益甚凡二十餘日中外不通莫知兩宮安否癸巳德宗崩年六十四絪音因程大昌雍錄曰金鑾坡者龍首山之支隴隱起平地而坡陁靡迤者也其上有殿名曰金鑾殿殿旁有坡名曰金鑾坡又曰金鑾殿者在蓬萊山正西微南龍首山坡隴之北殿西有坡德宗即之以造東學士院以其在開元學士院之東也草遺詔宦官或曰禁中議所立尚未定衆莫敢對次公遽言曰太子雖有疾地居冢嫡中外屬心屬之欲翻必不得已猶應立廣陵王廣陵王純太子長子必大亂絪等從而和之和胡臥翻議始定次公河東人也太子知人情憂疑紫衣麻鞋考異曰按祕喪則不應麻鞋發喪則不應紫衣蓋當時蒼猝偶著此服非祕喪也以未成服故不衣縗絰耳雍錄曰九仙門在內西苑之東北角右神策軍右羽林軍右龍武軍列營於九仙門之西按閣本大明宮圖宮城西面右銀臺門又北為九仙門人心粗安粗坐五翻甲午宣遺詔於宣政殿考異曰德宗實錄癸巳宣遺詔今從順宗實錄縗倉回翻丙申即皇帝位於太極殿即位於西內前殿企足引領而望之企去智翻曰真太子也乃喜而泣時順宗失音不能決事常居宮中施簾帷獨宦者李忠言昭容牛氏侍左右百官奏事自帷中可其奏自德宗大漸王伾先入稱詔召王叔文坐翰林中使決事伾以叔文意入言於忠言稱詔行下下戶嫁翻外初無知者以杜佑攝冢宰二月癸卯上始朝百官於紫宸門紫宸門紫宸殿門也長安志宣政殿北曰紫宸門門內有紫宸殿即內衙之正殿二十年己酉加義武節度使張茂昭同平章事二十年辛亥以吏部郎中韋執誼為尚書左丞同平章事王叔文欲掌國政首引執誼為相己用事於中與相唱和和戶臥翻二十年壬子李師古發兵屯西境以脅滑州時告哀使未至諸道義成牙將有自長安還得遺詔者節度使李元素以師古鄰道欲示無外春秋公羊傳曰王者無外此唐人以化外待藩鎮故有此語師古欲乘國喪侵噬鄰境乃集將士謂曰聖上萬福而元素忽傳遺詔是反也宜擊之遂杖元素使者發兵屯曹州考異曰舊韓愈傳云撰順宗實錄繁簡不當穆宗文宗嘗詔史臣添改時愈壻李漢蔣係在顯位諸公難之而韋處厚竟別撰順宗實錄三卷景祐中詔編次崇文總目順宗實錄有七本皆五卷題曰韓愈等撰五本略而二本詳編次者兩存之其中多異同今以詳略為別此李師古脅滑州事詳本有而略本無詳錄又云使衡密以其本示之師古不受杖衡幾死衡蓋使者之名而無姓又云遂以師至濮州伺候為變按韓愈撰韓弘碑云屯兵于曹今從之九域志曹州西北至滑州一百二十里汴州北至滑州界一百里東北至曹州界一百三里三州之界蓋犬牙相入汝能越吾界而為盜邪有以相待無為空言元素告急弘使謂曰吾在此公安無恐或告翦棘夷道翦芟截也夷平也請備之弘曰兵來不除道也不為之應師古詐窮變索索蘇各翻索散也盡也言韓弘逆得師古之情其所設詭變索然散盡也且聞上即位乃罷兵元素表請自貶朝廷兩慰解之元素泌之族弟也李泌歷事肅代德貞元中為相吳少誠以牛皮鞵材遺師古鞵與鞋同遺唯季翻潛過宣武界事覺弘皆留輸之庫曰此於法不得以私相餽師古等皆憚之二十年辛酉詔數京兆尹道王實殘暴掊斂之罪數所具翻掊蒲侯翻斂力贍翻貶通州長史宋白曰通州漢宕渠縣地後漢分置宣漢縣皆袖瓦礫遮道伺之實由間道獲免讙許元翻礫郎擊翻間古莧翻二十年壬戌以殿中丞王伾為左散騎常侍依前翰林待詔蘇州司功王叔文為起居舍人翰林學士伾寢陋吳語狀貌寢陋常操鄉音不能學華言上所褻狎而叔文頗任事自許微知文義好言事好呼到翻上以故稍敬之不得如伾出入無阻叔文入至翰林而伾入至柿林院柿鉏里翻見李忠言牛昭容計事大抵叔文依伾伾依忠言忠言依牛昭容轉相交結每事先下翰林下遐稼翻使叔文可否然後宣于中書韋執誼承而行之外黨則韓泰柳宗元章十二行本元下有劉禹錫三字乙十一行本同孔本同張校同等主采聽外事謀議唱和和戶臥翻互相推獎曰伊曰周曰管曰葛以伊尹周公管仲諸葛孔明互相比況僴下赧翻僴然勁忿貌謂天下無人榮辱進退生於造次朱氏曰造次急遽苟且之時造七到翻不拘程式士大夫畏之道路以目國語周厲王監謗國人莫敢言道路以目韋昭註曰不敢發言以目相眄而已相次拔擢至一日除數人除者除官也某可為某官不過一二日輒已得之於是叔文及其黨十餘家之門晝夜車馬如市客候見叔文伾者至宿其坊中餅肆酒壚下長安城中分為左右街畫為百有餘坊餅肆賣餅之家酒壚賣酒之處顏師古曰賣酒之處累土為壚以居酒瓮四邊隆起其一面高形如鍛壚故名壚耳乃容之伾尤闒茸闒吐盍翻茸而隴翻闒茸獰劣也史炤曰顏師古曰闒茸猥賤也闒下也茸細毛貌謂非豪傑也專以納賄為事作大匱貯金帛貯丁呂翻夫婦寢其上恐人盜之二十年甲子上御丹鳳門赦天下諸色逋負一切蠲免蠲除也悉罷進奉貞元之末政事為人患者如宮市五坊小兒之類悉罷之宮市事見上卷貞元十三年五坊一曰鵰坊二曰鶻坊三曰鷂坊四曰鷹坊五曰狗坊小兒者給役五坊者也唐時給役者多呼為小兒如苑監小兒飛龍小兒五坊小兒是也五坊屬宣徽院先是五坊小兒張捕鳥雀於閭里者皆為暴橫先悉薦翻橫戶孟翻以取人錢物至有張羅網於門不許人出入者或張井上使不得汲者汲汲水也輒曰汝驚供奉鳥雀即痛毆之近其靳翻毆烏口翻擊也出錢物求謝乃去或相聚飲食於酒食之肆醉飽而去賣者或不知就索其直多被毆詈或時留蛇一囊為質索山客翻被皮義翻質音致曰此蛇所以致鳥雀而捕之者今留付汝幸善飼之飼與飤同祥吏翻賣者愧謝求哀乃攜挈而去上在東宮皆知其弊故即位首禁之二十年乙丑罷鹽鐵使月進錢先是鹽鐵月進羨餘羨弋線翻而經入益少少詩沼翻至是罷之二十年三月辛未以王伾為翰林學士二十年德宗之末十年無赦㣥臣以微過譴逐者皆不復敍用至是始得量移復扶又翻量音良壬申追忠州別駕陸贄郴州別駕鄭餘慶杭州刺史韓皋道州刺史陽城赴京師陸贄貶見上卷貞元十一年陽城貶見十四年鄭餘慶貶見十六年韓皋為京兆尹十四年貶撫州員外司馬未幾徙杭州刺史追猶召也贄之秉政也貶駕部員外郎李吉甫為明州長史贄疑吉甫黨竇參故貶之贄昆弟門人咸以為憂至而吉甫忻然以宰相禮事之贄初猶慚懼後遂為深交吉甫栖筠之子李栖筠事代宗以直聞屢上表請以贄自代贄與陽城皆未聞追詔而卒卒子恤翻二十年丙戌加杜佑度支及諸道鹽鐵轉運使以浙西觀察使李錡為鎮海節度使解其鹽鐵轉運使考異曰舊錡傳云德宗於潤州置鎮海軍新書方鎮表元和二年升浙西觀察使為鎮海軍節度使按實錄八月辛酉詔曰頃年江淮租賦爰及榷稅委在藩服使其平均太上皇君臨之初務從省便令使府歸在中朝然則云德宗元和者皆誤也故反謀亦未發二十年戊子名徐州軍曰武寧以張愔為節度使二十年加彰義節度使吳少誠同平章事二十年以王叔文為度支鹽鐵轉運副使先是叔文與其黨謀先悉薦翻得國賦在手則可以結諸用事人取軍士心以固其權又懼驟使重權度支鹽鐵轉運利權所在權莫重焉王叔文起於卑渫遽領使職自知其驟其心不安而懼使疏吏翻藉杜佑雅有會計之名雅素也會古外翻易可制易以豉翻故先令佑主其名而自除為副以專之叔文雖判兩使度支一使鹽鐵轉運一使日夜與其黨屏人竊語屏必郢翻又卑正翻人莫測其所為以御史中丞武元衡為左庶子德宗之末叔文之黨多為御史元衡薄其為人待之莽鹵莽莫補翻鹵郎古翻莽鹵言不以為意也元衡為山陵儀仗使劉禹錫求為判官不許叔文以元衡在風憲欲使附己使其黨誘以權利誘音酉元衡不從由是左遷元衡平一之孫也武平一武載德之子武后時避事隱嵩山侍御史竇㣥奏屯田員外郎劉禹錫挾邪亂政不宜在朝唐屯田郎掌天下屯田及京文武職田諸司公廨錢以品給之朝直遙翻揖之曰事固有不可知者叔文曰何謂也㣥曰去歲李實怙恩挾貴氣蓋一時公當此時逡巡路旁乃江南一吏耳叔文本蘇州司功故云然復扶又翻安知路旁無如公者乎其黨欲逐之韋執誼以㣥素有強直名止之考異曰舊劉禹錫傳曰㣥即日罷官㣥傳曰其黨議欲貶㣥官韋執誼止之又曰叔文雖異其言竟不之用按順宗實錄凡為伾文所排擯者無不載未嘗言㣥罷官今從之二十年上疾久不愈時扶御殿㣥臣瞻望而已莫有親奏對者中外危懼思早立太子而王叔文之黨欲專大權惡聞之惡烏路翻下同宦官俱文珍劉光琦薛盈珍皆先朝任使舊人朝直遙翻疾叔文忠言等朋黨專恣乃啟上召翰林學士鄭絪衞次公李程王涯入金鑾殿草立太子制時牛昭容輩以廣陵王淳英睿惡之絪不復請書紙為立嫡以長字呈上復扶又翻下同長知丈翻上頷之癸巳立淳為太子更名純更工衡翻程神符五世孫也神符淮安王神通之弟也二十年賈耽以王叔文黨用事心惡之稱疾不出屢乞骸骨丁酉諸宰相會食中書故事宰相方食百寮無敢謁見者叔文至中書欲與執誼計事令直省通之直省吏職也以直中書省故名叔文怒叱直省直省懼入白執誼逡巡慚赧赧奴版翻慚而面赤也竟起迎叔文就其閤語良久杜佑高郢鄭珣瑜皆停筯以待有報者云叔文索飯索山客翻韋相公已與之同食閤中矣佑郢心知不可畏叔文執誼莫敢出言珣瑜獨歎曰吾豈可復居此位顧左右取馬徑歸遂不起二相皆天下重望二相謂賈耽鄭珣瑜叔文執誼益無所顧忌遠近大懼史甚言其事二十年夏四月壬寅立皇弟諤為欽王誠為珍王子經為郯王緯為均王縱為漵王紓為莒王綢嚴綢改綱為密王總為郇王約為邵王結為宋王緗為集王絿為冀王綺為和王絢為衡王纁為會王綰為福王紘為撫王緄為岳王紳為袁王綸為桂王繟為翼王紓式居翻綢直留翻緗思良翻絿音求絢許縣翻纁許云翻緄古本翻繟充善翻自經以下皆皇子也史提子字以別二弟此所封諸王或以古國名然多以當時州名二十年乙巳上御宣政殿冊太子百官睹太子儀表退皆相賀至有感泣者中外大喜而王叔文獨有憂色口不敢言但吟杜甫題諸葛亮祠堂詩曰出師未捷身先死長使英雄淚滿襟聞者哂之哂矢忍翻笑不壞顏為哂先是太常卿杜黃裳為裴延齡所惡留滯臺閣十年不遷杜黃裳自佐朔方軍入為侍御史十年不遷先悉薦翻惡烏路翻始遷太常卿黃裳勸執誼帥㣥臣請太子監國帥讀曰率執誼驚曰丈人甫得一官柰何啟口議禁中事黃裳勃然曰黃裳受恩三朝三朝謂肅代德也拂衣起出戊申以給事中陸淳為太子侍讀仍更名質避太子名也恐太子不悅故以質為侍讀使潛伺太子意且解之伺相吏翻及質發言太子怒曰陛下令先生為寡人講經義耳為于偽翻何為預他事質惶懼而出二十年五月辛未以右金吾大將軍范希朝為左右神策京西諸城鎮行營節度使甲戌以度支郎中韓泰為其行軍司馬王叔文自知為內外所憎疾欲奪取宦官兵權以自固藉希朝老將使主其名而實以泰專其事此與用杜佑掌利權同一計數也益疑懼二十年辛卯以王叔文為戶部侍郎依前充度支鹽鐵轉運副使俱文珍等惡其專權削去翰林之職惡烏路翻去羌呂翻叔文見制書大驚謂人曰叔文日時至此商量公事日時猶云日日時時也約言之耳則無因而至矣此院謂翰林學士院也為于偽翻不從再疏乃許三五日一入翰林去學士名叔文始懼二十年六月己亥貶宣歙巡官羊士諤為汀州寧化尉唐制節度觀察其屬皆有巡官開元二十六年開山洞置黃連縣天寶元年更名寧化九域志在州東北一百八十里遇叔文用事公言其非叔文聞之怒欲下詔斬之執誼不可則令杖煞之煞與殺同遂貶焉由是叔文始大惡執誼惡烏路翻往來二人門下者皆懼先時劉闢以劍南支度副使將韋皋之意於叔文唐六典凡天下邊軍皆有支度之使以計軍資糧仗之用將奉也行也先悉薦翻劍南東川西川及山南西道為三川太尉使闢致微誠於公太尉謂韋皋當以死相助若不與亦當有以相酬叔文怒以闢以言脅之故怒執誼固執不可闢尚遊長安未去聞貶士諤遂逃歸執誼初為叔文所引用深附之既得位欲掩其迹且迫於公議故時時為異同輒使人謝叔文曰非敢負約乃欲曲成兄事耳叔文詬怒不之信詬呼漏翻又古候翻遂成仇怨二十年癸丑韋皋上表以為陛下哀毀成疾重勞萬機重直用翻故久而未安請權令皇太子親監庶政監古銜翻候皇躬痊愈復歸春宮東宮謂之春宮今之所陳乃其職分分扶問翻又上太子牋以為聖上遠法高宗亮陰不言委政臣下而所付非人王叔文王伾李忠言之徒輒當重任賞罰任情墮紀紊綱墮讀曰隳紊亡運翻散府庫之積以賂權門樹置心腹徧於貴位潛結左右憂在蕭牆竊恐傾太宗盛業危殿下家邦願殿下即日奏聞斥逐㣥小使政出人主則四方獲安皋自恃重臣遠處西蜀度王叔文不能動搖遂極言其姦處昌呂翻度徒洛翻俄而荊南節度使裴均河東節度使嚴綬牋表繼至意與皋同考異曰實錄略本云尋而裴垍嚴綬表繼至悉與皋同又云外有韋皋裴垍嚴綬等牋表詳本裴垍皆作裴均按裴垍時為考功員外郎裴均為荊南節度使今從詳本而邪黨震懼均光庭之曾孫也裴光庭相玄宗二十年王叔文既以范希朝韓泰主京西神策軍諸宦者尚未寤會邊上諸將各以狀辭中尉且言方屬希朝宦者始寤兵柄為叔文等所奪乃大怒曰從其謀吾屬必死其手密令其使歸告諸將曰無以兵屬人希朝至奉天諸將無至者韓泰馳歸白之叔文計無所出唯曰柰何柰何無幾幾居豈翻無幾言無多時也其母病甚丙辰叔文盛具酒饌與諸學士及李忠言俱文珍劉光琦等飲於翰林饌雛戀翻又雛晥翻叔文言曰叔文母病以身任國事之故不得親醫藥今將求假歸侍假古暇翻求假請告也叔文比竭心力不避危難皆為朝廷之恩比毗至翻難乃旦翻為于偽翻一旦去歸百謗交至誰肯見察以一言相助乎文珍隨其語輒折之折之舌翻叔文不能對但引滿相勸酒數行而罷丁巳叔文以母喪去位考異曰實錄詳本曰叔文母將死前一日叔文以五十人擔酒饌入翰林讌李忠言劉光琦俱文珍及諸學士等中飲叔文執盞云云又曰羊士諤毀叔文叔文將杖殺之而韋執誼懦不敢劉闢以韋皋迫脅叔文求三川叔文平生不識闢叔文今日名位何如而闢欲前執叔文手豈非凶人邪叔文時已令掃木場將集衆斬之執誼又執不可每念失此兩賊令人不快又自陳判度支已來所為國家興利除害出若干錢以為功能俱文珍隨語折之叔文無以對命滿酌雙巵對飲酒數行而罷方飲時有暫起至廳側者聞叔文從人相謂曰母死已臰不欲棺斂方與人飲酒不知欲何所為歸之明日而其母死或傳母死數日乃發喪國史補曰王叔文以度支使設饌於翰林大宴諸閹袖金以贈明日又至揚言聖人適於苑中射兔上上馬如飛敢有異議者腰斬其日丁母憂今從二本實錄二十年秋七月丙子加李師古檢校侍中二十年王叔文既有母喪韋執誼益不用其語叔文怒與其黨日夜謀起復必先斬執誼而盡誅不附己者聞者忷懼自叔文歸第王伾失據日詣宦官及杜佑請起叔文為相杜佑時為首相故請之既不獲則請以為威遠軍使平章事據舊郭子儀傳肅宗上元元年以子儀為諸道兵馬都統令帥英武威遠等禁軍及諸鎮之師取范陽既而為魚朝恩所沮不行則威遠軍肅宗置也至德宗時以左右威遠營隸鴻臚賈耽以鴻臚卿兼威遠軍使至元和二年敕左右威遠營置來已久著在國章其英武軍並合幷入左右威遠營其後遂以宦官為使不復隸鴻臚宋白曰左右威遠營本屬鴻臚寺建中元年七月隸金吾其黨皆憂悸不自保悸其季翻是日伾坐翰林中疏三上不報上時掌翻知事不濟行且臥至夜忽叫曰伾中風矣中竹仲翻明日遂輿歸不出己丑以倉部郎中判度支案陳諫為河中少尹唐諸都各置尹一人少尹二人從四品下掌貳府州之事歲終則更次入計二十年癸巳橫海軍節度使程懷信薨以其子副使執恭為留後考異曰舊傳曰程懷信死懷直子執恭知留後事乃遣懷直歸滄州十六年卒執恭代襲父位朝廷因而授之按懷信逐懷直而奪其位安肯以懷直之子知留後又德宗實錄俱無此事順宗實錄略本亦無蓋舊傳誤也惟詳本永貞元年七月癸巳橫海軍節度使程懷信卒以其子副使執恭為橫海軍節度使路隋憲宗實錄元和元年五月丙子以橫海留後程執恭為節度使蓋順錄留後字誤為使字耳二十年乙未制以積疢未復疢丑刃翻病也其軍國政事權令皇太子純句當句古候翻當丁浪翻時內外共疾王叔文黨與專恣上亦惡之惡烏路翻俱文珍屢啟上請令太子監國監古銜翻上固厭倦萬機遂許之又以太常卿杜黃裳為門下侍郎左金吾大將軍袁滋為中書侍郎並同平章事俱文珍等以其舊臣故引用之杜黃裳代宗時已佐朔方軍袁滋建中初已位於朝故以為舊臣高郢為刑部尚書並罷政事太子見百官於東朝堂唐六典大明宮含元殿夾殿有兩閣左曰翔鸞翔鸞閣下為東朝堂右曰棲鳳棲鳳閣下為西朝堂朝直遙翻太子涕泣不答拜八月庚子制令太子即皇帝位朕稱太上皇制敕稱誥辛丑太上皇徙居興慶宮誥改元永貞立良娣王氏為太上皇后后憲宗之母也壬寅貶王伾開州司馬王叔文渝州司戶舊志開州京師南一千四百六十里渝州京師西南二千七百四十八里明年賜叔文死乙巳憲宗即位於宣政殿德宗大行在殯上皇在興慶宮不敢於前殿即位二十年丙午昇平公主獻女口五十公主郭母也上皇不受獻朕何敢違遂卻之庚戌荊南獻毛龜二上曰朕所寶惟賢嘉禾神芝皆虛美耳所以春秋不書祥瑞自今凡有嘉瑞但準令申有司禮部掌祥瑞復扶又翻及珍禽奇獸皆毋得獻二十年癸丑西川節度使南康忠武王韋皋薨皋在蜀二十一年德宗貞元元年韋皋代張延賞鎮蜀斂力贍翻豐貢獻以結主恩厚給賜以撫士卒士卒婚嫁死喪皆供其資費以是得久安其位而士卒樂為之用樂音洛服南詔摧吐蕃幕僚歲久官崇者則為刺史已復還幕府復扶又翻終不使還朝恐泄其所為故也朝直遙翻下同府庫既實時寬其民三年一復租賦復方目翻除也蜀人服其智謀而畏其威至今畫像以為土神家家祀之支度副使劉闢自為留後二十年朗州武陵龍陽江漲流萬餘家武陵漢臨沅縣地隋省臨沅置武陵縣唐帶朗州龍陽縣吳置九域志在州東南八十里二十年壬午奉義節度使伊慎入朝自安州入朝二十年辛卯夏綏節度使韓全義入朝全義敗於殷水而還不朝覲而去事見上卷貞元十六年及上十七年聞其事而惡之惡烏路翻全義懼乃請入朝二十年劉闢使諸將表求節鉞朝廷不許己未以袁滋為劍南東西川山南西道安撫大使二十年度支奏裴延齡所置別庫皆減正庫之物別貯之貯丁呂翻裴延齡事見上卷貞元十年請併歸正庫從之二十年辛酉遣度支鹽鐵轉運副使潘孟陽宣慰江淮行視租賦榷稅利害因察官吏否臧百姓疾苦行下孟翻否音鄙二十年癸亥以尚書左丞鄭餘慶同平章事二十年九月戊辰禮儀使奏曾太皇太后沈氏歲月滋深迎訪理絕迎訪事始見二百二十六卷德宗建中元年尋求三年之外俟中壽而服之晉荀組云二親陷沒萬無一冀者宜使依王法隨例行喪庾蔚之云二親為戎狄所破存亡未可知者宜盡尋求之理尋求之理絕三年之外便宜婚宦胤嗣不可絕王政不可廢故也猶宜以哀素自居不豫吉慶之事俟中壽而服之也若境內賊亂清平肆眚之後尋覓無蹤跡者便宜制服莊子曰人生上壽一百中壽八十下壽六十蔚紆勿翻記檀弓曰天子之殯也菆塗龍輴以椁加斧於椁上畢塗屋鄭玄註曰天子之殯居棺以龍輴攢木題湊象椁四注如屋以覆之盡塗之及葬而啟之攢才官翻帥讀曰率即以其日為忌從之二十年壬申監脩國史韋執誼奏始令史官撰日曆葉伯益曰唐永貞初韋執誼奏脩撰私家紀錄非是望令各撰日曆月終館中撰定從之此日曆之所起也二十年己卯貶神策行軍司馬韓泰為撫州刺史司封郎中韓曄為池州刺史禮部員外郎柳宗元為邵州刺史屯田員外郎劉禹錫為連州刺史皆王伾王叔文之黨也舊志撫州京師東南三千三百一十二里連州京師南三千六百六十五里二十年冬十月丁酉右僕射同平章事賈耽薨二十年戊戌以中書侍郎同平章事袁滋同平章事充西川節度使徵劉闢為給事中二十年舒王誼薨二十年太常議曾太皇太后諡曰睿真皇后二十年山人羅令則自長安如普潤矯稱太上皇誥徵兵於秦州刺史劉澭且說澭以廢立說式芮翻澭執送長安幷其黨杖殺之二十年己酉葬神武孝文皇帝于崇陵新書帝紀作神武聖文皇帝當從之崇陵在京兆雲陽縣北十五里嵯峨山二十年十一月己巳祔睿真皇后德宗皇帝主于太廟禮儀使杜黃裳等議以為國家法周制太祖猶后稷高祖猶文王太宗猶武王皆不遷高宗在三昭三穆之外請遷主于西夾室從之二十年壬申貶中書侍郎同平章事韋執誼為崖州司馬執誼以嘗與王叔文異同且杜黃裳壻故獨後貶然叔文敗執誼亦自失形勢知禍將至雖尚為相常不自得奄奄無氣奄衣廉翻奄奄言氣息微也聞人行聲輒惶悸失色以至於貶悸其季翻二十年戊寅以韓全義為太子少保致仕二十年劉闢不受徵阻兵自守袁滋畏其強不敢進上怒貶滋為吉州刺史二十年復以右庶子武元衡為御史中丞是年三月武元衡自御史中丞左遷右庶子王叔文等惡之也二十年朝議謂王叔文之黨或自員外郎出為刺史貶之太輕朝直遙翻己卯再貶韓泰為虔州司馬韓曄為饒州司馬柳宗元為永州司馬劉禹錫為朗州司馬舊志虔州京師東南四千一十七里饒州三千二百六十三里永州京師南三千二百七十四里朗州二千一百五十九里和州刺史凌準為連州司馬岳州刺史程為郴州司馬台州京師東南四千一百七十七里和州二千六百八十三里岳州二千二百三十七里二十年回鶻懷信可汗卒遣鴻臚少卿孫杲臨弔冊其嗣為騰里野合俱錄毗伽可汗自懷信立回鶻藥葛羅氏絕矣此後史皆書冊其嗣以表懷信子孫也二十年十二月甲辰加山南東道節度使于頔同平章事二十年以奉義節度使伊慎為右僕射二十年己酉以給事中劉闢為西川節度副使知節度事西川節度使領益彭蜀漢眉嘉資簡維茂黎雅松扶文龍戎翼邛巂姚柘恭當悉奉疊靜等州治成都然西邊諸州多淪於異域矣力未能討故也右諫議大夫韋丹上疏以為今釋闢不誅則朝廷可以指臂而使者惟兩京耳此外誰不為叛上善其言壬子以丹為東川節度使丹津之五世孫也津韋孝寬之子也二十年辛酉百官請上上皇尊號曰應乾聖壽太上皇上尊號曰文武大聖孝德皇帝上許上上皇尊號而自辭不受二十年壬戌以翰林學士鄭絪為中書侍郎同平章事二十年以刑部郎中杜兼為蘇州刺史兼辭行上書稱李錡且反必奏族臣上然之留為吏部郎中容肇祖標點聶崇岐覆校
