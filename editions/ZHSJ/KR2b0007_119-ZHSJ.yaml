body:
  text: 資治通鑑卷第一百一十九端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註宋紀一起上章涒灘庚申盡昭陽大淵獻癸亥凡四年劉氏世居彭城彭城於春秋之時宋土也故帝之始建國號曰宋高祖武皇帝諱裕字德輿小字寄奴姓劉氏彭城縣綏德里人漢楚元王交二十一世孫也彭城楚都故苗裔家焉晉氏東遷劉氏移居晉陵丹徒之京口里永初元年庚申四二是年六月改元春正月己亥魏主還宮晉有天下通鑑於魏主率兼書名是年宋受禪始改書用列國之例秦王熾磐立其子乞伏章甲十六行本無上二字乙十一行本同孔本同退齋校同熊校同暮末為太子熾昌志翻考異曰晉書作慕末宋書作乞佛茂蔓今從崔鴻十六國春秋仍領撫軍大將軍都督中外諸軍事大赦改元建弘宋王欲受禪而難於發言乃集朝臣宴飲此宋朝之臣也朝直遙翻從千容翻桓玄篡位鼎命已移我首唱大義興復帝室南征北伐平定四海功成業者遂荷九錫荷下可翻今年將衰暮崇極如此物忌盛滿非可久安今欲奉還爵位歸老京師㣥臣惟盛稱功德莫諭其意日晚坐散坐徂臥翻中書令傅亮還外乃悟而宮門已閉亮叩扉請見見賢遍翻王即開門見之亮入但曰臣暫宜還都王解其意無復他言解戶買翻曉也復扶又翻直云須幾人自送亮曰數十人可也即時奉辭亮出已夜見長星竟天拊髀歎曰我常不信天文今始驗矣長星所以除舊布新故云然夏四月徵王入輔王留子義康為都督豫司雍幷四州諸軍事豫州刺史鎮壽陽豫州後漢治譙魏治汝南安成晉平吳治陳國江左治壽陽蕪湖邾城牛渚歷陽馬頭壽春姑孰不常厥居安帝之末帝欲開拓河南綏定豫土割揚州大江以西大雷以北悉屬豫州豫州基址因此而立帝既平關洛置司州刺史治虎牢領河南滎陽弘農實土三郡河內東京兆二僑郡雍州仍僑治襄陽秦幷州刺史鎮蒲阪毛德祖既自蒲阪退屯虎牢則幷州當寄治虎牢也雍於用翻以相國參軍南陽劉湛為長史決府州事府州都督府及豫州也常自比管葛謂管仲諸葛亮也不為文章不喜談議喜許記翻王甚重之五月乙酉魏更諡宣武帝曰道武帝魏主嗣永興二年諡父珪曰宣武皇帝更古衡翻魏淮南公司馬國璠池陽子司馬道賜謀外叛司馬文思告之庚戌魏主殺國璠道賜賜文思爵鬱林公國璠等降魏見上卷晉安帝義熙十三年璠孚袁翻坐族誅者數十人章安侯封懿之子玄之當坐魏主以玄之燕朝舊族慕容廆興於昌黎封氏依之遂世仕於燕貴顯玄之曰弟子磨奴早孤乞全其命乃殺玄之四子而宥磨奴六月壬戌王至建康傅亮諷晉恭帝禪位於宋具詔草呈帝使書之帝欣然操筆謂左右曰桓玄之時晉氏已無天下重為劉公所延將二十載晉安帝元興三年裕討桓玄至是凡十七年操千高翻重直龍翻載子亥翻本所甘心遂書赤紙為詔甲子帝遜于琅邪第百官拜辭祕書監徐廣流涕哀慟晉武帝泰始元年受禪歲在乙酉建興四年長安陷歲在丙子凡五十二年次年元帝建號於江東改元建武至是年歲在庚申凡一百單三年西東享國共一百五十七年而亡丁卯王為壇於南郊即皇帝位禮畢自石頭備法駕入建康宮徐廣又悲感流涕侍中謝晦謂之曰徐公得無小過廣曰君為宋朝佐命朝直遙翻身是晉室遺老悲歡之事固不可同廣邈之弟也徐邈為晉孝武所親重帝臨太極殿大赦改元其犯鄉論清議一皆蕩滌與之更始犯鄉論清議蓋得罪於名教者更工衡翻裴子野論曰昔重華受終四凶流放書堯使舜嗣位正月上日受終於文祖流共工于幽州放驩兜于崇山竄三苗于三危殛鯀于羽山四罪而天下咸服重直龍翻頑民遷洛武王克殷遷頑民于洛邑鄉論清議除之過矣奉晉恭帝為零陵王優崇之禮皆倣晉初故事即宮于故秣陵縣沈約曰秣陵縣本治去京邑六十里今故治村是也晉安帝義熙九年移治京邑在鬬場恭帝元熙元年省揚州禁防參軍縣移治其處冠五玩翻將即亮翻降褚后為王追尊皇考為孝穆皇帝皇妣趙氏為孝穆皇后尊王太后蕭氏為皇太后帝父翹娶趙氏生帝而殂繼室以蕭氏及即位春秋已高每旦入朝太后朝直遙翻未嘗失時刻詔晉氏封爵當隨運改獨置始興廬陵始安長沙康樂五公降爵為縣公及縣侯始興廬陵始安長沙皆郡公獨康樂縣公耳據南史降始興郡公為華容縣公廬陵公為柴桑縣公始安公為荔浦縣侯長沙公為醴陵縣侯樂音洛其宣力義熙豫同艱難者一仍本秩庚午以司空道憐為太尉封長沙王追封司徒道規為臨川王以道憐子義慶襲其爵其餘功臣徐羨之等增位進爵各有差追封劉穆之為南康郡公王鎮惡為龍陽縣侯上每歎念穆之曰穆之不死當助我治天下治直之翻可謂人之云亡邦國殄瘁詩瞻卬之辭瘁秦醉翻穆之死人輕易我易以豉翻立皇子桂陽公義真為廬陵王彭城公義隆為宜都王義康為彭城王己卯改泰始曆為永初曆以元改曆魏主如翳犢山遂至馮滷池據北史翳犢山在平城之西五原之東馮滷池即五原鹽池唐屬鹽州界滷龍五翻驛召崔浩告之曰卿往年之言驗矣浩言見上卷晉安帝義熙十四年秋七月丁酉魏主如五原甲辰詔以涼公歆為都督高昌等七郡諸軍事征西大將軍酒泉公秦王熾磐為安西大將軍熾昌志翻交州刺史杜慧度擊林邑大破之林邑屢為寇故慧度擊之林邑乞降前後為所鈔掠者皆遣還降戶江翻鈔楚交翻慧度在交州為政纖密一如治家治直之翻吏民畏而愛之城門夜開道不拾遺己章甲十六行本己作丁乙十一行本同孔本同張校同未魏主如雲中河西王蒙遜欲伐涼先引兵攻秦浩亹浩亹音告門既至潛師還屯川巖涼公歆欲乘虛襲張掖宋繇張體順切諫不聽太后尹氏謂歆曰汝新造之國地狹民希自守猶懼不足何暇伐人先王臨終李暠卒見上卷晉安帝義熙十三年深慎用兵保境寧民以俟天時言猶在耳柰何棄之蒙遜善用兵非汝之敵數年以來常有兼幷之志汝國雖小足為善政脩德養民靜以待之彼若昏暴民將歸汝若其休明休美也豈得輕為舉動僥冀非望以吾觀之非但喪師喪息浪翻殆將亡國亦不聽宋繇歎曰今茲大事去矣歆將步騎三萬東出將即亮翻騎奇寄翻蒙遜聞之曰歆已入吾術中然聞吾旋師必不敢前乃露布西境云已克浩亹將進攻黃谷此露布非必建之漆竿如魏晉告捷之制但露檄布言其事耳喜進入都瀆澗蒙遜引兵擊之戰於懷城歆大敗或勸歆還保酒泉歆曰吾違老母之言以取敗不殺此胡何面目復見我母復扶又翻遂勒兵戰於蓼泉為蒙遜所殺歆弟酒泉太守翻新城太守預領羽林右監密左將軍眺右將軍亮西奔敦煌敦徒門翻蒙遜入酒泉安帝隆安四年李暠據敦煌凡二主二十一年而滅士民安堵以宋繇為吏部郎中委之選舉涼之舊臣有才望者咸禮而用之以其子牧犍為酒泉太守犍居言翻守式又翻敦煌太守李恂翻之弟也與翻等棄敦煌奔北山蒙遜以索嗣之子元緒行敦煌太守索嗣死事見一百十一卷晉安帝隆安四年索昔各翻蒙遜還姑臧見涼太后尹氏而勞之尹氏曰李氏為胡所滅知復何言蒙遜張掖盧水胡也勞力到翻復扶又翻下可復同今母子之命在人掌握柰何傲之且國亡子死曾無憂色何也尹氏曰存亡死生皆有天命柰何更如凡人為兒女子之悲乎吾老婦人國亡家破豈可復惜餘生為人臣妾乎惟速死為幸耳蒙遜嘉而赦之娶其女為牧犍婦八月辛未追諡臧氏為敬皇后癸酉立王太子義符為皇太子閏月壬午詔晉帝諸陵悉置守衞九月秦振武將軍王基等襲河西王蒙遜胡園戍俘二千餘人而還還從宣翻又如字李恂在敦煌有惠政索元緒粗險好殺大失人和好呼到翻郡人宋承張弘密信招恂冬恂帥數十騎入敦煌元緒東奔涼興涼興郡在唐瓜州常樂縣界帥讀曰率冠古玩翻改元永建河西王蒙遜遣世子政德攻敦煌恂閉城不戰十二月丁亥杏城羌酋狄溫子帥三千餘家降魏背夏降魏也酋慈由翻帥讀曰率降戶江翻是歲魏姚夫人卒追諡昭哀皇后姚夫人歸魏見一百十七卷晉安帝義熙十一年二年辛酉四二一春正月辛酉上祀南郊大赦裴子野論曰夫郊祀天地修歲事也赦彼有罪夫何為哉以揚州刺史廬陵王義真為司徒尚書僕射徐羨之為尚書令揚州刺史中書令傅亮為尚書僕射辛未魏主嗣行如公陽河西王蒙遜帥衆二萬攻李恂于敦煌秦王熾磐遣征北將軍木弈干輔國將軍元基攻上邽遇霖雨而還三月甲子魏陽平王熙卒魏主發代都六千人築苑東包白登周三十餘里河西王蒙遜築隄壅水以灌敦煌李恂乞降不許恂將宋承等舉城降恂自殺蒙遜屠其城獲恂弟子寶囚于姑臧李氏滅矣李寶卒以此開有唐之基天之所啟誰能廢之章甲十一行本請作詣空格作蒙遜二字乙十一行本同孔本同熊校同稱臣朝貢將即亮翻朝直遙翻夏四月己卯朔詔所在淫祠自蔣子文以下皆除之其先賢及以勳德立祠者不在此例吐谷渾王阿柴遣使降秦使疏吏翻降戶江翻秦王熾磐以阿柴為征西大將軍開府儀同三司安州牧白蘭王秦蓋以吐谷渾之地為安州六月乙酉魏主北巡至蟠羊山蟠羊山在參合陂東七月西巡至河河西王蒙遜遣右衞將軍沮渠鄯善建節將軍沮渠苟生帥衆七千伐秦秦王熾磐遣征北將軍木弈干等帥步騎五千拒之敗鄯善等于五澗五澗在洪池嶺北水經註五澗水出姑臧城東而西北流注馬城河敗補邁翻斬首二千而還初帝以毒酒一甖甖於耕翻瓦器也授前琅邪郎中令張偉使酖零陵王偉歎曰酖君以求生不如死乃於道自飲而卒卒子恤翻偉卲之兄也初帝領揚州辟卲為僚屬皆王之兄也王每生男帝輒令秀之兄弟方便殺之方便者隨宜處分不令其事彰露也深慮禍及與褚共處一室處昌呂翻自煑食於牀前飲食所資皆出褚故宋人莫得伺其隙伺相吏翻九月帝令淡之與兄右衞將軍叔度往視出就別室相見兵人踰垣而入進藥於王王不肯飲曰佛教自殺者不復得人身兵人以被掩殺之復扶又翻考異曰宋本紀九月己丑零陵王薨晉本紀九月丁丑據長曆九月丙午朔無己丑丁丑今不書日帝帥百官臨於朝堂三日自是之後禪讓之君罕得全矣帥讀曰率臨力鴆翻朝直遙翻庚戌魏主還宮冬十月己亥詔以河西王蒙遜為鎮軍大將軍開府儀同三司涼州刺史己亥魏主如代十一月辛亥葬晉恭帝于沖平陵帝帥百官瞻送十二月丙申魏主西巡至雲中秦王熾磐遣征西將軍孔子等帥騎二萬擊契汗禿真於羅川契欺訖翻汗音寒河西王蒙遜所署晉昌太守唐契據郡叛蒙遜遣世子政德討之契瑤之子也唐瑤見一百十一卷晉安帝隆安四年上之為宋公也謝瞻為宋臺中書侍郎其弟晦為右衞將軍時晦權遇已重自彭城還都迎家上為宋公建宋臺於彭城門巷填咽瞻在家驚駭謂晦曰汝名位未多而人歸趣乃爾趣七喻翻吾家素以恬退為業不願干豫時事交遊不過親朋而汝遂勢傾朝野朝直遙翻此豈門戶之福邪乃以籬隔門庭曰吾不忍見此及還彭城言於宋公曰臣本素士父祖位不過二千石瞻晦晉太常謝裒之玄孫於謝安為從孫是其高曾與謝安同其所自出但名位不及耳志用凡近榮冠臺府冠古玩翻位任顯密福過災生其應無遠特乞降黜以保衰門前後屢陳之晦或以朝廷密事語瞻語牛倨翻瞻故向親舊陳說用為戲笑以絕其言及上即位晦以佐命功位任益重瞻愈憂懼是歲瞻為豫章太守遇病不療臨終遺晦書曰吾得啟體幸全亦何所恨遺于季翻曾子有疾召門弟子曰啟予足啟予手詩云戰戰兢兢如臨深淵如屢薄冰而今而後吾知免夫小子孔子曰身體髮膚受之父母不敢毀傷父母全而生之子全而歸之弟思自勉勵為國為家居寵思危謝瞻有焉為謝晦殺身亡家張本為于偽翻三年壬戌四二二春正月甲辰朔魏主自雲中西巡至屋竇城據北史屋竇城在薛林山東癸丑以徐羨之為司空錄尚書事刺史如故江州刺史王弘為衞將軍開府儀同三司中領軍謝晦為領軍將軍兼散騎常侍入直殿省總統宿衞散悉亶翻騎奇寄翻徐羨之為桓脩撫軍中兵參軍與帝同府深相親結及起義兵益見親任直以志力局度一旦居廊廟朝野推服咸謂有宰臣之望沈密寡言不以憂喜見色朝直遙翻沈持林翻見賢遍翻頗工弈棋觀戲常若未解解戶買翻曉也當世倍以此推之傅亮蔡廓常言徐公曉萬事安異同嘗與傅亮謝晦宴聚亮晦才學辯博羨之風度詳整時然後言鄭鮮之歎曰觀徐傅言論不復以學問為長復扶又翻秦征西將軍孔子等大破契汗禿真契欺訖翻汗音寒禿吐谷翻獲男女二萬口牛羊五十餘萬頭禿真帥騎數千西走其別部樹奚帥戶五千降秦帥讀曰率降戶江翻二月丁丑詔分豫州淮以東為南豫州治歷陽以彭城王義康為刺史義熙之初帝欲開拓河南綏定豫土至九年割揚州大江以西大雷以北悉屬豫州至是以淮西之地為北豫州治汝南沈約志南豫州領歷陽南譙廬江南汝陰南梁晉熙弋陽安豐南汝南新蔡東郡南潁潁川西汝陰汝陽陳留南陳左郡邊城左郡光城左郡十九郡按徐志及永初郡國志止領十三郡蓋沈志有景平以後續置郡在其間也治臨湘晉安帝義熙十三年省湘州今復置臨湘漢舊縣唐為潭州長沙縣丙戌魏主還宮三月上不豫太尉長沙王道憐司空徐羨之尚書僕射傅亮領軍將軍謝晦護軍將軍檀道濟並入侍醫藥㣥臣請祈禱神祇上不許唯使侍中謝方明以疾告宗廟而已上性不信奇怪微時多符瑞及貴史官審以所聞上拒而不答檀道濟出為鎮北將軍南兗州刺史鎮廣陵悉監淮南諸軍晉成帝立南兗州治京口自此治廣陵領廣陵海陵山陽盱眙秦郡南沛等郡監工銜翻皇太子多狎㣥小謝晦言於上曰陛下春秋既高宜思存萬世神器至重不可使負荷非才晦發此言已有廢昏立明之意荷下可翻又音如字廬陵何如晦曰臣請觀焉出造廬陵王義真造七到翻義真盛欲與談晦不甚答還曰德輕於才非人主也丁未出義真為都督南豫豫雍司秦幷六州諸軍事車騎將軍開府儀同三司南豫州刺史為晦等殺義真張本雍於用翻騎奇寄翻大州率加都督多者或至五十州不可復詳載矣迄宋之季境內惟二十二州至梁武帝時沿邊分置諸州始有五十州復扶又翻帝疾瘳瘳丑留翻己未大赦秦雍流民南入梁州庚申遣使送絹萬匹且漕荊雍之穀以賑之秦雍之雍古雍州也關中之地荊雍之雍晉末所置南雍州也治襄陽使疏吏翻賑之忍翻刁逵之誅也事見一百十三卷晉安帝元興三年辛酉彌帥數十人入京口帥讀曰率太尉留府司馬陸仲元擊斬之時長沙王道憐以太尉鎮京口入侍醫藥故有留府乙丑魏河南王曜卒夏四月甲戌魏立皇子燾為太平王拜相國加大將軍丕為樂平王彌為安定王範為樂安王健為永昌王崇為建寧王俊為新興王乙亥詔封仇池公楊盛為武都王秦王熾磐以折衝將軍乞伏是辰為西胡校尉築列渾城於汁羅以鎮之汁羅蓋即羅川之地五月帝疾甚召太子誡之曰檀道濟雖有幹略而無遠志非如兄韶有難御之氣也徐羨之傅亮當無異圖謝晦數從征伐頗識機變若有同異必此人也帝固有疑晦之心矣數所角翻後世若有幼主朝事一委宰相母后不煩臨朝朝直遙翻司空徐羨之中書令傅亮領軍將軍謝晦鎮北將軍檀道濟同被顧命癸亥帝殂於西殿年六十自是以後南北朝之君沒皆稱殂被皮義翻顧音古嚴整有法度被服居處儉於布素遊宴甚稀嬪御至少處昌呂翻少詩沼翻嘗得後秦高祖從女後秦王興廟號高祖從才用翻頗以廢事謝晦微諫即時遣出財帛皆在外府內無私藏藏徂浪翻嶺南嘗獻入筒細布一端八丈帝惡其精麗勞人揚雄蜀都賦曰布則蜘蛛作絲不可見風筩中黃潤一端數金言其細也惡烏路翻彈徒丹翻以布還之幷制嶺南禁作此布公主出適遣送不過二十萬無錦繡之物內外奉禁莫敢為侈靡太子即皇帝位年十七大赦尊皇太后曰太皇太后立司馬氏為皇后后晉恭帝女海鹽公主也魏主服寒食散頻年藥發災異屢見見賢遍翻頗以自憂遣中使密問白馬公崔浩曰使疏吏翻屬者日食趙代之分屬者猶言比者近者屬之欲翻分扶問翻恐一旦不諱諸子並少少詩照翻將若之何其為我思身後之計為于偽翻浩曰陛下春秋富盛行就平愈必不得已請陳瞽言自聖代龍興不崇儲貳是以永興之始社稷幾危事見一百十五卷晉安帝義熙五年幾居希翻又音祁選賢公卿以為師傅左右信臣以為賓友入總萬機出撫戎政如此則陛下可以優遊無為頤神養壽萬歲之後國有成主民有所歸姦宄息望禍無自生矣皇子燾年將周星歲星十二年一周天立子以長禮之大經若必待成人然後擇之倒錯天倫則召亂之道也倒錯謂廢長立少長知兩翻下同復扶又翻對曰立長則順置賢則人服燾長且賢天所命也帝從之立太平王燾為皇太子使之居正殿臨朝為國副主朝直遙翻以長孫嵩及山陽公奚斤魏收官氏志後魏獻帝弟為達奚氏孝文改為奚氏坐東廂西面崔浩與太尉穆觀散騎常侍代人丘堆為右弼後魏孝文以獻帝第五兄敦丘氏為丘氏東面百官總己以聽焉坐東廂者西面坐西廂者東面皆朝拱皇太子時隱而窺之自隱蔽其身而窺之也斷丁亂翻大悅謂侍臣曰嵩宿德舊臣歷事四世功存社稷嵩事昭成帝及道武帝明元帝及太子燾為四世名聞遐邇聞音問同曉解俗情明練於事觀達於政要識吾旨趣浩博聞強識精察天人堆雖無大用然在公專謹以此六人輔相太子吾與汝曹巡行四境伐叛柔服足以得志於天下矣解胡買翻行下孟翻嵩實姓拔拔斤姓達奚觀姓丘穆陵堆姓丘敦是時魏之㣥臣出於代北者姓多重複及高祖遷洛始皆改之舊史惡章甲十六行本惡作患乙十一行本同孔本同張校同其煩雜難知故皆從後姓以就簡易今從之魏主又以典東西部劉絜門下奏事代人古弼重直龍翻惡烏路翻易以豉翻道武天賜四年置侍官侍直左右出納詔命魏書官氏志內入諸姓吐奚氏為古氏直郎徒河盧魯元拓跋與慕容段氏同出鮮卑其後強盛謂東種為徒河官氏志內入諸姓吐伏盧氏為盧氏使之給侍東宮分典機要宣納辭令太子聰明有大度㣥臣時奏所疑帝曰此非我所知當決之汝曹國主也六月壬申以尚書僕射傅亮為中書監尚書令以領軍將軍謝晦領中書令侍中謝方明為丹楊尹方明善治郡治直之翻所至有能名承代前人不易其政必宜改者則以漸移變使無迹可尋戊子長沙景王道憐卒魏建義將軍刁雍寇青州州兵擊破之雍收散卒走保大鄉山魏收地形志濟陰郡乘氏縣有大鄉城雍於容翻秋七月己酉葬武皇帝于初寧陵陵在丹陽建康縣蔣山河西王蒙遜遣前將軍沮渠成都帥衆一萬耀兵嶺南遂屯五澗蓋耀兵於洪池嶺南而還屯五澗也沮子余翻帥讀曰率下同秦王熾磐遣征北將軍出連虔等帥騎六千擊之初魏主聞高祖克長安見上卷晉安帝義熙十三年遣使請和自是每歲交聘不絕及高祖殂殿中將軍沈範等奉使在魏晉置二衞仍置殿中將軍使疏吏翻下同及河魏主遣人追執之議發兵取洛陽虎牢滑臺崔浩諫曰陛下不以劉裕欻起納其使貢欻許勿翻裕亦敬事陛下不幸今死遽乘喪伐之雖得之不足為美且國家今日亦未能一舉取江南也而徒有伐喪之名禮不伐喪為于偽翻臣謂宜遣人弔祭存其孤弱恤其凶災使義聲布於天下則江南不攻自服矣況裕新死黨與未離兵臨其境必相帥拒戰師讀曰率功不可必不如緩之待其強臣爭權變難必起難乃旦翻然後命將出師可以兵不疲勞坐收淮北也將即亮翻魏主曰劉裕乘姚興之死而滅之事見一百十七卷晉安帝義熙十二年及上卷義熙十三年何為不可浩曰不然姚興死諸子交爭故裕乘舋伐之今江南無舋不可比也舋與釁同許覲翻魏主不從假司空奚斤節加晉兵大將軍行揚州刺史使督宋兵將軍交州刺史周幾後魏孝文以獻帝次兄普氏之後為周氏晉兵宋兵吳兵鄭兵楚兵等將軍皆魏所置乙巳魏主如灅南宮遂如廣甯晉愍帝建興元年猗盧築新平城於灅北其後築宮於灅南酈道元曰廣甯去平城五十里廣甯縣漢屬上谷郡晉太康中立為郡灅力水翻辛亥魏人築平城外郭周圍三十二里魏主如喬山五代志喬山在涿郡懷戎縣劉昫曰唐媯州懷戎縣後漢上谷之潘縣也冬十月甲戌還宮魏軍將發公卿集議於監國之前監工銜翻以先攻城與先略地奚斤欲先攻城崔浩曰南人長於守城昔苻氏攻襄陽經年不拔事見一百四卷晉孝武太元三年四年若不時克挫傷軍勢敵得徐嚴而來我怠彼銳此危道也不如分軍略地至淮為限列置守宰收斂租穀則洛陽滑臺虎牢更在軍北絕望南救必沿河東走不則為囿中之物不讀曰否何憂其不獲也公孫表固請攻城魏主從之於是奚斤等帥步騎二萬帥讀曰率騎奇寄翻濟河營於滑臺之東時司州刺史毛德祖戍虎牢東郡太守王景度告急於德祖王景度以東郡太守戍滑臺翟萇伯翻將即亮翻下同先是司馬楚之聚衆在陳留之境聞魏兵濟河遣使迎降先悉薦翻使疏吏翻降戶江翻魏以楚之為征南將軍荊州刺史使侵擾北境此謂宋之北境邵陵縣漢屬汝南郡晉以後屬潁川郡杜佑曰蔡州郾陵縣有古召陵城楚之引兵襲憐不克會臺送軍資憐出迎之酸棗民王玉馳以告魏酸棗縣自漢以來屬陳留郡唐屬滑州丁酉魏尚書滑稽引兵襲倉垣康曰滑戶八切姓也本滑伯國姬姓其後因國為氏漢有詹事滑典陳留太守馮翊嚴稜詣斤降魏以王玉為陳留太守給兵守倉垣魏收地形志陳留郡治浚儀縣有倉垣城奚斤等攻滑臺不拔求益兵魏主怒切責之壬辰自將諸國兵五萬餘人南出天關踰恆嶺此即晉孝武太元二十一年燕主垂襲魏平城之路魏主珪既平中山自望都鐵關鑿恆嶺至代五百餘里將即亮翻下同秦出連虔與河西沮渠成都戰禽之沮渠成都時屯五澗十一月魏太子燾將兵出屯塞上魏主南援攻河南之兵故太子屯塞上以備柔然守式又翻庚戌奚斤等急攻滑臺拔之王景度出走景度司馬陽瓚為魏所執不降而死瓚藏旱翻降戶江翻魏主以成皋侯苟兒為兗州刺史鎮滑臺魏書官氏志內入諸姓若干氏為苟氏斤等進擊翟廣等於土樓破之土樓在虎牢東九域志澶州臨河縣有土樓鎮毛德祖與戰屢破之魏主別遣黑矟將軍于栗磾將三千人屯河陽謀取金墉矟色角翻磾丁奚翻德祖遣振威將軍竇晃等緣河拒之十二月丙戌魏主至冀州遣楚兵將軍徐州刺史叔孫建將兵自平原濟河徇青兗豫州刺史劉粹遣治中高道瑾將步騎五百據項城宋豫州領汝南新蔡譙梁陳南頓潁川汝陽汝陰陳留等郡徐州領彭城沛下邳蘭陵東海東莞東安琅邪淮陽陽平濟陰北濟陰鍾離馬頭等郡與奚斤幷力攻竇晃等破之魏主遣中領軍代人娥清期思侯柔然閭大肥將兵七千人會周幾叔孫建南渡河軍于碻磝碻磝城臨河津後魏為濟州治所水經註曰城即故茌平縣也癸未兗州刺史徐琰棄尹卯南走水經濟水自須昌縣西北逕漁山東又北過穀城縣西註云濟水側岸有尹卯壘南去漁山四十餘里是穀城縣界故春秋之小穀城也金鄉縣漢屬山陽晉屬高平蓋晉末分置郡也司馬愛之季之先聚衆於濟東皆降於魏濟水之東則青州界濟子禮翻戊子魏兵逼虎牢青州刺史東莞竺夔鎮東陽城青州自曹嶷以來治廣固武帝克慕容超夷其城青州遷治東陽城在廣縣西南宋白曰今青州治益都縣州東城即東陽城晉武帝太康初分琅邪立東莞郡青州領齊濟南高密樂安平昌北海東萊太原長廣等郡莞音官使疏吏翻己丑詔南兗州刺史檀道濟監征討諸軍事監工銜翻與王仲德共救之廬陵王義真遣龍驤將軍沈叔貍將三千人就劉粹量宜赴援義真時鎮壽陽劉粹時鎮懸瓠驤思將翻量音良秦王熾磐徵秦州牧曇達為左丞相征東大將軍曇徒含翻營陽王諱義符小字車兵武帝長子也考異曰宋本紀高氏小史皆作滎陽臧后謝晦蔡廓傳作營陽營陽南方郡名也今從之景平元年癸亥四二三春正月己亥朔大赦改元辛丑帝祀南郊魏于栗磾攻金墉癸卯河南太守王涓之棄城走魏主以栗磾為豫州刺史鎮洛陽磾丁奚翻魏主南巡恆嶽恆戶登翻丙辰至鄴去年十二月巳書魏主至冀州今又書南巡恆嶽必有一誤己未詔徵豫章太守蔡廓為吏部尚書自晉以來謂吏部尚書為大尚書以其在諸曹之右且其權任要重也選事若悉以見付不論不論者不復置議論於辭受之際也不能拜也亮以語錄事尚書徐羨之語牛倨翻錄事尚書當作錄尚書事羨之曰黃散以下悉以委蔡吾徒不復措懷黃散謂黃門侍郎及散騎常侍侍郎也復扶又翻故宜共參同異廓曰我不能為徐干木署紙尾為于偽翻遂不拜干木羨之小字也選案黃紙錄尚書與吏部尚書連名選案選曹文案也洪邁曰葉石林言制敕用黃紙始高宗時非也晉恭帝時王韶之遷黃門侍郎凡諸詔黃皆其辭也則東晉時已用黃紙寫詔矣又宋明帝時吏部尚書褚淵就赭圻行選是役也皆先戰授位版檄不供由是有黃紙札則宋世就軍補官賞功又多用黃紙矣又徐羨之召蔡廓為吏部尚書廓曰我不能為徐干木署紙尾則是宋世以黃紙為案矣至齊世立左右丞書案之制曰白案則右丞書名在上左丞次書黃案則左丞上書右丞下書雖世遠莫知何者之為黃案何者之為白案所可知者其紙已分黃白二色決矣至東昏時閹人以紙包裹魚肉還家並是五省黃案然則文書之用黃紙其來已久高宗時凡謄寫詔制以下州縣始皆用黃紙耳概言詔書用黃紙始於高宗不審也選須絹翻沈約論曰蔡廓固辭銓衡恥為志屈豈不知選錄同體義無偏斷乎吏部典選錄尚書兼錄諸曹尚書事斷丁亂翻不欲居通塞之任銓衡之任得其人則賢路通不得其人則賢路塞塞悉則翻庚申檀道濟軍于彭城魏叔孫建入臨淄所向城邑皆潰考異曰索虜傳云虜又遣楚兵將軍徐州刺史安平公涉歸幡能健越兵將軍青州刺史臨淄侯薛道千陳兵將軍淮州刺史壽張子張模東擊青州所向城邑皆奔走本紀亦云安平公涉歸寇青州按後魏書無涉歸等姓名蓋皆胡中舊名即叔孫建等也其不入城者使各依據山險芟夷禾稼芟所銜翻魏軍至無所得食濟南太守垣苗帥衆依夔垣苗棄歷城依夔濟子禮翻帥讀曰率下同刁雍見魏主於鄴魏主曰叔孫建等入青州民皆藏避攻城不下彼素服卿威信雍先聚兵河濟之間雍於容翻乃以雍為青州刺史給雍騎使行募兵以取青州魏兵濟河向青州者凡六萬騎騎奇寄翻刁雍募兵得五千人撫慰士民皆送租供軍柔然寇魏邊二月戊辰魏築長城自赤城西至五原延袤二千餘里袤音茂備置戍卒以備柔然丁丑太皇太后蕭氏殂河西王蒙遜及吐谷渾王阿柴皆遣使入貢使疏吏翻庚辰詔以蒙遜為都督涼秦河沙四州諸軍事驃騎大將軍涼州牧河西王以阿柴為督塞表諸軍事安西將軍沙州刺史澆河公吐谷渾據塞外沙漒之地故令督塞表諸軍事澆堅堯翻三月壬子葬孝懿皇后于興寧陵興寧陵在晉陵丹徒縣諫壁里雩山魏奚斤公孫表等共攻虎牢魏主自鄴遣兵助之毛德祖於城內穴地入七丈分為六道出魏圍外募敢死之士四百人使參軍范道基等帥之從穴中出掩襲其後魏軍驚擾斬首數百級焚其攻具而還還從宣翻又如字魏兵雖退散隨復更合復扶又翻下復嬰未復復作復戰同攻之益急奚斤自虎牢將步騎三千攻潁川太守李元德等於許昌元德等敗走魏以潁川人庾龍為潁川太守戍許昌毛德祖出兵與公孫表大戰從朝至晡殺魏兵數百會奚斤自許昌還合擊德祖大破之亡甲士千餘人復嬰城自守魏主又遣萬餘人從白沙渡河屯濮陽南濮陽對岸則頓丘之境白沙當在今澶州之界朝議以項城去魏不遠朝直遙翻下同非輕軍所抗使劉粹召高道瑾還壽陽若沈叔貍已進亦宜且追張追作退粹奏虜攻虎牢未復南向若遽攝軍捨項城則淮西諸郡無所憑依沈叔貍已頓肥口肥口肥水入淮之口時李元德帥散卒二百至項劉粹使助高道瑾戍守請宥其奔敗之罪朝議並許之乙巳魏主畋於韓陵山魏郡鄴縣有韓陵山至枋頭初毛德祖在北毛德祖本滎陽人武帝未取關洛德祖自北來歸表有權略德祖患之乃與交通音問密遣人說奚斤云表與之連謀每答表書多所治定此曹操間韓馬之智也說輸芮翻治直之翻斤疑之以告魏主先是表與太史令王亮少同營署好輕侮亮亮奏表置軍虎牢東不得便地故令賊不時滅魏主素好術數以為然積前後忿使人夜就帳中縊殺之先悉薦翻少詩照翻好呼到翻乙卯魏主濟自靈昌津靈昌津古延津也石勒襲劉曜塗出於此以河冰為神靈之助改曰靈昌津叔孫建將三萬騎逼東陽城城中文武纔一千五百人竺夔垣苗悉力固守時出奇兵擊魏破之魏步騎繞城列陳十餘里大治攻具夔作四重塹魏人填其三重為橦車以攻城陳讀曰陣重直龍翻治直之翻橦與撞同傳江翻擣也夔遣人從地道中出以大麻緪挽之令折緪居曾翻大索也又居鄧翻折而設翻魏人復作長圍進攻逾急歷時浸久城轉墮壞墮讀曰隳下墮其同戰士多死傷餘衆困乏旦暮且陷檀道濟至彭城以司青二州並急而所領兵少少詩沼翻不足分赴青州道近竺夔兵弱乃與王仲德兼行先救之甲子劉粹遣李元德襲許昌斬庾龍元德因留綏撫幷上租糧上時掌翻魏主至盟津于栗磾造浮橋於冶阪津郭緣生述征記曰踐土今冶阪城是水經註河陽縣故城在冶阪西北魏土地記云冶阪城舊名漢祖渡城險固南臨孟津在洛陽西北四十二里盟讀曰孟乙丑魏主引兵北濟西如河內娥清周幾閭大肥徇地至湖陸高平民屯聚而射之射而亦翻清等盡攻破高平諸縣滅數千家虜掠萬餘口兗州刺史鄭順之戍湖陸以兵少不敢出魏主又遣幷州刺史伊樓拔助奚斤攻虎牢伊婁虜複姓樓與婁同頗殺魏兵而將士稍零落夏四月丁卯魏主如成皋絕虎牢汲河之路北史虎牢乏水城內懸綆汲河魏主令連艦上施轒轀絕其汲路自督衆攻城竟不能下遂如洛陽觀石經石經後漢蔡邕所書者註詳見五十七卷漢靈帝熹平四年使疏吏翻叔孫建攻東陽墮其北城三十許步墮讀曰隳刁雍請速入建不許遂不克及聞檀道濟等將至雍又謂建曰賊畏官軍突騎以鎖連車為函陳函陳方陳也陳讀曰陣處處狹隘車不得方軌雍請將所募兵五千據險以邀之破之必矣將即亮翻時天暑魏軍多疫建曰兵人疫病過半若相持不休兵自死盡何須復戰今全軍而返計之上也己巳道濟軍于臨朐朐音劬考異曰裴子野宋略作乙巳按長曆是月丁卯朔無乙巳必己巳也壬申建等燒營及器械而遁道濟至東陽糧盡不能追竺夔以東陽城壞不可守移鎮不其城不其縣前漢屬琅邪郡後漢屬東萊郡晉屬長廣郡如淳曰其音基賢曰不其故城在今萊州即墨縣西南叔孫建自東陽趨滑臺趨七喻翻道濟分遣王仲德向尹卯道濟停軍湖陸仲德未至尹卯聞魏兵已遠還就道濟刁雍遂留鎮尹卯招集譙梁彭沛民五千餘家置二十七營以領之蠻王梅安帥渠帥數十人入貢于魏帥渠帥上讀曰率下所類翻初諸蠻本居江淮之間其後種落滋蔓種章勇翻蔓音萬布於數州東連壽春西通巴蜀北接汝潁往往有之在魏世不甚為患及晉稍益繁昌漸為寇暴及劉石亂中原諸蠻無所忌憚漸復北徙伊闕以南滿於山谷矣據史此諸蠻乃盤瓠之後也復扶又翻河西世子政德攻晉昌克之唐契及弟和甥李寶同奔伊吾唐契以晉昌叛河西見武帝永初二年歸附者至二千餘家臣於柔然柔然以契為伊吾王秦王熾磐謂其㣥臣曰今宋雖奄有江南夏人雄據關中皆不足與也獨魏主奕世英武賢能為用且讖云恆代之北當有真人吾將舉國而事之讖楚譖翻乃遣尚書郎莫者阿胡等入見于魏見賢遍翻貢黃金二百斤幷陳伐夏方略閏月丁未魏主如河內登太行至高都高都縣自漢以來屬上黨郡劉昫曰唐澤州晉城縣漢高都縣地行戶剛翻叔孫建自滑臺西就奚斤共攻虎牢虎牢被圍二百日被皮義翻無日不戰勁兵戰死殆盡而魏增兵轉多魏人毀其外城毛德祖於其內更築三重城以拒之魏人又毀其二重德祖唯保一城晝夜相拒將士眼皆生創重直龍翻人夜不得睡則眼眊燥以手揩之則生創創初良翻下同德祖撫之以恩終無離心時檀道濟軍湖陸劉粹軍項城沈叔貍軍高橋皆畏魏兵強不敢進丁巳魏人作地道以洩虎牢城中井井深四十丈深式禁翻山勢峻峭不可得防城中人馬渴乏被創者不復出血重以飢疫被皮義翻復扶又翻重直用翻魏仍急攻之己未城陷將士欲扶德祖出走德祖曰我誓與此城俱斃義不使城亡而身存也魏主命將士得德祖者必生致之將軍代人豆代田執德祖以獻豆姓也漢書有校尉豆如意皆為魏所虜唯參軍范嚴范改沈道基將二百人突圍南還將即亮翻魏士卒疫死者亦什二三奚斤等悉定司兗豫諸郡縣置守宰以撫之是時司州之地盡入於魏兗州之地自湖陸以南豫州之地自項城以南皆為宋守魏未能悉定諸郡縣也河南人安之徐羨之傅亮謝晦以亡失境土上表自劾劾戶概翻又戶得翻詔勿問徐羨之兄子吳郡太守珮之頗豫政事與侍中王韶之程道惠中書舍人邢安泰潘盛結為黨友時謝晦久病不堪見客珮之等疑其詐疾有異圖乃稱羨之意以告傅亮欲令亮作詔誅之亮時進中書監中書掌詔命我等三人同受顧命豈可自相誅戮諸君果行此事亮當角巾步出掖門耳宮門正南門曰端門左右二門謂之左掖門右掖門五月魏主還平城考異曰後魏帝紀五月庚寅還次鴈門庚寅車駕至自南巡必有一誤今皆不取六月己亥魏宜都文成王穆觀卒丙辰魏主北巡至參合陂秋七月章甲十六行本月下有癸酉二字乙十一行本同孔本同張校同退齋校同尊帝母張夫人為皇太后魏主如三會屋侯泉魏收地形志秀容郡肆盧縣治新會城真君七年併三會城屬焉辛丑如馬邑觀灅源灅力水翻柔然寇河西河西王蒙遜命世子政德擊之政德輕騎進戰騎奇寄翻為柔然所殺蒙遜立次子興為世子九月乙亥魏主還宮召奚斤還平城留兵守虎牢使娥清周幾鎮枋頭以司馬楚之所將戶口置汝南南陽南頓新蔡四郡晉惠帝分汝陰立新蔡郡分汝南立南頓郡魏未能有四郡之地僑置之耳冬十月癸卯魏人廣西宮外垣周二十里平城西宮也魏主珪天賜元年所築禿髮傉檀之死也事見一百十六卷晉安帝義熙十年傉奴沃翻許以番禾西安二郡處之誘音酉番音盤處昌呂翻且借之兵使伐秦報其父讎復取故地虎臺陰許之事泄而止秦王熾磐之后虎臺之妹也熾磐待之如初后密與虎臺謀曰秦本我之仇讎雖以婚姻待之蓋時宜耳先王之薨又非天命遺令不治者欲全濟子孫故也治直之翻不治謂被鴆而不解也事見一百十六卷晉安帝義熙十年為人子者豈可臣妾於仇讎而不思報復乎乃與武衞將軍越質洛城謀弒熾磐后妹為熾磐左夫人章甲十六行本人下有有寵二字乙十一行本同孔本同張校同退齋校同知其謀而告之熾磐殺后及虎臺等十餘人十一月魏周幾寇許昌許昌潰潁川太守李元德奔項戊辰魏人圍汝陽汝陽太守王公度亦奔項沈約曰晉太康地志王隱地道無汝陽郡應是江左分汝南立汝陽漢舊縣屬汝南郡將即亮翻魏人夷許昌城毀鍾城以立封疆而還鍾城在泰山界夷許昌以立豫州封疆毀鍾城以立兗州封疆也還從宣翻又如字己巳魏太宗殂年三十二壬申世祖即位世祖諱燾明元皇帝之長子也蕭子顯曰燾字佛貍十二月庚子魏葬明元帝于金陵此雲中之金陵據北史道武帝葬盛樂金陵蓋魏諸陵皆曰金陵杜佑曰後魏盛樂縣在雲中郡魏主追尊其母杜貴嬪為密皇后密諡也以襄城公盧魯元為中書監會稽公劉絜為尚書令會工外翻司衞監尉眷散騎侍郎劉庫仁等八人分典四部司衞監蓋魏所置以掌宿衞此又一劉庫仁非什翼犍所用之劉庫仁也尉音紆勿翻散悉亶翻騎奇寄翻四部東西南北四部也古真之弟子也尉古真見一百六卷晉孝武太元十年以河內鎮將代人羅結為侍中外都大官魏書官氏志內入諸姓叱羅氏為羅氏魏有外都大官內都大官將即亮翻結時年一百七精爽不衰杜預曰爽明也売心親任之使兼長秋卿監典後宮出入臥內監工銜翻年一百一十乃聽歸老朝廷每有大事遣騎訪焉騎奇寄翻又十年乃卒左光祿大夫崔浩研精經術練習制度魏晉以來左右光祿大夫在光祿大夫上假金章紫綬研精者窮其精力軍國書詔無不關掌浩不好老莊之書曰此矯誣之說不近人情託聖賢以伸其說謂之矯聖賢無是事寓言而加詆謂之誣好呼到翻近其靳翻仲尼所師史記及大戴記皆云仲尼問禮於老耼耼他甘翻敗補邁翻治直吏翻尤不信佛法曰何為事此胡神及世祖即位左右多毀之帝不得已命浩以公歸第然素知其賢每有疑議輒召問之浩纖妍潔白如美婦纖細也妍美好也既歸第因脩服食養性之術初嵩山道士寇謙之讚之弟也修張道陵之術自言嘗遇老子降命謙之繼道陵為天師張道陵後漢人修五斗米道俗所謂天師也今道家科戒蓋始於此又遇神人李譜文譜博古翻云老子之玄孫也授以圖籙真經六十餘卷使之輔佐北方太平真君出天宮靜輪之法其中數篇李君之手筆也謙之奉其書獻於魏主朝野多未之信朝直遙翻崔浩獨師事之從受其術且上書贊明其事曰臣聞聖王受命必有天應河圖洛書皆寄言於蟲獸之文河出圖伏羲象以畫八卦洛出書禹得之以敍九疇故曰龍圖授羲龜書畀姒又尚書中候曰堯沈璧於洛玄龜負書背中赤文朱字止於壇畔舜禮壇于河畔黃龍負卷舒圖出于水手筆粲然辭旨深妙自古無比豈可以世俗常慮而忽上靈之命臣竊懼之帝欣然使謁者奉玉帛牲牢祭嵩嶽迎致謙之弟子在山中者以崇奉天師顯揚新法宣布天下起天師道場於平城之東南重壇五層水經註濕水南逕平城之東水左有大道壇寇謙之所建也濕水即灅水每月設廚會數千人臣光曰老莊之書大指欲同死生輕去就而為神仙者服餌修鍊以求輕舉鍊草石為金銀谷永說漢成帝曰諸言世有仙人服食不終之藥遙興輕舉登遐倒景覽觀縣圃浮游蓬萊黃冶變化皆姦人惑衆挾左道懷詐偽以欺罔世主服餌修鍊以求輕舉即谷永所謂服食不終之藥遙興輕舉者也鍊草石以為金銀即谷永所謂黃冶變化者也是以劉歆七略敍道家為諸子神仙為方技以其相戾故七略不得合為一符水禁呪即張道陵之術至今循之其訛甚矣崔浩不喜佛老之書而信謙之之言其故何哉喜許記翻昔臧文仲祀爰居孔子以為不智海鳥爰居避風止於魯東門之外臧文仲使國人祀之孔子以為臧文仲不智者三祀爰居其一也其為爰居亦大矣詩三百一言以蔽之曰思無邪君子之於擇術可不慎哉聶崇岐標點王崇武覆校
