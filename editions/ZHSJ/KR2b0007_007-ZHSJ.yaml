body:
  text: 資治通鑑卷第七朝散大夫右諫議大夫權御史中丞充理檢使上護軍賜紫金魚袋臣奉敕編集後學天台音註秦紀二始皇帝下二十年二十年荊軻至咸陽因王寵臣蒙嘉卑辭以求見王大喜朝服設九賓而見之韋昭曰九賓周禮九儀也謂公侯伯子男孤卿大夫士也史記正義曰劉云設文物大備即謂九賓不得以周禮九賓義為釋劉原父曰賓謂傳擯之擯九賓擯者九人圖窮而匕首見見賢遍翻因把王袖而揕之未至身王驚起袖絕荊軻逐王王環柱而走環音宦㣥臣皆愕卒起不意愕五各翻卒讀曰猝後倉卒之卒皆同音盡失其度而秦法㣥臣侍殿上者不得操尺寸之兵操七刀翻左右以手共搏之且曰王負劍負劍王遂拔以擊荊軻斷其左股斷丁管翻荊軻廢乃引匕首擿王中銅柱索隱曰擿與擲同古字耳音持益翻中竹仲翻自知事不就罵曰事所以不成者以欲生劫之必得約契以報太子也遂體解荊軻以徇體解支解也解佳買翻益發兵詣趙就王翦以伐燕與燕師代師戰於易水之西大破之二十一年二十一年冬十月王翦拔薊薊音計燕王及太子率其精兵東保遼東李信急追之代王嘉遺燕王書遺于季翻令殺太子丹以獻丹匿衍水中索隱曰衍水在遼東欲以獻王王復進兵攻之復扶又翻二十一年王賁伐楚賁音奔翦之子也取十餘城王問於將軍李信曰吾欲取荊王父莊襄王諱楚故謂楚為荊度徒洛翻李信曰不過用二十萬王以問王翦王翦曰非六十萬人不可王曰王將軍老矣何怯也遂使李信蒙恬將二十萬人伐楚王翦因謝病歸頻陽王翦頻陽人也班志頻陽縣屬京兆秦厲公所置應劭註曰縣在頻水之陽杜佑曰美陽本漢頻陽縣故城在縣西南三十里宋白曰因界內頻陽山而名二十二年二十二年王賁伐魏引河溝以灌大梁班志陳留郡浚儀縣故大梁狼湯水所經也水經渠水出滎陽北河東南流至浚儀縣註云始皇使王賁攻魏斷故渠引水東南出以灌大梁因謂之梁溝城壞魏王假降殺之遂滅魏降戶江翻王使人謂安陵君曰寡人欲以五百里地易安陵安陵君曰大王加惠以大易水甚幸雖然臣受地於魏之先王願終守之弗敢易王義而許之二十二年李信攻平輿班志汝南郡有平輿縣春秋沈子之國輿音預史記正義讀如字班志汝南郡有寖縣應劭曰孫叔敖子所邑之寖丘是也世祖更名固始徐廣曰寖今固始寢丘師古曰寖子衽翻劉仲馮曰據後淮陽國已有固始此寖疑自別地余謂郡縣離合無常蓋後來併寢入固始也杜佑曰潁州治汝陰縣有寢丘秦蒙恬攻寢即此信又攻鄢郢破之此鄢郢非楚故都之鄢郢也楚故都為白起所取秦已置南郡據楚都壽春以壽春為郢則其前自郢徙陳亦必以陳為郢矣然則此郢乃陳也鄢即潁川之鄢陵與平輿城父地皆相近或曰鄢郢當作鄢陵與蒙恬會城父班志沛郡有城父縣索隱曰在汝南即良鄉史記正義曰言引兵而會城父則是汝州郟城縣東父城者也括地志汝州郟城縣東四十里有父城故城即服虔云城父楚北境者也又許州葉縣東北四十五里亦有父城故城即杜預云襄城城父縣者也此一城父城之名耳服虔城父是誤也左傳及水經註云楚大城城父使太子建居之十三州志云太子建所居城父謂今亳州城父是也此三家之說是城父之名班志云潁川父城縣沛郡城父縣據縣屬郡其名自分三日三夜不頓舍大敗李信入兩壁殺七都尉此郡都尉將兵從伐楚者也秦列郡有守有尉有監然秦漢之制行軍亦自有都尉敗補邁翻王聞之大怒自至頻陽謝王翦曰寡人不用將軍謀李信果辱秦軍將軍雖病獨忍棄寡人乎王翦謝病不能將王曰已矣勿復言將即亮翻復扶又翻王翦曰必不得已用臣非六十萬人不可王曰為聽將軍計耳於是王翦將六十萬人伐楚王送至霸上應劭曰霸上地名在霸水上在長安東三十里霸水古之滋水秦穆公更名王曰將軍行矣何憂貧乎王翦曰為大王將有功終不得封侯故及大王之嚮臣以請田宅為子孫業耳王大笑王翦既行至關此當是出武關也或曰將軍之乞貸亦已甚矣貸與貣同吐得翻從人求物也王翦曰不然王怚中而不信人史記註怚音麤徐廣曰一作粗今空國中之甲士而專委於我我不多請田宅為子孫業以自堅顧令王坐而疑我矣二十三年二十三年王翦取陳以南至平輿楚人聞王翦益軍而來乃悉國中兵以禦之王翦堅壁不與戰楚人數挑戰數所角翻挑戰者擿嬈敵以求戰也挑徒了翻終不出王翦日休士洗沐而善飲食撫循之飲於禁翻食祥吏翻後以義推親與士卒同食久之王翦使人問軍中戲乎對曰方投石超距徐廣曰超一作拔裴駰曰據漢書云甘延壽投石拔距絕於等倫張晏曰范蠡兵法飛石重十二斤為機發行三百步延壽有力能手投之拔距猶超距也索隱曰超距猶跳躍也余謂投石以石投人也齊高固桀石以投人是也超距距躍也晉魏犨距躍三百是也可用矣楚既不得戰乃引而東王翦追之令壯士擊大破楚師至蘄南班志沛郡有蘄縣史記正義曰徐州縣也康以為江夏之蘄春其誤甚矣蘄渠之翻又音機項燕項梁之父也燕烏賢翻王翦因乘勝略定城邑二十四年二十四年王翦蒙武虜楚王負芻以其地置楚郡楚至是亡矣按秦三十六郡無楚郡此蓋滅楚之時暫置耳後分為九江鄣會稽三郡二十五年二十五年大興兵使王賁攻遼東虜燕王喜燕至是亡臣光曰燕丹不勝一朝之忿以犯虎狼之秦勝音升輕慮淺謀挑怨速禍使召公之廟不祀忽諸忽諸言忽然而亡也而論者或謂之賢豈不過哉夫為國家者任官以才立政以禮懷民以仁交鄰以信是以官得其人政得其節百姓懷其德四鄰親其義夫如是則國家安如磐石熾如焱火熾尺志翻焱弋贍翻觸之者碎犯之者焦雖有強暴之國尚何足畏哉丹釋此不為顧以萬乘之國決匹夫之怒逞盜賊之謀功隳身戮社稷為墟不亦悲哉夫其膝行蒲伏非恭也蒲蓬逋翻手行也伏鳧墨翻伏地也復言重諾非信也復言謂言必信而可復也重諾重然諾也糜金散玉非惠也刎首決腹非勇也要之謀不遠而動不義其楚白公勝之流乎白公勝欲報其父讎不勝其忿以及其叔父事見左傳荊軻懷其豢養之私不顧七族漢鄒陽曰荊軻湛七族應劭曰荊軻為燕刺秦王其族坐之湛沒不亦愚乎故揚子論之以要離為蛛蝥之靡聶政為壯士之靡要離吳人為吳王闔閭刺慶忌言其力不足譬如蜘蛛之螫毒於人而靡死耳靡披靡而死也爾雅疏知黽鼄即鼄蝥方言自關以西秦晉之間謂之鼄蝥趙魏之間謂之知黽鼄蛛音朱蝥音矛靡溫公揚子註音如字康美為切謂糜爛也余謂康音義俱非聶政事見一卷安王五年皆不可謂之義又曰荊軻君子盜諸吳祕曰荊軻以君子之道類之則盜爾二十五年王賁攻代虜代王嘉嘉奔代見上卷十九年趙既不祀二十五年王翦悉定荊江南地降百越之君置會稽郡秦會稽郡治吳縣兼有今閩越兩浙之地後漢分會稽置吳郡而會稽郡徙治山陰縣劉恕曰禹會諸侯江南而有功因名其山曰會稽猶言會計也會古外翻二十五年五月天下大酺二十五年初齊君王后賢君王后太史敫女襄王后與諸侯信齊亦東邊海上言齊東取島夷以海上為邊也或曰齊東邊海不與秦接故不受兵五國各自救以故齊王建立四十餘年不受兵及君王后且死戒王建曰㣥臣之可用者某王曰請書之君王后曰善王取筆牘受言君王后曰老婦已忘矣忘巫放翻君王后死后勝相齊姓譜后本郈氏其後去邑史記正義曰勝音升間古莧翻下同賓客入秦秦又多與金客皆為反間勸王朝秦不脩攻戰之備不助五國攻秦秦以故得滅五國齊王將入朝雍門司馬前曰左傳晉圍齊伐雍門之萩杜預曰雍門齊城門也經典釋文雍於用翻康於龍切非也所為立王者為社稷耶為王耶王曰為社稷司馬曰為社稷立王王何以去社稷而入秦孟子曰民為大社稷次之君為輕即墨大夫聞之見齊王曰齊地方數章十二行本數作四乙十一行本同千里帶甲數百萬夫三晉大夫皆不便秦而在阿甄之間者百數甄當作鄄音工掾翻王收而與之百萬人之衆使收三晉之故地即臨晉之關可以入矣收三晉兵自河東攻秦則入臨晉關而在城南下者百數城南下即南城之下也南城齊威王使檀子所守者使收楚故地即武關可以入矣楚攻秦自南陽入武關則齊威可立秦國可亡豈特保其國家而已哉齊王不聽二十六年二十六年王賁自燕南攻齊猝入臨淄民莫敢格者格如字止也鬬也約封以五百里之地誘音酉齊王遂降秦遷之共班志河內郡有共縣史記正義曰今衞州有共城縣共音恭下同餓而死處昌呂翻齊人怨王建不早與諸侯合從聽姦人賓客以亡其國歌之曰松耶柏耶住建共者客耶疾建用客之不祥也索隱曰謂不詳審用賓客不知其善否也齊田氏亡臣光曰從衡之說雖反覆百端然大要合從者六國之利也昔先王建萬國親諸侯使之朝聘以相交饗宴以相樂樂音洛會盟以相結者無他欲其同心勠力以保家國也曏使六國能以信義相親則秦雖強暴安得而亡之哉夫三晉者齊楚之藩蔽齊楚者三晉之根柢柢都禮翻又丁計翻形勢相資表裏相依故以三晉而攻齊楚自絕其根柢也以齊楚而攻三晉自撤其藩蔽也安有撤其藩蔽以媚盜曰盜將愛我而不攻豈不悖哉二十六年王初幷天下自以為德兼三皇功過五帝伏羲神農黃帝為三皇少昊顓頊高辛唐堯虞舜為五帝宋均註援神契引甄耀度曰伏羲神農燧人為三皇黃帝顓項帝嚳唐堯虞舜為五帝孔穎達曰鄭玄註中候敕省圖引運斗樞伏羲女媧神農為三皇五帝者德合五帝座星者稱帝則黃帝金天氏高陽氏高辛氏陶唐氏有虞氏是也實六人而稱五者以其俱合五帝座星也白虎通取伏羲神農祝融為三皇帝者天之一名所以名帝帝者諦也言天蕩然無心忘於物我公平通遠舉事審諦故謂之帝也帝號同天名所莫加而稱皇者以皇是美大之名言大於帝也皇帝命為制令為詔師古曰天子之言一曰制書二曰詔書制書謂其制度之命也如淳曰詔告也自秦漢以上唯天子得稱之更工衡翻朕古者君臣之間通稱曰朕自秦定制唯天子獨稱之太上者極尊之稱也始皇自號曰始皇帝故追尊莊襄王為太上皇自漢高帝以尊太公此後不復為追號死而以行為諡則是子議父臣議君也甚無謂自今以來除諡法周公作諡法緣行之美惡以立諡如幽厲之君雖孝子慈孫百世不能改也今秦除之畏後人加己以惡諡也諡神志翻後世以計數史記正義數色主翻二世三世至于萬世傳之無窮二十六年初齊威宣之時鄒衍論著終始五德之運所謂終始五德之運者伏羲以木德王木生火故神農以火德王火生土故黃帝以土德王土生金故少昊以金德王金生水故顓頊以水德王水生木故帝嚳又以木德王木又生火故帝堯以火德王火又生土故帝舜以土德王土又生金故夏以金德王金又生水故商以水德王水又生木故周以木德王此五德之終而復始也芻衍以為周得火德蓋以火流王屋為周受命之符且服色尚赤故也就衍之說以為終始秦當以土為行今始皇以水勝火自以水為行所謂推五勝也漢初以土為行蓋亦祖衍之說也齊人奏之始皇采用其說以為周得火德秦代周從所不勝為水德始改年朝賀皆自十月朔衣服旌旄節旗皆尚黑數以六為紀改年句斷夏以建寅之月為歲首殷以建丑之月為歲首周以建子之月為歲首今始皇以建亥之月為歲首是改年也自此紀年皆以十月為歲首朝賀以十月朔以水為行故色尚黑水成數六故以六為紀二十六年丞相綰章十二行本綰下有等字乙十一行本同孔本同言燕齊荊地遠避莊襄王諱故以楚為荊索隱曰丞相綰姓王無以鎮之請立諸子始皇下其議下遐嫁翻凡自上而下之下皆同音廷尉斯曰班書百官表廷尉秦官應劭曰聽獄必質諸朝廷與衆共之兵獄同制故稱廷尉師古曰廷平也治獄貴平故以為號周文武所封子弟同姓甚衆然後屬疏遠相攻擊如仇讎周天子弗能禁止今海內賴陛下神靈一統皆為郡縣諸子功臣以公賦稅重賞賜之甚足易制易以豉翻史記正義音以職翻非也天下無異意則安寧之術也置諸侯不便始皇曰天下共苦戰鬬不休以有侯王賴宗廟天下初定又復立國是樹兵也而求其寧息豈不難哉廷尉議是分天下為三十六郡郡置守尉監裴駰曰三川河東南陽南郡九江鄣郡會稽潁川碭郡泗水薛郡東郡琅邪齊郡上谷漁陽右北平遼西遼東代郡鉅鹿邯鄲上黨太原雲中九原鴈門上郡隴西北地漢中巴郡蜀郡黔中長沙凡三十五郡與內史為三十六郡班書百官表郡守掌治其郡郡尉掌佐守典武職甲卒監御史掌監郡守始究翻監去聲康又居銜切余謂守尉監官名也當從去聲若監郡之監則從平聲記王制天子使其大夫為三監監於方伯之國陸德明釋文監古暫翻監於古銜翻可以知矣收天下兵聚咸陽銷以為鍾鐻鐻與虡同音巨虡者所以懸鍾橫曰筍植曰筍植曰虡金人十二重各千石置宮庭章十二行本庭作廷乙十一行本同孔本同中史記正義曰漢書五行志時大人見臨洮長五丈足履六尺皆夷狄服凡十二人故銷兵器鑄而象之所謂金狄也徙天下豪桀於咸陽十二萬戶諸廟及章臺上林皆在渭南上林在漢長安縣西南秦始起上林苑至漢武帝又增而廣之寫放其宮室作之咸陽北阪上程大昌雍錄曰咸陽北阪漢武帝別名渭城阪即九嵕諸山麓也自雍門以東至涇渭殿屋復道周閣相屬徐廣曰雍門在高陵縣史記正義曰在今岐州雍縣東余按班志高陵縣屬左馮翊左輔都尉治焉雍縣屬右扶風二說相去何遠也三輔黃圖曰長安城西出北頭第一門曰雍門本名西城門但長安本秦離宮秦之咸陽則漢扶風之渭城也渭城與長安相去雖不遠然秦時長安未有十二門也豈作史者因漢之雍門而書之歟涇渭言涇渭之交也復與複同音方自翻複道閣道也上下有道故謂之複二十七年二十七年始皇巡隴西北地至雞頭山過回中焉范史隗囂傳王孟塞雞頭道賢註曰在原州高平縣西括地志成州上祿縣東北二十里有雞頭山應劭曰回中在安定高平孟康曰回中在北地賢曰回中在汧括地志回中宮在雍西四十里史記正義曰言始皇西巡出隴右向西北出寧州西南行至成州出雞頭山東還過岐州之回中宮也余謂上書巡隴西北地則先至原州之雞頭山而還過回中道里為順若出成州之雞頭則須先過回中而後至雞頭以書法之前後觀之居然可見二十七年作信宮渭南已更命曰極廟作宮已成而更名也索隱曰言為宮廟象天極故曰極朝天官書中宮曰天極是也作甘泉前殿築甬道自咸陽屬之治馳道於天下三輔黃圖曰甘泉宮一名雲陽宮關輔記曰林光宮一曰甘泉宮始皇造在今池陽縣西故甘泉山宮周匝十餘里漢武帝廣之周十九里又黃圖曰咸陽北至九嵕甘泉南至鄠杜東至河西至汧渭之交東西八百里南北四百里離宮別館聯望相屬甬道唐夾城之類也應劭曰築垣牆如街巷甬余隴翻賈山曰秦為馳道於天下東窮燕齊南極吳楚江湖之上瀕海之觀畢至道廣五十步三丈而樹厚築其外隱以金椎樹以青松應劭曰馳道天子所行道也若今之中道孔穎達曰馳道如今御路也是君馳走車馬之處故曰馳道屬之欲翻二十八年二十八年始皇東行郡縣上鄒嶧山立石頌功業班志魯國鄒縣嶧山在北應劭曰邾文公遷于繹即此括地志鄒嶧山在兗州鄒縣南二十二里嶧音亦孔穎達曰儒之言優也柔也能安人能服人又儒者濡也以先王之道能濡其身議封禪諸儒或曰古者封禪為蒲車惡傷山之土石草木掃地而祭席用章十二行本用作因乙十一行本同葅稭議各乖異始皇以其難施用由此絀儒生括地志泰山在兗州博城縣西北三十里一曰岱宗服虔曰封者增山之高禪廣地也張晏曰天高不可及於泰山上立封禪以祭之冀近神靈也項威曰封泰山告太平升中和之氣於天祭土為封謂負土於泰山為壇而祭也除地為墠後改墠為禪晉太康地記曰為壇於泰山以祭天示增高也為墠於梁父以祭地示廣也白虎通曰王者易姓而起必升封於泰山之上者何因高告高順其類故升封者增高也下禪梁父之基廣厚也刻石紀號者著己之功迹以自勸也增太山之高以報天附梁父之基以報地惡烏路翻師古曰蒲車以蒲裹輪葅稭班志作苴稭如淳曰苴讀如租稭讀曰戞晉灼曰苴藉也師古曰茅藉也苴本作葅假借用應劭曰稭藳本去皮以為席絀與黜同黜退也上自太山陽至顛立石頒德從陰道下禪於梁父師古曰山南曰陽山北曰陰班志泰山郡有梁父縣師古註曰以山名縣括地志梁父山在兗州泗水縣北八十里父音甫班表奉常之屬有雍太祝令丞蓋漢仍秦制也秦作畤於雍以祀上帝今采其禮以為封禪禮世不得而記也於是始皇遂東游海上行禮祠名山大川及八神封禪書八神一曰天主祠天齊淵水二曰地主祠太山梁父三曰兵主祠蚩尤四曰陰主嗣三山五曰陽主祠之罘山六曰月主祠之萊山七曰日主祠成山八曰四時主祠琅邪或曰八神齊自太公以來祠之大樂之留三月作琅邪臺立石頌德明得意班志琅邪郡有琅邪縣山海經琅邪臺在勃海間琅邪之東郭璞曰琅邪臨海邊有山曰琅邪臺越王句踐徙琅邪作觀臺以望東海史記曰始皇徙三萬家於臺下是其所作因越之舊也括地志琅邪山在密州諸城縣東南百四十里始皇立層臺於山上謂之琅邪臺邪音耶大樂之樂琅邪之風景也樂音洛初燕人宋毋忌羨門子高之徒稱有仙道形解佳買翻銷代之術燕齊迂怪之士皆爭傳習之道經月中仙人宋毋忌白澤圖云火之精曰宋毋忌蓋其人火仙也張曰羨門子高仙人居碣石山上服虔曰形解尸解也張晏曰人老而解去故骨如變化也今山中有龍骨世謂之龍解骨化去迂羽俱翻又憂俱翻使人入海求蓬萊方丈瀛洲云此三神山在勃海中去人不遠患且至則風引船去嘗有至者諸仙人及不死之藥皆在焉及始皇至海上諸方士齊人徐市等爭上書言之太史公曰嬴姓分封者為徐氏姓譜曰皋陶子伯益佐禹有功封其子若木於徐齊戒之齊讀曰齋於是遣徐市發童男女數千人入海求之船交海中皆以風為解師古曰自解說云為風不得而至自解猶今言分疏未能至望見之焉始皇還過彭城班志楚國有彭城縣古彭祖國欲出周鼎泗水水經泗水出魯國卞縣北山東南過彭城縣又東過下邳縣入淮時人相傳以為宋太丘社亡而周鼎沒於泗水中故祠泗水欲出周鼎弗得乃西南渡淮水水經淮水出南陽郡平氏縣桐柏山東南至淮陵入海行三千餘里班志衡山在長沙國湘南縣之東南括地志衡山一名岣嶁山在衡州湘潭縣西四十一里漢衡山國在江北秦拔楚郢置南郡唐為荊州江陵府之往也逢大風幾不能渡幾居依翻上問博士曰湘君何神對曰聞之堯女舜之妻葬此班志湘水出零陵郡零陵縣陽朔山北至酃入江括地志黃陵廟在岳州湘陰縣北五十七里舜二之神二冢在湘陰縣一百六十里青草山上盛弘之荊州記青草湖南有青草山湖因山而名舜陟方死於蒼梧二死於江湘之間因葬焉博士以儒學為官漢成帝詔曰儒林之官四海淵源宜皆明於古今溫故知新通達國體故謂之博士使刑徒三千人皆伐湘山樹赭其山赭音者赤也遂自南郡由武關歸二十八年初韓人張良其父祖以上五世相韓張良大父開地相韓昭侯宣惠王襄哀王父平相釐王悼惠王凡五世良散千金之產欲為韓報仇為于偽翻二十九年二十九年始皇東游至陽武博浪沙中班志陽武縣屬河南郡有博浪沙索隱曰今浚儀西北四十里有博浪城史記正義曰鄭州陽武縣有博浪沙當官道師古曰狼音浪史記作浪正義音狼誤中副車狙玃屬狙之伺物必伏乘其便而擊之狙擊者謂伏其旁而狙伺以擊之也狙千恕翻又千余翻索隱曰漢官儀天子有屬車即副車奉車即御而從後余謂副貳也漢有五時副車又在屬車之外求弗得令天下大索十日索山客翻始皇遂登之罘班志之罘山在東萊腄縣括地志之罘山在萊州文登縣東北一百八十里罘音浮旋之琅邪道上黨入旋即還字之往也三十一年三十一年使黔首自實田二十六年更名民曰黔首孔穎達曰黔黑也凡民以黑巾覆頭故謂之黔首三十二年三十二年始皇之碣石班志大碣石山在右北平郡驪成縣西南文穎曰碣石在遼西郡絫縣酈道元曰濡水至絫縣碣石山今於此數十里當山頂有大石如柱形往往而見立於鉅海之中名天橋柱碣音桀使燕人盧生求羨門姓譜姜姓之後封於盧以國為氏壞城郭決通堤坊壞音怪坊讀曰防始皇巡北邊從上郡入盧生使入海還因奏錄圖書曰亡秦者胡也錄圖書如後世讖緯之書鄭玄曰胡胡亥秦二世名也秦見圖書而不知此為人名反備北胡北伐匈奴三十三年三十三年發諸嘗逋亡人贅壻賈人為兵賈誼曰秦人家貧子壯則出贅師古曰謂之贅壻言其不當出在妻家猶人身之有肬贅也轉貨販易者為商坐市販賣者為賈贅之銳翻索隱曰謂南方之人其性陸梁故曰陸梁地班表漢高帝功臣有陸量侯須無詔以為列諸侯自置吏令長受令長沙王如淳曰陸量秦始皇本紀所謂陸梁地也桂林因產桂而名合浦以南山間無雜木冬夏長青葉長尺餘文穎曰桂林今鬱林師古曰桂林今桂州界是其地非鬱林也南海郡今廣州茂陵書曰象郡治臨塵去長安萬七千五百里韋昭曰今日南是也與越雜處所謂讁戍也晉志曰自北徂南入越之道必由嶺嶠時有五處故曰五嶺師古曰嶺者西自衡山之南東窮于海一山之限耳而別標名則有五焉裴氏廣州記曰大庾始安臨賀桂陽揭陽為五嶺鄧德明南康記曰大庾嶺一也桂陽騎田嶺二也九真都龐嶺三也臨賀萌渚嶺四也始安越城嶺五也師古以裴說為是蜀註曰大庾嶺在虔州永明嶺白芒嶺在道州臘嶺在郴州臨源嶺在桂州讁則革翻處昌呂翻三十三年蒙恬斥逐匈奴收河南地為四十四縣築長城因地形用制險塞起臨洮至遼東延袤萬餘里於是渡河據陽山逶迤而北師古曰河南地當北地之北黃河之南余按河出積石過金城隴西安定北地郡界皆東北流北過朔方窳渾間方屈而東南流逕高闕南又自臨河縣東逕陽山南徐廣所謂陽山在河北陰山在河南者劉昭曰二山皆屬五原郡西安陽縣班志臨洮縣屬隴西郡洮水出西羌中北至枹罕東入河縣臨洮水因以為名洮土刀翻延長行也南北曰袤袤音茂逶於為翻迤以支翻蒙恬常居上郡統治之威振匈奴暴讀如字劉伯莊音僕括地志上郡故城在綏州上縣東南五十里三三原誤作二十四年戊子前二一三三十三年謫治獄吏不直及覆獄故失者覆獄者奏當已成而覆按之也故者知其當罪與不當罪而故出入之失者誤出入也處昌呂翻丞相李斯上書曰異時諸侯並爭厚招遊學今天下已定法令出一百姓當家則力農工士則學習法令今諸生不師今而學古以非當世惑亂黔首相與非法教人聞令下則各以其學議之入則心非出則巷議誇主以為名異趣以為高率㣥下以造謗如此弗禁則主勢降乎上黨與成乎下禁之便臣請史官非秦記皆燒之此燒列國史記也天下有藏詩書百家語者皆詣守尉雜燒之秦之焚書焚天下之人所藏之書耳其博士官所藏則故在項羽燒秦宮室始併博士所藏者焚之此所以後之學者咎蕭何不能於收秦圖書之日併收之也以古非今者族吏見知不舉與同罪令下三十日不燒黥為城旦應劭曰城旦旦起行治城四歲刑也醫藥卜筮種樹之書若有欲學法令者章十二行本有欲二字互乙無者字乙十一行本同以吏為師制曰可魏人陳餘謂孔鮒曰秦將滅先王之籍而子為書籍之主其危哉子魚曰吾為無用之學知吾者惟友秦非吾友吾何危哉吾將藏之以待其求求至無患矣孔鮒孔子八世孫字子魚鮒音附三十五年三十五年使蒙恬除直道道九原抵雲陽班志雲陽縣屬馮翊塹七豔翻堙音因千八百里數年不就三十五年始皇以為咸陽人多先王之宮庭章十二行本庭作廷乙十一行本同孔本同小乃營作朝宮渭南上林苑中先作前殿阿房師古曰阿近也以其去咸陽近且號阿房索隱曰此以形名宮也言其宮曰四旁三輔黃圖曰作宮阿基旁天下謂之阿房括地志秦阿房宮亦曰阿城在雍州長安縣西一十四里史記正義曰按宮在上林苑中雍州郭城西南面即阿房宮城東南面也房白郎翻東西五百步南北五十丈上可以坐萬人下可以建五丈旗周馳為閣道自殿下直抵南山關中有南山北山自甘泉連延至巀嶭九嵕為北山自終南太白連延至商嶺為南山為複道自阿房度渭屬之咸陽以象天極閣道絕漢抵營室也天官書曰天極後十七星絕漢抵營室曰閣道北辰為天極營室二星天子之宮也章十二行本十下有餘字乙十一行本同孔本同張校同萬人史記正義曰餘刑見於市朝宮刑一百日隱於蔭室養之乃可故曰隱宮下蠶室是也徒刑者有罪既加刑復罰作之也發北山石椁寫蜀荊地材康曰寫四夜切舍車解馬為寫或作卸余謂此非舍車解馬之卸即前寫放宮室之寫讀如字或曰皆至當屬上句關中記云東自函關弘農郡靈寶縣界西至隴關汧陽郡汧源縣界二關之間謂之關中東西千餘里於是立石東海上胊界中以為秦東門班志東海郡胊縣始皇立石海上以為東門闕胊音劬五萬家雲陽皆復不事十歲復方自翻除也不事者不供征役之事三十五年盧生說始皇曰方中人主時為微行以辟惡鬼惡鬼辟辟讀曰避真人至願上所居宮毋令人知然後不死之藥殆可得也始皇曰吾慕真人自謂真人不稱朕康曰稱去聲不稱不愜意也余謂康說非也始皇初幷天下自稱曰朕至此不稱朕耳復章十二行本復作複乙十一行本同孔本同道甬道相連帷帳鍾鼓美人充之各案署不移徙行所幸有言其處者罪死始皇幸梁山宮班志梁山宮在扶風好畤縣括地志俗名望宮山在雍州好畤縣西十二里北去梁山九里雍錄曰唐奉天縣有梁山秦之梁山宮正在其地弗善也中人或告丞相丞相後損車驕始皇怒曰此中人泄吾語案問莫服捕時在旁者盡殺之自是後莫知行之所在㣥臣受決事者悉於咸陽宮侯生盧生相與譏議始皇因亡去始皇聞之大怒曰盧生等吾尊賜之甚厚今乃誹謗我誹敷尾翻諸生在咸陽者吾使人廉問或為妖言以亂黔首廉察也秦有誹謗妖言之罪漢除之妖於遙翻秦置御史掌討姦猾治大獄御史大夫統之傳相告引者謂甲引乙乙復引丙也傳柱戀翻相如字皆阬之咸陽使天下知之以懲後益發謫徙邊始皇長子扶蘇諫曰諸生皆誦法孔子誦孔子之言以為法也臣恐天下不安始皇怒使扶蘇北監蒙恬軍於上郡為胡亥奪嫡殺扶蘇張本三十六年三十六年有隕石于東郡東郡本衞地秦徙衞於野王以其地置東郡始皇死而地分始皇使御史逐問莫服盡取石旁居人誅之燔其石燔音煩爇也三十六年遷河北榆中三萬家河北北河之北也三十七年三十七年冬十月癸丑始皇出遊左丞相斯從右丞相去疾守去疾姓馮從才用翻守手又翻少子胡亥最愛請從上許之十一月行至雲夢望祀虞舜於九疑山古者天子巡狩所至山川之神各以秩次望祭之酈道元曰營水出營陽郡泠道縣南留山西流逕九疑山其山磐碁蒼梧之野峰秀數郡之間羅巖九舉各導一溪岫壑負阻異嶺同勢遊者疑焉故曰九疑括地志九疑山在永州唐興縣東南百里其山九峰相似故名元次山曰九疑山在永州方四千里四州各近一隅九域志曰九疑在道州舜陵在女英峰下九疑之第六峰也太史公曰舜南狩崩於蒼梧之野歸葬於江南九疑山山海經曰舜之所葬在今道州零陵界則蒼梧九疑兩處也合而言之者誤也觀藉柯渡海渚過丹陽至錢唐史記正義曰括地志海者云在舒州同安縣東按舒州在江之中流疑海字誤藉秦昔翻柯音歌班志丹陽縣秦屬鄣郡括地志丹陽故城在潤州江寧縣東南五里班志錢唐縣屬會稽郡漢西部都尉所治唐為杭州治所水波惡乃西百二十里從陿中渡所謂水波惡處則今之由錢唐渡西陵者是也西陿中渡則今富陽分水之間徐廣曰蓋在餘杭也顧夷曰餘杭秦始皇至會稽經此立為縣班志會稽山在會稽郡山陰縣南有禹冢禹井望于南海立石頌德還過吳從江乘渡江乘縣秦屬鄣郡漢屬丹陽郡括地志江乘故縣城在今潤州句容縣北六十里北至琅邪之罘並步浪翻罘音浮見巨魚射殺之遂並海西至平原津而病平原縣秦屬齊郡漢分置平原郡史記正義曰今德州平原縣南六十里有張公故城城東有津後名張公渡恐此平原郡古津也漢書平津侯公孫弘所封亦近此蓋平津即此津余按公孫弘傳封勃海高城縣之平津鄉則平津非平原津也班志篤馬河至平原東北入海此蓋津渡處射而亦翻並步浪翻始皇惡言死惡烏路翻㣥臣莫敢言死事病益甚乃令中車府令行符璽事趙高為書賜扶蘇曰與喪會咸陽而葬書已封在趙高所未付使者班書百官表太僕秦官其屬有車府令七月丙寅始皇崩於沙丘平臺史記正義曰始皇崩在沙丘宮平臺之中為于偽翻恐諸公子及天下有變乃祕之不發喪棺載轀涼車中文穎曰轀輬車如今喪轜車也孟康曰如衣車有窗牖閉之則溫開之則涼故名如淳曰轀輬車其車廣大有羽飾沈約宋書禮志曰漢制大行載轀輬車四輪其飾如金根加施組連璧交給四角金龍飾銜璧垂五采飾羽流蘇前後雲畫帷裳文畫曲轓長與車等太僕御駕六白駱馬以黑藥灼共身為虎文史記正義曰棺音館又古玩翻轀音溫涼一作輬音同所至上食百官奏事如故宦者輒從車中可其奏事獨胡亥趙高及幸宦者五六人知之初始皇尊寵蒙氏信任之蒙恬任章乙十一行本任下有在字外將蒙毅常居中參謀議名為忠信故雖諸將相莫敢與之爭將即亮翻趙高者生而隱宮康曰餘刑顯於市朝宮刑在於隱室故曰隱官通於獄法舉以為中車府令使教胡亥決獄胡亥幸之趙高有罪始皇使蒙毅治之毅當高法應死始皇以高敏於事赦之復其官趙高既雅得幸於胡亥雅素也乃說胡亥請詐以始皇命誅扶蘇而立胡亥為太子胡亥然其計趙高曰不與丞相謀恐事不能成乃見丞相斯曰上賜長子書及符璽皆在胡亥所長子謂扶蘇在君侯與高之口耳事將何如斯曰安得亡國之言此非人臣所當議也高曰君侯材能謀慮功高無怨長子信之此五者皆孰與蒙恬斯曰不及也高曰然則長子即位必用蒙恬為丞相君侯終不懷通侯之印歸鄉里明矣通侯漢曰徹侯亦曰列侯應劭曰通亦徹也通者言功德通於王室也張晏曰列侯者見序列也可以為嗣願君審計而定之丞相斯以為然乃相與謀詐為受始皇詔立胡亥為太子更為書賜扶蘇更工衡翻改也數以不能闢地立功士卒多耗數所具翻數章十二行本數上有反字乙十一行本同孔本同張校同退齋校同上書直言誹謗日夜怨望不得罷歸為太子將軍恬不矯正知其謀皆賜死以兵屬裨將王離數所角翻下同屬之欲翻付也康音蜀非下以屬同扶蘇發書泣入內舍欲自殺蒙恬曰陛下居外未立太子使臣將三十萬衆守邊公子為監此天下重任也今一使者來即自殺安知其非詐復請而後死未暮也使者數趣之扶蘇謂蒙恬曰父賜子死尚安復請即自殺趣讀曰促復扶又翻蒙恬不肯死使者以屬吏繫諸陽周班志陽周縣屬上郡史記正義曰陽周寧州羅川縣之邑屬之欲翻今按天寶元年改羅川縣為真寧縣班百官表護軍都尉秦官又漢王以陳平為護軍中尉盡護諸將當是時恬已屬吏恐其軍有變故以李斯舍人為護軍使之護諸將也胡亥已聞扶蘇死即欲釋蒙恬會蒙毅為始皇出禱山川還至趙高言於胡亥曰先帝欲舉賢立太子久矣而毅諫以為不可不若誅之乃繫諸代據地理代距沙丘甚遠蓋毅還至代即就繫之遂從井陘抵九原班志井陘在常山石邑縣西史記正義曰井陘故關在幷州石艾縣東十八里即井陘口轀車臭乃詔從官令車載一石鮑魚以亂之孟康曰百二十斤曰石班書貨殖傳鮿鮑千鈞師古註曰鮿膊魚也即今之不著鹽而乾者也鮑今之䱒魚也而說者乃讀鮑為鮠魚之鮠失義遠矣鄭康成以䱒於煏室乾之亦非也煏室乾之即鮑耳蓋今巴荊人所呼鰎魚者是也秦皇載鮑亂臭者則是䱒魚耳而煏室乾者本不臭也鮑白卯翻鮿音接䱒於業翻鮠五回翻煏蒲北翻鰎居偃翻發喪直道即三十五年蒙恬所除者九月葬始皇於驪山下錮三泉師古曰三重之泉言至水也余謂錮者冶銅錮塞之也三泉者取九泉之數言之徙藏滿之謂徙府庫之物以實陵便房中藏才浪翻有穿近者輒射之以水銀為百川江河大海機相灌輸康註引劉伯莊云機相灌輸以防穿近者予按文勢自機弩至輒射之文意已足機相灌輸是承水銀為百川江河大海之意作如是觀文意甚順射而亦翻史記正義灌音館輸音戍下具地理後宮無子者皆令從死從才用翻葬既已下或言工匠為機藏皆知之藏重即泄大事盡閉之墓中藏重即泄謂工匠若更為第二重機藏與外人近即泄其所以為機藏之事故大事盡則皆閉之墓中大事盡句絕謂既下窆則送終之大事盡也重直龍翻三十七年二世欲誅蒙恬兄弟二世兄子子嬰諫曰趙王遷殺李牧而用顏聚齊王建殺其故世忠臣而用后勝卒皆亡國二事並見前卒子恤翻秦之大臣謀士也而陛下欲一旦棄去之誅殺忠臣而立無節行之人行下孟翻是內使㣥臣不相信而外使鬬士之意離也二世弗聽遂殺蒙毅及內史恬恬曰自吾先人及至子孫積功信於秦三世矣恬祖驁父武及恬三世皆事秦有功身雖囚繫其勢足以倍畔倍蒲妹翻然自知必死而守義者不敢辱先人之教以不忘先帝也乃吞藥自殺揚子法言曰或問蒙恬忠而被誅忠奚可為也曰壍山堙谷起臨洮擊遼水力不足而屍有餘忠不足相也相息亮翻臣光曰始皇方毒天下而蒙恬為之使恬不仁可知矣然恬明於為人臣之義雖無罪見誅能守死不貳斯亦足稱也使如字二世皇帝上諱胡亥始皇少子也章十二行本無此八字乙十一行本同元年元年冬十月戊寅大赦元年春二世東行郡縣李斯從到碣石並海南至會稽而盡刻始皇所立刻石旁者大臣從者名行下孟翻從才用翻並步浪翻著如字史記正義丁略翻以章先帝成功盛德而還夏四月二世至咸陽謂趙高曰夫人生居世間也譬猶聘六驥過決隙也康曰上音缺下丘逆翻余謂決如字決裂也裂開之隙其間不能以寸喻狹小也吾既已臨天下矣欲悉耳目之所好窮心志之所樂好呼到翻樂音洛以終吾年壽可乎高曰此賢主之所能行而昏亂主之所禁也雖然有好未可臣請言之夫沙丘之謀諸公子及大臣皆疑焉而諸公子盡帝兄大臣又先帝之所置也今陛下初立此其屬意怏怏皆不服恐為變臣戰戰栗栗唯恐不終陛下安得為此樂乎二世曰為之柰何趙高曰陛下嚴法而刻刑令有罪者相坐誅滅大臣及宗室然後收舉遺民貧者富之賤者貴之盡除先帝之故臣更置陛下之所親信者此則陰德歸陛下害除而姦謀塞㣥臣莫不被潤澤蒙厚德陛下則高枕肆志寵樂矣更工衡翻塞悉則翻枕之鴆翻計莫出於此二世然之乃更為法律務益刻深大臣諸公子有罪輒下高章十二行本高下有令字乙十一行本同孔本同鞠治之於是公子十二人僇死咸陽市十公主矺死於杜索隱曰矺貯格翻史記正義音宅與磔同謂磔裂支體而殺之溫公類篇音竹格翻磓也杜故周之杜伯國班志杜縣屬京兆宣帝改曰杜陵財物入於縣官漢謂天子為縣官此縣官猶言公家也言事相連及皆逮之貢父曰其人存直追取之曰逮其人亡則討而捕之逮易辭捕加力也公子將閭昆弟三人囚於內宮議其罪獨後二世使使令將閭曰公子不臣罪當死吏致法焉將閭曰闕廷之禮吾未嘗敢不從賓贊也廊廟之位吾未嘗敢失節也受命應對吾未嘗敢失辭也何謂不臣言不敢挾親親之恩廢為臣之節何得以此罪加之使者曰臣不得與謀與讀曰預奉書從事將閭乃仰天大呼天者三曰吾無罪昆弟三人皆流涕拔劍自殺宗室振恐公子高欲奔恐收族乃上書曰先帝無恙時臣入門章十二行本門作則乙十一行本同孔本同退齋校同熊校同賜食出則乘輿御府之衣臣得賜之中广既之寶馬臣得賜之臣當從死而不能為人子不孝為人臣不忠不孝不忠者無名以立於世臣請從死願葬驪山之足唯上幸哀憐之書上二世大說說讀曰悅召趙高而示之曰此可謂急乎趙高曰人臣當憂死不暇何變之得謀二世可其書賜錢十萬以葬復作阿房宮盡徵材士五萬人為屯衞咸陽令教射狗馬禽獸當食者多食讀曰飤音祥吏翻度不足下調郡縣史記正義曰下戶嫁翻調徒釣翻謂下郡縣而調發之也余謂下讀如字亦通轉輸菽粟芻稾皆令自齎糧食咸陽三百里內不得食其穀元年秋七月陽城人陳勝陽夏人吳廣起兵於蘄史記正義曰即河南陽城縣班志屬潁川郡陽夏縣屬淮陽國括地志陳州太康縣本漢陽夏縣地盤洲洪氏曰陽夏鄉去太康縣三十里夏音賈班志蘄縣屬沛郡有大澤鄉蘄音渠依翻發閭左戍漁陽鼂錯曰秦以謫發戍先發吏有謫及贅壻賈人後以嘗有市籍者又後以大父母嘗有市籍者後入閭取其左索隱曰閭左謂居閭里之左也秦時復除者居閭左今力役凡在閭左者盡發之也又云凡居以富強為右貧弱為左秦役戍多富者役盡兼取貧弱而發之也班志漁陽縣屬漁陽郡括地志漁陽故城在檀州密雲縣南十八里在漁水之陽陳勝吳廣皆為屯長師古曰人所聚為屯長帥也會天大雨道不通度已失期度徒洛翻失期法皆斬陳勝吳廣因天下之愁怨乃殺將尉師古曰其官本尉耳時領戍人故為將尉索隱曰尉官也漢舊儀大縣三人其尉將屯九百人故云將尉公等皆失期當斬假令毋斬而戍死者固什六七且壯士不死則已死則舉大名耳王侯將相寧有種乎種章勇翻衆皆從之乃詐稱公子扶蘇項燕以百姓賢扶蘇而楚人憐項燕也稱大楚陳勝自立為將軍吳廣為都尉攻大澤鄉拔之收而攻蘄蘄下收大澤鄉之兵以攻蘄也攻銍酇苦柘譙皆下之班志符離銍酇譙屬沛郡姓譜葛國既滅其後以國為氏柘苦二縣屬淮陽國宋白曰柘縣古襄氏之邑春秋時陳之株野漢為柘縣以邑有柘溝而名唐為宋州柘城縣亳州真源縣古苦縣地徇辭峻翻略地也銍竹乙翻酇本作虍且才多翻師古曰此縣本借酇字為之音嵯王莽改縣為贊治則此縣亦有贊音苦音怙比至陳比必寐翻車六七百乘騎千餘卒數萬人攻陳陳守尉皆不在獨守丞與戰譙門中不勝守丞死陳勝乃入據陳班志陳縣屬淮陽國史記正義曰今陳州城本楚襄王所築陳國城也師古曰守丞謂郡丞之居守者一曰郡守之丞故曰守丞原父曰秦不以陳為郡何庸有守守謂非正官權守者耳余按秦分天下為郡縣郡置守尉監縣置令丞尉原父以此守為權守之分良是遷固二史作守令皆不在此作守尉皆不在蓋二史令下缺尉字而通鑑尉上缺令字也師古曰譙門謂門上為高樓以候望者耳樓一名譙故謂美麗之樓為麗譙亦呼為巢所謂巢車者亦於兵車之上為樓以望敵也譙巢聲相近初大梁人張耳陳餘相與為刎頸交秦滅魏聞二人魏之名士重賞購求之張耳陳餘乃變名姓俱之陳為里監門以自食師古曰監門卒之賤者耳餘以卑賤自隱張晏曰監門里正衞也監古銜翻陳餘欲起張耳躡之使受笞欲起者不能受辱欲起與吏亢也躡尼輒翻躡其足也笞丑之翻張耳乃引陳餘之桑下數之曰數所具翻又所主翻始吾與公言何如今見小辱而欲死一吏乎陳餘謝之陳涉既入陳張耳陳餘詣門上謁陳勝字涉大喜陳中豪桀父老請立涉為楚王涉以問張耳陳餘耳餘對曰秦為無道滅人社稷暴虐百姓將軍出萬死之計為天下除殘也今始至陳而王之示天下私願將軍毋王急引兵而西遣人立六國後自為樹黨為秦益敵敵多則力分與衆則兵強如此則野無交兵六國皆為與國則兵不交鋒於野矣諸縣皆畔秦復為大國無復為秦守城者據咸陽以令諸侯諸侯亡而得立以德服之則章十二行本則上有如此二字乙十一行本同孔本同張校同帝業成矣今獨王陳恐天下懈也陳涉不聽遂自立為王號張楚劉德曰若云張大楚國也張晏曰先是楚已為秦所滅今立楚為張當是時諸郡縣苦秦法爭殺長吏以應涉謁者章十二行本者下有使字乙十一行本同孔本同張校同從東方來以反者聞二世怒下之吏下遐嫁翻後使者至上問之對曰㣥盜鼠竊狗偷郡守尉方逐捕今盡得不足憂也上悅陳王以吳叔為假王監諸將以西擊滎陽吳廣字叔滎陽縣屬三川郡張耳陳餘復說陳王請奇兵北略趙地復扶又翻於是陳王以故所善陳人武臣為將軍邵騷為護軍姓譜曰武姓宋武公之後余謂自有諡法以武為諡者多矣而必以武姓為宋武公之後何拘也唐志氏族以為武氏出自姬姓周平王少子生而有文在手曰武遂以為氏此由武后而傅會為之說也趙明誠金石錄有漢敦煌長史武班碑云昔殷王武丁克伐鬼方官族析分因以為氏邵姓周文王子邵公奭之後或言第十一子聃季載之後予卒三千人徇趙予讀曰與陳王又令汝陰人鄧宗徇九江郡殷王武丁封叔父於河北是為鄧侯後因氏焉班志汝陰縣屬汝南郡故胡國九江本楚地秦滅楚分置九江郡項羽滅秦以封黥布漢高祖更名淮南國武帝復曰九江郡楚兵數千人為聚者不可勝數師古曰聚才喻翻葛嬰至東城班志東城縣屬九江郡括地志東城故城在濠州定遠縣東南五十里姓譜襄魯莊公子襄仲之後因殺襄彊還報陳王誅殺葛嬰陳王令章十二行本令下有魏人二字乙十一行本同孔本同張校同退齋校同周市北徇魏地以上蔡人房君蔡賜為上柱國索隱曰房邑名爵之於房號曰房君上柱國楚爵之尊者蔡以國為氏陳王聞周文陳之賢人也習兵乃與之將軍印使西擊秦武臣等從白馬渡河師古曰白馬津在今滑州白馬縣界括地志白馬故城在滑州衞南縣西南二十四里戴延之西征記曰白馬故城即衞之漕邑說其豪桀豪桀皆應之乃行收兵得數萬人號武臣為武信君下趙十餘城餘皆城守乃引兵東北擊范陽班志曰范陽縣屬涿郡應劭曰在范水之陽蒯徹即蒯通班書避武帝諱改徹為通蒯丘怪翻姓也左傳晉有大夫蒯得足下必將戰勝而後略地攻得然後下城臣竊以為過矣誠聽臣之計可不攻而降城不戰而略地傳檄而千里定可乎師古曰檄者以木簡為書長尺二寸用徵召也有急則加以鳥羽插之所以示急疾了檄戶歷翻何謂也徹曰范陽令徐公畏死而貪欲先天下降先悉薦翻君若以為秦所置吏誅殺如前十城則邊地之城皆為金城湯池不可攻也君若齎臣侯印以授范陽令使乘朱輪華轂驅馳燕趙之郊即燕趙城可無戰而降矣武信君曰善以車百乘騎二百侯印迎徐公燕趙聞之不戰以城下者三十餘城陳王既遣周章以秦政之亂有輕秦之意不復設備復扶又翻博士孔鮒諫曰鮒魏相子順之子孔子八世孫即前藏書者也臣聞兵法不恃敵之不我攻恃吾不可攻今王恃敵而不自恃若跌而不振悔之無及也跌徒結翻踢而踣也陳王曰寡人之軍先生無累焉累良瑞翻周文行收兵至關車千乘卒數十萬至戲軍焉師古曰戲水名在京兆新豐東今有戲水驛其水本出藍田北界至此而北流入渭蘇林曰戲在新豐東南三十里戲許宣翻與㣥臣謀曰柰何少府章邯曰班表曰少府秦官掌山林池澤之賦以給共養姓譜齊人降鄣子孫去邑為章氏少詩照翻邯下甘翻盜已至衆強今發近縣不及矣驪山徒多秦之刑徒已論者輸作驪山授兵以擊之二世乃大赦天下使章邯免驪山徒人奴產子悉發以擊楚軍大敗之服虔曰人奴產子家人之產奴師古曰奴產子猶今人云家生奴仲馮曰人奴一物產子又一物臣瓚曰人奴之產子今田客家兒張耳陳餘至邯鄲聞周章卻又聞諸將為陳王徇地還者多以讒毀得罪誅乃說武信君令自王八月武信君自立為趙王以陳餘為大將軍班表前後左右將軍周末官秦因之位上卿漢大將軍此三公邵騷為左丞相使人報陳王陳王大怒欲盡族武信君等家而發兵擊趙柱國房君諫曰秦未亡而誅武信君等家此生一秦也不如因而賀之使急引兵西擊秦陳王然之從其計徙繫武信君等家宮中封張耳子敖為成都君使使者賀趙令趣發兵西入關張耳陳餘說趙王曰王王趙非楚意趣讀曰促上王如字下王于況翻特以計賀王楚已滅秦必加兵於趙願王毋西兵北徇燕代南收河內以自廣燕涿郡以北之地代常山以北之地河內本魏地時屬河東郡北有燕代楚雖勝秦必不敢制趙不勝秦必重趙趙乘秦楚之敝可以得志於天下趙王以為然因不西兵而使韓廣略燕李良略常山張黶略上黨黶烏點翻又於琰翻九月沛人劉邦起兵於沛陶唐氏既衰其後有劉累以擾龍事孔甲為豢龍氏及晉士會自秦歸晉其處者為劉氏師古曰沛本秦泗水郡之屬縣李斐曰沛小沛也索隱曰漢改泗水郡為沛郡治相城故以沛縣為小沛沛博蓋翻漢高帝事始此班志下相縣屬臨淮郡索隱曰按相水名出沛國沛有相縣於相水下流置縣故曰下相括地志下相故城在泗州宿豫縣西北七十里項燕為楚將封於項子孫以邑為氏吳縣會稽郡治所故吳都也服虔曰儋音負擔之擔師古曰儋音丁甘翻劉邦字季為人隆準龍顏左股有七十二黑子服虔曰準音拙應劭曰隆高也準頰權準也顏額顙也李斐曰準鼻也文穎曰音準的之準晉灼曰戰國策云眉目準頞權衡史記秦始皇蜂目長準李說文音是也師古曰頰權䪼字豈當借準為之服音應說皆失之黑子今中國通呼為黶子吳楚俗謂之誌誌者記也愛人喜施喜許既翻施式豉翻意豁如也常有大度不事家人生產作業初為泗上亭長秦法十里一亭亭長主亭之吏亭謂停留客旅宿食之館史記正義曰國語有寓室即今之亭也亭長蓋今之里長民有訟諍吏留平辨得成其政泗上史記作泗水括地志泗水亭在徐州沛縣東一百步有高祖廟好相人見季狀貌奇之以女妻之班志單父縣屬山陽郡單音善父音甫妻七細翻呂公女是為呂后既而季以亭長為縣送徒驪山徒多道亡自度比至皆亡之度徒洛翻比必寐翻到豐西澤中亭止飲應劭曰沛縣也豐其鄉也孟康曰後沛為郡而豐為縣師古曰豐本沛之聚邑耳乃解縱所送徒曰公等皆去吾亦從此逝矣徒中壯士願從者十餘人劉季被酒師古曰被加也被酒為酒所加也被皮義翻有大蛇當徑季拔劍斬蛇有老嫗哭曰吾子白帝子也化為蛇當道今赤帝子殺之因忽不見嫗威遇翻老母也應劭曰秦襄公自以居西主少昊之神作西畤祠白帝至獻公時櫟陽雨金又作畦畤祠白帝少昊金德也赤帝堯後謂漢也殺之明漢當代秦劉季亡匿於芒碭山澤章十二行本澤下有巖石二字乙十一行本同孔本同張校同退齋校同之間班志芒縣屬沛郡碭縣屬梁國應劭曰二縣之間有山澤之固故隱其間宋白曰亳州永城縣漢芒縣地括地志宋州碭山縣在州東一百五十里本漢碭縣碭山在縣東芒音忙碭音唐師古又音宕沛中子弟聞之多欲附者及陳涉起沛令欲以沛應之掾主吏蕭何曹參曰據曹參傳曰參為掾何為主吏孟康曰主吏功曹也姓譜宋支子食采於蕭後因為氏數所角翻掾于絹翻君為秦吏今欲背之背蒲妹翻率沛子弟恐不聽願君召諸亡在外者可得數百人因劫衆衆不敢不聽乃令樊噲刀劉季劉季之衆已數十百人矣沛令後悔恐其有變乃閉城城守師古曰城守者守其城也音狩後皆類此欲誅蕭曹蕭曹恐踰城保劉季言投劉季以自保也遺沛父老為陳利害射而亦翻遺于季翻為于偽翻父老乃率子弟共殺沛令開門迎劉季立以為沛公春秋之時楚僭王號其大夫多封縣公如申公葉公魯陽公之類是也今立季為沛公用楚制也得三章十二行本三上有二字乙十一行本同孔本同千人以應諸侯項梁者楚將項燕子也嘗殺人與兄子籍避仇吳中吳中賢士大夫皆出其下籍少時學書不成去學劍又不成項梁怒之籍曰書足以記名姓而已劍一人敵不足學學萬人敵於是項梁乃教籍兵法籍大喜略知其意又不肯竟學籍長八尺餘力能扛鼎韋昭曰扛舉也索隱曰說文云扛橫關對舉也長真亮翻扛音江會稽守殷通徐廣曰爾時未言太守余謂戰國之時郡守只稱守景帝中二年七月始曰太守姓譜武王克商子孫分散以殷為氏守式又翻下同欲發兵以應涉使項梁及桓楚將將即亮翻是時桓楚亡在澤中梁曰桓楚亡人莫知其處獨籍知之耳梁乃章十二行本乃下有出字乙十一行本同孔本同誡籍持劍居外梁復入與守坐曰請召籍使受命召桓楚守曰諾梁召籍入須臾梁眴籍曰可行矣眴音舜動目而使之也於是籍遂拔劍斬守頭項梁持守頭佩其印綬釋名印信也所以封物以為驗也亦言因也封物相因付也綬受也繫印之組也以相授受也應劭漢官曰綬長丈二尺法十二月廣三尺法天地人擾亂籍所擊殺數十百人言所殺自數十至百人也莫敢起說文曰慴失氣也音之涉翻梁乃召故所知豪吏諭以所為起大事遂舉吳中兵使人收下縣下縣會稽管下諸縣也師古曰非郡所都故謂之下也梁為會稽守籍為裨將徇下縣籍是時年二十四項籍如此田儋章十二行本儋下有者字乙十一行本同孔本同故齊王族也儋從弟榮榮弟橫皆豪健宗強能得人從才用翻周市徇地至狄周市魏人田儋詳為縛其奴從少年之廷欲謁殺奴詳讀曰佯詐也應劭曰古殺奴婢皆當告官儋欲殺令故詐縛奴以謁也廷縣廷也師古曰廷音定見狄令因擊殺令而召豪吏子弟曰諸侯皆反秦自立齊古之建國也儋田氏當王遂自立為齊王發兵以擊周市周市軍還去田儋率兵東略定齊地韓廣將兵北徇燕燕地豪桀欲共立廣為燕王廣曰廣母在趙不可燕人曰趙方西憂秦南憂楚其力不能禁我且以楚之強不敢害趙王將相之家趙獨安敢害將軍家乎韓廣乃自立為燕王居數月趙燕王母家屬歸之趙王與張耳陳餘北略地燕界趙王間出師古曰謂投間隙而微出燕囚之欲求割地使者往請燕輒殺之有廝養卒走燕壁如淳曰廝賤者也公羊傳曰廝役扈養韋昭曰析薪為廝炊烹為養廝音斯養羊尚翻君知張耳陳餘何欲曰欲得其王耳趙養卒笑曰君未知此兩人所欲也夫武臣張耳陳餘杖馬箠杖直亮翻箠止橤翻馬撾也下趙數十城此亦各欲南面而王豈欲為將相終已耶顧其勢初定未敢參分而王參猶三也以持趙心少詩照翻長知兩翻今趙地已服此兩人亦欲分趙而王時未可耳今君乃囚趙王此兩人名為求趙王實欲燕殺之此兩人分趙自立夫以一趙尚易燕易弋豉翻況以兩賢王左提右挈而責殺王之罪滅燕易矣燕將乃歸趙王養卒為御而歸元年周巿自狄還至魏地欲立故魏公子寧陵君咎為王寧陵即漢之寧陵縣屬陳留郡括地志曰宋州寧陵城古寧陵也不得之魏魏地已定諸侯皆欲立周巿為魏王巿曰天下昏亂忠臣乃見見賢遍翻今天下共畔秦其義必立魏王後乃可諸侯固請立巿巿終辭不受迎魏咎於陳五反陳王乃遣之立咎為魏王巿為魏相元年是歲二世廢衞君角為庶人衞絕祀周之列國衞最後亡聶崇岐標點顧頡剛覆校
