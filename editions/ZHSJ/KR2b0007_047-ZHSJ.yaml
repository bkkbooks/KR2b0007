body:
  text: 資治通鑑卷第四十七翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註漢紀三十九元和二年肅宗孝章皇帝下元和二年乙酉八五元和二年春正月乙酉詔曰令云民有產子者復勿算三歲復方目翻復其夫勿輸算也今諸懷姙者賢曰姙孕也音壬復其夫勿算一歲著以為令又詔三公曰章甲十六行本曰下有夫俗吏矯飾外貌似是而非朕甚饜之甚苦之十八字乙十一行本同孔本同張校同饜作厭安靜之吏悃愊無華說文曰悃愊至誠也悃音苦本翻愊音孚逼翻月計有餘莊子有是言此謂以日計功若不足者然久而計之則民安其生家給人足固有餘矣襄城縣屬潁川郡雖未有他異斯亦殆近之矣近其靳翻夫以苛為察以刻為明以輕為德以重為威四者或興則下有怨心吾詔書數下冠蓋接道冠蓋接道謂奉詔出使者相接於道也數所角翻民或失職其咎安在勉思舊令稱朕意焉舊令謂故府之籍所疏載者稱尺證翻元和二年北匈奴大人車利涿兵等車昌遮翻亡來入塞凡七十三輩時北虜衰耗黨衆離畔南部攻其前丁零寇其後鮮卑擊其左西域侵其右不復自立復扶又翻乃遠引而去元和二年南單于長死單于汗之子宣立為伊屠於閭鞮單于屠直於翻鞮丁奚翻元和二年太初曆施行百餘年曆稍後天謂七曜之行在曆家所推步躔次之前晦朔弦望不合也治直之翻訢音欣梵扶中翻作四分曆考異曰按王莽初已廢太初用三統曆今云太初曆失天益遠蓋光武中興廢莽曆復用太初也續漢志又云自太初元年始用三統曆按三統曆劉歆所造云太初元年始用誤也甲寅始施行之元和二年帝之為太子也受尚書於東郡太守汝南張酺續漢志東郡去雒陽八百餘里酺薄乎翻丙辰帝東巡幸東郡引酺及門生幷郡縣掾史並會庭中東郡庭也掾俞絹翻使酺講尚書一篇然後脩君臣之禮賞賜殊特莫不沾洽行過任城幸鄭均舍賜尚書祿以終其身時人號為白衣尚書先是均事帝為尚書數納忠言帝敬重之謝病歸任城今祿以尚書任音壬元和二年乙丑帝耕於定陶辛未幸泰山此告岱宗書舜典至于岱宗柴孔安國註曰泰山為四岳所宗燔柴祭天告至壬申宗祀五帝于汶上明堂汶上明堂武帝所作在奉高縣西南四里汶音問丙子赦天下章甲十六行本下下有戊寅二字乙十一行本同孔本同張校同退齋校同進幸濟南濟南國在雒陽東千八百里賢曰濟南故城在淄州長山縣西北濟子禮翻己丑幸魯庚寅祠孔子於闕里續漢志魯縣古曲阜有闕里孔子所居自顏回以下七十餘人黃帝曰雲門堯曰咸池舜曰大韶禹曰大夏湯曰大護周曰大武帝謂孔僖曰今日之會寧於卿宗有光榮乎對曰臣聞明王聖主莫不尊師貴道今陛下親屈萬乘辱臨敝里此乃崇禮先師增煇聖德先師謂孔子非所敢承帝大笑曰非聖者子孫焉有斯言乎焉於虔翻拜僖郎中元和二年壬辰帝幸東平追念獻王謂其諸子曰思其人至其鄉其處在其人亡因泣下沾襟遂幸獻王陵賢曰陵在今鄆州峗山南峗音魚委翻親拜祠坐坐徂臥翻哭泣盡哀獻王之歸國也事見四十二卷明帝永平四年不忍去之遂為王家大夫數十年事祖及孫獻王及子懷王敞栩況羽翻下遐稼翻皆引見見賢遍翻既愍其淹滯且欲揚獻王德美即皆擢為議郎乙未幸東阿北登太行山至天井關行戶剛翻夏四月乙卯還宮庚申假于祖禰虞書一歲巡四岳歸格于藝祖孔安國註曰巡狩四岳然後歸告至文祖之廟賢曰假至也音格禰父廟元和二年五月徙江陵王恭為六安王恭封六安王以廬江郡為國在雒陽東一千七百里元和二年秋七月庚子詔曰春秋重三正慎三微賢曰三正謂天地人之正所以有三者由有三微之月王者所當奉而成之禮記曰正朔三而改文質再而復三微者三正之始萬物皆微物色不同故王者取法焉十一月時陽氣始施於黃泉之下色皆赤赤者陽氣故周為天正色尚赤十二月萬物始牙而色白白者陰氣故殷為地正色尚白十三月萬物莩甲而出其色皆黑人得加功展業故夏為人正色尚黑尚書大傳曰夏以十三月為正平旦為朔殷以十二月為正雞鳴為朔周以十一月為正夜半為朔必以三微之月為正者當爾之時物皆尚微王者受命當扶微理弱奉承之義也止用冬初十月而已元和二年冬南單于遣兵與北虜溫禺犢王戰於涿邪山斬獲而還武威太守孟雲上言北虜以前既和親而南部復往抄掠復扶又翻北單于謂漢欺之謀欲犯塞謂宜還南所掠生口以慰安其意詔百官議於朝堂朝直遙翻太尉鄭弘司空第五倫以為不可許司徒桓虞及太僕袁安以為當與之弘因大言激厲虞曰諸言當還生口者皆為不忠虞廷叱之倫及大鴻臚韋彪皆作色變容臚陵如翻司隸校尉舉奏弘等弘等皆上印綬謝詔報曰久議沈滯沈持林翻各有所志蓋事以議從策由衆定誾誾衎衎得禮之容賢曰誾誾忠正貌衎衎和樂貌誾魚巾翻衎音侃又苦旦翻更非朝廷之福寢息也其各冠履帝乃下帝曰江海所以章甲十六行本以下有能字乙十一行本同長百川者以其下之也老子曰江海所以為百谷王者以其善下也長知兩翻下遐稼翻尚何足病況今與匈奴君臣分定少詩沼翻分扶問翻辭順約明貢獻累至豈宜違信自受其曲其敕度遼及領中郎將龐奮倍雇南部所得生口以還北虜領中郎將領護匈奴中郎將也賢曰雇賞報也計功受賞如常科三年三年春正月丙申帝北巡辛丑耕于懷二月乙丑敕侍御史司空曰方春所過毋得有所伐殺車可以引避引避之騑馬可輟解輟解之侍御史掌舉劾司空掌土功車駕行幸則侍御史掌舉劾道路之不如法司空帥工徒治道路修橋梁故皆敕之賢曰夾轅為服馬服馬外為騑馬孔穎達曰車有一轅而四馬駕之中央兩馬夾轅得名服馬兩邊名騑馬亦曰驂馬騑音非戊辰進幸中山出長城賢曰史記蒙恬為秦築長城西自臨洮東至海余謂此非秦長城蓋趙所築長城也癸酉還幸元氏三月己卯進幸趙趙國在雒陽北一千一百里辛卯還宮三年太尉鄭弘數陳侍中竇憲權勢太盛數所角翻言甚苦切憲疾之會弘奏憲黨尚書張林雒陽令楊光在官貪殘書奏吏與光故舊因以告之光報憲憲奏弘大臣漏泄密事帝詰讓弘詰去吉翻夏四月丙寅收弘印綬弘自詣廷尉詔敕出之因乞骸骨歸未許病篤上書陳謝曰竇憲姦惡貫天達地海內疑惑賢愚疾惡惡烏路翻謂憲何術以迷主上近日王氏之禍昞然可見謂王氏以戚屬而成篡國之禍昞音炳處昌呂翻保萬世之祚而信讒佞之臣不計存亡之機臣雖命在晷刻死不忘忠願陛下誅四凶之罪以厭人鬼憤結之望厭一豔翻滿也考異曰袁紀云弘為尚書僕射烏孫王遣子入侍上問弘當答其使否弘對曰烏孫前為大單于所攻陛下使小單于往救之尚未賞今如答之小單于不當怨乎上以弘議問侍中竇憲對曰禮存往來弘章句諸生不達國體上遂答烏孫小單于忿恚攻金城郡殺太守任昌上謂弘曰朕前不從君議果如此弘對曰竇憲姦臣也有少正卯之行未被兩觀之誅陛下前何為用其議按肅宗時無小單于寇金城事今不取帝省章遣醫視弘病比至已薨省悉景翻比必寐翻三年以大司農宋由為太尉三年司空第五倫以老病乞身委身以事君則身非我有故於其老而乞退也謂之乞身猶言乞骸骨也丙子賜策罷以二千石俸終其身倫奉公盡節言事無所依違若依若違兩可不決之論也少文采少詩沼翻在位以貞白稱或問倫曰公有私乎對曰昔人有與吾千里馬者吾雖不受每三公有所選舉心不能忘亦章甲十六行本亦上有而字乙十一行本同孔本同張校同終不用也若是者豈可謂無私乎以太僕袁安為司空三年秋八月乙丑帝幸安邑觀鹽池安邑縣屬河東郡鹽池在縣西南楊佺期洛陽記曰河東鹽池長七十里廣七里水氣紫色許慎曰河東鹽池袤五十一里廣七里周百一十六里酈道元曰安邑鹽池上承鹽水水出東南薄山西北流逕巫咸山北又逕安邑故城南又西流注于鹽池水出石鹽自然即成朝取夕復終無減損唯山暴雨澍甘澤潢潦奔逸則鹽池用耗故公私共堨水逕防其淫濫故謂之鹽水亦為堨水也池西又有一池謂之女鹽澤東西二十五里南北二十里在猗氏故城南土人鄉俗引水裂沃麻分灌川野畦水耗竭土自成鹽即所謂鹹鹺也而味苦賢曰在今蒲州虞鄉縣西還宮三年燒當羌迷吾復與弟號吾及諸種反復扶又翻種章勇翻號吾先輕入寇隴西界督烽掾李章追之督烽掾郡掾之督烽燧者將詣郡號吾曰獨殺我無損於羌誠得生歸必悉罷兵不復犯塞隴西太守張紆放遣之羌即為解散為于偽翻各歸故地迷吾退居河北歸義城河北逢留大河之北也歸義城本漢所築以招來諸羌之歸義者三年疏勒王忠從康居王借兵還據損中忠叛見上卷元年賢曰損中未詳東觀記作頓中續漢書及華嶠書並作損中本或作楨未知孰是余按西域傳靈帝建寧三年涼州刺史孟佗遣兵討疏勒攻楨中城楨中是也超知其姦而偽許之忠從輕騎詣超超斬之因擊破其衆南道遂通三年楚許太后薨楚王英之徙也許太后留楚宮追爵諡曰楚厲侯諡法殺戮無辜曰厲三年帝以潁川郭躬為廷尉決獄斷刑斷丁亂翻多依矜恕條諸重文可從輕者四十一奏之事皆施行三年博士魯國曹褒上疏以為宜定文制著成漢禮太常巢堪巢姓有巢氏之後春秋有巢牛臣一世大典非褒所定言非褒所能定帝知諸儒拘攣攣呂員翻難與圖始賢曰拘攣猶拘束也宜以時立乃拜褒侍中玄武司馬班固以為宜廣集諸儒共議得失百官志玄武司馬主南宮玄武門秩比千石諺言作舍道邊三年不成會禮之家名為聚訟會禮言會而議禮賢曰聚訟言相爭不定也筆不得下昔堯作大間一夔足矣堯作樂曰大章記曰大章章之也賢曰夔堯樂官呂氏春秋曰魯哀公問於孔子曰樂正夔一足矣皇侃曰章明也民樂堯德大明故名樂曰大章章和元年丁亥八七是年七月改元三年春正月帝召褒受章甲十六行本受作授乙十一行本同以叔孫通漢儀十二篇通制漢儀見十卷高帝六年七年其書與律令同藏於理官此制散略多不合經今宜依禮條正使可施行三年護羌校尉傅育欲伐燒當羌為其新降為于偽翻不欲出兵乃募人鬬諸羌胡摹人間搆諸羌使之自鬬也遂復叛出塞復扶又翻更依迷吾育請發諸郡兵數萬人共擊羌未及會三月育獨進軍迷吾聞之徙廬落去廬穹廬落居也夜至三兜谷三兜谷在建威南迷吾襲擊大破之殺育及吏士八百八十人及諸郡兵到羌遂引去詔以隴西太守張紆校尉將萬人屯臨羌紆邕俱翻三年夏六月戊辰司徒桓虞免癸卯以司空袁安為司徒光祿勳任隗為司空隗光之子也任音壬隗五罪翻三年齊王晃及弟利侯剛班志利縣屬齊郡晃齊武王縯之曾孫殤王石之子更工衡翻秋七月癸卯詔貶晃爵為蕪湖侯賢曰蕪湖縣名屬丹陽郡其故城在今宜州當塗縣東南收太姬璽綬璽斯氏翻綬音受三年壬子淮陽頃王蛃薨昞明帝子三年鮮卑入左地匈奴左地也大破之斬優留單于而還還從宣翻又如字三年羌豪迷吾復與諸種寇金城塞復扶又翻種章勇翻下同張紆遣從事河內司馬防百官志使匈奴中郎將置從事二人護羌校尉蓋亦置二人也迷吾兵敗走因譯使欲降紆納之迷吾將人衆詣臨羌紆設兵大會譯通夷言使之將命因謂之譯使設兵陳兵也使疏吏翻降戶江翻伏兵殺其酋豪八百餘人酋慈由翻斬迷吾頭以祭傅育冢復放兵擊其餘衆斬獲數千人迷吾子迷唐與諸種解仇結婚交質質音致據大小榆谷以叛水經河水逕西海郡南又東逕允川而歷大榆谷小榆谷北二榆土地肥美羌所依阻也張紆不能制三年壬戌詔以瑞物仍集改元章和章明也明和氣之致祥也京師四方屢有嘉瑞前後數百千言事者咸以為美而太尉掾平陵何敞獨惡之惡烏路翻杜佑曰漢武帝割槐里置茂陵邑昭帝又割置平陵邑謂宋由袁安曰夫瑞應依德而至災異緣政而生今異鳥翔於殿屋怪草生於庭際不可不察由安懼不敢答三年八月癸酉帝南巡戊子幸梁乙未晦幸沛梁沛二國三年日有食之三年九月庚子帝幸彭城辛亥幸壽春壽春縣屬九江郡延貶事見上卷建初元年己未幸汝陰汝陰縣屬汝南郡賢曰今潁州縣十月丙子還宮三年北匈奴大亂屈蘭儲等五十八部口二十八萬詣雲中五原朔方北地降三年曹褒依準舊典雜以五經讖記之文撰次天子至於庶人冠婚吉凶終始制度撰次制度備其終始也讖楚譖翻撰雛免翻冠古玩翻奏之帝以衆論難一故但納之不復令有司平奏平奏者平其可行與否而奏之復扶又翻三年不歲班超發于窴諸國兵共二萬五千人擊莎車元和元年超擊莎車未克故也窴徒賢翻莎素禾翻龜茲音兵慈超召將校及于窴王議曰將即亮翻校戶教翻今兵少不敵其計莫若各散去于窴從是而東長史亦於此西歸班超時為將兵長史蓋西歸疏勒也須待也夜鼓聲鼓鼜之聲也周禮軍旅夜鼜註云鼜夜戒守鼓也司馬法曰昏鼓四通為大鼜夜半三通為晨戒旦明五通為發昫所謂三鼜也此則待夜半鼓聲也鼜千歷翻昫休具翻劉休武翻使生口得歸言將散去也大喜自以萬騎於西界遮超溫宿王將八千騎於東界徼于窴徼一遙翻超知二虜已出密召諸部勒兵章甲十六行本兵下有雞鳴二字乙十一行本同孔本同張校同馳赴莎車營胡大驚亂奔走追斬五千餘級莎車遂降降戶江翻龜茲等因各退散自是威震西域二年二年春正月濟南王康阜陵王延中山王焉來朝上性寬仁篤於親親故叔父濟南中山二王每數入朝濟子禮翻數所角翻朝直遙翻特加恩寵及諸昆弟並留京師不遣就國漢制諸藩王朝會之禮畢各就國不得留京師過於制度倉帑為虛帑他朗翻為于偽翻何敞奏記宋由曰比年水旱民不收穫涼州緣邊家被凶害賢曰時西羌犯邊為害也比毗至翻被皮義翻公私屈竭此實損膳節用之時國恩覆載言恩同天地也覆敷救翻但聞臘賜自郎官以上公卿王侯以下至於空竭帑藏藏徂浪翻損耗國資尋公家之用皆百姓之力明君賜賚宜有品制忠臣受賞亦應有度賢曰漢官儀臘賜大將軍三公錢各二十萬牛肉二百斤粳米二百斛特進侯十五萬卿十萬校尉五萬尚書三萬侍中將大夫各二萬千石六百石各七千虎賁羽林郎二人共三千以為祀門戶直書禹貢曰禹錫玄圭賢曰尚書曰召公出取幣入錫周公責深負大上當匡正綱紀下當濟安元元豈但空空無違而已哉空當作悾悾悾謹愨貌還所得賜因陳得失奏王侯就國除苑囿之禁節省浮費賑卹窮孤則恩澤下暢黎庶悅豫矣由不能用考異曰敞傳此事在肅宗崩後云竇氏專政外戚奢侈賞賜過制敞奏記云云袁紀在元和三年按敞記云明公視事出入再朞又言臘賜知在此時尚書南陽宋意上疏曰陛下至孝烝烝烝進也烝烝進進也禮寵諸王同之家人車入殿門漢制太子諸王至司馬門皆下車故謂止車門臣於君前拜而後就席賞賜優渥損御膳以分甘也享食大國陛下恩寵踰制禮敬過度春秋之義諸父昆弟無所不臣君君臣臣不以親厭殺天地之大經也春秋尊王故以為春秋之義強幹弱枝者也陛下德業隆盛當為萬世典法不宜以私恩損上下之序失君臣之正又西平王羨等六王皆妻子成家謂有妻有子自成一家也謂王國官已具也為子孫基阯而室第相望久磐京邑賢曰磐謂磐桓不去寵祿隆過宜割情不忍以義斷恩賢曰禮記曰門內之政恩掩義門外之政義斷恩斷丁亂翻令羨等速就便時以塞衆望賢曰行日取便利之時也塞悉則翻二年壬辰帝崩于章德前殿年三十一遺詔無起寢廟一如先帝法制范曄論曰魏文帝稱明帝察察章帝長者章帝素知人厭明帝苛切事從寬厚奉承明德太后盡心孝道平傜簡賦而民賴其慶又體之以忠恕文之以禮樂謂之長者不亦宜乎二年太子即位年十歲尊皇后曰皇太后二年三月章甲十六行本月下有丁酉二字乙十一行本同孔本同用遺詔徙西平王羨為陳王六安王恭為彭城王改淮陽為陳國楚郡為彭城國西平併汝南郡六安復為廬江郡二年癸卯葬孝章皇帝于敬陵敬陵在雒陽城東南三十九里二年南單于宣死單于長之弟屯屠何立為休蘭尸逐侯鞮單于鞮丁兮翻二年太后臨朝蔡邕獨斷曰少帝即位太后即代攝政臨前殿朝㣥臣太后東面少帝西面㣥臣上書奏事皆為兩通一詣太后一詣少帝賢曰幹主也或曰幹古管字也弟篤為虎賁中郎將篤弟景王褱並為中常侍兄弟皆在親要之地憲客崔駰駰音因以書戒憲曰傳曰生而富者驕生而貴者慠傳直戀翻慠五到翻生富貴而能不驕慠者未之有也今寵祿初隆百僚觀行行下孟翻豈可不庶幾夙夜以永終譽乎詩周頌振鷺之辭言庶幾於夙夜匪懈以終保令名於有永也稱為賢臣馮野王妹為元帝昭儀於九卿中野王行能第一終受多福陰衞尉興也謂讓侯爵又讓大司馬也垂愆於後者蓋在滿而不挹位有餘而仁不足也漢興以後迄于哀平外家二十保族全身四人而已外家二十者邑氏張氏薄氏竇氏王氏陳氏衞氏李氏趙氏上官氏史氏許氏靈氏卬成王氏元后王氏趙氏傅氏丁氏馮氏衞氏也唯文帝薄太后竇后景帝王后卬成王后四人保族全家武帝夫人李氏雖追配武帝昌邑王立未幾而廢非外家當以史皇孫王夫人足二十之數書召誥曰我不可不鑒于有夏亦不可不鑒于有殷二年庚戌皇太后詔以故太尉鄧彪為太傅賜爵關內侯錄尚書事百官總己以聽竇憲以彪有義讓先帝所敬彪父邯封鄳鄉侯父卒彪讓國於弟鳳顯宗高其節賢曰委隨猶順從也其所施為輒外令彪奏內白太后事無不從王莽用孔光之故智也修身而已不能有所匡正憲性果急睚性果急睚眦章甲十六行本眦作眦乙十一行本同之怨莫不報復賢曰睚音語懈翻眦蒸音仕懈翻廣雅曰睚或謂裂眦蒸瞋目貌也永平時謁者韓紆考劾憲父勳獄勳下獄死事見四十五卷明帝永平五年劾戶概翻又戶得翻憲遂令客斬紆子以首祭勳冢二年癸亥陳王羨彭城王恭樂成王黨下邳王衍梁王暢始就國二年夏四月戊寅以遺詔罷郡國鹽鐵之禁縱民煮鑄自武帝以來鹽鐵有禁光武中興收而未罷今縱民得煮鹽鑄鐵二年五月京師旱二年北匈奴饑亂降南部者歲數千人降戶江翻下同秋七月南單于上言宜及北虜分爭出兵討伐破北成南共章甲十六行本共作幷乙十一行本同孔本同為一國考異曰袁紀章和元年十月南單于上書求出兵破北成南宋意諫不聽師未出而帝寢疾范書南匈奴傳事並在此年七月按單于書云孝章皇帝聖思遠慮則范書是也今從之謂北部既滅南部保塞則漢家無復北顧以為念也長知兩翻開口仰食仰魚向翻歲時賞賜動輒億萬雖垂拱安枕慙無報效之義願發國中及諸郡章甲十六行行郡作部乙十一行本同張校同故胡新降精兵故胡南部舊衆也新降新從北部來降者期十二月同會虜地臣兵衆單少不足以防內外少詩沼翻願遣執金吾耿秉度遼將軍鄧鴻及西河雲中五原朔方上郡太守守式又翻幷力而北冀因聖帝威神一舉平定臣國成敗要在今年已敕諸部嚴兵馬唯裁哀省察省悉景翻太后以示耿秉以南單于書示之也昔武帝單極天下單與殫同未遇天時事遂無成謂不能使匈奴臣服也北虜分爭以夷伐夷謂以南部伐北部也國家之利宜可聽許秉因自陳受恩分當出命效用分扶問翻太后議欲從之尚書宋意上書曰夫戎狄簡賤禮義無有上下強者為雄弱即屈服自漢興以來征伐數矣數所角翻其所克獲曾不補害光武皇帝躬服金革之難深昭天地之明因其來降羈縻畜養畜許六翻邊民得生勞役休息於茲四十餘年矣建武二十四年受南單于降至是四十一年斬獲萬數謂破殺優留單于也漢興功烈於斯為盛所以然者夷虜相攻無損漢兵者也臣察鮮卑侵伐匈奴正嚴正改止是利其抄掠及歸功聖朝實由貪得重賞洞見鮮卑之情抄楚交翻則不得不禁制鮮卑鮮卑外失暴掠之願內無功勞之賞豺狼貪婪婪盧含翻方言殺人而取其財曰婪必為邊患今北虜西遁請求和親宜因其歸附以為外扞巍巍之業無以過此若引兵費賦以順南虜則坐失上略去安即危矣誠不可許會齊殤王子都鄉侯暢來弔國憂齊殤王石齊武王縯之孫哀王章之子考異曰袁紀作郁鄉侯暢今從范書范書曰暢素行邪僻因鄧叒冝母元自通長樂宮得幸太后數所角翻遣客刺殺暢於屯衞之中何敞傳曰刺殺暢於城門屯衞之中刺七亦翻乃使侍御史與青州刺史雜考剛等青州刺史部齊國暢見殺於京師而令青州刺史考竟欲移獄以絕蹤也賊在京師不宜捨近問遠恐為姦臣所笑太后怒以切責稜稜固執其議何敞說宋由曰說輸芮翻暢宗室肺府府與腑同來弔大憂上書須報賢曰須待也致此殘酷奉憲之吏莫適討捕賢曰敵音的謂無指的討捕也蹤跡不顯主名不立敞備數股肱職典賊曹賢曰股肱謂手臂也公府有賊曹主知盜賊余按字書股髀幹肱臂幹股肱言手足之要以為手臂誤矣發所賊發之所糾督察也以為章甲十六行本為下有故事二字乙十一行本同孔本同張校同退齋校同三公不與賊盜賢曰敞在太尉府二府謂司徒司空內吉為丞相不案事遂以為故事與同讀曰預莫以為咎敞請獨奏案之由乃許焉二府聞敞行皆遣主者隨之賢曰主者謂主知賊盜之曹也具得事實太后怒閉憲於內宮憲懼誅因自求擊匈奴以贖死冬十月乙亥以憲為車騎將軍伐北匈奴以執金吾耿秉為副發北軍五校黎陽雍營緣邊十二郡騎士及羌胡兵出塞北軍五校屯騎越騎步兵長水射聲五校尉所掌宿衞兵也黎陽營註見前扶風校尉部在雍縣以涼州近羌數犯三輔將兵衞護園陵故俗稱雍營緣邊十二郡上郡西河五原雲中定襄鴈門朔方代郡上谷漁陽安定北地也校戶教翻雍於用翻二年公卿舉故張掖太守鄧訓代張紆為護羌校尉迷唐率兵萬騎來至塞下未敢攻訓先欲脅小月氏胡匈奴破月氏月氏西徙其餘衆保南山不得去者號小月氏氏音支令不得戰議者咸以羌胡相攻縣官之利不宜禁護訓曰張紆失信衆羌大動涼州吏民命縣絲髮縣讀曰懸原諸胡所以難得意者皆恩信不厚耳今因其追急以德懷之庶能有用遂令開城及所居園門護羌校尉所居寺舍後園之門也嚴兵守衞羌掠無所得又不敢逼諸胡因即解去由是湟中諸胡皆言漢家常欲鬬我曹賢曰湟中月氏胡所居今鄯州湟水縣也開門內我妻子乃是得父母也咸歡喜叩頭曰唯使君所命訓遂撫養教諭大小莫不感悅於是賞賂諸羌種使相招誘誘音酉迷唐叔父號吾將其種人八百戶來降種章勇翻訓因發湟中秦胡羌兵四千人出塞秦威服四夷故夷人率謂中國人為秦人破之賢曰東觀記曰寫作鴈大小榆谷杜佑曰大小榆谷在漢榆中縣今在蘭州五泉縣界按水經大小榆谷在漢金城郡塞外河水過大小榆谷北又東過河關縣北又東過允吾縣北又東過榆中縣北榆中縣與大小榆相去甚遠杜佑說非衆悉離散孝和皇帝上諱肇肅宗第四子也竇后養以為子廢長立之諡法不剛不柔曰和伏侯古今註曰肇之子曰始音兆賢曰按許慎說文肇音大可翻上諱也但伏侯許慎並漢時人而帝諱音不同蓋應別有所據永元元年己丑八九二年春迷唐欲復歸故地鄧訓發湟中六千人令長史任尚將之將即亮翻縫革為船置於箄上以渡河賢曰箄木筏也音步佳翻掩擊迷唐大破之斬首前後一千八百餘級獲生口二千人馬牛羊三萬餘頭一種殆盡賢曰一種謂迷唐也種章勇翻考異曰西羌傳永元元年張紆坐徵以訓代為校尉鄧訓傳章和二年紆誘誅羌羌謀報怨公卿舉訓代紆擊破之其春迷唐復欲歸訓又破之按訓傳下云永元二年則其春永元元年春也今從訓傳諸附落小種皆畔之附落羌部落之附迷唐者稽顙歸死歸死自歸而請死也帥所類翻質音致於是訓綏接歸附威信大行遂罷屯兵各令歸郡以羌反發諸郡兵屯於塞上今羌已破罷令各歸其郡分以屯田脩理塢壁而已二年竇憲將征匈奴三公九卿詣朝堂上書諫以為匈奴不犯邊塞而無故勞師遠涉損費國用徼功萬里徼一遙翻非社稷之計書連上輒寢上時掌翻下同宋由懼遂不敢復署議復扶又翻而諸卿稍自引止唯袁安任隗守正不移至免寇朝堂固爭前後且十上衆皆為之危懼為于偽翻下同安隗正色自若侍御史魯恭上疏曰國家新遭大憂陛下方在諒闇闇音陰百姓闕然三時不聞警蹕之音賢曰三時夏秋冬也天子出警入蹕沈約曰漢制曰出稱警入稱蹕而今則幷稱之史臣以為警者警戒也蹕得止行也今從乘輿而出者並警戒以備非常也從外而入與乘輿相干者蹕而止之也和帝章和二年二月即位明年春議擊匈奴帝在諒闇不出故三時不聞警蹕之音若有求而不得禮記顏丁善居喪始死皇皇如有求而不得此言百姓思慕之意擾動天下以事戎夷誠非所以垂恩中國改元正時由內及外也萬民者天之所生天愛其所生猶父母愛其子一物有不得其所則天氣為之舛錯況於人乎故愛民者必有天報夫戎狄者四方之異氣與鳥獸無別別彼列翻若雜居中國則錯亂天氣汙辱善人汙烏故翻是以聖王之制羈縻不絕而已字書曰羈馬絡頭也蒼頡篇曰縻牛韁也遠藏於史侯河西去塞數千里而欲乘其虛耗利其微弱是非義之所出也今始徵發而大司農調度不足調徒弔翻賢曰度音大各翻余據今人多讀如本字上下相迫民間之急亦已甚矣㣥僚百姓咸曰不可陛下章甲十六行本下下有獨字乙十一行本同孔本同柰何以一人之計棄萬人之命不卹其言乎上觀天心下察人志足以知事之得失臣恐中國不為中國豈徒匈奴而已哉尚書令韓稜騎都尉朱暉議郎京兆樂恢皆上疏諫太后不聽又詔使者為憲弟篤景並起邸第勞役百姓為于偽翻下同侍御史何敞上疏曰臣聞匈奴之為桀逆久矣平城之圍事見十一卷高帝七年事見十二卷惠帝三年臣子所為捐軀而必死高祖呂后忍怒含忿舍而不誅舍讀曰捨今匈奴無逆節之罪漢朝無可慙之恥朝直遙翻下同而盛春東作賢曰歲起於東人始就耕故曰東作元元怨恨咸懷不悅又猥為衞尉篤奉車都尉景繕脩館第彌街絕里篤景親近貴臣當為百僚表儀今衆軍在道朝廷焦脣百姓愁苦縣官無用無財用也崇飾玩好好呼到翻宜且罷工匠專憂北邊恤民之困書奏不省省悉景翻竇憲嘗使門生齎書詣尚書僕射郅壽有所請託壽即送詔獄前後上書陳憲驕恣引王莽以誡國家又因朝會刺譏憲等以伐匈奴起第宅事厲音正色辭旨甚切憲怒陷壽以買公田誹謗下吏當誅下遐稼翻何敞上疏曰壽機密近臣匡救為職若懷默不言其罪當誅今壽違衆正議以安宗廟豈其私邪臣所以觸死瞽言論語曰侍於君子有三愆未見顏色而言謂之瞽忠臣盡節以死為歸臣雖不知壽度其甘心安之度徒洛翻誠不欲聖朝行誹謗之誅以傷晏晏之化鄭玄註尚書考靈曜曰寬容覆載謂之晏晏塞悉則翻垂譏無窮臣敞謬與機密與讀曰預言所不宜罪名明白當填牢獄先壽僵仆先悉薦翻萬死有餘書奏壽得減死論徙合浦未行自殺壽惲之子也郅惲事光武惲於粉翻夏六月竇憲耿秉出朔方雞鹿塞賢曰今在朔方窳渾縣北鬫駰十三州志曰窳渾縣有大道西北出雞鹿塞窳音羊主翻賢曰滿夷谷闕余按南單于庭在西河美稷滿夷谷當在美稷縣西北後鄧鴻討逢侯兵至美稷逢侯乘冰度隘向滿夷谷可以知矣賢曰稒陽縣屬九原郡故城在今勝州銀城縣界稒音固憲分遣副校尉閻盤司馬耿夔耿譚將南匈奴精騎萬餘與北單于戰于稽洛山余按唐太宗以斛薩部地置稽落州蓋因山以名之單于遁走追擊諸部遂臨私渠北鞮海鞮丁奚翻斬名王已下萬三千級獲生口甚衆雜畜百餘萬頭諸裨小王率衆降者前後八十一部二十餘萬人憲秉出塞三千餘里登燕然山唐太宗又以多濫葛部地置燕然州又按北史燕然山在菟園水北燕於賢翻西都有護軍都尉今始有中護軍還從宣翻又如字下同遣軍司馬吳汜梁諷奉金帛遺北單于遺于季翻時虜中乖亂汜諷及北單于於西海上宣國威信以詔致賜單于稽首拜受稽音啟諷因說令脩呼韓邪故事謂臣服於漢為北藩說輸芮翻即將其衆與諷俱還到私渠海聞漢軍已入塞乃遣弟右溫禺鞮王奉貢入侍隨諷詣闕憲以單于不自身到奏還其侍弟二年秋七月乙未會稽山崩會工外翻二年九月庚申以竇憲為大將軍中郎將劉尚為車騎將軍封憲武陽侯郡國志東郡有東武陽縣泰山郡有南武陽侯國憲其封南武陽歟憲固辭封爵詔許之舊大將軍位在三公下至是詔憲位次太傅下三公上長史司馬秩中二千石太傅位上公則憲亦班於上公矣大將軍長史司馬秩千石今秩中二千石則亦比九卿矣美陽縣屬扶風竇氏兄弟驕縱而執金吾景尤甚奴客緹騎強奪人材貨篡取罪人妻略婦女賢曰漢官儀執金吾緹騎二百人說文曰緹丹黃色也言奴客及緹騎並為縱橫也緹杜兮翻又他禮翻賈音古塞悉則翻如避寇讎又亶發緣邊諸郡突騎有才力者有司莫敢舉奏袁安劾景亶發邊民章甲十六行本民作兵乙十一行本同張校同驚惑吏民二千石不待符信符信謂虎符以為信也劾戶概翻又戶得翻下同當伏顯誅又奏司隸校尉河南尹阿附貴戚不舉劾請免官案罪並寢不報駙馬都尉王褱獨好經書節約自脩王褱古回翻好呼到翻尚書何敞上封事曰昔鄭武姜之幸叔段賢曰鄭武姜愛少子叔段鄭莊公立武姜請以京封共叔段謂之京城太叔後武姜引以襲鄭莊公伐之出奔共賢曰衞莊公寵庶子州吁州吁好兵公弗禁石碏諫不聽及桓公立州吁及弒桓公而篡終至凶戾由是觀之愛子若此猶飢而食之以毒食讀曰飤適所以害之也伏見大將軍憲始遭大憂公卿比奏賢曰比頻也音毗至翻欲令典幹國事憲深執謙退固辭盛位懇懇勤勤言之深至天下聞之莫不說喜今踰年未幾說讀曰悅幾居豈翻入章甲十六行本入作大乙十一行本同孔本同張校同禮未終卒然中改禮事君方喪三年時遭國憂纔踰年故曰入禮未終卒讀曰猝朝直遙翻憲秉三軍之重篤景總宮衞之權而虐用百姓奢侈僭偪誅戮無罪肆心自快今者論議訩訩訩許空翻又許勇翻咸謂叔段州吁復生於漢復扶又翻復扶又翻臣觀公卿懷持兩端不肯極言者以為憲等若有匪懈之志則已受吉甫褒申伯之功賢曰申伯周宣王元舅有令德故君吉甫作詩以美之則自取陳平周勃順呂后之權事見高后紀此言曲盡當時廷臣之情嗚呼豈特當時哉絕其帛丿糸帛丿糸塞其涓涓周金人銘曰涓涓不壅終為江河綿綿不絕或成網羅塞悉則翻涓圭淵翻詩曰思齊太任文王之母左傳武姜啟叔段襲鄭莊公寘姜氏於城潁而誓之曰不及黃泉無相見也駙馬都尉王褱比請退身願抑家權願抑其家不與之以權比毗至翻聽順其意漢之外戚傅喜竇王褱鄧康咸能履盛滿而思謙挹然終不能全其家門十分之一蓋一杯水不能救車薪之火也竇氏之福時濟南王康尊貴驕甚康光武少子康有違失敞輒諫爭爭側迸翻康雖不能從然素敬重敞無所嫌牾焉牾五故翻逆也二年冬十月庚子阜陵質王延薨諡法名實不爽曰質二年是歲郡國九大水二年二年春正月丁丑赦天下二年二月壬午日有食之二年夏五月丙辰封皇弟壽為濟北王開為河間王淑為城陽王濟北河間城陽皆漢舊國也光武省濟北幷泰山省河間幷信都省城陽幷琅邪今復泰山為濟北國在雒陽東千一百五十里分樂成涿郡勃海為河間國在雒陽北二千五百里分琅邪為城陽國濟子禮翻章和元年淮陽頃王昞薨未及立嗣而國有大喪今乃紹封二年竇憲遣副校尉閻礱將二千餘騎掩擊北匈奴之守伊吾者復取其地礱盧紅翻復扶又翻考異曰西域傳作閻槃今從帝紀余謂副校尉閻槃即前戰于稽落山恐當作盤章乙十一行本正作盤西域傳章帝建初元年罷伊吾屯田北匈奴遣兵守其地今復擊取之車師震慴前後王各遣子入侍慴之涉翻二年月氏求尚公主班超拒還其使氏音支使疏吏翻由是怨恨遣其副王謝將兵七萬攻超超衆少皆大恐超譬軍士曰譬喻也少詩沼翻月氏兵雖多然數千里踰葱嶺來非有運輸何足憂邪言糧盡自當降也彼飢窮自降不過數十日決矣謂勝負決也降戶江翻不下又鈔掠無所得超度其糧將盡鈔楚交翻度大各翻必從龜茲求食乃遣兵數百於東界要之要一遙翻謝果遣騎齎金銀珠玉以賂龜茲超伏兵遮擊盡殺之持其使首以示謝謝大驚即遣使請罪願得生歸超縱遣之月氏由是大震歲奉貢獻二年初北海哀王無後章帝元和三年北海哀王基薨無後心常愍之遺詔令復齊北海二國丁卯封蕪湖侯無忌為齊王無忌齊王晃子章和元年晃貶北海敬王睦也二年六月辛卯中山簡王焉薨諡法一德不懈曰簡東海恭王之母弟而竇太后恭王之甥也竇太后母沘陽公主東海恭王彊女也賻音附大為脩冢塋為于偽翻平夷吏民冢墓以千數作者萬餘人凡徵發搖動六州十八郡二年詔封竇憲為冠軍侯篤為郾侯王褱為夏陽侯冠軍縣屬南陽郡郾縣屬潁川郡夏陽縣屬馮翊郡冠古玩翻夏戶雅翻二年秋七月乙卯竇憲出屯涼州涼州部隴西漢陽武都金城安定北地武威張掖敦煌酒泉等郡二年北單于以漢還其侍弟九月復遣使款塞稱臣欲入朝見復扶又翻下同朝直遙翻見賢遍翻冬十月竇憲遣班固梁諷迎之會南單于復上書求滅北庭於是遣左谷蠡王師子等將左右部八千騎出雞鹿塞谷音鹿蠡盧奚翻中郎將耿譚遣從事將護之耿譚為使匈奴中郎將將領也護監也夜至圍之北單于被創被皮義翻創初良翻僅而得免獲閼氏及男女五人氏音支下同斬首八千級生虜數千口班固至私渠海而還是時南部黨眾益盛領戶三萬四千勝兵五萬勝音升三年三年春正月甲子帝用曹褒新禮加元服禮儀志正月甲子若丙子為吉日可加元服儀從冠禮乘輿初緇布進賢次爵弁次武弁次通天以據皆於高祖廟如禮謁賢曰元首也謂加冠於首百官志羽林左監秩六百石主羽林左騎屬光祿勳褒監古銜翻三年竇憲以北匈奴微弱欲遂滅之二月遣左校尉耿夔司馬任尚出居延塞圍北單于於金微山賢曰居延縣屬張掖郡居延澤在東北武帝使路博德築遮虜障於居延北余按唐太宗以僕固部置金微都督府獲其母閼氏張氏下脫斬字名王已下五千餘級北單于逃走不知所在出塞五千餘里而還自漢出師所未嘗至也封夔為粟邑侯賢曰粟邑縣名屬左馮翊故城在今同州白水縣西北三年竇憲既立大功威名益盛以耿夔任尚等為爪牙鄧叒冝郭璜為心腹班固傅毅之徒典文章刺史守令多出其門賦章甲十六行本賦上有競字乙十一行本同孔本同張校同斂吏民共為賂遺斂力贍翻遺于季翻司徒袁安司空任隗舉奏諸二千石幷所連及貶秩免官章甲十六行本官下有者字乙十一行本同孔本同四十餘人竇氏大恨但安隗素行高亦未有以害之行下孟翻尚書僕射樂恢刺舉無所回避憲等疾之恢上書曰陛下富於春秋賢曰春秋謂年也言年少春秋尚多故稱富諸舅不宜幹正王室以示天下這私方今之宜上以義自割下以謙自引四舅可長保爵土之榮四舅謂憲篤景王褱誠策之上者也書奏不省省悉景翻恢稱疾乞骸骨歸長陵恢京兆長陵人迫脅恢飲藥死於是朝臣震慴慴之涉翻望風承旨無敢違者袁安以天子幼弱外戚亶權每朝會進見見賢遍翻及與公卿言國家事未嘗不喑嗚流涕范書作噫嗚賢曰噫音醫又一戒翻嗚一故翻歎傷之貌也皆恃賴之三年冬十月癸未上行幸長安詔求蕭曹近親宜為嗣者紹其封邑三年詔竇憲與車駕會長安憲至尚書以下議欲拜之伏稱萬歲尚書韓稜正色曰夫上交不諂下交不瀆易下繫之辭議者皆慙而止尚書左丞王龍私奏記上牛酒於憲百官志尚書左丞右丞各一人掌錄文書期會左丞主吏民章報及騶伯史右丞假署印綬及紙筆墨諸財用庫藏秩皆四百石蔡質漢儀曰總典臺中綱紀無所不統上時掌翻論為城旦三年龜茲姑墨溫宿諸國皆降降戶江翻十二月復置西域都護騎都尉戊己校尉官章帝建初元年罷西域都護及戊己校尉官今復置復扶又翻徐幹為長史拜龜茲侍子白霸為龜茲王遣司馬姚光送之超與光共脅龜茲廢其王尤利多而立白霸使光將尤利多還詣京師將如字徐幹屯疏勒惟焉耆危須尉犂以前沒都護事見四十五卷明帝永平十八年為班超誅焉耆尉犂王張本言其餘諸國皆臣服於漢也三年初章甲十六行本初上有庚辰上至自長安七字乙十一行本同孔本同張校同退齋校同北單于既亡其弟右谷蠡王於除鞬自立為單于鞬九言翻將衆數千人止蒲類海遣使款塞竇憲請遣使立於除鞬為單于置中郎將領護如南單于故事事下公卿議下遐稼翻下同宋由等以為可許袁安任隗奏以為光武招懷南虜非謂可永安內地正以權時之算可得扞禦北狄故也今朔漠已定宜令南雖于反其北庭幷領降衆降戶江翻下同無緣更立於除鞬以增國費事奏未以時定言其議雖已奏上而上意從否未定也乃獨上封事曰南單于屯先父舉衆歸德屯即屯屠何三帝積累以遺陛下遺于季翻陛下深宜追述先志成就其業況屯首創大謀空盡北虜輟而弗圖更立新降以一朝之計違三世之規失信於所養建立於無功所養謂南單于無功謂於除鞬行篤敬雖蠻貊行焉孔子答子張之言行下孟翻貊莫北翻則百蠻不敢復保誓矣誓謂漢與夷人信誓之言復扶又翻烏桓鮮卑新殺北單于謂章和元年斬優留單于咸畏仇讎今立其弟則二虜懷怨且漢故事供給南單于費直歲一億九十餘萬西域歲七千四百八十萬今北庭彌遠其費過倍是乃空盡天下而非建策之要也詔下其議安又與憲更相難折難乃旦翻折之舌翻憲險急負勢言辭驕訐賢曰訐謂發人之惡音居謁翻至詆毀安稱光武誅韓歆戴涉故事韓歆死見四十三卷建武十五年戴涉死見同卷二十年然上竟從憲策考異曰袁安傳云憲請立左鹿蠡王阿佟為北單于安以為不可憲竟立右鹿蠡王於除鞬據此則阿佟與於除鞬是二人袁紀作阿脩南匈奴傳止有右谷蠡王於除鞬無阿佟名今從之袁紀又云宋由丁鴻尹睦以為阿脩誅君之子又與烏丸鮮卑為父兄之讎不可立南單于先帝所置今首破北虜新建大功宜令幷領降衆與范書不同又云卒從安議蓋誤今從袁安傳王崇武標點容肇祖聶崇岐覆校
