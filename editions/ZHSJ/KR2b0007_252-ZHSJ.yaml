body:
  text: 資治通鑑卷第二百五十二端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註唐紀六十八懿宗昭聖恭惠孝皇帝下咸通十一年咸通十一年庚寅八七咸通十一年春正月甲寅朔㣥臣上尊號曰睿文英武明德至仁大聖廣孝皇帝赦天下咸通十一年西川之民聞蠻寇將至爭走入成都時成都但有子城亦無壕人所占地占之贍翻各不過一席許雨則戴箕盎以自庇又乏水取摩訶池泥汁澄而飲之成都記摩訶池在張儀子城內隋蜀王秀取土築廣子城因為池有胡僧見之曰摩訶宮毗羅蓋胡僧謂摩訶為大宮毗羅為龍謂此池廣大有龍耳因名摩訶池或曰蕭摩訶所開非也池今在成都縣東南十二里將士不習武備節度使盧耽召彭州刺史吳行魯使攝參謀與前瀘州刺史楊慶復考異曰新傳云瀘州刺史楊慶錦里耆舊傳云嘉州誤也今從解圍錄選將校分職事將即亮翻下同校戶教翻立戰棚具礮檑棚蒲庚翻礮普教翻檑盧對翻檑木也自城上下之以壓敵造器備嚴警邏先是西川將士多虛職名亦無稟給先悉薦翻至是揭牓募驍勇之士邏郎佐翻揭丘傑翻補以實職厚給糧賜應募者雲集慶復乃諭之曰汝曹皆軍中子弟年少材勇少詩照翻平居無由自進今蠻寇憑陵乃汝曹取富貴之秋也可不勉乎皆歡呼踊躍於是列兵械於庭使之各試所能兩兩角勝察其勇怯而進退之得選兵三千人號曰突將行魯彭州人也戊午蠻至眉州耽遣同節度副使王偃等齎書見其用事之臣杜元忠與之約和蠻報曰我輩行止只繫雅懷咸通十一年路巖韋保衡上言康承訓討龐勛時逗橈不進上時掌翻逗音豆橈奴教翻又不能盡其餘黨又貪虜獲不時上功上時掌翻辛酉貶蜀王傅分司蜀王佶皇子也考異曰新傳曰宰相路巖韋保衡劾承訓討賊逗橈貪虜獲不時上功貶蜀王傅分司東都按此時保衡未為相蓋以尚主之故上用其言故得擠承訓也咸通十一年南詔進軍新津新津漢武陽縣後周改為新津唐屬蜀州九域志在州東南七十里盧耽遣同節度副使譚奉祀致書于杜元忠問其所以來之意蠻留之不還耽遣使告急于朝朝直遙翻且請遣使與和以紓一時之患朝廷命知四方館事太僕卿支詳為宣諭通和使晏公類要曰舊儀於通事舍人中以宿長一人總知館事謂之館主凡四方貢納及章表皆受而進之唐自中世以後始以他官判四方館事亦為之盤桓為于偽翻而成都守備由是粗完粗坐五翻甲子蠻長驅而北陷雙流雙流漢廣都縣地隋置雙流縣唐屬成都府九域志在府南四十里庚午耽遣節度副使柳槃往見之杜元忠授槃書一通曰此通和之後驃信與軍府相見之儀也其儀以王者自處處昌呂翻語極驕慢又遣人負綵幕至城南云欲張陳蜀王廳以居驃信隋蜀王秀鎮蜀起聽事極為宏壯廳他經翻癸酉廢定邊軍復以七州歸西川七州邛眉蜀雅嘉黎巂也是日蠻軍抵成都城下前一日盧耽遣先鋒遊弈使王晝至漢州詗援軍且趣之詗翾正翻又火迥翻趣讀曰促時興元六千人鳳翔四千人已至漢州會竇滂以忠武義成徐宿四千人自導江奔漢州就援軍以自存丁丑王晝以興元資簡兵三千餘人軍於毗橋毗橋在漢州南界與戰不利退保漢州時成都日望援軍之至而竇滂自以失地謂失定邊軍也每援軍自北至輒說之曰蠻衆多於官軍數十倍官軍遠來疲弊未易遽前說式芮翻易以豉翻諸將信之皆狐疑不進成都十將李自孝陰與蠻通欲焚城東倉為內應城中執而殺之後數日蠻果攻城久之城中無應而止二月癸未朔蠻合梯衝四面攻成都城上以鉤繯挽之使近梯雲梯衝衝車也繯于善翻屈轉其索如環鉤施於其端攻者皆死盧耽以楊慶復攝左都押牙李驤各帥突將出戰帥讀曰率殺傷蠻二千餘人會暮焚其攻具三千餘物而還蜀人素怯其突將新為慶復所獎拔且利於厚賞勇氣自倍其不得出者皆憤鬱求奮後數日賊取民籬重沓濕而屈之以為蓬重直龍翻蓬當作篷編竹以覆舟曰篷言濕籬而屈之狀如舟之眠篷也置人其下舉以抵城而斸之斸陟玉翻斫也掘也矢石不能入火不能然然與燃同燒也攻者又死乙酉支詳遣使與蠻約和丁亥蠻斂兵請和戊子遣使迎支詳時顏慶復以援軍將至詳謂蠻使曰受詔詣定邊約和今雲南乃圍成都則與曏日詔旨異矣且朝廷所以和者冀其不犯成都也今矢石晝夜相交何謂和乎蠻見和使不至使並疏吏翻庚寅復進攻城復扶又翻辛卯城中出兵擊之乃退初韋皋招南詔以破吐蕃既而蠻訴以無甲弩皋使匠教之數歲蠻中甲弩皆精利又東蠻苴那時勿鄧夢衝三部助皋破吐蕃有功事見二百三十三卷德宗興元五年東蠻怨唐深自附於南詔每從南詔入寇為之盡力為于偽翻得唐人皆虐殺之朝廷貶竇滂為康州司戶以顏慶復為東川節度使凡援蜀諸軍皆受慶復節制癸巳慶復至新都九域志新都縣在成都府北四十五里甲午與慶復遇慶復大破蠻軍殺二千餘人蜀民數千人爭操芟刀白棓以助官軍操七刀翻芟刀農家所以芟草棓蒲項翻呼聲震野呼火故翻乙未蠻步騎數萬復至復扶又翻會右武衞上將軍宋威以忠武章十二行本武下有軍字乙十一行本同孔本同二千人至即與諸軍會戰蠻軍大敗死者五千餘人退保星宿山宿音秀威進軍沱江驛沱江驛在成都府新繁縣禹貢岷山導江別為沱沱徒河翻蠻遣其臣楊定保詣支詳請和詳曰宜先解圍退軍定保還蠻圍城如故城中不知援軍之至但見其數來請和數所角翻知援軍必勝矣戊戌蠻復請和使者十返城中亦依違答之蠻以援軍在近攻城尤急驃信以下親立矢石之間庚子官軍至城下與蠻戰奪其升遷橋升遷橋即升僊橋秦時李冰所起舊名七星橋蠻自燒攻具遁去比明官軍乃覺之比必利翻及也初朝廷使顏慶復救成都命宋威屯綿漢為後繼綿漢二州名破蠻軍功居多慶復疾之威飯士欲追蠻軍飯扶晚翻城中戰士亦欲與北軍合勢俱進慶復牒威奪其軍勒歸漢州蠻至雙流阻新穿水九域志蜀州新津縣有新穿鎮狼狽失度失度者失其常度也橋成乃得過斷橋而去斷丁管翻甲兵服物遺棄於路蜀人甚恨之黎州刺史嚴師本收散卒數千保邛州蠻圍之二日不克亦捨去顏慶復始教蜀人築壅門城城門之外別築垣牆以遮城門謂之壅門今人謂之八卦牆是也植鹿角分營鋪斬木為鹿角植之城外以限衝突今人謂之排杈者是分立寨屋謂之營以居士卒城上分立小屋使守卒居之以候望謂之鋪鋪普故翻自是不復犯成都矣復扶又翻先是西川牙將有職無官先悉薦翻及拒卻南詔四人以功授監察御史此所謂官也人輸堂例錢三百緡貧者苦之有功授官而徵其輸錢史言唐之紀綱大壞咸通十一年三月左僕射同平章事曹確同平章事充鎮海節度使咸通十一年夏四月丙午以翰林學士承旨兵部侍郎韋保衡同平章事咸通十一年徐賊餘黨猶相聚閭里為㣥盜散居兗鄆青齊之間詔徐州觀察使夏侯瞳招諭之瞳徒紅翻咸通十一年五月丁丑以邛州刺史吳行魯為西川留後咸通十一年光州民逐刺史李弱翁弱翁奔新息新息漢古縣唐屬蔡州九域志在州東南一百五十五里去光州九十里刺史不道百姓負冤當訴於朝廷置諸典刑豈得㣥黨相聚亶自斥逐亂上下之分此風殆不可長分扶問翻長知兩翻宜加嚴誅以懲來者咸通十一年上令百官議處置徐州之宜處昌呂翻六月丙午太子少傅李膠等狀以為徐州雖屢搆禍亂謂銀刀及桂州戍卒也比毗必翻蓋由統御失人是致姦回乘釁今使名雖降謂降節度為觀察使疏吏翻以為支郡則糧餉不給分隸別藩則人心未服或舊惡相濟更成披猖惟泗州向因攻守結釁已深事見上卷九年十年庶為兩便更工衡翻詔從之徐州依舊為觀察使統徐濠宿三州泗州為團練使割隸淮南咸通十一年加幽州節度使張允伸兼侍中咸通十一年秋八月乙未同昌公主薨上痛悼不已殺翰林醫官韓宗劭等二十餘人悉收捕其親族三百餘人繫京兆獄中書侍郎同平章事劉瞻召諫官使言之諫官莫敢言者乃自上言上時掌翻以為脩短之期人之定分昨公主有疾深軫聖慈宗劭等診療之時診止忍翻候脈也療力照翻治疾也惟求疾愈備施方術非不盡心而禍福難移竟成差跌跌徒結翻原其情狀亦可哀矜而械繫老幼三百餘人物議沸騰道路嗟歎柰何以達理知命之君涉肆暴不明之謗蓋由安不慮危忿不思難之故也伏願少回聖慮寬釋繫者上覽疏不悅瞻又與京兆尹溫璋力諫於上前上大怒叱出之咸通十一年魏博節度使何全皞年少驕暴好殺少詩照翻好呼到翻又減將士衣糧將士作亂全皞單騎走追殺之何進滔得魏博傳三世四十二年而滅成德節度使王景崇為之請旌節為之于偽翻九月庚戌以君雄為魏博留後咸通十一年丙辰以劉瞻同平章事充荊南節度使貶溫璋振州司馬璋歎曰生不逢時死何足惜是夕仰藥卒仰牛向翻敕章十二行本敕上有庚申二字乙十一行本同孔本同退齋校同曰苟無蠹害何至於斯惡實貫盈死有餘責宜令三日內且於城外權瘞瘞於計翻俟經恩宥方許歸葬使中外快心姦邪知懼己巳貶右諫議大夫高湘比部郎中知制誥楊知至禮部郎中魏簹等於嶺南比音毗簹都郎翻皆坐與劉瞻親善為韋保衡所逐也知至汝士之子汝士虞卿從兄也見二百四十一卷穆宗長慶元年扶之子也魏扶見二百四十八卷宣宗大中三年云與醫官通謀誤投毒藥譖言誤投毒藥以致同昌公主於死然既言誤矣又安可以為通謀邪丙子貶瞻康州刺史康州去京師五千七百五十里安數畝之居仍非己有卻四方之賂惟畏人知巖謂畋曰侍郎乃表薦劉相也坐貶梧州刺史梧州漢蒼梧郡所治廣信縣地唐置梧州去京師五千五百里亦貶汀州刺史瑝戶盲翻又音皇路巖素與劉瞻論議多不叶瞻既貶康州巖猶不快閱十道圖以驩州去長安萬里再貶驩州司戶驩州陸路至長安一萬二千四百五十二里水路一萬七千里考異曰實錄新傳皆云巖志欲殺之賴幽州節度使張公素表論瞻冤乃止按是時張允伸鎮幽州云公素恐誤也咸通十一年冬十月癸卯以西川留後吳行魯為節度使咸通十一年十一月辛亥以兵部尚書鹽鐵轉運使王鐸為禮部尚書同平章事鐸起之兄子也王起見二百四十一卷長慶元年鐸起兄炎之子咸通十一年丁卯復以徐州為感化軍節度徐州本武寧軍中有銀刀之亂罷節鎮為觀察今復為感化軍咸通十一年十二月加成德節度使王景崇同平章事以左金吾上將軍李國昌為振武節度使十二年十二年春正月辛酉葬文懿公主同昌公主諡文懿汰其金銀敕祭之於韋氏之庭故曰庭祭汰淘也每物皆百二十輿以錦繡珠玉為儀衞明器輝煥三十餘里記檀弓孔子謂為明器者知喪道矣備物而不可用也其曰明器神明之也何取於輝煥乎餅餤四十橐駝以飼体夫餤于廉翻又徒甘翻飼祥吏翻体蒲本翻体夫轝柩之夫也上與郭淑思公主不已樂工李可及作歎百年曲其聲悽惋歎百年曲歷敍人自少而壯自壯而老少時娟好壯時追歡極樂老時衰颯之狀其聲悽切感動人心惋烏貫翻發內庫雜寶為其首飾以絁八百匹為地衣舞罷珠璣覆地絁式支翻覆敷救翻十二年以魏博留後韓君雄為節度使十二年門下侍郎同平章事路巖與韋保衡素相表裏勢傾天下既而爭權浸有隙保衡遂短巖於上夏四月癸卯以巖同平章事充西川節度使巖出城路人以瓦礫擲之礫郎狄翻權京兆尹薛能巖所擢也巖謂能曰臨行煩以瓦礫相餞能徐舉笏對曰曏來宰相出府司無例發人防衞府司謂京兆府所司能汾州人也能音裳來切十二年五月上幸安國寺賜僧重謙僧澈沈檀講座二各高二丈以沈香檀香為講座也沈持林翻高古號翻十二年秋七月以兵部尚書盧耽同平章事充山南東道節度使十二年冬十月以兵部侍郎鹽鐵轉運使劉鄴為禮部尚書同平章事十三年十三年春正月幽州節度使張允伸得風疾請委軍政就醫許之以其子簡會知留後疾甚遣使上表納旌節丙申薨允伸鎮幽州二十三年宣宗大中四年張允伸代周綝鎮幽州邊鄙無警上下安之十三年二月丁巳以兵部侍郎同平章事于琮為山南東道節度使以刑部侍郎判戶部奉天趙隱為戶部侍郎同平章事十三年平州刺史張公素素有威望為幽人所服張允伸薨公素帥州兵來奔喪帥讀曰率張簡會懼三月奔京師以為諸衞將軍汎言諸衞將軍不言何衞史略之也十三年夏四月立皇子保為吉王傑為壽王倚為睦王十三年以張公素為平盧留後平盧當作盧龍十三年五月國子司業韋殷裕詣閤門告郭淑弟內作坊使敬述陰事內作坊使內諸司使之一掌造內庫軍器杖殺殷裕籍沒其家考異曰續寶運錄曰內作使郭敬述與宰臣韋保衡張能順頻於內宅飲酒潛通郭荒穢頗甚每封進文書於金合內詐稱果子內連郭郭敬述外結張能順國子司業韋殷裕擬傾皇祚別立太子事泄遽加貶降五月十四日內牓子貶工部尚書嚴祈郴州刺史給事中李貺勤州刺史給事中張鐸滕州刺史左金吾大將軍李敬仲儋州司戶國子司業韋殷裕敕京兆府決痛杖一頓處死家資妻女沒官又貶敍州刺史韋君卿愛州崇平縣尉右僕射右羽林統軍張直方康州司馬續又貶駙馬于琮並扶會與韋保衡等同謀不軌事其月十七日又貶尚書左丞李當道州刺史吏部侍郎王諷建州刺史左常侍李都賀州刺史翰林承旨張裼封州司馬中書舍人封彥卿潮州司戶諫議大夫楊塾新州司戶駙馬韋保衡雷州刺史又貶儋州澄邁縣尉又貶驩州長流百姓又賜自盡家貲沒官仍三族不許朝廷錄用其語雜亂無稽今從實錄乙亥閤門使田獻銛奪紫改橋陵使銛思廉翻以其受殷裕狀故也殷裕妻父太府章十二行本府作僕乙十一行本同少卿崔元應妻從兄中書舍人崔沆從才用翻沆下黨翻季父君卿皆貶嶺南官給事中杜裔休坐與殷裕善亦貶端州司戶沆鉉之子也崔鉉見二百四十七卷武宗會昌三年悰之子也十三年丙子貶山南東道節度使于琮為普王傅分司普王儼皇子也後踐阼是為僖宗辛巳貶尚書左丞李當吏部侍郎王渢渢房戎翻左散騎常侍李都翰林學士承旨兵部侍郎張裼裼他計翻又先擊翻前中書舍人封彥卿左諫議大夫楊塾癸未貶工部尚書嚴祁給事中李貺給事中張鐸左金吾大將軍李敬仲起居舍人蕭遘李瀆鄭彥特李藻皆處之湖嶺之南處昌呂翻不詳言各人所貶之地以其無罪故略之也坐與琮厚善故也貺漢之子遘寘之子也李漢見二百四十五卷文宗大和九年蕭寘見二百五十卷五年甲申貶前平盧節度使于琄為涼王府長史分司琄胡犬翻涼王侹皇子也前湖南觀察使于王褱為袁州刺史王褱琄皆琮之兄也尋再貶琮韶州刺史隋於曲江縣置韶州以縣北八十里韶石為名至京師四千九百三十二里琮妻廣德公主上之妹也廣德縣屬宣州行則肩輿門相對坐則執琮之帶琮由是獲全時諸公主多驕縱惟廣德動遵法度事于氏宗親尊卑無不如禮內外稱之十三年六月以盧龍留後張公素為節度使十三年韋保衡欲以其黨裴條為郎官憚左丞李璋方嚴恐其不放上尚書左右丞分總六曹二十四司郎官凡除授非其人左右丞得以糾劾之不令赴省供職上時掌翻璋曰朝廷遷除不應見問秋七月乙未以璋為宣歙觀察使歙書涉翻十三年八月歸義節度使張義潮薨沙州長史曹義金代領軍府制以義金為歸義節度使是後中原多故朝命不及回鶻陷甘州自餘諸州隸歸義者多為羌胡所據自唐末迄于宋朝河湟之地遂悉為戎中國不能復取朝直遙翻十三年冬十二月追上宣宗諡曰元聖至明成武獻文睿智章仁神聰懿道大孝皇帝上時掌翻十三年振武節度使李國昌恃功恣橫橫戶孟翻專殺長吏長知丈翻朝廷不能平徙國昌為大同軍防禦使國昌稱疾不赴史言沙陀跋扈不待殺段文楚而後動於惡十四年十四年春三月癸巳上遣敕使詣法門寺迎佛骨㣥臣諫者甚衆至有言憲宗迎佛骨尋晏駕者事見憲宗紀元和十四年死者人所甚諱也況言之於人主之前乎言之至此人所難也朕生得見之死亦無恨廣造浮圖寶帳香轝幡花幢蓋以迎之幡孚袁翻幢傳江翻史炤曰幢童也其狀童童然皆飾以金玉錦繡珠翠自京城至寺三百里間道路車馬晝夜不絕夏四月壬寅佛骨至京師導以禁軍兵仗公私音樂沸天燭地綿亙數十里儀衞之盛過於郊祀元和之時不及遠矣富室夾道為綵樓及無遮會競為侈靡上御安福門降樓膜拜膜拜胡禮拜也膜莫乎翻賜僧及京城耆老嘗見元和事者金帛迎佛骨入禁中三日出置安國崇化寺宰相已下競施金帛不可勝紀施式豉翻勝音升因下德音降中外繫囚十四年五月丁亥以西川節度使路巖兼中書令考異曰錦里耆舊傳十二年八月路公用邊咸郭籌策奏於邛州置定邊軍節度使復制扼大渡河脩邛崍關南路米點檀丁子弟教之斫刺刀補義軍將主管教練兵士新傳巖至西川承蠻盜邊後巖力拊循置定邊軍於邛州扼大渡治故關取檀丁子弟教擊刺補屯籍由是西山八國來朝以勞遷兼中書令按置定邊軍乃李師望耆舊傳新傳皆誤也十四年南詔寇西川又寇黔南黔中經略使秦匡謀兵少不敵棄城奔荊南黔渠今翻少詩沼翻荊南節度使杜悰囚而奏之六月乙未敕斬匡謀籍沒其家貲親族應緣坐者令有司搜捕以聞匡謀鳳翔人也十四年以中書侍郎同平章事王鐸同平章事充宣武節度使時韋保衡挾恩弄權以劉瞻于琮先在相位不禮於己譖而逐之王鐸保衡及第時主文也唐禮部校文主司謂之主文同年進士也二人素薄保衡之為人保衡皆擯斥之考異曰舊傳曰保衡以楊收路巖在中書不加禮接媒孽逐之按收獲罪時保衡未為相蓋保衡雖為學士懿宗寵任之故能譖收也又曰公主薨自後恩禮漸薄按路巖于琮王鐸蕭遘被擯皆在公主薨後今從實錄十四年秋七月戊寅上疾大漸左軍中尉劉行深右軍中尉韓文約立少子普王儼考異曰范質五代通錄梁李振謂陝州護軍韓彞範曰懿皇初升遐韓中尉殺長立幼以利其權遂亂天下今將軍復欲爾邪彞範即文約孫也按懿宗八子僖宗第五餘子新舊書不載長幼又不言所終不言所殺者果何王也庚辰制立儼為皇太子考異曰續寶運錄曰其日宰臣蕭鄴等直至寢幄問疾上微道朕三字而止㣥臣不覺號哭失聲中外悉皆垂泣按是時宰相韋保衡最在上蕭鄴不為相今不取句古候翻當丁浪翻辛巳上崩于咸寧殿年四十一僖宗即位八月丁未追尊母王貴為皇太后劉行深韓文約皆封國公十四年關東河南大水十四年九月有司上先太后諡曰惠安先太后謂上母王貴也上時掌翻十四年司徒門下侍郎同平章事韋保衡怨家告其陰事貶保衡賀州刺史樂工李可及流嶺南可及有寵於懿宗嘗為子娶婦為于偽翻懿宗賜之酒二銀壺啟之無酒而中實右軍中尉西門季玄屢以為言懿宗不聽可及嘗大受賜物載以官車季玄謂曰汝他日破家此物復應以官車載還非為受賜徒煩牛足耳及流嶺南籍沒其家果如季玄言史言小人寵過而禍及十四年以西川節度使路巖兼侍中加成德節度使王景崇中書令魏博節度使韓君雄盧龍節度使張公素天平節度使高駢並同平章事君雄仍賜名允中考異曰舊傳作允忠實錄新傳皆作允中今從之十四年冬十月乙未以左僕射蕭倣為門下侍郎同平章事十四年韋保衡再貶崖州澄邁令澄邁隋縣唐屬瓊州九域志在州西五十五里又貶其弟翰林學士兵部侍郎保乂為賓州司戶所親翰林學士戶部侍郎劉承雍為涪州司馬涪音浮承雍禹錫之子也劉禹錫見二百三十六卷順宗永貞元年十四年癸卯赦天下十四年西川節度使路巖喜聲色遊宴喜許記翻委軍府政事於親吏邊咸郭籌皆先行後申上下畏之嘗大閱二人議事默書紙相示而焚之軍中以為有異圖驚懼不安朝廷聞之十一月戊辰徙巖荊南節度使咸籌潛知其故遂亡命十四年以右僕射蕭鄴同平章事充河東節度使十四年十二月己亥詔送佛骨還法門寺十四年再貶路巖為新州刺史僖宗惠聖恭定孝皇帝上之上乾符元年乾符元年甲午八七四是年十一月方改元乾符元年春正月丁亥翰林學士盧攜上言上時掌翻以為陛下初臨大寶宜深念黎元國家之有百姓如草木之有根柢柢典禮翻又丁計翻若秋冬培溉則春夏滋榮臣竊見關東去年旱災自虢至海自虢州東至于海也秋稼幾無冬菜至少貧者磑蓬實為麥丏蓄槐葉為齏或更衰羸亦難收章十二行本收作采乙十一行本同退齋校同拾幾居依翻少詩沼翻磑五對翻䃺也麥丏眠見翻齏牋西翻羸倫為翻常年不稔則散之鄰境之往也無所依投坐守鄉閭待盡溝壑其蠲免餘稅實無可徵而州縣以有上供及三司錢戶部轉運鹽鐵為三司趣讀曰促動加捶撻雖撤屋伐木雇妻鬻子止可供所由酒食之費所由謂催督租稅之吏卒或租稅之外更有他傜朝廷儻不撫存百姓實無生計乞敕州縣應所欠殘稅並一切停徵以俟蠶麥仍發所在義倉亟加賑給太宗置義倉及常平倉以備凶荒高宗以後稍假義倉以給他費至神龍中略盡玄宗即位復置之安史之亂復廢至文宗大和九年以天下回殘錢置常平義倉本錢歲增市之以備賑給有菜葉木牙繼以桑椹漸有可食在今數月之間尤為窘急行之不可稽緩敕從其言而有司竟不能行徒為空文而已乾符元年路巖行至江陵敕削官爵長流儋州儋都甘翻巖美姿儀囚於江陵獄再宿須髮皆白尋賜自盡籍沒其家巖之為相也密奏三品以上賜死皆令使者剔取結喉三寸以進結喉喉嚨上下相接之處至是自罹其禍所死之處乃楊收賜死之榻也史言天之報應不爽楊收賜死見上卷咸通十年皆伏誅初巖佐崔鉉於淮南為支使唐制節度使幕屬有掌書記觀察有支使以掌表牋書翰亦書記之任也曰路十終須作彼一官巖第十作彼一官謂作相也不出長安城十年至宰相其自監察入翰林也鉉猶在淮南聞之曰路十今已入翰林如何得老皆如鉉言乾符元年以太子少傅于琮同平章事充山南東道節度使乾符元年二月甲午葬昭聖恭惠孝皇帝于簡陵簡陵在京兆富平縣西北四十五里乾符元年以中書侍郎同平章事趙隱同平章事充鎮海節度使以華州刺史裴坦為中書侍郎同平章事華戶化翻乾符元年以虢州刺史劉瞻為刑部尚書瞻之貶也懿宗咸通十二年瞻貶莫不痛惜及其還也長安兩市人率錢雇百戲迎之長安城中分東西兩市改期由他道而入考異曰玉泉子見聞錄曰初瞻南遷無問賢不肖一口皆為之痛惜殆將至京東西市豪俠共率泉帛募集百戲將逆於城外瞻知之差其期而易路焉瞻為相亦無他才能徒以路巖遭時嫉怒瞻為所排而人心歸向耳其實未足譚也按瞻以清慎著聞及懿宗暴怒瞻獨能不顧其身救數百人之死而玉泉子以為未足談不亦誣乎乾符元年夏五月乙未裴坦薨以劉瞻為中書侍郎同平章事初瞻南遷劉鄴附於韋路共短之韋路謂韋保衡路巖鄴內懼秋八月丁巳朔鄴延瞻置酒於鹽鐵院劉鄴以鹽鐵轉運使為相故延劉瞻宴於鹽鐵院辛未薨時人皆以為鄴鴆之也乾符元年以兵部侍郎判度支崔彥昭為中書侍郎同平章事彥昭㣥之從子也崔㣥相憲穆從才用翻正雅之從孫也王正雅見二百四十四卷文宗大和五年彥昭之從母母之姊妹謂之從母凝先及第嘗衩衣見彥昭衩差賣翻衩衣便服不具禮也且戲之曰君不若舉明經彥昭怒遂為深仇唐世重進士而輕明經故當時有焚香禮進士設幕試明經之語崔彥昭之仇怒王凝蓋以此也其母謂侍婢曰為我多作襪履為我于偽翻王侍郎母子必將竄逐吾當與妹偕行彥昭拜且泣謝曰必不敢凝由是獲免考異曰此出中朝故事曰彥昭代凝判鹽鐵半載而入相按實錄彥昭不代凝為鹽鐵其餘則取之冬十月以門下侍郎同平章事劉鄴同平章事充淮南節度使以吏部侍郎鄭畋為兵部侍郎翰林學士承旨戶部侍郎盧攜守本官並同平章事考異曰舊畋傳曰乾符四年遷吏部侍郎尋降制可本官同平章事今從實錄此年為相乾符元年十一月庚寅日南至冬至日南至夏至日北至改元改元乾符上時掌翻乾符元年魏博節度使韓允中薨軍中立其子節度副使簡為留後乾符元年南詔寇西川作浮梁濟大渡河防河都知兵馬使黎州刺史黃景復俟其半濟擊之蠻敗走斷其浮梁斷丁管翻蠻以中軍多張旗幟當其前而分兵潛出上下流各二十里夜作浮梁詰朝俱濟詰其吉翻朝陟遙翻旦也襲破諸城柵夾攻景復力戰三日景復陽敗走蠻盡銳追之景復設三伏以待之蠻過三分之二乃發伏擊之蠻兵大敗殺二千餘人追至大渡河南而還還從宣翻又如字復脩完城柵而守之蠻歸至之羅谷遇國中發兵繼至新舊相合新者繼至之兵舊者敗歸之兵聞音問復寇大渡河復扶又翻與唐夾水而軍詐云求和又自上下流潛濟與景復戰連日西川援軍不至而蠻衆日益景復不能支軍遂潰乾符元年十二月党項回鶻寇天德軍乾符元年感化軍奏㣥盜寇掠感化軍治徐州㣥盜龐勛餘黨也敕兗鄆等道出兵討之乾符元年南詔乘勝陷黎州入邛崍關攻雅州大渡河潰兵奔入邛州九域志雅州東北至邛州一百六十里大渡河潰兵黃景復之軍也民爭入城或北奔他州城中大為守備而塹壘比曏時嚴固驃信使其坦綽遺節度使牛叢書云坦綽南詔清平官之首也遺唯季翻非敢為寇也欲入見天子面訴數十年為讒人離間冤抑之事見賢遍翻間古莧翻儻蒙聖恩矜恤當還與尚書永敦鄰好今假道貴府欲借蜀王廳留止數日即東上好呼到翻上時掌翻詐言將自成都而東上長安叢素懦怯欲許之楊慶復以為不可斬其使者留二人授以書遣還書辭極數其罪詈辱之數所具翻蠻兵及新津而還宋白曰新津縣本漢犍為郡武陽縣地李膺益州記云皂里江津之所曰新津市周北圖記云閔帝元年於此立新津縣九域志縣在蜀州東南七十里豫焚城外民居蕩盡考異曰錦里耆舊傳咸通十四年十一月五日雲南蠻寇再犯大渡河黃景復擊敗之十一月二十五日復攻大渡河三十日蠻乘勝進攻黎州十二月二十八日蠻來只到新津前後蜀州界左右便退竟不到城下按咸通十四年南詔寇西川事舊紀南詔傳唐年補錄唐錄備闕續寶運圖皆無之獨耆舊傳載之甚詳新書取之作南詔傳而實錄但云十二月西川奏南蠻入寇黎州刺史黃景復擊退之新紀但云十二月雲南蠻寇黎州蓋亦出於耆舊傳耳舊紀乾符元年冬南詔蠻寇西蜀詔河西河東山南西道東川徵兵赴援實錄乾符元年十月西川奏雲南蠻入寇十二月雲南蠻寇西川坦綽致書於牛叢欲求入覲河東山南西道及東川兵援之月末又云南蠻侵犯黎州而成都守禦無備殊不拒敵踰河越嶺洞無籬障賴積雪丈餘遂阻隔奔衝之勢又邛雅二州刺史望風奔遁蠻燒劫一空牛叢不曉兵失於探候而奏報差戾詔切責之蠻劫略黎雅間破黎州入邛崍關成都閉三日蠻乃去新紀乾符元年十二月雲南蠻寇黎雅二州河西河東山南東道東川兵伐雲南按實錄咸通十四年十一月七日路巖始移荊南八日牛叢始除西川而耆舊傳蠻入寇皆叢任內事恐誤先一年也實錄新紀因此於十四年十二月添雲南寇黎州事實皆在乾符元年冬也詔發河東山南西道東川兵援之仍命天平節度使高駢詣西川制置蠻事乾符元年以韓簡為魏博留後乾符元年商州刺史王樞以軍州空窘減折糴錢窘巨隕翻德宗時度支以稅物頒諸司皆增本價為虛估給之而繆以濫惡督州縣剝價謂之折納其後又以稅物折錢使輸米粟謂之折糴折音之舌翻民相帥以白梃毆之帥讀曰率梃徒鼎翻白棓也毆烏口翻又毆殺官吏二人朝廷更除刺史李誥到官收捕民李叔汶等三十餘人斬之汶音問乾符元年初回鶻屢求冊命詔遣冊立使郗宗莒詣其國會回鶻為吐谷渾嗢末所破嗢末者吐蕃奴部也虜法出師必發豪室皆以奴從平居散處田牧及論恐熱亂無所歸共相嘯合數千人以嗢末自號居甘肅河沙瓜渭岷廓疊宕間其近蕃牙者最勇而馬尤良嗢烏沒翻詔宗莒以玉冊國信授靈鹽節度使唐弘夫掌之還京師乾符元年上年少少詩沼翻政在臣下南牙北司互相矛楯自懿宗以來奢侈日甚用兵不息賦斂愈急斂九贍翻關東連年水旱州縣不以實聞上下相蒙百姓流殍流散也殍餓殍殍音被表翻相聚為盜所在蜂起州縣兵少加以承平日久人不習戰每與盜遇官軍多敗是後王仙芝黃巢遂為大盜史先言唐末所以致盜之由濮州人王仙芝始聚衆數千起於長垣滑州匡城縣本後齊之長垣縣開皇十六年改曰長城是年又分韋城縣置長垣縣新志匡城有長垣縣宋朝以長垣縣屬開封府九域志在府東北一百五里考異曰實錄二年五月仙芝反於長垣按續寶運錄濮州賊王仙芝自稱天補平均大將軍兼海內諸豪都統傳檄諸道檄末稱乾符一年正月三日則仙芝起必在二年前今置於歲末二年乾符二年春正月丙戌以高駢為西川節度使乾符二年辛巳嚴巳改卯上祀圜丘赦天下乾符二年高駢至劍州先遣使走馬開成都門開成都城諸門也考異曰錦里耆舊傳鄆州節度使高相公駢乘急詔除劍南西川節度副大使乾符元年正月二十一日行李到劍州先遣使走馬開城門並令放出百姓二月十六日至府豁開城門並放人出今從實錄置今年又劍州至成都止十二程駢正月二十一日自劍州遣使走馬開城門二月十六日始至府下又云駢三十日到上按長曆二月小無三十日蓋二十六日誤為二月十六日也蠻寇逼近成都相公尚遠萬一豨突柰何近其靳翻豨香衣翻又許豈翻豨豕也豕健於突駢曰吾在交趾破蠻二十萬衆事見二百五十卷懿宗咸通七年逃竄不暇何敢輒犯成都今春氣向暖數十萬人蘊積城中生死共處污穢鬱蒸將成癘疫不可緩也使者至成都開城縱民出各復常業乘城者皆下城解甲民大悅蠻方攻雅州聞之遣使請和引兵去駢又奏南蠻小醜易以枝梧易以豉翻今西川新舊兵已多所發長武鄜坊河東兵徒有勞費並乞勒還敕止河東兵而已考異曰舊紀此奏在元年十二月今因駢開成都門言之乾符二年上之為普王也小馬坊使田令孜有寵小馬坊使亦內諸司使之一後梁改為天驥使後唐復舊長興元年改飛龍院為左飛龍院小馬坊為右飛龍院宋太平興國三年改左右天广既坊至雍熙二年又改左右騏驥院使使知樞密遂擢為中尉考異曰舊本紀此年正月令孜為右軍中尉新傳云帝即位擢為左神策中尉舊傳但云神策中尉今從之專事遊戲考異曰續寶運錄曰上是年十五歲中朝故事曰僖宗皇帝以咸通三年降誕十四年七月十九日即位年十二按舊紀亦云僖宗咸通三年五月八日生於東內即位年十二今從之據考異四當作二呼為阿父阿烏葛翻一讀如字阿保也令孜頗讀書多巧數招權納賄除官及賜緋紫皆不關白於上每見常自備果食兩盤與上相對飲啗從容良久而退見賢遍翻從千容翻上與內園小兒狎昵賞賜樂工伎兒所費動以萬計府藏空竭昵尼質翻伎渠綺翻藏徂浪翻令孜說上籍兩市商旅寶貨悉輸內庫說式芮翻有陳訴者付京兆杖殺之宰相以下鉗口莫敢言鉗其廉翻乾符二年高駢至成都明日發步騎五千追南詔至大渡河殺獲甚衆擒其酋長數十人至成都斬之酋慈由翻長知丈翻脩復邛崍關大渡河諸城柵又築城於戎州馬湖鎮號平夷軍馬湖鎮當馬湖江之要皆蠻入蜀之要路也各置兵數千戍之自是蠻不復入寇復扶又翻駢召黃景復責以大渡河失守腰斬之考異曰耆舊傳曰乾符元年三月十五日處置前黎州刺史充大渡河把截制置土軍都知兵馬使黃景復實錄乾符二年三月駢奏斬景復今事從耆舊傳年從實錄本管謂西川兵詔不許先是南詔督爽屢牒中書南詔清平官坦綽布燮久贊之下有幕爽主兵琮爽主戶籍慈爽主禮罰爽主刑勸爽主官人厥爽主工作萬爽主財用引爽主客禾爽主商賈亦皆清平官爽猶言省也督爽總三省也先悉薦翻中書不答盧攜奏稱如此則蠻益驕謂唐無以答宜數其十代受恩以責之南詔之先曰細奴邏高宗朝遣使入朝生邏盛炎邏盛炎生炎閤炎閤死弟盛邏皮立盛邏皮生皮邏閤玄宗賜名歸義於開元間合六詔為一而國始強歸義子曰閤羅鳳閤羅鳳子曰鳳迦異鳳迦異子曰異牟尋異牟尋子曰尋閤勸尋閤勸子曰勸龍晟勸龍晟弟曰勸利勸利弟曰豐祐豐祐死而酋龍立自細奴邏至酋龍十三代中間鳳迦異未立而死而豐祐酋龍與唐為敵是受恩十代也數所具翻則嫌於體敵請賜高駢及嶺南節度使辛讜詔使錄詔白牒與之錄詔白今謂之錄白是也乾符二年三月以魏博留後韓簡為節度使乾符二年去歲感化軍發兵詣靈武防秋會南詔寇西川敕往救援章十二行本援下有未至成都四字乙十一行本同退齋校同蠻退遣還至鳳翔不肯詣靈武欲亶歸徐州內養王裕本都將劉逢搜擒唱帥者胡雄等八人斬之內養亦宦者也帥讀曰率下同乾符二年初南詔圍成都楊慶復以右職優給募突將以禦之事見上懿宗咸通十一年將即亮翻下同及高駢至悉令納牒牒職牒也人未復業停其稟給既奪其職牒又停其優給駢好妖術每發兵追蠻皆夜張旗立隊對將士焚紙畫人馬好呼到翻妖於遙翻畫讀曰晝散小豆曰蜀兵懦怯今遣玄女神兵前行軍中壯士皆恥之高駢之好妖術終以此敗皆停之索山客翻下索之同令民間皆用足陌錢陌不足者皆執之劾以行賂取與皆死劾舊音戶概翻今紇得翻刑罰嚴酷由是蜀人皆不悅夏四月突將作亂大譟突入府廷駢走匿於廁間廁初利翻圊也溷也突將索之不獲索山客翻天平都將張傑帥所部數百人被甲入府擊突將高駢自天平徙西川張傑蓋元從部曲將被皮義翻節度使牙前列兵仗以壯威容乘怒氣力鬬天平軍不能敵走歸營突將追之營門閉不得入監軍使人招諭許以復職名稟給久之乃肯還營天平軍復開門出為追逐之勢至城北時方脩毬場役者數百人天平軍悉取其首還詣府云已誅亂者駢出見之厚以金帛賞之明日牓謝突將悉還其職名衣糧自是日令諸道將士從己來者更直府中嚴兵自衞備突將復為亂也更工衡翻乾符二年加成德節度使王景崇兼侍中乾符二年浙西狼山鎮遏使王郢等六十九人有戰功今通州靜海縣南有狼山五山相連上接大江下達巨海絕江南渡抵蘇州常熟縣福山鎮順江東至崇明沙揚帆乘順南抵明州定海縣陶隱居所謂狼五山對句章岸者也郢等論訴不獲論盧昆翻遂劫庫兵作亂行收黨衆近萬人攻陷蘇常蘇常二州名相去一百八十里泛江入海轉掠二浙南及福建大為人患考異曰新紀浙西突陳將王郢反五月遣右龍武大將軍宋皓討之按四年二月郢執魯寔始命皓討之置此誤也程匡柔唐補紀曰六月浙西突將王郢反聚黨萬衆燒劫蘇常三年正月貶蘇州刺史李繪以郢亂棄城故也舊紀二年四月海賊王郢攻剽浙西郡邑實錄乾符三年二月浙西奏突陳將王郢等六十九人劫庫兵為亂三月浙西奏王郢聚衆萬人攻陷州縣續寶運錄元年王郢於兩浙叛敕差山北兵士討之不逾月而克寸乃組頸于闕下今從舊紀乾符二年五月以太傅分司令狐綯同平章事充鳳翔節度使乾符二年司空同平章事蕭倣薨考異曰舊傳曰俄而盜起河南內官握兵王室濁亂倣氣勁論直同列忌之罷知政事出為廣州刺史嶺南節度使遇亂不至京師而卒舊紀三年春正月己卯朔倣以病免罷為太子太傅新紀此月蕭倣薨新傳亦云卒于位為嶺南節度在前舊紀傳皆誤今從實錄乾符二年六月以御史大夫李蔚為中書侍郎同平章事蔚紆勿翻乾符二年辛未高駢陰籍突將之名使人夜掩捕之圍其家挑牆壞戶而入挑他凋翻蜀本作排讀如字壞音怪老幼孕病悉驅去殺之嬰兒或撲於階撲弼角翻或擊於柱流血成渠號哭震天號戶高翻死者數千人夜以車載尸投之於江有一婦人臨刑戟手大罵曰高駢汝無故奪有功將士職名衣糧激成衆怒幸而得免不省己自咎省悉景翻乃更以詐殺無辜近萬人近其靳翻天地鬼神豈容汝如此我必訴汝於上帝使汝他日舉家屠滅如我今日冤抑汙辱如我今日驚憂惴恐如我今日言畢拜天怫然就戮惴之睡翻怫扶弗翻觀異日高駢之禍則信如婦人之言矣天地鬼神臨之在上質之在旁豈可多殺無辜以逞私忿久之突將有自戍役歸者駢復欲盡族之復扶又翻下同有元從親吏王殷諫曰相公奉道宜好生惡殺元從言從高駢歲久非隸新也從才用翻好呼到翻惡烏路翻初不同謀若復誅之則自危者多矣駢乃止乾符二年王仙芝及其黨尚君長攻陷濮州曹州濮博木翻衆至數萬天平節度使薛崇出兵擊之為仙芝所敗敗補邁翻冤句人黃巢亦聚衆數千人應仙芝冤句漢縣唐屬曹州九域志在州西四十五里顏師古曰句音胊黃巢始此少詩照翻巢善騎射喜任俠粗涉書傳喜許紀翻粗坐五翻傳柱戀翻屢舉進士不第遂為盜與仙芝攻剽州縣剽匹妙翻橫行山東民之困於重斂者爭歸之斂力贍翻數月之間衆至數萬乾符二年盧龍節度使張公素性暴戾不為軍士所附大將李茂勳本回鶻阿布思之族回鶻敗降於張仲武李茂勳之降蓋在會昌間也屢有功賜姓名納降軍使陳貢言者幽之宿將為軍士所信服納降軍在幽州丁零川聲云貢言舉兵向薊公素出戰而敗奔京師茂勳入城衆乃知非貢言也不得已推而立之朝廷因以章十二行本以下有茂勳二字乙十一行本同為留後乾符二年秋七月蝗自東而西蔽日所過赤地言蝗之多所過食草木葉及五穀皆盡蝗入京畿不食稼皆抱荊棘而死宰相皆賀楊國忠以霖雨不害稼韓晃以霖雨不敗鹽今楊知至以蝗不食稼抱荊棘而死唐之臣以蒙蔽人主而成習其來久矣乾符二年八月李茂勳為盧龍節度使八月之下當有以字乾符二年九月右補闕董禹諫上遊畋乘驢擊毬上賜金帛以褒之邠寧節度使李侃奏為假父華清宮使道雅求贈官李侃為宦者假子為于偽翻語頗侵宦官樞密使楊復恭等列訴於上冬十月禹坐貶郴州司馬谷永專攻上身不失為九卿王章斥言王鳳則死于牢獄嗚呼有以也哉欽義之養孫也楊欽義見二百四十六卷文宗開成五年乾符二年昭義軍亂大將劉廣逐節度使高湜湜承職翻自為留後以左金吾大將軍曹翔為昭義節度使乾符二年回鶻還至羅川唐寧州真寧縣隋羅川縣也其地即漢上郡陽周縣地宣宗大中二年回鶻西奔至是方還遣使者同羅榆祿入貢賜拯接絹萬匹乾符二年㣥盜侵淫侵當作浸至于淮南多者千餘人少者數百人詔淮南忠武宣武義成天平五軍節度使監軍亟加討捕及招懷十二月王仙芝寇沂州平盧節度使宋威表請以步騎五千別為一使兼帥本道兵所在討賊帥讀曰率仍章十二行本仍作乃乙十一行本同張校同云無註本作仍以威為諸道行營招討草賊使仍給禁兵三千甲騎五百騎奇寄翻因詔河南方鎮所遣討賊都頭並取威處分處昌呂翻分扶問翻三年乾符三年春正月天平軍奏遣將士張晏等救沂州還至義橋聞北境復有盜起復扶又翻留使扞禦晏等不從喧譟趣鄆州趣七喻翻都將張思泰李承祐走馬出城裂袖與盟以俸錢備酒殽慰諭然後定詔本軍宣慰一切無得窮詰詰區吉翻唐自中世以來姑息藩鎮至其末也姑息亂軍遂陵夷以至於亡乾符三年敕章十二行本敕上有二月二字乙十一行本同孔本同張校同福建江西湖南諸道觀察刺史皆訓練士卒又令天下鄉村各置弓刀鼓板以備㣥盜乾符三年賜兗海節度號泰寧軍乾符三年三月盧龍節度使李茂勳請以其子幽州左司馬可舉知留後自求致仕詔茂勳以左僕射致仕以可舉為盧龍留後乾符三年門下侍郎同平章事崔彥昭罷為太子太傅以左僕射王鐸兼門下侍郎同平章事乾符三年南詔遣使者詣高駢求和而盜邊不息駢斬其使者蠻之陷交趾也事見二百五十卷懿宗咸通六年瑤宗室之疏屬也蠻遣瑤還遞木夾以遺駢遞牒以木夾之故云木夾范成大桂海虞衡志曰紹興元年安南與廣西帥司及邕通信問用兩漆板夾繫文書刻字其上謂之木夾按宋白續通典諸道州府巡院傳遞敕書皆有木夾是中國亦用木夾也遺唯季翻督爽牒西川節度使辭極驕慢駢送瑤京師甲辰復牒南詔數其負累聖恩德暴犯邊境殘賊欺詐之罪安南大渡覆敗之狀折辱之數所具翻懿宗咸通七年高駢破蠻於安南上乾符二年駢破蠻於大渡河折之舌翻乾符三年原州刺史史懷操貪暴夏四月軍亂逐之乾符三年賜宣武感化節度泗州防禦使密詔選精兵數百人於巡內遊弈防衞綱船五日一具上供錢米平安狀聞奏汴徐泗三鎮汴水所經東南綱運輸上都者皆由此道㣥盜從橫恐為所掠故密詔選兵遊弈防衞乾符三年五月昭王汭薨汭宣宗子乾符三年以盧龍留後李可舉為節度使乾符三年六月撫王紘薨紘順宗子乾符三年雄州地震裂水涌壞州城及公私廬舍俱盡雄州在靈州西南百八十里壞音怪乾符三年秋七月以前巖州刺史高傑為左驍衞將軍充沿海水軍都知兵馬使新志調露二年析橫貴二州置巖州因巖岡之北以為名乾符三年鄂王潤薨潤宣宗子乾符三年加魏博節度使韓簡同平章事乾符三年宋威擊王仙芝於沂州城下大破之考異曰實錄去年十二月宋威自青州與副使曹全晸進軍擊王仙芝仙芝敗走按仙芝若以去年十二月敗走中間半年豈能靜處蓋實因威除招討使連言之其實仙芝敗在此月不在十二月也威奏仙芝已死縱遣諸道兵身還青州百官皆入賀居三日州縣奏仙芝尚在攻剽如故剽匹妙翻時兵始休詔復發之復扶又翻士皆忿怨思亂八月仙芝陷陽翟郟城郟訖洽翻詔忠武節度使崔安潛發兵擊之安潛慎由之弟也崔慎由相宣宗章十二行本昭上有命字乙十一行本同孔本同張校同義節度使曹翔將步騎五千及義成兵衞東都宮以左散騎常侍曾元裕為招討副使守東都又詔山南東道節度使李福選步騎二千守汝鄧要路仙芝進逼汝州詔邠寧節度使李侃鳳翔節度使令狐綯選步兵一千騎兵五百守陝州潼關陝失冉翻乾符三年加成德節度使王景崇兼中書令乾符三年九月乙亥朔日有食之乾符三年丙子王仙芝陷汝州執刺史王鐐鐐鐸之從父兄弟也鐐力彫翻又力弔翻從才用翻東都大震九域志汝州北至東都一百六十里乙酉敕赦王仙芝尚君長罪除官以招諭之仙芝陷陽武攻鄭州昭義監軍判官雷殷符屯中牟中牟漢古縣隋曰郟城大業元年改曰圃田唐武德三年改曰中牟屬鄭州九域志在汴州西七十里破走之冬十月仙芝南攻唐鄧乾符三年西川節度使高駢築成都羅城使僧景仙規度度徒洛翻周二十五里悉召縣令庀徒賦役成都府領成都華陽新都犀浦新繁雙流廣都郫溫江靈池十縣庀匹婢翻具也賦布也分布使之就役也蜀土疏惡以甓甃之環城十里內取土皆剗丘垤平之甓蒲力翻甎也甃則救翻環音宦剗初限翻削也垤徒結翻無得為坎埳以害耕種埳徒感翻坎旁入也役者不過十日而代衆樂其均樂音洛不費扑撻而功辦扑普卜翻自八月癸丑築之至十一月戊子畢功役之始作也駢恐南詔揚聲入寇雖不敢決來役者必驚擾乃奏遣景仙託遊行入南詔說諭驃信使歸附中國仍許妻以公主新書曰浮屠景仙如此則文意明說輸芮翻妻七細翻久之不決駢又聲言欲巡邊朝夕通烽火至大渡河而實不行蠻中惴恐惴之睡翻由是訖於城成邊候無風塵之警先是西川將吏入南詔先悉薦翻將即亮翻驃信皆坐受其拜駢以其俗尚浮屠故遣景仙往驃信果帥其大臣迎拜帥讀曰率信用其言乾符三年王仙芝攻郢復二州陷之乾符三年王郢因溫州刺史魯寔請降寔屢為之論奏為于偽翻敕郢詣闕郢擁兵遷延半年不至固求望海鎮使朝廷不許以郢為右率府率唐有十率府率右率府率其一也其先所掠之財並令給與乾符三年十二月王仙芝攻申光廬壽舒通等州按唐書地理志通州屬山南東道宋之達州是也周世宗以南唐靜海軍置通州今淮東之通州是也其地在唐則為揚州海陵縣之東境唐時淮南道未有通州此必誤參考下文通當作蘄敕感化節度使薛能選精兵數千助之鄭畋以言計不行稱疾遜位不許乃上言自沂州奏捷之後謂宋威奏破王仙芝於沂州城下上時掌翻屠陷五六州瘡痍數千里宋威衰老多病自妄奏以來諸道尤所不服妄奏謂奏仙芝已死殊無進討之意曾元裕擁兵蘄黃專欲望風退縮若使賊陷揚州則江南亦非國有崔安潛威望過人張自勉驍雄良將宮苑使李瑑西平王晟之孫瑑柱兗翻言瑑奕世將家嚴而有勇請以安潛為行營都統瑑為招討使代威自勉為副使代元裕考異曰實錄雖於此月載畋所上書亦不言行與不行新紀遂於此言安潛為諸道行營都統李瑑為招討草賊使張自勉副之按明年威元裕為使副猶如故新紀誤也乾符三年青滄軍士戍安南青州平盧軍滄州義昌軍至桂州逐觀察使李瓚瓚才但翻考異曰新紀在四年十二月今從實錄瓚宗閔之子也李宗閔大和中為相桂管監軍李維周驕橫橫戶孟翻瓚曲奉之浸不能制桂管有兵八百人防禦使纔得百人餘皆屬監軍又預於逐帥之謀強取兩使印兩使印謂觀察使及防禦使印也帥所類翻使疏吏翻下同亶奪昭州送使錢唐制諸州之稅分為三一曰上供以輸京師二曰送使以輸本道三曰留州留充本州經費禹謨徹之子也張徹見二百四十二卷穆宗長慶元年乾符三年招討副使都監楊復光奏尚君長弟讓據查牙山查耡加翻官軍退保鄧州復光玄价之養子也揚玄价見二百五十卷懿宗咸通四年乾符三年王仙芝攻蘄州蘄州刺史裴偓章十二行本偓作渥下同乙十一行本同孔本同王鐸知舉時所擢進士也王鐐在賊中為仙芝以書說偓為于偽翻下同偓與仙芝約斂兵不戰許為之奏官鐐亦說仙芝許以如約偓乃開城延仙芝及黃巢輩三十餘人入城置酒大陳貨賄以贈之表陳其狀諸宰相多言先帝不赦龐勛期年卒誅之事見上卷咸通九年十年卒子恤翻非龐勛之比赦罪除官益長姦宄長知兩翻王鐸固請許之乃以仙芝為左神策軍押牙兼監察御史遣中使以告身即蘄州授之仙芝得之甚喜鐐偓嚴偓改渥皆賀未退黃巢以官不及己大怒曰始者共立大誓橫行天下今獨取官赴左軍使此五千餘衆安所歸乎考異曰仙芝巢初起時云數月間衆至數萬至此纔有五千者蓋烏合之衆聚散無常耳傷其首毆烏口翻其衆諠譟不已仙芝畏衆怒遂不受命大掠蘄州城中之人半驅半殺焚其廬舍偓奔鄂州敕使奔襄州敕使授告身之中使也賊乃分其軍三千餘人從仙芝及尚君長二千餘人從巢各分道而去考異曰王坤驚聽錄曰乾符四年丁酉仲夏天示彗星草寇黃巢尚君長奔突即五年戊戌之歲狂寇王仙芝起自鄆封而侵汝鄭即大寇黃巢尚君長並賊帥之徒黨僅一千餘人攻陷汝州云云又曰黃巢望閩廣而去仙芝指鄆州南行尚君長期陳蔡間取㣥凶之願三千餘寇屬仙芝君長二千餘人屬黃巢所管明年二月仙芝陷鄂州巢陷鄆州則非巢趣閩廣仙芝趣鄆也王坤此書年月事迹差舛尤多但擇其可信者取之容肇祖標點聶崇岐覆校
