body:
  text: 資治通鑑卷第一百八十一端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註隋紀五煬皇帝上之下大業四年大業四年戊辰六八大業四年春正月乙巳詔發河北諸軍百餘萬穿永濟渠引沁水南達于河北通涿郡班志沁水出上黨穀遠縣羊頭山世靡谷師古曰今至懷州武陟縣界入河穀遠隋為沁源縣沁七鴆翻考異曰雜記三年六月敕開永濟渠引汾水入河於汾水東北開渠合渠水至于涿郡二千餘里通龍舟按永濟渠即今御河未嘗通汾水雜記誤也始役婦人大業四年壬申以太府卿元壽為內史令大業四年裴矩聞西突厥處羅可汗思其母請遣使招懷之二月己卯帝遣司朝謁者崔君肅齎詔書慰諭之帝置謁者臺大夫一人置司朝謁者二人以貳之處昌呂翻厥九勿翻可從刊入聲汗音寒使疏吏翻朝直遙翻考異曰隋帝紀作崔毅今從西突厥傳受詔不肯起君肅謂之曰突厥本一國中分為二每歲交兵積數十歲而莫能相滅者明知其勢敵耳然啟民舉其部落百萬之衆卑躬折節入臣天子者其故何也折而列翻正以切恨可汗不能獨制欲借兵於大國共滅可汗耳㣥臣咸欲從啟民之請天子既許之師出有日矣顧可汗母向夫人可從刊入聲汗音寒向式亮翻旦夕守闕哭泣哀祈匍匐謝罪請發使召可汗令入內屬天子憐之故復遣使至此匍音蒲匐蒲北翻使疏吏翻下同令力丁翻復扶又翻今可汗乃倨慢如此則向夫人為誑天子誑居況翻必伏尸都市傳首虜庭虜庭謂啟民庭資東國之衆左提右挈以擊可汗亡無日矣柰何愛兩拜之禮絕慈母之命惜一語稱臣使社稷為墟乎處羅矍然而起處昌呂翻矍居縛翻流涕再拜跪受詔書因遣使者隨君肅貢汗血馬大業四年三月壬戌倭王多利思比孤隋書倭國在百濟新羅東南水陸三千里於大海之中依山島而居都於邪靡堆則魏志所謂邪馬臺者也在會稽之東與儋耳相近杜佑曰倭在帶方東南大海中去遼東萬二千里大較在閩川會稽之東亦與朱崖儋耳相近自謂太伯之後一名日本自云國在日邊因以為稱倭烏禾翻章十二行本入上有遣使二字乙十一行本同孔本同張校同貢遺帝書曰遺于季翻日出處天子致書日沒處天子無恙恙余亮翻帝覽之不悅謂鴻臚卿曰臚凌如翻蠻夷書無禮者勿復以聞復扶又翻大業四年乙丑車駕幸五原帝改豐州為五原郡去年所築者隋志帝北巡出塞行宮設六合城方一百二十步高四丈二尺六合以木為之方一尺外面一方有板離合為之塗以青色壘六板為城高三丈六尺上加女牆板高六尺開南北門又於城四角起樓敵二門觀門樓檻皆丹青綺畫又造六合殿千人帳載以槍車車載六合三板其車軨解合交叉即為馬槍皆車上張幕幕下張平一弩傅矢五人更守兩車之間施車軨馬槍皆外其轅以為外圍次內布鐵菱次內施蟄鞬中施弩牀長六尺闊三尺牀桄陛插鋼錐皆長五寸謂之蝦鬚皆施機關張則錐皆外向其牀上施旋機弩以繩連弩機人從外來觸繩則弩機旋轉向觸所而發其外又以矰周圍行宮二丈一鈴一柱柱舉矰去地二尺五寸當行宮南北門施槌磬連矰以機發之有人觸矰則衆鈴發響槌擊兩磬以知所警名為擊磬考異曰雜記云帝幸啟民帳時造行城周二千步高二十餘丈今從隋禮儀志每頓舍則外其轅以為外圍內布鐵菱爾雅翼曰今軍旅以鐵作茨以布敵路謂之鐵蒺蔾或云鐵蒺蔾菱角起於煬帝征遼為之然六韜中已有此物朝錯傳謂之渠答皆插鋼錐鋼音剛精鐵也外向上施旋機弩以繩連機人來觸繩則弩機旋轉向所觸而發其外又以矰周圍施鈴柱槌磐以知所警矰作滕翻槌直追翻大業四年帝募能通絕域者屯田主事常駿等請使赤土屯田曹屬工部尚書尚書諸曹各有主事流外吏職也隋書赤土國扶南之別種在南海中水行百餘日而達所都土色多赤因以為號杜佑曰崖州直南水行便風十餘日到赤土國其國到五月日亭午物影都在南一日三食飯皆旋炊不然逡巡過時即便臭敗熱氣特甚使疏利翻丙寅命駿齎物五千段以賜其王赤土者南海中遠國也大業四年帝無日不治宮室治直之翻兩京及江都苑囿亭殿雖多久而益厭每遊幸左右顧矚矚之欲翻無可意者不知所適乃備責天下山川之圖躬自歷覽以求勝地可置宮苑者夏四月詔於汾州之北汾水之源營汾陽宮隋志樓煩郡汾源縣舊岢嵐也大業四年改為靜樂有汾陽宮管涔山天池汾水十三州志汾水出武州之燕京山管涔之異名也水經註燕京山上有大池世謂之天池按煬帝起汾陽宮環天池詳見後五臺註大業四年初元德太子薨見上卷二年元德吏兵二萬餘人悉隸於暕暕古限翻帝為之妙選僚屬為于偽翻以光祿少卿柳謇之為齊王長史少始照翻謇九輦翻長知兩翻且戒之曰齊王德業脩備富貴自鍾卿門鍾聚也罪亦相及謇之慶之從子也柳慶事宇文泰從才用翻百官趨謁闐咽道路暕以是驕恣昵近小人闐田年翻昵尼質翻近其靳翻所為多不法遣左右喬令則庫狄仲錡庫狄複姓錡魚豈翻令則等因此放縱訪人家有美女輒矯暕命呼之載入暕第淫而遣之仲錡智偉詣隴西撾炙諸胡責其名馬帝改渭州為隴西郡撾側瓜翻暕令還主仲錡等詐言王賜取歸其家暕不知也樂平公主嘗奏帝言柳氏女美樂平公主周天元后也樂音洛久之主復以柳氏進暕復扶又翻暕納之其後帝問主柳氏女安在主曰在齊王所帝不悅暕從帝幸汾陽宮大獵詔暕以千騎入圍騎奇寄翻暕大獲麋鹿以獻而帝未有得也乃怒從官皆言為暕左右所遏獸不得前從才用翻帝於是發怒求暕罪失時制縣令無故不得出境有伊闕令皇甫詡得幸於暕違禁攜之至汾陽宮御史韋德裕希旨劾奏暕劾戶概翻又戶得翻帝令甲士千餘人大索暕第令力丁翻索山客翻因窮治其事治直之翻暕韋氏早卒卒子恤翻暕與姊元氏婦通產一女暕召相工相息亮翻令徧視後庭相工指姊曰此產子者當為皇后暕以元德太子有三子三子侑倓侗陰挾左道為厭勝厭於葉翻至是皆發帝大怒斬令則等數人賜姊死暕府僚皆斥之邊遠柳謇之坐不能匡正除名謇九輦翻時趙王杲尚幼帝謂侍臣曰朕唯有暕一子不然者當肆諸市朝以明國憲暕自是恩寵日衰雖為京尹不復關預時政帝恆令虎賁郎將一人監其府事帝制十二衞每衞置護軍四人掌副貳將軍無則一人攝尋改護軍為虎賁郎將正四品朝直遙翻復扶又翻恆戶登翻令力丁翻賁音奔將即亮翻監古銜翻虎賁輒奏之帝亦常慮暕生變所給左右皆以老弱備員而已太史令庾質季才之子也其子為齊王屬隋王府有掾有屬汝不能一心事我乃使兒事齊王何向背如此背蒲妹翻對曰臣事陛下子事齊王實是一心不敢有二帝猶怒出為合水令開皇十六年置合水縣為慶州治所帝改慶州為弘化郡唐改合水縣為安化大業四年乙卯詔以突厥啟民可汗厥九勿翻可從刊入聲汗音寒遵奉朝化思改戎俗宜於萬壽戍置城造屋其帷帳牀褥以上務從優厚大業四年秋七月辛巳發丁男二十餘萬築長城自榆谷而東此榆谷當在榆林西大業四年裴矩說鐵勒說式芮翻使擊吐谷渾大破之吐谷渾可汗伏允東走入西平境內帝改鄯州為西平郡吐讀暾入聲谷音浴可從刊入聲汗音寒帝遣安德王雄出澆河前巳書觀王雄此復書安德王雄何也按雄傳雄從帝征吐谷渾還方徙封觀王高熲誅之時雄尚為安德王通鑑因舊史成文而書之耳帝改廓州為澆河郡使疏吏翻降戶江翻澆古堯翻宇文述封許國公漢臨羌縣城也不敢降帥衆西遁帥讀曰率述引兵追之拔曼頭赤水二城隋志帝平吐谷渾置河源郡於古赤水城管下有曼頭城曼音萬獲其王公以下二百人虜男女四千口而還還從宣翻又如字下同伏允南奔雪山此即蜀西山之西雪山也東西四千里南北二千里皆為隋有置州章十二行本州作郡乙十一行本同孔本同縣鎮戍置鄯善且末西海河源四郡顯武濟遠肅寧伏戎宣德威定遠化赤水等縣志云置於五年大業四年八月辛酉上親祠恆岳恆岳北岳恆山恆戶登翻河北道郡守畢集守式又翻裴矩所致西域十餘國皆來助祭考異曰裴矩傳云三年誤也今從帝紀大業四年九月辛未徵天下鷹師悉集東京鷹師善調習鷹隼者也大業四年冬十月乙卯頒新式去年四月壬辰改度量權衡並依古式今頒於天下大業四年常駿等至赤土境赤土王利富多塞遣使以三十舶迎之進金鏁以纜駿船使疏吏翻下同舶莫百翻鏁蘇果翻凡汎海百餘日入境月餘乃至其都赤土所都名僧祗城處昌呂翻器用窮極珍麗待使者禮亦厚遣其子那邪迦隨駿入貢迦音加大業四年帝以右翊衞將軍河東薛世雄為玉門道行軍大將帝改蒲州為河東郡隋志玉門縣屬敦煌郡改行軍總管為行軍大將將即亮翻厥九勿翻可從刊入聲汗音寒考異曰世雄擊伊吾帝紀無之本傳前有從帝征吐谷渾後云歲餘以世雄為玉門大將與突厥啟民可汗擊伊吾然則似在大業六七年也按是時啟民已卒伐吐谷渾之歲伊吾吐屯設獻地數千里恩寵甚厚隋何故伐之今移置獻地之前師出玉門啟民不至世雄孤軍度磧伊吾初謂隋軍不能至皆不設備聞世雄軍已度磧大懼請降流沙亦謂之磧磧七迹翻降戶江翻留銀青光祿大夫王威以甲卒千餘人戍之而還還從宣翻又音如字五年五年春正月丙子改東京為東都五年突厥啟民可汗來朝禮賜益厚厥九勿翻可從刊入聲汗音寒朝直遙翻五年癸未詔天下均田五年戊子上自東都西還五年己丑制民間鐵叉搭鉤䂎刃之類皆禁之搭多臘翻䂎作管翻五年二月戊申車駕至西京五年三月己巳西巡河右乙亥幸扶風舊宅河右河西武威諸郡地帝改岐州為扶風郡四月癸亥出臨津關臨津關當在枹罕界臨河津水經註河水自澆河東流逕邯川城南又東逕臨津城北白土城南為緣河濟渡之地至西平陳兵講武將擊吐谷渾五月乙亥上大獵於拔延山隋志西平郡化隆縣有拔延山杜佑曰拔延山在廓州廣威縣隋煬帝征吐渾經此山吐從暾入聲谷音浴考異曰隋帝紀作二千里疑二十里字誤庚辰入長寧谷長寧谷在古晉昌郡界水經註湟水逕臨羌縣故城南又東長寧川水注之長寧水東南流逕晉昌川又有長寧亭亭北有養女嶺即浩亹西平之北山丙戌至浩亹川水經註浩亹河出塞外逕西平之鮮谷塞又東逕養女北山東南隋志西平郡湟水縣有舊浩亹縣浩亹音告門浩又音閤斬都水使者黃亘及督役者九人帝改都水監為都水使者考異曰隋帝紀云梁浩亹御馬度而橋壞今從略記橋成乃行吐谷渾可汗伏允帥衆保覆袁川可從刊入聲汗音寒帥讀曰率兵部尚書段文振北屯雪山太僕卿楊義臣東屯琵琶峽將軍張壽西屯泥嶺四面圍之伏允以數十騎遁出遣其名王詐稱伏允保車我真山騎奇寄翻車昌遮翻壬辰詔右屯衞大將軍張定和往捕之定和輕其衆少不被甲挺身登山吐谷渾伏兵射殺之少詩沼翻被皮義翻射而亦翻其亞將柳武建擊吐谷渾破之將即亮翻甲午吐谷渾仙頭王窮䠞䠞與蹙同帥讀曰率降戶江翻六月丁酉遣左光祿大夫梁默等追討伏允兵敗為伏允所殺衞尉卿劉章十二行本劉上有彭城二字乙十一行本同孔本同張校同權出伊吾道擊吐谷渾至青海隋志西海郡有青海吐谷渾傳青海在伏俟城東周回千餘里乘勝追奔至伏俟城吐谷渾都伏俟城在青海西十五里辛丑帝謂給事郎蔡徵曰自古天子有巡狩之禮而江東諸帝多傅脂粉坐深宮不與百姓相見此何理也對曰此其所以不能長世丙午至張掖帝改甘州為張掖郡命裴矩說高昌王麴伯雅麴姓也漢末有西平麴演說輸芮翻吐屯設意突厥所置以守伊吾召使入朝壬子帝至燕支山隋志武威郡番禾縣有燕支山啗徒濫翻又徒覽翻朝直遙翻燕因肩翻皆令佩金玉被錦罽令力丁翻被皮義翻罽音計焚香奏樂歌舞諠譟帝復令武威張掖士女盛飾縱觀衣服車馬不鮮者郡縣督課之騎乘嗔咽騎奇寄翻乘繩證翻周亙數十里以示中國之盛吐屯設獻西域數千里之地上大悅癸丑置西海河源鄯善且末等郡西海郡置於伏俟城河源郡置於赤水城鄯善郡置於古樓蘭城且末郡置於古且末城酈道元曰且末城東去鄯善七百二十里鄯時戰翻且子閭翻命劉權鎮河源郡積石鎮志云河源郡有積石山河所出也杜佑曰積石山在西平郡龍支縣南扞禦吐谷渾以通西域之路是時天下凡有郡一百九十縣一千二百五十五戶八百九十萬有奇奇居宜翻東西九千三百里南北萬四千八百一十五里隋氏之盛極於此矣帝謂裴矩有綏懷之略進位銀青光祿大夫自西京諸縣及西北諸郡皆轉輸塞外每歲鉅億萬計經途險遠及遇寇鈔鈔楚交翻人畜死亡不達者郡縣皆徵破其家由是百姓失業西方先困矣初吐谷渾伏允使其子順來朝吐從暾入聲谷音浴朝直遙翻伏允敗走無以自資帥數千騎客於党項隋書党項羌者三苗之後也其種有宕昌白狼皆自稱獼猴種東接臨洮西平西拒葉護南北數千里處山谷間每姓別為部落帥讀曰率党他朗翻可從刊入聲汗音寒令統其餘衆以其大寶王尼洛周為輔統他綜翻尼女夷翻至西平其部下殺洛周順不果入而還還從宣翻又音如字丙辰上御觀風殿即觀風行殿也引高昌王麴伯雅及伊吾吐屯設升殿宴飲考異曰略記在六月壬寅今從隋帝紀奏九部樂杜佑曰煬帝立清樂龜茲西涼天竺康國疏勒安國高麗禮畢為九部使疏吏翻賜賚有差戊午赦天下吐谷渾有青海俗傳置牝馬於其上得龍種吐谷渾傳青海中有小山其俗至冬輒放牝馬於其上言得龍種吐谷渾嘗得波斯草馬放入青海因生驄駒能日行千里時稱青海驄種章勇翻七月章十二行本月下有丁卯二字乙十一行本同孔本同張校同置馬牧於青海縱牝馬二千匹於川谷以求龍種無效而止車駕東還經大斗拔谷還從宣翻又如字新唐志涼州西二百里有大斗軍本赤水守捉開元十六年為軍因大斗拔谷為名山路隘險魚貫而出單行相次若貫魚然文武飢餒沾濕夜久不逮前營逮及也考異曰帝紀在六月癸卯按西邊地雖寒不容六月大雪凍死人畜今從略記略記作達十拔谷今從帝紀後宮主或狼狽相失與軍士雜宿山間九月乙章十二行本乙作癸乙十一行本同孔本同張校同未車駕入西京冬十一月丙子復幸東都復扶又翻五年民部侍郎裴蘊以民間版籍脫漏戶口及詐注老小尚多奏令貌閱令力丁翻閱其貌以驗老小若一人不實則官司解職又許民糾得一丁者令被糾之家代輸賦役被皮義翻是歲諸郡計帳進丁二十章十二行本十下有四字乙十一行本同孔本同張校同萬三千新附口六十四萬一千五百帝臨朝覽狀朝直遙翻謂百官曰前代無賢才致此罔冒今戶口皆實全由裴蘊由是漸見親委未幾擢授御史大夫與裴矩虞世基參掌機密蘊善候伺人主微意幾居豈翻伺相吏翻所欲罪者則曲法鍛成其罪所欲宥者則附從輕典因而釋之是後大小之獄皆以付蘊刑部大理莫敢與爭必稟承進止然後決斷斷丁亂翻蘊有機辯言若懸河或重或輕皆由其口剖析明敏時人不能致詰書曰知人則哲能官人史言知人善任之難五年突厥啟民可汗卒厥九勿翻可從刊入聲汗音寒卒子恤翻上為之廢朝三日為于偽翻朝直遙翻下同立其子咄吉咄當沒翻是為始畢可汗表請尚公主詔從其俗五年初內史侍郎薛道衡以才學有盛名久當樞要高祖末出為襄州總管帝改襄州為襄陽郡自番州刺史召之隋志廣州仁壽元年改番州蓋因番禺以名州帝改為南海郡番依漢書音義音潘道衡既至上高祖文皇帝頌上時掌翻帝覽之不悅顧謂蘇威曰道衡致美先朝致極也詩小序曰魚藻刺幽王也言萬物失其性王居鎬京將不能以自樂故君子思古之武王焉將置之罪司隸刺史房彥謙勸道衡杜絕賓客卑辭下氣帝置司隸大夫一人為司隸臺率又置司隸刺史十四人正六品巡察畿外諸郡會議新令久不決道衡謂朝士曰向使高熲不死令決當久行有人奏之帝怒曰汝憶高熲邪朝直遙翻熲居永翻邪音耶付執法者推之推尋繹也推考而尋繹其事也道衡負才恃舊有無君之心推惡於國推吐雷翻妄造禍端論其罪名似如隱昧原其情意深為悖逆悖蒲內翻又蒲沒翻帝曰然我少時與之行役謂伐陳時少詩照翻稚遲二翻與高熲賀若弼等外亶威權若人者翻及我即位懷不自安賴天下無事未得反耳公論其逆妙體本心道衡自以所坐非大過促憲司早斷斷丁亂翻冀奏日帝必赦之敕家人具饌以備賓客來候者饌雛戀翻又雛皖翻及奏帝令自盡道衡殊不意未能引決憲司重奏縊而殺之妻子徙且末令力丁翻重直龍翻縊於賜翻且子閭翻天下冤之五年帝大閱軍實稱器甲之美宇文述因進言此皆雲定興之功帝即擢定興為太府丞六年六年春正月癸亥朔未明三刻有盜數十人素冠練衣焚香持華自稱彌勒佛入自建國門釋氏之說以為釋迦佛衰謝彌勒佛出世故盜稱之以為姦建國門蓋東都皇城端門也唐六典云武德五年平王世充惡其壯麗焚乾陽殿及建國門華讀曰花考異曰雜記在五年正月又云三百人今從隋書監古銜翻稽音啟既而奪衞士仗將為亂齊王暕遇而斬之於是都下大索暕古限翻索山客翻連坐者千餘家六年帝以諸蕃酋長畢集洛陽酋才由翻長知兩翻丁丑於端門街洛陽皇城端門外之街戲場周圍五千步執絲竹者萬八千人聲聞數十里聞音問自昏至旦燈火光燭天地終月而罷所費巨萬自是歲以為常丁丑正月十五日今人元宵行樂蓋始盛於此諸蕃請入豐都市交易東都東市曰豐都南市曰大同北市曰通遠先命整飾店肆簷宇如一盛設帷帳珍貨充積人物華盛賣菜者亦藉以龍須席龍須席以龍須草織成今淮上安慶府居人多能織龍須席過工禾翻悉令邀延就坐坐徂臥翻醉飽而散不取其直紿之曰中國豐饒酒食例不取直胡客皆驚歎其黠者頗覺之紿徒亥翻黠戶八翻慧也見以繒帛纏樹曰中國亦有貧者衣不蓋形何如以此物與之纏樹何為市人慙不能答帝稱裴矩之能謂㣥臣曰裴矩大識朕意凡所陳奏皆朕之成算未發之頃矩輒以聞自非奉國盡心孰能若是是時矩與右翊衞大將軍宇文述內史侍郎虞世基御史大夫裴蘊光祿大夫郭衍皆以諂諛有寵述善於供奉容止便辟便毗連翻辟讀曰僻侍衞者咸取則焉郭衍嘗勸帝五日一視朝朝直遙翻下同曰無效高祖空自勤苦帝益以為忠曰唯有郭衍心與朕同帝臨朝凝重朝直遙翻發言降詔辭義可觀而內存聲色其在兩都及巡遊常以僧尼道士女官自隨女官即女道士梁公蕭鉅琮之弟子千牛左右宇文皛慶之孫也隋制千牛備身左右十二人掌供御弓箭宇文慶見一百七十三卷陳高宗太建十一年皛戶了翻帝每日於苑中林亭間盛陳酒饌饌雛睆翻又雛戀翻敕燕王倓與鉅皛及高祖嬪御為一席倓徒甘翻嬪毗賓翻僧尼道士女官為一席帝與諸寵姬為一席略相連接罷朝即從之朝直遙翻宴飲更相勸侑更工衡翻酒酣殽亂靡所不至以是為常楊氏婦女之美者往往進御皛出入宮掖不限門禁至於嬪公主皆有醜聲帝亦不之罪也六年帝復遣朱寬招撫流求復扶又翻流求不從帝遣虎賁郎將廬江陳稜朝請大夫同安張鎮周發東陽兵萬餘人自義安汎海擊之賁音奔將即亮翻帝改廬州為廬江郡熙州為同安郡婺州為東陽郡潮州為義安郡行月餘至其國以鎮周為先鋒流求王渴剌兜剌盧達翻遣兵逆戰屢破之遂至其都流求國王所居曰婆羅檀洞塹柵三重環以流水樹棘為藩將即亮翻又敗退入柵稜等乘勝攻拔之斬渴剌兜虜其民萬餘口而還還從宣翻又如字二月乙巳稜等獻流求俘頒賜百官進稜位右光祿大夫鎮周金紫光祿大夫六年乙卯詔以近世茅土妄假名實相乖自今唯有功勳乃得賜封仍令子孫承襲於是舊賜五等爵非有功者皆除之六年庚申以所徵周齊梁陳散樂散悉但翻悉配太常皆置博士弟子以相傳授樂工至三萬餘人六年三月癸亥帝幸江都宮六年初帝欲大營汾陽宮令御史大夫張衡具圖奏之考異曰張衡傳云帝幸衡宅之明年幸汾陽宮又云明年復幸汾陽宮按本紀皆無其事恐傳誤比年勞役繁多間古莧翻比毗至翻百姓疲弊伏願留神稍加抑損帝意甚不平後目衡謂侍臣曰張衡自謂由其計畫令我有天下也令力丁翻乃錄齊王暕攜皇甫詡從駕及前幸涿郡祠恆岳時父老謁見者衣冠多不整暕古限翻從才用翻恆戶登翻見賢遍翻譴衡以憲司不能舉正張衡為御史大夫故譴之以憲司職分久之衡督役築樓煩城大業四年置樓煩郡後魏之嵐州也本漢之汾陽縣地時置汾陽宮故築城守式又翻得謁帝帝惡衡不損瘦惡烏路翻以為不念咎謂衡曰公甚肥澤宜且還郡復遣之榆林還從宣翻又音如字復扶又翻又音如字未幾敕衡督役江都宮禮部尚書楊玄感使至江都幾居豈翻使疏吏翻衡謂玄感曰薛道衡真為枉死玄感奏之江都郡丞王世充又奏衡頻減頓具帝於是發怒鎖詣江都市將斬之久乃得釋除名為民放還田里以王世充領江都宮監世充本西域胡人姓支氏父收幼從其母嫁王氏因冒其姓世充性譎詐有口辯頗涉書傳好兵法習律令譎古穴翻傳直戀翻好呼到翻下同帝數幸江都數所角翻世充能伺候顏色為阿諛雕飾池臺奏獻珍物由是有寵為王世充乘時僭竊張本伺相吏翻六年夏六月甲寅制江都太守秩同京尹隋制京尹正三品六年冬十二月己未文安憲侯牛弘卒按牛弘傳弘爵奇章郡公卒贈文安縣侯諡曰憲此書其贈諡也隋志文安縣屬河間郡卒子恤翻學術精博隋室舊臣始終信任悔吝不及者唯弘一人而已弟弼好酒而䣱䣱香句翻醉怒也嘗因醉射殺弘駕車牛射而亦翻弘來還宅還從宣翻又音如字其妻迎謂之曰叔射殺牛弘無所怪問直答云作脯坐定其妻又曰叔忽射殺牛大是異事弘曰已知之矣顏色自若讀書不輟六年敕穿江南河自京口至餘杭八百餘里今浙西運河自杭州達鎮江府入大江是也鎮江古京口也帝改杭州為餘杭郡廣古曠翻使可通龍舟幷置驛宮草頓欲東巡會稽帝改越州復曰會稽郡會古外翻六年上以百官從駕皆服袴褶從才用翻褶音習於軍旅間不便是歲始詔從駕涉遠者文武官皆戎衣五品以上通著紫袍六品以下兼用緋綠自此文武官常服遂以為品色著則略翻緋音非庶人以白屠商以皁皁才早翻士卒以黃六年帝之幸啟民帳也見上卷三年麗力知翻使疏吏翻啟民不敢隱與之見帝見賢遍翻黃門侍郎裴矩說帝曰高麗本箕子所封之地漢晉皆為郡縣周武王封箕子於朝鮮秦末衞滿據之傳國至孫右渠漢武帝滅之開為四郡漢末公孫度據之傳國至孫淵魏滅之至晉皆為郡縣高麗之先出於夫餘朱蒙建國號高句驪以高為氏魏晉以來中國兵亂高麗內侵併有遼東地說輸芮翻朝漢書音義音潮別為異域先帝欲征之久矣但楊諒不肖師出無功事見一百七十八卷開皇十八年安可不取使冠帶之境遂為蠻貊之鄉乎今其使者親見啟民舉國從化可因其恐懼脅使入朝朝直遙翻下同帝從之敕牛弘宣旨曰朕以啟民誠心奉國故親至其帳明年當往涿郡爾還日語高麗王還從宣翻又音如字語牛倨翻麗力知翻勿章十二行本勿上有宜早來朝四字乙十一行本同孔本同張校同退齋校同自疑懼存育之禮當如啟民苟或不朝將帥啟民往巡彼土帥讀曰率高麗王元懼藩禮頗闕帝將討之課天下富人買武馬匹至十萬錢簡閱器仗務令精新或有濫惡則使者立斬令力丁翻七年七年春正月壬寅真定襄侯郭衍卒真定縣侯也隋志恆山郡治真定縣卒子恤翻七年二月己未上升釣臺臨楊子津大宴百僚乙亥帝自江都行幸涿郡御龍舟渡河入永濟渠仍敕選部門下內史御史四司之官於船前選補選部之選宣戀翻選補之選如字其受選者三千餘人或徒步隨船三千餘里不得處分處昌呂翻分扶問翻凍餒疲頓因而致死者什一二七年壬午下詔討高麗敕幽州總管元弘嗣大業初已廢諸州總管府此書元弘嗣前官帝改萊州為東萊郡艘蘇遭翻官吏督役晝夜立水中略不敢息自腰以下皆生蛆死者什三四蛆子余翻夏四月庚午車駕至涿郡之臨朔宮唐志幽州薊縣有故隋臨朔宮考異曰略記曰丙午幸涿郡之新宮按長曆是月丙辰朔無丙午今從帝紀並令給宅安置從才用翻先是詔總徵天下兵無問遠近俱會於涿涿即涿郡先悉薦翻弩手三萬人嶺南排鑹手三萬人鑹七亂翻小矟也於是四遠奔赴如流五月敕河南淮南江南造戎車五萬乘送高陽隋志高陽縣屬河間郡乘繩證翻幔莫半翻令兵士自挽之發河南北民夫以供軍須秋七月發江淮以南民夫及船運黎陽及洛口諸倉米至涿郡令力丁翻黎陽縣屬汲郡有黎陽倉洛口倉初置見上卷二年舳艫相次千餘里舳艫音逐盧載兵甲及攻取之具往還在道常數十萬人填咽於道晝夜不絕死者相枕枕職任翻臭穢盈路天下騷動七年山東河南大水漂沒三十餘郡冬十月乙卯底柱崩偃河逆流數十里砥柱在河南郡陝縣北河中底與砥同七年初帝西巡見五年隋制御史臺侍御史八人厥九勿翻處昌呂翻可從刊入聲汗音寒令與車駕會大斗拔谷國人不從處羅謝使者辭以他故帝大怒無如之何會其酋長射匱遣使來求婚令力丁翻使疏吏翻酋才由翻長知兩翻裴矩因奏曰處羅不朝恃強大耳臣請以計弱之分裂其國即易制也朝直遙翻下同易以豉翻射匱者都六之子達頭之孫杜佑曰都六者突厥始建號者也今矩言都六為達頭之子則非始建號者也君臨西面今聞其失職附屬處羅故遣使來以結援耳願厚禮其使拜為大可汗則突厥勢分兩從我矣言射匱處羅將兩皆從隋也公言是也因遣矩朝夕至館微諷諭之帝於仁風殿召其使者言處羅不順之狀稱射匱向善吾將立為大可汗令發兵誅處羅然後為婚帝取桃竹白羽箭一枚桃竹桃枝竹也今江南有之因謂之曰此事宜速使疾如箭也使者返路徑處羅處羅愛箭將留之使者譎而得免譎古穴翻射匱聞而大喜興兵襲處羅處羅大敗棄妻子將數千騎東走緣道被劫寓於高昌東保時羅漫山新唐志伊州伊吾縣有折羅漫山亦曰天山將即亮翻又音如字領也騎奇寄翻被皮義翻上言其狀新唐志玉門關在沙州壽昌縣西北十二月己未處羅來朝於臨朔宮朝直遙翻帝大悅接以殊禮帝與處羅宴處羅稽首謝入見之晚帝以溫言慰勞之稽音啟見賢遍翻勞力到翻備設天下珍膳盛陳女樂羅綺絲竹眩曜耳目然處羅終有怏怏之色怏於兩翻七年帝自去歲謀討高麗詔山東置府令養馬以供軍役又發民夫運米積於瀘河懷遠二鎮新唐志曰隋於營州之境汝羅故城置遼西郡領遼西瀘河懷遠三縣瀘音盧士卒死亡過半耕稼失時田疇多荒加之饑饉穀價踊貴東北邊尤甚斗米直數百錢所運米或粗惡粗倉乎翻令民糴而償之又發鹿車夫六十餘萬鹿車小車也言其小止容一鹿推吐雷翻道途險遠不足充餱糧餱戶鉤翻乾食也至鎮無可輸皆懼罪亡命重以官吏貪殘重直用翻因緣侵漁百姓困窮財力俱竭安居則不勝凍餒勝音升死期交急剽掠則猶得延生剽匹妙翻於是始相聚為㣥盜鄒平民王薄擁衆據長白山鄒平縣宋所僑置平原郡縣之地隋開皇十八年改名鄒平時屬齊郡唐併入齊州臨濟縣長白山在章丘縣界亦屬齊郡宋白曰淄州長山縣宋於此僑立廣川郡及武彊縣隋改武彊為長山以縣西南三十五里長白山為名帝改齊州為齊郡濟州為濟北郡剽匹妙翻濟子禮翻言事可知矣又作無向遼東浪死歌以相感勸浪死猶言徒死也平原東有豆子鹵亢帝改德州為平原郡鹵亢舉朗翻鹽澤也地形深阻自高齊以來㣥盜多匿其中有劉霸道者家於其旁累世仕宦貲產富厚霸道喜遊俠喜許記翻食客常數百人及㣥盜起遠近多往依之有衆十餘萬號阿舅賊阿烏葛翻漳南人竇建德漳南本漢東陽縣地久廢開皇六年復置十八年改為漳南屬清河郡宋白曰取地居漳水之南為名膽力過人為鄉黨所歸附會募人征高麗建德以勇敢選為二百人長少詩照翻長知兩翻同縣孫安祖亦以驍勇選為征士驍堅堯翻安祖辭以家為水所漂妻子餒死縣令怒笞之安祖刺殺令刺七亦翻亡抵建德考異曰杜儒童隋季革命記云安祖以盜羊為縣令所考今從舊唐書建德傳官司逐捕蹤跡至建德家建德謂安祖曰文皇帝時天下殷盛發百萬之衆以伐高麗尚為所敗即謂開皇十八年事敗補邁翻百姓困窮加之往歲西征謂西征吐谷渾瘡痍未復主上不恤乃更發兵親擊高麗天下必大亂丈夫不死當立大功豈可但為亡虜邪邪音耶乃集無賴少年得數百人使安祖將之少詩照翻將即亮翻入高雞泊中為㣥盜新唐書曰高雞泊廣袤數百里葭薍阻奧可以違難時鄃人張金稱聚衆河曲鄃漢縣舊廢開皇十六年復置屬清河郡河曲清河之曲新唐書作河渚鄃音輸蓨舊曰脩開皇五年改屬信都郡蓨音條悉收其家屬殺之新書曰時㣥盜往來漳南剽殺人焚鄉聚獨不入建德閭由是郡縣疑其與賊通帥讀曰率士達自稱東海公以建德為司兵頃之孫安祖為張金稱所殺其衆盡歸建德兵至萬餘人建德能傾身接物與士卒均勞逸由是人爭附之為之致死為于偽翻竇建德始此自是所在㣥盜蜂起不可勝數勝音升數所具翻徒衆多者至萬餘人攻陷城邑甲子敕都尉鷹揚與郡縣相知追捕隋置奉車駙馬都尉屬三衞帝並廢之此蓋置都尉以討㣥盜帝又改驃騎為鷹揚郎將隨所獲而斬決之八年八年春正月考異曰略記云癸丑帝御前殿按長曆是月辛巳朔無癸丑略記甲子多差誤今不取皆從隋書厥九勿翻處昌呂翻可從刊入聲汗音寒使其弟闕度設將羸弱萬餘口居于會寧突厥之官典兵者謂之設靈州鳴沙縣後周置會州會寧郡尋廢唐復置將即亮翻下同羸倫為翻考異曰隋西突厥傳作達度闕設今從裴矩傳突厥之官子弟為特勒賜號曷婆章十二行本婆作娑孔本同張校同那可汗騎奇寄翻考異曰唐李軌傳作曷娑那可汗今從隋書按今隋書作曷薩那賞賜甚厚八年初嵩高道士潘誕隋志河南郡嵩陽縣有嵩高山為帝合煉金丹帝為之作嵩陽觀為于偽翻合音閤觀古玩翻華屋數百間以童男童女各一百二十人充給使位視三品常役數千人所費巨萬云金丹應用石膽石髓髓息委翻發石工鑿嵩高大石深百尺者數十處深式浸翻凡六年丹不成帝詰之詰去吉翻誕對以無石膽石髓若得童男女膽髓各三斛六斗可以代之帝怒鎖詣涿郡斬之且死語人曰語牛倨翻此乃天子無福值我兵解時至解佳買翻一作假音學仙者謂蛻骨登仙為尸解故其徒謂死為解化今誕謂兵死為兵解我應生梵摩天云梵扶泛翻八年四方兵皆集涿郡帝徵合水令庾質質出合水見上四年高麗之衆不能當我一郡今朕以此衆伐之卿以為克不麗力知翻不讀日否對曰伐之可克然臣竊有愚見不願陛下親行帝作色曰朕今總兵至此豈可未見賊而先自退邪邪音耶對曰戰而未克懼損威靈若車駕留此命猛將勁卒將即亮翻指授方略倍道兼行出其不意克之必矣事機在速緩則無功帝不悅曰汝既憚行自可留此右尚方署監事耿詢上書切諫監事監作者也秩九品監古銜翻上時掌翻命左右斬之何稠苦救得免壬午詔左十二軍出鏤方長岑溟海蓋馬建安南蘇遼東玄菟扶餘朝鮮沃沮樂浪等道帝指授諸軍所出之道多用漢縣舊名漢志鏤方長岑朝鮮屬樂浪郡蓋馬屬玄菟郡有蓋馬大山遼東漢郡名溟海蓋即漢樂浪郡之海冥縣建安南蘇扶餘皆高麗國城守之處沃沮亦古地名是時其地已入新羅界鏤郎豆翻菟音塗朝音潮鮮音仙沮子餘翻樂音洛浪音郎目施漢志黏蟬含資渾彌提奚東目施帶方等縣屬樂浪郡候城襄平屬遼東郡臨屯亦漢武帝所置郡名蹋頓即漢末遼西烏丸蹋頓所居肅慎古肅慎氏之國其地時為靺鞨所居碣石禹貢之碣石也杜佑以為此碣石在高麗中佑曰碣石山在漢樂浪郡遂城縣秦長城起於此山今驗長城東截遼水而入高麗遺址猶存黏女廉翻蟬服虔音提蹋徒盍翻碣其列翻目施應劭曰音移駱驛相繼不絕也平壤城高麗國都也亦曰長安城東西六里隨山屈曲南臨浿水杜佑曰高麗王自東晉以後居平壤城即漢樂浪郡王險城號二百萬其餽運者倍之宜社於南桑乾水上類上帝於臨朔宮南記王制天子將出類乎上帝宜乎社鄭氏註類宜皆祭名孔穎達曰天道遠以事類而祭告之也社主殺戮故求便宜社主陰萬物於此斷殺故曰宜桑乾河逕薊城南水經濕水出鴈門陰館縣東北過代郡桑乾縣謂之桑乾水東過廣陽薊縣北今在薊城南城邑有變遷也乾音干周禮祭馬祖鄭氏註曰馬祖天駟也騎兵四十隊隊百人十隊為團步卒八十隊分為四團團各有偏將一人其鎧冑纓拂旗旛每團異色將即亮翻騎奇寄翻鎧可亥翻受降使者一人承詔慰撫不受大將節制其輜重散兵等亦為四團降戶江翻使疏吏翻重直用翻散悉但翻使步卒挾之而行進止立營皆有次敍儀法癸未第一軍發日遣一軍相去四十里連營漸進終四十日發乃盡首尾相繼鼓角相聞旌旗亙九百六十里御營內合十二衞三臺五省九寺分隸內外前後左右六軍次後發又亙八十里近古出師之盛未之有也八年甲辰內史令元壽薨八年二月壬戌觀德王雄薨觀王雄諡曰德觀古玩翻八年北平襄侯段文振為兵部尚書上表以為帝寵待突厥太厚處之塞內上時掌翻處昌呂翻資以兵食戎狄之性無親而貪異日必為國患宜以時諭遣令出塞外令力丁翻下同然後明設烽候緣邊鎮防務令嚴重此萬歲之長策也兵曹郎斛斯政椿之孫也帝改尚書諸曹侍郎為郎兵曹郎開皇之兵部侍郎也斛斯椿構間後魏孝武高歡者也為帝所寵任使專掌兵事文振知政險薄不可委以機要屢言於帝帝不從及征高麗以文振為左候衞大將軍出南蘇道文振於道中疾篤上表曰竊見遼東小醜未服嚴刑遠降六師親勞萬乘但夷狄多詐深須防擬口陳降款毋宜遽受乘繩證翻降戶江翻水潦方降不可淹遲唯願嚴勒諸軍星馳速發水陸俱前出其不意則平壤孤城勢可拔也若傾其本根餘城自克如不時定脫遇秋霖深為艱阻兵糧既竭強敵在前靺鞨出後靺音末鞨音曷遲疑不決非上策也三月辛卯文振卒卒子恤翻帝甚惜之八年癸巳上始御師進至遼水衆軍總會臨水為大陳陳讀曰陣高麗兵阻水拒守隋兵不得濟左屯衞大將軍麥鐵杖謂人曰丈夫性命自有所在豈能然艾灸頞瓜蔕歕鼻治黃不差而臥死兒女手中乎黃熱病也熱則頭痛故燃艾以灸頞熱則上壅瓜蔕味苦寒故噴鼻以通關鬲差愈也然與燃同灸居又翻頞烏葛翻鼻頞說文曰頞鼻莖蔕音帝歕蒲悶翻差楚懈翻治直之翻謂其三子曰吾荷國恩荷下可翻今為死日我得良殺汝當富貴帝命工部尚書宇文愷造浮橋三道於遼水西岸既成引橋趣東岸趣七喻翻橋短不及岸丈餘高麗兵大至隋兵驍勇者爭赴水接戰驍堅堯翻高麗兵乘高擊之隋兵不得登岸死者甚衆麥鐵杖躍登岸與虎賁郎將錢士雄孟叉等皆戰死考異曰雜記作錢英孟金釵今從隋帝紀引橋復就西岸詔贈鐵杖宿公宿古國名次子仲才季才並拜正議大夫更命少府監何稠接橋更工衡翻少始照翻二日而成諸軍相次繼進大戰于東岸高麗兵大敗死者萬計諸軍乘勝進圍遼東城即漢之襄平城也車駕渡遼考異曰隋帝紀癸巳上御師甲子臨遼水橋戊戌麥鐵杖死甲午車駕渡遼乙未大頓丙申大赦按長曆是月庚辰朔不容有甲子又戊戌之下不容有甲午乙未丙申此必誤也今並除之懾之涉翻因下詔赦天下命刑部尚書衞文昇尚書右丞劉士龍撫遼左之民給復十年復方目翻建置郡縣以相統攝八年夏五月壬午納言楊達薨八年諸將之東下也帝親戒之曰今者弔民伐罪非為功名諸將或不識朕意欲輕兵掩襲孤軍獨鬬立一身之名以邀勳賞非大軍行法言非大軍征行之法將即亮翻當分為三道有所攻擊必三道相知毋得輕軍獨進以致失亡又凡軍事進止皆須奏聞待報毋得專亶遼東數出戰不利數所角翻乃嬰城固守帝命諸軍攻之又敕諸將高麗若降即宜撫納不得縱兵遼東城將陷城中人輒言請降降戶江翻諸將奉旨不敢赴機先令馳奏比報至比必寐翻城中守禦亦備隨出拒戰如此再三帝終不寤既而城久不下六月己未帝幸遼東城南觀其城池形勢因召諸將詰責之曰公等自以官高又恃家世欲以暗懦待我邪詰去吉翻懦乃臥翻又乃亂翻邪音耶下同在都之日公等皆不願我來恐見病敗耳我今來此正欲觀公等所為斬公輩耳公今畏死莫肯盡力謂我不能殺公邪諸將咸戰懼失色帝因留城西數里御六合城此六合城略如三年行城之制周回八里城及女垣高十仞右翊衞大將軍來護兒帥江淮水軍舳艫數百里浮海先進入自浿水班志浿水西至增地縣入海皆在樂浪界帥讀曰率舳艫音逐盧浿普大翻與高麗相遇進擊大破之護兒欲乘勝趣其城趣七喻翻副總管周法尚止之請俟諸軍至俱進護兒不聽簡精甲四萬直造城下造七到翻高麗伏兵於羅郭內空寺中出兵與護兒戰而偽敗護兒逐之入城縱兵俘掠無復部伍伏兵發護兒大敗僅而獲免士卒還者不過數千人高麗追至船所周法尚整陳待之高麗乃退護兒引兵還屯海浦不敢復留應接諸軍陳讀曰陣復扶又翻考異曰北史云護破高麗斬高元弟建武因破其郛營於城外以待諸軍今從隋書及革命記左翊衞大將軍宇文述出扶餘道右翊衞大將軍于仲文出樂浪道隋制十二衞各置大將軍一人來護兒于仲文並書右翊衞大將軍何也考二人本傳于仲文帝即位之初為右翊衞大將軍征吐渾時來護兒已為右翊衞大將軍通鑑蓋追書仲文官也驍堅堯翻恆戶登翻右翊衞將軍薛世雄出沃沮道左屯衞將軍辛世雄出玄菟道沮子余翻菟音塗右禦衞將軍張瑾出襄平道右武候將軍趙孝才出碣石道涿郡太守檢校左武衞將軍崔弘昇出遂城道檢校右禦衞虎賁郎將衞文昇出增地道守式又翻將即亮翻皆會於鴨綠水西班志玄菟郡西蓋馬縣有馬訾水新唐書馬訾水出靺鞨之白山色若鴨頭號鴨綠水平壤城在鴨綠東南金人謂鴨綠水為混同江杜佑曰鴨淥水闊三百步在平壤西北四百五十里遼水東南四百八十里人馬皆給百日糧又給排甲槍矟矟色角翻幷衣資戎具火幕人別三石已上重莫能勝致勝音升下令軍中士卒有章十二行本無上三字乙十一行本同孔本同張校同遺棄米粟者斬軍士皆於幕下掘坑埋之纔行及中路糧已將盡高麗遣大臣乙支文德詣其營詐降乙支東夷複姓支力知翻降戶江翻下同考異曰革命記作尉支文德今從隋書及北史于仲文先奉密旨若遇高元及文德來者必擒之仲文將執之尚書右丞劉士龍為慰撫使使疏吏翻下同固止之仲文遂聽文德還還從宣翻既而悔之遣人紿文德曰更欲有言可復來紿待亥翻復扶又翻文德不顧濟鴨綠水而去仲文與述等既失文德內不自安述以糧盡欲還仲文議以精銳追文德可以有功述固止仲文怒曰將軍仗十萬之衆不能破小賊何顏以見帝且仲文此行固知無功何則古之良將能成功者軍中之事決在一人將即亮翻下同今人各有心何以勝敵時帝以仲文有計畫令諸軍諮稟節度故有此言由是述等不得已而從之與諸將渡水追文德文德見述軍士有飢色故欲疲之每戰輒走述一日之中七戰皆捷既恃驟勝又逼㣥議於是遂進東濟薩水薩桑葛翻去平壤城三十里因山為營文德復遣使詐降復扶又翻請於述曰若旋師者當奉高元朝行在所朝直遙翻述見士卒疲弊不可復戰復扶又翻又平壤城險固度難猝拔度徒洛翻遂因其詐而還使來護兒之師不敗而先退則營於平壤城外與宇文述諸軍猶聲援相接不致有薩水之狼狽也還從宣翻又如字下同考異曰革命記云許公即至平壤城頭即樹降幡約至五日檢錄簿籍圖書開門待命期過五日無一言許公頻催竟無報答又十數日乃云船糧敗卻迴公今更欲何待然始抗旌拒守分兵以捉險要許公知被欺即卷甲歸每日常設方陳而行四面俱時受敵傷殺既衆糧食又盡過遼水者什無二三按煬帝驕暴高麗若明言不降述等必不敢還今從隋書高麗四面鈔擊陳讀曰陣鈔楚交翻麗力知翻述等且戰且行秋七月壬寅至薩水軍半濟高麗自後擊其後軍右屯衞將軍辛世雄戰死於是諸軍俱潰不可禁止將士奔還一日一夜至鴨綠水行四百五十里將軍天水王仁恭為殿殿丁練翻擊高麗卻之來護兒聞述等敗亦引還唯衞文昇一軍獨全還從宣翻又如字初九軍度遼凡三十萬五千及還至遼東城唯二千七百人資儲器械巨萬計巨萬萬萬也帝大怒鎖繫述等癸卯引還考異曰雜記七月帝自涿郡還東都十一月宇文述等糧盡遁歸高麗出兵邀截亡失蕩盡帝怒敕所司鎖將隨行無幾斬劉士龍等於軍市特赦述今從隋書初百濟王璋遣使請討高麗帝使之覘高麗動靜麗力知翻使疏吏翻覘丑廉翻又丑豔翻璋內與高麗潛通隋軍將出璋使其臣國智牟來請師期帝大悅厚加賞賜遣尚書起部郎席律詣百濟隋志起部郎屬工部尚書姓苑席姓其先姓籍避項羽諱改姓席氏告以起師之期及會師之日也百濟亦嚴兵境上聲言助隋實持兩端是行也唯於遼水西拔高麗武厲邏高麗置邏於遼水之西以警察度遼者邏郎佐翻八月敕運黎陽洛陽洛口太原等倉穀開皇三年於衞州置黎陽倉其汾晉之粟漕運以給京師汾晉以北諸州輸之太原倉望海頓當在遼西界章十二行本書下有廬江二字乙十一行本同孔本同張校同退齋校同樊子蓋留守涿郡九月庚寅車駕至東都考異曰雜記十月車駕幸涿郡徵召兵馬將遂度遼之功蓋誤今不取八年冬十月甲寅工部尚書宇文愷卒卒子恤翻八年十一月己卯以宗女為華容公主嫁高昌八年宇文述素有寵於帝且其子士及尚帝女南陽公主故帝不忍誅甲申與于仲文等皆除名為民斬劉士龍以謝天下以士龍縱乙支文德也高麗追圍薛世雄於白石山世雄奮擊破之由是獨得免官以衞文昇為金紫光祿大夫諸將皆委罪於于仲文帝既釋諸將獨擊仲文仲文憂恚發病困篤乃出之卒于家恚於避翻卒子恤翻考異曰略記于仲文以下斬於市今從隋書八年是歲大旱疫山東尤甚八年張衡既放廢衡放還田里見上六年覘丑廉翻又丑豔翻帝還自遼東衡妾告衡怨望謗訕朝政朝直遙翻詔賜盡于家衡臨死大言我為人作何等事謂仁壽四年事也為于偽翻監刑者塞耳監古銜翻塞悉則翻促令殺之令力丁翻王崇武標點容肇祖聶崇岐覆校
