body:
  text: 資治通鑑卷第二百三十端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註唐紀四十六德宗神武聖文皇帝五興元元年興元元年甲子七八四興元元年二月戊申詔贈段秀實太尉諡曰忠烈厚恤其家段秀實死節事見二百二十八卷建中四年諡神至翻贈左僕射賞其能直言也卒子恤翻射寅謝翻直言事見上卷上年興元元年李希烈將兵五萬圍寧陵引水灌之濮州刺史劉昌以三千人守之將即亮翻又音如字濮博木翻李希烈自建中四年攻寧陵滑州刺史李澄密遣使請降李澄降賊見上卷上年使疏吏翻降戶江翻澄猶外事希烈希烈疑之遣養子六百人戍白馬汴皮變翻白馬滑州治所召澄共攻寧陵澄至石柱使其衆陽驚燒營而遁又諷養子令剽掠令力丁翻剽匹妙翻下同澄悉收斬之以白希烈希烈無以罪也劉昌守寧陵凡四十五日不釋甲韓滉遣其將王栖曜將兵助劉洽拒希烈栖曜以強弩數千游汴水夜入寧陵城滉呼廣翻將即亮翻將兵之將音同上考異曰新書柏良器傳曰良器為武衞中郎將以兵隸浙西希烈圍寧陵遏水灌之親令軍中明日拔城良器以救兵至擇弩手善游者沿河渠夜入及旦伏弩發乘城者皆死疑韓滉遣栖曜及良器同救寧陵舊栖曜傳曰將強弩數千夜入寧陵與此共是一事今參取之明日從城上射希烈射而亦翻及其坐幄坐才臥翻希烈驚曰宣潤弩手至矣遂解圍去興元元年朱泚章十二行本泚下有既字乙十一行本同自奉天敗歸事見上卷建中四年泚且禮翻又音此劉德信與晟俱屯東渭橋劉德信屯東渭橋事始見二百二十八卷建中四年晟成正翻晟因德信至營中數以滬澗之敗及所過剽掠之罪斬之數所具翻又所主翻滬侯古翻剽匹妙翻滬澗之敗見二百二十八卷建中四年是年十一月既加李晟神策行營節度劉德信可得而不受節制乎況又有敗軍及剽掠之罪斬之宜矣因以數騎馳入德信軍勞其衆勞力到翻騎奇寄翻無敢動者遂幷將之軍勢益振將即亮翻又音如字李懷光既脅朝廷逐盧等事見上卷上年朝直遙翻遂有異志又惡李晟獨當一面惡烏路翻下同恐其成功奏請與晟合軍詔許之晟與懷光會于咸陽西陳濤斜築壘未畢壘魯水翻泚衆大至晟謂懷光曰賊若固守宮苑宮苑謂宮城及苑城也未易攻取易以豉翻今去其巢穴敢出求戰此天以賊賜明公不可失也懷光曰軍適至馬未秣士未飯飯扶晚翻豈可遽戰邪邪音耶晟不得已乃就壁晟每與懷光同出軍懷光軍士多掠人牛馬晟軍秋豪不犯懷光軍士惡其異己分所獲與之晟軍終不敢受懷光屯咸陽累月逗留不進逗音豆考異曰實錄云懷光堅壁自守凡八十餘日按懷光以十一月癸巳解奉天圍李晟以二月戊申徙東渭橋其間纔七十六日實錄所言謂懷光奔河中以前耳今但云累月上屢遣中使趣之使疏吏翻趣讀曰促辭以士卒疲弊且當休息觀釁諸將數勸之攻長安將即亮翻數所角翻下同懷光不從密與朱泚通謀章十二行本謀下有事跡頗露四字乙十一行本同孔本同張校同退齋校同泚且禮翻又音此李晟屢奏恐其有變為所併請移軍東渭橋晟成正翻李懷光既有異謀李晟與之連營於咸陽有不能一息安者其奏請移軍當也然必歸東渭橋者晟之本規也蓋朱泚擁涇卒而據長安其敗也必當西奔晟以師自東逼之所以開其走路耳兵法圍城為之闕此其近之上猶冀懷光革心收其力用寢晟奏不下下戶嫁翻懷光欲緩戰期且激怒諸軍奏言諸軍糧賜薄神策獨厚厚薄不均難以進戰上以財用方窘窘巨隕翻若糧賜皆比神策則無以給之不然又逆懷光意恐諸軍觖望觖古穴翻怨望也乃遣陸贄詣懷光營宣慰因召李晟參議其事懷光意欲晟自乞減損使失士心沮敗其功沮在呂翻敗補邁翻乃曰將士戰鬬同而糧賜異何以使之協力將即亮翻數顧晟晟曰公為元帥得專號令晟將一軍受指蹤而已數所角翻帥所類翻將即亮翻又音如字至於增減衣食公當裁之懷光默然又不欲自減之遂止李晟之答懷光氣和而辭正故能伐其謀時上遣崔漢衡詣吐蕃發兵見上卷本年正月吐從暾入聲相息亮翻言蕃法發兵以主兵大臣為信今制書無懷光署名故不敢進上命陸贄諭懷光懷光固執以為不可曰若克京城吐蕃必縱兵焚掠誰能遏之此一害也前有敕旨募士卒克城者人賞百緡彼發兵五萬若援敕求賞五百萬緡何從可得此二害也虜騎雖來必不先進勒兵自固觀我兵勢勝則從而分功敗則從而圖變譎詐多端不可親信此三害也李懷光雖欲養寇以自資然其陳用吐蕃三害其言亦各有理緡眉巾翻騎奇寄翻譎古穴翻尚結贊亦不進軍陸贄自咸陽還上言賊泚稽誅保聚宮苑上時掌翻還從宣翻又音如字泚且禮翻又音此朱泚自據長安居白華殿重兵多在苑中故言保聚宮苑勢窮援絕引日偷生懷光總仗順之師乘制勝之氣謂醴泉之勝也易若摧枯芟所銜翻易以豉翻而乃寇奔不追師老不用諸帥每欲進取懷光輒沮其謀諸帥謂李晟楊惠元等帥所類翻沮在呂翻殊不可解解戶買翻曉也陛下意在全護委曲聽從觀其所為亦未知感若不別務規略漸思制持惟以姑息求安終恐變故難測此誠事機危迫之秋也固不可以尋常容易處之易弋豉翻處昌呂翻今李晟奏請移軍適遇臣銜命宣慰晟成正翻銜戶緘翻懷光偶論此事臣遂汎問所宜懷光乃云李晟既欲別行某亦都不要藉要者須其用藉者借其力當時諸鎮有要藉官所以名官之意亦如此因美其軍盛強懷光大自矜誇轉有輕晟之意臣又從容問云從千容翻回日或聖旨顧問事之可否決定何如懷光已肆輕言不可中變遂云恩命許去事亦無妨言上已許李晟去咸陽則其移軍於事體無妨也要一遙翻非不詳審雖欲追悔固難為辭伏望即以李晟表出付中書敕下依奏敕下李晟依其所奏也下戶嫁翻示以移軍事由事由猶言事因也請移軍城東以分賊勢東渭橋在京城東故云然晟成正翻適會陸贄回奏云見卿語及於此仍言許去事亦無妨遂敕本軍允其所請如此則詞婉而直理順而明雖蓄異端何由起怨上從之晟自咸陽結陳而行結陳而行以防李懷光追掩陳讀曰陣時鄜坊節度使李建徽神策行營節度使楊惠元猶與懷光聯營陸贄復上奏曰懷光當管師徒鄜音膚使疏吏翻復扶又翻上時掌翻當管猶言見管也足以獨制兇寇逗留未進抑有他由所患太強不資傍助比者又遣李晟李建徽楊惠元三節度之衆附麗其營比毗至翻近也無益成功祗足生事何則四軍接壘㣥帥異心李晟李建徽楊惠元之軍及李懷光之軍為四軍帥所類翻言懷光之軍最強懷光之官最高相去懸絕言懷光晟建徽惠元四人並為節度使各總一軍不相統屬晟等疑懷光養寇蓄姦而怨其事多陵己端居則互防飛謗欲戰則遞恐分功齟齬不和齟壯所翻齬偶許翻嫌釁遂構俾之同處必不兩全處昌呂翻強者惡積而後亡弱者勢危而先覆陸贄言李懷光李建徽楊惠元之禍敗如燭照龜卜翹足可期人立而翹一足則不能久翹足可期者言禍來之速也新患方起憂歎所切實堪疚心疚病也太上猶言極上也慝惡也況乎事情已露禍難垂成難乃旦翻委而不謀何以寧亂李晟見機慮變先請移軍章十二行本軍下有就東二字乙十一行本同張校同云無註本亦無建徽惠元勢轉孤弱為其吞噬理在必然晟成正翻噬時制翻啗也他日雖有良圖亦恐不能自拔拯其危急唯在此時拯救也便遣合軍同往託言晟兵素少少詩紹翻慮為賊泚所邀藉此兩軍迭為掎角泚且禮翻掎居蟻翻仍先諭旨密使促裝詔書至營即日進路懷光意雖不欲然亦計無所施是謂先人有奪人之心左傳趙宣子之言先悉薦翻淮南子之言救焚不可以不疾理盡於此惟陛下圖之上曰卿所料極善然李晟移軍懷光不免悵望悵丑亮翻怨也若更遣建徽惠元就東謂自咸陽東就李晟也生辭猶今人言生言語也調息猶今人言調停也旬時猶言旬日也興元元年辛酉加王武俊同平章事兼幽州盧龍節度使欲使之討朱滔也使疏吏翻興元元年李晟以為懷光反狀已明緩急宜有備蜀漢之路不可壅此指漢蜀郡漢中郡二郡大界而言三州皆當入蜀之道之要裨賓彌翻將即亮翻洋音祥將音同上又音如字上疑未決欲親總禁兵幸咸陽以慰撫為名趣諸將進討趣讀曰促或謂懷光曰此漢祖遊雲夢之策也遊雲夢事見十一卷漢高祖六年反謀益甚上垂欲行懷光辭益不遜上猶疑讒人間之間古莧翻甲子加懷光太尉增實食賜鐵券實食食實封也使疏吏翻下同考異曰邠志曰十六日詔加懷光太尉按實錄甲子二十三日邠志誤幸奉天錄舊傳李弁作李昪今從奉天記懷光對使者投鐵券於地曰聖人疑懷光邪唐之臣子率稱君父為聖人邪音邪賜鐵券懷光不反今賜鐵券是使之反也辭氣甚悖悖蒲妹翻又蒲沒翻朔方左兵馬使張名振當軍門大呼曰呼火故翻太尉視賊不許擊待天使不敬使疏吏翻朝廷所遣謂之天使蓋謂君天也君之所遣猶天之所遣也果欲反邪功高太山一旦棄之自取族滅富貴他人何益哉言懷光反是自取族滅他人平其亂以為功而得富貴是富貴他人也懷光聞之謂曰我不反以賊方強故須蓄銳俟時耳懷光又言天子所居必有城隍有水曰池無水曰隍未幾移軍據之幾居豈翻張名振曰乃者言不反乃者猶言昨者也何也何不攻長安殺朱泚取富貴引軍還邠邪泚且禮翻又音此還從宣翻又音如字邠卑旻翻懷光所統朔方軍本屯邠州懷光曰名振病心矣命左右引去拉殺之拉落合翻右武鋒兵馬使石演芬本西域胡人懷光養以為子懷光潛與朱泚通謀演芬遣其客郜成義詣行在告之泚且禮翻又音此演以淺翻郜古到翻史炤曰郜姓也出自周文王子封郜國國在濟陰晉有尚書高昌郜久請罷其都統之權成義至奉天告懷光子璀嚴璀改王隹下同統他綜翻俗音從上聲璀七罪翻璀密白其父懷光召演芬責之曰我以爾為子柰何欲破我家今日負我死甘心乎演芬曰天子以太尉為股肱太尉以演芬為心腹太尉既負天子演芬安得不負太尉乎演芬胡人不能異心惟知事一人一人謂天子也死甘心矣懷光使左右臠食之皆曰義士也可令快死以刀斷其喉而去臠力兗翻令力丁翻斷音短考異曰邠志曰懷光投鐵券于地使者懼焉名振呼於軍門又曰二月二十一日懷光拔其軍居咸陽又曰三月三日懷光巡咸陽城名振曰昨日言不反今悉軍此來何也又曰懷光既殺名振召演芬責之按名振云昨日言不反今何此來則是呼軍門之明日懷光即移軍咸陽若至咸陽已十三日因巡城而名振言之何得云昨日又何得云悉軍此來又名振與演芬同日死按舊傳云郜成義至奉天乃反其言告懷光子璀璀密告其父懷光若三月三日則車駕已幸梁洋不在奉天且是時反狀已彰灼如此豈能尚欺人云不反邪今從幸奉天錄悉因投鐵券言之李卞等還言懷光驕慢之狀還從宣翻又音如字於是行在始嚴門禁嚴門關出入之禁以防不虞史炤曰密具裝束所以備行從才用翻乙丑加李晟河中同絳節度使上猶以為薄德宗當患難之時進人若將加諸膝當事定之後退人若將隊諸淵晟成正翻使疏吏翻丙寅又加同平章事上將幸梁州梁州古漢中鹽亭漢廣漢縣地梁置鹽亭縣唐屬梓州以產鹽名縣又遣大將張用誠將兵五千至盩厔以來迎衞至盩厔以來者言若迎衞之兵至盩厔而乘輿未至則當沿道漸進來前以迎乘輿不指定一處也盩厔音舟窒將即亮翻誠將音同上又音如字陰與之通謀誘音酉上聞而患之會震繼遣牙將馬勛奉表上語之故勛許云翻語牛倨翻勛請亟詣梁州取嚴震符召用誠還府若不受召臣請殺之上喜曰卿何時復至此還從宣翻又音如字復扶又翻又音如字勛刻日時而去既得震符請壯士五人與之俱出駱谷用誠不知事泄以數百騎迎之漢中取鳳翔之路南谷曰褒北谷曰駱騎奇寄翻時天寒勛多然藁火於驛外然與燃同藁禾稈也勛乃從容出懷中符以示用誠曰大夫召君用誠錯愕起走從千容翻錯愕猝然驚也壯士自後執其手擒之用誠子在勛後斫傷勛首壯士格殺其子仆用誠於地跨其腹以刀擬其喉曰出聲則死勛入其營士卒已擐甲執兵矣仆方遇翻頓也擐戶慣翻勛大言曰汝曹父母妻子皆在漢中一朝棄之與張用誠同反於汝曹何利乎大夫令我取用誠不問汝曹無自取族滅衆皆讋服令力丁翻讋之涉翻失氣也勛送用誠詣梁州震杖殺之命副將領其衆將即亮翻勛裹其首復命於行在愆期半日愆期過期也李懷光夜遣人襲奪李建徽楊惠元軍建徽走免惠元將奔奉天懷光遣兵追殺之懷光又宣言曰吾今與朱泚連和車駕且當遠避泚且禮翻又音此懷光以韓遊王褱朔方將也韓遊王褱初事郭子儀李懷光東征遊王褱為邠寧留後王褱古回翻將即亮翻與遊王褱書約使為變遊王褱密奏之明日又以書趣之懷光又以書趣遊王褱遊王褱蓋又奏之也若據考異則後書為渾瑊所獲通鑑疑而不取趣讀曰促章十二行本上上有遊王褱又奏之五字乙十一行本同張校同云無註本亦無稱其忠義因問策安出對曰懷光總諸道兵故敢恃衆為亂今邠寧有張昕靈武有甯景璿邠卑旻翻昕許斤翻璿似宣翻河中有呂鳴岳振武有杜從政潼關有唐朝臣渭北有竇覦潼音同朝直遙翻覦音俞皆守將也言此諸將各守其地也尊懷光之官罷其權則行營諸將各受本府指麾矣罷懷光兵權則諸路兵雖在行營將不肯稟命於懷光而各稟本府之命安能為亂上曰罷懷光兵權若朱泚何言罷懷光恐無以制朱泚陛下既許將士以克城殊賞將士奉天子之命以討賊取富貴誰不願之邠府兵以萬數借使臣得而將之將即亮翻又音如字足以誅泚況諸道必有杖義之臣泚不足憂也上然之丁卯懷光遣其將趙昇鸞入奉天約其夕使別將達奚小俊燒乾陵考異曰邠志作達奚小進今從實錄令力丁翻乘繩證翻昇鸞詣渾瑊自言瑊遽以聞且請決幸梁州渾戶昆翻又戶本翻瑊古銜翻考異曰邠志二十六日懷光又使持書促遊王褱渾公獲而奏之且使其卒物色我軍遊王褱不知不得以聞又怒瑊之虞己也慢罵于途上疑其變即日幸梁州今從實錄奉天記曰上初拔奉天而車駕至宜壽縣渭水之陽謂侍臣曰朕之此行莫同永嘉之勢因潸然流涕渾瑊對曰臨大難無憂懼者聖人之勇也言訖濟河按新傳李惟簡追及上於盩厔西然後渾瑊繼至則上至渭陽時瑊猶未來今不取上命瑊戒嚴瑊出部勒未畢上已出城西命戴休顏守奉天朝臣將士狼狽扈從朝直遙翻將即亮翻從才用翻戴休顏徇於軍中曰懷光已反遂乘城拒守朱泚之稱帝也朱泚稱帝見二百二十八卷建中四年泚且禮翻又音此泚召之不起使蔣鎮自往說之說式芮翻凡再往知不可誘脅誘音酉乃歎曰鎮亦忝列曹不能捨生以至於此蔣鎮仕唐為工部侍郎故云亦忝列曹為泚所得不能死而受泚官自愧不能捨生取義復扶又翻臊蘇遭翻汚烏故翻漫謨官翻塗也歔欷而返歔音虛欷音希又許既翻迺聞帝幸山南搏膺大呼呼火故翻自投于牀不食數日而卒梁州在長安南山之南劉迺以乘輿播遷浸以益遠故自絕於衾衽之間太子少師喬琳從上至盩厔稱老疾不堪山險削髮為僧匿於仙遊寺泚聞之召至長安以為吏部尚書於是朝士之竄匿者多出仕泚矣劉迺以乘輿不能復還而自絕義不臣賊也喬琳等以乘輿不能復還出仕於泚苟性命而貪祿利也唐於此時亦云殆矣少始照翻盩厔音舟窒尚辰羊翻懷光遣其將孟保考異曰邠志作孟廷寶今從實錄達將即亮翻又音如字騎奇寄翻趣逡喻翻遇諸軍糧料使張增於盩厔使疏吏翻三將曰彼使我為不臣我以追不及報之不過不使我將耳過古禾翻又古臥翻將即亮翻言不過不使之為將也因目增曰目增示之以意欲因其言以紿衆軍士未朝食如何增紿其衆曰此東數里有佛祠吾貯糧焉三將帥衆而東縱之剽掠紿蕩亥翻貯丁呂翻帥讀曰率剽匹妙翻由是百官從行者皆得入駱谷以追不及還報還從宣翻又音如字考異曰實錄曰纔入駱谷懷光遣其將孟保等以數百騎來襲為後軍將侯仲莊所拒而退遂焚店驛而去舊嚴震傳曰賴山南兵擊之而退輿駕無警急之患今從邠志懷光皆黜之興元元年河東將王權馬彙引兵歸太原將即亮翻彙于貴翻權彙入援見上卷上年以上幸山南聲問不接故引兵歸史言馬燧怠於勤王興元元年李晟得除官制拜哭受命謂河中同絳及加同平章事之命晟成正翻長安宗廟所在天下根本若諸將皆從行誰當滅賊者乃治城隍繕甲兵為復京城之計城隍即為東渭橋營塹治直之翻度支給李懷光軍幾盡先悉薦翻度徒洛翻幾居希翻是時懷光朱泚連兵聲勢甚盛車駕南幸人情擾擾晟以孤軍處二強寇之間泚且禮翻又音此處昌呂翻內無資糧外無救援徒以忠義感激將士故其衆雖單弱而銳氣不衰又以書遺懷光辭禮卑遜遺唯季翻雖示尊崇而諭以禍福勸之立功補過故懷光慚恧未忍擊之恧女六翻晟曰畿內雖兵荒之餘猶可賦斂斂力贍翻宿兵養寇患莫大焉乃以判官張彧假京兆尹擇四十餘人假官以督渭北章十二行本北下有諸縣二字乙十一行本同孔本同張校同芻粟不旬日皆充羨羨弋線翻乃流涕誓衆決志平賊李懷光自河北千里赴難不可謂不勇於勤王以其兵力固可以指期收復君臣猜嫌反忠為逆張名振所謂自取族滅富貴他人有味乎其言也後之觀史者觀懷光之勤王始末與張名振所以諫懷光之言與夫史家歸功李晟之言則凡居功名之際者可不戒哉興元元年田悅用兵數敗事並見前數所角翻其下皆厭苦之上以給事中孔巢父為魏博宣慰使巢父性辯博至魏州對其衆為陳逆順禍福為于偽翻悅及將士皆喜兵馬使田緒承嗣之子也凶險多過失悅不忍殺杖而拘之悅既歸國內外撤警備三月壬申朔悅與巢父宴飲緒對弟姪有怨言其姪止之緒怒殺姪既而悔之曰僕射必殺我僕射謂田悅也悅醉歸寢緒與左右密穿後垣入殺悅及其母妻等十餘人即帥左右執刀立於中門之內夾道帥讀曰率將旦以悅命召行軍司馬扈崿判官許士則都虞候蔣濟議事府署深邃外不知有變士則濟先至召入亂斫殺之緒恐既明事泄乃出門出中門也排牙者牙前將士各執其物以立於庭下俟節度使升聽事以次參謁也劉忠信與扈崿謀反昨夜刺殺僕射呼火故翻下同刺七亦翻衆大驚諠譁忠信未及自辯衆分裂殺之扈崿來及戟門遇亂節鎮外門列戟故謂之戟門將士從之者三分之一緒懼登城而立田緒所登者魏州牙城也緒先相公之子諸君受先相公恩先相公謂田承嗣也兵馬使賞緡錢二千大將半之下至士卒人賞百緡竭公私之貨五日取辦於是將士回首殺扈崿皆歸緒軍府乃安因請命於孔巢父巢父命緒權知軍府後數日衆乃知緒殺其兄田悅者緒之從兄怒其殺兄而悔立之無如之何緒又殺悅親將薛有倫等二十餘人李抱真王武俊引兵將救貝州聞亂不敢進朱滔聞悅死喜曰悅負恩天假手於緒也即遣其執憲大夫鄭景濟等執憲大夫猶天朝御史大夫合兵萬二千人攻魏州寔軍王莽河縱騎兵及回紇四出剽掠滔別遣人章十二行本人下有入城二字乙十一行本同說緒許以本道節度使緒方危急遣隨軍侯臧詣貝州送款於滔滔喜遣臧還報使亟定盟約時緒部署城內已定謂魏州城內也許以赴援如悅存日之約緒召將佐議之幕僚曾穆盧南史曰用兵雖尚威武亦本仁義然後有功今幽陵之兵恣行殺掠白骨蔽野雖先僕射背德背蒲妹翻其民何罪今雖盛強其亡可跂立而待也跂去智翻舉踵而立也況昭義恆冀方相與攻之昭義李抱真恆冀王武俊不若歸命朝廷天子方蒙塵於外聞魏博使至必喜官爵旋踵而至矣旋踵轉足也遣使奉表詣行在城守以俟命興元元年上之發奉天也謂自奉天幸山南王褱帥讀曰率下同考異曰邠志曰韓遊王褱使其子欽緒扈從懷光知之以戴休顏代領其職仍假遊王褱邠州刺史將使其黨張昕害之遊王褱既失兵柄未知所從說客劉南金曰竊觀人心莫不戀主邠有留甲可以圖變公得之邠殆天假也乃使麾下將范希朝趙懷仙誘其軍歸邠士皆從之休顏率麾下卒據城門士不得盡出其從遊王褱至邠者八百餘人按舊遊王褱傳無受懷光邠州刺史事休顏傳云及李懷光叛據咸陽使誘休顏休顏集三軍斬其使嬰城自守懷光大駭遂自涇陽夜遁其月拜檢校工部尚書奉天行營節度使且上幸山南命休顏留守奉天遊王褱先發懷光陰謀二人豈肯更受懷光節度蓋當時出幸蒼卒遊王褱扈從不及或以與渾瑊有隙不敢南行故帥麾下歸邠州耳李懷光以李晟軍浸盛惡之惡烏路翻欲引軍自咸陽襲東渭橋三令其衆衆不應竊相謂曰若與我曹擊朱泚惟力是視若欲反我曹有死不能從也懷光知衆不可強強其兩翻問計於賓佐節度巡官良鄉李景略曰良鄉漢縣屬涿郡唐屬幽州取長安殺朱泚散軍還諸道單騎詣行在如此臣節亦未虧功名猶可保也頓首懇請至於流涕懷光許之都虞候閻晏等勸懷光東保河中徐圖去就懷光乃說其衆曰說式芮翻今且屯涇陽召妻孥於邠俟至與之俱往河中春裝既辦還攻長安未晚也東方諸縣皆富實軍發之日聽爾俘掠衆許之東方諸縣謂涇陽以東諸縣也考異曰幸奉天錄李晟至東渭橋旬日之後軍用整備懷光患之稍移軍涇陽與朱泚約同滅晟軍舊懷光傳曰懷光劫李建徽等軍移於好畤又曰居二旬乃驅兵掠涇陽富平自同州往河中朱泚傳曰懷光為泚所賣慚怒憤恥移於好畤按實錄三月甲申懷光自咸陽燒營走歸河中幸奉天錄曰三月懷光拔咸陽掠三原等十二縣雞犬無遺老小步騎百餘萬皆不云移軍好畤及涇陽今從邠志及幸奉天錄曏者之議軍衆不從子宜速去不且見害遣數騎送之景略出軍門慟哭曰不意此軍章十二行本軍下有一旦二字乙十一行本同孔本同陷於不義朔方軍平安史拒回紇吐蕃功高天下備盡忠力一旦從懷光反是陷於不義懷光遣使詣邠州令留後張昕悉發所留兵萬餘人及行營將士家屬會涇陽仍遣其將劉禮等將三千餘騎脅遷之韓遊王褱說昕曰說式芮翻李太尉功高自章十二行本自下有棄己二字乙十一行本同孔本同張校同蹈禍機中丞今日可以自求富貴遊王褱請帥麾下以從從才用翻昕曰昕微賤賴李太尉得至此不忍負也遊王褱乃謝病不出陰與諸將高固楊懷賓等相結時崔漢衡以吐蕃兵營于邠南高固曰昕以衆去則邠城空矣乃詐為渾瑊書召吐蕃使稍逼邠城昕等懼竟不敢出昕等謀殺諸將之不從者遊王褱知之先與高固等舉兵殺昕昕許斤翻將即亮翻王褱古回翻考異曰邠志曰三月二十三日張昕戒劉禮等衷甲而入昕小吏李岌密報遊王褱遊王褱伏甲先起高固等帥衆應之遂斬昕于府中遊王褱既據邠府遣李旻懷光乃走蒲州按實錄甲申懷光自咸陽燒營走歸河中然則遊王褱殺昕必在其前今因懷光走見之遣楊懷賓奉表以聞且遣人告崔漢衡漢衡矯詔以遊王褱知軍府事軍中大喜懷光子旻在邠邠卑旻翻遊王褱遣之或曰不殺旻何以自明言遣旻則上疑遊王褱與懷光通將無以自明也王褱殺旻懷光怒其衆必至不如釋旻以走之時楊懷賓子朝晟在懷光軍中為右廂兵馬使朝直遙翻晟成正翻使疏吏翻聞之泣白懷光曰父立功於國言其父殺張昕以邠城返正也不可典兵懷光囚之為後赦朝晟張本王褱戴休顏屯奉天駱元光屯昭應尚可孤屯藍田皆受李晟節度晟軍聲大振始懷光方強朱泚畏之與懷光書以兄事之約分帝關中永為鄰國及懷光決反逼乘輿南幸泚且禮翻又音此乘繩證翻其下多叛之勢益弱泚乃賜懷光詔書以臣禮待之且徵其兵懷光慚怒內憂麾下為變外怒李晟襲之遂燒營東走掠涇陽等十二縣雞犬無遺考異曰舊高郢傳曰懷光將歸河中郢言西迎大駕豈非忠乎懷光不聽按德宗因懷光迫逐遂幸梁州借使懷光欲迎駕德宗豈肯來乎今不取懷光行及富平也將士在道散亡相繼至河中或勸河中守將呂鳴岳焚橋拒之鳴岳以兵少恐不能支遂納之若呂鳴岳焚蒲津橋懷光將士之心已離必潰散於河西不得至河中矣將即亮翻少詩沼翻懷光遣其將趙貴先築壘於同州備唐兵討之也奔行在幕僚裴向攝州事詣貴先責以逆順之理貴先感寤遂請降同州由是獲全向遵慶之子也裴遵慶肅宗朝為相據之渭北守將竇覦帥獵團七百圍之團結獵戶為兵謂之獵團帥讀曰率詔以覦為渭北行軍司馬興元元年丁亥以李晟兼京畿渭北鄜坊丹延節度使鄜音夫興元元年庚寅車駕至城固唐安公主薨蜀州唐安郡上在道民有獻瓜果者上欲以散試官授之散官即文散階武散階也試官事始見二百五卷武后長壽元年贄上奏以為爵位恆宜慎惜不可輕用恆戶登翻起端雖微流弊必大獻瓜果者止可賜以錢帛不當酬以官上曰試官虛名無損於事贄又上奏其略曰自兵興以來財賦不足以供賜而職官之賞興焉青朱雜沓於胥徒周禮六官之屬大夫士之下有府史胥徒鄭氏註曰胥徒民之給傜役者若今衞士矣胥讀如諝謂其有才智為什長胥私呂翻又思餘翻左傳羋無宇曰人有十等王臣公公臣大夫大夫臣士士臣皁皁臣輿輿臣隸隸臣僚僚臣僕僕臣臺方在爵輕設法貴之猶恐不重若又自棄將何勸人夫誘人之方惟名與利名近虛而於教為重利近實而於德為輕近其靳翻專實利而不濟之以虛則耗匱而物力不給專虛名而不副之以實則誕謾而人情不趨誕謾虛言也趨七喻翻又音如字有職事官有散官有勳官有爵號然掌務而授俸者唯繫職事之一官也此所謂施實利而寓虛名者也其勳散爵號三者所繫大抵止於服色資蔭而已服色謂紫緋淺緋深綠淺綠深青淺青及黃其色各以品為差資廕謂隨資品得廕其子若孫及曾孫也今之員外試官頗同勳散爵號雖則授無費祿受不占員占之贍翻然而突銛鋒排患難者則以是賞之銛息廉翻利也難乃旦翻竭筋力展勞效者又以是酬之若獻瓜果者亦授試官則彼必相謂曰吾以忘軀命而獲官此以進瓜果而獲官是乃國家以吾之軀命同於瓜果矣視人如草木誰復為用哉復扶又翻今陛下既未有實利以敦勸又不重虛名而濫施人無藉焉則後之立功者將曷用為賞哉贄在翰林為上所親信居艱難中雖有宰相大小之事上必與贄謀之故當時謂之內相相息亮翻下同上行止必與之俱梁洋道險嘗與贄相失經夕不至上驚憂涕泣募得贄者賞千金久之乃至上喜甚太子以下皆賀然贄數直諫迕上意數所角翻迕五故翻盧雖貶官貶官見上卷上年贄極言姦邪致亂上雖貌從心頗不悅故劉從一姜公輔皆自下陳登用二人為相見上卷上年劉從一自吏部郎中姜公輔自翰林學士下陳猶下列也未得為相為上追仇陸贄盡言而貶贄張本壬辰車駕至梁州山南地薄民貧自安史以來盜賊攻剽剽匹妙翻戶口減耗太半雖節制十五州十五州梁洋興鳳開通渠集蓬利壁巴閬果金也及大駕駐蹕糧用頗窘上欲西幸成都嚴震言於上曰山南地接京畿李晟方圖收復藉六軍以為聲援若幸西川則晟未有收復之期也衆議未決會李晟表至言陛下駐蹕漢中所以繫億兆之心成滅賊之勢若規小捨大規小謂欲幸成都以便資用捨大謂捨興復之功而苟安於一隅則士庶失望雖有猛將謀臣無所施矣上乃止嚴震百方以聚財賦民不至困窮而供億無乏牙將嚴礪震之從祖弟也震使掌轉餉事甚脩辨史言嚴震供奉車駕無闕之功辨讀曰辦章十二行本正作辦乙十一行本同興元元年初奉天圍既解李楚琳遣使入貢上不得已除鳳翔節度使而心惡之惡其殺張鎰而附朱泚且在肘腋之下也惡烏路翻若不隄防恐生窺伺伺相吏翻由是楚琳使者數輩至上皆不引見見賢遍翻留之不遣甫至漢中欲以渾瑊代楚琳鎮鳳翔陸贄上奏以為楚琳殺帥助賊事見二百二十八卷建中四年帥所類翻但以乘輿未復大憝猶存書云元惡大憝憝亦惡也音徒對翻急宣速告晷刻是爭言較晷刻而爭遲速也駱谷復為盜所扼復扶又翻僅通王命唯在褒斜據九域志商州之路達金洋皆數百里而洋又遠於金自商州西至長安復二百餘里則其路迂遙至長安蓋一千一百餘里自駱谷關至洋州亦五百餘里惟寶雞南入大散關至梁州五百里而近宋白曰興元府東北至長安取駱谷路六百五十二里取斜谷路九百二十三里驛路一千二百二十三里南北遂將敻絕敻休正翻以諸鎮危疑之勢居二逆誘脅之中二逆謂朱泚李懷光也誘音酉各懷向背背蒲妹翻儻或楚琳發憾公肆猖狂南塞要衝塞悉則翻東延巨猾則我咽喉梗而心膂分矣咽因肩翻今楚琳能兩端顧望乃是天誘其衷兩端顧望謂李楚琳外奉朝廷而陰事朱泚杜預曰衷中也陸德明曰衷音中或丁仲翻將濟大業陛下誠宜深以為念厚加撫循得其遲疑便足集事必欲精求素行追抉宿疵行下孟翻抉於決翻則是改過不足以補愆自新不足以贖罪凡今將吏豈得盡無疵瑕人皆省思省悉景翻孰免疑畏又況阻命之輩脅從之流自知負恩安敢歸化斯釁非小所宜速圖伏願陛下思英主大略勿以小不忍虧撓興復之業也撓奴教翻上釋然開悟善待楚琳使者優詔存慰之興元元年丁酉加宣武節度使劉洽同平章事興元元年己亥以行在都知兵馬使渾瑊同平章事兼朔方節度使朔方邠寧振武永平奉天行營兵馬副元帥將罷李懷光兵權故先用渾瑊興元元年庚子詔數李懷光罪惡數所具翻又所主翻敍朔方將士忠順功名猶以懷光舊勳曲加容貸其副元帥太尉中書令河中尹幷朔方諸道節度觀察等使宜並罷免將即亮翻貸來戴翻考異曰舊高郢傳曰懷光歸河中又欲悉衆而西時渾瑊軍孤㣥帥未集郢與李鄘誓死駐之屬懷光長子璀候郢郢乃諭以逆順曰人臣所宜效順且自天寶以來阻兵者今復誰在況國家自有天命非獨人力今若恃衆西向自絕于天安知三軍不有奔潰者乎李璀震懼流淚氣索明年春郢與都知兵馬使呂鳴岳都虞候張延英同謀間道上表及受密詔事泄二將立死懷光乃大集將卒白刃盈庭引郢詰之郢挺然抗詞無所慚隱憤氣感發觀者淚下懷光慚沮而止按實錄懷光以興元元年三月甲申走歸河中己亥以渾瑊為副元帥四月辛丑朔始臨軒受瑊節鉞與郢傳年月全不相應今不取授太子太保其所管兵馬委本軍自舉一人功高望重者便宜統領速具奏聞當授旌旄以從人欲旌旄猶言節旄也興元元年夏四月壬寅以邠寧兵馬使韓遊王褱為邠寧節度使癸卯以奉天行營兵馬使戴休顏為奉天行營節度使興元元年靈武守將甯景璿為李懷光治第別將李如暹曰李太尉逐天子而景璿為之治第治直之翻為于偽翻是亦反也攻而殺之興元元年甲辰加李晟鄜坊京畿渭北商華副元帥分李懷光兵柄以授李晟渾瑊鄜音夫華戶化翻朱泚善遇之軍中有言及家者晟泣曰天子何在敢言家乎泚使晟親近以家書遺晟遺唯季翻曰公家無恙晟怒曰爾敢為賊為間為賊于偽翻間古莧翻立斬之軍士未授春衣盛夏猶衣裘褐猶衣於既翻終無叛志史言李晟以忠義感激士心乙巳以陝虢防遏使唐朝臣為河中同絳節度使陝失冉翻前河中尹李齊運為京兆尹供晟軍糧役役者輓輸浚築之事興元元年庚戌以魏博兵馬使田緒為魏博節度使興元元年渾瑊帥諸軍出斜谷帥讀曰率崔漢衡勸吐蕃出兵助之尚結贊曰邠軍不出將襲我後韓遊王褱聞之遣其將曹子達將兵三千往會瑊軍吐蕃遣其將論莽羅依將兵二萬從之李楚琳遣其將石鍠將卒七百從瑊拔武功鍠戶盲翻庚戌朱泚遣其將韓旻攻武功鍠以其衆迎降瑊戰不利收兵登西原其地高平在武功縣西故曰西原擊旻大破之於武亭川考異曰邠志云十日破旻等而實錄云乙丑蓋奏到之日也今從邠志旻僅以身免瑊遂引兵屯奉天與李晟東西相應以逼長安興元元年上欲為唐安公主造塔厚葬之時唐安公主薨於城固塔浮圖也為于偽翻以為山南非久安之地公主之葬會歸上都會合也要也上都謂長安以副軍須之急凡行軍資糧器械所須者皆謂之軍須唐安造塔其費甚微非宰相所宜論公輔正欲指朕過失自求名耳相負如此當如何處之相息亮翻處昌呂翻贄上奏以為公輔任居宰相遇事論諫不當罪之其略曰公輔頃與臣同在翰林臣今據理辯直則涉於私黨之嫌希旨順成則違於匡輔之義涉嫌止貽於身患違義實玷於君恩徇身忘君臣之恥也玷都念翻玉病也又曰唯闇惑之主則怨讟溢於下國而耳不欲聞腥德達於上天而心不求寤讟徒牧翻謗也書呂刑曰德刑發聞惟腥迨乎顛覆猶未知非又曰當問理之是非豈論事之大小虞書曰兢兢業業一日二日萬幾幾居希翻見皋陶謨唐虞之際主聖臣賢慮事之微日至萬數然則微之不可不重也如此陛下又安可忽而不念乎又曰若以諫爭為指過爭讀曰諍則剖心之主不宜見罪於哲王武王數紂之罪曰斮朝涉之脛剖賢人之心則匪躬之臣不應垂訓於聖典易曰王臣蹇蹇匪躬之故應一凌翻假有意將指過諫以取名但能聞善而遷見諫不逆則所指者適足以彰陛下莫大之善所取者適足以資陛下無疆之休因而利焉所獲多矣儻或怒其指過而不改則陛下招惡直之譏惡烏路翻又如字黜其取名而不容則陛下被違諫之謗被皮義翻是乃掩己過而過彌著損彼名而名益彰果而行之所失大矣上意猶怒甲寅罷公輔為左庶子興元元年加西川節度使張延賞同平章事賞其供億無乏故也上在漢中藉西川供億為張延賞入相張本上時掌翻使疏吏翻興元元年朱泚姚令言數遣人誘涇原節度使馮河清泚且禮翻又音此數所角翻誘音酉使疏吏翻河清皆斬其使者大將田希鑒密與泚通殺河清以軍府附於泚泚以希鑒為涇原節度使將即亮翻考異曰邠志曰興元元年四月渾公受鉞專征出斜谷崔公勸吐蕃分軍應援尚結贊曰邠軍不出乘我也韓公使曹子達帥甲三千赴于渾公吐蕃乃以二萬餘從之李楚琳使石鍠以卒七百人從渾公進收武功遂居之十日朱泚使韓旻田旻以卒三千寇武功渾公禦之陳于東郊石鍠以其卒降旻於陳渾公軍敗乃馳登西原建旗收卒會邠師以吐蕃至賊不知乃悉衆追渾公遂為吐蕃所覆皆死焉田旻以馬逸獲免吐蕃既勝泚軍乃大掠而去涇人相傳言吐蕃助國有功將以叛卒之孥賞而歸之涇人曰不殺馮公雖吾親族亦將不免矣十四日涇卒殺河清以田希鑒請命於泚泚授希鑒涇原節度大使賜金帛使和西戎西戎皆受賂焉希鑒疏涇將之不與己者以告朱泚請殺之泚曰我曲彼直不許按希鑒殺河清必有宿謀或為此訛言以搖衆耳今從實錄河清死在三月今從邠志興元元年上問陸贄近有卑官自山北來者梁州在山南岐雍在山北有邢建者論說賊勢語最張皇皇大也頗似窺覘覘丑廉翻又丑豔翻今已於一所安置如此之類更有數人若不追尋恐成姦計卿試思之如何為便贄上奏以為今盜據宮闕有冒涉險遠來赴行在者當量加恩賞豈得復猜慮拘囚量音良復扶又翻其略曰以一人之聽覽而欲窮宇宙之變態以一人之防慮而求勝億兆之姦欺役智彌精失道彌遠項籍納秦降卒二十萬慮其懷詐復叛一舉而盡阬之其於防虞亦已甚矣阬降卒事見九卷漢高祖元年天下之士至者納用不疑其於備慮可謂疏矣疏與疎同劉氏以昌蓄疑之與推誠其效固不同也秦皇嚴肅雄猜而荊軻奮其陰計事見七卷秦始皇二十年而馬援輸其款誠事見四十一卷漢世祖建武四年人亦思附任數御物物終不親情思附則感而悅之雖寇讎化為心膂矣意不親則懼而阻之雖骨肉結為仇慝矣又曰陛下智出庶物有輕待人臣之心思周萬機有獨馭區㝢之意謀吞衆略有過慎之防明照㣥情有先事之察先悉薦翻嚴束百辟有任刑致理之規威制四方有以力勝殘之志此數語曲盡德宗心事異日安免追仇乎忠藎者憂於見疑藎徐刃翻詩王之藎臣毛氏傳曰藎進也著勳業者懼於不容懷反側者迫於及討馴致離叛構成禍災天子所作天下式瞻小猶慎之矧又非小願陛下以覆車之轍為戒實宗社無疆之休興元元年丁巳以前山南東道節度使南皮賈耽為工部尚書先是耽使行軍司馬樊澤奏事行在先悉薦翻澤既復命方大宴有急牒至以澤代耽為節度使事見上卷興元元年宴飲如故顏色不改宴罷召澤告之且命將吏謁澤牙將張獻甫怒曰行軍為尚書問天子起居為于偽翻乃敢自圖節鉞奪尚書土地事人不忠章十二行本忠下有衆心不服四字乙十一行本同請殺之耽曰是何言也天子所命即為節度使矣即日離鎮以獻甫自隨軍府遂安即日離鎮既得君命召不俟駕之義亦所以遏亂原以張獻甫自隨則樊澤無所猜嫌亦所以全獻甫也離力智翻興元元年左僕射李揆自吐蕃還甲子薨於鳳州李揆入吐蕃見二百二十八卷建中四年蓋自吐蕃還赴興元至鳳州而薨興元元年韓游王褱引兵會渾瑊於奉天興元元年丙寅加平盧節度使李納同平章事興元元年丁卯義王玼薨玼玄宗子玼音此又且禮翻興元元年朱滔攻貝州百餘日馬寔攻魏州亦踰四旬皆不能下賈林復為李抱真說王武俊復扶又翻為于偽翻說輸芮翻曰朱滔志吞貝魏復值田悅被害復扶又翻儻旬日不救則魏博皆為滔有矣魏博既下則張孝忠必為之臣張孝忠時鎮易定三道謂幽州易定魏博時回紇遣兵助滔恆州常山郡王武俊居之得乎常山不守則昭義退保西山自常山南至趙州皆恆冀巡屬又西南抵邢州界即昭義巡屬阻山以為固不若乘貝魏未下與昭義合兵救之滔既破亡則關中喪氣朱泚不日梟夷朱泚竊據關中滔破則泚喪氣矣喪息浪翻諸將之功孰有居明公之右者哉武俊悅從之戊辰武俊軍于南宮東南抱真自臨洺引兵會之與武俊營相距十里兩軍尚相疑明日抱真以數騎詣武俊營賓客共諫止之抱真命行軍司馬盧玄卿勒兵以俟曰吾之此舉繫天下安危若其不還領軍事以聽朝命亦惟子勵將士以雪讎恥亦惟子言終遂行武俊嚴備以待之抱真見武俊敍國家禍難難乃旦翻天子播遷持武俊哭流涕縱橫縱子容翻武俊亦悲不自勝勝音升左右莫能仰視遂與武俊約為兄弟誓同滅賊武俊曰相公十兄名高四海李抱真第十故呼為十兄得棄逆從順免葅醢之罪享王公之榮今又不間胡虜間古莧翻王武俊本出於夷落辱為兄弟武俊當何以為報乎滔所恃者回紇耳不足畏也戰日願十兄按轡臨視武俊決為十兄破之決為于偽翻抱真退入武俊帳中酣寢久之武俊感激待之益恭指心仰天曰此身已許十兄死矣史言抱真推心待武俊以成大功興元元年山南地熱上以軍士未有春服亦自御裌衣裌音夾容肇祖標點聶崇岐覆校
