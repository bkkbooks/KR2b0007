body:
  text: 資治通鑑卷第九十二端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰權判西京留司御史臺上柱國河內郡開國侯食邑一千三百戶食實封四百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註晉紀十四永昌元年中宗元皇帝下永昌元年壬午三二二永昌元年春正月郭璞復上疏請因皇孫生下赦令璞去年已疏請肆赦皇孫去年十一月生復扶又翻乙卯大赦改元王敦以璞為記室參軍璞善卜筮知敦必為亂己預其禍甚憂之大將軍掾潁川陳述卒掾于絹翻璞哭之極哀曰嗣祖焉知非福也陳述字嗣祖亦敦府僚也焉於虔翻敦既與朝廷乖離乃羈錄朝士有時望者置己幕府朝直遙翻以羊曼及陳國謝鯤為長史曼祜之兄孫也曼鯤終日酣醉故敦不委以事敦收時望不過用西都諸王之故智耳酣戶甘翻謂鯤曰劉隗姦邪將危社稷吾欲除君側之惡何如鯤曰隗誠始禍然城狐社鼠後漢虞延曰城狐社鼠不畏熏燒謂有所憑託也又中山王勝曰社鼷不灌屋鼠不熏所託者然也爾雅翼曰管仲稱社束木而塗之鼠因往託焉燻之則恐燒其木灌之則恐敗其塗此鼠之所以不可得而殺者以社故也以喻君之左右君庸才豈達大體出為豫章太守守式又翻又留不遣戊辰敦舉兵於武昌上疏罪狀劉隗稱隗佞邪讒賊威福自由隗五罪翻妄興事役勞擾士民賦役煩重怨聲盈路臣備位宰輔不可坐視成敗輒進軍致討隗首朝懸諸軍夕退昔太甲顛覆厥度幸納伊尹之忠殷道復昌湯崩太甲顛覆湯之典刑伊尹放之於桐三年太甲悔過自怨自艾於桐伊尹以冕服奉太甲復歸于亳賴伊尹之訓以圖厥終古固有是事然非人臣所當為也三息暫翻又如字則四海乂安社稷永固矣沈充亦起兵於吳興以應敦敦以充為大都督督護東吳諸軍事敦至蕪湖又上表罪狀刁協帝大怒乙亥詔曰王敦憑恃寵靈敢肆狂逆方朕太甲欲見幽囚是可忍也孰不可忍今親帥六軍以誅大逆帥讀曰率有殺敦者封五千戶侯敦兄光祿勳含乘輕舟逃歸于敦太子中庶子溫嶠謂僕射周顗曰大將軍此舉似有所在當無濫邪顗曰不然顗魚豈翻人主自非堯舜何能無失人臣安可舉兵以脅之舉動如此豈得云非亂乎處仲狼抗無上其意寧有限邪王敦字處仲狼似犬銳頭白頰高前廣後貪而敢抗人故以為喻處昌呂翻敦初起兵遣使告梁州刺史甘卓約與之俱下卓許之及敦升舟而卓不赴使參軍孫雙詣武昌諫止敦敦驚曰甘侯前與吾語云何而更有異正當慮吾危朝廷耳吾今但除姦凶若事濟當以甘侯作公許卓作公啗之以利欲使同逆卓意狐疑或說卓且偽許敦待敦至都而討之說輸芮翻卓曰昔陳敏之亂吾先從而後圖之事見八十六卷惠帝永興二年懷帝永嘉元年心常愧之今若復爾何以自明復扶又翻下同卓使人以敦旨告順陽太守魏該守式又翻該曰我所以起兵拒胡賊者正欲忠於王室耳今王公舉兵向天子非吾所宜與也遂絕之史言甘卓不如魏該之忠果敦遣參軍桓羆說譙王氶請氶為軍司說輸芮翻氶音拯氶歎曰吾其死矣地荒民寡勢孤援絕將何以濟然得死忠義夫復何求夫音扶復扶又翻氶檄長沙虞悝為長史會悝遭母喪悝苦回翻氶往弔之曰吾欲討王敦而兵少糧乏少詩沼翻且新到恩信未洽卿兄弟湘中之豪俊王室方危金革之事古人所不辭禮記子夏問曰三年之喪卒哭金革之事無避也者禮歟初有司歟孔子曰吾聞諸老耼昔者魯公伯禽有為為之也今以三年之喪從其利者吾弗知也春秋公羊傳曰古者臣有大喪則君三年不呼其門已練可以弁冕服金革之事君使之非也臣行之禮也閔子要絰而服事孔子蓋善之也悝曰大王不以悝兄弟猥劣親屈臨之敢不致死然鄙州荒弊難以進討宜且收衆固守傳檄四方敦勢必分分而圖之庶幾可捷也幾居希翻氶乃囚桓羆以悝為長史以其弟望為司馬督護諸軍與零陵太守尹奉建昌太守長沙王循衡陽太守淮陵劉翼沈約曰晉惠帝元康九年分長沙東北下雋諸縣立建昌郡至宋為巴陵郡吳孫亮太平二年分長沙西部都尉立衡陽郡淮陵縣屬臨淮郡時亦分為郡舂陵縣本前漢之舂陵侯國後徙國南陽省吳復立舂陵縣屬零陵郡姓譜易姓齊有大夫易牙雄移檄遠近列敦罪惡於是一州之內皆應氶惟湘東太守鄭澹不從吳孫亮太平二年分長沙東部都尉立湘東郡澹徒覽翻以徇四境澹敦姊夫也氶遣主簿鄧騫至襄陽晉梁州刺史鎮襄陽自周訪始宋白曰襄陽漢中廬縣地劉大連雖驕蹇失衆心劉隗字大連說輸芮翻下同大將軍以其私憾稱兵向闕此忠臣義士竭節之時也公受任方伯奉辭伐罪乃桓文之功也卓曰桓文則非吾所能然志在徇國當共詳思之參軍李梁說卓曰昔隗囂跋扈竇融保河西以奉光武卒受其福事見四十一卷漢光武建武五年至四十三卷十二年卒子恤翻但當按兵坐以待之使大將軍事捷當委將軍以方面不捷朝廷必以將軍代之何憂不富貴而釋此廟勝孫子曰未戰而廟勝得算多也未戰而廟不勝得算少也騫謂梁曰光武當創業之初故隗竇可以文服從容顧望文服謂非心服特以虛文示相臣服而已從千容翻非竇融之比也朝直遙翻襄陽之於太府襄陽以王敦府為太府使大將軍克劉隗還武昌增石城之戍賢曰石城故城在復州沔陽縣東南將軍將安歸乎勢在人手而曰我處廟勝未之聞也且為人臣國家有難處昌呂翻難乃旦翻坐視不救於義安乎卓尚疑之騫曰今既不為義舉又不承大將軍檄此必至之禍愚智所見也且議者之所難以彼強而我弱也今大將軍兵不過萬餘其留者不能五千而將軍見衆既倍之矣見賢遍翻以將軍之威名帥此府之精銳杖節鳴鼓以順討逆豈王含所能禦哉帥讀曰率遡流之衆勢不自救謂敦兵以東下若欲遡流西上以自救勢不相及也若摧柘拉朽尚何顧慮邪拉盧合翻武昌既定據其軍實鎮撫二州二州謂荊江也使還者如歸此呂蒙所以克關羽也事見六十八卷漢獻帝建安二十四年安坐以待危亡不可以言智矣敦恐卓於後為變又遣參軍丹楊樂道融往邀之必欲與之俱東道融雖事敦而忿其悖逆悖蒲內翻又蒲沒翻乃說卓曰主上親臨萬機自用譙王為湘州非專任劉隗也而王氏亶權日久卒見分政卒讀曰猝謂分任譙王氶等政不專歸於王氏也便謂失職背恩肆逆背蒲妹翻舉兵向闕國家遇君至厚今與之同豈不違負大義生為逆臣死為愚鬼永為宗黨之恥不亦惜乎為君之計莫若偽許應命而馳襲武昌大將軍士衆聞之必不戰自潰大勳可就矣卓雅不欲從敦聞道融之言遂決曰吾本意也乃與巴東監軍柳純南平太守夏侯承監工銜翻夏戶雅翻宜都太守譚該等姓譜齊滅譚子孫以國為氏漢有河南尹譚閎又巴南大姓有譚氏盤瓠之後帥所統致討數所具翻遣參軍司馬讚孫雙奉表詣臺羅英至廣州約陶侃同進戴淵在江西戴淵出鎮合肥於建康為江西表上之上時掌翻臺內皆稱萬歲陶侃得卓信即遣參軍高寶帥兵北下帥讀曰率武昌城中傳卓軍至人皆奔散敦遣從母弟南蠻校尉魏乂敦從母魏氏乂其弟也從才用翻恆戶登翻帥甲卒二萬攻長沙長沙城池不完資儲又闕人情震恐或說譙王氶南投陶侃或退據零桂氶曰吾之起兵志欲死於忠義豈可貪生苟免為奔敗之將乎將即翻亮事之不濟令百姓知吾心耳乃嬰城固守未幾幾魚豈翻虞望戰死甘卓欲留鄧騫為參軍鶱不可乃遣參軍虞沖與騫偕至長沙遺譙王氶書勸之固守當以兵出沔口斷敦歸路遺于季翻斷丁管翻則湘圍自解氶復書稱江左中興草創始爾豈圖惡逆萌自寵臣吾以宗室受任志在隕命而至止尚淺凡百茫然足下能卷甲電赴猶有所及卷讀曰捲若其狐疑則求我於枯魚之肆矣莊子見車轍鮒鮒曰豈無斗升之水以活我乎莊子曰待我決西江之水而迎汝鮒曰如君言不如早索我於枯魚之肆永昌元年二月甲午封皇子昱為琅邪王永昌元年後趙王勒立子弘為世子遣中山公虎將精卒四萬擊徐龕將即亮翻龕苦含翻龕堅守不戰虎築長圍守之永昌元年趙主曜自將擊楊難敵難敵逆戰不勝退保仇池仇池諸氐羌及故晉王保將楊韜隴西太守梁勛皆降於曜降戶江翻曜遷隴西萬餘戶於長安進攻仇池會軍中大疫曜亦得疾將引兵還恐難敵躡其後乃遣光國中郎將王獷說難敵光國中郎將趙所置也獷古猛翻說輸芮翻難敵遣使稱藩曜以難敵為假黃鉞都督益寧南秦涼梁巴六州隴上西域諸軍事上大將軍益寧南秦三州牧武都王吳孫氏始置上大將軍南秦州及巴州曜創其名其後北國率授楊氏南秦州刺史據有陰平武都二郡之地秦州刺史陳安求朝於曜曜辭以疾安怒以為曜已卒朝直遙翻卒子恤翻大掠而歸曜疾甚乘馬輿而還使其將呼延寔監輜重於後監工銜翻重直用翻安邀擊獲之謂寔曰劉曜已死子尚誰佐吾當與子共定大業寔叱之曰汝受人寵祿而叛之自視智能何如主上吾見汝不日梟首於上邽市梟堅堯翻何謂大業宜速殺我安怒殺之以寔長史魯憑為參軍安遣其弟集帥騎三萬追曜帥讀曰率騎奇寄翻衞將軍呼延瑜逆擊斬之安乃還上邽遣將襲城拔之縣屬扶風郡苦堅翻有衆十餘萬自稱大都督假黃鉞大將軍雍涼秦梁四州牧涼王雍於用翻以趙募為相國魯憑對安大哭曰吾不忍見陳安之死也安怒命斬之憑曰死自吾分分扶問翻懸吾頭於上邽市觀趙之斬陳安也遂殺之曜聞之慟哭曰賢人民之望也陳安於求賢之秋而多殺賢者吾知其無所為也休屠王石武以桑城降趙石武蓋亦匈奴種屠直於翻封酒泉王永昌元年帝徵戴淵劉隗入衞建康隗至百官迎于道隗岸幘大言岸幘者幘微脫額也及入見見賢遍翻與刁協勸帝盡誅王氏帝不許隗始有懼色司空導帥其從弟中領軍邃左衞將軍廙侍中侃彬及諸宗族二十餘人每旦詣臺待罪帥讀曰率從才用翻廙羊至翻又逸職翻周顗將入導呼之曰伯仁以百口累卿累力瑞翻周顗字伯仁欲使顗保護導以全其家也顗直入不顧既見帝言導忠誠申救甚至帝納其言顗喜飲酒喜許記翻至醉而出導猶在門又呼之顗不與言顧左右曰今年殺諸賊奴取金印如斗大繫肘後既出又上表明導無罪言甚切至導不之知甚恨之帝命還導朝服召見之導稽首曰朝直遙翻稽音啟逆臣賊子何代無之不意今者近出臣族帝跣而執其手曰茂弘方寄卿以百里之命王導字茂弘孔氏曰寄百里之命謂攝君之政令三月以導為前鋒大都督加戴淵驃騎將軍驃匹妙翻詔曰導以大義滅親衞石碏之子厚與公子州吁弒衞桓公又與州吁如陳碏使告于陳而殺之君子曰石碏純臣也惡州吁而厚與焉大義滅親其是之謂乎帝之初鎮揚州也領安東將軍王邃為右僕射帝遣王廙往諭止敦敦不從而留之廙更為敦用征虜將軍周札素矜險好利好呼到翻帝以為右將軍都督石頭諸軍事敦將至帝使劉隗軍金城金城在丹楊江乘蒲洲上帝親被甲徇師於郊外被皮義翻以甘卓為鎮南大將軍侍中都督荊梁二州諸軍事陶侃領江州刺史使各帥所統以躡敦後帥讀曰率下同敦至石頭欲攻劉隗杜弘言於敦曰劉隗死士衆多未易可克易以豉翻不如攻石頭周札少恩少詩沼翻兵不為用攻之必敗札敗則隗自走矣敦從之以弘為前鋒攻石頭札果開門納弘敦據石頭歎曰吾不復得為盛德事矣敦無君之心形於言也復扶又翻何為其然也但使自今以往日忘日去耳言日復一日浸忘前事則君臣猜嫌之迹亦日去耳帝命刁協劉隗戴淵帥衆攻石頭王導周顗郭逸虞潭等三道出戰協等兵皆大敗太子紹聞之欲自帥將士決戰升車將出中庶子溫嶠執鞚諫曰鞚苦貢翻殿下國之儲副柰何以身輕天下抽劍斬鞅乃止敦擁兵不朝朝直遙翻下同放士卒劫掠宮省奔散惟安東將軍劉超按兵直衞及侍中二人侍帝側帝脫戎衣著朝服著陟略翻顧而言曰欲得我處當早言何至害民如此又遣使謂敦曰使疏吏翻公若不忘本朝於此息兵則天下尚可共安如其不然朕當歸琅邪以避賢路刁協劉隗既敗俱入宮見帝於太極東除除殿陛也流涕嗚咽勸令避禍協曰臣當守死不敢有貳帝曰今事逼矣安可不行乃令給協隗人馬使自為計協老不堪騎乘素無恩紀募從者皆委之行至江乘為人所殺送首於敦隗奔後趙官至太子太傅而卒成帝咸和八年劉隗從石虎戰死於潼關豈即此劉隗邪帝令公卿百官詣石頭見敦敦謂戴淵曰前日之戰有餘力乎淵曰豈攻有餘但力不足耳敦曰吾今此舉天下以為何如淵曰見形者謂之逆體誠者謂之忠敦笑曰卿可謂能言又謂周顗曰伯仁卿負我愍帝建興元年顗為杜弢所困投敦於豫章故敦以為德公戎車犯順下官親帥六軍帥讀曰率不能其事使王旅奔敗以此負公辛未大赦以敦為丞相都督中外諸軍錄尚書事江州牧封武昌郡公並讓不受初西都覆沒四方皆勸進於帝見九十卷建武元年忌帝年長難制長知兩翻欲更議所立王導不從及敦克建康謂導曰不用吾言幾至覆族幾居希翻敦以太子有勇略為朝野所嚮朝直遙翻欲誣以不孝而廢之大會百官問溫嶠曰皇太子以何德稱聲色俱厲嶠曰鉤深致遠蓋非淺局所量量音良以禮觀之可謂孝矣言太子既有鉤深致遠之才而又盡事親之禮所以解敦不孝之誣也敦謀遂沮沮在呂翻帝召周顗於廣室廣室殿名近日大事二宮無恙諸人平安大將軍固副所望邪恙余亮翻顗曰二宮自如明詔臣等尚未可知護軍長史郝嘏等勸顗避敦顗代戴淵為護軍將軍以郝嘏為長史吾備位大臣朝廷喪敗寧可復草間求活外投胡越邪喪息浪翻復扶又翻敦參軍呂猗嘗為臺郎晉謂尚書郎為臺郎戴淵為尚書惡之惡烏路翻猗說敦曰周顗戴淵皆有高名足以惑衆近者之言曾無怍色謂二人答敦之言怍才各翻恐必有再舉之憂敦素忌二人之才心頗然之從容問王導曰周戴南北之望周顗汝南人戴淵廣陵人晉氏南渡二人名冠當時從千容翻導不答又曰若不三司止應令僕邪三司太尉司徒司空也令僕尚書令及左右僕射也敦曰若不爾正當誅爾又不答丙子敦遣部將陳郡鄧岳收顗及淵將即亮翻先是敦謂謝鯤曰先悉薦翻吾當以周伯仁為尚書令戴若思為僕射戴淵字若思又問鯤近來人情何如鯤曰明公之舉雖欲大存社稷然悠悠之言實未達高義言衆人議敦舉兵向闕非義舉也則㣥情帖然矣敦怒曰君粗疏邪二子不相當吾已收之矣鯤愕然自失參軍王嶠曰濟濟多士文王以寧詩大雅文王之詩濟子禮翻敦大怒欲斬嶠衆莫敢言鯤曰明公舉大事不戮一人嶠以獻替忤旨便以釁鼓君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以替其否釁鼓殺人以血塗鼓也忤五故翻敦乃釋之黜為領軍長史大將軍府參軍黜為領軍長史足知敦府重於諸府矣渾之族孫也顗被收路經太廟大言曰賊臣王敦傾覆社稷枉殺忠臣神祇有靈當速殺之被皮義翻祇翹移翻收人以戟傷其口血流至踵容止自若觀者皆為流涕為于偽翻下同幷戴淵殺之於石頭南門之外帝使侍中王彬勞敦勞力到翻彬素與顗善先往哭顗然後見敦敦怪其容慘問之彬曰向哭伯仁情不能已敦怒曰伯仁自致刑戮且凡人遇汝以王彬之為人顗以凡人遇之亦可以見其風裁矣彬曰伯仁長者兄之親友在朝雖無謇愕愕當作諤朝直遙翻而赦後加之極刑所以傷惋也惋烏貫翻據元帝紀四月敦入石頭辛未大赦因勃然數敦曰數所具翻兄抗旌犯順殺戮忠良圖為不軌禍及門戶矣辭氣慷慨聲淚俱下敦大怒厲聲曰爾狂悖乃至此以吾為不能殺汝邪時王導在坐為之懼悖蒲內翻又蒲沒翻坐徂臥翻為于偽翻勸彬起謝彬曰腳痛不能拜且此復何謝復扶又翻下同敦曰腳痛孰若頸痛彬殊無懼容竟不肯拜王導後料檢中書故事料音聊乃見顗救己之表執之流涕曰吾雖不殺伯仁伯仁由我而死自愧於敦三問不答之時也負此良友沈充拔吳國殺內史張茂初王敦聞甘卓起兵大懼卓兄子卬為敦參軍敦使卬歸說卓曰說輸芮翻下同君此自是臣節不相責也吾家計急不得不爾想便旋軍襄陽當更結好好呼到翻卓雖慕忠義性多疑少決少詩沼翻軍于豬口水經沔水東南逕江夏雲杜縣東夏水從西來注之註云即月者口也月者與豬同軍稽留累旬不前敦既得建康乃遣臺使以騶虞幡駐卓軍諸方謂待諸方鎮同出軍也騶虞仁獸故以騶虞幡駐軍使疏吏翻流涕謂卬曰吾之所憂正為今日為于偽翻下同且使聖上元吉太子無恙恙余亮翻吾臨敦上流亦未也遽危社稷適吾徑據武昌敦勢逼必劫天子以絕四海之望不如還襄陽更思後圖即命旋軍都尉秦康與樂道融說卓曰今分兵斷彭澤彭澤縣屬豫章郡彭蠡湖自此入于大江分兵斷彭澤湖口可使敦上下不得相通斷丁管翻其衆自然離散可一戰擒也將軍起義兵而中止竊為將軍不取且將軍之下士卒各求其利欲求西還亦恐不可得也卓不從道融晝夜泣諫卓不聽道融憂憤而卒卓性本寬和忽更強塞此強謂強暴也塞謂窒塞而不疏通塞悉則翻意氣騷擾舉動失常識者知其將死矣王敦以西陽王羕為太宰羕余亮翻加王導尚書令王廙為荊州刺史改易百官及諸軍鎮轉徙黜免者以百數或朝行暮改惟意所欲敦將還武昌謝鯤言於敦曰公至都以來稱疾不朝是以雖建勳而人心實有未達今若朝天子朝直遙翻下同使君臣釋然則物情皆悅服矣敦曰君能保無變乎對曰鯤近日入覲主上側席遲得見公王者側席待賢鯤用此語也遲直二翻待也必無虞也穆然和敬之意鯤請侍從從才用翻敦勃然曰正復殺君等數百人亦復何損於時復扶又翻竟不朝而去夏四月敦還武昌初宜都內史天門周級吳孫晧永安六年分武陵立天門郡充縣有松梁山山有石石開處數十丈其高以弩仰射不至其上名天門因此名郡宋白曰澧州石門縣吳立天門郡隋罷郡為石門縣使其兄子該潛詣長沙申款於氶申明也款誠也氶遣該及從事邵陵周崎間出求救此非潁川之邵陵吳孫晧寶鼎元年分零陵北部都尉立邵陵郡崎丘奇翻間古莧翻乂使崎語城中稱大將軍已克建康甘卓還襄陽外援理絕言以事理觀之外援已絕也邏郎佐翻語牛倨翻既至城下大呼曰援兵尋至努力堅守乂殺之乂考該至死竟不言其故周級由是獲免乂等攻戰日逼敦又送所得臺中人書疏令乂射以示氶呼火故翻射而亦翻城中知朝廷不守莫不悵惋惋烏貫翻相持且百日劉翼戰死士卒死傷相枕枕職任翻癸巳乂拔長沙氶等皆被執乂將殺虞悝子弟對之號泣悝曰人生會當有死今闔門為忠義之鬼亦復何恨悝苦回翻號戶刀翻復扶又翻乂以檻車載氶及易雄送武昌佐吏皆奔散惟主簿桓雄西曹書佐韓階府諸曹各有書佐毀服為僮從氶不離左右毀服者毀其常服為僮奴之服離力智翻憚而殺之韓階武延執志愈固荊州刺史王廙承敦旨殺氶於道中廙羊至翻又逸職翻階延送氶喪至都葬之而去易雄至武昌意氣忼慨曾無懼容忼口黨翻敦遣人以檄示雄而數之雄曰此實有之惜雄位微力弱不能救國難耳難乃旦翻今日之死固所願也敦憚其辭正釋之遣就舍衆人皆賀之雄笑曰吾安得生既而敦遣人潛殺之魏乂求鄧騫甚急鄉人皆為之懼為于偽翻騫笑曰此欲用我耳彼新得州多殺忠良故求我以厭人望也厭益涉翻乃往詣乂乂喜曰君古之解揚也左傳楚子圍宋晉使解揚如宋使無降楚鄭人囚而獻諸楚楚子厚賂之使反其言不許三而許之登諸樓車使呼宋人而告之遂致其君命楚子將殺之使與之言曰爾既許不穀而反之何故速即爾刑對曰受命而出有死無霣又可賂乎臣之許君以成命也死而成命臣之祿也楚子舍之以歸解戶買翻詔以陶侃領湘州刺史王敦上侃復還廣州加散騎常侍上時掌翻永昌元年甲午前趙羊后卒諡曰獻文永昌元年甘卓家人皆勸卓備王敦卓不從悉散兵佃作佃停年翻聞諫輒怒襄陽太守周慮密承敦意詐言湖中多魚勸卓遣左右悉出捕魚五月乙亥慮引兵襲卓於寢室殺之傳首於敦幷殺其諸子敦以從事中郎周撫督沔北諸軍事代卓鎮沔中自南鄭至襄陽沔水所由也故謂之沔中訪之子也敦既得志暴慢滋甚四方貢獻多入其府將相岳牧皆出其門舜有四岳十二牧故後之居方面者謂之岳牧唯二人之言是從所譖無不死者以諸葛瑤鄧岳周撫李恆謝雍為爪牙恆戶登翻充等並凶險驕恣大起營府侵入田宅剽掠市道剽匹妙翻識者咸知其將敗焉永昌元年秋七月後趙中山公虎拔泰山執徐龕送襄國龕苦含翻後趙王勒盛之以囊於百尺樓上撲殺之盛時征翻楊正衡曰撲弼角翻命王伏都等妻子刳而食之龕殺王伏都見上卷大興三年降戶江翻永昌元年兗州刺史郗鑒在鄒山三年有衆數萬愍帝建興元年帝以鑒鎮鄒山今既數年矣所謂三年有衆數萬者言鑒既鎮鄒山之後三年之間民歸之者有此數也郗丑之翻百姓饑饉掘野鼠蟄燕而食之燕經秋而蟄退屯合肥尚書右僕射紀瞻以鑒雅望清德宜從容臺閣從千容翻上疏請徵之乃徵拜尚書徐兗間諸塢多降於後趙降戶江翻後趙置守宰以撫之永昌元年王敦自領寧益二州都督非君命故史以自領書之冬十月己丑荊州刺史武陵康侯王廙卒王敦以下邳內史王邃都督青徐幽平四州諸軍事鎮淮陰衞將軍王含都督沔南諸軍事領荊州刺史武昌太守丹楊王諒為交州刺史考異曰諒傳永興三年敦以諒為交州按永興三年即惠帝光熙元年也諒傳誤殺之吳孫晧建衡三年分交趾立新興郡武帝太康三年更名新昌郡斬之誘音酉碩舉兵圍諒於龍編龍編縣屬交趾郡州郡皆治焉永昌元年祖逖既卒後趙屢寇河南拔襄城城父城父縣前漢屬沛郡後漢屬汝南郡魏晉屬譙國此河南概言黃河之南非專指河南郡也父音甫豫州刺史祖約不能禦退屯壽春後趙遂取陳留梁鄭之間復騷然矣復扶又翻永昌元年十一月以臨潁元公荀組為太尉辛酉薨永昌元年罷司徒幷丞相府王敦以司徒官屬為留府敦還武昌遙制朝政故有留府在建康永昌元年帝憂憤成疾閏月己丑崩年四十七帝恭儉有餘而明斷不足斷丁亂翻故大業未復而禍亂內興庚寅太子即皇帝位大赦尊所生母荀氏為建安君永昌元年十二月趙主曜葬其父母於粟邑大赦陵下周二里上高百尺高居傲翻計用六萬夫作之百日乃成役者夜作繼以脂燭民甚苦之游子遠諫不聽後趙濮陽景侯張賓卒濮博木翻後趙王勒哭之慟曰天不欲成吾事邪何奪吾右侯之早也程遐代為右長史遐世子弘之舅也勒每與遐議有所不合輒歎曰右侯捨我去乃令我與此輩共事豈非酷乎酷慘也虐也言天奪張賓之年何其虐我之慘也永昌元年張茂使將軍韓璞帥衆取隴西南安之地置秦州南陽王保既死陳安不能有茂遂取之帥讀曰率永昌元年慕容廆遣其世子皝襲段末柸入令支皝戶廣翻令支縣漢屬遼西郡晉省段氏據其地應劭曰令音鈴師古音郎定翻支裴松之音其兒翻掠其居民千餘家而還肅宗明皇帝上諱紹字道畿元帝長子也諡法思慮果遠曰明太寧元年癸未三二三永昌元年春正月成李驤任回寇臺登臺登縣屬越巂郡九州要記曰臺登縣有奴諾川鸚鵡山黑水之間若水出其下黃帝子昌意降居若水即此越巂太守李釗漢嘉太守王載漢嘉本前漢青衣縣屬蜀郡後漢順帝陽嘉二年更名漢嘉蜀分為漢嘉郡釗音昭降戶江翻永昌元年二月庚戌葬元帝于建平陵永昌元年三月戊寅朔改元永昌元年饒安東光安陵三縣災三縣皆屬渤海郡惟東光漢舊縣饒安縣前漢之千童縣也後漢靈帝改曰饒安安陵縣晉置時皆為後趙之地死者萬五千人永昌元年後趙寇彭城下邳徐州刺史卞敦與征北將軍王邃退保盱眙盱眙音吁怡敦壼之從父兄也壼苦本翻從才用翻永昌元年王敦謀篡位諷朝廷徵己帝手詔徵之夏四月加敦黃鉞班劍劉良文選註曰班劍謂執劍而從行者也呂向曰班列也言使勇士行列持劍以為儀仗也李周翰曰班劍木劍無刃假作劍形畫之以文故曰班也晉志文武官公給虎賁二十人持班劍入朝不趨劍履上殿朝直遙翻上時掌翻敦移鎮姑孰屯于湖姑孰前漢丹楊春穀縣地今太平州當塗縣即姑孰之地縣南三里有姑孰溪西入大江于湖縣本吳督農校尉治武帝太康二年分丹楊縣立于湖縣杜佑曰宣州當塗縣城即晉姑孰城于湖故城在縣南張舜民曰今太平州跨姑孰溪陸游曰姑孰城在當塗北今州城正據姑孰溪溪東南數峯如黛蓋青山也自姑孰溪行夾中三十里至大信口出口泝江過大小褐山磯又過蟂磯蕪湖即于湖並大江有王敦城氣象宏敞並步浪翻考異曰晉春秋及後魏書僭晉傳云屯蕪湖晉書明帝紀云下屯于湖今從之敦自領揚州牧敦欲為逆王彬諫之甚苦敦變色目左右將收之彬正色曰君昔歲殺兄今又殺弟邪晉書王彬傳以為彬從兄稜為敦所害故云然余據殺稜者王如雖出於敦之意猶假手於如也且稜於敦為從弟此言殺兄蓋以敦殺王澄也事見八十卷懷帝永嘉六年以彬為豫章太守永昌元年後趙王勒遣使結好於慕容廆廆執送建康好呼到翻永昌元年成李驤等進攻寧州刺史褒中壯公王遜使將軍姚嶽等拒之戰於螗蜋據水經註螗蜋即堂狼縣也前漢屬犍為郡後漢省郡國志犍為屬國朱提縣有堂狼山山多毒草盛夏之月飛鳥過之不能得去蜀置朱提郡堂狼縣屬焉嶽追至瀘水成兵爭濟溺死者千餘人嶽以道遠不敢濟而還溺奴狄翻還從宣翻又如字遜以嶽不窮追大怒鞭之怒甚冠裂而卒遜在州十四年懷帝永嘉四年遜至寧州至是適十四年州人立其子堅行州府事州寧州府南夷校尉府也永昌元年廣州刺史陶侃遣兵救交州未至梁碩拔龍編奪刺史王諒節諒不與碩斷其右臂諒曰死且不避斷臂何為嚴為改有斷丁管翻踰旬而卒永昌元年六月壬子立庾氏為皇后以后兄中領軍亮為中書監永昌元年梁碩據交州凶暴失衆心陶侃遣參軍高寶攻碩斬之詔以侃領交州刺史進號征南大將軍開府儀同三司未幾吏部郎阮放求為交州刺史許之幾居豈翻放行至寧浦廣州記曰漢獻帝建安二十三年吳分鬱林郡立寧浦郡晉太康地志曰武帝太康七年改合浦屬國都尉立寧浦郡唐為橫州寧浦縣浦滂五翻為寶設饌為于偽翻饌雛睆翻又雛戀翻伏兵殺之寶兵擊放放走得免至州少時病卒少詩沼翻考異曰放傳云成帝幼沖庾氏執政放求為交州下乃云逢高寶平梁碩還非成帝時也放傳誤放咸之族子也阮咸有名於魏晉之間永昌元年陳安圍趙征西將軍劉貢于南安休屠王石武自桑城引兵趣上邽以救之屠直於翻趣七喻翻與貢合擊安大破之安收餘騎八千走保隴城騎奇寄翻秋七月趙主曜自將圍隴城別遣兵圍上邽安頻出戰輒敗右軍將軍劉幹攻平襄克之平襄縣漢屬天水郡晉屬略陽郡降戶江翻下同安留其將楊伯支姜沖兒守隴城自帥精騎突圍出奔陝中陝中在隴城南陝與陿同戶夾翻安左揮七尺大刀右運丈八蛇矛近則刀矛俱發輒殪五六人殪壹計翻遠則左右馳射而走先亦勇捷如飛與安搏戰三交遂奪其蛇矛三交戰三合也安棄馬與左右匿於山中趙兵索之不知所在索山客翻明日安遣其將石容覘趙兵將即亮翻覘丑廉翻又丑豔翻趙輔威將軍呼延青人獲之拷問安所在拷苦皓翻掠也擊也容卒不肯言卒子恤翻青人殺之雨霽青人尋其迹獲安於澗曲斬之安善撫將士與同甘苦及死隴上人思之為作壯士之歌歌曰隴上壯士有陳安軀幹雖小腹中寬愛養將士同心肝䯀驄交馬鐵瑕鞍七尺大刀奮如湍丈八蛇矛左右盤十盪十決無當前戰始三交失蛇矛棄我䯀驄竄巖幽為我外援而懸頭西流之水東流河一去不還柰子何為于偽翻以隴城降別將宋亭斬趙募以上邽降曜徙秦州大姓楊姜諸族二千餘戶于長安氐羌皆送任請降任質任也封平襄公酋慈由翻永昌元年帝畏王敦之逼欲以郗鑒為外援郗丑之翻拜鑒兗州刺史都督揚州江西諸軍事鎮合肥王敦忌之表鑒為尚書令八月詔徵鑒還道經姑孰敦與之論西朝人士曰樂彥輔短才耳考其實豈勝滿武秋邪時江東謂洛都為西朝樂廣字彥輔滿奮字武秋朝直遙翻彥輔道韻平淡愍懷之廢柔而能正武秋失節之士安得擬之事見八十三卷惠帝永康元年滿奮既收東宮官屬之辭太子者趙王倫之篡奮又奉璽綬故謂之失節當是時危機交急鑒曰丈夫當死生以之敦惡其言不復相見惡烏路翻復扶又翻久留不遣敦黨皆勸郭殺之郭不從鑒還臺遂與帝謀討敦永昌元年後趙中山公虎帥步騎四萬擊安東將軍曹嶷帥讀曰率嶷魚力翻青州郡縣多降之遂圍廣固水經註廣固城在漢齊郡廣縣西北四里四周絕澗阻水深隍曹嶷所築也九域志廣固城古樂安城今按青州益都縣西四十里有廣固城杜佑曰有大澗甚廣因曰廣固降戶江翻送襄國殺之阬其衆三萬虎欲盡殺嶷衆青州刺史劉徵曰今留徵使牧民也無民焉牧焉於虔翻徵將歸耳虎乃留男女七百口配徵使鎮廣固永昌元年趙主曜自隴上西擊涼州遣其將劉咸攻韓璞於冀城呼延晏攻寧羌護軍陰鑒於桑壁桑壁當在南安界將即亮翻列營百餘里金鼓之聲動地河水為沸張茂臨河諸戍皆望風奔潰曜揚聲欲百道俱濟直抵姑臧涼州大震參軍馬岌勸茂親出拒戰長史氾褘怒請斬之岌曰氾公糟粕書生刺舉小才莊子曰桓公讀書於堂上輪扁斲輪於堂下問桓公曰敢問公所讀者何言也公曰聖人之書也曰聖人在乎曰已死矣曰然則君之所讀者古人之糟粕已矣古之人與其不可傳者死矣陸德明曰糟音曹李云酒滓也粕普各翻糟爛為粕刺者以直傷人舉者招人之過氾音凡不思家國大計明公父子欲為朝廷誅劉曜有年矣為于偽翻下為明同今曜自至遠近之情共觀明公此舉當立信勇之驗以副秦隴之望力雖不敵勢不可以不出茂曰善乃出屯石頭石頭在姑臧城東劉曜舉三秦之衆乘勝席卷而來言新破陳安乘勝而來也卷讀曰捲珍曰曜兵雖多精卒至少少詩沼翻大抵皆氐羌烏合之衆恩信未洽且有山東之虞謂方與石勒相圖也曠日持久與我爭河西之地邪若二旬不退珍請得弊卒數千為明公擒之為于偽翻茂喜使珍將兵救韓璞趙諸將爭欲濟河趙主曜曰吾軍勢雖盛然畏威而來者三分有二中軍疲困其實難用果如陳珍所料以吾威聲震之若出中旬張茂之表不至者吾為負卿矣茂尋遣使稱藩獻馬牛羊珍寶不可勝紀使疏吏翻勝音升曜拜茂侍中都督涼南北秦梁益巴漢隴右西域雜夷匈奴諸軍事太師涼州牧封涼王加九錫永昌元年楊難敵聞陳安死大懼與弟堅頭南奔漢中趙鎮西將軍劉厚追擊之大獲而還趙主曜以大鴻臚田崧為鎮南大將軍益州刺史鎮仇池難敵送任請降於成降戶江翻成安北將軍李稚受難敵賂不送難敵於成都趙兵退即遣歸武都難敵遂據險不服稚自悔失計亟請討之亟欺冀翻亟請數以為請也雄遣稚兄侍中中領軍琀與稚出白水征東將軍李壽及琀弟玝出陰平以擊難敵楊正衡曰琀胡紺翻玝音午㣥臣諫不聽難敵遣兵拒之壽玝不得進而琀稚長驅至下辨辨步莧翻難敵遣兵斷其歸路四面攻之斷丁管翻琀稚深入無繼皆為難敵所殺死者數千人琀蕩之長子長知兩翻下同有才望雄欲以為嗣聞其死不食者數日永昌元年初趙主曜長子儉次子胤胤年十歲長七尺五寸長子之長知兩翻下同長七之長直亮翻漢主聰奇之謂曜曰此兒神氣非義真之比也儉字義真曜曰藩國之嗣能守祭祀足矣不敢亂長幼之序聰曰卿之勳德當世受專征之任言當世為方伯得專征伐也吾當更以一國封義真乃封儉為臨海王立胤為世子既長多力善射驍捷如風驍堅堯翻靳準之亂事見九十卷大興元年黑匿郁鞠既歸胤曜嘉其忠款封為左賢王則亦匈奴之種也胤自言於郁鞠郁鞠大驚禮而歸之曜悲喜謂㣥臣曰義光雖已為太子然沖幼儒謹恐不堪今之多難義孫故世子也曜太子熙字義光胤字義孫難乃旦翻且涉歷艱難吾欲法周文王漢光武以固社稷而安義光何如周文王舍伯邑考而立武王漢光武舍長子彊而立明帝陛下為國家無窮之計豈惟臣等賴之實宗廟四海之慶左光祿大夫卜泰太子太保韓廣進曰陛下以廢立為是不應更問㣥臣若以為疑固樂聞異同之言樂音洛臣竊以為廢太子非也昔文王定嗣於未立之前則可也光武以母失恩而廢其子豈足為聖朝之法朝直遙翻曏以東海為嗣未必不如明帝也胤文武才略誠高絕於世然太子孝友仁慈亦足為承平賢主況東宮者民神所繫豈可輕動陛下誠欲如是臣等有死而已不敢奉詔曜默然胤進曰父之於子當愛之如一今黜熙而立臣臣何敢自安陛下苟以臣為頗堪驅策豈不能輔熙以承聖業乎必若以臣代熙臣請效死於此不敢聞命因歔欷流涕歔音虛欷許既翻又音希曜亦以熙羊后所生不忍廢也乃追諡前卜氏為元悼皇后泰即胤之舅也曜嘉其公忠以為上光祿大夫儀同三司領太子太傅封胤為永安王拜侍中衞大將軍都督二宮禁衞諸軍事開府儀同三司錄尚書事二宮曜宮及熙宮也不以儲嗣使熙廢兄弟之庸敬永昌元年張茂大城姑臧修靈鈞臺元帝大興四年茂築靈鈞臺以閻曾諫而止今復修之明公所以修城築臺者蓋懲既往之患耳謂懲劉曜來攻也雖處層臺處昌呂翻亦無所益適足以疑㣥下忠信之志失士民繫託之望示怯弱之形啟鄰敵之謀將何以佐天子霸諸侯乎願亟罷茲役以息勞費茂曰亡兄一旦失身於物茂兄寔為其下所殺事見上卷大興三年顧禍生不意雖有智勇無所施耳王公設險勇夫重閉古之道也易曰王公設險以守其國左傳曰勇夫重閉而況國乎重直龍翻不可以太平之理責人於屯邅之世也屯株倫翻難也邅張連翻行不進貌卒為之卒子恤翻永昌元年王敦從子允之方總角毛萇曰總角聚兩髦也從才用翻常以自隨敦常夜飲允之辭醉先臥敦與錢鳳謀為逆允之悉聞其言即於臥處大吐吐土故翻下同衣面並汚汚烏故翻鳳出敦果照視見允之臥於吐中不復疑之會其父舒拜廷尉允之求歸省父復扶又翻省悉景翻悉以敦鳳之謀白舒舒與王導俱啟帝陰為之備敦欲強其宗族陵弱帝室冬十一月徙王含為征東將軍都督揚州江西諸軍事王舒為荊州刺史監荊州沔南諸軍事監工銜翻王彬為江州刺史永昌元年後趙王勒以參軍樊坦為章武內史章武縣漢屬勃海郡武帝泰始元年分置章武國隋廢章武幷入河間郡唐為瀛州問之坦率然對曰頃為羯賊所掠資財蕩盡勒笑曰羯賊乃爾無道邪羯居謁翻今當相償坦大懼叩頭泣謝勒賜車馬衣服裝錢三百萬而遣之永昌元年是歲越巂斯叟攻成將任回前漢西南夷傳云自巂以東北君長以十數徙筰都最大師古曰徙及筰都二國也巂音髓徙音斯此斯即漢之斯種也蜀謂之叟將即亮翻任音壬費扶沸翻永昌元年會稽內史周札一門五侯札封東遷縣侯兄靖子懋清流亭侯懋弟贊武康縣侯贊弟縉都鄉侯兄王巳子勰烏程縣侯凡五候會工外翻吳士莫與為比王敦忌之敦有疾錢鳳勸敦早除周氏敦然之周嵩以兄顗之死事見元帝永昌元年顗魚豈翻敦無子養王含子應為嗣嵩嘗於衆中言應不宜統兵敦惡之惡烏路翻嵩與札兄子莚皆為敦從事中郎會道士李脫以妖術惑衆士民頗信事之妖於驕翻何茲全標點王崇武聶崇岐覆校
