body:
  text: 資治通鑑卷第一百四端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫集賢殿修撰權判西京留司御史臺上柱國河內郡開國侯食邑一千三百戶食實封四百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註晉紀二十六烈宗孝武皇帝上之中太元元年丙子三七六春正月壬寅朔帝加元服皇太后下詔歸政太后攝政見上卷上年甲辰大赦改元丙午帝始臨朝朝直遙翻以會稽內史郗愔為鎮軍大將軍都督浙江東五郡諸軍事浙江東五郡會稽東陽臨海永嘉新安也會工外翻郗丑之翻愔挹淫翻豫州之歷陽淮南廬江安豐襄城及江州之尋陽共六郡騎奇寄翻謝安欲以王蘊為方伯故先解沖徐州乙卯加謝安中書監錄尚書事二月辛卯秦王堅下詔曰朕聞王者勞於求賢逸於得士齊桓公用管仲之言往得丞相常謂帝王易為易以豉翻自丞相違世鬚髮中白丞相謂王猛中半也中丁仲翻不覺酸慟今天下既無丞相或政教淪替替廢也問民疾苦三月秦兵寇南鄉拔之山蠻三萬戶降秦自春秋之時伊洛以南巴巫漢沔以北大山長谷皆蠻居之文公十六年庸人率㣥蠻以叛楚庸則漢之上庸縣也哀公四年楚人襲梁及霍以圍蠻氏執蠻子赤梁則漢河南之梁縣霍則梁縣南之霍陽山也漢高帝用巴渝蠻以定三秦則板楯蠻也後漢祭遵攻新城蠻柏華蠻破霍陽聚則春秋蠻氏之聚落也其後又有巫蠻南郡蠻江夏蠻襄陽以西中廬宜城之西山皆蠻居之所謂山蠻也宋齊以後謂之雍州蠻降戶江翻夏五月甲寅大赦初張天錫之殺張邕也劉肅及安定梁景皆有功事見一百一卷穆帝升平五年賜姓張氏以為己子使預政事天錫荒于酒色不親庶務黜世子大懷而立嬖妾章十二行本妾下有焦氏二字乙十一行本同張校同之子大豫嬖卑義翻又博計翻以焦氏為左夫人人情憤怨從弟從事中郎憲輿櫬切諫不聽從才用翻櫬初覲翻秦王堅下詔曰張天錫雖稱藩受位然臣道未純可遣使持節武衞將軍苟萇左將軍章十二行本軍下有武都二字乙十一行本同退齋校同毛盛中書令梁熙步兵校尉姚萇等將兵臨西河河水過敦煌酒泉張掖郡南武威郡東北為西河使疏吏翻萇仲良翻將即亮翻朝直遙翻若有違王命即進師撲討撲普卜翻是時秦步騎十三萬軍司段鏗謂周虓曰以此衆戰誰能敵之用左傳齊桓公之言鏗丘耕翻虓虛交翻戎狄以來未之有也周虓拘執於秦其尊本朝之心雖造次不忘也考異曰虓傳曰呂光征西域堅出餞之戎士二十萬旌旗數百里問虓曰朕衆力何如虓曰戎夷以來未之有也按建元十八年二月虓謀反徙朔方十九年正月呂光發長安故知在伐涼州時今從十六國春秋帥讀曰率秋七月閻負梁殊至姑臧張天錫會官屬謀之曰今入朝必不返如其不從秦兵必至將若之何禁中錄事席仂曰禁中錄事張氏所置使總錄禁中事也仂與力同又音勒以愛子為質質音致賂以重寶以退其師然後徐為之計此屈伸之術也衆皆怒曰吾世事晉朝朝直遙翻忠節著於海內今一旦委身賊庭辱及祖宗醜莫大焉且河西天險百年無虞若悉境內精兵右招西域北引匈奴以拒之何遽知其不捷也天錫攘袂大言曰孤計決矣言降者斬降戶江翻下同使謂閻負梁殊曰君欲生歸乎死歸乎殊等辭氣不屈天錫怒縛之軍門命軍士交射之曰射而不中射而亦翻中竹仲翻不與我同心者也其母嚴氏泣曰秦主以一州之地橫制天下東平鮮卑南取巴蜀兵不留行汝章十二行本汝上有所向無敵四字乙十一行本同退齋校同張校同云無註本亦脫若降之猶可延數年之命今以蕞爾一隅抗衡大國蕞徂外翻又殺其使者亡無日矣天錫使龍驤將軍馬建帥衆二萬拒秦驤思將翻帥讀曰率秦人聞天錫殺閻負梁殊八月梁熙姚萇王統李辯濟自清石津攻涼驍烈將軍梁濟於河會城降之驍烈將軍蓋張氏置五代志允吾縣有青巖山水經註湟河至允吾與大河會意者清石津在青巖山之下河會城在二河之會歟驍堅堯翻甲申苟萇濟自石城津闞駰曰石城津在金城西北拔之馬建懼自楊非退屯清塞水經註逆水出允吾縣之參街谷東南流逕街亭城南又東南逕陽非亭北又東南逕廣武城西據載記楊非在支陽東北三百餘里洪池嶺名在姑臧南掌據晉書作常據當從之軍于金昌城金昌城在赤岸西北敦徒門翻臣晝察人事夜觀天文秦兵不可敵也不如降之天錫怒貶皓為宣威護軍廣武太守辛章曰張寔分金城之令居枝陽置廣武郡宋白曰蘭州廣武縣本漢枝陽縣地張駿分晉興置廣武郡馬建出於行陳行戶剛翻陳讀曰陣必不為國家用苟萇使姚萇帥甲士三千為前驅庚寅馬建帥萬人迎降餘兵皆散走辛卯苟萇及掌據戰于洪池據兵敗馬為亂兵所殺其屬董儒授之以馬據曰吾三督諸軍再秉節鉞八將禁旅十總禁章十二行本禁作外乙十一行本同孔本同兵寵任極矣天錫之攻李儼也常據首破其兵蓋河西推為良將故其言如此卒子恤翻此吾之死地也尚安之乎乃就帳免冑西向稽首伏劍而死稽音啟秦兵殺軍司席仂癸巳秦兵入清塞天錫遣司兵趙充哲帥衆拒之河西張氏置官僚擬於王者而微異其名司兵蓋晉五兵尚書之職也大破之水經註河水自左南而東逕赤岸北亦謂之河夾岸秦州記曰枹罕有河夾岸充哲死天錫出城自戰城內又叛天錫與數千騎奔還姑臧甲午秦兵至姑臧天錫素車白馬面縛輿櫬降于軍門苟萇釋縛焚櫬送于長安惠帝永寧元年張軌為涼州剌史遂有涼土共九主七十五年而亡櫬初覲翻九月秦王堅以梁熙為涼州刺史鎮姑臧徙豪右七千餘戶于關中餘皆按堵如故封天錫為歸義侯拜北部尚書秦置北部尚書以掌北蕃秦兵之出也先為天錫築第於長安為于偽翻至則居之以天錫晉興太守隴西彭和正為黃門侍郎張軌分西平界置晉興郡張軌以秦雍移人於姑臧西北置武興郡敦徒門翻西平太守金城趙凝為金城太守高昌楊幹為高昌太守高昌漢車師之高昌壁也張氏始置郡後為高昌國唐以其地置西州梁熙清儉愛民河右安之為梁熙為呂光所殺張本索昔各翻宋皓為主簿西平郭護起兵攻秦熙以皓為折衞將軍討平之桓沖聞秦攻涼州遣兗州刺史朱序江州刺史桓石秀與荊州督護桓羆遊軍沔漢為涼州聲援沔彌兗翻又遣豫州刺史桓伊帥衆向壽陽帥讀曰率下同淮南太守劉波汎舟淮泗欲橈秦以救涼橈奴教翻聞涼州敗沒皆罷兵初哀帝減田租畝收二升見一百一卷隆和元年乙巳除度田收租之制度徒洛翻王公以下口稅米三斛蠲在役之身冬十月移淮北民於淮南畏秦也劉衞辰為代所逼求救於秦秦王堅以幽州刺史行唐公洛為北討大都督帥幽冀兵十萬擊代帥讀曰率使幷州刺史俱難鎮軍將軍鄧羌尚書趙遷李柔前將軍朱肜前禁將軍張蚝蚝七吏翻右禁將軍郭慶帥步騎二十萬東出和龍西出上郡皆與洛會以衞辰為鄉導洛菁之弟也秦主健之入關菁有功焉健之垂沒也菁以逆誅鄉讀曰嚮苟萇之伐涼州也遣揚武將軍馬暉建武將軍杜周帥八千騎西出恩宿邀張天錫走路期會姑臧暉等行澤中值水失期於法應斬有司奏徵下獄下遐稼翻秦王堅曰水春冬耗竭秋夏盛漲此乃苟萇量事失宜量音良非暉等罪今天下方有事宜宥過責功命暉等回赴北軍擊索虜以自贖代本鮮卑索頭種故謂之索虜索昔各翻非所以應速將即亮翻下同堅曰暉等喜於免死不可以常事疑也暉等果倍道疾驅遂及東軍暉等自西方回故謂伐代之軍為東軍十一月己巳朔日有食之代王什翼犍使白部獨孤部南禦秦兵皆不勝鮮卑有白部後漢時鮮卑居白山者最為強盛後因曰白部令狐德棻曰魏氏之初三十六部其先伏留屯者與魏俱起為部落大人遂為獨孤部犍居言翻庫仁者衞辰之族什翼犍之甥也與秦兵戰於石子嶺石子嶺當雲中盛樂西南新唐書曰自夏州北渡烏水一百二十里至可朱渾水源又百餘里至石子嶺什翼犍病不能自將乃帥諸部奔陰山之北高車雜種盡叛李延壽曰高車蓋赤狄之餘種也北方以為高車丁零或云其先匈奴甥也其遷徙隨水草衣皮食肉牛羊畜產並與柔然同唯車輪高大輻數至多因以為號種章勇翻鈔楚交翻不得芻牧什翼犍復渡漠南復扶又翻聞秦兵稍退十二月什翼犍還雲中初什翼犍分國之半以授弟孤事見九十六卷成帝咸康四年子斤失職怨望不復得國之半故自以為失職而怨卒子恤翻寔卒見上卷簡文帝咸安元年慕容之子閼婆壽鳩紇根地干力真窟咄皆長閼於葛翻紇下沒翻窟苦骨翻咄當沒翻長知兩翻下同慕容燕女也什翼犍娶燕女為見九十七卷康帝建元二年繼嗣未定時秦兵尚在君子津水經河水南入雲中楨陵縣西北又南過赤城東又南過定襄桐過縣西河水於二縣之間濟有君子之名酈道元註曰昔漢桓帝西幸榆中東行代地洛陽大賈賫金貨隨帝後行夜迷失道往投津長曰子封送之渡河賈人卒死津長埋之其子尋求父喪發冢舉尸資貨一無所損其子悉以金與之津長不受事聞於帝曰君子也即名其津為君子濟在雲中城西南二百餘里斤因說什翼犍之庶長子寔君曰說輸芮翻王將立慕容之子欲先殺汝故頃來諸子每夜戎服以兵遶廬帳北狄之長居大氈帳環設兵衞氈帳漢人謂之穹廬因曰廬帳伺相吏翻寔君信之遂殺諸弟幷弒什翼犍是夜諸子婦及部人奔告秦軍秦李柔張蚝勒兵趨雲中趨七喻翻部衆逃潰國中大亂珪母賀氏以珪走依賀訥訥野干之子也賀野干見上卷簡文帝咸安元年秦王堅召代長史燕鳳問其所以亂故鳳具以狀對堅曰天下之惡一也左傳載石祁子之言至長安車裂之堅欲遷珪於長安鳳固請曰代王初亡㣥下叛散遺孫沖幼莫相統攝其別部大人劉庫仁勇而有智鐵弗衞辰狡猾多變劉衞辰本匈奴鐵弗種李延壽曰鐵弗南單于苗裔衞辰者左賢王去卑之玄孫北人謂胡因以為姓皆不可獨任宜分諸部為二令此兩人統之兩人素有深讎其勢莫敢先發俟其孫稍長引而立之是陛下有存亡繼絕之德於代使其子子孫孫永為不侵不叛之臣用左傳戎子駒支之言堅從之分代民為二部自河以東屬庫仁自河以西屬衞辰各拜官爵使統其衆賀氏以珪歸獨孤部與南部大人長孫嵩拓跋鬱律生二子長曰沙莫雄次曰什翼犍沙莫雄為南部大人後改名仁號為拔拔氏生嵩道武以嵩宗室之長改為長孫氏此言長孫所出與前註略不同行唐公洛以什翼犍子窟咄年長長知兩翻遷之長安堅使窟咄入太學讀書下詔曰張天錫承祖父之資藉百年之業亶命河右叛換偏隅鄭康成曰叛換猶跋扈也韓詩曰叛換武強也中分區域東賓穢貊穢當作濊控弦百萬虎視雲中爰命兩師兩師謂苟萇伐河西之師行唐公洛伐代之師也黠下八翻役不淹歲窮殄二兇俘降百萬降戶江翻闢土九千五帝之所未賓周漢之所未至莫不重譯來王重直龍翻懷風率職有司可速班功受爵杜預曰班次也受當作授復方目翻賜爵三級於是加行唐公洛征西將軍以鄧羌為幷州刺史陽平國常侍慕容紹私謂其兄楷曰秦恃其強大務勝不休北戍雲中南守蜀漢轉運萬里道殣相望左傳之言詩云行有死人尚或殣之毛氏曰墐路冢也殣音覲說文曰道中死人人所覆也又餓殍為殣民困於內危亡近矣冠軍叔仁智度英拔必能恢復燕祚秦以慕容垂為冠軍將軍楷紹之叔父也叔仁當作叔父冠古玩翻史言鮮卑窺秦有乘釁報復之志初秦人既克涼州議討西障氐羌西障西邊也彼種落雜居種章勇翻不相統壹不能為中國大患宜先撫諭徵其租稅若不從命然後討之乃使殿中將軍張旬前行宣慰庭中將軍魏曷飛帥騎二萬七千隨之庭中將軍秦所置蓋立仗殿庭中者也帥讀曰率騎奇寄翻縱兵擊之大掠而歸堅怒其違命鞭之二百斬前鋒督護儲安以謝氐羌氐羌大悅降附貢獻者八萬三千餘落降戶江翻雍州士族先因亂流寓河西者皆聽還本雍於用翻劉庫仁招撫離散恩信甚著奉事拓跋珪恩勤周備不以廢興易意常謂諸子曰此兒有高天下之志必能恢隆祖業汝曹當謹遇之天下之英雄雖在童穉中固不與㣥兒同也加廣武將軍給幢麾鼓蓋幢直江翻劉衞辰恥在庫仁之下怒殺秦五原太守而叛五原漢郡也魏晉省棄其地於荒外秦復置郡隋唐為豐鹽二州破之追至陰山西北千餘里獲其妻子又西擊庫狄部徙其部落置之桑乾川桑乾縣漢屬代郡晉省孟康曰乾音干拓跋魏後置桑乾郡唐屬朔州善陽縣界魏收志拓跋力微時次南諸部有庫狄部後改為狄氏堅以衞辰為西單于督攝河西雜類屯代來城代來城在北河西蓋秦築以居衞辰言自代來者居此城也單音蟬是歲乞伏司繁卒子國仁立為乞伏國仁乘秦亂據隴西張本二年丁丑三七七春高句麗新羅西南夷皆遣使入貢于秦新羅弁韓苗裔也居漢樂浪地杜佑曰新羅本辰韓種魏時為斬新晉宋曰新羅其國在百濟東南五百餘里兼有沃沮不耐韓濊地句如字又音駒麗力知翻使疏吏翻趙故將作功曹熊邈屢為秦王堅言石氏宮室器玩之盛堅以邈為將作長史領將作丞章十二行本將作丞作尚方丞乙十一行本同孔本同張校同退齋校同晉將作大匠有丞無長史長史蓋秦所置屢為于偽翻大脩舟艦兵器飾以金銀頗極精巧艦戶黯翻慕容農私言於慕容垂曰自王猛之死秦之法制日以頹靡今又重之以奢侈重直用翻殃將至矣圖讖之言行當有驗大王宜結納英傑以承天意時不可失垂笑曰天下事非爾所及慕容農所見猶紹楷也桓豁表兗州刺史朱序為梁州刺史鎮襄陽秋七月丁未以尚書僕射謝安為司徒安讓不拜復加侍中都督揚豫徐兗青五州諸軍事復扶又翻丙辰征西大將軍荊州刺史桓豁卒冬十月辛丑以桓沖都督江荊梁益寧交廣七州諸軍事領荊州刺史以沖子嗣為江州刺史又以五兵尚書王蘊都督江南諸軍事領章十二行本領上有假節二字乙十一行本同孔本同張校同徐州刺史江南諸軍謂晉陵諸軍也領廣陵相監江北諸軍事桓豁為征西將軍以玄為司馬監工銜翻桓沖以秦人強盛欲移阻江南此江南即上明也晉志上明在漢武陵郡孱陵縣界水經註上明城在枝江縣其地夷敞北據大江江汜枝分東入大江縣治洲上故以枝江為稱杜佑曰上明即今江陵松滋縣西廢大明城桓沖所築也沖疏曰南平孱陵縣界地名上明田土膏良可以資業軍人在吳時樂鄉城以上四十餘里北枕大江西接三峽宋白曰上明城桓沖所築在今松滋縣西冠古玩翻諮議參軍楊亮守江夏王蘊固讓徐州謝安曰卿居后父之重不應妄自菲薄以虧時遇時遇謂一時之恩遇也初中書郎郗超自以其父愔位遇應在謝安之右而安入掌機權愔優遊散地郗愔自徐兗二州刺史移鎮會稽郗丑之翻愔挹淫翻散悉亶翻由是與謝氏有隙是時朝廷方以秦寇為憂詔求文武良將可以鎮禦北方者將即亮翻謝安以兄子玄應詔超聞之歎曰安之明乃能違衆舉親玄之才足以不負所舉衆咸以為不然超曰吾嘗與玄共在桓公府桓公謂桓溫超玄同府事見一百一卷哀帝興寧元年雖履屐間未嘗不得其任是以知之履以皮為之屐以木為之屐竭戟翻玄募驍勇之士驍堅堯翻得彭城劉牢之等數人以牢之為參軍常領精銳為前鋒戰無不捷時號北府兵晉人謂京口為北府謝玄破俱難等始兼領徐州號北府兵者史終言之壬寅護軍將軍散騎常侍王彪之卒散悉亶翻騎奇寄翻謝安欲增脩宮室彪之曰中興之初即東府為宮東府在建康臺城之東蘇峻之亂成帝止蘭臺都坐蘭臺御史臺也都坐御史臺官會坐之地坐徂臥翻是以更營新宮見九十四卷成帝咸和五年比之初過江則為侈矣今寇敵方強豈可大興功役勞擾百姓邪安曰宮室弊陋後人謂人無能彪之曰凡任天下之重者當保國寧家緝熙政事緝續也熙廣也鄭玄曰緝熙光明也安不能奪其議故終彪之之世無所營造十二月臨海太守郗超卒臨海本會稽東部都尉治沈約曰前漢都尉治鄞後漢分會稽為吳郡疑是都尉徙治章安孫亮太平二年立臨海郡超黨於桓氏以父愔忠於王室不令知之及病甚出一箱書授門生曰公年尊我死之後若以哀惋害寢食者可呈此箱不爾即焚之既而愔果哀惋成疾惋烏貫翻門生呈箱皆與桓溫往反密計愔大怒曰小子死已晚矣遂不復哭復扶又翻三年戊申三七八春二月乙巳作新宮帝移居會稽王邸會工外翻秦王堅遣征南大將軍都督征討諸軍事守尚書令長樂公丕武衞將軍苟萇尚書慕容暐帥步騎七萬寇襄陽以荊州刺史楊安帥樊鄧之衆為前鋒征虜將軍始平石越帥精騎一萬出魯陽關南陽郡魯陽縣有魯陽關樂音洛萇仲良翻帥讀曰率下同騎奇寄翻下同領軍將軍苟池右將軍毛當強弩將軍王顯帥衆四萬出武當會攻襄陽夏四月秦兵至沔北沔彌兗翻梁州刺史朱序以秦無舟檝不以為虞虞防也備也序惶駭固守中城越克其外郭獲船百餘艘以濟餘軍艘蘇遭翻長樂公丕督諸將攻中城序母韓氏聞秦兵將至自登城履行行下孟翻至西北隅以為不固帥百餘婢及城中女丁築邪城於其內邪即斜翻及秦兵至西北隅果潰衆移守新城襄陽人謂之夫人城桓沖在上明擁衆七萬憚秦兵之強不敢進丕欲急攻襄陽苟萇曰吾衆十倍於敵糗糧山積糗去九翻但稍遷漢沔之民於許洛塞其運道塞悉則翻絕其援兵譬如網中之禽何患不獲而多殺將士急求成功哉丕從之慕容垂拔南陽執太守鄭裔與丕會襄陽秋七月新宮成辛巳帝入居之秦兗州刺史彭超請攻沛郡太守戴彖於彭城彖領沛郡太守戍彭城楊正衡曰彖古遁字願更遣重將攻淮南諸城為征南棊劫之勢征南謂苻丕也時督諸軍攻襄陽棊劫者以棊勢喻兵勢也圍棊者攻其右而敵手應之則擊其左取之謂之劫丹陽不足平也晉都建康漢丹陽秣陵縣地使都督東討諸軍事後將軍俱難右禁將軍毛盛洛州刺史邵保帥步騎七萬寇淮陽盱眙俱姓也秦初以洛州刺史治陝城晉志曰滅燕之後移洛州治豐陽參考前鄧羌以洛州刺史鎮洛陽則是時洛州刺史猶治洛陽是後北海公重以豫州刺史及平原公暉以豫州牧鎮洛陽洛州刺史始移治豐陽淮陽晉書載記作淮陰當從之淮陰盱眙前漢並屬臨淮郡後漢晉以淮陰屬廣陵越之弟保羌之從弟也邵羌見一百一卷海西公太和二年從才用翻彭超攻彭城詔右將軍毛虎生帥衆五萬鎮姑孰以禦秦兵秦梁州刺史韋鍾圍魏興太守吉挹於西城杜佑曰金州西城縣南九里吉挹於峻山築壘今其山曰魏山九月秦王堅與㣥臣飲酒以祕書監朱肜為正正酒正也肜余中翻章十二行本人上有命人二字乙十一行本同孔本同以極醉為限祕書侍郎趙整作酒德之歌曰地列酒泉天垂酒池九州春秋曰曹公禁酒孔融以書嘲之曰天有酒旗之星地列酒泉之郡天文志曰軒轅右角南二星曰酒旗酒官之旗也此曰天垂酒池既曰垂矣池當作旗儀狄先知魏武樂府短歌行云何以解憂唯有杜康註云杜康古之造酒者戰國策曰昔帝女儀狄作酒以進於禹禹飲而甘之遂疏儀狄曰後世必有以酒亡國者桀傾夏國由此言之前危後則紂為酒池肉林長夜之飲以亡殷史曰夏桀淫驕乃放鳴條蓋亦以酒也前危後則謂前人之危後人之法則也喪息浪翻夏戶雅翻命整書之以為酒戒自是宴㣥臣禮飲而已禮臣侍君宴不過三爵秦涼州刺史梁熙遣使入西域揚秦威德冬十月大宛獻汗血馬使疏吏翻宛於元翻秦王堅曰吾嘗慕漢文帝之為人用千里馬何為文帝卻千里馬見十三卷元年反則反之何以作詩為哉此亦好名之過也巴西人趙寶起兵涼章十二行本涼作梁乙十一行本同孔本同州自稱晉西蠻校尉巴郡太守史言蜀人思晉秦豫州刺史北海公重鎮洛陽謀反秦王堅曰長史呂光忠正必不與之同即命光收重檻車送長安赦之以公就第重洛之兄也十二月秦御史中丞李柔劾奏長樂公丕等擁衆十萬攻圍小城日費萬金久而無效請徵下廷尉劾戶概翻又戶得翻下遐稼翻秦王堅曰丕等廣費無成實宜貶戮但師已淹時淹滯也久留也其特原之令以成功贖罪使黃門侍郎韋華持節切讓丕等賜丕劍曰來春不捷汝可自裁勿復持面見吾也周虓在秦密與桓沖書言秦陰計又逃奔漢中秦人獲而赦之虓虛交翻四年己卯三七九春正月辛酉大赦秦長樂公丕等得詔惶恐乃命諸軍幷力攻襄陽秦王堅欲自將攻襄陽將即亮翻詔陽平公融以關東六州之兵會壽春梁熙以河西之兵為後繼陽平公融諫曰陛下欲取江南固當博謀熟慮不可倉猝若止取襄陽又豈足親勞大駕乎未有動天下之衆而為一城者為于偽翻所謂以隨侯之珠彈千仞之雀也呂氏春秋曰以隨侯之珠彈千仞之雀世必笑之所用重所要輕也搜神記曰隨侯行見大蛇傷救而治之其後蛇含珠以報之徑盈寸純白而夜光可燭堂故歷世稱隨珠焉晉主之暴未如孫晧江山險固易守難攻易以豉翻陛下必欲廓清江表亦不過分命將帥將即亮翻帥所類翻引關東之兵南臨淮泗下梁益之卒東出巴峽又何必親屈鸞輅遠幸沮澤乎沮將豫翻下濕之地曰沮昔漢光武誅公孫述晉武帝擒孫晧未聞二帝自統六師親執枹鼓蒙矢石也光武用岑彭吳漢以滅公孫述晉武帝用王濬王渾以平孫晧苻融梁熙未嘗離所鎮皆上疏以諫枹音膚詔冠軍將軍南郡相劉波帥衆八千救襄陽波畏秦不敢進朱序屢出戰破秦兵引退稍遠序不設備二月襄陽督護李伯護密遣其子送款於秦請為內應長樂公丕命諸軍進攻之戊午克襄陽執朱序送長安秦王堅以序能守節拜度支尚書曹魏置度支尚書度徒洛翻斬之秦將軍慕容越拔順陽晉志曰太康中置順陽郡唐鄧州臨湍菊潭二縣古順陽地堅欲官之穆固辭不受堅以中壘將軍梁成為荊州刺史配兵一萬鎮襄陽選其才望禮而用之桓沖以襄陽陷沒上疏送章節章印也上時掌翻不許詔免劉波官俄復以為冠軍將軍秦以前將軍張蚝為幷州刺史蚝七吏翻兗州刺史謝玄帥衆萬餘救彭城帥讀曰率軍于泗口欲遣間使報戴彖而不可得間古莧翻部曲將田泓請沒水潛行趣彭城趣七喻翻玄遣之泓為秦人所獲厚賂之使云南軍已敗泓偽許之既而告城中曰南軍垂至我單行來報為賊所得勉之秦人殺之彭超置輜重於留城留縣城也自漢以來屬彭城郡重直用翻下同章十二行本何上有東海二字乙十一行本同孔本同張校同謙向留城超聞之釋彭城圍引兵還保輜重戴彖帥彭城之衆隨謙奔玄超遂據彭城考異曰謝玄傳云何謙進解彭城圍又云於是罷彭城下邳二戍帝紀及諸傳皆不言此年彭城陷沒而十六國秦春秋云超據彭城又云超分兵下邳留徐褒守彭城至七月以毛當為徐州刺史鎮彭城王顯為揚州戍下邳是二城俱陷也南攻盱眙盱眙音吁怡俱難克淮陰南北對境圖曰淮陰縣距淮五十步北對清河口十里進可以窺山東內則蔽沿江晉宋以為重鎮三月壬戌詔以疆埸多虞埸音亦年穀不登其供御所須事從儉約九親供給九親即九族權可減半凡諸役費自非軍國事要皆宜停省癸未使右將軍毛虎生帥衆三萬擊巴中以救魏興巴中即巴郡為秦將張紹等所敗敗補邁翻亡七千餘人虎生退屯巴東蜀人李烏聚衆二萬圍成都以應虎生秦王堅使破虜將軍呂光擊滅之破虜將軍蓋苻秦所置四月戊申韋鍾拔魏興吉挹引刀欲自殺左右奪其刀會秦人至執之挹不言不食而死秦王堅歎曰周孟威不屈於前丁彥遠潔己於後吉祖沖閉口而死何晉氏之多忠臣也周虓字孟威丁穆字彥遠吉挹字祖沖章十二行本得作逃乙十一行本同孔本同退齋校同歸得挹臨終手疏詔贈益州刺史秦毛當王顯帥衆二萬自襄陽東會俱難彭超攻淮南五月乙丑難超拔盱眙執高密內史毛璪之高密僑國也璪之領內史戍盱眙璪子皓翻晉僑置幽冀青幷四州於江北三阿今寶應軍即其地朝廷大震臨江列戍遣征虜將軍謝石帥舟師屯涂中涂讀曰除石安之弟也右衞將軍毛安之等帥衆四萬屯堂邑秦毛當毛盛帥騎二萬襲堂邑安之等驚潰兗州刺史謝玄自廣陵救三阿丙子難超戰敗退保盱眙六月戊子玄與田洛帥衆五萬進攻盱眙難超又敗退屯淮陰玄遣何謙等帥舟師乘潮而上夜焚淮橋秦作橋於淮水以渡兵上時掌翻難超退屯淮北玄與何謙戴彖田洛共追之戰于君川今盱眙縣北六里有君山此蓋君山之川也復扶又翻難超北走僅以身免謝玄還廣陵詔進號冠軍將軍加領徐州刺史冠古玩翻秦王堅聞之大怒秋七月檻車徵超下廷尉下遐稼翻超自殺難削爵為民以毛當為徐州刺史鎮彭城毛盛為兗州刺史鎮湖陸續漢志湖陸故湖陵章帝更名前漢志曰王莽改曰湖陸今按湖陸縣漢屬山陽郡晉分屬高平國魏收地形志高平縣有湖陵城當在唐兗州任城縣界戍下邳謝安為宰相秦人屢入寇邊兵失利安章十二行本安上有衆心危懼四字乙十一行本同孔本同張校同每鎮之以和靜其為政務舉大綱不為小察時人比安於王導而謂其文雅過之八月丁亥以左將軍王蘊為尚書僕射頃之遷丹陽尹蘊自以國姻蘊后父也苦求外出復以為都督浙江東五郡諸軍事會稽內史蘊先督徐州今復督浙東復扶又翻會工外翻是歲秦大饑五年庚辰三八春正月秦王堅復以北海公重為鎮北大將軍鎮薊重謀反而不誅復任之以方面宜其與弟洛反也復扶又翻二月作教武堂於渭城漢高帝元年改咸陽曰新城武帝元鼎三年更名渭城後漢晉省石勒置石安縣苻秦復曰渭城將即亮翻祕書監朱肜諫曰陛下東征西伐所向無敵四海之地什得其八雖江南未服蓋不足言是宜稍偃武事增脩文德乃更始立學舍教人戰鬬之術殆非所以馴致升平也馴從也言從此而致升平也何患不習於兵而更使受教於書生非所以強其志氣也此無益於實而有損於名惟陛下圖之堅乃止秦征北將軍幽州刺史行唐公洛洛以幽州刺史鎮和龍行唐戰國時趙邑秦以為縣魏晉因之能坐制奔牛射洞犂耳犂耳之鐵厚而堅滅代見上元年由是怨憤三月秦王堅以洛為使持節都督益寧西南夷諸軍事征南大將軍益州牧使疏吏翻使自伊闕趨襄陽泝漢而上趨七喻翻上時掌翻洛謂官屬曰孤帝室至親洛苻健兄子也而常擯棄邊鄙今又投之西裔復不聽過京師復扶又翻過古禾翻此必有陰計欲使梁成沈孤於漢水耳章十二行本耳下有於諸君意何如六字乙十一行本同孔本同退齋校同梁成時鎮襄陽沈持林翻幽州治中平規曰逆取順守湯武是也漢陸賈曰湯武逆取而順守之桓文是也齊桓晉文皆因兄弟爭國得國而霸然窮兵黷武民思有所息肩者十室而九若明公神旗一建必率土雲從今跨據全燕地盡東海北總烏桓鮮卑東引句麗百濟燕於賢翻句音駒麗力知翻控弦之士不減五十餘萬柰何束手就徵蹈不測之禍乎洛攘袂大言曰孤計決矣沮謀者斬沮在呂翻於是自稱大將軍大都督秦王以平規為幽州刺史玄菟太守吉貞為左長史菟同都翻遼東太守趙讚為左司馬昌黎太守王縕為右司馬遼西太守王琳北平太守皇甫傑牧官都尉魏敷等為從事中郎漢邊郡有牧官秦置牧官都尉遣兵三萬助北海公重戍薊諸國皆曰吾為天子守藩為于偽翻不能從行唐公為逆洛懼欲止猶豫未決王縕王琳皇甫傑魏敷知其無成欲告之洛皆殺之吉貞趙讚曰今諸國不從事乖本圖明公若憚益州之行者當遣使奉表乞留使疏吏翻下同主上亦不慮不從平規曰今事形已露何可中止宜聲言受詔盡幽州之兵南出常山陽平公必郊迎因而執之進據冀州陽平公融以冀州牧鎮鄴平規使洛出中山以臨鄴天下可指麾而定也洛從之夏四月洛帥衆七萬發和龍帥讀曰率下同秦王堅召㣥臣謀之步兵校尉呂光曰行唐公以至親為逆此天下所共疾願假臣步騎五萬取之如拾遺耳堅曰重洛兄弟據東北一隅兵賦全資未可輕也光曰彼衆迫於凶威一時蟻聚耳若以大軍臨之勢必瓦解不足憂也堅乃遣使讓洛使還和龍當以幽州永為世封洛謂使者曰汝還白東海王堅本封東海王不足以容萬乘須王秦中以承高祖之業苻健廟號高祖乘繩證翻王于況翻當位為上公爵歸本國堅怒遣左將軍武都竇衝及呂光帥步騎四萬討之右將軍都貴馳傳詣鄴都姓貴名鄭公孫閼字子都子孫以為氏傳株戀翻將即亮翻以陽平公融為征討大都督北海公重悉薊城之衆與洛會屯中山有衆十萬薊音計五月竇衝等與洛戰于中山洛兵大敗生擒洛送長安北海公重走還薊呂光追斬之屯騎校尉石越自東萊帥騎一萬浮海襲和龍斬平規幽州悉平堅赦洛不誅徙涼州之西海郡漢獻帝興平二年武威太守張雅請置西海郡於居延臣光曰夫有功不賞有罪不誅雖堯舜不能為治用漢宣帝詔而略變其文治直吏翻秦王堅每得反者輒宥之使其臣狃於為逆狃狎也徼堅堯翻雖力屈被擒猶不憂死亂何自而息哉書曰威克厥愛允濟愛克厥威允罔功書胤征之辭毋縱詭隨以謹罔極式遏寇虐無俾作慝詩民勞第三章之辭能無亡乎朝廷以秦兵之退為謝安桓沖之功拜安衞將軍與沖皆開府儀同三司六月甲子大赦丁卯以會稽王道子為司徒會工外翻固讓不拜秦王堅召陽平公融為侍中中書監都督中外諸軍事車騎大將軍司隸校尉錄尚書事以征南大將軍守尚書令長樂公丕為都督關東諸軍事征東大將軍冀州牧樂音洛堅以諸氐種類繁滋種章勇翻秋七月分三原九嵕武都汧雍氐十五萬戶九嵕山在漢馮翊雲陽縣界唐在醴泉縣嵕祖紅翻汧苦堅翻雍於用翻散居方鎮如古諸侯長樂公丕領氐三千戶以仇池氐酋射聲校尉楊膺為征東左司馬九嵕氐酋長水校尉齊午為右司馬各領一千五百戶為長樂世卿古者封建諸侯國命卿皆世其官堅分諸宗親散居方鎮各以種類為世卿樂音洛酋慈由翻垣氐姓也後隨宋武南歸遂為累世將家申紹為別駕膺丕之妻兄也午膺之妻父也八月分幽州置平州晉書曰按平州禹貢冀州之域於周為幽州界漢屬北平郡後漢末公孫度自號平州牧至孫文懿為魏所滅因置平州統遼東昌黎玄菟帶方五郡後還合於幽州苻秦滅燕復分幽州置平州公孫淵字文懿唐避高祖諱稱其字鎮龍城中書令梁讜為幽州刺史鎮薊城撫軍將軍毛興為都督河秦二州諸軍事河州刺史鎮枹罕枹音膚長水校尉王騰為幷州刺史鎮晉陽河幷二州各配氐戶三千興騰並苻氏婚姻氐之崇望也平原公暉為都督豫洛荊南兗東豫陽六州諸軍事鎮東大將軍豫州牧鎮洛陽秦兗州刺史鎮倉垣南兗州鎮湖陸又秦初以豫州刺史鎮許昌滅燕之後以豫州刺史鎮洛陽於許昌置東豫州陽當作揚按後魏書地形志天平初始置陽州於宜陽苻堅以王顯為揚州刺史戍下邳正屬暉所統苻秦初以洛州刺史鎮陝城荊州刺史鎮豐陽既得襄陽以為荊州徙洛州於豐陽豐陽漢上洛縣地也宋白曰豐陽漢商縣地晉泰始三年分置豐陽縣在豐陽川章十二行本史下有鎮蒲坂三字乙十一行本同孔本同張校同退齋校同雍於用翻各配氐戶三千二百堅送丕至灞上諸氐別其父兄皆慟哭哀感路人趙整因侍宴援琴而歌曰項安世家說伏羲作琴長三尺六寸六分象三百六十六日也廣六寸象六合也文上曰池下曰宕池水平也前廣後狹象尊卑也上圜下方法天地也五弦官也大弦君也寬和而溫小弦臣也清廉而不亂文王加三弦合君臣恩也援于元翻杜佑曰世本云琴神農所造琴操云伏羲作琴所以脩身理性反其天真白虎通曰琴禁也禁止於邪以正人心也廣雅曰文王武王加二絃以合君臣之恩也揚雄琴清英曰舜彈五絃而天下化堯加二絃以合君臣之恩阿得脂阿得脂博勞舅父是仇綏爾雅鵙伯勞郭璞曰伯勞似鶷鶡而大飛不能翱翔竦翅上下而已廣雅曰伯勞一曰博勞一名伯趙仇綏不知為何物遠徙種人留鮮卑謂徙諸氐而留慕容也種章勇翻堅笑而不納語牛倨翻九月癸未皇后王氏崩冬十月九真太守李遜據交州反秦王堅以左禁將軍楊壁為秦州刺史尚書趙遷為洛州刺史南巴校尉姜宇為寧州刺史苻秦於南中置南巴校尉十一月乙酉葬定皇后於隆平陵十二月秦以左將軍都貴為荊州刺史鎮彭城都貴鎮襄陽彭城誤也置東豫州以毛當為刺史鎮許昌是歲秦王堅遣高密太守毛璪之等二百餘人來歸毛璪之被禽見上四年六年辛巳三八一春正月帝初奉佛法立精舍於殿內後漢書姜肱傳曰就精廬求見徵君賢曰精廬即精舍也蓋以專精講習所業為義今儒釋肄業之地通曰精舍尚書左丞王雅表諫不從雅肅之曾孫也王肅仕曹魏以經學著名武帝肅外孫也丁酉以尚書謝石為僕射二月東夷西域六十二國入貢于秦夏六月庚子朔日有食之秋七月甲午交趾太守杜瑗斬李遜交州平冬十月故武陵王晞卒于新安晞徙新安見上卷簡文帝咸安元年命其子遵為嗣十一月己亥以前會稽內史郗愔為司空愔固辭不起秦荊州刺史都貴遣其司馬閻振中兵參軍吳仲帥衆二萬寇竟陵竟陵侯國前漢屬江夏郡惠帝分立竟陵郡帥讀曰率石民石虔之弟也十二月甲辰石虔襲擊振仲大破之振仲退保管城石虔進攻之癸亥拔管城據載記石虔襲破振仲于滶水振仲退保管城又據水經沔水逕郡縣故城南又東滶水注之滶水西南注于沔寔曰滶口沔水又南逕石城西城因山為固晉竟陵郡所治也以此考之管城當在滶水北斬首七千級俘虜萬人詔封桓沖子謙為宜陽侯以桓石虔領河東太守沈約曰成帝咸康三年征西將軍庾亮以司州僑戶立南河東郡屬荊州五代志南郡松滋縣江左置河東郡是歲江東大饑七年壬午三八二秦大司農東海公陽員外散騎侍郎王皮晉職官志散騎侍郎四人魏初與散騎常侍同置員外散騎侍郎晉武帝置散悉亶翻騎奇寄翻虓虛交翻事覺收下廷尉下遐稼翻陽法之子皮猛之子也秦王堅問其反狀陽曰臣父哀公死不以罪法死見一百卷穆帝升平元年為于偽翻下嘗為同堅泣曰哀公之死事不在朕卿豈不知之王皮曰臣父丞相有佐命之勳而臣不免貧賤故欲圖富貴耳堅曰丞相臨終託卿以十具牛為治田之資未嘗為卿求官治直之翻為于偽翻知子莫若父何其明也周虓曰虓世荷晉恩生為晉臣死為晉鬼復何問乎荷下可翻復扶又翻下同先是虓屢謀反叛先悉薦翻左右皆請殺之堅曰孟威烈士秉志如此豈憚死乎殺之適足成其名耳皆赦不誅徙陽于涼州之高昌郡徵諸晉志河西張氏未嘗置高昌郡苻堅之平河西也以高昌楊幹為高昌太守疑張氏置是郡苻氏因之高昌即漢車師後部高昌壁之地註又見後虓卒于朔方卒子恤翻陽勇力兼人尋復徙鄯善及建元之末秦國大亂建元十九年堅伐晉而敗秦遂以亂二十年堅死是建元十八年也復扶又翻鄯上扇翻鄯善王殺之史終言之秦王堅徙鄴銅駝銅馬飛廉翁仲於長安石虎所置於鄴者夏四月堅扶風太守王永為幽州刺史堅下當有以字皮之兄也皮凶險無行而永清修好學行下孟翻好呼到翻故堅用之以陽平公融為司徒融固辭不受堅方謀伐晉乃以融為征南大將軍開府儀同三司五月幽州蝗生廣袤千里廣古曠翻秦王堅使散騎常侍彭城劉蘭發幽冀青幷民撲除之撲普卜翻秋八月癸卯大赦秦王堅以諫議大夫裴元略為巴西梓潼二郡太守使密具舟師欲祖王濬之故智順流東下而伐晉也九月車師前部王彌窴鄯善王休密馱窴堂見翻馱堂何翻入朝于秦朝直遙翻請為鄉導以伐西域之不服者鄉讀曰嚮因如漢法置都護以統理之秦王堅以驍騎將軍呂光為使持節都督西域征討諸軍事驍堅堯翻騎奇寄翻下同使疏吏翻與淩江將軍姜飛淩江將軍晉文王所置以授羅憲杜進康盛位至將軍未有將軍號鐵騎五千以伐西域陽平公融諫曰西域荒遠得其民不可使得其地不可食漢武征之得不補失謂漢武伐之大破樓蘭姑師田車師也今勞師萬里之外以踵漢氏之過舉臣竊惜之不聽桓沖使揚威將軍朱綽擊秦荊州刺史都貴于襄陽焚踐沔北屯田掠六百餘戶而還沔彌兗翻冬十月秦王堅會㣥臣于太極殿議曰自吾承業垂三十載堅以升平元年自立至是凡二十六年惟年之久長懼于不終尚庶幾焉乃欲疲民以逞宜其亡也四方略定唯東南一隅未霑王化今略計吾士卒可得九十七萬吾欲自將以討之將即亮翻何如祕書監朱肜曰陛下恭行天罰必有征無戰晉主不銜璧軍門則走死江海陛下返中國士民使復其桑梓謂永嘉之末避亂南渡之子孫也告成岱宗杜佑曰岱宗東岳也特謂太山為岱宗者以其處東北居寅丑之間萬物終始之地陰陽交代之所為衆山之宗故曰岱宗載子亥翻堅喜曰是吾志也尚書左僕射權翼曰昔紂為無道三仁在朝武王猶為之旋師論語微子去之箕子為之奴比干諫而死孔子曰殷有三仁焉史記武王即位九年東觀兵至于盟津諸侯不期而會者八百皆曰紂可伐矣武王曰未可也乃還師居二年紂暴虐滋甚殺王子比干囚箕子微子奔周武王告諸侯曰殷有重罪不可不伐遂滅之朝直遙翻猶為于偽翻未有大惡謝安桓沖皆江表偉人君臣輯睦內外同心以臣觀之未可圖也堅嘿然良久曰諸君各言其志太子左衞率石越曰今歲鎮守斗福德在吳歲木星鎮土星斗牛女吳越揚州分必有天殃且彼據長江之險民為之用殆未可伐也堅曰昔武王伐紂逆歲違卜荀子曰武王之誅紂也東面而迎太歲楊倞註曰迎謂逆太歲也尸子曰武王伐紂魚辛諫曰歲在北方不可北征武王不從史記齊世家武王將伐紂卜龜兆不吉風雨暴至㣥公盡懼唯太公強之勸武王武王遂行未易可知易以豉翻夫差孫晧皆保據江湖不免於亡今以吾之衆投鞭於江足斷其流斷丁管翻又何險之足恃乎對曰三國之君皆淫虐無道三國之君謂紂夫差孫晧易於拾遺易以豉翻今晉雖無德未有大罪願陛下且按兵積穀以待其釁於是㣥臣各言利害久之不決堅曰此所謂築舍道傍無時可成詩曰如彼築室于道謀是用不潰于成斷丁亂翻㣥臣皆出獨留陽平公融謂之曰自古定大事者不過一二臣而已今衆言紛紛徒亂人意吾當與汝決之對曰今伐晉有三難天道不順一也晉國無釁二也我數戰兵疲數所角翻民有畏敵之心三也㣥臣言晉不可伐者皆忠臣也願陛下聽之堅作色曰汝亦如此吾復何望復扶又翻吾強兵百萬資仗如山吾雖未為令主亦非闇劣劣弱也擊垂亡之國何患不克豈可復留此殘寇使長為國家之憂哉漢魏相有言恃國家之大矜人民之衆欲見威於敵者謂之驕兵兵驕者滅其苻堅之謂歟復扶又翻下復留同晉未可滅昭然甚明今勞師大舉恐無萬全之功且臣之所憂不止於此陛下寵育鮮卑羌羯布滿畿甸此屬皆我之深仇太子獨與弱卒數萬留守京師臣懼有不虞之變生於腹心肘掖不可悔也臣之頑愚誠不足采王景略一時英傑陛下常比之諸葛武侯諸葛亮諡武侯見上卷寧康三年於是朝臣進諫者衆堅曰以吾擊晉校其強弱之勢猶疾風之掃秋葉而朝廷內外皆言不可誠吾所不解也朝直遙翻下同解戶買翻曉也太子宏曰今歲在吳分分扶問翻又晉君無罪若大舉不捷恐威名外挫財力內竭此㣥下所以疑也堅曰昔吾滅燕亦犯歲而捷天道固難知也秦滅六國六國之君豈皆暴虐乎冠軍京兆尹慕容垂冠軍即冠軍將軍也晉書載記所書率書將軍號而不繫將軍通鑑因之冠古玩翻弱併於強小併於大此理勢自然非難知也以陛下神武應期威加海外虎旅百萬韓白滿朝韓白謂韓信白起言秦多良將也蕞徂外翻小也獨違王命豈可復留之以遺子孫哉復扶又翻遺于季翻詩云謀夫孔多是用不集詩小旻之辭斷丁亂翻何必廣詢朝衆晉武平吳所仗者張杜二三臣而已若從朝衆之言豈有混壹之功謂張華杜預也事見八十卷武帝咸寧五年朝直遙翻與吾共定天下者獨卿而已賜帛五百匹堅銳意欲取江東寢不能旦陽平公融諫曰知足不辱知止不殆老子德經立戒篇之辭未有不亡者且國家本戎狄也正朔會不歸人會要也言大要中國正朔相傳不歸夷狄也然中華正統天意必不絕之堅曰帝王曆數豈有常邪惟德之所在耳劉禪豈非漢之苗裔邪終為魏所滅汝所以不如吾者正病此不達變通耳堅素信重沙門道安道安在襄陽堅破襄陽輿而致之間古莧翻十一月堅與道安同輦遊于東苑堅曰朕將與公南遊吳越泛長江臨滄海不亦樂乎樂音洛安曰陛下應天御世居中土而制四維自足比隆堯舜何必櫛風沐雨經略遐方乎且東南卑濕沴氣易構沴音戾五行之氣相克勝則為沴氣虞舜遊而不歸大禹往而不復虞舜南巡狩崩于蒼梧之野禹東巡狩至于會稽而崩堅曰天生烝民而樹之君使司牧之朕豈敢憚勞使彼一方獨不被澤乎被皮義翻必如公言是古之帝王皆無征伐也道安曰必不得已陛下宜駐蹕洛陽遣使者奉尺書於前諸將總六師於後彼必稽首人臣不必親涉江淮也稽音啟堅不聽堅所幸張夫人諫曰妾聞天地之生萬物聖王之治天下治直之翻皆因其自然而順之故功無不成是以黃帝服牛乘馬因其性也言因牛馬之性故可引重而致遠障九澤因其勢也言因高下之勢故可滌源而陂澤因其時也因天時而播殖則百穀成因其心也因人心而用兵則天下服帥讀曰率無因則敗今朝野之人皆言晉不可伐陛下獨決意行之妾不知陛下何所因也書曰天聰明自我民聰明書皋陶謨之辭而況人乎妾又聞王者出師必上觀天道下順人心今人心既不然矣請驗之天道諺云雞夜鳴者不利行師犬㣥嘷者宮室將空嘷戶刀翻兵動馬驚軍敗不歸自秋冬以來衆雞夜鳴㣥犬哀嘷广既馬多驚武庫兵器自動有聲此皆非出師之祥也堅曰軍旅之事非婦人所當預也堅幼子中山公詵最有寵亦諫曰臣聞國之興亡繫賢人之用捨今陽平公國之謀主而陛下違之晉有謝安桓沖而陛下伐之臣竊惑之堅曰天下大事孺子安知秦劉蘭討蝗經秋冬不能滅十二月有司奏徵蘭下廷尉下遐稼翻秦王堅曰災降自天非人力所能除此由朕之失政蘭何罪乎是歲秦大熟上田畝收七十石下者三十石蝗不出幽州之境不食麻豆上田畝收百石下者五十石物反常為妖蝗之為災尚矣蝗生而不食五穀妖之大者也農人服田力穡至於有秋自古以來未有畝收百石七十石之理而畝收五十石三十石亦未之聞也使其誠有之又豈非反常之大者乎使其無之則州縣相與誣飾以罔上亦不祥之大者也秦亡宜矣王崇武標點容肇祖聶崇岐覆校
