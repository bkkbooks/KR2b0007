body:
  text: 資治通鑑卷第十七翰林學士朝散大夫右諫議大夫知制誥兼侍講同提舉萬壽觀公事兼判集賢院上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣奉敕編集後學天台音註漢紀九建元元年世宗孝武皇帝上之上荀悅曰諱徹之字曰通景帝中子也應劭曰禮諡法威強叡德曰武建元元年辛丑前一四自古帝王未有年號始起於此貢父曰封禪書云其後三年有司言元宜以天瑞命不宜以一二數推所謂其後三年者蓋盡元狩六年至元鼎三年也然元鼎四年方得寶鼎又無緣先三年稱之以此而言自元鼎以前之年皆有司所追命其實年號之起在元鼎故元封改元則始有詔書也建元元年冬十月詔舉賢良方正直言極諫之士上親策問以古今治道對者百餘人廣川董仲舒對曰道者所繇適於治之路也師古曰繇從也適往也治直吏翻繇古由字皆其具也故聖王已沒而子孫長久安寧數百歲此皆禮樂教化之功也夫人君莫不欲安存而政亂國危者甚衆所任者非其人而所繇者非其道是以政日以仆滅也夫周道衰於幽厲非道亡也幽厲不繇也至於宣王思昔先王之德興滯補敞明文武之功業周道粲然復興復扶又翻此夙夜不懈行善之所致也孔子曰人能弘道非道弘人師古曰論語載孔子之言也言明智之人則能行道內無其質非道所化非天降命不可得反其所操持誖謬失其統也操千高翻下同為人君者正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方四方正遠近莫敢不壹於正而亡有邪氣奸其間者奸音干犯也是以陰陽調而風雨時㣥生和而萬民殖諸福之物可致之祥莫不畢至而王道終矣孔子曰鳳鳥不至河不出圖吾已矣夫論語載孔子之言而身卑賤不得致也師古曰鳳鳥河圖皆王者之瑞仲尼自嘆有德無位故不至也富有四海居得致之位操可致之勢又有能致之資行高而恩厚知明而意美愛民而好士可謂誼主矣行下孟翻知讀曰智好呼到翻然而天地未應而美祥莫至者何也凡以教化不立而萬民不正也夫萬民之從利也如水之走下走音奏不以教化隄防之不能止也古之王者明於此故南面而治天下治直之翻莫不以教化為大務立太學以教於國設庠序以化於邑學記曰古之教者家有塾黨有庠遂有序國有學也摩民以誼漸音沾謂浸潤之也摩謂砥厲之也節民以禮故其刑罰甚輕而禁不犯者教化行而習俗美也聖王之繼亂世也掃除其迹而悉去之去羌呂翻復脩教化而崇起之復扶又翻教化已明習俗已成子孫循之師古曰循順也順而行之秦滅先聖之道為苟且之治故立十四年而亡自始皇初幷天下數之至亡十四年使習俗薄惡人民嚚頑抵冒殊扞熟爛如此之甚者也文穎曰扞突也師古曰口不道忠信之言為嚚心不則德義之經為頑扺觸也冒犯也殊絕也扞拒也嚚魚巾翻冒如字又莫克翻甚者必解而更張之乃可鼓也為政而不行甚者必變而更化之乃可理也故漢得天下以來常欲治而至今不可善治者失之於當更化而不更化也更工衡翻臣聞聖王之治天下也自此以下係第二策長則材諸位謂授之位以試其材少詩沼翻長知兩翻刑罰以威其惡故民曉於禮誼而恥犯其上武王行大誼平殘賊周公作禮樂以文之至於成康之隆囹圄空虛四十餘年爾雅劉熙領也圄禦也領錄囚徒禁禦也禮記正義崇精問曰獄周曰圜土殷曰羑里夏曰均臺囹圄何代之獄焦氏答曰月令秦書則獄名也漢曰若盧魏曰司空是也此亦教化之漸而仁誼之流非獨傷肌膚之效也漸子廉翻至秦則不然師申商之法申不害商鞅也憎帝王之道以貪狼為俗師古曰狼性皆貪故謂貪者為貪狼也師古曰誅責也是以百官皆飾虛辭而不顧實外有事君之禮內有背上之心造偽飾詐趨利無恥背蒲妹翻趨七喻翻是以刑者甚衆死者相望而姦不息俗化使然也今陛下幷有天下莫不率服而功不加於百姓者殆王心未加焉曾子曰尊其所聞則高明矣行其所知則光大矣高明光大不在於他在乎加之意而已師古曰曾子之書也曾子曾參設誠於內而致行之則三王何異哉夫不素養士而欲求賢譬猶不琢玉而求文采也故養士之大者莫大虖太學太學者賢士之所關也師古曰關由也今以一郡一國之衆對亡應書者師古曰書謂舉賢良文學之詔書亡古無字通下同臣願陛下興太學置明師以養天下之士數考問以盡其材數所角翻則英俊宜可得矣今之郡守縣令民之師帥所使承流而宣化也故師帥不賢則主德不宣恩澤不流帥所類翻今吏既亡教訓於下或不承用主上之法暴虐百姓與姦為市師古曰言小吏有為姦欺者守令不舉乃反與交易求利也冤苦失職甚不稱陛下之意是以陰陽錯繆氛氣充塞稱尺證翻塞悉則翻㣥生寡遂黎民未濟皆長吏不明使至於此也夫長吏多出於郎中中郎吏二千石子弟選郎吏又以富訾未必賢也長知兩翻訾讀曰貲且古所謂功者以任官稱職為差非謂積日累久也故小材雖累日不離於小官賢材雖未久不害為輔佐師古曰害猶妨也離力智翻務治其業而以赴功知讀曰智治直之翻今則不然累日以取貴積久以致官是以廉恥貿亂賢不肖渾殽未得其真貿音茂渾戶本翻臣愚以為使諸列侯郡守二千石各擇其吏民之賢者歲貢各二人以給宿衞且以觀大臣之能所貢賢者有賞所貢不肖者有罰夫如是諸吏二千石皆盡心於求賢天下之士可得而官使也授之以官而任使之則三王之盛易為易以豉翻而堯舜之名可及也毋以日月為功實試賢能為上量材而授官錄德而定位量音良師古曰錄謂存視也則廉恥殊路賢不肖異處矣臣聞衆少成多積小致鉅自此以下係第三策師古曰鉅大也晻古暗字是以堯發於諸侯舜興虖深山師古曰堯謂從唐侯升天子之位孟康曰舜耕于歷山蓋有漸以致之矣言出於己不可塞也行發於身不可掩也言行治之大者君子之所以動天地也塞悉則翻行下孟翻故盡小者大慎微者著師古曰能盡衆小則致高大能謹於微則其善著明也猶長日加益而人不知也師古曰長言身形之脩短自幼及壯也猶火銷膏而人不見也此唐虞之所以得令名而桀紂之可為悼懼者也夫樂而不亂復而不厭者謂之道樂音洛師古曰復謂反覆行之也音扶目翻道者萬世亡敝敝者道之失也師古曰言有敝非道由失道故有敝亡古無字通下同必有偏而不起之處故政有眊而不行眊莫報翻不明也舉其偏者以補其敝而已矣三王之道所祖不同非其相反將以捄溢扶衰所遭之變然也捄與救同改正朔易服色以順天命而已其餘盡循堯道何更為哉更工衡翻故王者有改制之名亡變道之實然夏尚忠殷尚敬周尚文者所繼之捄當用此也師古曰繼謂所受先代之次也捄謂救其敝也所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也師古曰論語載孔子之言謂忠敬與文因循為教立政垂則不遠此也以此三者矣夏因於虞而獨不言所損益者其道一而所上同也道之大原出于天天不變道亦不變是以禹繼舜舜繼堯三聖相受而守一道亡捄敝之政也師古曰言政和平不須救弊也繇是觀之繼治世者其道同繼亂世者其道變今漢繼大亂之後若宜少損周之文致師古曰致至極也貢父曰致當屬下句少詩沼翻夫古之天下亦今之天下共是天下以古準今壹何不相逮之遠也安所繆盭而陵夷若是盭古戾字師古曰安焉也有所詭於天之理與詭違也異也與與歟同夫天亦有所分予予之齒者去其角傅其翼者兩其足師古曰謂牛無上齒則有角其餘無角者則有上齒傅著也言鳥不四足分扶問翻予讀曰與去羌呂翻傅讀曰附古之所予祿者不食於力不動於末師古曰末謂工商之業與天同意者也夫已受大又取小天不能足而況人虖此民之所以囂囂苦不足也囂音敖囂囂衆怨愁聲也身寵而載高位載乘也因乘富貴之資力以與民爭利於下民安能如之哉民日削月朘孟康曰朘音揎謂轉踧也蘇林曰朘音鐫石俗語謂朒為朘縮師古曰孟說是也揎音宣踧音子六翻寖以大窮富者奢侈羨溢羨饒也讀與衍同音弋戰翻貧者窮急愁苦民不樂生安能避罪此刑罰之所以蕃樂音洛師古曰蕃多也音扶元翻而姦邪不可勝者也天子大夫者下民之所視效遠方之所四面而內望也近者視而放之師古曰放依也音甫往翻遠者望而效之豈可以居賢人之位而為庶人行哉行下孟翻下同夫皇皇求財利常恐乏匱者庶人之意也皇皇求仁義常恐不能化民者大夫之意也皇皇急速也致寇至此易解卦六三之辭也君子之位也負擔者小人之事也此言居君子之位而為庶人之行者患禍必至也若居君子之位當君子之行則舍公儀休之相魯無可為者矣公儀休相魯之其家見織帛怒而出其妻食於舍而茹葵慍而拔其葵曰吾已食祿而奪園夫紅女利乎舍讀曰捨言為君子者當如公儀休若廢而不遵則無可為者矣春秋大一統者天地之常經古今之通誼也師古曰一統者萬物之統皆歸于一也春秋公羊傳隱公元年春王正月何言乎王正月大一統也此言諸侯皆繫統天子不得自專也人異論百家殊方指意不同是以上無以持一統法制數變下不知所守數所角翻臣愚以為諸不在六藝之科孔子之術者皆絕其道勿使並進邪辟之說滅息辟讀曰僻然後統紀可一而法度可明民知所從矣天子善其對以仲舒為江都相會稽莊助亦以賢良對策漢書作嚴助蓋明帝諱莊避之也會工外翻按考異曰漢書武紀元光元年五月詔舉賢良董仲舒公孫弘出焉仲舒傳曰仲舒對冊推明孔氏抑黜百家立學校之官州縣舉茂才孝廉皆自仲舒發之今舉孝廉在元光元年十一月若對策在下五月則不得云自仲舒發之蓋武紀誤也然仲舒對策不知果在何時元光元年以前唯今年舉賢良見於紀三年閩越東甌相攻莊助已為中大夫故皆著之於此仲舒傳又云遼東高廟長陵高園災仲舒推說其意主父偃竊其書奏之仲舒由是得罪按二災在建元六年主父偃傳上書召見在元光元年蓋仲舒追述二災而作書或作書不上而偃後來方見其草藳也所舉賢良或治申韓蘇張之言亂國政者請皆罷奏可董仲舒少治春秋治直之翻少詩照翻孝景時為博士進退容止非禮不行學者皆師尊之及為江都相事易王江都易王非景帝子帝之兄也諡法好更故舊曰易音亦帝兄素驕好勇好呼到翻下同仲舒以禮匡正王敬重焉建元元年春二月赦建元元年行三銖錢師古曰新壞四銖錢造此錢也重如其文建元元年夏六月丞相衞綰免丙寅以魏其侯竇嬰為丞相武安侯田蚡為太尉上雅嚮儒術嬰蚡俱好儒推轂代趙綰為御史大夫蘭陵王臧為郎中令謂薦進賢者若推車轂然主於進也推吐雷翻轂古祿翻班志代縣屬代郡蘭陵縣屬東海郡王者之堂所以正四時出教化自秦滅先王之禮其制不存朝直遙翻下同秋天子使使束帛加璧安車駟馬以迎申公古者高車立乘安車坐乘據申公傳安車以蒲裹輪孔穎達曰安車若今小車者古者乘四馬之車立乘既老故乘一馬小車坐乘也余按孔氏所謂小車乃古之大夫致事者適四方所乘私車也今加禮申公迎以駟馬安車非小車也見天子天子問治亂之事申公年八十餘對曰為治者不至多言顧力行何如耳治直吏翻是時天子方好文詞見申公對默然然已招致則以為太中大夫舍魯邸議明堂巡狩改曆服色事漢制郡國皆立邸於京師申公魯人故舍魯邸建元元年是歲內史甯成抵罪髡鉗二年建元二年冬十月淮南王安來朝上以安屬為諸父而材高甚尊重之安淮南王長之子長於文帝為弟安於景帝為從弟於帝為諸父行昏暮然後罷見賢遍翻安雅善武安侯田蚡雅素也武安侯迎之霸上與語曰上無太子王親高皇帝孫行仁義天下莫不聞宮車一日晏駕非王尚誰立者安大喜厚遺蚡金錢財物遺于季翻建元二年太皇竇太后好黃老言不悅儒術趙綰請毋奏事東宮漢長樂宮在東太后居之故謂之東宮亦謂之東朝此欲復為新垣平邪事見十五卷文帝十六年復扶又翻以讓上上因廢明堂事諸所興為皆廢下綰臧吏皆自殺下遐嫁翻丞相嬰太尉蚡免申公亦以疾免歸初景帝以太子太傅石奮及四子皆二千石乃集其門號奮為萬石君石姓衞大夫石碏之後師古曰集合也凡最計也總合其一門之計五人為二千石故號萬石君而恭謹無與比子孫為小吏來歸謁萬石君必朝服見之不名朝直遙翻子孫有過失不責讓為便坐師古曰便坐於便側之處非正室也坐徂臥翻然後諸子相責因長老肉袒謝罪改之乃許子孫勝冠者在側勝音升雖燕居必冠其執喪哀戚甚悼子孫遵教皆以孝謹聞乎郡國聞音問及趙綰王臧以文學獲罪竇太后以為儒者文多質少少詩沼翻今萬石君家不言而躬行乃以其長子建為郎中令少子慶為內史建在上側事有可言屏人恣言極切至廷見如不能言者謂事有當諫正者廷見謂於百官正朝畢集之時屏必逞翻見賢遍翻慶嘗為太僕御出為上御車而出考異曰按百官公卿表慶不為太僕蓋嘗攝職也慶以策數馬畢舉手曰六馬慶於諸子中最為簡易矣易以豉翻竇嬰田蚡既免以侯家居蚡雖不任職以王太后故親幸數言事多效謂言事多見聽用數所角翻趨七喻翻皆去嬰而歸蚡蚡日益橫為嬰蚡交愬張本橫戶孟翻建元二年春二月丙戌朔日有食之建元二年三月乙未以太常柏至侯許昌為丞相昌高祖功臣許盎之孫柏至地闕建元二年初堂邑侯陳午尚帝姑館陶公主嫖帝之為太子公主有力焉班志堂邑縣屬臨淮郡陳午高祖功臣陳嬰之孫館陶縣屬魏郡公主援上為太子事見上卷景帝前七年及即位為皇后竇太主恃功求請無厭厭於鹽翻上患之皇后驕妬亶寵而無子與醫錢凡九千萬欲以求子然卒無之卒子恤翻后寵浸衰皇太后謂上曰汝新即位大臣未服先為明堂太皇太后已怒今又忤長主忤五故翻長知兩翻必重得罪重直用翻婦人性易悅耳易以豉翻宜深慎之上乃於長主皇后復稍加恩禮復扶又翻上祓霸上孟康曰祓除也於霸水上自祓除今之上巳祓禊也祓音廢又音拂過上姊平陽公主班志平陽縣屬河東郡公主景帝女降平陽侯曹壽師古曰齊歌曰謳一侯翻子夫母衞媼平陽公主家僮也師古曰僮者婢妾之總稱媼者年老之號非當時所呼也衞者舉夫家姓媼烏浩翻恩寵日隆陳皇后聞之恚幾死者數矣恚於避翻慍怒也幾居衣翻數所角翻上愈怒子夫同母弟衞青其父鄭季本平陽縣吏給事侯家師古曰縣遣於侯家供事也冒姓衞氏冒姓者青本鄭氏子而冒衞姓也為侯家騎奴大長公主執囚青大長公主即館陶公主也長知兩翻騎奇寄翻下同其友騎郎公孫敖與壯士篡取之郎之騎從者郎中有車戶騎三將逆取曰篡乃召青為建章監侍中建章宮監據史太初元年起建章宮蓋因舊宮而大起也青時為建章監而兼侍中既而以子夫為夫人青為太中大夫建元二年夏四月有星如日夜出建元二年初置茂陵邑班志茂陵邑屬扶風黃圖曰本槐里之茂鄉武帝起陵邑在長安西北八十里建元二年時大臣議者多冤鼂錯之策鼂錯事見上卷景帝前三年數奏暴其過惡吹毛求疵謂暴露其過惡數所角翻疵才斯翻病也瑕也使證其君諸侯王莫不悲怨三年建元三年冬十月代王登長沙王發中山王勝濟川王明來朝代王登王參之子文帝之孫長沙中山王皆景帝子濟川王梁孝王之子濟子禮翻勝聞樂聲而泣上問其故對曰悲者不可為累欷思者不可為嘆息累重也欷歔欷也悲思之積於心聞欷嘆之聲則其悲思益甚累力癸翻欷許既翻每聞幼眇之聲幼一笑翻眇音妙精微也不知涕泣之橫集也臣得蒙肺附為東藩屬又稱兄肺附一作肺腑史記正義曰顏師古曰舊解云肺附如肝肺之相附著也一說肺碎木札也喻其輕薄附著大材按顏此說並是疏繆又改腑為附就其義重疏繆矣八十一難云寸口者脈之大會手太陰之動脈也呂廣云太陰肺之脈也肺為諸藏之主通陰陽故十二經脈皆會于太陰所以決吉凶者十二經有病皆於寸口知其何經之動浮沉濇滑春秋逆順知其死生顧野王曰肺腑腹心也余謂史若從肺附則顏說為是若從肺腑則依正義勝王中山在關東故曰東藩以親屬言則勝於帝兄也泣亦淚也張晏曰葭蘆葉也莩葉裏白皮皆取喻於輕薄也師古曰葭蘆也莩者其筩中白皮至薄者也葭莩喻著鴻毛喻輕薄甚莩音孚朋友相為使夫宗室擯卻擯卻斥退也擯必刃翻卻丘略翻臣竊傷之具以吏所侵聞於是上乃厚諸侯之禮省有司所奏諸侯事加親親之恩焉省悉井翻建元三年河水溢于平原平原本齊地高祖置郡禹疏九河皆在平原勃海郡界建元三年大饑人相食建元三年秋七月有星孛于西北孛蒲內翻建元三年濟川王明坐殺中傅濟川王明梁孝王子應劭曰中傅宦者也漢諸王國有太傅秩二千石掌傅王以德義中傅出入王宮在王左右亦主傅教導王梁王傳作中尉此從帝紀班志房陵縣屬漢中郡建元三年七國之敗也事見上卷景帝前三年怨東甌殺其父常勸閩越擊東甌閩粵從之發兵圍東甌東甌使人告急天子天子問田蚡蚡對曰越人相攻擊固其常又數反覆數所角翻下同自秦時棄不屬不屬不臣屬也莊助曰莊姓也戰國時楚有莊周趙有莊豹特患力不能救德不能覆覆敷又翻誠能何故棄之且秦舉咸陽而棄之師古曰舉總也言總天下乃至京師皆棄之今小國以窮困來告急天子不救尚安所愬又何以子萬國乎上曰太尉不足與計考異曰史記東越漢書嚴助傳皆云建元三年閩越圍東甌天子問太尉田蚡按是時蚡不為太尉云太尉誤也下云太尉不足與計蓋追呼其官或亦誤耳不欲出虎符發兵郡國乃遣助以節發兵會稽會稽東南邊越以法距之為無漢虎符驗會工外翻守式又翻為于偽翻諭意指謂曉喻以天子不欲出虎符之意未至閩越引兵罷東甌請舉國內徙乃悉舉其衆來處於江淮之間處昌呂翻建元三年九月丙子晦日有食之建元三年上自初即位招選天下文學材智之士待以不次之位師古曰不拘常次言超擢之自眩鬻者以千數漢書作衒行賣也鬻亦賣也衒與眩同音州縣之縣又工縣翻鬻音育莊助最先進後又得吳人朱買臣趙人吾丘壽王姓譜吾音虞即虞丘氏史記有楚相虞丘子蜀人司馬相如平原東方朔風俗通曰伏羲之後帝出乎震主東方子孫為東方氏姓譜枚姓出於周官銜枚氏其後以官為姓風俗通六國有賢人枚被終姓出於顓頊裔孫陸終濟子禮翻每令與大臣辨論中外相應以義理之文大臣數屈焉然相如特以辭賦得幸朔皋不根持論好詼諧言其議論無所根據好呼到翻詼古回翻李奇曰詼嘲也師古曰俳雜戲也優調戲也左傳曰少相狎長相優俳優即今伶人調戲者終不任以事也數所角翻朔亦觀上顏色時時直諫有所補益是歲上始為微行北至池陽西至黃山班志池陽縣屬馮翊黃山宮名在扶風槐里縣東游宜春長楊宮名水經註云槐里縣東有漏水出南山赤谷東北逕長楊宮宮有長楊因名其地在盩厔界師古曰宜春宮也在長安東南說者乃以為在鄠非也在鄠者自是宜春觀在長安城西非東游也期門之號始此自稱平陽侯平陽侯曹壽尚帝姊見尊寵故稱之入南山下射鹿豕狐兔終南山橫亙關中南面西起秦隴東徹藍田凡雍岐郿鄠長安萬年相去且八百里而連綿峙據其南者皆此一山也射而亦翻民皆號呼罵詈號戶高翻鄠杜令欲執之班志鄠縣屬扶風杜縣屬京兆宣帝更為杜陵鄠音戶乃得免乘繩證翻又嘗夜至柏谷水經河水逕湖縣故城北又東合柏谷水經註云水出弘農縣西石隄山北逕柏谷亭下即帝微行處就逆旅主人求漿主人翁曰無漿正有溺耳溺奴弔翻且疑上為姦盜聚少年欲攻之主人嫗睹上狀貌而異之嫗威遇翻止其翁曰客非常人也且又有備不可圖也翁不聽嫗飲翁以酒醉而縛之飲於禁翻少年皆散走嫗乃殺雞為食以謝客明日上歸召嫗賜金千斤拜其夫為羽林郎羽林郎屬郎中令師古曰羽林宿衞之官言如羽之疾如林之多也一說曰羽所以為王者羽翼從宣曲以南十二所夜投宿長楊五柞等諸宮師古曰為休息更衣之處宣曲宮名在昆明池西五柞宮名水經註宮在盩厔縣長楊宮東北更工衡翻柞昨作二音上以道遠勞苦又為百姓所患乃使太中大夫吾丘壽王舉籍阿城以南盩厔以東宜春以西提封頃畮及其賈直師古曰舉計其數以為簿籍也阿城本秦阿房宮以其牆壁崇廣故俗呼為阿城盩厔屬扶風山曲曰盩水曲曰厔杜佑曰盩厔唐為宜壽縣提封亦謂提舉四封之內總計其大數也盩音輈厔音窒賈讀曰價屬之南山又詔中尉左右內史師古曰時未為京兆扶風馮翊故云中尉及左右內史也予據班表帝後改右內史為京兆尹左內史為左馮翊主爵都尉為右扶風是為三輔屬之欲翻草田荒田之未耕墾者壽王奏事上大說稱善說讀曰悅時東方朔在傍進諫曰夫南山天下之阻也漢興去三河之地河南河內河東為三河漢高帝始居洛陽後西都關中是去三河之地也都涇渭之南此所謂天下陸海之地霸水出藍田縣藍田谷滻水亦出藍田谷逕藍田川北出霸陵入霸水霸又北入于渭涇水註見六卷渭水出隴西首陽縣西南鳥鼠同穴山東流與霸水涇水合又東至船司空入河陸海師古曰高平曰陸關中地高故稱之耳海者萬物所出言關中陸產饒富是以謂之陸海也其山出玉石金銀銅鐵良材百工所取給萬民所卬足也卬古仰字通用音牛向翻又有秔稻棃栗桑麻竹箭之饒土宜薑芋水多䵷魚芋即蹲鴟也其葉似藕荷而長不圓其根大者為芋魁其小者附麗甚衆白膩可食䵷與蛙同師古曰似蝦蟆而小長脚無飢寒之憂故酆鎬之間號為土膏周文王都酆武王都鎬水經渭水東過槐里縣故城南東合甘水又東豐水從南來注之又東北與鎬水合班志豐水出鄠縣東南鎬水上承鎬池水於昆明池北皆在上林苑中賈與價同絕陂池水澤之利而取民膏腴之地上乏國家之用下奪農桑之業是其不可一也盛荊棘之林廣狐菟之苑菟古兔字通用壞人塚墓虛讀曰墟壞音怪發人室廬令幼弱懷土而思耆老泣涕而悲是其不可二也賀瑒曰耆至也至老之境也垣而囿之騎馳東西車騖南北師古曰亂馳曰騖夫一日之樂不足以危無隄之輿蘇林曰隄限也輿乘輿也無限若言不訾也不敢斥天子故曰輿也張晏曰一日之樂謂田獵也無隄之輿謂天子富貴無隄限貢父曰不足以危不字當作亦隄亦防也言車輿馳騁不為防慮必有顛蹶之變樂音洛夫殷作九市之宮而諸侯畔應劭曰紂於宮中設九市師古曰楚靈王作章華之臺納亡人以實之卒有乾谿之禍也章華臺在華容城也糞土愚臣逆盛意罪當萬死上乃拜朔為太中大夫給事中百官表給事中加官師古曰漢官解詁云掌侍從左右無員常侍中續漢志給事中關通內外蓋以給事禁中名官也然遂起上林苑如壽王所奏上又好自擊熊豕說文熊似豕山居冬蟄春出詩疏熊能攀緣上樹見人則顛倒投地而下豕謂野豕也生一歲為從二歲為幵二獸皆能突人司馬相如上疏諫曰臣聞物有同類而殊能者故力稱烏獲捷言慶忌勇期賁育烏獲秦武王力士也慶忌吳王僚之子射能捷矢也孟賁古之勇士水行不避蛟龍陸行不避豺狼發怒吐氣聲響動天夏育亦猛士也賁音奔竊以為人誠有之獸亦宜然今陛下好陵阻險射猛獸卒然遇逸材之獸駭不存之地師古曰不存不可得安存也貢父曰不存猶言不虞下文云存變之意射而亦翻卒讀曰猝屬車註見十三卷師古曰屬者言聯屬不絕也塵謂行而起塵也言清者尊貴之意也說者乃以清塵為清道灑塵非也人不暇施巧雖有烏獲逄蒙之技逢蒙古之善射者也孟子曰逄蒙學射於羿逄皮江翻宜承上文為句盡為難矣是胡越起於轂下而羌夷接軫也軫後車橫木也雖萬全而無患然本非天子之所宜近也近其靳翻且夫清道而後行中路而馳猶時有銜橛之變張揖曰銜馬勒銜也橛騑馬口長銜也師古曰橛謂車之鈎心也銜橛之變言馬銜或斷鈎心或出則致傾敗以傷人也橛鉅月翻豐草茂草也前有利獸之樂虛讀曰墟樂音洛下同而內無存變之意其為害也不難矣夫輕萬乘之重不以為安樂出萬有一危之塗以為娛臣竊為陛下不取為于偽翻蓋明者遠見於未萌師古曰萌謂事始若草木初生者也知讀曰智禍固多藏於隱微而發於人之所忽者也故鄙諺曰家累千金坐不垂堂張揖曰畏櫚瓦墮中人也師古曰垂堂者近堂邊外自恐墜墮耳非畏櫚瓦也言富人之子則自愛深矣可以諭大上善之考異曰此多非今年事因莊助救東甌及微行始出終言之四年建元四年夏有風赤如血建元四年六月旱建元四年秋九月有星孛于東北孛蒲內翻建元四年是歲南越王佗死佗徒河翻其孫文王胡立五年建元五年春罷三銖錢行半兩錢建元元年行三銖錢至是而罷又新鑄半兩錢建元五年置五經博士建元五年夏五月大蝗建元五年秋八月廣川惠王越清河哀王乘皆薨無後國除二王皆景帝子越中二年四月受封乘中三年三月受封至是國除六年建元六年春二月乙未遼東高廟災景帝令郡國各立高祖廟故遼東有高廟建元六年夏四月壬子高園便殿火上素服五日師古曰凡言便殿便室便坐者皆非正大之處所以就便安也園者於陵上作之既有正寢以象平生又立便殿為休息閑宴之處耳便如字沈約曰漢氏諸陵皆有園寢承秦所為也說者以為古前廟後寢以象人主前有朝後有寢也廟以藏主四時祭祀寢有衣冠象生之具以薦新秦始出寢起於墓側漢因不改及魏武帝葬高陵有司依漢立陵上祭殿文帝以為古不墓祭皆設於廟高陵上殿屋皆毀壞車馬還广既衣服藏府文帝自作終制又曰壽陵無立寢殿造園邑自是至今陵寢遂絕建元六年五月丁亥太皇太后崩孝文皇后竇氏也建元六年六月癸巳丞相昌免許昌也蚡驕侈治宅甲諸第田園極膏腴師古曰甲諸第者言為諸第之最也以甲乙之次言甲則為上矣膏腴謂肥厚之處治直之翻相屬於道多受四方賂遺其家金玉婦女狗馬聲樂玩好不可勝數屬之欲翻遺于季翻好呼到翻勝音升每入奏事坐語移日所言皆聽薦人或起家至二千石權移主上上乃曰君除吏已盡未吾亦欲除吏嘗請考工地益宅考工少府之屬官也主作器械君何不遂取武庫是後乃稍退建元六年秋八月有星孛于東方長竟天孛蒲內翻建元六年閩越王郢興兵擊南越邊邑南越王守天子約不敢亶興兵使人上書告天子於是天子多南越義大為發兵為于偽翻下同遣大行王恢出豫章大農令韓安國出會稽大農令本秦之治粟內史也漢初因之景帝中六年更名大農令帝太初元年更名大司農淮南王安上書諫曰陛下臨天下布德施惠天下攝然孟康曰攝安也奴協翻人安其生自以沒身不見兵革今聞有司舉兵將以誅越臣安竊為陛下重之師古曰重難也越方外之地剪髮文身之民也晉灼曰淮南云越人劗髮張揖以為古剪字師古曰劗與剪同張說是也應劭曰越人常在水中故斷其髮文其身以象龍子欲不見傷害自三代之盛胡越不與受正朔與讀曰預非強勿能服威弗能制也以為不居之地不牧之民不足以煩中國也師古曰地不可居而民不可牧養也越人相攻擊者不可勝數勝音升然天子未嘗舉兵而入其地也臣聞越非有城郭邑里也處谿谷之間篁竹之中處昌呂翻服虔曰竹叢曰篁師古曰竹田曰篁音皇習於水鬬便於用舟地深昧而多水險昧暗也言多草木也雖百不當其一得其地不可郡縣也攻之不可暴取也以地圖察其山川要塞相去不過寸數而間獨數百千里師古曰間中間也或八九百里或千里也師古曰不能盡載於地圖也著竹助翻行之甚難天下賴宗廟之靈方內大寧戴白之老師古曰言白髮在首民得夫婦相守父子相保陛下之德也越人名為藩臣貢酎之奉不輸大內貢者以土產之物來貢也酎者三重釀醇酒也味厚故以薦宗廟也漢制於正月旦作酒八月成曰酎酎之言純也八月嘗酎於太廟諸侯王各出金助祭所謂酎金也大內都內也國之寶藏班表治粟屬官有都內令丞言越國僻遠既不輸土貢又不輸酎金於中國得其地無益也酎直又翻章乙十一行本奉作用孔本同不給上事給供也而陛下發兵救之是反以中國而勞蠻夷也師古曰疲勞中國之人於蠻夷之地戇陟降翻負約反覆其不用天子之法度非一日之積也師古曰積久也舉兵誅之臣恐後兵革無時得息也間者數年歲比不登民待賣爵贅子以接衣食比毗至翻如淳曰淮南俗賣子與人作奴婢名曰贅子三年不能贖遂為奴婢師古曰贅質也一說云贅子者謂令子出就婦家為贅壻賴陛下德澤振救之得毋轉死溝壑四年不登五年復蝗民生未復年復扶又翻未復如字今發兵行數千里資衣糧師古曰資猶齎也輿轎而隃領拕舟而入水轎竹輿車江南人又謂之籃輿領山嶺也不通舟車故用肩輿以行轎旗妙翻拕音他曳也夾以深林叢竹水道上下擊石謂水道多巨石船行上下皆與石相擊觸也應劭曰蝮蛇一名虺蠚螫也螫人手足則割去其肉不然則死師古曰爾雅及說文皆以為蝮即虺也博三寸首大如擘而郭璞云各自一種蛇其蝮蛇大頭細頸焦尾色如綬文文間有毛似豬鬣鼻上有針大者七八尺一名反鼻非虺之類也以今俗名證之郭說得矣虺若土色所在有之俗呼土虺其蝮惟出南方蝮敷福翻歐泄霍亂之病相隨屬也歐吐也泄利也師古曰泄以制翻屬之欲翻死傷者必衆矣前時南海王反陛下先臣使將軍間忌將兵擊之文穎曰先臣淮南厲王長也間忌人姓名也師古曰淮南王傳作簡忌此本作間傳寫字誤省耳左傳有魯大夫簡叔處之上淦班志豫章郡有新淦縣應劭註云淦水所出上淦蓋淦水之上流也降戶江翻處昌呂翻淦音紺又工含翻會天暑多雨樓船卒水居擊棹師古曰言常居舟中水上而又有擊棹行舟之役故多死也復扶又翻親老涕泣孤子啼號號戶高翻破家散業迎尸千里之外裹骸骨而歸悲哀之氣數年不息長老至今以為記曾未入其地而禍已至此矣曾才登翻陛下德配天地明象日月恩至禽獸澤及草木一人有飢寒不終其天年而死者為之悽愴於心今方內無狗吠之警而使陛下甲卒死亡暴露中原霑漬山谷邊境之民為之早閉晏開師古曰晏晚也言有兵難故邊城早閉而晚開也為于偽翻下同師古曰言憂危亡不自保也不習南方地形者多以越為人衆兵強能難邊城服虔曰為邊城作難也難乃旦翻多為邊吏師古曰全國謂未分為三之時也淮南人於邊為吏與越接境故知其地形也與中國異師古曰言其風土不同人迹絕車道不通天地所以隔外內也其入中國必下領水領水之山峭峻漂石破舟領水即贛水也班志所謂彭水出豫章南壄縣東入湖漢水庾仲初所謂大庾嶠水北入豫章注于江者是也漂石破舟言三百里贛石越人欲為變必先田餘干界中班志豫章郡有餘汗縣應劭曰汗音干今饒州餘干縣漢古縣名也乃入伐材治船治直之翻邊城守候誠謹越人有入伐材者輒收捕焚其積聚積子賜翻聚慈諭翻雖百越柰邊城何且越人帛丿糸力薄材師古曰帛丿糸弱也言其柔弱如帛丿糸又無車騎弓弩之用然而不可入者以保地險而中國之人不耐其水土也臣聞越甲卒不下數十萬所以入之五倍乃足師古曰不下言不減也漢軍多之五倍然後可入其地也師古曰輓音晚引車也南方暑濕近夏癉熱近其靳翻師古曰癉黃病也丁幹翻暴露水居蝮蛇蠚生師古曰蠚毒也音壑疢丑刃翻病也兵未血刃而病死者什二三雖舉越國而虜之不足以償所亡師古曰舉謂總取也臣聞道路言閩越王弟甲弒而殺之甲以誅死甲者閩越王弟之名陛下若欲來內處之中國處昌呂翻使重臣臨存師古曰存謂省問之此必攜幼扶老以歸聖德若陛下無所用之則繼其絕世存其亡國建其王侯以為畜越李奇曰如人畜養六畜也師古曰直謂畜養之耳非六畜也畜許六翻世共貢職共讀曰供陛下以方寸之印丈二之組填撫方外不勞一卒不頓一戟師古曰頓壞也讀曰鈍而威德並行今以兵入其地此必震恐以有司為欲屠滅之也必雉兔逃入山林險阻師古曰如雉兔之逃竄而入山林險阻之中則復相㣥聚留而守之歷歲經年則士卒罷勌背蒲妹翻罷讀曰疲勌即倦字食糧乏絕民苦兵事盜賊必起臣聞長老言秦之時嘗使尉屠睢擊越張晏曰郡都尉姓屠名睢晉有屠岸賈屠蒯睢音雖張晏曰監郡御史也名祿案秦郡置守尉監不可得攻留軍屯守空地曠日引久士卒勞勌越出擊之秦兵大敗乃發適戍以備之適讀曰讁當此之時外內騷動皆不聊生亡逃相從㣥為盜賊於是山東之難始興難乃旦翻兵者凶事一方有急四面皆聳臣恐變故之生姦邪之作由此始也臣聞天子之兵有征而無戰言莫敢校也師古曰校計也不敢與計強弱曲直徼工堯翻文穎曰顏行猶雁行在前行故曰顏也行戶剛翻廝輿之卒有一不備而歸者張晏曰廝微輿衆也師古曰廝析薪者輿主駕車者皆言賤役之人也臣猶竊為大漢羞之為于偽翻陛下以四海為境生民之屬皆為臣妾垂德惠以覆露之覆謂蓋幬也露謂使之霑潤澤也覆敷又翻則澤被萬世樂音洛被皮義翻傳之子孫施之無窮天下之安猶泰山而四維之也師古曰維謂聯繫之何足以為一日之閒如淳曰得其地不足為一日閒暇之娛也詩云王猶允塞徐方既來師古曰大雅常武之詩也允信也塞滿也言王道信充滿於天下則徐方淮夷盡來服也塞悉則翻臣安竊恐將吏之以十萬之師為一使之任也師古曰言漢發一使鎮撫之則越人賓服不煩兵往使疏吏翻是時漢兵遂出未隃領隃與踰同領與嶺同其弟餘善乃與相宗族謀曰相閩越國相也音息亮翻王以亶發兵擊南越不請故天子兵來誅漢兵衆強即幸勝之後來益多師古曰言漢地廣大兵衆盛強今雖勝之後必復來也今殺王以謝天子天子聽罷兵固國完不聽乃力戰不勝即亡入海皆曰善即鏦殺王鏦初江翻短矛也使使奉其頭致大行大行曰所為來者誅王為于偽翻下同今王頭至謝罪不戰而殞利莫大焉乃以便宜案兵告大農軍而使使奉王頭馳報天子詔罷兩將兵將即亮翻曰郢等首惡獨無諸孫繇君丑不與謀焉張晏曰繇邑號也師古曰繇音搖與讀曰預奉閩越先祭祀餘善已殺郢威行於國國民多屬竊自立為王繇王不能制上聞之為餘善不足復興師曰餘善數與郢謀亂復扶又翻數所角翻而後首誅郢師得不勞因立餘善為東越王與繇王並處處昌呂翻上使莊助諭意南越南越王胡頓首曰天子乃為臣興兵討閩越死無以報德遣太子嬰齊入宿衞謂助曰國新被寇被皮義翻使者行矣胡方日夜裝入見天子見賢遍翻下同助還過淮南上又使助諭淮南王安以討越事嘉答其意安謝不及助既去南越南越大臣皆諫其王曰漢興兵誅郢亦行以驚動南越且先王昔言事天子期無失禮要之不可以說好語入見言不可喜漢使好語而入朝也說讀曰悅亡國之勢也於是胡稱病竟不入見建元六年是歲韓安國為御史大夫建元六年東海太守濮陽汲黯為主爵都尉按汲黯傳其先有寵於衞君至黯十世世為卿大夫蓋食采於汲因以為氏班表主爵中尉秦官掌列侯景帝中六年更名都尉武帝太初元年更名右扶風治內史右地濮博木翻黯為謁者以嚴見憚東越相攻上使黯往視之不至至吳而還報曰越人相攻固其俗然不足以辱天子之使河內失火延燒千餘家上使黯往視之還報曰家人失火屋比延燒師古曰家人猶言庶人家也比近也言屋相近故連延而燒也比頻寐翻臣過河南河南貧人傷水旱萬餘家或父子相食臣謹以便宜持節發河南倉粟以振貧民臣請歸節伏矯制之罪師古曰矯託也託言奉制詔而行之也漢律矯制者論棄市罪其在東海治官理民好清靜擇丞史任之如淳曰擇丞及史任之也漢律太守都尉諸侯內史史各一人卒史書佐各十人余據漢制郡守之屬有丞有諸曹掾史好呼到翻不苛小黯多病臥閨閣內不出歲餘東海大治稱之治直吏翻下同上聞召為主爵都尉列於九卿漢太常郎中令中大夫令太僕大理大行令宗正大司農少府為正九卿中尉主爵都尉內史列於九卿引大體不拘文法黯為人性倨少禮師古曰倨簡傲也少詩沼翻不能容人之過折之舌翻時天子方招文學儒者上曰吾欲云云張晏曰所言欲施仁義也師古曰云云猶言如此如此也史略其辭耳陛下內多欲而外施仁義柰何欲效唐虞之治乎上默然怒變色而罷朝公卿皆為黯懼上退謂左右曰甚矣汲黯之戇也㣥臣或數黯師古曰數責也音所具翻黯曰天子置公卿輔弼之臣寧令從諛承意陷主於不義乎且已在其位縱愛身柰辱朝廷何黯多病病且滿三月上常賜告者數數所角翻終不愈最後病莊助為請告為于偽翻上曰汲黯何如人哉助曰使黯任職居官無以踰人然至其輔少主守城深堅招之不來麾之不去雖自謂賁育亦不能奪之矣賁音奔上曰然古有社稷之臣至如黯近之矣近其靳翻建元六年匈奴來請和親天子下其議下遐嫁翻大行王恢燕人也習胡事議曰漢與匈奴和親率不過數歲即復倍約倍蒲妹翻不如勿許興兵擊之韓安國曰匈奴遷徙鳥舉難得而制言其輕疾逐水草遷徙若鳥之舉也不以人類待之則人馬罷乏罷讀曰疲虜以全制其敝此危道也不如和親㣥臣議者多附安國於是上許和親元光元年丁未前一三四建元六年冬十一月初令郡國舉孝廉各一人師古曰孝謂善事父母者廉謂清廉有廉隅者也建元六年衞尉李廣為驍騎將軍屯雲中周末置左右前後將軍秦漢因之位上卿至武帝置驍騎車騎等將軍後來名號浸多不可勝紀謂之雜號將軍盤洲洪氏曰西漢雜號將軍掌征伐背叛事訖則罷不常置也驍堅堯翻姓譜程本自顓頊重黎之後周宣王時程伯休父入為大司馬封於程者以為氏與司馬氏同出六月罷廣與程不識俱以邊太守將兵有名當時廣行無部伍行陳部者軍行各有分部伍者五人為伍也部有校尉伍有伍長行戶剛翻陳讀曰陣人人自便不擊刁斗以自衞孟康曰刁斗以銅作鐎受一斗晝炊飲食夜擊持行夜名曰刁斗蘇林曰形如鋗無緣荀悅曰刁斗小鈴如宮中傳夜鈴也索隱曰鋗即鈴也埤蒼云鐎溫器有柄斗似銚無緣師古曰鐎音譙鋗火玄翻鋗即銚也銚音姚緣去聲然亦遠斥候淮南子曰斥度也候視也望也程不識正部曲行伍營陳擊刁斗士吏治軍簿師古曰簿文簿治直之翻下言治同軍不得休息然亦未嘗遇害不識曰李廣軍極簡易易以豉翻然虜卒犯之無以禁也卒讀曰猝而其士卒亦佚樂咸樂為之死樂音洛下同我軍雖煩擾然虜亦不得犯我然匈奴畏李廣之略士卒亦多樂從李廣而苦程不識師古曰苦謂厭苦之也臣光曰易曰師出以律否臧凶否音鄙易師卦初六爻辭王弼註曰齊衆以律失律則散故師出以律律不可失失律而臧何異於否失令有功法所不赦故師出不以律否臧皆凶言治衆而不用法無不凶也李廣之將使人人自便以廣之材如此焉可也然不可以為法何則其繼者難也況與之並時而為將乎夫小人之情樂於安肆而昧於近禍彼既以程不識為煩擾而樂於從廣且將仇其上而不服然則簡易之害非徒廣軍無以禁虜之倉卒而已也故曰兵事以嚴終為將者亦嚴而已矣然則傚程不識雖無功猶不敗傚李廣鮮不覆亡哉鮮息淺翻建元六年夏四月赦天下建元六年五月詔舉賢良文學上親策之建元六年秋七月癸未日有食之聶崇岐標點容肇祖覆校
