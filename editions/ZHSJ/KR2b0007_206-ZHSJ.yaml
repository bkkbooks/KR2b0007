body:
  text: 資治通鑑卷第二百六端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註唐紀二十二則天順聖皇后中之下神功元年神功元年丁酉六九七時以契丹破滅九鼎就成以九月大享改元為神功神功元年正月己亥朔太后享通天宮神功元年突厥默啜寇靈州以許欽明自隨欽明為默啜所禽見上卷上年厥九勿翻求美醬梁米及墨氾勝之曰梁是秫粟陶弘景曰凡曰梁米皆是粟類惟其牙頭色異為分別耳有青黃白三種青梁味短色惡不如黃白梁呼火故翻將即亮翻而城中無諭其意者神功元年箕州刺史劉思禮學相人於術士張憬藏憬藏謂思禮當歷箕州位至太師思禮念太師人臣極貴非佐命無以致之乃與洛州錄事參軍綦連耀謀反相悉亮翻下相術同憬居永翻唐京都錄事參軍正七品綦連虜姓也魏收官氏志西方諸姓有綦連氏陰結朝士朝直遙翻託相術許人富貴俟其意悅因說以綦連耀有天命說輸芮翻公必因之以得富貴鳳閣舍人王勮兼天官侍郎事勮其據翻用思禮為箕州刺史明堂尉吉章十二行本吉上有河南二字乙十一行本同孔本同張校同頊聞其謀以告合宮尉來俊臣高宗總章元年分西京萬年縣為明堂縣永昌元年改東都河南縣為合宮縣宋白曰明堂縣理京兆城中永樂坊上時掌翻下同太后使河內王武懿宗推之懿宗令思禮廣引朝士許免其死凡小忤意皆引之忤五故翻於是思禮引鳳閣侍郎同平章事李元素夏官侍郎同平章事孫元亨知天官侍郎事石抱忠劉奇給事中周譒譒補過翻及王勮兄涇州刺史勔弟監察御史助等勔彌兗翻監古銜翻凡三十六家皆海內名士窮楚毒以成其獄壬戌皆族誅之親黨連坐流竄者千餘人初懿宗寬思禮於外使誣引諸人諸人既誅然後收思禮思禮悔之懿宗自天授以來太后數使之鞫獄喜誣陷人數所角翻喜許記翻時人以為周來之亞來俊臣欲亶其功復羅告吉頊復扶又翻下是復宗復同頊上變得召見僅免見賢遍翻俊臣由是復用而頊亦以此得進俊臣黨人羅告司刑府史樊惎謀反誅之唐制大理寺有府二十八人史五十六人惎渠記翻朝直遙翻無敢理者乃援刀自刳其腹援于元翻秋官侍郎上邽劉如璿見之上邽縣漢屬隴西郡古邽戎邑也後漢屬漢陽郡後魏諱珪改名上封屬天水郡隋復舊唐屬秦州璿似宣翻俊臣奏如璿黨惡逆下獄處以絞刑下遐嫁翻處昌呂翻制流瀼州神功元年尚乘奉御張易之行成之族孫也張行成事太宗美姿容善音律少詩照翻太平公主薦易之弟昌宗入侍禁中昌宗復薦易之兄弟皆得幸於太后常傅朱粉衣錦繡昌宗累遷散騎常侍散悉亶翻騎奇寄翻龍朔改衞尉為司衞光宅因之賞賜不可勝紀勝音升仍敕鳳閣侍郎李迥秀為臧氏私夫迥秀大亮之族孫也李大亮歷事高祖太宗爭執鞭轡謂易之為五郎昌宗為六郎神功元年癸亥突厥默啜寇勝州平狄軍副使安道買擊破之代州北有大武軍調露元年改曰神武軍天授二年改曰平狄軍使疏吏翻神功元年甲子以原州司馬婁師德守鳳閣侍郎同平章事神功元年春三月戊申清邊道總管王孝傑蘇宏暉等將兵十七萬與孫萬榮戰于東硤石谷唐兵大敗孝傑死之將即亮翻孝傑遇契丹帥精兵為前鋒帥讀曰率力戰契丹引退契欺訖翻又音喫孝傑追之行背懸崖背蒲妹翻契丹回兵薄之薄伯各翻宏暉先遁孝傑墜崖死將士死亡殆盡考異曰朝野僉載云孝傑將四十萬衆被賊誘退逼就懸崖漸漸挨排一一落間坑深萬丈尸與崖平匹馬無歸單兵莫返張鷟語事多過其實今不盡取太后贈孝傑官爵遣使斬宏暉以徇使者未至宏暉以立功得免說讀曰悅使疏吏翻下同武攸宜軍漁陽漁陽秦右北平郡所治也隋為漁陽縣屬幽州在幽州東二百一十里軍中震恐不敢進契丹乘勝寇幽州攻陷城邑剽掠吏民攸宜遣將擊之不克剽匹妙翻將即亮翻神功元年閻知微田歸道同使突厥冊默啜為可汗可從刊入聲汗音寒輒與之緋袍銀帶且上言虜使至都宜大為供張上時掌翻下同供他用翻張知亮翻歸道上言突厥背誕積年方今悔過宜待聖恩寬宥今知微亶與之袍帶使朝廷無以復加背蒲妹翻朝直遙翻下同復扶又翻宜令反初服以俟朝恩令力丁翻初服突厥遣來所被之服又小虜使臣不足大為供張太后然之知微見默啜舞蹈吮其靴鼻吮如兗翻歸道長揖不拜默啜囚歸道將殺之歸道辭色不撓責其無厭撓奴教翻厭於鹽翻為陳禍福為于偽翻阿波達干元珍曰突厥官二十八等自設至達干皆世其官此即阿史德元珍大國使者不可殺也默啜怒稍解但拘留不遣初咸亨中突厥有降者皆處之豐勝靈夏朔代六州至是默啜求六州降戶及單于都護府之地幷穀種繒帛農器鐵降戶江翻處昌呂翻夏戶雅翻單音蟬種章勇翻繒慈陵翻太后不許默啜怒言辭悖慢悖蒲內翻又蒲沒翻姚璹楊再思以契丹未平請依默啜所求給之麟臺少監知鳳閣侍郎贊皇李嶠曰麟臺少監即祕書少監贊皇縣隋置屬趙州取贊皇山以為名少詩照翻戎狄貪而無信此所謂借寇兵資盜糧也秦李斯之言治直之翻璹再思固請與之乃悉驅六州降戶數千帳以與默啜幷給穀種四萬斛雜綵五萬段農器三千事鐵四萬斤幷許其昏默啜由是益強田歸道始得還與閻知微爭論於太后前歸道以為默啜必負約不可恃和親宜為之備知微以為和親必可保考異曰舊歸道傳云聖曆初默啜請和遣閻知微冊為立功報國可汗知微亶與使者緋袍歸道上言不可及默啜將至單于都護府乃令歸道攝司賓卿迎勞之默啜請六胡州不許遂拘縶歸道突厥傳云李盡忠孫萬榮陷營府默啜請為國討契丹許之默啜部衆漸盛則天遣使冊為立功報國可汗朝野僉載云歸道為知微副見默啜不拜默啜倒懸將殺之元珍諫乃放之按神功元年八月姚璹左遷益州長史則與之穀帛必在此前非聖曆初也實錄萬歲通天元年九月丁卯以默啜不同契丹之逆遣閻知微冊為遷善可汗則於時未為立功報國可汗也冊拜此號實錄無之不知的在何時今因契丹未平姚璹未出附見於此歸道在朝為左衞郎將何得預論默啜蓋在道見知微所為而上言耳其事則兼采諸書可信者存之神功元年夏四月鑄九鼎成徙置通天宮豫州鼎高丈八尺受千八百石餘州高丈四尺受千二百石豫州鼎獨高大神都畿也高古犒翻共用銅五十六萬七百餘斤太后欲以黃金千兩塗之姚璹曰九鼎神器貴於天質自然且臣觀其五采煥炳相雜不待金色以為炫燿炫熒絹翻太后從之自玄武門曳入令宰相諸王帥南北牙宿衞兵十餘萬人幷仗內大牛白象共曳之帥讀曰率神功元年前益州長史王及善已致仕會契丹作亂山東不安起為滑州刺史太后召見見賢遍翻問以朝廷得失及善陳治亂之要十餘條治直吏翻太后曰外州末事此為根本卿不可出癸酉留為內史神功元年癸未以右金吾衞大將軍武懿宗為神兵道行軍大總管與右豹韜衞將軍何迦密將兵擊契丹迦古牙翻又居伽翻將即亮翻五月癸卯又以婁師德為清邊道副大總管右武威衞將軍沙吒忠義為前軍總管沙吒虜姓吒初加翻先是有朱前疑者先悉薦翻上書云臣夢陛下壽滿八百即拜拾遺又自言夢陛下髮白再玄齒落更生遷駕部郎中唐駕部郎掌邦國輿輦車乘傳驛广既牧官司馬牛雜畜簿籍辯其出入司其名數上時掌翻下同上書曰聞嵩山呼萬歲賜以緋算袋唐初職事官三品以上賜金裝刀礪石一品以下則有手巾算袋開元以後百官朔望朝參外官衙日則佩算袋各隨其所服之色餘日則否使疏吏翻於綠衫上佩之會發兵討契丹敕京官出馬一匹供軍酬以五品前疑買馬輸之屢抗表求進階太后惡其貪鄙惡烏路翻六月乙丑敕還其馬斥歸田里神功元年右司郎中馮翊喬知之有美妾曰碧玉知之為之不昏為于偽翻武承嗣借以教諸姬遂留不還知之作綠珠怨以寄之晉石崇有愛妾曰綠珠事見八十三卷晉惠帝永康三年承嗣得詩於裙帶大怒諷酷吏羅告族之考異曰唐曆天授元年二月十日誅喬知之新本紀八月壬戌殺右司郎中喬知之盧藏用陳氏別傳趙儋陳子昂旌德碑皆云契丹以營州叛建安郡王武攸宜親總戎律特詔左補闕喬知之及公參謀幃幕及軍罷以父年老表乞歸侍攸宜討契丹在萬歲通天元年明年平契丹子昂集有西還至散關答喬補闕詩云昔君事胡馬余得奉戎旃攜手同沙塞關河緬幽燕歎此南歸日猶聞北戍邊疑知之之死在神功年後但唐曆統紀新紀殺知之皆在天授元年今據子昂詩必無誤者然云猶聞北戍邊則軍未罷也又武后云來俊臣死後不聞有反者故置於此據朝野僉載知之以婢碧玉事為武承嗣諷人羅告之斬於市南破家籍沒此時知之在邊蓋承嗣先銜之至此乃殺之耳神功元年司僕少卿來俊臣光宅改太僕為司僕士民妻妾有美者百方取之或使人羅告其罪矯稱敕以取其妻前後羅織誅人不可勝計勝音升自宰相以下籍其姓名而取之考異曰朝野僉載云俊臣嘗以三月三日萃其黨於龍門豎石題朝士姓名以卜之令投石遙擊倒者則先令告至暮投李昭德不中今不取監察御史李昭德素惡俊臣惡烏路翻又嘗庭辱秋官侍郎皇甫丈章十二行本丈作文乙十一行本同孔本同退齋校同備二人共誣昭德謀反下獄下遐嫁翻下不下乃下同俊臣欲羅告武氏諸王及太平公主又欲誣皇嗣及廬陵王與南北牙同反冀因此盜國權河東人衞遂忠告之諸武及太平公主恐懼共發其罪繫獄有司處以極刑處昌呂翻太后欲赦之奏上三日不出上時掌翻王及善曰俊臣凶狡貪暴國之元惡不去之必動搖朝廷去羌呂翻朝直遙翻太后遊苑中吉頊執轡太后問以外事對曰外人唯怪來俊臣奏不下太后曰俊臣有功於國朕方思之頊曰于安遠告虺貞反既而果反貞事見上卷垂拱四年俊臣聚結不逞誣構良善贓賄如山冤魂塞路塞悉則翻國之賊也何足惜哉太后乃下其奏丁卯昭德俊臣同棄市時人無不痛昭德而快俊臣仇家爭噉俊臣之肉斯須而盡抉眼剝面披腹出心騰蹋成泥噉徒濫翻又徒覽翻抉於決翻太后知天下惡之乃下制數其罪惡惡烏路翻數所具翻且曰宜加赤族之誅以雪蒼生之憤可準法籍沒其家士民皆相賀於路曰自今眠者背始帖席矣俊臣以告綦連耀功賞奴婢十人俊臣閱司農婢無可者唐六典司農丞掌凡官戶奴婢男女成人先以本色偶若給賜許其妻子相隨若犯籍沒以其所能各配諸司婦人巧者入掖庭善歌舞欲得以為賞口乃使人誣告斛瑟羅反諸酋長詣闕割耳剺面訟冤者數千人酋慈由翻長知兩翻剺里之翻會俊臣誅乃得免俊臣方用事選司受其屬請不次除官者每銓數百人俊臣敗侍郎皆自首選須絹翻屬之欲翻首式又翻太后責之對曰臣負陛下死罪臣亂國家法罪止一身違俊臣語立見滅族太后乃赦之上林令侯敏唐司農之屬有上林署令從七品下掌苑囿縣地之事凡植果樹蔬以供朝會祭祀及季冬藏冰皆主之其妻董氏諫之曰俊臣國賊指日將敗君宜遠之遠于願翻敏從之俊臣怒出為武龍令武龍縣屬田州開蠻洞置舊書作武籠云失廢置年月又涪州有武龍縣武德二年分涪陵置妻曰速去勿留俊臣敗其黨皆流嶺南敏獨得免太后徵于安遠為尚食奉御擢吉頊為右肅政中丞神功元年以檢校夏官侍郎宗楚客同平章事神功元年武懿宗軍至趙州聞契丹將駱務整數千騎將至冀州丹將即亮翻下同騎奇寄翻下同懿宗懼欲南遁或曰虜無輜重重直用翻以抄掠為資抄楚交翻若按兵拒守勢必離散從而擊之可有大功懿宗不從退據相州相悉亮翻委棄軍資器仗甚衆契丹遂屠趙州甲午嚴午改申孫萬榮為奴所殺萬榮之破王孝傑也於柳城西北四百里依險築城留其老弱婦女所獲器仗資財使妹夫乙冤羽守之引精兵寇幽州恐突厥默啜襲其後遣五人至黑沙語默啜曰黑沙突厥庭語牛倨翻我已破王孝傑百萬之衆唐人破膽請與可汗乘勝共取幽州三人先至默啜喜賜以緋袍二人後至默啜怒其稽緩將殺之二人曰請一言而死默啜問其故二人以契丹之情告默啜乃殺前三人而賜二人緋使為鄉導鄉讀曰嚮發兵取契丹新城殺所獲涼州都督許欽明以祭天圍新城三日克之新城即前契丹所築在柳城西北者使乙冤羽馳報萬榮時萬榮方與唐兵相持軍中聞之忷懼忷許勇翻奚人叛萬榮神兵道總管楊玄基擊其前奚兵擊其後獲其將何阿小萬榮軍大潰阿烏葛翻考異曰朝野僉載突厥破萬榮新城㣥賊聞之失色衆皆潰散不云為玄基等所破實錄但云為玄基及奚所破不云突厥取新城要之契丹聞新城破衆心已離唐與奚人擊之遂潰耳今兩取之帥輕騎數千東走帥讀曰率前軍總管張九節遣兵邀之於道萬榮窮蹙與其奴逃至潞水東鮑丘水從塞外來南過幽州潞縣謂之潞水嘆曰今欲歸唐罪已大歸突厥亦死歸新羅亦死將安之乎奴斬其首以降降戶江翻下同梟之四方館門漢有藳街蠻夷邸後魏置諸國使邸其後又作四館以處四方來降者事見一百四十九卷梁武帝普通元年至隋煬帝置四方館於建國門外以待四方使客各掌其方國及互市事屬鴻臚寺唐以四方館隸中書省通事舍人主之梟堅堯翻霫而立翻神功元年戊子特進武承嗣春官尚書武三思並同鳳閣鸞臺三品神功元年辛卯制以契丹初平命河內王武懿宗婁師德及魏州刺史狄仁傑分道安撫河北懿宗所至殘酷民有為契丹所脅從復來歸者復扶又翻懿宗皆以為反生刳取其膽先是何阿小嗜殺人先悉薦翻河北人為之語曰唯此兩何殺人最多武懿宗封河內王與何阿小為兩何神功元年秋七月丁酉昆明內附置竇州神功元年武承嗣武三思並罷政事神功元年庚午武攸宜自幽州凱旋武懿宗奏河北百姓從賊者請盡族之左拾遺王求禮庭折之曰折之舌翻此屬素無武備力不勝賊苟從之以求生豈有叛國之心懿宗擁強兵數十萬望風退走賊徒滋蔓又欲委罪於草野詿誤之人蔓音萬詿戶卦翻為臣不忠請先斬懿宗以謝河北懿宗不能對司刑卿杜景儉亦奏此皆脅從之人請悉原之太后從之神功元年八月丙戌納言姚璹坐事左遷益州長史以太子宮尹豆盧欽望為文昌右相鳳閣鸞臺三品天授中改太子詹事為太子宮尹鳳閣之上當有同字考異曰新表庚子狄仁傑兼納言武三思檢校內史欽望為文昌右相同三品舊紀傳及新紀皆無之此月無庚子仁傑三思除命在明年新表誤重複神功元年九月壬辰大享通天宮大赦章十二行本無大字赦下有天下二字乙十一行本同改元改元神功神功元年庚戌婁師德守納言神功元年甲寅太后謂侍臣曰頃者周興來俊臣按獄多連引朝臣朝直遙翻云其謀反國有常法朕安敢違中間疑其不實使近臣就獄引問得其手狀皆自承服朕不以為疑自興俊臣死不復聞有反者復扶又翻下無復后復同然則前死者不有冤邪夏官侍郎姚元崇對曰自垂拱以來坐謀反死者率皆興等羅織自以為功陛下使近臣問之近臣亦不自保何敢動搖所問者若有翻覆懼遭慘毒不若速死賴天啟聖心興等伏誅臣以百口為陛下保自今內外之臣無復反者為于偽翻下多為同若微有實狀臣請受知而不告之罪太后悅曰曏時宰相皆順成其事陷朕為淫刑之主聞卿所言深合朕心賜元崇錢千緡時人多為魏元忠訟冤者太后復召為肅政中丞元忠前後坐棄市流竄者四考異曰舊傳云三被流今從御史臺記按新書元忠為洛陽令陷周興獄當死以平揚楚功得流歲餘為來俊臣所構將就刑太后使王隱客宣詔赦之此為二事通鑑書王隱客宣赦事於永昌元年至長壽元年又下獄貶此為三事及後長安三年又貶高要尉此為四事未知御史臺記所書如何也太后問曰卿往者數負謗何也數所角翻對曰臣猶鹿耳羅織之徒欲得臣肉為羹臣安所避之神功元年冬閏十月甲寅以幽州都督狄仁傑為鸞臺侍郎司刑卿杜景儉為鳳閣侍郎並同平章事仁傑上疏上時掌翻以為天生四夷皆在先王封略之外故東拒滄海西阻流沙北橫大漠南阻五嶺此天所以限夷狄而隔中外也自典籍所紀聲教所及三代不能至者國家盡兼之矣詩人矜薄伐於太原美化行於江漢詩六月宣王北伐也其詩云薄伐玁狁至于太原又漢廣之詩美文王之道被于南國美化行乎江漢之域皆國家之域中也若乃用武方外邀功絕域竭府庫之實以爭不毛之地得其人不足增賦獲其土不可耕織苟求冠帶遠夷之稱冠古玩翻稱尺證翻不務固本安人之術此秦皇漢武之所行非五帝三王之事業也始皇窮兵極武務求廣地死者如麻致天下潰叛事見秦紀百姓困窮盜賊蜂起末年悔悟息兵罷役故能為天所祐事見漢武帝紀所費滋廣西戍四鎮東戍安東調發日加調徒釣翻百姓虛弊今關東饑饉蜀漢逃亡江淮已南徵求不息人不復業相率為盜本根一搖憂患不淺其所以然者皆以爭蠻貊不毛之地乖子養蒼生之道也貊莫百翻昔漢元納賈捐之之謀而罷朱崖郡事見二十八卷初元二年事見二十五卷元康二年蓋憚勞人力也近貞觀中克平九姓立李思摩為可汗使統諸部者見一百九十卷貞觀十三年降則撫之得推亡固存之義書仲虺之誥曰推亡固存邦乃其昌推吐雷翻此近日之令典經邊之故事也竊謂宜立阿史那斛瑟羅為可汗委之四鎮繼高氏絕國謂高麗也省軍費於遠方幷甲兵於塞上使夷狄無侵侮之患則可矣何必窮其窟穴與螻蟻校長短哉但當敕邊兵謹守備遠斥候聚資糧待其自致然後擊之以逸待勞則戰士力倍以主禦客則我得其便堅壁清野則寇無所得自然二賊深入則有顛躓之慮淺入必無寇獲之益如此數年可使二虜不擊而服矣二賊二虜皆謂突厥吐蕃識者是之神功元年鳳閣舍人李嶠知天官選事選須絹翻始置員外官數千人神功元年先是曆官以是月為正月以臘月為閏先悉薦翻太后欲正月甲子朔冬至乃下制以為去晦仍見月有爽天經去晦謂前月晦也來月為正月聖曆元年戊戌六九八神功元年正月甲子朔冬至太后享通天宮考異曰實錄云正月壬戌享通天宮按長曆此年一月壬戌朔實錄誤也今從唐曆統紀新本紀改元神功元年夏官侍郎宗楚客罷政事神功元年春二月乙未文昌右相同鳳閣鸞臺三品豆盧欽望罷為太子賓客神功元年武承嗣三思營求為太子數使人說太后曰自古天子未有以異姓為嗣者太后意未決狄仁傑每從容言於太后曰文皇帝櫛風沐雨親冒鋒以定天下傳之子孫數所角翻說輸芮翻從千容翻太宗諡文皇帝大帝以二子託陛下高宗諡天皇大帝二子謂廬陵王及皇嗣也無乃非天意乎且姑姪之與母子孰親太后之於承嗣三思姑姪也於廬陵王皇嗣母子也則千秋萬歲後配食太廟承繼無窮立姪則未聞姪為天子而祔姑於廟者也太后曰此朕家事卿勿預知仁傑曰王者以四海為家四海之內孰非臣妾何者不為陛下家事君為元首臣為股肱義同一體況臣備位宰相豈得不預知乎又勸太后召還廬陵王廬陵王光宅元年遷均州垂拱元年遷房州太后意稍寤他日又謂仁傑曰朕夢大鸚鵡兩翼皆折何也折而設翻對曰武者陛下之姓兩翼二子也陛下起二子則兩翼振矣太后由是無立承嗣三思之意孫萬榮之圍幽州也移檄朝廷曰何不歸我廬陵王吉頊與張易之昌宗皆為控鶴監供奉是年置控鶴監以處近倖頊從容說二人曰公兄弟貴寵如此非以德業取之也天下側目切齒多矣不有大功於天下何以自全竊為公憂之為于偽翻下屢為復為同二人懼流涕問計頊曰天下士庶未忘唐德咸復思廬陵王復扶又翻主上春秋高大業須有所付武氏諸王非所屬意屬之欲翻公何不從容勸上立廬陵王以繫蒼生之望如此非徒免禍亦可以長保富貴矣二人以為然承間屢為太后言之間古莧翻太后知謀出於頊乃召問之頊復為太后具陳利害太后意乃定考異曰世有狄梁公傳云李邕撰其辭鄙誕殆非邕所為其言曰后納諸武之議將移宗社擬立武三思為儲副遷廬陵王於房陵諸武陰計日夜獻謀曰陛下姓武合立武氏未有天子而取別姓將為後者也天后既已許禮問㣥臣曰朕年齒將衰國無儲主今欲擇善誰可當之朕雖得人終在㣥議諸宰臣多聞計定言皆希旨仁傑獨退立寂無一言天后問曰卿獨無言當有異見公曰有之臣上觀乾象無易主之文中察人心實未厭唐德天后曰卿何以知之公曰頃者匈奴犯邊陛下使梁王三思於都市召募一月之外不滿千人後廬陵王踵之未經二旬數盈五萬以此觀之人心未去陛下將欲繼統非廬陵王餘實非臣所知天后震怒命左右扶而去之按廬陵王為河北元帥在立為太子後且當是時睿宗為皇嗣若仁傑請以廬陵王繼統則是勸太后廢立也此固未可信或者仁傑以廬陵母子至親而幽囚房陵勸召還左右則有之矣談賓錄曰聖曆二年臘月張易之兄弟貴寵逾分懼不全請計於天官侍郎吉頊頊曰公兄弟承恩深矣非有大功於天下自古罕有全者唯有一策苟能行之豈止全家亦當享茅土之封耳除此之外非頊所謀易之兄弟泣請之頊曰天下思唐德久矣主上春秋高武氏諸王殊非所屬意公何不從容請立廬陵以繫生人之望易之乃承間屢言之則天意乃易既知頊首謀乃召問頊頊曰廬陵相王皆陛下之子高宗切託於陛下唯陛下裁之則天意乃定御史臺記曰則天置控鶴府頊與易之昌宗同於府供奉與昌宗親狎昌宗自以貴寵踰分懼不全請計於頊云云如談賓錄蓋太后寵信諸武誅鉏李氏雖己子廬陵亦廢徙房陵故仁傑勸召還左右以強李氏抑諸武耳張吉非能為唐社稷謀也欲求己利耳若仍立皇嗣則己有何功故勸太后立廬陵為太子而太后從之然則欲召還廬陵者仁傑之志也立為太子者張吉之謀也談賓言聖曆二年及以頊為天官侍郎臺記謂睿宗為相王則皆誤也新狄仁傑傳云張易之嘗從容問自安計仁傑曰唯勸迎廬陵王可以免禍計仁傑亦安肯與易之深言此事狄梁公傳又云後經旬召公入曰朕昨夜夢與人雙陸頻不見勝何也對曰雙陸不勝蓋為宮中無子此是上天之意假此以示陛下安可久虛儲位哉天后曰是朕家事斷在胸中卿豈合預焉仁傑對曰臣聞王者以天下為家四海之內悉為臣妾何者不為陛下家事君為元首臣為股肱臣安得不預焉又命扶出竟不納按於時皇嗣在宮中不得言無子及久虛儲位也朝野僉載云則天曾夢一鸚鵡羽毛甚偉兩翅俱折以問宰臣㣥公默然內史狄仁傑曰鵡者陛下姓也兩翅折者陛下二子廬陵相王也陛下起此二子兩翅全也魏王承嗣武三思連項皆赤後契丹反圍幽州檄朝廷曰還我廬陵相王來則天乃憶狄公之言謂之曰卿曾為我占夢今乃應矣朕欲立太子何者為得仁傑曰陛下內有賢子外有賢姪取捨詳擇斷在宸衷則天曰我自有聖子承嗣三思是何疥癬承嗣等懼掩耳而走即降敕追廬陵河內王等奏不許入城龍門安置賊徒轉盛陷沒冀州則天急乃立廬陵王為太子充元帥初募兵無有應者聞太子行北邙山頭兵滿無容人處賊自退散按是時睿宗未為相王又仁傑若言內有賢子外有賢姪乃是懷兩端也今採衆說之可信者存之三月己巳託言廬陵王有疾遣職方員外郎瑕丘徐彥伯瑕丘故春秋魯之瑕邑晉宋置兗州於此隋開皇十三年置瑕丘縣帶兗州戊子廬陵王至神都考異曰統紀云癸丑遣職方員外郎徐彥伯往房州召廬陵王男女入都醫療狄梁公傳曰後潛發內人十人至房州宣敕云我兒在此令內人就看州縣長吏仰數出數入無令混雜陰令內人一人以代廬陵王令廬陵王衣內人衣服以舊數還州縣不悟數日達京朝廷百僚一無知者舊傳曰廬陵王自房陵還宮太后匿之帳中又召狄仁傑以廬陵為言仁傑慷慨敷奏言發涕流遽出廬陵謂仁傑曰還卿儲君仁傑降階泣賀既已奏曰太子還宮人無知者物議安審是非則天以為然乃復置中宗於龍門具禮迎歸人情感悅狄梁公傳曰天后御一小殿垂簾於後左右隱蔽外不能知乃命公坐於階下曰前者所議事實非小寤寐反覆思卿所言彌覺理非甚乖朕意忠臣事主豈在多違今日之間須易前見以天下之位在卿一言可朕意即兩全逆朕心即俱斃公從容言曰陛下所言天子之位可得專之以臣所知是太宗文武皇帝之位陛下豈得而自有也太宗身陷鋒鏑經綸四海所以不告勞者蓋為子孫豈為武三思邪陛下身是大帝皇后大帝寢疾權使陛下監國大帝崩後合歸冢嫡陛下遂奄有神器十有餘年今議纘承豈可更異且姑與母孰親子與姪孰近云云天后於是歔欷流涕命左右褰簾手撫公背大叫曰卿非朕之臣是唐社稷之臣回謂廬陵王曰拜國老今日國老與爾天子公免冠頓首涕血灑地左右扶策久不能起天后曰即具所言宣付中外擇日禮冊公揮涕而言曰自古以來豈有偷人作天子廬陵王留在房州天下所悉知今日在內臣亦不知臣欲奉詔若同衞太子之變陛下何以明臣天后曰安可卻向房陵只於石像驛安置具法駕陳百僚就迎之於是大呼萬歲儲位乃定按武后若密召廬陵王宮人十人既知其謀洛陽至房陵往來道路甚遠豈得外人都不知乎又實錄豈能搆虛立徐彥伯往迎之事及有廬陵王至自房州之日又於時若儲位已定豈可自三月來九月始立為太子蓋廬陵既至太后以長幼之次欲立之皇嗣亦以此遜位故遷延半載今皆取實錄為正神功元年夏四月庚寅朔太后祀太廟神功元年辛丑以婁師德充隴右諸軍大使仍檢校營田事使疏吏翻神功元年六月甲午命淮陽王武延秀入突厥納默啜女為豹韜衞大將軍閻知微攝春官尚書右武衞郎將楊齊莊攝司賓卿考異曰實錄作楊鸞莊今從僉載舊傳延秀承嗣之子也鳳閣舍人襄陽張柬之諫曰自古未有中國親王娶夷狄女者由是忤旨忤五故翻出為合州刺史襄陽縣漢屬南郡獻帝建安十三年置襄陽郡晉為荊州治所宋齊梁為雍州西魏為襄州合州漢墊江縣地南齊置東宕渠郡西魏改墊江郡置石鏡縣尋置合州隋改涪州唐復為合州舊志合州京師南二千四百五十里至東都三千三百里神功元年秋七月鳳閣侍郎同平章事杜景儉罷為秋官尚書神功元年八月戊子武延秀至黑沙南庭突厥默啜謂閻知微等曰我欲以女嫁李氏安用武氏兒邪此豈天子之子乎我突厥世受李氏恩聞李氏盡滅唯兩兒在我今將兵輔立之將即亮翻乃拘延秀於別所以知微為南面可汗言欲使之主唐民也遂發兵襲靜難平狄清夷等軍垂拱中置清夷軍於媯州界杜佑曰在城內南去范陽二百十里難乃旦翻使疏吏翻崱士力翻降戶江翻虜勢大振進寇媯檀等州媯居為翻前從閻知微入突厥者默啜皆賜之五品三品之服太后悉奪之默啜移書數朝廷曰數所具翻與我蒸穀種種之不生一也金銀器皆行濫非真物二也穀種章勇翻行戶剛翻市列為行市列造金銀器販賣率殽他物以求贏俗謂之行作濫惡也開元八年頒租庸調法於天下好不過精惡不過濫濫者惡之極者也我與使者緋紫皆奪之三也繒帛皆疏惡四也我可汗女當嫁天子兒武氏小姓門戶不敵罔冒為昏五也我為此起兵欲取河北耳為于偽翻監察御史裴懷古從閻知微入突厥默啜欲官之不受囚將殺之逃歸抵晉陽形容羸悴監古銜翻羸倫為翻悴秦醉翻突騎譟聚以為間諜欲取其首以求功有果毅嘗為人所枉懷古按直之大呼曰裴御史也救之得全至都引見遷祠部員外郎間古莧翻諜達協翻呼火故翻見賢遍翻唐祠部郎掌祠祀享祭天文漏刻國忌廟諱卜筮醫藥僧尼之事屬禮部時諸州聞突厥入寇方秋爭發民脩城衞州刺史太平敬暉後魏分漢臨汾縣地置太平縣隋唐屬絳州吾聞金湯非粟不守柰何捨收穫而事城郭乎悉罷之使歸田百姓大悅神功元年甲午鸞臺侍郎同平章事王方慶罷為麟臺監神功元年太子太保魏宣王武承嗣恨不得為太子意怏怏戊戌病薨怏於兩翻神功元年庚子以春官尚書武三思檢校內史狄仁傑兼納言太后命宰相各舉尚書郎一人仁傑舉其子司府丞光嗣光宅改太府曰司府已而稱職太后喜曰卿足繼祁奚矣左傳晉中軍尉祁奚請老晉侯問嗣焉稱解狐其讎也將立之而卒又問之曰午也可於是以祁午為中軍尉君子謂祁奚能舉其善矣稱其讎不為諂立其子不為比稱尺證翻通事舍人河南元行沖唐六典曰通事舍人即秦之謁者晉武帝省謁者僕射置舍人通事各一人隸中書東晉令舍人通事兼謁者之任通事舍人之名始此也唐通事舍人十六人掌朝見引納及辭謝者於殿庭通奏凡近臣文武就列則引以進退而告其拜起出入之節凡四方通表華夷納貢皆受而進之仁傑重之行沖數規諫仁傑且曰凡為家者必有儲蓄脯醢以適口參朮以攻疾數所角翻參所今翻人參也僕竊計明公之門珍味多矣行沖請備藥物之末仁傑笑曰吾藥籠中物何可一日無也籠力董翻行沖名澹以字行神功元年以司屬卿武重規為天兵中道大總管光宅改宗正為司屬緣此後置天兵軍於幷州城中吒初加翻幽州都督下邽張仁愿為天兵東道總管秦武公伐邽戎置下邽縣隴西有上邽故此加下字漢屬京兆晉屬馮翊後魏置延壽郡隋廢郡以下邽屬同州垂拱元年屬華州將即亮翻又以左羽林衞大將軍閻敬容為天兵西道後軍總管將兵十五萬為後援癸丑默啜寇飛狐漢代郡廣昌縣有飛狐口隋改廣昌為飛狐縣屬易州唐屬蔚州乙卯陷定州殺刺史孫彥高及吏民數千人考異曰朝野僉載曰文昌左丞孫彥高無他識用性惟頑愚出為定州刺史歲餘默啜賊至圍其郛郭彥高卻鎖宅門不敢詣聽事文案須徵發者於小牕內接入通判仍簡郭下精健自援其家賊既乘城四面並入彥高乃謂奴曰牢關門戶莫與鑰匙其愚怯也皆此類俄而陷沒刺史之宅先殲焉又曰彥高被突厥圍城數重彥高乃入匱中藏令奴曰牢掌鑰匙賊來索慎勿與恐不至此今不取神功元年九月甲子以夏官尚書武攸寧同鳳閣鸞臺三品神功元年改默章十二行本默上有突厥二字乙十一行本同孔本同張校同退齋校同啜為斬啜默啜使閻知微招諭趙州知微與虜連手蹋張蹋下脫歌字萬歲樂於城下將軍陳令英在城上謂曰尚書位任非輕乃為虜蹋歌獨無慙乎為于偽翻蹋歌者連手而歌蹋地以為節萬歲樂歌曲之名樂音洛知微微吟曰不得已萬歲樂戊辰默啜圍趙州長史唐般若翻城應之長知兩翻般北末翻若人者翻刺史高叡與妻秦氏仰藥詐死虜輿之詣默啜默啜以金獅子帶紫袍示之曰降則拜官不降則死降戶江翻叡顧其妻妻曰酬報國恩正在今日遂俱閉目不言經再宿虜知不可屈乃殺之虜退唐般若族誅贈叡冬官尚書諡曰節叡熲之孫也冬官工部尚辰羊翻諡神至翻高熲隋初佐命神功元年皇嗣固請遜位於廬陵王太后許之壬申立廬陵王哲為皇太子復名顯嗣祥吏翻復扶又翻又音如字赦天下甲戌命太子為河北道元帥以討突厥行軍元帥起於周隋至唐唯親王及太子為元帥帥所類翻考異曰實錄云丙子據唐曆甲戌皇太子顯充河北道行軍大元帥狄梁公傳亦云皇太子為元帥以公為副是先立為太子後為元帥也今從新本紀募人月餘不滿千人先悉薦翻及聞太子為元帥應募者雲集未幾數盈五萬幾居豈翻戊寅以狄仁傑為河北道行軍副元帥右丞宋元爽為長史右臺中丞崔獻為司馬左臺中丞吉頊為監軍使后分御史臺為左右肅政臺各置中丞侍御史等官頊吁玉翻監古銜翻使疏吏翻命仁傑知元帥事太后親送之藍田令薛訥仁貴之子也藍田畿縣屬雍州薛仁貴健將也事太宗高宗將行言於太后曰太子雖立外議猶疑未定苟此命不易醜虜不足平也太后深然之王及善請太子赴外朝以慰人心從之朝直遙翻考異曰實錄辛巳皇太子朝見或作廟見蓋睿宗為皇嗣時止於宮中朝謁不出外朝今及善始請太子與㣥臣俱於外庭朝謁耳神功元年以天官侍郎蘇味道為鳳閣侍郎同平章事味道前後在相位數歲依阿取容嘗謂人曰處事不宜明白但摸稜持兩端可矣時人謂之蘇摸稜天官吏部相悉亮翻處昌呂翻摸音莫神功元年癸未突厥默啜盡殺所掠趙定等州男女萬餘人自五回道去厥九勿翻啜叱列翻水經註代郡廣昌縣東南有大嶺世謂之廣昌嶺嶺高四十餘里二十里中委折五回方得達其上嶺故嶺有五回之名時屬易州易縣界至開元二十三年分易縣置五回縣於五回山下所過殺掠不可勝紀沙吒忠義等但引兵躡之不敢逼勝音升吒初加翻躡泥輒翻考異曰舊突厥傳云默啜盡寇掠趙定等州男女八九萬人統紀云河北積年豐熟人畜被野斬啜虜趙定恆易等州財帛億萬子女羊馬而去河朔諸州怖其兵威不敢追躡今從實錄狄仁傑將兵十萬追之無所及將即亮翻又音如字默啜還漠北擁兵四十萬據地萬里西北諸夷皆附之甚有輕中國之心神功元年冬十月制都下屯兵命河內王武懿宗九江王武攸歸領之神功元年癸卯以狄仁傑為河北道安撫大使時北章十二行本北上有河字乙十一行本同孔本同張校同人為突厥所驅逼者虜退懼誅往往亡匿仁傑上疏以為朝廷議者皆罪契丹突厥所脅從之人言其迹雖不同心則無別使疏吏翻上時掌翻別彼列翻誠以山東近緣軍機調發傷重調徒弔翻家道悉破或至逃亡重以官典侵漁重以直用翻因事而起枷杖之下痛切肌膚事迫情危不循禮義愁苦之地不樂其生有利則歸且圖賒死此乃君子之愧辱小人之常行也樂音洛行下孟翻又諸城入偽入偽謂降賊者將士求功皆云攻得臣憂濫賞亦恐非辜以攻取之賞賞將士則為濫賞以從虜之罪罪士民則為非辜是為惡地至於污辱妻子污烏故翻劫掠貨財兵士信知不仁簪笏未能以免簪笏謂士大夫當官而行者也為惡更深且賊務招攜秋毫不犯言除賊務在招撫攜貳秋毫無所侵犯也即是平人翻被破傷豈不悲痛被皮義翻夫人猶水也壅之則為泉疏之則為川通塞隨流塞悉則翻豈有常性今負罪之伍必不在家露宿草行潛竄山澤赦之則出不赦則狂山東㣥盜緣茲聚結臣以邊塵蹔起不足為憂蹔與暫同此為大事罪之則衆情恐懼恕之則反側自安伏願曲赦河北諸州一無所問制從之仁傑於是撫慰百姓得突厥所驅掠者悉遞還本貫散糧運以賑貧乏修郵驛以濟旋師恐諸將及使者妄求供頓乃自食疏糲郵音尤將即亮翻使疏吏翻疏粗也糲脫粟也一斛粟得六斗米為糲糲郎葛翻禁其下無得侵擾百姓犯者必斬河北遂安神功元年以夏官侍郎姚元崇祕書少監李嶠並同平章事神功元年突厥默啜離趙州離力智翻乃縱閻知微使還太后命磔於天津橋南磔陟格翻張也開也使百官共射之既乃其肉射而亦翻下既射同古瓦翻剔人肉至骨也剉其骨夷其三族疏親有先未相識而同死者考異曰朝野僉載云則天磔知微於西市命百官射之河內王懿宗去七步射一發皆不中怯懦如此知微身上箭如蝟毛剉其骨肉夷其九族小兒年七八歲驅抱向西市百姓哀之擲餅果與者仍相爭奪以為戲笑監刑御史不忍害奏捨之今從實錄褒公段瓚志玄之子也段志玄從起晉陽征伐有功瓚藏旱翻突厥在趙州瓚邀楊齊莊與之俱逃齊莊畏懦不敢發懦乃臥翻又奴亂翻瓚先歸太后賞之齊莊尋至敕河內王武懿宗鞫之懿宗以為齊莊意懷猶豫遂與閻知微同誅既射之如蝟氣歹歹未死歹余懾翻割心投於地猶趌趌然躍不止趌起逸翻擢田歸道為夏官侍郎甚見親委神功元年蜀州每歲遣兵五百人戍姚州蜀州漢江源武陽之地李雄置江源郡晉為晉原縣隋廢郡以縣屬益州垂拱二年分置蜀州死亡者多蜀州刺史張柬之上言以為姚州本哀牢之國哀牢夷見四十五卷漢明帝永平十二年山高水深國家開以為州武德四年以漢益州郡之雲南縣地置姚州以其地人多姓姚故也舊志至京師四千九百里麟德元年移治弄棟川甲兵之用而空竭府庫驅率平人受役蠻夷肝腦塗地臣竊為國家惜之竊為于偽翻請廢姚州以隸巂州歲時朝覲同之蕃國巂音髓朝直遙翻瀘南諸鎮亦皆廢省於瀘北置關瀘音盧百姓非奉使無得交通往來使疏吏翻疏奏不納二年神功二年正月丁卯朔告朔於通天宮告古沃翻又如字神功二年壬戌以皇嗣為相王領太子右衞率相息亮翻率所律翻神功二年甲子置控鶴監丞主簿等官先已置控鶴監今方備官嬖卑義翻又博計翻頗用才能文學之士以參之以司衞卿張易之為控鶴監銀青光祿大夫張昌宗左臺中丞吉頊殿中監田歸道夏官侍郎李迥秀鳳閣舍人薛稷正諫大夫臨汾員半千臨汾縣帶晉州本平陽縣隋更名半千本彭城劉氏十世祖凝之事宋及齊受禪奔魏以忠烈自比伍員因自姓員員音云稷元超之從子也薛元超事高宗從才用翻且所聚多輕薄之士上疏請罷之由是忤旨上時掌翻忤五故翻左遷水部郎中神功二年臘月戊子以左臺中丞吉頊為天官侍郎右臺中丞魏元忠為鳳閣侍郎並同平章事神功二年文昌左丞宗楚客與弟司農卿晉卿坐贓賄滿萬餘緡及第舍過度楚客貶播州司馬晉卿流峯州峯州漢交趾麊冷縣地吳置新興郡晉改新昌郡齊置興州隋初改華州十八年改峯州大業廢州併入交趾為嘉寧縣唐武德四年復置峯州舊志播州去京師四千五百三十里東都四千九百六十里峯州至京師七千七百一十里歎曰見其居處處昌呂翻吾輩乃虛生耳神功二年辛亥賜太子姓武氏赦天下神功二年太后生重眉成八字重直龍翻百官皆賀神功二年河南北置武騎團以備突厥騎奇寄翻神功二年春一月庚申夏官尚書同鳳閣鸞臺三品武攸寧罷為冬官尚書神功二年二月己丑太后幸嵩山過緱氏謁升仙太子廟緱氏縣屬洛州升仙太子周王子晉也世傳晉升仙後桓良遇之於嵩山曰七月七日待我於緱氏山頭果乘白鶴駐山頂舉手謝時人而去後人因為立祠后加號升仙太子杜佑曰緱氏縣古滑國緱工侯翻壬辰太后不豫遣給事中欒城閻朝隱禱少室山朝隱自為犧牲朝直遙翻沐浴伏俎上請代太后命太后疾小愈厚賞之丁酉自緱氏還神功二年初吐蕃贊普器弩悉弄尚幼論欽陵兄弟用事皆有勇略諸胡畏之欽陵居中秉政諸弟握兵分據方面贊婆常居東邊為中國患者三十餘年器弩悉弄浸長長知兩翻陰與大臣論巖謀誅之會欽陵出外贊普詐云出畋集兵執欽陵親黨二千餘人殺之遣使召欽陵兄弟欽陵等舉兵不受命贊普將兵討之欽陵兵潰自殺夏四月贊婆帥所部千餘人來降使疏吏翻將即亮翻帥讀曰率降戶江翻考異曰實錄贊婆及其兄弟莽布支等來降以莽布支為左羽林衞員外大將軍封安國公按贊婆弟名悉多于敷論明年吐蕃將麴莽布支寇涼州與唐休璟戰未詳實錄所云今刪去太后命左武衞鎧曹參軍郭元振與河源軍大使夫蒙令卿將騎迎之夫蒙姓也姓譜夫蒙羌複姓後秦有建威將軍夫蒙大羌欽陵子弓仁以所統吐谷渾七千帳來降拜左玉鈐衞將軍酒泉郡公神功二年壬辰以魏元忠檢校幷州長史充天兵軍大總管以備突厥婁師德為天兵軍副大總管仍充隴右諸軍大使專掌懷撫吐蕃降者神功二年太后春秋高慮身後太子與諸武不相容壬寅命太子相王太平公主與武攸暨等為誓文告天地於明堂銘之鐵券藏于史館神功二年秋七月命建安王武攸宜留守西京代會稽王武攸望守式又翻會工外翻神功二年丙辰吐谷渾部落一千四百帳內附吐從暾入聲谷音浴神功二年八月癸巳突騎施烏質勒遣其子遮弩入見西突厥既敗突騎施始盛突騎施烏質勒者西突厥之別種也初隸斛瑟羅下號莫賀達干後斛瑟羅入朝其地為烏質勒所併騎奇寄翻見賢遍翻解戶買翻神功二年制州縣長吏非奉有敕旨毋得亶立碑長知兩翻神功二年內史王及善雖無學術然清正難奪有大臣之節張易之兄弟每侍內宴無復人臣禮復扶又翻及善屢奏以為不可太后不悅謂及善曰卿既年高不宜更侍遊宴但檢校閤中可也閤謂省閤也謁假月餘假古訝翻太后不問及善歎曰豈有中書令而天子可一日不見乎事可知矣乃上疏乞骸骨上時掌翻疏所去翻太后不許庚子以及善為文昌左相太子宮尹豆盧欽望為文昌右相仍並同鳳閣鸞臺三品相悉亮翻下同考異曰新紀表及善同平章事今從實錄朝野僉載曰王及善才行庸猥風神鈍濁為內史時人號為鳩集鳳池俄遷文昌右相無他政但不許令史奴驢入臺終日迫逐無時蹔捨時人號驅驢宰相此蓋張文成惡及善毀之耳今從舊傳鸞臺侍郎同平章事楊再思罷為左臺大夫即左御史大夫丁未相王兼檢校安北大都護以天官侍郎陸元方為鸞臺侍郎同平章事神功二年納言隴右諸軍大使婁師德薨使疏吏翻師德在河隴前後四十餘年恭勤不怠民夷安之性沈厚寬恕狄仁傑之入相也師德實薦之而仁傑不知意頗輕師德數擠之於外沈持林翻數所角翻擠子西翻又子細翻太后覺之嘗問仁傑曰師德賢乎對曰為將能謹守邊陲將即亮翻下同賢則臣不知又曰師德知人乎對曰臣嘗同僚未聞其知人也太后曰朕之知卿乃師德所薦也亦可謂知人矣仁傑既出歎曰婁公盛德我為其所包容久矣吾不得窺其際也是時羅織紛紜師德久為將相獨能以功名終人以是重之神功二年戊申以武三思為內史神功二年九月乙亥太后幸福昌福昌縣屬東都本宜陽縣武德二年更名因隋福昌宮以名縣也戊寅還神都神功二年庚子邢貞公王及善薨神功二年河溢漂濟源百姓廬舍千餘家濟源本春秋時原邑漢屬河東垣縣界隋開皇十六年置濟源縣屬懷州濟子禮翻神功二年冬十月丁亥論贊婆至都太后寵待賞賜甚厚以為右衞大將軍使將其衆守洪源谷洪源谷在涼州昌松縣界使將即亮翻神功二年太子相王諸子復出閤相王諸子幽宮中見二百四卷天授二年復扶又翻下不復同神功二年太后自稱制以來多以武氏諸王及駙馬都尉為成均祭酒博士助教亦多非儒士又因郊丘明堂拜洛封嵩郊丘祭圜丘於南郊也享萬象神宮及享通天宮皆明堂也垂拱四年拜洛萬歲通天元年封嵩山齋郎者執豆籩奉樽彞罍洗以供祭祀之事由是學生不復習業二十年間學校殆廢而曏時酷吏所誣陷者其親友流離未獲原宥鳳閣舍人韋嗣立上疏上時掌翻疏所去翻以為時俗浸輕儒學先王之道弛廢不講宜令王公以下子弟皆入國學不聽以他岐仕進又自揚豫以來謂徐敬業起兵於揚州越王貞起兵於豫州也酷吏乘間專欲殺人以求進間古莧翻賴陛下聖明周丘王來相繼誅殛天授二年周興流死丘神勣誅延載元年王弘義誅神功元年來俊臣誅若再覩陽和朝直遙翻至如仁傑元忠往遭按鞫亦皆自誣非陛下明察則以為葅醢矣今陛下升而用之皆為良輔何乃前非而後是哉誠由枉陷與甄明耳甄稽延翻臣恐曏之負冤得罪者甚衆亦皆如是伏望陛下弘天地之仁廣雷雨之施施式志翻自垂拱以來罪無輕重一皆昭洗死者追復官爵生者聽還鄉里如此則天下知昔之枉濫非陛下之意皆獄吏之辜幽明歡欣感通和氣太后不能從嗣立承慶之異母弟也母王氏遇承慶甚酷每杖承慶嗣立必解衣請代母不許輒私自杖母乃為之漸寬為于偽翻承慶為鳳閣舍人以疾去職嗣立時為萊蕪令萊蕪縣漢屬泰山郡晉廢後魏於古城置嬴縣唐貞觀初廢入博城縣后復於廢嬴縣置萊蕪縣屬兗州卿父嘗言臣有兩兒堪事陛下卿兄弟在官誠如父言朕今以卿代兄更不用他人即日拜鳳閣舍人神功二年是歲突厥默啜立其弟咄悉匐為左廂察咄當沒翻匐蒲北翻下同骨篤祿子默矩為右廂察各主兵二萬餘人其子匐俱為小可汗位在兩察上主處木昆等十姓兵四萬餘人又號為拓西可汗處木昆十姓西突厥所部也故號拓西久視元年庚子七是年五月始改元神功二年正月戊寅內史武三思罷為特進太子少保考異曰新紀表皆云戊午貶吉頊為琰川尉壬申三思罷中間未嘗復入相明年十一月壬申又云三思罷日及官皆同蓋誤重複耳今從實錄考異曰實錄但云坐事貶流僉載新書皆云貶琰川尉今從御史臺記太后以頊有幹略故委以腹心頊與武懿宗爭趙州之功於太后前頊魁岸辯口懿宗短小傴僂傴於庾翻僂力主翻頊視懿宗聲氣陵厲太后由是不悅曰頊在朕前猶卑我諸武況異時詎可倚邪他日頊奏事方援古引今太后怒曰卿所言朕飫聞之飫於據翻無多言太宗有馬名師子驄肥逸無能調馭者朕為宮女侍側言於太宗曰妾能制之然須三物一鐵鞭二鐵檛三匕首鐵鞭擊之不服則以檛檛其首又不服則以匕首斷其喉太宗壯朕之志今日卿豈足汚朕匕首邪檛側瓜翻斷音短污烏故翻頊惶懼流汗拜伏求生乃止諸武怨其附太子共發其弟冒官事由是坐貶辭日得召見見賢遍翻下再見同涕泣言曰臣今遠離闕庭離力智翻永無再見之期願陳一言太后命之坐問之頊曰合水土為泥有爭乎合音閤太后曰無之又曰分半為佛半為天尊有爭乎曰有爭矣頊頓首曰宗室外戚各當其分則天下安分扶問翻今太子已立而外戚猶為王此陛下驅之使他日必爭兩不得安也太后曰朕亦知之然業已如是不可何如觀太后使二子與諸武立誓則誠知勢有所必至而出此下策耳神功二年臘月辛巳立故太孫重潤為邵王其弟重茂為北海王神功二年太后問鸞臺侍郎章十二行本郎下有同平章事四字乙十一行本同孔本同張校同陸元方以外事對曰臣備位宰相有大事不敢以不聞人間細事不足煩聖聽由是忤旨忤五故翻庚寅罷為司禮卿光宅改太常卿為司禮卿元方為人清謹再為宰相太后每有遷除多訪之元方密封以進未嘗漏露臨終悉取奏藁焚之曰吾於人多陰德子孫其未衰乎神功二年以西突厥竭忠事主可汗斛瑟羅為平西軍大總管鎮碎葉神功二年丁酉以狄仁傑為內史神功二年庚子以文昌左丞韋巨源為納言考異曰新紀表庚子文昌左相韋巨源為納言十月丁巳罷先時不言巨源為左相舊紀傳皆無之蓋左丞誤為左相耳乙巳太后幸嵩山春一月丁卯幸汝州之溫湯戊寅還神都作三陽宮於告成之石淙三陽宮去洛城一百六十里萬歲登封元年改東都陽城縣曰告成以祀神嶽告成也淙藏宗翻又士江翻神功二年二月乙未同鳳閣鸞臺三品豆盧欽望罷為太子賓客神功二年三月以吐谷渾青海王宣超為烏地也拔勤忠可汗宣超諾曷鉢之孫也神功二年夏四月戊申太后幸三陽宮避暑有胡僧邀車駕觀葬舍利太后許之狄仁傑跪於馬前曰佛者夷狄之神不足以屈天下之主彼胡僧詭譎直欲邀致萬乘以惑遠近之人耳山路險狹不容侍衞非萬乘所宜臨也譎古穴翻乘繩證翻太后中道而還曰以成吾直臣之氣神功二年五月己酉朔日有食之神功二年太后使洪州僧胡超合長生藥合音閤三年而成所費巨萬太后服之疾小瘳瘳丑留翻癸丑赦天下改元久視去天冊金輪大聖之號去羌呂翻神功二年六月改控鶴為奉宸府以張易之為奉宸令太后每內殿曲宴輒引諸武易之及弟祕書監昌宗飲博嘲謔嘲陟交翻謔迄卻翻太后欲掩其迹乃命易之昌宗與文學之士李嶠等修三教珠英於內殿三教儒釋道太后命昌宗衣羽衣吹笙乘木鶴於庭中文士皆賦詩以美之宗衣於既翻太后又多選美少年為奉宸內供奉少詩照翻右補闕朱敬則諫曰陛下內寵有易之昌宗足矣近聞右監門衞長史侯祥等唐諸衞府各有長史從六品上各掌判其府諸曹之事監古銜翻衒熒絹翻醜慢不恥求為奉宸內供奉無禮無儀溢于朝聽臣職在諫諍不敢不奏太后勞之曰勞力到翻非卿直言朕不知此賜綵百段易之昌宗競以豪侈相勝弟昌儀為洛陽令請屬無不從屬之欲翻嘗早朝朝直遙翻下同有選人姓薛以金五十兩幷狀邀其馬而賂之選須絹翻昌儀受金至朝堂以狀授天官侍郎張錫數日錫失其狀以問昌儀昌儀罵曰不了事人我亦不記但姓薛者即與之錫懼退索在銓姓薛者六十餘人悉留注官索山客翻錫文瓘之兄子也張文瓘見二百一卷高宗乾封二年神功二年初契丹將李楷固善用索及騎射舞槊每陷陳如鶻入烏㣥所向披靡將即亮翻騎奇寄翻槊色角翻陳讀曰陣披普彼翻黃麞之戰張玄遇麻仁節皆為所事見上卷萬歲通天元年亦為契丹將屢敗唐兵敗補邁翻及孫萬榮死二人皆來降降戶江翻有司責其後至奏請族之狄仁傑曰楷固等並驍勇絕倫驍堅堯翻能盡力於所事必能盡力於我若撫之以德皆為我用矣奏請赦之所親皆止之仁傑曰苟利於國豈為身謀太后用其言赦之又請與之官太后以楷固為左玉鈐衞將軍務整為右武威衞將軍使將兵擊契丹餘黨悉平之齊思和標點聶崇岐覆校
