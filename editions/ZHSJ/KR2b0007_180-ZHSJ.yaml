body:
  text: 資治通鑑卷第一百八十端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註隋紀四高祖文皇帝下仁壽四年仁壽四年甲子六四仁壽四年春正月丙午赦天下仁壽四年帝將避暑於仁壽宮術士章仇太翼固諫不聽太翼曰是行恐鑾輿不返帝大怒繫之長安獄期還而斬之甲子幸仁壽宮乙丑詔賞賜支度事無巨細並付皇太子夏四月乙卯帝不豫六月庚申赦天下秋七月甲辰上疾甚臥與百僚辭訣並握手歔欷歔音虛欷音希又許既翻命太子赦章仇太翼丁未崩於大寶殿年六十四高祖性嚴重令行禁止每章十二行本每上有勤於政事四字乙十一行本同孔本同旦聽朝日昃忘倦朝直遙翻昃阻力翻日中則昃雖嗇於財至於賞賜有功即無所愛將士戰沒必加優賞仍遣使者勞問其家將即亮翻使疏吏翻勞力到翻愛養百姓勸課農桑輕傜薄賦其自奉養務為儉素乘輿御物故弊者隨宜補用乘繩證翻自非享宴所食不過一肉後宮皆服澣濯之衣天下化之開皇仁壽之間丈夫率衣絹布衣於既翻不服綾綺裝帶不過銅鐵骨角無金玉之飾故衣食滋殖倉庫盈溢受禪之初民戶不滿四百萬末年踰八百九十萬此以開皇初元戶口之數比較仁壽末年大業初之數而言之也按周之平齊得戶三百三萬而隋受周禪戶不滿四百萬則周氏初有關中西幷巴蜀南兼江漢見戶不滿百萬也陳氏之亡戶六十萬大約隋氏混壹天下見戶未及五百萬及其盛也蓋幾倍之滋音茲殖音植禪音墠隋以信都郡為冀州此以古冀州之域言之也然禹之冀州兼有幽幷營三州地其界比他州為最大其後以天文畫壄分州自胃七度至畢十一度為大梁冀州分隋志以信都清河魏汲河內長平上黨河東絳文城臨汾龍泉西河離石鴈門馬邑定襄樓煩太原襄國武安趙恆山博陵河間涿上谷漁陽北平安樂遼西等郡為冀州則其地亦兼有幽幷營三州地故其戶最多信受讒言功臣故舊無始終保全者乃至子弟皆如仇敵此其所短也此上總論文帝平生初文獻皇后既崩獨孤后崩諡文獻見上卷二年陳氏陳高宗之女陳宣帝廟號高宗丹楊人也丹楊郡時置蔣州尚書左僕射楊素兵部尚書柳述黃門侍郎元巖隋制門下省納言二人給事黃門侍郎四人其位任重矣此又一元巖前蜀王秀長史之元巖封平昌郡公此元巖封龍涸縣公見隋書列女華陽王楷傳召皇太子入居大寶殿太子慮上有不諱須預防擬防禦也隄備也擬準也準擬揣度以待之也封出問素素條錄事狀以報太子宮人誤送上所上覽而大恚恚於避翻陳夫人平旦出更衣更工衡翻為太子所逼拒之得免歸於上所上怪其神色有異問其故夫人泫然曰太子無禮上恚抵床曰畜生何足付大事抵觸也今人詈人猶曰畜生言其無識無禮若馬牛犬豕然待畜養而生者也泫戶畎翻事見上卷開皇二十年召我兒述等將呼太子上曰勇也述巖出閤為敕書儲嗣之重廢置之間輕易如此烏得不君臣皆敗乎以白太子矯詔執述巖繫大理獄追東宮兵士帖上臺宿衞帖裨也帝之猜防太子勇也屏去東宮宿衞之勇健者知出蘇孝慈而不知備張衡之入寢殿也悕矣並取宇文述郭衍節度令右庶子張衡入寢殿侍疾盡遣後宮出就別室俄而上崩故中外頗有異論此上敍帝所以見弒考異曰趙毅大業略記曰高祖在仁壽宮病甚追帝侍疾而高祖美人尤嬖幸者唯陳蔡二人而已帝乃召蔡於別室既還面傷而髮亂高祖問之蔡泣曰皇太子為非禮高祖大怒齧指出血召兵部尚書柳述黃門侍郎元巖等令發詔追庶人勇即令廢立帝事迫召左僕射楊素左庶子張衡進毒藥帝簡驍健官奴三十人皆服婦人之服衣下置仗立於門巷之間以為之衞素等既入而高祖暴崩馬總通曆曰上有疾於仁壽殿與百僚辭訣並握手歔欷是時唯太子及陳宣華夫人侍疾太子無禮宣華訴之帝怒曰死狗那可付後事遽令召勇楊素祕不宣乃屏左右令張衡入拉帝血濺屏風冤痛之聲聞于外崩今從隋書相顧戰栗失色晡後太子遣使者齎小金合帖紙於際親署封字以賜夫人夫人見之惶懼以為鴆毒不敢發使者促之乃發使疏吏翻下同合中有同心結數枚宮人咸悅相謂曰得免死矣陳氏恚而卻坐不肯致謝諸宮人共逼之乃拜使者其夜太子蒸焉杜預曰上淫曰蒸乙卯發喪考異曰大業略記曰十八日發喪杜寶大業雜記曰甲戌文帝崩辛巳發喪壬午煬帝即位按長曆是月乙未朔乙卯二十一日也無甲戌辛巳壬午日今從隋書會伊州刺史楊約來朝楊約出刺伊州見上卷二年朝直遙翻易留守者矯稱高祖之詔賜故太子勇死縊殺之縊於賜翻然後陳兵集衆發高祖凶問煬帝聞之書煬帝以別大行令兄之弟果堪大任追封勇為房陵王不為置嗣房陵郡王隋志房陵郡光遷縣舊曰房陵置新城郡梁末置岐州後周郡縣並改為光遷大業初置房陵郡考異曰大業略記云庶人勇八男亦陰加酖害恐其為厲皆倒埋之按隋書北史皆云煬帝踐極儼常從行卒於道實酖之也諸弟分徙嶺表仍敕在所皆殺焉今從之按通鑑下文大業三年殺儼及七弟丁卯梓宮至自仁壽宮丙子殯于大興前殿大興前殿大興宮正殿也述徙龍川巖徙南海隋志龍川郡平陳置循州南海郡舊置廣州欲改嫁之公主以死自誓不復朝謁復扶又翻朝直遙翻上表請與述同徙帝大怒公主憂憤而卒臨終上表請葬於柳氏帝愈怒竟不哭葬送甚薄上時掌翻卒子恤翻仁壽四年太史令袁充奏言皇帝即位與堯受命年合諷百官表賀禮部侍郎許善心議以為國哀甫爾不宜稱賀左衞大將軍宇文述素惡善心宇文述自左衞率遷左衞大將軍豈特以舊恩哉既以醻功且親之以自衞也惡烏故翻劾戶概翻又戶得翻左遷給事郎降品二等仁壽四年漢王諒有寵於高祖為幷州總管開皇十七年漢王諒代秦王俊為幷州總管至于滄海南距黃河五十二州皆隸焉特許以便宜從事不拘律令諒自以所居天下精兵處見太子勇以讒廢事見上卷開皇二十年怏於兩翻及蜀王秀得罪見上卷二年陰蓄異圖言於高祖以突厥方強厥九勿翻宜修武備於是大發工役繕治器械治直之翻招集亡命左右私人殆將數萬突厥嘗寇邊高祖使諒禦之為突厥所敗敗補邁翻其所領將帥坐除解者八十餘人將即亮翻帥所類翻除除名也解解官也皆配防嶺表諒以其宿舊奏請留之高祖怒曰爾為藩王惟當敬依朝命朝直遙翻何得私論宿舊廢國家憲法邪嗟乎小子爾一旦無我或欲妄動彼取爾如籠內雞雛耳何用腹心為王頍者僧辯之子王僧辯事梁有平侯景之功為陳霸先所殺頍丘弭翻倜他狄翻好呼到翻為諒諮議參軍隋制諸王府諮議參軍在長史司馬之下掾屬之上也陳氏舊將將即亮翻二人俱不得志每鬱鬱思亂皆為諒所親善贊成其陰謀會熒惑守東井熒惑罰星東井秦分按隋制王府諸曹無儀曹蓋不在諸參軍之數鄴縣屬魏郡是何祥也對曰天上東井黃道所經晉志東井八星天之南門黃道所經乃其常理若入地上井則可怪耳突知諒有異圖詭對以自免於禍及高祖崩煬帝遣車騎將軍屈突通以高祖璽書徵之騎奇寄翻屈區勿翻璽斯氏翻先是高祖與諒密約若璽書召汝敕字傍別加一點高歡與侯景亦有此約而皆以階亂先悉薦翻開皇七年頒青龍符於東方總管刺史西方以騶虞南方以朱雀北方以玄武是後三子分居方面幷楊益三總管統屬甚廣故為玉麟符漢王諒既敗惟留守東西兩都用玉麟符至唐猶然及發書無驗諒知有變詰通詰去吉翻通占對不屈乃遣歸長安諒遂發兵反總管司馬安定皇甫誕切諫安定郡涇州誕流涕曰竊料大王兵資非京師之敵加以君臣位定逆順勢殊士馬雖精難以取勝一旦陷身叛逆絓於刑書絓戶掛翻雖欲為布衣不可得也諒怒囚之嵐州刺史喬鍾葵將赴諒嵐州樓煩之地也按隋志大業四年方置樓煩郡管下秀容縣舊置肆州開皇十八年置忻州大業初廢又按唐志樓煩郡平劉武周置東會州武德六年改嵐州而義寧元年復分秀容置忻州喬鍾葵者既為嵐州刺史而隋志不載嵐州建置當考嵐盧含翻宋白曰後魏置嵐州因岢嵐山為名漢王所圖不軌公荷國厚恩章十二行本恩下有位為方伯四字乙十一行本同孔本同張校同荷下可翻當竭誠效命豈得身為厲階乎鍾葵失色曰司馬反邪臨之以兵辭氣不撓邪音耶撓奴教翻屈也鍾葵義而釋之軍吏曰若不斬模無以壓衆心乃囚之於是從諒反者凡十九州王頍說諒曰王所部將吏家屬盡在關西說輸芮翻將即亮翻此關西謂蒲津關以西若用此等則宜長驅深入直據京都所謂疾雷不及掩耳淮南子之言南距大河北盡燕代皆高齊之地也諒不能決乃兼用二策唱言楊素反將誅之諒若如宋武陵王聲元凶之罪而舉兵天下其誰能敵之總管府兵曹聞喜裴文安兵曹兵曹參軍也聞喜縣屬絳州井陘以西在王掌握之內山東士馬亦為我有宜悉發之分遣羸兵屯守要害仍命隨方略地帥其精銳直入蒲津同州朝邑縣有蒲津關渡河東即蒲州城陘音刑羸倫為翻帥讀曰率王以大軍繼後風行雷擊頓於霸上自武關入則頓於霸上自蒲津入豈須頓於霸上蓋欲乘高以臨長安耳可指麾而定京師震擾兵不暇集上下相疑㣥情離駭我陳兵號令誰敢不從旬日之間事可定矣考異曰大業略記云司兵參軍裴文安說諒曰今梓宮尚在仁壽宮比其徵兵動移旬月今若簡驍勇萬騎令文安督領不淹十五日徑據長安其在京被黜停私之徒並擢授高位付以心膂共守京城則以東府縣非彼之有然後大王總兵鼓行而西聲勢一接天下可指揮而定也諒不從大業雜記云文安又說曰先人有奪人之心殿下選精騎一萬徑往京師奔喪曉夜兼行誰敢止約至京徑掩仁壽宮彼縱徵召未暇禦我大軍駱驛隨王而至此則次計王直資河北彼率天下之兵百道攻我則難為主人此下計也今從隋書於是遣所署大將軍余公理出太谷趣河陽姓苑余姓由余之後隋志太谷縣屬太原郡舊曰陽邑開皇十八年改焉水經註太谷谷名在祁縣東南河陽縣屬懷州欲由此渡孟津趣七喻翻下同趣黎陽綦姓也此二軍皆欲使渡河略河南滏音釜略燕趙陘音刑柱國喬鍾葵出鴈門鴈門郡代州也時李景以代州拒諒使鍾葵自嵐州攻之與柱國紇單貴王耼等直指京師紇單虜複姓紇下沒翻單多寒翻又達演翻耼他酣翻帝以右武衞將軍洛陽丘和隋制左右武衞將軍領外軍宿衞風俗通丘姓左丘明之後又云太公封於營丘支孫以地為氏又魏書官氏志後魏獻帝次弟丘敦氏後改為丘氏按拓跋南都洛陽凡北人從之南遷者三字姓複姓皆改從單字姓為河南洛陽人丘和既洛陽人蓋即丘敦氏之後鎮蒲津諒選精銳數百騎戴羃䍦羃莫狄翻䍦音離新唐志曰婦人施羃䍦以蔽身永徽中始用帷冒施帬及頸武后時帷冒益盛中宗後無復羃䍦矣按帷冒起於隋騎奇寄翻下同詐稱諒宮人還長安門司弗覺徑入蒲州門司蒲州之掌城門者丘和覺其變踰城逃歸長安蒲州長史勃海高義明司馬北平榮毗勃海郡開皇六年置棣州大業二年改滄州北平郡舊置平州榮姓周榮公之後裴文安等未至蒲津百餘里諒忽改圖令紇單貴斷河橋守蒲州此蒲津之橋也諒欲斷河謂可坐有舊齊之地耳斷音丁管翻文安至謂諒曰兵機詭速本欲出其不意王既不行文安又返使彼計成大事去矣諒不對以王耼為蒲州刺史裴文安為晉州刺史薛粹為絳州刺史梁菩薩為潞州刺史韋道正為韓州刺史張伯英為澤州刺史隋志臨汾郡晉州絳郡後魏置東雍州後周改絳州上黨郡後周置潞州上黨郡襄垣縣後周置韓州大業初州廢長平郡舊曰建州開皇初改澤州菩薄乎翻薩桑葛翻耼他甘翻諒遣其將劉暠襲景將即亮翻暠古老翻景擊斬之諒復遣喬鍾葵帥勁勇三萬攻之復扶又翻帥讀曰率下同景戰士不過數千加以城池不固為鍾葵所攻崩毀相繼景且戰且築士卒皆殊死鬬鍾葵屢敗司馬馮孝慈司法呂玉司法即法曹行參軍驍堅堯翻儀同三司侯莫陳乂多謀畫工拒守之術景知三人可用推誠任之己無所關預唯在閤持重時撫循而已楊素將輕騎五千襲王耼紇單貴於蒲州夜至河際收商賈船得數百艘賈音古艘蘇遭翻船內多置草踐之無聲遂銜枚而濟遲明擊之遲直二翻紇單貴敗走耼懼以城降降戶江翻有詔徵素還初素將行計日破賊皆如所量量音良於是以素為幷州道行軍總管河北道安撫大使帥衆數萬以討諒使疏吏翻諒之初起兵也兄豆盧毓為府主簿苦諫不從私謂其弟懿曰吾匹馬歸朝自得免禍此乃身計非為國也不若且偽從之徐伺其便朝直遙翻為于偽翻毓勣之子也豆盧勣見一百七十四卷陳宣帝太建十二年勣則歷翻隋志淮安郡後魏置東荊州西魏改淮州開皇五年又改顯州臣弟毓素懷志節必不從亂但逼兇威不能自遂臣請從軍與毓為表裏諒不足圖也帝許之賢密遣家人齎敕書至毓所與之計議諒出城將往介州隋志西河郡後魏置汾州後齊置南朔州後周改曰介州屬在掾下守手又翻漢王構逆敗不旋踵吾屬豈可坐受夷滅孤負國家邪邪音耶當與卿出兵拒之濤驚曰王以大事相付何得有是語因拂衣而去毓追斬之出皇甫誕於獄與之協計及開府儀同三司宿勤武等宿勤虜複姓後魏末有宿勤明達叛亂部分未定分扶問翻有人告諒諒襲擊之考異曰皇甫誕傳云楊素將至諒屯清源以拒之按諒屯清源時素軍已迫何暇自還襲毓今從毓傳紿其衆曰此賊軍也紿徒亥翻諒攻城南門稽胡守南城稽胡步落稽也散居介石二州射之射而亦翻矢下如雨諒移攻西門守兵識諒即開門納之毓誕皆死綦良攻慈州刺史上官政不克隋志魏郡滏陽縣後周置開皇十年置慈州大業初州廢又不克魏郡置相州治安陽相息亮翻下同隋志汲郡黎陽縣舊置黎州白馬津在東郡白馬縣北對黎陽岸塞之使不得渡塞悉則翻行戶剛翻帝以右衞將軍史祥為行軍總管軍於河陰河陰縣東魏置屬洛陽郡北對河陽岸余公理輕而無謀輕墟政翻恃衆而驕不足破也公理屯河陽祥具舟南岸公理聚兵當之祥簡精銳於下流潛濟公理聞之引兵拒之戰於須水按九域志鄭州滎陽縣有須水鎮然其地在河南史祥既濟河擊余公理當遇戰於河陽界水經註湨水出原城西北原山勳掌谷東南流過河陽無辟城又南入于河疑須水當作湨水湨古闃翻杜佑通典作湨水音同則須字誤明矣祥擊之公理大敗祥東趣黎陽綦良軍不戰而潰祥寧之子也史寧從宇文氏於兵間屢有戰功帝將發幽州兵疑幽州總管竇抗有貳心問可使取抗者於楊素素薦前江州刺史勃海李子雄隋志九江郡舊置江州拜廣州刺史拜廣州而使之往幽州未得之廣州隋志左右領軍府各掌十二軍籍帳差科辭訟之事與李子雄共經略之晟辭以男行布在諒所部帝曰公體國之深終不以兒害義朕今相委公其勿辭李子雄馳至幽州止傳舍傳直戀翻召募得千餘人抗來詣子雄子雄伏甲擒之抗榮定之子也竇榮定見一百七十五卷陳長城公至德二年子雄遂發幽州兵步騎三萬自井陘西擊諒時劉建圍戍將京兆張祥於井陘子雄破建於抱犢山下隋志恆州石邑縣有抱犢山李景被圍月餘被皮義翻詔朔州刺史代人楊義臣救之馬邑郡朔州與代州接境楊義臣本姓尉遲尉遲迥之亂義臣父崇以宗族之故自囚於獄高祖慰釋之後崇與突厥戰死義臣尚幼養於宮中以其父誠節賜姓楊氏夜出西陘新唐志代州鴈門縣有東陘關西陘關帥讀曰率義臣自以兵少少詩沼翻悉取軍中牛驢得數千頭復令兵數百人持一鼓潛驅之匿於澗谷間晡後義臣復與鍾葵戰復扶又翻兵初合命驅牛驢者疾進一時鳴鼓塵埃漲天鍾葵軍不知以為伏兵發因而奔潰義臣縱擊大破之晉絳呂三州皆為諒城守隋志臨汾郡霍邑縣後魏置永安郡開皇十六年置汾州十八年改呂州為于偽翻諒遣其將趙子開擁衆十餘萬柵絕徑路屯據高壁高壁嶺名將即亮翻下同陳讀曰陣素令諸將以兵臨之自引奇兵潛入霍山霍山在霍邑東北亦曰太岳山禹貢所謂岳陽指是山之陽也史記謂之霍太山素營於谷口自坐營外使軍司入營簡留三百人守營漢晉謂軍司馬為軍司今軍吏亦謂之軍司不欲出戰多願守營因爾致遲素責所由軍司具對素即召所留三百人出營悉斬之更令簡留人皆無願留者素乃引軍馳進出北軍之北直指其營鳴鼓縱火北軍不知所為自相蹂踐殺傷數萬蹂人九翻諒所署介州刺史梁脩羅屯介休隋介州治隰城縣而介休縣屬焉棄城走諒聞趙子開敗大懼自將衆且十萬拒素於蒿澤會大雨諒欲引軍還王頍諫曰楊素懸軍深入士馬疲弊王以銳卒自將擊之其勢必克今望敵而退示人以怯沮戰士之心益西軍之氣楊素軍自長安來故謂之西軍諒不從退守清源開皇十六年分晉陽置清源縣在晉陽西南宋白曰地理志榆次縣梗陽鄉魏戊邑今梗陽故城在清源縣南一百二十步此縣自漢至晉皆為榆次縣地隋置清源縣因縣西清源水為名王頍謂其子曰氣候殊不佳兵必敗汝可隨我楊素進擊諒大破之擒蕭摩訶諒退保晉陽素進兵圍之諒窮蹙請降降戶江翻餘黨悉平帝遣楊約齎手詔勞素勞力到翻王頍將奔突厥至山中徑路斷絕知必不免謂其子曰吾之計數不減楊素但坐言不見從遂至於此不能坐受擒獲以成豎子名吾死之後汝慎勿過親故於是自殺瘞之石窟中其子數日不得食遂過其故人過古禾翻瘞於計翻竟為所擒幷獲頍尸梟於晉陽梟其首也梟工堯翻㣥臣奏漢王諒當死帝不許除名為民絕其屬籍竟以幽死諒所部吏民坐諒死徙者二十餘萬家初高祖與獨孤后甚相愛重誓無異生之子嘗謂㣥臣曰前世天子溺於嬖幸溺奴狄翻嬖卑義翻又博計翻下同嫡庶分爭遂有廢立或至亡國朕旁無姬侍五子同母可謂真兄弟也豈有此憂邪邪音耶帝又懲周室諸王微弱故使諸子分據大鎮專制方面權侔帝室及其晚節父子兄弟迭相猜忌五子皆不以壽終臣光曰昔辛伯諗周桓公曰內寵並后外寵貳政嬖子配嫡大都偶國亂之本也左傳辛伯有是言而狐突引之諗式甚翻告也深諫也亂何自生哉隋高祖徒知嫡庶之多爭孤弱之易搖易以豉翻曾不知勢鈞位逼雖同產至親不能無相傾奪考諸辛伯之言得其一而失其三乎仁壽四年冬十月己卯葬文皇帝於太陵廟號高祖與文獻皇后同墳異穴仁壽四年詔除婦人及奴婢部曲之課男子二十二成丁隋因周齊之制婦人及奴婢部曲課役各隨給田為差軍人以二十一成丁至是以戶口益多府庫盈溢故有是詔是後兵役繁興盜賊㣥起而是詔為具文矣仁壽四年章仇太翼言於帝曰陛下木命雍州為破木之衝本旺在卯雍州在西酉位也故為破木之衝雍於用翻又讖云脩治洛陽還晉家治直之翻帝深以為然十一月乙未幸洛陽留晉王昭守長安楊素以功拜其子萬石仁行姪玄挺為儀同三司賚物五萬段綺羅千匹諒妓妾二十人妓渠綺翻仁壽四年丙申發丁男數十萬掘塹自龍門東接長平汲郡龍門縣屬蒲州長平郡澤州汲郡衞州塹七豔翻唐志衞州新鄉縣東北有臨清關浚儀汴州襄城汝州上洛商州仁壽四年壬子陳叔寶卒贈大將軍長城縣公長城縣屬吳郡今長興縣是也卒子恤翻諡法好內怠政曰煬帝諡陳叔寶曰煬豈知己不令終亦諡曰煬乎仁壽四年癸丑下詔於伊洛建東京仍曰宮室之制本以便生今所營構務從儉約據章校補仁壽四年蜀王秀之得罪也見上卷二年久不得調調徒釣翻時慈州刺史上官政坐事徙嶺南將軍丘和以蒲州失守除名守式又翻冑與和有舊酒酣謂和曰上官政壯士也今徙嶺表得無大事乎因自拊腹曰若是公者不徒然矣和奏之冑竟坐死元冑乘危而擠元旻於死豈知丘和在其後乎唐六典曰漢武帝以李廣為驍騎將軍後省光武改屯騎為驍騎晉文王立晉臺以為宿衞之官歷宋齊梁陳後魏北齊並有驍騎將軍之職後周有左右驍騎率上士二人至隋煬帝改左右備身為左右驍衞尋以其所領名豹騎而又別置備身驍堅堯翻煬皇帝上之上諱廣一名英小字阿高祖第二子也諡法好內遠禮曰煬去禮遠衆曰煬逆天虐民曰煬大業元年乙丑六五仁壽四年春正月壬辰朔赦天下改元仁壽四年立蕭氏為皇后仁壽四年廢諸州總管府後周置諸州總管隋因之又有增置今廢之仁壽四年丙辰立晉王昭為皇太子仁壽四年高祖之末㣥臣有言林邑多奇寶者時天下無事劉方新平交州劉方平交州見上卷仁壽三年隋志曰南郡梁置德州開皇十八年改曰驩州方遣欽州刺史甯長真等以步騎萬餘出越裳隋志寧越郡置欽州越裳縣屬日南郡比景漢縣屬日南郡隋置比景郡帥讀曰率愻蘇困翻軍至海口林邑出海之口仁壽四年二月戊辰敕有司大陳金寶器物錦綵車馬引楊素及諸將討漢王諒有功者立於前將即亮翻使奇章公牛弘宣詔稱揚功伐隋志巴州其章縣梁置又符陽縣舊置其章郡其一作奇牛弘傳封奇章郡公積功曰伐左傳大夫稱伐漢紀非有功伐賚來代翻素等再拜舞蹈而出己卯以素為尚書令唐六典秦變周法天下之事皆決丞相府置尚書於禁中有令丞掌通章奏而已漢初因之武宣之後稍以委任及光武親總吏職天下事皆上尚書與人主參決乃下三府尚書令為端揆之官魏晉已來其任尤重仁壽四年詔天下公除惟帝服淺色黃衫鐵裝帶仁壽四年三月丁未詔楊素與納言楊達將作大匠宇文愷營建東京後周幷齊以洛陽為東京徙洛州郭內居民及諸州富商大賈數萬戶以實之廢二崤道開葼冊道左傳晉禦秦師於殽殽有二陵焉南陵夏后皋之墓也北陵文王所以避風雨也酈道元曰言山徑委深峯阜交陰故可以避風雨水經有盤殽石崤千崤之山盤崤之山崤水所出也石崤之山石崤水所出也所謂崤有二陵則石崤之山也千崤之山千崤之水出焉其水北流瀍洛二道漢建安中曹公西討惡南路之嶮更開北道自後行旅率多從之山側附路有石銘云晉太康三年弘農太守梁柳脩復故道太崤以東東西崤以西明非一崤也魏書地形志恆農郡有崤縣太和十一年置縣有三崤山志又有西恆農郡治恆農縣有桃林隋志河南郡桃林縣開皇十六年置有上陽宮陝縣後魏置陝州恆農郡後周又置崤郡開皇初郡廢大業初州廢置恆農宮又熊耳縣後周置有後魏崤縣大業初廢有二崤及峽石山新唐志陝州峽石縣本崤移治峽石塢有繡嶺宮靈寶縣本桃林古函谷關在縣西有桃源宮洛州永寧縣本熊耳西五里有崎岫宮南三十三里有蘭峯宮此皆東西二京往來緣道離宮雜出於隋唐所置不載所謂葼冊道不知此道起於何所入於何所山海經曰夸父之山在湖縣西九里其山多椶枏其北曰桃林或者椶枏字後訛為葼冊遂為葼冊道歟無徵不信又當博考杜佑曰隋大業七年移潼關道於南北鎮城間土舟獸檻谷置去舊關四里餘賈音古土舟音闕葼子紅翻按土舟今本杜佑通典作坑仁壽四年戊申詔曰聽採輿頌謀及庶民故能審刑政之得失今將巡歷淮海觀省風俗省悉景翻仁壽四年敕宇文愷與內史舍人封德彞等營顯仁宮南接皁澗北跨洛濱隋志河南郡壽安縣有顯仁宮水經註洛水徑宜陽縣故城南又東與黑澗水合水出陸渾西山歷黑澗西北入洛皁才早翻輸之洛陽又求海內嘉木異草珍禽奇獸以實園苑辛亥命尚書右丞皇甫議發河南淮北諸郡民前後百餘萬開通濟渠杜佑曰陳留郡城西有通濟渠煬帝開以通江淮漕運兼引汴水即莨蕩渠也考異曰雜記作皇甫公儀又云發兵夫五十餘萬今從略記是歲營建東京東去故都十八里南直伊闕之口北倚邙山之塞東出瀍水之東西出澗水之西其城西面連苑距上陽宮七里苑牆周迴一百二十六里北拒北邙西至孝水南帶洛水支渠穀洛二水會于其間故自苑引之為渠以達于河板渚在虎牢之東水經河水東合汜水又東過板城北有津謂之板城渚口又東過滎陽縣蒗蕩渠出焉是渠南出為汴水漢之滎陽石門即其地也隋志滎陽郡滎澤縣開皇四年置曰廣武仁壽元年改焉達于淮大梁即浚儀也引河入汴汴入泗蓋皆故道自山陽至楊子入江春秋吳城邗溝通江淮此亦因故道也邗溝貫今揚州城中山陽今淮安州楊子今真州邗音寒廣古曠翻渠旁皆築御道樹以柳自長安至江都江都郡揚州庚申遣黃門侍郎王弘等往江南造龍舟及雜船數萬艘艘蘇遭翻東京官吏督役嚴急役丁死者什四五所司以車載死丁東至城皋隋志鄭州滎陽縣舊置成皋郡相望於道又作天經宮於東京四時祭高祖經曰夫孝天之經也故以名宮仁壽四年林邑王梵志梵扶泛翻遣兵守險劉方擊走之師渡闍黎江闍視遮翻林邑兵乘巨象四面而至方戰不利乃多掘小坑草覆其上覆敷又翻以兵挑之挑徒了翻既戰偽北林邑逐之象多陷地顛躓躓音致轉相驚駭軍遂亂方以弩射象象卻走蹂其陳射而亦翻蹂人九翻陳讀曰陣因以銳師繼之林邑大敗俘馘萬計方引兵追之屢戰皆捷過馬援銅柱南新唐書林邑奔浪陀州其南大浦有五銅柱山形若倚蓋西重巖東涯海漢馬援所植也杜佑曰林邑南水步二千餘里有西屠夷馬援所樹兩銅柱表界處也銅柱山周十里形如倚蓋西跨重巖東臨大海宋白曰馬援討交趾自日南南行四百餘里至林邑又南行二千餘里有西屠夷國援至其國鑄二銅柱於象林南界與西屠夷分境計交州至銅柱五千里宋杜之說銅柱在林邑南今此所記則林邑在銅柱南夏四月梵志棄城走入海方入城獲其廟主十八皆鑄金為之刻石紀功而還士卒腫足死者什四五方亦得疾卒於道卒子恤翻初尚書右丞李綱數以異議忤楊素及蘇威數色角翻忤五故翻素薦綱於高祖以為方行軍司馬方承素意屈辱之幾死幾居希翻軍還久不得調調徒釣翻威復遣綱詣南海應接林邑久而不召綱自歸奏事威劾奏綱亶離所職下吏按問劾戶概翻又戶得翻離力智翻下遐嫁翻會赦免官屏居於鄠鄠縣屬京兆郡為李綱為何潘仁所逼致張本屏必郢翻鄠音戶仁壽四年五月築西苑周二百里與六典所紀小異周十餘里為蓬萊方丈瀛洲諸山象海中三神山臺觀殿閣羅絡山上向背如神觀古玩翻背蒲妹翻北有龍鱗渠縈紆注海內緣渠作十六院門皆臨渠每院以四品夫人主之內命婦之品視百官窮極華麗宮樹秋冬彫落則翦綵為華葉綴於枝條色渝則易以新者常如陽春沼內亦翦綵為荷芰菱芡乘輿遊幸則去冰而布之芰奇寄翻芡巨險翻乘繩證翻去羌呂翻十六院競以殽羞精麗相高求市恩寵上好以月夜從宮女數千騎遊西苑作清夜遊曲於馬上奏之用曹植清夜遊西園之詩以名曲好呼到翻騎奇計翻仁壽四年帝待諸王恩薄多所猜忌滕王綸衞王集內自憂懼呼術者問吉凶及章醮求福或告其怨望呪詛呪職救翻詛莊助翻有司奏請誅之秋七月丙午詔除名為民徙邊郡綸瓚之子集爽之子也瓚高祖之母弟爽異母弟瓚藏旱翻仁壽四年八月壬寅上行幸江都考異曰雜記作九月今從隋帝紀及略記王弘遣龍舟奉迎乙巳上御小朱航自漕渠出洛口洛水入河之口考異曰略記云甲子進龍舟按長曆是月戊子朔無甲子高四十五尺重直龍翻高工號翻考異曰略記云高五丈雜記言其制度尤詳今從之長二百丈章十二行本丈作尺乙十一行本同孔本同長尺亮翻上重有正殿內殿東西朝堂中二重有百二十房皆飾以金玉下重內侍處之朝直遙翻處直呂翻皇后乘翔螭舟制度差小而裝飾無異別有浮景九艘三重皆水殿也螭丑知翻艘蘇遭翻下同又有漾彩朱鳥蒼螭白虎玄武飛羽青鳧陵波五樓道場玄壇板章十二行本板上有樓船二字乙十一行本同孔本同張校同舟翕黃篾等數千艘舟翕託盍翻大船曰舟翕篾音蔑尼女夷翻及載內外百司供奉之物共用挽船士八萬餘人其挽漾彩以上者九千餘人謂之殿腳皆以錦綵為袍又有平乘青龍艨艟艚舟爰八櫂艇舸等數千艘艨莫公翻艟尺庸翻艚昨遭翻舟爰字書闕櫂讀曰棹艇徒頂翻舸賈我翻並十二衞兵乘之幷載兵器帳幕兵士自引不給夫舳艫相接二百餘里照耀川陸騎兵翊兩岸而行舳艫音逐盧騎奇寄翻下同旌旗蔽野所過州縣五百里內皆令獻食多者一州至百轝轝音余極水陸珍奇後宮厭飫將發之際多棄埋之飫於據翻仁壽四年契丹寇營州遼西郡置營州契欺訖翻又音喫隋志帝即位增置謁者臺改內史省通事舍人為謁者臺職通事謁者員二十人從六品啟民可汗發騎二萬受其處分厥九勿翻可從刊入聲汗音寒處昌呂翻分扶問翻雲起分為二十營四道俱引營相去一里不得交雜聞鼓聲而行聞角聲而止自非公使勿得走馬公使謂公事使之擊鼓而發有紇干犯約斬之紇干突厥小官紇下沒翻於是突厥將帥入謁皆膝行股栗莫敢仰視將即亮翻帥所類翻契丹本事突厥情無猜忌雲起既入其境使突厥詐云向柳城此古柳城也隋志遼西郡營州並治柳城縣乃龍城縣龍城本和龍城自後魏以來營州治焉開皇元年改為龍山縣十八年改為柳城敢漏泄事實者斬契丹不為備去其營五十里馳進襲之盡獲其男女四萬口殺其男子以女子及畜產之半賜突厥餘皆收之以歸帝大喜集百官曰雲起用突厥平契丹才兼文武朕今自舉之擢為治書侍御史治直之翻仁壽四年初西突厥阿波可汗為葉護可汗所虜見一百七十六卷陳長城公禎明元年是為泥利可汗泥利卒子達漫立號處羅可汗其母向氏向式亮翻本中國人更嫁泥利之弟婆實特勒更工衡翻開皇末婆實與向氏入朝朝直遙翻遇達頭之亂遂留長安舍於鴻臚寺鴻臚寺主蕃客臚音閭撫御失道國人多叛復為鐵勒所困復扶又翻鐵勒者匈奴之遺種種章勇翻族類最多有僕骨同羅契苾薛延陀等部其酋長皆號俟斤酋才由翻長知兩翻下同俟渠之翻族姓雖殊通謂之鐵勒大抵與突厥同俗以寇抄為生無大君長分屬東西兩突厥是歲處羅引兵擊鐵勒諸部厚稅其物又猜忌薛延陀恐其為變集其酋長數百人盡殺之於是鐵勒皆叛立俟利發俟斤契苾歌楞為莫何可汗苾毗必翻楞盧登翻又立薛延陀俟斤字也咥為小可汗咥昌栗翻又徒結翻與處羅戰屢破之莫何勇毅絕倫甚得衆心為鄰國所憚伊吾高昌焉耆皆附之二年二年春正月辛酉東京成進將作大匠宇文愷位開府儀同三司二年丁卯遣十使併省州縣使疏吏翻二年二月丙戌詔吏部尚書牛弘等議定輿服儀衞制度考異曰帝紀云尚書令牛弘禮部侍郎許善心按弘未嘗為尚書令善心於帝即位之初已左遷蓋紀誤也使之營造送江都稠智思精巧思相吏翻博覽圖籍參會古今多所損益袞冕畫日月星辰皮弁用漆紗為之書日月星辰山龍華蟲作會周升日月於旌旗而闕三辰今復古制五經通義弁高五寸前後玉飾詩云璯弁如星董巴曰以鹿皮為之何稠用漆紗施象牙簪導弁加簪導自稠始也黃麾仗汔唐遵而用之大朝會大駕皇后鹵簿百官儀服務為華盛以稱上意稱尺證翻課州縣送羽毛民求捕之網羅被水陸被皮義翻禽獸有堪氅毦之用者殆無遺類氅昌兩翻毦乃吏翻羽毛飾也烏程有高樹烏程屬湖州郡國志曰古烏氏程氏居此能醞酒故以名縣旁無附枝上有鶴巢民欲取之不可上上時掌翻乃伐其根鶴恐殺其子自拔氅毛投於地時人或稱以為瑞曰天子造羽儀鳥獸自獻羽毛所役工十萬餘人用金銀錢帛鉅億計帝每出遊幸羽儀填街溢路亙二十餘里三月庚午上發江都夏四月庚戌自伊闕陳法駕備千乘萬騎入東京隋志伊闕縣舊曰新城開皇十八年更名屬河南郡北至東京二百餘里乘繩證翻騎奇寄翻辛亥御端門唐六典東京皇城南面三門中曰端門免天下今年租賦制五品已上文官乘車在朝弁服佩玉隋制五品已上服紫自公已下佩水蒼玉朝直遙翻戴幘服袴褶珂螺屬生海中潔白如雪色通俗文曰馬勒飾曰珂溫公類篇曰鵰入海為珂爾雅翼曰珂黃黑色其骨白可以飾馬此等飾非特取其容兼取其聲故說文小貝蘇切貝聲也董巴曰幘起於秦人施於武將初為絳袹以表貴賤珂音丘何翻褶音習近世莫及也二年六月壬子以楊素為司徒進封豫章王暕為齊王暕古限翻二年秋七月庚申制百官不得計考增級必有德行功能灼然顯著者進擢之行下孟翻帝頗惜名位㣥臣當進職者多令兼假而已雖有闕員留而不補時牛弘為吏部尚書不得專行其職別敕納言蘇威左翊衞大將軍宇文述帝改左右衞為左右翊衞驍堅堯翻內史侍郎虞世基御史大夫裴蘊黃門侍郎裴矩參掌選事時人謂之選曹七貴選宣戀翻雖七人同在坐坐徂臥翻然與奪之筆虞世基獨專之受納賄賂多者超越等倫無者注色而已注其入仕所歷之色也宋末參選者具腳色狀今謂之根腳邃之從曾孫也裴邃為梁將著功名從才用翻二年元德太子昭自長安來朝帝令昭留守長安朝音直遙翻將還欲乞少留少詩沼翻帝不許拜請無數體素肥因致勞疾甲戌薨考異曰雜記云初太子之遘疾也時與楊素同在侍宴帝既深忌於素並起二巵同至傳酒者不悟是藥酒錯進太子既飲三日而毒發下血二斗餘宮人聞素平常始知毒酒誤飲太子祕不敢言太子知之歎曰豈意代楊素死乎命也數日而薨後素亦竟以毒斃按他書皆無此說蓋時人見太子與素相繼薨妄有此論耳數聲而止尋奏聲伎無異平日伎渠綺翻二年楚景武公楊素雖有大功特為帝所猜忌外示殊禮內情甚薄太史言隋分野有大喪乃徙素為楚公意言楚與隋同分欲以厭之分扶問翻厭於葉翻素寢疾帝每令名醫診候賜以上藥然密問醫者恆恐不死診章忍翻恆戶登翻素亦自知名位已極不肯餌藥亦不將慎謂其弟約曰我豈須更活邪乙亥素薨贈太尉公弘農等十郡太守葬送甚盛邪音耶守式又翻二年八月辛卯封皇孫倓為燕王侗為越王倓徒甘翻燕因肩翻侗他紅翻侑為代王皆昭之子也二年九月乙丑立秦孝王子浩為秦王帝弟秦王俊諡秦孝王二年帝以高祖末年法令峻刻冬十月詔改脩律令二年置洛口倉於鞏東南原上鞏縣屬河南郡洛水至鞏縣入河謂之洛口周回二十餘里穿三千窖窖工孝翻窖容八千石以還置監官幷鎮兵千人監古銜翻十二月置回洛倉於洛陽北七里倉城周回十里穿三百窖二年初齊溫公之世齊主緯周封為溫公謂之散樂散悉亶翻鄭譯奏徵之見一百七十四卷陳高宗太建十一年散悉亶翻命牛弘定樂非正聲清商及九部四舞之色悉放遣之正聲謂鄭譯等所定之樂也開皇九年平陳置清商署管宋齊舊樂即清樂也杜佑曰清樂者其始即清商三調是也並漢氏以來舊典樂器形制幷歌章古調與魏三祖所作者皆備於史籍屬晉朝遷播夷羯竊據其音分散苻堅平張氏於涼州得之宋武平關中因而入南及隋平陳後文帝聽而善其節奏曰此華夏正聲也因置清商署總謂之清樂帝定清樂西涼龜茲天竺康國疏勒安國高麗禮畢為九部又開皇定令牛弘請存鞞鐸巾拂四舞與諸伎並陳因謂之四舞欲以富樂誇之太常少卿裴蘊希旨奏括天下周齊梁陳樂家子弟皆為樂戶可從刊入聲汗音寒朝直遙翻富樂音洛少始照翻有善音樂者皆直太常帝從之於是四方散樂大集東京閱之於芳華苑積翠池側芳華苑蓋即西苑激水滿衢黿鼉龜鼈水人蟲魚徧覆于地覆敷又翻又有鯨魚噴霧翳日忽化成黃龍長七八丈長直亮翻又二人戴竿上有舞者歘然騰過左右易處歘許勿翻又有神鼇負山幻人吐火千變萬化伎人皆衣錦繡繒綵伎渠綺翻衣於既翻舞者鳴環佩綴花毦毦乃吏翻課京兆河南製其衣兩京錦綵為之空竭為于偽翻帝多製豔篇令樂正白明達造新聲播之音極哀怨隋制太樂署清商署各有樂師員帝改樂師為樂正置員十人謂明達曰齊氏偏隅樂工曹妙達猶封王隋志齊後主賞胡戎樂耽愛無已於是繁手淫聲爭新哀怨故曹妙達安馬駒之徒至有封王開府煬帝溺於淫聲以亡國自況淫昏甚矣方且貴汝宜自脩謹三年三年春正月朔旦大陳文物時突厥啟民可汗入朝見而慕之請襲冠帶帝不許明日又率其屬上表固請厥九勿翻可從刊入聲汗音寒帥讀曰率上時掌翻帝大悅謂牛弘等曰今衣冠大備致單于解辮卿等功也單音蟬各賜帛甚厚三年三月辛亥帝還長安三年癸丑帝使羽騎尉朱寬入海開皇六年置武騎屯騎驍騎游騎飛騎旅騎雲騎羽騎八尉羽騎從九品騎奇寄翻至流求國而還隋書流求國居海島之中當建安郡東水行五日而至是後陳稜自義安擊流求至高華嶼又東行二日至鼊嶼又一日便至流求還從宣翻又音如字三年初雲定興閻毗坐媚事太子勇與妻子皆沒官為奴婢容事上卷開皇二十年多所營造聞其有巧思思相吏翻召之使典其事以毗為朝請郎開皇置八郎朝請第三朝直遙翻定興以明珠絡帳賂述幷以奇服新聲求媚於述述大喜兄事之上將有事四夷大作兵器述薦定興可使監造上從之監古銜翻述謂定興曰兄所作器仗並合上心而不得官者為長寧兄弟猶未死耳定興曰此無用物何不勸上殺之述因奏房陵諸子廢太子勇追封房陵王今欲興兵誅討若使之從駕則守掌為難若留於一處又恐不可進退無用請早處分處昌呂翻分扶問翻帝然之乃鴆殺長寧王儼分徙其七弟於嶺表仍遣間使於路盡殺之間古莧翻使疏吏翻襄城王恪之柳氏自殺以從恪三年夏四月庚辰下詔欲安輯河北巡省趙魏省悉景翻三年牛弘等造新律成凡十八篇謂之大業律甲申始頒行之民久厭嚴刻喜於寬政其後征役繁興民不堪命有司臨時迫脅以求濟事不復用律令矣復扶又翻又音如字旅騎尉劉炫預脩律令弘嘗從容問炫曰騎奇寄翻炫熒絹翻從千容翻周禮士多而府史少少詩沼翻今令史百倍於前減則不濟其故何也炫曰古人委任責成歲終考其殿最殿丁甸翻案不重校重直龍翻文不繁悉府史之任掌要目而已今之文簿恆慮覆治治直之翻若鍛鍊不密則萬里追證百年舊案故諺云老吏抱案死事繁政弊職此之由也弘曰魏齊之時令史從容而已今則不遑寧處何故處昌呂翻炫曰往者州唯置綱紀此綱紀謂長史司馬縣置令而已其餘具僚則長官自辟長知兩翻受詔赴任每州不過數十今則不然大小之官悉由吏部纖介之迹皆屬考功考功侍郎掌內外文武官吏之功課皆具錄當年功過行能而考校之官事不省而望從容其可得乎弘善其言而不能用三年壬辰改州為郡改度量權衡並依古式改上柱國以下官為大夫舊上柱國下至都督凡十一等今改為光祿左右光祿金紫銀青光祿正議通議朝請朝散九大夫殿內省掌諸供奉增謁者司隸臺謁者臺掌受詔勞問出使慰撫持節察按及受冤枉而申奏之司隸臺掌諸巡察分太府寺置少府監太府寺止掌左右藏黃藏其尚方司織司染鎧甲弓弩掌冶皆屬少府監少始照翻改內侍省為長秋監改左右衞為左右翊衞左右備身為左右驍衞左右武衞依舊名改領軍為左右屯衞加置左右禦衞改左右武候為左右候衞是為十二衞改領左右府為左右備身府左右監門依舊名凡十六府唯留王公侯三等三年丙寅車駕北巡己亥頓赤岸澤五月丁巳章十二行本巳作酉乙十一行本同孔本同突厥啟民可汗遣其子拓特勒來朝厥九勿翻可從刊入聲汗音寒朝直遙翻戊午發河北十餘郡丁男鑿太行山達于幷州以通馳道行戶剛翻丙寅啟民遣其兄子毗黎伽特勒來朝伽求加翻辛未啟民遣使請自入塞奉迎輿駕使疏吏翻上不許三年初高祖受禪唯立四親廟同殿異室而已四親廟一曰皇高祖太原府君廟二曰皇曾祖康王廟三曰皇祖獻王廟四曰皇考太祖武元皇帝廟命有司議七廟之制禮部侍郎攝太常少卿許善心等時定制尚書省六部各侍郎一人以貳尚書之職諸曹侍郎並改為郎為于偽翻準周文武二祧與始祖而三祧土彫翻餘並分室而祭從迭毀之法至是有司請如前議於東京建宗廟帝謂祕書監柳䛒曰䛒與辯同今始祖及二祧已具後世子孫處朕何所處昌呂翻六月丁亥詔為高祖建別廟仍修月祭禮既而方事巡幸竟不果立三年帝過鴈門帝改代州為鴈門郡守手又翻獻食甚精至馬邑帝改朔州為馬邑郡帝不悅以和為博陵太守改定州為博陵郡丘和自邊郡遷內郡以示賞也由是所至獻食競為豐侈戊子車駕頓榆林郡時改勝州為榆林郡徑突厥中指于涿郡厥九勿翻時改幽州為涿郡恐啟民驚懼先遣武衞將軍長孫晟諭旨長知兩翻晟承正翻啟民奉詔因召所部諸國奚霫室韋等酋長數十人咸集霫居鮮卑故地保冷陘山南奧支水室韋契丹之類也其南者為契丹其北者為室韋新唐書室韋蓋丁零苗裔也地據黃龍北傍峱越河霫而立翻酋才由翻長知兩翻欲令啟民親除之示諸部落以明威重乃指帳前草曰此根大香啟民遽嗅之嗅許救翻曰殊不香也晟曰天子行幸所在諸侯躬自灑掃耕除御路以表至敬之心今牙內蕪穢謂是留香草耳啟民乃悟曰奴之罪也奴之骨肉皆天子所賜得效筋力豈敢有辭特以邊人不知法耳賴將軍教之將軍之惠奴之幸也遂拔所佩刀自芟庭草芟所銜翻其貴人及諸部爭效之於是發榆林北境至其牙東達於薊涿郡治薊長直亮翻廣百步廣古曠翻舉國就役開為御道帝聞晟策益嘉之丁酉啟民及義成公主來朝行宮朝直遙翻己亥吐谷渾高昌並遣使入貢吐從暾入聲谷音浴使疏吏翻甲辰上御北樓觀漁於河以宴百僚定襄太守周法尚朝于行宮改雲州為定襄郡守式又翻漢武出關旌旗千里事見二十卷漢武帝元封元年請分為二十四軍日別遣一軍發相去三十里旗幟相望鉦鼓相聞首尾相屬幟昌志翻鉦音征屬之欲翻千里不絕此亦出師之盛者也法尚曰不然兵亙千里動間山川間古莧翻猝有不虞四分五裂腹心有事首尾未知道路阻長難以相救雖有故事乃取敗之道也帝不懌曰卿意如何法尚曰結為方陳陳讀曰陣四面外拒六宮及百官家屬並在其內若有變起所當之面即令抗拒內引奇兵出外奮擊車為壁壘重設鉤陳鉤陳曲陳如鉤象天之鉤陳星重直龍翻陳如字理亦何異若戰而捷抽騎追奔騎奇計翻萬一不捷屯營自守臣謂此萬全之策也帝曰善因拜法尚左武衞將軍啟民可汗復上表以為先帝可汗憐臣賜臣安義公主種種無乏可從刊入聲汗音寒復扶又翻上時掌翻種章勇翻共欲殺臣臣當是時走無所適仰視唯天俯視唯地奉身委命依歸先帝先帝憐臣且死養而生之以臣為大可汗還撫突厥之民事見一百七十八卷開皇十九年厥九勿翻還如先帝養生臣及突厥之民種種無乏臣荷戴聖恩荷下可翻言不能盡臣今非昔日突厥可汗乃是至尊臣民願率部落變改衣服一如華夏帥讀曰率夏戶雅翻帝以為不可秋七月辛亥賜啟民璽書諭以磧北未靜猶須征戰璽斯氏翻磧七亦翻但存心恭順何必變服帝欲誇示突厥令宇文愷為大帳其下可坐數千人甲寅帝於城東御大帳備儀衞宴啟民及其部落作散樂散昔亶翻爭獻牛羊駝馬數千萬頭帝賜啟民帛二千章十二行本千作十孔本同張校同萬段其下各有差又賜啟民路車乘馬鼓吹幡旗乘繩證翻吹昌瑞翻贊拜不名位在諸侯王上又詔發丁男百餘萬築長城西拒榆林東至紫河隋志定襄郡大利縣有陰山有紫河通典紫河發源朔州善陽縣金河上承紫河上不聽築之二旬而畢帝之徵散樂也太常卿高熲諫不聽熲退謂太常丞李懿曰周天元以好樂而亡殷鑒不遠安可復爾好呼到翻復扶又翻下同熲又以帝遇啟民過厚謂太府卿何稠曰此虜頗知中國虛實山川險易易以豉翻恐為後患又謂觀王雄曰雄自安德郡王改封觀王觀古玩翻近來朝廷殊無綱紀禮部尚書宇文㢸私謂熲曰天元之侈以今方之不亦甚乎又言長城之役幸非急務光祿大夫賀若弼亦私議宴可汗太侈並為人所奏帝以為誹謗朝政丙子高熲宇文㢸賀若弼皆坐誅㢸古弼字若人者翻朝直遙翻下同弼妻子沒官為奴婢事連蘇威亦坐免官熲有文武大略明達世務自蒙寄任竭誠盡節進引貞良以天下為己任蘇威楊素賀若弼韓擒虎皆熲所推薦自餘立功立事者不可勝數勝音升當朝執政將二十年朝野推服物無異議海內富庶熲之力也及死天下莫不傷之先是蕭琮以皇后故甚見親重先昔薦翻為內史令改封梁公宗族緦麻以上皆隨才擢用諸蕭昆弟布列朝廷琮性澹雅不以職務為意身雖羇旅見北間豪貴無所降下澹徒覽翻下遐嫁翻與賀若弼善弼既誅又有童謠曰蕭蕭亦復起帝由是忌之遂廢於家未幾而卒幾居豈翻卒子恤翻三年八月壬午車駕發榆林歷雲中泝金河隋志榆林郡有金河縣杜佑曰單于都護府秦漢雲中郡地也治金河縣縣有金河上承紫河宋白曰金河縣即漢盛樂縣地百物豐實甲士五十餘萬馬十萬匹旌旗輜重千里不絕重直用翻令宇文愷等造觀風行殿上容侍衞者數百人離合為之下施輪軸忽推移又作行城周二千步以板為榦衣之以布衣於既翻樓櫓悉備胡人驚以為神每望御營十里之外屈膝稽顙無敢乘馬稽音啟啟民奉廬帳以俟車駕乙酉帝幸其帳啟民奉觴上壽跪伏恭甚上時掌翻下同王侯以下袒割於帳前袒而割肉帝大悅賦詩曰呼韓頓顙至屠耆接踵來何如漢天子空上單于臺上時掌翻單音蟬皇后亦幸義成公主帳帝賜啟民及公主金甕各一幷衣服被褥錦綵特勒以下受賜各有差帝還啟民從入塞己丑遣歸國癸巳入樓煩關樓煩郡治靜樂縣縣有關官壬寅至太原詔營晉陽宮帝謂御史大夫張衡曰朕欲過公宅可為朕作主人過工禾翻為于偽翻衡乃先馳至河內具牛酒張衡河內人帝改懷州為河內郡開直道九十里開直道抵張衡所居行戶剛翻己未至濟源開皇十六年置濟源縣屬河內郡濟子禮翻帝悅其山泉留宴三日賜賚甚厚衡復獻食賚來代翻復扶又翻帝令頒賜公卿下至衞士無不霑洽己巳至東都三年壬申以齊王暕為河南尹癸酉以民部尚書楊文思為納言三年冬十月敕河南章十二行本南作北乙十一行本同孔本同諸郡送一藝戶陪東都三千餘家置十二坊於洛水南以處之藝戶謂其家以技藝名者陪助也處昌呂翻三年西域諸胡多至張掖交市帝改甘州為張掖郡交市為互市也矩知帝好遠略商胡至者矩誘訪諸國山川風俗王及庶人儀形服飾撰西域圖記三卷合四十四國入朝奏之好呼報翻誘音酉撰士免翻朝直遙翻下同仍別造地圖窮其要害從西傾以去西傾山在隴西臨洮縣西南洮水之所出也將二萬里發自敦煌帝改瓜州為敦煌郡敦徒門翻此西海在條支西北道從伊吾中道從高昌南道從鄯善伊吾唐為伊州高昌唐為西州鄯善唐為納縛波地鄯時戰翻且云以國家威德將士驍雄將即亮翻驍堅堯翻汎濛汜而越崑崙易如反掌濛汜蒙谷之水也日所入處史記禹本紀言河出崑崙汜祥里翻崙盧昆翻易以豉翻為其壅遏故朝貢不通吐從暾入聲朝直遙翻引領翹首願為臣妾若服而撫之務存安輯皇華遣使弗動兵車諸蕃既從渾厥可滅混壹戎夏其在茲乎渾厥謂吐谷渾突厥也使疏吏翻厥九勿翻夏戶雅翻賜帛五百段日引矩至御坐親問西域事矩盛言胡中多諸珍寶吐谷渾易可幷吞谷音浴易弋豉翻帝於是慨然慕秦皇漢武之功甘心將通西域四夷經略咸以委之以矩為黃門侍郎復使至張掖引致諸胡啗之以利勸令入朝復扶又翻啗徒濫翻又徒覽翻自是西域胡往來相繼所經郡縣疲於送迎糜費以萬萬計卒令中國疲弊以至於亡卒子恤翻皆矩之唱導也三年鐵勒寇邊帝遣將軍馮孝慈出敦煌擊之不利鐵勒尋遣使謝罪請降降戶剛翻帝使裴矩慰撫之王崇武標點容肇祖聶崇岐覆校
