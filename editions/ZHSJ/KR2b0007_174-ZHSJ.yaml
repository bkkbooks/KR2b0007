body:
  text: 資治通鑑卷第一百七十四端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註陳紀八高宗宣皇帝下之上太建十二年太建十二年庚子五八太建十二年春正月癸巳周天元祠太廟史言周天元既以朝政授其子而猶主祭祀太建十二年戊戌以左衞將軍任忠為南豫州刺史此時南豫州治宣城任音壬太建十二年乙卯周稅入市者人一錢太建十二年二月丁巳周天元幸露門學釋奠周露門學在露門左右塾古者仲春仲秋皆以上丁釋奠于先聖先師鄭玄曰釋奠者設薦饌酌奠而已太建十二年戊午突厥入貢于周且迎千金公主周許以千金公主妻突厥事始上卷上年厥九勿翻太建十二年乙丑周天元改制為天制敕為天敕制者大賞罰大除授赦宥慮囚慰勞用之敕者廢置州縣增減官吏除免官爵授六品以上官發兵施行百官奏請戒約臣下皆用之皆宣署申覆而後行壬午尊天元皇太后為天元上皇太后天皇太后為天元聖皇太后二太后天元嫡母阿史那氏所生母李氏也癸未詔楊后與三后皆稱太皇后三后朱后元后陳后也司馬后正陽宮皇后也行軍總管公亮天元之從祖兄也天元從祖宇文泰之兄弟也從才用翻蜀公迥之孫尉紆勿翻有美色以宗婦入朝天元飲之酒逼而淫之朝直遙翻飲於禁翻亮聞之懼三月軍還至豫州自淮南還軍豫州治汝南還音旋又音如字幷其衆韋孝寬征南行軍元帥帥所類翻諸父謂趙王招兄弟亮國官茹寬知其謀諸國公各有國官茹姓也後魏書普六茹後改為茹氏余按太和之時南齊有茹法亮蓋南國自有茹氏今茹寬既仕於北國恐出於普六茹氏茹音如孝寬潛設備亮夜將數百騎襲孝寬營將即亮翻又音如字領也騎奇寄翻不克而走戊子孝寬追斬之溫亦坐誅天元即召其妻入宮拜長貴長知兩翻辛卯立亮弟永昌公椿為公太建十二年周天元如同州增候正前驅式道候為三百六十重候正主候望前驅先驅也式道候在大駕前重直龍翻鄭玄曰天子五門皋庫雉應路詩云乃立應門應門將將赤岸澤在長安北同州南道里蓋適中幡旗相蔽音樂俱作又令虎賁持鈒馬上稱警蹕賁音奔鈒色立翻戟也鋋也警戒也戒人以車駕將至也蹕蹕止行人也乙未改同州宮為成天宮庚子還長安還從宣翻又音如字詔天臺侍衞之官皆著五色及紅紫綠衣以雜色為緣名曰品色衣著則略翻緣以絹翻五代志以錦綺繢繡為緣有大事與公服間服之五代志後周之制諸命秩之服曰公服其餘常服曰私衣隋唐以下有朝服有公服朝服曰具服公服曰從省服間古莧翻壬寅詔內外命婦皆執笏後周之制內外命婦各有命服未嘗執笏也皆俛伏如男子俛音免天元將立五皇后以問小宗伯狄道辛彥之五代志狄道縣屬金城郡皇后與天子敵體不宜有五太學博士西城何妥曰昔帝嚳四虞舜二先代之數何常之有博士秦官漢置五經博士即太學博士也晉武帝立國子學置博士一人遂有國子博士太學博士之分西城郡時置金州帝王紀云帝嚳四元有邰氏女曰姜嫄次有娀氏女曰簡狄次陳豐氏女曰慶都次娵訾氏曰常義列女傳云舜二堯之二女長曰娥皇次曰女英史言何妥曲學以阿世不可以訓嚳苦沃翻嫄音原娵遵須翻訾子斯翻妥他果翻免彥之官甲辰詔曰坤儀比德土數惟五四太皇后外可增置天中太皇后一人於是以陳氏為天中太皇后尉遲為天左太皇后陳氏山提之女尉遲氏宇文溫之妻尉紆勿翻使五皇后各居其一實宗廟祭器於前自讀祝版而祭之下帳山陵中便房所用此所謂下帳蓋周天元以自所居者為上帳五皇后所居者為下帳也祝版所以祝鬼神自帥左右步從按古制有五輅後周之制皇帝之輅十有二等皇后之車十有二等亦曰輅下至三三公三公夫人之輅皆九至上媛婦中大夫孺人其輅五天元雖淫侈無道何至以古之五輅載婦人其實用媛婦以下所乘五輅耳五輅謂玄輅夏篆夏縵墨車輚車也帥讀曰率從才用翻觀其號呼以為樂好呼到翻號戶高翻樂音洛太建十二年夏四月癸亥尚書左僕射陸繕卒卒子恤翻太建十二年己巳周天元祠太廟己卯大雩壬午幸仲山祈雨顏師古曰仲山即今九嵕山之東仲山是也括地志仲山在雍州雲陽縣西十五里甲申還宮令京城士女於衢巷作樂迎候還從宣翻又音如字令力丁翻太建十二年五月癸巳以尚書右僕射晉安王伯恭為僕射太建十二年周楊后性柔婉不妬忌四皇后及嬪御等咸愛而仰之嬪內官九嬪也嬪婦也能行婦道者也御侍也進也進御於君者也嬪毗賓翻喜怒乖度嘗譴后欲加之罪后進止詳閑辭色不撓譴詰戰翻詳審也諦也閑暇也習也撓曲也又動亂也撓女巧翻又女教翻天元大怒遂賜后死逼令引訣漢書多作引決謂引分自裁也訣別也令力丁翻獨孤氏信之女也叩頭流血然後得免后父大前疑堅位望隆重天元忌之嘗因忿謂后曰必族滅爾家因召堅謂左右曰色動即殺之堅至神色自若乃止內史上大夫鄭譯與堅少同學少詩照翻奇堅相表相息亮翻傾心相結堅既為帝所忌情不自安嘗在永巷永巷宮中長巷身事不敢昌言之故曰私久願出藩公所悉也出藩謂出補外藩悉諳究也少詩沼翻譯曰以公德望天下歸心欲求多福豈敢忘也鄭譯被寵於天元為如何天元無恙而與楊堅於宮中私言至及於此小人傾覆何可託邪天元將遣譯入寇譯請元帥帥所類翻天元曰卿意如何對曰若定江東自非懿戚重臣懿專久而美也大也可令隨公行以楊爵稱之天元從之己丑以堅為揚州總管使譯發兵會壽陽壽陽屬南則為豫州屬北則為揚州會堅暴有足疾不果行先無此疾而忽有此疾曰暴暴猝暴也甲午夜天元備法駕幸天興宮乙未不豫而還還音旋又如字小御正博陵劉昉素以狡諂得幸於天元杜佑曰周御正屬天官御正中大夫五命小御正下大夫四命昉分罔翻狡古巧翻猾也天元召昉之儀入臥內欲屬以後事天元瘖不復能言寢室謂之臥內屬之欲翻瘖於今翻復如字又扶又翻沖亦幼也周成王率稱沖人沖子有重名遂與領內史鄭譯鄭譯以內史上大夫領內史周置御飾大夫掌御飾其御服又置司服掌之杜陵漢晉皆屬京兆後隋併入京兆大興縣其地在隋唐長安城南謩與謨同朝那縣屬安定郡後周下士二命堅固辭不敢當昉曰公若為速為之不為昉自為也堅乃從之稱受詔居中侍疾裘惔之孫也柳惔柳元景之從孫世隆之子世仕江南江陵陷柳氏入關中遂臣於周惔徒甘翻是日帝殂年二十二殂祚乎翻昉譯矯詔以堅總知中外兵馬事考異曰周帝紀乙未帝不豫還宮詔堅入侍疾丁未追五王入朝己酉大漸昉譯矯制以堅受遺輔政是日帝崩按堅以變起倉猝故得矯命當國若自乙未至己酉凡十五日事安得不泄今從隋帝紀拒而不從昉等草詔署訖逼之儀連署之儀厲聲曰主上升遐記曲禮告喪曰天王登假鄭玄曰登上也假已也上已者言若仙去云耳登猶升也假與遐同音霞靜帝時年八歲商相伊尹輔太甲稱阿衡孔安國傳曰阿倚衡平才過人曰英宗英宗室之中其才過人者以親以德合膺重寄趙王謂趙王招於靜帝諸大父行中其年最長長知兩翻膺當也朝直遙翻當思盡忠報國柰何一旦欲以神器假人老子天下神器為者敗之執者失之註云大寶之位是天地神明之器故不可以力為也又曰國之利器不可以授人不能誣罔先帝昉等知不可屈乃代之儀署而行之諸衞既受敕並受堅節度周自左右宮伯至左右羽林游擊皆諸衞官也堅恐諸王在外生變以千金公主將適突厥為辭徵趙陳越代滕五王入朝五王就國見上卷上年厥九勿翻朝直遙翻符謂兵符璽謂天子六璽索山客翻璽斯氏翻此天子之物自有主者宰相何故索之索山客翻堅大怒命引出將殺之以其民望出為西邊郡守西邊恐當作西疆五代志臨洮郡合川縣後周置仍立西疆郡考異曰北史鄭譯傳之儀與宦者謀引大將軍宇文仲輔政仲巳至御坐譯知之遽率開府楊惠及劉昉皇甫績柳裘俱入仲與之儀見譯等愕然逡巡欲出隋文因執之於是矯詔復以譯為內史上大夫明日隋文為丞相拜譯柱國府長史按之儀若爾豈復得全今從之儀傳丁未發喪靜帝入居天臺罷正陽宮置正陽宮見上卷上年停洛陽宮作治洛陽宮見上卷上年二月庚戌尊阿史那太后為太皇太后李太后為太帝太后靜帝祖母也朱后為帝太后靜帝嫡母生母也皆不以德選以色進者也尼女夷翻贊靜帝叔父也周人上右相息亮翻實無所綜理以楊堅為假黃鉞左大丞相秦王贄為上柱國百官總己以聽於左丞相孔子曰君薨百官總己以聽於冢宰三年朱熹曰各總攝己職以聽也余謂若此者必有伊周之臣而後可堅初受顧命顧命始於周成王孔安國曰臨終之命曰顧命余謂顧命者言天子登遐若回顧而有所言也陸德明曰顧工戶翻邗音寒又古寒翻謂御正下大夫李德林曰朝廷賜令總文武事經國任重今欲與公共事必不得辭德林曰願以死奉公堅大喜始劉昉鄭譯議以堅為大冢宰譯自攝大司馬昉又求小冢宰後周置小冢宰上大夫也六命按爾雅冢大也鄭玄曰冢大之上也冢宰之上不宜加小字故周官止曰小宰昉分罔翻冢知隴翻欲何以見處處昌呂翻德林曰宜作大丞相假黃鉞都督中外諸軍事不爾無以壓衆心如昉譯之言大冢宰雖六官之長然猶與諸公等夷德林所言則宇文泰所以輔魏者也不爾猶言不如此也相息亮翻壓於甲翻即依此行之以正陽宮為丞相府時衆情未壹言周之朝臣未盡歸心於堅賁扶分翻將之東宮正陽宮本東宮也堅潛令賁部伍仗衞仗衞執仗而宿衞之兵也盧賁以司武上士統之楊堅潛令賁此舉為如何謂曰欲求富貴者宜相隨觀堅此言則其夙心可知矣欲有去就賁嚴兵而至衆莫敢動出崇陽門崇陽門周宮城之東門門者拒不納賁諭之不去瞋目叱之瞋昌真翻門者遂卻堅入賁遂典丞相府宿衞盧賁遂為楊堅私人矣辯之弟子也盧辯與蘇綽共定後周官制者也長知兩翻劉昉為司馬李德林為府屬丞相府有掾有屬內史下大夫勃海高熲按隋書高熲自云勃海蓨人熲古迥翻習兵事多計略堅欲引之入府引之入丞相府為官屬楊惠堅族子也堅初秉周政欲引時才故率使之諭意堅既受禪封觀王改名雄欣然曰願受驅馳縱令公事不成熲亦不辭滅族乃以為相府司錄司錄總錄一府之事令力丁翻相息亮翻時漢王贊居禁中每與靜帝同帳而坐劉昉飾美妓進贊妓渠綺翻女樂也贊甚悅之昉因說贊曰大王先帝之弟時望所歸孺子幼沖豈堪大事說輸芮翻孺子謂靜帝今先帝初崩人情尚擾王且歸第待事寧後入為天子此萬全計也贊年少少詩照翻性識庸下以為信然遂從之堅革宣帝苛酷之政更為寬大刪略舊律作刑書要制奏而行之躬履節儉中外悅之賈誼曰寒者利裋褐飢者甘糟糠天下之嗷嗷新主之資也古之得天下必先有以得天下之心雖姦雄挾數用術不能外此也更工衡翻堅夜召太史中大夫庾季才太史掌天文曆數周制太史中大夫屬春官五命吾以庸虛庸言身無所能虛言胸中無所有謙辭也天時人事卿以為何如季才曰天道精微難可意察竊以人事卜之符兆已定符讖也證也驗也兆龜坼文也又人事之兆朕也公豈復得為箕潁之事乎司馬貞曰堯讓天下於許由由遂逃於箕山洗耳於潁水復扶又翻又音如字曰誠如君言獨孤夫人亦謂堅曰大事已然騎虎之勢必不得下勉之獨孤夫人堅也騎虎而下必為所噬堅以相州總管尉遲迥位望素重恐有異圖相息亮翻尉紆勿翻使迥子魏安公惇奉詔書召之會葬魏安郡公五代志武威郡昌松縣有後魏魏安郡註詳見後壬子以上柱國韋孝寬為相州總管又以小司徒叱列長义為相州刺史叱列虜複姓出於拓跋氏西部後為周之戚里孝寬續進鄴相州總管治所陳王純時鎮齊州純就國於濟南濟南郡齊州也門正掌門關啟閉之節及出入門者騎奇寄翻傳張戀翻遣人召純純至彭請屏左右密有所道屏必郢翻道言也遂執而鎖之因大言曰陳王有罪詔徵入朝左右不得輒動其從者愕然而去朝直遙翻從才用翻彭楷之孫也崔楷死職見一百五十一卷梁武帝大通元年六月五王皆至長安太建十二年庚申周復行佛道二教周禁二教見一百七十一卷六年復扶又翻又音如字簡令入道簡分別也太建十二年周尉遲迥知丞相堅將不利於帝室謀舉兵討之尉紆勿翻相息亮翻韋孝寬至朝歌五代志汲郡衞縣舊曰朝歌周書賀蘭其先與魏俱起有紇伏者為賀蘭莫何弗因以為氏齎相稽翻孝寬留貴與語以審之疑其有變遂稱疾徐行又使人至相州求醫藥密以伺之伺相吏翻孝寬兄子藝為魏郡守守式又翻迥遣藝迎孝寬孝寬問迥所為藝黨於迥不以實對魏郡守與相州總管府同治鄴職事有聯且迥忠於帝室宜其黨於所事守手又翻將斬之藝懼悉以迥謀語孝寬語牛倨翻孝寬攜藝西走每至亭驛亭郵亭也即置驛之所傳馬即驛馬傳張戀翻驛司掌驛之吏蜀公將至宜速具酒食尉遲迥封蜀公故稱之追者至驛輒逢盛饌康將即亮翻又音如字領也騎奇寄翻饌雛皖翻又雛戀翻食也又無馬遂遲留不進孝寬與藝由是得免史言韋孝寬機數過人堅又令候正破六韓裒詣迥諭旨破六韓虜三字姓諭譬也告也曉也旨意向也裒薄侯翻姓苑晉本唐叔虞之後以國為氏長知兩翻昶丑兩翻迥聞之殺昶及裒集文武士民文武謂總管府及州郡文武官屬也令力丁翻令之曰楊堅藉后父之勢挾幼主以作威福不臣之迹暴於行路令力定翻藉慈夜翻暴步卜翻顯示也又如字顯露也吾與國舅甥尉遲迥宇文泰之甥先帝處吾於此將即亮翻相息亮翻處昌呂翻本欲寄以安危今欲與卿等糾合義勇糾渠黝翻繩三合為糾言糾合者義取諸此以匡國庇民何如衆咸從命迥乃自稱大總管承制置官司稱大總管者欲以統攝諸州總管署置官司而隔於權臣未得以聞於天子故曰承制留少子在國趙王招國於襄國襄國屬相州總管府朝直遙翻少詩照翻甲子堅發關中兵以韋孝寬為行軍元帥帥所類翻郕公梁士彥樂安公元諧化政公宇文忻濮陽公武川宇文述武鄉公崔弘度清河公楊素隴西公李詢等皆為行軍總管以討迥梁士彥國公郕古國名自元諧以下皆郡公五代志北海郡千乘縣舊置樂安郡地形志夏州有化政郡參考五代志當在夏州巖綠縣界東平郡鄄城縣舊置濮陽郡述傳曰述代郡武川人志馬邑郡善陽縣有代郡上黨郡鄉縣石勒置武鄉郡五代志周改馮翊華陰縣為武鄉郡清河郡武城縣舊置清河郡隴西古郡也後魏領襄武首陽縣樂音洛濮博木翻楷之孫詢穆之兄子也李穆時為幷州刺史初宣帝使計部中大夫楊尚希撫慰山東後周置計部蓋主計會之簿書若周官之司書杜佑曰計部屬天官聞宣帝殂殂祚乎翻與尉遲迥發喪尉紆勿翻尚希出謂左右曰蜀公哭不哀而視不安將有他計吾不去懼及於難難乃旦翻遂夜從捷徑而遁捷徑者不由正路捷出取徑直而行遲直利翻待也迥覺追之不及遂歸長安堅遣尚希督宗兵三千人鎮潼關楊尚希弘農人弘農華陰諸楊自東漢至後魏為名族魏分東西弘農又為兵衝故楊氏有宗兵雍州牧畢剌王賢雍於用翻剌盧達翻諡法愎狠遂過曰剌又不思忘愛曰剌暴慢無親曰剌楊堅加賢以惡諡耳與五王謀殺堅事洩洩與泄同幷其三子掩五王之謀不問堅豈真不問哉山東有變內復相圖姑以安反側耳公椿為大司徒庚子以柱國梁睿為益州總管睿禦之子也梁禦見一百五十六卷梁武帝中大通六年太建十二年周遣汝南公神慶司衞上士長孫晟汝南古郡名晟丞正翻厥九勿翻晟幼之曾孫也按隋長孫晟傳及唐宰相世系表晟長孫稚之五世孫稚字幼卿生子裕子裕生紹遠紹遠生覽覽生敞敞生熾熾生晟非曾孫也若書稚字幼下亦闕卿字又遣建威侯賀若誼建威縣侯五代志建威縣屬武都郡若人者翻可從刊入聲汗音寒說輸芮翻佗鉢偽與紹義獵於南境使誼執之誼敦之弟也賀若敦弼之父也七月甲申紹義至長安徙之蜀久之病死於蜀太建十二年周青州總管尉遲勤迥之弟子也尉紆勿翻初得迥書表送之尋亦從迥迥所統相衞黎洺貝趙冀瀛滄五代志汲郡東魏置義州後周為衞州黎陽縣後魏黎陽郡後置黎州武安郡後周置洺州清河郡後周置貝州趙郡大陸縣舊曰廣阿置殷州後改趙州信都郡舊置冀州河間郡河間縣舊置瀛州勃海郡饒安縣舊置滄州考異曰周書迥傳又有毛州按迥滅後隋高祖始置毛州迥傳誤也五代志北海郡置青州齊郡舊曰齊州高密郡舊置膠州東萊郡舊置光州琅邪郡沂水縣舊置南青州後周改為莒州衆數十萬滎州刺史邵公冑五代志滎陽郡汜水縣古虎牢也後魏置東中府東魏置北豫州後周置滎州邵公冑周宗室也封邵郡公五代志義陽郡江左置司州後魏改曰郢州後周改曰申州五代志琅邪郡後魏置南徐州梁改為東徐州東魏改東楚州陳改安州後周改泗州豈史家以舊州名書之邪費也虜複姓蓋即費也頭種費扶沸翻按五代志後周亦無潼州但云下邳郡夏丘縣梁置潼州後齊改曰睢州尋廢夏丘宿豫相去不遠宿豫舊東楚治所意此時尚有此二州而志逸之也徐州總管司錄席毗羅據兗州五代志魯郡瑕丘縣舊置兗州姓苑席姓其先姓籍避項羽諱改姓席氏五代志蘭陵縣舊曰承置蘭陵郡守式又翻懷縣永橋鎮將紇豆陵惠以城降迥五代志懷縣屬河內郡隋大業初廢入安昌縣安昌本州縣紇豆陵虜三字姓魏收官氏志次南諸姓有紇豆陵氏將即亮翻建州刺史宇文弁以州降之五代志長平郡舊曰建州降戶江翻五代志上黨郡後周置潞州署城人郭子勝為刺史紇豆陵惠襲陷鉅鹿鉅鹿古郡也隋為縣屬襄國郡五代志恆山郡後周置恆州恆戶登翻五代志滎陽郡浚儀縣東魏置梁州後周改曰汴州汴皮變翻五代志琅邪郡舊置北徐州後周改曰沂州帥讀曰率五代志濟陰郡後魏置西兗州後周改曰曹州譙郡後魏置南兗州後周改亳州亳旁各翻梁郡治睢陽軍於蕃城攻陷昌慮下邑五代志彭城郡滕縣舊曰蕃置蕃郡隋改曰滕昌慮漢古縣後魏屬蘭陵郡下邑亦漢古縣五代志屬梁郡漢書蕃音皮慮音廬拔之五代志汝南郡城陽縣梁置楚州東魏置西楚州後齊曰永州城陽前漢侯國其地在義陽東北迥遣使招大左輔幷州刺史李穆穆鎖其使封上其書使疏吏翻上時掌翻穆子士榮以穆所居天下精兵處幷州用武之地士健馬多故曰天下精兵處穆深拒之堅使內史大夫柳裘詣穆為陳利害為于偽翻又使穆子左侍上士渾往布腹心布腹心者陳其至誠非貌言也曰願執威柄以尉安天下尉斗今之熨斗毛晃曰火斗熨器篆文作尸二火又從從火從又又偏旁手字持火所以申繒也今文作尉俗加火作熨尉紆胃翻又紆勿翻十三鐶金帶者天子之服也五代志曰革帶按禮博二寸禮圖曰璫綴於革帶阮諶以為有章印則於革帶佩之東觀記曰楊賜拜太常詔賜自所著革帶故知形制尊卑不別今博三寸半加金鏤䚢螳蜋鉤以相鉤帶自大裘至于小朝服皆用之天子以十三鐶金帶為異後周制也鐶戶關翻遺于季翻遣渾詣韋孝寬述穆意使述穆意以堅孝寬附己之心為懷州刺史五代志河內郡舊置懷州後知穆附堅慨然太息曰闔家富貴者數十人值國有難竟不能扶傾繼絕復何面目處天地間乎難乃旦翻復扶又翻處昌呂翻不得已亦附於堅迥子誼為朔州刺史按五代志後齊朔州治桑乾隋併入馬邑郡善陽縣置總管府又遣兵討郭子勝擒之迥招徐州總管源雄東郡守于仲文皆不從雄賀之曾孫仲文謹之孫也東郡治白馬源賀本出禿髮氏歸魏改姓源于謹事宇文有大功守手又翻宇文威自白馬濟河石濟在白馬西仲文棄郡走還長安迥殺其妻子迥遣檀讓狥地河南丞相堅以仲文為河南道行軍總管使詣洛陽發兵討讓命楊素討宇文冑丁未周以丞相堅都督中外諸軍事鄖州總管司馬消難亦舉兵應迥按五代志漢東郡唐城縣本梁之下溠城後魏之㵐西縣也後魏立肆州尋改唐州後周省均款溳歸四州入如此則鄖州已併省今有鄖州總管而志逸置總管府之地此考史之所以難也春秋鄖子之國杜預謂在江夏雲杜縣東南有鄖城章懷太子賢曰雲杜故城在復州沔陽縣西北周蓋因古國名置鄖州於沔陽也鄖音云難乃旦翻己酉周以柱國王誼為行軍元帥以討消難帥所類翻廣州刺史于顗仲文之兄也與總管趙文表不協詐得心疾誘文表手殺之誘音酉因唱言文表與尉遲迥通謀堅以迥未平因勞勉之即拜吳州總管按隋書于顗傳顗時為東廣州刺史五代志江都郡梁置南兗州後齊改為東廣州陳復曰南兗後周改曰吳州東廣州蓋因廣陵以名州觀此則此時東廣州刺史與吳州總管並治廣陵也廣上逸東字顗魚豈翻勞力到翻趙僭王招謀殺堅楊堅亦以趙王招謀殺己而加惡諡過古禾翻堅齎酒殽就之齎則兮翻招引入寢室招子員貫及弟魯封等皆在左右佩刀而立又藏刃於帷席之間伏壯士於室後堅左右皆不得從唯從祖弟開府章十二行本府下有儀同二字乙十一行本同孔本同大將軍弘大將軍元冑坐於戶側冑順之孫也元順以伉直得名於孝昌之間從才用翻為堅腹心酒酣招以佩刀刺瓜連啗堅欲因而刺之酣戶甘翻刺七賜翻又七迹翻啗徒敢翻又徒濫翻元冑進曰相府有事不可久留招訶之曰我與丞相言汝何為者叱之使卻冑瞋目憤氣扣刀入衞訶虎何翻瞋昌真翻招賜之酒曰吾豈有不善之意邪卿何猜警如是猜疑也警戒也猜警言疑而加戒慎也邪音耶將入後閤冑恐其為變扶令上坐如此再三招偽稱喉乾吐土故翻嘔也上時掌翻坐徂臥翻下同乾音干命冑就廚取飲冑不動會滕王逌後至逌音由堅降階迎之冑耳語曰附耳而語事勢大異可速去堅曰彼無兵馬何能為冑曰兵馬皆彼物彼若先發大事去矣冑不辭死恐死無益堅復入坐復扶又翻又音如字冑聞室後有被甲聲遽請曰相府事殷被皮義翻相息亮翻殷衆也公何得如此因扶堅下牀趨去招將追之冑以身蔽戶招不得出堅及門冑自後至招恨不時發彈指出血壬子堅誣招與越野王盛謀反皆殺之野亦惡諡也賞賜元冑不可勝計勝音升周室諸王數欲伺隙殺堅數所角翻伺相吏翻堅都督臨涇李圓通常保護之按隋書李圓通傳作京兆涇陽人涇陽縣固屬京兆若以為臨涇則屬安定圓通少給使堅家太建十二年癸丑周主封其弟衍為葉王太建五年六月周皇孫衍生武帝建德二年也太建九年周封皇子衍為道王武帝建德之六年也今靜帝又封其弟衍為葉王李延壽又謂靜帝本名衍改名闡互有背馳當考葉式涉翻太建十二年周豫荊襄三州蠻反豫州汝南郡荊州南郡襄州襄陽郡此蠻即所謂山蠻自荊襄至于汝漢皆有之太建十二年周韋孝寬軍至永橋城諸將請先攻之孝寬曰城小而固若攻而不拔損我兵威今破其大軍此何能為於是引軍壁於武陟武陟地名按五代志在河內郡脩武縣界至隋析置武陟縣將即亮翻軍於沁東魏安縣公五代志宕渠郡墊江縣後周為魏安縣又沔陽郡甑山縣梁置梁安郡西魏改曰魏安郡註又見前河內郡安昌縣舊曰州縣置武德郡尉於勿翻惇都昆翻帥讀曰率沁七鴆翻孝寬與迥隔水相持不進此與迥兵相持耳孝寬長史李詢密啟丞相堅云梁士彥宇文忻崔弘度並受尉遲迥饟金長知兩翻相息亮翻饟息亮翻饋也軍中慅慅慅采早翻慅慅憂愁不安也人情大異堅深以為憂與內史上大夫鄭譯謀代此三人者後周之制上大夫六命公與諸將皆國家貴臣未相服從今正以挾令之威控御之耳將即亮翻挾令謂挾天子以令諸將也前所遣者疑其乖異後所遣者又安知其能盡腹心邪邪音耶又取金之事虛實難明今一旦代之或懼罪逃逸若加縻縶則自鄖公以下莫不驚疑縻靡為翻縶陟立翻皆謂繫縛也韋孝寬封鄖國公且臨敵易將此燕趙之所以敗也燕惠王信讒用騎劫代樂毅而敗於田單趙惠文王聽間用趙括代廉頗以敗於白起臨敵易將之禍也將即亮翻燕因肩翻將即亮翻下同但遣公一腹心明於智略素為諸將所信服者速至軍所使觀其情偽縱有異意必不敢動動亦能制之矣堅大悟曰公不發此言幾敗大事幾居依翻敗補邁翻乃命少內史崔仲方往監諸軍為之節度仲方猷之子也以杜佑通典考之少內史當作小內史崔猷見一百六十二卷梁武帝太清三年仲方有文武才幹與堅少相款密故欲用之監工銜翻又命劉昉鄭譯昉辭以未嘗為將將即亮翻譯辭以母老堅不悅府司錄高熲請行堅喜遣之熲受命亟發亟紀力翻遣人辭母而已自是堅措置軍事皆與李德林謀之時軍書日以百數德林口授數人文意百端不加治點治修改也點塗點也不加治點不加塗改也治直之翻太建十二年司馬消難以鄖隨溫應土順沔儇岳九州及魯山等八鎮來降五代志漢東郡西魏置幷州後改曰隨州安陸郡京山縣舊曰新陽梁置新州西魏改曰溫州應山縣梁置應州漢東郡土山縣梁置土州順義縣梁置順州沔陽郡後周置復州後改沔州安陸郡吉陽縣後周置澴州孝昌縣西魏置岳州魯山在沔陽郡漢陽縣界臨江齊梁以來為重鎮儇當作澴音戶關翻難乃旦翻章十二行本子下有永字乙十一行本同孔本同張校同為質以求援質音致八月己未詔以消難為大都督總督九州八鎮諸軍事司空賜爵隨公庚申詔鎮西將軍樊毅進督沔漢諸軍事沔即漢也超武將軍陳慧紀為前軍都督趣南兗州超武將軍梁置與宣猛將軍同班任音壬帥讀曰率趣七喻翻太建十二年周益州總管王謙周益州總管府治成都起巴蜀之兵以攻始州此巴蜀謂漢巴郡蜀郡大界五代志普安郡梁置南梁州後改曰安州西魏改曰始州不得進堅以梁睿代王謙謙舉兵故睿不得進漢川即漢中隋避諱改曰漢川帥所類翻太建十二年戊辰詔以司馬消難為大都督水陸諸軍事庚午通直散騎常侍淳于陵克臨江郡五代志歷陽郡烏江縣梁置江都郡後齊改為齊江郡陳改為臨江郡散悉亶翻騎奇寄翻太建十二年梁世宗使中書舍人柳莊奉書入周丞相堅執莊手曰孤昔開府從役江陵深蒙梁主殊眷今主幼時艱猥蒙顧託梁主奕葉委誠朝廷奕累也奕葉累世也朝直遙翻孔子曰歲寒然後知松柏之後彫何晏註曰大寒之歲衆木皆死然後知松柏不彫傷平歲衆木亦有不死者故須歲寒而後別之喻凡人處治世亦自能脩整與君子同在濁世然後知君子之不苟容後之言保歲寒者義取諸此與尉遲迥連謀以為進可以盡節將即亮翻尉紆勿翻周氏退可以席卷山南漢沔之地在中南太華諸山之南卷讀曰捲會莊至具道堅語且曰昔袁紹劉表王淩諸葛誕皆一時雄傑據要地擁強兵然功業莫就禍不旋踵者良由魏晉挾天子保京都仗大順以為名故也袁紹事始六十三卷漢獻帝建安四年終六十四卷十年劉表事見六十五卷十二年十三年王淩事見七十五卷魏邵陵厲公嘉平元年終三年諸葛誕事見七十七卷高貴鄉公甘露二年三年昏耄已甚將即亮翻耄莫到翻司馬消難王謙常人之下者非有匡合之才匡合用管仲相齊桓公九合諸侯一匡天下事多為身計競效節於楊氏朝直遙翻將即亮翻相息亮翻以臣料之迥等終當覆滅隨公必移周祚祚福也祿也位也梁主深然之衆議遂止高熲至軍為橋於沁水尉遲惇於上流縱火栰大曰栰小曰桴縛木為栰置火積薪於上流放之欲順流而下以焚橋栰房越翻蓋積土於水中前銳後廣前高後庳其狀如坐狗分居上流以礙火栰使不得下逼橋邊也考異曰隋書作木栰木狗今從北史陳讀曰陣下同麾兵少卻少詩沼翻欲待孝寬軍半渡而擊之孝寬因其卻鳴鼓齊進軍既渡熲命焚橋以絕士卒反顧之心惇兵大敗單騎走騎奇寄翻孝寬乘勝進追至鄴庚午迥與惇及惇弟西都公祐西都縣公五代志西平郡湟水縣舊曰西都迥別統萬人皆綠巾錦襖號黃龍兵將即亮翻襖烏浩翻袍襖迥弟勤帥衆五萬帥讀曰率自青州赴迥以三千騎先至迥素習軍旅老猶被甲臨陳被皮義翻其麾下皆關中人為之力戰關中人不顧父母妻子為迥力戰言其得士心為于偽翻鄴中士民觀戰者數萬人行軍總管宇文忻曰事急矣吾當以詭道破之乃先射觀者考異曰隋書云高熲與李詢先犯觀者今從北史轉相騰藉聲如雷霆人衆而囂故其聲如雷霆射食亦翻下同藉慈夜翻賊敗矣衆復振因其擾而乘之迥軍大敗走保鄴城孝寬縱兵圍之李詢及思安伯代人賀婁子幹先登思安縣伯五代志河池郡河池縣後魏置思安縣魏書官氏志神元皇帝時諸部內入者有賀樓氏蓋虜複姓崔弘度妹先適迥子為妻及鄴城破迥窘迫升樓窘巨隕翻弘度直上龍尾追之築道陂陀以上城其道下附於地若龍垂尾然故曰龍尾上時掌翻將射弘度弘度脫兜鍪謂迥曰頗相識不鍪莫侯翻不讀曰否今日各圖國事不得顧私以親戚之情謹遏亂兵不許侵辱事勢如此早為身計何所待也迥擲弓於地罵左丞相極口而自殺楊堅時為左大丞相汝可取迥頭弘升斬之軍士在小城中者孝寬盡阬之以其從迥為之拒戰也走音奏又音如字未至開府儀同大將軍郭衍追獲之丞相堅以勤初有誠款以勤初表送迥書也相息亮翻李惠先自縛歸罪李惠自申州舉兵應迥既而知迥事不成先自歸迥末年衰耄記五十始衰謂精力消耗八十九十曰耄註耄惛忘也耄莫報翻復扶又翻又音如字以小御正崔達拏為長史達拏暹之子也崔暹見用於高澄拏奴加翻長知兩翻暹息廉翻無籌略舉措多失凡六十八日而敗于仲文軍至蓼隄去梁郡七里九域志蓼隄梁孝王築至睢陽三百里按此則九域志所謂睢陽非漢舊城之地蓼盧鳥翻或音六非仲文以羸師挑戰而偽北羸倫為翻挑徒了翻讓不設備仲文還擊大破之生獲五千餘人斬首七百級還從宣翻又音如字進攻梁郡梁郡治睢陽將即亮翻下同仲文進擊曹州獲迥所署刺史李仲康檀讓以餘衆屯成武仲文襲擊破之遂拔成武五代志濟陰郡成武縣時為永昌郡衆十萬屯沛縣五代志沛縣屬彭城郡將即亮翻徐州彭城郡沛縣在州西北一百四十里五代志金鄉縣屬曹州濟陰郡使疏吏翻謂金鄉城主徐善淨曰檀讓明日午時至金鄉宣蜀公令賞賜將士金鄉人皆喜仲文簡精兵偽建迥旗幟倍道而進簡分揀也幟昌志翻以為檀讓出迎謁仲文執之遂取金鄉諸將多勸屠其城仲文曰此城乃毗羅起兵之所當寬其妻子其兵自歸如即屠之彼望絕矣衆皆稱善於是毗羅恃衆來薄官軍薄迫也毗羅衆大潰爭投洙水死水為之不流洙水詳見辯誤為于偽翻檻送京師京師謂長安傳首亦傳首於長安韋孝寬分兵討關東叛者悉平之堅徙相州於安陽毀鄴城及邑居劉昫曰楊堅令韋孝寬討尉遲迥平之焚燒鄴城徙其居人南遷四十五里以安陽城為相州理所仍為鄴縣隋又改為安陽縣漢魏郡城在縣西北七里煬帝於鄴故都大慈寺置鄴縣相息亮翻尉紆勿翻置毛州魏州五代志武陽郡後周置魏州館陶縣置毛州顏師古曰漢武帝時河北決於館陶分為屯氏河屯音大門翻而隨室分析州縣誤以為毛氏河乃置毛州失之甚矣梁主聞迥敗謂柳莊曰若從衆人之言社稷已不守矣丞相堅之初得政也待黃公劉昉沛公鄭譯甚厚黃古國名沛本縣名以漢高祖初為沛公故亦為國昉分罔翻勝音升委以心膂章十二行本膂下有言無不從四字乙十一行本同孔本同張校同膂力舉翻字林膂脊骨也人之一身思慮之所以運者心腰背之所以強者膂故以為喻朝野傾屬朝直遙翻屬之欲翻稱為黃沛二人皆恃功驕恣恃其汲引之功也不親職務及辭監軍堅始疏之恩禮漸薄監工銜翻高熲自軍所還言自鄴還還音旋又如字時王謙司馬消難未平難乃旦翻堅憂之忘寢與食而昉逸遊縱酒相府事多遺落遺失也落墜也相息亮翻不忍廢譯陰敕官屬不得白事於譯敕戒也聽事丞相府長史聽事也聽讀曰廳要會之處為關又聯絡也預參預也又干也求解職堅猶以恩禮慰勉之太建十二年癸酉智武將軍魯廣達克周之郭默城梁置五德將軍智武其一也郭默城當在今蘄黃二州界丙子淳于陵克祐州城祐州城地闕太建十二年周以漢王贊為太師申公李穆為太傅宋王實為大前疑秦王贄為大右弼燕公于寔為大左輔燕因肩翻寔仲文之父也太建十二年乙卯周大赦據章校增太建十二年周王誼帥四總管至鄖州司馬消難擁其衆以魯山甑山二鎮來降五代志甑山縣後周置屬沔陽郡帥讀曰率鄖音云難乃旦翻甑子孕翻降戶江翻初消難遣上開府儀同大將軍段珣將兵圍順州將即亮翻又如字領也順州刺史周法尚不能拒棄城走消難虜其母弟而南樊毅救消難不及周亳州總管元景山擊之毅掠居民而去景山與南徐州刺史宇文㢸追之按隋書宇文㢸傳㢸時為南司州刺史與元景山共追樊毅又五代志安陸郡吉陽縣梁置義陽郡西魏改為南司州其地近澴順諸州南徐當作南司㢸古弼字此漳非左傳所謂江漢沮漳之漳今安陸西五十里有漳水沈括筆談曰清濁相糅者為漳章文也別有雲夢之漳與溳合流色理如螮蝀數十里方混毅退保甑山鎮城邑為消難所據者景山皆復取之鄖州巴蠻多叛按王誼傳于時北至商洛南拒江淮東西二千餘里巴蠻多叛是則晉宋以來所謂山蠻也南朝諸史所謂荊雍州蠻者也以其先出於巴種故謂之巴蠻以附消難渠大也渠帥者大帥也帥所類翻下氐帥同旬月皆平陳紀蕭摩訶攻廣陵陳紀即陳慧紀顗魚豈翻沙州氐帥楊永安聚衆應王謙大將軍樂寧公達奚儒討之按隋書達奚長儒傳沙氐楊永安扇動利興武文沙龍等六州以應謙參考五代志獨不載沙州蓋沙氐所居之地就置沙州以授其渠帥也又長儒襲父慶爵樂安公志云北海郡博昌縣舊曰樂安寧當作安儒上逸長字斬之太建十二年周以神武公竇毅為大司馬竇毅即前紇豆陵毅九月以小宗伯竟陵公楊惠為大宗伯竟陵縣公五代志沔陽郡竟陵縣舊曰霄城置竟陵郡後周廢郡改縣曰竟陵太建十二年丁亥周將王延貴帥衆援歷陽任忠擊破之生擒延貴將即亮翻下同帥讀曰率下同任音壬太建十二年壬辰周廢皇后司馬氏為庶人以司馬后父消難起兵而南叛也庚戌以隨世子勇為洛州總管東京小冢宰總統舊齊之地自關以東河汾以北皆舊齊之地東京小冢宰此洛州所置六府官也壬子以左丞相堅為大丞相罷左右丞相之官太建十二年冬十月甲寅日有食之太建十二年周丞相堅殺陳惑王純及其子純周五王之一也故楊堅加之惡諡太建十二年周梁睿將步騎二十萬討王謙騎奇寄翻謙分命諸將據險拒守睿奮擊屢破之蜀人大駭謙遣其將達奚惎高阿那肱乙弗虔等帥衆十萬攻利州五代志義城郡後魏立益州世號小益州梁曰黎州西魏復曰益州又改曰利州惎渠記翻嘉陵江在利州城西總管昌黎豆盧勣晝夜拒守隋書豆盧勣傳勣昌黎徒河人本姓慕容燕北地王精之後也中山敗歸魏北人謂歸義為豆盧因氏焉時出奇兵擊惎等破之會梁睿至惎等遁去睿自劍閣入進逼成都謙令達奚惎乙弗虔城守親帥精兵五萬背城結陳睿擊之謙戰敗將入城惎虔以城降守手又翻帥讀曰率背蒲妹翻陳讀曰陣降戶江翻謙將麾下三十騎走新都新都縣屬蜀郡九域志新都縣在成都北四十五里將即亮翻騎奇寄翻走音奏戊寅睿斬謙及高阿那肱劍南平蜀地在劍閣之南故曰劍南太建十二年十一月甲辰周達奚儒破楊永安沙州平奚下儒上脫長字太建十二年丁未周鄖襄公韋孝寬卒諡法辟地有德曰襄又甲冑有勞曰襄卒子恤翻梁武帝中大同元年韋孝寬鎮玉壁宇文與高氏兵爭倚為蕃扞有年數矣所經略布置人初莫之解解戶買翻曉也見其成事方乃驚服雖在軍中篤意文史敦睦宗族敦厚也俸扶用翻不入私室人以此稱之太建十二年十二月庚辰河東康簡王叔獻卒諡法溫柔好樂曰康一德不懈曰簡太建十二年癸亥周詔諸改姓者宜悉復舊宇文泰以諸將補九十九姓見一百六十五卷梁元帝承聖三年上書十二月庚辰此書癸亥自庚辰至癸亥四十四日庚辰必誤按長曆周陳十二月皆壬子朔恐是丙辰太建十二年甲子周以大丞相堅為相國總百揆去都督中外大冢宰之號去羌呂翻進爵為王以安陸等二十郡為隨國按隋書帝紀時以隋州之崇業鄖州之安陸城陽溫州之宜人應州之平靖上明順州之淮南土州之永川昌州之廣昌安昌申州之義陽淮安息州之新蔡建安豫州之汝南臨潁廣寧初安蔡州之蔡陽郢州之漢東二十郡為隨國備九錫之禮是時九錫之禮一大輅戎輅各一玄牡二駟二袞冕之服赤舄副焉三軒懸之樂六佾之舞四朱戶以居五納陛以登六虎賁三百人七鈇鉞各一八彤弓一彤矢百盧弓十盧矢千九秬鬯一卣圭瓚副焉辛未殺代奰王達滕聞王逌及其子既殺二王亦皆加以惡諡諡法不醉而怒曰奰色取行違曰聞奰平祕翻壬申以小冢宰元孝規為大司徒太建十二年是歲周境內有州二百一十一郡五百八章錫琛標點容肇祖聶崇岐覆校
