body:
  text: 資治通鑑卷第十三翰林學士朝散大夫右諫議大夫知制誥兼侍講同提舉萬壽觀公事兼判集賢院上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣奉敕編集後學天台音註漢紀五高皇后荀悅曰諱雉之字曰野雞索隱曰字娥姁應劭曰禮婦人從夫諡故稱高也師古曰諱雉故臣下諱雉也姁許于翻元年元年冬太后議欲立諸呂為王問右丞相陵陵曰高帝刑白馬盟曰高祖刑白馬與㣥臣盟曰非劉氏不王非有功不侯天下共擊之今王呂氏非約也太后不說說讀曰悅問左丞相平太尉勃對曰高帝定天下王子弟今太后稱制王諸呂無所不可王于況翻太后喜罷朝朝直遙翻王陵讓陳平絳侯曰始與高帝啑血盟諸君不在邪啑所甲翻小啜也索隱引鄒氏音使接翻今高帝崩太后女主欲王呂氏諸君縱欲阿意背約背蒲妹翻何面目見高帝於地下乎陳平絳侯曰於今面折廷爭謂當朝廷而諫諍全社稷定劉氏之後君亦不如臣陵無以應之十一月甲子太后以王陵為帝太傅實奪之相權陵遂病免歸乃以左丞相平為右丞相此時尚右故陳平自左丞相遷右丞相不治事治直之翻令監宮中如郎中令言食其不董丞相職事常監宮中若郎中令監古銜翻公卿皆因而決事太后怨趙堯為趙隱王謀乃抵堯罪堯為趙王謀事見上卷高祖十年趙王如意諡隱諡法隱拂不成曰隱不顯尸國曰隱見美堅長曰隱為于偽翻上黨守任敖嘗為沛獄吏有德於太后乃以為御史大夫任敖沛人少為獄吏高祖常避吏吏繫呂后遇之不謹敖擊傷主呂后吏故后德之太后又追尊其父臨泗侯呂公為宣王兄周呂令武侯澤為悼武王欲以王諸呂為漸臨泗侯班表以后父賜號索隱曰應劭云周呂國也按周及呂皆國名濟陰有呂都縣晉灼曰呂縣名以為侯國予據班志呂縣屬楚國令武諡也元年春正月除三族罪妖言令秦為威虐罪之重者戮及三族過誤之語以為妖言故皆除之元年夏四月魯元公主薨封公主子張偃為魯王諡公主曰魯元太后元年辛卯封所名孝惠子山為襄城侯班志襄城縣屬潁川郡軹縣屬河內郡壺關縣屬上黨郡太后欲王呂氏乃先立所名孝惠子彊為淮陽王不疑為恆山王惠帝元年淮陽王友徙王趙今以封彊恆山郡本屬趙國今割以封不疑恆戶登翻風讀曰諷考異曰史記文帝本紀澤史記呂后本紀八年中大謁者張釋漢書紀作釋卿恩澤侯表及周勃傳皆云張釋顏師古註曰荊燕吳傳云張擇今從史記呂后本紀漢書恩澤侯表大臣乃請立悼武王長子酈侯台為呂王蘇林曰台音胞胎之胎索隱曰鄭鄒並音怡考異曰漢書外戚侯表及高五王傳皆作鄜侯今從史記本紀功臣侯表割齊之濟南郡為呂國濟子禮翻元年五月丙申趙王宮叢臺災劉昭志趙國邯鄲縣有叢臺元年秋桃李華二年二年冬十一月呂肅王台薨考異曰史記本紀高后元年立孝惠子不疑為恆山王呂台為呂王二年恆山王薨十一月呂王台薨年表二人皆以元年薨漢書本紀元年立不疑呂台產祿通為王二年不疑薨年表元年不疑及呂台為王二年皆薨蓋史記年表薨字應在二年誤書於元年耳其實二人皆以二年薨漢書本紀云產祿通為王亦誤也二年春正月乙卯地震羌道武都道山崩羌道班志縣屬隴西郡武都時為縣漢志縣雜蠻夷曰道武帝置武都郡二年夏五月丙申封楚元王子郢客為上邳侯齊悼惠王子章為朱虛侯班志東海下邳縣應劭曰邳在薛其後徙此故曰下邳臣瓚曰有上邳故曰下邳師古曰瓚說是也班志朱虛縣屬琅邪郡括地志朱虛故城在青州臨朐縣東六十里漢朱虛也十三州志丹朱遊故虛故云朱虛也虛猶丘也朱猶丹也索隱虛音墟考異曰史記高后紀在元年今從漢書王子侯表又以呂祿女妻章妻千細翻二年六月丙戌晦日有食之二年秋七月恆山哀王不疑薨恆戶登翻二年行八銖錢應劭曰本秦錢質如周錢文曰半兩重如其文即八銖也漢以其太重更鑄莢錢今民間名榆莢錢是也民患其太輕至是復行八銖錢二年癸丑立襄成侯山為恆山王更名義更工衡翻三年三年夏江水漢水溢流四千餘家班志江水出蜀郡湔氐道徼外山東南至江都入海禹貢嶓冢導漾東流為漢孔安國註曰泉始出山為漾水東南流為沔水至漢中東行為漢水班志隴西氐道縣禹貢漾水所出至武都為漢又於武都註曰東漢水受氐道水一名沔過江夏謂之夏水入江又漢中郡有沔陽縣如淳註曰此方人謂漢水為沔水師古曰漢上曰沔水經則以為沔漾異源漾出隴西氐道嶓冢山東至武都沮縣為漢水其流東南歷白水葭萌又東南過巴郡閬中至江津縣而入于江涪水注之庾仲雍所謂內水者也沔水出武都沮縣東狼谷中一名沮水東逕漢中郡沔陽南鄭成固等縣又東逕西城錫縣又東逕南郡襄陽中廬即宜城郡當陽縣又東逕江夏雲杜縣又南至沙羨縣入江予據禹貢導漾東流為漢又東為滄浪之水過三澨至大別南入于江則漢水源出於漾據水經則漾會於涪沔入于江所出異源所入異派據班志則漾出隴西氐道至武都為漢水而東漢水受氐道水通謂之沔過江夏而入于江則漾沔似合為一矣然又言沮水出沮縣南至沙羡入江與水經所謂沔水即沮水說似不合而實合也三年秋星晝見見賢遍翻三年伊水洛水溢流千六百餘家班志伊水出弘農郡熊耳山東北入洛水水經伊水出南陽縣蔓渠山酈道元註即麓大同陵巒互別耳又班志洛水出弘農上洛縣東北至河南鞏縣入河流八百餘家應劭曰汝水出弘農縣入淮水經汝水出南陽魯陽縣之大盂山東南逕潁川之郟定陵郾又東南過汝南之上蔡平輿南入于淮四年四年春二月癸未立所名孝惠子太為昌平侯班志昌平縣屬上谷郡四年夏四月丙申太后封女弟女頁為臨光侯女頁音須四年少帝寖長自知非皇后子惠帝張皇后魯元公主之女太后以其無子使陽為有身取後宮美人子名之而殺其母少帝及義朝彊不疑皆是也長知兩翻后安能殺吾母而名我我壯即為變太后聞之幽之永巷中言帝病左右莫得見太后語㣥臣曰語牛倨翻今皇帝病久不已失惑昏亂不能繼嗣治天下治直之翻其代之㣥臣皆頓首言皇太后為天下齊民計所以安宗廟社稷甚深㣥臣頓首奉詔遂廢帝幽殺之五月丙辰立恆山王義為帝更名曰弘更工衡翻不稱元年以太后制天下事故也以軹侯朝為恆山王恆戶登翻四年是歲以平陽侯曹窋為御史大夫窋張律翻四年有司請禁南越關市鐵器漢於邊關與蠻夷通市謂之關市高帝立我通使物今高后聽讒臣別異蠻夷隔絕器物此必長沙王計欲倚中國擊滅南越而幷王之自為功也使疏吏翻別彼列翻幷王于況翻五年五年春佗自稱南越武帝韋昭曰生以武為號不稽古也師古曰此說非也湯曰吾武甚自號曰武王佗言武帝亦猶是耳何謂其不稽古乎貢父曰顏雖引成湯之言然未知湯自號武王乎聖人者人與之名耳詩謂湯為武王亦猶書謂文王為寧王耳史記之言未可信也敗數縣而去敗補邁翻五年秋八月淮陽懷王彊薨以壺關侯武為淮陽王五年九月發河東上黨騎屯北地五年初令戍卒歲更秦虐用其民南戍五嶺北築長城戍卒連年不歸而死者多矣至此始令一歲而更更工衡翻六年六年冬十月太后以呂王嘉居處驕恣廢之嘉台之子也二年台薨嘉嗣處昌呂翻立肅王弟產為呂王台諡曰肅六年春星晝見見賢遍翻六年夏四月丁酉赦天下六年封朱虛侯章弟興居為東牟侯班志東牟縣屬東萊郡賢曰東牟故城在今萊州文登縣西北六年匈奴寇狄道攻阿陽班志狄道縣屬隴西郡阿陽縣屬天水郡六年行五分錢應劭曰所謂莢錢者六年宣平侯張敖卒考異曰史記呂后本紀敖卒在明年六月按史記功臣表高后六年敖卒漢書功臣表敖以高祖九年封十七年薨蓋本紀之誤張敖本嗣父耳爵為趙王貫高之謀發敖廢為宣平侯仍尚魯元公主及惠帝之世齊悼惠王獻城陽郡以奉魯元敖之卒也因公主而賜諡曰魯元王七年七年冬十二月匈奴寇狄道略二千餘人七年春正月太后召趙幽王友惠帝元年友自淮陽徙王趙弗愛愛他姬諸呂女怒去讒之於太后曰王言呂氏安得王太后百歲後吾必擊之太后以故召趙王趙王至置邸不得見言置之趙邸也師古曰郡國朝宿之舍在京師者率名邸邸至也言所歸至也邸丁禮翻弗與食其㣥臣或竊饋輒捕論之捕其饋者以罪論之丁丑趙王餓死以民禮葬之長安民冢次七年己丑日食晝晦太后惡之謂左右曰此為我也惡烏路翻為于偽翻下為之同七年二月徙梁王恢為趙王呂王產為梁王梁王不之國為帝太傅七年秋七月丁巳立平昌侯太為濟川王四年封太為昌平侯班表亦作昌平此誤以平字在上濟川即濟南濟北之地蓋割齊封之時太年幼未嘗之國濟子禮翻七年呂女頁女為將軍營陵侯劉澤妻班志營陵縣屬北海郡或曰營丘應劭曰師尚父封於營丘陵亦丘也臣瓚曰營丘即臨淄營陵春秋謂之緣陵師古曰臨菑營陵皆故營丘地括地志營陵故城在青州北海縣南三十里高祖從祖昆弟也從才用翻下后從同齊人田生為之說大謁者張卿曰張卿即前大謁者張釋也說式芮翻諸呂之王也諸大臣未大服今營陵侯澤諸劉最長今卿言太后王之長知兩翻王于況翻呂氏王益固矣張卿入言太后太后然之乃割齊之琅邪郡封澤為琅邪王秦滅齊以瀕海之地置琅邪郡漢因之考異曰史記世家漢書列傳皆云田生先說張卿令風大臣立呂產為呂王然後說令王澤按太后自以呂王嘉驕恣廢之以產代為呂王非始封於呂又諸呂之王已久何必待田生之謀以此不取七年趙王恢之徙趙心懷不樂樂音洛太后以呂產女為王后王后從官皆諸呂亶權微伺趙王從才用翻趙王不得自恣王有所愛姬王后使人酖殺之六月王不勝悲憤自殺勝音升太后聞之以為王用婦人棄宗廟禮諸侯王有國所以奉宗廟也今恢以愛姬之故至於自殺故以棄宗廟禮罪之七年是時諸呂亶權用事朱虛侯章年二十有氣力忿劉氏不得職嘗入侍太后燕飲太后令章為酒吏章自請曰臣將種也將即亮翻種章勇翻下其種同請得以軍法行酒太后曰可酒酣章請為耕田歌太后許之章曰深耕穊種立苗欲疏非其種者鋤而去之師古曰穊稠也穊種言多生子孫也疏立者四散置之令為藩輔也非其種者鋤而去之以斥諸呂也穊音冀去羌呂翻頃之諸呂有一人醉亡酒章追拔劍斬之而還報曰有亡酒一人臣謹行法斬之師古曰亡酒避酒而逃亡也業已許其軍法無以罪也因罷自是之後諸呂憚朱虛侯雖大臣皆依朱虛侯劉氏為益強為于偽翻下因為同陳平患諸呂力不能制恐禍及己嘗燕居深念師古曰以國家不安故靜居獨慮其方策直入坐而陳丞相不見師古曰言不因門人將命而徑自入座平方深思不覺其至坐徂臥翻何念之深也陳平曰生揣我何念揣初委翻度也陸生曰足下極富貴無欲矣然有憂念不過患諸呂少主耳陳平曰然為之柰何陸生曰天下安注意相天下危注意將將相和調則士豫附師古曰豫素也余謂豫順也權不分為社稷計在兩軍章甲十五行本軍作君乙十一行本同孔本同退齋校同掌握耳臣嘗章甲十五行本嘗作常乙十一行本同孔本同欲謂太尉絳侯絳侯與我戲易吾言謂告語也言絳侯素與之戲狎輕易其言也周勃封絳侯班志絳縣屬河東郡晉之舊都深相結因為陳平畫呂氏數事陳平用其計乃以五百金為絳侯壽厚具樂飲師古曰厚為其具而與太尉樂飲樂音洛兩人深相結呂氏謀益衰陳平以奴婢百人車馬五十乘錢五百萬遺陸生為飲食費遺于季翻七年太后使使告代王高祖七年立子恆為代王王于況翻代王謝之願守代邊太后乃立兄子呂祿為趙王追尊祿父建成康侯釋之為趙昭王七年九月燕靈王建薨有美人子太后使人殺之國除高祖初封盧綰於燕綰入匈奴乃立建為燕王美人子美人所生之子也七年遣隆慮侯周竈將兵擊南越班志隆慮縣屬河內郡至後漢避殤帝諱改曰林慮慮音閭八年八年冬十月辛丑立呂肅王子東平侯通為燕王東平地名在濟東宣帝甘露二年為東平國八年三張三上脫春字月太后祓還過軹道師古曰祓者除惡之祭祓音廢又敷勿翻撠太后掖師古曰撠謂拘持之也撠音戟拘居足翻掖與腋同卜之云趙王如意為祟祟雖遂翻神禍也鬼厲也太后遂病掖傷太后為外孫魯王偃年少孤弱偃張敖子為于偽翻四月丁酉封張敖前姬兩子侈為新都侯班志新都縣屬南陽郡徐廣曰樂昌今細陽之池陽鄉余據班志細陽縣屬汝南郡又東郡有樂昌縣考異曰史記惠景間侯者表新都作信都壽作受今從本紀又封中大謁者張釋為建陵侯如淳曰灌嬰為中謁者後常以閹人為之諸官加中者多閹人也班志建陵縣屬東海郡賞之也八年江漢水溢流萬餘家八年秋七月太后病甚乃令趙王祿為上將軍居北軍呂王產居南軍班表中壘校尉掌北軍壘門外又有中尉掌徼循京師屬官有中壘寺互等令丞至後漢始置北軍中候掌監五營劉昭註曰舊有中壘校尉領北軍營壘之事中興省中壘但置中候以監五營又據班表中壘以下八校尉皆武帝置意者武帝以前北軍屬中尉故領中壘令丞等官南軍蓋衞尉所統班表衞尉掌宮門衞屯兵周勃之入北軍也尚有南軍乃先使曹窋告衞尉毋入呂產殿門然後使朱虛侯逐產殺之未央宮郎中府吏廁中以此知南軍屬衞尉也呂氏之王大臣弗平我即崩帝年少大臣恐為變必據兵衞宮慎毋送喪為人所制辛巳太后崩遺詔大赦天下以呂王產為相國以呂祿女為帝后高后已葬以左丞相審食其為帝太傳考異曰史記將相表八年七月辛巳食其為太傅九月丙戌復為丞相後九月免漢書公卿表七年七月辛巳食其為太傅八年九月復為丞相後九月免以長曆推之八年七月無辛巳九月無丙戌閏月㣥臣代邸上議無食其名二表皆誤今從史記本紀免相在此月本紀又云八月壬戌食其復為左丞相亦誤八年諸呂欲為亂畏大臣絳灌等未敢發朱虛侯以呂祿女為婦故知其謀乃陰令人告其兄齊王欲令發兵西朱虛侯東牟侯為內應以誅諸呂立齊王為帝齊王乃與其舅駟鈞郎中令祝午中尉魏勃陰謀發兵齊相召平弗聽班表諸侯王高祖初置有太傅輔王內史治國民中尉掌武職丞相統衆官如漢朝景帝中五年令諸侯王不得復治國天子為置吏改丞相曰相武帝分漢內史為左右後又更右為京兆尹左為馮翊中尉為執金吾郎中令為光祿勳故王國如故損其郎中令秩千石改太僕曰僕秩亦千石成帝綏和元年更令相治民如郡太守中尉如郡都尉康曰廣陵人召平與東陵侯召平及此召平凡三人此召平之子奴以平死事封黎侯見功臣表召與邵同姓譜駟鄭七穆駟氏之後祝周武王封黃帝之後於祝後以為氏丙午齊王欲使人誅相相聞之乃發卒衞王宮魏勃紿邵章甲十五行本邵作召乙十一行本同孔本同平曰王欲發兵非有漢虎符驗也應劭曰銅虎符第一至第五國家當發兵遣使者至郡合符符合乃聽受之張晏曰符以代古之圭璋從簡易也予據史記文帝紀三年九月初與郡國守相為銅虎符既有初字則前乎文帝之時當未有銅虎符也召平魏勃事在三年之前何緣有虎符發兵班史於文紀三年只書初與郡守為銅虎符汰去國相二字溫公則但書勃語於此而文紀不復書豈亦有疑於此邪勃請為君將兵衞王為于偽翻召平信之勃既將兵遂圍相府召平自殺於是齊王以駟鈞為相魏勃為將軍祝午為內史悉發國中兵使祝午東詐琅邪王曰琅邪王劉澤也三年割齊琅邪封之呂氏作亂齊王發兵欲西誅之齊王自以年少不習兵革之事願舉國委大王大王自高帝將也言澤自高帝時為將見齊王計事臨菑即古營丘齊國所都西馳見齊王齊王因留琅邪王而使祝午盡發琅邪國兵幷將之考異曰史記澤世家漢書傳皆以為澤與齊王合謀蓋誤今從史記呂后本紀齊王世家漢書呂后紀齊王傳大王高皇帝適長孫也當立適讀曰嫡齊王襄悼惠王之子高帝之長孫也長知兩翻下同今諸大臣狐疑未有所定而澤於劉氏最為長年大臣固待澤決計今大王留臣無為也不如使我入關計事齊王以為然乃益具車送琅邪王琅邪王既行齊遂舉兵西攻濟南濟南本屬齊元年割以封呂台台卒產嗣封遺于季翻陳諸呂之罪欲舉兵誅之相國呂產等聞之乃遣潁陰侯灌嬰將兵擊之班志潁陰縣屬潁川郡謀曰諸呂擁兵關中欲危劉氏而自立今我破齊還報此益呂氏之資也乃留屯滎陽使使諭齊王及諸侯與連和以待呂氏變共誅之齊王聞之乃還兵西界待約呂祿呂產欲作亂內憚絳侯朱虛等外畏齊楚兵又恐灌嬰畔之欲待灌嬰兵與齊合而發猶豫未決當是時濟川王太淮陽王武常山王朝及魯王張偃皆年少未之國居長安趙王祿梁王產各將兵居南北軍皆呂氏之人也列侯㣥臣莫自堅其命太尉絳侯勃不得主兵曲周侯酈商老病班志曲周縣屬廣平國絳侯乃與丞相陳平謀使人劫酈商令其子寄往紿說呂祿曰高帝與呂后共定天下劉氏所立九王楚王交高祖弟代王恆淮南王長高祖子吳王濞高祖姪琅邪王澤劉氏疏屬齊王襄高祖孫常山王朝淮陽王武濟川王太惠帝子說式芮翻梁王呂產趙王呂祿燕王呂通也事已布告諸侯章甲十五行本重諸侯二字乙十一行本同孔本同張校同皆以為宜今太后崩帝少而足下佩趙王印不急之國守藩乃為上將將兵留此為大臣諸侯所疑足下何不歸將印以兵屬太尉屬之欲翻下同請梁王歸相國印與大臣盟而之國齊兵必罷大臣得安足下高枕而王千里此萬世之利也而王于況翻呂祿信然其計欲以兵屬太尉使人報呂產及諸呂老人或以為便或曰不便計猶豫未有所決呂祿信酈寄時與出游獵過其姑呂女頁女頁大怒曰女頁呂后之妹樊噲之妻於祿姑也過工禾翻若為將而棄軍呂氏今無處矣乃悉出珠玉寶器散堂下曰毋為他人守也九月庚申旦考異曰史記本紀八月庚申旦上有八月丙午漢書高后紀亦云八月庚申今以長曆推之下八月當為九月見相國產計事郎中令賈壽使從齊來姓譜周康王封唐叔虞少子公明於賈城子孫以國為氏又晉大夫賈季食邑於賈其後以邑為氏王不早之國今雖欲行尚可得耶數所具翻具以灌嬰與齊楚合從欲誅諸呂告產師古曰齊楚俱在山東連兵西鄉欲誅諸呂亦猶六國為從以敵秦故謂之合從也從子容翻趣讀曰促平陽侯頗聞其語馳告丞相太尉太尉欲入北軍不得入襄平侯紀通尚符節乃令持節矯內太尉北軍班志襄平縣屬遼東郡張晏曰紀通紀信子也尚主也今符節令也晉灼曰紀信焚死不見其後功臣表云通紀成之子以成死事故封侯貢父曰漢祖以善用人得天下豈忘紀信之功哉疑成者即信之一名也通尚符節故使持節矯以帝命內勃北軍內讀曰納復扶又翻班志典客秦官掌諸侯歸義蠻夷景帝中六年更名大行令武帝太初元年更名大鴻臚揭音竭帝使太尉守北軍欲足下之國急歸將印辭去不然禍且起呂祿以為酈況不欺己遂解印屬典客而以兵授太尉太尉至軍呂祿已去太尉入軍門行令軍中曰為呂氏右袒為劉氏左袒師古曰袒者脫衣袖而肉袒也左右袒者偏脫其一耳袒徒旱翻鄭氏註覲禮云凡為禮事者左袒若請罪待刑則右袒太尉遂將北軍然尚有南軍丞相平乃召朱虛侯章佐太尉太尉令朱虛侯監軍門監古銜翻令平陽侯告衞尉毋入相國產殿門衞尉掌宮門衞屯兵平陽侯時為御史大夫蓋將丞相之命以告衞尉使毋納產也呂產不知呂祿已去北軍乃入未央宮欲為亂至殿門弗得入徘徊往來平陽侯恐弗勝馳語太尉語牛倨翻太尉尚恐不勝諸呂未敢公言誅之乃謂朱虛侯曰急入宮衞帝朱虛侯請卒太尉予卒千餘人予讀曰與入未央宮門見產廷中日餔時申時食為餔餔奔謨翻產走天風大起以故其從官亂莫敢鬬逐產殺之郎中府吏廁中如淳曰郎中令掌宮殿門戶故府在宮中從才用翻帝命謁者持節勞朱虛侯勞力到翻朱虛侯欲奪其節謁者不肯朱虛侯則從與載因節信馳走師古曰因謁者所持之節用為信也章與謁者同車故為門者所信得入長樂宮更工衡翻還馳入北軍報太尉太尉起拜賀朱虛侯曰所患獨呂產今已誅天下定矣遂遣人分部悉捕諸呂男女無少長皆斬之分扶問翻辛酉捕斬呂祿而笞殺呂女頁使人誅燕王呂通而廢魯王張偃戊辰徙濟川王王梁呂產既誅故徙太王梁令罷兵灌嬰在滎陽聞魏勃本教齊王舉兵使使召魏勃至責問之勃曰失火之家豈暇先言丈人而後救火乎因退立股戰而栗師古曰言以社稷將危故舉兵而正之不暇待有詔命也股脚也戰者懼之甚也栗與慄同終無他語灌將軍熟視笑曰人謂魏勃勇妄庸人耳何能為乎乃罷魏勃灌嬰兵亦罷滎陽歸班固贊曰孝文時天下以酈寄為賣友言寄與祿友善詭說之出游因奪其兵而誅之是寄賣友也謂見利而忘義也若寄父為功臣而又執劫雖摧呂祿以安社稷誼存君親可也師古曰周勃劫其父令其子行說予謂劫者劫質也蓋劫寄父商為質諭以不行說祿將殺之也蓋當時皆以寄為賣友故固發明父子朋友各有其倫為人臣子者當知所緩急先後也八年諸大臣相與陰謀曰少帝及梁淮陽恆山王皆非真孝惠子也呂后以計詐名他人子殺其母養後宮令孝惠子之立以為後及諸王以強呂氏今皆已夷滅諸呂而所立即長用事吾屬無類矣長知兩翻下同不如視諸王最賢者立之或言齊王高帝長孫可立也大臣皆曰呂氏以外家惡而幾危宗廟亂功臣幾居衣翻今齊王舅駟鈞虎而冠言駟鈞惡戾如虎而著冠復為呂氏矣代王方今高帝見子最長仁孝寬厚太后家薄氏謹良言高帝見在諸子惟代王為最長也見賢遍翻代王高帝姬薄氏所生薄姓戰國已有之風俗通衞有賢人薄疑況以仁孝聞天下乎乃相與共陰使人召代王代王問左右郎中令張武等曰漢大臣皆故高帝時大將習兵多謀詐此其屬意非止此也師古曰言常有異志也屬意猶言注意也屬音之欲翻今已誅諸呂新啑血京師索隱曰漢書作喋音跕丁牒翻陳湯杜業皆言喋血無盟歃事廣雅曰喋履也予據類篇啑字有色甲色洽二翻既從啑字音義當與歃同若從喋字則有履之義公羊傳曰京大也師衆也天子之居必以衆大之辭言之此以迎大王為名實不可信願大王稱疾毋往以觀其變中尉宋昌進曰㣥臣之議皆非也夫秦失其政諸侯豪桀並起人人自以為得之者以萬數然卒踐天子之位者劉氏也卒子恤翻下同天下絕望一矣高帝封王子弟地犬牙相制此所謂磐石之宗也師古曰言地形如犬之牙交而相入也石大而下平磐據地面不可得而移動故以為喻也王于況翻二矣漢興除秦苛政約法令施德惠人人自安難動搖三矣夫以呂太后之嚴立諸呂為三王亶權專制然而太尉以一節入北軍一呼呼火故翻士皆左袒為劉氏叛諸呂卒以滅之此乃天授非人力也今大臣雖欲為變百姓弗為使為于偽翻使如字其黨寧能專一邪方今內有朱虛東牟之親外畏吳楚淮陽琅邪齊代之強淮陽史記作淮南當從之獨淮南王與大王大王又長長知兩翻賢聖仁孝聞於天下聞音問故大臣因天下之心而欲迎立大王大王勿疑也代王報太后計之猶豫未定卜之兆得大橫應劭曰龜曰兆筮曰卦卜者以荊灼龜文正橫也大橫庚庚余為天王夏啟以光服虔曰庚庚橫貌李奇曰庚庚其繇文也占謂其繇也張晏曰先是五帝官天下老則嬗賢至夏啟始傳嗣能光先君之業文帝亦襲父迹言似啟也師古曰繇丈救翻本作籀籀書也謂讀卜詞孔穎達曰兆者龜之斖坼繇者卜之文辭寡人固已為王矣又何王卜人曰所謂天王者乃天子也於是代王遣太后弟薄昭往見絳侯絳侯等具為昭言所以迎立王意為于偽翻薄昭還報曰信矣毋可疑者毋與無通果如公言乃命宋昌參乘師古曰戎事則稱車右其餘則曰參乘參者三也蓋取三人為義乘繩證翻從詣長安至高陵休止傳株戀翻班志高陵縣屬左馮翊括地志高陵故城在雍州高陵縣西一里從才用翻而使宋昌先馳之長安觀變昌至渭橋蘇林曰渭橋在長安北三里索隱曰咸陽宮在渭北興樂宮在渭南秦昭王通兩宮之間作渭橋長三百八十步關中記云石柱以北屬扶風石柱以南屬京兆昌還報代王馳至渭橋㣥臣拜謁稱臣代王下車答拜太尉勃進曰願請閒包愷曰閒音閑言欲向空閑處師古曰閒容也猶今言中閒也請容暇之頃當有所陳不欲於衆中顯論也他皆類此宋昌曰所言公公言之所言私王者無私太尉乃跪上天子璽符上時掌翻至代邸而議之後九月己酉晦代王至長安舍代邸㣥臣從至邸丞相陳平等皆再拜言曰子弘等皆非孝惠子不當奉宗廟大王高帝長子宜為嗣長知兩翻願大王即天子位代王西鄉讓者三南鄉讓者再如淳曰讓㣥臣也或曰賓主位東西面君臣位南北面故西鄉坐三讓不受㣥臣猶稱宜乃更南鄉坐示變即君位之漸也余謂如說以代王南鄉坐為即君位之漸恐非代王所以再讓之意蓋王入代邸而漢廷㣥臣繼至王以賓主禮接之故西鄉㣥臣勸進王凡三讓㣥臣遂扶王正南面之位王又讓者再則南鄉非王之得已也㣥臣扶之使南鄉耳遽以為南鄉坐可乎鄉讀曰嚮㣥臣以禮次侍東牟侯興居曰誅呂氏臣無功請得除宮除宮清宮也應劭曰舊典天子行幸所至必遣靜室令先按行清淨殿中以備非常余謂此時㣥臣雖奉帝即位而少帝猶居禁中蓋有所屏除也前謂少帝曰足下非劉氏子不當立乃顧麾左右執戟者掊兵罷去掊芳遇翻類篇曰頓也有數人不肯去兵宦者令張釋諭告亦去兵班表宦者令屬少府張釋即大謁者封建陵侯者釋本宦者故兼是官去羌呂翻康曰天子以天下為家不以宮室為常處當乘輿以行天下故託乘輿言余謂康說乘輿本不與古義相悖但此所謂乘輿車不當以此解之漢乘輿之制輪朱班重牙貳轂兩轄金薄繆龍為輿倚較文虎伏軾龍首銜軛左右吉陽筩鸞雀立衡文畫輈羽蓋華蚤建大旗十二斿畫日月升龍駕六馬象鑣鏤錫金鍐方釳插翟尾朱兼繁纓赤罽易茸金就十有二左纛以犛牛尾為之在左騑馬軛上大如斗此即法駕文帝已立少帝安得乘此出宮乎沈約禮志云魏晉御小出多乘輿車輿車今之小輿滕公職為太僕與東牟侯除宮亦無緣召乘輿金根以載少帝意者此輿車蓋天子常所乘輿車即魏晉間小輿也欲將我安之乎滕公曰出就舍舍少府乃奉天子法駕迎代王於邸漢官儀天子鹵簿有大駕法駕小駕大駕公卿奉引大將軍驂乘屬車八十一乘法駕公卿不在鹵簿中惟京兆尹執金吾長安令奉引侍中驂乘屬車三十六乘蔡邕曰法駕乘金根車駕六馬有五時副車駕四馬侍中驂乘屬車三十六乘沈約禮志漢制乘輿金根車輪皆朱班重轂兩轄飛軨轂外復有轂施轄其外復設轄銅貫其中飛軨以赤油為之廣八寸長注地繫軸頭謂之飛軨金金薄繆龍為輿倚較較在箱上文畫藩藩箱也文虎伏軾鸞雀立衡文畫轅翠羽蓋黃裹所謂黃屋也金華施橑末建太常十二斿畫日月升龍駕六黑馬施十二鸞金為叉髦插以翟尾又加左纛所謂左纛輿也路如周玉路之制應劭漢官鹵簿圖乘輿大駕則御鳳凰車以金根為副又五色安車五色立車各五乘建龍旗駕四車施八鸞餘如金根之制猶周金路也車各如方色所謂五時副車白馬者朱其鬣安車者坐乘又有建華蓋九重甘泉鹵簿者道車五乘游車九乘在乘輿車前又有象車最在前試橋道宋明帝時建安王休仁議曰秦改周輅制為金根通以金薄周匝四面漢魏二晉因循莫改宮謹除代王即夕入未央宮有謁者十人持戟衞端門郎謁者皆執戟以宿衞宮殿前所書少帝左右執戟者亦中郎郎中謁者之官也端門未央宮前殿之正南門也天子在也足下何為者而入代王乃謂太尉太尉往諭謁者十人皆掊兵而去代王遂入夜拜宋昌為衞將軍班表前後左右將軍皆周末官秦因之漢不常置蔡質漢儀漢興置大將軍驃騎將軍位次丞相車騎將軍衞將軍左右前後將軍皆金紫位次上卿余據大將軍始於灌嬰驃騎車騎左右前後將軍景武之後方有其官衞將軍則始置於此以張武為郎中令行殿中行謂案行也行下更翻分扶問翻文帝還坐前殿夜下詔書赦天下太宗孝文皇帝上荀悅曰諱恆之字曰常高祖中子也母曰薄姬禮祖有功而宗有德漢之子孫以為功莫盛於高帝故為帝者太祖之廟德莫盛於文帝故為帝者太宗之廟自唐以來諸帝廟號莫不稱宗而此義泯矣諡法經緯天地曰文元年元年冬十月庚戌徙琅邪王澤為燕王封趙幽王子遂為趙王澤以呂后七年自營陵侯封琅邪王齊王起兵誅諸呂澤失國西至京師與大臣共立帝以功徙封燕王趙王友幽死於呂后七年徙梁王恢王趙恢尋以逼死以其國封呂祿祿誅乃復封友長子遂為趙王元年陳平謝病上問之平曰高祖時勃功不如臣及誅諸呂臣功亦不如勃願以右丞相讓勃十一月辛巳上徙平為左丞相太尉勃為右丞相大將軍灌嬰為太尉諸呂所奪齊楚故地皆復與之呂后封呂台為呂王得梁地奪齊楚之地以傅益之元年論誅諸呂功右丞相勃以下益戶賜金各有差絳侯朝罷趨出意得甚上禮之恭常目送之上禮勃恭甚其罷朝也常目送之待其既出然後肆體自如朝直遙翻下同安陵屬右扶風惠帝所起陵邑按姓譜轅袁爰三姓皆出陳轅濤塗之後按史記作爰盎漢書作袁盎則袁爰通也諸呂悖逆大臣相與共誅之悖蒲內翻是時丞相為太尉本兵柄適會其成功今丞相如有驕主色如似也臣主失禮竊為陛下弗取也為于偽翻下同後朝上益莊丞相益畏元年十二月詔曰法者治之正也治直吏翻今犯法已論而使無罪之父母妻子同產坐之及為收帑朕甚不取其除收帑諸相坐律令應劭曰帑子也秦法一人有罪幷坐其室家今除此律帑音奴元年春正月有司請蚤建太子上曰朕既不德縱不能博求天下賢聖有德之人而禪天下焉而曰豫建太子是重吾不德也其安之師古曰重謂增益也安猶徐也言不宜汲汲耳重直用翻他皆類此豫建太子所以重宗廟社稷不忘天下也上曰楚王季父也吳王兄也淮南王弟也豈不豫哉今不選舉焉而曰必子人其以朕為忘賢有德者而專於子非所以優章甲十五行本優作憂乙十一行本同孔本同退齋校同天下也有司固請曰古者殷周有國治安皆千餘歲用此道也師古曰所以能爾者以承嗣相傳故也治直吏翻所從來遠矣高帝平天下為太祖子孫繼嗣世世不絕今釋宜建釋舍也宜建謂嗣也非高帝之志也更議不宜師古曰不當更議啟景帝名長知兩翻純厚慈仁請建以為太子上乃許之元年三月立太子母竇氏為皇后春秋之法母以子貴風俗通夏帝相遭有窮氏之難其方娠逃出自竇而生少康其後氏焉清河觀津人班志觀津縣屬信都國清河郡無觀津蓋信都清河本皆趙地景帝二年為廣川國四年為信都郡而清河郡則高帝置此在未分置之前故繫之清河杜佑曰漢觀津縣在德州蓨縣東北字少君幼為人所略賣傳十餘家傳直戀翻聞竇后立乃上書自陳召見驗問得實乃厚賜田宅金錢與兄長君家於長安絳侯灌將軍等曰吾屬不死命乃且縣此兩人縣讀曰懸兩人所出微不可不為擇師傅賓客又復效呂氏大事也於是乃選士之有節行者與居為于偽翻行下孟翻竇長君少君由此為退讓君子不敢以尊貴驕人觀絳灌所以處二竇後世大臣以文義自持者其智識及此乎元年詔振貸鰥寡孤獨窮困之人師古曰振起也為給貸之令其存立也諸振救振贍其義皆同今流俗作字從貝者非也自別有訓貸吐戴翻八十已上月賜米肉酒九十已上加賜帛絮賜物當稟鬻米者稟給也鬻讀曰粥之六翻糜也丞若尉致師古曰長吏縣之令長也若者豫及之辭致者送至也或丞或尉自致之也班表縣令長皆秦官掌治其縣萬戶以上為令秩千石至六百石減萬戶為長秩五百石至三百石皆有丞尉秩四百石至二百石是為長吏長知兩翻嗇夫令史致漢制十里一亭十亭一鄉鄉有嗇夫職聽訟收賦稅風俗通曰嗇者省也夫賦也言消息百姓均其賦役又漢制縣長吏百石以下有所謂斗食佐史漢官云斗食佐史即斗食令史不稱者督之蘇林曰取其都吏有德也如淳曰律說都吏今督郵是也閑惠曉事即為文無害都吏師古曰如說是其循行有不如詔意者二千石察視責罰之行下孟翻稱尺證翻元年楚元王交薨元年夏四月齊楚地震二十九山同日崩大水潰出元年時有獻千里馬者帝曰鸞旗在前劉昭志乘輿大駕法駕前驅有有九斿雲䍐鳳凰闟戟皮軒鸞旗皆大夫載鸞旗者編羽毛列繫幢旁民或謂之雞翹非也胡廣曰鸞旗以銅作鸞鳥車衡上與本志不同晉志曰鸞旗車駕四馬先輅所載也漢制大駕屬車八十一乘備千乘萬騎劉昭曰古者諸侯貳車九乘秦滅六國兼其車服古大駕屬車八十一乘法駕半之沈約曰屬車皆皂蓋黃裏師古曰屬之欲翻師行三十里朕乘千里馬獨先安之於是還其馬與道里費而下詔曰朕不受獻也其令四方毋求來獻元年帝既施惠天下諸侯四夷遠近驩洽乃脩代來功封宋昌為壯武侯班志壯武屬膠東國括地志壯武故城在萊州即墨縣西六十里古萊夷之國元年帝益明習國家事朝而問右丞相勃曰天下一歲決獄幾何朝直遙翻勃謝不知又問一歲錢穀入章乙十一行本入上有出字並刊一格幾何勃又謝不知惶愧汗出沾背上問左丞相平平曰有主者上曰主者謂誰曰陛下即問決獄責廷尉廷尉掌刑辟故決獄當問之責治粟內史班表治粟內史秦官掌穀貨故錢穀出入當問之武帝太初元年改為大司農苟各有主者而君所主者何事也平謝曰陛下不知其駑下師古曰駑凡馬之稱非駿者也故以自喻駑音奴宰相者上佐天子理陰陽順四時下遂萬物之宜外鎮撫四夷諸侯內親附百姓使卿大夫各得任其職焉帝乃稱善右丞相大慚出而讓陳平曰君獨不素教我對陳平笑曰君居其位不知其任邪且陛下即問長安中盜賊數君欲強對邪強其兩翻於是絳侯自知其能不如平遠矣居頃之人或說勃曰君既誅諸呂立代王威震天下而君受厚賞處尊位說式芮翻處昌呂翻久之即禍及身矣勃亦自危乃謝病請歸相印上許之秋八月辛未右丞相勃免左丞相平專為丞相元年初隆慮侯竈擊南越事見高后七年士卒大疫兵不能隃領師古曰隃與踰同高后崩即罷兵趙佗因此以兵威財物賂遺閩越西甌駱役屬焉遺于季翻下同劉昫曰唐黨州古西甌所居也漢屬鬱林郡界駱越也唐貴州鬱平縣古西甌駱越所居漢為鬱林廣鬱縣地又潘州亦西甌駱越地漢合浦郡地也又高州茂名縣及鬱林軍亦古西甌之地宋白曰秦象林郡皆西甌地師古曰西甌者即駱越也言西者以別東甌也廣州記曰交趾有駱田仰潮水上下人食其田名為駱侯諸縣自名為駱將銅印青綬即今之令後蜀王子將兵討駱侯自稱為安陽王治封溪縣南越王尉佗攻破安陽王令二使典主交趾九真二郡即甌駱也東西萬餘里乘黃屋左纛稱制與中國侔帝乃為佗親冢在真定者置守邑為于偽翻歲時奉祀召其昆弟尊官厚賜寵之復使陸賈使南越復扶又翻賜佗書曰朕高皇帝側室之子也師古曰言非正嫡所生奉北藩于代道里遼遠壅蔽樸愚未嘗致書高皇帝棄㣥臣孝惠皇帝即世高后自臨事不幸有疾諸呂為變賴功臣之力誅之已畢朕以王侯吏不釋之故孟康曰辭讓帝位不見置也今即位乃者聞王遺將軍隆慮侯書求親昆弟請罷長沙兩將軍佗真定人親昆弟皆在真定故來求之呂后七年佗反攻長沙故遺兩將軍屯於長沙以備之遺于季翻博陽齊地高祖功臣表有博陽侯陳濞蓋於此時為將軍也索隱曰博陽縣在汝南已遣人存問脩治先人冢治直之翻前日聞王發兵於邊為寇災不止當其時長沙苦之南郡尤甚雖王之國庸獨利乎師古曰言越兵寇邊長沙南郡皆厭苦之而漢兵亦當拒戰其於越亦非利也傷良將吏寡人之妻孤人之子獨人父母得一亡十朕不忍為也朕欲定地犬牙相入者以問吏吏曰高皇帝所以介長沙土也介隔也亶今得王之地不足以為大得王之財不足以為富服領以南蘇林曰山領名也如淳曰長沙南界予謂服領者自五嶺以南荒服之外因以稱之雖然王之號為帝兩帝並立亡一乘之使以通其道亡與無同乘繩證翻爭而不讓仁者不為也願與王分棄前惡師古曰彼此共棄故曰分通使如故師古曰從今通使至於終久故曰終今以來也賈至南越南越王恐頓首謝罪願奉明詔長為藩臣奉貢職於是下令國中曰吾聞兩雄不俱立兩賢不並世漢皇帝賢天子自今以來去帝制黃屋左纛去羌呂翻因為書稱蠻夷大長老夫臣佗昧死再拜上書皇帝陛下長知兩翻下同曰章甲十五行本無曰字乙十一行本同孔本同老夫故越吏也高皇帝幸賜臣佗璽以為南越王孝惠皇帝即位義不忍絕所以賜老夫者厚甚高后用事別異蠻夷別彼列翻出令曰毋與蠻夷越金鐵田器馬牛羊以越為蠻夷故曰蠻夷越予牡毋予牝予讀曰與牡雄也牝雌也恐其蕃息故不予牝老夫處僻馬牛羊齒已長師古曰齒已長謂老也處昌呂翻下同有死罪使內史藩中尉高御史平凡三輩上書謝過皆不反又風聞老夫父母墳墓已壞削兄弟宗族已誅論師古曰風聞謂風聲傳聞也誅論者以罪論死也壞音怪言為漢所貶削不得振起也亡讀曰無故更號為帝自帝其國非敢有害於天下更工衡翻高皇后聞之大怒削去南越之籍使使不通去羌呂翻使使上如字下疏吏翻故發兵以伐其邊老夫處越四十九年于今抱孫焉然夙興夜寐寢不安席食不甘味目不視靡曼之色張揖曰靡細也曼澤也以不得事漢也今陛下幸哀憐復故號通使漢如故老夫死骨不腐改號不敢為帝矣元年齊哀王襄薨諡法恭仁短折曰哀元年上聞河南守吳公治平為天下第一守式又翻治直吏翻召以為廷尉吳公薦洛陽人賈誼班志洛陽縣屬河南郡班表博士秦官掌通古今秩比六百石員多至數十人武帝建元五年初置五經博士宣帝黃龍元年增員十二人屬奉常帝愛其辭博言其瞻於文辭而博識也超遷至太中大夫班表太中大夫掌論議無員多至數十人秩比千石屬郎中令易服色定官名興禮樂以立漢制更秦法正朔謂夏建寅為人正商建丑為地正周建子為天正秦之建亥非三統也而漢因之此當改也周以火德王色尚赤漢繼周者也以土繼火色宜尚黃此當易也唐虞官百夏商官倍周官則備矣六卿各率其屬凡三百六十秦立百官之職名漢因循而不革此當定也高祖之時叔孫通采秦儀以制朝廷之禮因秦樂人以作宗廟之樂此當興也誼之說雖未為盡醇而其志則可尚矣二年二年冬十月曲逆獻侯陳平薨二年詔列侯各之國為吏及詔所止者遣太子李奇曰為吏謂為卿大夫者詔所止謂特以恩愛見留余謂當時如周勃者是也二年十一月乙亥周勃復為丞相二年癸卯晦日有食之詔㣥臣悉思朕之過失及知見之所不及匄以啟告朕匄音丐乞也及舉賢良方正能直言極諫者賢良方正之舉昉此因各敕以職任務省繇費以便民省所景翻減也繇讀曰徭役也罷衞將軍按班紀詔曰朕既不能遠德故憪然念外人之有非是以設備未息今縱不能罷邊屯戍又飭兵厚衞其罷衞將軍軍通鑑傳寫逸一軍字耳餘皆以給傳置班表太僕掌輿馬見馬見在之馬也遺留也財與纔同少也僅也言減見在之馬所留財足充事而已置者置傳驛之所因名置也傳張戀翻潁陰侯騎賈山潁陰侯灌嬰也騎者蓋在侯家為騎從也臣聞雷霆之所擊無不摧折者折而設翻萬鈞之所壓無不糜滅者今人主之威非特雷霆也執重非特萬鈞也開道而求諫和顏色而受之用其言而顯其身士猶恐懼而不敢自盡又況於縱欲恣暴惡聞其過乎惡烏路翻震之以威壓之以重雖有堯舜之智孟賁之勇豈有不摧折者哉賁音奔如此則人主不得聞其過社稷危矣昔者周蓋千八百國周爵五等而士三等公侯百里伯七十里子男五十里不滿為附庸九州州方千里八州州二百一十國天子之縣內九十三國凡九州千七百七十三國曰千八百國者舉成數也周改禹貢徐梁二州合之於青雍分冀州之地以為幽幷職方氏所掌曰揚州荊州豫州青州兗州雍州幽州冀州幷州君有餘財民有餘力而頌聲作頌者美盛德之形容也力罷不能勝其役財盡不能勝其求罷讀曰疲勝音升一君之身耳所自養者馳騁弋獵之娛弋羊職翻繳射也天下弗能供也秦皇帝計其功德度其後嗣世世無窮度徒洛翻然身死纔數月耳天下四面而攻之宗廟滅絕矣秦皇帝居滅絕之中而不自知者何也天下莫敢告也其所以莫敢告者何也亡養老之義亡輔弼之臣亡古無字通殺直諫之士是以道諛媮合苟容道讀曰導言為諂諛導迎主意納之於邪也媮與偷同比其德則賢於堯舜課其功則賢於湯武天下已潰師古曰潰水旁決也言天下已壞如水之潰也今陛下使天下舉賢良方正之士天下皆訢訢焉訢讀曰欣曰將興堯舜之道三王之功矣天下之士莫不精白以承休德師古曰厲精而為潔白也又選其賢者使為常侍諸吏班表左右曹諸吏散騎常侍中常侍皆加官一日再三出臣恐朝廷之解弛百官之墮於事也解讀曰懈弛式氏翻放也墮與惰同陛下即位親自勉以厚天下節用愛民平獄緩刑天下莫不說喜說讀曰悅臣聞山東吏布詔令民雖老羸癃疾癃音隆病也老也疲病也扶杖而往聽之願少須臾毋死思見德化之成也少詩沼翻今功業方就名聞方昭聞音問後以義推四方鄉風鄉讀曰嚮而從豪俊之臣方正之士直與之日日射獵擊兔伐狐以傷大業絕天下之望臣竊悼之古者大臣不得與宴游師古曰安息曰宴與讀曰豫師古曰方道也一曰方謂廉隅也行下孟翻盡心以稱大禮夫士脩之於家而壞之於天子之廷稱尺證翻壞音怪臣竊愍之陛下與衆臣宴游與大臣方正朝廷論議游不失樂朝不失禮樂音洛朝直遙翻下同軌章甲十五行本軌上有議不失計四字乙十一行本同孔本同張校同退齋校同事之大者也師古曰軌謂法度也軌居洧翻上每朝郎從官上書疏從才用翻未嘗不止輦受其言言不可用置之言可用采之未嘗不稱善帝從霸陵上班志霸陵縣屬京兆故芷陽也帝起陵邑因更名中郎將袁盎騎並車擥轡並蒲浪翻擥與攬同魯敢翻上曰將軍怯邪盎曰臣聞千金之子坐不垂堂師古曰言富人之子則自愛也垂堂謂坐堂外邊恐墜墮也不徼幸徼工堯翻今陛下騁六飛馳下峻山有如馬驚車敗陛下縱自輕柰高廟太后何上乃止上所幸慎夫人在禁中常與皇后同席坐及坐郎署袁盎引卻慎夫人坐蘇林曰郎署上林中直衞之署也如淳曰盎時為中郎將天子幸署豫設供張待之故得引卻慎夫人坐也坐徂臥翻慎姓也古有慎到不肯坐上亦怒起入禁中盎因前說曰臣聞尊卑有序則上下和今陛下既已立后慎夫人乃妾妾主豈可與同坐哉且陛下幸之即厚賜之陛下所以為慎夫人適所以禍之也為于偽翻陛下獨不見人彘乎人彘事見上卷惠帝元年說讀曰悅召語慎夫人語牛倨翻慎夫人賜盎金五十斤賈誼說上曰管子曰管子管仲之書衣食足而知榮辱民不足而可治者自古及今未之嘗聞治直之翻下同古之人曰一夫不耕或受之飢一女不織或受之寒生之有時而用之無度亡古無字通屈其勿翻盡也下大屈同古之治天下至纖至悉故其畜積足恃今背本而趨末者甚衆是天下之大殘也師古曰本農業也末工商也言人棄農業而務工商者甚衆殘謂傷害天下也背蒲妹翻日日以長長知兩翻是天下之大賊也殘賊公行莫之或止大命將泛莫之振救孟康曰泛方勇翻覆也師古曰字本作覂此通用振舉也生之者甚少而靡之者甚多靡讀曰糜散也天下財產何得不蹷蹷音厥傾竭也漢之為漢幾四十年矣幾居衣翻公私之積猶可哀痛失時不雨民且狼顧鄭氏曰民欲有畔意若狼之顧望也李奇曰狼性怯走喜還顧言民見天不雨心亦恐也師古曰李說是請賣爵子如淳曰賣爵級又賣子也余謂請賣爵子猶言請爵賣子也入粟得以拜爵故曰請爵富者有粟以徼上之急至於請爵貧者無以自活至於賣子如淳曰聞於天子之耳阽危欲墜之意阽音閻又丁念翻世之有饑穰天之行也李奇曰天之行氣不能常熟也或曰行道也師古曰穰豐也人羊翻被皮義翻即不幸有方二三千里之旱國胡以相恤卒然邊境有急卒讀曰猝數十百萬之衆國胡以餽之兵旱相乘天下大屈有勇力者聚徒而衡擊衡讀曰橫罷夫羸老易子齩其骨罷讀曰疲齩五巧翻齧也政治未畢通也治直吏翻遠方之能僭擬者並舉而爭起矣乃駭而圖之豈將有及乎夫積貯者天下之大命也貯丁呂翻苟粟多而財有餘何為而不成以攻則取以守則固以戰則勝懷敵附遠何招而不至今敺民而歸之農皆著於本敺與驅同著直略翻末技游食之民轉而緣南畮則畜積足而人樂其所矣樂音洛可以為富安天下而直為此廩廩也廩與凜同廩廩危懼之意師古曰言務耕農厚畜積則天下富安何乃不為而常不足直廩廩若此也為于偽翻上感誼言春正月丁亥詔開藉田上親耕以率天下之民應劭曰古者天子耕藉田千畝為天下先藉者典藉之常也韋昭曰藉借也借民以治之以奉宗廟且以勸率天下使務農也臣瓚曰景帝詔曰朕親耕后親桑為天下先本以躬親為義不得以假借為稱也藉謂蹈藉也師古曰國語云宣王即位不藉千畝虢文公諫則藉非假借明矣瓚說是也陸德明經典釋文藉在亦翻二年三月有司請立皇子為諸侯王詔先立趙幽王少子辟彊為河間王師古曰辟彊言辟禦彊梁亦猶辟兵辟非耳辟必亦翻彊其良翻一說辟讀曰闢彊讀曰疆闢疆言開土地也賈誼書曰衞侯朝于周周行人問其名衞侯曰辟彊行人還之曰啟彊辟彊天子之號也諸侯弗得用更其名曰燬其義兩說並通他皆倣此河間本屬趙國元年以幽王子遂為趙王至是又分河間以王遂之弟辟彊東牟侯興居為濟北王城陽濟北本皆屬齊今分以王章興居二人皆悼惠王子濟子禮翻參為太原王揖為梁王二年五月詔曰古之治天下朝有進善之旌應劭曰旌幡也堯設之五達之道令民進善也如淳曰欲有進者於旌下言之服虔曰堯作之橋梁交午柱頭也應劭曰橋梁邊版所以書政治之愆失也至秦去之今乃復施也索隱曰尸子云堯立誹謗之木誹音非音沸韋昭曰慮政有闕失使書於木此堯時然也後代因以為飾今宮外橋頭四柱木是鄭玄註禮云一縱一橫為午謂以木貫表柱四出即今之華表崔浩以為木貫柱四出名桓陳楚俗桓聲近和又云和表則華又與和相訛也今法有誹謗訞言之罪師古曰高后元年詔除訞言令今猶有訞言罪則是中間重設此條訞與妖同將何以來遠方之賢良其除之二年九月詔曰農天下之大本也民所恃以生也而民或不務本而事末故生不遂朕憂其然故今茲親率㣥臣農以勸之其賜天下民今年田租之半二年燕敬王澤薨諡法合善典法曰敬聶崇岐標點容肇祖覆校
