body:
  text: 資治通鑑卷第一百四十五端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註梁紀一齊宣德太后詔蕭衍自建安郡公進爵梁公衍志也尋進爵為王尋受齊禪國因號曰梁高祖武皇帝諱衍字叔達小字練兒南蘭陵中都里人姓蕭氏與齊同出淮陰令整三世至順之順之於齊高帝為族弟帝順之之子也按通鑑武皇帝紀凡十八卷以一二為次此卷武皇帝之下合有一字天監元年壬午五二自是年三月以前猶是齊和帝中興二年春正月齊和帝遣兼侍中席闡文等慰勞建康勞力到翻大司馬衍下令凡東昏時浮費自非可以習禮樂之容繕甲兵之備者餘皆禁絕戊戌迎宣德太后入宮臨朝稱制衍解承制衍承制見上卷上年蹔解之以覘人心朝直遙翻己亥以寧朔將軍蕭昺監南兗州諸軍事昺衍之從父弟也昺兵永翻昺與帝同祖治書侍御史道賜監工銜翻從才用翻壬寅進大司馬衍都督中外諸軍事劍履上殿贊拜不名上時掌翻己酉以大司馬長史王亮為中書監尚書令初大司馬與黃門侍郎范雲南清河太守沈約司徒右長史任昉同在竟陵王西邸事見一百三十六卷齊武帝永明二年守式又翻任音壬昉分兩翻敦厚也好呼到翻引雲為大司馬諮議參軍領錄事衍錄尚書其錄府事使雲領之為衍驃騎大將軍府司馬驃匹妙翻騎奇寄翻與參謀議前吳興太守謝朏國子祭酒何胤先皆棄官家居齊明帝建武初朏胤皆棄官去朏敷尾翻先悉薦翻朏胤皆不至大司馬內有受禪之志沈約微扣其端大司馬不應他日又進曰今與古異不可以淳風期物淳風謂淳古之風也皆望有尺寸之功今童兒牧豎皆知齊祚已終明公當承其運天文讖記又復炳然讖楚譖翻天心不可違人情不可失苟曆數所在雖欲謙光亦不可得已易曰謙尊而光吾方思之約曰公初建牙樊沔此時應思沔彌兗翻今王業已成何所復思若不早定大業脫有一人立異即損威德且人非金石時事難保豈可以建安之封遺之子孫復扶又翻下無復豈復同遺唯季翻若天子還都公卿在位則君臣分定分扶問翻無復異心君明於上臣忠於下豈復有人方更同公作賊大司馬然之約出大司馬召范雲告之雲對略同約旨大司馬曰智者乃爾暗同卿明早將休文更來將攜也挾也領也休文沈約字也語約約曰卿必待我雲許諾而約先期入語牛倨翻先悉薦翻大司馬命草具其事約乃出懷中詔書幷諸選置大司馬初無所改俄而雲自外來至殿門不得入徘徊壽光閤外但云咄咄江南禁中有壽光省咄當沒翻毛晃曰咄咄咨嗟語也問曰何以見處約舉手向左謂處之以尚書左僕射也處昌呂翻不乖所望有頃大司馬召雲入嘆約才智縱橫縱子容翻且曰我起兵於今三年矣東昏侯永元二年十一月衍起兵至是首尾三年將即亮翻然成帝業者卿二人也甲寅詔進大司馬位相國總百揆揚州牧封十郡為梁公時以豫州之梁郡歷陽南徐州之義興揚州之淮南宣城吳興會稽新安東陽凡十郡為梁公國相息亮翻置梁百司去錄尚書之號去羌呂翻驃騎大將軍如故二月辛酉梁公始受命齊湘東王寶晊晊之日翻安陸昭王緬之子也緬齊明帝之弟緬彌兗翻好呼到翻東昏侯死寶晊望物情歸己坐待法駕既而王珍國等送首梁公梁公以寶晊為太常寶晊心不自安壬戌梁公稱寶晊謀反幷其弟江陵公寶覽汝南公寶宏皆殺之丙寅詔梁國選諸要職悉依天朝之制朝直遙翻於是以沈約為吏部尚書兼右僕射范雲為侍中梁公納東昏余頗妨政事范雲以為言梁公未之從雲與侍中領軍將軍王茂同入見自沈約至王茂皆梁國官也見賢遍翻昔沛公入關婦女無所幸此范增所以畏其志大也事見九卷漢高帝元年海內想望風聲柰何襲亂亡之迹以女德為累乎左傳富辰曰女德無極杜預註云婦女之志近之則不知止足累力瑞翻范雲言是也公必以天下為念無宜留此梁公默然雲即請以余氏賚王茂賚洛代翻梁公賢其意而許之明日賜雲茂錢各百萬丙戌詔梁公增封十郡進爵為王時以豫州之南譙廬江江州之尋陽郢州之武昌西陽南徐州之南琅邪南東海晉陵揚州之臨海永嘉十郡益梁國癸巳受命赦國內及府州章十二行本州下有所統二字乙十一行本同孔本同退齋校同殊死以下自進爵為王已上凡詔皆以宣德太后稱制行之辛丑殺齊邵陵王寶攸晉熙王寶嵩桂陽王寶貞南史齊紀作寶攸本傳作寶脩三王皆明帝之子梁王將殺齊諸王防守猶未急鄱陽王寶寅家閹人顏文智與左右麻拱等密謀穿牆夜出寶寅具小船於江岸著烏布襦著則略翻襦汝朱翻短衣也腰繫千餘錢潛赴江側躡屩徒步足無完膚屩居勺翻草履也防守者至明追之寶寅詐為釣者隨流上下十餘里追者不疑待散乃渡西岸投民華文榮家待散待追者散也華戶化翻賃驢乘之晝伏夜行抵壽陽之東城魏戍主杜元倫馳告揚州刺史任城王澄以車馬侍衞迎之任音壬寶寅時年十六徒步憔悴悴秦醉翻見者以為掠賣生口澄待以客禮寶寅請喪君斬衰之服澄遣人曉示情禮以喪兄齊衰之服給之喪息浪翻衰倉回翻齊音咨澄帥官僚赴弔寶寅居處有禮一同極哀之節禮居君父之喪極哀帥讀曰率處昌呂翻故皆受慰喭撫而安之曰慰弔生曰唁唁與喭同魚戰翻唯不見夏侯一族夏侯之族本譙郡譙人居于壽陽夏戶雅翻澄深器重之為蕭寶寅貴顯於魏而不終張本齊和帝東歸將東歸建康也憺徒敢翻又徒濫翻荊州軍旅之後公私空乏憺厲精為治治直吏翻廣屯田省力役存問兵死之家供其乏困自以少年居重任少詩照翻謂佐吏曰政之不臧士君子所宜共惜吾今開懷卿其無隱於是人人得盡意民有訟者皆立前待符教決於俄頃曹無留事荊人大悅齊和帝至姑孰丙辰下詔禪位于梁丁巳廬陵王寶源卒非疾也寶源者齊明帝第五子魯陽蠻魯北鷰等起兵攻魏潁州魏置潁州於汝陰又潁川郡舊置潁州夏四月辛酉宣德太后令曰西詔至齊和帝雖已至姑孰其地猶在建康之西故曰西詔憲章前代者以前代為法度也明可臨軒明謂明旦也未亡人歸于別宮古者君薨其夫人在者自稱未亡人使疏吏翻璽斯氏翻紱音弗壬戌發策遣兼太保尚書令亮等奉皇帝璽紱詣梁宮亮王亮也丙寅梁王即皇帝位于南郊大赦改元始改元天監追贈兄懿為丞相封長沙王諡曰宣武葬禮依晉安平獻王故事懿為東昏侯所殺葬不成禮今依晉葬安平王孚禮葬之丁卯奉和帝為巴陵王宮于姑孰優崇之禮皆倣齊初倣齊奉汝陰王之禮王皇后為巴陵王齊世王侯封爵悉從降省降者王降公公降侯省者除其封國省所梗翻備三恪也追尊皇考為文皇帝廟號太祖皇妣為獻皇后考異曰南史云五月追尊今從梁書東昏侯永元元年郗氏卒于襄陽郗丑之翻騎奇寄翻立皇弟中護軍宏為臨川王南徐州刺史秀為安成王雍州刺史偉為建安王雍於用翻左衞將軍恢為鄱陽王荊州刺史憺為始興王以宏為揚州刺史丁卯以中書監王亮為尚書令相國左長史王瑩為中書監吏部尚書沈約為尚書僕射長兼侍中范雲為散騎常侍吏部尚書詔凡後宮樂府西解暴室諸婦女一皆放遣解讀曰廨一皆放遣一切盡放遣之也戊辰巴陵王卒時上欲以南海郡為巴陵國徙王居之沈約曰古今殊事魏武所云不可慕虛名而受實禍沈約夢齊和帝劍斷其舌天之報應固不爽也乃遣所親鄭伯禽詣姑孰以生金進王王曰我死不須金醇酒足矣乃飲沈醉沈持林翻伯禽就摺殺之時年十五摺落合翻王之鎮荊州也琅邪顏見遠為錄事參軍及即位為治書侍御史兼中丞治直之翻既禪位見遠不食數日而卒史言齊臣以死殉和帝者僅一顏見遠我自應天從人曰從人者避皇考順之諱也而顏見遠乃至於此此言不可以訓庚午詔有司依周漢故事議贖刑條格舜典曰金作贖刑註曰誤入而刑出金以贖罪周穆王訓夏贖刑亦以五刑之辟疑者罰贖至漢文帝令民入粟以贖罪武帝令死罪入贖錢五十萬減死一等蓋自虞及周疑誤者贖漢則凡犯罪者皆可得而入贖悉入贖停罰其臺省令史士卒欲贖者聽之以謝沭縣公寶義為巴陵王奉齊祀上之受禪也寶義以晉安王降封謝沭縣公晉志謝沭縣屬臨賀郡沭食聿翻不能言故獨得全齊南康侯子恪及弟祁陽侯子範嘗因事入見子恪子範齊豫章王嶷子也祁陽縣吳立宋屬零陵郡見賢遍翻從千容翻天下公器非可力取苟無期運雖項籍之力終亦敗亡宋孝武性猜忌兄弟粗有令名者皆鴆之謂南平王鑠也粗坐五翻謂顏竣王僧達周朗沈懷文等朝直遙翻去羌呂翻下同或不疑而卒為患如卿祖以材略見疑而無如之何此正指疑而不能去者謂齊高帝也卒子恤翻而子孫皆死其手此正指不疑而卒為患者謂明帝盡殺孝武帝子孫也彼豈知我應有今日固知有天命者非人所害我初平建康人皆勸我除去卿輩以壹物心我於時依而行之誰謂不可正以江左以來代謝之際必相屠滅感傷和氣所以國祚不長又齊梁雖云革命事異前世我與卿兄弟雖復絕服五服之親至於袒免則無服矣去羌呂翻復扶又翻下可復無復同齊業之初亦共甘苦齊宋禪代之際帝父順之參預佐命豈可遽如行路之人卿兄弟果有天命非我所殺若無天命何忽行此當足示無度量耳且建武塗炭卿門謂齊明帝建武中誅高武子孫非唯自雪門恥亦為卿兄弟報仇為于偽翻卿若能在建武永元之世永元齊東昏侯年號謂齊明帝父子為亂高武子孫為正我自取天下於明帝家非取之於卿家也昔劉子輿自稱成帝子光武言假使成帝更生天下亦不可復得況子輿乎事見三十九卷漢更始元年魏武帝之孫為晉忠臣事見八十一卷晉武帝太康四年我方坦然相期卿無復懷自外之意無當作毋當自知我寸心子恪兄弟凡十六人皆仕梁子恪子範子質子顯子雲子暉並以才能知名歷官清顯各以壽終史言帝所誅夷者齊明帝之後高帝之後固無恙也詔徵謝朏為左光祿大夫開府儀同三司朏敷尾翻何胤為右光祿大夫何點為侍中胤點終不就癸酉詔公車府謗木肺石傍各置一函周禮大司寇以肺石達窮民註云肺石赤石也肺芳廢翻欲有橫議投謗木函杜預曰肉食在位者布衣處士而議朝政謂之橫議橫戶孟翻投肺石函沈持林翻上身服浣濯之衣常膳唯以菜蔬每簡長吏務選廉平皆召見於前勗以政道見賢遍翻勗許玉翻勉也擢尚書殿中郎到溉為建安內史左戶侍郎劉鬷為晉安太守杜佑曰宋齊度支尚書統度支左戶右戶金部庫部六曹鬷子公翻沈約曰建安本閩越秦立為閩中郡漢武帝滅閩越徙其民於江淮間虛其地後有遁逃山谷間者頗出立為冶縣屬會稽司馬彪云章安是故冶然則臨海亦冶地也後分冶地為會稽東南二部都尉東部臨海是也南部建安是也吳孫休永安三年分南部立為建安郡晉武帝太康三年分建安立晉安郡詳考沈志建安郡則今南劍邵武建寧之地晉安郡則今福州之地沈志洪氏隸釋辯之甚詳註已見前溉彥之曾孫也到彥之宋文帝將小縣令有能遷大縣大縣有能遷二千石以山陰令丘仲孚為長沙內史武康令東海何遠為宣城太守由是廉能莫不知勸魯陽蠻圍魏湖陽湖陽縣漢屬南陽郡晉省元魏後於此置西淮安郡及南襄州隋為湖陽縣唐幷湖陽入棗陽縣將即亮翻斬魯北鷰徙萬餘戶於幽幷諸州及六鎮尋叛南走所在追討比及河殺之皆盡比必利翻閏月丁巳魏頓丘匡公穆亮卒諡法貞心大度曰匡齊東昏侯嬖臣孫文明等雖經赦令猶不自安五月乙亥夜帥其徒數百人因運荻炬束仗入南北掖門作亂荻炬者束荻為火炬用也因運此遂束兵仗於荻中以入嬖卑義翻又傳計翻帥讀曰率入衞尉府殺衞尉洮陽愍侯張弘策觀古玩翻洮陽縣屬零陵郡洮音兆前軍司馬呂僧珍直殿內以宿衞兵拒之不能卻上戎服御前殿曰賊夜來是其衆少曉則走矣少詩沼翻命擊五鼓領軍將軍王茂驍騎將軍張惠紹聞難引兵赴救盜乃散走討捕悉誅之擊五鼓晉檀祗破司馬國璠之故智也驍堅堯翻騎奇寄翻難乃旦翻江州刺史陳伯之目不識書得文牒辭訟唯作大諾而已有事典籤傳口語與奪決於主者伯之手不能書典籤傳其口之所言漢會稽諸暨縣吳更名永興伯之以繕為別駕永忠為記室參軍河南褚緭居建康緭于貴翻考異曰魏書蕭寶寅傳作褚胃今從梁書素薄行仕宦不得志頻造尚書范雲雲不禮之行下孟翻造七到翻范雲時為吏部尚書緭怒私謂所親曰建武以後草澤下族悉化成貴人吾何罪而見棄今天下草創饑饉不已喪亂未可知喪息浪翻陳伯之擁強兵在江州非主上舊臣有自疑之意且熒惑守南斗詎非為我出邪晉天文志將有天子之事占於南斗南斗六星天廟也主兵為于偽翻入魏不失作河南郡守守式又翻遂投伯之大見親狎伯之又以鄉人朱龍符為長流參軍陳伯之濟陰人職官分紀長流參軍主禁防晉從公府有長流參軍小府無長流參軍置禁防參軍顏氏家訓或問何故名治獄參軍為長流答曰帝王世紀云帝少昊崩其神降于長流之山此事本出山海經於祀主秋按周禮秋官司寇主刑罰長流之職漢魏捕賊掾耳晉宋以來始為參軍上屬司寇故取秋帝所居為嘉名焉恣為姦利上聞之使陳虎牙私戒伯之又遣人代鄧繕為別駕伯之並不受命表云龍符驍勇驍堅堯翻鄧繕有績效臺所遣別駕請以為治中繕於是日夜說伯之云臺家府藏空竭復無器仗三倉無米東境飢流三倉太倉石頭倉及常平倉又按五代史志梁司農卿主農功倉廩統太倉等令又管左右中部三倉丞東境三吳會稽之地說式芮翻復扶又翻下若復同機不可失緭永忠共贊成之伯之謂繕今啟卿若復不得即與卿共反上敕伯之以部內一郡處繕處昌呂翻於是伯之集府州僚佐謂曰奉齊建安王教帥江北義勇十萬已次六合齊建安王蕭寶寅也時奔魏據宋史書六合山在烏江縣界五代志江都郡六合縣宋齊之秦郡尉氏縣也帥讀曰率下同見使以江州見力運糧速下見力之見賢遍翻我荷明帝厚恩誓死以報即命纂嚴使緭詐為蕭寶寅書以示僚佐於聽事前為壇歃血共盟緭說伯之曰荷下可翻聽讀曰廳歃色甲翻說式芮翻今舉大事宜引衆望長史程元沖不與人同心臨川內史王觀僧虔之孫人身不惡可召為長史以代元沖觀古玩翻伯之從之仍以緭為尋陽太守永忠為輔義將軍龍符為豫州刺史觀不應命豫章太守鄭伯倫起郡兵拒守程元沖既失職於家合帥數百人合衆而帥之以攻伯之突入至聽事前聽讀與廳同伯之自出格鬬元沖不勝逃入廬山廬山在江州南皆逃奔盱眙盱眙音吁怡戊子詔以領軍將軍王茂為征南將軍江州刺史帥衆討之魏揚州小峴戍主党法宗党底朗翻姓也杜佑通典德浪翻峴戶典翻下同襲大峴戍破之虜龍驤將軍邾菩薩驤思將翻菩薄乎翻薩桑葛翻陳伯之聞王茂來謂褚緭等曰王觀既不就命鄭伯倫又不肯從便應空手受困今先平豫章開通南路多發丁力益運資糧然後席卷北向以撲飢疲之衆不憂不濟卷讀曰捲北向謂北下攻建康也撲普木翻六月留鄉人唐蓋人守城守尋陽城攻伯倫不能下趣七喻翻王茂軍至伯之表裏受敵遂敗走間道渡江與虎牙等及褚緭俱奔魏間古莧翻上遣左右陳建孫送劉季連子弟三人入蜀使諭旨慰勞勞力到翻季連受命飭還裝益州刺史鄧元起始得之官初季連為南郡太守不禮於元起鄧元起南郡當陽人都錄蓋郡之首吏總錄諸吏者也琛丑林翻逃匿得免至是道琛為元起典籤說元起曰說式芮翻下或說同益州亂離已久公私虛耗劉益州臨歸豈辦遠遣迎候道琛請先使檢校使疏吏翻緣路奉迎不然萬里資糧未易可得元起許之道琛既至言語不恭又歷造府州人士見器物輒奪之有不獲者語曰易以豉翻造七到翻語牛倨翻會當屬人何須苦惜於是軍府大懼謂元起必誅季連禍及黨與競言之於季連季連亦以為然且懼昔之不禮於元起乃召兵算之有精甲十萬歎曰據天險之地握此強兵進可以匡社稷退不失作劉備捨此安之遂召佐史矯稱齊宣德太后令聚兵復反收朱道琛殺之史言劉季連阻兵釁起於朱道琛並不受命涪音浮是月元起至巴西士略開門納之先是蜀民多逃亡聞元起至爭出投附皆稱起義兵應朝廷軍士新故三萬餘人新謂蜀民新附者故謂元起從行者先式薦翻糧食乏絕或說之曰蜀土政慢民多詐疾若檢巴西一郡籍注因而罰之所獲必厚謂民多詐疾注之於籍以避征役說輸芮翻李膺諫曰使君前有嚴敵後無繼援山民始附於我觀德言山民觀望我德則附否則攜貳使疏吏翻民必不堪衆心一離雖悔無及何必起疾可以濟師起疾謂糾之以刻薄民所不堪則是興長病端一曰起疾謂起詐疾者杜預曰濟益也不患資糧不足也元起曰善一以委卿膺退帥富民上軍資米帥讀曰率上時掌翻得三萬斛秋八月丁未命尚書刪定郎濟陽蔡法度損益王植之集註舊律王植之集定張杜律見一百三十七卷齊武帝永明九年濟子禮翻仍命與尚書令王亮侍中王瑩尚書僕射沈約吏部尚書范雲等九人同議定上素善鍾律欲釐正雅樂乃自制四器名之為通五代史志通受聲廣九寸宣聲長九尺臨岳高一寸二分每通皆施三絃一曰玄英通二曰青陽通三曰朱明通四曰白藏通黃鍾絃用二百七十絲長九尺應鍾絃用一百四十二絲長四尺七寸四分差強中間十律以是為差黃鍾律長九寸引而伸之為九尺應鍾律長四寸二十七分寸之二十引而伸之為四尺七寸四分差強中間十律以是為差者即上生下生三分益一三分去一之數也長直亮翻下同悉無差違而還得相中又制十二笛黃鍾笛長三尺八寸應鍾笛長二尺三寸中間十律以是為差以寫通聲飲古鍾玉律並皆不差樂有飲聲飲者隨其聲而酌其清濁高下也鄭譯因琵琶七調以其所捻琵琶絃柱相飲為七均合成十二以應十二律是也八音金石絲竹匏土革木被皮義翻施以七聲七聲宮商角徵羽及變宮變徵先是宮懸止有四鎛鍾雜以編鍾編磬衡鍾凡十六虡古者天子宮懸周禮註云宮懸四面四面象宮室有牆故謂之宮懸凡鍾十六枚同在于虡謂之編鍾特懸者謂之鎛鍾爾雅曰大鍾謂之鎛編磬亦十六枚而同虡先悉薦翻鎛補各翻虡其呂翻各有編鍾編磬凡三十六虡而去衡鍾四隅植建鼓建鼓大鼓也少昊氏作之為建鼓之節去羌呂翻魏高祖之喪前太傅平陽公丕自晉陽來赴此太和二十三年事丕年八十餘歷事六世丕拓跋翳槐之曾孫從世祖臨江歷景穆文成獻文孝文及今主凡六世而還為庶人丕得罪見一百四十一卷齊明帝建武四年矜而禮之乙卯以丕為三老魏揚州刺史任城王澄表請攻鍾離魏主使羽林監敦煌范紹詣壽陽共量進止澄曰當用兵十萬往來百日乞朝廷速辦糧仗紹曰今秋已向末方欲調發任音壬敦徒門翻量音良調徒弔翻兵仗可集糧何由致有兵無糧何以克敵澄沈思良久曰實如卿言乃止沈持林翻九月丁巳魏主如鄴冬十月庚子還至懷與宗室近侍射遠帝射三百五十餘步㣥臣刻銘以美之甲辰還洛陽十一月己未立小廟以祭太祖之母太祖之母帝祖母也以一太牢祭之甲子立皇子統為太子魏洛陽宮室始成齊武帝永明十一年魏始營洛陽至是宮室乃成十二月將軍張囂之侵魏淮南取木陵戍魏任城王澄遣輔國將軍成興擊之章十二行本之下有甲辰二字乙十一行本同孔本同張校同囂之敗走魏復取木陵水經註木陵山在黃水西南有木陵關黃水東逕晉西陽城南又東逕南光城南又東逕弋陽郡東又東北入于淮謂之黃口唐志木陵關在光州光山縣南黃州麻城縣東北復扶又翻劉季連遣其將李奉伯等拒鄧元起將即亮翻元起與戰互有勝負久之奉伯等敗還成都元起進屯西平晉安帝以秦雍流民立懷寧郡宋文帝元嘉十六年寄治成都其屬縣有西平蓋亦寄治成都城外遂為實土閉城固守元起進屯蔣橋去成都二十里留輜重於琕奉伯等間道襲琕陷之重直用翻郫音疲間古莧翻軍備盡沒元起捨琕徑圍州城城局參軍江希之謀以城降不克而死宋有十八曹參軍城局其一也降戶江翻魏陳留公主寡居僕射高肇秦州刺史張彞皆欲尚之公主許彞而不許肇肇怒譖彞於魏主章十二行本主下有彞字乙十一行本同孔本作尋字張校與孔本同坐沈廢累年沈持林翻是歲江東大旱米斗五千民多餓死二年癸未五三春正月乙卯以尚書僕射沈約為左僕射吏部尚書范雲為右僕射尚書令王亮為左光祿大夫丙辰亮坐正旦詐疾不登殿削爵廢為庶人乙亥魏主耕籍田魏梁州氐楊會叛行梁州事楊椿等討之齊東昏永元二年書魏梁州刺史楊椿招降氐王楊集始今乃為行梁州事當考成都城中食盡升米三千人相食劉季連食粥累月計無所出上遣主書趙景悅宣詔受季連降降戶江翻下同季連肉袒請罪鄧元起遷季連于城外俄而造焉待之以禮造七到翻季連謝曰早知如此豈有前日之事蓋言前日所以阻兵拒命實為朱道琛搆間也元起誅李奉伯等送季連詣建康初元起在道懼事不集無以為賞士之至者皆許以辟命於是受別駕治中檄者將二千人季連至建康入東掖門數步一稽顙以至上前稽音啟上笑曰卿欲慕劉備而曾不及公孫述謂公孫述不肯降漢也臥龍謂諸葛孔明三月己巳魏皇后蠶於北郊庚辰魏揚州刺史任城王澄遣長風城章十二行本城作戍乙十一行本同孔本同退齋校同熊校同主奇道顯入寇姓譜奇姓伯奇之後據水經註陰山關在弋陽縣西南唐志黃州麻城縣東北有陰山關蕭寶寅伏於魏闕之下此魏朝之闕門也闕即古之象魏雖暴風大雨終不蹔移會陳伯之降魏亦請兵自效魏主乃引八坐門下入定議八坐謂令僕及諸曹尚書門下謂侍中散騎常侍等官蹔與暫同降戶江翻坐徂臥翻四月癸未朔以寶寅為都督東揚等三州諸軍事鎮東將軍揚州刺史丹楊公齊王禮賜甚厚配兵一萬令屯東城此蓋漢晉之東城縣地以其地在壽陽之東故置東揚州屯陽石即羊石城也在廬江西北霍丘東南寶寅明當拜命明謂明旦也魏人又聽寶寅募四方壯勇得數千人以顏文智華文榮等六人皆為將軍軍主顏文智將寶寅投華文榮文榮等將寶寅投北華戶花翻過期猶絕酒肉禮為兄弟服期喪蔬食粗衣未嘗嬉笑悴秦醉翻癸卯蔡法度上梁律二十卷上時掌翻令三十卷科四十卷詔班行之五月丁巳霄城文侯范雲卒霄城縣侯也五代志沔陽郡竟陵縣舊曰霄城卒子恤翻下同雲盡心事上知無不為臨繁處劇處昌呂翻精力過人及卒衆謂沈約宜當樞管樞管謂管樞機也今人猶謂樞密院為樞管以此觀之沈約位雖在范雲之右而親任不及雲遠矣易以豉翻不如尚書左丞徐勉乃以勉及右衞將軍章十二行本軍下有汝南二字乙十一行本同孔本同退齋校同周捨同參國政捨雅量不及勉而清簡過之兩人俱稱賢相常留省內罕得休下休下謂休偃下直也㣥犬驚吠每有表奏輒焚其藁捨豫機密二十餘年未嘗離左右離力智翻國史詔誥儀體法律軍旅謀謨皆掌之與人言謔終日不絕謔迄却翻戲言也衆尤服之史究言二人終身大概壬申斷諸郡縣獻奉二宮惟諸州及會稽許貢任土若非地產亦不得貢斷音短下頻斷同二宮上宮及東宮也會稽東土大郡也故使之同於諸州甲戌魏楊椿等大破叛氐斬首數千級是年春氐楊會叛六月壬午朔魏立皇弟悅為汝南王魏揚州刺史任城王澄表稱蕭衍頻斷東關斷音短欲令漅湖汎溢以灌淮南諸戍吳楚便水且灌且掠淮南之地將非國有壽陽去江五百餘里衆庶惶惶並懼水害脫乘民之願攻敵之虛豫勒諸州纂集士馬有章十二行本有作首乙十一行本同孔本同退齋校同秋大集應機經略雖混壹不能必果江西自是無虞矣丙戌魏發冀定瀛相幷濟六州二萬人馬一千五百匹相息亮翻濟子禮翻令仲秋之中畢會淮南幷壽陽先兵三萬先兵先屯壽陽之兵蕭寶寅陳伯之皆受澄節度謝朏輕舟出詣闕朏敷尾翻詔以為侍中司徒尚書令朏辭腳疾不堪拜謁角巾自輿詣雲龍門謝詔見於華林園見賢遍翻乘小車就席明旦上幸朏宅謝朏仕宋及齊有宅在建康朏固陳本志不許因請自還東迎母許之臨發上復臨幸復扶又翻賦詩餞別王人送迎相望於道凡將上命者皆謂之王人詔起府於舊宅禮遇優異朏素憚煩不省職事衆頗失望謝朏之於樊英又不及遠甚省悉景翻甲午以中書監王瑩為尚書右僕射秋七月乙卯魏平陽平公丕卒魏既罷鹽池之禁魏主踐阼之初中尉甄琛表弛鹽禁彭城王勰與邢巒以為不可魏主詔從琛請通鑑目錄已提其要此事合載於一百四十三卷齊東昏永元二年而通鑑正文逸其事錯簡置於百四十六卷天監五年庚午復收鹽池利入公復扶又翻辛未魏以彭城王勰為太師勰音協勰固辭魏主賜詔敦諭又為家人書祈請懇至為家人書用家人叔姪之禮也受命八月庚子魏以鎮南將軍元英都督征義陽諸軍事司州刺史蔡道恭聞魏軍將至遣驍騎將軍楊由帥城外居民三千餘家保賢首山為三柵驍堅堯翻騎奇寄翻帥讀曰率冬十月元英勒諸軍圍賢首柵柵民任馬駒斬由降魏任音壬降戶江翻任城王澄命統軍党法宗傅豎眼太原王神念等分兵寇東關大峴淮陵九山淮陵恐當作睢陵齊置徐州於鍾離又僑置濟陰郡睢陵縣於郡界五代志鍾離郡化明縣舊曰睢陵置濟陰郡化明唐濠州之招義縣也或曰宋志南徐州領淮陵郡睢陵淮陵皆屬漢徐部是時既置徐州於鍾離則亦置淮陵於鍾離界未可知也魏收志陳留鍾離二郡有朝歌縣縣有九山城黃溪水按水經註黃水出黃武山東北流逕南光城弋陽等郡今按今招信軍盱眙縣西南一十五里有三城又西十五里至淮陵城臨池河池河過淮陵城西而北入于淮謂之池河口九山店在淮北南直淮陵九山店之東則陷堈湖南則馬城淮流至此謂之九山灣其東則鳳凰州在淮水中約長十里今土人亦呼九山灣為獅子渡北兵渡淮之津要也峴戶典翻澄以大軍繼其後豎眼靈越之子也傅靈越從薛安都起兵攻張永以應義嘉兵潰而死豎而主翻魏收志霍州有北潁川郡領潁川等三縣水經註梁立霍州治灊縣天柱山徐州刺史司馬明素將兵三千救九山將即亮翻下同徐州長史潘伯鄰救淮陵寧朔將軍王燮保焦城党法宗等進拔焦城破淮陵十一月壬午擒明素斬伯鄰先是南梁太守馮道根戍阜陵馮道根傳以南梁太守領阜陵戍先悉薦翻修城隍遠斥候如敵將至衆頗笑之道根曰怯防勇戰此之謂也其周防若怯而臨戰則勇党法宗等衆二萬奄至城下衆皆失色道根命大開門緩服登城選精銳二百人出與魏兵戰破之魏人見其意思閒暇思相吏翻戰又不利遂引去道根將百騎擊高祖珍破之騎奇寄翻魏諸軍糧運絕引退以道根為豫州刺史此時梁豫州治晉熙道根蓋猶戍阜陵特帶刺史耳武興安王楊集始卒己未魏立其世子紹先為武興王紹先幼國事決於二叔父集起集義乙亥尚書左僕射沈約以母憂去職魏既遷洛陽北邊荒遠因以饑饉百姓困弊魏主加尚書左僕射源懷侍中行臺魏道武置行臺之官於鄴中山今置於北邊杜佑曰魏末司馬師討諸葛誕散騎常侍裴秀尚書僕射陳泰黃門侍郎鍾會等以行臺從北齊行臺兼統民事自辛術始隋謂之行臺省六鎮列置於三州塞下使疏吏翻下同行下孟翻恆戶登翻燕因肩翻考論殿最既使之賑恤貧民又使之按察官吏殿丁練翻懷通濟有無飢民賴之沃野鎮將于祚沃野漢朔方郡之屬縣也魏平赫連與統萬同置鎮不在六鎮之數將即亮翻下同世父伯父承世嫡者時于勁方用事勢傾朝野朝直遙翻祚頗有受納懷將入鎮祚郊迎道左懷不與語即劾奏免官劾戶概翻又戶得翻下同懷朔鎮將元尼須與懷舊交貪穢狼籍蘇鶚演義曰狼籍者物雜亂之貌狼所臥籍之草皆穢亂謂懷曰命之長短繫卿之口豈可不相寬貸懷曰今日源懷與故人飲酒之坐坐徂臥翻非鞫獄之所也明日公庭始為使者檢鎮將罪狀之處耳尼須揮淚無以對竟按劾抵罪懷又奏邊鎮事少而置官猥多少詩沼翻沃野一鎮自將以下八百餘人將謂鎮將也將即亮翻魏主從之乙酉將軍吳子陽與魏元英戰於白沙子陽敗績白沙在齊安郡界魏收志有沙州治白沙關城註云梁置唐志黃州黃陂縣有白沙關魏東荊州蠻樊素安作亂乙酉以左衞將軍李崇為鎮南將軍都督征蠻諸軍事將步騎討之將即亮翻騎奇寄翻馮翊吉翂父為原鄉令翂撫文翻漢靈帝中平二年分故鄣立原鄉縣屬吳興郡為姦吏所誣逮詣廷尉罪當死翂年十五檛登聞鼓乞代父命檛則瓜翻上以其幼疑人教之使廷尉卿蔡法度嚴加誘脅取其款實誘者開之以生路脅者威之以纆索杻械示將拷訊之款誠也誘音酉詰翂曰爾求代父敕已相許審能死不所謂脅之也拷音考詰去吉翻不讀曰否若為人所教亦聽悔異騃五駭翻所謂誘之也悔異猶律文所謂飜異翂曰囚雖愚幼豈不知死之可憚顧不忍見父極刑故求代之此非細故柰何受人教邪明詔聽代不異登仙豈有回貳反前說為回異前說為貳主上知尊侯無罪行當得釋觀君足為佳童今若轉辭幸可父子同濟翂曰父掛深劾必正刑書囚瞑目引領唯聽大戮劾戶概翻又戶得翻瞑莫定翻無言復對時翂備加杻械法度愍之命更著小者復扶又翻杻女九翻更工衡翻著陟略翻翂不聽曰死罪之囚唯宜益械豈可減乎竟不脫法度具以聞上乃宥其父罪丹楊尹王志求其在廷尉事幷問鄉里欲於歲首舉充純孝魏晉以來舉士皆由州鄉故問其鄉里異哉王尹何量翂之薄乎父辱子死道固當然若翂當此舉乃是因父取名何辱如之固拒而止量音良翂之拒王志是也梁武帝知翂之孝節而不能敍用以厲流俗非也魏主納高肇兄偃之女為貴嬪嬪毗賓翻魏散騎常侍趙脩寒賤暴貴恃寵驕恣陵轢王公為衆所疾散悉亶翻騎奇寄翻轢郎擊翻魏主為脩治第舍擬於諸王為于偽翻治直之翻鄰居獻地者或超補大郡脩請告歸葬其父凡財役所須並從官給脩在道淫縱脩自洛歸趙郡在道淫縱頗發其罪惡及還舊寵小衰高肇密構成其罪侍中領御史中尉甄琛黃門郎李憑廷尉卿陽平王顯素皆諂附於脩至是懼相連及懼以黨附連坐及禍甄之人翻琛丑林翻帝命尚書元紹檢訊下詔暴其姦惡免死鞭一百徙敦煌為兵敦徒門翻而脩愚疏初不之知方在領軍于勁第樗蒲羽林數人稱詔呼之送詣領軍府甄琛王顯監罰先具問事有力者五人迭鞭之監工銜翻問事行杖者也欲令必死脩素肥壯堪忍楚毒密加鞭至三百不死即召驛馬促之上道出城不自勝上時掌翻勝音升舉縛置鞍中舉擎也脩困極不能自勝乘騎兩人對舉而置之馬上縛著鞍中行八十里乃死帝聞之責元紹不重聞重直用翻聞奏也紹曰脩之佞幸為國深蠹臣不因釁除之釁隙也釁許覲翻帝以其言正不罪也紹出廣平王懷拜之曰翁之直過於汲黯紹曰但恨戮之稍晚以為愧耳紹素之孫也常山王素見一百二十二卷宋文帝元嘉十一年廣平王懷孝文之子以族屬長幼之次呼紹為翁甄琛李憑以脩黨皆坐免官左右與脩連坐死黜者二十餘人散騎常侍高聰與脩素親狎而又以宗人諂事高肇故獨得免三年甲申五四魏人聞蔡道恭卒春正月庚戌征虜將軍趙祖悅與魏江州刺史陳伯之戰於東關祖悅敗績魏人聞蔡道恭卒癸丑以尚書右僕射王瑩為左僕射太子詹事柳惔為右僕射惔徒甘翻魏人聞蔡道恭卒丙辰魏東荊州刺史楊大眼擊叛蠻樊季安等大破之季安素安之弟也魏人聞蔡道恭卒丙寅魏大赦改元正始魏人聞蔡道恭卒蕭寶寅行及汝陰東城已為梁所取乃屯壽陽棲賢寺二月戊子將軍姜慶真乘魏任城王澄在外去年魏遣澄入寇宿師於外據其外郭長史韋纘倉猝失圖任城太孟氏勒兵登陴先守要便敵所必攻我所必守曰要便者形勝可據便於制敵之處陴頻彌翻安慰新舊新者壽陽兵民舊者北來將士或曰新者新附舊者舊民章十二行本將上有勸以賞罰四字乙十一行本同孔本同張校同士咸有奮志太親巡城守守手又翻不避矢石蕭寶寅引兵至與州軍合擊之自四鼓戰至下晡日未入之前為下晡韋纘坐免官任城王澄攻鍾離上遣冠軍將軍張惠紹等將兵五千送糧詣鍾離冠古玩翻將即亮翻澄遣平遠將軍劉思祖等邀之丁酉戰于邵陽即邵陽州也俘惠紹等十將殺虜士卒殆盡思祖芳之從子也劉芳以儒學親重於太和之間敗補邁翻將即亮翻從才用翻應封千戶侯侍中領右衞將軍元暉求二婢於思祖不得事遂寢史言魏賞罰失當素之孫也上遣平西將軍曹景宗後軍王僧炳等帥步騎三萬救義陽後軍者後軍將軍也帥讀曰率鑿峴在關南今信陽軍南三十五里有曹店即景宗屯鑿峴口所築峴戶典翻元英遣冠軍將軍元逞等據樊城以拒之三月壬申大破僧炳於樊城俘斬四千餘人僧炳敗於樊城未得至鑿峴也否則此非襄陽之樊城自別是一處魏詔任城王澄以四月淮水將漲舟行無礙南軍得時勿昧利以取後悔會大雨淮水暴漲澄引兵還壽陽魏軍還既狼狽失亡四千餘人中書侍郎齊郡賈思伯為澄軍司居後為殿殿丁練翻澄以其儒者謂之必死及至大喜曰仁者必有勇論語孔子之言思伯託以失道不伐其功有司奏奪澄開府仍降三階上以所獲魏將士請易張惠紹于魏魏人歸之考異曰惠紹傳無被獲及復還事今從魏書魏人聞蔡道恭卒魏太傅領司徒錄尚書北海王詳驕奢好聲色貪冒無厭好呼到翻冒莫北翻厭於鹽翻廣營第舍奪人居室嬖昵左右所在請託中外嗟怨嬖卑義翻又博計翻昵尼質翻魏主以其尊親恩禮無替軍國大事皆與參決所奏請無不開允魏主之初親政也以兵召諸叔事見上卷齊和帝中興元年防衞嚴固高太大懼乘車隨而哭之既得免謂詳曰自今不願富貴但使母子相保與汝掃市為生耳及詳再執政齊和帝中興元年正月魏主親政十一月詳為司徒復扶又翻專助詳為貪虐冠軍將軍茹皓以巧思有寵於帝茹音如思相吏翻常在左右傳可門下奏事弄權納賄朝野憚之詳亦附焉皓娶尚書令高肇從妹皓妻之姊為詳從父安定王燮之詳烝於燮由是與皓益相昵狎朝直遙翻下同從才用翻昵尼質翻直閤將軍劉冑本詳所引薦殿中將軍常季賢以善養馬陳掃靜掌櫛櫛側瑟翻梳也皆得幸於帝與皓相表裏賣權勢高肇本出高麗時望輕之麗力知翻帝既黜六輔魏高祖殂使六人受遺輔幼主事見一百四十二卷齊東昏侯永元元年事見上卷齊和帝中興元年肇以在朝親族至少少詩沼翻乃邀結朋援附之者旬月超擢不附者陷以大罪尤忌諸王以詳位居其上欲去之獨執朝政去羌呂翻乃譖之於帝云詳與皓胄季賢掃靜謀為逆亂夏四月帝夜召中尉崔亮入禁中使彈奏詳貪淫奢縱及皓等四人怙權貪橫收皓等繫南臺橫戶孟翻南臺御史臺也遣虎賁百人圍守詳第賁音奔又慮詳驚懼逃逸遣左右郭翼開金墉門馳出諭旨示以中尉彈狀詳曰審如中尉所糾何憂也正恐更有大罪橫至耳橫戶孟翻人與我物我實受之詰朝有司奏處皓等罪皆賜死詰去吉翻處昌呂翻帝引高陽王雍等五王入議詳罪詳單車防衞送華林園母妻隨入給小奴弱婢數人圍守甚嚴內外不通五月丁未朔下詔宥詳死免為庶人頃之徙詳於太府寺圍禁彌急母妻皆還南第五日一來視之初詳娶宋王劉昶女待之疏薄昶丑兩翻詳既被禁高太乃知安定高事大怒曰汝妻妾盛多如此安用彼高麗婢陷罪至此麗力知翻杖之百餘被創膿潰旬餘乃能立被皮義翻創初良翻又杖劉數十曰婦人皆妬何獨不妬劉笑而受罰卒無所言卒子恤翻下同詳家奴數人陰結黨輩欲劫出詳密書姓名託侍婢通於詳詳始得執省省悉景翻省猶視也而門防主司遙見突入就詳手中攬得奏之詳慟哭數聲暴卒詔有司以禮殯葬門防主司主門衞之兵以防守詳者先是典事史元顯獻雞雛四翼四足典事猶今尚書六部主事吏職也江南制局監有典事先悉薦翻光上表曰漢元帝初元中丞相府史家雌雞伏子漸化為雄師古曰初尚伏子後乃稍稍化為雄也伏音房富翻師古曰距雞附足骨鬬時所用刺之將謂帥領其㣥也有獻雄雞生角劉向以為雞者小畜主司時起居人畜許又翻師古曰至時而鳴以為人起居之節小臣執事為政之象也事見西漢書五行志石顯伏辜此其效也靈帝光和元年南宮寺雌雞欲化為雄但頭冠未變詔以問議郎蔡邕對曰頭為元首人君之象也今雞一身已變未至於頭而上知之是將有其事而不遂成之象也若應之不精政無所改頭冠或成為患滋大事見後漢書蔡邕傳天下遂大亂今之雞狀雖與漢不同而其應頗相類誠可畏也臣以向邕言推之翼足衆多亦㣥下相扇助之象雛而未大足羽差小亦其勢尚微易制御也易以豉翻臣聞災異之見皆所以示吉凶見賢遍翻明君覩之而懼乃能致福闇主覩之而慢所以致禍或者今亦有自賤而貴關預政事如前世石顯之比者邪願陛下進賢黜佞則妖弭慶集矣妖於遙翻後數日皓等伏誅帝愈重光魏主以茹皓等伏誅為光言之驗高肇獨非自賤而貴關預政事者邪高肇說帝使宿衞隊主帥羽林虎賁守諸王第殆同幽禁彭城王勰切諫不聽勰志尚高邁不樂榮勢避事家居而出無山水之適處無知己之遊獨對妻子常鬱鬱不樂說式芮翻帥所類翻樂音洛處昌呂翻魏人聞蔡道恭卒魏人圍義陽城中兵不滿五千人食纔支半歲魏軍攻之晝夜不息刺史蔡道恭隨方抗禦皆應手摧卻相持百餘日前後斬獲不可勝計魏自去年十月圍義陽蔡道恭卒於今年五月自此以上謂道恭疾未甚之前勝音升將退會道恭疾篤乃呼從弟驍騎將軍靈恩從才用翻兄子尚書郎僧勰及諸將佐謂曰吾受國厚恩不能攘滅寇賊今所苦轉篤勢不支久汝等當以死固節無令吾沒有遺恨衆皆流涕道恭卒靈恩攝行州事代之城守守式又翻魏人聞蔡道恭卒六月癸未大赦魏人聞蔡道恭卒魏大旱散騎常侍兼尚書邢巒奏稱昔者明王重粟帛輕金玉何則粟帛養民而安國金玉無用而敗德故也散悉亶翻騎奇寄翻敗補邁翻先帝深鑒奢泰務崇節儉至以紙絹為帳扆扆於豈翻禮疏曰扆屏風銅鐵為轡勒府藏之金裁給而已藏徂浪翻不復買積以費國資復扶又翻逮景明之初承升平之業四境清晏遠邇來同於是貢篚相繼貢篚二語本之禹貢謂貴細之物盛之以篚筐而入貢也諸所獻納倍多於常金玉恆有餘國用恆不足估音古恆戶登翻苟非為之分限分扶問翻但恐歲計不充自今請非要須者一切不受魏主納之魏人聞蔡道恭卒秋七月癸丑角城戍主柴慶宗以城降魏降戶江翻魏徐州刺史元鑒遣淮陽太守吳秦生將千餘人赴之淮陰援軍斷其路守式又翻將即亮翻淮陰梁重鎮也以角城叛遣軍援其不從叛者斷音短秦生屢戰破之遂取角城魏人聞蔡道恭卒甲子立皇子綜為豫章王魏人聞蔡道恭卒魏李崇破東荊叛蠻生擒樊素安進討西荊諸蠻悉降之西荊正指荊州也魏太和中徙荊州治穰城領南陽順陽新野東恆農漢廣襄城北清恆農等郡其地正在東荊州之西魏人聞蔡道恭卒魏人聞蔡道恭卒攻義陽益急短兵日接曹景宗頓鑿峴不進但耀兵遊獵而已上復遣寧朔將軍馬仙琕救義陽復扶又翻下箭復琕復乃復同琕部田翻仙琕轉戰而前兵勢甚銳元英結壘於上雅山上雅山當作士雅山章十二行本上正作士乙十一行本同孔本同惟雅作稚張校同熊校同據水經註義陽之東有大木山即晉祖逖將家避難所居也逖字士雅後人因以之名山杜佑曰唐州桐柏縣有大木山晉祖逖為豫州刺史藏家屬於此山示之以弱仙琕乘勝直抵長圍掩英營英偽北以誘之誘音酉至平地縱兵擊之統軍傅永擐甲執槊單騎先入將即亮翻下同擐音宦槊色角翻唯軍主蔡三虎副之突陳橫過梁兵射永洞其左股陳讀曰陣射而亦翻永拔箭復入仙琕大敗一子戰死仙琕退走英謂永曰公傷矣且還營永曰昔漢高捫足不欲人知事見十卷漢高祖四年國家一將柰何使賊有傷將之名將即亮翻遂與諸軍追之盡夜而返時年七十餘矣軍中莫不壯之仙琕復帥萬餘人進擊英帥讀曰率英又破之殺將軍陳秀之仙琕知義陽危急盡銳決戰一日三交皆大敗而返馬仙琕力戰使曹景宗以大軍繼之魏必敗退義陽全矣八月乙酉降於魏降戶江翻三關戍將聞之辛酉亦棄城走乙酉距辛酉三十六日太遠或者其辛卯歟英使司馬陸希道為露版嫌其不精命傅永改之永不增文彩直為之陳列軍事處置形要而已為于偽翻處昌呂翻英深賞之曰觀此經算雖有金城湯池不能守矣史言英伐其功故深賞傅永能為之陳列南安惠王以預穆泰之謀追奪爵邑穆泰事見一百四十卷齊明帝建武三年乃復立英為中山王御史中丞任昉奏彈曹景宗上以其功臣寢而不治任音壬昉甫兩翻彈徒丹翻治直之翻魏人聞蔡道恭卒衞尉鄭紹叔忠於事上外所聞知纖豪無隱每為上言事為于偽翻善則推功於上不善則引咎歸己上以是親之詔於南義陽置司州移鎮關南以紹叔為刺史南義陽治鹿城關隋為黃州木蘭縣唐併木蘭入黃岡縣繕器械廣田積穀招集流散百姓安之魏置郢州於義陽以司馬悅為刺史魏收地形志郢州領安陽城陽汝南郡麻陽即今黃州麻城縣地考異曰司馬悅傳作豫州刺史馬仙琕按仙琕於時未為豫州也拔之魏人聞蔡道恭卒九月壬子以吐谷渾王伏連籌為西秦河二州刺史河南王吐從暾入聲谷音浴魏人聞蔡道恭卒柔然侵魏之沃野及懷朔鎮漢沃野縣屬朔方郡後魏為鎮魏收志太和元年置偏城郡沃野縣屬焉此時鎮猶未廢也註已見前騎奇寄翻行下孟翻指授方略隨須徵發皆以便宜從事隨須者隨軍行之所須以為用者也柔然遁去懷以為用夏制夷莫如城郭還至恆代按視諸鎮左右要害之地可以築城置戍之處欲東西為九城及儲糧積仗之宜犬牙相救之勢凡五十八條表上之曰今定鼎成周去北遙遠代表諸國頗或外叛代表謂魏代都之塞外也諸國謂高車諸部夏戶雅翻恆戶登翻上時掌翻戎馬甲兵十分闕八謂宜準舊鎮東西相望令形勢相接築城置戍分兵要害勸農積粟警急之日隨便翦討彼遊騎之寇騎奇寄翻終不敢攻城亦不敢越城南出如此北方無憂矣魏主從之魏人聞蔡道恭卒魏太和之十六年高祖詔中書監高閭與給事中公孫崇考定雅樂見一百三十七卷齊武帝永明十一年未就會高祖殂高閭卒景明中崇為太樂令上所調金石及書卒子恤翻上時掌翻至是世宗始命八座已下議之魏人聞蔡道恭卒冬十一月戊午魏詔營繕國學據目錄是年置四門小學袁翻曰太和二十年敕立四門博士於四門置學按自周以上學惟以二或尚東或尚西或貴在國或貴在郊爰暨周室學蓋有六師氏居內大學在國四小在郊大戴保傅篇云帝入東學尚親而貴仁帝入南學尚齒而貴信帝入西學尚賢而貴德帝入北學尚貴而尊爵帝入太學承師而問道周之五學於此彌彰學業大盛燕齊趙魏之間教授者不可勝數燕因肩翻勝音升弟子著錄多者千餘人少者猶數百少詩沼翻州舉茂異郡貢孝廉每年逾衆魏人聞蔡道恭卒甲子除以金贖罪之科聽贖事見上元年魏人聞蔡道恭卒十二月丙子魏詔殿中郎陳郡袁翻等議立律令彭城王勰等監之勰音協監工銜翻魏人聞蔡道恭卒己亥魏主幸伊闕自南北分治人主出行所至通鑑皆曰如自此以後率書幸未曉義例所由變蓋一時失於刊正也魏人聞蔡道恭卒上雅好儒術好呼到翻以東晉宋齊雖開置國學不及十年輒廢之其存亦文具而已無講授之實晉元帝建武元年戴邈請建太學王敦蘇峻之難學校廢矣成帝咸康三年復立而儒術終不振穆帝永和八年殷浩以軍興罷太學生宋文帝元嘉十五年徵雷次宗開館教授而儒玄文史四學並立齊高帝建元四年置國子學生二百人隆昌建武之間已倚席而不講矣張政烺標點王崇武聶崇岐覆校
