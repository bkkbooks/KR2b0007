body:
  text: 資治通鑑卷第一百四十三端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註齊紀九夏東昏侯下永元二年庚辰五夏春正月元會帝食後方出朝賀裁竟即還殿西序寢孔安國曰東西廂謂之序朝直遙翻下同百僚陪位皆僵仆飢甚僵居良翻比起就會比及也禮記檀弓孟獻子比御而不入陸德明經典釋文曰比必利翻下比及同以此知比及之比皆音必利翻比近之比毗至翻兩音故自不同也夏乙巳魏大赦改元景明夏豫州刺史裴叔業聞帝數誅大臣數所角翻下數遣同心不自安登壽陽城北望肥水謂部下曰卿等欲富貴乎我能辦之及除南兗州事見上卷上年樂音洛會陳顯達反亦見上卷上年將即亮翻實持兩端顯達敗而還還從宣翻又如字朝廷疑叔業有異志叔業亦遣使參察建康消息使疏吏翻衆論益疑之叔業兄子植颺粲皆為直閤在殿中懼棄母奔壽陽說叔業以朝廷必相掩襲宜早為計颺余章翻說輸芮翻下等說同徐世檦等以叔業在邊檦與標同力未能制白帝遣叔業宗人中書舍人長穆宣旨許停本任宗人同宗之人也而植等說之不已叔業遣親人馬文範至襄陽親人所親信者曰天下大勢可知恐無復自存之理復扶又翻下可復復奔同不若回面向北不失作河南公言若降魏不失爵賞也㣥小用事豈能及遠計慮回惑自無所成唯應送家還都以安慰之蕭衍密呼諸弟而令裴叔業送家還都此亦華言耳當勒馬步二萬直出橫江以斷其後自壽陽南至歷陽出橫江斷丁管翻一舉可定若欲北向彼必遣人相代以河北一州相處處昌呂翻河南公寧可復得邪如此則南歸之望絕矣裴叔業之問蕭衍之報雖二人者所志有大小而齊之邊鎮皆有異心矣帝誰與立哉沈持林翻沈疑沈吟疑慮也乃遣其子芬之入建康為質質音致亦遣信詣魏豫州刺史薛真度魏豫州治懸瓠城領汝南新蔡弋陽等郡不讀曰否真度勸其早降降戶江翻下同曰若事迫而來則功微賞薄矣數遣密信往來相應和和戶臥翻建康人傳叔業叛者不已芬之懼復奔壽陽叔業遂遣芬之及兄女壻杜陵韋伯昕奉表降魏昕許斤翻丁未魏遣驃騎大將軍彭城王勰車騎將軍王肅帥步騎十萬赴之驃匹妙翻騎奇寄翻勰音協帥讀曰率以叔業為使持節都督豫雍等五州諸軍事征南將軍豫州刺史封蘭陵郡公使疏吏翻雍於用翻庚午下詔討叔業二月丙戌以衞尉蕭懿為豫州刺史戊戌魏以彭城王勰為司徒領揚州刺史鎮壽陽壽陽自東漢以來為揚州治所宋始為豫州治所今復其舊勰音協又遣奚康生將羽林一千馳赴之大眼難當之孫也楊難當氐王也宋元嘉中據仇池眼生將字皆即亮翻魏兵未渡淮己亥裴叔業病卒僚佐多欲推司馬李元護監州一二日謀不定卒子恤翻監工銜翻前建安戍主安定席法友等北史曰魏正光中㣥蠻出山居邊城建安者八九千戶邊城郡治期思則建安戍亦當相近隋改期思縣為殷城縣取縣東古殷城為名我宋建隆元年改殷城為商城避宣祖諱也後省為鎮入光州固始縣恐有異志共推裴植監州裴叔業本河東人席法友安定人不同州部蓋並僑居襄陽遂為鄉曲教命處分皆出於植處昌呂翻分扶問翻奚康生至植乃開門納魏兵城庫管籥悉付康生康生集城內耆舊宣詔撫賚之魏以植為兗州刺史李元護為齊州刺史席法友為豫州刺史軍主京兆王世弼為南徐州刺史夏巴西民雍道晞聚衆萬餘逼郡城巴西郡治閬中縣今之閬州即其地也雍於用翻三月劉季連遣中兵參軍李奉伯帥衆五千救之帥讀曰率與郡兵合擊道晞斬之奉伯欲進討郡東餘賊涪令李膺止之曰卒惰將驕乘勝履險非完策也完全也言非全勝之策涪音浮將即亮翻下同更思後計少詩沼翻奉伯不從悉衆入山大敗而還還從宣翻又如字夏乙卯遣平西將軍崔慧景將水軍討壽陽帝屏除出琅邪城送之蕭子顯曰琅邪太守本治江乘蒲州上之金城永明徙治白下屏必鄙翻召慧景單騎進圍內圍內即屏除長圍之內也騎奇寄翻裁交數言拜辭而去慧景既得出甚喜豫州刺史蕭懿將步軍三萬屯小峴峴戶典翻交州刺史李叔獻屯合肥武帝永明三年李叔獻自交州入朝至今猶帶交州刺史蓋以其阻險不庭逼以兵威而後至廢棄不用也杜佑通典曰死虎地名在壽州壽春縣東四十餘里以此證之足知宋明帝泰始三年劉勔破劉順於宛唐宛唐即死虎字之誤也上時掌翻以逼壽陽軍于硤石勔壽陽士民多謀應齊者魏奚康生防禦內外閉城一月援軍乃至丙申彭城王勰王肅擊松伯之等大破之進攻合肥生擒叔獻統軍宇文福言於勰曰建安淮南重鎮彼此要衝魏兵南來齊兵北向建安皆為要衝之地故曰彼此則義陽可圖不得則壽陽難保魏得建安則西南可圖義陽齊司州治義陽若增建安之兵北斷魏援東臨壽陽則壽陽難保使福攻建安建安戍主胡景略面縛出降降戶江翻夏己亥魏皇弟恌卒恌他彫翻夏崔慧景之發建康也其子覺為直閤將軍密與之約約為變也覺走從之慧景過廣陵數十里召會諸軍主曰吾荷三帝厚恩三帝高帝武帝明帝也荷下可翻下人荷同明帝遺詔慧景與劉悛蕭惠休同任心膂朝廷壞亂危而不扶責在今日欲與諸君共建大功以安社稷何如衆皆響應於是還軍向廣陵司馬崔恭祖守廣陵城崔恭祖為慧景平西司馬帝聞變壬子假右衞將軍左興盛節都督建康水陸諸軍以討之慧景停廣陵二日即收衆濟江初南徐兗二州刺史江夏王寶玄娶徐孝嗣女為孝嗣誅誅事見上卷上年寶玄恨望慧景遣使奉寶玄為主寶玄斬其使因發將吏守城使疏吏翻將即亮翻下同帝遣馬軍主戚平外監黃林夫助鎮京口戚姓也姓譜衞大夫食邑於戚因以為姓漢有戚夫人又有臨轅侯戚鰓助鎮者助寶玄守寶玄密與相應殺司馬孔矜典籤呂承緒及平林夫開門納慧景使長史沈佚之諮議柳憕分部軍衆憕署陵翻寶玄乘八掆輿掆古郎翻又居浪翻掆舉也八掆輿蓋八人舉之即今之平肩輿輿不帷不蓋蕭子顯曰輿車形如軺車下施八掆人舉之字林曰捎掆舁也手執絳麾隨慧景向建康臺遣驍騎將軍張佛護直閤將軍徐元稱等六將據竹里為數城以拒之驍堅堯翻騎奇寄翻寶玄遣信謂佛護曰身自還朝君何意苦相斷遏朝直遙翻斷音短下所斷同佛護對曰小人荷國重恩使於此創立小戍殿下還朝但自直過豈敢斷遏遂射慧景軍射而亦翻因合戰崔覺崔恭祖將前鋒皆荒傖善戰又輕行不同林食傖助庚翻同林即亠㸑字取亂翻以數舫緣江載酒食為軍糧舫甫妄翻下同每見臺軍城中煙火起輒盡力攻之臺軍不復得食復扶又翻下乃復帝復同以此飢困元稱等議欲降降戶江翻下同佛護不可恭祖等進攻城拔之斬佛護徐元稱降餘四軍主皆死乙卯遣中領軍王瑩都督衆軍據湖頭築壘上帶蔣山西巖實甲數萬瑩誕之從曾孫也王誕見寵信於司馬元顯及宋武帝從才用翻查鉏加翻硎戶經翻竹塘人萬副兒萬副兒善射獵能捕虜來投慧景說輸芮翻今平路皆為臺軍所斷不可議進唯宜從蔣山龍尾上出其不意耳築道陂陀以上蔣山若龍尾之垂地因曰龍尾上時掌翻分遣千餘人魚貫緣山自西巖夜下鼓叫臨城中城中即湖頭所築壘中也鼓叫者既擊鼓又叫呼也柳元景曰鼓繁氣易衰叫數力易竭鼓叫即鼓譟也即時奔散帝又遣右衞將軍左興盛帥臺內三萬人拒慧景於北籬門帥讀曰率下同考異曰紀云王瑩屯北籬門傳云左興盛今從傳興盛望風退走甲子慧景入樂游苑樂游苑在玄武湖南樂音洛乃復出掖音亦宮門皆閉慧景引衆圍之於是東府石頭白下新亭諸城皆潰左興盛走不得入宮逃淮渚荻舫中淮渚秦淮渚也宮中遣兵出盪不克盪度朗翻又他浪翻慧景燒蘭臺府署為戰場蘭臺御史臺也章十二行本御作衞乙十一行本同孔本同尉蕭暢屯南掖門處分城內處昌呂翻分扶問翻隨方應拒衆心稍安慧景稱宣德太后令廢帝為吳王文惠太子王氏鬱林之立尊為皇太后海陵之廢出居鄱陽王故第號宣德宮稱宣德皇太后陳顯達之反也帝復召諸王章十二行本王下有侯字乙十一行本同孔本同入宮巴陵王昭胄懲永泰之難明帝永泰元年王敬則反帝召諸王入宮欲殺之而中止事見一百四十一卷陳顯達反帝復召之故昭胄懼禍而逃難乃旦翻逃於江西江西橫江以西之地宋白曰永新縣本漢廬陵縣地吳寶鼎中立永新縣屬安成郡子良之子也竟陵王子良武帝次子昭胄兄弟出赴之慧景意更向昭胄寶玄明帝之子昭胄武帝之孫武帝高帝之大宗故慧景意向之竹里之捷崔覺與崔恭祖爭功慧景不能決恭祖勸慧景以火箭燒北掖樓慧景以大事垂定後若更造費用功多不從言費功力為多也兼解佛理好呼到翻義亦理也佛理諸有皆空之說解曉也音戶買翻頓法輪寺對客高談客謂何點時豫州刺史蕭懿將兵在小峴懿將兵討壽陽屯小峴將即亮翻峴所典翻懿方食投箸而起使疏吏翻箸除據翻帥軍主胡松李居士等數千人帥讀曰率自採石濟江頓越城舉火城中鼓叫稱慶城中臺城中也以援兵至而喜章十二行本正作臺城中乙十一行本同孔本同張校同令不得渡斷音短西岸兵謂蕭懿兵入援自江西來也慧景以城旦夕降外救自然應散不從降戶江翻至是恭祖請擊懿軍又不許獨遣崔覺將精手數千人渡南岸精手軍中事藝高強者南岸秦淮南岸也數合昧旦天微明之時覺大敗赴淮死者二千餘人覺單馬退開桁阻淮開朱雀桁以斷懿兵阻秦淮水為固覺逼奪之恭祖積忿恨其夜與慧景驍將劉靈運詣城降崔覺以是日敗恭祖等以其夜降伎渠綺翻驍堅堯翻夏四月癸酉慧景將腹心數人潛去欲北渡江城北諸軍不知猶為拒戰為于偽翻為慧景戰也城中出盪殺數百人懿軍渡北岸秦淮北岸即臺城慧景圍城凡十二日而敗從者於道稍散單騎至蟹浦從才用翻蟹戶買翻為漁人所斬考異曰齊本紀四月丁未以張沖為南兗州刺史崔慧景於廣陵起兵襲京師壬子左興盛督衆軍寶玄以京口納慧景乙卯王瑩屯北籬門壬戌慧景至瑩等敗甲子慧景入京師蕭懿入援癸酉慧景棄衆走死慧景傳四月至廣陵回軍十二日攻陷竹里按長曆是歲三月辛丑朔四月庚午朔丁未三月七日壬子十二日乙卯十五日壬戌二十二日甲子二十四日四月皆無也蓋四月當作三月至癸酉乃四月四日耳南史云時江夏王寶玄鎮京口聞慧景北行遣左右余文興說之曰江劉徐沈君之所見今擁強兵北取廣陵收吳楚勁卒身舉州以相應取大功如反掌耳慧景常不自安聞言響應于時廬陵王長史蕭寅司馬崔恭祖守廣陵城慧景以寶玄事告恭祖恭祖口雖相和心實不同俄而慧景至恭祖閉門不敢出慧景密遣軍主劉靈運間行突入慧景俄亦至遂據其城子覺至仍使領兵襲京口寶玄本謂大軍併來及見人少極失所望拒覺擊走之恭祖及覺精兵八千濟江恭祖心本不同及至蒜山欲斬覺以軍降京口事既不果而止覺等軍器精嚴柳憕沈佚等謂寶玄曰崔護軍威名既重乃誠可見既已脣齒忽中道立異彼以樂歸之衆亂江而濟誰能拒之於是登北固樓並千蠟燭為烽火舉以應覺慧景停二日便率大衆一時俱濟趣京口寶玄仍以覺為前鋒恭祖次之慧景領大都督為衆軍節度又云時柳憕別推寶玄崔恭祖為寶玄羽翼不復承奉慧景慧景嫌之巴陵王昭胄先逃人間出投慧景意更向之故猶豫未知所立此聲頗泄憕恭祖始貳於慧景又云慧景單馬至蟹浦投漁人太叔榮之榮之故為慧景門人時為蟹浦戍斬慧景送都按恭祖始若閉城拒慧景慧景襲得其城而據之豈肯更授以兵柄又慧景若不立寶玄柳憕豈能別推又榮之既云漁人又云為戍自相違錯今並從齊書擔送建康鰌即由翻鰌魚今江淮間湖蕩河港皆有之春二月時人取食之其味甘美至三月後人不甚食謂之楊花鰌鰌籃所以盛鰌者恭祖繫尚方少時殺之少時言不多時也捕獲伏誅寶玄初至建康軍於東城東城即東府城往投寶玄而集於東城也收得朝野投寶玄及慧景人名朝直遙翻帝令燒之曰江夏尚爾豈可復罪餘人昏暴之君豈無一言之幾乎理東昏侯此語是也復扶又翻帝召入後堂以步障裹之令左右數十人鳴鼓角馳繞其外晉志曰鼓按周禮以鼖鼓鼓軍事角說者云蚩尤氏帥魑魅與黃帝戰于涿鹿黃帝乃始吹角為龍鳴以禦之其後魏武北征烏丸越沙漠而士卒思歸於是減為中鳴尤更悲矣汝近圍我亦如此耳初慧景欲交處士何點處昌呂翻點不顧及圍建康逼召點點往赴其軍何點門世信佛齊朝累徵不就從弟遁以東籬門園居之故為慧景逼召往赴其軍不及軍事慧景敗帝欲殺點蕭暢謂茹法珍曰茹音如點若不誘賊共講未易可量言何點若不與慧景講義則慧景日以攻城為事安危未可量也誘音酉易以豉翻量音良乃應得封帝乃止點胤之兄也何胤隱於會稽若邪山夏蕭懿既去小峴王肅亦還洛陽荒人往來者妄云肅復謀歸國復扶又翻下當復同五月乙巳詔以肅為都督豫徐司三州諸軍事豫州刺史西豐公夏己酉江夏王寶玄伏誅夏戶雅翻夏壬子大赦夏六月丙子魏彭城王勰進位大司馬領司徒王肅加開府儀同三司賞取壽陽之功也夏太陽蠻田育丘等二萬八千戶附於魏太陽當作大陽夏乙丑曲赦建康南徐兗二州崔慧景自南兗州還兵而南徐州之人從之進圍建康而建康之人又多從之既大赦而誅縱失實故又曲赦三處崔慧景既平先悉薦翻詔赦其黨而嬖倖用事不依詔書嬖卑義翻又博計翻無罪而家富者皆誣為賊黨殺而籍其貲實附賊而貧者皆不問或謂中書舍人王咺之云赦書無信人情大惡咺況晚翻惡如字不善也咺之曰正當復有赦耳由是再赦既而嬖倖誅縱亦如初是時帝所寵左右凡三十一人黃門十人直閤驍騎將軍徐世檦素為帝所委任凡有殺戮皆在其手及陳顯達事起加輔國將軍雖用護軍崔慧景為都督而兵權實在世檦世檦亦知帝昏縱密謂其黨茹法珍梅蟲兒曰何世天子無要人但儂貨主惡耳儂吳語我也茹音如以白帝帝稍惡其凶強惡烏路翻遣禁兵殺之世檦拒戰而死自是法珍蟲兒用事並為外監口稱詔敕王咺之專掌文翰與相脣齒帝呼所幸潘貴父寶慶及茹法珍為阿丈前漢書匈奴傳曰漢天子我丈人行也師古註丈人尊老之稱阿烏葛翻下同帝與法珍等俱詣寶慶家躬自汲水助廚人作膳寶慶恃勢作姦富人悉誣以罪田宅貲財莫不啟乞啟上而多所求乞禍及親鄰又慮後患盡殺其男口被皮義翻帝數往諸刀敕家游宴數所角翻時人謂捉刀應敕之徒為刀敕有吉凶輒往慶弔奄人王寶孫年十三四周禮註奄精氣閉藏者今謂之宦人陸德明曰奄於檢翻劉曰於驗翻徐曰於劍翻今讀作閹音於炎翻倀子倀褚羊翻狂也最有寵參預朝政雖王咺之梅蟲兒之徒亦下之朝直遙翻下遐嫁翻控制大臣移易詔敕乃至騎馬入殿詆訶天子公卿見之莫不懾息焉懾息猶言惕息也懾懼也屏氣而息詆丁禮翻訶虎何翻懾之涉翻夏吐谷渾王伏連籌事魏盡禮言盡藩臣之禮吐從暾入聲谷音浴置百官皆如天子之制稱制於其鄰國稱制於其鄰國示君臨之使疏吏翻夏冠軍將軍驃騎司馬陳伯之再引兵攻壽陽是年春伯之攻壽陽敗退今再攻之冠古玩翻驃匹妙翻騎奇寄翻援軍未至汝陰太守傅永將郡兵三千救壽陽勰音協將即亮翻下同伯之防淮口甚固此汝水入淮之口也水經汝水東至汝陰原鹿縣入于淮牽船上汝水南岸上時掌翻下同以水牛挽之水牛形力倍於黃牛挽音晚趣七喻翻下船即渡適上南岸齊兵亦至會夜永潛入城勰喜甚曰吾北望已久恐洛陽難可復見守壽陽而援兵不至其心孤危故云然復扶又翻勰令永引兵入城永曰永之此來欲以卻敵若如教旨諸王與任專方州者皆得下教於其屬故云教旨豈救援之意遂軍於城外秋八月乙酉勰部分將士與永幷勢擊伯之於肥口分扶問翻水經淮水東過壽春縣北肥水自黎漿北過壽春城東又北流而入于淮謂之肥口時陳伯之蓋軍於肥口以逼壽陽也大破之斬首九千俘獲一萬伯之脫身遁還淮南遂入于魏壽春縣自漢以來為淮南郡治所史言伯之既敗建康尋受兵遂不能爭壽陽魏遣鎮南將軍元英將兵救淮南未至伯之已敗魏主召勰還洛陽勰累表辭大司馬領司徒乞還中山中山定州也去年魏命勰刺定州今年春赴壽陽故乞還本任還從宣翻又如字下同以元英行揚州事尋以王肅為都督淮南諸軍事揚州刺史持節代之夏甲辰夜後宮火時帝出未還出市里遊走未還也外人不敢輒開謂不敢輒開後宮門死者相枕比必利翻枕之任翻燒三十章十二行本十作千乙十一行本同孔本同餘間時嬖倖之徒皆號為鬼有趙鬼者能讀西京賦言於帝曰柏梁既災建章是營後漢張衡作東京西京賦柏梁災營建章事見二十一卷漢武帝太初元年樂音洛以麝香塗壁麝狀如小麋其臍有香華山之陰多有之陸佃曰商洛山中多麝所遺糞常就一處雖遠逐食必還走其地不敢遺迹他所慮為人所獲人反以是從迹其所在必掩㣥而取之麝絕愛其香每為人所迫逐勢且急即自投高巖舉爪剔出其香就縶且死猶拱四足抱其臍麝神夜翻窮極綺麗役者自夜達曉猶不副速副稱也不能稱其欲速之意也後宮服御極選珍奇府庫舊物不復周用復扶又翻貴市民間金寶價皆數倍建康酒租皆折使輸金使以金折錢輸官折之舌翻鑿金為蓮華以帖地令潘行其上曰此步步生蓮華也華讀曰花又訂出雉頭鶴氅白鷺縗訂丁定翻平議也齊梁之時謂賦民為訂蓋取平議而賦之之義雉頭上毛細而色紅鮮如錦晉程據緝以為裘鶴氅鶴翎毛也白鷺縗鷺頭上毦也鶴氅鷺縗皆取其潔白詩疏曰鷺水鳥毛白而潔頂上有毛毿毿然此即縗也爾雅釋名曰鷺舂鉏郭璞曰白鷺也頭翅背上皆有長翰毛今江東人取以為睫攡名之曰白鷺縗陸機曰鷺頭上有毛十數枚長尺餘毿毿然與衆毛異氅音齒兩翻縗音倉回翻嬖倖因緣為姦利課一輸十又各就州縣求為人輸準取見直為人于偽翻下不為同見賢遍翻不為輸送守宰皆不敢言重更科斂重直用翻更居孟翻再也如此相仍前後不息百姓困盡號泣道路號戶高翻夏軍主吳子陽等出三關侵魏九月與魏東豫州刺史田益宗戰於長風城左傳定公四年蔡侯與吳子唐侯伐楚還塞大隧直轅冥戹所謂大隧即黃峴關直轅冥戹乃武陽平靖二關也黃峴今名九里關在義陽郡南百里武陽在今大寨嶺郡東南九十里平靖今名行者坡郡南七十五里魏太和十七年田益宗降魏十九年置東豫州於新息廣陵城以益宗為刺史長風城在陰山關南陰山關在弋陽縣界宋文帝元嘉二十五年以豫部蠻民立十八縣長風其一也屬西陽郡九域志舒州懷寧縣有長風鎮懷寧漢皖縣地晉安帝立晉熙郡仍立懷寧縣為郡治所蓋以懷寧蠻左名縣也考異曰此一事齊書紀傳皆無之魏帝紀九月乙丑東豫州刺史田益宗破寶卷將吳子陽鄧元起於長風梁書鄧元起傳云蠻帥田孔明附于魏自號郢州刺史寇掠三關規襲夏口元起帥銳卒攻之旬月之間頻陷六城斬獲萬計餘黨皆散走仍戍三關二書勝敗不同如此今從魏紀夏蕭懿之入援也蕭衍馳使所親虞安福說懿曰說輸芮翻下說帝同誅賊之後則有不賞之功當明君賢主尚或難立況於亂朝何以自免朝直遙翻下同若賊滅之後仍勒兵入宮行伊霍故事使之廢立也若不欲爾便放表還歷陽託以外拒為事則威振內外誰敢不從一朝放兵受其厚爵高而無民必生後悔謂官爵雖高而兵權去己必將束手就死章十二行本苦上有亦字乙十一行本同孔本同張校同勸之懿並不從崔慧景死懿為尚書令有弟九人敷衍暢融宏偉秀憺恢憺徒敢翻又徒濫翻懿以元勳居朝右暢為衞尉掌管籥時帝出入無度或勸懿因其出門謂出臺城門而遊走也懿不聽嬖臣茹法珍王咺之等憚懿威權說帝曰懿將行隆昌故事謂隆昌廢鬱林王也嬖卑義翻又博計翻茹音如咺況晚翻帝然之徐曜甫知之密具舟江渚勸懿西奔襄陽懿曰自古皆有死豈有叛走尚書令邪史言蕭懿忠於齊室冬十月己卯帝賜懿藥於省中懿且死曰家弟在雍深為朝廷憂之雍於用翻時以襄陽為雍州治所言衍必將舉兵也為于偽翻懿弟姪皆亡匿於里巷無人發之者史言人心皆為蕭懿兄弟覆護誅之夏丁亥魏以彭城王勰為司徒錄尚書事勰固辭不免勰雅好恬素不樂勢利高祖重其事幹好呼到翻樂音洛幹用也謂臨事有幹用也故委以權任雖有遺詔遺詔見上卷上年謂出當方面復入為司徒錄尚書也復扶又翻常悽然歎息為人美風儀端嚴若神折旋合度記曰周旋中規折旋中矩註云折旋曲行也觀者忘疲敦尚文史物務之暇披覽不輟小心謹慎初無過失雖閒居獨處處昌呂翻亦無惰容愛敬儒雅傾心禮待清正儉素門無私謁史言彭城王勰為魏宗室諸王之秀夏十一月己亥魏東荊州刺史桓暉入寇拔下笮戍下笮戍在沔北直襄陽東北笮側百翻又在各翻二千餘戶暉誕之子也宋明帝泰豫元年桓誕降魏夏初帝疑雍州刺史蕭衍有異志直後滎陽鄭植弟紹叔為衍寧蠻長史帝使植以候紹叔為名往刺衍使為刺客刺七亦翻密以白衍衍置酒紹叔家戲植曰朝廷遣卿見圖今日閒宴是可取良會也賓主大笑又令植歷觀城隍府庫士馬器械舟艦艦戶黯翻植退謂紹叔曰雍州實力未易圖也紹叔曰兄還具為天子言之易以豉翻為于偽翻若取雍州紹叔請以此衆一戰送植於南峴南峴蓋即馬鞍山道各盡力於所事恐不復相見故慟哭而別及懿死衍聞之夜召張弘策呂僧珍長史王茂別駕柳慶遠功曹吉士瞻等入宅定議宅謂州宅也考異曰南史云茂與梁武帝不睦帝諸腹心並勸除之而茂少有驍名帝又惜其用令腹心鄭紹叔往候之告以欲起義茂因擲枕起即袴褶隨紹叔入見武帝大喜下牀迎因結兄弟被推赤心按茂若與梁武不睦梁武何敢豫告以大事茂亦安能便響應今不取天生之子王天生事齊高帝攻袁粲見一百三十四卷宋順帝昇明元年元景之弟子也諸柳雍州豪望世不乏人乙巳衍集僚佐謂曰昏主暴虐惡踰於紂當與卿等共除之是日建牙集衆考異曰齊帝紀十二月梁王起義兵於襄陽誤也今從梁書高祖紀馬千餘匹船三千艘艘蘇遭翻出檀溪竹木裝艦葺之以茅事皆立辦諸將爭木虜呂僧珍出先所具者每船付二張爭者乃息木虜與櫓同僧珍具櫓事見上卷元年然僧珍所具者數百張櫓耳安能給三千艘邪每船付二張蓋給諸將所乘之船耳是時南康王寶融為荊州刺史西中郎長史蕭穎胄行府州事南康王以西中郎將鎮荊州穎胄為長史行事守式又翻將即亮翻就穎胄兵使襲襄陽衍知其謀遣參軍王天虎詣江陵徧與州府書州謂荊州官屬府謂西中郎府官屬山陽西上幷襲荊雍衍書宣布此聲也上時掌翻雍於用翻荊州素畏襄陽人襄陽被邊人皆習兵故荊州人畏之寧不闇同邪我合荊雍之兵鼓行而東雖韓白復生不能為建康計復扶又翻下衍復非復復不州復豈復佐復同況以昏主役刀敕之徒哉穎胄得書疑未能決山陽至巴陵晉武帝太康元年立巴陵縣屬長沙郡宋武帝元嘉十六年分立巴陵郡時屬郢州今岳州即其地王國官有師有友衍謂張弘策曰用兵之道攻心為上孫武子兵法有是言人皆有書今段乘驛甚急今段猶云今來一段事也行事兄弟謂穎胄穎達書中不言事但云天虎口具所以疑之蓋天虎之行衍亦未嘗以一語屬之據穎胄傳天虎穎胄親人故云然則人人生疑山陽惑於衆口判相嫌貳判決也嫌疑也貳持兩端也必入吾謀內是持兩空函定一州矣蕭衍舉事於襄陽智計橫出及遇侯景庸夫之不若豈耄邪抑天奪其鑒也山陽至江安晉武帝太康元年立江安縣屬南平郡水經註江安即公安晉平江南杜預罷華容置江安縣以吳之南郡為南平郡治焉不上自江安至江陵泝江北上而後至上時掌翻蕭子顯齊書曰至巴陵遲回十餘日不進計無所出夜呼西中郎城局參軍安定席闡文諮議參軍柳忱閉齋定議定議以決其所從忱氏壬翻蕭雍州畜養士馬非復一日畜許六翻江陵素畏襄陽人又衆寡不敵取之必不可制就能制之歲寒復不為朝廷所容四時運而成歲歲至極寒而終矣歲寒以喻世事終極處孔子曰歲寒然後知松柏之後彫亦此意與雍州舉事立天子以令諸侯則霸業成矣山陽持疑不進是不信我今斬送天虎則彼疑可釋至而圖之罔不濟矣忱曰朝廷狂悖日滋京師貴人莫不重足累息悖蒲內翻又蒲沒翻重直龍翻重足而立累息而不敢出氣懼之甚也今幸在遠得假日自安雍州之事且藉以相斃耳藉借也音慈夜翻獨不見蕭令君乎蕭懿為尚書令故呼為令君破崔氏十萬衆竟為㣥邪所陷禍酷相尋前事之不忘後事之師也史記鄭世家太史公之言蕭使君雄姿冠世冠古玩翻必非山陽所能敵若破山陽荊州復受失律之責進退無可宜深慮之蕭穎達亦勸穎冑從闡文等計詰旦詰去吉翻穎胄謂天虎曰卿與劉輔國相識今不得不借卿頭乃斬天虎送示山陽發民車牛聲云起步軍征襄陽山陽大喜甲寅山陽至江津單車白服從左右數十人詣穎胄穎胄使前汶陽太守劉孝慶等伏兵城內山陽入門入城門也副軍主李元履收餘衆請降降戶江翻柳忱世隆之子也柳世隆為高武佐命功臣以告忱忱曰易耳易以豉翻近詳求婚未之許也乃以女嫁詳子夔而告之謀詳從之乙卯以南康王寶融教纂嚴又教赦囚徒施惠澤頒賞格纂集也嚴裝也纂嚴纂集行裝也纂嚴一教赦囚徒施惠澤頒賞格又一教丙辰以蕭衍為使持節都督前鋒諸軍事使疏吏翻下同丁巳以蕭穎冑為都督行留諸軍事行謂東下之軍留謂留守之軍既舉大事虛心委己衆情歸之以別駕南陽宗夬夬古邁翻及同郡中兵參軍劉坦章十二行本坦作垣乙十一行本同孔本同諮議參軍樂藹為州人所推信軍府經略每事諮焉穎冑夬各獻私錢穀及換借富貲以助軍長沙寺僧素富鑄黃金為金龍數千兩埋土中長沙寺在江陵宋元嘉中臨川王義慶鎮江陵起寺為其本生父長沙王道憐資福因名長沙寺以資軍費穎冑遣使送劉山陽首於蕭衍且言年月未利當須明年二月進兵衍曰舉事之初所藉者一時驍銳之心驍堅堯翻事事相接猶恐疑怠若頓兵十旬必生悔吝兵以氣勢為用者也是以巧遲不若拙速糧用自竭若童子立異則大事不成況處分已定安可中息哉處昌呂翻分扶問翻昔武王伐紂行逆太歲豈復待年月乎戊午衍上表勸南康王寶融稱尊號不許十二月穎冑與夏侯詳移檄建康百官及州郡牧守數帝及梅蟲兒茹法珍罪惡數所具翻穎冑遣冠軍將軍天水楊公則向湘州使攻張寶積也冠古玩翻使助蕭衍攻張沖也夏戶雅翻乙亥荊州將佐復勸寶融稱尊號不許夏侯詳之子驍騎將軍亶為殿中主帥帥所類翻詳密召之亶自建康亡歸壬辰至江陵稱奉宣德皇太后令南康王宜纂承皇祚方俟清宮未即大號可封十郡為宣城王時以宣城南琅邪南東海東陽臨海新安尋陽南郡竟陵宜都十郡為宣城王國蓋以明帝自宣城王入纂大統故假宣德太后令以是肇封加黃鉞選百官西中郎府南康國如故須軍次近路須待也竟陵太守新野曹景宗遣親人說蕭衍說輸芮翻迎南康王都襄陽先正尊號然後進軍衍不從王茂私謂張弘策曰今以南康置人手中彼挾天子以令諸侯節下前進為人所使此豈他日之長計乎弘策以告衍衍曰若前塗大事不捷故自蘭艾同焚蘭有國香人貴之艾蕭艾也人賤之言若事不捷則無貴無賤同於死也則威振四海章十二行本海下有誰敢不從四字乙十一行本同孔本同張校同退齋校同豈碌碌受人處分者邪蕭衍此言已有代齊之心特權宜推奉南康以舉兵耳處昌呂翻分扶問翻初陳顯達崔慧景之亂人心不安或問時事於上庸太守杜陵韋叡杜陵自漢以來屬京兆晉僑立京兆太守及杜陵令寄治襄陽宋大明土斷割襄陽西界為實土陳雖舊將非命世才崔頗更事懦而不武將即亮翻更工衡翻其赤族宜矣定天下者殆必在吾州將乎州刺史當方面總兵權故曰州將將即亮翻及衍起兵叡帥郡兵二千倍道赴之帥讀曰率下同華山太守藍田康絢帥郡兵三千赴衍藍田縣漢屬京兆宋置僑縣屬華山郡康絢傳云其先本康居侍子待詔河西因留不去其後遂氏焉晉亂遷于藍田絢祖穆帥鄉族三千餘家入襄陽宋為置華山郡藍田縣於襄陽宋白曰宋大明元年立華山郡於大堤村後魏改華山郡為宜城郡唐為宜城縣屬襄州華戶化翻絢翾縣翻章十二行本喪下有聞衍起兵四字乙十一行本同孔本同張校同退齋校同帥鄉人子弟勝兵者悉往赴之馮道根旡旡貝人旡旡貝縣時屬廣平僑郡勝書烝翻惔忱之兄也惔徒甘翻帝聞劉山陽死發詔討荊雍戊寅以冠軍長史劉澮為雍州刺史欲以代蕭衍雍於用翻冠古玩翻澮古外翻使拒西師荊雍在西故謂之西師暨姓也音居乙翻又臮既二音將即亮翻驍堅堯翻騎奇寄翻疑沖不敢進停夏口浦聞西師將至乃相帥入郢城前竟陵太守房僧寄將還建康至郢帝敕僧寄留守魯山除驍騎將軍張沖與之結盟遣軍主孫樂祖將數千人助僧寄守魯山水經註江水東逕魯山南與沔水會山左即沔水口沔左有偃月城漢陽志大別山在沔陽縣東一名魯山蕭穎冑與武寧太守鄧元起書招之晉安帝隆安五年桓玄以沮漳降蠻立武寧郡屬荊州五代志竟陵郡樂鄉縣舊置武寧郡劉昫曰樂鄉漢鄀縣地我宋廢縣為樂鄉鎮入長林縣衆皆勸其還郢還郢州也朝廷暴虐誅戮宰輔㣥小用事衣冠道盡荊雍二州同舉大事何患不克且我老母在西若事不成正受戮昏朝幸免不孝之罪時鄧元起之母蓋在江陵元起南郡人也守武寧其母留鄉里朝直遙翻至江陵為西中郎中兵參軍是時西臺方遣元起向夏口觀者不以史文先後之次而害意可也治直之翻上時掌翻湘州行事張寶積發兵自守未知所附楊公則克巴陵進軍白沙水經註白沙戍在黃陵廟北黃陵廟舜二廟也羅含湘中記曰湘川白沙如霜雪赤崖若朝霞請降降戶江翻公則入長沙撫納之夏是歲北秦州刺史楊集始將衆萬餘自漢中北出規復舊地楊集始失國事見一百四十一卷明帝建武四年將即亮翻下同辯皮莧翻遺集始書開以利害集始遂復將其部曲千餘人降魏遺于季翻復扶又翻魏人還其爵位使歸守武興集始降齊魏人削其所授爵位而所領北秦州刺史則齊所授也今降魏魏人還其元授爵位也聶崇岐標點王崇武覆校
