body:
  text: 資治通鑑卷第二百七十六端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千六百戶食實封一千戶臣司馬光奉敕編集後學天台音註後唐紀五明宗聖德和武欽孝皇帝中之上天成二年天成二年丁亥九二七天成二年秋七月以歸德節度使王晏球為北面副招討使烏震既死以王晏球代之按薛史是年七月甲辰詔曰本朝親王遙領方鎮遂有副大使知節度事傳代已深相沿未改其西川東川今後落副大使只云節度使尋諸鎮皆正授節度使天成二年丙寅升夔州為寧江軍以西方鄴為節度使賞破高季興軍復夔忠萬之功也蜀以夔州為鎮江軍今改為寧江軍天成二年癸巳章十二行本巳作酉乙十一行本同張校同云無註本亦誤巳以與高季興夔忠萬三州為豆盧革韋說之罪元年以三州與季興革說猶為相因以此罪之天成二年流段凝於遼州溫韜於德州劉訓於濮州自唐末以來流貶者皆不至其地遼德濮皆唐境也此三人皆使至流所天成二年任圜請致仕居磁州磁牆之翻許之天成二年八月己卯朔日有食之天成二年冊禮使至長沙楚王殷始建國封楚王殷為國王見上卷是年六月置百官皆如天子或微更其名示不敢擬天朝也更工行翻知制誥曰知辭制樞密院曰左右機要司㣥下稱之曰殿下令曰教以姚彥章為左丞相許德勳為右丞相李鐸為司徒崔穎為司空拓跋恆為僕射張彥瑤張迎判機要司馬殷所恃以為國者高郁也建國置官郁不與焉何也豈殷諸子已有忌郁之心歟惟朗桂節度使先除後請命朗武平軍桂靜江軍時皆屬楚避殷父諱改焉天成二年九月帝謂安重誨曰從榮左右有矯宣朕旨令勿接儒生恐弱人志氣者朕以從榮年少臨大藩是年三月從榮鎮鄴都事見上卷少詩照翻今奸人所言乃如此欲斬之重誨請嚴戒而已安重誨非儒也故寬言者之罪獨不思矯宣上旨國有常刑邪天成二年北都留守李彥超請復姓符從之彥超李存審子存審本姓符天成二年丙寅以樞密使孔循兼東都留守帝欲東巡使孔循留守洛陽莊宗同光三年復以洛陽為東都天成二年壬申契丹來請脩好好呼到翻遣使報之天成二年冬十月乙酉帝發洛陽將如汴州丁亥至滎陽九域志滎陽縣在鄭州西六十里東至大梁一百四十里民間訛言帝欲自擊吳又云欲制置東方諸侯宣武節度使檢校侍中朱守殷疑懼判官高密孫晟勸守殷反高密漢古縣隋亂廢唐武德三年置於義城堡六年移就故夷安城即高密古縣也屬密州九域志在州東北一百二十里考異曰江南錄作孫忌今從王溥周世宗實錄晟承正翻帝遣宣徽使范延光往諭之延光曰不早擊之則汴城堅矣願得五百騎與俱帝從之延光暮發未明行二百里抵大梁城下與汴人戰汴人大驚戊子帝至京水京水在滎陽之東索水之西自梁以來有侍衞親軍侍衞馬軍侍衞步軍或謂安重誨曰失職在外之人乘賊未破或能為患不如除之重誨以為然奏遣使賜任圜死任圜罷相見上卷是年六月任圜義士安肯為逆公濫刑如此何以贊國使者至磁州圜聚其族酣飲然後死神情不撓撓奴教翻天成二年己丑帝至大梁四面進攻吏民縋城出降者甚衆縋馳偽翻守殷知事不濟盡殺其族引頸命左右斬之乘城者望見乘輿乘承正翻相帥開門降帥讀曰率下同孫晟奔吳徐知誥客之為孫晟盡節於江南張本天成二年戊戌詔免三司逋負近二百萬緡近其靳翻天成二年辛丑吳大丞相都督中外諸軍事諸道都統鎮海寧國節度使兼中書令東海王徐溫卒初溫子行軍司馬忠義節度使同平章事知詢以其兄知誥非徐氏子徐溫養知誥為子見二百六十卷唐昭宗乾寧二年數所角翻溫曰汝曹皆不如也嚴可求及行軍副使徐玠屢勸溫以知詢代知誥徐知誥之於嚴可求結之以婚姻而可求之心不為之變徐溫之門忠於所事者嚴可求陳彥謙而已不忍也陳夫人曰知誥自我家貧賤時養之陳夫人徐溫之妻子畜知誥者也可求等言之不已溫欲帥諸藩鎮入朝勸吳王稱帝帥讀曰率將行有疾乃遣知詢奉表勸進因留代知誥執政知誥草表欲求洪州節度使俟旦上之上時兩翻是夕溫凶問至乃止史言徐知誥得吳國之政亦有數存乎其間篡吳之業自此成矣為知誥知詢不相容張本諡曰忠武天成二年山南西道節度使張筠久疾將佐請見不許副使符彥琳等疑其已死恐左右有奸謀請權交符印筠怒收彥琳及判官都指揮使下獄誣以謀反下遐嫁翻詔取彥琳等詣闕按之無狀釋之觀于可洪張筠之事帝之廟號曰明亦有以也莊宗同光三年復以長安為西都天成二年癸卯以保義節度使石敬瑭為宣武節度使朱守殷反死以石敬瑭代之天成二年十一月庚戌吳王即皇帝位追尊孝武王曰武皇帝景王曰景皇帝宣王曰宣皇帝孝武王忠武王行密也景王威王渥也宣王者隆演也天成二年安重誨議伐吳安重誨欲乘徐溫之死而伐之且問其舉大號之罪根本不固而伐人之國莊宗覆車可鑒也故不許天成二年甲子吳大赦改元乾貞丙子吳主尊太王氏曰皇太后以徐知詢為諸道副都統鎮海寧國節度使兼侍中若使之嗣徐溫之官職者吳國中外大權實皆歸於徐知誥天成二年十二月戊寅朔孟知祥發民丁二十萬脩成都城天成二年吳主立兄廬江公濛為常山王弟鄱陽公澈為平原王澈敕列翻兄子南昌公珙為建安王珙居勇翻吳主稱帝封其兄弟及其兄子皆自公陞王天成二年初晉陽相者周玄豹相息亮翻嘗言帝貴不可言帝即位欲召詣闕趙鳳曰玄豹言陛下當為天子今已驗矣無所復詢復扶又翻若置之京師則輕躁狂險之人必輻輳其門爭問吉凶自古術士妄言致人族滅者多矣非所以靖國家也史言趙鳳有識厚賜金帛而已天成二年中書舍人馬縞縞工老翻請用漢光武故事七廟之外別立親廟見四十一卷漢光武建武三年稱皇不稱帝孝德皇見五十卷漢安帝建光元年孝仁皇見五十六卷靈帝建寧元年㣥臣乃引德明玄元興聖皇帝例皆立廟京師唐尊皋陶為德明皇帝老子為玄元皇帝涼武昭王為興聖皇帝例時詣翻自高祖考妣以下皆追諡曰皇帝皇后墓曰陵五代會要帝追尊高祖聿為孝恭皇帝廟號惠祖陵曰順陵妣崔氏曰昭皇后曾祖教曰孝質皇帝廟號毅祖陵曰衍陵妣張氏曰順皇后祖琰曰孝靖皇帝廟號烈祖陵曰奕陵妣何氏曰穆皇后父霓曰孝成皇帝廟號德祖陵曰慶陵歐史曰高祖妣劉氏曾祖諱敖父孝成妣劉氏諡懿皇后四陵皆在應州金城縣按帝之先本夷狄既無姓氏其名必當時有司所製也天成二年漢主如康州九域志廣州南至康州一百九十里天成二年是歲蔚代緣邊粟斗不過十錢蔚紆勿翻三年三年春正月丁巳吳主立子璉為江都王璘為江夏王璆為宜春王宣帝子廬陵公玢為南陽王璉力展翻璘離珍翻璆音求玢悲巾翻吳主諡兄隆演曰宣皇帝三年昭義節度使毛璋所為驕僭時服赭袍赭袍天子所服赭音者左右有諫者剖其心而視之帝聞之徵為右金吾衞上將軍毛璋在邠州以驕僭徵及在潞州復然謂之不軌可也然一詔徵之則束手入衞蓋其人冥頑驕虐本無他心不知僭擬之為非然亦明宗能容之耳三年契丹陷平州元年冬盧文進來奔唐得平州至是復為契丹所陷三年二月丁丑朔日有食之三年帝將如鄴都時扈駕諸軍家屬甫遷大梁又聞將如鄴都皆不悅詾詾有流言說讀曰悅詾許拱翻帝聞之不果行三年吳自莊宗滅梁以來使者往來不絕庚辰吳使者至安重誨以為楊溥敢與朝廷抗禮並立為帝是抗禮也覘丑廉翻又丑豔翻拒而不受自是遂與吳絕三年張筠至長安去年徙張筠留守西都上意也以為左衞上將軍三年壬辰寧江節度使西方鄴攻拔歸州未幾荊南復取之歸州高季興巡屬也九域志夔州東至歸州三百三十里幾居豈翻復扶又翻下宜復同三年樞密使同平章事孔循性狡佞安重誨親信之帝欲為皇子娶重誨女為于偽翻循謂重誨曰公職居近密不宜復與皇子為婚重誨辭之久之或謂重誨曰循善離間人間古莧翻不可置之密地循知之陰遣人結王德求納其女德請娶循女為從厚婦帝許之王德有寵於帝言無不行後進拜淑乙未以循同平章事充忠武節度使兼東都留守解其近密之職重誨性強愎愎蒲逼翻秦州節度使華溫琪入朝請留闕下帝嘉之當時諸帥皆樂在方鎮得自恣獨華溫琪入朝請留故嘉之華戶化翻月別賜錢穀俸給之外別賜錢穀帝謂重誨曰溫琪舊人宜擇一重鎮處之華溫琪仕梁已為節鎮故云然處昌呂翻他日帝屢言之重誨慍曰臣累奏無闕惟樞密使可代耳帝曰亦可重誨無以對華溫琪之才誠不足以當重鎮安重誨以君臣相得之雅詳明敷奏明宗宜無不從今則上下之言交不能暢其意相厲而已斯不學至此也數月不出重誨惡成德節度使同平章事王建立奏建立與王都交結有異志惡烏路翻初帝為代州刺史王建立已為虞候將後從鎮真定帝自鄴為亂兵所逼舉兵南向建立殺真定監軍帝家屬得全由是愛之及帝即位擢為真定帥安重誨亦帝潛躍之時所親信者也即位自中門使擢樞密使重誨之所以惡建立權寵之間耳又是時王都在中山有異志數以書通建立約為兄弟故重誨言之建立亦奏重誨專權求入朝面言其狀帝召之既至言重誨與宣徽使判三司張延朗結婚相表裏弄威福三月辛亥帝見重誨氣色甚怒謂曰今與卿一鎮自休息以王建立代卿張延朗亦除外官重誨曰臣披荊棘事陛下數十年值陛下龍飛承乏機密承乏者承人之乏也言適時乏人故己得任機密今一旦棄之外鎮臣願聞其罪帝不懌而起此段自孔循以下言重誨與孔循相傾自華溫琪以下言其君臣嫌隙之所自來蓋重誨挾依乘之舊戀權而不肯退明宗積受浸潤之譖欲遠之而不能至於決裂則不可救矣語牛倨翻弘昭曰陛下平日待重誨如左右手柰何以小忿棄之願垂三思朱弘昭今日之言知重誨之眷未衰也鳳翔之奏知重誨之權已去也小人之智隨時而反覆可畏也哉明日建立辭歸鎮帝曰卿比奏欲入分朕憂比毗至翻近也今復去何之復扶又翻下不復同會門下侍郎兼刑部尚書同平章事鄭王玉請致仕己未以王玉為左僕射致仕癸亥以建立為右僕射兼中書侍郎同平章事判三司三年孟知祥屢與董璋爭鹽利蜀中井鹽東西川巡屬之內皆有之各欲障固以專其利故爭按唐盛時邛嘉眉有井十三劍南西川院領之梓遂綿合昌渝瀘資榮陵簡有井四百六十劍南東川院領之東川鹽利多於西川矣知祥患之乃於漢州置三場重征之漢州東南與東川接界故列置三場以征鹽商商旅不復之東川之往也三年楚王殷如岳州遣六軍使袁詮詮丑緣翻副使王環監軍馬希瞻將水軍擊荊南高季興以水軍逆戰至劉郎洑江陵府石首縣沙步有劉郎浦蜀先主納吳女處也洑房六翻洄流曰洑艦戶黯翻艘疏留翻港古項翻詰旦兩軍合戰希瞻出戰艦橫擊之季興大敗俘斬以千數進逼江陵季興請和歸史光憲于楚高季興執史光憲見上卷上年還從宣翻又如字楚王殷讓環不遂取荊南環曰江陵在中朝及吳蜀之間中朝謂唐也既在中原且天朝也四面受敵謂之四戰之地宋時趙韓王勸太祖緩取太原意亦如此環每戰身先士卒先悉薦翻與衆同甘苦常置鍼藥於座右戰罷索傷者於帳前自傅治之鍼諸深翻索山客翻治直之翻士卒隸環麾下者相賀曰吾屬得死所矣故所向有功史言為將得士卒之死力者勝三年楚大舉水軍擊漢圍封州宋白曰封州即漢蒼梧郡之廣信縣也梁置梁信郡隋置封州在豐水之陽遇大有龜為卜策為筮以四十九策信手分開視其奇耦三變而成爻十有八變而成卦改元大有命左右街使蘇章將神弩三千戰艦百艘救封州漢都番禺倣唐上京置左右街使九域志廣州西至封州六百一十里沈鐵緪於水沈持林翻緪居登翻兩岸作巨輪挽緪築長堤以隱之伏壯士於堤中章以輕舟逆戰陽不利楚人逐之入堤中挽輪舉緪楚艦不能進退以強弩夾水射之射而亦翻楚兵大敗解圍遁去漢主以章為封州團練使三年夏四月以鄴都留守從榮為河東節度使北都留守以客省使太原馮贇為副留守贇於倫翻夾馬指揮使新平楊思權為步軍都指揮使以佐之戊寅以宣武節度使石敬瑭為鄴都留守天雄節度使加同平章事以樞密使范延光為成德節度使丙戌以樞密使安重誨兼河南尹以河南尹從厚為宣武節度使仍判六軍諸衞事從厚本以河南尹判六軍諸衞事今易鎮汴州而判六軍諸衞事如故三年吳右雄武軍使苗璘靜江統軍王彥章將水軍萬人攻楚岳州至君山岳州治巴陵洞庭湖在巴陵西君山在洞庭湖中方六十里德勳曰吳人掩吾不備見大軍必懼而走乃潛軍角子湖使王環夜帥戰艦三百絕章十二行本絕上有屯陽林浦四字乙十一行本同退齋校同張校同云無註本亦無吳歸路帥讀曰率遲明吳人進軍荊江口遲直二翻荊江口洞庭湖與大江會處將會荊南兵攻岳州丁亥至道人磯德勳命戰棹都虞候詹信以輕舟三百出吳軍後德勳以大軍當其前夾擊之吳軍大敗虜璘及彥章以歸三年初義武節度使兼中書令王都鎮易定十餘年梁均王龍德元年王都得定州至是九年租賦皆贍本軍及安重誨用事稍以法制裁之帝亦以都篡父位惡之王都囚其父處直而篡其位見二百七十一卷後梁均王龍德元年惡烏路翻數所角翻朝廷多屯兵於幽易間瓦橋盧蘆大將往來都陰為之備浸成猜阻都恐朝廷移之他鎮腹心和昭訓勸都為自全之計都乃求婚於盧龍節度使趙德鈞又知成德節度使王建立與安重誨有隙遣使結為兄弟陰與之謀復河北故事欲復如唐河北諸鎮世襲不輸朝廷貢賦不受朝廷徵發都又以蠟書遺青徐潞益梓五帥離間之是時青帥霍彥威徐帥房知溫潞帥毛璋益帥孟知祥梓帥董璋皆倔強難制者也遺唯季翻下金遺同間古莧翻說式芮翻晏球不從乃以金遺晏球帳下使圖之不克遺于季翻癸巳晏球以都反狀聞詔宣徽使張延朗與北面諸將議討之北面諸將謂招討王晏球及所部戍幽易間諸將及幽州帥趙德鈞也三年戊戌吳徙常山王濛為臨川王三年庚子詔削奪王都官爵壬寅以王晏球為北面招討使權知定州行州事以橫海節度使安審通為副招討使以鄭州防禦使張虔釗為都監監古銜翻發諸道兵會討定州是日晏球攻定州拔其北關城權知定州行州事者以未得定州城使王晏球權知行州事於城外以招撫定州之民蓋此命未頒晏球之兵已至定州城下矣禿餒即圍莊宗者虜酋之桀也酋慈秋翻禿餒以萬騎突入定州晏球退保曲陽曲陽漢之上曲陽縣隋改為恆陽唐元和十五年更名曲陽避穆宗名也屬定州九域志縣在州西六十里晏球與戰於嘉山下大破之禿餒以二千騎奔還定州晏球追至城門因進攻之得其西關城定州城堅不可攻晏球增脩西關城以為行府置招討使行府及定州行州於西關城三州定祁易也王晏球之攻定州以持久弊之此其先定之計也三年辛酉以天雄節度副使趙敬怡為樞密使三年王晏球聞契丹發兵救定州將大軍趣望都趣七喻翻遣張延朗分兵退保新樂九域志望都縣在定州東北六十里新樂縣在州西南五十里之往也同光初建北都於鎮州以鎮州為真定府尋廢北都而真定府不廢九域志自新樂縣西南至真定七十里契丹已自他道入定州與王都夜襲新樂破之殺建豐乙丑王晏球張延朗會於行唐九域志行唐縣在真定府北五十五里丙寅至曲陽自行唐西北至曲陽三十許里悉其衆與契丹五千騎合萬餘人邀晏球等於曲陽丁卯戰于城南晏球集諸將校令之曰王都輕而驕將即亮翻校戶教翻令魯定翻輕牽正翻可一戰擒也今日諸君報國之時也悉去弓矢去羌呂翻以短兵擊之回顧者斬於是騎兵先進奮檛揮劍直衝其陣大破之僵尸蔽野用短兵則將士齊致死直衝其陣則敵不及拒北人所恃者弓矢既入其陣皆不得用而檛劍所及不死則傷是以甚敗檛則瓜翻僵居良翻陳讀曰陣過音戈餘衆北走都與禿餒得數騎僅免盧龍節度使趙德鈞邀擊契丹北走者殆無孑遺孑吉列翻單也言無單孑得遺也三年吳遣使求和於楚請苗璘王彥章楚王殷歸之使許德勳餞之德勳謂二人曰楚國雖小舊臣宿將猶在願吳朝勿以措懷朝直遙翻必俟衆駒爭皁棧皁才早翻棧士限翻皁馬櫪也棧以竹木藉之然後可圖也時殷多內寵嫡庶無別諸子驕奢故德勳語及之別彼列翻其後馬氏諸子爭國南唐乘而取之卒如許德勳之言然德勳相楚知其將亂不以告戒其主而以語鄰國之人非忠也左傳鄭子太叔謂晉張趯有智然猶在君子之後者正此類也三年六月辛巳高季興復請稱藩于吳吳徐溫議不受高季興稱臣見上卷上年五月帝詔楚王殷討之殷遣許德勳將兵攻荊南以其子希範為監軍次沙頭次沙頭則已逼江陵矣請與希範挑戰決勝副指揮使廖匡齊出與之鬬拉殺之從子才用翻造七到翻挑徒了翻廖力救翻拉盧合翻季興懼明日請和德勳還匡齊贛人也還從宣翻又如字贛縣屬虔州贛音紺三年王晏球知定州有備未易急攻易以豉翻朱弘昭張虔釗宣言大將畏怯有詔促令攻城晏球不得已乙未攻之殺傷將士三千人張虔釗不知鑒定州之事其後急攻鳳翔以致敗國身為亡虜其誤明宗之社稷多矣三年先是詔發西川兵戍夔州備高季興也先昔薦翻頃之知祥奏夔忠萬三州已平請召戍兵還還從宣翻又如字以省饋運孟知祥恐戍兵為唐所留坐自削弱故請召還知祥陰使人誘之誘音酉重威帥其衆鼓譟逃歸帝命按其罪知祥請而免之史言唐之威令不行於蜀中三年陝州行軍司馬王宗壽請葬故蜀主王衍王衍死於長安見二百七十四卷元年陝失冉翻七月章十二行本月下有乙巳二字乙十一行本同張校同云無註本亦無贈衍順正公以諸侯禮葬之王宗壽許州民家子也王建以其同姓錄之為子事王衍數直諫衍不聽以至亡國衍死宗壽東遷至澠池聞莊宗遇弒逃入熊耳山至是復出詣京師求衍宗族葬之帝嘉其忠以為保義行軍司馬得衍等十八喪葬之長安南三趙村三年北面招討使安審通卒招討之下當有副字三年東都民有犯私麴者留守孔循族之或請聽民造麴而於秋稅畝收五錢己未敕從之按唐初無榷酒之法德宗建中三年初榷天下酒悉令官釀斛收直三千米雖賤不得減二千委州縣綜領醨薄私釀罪有差京師特免榷元和六年京兆府奏榷酒錢除出正酒戶外一切隨兩稅青苗據貫均率會昌六年敕揚州八道置榷麴幷置官店沽酒代百姓納榷酒錢幷充資助軍用有人私沽酒及置私麴者罪止一身至是以孔循過行酷法敕應三京鄴都諸道州府鄉村人戶於夏秋田苗上每畝納麴錢五文足陌一任百姓造麴醞酒供家其錢隨夏秋徵納並不折色其京都及諸道縣鎮坊界及關城草市內應逐年賣官麴酒戶便許自造麴醞酒貨賣應諸處麴務仰十分減八分價錢出賣不得更請官本踏造麴音曲三年壬戌契丹復遣其酋長惕隱將七千騎救定州復扶又翻王晏球逆戰於唐河北惕他力翻水經註滱水出代郡靈丘縣高氏山東南過中山上曲陽縣又東過唐縣謂之唐河大破之甲子追至易州時久雨水漲契丹為唐所俘斬及陷溺死者不可勝數勝音升三年戊辰以威武節度使王延鈞為閩王三年契丹北走道路泥濘濘乃定翻人馬飢疲入幽州境八月壬章十二行本壬作甲乙十一行本同張校同云無註本亦誤壬戌趙德鈞遣牙將武從諫將精騎邀擊之分兵扼險要生擒惕隱等數百人餘衆散投村落村民以白梃擊之梃徒頂翻杖也其得脫歸國者不過數十人自是契丹沮氣不敢輕犯塞沮在呂翻三年初莊宗徇地河北獲小兒畜之宮中及長畜吁玉翻長知兩翻賜姓名李繼陶帝即位縱遣之王都得之使衣黃袍坐堞間歐史曰帝即位安重誨出繼陶以乞段徊徊亦惡而逐之都使人求得之衣於既翻堞達協翻此莊宗皇帝子也已即帝位公受先朝厚恩曾不念乎王晏球即杜晏球莊宗之滅梁也晏球以軍降莊宗賜以姓名而用之王都欲以此動晏球公作此小數竟何益吾今教公二策不悉衆決戰則束手出降耳自餘無以求生也三年王建立以目不知書請罷判三司不許三年乙未吳大赦三年吳越王鏐欲立中子傳瓘為嗣中讀曰仲謂諸子曰各言汝功吾擇多者而立之言欲擇功多者立以為嗣璹殊六翻璙力弔翻又力小翻璟於景翻又古永翻乃奏請以兩鎮授傳瓘閏月丁未詔以傳瓘為鎮海鎮東節度使三年戊申趙德鈞獻契丹俘惕隱等諸將皆請誅之帝曰此曹皆虜中之驍將殺之則虜絕望不若存之以紓邊患紓商居翻緩也乃赦惕隱等酋長五十人置之親衞後唐蓋倣盛唐之制朝會立仗有親勳翊三衞為契丹屢求惕隱等張本三年契丹遣梅老季素等入貢三年初盧文進來降事見上卷元年守平州遣親將以三百騎監之監工銜翻希崇本書生為幽州牙將沒於契丹歐史曰劉守光使張希崇戍平州契丹陷平州得之契丹將稍親信之易以豉翻將即亮翻因與其部曲謀南歸部曲泣曰歸固寢食所不忘也然虜衆我寡柰何希崇曰吾誘其將殺之誘音酉兵必潰去此去虜帳千餘里比其知而徵兵比必利翻及也吾屬去遠矣衆曰善乃先為穽實以石灰穽才性翻石灰鑿取山石煅之為灰今在處有之明日召虜將飲醉幷從者殺之投諸穽中從才用翻其營在城北亟發兵攻之此所發者漢兵也希崇悉舉其所部二萬餘口來奔詔以為汝州刺史歐史曰以為汝州防禦使三年吳王太后殂吳主之母王氏也三年九月辛巳荊南敗楚兵于白田執楚岳州刺史李廷規歸于吳九域志岳州巴陵縣有白田鎮時荊南稱藩于吳敗補賣翻三年乙未敕以溫韜發諸陵段凝反覆令所在賜死去年溫韜流德州段凝流遼州三年己亥以武寧節度使房知溫兼荊南行營招討使知荊南行府事分遣中使發諸道兵赴襄陽以討高季興前年劉訓討荊南不克今復招討之三年辛丑徙慶州防禦使竇廷琬為金州刺史冬十月廷琬據慶州拒命三年丙午以橫海節度使李從敏兼北面行營副招討使代安審通也帝之從子也從子才用翻三年戊申詔靜難節度使李敬通章十二行本通作周乙十一行本同發兵討竇廷琬慶州靜難軍巡屬也故使討之難乃旦翻三年王都據定州守備固伺察嚴伺相吏翻諸將屢有謀翻城應官軍者皆不果帝遣使者促王晏球攻城晏球與使者聯騎巡城騎奇計反城高峻如此借使主人聽外兵登城亦非梯衝所及梯雲梯衝衝車無損於賊如此何為不若食三州之租愛民養兵以俟之彼必內潰帝從之用兵之術攻城最難然攻城有二術城有外援則須悉力急攻以求必克城無外援則持久以弊之在我者兵力不損而坐收全勝古之善用兵者皆知此術也三年十一月有司請為哀帝立廟詔立廟於曹州為于偽翻梁太祖開平二年弒唐哀帝於曹州事見二百六十六卷三年平盧節度使晉忠武公霍彥威卒三年忠州刺史王雅取歸州忠州時屬夔州寧江軍西方鄴所部也歸州時屬荊南軍高季興所部也三年庚寅皇子從厚納孔循女為循因之得之大梁時孔循兼留守東都帝在大梁得之者得往也有職守者不得亶離職守今循因嘉禮得至行在所得之本或作得至按唐都洛陽以大梁為東都孔循職守在東都而曰得之大梁者蓋安重誨怒孔循自樞密出為忠武帥兼東都留守時帝在大梁循未得領留守之職今因嫁女得至東都耳以下文促令歸鎮明之可以知矣乞留安重誨具奏其事力排之禮畢嘉禮畢也復歸忠武軍所鎮三年甲午以中書侍郎同平章事王建立同平章事充平盧節度使三年丙申上問趙鳳帝王賜人鐵券何也對曰與之立誓令其子孫長享爵祿耳上曰先朝受此賜者止三人薛居正五代史莊宗同光二年正月甲寅帝御中興殿面賜郭崇韜鐵券二月丁亥賜李嗣源鐵券二年賜朱友謙姓名李繼麟入屬籍賜鐵券二人族滅事見二百七十四卷元年朝直遙翻帝為莊宗所猜忌又困於讒事始於二百七十三卷同光三年取鄴都細鎧之時訖於二百七十四卷元年出鄴都在魏縣之日趙鳳曰帝王心存大信固不必刻之金石也三年十二月甲辰李敬周奏拔慶州族竇廷琬三年荊南節度使高季興寢疾命其子行軍司馬忠義節度使同平章事從誨權知軍府事丙辰季興卒考異曰唐明宗實錄天成三年十一月壬午房知溫奏高季興卒烈祖實錄亦云乾貞二年十一月季興卒蓋傳聞之誤按陶穀季興神道碑及勃海行年記皆云十二月十五日卒今從之高從誨字遵聖季興長子也三年史館脩撰張昭遠上言臣竊見先朝時皇弟皇子皆喜俳優喜許計翻入則飾姬妾出則誇僕馬習尚如此何道能賢言何道而能為賢人也令皇子屈身師事之講禮義之經論安危之理古者人君即位則建太子所以明嫡庶之分塞禍亂之源今卜嗣建儲臣未敢輕議至於恩澤賜與之間昏姻省侍之際嫡庶長幼宜有所分示以等威絕其僥冀分扶問翻塞昔則翻省昔井翻長知兩翻僥堅堯翻帝賞歎其言而不能用自梁開平以來至于天成惟張昭遠一疏能以所學而論時事耳不有儒者其能國乎惜其言之不用也史言賞歎而不能用嗚呼帝之賞歎者亦由時人言張昭遠儒學而賞歎之耳豈知所言深有益於人之國哉三年閩王延鈞度民二萬為僧由是閩中多僧三年河東節度使北都留守從榮年少驕很少詩照翻很戶懇翻不親政務帝遣左右素與從榮善者往與之處使從容諷導之處昌呂翻從千容翻其人私謂從榮曰河南相公恭謹好善親禮端士有老成之風從厚時為河南尹故稱之為河南相公端士正士也好音呼到翻長知兩翻言從榮之年長於從厚也宜自策勵勿令聲問出河南之下從榮不悅退告步軍都指揮使楊思權曰朝廷之人皆推從厚而短我我其廢乎思權曰相公手握強兵且有思權在何憂因勸從榮多募部曲繕甲兵陰為自固之備觀從榮之問與楊思權之對其所以求自安者乃所以自危也君每譽弟而抑其兄譽音余我輩豈不能助之邪其人懼以告副留守馮贇贇密奏之帝遣左右諷導從榮是其密受上指最為親切從榮之不悅楊思權之脅持凡此情狀其人當密以奏聞安得以告馮贇而待贇奏之也此其間必有曲折以從榮故亦弗之罪也帝不罪楊思權其後遂為從厚之禍然二子嫌隙已搆雖罪思權亦末如之何矣四年四年春正月馮贇入為宣徽使謂執政曰從榮剛僻而輕易易以豉翻宜選重德輔之四年王都禿餒欲突圍走不得出二月癸丑定州都指揮使馬讓能開門納官軍都舉族自焚擒禿餒及契丹二千人王晏球自去年四月攻王都至是克之辛亥以王晏球為天平節度使與趙德鈞並加兼侍中賞王晏球以平王都之功也賞趙德鈞以擒惕隱之功也斬於市四年樞密使趙敬怡卒四年甲子帝發大梁四年丁卯門下侍郎同平章事崔協卒於須水唐初置須水縣貞觀中併入鄭州管城縣九域志鄭州滎陽縣有須水鎮卒音子恤翻四年庚午帝至洛陽二年冬十月帝如大梁至是還洛陽四年王晏球在定州城下日以私財饗士自始攻至克城未嘗戮一卒三月辛巳晏球入朝帝美其功晏球謝久煩饋運而已史言王晏球有功而不伐四年皇子右衞大將軍從璨性剛安重誨用事從璨不為之屈為于偽翻帝東巡即謂如大梁時也從璨與客宴於會節園會節園在洛陽城中張全義鎮洛歲久私第在會節坊室宇園池為一時巨麗輸之官以為會節園戲登御榻凡御園設御榻遊幸之所御也丙戌賜從璨死四年橫山蠻寇邵州邵州漢為昭陵縣屬長沙國東漢屬長沙零陵二郡又改昭陵為昭陽縣吳立邵陵郡晉武帝改昭陽曰邵陽縣隋廢郡唐置南梁州改為邵州時屬楚境四年楚王殷命其子武安節度副使判長沙府希聲知政事總錄內外諸軍事自是國政先歷希聲乃聞於殷希聲字若訥殷次子也為殺高郁張本四年夏四月庚子朔禁鐵錫錢時湖南專用錫錢銅錢一直錫錢百流入中國法不能禁馬殷得湖南鑄錫為錢本用之境內其後遂流入中國五代會要同光二年三月敕泉布之弊雜以鉛錫江湖之外盜鑄尤多市肆之間公行無畏因是綱商挾帶舟載往來換易好錢藏貯富室實為蠧弊須有條流宜令京城及諸道於市行使錢內點檢雜惡鉛錫並宜禁斷沿江州縣每有舟船到岸嚴加覺察若私載往來並宜收納天成元年十二月敕行使銅錢之內如聞挾帶鐵錢若不嚴加科流轉恐私加鑄造應中外所使銅錢內鐵鑞錢即宜毀棄不得輒更有行使如違其所使錢不計多少並納入官仍科深罪蓋鐵錫錢之禁舊矣今又申嚴之而不能禁也四年丙午楚六軍副使王環敗荊南兵于石首敗補賣翻四年初令緣邊置場市党項馬不令詣闕先是党項皆詣闕以貢馬為名國家約其直酬之加以館穀賜與歲費五十餘萬緡有司苦其耗蠹故止之五代會要曰自上御極以來党項之衆競赴闕下賣馬常賜食於禁廷醉則連袂歌其土風凡將到馬無駑良並云上進雖約給價直然館給賜賚耗蠹為多雖降敕止之竟不能行党底朗翻四年壬子以皇子從榮為河南尹判六軍諸衞事從厚為河東節度使北都留守兩易二子之任四年契丹寇雲州四年甲寅以端明殿學士兵部侍郎趙鳳為門下侍郎同平章事四年五月乙酉中書言太常改諡哀帝曰昭宣光烈孝皇帝廟號景宗既稱宗則應入太廟在別廟則不應稱宗哀帝廟在曹州去羌呂翻四年帝將祀南郊遣客省使李仁矩以詔諭兩川令西川獻錢一百萬緡東川五十萬緡皆辭以軍用不足西川獻五十萬緡東川獻十萬緡仁矩帝在藩鎮時客將也為安重誨所厚恃恩驕慢至梓州東川節度治梓州日中不往方擁妓酣飲妓渠綺翻璋怒從卒徒執兵入驛立仁矩於階下而詬之曰公但聞西川斬李客省詬古候翻又許侯翻李客省謂李嚴也斬李嚴見上卷二年謂我獨不能邪仁矩流涕拜請僅而得免既而厚賂仁矩以謝之欲以賂絕其口言璋不法未幾幾居啟翻帝復遣通事舍人李彥珣詣東川復扶又翻入境失小禮璋拘其從者從才用翻彥珣奔還還從宣翻又如字四年高季興之叛也見上卷二年不聽從誨既襲位謂僚佐曰唐近而吳遠章十二行本遠下有捨近臣遠四字乙十一行本同退齋校同張校同云無註本亦無非計也乃因楚王殷以謝罪於唐又遺山南東道節度使安元信書遺惟季翻求保奏復脩職貢丙申元信以從誨書聞帝許之四年契丹寇雲州一月之間再寇雲州者契丹主耶律德光漸西徙也四年六月戊申復以鄴都為魏州莊宗同光元年即位於魏州以魏州為興唐府建東京既遷洛同光三年復唐之舊以洛陽為東都改魏州之東京為鄴都今復以為魏州四年庚申高從誨自稱前荊南行軍司馬歸州刺史上表求內附秋七月甲申以從誨為荊南節度使兼侍中己丑罷荊南招討使討荊南事始上卷二年今以其內附罷兵四年八月吳武昌節度使兼侍中李簡以疾求還江都揚州治江都縣吳所都也癸丑卒于採石徐知詢簡壻也亶留簡親兵二千人于金陵徐知詢時代父溫鎮金陵武昌節度使治鄂州知詢怒曰劉崇俊兄之親三世為濠州吳初用劉金為濠州刺史金卒子仁規代之仁規卒子崇俊代之獨不得邪四年初楚王殷用都軍判官高郁為謀主馬殷初得潭州即用高郁為謀主如收茶征令民種桑以繒纊充賦之類莊宗入洛殷遣其子希範入貢見二百七十二卷莊宗同光元年曰比聞馬氏當為高郁所奪今有子如此郁安能得之此言所以間高郁也比毗至翻間古莧翻殷不聽乃遣使遺節度副使知政事希聲書遺惟季翻盛稱郁功名願為兄弟使者言於希聲曰高公常云馬氏政事皆出高郁此子孫之憂也希聲信之行軍司馬楊昭遂希聲之妻族也謀代郁任日譖之於希聲希聲屢言於殷稱郁奢僭且外交鄰藩請誅之殷曰成吾功業皆郁力也汝勿為此言希聲固請罷其兵柄乃左遷郁行軍司馬郁謂所親曰亟營西山吾將歸老西山即長沙西岸嶽麓諸山也能咋人矣猘征例翻犬強為猘咋鉏陌翻齧也希聲聞之益怒明日矯以殷命殺郁於府舍府舍荊南軍府署舍也誣郁謀叛幷誅其族黨至暮殷尚未知是日大霧殷謂左右曰吾昔從孫儒渡淮唐昭宗光啟三年馬殷從孫儒渡淮事見二百五十七卷多致茲異馬步院豈有冤死者乎時諸鎮皆有馬步司置獄院以鞫囚今大藩亦有兵馬司吏以郁死告殷撫膺大慟曰吾老耄政非己出使我勳舊橫罹冤酷橫戶孟翻吾亦何可久處此乎蓋是時馬殷尸居而已不復能制其子處昌呂翻四年九月上與馮道從容語及年穀屢登從千容翻屢龍遇翻四方無事道曰臣常記昔在先皇幕府謂為河東掌書記時也歷井陘之險自太原使中山經井陘之道陘音刑執轡甚謹幸而無失逮至平路放轡自逸俄至顛隕凡為天下者亦猶是也上深以為然上又問道今歲雖豐百姓贍足否道曰農家歲凶則死於流殍殍被表翻歲豐則傷於穀賤豐凶皆病者惟農家為然臣記進士聶夷中詩云二月賣新絲五月糶新穀醫得眼下瘡剜卻心頭肉語雖鄙俚曲盡田家之情狀謂絲穀未熟農家艱食先稱貸以自給至於賣絲糶穀僅足以償債耳聶尼輒翻糶他弔翻剜烏丸翻士農工商是謂四民唐避太宗諱率謂民為人上悅命左右錄其詩常諷誦之四年鄜州兵戍東川者歸本道鄜音夫董璋亶留其壯者選羸老歸之羸倫為翻仍收其甲兵四年癸巳西川右都押牙孟容弟為資州稅官坐自盜抵死律監臨自盜贓重者至死抵至也瑑柱兗翻為于偽翻孟知祥曰雖吾弟犯法亦不可貸況他人乎四年吳越王鏐居其國好自大朝廷使者曲意奉之則贈遺豐厚不然則禮遇疏薄好呼到翻遺惟季翻下同嘗遺安重誨書辭禮頗倨薛史曰錢鏐致書安重誨云吳越國王致書于某官執事不敍寒暄重誨怒其無禮考異曰吳越備史十國紀年皆云監門衞上將軍蓋借官耳今從實錄等諸書玫莫杯翻昭遇與玫有隙使還使疏吏翻還從宣翻又如字玫奏昭遇見鏐稱臣拜舞謂鏐為殿下及私以國事告鏐安重誨奏賜昭遇死癸巳制鏐以太師致仕自餘官爵皆削之凡吳越進奏官使者綱吏令所在繫治之治直之翻鏐令子傳瓘等上表訟冤皆不省省昔井翻四年初朔方節度使韓洙卒梁均王乾化四年韓洙嗣鎮朔方未幾定遠軍使李匡賓聚黨據保靜鎮作亂幾居豈翻保靜隋之弘靜縣也唐神龍元年改曰安靜至德元載改曰保靜縣屬靈州宋白曰保靜鎮在黃河北岸朔方不安冬十月丁酉韓澄遣使齎絹表乞朝廷命帥帥所類翻前磁州刺史康福善胡語上退朝多召入便殿訪以時事福以胡語對安重誨惡之惡其以胡語奏事在左右者莫之曉也惡烏路翻康福汝但妄奏事會當斬汝福懼求外補重誨以靈州深入胡境為帥者多遇害戊戌以福為朔方河西節度使唐之盛時河西節度使治涼州與朔方隴西並為緣邊大鎮肅代以後淪陷宣宗大中間收復然隔以吐蕃党項朝廷懸屬而已至于唐末以朔方兼節度河西然亦聲勢不接趙珣聚米圖經靈州西至涼州九百里涕泣辭之上命重誨為福更他鎮為于偽翻更工行翻重誨曰福自刺史無功建節尚復何求復扶又翻且成命已行難以復改上不得已謂福曰重誨不肯非朕意也福辭行上遣將軍牛知柔河中都指揮使衞審等將兵萬人衞送之審徐州人也與都同四年辛亥割閬果二州置保寧軍壬子以內客省使李仁矩為節度使欲以制兩川也為李仁矩敗沒張本按職官分紀五代有內客省使客省使副使各一官通鑑於天成二年三月書客省使李仁矩今書內客省使豈自客省使陞為內客省使邪先是西川常發芻糧饋峽路先悉薦翻孟知祥辭以本道兵自多難以奉他鎮峽路時別為寧江軍故云然屢督之甲寅知祥奏稱財力乏不奉詔四年吳諸道副都統鎮海寧國節度使兼侍中徐知詢自以握兵據上流金陵在廣陵上流數與知誥爭權內相猜忌數所角翻知誥患之內樞密使王令謀曰公輔政日久挾天子以令境內誰敢不從知詢年少恩信未洽於人無能為也少詩照翻知詢待諸弟薄諸弟皆怨之徐玠知知詢不可輔反持其短以附知誥徐玠本勸徐溫以知詢代知誥者也其事見本卷上年十月皆飾以龍鳳知詢不以為嫌乘用之錢鏐以此間徐知詢知詢不之覺其庸昧如此路振九國志以為錢弘佐所遺非也公誠能捐寶貨以結朝中勳舊使皆歸心於公則彼誰與處說式芮翻朝直遙翻處昌呂翻彼謂徐知誥也知詢從之使廷望如江都諭意諭音喻廷望與知誥親吏周宗善密輸款於知誥款誠也周廷望處人兄弟之間而反覆兩端固取死之道也知誥稱吳主之命不許周宗謂廷望曰人言侍中有不臣七事徐知詢之代父鎮金陵也加侍中故以稱之誘之入朝徐知誥之計也以告知詢十一月知詢入朝知誥留知詢為統軍領鎮海節度使遣右雄武都指揮使柯厚徵金陵兵還江都姓譜柯姓吳公子柯盧之後又拓跋興諸姓有柯拔氏改為柯氏史言徐知誥之篡事至此方成先王違世先王謂徐溫也初不臨喪可乎知誥曰爾挺劍待我挺待鼎翻拔也我何敢往爾為人臣畜乘輿服御物亦可乎畜敕六翻乘繩證翻謂知詢用錢鏐所遺龍鳳飾鞍勒器皿也天子服用之物謂之乘輿物知詢又以廷望所言詰知誥詰去吉翻知誥曰以爾所為告我者亦廷望也遂斬廷望四年壬辰吳主加尊號曰睿聖文明光孝皇帝大赦改元大和四年康福行至方渠羌胡出兵邀福福擊走之至青剛峽自方渠橐駝路出青岡峽過旱海至靈州趙珣聚米圖經曰環州洪德寨歸德青剛兩川歸德川在洪德東透入鹽州青剛川在洪德西北本靈州大路自此過美利寨入浦洛河至耀德清邊鎮入靈州自過美利寨後漸入平夏經旱海中難得水泉皆不覺唐兵至福遣衞審掩擊大破之殺獲殆盡由是威聲大振遂進至靈州自是朔方始受代四年十二月吳加徐知誥兼中書令領寧國節度使徐知誥奪知詢寧國節而自領之以金鍾酌酒賜之曰願弟壽千歲知詢疑有毒引他器均之巳心獻知誥曰願與兄各享五百歲跽其几翻長跽也知誥變色左右顧不肯受知詢捧酒不退左右莫知所為伶人申漸高徑前為詼諧語掠二酒合飲之不以禮取之為掠合音閤知誥密遣人以良藥解之已腦潰而卒考異曰鄭文寶南唐近事烈祖曲宴便殿引酖觥賜周本本疑而不飲佯醉別引一巵均酒之半跪捧而進曰陛下千萬歲陛下若不飲此非君臣同心同德之義也臣不敢奉詔上色變無言久之左右皆相顧流汗莫知所從伶倫申漸高有機智者竊諭其旨乃乘談諧盡併兩盞以飲之內杯於懷中亟趨而出上密使親信持藥詣私第解之已不及矣漸高腦潰而卒江表志烈祖曲宴引金鍾賜知詢酒曰願我弟百千長壽知詢疑懼引他器均之曰願與兄各享五百歲知誥不飲久之樂工申漸高乘詼諧併而飲之至家腦潰而卒二書皆出文寶而不同乃爾按知誥既即位欲除周本自應多方不須如此云酖知詢近是今從之四年奉國節度使知建州王延稟稱疾退居里第請以建州授其子繼雄庚子詔以繼雄為建州刺史時王延稟既與王延鈞弒其君延翰兵強權重建州又居福州上流勢陵延鈞故不復稟命於延鈞而專達洛陽四年安重誨既以李仁矩鎮閬州使與綿州刺史武虔裕皆將兵赴治赴治者赴治所也帝之故吏重誨之外兄也重誨使仁矩詗董璋反狀詗火迥翻又翾正翻仁矩增飾而奏之朝廷又使武信節度使夏魯奇治遂州城隍治直之翻繕甲兵益兵戍之璋大懼時道路傳言又將割綿龍為節鎮孟知祥亦懼分閬遂為節鎮欲以制東川也故董璋懼綿州逼近成都而龍州又鄧艾入蜀之道也武虔裕既刺綿州是亦有分鎮之漸矣重以傳聞故孟知祥亦懼未嘗通問至是璋遣使詣成都請為其子娶知祥女為于偽翻知祥許之謀併力以拒朝廷為兩川連兵攻陷遂閬張本鄧廣銘標點聶崇岐覆校
