body:
  text: 資治通鑑卷第三朝散大夫右諫議大夫權御史中丞充理檢使上護軍賜紫金魚袋臣奉敕編集後學天台音註周紀三慎靚王諱定顯王之子也此複諡也以諡法言之諡法敏以敬曰慎柔德安衆曰靖靚疾正翻元年元年衞更貶號曰君顯王二十三年衞已貶號曰侯介於秦魏之間國日以削弱因更貶其號曰君更居孟翻貶悲檢翻二年二年秦伐韓取鄢春秋晉敗楚師于鄢陵即此鄢也班志作傿陵屬潁川郡鄢音謁晚翻又於建翻師古音偃史記正義曰許州鄢陵縣西北十五里有鄢陵古城二年魏惠王薨子襄王立索隱曰系本曰襄王名嗣今按系本即世本司馬貞避唐諱改世為系考異曰史記魏世家云惠王三十六年卒子襄王立襄王十六年卒子哀王立哀王二十三年卒子昭王立六國表惠王元辛亥終丙戌襄王元丁亥終壬寅哀王元癸卯終乙丑按杜預春秋後序云太康初汲縣有發舊冢者大得古書其紀年篇起自夏殷周皆三代王事無諸國別也惟特記晉國起自殤叔次文侯昭侯以至曲沃莊伯皆用夏正編年相次晉國滅獨記魏事下至魏哀王之二十年蓋魏國之史記也哀王於史記襄王之子惠王之孫也古書紀年篇惠王三十六年改元從一年始至十六年而稱惠成王卒即惠王也疑史記誤分惠成之世以為後王年也哀王二十三年乃卒故特不稱諡謂之今王裴駰魏世家註引和嶠云紀年起自黃帝終於魏之今王今王者魏惠成王子按太史公書惠成王但言惠王惠王子曰襄王襄王子曰哀王惠王三十六年卒襄王立十六年卒幷惠襄為五十二年今按古文惠成王立三十六年改元稱一年改元後十七年卒太史公書為誤分惠成之世以為二王之年數也世本惠王生襄王而無哀王然則今王者魏襄王也彼既魏史所書魏事必得其真今從之語人曰望之不似人君就之而不見所畏焉入見賢遍翻語牛倨翻卒然問曰天下惡乎定卒七沒翻惡音烏何也吾對曰定于一孰能一之此一語魏襄王以問孟子孰能與之此語亦襄王問王知夫苗乎夫音扶七八月之間旱則苗槁矣孟子此言用周正也周七八月夏五六月也槁音考乾枯也夏戶雅翻乾音干沛然下雨則苗浡然興之矣油然雲盛貌沛然雨盛貌浡然興起貌沛普蓋翻浡音勃孰能禦之三年三年楚趙魏韓燕同伐秦攻函谷關燕因肩翻註已見上宋白曰函谷關在弘農地理志註云謂道形如函孫卿子所謂秦有松柏之塞是也秦人出兵逆之五國之師皆敗走三年宋初稱王四年四年秦敗韓師于脩魚斬首八萬級虜其將䱸申差于濁澤敗補邁翻索隱曰脩魚地名䱸申差二將名索山客翻將即亮翻䱸音瘦又疏鳩翻濁澤年表作觀澤括地志觀澤在魏州頓丘縣東十八里諸侯振恐四年齊大夫與蘇秦爭寵使人刺秦殺之刺七亦翻四年張儀說魏襄王曰梁地方不至千里卒不過三十萬地四平無名山大川之限卒戍楚韓齊趙之境戍舂遇翻字從人從戈人荷戈所以戍也梁地南接楚西接韓東接齊北接趙守亭障者不過章十二行本過作下乙十一行本同孔本同張校同十萬說文亭民所安定也道路所舍也障堡障也隔也塞也所以隔塞敵人也夫諸侯之約從盟於洹水之上結為兄弟以相堅也事見上卷顯王二十六年夫音扶從子容翻洹于元翻尚有爭錢財相殺傷而欲恃反覆蘇秦之餘謀其不可成亦明矣大王不事秦秦下兵攻河外據卷衍酸棗後漢志卷縣屬河南郡酸棗縣屬陳留郡水經註河水逕卷縣北又東至酸棗延津二邑皆河津之要也卷逵員翻衍以善翻取陽晉則趙不南趙不南則梁不北梁不北則從道絕從道絕則大王之國欲毋危不可得也從道謂約從之路也從子容翻且賜骸骨人臣委身以事君身非我之有矣故於其乞退也謂之乞骸骨骸戶皆翻倍蒲妹翻而因儀以請成于秦張儀歸復相秦儀罷秦相相魏見上卷顯王四十七年相息亮翻四年魯景公薨子平公旅立諡法由義而濟曰景布義行剛曰景五年五年巴蜀相攻擊巴春秋巴子之國蜀蠶叢魚鳧之後華陽國志曰昔蜀王封其弟於漢中號曰苴侯因命其邑曰葭萌苴侯與巴王為好後巴與蜀為讎蜀王怒伐苴侯苴侯奔巴巴求救於秦秦伐蜀蜀王敗死秦滅蜀因遂滅巴苴置巴蜀二郡史記正義曰巴子城在合州石鏡縣南五里故墊江縣也宋白曰巴子後理閬中揚雄蜀本紀曰蜀王本治廣都樊鄉徙居成都華戶化翻苴子余翻葭音家萌謨耕翻墊音疊閬音浪秦惠王欲伐蜀以為道險陿難至陿與狹同漢書趙充國傳註山陗而夾水曰陿猶豫未能決說文猶玃屬居山中聞人聲豫登木無人乃下世謂不決曰猶豫一說隴西謂犬子為猶犬導人行忽先忽後故曰猶豫又一說猶豫犬也犬為人行好先行卻住以俟其人百步之間如是者數四先者豫也遂曰猶豫猶夷周翻又余救翻玃厥縛翻為于偽翻好呼到翻史記重黎之後至周宣王時為程伯休父為司馬氏錯七各翻又七故翻重直龍翻父音甫不如伐韓王曰請聞其說儀曰親魏善楚下兵三川攻新城宜陽伊水洛水河水為三川秦後置三川郡漢改為河南郡班志新城縣屬河南郡括地志洛州伊闕縣本漢新城縣在州南七十里隋文帝改新城為伊闕取伊闕山為名周分為東西故曰二周昔夏禹貢金九牧鑄鼎象物桀有昏德鼎遷于商商紂暴虐鼎遷于周成王定鼎于郟鄏寶之以為三代共器夏戶雅翻郟音夾鄏音辱圖籍謂天下之圖籍周官職方氏所掌是也天下莫敢不聽此王業也臣聞爭名者於朝爭利者於市今三川周室天下之朝市也朝直遙翻周禮大宗伯註云朝猶朝也欲其來之早也人君昕旦親政貴早聲轉為朝猶朝陟遙翻而王不爭焉顧爭於戎翟去王業遠矣翟與狄同不然臣聞欲富國者務廣其地欲強兵者務富其民欲王者務博其德欲王于況翻又如字三資者備而王隨之矣今王地小民貧故臣願先從事於易易弋豉翻夫蜀西僻之國而戎翟之長也夫音扶長知丈翻有桀紂之亂以秦攻之譬如使豺狼逐㣥羊豺徂齋翻得其地足以廣國取其財足以富民繕兵不傷衆而彼已服焉彼謂蜀也利盡四章十二行本四作西乙十一行本同海而天下不以為貪是我一舉而名實附也而又有禁暴止亂之名今攻韓劫天子惡名也而未必利也又有不義之名而攻天下所不欲危矣臣請論其故周天下之宗室也周室為天下所宗故謂之宗室韓之與國也鄰國相親睦者謂之與國韓自知亡三川將二國幷力合謀以因乎齊趙而求解乎楚魏幷必正翻求解者先與之構怨隙而今求和解也以鼎與楚以地與魏王弗能止也此臣之所謂危也不如伐蜀完完全也言以兵伐蜀十全必取也錯七各翻又七故翻起兵伐蜀十月取之取言易也易弋豉翻更號為侯貶悲檢翻更工衡翻而使陳莊相蜀相息亮翻蜀既屬秦秦以益強富厚輕諸侯五年蘇秦既死三年蘇秦死於齊說式芮翻燕相子之與蘇代婚欲得燕權蘇代使於齊而還燕因肩翻相息亮翻使疏吏翻還從宣翻燕王噲問曰齊王其霸乎噲苦夬翻對曰不能王曰何故對曰不信其臣於是燕王專任子之鹿毛壽謂燕王曰劉伯莊曰鹿毛壽人姓名又曰潘壽春秋後語作唐毛壽徐廣曰一作厝毛如徐廣一作之說當作庴庴音秦昔翻清河有庴縣人之謂堯賢者以其能讓天下也今王以國讓子之是王與堯同名也燕王因屬國於子之屬之欲翻付也託也子之大重或曰禹薦益而以啟人為吏孟子曰禹薦益於天禹崩天下之人不之益而之啟曰吾君之子也索隱曰人猶臣也謂以啟臣為益吏索山客翻任音壬傳之於益啟與交黨攻益奪之天下謂禹名傳天下於益而實令啟自取之按或曰一段事與師春紀伊尹放太甲潛出自桐殺伊尹事頗相類古書雜記固多也是名屬子之而實太子用事也王因收印綬自三百石吏已上而效之子之後漢書輿服志曰三王俗化雕文詐偽漸生始有印綬以檢姦萌周禮掌節有璽節鄭氏註云今之印章也綬組綬古者佩玉以綬貫之漢承秦制乘輿璽綬諸王以下印以金銀銅為差綬以赤紫青黑黃為差印信也刻文合信也綬受也轉相授受也三百石吏銅印黑綬或黃綬王制諸侯大國之卿食祿以田計之為三十二夫之入戰國之卿食祿萬鍾其僭差不度甚矣漢制三公秩萬石至於斗食佐吏凡十六等三百石吏第十等奉月四十斛綬音受璽斯氏翻組祖五翻乘繩證翻奉與俸同音扶用翻而噲老不聽政顧為臣顧反也噲苦夬翻為後燕亂張本六年六年王崩子赧王延立赧王上劉伯莊曰赧慚之甚也輕微危弱寄住東西足為慚赧故號之曰赧諡法本無赧字也赧音奴版翻元年元年秦人侵義渠得二十五城義渠戎國名按上卷顯王四十二年秦縣義渠以其君為臣是已得義渠矣今又侵得二十五城何也蓋先此秦以義渠為縣君為臣雖臣屬於秦義渠之國未滅也秦稍蠶食侵其地今得二十五城義渠之國所餘無幾矣蓋秦兼幷諸侯不盡其國不止也左傳有鐘鼓曰伐無曰侵穀梁傳苞人民驅牛馬曰侵斬樹木壞宮室曰伐無幾居豈翻傳直戀翻壞音怪元年魏人叛秦秦人伐魏取曲沃而歸其人又敗韓於岸門續漢志潁川郡潁陰縣有岸亭註引徐廣云岸亭即岸門括地志岸門在今許州長社縣東北二十八里今名長武亭敗補邁翻質音致元年燕子之為王三年國內大亂將軍市被與太子平謀攻子之齊王令人謂太子曰令盧經翻寡人聞太子將飭君臣之義明父子之位寡人之國章十二行本國下有雖小二字乙十一行本同孔本同退齋校同唯太子所以令之飭整也修也治也治直之翻飭君臣之義言太子平將治子之僭王之罪也明父子之位言太子平當繼其父噲之位也令力政翻命令也號令也要一遙翻要結也使市被攻子之不克市被反攻太子搆難數月難乃旦翻死者數萬人百姓恫恐恫它紅翻痛也齊王令章子將五都之兵因北地之衆以伐燕將即亮翻又音如字領也邑有先王之廟曰都或曰都邑之大者北地齊之北境也蓋漢千乘清河勃海之地燕因肩翻下同乘繩證翻燕士卒不戰城門不閉齊人取子之醢之醢呼改翻肉醬也遂殺燕王噲噲苦夬翻齊王問孟子曰或謂寡人勿取燕或謂寡人取之以萬乘之國伐萬乘之國古者天子之地方千里出兵車萬乘七國兼幷以強大於時皆為萬乘之國乘繩證翻十日為旬五旬五十日不取必有天殃殃咎也禍也孟子對曰取之而燕民悅則取之古之人有行之者武王是也取之而燕民不悅則勿取古之人有行之者文王是也以萬乘之國伐萬乘之國簞食壺漿以迎王師簞竹器也圓曰簞方曰笥簞音丹食祥吏翻熟食也漿水也酢漿也笥相吏翻酢倉故翻避水火也如水益深如火益熱亦運而已矣運轉也言燕之民將轉而之他國也諸侯將謀救燕齊王謂孟子曰諸侯多謀伐寡人者何以待之對曰臣聞七十里為政於天下者湯是也未聞以千里畏人者也書曰徯我后后來其蘇書仲虺之誥之辭徯戶禮翻待也后君也王往而征之民以為將拯己於水火之中也拯上舉也援也救也助也音之凌翻簞食壺漿以迎王師若殺其父兄係累其子弟趙岐曰係累縛結也係戶計翻累力追翻遷其重器重器國之寶鎮天下固畏齊之強也今又倍地齊幷燕則地倍其舊燕因肩翻是動天下之兵也王速出令反其旄倪令力政翻趙岐曰旄老旄倪弱小陸德明曰倪謂翳倪小兒也記曲禮曰八十九十曰耄註云耄惛忘也旄讀曰耄倪五兮翻翳與繄同音煙兮翻止其重器謀於燕衆置君而後去之則猶可及止也齊王不聽已而燕人叛是時燕人雖未立太子平固已相帥叛齊矣吾甚慚於孟子陳賈曰王無患焉乃見孟子曰周公何人也曰古聖人也陳賈曰周公使管叔監商古殷商通稱商者以始封為國號殷者以都亳為國號按孟子陳賈只云監殷今通鑑云監商避宋廟諱也監古銜翻周公知其將畔而使之與畔與叛同與讀曰歟下同不知也陳賈曰然則聖人亦有過與曰周公弟也管叔兄也周公之過不亦宜乎且古之君子過則改之今之君子過則順之古之君子其過也如日月之食民皆見之及其更也更工衡翻更改民皆仰之今之君子豈徒順之又從為之辭元年是歲齊宣王薨子湣王地立湣讀曰閔二年二年秦右更疾伐趙右更秦爵第十四師古曰左右中更皆主領更卒而部其役使也更工衡翻虜其將莊豹莊姓有出於宋者左傳所謂戴武莊之族是也有出於楚者楚莊王之後莊蹻是也齊之莊暴楚之莊辛蒙之莊周與此莊豹其時適相先後莫能審其所自出二年秦王欲伐齊患齊楚之從親從子容翻乃使張儀至楚說楚王曰大王誠能聽臣閉關絕約於齊說式芮翻閉關者古之列國各置關尹敵國賓至關尹以告則行理以節逆之閉關則距絕其使不為通也使疏吏翻臣請獻商於之地六百里使秦女得為大王箕帚之妾於如字箕帚之妾猶言備灑掃也帚止酉翻篲也長為兄弟之國楚王說而許之說讀曰悅㣥臣皆賀陳軫獨弔陳姓出於舜周武王封舜後於陳子孫以國為氏寡人不興師而得六百里地何弔也對曰不然以臣觀之商於之地不可得而齊秦合齊秦合則患必至矣王曰有說乎對曰夫秦之所以重楚者以其有齊也夫音扶發語辭今閉關絕約於齊則楚孤秦奚貪夫孤國而與之商於之地六百里張儀至秦必負王是王北絕齊交西生患於秦也楚東北接齊西接秦為王計者不若陰合而陽絕於齊使人隨張儀苟與吾地絕齊未晚也王曰願陳子閉口毋復言以待寡人得地毋音無毋者禁止之辭復扶又翻再又也乃以相印授張儀相息亮翻厚賜之遂閉關絕約於齊使一將軍隨張儀至秦班固百官表將軍周末官秦漢因之張儀詳墮車詳讀曰佯詐也章乙十一行本正作佯不朝三月朝直遙翻楚王聞之曰儀以寡人絕齊未甚邪邪余遮翻邪疑辭也乃使勇士宋遺借宋之符北罵齊王既閉關絕約則齊楚之信使不通故使宋遺借宋符以至齊宋姓也周武王封微子於宋子孫以國為氏折節以事秦折而設翻齊秦之交合儀歸而詐疾待齊秦之交合乃朝見楚使者曰子何不受地從某至某廣袤六里朝直遙翻使疏吏翻東西曰廣南北曰袤廣古曠翻又讀如字袤音茂使者怒還報楚王還從宣翻又音如字楚王大怒欲發兵而攻秦陳軫曰軫可發口言乎攻之不如因賂之以一名都與之幷力章十二行本力作兵乙十一行本同孔本同而攻齊是我亡地於秦取償於齊也償辰羊翻報也今王已絕於齊而責欺於秦是吾合齊秦之交而來天下之兵也國必大傷矣楚王不聽使屈匄帥師伐秦屈姓也音九勿翻匄居大翻帥讀曰率秦亦發兵使庶長章擊之長知丈翻按史記樗里子傳庶長章姓魏三年三年春秦師及楚戰于丹陽索隱曰此丹陽在漢中劉昭曰南郡枝江縣有丹陽聚即秦破楚處李輿地紀勝曰丹陽在今歸州秭歸縣東八里屈沱楚王城是也余按楚遣屈匄伐秦秦發兵逆擊之枝江之丹陽則距郢逼近秭歸之丹陽則不當秦楚之路索隱因下文遂取漢中即謂丹陽在漢中皆非也此丹陽謂丹水之陽班志丹水出上洛冢嶺山東至析入鈞水其水蓋在弘農丹水析兩縣之間武關之外也秦楚交戰當在此水之陽楚師既敗秦師乘勝取上庸路西入以收漢中其勢易矣索山客翻與埴同屈九勿翻冢知隴翻易弋豉翻斬甲士八萬虜屈匄及列侯執珪七十餘人執珪楚爵也執珪而朝者也自沔陽成固至新城上庸時皆漢中郡之地釋名曰郡㣥也人所㣥聚也黃義仲十三州記曰郡之言君也改公侯之封而言君者至尊也今郡字君在其左邑在其右君為元首邑以載民故取名於君謂之郡復扶又翻戰於藍田班志藍田縣屬京兆秦孝公置史記正義曰藍田縣在雍州東南八十里從藍田關入藍田縣時楚襲秦深入韓魏聞楚之困南襲楚至鄧鄧春秋鄧國之地班志鄧縣屬南陽郡杜預曰潁川召陵縣西有鄧城括地志曰故鄧城在豫州郾陵縣東三十五里所謂在古召陵西十里者也召讀曰邵乃引兵歸割兩城以請平于秦三年燕人共立太子平是為昭王燕因肩翻昭王於破燕之後章十二行本後下有即位二字乙十一行本同孔本同張校同言燕國為齊所破己承其後也弔死問孤與百姓同甘苦卑身厚幣以招賢者謂郭隗曰齊因孤之國亂而襲破燕孤極知燕小力少臧文仲曰列國有凶稱孤禮也杜預曰列國諸侯無凶則稱寡人郭姓出於周之虢公世亦謂虢公為郭公隗五罪翻少始紹翻然誠得賢士與共國以雪先王之恥謂燕王噲破國之恥噲苦夬翻先生視可者得身事之郭隗曰古之人君有以千金使涓人求千里馬者春秋以來諸侯之國有涓人秦漢之間有中涓師古曰涓潔也言其在中主知潔清灑掃之事蓋王之親舊左右也應劭曰涓人如謁者涓古玄翻灑所賣翻掃所報翻又皆音如字買其首五百金而返君大怒涓人曰死馬且買之況生者乎馬今至矣不期年千里之馬至者三期讀曰朞今王必欲致士先從隗始況賢於隗者豈遠千里哉言燕王若加禮於郭隗則四方之賢士聞之將不以千里為遠而來於是士爭趣燕為于偽翻趣七喻翻樂毅自魏往劇辛自趙往劇竭戟翻劇姓辛名劇姓莫知其所自出班志北海郡有劇縣蓋其先以縣為姓也昭王以樂毅為亞卿任以國政為燕用樂毅破齊張本三年韓宣惠王薨子襄王倉立四年四年蜀相殺蜀侯相息亮翻蜀相蓋陳莊也四年秦惠王使人告楚懷王請以武關之外易黔中地武關左傳之少習地在漢弘農郡析縣西百七十里道通南陽晉太康地志曰武關當冠軍西括地志曰武關在商州上洛縣東武關之外蓋秦丹析商於之地黔辛琴少始照翻冠工玩翻於音如字不願易地願得張儀而獻黔中地張儀聞之請行王曰楚將甘心於子楚王以墮張儀之詐故欲甘心焉張儀曰秦強楚弱大王在楚不宜敢取臣且臣善其嬖臣靳尚嬖匹計翻又卑義翻靳居焮翻姓也靳尚得事幸姬鄭袖鄭以國為氏袖戰國策作褏古字也王無不聽者遂往楚王囚將殺之靳尚謂鄭袖曰秦王甚愛張儀將以上庸六縣及美女贖之上庸春秋庸國班志上庸縣屬漢中郡史記正義上庸縣今房州宋白曰今房州竹山縣古城即漢上庸縣秦女必貴而夫人斥矣於是鄭袖日夜泣於楚王曰臣各為其主耳為于偽翻今殺張儀秦必大怒妾請子母俱遷江南毋為秦所魚肉也王乃赦張儀而厚禮之張儀因說楚王曰夫為從者無以異於驅㣥羊而攻猛虎不格明矣說式芮翻夫音扶從子容翻格當也劉伯莊曰格各額翻其字宜從手余據字書格擊也鬬也從木亦通今王不事秦秦劫韓驅梁而攻楚則楚危矣秦西有巴蜀治船積粟浮岷江而下治直之翻江水出蜀郡湔氐道之岷山故謂之岷江釋名曰江共也小流入其中所公共也一日行五百餘里不至十日而拒章十二行本拒作距乙十一行本同扞關徐廣曰巴郡魚復縣有扞關史記正義曰在峽州巴山縣界扞寒旦翻境楚境也扞關楚之西境從境以東謂扞關以東也黔巨今翻班志巫縣屬南郡酈道元曰縣故楚之巫郡杜佑曰今歸州巴東縣是也秦舉甲出武關則北地絕北地楚北境之地陳蔡汝潁是也危難在三月之內難乃旦翻而楚待諸侯之救在半歲之外夫待弱國之救忘強秦之禍此臣所為大王患也夫音扶為于偽翻大王誠能聽臣臣章十二行本不重臣字乙十一行本同孔本同請令秦楚長為兄弟之國無相攻伐令力丁翻楚王已得張儀而重出黔中地重難也以地為重意難割棄之張儀遂之韓說韓王曰韓地險惡山居之如也自楚如韓也韓有宜陽成皋南盡魯陽皆山險之地說式芮翻非菽而麥菽式竹翻豆也國無二歲之食見卒不過二十萬見卒見在之兵見賢遍翻被皮義翻山東之士被甲蒙冑以會戰秦人捐甲徒裼以趨敵冑今謂之兜鍪捐與專翻棄也徒徒行也裼音錫袒也趨七喻翻鍪音牟右挾生虜夫戰孟賁烏獲之士以攻不服之弱國挾戶頰翻孟賁烏獲古之勇士賁音奔無異垂千鈞之重於鳥卵之上必無幸矣三十斤為鈞必無幸矣言無幸而獲全之理秦下甲據宜陽塞成皋下遐稼翻塞悉則翻則王之國分矣鴻臺之宮桑林之苑非王之有也為大王計莫如事秦以攻楚以轉禍而悅秦計無便於此者韓王許之張儀歸報秦王封以六邑號武信君復使東說齊王曰從人說大王者復扶又翻從人合從之人也從子容翻說式芮翻必曰齊蔽於三晉地廣民衆兵強士勇雖有百秦將無柰齊何大王賢其說而不計其實今秦楚嫁女娶婦為昆弟之國韓獻宜陽梁效河外河外秦蓋以河東為河外梁則以河西為河外張儀以秦言之也割河間以事秦朝直遙翻河間趙地漢文帝二年分為河間國應劭曰在兩河之間唐為瀛州大王不事秦秦驅韓梁攻齊之南地漢泰山城陽齊南境之地也渡清河指博關臨菑即墨非王之有也博關在濟州西界之博陵史記正義曰博關在博州趙兵從貝州渡清河指博關則漯河以南臨菑即墨危矣濟子禮翻漯託合翻雖欲事秦不可得也齊王許張儀張儀去西說趙王曰大王收率天下以擯秦秦兵不敢出函谷關十五年擯必刃翻事見上卷顯王三十六年大王之威行於山東敝邑恐懼春秋以來列國交聘行人率自稱其國曰敝邑力田積粟愁居懾處不敢動搖懾之涉翻怖也心伏也失常也失氣也處昌呂翻唯大王有意督過之也師古曰督過視責也索隱曰督者正其事而責之督過是深責其過也舉巴蜀事見慎靚王五年事見上二年元年服韓魏則包兩周矣班志白馬縣屬東郡水經註白馬津在白馬城之西北白馬城唐為滑州治所開山圖曰白馬津東可二十許里有白馬山山上常有白馬㣥行悲鳴則河決馳走則山崩後人因以名縣及津按通鑑不語怪今此註亦近於怪姑以廣異聞耳然則心忿含怒之日久矣今秦有敝甲凋兵軍於澠池敝敗惡也凋瘁也牛傷也敗甲凋兵謙其辭言軍於澠池則張其勢以臨趙矣康曰澠池趙邑余據趙與韓魏接境韓有野王上黨魏有河東河內而澠池則秦地也漢為縣屬弘農郡趙安能越韓魏而有之康說非是澠莫善翻又莫忍翻踰漳據番吾言欲自澠池北渡河又自此東踰漳水而進據番吾此亦張聲勢以臨趙也番吾即漢常山郡之蒲吾縣也劉昭註曰史記番吾君杜預云晉之蒲邑也此說非括地志番吾故城在恆州房山縣東二十里番音婆又音盤願以甲子合戰正殷紂之事武王伐紂癸亥陳于商郊甲子昧爽紂帥其旅若林會于牧野前徒倒戈攻其後以北遂以勝殷殺紂張儀引以懼趙其有所侮而動亦已甚矣邯鄲趙都音寒丹使臣上疏吏翻今楚與秦為昆弟之國而韓梁稱東藩之臣齊獻魚鹽之地齊東瀕于海海濱廣斥魚鹽所出也此時齊未嘗獻地于秦張儀駕說以恐動趙耳夫斷右肩而與人鬬夫音扶斷丁管翻失其黨而孤居求欲毋危得乎今秦發三將軍其一軍塞午道索隱曰午道當在趙之東齊之西午道地名也鄭玄云一縱一橫為午謂交道也塞悉則翻軍於邯鄲之東邯鄲音寒丹一軍軍成皋驅韓梁軍於河外史記正義曰河外謂鄭滑州北臨河余謂此河外亦因趙而言之約四國為一以攻趙趙服必四分其地言秦約齊韓魏四分趙地莫如與秦王面相約而口相結常為兄弟之國也趙王許之當時趙於山東最強且主從約張儀說之亦費辭矣張儀乃北之燕燕因肩翻說燕王曰今趙王已入朝効河間以事秦張儀自趙至燕借此氣勢而為是虛言以動燕耳朝直遙翻秦下甲雲中九原虞氏記曰趙自五原河曲築長城東至陰山又於河西造大城一箱崩不就乃改卜陰山河曲而禱焉晝見㣥鵠遊於雲中徘徊經日見大光在其下乃即其處築城今雲中城是也余謂此亦語怪酈道元為後魏書之耳宋白曰勝州榆林縣界有雲中古城趙武侯所築秦置雲中郡唐為單于都護府班志九原縣屬五原郡漢之五原即秦之九原郡也唐為豐鹽等州之地宋白曰唐豐州治九原縣按雲中九原皆在燕之西秦自上郡朔方下兵則可至史記正義曰古雲中九原郡皆在勝州雲中郡故城在榆林東北四十里九原郡故城在勝州西界今連谷縣是下遐稼翻元為于偽翻則易水長城非大王之有也水經註易水出涿郡故安縣閻鄉西山東屆關城西南即燕長城門也易水又歷長城而東過范陽容城安次泉州縣南而東入海猶郡縣也不敢妄舉師以攻伐今王事秦長無齊趙之患矣以利動之常山即北嶽恆山也漢文帝諱恆改曰常山置常山郡班志常山在常山郡上曲陽縣西北其尾則燕之西南界張儀歸報未至咸陽秦惠王薨子武王立索隱曰武王名蕩不說張儀說讀曰悅及即位㣥臣多毀短之毀短訾毀而數其短也隙乞逆翻怨隙也釁隙也物之有罅釁者為有隙人之與人有怨者亦為有隙皆畔衡復合從衡讀曰橫從子容翻以此觀之此時六國之勢利在合從而從張儀連衡者畏秦而搖於儀之說耳五年五年張儀說秦武王曰為王計者東方有變韓魏皆在秦之東說式芮翻臣聞齊王甚憎臣臣之所在齊必伐之臣願乞其不肖之身以之梁不肖謙言無所肖似也魏都大梁齊梁交兵而不能相去言兵交不解各欲去而不能也間居莧翻間隙也又居閑翻中間也入三川挾天子案圖籍此王業也張儀欲傾周而為秦始終以此說為主挾戶頰翻齊王果伐梁梁王恐張儀曰王勿患也言勿以為患令盧經翻使也下同乃使其舍人之楚借使謂齊王曰之往也如也不敢徑遣人使齊而往楚借使借使言借楚人以為使借子夜翻康資昔切使疏吏翻甚矣王之託儀於秦也齊王曰何故楚使者曰張儀之去秦也固與秦王謀矣欲齊梁相攻而令秦取三川也今王果伐梁是王內罷國而外伐與國罷讀曰疲而信儀於秦王也齊王乃解兵還還從宣翻又如字張儀相魏一歲卒相息亮翻卒子恤翻儀與蘇秦皆以縱橫之術遊諸侯致位富貴天下爭慕效之縱子容翻又有魏人公孫衍者號曰犀首亦以談說顯名說式芮翻其餘蘇代蘇厲周最樓緩之徒紛紜徧於天下務以辯詐相高不可勝紀姓譜曰周姓本自周平王子別封汝川人謂之周家因氏焉一云以赧王為秦所滅黜為庶人百姓稱為周家因氏焉余按商有太史周任謂為周姓所自出夫豈不可又赧王於時未滅不可謂周最出於赧王樓姓夏少康之裔周封為東樓公子孫因氏焉師古曰紛紜興作貌又物多而亂貌勝音升赧奴版翻夏戶雅翻少始照翻裔苗裔著者顯著於時孟子論之曰或謂公孫衍張儀豈不大丈夫哉一怒而諸侯懼安居而下天熄熄滅也火滅為熄此言天下兵革之事熄滅也是惡足為大丈夫哉惡音烏君子立天下之正位行天下之正道得志則與民由之不得志則獨行其道富貴不能淫貧賤不能移威武不能詘詘與屈同揚子法言曰或問儀秦學乎鬼谷術而習乎縱橫言安中國者各十餘年是夫夫音扶曰詐人也聖人惡諸惡烏路翻曰孔子讀而儀秦行謂讀孔子之言而行儀秦之事何如也曰甚矣鳳鳴而鷙翰也翰侯旰翻又侯安翻羽翰然則子貢不為歟曰亂而不解子貢恥諸太史公曰子貢一出存魯亂齊破吳強晉而霸越溫公曰考其年與事皆不合蓋六國遊說之士託為之辭太史公不加考訂因而記之揚子雲亦據太史公書發此語也說式芮翻儀秦恥諸說式芮翻或曰儀秦其才矣乎跡不蹈已宋咸曰蹈踐也言儀秦之才術超卓自然不踐循舊人之跡踐慈演翻昔在任人帝而難之書舜典而難任人孔安國註云任佞也難拒也言佞人則斥遠之任音壬難乃旦翻才乎才非吾徒之才也五年秦王使甘茂誅蜀相莊四年蜀相殺蜀侯秦武王故誅之史記莊作壯案秦紀秦既得蜀使陳莊相蜀從莊為是五年秦王魏王會于臨晉班志臨晉縣屬馮翊故大荔也秦取之更名臨晉應劭曰臨晉水故名臣瓚曰晉水在河之東此縣在河之西不得臨晉水舊說秦築高壘以臨晉國故曰臨晉章懷太子賢曰臨晉故城在今同州朝邑縣西南余按唐書地理志蒲州有臨晉縣宋白曰漢臨晉縣在今臨晉縣東南十八里故解城是也後魏改為北解縣周省隋分猗氏縣置桑泉縣唐天寶十二載改臨晉縣天寶之改縣必有所據則應劭臨晉水之說未可厚非秦之臨晉在河西臣瓚章懷之說皆是也更工衡翻應乙陵翻瓚藏旱翻朝直遙翻解戶買翻載祖亥翻五年趙武靈王納吳廣之女孟姚吳姓以國為氏是為惠后孔穎達曰后後也言其後於天子亦以廣後胤也戰國諸侯僭王亦稱其夫人為后為立何而長子章爭國張本長知兩翻六年六年秦初置丞相以樗里疾為右丞相應劭曰丞者承也相者助也荀悅曰秦本次國命卿二人故置左右丞相無三公官樗里疾秦惠王之弟也高誘曰疾居渭南之陰鄉其里有大樗樹故號樗里子相息亮翻樗丑於翻誘羊久翻七年七年秦魏會于應左傳曰邘晉應韓武之穆也杜預註云應國在襄陽城父縣西余按襄陽無城父縣後漢志潁川父城縣西南有應鄉古應國也括地志曰故應城因應山為名古之應國在汝州魯山縣東三十里應乙陵翻邘音于七年秦王使甘茂約魏以伐韓而令向壽輔行甘茂章十二行本茂下有至魏二字乙十一行本同孔本同張校同退齋校同令向壽還謂王曰魏聽臣矣令盧經翻使也向式讓翻姓也姓譜向姓本自宋文公枝子向文旰旰孫戌以王父字為氏余按左傳向戌本出於宋桓公孟子為齊卿出弔於滕王使王驩為輔行趙岐註曰輔行副使也旰音榦戌音恤傳直戀翻使疏吏翻然願王勿伐王迎甘茂於息壤而問其故柳宗元曰地長隆然而起夷之而益高者為息壤異書有云鯀竊帝之息壤以堙洪水意者此所謂息壤蓋以地長得名長知兩翻宜陽大縣其實郡也杜佑曰春秋時列國相滅多以其地為縣則縣大則郡小故趙鞅曰上大夫受縣下大夫受郡至于戰國則郡大而縣小矣故甘茂曰宜陽大縣其實郡也漢官儀曰凡郡或以列國陳魯齊吳是也或以舊邑長沙丹陽是也或以山陵泰山山陽是也或以川原西河河東是也或以所出金城城下得金酒泉泉味如酒豫章樟樹生庭鴈門鴈之所育是也或以號令夏禹合諸侯大計東冶之山會計因名會稽是也令力正翻名會古外翻行千里攻之難倍與背同音蒲妹翻數險謂函谷及三崤之險魯人有與曾參同姓名者殺人人告其母其母織自若也參所金翻一音七南翻及三人告之其母投杼下機踰牆而走杼直呂翻說文曰杼機之持緯者蓋今所謂梭梭蘇禾翻臣之賢不若曾參王之信臣又不如其母疑臣者非特三人臣恐大王之投杼也魏文侯令樂羊將而攻中山三年而拔之事見一卷威烈王二十三年令音盧經翻將即亮翻文侯示之謗書一篋謗訕也毀也篋竹笥也音古頰翻君之力也稽首首至地也稽音啟羇旅之臣也甘茂楚下蔡人故云然羇居宜翻寄也旅客也王必聽之樗丑於翻奭施隻翻挾戶頰翻是王欺魏王而臣受公仲侈之怨也公仲侈韓相也寡人弗聽也請與子盟乃盟於息壤秋甘茂庶長封帥師伐宜陽長知丈翻帥讀曰率八年八年甘茂攻宜陽五月而不拔樗里子公孫奭果爭之秦王召甘茂欲罷兵甘茂曰息壤在彼徵前盟也有之因大悉起兵以佐甘茂佐助也遂拔宜陽韓公仲侈入謝於秦以請平請平猶請和也八年秦武王好以力戲好呼到翻力士任鄙烏獲孟說皆至大官烏姓也春秋時齊有大夫烏枝鳴姓譜孟姓魯桓公之子仲孫之胤仲孫為三桓之孟故曰孟氏任音壬說讀曰悅王與孟說舉鼎絕脈而薨脈莫獲翻脈者係絡臟腑其血理分行於支體之間人舉重而力不能勝故脈絕而死按史記甘茂傳云武王至周而卒于周蓋舉鼎者舉九鼎也世家以為龍文赤鼎史記脈作臏族孟說族者誅夷其族異母弟稷為質於燕質音致燕因肩翻國人逆而立之逆迎也昭襄王母羋八子羋楚姓也漢因秦制嫡稱皇后次稱夫人又有美人良人八子七子長使少使之號美人爵視二千石比少上造八子視千石比中更羋亡氏翻實宣太后八年趙武靈王北略中山之地略地之師速而疾杜預曰略者總攝巡行之名也班志房子縣屬常山郡史記正義曰房子今趙州縣宋白曰天寶元年改曰臨城章十二行本至作之乙十一行本同孔本同張校同退齋校同代北至無窮自代北出塞外大漠數千里故曰無窮戰國策武靈王曰昔先君襄王與代交地城境封之名曰無窮之門所以詔後而期遠也登黃華之上史記正義曰黃華蓋黃河側之山名騎奇寄翻曰愚者所笑賢者察焉雖驅世以笑我胡地中山吾必有之遂胡服國人皆不欲公子成稱疾不朝朝直遙翻王使人請之曰家聽於親親謂父母今寡人作教易服而公叔不服吾恐天下議己章十二行本己作之乙十一行本同孔本同張校同退齋校同也制國有常利民為本從政有經令行為上令力政翻明德先論於賤而從政先信於貴德欲其下及故先論於賤卑賤者感其德則德廣所及可知矣法行自貴近始故先信於貴貴近者奉法則法之必行可知矣公子成再拜稽首曰稽音啟臣聞中國者聖賢之所教也禮樂之所用也遠方之所觀赴也蠻夷之所則效也今王舍此而襲遠方之服則法也舍讀曰捨襲重衣也逆人之心臣願王孰圖之也孰古熟字通章十二行本正作熟乙十一行本同孔本同王自往請之使疏吏翻曰吾國東有齊中山按趙都邯鄲東接於齊中山在其東北故史記趙世家載武靈王之言曰吾國東有河薄落之水與齊中山同之蓋河薄落之水在趙之東與齊中山同此地險也西有樓煩秦韓之邊史記正義曰營州之境即東胡烏丸之地林胡樓煩即嵐勝之北也班志鴈門郡樓煩縣應劭註云故樓煩胡地嵐勝以南石州離石藺等七國時趙邊也與秦隔河晉洺潞澤等州皆七國時韓地趙之西邊也燕因肩翻則何以守之哉騎奇寄翻先時中山負齊之強兵侵暴吾地係累吾民先悉薦翻累力追翻引水圍鄗微社稷之神靈則鄗幾於不守也鄗趙邑漢光武改為高邑隋唐為柏鄉縣地唐屬趙州鄗呼各翻幾居衣翻以為趙國之醜欲以備四境之難難乃旦翻報中山之怨而叔順中國之俗惡變服之名惡烏路翻以忘鄗事之醜非寡人之所望也公子成聽命乃賜胡服明日服而朝朝直遙翻於是始出胡服令令力政翻而招騎射焉九年九年秦昭王使向壽平宜陽平正也和也正宜陽之疆界而和其民人也向式亮翻甘茂言於王以武遂復歸之韓史記正義曰武遂本屬韓近平陽楚世家云韓先王之墓在平陽武遂去之七十里去年秦拔宜陽因涉河城武遂今復歸之韓復音如字不能得向式讓翻由此怨讒甘茂茂懼輟伐魏蒲阪亡去班志蒲阪縣屬河東郡舊曰蒲應劭曰秦始皇東巡見長阪因加阪云括地志蒲阪故城在蒲州河東縣南五里阪音反講和也九年趙王略中山地至寧葭水經註衡漳水東北歷下博城西又西逕樂鄉縣故城南又東引葭水注之葭音加至榆中水經註諸次水出上郡諸次山其水東逕榆林塞世又謂之榆林山即漢書所謂榆溪舊塞者自溪西去悉榆柳之藪緣歷沙陵屆龜茲縣西出故云廣長榆也王恢曰樹榆為塞謂此蘇林以為榆中在上郡非也按始皇本紀西北逐匈奴自榆中並河以東屬之陰山然榆中在金城東五十許里陰山在朔方東以此推之不得在上郡余謂蘇林之說固未為盡而道元所謂榆中在金城東五十許里亦非也據衞青取河南地案榆溪舊塞正在唐麟勝二州界其西則接古上郡之境況諸次水出上郡逕榆林塞入河則榆中在上郡之東明矣諸次水無西流至金城榆中之理夷考其故道元特以班志金城郡有榆中縣遂牽合以為說不知此一節之誤尤甚於蘇林也史記正義曰榆中勝州北河北岸也杜佑曰勝州榆林郡南即秦榆林塞如淳曰林胡即儋林余謂此胡種落依阻林薄因曰林胡儋都甘翻種章勇翻使樓緩之秦仇液之韓王賁之楚歸謂趙王自略中山歸也仇姓也春秋時宋有大夫仇牧液音亦之往也如也賁音奔康曰離之父翦之子余按離父翦子秦將也此王賁乃趙人康說非是將即亮翻富姓也春秋時周有大夫富辰代相趙固主胡致其兵相息亮翻致者使之至也九年楚王與齊韓合從楚與齊韓合從尋即倍之適足致齊韓之兵耳從子容翻十年十年彗星見彗星世所謂掃星本類星末類彗小者數寸長或竟天見則兵起主掃除除舊布新唐史臣曰彗體無光傅日以為光故夕見則東指晨見則西指或長或短光芒所及則為災又曰孛星彗之屬也偏指曰彗氣四出曰孛孛者孛孛非常惡氣之所生災甚於彗天文書謂五星之精為妖歲星流為蒼彗熒惑填星散為赤彗黃彗太白辰星變為白彗黑彗彗祥歲翻又徐醉翻又旋芮翻見賢遍翻掃所報翻傅讀曰附孛蒲內翻妖於遙翻填讀曰鎮十年趙王伐中山取丹丘爽陽鴻之塞又取鄗石邑封龍東垣史記正義曰丹丘邢州縣余按隋唐志邢州有內丘縣漢之中丘縣也未嘗有丹丘不知其何據爽陽鴻之塞史記作華陽鴟之塞括地志曰北岳別名曰華陽臺即常山也在定州恆陽縣北百四十里徐廣曰鴟作鴻鴻上故關今名汝城在定州唐縣東北六十里又有鴻上水出唐縣北葛洪山山接北岳恆山皆在定州界班地石邑縣屬常山郡井陘山在西括地志石邑故城在恆州鹿泉縣南三十五里封龍山一名飛龍山在恆州鹿泉縣南四十五里邑蓋因山為名洪氏隸釋載後漢所立白石碑云常山國元氏縣界有封龍山東垣即漢真定國之真定縣漢高帝更名史記正義曰趙之東垣在恆州真定縣南八里故常山城是也鄗呼各翻垣于元翻華戶化翻恆戶登翻鴟丑之翻陘音刑更工衡翻十年秦宣太后異父弟曰穰侯魏冉同父弟曰華陽君羋戎王之同母弟曰高陵君涇陽君魏冉最賢秦封穰侯於陶陶即范蠡所居陶邑孟康曰陶即定陶班志定陶縣屬濟陰郡下云封於穰與陶穰縣屬南陽郡去定陶差遠水經註曰穰侯封於穰益封於陶其免相也出之陶而卒陶有穰侯冢穰音人羊翻華陽即武王歸馬之地水經註洛水自上洛縣東北分為二水枝渠東北出為門水水東北歷陽華之山即華陽也華音戶化翻羋眉婢翻相息亮翻卒子恤翻冢知隴翻班志高陵縣屬馮翊涇陽縣屬安定杜佑曰京兆涇陽縣乃秦封涇陽君之地漢涇陽縣在今平涼郡界涇陽故城是也宋白曰雍州涇陽本秦舊縣與杜佑同索隱曰高陵君名顯涇陽君名悝索山客翻悝苦回翻任職用事武王薨諸弟爭立唯魏冉力能立昭王惠王即惠文王昭王即昭襄王以魏冉為將軍衞咸陽是歲庶長壯及大臣諸公子謀作亂長知丈翻魏冉誅之及惠文后皆不得良死惠文后昭王嫡母也死於正命曰良死章十二行本居作歸乙十一行本同孔本同退齋校同于魏悼武王后即秦武王后昭王嫂也魏冉皆滅之王少宣太后自治事任魏冉為政威震秦國少詩照翻治直之翻為范睢間魏冉張本十一年十一年秦王楚王盟于黃棘史記正義曰黃棘蓋在房襄二州余按班志南陽郡有棘陽縣應劭曰縣在棘水之陽三年秦敗楚師虜屈匄取楚上庸十二年十二年彗星見彗祥歲翻又徐醉翻旋芮翻見賢遍翻十二年秦取魏蒲阪晉陽封陵晉陽按史記世家作陽晉其地當在蒲阪之東風陵之西大河之陽且本晉地也故謂之陽晉蘇秦所謂衞陽晉之道蓋以魏境有陽晉故在衞境者稱衞陽晉以別之括地志曰晉陽故城今名晉城在蒲州虞鄉縣西水經註函谷關直北隔河有崇阜巍然獨秀世謂之風陵酈道元所謂函谷則潼關也史記正義曰封陵在蒲州唐志河中府河東縣南有風陵關今若據括地志則晉陽亦通九年秦歸韓武遂十二年齊韓魏以楚負其從親九年楚與齊韓合從蓋即負之也從子容翻楚王使太子橫為質於秦以請救質音致秦客卿通將兵救楚三國引兵去將即亮翻又音如字領也十三年十三年秦王魏王韓太子嬰會于臨晉韓太子至咸陽而歸秦復與魏蒲阪阪音反去年秦取魏蒲阪十三年秦大夫有私與楚太子鬬者太子殺之亡歸楚太子質秦而亡歸復質於齊秦以為言而誘陷其父齊乘其父出而要之以利十四年十四年日有食之既十四年秦人取韓穰班志穰縣屬南陽郡以時考之當屬楚然韓得潁川之地與南陽接境七國兵爭疆埸之間一彼一此或者此時穰屬韓歟穰人羊翻十四年蜀守煇叛秦秦司馬錯往誅之蜀守蜀郡守也史記秦紀作蜀侯華陽國志曰秦封王子煇為蜀侯蜀侯祭歸胙於王後母疾之加毒以進王大怒使司馬錯賜煇劍守音狩煇索隱音暉十四年秦庶長奐會韓魏齊兵伐楚修楚太子亡歸之怨長知丈翻殺其將唐昧遂取重丘唐姓本於唐堯春秋之時有二重丘衞孫蒯飲馬於重丘杜預曰曹邑諸侯同盟于重丘杜預曰齊地時楚之境皆不至此呂氏春秋曰齊令章子與韓魏攻荊荊使唐薎將兵應之夾泚而軍章子夜襲之斬薎於是水之上水經註曰泚水又西澳水注之水北出茈丘山南入于泚水意者重丘即茈丘也敗補邁翻將即亮翻昧荀子作蔑楊倞註曰與昧同語音相近當音末索隱音莫葛翻重直龍翻茈才支翻十四年趙王伐中山中山君奔齊十五年十五年秦涇陽君為質於齊質音致十五年秦華陽君伐楚大破楚師斬首三萬殺其將景缺取楚襄城班志襄城縣屬潁川郡有西不羹楚靈王所謂大城陳蔡不羹賦皆千乘是也將即亮翻陸德明曰不羹舊音郎漢書地理志作更字乘繩證翻使太子為質於齊以請平為楚懷王入秦而卒齊留太子以邀楚張本十五年秦樗里疾卒以趙人樓緩為丞相樗丑於翻卒子恤翻相息亮翻十五年趙武靈王愛少子何欲及其生而立之少詩照翻及其生者及其生而親見之十六年十六年五月戊申大朝東宮朝直遙翻傳國於何王廟見禮畢出臨朝廟見始即位而見祖廟也見賢遍翻肥義為相國幷傅王相國之官始此秦漢因之漢魏以降其位望尊於丞相相息亮翻主父主父言為國之主之父也一曰言其子主國而己則父也身胡服將士大夫西北略胡地治直之翻將即亮翻又如字將自雲中九原南襲咸陽於是詐自為使者入秦使疏吏翻欲以觀秦地形及秦王之為人秦王不知已而怪其狀甚偉非人臣之度賓主相見交際之禮已方怪其非人臣主父行已脫關矣審問之乃主父也謂已脫身出秦關也十六年齊王魏王會于韓十六年秦人伐楚取八城秦王遺楚王書曰始寡人與王約為兄弟盟于黃棘見上十一年遺于季翻至驩也質音致見十二年太子陵殺寡人之重臣不謝而亡去見十三年勝音升使兵侵君王之邊謂戰重丘取襄城見十五年婚姻相親妻父曰婚壻父曰姻字書婚昏也禮娶以昏時婦人陰也故曰婚壻家女之所因故曰姻字林婚婦家姻壻家賈公彥曰各據男女身則男曰昏女曰姻若以親言之則女之父曰婚壻之父曰姻余按張儀言秦楚嫁女娶婦為昆弟之國考之於史自赧王四年至是年秦楚未嘗嫁娶也至十九年楚懷王死於秦至二十三年楚襄王逆婦於秦蓋先已約親其後襄王終喪始逆婦成婚姻則無以令諸侯令力政翻寡人願與君王會武關面相約結盟而去寡人之願也楚王患之欲往恐見欺欲不往恐秦益怒昭睢曰毋行而發兵自守耳睢息遺翻又七余翻秦虎狼也有幷諸侯之心不可信也懷王之子章十二行本子下有子字乙十一行本同孔本同蘭勸王行王乃入秦秦王令一將軍詐為王伏兵武關楚王至則閉關劫之與俱西至咸陽朝章臺如藩臣禮朝直遙翻秦章臺宮在渭南漢張敞走馬章臺街孟康曰在長安中臣瓚曰街在章臺下漢長安在渭南以此言之章臺宮在渭南明矣瓚藏旱翻要以割巫黔中郡楚王欲盟秦王欲先得地楚王怒曰秦詐我而又強要我以地要一遙翻黔其今翻強其良翻又其兩翻因不復許秦人留之復扶又翻楚大臣患之乃相與謀曰吾王在秦不得還要以割地而太子為質於齊還從宣翻又音如字要一遙翻質音致齊秦合謀則楚無國矣欲立王子之在國者昭睢曰王與太子俱困於諸侯今又倍王命而立其庶子不宜睢息隨翻倍蒲妹翻乃詐赴於齊詐言楚王薨而請太子還王楚或曰不若留太子以求楚之淮北湣讀曰閔楚滅陳蔡封畛於汝滅越取吳故地幷有古徐夷之地皆在淮北即楚所謂下東國齊相曰不可郢中立王郢楚都班志南郡江陵縣故楚郢都楚文王自丹陽徙此後九世平王城之又後十世秦拔之東徙壽春亦名曰郢水經江水東逕江陵縣故城南又東逕郢城南註云今江陵城楚船官地春秋之渚宮郢城即子囊遺言所城者劉昫曰故楚都之郢城今江陵縣北十五里紀南城是也相息亮翻質音致其人曰不然郢中立王因與其新王市曰予我下東國吾為王殺太子市謂相要以利如市道也予讀曰與為于偽翻將與三國共立之三國謂齊韓魏卒子恤翻楚人立之十六年秦王聞孟嘗君之賢使涇陽君為質於齊以請孟嘗君來入秦秦王以為丞相質音致十七年十七年或謂秦王曰孟嘗君相秦必先齊而後秦先後皆去聲秦王乃以樓緩為相囚孟嘗君欲殺之孟嘗君使人求解於秦王幸姬姬曰願得君狐白裘狐白裘緝狐掖之皮為之所謂千金之裘非一狐之掖者也已獻之秦王無以應姬求客有善為狗盜者入秦藏中物之所藏曰藏音徂浪翻盜狐白裘以獻姬姬乃為之言於王而遣之為于偽翻王後悔使追之孟嘗君至關關法雞鳴而出客時尚蚤蚤古早字通客有善為雞鳴者野雞聞之皆鳴孟嘗君乃得脫歸十七年楚人告于秦曰賴社稷神靈國有王矣秦王怒發兵出武關擊楚斬首五萬取十六城十七年趙王封其弟章十二行本弟下有勝字乙十一行本同為平原君班志平原縣屬平原郡勝封於東武城號平原君非封於平原也東武城屬清河郡杜佑曰今貝州武城縣是也蓋定襄有武城時同屬趙故此加東也好呼到翻食客嘗章十二行本嘗作常乙十一行本同數千人有公孫龍者善為堅白同異之辯漢書藝文志公孫龍子十四篇註云即為堅白同異之辯者成玄英莊子疏云公孫龍著守白論行於世堅白即守白也言堅執其說如墨子墨守之義自堅白之論起辯者互執是非不勝異說公孫龍能合衆異而為同故謂之同異史記註曰晉太康地記云汝南西平縣有龍淵水可用淬刀劍極堅利故有堅白之論云黃所以為堅也白所以為利也或曰黃所以為不堅白所以為不利二說未知孰是勝音升淬取內翻孔穿自魯適趙按孔叢子孔穿孔子之後孫愐曰孔姓殷湯之後本自帝嚳元簡狄吞乙卵生契賜姓子氏至湯以其祖感乙而生故名履字天乙後代以子加乙始為孔氏至宋孔父遭華督之難其子奔魯故孔子生於魯愐彌兗翻嚳苦沃翻華戶化翻難乃旦翻三耳如莊子所載雞三足之說莊子疏謂數起於一一與一為二二與一為三三名雖立實無定體故雞可以為三足則兩耳三耳其說亦猶是耳一說耳主聽兩耳形也兼聽而言可得為三臧臧獲之臧臧獲奴婢也辯別也析分也言分別甚精微也俄而辭出明日復見平原君子高孔穿字也復扶又翻疇昔公孫之言信辯也毛晃曰疇曩也昔夕也疇昔曩夕也對曰然幾能令臧三耳矣毛晃曰然如也是也語決辭幾居依翻令使也音力丁翻實難僕願得又問於君今謂三耳甚難而實非也謂兩耳甚易而實是也不知君將從易而是者乎其亦從難而非者乎平原君無以應明日謂公孫龍曰公無復與孔子高辯事也易弋豉翻其人理勝於辭公辭勝於理終必受詘鄒衍過趙過古禾翻平原君使與公孫龍論白馬非馬之說此亦莊子所謂狗非犬之說疏云狗之與犬一實兩名名實合則此為狗彼為犬名實離則狗異於犬又墨子曰狗犬也然殺殺大指與白馬非馬之說同鄒子曰不可夫辯者別殊類使不相害序異端使不相亂抒意通指夫音扶別彼列翻索隱曰抒音墅抒者舒也又常恕翻康曰亦音舒明其所謂使人與知焉不務相迷也與音如字又讀曰預故勝者不失其所守不勝者得其所求辯以求是辯雖不勝而得審其是所謂得其所求也故辯可為也及至煩文以相假飾辭以相惇惇都昆翻迫也詆也誰何也巧譬以相移引人使不得及其意如此害大道夫繳紉章十二行本紉作紛乙十一行本同孔本同熊校同爭言而競後息索隱繳音糾康吉弔切非言其言戾紛然而爭欲人先屈務在人後方止也不能無害君子衍不為也座皆稱善言一座之人皆稱衍言為善通鑑書此言小辯終不足破大道絀音敕律翻說文曰絀貶下也又讀與屈同齊思和標點顧頡剛聶崇岐覆校
