body:
  text: 資治通鑑卷第八朝散大夫右諫議大夫權御史中丞充理檢使上護軍賜紫金魚袋臣奉敕編集後學天台音註秦紀三二世皇帝下二年二年冬十月泗州監平將兵圍沛公於豐泗川郡即泗水郡秦郡置守尉監文穎曰秦時御史監郡若今刺史平人名破之令雍齒守豐雍於用翻姓也風俗通雍姓周文王子雍伯之後十一月沛公引兵之薛泗川守壯兵敗於薛走至戚沛公左司馬得殺之壯者泗川守之名班志戚縣屬東海郡括地志沂州臨沂縣有戚縣故城戚如字如淳將毒翻余以地理考之沛郡之與東海相去頗遠壯兵敗而走未必能至東海之戚班志沛郡有廣戚縣章懷太子賢曰廣戚故城在今徐州沛縣東恐是走至廣戚之戚也師古曰得者司馬之名貢父曰得殺之者得而殺之漢書多以獲為得司馬掌兵周之夏卿春秋之時晉置三軍及新軍各有卿佐復置司馬以掌軍中刑戮之事後復分為左右又其後也軍行有軍司馬假司馬下至部曲有候有司馬二年周章出關止屯曹陽晉灼曰曹陽亭在弘農東十三里魏武改曰好陽師古曰曹水之陽也其水出陝縣西峴頭山而北流入河今謂之好陽澗在陝縣西四十五里括地志在陝州桃林縣東十四里章邯追敗之復走澠池敗補邁翻復扶又翻十餘日章邯擊大破之周文自刎軍遂不戰刎扶粉翻吳叔圍滎陽李由為三川守守滎陽秦滅周置三川郡其治所當在洛陽由蓋守滎陽以扞楚宋白曰秦立三川郡初理洛陽後徙滎陽楚將軍田臧等相與謀曰周章軍已破矣周章即周文我圍滎陽城弗能下秦兵至必大敗不如少遺兵守滎陽遺兵留兵也少詩沼翻今假王驕陳涉之自王也以吳叔為假王不足與計事恐敗因相與矯王令以誅吳叔師古曰矯託也託言受王令也陳王使使賜田臧楚令尹印以為上將田臧乃使諸將李歸等守滎陽自以精兵西迎秦軍於敖倉周宣王狩于敖左傳晉師在敖鄗之間後漢志滎陽有敖亭秦立敖倉孟康曰敖地名在滎陽西北山上臨河有大倉田臧死軍破章邯進兵擊李歸等滎陽下破之李歸等死陽城人鄧說將兵居郯師古曰郯東海縣音談索隱曰非也此時章邯軍未至東海此郯別是地名或恐郯當作郟郟是郟鄏之地史記正義曰郟是春秋時郟地楚郟敖葬之今汝州郟縣城是鄧說陽城人陽城河南府縣與郟縣相近又近陳余按索隱以為河南之郟鄏正義以為汝州之郟時章邯兵至滎陽則已過郟鄏而東矣正義之說近之章邯別將擊破之銍人伍逢將兵居許伍姓也春秋時楚有伍舉伍奢許春秋許子之國班志屬潁川魏文帝改曰許昌唐為許州兩軍皆散走陳陳王誅鄧說二年二世數誚讓李斯居三公位如何令盜如此數所角翻誚七笑翻責也秦以丞相太尉御史大夫為三公漢因之李斯恐懼重爵祿不知所出乃阿二世意以書對曰夫賢主者必能行督責之術者也索隱曰督者察也察其罪責之以刑罰也恣資二翻睢香萃翻謂肆情放縱也命之曰以天下為桎梏者無他焉不能督責而顧以其身勞於天下之民若堯禹然故謂之桎梏也桎梏械也在足曰桎在手曰梏桎職日翻梏姑沃翻行督責之道專以天下自適也而徒務苦形勞神以身徇百姓則是黔首之役非畜天下者也何足貴哉故明主能行督責之術以獨斷於上斷丁亂翻則權不在臣下然後能滅仁義之塗絕諫說之辯犖蛫行恣睢之心犖呂角翻而莫之敢逆如此㣥臣百姓救過不給何變之敢圖二世說說讀曰悅於是行督責益嚴稅民深者為明吏殺人衆者為忠臣刑者相半於道而死人日成積於市秦民益駭懼思亂二年趙李良已定常山去年趙王使李良略常山趙王復使良略太原至右邑秦兵塞井陘未能前班志石邑縣屬常山郡井陘山在西塞悉則翻陘音刑良得書未信還之邯鄲益請兵未至道逢趙王姊出飲章十二行本飲下有從百餘騎四字乙十一行本同孔本同張校同退齋校同良望見以為王伏謁道旁王姊醉不知其將將即亮翻使騎謝李良李良素貴起慚其從官拜謁而起顧從官而慚也從才用翻天下畔秦能者先立且趙王素出將軍下今女兒乃不為將軍下車請追殺之李良已得秦書固欲反趙未決因此怒遣人追殺王姊因將其兵襲邯鄲邯鄲不知竟殺趙王邵騷趙人多為張耳陳餘耳目者以故二人獨得脫以故者以此故也二年陳人秦嘉符離人朱雞石等起兵圍東海守於郯陳當作凌陳勝傳作凌人秦嘉秦姓也秦秋時魯有秦堇父班志曰東海郡漢高帝置應劭註曰即秦郯郡余按裴駰所云三十六郡本亦無郯郡漢東海郡則治郯耳使武平君畔為將軍監郯下軍秦嘉不受命自立為大司馬惡屬武平君惡烏路翻告軍吏曰武平君年少不知兵事勿聽因矯以王命殺武平君畔二年二世益遣長史司馬欣董翳佐章邯擊盜時章邯為上將將兵東討故使欣為長史以佐之據項籍傳翳為都尉姓譜飂叔安裔子董父好龍帝舜嘉焉因賜姓董擊陳柱國房君殺之又進擊陳西張賀軍陳王監戰張賀死監古銜翻臘月張晏曰秦之臘月夏之九月臣瓚曰建丑之月也師古曰史記云胡亥二年十月誅葛嬰十一月周文死十二月陳涉死瓚說是也陳王之汝陰之往也至下城父師古曰下城父地名在沛郡城父縣東劉昭曰汝南山桑縣故屬沛有下城父聚父音甫降戶江翻初陳涉既為王其故人皆往依之妻之父亦往焉陳王以衆賓待之長揖不拜妻之父怒曰怙亂僭號而傲長者不能久矣不辭而去陳王跪謝遂不為顧客出入愈益發舒言陳王故情或說陳王曰客愚無知顓妄言輕威陳王斬之諸故人皆自引去由是無親陳王者陳王以朱防為中正胡武為司過主司㣥臣諸將徇地至令之不是章十二行本是下有者字乙十一行本同孔本同輒繫而罪之以苛察為忠其所不善者弗下吏輒自治之諸將以其故不親附此其所以敗也史言陳王棄其親故遂死於莊賈之手故先以故人二字發其端乃及慢其妻父事次及客事客先與陳王傭耕及其據陳而王遮道求見陳王載與俱歸後以客言其故情遂殺之輕威者言輕其為君之威重也顓與專同陳王故涓人將軍呂臣為蒼頭軍魏有蒼頭二十萬蓋前乎此時已有蒼頭軍矣應劭曰時軍皆著青巾故曰蒼頭服虔曰蒼頭謂士卒青帛巾若赤眉之號以相識別也班志新陽縣屬汝南郡應劭曰在新水之陽括地志新陽故城在豫州真陽縣西南四十二里下之殺莊賈復以陳為楚葬陳王於碭諡曰隱王初陳王令銍人宋留將兵定南陽入武關留已徇南陽聞陳王死南陽復為秦宋留以軍降二世車裂留以徇二年魏周巿將兵略章十二行本略下有地字乙十一行本同孔本同豐沛使人招雍齒雍齒雅不欲屬沛公即以豐降魏雅素也不克二年趙張耳陳餘收其散兵得數萬人擊李良良敗走歸章邯客有說耳餘曰兩君羇旅而欲附趙難可獨立立趙後輔以誼可就功乃求得趙歇春正月耳餘立歇為趙王居信都項羽改信都曰襄國漢復為信都縣屬信都國後漢復曰襄國二年東陽甯君秦嘉文穎曰秦嘉東陽郡人為甯縣君臣瓚曰陳勝傳凌人秦嘉然則嘉非東陽人嘉起於郯號大司馬又不為甯縣君東陽甯君自一人秦嘉又一人師古曰瓚說是東陽者為所屬縣甯君者姓甯時號為君姓譜衞卿甯氏之後又晉有甯嬴以邑為姓迺立景駒為楚王引兵之方與欲擊秦軍定陶下班志方與縣屬山陽郡定陶縣屬濟陰郡史記正義曰方與今濟州縣定陶今曹州縣方與音房預欲與之幷力俱進幷必正翻齊王曰陳王戰敗不知其死生楚安得不請而立王公孫慶曰齊不請楚而立王楚何故請齊而立王且楚首事當令於天下首事謂最先起兵伐秦秦左右校復攻陳下之索隱曰左右校即左右校尉校戶教翻徼兵復聚如淳曰徼要也徼散卒復相聚也師古曰徼工堯翻余謂從如氏之說當音於堯翻番即番陽縣漢屬豫章郡英布為盜於江中番陽令吳芮妻之以女故謂番盜番蒲何翻破之青波復以陳為楚黥布者六人也六春秋之六國也秦為縣屬九江郡漢屬六安國括地志六故城在壽州安豐縣南百三十里宋白曰今蘄州東廣濟縣即秦漢之六縣英布都六古城猶存姓譜英出自偃姓皋陶之後封於英因以為氏以刑徒論輸驪山驪山之徒數十萬人布皆與其徒長豪桀交通長知兩翻乃率其曹耦曹輩也番陽令吳芮甚得江湖間民心號曰番君布往見之其衆已數千人番君迺以女妻之妻七細翻使將其兵擊秦二年楚王景駒在留班志留縣屬楚國括地志留城在徐州沛縣東南五十里即張良封處張良亦聚少年百餘人欲往從景駒道遇沛公遂屬焉沛公拜良為广既將广既將蓋掌馬沛公善之常用其策良為他人言皆不省說輸芮翻為于偽翻下平為同省悉井翻察也後以義推良曰沛公殆天授故遂留不去張良從沛公始此沛公與良俱見景駒欲請兵以攻豐時章邯司馬將兵北定楚地師古曰古夷字類篇曰古仁字又延知翻至碭班志相縣為沛郡治所括地志故相城在徐州符離縣西九十里相息亮翻碭徒郎翻與戰蕭西班志蕭縣屬沛郡唐屬徐州蕭西謂在蕭縣之西還收兵聚留二月攻碭三日拔之收碭兵得六千人與故合九千人三月攻下邑拔之班志下邑縣屬梁國不下二年廣陵人召平為陳王徇廣陵未下廣陵縣屬九江郡班志為廣陵國都唐為揚州姓譜召姓周文王子召公奭之後召寔照翻章邯且至迺渡江矯陳王令拜項梁為楚上柱國曰江東已定急引兵西擊秦梁迺以八千人渡江而西聞陳嬰已下東陽班志東陽縣屬臨淮郡明帝分屬下邳後復分屬廣陵括地志東陽故城在楚州盱眙縣東七十里水經註曰淮陰縣楚漢之間為東陽郡陳嬰者故東陽令史蘇林曰令史曹史也晉灼曰漢儀注令吏曰令史丞吏曰丞史師古曰晉說是素信謹稱為長者東陽少年殺其令相聚得二萬人欲立嬰為王嬰母謂嬰曰自我為汝家婦未嘗聞汝先世之有貴者今暴得大名不祥不如有所屬事成猶得封侯事敗易以亡非世所指名也易以豉翻嬰乃不敢為王謂其軍吏曰項氏世世將家有名於楚今欲舉大事將非其人不可將即亮翻我倚名族亡秦必矣其衆從之乃以兵屬梁英布既破秦軍引兵而東聞項梁西渡淮布與蒲將軍皆以其兵屬焉項梁衆凡六七萬人軍下邳班志下邳縣屬東海郡應劭曰邳在薛其後徙此故曰下邳臣瓚曰有上邳故曰下邳史記正義曰下邳泗水縣也景駒秦嘉軍彭城東欲以距梁梁謂軍吏曰陳王先首事戰不利未聞所在今秦嘉倍陳王而立景駒大逆無道倍蒲妹翻乃進兵擊秦嘉秦嘉軍敗走追之至胡陵胡陵即湖陸班志屬山陽郡漢章帝改曰湖陵一日嘉死軍降景駒走死梁地梁地故魏地也梁已幷秦嘉軍軍胡陵收引軍而西章邯軍至栗班志栗縣屬沛郡餘樊君死朱雞石軍敗亡走胡陵梁乃引兵入薛誅朱雞石括地志曰故薛城古薛侯國也在今徐州滕縣界沛公從騎百餘往見梁梁與沛公卒五千人五大夫將十人沛公還引兵攻豐拔之雍齒奔魏項梁使項羽別攻襄城班志襄城縣屬潁川郡史記正義曰今許州縣已拔皆阬之還報梁聞陳王定死召諸別將會薛計事沛公亦往焉居鄛人范增年七十班志居巢縣屬廬江郡春秋楚人圍巢巢國也史記正義曰即夏桀所奔地晉灼曰鄛音勦絕之勦師古音巢好奇計往說項梁曰陳勝敗固當夫秦滅六國楚最無罪自懷王入秦不反楚人憐之事見四卷周赧王十九年當屬上句亡秦必楚服虔曰南公南方之老人虞喜志林曰南公者道士識廢興之數知亡秦者必楚漢書藝文志南公十三篇六國時人在陰陽家流臣瓚曰楚人怨秦雖三戶足以亡秦不立楚後而自立其勢不長今君起江東楚起之將皆爭附君者師古曰古蜂字起如之起言其衆也一說與鋒同言鋒銳而起者爾雅翼曰近其房輒㣥起攻人故曰起之將為能復立楚之後也於是項梁然其言乃求得楚懷王孫心於民間為人牧羊夏六月立以為楚懷王從民望也徐廣曰順民望以其祖諡為號封五縣與懷王都盱眙班志盱眙縣屬臨淮郡史記正義曰今楚州縣阮勝之南兗州記盱眙本春秋善道地宋屬泗州音吁怡張良說項梁曰君已立楚後而韓諸公子橫陽君成最賢可立為王益樹黨項梁使良求韓成立以為韓王以良為司徒與韓王將千餘人西略韓地得數城秦輒復取之往來為游兵潁川潁川故韓地秦置郡二年章邯已破陳王乃進兵擊魏王於臨濟後漢志陳留郡平丘縣有臨濟亭水經註曰田儋死處史記正義曰今齊州臨濟縣又曰故城在淄州高苑縣北二里余按正義所云臨濟乃田儋所起狄縣地也非魏王咎所居臨濟也後漢志及水經註為是請救於齊楚齊王儋及楚將項它皆將兵隨巿救魏它徒河翻章邯夜銜枚擊大破齊楚軍於臨濟下師古曰銜枚者止言語讙囂欲令敵人不知其來也周官有銜枚氏枚狀如箸橫銜之繣結於項繣結礙也絜繞也蓋為結紐而繞項也銜戶緘翻繣音獲絜音頡魏王咎為其民約降約定自燒殺其弟豹亡走楚楚懷王予魏豹數千人復徇魏地為于偽翻予讀曰與齊田榮收其兄儋餘兵東走東阿班志東阿縣屬東郡括地志東阿故城在濟州東阿縣西南二十五里齊人聞田儋死乃立故齊王建之弟假為王田角為相角弟間為見以距諸侯秋七月大霖雨雨三日以往為霖亢父音抗甫聞田榮之急迺引兵擊破章邯軍東阿下章邯走而西田榮引兵東歸齊武信君獨追北使項羽沛公別攻城陽屠之括地志濮州雷澤縣本漢城陽在州東九十一里余按班志濟陰成陽縣有雷澤此成陽與定陶濮陽皆相近非城陽國之城陽班志濮陽縣屬東郡括地志濮陽縣在濮州西八十六里濮音卜又破之章邯復振李奇曰振整也如淳曰振起也收散卒自振迅而起環水文穎曰決水以自環守為固環音宦攻定陶八月田榮擊逐齊王假假亡走楚章十二行本楚下有田角亡走趙五字乙十一行本同孔本同張校同退齋校同田間前救趙因留不敢歸田榮迺立儋子巿為齊王榮相之田橫為將平齊地章邯兵益盛項梁數使使告齊趙發兵共擊章邯田榮曰楚殺田鍜趙殺角間乃出兵楚趙不許田榮怒終不肯出兵二年郎中令趙高班表郎中令秦官掌宮殿掖門戶臣瓚曰掌郎內諸臣故曰郎中令武帝改光祿勳以私怨誅殺人衆多恐大臣入朝奏事言之乃說二世曰天子之所以貴者但以聞聲㣥臣莫得見其面故也且陛下富於春秋謂少年此云春秋多也今坐朝廷譴舉有不當者譴去戰翻責也當丁浪翻則見短於大臣非所以示神明於天下也見賢遍翻陛下不如深拱禁中蔡邑曰本為禁中門閣有禁非侍御之臣不得妄入行道豹尾中亦為禁中事來有以揆之如此則大臣不敢奏疑事天下稱聖主矣二世用其計乃不坐朝廷見大臣常居禁中趙高侍中用事班表秦制侍中左右曹諸吏散騎中常侍皆加官所加或列侯卿大夫將軍將都尉尚書太醫太官令至郎中亡員多至數十人侍中中常侍得入禁中應劭曰入侍天子故曰侍中後漢志侍中比二千石掌侍左右贊導衆事顧問應對高聞李斯以為言乃見丞相曰關東㣥盜多今上急益發繇繇讀曰徭役也古字借用治阿房宮治直之翻聚狗馬無用之物臣欲諫為位賤為于偽翻下同此真君侯之事君何不諫李斯曰固也吾欲言之久矣今時上不坐朝廷常居深宮吾所言者不可傳也欲見無閒閒古莧翻隙也又讀曰閑餘暇也趙高曰君誠能諫請為君候上閒語君於是趙高侍章十二行本侍作待乙十一行本同孔本同張校同二世方燕樂婦女居前使人告丞相上方閒可奏事丞相至宮門上謁如此者三二世怒曰吾常多閒日丞相不來吾方燕私丞相輒來請事丞相豈少我哉且固我哉少我謂輕我以為幼少也固我謂輕我以為固陋也夫沙丘之謀丞相與焉事見上卷始皇三十七年與讀曰預而丞相貴不益此其意亦望裂地而王矣且陛下不問臣臣不敢言丞相長男李由為三川守楚盜陳勝等皆丞相傍縣之子傍縣近縣也李斯汝南上蔡人陳勝潁川陽城人汝南潁川相近也過三川城守章十二行本守作皆不肯擊高聞其文書相往來未得其審故未敢以聞且丞相居外權重於陛下二世以為然欲案丞相恐其不審乃先使人按驗三川守與盜通狀李斯聞之因上書言趙高之短曰高亶利亶害與陛下無異昔田常相齊簡公竊其恩威下得百姓上得㣥臣卒弒簡公而取齊國事見左傳卒子恤翻今高有邪佚之志危反之行行下孟翻私家之富若田氏之於齊矣而又貪欲無厭厭於鹽翻後以義推求利不止列勢次主言趙高居中用事其位列權勢次於人主也劫陛下之威信其志若韓王巳為韓安相也索隱曰王巳一作起並音怡韓大夫弒其君悼公者然韓無悼公或鄭之嗣君按表韓王巳事昭侯昭侯以下四世至王安斯說非也余觀李斯書意正以胡亥亡國之禍近在旦夕故指韓安以其用韓王巳而亡韓之事警動之韓安之時其臣必有韓王巳者特史逸其事耳李斯與韓安同時而韓安亡國之事接乎胡亥之耳目所謂殷鑒不遠也索隱於數百載之下議其說為非可乎信讀曰伸臣恐其必為變也二世曰何哉夫高故宦人也然不為安肆志不以危易心潔行脩善自使至此以忠得進以信守位朕實賢之所謂臨亂之君各賢其臣也行下孟翻何也且朕非屬趙君當誰任哉屬之欲翻且趙君為人精廉強力下知人情上能適朕君其勿疑二世雅愛趙章十二行本趙作信乙十一行本同高恐李斯殺之乃私告趙高高曰丞相所患者獨高高已死丞相即欲為田常所為是時盜賊益多而關中卒發東擊盜者無已右丞相馮去疾左丞相李斯將軍馮劫進諫曰關東㣥盜並起秦發兵誅章十二行本誅作追乙十一行本同擊所殺亡甚衆然猶不止盜多皆以戍漕轉作事苦戍征戍也漕水運也轉陸運也作役作也事苦言其事勞苦也請且止阿房宮作者減省四邊戍轉二世曰凡所為貴有天下者得肆意極欲主重明法謂君臣之勢上之所主者重則下之勢輕主重猶言居重也重如字康直龍切非也以制御四海矣夫虞夏之主貴為天子親處窮苦之實以徇百姓尚何於法言尚何事於法也處昌呂翻兼天下天下已定外攘四夷以安邊境作宮室以章得意而君觀先帝功業有緒今朕即位二年之間㣥盜並起君不能禁又欲罷先帝之所為是上無以報先帝次不為朕盡忠力何以在位下去疾斯劫吏下遐嫁翻案責他罪去疾劫自殺獨李斯就獄二世以屬趙高治之屬之欲翻責斯與子由謀反狀皆收捕宗族賓客趙高治斯榜掠千餘榜音彭笞擊也掠音亮考箠也不勝痛自誣服自誣以反而服其罪也勝音升斯所以不死者自負其辯有功實無反心欲上書自陳幸二世寤而赦之乃從獄中上書曰臣為丞相治民三十餘年矣治直之翻逮秦地之陿隘不過千里兵數十萬臣盡薄材陰行謀臣資之金玉使游說諸侯陰脩甲兵飭政教官鬬士尊功臣故終以脅韓弱魏破燕趙夷齊楚卒兼六國虜其王立秦為天子又北逐胡貉卒子恤翻貉莫客翻北方國豸種南定百越以見秦之強見賢遍翻更剋畫平斗斛度量文章布之天下以樹秦之名此皆臣之罪也臣當死久矣上幸盡其能力乃得至今願陛下察之書上趙高使吏棄去不奏曰囚安得上書趙高使其客十餘輩詐為御史謁者侍中更往覆訊斯御史之名周官有之戰國亦有御史秦趙澠池之會各命書其事則皆記事之職至秦漢為糾察之任更迭也覆審也訊問也更工衡翻輒使人復榜之後二世使人驗斯斯以為如前終不敢更言辭服奏當上奏當者獄具而奏當處其罪也漢路溫舒曰奏當之成雖咎繇聽之猶以為死有餘辜上時掌翻微趙君幾為丞相所賣幾居依翻及二世所使案三川守由者至則楚兵已擊殺之使者來會丞相下吏高皆妄為反辭以相傅會傅讀曰附凡傅會之傅皆同音遂具斯五刑論班志秦法當三族者皆先黥劓斬左右止笞殺之梟其首葅其骨肉於市其誹謗詈詛者又先斷舌謂之具五刑斯出獄與其中子俱執中讀曰仲顧謂其中子曰吾欲與若復牽黃犬俱出上蔡東門逐狡兔豈可得乎遂父子相哭而夷三族二世乃以趙高為丞相事無大小皆決焉二年項梁已破章邯於東阿引兵西北章十二行本北作比孔本同至定陶再破秦軍項羽沛公又與秦軍戰於雍丘班志雍丘縣屬陳留郡故國也史記正義曰雍丘今汴州縣斬李由項梁益輕秦有驕色宋義諫曰戰勝而將驕卒惰者敗今卒少惰矣秦兵日益臣為君畏之項梁弗聽乃使宋義使於齊道遇齊使者高陵君顯晉灼曰高陵縣屬琅邪郡公將見武信君乎曰然曰臣論武信君必敗公徐行即免死疾行則及禍二世悉起兵益章邯擊楚軍大破之定陶項梁死時連雨自七月至九月項羽沛公攻外黃未下班志外黃縣屬陳留郡張晏曰魏郡有內黃故曰外括地志曰故周城即外黃之地在雍丘縣之東攻陳留班志陳留縣屬陳留郡孟康曰留鄭邑也後為陳所幷故曰陳留臣瓚曰宋亦有留彭城留是也留屬陳者稱陳留括地志陳留汴州縣左州東五十里士卒恐乃與將軍呂臣引兵而東徙懷王自盱眙都彭城班志彭城縣屬楚國彭門記彭祖顓頊之玄孫至商末壽及七百六十七歲今墓猶存故邑號彭城項羽軍彭城西沛公軍碭二年魏豹下魏二十餘城楚懷王立豹為魏王二年後九月文穎曰即閏九月時律曆廢不知閏故謂之後九月如淳曰時因秦以十月為歲首至九月則歲終後九月即閏月師古曰文說非也若以律曆廢不知閏者則當徑謂之十月不應有後九月蓋秦之曆法應置閏者總置於歲末此意當取左傳歸餘於終耳何以明之據漢表及史記漢末改秦曆之前迄至高后文帝屢書後九月是知固然非曆廢也貢父曰予謂顏說後九月亦為未盡秦知置曆有閏何故皆以為九月乎蓋司馬氏為史記既以秦正月稱十月遂以閏月溥為後九月是司馬氏如此敍之非秦法也自將之以沛公為碭郡長蘇林曰長如郡守也將碭郡兵封項羽為長安侯號為魯公呂臣為司徒其父呂青為令尹二年章邯已破項梁以為楚地兵不足憂乃渡河北擊趙大破之引兵至邯鄲皆徙其民河內夷其城郭張耳與趙王歇走入鉅鹿城班志鉅鹿縣屬鉅鹿郡應劭曰鹿林之大者臣瓚曰山足曰鹿括地志曰今邢州平鄉城本鉅鹿宋白曰十三州志鉅鹿堯時大麓之地禹為大陸之野秦滅趙置鉅鹿郡鉅亦大稱也陳餘北收常山兵得數萬人軍鉅鹿北章邯軍鉅鹿南棘原趙數請救於楚數所角翻下同高陵君顯在楚見楚王曰宋義論武信君之軍必敗居數日軍果敗兵未戰而先見敗徵徵讀曰證此可謂知兵矣王召宋義與計事而大說之說讀曰悅因置以為上將軍項羽為次將范增為末將以救趙諸別將皆屬宋義號為卿子冠軍如淳曰卿者大夫之號子者子男之爵冠軍人之首也文穎曰卿子人相褒尊之稱猶言公子也上將故言冠軍劉伯莊曰公之子為公子卿子謂卿之子也師古曰冠軍言其在諸軍之上初楚懷王與諸將約先入定關中者王之秦地西有隴關東有函谷關南有武關北有臨晉關西南有散關秦地居其中故謂之關中註已見前秦兵強常乘勝逐北諸將莫利先入關言莫有以入關為利者蓋畏秦也奮章乙十一行本奮下有勢字孔本同張校同願與沛公西入關懷王諸老將皆曰項羽為人慓悍猾賊慓疾也悍勇也猾狡也賊殘害也慓頻妙翻又匹妙翻悍下旦翻又下罕翻襄城無遺類皆阬之諸所過無不殘滅且楚數進取前陳王項梁皆敗不如更遣長者扶義而西師古曰扶助也以義自助也余謂扶義猶言杖義也秦父兄苦其主久矣今誠得長者往無侵暴宜可下項羽不可遣獨沛公素寬大長者可遣懷王乃不許項羽而遣沛公西略地收陳王項梁散卒以伐秦沛公道碭至陽城與杠里道碭自碭取道而西也此據班書書之陽城史記作成陽韋昭註曰在潁川則是謂陽城也索隱曰在濟陰則是謂成陽也杠里孟康服虔皆以為縣名而班志無之余按沛公之兵自碭而攻秦道成陽與杠里而後破東郡尉於成武成陽縣屬濟陰成武縣屬山陽濟陰唐為曹州成武屬焉若取道潁川之陽城當自此西趨洛陝安得復至成武耶書成陽為是杠里之地蓋在成陽成武之間杠音江破其二軍三年三年冬十月齊將田都畔田榮助楚救趙為項羽封田都張本三年沛公攻破東郡尉於成武秦滅衞置東郡尉郡尉也班志成武即衞楚丘地括地志今曹州縣三年宋義行至安陽師古曰今相州安陽縣索隱曰傅寬傳云從攻安陽杠里則當俱在河南師古以為相州縣按此兵猶未渡河不應即至相州安陽後魏書地形志己氏有安陽城後改己氏為楚丘今宋州楚丘西北四十里有安陽故城是也項羽曰秦圍趙急宜疾引兵渡河楚擊其外趙應其內破秦軍必矣宋義曰不然夫搏牛之蝱不可以破蟣蝨蘇林曰蝱喻秦蝨喻章邯等言小大不同勢欲滅秦當先寬邯等也如淳曰言本欲以大力伐秦而不可以救趙也師古曰搏擊也言以手擊牛之背可以殺其上蝱而不能破蝨今將兵力欲滅秦不可盡力與邯鄲即未能禽徒費力也如說近之搏音博蝱音盲蟣居喜翻蝨音瑟戰勝則兵疲我承其敝不勝則我引兵鼓行而西必舉秦矣鼓行者擊鼓而行堂堂之陳也夫被堅執銳義不如公坐運籌策公不如義因下令軍中曰有猛如虎狠如羊狠何墾翻此併下三語指項羽也貪如狼強不可使者皆斬之乃遣其子宋襄相齊身送之至無鹽班志東平國有無鹽縣索隱曰在今鄆州之東師古曰高會者大會也天寒大雨士卒凍飢項羽曰將勠力而攻秦久留不行今歲饑民貧士卒食半菽菽豆也臣瓚曰士卒食蔬菜以菽雜半之言軍無見在之糧見賢遍翻不引兵渡河因趙食與趙幷力攻秦乃曰承其敝夫以秦之強攻新造之趙其勢必舉趙舉秦強何敝之承且國兵新破王坐不安席掃境內而專屬於將軍屬之欲翻下道屬同國家安危在此一舉今不恤士卒而徇其私非社稷之臣也徇其私謂身送其子相齊也十一月項羽晨朝上將軍宋義朝直遙翻即其帳中斬宋義頭出令軍中曰宋義與齊謀反楚楚王陰令籍誅之當是時諸將皆慴服莫敢枝梧如淳曰枝梧猶枝扞也臣瓚曰小柱為枝邪柱為梧今屋極邪柱也首立楚者將軍家也今將軍誅亂乃相與共立羽為假上將軍以未得懷王之命故且為假及之齊殺之使桓楚報命於懷王懷王因使羽為上將軍三年十二月沛公引兵至栗遇剛武侯應劭曰剛武侯楚懷王將功臣表棘蒲剛侯陳武武一姓柴宜為剛侯武魏將也孟康曰功臣表以將軍起薛至霸上入漢中非懷王將又非魏將例未有稱諡者師古曰史失其姓名惟識其爵號不知誰也不當改剛武侯為剛侯武應說非也幷之與魏將皇欣武滿軍合攻秦軍破之皇姓也左傳鄭有大夫皇頡三年故齊王建孫安下濟北濟水以北之地聊城博陽諸城是也為項羽王田安張本三年章邯築甬道屬河餉王離恐敵抄其糧運故夾築垣牆以通餉道屬之欲翻餉式亮翻急攻鉅鹿鉅鹿城中食盡兵少張耳數使人召前陳餘召前者召陳餘使前救鉅鹿也不敵秦不敢前度徒洛翻下同數月張耳大怒怨陳餘使張黶陳澤往讓陳餘曰史記正義澤音釋始吾與公為刎頸交今王與耳旦暮且死而公擁兵數萬不肯相救安在其相為死相為于偽翻下欲為同苟必信胡不赴秦軍俱死且有十一二相全言十分之中冀有一二分得以勝秦而相保全也吾度前終不能救趙徒盡亡軍度徒洛翻且餘所以不俱死欲為趙王張君報秦今必俱死如以肉委餓虎何益張黶陳澤要以俱死餘乃使黶澤將五千人先嘗秦軍嘗試也皆沒當是時齊師燕師皆來救趙張敖亦北收代兵得萬餘人來張敖耳之子也未敢擊秦項羽已殺卿子冠軍威震楚國乃遣當陽君蒲將軍將卒二萬渡河救鉅鹿戰少利言其戰略有利也王離軍乏食陳餘復請兵復扶又翻項羽乃悉引兵渡河皆沈船破釜甑燒廬舍持三日糧以示士卒必死無一還心於是至則圍王離與秦軍遇九戰大破之章邯引兵卻諸侯兵乃敢進擊秦軍遂殺蘇角虜王離涉閒不降自燒殺涉姓也閒名也楚兵冠諸侯冠古玩翻軍救鉅鹿者十餘壁莫敢縱兵及楚擊秦諸侯將章十二行本將下有皆字乙十一行本同孔本同張校同從壁上觀楚戰士無不一當十呼聲動天地將即亮翻呼火故翻諸侯軍無不人人惴恐惴之睡翻於是已破秦軍項羽召見諸侯將諸侯將入轅門張晏曰軍行以車為陳轅相向為門師古曰周禮掌舍王行則設車宮轅門杜佑曰昂車以其轅表門莫敢仰視項羽由是始為諸侯上將軍諸侯皆屬焉於是趙王歇及張耳乃得出鉅鹿城謝諸侯張耳與陳餘相見責讓陳餘以不肯救趙及問張黶陳澤所在疑陳餘殺之數以問餘數所角翻餘怒曰不意君之望臣深也望怨望也又責望也爾雅翼曰怨者必望故以望為怨不意君之望臣深是也重難也言豈以去將印為難也豈疑辭重如字推與張耳推通回翻張耳亦愕不受陳餘起如廁客有說張耳曰臣聞天與不取反受其咎索隱曰此辭出國語君不受反天不祥急取之張耳乃佩其印收其麾下而陳餘還亦望張耳不讓遂趨出獨與麾下所善數百人之河上澤中漁獵為張耳陳餘相攻殺張本春二月沛公北擊昌邑班志昌邑縣屬山陽郡括地志曰曹州成武縣東北三十二里有梁丘故城是也賢曰昌邑故城在兗州金鄉縣西北彭越以其兵從沛公姓譜彭姓大彭之後昌邑人常漁鉅野澤中為㣥盜班志山陽郡鉅野縣有大野澤鉅野縣唐屬鄆州澤間少年相聚百餘人往從彭越曰請仲為長彭越字仲長知兩翻下同臣不願也少年強請乃許強其兩翻與期旦日日出會索隱曰旦日謂明日之朝日出時也旦日日出十餘人後後者至日中於是越謝曰臣老諸君強以為長今期而多後不可盡誅誅最後者一人令校長斬之校長一校之長何至於章十二行本無於字乙十一行本同孔本同是請後不敢於是越引一人斬之設壇祭令徒屬章乙十一行本重徒屬二字皆大驚莫敢仰視乃略地收諸侯散卒得千餘人遂助沛公攻昌邑昌邑未下沛公引兵西過高陽文穎曰高陽聚邑名屬陳留圉縣臣瓚曰陳留傳高陽在雍丘西南水經註睢水首受陳留浚儀浪蕩水東逕高陽故亭北家貧落魄酈音歷姓譜黃帝之支孫封於酈後以為氏食其音異基鄭氏曰魄音薄應劭曰落魄志行衰薄之貌師古曰落魄失業無次也為里監門沛公麾下騎士適食其里中人食其見謂曰諸侯將過高陽者數十人吾問其將皆握齪好苛禮握齪急促貌苛細也齪初角翻不能聽大度之言吾聞沛公慢而易人多大略易以鼓翻此真吾所願從游莫為我先索隱曰先謂先容言無人為我作紹介也若汝也年六十餘長八尺人皆謂之狂生生自謂我非狂生騎士曰沛公不好儒諸客冠儒冠來者客冠古玩翻沛公輒解其冠溲溺其中溲所由翻溺乃弔翻溲即溺也與人言常大罵未可以儒生說也酈生曰第言之第但也如酈生所誡者從千容翻沛公至高陽傳舍師古曰傳置之舍人所止息前人已去後人復來轉相傳也傳張戀翻酈生至入謁沛公方倨牀使兩女子洗足而見酈生倨與踞同洗先典翻樂彥曰牀邊曰倨則長揖不拜曰足下欲助秦攻諸侯乎且欲率諸侯破秦也沛公罵曰豎儒天下同共章十二行本無共字乙十一行本同孔本同苦秦久矣故諸侯相率而攻秦何謂助秦攻諸侯乎酈生曰必聚徒合義兵誅無道秦不宜倨見長者於是沛公輟洗起攝衣史記正義曰攝斂著也余謂攝衣起而持其衣也謝之酈生因言六國從橫時沛公喜賜酈生食問曰計將安出酈生曰足下起糾合之衆收散亂之兵不滿萬人欲以徑入強秦此所謂探虎口者也探吐南翻夫陳留天下之衝四通五達之郊也如淳曰四面往來通之幷數中英為五達也臣瓚曰四通五達言無險阻臣善其令請得使之令下足下令下之令力丁翻使也下降也即不聽足下引兵攻之臣為內應於是遣酈生行沛公引兵隨之遂下陳留號酈食其為廣野君酈生言其弟商時商聚少年得四千人來屬沛公沛公以為將將陳留兵以從酈生常為說客使諸侯三年三月沛公攻開封未拔班志開封縣屬河南郡宋白曰今縣南五十里開封古城是漢理所又戰曲遇東後漢志河南中牟縣有曲遇聚蘇林曰曲音齲遇音顒師古曰齲音丘羽翻楊熊走之滎陽二世使使者斬之以徇夏四月沛公南攻潁川屠之潁川郡治陽翟遂略韓地文潁曰河南新鄭南至潁川皆韓地也張良家世相韓故因之沛公乃北攻平陰班志平陰縣屬河南郡史記正義曰今河陰是戰洛陽東軍不利南出轘轅後漢志河南緱氏縣有轘轅關臣瓚曰險道名也在緱氏縣東南索隱曰轘轅為九十二曲是險道也轘音環沛公令韓王成留守陽翟與良俱南六月與南陽守齮戰犨東破之齮魚豈翻班志犨縣屬南陽郡水經註滍水出魯陽縣西逕犨縣故城北犨昌牛翻略南陽郡南陽守走保城守宛宛南陽郡治所括地志曰宛故城在宛大城之南隅其西南有二面是師古曰宛於元翻西張良諫曰沛公雖欲急入關秦兵尚衆距險依險以距敵也宛從後擊強秦在前此危道也於是沛公乃夜引軍從他道還偃旗幟旗旂之屬幟即幖也或曰旗幟總稱幟昌志翻圍宛城三匝文穎曰遲未也天未明之頃已圍其城矣師古曰文說得其大意耳此言圍城事畢然後天明明遲於事故曰遲明變為去聲音丈二翻其舍人陳恢曰死未晚也乃踰城見沛公曰臣聞足下約先入咸陽者王之今足下留守宛宛郡縣連城數十其吏民自以為降必死故皆堅守乘城今足下盡日止章十二行本止作上乙十一行本同攻士死傷者必多引兵去宛宛必隨足下後足下前則失咸陽之約後有強宛之患為足下計莫若約降封其守因使止守引其甲卒與之西諸城未下者聞聲爭開門而待足下足下通行無所累累力瑞翻沛公曰善秋七月南陽守齮降封為殷侯封陳恢千戶引兵西無不下者至丹水班志丹水縣屬弘農郡括地志曰故丹城在鄧州內鄉縣西南百二十里南去丹水二百步汲冢紀年曰后稷放帝子丹朱於丹水輿地志云即秦時丹水縣鰓音魚鰓之鰓先才翻人名也史失其姓韋昭曰漢封王陵為安國侯陵初起兵在南陽南陽有穰縣疑襄當為穰而無禾字省耳臣瓚曰時韓成封穰侯江夏有襄是陵所封也師古曰王陵亦非安國者韋昭改襄為穰蓋亦穿鑿索隱曰王陵封安國侯是定天下為丞相時封耳此言襄侯當如臣瓚解蓋初封江夏之襄也還攻胡陽遇番君別將梅鋗姓譜梅本自子姓殷有梅伯為紂所醢皆降班志南陽郡有湖陽縣故廖國析縣屬弘農郡本楚之白羽也酈縣屬南陽郡師古曰析今內鄉縣酈今菊潭縣鋗呼玄翻析先歷翻酈直益翻又郎益翻廖力救翻亡古毋無二字通鹵與虜同三年王離軍既沒章邯軍棘原項羽軍漳南括地志濁漳水一名漳水今俗名柳河在邢州平鄉縣南秦軍數卻數所角翻二世使人讓章邯章邯恐使長史欣請事至咸陽留司馬門師古曰凡言司馬門者宮垣之內兵衞所在四面皆有司馬主武事總言之外門為司馬門趙高不見有不信之心長史欣恐還走其軍走音奏不敢出故道趙高果使人追之不及欣至軍報曰趙高用事於中下無可為者今戰能勝高必疾妬吾功不能勝不免於死願將軍孰計之孰古熟字通後以義推陳餘亦遺章邯書曰白起為秦將南征鄢郢北阬馬服攻城略地不可勝計而竟賜死馬服謂趙括也白起事並見五卷赧王紀遺于季翻勝音升北逐戎人開榆中地數千里竟斬陽周事見上卷始皇紀功多秦不能盡封因以法誅之今將軍為秦將三歲矣所亡失以十萬數而諸侯並起滋益多彼趙高素諛日久今事急亦恐二世誅之故欲以法誅將軍以塞責使人更代將軍以脫其禍夫將軍居外久多內卻塞悉則翻更工衡翻郤讀曰隙有功亦誅無功亦誅且天之亡秦無愚智皆知之今將軍內不能直諫外為亡國將孤特獨立而欲常存豈不哀哉將軍何不還兵與諸侯為從從子容翻約共攻秦分王其地南面稱孤此孰與身伏鈇質妻子為戮乎何林曰伏鈇質要斬之罪崔浩曰質斬人椹也師古曰質謂鍖也古者斬人加於鍖上而斫之鈇音夫又匪父翻章邯狐疑狐性多疑每渡河聽產且聽且渡故以喻人之懷疑不決者鄭氏曰候軍候也始姓也成名也約未成項羽使蒲將軍日夜引兵渡三戶服虔曰三戶漳水津也孟康曰在鄴西三十里水經註曰漳水東逕三戶峽為三戶津括地志三戶津在相州滏陽縣界與秦軍戰再破之項羽悉引兵擊秦軍汙水上水經註汙水出武安山東南逕汙城北入漳郡國志鄴縣有汙城師古曰汙水在鄴西南史記正義曰汙水源出懷州河內縣太行山又云故邘城在河內縣西北二十七里古邘國地也余據此時章邯與項羽相持於邢相之間正義以為河內汙水非也汙音于章邯使人見項羽欲約項羽召軍吏謀曰糧少欲聽其約軍吏皆曰善項羽乃與期洹水南殷虛上應劭曰洹水在湯陰界殷虛故殷都也臣瓚曰洹水在今安陽縣北去朝歌殷都一百五十里然則此殷虛非朝歌也汲冢古文曰昔殷盤庚遷於北冢曰殷虛南去鄴三十里是舊殷乎然則朝歌非盤庚所遷者索隱曰按釋例洹水出汲郡林慮縣東北至長樂入清水是也汲冢古文曰盤庚自奄遷于北冢曰殷虛南去鄴三十里是殷虛舊地名號北冢也宋白曰相州安陽縣其地即紂之都戰國策云紂聚兵百萬左飲淇水竭右飲洹水不流按邑地在淇洹二水之間本殷墟所謂北冢即此地七國時為魏寧新中邑史記曰秦昭襄王拔魏寧新中邑更名安陽虛讀與墟字同章邯見項羽而流涕為言趙高項羽乃立章邯為雍王為言之為于偽翻雍於用翻置楚軍中使長史欣為上將軍將秦軍為前行行戶剛翻三年瑕丘申陽下河南引兵從項羽服虔曰瑕丘縣名申姓陽名也班志山陽郡有瑕丘縣瑕音遐河南即漢河南郡地姓譜四岳之後封於申周有申伯左傳齊有申鮮虞楚有申叔三年初中丞相趙高史記李斯既死二世拜趙高為中丞相蓋以其宦人得入禁中恐㣥臣不聽乃先設驗持鹿獻於二世曰馬也二世笑曰丞相誤邪謂鹿為馬問左右章十二行本重左右二字乙十一行本同或默或言馬以阿順趙高或言鹿者高因陰中諸言鹿者以法中竹仲翻後㣥臣皆畏高莫敢言其過高前數言關東盜無能為也及項羽虜王離等而章邯等軍數敗數所角翻上書請益助自關以東大抵盡畔秦吏應諸侯諸侯咸率其衆西鄉鄉讀曰嚮八月沛公將數萬攻武關屠之高恐二世怒誅及其身乃謝病不朝見二世夢白虎齧其左驂馬殺之以馬駕車夾轅曰服兩旁曰驂驂七含翻樂音洛怪問占夢周禮春官之屬有占夢掌其歲時觀天地之會辨陰陽之氣以日月星辰占六夢之吉凶一曰正夢二曰噩夢三曰思夢四曰寤夢五曰喜夢六曰懼夢涇水為祟祟雖遂翻人禍也鬼厲也二世乃齋於望夷宮張晏曰望夷宮在長陵西北長平觀道東故亭處是也臨涇水作之以望北夷括地志曰在雍州咸陽縣東南八里沈四白馬沈持林翻使使責讓高以盜賊事高懼乃陰與其壻咸陽令閻樂姓譜太伯曾孫仲奕封於閻鄉又曰唐叔虞之後晉成公子懿食采於閻左傳齊有閻職晉有閻嘉上不聽諫今事急欲歸禍於吾欲易置上更立子嬰子嬰仁儉百姓皆載其言乃使郎中令為內應詐為有大賊令樂召吏發卒追劫樂母置高舍遣樂將吏卒千餘人至望夷宮殿門縛衞令僕射曰衞尉掌宮門屯兵其屬有衞士令秦官自侍中尚書博士郎及軍屯吏騶永巷皆有僕射取其領事之號賊入此何不止衞令曰周廬設卒甚謹胡廣曰周廬者衞士於周垣內為區廬師古曰區廬者今之仗宿屋薛綜曰士傅宮外內為廬舍晝則巡行非常夜則警備不虞敢入宮樂遂斬衞令直將吏入行射郎宦者射而亦翻郎屬郎中令宦者屬少府郎宦者大驚或走或格格者輒死死者數十人郎中令與樂俱入射上幄坐幃三禮圖曰上下四旁悉周曰幄幄乙角翻幃羽非翻單帳也召左右左右皆惶擾不鬬旁有宦者一人侍不敢去二世入內謂曰公何不早告我乃至於此宦者曰臣不敢言故得全使臣早言皆已誅安得至今閻樂前即二世即就也足下驕恣誅殺無道天下共畔足下足下其自為計二世曰丞相可得見否樂曰不可二世曰吾願得一郡為王弗許又曰願為萬戶侯弗許曰願與妻子為黔首比諸公子閻樂曰臣受命於丞相為天下誅足下為于偽翻足下雖多言臣不敢報麾其兵進二世自殺閻樂歸報趙高趙高乃悉召諸大臣公子告以誅二世之狀曰秦故王國始皇君天下故稱帝今六國復自立秦地益小乃以空名為帝不可宜章十二行本宜下有為王二字乙十一行本同孔本同如故便乃立子嬰為秦王以黔首葬二世杜南宜春苑中宜春苑在杜縣南漢起宜春觀於此地九月趙高令子嬰齋戒章十二行本無戒字乙十一行本同當廟見受玉璽玉璽即以卞和玉所刻傳國璽見賢遍翻子嬰與其子二人謀曰丞相高穀二世望夷宮恐㣥臣誅之乃詐章十二行本詐作詳孔本同乙十一行本作佯張校作徉以義立我我聞趙高乃與楚約滅秦宗室而分王關中今使我齋見廟此欲因廟中殺我我稱病不行丞相必自來來則殺之高使人請子嬰數輩子嬰不行高果自往曰宗廟重事王柰何不行子嬰遂刺殺高於齋宮刺七亦翻三族高家以徇遣將兵距嶢關應劭曰嶢山之關李奇曰在上洛北藍田南武關之西土地記嶢關地名嶢柳道通荊州晉地道記曰嶢關當上洛西北嶢音堯張良曰秦兵尚強未可輕願先遣人益張旗幟於山上為疑兵使酈食其陸賈往說秦將啗以利師古曰啗者本為食啗耳音徒敢翻以食餧人令其啗食音則改變為徒濫翻今言以利誘之取食為譬秦將果欲連和沛公欲許之張良曰此獨其將欲叛恐其士卒不從不如因其懈怠擊之沛公引兵繞嶢關踰蕢山宋敏求長安志曰嶢關即藍田關在縣東南九十里蕢山在縣東南二十五里蕢鄭氏音匱師古從蘇林音蒯大破之藍田南遂至藍田又戰其北秦兵大敗聶崇岐標點顧頡剛覆校
