body:
  text: 資治通鑑卷第二百七十四端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千六百戶食實封一千戶臣司馬光奉敕編集後學天台音註後唐紀三莊宗光聖神閔孝皇帝下同光三年同光三年乙酉九二五同光三年十一月丙申蜀主至成都百官及後宮迎于七里亭亭去成都城七里因以為名效回鶻曳隊以入宮丁酉出見㣥臣於文明殿按五代會要梁開明元年改洛陽宮貞觀殿為文明殿貞觀殿洛陽宮前殿也唐昭宗遷洛後更名今蜀亦有文明殿蜀宮倣唐宮之制意文明唐末殿名也君臣相視竟無一言以救國患戊戌李紹琛至利州脩桔柏浮梁桔柏浮梁為蜀所斷故脩之以濟蜀置昭武節度於利州九域志利州東南至閬州二百三十五里甲辰魏王繼岌至劍州九域志劍州東北至利州一百九十里蜀置武信軍於遂州王宗弼至成都登大玄門嚴兵自衞蜀主及太后自往勞之勞力到翻宗弼驕慢無復臣禮乙巳劫遷蜀主及太后後宮諸王于西宮收其璽綬璽斯氏翻綬音受使親吏於義興門邀取內庫金帛悉歸其家其子承涓杖劍入宮取蜀主寵姬數人以歸涓圭淵翻丙午宗弼自稱權西川兵馬留後李紹琛進至綿州九域志劍州西至綿州二百八十里又斷綿江浮梁斷丁管翻綿州謂之左綿以綿水逕其左故也水深無舟楫可渡紹琛謂李嚴曰吾懸軍深入利在速戰乘蜀人破膽之時但得百騎過鹿頭關彼且迎降不暇降戶江翻下同若俟脩繕橋梁必留數日或教王衍堅閉近關折吾兵勢近關即謂鹿頭關折之舌翻則勝負未可知矣言深入之兵利於飄忽震蕩難以持久從兵得濟者僅千人從才用翻溺死者亦千餘人遂入鹿頭關丁未進據漢州九域志綿州西南至漢州一百八十九里後軍始至宗弼遣使以幣馬牛酒勞軍且以蜀主書遺李嚴遺唯季翻曰公來吾即降或謂嚴或謂嚴者或以人語嚴也公首建伐蜀之策事見上卷上年不可往嚴不從欣然馳入成都九域志漢州南至成都九十五里告以大軍繼至蜀君臣後宮皆慟哭蜀主引嚴見太后以母妻為託宗弼猶乘城為守備嚴悉命撤去樓櫓乘登也去羌呂翻己酉魏王繼岌至綿州蜀主命翰林學士李昊草降表又命中書侍郎同平章事王鍇草降書降表以上皇帝降書以達軍前鍇口駭翻王宗弼稱蜀君臣久欲歸命而內樞密使宋光嗣景潤澄宣徽使李周輅歐陽晃熒惑蜀主皆斬之函首送繼岌又責文思殿大學士禮部尚書成都尹韓昭佞諛梟于金馬坊門金馬坊在成都城中以有金馬碧雞祠因而名坊又有碧雞坊傾其家金帛妓妾以賂宗弼僅得免死妓渠綺翻凡素所不快者宗弼皆殺之辛亥繼岌至德陽九域志德陽縣在漢州東北八十五里稱已遷蜀主於西第已奉表降唐不敢稱西宮故稱西第以俟王師又使其子承班以蜀主後宮及珍玩賂繼岌及郭崇韜求西川節度使繼岌曰此皆我家物奚以獻為留其物而遣之宗弼之獻繼岌之留賢不肖之相去其間不能以寸李紹琛留漢州八日以俟都統都統繼岌也甲寅繼岌至漢州王宗弼迎謁乙卯至成都丙辰李嚴引蜀主及百官儀衞出降於升遷橋按薛史升遷橋在成都北五里草繩縈首百官衰絰徒跣輿櫬號哭俟命衰倉回翻櫬初覲翻空棺為櫬號戶刀翻繼岌受璧崇韜解縛焚櫬承制釋罪君臣東北向拜謝唐昭宗大順二年王建取蜀至衍而亡丁巳大軍入成都崇韜禁軍士侵掠市不改肆自出師至克蜀凡七十日考異曰實錄自興師出洛至定蜀城計七十五日薛史因之按唐軍九月戊申離洛城十一月丁巳入成都止七十日耳實錄薛史誤也武德武信永平武泰鎮江山南武定天雄武興昭武凡十節度西川為蜀都不與也歐史職方考前蜀所有益漢彭蜀綿眉嘉劍梓遂果閬普陵資榮簡邛黎雅維茂文龍黔施夔忠萬歸峽興利開通涪渝瀘合昌巴蓬集壁渠戎梁洋金秦鳳階成五十三州而已兵三萬鎧仗錢糧金銀繒錦共以千萬計繒慈陵翻高季興聞蜀亡方食失匕箸箸遲倨翻曰是老夫之過也高季興勸伐蜀見二百七十二卷元年不足憂也唐主得蜀益驕亡無日矣梁震之料莊宗如燭照數計章十二行本無不字乙十一行本同張校同知其不為吾福荊南之福則未聞也以三郡之地介乎強國之間惴惴僅能自全何福之有楚王殷聞蜀亡上表稱臣已營衡麓之間為菟裘之地衡麓衡山之麓也山足曰麓左傳魯隱公使營菟裘吾將老焉馬殷言將致事而歸老於衡麓聞蜀亡而懼也菟同都翻齡年也記文王世子曰古者謂年齡齒亦齡也上時掌翻同光三年平蜀之功李紹琛為多位在董璋上而璋素與郭崇韜善崇韜數召璋與議軍事數所角翻紹琛心不平謂璋曰吾有平蜀之功公等樸樕相從樸蒲木翻樕蘇谷翻樸樕小木以喻董璋小材也反呫囁於郭公之門呫叱涉翻囁而涉翻呫囁細語也謀相傾害吾為都將帝命李紹琛為行營馬步軍都指揮使董璋為左廂虞候故云然璋訴于崇韜十二月崇韜表璋為東川節度使考異曰莊宗實錄十二月丙寅以靜難節度使董璋為東川節度副大使又康延孝傳云郭崇韜除董璋為東川節度使延孝與華州節度使毛璋見崇韜請以工部任尚書為東川帥崇韜怒曰紹琛反邪敢違吾節度不及二旬崇韜為繼岌所害按大軍以十一月二十八日丁巳入西川至十二月八日丙寅除董璋東川凡十日明年正月八日殺崇韜至此凡六十日而云不及二旬崇韜遇害日月殊不相合蓋十二月丙寅崇韜始表璋鎮東川之日耳非降制日也云不及二旬亦恐誤解董璋軍職則李紹琛不得以軍法令之此崇韜之所以保護董璋者也曰吾冒白刃陵險阻定兩川璋乃坐有之邪冒莫北翻乃見崇韜言東川重地任尚書有文武才宜表為帥任圜時以工部尚書參預軍機帥所類翻紹琛反邪何敢違吾節度紹琛懼而退初帝遣宦者李從襲等從魏王繼岌伐蜀繼岌雖為都統軍中制置補署一出郭崇韜崇韜終日決事將吏賓客趨走盈庭而都統府惟大將晨謁外牙門索然索蘇各翻索然言寂寞也從襲等固恥之及破蜀蜀之貴臣大將爭以寶貨妓樂遺崇韜及其子廷誨妓渠綺翻遺唯季翻魏王所得不過匹馬束帛唾壺麈柄而已麈之庾翻從襲等益不平王宗弼之自為西川留後也賂崇韜求為節度使崇韜陽許之考異曰實錄薛史皆云崇韜以蜀帥許之按崇韜有識略豈可興大兵取西川反以與宗弼乎此庸人所不為也蓋於時宗弼尚據成都崇韜恐其悔而違拒故陽許之以安其意耳乃帥蜀人列狀見繼岌請留崇韜鎮蜀帥讀曰率從襲等因謂繼岌曰郭公父子專橫橫戶孟翻今又使蜀人請己為帥帥所類翻其志難測王不可不為之備繼岌謂崇韜曰主上倚侍中如山嶽不可離廟堂郭崇韜官侍中故繼岌稱之離力智翻且此非余之所敢知也請諸人詣闕自陳由是繼岌與崇韜互相疑此段自平蜀之功以下為李紹琛反張本自初帝遣李從襲從繼岌以下為殺郭崇韜張本會宋光葆自梓州來訴王宗弼誣殺宋光嗣等又崇韜徵犒軍錢數萬緡於宗弼宗弼靳之犒苦到翻靳居焮翻士卒怨怒夜縱火諠譟崇韜欲誅宗弼以自明己巳白繼岌收宗弼及王宗勳王宗渥皆數其不忠之罪數所具翻族誅之籍沒其家蜀人爭食宗弼之肉同光三年辛未閩忠懿王審知卒年六十四延翰字子逸審知長子也延翰遣右軍都監柳邕等將兵二萬討之監古銜翻同光三年癸酉王承休王宗汭至成都十月自秦州上道為始至成都居大鎮擁強兵何以不拒戰對曰畏大王神武曰然則何以不降對曰王師不入境曰所俱入羌者幾人對曰萬二千人曰今歸者幾人對曰二千人曰可以償萬人之死矣皆斬之幷其子同光三年丙子以知北都留守事孟知祥為西川節度使同平章事促召赴洛陽召之至洛陽而後赴鎮為孟知祥據蜀張本樞密承旨段徊等惡鄴都留守張憲不欲其在朝廷段徊必宦人也北都非張憲不可憲雖有宰相器郭崇韜薦張憲為相帝欲用之故段徊等云然宰相在天子目前事有得失可以改更更工衡翻比之北都獨繫一方安危不為重也乃徙憲為太原尹知北都留守事以尹知留守事非正為留守也知鄴都留守事正言昏耄帝以武德使史彥瓊為鄴都監軍後唐武德使本掌宮中事明宗時嘗旱已而雪暴坐庭中詔武德司宮中無掃雪是其證也本伶人也有寵於帝魏博等六州軍旅金穀之政皆決於彥瓊威福自恣陵忽將佐自正言以下皆諂事之為王正言史彥瓊不能守鄴都張本同光三年初帝得魏州銀槍效節都近八千人以為親軍見二百六十九卷梁均王貞明元年近其靳翻夾河之戰實賴其用屢立殊功常許以滅梁之日大加賞賚既而河南平梁滅而河南平而士卒恃功驕恣無厭厭於鹽翻更成怨望是歲大饑民多流亡租賦不充道路塗潦漕輦艱澀漕水運輦陸運澀色立翻無以給軍士租庸使孔謙日於上東門外洛城東面三門中曰建春左曰上東右曰永通九域志洛陽上東門建春門皆為鎮屬河南縣蓋喪亂丘墟非復盛唐之舊也至者隨以給之軍士乏食有雇妻鬻子者老弱採蔬於野百十為㣥往往餒死流言怨嗟而帝遊畋不息己卯獵於白沙皇后皇子後宮畢從庚辰宿伊闕辛巳宿潭泊壬午宿龕澗癸未還宮自白沙至龕澗其地皆在洛陽東按薛史李愚避難居洛表白沙之別墅龕澗近伊闕從才用翻龕苦含翻吏卒有僵仆於道路者伊汝間饑尤甚衞兵所過責其供餉不得則壞其什器僵居良翻壞音怪撤其室廬以為薪甚於寇盜縣吏皆竄匿山谷同光三年有白龍見於漢宮漢主改元白龍更名曰龔見賢遍翻更工衡翻同光三年長和驃信鄭旻遣其布燮鄭昭淳求婚于漢漢主以女增城公主妻之長和即唐之南詔也唐末南詔改曰大禮至是又改曰長和五代會要曰郭崇韜平蜀之後得王衍所得蠻俘數十以天子命令使人入其部被止於界上惟國信蠻俘得往續有轉牒稱督爽大長和國宰相布燮等上大唐皇帝舅奏疏一封差人轉送黎州其紙厚硬如皮筆力遒健有詔體後有督爽陀酋忍爽王寶督爽彌勒忍爽董德義督爽長垣緯忍爽楊希燮等所署有彩牋一軸轉韻詩一章章三韻共十聯有類擊筑詞頗有本朝姻親之意語亦不遜同光三年成德節度使李嗣源入朝同光三年閏月己丑朔孟知祥至洛陽帝寵待甚厚同光三年帝以軍儲不足謀於㣥臣豆盧革以下皆莫知為計吏部尚書李琪上疏以為古者量入以為出量音良計農而發兵故雖有水旱之災而無匱乏之憂近代稅農以養兵未有農富給而兵不足農捐瘠而兵豐飽者也今縱未能蠲省租稅苟除折納紐配之法折納謂抑民使折估而納其所無紐配謂紐數而科配之也帝即敕有司如琪所言然竟不能行同光三年丁酉詔蜀朝所署官四品以上降授有差五品以下才地無取者悉縱歸田里其先降及有功者委崇韜隨事獎任又賜王衍詔略曰固當裂土而封必不薄人於險三辰在上一言不欺誓之以三辰而終殺之非信也同光三年庚子彰武保大節度使兼中書令高萬興卒梁貞明四年高萬興兼鎮鄜延唐以延州置保塞軍岐改為忠義軍後唐改為彰武軍鄜保大軍同光三年帝以軍儲不充欲如汴州諫官上言不如節儉以足用自古無就食天子今楊氏未滅不宜示以虛實謂吳近在淮南不宜使之知中國虛實上時掌翻同光三年辛亥立皇弟存美為邕王存霸為永王存禮為薛王存渥為申王存乂為睦王存確為通王存紀為雅王同光三年郭崇韜素疾宦官嘗密謂魏王繼岌曰大王他日得天下騬馬亦不可乘騬食陵翻犗馬也以喻宦官史炤曰犗音戒俗呼扇馬為改馬即犗馬也況任宦官宜盡去之專用士人去羌呂翻呂知柔竊聽聞之呂知柔時為都統牙通謁時成都雖下而蜀中盜賊㣥起布滿山林崇韜恐大軍既去更為後患命任圜張筠分道招討以是淹留未還帝遣宦者向延嗣促之崇韜不出郊迎及見禮節又倨宦官固可疾然天子使之將命敬之者所以敬君也烏可倨見哉唐莊宗使刑臣將命於大臣非也郭崇韜倨見之亦非也嗚呼刑臣將命自唐開元以後皆然矣李從襲謂延嗣曰魏王太子也主上萬福而郭公專權如是郭廷誨擁徒出入日與軍中饒將蜀土豪傑狎飲指天畫地近聞白其父請表己為蜀帥帥所類翻下同又言蜀地富饒大人宜善自為謀今諸軍將校皆郭氏之黨王寄身於虎狼之口一朝有變吾屬不知委骨何地矣因相向垂涕延嗣歸具以語劉后語牛倨翻下語之同后泣訴於帝請早救繼岌之死前此帝聞蜀人請崇韜為帥已不平至是聞延嗣之言不能無疑帝閱蜀府庫之籍曰人言蜀中珍貨無算何如是之微也延嗣曰臣聞蜀破其珍貨皆入於崇韜父子崇韜有金萬兩銀四十萬兩錢百萬緡名馬千匹他物稱是廷誨所取復在其外稱尺證翻復扶又翻故縣官所得不多耳帝遂怒形於色及孟知祥將行帝語之曰聞郭崇韜有異志卿到為朕誅之為于偽翻知祥曰崇韜國之勳舊不宜有此俟臣至蜀察之苟無他志則遣還還從宣翻又如字帝許之壬子知祥發洛陽帝尋復遣衣甲庫使馬彥珪復扶又翻下后復同衣甲庫使盛唐無之蓋帝所置亦內諸司使之一也馳詣成都觀崇韜去就如奉詔班師則已若有遷延跋扈之狀則與繼岌圖之觀莊宗所以命孟知祥馬彥珪者如此就使李從襲等不以劉后教行之崇韜得東還亦必不能自全矣說之曰說式芮翻臣見向延嗣言蜀中事勢憂在朝夕今上當斷不斷言帝詔旨持兩端無決然使殺崇韜之命斷丁亂翻間不容髮安能緩急稟命於三千里外乎成都至洛陽三千二百一十六里見舊唐書地理志帝曰傳聞之言未知虛實豈可遽爾果決皇后不得請退自為教與繼岌令殺崇韜知祥行至石壕石壕村在陝縣東新安縣西杜少陵詩所謂暮投石壕村者也九域志陝州陝縣有石壕鎮促知祥赴鎮知祥竊歎曰亂將作矣乃晝夜兼行孟知祥倍道而行非能救郭崇韜之死也恐崇韜死而生他變耳同光三年初楚王殷既得湖南不征商旅由是四方商旅輻湊湖南地多鉛鐵殷用軍都判官高郁策軍都判官諸軍都判官也高郁在馬殷府其位任在行軍司馬之上商旅出境無所用之皆易他貨而去故能以境內所餘之物易天下百貨國以富饒湖南民不事桑蠶郁命民輸稅者皆以帛代錢未幾民間機杼大盛幾居豈翻高郁佐馬殷治湖南巧於使民而民勸趨於利蓋學管子之術者也同光三年吳越王鏐遣使者沈瑫致書以受玉冊封吳越國王告於吳瑫土刀翻吳人以其國名與己同嫌其居越而兼吳國之名遣瑫還仍戒境上無得通吳越使者及商旅明宗聖德和武欽孝皇帝上之上諱嗣源應州人世本夷狄無姓氏父電鴈門都將帝少名邈佶烈太祖養以為子乃姓李名嗣源即位後改名亶天成元年丙戌九二六是年四月方改元見下卷同光三年春正月庚申魏王繼岌遣李繼曮李嚴部送王衍及其宗族百官數千人詣洛陽同光三年河中節度使尚書令李繼麟自恃與帝故舊且有功梁之乾化二年朱友謙即以河中附晉故自恃故舊自附晉之後晉王與梁人戰於河上汾晉無後顧之虞以此為有功亦以此自恃厭於鹽翻遂拒不與大軍之征蜀也繼麟閱兵遣其子令德將之以從景進與宦官譖之曰繼麟聞大軍起以為討己故驚懼閱兵自衞又曰崇韜所以敢倔強於蜀者從才用翻倔其勿翻強其兩翻與河中陰謀內外相應故也繼麟聞之懼欲身入朝以自明其所親止之繼麟曰郭侍中功高於我今事勢將危吾得見主上面陳至誠則讒人獲罪矣郭侍中謂崇韜功高以其有滅梁蜀之功非己之所能及也讒人指伶宦也癸亥繼麟入朝為繼麟得禍張本同光三年魏王繼岌將發成都令任圜權知留事以俟孟知祥諸軍部署已定部署行留已定也馬彥珪至以皇后教示繼岌繼岌曰大軍垂發垂發猶言臨發也安可為此負心事公輩勿復言復扶又翻且主上無敕獨以皇后教殺招討使可乎李從襲等泣曰既有此迹萬一崇韜聞之中塗為變益不可救矣相與巧陳利害繼岌不得已從之甲子旦從襲以繼岌之命召崇韜計事繼岌登樓避之崇韜方升階繼岌從者李環撾碎其首幷殺其子廷誨廷信撾則瓜翻郭崇韜蓋與二子俱至繼岌所故同時見殺外人猶未之知都統推官滏章十二行本滏作饒乙十一行本同退齋校同陽李崧謂繼岌曰今行軍三千里外初無敕旨亶殺大將大王柰何行此危事獨不能忍之至洛陽邪繼岌曰公言是也悔之無及崧乃召書吏數人登樓去梯去羌呂翻矯為敕書用蠟印宣之以蠟摹刊為中書省印以印敕書而宣之也崇韜左右皆竄匿獨掌書記滏陽張礪詣魏王府慟哭久之張礪為崇韜府掌書記史言其事府主能始終同光三年魏王通謁李廷安獻蜀樂工二百餘人有嚴旭者王衍用為蓬州刺史帝問曰汝何以得刺史對曰以歌帝使歌而善之許復故任人皆謂帝克蜀而不察蜀之所以亡故不旋踵而敗不知此乃帝氣習也觀諸李存賢周匝之事可見同光三年戊辰孟知祥至成都時新殺郭崇韜人情未安知祥慰撫吏民犒賜將卒去留帖然史言孟知祥之才所以能有蜀犒苦到翻同光三年閩人破陳本斬之陳本圍汀州見上年十二月同光三年契丹主擊女真及勃海女真始見於此其國本肅慎氏東漢謂之挹婁元魏謂之勿吉隋唐謂之靺鞨五代時始號女真女真有數種居混同江之南者為熟女真江之北者為生女真混同江即鴨淥水戊寅遣梅老鞋里來修好好呼到翻同光三年馬彥珪還洛陽乃下詔暴郭崇韜之罪幷殺其子廷說廷讓廷議此郭崇韜諸子之在洛陽者也說讀曰悅朝直遙翻惋烏貫翻㣥議紛然帝使宦者潛察之保大節度使睦王存乂崇韜之壻也宦者欲盡去崇韜之黨言存乂對諸將攘臂垂泣為崇韜稱冤去羌呂翻為于偽翻言辭怨望庚辰幽存乂於第尋殺之景進言河中人有告變言李繼麟與郭崇韜謀反崇韜死又與存乂連謀宦官因共勸帝速除之帝乃徙繼麟為義成節度使是夜遣蕃漢馬步使朱守殷以兵圍其第歐史作圍其館蓋謂朱友謙無私第在洛陽也復其姓名曰朱友謙唐昭宗之遷洛也車駕由徽安門入宮唐六典東都北面二門東曰延喜西曰徽安朱友謙賜姓名見二百七十二卷元年令德為武信節度使令錫為忠武節度使詔魏王繼岌誅令德於遂州鄭州刺史王思同誅令錫於許州唐置忠武軍於許州匡國軍於同州至梁之時兩易軍號後唐滅梁皆復其故紹奇至其家友謙妻張氏帥家人二百餘口見紹奇帥讀曰率曰朱氏宗族當死願無濫及平人乃別其婢僕百人別彼列翻以其族百口就刑張氏又取鐵券以示紹奇曰此皇帝去年所賜也我婦人不識書不知其何等語也紹奇亦為之慚為于偽翻慚朝廷之失信友謙舊將史武等七人時為刺史皆坐族誅時洛中諸軍飢窘窘渠隕翻妄為謠言伶官采之以聞於帝故朱友謙郭崇韜皆及於禍成德節度使兼中書令李嗣源亦為謠言所屬屬之欲翻帝遣朱守殷察之守殷私謂嗣源曰令公勳業振主宜自圖歸藩以遠禍振當作震遠于願翻吾心不負天地禍福之來無所可避皆委之於命李嗣源答朱守殷之言安於死生禍福之際英雄識度自有不可及者勳舊人不自保嗣源危殆者數四賴宣徽使李紹宏左右營護以是得全同光三年魏王繼岌留馬步都指揮使陳留李仁罕馬軍都指揮使東光潘仁嗣左廂都指揮使趙廷隱右廂都指揮使浚儀張業牙內指揮使文水武漳驍銳指揮使平恩李延厚戍成都為諸將在蜀卒為孟知祥效死張本甲申繼岌發成都命李紹琛帥萬二千人為後軍行止常差中軍一舍三十里為一舍差後於中軍三十里也帥讀曰率同光三年二月己丑朔以宣徽南院使李紹宏為樞密使代郭崇韜也同光三年魏博指揮使楊仁晸晸知領翻將所部兵戍瓦橋將即亮翻踰年代歸至貝州以鄴都空虛恐兵至為變敕留屯貝州時天下莫知郭崇韜之罪民間訛言云崇韜殺繼岌自王於蜀王于況翻故族其家朱友謙子建徽為澶州刺史帝密敕鄴都監軍史彥瓊殺之澶州魏博巡屬也故密敕魏博監軍殺朱建徽澶時連翻史武德夜半馳馬出城不言何往史彥瓊以武德使出為監軍稱其內職皇后以繼岌之死歸咎於帝已弒帝矣故急召彥瓊計事人情愈駭訛言方興而史彥瓊所為有可疑可駭者訛言所以益甚而亂隨之楊仁晸部兵皇甫暉與其徒夜博不勝因人情不安遂作亂劫仁晸曰主上所以有天下吾魏軍力也謂因魏博兵力以破梁馬不解鞍者十餘年今天下已定天子不念舊勞更加猜忌遠戍踰年方喜代歸去家咫尺不使相見言使之留屯貝州不許還魏州也九域志貝州南至魏州二百二十五里京師已亂將士願與公俱歸仍表聞朝廷若天子萬福興兵致討以吾魏博兵力足以拒之皇甫暉銀槍效節卒也從莊宗戰河上習見莊宗之用兵與夫諸軍之勇怯故敢發此言仁晸不從暉殺之又劫小校不從又殺之校戶教翻效節指揮使趙在禮聞亂衣不及帶踰垣而走暉追及曳其足而下之示以二首示以楊仁晸及小校之首亂兵遂奉以為帥帥所類翻焚掠貝州暉魏州人在禮涿州人也詰旦暉等擁在禮南趣臨清永濟館陶所過剽掠趣七喻翻剽匹妙翻壬辰晚有自貝州來告軍亂將犯鄴都者都巡檢使孫鐸等亟詣史彥瓊亟紀力翻急也請授甲乘城為備彥瓊疑鐸等有異志曰告者云今日賊至臨清計程須六日晚方至九域志臨清縣南至魏州城一百五十里皇甫暉等以壬辰至臨清史彥瓊以為六日晚方至魏州者以師行日五十里故計其涉三日方至也壬辰二月四日六日謂二月六日也是日甲午孫鐸曰賊既作亂必乘吾未備晝夜倍道安肯計程而行請僕射帥衆乘城史彥瓊蓋加僕射故孫鐸稱之帥讀曰率賊既勢挫必當離散然後可撲討撲普木翻張討作滅也必俟其至城下萬一有姦人為內應則事危矣彥瓊曰但嚴兵守城何必逆戰是夜賊前鋒攻北門弓弩亂發時彥瓊將部兵宿北門樓聞賊呼聲呼火故翻即時驚潰彥瓊單騎奔洛陽癸巳賊入鄴都孫鐸等拒戰不勝亡去趙在禮據宮城帝即位於魏州以牙城為宮城縱兵大掠進定州人也王正言方據案召吏草奏無至者正言怒其家人曰賊已入城殺掠於市吏皆逃散公尚誰呼正言驚曰吾初不知也又索馬不能得索山客翻乃帥僚佐步出府門謁在禮帥讀曰率再拜請罪在禮亦拜曰士卒思歸耳尚書重德勿自卑屈慰諭遣之王正言以戶部尚書出知留守故趙在禮稱之衆推在禮為魏博留後具奏其狀北京留守張憲家在鄴都去年張憲自鄴都留守遷北京故其家尚留鄴都遣使以書誘憲憲不發封斬其使以聞使疏吏翻誘音酉同光三年甲午以景進為銀青光祿大夫檢校右散騎常侍兼御史大夫上柱國同光三年丙申史彥瓊至洛陽自鄴都逃至洛陽紹宏復請用李紹欽伐蜀之役李紹宏已薦李紹欽而不用故言復令條上方略上時掌翻紹欽所請偏裨皆梁舊將己所善者帝疑之而止皇后曰此小事不足煩大將紹榮可辦也紹榮元行欽將即亮翻下同騎奇寄翻亦徵諸道兵備其不服同光三年郭崇韜之死也李紹琛謂董璋曰公復欲呫囁誰門乎復扶又翻璋懼謝罪魏王繼岌軍還至武連還從宣翻武連漢梓潼縣地宋置武都郡及下辨縣又改下辨為武功縣後魏改為武連縣唐屬劍州九域志在州西八十五里遇敕使諭以朱友謙已伏誅令董璋將兵之遂州誅朱令德時紹琛將後軍在魏城西魏置魏城縣於巴西唐屬綿州九域志在州東六十五里宋白曰魏城本漢涪縣地西魏於涪縣立潼州析此立為魏城縣李膺記云肆溪東五十里有東西井井西為涪縣界井東為魏城界以帝不委己殺令德而委璋大驚俄而璋過紹琛軍不謁紹琛怒乘酒謂諸將曰國家南取大梁西定巴蜀皆郭公之謀而吾之戰功也至於去逆效順與國家犄角以破梁則朱公也犄居蟻翻謂朱友謙以蒲同附晉相為犄角以破梁今朱郭皆無罪族滅歸朝之後行及我矣朝直遙翻冤哉天乎柰何紹琛所將多河中兵將即亮翻河中將焦武等號哭於軍門曰西平王何罪闔門屠膾號戶刀翻朱友謙再以河中附晉晉封為西平王闔門屠膾謂其家悉誅夷也我屬歸則與史武等同誅言史武等既以河中將誅若東歸則亦與之同罪而誅死復扶又翻是日魏王繼岌至泥溪紹琛至劍州遣人白繼岌云河中將士號哭不止欲為亂丁酉紹琛自劍州擁兵西還自稱西川節度三川制置等使移檄成都稱奉詔代孟知祥招諭蜀人三日間衆至五萬同光三年戊戌李繼曮至鳳翔監軍使柴重厚不以符印與之促令詣闕唐僖宗光啟三年李茂貞據鳳翔至是而代其後明宗復令李繼曮鎮鳳翔同光三年己亥魏王繼岌至利州李紹琛遣人斷桔柏津斷丁管翻桔吉屑翻繼岌聞之以任圜為副招討使將步騎七千與都指揮使梁漢顒顒魚容翻監軍李延安追討之考異曰莊宗實錄己亥繼岌奏康延孝叛遣任圜追討按延孝丁酉叛於劍州豈得己亥奏報已至洛廣本己亥魏王至利州桔柏津使夜來告繼岌言李紹琛令斷浮梁繼岌署任圜為副招討使令率七千人騎與都指揮使梁漢顒監軍李延安討之今從之同光三年庚子邢州左右步直兵趙太等四百人步直兵謂步兵長直者也詔東北面招討副使李紹真討之李紹真即霍彥威同光三年辛丑任圜先令別將何建崇擊劍門關下之恐李紹琛拒守劍門關故先擊下之紹琛將何所至哉同光三年李紹榮至鄴都攻其南門遣人以敕招諭之趙在禮以羊酒犒師拜於城上曰將士思家亶歸相公誠善為敷奏犒苦到翻李紹榮以節度使同平章事故稱之為相公所謂使相也後之世凡建節者皆稱相公為于偽翻得免於死敢不自新遂以敕徧諭軍士史彥瓊戟手大罵曰㣥死賊城破萬段皇甫暉謂其衆曰觀史武德之言上不赦我矣因聚譟掠敕書手壞之掠奪也壞音怪紹榮攻之不利以狀聞帝怒曰克城之日勿遺噍類噍才笑翻大發諸軍討之壬寅紹榮退屯澶州同光三年甲辰夜從馬直軍士王溫等五人殺軍使謀作亂擒斬之從才用翻從馬直指揮使郭從謙本優人也優名郭門高帝與梁相拒於得勝得勝即德勝從謙應募俘斬而還挑徒了翻還從宣翻又如字由是益有寵帝選諸軍驍勇者為親軍分置四指揮號從馬直從謙自軍使積功至指揮使郭崇韜方用事從謙以叔父事之睦王存乂以從謙為假子及崇韜存乂得罪從謙數以私財饗從馬直諸校數所角翻校戶教翻對之流涕言崇韜之冤及王溫作亂帝戲之曰汝既負我附崇韜存乂又教王溫反欲何為也從謙益懼既退陰謂諸校曰主上以王溫之故俟鄴都平定盡阬若曹若猶汝也勿為久計也由是親軍皆不自安為張破敗作亂郭從謙弒逆張本郭崇韜勳舊也以無罪而族康延孝之亂皇甫暉之亂張破敗之亂卒以成郭從謙之弒皆由崇韜之死而將校之心不自安也同光三年乙巳王衍至長安有詔止之止不使至洛陽同光三年先是帝諸弟雖領節度使皆留京師但食其俸先悉薦翻戊申始命護國節度使永王存霸至河中既殺朱友謙故令存霸赴鎮以代之同光三年丁未李紹榮以諸道兵再攻鄴都庚戌裨將楊重霸帥衆數百登城帥讀曰率後無繼者重霸等皆死賊知不赦堅守無降意降戶江翻朝廷患之日發中使促魏王繼岌東還繼岌以中軍精兵皆從任圜討李紹琛留利州待之未得還還從宣翻又如字李紹榮討趙在禮久無功趙太據邢州未下滄州軍亂小校王景戡討定之因自為留後河朔州縣告亂者相繼帝欲自征鄴都宰相樞密使皆言京師根本車駕不可輕動帝曰諸將無可使者皆曰李嗣源最為勳舊帝心忌嗣源曰吾惜嗣源欲留宿衞皆曰他人無可者忠武節度使張全義亦言河朔多事久則患深宜令總管進討時李嗣源雖留洛陽而蕃漢內外馬步軍都總管之官如故未見成功之期李紹宏亦屢言之帝以內外所薦章十二行本薦下有久乃許之四字乙十一行本同退齋校同張校同云無註本亦無內則李紹宏外則張全義及在廷之臣甲寅命嗣源將親軍討鄴都同光三年延州言綏銀軍亂剽州城綏銀時為夏州巡屬延州以鄰鎮奏言之耳趙珣聚米圖經宋康定慶曆間所進也其書云綏州故城見在延州東北無定河川西至夏州四百里南至延州界三百四十里北至銀州一百六十里夏州東至銀州二百里剽匹妙翻同光三年董璋將兵二萬屯綿州會任圜討李紹琛帝遣中使崔延琛至成都遇紹琛軍紿之曰吾奉詔召孟郎孟知祥妻太祖弟克讓女也故呼為孟郎俗謂壻為郎也自當得蜀既至成都勸孟知祥為戰守備知祥浚壕樹柵遣馬步都指揮使李仁罕將四萬人驍銳指揮使李延厚將二千人討紹琛既浚壕樹柵為守城之備又遣重兵出討以兵有邂逅戰苟不利則退守無倉卒失措之憂孟知祥初至西川其審慎如此然當時蜀之舊兵敗散已多北兵留戍計不過數千李仁罕所將未必及四萬之數更須博考有少壯勇銳欲立功求富貴者東少詩照翻衰疾畏懦厭行陳者西行戶剛翻得選兵七百人以行兵不貴多而貴精也是日任圜軍追及紹琛於漢州紹琛出兵逆戰招討掌書記張礪請伏精兵於後以羸兵誘之郭崇韜之為招討使也以張礪為掌書記崇韜既死繼岌以任圜為招討副使以討李紹琛故礪以幕屬從軍羸倫為翻誘音酉使董璋以東川羸兵先戰而卻紹琛輕圜書生又見其兵羸極力追之伏兵發大破之斬首數千級自是紹琛入漢州閉城不出同光三年三月丁巳朔李紹真奏克邢州擒趙太等庚申紹真引兵至鄴都營於城西北以太等徇於鄴都城下而殺之是不足以懼皇甫暉等適以堅其死守之心耳同光三年辛酉以威武節度副使王延翰為威武節度使命王延翰嗣有閩土同光三年壬戌李嗣源至鄴都營於城西南甲子嗣源下令軍中詰旦攻城詰去吉翻是夜從馬直軍士張破敗作亂考異曰莊宗實錄壬戌今上至鄴都癸亥夜張破敗作亂明日入鄴都明宗實錄三月六日帝至鄴都八日夜破敗作亂薛史莊宗紀壬子嗣源至鄴都甲寅夜破敗作亂明宗紀與實錄同按長曆此月丁巳朔無壬子甲寅今從實錄及明宗本紀帥讀曰率下同殺都將將即亮翻焚營舍詰旦亂兵逼中軍嗣源帥親軍拒戰不能敵亂兵益熾從亂者愈衆也爾曹欲何為對曰將士從主上十年百戰以得天下今主上棄恩任威貝州戍卒思歸主上不赦云克城之後當盡阬魏博之軍謂皇甫暉等也莊宗忿暉等不降嘗有克城之日勿遺噍類之語遽欲盡誅其衆謂王溫等亂也郭從謙因王溫亂後矯言帝意以扇動張破敗等之亂心但畏死耳今衆議欲與城中合勢擊退諸道之軍請主上帝河南令公帝河北為軍民之主李嗣源官中書令故稱之為令公不從嗣源曰爾不用吾言任爾所為我自歸京師亂兵拔白刃環之環音宦曰此輩虎狼也不識尊卑令公去欲何之因擁嗣源及李紹真等入城城中不受外兵皇甫暉逆擊張破敗斬之外兵皆潰趙在禮帥諸校迎拜嗣源泣謝曰將士輩負令公李嗣源以蕃漢馬步軍都總管統諸軍禦契丹凡河北諸鎮兵皆屬焉而魏兵作亂是負之也嗣源詭說在禮曰說式芮翻凡舉大事須藉兵力今外兵流散無所歸我為公出收之藉慈夜翻為于偽翻外兵謂城外之兵嗣源紹真所領者也在禮乃聽嗣源紹真俱出城宿魏縣散兵稍有至者同光三年漢州無城塹樹木為柵乙丑任圜進攻其柵縱火焚之李紹琛引兵出戰於金鴈橋金鴈橋在漢州雒縣東鴈江之上俗傳曾有金鴈故名與十餘騎奔綿竹九域志綿竹縣在漢州東北九十三里孟知祥自至漢州犒軍與任圜董璋置酒高會引李紹琛檻車至座中知祥自酌大卮飲之飲於禁翻謂曰公已擁節旄又有平蜀之功何患不富貴而求入此檻車邪紹琛曰郭侍中佐命功第一兵不血刃取兩川一旦無罪族誅郭侍中謂崇韜以此不敢歸朝耳朝直遙翻魏王繼岌既獲紹琛乃引兵倍道而東孟知祥獲陝虢都指揮使汝陰李肇河中都指揮使千乘侯弘實陝失冉翻乘繩證翻以肇為牙內馬步都指揮使弘實副之為李肇等為孟知祥用張本知祥擇廉吏使治州縣蠲除橫賦安集流散下寬大之令與民更始孟知祥已有據蜀規摹治直之翻橫戶孟翻更工衡翻悉誅之同光三年李嗣源之為亂兵所逼也李紹榮有衆萬人營於城南嗣源遣牙將張虔釗高行周等七人相繼召之欲與共誅亂者紹榮疑嗣源之詐留使者閉壁不應及嗣源入鄴都遂引兵去嗣源在魏縣衆不滿百又無兵仗李紹真所將鎮兵五千聞嗣源得出相帥歸之鎮兵蓋鎮州兵也李嗣源本鎮鎮州故其兵相帥歸之帥讀曰率嗣源泣謂諸將曰吾明日當歸藩欲歸鎮州也上時掌翻章表也奏也聽主上所裁李紹真及中門使安重誨曰此策非宜公為元帥不幸為凶人所劫李紹榮不戰而退歸朝必以公藉口言李紹榮必奏天子稱己所以退師者以嗣源入魏與賊合也則為據地邀君適足以實讒慝之言耳不若星行詣闕星行者戴星而行也庶可自明嗣源曰善丁卯自魏縣南趣相州趣七喻翻遇馬坊使康福後唐起於太原馬牧多在幷代莊宗在河上與梁戰置馬牧於相州以康福為小馬坊使以鎮之蓋以幷代之广既牧為大馬坊也唐內諸司有小馬坊使宦官為之非此薛史唐莊宗曰康福體貌豐厚可令總轄馬牧由是署為馬坊使及明宗離魏縣會福牧小馬於相州乃驅而歸命始能成軍福蔚州人也蔚紆勿翻同光三年平盧節度使符習將本軍攻鄴都聞李嗣源軍潰引兵歸至淄州監軍使楊希望遣兵逆擊之平盧節度治青州九域志青州西至淄州一百一十三里復引兵而西復扶又翻青州指揮使王公儼攻希望殺之因據其城時近侍為諸道監軍者宦官常侍天子左右故曰近侍及鄴都軍變所在多殺之安義監軍楊繼源謀殺節度使孔勍勍先誘而殺之勍渠京翻誘音酉武寧監軍以李紹真從李嗣源謀殺其元從元從謂舊從李紹真之將士所謂義故也紹真時從李嗣源監軍謀殺其元從之留彭城者權知留後淳于晏帥諸將先殺之帥讀曰率下同晏登州人也同光三年戊辰以軍食不足敕河南尹豫借夏秋稅民不聊生同光三年忠武節度使尚書令齊王張全義聞李嗣源入鄴都憂懼不食辛未卒於洛陽張全義之憂死自以薦李嗣源北討也同光三年租庸使以倉儲不足頗朘刻軍糧朘息緣翻縮也減也軍士流言益甚宰相懼帥百官上表言今租庸已竭內庫有餘諸軍室家不能相保儻不賑救賑津忍翻懼有離心俟過凶年其財復集復扶又翻集聚也上即欲從之劉后曰吾夫婦君臨萬國雖藉武功亦由天命命既在天人如我何紂責命于天紂所以亡未聞妲己有是言也后屬耳於屏風後屬之欲翻須臾出妝具及三銀盆皇幼子三人於外曰人言宮中蓄積多四方貢獻隨以給賜所餘止此耳請鬻以贍軍宰相惶懼而退嗚呼劉后囊金寶繫馬鞍之時能盡將內庫所積而行乎同光三年李紹榮自鄴都退保衞州奏李嗣源已叛與賊合嗣源遣使上章自理一日數輩嗣源長子從審為金槍指揮使莊宗得魏因魏銀槍軍置帳前銀槍都後又置金槍軍吾深知爾父忠厚爾往諭朕意勿使自疑從審至衞州紹榮囚欲殺之從審曰公等既不亮吾父亮信也今人多謂不欲行為不能復扶又翻還從宣翻又如字乃釋之帝憐從審賜名繼璟待之如子是後嗣源所奏皆為紹榮所遏不得通嗣源由是疑懼石敬瑭曰夫事成於果決而敗於猶豫安有上將與叛卒入賊城而他日得保無恙乎將即亮翻大梁天下之要會也大梁控引河汴南通淮泗北接滑魏舟車之所湊集且梁舊都也故云然若幸而得之公宜引大軍亟進亟紀力翻急也如此始可自全據大梁則逼洛陽嗣源可以自全莊宗將何以自全乎石敬瑭惡察察言故云爾主上無道軍民怨怒公從衆則生守節則死康義誠胡人獷直觀此言可見也為義誠由此為明宗所親任張本義誠代北胡人也時齊州防禦使李紹虔即王晏球即段凝即房知溫以備契丹五代會要後唐天成三年三月升奉化軍為泰州以清苑縣為理所新唐書地理志清苑縣屬莫州宋保州治清苑蓋又改泰州為保州也紹英瑕丘人本姓房名知溫審通金全之姪也安金全有卻梁兵全晉陽之功嗣源鎮真定入朝于洛其家留真定由是獲全為嗣源以王建立鎮真定張本將即亮翻遼州人也李從珂自橫水將所部兵由盂縣趣鎮州李從珂謫戍橫水見上卷同光三年盂春秋晉之盂邑漢為縣中廢隋開皇十六年置原仇縣大業初改曰盂唐屬太原府九域志盂縣東北至鎮州一百里倍道從嗣源嗣源以李紹榮在衞州謀自白皋濟河分三百騎使石敬瑭將之前驅李從珂為殿殿丁練翻於是軍勢大盛嗣源從子從璋自鎮州引兵而南過邢州邢人奉為留後河北蓋悉從嗣源矣從子之從才用翻同光三年癸酉詔懷遠指揮使白從暉將騎兵扼河陽橋恐李嗣源自懷孟犯洛也樞密宣徽使及供奉內使景進等皆獻金帛以助給賜事已至此帝及嬖倖始知財物之不可守吾妻子已殍死得此何為詬古候翻又許候翻殍被表翻甲戌李紹榮自衞州至洛陽帝如鷂店勞之薛史作耀店鄴都亂兵已遣其黨翟建白據博州欲濟河襲鄆汴李紹榮所言指趙在禮所遣兵也殊不知李嗣源已定入汴之計矣勞力到翻翟萇伯翻帝從之關東謂汜水關以東同光三年景進等言於帝曰魏王未至康延孝初平西南猶未安王衍族黨不少聞車駕東征恐其為變不若除之少詩沼翻帝乃遣中使向延嗣向式亮翻齎敕往誅之敕曰王衍一行並從殺戮已印畫印者用中書印畫者畫可敕又用御寶就殿柱揩去行字改為家字揩口皆翻摩也去羌呂翻由是蜀百官及衍僕役獲免者千餘人延嗣至長安盡殺衍宗族於秦川驛衍母徐氏且死呼曰呼火故翻吾兒以一國迎降不免族誅降戶江翻信義俱棄吾知汝行亦受禍矣同光三年乙亥帝發洛陽丁丑次汜水戊寅遣李紹榮將騎兵循河而東將即亮翻李嗣源親黨從帝者多亡去或勸李繼璟宜早自脫繼璟終無行意帝屢遣繼璟詣嗣源繼璟固辭願死於帝前以明赤誠赤誠猶言赤心誠者心之實言赤誠者謂赤心之實強遣繼璟渡河召之強其兩翻下強出同此時召嗣源嗣源必不敢前道遇李紹榮紹榮殺之李繼璟以死事君以明父之心迹得其死矣同光三年吳越王鏐有疾如衣錦軍命鎮海鎮東節度使留後傳瓘監國衣於既翻監古銜翻吳徐溫遣使來問疾左右勸鏐勿見鏐曰溫陰狡此名問疾實使之覘我也覘丑廉翻又丑豔翻強出見之溫果聚兵欲襲吳越聞鏐疾瘳而止史言錢徐之智力足以相制而不足以相勝按九域志自臨安東還錢塘一百二十里同光三年吳以左僕射同平章事徐知誥為侍中右僕射嚴可求兼門下侍郎同平章事同光三年庚辰帝發汜水發汜水而東也辛巳李嗣源至白皋遇山東上供絹數船取以賞軍此蓋青兗上供泝河而上者也行營馬步使陶王巳斬以徇從才用翻王巳墟里翻由是軍中肅然王巳許州人也嗣源濟河至滑州遣人招符習習與嗣源會於胙城舊唐書地理志胙城漢南燕縣知汴州孔循遣使奉表西迎帝亦遣使北輸密款於嗣源曰先至者得之先是帝遣騎將滿城西方鄴守汴州先是悉薦翻石敬瑭使裨將李瓊以勁兵突入封丘門敬瑭踵其後自西門入遂據其城西方鄴請降敬瑭使趣嗣源壬午嗣源入大梁趣讀曰促九域志胙城縣南至大梁一百二十里是日帝至滎澤東九域志滎澤縣西北距汜水四十五里曰汝曹汴人也龍驤軍梁之舊兵本皆汴人不欲使他軍前驅恐擾汝室家厚賜而遣之彥溫即以其衆叛歸嗣源謂嗣源曰京師危迫主上為元行欽所惑事勢已離不可復事矣元行欽賜姓名李紹榮復扶又翻汝自不忠何言之悖也悖蒲妹翻即奪其兵指揮使潘環守王村寨有芻粟數萬帝遣騎視之環亦奔大梁帝至萬勝鎮萬勝鎮在中牟縣東距大梁不過數十里耳諸軍離叛神色沮喪沮在呂翻喪息浪翻登高歎曰吾不濟矣即命旋師章十二行本師下有是夜復至汜水六字乙十一行本同退齋校同張校同云無註本亦無帝之出關也扈從兵二萬五千從才用翻下從官同及還已失萬餘人乃留秦州都指揮使張唐以步騎三千守關癸未帝還過甖子谷劉昫曰甖子谷在成皋又云在汜水縣西汜水縣古之成皋縣每遇衞士執兵仗者輒以善言撫之曰適報魏王又進西川金銀五十萬適報猶言近方得報也對曰陛下賜已晚矣人亦不感聖恩帝流涕而已又索袍帶賜從官內庫使張容哥稱頒給已盡索山客翻內庫使亦莊宗所置內諸司使之一衞士叱容哥曰致吾君失社稷皆此閹豎輩也抽刀逐之或救之獲免容哥謂同類曰皇后吝財致此吝財事見上事若不測吾輩萬段吾不忍待也因赴河死衞士言致禍之源出於宦官不特指張容哥一人容哥遂先赴河而死者蓋以身為內庫使內庫積而不發出納之吝諸軍以為罪禍必先及故遽引決耳甲申帝至石橋西石橋在洛城東謂李紹榮等諸將曰卿輩事吾以來急難富貴靡不同之難乃旦翻今致吾至此皆無一策以相救乎諸將百餘人皆截髮置地誓以死報因相與號泣號戶刀翻是日晚入洛城李嗣源命石敬瑭將前軍趣汜水收撫散兵嗣源繼之李嗣源在河北時奏章為元行欽所壅遏猶可言也渡河據大梁莊宗嘗至萬勝鎮君臣相望數十里間耳既無一奏陳情又無一騎迎候莊宗既還但以兵踵之而西此意何在哉李紹虔李紹英皆自瓦橋引兵踵嗣源之後而來會于大梁丙戌宰相樞密使共奏魏王西軍將至車駕宜且控扼汜水收撫散兵以俟之帝從之自出上東門閱騎兵戒以詰旦東行鄧廣銘標點聶崇岐覆校
