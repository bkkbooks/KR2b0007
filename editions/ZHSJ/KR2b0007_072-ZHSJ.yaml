body:
  text: 資治通鑑卷第七十二翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶食實封二百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註魏紀四太和五年烈祖明皇帝中之上太和五年辛亥二三一太和五年春二月吳主假太常潘濬節使與呂岱督軍五萬人討五溪蠻濬姨兄蔣琬為諸葛亮長史同出為姨母之姊妹曰姨妻之姊妹亦曰姨若母之兄弟則當呼為舅此蓋妻之兄弟也長知兩翻旍與旌同使疏吏翻吳主曰承明不為此也潘濬字承明而召旍還免官太和五年衞溫諸葛直軍行經歲士卒疾疫死者什八九亶洲絕遠卒不可得至卒子恤翻得夷洲數千人還溫直坐無功誅吳遣溫直見上卷上年太和五年漢丞相亮命李嚴以中都護署府事蜀置左右中三都護署府事署漢中留府事也更工衡翻圍祁山以木牛運亮集曰木牛者方腹曲頭一腳四足頭入領中舌著於腹載多而行少宜可大用不可少使特行者數十里㣥行者二十里也曲者為牛頭雙者為牛腳橫者為牛領轉者為牛足覆者為牛背方者為牛腹垂者為牛舌曲者為牛肋刻者為牛齒立者為牛角細者為牛鞅攝者為牛鞦革由牛仰雙轅人行六尺牛行四步載一歲糧日行二十里而人不大勞帥讀曰率帝命司馬懿西屯長安督將軍張郃費曜戴陵郭淮等以禦之郃古合翻又曷閣翻費父沸翻太和五年三月邵陵元侯曹真卒太和五年自十月不雨至于是月太和五年司馬懿使費曜戴陵留精兵四千守上邽上邽縣前漢屬隴西郡後漢以來屬漢陽郡西救祁山張郃欲分兵駐雍郿雍郿二縣皆屬扶風郡雍於用翻郿音媚又音眉料前軍能獨當之者將軍言是也若不能當而分為前後此楚之三軍所以為黥布禽也事見十二卷漢高帝十一年觀懿此言蓋自知其才不足以敵亮矣亮分兵留攻祁山自逆懿于上邽郭淮費曜等徼亮徼讀曰邀亮破之因大芟刈其麥芟所銜翻與懿遇於上邽之東懿斂軍依險兵不得交亮引還懿等尋亮後至于鹵城張郃曰彼遠來逆我請戰不得謂我利在不戰欲以長計制之也且祁山知大軍已在近人情自固可止屯於此分為奇兵示出其後不宜進前而不敢偪坐失民望也今亮孤軍食少少詩沼翻亦行去矣懿不從故尋亮有意為之曰故尋者隨而躡其後又登山掘營不肯戰賈栩魏平數請戰數所角翻因曰公畏蜀如虎柰天下笑何懿病之懿實畏亮又以張郃嘗再拒亮名著關右不欲從其計及進而不敢戰情見勢屈為諸將所笑栩況羽翻夏五月辛巳懿乃使張郃攻無當監何平於南圍無當蓋蜀軍部之號言其軍精勇敵人無能當者使平監護之故名官曰無當監南圍蜀兵圍祁山之南屯監古暫翻按據也懿分道進兵欲以解祁山之圍自據中道與亮旗鼓相向也魏兵大敗漢人獲甲首三千懿還保營六月亮以糧盡退軍司馬懿遣張郃追之郃進至木門木門去今天水軍天水縣十里水經註籍水出上邽當亭西山東歷當亭川又東入上邽縣左佩五水右帶五水木門谷之水其一也導源南山北流入籍水蜀人乘高布伏弓弩亂發飛矢中郃右厀而卒中竹仲翻厀與膝同卒子恤翻太和五年秋七月乙酉皇子殷生大赦太和五年黃初以來諸侯王法禁嚴切章甲十六行本切下有吏察之急四字乙十一行本同孔本同至于親姻皆不敢相通問東阿王植上疏曰堯之為教先親後疏自近及遠堯親九族九族既睦平章百姓百姓昭明協和萬邦至于兄弟以御于家邦詩大雅思齊之辭毛氏註曰刑法也寡妻嫡妻也御迎也鄭氏曰寡妻寡有之妻言賢也御治也文王以禮法接待其妻至于宗族以此又能為政治于家邦也體文王翼翼之仁惠洽椒房恩昭九族㣥后百寮番休遞上上時掌翻李周翰曰遞迭也言百寮宿衞以次休息更遞上直執政不廢於公朝朝直遙翻下同下情得展於私室親姻之路通慶弔之情展誠可謂恕己治人推惠施恩者矣治直之翻至於臣者人道絕緒禁錮明時臣竊自傷也不敢乃望交氣類易曰同聲相應同氣相求此言志同道合者謂疇昔文會之友也敍人倫近且婚媾不通兄弟乖絕吉凶之問塞塞悉則翻慶弔之禮廢恩紀之違甚於路人隔閡之異殊於胡越殊絕也閡五慨翻一切謂權宜也一說一切謂不問可否一切整齊之也至於注心皇極皇極宅中之位人君居之神明知之矣然天實為之謂之何哉詩邶風北門之詩也鄭氏曰詩人事君無二志故歸之於天余謂植之意蓋謂君者天也天可違乎詩曰戚戚兄弟莫遠具爾爾義與邇同使諸國慶問四節得展四節謂四時之節展舒也全怡怡之篤義論語孔子曰兄弟怡怡膏沐之遺歲得再通呂延濟曰膏脂也沐甘漿之屬也遺于季翻等惠於百司貴宗謂貴戚及公卿之族也百司謂百官也則古人之所歎風雅之所詠復存於聖世矣臣伏自惟省無錐刀之用思惟也省悉景翻若以臣為異姓竊自料度不後於朝士矣度徒洛翻若得辭遠游戴武弁解朱組佩青紱諸王冠遠游冠佩朱紱三都尉諸侍中常侍皆戴武弁佩青紱趣得一號安宅京室駙馬奉車都尉及騎都尉為三都尉皆漢武帝置魏晉以下多以宗室及外戚為之出從華蓋入侍輦轂承答聖問拾遺左右珥仍吏翻珥筆插筆也古者侍臣持橐簪筆華蓋乘輿車上施之魏晉之制侍中與散騎常侍或乘輿御殿及出游幸祭祀治兵侍中居左常侍居右備切問近對拾遺補闕乃臣丹誠之至願不離於夢想者也離力智翻遠慕鹿鳴君臣之宴中詠常棣匪他之誡詩鹿鳴宴㣥臣嘉賓常棣燕兄弟也其詩曰凡今之人莫如兄弟所謂匪他也又頍弁詩豈伊異人兄弟匪他終懷蓼莪罔極之哀伐木燕朋友故舊其詩曰相彼鳥矣猶求友聲矧伊人矣不求友生蓼莪之詩曰哀哀父母生我劬勞欲報之德昊天罔極知念其父母必念其同氣矣蓼音六塊然獨處處昌呂翻左右惟僕隸所對惟妻子高談無所與陳精義無所與展未嘗不聞樂而拊心臨觴而歎息也臣伏以犬馬之誠不能動人譬人之誠不能動天崩城隕霜齊大夫梁戰死於莒城其妻向城而哭城為之崩鄒衍盡忠於君燕惠王信讒而繫之鄒子仰天而哭正夏而天降霜以臣心況徒虛語耳況譬也雖不為回光然向之者誠也言葵藿草也傾葉於日日雖不為回光終是誠心向日也為于偽翻若降天地之施垂三光之明者實在陛下施式智翻下同臣聞文子曰不為福始不為禍先文子九篇班固曰文子老子弟子李周翰曰福始禍先謂諸王皆不表植獨先表也友于同憂否隔不通也友于兄弟也否皮鄙翻實不願於聖世有不蒙施之物欲陛下崇光被時雍之美宣緝熙章明之德也光被時雍言帝堯睦族之效詩周頌曰維清緝熙文王之典鄭氏箋曰緝熙光明也故植以言文王之治被皮義翻蓋教化所由各有隆敝非皆善始而惡終也事使之然隆崇也謂立教之始各有所崇其流之敝則事勢使之然也惡如字妾之家膏沐疏略本無禁錮諸國通問之詔也矯枉過正下吏懼譴以至於此耳已敕有司如王所訴植復上疏曰昔漢文發代疑朝有變復扶又翻朝直遙翻宋昌曰內有朱虛東牟之親外有齊楚淮南琅邪此則磐石之宗願王勿疑事見十三卷漢高后八年虢仲虢叔文王之母弟文王咨于二虢以成王業召公畢公周同姓也二伯分治輔成王以成太平之功召讀曰邵下同臣聞羊質虎皮見草則悅見豺則戰忘其皮之虎也揚子之言有似於此將即亮翻故語曰患為之者不知知之者不得為也昔管蔡放誅周召作弼成王幼管叔蔡叔以武庚畔成王誅管叔放蔡叔以周公為師召公為保而相左右叔向贊國左傳晉邢侯與雍子爭田久而無成韓宣子使叔魚斷舊獄罪在雍子雍子納其女於叔魚叔魚蔽罪於邢侯邢侯怒殺叔魚及雍子於朝宣子問其罪於叔向不以叔向為私其親而從之決平也臣自當之二南之輔求必不遠華宗貴族藩王之中必有應斯舉者夫能使天下傾耳注目者當權者是也故謀能移主威能懾下懾之涉翻豪右執政不在親戚權之所在雖疏必重勢之所去雖親必輕蓋取齊者田族非呂宗也分晉者趙魏非姬姓也齊太公姓呂其後為田成子所取非呂族也晉唐叔姬姓其後為趙籍魏斯韓虔所分此不言韓以韓亦姬姓苟吉專其位凶離其患者異姓之臣也離力智翻下得離同欲國之安祈家之貴存共其榮歿同其禍者公族之臣也今反公族疏而異姓親臣竊惑焉今臣與陛下踐冰履炭登山浮澗寒溫燥濕高下共之豈得離陛下哉不勝憤懣勝音升懣音悶拜表陳情若有不合乞且藏之書府不便滅棄臣死之後事或可思若有毫釐少挂聖意者乞出之朝堂朝直遙翻下同使夫博古之士糾臣表之不合義者如是則臣願足矣帝但以優文答報而已植求自試而但以優詔答之終疑之也八月詔曰先帝著令不欲使諸王在京都者謂幼主在位母后攝政防微以漸關諸盛衰也朕惟不見諸王十有二載自文帝黃初元年遣植等就國至是十二年惟思也載子亥翻能不興思其令諸王及宗室公侯各將適子一人朝明年正月適讀曰嫡後有少主母后在宮者自如先帝令太和五年漢丞相亮之攻祁山也李平留後主督運事李平即李嚴改名曰平平恐運糧不繼遣參軍狐忠狐忠即馬忠也少養外家姓狐名篤後復姓馬改名忠此姓從先名從後姓譜狐周王子狐之後又晉有狐突呼亮來還喻以後主指言運糧不繼平聞軍退乃更陽驚說軍糧饒足何以便歸又欲殺督運岑述以解己不辦之責又表漢主說軍偽退欲以誘賊章甲十六行本賊下有與戰二字乙十一行本同孔本同張校同退齋校同此又欲解以上指喻亮之罪也誘音酉亮具出其前後手筆書疏本末違錯平辭窮情竭首謝罪負首式救翻於是亮表平前後過惡免官削爵土徙梓潼郡平蓋嘗封侯也出教敕之曰敕戒也吾與君父子勠力以奬漢室表都護典漢中委君於東關東關謂江州終始可保何圖中乖乎若都護思負一意思負謂思其罪負也一意謂一意於為國無復詭變以自營也否可復通否皮鄙翻逝可復還也詳思斯戒明吾用心亮又與蔣琬董允書曰孝起前為吾說正方腹中有鱗甲李嚴字正方為于偽翻下同近其靳翻吾以為鱗甲但不當犯之耳不圖復有蘇張之事出於不意謂蘇秦張儀捭闔其說以反覆諸侯之間今李平復為之復扶又翻孝起者衞尉南陽陳震也太和五年冬十月吳主使中郎將孫布詐降以誘揚州刺史王淩吳主伏兵於阜陵以俟之阜陵縣漢屬九江郡魏改九江為淮南郡晉志曰阜陵縣漢明帝時淪為麻湖麻湖在今和州歷陽縣西三十里杜佑曰漢阜陵縣在滁州全椒縣南道遠不能自致乞兵見迎淩騰布書騰傳也上也征東將軍滿寵以為必詐不與兵而為淩作報書曰知識邪正欲避禍就順去暴歸道甚相嘉尚今欲遣兵相迎然計兵少則不足相衞多則事必遠聞聞音問且先密計以成本志臨時節度其宜會寵被書入朝被皮義翻朝直遙翻敕留府長史若淩欲往迎勿與兵也淩於後索兵不得索山客翻乃單遣一督將步騎七百人往迎之布夜掩擊督將迸走死傷過半迸北孟翻孫權自量其國之力不足以斃魏不過時於疆埸之間設詐用奇以誘敵人之來而陷之耳非如孔明真有用蜀以爭天下之心也淩允之兄子也王允獻帝時誅董卓先是淩表寵年過耽酒不可居方任方任方面之任也先悉薦翻給事中郭謀曰寵為汝南太守豫州刺史漢建安中武王操以寵為汝南太守太和三年刺豫州是年都督揚州有勳方岳自魏以下以督州為方岳之任謂其職猶古之方伯岳牧也吳人憚之若不如所表將為所闚可令還朝朝直遙翻問以東方事以察之帝從之既至體氣康強帝慰勞遣還勞力到翻太和五年十一月戊戌晦日有食之太和五年十二月戊午博平敬侯華歆卒諡法夙夜警戒曰敬合善典法曰敬華戶化翻太和五年丁卯吳大赦改明年元曰嘉禾會稽南始平言嘉禾生故以改元六年六年春正月吳主少子建昌侯慮卒太子登自武昌入省吳主因自陳久離定省子道有闕記曲禮曰凡為人子之禮冬溫而夏凊昏定而晨省省悉景翻離力智翻無所顧憂乃留建業六年二月詔改封諸侯王皆以郡為國六年帝愛女淑卒帝痛之甚追諡平原懿公主立廟洛陽葬於南陵取甄后從孫黃與之合葬甄之人翻從才用翻追封黃為列侯為之置後襲爵為于偽翻下同帝欲自臨送葬又欲幸許司空陳㣥諫曰八歲下殤禮所不備記檀弓曰周人以殷人之棺椁葬長殤以夏后氏之堲周葬中殤下殤以有虞氏之瓦棺葬無服之殤鄭玄註云略未成人陸德明曰十六至十九為長殤十二至十五為中殤八歲至十一為下殤七歲以下為無服之殤生未三月不為殤而以成人禮送之加為制服舉朝素衣朝夕哭臨自古以來未有此比朝直遙翻下同臨力鴆翻比毗寐翻而乃復自往視陵復扶又翻親臨祖載願陛下抑割無益有損之事此萬國之至望也又聞車駕欲幸許昌二宮上下皆悉居東舉朝大小莫不驚怪或言欲以避衰或言欲以便移殿舍避衰謂五行之氣有王有衰徙舍以避之也今人謂之避災便移殿舍謂欲營繕宮室故出幸許以便移殿舍也臣以為吉凶有命禍福由人移走求安則亦無益若必當移避繕治金墉城西宮水經註金墉城在洛陽城西北角治直之翻皆可權時分止何為舉宮暴露野次公私煩費不可計量量音良且吉士賢人猶不妄徙其家以寧鄉邑使無恐懼之心子思居於衞有齊寇或曰寇至盍去諸子思曰如伋去君誰與守行止動靜豈可輕脫哉少府楊阜曰文皇帝武宣皇后崩陛下皆不送葬所以重社稷備不虞也何至孩抱之赤子而送葬也哉帝皆不聽三月癸酉行東巡六年吳主遣將軍周賀校尉裴潛乘海之遼東從公孫淵求馬初虞翻性疏直數有酒失又好抵忤人抵觸也數所角翻好呼到翻忤五故翻吳主嘗與張昭論及神仙翻指昭曰彼皆死人而語神仙世豈有仙人也吳主積怒非一遂徙翻交州及周賀等之遼東翻聞之以為五谿宜討遼東絕遠聽使來屬尚不足取今去人財以求馬去猶棄也去羌呂翻又恐無獲欲諫不敢作表以示呂岱岱不報為愛憎所白讒佞之人有愛有憎而無公是非故謂之愛憎白陳奏也猛陵縣屬蒼梧郡劉昫曰唐梧州孟陵縣藤州鐔津縣龔州南平武林隋建三縣皆漢猛陵縣地復扶又翻六年夏四月壬寅帝如許昌六年五月皇子殷卒六年秋七月以衞尉董昭為司徒六年九月帝行如摩陂治許昌宮起景福承光殿治直之翻六年公孫淵陰懷貳心數與吳通數所角翻帝使汝南太守田豫督青州諸軍自海道幽州刺史王雄自陸道討之海道自東萊浮海陸道自遼西渡遼水凡非相吞之國不侵叛之臣光武報竇融書曰吾與爾非相吞之國左傳戎子駒支對范宣子曰為不侵不叛之臣伐之而不能制是驅使為賊也故曰虎狼當路不治狐狸治直之翻先除大害小害自己今海表之地累世委質質如字計孝謂每歲上計及舉孝廉也議者先之先悉薦翻正使一舉便克得其民不足益國得其財不足為富儻不如意是為結怨失信也帝不聽豫等往皆無功詔令罷軍豫以吳使周賀等垂還歲晚風急必畏漂浪東道無岸當赴成山成山無藏船之處遂輒以兵屯據成山賀等還至成山班志成山在東萊郡不夜縣後漢省不夜縣括地志成山在萊州文登縣西北百九十里豫勒兵擊賀等斬之吳主聞之始思虞翻之言乃召翻於交州會翻已卒以其喪還還從宣翻又如字六年十一月庚寅陳思王植卒諡法追悔前過曰思六年十二月帝還許昌宮六年侍中劉曄為帝所親重帝將伐蜀朝臣內外皆曰不可朝直遙翻曄入與帝議則曰可伐出與朝臣言則曰不可曄有膽智言之皆有形謂言蜀之可伐與不可伐皆有勝負之形可以動人之聽中領軍主中壘五校武衞等三營漢建安四年魏武丞相府自置中領軍文帝踐阼始置領軍將軍其後以資重者為領軍將軍資輕者則為中領軍又重曄執不可伐之議最堅每從內出輒過曄過工禾翻曄講不可之意後暨與帝論伐蜀事暨切諫帝曰卿書生焉知兵事焉於虔翻下同暨謝曰臣言誠不足采侍中劉曄先帝謀臣常曰蜀不可伐帝曰曄與吾言蜀可伐暨曰曄可召質也質證也驗也對問也帝問曄終不言後獨見見賢遍翻下同曄責帝曰伐國大謀也臣得與聞大謀與讀曰預常恐眯夢漏泄以益臣罪眯毋禮翻一作寐說文曰寐而眯厭厭讀曰魘焉敢向人言之夫兵詭道也軍事未發不厭其密陛下顯然露之臣恐敵國已聞之矣於是帝謝之曄見出責暨曰夫釣者中大魚見賢遍翻中竹仲翻則縱而隨之須可制而後牽則無不得也人主之威豈徒大魚而已子誠直臣然計不足采不可不精思也暨亦謝之或謂帝曰曄不盡忠善伺上意所趨而合之伺相吏翻趨七喻翻陛下試與曄言皆反意而問之若皆與所問反者是曄常與聖意合也每問皆同者曄之情必無所逃矣言者謂曄善迎合上意上若有所問試反上意而問之曄之對必與上所問者反而與上意所向者合每問皆然則可以見曄迎合之情矣果得其情從此疏焉疏與疎同出為大鴻臚以憂死侍中在天子左右大鴻臚外朝官也臚陵如翻傅子曰巧詐不如拙誠信矣晉傅玄著書號傅子若居之以德義行之以忠信古之上賢何以加諸獨任才智不敦誠慤敦厚也崇尚也外困於俗卒以自危卒子恤翻豈不惜哉六年曄嘗譖尚書令陳矯專權矯懼以告其子騫騫曰主上明聖大人大臣今若不合不過不作公耳後數日帝意果解尚書郎樂安廉昭以才能得幸好抉擿㣥臣細過以求媚於上好呼到翻抉一決翻挑也擿他歷翻發動也黃門侍郎杜恕上疏曰伏見廉昭奏左丞曹璠以罰當關不依詔坐判問續漢志尚書左右丞各一人掌錄文書期會左丞主吏民章報及騶伯史右丞主假署印綬及紙筆墨諸財用庫藏蔡質漢儀曰左丞總典臺中綱紀無所不統魏晉之制左丞主臺內禁令宗廟祠祀朝儀禮制選用署吏急假右丞掌臺內庫藏廬舍凡諸器用之物及廩振人租布刑獄兵器督錄遠道文書章表奏事罰罪罰也關白也言有罪罰當關白而不依詔書故坐以判問判剖也析也問責問也剖析其事而責問之也璠孚袁翻廉昭又云諸當坐者別奏意欲幷奏令僕坐之亦不敢陳理志意懇惻臣竊愍然為朝廷惜之為于偽翻古之帝王所以能輔世長民者長知兩翻莫不遠得百姓之懽心近盡㣥臣之智力今陛下憂勞萬機或親燈火而庶事不康刑禁日弛原其所由非獨臣不盡忠亦其主不能使也百里奚愚於虞而智於秦韓信之言見十卷漢高帝三年豫讓事范中行氏智伯伐而滅之移事智伯後趙襄子滅智伯豫讓漆身吞炭必報襄子五起而不中人問豫讓豫讓曰范中行衆人遇我我故衆人報之智伯國士遇我我故國士報之行戶剛翻若陛下以為今世無良才朝廷乏賢佐豈可追望稷契之遐蹤契息列翻坐待來世之俊乂乎今之所謂賢者盡有大官而享厚祿矣然而奉上之節未立向公之心不一者委任之責不專而俗多忌諱故也臣以為忠臣不必親親臣不必忠今有疏者毀人而陛下疑其私報所憎譽人而陛下疑其私愛所親左右或因之以進憎愛之說遂使疏者不敢毀譽此言帝信其所親而疑其所疏遂使在遠之臣不敢言以至是非失其真也疏與疎同譽音余亦皆有嫌陛下當思所以闡廣朝臣之心篤厲有道之節有道謂有道之士也垂名竹帛反使如廉昭者擾亂其間臣懼大臣將遂容身保位坐觀得失為來世戒也昔周公戒魯侯曰無使大臣怨乎不以以用也見論語為大臣則不可不用也書數舜之功稱去四凶共工驩兜鯀三苗世濟其惡然後去之數所具翻去羌呂翻言小過當略而不問以陛下為不任也不自以為不知以陛下為不問也知讀曰智陛下何不遵周公之所以用大舜之所以去使侍中尚書坐則侍帷幄行則從華輦親對詔問各陳所有則㣥臣之行皆可得而知行下孟翻忠能者進闇劣者退誰敢依違而不自盡以陛下之聖明親與㣥臣論議政事使㣥臣人得自盡賢愚能否在陛下之所用以此治事何事不辦治直之翻下同以此建功何功不成每有軍事謂二邊有警急之時也吾當自憂耳近詔又曰憂公忘私者必不然但先公後私即自辦也近詔謂近日所下詔也先悉薦翻後戶遘翻乃知聖思究盡下情然亦怪陛下不治其本而憂其末也為治之本在於任賢事之治不治乃其末也實有本性雖臣亦以為朝臣不盡稱職也稱尺證翻明主之用人也使能者不敢遺其力而不能者不得處非其任處昌呂翻選舉非其人未必為有罪也舉朝共容非其人乃為怪耳朝直遙翻陛下知其不盡力而代之憂其職知其不能也而教之治其事豈徒主勞而臣逸哉雖聖賢並世終不能以此為治也為治直吏翻陛下又患臺閣禁令之不密人事請屬之不絕屬之欲翻下同作迎客出入之制以惡吏守寺門寺門官寺之門也昔漢安帝時少府竇嘉辟廷尉郭躬無罪之兄子猶見舉奏章劾紛紛按范書郭躬章帝元和三年拜廷尉和帝永元六年卒不及安帝時蓋躬死後竇嘉方辟其兄子也劾戶概翻又戶得翻裴松之曰按大將軍司馬宣王也晉書云宣帝第五弟名通為司隸從事疑恕所云狂悖者悖蒲內翻又蒲沒翻望風希指甚於受屬屬之欲翻選舉不以實者也嘉有親戚之寵躬非社稷重臣猶尚如此以今況古陛下自不督必行之罰以絕阿黨之原耳出入之制與惡吏守門非治世之具也治直之翻使臣之言少蒙察納少詩沼翻何患於姦不削滅而養若廉昭等乎夫糾擿姦宄忠事也擿他狄翻然而世憎小人行之者以其不顧道理而苟求容進也若陛下不復考其終始復扶又翻必以違衆迕世為奉公迕五故翻密行白人為盡節謂潛伺人之過失以白上乃以為盡節也焉於虔翻誠顧道理而弗為耳使天下皆背道而趨利則人主之所最病者也陛下將何樂焉背蒲妹翻趨七喻翻下同樂音洛恕畿之子也建安中畿守河東有能名帝嘗卒至尚書門卒讀曰猝尚書門尚書臺門也陳矯跪問帝曰陛下欲何之帝曰欲按行文書耳矯曰此自臣職分非陛下所宜臨也若臣不稱其職則請就黜退行下孟翻分扶問翻稱尺證翻陛下宜還帝慙回車而反帝嘗問矯司馬公忠貞可謂社稷之臣乎矯曰朝廷之望也社稷則未知也陳矯賈逵皆忠於魏而二人之子皆為晉初佐命豈但利祿之移人哉非故家喬木而教忠不先也六年吳陸遜引兵向廬江論者以為宜速救之滿寵曰廬江雖小將勁兵精將即亮翻守則經時謂陸遜若以兵圍守必經時而不能拔賊舍船二百里來句絕舍讀曰捨不來尚欲誘致今宜聽其遂進但恐走不可及耳乃整軍趨楊宜口魏廬江郡治陽泉縣續漢志陽泉縣有陽泉湖故陽泉鄉也漢靈帝封黃琬為侯國水經註陽泉水受決水東北流逕陽泉縣故城東又西北入決水謂之陽泉口趨七喻翻夜遁是時吳人歲有來計滿寵上疏曰合肥城南臨江湖北遠壽春魏揚州治壽春距合肥二百餘里遠于願翻下同得據水為勢官兵救之當先破賊大輩然後圍乃得解賊往甚易易以豉翻而兵往救之甚難宜移城內之兵其西三十里有奇險可依更立城以固守此為引賊平地而掎其歸路掎居蟻翻於計為便護軍將軍蔣濟議以為既示天下以弱且望賊煙火而壞城壞音怪此為未攻而自拔一至於此劫略無限必淮北為守濟言望風移戍吳必劫掠無限將限淮以自守也寵重表曰重直用翻孫子言兵者詭道也故能而示之不能驕之以利示之以懾懾懼也懾之涉翻又曰善動敵者形之今賊未至而移城卻內所謂形而誘之也引賊遠水遠于願翻擇利而動舉得於外則福生於內矣尚書趙咨以寵策為長趙咨蓋必黃初初自吳使于魏若也文帝重其辯給遂臣於魏青龍元年癸丑二三三六年春正月甲申青龍見摩陂井中二月帝如摩陂觀龍改元自是改摩陂曰龍陂六年公孫淵遣校尉宿舒姓譜宿本風姓伏羲之後封於宿風俗通漢有鴈門太守宿詳晉志王國置郎中令淵未封王僭置之也吳主大悅為之大赦為于偽翻三月吳主遣太常張彌執金吾許晏將軍賀達將兵萬人金寶珍貨九錫備物乘海授淵封淵為燕王舉朝大臣自顧雍以下皆諫以為淵未可信而寵待太厚但可遣吏兵護送舒綜而已吳主不聽張昭曰淵背魏懼討背蒲妹翻遠來求援非本志也若淵改圖欲自明於魏兩使不反使疏吏翻不亦取笑於天下乎吳主反覆難昭難乃旦翻昭意彌切吳主不能堪按劍章甲十六行本劍作刀乙十一行本同而怒曰吳國士人入宮則拜孤出宮則拜君孤之敬君亦為至矣而數於衆中折孤數所角翻折之舌翻孤常恐失計失計謂不能容昭而殺之也古孰熟字通臣雖知言不用每竭愚忠者誠以太后臨崩呼老臣於牀下遺詔顧命之言故在耳事見六十五卷漢獻帝建安十二年吳主擲刀於地與之對泣然卒遣彌晏往卒子恤翻昭忿言之不用稱疾不朝朝直遙翻吳主恨之土塞其門塞悉則翻昭又於內以土封之張昭事吳有古大臣之節六年夏五月戊寅北海王蕤卒六年閏月庚寅朔日有食之六年六月洛陽宮鞠室災鞠室者畫地為域以蹴鞠因以名室六年鮮卑軻比能誘保塞鮮卑步度根與深結和親步度根保塞見七十卷文帝黃初五年誘音酉累力瑞翻重直用翻陘音刑陘北陘嶺之北也唐代州鴈門縣有東陘關西陘州荊章甲十六行本荊作幷乙十一行本同孔本同州刺史畢軌表輒出軍以外威比能內鎮步度根帝省表曰省悉景翻步度根已為比能所誘有自疑心今軌出軍慎勿越塞過句注也漢靈帝末羌胡大擾定襄雲中五原朔方上郡並流徙分散建安二十年集塞下荒地置新興郡自陘嶺以北並棄之故以句注為塞比必寐翻軌已進軍屯陰館應劭曰句注山名在鴈門陰館縣杜佑曰句注山即鴈門縣西陘嶺句伏儼音俱包愷音鉤軻比能遣子將千餘騎迎步度根部落與尚弼相遇戰於樓煩陰館樓煩二縣漢皆屬鴈門郡而晉志無之蓋已棄之荒外矣步度根與泄歸泥部落皆叛出塞泄歸泥扶羅韓之子帝遣驍騎將軍秦朗將中軍討之晉職官志驍騎將軍游擊將軍並漢雜號將軍也魏置為中軍泄歸泥將其部衆來降步度根尋為軻比能所殺六年公孫淵知吳遠難恃乃斬張彌許晏等首傳送京師悉沒其兵資珍寶卒如張昭之言傳直戀翻十二月詔拜淵大司馬封樂浪公樂浪音洛琅吳主聞之大怒曰朕年六十世事難易靡所不嘗嘗試也易以豉翻謂稱臣以誘吳使同前既又斬其使以卻之也不自截鼠子頭以擲于海無顏復臨萬國復扶又翻就令顛沛不以為恨知其不可而欲興忿兵也陸遜上疏曰陛下以神武之資誕膺期運破操烏林事見六十五卷漢獻帝建安十三年事見六十九卷文帝黃初三年敗補邁翻事見六十八卷建安二十四年當世雄傑皆摧其鋒聖化所綏萬里草偃言如風行而草偃也總一大猷猷道也謀也夏戶雅翻違垂堂之戒千金之子坐不垂堂以喻權不當自越海而加兵於遼東乘繩證翻此臣之所惑也臣聞之行萬里者不中道而輟足圖四海者不懷細而害大強寇在境荒服未庭陛下乘桴遠征桴芳無翻編竹木渡水大者曰栰小者曰桴必致闚慼至而憂悔之無及若使大事時捷則淵不討自服今乃遠惜遼東衆之與馬謂權所以遠惜遼東而不忍棄絕之者以其民衆與其地產馬也尚書僕射薛綜上疏曰昔漢元帝欲御樓船薛廣德請刎頸以血染車事見二十八卷永光元年刎武粉翻水火之險至危非帝王所宜涉也今遼東戎貊小國貊莫百翻無城隍之固備禦之術器械銖鈍銖者十分黍之重言其輕也往必禽克誠如明詔然其方土寒埆埆克角翻墝瘠也穀稼不殖民習鞍馬轉徙無常卒聞大軍之至自度不敵卒讀曰猝度徒洛翻鳥驚獸駭長驅奔竄一人匹馬不可得見雖獲空地守之無益此不可一也加又洪流滉瀁滉瀁水深廣貌滉戶廣翻瀁以兩翻又余亮翻海行無常風波難免忽之間人船異勢雖有堯舜之德智無所施賁育之勇力不得設此不可二也賁音奔加以鬱霧冥其上鹹水蒸其下善生流腫轉相洿染洿烏故翻流腫者謂毒氣下流足為之腫古人謂之重膇今人謂之腳氣凡行海者稀無此患此不可三也天生神聖當乘時平亂康此民物今逆虜將滅海內垂定乃違必然之圖尋至危之阻忽九州之固肆一朝之忿既非社稷之重計又開闢以來所未嘗有斯誠㣥僚所以傾身側息謂傾身而臥側鼻而息不得展布四體安於偃仰也寢不安席者也選曹尚書陸瑁上疏曰吳選曹尚書即魏選部尚書瑁音冒北寇與國壤地連接苟有間隙間古莧翻下同應機而至夫所以為越海求馬曲意於淵者為赴目前之急除腹心之疾也為于偽翻而更棄本追末捐近治遠治直之翻忿以改規激以動衆斯乃猾虜所願聞非大吳之至計也北寇猾虜皆謂魏也以功役相疲勞逸相待得失之間所覺輒多兵法以逸待勞又曰逸則能勞之言敵人用智以疲我苦不自覺比我覺知則得失之間相去多矣道里尚遠遼東郡有沓氏縣西南臨海渚應劭曰沓長答翻又據陳壽志景初三年以遼東東沓縣吏民渡海居齊郡界為新沓縣即沓渚之民也兵勢三分使強者進取次當守船又次運糧行人雖多難得悉用加以單步負糧經遠深入賊地多馬邀截無常若淵狙詐與北未絕動衆之日脣齒相濟此慮魏乘吳伐遼之間而南侵也狙千余翻了然猶言曉然也蜀本作孑然文義尤長孑孤孑也謂淵孤立孑然無援也或難卒滅怖普布翻迸北孟翻卒讀曰猝使天誅稽於朔野山虜乘間而起山虜謂丹楊豫章鄱陽廬陵新都等郡山越也乘蜀本作承間古莧翻吳主未許瑁重上疏曰重直龍翻夫兵革者固前代所以誅暴亂威四夷也然其役皆在姦雄已除天下無事從容廟堂之上從千容翻以餘議議之耳至於中夏鼎沸九域盤互之時盤互謂各盤據而互為敵也夏戶雅翻愛力惜費未有正於此時舍近治遠以疲軍旅者也舍讀曰捨治直之翻昔尉佗叛逆僭號稱帝于時天下乂安百姓康阜然漢文猶以遠征不易告喻而已佗徒河翻事見十三卷漢文帝元年易以豉翻今凶桀未殄疆埸猶警埸音亦未宜以淵為先願陛下抑威任計暫寧六師潛神嘿規以為後圖天下幸甚吳主乃止吳主數遣人慰謝張昭數所角翻昭固不起吳主因出過其門呼昭過工禾翻昭辭疾篤吳主燒其門欲以恐之恐丘共翻昭亦不出吳主使人滅火住門良久昭諸子共扶昭起吳主載以還宮深自克責昭不得已然後朝會朝直遙翻初張彌許晏等至襄平襄平縣遼東郡治所淵所都也乃先分散其吏兵中使秦旦張㣥杜德黃強等及吏兵六十人置玄菟中使中節人使也使疏吏翻陳壽曰漢武帝開玄菟郡治沃沮城後為夷貊所侵徙郡句驪西北菟同都翻此非玄菟郡舊治也旦等皆舍於民家仰其飲食仰牛向翻積四十許日旦與㣥等議曰吾人遠辱國命自棄於此與死無異今觀此郡形勢甚弱若一旦同心焚燒城郭殺其長吏為國報恥長知兩翻為于偽翻然後伏死足以無恨孰與偷生苟活長為囚虜乎㣥等然之於是陰相結約當用八月十九日夜發其日中時為郡中張松所告贊便會士衆閉城門旦㣥德強皆踰城得走時㣥病疽瘡著厀疽千余翻著直略翻厀與膝同不及輩旅德常扶接與俱崎嶇山谷崎丘宜翻嶇音區行六七百里創益困不復能前創初良翻下同臥草中相守悲泣㣥曰吾不幸創甚死亡無日卿諸人宜速進道冀有所達空相守俱死於窮谷之中何益也德曰萬里流離死生共之不忍相委委棄也推吐雷翻德獨留守㣥採菜果食之食讀曰飤旦強別數日得達句麗因宣吳主詔於句麗王位宮及其主簿高句麗國在遼東之東千里位宮漢高句麗王宮之曾孫也宮生而開目能視及長勇壯數犯漢邊位宮生墮地亦能開目視人句麗呼相似為位以似其祖故名曰位宮句麗有相加對盧沛者古鄒大加主簿優台使者帛衣先人帛衣三國志作皁衣句音如字又音駒驪力知翻為遼東所劫奪紿徒亥翻位宮等大喜即受詔命使人隨旦還迎㣥章甲十六行本㣥下有德字乙十一行本同遣皁衣二十五人送旦等還吳奉表稱臣貢貂皮千枚鶡雞皮十具郭璞註山海經曰鶡雞似雉而大青色有毛角鬬敵死乃止鶡何葛翻悲喜不能自勝勝音升吳主壯之皆拜校尉六年是歲吳主出兵欲圍新城合肥新城也積二十餘日不敢下船大船向岸船高岸卑故謂舍船就岸曰下船以自船而下也遠于願翻孫權得吾移城必於其衆中有自大之言今大舉來欲要一切之功要一遙翻雖不敢至必當上岸耀兵以示有餘上時掌翻乃潛遣步騎六千伏肥水隱處以待之吳主果上岸耀兵寵伏兵卒起擊之卒讀曰猝斬首數百或有赴水死者吳主又使全琮攻六安亦不克六年蜀庲降都督張翼水經註寧州建寧縣故庲降都督屯蜀後主建興三年分益州郡置之南夷豪帥劉冑叛帥所類翻丞相亮以參軍巴西馬忠代翼召翼令還其人謂翼宜速歸即罪其人謂召翼者也即就也不然吾以蠻夷蠢動不稱職故還耳稱尺證翻然代人未至吾方臨戰場當運糧積穀為滅賊之資豈可以黜退之故而廢公家之務乎於是統攝不懈懈古隘翻代到乃發馬忠因其成基破冑斬之六年諸葛亮勸農講武作木牛流馬亮集曰流馬尺寸之數肋長三尺五寸廣三寸厚二寸二分左右同前軸孔分墨去頭四寸徑中二寸前腳孔分墨去前軸孔四寸五分廣一寸前杠孔分墨去前腳孔分墨三寸七分孔長二寸廣一寸後軸孔去前杠孔分墨一尺五分大小與前同後腳孔分墨去後軸孔三寸五分大小與前同後杠孔去後腳孔分墨二寸七分後載克寸去後杠孔分墨四寸五分前杠長一尺八寸廣二寸厚一寸五分後杠與等板方囊一板厚八分長二尺七寸高一尺六寸五分廣一尺六寸每枚受米二斛三斗從上杠孔去肋下七寸前後同上杠孔去下杠孔分墨一尺三寸孔長一寸五分廣七分八孔同前後四腳廣二寸厚一寸五分形制如象靬長四寸徑面四寸三分孔徑中二腳杠長二尺一寸廣二寸五分厚一寸四分同杠耳治斜谷邸閣息民休士三年而後用之按明年亮即出斜谷所謂息民休士三年而後用之通自再攻祁山之後至是凡三年也斜昌遮翻谷音浴又古祿翻二年二年春二月亮悉大衆十萬由斜谷入寇遣使約吳同時大舉二年三月庚寅山陽公卒獻帝自禪位至卒十有四年年五十四二年己酉大赦二年夏四月大疫二年崇華殿災是歲復修改崇華曰九龍殿引穀水過九龍前為玉井綺欄蟾蜍含受神龍吐出二年諸葛亮至郿郿音媚又音眉軍於渭水之南司馬懿引軍渡渭背水為壘拒之背蒲妹翻謂諸將曰亮若出武功依山而東誠為可憂若西上五丈原水經註五丈原在郿縣西渭水逕其北又亮與步騭書曰原在武功西十里上時掌翻亮果屯五丈原雍州刺史郭淮言於懿曰雍於用翻亮必爭北原宜先據之議者多謂不然淮曰若亮跨渭登原連兵北山隔絕隴道搖盪民夷盪徒朗翻此非國之利也懿乃使淮屯北原塹壘未成塹七豔翻漢兵大至淮逆擊卻之亮以前者數出數所角翻皆以運糧不繼使己志不伸乃分兵屯田為久駐之基耕者雜於渭濱居民之間而百姓安堵軍無私焉二年五月吳主入居巢湖口巢湖口即今柵江口也在和州歷陽縣西南百五十里水導源巢湖裴松之曰巢祖了翻今巢湖與焦湖通焦勦音近故有勦音今讀如字即太和六年滿寵所築新城也華夷對境圖魏合肥新城今為廬州謝步鎮又遣陸遜諸葛瑾將萬餘人入江夏沔口向襄陽瑾渠吝翻沔彌兗翻將軍孫韶張承入淮向廣陵淮陰六月滿寵欲率諸軍救新城殄夷將軍田豫曰殄夷將軍蓋魏所置然不在沈約志所謂四十號將軍之數賊悉衆大舉非圖小利欲質新城以致大軍耳質音致宜聽使攻城挫其銳氣不當與爭鋒也城不可拔衆必罷怠罷怠然後擊之可大克也罷讀曰疲若賊見計言窺見吾所以待敵之計也勢將自走若便進兵適入其計矣時東方吏士皆分休寵表請召中軍兵幷召所休將士分休猶番休也散騎常侍廣平劉劭議以為賊衆新至心專氣銳寵以少人自戰其地少詩沼翻若便進擊必不能制寵請待兵未有所失也以為可先遣步兵五千精騎三千先軍前發先悉薦翻揚聲進道震曜形勢騎到合肥疏其行隊疏讀曰疎行戶剛翻多其旌鼓曜兵城下引出賊後擬其歸路要其糧道賊聞大軍來騎斷其後必震怖遁走要一遙翻斷丁管翻怖普布翻不戰自破矣帝從之寵欲拔新城守致賊壽春帝不聽曰昔漢光武遣兵據略陽終以破隗囂事見四十二卷建武八年南守襄陽西固祁山賊來輒破於三城之下者地有所必爭也合肥襄陽以備吳祁山以備蜀也必不能拔敕諸將堅守吾將自往征之比至恐權走也比必寐翻乃使征蜀護軍秦朗督步騎二萬助司馬懿禦諸葛亮敕懿但堅壁拒守以挫其鋒彼進不得志退無與戰久停則糧盡虜略無所獲則必走走而追之全勝之道也秋七月章甲十六行本月下有壬寅二字乙十一行本同帝御龍舟東征滿寵募壯士焚吳攻具射殺吳主之弟子泰射而亦翻又吳吏士多疾病帝未至數百里疑兵先至吳主始謂帝不能出聞大軍至遂遁孫韶亦退陸遜遣親人韓扁奉表詣吳主邏者得之扁補典翻又音篇邏郎佐翻諸葛瑾聞之甚懼書與遜云大駕已還賊得韓扁具知吾闊狹且水乾宜當急去乾音干遜未答方催人種葑豆葑菜也謂之蔓菁豆菽也瑾曰伯言多智略陸遜一名議字伯言乃自來見遜遜曰賊知大駕已還無所復憂得專力於吾又已守要害之處兵將意動謂敵既知權還料遜兵當退已分守要害之處欲以遮截遜所部兵既無進取之氣而有遮截之慮則其意恐動將至於或降或潰也復扶又翻施設變術然後出耳今便示退賊當謂吾怖怖普布翻仍來相蹙必敗之勢也乃密與瑾立計令瑾督舟船遜悉上兵馬以向襄陽城上時掌翻魏人素憚遜名遽還赴城瑾便引船出遜徐整部伍張拓聲勢步趣船趣七喻翻魏人不敢逼行到白圍蓋立圍屯於白河口因以為名潛遣將軍周峻張梁等擊江夏新市安陸石陽新市安陸二縣皆屬江夏郡魏初以文聘為江夏太守屯石陽舟車湊焉頗為繁富沈約曰江夏曲陵縣本名石陽晉武帝太康元年改曰曲陵宋明帝泰始六年併曲陵入安陸縣㣥臣以為司馬懿方與諸葛亮相守未解車駕可西幸長安帝曰權走亮膽破大軍足以制之吾無憂矣遂進軍至壽春錄諸將功封賞各有差二年八月壬申葬漢孝獻皇帝于禪陵帝王紀曰禪陵在濁鹿城西北十里賢曰在今懷州脩武縣北二十五里劉澄之地記曰以漢禪魏因以名焉二年辛巳帝還許昌二年司馬懿與諸葛亮相守百餘日亮數挑戰數所角翻挑徒了翻懿不出亮乃遺懿巾幗婦人之服字書幗古獲翻婦人喪冠也又古對翻據劉昭註補輿服志公卿列侯夫人紺繒幗蓋婦人首飾之稱不特喪冠也遺于季翻懿怒上表請戰帝使衞尉辛毗杖節為軍師以制之護軍姜維謂亮曰辛佐治杖節而到賊不復出矣治直吏翻復扶又翻亮曰彼本無戰情所以固請戰者以示武於其衆耳將在軍君命有所不受孫武子及司馬穰苴之言也將即亮翻豈千里而請戰邪亮遣使者至懿軍懿問其寢食及事之煩簡不問戎事懿所憚者亮也問其寢食及事之煩簡以覘壽命之久近耳戎事何必問邪諸葛公夙興夜寐罰二十以上皆親覽焉所噉食不至數升懿告人曰諸葛孔明食少事煩其能久乎噉徒濫翻少詩沼翻亮病篤漢章甲十六行本漢下有主字乙十一行本同使尚書僕射李福省侍省悉景翻因諮以國家大計福至與亮語已別去已竟也語竟而別也復扶又翻下同亮曰孤知君還意近日言語雖彌日有所不盡更來求決耳公所問者公琰其宜也福謝前實失不諮請如公百年後誰可任大事者故輒還耳乞復請蔣琬之後誰可任者亮曰文偉可以繼之又問其次亮不答費禕字文偉亮不答繼禕之人非高帝此後亦非乃所知之意蓋亦見蜀之人士無足以繼禕者矣嗚呼是月亮卒于軍中長史楊儀整軍而出百姓奔告司馬懿懿追之姜維令儀反旗鳴鼓若將向懿者懿斂軍退不敢偪猶恐亮未死也陳讀曰陣入谷然後發喪入斜谷也死諸葛走生仲達司馬懿字仲達以當時百姓之諺觀之時人之於孔明何如也笑曰吾能料生不能料死故也懿按行亮之營壘處所歎曰天下奇才也方亮之出也懿以為若西上五丈原諸將無事矣及亮既死退軍懿按行其營壘處所以為天下奇才觀此則知懿已料亮之必屯五丈原而力不能制姑為此言以安諸將之心耳行下孟翻不及而還還從宣翻又如字初漢前軍師魏延蜀置中軍師前軍師後軍師善養士卒每隨亮出輒欲請兵萬人與亮異道會于潼關如韓信故事韓信請兵故事見九卷漢高帝二年延常謂亮為怯歎恨己才用之不盡楊儀為人幹敏亮每出軍儀常規畫分部籌度糧穀不稽思慮斯須便了斯此也須待也言即此待之便可辦事分扶問翻度徒洛翻取辦於儀延性矜高當時皆避下之下遐稼翻唯儀不假借延延以為至忿有如水火言不可同處也不忍有所偏廢也費禕使吳費父沸翻使疏吏翻吳主醉問禕曰楊儀魏延牧豎小人也雖嘗有鳴吠之益於時務然既已任之勢不得輕若一朝無諸葛亮必為禍亂矣諸君憒憒憒古對翻釋云心亂也不知防慮於此豈所謂貽厥孫謀乎禕對曰儀延之不協起於私忿耳而無黥韓難御之心也黥布韓信也混一函夏夏戶雅翻功以才成業由才廣若捨此不任防其後患是猶備有風波而逆廢舟檝非長計也檝與楫同亮病困與儀及司馬費禕等作身歿之後退軍節度令延斷後斷讀曰短姜維次之若延不從命軍便自發亮固知延非儀所能令矣儀祕不發喪令禕往揣延意指揣初委翻延曰丞相雖亡吾自見在此魏延矜高之語也見賢遍翻便可將喪還葬府親官屬謂長史以下也云何以一人死廢天下之事邪且魏延何人當為楊儀之所部勒作斷後將乎將即亮翻自與禕共作行留部分分扶問翻令禕手書與己連名告下諸將時禕為亮司馬延知儀必不己從故因禕來劫與共作行留處分行謂當從亮喪還者留謂當留拒敵者延欲令禕手書處分之語告其下諸將也當為君還解楊長史長史文吏稀更軍事紿徒亥翻為于偽翻更工衡翻必不違命也禕出奔馬而去延尋悔之已不及矣尋繼也言繼時而悔也延遣人覘儀等欲按亮成規諸營相次引軍還覘丑廉翻還從宣翻又如字下同延大怒攙儀未發攙初銜翻自後爭前曰攙今人猶言攙先率所領徑先南歸所過燒絕閣道延儀各相表叛逆一日之中羽檄交至漢主以問侍中董允留府長史蔣琬琬允咸保儀而疑延儀等令槎山通道槎仕下翻邪斫木也晝夜兼行亦繼延後延先至據南谷口南谷即褒谷也南谷曰褒北谷曰斜長四百七十里同為一谷儀等令將軍何平於前禦延何平即王平也本養外家何氏後復姓王此從其初姓公亡身尚未寒汝輩何敢乃爾延士衆知曲在延莫為用命為于偽翻皆散延獨與其子數人逃亡奔漢中儀遣將馬岱追斬之遂夷延三族蔣琬率宿衞諸營北行赴難難乃旦翻行數十里延死問至乃還問音訊也始延欲殺儀等冀時論以己代諸葛輔政故不降魏而南還擊儀實無反意也延雖無反意使其輔政是速蜀之亡也降戶江翻諸軍還成都大赦諡諸葛亮曰忠武侯初亮表於漢主曰成都有桑八百株薄田十五頃子弟衣食自有餘饒臣不別治生以長尺寸治直之翻長知兩翻若臣死之日不使內有餘帛外有贏財以負陛下卒如其所言卒子恤翻丞相長史張裔常稱亮曰公賞不遺遠罰不阿近爵不可以無功取刑不可以貴勢免此賢愚所以僉忘其身者也陳壽評曰諸葛亮之為相國也撫百姓示儀軌儀度也軌法也從權制開誠心布公道盡忠益時者雖讎必賞犯法怠慢者雖親必罰服罪輸情者雖重必釋游辭巧飾者雖輕必戮善無微而不賞惡無纖而不貶庶事精練物理其本言事事物物必從其本而治之虛偽不齒終於邦域之內咸畏而愛之刑政雖峻而無怨者以其用心平而勸戒明也可謂識治之良才管蕭之亞匹矣治直吏翻亞次也匹偶也二年初長水校尉廖立廖力弔翻姓也裴松之音理救翻姓譜廖姓周文王子伯廖之後後漢有廖湛風俗通曰古有廖叔安左傳作飂蓋其後也自謂才名宜為諸葛亮之副常以職位游散散悉亶翻怏怏怨謗無已亮廢立為民徙之汶山據立傳廢徙汶山後主初立之時也汶山漢武帝開為郡宣帝地節三年合於蜀郡蜀又分置汶山郡唐為茂州汶山縣汶音立垂泣曰吾終為左衽矣李平聞之亦發病死平廢徙見上太和五年得自補復策後人不能故也復扶又翻習鑿齒論曰昔管仲奪伯氏駢邑三百沒齒而無怨言聖人以為難見論語鄭氏曰小國之下大夫采地方一成其定稅三百家故三百戶也其實大國下大夫亦三百戶故論語云管仲奪伯氏駢邑三百一成所以三百家者一成九百夫宮室塗巷山澤三分去一餘有六百夫又不易再易通率一家受二夫之田是定稅三百家也李嚴致死豈徒無怨言而已哉夫水至平而邪者取法鑑至明而醜者忘怒水鑑之所以能窮物而無怨者以其無私也水鑑無私猶以免謗況大人君子懷樂生之心樂音洛流矜恕之德法行於不可不用刑加乎自犯之罪爵之而非私誅之而不怒天下有不服者乎二年蜀人所在求為諸葛亮立廟漢主不聽為于偽翻百姓遂因時節私祭之於道陌上步兵校尉習隆等姓譜習國名後以為姓風俗通漢有習響為陳相立一廟於沔陽近其靳翻斷其私祀斷音短漢主從之漢主以左將軍吳懿為車騎將軍假節督漢中代魏延也總統國事尋加琬行都護假節領益州刺史時新喪元帥喪息浪翻遠近危悚琬出類拔萃類倫也萃聚也處昌呂翻既無戚容又無喜色神守舉止有如平日由是衆望漸服吳人聞諸葛亮卒恐魏承衰取蜀增巴丘守兵萬人此巴丘即巴陵也今岳州巴陵縣有天岳山臨大江一名幕阜前有培塿謂之巴蛇冢相傳以為羿屠巴蛇於洞庭其骨若陵因謂之巴陵二欲以事分割漢人聞之亦增永安之守以防非常漢主使右中郎將宗預使吳使疏吏翻吳主問曰東之與西譬猶一家而聞西更增白帝之守何也對曰臣以為東益巴丘之戍西增白帝之守皆事勢宜然俱不足以相問也吳主大笑嘉其抗盡謂抗言不為吳屈又盡情無所隱也蜀先主殂諸葛亮當國始遣鄧芝使吳二年吳諸葛恪以丹陽山險民多果勁雖前發兵徒得外縣平民而已陸遜先嘗部伍山越為兵事見六十八卷漢獻帝建安二十四年莫能禽盡屢自求為官出之為于偽翻三年可得甲士四萬衆議咸以為丹陽地勢險阻與吳郡會稽新都番陽四郡鄰接會工外翻番蒲何翻周旋數千里山谷萬重重直龍翻其幽邃人民未嘗入城邑對長吏長知兩翻皆仗兵野逸白首於林莽莽莫補翻又母黨翻草深曰莽逋亡宿惡咸共逃竄山出銅鐵自鑄甲兵俗好武習戰好呼到翻高尚氣力其升山越險抵突叢棘若魚之走淵猿狖之騰木也走音奏狖余救翻說文曰狖鼠屬善旋時觀間隙間古莧翻出為寇盜每致兵征伐尋其窟藏其戰則至敗則鳥竄自前世以來不能羈也皆以為難恪父瑾聞之亦以事終不逮逮及也胃恪所出山民終不能及四萬之數也恪不大興吾家將赤吾族也恪盛陳其必捷吳主乃拜恪撫越將軍以招撫山越為將軍號使行其策二年冬十一月洛陽地震二年吳潘濬討武陵蠻數年斬獲數萬自是㣥蠻衰弱一方寧靜十一月濬還武昌太和五年吳遣潘濬討武陵蠻王崇武標點容肇祖聶崇岐覆校
