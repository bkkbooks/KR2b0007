body:
  text: 資治通鑑卷第一百九十八端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註唐紀十四太宗文武大聖大廣孝皇帝下之上貞觀十九年貞觀十九年乙巳六四五觀古玩翻貞觀十九年六月丁酉李世勣攻白巖城西南上臨其西北城主孫代音潛遣腹心請降降戶江翻下同臨城投刀鉞為信且曰奴願降城中有不從者上以唐幟與其使幟昌志翻使疏吏翻曰必降者宜建之城上代音建幟城中人以為唐兵已登城皆從之上之克遼東也白巖城請降既而中悔上怒其反覆令軍中曰得城當悉以人物賞戰士言以其男女及財物為賞也帥甲士數十人請曰士卒所以爭冒矢石不顧其死者貪虜獲耳帥讀曰率下同冒莫比翻下同今城垂拔柰何更受其降孤戰士之心觀世勣此言蓋少年為盜之氣習未除耳將軍言是也然縱兵殺人而虜其妻孥孥音奴朕所不忍將軍麾下有功者朕以庫物賞之庶因將軍贖此一城世勣乃退得城中男女萬餘口上臨水設幄受其降仍賜之食八十以上賜帛有差他城之兵在白巖者悉慰諭給糧仗任其所之先是遼東城長史為部下所殺其省事奉妻章十二行本妻上有其字乙十一行本同張校同子奔白巖省事吏職也自後魏以來有之賀拔岳之攻尉遲菩薩也菩薩使省事傳語是也先悉薦翻省悉景翻賜帛五匹為長史造靈輿歸之平壤為于偽翻下自為彼為汝為當為同以白巖城為巖州以孫代音為刺史契苾何力瘡重契欺訖翻苾毘必翻上自為傅藥推求得刺何力者高突勃付何力使自殺之何力奏稱彼為其主冒白刃刺臣乃忠勇之士也刺七亦翻與之初不相識非有怨讎遂捨之怨於元翻初莫離支遣加尸城七百人戍蓋牟城李世勣盡虜之其人請從軍自效上曰汝家皆在加尸汝為我戰莫離支必殺汝妻子得一人之力而滅一家吾不忍也戊戌皆廩賜遣之己亥以蓋牟城為蓋州丁未車駕發遼東丙辰至安市城安市漢古縣屬遼東郡舊書薛仁貴傳作安地城丁巳高麗北部耨薩延壽惠真帥高麗靺鞨兵十五萬救安市後漢書東夷傳高句驪有五族有消奴部絕奴部順奴部灌奴部桂婁部賢曰按今高麗五部一曰內部一名黃部即桂婁部也二曰北部一名後部即絕奴部也三曰東部一名左部即順奴部也四曰南部一名前部即灌奴部也五曰西部一名右部即消奴部也據北史高麗五部各有耨薩蓋其酋長之稱也耨奴屋翻新書高麗大城置耨薩一比都督也麗力知翻靺鞨音末曷今為延壽策有三引兵直前連安市城為壘據高山之險食城中之粟縱靺鞨掠吾牛馬攻之不可猝下欲歸則泥潦為阻坐困吾軍上策也若高延壽出於上策不知太宗何以應之唯有江夏王道宗之計策耳與之宵遁中策也不度智能來與吾戰下策也度徒洛翻卿曹觀之必出下策成擒在吾目中矣高麗有對盧年老習事東夷傳高句驪置官有相加對盧沛者陳壽曰其置官有對盧則不置沛者有沛者則不置對盧薛居正曰高麗官其大者號大對盧比一品總知國事對盧以下官總十一級列置州縣六十餘大城置耨薩比都督小城置運使比刺史秦王內芟㣥雄芟所銜翻外服戎狄獨立為帝此命世之材今舉海內之衆而來不可敵也為吾計者莫若頓兵不戰曠日持久分遣奇兵斷其運道斷丁管翻糧食既盡求戰不得欲歸無路乃可勝也此即帝所謂上策也引軍直進去安市城四十里上猶恐其低徊不至命左衞大將軍阿史那社爾將突厥千騎以誘之厥九勿翻騎奇寄翻誘音酉兵始交而偽走高麗相謂曰易與耳競進乘之至安市城東南八里依山而陳易以豉翻陳讀曰陣下為陳陳於布陳其陳同上悉召諸將問計長孫無忌對曰臣聞臨敵將戰必先觀士卒之情臣適行經諸營見士卒聞高麗至皆拔刀結旆喜形於色此必勝之兵也陛下未冠冠古玩翻身親行陣行戶剛翻凡出奇制勝皆上稟聖謀諸將奉成算而已今日之事乞陛下指蹤以獵為喻指示獸蹤則狗得以追殺諸公以此見讓朕當為諸公商度度徒洛翻乃與無忌等從數百騎乘高望之觀山川形勢可以伏兵及出入之所高麗靺鞨合兵為陳長四十里長直亮翻江夏王道宗曰高麗傾國以拒王師平壤之守必弱願假臣精卒五千覆其本根則數十萬之衆可不戰而降上不應為上悔不用道宗策張本夏戶雅翻我以爾國強臣弒其主故來問罪至於交戰非吾本心入爾境芻粟不給故取爾數城俟爾國脩臣禮則所失必復矣延壽信之不復設備使疏吏翻紿蕩亥翻復扶又翻上夜召文武計事命李世勣將步騎萬五千陳於西嶺長孫無忌將精兵萬一千為奇兵自山北出於狹谷以衝其後上自將步騎四千挾鼓角偃旗幟登北山上敕諸軍聞鼓角齊出奮擊因命有司張受降幕於朝堂之側降戶江翻朝直遙翻行營備宮省之制故亦有朝堂戊午延壽等獨見李世勣布陳勒兵欲戰上望見無忌軍塵起命作鼓角舉旗幟諸軍鼓譟並進延壽等大懼欲分兵禦之而其陳已亂會有雷電方合戰而雷電皆至龍門漢皮氏縣地後魏曰龍門縣幷置龍門郡隋廢郡以縣屬蒲州唐武德初為泰州治所貞觀十七年州廢屬絳州薛仁貴自編戶應募大呼陷陳著陟略翻呼火故翻所向無敵高麗兵披靡披普彼翻大軍乘之高麗兵大潰斬首二萬餘級上望見仁貴召拜游擊將軍唐制武散階游擊將軍從五品下安都之六世孫薛安都為將以勇聞於宋魏之間以字行延壽等將餘衆依山自固上命諸軍圍之長孫無忌悉撤橋梁斷其歸路斷丁管翻己未延壽惠真帥其衆三萬六千八百人請降考異曰實錄云李勣奏曰向若陛下不自親行臣與道宗將數萬人攻安市城未克延壽等十餘萬抽戈齊至城內兵士復應開門而出臣救首救尾旋踵即敗必為延壽等縛送向平壤為莫離支等所笑今日臣敢謝陛下性命恩澤帝素狎勣笑而頷之按勣後獨將兵取高麗豈必太宗親行邪此非史官虛美乃勣諛辭耳今不取膝行而前拜伏請命上語之曰東夷少年跳梁海曲至於摧堅決勝故當不及老人自今復敢與天子戰乎語牛倨翻少詩照翻復扶又翻下無復同皆伏地不能對上簡耨薩以下酋長三千五百人授以戎秩遷之內地酋慈由翻長知兩翻餘皆縱之使還平壤皆雙舉手以顙頓地歡呼聞數十里外聞音問收靺鞨三千三百人悉阬之以靺鞨犯陣也牛五萬頭鐵甲萬領他器械稱是稱尺證翻高麗舉國大駭後黃城銀城皆自拔遁去數百里無復人煙上驛書報太子仍與高士廉等書曰朕為將如此何如史言太宗有矜功之心將即亮翻據舊史其山本名六山更工衡翻秋七月辛未上徙營安市城東嶺己卯詔標識戰死者尸識音志俟軍還與之俱歸戊子以高延壽為鴻臚卿臚陵如翻高惠真為司農卿張亮軍過建安城下壁壘未固士卒多出樵牧高麗兵奄至軍中駭擾亮素怯踞胡床直視不言將士見之更以為勇總管張金樹等鳴鼓勒兵擊高麗破之八月甲辰候騎獲莫離支諜者高竹離反接詣軍門反接兩手縛之也騎奇寄翻諜達協翻下同解縛問曰何瘦之甚對曰竊道間行間古莧翻下同不食數日矣命賜之食謂曰爾為諜宜速反命為我寄語莫離支語牛倨翻下語爾同欲知軍中消息可遣人徑詣吾所何必間行辛苦也竹離徒跣上賜屩而遣之屩居灼翻草履也丙午徙營於安市城南上在遼外凡置營但明斥候不為塹壘雖逼其城高麗終不敢出為寇抄塹七豔翻軍士單行野宿如中國焉史言帝威懾絕域所謂善師者不陳上之章十二行本之下有將字乙十一行本同孔本同張校同伐高麗也薛延陀遣使入貢使疏吏翻上謂之曰語爾可汗可從刊入聲汗音寒汝能為寇宜亟來真珠可汗惶恐遣使致謝且請發兵助軍上不許及高麗敗於駐驆山莫離支使靺鞨說真珠啗以厚利真珠懾服不敢動說輸芮翻啗徒覽翻又徒濫翻懾之涉翻考異曰實錄上謂近臣曰以我量之延陀其死矣聞者莫能測按太宗雖明安能料薛延陀之死今不取九月壬申真珠卒卒子恤翻上為之發哀為于偽翻初真珠請以其庶長子曳莽為突利失可汗居東方統雜種長知兩翻種章勇翻嫡子拔灼為肆葉護可汗居西方統薛延陀詔許之皆以禮冊命曳莽性躁擾躁則到翻輕用兵與拔灼不協真珠卒來會喪既葬曳莽恐拔灼圖己先還所部拔灼追襲殺之自立為頡利俱利薛沙多彌可汗為薛延陀亂亡張本貞觀十九年上之克白巖也謂李世勣曰吾聞安市城險而兵精其城主材勇莫離支之亂城守不服莫離支擊之不能下因而與之建安兵弱而糧少少詩沼翻若出其不意攻之必克公可先攻建安建安下則安市在吾腹中此兵法所謂城有所不攻者也孫子兵法之言建安在南安市在北吾軍糧皆在遼東今踰安市而攻建安若賊斷吾運道將若之何斷丁管翻不如先攻安市安市下則鼓行而取建安耳上曰以公為將將即亮翻安得不用公策勿誤吾事世勣遂攻安市安市人望見上旗蓋輒乘城鼓譟上怒世勣請克城之日男女皆阬之安市人聞之益堅守攻久不下高延壽高惠真請於上曰奴既委身大國不敢不獻其誠欲天子早成大功奴得與妻子相見安市人顧惜其家人自為戰未易猝拔易以豉翻今奴以高麗十餘萬衆望旗沮潰沮在呂翻國人膽破烏骨城耨薩老耄不能堅守移兵臨之朝至夕克其餘當道小城必望風奔潰然後收其資糧鼓行而前平壤必不守矣㣥臣亦言張亮兵在沙城沙城即卑沙城乘高麗兇懼兇許拱翻亻併力拔烏骨城渡鴨綠水直取平壤在此舉矣上將從之獨長孫無忌以為天子親征異於諸將不可乘危徼幸徼古堯翻今建安新城之虜衆猶十萬若向烏骨皆躡吾後不如先破安市取建安然後長驅而進此萬全之策也上乃止太宗之定天下多以出奇取勝獨遼東之役欲以萬全制敵所以無功諸軍急攻安市上聞城中雞彘聲謂李世勣曰圍城積久城中煙火日微今雞彘甚喧此必饗士欲夜出襲我宜嚴兵備之是夜高麗數百人縋城而下縋馳偽翻上聞之自至城下召兵急擊斬首數十級高麗退走江夏王道宗督衆築土山於城東南隅浸逼其城城中亦增高其城以拒之士卒分番交戰日六七合衝車礮石壞其樓堞礮與砲同匹皃翻壞音怪道宗傷足上親為之針塞悉則翻為于偽翻築山晝夜不息凡六旬用功五十萬山頂去城數丈下臨城中道宗使果毅傅伏愛將兵屯山頂以備敵山頹壓城城崩會伏愛私離所部離力智翻高麗數百人從城缺出戰遂奪據土山塹而守之塹七豔翻上怒斬伏愛以徇命諸將攻之三日不能克道宗徒跣詣旗下請罪上曰汝罪當死但朕以漢武殺王恢見十八卷元光二年秦穆公使孟明帥師東伐再為晉師所敗穆公復用孟明孟明增脩其政帥師伐晉晉人不敢出遂霸西戎故特赦汝耳上以遼左早寒草枯水凍士馬難久留且糧食將盡癸未敕班師先拔遼蓋二州戶口渡遼乃耀兵於安市城下而旋城中皆屏跡不出屏必郢翻城主登城拜辭上嘉其固守賜縑百匹縑幷絲繒也命李世勣江夏王道宗將步騎四萬為殿殿丁練翻乙酉至遼東丙戌渡遼水遼澤泥潦車馬不通命長孫無忌將萬人翦草填道水深處以車為梁上自繫薪於馬鞘以助役將即亮翻鞘所交翻鞭鞘也按孔穎達禮記正義曰弓頭為鞘此所謂馬鞘蓋馬鞍頭也冬十月丙申朔上至蒲溝駐馬督填道諸軍渡渤錯水蒲溝渤錯水皆在遼澤中士卒沾濕多死者敕然火於道以待之凡征高麗拔玄菟橫山蓋牟磨米遼東白巖卑沙麥谷銀山後黃十城菟同都翻磨莫臥翻徙遼蓋巖三州戶口入中國者七萬人考異曰實錄上云徙三州戶口入內地者前後七萬人下癸丑詔書云獲戶十萬口十有八萬蓋幷不徙者言之耳斬首四萬餘級戰士死者幾二千人幾音祁近也戰馬死者什七八上以不能成功深悔之歎曰魏徵若在不使我有是行也命馳驛祀徵以少牢少詩照翻復立所製碑踣碑見上卷十七年勞賜之勞力到翻丙午至營州營州至洛陽二千九百一十里命有司設太牢上自作文以祭之臨哭盡哀其父母聞之曰吾兒死而天子哭之死何所恨上謂薛仁貴曰朕諸將皆老思得新進驍勇者將之將即亮翻驍堅堯翻無如卿者朕不喜得遼東喜得卿也丙辰上聞太子奉迎將至從飛騎三千人馳入臨渝關漢遼西郡有臨渝縣唐志營州有渝關守捉城杜佑曰臨渝關在平州盧龍縣城東百八十里騎奇寄翻師古曰渝音喻上之發定州也指所御褐袍謂太子曰俟見汝乃易此袍耳在遼左雖盛暑流汗弗之易及秋穿敗左右請易之上曰軍士衣多弊吾獨御新衣可乎至是太子進新衣乃易之諸軍所虜高麗民萬四千口先集幽州將以賞軍士上愍其父子夫婦離散命有司平其直悉以錢布贖為民讙呼之聲三日不息讙許爰翻十一月辛未車駕至幽州高麗民迎於城東拜舞呼號號戶高翻宛轉於地塵埃彌望庚辰過易州境司馬陳元璹使民於地室蓄火種蔬而進之上惡其諂免元璹官璹殊玉翻惡烏路翻丙戌車駕至定州丁亥吏部尚書楊師道坐所署用多非其才左遷工部尚書壬辰車駕發定州十二月辛丑上病癰御步輦而行戊申至幷州太子為上吮癰扶輦步從者數日為于偽翻吮徐兗翻從才用翻辛亥上疾瘳百官皆賀瘳丑留翻上之征高麗也使右領軍大將軍執失思力將突厥屯夏州之北以備薛延陀力將即亮翻下同夏戶雅翻薛延陀多彌可汗既立以上出征未還引兵寇河南河南者北河之南即朔方新秦之地思力羸形偽退誘之深入及夏州之境整陳以待之羸倫為翻誘音酉陳讀曰陣薛延陀大敗追奔六百餘里耀威磧北而還磧七迹翻還從宣翻又如字考異曰高宗實錄云會延陀死耀威漠北而還其意指真珠為延陀也按真珠憚太宗威靈不敢入寇又死在九月而此云冬來寇必非真珠也田仁會傳作十八年亦誤也復扶又翻己未敕禮部尚書江夏王道宗發朔幷汾箕嵐代忻蔚雲九州兵鎮朔州武德三年分幷州之樂平遼山平城石艾置遼州樂平郡八年改曰箕州後周置蔚州於漢代郡之靈丘隋廢州以靈丘縣屬肆州唐武德六年分肆州之靈丘易州之飛狐地置蔚州雲州雲中郡貞觀十四年自朔州北定襄城徙治定襄縣其地實隋馬邑郡之雲內縣恆安鎮即後魏所都平城也開元十八年改定襄縣為雲中縣蔚紆勿翻左驍衞大將軍阿史那社爾發勝夏銀綏丹延鄜坊石隰十州兵鎮勝州勝州隋之榆林郡後魏舊有銀州隋廢為儒林縣屬綏州貞觀二年分綏州之儒林真鄉縣復置銀州銀川郡漢西河之圁陰圁陽縣地也圁音銀杜佑曰銀州春秋白狄地治儒林縣漢圁陰縣地丹州古孟門河西之地西魏置汾州義川郡後改州為丹州隋廢州及郡以義川縣屬延州義寧元年分延州之義川咸寧汾川置丹州咸寧郡坊州春秋白狄之地姚興置中部縣後魏置中部郡隋廢郡以中部縣屬敷州武德二年分鄜州置坊州中部郡以周天和七年元皇帝放牧鄜州於此置馬坊也鄜音膚左武候將軍薛孤吳發靈原寧鹽慶五州兵鎮靈州西魏於五原置西安州後改為鹽州隋廢州為鹽川郡貞觀二年復置鹽州與道宗等相應薛延陀至塞下知有備不敢進貞觀十九年初上留侍中劉洎輔皇太子於定州仍兼左庶子檢校民部尚書總吏禮戶部三尚書事劉洎既檢校民部尚書又總吏禮是為三尚書事民部之外安得復有戶部哉唐六典貞觀二十三年始改民部為戶部洎其冀翻謂洎曰我今遠征爾輔太子安危所寄宜深識我意對曰願陛下無憂大臣有罪者臣謹即行誅上以其言妄發頗怪之戒曰卿性疏而太健必以此敗深宜慎之及上不豫洎從內出色甚悲懼謂同列曰疾勢如此聖躬可憂或譖於上曰洎言國家事不足憂但當輔幼主行伊霍故事大臣有異志者誅之自定矣上以為然因洎於上前先有誅有罪大臣之言遂信譖者之言為然庚申下詔稱洎與人竊議窺窬萬一謀執朝衡自處伊霍朝直遙翻處昌呂翻猜忌大臣皆欲夷戮宜賜自盡賜自盡即賜死也令自盡其命考異曰實錄云黃門侍郎褚遂良誣奏之曰國家之事不足慮也正當輔少主行伊霍大臣有異志者誅之自然定矣太宗疾愈詔問其故洎以實對遂良執證之不已洎引中書令馬周以自明太宗問周周對與洎所陳不異帝以詰遂良又證周諱之洎遂及罪按此事中人所不為遂良忠直之臣且素無怨仇何至如此蓋許敬宗惡遂良故修實錄時以洎死歸咎於遂良耳今不取孥音奴中書令馬周攝吏部尚書以四時選為勞四時選始一百九十二卷元年選須絹翻至三月畢從之復扶又翻貞觀十九年是歲右親衞中郎將裴行方六典曰隋氏左右親衞左右勳衞左右翊衞各置開府一人武德七年改開府各置中郎將一人正四品下掌各領其屬以宿衞而各總其府事將即亮翻大破之貞觀八年改會州汶山郡曰茂州取界內茂滋山為名後書冉駹其山有六夷七羌九氐各部落西至乞習山臨弱水而歸蜀之西山有弱水二十年二十年春正月辛未夏州都督喬師望右領軍大將軍執失思力等擊薛延陀大破之虜獲二千餘人多彌可汗輕騎遁去騎奇寄翻部內騷然矣二十年丁丑遣大理卿孫伏伽等二十二人以六條巡察四方用漢六條也其人詣闕稱冤者前後相屬屬之欲翻上令褚遂良類狀以聞上親臨決以能進擢者二十人以罪死者七人流以下除免者數百千人二十年二月乙未上發幷州三月己巳車駕還京師幷州至京師一千三百六十里吾以天下之衆困於小夷何也靖曰此道宗所解解戶買翻上顧問江夏王道宗具陳在駐驆時乘虛取平壤之言上悵然曰當時匆匆吾不憶也是役也不唯不用乘虛取平壤之策乘勝取烏骨之策亦不用也二十年上疾未全平欲專保養庚午詔軍國機務並委皇太子處決於是太子間日聽政於東宮既罷則入侍藥膳不離左右處昌呂翻間古莧翻離力智翻上命太子暫出遊觀太子辭不願出上乃置別院於寢殿側使太子居之褚遂良請遣太子旬日一還東宮與師傅講道義從之上嘗幸未央宮辟仗已過辟仗者衞士在駕前攘辟左右止行人所謂陳兵清道而後行也辟音闢橫刀者用皮襻帶之刀橫掖下詰去吉翻曰聞辟仗至懼不敢出辟仗者不見遂伏不敢動上遽引還顧謂太子茲事行之則數人當死汝於後速縱遣之又嘗乘腰輿腰輿令人舉之其高至腰親衞勳衞翊衞謂之三衞色變上曰此間無御史吾不汝罪也二十年陝人常德玄告刑部尚書張亮養假子五百人與術士公孫常語云名應圖讖陝失冉翻讖楚譖翻又問術士程公穎曰吾臂有龍鱗起欲舉大事可乎上命馬周等按其事亮辭不服上曰亮有假子五百人養此輩何為正欲反耳命百官議其獄皆言亮反當誅獨將作少匠李道裕言亮反形未具將作少匠從四品下上遣長孫無忌房玄齡就獄與亮訣曰法者天下之平與公共之公自不謹與凶人往還陷入於法今將柰何公好去好去者與之決別之辭己丑亮與公穎俱斬西市籍沒其家歲餘刑部侍郎缺上命執政妙擇其人擬數人皆不稱旨既而曰朕得其人矣往者李道裕議張亮獄云反形未具此言當矣稱尺證翻當丁浪翻朕雖不從至今悔之遂以道裕為刑部侍郎二十年閏月癸巳朔日有食之二十年戊戌罷遼州都督府及巖州伐高麗所得二州二十年夏四月甲子太子太保蕭瑀解太保仍同中書門下三品二十年五月甲寅高麗王藏及莫離支蓋金遣使謝罪使疏吏翻下同幷獻二美女上還之金即蘇文也二十年六月丁卯西突厥乙毗射匱可汗遣使入貢且請婚上許之且使割龜茲于闐疏勒朱俱波葱嶺五國以為聘禮于闐時兼有漢戎盧扜彌渠勒皮山五國故地疏勒在葱嶺東北判汗國治葱嶺中都城杜佑曰朱俱波亦曰朱俱槃漢子合國也去疏勒八九百里二十年薛延陀多彌可汗性褊急猜忌無恩廢棄父時貴臣專用己所親昵昵尼質翻國人不附多彌多所誅殺人不自安回紇酋長吐迷度與僕骨同羅共擊之紇下沒翻酋慈由翻長知兩翻多彌大敗乙亥詔以江夏王道宗左衞大將軍阿史那社爾為瀚海安撫大使又遣右領衞大將軍執失思力將突厥兵右驍衞大將軍契苾何力將涼州及胡兵代州都督薛萬徹營州都督張儉各將所部兵分道並進以擊薛延陀上遣校尉宇文法詣烏羅護靺鞨烏羅護直京師東北六千里一曰烏羅渾即後魏之烏洛侯也東鄰靺鞨大抵風俗皆靺鞨也將即亮翻驍堅堯翻契欺訖翻苾毗必翻校戶教翻靺鞨音末曷法帥靺鞨擊破之薛延陀國中驚擾曰唐兵至矣諸部大亂多彌引數千騎奔阿史德時健部落頡利滅李靖徙突厥羸破數百帳於雲中以阿史德為之長衆稍盛幷其宗族殆盡遂據其地諸俟斤互相攻擊爭遣使來歸命俟渠之翻薛延陀餘衆西走猶七萬餘口共立真珠可汗兄子咄摩支為伊特勿失可汗歸其故地尋去可汗之號咄當沒翻去羌呂翻遣使奉表請居鬱督軍山之北使兵部尚書崔敦禮就安集之敕勒九姓酋長以其部落素服薛延陀種聞咄摩支來皆恐懼朝議恐其為磧北之患乃更遣李世勣與九姓敕勒共圖之上戒世勣曰降則撫之叛則討之種章勇翻朝直遙翻磧七迹翻降戶江翻下同考異曰舊李勣傳云詔勣以二百騎發突厥兵討擊今從鐵勒傳己丑上手詔以薛延陀破滅其敕勒諸部或來降附或未歸服今不乘機恐貽後悔朕當自詣靈州招撫其去歲征遼東兵皆不調發調徒釣翻時太子當從行少詹事張行成上疏以為皇太子從幸靈州不若使之監國上時掌翻監古銜翻接對百寮明習庶政既為京師重鎮且示四方盛德宜割私愛俯從公道上以為忠進位銀青光祿大夫二十年李世勣至鬱督軍山考異曰勣傳作烏德犍山唐曆云即鬱督軍山虜語兩音也鐵勒傳云至于天山今從唐曆帥讀曰率薛延陀咄摩支南奔荒谷世勣遣通事舍人蕭嗣業往招慰咄摩支詣嗣業降其部落猶持兩端世勣縱兵追擊前後斬五千餘級虜男女三萬餘人秋七月咄摩支至京師拜右武衞大將軍二十年八月甲子立皇孫忠為陳王二十年己巳上行幸靈州二十年江夏王道宗兵既渡磧遇薛延陀阿波達官衆數萬拒戰道宗擊破之斬首千餘級追奔二百里道宗與薛萬徹各遣使招諭敕勒諸部其酋長皆喜頓首請入朝朝直遙翻庚午車駕至浮陽浮陽舊書作涇陽當從之涇陽縣前漢屬安定郡後漢晉省後魏屬隴東郡隋唐屬京兆杜佑曰京兆涇陽縣乃秦封涇陽君之地漢涇陽縣在今平涼郡界涇陽故城是此時車駕蓋至京兆之涇陽跌徒結翻考異曰舊回紇鐵勒傳作多覽葛今從實錄及本紀唐曆又回紇傳陳彭年唐紀作斛薩鐵勒傳作解薛今從實錄實錄又有契丹奚云十三姓按契丹奚本非薛延陀所統又內附已久嘗從征遼非至此乃降今從舊本紀稱薛延陀不事大國暴虐無道不能與奴等為主自取敗死部落鳥散不知所之奴等各有分地分扶問翻不從薛延陀去歸命天子願賜哀憐乞置官司養育奴等上大喜辛未詔回紇等使者宴樂頒賚拜官樂音洛賜其酋長璽書璽斯氏翻遣右領軍中郎將安永壽報使使疏吏翻下同壬申上幸漢故甘泉宮甘泉宮在京兆雲陽縣界磨石嶺又曰磨盤嶺又曰車盤嶺元和志曰當其登山必自車箱阪而上阪在雲陽縣西北三十八里縈紆曲折單軌財通上阪即平原宏敞樓觀相屬以其曲折故名戎狄與天地俱生上皇並列流殃構禍乃自運初言戎狄之流殃構禍乃自唐興運之初也遂擒頡利始弘廟略已滅延陀鐵勒百餘萬戶散處北溟處昌呂翻遠遣使人委身內屬請同編列並為州郡混元以降太極元氣函三為一混沌未分謂之混元宜備禮告廟仍頒示普天庚辰至涇州丙戌踰隴山隴山時屬隴州汧源縣界觀馬牧原州平高縣南有瓦亭故關瓦亭水出隴山東北斜趣西南流經成紀略陽顯親界又東南出新陽峽入于渭故有東西瓦亭之別上至靈州靈州在京師西北千二百五十里咸云願得天至尊為奴等天可汗子子孫孫常為天至尊奴死無所恨甲辰上為詩序其事曰雪恥酬百王除凶報千古公卿請勒石於靈州從之二十年特進同中書門下三品宋公蕭瑀性狷介與同寮多不合狷吉縣翻嘗言於上曰房玄齡與中書門下衆臣朋黨不忠執權膠固陛下不詳知但未反耳上曰卿言得無太甚人君選賢才以為股肱心膂當推誠任之人不可以求備必捨其所短取其所長朕雖不能聰明何至頓迷臧否乃至於是否音鄙瑀內不自得既數忤旨數所角翻忤五故翻上亦銜之但以其忠直居多未忍廢也上嘗謂張亮曰卿既事佛何不出家瑀因自請出家上曰亦知公雅好桑門今不違公意好呼到翻瑀須臾復進曰復扶又翻臣適思之不能出家上以瑀對㣥臣發言反覆尤不能平會稱足疾不朝或至朝堂而不入見上知瑀意終怏怏冬十月手詔數其罪曰朝直遙翻見賢遍翻怏於兩翻數所具翻朕於佛教非意所遵求其道者未驗福於將來脩其教者翻受辜於既往至若梁武窮心於釋氏簡文銳意於法門傾帑藏以給僧祗殫人力以供塔廟帑他朗翻藏徂浪翻祗巨支翻事並見梁紀及乎三淮沸浪三淮本之詩淮有三洲謂侯景既亂而蕭勃元蘭又復亂於嶺南也引殘魂於雀鷇熊蹯楚成王事雀鷇趙武靈王事引以喻梁武餓死於臺城蹯音煩鷇苦候翻社稷俄頃而為墟報施之徵何其謬也施式豉翻瑀踐覆車之餘軌襲亡國之遺風棄公就私未明隱顯之際身俗口道莫辨邪正之心修累葉之殃源祈一躬之福本上以違忤君主下則扇習浮華自請出家尋復違異復扶又翻一迴一惑在乎瞬息之間自可自否變於帷扆之所帷扆之所謂天子朝㣥臣之所豈具瞻之量乎朕隱忍至今瑀全無悛改悛丑緣翻可商州刺史商州漢弘農上洛商縣地晉置上洛郡後魏置洛州後周改商州京師至商州二百八十一里二十年上自高麗還蓋蘇文益驕恣雖遣使奉表其言率皆詭誕又待唐使者倨慢常窺伺邊隙屢敕令勿攻新羅而侵陵不止壬申詔勿受其朝貢更議討之使疏吏翻伺相吏翻朝直遙翻二十年丙戌車駕還京師冬十月己丑上以幸靈州往還冒寒疲頓欲於歲前專事保攝十一月己張己作乙丑詔祭祀表疏胡客兵馬宿衞行魚契給驛祭祀謂郊廟社稷明堂也表疏在朝㣥臣及四方所上者胡客四夷朝貢之客兵馬調遣征伐及番上宿衞者也符寶郎掌天子八寶及國之符節辨其所用有事則請之於內既事則奉而藏之藏其左而班其右以合中外之契一曰銅魚符所以起軍旅易守長二曰傳符所以給郵驛通制命三曰隨身魚符所以明貴賤應徵召四曰木契所以重鎮守慎出納五曰旌節所以委良能假賞罰魚符之制王畿之內左三右一王畿之外左五右一左者在內右者在外行用之日從第一為首後事須用以次發之周而復始大事兼敕書小事但降符函封遣使合而行之傳符之制太子監國曰雙龍符左右各十京都留守曰麟符左二十其右一十有九東方曰青龍符西方曰騶虞符南方曰朱雀符北方曰玄武符左四右三左者進內右者付外隨身符之制左二右一太子以玉親王以金庶官以銅佩以為飾刻姓名者去官而納焉不刻者傳而佩之木契之制太子監國則王畿之內左右各三王畿之外左右各五庶官鎮守則左右各十旌節之制命大將帥及遣使於四方則請而假之旌以專賞節以專殺餘並取皇太子處分處昌呂翻分扶問翻二十年十二月己丑㣥臣累請封禪從之詔造羽衞送洛陽宮二十年戊寅回紇俟利發吐迷度僕骨俟利發歌濫拔延多濫葛俟斤末拔野古俟利發屈利失同羅俟利發時健啜思結酋長烏碎及渾斛薛奚結阿跌契苾白霫酋長皆來朝敕勒原缺二十二字庚辰上賜宴於芳蘭殿按閣本大明宮圖玄武門右玄武殿後有紫蘭殿大樂宴胡客率引入玄武門今此芳蘭殿豈紫蘭殿邪章十二行本司下四空格為厚加給待四字乙十一行本同孔本同張校同退齋校同熊校同每五日一會二十年癸未上謂長孫無忌等曰今日吾生日世俗皆為樂樂音洛下宴樂同在朕翻成傷感今君臨天下富有四海而承歡膝下永不可得此子路所以有負米之恨也家語子路見孔子曰昔由事二親之時常食藜藿之實為親負米百里之外親沒之後南遊於楚後車百乘積粟萬鍾累茵而坐列鼎而食願欲食藜藿為親負米不可得也子曰由也事親可謂生事盡力死事盡思者也生我劬勞詩蓼莪之辭因泣數行下行戶剛翻左右皆悲二十年房玄齡嘗以微譴歸第褚遂良上疏以為玄齡自義旗之始翼贊聖功謂謁見於軍門署為記室時也上時掌翻謂誅建成元吉時也謂遜直於王魏在朝文武隨能收敍也觀古玩翻玄齡為最自非有罪在不赦搢紳同尤不可遐棄陛下若以其衰老亦當諷諭使之致仕退之以禮不可以淺鮮之過鮮少也鮮息淺翻上遽召出之頃之玄齡復避位還家復扶又翻久之上幸芙蓉園芙蓉園在京城東南隅秦之隑州漢之樂遊苑唐之曲江同此地也長安志曰隋營宮城宇文愷以其地在京城東南隅地高不便故闕此地不為居人坊巷而鑿之為池以厭勝之又會黃渠水自城外南來入城為芙蓉池且為芙蓉園也劉餗小說曰園本古曲江文帝惡其名曲改曰芙蓉為其水盛而芙蓉富也曰乘輿且至乘繩證翻有頃上果幸其第因載玄齡還宮二十一年二十一年春正月開府儀同三司申文獻公高士廉疾篤辛卯上幸其第流涕與訣壬辰薨上將往哭之房玄齡以上疾新愈固諫上曰高公非徒君臣兼以故舊姻戚高士廉長孫后之母舅也士廉識帝於龍潛因以甥女妻帝公勿復言復扶又翻帥左右自興安門出按六典大明宮南面五門次西曰興安門但貞觀以前人主常居太極宮高宗龍朔之後方居大明宮然此時已營永安宮永安即大明也或者帝自永安宮而出興安門歟按舊書高士廉傳上出興安門至延喜門長孫無忌迎諫馬首延喜門直皇城之東北隅而興安門直大明宮城之西南隅由大明之興安門至皇城之延喜門其路迂且遠意太極宮中別自有興安門也帥讀曰率聞上將至輟哭迎諫於馬首曰陛下餌金石於方不得臨喪柰何不為宗廟蒼生自重為于偽翻且臣舅臨終遺言深不欲以北首夷衾輒屈鑾駕死者北首夷衾覆尸之衾鄭氏曰夷之言尸也尸之槃曰夷槃牀曰夷牀衾曰夷衾移尸曰夷于堂皆依尸而為言者也首式又翻無忌中道伏臥流涕固諫上乃還入東苑南望而哭涕下如雨及柩出橫橋長安故城橫門外有橋曰橫橋柩音舊橫音光望之慟哭二十一年丙申詔以回紇部為瀚海府僕骨為金微府考異曰舊書作金徽今從實錄唐曆拔野古為幽陵府同羅為龜林府思結為盧山府府者都督府也燕因肩翻斛薛為高闕州奚結為雞鹿州阿跌為雞田州契苾為榆溪州思結別部為蹛林州白霫為寘顏州蹛音帶寘徒年翻各以其酋長為都督刺史各賜金銀繒帛及錦袍繒慈陵翻敕勒大喜捧戴歡呼拜舞宛轉塵中及還上御天成殿宴設十部樂而遣之諸酋長奏稱臣等既為唐民往來天至尊所如詣父母請於回紇以南突厥以北開一道謂之參天可汗道置六十八驛各有馬及酒肉以供過使使疏吏翻歲貢貂皮以充租賦仍請能屬文人屬之欲翻使為表疏疏所去翻上皆許之於是北荒悉平然回紇吐迷度已私自稱可汗官號皆如突厥故事二十一年丁酉詔以明年仲春有事泰山禪社首應劭曰社首山在漢泰山郡博縣晉灼曰山在鉅平縣南十二里唐志兗州博城縣有社首山二十一年二月丁丑太子釋奠于國學二十一年上將復伐高麗復扶又翻朝議以為高麗依山為城攻之不可猝拔朝直遙翻前大駕親征國人不得耕種所克之城悉收其穀繼以旱災民太半乏食今若數遣偏師更迭擾其疆埸數所角翻更工衡翻埸音亦使彼疲於奔命釋耒入堡耒盧對翻數年之間千里蕭條則人心自離鴨綠之北可不戰而取矣上從之三月以左武衞大將軍牛進達為青丘道行軍大總管相如子虛賦曰夫齊東陼鉅海觀乎成山射乎之罘秋獵乎青丘彷徨乎海外服虔曰青丘國在海東三百里晉天文志有青丘七星在軫東南蠻夷之國也發兵萬餘人乘樓船自萊州汎海而入又以太子詹事李世勣為遼東道行軍大總管右武衞將軍孫貳朗等副之將兵三千人將即亮翻因營州都督府兵自新城道入兩軍皆選習水善戰者配之二十一年辛卯上曰朕於戎狄所以能取古人所不能取臣古人所不能臣者皆順衆人之所欲故也昔禹帥九州之民鑿山槎木帥讀曰率槎士下翻逆斫木也疏百川注之海其勞甚矣而民不怨者因人之心順地之勢與民同利故也二十一年是月上得風疾苦京師盛暑夏四月乙丑命脩終南山太和廢宮為翠微宮楊大年曰翠微宮在驪山絕頂二十一年丙寅置燕然都護府統瀚海等六都督皋蘭等七州六都督七州並見上新書曰置燕然都護府於古單于臺宋白曰在西受降城東南四十里素立撫以恩信夷落懷之共率馬牛為獻素立唯受其酒一盃餘悉還之二十一年五月戊子上幸翠微宮冀州進士張昌齡獻翠微宮頌上愛其文命於通事舍人裏供奉資格淺不得除正官命於通事舍人班裏供奉初昌齡與進士王公治嚴治改瑾皆善屬文名振京師考功員外郎王師旦知貢舉屬之欲翻唐初以考功員外郎知貢舉至開元間考功員外郎李昂為舉人詆訶帝以員外郎望輕遂移貢舉於禮部以侍郎主之禮部選士自此始黜之舉朝莫曉其故及奏第上怪無二人名詰之朝直遙翻詰去吉翻師旦對曰二人雖有辭華然其體輕薄終不成令器若置之高第恐後進效之傷陛下雅道上善其言二十一年壬辰詔百司依舊啟事皇太子二十一年庚辰上御翠微殿翠微宮之正殿也自古帝王雖平定中夏不能服戎狄夏戶雅翻朕才不逮古人而成功過之自不諭其故諸公各率意以實言之㣥臣皆稱陛下功德如天地萬物不得而名言上曰不然朕所以能及此者止由五事耳自古帝王多疾勝己者朕見人之善若己有之人之行能不能兼備行下孟翻朕常棄其所短取其所長人主往往進賢則欲寘諸懷退不肖則欲推諸壑推吐雷翻朕見賢者則敬之不肖者則憐之賢不肖各得其所人主多惡正直惡烏路翻陰誅顯戮無代無之朕踐阼以來正直之士比肩於朝未嘗黜責一人朝直遙翻自古皆貴中華賤夷狄朕獨愛之如一故其種落皆依朕如父母種章勇翻此五者朕所以成今日之功也顧謂褚遂良曰公嘗為史官褚遂良嘗知起居注十八年拜黃門侍郎參綜朝政不復兼史職故曰嘗得其實乎對曰陛下盛德不可勝載勝音升獨以此五者自與蓋謙謙之志耳二十一年李世勣軍既渡遼歷南蘇等數城前漢書玄菟郡高句驪縣有南蘇水西北經塞外背蒲妹翻世勣擊破其兵焚其羅郭而還還從宣翻又如字二十一年六月癸亥以司徒長孫無忌領揚州都督實不之任二十一年丁丑詔以隋末喪亂喪息浪翻邊民多為戎狄所掠今鐵勒歸化宜遣使詣燕然等州使疏吏翻下同燕因肩翻與都督相知訪求沒落之人贖以貨財給糧遞還本貫其室韋烏羅護靺鞨三部人為薛延陀所掠者亦令贖還二十一年癸未以司農卿李緯為戶嚴戶改民部尚書緯于貴翻時房玄齡留守京師守手又翻有自京師來者上問玄齡何言對曰玄齡聞李緯拜尚書但云李緯美髭鬢髭即移翻帝遽改除緯洛州刺史考異曰唐曆云居無何改緯太子詹事今從舊傳二十一年秋七月牛進達李海岸入高麗境凡百餘戰無不捷攻石城拔之進至積利城下高麗兵萬餘人出戰海岸擊破之斬首二千級二十一年上以翠微宮險隘不能容百官庚子詔更營玉華宮於宜春嚴春改君之鳳皇谷玉華宮在宜春縣西四十里庚戌車駕還宮還從宣翻又音如字二十一年八月壬戌詔以薛延陀新降土功屢興降戶江翻屢力句翻又音如字加以河北水災停明年封禪二十一年辛未骨利幹遣使入貢丙戌以骨利幹為玄闕州拜其俟斤為刺史使疏吏翻俟渠之翻骨利幹於鐵勒諸部為最遠晝長夜短日沒後天色正曛煮羊脾適熟日已復出矣骨利幹居瀚海北產良馬其地北距海至京師最遠又北渡海則晝長夜短蓋近日出處復扶又翻考異曰實錄唐曆皆作羊胛僧一行大衍曆義及舊天文志唐統紀皆作脾新天文志云胹羊髀按正言羊脾者取其易熟故也若煮羊胛及髀則雖中國通夕亦未爛矣今從大衍曆義二十一年己丑齊州人段志沖上封事上時掌翻請上致政於皇太子太子聞之憂形於色發言流涕長孫無忌等請誅志沖長知兩翻上手詔曰五岳陵霄四海亙地納汙藏疾無損高深左傳云川澤納汙山藪藏疾亙古鄧翻言欲使天子解位也是其直也若其無罪是其狂也譬如尺霧障天不虧於大寸雲點日何損於明二十一年丁酉立皇子明為曹王明母楊氏巢剌王之也有寵於上剌盧達翻文德皇后之崩也欲立為皇后魏徵諫曰陛下方比德唐虞柰何以辰嬴自累左傳晉太子圉為質於秦秦穆公以女妻之圉將逃歸謂之曰與子歸乎嬴氏不敢從圉遂逃歸及晉公子重耳入秦秦穆公納女五人懷嬴與焉謂之辰嬴賈季曰辰嬴嬖於二君是也累力瑞翻尋以明繼元吉後二十一年戊戌敕宋州刺史王波利等發江南十二州工人造大船數百艘欲以征高麗十二州宣潤常蘇湖杭越台婺括江洪也艘蘇遭翻麗力知翻二十一年冬十月庚辰奴剌啜匐俟友帥其所部萬餘人內附奴剌部落居吐谷渾党項之間剌來達翻啜陟劣翻匐蒲北翻俟渠之翻帥讀曰率下同二十一年十一月突厥車鼻可汗遣使入貢車鼻名斛勃本突厥同族世為小可汗頡利之敗突厥餘衆欲奉以為大可汗時薛延陀方強車鼻不敢當帥其衆歸之或說薛延陀車鼻貴種有勇略說輸芮翻種章勇翻為衆所附恐為後患不如殺之車鼻知之逃去薛延陀遣數千騎追之騎奇寄翻車鼻勒兵與戰大破之乃建牙於金山之北其地三垂斗絕惟一面可容車騎壤土夷博突厥餘衆稍稍歸之數年間勝兵三萬人勝音升時出抄掠薛延陀抄楚交翻及薛延陀敗車鼻勢益張張知亮翻遣其子沙鉢羅特勒入見見賢遍翻又請身自入朝朝直遙翻下同詔遣將軍郭廣敬徵之車鼻特為好言初無來意竟不至考異曰實錄詔遣雲麾將軍安調遮右屯衞郎將韓華迎之車鼻徒飾其辭初無來意韓華將招歌邏祿共劫之車鼻覺其謀華與車鼻子陟苾特勒相射而死調遮亦被殺今從舊突厥傳二十一年癸卯徙順陽王泰為濮王濮博木翻二十一年壬子上疾愈三日一視朝二十一年十二月壬申西趙酋長趙磨帥萬餘戶內附以其地為明州東謝之南有西趙蠻西抵昆明南即西洱河山穴阻深趙氏世為酋長酋慈由翻長知兩翻二十一年龜茲王伐疊卒弟訶黎布失畢立龜茲音丘慈訶虎何翻浸失臣禮侵漁鄰國上怒戊寅詔使持節崑丘道行軍大總管自古相傳西域有崑崙山河源所出又爾雅曰三成為崑崙丘故曰崑丘道使疏吏翻仍命鐵勒十三州突厥吐蕃吐谷渾連兵進討驍堅堯翻契欺訖翻苾毗必翻將即亮翻吐從暾入聲谷音浴二十一年高麗王使其子莫離支任武入謝罪上許之二十二年二十二年春正月己丑上作帝範十二篇以賜太子曰君體建親求賢審官納諫去讒戒盈崇儉賞罰務農閱武崇文去羌呂翻且曰脩身治國備在其中治直之翻一旦不諱更無所言矣又曰汝當更求古之哲王以為師如吾不足法也夫取法於上僅得其中取法於中不免為下吾居位已來不善多矣錦繡珠玉不絕於前宮室臺榭屢有興作犬馬鷹隼無遠不致隼息尹翻行遊四方供頓煩勞此皆吾之深過勿以為是而法之顧我弘濟蒼生其益多肇造區夏其功大益多損少故人不怨功大過微故業不墮夏戶雅翻少詩沼翻墮讀曰隳然比之盡美盡善固多愧矣汝無我之功勤而承我之富貴竭力為善則國家僅安驕惰奢縱則一身不保且成遲敗速者國也失易得難者位也可不惜哉可不慎哉太宗自疏其所行之過差者以戒太子可謂至矣然太子病於柔弱好內乃無一言及此以警策之人莫知其子之惡信矣易以豉翻二十二年中書令兼右庶子馬周病上親為調藥為于偽翻使太子臨問庚寅薨二十二年戊戌上幸驪山溫湯二十二年己亥以中書舍人崔仁師為中書侍郎參知機務二十二年新羅王金善德卒以善德妹真德為柱國封樂浪郡王遣使冊命卒子恤翻樂浪音洛琅使疏吏翻二十二年丙午詔以右武衞大將軍薛萬徹為青丘道行軍大總管右衞將軍裴行方副之將兵三萬餘人及樓船戰艦艦戶黯翻自萊州泛海以擊高麗二十二年長孫無忌檢校中書令知尚書門下省事長孫無忌蓋總三省之事二十二年戊申上還宮二十二年結骨自古未通中國杜佑曰結骨在回紇西北三千里二月其俟利發失鉢屈阿棧入朝俟渠之翻屈居勿翻阿烏葛翻棧士限翻朝直遙翻其國人皆長大赤髮綠睛睛音精有黑髮者以為不祥上宴之於天張天作大成殿謂侍臣曰昔渭橋斬三突厥首自謂功多謂武德九年頡利犯便橋時也更不以為怪邪失鉢屈阿棧請除一官執笏而歸誠百世之幸戊午以結骨為堅昆都督府以失鉢屈阿棧為右屯衞大將軍堅昆都督隸燕然都護燕因肩翻又以阿史德時健俟斤部落置祁連州隸營章十二行本營作靈乙十一行本同州都督是時四夷大小君長爭遣使入獻見長知兩翻使疏吏翻見賢遍翻下引見同道路不絕每元正朝賀常數百千人辛酉上引見諸胡使者謂侍臣曰漢武帝窮兵三十餘年疲弊中國所獲無幾幾居豈翻豈如今日綏之以德使窮髮之地盡為編戶乎陸德明經典釋文曰司馬云窮髮北極之下無毛之地也崔云北方無毛地也按毛草也地理書曰山以草木為髮二十二年上營玉華宮程大昌曰玉華宮在坊州宜君縣惟所居殿覆以瓦覆敷又翻餘皆茅茨然備設太子宮百司苞山絡野所費已巨億計乙亥上行幸玉華宮己卯畋于華原華原宜君銅官漢雲陽祋祤之地後魏於華原置北雍州西魏改為宜州又置北地郡隋開皇初郡廢大業初州廢以縣屬京兆唐初復置宜州貞觀十七年州廢而以華原復屬於京兆二十二年中書侍郎崔仁師坐有伏閤自訴者仁師不奏除名流連州連州漢桂陽陽山之地梁置陽山郡隋置連州大業初廢州為熙平郡唐復為連州連州在京師南三千六百六十五里考異曰舊傳流龔州今從新舊本紀二十二年三月己丑分瀚海都督俱羅勃部置燭龍州二十二年甲午上謂侍臣曰朕少長兵間頗能料敵少詩照翻長知兩翻今崑丘行師處月處密二部及龜茲用事者羯獵顛那利每懷首鼠必先授首弩失畢其次也弩失畢當作布失畢龜茲王也二十二年庚子隋蕭后卒詔復其位號諡曰愍使三品護葬備鹵簿儀衞送至江都與煬帝合葬二十二年充容長城徐惠唐會要曰舊制昭儀昭容昭媛脩儀脩容脩媛充儀充容充媛各一人為九嬪正二品晉武帝太康三年分烏程立長城縣屬吳興郡今湖州長興縣是也惠徐孝德之女西討龜茲翠微玉華營繕相繼又服玩頗華靡上疏諫其略曰以有盡之農功填無窮之巨浪圖未獲之他衆喪已成之我軍喪息浪翻下喪國同昔秦皇幷吞六國反速危亡之基晉武奄有三方翻成覆敗之業魏蜀吳三方鼎峙至晉混一棄德輕邦圖利忘危肆情縱欲之所致乎是知地廣非常安之術人勞乃易亂之源也又曰雖復茅茨示約易以豉翻復扶又翻猶興木石之疲和雇取人不無煩擾之弊又曰珍玩伎巧乃喪國之斧斤伎渠綺翻喪息浪翻珠玉錦繡寔迷心之酖毒又曰作法於儉猶恐其奢作法於奢何以制後上善其言甚禮重之王崇武標點容肇祖聶崇岐覆校
