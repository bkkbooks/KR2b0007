body:
  text: 資治通鑑卷第一百七十六端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註陳紀十長城公下至德二年至德二年甲辰五八四至德二年春正月甲子日有食之至德二年己巳隋主享太廟辛未祀南郊至德二年壬申梁主入朝于隋朝直遙翻下同服通天冠絳紗袍北面受郊勞及入見於大興殿隋主服通天冠絳紗袍梁主服遠遊冠朝服君臣並拜通天冠絳紗袍天子之服也服天子之服北面以受郊勞示臣服於隋而未至純於臣也遠遊冠朝服諸王見天子之服也入見大興殿純於臣矣大興殿隋新都正殿也唐為西內太極殿遠遊三梁冠黑介幘朝服絳紗單衣白紗內單皁領袖皁襈革帶鉤䚢假帶方心絳紗蔽膝韈舄綬劍佩君臣並拜非禮也勞力到翻見賢遍翻襈雛免翻䚢丑例翻又敕列翻珍玩稱是稱是言其直與萬縑稱也稱尺證翻至德二年隋前華州刺史張賓華戶化翻儀同三司劉暉等造甲子元曆成甲子元曆其要以上元甲子己巳已來至開皇四年歲在甲辰積算起壬辰詔頒新曆考異曰隋律曆志云二月撰成奏上今從帝紀至德二年癸巳大赦至德二年二月乙巳隋主餞梁主於灞上梁主歸國故餞之至德二年突厥蘇尼部男女萬餘口降隋厥九勿翻尼女夷翻降戶江翻下同至德二年庚戌隋主如隴州五代志扶風源縣西魏置隴東郡及東秦州後改隴州至德二年突厥達頭可汗請降於隋可從刊入聲汗音寒考異曰隋帝紀云突厥阿史那玷厥帥其屬來降按時玷厥方強蓋文降耳至德二年夏四月庚子隋以吏部尚書虞慶則為右僕射至德二年隋上大將軍賀婁子幹發五州兵擊吐谷渾時發河西五州兵蓋涼甘瓜鄯廓也吐從暾入聲谷音浴二旬而還還音旋又如字帝以隴西頻被寇掠而俗不設村塢塢安古翻壁壘也說文曰小障也一曰庳城也通俗文營居曰塢被皮義翻命子幹勒民為堡堡音保小城也仍營田積穀子幹上書曰隴右河西土曠民稀邊境未寧不可廣佃上時掌翻佃徒年翻作田也比見屯田之所比毗至翻獲少費多虛役人功卒逢踐暴少詩沼翻卒子恤翻屯田疏遠者請皆廢省但隴右之人以畜牧為事畜許六翻若更屯聚彌不自安但使鎮戍連接烽堠相望堠戶遘翻民雖散居必謂無慮帝從之以子幹曉習邊事丁巳以為榆關總管五代志榆林郡金河縣開皇三年置榆關總管榆林郡後置勝州至德二年五月以吏部尚書江總為僕射至德二年隋主以渭水多沙深淺不常漕者苦之六月壬子詔太子左庶子宇文愷帥水工鑿渠引渭水帥讀曰率自大興城東至潼關三百餘里名曰廣通渠漕運通利關內賴之至德二年秋七月丙寅遣兼散騎常侍謝泉等聘于隋散悉亶翻騎奇寄翻至德二年八月壬寅隋鄧恭公竇熾卒熾昌志翻卒子恤翻至德二年乙卯將軍夏侯苗請降于隋夏戶雅翻卒戶江翻隋主以通和不納至德二年九月甲戌隋主以關中饑行如洛陽至德二年隋主不喜詞華喜許記翻詔天下公私文翰並宜實錄泗州刺史司馬幼之五代志下邳郡後魏置南徐州梁改東徐州陳改安州後周改泗州付所司治罪治書侍御史趙郡李諤亦以當時屬文體尚輕薄治直之翻屬之欲翻上書曰魏之三祖上時掌翻三祖謂曹魏父子孫太祖武皇帝高祖文皇帝烈祖明皇帝崇尚文詞忽君人之大道好雕蟲之小藝揚子曰童子雕蟲篆刻好呼到翻遂成風俗江左齊梁其弊彌甚競一韻之奇爭一字之巧連篇累牘不出月露之形積案盈箱唯是風雲之狀世俗以此相高朝廷據茲擢士祿利之路既開愛尚之情愈篤於是閭里童昏貴遊總丱童昏言童幼昏蒙未有知識也鄭玄曰貴遊子弟王公之子弟遊無官司者詩總角丱兮毛傳曰總角聚兩髦也丱幼稚也丱古患翻古者八歲入小學學六甲五方書計之事六甲謂六十甲子也謂五言詩伊傅周孔之說不復關心復扶又翻何嘗入耳以傲誕為清虛以緣情為勳績指儒素為古拙用詞賦為君子故文筆日繁其政日亂良由棄大聖之軌模搆無用以為用也今朝廷雖有是詔如聞外州遠縣仍踵弊風躬仁孝之行者行下孟翻擯落私門不加收齒工輕薄之藝者選充吏職舉送天朝朝直遙翻蓋由刺史縣令未遵風教請普加采察送臺推劾劾戶概翻又戶得翻又上言士大夫矜伐干進無復廉恥乞明加罪黜以懲風軌風軌風迹也上時掌翻至德二年突厥沙鉢略可汗數為隋所敗厥九勿翻可從刊入聲汗音寒數所角翻敗補邁翻乃請和親千金公主自請改姓楊氏為隋主女隋主遣開府儀同三司徐平和使於沙鉢略更封千金公主為大義公主千金公主宇文氏請於沙鉢略欲復讎及兵敗於外衆離於內乃請為隋主女更封以大義非嘉名也取大義滅親云爾為大義不得其死張本使疏吏翻下同更工衡翻釁許覲翻隋主不許沙鉢略遣使致書曰從天生大突厥天下賢聖天子伊利居盧設莫何沙鉢略可汗章十二行本居作俱乙十一行本同孔本同致書大隋皇帝皇帝婦父乃是翁比此為女夫乃是兒例兩境雖殊情義如一自今子子孫孫乃至萬世親好不絕好呼到翻上天為證終不違負此國羊馬皆皇帝之畜畜許救翻彼之繒綵皆此國之物繒疾陵翻帝復書曰大隋天子貽書大突厥沙鉢略可汗得書知大有善意既為沙鉢略婦翁今日視沙鉢略與兒子不異時遣大臣往彼省女復省沙鉢略也省悉景翻復扶又翻於是遣尚書右僕射虞慶則使於沙鉢略車騎將軍長孫晟副之騎奇寄翻長知兩翻晟承正翻沙鉢略陳兵列其珍寶坐見慶則稱病不能起且曰我諸父以來不向人拜慶則責而諭之千金公主私謂慶則曰可汗豺狼性過與爭將齧人齧五結翻噬也長孫晟謂沙鉢略曰突厥與隋俱大國天子可汗不起安敢違意但可賀敦為帝女則可汗是大隋女壻柰何不敬婦翁沙鉢略笑謂其達官曰須拜婦翁突厥子弟曰特勒大臣曰葉護曰屈律啜曰阿波曰俟利發曰吐屯曰俟斤曰閻洪達曰頡利發曰達干皆達官也顙桑黨翻跪受璽書以戴於首璽斯氏翻既而大慙與㣥下相聚慟哭慶則又遣稱臣沙鉢略謂左右曰何謂臣左右曰隋言臣猶此云奴耳沙鉢略曰得為大隋天子奴虞僕射之力也贈慶則馬千匹幷以從妹妻之從才用翻妻七細翻至德二年冬十一月壬戌隋主遣兼散騎常侍薛道衡等來聘散悉亶翻騎奇寄翻當識朕意勿以言辭相折折之舌翻至德二年是歲上於光昭殿前起臨春結綺望仙三閣各高數十丈高古到翻連延數十間其牕牖壁帶縣楣欄檻皆以沈檀為之釋名曰牕聰也於內見外之聰明也牖亦牕也說文牖穿壁以木為交牕壁帶壁中橫木班固西都賦金釭銜璧是為列錢賢註曰以黃金為釭其中銜璧納之於壁帶為行列歷歷如錢也懸楣橫木施於前後兩楹之間下不裝構今人謂之掛楣欄檻皆所以凭也施於簷下階際者曰欄施於牕牖之間者曰檻沈檀皆香木縣讀曰懸沈持林翻間以珠翠珠珍珠翠翡翠毛間古莧翻內有寶牀寶帳其服玩瑰麗近古所未有每微風暫至香聞數里瑰工回翻聞音問其下積石為山引水為池雜植奇花異卉卉百草總名音許偉翻又音諱上自居臨春閣張貴居結綺閣龔孔二貴嬪居望仙閣並複道交相往來又有王李二美人張薛二淑媛袁昭儀何婕妤江脩容並有寵梁制貴貴嬪貴姬是為三夫人金章龜鈕紫綬八十首佩于窴玉虎頭鞶淑媛淑儀淑容昭華昭儀昭容脩華脩儀脩容是為九嬪金章龜鈕青綬八十首虎頭鞶佩采瓄玉婕妤容華充華承徽列榮五職位亞九嬪銀印珪鈕艾綬虎頭鞶美人才人良人三職散位銅印環鈕墨綬虎頭鞶嬪毗賓翻媛于眷翻婕妤音接于以宮人有文學者袁大捨等為女學士僕射江總雖為宰輔不親政務日與都官尚書孔範散騎常侍王瑳等散悉亶翻騎奇寄翻瑳倉何翻侍上遊宴後庭無復尊卑之序謂之狎客上每飲酒使諸嬪及女學士與狎客共賦詩互相贈答考異曰平陳記云張貴等八人夾坐江總等十人預宴先令八婦人襞采牋製五言詩十客一時繼和稽緩則罰酒今從陳書南史被以新聲被皮義翻選宮女千餘人習而歌之分部迭進其曲有玉樹後庭花臨春樂等五代志後主於清樂中造黃鸝留及玉樹後庭花金釵兩鬢垂等曲與幸臣製其歌詞綺豔相高極於輕薄男女唱和其音甚哀臨春樂者言臨春閣之樂也樂音洛君臣酣歌自夕達旦以此為常張貴名麗華本兵家女為龔貴嬪侍兒上見而悅之得幸生太子深貴髮長七尺其光可鑑長直亮翻性敏慧有神彩進止詳章十二行本詳作閑乙十一行本同華詳審而華麗也仰視曰瞻正觀曰視斜視曰眄旁視曰睞眄莫甸翻睞洛代翻照映左右善候人主顏色引薦諸宮女後宮咸德之競言其善又有厭魅之術厭魅所謂婦人媚道也厭一琰翻魅音媚聚女巫鼓舞上怠於政事百司啟奏並因宦者蔡脫兒李善度進請上倚隱囊隱囊者為囊實以細輭置諸坐側坐倦則側身曲肱以隱之隱於靳翻共決之李蔡所不能記者貴並為條疏疏分也為于偽翻因參訪外事人間有一言一事貴必先知白之由是益加寵異冠絕後庭冠古玩翻宦官近習內外連結援引宗戚縱橫不法援于元翻橫下孟翻賣官鬻獄貨賂公行賞罰之命不出于外言出命不由中書而出於宮掖也因而譖之於是孔張之權熏灼四方孔張謂孔貴嬪張貴也孔範與孔貴嬪結為兄妹上惡聞過失惡烏路翻每有惡事孔範必曲為文飾稱揚贊美由是寵遇優渥言聽計從㣥臣有諫者輒以罪斥之中書舍人施文慶頗涉書史嘗事上於東宮聰敏強記明閑吏職閑習也應時條理由是大被親幸被皮義翻又薦所善吳興沈客卿五代志吳郡烏程縣舊置吳興郡姓纂周景王封少子於陽樊因邑命氏余按春秋之時齊人遷陽子孫蓋以國為氏江南自來有暨姓吳時有暨豔暨戟乙翻上皆擢用之以客卿為中書舍人客卿有口辯頗知朝廷典故兼掌金帛局陳中書省分為二十一局上盛脩宮室窮極耳目府庫空虛有所興造恆苦不給客卿奏請不問士庶並責關市之征而又增重其舊於是以陽惠朗為太市令暨慧景為尚書金倉都令史梁制太市令屬太府卿秩六百石尚書金倉都令史金部倉部都令史也梁制尚書都令史視奉朝請恆戶登翻考校簿領纖毫不差然皆不達大體督責苛碎聚斂無厭斂力贍翻厭於鹽翻士民嗟怨客卿總督之每歲所入過於常格數十倍過工禾翻上大悅益以施文慶為知人臨亂之君各賢其臣其信然矣小大衆事無不委任轉相汲引汲水者引綆期必上人臣之相汲引亦猶是也珥市志翻孔範自謂文武才能舉朝莫及朝直遙翻從容白上曰外間諸將起自行伍從千容翻將即亮翻行戶剛翻匹夫敵耳深見遠慮豈其所知上以問施文慶文慶畏範亦以為然司馬申復贊之復扶又翻自是將帥微有過失帥所類翻即奪其兵分配文吏奪任忠部曲以配範及蔡徵由是文武解體以至覆滅通鑑具敍陳氏亡國之由三年三年春正月戊午朔日有食之三年隋主命禮部尚書牛弘脩五禮勒成百卷戊辰詔行新禮五禮吉凶軍賓嘉三年三月戊午隋以尚書左僕射高熲為左領軍大將軍三年豐州刺史章大寶昭達之子也五代志建安郡界陳置閔州後又置豐州章昭達歷事高祖世祖高宗皆有戰功朝廷以太僕卿李暈代之暈將至辛酉大寶襲殺暈舉兵反三年隋大司徒郢公王誼大司徒周之六官按王誼拜大司徒隋主未受禪也隋既受禪改周之六官司徒列於三公不應復加大字王誼少與隋主同學帝待之恩禮稍薄誼頗怨望或告誼自言名應圖讖相表當王相息亮翻公卿奏誼大逆不道壬寅賜誼死三年戊申隋主還長安去年九月隋主如洛陽今還三年章大寶遣其將楊通攻建安不克以此觀之陳之豐州治閩縣而建安縣自別置建安郡將即亮翻大寶衆潰逃入山為追兵所擒夷三族三年隋度支尚書長孫平元年隋已改度支為民部志作工部尚書長孫平度徒洛翻長知兩翻令民間每秋家出粟麥一石以下貧富為差儲之當社委社司檢校以備凶年名曰義倉章十二行本倉下有平儉之子也五字乙十一行本同孔本同隋主從之五月甲申初詔郡縣置義倉時民間多妄稱老小以免賦役隋承周制男女三歲已下為黃十歲已下為小六十者為老北齊高齊言北齊者以別蕭氏之南齊姦偽尤多隋主命州縣大索貌閱調徒弔翻索山客翻貌閱者閱其貌以驗老小之實戶口不實者里正黨長遠配隋頒新令制人五家為保保有長保五為閭閭四為族皆有正畿外置里正比閭正黨長比族正以相檢察焉長知兩翻皆令析籍以防容隱堂兄弟其服大功高熲章十二行本熲下有又言民間課輸無定簿難以推校十三字乙十一行本同孔本同張校同請為輸籍法徧下諸州輸籍凡民間課輸皆籍其數使州縣長吏不得以走弄出沒下戶嫁翻自是姦無所容矣諸州調物每歲河南自潼關河北自蒲坂輸長安者相屬於路調徒弔翻屬之欲翻晝夜不絕者數月三年梁主殂諡曰孝明皇帝廟號世宗世宗孝慈儉約境內安之太子琮嗣位琮藏宗翻三年初突厥阿波可汗既與沙鉢略有隙章十二行本隙下有分而為二四字乙十一行本同孔本同張校同厥九勿翻可從刊入聲汗音寒有隙事始上卷元年阿波浸強東距都斤都斤突厥中山名沙鉢略初立建牙於此山龜茲鐵勒伊吾及西域諸胡悉附之伊吾之地吐屯設主之蓋突厥所署置也龜茲音丘慈突厥自是分為東西使疏吏翻三年秋七月庚申遣散騎常侍王話等聘于隋散悉亶翻騎奇寄翻三年突厥沙鉢略既為達頭所困達頭資阿波以兵使攻沙鉢略是為其所困者也西既為達頭所困東又畏契丹見逼契欺訖翻又音喫請將部落度漠南寄居白道川欲南傍長城下倚隋為援使疏吏翻將即亮翻又如字命晉王廣以兵援之晉王廣時為幷省北邊皆屬焉故命以兵援沙鉢略賜之車服鼓吹吹昌瑞翻沙鉢略因西擊阿波破之借隋兵之勢以獲勝官軍為擊阿拔敗之為于偽翻敗補邁翻所獲悉與沙鉢略沙鉢略大喜乃立約以磧為界磧七迹翻天無二日土無二王此語本之孟子上時掌翻下同豈敢阻兵恃險偷竊名號今感慕淳風歸心有道屈膝稽顙稽音啟顙桑黨翻永為藩附遣其子庫合真入朝考異曰隋突厥傳作窟合真今從帝紀朝直遙翻八月丙戌庫合真至長安隋主下詔曰沙鉢略往雖與和往已往也言往事也今作君臣便成一體因命肅告郊廟普頒遠近凡賜沙鉢略詔不稱其名宴庫合真於內殿突厥馮陵諸夏周齊屈體結之今沙鉢略奉表稱臣遣子入覲隋主告之郊廟布之臣庶大其事也宴之於內殿親之也賞勞甚厚見賢遍翻勞力到翻沙鉢略大悅自是歲時貢獻不絕三年九月將軍湛文徹侵隋和州隋儀同三司費寶首擊擒之費扶沸翻姓也三年丙子隋使李若等來聘三年冬十月壬辰隋以上柱國楊素為信州總管五代志巴東郡梁置信州隋置楊素於永安將使之為舟師以伐陳也三年初北地傅縡縡作代翻以庶子事上於東宮及即位遷祕書監右衞將軍兼中書通事舍人負才使氣人多怨之施文慶沈客卿共譖縡受高麗使金上收縡下獄麗力知翻使疏吏翻下戶嫁翻縡於獄中上書曰夫君人者恭事上帝子愛下民省嗜欲遠諂佞未明求衣日旰忘食中上時掌翻夫音扶遠于願翻旰古按翻是以澤被區宇被皮義翻慶流子孫陛下頃來酒色過度不虔郊廟大神專媚淫昏之鬼謂寵張貴使女巫鼓舞於宮中而淫祀也宦豎弄權惡忠直若仇讎視生民如草芥後宮曳綺繡广既馬餘菽粟百姓流離殭尸蔽野貨賄公行帑藏損耗神怒民怨衆叛親離臣恐東南王氣自斯而盡惡烏路翻殭居良翻帑他朗翻藏徂浪翻王于況翻又如字書奏上大怒頃之意稍解遣使謂縡曰我欲赦卿卿能改過不使疏吏翻不讀曰否對曰臣心如面臣面可改則臣心可改上益怒令宦者李善慶窮治其事遂賜死獄中治直之翻上每當郊祀常稱疾不行故縡言及之三年是歲梁大將軍戚昕以舟師襲公安不克而還公安陳荊州治所昕許斤翻還音旋又如字隋主徵梁主叔父太尉吳王岑入朝拜大將軍封懷義公因留不遣朝直遙翻復置江陵總管以監之隋罷江陵總管見上卷陳高宗太建十四年復扶又翻監工銜翻梁大將軍許世武密以城召荊州刺史宜黃侯慧紀宜黃古縣吳立屬臨川郡隋併省梁主殺之慧紀高祖之從孫也從才用翻三年隋主使司農少卿崔仲方發丁三萬於朔方靈武築長城東距河西至綏州五代志雕陰郡西魏置綏州以遏胡寇四年四年梁改元廣運四年甲子党項羌請降於隋隋書党項羌者三苗之後也自稱獼猴種東接臨洮西平西距葉護南北數千里每姓別為部落党底朗翻降戶江翻四年庚午隋頒曆於突厥班曆則稟受正朔矣四年二月隋始令刺史上佐每歲暮更入朝上考課上佐謂長史司馬更工衡翻上時掌翻四年丁亥隋復令崔仲方發丁十五萬於朔方以東緣邊險要築數十城朔方郡夏州復扶又翻四年丙申立皇弟叔謨為巴東王叔顯為臨江王叔坦為新會王叔隆為新寧王五代志歷陽郡烏江縣陳為臨江郡南海郡新會縣舊置新會郡信安郡新興縣梁置新寧郡四年庚子隋大赦四年三月己未洛陽男子高德上書請隋主為太上皇傳位皇太子帝曰朕承天命撫育蒼生日旰孜孜猶恐不逮旰古按翻豈效近代帝王傳位於子自求逸樂者哉言不效齊武成周天元也樂音洛四年夏四月己亥遣周磻等聘于隋磻薄官翻四年五月丁巳立皇子莊為會稽王會古外翻四年秋八月隋遣散騎常侍裴豪等來聘散悉亶翻騎奇寄翻四年戊申隋申明公李穆卒隋以李穆能知幾保身故諡曰明卒子恤翻四年閏月丁卯隋太子勇鎮洛陽四年隋上柱國郕公梁士彥討尉遲迥事見一百七十四卷高宗太建十二年尉紆勿翻代迥為相州刺史相息亮翻隋主忌之召還長安上柱國公宇文忻與隋主少相厚少詩照翻善用兵有威名隋主亦忌之以譴去官忻為右領軍大將軍章十二行本以作與乙十一行本同孔本同張校同柱國舒公劉昉皆被疏遠被皮義翻遠于願翻以當作與閒居無事頗懷怨望數相往來數所角翻陰謀不軌忻欲使士彥於蒲州兵起蒲州蒲坂河津之要去長安三百餘里士彥之甥裴通預其謀而告之帝隱其事以士彥為晉州刺史晉州平陽用武之地周齊兵爭以為重鎮士彥忻然謂昉等曰天也又請儀同三司薛摩兒為長史帝亦許之後與公卿朝謁朝直遙翻下同帝令左右執士彥忻昉於行間詰之行戶剛翻詰去吉翻初猶不伏捕薛摩兒適至命之庭對於殿庭面質其事士彥失色顧謂摩兒曰汝殺我丙子士彥忻昉皆伏誅叔姪兄弟免死除名九月辛巳隋主素服臨射殿命百官射三家資物以為誡三人者與隋主有舊又有翼戴之功而謀為不軌故為之素服而又以誡百官四年冬十月己酉隋以兵部尚書楊尚希為禮部尚書隋主每旦臨朝日昃不倦尚希諫曰周文王以憂勤損壽武王以安樂延年鄭玄註禮記有是言昃阻力翻樂音洛責成宰輔繁碎之務非人主所宜親也帝善之而不能從四年癸丑隋置山南道行臺於襄州襄州治襄陽其地在長安南山之南俊崔氏生男隋主喜頒賜㣥官直祕書內省博陵李文博家素貧曹魏藏書在祕書中外三閣是時祕書已有內外之分矣隋氏開獻書之路召天下工書之士補續殘缺為正副二本藏于宮中其餘以實祕書內外之閣故置直祕書內省之官博陵郡定州文博曰賞罰之設功過所存今王生男於㣥官何事乃妄受賞也聞者愧之四年癸亥以尚書僕射江總為尚書令吏部尚書謝伷為僕射伷直祐翻四年十一月己卯大赦四年吐谷渾可汗夸呂在位百年夸呂隋書吐谷渾傳作呂夸後太子懼謀執夸呂而降降戶江翻下同請兵於隋邊吏秦州總管河間王弘請以兵應之秦州天水郡河間王弘隋主從祖弟太子謀洩為夸呂所殺復立其少子嵬王訶為太子復扶又翻下同少詩照翻嵬五灰翻疊州刺史杜粲五代志臨洮郡疊川縣後周置疊州宋白曰以其地山多重疊也釁許覲翻隋主又不許是歲嵬王訶復懼誅謀帥部落萬五千戶降隋遣使詣闕請兵迎之帥讀曰率使疏吏翻下同隋主曰渾賊風俗特異人倫言其去人倫與中國異俗子復不孝朕以德訓人何有成其惡逆乎乃謂使者曰父有過失子當諫爭爭與諍同音則迸翻豈可潛謀非法受不孝之名溥天之下皆朕臣妾各為善事即稱朕心稱尺證翻嵬王既欲歸朕唯教嵬王為臣子之法不可遠遣兵馬助為惡事隋主可謂有君人之言矣禎明元年丁未五八七四年春正月戊寅大赦改元四年癸巳隋主享太廟四年乙未隋制諸州歲貢士三人四年二月丁巳隋主朝日于東郊五代志禮天子以春分朝日於東郊秋分夕月於西郊漢法不俟二分於東西郊常以郊泰畤旦出竹宮東向揖日其夕西向揖月魏文譏其煩褻似家人之事而以正月朝日于東門之外前史又以為非時及明帝太和元年二月丁亥朝日于東郊八月己丑夕月於西郊始合於古後周以春分朝日於國東門外為壇如其郊用特牲青幣青圭有邸皇帝乘青輅及祀官俱青冕執事者青弁燔燎如圓丘秋分夕月於國西門外為壇於埳中燔燎禮如朝日隋開皇初於國東春明門外為壇每以春分朝日又於國西開遠門外埳中為壇每以秋分夕月牲幣與周同朝直遙翻四年遣兼散騎常侍王亨等聘于隋散悉亶翻騎奇寄翻四年隋發丁男十萬餘人修長城二旬而罷夏四月於揚州開山陽瀆以通運揚州治廣陵山陽縣屬焉按春秋吳城邗溝通江淮山陽瀆通於廣陵尚矣隋特開而深廣之將以伐陳也四年突厥沙鉢略可汗遣其子入貢于隋因請獵於恆代之間拓跋氏始都平城建為代都置司州及代都尹後遷洛陽改司州為恆州故曰恆代也厥九勿翻可從刊入聲汗音寒恆戶登翻仍遣人賜以酒食沙鉢略帥部落再拜受賜帥讀曰率沙鉢略尋卒隋為之廢朝三日卒子恤翻為于偽翻朝直遙翻遣太常弔祭初沙鉢略以其子雍虞閭懦弱懦乃臥翻又奴亂翻遺令立其弟葉護處羅侯葉護突厥達官將立之使疏吏翻下同處羅侯曰我突厥自木杆可汗以來多以弟代兄逸可汗捨其子而立木杆木杆捨其子而立佗鉢佗鉢卒攝圖大邏便遂至爭國事並見前杆古按翻失先祖之法不相敬畏謂大邏便詈辱菴羅又與沙鉢略為敵達頭又從而助之也我不憚拜汝雍虞閭曰叔與我父共根連體我枝葉也豈可使根本反從枝葉叔父屈於卑幼乎且亡父之命何可廢也願叔勿疑遣使相讓者五六處羅侯竟立是為莫何可汗以雍虞閭為葉護遣使上表言狀可從刊入聲汗音寒使疏吏翻上時掌翻隋使車騎將軍長孫晟持節拜之騎奇寄翻拜莫何為可汗也賜以鼓吹幡旗吹昌瑞翻莫何勇而有謀以隋所賜旗鼓西擊阿波阿波之衆以為得隋兵助之多望風降附遂生擒阿波降戶江翻考異曰隋突厥傳前云沙鉢略西擊阿波破擒之後又云處羅侯生擒阿波長孫晟傳曰處羅侯因晟奏曰阿波為天所滅與五六千騎在山谷間伏聽詔旨當取之以獻按前云沙鉢略破擒之擒衍字耳處羅侯云當取以獻則是得否未可必隋安得豫議其死生乎今從突厥傳後上書請其死生之命上時掌翻隋主下其議下戶嫁翻莫何不敢專殺阿波而請命於隋隋之威令可謂行於突厥矣樂安公元諧請就彼梟首梟古堯翻武陽公李充請生取入朝武陽郡公隋之魏州武陽郡也朝直遙翻下同隋主謂長孫晟於卿何如晟對曰若突厥背誕杜預曰背誕謂背命放誕陸德明曰背音佩誕音但按今讀從去聲亦通今其昆弟自相夷滅阿波之惡非負國家因其困窮取而為戮恐非招遠之道不如兩存之左僕射高熲曰骨肉相殘教之蠹也宜存養以示寬大隋主從之四年甲戌隋遣兼散騎常侍楊同等來聘散悉亶翻騎奇寄翻四年五月乙亥朔日有食之四年秋七月己丑隋衞昭王爽卒卒子恤翻四年八月隋主徵梁主入朝梁主帥其㣥臣二百餘人發江陵朝直遙翻帥讀曰率庚申至長安隋主以梁主在外遣武鄉公崔弘度將兵戍江陵軍至都州隋無都州蕭琮傳作鄀州當從之五代志竟陵郡樂鄉縣西魏置鄀州又南郡紫陵縣其城南面梁置鄀州鄀市灼翻瓛戶官翻恐弘度襲之乙丑遣都官尚書沈君公詣荊州刺史宜黃侯慧紀請降降戶江翻九月庚寅慧紀引兵至江陵城下辛卯巖等驅文武男女十萬口來奔隋主聞之廢梁國梁敬帝紹泰元年後梁中宗即帝位更三主三十三年而亡射寅謝翻熲居永翻梁中宗世宗各給守冢十戶拜梁主琮上柱國賜爵莒公四年甲午大赦四年冬十月隋主如同州癸亥如蒲州四年十一月丙子以蕭巖為開府儀同三司東揚州刺史蕭讞為吳州刺史五代志會稽郡梁置東揚州吳郡陳置吳州四年丁亥以豫章王叔英兼司徒四年甲午隋主如馮翊親祠故社隋主生於馮翊猶漢祀豐枌榆社之意然親祠則禮重於漢矣戊戌還長安還從宣翻又音如字是行也內史令李德林以疾不從從才用翻隋主自同州敕書追之追召也及還帝馬上舉鞭南指曰待平陳之日以七寶裝嚴公使自山以東無及公者言又將顯貴之使出於等夷李德林山東人四年初隋主受禪以來與陳鄰好甚篤每獲陳諜皆給衣馬禮遣之好呼到翻諜徒協翻間探之人而高宗猶不禁侵掠故太建之末隋師入寇會高宗殂隋主即命班師事見上卷太建十四年殂祚乎翻使疏吏翻書稱姓名頓首帝答之益驕書末云想彼統內如宜此宇宙清泰隋主不悅以示朝臣朝直遙翻上柱國楊素以為主辱臣死再拜請罪隋主問取陳之策於高熲對曰江北地寒田收差晚江南水田早熟量彼收穫之際熲居永翻量音良微徵士馬聲言掩襲彼必屯兵守禦足得廢其農時彼既聚兵我便解甲再三若此彼以為常後更集兵彼必不信猶豫之頃我乃濟師此濟師謂舉兵濟江兵氣益倍謂兵既登岸後限大江士無反顧之心有必死之志其氣益倍江南土薄舍多茅竹所有儲積皆非地窖窖古孝翻若密遣行人因風縱火待彼脩立復更燒之復扶又翻不出數年自可財力俱盡隋主用其策陳人始困於是楊素賀若弼及光州刺史高勱虢州刺史崔仲方等五代志弋陽郡梁置光州弘農郡隋置虢州若人者翻勱音邁仲方上書曰今唯須武昌以下蘄和滁方吳海等州上時掌翻武昌陳為郡隋平陳廢為縣屬江夏郡五代志蘄春郡後齊置羅州後周改曰蘄州歷陽郡後齊置和州江都郡清流縣舊置南譙州隋改曰滁州六合縣後齊置秦州後周改曰方州江都郡本南兗州後周改曰吳州東海郡東魏海州蘄居依翻又音其更帖精兵帖添帖益信襄荊基郢等州蜀郡益州巴東郡信州襄陽郡襄州南郡荊州竟陵郡豐鄉縣西魏置基州弋陽郡定城縣舊置郢州多張形勢為水戰之具蜀漢二江是其上流蜀江出三峽過南郡漢江過襄陽竟陵沔陽而二江合流國於東南者二江其上流也必爭之所賊雖流頭荊門延洲公安巴陵隱磯夏首蘄口湓城置船水經註江水過夷陵而東至流頭灘其水峻激奔暴魚鼈所不能游行者苦之又出西陵峽而東歷荊門虎牙之門荊門之下為延洲又東過南郡而東右與油水合謂之油口油口即公安也又東過長沙下巂縣北與湘水會匯為洞庭而得巴陵又東至彭城磯磯北對隱磯夏首即夏口以夏水入江而得名屈原哀郢過夏首而西浮江水又東過蘄春縣與蘄水會謂之蘄口又東至尋陽得湓浦有湓城皆沿江要害之地也夏戶雅翻以水戰大決漢口即夏口峽口西陵峽口令精兵赴援者下流諸將即須擇便橫渡如擁衆自衞上江諸軍鼓行以前將即亮翻上江諸軍謂蜀江漢江順流東下之軍也彼雖恃九江五湖之險非德無以為固徒有三吳百越之兵非恩不能自立矣隋主以仲方為基州刺史及受蕭巖等降降戶江翻隋主益忿謂高熲曰我為民父母豈可限一衣帶水不拯之乎命大作戰船人請密之隋主曰吾將顯行天誅何密之有使投其柿於江柿方廢翻斫木札也曰若彼懼而能改吾復何求復扶又翻楊素在永安蜀先主敗於秭歸退還白帝起永安宮居之故巴東有永安之名名曰五牙艦戶黯翻上起樓五層高百餘尺左右前後置六拍竿拍竿發之以拍敵船高古號翻容戰士八百人次曰黃龍置兵百人自餘平乘舴艦各有等差舴陟格翻艋莫幸翻晉州刺史皇甫續章十二行本續作績乙十一行本同孔本同將之官稽首言陳有三可滅之往也之官往服官事也稽音啟曰大吞小一也以有道伐無道二也納叛臣蕭巖於我有詞三也陛下若命將出師臣願展絲髮之效隋主勞而遣之將即亮翻勞力到翻時江南妖異特衆妖於驕翻臨平湖草久塞忽然自開臨平湖在餘杭郡錢塘縣此湖常蓁塞故老相傳湖開則天下平塞悉則翻乃自賣於佛寺為奴以厭之惡烏路翻厭於葉翻又於建康造大皇寺起七級浮圖未畢火從中起而焚之吳興章華好學善屬文朝臣以華素無伐閱好呼到翻屬之欲翻朝直遙翻顏師古曰伐積功也閱經歷也競排詆之除太市令華鬱鬱不得志上書極諫略曰昔高祖南平百越謂平盧子略李賁元景仲蘭裕蕭勃之亂上時掌翻謂平侯景謂破斬杜龕張彪見一百六十八卷世祖天嘉元年辟地千里見一百七十一卷太建五年辟讀曰闢陛下即位于今五年不思先帝之艱難不知天命之可畏溺於嬖寵惑於酒色溺奴狄翻嬖卑義翻又博計翻祠七廟而不出記天子七廟三昭三穆與太祖之廟而七三龔孔張也將即亮翻棄之草莽諂佞讒邪升之朝廷今疆埸日蹙埸音亦隋軍壓境陛下如不改絃易張董仲舒曰譬之琴瑟不調必改絃而更張之乃可鼓也伍子胥諫吳王而不聽曰臣見麋鹿遊於姑蘇矣吳卒以亡復扶又翻即日斬之古語有之殺諫臣者必亡其國豈不信哉二年二年春正月辛巳立皇子恮為東陽王恮莊緣翻恬為錢塘王二年遣散騎常侍袁雅等聘于隋散悉亶翻騎奇寄翻侵隋峽州九江郡江南之尋陽郡江州治所也夷陵梁置宜州西魏改曰拓州後周改曰峽州將即亮翻三月甲戌隋遣兼散騎常侍程尚賢等來聘戊寅隋主下詔曰陳叔寶據手掌之地辛臣說田戎曰洛陽地如掌耳溪壑難盈故以為喻資產俱竭驅逼內外勞役弗已窮奢極侈俾晝作夜斬直言之客滅無罪之家欺天造惡祭鬼求恩盛粉黛而執干戈曳羅綺而呼警蹕自古昏亂罕或能比君子潛逃小人得志天災地孽孽魚列翻物怪人妖衣冠鉗口鉗其廉翻道路以目國語周厲王監謗道路以目言道路相逢以目相視不敢有言搖蕩疆埸重直用翻背蒲妹翻埸音亦晝伏夜遊鼠竊狗盜天之所覆無非朕臣覆敷救翻每關聽覽有懷傷惻可出師授律應機誅殄在斯一舉永清吳越又送璽書暴帝二十惡璽斯氏翻仍散寫詔書三十萬紙遍諭江外中原以江南為江外二年太子胤性聰敏好文學好呼到翻然頗有過失詹事袁憲切諫不聽時沈后無寵而近侍左右數於東宮往來太子亦數使人至后所帝疑其怨望甚惡之數所角翻惡烏路翻張孔二貴日夜構成后及太子之短孔範之徒又於外助之帝欲立張貴子始安王深為嗣嘗從容言之嗣祥吏翻從千容翻吏部尚書蔡徵順旨稱贊袁憲厲色折之曰皇太子國家儲副億兆宅心卿是何人輕言廢立帝卒從徵議折之舌翻宅心居心也卒子恤翻夏五月庚子廢太子胤為吳興王立揚州刺史始安王深為太子徵景歷之子也蔡景歷歷事陳高祖世祖高宗惠與慧同操七到翻容止儼然雖左右近侍未嘗見其喜慍帝聞袁憲嘗諫胤即用憲為尚書僕射帝遇沈后素薄張貴專後宮之政后澹然未嘗有所忌怨澹徒敢翻身居儉約衣服無錦繡之飾唯尋閱經史及釋典為事釋典佛經也數所角翻上時掌翻爭側迸翻帝欲廢之而立張貴會國亡不果二年冬十月己亥立皇子蕃為吳郡王二年己未隋置淮南行省於壽春行省即行臺也帝遣兼散騎常侍王琬兼通直散騎常侍許善心聘于隋散悉亶翻騎奇寄翻琬等屢請還不聽還音旋又如字為隋主褒美許善心張本甲子隋以出師有事於太廟命晉王廣秦王俊清河公楊素皆為行軍元帥帥所類翻廣出六合六合本漢堂邑縣之地江左立秦郡及尉氏縣後周改秦郡為六合郡隋開皇初廢郡改尉氏縣為六合縣秦王俊以山南道行臺鎮襄陽今自襄陽出指漢口素鎮永安自永安下三峽荊江治江陵使劉仁恩出師會楊素東下蘄州治蘄春使王世積出師自蘄口臨江津蘄音機又音其廬州治廬江使韓擒虎出師自橫江渡攻姑孰吳州治廣陵使賀若弼自瓜洲渡江攻京口若人者翻東海郡海州青州治益都此蓋使燕榮以青州之師出胊山渡海以攻南沙也燕因肩翻兵五十一萬八千皆受晉王節度東接滄海西拒巴蜀旌旗舟楫橫亙數千里以左僕射高熲為晉王元帥長史帥所類翻長知兩翻右僕射王韶為司馬軍中事皆取決焉區處支度處昌呂翻度徒洛翻無所凝滯十一月丁卯隋主親餞將士乙亥至定城述征記定城去潼關三十里夾道各一城二年丙子立皇弟叔榮為新昌王叔匡為太原王二年隋主如河東河東蒲州庚子還長安二年突厥莫何可汗西擊鄰國中流矢而卒厥九勿翻可從刊入聲汗音寒中竹仲翻卒子恤翻國人立雍虞閭號頡伽施多那都藍可汗為突厥復亂張本頡戶結翻伽求迦翻二年隋軍臨江高熲謂行臺吏部郎中薛道衡曰今茲大舉江東必可克乎道衡曰克之嘗聞郭璞有言郭璞晉人知數之士也王于況翻復與中國合今此數將周一也晉元帝南渡即王位於建康歲在丁丑是年歲在戊申凡二百七十二年叔寶荒淫驕侈二也國之安危在所委任彼以江總為相唯事詩酒拔小人施文慶委以政事蕭摩訶任蠻奴為大將皆一夫之用耳三也任蠻奴即任忠彼無德而小量其甲士不過十萬量音良西自巫峽東至滄海分之則勢懸而力弱聚之則守此而失彼四也席卷之勢事在不疑卷讀曰捲熲忻然曰得君言成敗之理令人豁然本以才學相期不意籌略乃爾爾猶言如此也秦王俊督諸軍屯漢口為上流節度詔以散騎常侍周羅睺都督巴峽緣江諸軍事以拒之散悉亶翻騎奇寄翻楊素引舟師下三峽軍至流頭灘將軍戚昕以青龍百餘艘章十二行本艘下有兵數千人四字乙十一行本同孔本同張校同守狼尾灘地勢險峭隋人患之水經註江水過流頭灘又東逕古宜昌縣北又東逕狼尾灘其地猶在黃牛峽之西杜佑通典曰狼尾灘今夷陵郡宜都縣界艘蘇遭翻峭七笑翻勝負大計在此一舉若晝日下船彼見我虛實灘流迅激制不由人則吾失其便不如以夜掩之素親帥黃龍數千艘銜枚而下遣開府儀同三司王長襲引步卒自南岸擊昕別柵大將軍劉仁恩帥甲騎自北岸趣白沙遲明而至擊之昕敗走悉俘其衆勞而遣之帥讀曰率下同艘蘇遭翻柵直革翻騎奇寄翻趣七喻翻遲直二翻勞力到翻秋毫不犯素帥水軍東下舟艫被江艫音盧被皮義翻旌甲曜日素坐平乘大船容貌雄偉陳人望之皆懼曰清河公即江神也江濱鎮戍聞隋軍將至相繼奏聞施文慶沈客卿並抑而不言初上以蕭巖蕭瓛梁之宗室擁衆來奔心忌之故遠散其衆以巖為東揚州刺史瓛為吳州刺史瓛戶官翻蕭巖蕭瓛來奔及出藩事並見上年使領軍任忠出守吳興郡以襟帶二州任音壬使南平王嶷鎮江州永嘉王彥鎮南徐州江州治尋陽南徐州治京口皆緣江重鎮也嶷魚力翻命緣江諸防船艦悉從二王還都艦戶黯翻為威勢以示梁人之來者由是江中無一鬬船上流諸州兵皆阻楊素軍不得至湘州刺史晉熙王叔文湘州治長沙大得人和上以其據有上流陰忌之自度素與㣥臣少恩度徒洛翻少詩沼翻恐不為用無可任者乃擢施文慶為都督湘州刺史配以精兵二千欲令西上上時掌翻仍徵叔文還朝朝直遙翻下同文慶深喜其事然懼出外之後執事者持己短長因進其黨沈客卿以自代未發間二人共掌機密護軍將軍樊毅言於僕射袁憲曰京口采石俱是要地各須銳兵五千幷出金翅二百緣江上下以為防備金翅船名驃匹妙翻騎奇寄翻乃與文武㣥臣共議請如毅策未幾韓擒虎濟采石賀若弼拔京口二道並進而陳以亡地有所必守蓋不待智者而後知也廢其述職孟子曰諸侯朝於天子曰述職此以出守藩方為述職之往也任職也之任往赴所職也文慶與客卿時共掌機密文慶若出則客卿得專之必有論議不假面陳但作文啟即為通奏謂朝臣若必有所陳說不須面見陳主言之但文字來便為聞達為于偽翻下內為同二人齎啟入白帝曰此是常事邊城將帥足以當之將即亮翻帥所類翻若出人船必恐驚擾及隋軍臨江間諜驟至間古莧翻諜徒協翻憲等殷勤奏請至于再三文慶曰元會將逼南郊之日太子多從陳仍梁制以間歲正月上辛祀天地於南北二郊用特牛一蓋來年正月當行此禮故施文慶云然從才用翻事便廢闕帝曰今且出兵若北邊無事因以水軍從郊何為不可又曰如此則聲聞鄰境聞音問便謂國弱後又以貨動江總總內為之遊說謂衆言雜進之後文慶又以貨動江總使之助己說輸芮翻重如字乃令付外詳議總又抑憲等由是議久不決帝從容謂侍臣曰王氣在此齊兵三來周師再來無不摧敗齊師三來謂梁敬帝紹泰元年徐嗣徽任約以齊師襲建康據石頭太平元年復襲破采石與齊蕭軌同入寇逼建康世祖天嘉元年齊將劉伯球慕容恃德助王琳下蕪湖皆敗周師再來謂天嘉元年獨孤盛賀若敦入湘川臨海王光大元年宇文直元定助華皎皆敗從千容翻都官尚書孔範曰長江天塹古以為限隔南北魏文帝伐吳臨江見江濤洶湧歎曰固天所以限南北也塹七豔翻邊將欲作功勞妄言事急將即亮翻臣每患官卑虜若渡江臣定作太尉公矣孔範自謂兼資文武故大言自詭立功自晉宋以來率謂三公為太尉公司徒公司空公範曰此是我馬何為而死言馬若渡江必不能北歸將悉為我有亦大言也故不為深備奏伎縱酒賦詩不輟伎渠綺翻女樂也二年是歲吐谷渾裨王拓跋木彌吐谷渾自亦有拓跋姓裨音卑吐從暾入聲谷音浴降戶江翻隋主曰普天之下皆是朕臣朕之撫育俱存仁孝渾賊惛狂妻子懷怖怖普故翻並思歸化自救危亡然叛夫背父不可收納背蒲妹翻又其本意正自避死今若違拒又復不仁若更有音信但宜慰撫任其自拔不須出兵應接其妹夫及甥欲來亦任其意不勞勸誘也所謂叛夫背父妹夫及甥當時必皆有主名而史不詳紀隋書作名王拓跋木彌裨王亦用漢書語背蒲妹翻誘羊久翻二年河南王移茲裒卒隋主令其弟樹歸襲統其衆移茲裒降隋見上卷高宗太建十三年裒蒲侯翻卒子恤翻王崇武標點顧頡剛聶崇岐覆校
