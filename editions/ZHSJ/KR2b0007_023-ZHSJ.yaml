body:
  text: 資治通鑑卷第二十三翰林學士朝散大夫右諫議大夫知制誥兼侍講同提舉萬壽觀公事兼判集賢院上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣奉敕編集後學天台音註漢紀十五始元元年孝昭皇帝上諱弗陵武帝少子也張晏曰後以二名難諱但名弗荀悅曰諱弗之字曰不應劭曰禮諡法聖聞周達曰昭始元元年乙未前八六始元元年夏益州夷二十四邑三萬餘人皆反遣水衡都尉呂破張破作辟胡募吏民及發犍為蜀郡奔命往擊大破之犍為蜀郡皆屬益州犍為郡唐瀘戎嘉眉榮資簡州地蜀郡唐成都府彭蜀邛雅翼茂州之地應劭曰舊時郡國皆有材官騎士以赴急難今夷反常兵不足以討之故權發精勇聞命奔走故謂之奔命李奇曰平居發二十以上至五十為甲卒今者五十以上六十以下為奔命奔命言急也師古曰應說是余據左傳子重子反一歲七奔命奔命者救急之師固不拘五十以上六十以下也犍居言翻始元元年秋七月赦天下始元元年大雨至于十月渭橋絕始元元年武帝初崩章甲十五行本作初武帝崩乙十一行本同孔本同退齋校同賜諸侯王璽書左傳襄公在楚季武子使公冶問璽書追而與之蓋君臣通用也秦漢以來惟至尊以為信曰璽書封小張晏曰文小則封小遣幸臣壽西長孫縱之王孺等之長安蘇林曰壽西姓長名師古曰之往也陰刺候朝廷事刺七亦翻探也及有詔褒賜旦錢三十萬益封萬三千戶旦怒曰我當為帝何賜也遂與宗室中山哀王子長齊孝王孫澤等結謀中山哀王昌靖王勝子齊孝王將閭悼惠王肥子得職吏事脩武備備非常如淳曰諸侯不得治民與職事是以詐言受詔得知職事發兵為備也大王失職獨可起而索姓譜成姓本自周文王成伯之後周有成肅公又楚有令尹成得臣師古曰失職謂當為漢嗣而不被用也索求也音山客翻大王壹起國中雖女子皆奮臂隨大王旦即與澤謀為姦書言少帝非武帝子大臣所共立天下宜共伐之使人傳行郡國以搖動百姓澤謀歸發兵臨菑臨菑齊郡太守青州刺史治所雋辭兗翻旦招來郡國姦人賦斂銅鐵作甲兵數閱其車騎材官卒發民大獵以講士馬須期日師古曰講習也須待也余謂澤歸臨菑謀舉兵故旦閱兵以待期數所角翻下同旦殺義等凡十五人會缾侯成知澤等謀成菑川靖王之子班志缾侯國屬瑯琊郡缾步丁翻八月不疑收捕澤等以聞天子遣大鴻臚丞治續漢志大鴻臚丞秩千石臚陵如翻有詔以燕王至親勿治而澤等皆伏誅遷雋不疑為京兆尹百官表武帝太初元年改右內史為京兆尹張晏曰地絕高曰京左傳曰莫之與京十億曰兆尹正也師古曰京大也兆者衆數言大衆所在故云京兆也酈道元曰尹正也所以董正京畿率先百郡也孔穎達曰釋詁文曰萬億曰兆如依算法億之數有大小二法其小數以十為等十萬為億十億為兆也其大數以萬億為等萬至萬是萬之為億又從億而數至萬億曰兆億億曰秭兆在億秭之間不疑為京兆尹吏民敬其威信每行縣錄囚徒還師古曰省錄之知其情狀有冤滯與否也今云慮囚本錄聲之去者耳音力具翻而近俗不曉其意訛其文遂為思慮之慮失其源也甚矣行下孟翻有所平反活幾何人即不疑多有所平反毛晃曰平反理正幽枉也反音幡或無所出母怒為不食為于偽翻故不疑為吏嚴而不殘始元元年九月丙子秺敬侯金日磾薨秺音妬磾丁奚翻初武帝病有遺詔封金日磾為秺侯上官桀為安陽侯恩澤侯表安陽侯食邑於河內之蕩陰水經註陝縣有安陽城武帝封上官桀為侯國文穎曰博大陸平取其嘉名無此縣也食邑於北海河間東郡師古曰蓋亦取鄉聚之名以為國號非必縣也博陸初封食北海河間後益封食東郡捕馬何羅事見上卷武帝後元元年不受封少詩沼翻光等亦不敢受及日磾病困光白封日磾臥受印綬一日薨日磾兩子賞建俱侍中與帝略同年共臥起賞為奉車建駙馬都尉及賞嗣侯佩兩綬上謂霍將軍曰金氏兄弟兩人不可使俱兩綬邪對曰賞自嗣父為侯耳上笑曰侯不在我與將軍乎對曰先帝之約有功乃得封侯遂止始元元年閏月遣故廷尉王平等五人持節行郡國舉賢良問民疾苦冤失職者行下孟翻始元元年冬無冰二年始元二年春正月封大將軍光為博陸侯按師古註光初封食邑北海河間桀食邑蕩陰始元二年或說霍光曰將軍不見諸呂之事乎處伊尹周公之位說式芮翻處昌呂翻攝政亶權而背宗室不與共職是以天下不信卒至於滅亡背蒲妹翻卒子恤翻今將軍當盛位帝春秋富宜納宗室又多與大臣共事服虔曰共議事也師古曰每事皆與參共知之如是則可以免患師古曰言諸呂專權而滅亡今納宗室是反其道乃可免患也乃擇宗室可用者遂拜楚元王孫辟疆及宗室劉長樂皆為光祿大夫辟疆守長樂衞尉漢長樂建章甘泉各有衞尉以掌其宮衞然不常置樂音洛始元二年三月遣使者振貸貧民無種食者師古曰種者五穀之種也食者所以為糧食也種之勇翻始元二年秋八月詔曰往年災害多今年蠶麥傷所振貸種食勿收責毋令民出今年田租始元二年初武帝征伐匈奴深入窮追二十餘年匈奴馬畜孕重墮殰罷極苦之師古曰孕重懷任者也墮落也殰敗也罷極困也苦之心厭苦也罷讀曰疲殰音讀鄭玄曰內敗曰殰陸云謂懷任不成也未能得狐鹿孤單于有異母弟為左大都尉賢國人鄉之鄉讀曰嚮謂悉皆附之母閼氏恐單于不立子而立左大都尉也閼氏音煙支乃私使殺之左大都尉同母兄怨遂不肯復會單于庭復扶又翻是歲單于病且死謂諸貴人我子少不能治國立弟右谷蠡王少詩沼翻治直之翻谷蠡音鹿黎及單于死衞律等與顓渠閼氏謀顓渠閼氏單于之正室也位大閼氏上矯單于令更立子左谷蠡王為壺衍鞮單于更工衡翻左賢王右谷蠡王怨望率其衆欲南歸漢恐不能自致即脅盧屠王欲與西降烏孫降戶江翻盧屠王告之單于使人驗問右谷蠡王不服反以其罪罪盧屠王國人皆冤之於是二王去居其所不復肯會龍城匈奴諸王長少歲正月會單于庭五月大會龍城祭其先天地鬼神今二王自居其本處不復會祭龍城也復扶又翻三年始元三年春二月有星孛于西北孛蒲內翻始元三年冬十一月壬辰朔日有食之始元三年初霍光與上官桀相親善光每休沐出漢制中朝官五日一下里舍休沐三署諸郎亦然光女為桀子安妻生女年甫五歲甫始也光以為尚幼不聽蓋長公主私近子客河間丁外人地理志蓋縣屬泰山郡師古曰食邑於鄂為蓋侯所尚故曰蓋長公主長公主儀比諸王帝姊妹乃稱之蓋侯王充武帝舅王信之子襲爵蓋如字又古盍翻子客子賓客也丁姓外人其名長知兩翻下同近其靳翻說外人曰說式芮翻安子容貌端正誠因長主時得入為后以臣父子在朝而有椒房之重師古曰椒房殿在未央宮中皇后所居以椒和泥塗壁取其溫而芳朝直遙翻漢家故事常以列侯尚主足下何憂不封侯乎外人喜言於長主長主以為然詔召安女為倢伃倢伃音接予為安父子與霍光爭權謀亂張本四年始元四年春三月甲寅立皇后上官氏赦天下始元四年西南夷姑繒葉榆復反姑繒葉榆皆西南夷別種其所居地在益州郡界葉榆澤名武帝開為縣繒慈陵翻葉式涉翻此益州刺史所部兵也宋白曰漢武帝元鼎中分雍州之南置益州釋名曰益阨也所在之地險阨也應劭地理風俗記曰疆理益廣故曰益州班志漢中廣漢蜀郡越巂益州牂柯巴郡皆屬益州師古曰辟音壁蠻夷遂殺益州太守武帝元封二年開滇王國置益州郡治滇池縣守式又翻士戰及溺死者四千餘人冬遣大鴻臚田廣明擊之臚陵如翻始元四年廷尉李种坐故縱死罪种音沖棄市始元四年是歲上官安為車騎將軍考異曰昭紀作驃騎今從百官表外戚傳五年始元五年春正月迫尊帝外祖趙父為順成侯順成侯趙父鉤弋夫人之父也父時已死追封為順成侯置園邑三百戶於扶風師古曰姁音況羽翻賜錢二百萬奴婢第宅以充實焉諸昆弟各以親疏受賞賜孔穎達曰五服之內大功已上服粗者為親小功已下服精者為疏疏與疎同始元五年有男子乘黃犢車詣北闕未央宮北闕蕭何築也師古曰未央宮雖南向而上書奏事謁見者皆詣北闕公車司馬在焉公車以聞班表公車屬衞尉天下上事皆總領之師古曰公車主受章奏師古曰雜共也有素識之者令視知其是非也右將軍勒兵闕下以備非常丞相御史中二千石至者並莫敢發言京兆尹不疑後到叱從吏收縛從才用翻或曰是非未可知且安之安猶徐也諸君何患於衞太子昔蒯聵違命出奔輒距而不納春秋是之師古曰蒯聵衞靈公太子輒蒯聵子也蒯聵得罪於靈公而出奔晉及靈公卒使輒嗣位晉趙鞅納蒯聵於戚欲求入衞齊國夏衞石曼姑帥師圍戚公羊傳曰曼姑受命於靈公而立輒曼姑之義固可以距蒯聵也輒之義可以立乎曰可柰何不以父命辭王父命也蒯苦怪翻聵五怪翻亡不即死即就也此罪人也遂送詔獄天子與大將軍霍光聞而嘉之曰公卿大臣當用有經術明於大誼者繇是不疑名聲重於朝廷在位者皆自以不及也廷尉驗治何人凡不知姓名及所從來皆曰何人本夏陽人姓成名方遂居湖以卜筮為事有故太子舍人嘗從方遂卜謂曰子狀貌甚似衞太子方遂心利其言冀得以富貴坐誣罔不道要斬要與腰同考異曰昭紀云張延年雋不疑傳云成方遂又云一姓張名延年今從不疑傳始元五年夏六月封上官安為桑樂侯恩澤侯表桑樂侯食邑於千乘樂來各翻受賜殿中對賓客言與我壻飲大樂樂音洛見其服飾使人歸欲自燒物子病死仰而罵天其頑悖如此悖蒲內翻始元五年罷儋耳真番郡武帝元鼎六年置儋耳郡元封三年置真番郡今皆罷之儋都甘翻始元五年秋大鴻臚廣明軍正王平擊益州斬首捕虜三萬餘人獲畜產五萬餘頭始元五年諫大夫杜延年見國家承武帝奢侈師旅之後數為大將軍光言年歲比不登數所角翻為于偽翻比毗至翻宜脩孝文時政示以儉約寬和順天心說民意說讀曰悅年歲宜應光納其言延年故御史大夫周之子也六年始元六年春二月詔有司問郡國所舉賢良文學民所疾苦教化之要皆對願罷鹽鐵酒榷均輸官鹽鐵事始見十九卷武帝元狩四年均輸事始見二十卷元鼎三年酒榷事始見上卷天漢三年榷古岳翻示以儉節然後教化可興桑弘羊難以為此國家大業所以制四夷安邊足用之本不可廢也難乃旦翻於是鹽鐵之議起焉師古曰議罷鹽鐵之官百姓皆得鬻鹽鑄錢因總論政治得失也據班史藝文志有鹽鐵論十篇今行於世始元六年初蘇武既徙北海上事見二十一卷天漢元年稟給也蘇林曰掘野鼠所去草實而食之張晏曰取鼠及草實幷而食之師古曰蘇說是去謂藏之也貢父曰今北方野鼠甚多皆可食也武掘野鼠得即食之其草實乃頗去藏耳去丘呂翻臥起操持節旄盡落操千高翻武在漢與李陵俱為侍中陵降匈奴不敢求武久之降匈奴事見二十一卷天漢二年降戶江翻下同為武置酒設樂為于偽翻下同因謂武曰單于聞陵與子卿素厚子卿蘇武字虛心欲相待終不得歸漢空自苦亡人之地說式芮翻亡古無字通信義安所見乎見賢遍翻足下兄弟二人前皆坐事自殺來時太夫人已不幸不幸謂死也少詩照翻聞已更嫁矣獨有女弟二人兩女一男今復十餘年更工衡翻復扶又翻下同存亡不可知人生如朝露師古曰朝露見日則晞乾人命短促亦如之陵始降時忽忽如狂自痛負漢加以老母繫保宮班表少府屬官有居室武帝太初元年更名保宮何以過陵且陛下春秋高法令無常大臣無罪夷滅者數十家安危不可知子卿尚復誰為乎武曰武父子無功德皆為陛下所成就位列將爵通侯兄弟親近皆為如字將即亮翻近其靳翻今得殺身自效雖斧鉞湯鑊誠甘樂之師古曰鼎大而無足曰鑊樂音洛猶子事父也子為父死無所恨願勿復再言陵與武飲數日復曰子卿壹聽陵言武曰自分已死久矣分扶問翻王必欲降武匈奴封李陵為右校王故稱之效死於前陵見其至誠喟然嘆曰嗟乎義士陵與衞律之罪上通於天因泣下霑衿與武決去師古曰決別也後陵復至北海上語武以武帝崩武南鄉號哭歐血旦夕臨數月語牛倨翻鄉讀曰嚮號戶高翻臨哭也力禁翻及壺衍鞮單于立母閼氏不正閼氏音煙支國內乖離常恐漢兵襲之於是衞律為單于謀與漢和親漢使至求蘇武等匈奴詭言武死後漢使復至匈奴常惠私見漢使教使者謂單于謂告語也天子射上林中得鴈足有係帛書言武等在某澤中使者大喜如惠語以讓單于單于視左右而驚謝漢使曰武等實在乃歸武及馬宏等馬宏者前副光祿大夫王忠使西國西國謂西域諸國使疏吏翻忠戰死馬宏生得亦不肯降故匈奴歸此二人欲以通善意於是李陵置酒賀武曰今足下還歸還音旋又如字揚名於匈奴功顯於漢室雖古竹帛所載丹青所畫何以過子卿陵雖駑怯令漢貰陵罪駑音奴貰寬也貰時夜翻全其老母使得奮大辱之積志庶幾乎曹柯之盟李奇曰言欲劫單于如曹劌劫齊桓公柯盟之時幾居衣翻收族陵家為世大戮事見上卷天漢三年已矣令子卿知吾心耳陵泣下數行行戶剛翻因與武決單于召會武官屬前已降及物故凡隨武還者九人既至京師詔武奉一太牢謁武帝園廟程大昌演繁露曰牛羊豕具為太牢有羊豕而無牛則為少牢今人獨以太牢名牛失之矣秩中二千石班表典屬國本秦官掌歸義蠻夷漢因之今以命武以武久在匈奴中習外夷事故使為是官其後省併大鴻臚公田二頃宅一區武留匈奴凡十九歲始以強壯出及還須髮盡白須與鬚同遣陵故人隴西任立政等三人俱至匈奴招之陵曰歸易耳易以豉翻丈夫不能再辱遂死於匈奴陵意謂降匈奴已辱矣今若歸漢漢將使刀筆吏簿責其喪師降匈奴之罪是為再辱也故遂不歸始元六年夏旱始元六年秋七月罷榷酤官從賢良文學之議也酤古護翻武帝之末海內虛耗戶口減半霍光知時務之要輕傜薄賦與民休息至是匈奴和親百姓充實稍復文景之業焉始元六年詔以鉤町侯毋波鉤町西南夷種武帝開為縣屬牂柯郡雖置官吏而仍以其君長為鉤町侯使主其種類鉤音劬町音梃毋波漢書作亡波亡古無字也長知兩翻立以為鉤町王賜田廣明爵關內侯元鳳元年辛丑前八應劭曰三年中鳳凰比下東海海西樂鄉故以冠元始元六年春武都氐人反武都郡屬涼州氐人即白馬氐也魚豢魏略曰其人分竄山谷或號青氐或號白氐氐丁奚翻皆免刑擊之師古曰姓馬適名建也據班書功臣表弓高侯韓頹當之孫說以擊匈奴功封龍頟侯坐酎金失侯復以破東越功封按道侯後為衞太子所殺子興嗣侯坐巫蠱誅後元元年復以增嗣龍頟侯增興弟也班志龍頟侯國屬平原郡頟音洛作額者非崔浩曰今有龍頟村蘇林曰是時太常主諸陵縣治民也余謂此刑徒輸作三輔及太常者也始元六年夏六月赦天下始元六年秋七月乙亥晦日有食之既始元六年八月改元始元六年上官桀父子既尊盛德長公主欲為丁外人求封侯霍光不許又為外人求光祿大夫欲令得召見又不許長主大以是怨光而桀安數為外人求官爵弗能得亦慚長知兩翻為于偽翻數所角翻又桀妻父所幸充國為太醫監充國史失其姓太醫監屬少府闌妄也漢制諸入宮殿門皆著籍無籍而妄入謂之闌入冬月且盡漢論死囚不過冬月下遐嫁翻乃得減死論於是桀安父子深怨光而重德蓋主自先帝時桀已為九卿位在光右武帝時桀為太僕位九卿秩中二千石光為奉車都尉光祿大夫秩比二千石是桀之位在光石也右上也桀為左將軍安為車騎將軍光乃其外祖而顧專制朝事師古曰顧猶反也朝直遙翻燕王旦自以帝兄不得立常懷怨望及御史大夫桑弘羊建造酒榷鹽鐵為國興利伐其功伐矜也榷古岳翻為于偽翻下同亦怨恨光於是蓋主桀安弘羊皆與旦通謀旦遣孫縱之等前後十餘輩多齎金寶走馬賂遺蓋主桀弘羊等師古曰走馬馬之善走者也遺于季翻言光出都肄郎羽林孟康曰都試也肄習也張晏曰都肄郎及羽林也師古曰都大也大會試之漢光祿勳令諸當試者不會都所免之都肄謂總閱試習武備也肄羊至翻天子出稱䟆以清道止行人䟆與蹕同師古曰供飲食之具太官屬少府主膳食凡車駕所幸太官先往其處供置蘇武使匈奴二十年不降乃為典屬國實十九年而言二十者欲久其事以見冤屈故言多也使疏吏翻降戶江翻為搜粟都尉又亶調益莫府校尉師古曰調選也莫府大將軍府也調音徒釣翻疑有非常臣旦願歸符璽入宿衞察姦臣變璽斯氏翻候司光出沐日奏之桀欲從中下其事伺光出沐不在禁中桀欲自從禁中下其事也司讀曰伺師古曰下謂下有司也下音胡稼翻下同當者以之自任也帝不肯下明旦光聞之止畫室中不入如淳曰近臣所計畫之室或曰雕畫之室師古曰雕畫是也大將軍安在左將軍桀對曰以燕王告其罪故不敢入有詔召大將軍光入免冠頓首謝上曰將軍冠師古曰令復著冠也將軍無罪光曰陛下何以知之上曰將軍之廣明都郎近耳師古曰之往也廣明亭名余據廣明亭在長安城東東都門外水經註京兆奉明縣廣成鄉有廣明苑史皇孫及王夫人葬於郭北宣帝移於苑北以為悼園在東都門外未能十日燕王何以得知之且將軍為非不須校尉文穎曰帝云將軍欲反不由一校尉尚書左右皆驚班表少府屬官有尚書等十二官令丞又有中書謁者等七官令丞續漢志尚書令千石本註曰承秦所置武帝用宦者更為中書謁者令成帝用士人復故掌凡選署及奏下尚書曹文書衆事余據表則尚書中書為兩官據續志則合為一官此時既有尚書則與中書謁者為兩官明矣沈約曰秦世少府遣吏四人在殿中主發書故謂之尚書尚猶主也漢初有尚冠尚衣尚席尚浴尚食尚書故謂之六尚秦時尚書有令有僕射有丞至漢並隸少府武帝使左右曹諸吏分平尚書事昭帝即位霍光領尚書約又曰漢武遊後庭始使宦者典尚書事謂之中書謁者置令僕射成帝改中書謁者令為中謁者令罷謁者東京省中謁者令而有中宮謁者令非其職也沈約亦以尚書中書為兩官明矣捕之甚急桀等懼白上小事不足遂師古曰遂猶竟也言不須窮竟也後桀黨與有譖光者上輒怒曰大將軍忠臣先帝所屬以輔朕身敢有毀者坐之自是桀等不敢復言屬之欲翻復扶又翻李德裕論曰人君之德莫大於至明明以照姦則百邪不能蔽矣漢昭帝是也周成王有慚德矣高祖文景俱不如也成王聞管蔡流言遂使周公狼跋而東漢高聞陳平去魏背楚欲捨腹心臣背蒲妹翻漢文惑季布使酒難近罷歸股肱郡疑賈生亶權紛亂復疏賢士景帝信誅晁錯兵解遂戮三公武王崩周公相成王管叔蔡叔流言於國曰公將不利於孺子周公於是東征成王未知周公之志公乃為鴟鴞之詩周大夫亦為賦狼跋之詩曰狼跋其胡載疐其尾毛氏註云跋躐也疐跲也老狼有胡進則躐其胡退則跲其尾進退有難然而不失其猛疏曰李巡曰跋前行曰躐跲卻頓曰疐也說文云跋蹎丁千翻跲躓竹二翻躓即疐也然則跋與疐皆是顛倒之類以跋為躐者謂跋其胡而倒耳老狼有胡謂頷垂胡進則躐其胡謂躐胡而前倒也退則跲其尾謂卻頓而倒於尾上也高祖疑陳平事見九卷二年文帝罷季布事見十四卷前四年疏賈生事同上景帝誅晁錯事見十六卷前三年執狐疑之心來讒賊之口劉向之言則成康不足侔矣始元六年桀等謀令長公主置酒請光伏兵格殺之因廢帝迎立燕王為天子旦置驛書往來相報許立桀為王外連郡國豪桀以千數旦以語相平平為燕相史失其姓語牛倨翻大王前與劉澤結謀事未成而發覺者以劉澤素夸好侵陵也好呼到翻平聞左將軍素輕易車騎將軍少而驕易以豉翻少詩照翻臣恐其如劉澤時不能成又恐既成反大王也旦曰前日一男子詣闕自謂故太子長安中民趣鄉之趣七喻翻鄉讀曰嚮正讙不可止師古曰人衆既多故讙譁讙況爰翻出兵陳之以自備耳我帝長子帝謂武帝長知兩翻何憂見反後謂㣥臣蓋主報言獨患大將軍與右將軍王莽張晏曰王莽天水人也字稚叔丞相病幸事必成徵不久令㣥臣皆裝令皆治行裝也安又謀誘燕王至而誅之誘音酉因廢帝而立桀或曰當如皇后何安曰逐麋之狗當顧菟邪師古曰言所求者大不顧小也麋鹿之大者菟讀曰兔吐故翻一旦人主意有所移雖欲為家人亦不可得家人謂凡庶匹夫也會蓋主舍人父稻田使者燕倉知其謀如淳曰特為諸稻田置使者假與民收其稅入也燕音煙姓譜召公封於燕其後為秦所滅子孫以為氏敞素謹畏事不敢言乃移病臥師古曰移病謂移書言病一曰以病而移居余謂前說是延年以聞九月詔丞相部中二千石逐捕孫縱之及桀安弘羊外人等幷宗族悉誅之蓋主自殺燕王旦聞之召相平曰事敗遂發兵乎相息亮翻平曰左將軍已死百姓皆知之不可發也王憂懣師古曰懣音滿又音悶煩也置酒與㣥臣妾別會天子以璽書讓旦璽斯氏翻旦以綬自絞死后夫人隨旦自殺者二十餘人天子加恩赦王太子建為庶人賜旦諡曰剌王剌來達翻諡法暴戾無親曰剌皇后以年少不與謀與讀曰豫亦霍光外孫故得不廢始元六年庚午右扶風王訢為御史大夫訢與欣同始元六年冬十月封杜延年為建平侯班表建平侯食邑於濟陽宜城侯食邑於濟陰為弋陽侯文穎曰徵事丞相官屬位差尊掾屬也如淳曰時宮以徵事待詔丞相府故曰丞相徵事張晏曰漢儀注徵事比六百石皆故吏二千石不以贓罪免者為徵事絳衣奉朝賀正月師古曰張說是班志弋陽侯國屬汝南郡任音壬為商利侯如淳曰漢儀注武帝置丞相少史秩四百石班表商利侯食邑於臨淮之徐少詩照翻文學濟陰魏相對策濟陰郡屬兗州唐為曹州濟子禮翻日者燕王為無道韓義出身強諫為王所殺義無比干之親而蹈比干之節比干紂之賢臣諫紂而死明為人臣之義乃擢義子延壽為諫大夫始元六年大將軍光以朝無舊臣朝無直遙翻光祿勳張安世自先帝時為尚書令班表少府屬官有尚書令續漢志尚書令承秦所置掌凡選署及奏下尚書曹文書衆事秩千石行下孟翻乃白用安世為右將軍兼光祿勳以自副焉安世故御史大夫湯之子也光又以杜延年有忠節以其發燕蓋上官之謀也太僕正卿右曹給事中加官也晉灼曰漢儀注諸吏給事中日上朝謁平尚書奏事分為左右曹班表給事中掌顧問應對位中常侍下蓋得出入禁中延年常輔之以寬吏民上書言便宜輒下延年平處復奏下遐嫁翻先平處其可否復奏言之處昌呂翻可章甲十五行本可上有言字乙十行本同孔本同官試者至為縣令或丞相御史除用滿歲以狀聞或抵其罪法師古曰抵至也言事之人有姦妄者則致之於罪法始元六年是歲匈奴發左右部二萬騎為四隊並入邊為寇漢兵追之斬首獲虜九千人生得甌脫王漢無所失亡匈奴見甌脫王在漢恐以為道擊之道讀曰導即西北遠去不敢南逐水草發人民屯甌脫二年始元二年夏四月上自建章宮徙未央宮始元二年六月赦天下始元二年是歲匈奴復遣九千騎屯受降城以備漢復扶又翻北橋余吾水令可度以備奔走師古曰於余吾水上作橋擬有迫急奔走避漢從此橋度也而恐漢不聽故不肯先言常使左右風漢使者風讀曰諷然其侵盜益希遇漢使愈厚欲以漸致和親漢亦羈縻之三年始元三年春正月泰山有大石自起立上林有柳樹枯僵自起生僵居良翻仆也有蟲食其葉成文曰公孫病已立此為宣帝興於民間之符班表符節令屬少府秩六百石續漢志曰為符節臺率主符節事漢改秦薛郡為魯國屬豫州唐兗州地師古曰眭息隨翻今河朔猶有此姓大石自立僵柳復起復扶又翻下同當有匹庶為天子者枯樹復生故廢之家公孫氏當復興乎漢家承堯之後班贊曰春秋晉史蔡墨有言陶唐既衰其後有劉累學擾龍事孔甲范氏其後也而范宣子亦曰祖自虞以上為陶唐氏在夏為御龍氏在商為豕韋氏在周為唐杜氏晉主夏盟為范氏范氏為晉士師魯文公世奔秦後歸于晉其處者為劉氏劉向云戰國時劉氏自秦獲于魏秦滅魏遷大梁都于豐故周市說雍齒曰豐故梁徙也是以頌高祖云漢帝本系出自唐帝降及于周在秦作劉涉魏而東遂為豐公豐公蓋太上皇父及高祖即位置祠祀官則有秦晉梁荊之巫世祠天地綴之以祀豈不信哉由是言之漢承堯運協于火德得天統矣當求賢人禪帝位退自封百里以順天命弘坐設妖言惑衆伏誅始元三年匈奴單于使犂汙王窺邊據王莽時使譯出塞誘呼右犂汙王咸則犂汙王所居地蓋近塞下也出兵試擊冀可復得其地時漢先得降者聞其計天子詔邊警備後無幾幾居豈翻右賢王犂汙王四千騎分三隊入日勒屋蘭番和班志三縣皆屬張掖郡賢曰日勒故城在今甘州刪丹縣東南師古曰番音盤續漢志張掖屬國都尉治居延縣守式又翻大破之得脫者數百人屬國義渠王射殺犂汙王義渠王屬國義渠胡之君長射而亦翻馬二百匹因封為犂汙王自是後匈奴不敢入張掖始元三年燕蓋之亂燕王蓋主也燕於賢翻蓋古盍翻過父故吏侯史吳侯史姓也吳其名也晉武帝時有侯史光過古禾翻伏法會赦侯史吳自出繫獄廷尉王平章甲十五行本平下有與字乙十一行本同孔本同少府徐仁雜治反事皆以為桑遷坐父謀反而侯史吳臧之治直之翻下同臧讀曰藏非匿反者乃匿為隨者也言桑遷但隨坐耳非自反也後侍御史治實師古曰重覈治其事也桑遷通經術知父謀反而不諫爭爭與諍同侯史吳故三百石吏首匿遷師古曰首匿者言身為謀首而藏匿人也吳不得赦奏請覆治此深文傅致吳之罪從才用翻劾戶概翻師古曰縱放也少府徐仁即丞相車千秋女壻也車千秋即田千秋漢以其年老得乘小車入殿中因呼為車丞相數所角翻恐大將軍光不聽千秋即召中二千石博士會公車門公車門即未央宮北闕門也師古曰於法律之中吳當得何罪皆執吳為不道明日千秋封上衆議上時掌翻光於是以千秋亶召中二千石以下外內異言張晏曰外則去疾欲盡內則為其壻也師古曰非也外內謂內朝及外朝也下遐嫁翻朝廷皆恐丞相坐之太僕杜延年奏記光曰吏縱罪人有常法今更詆吳為不道師古曰詆誣也又丞相素無所守持而為好言於下盡其素行也師古曰言非故有所執持但其素行好與在下人言議耳亶甚無狀師古曰無善狀也言在位已久是為故舊又嘗及相先帝而任事也不可棄也間者民頗言獄深吏為峻詆今丞相所議又獄事也如是以及丞相恐不合衆心㣥下讙譁讙許爰翻庶人私議流言四布延年竊重將軍失此名於天下也師古曰重猶難也以此為重事也卒下之獄卒子恤翻夏四月仁自殺平與左馮翊賈勝胡皆要斬內史周官秦因之景帝二年分置左內史武帝更名左馮翊要與腰同終與相竟師古曰謂終丞相之身無貶黜也余謂言與千秋共事終其身合和朝廷皆此類也始元三年冬遼東烏桓反初冒頓破東胡東胡餘衆散保烏桓及鮮卑山為二族遼東郡屬幽州唐嘗置安東都護府於其地東胡破見十一卷高祖六年後漢書烏桓之地在丁零西南烏孫東北武帝遣霍去病擊破匈奴左地因徙烏桓於上谷漁陽右北平遼東遼西五郡塞外為漢偵察匈奴動靜其大人歲一朝見於是始置護烏桓校尉秩比二千石鮮卑先遠竄於遼東塞外與烏桓相接未嘗通中國至後漢稍徙遼西塞外始為中國患武帝擊破匈奴左地因徙烏桓於上谷漁陽右北平遼東塞外上谷漁陽北平皆屬幽州上谷唐媯州漁陽唐檀薊州北平唐平州之地為于偽翻偵丑鄭翻又丑貞翻候也置護烏桓校尉監領之監古銜翻使不得與匈奴交通至是部衆漸強遂反先是匈奴三千餘騎入五原五原郡屬幷州先悉薦翻後數萬騎南旁塞獵旁步浪翻行攻塞外亭障略取吏民去是時漢邊郡烽火候望精明匈奴為邊寇者少利希復犯塞少詩照翻復扶又翻下同漢復得匈奴降者言烏桓嘗發先單于冢匈奴怨之方發二萬騎擊烏桓霍光欲發兵邀擊之師古曰邀迎而擊之護軍都尉秦官武帝以屬大司馬此時蓋屬大將軍也烏桓間數犯塞師古曰間即中間也猶言比日也數所角翻於漢便又匈奴希寇盜北邊幸無事蠻夷自相攻擊而發兵要之要與邀同非計也光更問中郎將范明友明友言可擊於是拜明友為度遼將軍度遼將軍蓋使之度遼水以伐烏桓至後漢遂以為將軍之號以護匈奴匈奴聞漢兵至引去初光誡明友兵不空出即後匈奴遂擊烏桓師古曰後匈奴者言兵遲後邀匈奴不及後戶遘翻師古曰為匈奴所中傷中竹仲翻因乘烏桓敝擊之斬首六千餘級獲三王首匈奴由是恐不能復出兵四年始元四年春正月丁亥帝加元服如淳曰元服謂初冠加上服也師古曰如氏以為衣服之服非也元首也冠者首之所著故曰元服汲黯序傳云上正元服是知謂冠為元服余按續漢志有加元服之禮始元四年甲戌富民定侯田千秋薨諡法安民大慮曰定千秋居丞相位謹厚自守而已始元四年夏五月丁丑孝文廟正殿火人火曰火發中二千石將五校作治將作大匠屬官有左右前後中五校令掌五校士校戶教翻成太常及廟令丞郎吏皆劾大不敬劾戶概翻會赦太常轑陽侯德免為庶人班表轑陽侯食邑清河文穎曰轑陽在魏郡清淵轑音料又音聊始元四年六月赦天下始元四年初杅冞遣太子賴丹為質於龜茲龜茲國治延城去長安七千四百八十里杅音烏冞與彌同質音致下同龜音丘茲音慈賢曰今龜音丘勾翻茲音沮惟翻蓋急言之也事見二十一卷武帝太初元年宛於元翻霍光用桑弘羊前議以賴丹為校尉將軍田輪臺弘羊議田輪臺見二十二卷征和元年賴丹本臣屬吾國今佩漢印綬來迫吾國而田必為害王即殺賴丹而上書謝漢樓蘭王死匈奴先聞之遣其質子安歸歸得立為王考異曰西域傳作常歸今從昭紀及傅介子傳王辭不至樓蘭國最在東垂西域之東垂也當白龍堆孟康曰龍堆形如土龍身無頭有尾高大者三四丈埤者長丈餘皆東北向而相似也近其靳翻下同常主發導負水擔糧送迎漢使擔都甘翻又數為吏卒所寇懲艾不便與漢通師古曰艾讀曰乂數所角翻下同後復為匈奴反間間古莧翻數遮殺漢使其弟尉屠耆降漢具言狀駿馬監北地傅介子使大宛班表太僕屬官有駿馬監北地郡屬涼州刺史姓譜傅說出傅巖因以為氏介子至樓蘭龜茲責其王皆謝服介子從大宛還到龜茲會匈奴使從烏孫還在龜茲介子因率其吏士共誅斬匈奴使者還奏事詔拜介子為中郎遷平樂監平樂監監平樂觀樂音洛介子謂大將軍霍光曰樓蘭龜茲數反覆而不誅無所懲艾介子過龜茲時其王近就人易得也願往刺之以威示諸國易以豉翻刺七亦翻下同大將軍曰龜茲道遠且驗之於樓蘭於是白遣之介子與士卒俱齎金幣揚言以賜外國為名至樓蘭樓蘭王意不親介子介子陽引去至其西界使譯謂曰班表大鴻臚有譯官令典屬國有九譯令皆掌譯此譯則樓蘭國之譯人漢使者持黃金錦繡行賜諸國王不來受我去之西國矣即出金幣以示譯譯還報王王貪漢物來見使者介子與坐飲陳物示之飲酒皆醉介子謂王曰天子使我私報王師古曰謂密有所論隨介子入帳中屏語屏人而獨共語也屏必郢翻刺七亦翻刃交匈立死匈與胸同章甲十五行本臣作人乙十一行本同孔本同左右皆散走介子告諭以王負漢罪天子遣我誅王當更立王弟尉屠耆在漢者更工衡翻漢兵方至毋敢動自令滅國矣介子遂斬王安歸首馳傳詣闕縣首北闕下傳張戀翻縣古懸字通乃立尉屠耆為王更名其國為鄯善為刻印章賜以宮女為夫人備車騎輜重更工衡翻鄯上扇翻為刻于偽翻重直用翻丞相率百官送至橫門外祖而遣之三輔黃圖橫門長安城北出西頭第一門孟康曰橫音光祖祖道也身在漢久今歸單弱而前王有子在恐為所殺國中有伊循城其地肥美願漢遣一將屯田積穀令臣得依其威重於是漢遣司馬一人吏士四十人田伊循以填撫之填讀曰鎮秋七月乙巳封范明友為平陵侯賞破烏桓之功也班表平陵侯食邑於南陽之武當班表義陽侯食邑於南陽之平氏臣光曰王者之於戎狄叛則討之服則舍之舍讀曰捨今樓蘭王既服其罪又從而誅之後有叛者不可得而懷矣必以為有罪而討之則宜陳師鞠旅毛詩註曰鞠告也將戰之日陳其師旅誓告之也今乃遣使者誘以金幣而殺之後有奉使諸國者復可信乎復扶又翻且以大漢之強而為盜賊之謀於蠻夷不亦可羞哉論者或美介子以為奇功過矣五年始元五年夏大旱始元五年秋罷象郡分屬鬱林牂柯班志欝林故秦桂林郡始元五年冬十一月大雷始元五年十二月庚戌宜春敬侯王訢薨恩澤侯表宜春侯食邑於汝南訢音欣六年始元六年春正月募郡國徒築遼東玄菟城菟音塗始元六年夏赦天下始元六年烏桓復犯塞復扶又翻遣度遼將軍范明友擊之始元六年冬十一月乙丑以楊敞為丞相少府河內蔡義為御史大夫河內郡時屬司隸唐懷孟衞州地顧頡剛標點聶崇岐覆校
