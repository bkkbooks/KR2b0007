body:
  text: 資治通鑑卷第一百九十三端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註唐紀九太宗文武大聖大廣孝皇帝上之中貞觀二年貞觀二年戊子六二八貞觀二年九月丙午初令致仕官章十二行本官下有位字乙十一行本同孔本同張校同在本品之上按唐會要是時詔內外文武官年老致仕者參朝之班宜在本品見任之上觀古玩翻貞觀二年上曰比見㣥臣屢上表賀祥瑞比毗至翻上時掌翻夫家給人足而無瑞不害為堯舜百姓愁怨而多瑞不害為桀紂夫音扶後魏之世吏焚連理木煮白雉而食之豈足為至治乎治直吏翻丁未詔自今大瑞聽表聞按儀制令凡景星慶雲為大瑞其名物六十有四白狼赤兔為上瑞其名物三十有八蒼烏朱鴈為中瑞其名物三十有二嘉禾芝草木連理為下瑞其名物十四申所司而已唐六典禮部郎中凡祥瑞應見皆辯其物名合歡如腰鼓合音閤左右稱賀上曰我常笑隋煬帝好祥瑞好呼到翻瑞在得賢此何足賀命毀其巢縱鵲於野外貞觀二年天少雨少詩沼翻中書舍人李百藥上言上時掌翻往年雖出宮人竊聞太上皇宮及掖庭宮人無用者尚多豈惟虛費衣食且陰氣鬱積亦足致旱上曰婦人幽閉深宮誠為可愍灑掃之餘亦何所用灑所賣翻掃素報翻又並如字宜皆出之任求伉儷伉苦浪翻儷郎計翻於是遣尚書左丞戴冑給事中洹水杜正倫洹水縣周建德六年分臨漳東北界置屬魏州洹于元翻掖音亦前後所出三千餘人貞觀二年己未突厥寇邊厥九勿翻朝臣或請脩古長城古長城秦蒙恬所築者也自漢至隋沿邊所築城障非一處而長城之延袤未有如秦者也朝直遙翻上曰突厥災異相仍頡利不懼而脩德暴虐滋甚骨肉相攻亡在朝夕朕方為公掃清沙漠為于偽翻安用勞民遠脩障塞乎貞觀二年壬申以前司農卿竇靜為夏州都督夏戶雅翻靜在司農少卿趙元楷善聚斂少始照翻斂力贍翻下重斂同靜鄙之對官屬大言曰司農官屬有丞主簿上林太倉鉤盾導官四署令丞太倉永豐龍門等倉司竹慶善石門溫泉湯等監京都諸宮苑總監諸園苑監苑四面監九成宮監諸鹽池監諸屯監各有監副監丞苑總監又有主簿諸鹽池諸屯監無副監隋煬帝奢侈重斂司農非公不可今天子節儉愛民公何所用哉元楷大慚貞觀二年上問王珪曰近世為國者益不及前古何也對曰漢世尚儒術宰相多用經術士故風俗淳厚近世重文輕儒參以法律此治化之所以益衰也治直吏翻上然之貞觀二年冬十月御史大夫參預朝政安吉襄公杜淹薨朝直遙翻下同貞觀二年交州都督遂安公壽以貪得罪遂安公壽宗室也廉平公直徵入朝諭以交趾久不得人須卿鎮撫祖尚拜謝而出既而悔之辭以舊疾上遣杜如晦等諭旨曰匹夫猶敦然諾敦然諾猶重然諾也言既許人則必踐言祖尚固辭戊子上復引見諭之復扶又翻見賢遍翻祖尚固執不可上大怒曰我使人不行何以為政命斬於朝堂閣本太極宮圖東西朝堂在承天門左右承天門外朝也東朝堂之前有肺石西朝堂之前有登聞鼓他日與侍臣論齊文宣帝何如人魏徵對曰文宣狂暴然人與之爭事理屈則從之有前青州長史魏愷使於梁還除光州長史不肯行長知兩翻使疏吏翻下同楊遵彥奏之文宣怒召而責之愷曰臣先任大州章十二行本州下有長史二字乙十一行本同孔本同張校同使還有勞無過更得小州此臣所以不行也文宣顧謂遵彥曰其言有理卿赦之此其所長也楊愔字遵彥相齊文宣帝大見親任然曏者盧祖尚雖失人臣之義朕殺之亦為太暴由此言之不如文宣矣命復其官蔭復其官則得蔭其子若孫唐制凡用蔭一品子正七品上二品子正七品下三品子從七品上從三品子從七品下正四品子正八品上從四品子正八品下正五品子從八品上從五品及國公子從八品下三品以上蔭曾孫五品以上蔭孫孫降子一等曾孫降孫一等贈官降正官一等死事者與正官同郡縣公子視從五品孫縣男以上子降一等勳官二品子又降一等二王後孫視正三品徵狀貌不逾中人而有膽略善回人主意每犯顏苦諫或逢上怒甚徵神色不移上亦為霽威人主之威重於雷霆霽威言猶雨霽則雷霆亦收威為于偽翻上時掌翻還言於上曰人言陛下欲幸南山外皆嚴裝已畢而竟不行何也上笑曰初實有此心畏卿嗔故中輟耳嗔昌真翻上嘗得佳鷂自臂之望見徵來匿懷中徵奏事固久不已鷂竟死懷中貞觀二年十一月辛酉上祀圜丘武德元年制每歲冬至祀昊天上帝於圜丘以景皇帝配貞觀二年十二月壬午以黃門侍郎王珪為守侍中上嘗閒居閒讀曰閑與珪語有美人侍側上指示珪曰此廬江王瑗之姬也廬江王瑗反死見一百九十一卷武德九年瑗于眷翻珪避席曰陛下以廬江納之為是邪非邪邪音耶上曰殺人而取其妻卿何問是非對曰昔齊桓公知郭公之所以亡由善善而不能用然棄其所言之人管仲以為無異於郭公齊桓公過郭氏之墟問父老曰郭何故亡對曰善善惡惡公曰若子之言何至於亡對曰善善而不能用惡惡而不能去此其所以亡也臣以為聖心是之也上悅即出之還其親族考異曰實錄新舊書皆云帝雖不出此美人而甚重其言按太宗賢主既重珪言何得反棄而不用乎且是人汎侍左右又非嬖寵著名之人太宗何愛而留之今從貞觀政要上使太常少卿祖孝孫教宮人音樂不稱旨少始照翻稱尺證翻上責之溫彥博王珪諫曰孝孫雅士今乃使之教宮人又從而譴之臣竊以為不可上怒曰朕置卿等於腹心當竭忠直以事我乃附下罔上為孝孫遊說邪為于偽翻說輸芮翻彥博拜謝珪不拜曰陛下責臣以忠直今臣所言豈私曲邪邪音耶此乃陛下負臣非臣負陛下上默然而罷明日上謂房玄齡曰自古帝王納諫誠難朕昨責溫彥博王珪至今悔之考異曰魏文貞公故事太宗曰人皆以祖孝孫為知音令教聲曲多不諧韻此其未至精妙為不存意乎乃敕所司令舉其罪公進諫曰陛下生平不愛音聲今忽為教女樂責孝孫臣恐天下怪愕太宗曰汝等並是我心腹應須中正何乃附下罔上為孝孫辭溫彥博等拜謝公及王珪進曰陛下不以臣等不肖置之樞近今臣所言豈是為私不意陛下責臣至此常奉明旨勿以臨時嗔怒即便曲從成我大過臣等不敢失墜所以每觸龍鱗今以為責只是陛下負臣臣終不負陛下太宗怒未已懍然作色公又曰祖孝孫學問立身何如白明達陛下平生禮遇孝孫復何如白明達今過聽一言便謂孝孫可疑明達可信臣恐㣥臣衆庶有以窺陛下太宗怒乃解今從舊傳公等勿為此不盡言也為于偽翻下為朕同貞觀二年上曰為朕養民者唯在都督刺史朕常疏其名於屏風坐臥觀之得其在官善惡之跡皆注於名下以備黜陟縣令尤為親民不可不擇乃命內外五品已上各舉堪為縣令者以名聞貞觀二年上曰比有奴告其主反者比毗至翻此弊事夫謀反不能獨為必與人共之何患不發何必使奴告邪邪音耶自今有奴告主者皆勿受仍斬之貞觀二年西突厥統葉護可汗為其伯父所殺伯父自立是為莫賀咄侯屈利俟毗可汗厥九勿翻可從刊入聲汗音寒咄當沒翻俟渠之翻國人不服弩矢畢部推泥孰莫賀設為可汗西突厥有五弩矢畢部泥孰亦一啜之部帥統葉護之子咥力特勒咥徒結翻又丑栗翻避莫賀咄之禍亡在康居泥孰迎而立之是為乙毗鉢羅肆葉護可汗與莫賀咄相攻連兵不息俱遣使來請婚使疏吏翻上不許曰汝國方亂君臣未定何得言婚且諭以各守部分勿復相攻分扶問翻復扶又翻於是西域諸國及敕勒先役屬西突厥者皆叛之史言天方福華東西突厥皆亂厥九勿翻貞觀二年突厥北邊諸姓多叛頡利可汗歸薛延陀共推其俟斤夷男為可汗頡奚結翻俟渠之翻夷男不敢當上方圖頡利遣遊擊將軍喬師望間道齎冊書拜夷男為真珠毗伽可汗間古莧翻伽求迦翻賜以鼓纛纛徒到翻夷男大喜遣使入貢使疏吏翻建牙於大漠之鬱督軍山下東至靺鞨西至西突厥南接沙磧靺音末鞨音曷磧七迹翻北至俱倫水廻紇拔野古阿跌同羅僕骨霫諸部皆屬焉史言突厥衰而薛延陀強於漠北霫而立翻三年三年春正月戊午上祀太廟癸亥耕藉於東郊初議藉田方面所在給事中孔穎達曰禮天子藉田於南郊諸侯於東郊晉武帝猶於東南今於城東不合古禮帝曰禮緣人情亦何常之有且虞書云平秩東作則是堯舜敬授人時已在東矣又乘青輅載黛耜者所以順於春氣故知合於東方且朕見居少陽之地田於東郊蓋其宜也於是遂定按帝自謂居少陽之地蓋以即位以來居東宮也藉秦昔翻三年沙門法雅坐妖言誅妖一遙翻司空裴寂嘗聞其言辛未寂坐免官遣還鄉里寂請留京師上數之曰數所具翻又所主翻計公勳庸安得至此直以恩澤為㣥臣第一武德之際貨賂公行紀綱紊亂皆公之由也上皇聞帝此言其心為如何紊音問但以故舊不忍盡法得歸守墳墓幸已多矣寂遂歸蒲州裴寂本蒲州桑泉人又坐狂人信行言寂有天命寂不以聞當死流靜州武德四年以始安郡之龍平豪靜蒼梧郡之蒼梧置靜州靜平郡幾居豈翻以為山羌則當是劍南之靜州然劍南之靜州武后時方置若以為嶺南之靜州則羌當作蠻上曰寂當死我生之必不然也俄聞寂率家僮破賊上思其佐命之功徵入朝會卒帥讀曰率朝直遙翻下同卒子恤翻三年二月戊寅以房玄齡為左僕射杜如晦為右僕射以尚書右丞魏徵守祕書監參預朝政三年三月己酉上錄繫囚有劉恭者頸有勝文自云當勝天下坐是繫獄上曰若天將興之非朕所能除若無天命勝文何為乃釋之三年丁巳上謂房玄齡杜如晦曰公為僕射當廣求賢人隨才授任此宰相之職也唐六典左右僕射左右丞相之職也掌總領六官紀綱百揆比毗至翻下比見比來同日不暇給安能助朕求賢乎因敕尚書細務屬左右丞屬之欲翻付也唯大事應奏者乃關僕射玄齡明達政事輔以文學夙夜盡心惟恐一物失所用法寬平聞人有善若己有之不以求備取人不以己長格物與杜如晦引拔士類常如不及至於臺閣規模皆二人所定上每與玄齡謀事必曰非如晦不能決及如晦至卒用玄齡之策蓋元齡善謀如晦能斷故也卒子恤翻斷丁亂翻二人深相得同心徇國故唐世稱賢相推房杜焉玄齡雖蒙寵待或以事被譴輒累日詣朝堂稽顙請罪恐懼若無所容史言房玄齡忠謹被皮義翻朝直遙翻稽音啟玄齡監修國史上語之曰唐以宰相監修國史至今因之監工銜翻語牛倨翻比見漢書載子虛上林賦浮華無用其上書論事詞理切直者朕從與不從皆當載之太宗之存心如此安有有獻而不納者乎上時掌翻三年夏四月乙亥上皇徙居弘義宮更名大安宮唐會要武德五年營弘義宮以帝有克寸定天下之功別建此宮以居之既禪位高祖以弘義宮有山林勝景雅好之遂徙居焉改名大安宮馬周所謂大安宮在城之西者也更工衡翻章十二行本上上有甲午二字乙十一行本同張校同云無註本亦無始御太極殿高祖之傳位也帝即位於東宮之顯德殿高祖徙居大安宮帝始御太極殿中書門下機要之司詔敕有不便者皆應論執比來唯睹順從不聞違異若但行文書則誰不可為何必擇才也房玄齡等皆頓首謝故事凡軍國大事則中書舍人各執所見雜署其名謂之五花判事中書侍郎中書令省審之給事中黃門侍郎駮正之上始申明舊制由是鮮有敗事省悉景翻駮北角翻鮮息善翻三年茌平人馬周茌平縣漢屬東郡應劭曰在茌山之平地者也後魏屬東平原郡後齊廢隋開皇初復置屬貝州唐屬博州賢曰漢茌平故城在博州之聊城縣東北茌仕疑翻舍於中郎將常何之家唐諸衞中郎將正四品下將即亮翻壬午以旱詔文武官極言得失何武人不學不知所言周代之陳便宜二十餘條考異曰舊傳云貞觀五年據實錄詔在此年五年不見有詔令百官上封事今從唐曆附此以問何對曰此非臣所能家客馬周為臣具草耳為于偽翻上即召之未至遣使督促者數輩及謁見與語甚悅令直門下省尋除監察御史奉使稱旨鄭樵曰秦以御史監郡謂之監御史漢罷其名晉孝武太元中始置檢校御史掌行馬外事隋改檢校御史為監察御史使疏吏翻見賢遍翻監工銜翻使疏吏翻下同稱尺證翻賜絹三百匹三年秋八月己巳朔日有食之三年丙子薛延陀毗伽可汗伽求迦翻可從刊入聲汗音寒遣其弟統特勒入貢上賜以寶刀及寶鞭謂曰卿所部有大罪者斬之小罪者鞭之夷男甚喜突厥頡利可汗大懼始遣使稱臣請尚公主脩壻禮代州都督張公謹上言突厥可取之狀以為頡利縱欲逞暴誅忠良暱姦佞一也頡奚結翻上時掌翻暱尼質翻薛延陀等諸部皆叛二也薛延陀諸部叛突厥事始上卷二年無所自容三也突利得罪見上卷二年拓設即阿史那社爾與欲谷設分統敕勒諸部欲谷設即為回紇所破者也按舊書李大亮傳頡利既亡之後拓設諸種散在伊吾糇糧乏絕四也糇音侯頡利疏其族類親委諸胡胡人反覆大軍一臨必生內變五也華人入北其衆甚多華人因隋末之亂避而入北保據山險大軍出塞自然響應六也比毗至翻上以頡利可汗既請和親復援梁師都事見上卷上年復扶又翻丁亥命兵部尚書李靖為行軍總管討之以張公謹為副九月丙午突厥俟斤九人帥三千騎來降戊午拔野古僕骨同羅奚酋長並帥衆來降厥九勿翻俟渠之翻帥讀曰率騎奇寄翻降戶江翻酋慈由翻長知兩翻三年冬十一月辛丑突厥寇河西肅州刺史公孫武達武德二年分甘州之福祿瓜州之玉門置肅州酒泉郡破之甘肅二州相去四百二十里三年上遣使至涼州都督李大亮有佳鷹使者諷大亮使獻之大亮密表曰陛下久絕畋遊而使者求鷹使疏吏翻下同若陛下之意深乖昔旨昔旨謂絕畋遊之旨亶乃是使非其人癸卯上謂侍臣曰李大亮可謂忠直手詔褒美賜以胡缾及荀悅漢紀按舊書李大亮傳帝詔曰今賜卿胡缾一枚雖無千鎰之重乃朕自用之物荀悅漢紀敍致既明論議深博極為治之體盡君臣之義今以賜卿宜加尋閱三年庚申以行幷州都督李世勣為通漢道行軍總管舊書李勣傳作通漠道當從之後高宗朝裴行儉遣兵由通漠道掩取阿史那伏念輜重華州刺史柴紹為金河道行軍總管華戶化翻靈州大都督薛萬徹為暢武道行軍總管暢武非地名也營州邊於東胡故命萬徹為總管使之宣暢威武以美名寵之耳新書帝紀作營州都督薛萬淑皆受李勣章十二行本勣作靖乙十一行本同節度分道出擊突厥乙丑任城王道宗擊突厥於靈州破之任音壬十二月戊辰突利可汗入朝朝直遙翻上謂侍臣曰往者太上皇以百姓之故稱臣於突厥事見一百八十四卷隋恭帝義寧元年六月一本此下有考異今單于稽顙庶幾可雪前恥稽音啟幾居希翻壬午靺鞨遣使入貢靺音末鞨音曷使疏吏翻上曰靺鞨遠來蓋突厥已服之故也昔人謂禦戎無上策嚴尤諫王莽曰匈奴為害所從來久周秦漢征之皆未有得上策者也周得中策漢得下策秦無策焉而四夷自服豈非上策乎三年癸未右僕射杜如晦以疾遜位上許之三年乙酉上問給事中孔穎達曰論語以能問於不能以多問於寡有若無實若虛曾子之言穎達具釋其義以對且曰非獨匹夫如是帝王亦然帝王內蘊神明外當玄默故易稱以蒙養正以明夷蒞衆易曰蒙以養正聖功也明夷君子以莅衆用晦而明炫耀聰明炫熒絹翻以才陵人飾非拒諫則下情不通取亡之道也上深善其言三年庚寅突厥郁射設帥所部來降厥九勿翻降戶江翻三年閏月丁未東謝酋長謝元深南謝酋長謝強來朝諸謝皆南蠻別種在黔州之西東謝蠻在西爨之南居黔州之西三百里南謝蠻在隋牂柯郡地南百里有桂嶺關酋慈由翻長知兩翻朝直遙翻下同種章勇翻黔音琴隸黔州都督宋白曰黔州黔中郡秦置漢通謂五溪之地又為武陵郡之酉陽縣地武帝於此置涪陵縣蜀先主立黔安郡後周建德三年置黔州貞觀四年移州治於涪陵江東彭水之東是時遠方諸國來朝貢者甚衆服裝詭異中書侍郎顏師古請圖寫以示後作王會圖從之考異曰實錄新舊傳皆云正會圖按汲冢周書有王會篇柳宗元鐃鼓歌呂述黠戞斯朝貢圖皆作王會今從之乙丑牂柯酋長謝能羽嚴能改龍及充州蠻入貢牂音臧柯音哥詔以牂柯為牂州昆明東九百里即牂柯蠻國其王號鬼主其別帥曰羅殿王東距辰州二千四百里其南一千五百里即交州也牂州之北一百五十里有別部曰充州蠻牂柯音臧哥以其地為軌州各以其酋長為刺史党項地亙三千里姓別為部不相統壹細封氏費聽氏往利氏頗超氏野辭氏旁章十二行本旁作房乙十一行本同張校同退齋校同當氏米擒氏拓跋氏皆大姓也步賴既為唐所禮餘部相繼來降以其地為崌奉巖遠四州党項漢西羌別種魏晉後微甚周滅宕昌鄧至而党項始強其地古析支也東距松州西葉護南春桑迷桑等羌北吐谷渾山谷崎嶇大抵三千里拓跋氏之後為西夏李繼遷党底朗翻酋慈由翻長知兩翻降戶江翻三年是歲戶部奏中國人自塞外歸及四夷前後降附者男女一百二十餘萬口三年房玄齡王珪掌內外官考唐考法凡百司之長歲校其屬功過差以九等流內之官敍以四善一曰德義有聞二曰清慎明著三曰公平可稱四曰恪勤匪懈善狀之外有二十七最一曰獻可替否拾遺補闕為近侍之最二曰銓衡人物擢盡才良為選司之最三曰揚清激濁褒貶必當為考校之最四曰禮制儀式動合經典為禮官之最五曰音律克諧不失節奏為樂官之最六曰決斷不滯與奪合理為判事之最七曰部統有方警守無失為宿衞之最八曰兵士調習戎裝充備為督領之最九曰推鞫得情處斷平允為法官之最十曰讎校精審明於刊定為校正之最十一曰承旨敷奏吐納明敏為宣納之最十二曰訓導有方生徒充業為學官之最十三曰賞罰嚴明攻戰必勝為軍將之最十四曰禮義興行肅清所部為政教之最十五曰詳錄典正詞理兼舉為文史之最十六曰訪察精審彈舉必當為糾正之最十七曰明於勘覆稽失無隱為司檢之最十八曰職事修理供承強濟為監察之最十九曰功課皆充丁匠無怨為役使之最二十曰耕耨以時收穫成課為屯官之最二十一曰謹於蓋藏明於出納為倉庫之最二十二曰推步盈虛究理精密為曆官之最二十三曰占候醫卜效驗多著為方術之最二十四曰檢察有方行旅無壅為關津之最二十五曰市廛弗擾姦濫不行為市司之最二十六曰牧養肥殖蕃息滋多為牧官之最二十七曰邊境清肅城隍修理為鎮防之最一最四善為上上一最三善為上中一最二善為上下無最而有二善為中上無最而有一善為中中職事粗理善最不聞為中下愛憎任情處斷乖理為下上背公向私職事廢闕為下中居官諂詐貪濁有狀為下下凡定考皆集於尚書省唱第然後奏治直之翻上命侯君集推之魏徵諫曰玄齡珪皆朝廷舊臣素以忠直為陛下所委所考既多其間能無一二人不當當丁浪翻察其情終非阿私若推得其事則皆不可信豈得復當重任且萬紀比來恆在考堂曾無駮正復扶又翻比毗至翻恆戶登翻及身不得考乃始陳論此正欲激陛下之怒非竭誠徇國也使推之得實未足裨益朝廷若其本虛徒失陛下委任大臣之意臣所愛者治體治直吏翻非敢苟私二臣上乃釋不問三年濮州刺史龐相壽坐貪汚解任濮博木翻龐薄江翻自陳嘗在秦王幕府上憐之欲聽還舊任魏徵諫曰秦王左右中外甚多恐人人皆恃恩私足使為善者懼上欣然納之謂相壽曰我昔為秦王乃一府之主今居大位乃四海之主不得獨私故人大臣所執如是朕何敢違賜帛遣之相壽流涕而去四年四年春正月李靖帥驍騎三千自馬邑進屯惡陽嶺惡陽嶺在定襄古城南善陽嶺在白道川南帥讀曰率驍堅堯翻騎奇寄翻襲定襄破之舊志朔州馬邑郡治善陽縣漢定襄縣地有秦時馬邑城武周塞後魏置桑乾郡隋置善陽縣又隋志雲州定襄郡治大利城即文帝所築以處突厥啟民可汗者也李靖所襲破者當是此城唐謂之北定襄城又舊志曰雲州隋馬邑郡之雲內縣恆安鎮也貞觀十四年自朔州北定襄城移雲州及定襄縣置於此即後魏所都平城也開元二十年改定襄為雲中縣而武德四年已分忻州之秀容為定襄縣今見於九域志者忻州之定襄而北定襄自石晉割地入于北國其名晦矣宋祁曰古定襄城其地南大河北白道畜牧廣衍龍荒之最壤宋白曰朔州北三百餘里定襄故城後魏初之雲中也厥九勿翻頡奚結翻可從刊入聲汗音寒大驚曰唐不傾國而來靖何敢孤軍至此其衆一日數驚乃徙牙於磧口大磧之口也磧七迹翻復扶又翻諜達協翻頡利所親康蘇密以隋蕭后及煬帝之孫政道來降蕭后入突厥見一百八十八卷高祖武德二年降戶江翻下同乙亥至京師先是有降胡言中國人或潛通書啟於蕭后者先悉薦翻至是中書舍人楊文瓘請鞫之上曰天下未定突厥方強愚民無知或有斯事今天下已安既往之罪何須問也李世勣出雲中與突厥戰於白道大破之漢地理志雲中郡治雲中縣酈道元曰雲中城東八十里有成樂城今雲中郡治一名石盧城又有後魏雲中宮在雲中故城東四十里虞氏記云趙武侯自五原河曲築長城東至陰山又於河西造一大城其一箱崩不就乃改卜陰山河曲而禱焉晝見㣥鵠遊於雲中徘徊經日見火光在其下武侯曰此為我乎乃即其處築城今雲中故城是也又有芒于水出塞外南逕陰山東西千餘里芒于水又西南逕白道南谷口有城在右策帶長城背山面澤謂之白道自北出有高阪謂之白道嶺芒于水又南西逕雲中城北新志雲州雲中縣有陰山道青坡道皆出兵路宋白曰漢雲中郡在唐勝州東北四十里榆林縣界雲中故城是也趙武侯所築漢五原故城亦在今勝州榆林縣界四年二月己亥上幸驪山溫湯驪力知翻四年甲辰李靖破突厥頡利可汗於陰山厥九勿翻頡奚結翻可從刊入聲汗音寒先是頡利既敗竄于鐵山鐵山蓋在陰山北先悉薦翻遣執失思力入見謝罪請舉國內附身自入朝見賢遍翻朝直遙翻上遣鴻臚卿唐儉等慰撫之又詔李靖將兵迎頡利臚陵如翻將即亮翻頡利外為卑辭內實猶豫欲俟草青馬肥亡入漠北靖引兵與李世勣會白道相與謀曰考異曰舊書靖傳以為謀出於靖勣傳以為謀出於勣蓋二人相與謀耳頡利雖敗其衆猶盛若走度磧北保依九姓新書回鶻傳有九姓曰藥羅葛曰胡咄葛曰啒羅勿曰貊歌息訖曰阿勿嘀曰葛薩曰斛嗢素曰藥勿葛曰奚邪勿此回紇後來強盛所服九姓是時所謂九姓即謂拔野古延陀回紇之屬追之難及今詔使至彼使疏吏翻虜必自寬若選精騎一萬齎二十日糧往襲之不戰可擒矣騎奇寄翻以其謀告張公謹公謹曰詔書已許其降降戶江翻使者在彼柰何擊之靖曰此韓信所以破齊也謂漢遣酈食其說下齊韓信乘其無備襲破之使疏吏翻遂勒兵夜發世勣繼之軍至陰山遇突厥千餘帳俘以隨軍頡利見使者大喜意自安靖使武邑蘇定方帥二百騎為前鋒武邑縣前漢屬信都後漢屬安平晉屬武邑郡後齊廢隋開皇六年復置屬冀州帥讀曰率下同去牙帳七里虜乃覺之頡利乘千里馬先走靖軍至虜衆遂潰考異曰舊書靖傳曰靖軍逼其牙帳十五里虜始覺定方傳曰靖使定方為前鋒乘霧而行去賊一里許忽然霧歇望見其牙帳掩擊殺數十百人頡利畏威先走今從唐曆靖斬首萬餘級俘男女十餘萬獲雜畜數十萬畜許救翻殺隋義成公主擒其子疊羅施頡利帥萬餘人欲度磧李世勣軍於磧口頡利至不得度其大酋長皆帥衆降頡奚結翻帥讀曰率磧七迹翻世勣虜五萬餘口而還還從宣翻又如字斥地自陰山北至大漠此後方盡有隋恆安定襄之地四年丙午上還宮四年甲寅以克突厥赦天下厥九勿翻四年以御史大夫溫彥博為中書令守侍中王珪為侍中守戶部尚書戴冑為戶部尚書參預朝政太常少卿蕭瑀為御史大夫與宰臣參議朝政朝直遙翻少始照翻瑀音禹四年三月戊辰以突厥夾畢特勒阿史那思摩為右武候大將軍四夷君長詣闕請上為天可汗長知兩翻下同可從刊入聲汗音寒上曰我為大唐天子又下行可汗事乎㣥臣及四夷皆稱萬歲是後以璽書賜西北君長皆稱天可汗璽斯氏翻庚午突厥思結俟斤帥衆四萬來降俟渠之翻丙子以突利可汗為右衞大將軍北平郡王初始畢可汗以啟民母弟蘇尼失為沙鉢羅設督部落五萬家牙直靈州西北及頡利政亂蘇尼失所部獨不攜貳尼女夷翻突利之來奔也見去年十二月及頡利敗走往依之將奔吐谷渾吐從暾入聲谷音浴新志曰黃河東壖有古大同城今大同城永濟柵也北逕大泊十七里至金河任音壬頡利以數騎夜走匿于荒谷頡奚結翻騎奇寄翻蘇尼失懼馳追獲之庚辰行軍副總管張寶相帥衆奄至沙鉢羅營俘頡利送京師蘇尼失舉衆來降帥讀曰率考異曰太宗實錄云蘇尼失舉衆歸國因以頡利屬于軍吏舊傳云蘇尼失令子忠禽頡利以獻蓋寶相逼之而蘇尼失使忠獻之也漠南之地遂空四年蔡成公杜如晦疾篤杜如晦先封蔡國公薨後徙封萊國公賀琛諡法佐相克終曰成民和臣福曰成又自臨視之甲申薨上每得佳物輒思如晦遣使賜其家使疏吏翻久之語及如晦必流涕謂房玄齡曰公與如晦同佐朕今獨見公不見如晦矣四年突厥頡利可汗至長安厥九勿翻夏四月戊戌上御順天樓舊書帝紀曰御順天門唐六典皇城南門中曰承天門隋開皇二年作初曰廣陽門仁壽元年改曰昭陽門武德元年改曰順天門神龍元年改曰承天門若元正冬至大陳設燕會赦過宥罪除舊布新受萬國之朝貢四夷之賓客則御承天門以聽政蓋古之外朝也順天樓即順天門樓引見頡利數之曰汝藉父兄之業縱淫虐以取亡罪一也數與我盟而背之二也恃強好戰暴骨如莽三也蹂我稼穡掠我子女四也我宥汝罪存汝社稷而遷延不來五也然自便橋以來不復大入為寇便橋事見一百九十一卷高祖武德九年見賢遍翻數所具翻又所主翻數與所角翻背蒲妹翻好呼報翻暴步卜翻復扶又翻下復何同蹂人九翻頡利哭謝而退詔館於太僕厚廩食之館古換翻食讀曰飤上皇聞擒頡利歎曰漢高祖困白登不能報今我子能滅突厥吾託付得人復何憂哉復扶又翻上皇召上與貴臣十餘人及諸王主置酒凌煙閣閣本太極宮圖兩儀殿之北為延嘉殿延嘉殿之東為功臣閤功臣閤之東為凌煙閣上皇自彈琵琶上起舞公卿迭起為壽逮夜而罷突厥既亡厥九勿翻其部落或北附薛延陀或西奔西域其降唐者尚十萬口詔㣥臣議區處之宜降戶江翻下同處昌呂翻朝士多言北狄自古為中國患今幸而破亡宜悉徙之河南兗豫之間此兗豫言禹迹九州大界也朝直遙翻種章勇翻下種類同散居州縣教之耕織可以化胡虜為農民永空塞北之地中書侍郎顏師古以為突厥鐵勒皆上古所不能臣陛下既得而臣之請皆置之河北河北謂北河之北領其部落則永永無患矣酋慈由翻長知兩翻下同禮部侍郎李百藥以為突厥雖云一國然其種類區分各有酋帥帥所類翻今宜因其離散各即本部署為君長長知兩翻不相臣屬縱欲存立阿史那氏唯可使存其本族而已國分則弱而易制勢敵則難相吞滅各自保全必不能抗衡中國仍請於定襄置都護府為其節度此安邊之長策也酋慈秋翻長知兩翻易以豉翻下未易易為同夏州都督竇靜夏戶雅翻以為戎狄之性有如禽獸不可以刑法威不可以仁義教況彼首丘之情未易忘也首式又翻記曰狐死正丘首置之中國有損無益恐一旦變生犯我王略莫若因其破亡之餘施以望外之恩假之王侯之號妻以宗室之女妻七細翻分其土地析其部落使其權弱勢分易為羈制可使常為藩臣永保邊塞易以豉翻溫彥博以為徙於兗豫之間則乖違物性非所以存養之也請準漢建武故事置降匈奴於塞下全其部落順其土俗以實空虛之地使為中國扞蔽策之善者也魏徵以為突厥世為寇盜百姓之讎也厥九勿翻今幸而破亡陛下以其降附不忍盡殺宜縱之使還故土不可留之中國夫戎狄人面獸心弱則請服強則叛亂固其常性降戶江翻今降者衆近十萬數年之後蕃息倍多近其靳翻蕃扶元翻必為腹心之疾不可悔也晉初諸胡與民雜居中國郭欽江統皆勸武帝驅出塞外以絕亂階郭欽論見八十一卷晉武帝太康元年江統論見八十三卷惠帝永熙九年後二十餘年伊洛之間遂為氈裘之域此前事之明鑑也彥博曰王者之於萬物天覆地載靡有所遺覆敷救翻今突厥窮來歸我柰何棄之而不受乎孔子曰有教無類若救其死亡授以生業教之禮義數年之後悉為吾民選其酋長使入宿衞酋慈由翻長知兩翻畏威懷德何後患之有上卒用彥博策處突厥降衆卒子恤翻處昌呂翻東自幽州西至靈州分突利故所統之地置順祐化長四州都督府又分頡利之地為六州左置定襄都督府右置雲中都督府以統其衆定襄都督府僑治寧朔雲中都督府僑治朔方之境按寧朔縣亦屬朔方郡舊書溫彥博傳曰帝從彥博議處降人於朔方之地則二都督府僑治朔方明矣五月辛未以突利為順州都督使帥部落之官順州僑治營州南之五柳戍帥讀曰率爾祖啟民挺身奔隋隋立以為大可汗奄有北荒事見一百七十八卷隋文帝開皇十九年可從刊入聲汗音寒事見一百八十二卷煬帝大業十一年故使爾今日亂亡如此我所以不立爾為可汗者懲啟民前事故也今命爾為都督爾宜善守中國法勿相侵掠非徒欲中國久安亦使爾宗族永全也壬申以阿史那蘇尼失為懷德郡王阿史那思摩為懷化郡王頡利之亡也頡奚結翻諸部落酋長皆棄頡利來降酋慈由翻長知兩翻降戶江翻獨思摩隨之竟與頡利俱擒上嘉其忠拜右武候大將軍尋以為北開州都督使統頡利舊衆考異曰舊傳云為化州都督按化州乃突利故地安得云統頡利部落也丁丑以右武衞大將軍史大奈為豐州都督隋以五原郡置豐州大業初廢唐初張長遜降復置豐州尋廢是年復以突厥降戶置豐州九原郡皆拜將軍中郎將布列朝廷將即亮翻朝直遙翻五品已上百餘人殆與朝士相半因而入居長安者近萬家近其靳翻四年辛巳詔自今訟者有經尚書省判不服聽於東宮上啟委太子裁決上時掌翻若仍不伏然後聞奏四年丁亥御史大夫蕭瑀劾奏李靖破頡利牙帳御軍無法突厥珍物虜掠俱盡請付法司推科瑀音禹劾戶概翻又戶得翻下同頡奚結翻厥九勿翻考異曰舊傳御史大夫溫彥博害其功譖靖軍無綱紀致令虜中奇寶散於亂兵之手據實錄彥博二月已為中書令三月始禽頡利今從實錄上特敕勿劾及靖入見見賢遍翻上大加責讓靖頓首謝久之上乃曰隋史萬歲破達頭可汗有功不賞以罪致戮可從刊入聲汗音寒事見一百七十九卷隋文帝開皇二十年錄公之功赦公之罪加靖左光祿大夫賜絹千匹加真食邑通前五百戶未幾上謂靖曰前有人讒公今朕意已寤公勿以為懷復賜絹二千匹幾居豈翻復扶又翻四年林邑獻火珠唐書婆利東有羅剎國其人極陋朱髮黑身獸牙鷹爪與林邑人作市以夜而來自掩其面其國出火珠狀如水精日午時以珠承日影以艾承之則火出請討之上曰好戰者亡好呼到翻隋煬帝頡利可汗皆耳目所親見也小國勝之不武況未可必乎語言之間何足介意四年六月丁酉以阿史那蘇尼失為北寧州都督以中郎將史善應為北撫州都督尼女夷翻將即亮翻壬寅以右驍衞將軍康蘇為北安州都督此三州與祐化長北開四州後皆省史善應亦阿史那種史單書其姓耳驍堅堯翻四年乙卯發卒脩洛陽宮以備巡幸給事中張玄素上書諫上時掌翻以為洛陽未有巡幸之期而預脩宮室非今日之急務昔漢高祖納婁敬之說自洛陽遷長安事見十一卷漢高帝五年邪音耶景帝用晁錯之言而七國搆禍事見十六卷漢景帝三年晁直遙翻錯七故翻處昌呂翻厥九勿翻突厥之親何如七國豈得不先為憂而宮室可遽興乘輿可輕動哉乘繩證翻臣見隋氏初營宮室近山無大木皆致之遠方二千人曳一柱以木為輪則戛摩火出乃鑄鐵為轂行一二里鐵轂輒破別使數百人齎鐵轂隨而易之轂古祿翻盡日不過行二三十里計一柱之費已用數十萬功則其餘可知矣陛下初平洛陽凡隋氏宮室之宏侈者皆令毀之見一百八十九卷高祖武德四年令力丁翻復加營繕何前日惡之而今日效之也復扶又翻惡烏路翻且以今日財力何如隋世陛下役瘡痍之人襲亡隋之弊恐又甚於煬帝矣上謂玄素曰卿謂我不如煬帝何如桀紂對曰若此役不息亦同歸于亂耳上歎曰吾思之不熟乃至於是顧謂房玄齡曰朕以洛陽土中朝貢道均意欲便民故使營之今玄素所言誠有理宜即為之罷役為于偽翻後日或以事至洛陽雖露居亦無傷也仍賜玄素綵二百匹四年秋七月甲子朔日有食之四年乙丑上問房玄齡蕭瑀曰隋文帝何如主也對曰文帝勤於為治每臨朝或至日昃五品已上引坐論事衞士傳餐而食侍衞未得下牙不皇坐食故立駐傳餐而食也治直吏翻下同朝直遙翻餐千安翻亦勵精之主也上曰公得其一未知其二文帝不明而喜察不明則照有不通喜察則多疑於物事皆自決不任㣥臣天下至廣一日萬機雖復勞神苦形豈能一一中理㣥臣既知主意唯取決受成雖有愆違莫敢諫爭此所以二世而亡也喜許記翻復扶又翻中竹仲翻爭讀曰諍朕則不然擇天下賢才寘之百官使思天下之事關由宰相審熟便安然後奏聞有功則賞有罪則刑誰敢不竭心力以脩職業何憂天下之不治乎因敕百司自今詔敕行下有未便者皆應執奏毋得阿從不盡己意四年癸酉以前太子少保李綱為太子少師以兼御史大夫蕭瑀為太子少傅唐東宮三少並正二品掌教諭太子少始照翻瑀音禹李綱有足疾上賜以步輿步輿即步挽輿也數引入禁中問以政事數所角翻每至東宮太子親拜之太子每視事上令綱與房玄齡侍章十二行本侍上有王珪二字乙十一行本同張校同坐坐徂臥翻先是章十二行本是下有上命二字乙十一行本同蕭瑀與宰相參議朝政先悉薦翻朝直遙翻瑀氣剛而辭辯房玄齡等皆不能抗上多不用其言考異曰舊傳云玄齡等心知其是不用其言按玄齡若用心如此安得為賢相且事之用捨在太宗非由玄齡今不取瑀劾奏之劾戶概翻又戶得翻上竟不問瑀由此怏怏自失瑀音禹怏於兩翻遂罷御史大夫為太子少傅不復預聞朝政復扶又翻朝直遙翻四年西突厥種落散在伊吾伊吾即漢伊吾盧之地在大磧外東至陽關二千七百三十里是年置伊吾縣及伊州伊吾郡於其地厥九勿翻種章勇翻於磧口貯糧此磧即伊吾東之磧使疏吏翻磧七迹翻貯丁呂翻使者招慰相望於道賑津忍翻使疏吏翻大亮上言上時掌翻欲懷遠者必先安近中國如本根四夷如枝葉疲中國以奉四夷猶拔本根以益枝葉也臣遠考秦漢近觀隋室外事戎狄皆致疲弊今招致西突厥但見勞費未見其益況河西州縣蕭條甘涼瓜沙肅等州皆河西也始得耕穫今又供億此役民將不堪不若且罷招慰為便伊吾之地率皆沙磧其人或自立君長求稱臣內屬者羈縻受之使居塞外為中國藩蔽此乃施虛惠而收實利也上從之四年八月丙午詔以常服未有差等自今三品以上服紫四品五品服緋六品七品服綠八品服青婦人從其夫色自四品以下緋綠青有深淺之異九品則服淺青四年甲寅詔以兵部尚書李靖為右僕射靖性沈厚沈持林翻每與時宰參議恂恂如不能言四年突厥既亡營州都督薛萬淑遣契丹酋長貪沒折說諭東北諸夷奚霫室韋等十餘部皆內附說輸芮翻下同霫先立翻萬淑萬均之兄也四年戊午突厥欲谷設來降厥九勿翻降戶江翻欲谷設突利之弟也頡利敗欲谷設奔高昌聞突利為唐所禮遂來降四年九月戊辰伊吾城主入朝朝直遙翻隋末伊吾內屬置伊吾郡隋亂臣於突厥頡利既滅舉其屬七城來降頡奚結翻降戶江翻因以其地置西伊州西伊州六年改曰伊州四年思結部落飢貧朔州刺史新豐張儉招集之其不來者仍居磧北磧七迹翻儉亦不禁及儉徙勝州都督州司奏思結將叛詔儉往察之儉單騎入其部落說諭徙之代州即以儉檢校代州都督思結卒無叛者騎奇寄翻說式芮翻卒子恤翻儉因勸之營田歲大稔儉恐虜蓄積多有異志奏請和糴以充邊儲部落喜營田轉力而邊備實焉四年丙子開南蠻地置費州夷州二州皆漢牂柯郡之地武德四年以思州寧夷縣置夷州貞觀元年廢是年復以思州之都上縣開南蠻置夷州義泉郡隋之明陽郡地也費州涪川郡隋黔安郡之涪川縣地是年分思州之涪川扶陽幷開南蠻置宋白曰費州因州界費水為名四年己卯上幸隴州後魏分涇岐二州之地置東秦州大統十七年改隴州治源縣在長安西四百九十六里四年冬十一月壬辰以右衞大將軍侯君集為兵部尚書參議朝政四年甲子車駕還京師四年上讀明堂鍼灸書云人五藏之系咸附於背唐藝文志有黃帝明堂經明堂偃側人圖明堂人形圖明堂孔穴圖皆鍼灸之書也藏徂浪翻鍼諸深翻灸居又翻戊寅詔自今毋得笞囚背四年十二月甲辰上獵於鹿苑武德元年分京兆之高陵置鹿苑縣乙巳還宮四年甲寅高昌王麴文泰入朝西域諸國咸欲因文泰遣使入貢朝直遙翻使疏吏翻上遣文泰之臣厭怛紇干往迎之厭於葉翻怛當割翻紇下沒翻魏徵諫曰昔光武不聽西域送侍子置都護以為不以蠻夷勞中國事見四十三卷漢光武建武二十三年前者文泰之來章十二行本來下有所過二字乙十一行本同孔本同張校同云無註本亦無勞費已甚此即謂文泰入唐境之時其徒旅不減千人邊民荒耗將不勝其弊若聽其商賈往來與邊民交市則可矣勝音升賈音古儻以賓客遇之非中國之利也時厭怛紇干已行上遽令止之四年諸宰相侍宴上謂王珪曰卿識鑒精通復善談論復扶又翻玄齡以下卿宜悉加品藻且自謂與數子何如對曰孜孜奉國知無不為臣不如玄齡才兼文武出將入相臣不如李靖敷奏詳明出納惟允臣不如溫彥博處繁治劇衆務畢舉臣不如戴冑處昌呂翻治直之翻恥君不及堯舜以諫爭為己任臣不如魏徵至於激濁揚清嫉惡好善好呼到翻臣於數子亦有微長上深以為然衆亦服其確論確克角翻四年上之初即位也嘗與㣥臣語及教化上曰今承大亂之後恐斯民未易化也魏徵對曰不然久安之民驕佚驕佚則難教經亂之民愁苦愁苦則易化譬猶飢者易為食渴者易為飲也孟子之言易以豉翻封德彞非之曰三代以還人漸澆訛故秦任法律漢雜霸道蓋欲化而不能豈能之而不欲邪魏徵書生未識時務若信其虛論必敗國家敗補邁翻徵曰五帝三王不易民而化昔黃帝征蚩尤顓頊誅九黎湯放桀武王伐紂皆能身致太平神農氏世衰蚩尤為暴虐黃帝征之禽殺蚩尤少皡氏衰九黎亂德顓頊誅之成湯放桀于南巢武王殺紂于牧野若謂古人淳朴漸至澆訛則至于今日當悉化為鬼魅矣邪音耶澆堅堯翻魅音媚人主安得而治之上卒從徵言治直之翻卒子恤翻元年關中饑米斗直絹一匹二年天下蝗三年大水上勤而撫之民雖東西就食未嘗嗟怨是歲天下大稔流散者咸歸鄉里米斗不過三四錢終歲斷死刑纔二十九人東至于海南極五嶺皆外戶不閉斷丁亂翻孔穎達曰外戶而不閉者扉從外闔也不閉者不用關閉之也重門擊柝本禦暴客既無盜竊亂賊則戶無俟於閉也但為風塵入寢故設扉耳無所捍拒故從外而掩也行旅不齎糧取給於道路焉上謂長孫無忌曰貞觀之初上書者皆云人主當獨運威權不可委之臣下又云宜震耀威武征討四夷唯魏徵勸朕偃武修文中國既安四夷自服朕用其言今頡利成擒其酋長並帶刀宿衞部落皆襲衣冠徵之力也但恨不使封德彞見之耳封德彞薨於元年突厥破滅海內康寧皆陛下威德臣何力焉上曰朕能任公公能稱所任稱尺證翻則其功豈獨在朕乎四年房玄齡奏閱府庫甲兵遠勝隋世上曰甲兵武備誠不可闕然煬帝甲兵豈不足邪卒亡天下卒子恤翻若公等盡力使百姓乂安此乃朕之甲兵也四年上謂祕書監蕭璟曰卿在隋世數見皇后乎隋煬帝蕭后璟同產也故帝問及之數所角翻彼兒女且不得見臣何人得見之魏徵曰臣聞煬帝不信齊王恆有中使察之煬帝猜防齊王暕事略見隋紀恆戶登翻使疏吏翻則曰彼營何事得遂而喜聞其憂悴悴秦醉翻則曰彼有他念故爾父子之間且猶如是況他人乎上笑曰朕今視楊政道勝煬帝之於齊王遠矣璟瑀之兄也瑀音禹四年西突厥肆葉護可汗既先可汗之子為衆所附莫賀咄可汗所部酋長多歸之厥九勿翻可從刊入聲汗音寒咄當沒翻酋慈由翻長知兩翻肆葉護引兵擊莫賀咄莫賀咄兵敗逃於金山為泥熟設所殺諸部共推肆葉護為大可汗肆葉護與莫賀咄相攻事始上二年五年五年春正月詔僧尼道士致拜父母尼女夷翻五年癸酉上大獵於昆明池四夷君長咸從長知兩翻從才用翻甲戌宴高昌王文泰及㣥臣丙子還宮親獻禽于大安宮五年癸未朝集使趙郡王孝恭等上表以四夷咸服請封禪朝直遙翻上時掌翻上手詔不許此元正朝集既畢將歸者唐制凡天下朝集使皆以十月二十五日至京師十一月一日戶部引見訖於尚書省與㣥官禮見然後集於考堂應考績之事元日陳其貢篚於殿庭朝直遙翻使疏吏翻五年有司上言皇太子當冠用二月吉請追兵備儀仗上時掌翻冠古玩翻唐皇太子冠禮詳見新書禮樂志上曰東作方興宜改用十月少傅蕭瑀奏據陰陽章十二行本陽下有書字乙十一行本同孔本同不若二月少始照翻上曰吉凶在人若動依陰陽不顧禮義吉可得乎循正而行自與吉會農時最急不可失也五年二月甲辰詔諸州有京觀處觀古玩翻無問新舊宜悉剗削加土為墳掩蔽枯朽勿令暴露五年己酉封皇弟元裕為鄶王鄶古外翻元名為譙王靈夔為魏王元祥為許王元曉為密王庚戌封皇子愔為梁王惲為郯王愔於今翻惲於粉翻郯音談貞為漢王治為晉王慎為申王囂為江王簡為代王五年夏四月壬辰代王簡薨五年壬寅靈州斛薛叛斛薛部內附處之靈州今叛破之任音壬五年隋末中國人多沒於突厥厥九勿翻及突厥降上遣使以金帛贖之降戶江翻使疏吏翻下同五月乙丑有司奏凡得男女八萬口五年六月甲寅太子少師新昌貞公李綱薨初周齊王憲女孀居無子綱贍恤甚厚綱薨其女以父禮喪之李綱先為齊王憲參軍事見一百七十三卷陳宣帝太建十年五年秋八月甲辰遣使詣高麗麗力知翻收隋氏戰亡骸骨葬而祭之五年河內人李好德得心疾妄為妖言好呼到翻妖於驕翻詔按其事大理丞張蘊古奏好德被疾有徵徵明也證也驗也被皮義翻下同治書侍御史權萬紀劾奏蘊古貫在相州貫鄉籍也治直之翻劾戶概翻又戶得翻相息亮翻情在阿縱按事不實上怒命斬之於市既而悔之因詔自今有死罪雖令即決仍三覆奏乃行刑權萬紀與侍御史李仁發俱以告訐有寵於上訐居謁翻由是諸大臣數被譴怒數所角翻魏徵諫曰萬紀等小人不識大體以訐為直以讒為忠陛下非不知其無堪蓋取其無所避忌欲以警策㣥臣耳而萬紀等挾恩依勢逞其姦謀凡所彈射射而亦翻皆非有罪陛下縱未能舉善以厲俗柰何昵姦以自損乎昵尼質翻上默然賜絹五百匹久之萬紀等姦狀自露皆得罪為帝疏權萬紀張本五年九月上修仁壽宮更命曰九成宮又將修洛陽宮民部尚書戴冑表諫以亂離甫爾百姓彫弊帑藏空虛若營造不已公私勞費殆不能堪更工衡翻藏徂浪翻上嘉之曰戴冑於我非親但以忠直體國知無不言故以官爵酬之耳久之竟命將作大匠竇璡修洛陽宮璡鑿池築山彫飾華靡上章十二行本上下有怒字乙十一行本同孔本同張校同遽命毀之免璡官璡將鄰翻又則刃翻五年冬十月丙午上逐兔於後苑唐長安苑城袤遠包漢長安故城在其中程大昌曰唐太極宮之北有內苑有禁苑太極宮居都城之北內苑又居宮北禁苑又居內苑之北禁苑廣矣西面全包漢之都城東抵霸水其西南兩面攙出太極宮前與承天門相齊承天門之西排立三門皆禁苑之門也曰光化曰芳林曰景耀六典曰禁苑在大內宮城之北北臨渭水東距滻川西盡都城其周一百二十里天命陛下為華夷父母柰何自輕上又將逐鹿思力脫巾解帶跪而固諫上為之止為于偽翻五年初上令㣥臣議封建魏徵議以為若封建諸侯則卿大夫咸資俸祿必致厚斂斂力贍翻又京畿賦稅不多所資畿外若盡以封國邑經費頓闕又燕秦趙代俱帶外夷燕因肩翻若有警急追兵內地難以奔赴禮部侍郎李百藥以為運祚脩短定命自天堯舜大聖守之而不能固漢魏微賤拒之而不能卻今使勳戚子孫皆有民有社易世之後將驕淫自恣攻戰相殘害民尤深不若守令之迭居也守式又翻中書侍郎顏師古以為不若分王諸章十二行本諸作宗乙十一行本同張校同云無註本亦作諸子勿令過大間以州縣王于況翻間古莧翻雜錯而居互相維持使各守其境協力同心足扶京室為置官寮皆省司選用為于偽翻省司謂尚書省主者法令之外不得亶作威刑朝貢禮儀具為條式一定此制萬世無虞朝直遙翻十一月章十二行本月下有丙辰二字乙十一行本同孔本同張校同退齋校同詔皇家宗室及勳賢之臣宜令作鎮藩部貽厥子孫非有大故毋或黜免所司明為條例定等級以聞五年丁巳林邑獻五色鸚鵡鸚鵡能言鳥也萬震南州志曰鸚鵡有三種一種白一種青一種五色交州以南諸國盡有之白及五色者性尤慧解陸佃埤雅鸚鵡人舌能言青羽赤喙蓋青者又凡種也舊說衆鳥足趾前三後一其目下瞼眨上惟鸚鵡四趾齊分兩瞼俱動如人目瞼力儉翻眼瞼也眨側洽翻目動也丁卯新羅獻美女二人魏徵以為不宜受上喜曰林邑鸚鵡猶能自言苦寒思歸其國況二女遠別親戚乎幷鸚鵡各付使者而歸之使疏吏翻五年倭國遣使入貢倭烏禾翻上遣新州刺史高表仁持節往撫之表仁與其王爭禮不宣命而還還從宣翻又如字五年丙子上祀圜丘五年十二月太僕寺丞李世南開党項之地十六州四十七縣党底朗翻五年上謂侍臣曰朕以死刑至重故令三覆奏蓋欲思之詳熟故也而有司須臾之間三覆已訖又古刑人君為之徹樂減膳朕庭無常設之樂然常為之不啖酒肉但未有著令又百司斷獄唯據律文雖情在可矜而不敢違法其間豈能盡無冤乎丁亥制決死囚者二日中五覆奏下諸州者三覆奏行刑之日尚食勿進酒肉為于偽翻斷丁亂翻唐尚食局屬殿中監有奉御直長掌御膳內教坊及太常不舉樂武德中置內教坊于禁中有內教博士太常寺有太樂署鼓吹署有據法當死而情可矜者錄狀以聞由是全活甚衆其五覆奏者以決前一二日至決日又三覆奏唯犯惡逆者一覆奏而已隋立十惡之科四曰惡逆謂毆及謀殺祖父母父母殺伯叔父母姑兄子外祖父母夫夫之祖父母父母者唐遵用之五年己亥朝集使利州都督武士彠等復上表請封禪朝直遙翻彠一虢翻復扶又翻不許五年壬寅上幸驪山溫湯戊申還宮五年上謂執政曰朕常恐因喜怒妄行賞罰故欲公等極諫公等亦宜受人諫不可以己之所欲惡人違之惡烏路翻苟自不能受諫安能諫人五年康國求內附康國即漢康居國一曰薩末鞬亦曰颯末鞬元魏謂之悉萬斤其王姓溫本月氏人始居祁連北昭武城為突厥所破稍南依葱嶺即有其地以昭武為姓示不忘本也前代帝王好招來絕域以求服遠之名無益於用而糜弊百姓今康國內附儻有急難於義不得不救師行萬里豈不疲勞勞百姓以取虛名朕不為也遂不受謂侍臣曰治國如治病病雖愈猶宜將護儻遽自放縱病復作則不可救矣今中國幸安四夷俱服誠自古所希然朕日慎一日唯懼不終故欲數聞卿輩諫爭也好呼到翻難乃旦翻治直之翻復扶又翻數所角翻爭讀曰諍魏徵曰內外治安臣不以為喜唯喜陛下居安思危耳治直吏翻五年上嘗與侍臣論獄魏徵曰煬帝時嘗有盜發帝令於士澄捕之於如字姓也出何承天姓苑皆拷訊取服少始沼翻拷音考凡二千餘人帝悉令斬之令力丁翻大理丞張元濟怪其多試尋其狀內五人嘗為盜餘皆平民竟不敢執奏盡殺之上曰此豈唯煬帝無道其臣亦不盡忠君臣如此何得不亡公等宜戒之五年是歲高州總管馮盎入朝未幾羅竇諸洞獠反竇州漢端溪縣地隋為瀧州懷德縣武德四年置南扶州貞觀六年更名竇州取州界有羅竇洞為名朝直遙翻幾居豈翻獠魯皓翻為諸軍前鋒帥讀曰率獠數萬人屯據險要諸軍不得進盎持弩謂左右曰盡吾此矢足知勝負矣連發七矢中七人中竹仲翻獠皆走因縱兵乘之斬首千餘級上美其功前後賞賜不可勝數勝音升盎所居地方二千里奴婢萬餘人珍貨充積然為治勤明所部愛之治直吏翻五年新羅王真平卒卒子恤翻無嗣國人立其女善德為王王崇武標點容肇祖聶崇岐覆校
