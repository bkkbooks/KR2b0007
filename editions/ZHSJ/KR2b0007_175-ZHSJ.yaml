body:
  text: 資治通鑑卷第一百七十五端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註陳紀九高宗宣皇帝下之下太建十三年太建十三年辛丑五八一太建十三年春正月壬午以晉安王伯恭為尚書左僕射吏部尚書袁憲為右僕射憲樞之弟也太建十三年周改元大定太建十三年二月甲寅隋王始受相國百揆九錫自初命至是五十一日乃受章十二行本錫下有之命二字乙十一行本同孔本同張校同置百官也丙辰詔進王獨孤氏為王后世子勇為太子開府儀同大將軍庾季才勸隋王宜以今月甲子應天受命庾季才持正於宇文護亶權之時而勸進於楊氏革命之日巫史之學自信其術耳非胸中真有所見也於是周主下詔遜居別宮甲子命兼太傅公椿奉冊大宗伯趙煚奉皇帝璽紱禪位于隋冊冊書也周制皇帝八璽有神璽有傳國璽皆寶而不用神璽明受之於天傳國璽明受之於運皇帝負扆則置神璽於筵前之右置傳國璽於筵前之左又有六璽其一皇帝行璽封命諸侯及三公用之其二皇帝之璽與諸侯及三公書用之其三皇帝信璽發諸夏之兵用之其四天子行璽封命蕃國之君用之其五天子之璽與蕃國之君書用之其六天子信璽徵蕃國之兵用之六璽皆白玉為之方一寸五分高寸螭虎鈕梁敬帝太平元年周閔帝受魏禪五主二十四年而亡隋主本襲封隨公故國號曰隨以周齊不遑寧處故去漶作隋以訓走故也音綽煚俱永翻璽斯氏翻紱音弗遠遊冠制似通天冠而前無山述有展筩橫于冠前皇太子及王者後諸王服之主冠古玩翻改服紗帽黃袍紗帽白紗帽也名高頂帽皇帝服絳紗袍志曰開皇初高祖常服烏沙帽紀云秋七月上始服黃百寮畢賀蓋以黃為常服服袞冕如元會之儀元會正旦大朝會也文物充庭㣥官各入就位再拜上公一人詣西階解劍升賀降階帶劍復位而拜㣥官在位者又再拜搢笏三稱萬歲改元開皇命有司奉冊祀于南郊告天以受命少冢宰當作小冢宰以字行天賜之孫也按隋書元孝矩傳祖脩義不言以字行汝陰王天賜當魏太和之世距此時百餘年當考少內史崔仲方勸隋主除周六官周定六官事始一百六十六卷梁敬帝紹泰元年少內史當作小內史從之置三師三公及尚書門下內史祕書內侍五省隋志三師不主事不置府僚蓋與天子坐而論道者也三公參議國之大事依後齊置府僚無其人則闕祭祀則太尉亞獻司徒奉俎司空行掃除其位多曠皆攝行事尋省府及僚佐置公則坐於尚書都省朝之衆務總歸於臺閣尚書省事無不總置令左右僕射各一人總吏部禮部兵部都官度支工部六曹事屬官左右丞各一人都事八人分司管轄六曹尚書分統三十六侍郎各司曹務直宿禁省如漢之制門下省置納言給事黃門侍郎散騎常侍侍郎通直員外諫議大夫等官內史省置監令侍郎舍人等官祕書省置監丞郎等官領著作太史二曹內史省即中書省避武元諱改曰內史門下內史二省主出納朝直代言猶有職事祕書省較優閒內侍省則皆宦官也御史臺置大夫治書侍御史侍御史殿內侍御史監察御史等官都水臺置使者及丞參軍河堤謁者又領掌船局及諸津都水尉津尉丞長等官太常光祿衞尉宗正太僕大理鴻臚司農太府九寺並置卿少卿丞主簿錄事等員國子寺置祭酒屬官有主簿錄事國子太學四門書等學各置博士助教將作寺置大匠丞主簿錄事統左右校署令左右衞左右武衞左右武候左右領左右左右監門左右領軍各置大將軍將軍長史司馬錄事功倉兵騎等曹參軍法曹鎧曹行參軍行參軍等員又置上柱國至都督十一等勳官以酬勤勞隋採後周之制置上柱國柱國上大將軍大將軍上開府儀同三司開府儀同三司上儀同三司儀同三司大都督帥都督都督總十一等特進左右光祿大夫金紫光祿大夫銀青光祿大夫朝議大夫朝散大夫總七等朝直遙翻散悉亶翻改侍中為納言以考諱忠故改侍中為納言兼納言熲古迥翻射音夜相國司錄京兆虞慶則為內史監兼吏部尚書相國內郎李德林為內史令相息亮翻相國內郎相國府從事中郎避諱改為內郎乙丑追尊皇考為武元皇帝皇考周隨國桓公楊忠皇妣呂氏為元明皇后丙寅脩廟社時自高祖以下置四親廟同殿異室而已無受命之祧社稷並列於含光門內之右獨孤之下逸氏字章十二行本正有氏字乙十一行本同孔本同丁卯以太尉章十二行本作大將軍三字乙十一行本同孔本同張校同趙煚為尚書右僕射己巳封周靜帝為介公煚居永翻周主雖禪死乃有諡通鑑先以諡書之介古國名周氏諸王皆降爵為公初劉鄭矯詔以隋主輔政劉鄭劉昉鄭譯也矯詔事見上卷上年然以嗣子幼沖恐權在他族聞之甚喜後知其父有異圖意頗不平形於言色及禪位憤惋逾甚嗣祥吏翻惋烏貫翻隋主內甚愧之改封樂平公主樂平郡公主五代志太原郡樂平縣舊置樂平郡樂音洛欲奪其志公主誓不許乃止隋主與周載下大夫北平榮建緒有舊載下逸師字後周置載師之官屬地官有中大夫有下大夫北平郡治盧龍榮姓出周榮公莊子有榮啟期建緒為息州刺史五代志汝南郡新息縣後魏置東豫州梁改西豫州又改淮州東魏復曰東豫州後周改曰息州隋主謂曰且躊躇躊直由翻躇陳如翻躊躇住足也建緒正色曰明公此旨非僕所聞及即位來朝帝謂之曰卿亦悔不朝直遙翻不讀曰否建緒稽首曰臣位非徐廣情類楊彪稽音啟徐廣事見一百一十九卷宋高祖永初元年楊彪事見六十九卷魏文帝黃初二年帝怒曰朕雖不曉書語亦知卿此言不遜上柱國竇毅之女聞隋受禪自投堂下撫膺太息曰恨我不為男子救舅氏之患撫與拊同拍也膺胸也太息憤而舒氣長也汝勿妄言滅吾族毅由是奇之及長以適唐公李淵淵昞之子也昞周柱國李虎之子李淵始見于此長知兩翻昞音丙虞慶則勸隋主盡滅宇文氏高熲楊惠亦依違從之依違者不敢言其不可而心不以為可以為不可隋主作色曰君書生不足與議此於是周太祖孫譙公乾惲冀公絢惲於粉翻絢許縣翻閔帝子紀公湜湜常職翻明帝子酆公貞宋公實高祖子漢公贊秦公贄曹公允道公充蔡公兌荊公元宣帝子萊公衍郢公術皆死通鑑書宣帝子衍始終備但目錄書大成元年立太子衍亦自背馳太建十三年乙亥上耕藉田藉在亦翻太建十三年隋主封其弟邵公慧為滕王安公爽為衞王邵安皆以州為封國俊為秦王秀為越王諒為漢王太建十三年隋主賜李穆詔曰公既舊德且又父黨李穆與隋主之父忠比肩事周皆為功臣義無有違謂穆勸之受命也孔安國曰膺當也自幷州入朝朝直遙翻贊拜不名子孫雖在襁褓襁居兩翻負兒衣褓博抱翻抱兒衣悉拜儀同一門執象笏者百餘人隋志曰按禮笏諸侯以象凡有指畫於君前用笏受命書於笏笏畢用也五經要義曰所以記事防忽忘禮圖云度二尺有六寸中博二寸其殺六分去一晉宋以來謂之手板此乃不經今還謂之笏以法古名自西魏以降五品以上通用象牙六品已下兼用竹木笏呼骨翻又以上柱國竇熾為太傅幽州總管于翼為太尉李穆上表乞骸骨人臣致身以事君身非己有故求閒者自言乞骸骨上時掌翻呂尚以期頤佐周記百年曰期頤呂尚遇文王年八十矣佐文王以及武王則是期頤之年也華皓謂白首也張蒼免相後口中無齒食乳年百餘歲乃卒不拘常禮仍以穆年耆敕蠲朝集蠲免也朝集猶言朝會也朝直遙翻就第詢訪用古人欲有謀焉則就之之意隋主姑以是恩李穆耳非欲與之大有為也美陽公蘇威美陽古縣名漢晉屬扶風五代志不見蓋已省廢姑以古縣名封爵之耳蘇綽佐宇文泰以興周周晉公護強以女妻之少詩照翻強其兩翻妻七細翻威見護專權恐禍及己屏居山寺以諷讀為娛屏必郢翻周高祖聞其賢除車騎大將軍儀同三司騎奇寄翻稍所教翻皆辭疾不拜宣帝就除開府儀同大將軍隋主為丞相高熲薦之隋主召見與語大悅居月餘聞將受禪遁歸田里觀蘇威之初其立身何可議哉至於末節展轉於宇文化及李密王世充之朝何其可鄙也君子是以知令終之難追者尋其後而召之此不欲預吾事耳置之及受禪徵拜太子少保追封其父為邳公邳亦以州名為公國少始照翻太建十三年丁丑隋以晉王廣為幷州總管三月戊子以上開府儀同三司賀若弼為吳州總管鎮廣陵考異曰隋書帝紀云楚州今從弼傳鎮廬江廣陵為吳州仍周舊也歷陽為和州仍齊舊也隋書韓擒虎河東垣人河南當作河東五代志廬江郡梁置南豫州又改合州開皇初改廬州蓋梁之南豫合州皆治合肥合州因合肥而名也廬江在合肥東五十里既徙治廬江故以廬名州若人者翻問將帥於高熲將即亮翻帥所類翻熲薦弼與擒虎故置於南邊使潛為經略戊戌以太子少保蘇威兼納言度支尚書度支尚書統度支戶部金部倉部度徒洛翻初蘇綽在西魏以國用不足制征稅法頗重後周太祖作相置載師掌任土之法辨夫家田里之數會六畜車乘之稽審賦役斂弛之節制畿疆脩廣之域頒施惠之要審牧產之政司均掌田里之政令凡人口十已上宅五畝口九已上宅四畝口五已下宅三畝有室者田百四十畝丁者田百畝司賦掌功賦之政令凡人自十八以至六十有四與輕癃者皆賦之其賦之法有室者歲不過絹一疋綿八兩粟五斛丁者半之其非桑土有室者布一疋麻十斤丁者又半之豐年則全賦中年半之下年一之皆以時徵焉若艱荒凶札則不徵其賦又有市門之稅自今觀之亦不為重矣而蘇綽猶望後之人弛之可謂有志於民矣今所為者譬如張弓非平世法也後之君子誰能弛之威聞其言每以為己任至是奏減賦役務從輕簡隋主悉從之蘇威為度支尚書居可言可行之地與高熲參掌朝政朝直遙翻帝嘗怒一人將殺之威入閤進諫帝不納將自出斬之威當帝前不去帝避之而出威又遮止帝拂衣而入良久乃召威謝曰公能若是吾無憂矣賜馬二匹錢十餘萬尋復兼大理卿京兆尹御史大夫本官悉如故治書侍御史安定梁毗以威兼領五職漢宣帝幸宣室齋居決事令侍御史二人治書侍側魏晉因別置治書侍御史安定郡涇州五職納言度支尚書大理卿京兆尹御史大夫也治平聲無舉賢自代之心抗表劾威劾戶慨翻又戶得翻帝曰蘇威朝夕孜孜孜孜不怠也何遽迫之因謂朝臣曰蘇威不值我無以措其言我不得蘇威何以行其道楊素才辯無雙至於斟酌古今助我宣化非威之匹也匹偶也南山四皓豈易屈哉四皓東園公綺里季夏黃公角里先生遭秦之亂隱於商山鬚眉皓白故曰四皓商山在長安南故曰南山隋主以蘇威隱遯於周世故云然易以豉翻臣先人每戒臣云先人謂威父綽足以立身治國何用多為帝深然之治直之翻下同高熲深避權勢上表遜位上時掌翻讓於蘇威帝欲成其美成其讓賢之美數日帝曰蘇威高蹈前朝前朝謂周朝高蹈謂其隱遯不仕蹈踐也履也高蹈言踐履之高朝直遙翻吾聞進賢受上賞漢武帝詔曰進賢受上賞蔽賢蒙顯戮古之道也命熲復位熲威同心協贊政刑大小帝無不與之謀議然後行之故革命數年天下稱平太子左庶子盧賁以熲威執政心甚不平時柱國劉昉亦被疏忌賁因諷昉及上柱國元諧李詢華州刺史張賓等謀黜熲威五代志京兆郡鄭縣後魏置東雍州幷華山郡西魏改曰華州昉甫兩翻被皮義翻華戶化翻又以晉王廣有寵於帝私謂太子曰賁欲數謁殿下數所角翻恐為上所譴願察區區之心謀泄帝窮治其事治直之翻昉等委罪於賓賁公卿奏二人當死帝以故舊不忍誅並除名為民二人皆翼戴隋主於潛躍者也張賓道士也隋主作輔賓自言洞曉星曆盛言有代謝之徵且言上儀表非人臣之相由是大被知遇常在幕府太建十三年庚子隋詔前代品爵皆依舊不降此普謂中外官也太建十三年丁未梁主遣其弟太宰巖入賀于隋賀受命也太建十三年夏四月辛巳隋大赦戊戌悉放太常散樂為民仍禁雜戲後齊之季有散樂周天元即位悉徵詣長安隸太常隋今放之太建十三年散騎常侍韋鼎兼通直散騎常侍王瑳聘于周散悉亶翻騎奇寄翻瑳七何翻又七可翻辛丑至長安隋已受禪隋主致之介國說文致送詣也周主時封介公太建十三年隋主召汾州刺史韋沖為兼散騎常侍五代志文城郡東魏置南汾州後周改為汾州散悉亶翻按隋紀時修築長城二旬而罷在塗亡叛帝召沖問計對曰夷狄之性易為反覆易以豉翻皆由牧宰不稱之所致稱尺證翻臣請以理綏靜可不勞兵而定帝然之命沖綏懷叛者月餘皆至並赴長城之役沖敻之子也韋敻見一百六十七卷周高祖永定三年太建十三年五月戊午隋封邘公雄為廣平王按隋書此即邗公惠也改名雄開皇中改封清漳王仁壽初改封安德王大業中從征吐谷渾還進封觀王薨諡曰德後所謂觀德王雄者是也邘當作邗音寒章乙十一行本正作邗孔本同永康縣公也五代志清化郡永穆縣梁置曰永康高祖之族子也太建十三年隋主潛害周靜帝而為之舉哀為于偽翻葬于恭陵以其族人洛為嗣太建十三年六月癸未隋詔郊廟冕服必依禮經隋制冕服採用東齊之法乘輿袞冕垂白珠十有二旒以組為纓色如其綬黈纊充耳玉筓玄衣纁裳衣山龍華蟲火宗彞五章裳藻粉米黼黻四章衣重宗彞裳重黼黻為十二等衣褾領織成升龍白紗內單黼領青褾襈裾革帶玉鉤䚢大帶素帶朱裏紕其外上以朱下以綠韍隨裳色龍火山三章鹿盧玉具劍火珠鏢首白玉雙佩玄組雙大綬六采玄黃青白縹綠純玄質長二丈四尺五百首廣一尺小雙綬長二尺六寸色同大綬而首半之間施三玉環朱韈赤舄舄加金飾凡綬先合單紡為一絲絲四為一扶扶五為一首首五成一文褾波小翻襈雛免翻䚢丑例翻又敕列翻紕音卑緣也鏢紕招翻說文刀削末銅也縹匹沼翻紡甫罔翻隋自以為得火德故尚赤色朝直遙翻下同幟昌志翻章十二行本黃下有在外二字乙十一行本同孔本同張校同常服通用雜色秋七月乙卯隋主始服黃百僚畢賀於是百官常服同於庶人皆著黃袍著則略翻隋主朝服亦如之唯以十三環帶為異太建十三年八月壬午隋廢東京官周徙相州六府於東京事見一百七十三卷太建十一年太建十三年吐谷渾寇涼州涼州武威郡吐從暾入聲谷音浴諧擊破吐谷渾於豐利山豐利山在青海東帥所類翻騎奇寄翻青海在吐谷渾國都伏俟城之東十五里周迴千餘里中有小山唐時謂之龍駒島敗補邁翻可從刊入聲汗音寒吐谷渾震駭其王侯三十人各帥所部來降吐谷渾可汗夸呂帥親兵遠遁帥讀曰率降戶江翻下同隋主以其高寧王移茲裒為河南王裒薄侯翻使統降衆以元諧為寧州刺史五代志北地郡後魏置豳州西魏改為寧州太建十三年九月庚午將軍周羅睺攻隋故墅拔之故墅當作胡墅胡墅在大江北岸對石頭城睺音侯墅承與翻太建十三年隋奉車都尉于宣敏漢武帝置三都尉奉車駙馬騎也使疏吏翻還音旋又如字奏稱蜀土沃饒人物殷阜周德之衰遂成戎首謂王謙以益州起兵也封殖子孫屏必郢翻隋主善之辛未以越王秀為益州總管改封蜀王為秀在蜀以奢僭得罪張本謹之孫也于謹周之功臣太建十三年隋章十二行本隋上有壬申二字乙十一行本同孔本同張校同以上柱國長孫覽元景山並為行軍元帥長知兩翻帥所類翻發兵入寇命尚書左僕射高熲節度諸軍太建十三年初周齊所鑄錢凡四等及民間私錢名品甚衆五代志齊文宣受禪改鑄常平五銖重如其文其錢甚貴且制造甚精至乾明皇建之間往往私鑄鄴中用錢有赤熟青熟細眉赤生之異河南所用有青薄鉛錫之別青齊徐兗梁豫州輩類各殊武平已後私鑄轉甚或以生鐵和銅至于齊亡卒不能禁後周之初尚用魏錢及武帝保定元年乃更鑄布泉之錢以一當五與五銖並行時梁益之境又雜用古錢交易河西諸郡或用西域金銀之錢而官不禁建德三年更鑄五行大布錢以一當十與布泉並行五年以布泉漸賤遂廢之齊平已後山東猶雜用齊氏舊錢宣帝大象元年又鑄永通萬國錢以一當千與五行大布及五銖凡三品並用隋主患之更鑄五銖錢背面肉好皆有周郭錢之文為面其漫為背錢體為肉錢孔為好外圓周之以規內方周之以矩曰周郭更工衡翻肉而救翻好虛到翻悉禁古錢及私錢置樣於關不如樣者沒官銷毀之自是錢幣始壹民間便之太建十三年隋鄭譯以上柱國歸第賞賜豐厚譯自以被疏呼道士醮章祈福道士有消災度厄之法依陰陽五行數術推人年命書之如章表之儀幷具贄幣燒香陳讀云奏上天曹請為除厄謂之上章夜中於星辰之下陳設酒果麥并餌幣物歷祀天皇太一五星列宿為書如上章之儀以奏之名為醮被皮義翻醮子肖翻以為巫蠱譯又與母別居為憲司所劾憲司御史臺官劾戶概翻又戶得翻隋主下詔曰譯若留之於世在人為不道之臣戮之於朝入地為不孝之鬼有累幽顯無所置之朝直遙翻累力瑞翻宜賜以孝經令其熟讀仍遣與母共居太建十三年初周法比於齊律煩而不要隋主命高熲鄭譯及上柱國楊素率更令裴政等太子率更令魏晉之制主宮殿門戶及掌罰事職如光祿勳衞尉隋制掌伎樂漏刻率如字更工衡翻政練習典故達於從政乃采魏晉舊律下至齊梁沿革重輕累世循襲者為沿中有變更者為革衷竹仲翻時同脩者十餘人凡有疑滯皆取決於政於是去前世梟轘及鞭法梟者斬首掛之木上轘者車裂於市梁制有制鞭法鞭常鞭凡三等之差制鞭生革廉成法鞭生革去廉常鞭熟靼不去廉皆作鶴頭紐長一尺一寸梢長二尺七寸廣三寸靶長二尺五寸去羌呂翻梟古堯翻轘戶關翻又戶慣翻無收族之罪始制死刑二絞斬流刑三自二千里至三千里按隋志流刑三有千里千五百里二千里應配者一千里居作二年一千五百里居作二年半二千里居作三年應住居作者三流俱役三年近流加杖一百一等加三十此云自二千里至三千里不同自一年至三年徒刑有一年有一年半有二年有二年半有三年自六十至百笞刑五自十至五十又制議請減贖官當之科以優士大夫議即周禮八議之法請者凡在八議之科則請之減者官品第七已上犯罪皆例減一等其品第九已上犯者聽贖應贖者皆以銅代絹贖銅一斤為負負十為殿笞十者銅一斤加至杖百則十斤徒一年贖銅二十斤每等則加銅十斤三年則六十斤矣流一千里贖銅八十斤每等則加銅十斤二千里則百斤矣二死皆贖銅百二十斤犯私罪以官當徒者五品已上一官當徒二年九品已上一官當徒一年當流者三流同比徒三年若犯公罪者徒各加一年當流者各加一等其累徒過九年者流二千里孔穎達曰古之贖罪用銅漢始改用黃金但少其斤兩令與銅相敵後魏以金難得令金一兩收絹十匹隋復依古贖銅考掠不得過二百時有司用前世訊囚之法用大棒束杖車輻鞵底壓踝杖桄之屬考擊也掠音亮笞也咸有程式民有枉屈縣不為理者聽以次經郡及州若仍不為理聽詣闕伸訴枷居牙翻為于偽翻冬十月戊子始行新律詔曰夫絞以致斃斬則殊形夫音扶除惡之體於斯已極梟首轘身義無所取不益懲肅之理徒表安忍之懷忍殘忍也安忍安於為殘忍之事殘剝膚體徹骨侵肌徹敕列翻酷均臠切雖云往古之式舜典曰鞭作官刑故云往古之式梟轘及鞭並令去之貴帶礪之書不當徒罰令力丁翻使也去羌呂翻漢高帝分封功臣與之剖符作誓曰使黃河如帶泰山若礪國以永存爰及苗裔廣軒冕之蔭旁及諸親服冕乘軒貴仕也改為五載載作亥翻刑徒五歲變從三祀祀亦年也化死為生條目甚多備於簡策雜格嚴科並宜除削自是法制遂定後世多遵用之宋朝所行之刑統舊所傳者也隋主嘗怒一郎於殿前笞之諫議大夫劉行本進曰此人素清其過又小願少寬之笞丑之翻少詩沼翻帝不顧行本於是正當帝前曰陛下不以臣不肖置臣左右臣言若是陛下安得不聽若非當致之於理章十二行本理下有豈得輕臣而不顧也八字乙十一行本同孔本同張校同言送詣大理寺治其罪因置笏於地而退帝斂容謝之遂原所笞者行本璠之兄子也劉璠自梁入西魏見一百六十四卷梁元帝承聖元年笞丑之翻璠音煩又扶元翻獨孤皇后家世貴盛后父獨孤信仕西魏以及周列於元功后姊為周明帝后女為周宣帝后雅好讀書好呼到翻言事多與隋主意合帝甚寵憚之宮中稱為二聖帝每臨朝朝直遙翻下同后輒與帝方輦而進方輦並兩輦也使宦官伺帝政有所失隨即匡諫伺相吏翻候帝退朝同反燕寢朝直遙翻燕寢燕居之寢有司奏稱周禮百官之妻命於王后請依古制后曰婦人與政或從此為漸不可開其源也與讀曰預大都督崔長仁后之中外兄弟也犯法當斬帝以后故欲免其罪后曰國家之事焉可顧私焉於虔翻長仁竟坐死后性儉約帝嘗合止利藥泄瀉不禁者曰利合音閤宮內不用求之竟不得又欲賜柱國劉嵩妻織成衣領宮內亦無之然帝懲周氏之失不以權任假借外戚后兄弟不過將軍刺史帝外家呂氏濟南人五代志齊郡歷城縣舊置濟南郡濟子禮翻齊亡以來帝求訪不知所在齊之未亡濟南之地屬齊不可得而求訪故齊亡始訪之始求得舅子呂永吉追贈外祖雙周為太尉封齊郡公以永吉襲爵永吉從父道貴性尤頑騃從才用翻騃五駭翻癡也言詞鄙陋帝厚加供給而不許接對朝士朝直遙翻拜上儀同三司出為濟南太守守式又翻後郡廢終于家太建十三年壬辰隋主如岐州隋志扶風郡舊置岐州岐州刺史安定梁彥光有惠政隋主下詔褒美賜束帛及御傘傘與繖同先旰翻又蘇旱翻蓋也以厲天下之吏久之徙相州刺史相悉亮翻下同岐俗質厚彥光以靜鎮之奏課連為天下最奏課奏計帳及輸籍也部如岐州法鄴自齊亡衣冠士人多遷入關唯工商樂戶移實州郭城外曰郭釋名郭廓也廓落在城外也好興謠訟詖彼義翻好呼到翻目彥光為著帽餳餳飴也餳軟而甘言彥光為人軟美如團餳特著帽耳孔穎達曰凡飴謂之餳關東之通語也方言曰餳謂之張皇或云滑餹著則略翻餳徐盈翻免彥光官歲餘拜趙州刺史五代志趙郡大陸縣舊曰廣阿置殷州及南鉅鹿郡後改南趙郡改州為趙州帝許之豪猾聞彥光再來皆嗤之嗤丑之翻笑也彥光至發擿姦伏擿他狄翻發也動也有若神明豪猾潛竄闔境大治治直吏翻於是招致名儒每鄉立學親臨策試褒勤黜怠及舉秀才祖道於郊以財物資之於是風化大變吏民感悅無復訟者史因岐州之政終言彥光歷刺他州事復扶又翻時又有相州刺史陳留樊叔略有異政帝以璽書褒美班示天下徵拜司農按樊叔略傳徵拜司農卿璽斯氏翻新豐令房恭懿新豐縣自漢以來屬京兆帝賜以粟帛雍州諸縣令朝謁雍於用翻朝直遙翻下同帝見恭懿必呼至榻前咨以治民之術累遷德州司馬五代志平原郡開皇九年置德州治直之翻隋志每元會諸州悉遣使赴京師朝集謂之朝集使使疏吏翻房恭懿志存體國愛養我民此乃上天宗廟之所祐朕若置而不賞上天宗廟必當責我卿等宜師範之因擢為海州刺史海州東海郡百姓富庶樊叔略房恭懿之被褒擢非必皆是年事通鑑因梁彥光事悉書於此以見開皇之治以賞良吏而成稱尺證翻太建十三年十一月丁卯隋遣兼散騎侍郎鄭撝來聘散悉亶翻騎奇寄翻撝許為翻太建十三年十二月庚子隋主還長安復鄭譯官爵太建十三年廣州刺史馬靖廣州治番禺兵甲精練數有戰功數所角翻朝廷疑之遣吏部侍郎蕭引觀靖舉措諷令送質朝直遙翻令力丁翻質音致外託收督賧物賧吐濫翻蠻蜑所輸貨物曰賧一曰夷人以財贖罪曰賧引至番禺番禺音潘愚靖即遣子弟入質太建十三年是歲隋主詔境內之民任聽出家仍令計口出錢營造經像於是時俗隨風而靡民間佛書多於六經數十百倍太建十三年突厥佗鉢可汗病且卒厥九勿翻佗徒何翻可從刊入聲汗音寒卒子恤翻謂其子菴邏曰吾兄不立其子委位於我事見一百七十一卷太建四年邏郎佐翻隋書突厥傳作菴羅汝曹當避大邏便大邏便者木杆之子杜佑曰突厥以勇健者為莫賀弗肥麄者為大羅便大羅便酒器也似角而麄短體貌似之故以為號此官特貴唯其子弟為之國人將立大邏便以其母賤衆不服菴邏實貴隋書作菴羅母貴當從之攝圖最後至謂國人曰若立菴邏者我當帥兄弟事之帥讀曰率若立大邏便我必守境利刃長矛以相待攝圖長且雄勇國人莫敢拒攝圖為小可汗統東面部落又逸可汗之子故長長知兩翻大邏便不得立心不服菴邏每遣人詈辱之詈力智翻菴邏不能制因以國讓攝圖國中相與議曰四可汗子四可汗謂逸可汗及木杆可汗褥但可汗佗鉢可汗共迎立之考異曰隋突厥傳云木杆在位二十年卒佗鉢在位十年卒按周傳魏廢帝二年三月科羅獻馬木杆猶未立建德二年佗鉢獻馬然則木杆以承聖二年立太建四年卒佗鉢以其年立十三年卒也居都斤山菴邏降居獨洛水稱第二可汗都斤山獨洛水皆突厥中地名第二可汗言其位次沙鉢略也我與爾俱可汗子各承父後爾今極尊我獨無位何也沙鉢略患之以為阿波可汗還領所部又沙鉢略從父玷厥居西面號達頭可汗從才用翻玷丁念翻厥九勿翻諸可汗各統部衆分居四面沙鉢略勇而得衆北方皆畏附之隋主既立待突厥禮薄突厥大怨千金公主傷其宗祀覆滅日夜言於沙鉢略請為周室復讎周遣千金公主嫁突厥見上卷十二年為于偽翻我周之親也今隋主自立而不能制復何面目見可賀敦乎復扶又翻突厥之君長稱可汗其妻稱可賀敦乃與故齊營州刺史高寶寧合兵為寇隋主患之敕緣邊脩保障峻長城命上柱國武威陰壽鎮幽州京兆尹虞慶則鎮幷州屯兵數萬以備之初奉車都尉長孫晟送千金公主入突厥長知兩翻晟成正翻突厥可汗愛其善射留之竟歲命諸子弟貴人與之親友冀得其射法沙鉢略弟處羅侯號突利設尤得衆心為沙鉢略所忌密託心腹陰與晟盟晟與之遊獵因察山川形勢部衆強弱靡不知之及突厥入寇晟上書曰今諸夏雖安上時掌翻夏戶雅翻戎虜尚梗興師致討未是其時棄於度外又相侵擾此二語明指出當時利病今人多上書言時事滕口說耳有以攘之此下方是晟獻策兵強而位下外名相屬內隙已彰鼓動其情必將自戰又處羅侯者攝圖之弟姦多勢弱言其心多姦巧而形勢甚弱國人愛之因為攝圖所忌其心殊不自安迹示彌縫實懷疑懼又阿波首鼠介在其間漢書首鼠兩端受其牽率左傳牽率老夫未有定心今宜遠交而近攻史記范睢說秦王之言通使玷厥說合阿波使疏吏翻說輸芮翻今人言說合二字說音如字合音閤則攝圖迴兵自防右地右地突厥西面地也遣連奚霫奚庫莫奚霫又一種霫音習還備左方左方突厥東面地也腹心離阻十數年後乘釁討之釁許覲翻必可一舉而空其國矣帝省表大悅省悉景翻因召與語晟復口陳形勢復扶又翻手畫山川寫其虛實皆如指掌帝深嗟異皆納用之遣太僕元暉出伊吾道詣達頭賜以狼頭纛太僕太僕卿也伊吾即漢伊吾盧之地突厥之先狼種也子孫為君長牙門建狼頭纛示不忘本也纛徒到翻引居沙鉢略使上使疏吏翻以晟為車騎將軍出黃龍道黃龍即和龍今黃龍府即其地時為高寶寧所據騎奇寄翻奚本曰庫莫奚東部胡之種也為慕容氏所破遺落竄匿松漠之間後稍強盛霫匈奴之別種也居潢水北契丹之先與奚同種而異類並為慕容氏所破俱竄松漠之間其後稍大居黃龍之北數百里契欺訖翻又音喫齎則兮翻鄉讀曰嚮得至處羅侯所深布心腹誘之內附誘音酉反間既行間古莧翻果相猜貳太建十三年始興王叔陵太子之次弟也與太子異母母曰彭貴人叔陵為江州刺史性苛刻狡險新安王伯固以善諧謔有寵於上及太子謔虛約翻叔陵疾之陰求其過失欲中之以法中竹仲翻叔陵入為揚州刺史事務多關涉省閣省閣謂中書尚書二省即諷上進用之微致違忤必抵以大罪重者至殊死身首異處為殊死忤五故翻乃諂求其意叔陵好發古冢伯固好射雉好呼到翻射而亦翻常相從郊野大相款狎因密圖不軌伯固為侍中每得密語必告叔陵十四年十四年春正月己酉上不豫太子與始興王叔陵長沙王叔堅並入侍疾叔陵陰有異志命典藥吏曰切藥刀甚鈍可礪之甲寅上殂倉猝之際叔陵命左右於外取劍左右弗悟取朝服木劍以進朝服帶劍以為儀飾非求其適用故為木劍朝直遙翻怒其不能會己意聞之疑有變伺其所為伺相吏翻乙卯小斂斂力贍翻太子哀哭俯伏叔陵抽剉藥刀斫太子中項中竹仲翻太子悶絕于地母柳皇后走來救之又斫后數下乳媼吳氏自後掣其肘媼烏皓翻掣昌列翻太子乃得起叔陵持太子衣太子自奮得免叔堅手搤叔陵奪去其刀仍牽就柱以其褶袖縛之搤於革翻去羌呂翻褶音習布褶衣也今之寬袖山海經註魏毌丘儉破高句麗遣王頎窮追過汙沮千餘里彼人言海中有長臂人近於海中得布褶衣兩袖各長三丈有餘則知所謂褶衣有自來矣時吳媼已扶太子避賊叔堅求太子所在欲受生殺之命叔陵多力奮袖得脫突走出雲龍門馳車還東府召左右斷青溪道斷音短赦東城囚以充戰士東城即東府城又遣人往新林追所部兵仍自被甲著白布帽被皮義翻著則略翻登城西門招募百姓又召諸王將帥將即亮翻帥所類翻莫有至者唯新安王伯固單馬赴之助叔陵指揮叔陵兵可千人欲據城自守時衆軍並緣江防守臺內空虛叔堅白柳后使太子舍人河內司馬申以太子命召右衞將軍蕭摩訶入見受敕見賢遍翻帥馬步數百趣東府帥讀曰率下同趣七喻翻下同屯城西門叔陵惶恐遣記室韋諒送其鼓吹與摩訶吹昌瑞翻謂曰事捷必以公為台輔摩訶紿報之曰須王心膂節將自來方敢從命紿徒亥翻將即亮翻叔陵遣其所親戴溫譚騏驎詣摩訶譚徒含翻春秋齊滅譚子孫以國為氏驎離珍翻摩訶執以送臺斬其首徇東城叔陵自知不濟入內沈其張氏及寵妾七人于井沈持林翻帥步騎數百自小航渡六朝都建業航秦淮而渡者非一處當朱雀門者為大航當東府門者為小航騎奇寄翻下同航戶剛翻乘舟奔隋行至白楊路為臺軍所邀伯固見兵至旋避入巷叔陵馳騎拔刃追之伯固復還叔陵部下多棄甲潰去摩訶馬容陳智深迎刺叔陵僵仆陳仲華就斬其首軍行擇便於鞍馬軀幹壯偉者乘馬居前以壯軍容謂之馬容刺七亦翻自寅至巳乃定叔陵諸子並賜死伯固諸子宥為庶人韋諒及前衡陽內史彭暠五代志長沙郡衡山縣舊置衡陽郡陳為王國故置內史暠古老翻暠叔陵舅也信諒有寵於叔陵常參謀議諒粲之子也韋粲梁臣死於侯景之難丁巳太子即皇帝位大赦十四年辛酉隋置河北道行臺於幷州以晉王廣為尚書令幷州治晉陽以蜀王秀為尚書令隋主懲周氏孤弱而亡故使二子分涖方面以二王年少少詩照翻盛選貞良有才望者為之僚佐以靈州刺史王韶為幷省右僕射五代志靈武郡後魏置靈州按靈州漢北地郡富平縣地赫連勃勃之果園後魏置靈州取靈武郡名之註又見前五代志趙郡治平棘李雄趙郡高邑人臚陵如翻朔方郡夏州李徹朔方巖綠人王韶李雄元巖俱有骨鯁名李徹前朝舊將李徹事周征吐谷渾平齊定淮南皆有功朝直遙翻初李雄家世以學業自通雄獨習騎射騎奇寄翻下同其兄子旦讓之曰非士大夫之素業也雄曰自古聖賢文武不備而能成其功業者鮮矣鮮息淺翻雄雖不敏頗觀前志但不守章句耳既文且武兄何病焉及將如幷省帝謂雄曰吾兒更事未多更工衡翻以卿兼文武才吾無北顧之憂矣二王欲為奢侈非法韶巖輒不奉教或自鎖或排閤切諫二王甚憚之每事諮而後行不敢違法度帝聞而賞之隋文帝擇人以輔其子可謂用心矣而二子皆不克令終何也中人已下之性束縛之雖急一縱則不可復收也又以秦王俊為河南道行臺尚書令洛州刺史領關東兵洛州治洛陽十四年癸亥以長沙王叔堅為驃騎將軍開府儀同三司揚州刺史驃匹妙翻蕭摩訶為車騎將軍南徐州刺史封綏遠公始興王章十二行本王下有叔陵二字乙十一行本同孔本同張校同家金帛累巨萬悉以賜之以司馬申為中書通事舍人乙丑尊皇后為皇太后時帝病創創初良翻下同臥承香殿不能聽政太后居柏梁殿百司衆務皆決於太后帝創愈乃歸政焉丁卯封皇弟叔重為始興王奉昭烈王祀叔陵既誅以叔重奉昭烈王祀十四年隋元景山出漢口漢口漢水入江之口鎮將軍陸綸以舟師救之為孝儒所敗敗補邁翻溳口甑山沌陽守將皆棄城走漢水記自漢口入二百里得溳口有村又三百里得溳城楚邑也漢安陸縣居之沌陽在沌水之北五代志沔陽郡漢陽縣有沌水溳音云沌柱兗翻將即亮翻戊辰遣使請和於隋歸其胡墅去年周羅睺拔胡墅使疏吏翻十四年己巳立沈氏為皇后辛未立皇弟叔儼為尋陽王叔慎為岳陽王叔達為義陽王叔熊為巴山王叔虞為武昌王宣帝諸子唯叔達後仕於唐貴顯十四年隋高熲奏禮不伐喪春秋公羊傳襄公十九年晉士匄帥師侵齊至穀聞齊侯卒乃還還者何善辭也何善爾大其不伐喪也己丑隋主詔熲等班師十四年三月己巳以尚書左僕射晉安王伯恭為湘州刺史湘州治長沙十四年夏四月庚寅隋大將軍韓僧壽破突厥於雞頭山雞頭山涇水所出在原州平高縣西此山蓋在北河之北十四年丙申立皇子永康公胤為太子胤孫姬之子沈后養以為子十四年五月己未高寶寧引突厥寇隋平州五代志北平郡舊置平州治盧龍沙鉢略可汗第二可汗達頭可汗阿波可汗貪汗可汗凡五可汗十四年壬戌隋任穆公于翼卒任古國名諡法布德執義曰穆中情見貌曰穆任音壬卒子恤翻十四年甲子隋更命傳國璽曰受命璽更工衡翻璽斯氏翻十四年六月甲申隋遣使來弔使疏使翻十四年乙酉隋上柱國李光敗突厥於馬邑李光當作李充馬邑朔州治所大業初改馬邑縣為善陽縣敗補邁翻下同五代志金城郡開皇初置蘭州總管府山無草木曰峐峐古哀翻十四年隋主嫌長安城制度狹小又宮內多妖異妖於驕翻納言蘇威勸帝遷都帝以初受命難之夜與威及高熲共議明旦通直散騎庾季才奏曰臣仰觀乾象俯察圖記必有遷都之事且漢營此城將八百歲漢高帝五年徙都長安歲在己亥是年歲在壬寅凡八百四歲惠帝元年城長安歲在丁未距是年七百九十六年不甚宜人京都地大人衆加以歲久壅底墊隘穢惡聚而不泄則水多鹹鹵鹵郎古翻為遷徙之計帝愕然謂熲威曰是何神也太師李穆亦上表請遷都帝省表曰天道聰明已有徵應上時掌翻省悉景翻徵證也太師人望復抗此請無不可矣復扶又翻丙申詔高熲等創造新都於龍首山三秦記龍首山長六十里首入渭水尾達樊川頭高二十丈尾漸下可六七丈色赤舊傳有黑龍從南山出飲渭水其行道因行成迹領營新都副監晉志太子庶子四人職比散騎常侍中書監令隋分置門下坊左庶子二人典書坊右庶子二人監者監領營新都事思相吏翻忻之弟也十四年秋七月辛未大赦十四年九月丙午設無㝵大會於太極殿㝵與礙同釋氏書也乘繩證翻大赦十四年丙午以長沙王叔堅為司空將軍刺史如故驃騎將軍揚州刺史十四年冬十月癸酉隋太子勇屯兵咸陽以備突厥咸陽在長安西北隔渭水耳屯兵於此以備突厥蓋其兵勢強盛欲窺長安此亦猶漢霸上棘門細柳之屯耳十四年十二月丙子隋命新都曰大興城十四年乙酉隋遣沁源公虞慶則屯弘化以備突厥沁源縣公五代志上黨郡有沁源縣後魏置弘化郡治合水開皇六年置慶州沁七鴆翻行軍總管達奚長儒將兵二千與突厥沙鉢略可汗遇於周槃據慶則傳長儒別道邀賊為虜所圍慶則按營不救則周槃亦當在弘化縣界長儒當作長孺軍中大懼長儒神色慷慨且戰且行為虜所衝散而復聚復扶又翻四面抗拒轉鬬三日晝夜凡十四戰五兵咸盡士卒以拳毆之毆烏口翻手皆骨見見賢遍翻孟子曰盡信書不如無書五兵咸盡士卒奮拳擊虜以言死鬬則可若虜以全師四面蹙之安能免乎史但極筆敍長儒力戰之績耳觀者不以辭害意可也殺傷萬計虜氣稍奪於是解去長儒身被五瘡通中者二被皮義翻中竹仲翻其戰士死章十二行本死下有傷字乙十一行本同孔本同者什八九詔以長儒為上柱國餘勳回授一子時柱國馮昱屯乙弗泊乙弗泊當在鄯州之西五代志後周武帝逐吐谷渾置洮陽郡尋立洮州大業初置臨洮郡洮土刀翻皆為突厥所敗敗補邁翻於是突厥縱兵自木硤石門兩道入寇武威天水章十二行本水下有安定二字乙十一行本同孔本同張校同金城上郡弘化延安六畜咸盡木峽石門兩關皆在弘化郡平高縣界此由虞慶則按營不戰達奚長儒孤軍摧衂故沙鉢略縱兵兩道而入然五可汗之兵東西齊舉西自乙弗泊東至幽州盡隋西北二邊無不被寇若武威至延安則達頭沙鉢略之兵耳天水上郡皆古郡天水則秦州上郡則敷州也延安郡後魏置東夏州西魏改為延州畜許又翻沙鉢略更欲南入達頭不從引兵而去長孫晟又說沙鉢略之子染干說輸芮翻詐告沙鉢略曰鐵勒等反欲襲其牙鐵勒之先本匈奴苗裔種類最多自西海之東依據山谷往往不絕至北海之南雖姓氏不同總謂之鐵勒迴兵出塞十四年隋主既立待遇梁主恩禮彌厚是歲納梁主女為晉王按隋書蕭后傳及蕭巋傳初皆云巋女詳考之則后本巋生江南風俗一月生子者不舉后以二月生故季父岌收而養之未幾岌夫妻俱死轉養於舅氏張軻家高祖為晉王選於梁徧占諸女皆不吉巋迎后於舅氏占之曰吉遂為王瑒雉杏翻又音暢由是罷江陵總管西魏遷梁主詧於江陵置助防曰防主後遂置總管今罷之長城公上至德元年至德元年癸卯五八三至德元年春正月庚子隋將入新都大赦至德元年壬寅大赦改元至德元年初上病創創初良翻不能視事政無大小皆決於長沙王叔堅權傾朝廷叔堅頗驕縱上由是忌之都官尚書山陰孔範山陰漢古縣屬會稽郡皆惡叔堅而有寵於上惡烏路翻下同日夕求其短日夕猶言朝夕也上乃即叔堅驃騎將軍本號用三司之儀出為江州刺史以祠部尚書江總為吏部尚書至德元年癸卯立皇子深為始安王至德元年二月己巳朔日有食之至德元年癸酉遣兼散騎常侍賀徹等聘于隋散悉亶翻騎奇寄翻至德元年突厥寇隋北邊厥九勿翻至德元年癸巳葬孝宣皇帝于顯寧陵廟號高宗至德元年右衞將軍兼中書通事舍人司馬申既掌機密頗作威福多所譖毀能候人主顏色有忤己者必以微言譖之忤五故翻附己者因機進之是以朝廷內外皆從風而靡上欲用侍中吏部尚書毛喜為僕射申惡喜強直言於上曰喜臣之妻兄高宗時稱陛下有酒德周公戒成王曰無若殷王受之迷亂酗于酒德哉註云言紂心迷政亂以酗酒為德去羌呂翻陛下寧忘之邪邪音耶上乃止上創愈置酒於後殿以自慶引吏部尚書江總以下展樂賦詩展舒而陳之也創初良翻于時山陵初畢喜見之不懌欲諫則上已醉喜升階陽為心疾仆于階下移出省中上醒謂江總曰我悔召毛喜彼實無疾但欲阻我歡宴非我所為耳言喜以帝所為為非也此人負氣吾欲乞鄱陽兄弟聽其報讎可乎鄱陽兄弟世祖諸子也高宗之篡殺劉師知韓子高到仲舉父子以及始興王伯茂皆毛喜之謀後主怒喜欲以喜乞鄱陽兄弟聽其報讎於臣為不君於父為不子乞音氣與也彼終不為官用陳之臣子率稱其君曰官中書通事舍人北地傅縡爭之傳稱縡少依蕭循蓋循自關中歸縡與之俱南也縡作代翻不然若許報讎欲置先皇何地上曰當乞一小郡勿令見人事耳乃以喜為永嘉內史考異曰司馬申傳云右僕射沈君理卒朝議以毛喜代之按君理卒在太建五年非後主時又毛喜傳云時山陵初畢未及踰年按高宗殂過朞乃葬而云未及踰年恐誤也至德元年三月丙辰隋遷于新都考異曰隋食貨志正月帝入新宮今從帝紀初令民二十一成丁減役者每歲十二番為二十日役減調絹一匹為二丈後周之制民年十八成丁今增三歲每歲十二番則三十日役今改為二十日役及調絹減半調徒弔翻至是皆罷之周末官置酒坊收利鹽池鹽井皆禁百姓採用池鹽則河東鹽池井鹽則蜀中處處有之榷古岳翻祕書監牛弘隋書牛弘傳弘安定鶉觚人本姓尞氏父允仕魏賜姓牛氏以典籍屢經喪亂上時掌翻喪息浪翻率多散逸周氏聚書僅盈萬卷平齊所得除其重雜裁益五千興集之期屬膺聖世重直龍翻裁與纔同屬之欲翻膺當也為國之本莫此為先豈可使之流落私家不歸王府必須勒之以天威引之以微利則異典必臻觀閣斯積漢東觀及天祿石渠等閣皆藏書之所故云觀古玩翻丁巳詔購求遺書於天下每獻書一卷賚縑一匹賚洛代翻賜也與也縑絹也說文曰幷絲繒至德元年夏四月庚午吐谷渾寇隋臨洮洮州刺史皮子信出戰敗死汶州總管梁遠擊走之又寇廓州州兵擊走之五代志後周武帝逐吐谷渾置洮陽郡尋立洮州汶山郡後周置汶州宋白曰晉置廣陽縣於茂州汶山縣西北五十里今不詳其處所後周又立廣陽縣於石鏡山西六十里至舊廣陽即今縣也又置汶州於此汶讀曰珉隋改會州澆河郡亦周逐吐谷渾以置廓州至德元年壬申隋以尚書右僕射趙煚兼內史令煚古迥翻至德元年突厥數為隋寇厥九勿翻數所角翻隋主下詔曰往者周齊抗衡分割諸夏夏戶雅翻突厥之虜俱通二國周人東慮恐齊好之深好呼到翻齊氏西虞懼周交之厚謂虜意輕重國遂安危蓋並有大敵之憂思減一邊之防也朕以為厚斂兆庶斂力贍翻多惠豺狼未嘗感恩資而為賊節之以禮不為虛費省傜薄賦國用有餘因入賊之物加賜將士將即亮翻下同息道路之民務為耕織清邊制勝成策在心凶醜愚闇未知深旨將大定之日比戰國之時乘昔世之驕結今時之恨近者盡其巢窟俱犯北邊蓋上天所忿驅就齊斧齊讀曰齋言齊戒而授斧鉞於將帥一讀曰資應劭曰利斧也諸將今行義兼含育有降者納降戶江翻有違者死使其不敢南望永服威刑何用侍子之朝寧勞渭橋之拜匈奴遣子入侍及來朝渭橋並見漢宣帝紀朝直遙翻於是命衞王爽等為行軍元帥帥所類翻分八道出塞擊之爽督總管李充等四將出朔州道自馬邑出塞也己卯與沙鉢略可汗遇於白道白道在長城北有白道嶺白道溪突厥狃於驟勝狃女久翻必輕我而無備以精兵襲之可破也諸將多以為疑唯長史李徹贊成之遂與充帥精騎五千掩擊突厥大破之帥讀曰率騎奇寄翻下並同沙鉢略棄所服金甲潛草中而遁其軍中無食粉骨為糧加以疾疫死者甚衆幽州總管陰壽帥步騎十章十二行本十作數乙十一行本同孔本同萬出盧龍塞擊高寶寧寶寧求救於突厥突厥方禦隋師不能救庚辰寶寧棄城奔磧北磧七迹翻壽設重賞以購寶寧又遣人離其腹心寶寧奔契丹為其麾下所殺高寶寧自齊末據和龍至是敗滅契欺訖翻又音契至德元年己丑郢州城主張子譏遣使請降於隋郢州治江夏中流之重鎮今欲降隋史言陳之邊將已離心使疏吏翻下同降戶江翻不納好呼到翻至德元年辛卯隋主遣兼散騎常侍薛舒兼章十二行本兼下有通直二字乙十一行本同孔本同散騎常侍王劭來聘劭松年之子也王松年仕齊為通直散騎侍郎人在下中散悉亶翻騎奇寄翻至德元年癸巳隋主大雩隋雩壇在國南十三里啟夏門外道左至德元年甲子張子作午突厥遣使入見于隋見賢遍翻至德元年隋改度支尚書為民部度徒洛翻都官尚書為刑部命左僕射判吏禮兵三部事右僕射判民刑工三部事廢光祿衞尉鴻臚寺及都水臺臚陵如翻至德元年五月癸卯隋行軍總管李晃破突厥於摩那度口至德元年乙巳梁太子琮入朝于隋賀遷都朝直遙翻至德元年辛酉隋主祀方澤隋為方丘於宮城之北十四里至德元年隋秦州總管竇榮定帥九總管步騎三萬出涼州帥讀曰率與突厥阿波可汗相拒於高越原阿波屢敗榮定熾之兄子也厥九勿翻可從刊入聲汗音寒竇熾時為太傅前上大將軍京兆史萬歲坐事配敦煌為戍卒敦煌郡瓜州敦徒門翻請自効榮定素聞其名見而大悅壬戌將戰榮定遣人謂突厥曰士卒何罪而殺之但當各遣一壯士決勝負耳突厥許諾因遣一騎挑戰騎奇寄翻下同挑徒了翻榮定遣萬歲出應之萬歲馳斬其首而還還音旋又如字突厥大驚不敢復戰復扶又翻遂請盟引軍而去長孫晟時在榮定軍中為偏將將即亮翻使謂阿波曰攝圖每來戰皆大勝阿波纔入遽即奔敗此乃突厥之恥也且攝圖之與阿波兵勢本敵今攝圖日勝為衆所崇阿波不利為國生辱攝圖必當以罪歸阿波成其宿計滅北牙矣阿波建牙在攝圖之北量音良度徒洛翻能禦之乎阿波使至使疏吏翻下同晟又謂之曰今達頭與隋連和而攝圖不能制可汗何不依附天子連結達頭相合為強此萬全計也豈若喪兵負罪喪息浪翻歸就攝圖受其戮辱邪邪音耶阿波然之遣使隨晟入朝沙鉢略素忌阿波驍悍朝直遙翻驍堅堯翻悍侯旰翻自白道敗歸又聞阿波貳於隋因先歸襲擊北牙大破之殺阿波之母阿波還無所歸西奔達頭達頭大怒遣阿波帥兵而東帥讀曰率其部落歸之者將十萬騎遂與沙鉢略相攻屢破之復得故地兵勢益強貪汗可汗素睦於阿波沙鉢略奪其衆而廢之貪汗亡奔達頭沙鉢略從弟地勤察張地勤察作地勒察別統部落與沙鉢略有隙復以衆叛歸阿波從才用翻復扶又翻連兵不已各遣使詣長安請和求援隋主皆不許至德元年六月庚辰隋行軍總管梁遠破吐谷渾於爾汗山吐從暾入聲谷音浴汗音寒至德元年突厥寇幽州隋幽州總管廣宗壯公李崇帥步騎三千拒之廣宗縣公廣宗漢古縣五代志屬清河郡厥九勿翻帥讀曰率騎奇寄翻師人多死遂保砂城突厥圍之城荒頹不可守禦曉夕力戰又無所食每夜出掠虜營得六畜以繼軍糧畜許又翻突厥畏之厚為其備每夜中結陳以待之陳讀曰陣下同崇軍苦飢出輒遇敵死亡略盡及明奔還城者尚百許人然多重傷不堪更戰突厥意欲降之降戶江翻下同遣使謂崇曰若來降者封為特勒特勒突厥達官新書突厥子弟曰特勒使疏吏翻令其士卒曰崇喪師徒令力定翻喪息浪翻罪當萬死今日効命以謝國家汝俟吾死且可降賊便散走努力還鄉若見至尊道崇此意乃挺刃突陳復殺二人挺拔也陳讀曰陣殺之射而亦翻秋七月章十二行本月下有辛丑二字乙十一行本同孔本同張校同以豫州刺史代人周搖為幽州總管命李崇子敏襲爵襲爵廣宗公敏娶樂平公主之女娥英隋主受禪周天元后改封樂平公主禮如尚帝女既而將侍宴公主謂敏曰我以四海與至尊唯一壻當為爾求柱國為于偽翻若餘官汝慎勿謝及進見見賢遍翻帝授以儀同及開府皆不謝帝曰公主有大功於我我何得於其壻而惜官乎今授汝柱國敏乃拜而蹈舞至德元年八月丁卯朔日有食之考異曰隋紀作七月丁卯蓋曆差至德元年長沙王叔堅未之江州復留為司空復扶又翻實奪之權至德元年壬午隋遣尚書左僕射高熲出寧州道內史監虞慶則出原州道以擊突厥五代志平涼郡舊置原州監甲暫翻厥九勿翻至德元年九月癸丑隋大赦至德元年冬十月甲戌隋廢河南道行臺省去年二月隋置河南道行臺省隴右諸州盡隸焉秦州天水郡至德元年丁酉立皇弟叔平為湘東王叔敖為臨賀王叔宣為陽山王叔穆為西陽王至德元年戊戌侍中建昌侯徐陵卒卒子恤翻至德元年癸丑立皇弟叔儉為安南王叔澄為南郡王叔興為沅陵王叔韶為岳山王叔純為新興王自湘東以下皆以郡名疏爵今著後人之所未能徧知者五代志始安郡富川縣舊置臨賀郡熙平郡桂陽縣梁置陽山郡永安郡黃岡縣置西陽郡巴陵郡華容縣舊曰安南置安南郡沅陵縣置沅陵郡信安郡新興縣梁置新興郡岳山郡闕郡縣志巴陵一名天岳山岳山蓋即巴陵以封叔韶沅音元至德元年十一月遣散騎常侍周墳通直散騎常侍袁彥聘于隋帝聞隋主狀貌異人使彥畫像而歸帝見大駭曰吾不欲見此人亟命屏之散悉亶翻騎奇寄翻亟紀力翻屏必郢翻至德元年隋既班律令前年十月隋行新律更工衡翻下數更同內史令李德林曰修律令時公何不言今始頒行且宜專守自非大為民害不可數更數所角翻河南道行臺兵部尚書楊尚希曰竊見當今郡縣倍多於古或地無百里數縣並置或戶不滿千二郡分領具僚已衆資費日多吏卒增倍租調歲減調徒弔翻民少官多少詩沼翻下同十羊九牧今存要去上聲併小為大國家則不虧粟帛選舉則易得賢良易以豉翻蘇威亦請廢郡帝從之甲午悉罷諸郡為州至德元年十二月乙卯隋遣兼散騎常侍曹令則通直散騎常侍魏澹來聘散悉亶翻騎奇寄翻收之族也魏收事齊以文名澹徒覽翻至德元年丙辰司空長沙王叔堅免叔堅既失恩心不自安乃為厭媚厭一琰翻醮日月以求福或上書告其事考異曰南史云上陰令人造其厭媚又令人告之今從陳書囚于西省門下省為東省中書省為西省令近侍宣敕數之數責其罪也數所具翻又所主翻臣之本心非有他故但欲求親媚耳臣既犯天憲罪當萬死臣死之日必見叔陵願宣明詔責之於九泉之下帝乃赦之免官而已因叔堅之言始念其擁護之功此豈少恩而已哉不明故爾至德元年隋以上柱國竇榮定為右武衞大將軍榮定妻隋主姊安成公主也隋主欲以榮定為三公辭曰衞霍梁鄧若少自貶損不至覆宗帝乃止四姓皆漢外戚也衞氏夷於武帝之末霍族赤於宣帝之時桓帝怒而梁宗誅滅安帝長而鄧門衰廢事並見漢紀少詩沼翻帝以李穆功大詔曰法備小人不防君子太師申公自今雖有罪但非謀逆縱有百死終不推問禮部尚書牛弘請立明堂帝以時事草創不許帝覽刑部奏斷獄數猶至萬斷丁亂翻以為律尚嚴密故人多陷罪又敕蘇威牛弘等更定新律除死罪八十一條流罪一百五十四條徒杖等千餘條唯定留五百條凡十二卷一曰名例二曰衞禁三曰職制四曰戶婚五曰广既庫六曰亶興七曰賊盜八曰鬬訟九曰詐偽十曰雜律十一曰捕亡十二曰斷獄疏而不失仍置律博士弟子員大理寺之屬有律博士八人至德元年隋主以長安倉廩尚虛是歲詔西自蒲陝東至衞汴河東郡蒲州恆農郡陝州汲郡衞州陳留郡汴州陝式冉翻汴皮變翻募丁運米華陝穀洛管汴汾晉蒲絳懷衞相凡十三州陝州置常平倉華州置廣通倉五代志京兆郡鄭縣後魏置東雍州幷華山郡西魏改曰華州華戶化翻輸平聲水運曰漕關東自函谷關以東州郡五代志文城郡東魏置南汾州後周改為汾州晉州臨汾郡舊平陽郡也漕在到翻時刺史多任武將類不稱職將即亮翻下同稱尺證翻治書侍御史柳彧上表曰治直之翻上時掌翻昔漢光武與二十八將披荊棘定天下及功成之後無所任職事見漢光武紀以上柱國和千子為州刺史五代志梁郡雍丘縣隋置州趙州時治廣阿今人猶呼割稻為殺稻種章勇翻千子弓馬武用是其所長治民涖衆非其所解治直之翻解戶買翻曉也如謂優老尚年尚尊也高也若令刺舉漢置刺史掌刺舉郡縣吏故云然帝善之千子竟免彧見上勤於聽受百僚奏請多有煩碎上疏諫曰臣聞上古聖帝莫過唐虞不為叢脞是謂欽明書元首叢脞哉孔安國曰叢脞細碎無大略馬云叢總也脞小也堯典曰放勳欽明文思脞倉果翻孔子曰舜有臣五人而天下治孔安國曰五臣禹稷契皋陶伯益孔安國曰四岳即羲和之四子分掌四岳之諸侯天下以治治直吏翻下同所謂勞於求賢逸於任使比見陛下留心治道比毗至翻治直吏翻無憚疲勞亦由㣥官懼罪不能自決取判天旨判決也乃至營造細小之事出給輕微之物一日之內酬答百司至乃日旰忘食夜分未寢旰古按翻日晏也夜分半夜也動以文簿憂勞聖躬伏願察臣至言少減煩務少詩沼翻若經國大事非臣下裁斷者伏願詳決斷丁亂翻自餘細務責成所司則聖體盡無疆之壽臣下蒙覆育之賜覆敷救翻上覽而嘉之因曰柳彧直士國之寶也彧以近世風俗每正月十五夜然燈游戲奏請禁之上元燃燈或云以漢祠太一自昏至晝故事此說非也梁簡文帝有列燈詩陳後主有光璧殿遙詠山燈詩則柳彧所謂近世風俗是也竊見京邑爰及外州每以正月望夜望夜月之十五夜也月旦以日月合謂之朔十五夜以日月相望謂之望塞悉則翻聚戲朋遊鳴鼓聒天燎炬照地竭貲破產競此一時盡室幷孥無問貴賤男女混雜緇素不分穢行因此而成盜賊由斯而起觀此則上元遊戲之弊其來久矣後之當路者能不惑於世俗奮然革之亦所謂豪傑之士也曾無先覺無益於化實損於民請頒天下並即禁斷斷音短詔從之章錫琛標點容肇祖聶崇岐覆校
