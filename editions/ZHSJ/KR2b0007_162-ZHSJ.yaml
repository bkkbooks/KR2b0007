body:
  text: 資治通鑑卷第一百六十二端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註梁紀十八朝野以侯景之禍共尤朱异高祖武皇帝十八太清三年己巳五四九朝野以侯景之禍共尤朱异春正月丁巳朔柳仲禮自新亭徙營大桁會大霧韋粲軍迷失道比及青塘比必利翻夜已過半立柵未合侯景望見之亟帥銳卒攻粲過工禾翻帥讀曰率粲使軍主鄭逸逆擊之命劉叔胤以舟師截其後截其渡淮之路逸遂敗景乘勝入粲營左右牽粲避賊粲不動叱子弟力戰遂與子尼及三弟助警構從弟昂皆戰死從才用翻親戚死者數百人史言韋粲忠勇投箸被甲與其麾下百騎馳往救之箸竹助翻被皮義翻騎奇寄翻與景戰於青塘大破之斬首數百級沈淮水死者千餘人沈持林翻仲禮矟將及景矟色角翻而賊將支伯仁自後斫仲禮中肩馬陷于淖支伯仁當作支化仁將即亮翻下同中竹仲翻淖奴教翻泥也騎將郭山石救之得免仲禮被重瘡會稽人惠臶吮瘡斷血刺七亦翻被皮義翻臶徂悶翻吮徂兗翻故得不死自是景不敢復濟南岸復扶又翻下不復綸復同仲禮亦氣索索蘇各翻不復言戰矣邵陵王綸復收散卒邵陵王綸敗走見上卷上年淦古暗翻庚申列營于桁南亦推柳仲禮為大都督大連大臨之弟也朝野以侯景之禍共尤朱异朝直遙翻异慙憤發疾庚申卒考異曰梁帝紀作乙丑今從太清紀典略上痛惜异特贈尚書右僕射甲子湘東世子方等及王僧辯軍至考異曰梁帝紀作戊辰今從太清紀朝野以侯景之禍共尤朱异戊辰封山侯正表以北徐州降東魏東魏徐州刺史高歸彥遣兵赴之歸彥歡之族弟也朝野以侯景之禍共尤朱异己巳太子遷居永福省永福省在禁中自宋以來太子居之取其福國於有永也五代志高涼郡梁置高州臺城與援軍信命久絕有羊車兒獻策作紙鴟紙鴟即紙鳶也今俗謂之紙鷂鴟丑之翻寫敕於內放以從風冀達衆軍題云得鴟送援軍賞銀百兩太子自出太極殿前乘西北風縱之賊怪之以為厭勝射而下之厭於協翻射而亦翻援軍募人能入城送啟者鄱陽世子嗣左右李朗請先受鞭詐為得罪叛投賊因得入城城中方知援兵四集舉城鼓譟上以朗為直閤將軍賜金遣之朗緣鍾山之後宵行晝伏積日乃達癸未鄱陽世子嗣永安侯確莊鐵羊鴉仁柳敬禮李遷仕樊文皎將兵渡淮攻東府前柵焚之侯景退衆軍營於青溪之東遷仕文皎帥銳卒五千獨進帥讀曰率深入所向摧靡至菰首橋東橋在青溪上菰音孤菰首今人謂之茭白將即亮翻下同文皎戰死遷仕遁還敬禮仲禮之弟也仲禮神情傲狠陵蔑諸將邵陵王綸每日執鞭至門亦移時弗見凡部將見主帥執鞭以為禮狠戶墾翻大連又與永安侯確有隙永安本漢彘縣順帝陽嘉元年更名永安魏晉屬平陽郡江左僑立南河東郡併僑立永安縣屬荊州註又見前莫有戰心援軍初至建康士民扶老攜幼以候之纔過淮即縱兵剽掠剽匹妙翻由是士民失望賊中有謀應官軍者聞之亦止史言臺城覆陷之由朝野以侯景之禍共尤朱异王顯貴以壽陽降東魏侯景命王顯貴守壽陽見上卷上年朝野以侯景之禍共尤朱异臨賀王記室吳郡顧野王起兵討侯景二月己丑引兵來至初臺城之閉也公卿以食為念男女貴賤並出負米得四十萬斛收諸府藏錢帛五十萬億並聚德陽堂藏徂浪翻而不備薪芻魚鹽至是壞尚書省為薪撤薦剉以飼馬薦盡又食以飯薦以藁秸為之所以藉寢壞音怪飼食並祥吏翻膎戶皆翻脯也又肉食肴或煑鎧熏鼠捕雀而食之鎧可亥翻御甘露廚有乾苔味酸鹹分給戰士釋氏謂營膳之所曰甘露廚乾音干苔生於海其形如髮春二三月間海人採取之成片納土窖中出而曬之令乾南人多食之雜以人肉食者必病侯景衆亦飢抄掠無所獲抄楚交翻東城有米可支一年東城即東府城斷音短又聞荊州兵將至景甚患之王偉曰今臺城不可猝拔援兵日盛吾軍乏食若偽求和以緩其勢東城之米足支一年因求和之際運米入石頭援軍必不得動然後休士息馬繕脩器械伺其懈怠擊之一舉可取也伺相吏翻景從之遣其將任約于子悅至城下拜表求和乞復先鎮將即亮翻任音壬先鎮謂壽陽時已降齊矣太子以城中窮困白上請許之上怒曰和不如死太子固請曰侯景圍逼已久援軍相仗不戰仗除兩翻宜且許其和更為後圖上遲回久之乃曰汝自圖之勿令取笑千載遂報許之太子綱疑范桃棒之來降而信侯景之請和何其昧也載子亥翻景乞割江右四州之地江右四州南豫西豫合州光州然後濟江中領軍傅岐固爭曰豈有賊舉兵圍宮闕而更與之和乎此特欲卻援軍耳戎狄獸心必不可信且宣城嫡嗣之重國命所繫豈可為質梁之智士唯傅岐一人而已質音致下同出質於景又敕諸軍不得復進復扶又翻下詔曰善兵不戰止戈為武可以景為大丞相都督江西四州諸軍事豫州牧河南王如故己亥設壇於西華門外遣僕射王克上甲侯韶吏部郎蕭瑳韶帝室也封上甲侯宋白曰江州德安縣本蒲塘場晉建興初始以為郡領尋陽上甲柴桑九江等縣義熙中以尋陽入柴桑上甲入彭澤瑳七何翻又七可翻太子詹事柳津出西華門景出柵門遙相對更殺牲歃血為盟更工衡翻歃色甲翻既盟而景長圍不解專脩鎧仗鎧可亥翻託云無船不得即發又云恐南軍見躡援軍時皆屯秦淮南岸故謂之南軍求宣城王出送邀求稍廣了無去志太子知其詐言猶羈縻不絕韶懿之孫也庚子前南兗州刺史南康王會理前青冀二州刺史湘潭侯退西昌侯世子彧衆合三萬至于馬卬洲馬卬洲蓋即今王家沙老鸛觜一帶考異曰梁帝紀作丁未今從太清紀典略典略云至于琅邪今從太清紀梁帝紀按晉置琅邪郡於江乘蒲洲上即前所謂今王家沙地上時掌翻啟云請章十二行本請下有敕字乙十一行本同孔本同張校同北軍聚還南岸以地望言之馬卬洲在臺城之北故云北軍南岸即謂秦淮南岸妨臣濟江太子即勒會理自白下城移軍江潭苑考異曰梁帝紀作蘭亭苑今從太清紀典略恢之子也辛丑以邵陵王綸為司空鄱陽王範為征北將軍柳仲禮為侍中尚書右僕射景以于子悅任約傅士悊皆為儀同三司悊與哲同譒補過翻董紹先為東徐州刺史徐思玉為北徐州刺史王偉為散騎常侍散悉覽翻騎奇寄翻上以偉為侍中乙卯景又啟曰適有西岸信至大江西岸即歷陽臣今無所投足求借廣陵幷譙州俟得壽陽即奉還朝廷又云援軍既在南岸須於京口渡江太子並答許之癸卯大赦庚戌景又啟曰永安侯確直閤趙威方頻隔柵見詬云天子自與汝盟我終當破汝乞召侯及威方入即當引路言引兵就路還北詬古候翻又許候翻辛亥以確為廣州刺史威方為盱眙太守盱眙音吁怡守手又翻確累啟固辭不入上不許確先遣威方入城因欲南奔確蓋欲南奔荊江二鎮圍城既久聖上憂危臣子之情切於湯火故欲且盟而遣之更申後計成命已決何得拒違時臺使周石珍東宮主書左法生在綸所使疏吏翻下同確謂之曰侯景雖云欲去而不解長圍意可見也今召僕入城何益於事石珍曰敕旨如此郎那得辭確意尚堅綸大怒謂趙伯超曰譙州為我斬之為于偽翻持其首去伯超揮刃眄確眄眠見翻目斜視也曰伯超識君侯刀不識也確乃流涕入城景凡所請上父子無不從求以卻其攻乃所以速其攻也上常蔬食及圍城日久上廚蔬茹皆絕乃食雞子綸因使者蹔通上雞子數百枚上雞時掌翻料音聊歔欷哽咽歔音虛欷許既翻又音希哽古杏翻湘東王繹軍於郢州之武城水經註武口水上通安陸之延頭南至武城入大江吳舊屯所在荊州界盡此蓋今之沙武口即其地水經註湘水自汨羅口西北逕壘石山西北對青草湖祝穆曰青草湖一名巴丘湖北洞庭南瀟湘東納汨羅之水自昔與洞庭並稱按一湖之內南名青草北名洞庭中有沙洲間之所謂重湖也五代志巴東郡梁置信州唐之夔州也水經註江水自巴東魚復縣東逕廣溪峽斯乃三峽首也峽中有瞿塘黃龕二灘慥七到翻淹留不進中記室參軍蕭賁骨鯁士也以繹不早下心非之嘗與繹雙六食子未下賁曰殿下都無下意雙六亦博之一名續事始云陳思王製雙六局置骰子二唐末有葉子之戲遂加至六戰國策曰博之所以貴梟者便則食不便則止可以食子而未下者擬議其便否也賁因其未下借雙六以諷其不下救君父及得上敕繹欲旋師賁曰景以人臣舉兵向闕今若放兵未及渡江童子能斬之矣必不為也大王以十萬之衆未見賊而退柰何繹不悅未幾因事殺之幾居豈翻慥懿之孫也朝野以侯景之禍共尤朱异東魏河內民四千餘家以魏北徐州刺史司馬裔其鄉里也相帥歸之帥讀曰率下同丞相泰欲封裔裔固辭曰士大夫遠歸皇化裔豈能帥之賣義士以求榮非所願也據周書裔司馬楚之之後司馬氏本河內溫人魏孝武西遷裔始歸鄉里於溫城起義附西魏與東魏交戰頻有克獲授河內郡守尋加持節平東將軍北徐州刺史帥讀曰率朝野以侯景之禍共尤朱异侯景運東府米入石頭既畢王偉聞荊州軍退謂湘東王繹旋師也不相統壹乃說景曰王以人臣舉兵圍守宮闕逼辱主殘穢宗廟擢王之髮不足數罪用史記須賈之言擢拔也說式芮翻數所具翻欲安所容身乎背盟而捷自古多矣背蒲妹翻願且觀其變臨賀王正德亦謂景曰大功垂就豈可棄去景遂上啟陳帝十失且曰臣方事睽違所以冒陳讜直讜音黨陛下崇飾虛誕惡聞實錄上時掌翻惡烏路翻以祅怪為嘉禎祅於驕翻禎音貞祥也以天譴為無咎敷演六藝排擯前儒王莽之法也以鐵為貨輕重無常公孫之制也漢公孫述據蜀用鐵錢朝章鄙雜更始趙倫之化也漢更始濫授官爵長安為之語曰爛羊胃騎都尉爛羊頭關內侯晉趙王倫篡位貂蟬盈坐時人為之語曰貂不足狗尾續朝直遙翻更工衡翻見一百五十卷普通六年事見同上冠古玩翻又如字石虎父子事見晉成帝紀百度糜費使四民飢餒笮融姚興之代也笮融事佛事見漢獻帝紀姚興事佛事見晉安帝紀笮在各翻建康宮室崇侈陛下唯與主書參斷萬機政以賄成諸閹豪盛衆僧殷實皇太子珠玉是好酒色是耽斷丁亂翻好呼到翻吐言止於輕薄賦詠不出桑中桑中見詩衞國風淫放之詩也湘東㣥下貪縱南康定襄之屬皆如沐猴而冠耳南康王會理帝子續之子時鎮廣陵定襄侯祗南平王偉之子時鎮淮陰沐猴而冠用漢書語位則藩屏屏必郢翻臣至百日誰肯勤王此而靈長未之有也昔鬻拳兵諫王卒改善左傳鬻拳強諫楚子楚子弗從臨之以兵懼而從之卒子恤翻復奚罪乎復扶又翻伏願陛下小懲大戒引易大傳之言指斥甚矣使臣無再舉之憂陛下無嬰城之辱則萬姓幸甚上覽啟且慙且怒言皆指實而無如之何有慙怒而已丙辰朔立壇於太極殿前告天地以景違盟舉烽鼓譟初閉城之日男女十餘萬擐甲者二萬餘人考異曰南史作三萬今從典略人多身腫氣急氣急上氣喘急也被皮義翻乘城者不滿四千人率皆羸喘橫尸滿路不可瘞埋羸倫為翻喘昌兗翻瘞於計翻爛汁滿溝而衆心猶望外援柳仲禮唯聚妓妾置酒作樂妓渠綺翻諸將日往請戰仲禮不許安南侯駿說邵陵王綸曰說式芮翻考異曰典略云綸已下咸說柳仲禮如此今從太清紀城危如此而都督不救若萬一不虞殿下何顏自立於世今宜分軍為三道出賊不意攻之可以得志綸不從柳津登城謂仲禮曰汝君父在難難乃旦翻不能竭力百世之後謂汝為何仲禮亦不以為意上問策於津對曰陛下有邵陵臣有仲禮不忠不孝賊何由平考異曰典略云柳仲禮族兄暉謂仲禮曰天下事勢如此何不自取富貴仲禮曰兄今若為取之暉曰正當堅營不戰使賊平臺城囚天子徐而縱兵既破之後復挾天子令諸侯也仲禮納之按景既克城則人情皆去援軍自散仲禮安能帥以破景仲禮閉壁不出自為重傷而懼耳非用暉計也今從太清紀及南史太清紀又云景嘗登朱雀門樓與之語又遺以金自是以後閉壁不戰典略云景遺以金鐶亦以近誣今不取戊午南康王會理與羊鴉仁趙伯超等進營於東府城北約夜渡軍既而鴉仁等曉猶未至景衆覺之營未立景使宋子仙擊之趙伯超望風退走寒山之敗玄武湖側之敗及此時之敗皆趙伯超為之也戰及溺死者五千人溺奴狄翻景積其首於闕下以示城中景又使于子悅求和上使御史中丞沈浚至景所景實無去志謂浚曰今天時方熱軍未可動乞且留京師立效浚發憤責之景不對橫刀叱之示將殺浚也負恩忘義違棄詛盟詛莊助翻固天地所不容沈浚五十之年常恐不得死所何為以死相懼邪因徑去不顧景以其忠直捨之於是景決石闕前水石闕前水景決玄武湖以灌城者也晝夜不息邵陵世子堅屯太陽門太陽門臺城六門之一也蒱音蒲蒱飲摴蒱且飲酒也不恤吏士其書佐董勛熊曇朗恨之考之南史此熊曇朗非後來為盜於豫章之熊曇朗也南史侯景傳作白曇朗曇徒含翻丁卯夜向曉勛曇朗於城西北樓引景衆登城永安侯確力戰不能卻乃排闥入啟上云城已陷上安臥不動曰猶可一戰乎確曰不可上歎曰自我得之自我失之亦復何恨因謂確曰汝速去語汝父勿以二宮為念因使慰勞在外諸軍復扶又翻語牛倨翻勞力到翻俄而景遣王偉入文德殿奉謁上命褰簾開戶引偉入偉拜呈景啟稱為姦佞所蔽領衆入朝朝直遙翻驚動聖躬今詣闕待罪上問景何在可召來景入見於太極東堂以甲士五百人自衞景稽顙殿下典儀引就三公榻典儀典朝儀者也至唐猶有典儀之職掌殿上贊唱之節及設殿庭服位之次見賢遍翻稽音啟問曰卿在軍中日久無乃為勞景不敢仰視汗流被面被皮義翻又曰卿何州人而敢至此妻子猶在北邪景皆不能對任約從旁代對曰臣景妻子皆為高氏所屠唯以一身歸陛下自此以上上問景景猶慴伏初渡江有幾人景曰千人圍臺城幾人曰十萬今有幾人曰率土之內莫非己有自此以上景之辭氣悖矣上辭窮勢屈故俛首不言嗚呼景復至永福省見太子太子亦無懼容侍衞皆驚散唯中庶子徐摛太子中庶子職如侍中摛丑知翻東宮通事舍人職如中書通事舍人侯王當以禮見見賢遍翻何得如此景乃拜荀子曰善敗者不亡帝父子於此亦亡而不失其守者悲夫又不能對景退謂其廂公王僧貴曰景之親貴隆重者號曰左右廂公吾常跨鞍對陳陳讀曰陣矢刃交下而意氣安緩了無怖心今見蕭公使人自慴怖普布翻慴之涉翻豈非天威難犯吾不可以再見之於是悉撤兩宮侍衞兩宮謂上臺及東宮收朝士王侯送永福省乘繩證翻朝直遙翻使王偉守武德殿于子悅屯太極東堂矯詔大赦自加大都督中外諸軍錄尚書事考異曰梁帝紀無赦加景官在庚午今從太清紀建康士民逃難四出難乃旦翻太子洗馬蕭允洗悉薦翻至京口端居不行曰死生有命如何可逃禍之所來皆生於利苟不求利禍從何生己巳景遣石城公大款以詔命解外援軍五代志宣城郡秋浦縣舊曰石城考異曰典略在庚午梁帝紀在辛未今從太清紀將即亮翻邵陵王綸曰今日之命委之將軍仲禮熟視不對裴之高王僧辯曰將軍擁衆百萬致宮闕淪沒正當悉力決戰何所多言仲禮竟無一言諸軍乃隨方各散言諸軍各隨所來之方散去也按姚思廉梁書大連封臨城縣公自東揚州入援臺城既陷復還會稽參考通鑑前後所書皆然此誤以東揚州為南兗州當書南兗州刺史南康王會理東揚州刺史臨城公大連蓋傳寫逸南康王會理東揚州刺史十字亦當書北兗州刺史定襄侯祗前青冀二州刺史湘潭侯退五代志衡山郡有湘潭縣君正昂之子也帝平建康袁昂以節義見褒位至台司會工外翻仲禮及弟敬禮羊鴉仁王僧辯趙伯超並開營降降戶江翻下同軍士莫不歎憤仲禮等入城先拜景而後見上見賢遍翻下見父同上不與言仲禮見父津津慟哭曰汝非我子何勞相見湘東王繹使全威將軍會稽王琳送米二十萬石以饋軍至姑孰聞臺城陷沈米於江而還沈持林翻景命燒臺內積尸病篤未絕者未絕謂猶有餘息者庚午詔征鎮牧守可復本任景留柳敬禮羊鴉仁而遣柳仲禮歸司州王僧辯歸竟陵王僧辯得歸竟陵為湘東王繹用之以平侯景張本臨賀王正德與景約平城之日不得全二宮及城開正德帥衆揮刀欲入帥讀曰率景先使其徒守門故正德不果入景更以正德為侍中大司馬百官皆復舊職正德入見上更工衡翻見賢遍翻拜且泣上曰啜其泣矣何嗟及矣詩中谷有蓷之辭啜張劣翻啜者泣多而不止也讀如輟秦郡陽平盱眙三郡皆降景沈約曰晉武帝分扶風為秦國中原亂其民南流寄居堂邑堂邑本為縣西漢屬臨淮郡後漢屬廣陵國晉惠帝永興元年以臨淮淮陵立堂邑郡安帝改堂邑為秦郡五代志曰江都郡六合縣舊曰尉氏置秦郡又有安宜縣梁置陽平郡改秦郡為西兗州朝野以侯景之禍共尤朱异東徐州刺史湛海珍北青州刺史王奉伯五代志東海郡懷仁縣梁置南北二青州下邳郡梁置東徐州考異曰北青州典略作南冀州今從太清紀並章十二行本並上有淮陽太守王瑜六字乙十一行本同孔本同張校同退齋校同青州刺史明少遐山陽太守蕭鄰棄城走五代志海州懷仁縣梁置南北二青州江都郡山陽縣舊置山陽郡考異曰梁帝紀在四月今從太清紀朝野以侯景之禍共尤朱异侯景以儀同三司蕭邕為南徐州刺史代西昌侯淵藻鎮京口又遣其將徐相攻晉陵將即亮翻陸經以郡降之朝野以侯景之禍共尤朱异初上以河東王譽為湘州刺史徙湘州刺史張纘為雍州刺史代岳陽王詧纘恃其才望輕譽少年迎候有闕譽至檢括州府付度事付度者前刺史以州府之若事若物付度後刺史雍於用翻少詩照翻聞侯景作亂頗陵蹙纘纘恐為所害輕舟夜遁將之雍部復慮詧拒之復扶又翻纘與湘東王繹有舊欲因之以殺譽兄弟乃如江陵及臺城陷諸王各還州鎮譽自湖口歸湘州洞庭青草共為一湖湖口在巴陵湘東王繹以荊州刺史都督荊雍等九州慥譽詧皆其屬也欲待繹至拜謁乃還信州纘遺繹書曰河東戴檣上水欲襲江陵檣船上桅竿也所以掛帆帆汎風則船行自洞庭至江陵泝江而上故曰上水遺于季翻上時掌翻共謀不逞江陵遊軍主朱榮遊軍主領遊軍之將也桂陽留此欲應譽詧使疏吏翻繹懼鑿船沈米斬纜沈持林翻纜盧闞翻維舟索也自蠻中步道馳歸江陵囚慥殺之繹與譽詧自此隙矣侯景以前臨江太守董紹先為江北行臺五代志歷陽郡烏江縣梁置臨江郡董紹先降侯景見上卷上年召南兗州刺史南康王會理壬午紹先至廣陵衆不滿二百皆積日飢疲會理士馬甚盛僚佐說會理曰說式芮翻景已陷京邑欲先除諸藩然後篡位若四方拒絕立當潰敗柰何委全州之地以資寇手不如殺紹先發兵固守與魏連和以待其變會理素懦即以城授之紹先既入衆莫敢動會理弟通理請先還建康謂其姊曰事既如此豈可闔家受斃前途亦思立效但未知天命如何耳紹先悉收廣陵文武部曲鎧仗金帛鎧可亥翻遣會理單馬還建康為會理兄弟謀誅王偉不克而死張本朝野以侯景之禍共尤朱异湘潭侯退與北兗州刺史定襄侯祗出奔東魏侯景以蕭弄璋為北兗州刺史州民發兵拒之景遣直閤將軍羊海將兵助之海以其衆降東魏將即亮翻下同降戶江翻東魏遂據淮陰祗偉之子也朝野以侯景之禍共尤朱异癸未侯景遣于子悅等將羸兵數百東略吳郡羸倫為翻新城戍主戴僧逿有精甲五千沈約曰浙江西南名曰相溪吳立為新城縣屬吳郡今杭州新城縣即其地逷他歷翻說式芮翻賊今乏食臺中所得不支一旬若閉關拒守立可餓死土豪陸映公恐不能勝而資產被掠皆勸君正迎之被皮義翻君正素怯載米及牛酒郊迎子悅執君正掠奪財物子女東人皆立堡拒之景又以任約為南道行臺鎮姑孰任音壬朝野以侯景之禍共尤朱异夏四月湘東世子方等至江陵湘東王繹始知臺城不守命於江陵四旁七里樹木為柵掘塹三重而守之塹七豔翻重直龍翻朝野以侯景之禍共尤朱异東魏高岳等攻魏潁川不克大將軍澄益兵助之道路相繼踰年猶不下去年四月高岳等攻潁川堰洧水以灌之五代志朔方郡長澤縣後魏置闡熙郡及山鹿縣水經洧水出河南密縣西南馬領山東南過長社縣北堰於扇翻岳悉衆分休迭進言分兵為十數部甲休則乙進乙休則丙進丙休則丁進至於癸休則甲復進矣攻者得番休而應者不勝其勞也王思政身當矢石與士卒同勞苦城中泉涌懸釜而炊太師泰遣大將軍趙貴督東南諸州兵救之自長社以北皆為陂澤兵至穰穰即穰城東魏使善射者乘大艦臨城射之艦戶黯翻射之而亦翻下射殺同城垂陷燕郡景惠公慕容紹宗與劉豐生臨堰視之燕因肩翻見東北塵起同入艦坐避之俄而暴風至遠近晦冥纜斷飄船徑向城纜盧瞰翻城上人以長鉤牽船弓弩亂發紹宗赴水溺死溺奴狄翻豐生游上向土山浮水而行曰游上時掌翻朝野以侯景之禍共尤朱异甲辰東魏進大將軍勃海王澄位相國封齊王加殊禮時令澄贊拜不名入朝不趨劍履上殿丁未澄入朝于鄴固辭不許澄召將佐密議之皆勸澄宜膺朝命朝直遙翻獨散騎常侍陳元康以為未可澄由是嫌之崔暹乃薦陸元規為大行臺郎以分元康之權朝野以侯景之禍共尤朱异湘東王繹之入援也令所督諸州皆發兵雍州刺史岳陽王詧遣府司馬劉方貴將兵出漢口雍於用翻將即亮翻下同繹召詧使自行詧不從方貴潛與繹相知謀襲襄陽未發會詧以他事召方貴方貴以為謀泄遂據樊城拒命詧遣軍攻之繹厚資遣張纘使赴鎮纘至大堤沈約志華山郡治大隄五代志襄陽郡漢南縣宋置華山郡唐併漢南入宜城縣九域志宜城在襄州南九十里曾鞏曰宋武帝築宜城之大隄為城今縣治是也斬方貴纘至襄陽詧推遷未去但以城西白馬寺處之處昌呂翻詧猶總軍府之政聞臺城陷遂不受代助防杜岸紿纘曰觀岳陽勢不容使君不如且往西山以避禍西山謂萬山以西中廬縣諸山也紿待亥翻兄弟九人皆以驍勇著名杜氏兄弟嵩岑嶷岌巘岸崱嵷幼安凡九人驍堅堯翻著婦人衣著陟略翻乘青布輿逃入西山詧使岸將兵追擒之纘乞為沙門更名法纘詧許之張纘間構譽詧兄弟於湘東凶于而身害于而國更工衡翻朝野以侯景之禍共尤朱异荊州長史王沖等上牋於湘東王繹請以太尉都督中外諸軍事承制主盟主盟者主諸藩之盟丙辰又請以司空主盟亦不許朝野以侯景之禍共尤朱异上雖外為侯景所制而內甚不平景欲以宋子仙為司空上曰調和陰陽安用此物三公燮理陰陽言宋子仙非其人也梁禁中諸殿皆有主帥杜佑曰凡言便殿者皆非正大之處又曰便殿寢側之別殿帥所類翻景不能強強其兩翻心甚憚之太子入泣諫上曰誰令汝來若社稷有靈猶當克復如其不然何事流涕景使其軍士入直省中或驅驢馬帶弓刀出入宮庭上怪而問之直閤將軍周石珍對曰侯丞相甲士上大怒叱石珍曰是侯景何謂丞相左右皆懼是後上所求多不遂志飲膳亦為所裁節憂憤成疾太子以幼子大圜屬湘東王繹屬之欲翻託也幷剪爪髮以寄之五月丙辰上臥淨居殿口苦索蜜不得索山客翻再曰荷荷荷下可翻遂殂年八十六景祕不發喪遷殯於昭陽殿侯景時居昭陽殿使如常入朝朝直遙翻王偉陳慶皆侍太子太子嗚咽流涕不敢泄聲殿外文武皆莫之知朝野以侯景之禍共尤朱异東魏高岳既失慕容紹宗等志氣沮喪不敢復逼長社城杜佑曰許州長葛縣故長社城王思政所守也沮在呂翻喪息浪翻復扶又翻王自輔政以來未有殊功雖破侯景本非外賊太清元年高澄輔政次年破侯景願王自以為功澄從之戊寅自將步騎十萬攻長社將即亮翻騎奇寄翻親臨作堰堰三決澄怒推負土者及囊幷塞之推吐雷翻塞悉則翻朝野以侯景之禍共尤朱异辛巳發高祖喪帝殂二十六日而後發喪是日太子即皇帝位大赦侯景出屯朝堂分兵守衞景自昭陽殿出屯朝堂朝堂蓋在太極殿左右朝直遙翻朝野以侯景之禍共尤朱异壬午詔北人在南為奴婢者皆免之所免萬計景或更加超擢冀收其力高祖之末建康士民服食器用爭尚豪華糧無半年之儲常資四方委輸毛晃曰漢有三輔委輸官掌委輸者也凡以物送之曰輸則音平聲指所送之物曰輸則音去聲委輸之委亦音去聲道路斷絕數月之間人至相食猶不免餓死存者百無一二金陵記曰梁都之時戶二十八萬西石頭城東至倪塘南至石子岡北過蔣山南北各四十里侯景之亂至于陳時中外人物不迨宋齊之半禾呂禾呂音呂禾不因播種而生曰禾呂填委溝壑不可勝紀勝音升癸未景遣儀同三司來亮入宛陵宛陵縣漢屬丹楊郡晉分為宣城郡治所五代志宣城郡治宣城縣舊曰宛陵甲申景遣其將李賢明攻之不克華讀曰花誘音酉將即亮翻下同考異曰典略在四月今從太清紀景又遣中軍侯子鑒入吳郡中軍中軍都督也單音蟬遣儀同宋子仙等將兵東屯錢塘新城戍主戴僧逷拒章十二行本拒上有據縣二字乙十一行本同孔本同退齋校同之御史中丞沈浚避難東歸難乃旦翻至吳興太守張嵊與之合謀舉兵討景嵊稷之子也嵊石證翻張稷弒齊東昏侯後死於鬱洲東揚州刺史臨城公大連亦據州不受景命五代志會稽郡梁置東揚州唯吳郡以西南陵以北而已朝野以侯景之禍共尤朱异魏詔太和中代人改姓者皆復其舊改姓見一百四十卷齊明帝建武三年朝野以侯景之禍共尤朱异六月丙戌以南康王會理為侍中司空考異曰梁紀作戊戌今從太清紀朝野以侯景之禍共尤朱异丁亥立宣城王大器為皇太子考異曰太清紀云七日今從梁帝紀及典略朝野以侯景之禍共尤朱异初侯景將使太常卿南陽劉之遴授臨賀王正德璽綬之遴剃髮僧服而逃之遴良刃翻璽斯氏翻綬音受剃他計翻之遴博學能文嘗為湘東王繹長史將歸江陵繹素嫉其才己丑之遴至夏口繹密送藥殺之夏戶雅翻而自為誌銘厚其賻贈賻音附朝野以侯景之禍共尤朱异壬辰封皇子大心為尋陽王大款為江陵王大臨為南海王大連為南郡王大春為安陵王大成為山陽王大封為宜都王考異曰太清紀典略並與立太子同日今從梁帝紀朝野以侯景之禍共尤朱异長社城中無鹽人病攣腫攣呂緣翻死者什八九大風從西北起吹水入城城壞東魏大將軍澄令城中曰有能生致王大將軍者封侯若大將軍身有損傷親近左右皆斬太清元年西魏授王思政大將軍故以稱之東魏築土山以攻潁川思政奪而據之帥讀曰率吾力屈計窮唯當以死謝國因仰天大哭西向再拜欲自刎刎扶粉翻都督駱訓曰公常語訓等語牛倨翻汝齎我頭出降降戶江翻非但得富貴亦完一城人今高相既有此令相息亮翻公獨不哀士卒之死乎衆共執之不得引決澄遣通直散騎趙彥深就土山遺以白羽扇遣于季翻執手申意牽之以下澄不令拜延而禮之思政初入潁川將士八千人將即亮翻下同及城陷纔三千人卒無叛者卒子恤翻澄悉散配其將卒於遠方改潁州為鄭州按魏收志潁州本治長社既改鄭州徙治潁陰城領許昌潁川陽翟郡西閤祭酒盧潛曰後齊之制三師二大三公各置東西閤祭酒二大大司馬大將軍也思政不能死節何足可重澄謂左右曰我有盧潛乃是更得一王思政潛度世之曾孫也盧度世事魏太武帝初思政屯襄城欲以長社為行臺治所遣使者魏仲啟陳於太師泰使疏吏翻幷致書於淅州刺史崔猷魏收志淅州領脩陽朱陽南上洛淅陽固郡五代志淅陽郡西魏置淅州唐志鄧州內鄉縣本淅陽郡治襄城控帶京洛寔當今之要地如有動靜易相應接潁川既鄰寇境又無山川之固賊若潛來徑至城下莫若頓兵襄城為行臺之所潁川置州遣良將鎮守則表裏膠固人心易安將即亮翻易弋豉翻縱有不虞豈能為患仲見泰具以啟聞具以思政所請崔猷所報二者皆啟聞也思政固請且約賊水攻期年期讀曰朞陸攻三年之內朝廷不煩赴救泰乃許之及長社不守泰深悔之猷孝芬之子也崔孝芬為高歡所殺子猷入關事見一百五十六卷中大通六年侯景之南叛也事見一百六十卷元年復扶又翻使諸將分守諸城及潁川陷泰以諸城道路阻絕皆令拔軍還史言宇文泰不求廣地之名而審計利害之實朝野以侯景之禍共尤朱异上甲侯韶自建康出奔江陵稱受高祖密詔徵兵考異曰梁帝紀在五月今從太清紀自餘藩鎮並加位號朝野以侯景之禍共尤朱异宋子仙圍戴僧逷不克丙午吳盜陸緝等考異曰典略作戊子陸黯今從太清紀南史殺蘇單于推前淮南太守文成侯寧為主朝野以侯景之禍共尤朱异臨賀王正德怨侯景賣己密書召鄱陽王範使以兵入景遮得其書癸丑縊殺正德縊於賜翻又於計翻考異曰典略五月正德死今從太清紀南史景以儀同三司郭元建為尚書僕射北道行臺總江北諸軍事鎮新秦舊置秦郡於六合新秦即秦郡也簡文帝之廢也元建自秦郡馳還諫景此可證也考異曰太清紀在八月二十八日今從典略常寘左右邵陵王綸潛遣人呼之確曰景輕佻佻吐彫翻一夫力耳我欲手刃之正恨未得其便卿還啟家王勿以確為念景與確遊鍾山引弓射鳥因欲射景射而亦翻弦斷不發景覺而殺之考異曰太清紀確死在九月今從典略朝野以侯景之禍共尤朱异湘東王繹娶徐孝嗣孫女為生世子方等醜而妬又多失行行下孟翻下穢行同繹二三年一至其室聞繹當至以繹目眇為半面妝以待之繹怒而出故方等亦無寵及自建康還江陵繹見其御軍和整始歎其能入告徐不對垂泣而退繹怒疏其穢行牓于大閤方等見之益懼湘州刺史河東王譽驍勇得士心繹將討侯景遣使督其糧衆驍堅堯翻使疏吏翻下同譽曰各自軍府何忽隸人使者三返譽不與方等請討之繹乃以少子安南侯方矩為湘州刺史使方等將精卒二萬送之少詩照翻將即亮翻考異曰太清紀云初上遣諮議參軍周弘直往湘州報河東王譽云侯景既須撲滅今欲遣荊州兵力使汝東往但使諸蕭有一人能匡國難吾無所惜譽對弘直攘袂云身始至鎮百度俱闕征伐之任便未能行又遣舍人虞預至譽所曰周弘直還知汝必不能自出師吾今便長驅席卷還望三湘兵糧以相資給譽又拒絕意色殊憤上又遣錄事參軍劉瑴往雍宣旨於岳陽王詧曰吾舟艦足乘唯糧仗闕少湘州有米已就譽求雍部精兵必能分遣行留之計爾自擇之詧答曰兵馬蕃扞所須非敢減撤襄陽形勝之地豈可蹔虛瑴出謂雍州別駕甄玄成曰觀殿下辭色曾無匡復之意卿是股肱所寄可相毗贊邪答曰樊沔衝要皇業所基人情驍勇山川險固君其雅識寧俟多言瑴曰本論東討共征獯逆義異西伯非敢聞命於是湘雍二蕃成亂謀矣是月上遣世子方等往湘州具陳軍國之計誡方等曰吾近累遣使往湘並未相脣齒今故令汝至彼必望申吾意若能得相隨下可留王沖權知州事譽遂不受命潛圖構逆此皆蕭韶為元帝隱惡飾辭耳今從梁書南史方等將行謂所親曰是行也吾必死之死得其所吾復奚恨方等不死於救臺城之時而死於伐湘州之日可謂得其死乎復扶又翻朝野以侯景之禍共尤朱异侯景以趙威方為豫章太守江州刺史尋陽王大心遣軍拒之擒威方繫州獄威方逃還建康朝野以侯景之禍共尤朱异湘東世子方等軍至麻溪據水經註麻溪水口在臨湘縣北瀏口戍南方等軍敗溺死溺奴狄翻安南侯方矩收餘衆還江陵湘東王繹無戚容繹寵姬王氏生子方諸王氏卒繹疑徐為之疑其毒殺之赴井死葬以庶人禮不聽諸子制服史言湘東猜薄朝野以侯景之禍共尤朱异西江督護陳霸先欲起兵討侯景景使人誘廣州刺史元景仲許奉以為主元景仲法僧之子普通六年父子歸梁誘音酉陰圖霸先霸先知之與成州刺史王懷明等集兵南海五代志蒼梧郡梁置成州南海郡即廣州治所元景仲與賊合從從子容翻朝廷遣曲陽侯勃為刺史軍已頓朝亭酈道元曰廣州城東北三十里有朝臺昔尉佗因岡作臺北面朝漢圓基千步直峭百丈頂上三畝複道環迴逶迤曲折朔望升拜名曰朝臺朝直遙翻皆棄景仲而散秋七月甲寅景仲縊於閤下縊於賜翻霸先迎定州刺史蕭勃鎮廣州前高州刺史蘭裕欽之弟也五代志高涼郡梁置高州蘭欽見一百五十七卷大同元年攻監衡州事歐陽頠誘音酉監工銜翻下同頠魚毀翻勃使霸先救之悉擒裕等考異曰太清紀擒裕在八月今從陳書朝野以侯景之禍共尤朱异湘東王繹遣竟陵太守王僧辯信州刺史東海鮑泉擊湘州分給兵糧刻日就道僧辯以竟陵部下未盡至欲俟衆集然後行與泉入白繹求申期申重也重為期日按劍厲聲曰卿憚行拒命欲同賊邪今日唯有死耳因斫僧辯中其左髀中竹仲翻悶絕久之方蘇即送獄泉震怖不敢言怖普布翻僧辯母徒行流涕入謝自陳無訓繹意解賜以良藥故得不死丁卯鮑泉獨將兵伐湘州將即亮翻考異曰太清紀作八日或者八日受命丁卯乃行也朝野以侯景之禍共尤朱异陸緝等競為暴掠吳人不附宋子仙自錢塘旋軍擊之時宋子仙攻戴僧逷屯錢塘壬戌緝棄城奔海鹽吳記曰海鹽本名武原鄉秦以為縣屬吳郡今屬嘉興府在府東南八十里復扶又翻戊辰侯景置吳州於吳郡以安陸王大春為刺史朝野以侯景之禍共尤朱异庚午以南康王會理兼尚書令考異曰太清紀在八月二十六日今從典略朝野以侯景之禍共尤朱异鄱陽王範聞建康不守戒嚴欲入僚佐或說之曰今魏人已據壽陽大王移足則虜騎必窺合肥前賊未平後城失守說式芮翻守式又翻將若之何不如待四方兵集使良將將精卒赴之將即亮翻下同進不失勤王退可固本根範乃止會東魏大將軍澄遣西兗州刺史李伯穆逼合肥又使魏收為書諭範範方謀討侯景藉東魏為援乃帥戰士二萬出東關以合州輸伯穆帥讀曰率幷遣諮議劉靈議送二子勤廣為質于東魏以乞師諮議者諮議參軍質音致遣世子嗣將千餘人守安樂柵安樂柵者範所立柵以安樂名之然臺城覆陷父兄蒙塵此子弟沫血枕戈之時以安樂名柵非名也樂音洛範糧乏采苽稗菱藕以自給苽與菰同音孤雕菰米本草又謂之茭白歲久中心生白臺謂之菰米其臺中有黑者謂之茭鬱至後結實乃雕胡黑米也稗蒲賣翻稗者似稻其實尖圓而細勤廣至鄴東魏人竟不為出師為于偽翻範進退無計進則孤羸之軍不足以制侯景退則合肥已為東魏人所據上時掌翻樅陽縣漢屬廬江郡晉書五代志同安郡同安縣舊曰樅陽幷置樅陽郡師古曰樅七容翻範將裴之悌以衆降之降戶江翻之悌之高之弟也朝野以侯景之禍共尤朱异東魏大將軍澄詣鄴辭爵位殊禮且請立太子澄謂濟陰王暉業曰比讀何書暉業曰數尋伊霍之傳不讀曹馬之書謂伊霍輔少主曹馬篡國也濟子禮翻比毗至翻數所角翻傳直戀翻朝野以侯景之禍共尤朱异八月甲申朔侯景遣其中軍都督侯子鑒等擊吳興朝野以侯景之禍共尤朱异己亥鮑泉軍于石椁寺河東王譽逆戰而敗辛丑又敗于橘洲晏公類要曰橘洲在長沙西南四十里湘江中四洲橘洲其一也水經註沅水東逕龍陽縣之汎洲洲長二十里吳丹楊太守李衡植柑於其上臨死敕其子曰吾州里有木奴千頭不責衣食歲絹千疋今洲上猶有遺枿余按汎洲乃柑洲非橘洲水經註又云湘水北過臨湘縣西又北過南津城西西對橘洲此則是也類要亦指此張舜民郴行錄橘洲東對潭州城溺奴狄翻譽退保長沙衆章十二行本衆作泉乙十一行本同孔本同退齋校同熊校同引軍圍之朝野以侯景之禍共尤朱异辛卯東魏立皇子長仁為太子勃海文襄王澄以其弟太原公洋次長次長言於兄弟行澄居長而洋次之長竹丈翻洋深自晦匿言不出口常自貶退與澄言無不順從澄輕之常曰此人亦得富貴相書亦何可解相息亮翻古之唐舉許負皆相視之骨法狀貌以知吉凶貴賤有相書傳於世解戶買翻洋為其夫人趙郡李氏營服玩小佳為于偽翻下為爾同澄輒奪取之夫人或恚未與恚於避翻洋笑曰此物猶應可求兄須何容吝惜須者意所欲亦求也洋即受之亦無飾讓每退朝還第朝直遙翻輒閉閤靜坐雖對妻子能竟日不言或時袒跣奔躍夫人問其故洋曰為爾漫戲漫戲言漫爾作戲澄獲徐州刺史蘭欽子京以為膳奴蘭欽仕梁為徐州刺史考異曰陳元康傳作蘭固成今從北齊帝紀不許京屢自訴澄杖之曰更訴當殺汝京與其黨六人謀作亂澄在鄴居北城東柏堂嬖琅邪公主琅邪公主事始見一百五十九卷大同十一年間古莧翻侍衞者常遣出外辛卯澄與散騎常侍陳元康吏部尚書侍中楊愔黃門侍郎崔季舒屏左右謀受魏禪惜於今翻屏必郢翻署擬百官蘭京進食澄卻之謂諸人曰昨夜夢此奴斫我當急殺之京聞之置刀盤下冒言進食澄怒曰我未索食索山客翻求也何為遽來京揮刀曰來殺汝澄自投傷足入于牀下賊去床弒之去羌呂翻愔狼狽走遺一靴靴許戈翻季舒匿于廁中元康以身蔽澄與賊爭刀被傷腸出被皮義翻下同庫直王紘冒刃禦賊紇奚舍樂鬬死時變起倉猝內外震駭太原公洋在城東雙堂聞之顏色不變指揮部分分扶問翻入討㣥賊斬而臠之臠力兗翻割切其肉也徐出曰奴反大將軍被傷無大苦也內外莫不驚異洋素自晦匿今遇變而不為之變故皆驚而異之陳元康手書辭母口占使功曹參軍祖珽作書陳便宜珽待鼎翻至夜而卒洋殯之第中詐云出使使疏吏翻虛除元康中書令幷祕陳元康死問亦所以鎮安人情紘基之子也王基見一百五十六卷中大通六年勳貴以重兵皆在幷州勸洋早如晉陽洋從之夜召大將軍督護太原唐邕使部分將士鎮遏四方分扶問翻邕支配須臾而畢支分也配隸也支配猶今人言品配癸巳洋諷東魏主以立太子大赦託建儲大赦以安蘭京之黨心懷反側者東魏主竊謂左右曰大將軍今死似是天意威權當復歸帝室矣復扶又翻下可復同洋留太尉高岳太保高隆之開府儀同三司司馬子如侍中楊愔守鄴餘勳貴皆自隨甲午入謁東魏主於昭陽殿從甲士八千人登階者二百餘人皆攘袂扣刃若對嚴敵令主者傳奏曰臣有家事須詣晉陽主者主朝儀者也東魏主失色目送之曰此人又似不相容朕不知死在何日晉陽舊臣宿將素輕洋及至大會文武神彩英暢言辭敏洽衆皆大驚晉陽文武之驚洋猶鄴城內外也洋皆改之高隆之司馬子如等惡度支尚書崔暹惡烏路翻奏暹及崔季舒過惡鞭二百徙邊二人素為澄所親任故隆之等惡之朝野以侯景之禍共尤朱异侯景以宋子仙為司徒郭子章十二行本子作元乙十一行本同孔本同建為尚書左僕射與領軍任約等四十人並開府儀同三司仍詔自今開府儀同不須更加將軍梁制雖三公亦加將軍號今開府儀同三司亦不加不可復記矣朝野以侯景之禍共尤朱异鄱陽王範自樅陽遣信告江州刺史尋陽王大心樅七容翻大心遣信邀之範引兵詣江州大心以湓城處之一棲不兩雄為範與大心互相猜忌張本處昌呂翻朝野以侯景之禍共尤朱异吳興兵力寡弱張嵊書生不閑軍旅閑習也嵊歎曰袁氏世濟忠貞袁氏自淑至顗粲及昂皆以忠貞著節吾豈不知吳郡既沒吳興勢難久全但以身許國有死無貳耳九月癸丑朔子鑒軍至吳興嵊戰敗還府整服安坐子鑒執送建康侯景嘉其守節欲活之嵊曰吾忝任專城朝廷傾危不能匡復今日速死為幸景猶欲全其一子嵊曰吾一門已在鬼錄魏文帝書曰觀其姓名已為鬼錄錄籍也景怒盡殺之張嵊闔門死義以雪其父弒君之醜血祀絕矣沈浚責侯景之時視死如歸其後與張嵊起兵豈望生邪朝野以侯景之禍共尤朱异河東王譽告急於岳陽王詧詧留諮議參軍濟陽蔡大寶守襄陽帥衆二萬騎二千伐江陵以救湘州濟子禮翻帥讀曰率騎奇寄翻湘東王繹大懼遣左右就獄中問計於王僧辯僧辯具陳方略繹乃赦之以為城中都督乙卯詧至江陵作十三營以攻之會大雨平地水深四尺深式浸翻詧軍氣沮沮在呂翻繹與新興太守杜崱有舊漢獻帝建安十二年省雲中定襄五原朔方四郡郡立一縣合為新興郡屬幷州晉江左僑立於荊州界領定襄廣牧等縣五代志南郡安興縣舊置廣牧定襄縣唐省安興縣入江陵則新興固荊州所統矣何待繹以舊好密邀崱哉蓋崱雖帶新興太守實從軍在襄陽也崱士力翻乙丑崱與兄岌岸弟幼安兄子龕各帥所部降于繹岌魚及翻龕苦含翻降戶江翻岸請以五百騎襲襄陽晝夜兼行去襄陽三十里城中覺之蔡大寶奉詧母龔保林保林宮中女官自漢以來有之顏師古曰保安也言其可安衆如林也齊高帝建元三年太子宮置三內職良娣比開國侯保林比五等侯才人比駙馬都尉詧聞之夜遁棄糧食金帛鎧仗於湕水不可勝紀鎧可亥翻丁度曰湕紀偃切水名出南郡今荊門軍北百里有建水蓋即此水也勝音升張纘病足詧載以隨軍及敗走守者恐為追兵所及殺之棄尸而去考異曰太清紀云詧使制文檄纘曰吾蒙朝廷不世之榮又荷湘東王國士之眷今日雖死義無操筆及軍敗將殺之纘曰若使南師必振北賊將亡吾雖死無所恨遂殺之棄尸於江陵北湖又云諸將並欲追躡上以如子之情情所未忍曰彼不應來而來明其為逆我應逐不逐見我之弘此蓋亦蕭韶之虛美今從南史岸奔廣平依其兄南陽太守山獻晉渡江南僑立廣平郡於襄陽宋以漢南陽郡之朝陽縣為實土水經註古朝陽縣在新野縣西山獻與巘同魚蹇翻朝野以侯景之禍共尤朱异湘東王繹以鮑泉圍長沙久不克怒之以平南將軍王僧辯代為都督數泉十罪數所具翻命舍人羅重懽與僧辯偕行重直龍翻泉聞僧辯來愕然曰得王竟陵來助我賊不足平拂席待之僧辯入背泉而坐背蒲妹翻曰鮑郎卿有罪令旨使我鎖卿時繹下書於所部稱令故曰令旨使重懽宣令鎖之牀側泉為啟自申申明也理也繹怒解遂釋之朝野以侯景之禍共尤朱异冬十月癸未朔東魏以開府儀同三司潘相樂為司空朝野以侯景之禍共尤朱异初歷陽太守莊鐵帥衆歸尋陽王大心鐵歸大心見一百六十一卷太清二年帥讀曰率鐵至郡即叛推觀寧侯永為主永範之弟也丁酉鐵引兵襲尋陽大心遣其將徐嗣徽逆擊破之鐵走至建昌建昌縣漢和帝永元十六年分海昏立屬豫章郡鐵失其母弟妻子單騎還南昌南昌漢舊縣豫章郡治所朝野以侯景之禍共尤朱异宋子仙自吳郡趣錢塘劉神茂自吳興趣富陽前武州刺史富陽孫國恩以城降之趣七喻翻降戶江翻下同朝野以侯景之禍共尤朱异十一月乙卯葬武皇帝于脩陵考異曰太清紀云十四日梓宮達于脩陵今從梁書朝野以侯景之禍共尤朱异百濟遣使入貢使疏吏翻見城關荒圮圮部鄙翻毀也異於曏來毛晃曰昔來謂之曏來端門臺城正南門之中門錄送莊嚴寺錄拘也收也莊嚴寺近建康南郊壇朝野以侯景之禍共尤朱异壬戌宋子仙急攻錢塘戴僧逷降之朝野以侯景之禍共尤朱异岳陽王詧使將軍薛暉攻廣平拔之獲杜岸送襄陽詧拔其舌鞭其面支解而烹之又發其祖父墓焚其骸而揚之以其頭為漆椀詧既與湘東王繹為敵恐不能自存遣使求援於魏請為附庸鄭康成曰附庸以國事附於大國也繹使司州刺史柳仲禮鎮竟陵以圖詧詧懼遣其王氏及世子嶚為質於魏嶚力么翻質音致丞相泰欲經略江漢以開府儀同三司楊忠都督三荊等十五州諸軍事鎮穰城仲禮至安陸安陸太守柳章十二行本柳作沈乙十一行本同孔本同退齋校同勰以城降之勰音協仲禮留長史馬岫與其弟子禮守之帥衆一萬趣襄陽泰遣楊忠及行臺僕射長孫儉將兵擊仲禮以救詧為西魏因詧而幷繹張本朝野以侯景之禍共尤朱异宋子仙乘勝渡浙江至會稽會工外翻邵陵王綸聞錢塘已敗出奔鄱陽考異曰南史云東土皆附綸臨城公大連懼將害己乃圖之綸覺之乃去今從典略五代志開建縣屬熙平郡隋以熙平郡為連州破之範當作綸朝野以侯景之禍共尤朱异魏楊忠將至義陽太守馬伯符以下溠城降之五代志漢東郡唐城縣後魏曰㵐西置義陽郡西魏改㵐西為下溠杜佑曰下溠戍在漢東郡棗陽縣東南百餘里九域志唐城在隨州西北八十五里左傳楚人除道梁溠營軍臨隨即此溠水溠音側駕翻字林壯加翻鄉讀曰嚮伯符岫之子也朝野以侯景之禍共尤朱异南郡王大連為東揚州刺史時會稽豐沃勝兵數萬會工外翻勝音升糧仗山積東土人懲侯景殘虐咸樂為用樂音洛而大連朝夕酣飲不恤軍事司馬東陽留異凶狡殘暴為衆所患大連悉以軍事委之十二月庚寅宋子仙攻會稽大連棄城走異奔還鄉里尋以其衆降於子仙大連欲奔鄱陽異為子仙鄉導追及大連於信安漢獻帝初平二年分太末立新安縣晉武帝太康元年更名信安五代志東陽郡信安縣有江山即今江山縣也宋白曰信安縣漢太末縣地漢末為新安晉為信安唐為衢州治所唐又分信安之南川為江山縣考異曰典略云十二月庚子朔擒大連按是月壬午朔今從太清紀章十二行本康下有大連猶醉不之知七字乙十一行本同孔本同張校同退齋校同帝聞之引帷自蔽掩袂而泣不忍見其子之俘執也公侯在會稽者俱南度嶺景以留異為東陽太守為後留異據東陽張本質音致朝野以侯景之禍共尤朱异乙酉東魏以幷州刺史彭樂為司徒朝野以侯景之禍共尤朱异邵陵王綸進至九江尋陽王大心以江州讓之綸不受引兵西上上時掌翻朝野以侯景之禍共尤朱异始興太守陳霸先結郡中豪傑欲討侯景郡人侯安都張偲等各帥衆千餘人歸之偲新茲翻又倉才翻霸先遣主帥杜僧明將二千人頓於嶺上大庾嶺也帥所類翻將即亮翻侯景驍雄天下無敵驍堅堯翻前者援軍十萬士馬精強猶不能克謂柳仲禮等將何所之如聞嶺北王侯又皆鼎沸親尋干戈謂荊雍湘三州詎可暗投漢鄒陽曰明月之珠夜光之璧以暗投人於道路人無不按劍而相眄者無因而至前也遙張聲勢保太山之安也霸先曰僕荷國恩往聞侯景渡江即欲赴援遭值元蘭梗我中道荷下可翻元蘭謂元景仲及蘭裕也令京都覆沒君辱臣死誰敢愛命君侯體則皇枝蕭勃武帝從弟吳平侯昺之子故云然遣僕一軍猶賢乎已猶賢乎已用孔子語已止也此言猶勝乎止而不遣軍也乃遣使間道詣江陵受湘東王繹節度使疏吏翻間古莧翻時南康土豪蔡路養起兵據郡勃乃以腹心譚世遠為曲江令曲江縣漢屬桂陽郡吳屬始興郡唐為韶州同遏霸先為陳霸先破蔡養張本朝野以侯景之禍共尤朱异魏楊忠拔隨郡執太守桓和五代志漢東郡隨縣舊置隨郡朝野以侯景之禍共尤朱异東魏使金門公潘樂等將兵五萬襲司州刺史夏侯強降之於是東魏盡有淮南之地太清二年東魏使辛術略江淮之北至是方盡有淮南之地王崇武標點容肇祖聶崇岐覆校
