body:
  text: 資治通鑑卷第二百五十六端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註唐紀七十二僖宗惠聖恭定孝皇帝下之上中和四年中和四年甲辰八八四中和四年六月壬辰東川留後高仁厚奏鄭君雄斬楊師立出降仁厚圍梓州久不下乃為書射城中道其將士曰仁厚不忍城中玉石俱焚為諸君緩師十日射而亦翻道讀曰導為于偽翻使諸君自成其功若十日不送師立首當分見兵為五番見賢遍翻番分晝夜以攻之於此甚逸於彼必困矣五日不下四面俱進克之必矣諸君圖之數日君雄大呼於衆曰呼火故翻天子所誅者元惡耳他人無預也衆呼萬歲大譟突入府中師立自殺君雄挈其首出降考異曰張耆舊傳四年七月一日高僕射羽檄入城云云師立自殺七月三日張鄭二將持師立首級出降七月七日高僕射上東川句延慶傳曰三年五月高公進軍東川城下飛檄入城師立自刎七月辛酉師立首級至成都實錄六月丙申高仁厚奏東川都將鄭君雄梟斬楊師立傳首於行在是日詔以仁厚為東川節度使續寶運錄二月梓州觀察使楊師立反敕差蜀將高仁厚等討平六月三日收得梓州幷楊師立首級至駕前新紀七月辛酉楊師立伏誅今日從續寶運錄事從實錄陳敬瑄釘其子於城北釘丁定翻敬瑄三子出觀之釘者呼曰呼火故翻茲事行及汝曹汝曹於後努力領取三子走馬而返以高仁厚為東川節度使中和四年甲辰武寧將李師悅與尚讓追黃巢至瑕丘敗之宋白曰春秋以邾子益來囚諸負瑕杜預註云魯邑也高平郡南平陽縣西北有瑕丘城漢為瑕丘縣敗補邁翻走至狼虎谷狼虎谷在泰山東南萊蕪界丙午巢甥林言斬巢兄弟妻子首將詣時溥遇沙陀博野軍奪之幷斬言首以獻於溥黃巢乾符三年起兵為盜至是凡十年而滅考異曰續寶運錄曰尚讓降徐州黃巢走至碣山路被諸軍趁逼甚乃謂外甥朱彥之云云外甥再三不忍下手黃巢乃自刎過與外甥外甥將至路被沙陀博野奪卻兼外甥首級一時送都統軍中舊紀七月癸酉賊將林言斬黃巢黃揆黃秉三人首級降舊傳巢入泰山徐帥時溥遣將張友與尚讓之衆掩捕之至狼虎谷巢將林言斬巢及二弟鄴揆等七人首幷妻子函送徐州新紀七月壬午黃巢伏誅新傳巢計蹙謂林言曰汝取吾首獻天子可得富貴毋為他人利言巢甥也不忍巢乃自刎不殊言因斬之函首將詣時溥而太原博野軍殺言與巢首俱上今從新傳中和四年蔡州節度使秦宗權縱兵四出侵噬鄰道天平節度使朱瑄有衆三萬從父弟瑾勇冠軍中瑄荀緣翻當作宣瑾渠吝翻冠古玩翻宣武節度使朱全忠為宗權所攻勢甚窘窘渠隕翻求救於瑄瑄遣瑾將兵救之敗宗權於合鄉敗補邁翻全忠德之與瑄約為兄弟朱全忠反覆小人也兵勢單弱則與朱瑄為兄弟兵勢既強則反眼為仇敵必誅屠以快其志而後已如斯人可與共功名哉中和四年秋七月壬午時溥遣使獻黃巢及家人首幷姬妾上御大玄樓受之大玄樓成都羅城正南門樓高駢之築成都羅城既訖功以周易筮之得大畜駢曰畜者養也濟以剛健篤實輝光日新吉孰大焉文宜去下存上因名大玄城汝曹皆勳貴子女世受國恩何為從賊其居首者對曰狂賊凶逆國家以百萬之衆失守宗祧播遷巴蜀祧他彫翻今陛下以不能拒賊責一女子置公卿將帥於何地乎上不復問皆戮之於市復扶又翻人爭與之酒其餘皆悲怖昏醉居首者獨不飲不泣至於就刑神色肅然考異曰張耆舊傳中和三年五月二十日北路軍前進到黃巢首級妻男今不取其年月而取其事中和四年朱全忠擊秦宗權敗宗權于殷水敗補邁翻中和四年李克用至晉陽大治甲兵治直之翻遣榆次鎮將鴈門李承嗣奉表詣行在自陳有破黃巢大功為朱全忠所圖僅能自免將佐已下從行者三百餘人幷牌印皆沒不返古者授官賜印綬常佩之於身至解官則解印綬至唐始置職印任其職者傳而用之其印盛之以匣當官者寘之臥內別為一牌使吏掌之以謹出入印出而牌入牌出則印入故謂之牌印云臣已死行營兵潰令所在邀遮屠翦勿令漏失將士皆號泣冤訴號戶刀翻請復仇讎臣以朝廷至公當俟詔命拊循抑止復歸本道乞遣使按問發兵誅討臣遣弟克勤將萬騎在河中俟命時朝廷以大寇初平方務姑息得克用表大恐但遣中使賜優詔和解之克用前後凡八表稱全忠妬功疾能陰狡禍賊異日必為國患惟乞下詔削其官爵臣自帥本道兵討之不用度支糧餉唐舊制諸鎮兵出境征討皆仰給度支帥讀曰率稱吾深知卿冤方事之殷杜預曰殷盛也余謂殷衆也言方事之衆多也克用終鬱鬱不平時藩鎮相攻者朝廷不復為之辯曲直復扶又翻為于偽翻由是互相吞噬惟力是視皆無所稟畏矣中和四年八月李克用奏請割麟州隸河東麟州本屬振武節度考異曰新方鎮表中和二年河東節度增領麟州誤也今從唐末見聞錄皆許之由是昭義分為二鎮澤潞為一鎮邢洺磁為一鎮克用奏罷雲蔚防禦使依舊隸河東武宗會昌三年分河東雲蔚朔三州置大同軍都團練使次年升為都防禦使中和四年九月己未加朱全忠同平章事中和四年以右僕射大明宮留守王徽知京兆尹事上以長安宮室焚毀故久留蜀未歸徽招撫流散戶口稍歸復繕治宮室百司粗有緒治直之翻粗坐五翻冬十月關東藩鎮表請車駕還京師中和四年朱全忠之降也義成節度使王鐸為都統承制除官事見上卷二年降戶江翻事鐸禮甚恭鐸依以為援汴滑鄰道而鐸於全忠有恩故欲依以為援益驕倨鐸知不足恃表請還朝朝直遙翻徙鐸為義昌節度使中和四年鹿晏弘之去河中王建韓建張造晉暉李師泰各帥其衆與之俱見上卷本年帥讀曰率以建等為巡內刺史不遣之官晏弘猜忌衆心不附王建韓建素相親善晏弘尤忌之數引入臥內數所角翻待之加厚二建相謂曰僕射甘言厚意疑我也禍將至矣田令孜密遣人以厚利誘之十一月二建與張造晉暉李師泰帥衆數千逃奔行在誘音酉考異曰實錄九月山南西道節度使鹿晏弘為禁軍所討棄城奔許州晏弘大將韓建王建張造晉暉李師泰各帥本軍降田令孜以建等楊復光故將薄其賞皆除諸衞將軍十一月戊午朔建等以軍三千至行在田令孜錄為假子統以舊軍號隨駕五都按建等既降始遣禁軍討晏弘實錄云九月晏弘棄城去太早十一月又云建等降重複上云賞薄下云為假子自相違新傳帝還晏弘懼見討引兵走許州王建帥義勇四軍迎帝西縣按帝尚在成都云迎帝西縣亦誤也今月從實錄事從薛居正五代史王建韓建傳令孜皆養為假子賜與巨萬拜諸衞將軍使各將其衆號隨駕五都田令孜先已募新軍五十四都分隸兩神策軍今得王建韓建張造晉暉李師泰五將之兵不敢分其衆隸兩軍別號隨駕五都晏弘棄章十二行本棄上有率衆二字乙十一行本同張校同興元走鹿晏弘得興元未期年而棄之中和四年初宦者曹知慤本華原富家子有膽略黃巢陷長安知慤歸鄉里集壯士據嵯峨山南為堡自固嵯峨山在京兆雲陽縣北十五里近其靳翻知慤數遣壯士變衣服語言效巢黨夜入長安攻賊營數所角翻賊驚以為鬼神又疑其下有叛者由是心不自安朝廷聞而嘉之就除內常侍賜金紫知慤聞車駕將還謂人曰吾施小術使諸軍得成大功曹知慤自言賊衆病於己之宵攻已無固志諸鎮大軍臨之因得成收復京城之功俟至大散關當閱其可歸者納之從才用翻行在聞之恐其為變田令孜尤惡之惡烏路翻密以敕旨諭邠寧節度使王行瑜使誅之按光啟二年王行瑜斬朱玫三年始命為邠寧節度使此時蓋為邠寧將也知慤不為備舉營盡殪令孜益驕橫禁制天子不得有所主斷上患其專時語左右而流涕殪壹計翻橫戶孟翻斷丁亂翻語牛倨翻中和四年鹿晏弘引兵東出襄州秦宗權遣其將秦誥趙德諲將兵會之諲伊真翻共攻襄州陷之山南東道節度使劉巨容奔成都劉巨容不肯追滅黃巢欲養寇以自資自以襄陽為菟裘也而地奪於趙德諲身死於田令孜之手玩寇而邀君果何益哉考異曰實錄光啟元年四月蔡賊攻陷襄州劉巨容死焉新傳晏弘引麾下東出襄鄧宗權遣趙德諲合晏弘兵攻襄州巨容不能守奔成都龍紀元年田令孜殺之按晏弘中和四年十一月已據許州又巨容所以奔成都以天子在蜀故也今從新傳蔡州人也晏弘引兵轉掠襄鄧均房廬壽復還許州鹿晏弘自許州從楊復光勤王見二百五十四卷中和元年宋白曰均州漢武當縣地齊永明七年於今鄖鄉縣置齊興郡西魏置興州尋改豐州周武成元年自今鄖鄉城移延岑城今郡理是也隋改均州因均水為名棄鎮走晏弘遂據許州考異曰實錄鹿晏弘陷許州殺節度使周岌據其鎮又曰初晏弘據有興元都將王建等帥衆歸行在乃詔禁兵討之晏弘懼棄城歸鄉里周岌聞其至遁去晏弘自稱留後朝廷因以節旄命之始云殺後云遁去自相違今從其後朝廷不能討因以為忠武節度使中和四年十二月己丑陳敬瑄表辭三川都指揮招討制置安撫等使從之去年以楊師立舉兵敬瑄兼三川都指揮等使師立既死故辭之中和四年初黃巢轉掠福建見二百五十三卷乾符五年號九龍軍福建觀察使鄭鎰奏為團練副使泉州刺史左廂都虞候李連有罪亡入溪洞章十二行本洞下有合衆攻福州五字乙十一行本同孔本同張校同退齋校同巖擊敗之敗補邁翻鎰畏巖之逼表巖自代壬寅以巖為福建觀察使巖為治有威惠閩人安之治直吏翻考異曰實錄七月泉州刺史陳巖逐福建觀察使鄭鎰自知使務又曰十二月壬寅以巖為福建觀察使巖既逐鎰逼鎰薦己為代朝廷因命之按巖既逐鎰則鎰不在福州巖安能逼之薦己新王潮傳亦曰黃巢將竊有福州王師不能下建人陳巖帥衆拔之又逐觀察使鄭鎰自領州詔即授刺史按劉恕閩錄黃巢陷閩越巖聚衆千餘人號九龍軍福建觀察使鄭鎰奏為團練副使左廂都虞候李連驕慢不法縱其徒為郡人患巖將按誅之連奔谿洞中合衆攻福州巖擊破之鎰表巖自代拜觀察使今從之中和四年義昌節度使兼中書令王鐸厚於奉養過魏州侍妾成列服御鮮華如承平之態魏博節度使樂彥禎之子從訓伏卒數百於漳南高雞泊圍而殺之及賓僚從者三百餘人皆死掠其資裝侍妾而還史言王鐸以承平之態處亂世至於喪身亡家誨盜誨淫自取之也從才用翻還從宣翻又如字朝廷不能詰中和四年賜邠寧軍號曰靜難難乃旦翻中和四年是歲餘杭鎮使陳晟逐睦州刺史柳超潁州都知兵馬使汝陰王敬蕘逐其刺史汝陰漢縣唐帶潁州蕘如招翻朝廷因命為刺史中和四年均州賊帥孫喜聚衆數千人謀攻州城刺史呂燁不知所為都將武當馮行襲伏兵江南武當漢縣唐帶均州江南漢江之南也帥所類翻將即亮翻謂曰州人得良牧無不歸心然公所從之卒太多州人懼於剽掠剽匹妙翻尚以為疑不若置軍江北獨與腹心輕騎俱進行襲請為前道道讀為導一讀如字以請為前道告諭為一句言先路告諭均州之人也請為于偽翻告諭州人無不服者矣喜以為然從之既渡江軍吏迎謁伏兵發行襲手擊喜斬之從喜者皆死從才用翻江北軍望之俱潰山南東道節度使上其功上時掌翻考異曰薛居正五代史行襲傳曰洋州節度使葛佐奏辟為行軍司馬請將兵鎮谷口通秦蜀道由是益知名新傳曰行襲乘勝逐刺史呂燁據均州劉巨容因表為刺史武定節度使楊守忠表為行軍司馬使領兵搤谷口以通秦蜀新紀光啟元年四月武當賊馮行襲陷均州逐刺史呂燁在劉巨容奔成都後行襲傳云巨容以功上言誤也今從薛史按若以薛史為據當言洋州節度使上其功詔以行襲為均州刺史州西有長山當襄鄧入蜀之道㣥盜據之抄掠貢賦抄楚交翻行襲討誅之蜀道以通中和四年鳳翔節度使李昌言病表弟昌符知留後昌言薨制以昌符為鳳翔節度使考異曰諸書皆無昌言卒年月惟實錄於李昌符傳中云李昌言病請昌符權留後昌言死詔除節度使按實錄中和三年五月昌言加檢校司徒光啟元年二月昌符始見故以昌言薨附於中和四年之末中和四年時黃巢雖平秦宗權復熾復扶又翻命將出兵寇掠鄰道陳彥侵淮南秦賢侵江南秦誥陷襄唐鄧孫儒陷東都孟陝虢張晊陷汝鄭盧瑭攻汴宋自孫儒以下事皆在是年之後史概言之殆無孑遺晊之日翻孑吉列翻毛萇曰孑遺孑然遺失也按孑單也孤也無孑遺者言無孤單之遺餘也其殘暴又甚於巢軍行未始轉糧車載鹽尸以從以死人尸實之以鹽以供軍糧從才用翻西及關輔東盡青齊南出江淮州鎮存者僅保一城極目千里無復煙火上將還長安畏宗權為患光啟元年乙巳八八五是年三月改元中和四年春正月戊午下詔招撫之中和四年己卯車駕發成都陳敬瑄送至漢州而還中和四年荊南監軍朱敬玫所募忠勇軍暴橫章十二行本橫下有節度使三字乙十一行本同退齋校同陳儒患之鄭紹業之鎮荊南也廣明元年朱敬玫募忠勇軍鄭紹業鎮荊南亦是年也事並見上卷橫戶孟翻軍還儒告琮使除之忠勇將程君從聞之帥其衆奔朗州奔雷滿也帥讀曰率殺百餘人章十二行本人下有餘衆皆潰四字乙十一行本同退齋校同孔本有皆潰二字無餘衆二字自是琮復專軍政復扶又翻雷滿屢攻掠荊南儒重賂以卻之淮南將張王褱韓師德叛高駢據復岳二州自稱刺史儒請王褱攝行軍司馬師德攝節度副使將兵擊雷滿師德引兵上峽大掠上時掌翻峽巫峽也歸于岳州王褱還兵逐儒而代之儒將奔行在王褱劫還囚之中和二年陳儒代鄭紹業至是而敗王褱渭嚴渭改滑州人性貪暴荊南舊將夷滅殆盡先是朱敬玫屢殺大將及富商以致富先悉薦翻朝廷遣中使楊玄晦代之敬玫留居荊南嘗曝衣王褱見而欲之遣卒夜攻之殺敬玫盡取其財王褱惡牙將郭禹慓悍惡烏路翻慓匹妙翻悍下罕翻又侯旰翻欲殺之禹結黨千人亡去庚申襲歸州據之自稱刺史禹青州人成汭也因殺人亡命更其姓名禹先為盜詣陳儒降以為將更工衡翻按薛史成汭少年任俠乘醉殺人為讎家所捕因落髮為僧冒姓郭氏中和四年南康賊帥盧光稠陷虔州自稱刺史以其里人譚全播為謀主南康漢南野縣地吳分南野置南安縣晉改為南康唐屬虔州九域志在州西八十里考異曰歐陽修五代史曰盧光稠譚全播皆南康人光稠狀貌雄偉無他材能而全播勇敢有識略然全播常奇光稠為人唐末㣥盜起全播聚衆立光稠為帥是時王潮攻陷嶺南全播攻潮取其虔韶二州十國紀年全播推光稠為之謀主所向克捷光啟初據虔州光稠自稱刺史天復中陷韶州光稠使其子延昌守之按新紀光啟元年正月光稠陷虔州天復二年陷韶州歐陽修以為同時取虔韶二州誤也今從新紀中和四年秦宗權責租賦於光州刺史王緒緒不能給宗權怒發兵擊之緒懼悉舉光壽兵五千人驅吏民渡江以劉行全為前鋒轉掠江洪虔州是月陷汀漳二州然皆不能守也王緒之兵自此入閩為王潮兄弟割據之資中和四年秦宗權寇潁亳朱全忠敗之於焦夷焦夷在亳州城父縣界按薛史梁紀龍德元年改亳州焦夷縣為夷父則焦夷時已為縣敗補邁翻夷父當作城父中和四年二月丙申車駕至鳳翔三月丁卯至京師荊棘滿城狐兔縱橫縱子容翻上凄然不樂樂音洛己巳赦天下改元改元光啟惟河西山南劍南嶺南數十州而已中和四年秦宗權稱帝置百官考異曰舊宗權傳但云巢賊既誅僭稱帝號實錄明年十月襄王即位宗權已稱帝不從新舊紀皆無之不知宗權以何年月稱帝今因時溥為都統書之中和四年盧龍節度使李可舉成德節度使王鎔惡李克用之強惡烏路翻考異曰太祖紀年錄薛居正五代史作王景崇誤也今從舊紀而義武節度使王處存與克用親善為姪鄴娶克用女為于偽翻又河北諸鎮惟義武尚屬朝廷可舉等恐其窺伺山東此山東謂恆山以東伺相吏翻乃相與謀曰易定燕趙之餘也易州之地本燕南界中山本屬趙國故曰燕趙之餘又說雲中節度使赫連鐸使攻克用之背說式芮翻可舉遣其將李全忠將兵六萬攻易州鎔遣將將兵攻無極無極漢古縣因無極山而名唐屬定州九域志在州南九十里克用遣其將康君立等將兵救之中和四年閏月秦宗權遣其弟宗言寇荊南中和四年初田令孜在蜀募新軍五十四都每都千人分隸兩神策為十軍以統之又南牙北司官共萬餘員是時藩鎮各專租稅河南北江淮無復上供三司轉運無調發之所度支惟收京畿同華鳳翔等數州租稅不能贍調徒弔翻度徒洛翻華戶化翻賞賚不時士卒有怨言令孜患之不知所出先是安邑解縣兩池鹽皆隸鹽鐵置官榷之宋白曰兩池鹽務舊隸度支其職是諸道巡院貞元十六年史牟以金部郎中主池務遂奏置榷鹽使解戶買翻榷訖岳翻河中節度使王重榮專之天子幸蜀內外百司各失其官守王重榮竊據河中得專鹽池之利令孜奏復如舊制隸鹽鐵夏四月令孜自兼兩池榷鹽使唐會要元和十五年改河北稅鹽使為榷鹽使其後復失河北止於安邑解縣兩池置榷鹽使重榮上章論訴不已論盧昆翻說也辯也遣中使往諭之重榮不可時令孜多遣親信覘藩鎮覘丑廉翻有不附己者輒圖之令孜養子匡祐使河中使疏吏翻重榮待之甚厚而匡祐傲甚舉軍皆憤怒重榮乃數令孜罪惡數所具翻責其無禮監軍為講解為于偽翻僅得脫去匡祐歸以告令孜勸圖之五月令孜徙重榮為泰寧節度使以泰寧節度使齊克讓為義武節度使以義武節度使王處存為河中節度使仍詔李克用以河東兵援處存赴鎮為李克用王重榮連兵犯闕張本中和四年盧龍兵攻易州裨將劉仁恭穴地入城遂克之仁恭深州人也李克用自將救無極敗成德兵敗補邁翻成德兵退保新城克用復進擊大破之復扶又翻下同拔新城成德兵走追至九門斬首萬餘級盧龍兵既得易州驕怠王處存夜遣卒三千蒙羊皮造城下造七到翻盧龍兵以為羊也爭出掠之處存奮擊大破之復取易州李全忠走中和四年加陝虢節度使王重盈同平章事中和四年李全忠既喪師喪息浪翻恐獲罪收餘衆還襲幽州六月李可舉窘急舉族登樓自焚死乾符二年李茂勳得幽州二世十一年而滅中和四年東都留守李罕之與秦宗權將孫儒相拒數月罕之兵少食盡棄城西保澠池宗權陷東都九域志澠池縣在都城西一百五十六里澠彌兗翻孫儒陷東都而曰宗權者儒宗權將也中和四年秋七月以李全忠為盧龍留後中和四年乙巳右補闕常濬上疏以為陛下姑息藩鎮太甚是非功過駢首並足言齊是非一功過無所差別也猶未之寤豈可不念駱谷之艱危復懷西顧之計乎復扶又翻下同宜稍振典刑以威四方田令孜之黨言於上曰此疏傳於藩鎮豈不致其猜忿庚戌貶濬萬州司戶尋賜死宋白曰萬州春秋夔國之地秦漢為胊䏰縣地後魏分胊䏰之地置安鄉及魚泉縣後周置萬川郡兼立南州唐置浦州貞觀初改萬州以舊萬川郡為稱考異曰實錄不言令孜黨為誰按蕭遘等請誅令孜表云韋昭度無致君許國之心多醜正比頑之迹令孜黨蓋謂昭度也續寶運錄曰七月三日表入上覽之不悅顧謂侍臣曰藩鎮若見此表深為忿恨自此猜間其何可堪至二十八日敕貶濬為萬州司戶疑三日脫誤當為二十三日今從實錄中和四年滄州軍亂逐節度使楊全玫立牙將盧彥威為留後全玫奔幽州以保鑾都將曹誠為義昌節度使保鑾神策五十四都之一也中和四年孫儒據東都月餘燒宮室官寺民居大掠席卷而去卷讀曰捲城中寂無雞犬李罕之復引其衆入東都築壘於市西而居之城大難守且無居人故築壘以自保聚中和四年王重榮自以有復京城功見上卷中和三年不肯之兗州累表論令孜離間君臣間古莧翻數令孜十罪數所具翻令孜結邠寧節度使朱玫鳳翔節度使李昌符以抗之王處存亦上言幽鎮兵新退臣未敢離易定幽鎮兵謂李可舉王鎔之兵離力智翻有大功於國不宜輕有改易章十二行本易下有搖藩鎮心四字乙十一行本同張校同云無註本亦無詔趣其上道趣讀曰促上時掌翻八月處存引軍至晉州刺史冀君武閉城不內而還河中節度統晉絳慈隰等州君武重榮之巡屬冀晉大夫冀芮之後以采邑為姓還從宣翻又如字中和四年洺州刺史馬爽與昭義行軍司馬奚忠信不叶起兵屯邢州南脅孟方立請誅忠信既而衆潰爽奔魏州忠信使人賂樂彥禎而殺之中和四年秦宗權攻鄰道二十餘州陷之唯陳州距蔡百餘里兵力甚弱刺史趙犨日與宗權戰宗權不能屈詔以犨為蔡州節度使犨德朱全忠之援自中和三年以來黃巢攻陳州後為秦宗權所攻逼惟倚朱全忠為援凡全忠所調發無不立至調力釣翻奉全忠者趙犨也蹙梁祚者趙犨子孫也中和四年王緒至漳州以道險糧少少詩沼翻令軍中無得以老弱自隨犯者斬唯王潮兄弟扶其母董氏崎嶇從軍崎丘奇翻嶇音區緒召潮等責之曰軍皆有法未有無法之軍汝違吾令而不誅是無法也三子曰王潮兄弟三人從緒人皆有母未有無母之人將軍柰何使人棄其母緒怒命斬其母三子曰潮等事母如事將軍既殺其母安用其子請先母死先悉薦翻將士皆為之請乃捨之為于偽翻下竊為為之同有望氣者謂緒曰軍中有王者氣於是緒見將卒有勇略踰己及氣質魁岸者皆殺之劉行全亦死衆皆自危曰行全親也行全緒妹夫也故云然猶不免況吾屬乎行至南安冠古玩翻吳置東安縣晉武帝更名晉安隋改曰南安唐屬泉州九域志南安在州西一十二里王潮說其前鋒將曰說式芮翻吾屬違墳墓捐妻子羈旅外鄉為㣥盜謂棄光壽而入閩也乃為緒所迫脅故也今緒猜刻不仁妄殺無辜軍中孑孑者受誅且盡孑孑特立之貌騎射絕倫又為前鋒吾竊為子危之竊為于偽翻前鋒將執潮手泣問計安出潮為之謀伏壯士數十人於篁竹中伺緒至挺劍大呼躍出挺劍拔劍也呼火故翻反縛以徇軍中皆呼萬歲中和元年王緒起兵為盜至是為王潮所囚按新書王潮傳縛王緒者即劉行全也與此小異通鑑所書本之路振九國志前鋒將曰吾屬今日不為魚肉皆王君力也天以王君為主誰敢先之先悉薦翻相推讓數四推吐雷翻卒奉潮為將軍卒子恤翻緒歎曰此子在吾網中不能殺豈非天哉潮引兵將還光州約其屬所過秋豪無犯行及沙縣永徽六年分建安置沙縣屬汀州九域志在南劍州西一百二十四里宋白曰沙縣古南平餘跡也晉為延平縣太元四年改為沙戍唐武德初立為沙縣廖力救翻今俗音力弔翻姓也帥耆老奉牛酒遮道請潮留為州將帥讀曰率將即亮翻潮乃引兵圍泉州中和四年九月戊申以陳敬瑄為三川及峽內諸州都指揮制置等使唐分三川各自為一鎮峽內諸州歸峽屬荊南節度今陳敬瑄皆指揮制置之田令孜右之也中和四年蔡軍圍荊南蔡軍秦宗權所遣秦宗言之軍也是年正月張王褱囚陳儒王褱殺匡及儒中和四年冬十月癸丑秦宗權敗朱全忠于八角九域志汴州浚儀縣有八角鎮敗補邁翻中和四年王重榮求救於李克用考異曰太祖紀年錄曰朱玫李昌符每連衡入覲於天子指陳利害規畫方略不祐太祖黨庇逆溫太祖拗怒滋甚時田令孜惡太祖與河中膠固奏云王重榮北引太原其心可見不可處之近輔定州王處存忠孝盡心請授以蒲帥移重榮於定州天子從之重榮憤憤不悅告於太祖曰主上新返正大臣播棄此際無辜遽被斥逐明公當鑑其深心今日使僕安歸會太祖憤怒朱玫輩即報曰當與公提鼓出汜水關誅逆賊之後則去此鼠輩如疾風之去鴻毛耳重榮曰吾地迫邠岐公若師出關東二兇必傅吾城下不若先滅一兇去其君側歐陽修五代史重榮使人紿克用曰天子詔重榮俟克用至與處存共誅之因偽為詔書示克用曰此是朱全忠之謀也克用信之按時朝廷疏忌重榮克用亦知之恐無是事今從紀年錄朱全忠攻克用於上源驛朝廷不能治其罪故克用以為怨聚結諸胡議攻汴州報曰待吾先滅全忠還掃鼠輩如秋葉耳重榮曰待公自關東還吾為虜矣不若先除君側之惡退擒全忠易矣易以豉翻時朱玫李昌符亦陰附朱全忠克用乃上言玫昌符與全忠相表裏欲共滅臣臣不得不自救已集蕃漢兵十五萬決以來年濟河自渭北討二鎮不近京城保無驚擾近其靳翻既誅二鎮乃旋師滅全忠以雪讎恥上遣使者諭釋釋解也朱玫欲朝廷討克用數遣人潛入京城燒積聚數所角翻積子賜翻聚從遇翻又皆如字或刺殺近侍刺七亦翻聲云克用所為於是京師震恐日有訛言令孜遣玫昌符將本軍及神策鄜延靈夏等軍各章十二行本各作合三萬人刺七亦翻按是時諸鎮分裂如鄜如延以一州為一鎮使掃境出師一鎮亦恐不及三萬人之數田令孜張大言之耳屯沙苑以討王重榮考異曰新令孜傳云令孜自將討重榮帥玫等兵三萬壁沙苑今從實錄告急於李克用克用引兵赴之十一月重榮遣兵攻同州刺史郭璋出戰敗死重榮與玫等相守月餘克用兵至與重榮俱壁沙苑表請誅令孜及玫昌符詔和解之克用不聽十二月癸酉合戰玫昌符大敗考異曰新傳曰克用上書請誅令孜玫帝和之不從大戰沙苑王師敗玫走還邠州與昌符皆恥為令孜用還與重榮合神策兵潰克用逼京師令孜計窮乃劫帝夜啟開遠門出奔自賊破長安火宮室廬舍什七後京兆王徽葺復粗完至是令孜唱曰王重榮反命火宮城唯昭陽蓬萊三宮僅存按令孜奉車駕幸近藩避亂其志亦俟兵退復還何為火宮城殆必不然實錄六月令孜遣邠岐討重榮九月邠岐始屯沙苑重榮求援於克用十一月克用重榮對壘于沙苑表請誅令孜朱玫十二月癸酉合戰朱玫敗走太祖紀年錄十一月重榮遣使乞師且言二鎮欲加兵於己太祖欲先討朱溫重榮請先滅二鎮太祖表言二鎮黨庇朱溫請自渭北討之亦不言其附令孜攻河中也又言重榮與邠鳳兵對壘月餘十二月太祖渡河與朱玫戰朱玫敗走若自九月至十二月非止月餘矣疑實錄遣邠岐討河中及邠岐屯沙苑太近前今並因十二月戰沙苑見之玫還邠州昌符還鳳翔克用進逼京城乙亥夜令孜奉天子自開遠門出幸鳳翔開遠門長安城西面北來第一門初黃巢焚長安宮室而去諸道兵入城縱掠焚府寺民居什六七王徽累年補葺僅完一二自中和三年黃巢東走王徽即補葺長安宮室葺七入翻無孑遺矣復扶又翻中和四年是歲賜河中軍號護國二年二年春正月鎮海牙將張郁作亂攻陷常州考異曰皮光業見聞錄曰郁潤州小將也周寶差郁押兵士三百人戍於海次因正旦酗酒殺使府安慰軍將度不免禍遂作亂潤州差拓跋從領兵討之郁自常熟縣取江陰而入常州刺史劉革到任方一月親執牌印於戟門而降新紀曰正月辛巳郁陷常州按皮錄但言郁以正旦殺安慰軍將耳非當日即陷常州新紀誤也二年李克用還軍河中與王重榮同表請大駕還宮因罪狀田令孜請誅之上復以飛龍使楊復恭為樞密使田令孜擯斥楊復恭見上卷中和三年戊子令孜請上幸興元上不從是夜令孜引兵入宮此宮謂行宮也黃門衞士從者纔數百人從才用翻宰相朝臣皆不知翰林學士承旨杜讓能宿直禁中天子行幸所至宿次之地宿衞將士外設環衞近臣宿直各有其次與宮禁無異故行宮內亦謂之禁中步追乘輿乘繩證翻出城十餘里得人所遺馬遺馬棄而不及收者解帶繫頸而乘之獨追及上於寶雞九域志寶雞縣在鳳翔西南六十五里乃有太子少保孔緯等數人繼至讓能審權之子杜審權見二百四十九卷宣宗大中十三年戣之孫也孔戣見憲宗紀鄠音戶九域志鄠縣在長安南六十里遇盜皆失之朝士追乘輿者至盩厔九域志盩厔在鳳翔東南二百里音舟窒為亂兵所掠衣裝殆盡庚寅上以孔緯為御史大夫使還召百官上留寶雞以待之時田令孜弄權再致播遷帝始焉避黃巢而奔蜀今又避幷蒲之兵而出再致播遷其禍皆本於田令孜弄權朱玫李昌符亦恥為之用且憚李克用王重榮之強更與之合蕭遘因邠寧奏事判官李松年至鳳翔唐末藩鎮遣其屬奏事皆謂之奏事官判官幕府右職也朱玫遣之奏事行在所故曰奏事判官以別於尋常奏事官蕭遘為相天子播越而不扈從惡得無罪朱玫尋有異圖蕭遘既不能制又不能死為法受惡基於此矣癸巳玫引步騎五千至鳳翔孔緯詣宰相欲宣詔召之蕭遘裴澈以令孜在上側不欲往辭疾不見緯令臺吏趣百官詣行在趣讀曰促皆辭以無袍笏緯召三院御史唐志御史大夫之屬有三院一曰臺院侍御史屬焉二曰殿院殿中侍御史屬焉三曰察院監察御史屬焉布衣親舊有急猶當赴之豈有天子蒙塵為人臣子累召而不往者御史請辦裝數日而行緯拂衣起曰吾妻病垂死且不顧諸君善自為謀請從此辭乃詣李昌符請騎衞送至行在昌符義之贈裝錢遣騎送之邠寧鳳翔兵追逼乘輿敗神策指揮使楊晟於潘氏鉦鼓之聲聞於行宮敗補邁翻聞音問田令孜奉上發寶雞留禁兵守石鼻為後拒潘氏在寶雞東北石鼻在寶雞西南亦曰靈壁蘇軾曰鳳翔府寶雞縣武城鎮即俗所謂石鼻寨也諸葛武侯所築城去寶雞三十里以楊晟為節度使守散關興州漢武都郡沮縣地自晉及宋魏為武興藩王楊氏之國魏滅楊氏為武興鎮尋改東益州唐為興州今州城即古武興城也鳳州漢武都郡故道河池二縣之地後魏為仇池鎮孝昌中置南岐州廢帝三年改為鳳州以西界有鳳凰山而名鋒鏑縱橫糅女救翻縱子容翻以神策軍使王建晉暉為清道斬斫使建以長劍五百前驅奮擊乘輿乃得前考異曰毛文錫王建紀事云光啟二年正月辛巳車駕次陳倉二月辛亥朱玫遣兵攻逼行在庚申陷虢縣三月甲午將移幸梁洋以上為清道斬斫使戊戌邠師至石鼻己亥石鼻不守庚子寇逼寶雞辛丑車駕南引今但取其事不取其月日登大散嶺從才用翻大散嶺在鳳州梁泉縣松陵堡南李昌符焚閣道丈餘將摧折折而設翻王建扶掖上自煙焰中躍過夜宿板下上枕建膝而寢既覺始進食枕之酖翻覺居效翻解御袍賜建曰以其有淚痕故也車駕纔入散關朱玫已圍寶雞石鼻軍潰玫長驅攻散關不克嗣襄王熅肅宗之玄孫也熅肅宗子襄王僙之曾孫音於云翻又於問翻從上不及留遵塗驛據熅傳遵塗驛在石鼻亦謂之石鼻驛與俱還鳳翔庚戌李克用還太原二年二月王重榮朱玫李昌符復上表請誅田令孜復扶又翻二年以前東都留守鄭從讜為守太傅兼侍中考異曰新宰相表從讜入三公門不為真相按新傳拜司空復秉政進太傅兼侍中從至興元以太子太保還第新表誤也二年朱玫李昌符使山南西道節度使石君涉柵絕險要燒郵驛上由他道以進山谷崎嶇邠軍迫其後邠軍朱玫之軍僅得達山南三月壬午石君涉棄鎮逃歸朱玫石君涉黨於邠岐車駕猝至故棄鎮而逃癸未鳳翔百官蕭遘等罪狀田令孜及其黨韋昭度請誅之初昭度因供奉僧澈結宦官得為相昭度為相見二百五十四卷廣明元年昭度每與同列詣知玄皆拜之知玄揖使詣澈啜茶山南西道監軍馮翊嚴遵美迎上于西縣節度使既逃故監軍自迎車駕後魏分漢沔陽縣置嶓冢縣隋大業初改曰西縣唐屬興元府九域志縣在府西一百里宋白曰西縣本名白馬城又曰濜江城宋於此城僑立華陽郡後魏置嶓冢縣隋大業三年改為西縣丙申車駕至興元考異曰皮光業見聞錄正月乙酉車駕次寶雞王建紀事正月辛巳次陳倉二月辛亥朱玫將吉跌師瑀逼行在破楊晟於潘氏庚申陷虢縣三月甲午僖宗將移幸梁洋戊戌邠師至石鼻己亥石鼻不守庚子寇逼寶雞辛丑車駕南引四月庚申達褒中舊紀正月戊子田令孜迫乘輿幸興元庚寅次寶雞癸巳朱玫至鳳翔令孜聞邠軍至奉帝入散關三月丙申車駕至興元唐年補錄三月十七日車駕至興元即丙申也實錄正月乙酉車駕次寶雞戊子癸巳三月丙申與舊紀同新紀正月戊子如興元癸巳朱玫叛寇鳳翔三月丙申次興元諸書月日不同如此若依新舊紀實錄則離寶雞六十四日乃至興元似太緩若依紀事則寶雞危逼之地車駕留彼八十日似太久要之僖宗以棧道燒絕自他道崎嶇至山南容有六十餘日之久至於留寶雞八十日必無此理今從新舊紀戊戌以御史大夫孔緯翰林學士承旨兵部尚書杜讓能並為兵部侍郎同平章事保鑾都將李鋋等敗邠軍於鳳州鋋音蟬敗補邁翻詔加王重榮應接糧料使章十二行本使下重使字乙十一行本同調本道穀十五萬斛以濟國用調徒釣翻重榮表稱令孜未誅不奉詔以尚書左丞盧渥為戶部尚書充山南西道留後以嚴遵美為內樞密使遣王建帥部兵戍三泉武德四年分利州之綿谷置三泉縣時屬興元府宋白曰三泉縣本漢葭萌縣地後魏正始中分置三泉縣以界內三泉山為名九域志在府西南二百一十里帥讀曰率從駕五都王建以一都戍三泉暉造以四都屯黑水黑水在興元成固縣西北太白山南流入漢諸葛亮牋所謂朝發南鄭夕宿黑水者也以建遙領壁州刺史將帥遙領州鎮自此始二年陳敬瑄疑東川節度使高仁厚欲去之去羌呂翻下同遂州刺史鄭君立嚴立改雄起兵攻陷漢州進向成都敬瑄遣其將李順之逆戰君立敗死敬瑄又發維茂羌軍擊仁厚殺之考異曰張耆舊傳不言仁厚所終惟數敬瑄六錯云太師殺高仁厚一錯又云高僕射權謀智勇累有大功於太師又極忠孝若在王司徒不過梓潼昭宗實錄文德元年八月仁厚楊師立羅元杲王師本俱贈官云皆先朝以疑似獲罪今從新紀新傳參以二書自他仁厚事更無所見二年朱玫以田令孜在天子左右終不可去言於蕭遘曰主上播遷六年中原將士冒矢石百姓供饋餉戰死餓死什減七八僅得復京城天下方喜車駕還宮主上更以勤王之功為敕使之榮勤王之功楊復光實預有之田令孜以其出於北司眩惑人主以為己榮使墮綱紀騷擾藩鎮召亂生禍墮讀曰隳言田令孜易置王重榮以召亂玫昨奉尊命來迎大駕言遘召玫使迎車駕反類脅君吾輩報國之心極矣戰賊之力殫矣安能垂頭弭耳受制於閹寺之手哉李氏孫尚多相公盍改圖以利社稷乎遘曰主上踐阼十餘年無大過惡正以令孜專權肘腋致坐不安席上每言之流涕不已近日上初無行意令孜陳兵帳前迫脅以行不容俟旦罪皆在令孜人誰不知足下盡心王室正有引兵還鎮拜表迎鑾廢立重事伊霍所難遘不敢聞命玫出宣言曰我立李氏一王敢異議者斬夏四月壬子玫逼鳳翔百官奉襄王熅權監軍國事承制封拜指揮仍遣大臣入蜀迎駕盟百官于石鼻驛玫使蕭遘為冊文遘辭以文思荒落思相吏翻乃使兵部侍郎判戶部鄭昌圖為之乙卯熅受冊玫自兼左右神策十軍使考異曰實錄玫自補大丞相按唐無此官又下五月玫自加侍中盖唐末著小說者謂平章事或侍中為大丞相耳實錄因其文而誤也事至於此蕭遘無所逃於天地之間帥讀曰率各置副使三司之事一以委焉河中百官崔安潛等上襄王牋賀受冊上之出長安百官不扈從而奔河中者謂之河中百官二年田令孜自知不為天下所容乃薦樞密使楊復恭為左神策中尉觀軍容使自除西川監軍使考異曰舊紀實錄皆云二月以令孜為西川監軍舊傳云令孜懼引楊復恭代己從幸梁州求為西川監軍新傳云令孜留不去及帝病乃赴成都表解官求醫蓋取張之說耳按王建紀事四月庚申達褒中令孜以罪釁貫盈且慮禍及於是自授西川監軍使以避指斥復規與敬瑄為巢窟今從之為敬瑄令孜併命張本出王建為利州刺史晉暉為集州刺史張造為萬州刺史李師泰為忠州刺史王建等歸田令孜見上中和四年十一月二年五月朱玫以中書侍郎同平章事蕭遘為太子太保自加侍中諸道鹽鐵轉運等使加裴澈判度支鄭昌圖判戶部以淮南節度使高駢兼中書令充江淮鹽鐵轉運等使諸道行營兵馬都統淮南右都押牙和州刺史呂用之為嶺南東道節度使大行封拜以悅藩鎮遣吏部侍郎夏侯潭宣諭河北戶部侍郎楊陟宣諭江淮諸藩鎮受其命者什六七高駢仍奉牋勸進史言僖宗再幸山南天下已絕望矣其得還者幸也呂用之建牙開幕一與駢同凡駢之腹心及將校能任事者皆逼以從己諸所施為不復咨稟復扶又翻駢頗疑之陰欲奪其權而根蔕已固無如之何用之知之甚懼訪於其黨前度支巡官鄭前知廬州事董瑾曰此固為晚矣言駢早不知覺曰曹孟德有言寧我負人無人負我後漢末曹操避董卓之難間行東歸過故人呂伯奢伯奢出五子備賓主禮操聞食器聲以為圖己手劍殺八人而去既而悽愴曰寧我負人無人負我孟德曹操字也鄭蓋勸用之圖駢與瑾共為書一緘授用之其語祕人莫有知者瑾謀見下卷光啟三年蕭遘稱疾歸永樂按新書遘弟蘧為永樂令遘往從之永樂縣屬河中府武德初置宋白曰永樂縣本漢河北縣地周武帝武成二年改為永樂保定二年省以地屬芮城唐武德二年分芮城復置樂音洛初鳳翔節度使李昌符與朱玫同謀立襄王既而玫自為宰相專權昌符怒不受其官更通表興元詔加昌符檢校司徒朱玫遣其將王行瑜將邠寧河西兵五萬追乘輿自代宗時河西沒于吐蕃宣宗復河湟張義潮收涼州河西復羈屬於唐數所角翻棄散關走行瑜進屯鳳州是時諸道貢賦多之長安不之興元之往也從才用翻上涕泣不知為計杜讓能言於上曰楊復光與王重榮同破黃巢復京城相親善事見上卷中和三年若遣重臣往諭以大義且致復恭之意宜有回慮歸國之理上從之遣右諫議大夫劉崇望使于河中齎詔諭重榮重榮即聽命遣使表獻絹十萬匹且請討朱玫以自贖戊戌襄王熅遣使至晉陽賜李克用詔言上至半塗六軍變擾蒼黃晏駕吾為藩鎮所推今已受冊朱玫亦與克用書克用聞其謀皆出於玫大怒大將蓋寓說克用曰鑾輿播遷天下皆歸咎於我蓋古盍翻說式芮翻寓言上之播越由克用與王重榮兵逼京城為天下之所歸咎今不誅玫黜李熅無以自湔洗湔則前翻考異曰實錄楊復恭兄弟於李克用王重榮有破賊連衡之舊乃奏遣劉崇望齎詔宣諭兼達復恭之意重榮克用皆聽命按後唐太祖紀年錄偽使至太原太祖詰其事狀曰皆朱玫所為將斬之以徇大將蓋寓等言云云太祖燔偽詔械其使馳檄喻諸鎮曰今月二十日得襄王偽詔及朱玫文字云田令孜脅遷鑾駕播越梁洋行至半塗六軍變擾遂至蒼黃而晏駕不知殺逆者何人永念丕基不可無主昨四鎮藩后推朕纂承已於正殿受冊畢改元大赦者李熅出自贅疣名汙藩邸智昏菽麥識昧機權李符虜之以塞辭朱玫賣之以為利呂不韋之奇貨可見姦邪蕭世誠之土囊期於匪夕近者當道徑差健步奉表起居行朝見駐巴梁宿衞比無騷動而朱玫脅其孤騃自號台衡敢首亂階明言晏駕熒惑藩鎮淩弱廟朝云云按舊復恭崇望傳及諸家五代史亦不言克用因復恭崇望而推戴僖宗今不取又於時熅未即位改元偽詔亦恐非也編遺錄二年春正月壬午唐室有襄王之亂僖宗駐蹕梁洋襄王遂下偽命以檢校太傅令邸吏左環賷所授偽官告一通左環至具事以聞上怒切責環將加其罪久乃赦之遂令焚毀於庭按正月朱玫未立襄王編遺錄亦誤也今從薛居正五代史梁紀克用從之燔詔書囚使者移檄鄰道稱玫敢欺藩方明言晏駕當道已發蕃漢三萬兵進討凶逆當共立大功寓蔚州人也蔚紆勿翻二年秦賢寇宋汴朱全忠敗之於尉氏南敗補邁翻癸巳遣都將郭言將步騎三萬擊蔡州二年六月以扈蹕都將楊守亮為金商節度京畿制置使扈蹕都亦神策五十四都之一與王重榮李克用共討朱玫守亮本姓訾名亮訾即移翻漢書功臣表有樓虛侯訾順曹州人與弟信皆為楊復光假子更名守亮守信更工衡翻李克用遣使奉表稱方發兵濟河除逆黨迎車駕願詔諸道與臣協力先是山南之人皆言克用與朱玫合先悉薦翻人情恟懼表至上出示從官幷諭山南諸鎮由是帖然然克用表猶以朱全忠為言上使楊復恭以書諭之云俟三輔事寧漢以京兆馮翊扶風為三輔唐京畿之地是也二年衡州刺史周岳發兵攻潭州欽化節度使閔勗招淮西將黃皓入城共守淮西將秦宗權將也中和元年閔勗據潭州至是而敗擒皓殺之二年鎮海節度使周寶遣牙將丁從實襲常州考異曰新紀武寧軍將丁從實陷常州今從皮氏見聞錄郁奔海陵是年正月張郁陷常州霸高駢將也鎮海陵有民五萬戶兵三萬人二年秋七月秦宗權陷許州殺節度使鹿晏弘中和四年晏弘據許州至是敗亡二年王行瑜進攻興州感義節度使楊晟棄鎮走據文州詔保鑾都將李鋋扈蹕都將李茂貞陳佩屯大唐峯以拒之茂貞博野人本姓宋名文通以功賜姓名李茂貞始此二年更命欽化軍曰武安湖南觀察升欽化軍見上卷中和三年更工衡翻二年八月盧龍節度使李全忠薨以其子匡威為留後二年王潮拔泉州殺廖彥若去年八月王潮圍泉州至是乃拔之考異曰新紀八月王潮陷泉州刺史劉彥若死之按諸書皆云廖彥若新紀作劉恐誤不敢犯福州境遣使降之使疏吏翻降戶江翻巖表潮為泉州刺史潮沈勇有智略沈持林翻既得泉州招懷離散均賦繕兵吏民悅服幽王緒於別館緒慚自殺二年九月朱玫將張行實攻大唐峯李鋋等擊卻之金吾將軍滿存與邠軍戰破之復取興州復扶又翻進守萬仞寨二年李克脩攻孟方立甲午擒其將呂臻於焦岡拔故鎮武安臨洺邯鄲沙河九域志洺州武安縣有固鎮鎮二年長安百官太子太師裴璩等勸進於襄王熅璩其於翻冬十月熅即皇帝位改元建貞遙尊上為太上元皇聖帝二年董昌謂錢鏐曰汝能取越州吾以杭州授汝考異曰實錄辛未以杭州刺史董昌為浙東觀察使按此年十一月鏐始拔越州十二月擒漢宏昌始自稱知浙東軍府事實錄誤也然不取終為後患遂將兵自諸暨趨平水趨七喻翻鑿山開道五百里出曹娥埭九域志越州會稽縣有平水鎮曹娥鎮平水今在越州東南四十餘里自此南踰山出小江沿剡溪而東二十里至曹娥埭埭徒耐翻帥讀曰率降戶江翻鏐與浙東軍戰屢破之進屯豐山二年感化牙將張雄馮弘鐸得罪於節度使時溥徐州本號武寧軍自咸通罷節鎮之後尋復節鎮改為感化軍中間有書武寧者誤也是後時溥既死朱梁始復徐州為武寧軍走渡江襲蘇州據之雄自稱刺史稍聚兵至五萬戰艦千餘自號天成軍二年河陽節度使諸葛爽薨大將劉經張全義立爽子仲方為留後全義臨濮人也武德四年分雷澤縣置臨濮縣屬濮州九域志在州南六十里濮博木翻二年李克脩攻邢州不克而還考異曰太祖紀年錄邢人出戰又敗之孟方立求救於鎮州王鎔出兵三萬赴援我軍乃退舊鎔傳是時天子蒙塵九有羹沸河東李克用虎視山東方謀吞據鎔以重賂結納以脩和好晉軍討孟方立於邢州鎔常奉以芻糧據此則鎔助克用攻邢州也未知孰是今皆不取二年十一月丙戌錢鏐克越州劉漢宏奔台州考異曰實錄漢宏被殺在董昌除浙東前據范坰吳越備史漢宏敗走至十二月死皆有日今從之二年義成節度使安師儒委政於兩廂都虞候夏侯晏杜標二人驕恣軍中忿之小校張驍潛出聚衆二千攻州城師儒斬晏標首諭之軍中稍息天平節度使朱瑄謀取滑州遣濮州刺史朱裕將兵誘張驍殺之朱全忠先遣其將朱珍李唐賓襲滑州入境遇大雪珍等一夕馳至壁下百梯並升遂克之虜師儒以歸考異曰實錄告於行在命全忠兼領義成節度使按大順元年始以全忠兼宣義節度使全忠猶辭以授胡真此際未也實錄誤義成自此屬朱全忠二年田令孜至成都請尋醫許之解西川監軍使二年十二月戊寅諸軍拔鳳州以滿存為鳳州防禦使二年楊復恭傳檄關中稱得朱玫首者以靜難節度使賞之以朱玫職任授之也難乃旦翻屢為李鋋滿存等所破數所角翻與其下謀曰今無功歸亦死曷若與汝曹斬玫首章十二行本首下有定京城三字乙十一行本同退齋校同張校同云無註本亦無迎大駕取邠寧節鉞乎衆從之甲寅行瑜自鳳州亶引兵歸京師此諸軍所以於戊寅得取鳳州聞之怒召行瑜責之曰汝亶歸欲反邪行瑜曰吾不反欲誅反者朱玫耳遂擒斬之幷殺其黨數百人諸軍大亂焚掠京城士民無衣凍死者蔽地裴澈鄭昌圖帥百官二百餘人奉襄王奔河中帥讀曰率王重榮詐為迎奉執熅殺之襄王熅自監國至竊號涉八月而敗百官死者殆半二年台州刺史杜雄誘劉漢宏執送董昌斬之廣明元年劉漢宏得浙東至是而亡考異曰十國紀年十二月丙午杜雄執漢宏按十二月丙子朔無丙午紀年誤自稱知浙東軍府事以錢鏐知杭州事為錢鏐以杭州跨有二浙張本二年王重榮函襄王熅首至行在刑部請御興元城南樓獻馘百官畢賀太常博士殷盈孫議以為熅為賊臣所逼正以不能死節為罪耳禮公族罪在大辟君為之素服不舉記文王世子公族其有死罪者有司讞于公曰某之罪在大辟公三宥之有司不對走出致刑于甸人公又使人追之曰雖然必赦之對曰無及也反命于公公素服不舉為之變如其倫之喪無服親哭之為于偽翻宜廢為庶人令所在葬其首其獻馘稱賀之禮請俟朱玫首至而行之從之盈孫侑之孫也殷侑見二百四十二卷文宗大和二年二年河陽大將劉經畏李罕之難制自引兵鎮洛陽襲罕之於澠池為罕之所敗敗補邁翻下同經棄洛陽走罕之追殺殆盡罕之軍于鞏鞏漢古縣唐屬河南府九域志在府東一百一十里經遣張全義將兵拒之時諸葛仲方幼弱政在劉經諸將多不附全義遂與罕之合兵攻河陽為經所敗罕之全義走保懷州二年初忠武決勝指揮使孫儒與龍驤指揮使朗山劉建鋒戍蔡州拒黃巢扶溝馬殷隸軍中以材勇聞扶溝漢縣中廢隋復置唐屬許州陳留風俗傳小扶亭有洧水之溝因以名縣九域志縣在汴州南一百九十里馬殷始此儒等皆屬焉宗權遣儒章十二行本儒下有將兵二字乙十一行本同攻陷鄭州刺史李璠奔大梁璠孚袁翻儒進陷河陽留後諸葛仲方奔大梁廣明元年諸葛爽得河陽及子而敗張全義據懷州李罕之據澤州以拒之初長安人張佶為宣州幕僚惡觀察使秦彥之為人棄官去過蔡州宗權留以為行軍司馬佶謂劉建鋒曰秦公剛鷙而猜忌亡無日矣吾屬何以自免建鋒方自危遂與佶善佶其吉翻惡烏路翻為劉建鋒張佶協力取湖南張本二年壽州刺史張翱考異曰妖亂志作張敖吳錄作張滶今從十國紀年廬州刺史楊行愍遣其將田頵李神福張訓拒之敗虔于褚城敗補邁翻滁州刺史許勍襲舒州刺史陶雅奔廬州中和四年行愍使雅取舒州更工衡翻二年是歲天平牙將朱瑾逐泰寧節度使齊克讓考異曰薛居正五代史云虜克讓今從舊傳瑾將襲兗州求婚於克讓乃自鄆盛飾車服私藏兵甲以赴之親迎之夕甲士竊發逐克讓而代之迎魚敬翻朝廷因以瑾為泰寧節度使二年安陸賊帥周通攻鄂州路審中亡去中和四年路審中據鄂州帥所類翻下同自稱武昌留後朝廷因以授之湘陰賊帥鄧進思復乘虛陷岳州湘陰漢羅縣地宋分置湘陰縣唐武德八年省羅縣入焉屬岳州九域志在州西南二百七十里復扶又翻二年秦宗言圍荊南二年去年九月圍荊南王褱城中米斗直錢四十緡食甲鼓皆盡擊門扉以警夜死者相枕枕職任翻宗言竟不能克而去三年三年春正月以邠州都將王行瑜為靜難軍節度使以朱玫之官賞之難乃旦翻據舊紀以洋州為武定節鎮右衞大將軍顧彥朗為東川節度使金商節度使楊守亮為山南西道節度使彥朗豐縣人也三年辛巳以董昌為浙東觀察使錢鏐為杭州刺史三年秦宗權自以兵力十倍於朱全忠而數為所敗恥之數所角翻敗補邁翻欲悉力以攻汴州全忠患兵少二月以諸軍都指揮使朱珍為淄州刺史募兵於東道淄州本平盧巡屬全忠欲募兵於東方輒以刺史授珍薛居正五代史曰使朱珍募兵於東道懼蔡人暴其麥期以夏首迴歸三年戊辰削奪三川都監田令孜官爵長流端州然令孜依陳敬瑄竟不行考異曰實錄載敕曰令孜雖已削奪在身官爵宜剝服色配端州長流百姓新傳曰削官爵流儋州然猶依敬瑄不行張耆舊傳曰大駕廣明二年春孟到蜀叟嘗接識北司諸官子弟有光啟門承旨似先大夫為叟言去年黃巢淩犯聖上蒼忙就路諸王多是徒行壽王至斜谷行不得韈一足跣一足偃臥磻石上田軍容在後收拾驅壽王壽王起告軍容行不得與箇馬騎軍容云山谷間何處得馬以鞭一抶之令行雖迴首無言衷心深銜此恨爾後經今八年僖宗皇帝在寶雞行宮寢疾月餘彌留臣下皆知不起于疾內外屬望在於壽王壽王仁孝大度弘寬有斷衆所歸心軍容聞大恐就御寢問識臣否帝目瞪不語軍容大驚尋時矯制除西川監軍使仍馳驛赴任遂將拱宸奉鑾兩都自衞星夜倍程軍容才到西川僖宗已崩國朝果冊壽王登極皇帝位於是積年怨恨今日逞其志矣新令孜傳取之據實錄令孜光啟二年為西川監軍此月流端州在昭宗即位前自為楊復恭所擯耳十國紀年曰三月僖宗東還詔流令孜儋州敬瑄端州皆拒朝命此據張耆舊傳致誤耳今從實錄三年代北節度使李國昌薨考異曰薛居正五代史武皇紀國昌中和三年薨唐末見聞錄中和三年十月老司徒薨舊書中和三年十月國昌卒後唐獻祖紀年錄光啟中薨於位新沙陀傳光啟三年國昌卒太祖紀年錄光啟三年正月云是歲獻祖文皇帝之喪太祖哀毀行服不獲專征實錄置此年二月今從之三年三月癸未詔偽宰相蕭遘鄭昌圖裴澈於所在集衆斬之皆死於岐山岐山在鳳翔東四十里按舊書帝紀河中械送偽宰相裴澈鄭昌圖命斬之於岐山縣太子少師致仕蕭遘賜死于永樂縣與此不同法司皆處以極法法司謂刑部處昌呂翻免者什七八三年壬辰車駕至鳳翔節度使李昌符恐車駕還京雖不治前過前過謂與朱玫迫逐乘輿也治直之翻乃以宮室未完固請駐蹕府舍從之三年太傅兼侍中鄭從讜罷為太子太保三年鎮海節度使周寶募親軍千人號後樓兵稟給倍於鎮海軍鎮海軍皆怨而後樓兵浸驕不可制寶溺於聲色不親政事築羅城二十餘里建東第人苦其役寶與僚屬宴後樓有言鎮海軍怨望者寶曰亂則殺之度支催勘使薛朗以其言告所善鎮海軍將劉浩戒之使戢士卒浩曰惟反可以免死耳是夕寶醉方寢浩帥其黨作亂帥讀曰率下同攻府舍而焚之寶驚起徒跣叩芙蓉門呼後樓兵後樓兵亦反矣寶帥家人步走出青陽門遂奔常州考異曰實錄寶被逐在四月恐四月奏到耳吳越備史三月壬辰新紀癸巳今從之浩殺諸僚佐癸巳迎薛朗入府推為留後為錢鏐銖薛朗張本城中貨財山積是日盡於亂兵之手高駢聞寶敗列牙受賀遣使饋以齏粉駢與寶為仇故幸其敗為仇事見二百五十四卷中和元年齏子西翻細切為齏碎䃺為粉擲之地曰汝有呂用之在他日未可知也揚州連歲饑城中餒死者日數千人坊市為之寥落災異數見駢悉以為周寶當之史言高駢阽於死亡而不悟為于偽翻數所角翻見賢遍翻三年山南西道節度使楊守亮忌利州刺史王建驍勇屢召之建懼不往利州山南西道巡屬也建懼為守亮所殺故不敢往路振九國志作周博雅唐祚將終藩鎮互相吞噬皆無雄才遠略不能戡濟多難說式芮翻下同難乃旦翻公勇而有謀得士卒心立大功者非公而誰然葭萌四戰之地利州古葭萌之地世傳古蜀王封其弟葭萌於此因以名邑閬州地僻人富楊茂實陳田之腹心不脩職貢若表其罪興兵討之可不章十二行本不作一乙十一行本同孔本同張校同戰而擒也建從之召募溪洞酋豪有衆八千沿嘉陵江而下襲閬州西漢水出秦州嘉陵谷亦謂之嘉陵水東南過葭萌又東南過閬中閬州東川巡屬酋慈由翻自稱防禦使招納亡命軍勢益盛守亮不能制部將張虔裕說建曰公乘天子微弱專據方州若唐室復興公無種矣種章勇翻宜遣使奉表天子杖大義以行師蔑不濟矣部將綦毋諫復說建養士愛民以觀天下之變綦毋姓也毋音無章十二行本建下有皆字乙十一行本同孔本同從之庠虔裕諫皆許州人也汝潁多奇士自古然也史言英雄角逐天必生人才以羽翼之初建與東川節度使顧彥朗俱在神策軍同討賊建既據閬州彥朗畏其侵暴數遣使問遺數所角翻遺唯季翻饋以軍食建由是不犯東川豺狼不噬要非仁也力未及耳觀後顧彥暉之事可見已三年初周寶聞淮南六合鎮遏使徐約兵精誘之使擊蘇州為下卷徐約逐張雄始事王崇武標點容肇祖聶崇岐覆校
