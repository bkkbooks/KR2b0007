body:
  text: 資治通鑑卷第二百三十五端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註唐紀五十一德宗神武聖文皇帝十貞元十年貞元十年甲戌七九四貞元十年六月壬寅朔昭義節度使李抱真薨其子殿中侍御史緘與抱真從甥元仲經謀祕不發喪詐為抱真表求以職事授緘又詐為其父書遣裨將陳榮詣王武俊假貨財武俊怒曰吾與乃公厚善欲同獎王室耳豈與汝同惡邪聞乃公已亡乃猶汝也公猶翁也朝直遙翻又敢告我況有求也使榮歸寄聲質責緘質正也以正義責之也昭義步軍都虞候王延貴汝州梁人也梁縣漢晉屬河南郡後魏置汝北郡隋分置承休縣而梁縣仍故唐以承休縣帶汝州故梁縣在其西南四十五里上知抱真已薨遣中使第五守進往觀變且以軍事委王延貴守進至上黨昭義軍治上黨三日緘乃嚴兵詣守進守進謂之曰朝廷已知相公捐館捐棄也言死者棄其館舍而逝也侍御宜發喪行服緘愕然出謂諸將曰朝廷不許緘掌事諸君意如何莫對緘懼乃歸發喪以使印及管鑰授監軍使印節度之印也監古銜翻宣口詔令視事口宣所受詔旨故曰口詔趣赴東都歸私第趣讀曰促延貴悉歸罪於仲經捕斬之詔以延貴權知昭義軍事貞元十年雲南王異牟尋遣其弟湊羅楝楝郎甸翻獻地圖土貢及吐蕃所給金印請復號南詔夷語以王為詔其先渠帥有六自號六詔曰蒙巂詔越析詔浪穹詔邆睒詔施浪詔蒙舍詔蒙舍詔在諸部南故稱南詔至蒙歸義玄宗封為雲南王因號雲南癸丑以祠部郎中袁滋為冊南詔使考異曰舊南詔傳十年八月遣湊羅楝獻吐蕃印新傳曰異牟尋與崔佐時盟點蒼山敗突厥於神川明年六月冊異牟尋為南詔王按實錄乃今年六月新舊傳皆誤也韋皋奏狀皆稱雲南王而竇滂雲南別錄曰詔袁滋冊異牟尋為南詔蓋從其請南詔之名自此始也蠻語詔即王也新傳云南詔王亦誤余按異牟尋破吐蕃於神川考異誤作突厥文曰貞元冊南詔印滋至其國異牟尋北面跪受冊印稽首再拜因與使者宴出玄宗所賜銀平脫馬頭盤二以示滋又指老笛工歌女曰皇帝所賜龜茲樂唐十部樂有龜茲樂有彈箏豎箜篌琵琶五絃橫笛笙簫觱篥答臘鼓毛員鼓都曇鼓侯提鼓雞婁鼓腰鼓擔鼓齊鼓具皆一銅鈸二舞者四人設五方師子高丈餘飾以方色每師子有十二人畫衣執紅拂首加紅袜謂之師子郎龜茲音丘慈滋曰南詔當深思祖考子子孫孫盡忠於唐異牟尋拜曰敢不謹承使者之命貞元十年賜義武節度使張昇雲名茂昭考異曰舊傳於其父孝忠卒時言改名年代記在此年九月今從實錄貞元十年御史中丞穆贊按度支吏贓罪度徒洛翻裴延齡欲出之庇吏欲出其罪延齡譖之貶饒州別駕朝士畏延齡側目畏之不敢正視寧之子也天寶末安祿山反穆寧起兵於河北以討之貞元十年韋皋奏破吐蕃於峨和城武德元年以漢蠶陵縣地置翼州管內有峨和城貞元十年秋七月壬申朔以王延貴為昭義留後賜名虔休昭義行軍司馬攝洺州刺史元誼聞虔休為留後意不平表請以磁邢洺別為一鎮昭義精兵多在山東昭義軍鎮潞州謂磁邢洺三州為山東上屢遣中使諭之不從臨洺守將夏侯仲宣以城歸虔休虔休遣磁州刺史馬正卿督裨將石定蕃等將兵五千擊洺州定蕃帥其衆二千叛歸誼帥讀曰率正卿退還詔以誼為饒州刺史誼不行虔休自將兵攻之引洺水以灌城貞元十年黃少卿陷欽橫潯貴等州攻孫公器於邕州貞元十年九月王虔休破元誼兵進拔雞澤雞澤漢廣平縣地武德四年置雞澤縣屬洺州九域志在州東北六十里貞元十年裴延齡奏稱官吏太多自今缺員請且勿補收其俸以實府庫上欲脩神龍寺須五十尺松不可得延齡曰臣近見同州一谷木數千株皆可八十尺上曰開元天寶間求美材於近畿猶不可得今安得有之對曰天生珍材固待聖君乃出開元天寶何從得之延齡奏左藏庫司多有失落近因檢閱使置簿書乃於糞土之中得銀十三萬兩其匹段雜貨百萬有餘匹段雜貨使在糞土之中已應腐爛不可用雖甚愚之人亦知其妄誕也德宗不加之罪延齡復何所忌憚乎即是羨餘羨弋線翻悉應移入雜庫以供別敕支用太府少卿韋少華不伏抗表稱此皆每月申奏見在之物見賢遍翻請加推驗執政請令三司詳覆上不許亦不罪少華延齡每奏對恣為詭譎皆衆所不敢言亦未嘗聞者延齡處之不疑處昌呂翻上亦頗知其誕妄但以其好詆毀人好呼到翻冀聞外事故親厚之德宗親厚裴延齡不特冀聞外事也亦以進奉逢其欲耳㣥臣畏延齡有寵莫敢言惟鹽鐵轉運使張滂京兆尹李充司農卿李銛銛息廉翻以職事相關時證其妄而陸贄獨以身當之日陳其不可用十一月壬申贄上書極陳延齡姦詐數其罪惡數所具翻其略曰延齡以聚斂為長策斂力贍翻以詭妄為嘉謀以掊克斂怨為匪躬掊蒲侯翻以靖譖服讒為盡節左傳少皞氏有不才子毀信廢忠崇飾惡言服讒蒐慝以誣盛德天下之民謂之窮奇冒聖哲之所戒以為行能惡烏路翻行下孟翻可謂堯代之共工書堯典帝曰疇咨若予采驩兜曰共工方鳩僝功帝曰吁靖言庸違象恭滔天共音恭家語孔子為魯司寇攝行相事七日而誅少正卯戮之于兩觀之下子貢進曰夫少正卯魯之聞人也夫子為政而始誅之或者為失乎孔子曰天下有大惡者五而竊盜不豫焉一曰心逆而險二曰行偽而堅三曰言偽而辯四曰記醜而博五曰順非而澤此五者有一於人則不免君子之誅而少正卯皆兼有之其居處足以撮徒成黨其談說足以飭褒榮衆其強禦足以返是獨立此乃人之姦雄有不可以不除日長月滋長知丈翻陰祕者固未盡彰敗露者尤難悉數又曰陛下若意其負謗則誠宜亟為辯明為于偽翻陛下若知其無良又安可曲加容掩又曰陛下姑欲保持曾無詰問延齡謂能蔽惑不復懼思移東就西便為課績取此適彼遂號羨餘愚弄朝廷有同兒戲又曰矯詭之能誣罔之辭遇事輒行應口便發靡日不有靡時不為又難以備陳也又曰昔趙高指鹿為馬馬見八卷秦二世三年物理猶同豈若延齡掩有為無指無為有又曰延齡凶妄流布寰區上自公卿近臣下逮輿臺賤品左傳芊尹無宇曰王臣公公臣大夫大夫臣士士臣皁皁臣輿輿臣隸隸臣僚僚臣僕僕臣臺億萬為徒能以上言上時掌翻其人有幾臣以卑鄙任當台衡情激于衷雖欲罷而不能自默也書奏上不悅待延齡益厚貞元十年十二月王虔休乘冰合度壕急攻洺州元誼出兵擊之虔休不勝而返日暮冰解士卒死者太半貞元十年中書侍郎同平章事陸贄以上知待之厚事有不可常力爭之所親或規其太銳贄曰吾上不負天子下不負所學他無所恤裴延齡日短贄於上趙憬之入相也贄實引之既而有憾於贄事見上卷八年九年故延齡益得以為計上由是信延齡而不直贄贄與憬約至上前極論延齡姦邪上怒形於色憬默而無言壬戌贄罷為太子賓客考異曰韓愈順宗實錄曰德宗在位稍久益自攬機柄親治細事失人君大體宰相益不得行其職而議者乃云由贄而然按凡為宰相者皆欲專權安肯自求失職不任宰相乃德宗之失而歸咎於贄豈人情也又贄論朝官缺員狀云頃之輔臣鮮克勝任過蒙容養苟備職員致勞睿思巨細經慮此乃諫德宗不任宰相親治細事之辭也貞元十年初勃海文王欽茂卒子宏臨早死族弟元義立元義猜虐國人殺之立宏臨之子華嶼是為成王改元中興華嶼卒復立欽茂少子嵩鄰復扶又翻是為康王改元正曆勃海自大祚榮立國開元之間其子武藝立益以強盛東北諸夷皆畏而臣之改元仁安更五代以至于宋耶律雖數加兵不能服也故通鑑歷敍其世為詳十一年十一年春二月乙巳冊拜嵩鄰為忽汗州都督勃海王考異曰實錄乙巳冊大嶺嵩鄰為勃海郡王今從新傳十一年陸贄既罷相裴延齡因譖京兆尹李充衞尉卿張滂前司農卿李銛黨於贄會旱延齡奏言贄等失勢怨望言於衆曰天下旱百姓且流亡度支多欠諸軍芻糧軍中人馬無所食其事柰何言其事勢將柰之何其意非止欲中傷臣而已中竹仲翻言不獨以此為延齡罪且欲危社稷後數日上獵苑中適有神策軍士訴云度支不給馬芻上意延齡言為信遽還宮夏四月壬戌貶贄為忠州別駕充為涪州長史滂為汀州長史開元二十四年開撫福二州山洞置汀州舊志忠州京師南二千一百二十二里汀州京師東南六千一百七十三里譙周巴記曰後漢初平六年立臨江縣屬永寧郡今忠州城東臨江古城是也後魏廢帝二年改為臨州因臨江縣以名州也隋廢州以其地併入巴東郡貞觀四年置忠州以其地連巴徼心懷忠信為名涪州漢涪陵縣地隋置涪州京師南二千三百五十里邵州京師東南三千四百里宋白曰邵州漢為昭陵縣吳改邵陵分零陵北部為邵陵郡隋立建州尋廢州以邵陵縣屬潭州唐貞觀十一年置邵州初陽城自處士徵為諫議大夫見二百三十二卷二年處昌呂翻未至京師人皆想望風采曰城必諫諍死職下及至諸諫官紛紛言事細碎天子益厭苦之而城方與二弟及客日夜痛飲人莫能窺其際皆以為虛得名耳前進士河南韓愈作爭臣論以譏之爭讀曰諍城亦不以屑意有欲造城而問者屑潔也顧也造七到翻輒強與酒揣初委翻強其兩翻客或時先醉仆席上城或時先醉臥客懷中不能聽客語及陸贄等坐貶上怒未解中外惴恐惴之睡翻以為罪且不測無敢救者城聞而起曰不可令天子信用姦臣殺無罪人即帥拾遺王仲舒歸登右補闕熊執易崔邠等守延英門延英門延英殿門也程大昌曰按六典宣政殿門西上閤門之西即為延英門門之左曰延英殿故陽城欲救陸贄約王仲舒等守延英殿閤上書伏閤不去也帥讀曰率贄等無罪上大怒欲加城等罪太子為之營救為于偽翻上意乃解令宰相諭遣之於是金吾將軍張萬福聞諫官伏閤諫趨往至延英門大言賀曰朝廷有直臣天下必太平矣遂遍拜城與仲舒等已而連呼太平萬歲太平萬歲萬福武人年八十餘自此名重天下登崇敬之子也崇敬明禮家學歷事玄肅代及帝四世陽城曰脫以延齡為相城當取白麻壞之唐故事中書用黃白二麻為綸命輕重之辯其後翰林學士專掌內命中書用黃麻其白皆在翰林院拜授將相德音赦宥則用之宋白曰唐故事白麻皆內庭代言命輔臣除節將恤災患討不庭則用之宰臣於正衙受付若命相之書則通事舍人承旨皆宣讚訖始下有司翰林志凡赦書德音立后建儲行大誅討拜免三公宰相命將日並使白麻紙不使印雙日起草候閤門鑰入而後進呈至隻日百寮並班於宣政殿樞密使引案自東上閤門出若拜免宰相即便付通事舍人餘付中書門下並通事舍人宣示若機務急速亦雙日甚速者雖休假亦追班宣示案制案也冊則有冊案冊公主亦自閤門出案壞音怪有李繁者泌之子也城盡疏延齡過惡欲密論之以繁故人子陽城之除諫議李泌之薦也繁徑以告延齡延齡先詣上一一自解疏入上以為妄不之省省悉景翻十一年丙寅幽州奏破奚王啜利等六萬餘衆十一年回鶻奉誠可汗卒無子國人立其相骨咄祿為可汗骨咄祿本姓跌氏奚結翻跌徒結翻跌與回紇同出鐵勒而異種辯慧有勇略自天親時回鶻天親可汗合骨咄祿也大臣諸酋長皆畏服之既為可汗冒姓藥葛羅氏回紇可汗姓藥葛羅骨咄祿捨其本姓冒其姓以嗣其國酋慈由翻長知兩翻自天親可汗以上子孫幼穉者皆內之闕庭唐之闕庭也十一年五月丁丑以宣武留後李萬榮昭義左司馬領留後王虔休皆為節度使十一年甲申河東節度使李自良薨戊子監軍王定遠奏請以行軍司馬李說為留後說神通之五世孫也淮安王神通高祖之從弟起兵關西首應義旗說讀為悅下同十一年庚寅遣祕書監張薦冊拜回鶻可汗骨咄祿為騰里邏羽錄沒密施合胡祿毗伽懷信可汗咄當沒翻邏郎佐翻十一年癸巳以李說為河東留後知府事說深德王定遠請鑄監軍印章乙十六行本印下有從之二字乙十一行本同孔本同張校同退齋校同監軍有印自定遠始十一年秋七月丙寅朔陽城改國子司業坐言裴延齡故也十一年王定遠自恃有功於李說專河東軍政易置諸將說不能盡從由是有隙定遠以私怒拉殺大將彭令茵拉盧合翻埋馬矢中將士皆憤怒說奏其狀定遠聞之直詣說拔刀刺之刺七亦翻說走免定遠召諸將以箱貯敕及告身二十餘通箱竹笥也貯丁呂翻有敕令說詣京師以行軍司馬李景略為留後李景略為李說所忌蓋起於此衆皆拜大將馬良輔竊視箱中皆定遠告身及所受敕也乃麾衆曰敕告皆偽不可受也定遠走登乾陽樓乾陽樓蓋晉陽宮城南門樓莫應踰城而墜為枯枿所傷而死枿五葛翻木之伐去者其遺餘為枿考異曰舊說傳曰定遠殺彭令茵說具以事聞德宗以定遠有奉天扈從功恕死停任制未至定遠怒說奏聞趨府謀殺說昇堂未坐抽刀刺說說走而獲免又曰定遠墜城下槎枿傷而不死尋有詔削奪長流崖州今從實錄十一年八月辛亥司徒兼侍中北平莊武王馬燧薨十一年閏月戊辰元誼以洺州詐降王虔休遣裨將將二千人入城誼皆殺之降戶江翻將即亮翻十一年九月丁巳加韋皋雲南安撫使以安撫南詔為官名十一年橫海節度使程懷直不恤士卒獵於野數日不歸懷直從父兄懷信為兵馬使因衆心之怨閉門拒之懷直奔歸京師冬十月丁丑以懷信為橫海留後十一年南詔攻吐蕃昆明城取之昆明城在西爨西北有鹽池之利施順二蠻皆烏蠻種施蠻在鐵橋西北居大施睒斂尋睒順蠻在劍睒西北四百里睒失冉翻十二年十二年春正月庚子元誼石定蕃等帥洺州兵五千人及其家人萬餘口奔魏州帥讀曰率上釋不問命田緒安撫之十二年乙丑以渾瑊王武俊並兼中書令己巳加嚴震田緒劉濟韋皋並同平章事天下節度觀察使悉加檢校官以悅其意十二年三月甲午韋皋奏降西南蠻高萬唐等二萬餘口降戶江翻十二年乙巳以閑广既宮苑使李齊運為禮部尚書閑广既宮苑二使李齊運蓋兼為之使職如故齊運無才能學術專以柔佞得幸於上每宰相對罷則齊運次進決其議或病臥家上欲有所除授往往遣中使就問之十二年丙子章乙十六行本子作辰乙十一行本同韶王暹薨暹皇弟也十二年魏博節度使田緒尚嘉誠公主有庶子三人季安最幼公主子之以為副大使夏四月庚午緒暴薨左右匿之使季安領軍事年十五乙亥發喪推季安為留後十二年庚辰上生日故事命沙門道士講論於麟德殿至是始命以儒士參之四門博士韋渠牟嘲談辯給後魏劉芳表云太和二十年立四門博士於四門置學按禮記云天子設四學鄭註云周四郊之虞庠也今以其遼遠故置於四門請移與太學同處從之唐百官志四門館博士正七品上掌教七品以上侯伯子男子為生及庶人子為俊士生者旬月遷右補闕始有寵十二年五月丙申邠寧節度使張獻甫暴薨監軍楊明義請都虞候楊朝晟權知留後丙辰以朝晟為邠寧節度使十二年六月乙丑以監句當左神策竇文場監句當右神策霍仙鳴皆為護軍中尉監左神威軍使張尚進監右神威軍使焦希望皆為中護軍句古候翻當丁浪翻左右神策中尉始於竇霍自此宦官之權日以益重不可復制矣下護軍中尉一等為中護軍此職事官之掌禁兵者非如唐初所置勳級所謂上護軍護軍也宋白曰德宗以梁洋扈從之功舉西漢謁者隨何下淮南功拜為中尉事故命神策監軍為中尉初上置六統軍視六尚書以處節度使罷鎮者興元元年置六統軍事見二百二十九卷處昌呂翻至是文場諷宰相比統軍降麻翰林學士鄭絪絪音因奏言故事惟封王命相用白麻今以命中尉不識陛下特以寵文場邪遂為著令也著令者定著為令武德貞觀時中人不過員外將軍同正耳衣緋者無幾自輔國以來墮壞制度衣於既翻墮讀曰隳壞音怪朕今用爾不謂無私若復以麻制宣告天下必謂爾脅我為之矣復扶又翻文場叩頭謝遂焚其麻命幷統軍自今中書降敕明日上謂絪曰宰相不能違拒中人朕得卿言方悟耳是時竇霍勢傾中外藩鎮將帥多出神策軍臺省清要亦有出其門者矣十二年宣武節度使李萬榮病風昏不知事霍仙鳴薦宣武押牙劉沐可委軍政辛巳以沐為行軍司馬十二年宣歙觀察使劉贊卒初上以奉天窘乏故還宮以來尤專意聚斂斂力贍翻下同藩鎮多以進奉市恩皆云稅外方圓折則成方轉則成圓言於常稅之外別自轉折以致貨財也用度羨餘其實或割留常賦或增斂百姓或減刻利章乙十六行本利作吏乙十一行本同祿或販鬻蔬果往往私自入所進纔什一二李兼在江西有月進韋皋在西川有日進其後常州刺史濟源裴肅以進奉遷浙東觀察使刺史進奉自肅始濟子禮翻及劉贊卒判官嚴綬掌留務竭府庫以進奉徵為刑部員外郎幕僚進奉自綬始綬蜀人也史不能審其郡縣故止云蜀人十二年李萬榮疾病其子迺為兵馬使甲申迺集諸將責李湛伊婁說張丕以不憂軍事斥之外縣說讀為悅上遣中使第五守進至汴州宣慰始畢軍士十餘人呼曰呼火故翻下同兵馬使勤勞無賞劉沐何人為行軍司馬沐懼陽中風舁出中竹仲翻舁音余又羊茹翻軍士又呼曰倉官劉叔何給納有姦殺而食之又欲斫守進迺止之迺又殺伊婁說張丕說讀曰悅都虞候匡城鄧惟恭與萬榮鄉里相善萬榮常委以腹心迺亦倚之至是惟恭與監軍俱文珍謀執迺送京師秋七月乙未以東都留守董晉同平章事兼宣武節度使以萬榮為太子少保貶迺虔州司馬丙申萬榮薨鄧惟恭既執李迺遂權軍事自謂當代萬榮不遣人迎董晉晉既受詔即與傔從十餘人赴鎮傔苦念翻從才用翻不用兵衞至鄭州迎者不至九域志鄭州東至汴州一百五十里為于偽翻或勸晉且留觀變有自汴州出者言於晉曰不可入晉不對遂行惟恭以晉來之速不及謀晉去城十餘里惟恭乃帥諸將出迎帥讀曰率晉命惟恭勿下馬氣色甚和惟恭差自安既入仍委惟恭以軍政初劉玄佐增汴州兵至十萬遇之厚李萬榮鄧惟恭每加厚焉士卒驕不能禦禦一作御幕於公庭廡下挾弓執劍以備之時勞賜酒肉廡音武勞力到翻晉至之明日悉罷之董晉之意以謂此士前帥之腹心吾新來為帥若亦恃為腹心不足為吾衞而適足以生變罷之則待諸軍如一且示無所猜間十二年戊戌韓王迥薨迥上弟也十二年壬子詔以宣武將士鄧惟恭等有執送李迺功各遷官賜錢其為迺所脅邀逼制使者皆勿問脅所謂脅從也言李迺以威力脅使其下以邀逼中使唐時謂中使為敕使亦謂之制使使疏吏翻十二年八月乙嚴乙改己未朔日有食之十二年己巳以田季安為魏博節度使十二年丙子以汝州刺史陸長源為宣武行軍司馬朝議以董晉柔仁多可恐不能集事朝議謂朝廷之議多可言凡人有請悉從不能裁以理法長源性剛刻多更張舊事更工衡翻晉初皆許之案成則命且罷由是軍中得安為長源以剛刻致禍張本十二年丙戌門下侍郎同平章事趙憬薨十二年初上不欲生代節度使常自擇行軍司馬以為儲帥行軍司馬掌弼戎政居則習蒐狩有役則申戰守之法器械糧備軍籍賜予皆專焉帥所類翻李說忌之回鶻梅錄入貢過太原說與之宴梅錄爭坐次說不能遏景略叱之梅錄識其聲趨前拜之曰非豐州李端公邪李景略折梅錄見二百三十三卷三年唐人呼侍御為端公李肇國史補曰宰相相呼曰堂老兩省曰閤老尚書曰院長御史曰端公遂就下坐座中皆屬目於景略屬之欲翻說益不平乃厚賂中尉竇文場使去之去羌呂翻會有傳回鶻將入寇者上憂之以豐州當虜衝擇可守者文場因薦景略九月甲午以景略為豐州都防禦使窮邊氣寒土瘠民貧景略以勤儉帥衆帥讀曰率二歲之後儲備完實雄於北邊十二年盧邁得風疾庚子賈耽私忌父母及祖父母曾祖父母死日為私忌言宰相班絕無一人唐制尚書省主書從八品下中書省從七品上堂吏也十二年丙午戶部尚書判度支裴延齡卒中外相賀上獨悼惜之十二年壬子吐蕃寇慶州十二年冬十月甲戌以諫議大夫崔損給事中趙宗儒並同平章事損玄暐之弟孫也崔玄暐有誅二張復中宗之功故用之十二年十一月乙未以右補闕韋渠牟為左諫議大夫上自陸贄貶官去年四月陸贄貶自御史刺史縣令以上皆自選用中書行文書而已然深居禁中所取信者裴延齡李齊運戶部郎中王紹司農卿李實翰林學士韋執誼及渠牟皆權傾宰相趨附盈門紹謹密無損益實狡險掊克執誼以文章與上唱和掊蒲侯翻和胡臥翻年二十餘自右拾遺召入翰林渠牟形神恌躁恌他彫翻尤為上所親狎上每對執政漏不過三刻渠牟奏事率至六刻語笑款狎往往聞外聞音問所薦引咸不次遷擢率皆庸鄙之士十二年宣武都虞候鄧惟恭內不自安潛結將士二百餘人謀作亂事覺董晉悉捕斬其黨械惟恭送京師己未詔免死汀州安置投竄於荒遠州郡謂之安置十三年十三年春正月壬寅吐蕃遣使請和親上以吐蕃數負約數所角翻不許十三年上以方渠合道木波皆吐蕃要路欲城之九域志環州治通遠縣唐方渠縣地有木波馬嶺石昌合道四鎮須幾何兵對曰邠寧兵足以城之不煩他道上復使問之曰曏城鹽州城鹽州見上卷九年復扶又翻僅能集事今三城尤逼虜境兵當倍之事更相反何也對曰城鹽州之衆虜皆知之今發本鎮兵不旬日至塞下出其不意而城之虜謂吾衆亦不減七萬其衆未集不敢輕來犯我不過三旬吾城已畢留兵戍之虜雖至無能為也此後周韋孝寬城汾石之故智也不能久留虜退則運芻糧以實之此萬全之策也若大集諸道兵踰月始至虜亦集衆而來與我爭戰勝負未可知何暇築城哉上從之二月朝晟分軍為三各築一城軍吏曰方渠無井不可屯軍判官孟子周曰方渠承平之時居人成市無井何以聚人乎命浚眢井眢井廢井也眢烏歡翻方渠縣鹹河從土橋歸德州同家谷三處發源來鹹苦不可食甜河在城西從蕃部鼻家族北界來供人飲食三城成考異曰實錄先是邠寧楊朝晟奏方渠合道木波皆賊路也請城其地以備之詔問須幾何人邠志曰十三年春詔問楊公曰方渠合道木波皆賊路也城之可乎若以為可更要幾兵二月十一日起復除本官十四日制書到軍十八日發軍二十六日軍次石堂谷二十八日功就三城今從邠志而不取其日四月庚申楊朝晟軍還至馬嶺唐馬嶺縣屬慶州劉昫曰馬嶺隋縣治天家堡貞觀八年移理新城以縣西有馬嶺坂宋白曰鹽州治五原即漢馬嶺縣地今州南抵慶州馬嶺縣北界杜佑馬嶺縣漢舊牧地川形似馬領相拒數日而去朝晟遂城馬嶺而還開地三百里皆如其素皆如其素所慮之期也建中間朔方兵破李納軍朝晟為之也蓋其智略誠有足稱者還從宣翻又如字十三年庚午義成節度使李復薨庚辰以陝虢觀察使姚南仲為義成節度使監軍薛盈珍方大會聞之言曰姚大夫書生豈將才也將即亮翻判官盧坦私謂人曰姚大夫外雖柔中甚剛監軍侵之必不受軍府之禍自此始矣吾恐為所留遂自他道潛去南仲果以牒請之不遇得免既而盈珍與南仲有隙幕府多以罪貶有死者事見後十六年史言盧坦庶乎見幾十三年吐蕃贊普乞立贊卒子足之煎立十三年六月壬午韋皋奏吐蕃入寇巂州刺史曹高仕破之於臺登城下臺登漢縣唐屬巂州由清溪關西南至臺登五百五十里十三年光祿少卿同正張茂宗員外置同正員起於高宗之時茂昭時為義武節度使義章公主上女也義章縣名屬郴州宋白曰漢郴縣地隋末蕭銑分郴縣立茂宗母卒遺表請終嘉禮上許之秋八月癸酉起復茂宗左衞將軍同正左拾遺義興蔣乂上疏諫考異曰實錄作蔣武按舊傳乂本名武兵革之急古有墨衰從事者衰倉回翻左傳晉文公卒未葬秦穆公伐鄭晉襄公墨衰絰以敗秦師于殽未聞駙馬起復尚主也上遣中使諭之不止乃特召對於延英唐中世以後召對宰輔乃開延英今蔣乂特以拾遺召對人間多借吉成婚者卿何執此之堅對曰婚姻喪紀人之大倫吉凶不可瀆也委巷之家不知禮教委巷曲巷也言其屈曲僻陋言貧而喪其親也未聞男子借吉娶婦者也太常博士韋彤裴堪復上疏諫復扶又翻上不悅命趣下嫁之期趣讀曰促辛巳成婚十三年九月己丑中書侍郎同平章事盧邁以病罷為太子賓客十三年冬十月淮西節度使吳少誠亶開刀溝入汝刀溝新舊書皆作司洧水不從命兵部郎中盧㣥往詰之詰去吉翻少誠曰開此水大利於人㣥曰君令臣行雖利人臣敢專乎公承天子之令而不從何以使下吏從公之令乎少誠遽為之罷役為于偽翻史言杖大義者獷悍不能不為之革面十三年十二月徐州節度使張建封入朝先是宮中市外間物令官吏主之隨給其直先悉薦翻比毗至翻近也謂之宮市抑買人物稍不如本估估者價也復扶又翻下同置白望數百人於兩市白望者言使人於市中左右望白取其物不還本價也兩市長安城中東市西市也隋名東市曰都會西市曰利人閱人所賣物但稱宮市則斂手付與真偽不復可辯無敢問所從來及論價之高下者率用直百錢物買人直數千物多以紅紫染故衣敗繒繒慈陵翻尺寸裂而給之仍索進奉門戶及腳價錢索山客翻進奉門戶者言進奉所經由門戶皆有費用如漢靈帝時所謂導行費也腳價謂僦人負荷進奉物入內有雇腳之費人將物詣市將齎持也名為宮市其實奪之商賈有良貨皆深匿之賈音古每敕使出雖沽漿賣餅者皆撤業閉門嘗有農夫以驢負柴宦者稱宮市取之與絹數尺又就索門戶索山客翻仍邀驢送柴至內農夫啼泣以所得絹與之不肯受曰須得爾驢須者意所欲也我有父母妻子待此然後食言待此驢負物貿易然後可以給食不取直而歸汝尚不肯我有死而已遂毆宦者街吏擒以聞毆烏口翻街吏即金吾左右街使之屬吏詔黜宦者賜農夫絹十匹然宮市亦不為之改諫官御史數諫不聽為于偽翻數所角翻建封入朝具奏之上頗嘉納以問戶部侍郎判度支蘇弁弁希宦者意對曰京師游手萬家無土著生業著直略翻仰宮市取給仰牛向翻上信之故凡言宮市者皆不聽十四年十四年春二月乙亥名申光蔡軍曰彰義吳少誠時據淮西有申光蔡三州十四年夏閏五月庚申以神策行營節度使韓全義為夏綏銀宥節度使全義時屯長武城詔帥其衆赴鎮帥讀曰率士卒以夏州磧鹵磧沙磧鹵鹹鹵磧鹵之地五穀不生磧七迹翻不樂徙居樂音洛辛酉軍亂殺大將王栖巖全義踰城走史言韓全義駑怯無御衆之略徒以憑結宦官致節鉞衆然後定崇文幽州人也丙子以崇文為長武城都知兵馬使不降敕令中使口宣授之口宣聖旨而授之官使掌兵史言德宗重宦臣而輕詔命十四年秋七月壬申給事中同平章事趙宗儒罷為右庶子以工部侍郎鄭餘慶為中書侍郎同平章事十四年八月初置左右神策統軍觀此則知神策在六軍之外稟賜優厚稟給也稱行營皆統於中尉其軍遂至十五萬人十四年京兆尹吳湊屢言宮市之弊章乙十六行本弊下有請委之府縣五字乙十一行本同孔本同張校同退齋校同府作州宦者言湊屢奏宮市皆右金吾都知趙洽田秀嵓之謀也丙午洽秀嵓坐流天德軍都知金吾府吏右職也十四年九月丙申以陝虢觀察使于頔為山南東道節度使頔音迪十四年丁卯王倕薨倕肅宗子倕音垂十四年彰武節度使吳少誠遣兵掠壽州霍山彰武當作彰義霍山本漢廬江之灊城縣梁置霍州隋置霍山縣唐屬壽州開元二十七年改霍山曰盛唐天寶初析盛唐別置霍山縣其地屬今壽州六安縣界宋白曰貞元六年初置藍田渭橋等鎮遏使置兵鎮守十四年太學生薛約師事司業陽城坐言事徙連州城送之郊外上以城黨罪人己巳左遷城道州刺史考異曰實錄新舊傳無年月柳宗元陽公遺愛碣曰四年五月皇帝以銀印赤紱即隱所起陽公為諫議大夫後七年廷諍懇至帝尤嘉異遷為國子司業又四年九月己巳出拜道州刺史太學魯郡季償廬江何蕃等百六十人投業奔走稽首闕下叫閽籲天願乞復舊朝廷重更其事如己巳詔今從之州之賦稅不登觀察使數加誚讓治直之翻數所角翻誚才笑翻城自署其考曰撫字心勞徵科政拙考下下觀察使遣判官督其賦至州城先自囚於獄判官大驚馳入謁城於獄曰使君何罪某奉命來候安否耳留一二日未去城不復復扶又翻歸館門外有故門扇橫地城晝夜坐臥其上判官不自安辭去其後又遣他判官往按之他判官載妻子中道逸去陽城之名德人知敬之彼不之知而使按之者果何人也十四年冬十月丁酉通王諶薨諶上子也音氏壬翻十四年庚子夏州節度使韓全義奏破吐蕃於鹽州西北十四年明州鎮將栗鍠姓譜栗姓栗陸氏之後漢長安有富室栗氏誘山越作亂攻陷浙東州縣明州山越今慈溪鄞縣南界奉化縣西北界山民也鍠戶盲翻又音皇誘音酉十五年十五年春正月甲寅雅王逸薨逸皇弟也十五年二月丁丑宣武節度使董晉薨乙酉以其行軍司馬陸長源為節度使長源性刻急恃才傲物判官孟叔度輕佻淫縱佻他彫翻好慢侮將士軍中皆惡之惡烏路翻董晉薨長源知留後揚言曰將士弛慢日久當以法齊之耳衆皆懼或勸之發財以勞軍勞力到翻長源曰我豈章乙十六行本豈下有效字乙十一行本同孔本同張校同河北賊以錢買健兒求節鉞邪故事主帥薨帥所類翻給軍士布以制服長源命給其直叔度高鹽直下布直人不過得鹽三二斤軍中怨怒長源亦不為之備是日軍士作亂殺長源叔度臠食之立盡史言陸長源之死唐朝用違其才耳若孟叔度則死有餘罪得衆心密書召之逸準引兵徑入汴州亂衆乃定十五年以常州刺史李錡為浙西觀察使諸道鹽鐵轉運使錡國貞之子也錡魚豈翻又音奇肅宗末李國貞為絳州行營兵所殺閑广既宮苑使李齊運受其賂數十萬薦之於上故用之錡刻剝以事進奉上由是悅之為李錡以浙西叛張本十五年庚辰浙東觀察使裴肅擒栗鍠於台州章乙十六行本州下有送京師三字乙十一行本同孔本同退齋校同斬之十五年己丑以劉逸準為宣武節度使賜名全諒十五年三月甲寅吳少誠遣兵襲唐州殺監軍邵國朝鎮遏使張嘉瑜掠百姓千餘人而去十五年戊午昭義節度使王虔休薨戊辰以河陽懷州節度使李元淳為昭義節度使十五年夏四月癸未以安州刺史伊慎為安黃等州節度使據章鈺資治通鑑校宋記補十五年癸巳山南西道節度使嚴震薨十五年南詔異牟尋遣使與韋皋約共擊吐蕃皋以兵糧未集請俟他年韋皋有智略恐南詔貌與而未悉其心也故以兵糧未集辭此可與智者道十五年山南西道都虞候嚴礪諂事嚴震震病使知留後遺表薦之秋七月乙巳以礪為山南西道節度使十五年八月章乙十六行本月下有丙申二字乙十一行本同孔本同張校同退齋校同陳許節度使曲環薨乙未吳少誠遣兵掠臨潁臨潁漢古縣唐屬許州九域志在許州東南六十里宋白曰隋大業四年自故城移於臨潁皋其地實岡阜也遣大將王令忠將兵三千救之皆為少誠所虜丙張丙上脫九月午以涗為陳許節度使涗舒芮翻少誠遂圍許州涗欲棄城走營田副使劉昌裔止之曰城中兵足以辦賊但閉城勿與戰不過數日賊氣自衰吾以全制其弊蔑不克矣蔑無也昌裔募勇士千人鑿城出擊少誠大破之城由是全昌裔兗州人也少誠又寇西華西華漢縣唐屬陳州九域志在州西八十里陳許都知兵馬使安國寧與上官涗不叶謀翻城應少誠劉昌裔以計斬之召其麾下人給二縑伏兵要巷見持縑者悉斬之無得脫者十五年庚辰張辰作戌宣武節度使劉全諒薨軍中思劉玄佐之恩推其甥都知兵馬使匡城韓弘為留後弘將兵識其材鄙勇怯指顧必堪其事十五年丙辰詔削奪吳少誠官爵令諸道進兵討之十五年辛酉以韓弘為宣武節度使先是少誠章乙十六行本誠下有遣使二字乙十一行本同孔本同張校同與劉全諒約共攻陳許先悉薦翻以陳州歸宣武使者數輩猶在館弘悉驅出斬之選卒三千會諸軍擊少誠於許下少誠由是失勢無同惡相濟故失勢十五年冬十月乙丑邕王謜薨謜徐園翻太子之子也上愛而子之及薨諡曰文敬太子十五年山南東道節度使于頔安黃節度使伊慎知壽州事王宗與上官涗韓弘進擊吳少誠屢破之十一月壬子于頔奏拔吳房朗山後魏置襄城郡於漢汝南西平之地仍置遂寧縣隋大業初改曰吳房吳房本漢縣名應劭曰本房子國楚以封吳夫概王故曰吳房朗山漢安昌縣地後魏置初安郡隋開皇十八年改安昌為朗山唐並屬蔡州宋朝避聖祖諱改朗山為確山九域志吳房在蔡州西北七十里朗山在蔡州西南七十五里十五年十二月辛未中書令咸寧王渾瑊薨于河中渾瑊封咸寧郡王雖位窮將相無自矜大之色每貢物必躬自閱視受賜如在上前由是為上所親愛上還自興元雖一州一鎮有兵者皆務姑息瑊每奏事不過唐制凡奏事得可者皆過門下省中書省不過者寢其奏不下也上不疑我故能以功名終十五年六州党項自永泰以來居于石州代宗永泰之後改為大曆六州党項部落曰野利越詩野利龍兒野利厥律兒黃野海野窣等居慶州號東山部夏州號平夏部永泰之後稍徙石州唐蓋置永安鎮將於石州以綏御党項暕古限翻十五年諸軍討吳少誠者既無統帥帥所類翻每出兵人自規利規圖也乙未諸軍自潰於小殷水殷與㶏同音殷又音隱水經註潁水東南過臨潁縣小㶏水注之又東過西華縣北又南過汝陽縣北又東南過南頓縣北大㶏水從西來注之宋白曰蔡州汝陽縣隋開皇十七年改為殷水今界內水有大殷小殷之名其年又於上蔡縣東北別置汝陽縣皆為少誠所有於是始議置招討使十五年吐蕃衆五萬分擊南詔及巂州異牟尋與韋皋各發兵禦之吐蕃無功而還還音旋又如字十六年十六年春正月章乙十六行本月下有乙巳二字乙十一行本同孔本同張校同退齋校同恆冀易定陳許河陽四軍與吳少誠戰皆不利而退夏綏節度使韓全義本出神策軍中尉竇文場愛厚之薦於上使統諸軍討吳少誠二月乙酉以全義為蔡州四面行營招討使十七道兵皆受全義節度為韓全義喪師張本十六年宣武軍自劉玄佐薨凡五作亂貞元八年玄佐薨汴卒拒吳湊而立其子士寧李萬榮既逐士寧十年韓惟清等亂十二年萬榮死其子迺以兵亂董晉既入汴鄧惟恭復謀亂十四年晉薨兵又亂殺留後凡五亂輕其主帥帥所類翻韓弘視事數月皆知其主名有郎將劉鍔常為唱首三月弘陳兵牙門召鍔及其黨三百人數之以數預於亂數之之數音所具翻數預之數所角翻自以為功悉斬之血流丹道自是至弘入朝憲宗元和十四年韓弘入朝士卒無一人敢讙呼於城郭者讙許元翻呼火故翻十六年義成監軍薛盈珍為上所寵信欲奪節度使姚南仲軍政南仲不從由是有隙盈珍譖其幕僚馬總貶泉州別駕福建觀察使柳冕謀害總以媚盈珍遣幕僚寶鼎薛戎攝泉州事使按致總罪戎為辯析其無辜為于偽翻冕怒召戎囚之使守卒恣為侵辱如此彌月徐誘之使誣總戎終不從總由是獲免冕芳之子也柳芳有史學事玄宗肅宗盈珍屢毀南仲於上上疑之盈珍乃章乙十六行本乃作又乙十一行本同孔本同遣小吏程務盈乘驛誣奏南仲罪牙將曹文洽亦奏事長安知之晨夜兼行追及務盈於長樂驛長樂驛在長安城東滻坡中夜殺之沈盈珍表於廁中自作表雪南仲之冤且首專殺之罪首式又翻亦作狀白南仲遂自殺明旦門不啟驛吏排之入得表狀於文洽尸旁上聞而異之徵盈珍入朝南仲恐盈珍讒之益深亦請入朝夏四月丙子南仲至京師待罪於金吾金吾左右仗凡內外官之待罪者詣焉召見見賢遍翻上問盈珍擾卿邪對曰盈珍不擾臣但亂陛下法耳且天下如盈珍輩何可勝數勝音升數所具翻雖使羊杜復生羊杜謂羊祜杜預復扶又翻成攻取之功也上默然竟不罪盈珍仍使掌機密盈珍又言於上曰南仲惡政皆幕僚馬少微贊之也詔貶少微江南官遣中使送之推墜江中而死推吐雷翻十六年黔中觀察使韋士宗政令苛刻黔渠今翻丁亥牙將傅近等逐之出奔施州九域志黔州東北至施州四百一十一里十六年新羅王敬嚴敬改信則卒庚寅冊命其嫡孫俊邕為新羅王十六年韓全義素無勇略專以巧佞貨賂結宦官得為大帥帥所類翻每議軍事宦者為監軍者數十人坐帳中爭論紛然莫能決而罷天漸暑士卒久屯沮洳之地沮將預翻洳人恕翻沮洳漸濕也多病疫章乙十六行本疫下有全義不存撫五字乙十一行本同退齋校同孔本同撫作恤張校同云撫無註本作恤人有離心五月庚戌與吳少誠將吳秀吳少陽等戰于殷南廣利原殷南殷水之南也諸軍大潰秀等乘之全義退保五樓五樓在殷水縣西南滄州清池人也宋白曰漢浮陽縣隋開皇十八年改曰清池因縣東南有清池為名十六年山南東道節度使于頔因討吳少誠大募戰士繕甲厲兵聚斂貨財恣行誅殺有據漢南之志專以慢上陵下為事上方姑息藩鎮知其所為無如之何頔誣鄧州刺史元洪贓罪至德元載升襄陽防禦使為山南東道節度使領襄鄧隨唐安均房金商九州貞元元年以鄧州隸東都畿以此觀之此時復領鄧州矣遣中使護送至棗陽棗陽漢舂陵之地隋置棗陽縣唐初屬唐州貞觀十一年廢屬隨州九域志在州西北一百六十里距襄州一百三十五里中使奔歸頔表洪責太重上復以洪為吉州長史乃遣之復扶又翻又怒判官薛正倫奏貶峽州長史比敕下比必利翻及也頔怒已解復奏留為判官上一一從之十六年徐泗濠節度使張建封鎮彭城十餘年貞元四年張建封鎮彭城治直吏翻病篤章乙十六行本篤下有累表二字乙十一行本同孔本同張校同退齋校同請除代人辛亥以蘇州刺史韋夏卿為徐泗濠行軍司馬敕下建封已薨夏卿執誼之從祖兄也徐州判官鄭通誠知留後恐軍士為變會浙西兵過彭城通誠欲引入城為援軍士怒壬子數千人斧庫門出甲兵擐執之擐音患圍牙城劫建封子前虢州參軍愔令知軍府事愔挹淫翻殺通誠及大將段伯熊等數人械繫監軍上聞之以吏部員外郎李鄘為徐州宣慰使鄘直抵其軍鄘余封翻召將士宣朝旨諭以禍福朝直遙翻下同脫監軍械使復其位凶黨不敢犯愔上表稱兵馬留後鄘以非朝命不受使削去然後受之以歸去羌呂翻十六年靈州破吐蕃於烏蘭橋唐書地理志會州烏蘭縣有烏蘭關橋當在關外黃河上十六年丙寅韋士宗復入黔中是年四月韋士宗為牙將傅近所逐黔音禽又其廉翻十六年湖南觀察使河中呂渭奏發永州刺史陽履贓賄履表稱所斂物皆備進奉上召詣長安丁丑嚴丑改卯命三司使鞫之詰其物費用所歸履曰已市馬進之矣又詰馬主為誰馬齒幾何對曰馬主東西南北之人今不知所之按禮齒路馬有誅曲禮之言所對率如此上悅其進奉之言釋之但免官而已德宗之猜忌如楊炎竇參位居宰輔皆以歸過於君不置之地上陽履以贓敗而表稱進奉謂非歸過於君可乎德宗悅其進奉之言而釋其罪夫好貨非美名也人雖有好貨者苟加以好貨之名則必怫然而不受德宗果何為而安受此名也余意陽履於贓賄既敗之後必有所進以求免於罪德宗不徒悅其言而已十六年丙戌加淄青節度使李師古同平章事十六年徐州亂兵為張愔表求旄節為于偽翻朝廷不許加淮南節度使杜佑同平章事兼徐濠泗節度使使討之佑大具舟艦遣牙將孟準為前鋒濟淮而敗佑不敢進泗州刺史張伾出兵攻埇橋大敗而還朝廷不得已除愔徐州團練使以伾為泗州留後濠州刺史杜兼為濠州留後仍加佑兼濠泗觀察使分濠泗隸淮南以弱徐州之權考異曰實錄十二月癸卯泗州濠州宣令淮南觀察使收管今因此終言之兼正倫五世孫也杜正倫相太宗高宗建封之疾亟也兼陰圖代之自濠州疾驅至府幕僚李藩與同列入問建封疾出見之泣曰僕射疾危如此張建封加僕射故稱之今棄州此來欲何為也宜速去不然當奏之兼錯愕出不意遂徑歸建封薨藩歸揚州兼誣奏藩於建封之薨搖動軍情上大怒密詔杜佑使殺之佑素重藩懷詔旬日不忍發因引藩論佛經曰佛言果報有諸藩曰有之佛經言人所造作善惡為果隨其所作而應之以禍福為報審如此君宜遇事無恐因出詔示藩藩神色不變曰此真報也佑曰君慎勿出口吾已密論用百口保君矣人謂其家之親屬為百口召藩詣長安望見藩儀度安雅乃曰此豈為惡者邪即除祕書郎十六年新羅王俊邕卒國人立其子重熙重直龍翻十六年秋七月吳少誠進擊韓全義於五樓諸軍復大敗復扶又翻下同全義夜遁保殷水縣城殷水縣漢汝陽縣地隋置殷水縣廢汝陽入焉唐屬陳州九域志在州西南八十里十六年盧龍節度使劉濟弟源為涿州刺史不受濟命濟引兵擊擒之十六年九月癸卯義成節度使盧㣥薨甲戌嚴戌改辰以尚書左丞李元素代之賈耽曰凡就軍中除節度使必有愛憎向背背蒲妹翻喜懼者相半故衆心多不安自今願陛下只自朝廷除人庶無他變上以為然十六年中書侍郎同平章事鄭餘慶與戶部侍郎判度支于䪹素善䪹所奏事餘慶多勸上從之上以為朋比䪹薄諧翻又蒲回翻比毗至翻庚戌貶餘慶郴州司馬䪹泉州司戶郴丑林翻宋白曰泉州江左之晉安郡隋置泉州舊理閩縣後移於南安縣唐聖曆元年分泉州之南安莆田龍溪三縣置武榮州景雲二年改泉州舊志泉州京師東南七千三百里考異曰舊傳曰時歲旱人飢德宗與宰相議將賑給禁衞十軍事未行為中書吏所洩餘慶貶郴州司馬按實錄餘慶與于䪹同貶餘慶制辭云乃乖正直有涉比周棄法弄情公行黨庇䪹制辭云性本纖狡行惟黨附奏對每乖於事實傾邪有蠹於彞章今從之䪹頔之兄也十六年癸丑吳少誠進逼殷水數里置營韓全義復帥諸軍退保陳州帥讀曰率下同宣武河陽兵私歸本道獨陳許將孟元陽神策將蘇光榮帥所部留軍殷水全義以詐誘昭義將夏侯仲宣義成將時昂河陽將權文變嚴變改度河中將郭湘等斬之欲以威衆全義至陳州刺史劉昌裔登城謂之曰天子命公討蔡州今乃來此昌裔不敢納請舍于城外既而昌裔齎牛酒入全義營犒師全義驚喜心服之己未孟元陽等與吳少誠戰殺二千餘人十六年庚申以太常卿齊抗為中書舍人同平章事新書宰相表齊抗為中書侍郎同平章事十六年癸亥以張愔為徐州留後十六年冬十月吳少誠引兵還蔡州孟元陽折其鋒故退韋皋聞諸軍討少誠無功先悉薦翻上言請以渾瑊賈耽為元帥統諸軍渾瑊薨於去年十二月韋皋蓋上言於瑊未薨之前重難也出荊楚以翦凶逆韋皋欲為元帥然亦以大言衒朝廷耳彼豈肯去西川邪因其請罪而赦之罷兩河諸軍以休息公私亦策之次也若少誠一旦罪盈惡稔為麾下所殺則又當以其爵位授之是除一少誠生一少誠為患無窮矣賈耽言於上曰賊意蓋亦望恩貸恐須開其生路上從之會少誠致書幣於監官軍者求昭洗監軍奏之戊子詔赦少誠及彰義將士復其官爵考異曰實錄九月壬寅宰相對於延英賈耽奏一昨韓全義五樓退軍賊不敢追趁者應望國家恩貸恐須開其生路上是之按全義自五樓退保殷水少誠逼殷水下營全義又退保陳州非不敢追趁也又云諸軍討蔡州未嘗整陣交鋒而王師累挫潰吳少誠知王師無能為致書幣以告監軍願求昭洗上既納賈耽之議又得監軍善奏遂復其官爵按少誠知王師無能為則愈當侵軼豈肯從監軍求昭洗蓋少誠起兵以來不能無疲弊故求休息耳今不取十六年己丑河東節度使李說薨甲午以其行軍司馬鄭儋為節度使儋都甘翻上擇可以代儋者以刑部員外郎嚴綬嘗以幕僚進奉嚴綬進奉事見上十二年史言德宗好貨惟進奉者則牢記其姓名章乙十六行本為下有河東二字乙十一行本同孔本同行軍司馬十六年吐蕃數為韋皋所敗數所角翻下同敗補邁翻是歲其曩貢臘城等九節度嬰籠官馬定德帥其部落來降定德有智略吐蕃諸將行兵皆稟其謀策常乘驛計事至是以兵數不利恐獲罪遂來奔據舊書云吐蕃酋帥兼監統曩貢臘城等九節度羽女羽女籠官馬定德與其大將八十七人舉部落來降定德有計畫羽女羽女知兵法及山川地形至是以邊功不立懼得罪而來如此則羽女羽女別是一人籠官馬定德又是一人考之字書亦無羽女字然通鑑所書全用舊書韋皋傳文蓋舊書韋皋傳與吐蕃傳自相抵捂帥讀曰率容肇祖標點聶崇岐覆校
