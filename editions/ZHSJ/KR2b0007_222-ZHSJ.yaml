body:
  text: 資治通鑑卷第二百二十二端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註唐紀三十八肅宗文明武德大聖大宣孝皇帝下之下上元二年上元二年春正月癸卯史思明改元應天上元二年張景超引兵攻杭州敗李藏用將李彊於石夷門敗補邁翻將即亮翻下同孫待封自武康南出吳分烏程餘杭二縣置永安縣晉改為永康又改為武康唐屬杭州自武康南出過狗頭嶺至杭州五十里去年李藏用使溫晁屯餘杭餘杭東至杭州錢塘縣界一十八里又東二十七里則至杭州此陸路也故溫晁得趨而據險以敗孫待封李可封以常州降丁未田神功使特進楊惠元等將千五百人西擊王戶登翻辛亥夜神功先遣特進范知新等將四千人自白沙濟西趣下蜀鄧景山將千人自海陵濟東趣常州趣七喻翻下同神功與邢延恩將三千人軍於瓜洲壬子濟江展將步騎萬餘陳於蒜山陳讀曰陣蒜山在潤州城西三里其上多蒜故名蒜蘇貫翻神功以舟載兵趣金山會大風五舟飄抵金山下金山在大江中南直西津渡口去潤州城七里沈其三舟沈持林翻神功不得渡還軍瓜洲而范知新等兵已至下蜀展擊之不勝弟殷勸展引兵逃入海可延歲月展曰若事不濟何用多殺人父子乎死早晚等耳遂更率衆力戰帥讀曰率章胡註帥讀曰率十二行本作帥是註本刻誤乙十一行本同將軍賈隱林射展中目而仆遂斬之射而亦翻中竹仲翻考異曰實錄云乙卯平盧兵馬使田神功生擒逆賊劉展舊神功傳亦然今從劉展亂紀劉殷許嶧等皆死嶧音亦隱林滑州人也楊惠元等擊破王於淮南引兵東走至常熟乃降王東走渡江而至常熟晉分吳縣置海虞縣梁立信義郡南沙縣隋平陳廢郡幷海虞南沙海陽前京信義興國等縣為常熟縣屬蘇州張景超聚兵至七千餘人聞展死悉以兵授張法雷使攻杭州景超逃入海法雷至杭州李藏用擊破之餘黨皆平平盧軍大掠十餘日田神功所將平盧兵也亂兵不及江淮至是其民始罹荼毒矣考異曰劉展亂紀孫待封降以下事在二月今因展敗終言之上元二年荊南節度使呂諲奏請以江嚴江改湖南之潭岳郴邵永道連黔中之涪州皆隸荊南從之邵州漢召陵都梁之地召陵後漢改為昭陽晉改為邵陽吳立邵陵郡隋廢郡為邵陽縣屬潭州唐武德四年分置南梁州貞觀十年更名邵州郴丑林翻黔其今翻上元二年二月奴剌党項寇寶雞奴剌西羌種落之名剌來葛翻至德二載改陳倉縣為寶雞縣以其地有秦時寶雞祠故也時屬鳳翔府南侵鳳州殺刺史蕭㤤㤤余世翻大掠而西鳳翔節度使李鼎追擊破之上元二年戊辰新羅王金嶷入朝嶷魚力翻因請宿衞上元二年或言洛中將士皆燕人燕於肩翻久戍思歸上下離心擊之可破也陝州觀軍容使魚朝恩以為信然屢言於上上敕李光弼等進取東京光弼奏稱賊鋒尚銳未可輕進朔方節度使僕固懷恩勇而愎愎蒲逼翻麾下皆蕃漢勁卒恃功多不法郭子儀寬厚曲容之每用兵臨敵倚以集事李光弼性嚴一裁之以法無所假貸懷恩憚光弼而心惡之乃附朝恩言東都可取史言僕固懷恩欲覆李光弼之軍以便其私惡烏故翻朝直遙翻光弼不得已使鄭陳節度使李抱玉守河陽與懷恩將兵會朝恩及神策節度使衞伯玉攻洛陽戊寅陳於邙山光弼命依險而陳懷恩陳於平原光弼曰依險則可以進可以退若平原戰而不利則盡矣思明不可忽也命移於險懷恩復止之史思明乘其陳未定陳讀曰陣進兵薄之官軍大敗死者數千人軍資器械盡棄之考異曰實錄曰史思明潛遣間諜反說官軍曰洛中將士久戍思歸士多不睦魚朝恩以為然乃告光弼及僕固懷恩衞伯玉等曰可速出軍以掃殘寇光弼等然之今從舊光弼傳實錄曰光弼懷恩敗績步兵死者數萬今從舊思明傳朝恩伯玉奔還陝抱玉亦棄河陽走河陽懷州皆沒於賊朝廷聞之大懼益兵屯陝相州之敗邙山之敗皆魚朝恩為之也唐不以覆軍之罪罪朝恩而罷郭李兵柄失刑甚矣上元二年李揆與呂諲同為相不相悅乾元二年李揆與呂諲同相上元元年諲罷以善政聞揆恐其復入相奏言置軍湖南非便潭郴邵永道連皆在洞庭湖之南呂諲請兼領之故揆言非其便復扶又翻荊謂荊南湖謂湖南諲上疏訟揆罪癸未貶揆袁州長史以河中節度使蕭華為中書侍郎同平章事上元二年史思明猜忍好殺好呼到翻㣥下小不如意動至族誅人不自保朝義其長子也朝直遙翻下朝清同長知兩翻常從思明將兵頗謙謹愛士卒將士多附之無寵於思明思明愛少子朝清使守范陽朝清守范陽事始上卷上年少詩照翻立朝清為太子左右頗泄其謀思明既破李光弼欲乘勝西入關使朝義將兵為前鋒自北道襲陝城思明自南道將大軍繼之南道出二崤之間漢建安中曹公西討巴蜀惡南路之險更開北道甲午朝義兵至礓子嶺即礓子阪也按舊書礓子嶺在陝城東破之考異曰實錄作甲子按長曆此月丙戌朔下有戊戌當作甲午皆為陝兵所敗數所角翻敗補邁翻思明退屯永寧以朝義為怯曰終不足成吾事欲按軍法斬朝義及諸將戊戌命朝義築三隅城新書作三角城蓋一角依山止築其三角也貯丁呂翻期一日畢朝義築畢未泥思明至詬怒之令左右立馬監泥斯須而畢詬古候翻監古銜翻思明又曰俟克陝州終斬此賊朝義憂懼不知所為思明在鹿橋驛鹿橋驛永寧傳舍也貞觀十七年嘗徙永寧縣於此朝義宿於逆旅水經註陝城東有漫澗澗北有逆旅亭謂之漫口客舍此酈道元以一時經由所見者言之耳自元魏至唐乾元上元間三百許年矣漫口客舍必不復存此逆旅特汎言旅舍耳說式芮翻悅等與王死無日矣自古有廢立請召曹將軍謀之朝義俛首不應俛音免悅等曰王苟不許悅等今歸李氏王亦不全矣朝義泣曰諸君善為之勿驚聖人當時臣子謂其君父為聖人至則以其謀告之曹將軍知諸將盡怨恐禍及己不敢違令力丁翻將即亮翻是夕悅等以朝義部兵三百被甲詣驛被皮義翻宿衞兵怪之畏曹將軍不敢動悅等引兵入至思明寢所值思明如廁問左右未及對已殺數人左右指示之思明聞有變踰垣至广既章十二行本作中乙十一行本同自鞴馬乘之鞴平祕翻悅傔人周子俊射之傔丁念翻射而亦翻中臂墜馬遂擒之中竹仲翻思明問亂者為誰悅曰奉懷王命思明封朝義為懷王我朝來語失謂欲斬朝義也然殺我太早何不待我克長安今事不成矣悅等送思明於柳泉驛囚之唐制三十里一驛柳泉驛又當在鹿橋驛東三十里考異曰河洛春秋曰思明混諸嫡庶以少者為尊唯愛所鍾即為繼嗣欲殺朝義追朝清為偽太子左右泄之父子之隙自此始構邠志曰三月思明乘勝欲下陝城使朝義帥銳卒北路先往己自宜陽引衆繼之今從實錄舊傳報朝義曰事成矣還從宣翻朝直遙翻朝義曰不驚聖人乎悅曰無時周摯許叔冀將後軍在福昌將即亮翻又音如字福昌又在柳泉驛之東宋白曰福昌縣唐屬洛州古宜陽地今縣治魏一泉塢城悅等使許季常往告之摯驚倒於地朝義引軍還摯叔冀來迎悅等勸朝義執摯殺之軍至柳泉悅等恐衆心未壹遂縊殺思明縊一計翻又於賜翻以氈裹其尸橐駝負歸洛陽朝義即皇帝位改元顯聖密使人至范陽敕散騎常侍張通儒等散昔亶翻騎奇計翻其黨自相攻擊戰城中數月死者數千人范陽乃定去年若果能使郭子儀自朔方直擣范陽適值城中自相攻擊可馳檄而下也燕因肩翻守式又翻考異曰實錄朝義既殺思明密遣使馳至范陽殺偽太子朝英及偽皇后辛氏幷不附己者數十人偽范陽留守張通儒知有變遂引兵戰於城中數日戰不利死者數千人通儒被斬於亂兵中薊門紀亂曰思明既王有數十州之地年餘朝興遂為皇太子朝興辛氏之長男特為思明所愛嗜酒好色凶獷頑戾招集幽薊惡少與其年齒相類者百人為左右皆彎弓利劍飾以丹雘珠玉帶佩印雕鏤金銀控弦揮刃常如見敵以南行大將子弟統之每與其黨飲宴酒酣爇燎其鬚髮或以銅彈丸擊之以頤顙為的血流至地無楚痛之色則賞卮酒少似嚬蹙乃鞭之從脛至踵或至數千困絕將殞方捨之候稍愈復鞭之有杖六七千不死者姬妾皆思明所掠良家子有不稱命則殺之亦有以湯鑊死者既火盛湯沸令壯士抱而投之初宛轉叫呼須臾骨肉糜爛旁人皆毛豎股慄朝興笑臨而觀之以所策毬杖於鑊中撞擊顏色自若上元二年三月甲寅使使告捷云王師敗績于洛北斬首萬餘級勒其六宮及朝興備車馬為赴洛之計賊庭之黨相慶踊躍叫喚聲振天地十餘日又宦者二人傳思明偽敕云收兵陝虢以朝興為周京留守仍勒馳驛速發幷辛氏已下續行朝興大喜其宦者朝義偽遣之人莫知也時朝義已殺思明僭位潛勒偽左散騎常侍張通儒戶部尚書康孝忠與朝興衙將高鞫仁高如震等謀誅朝興其日朝興速召工匠與其母妻造寶鈿鞍勒搜索庫藏脩乘騎之具幷命左右各備行裝唯數十人侍衞思明留駿馬百餘匹在其广既中朝興出入馳驟每日則於桑乾河飲之通儒將入潛令康孝忠從數十人持兵詣飲處馳取其馬閉於城南毗沙門神之院通儒與鞫仁領步兵十餘人入其日華門偽皇城留守劉象昌逢之驚問其故通儒顧左右斬之俄而朝興腹心衞鳴鶴又問亦斬之子城擾亂朝興惶怖猶能擐甲持兵與親信二三十人出拒奔走於广既中取馬馬盡矣唯病馬一匹朝興乘而策之不前遂步戰通儒立白旗招朝興之黨降者捨罪復官爵惡少等雖沐朝興之錫賚亦怨其無道鞭捶降者太半朝興猶從十餘人接戰弓矢所發無不中者中者皆應弦沒羽通儒軍披靡所傷者數十百人退出子城外人不知甲兵之故皆惶恐潛匿通儒於城門拒戰良久日已云暮朝興衆寡不敵走匿城上之逍遙樓遂失其所通儒兵入禁中劫掠金帛思明朝興妻衣服皆盡夜半蕃將曹閔之於樓上擒獲之朝興曰我兄弟六七人朝興一身斬之何益高如雲對曰以殿下殘酷人各有怨心朝興曰乞放此一度後更不敢執者皆笑又謂閔之曰此腰帶三十兩黃金新造謹奉將軍閔之曰殿下但死腰帶閔之自解取左右益笑縊以弓弦斷其首函送洛陽偽侍中向閏客特受思明委託朝興亦甚敬憚至是惶怖走入私第不自安匍匐待罪通儒頷之勒馳驛赴洛通儒收朝興黨與悉誅之思明驍將辛萬年特有寵於朝興又與鞫仁如震等友善為兄弟當誅朝興之黨也通儒有意於萬年及令行刑遂忘之至是敕鞫仁如震斬萬年首送鞫仁置酒與萬年同飲謂曰張尚書令殺弟故相報萬年稽首但乞快死鞫仁抗聲曰只可兄弟謀取通儒終不肯殺弟於是如震萬年領其部曲百餘人入子城斬通儒於子城南廊下城中擾亂又殺其素不快者軍將數人共推偽中書令阿史那承慶為留守函通儒等首使萬年送洛陽誣其欲以薊城歸順朝義聞之使使令向閏客所在卻回為留守鞫仁如震等各從數百人被甲巡城城中人心彌懼承慶為留守一兩日又不自安遞相疑阻於是領蕃兵數十騎出子城至如震宅門立令屈將軍暫要相見如震不虞有難馳至馬前承慶斬之應聲而殞承慶入東軍與偽尚書康孝忠招集蕃羯鞫仁聞如震遇害驚而且怒統麾下軍討之相逢於宴設樓下接戰自午至酉鞫仁兵皆城旁少年驍勇勁捷馳射如飛承慶兵雖多不敵大敗殺傷甚衆積尸成丘承慶孝忠出城收散卒東保潞縣又南掠屬縣野營月餘徑詣洛陽自陳其事城中蕃軍家口盡踰城相繼而去鞫仁令城中殺胡者皆重賞於是羯胡俱殪小兒皆擲於空中以戈承之高鼻類胡而濫死者甚衆時鞫仁在城中最尊使使奏朝義以承慶等反向閏客行至貝州承朝義命回將至衆官迎之鞫仁嚴兵不出閏客甚懼戒其子弟從者無帶兵器從數人而入鞫仁待之於日華門閏客望見下馬執手相慰鞫仁亦抗禮還營閏客但專守子城端坐餘不敢輒有所問奏承慶等使回朝義以鞫仁為燕京都知兵馬使五月甲戌朝義以偽太常卿李懷仙為御史大夫范陽節度使燕州頗有兵甲故委腹心鞫仁聞之意不快也無何懷仙至從羸馬數千自薊城南門入鞫仁不出迎之於日華門懷仙至卑身過禮立談約為兄弟結盟相固期同保燕邦以獎其主鞫仁意少解懷仙以薊縣為節度院雖任節制鞫仁兵五千餘人皆不受命十數日懷仙待之彌厚每衙皆降階交接鞫仁亦不為之屈既而懷仙命饗軍士中宴鞫仁疑有變兵皆驚走還營被甲懷仙憂懼無計遂囚其牙將朱希彩責以驚軍中之罪其夜鞫仁將襲懷仙遇大雨持疑未決徹明遂止單騎至節度門懷仙已潛備壯士待之鞫仁趨入懷仙亦不改常禮與坐良久乃問驚軍之罪門已關顧左右拉殺之立捨希彩自暮春至夏中兩月間城中相攻殺凡四五死者數千戰鬬皆在坊市閭巷間但兩敵相向不入人家剽劫一物蓋家家自有軍人之故又百姓至於婦人小童皆閑習弓矢以此無虞六月丙申宣思明遺誥發喪將相百僚縞素哭於其聽政樓前卑幼相視而笑笑聲與哭聲參半焉朝義又追向閏客赴洛陽加懷仙燕京留守河洛春秋初朝義令人以書與向貢幷阿史那王殺朝清朝清既受父命常有君臨之心惟以毬獵為務車下勇敢之士僅三千人每日教習然其殘酷頗有父風而加婬亂幽州士庶無不吁嗟向貢高久仁等既見諸將之書又聞思明已死因說朝清曰昨有密旨令大王主器承祧其事尤重今敵國猶在上人未還儻更移恩於人誠恐自貽窘迫朝清然之是日顧左右各令辭訣便自飾裝高久仁高如震等及其無備率壯士數百人潛入子城門阿史那王向貢等共率三百人繼至朝清時在臥內僕妾侍側忽聞兵士問是何人門人曰三軍叛乃擐甲登樓責讓向貢等高如震乃於樓下佯戰朝清自援弓射之凡斃數人阿史那軍佯北朝清下樓向貢等令人擒殺之向貢攝知軍事經四十日阿史那又殺向貢阿史那自稱長史三日後斬高久仁以其首梟之殺朝清故也高如震還固守與阿史那相持城中分兩軍經五日以燕州街為界各自禦備遞相捉搦不得往來阿史那從經略軍領諸蕃部落及漢兵三萬人至宴設樓前與如震會戰如震不利乃使輕兵二千人於子城東出直至經略軍南街腹背而擊之幷招漢軍萬餘人阿史那軍敗走於武清縣界野營後朝義使招之盡歸東都應是胡面不擇少長盡誅之於是朝義偽授李懷仙幽州節度高如震旅拒之中承阿史那遁逸之後野行草次人各持兵糗糧芻茭非戮不應朝義令兵士悉為商賈白衣先行至幽州盡被捉為團練懷仙方自統五千餘騎直叩薊門高如震方欲出師以抗其命慮其卒叛因出迎之懷仙實內圖之且外示寬宥大行誘募咸捨厥亻㚘心於是士衆帖然競皆欣戴乃大賞設經三日因衆前卻乃斬高如震幽州遂平舊傳亦云朝義令人殺偽太子朝英新傳作朝清今從河洛春秋及新傳餘從薊門紀亂時洛陽四面數百里州縣皆為丘墟而朝義所部節度使皆安祿山舊將與思明等夷朝義召之多不至朝直遙翻使疏吏翻將即亮翻略相羈縻而已不能得其用上元二年李光弼上表固求自貶上時掌翻制以開府儀同三司侍中領河中節度使上元二年術士長塞鎮將朱融據新書長塞鎮當在蔚州界唐制上鎮將正六品下中鎮將正七品上下鎮將正七品下玢音彬謀奉嗣岐王珍作亂金吾將軍邢濟告之夏四月乙卯朔廢珍為庶人溱州安置其黨皆伏誅嗣祥吏翻溱茲詵翻珍業之子也岐王業上皇之弟丙辰左散騎常侍張鎬貶辰州司戶鎬嘗買珍宅故也散昔亶翻騎奇計翻鎬下老翻辰州盧溪郡漢辰陵沅陵義陵縣地舊志辰州京師南微東三千四百五里上元二年己未以吏部侍郎裴遵慶為黃門侍郎同平章事上元二年乙亥青密節度使尚衡破史朝義兵斬首五千餘級上元二年丁丑兗鄆節度使能元皓破史朝義兵鄆音運能奴代翻上元二年壬午梓州刺史段子璋反子璋驍勇從上皇在蜀有功梓州梓潼郡漢鄠縣廣漢氐道地驍堅堯翻替代也襲奐於綿州綿州治巴西漢之涪縣也刺史虢王巨蒼黃脩屬郡禮迎之梓遂二州並屬東川節度蓋列郡也巨脩屬郡禮以迎子璋示卑服之意李奐戰敗奔成都子璋自稱梁王改元黃龍以綿州為龍安府置百官又陷劍州劍州治普安漢之梓潼縣也上元二年五月己丑李光弼自河中入朝上元二年初李輔國與張后同謀遷上皇於西內遷上皇見上卷上年山人李唐見上上方抱幼女謂唐曰朕念之卿勿怪也對曰太上皇思見陛下計亦如陛下之念公主也上泫然泣下泫胡畎翻然畏張后尚不敢詣西內上元二年癸巳党項寇寶雞上元二年初史思明以其博州刺史令狐彰為滑鄭汴節度使將數千兵戍滑臺滑州古滑臺也彰密因中使楊萬定通表請降徙屯杏園度思明疑之遣其將薛岌圍之彰與岌戰大破之因隨萬定入朝甲午以彰為滑衞等六州節度使滑衞相貝魏博六州上元二年戊戌平盧節度使侯希逸擊史朝義范陽兵破之上元二年乙未西川節度使崔光遠與東川節度使李奐共攻綿州庚子拔之斬段子璋上元二年復以李光弼為河南副元帥太尉兼侍中都統河南淮南東西山南東荊南江南西浙江東西八道行營節度考異曰實錄舊紀皆云光弼都統河南淮南山南東江東五道唐曆會要為河南淮南東西山南東荊南五道劉展亂紀又有江西浙東浙西凡八道按袁晁亂浙東光弼討平之則是浙東亦其統內也今從之復扶又翻帥所類翻統他綜翻臨淮郡泗州上元二年六月甲寅青密節度使能元皓敗史朝義將李元遇按上卷五年冬書兗鄆節度使能元皓詳考本末青密恐當作兗鄆敗補賣翻上元二年江淮都統李峘畏失守之罪失守事見上卷上年峘戶登翻丙子令儀坐除名長流康州康州因晉康郡而名治端溪縣至京師五千七百五十里東都五千一百五十里賞平劉展之功也自平盧兵馬使徙刺徐州還從宣翻又音如字上元二年戊寅党項寇好畤党底朗翻畤音止好畤縣自漢至後魏屬扶風後周省隋開皇十七年置上宜縣屬京兆又有舊莫西縣十八年改曰好畤大業三年廢入上宜武德二年分醴泉置好畤貞觀八年廢上宜入岐陽二十一年省好畤岐陽復置上宜更上宜曰好畤上元二年秋七月癸未朔日有食之既大星皆見見賢遍翻上元二年以試少府監李藏用為浙西節度副使少詩照翻上元二年八月癸丑朔加開府儀同三司李輔國兵部尚書乙未輔國赴上僕射尚書赴省供職曰赴上上時掌翻御廚具饌太常設樂輔國驕縱日甚求為宰相上曰以卿之功何官不可為其如朝望未允何相息亮翻朝直遙翻輔國乃諷僕射裴冕等使薦己上密謂蕭華曰輔國求為宰相若公卿表來不得不與華出問冕曰初無此事吾臂可斷斷丁管翻宰相不可得華入言之上大悅輔國銜之銜戶緘翻上元二年己巳李光弼赴河南行營上元二年辛巳以殿中監李若幽為鎮章十二行本鎮上有朔方二字乙十一行本同退齋校同西北庭興平陳鄭等節度行營及河中節度使代李光弼賜名國貞上元二年九月甲申天成地平節上於景雲二年九月三日生以九月三日為天成地平節南部新書大明宮中有麟德殿在仙居殿之西北此殿三面亦以三殿為名雍錄麟德殿在翰林院之東釋典曰菩普也薩濟也言能普濟衆生也章十二行本武上有北門二字乙十一行本同士為金剛神王范成大曰在處寺門有兩金剛神是千佛數中最後者一名婁至德一名青葉髻膜莫乎翻上元二年壬寅制去尊號但稱皇帝去年號但稱元年去羌呂翻以建子月為歲首月皆以所建為數嚴數改名因赦天下停京兆河南太原鳳翔四京及江陵南都之號四京見二百二十卷至德元載南都見上卷上年令舉一人自代觀其所舉以行殿最令力丁翻殿丁甸翻上元二年江淮大饑人相食上元二年冬十月江淮都統崔圓署李藏用為楚州刺史統他綜翻或從上聲考異曰劉展亂紀曰初劉展既平諸將爭功疇賞未及李藏用崔圓乃署藏用為楚州刺史領二城而居盱眙按實錄七月藏用已除浙西節度副使蓋恩命未到耳會支度租庸使以劉展之亂諸州用倉庫物無準奏請徵驗唐六典度支郎掌支度國用租賦多少之數凡天下邊軍皆有支度之使以計軍資糧仗之用每歲皆申度支而會計之此支度租庸使蓋使之支度江淮租庸者也使疏吏翻物多散亡徵之不足諸將往往賣產以償之藏用恐其及己嘗與人言頗有悔恨其牙將高幹挾故怨使人詣廣陵告藏用反先以兵襲之藏用走幹追斬之崔圓遂簿責藏用將吏以驗之將吏畏皆附成其狀將即亮翻附高幹之言以成李藏用反狀獨孫待封堅言不反圓命引出斬之或曰子何不從衆以求生待封曰吾始從劉大夫奉詔書來赴鎮劉大夫謂劉展赴鎮事見上卷上年李公起兵滅劉大夫今又以李公為反如此誰則非反者庸有極乎吾寧就死不能誣人以非罪遂斬之史言兵興之時多濫刑上元二年建子月壬午朔上受朝賀如正旦儀以其月為歲首也朝直遙翻下同上元二年或告鴻臚卿康謙與史朝義通事連司農卿嚴莊俱下獄臚陵如翻朝直遙翻下遐嫁翻獄宜欲翻京兆尹劉晏遣吏防守莊家上尋敕出莊引見見賢遍翻莊怨晏因言晏與臣言常道禁中語矜功怨上丁亥貶晏通州刺史通州通川郡漢宕渠縣地舊志通州京師西南二千五百里難江縣漢宕渠地梁置東巴州後魏恭帝改集州後周改宕渠為難江縣以水為名也隋廢集州以縣屬梁州唐初復置集州以難江為治所戊子御史中丞元載為戶部侍郎充句當度支鑄錢鹽鐵兼江淮轉運等使句古候翻當丁浪翻度徒洛翻使疏吏翻載初為度支郎中敏悟善奏對上愛其才委以江淮漕運數月遂代劉晏專掌財利上元二年戊戌冬至己亥上朝上皇於西內朝直遙翻下同上元二年神策節度使衞伯玉攻史朝義拔永寧破澠池福昌長水等縣永寧澠池福昌三縣時屬河南府澠彌兗翻後魏分陝縣置南陝縣西魏改曰長淵屬弘農郡唐初改名長水避高祖諱也初屬穀州後屬洛州宋白曰長水縣本盧氏地後魏延昌二年分盧氏東境庫谷以西沙渠谷以東為南陝縣餘同上註上元二年己酉上朝獻太清宮庚戌享太廟元獻廟太清宮在丹鳳門之左南出第二坊太廟在朱雀街東第二街北來第二坊元獻廟上母元獻楊后廟也辛亥朔祀圜丘太一壇乾元元年立太一壇見二百二十卷考異曰實錄建子月戊戌冬至其日祀昊天上帝己亥詔以來月一日祭圜丘及太一壇又云建丑月辛亥以河南節度使來瑱為太子少保下又有丁未己酉庚戌日事又云建丑月辛亥朔拜南郊祭太乙壇按瑱傳未嘗為河南節度使及少保實錄誤剩此一日事其冬至祀上帝蓋有司行事非親祀也上元二年平盧節度使侯希逸與范陽相攻連年救援既絕又為奚所侵乃悉舉其軍二萬餘人襲李懷仙破之因引兵而南寶應元年壬寅七六二以楚州表言上帝賜寶玉改元改元實在四月上元二年建寅月去年九月敕以建子月為歲首而通鑑仍以建寅月為歲首者以是年四月制復月數皆如其舊也改元亦在是月甲申追尊靖德太子琮為奉天皇帝竇氏為恭應皇后丁酉葬于齊陵琮上皇之長子天寶十載薨諡曰靖德太子新書地理志齊陵在京兆昭應縣東十六里琮徂宗翻上元二年甲辰吐蕃遣使請和使疏吏翻上元二年李光弼拔許州擒史朝義所署潁川太守李春朝義將史參救之許州潁川郡唐已復郡為州安史猶仍天寶舊名守式又翻將即亮翻丙午戰于城下又破之上元二年戊申平盧節度使侯希逸於青州北渡河而會田神功能元皓於兗州使疏吏翻能奴代翻上元二年租庸使元載以江淮雖經兵荒其民比諸道猶有貲產乃按籍舉八年租調之違負及逋逃者計其大數而徵之八年自天寶十三載止上元二年天寶十三載天下未亂租調之入為盛十四載而祿山反租調始有違負逋逃自是迄于去年大難未平戰兵不止違負逋逃年甚一年今不問有無計其大數而徵之調徒釣翻不問負之有無貲之高下察民有粟帛者發徒圍之籍其所有而中分之甚者什取八九謂之白著著直略翻今人猶謂無故而費放財物者為白著勃海高雲有白著歌曰上元官吏務剝削江淮之人多白著有不服者嚴刑以威之民有蓄穀十斛者則重足以待命重直龍翻或相聚山澤為㣥盜州縣不能制上元二年建卯月辛亥朔赦天下復以京兆為上都河南為東都鳳翔為西都江陵為南都太原為北都去年罷西京及南都復扶又翻又音如字上元二年奴剌寇成固成固縣自漢以來屬漢中剌來達翻上元二年初王思禮為河東節度使資儲豐衍贍軍之外積米百萬斛奏請輸五十萬斛於京師思禮薨乾元元年王思禮鎮太原其薨當在去年為政寬弛信任左右數月間耗散殆盡惟陳腐米萬餘斛在言見在米止此數以鄧景山代之景山至則鉤校所出入將士輩多有隱沒皆懼有裨將抵罪當死諸將請之不許其弟請代兄死亦不許請入一馬以贖死乃許之諸將怒曰我輩曾不及一馬乎遂作亂將即亮翻癸丑殺景山上以景山撫御失所以致亂不復推究亂者遣使慰諭以安之復扶又翻諸將請以都知兵馬使代州刺史辛雲京為節度使章十二行本使下有己未以雲京為北都留守河東節度使十五字乙十一行本同退齋校同雲京奏張光晟為代州刺史張光晟有德於辛雲京見上卷乾元二年上元二年絳州素無儲蓄民間饑不可賦斂斂力贍翻將士糧賜不充朔方等諸道行營都統李國貞屢以狀聞朝廷未報軍中咨怨咨嗟憂愁而怨上也突將以領驍勇馳突之士突將即亮翻來日脩都統宅各具畚鍤畚布袞翻織竹為器鍤測洽翻鍫也待命于門士卒皆怒曰朔方健兒豈脩宅夫邪乙丑元振帥其徒作亂燒牙城門帥讀曰率國貞逃于獄元振執之置卒食於前曰食此而役其力可乎國貞曰脩宅則無之軍食則屢奏而未報諸君所知也衆欲退元振曰今日之事何必更問都統不死則我輩死矣遂拔刃殺之鎮西北庭行營兵屯於翼城翼城縣屬絳州本漢絳縣後魏曰北絳縣隋開皇十八年改曰翼城以春秋翼侯邑于此也推裨將白孝德為節度使朝廷因而授之上元二年戊辰淮西節度使王仲昇與史朝義將謝欽讓戰于申州城下為賊所虜淮西震駭會侯希逸田神功能元皓攻汴州朝義召欽讓兵救之上元二年絳州諸軍剽掠不已剽匹妙翻朝廷憂其與太原亂軍合從連賊從子容翻非新進諸將所能鎮服辛未以郭子儀為汾陽王知朔方河中北庭潞澤節度行營兼興平定國等軍副元帥發京師絹四萬匹布五萬端米六萬石以給絳軍建辰月庚寅子儀將行時上不豫㣥臣莫得進見見賢遍翻子儀請曰老臣受命將死於外不見陛下目不瞑矣上召入臥內謂曰河東之事一以委卿史朝義遣兵圍李抱玉於澤州子儀發定國軍救之乃去上元二年上召山南東道節度使來瑱赴京師瑱樂在襄陽其將士亦愛之乃諷所部將吏上表留之行及鄧州復令還鎮樂音洛復扶又翻荊南節度使呂諲淮西節度使王仲昇及中使往來者言瑱曲收衆心恐久難制上乃割商金均房別置觀察使令瑱止領六州山南東道領襄鄧隨唐安均房金商九州今分四州餘五州耳曰領六州無亦於郢復二州增領一州邪瑱怨之按兵不救仲昇竟敗沒行軍司馬裴茙謀奪瑱位茙如融翻密表瑱倔強難制倔其勿翻強其兩翻請以兵襲取之上以為然癸巳以瑱為淮西河南十六州節度使考異曰舊傳無汝云十五州今從實錄實欲圖之密敕以茙代瑱為襄鄧等州防禦使上元二年甲午奴剌寇梁州剌來達翻觀察使李勉棄城走時山南西道觀察使置司梁州山南西道節度領梁洋集壁文通巴興鳳利開渠蓬十三州邠彌頻翻使疏吏翻考異曰肅宗實錄作希液代宗實錄有傳作希讓今從之上元二年丙申党項寇奉天党底朗翻奉天縣屬雍州上元二年李輔國以求宰相不得怨蕭華求相不得事見上上元二年八月相息亮翻庚午以戶部侍郎元載為京兆尹載詣輔國固辭輔國識其意壬寅以司農卿陶銳為京兆尹輔國言蕭華專權請罷其相上不許輔國固請不已乃從之仍引元載代華考異曰舊華傳云肅宗寢疾輔國矯命罷華相今從輔國傳戊申華罷為禮部尚書以載同平章事領度支轉運使如故尚辰羊翻度徒洛翻上元二年建巳月庚戌朔建巳月四月也朝直遙翻上元二年壬子楚州刺史崔侁表稱有尼真如恍惚登天見上帝賜以寶玉十三枚侁疏臻翻恍呼廣翻尼女夷翻惚音忽唐會要十三寶一曰玄黃天符如笏長八寸闊三寸上圓下方近圓有孔黃玉也二曰玉雞毛文悉備白玉也三曰穀璧白玉也徑可五六寸其文粟粒無雕鐫之迹四曰西王母白環二枚白玉也徑六七寸五曰碧色寶圓而有光六曰如意寶珠圓如雞卵光如月七曰紅靺鞨大如巨栗赤如櫻桃八曰琅玕珠二枚長一寸二分九曰玉玦形如玉環四分缺十曰玉印大如半手斜長理如鹿形陷入印中以印物則鹿形著焉十一曰皇后採桑鉤長五六寸細如筋屈其末似金又似銀十二曰雷公石斧長四寸闊二寸無孔細緻如青玉十三曰闕凡十三寶置于日中皆白氣連天云中國有災以此鎮之㣥臣表賀上元二年甲寅上皇崩于神龍殿神龍殿蓋中宗於神龍間居之遂以名殿乙卯遷坐於太極殿坐徂臥翻神御坐也上以寢疾發哀於內殿㣥臣發哀於太極殿內殿上居大明宮之寢殿也太極殿西內前殿大行所御剺里之翻丙辰命苗晉卿攝冢宰上自仲春寢疾聞上皇登遐哀慕疾轉劇乃命太子監國冢而隴翻監古銜翻甲子制改元改元寶應月數皆如其舊復扶又翻赦天下上元二年初張后與李輔國相表裏專權用事見上卷乾元二年更有隙內射生使三原程元振黨於輔國以宦官領射生手故曰內射生使后召太子謂曰李輔國久典禁兵制敕皆從之出亶逼遷聖皇玄宗尊號曰聖皇天帝所忌者吾與太子今主上彌留書顧命曰病日臻既彌留言病日至一日愈留而不去體也不可不誅太子泣曰陛下疾甚危二人皆陛下勳舊之臣一旦不告而誅之必致震驚恐不能堪也后曰然則太子姑歸吾更徐思之太子出后召越王係謂曰太子仁弱不能誅賊臣汝能之乎對曰能係乃命內謁者監段恆俊選宦官有勇力者二百餘人授甲於長生殿後恆戶登翻乙丑后以上命召太子元振知其謀密告輔國伏兵於陵霄門以俟之雍錄六典大明宮圖宮城北面玄武門之西有青霄門閣本大明宮圖作淩雲門以難告難乃旦翻太子曰必無是事主上疾亟召我我豈可畏死而不赴乎元振曰社稷事大太子必不可入乃以兵送太子於飛龍广既飛龍广既仗內六閑之一也程大昌曰在玄武門外是夜輔國元振勒兵三殿收捕越王係段恆俊及知內侍省事朱光輝等百餘人繫之以太子之命遷后於別殿時上在長生殿使者逼后下殿幷左右數十人幽於後宮宦官宮人皆驚駭逃散丁卯上崩年五十二僴下赧翻考異曰肅宗實錄曰張后因太子監國謀誅輔國其日使人以上命召太子語之太子不可乙丑后矯上命將喚太子程元振知之密告輔國景寅元振與輔國夜勒兵於三殿前使人收捕越王及同謀內侍朱光輝段恆俊等百餘人繫之移皇后於別殿其夜六宮內人中官等驚駭奔走及明上崩代宗實錄曰乙丑皇后召上既夜輔國元振勒兵捕係幽后丁卯肅宗崩係傳乙丑后召太子景寅夜元振輔國勒兵捕係幽后是日俱為輔國所害舊肅宗紀丁卯宣遺詔是日上崩代宗紀乙丑皇后矯詔召太子輔國元振衞從太子入飛龍广既以俟變是夕勒兵於三殿收係及朱光輝馬英俊等丁卯肅宗崩新本紀丙寅閑广既使李輔國飛龍广既副使程元振遷皇后于別殿殺越王係兗王僴是夜皇帝崩代宗錄唐曆統紀係傳皆以段恆俊為馬英俊按張后以乙丑日召太子迨夜不至必知有變矣輔國等安能待至來夜然後勒兵收係等乎蓋收係等在乙丑之夜也今從代宗實錄舊代宗紀新舊傳皆云兗王僴寶應元年薨而代宗實錄㣥臣議係僴之罪云二王同惡共扇姦謀蓋僴亦預謀也今從之是日輔國始引太子素服於九仙門與宰相相見閣本大明宮圖宮城西面右銀臺門之北有九仙門又北轉東則淩雲門相息亮翻拜哭敍自上皇晏駕後宮中多故不見輔臣命太子監國在甲子前而乙丑即有內變既定乃始行令監古咸翻戊辰發大行皇帝喪於兩儀殿宣遺詔肅宗崩於東內寢殿發喪於西內內朝從上皇也上皇梓宮在西內前殿己巳代宗即位上元二年高力士遇赦還至朗州上元元年高力士流巫州遇赦還至朗州自朗至京師尚二千二百五十九里赦者甲子赦也還從宣翻又音如字號慟嘔血而卒力士流見上卷上元元年號戶刀翻卒子恤翻上元二年甲戌以皇子奉節王适為天下兵馬元帥奉節縣名蜀先主改魚復縣為奉節縣帥所類翻上元二年李輔國恃功益橫明謂上曰大家但居禁中外事聽老奴處分於上前明言之無所忌憚橫戶孟翻處昌呂翻分扶問翻以其方握禁兵外尊禮之乙亥號輔國為尚父而不名齊太公輔周武王號師尚父今以其號寵中人㣥臣出入皆先詣輔國亦晏然處之史言李輔國凶愚處昌呂翻广既知內侍省事朱光輝及內常侍啖庭瑤山人李唐等二十餘人皆流黔中自朱光輝以下皆大行左右監古銜翻啖徒覽翻黔其今翻上元二年初李國貞治軍嚴治直之翻朔方將士不樂樂音洛皆思郭子儀故王元振因之作亂子儀至軍元振自以為功子儀曰汝臨賊境絳州東與河南接界時賊又據河陽河內故云然若賊乘其釁釁隙也將即亮翻吾為宰相豈受一卒之私邪五月庚辰收元振及其同謀四十人皆殺之相息亮翻考異曰實錄曰子儀至軍撫循士衆潛問罪人得害國貞者王元禮等四十人為首者斬餘並決殺邠志曰七月郭公到朔方行營舊傳曰三月子儀辭赴鎮汾陽家傳曰建辰月十一日發上都二十七日至絳州五月二日斬元振等三十人今元振名從諸書月日從家傳人數從實錄辛雲京聞之亦推按殺鄧景山者數十人誅之由是河東諸鎮率皆奉法郭子儀誅王元振而河東諸鎮皆奉法僕固懷恩分河北諸州授田承嗣等以成藩鎮之禍用人可不謹哉上元二年壬午以李輔國為司空兼中書令上元二年党項寇同官華原上元二年甲申以平盧節度使侯希逸為平盧青淄等六州節度使青淄齊沂密海六州淄州治淄川本漢般陽縣宋僑立清河郡及貝丘縣魏為東清河郡隋置淄州取淄水為名上元二年乙酉徙奉節王适為魯王适古活翻上元二年追章十二行本追上有庚寅二字乙十一行本同退齋校同尊上母吳為皇太后吳事肅宗於東宮生上而薨上元二年壬辰貶禮部尚書蕭華為峽州司馬元載希李輔國意輔國以不相銜華上元二年敕乾元大小錢皆一當一民始安之民不便乾元二品錢見上卷乾元二年上元二年史朝義自圍宋州數月城中食盡將陷刺史李岑不知所為遂城果毅開封劉昌曰易州有遂城府開封漢縣唐屬汴州漢故縣在今縣南五十里杜佑曰天寶以後邊帥怙寵便請署官易州遂城府坊州安臺府別將果毅之類每一制則同授千餘人倉中猶有麴數千斤請屑食之不過二十日李太尉必救我李太尉謂光弼昌請守之李光弼至臨淮諸將以朝義兵尚強請南保揚州光弼曰朝廷倚我以為安危我復退縮朝廷何望復扶又翻且吾出其不意賊安知吾之衆寡遂徑趣徐州趣七喻翻使兗鄆節度使田神功進擊朝義大破之先是田神功既克劉展去年正月神功克劉展先悉薦翻下同太子賓客尚衡與左羽林大將軍殷仲卿相攻於兗鄆考異曰衡上元元年為淄青節度使此年五月田神功自淄青移兗鄆六月衡自賓客為常侍七月仲卿自左羽林大將軍為光祿卿而得相攻於兗鄆者蓋衡猶未離淄青仲卿亦在彼雖有新除官皆未肯入朝也憚其威名神功遽還河南此河南總言河南道考異曰舊傳曰朝義乘北邙之勝寇申光等十三州自領精騎圍李岑於宋州將士皆懼請南保揚州光弼徑赴徐州以鎮之遣田神功擊敗之又曰初光弼將赴臨淮在道舁疾而行監軍使以袁晁方擾江淮光弼兵少請保潤州以避其鋒光弼不從徑往泗州光弼未至河南也田神功平劉展後逗留於揚府尚衡殷仲卿相攻於兗鄆來瑱旅拒於襄陽及光弼輕騎至徐州史朝義退走田神功遽歸河南尚衡殷仲卿來瑱皆懼其威名相繼赴闕按光弼既使田神功擊敗朝義則是神功已還也實錄今年八月袁晁始陷台州借使當時已擾江淮則自泗州往潤州不得謂避其鋒也今從新傳光弼在徐州惟軍旅之事自決之自餘衆務悉委判官張傪傪七感翻又倉含翻傪吏事精敏區處如流處昌呂翻諸將白事光弼多令與傪議之諸將事傪如光弼由是軍中肅然東夏以寧夏戶雅翻先是田神功起偏裨為節度使去年六月田神功自平盧兵馬使節度兗鄆神功皆平受其拜及見光弼與傪抗禮乃大驚徧拜位等曰神功出於行伍不知禮儀諸君亦胡為不言成神功之過乎史言武夫悍將可以禮化居其上者當以身作則行戶剛翻上元二年丁酉赦天下上元二年立皇子益昌王邈為鄭王天寶改利州為益昌郡迥為韓王上元二年來瑱聞徙淮西大懼上言淮西無糧請俟收麥而行又諷將吏留己來瑱挾衆以要君欲再求免得乎壬寅復以瑱為山南東道節度使復扶又翻上元二年飛龍副使程元振謀奪李輔國權密言於上請稍加裁制六月己未解輔國行軍司馬及兵部尚書餘如故以元振代判元帥行軍司馬仍遷輔國出居外第自肅宗時李輔國常居禁中內宅輔國始懼上表遜位辛酉罷輔國兼中書令進爵博陸王輔國入謝憤咽而言曰老奴事郎君不了請歸地下事先帝上猶慰諭而遣之考異曰舊傳輔國欲入中書作謝表閽吏止之曰尚父罷相不應復入此門輔國氣憤而言曰老奴死罪事郎君不了請歸地下事先帝上猶優詔答之按此乃對上之語非對閽吏之語也今從唐紀上元二年壬戌以兵部侍郎嚴武為西川節度使上元二年襄鄧防禦使裴茙屯穀城穀城漢筑陽縣地晉置義成郡及義城縣隋開皇十六年廢郡改縣曰穀城以其地有穀城山也即帥麾下二千人沿漢趣襄陽帥讀曰率趣七喻翻己巳陳於穀水北瑱以兵逆之問其所以來對曰尚書不受朝命故來若受代謹當釋兵瑱曰吾已蒙恩復留鎮此復扶又翻何受代之有因取敕及告身示之茙驚惑瑱與副使薛南陽縱兵夾擊大破之追擒茙於申口金州洵陽縣有申口鎮賜死考異曰舊茙傳曰瑱設具於江津以俟之茙初聲言假道入朝及見瑱即云奉代且欲視事瑱報曰瑱已奉恩命復任此茙惶惑喻其麾下曰此言必妄遂引射瑱軍因與瑱兵交戰茙軍大敗按瑱若設具相見則茙豈得遽射瑱軍而交戰今從瑱傳上元二年乙亥以通州刺史劉晏去年十一月晏貶通州充度支轉運鹽鐵鑄錢等使上元二年秋七月壬辰以郭子儀都知朔方河東北庭潞儀澤沁陳鄭等節度行營時以潞儀澤沁陳鄭為一鎮以李抱玉為節度使蓋抱玉先以陳鄭節度使討賊在行營李光弼邙山之敗抱玉奔澤州陳鄭為賊所隔朝廷因使之節度潞儀沁澤四州上元二年癸巳劍南兵馬使徐知道反以兵守要害拒嚴武武不得進上元二年八月桂州刺史邢濟討西原賊帥吳功曹等平之帥所類翻上元二年己未徐知道為其將李忠厚所殺劍南悉平上元二年乙丑山南東道節度使來瑱入朝謝罪上優待之上元二年己巳郭子儀自河東入朝時程元振用事忌子儀功高任重數譖之於上子儀不自安表請解副元帥節度使上慰撫之子儀遂留京師上元二年台州賊帥袁晁攻陷浙東諸州改元寶勝考異曰柳璨正閏位曆宋庠紀元通譜皆改元昇國今從新書李光弼遣兵擊晁於衢州衢州春秋時越姑蔑之地秦以為太末縣漢分立新安縣晉改信安唐置衢州以三衢山名昔洪水派山為三道故曰三衢斂力贍翻上元二年乙亥徙魯王适為雍王雍於用翻上元二年九月庚辰以來瑱為兵部尚書同平章事知山南東道節度使上元二年乙未加程元振驃騎大將軍兼內侍監驃匹妙翻騎奇寄翻上元二年左僕射裴冕為山陵使方上之役唐置山陵使以宰相為之丙申貶冕施州刺史考異曰代宗實錄秘書監韓穎中書舍人劉烜善候星曆乾元中待詔翰林頗承恩顧又與李輔國昵狎時上軫憂山陵廣詢卜兆穎等不能精慎妄有否臧因是得罪配流嶺南既行賜死于路初冕為僕射數論時政遂兼御史大夫充山陵使以李輔國權重有恩乃奏輔國所親信劉烜為判官潛結輔國烜得罪乃連坐焉今從舊程元振傳上元二年上遣中使劉清潭使於回紇脩舊好好呼到翻且徵兵討史朝義清潭至其庭回紇登里可汗已為朝義所誘云唐室繼有大喪今中原無主因連有玄宗肅宗之喪遂誑以中原無主可汗信之清潭致敕書曰先帝雖棄天下今上繼統乃昔日廣平王與葉護共收兩京者也事見二百二十卷至德二載即朔方三受降城有輕唐之志乃困辱清潭清潭遣使言狀且曰回紇舉國十萬衆至矣京師大駭上遣殿中監藥子昂往勞之於忻州南初毗伽闕可汗為登里求婚肅宗以僕固懷恩女妻之為登里可敦勞力到翻為于偽翻妻七細翻可汗請與懷恩相見懷恩時在汾州上令往見之懷恩為可汗言唐家恩信不可負為于偽翻可汗悅遣使上表請助國討朝義可汗欲自蒲關入由沙苑出潼關東向藥子昂說之曰關中數遭兵荒說式芮翻數所角數州縣蕭條無以供擬恐可汗失望賊兵盡在洛陽請自土門略邢洺懷衞而南得其資財以充軍裝可汗不從又請自太行南下據河陰扼賊咽喉可從刊入聲汗音寒行戶剛翻咽音煙又請自陝州大陽津渡河陝州陝縣北有大陽關黃河津濟之要也即左傳秦孟明伐晉自茅津濟封殽尸之路也亦曰陝津陝失冉翻與諸道俱進乃從之隋置太原倉在河東界史言回紇所利在中國財寶而不敢輕與賊遇上元二年袁晁陷信州信州本吳鄱陽郡之葛陽縣陳改葛陽為弋陽唐乾元元年分饒州之弋陽衢州之常山玉山及割建撫之地置信州治上饒縣以其旁下饒州故以名縣晁馳遙翻上元二年冬十月袁晁陷溫州明州溫州永嘉郡治永嘉縣明州餘姚郡治鄮縣今之鄞縣是也上元二年以雍王适為天下兵馬元帥辛酉辭行以兼御史中丞藥子昂魏琚為左右廂兵馬使以中書舍人韋少華為判官給事中李進為行軍司馬會諸道節度使及回紇于陝州進討史朝義雍於用翻适古活翻帥所類翻少始照翻使疏吏翻朝直遙翻上欲以郭子儀為适副程元振魚朝恩等沮之而止沮在呂翻加朔方節度使僕固懷恩同平章事兼絳州刺史領諸軍節度行營以副适絳州絳郡時朔方軍屯絳州故以懷恩領刺史為懷恩恃功畔援張本上元二年上在東宮以李輔國專橫心甚不平橫下孟翻及嗣位以輔國有殺張后之功不欲顯誅之壬戌夜盜入其第竊輔國之首及一臂而去考異曰舊傳曰盜殺李輔國攜首臂而去統紀曰輔國悖於明皇上在東宮聞而頗怒及踐阼輔國又立功難於顯戮密令人刺之斷其首棄之溷中又斷其右臂馳祭泰陵中外莫測後杭州刺史杜濟話於人曰嘗識一武人為牙門將曰某即害尚父者今從舊傳遣中使存問其家為刻木首葬之為于偽翻仍贈太傅太傅三公上元二年丙寅上命僕固懷恩與母妻俱詣行營時登里與懷恩之女俱來故使懷恩母妻詣行營以親結之雍王适至陝州回紇可汗屯於河北雍於用翻适古活翻陝失冉翻紇下沒翻可從刊入聲汗音寒陝州之河北也括地志曰陝州河北縣本漢大陽縣天寶元年太守李齊物開三門以利漕運得古刃有篆文曰平陸因更名平陸縣适與僚屬從數十騎往見之可汗責适不拜舞藥子昂對以禮不當然回紇將軍車鼻曰唐天子與可汗約為兄弟可汗於雍王叔父也何得不拜舞子昂曰雍王天子長子今為元帥騎奇計翻長知兩翻帥所類翻安有中國儲君向外國可汗拜舞乎且兩宮在殯兩宮謂上皇先帝時皆未葬力爭久之車鼻遂引子昂魏琚韋少華李進各鞭一百以适年少未諳事遣歸營應於陵翻少詩照翻諳烏含翻考異曰代宗實錄云雍王恭行詔命辭色不屈虜亦不敢失禮時人難之時官軍合圍將誅無禮王以東略之故止之又曰會中數萬人駭愕失色雍王正色叱之可汗遂退建中實錄曰上堅立不屈此蓋史官虛美耳今從舊回紇傳琚少華一夕而死戊辰諸軍發陝州僕固懷恩與回紇左殺為前鋒陝西節度使郭英乂方鎮表上元元年改陝虢華節度為陝西節度使使疏吏翻殿丁練翻自澠池入澠彌兗翻潞澤節度使李抱玉自河陽入河南等道副元帥李光弼自陳留入分道並入以攻洛陽考異曰代宗實錄戊辰元帥雍王帥僕固懷恩等諸軍及回紇兵馬進發陝州東討留英乂朝恩為後殿是日又詔河東道節度使自澤州路入今從唐曆及舊朝義傳辛未懷恩等軍于同軌河南永寧縣後周之同軌縣地有同軌城史朝義聞官軍將至謀於諸將阿史那承慶曰唐若獨與漢兵來宜悉衆與戰若與回紇俱來其鋒不可當宜退守河陽以避之朝義不從朝直遙翻諸將即亮翻紇下沒翻壬申官軍至洛陽北郊分兵取懷州癸酉拔之去年邙山之敗河陽懷州皆陷於賊洛陽北郊在邙山外乙亥官軍陳于橫水按舊書橫水在洛陽北郊金人疆域圖孟津縣有橫水店陳讀曰陣下恩陳陳於賊陳陳亦同立柵自固懷恩陳于西原以當之遣驍騎及回紇並南山出柵東北驍堅堯翻騎奇計翻並步浪翻柵測革翻表裏合擊大破之朝義悉其精兵十萬救之陳於昭覺寺官軍驟擊之殺傷甚衆而賊陳不動魚朝恩遣射生五百人力戰賊雖多死者陳亦如初鎮西節度使馬璘曰事急矣犯陳而不能陷引退必敗故曰事急使疏吏翻璘離珍翻奪賊兩牌牌古謂之楯晉宋之間謂之彭排南方以皮編竹為之以捍敵北人以木為之左傳樂祁以楊楯賈禍蓋北方之用木也尚矣賊左右披靡披普彼翻大軍乘之而入賊衆大敗轉戰於石榴園老君廟賊又敗人馬相蹂踐填尚書谷蹂人九翻尚辰羊翻斬首六萬級捕虜二萬人朝義將輕騎數百東走將即亮翻又音如字下等將同懷恩進克東京及河陽城獲其中書令許叔冀王伷等伷音冑承制釋之懷恩留回紇可汗營於河陽使其子右廂兵馬使瑒及朔方兵馬使高輔成帥步騎萬餘乘勝逐朝義紇下沒翻可從刊入聲汗音寒使疏吏翻瑒音暢又雉杏翻帥讀曰率下同騎奇計翻朝直遙翻至鄭州再戰皆捷朝義至汴州其陳留節度使張獻誠閉門拒之朝義奔濮州獻誠開門出降汴皮面翻濮博木翻降戶剛翻下同回紇入東京肆行殺略死者萬計火累旬不滅朔方神策軍亦以東京鄭汴汝州皆為賊境所過虜掠三月乃已使郭李為帥安有是禍邪士民皆衣紙比毗必翻又毗至翻衣於既翻回紇悉置所掠寶貨於河陽留其將安恪守之十一月丁丑露布至京師朝義自濮州北渡河懷恩進攻滑州拔之追敗朝義於衞州將即亮翻敗補賣翻朝義睢陽節度使田承嗣等將兵四萬餘人與朝義合復來拒戰睢音雖嗣祥吏翻復扶又翻僕固瑒擊破之長驅至昌樂東朝義帥魏州兵來戰又敗走昌樂漢古縣屬魏州後唐避諱改為南樂樂音洛帥讀曰率恆陽節度使張忠志以趙恆深定易五州降于河東節度使辛雲京洺音名恆戶登翻考異曰舊懷恩傳曰嵩以相衞洺邢趙州降于李抱玉李寶臣以深恆定易四州降于雲京代宗實錄曰張忠志以趙定深恆易五州歸順又曰史思明授忠志恆趙節度使今從舊王武俊傳嵩楚王之子也楚玉薛訥之弟按其部伍嵩等皆受代居無何僕固懷恩皆令復位由是抱玉雲京疑懷恩有貳心各表言之朝廷密為之備懷恩亦上疏自理上慰勉之令力丁翻朝直遙翻上時掌翻疏所去翻辛巳制東京及河南北受偽官者一切不問為青冀魏幽各據所有州縣以傳世張本上元二年己丑以戶部侍郎劉晏兼河南道水陸轉運都使睿宗先天二年以李傑為陝州刺史充水陸運使水陸運使自此始也至開元二年傑除河南少尹充水陸運使天寶十二載陝郡太守崔無詖充使楊國忠充使水陸轉運都使始此上元二年丁酉以張忠志為成德軍節度使統恆趙深定易五州賜姓李名寶臣初辛雲京引兵將出井陘常山裨將王武俊說寶臣曰今河東兵精銳出境遠鬬不可敵也且吾以寡當衆以曲遇直戰則必離守則必潰公其圖之寶臣乃撤守備舉五州來降及復為節度使以武俊之策為善說式芮翻復扶又翻擢為先鋒兵馬使武俊本契丹也初名沒諾干為王武俊夷張氏得成德張本契欺訖翻又音喫郭子儀以僕固懷恩有平河朔功請以副元帥讓之己亥以懷恩為河北副元帥加左僕射兼中書令單于鎮北大都護朔方節度使史朝義走至貝州與其大將薛忠義等兩節度合僕固瑒追之至臨清臨清漢清淵縣後魏改曰臨清唐屬貝州九域志在魏州北一百五十里瑒設伏擊走之回紇又至官軍益振遂逐之大戰于下博東南下博漢縣時屬深州積尸擁流而下朝義奔莫州考異曰河洛春秋曰朝義戰敗走歸范陽途經衡水僕固瑒領蕃漢兵一十五萬趁及朝義接戰敗之是夏涉秋苦雨陂湖流注河東兵馬使李竭誠成德軍將李令崇咸統精兵亦革面來王競為掎角其漳河及諸津渡船悉是虜獲朝義遣人致命竟不應續令散雇舟船並皆掠盡四路俱絕諸將或請戰或請降朝義不悅田承嗣上疏與朝義曰臣聞兵勢兩均成敗由將衆寡不敵全滅在權昔劉主破於白帝曹公敗於赤壁陸遜黃蓋皆以權道取之今部統之師皆自疲頓主客勢倍勞逸力殊若驅而令戰未見其利請用車五十乘於古夏康王城北作三箇車營車上皆設棚排倒戈為禦每車甲士二人持兵而伏隨軍子女羅於帳中每營輜重分列其次營後選二萬人布偃月陣凡敵衆我寡則設此陣左右有險亦設此陣左右奇軍亦設此陣各令猛將主之左者東南行右者西南行令去車營十里餘營前選精卒五千人鴈行陣使之接戰不勝則退於偃月陣後前軍既卻敵必至車營愛其珍玩必將攻取候其兵縱陣勢已分然後桴鼓齊鳴前後俱至貔貅奮勇鹵楯爭先左軍西行右軍東邁皆取古城之南令首尾相屬伏兵之發料敵必驚後軍之來自然斷絕前後既不相救中軍又遇精兵服色相亂不敗何待令文景義主左軍達于義感主右軍足下自主中軍若其不捷老臣請以弱卒五千為足下吞之朝義覽疏大悅因用其計官軍敗績喪師三千餘級僕固瑒大震退師數十里由是朝義得達莫州朝義既敗官軍威聲復振凡所追集人莫己違鳩集舟航幷連牌栰先濟輜重兼及老弱方以軍南行若有攻擊僕固瑒令吏士各顧所部以抗其鋒朝義乃整師徒一時北濟僕固瑒亦連船艦宵濟趨之今從舊懷恩傳進圍朝義於莫州青淄節度使侯希逸繼至上元二年十二月庚申初以太祖配天地高祖武德元年制每歲圜丘方丘之祀以太祖景皇帝配高宗乾封二年以高祖太宗並配是時太常卿杜鴻漸等議以神堯為受命之主非始封之君不得為太祖以配天地太祖景皇帝始受封於唐即殷之契周之后稷也請以郊配天地從之代宗睿文孝武皇帝上之上初名俶後改名豫肅宗長子也登遐之後議上廟號曰世宗避太宗諱改曰代宗廣德元年癸卯七六三是年七月方改元事見下卷上元二年春正月己卯追諡吳太后曰章敬皇后吳太后上生母也上元二年癸未以國子祭酒劉晏為吏部尚書同平章事度支等使如故上元二年初來瑱在襄陽程元振有所請託不從及為相去年加來瑱同平章事王仲昇在賊中以屈服得全賊平得歸與元振善奏瑱與賊合謀致仲昇陷賊壬寅瑱坐削官爵流播州賜死於路由是藩鎮皆切齒於元振為諸鎮忌程元振不敢勤王張本上元二年史朝義屢出戰皆敗田承嗣說朝義令親往幽州發兵還救莫州承嗣自請留守莫州說式芮翻守式又翻朝義從之選精騎五千自北門犯圍而出朝義既去承嗣即以城降送朝義母妻子於官軍於是僕固瑒侯希逸薛兼訓等帥衆三萬追之及於歸義歸義漢易縣地屬涿郡北齊省入鄚縣武德五年置歸義及北義州貞觀元年州縣皆省八年復置歸義縣屬幽州按宋白續通典唐歸義縣在瓦橋關北朝義敗走時朝義范陽節度使李懷仙已因中使駱奉仙請降遣兵馬使李抱忠將兵三千鎮范陽縣范陽縣漢涿縣也為涿郡治所曹魏文帝改涿郡為范陽郡隋廢范陽郡復置涿郡於薊縣以涿縣屬焉武德七年改涿縣為范陽縣仍屬幽州天寶元年改幽州涿郡為范陽郡故薊城亦曰范陽史以縣字別之其地在薊南宋白曰南至莫州一百六十里不得入官軍將至朝義遣人諭抱忠以大軍留莫州輕騎來發兵救援之意因責以君臣之義抱忠對曰天不祚燕唐室復興復扶又翻今既歸唐矣豈可更為反覆獨不愧三軍邪大丈夫恥以詭計相圖願早擇去就以謀自全且田承嗣必已叛矣不然官軍何以得至此朝義大懼曰吾朝來未食獨不能以一餐相餉乎抱忠乃令人設食於城東於是范陽人在朝義麾下者並拜辭而去朝義涕泣而已獨與胡騎數百既食而去東奔廣陽餉式亮翻令力丁翻朝直遙翻騎奇計翻檀州燕樂縣後魏置廣陽郡後齊廢郡而舊郡名猶存廣陽不受欲北入奚契丹至溫泉柵據新舊書懷恩傳溫泉柵在平州界石城縣東北契欺訖翻又音喫柵測革翻朝義窮蹙縊於林中懷仙取其首以獻僕固懷恩與諸軍皆還縊於賜翻又於計翻還音旋又如字甲辰朝義首至京師考異曰河洛春秋曰朝義東投廣陽郡不受北取潞縣漁陽擬投兩蕃至榆關李懷仙使使招回卻至漁陽過從潞縣至幽州城東阿婆門外於巫閭神廟中兄弟同被絞縊而死乃授首與駱奉仙經一日諸軍方知歸莫州城下舊僕固懷恩傳曰寶應二年三月朝義至平州石城縣溫泉柵窮蹙走入長林自縊懷仙使妻弟徐有濟傳其首以獻史朝義傳二年正月李懷仙於莫州生擒之送款來降梟首至闕下實錄寶應元年十一月己亥僕固懷恩上言幽州平河北州縣盡平史朝義為亂兵所戮傳首上都舊紀寶應二年十月河北州郡悉平李懷仙以幽州降田承嗣以魏州降沈既濟建中實錄二年正月賊將李懷仙擒朝義以降山東平唐曆正月甲辰李懷仙擒史朝義梟首獻至闕下盡以所管來降年代記寶應元年十二月己亥僕固懷恩上言史朝義為亂兵所殺傳首上都二年正月甲申朝義梟首至闕新紀廣德元年正月甲申朝義自殺其將李懷仙以幽州降按諸軍圍朝義於莫州已在去年十一月末而河洛春秋云圍城四十日懷恩舊傳亦云攻守月餘日然則朝義之死必在今年正月明矣諸書皆云朝義此年正月被殺而實錄在元年十一月舊紀因之又脫十一月字懷恩傳誤以正月為三月甲申正月十日甲辰三十日也新本紀蓋據年代記但年代記元年冬十一月己亥朝義死亦與實錄同若正月被殺不應十日首級已至長安疑甲申自殺甲辰傳首至闕新紀止用年代記甲申至闕為自殺日未知何所據今從唐曆以甲辰傳首至京師上元二年閏月己酉夜有回紇十五人犯含光門突入鴻臚寺紇下沒翻唐太極宮南面三門中曰朱雀門東曰安上門西曰含光門按朱雀門太極宮端門也雍錄曰承天門之南朱雀門之北宗廟社稷百僚廨舍列乎其間六省九寺一臺兩監十八衞以坊里準之此兩門內外南北各占兩街不為民居自朱雀門南即市井邑屋各立坊巷以此觀之則朱雀街西兩坊百司庶府居之其門曰含光門朱雀街東兩坊亦百司庶府居之其門曰安上門也臚陵如翻門司不敢遏上元二年癸亥以史朝義降將薛嵩為相衞邢洺貝磁六州節度使宋白曰磁州本漢廣平縣地周武帝於此置滏陽縣及成安郡隋開皇十年廢郡置磁州唐武德元年分相州置磁州貞觀元年州廢薛嵩既得節復表以相州之滏陽洺州之邯鄲武安置磁州磁牆之翻相音息亮翻魏州漢魏郡之地博州漢為東郡聊城縣德州漢平原郡地隋置德州因安德縣名之改范陽節度使為幽州節度使時平盧已陷又兼盧龍節度使嵩等迎僕固懷恩拜於馬首乞行間自效降戶江翻行戶剛翻懷恩亦恐賊平寵衰故奏留嵩等及李寶臣分帥河北自為黨援帥所類翻下同朝廷亦厭苦兵革苟冀無事因而授之河北藩鎮自此強傲不可制矣上元二年回紇登里可汗歸國其部衆所過抄掠紇下沒翻可從刊入聲汗音寒抄楚交翻廩給小不如意輒殺人無所忌憚陳鄭澤潞節度使李抱玉欲遣官屬置頓人人辭憚使疏吏翻趙城尉馬燧獨請行隋義寧元年分霍邑置趙城縣屬晉州比必利翻及也燧先遣人賂其渠帥約毋暴掠帥所類翻下同帥遺之旗曰遺惟季翻有犯令者君自戮之燧取死囚為左右小有違令立斬之回紇相顧失色涉其境者皆拱手遵約束抱玉奇之燧因說抱玉曰燧與回紇言頗得其情僕固懷恩恃功驕蹇其子瑒好勇而輕說式芮翻好呼到翻瑒音暢又雉杏翻輕區正翻今內樹四帥四帥謂田承嗣李寶臣李懷仙薛嵩必有窺河東澤潞之志宜深備之抱玉然之上元二年初長安人梁崇義以羽林射生從來瑱鎮襄陽累遷右兵馬使崇義有勇力能卷鐵舒鈎沈毅寡言瑱他甸翻卷讀曰捲沈持林翻得衆心瑱之入朝也命諸將分戍諸州朝直遙翻將即亮翻瑱死戍者皆奔歸襄陽行軍司馬龐充將兵二千赴河南蓋先是來瑱使龐充赴河南行營會討史朝義聞瑱死引兵還襲襄州左兵馬使李昭拒之充奔房州崇義自鄧州引戍兵歸與昭及副使薛南陽相讓為長長知兩翻久之不決衆皆曰兵非梁卿主之不可遂推崇義為帥崇義尋殺昭及南陽以其狀聞上不能討三月甲辰以崇義為襄州刺史山南東道節度留後唐藩鎮命帥未授旌節者先以為節度留後為梁崇義以襄陽拒命而死張本為之立祠不居瑱聽事及正堂為于偽翻聽讀曰廳上元二年辛酉葬至道大聖大明孝皇帝于泰陵泰陵在同州奉先縣東北二十里金粟山庚午葬文明武德大聖大宣孝皇帝于建陵建陵在京兆醴泉縣東北十八里武將山上元二年夏四月庚辰李光弼奏擒袁晁浙東皆平時晁聚衆近二十萬近其靳翻轉攻州縣光弼使部將張伯儀將兵討平之伯儀魏州人也上元二年郭子儀數上言吐蕃党項不可忽宜早為之備不能用郭子儀之言為二虜入京師張本數所角翻上時掌翻下同上元二年辛丑遣兼御史大夫李之芳等使于吐蕃為虜所留二年乃得歸史究言之上元二年㣥臣三上表請立太子五月癸卯詔許俟秋成議之上元二年丁卯制分河北諸州以幽莫媯檀平薊為幽州管恆定趙深易為成德軍管相貝邢洺為相州管魏博德為魏州管滄棣冀瀛為青淄管懷衞河陽為澤潞管自田承嗣李靈耀相繼叛亂諸鎮所管不復守此制上元二年六月癸酉禮部侍郎華陰楊綰上疏以為古之選士必取行實行下孟翻下行著同近世專尚文辭自隋煬帝始置進士科猶試策而已至高宗時考功員外郎劉思立始奏進士加雜文明經加帖從此積弊轉而成俗朝之公卿以此待士朝直遙翻家之長老以此訓子長知兩翻其明經則誦帖括以求僥幸帖括者舉人因試帖遂括取稡會為一書相傳習誦之以應試謂之帖括舉人皆令投牒自應如此欲其返淳朴崇廉讓何可得也請令縣令察孝廉取行著鄉閭學知經術者薦之於州行下孟翻刺史考試升之於省任各占一經占之贍翻問經義二十條對策三道上第即注官中第得出身下第罷歸又道舉亦非理國章十二行本國下有所資二字乙十一行本同退齋校同置道舉見二百十四卷開元二十五年望與明經進士並停上命諸司通議給事中李栖筠左丞賈至京兆尹嚴武並與綰同至議以為今試學者以帖字為精通考文者以聲病為是非聲病謂以平上去入四聲緝而成文音從文順謂之聲反是則謂之病風流頹弊誠當釐改然自東晉以來人多僑寓士居鄉土百無一二請兼廣學校保桑梓者鄉里舉焉在流寓者庠序推焉敕禮部具條目以聞綰又請置五經秀才科上元二年庚寅以魏博都防禦使田承嗣為節度使承嗣舉管內戶口壯者皆籍為兵惟使老弱者耕稼數年間有衆十萬又選其驍健者萬人自衞謂之牙兵魏牙兵始此迄于梁唐魏以之強亦以之亡上元二年同華節度使李懷讓為程元振所譖恐懼自殺乾元元年置陝虢華節度使上元元年改陝西節度使分河中之同州與華州為同華節度使華戶化翻容肇祖標點聶崇岐覆校
