body:
  text: 資治通鑑卷第二百二十六端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註唐紀四十二代宗睿文孝武皇帝下大曆十四年大曆十四年己未七七九大曆十四年八月甲辰以道州司馬楊炎為門下侍郎大曆十二年楊炎以黨元載貶並同平章事考異曰崔祐甫與炎皆自門下遷中書是時中書在上也憲宗以後門下在上中書在下不知何時升改治直吏翻不次用人卜相於崔祐甫相息亮翻祐甫薦炎器業上亦素聞其名故自遷謫中用之琳太原人性粗率喜詼諧粗讀曰麤喜許記翻無他長與張涉善涉稱其才可大用上信涉言而用之聞者無不駭愕大曆十四年代宗之世吐蕃數遣使求和吐從暾入聲數所角翻使疏吏翻下同代宗悉留其使者前後八輩有至老死不得歸者俘獲其人皆配江嶺使疏吏翻俘方無翻江謂大江之南嶺謂五嶺之外上欲以德懷之乙巳以隨州司馬韋倫為太常少卿使于吐蕃悉集其俘五百人各賜襲衣而遣之少始照翻襲衣衣一襲也衣一稱為一襲大曆十四年協律郎沈既濟上選舉議唐志協律郎掌和律呂辨四時之氣八風五音之節屬太常寺正八品上上時掌翻以為選用之法三科而已曰德也才也勞也今選曹皆不及焉選須絹翻下同考校之法皆在書判簿歷言詞俯仰而已唐擇人之法有四曰身言書判身取其體貌豐偉言取其言詞辯正書取其楷法遒美判取其文理優長簿歷所以著其資考殿最俯仰則觀諸身言之間非德也麗藻芳翰非才也累資積考非勞也執此以求天下之士固未盡矣今人未土著夫音扶著直略翻不可本於鄉閭鑒不獨明不可專於吏部臣謹詳酌古今謂五品以上及㣥司長官宜令宰臣進敍吏部兵部得參議焉長知兩翻其六品以下或僚佐之屬許州府辟用其牧守將帥守手又翻將即亮翻帥所類翻或選用非公則吏部兵部得察而舉之罪其私冒不慎舉者小加譴黜大正刑典責成授任誰敢不勉夫如是則賢者不獎而自進不肖者不抑而自退衆才咸得而官無不治矣今選法皆擇才於吏部試職於州郡若才職不稱稱尺證翻紊亂無任紊文運翻任音壬責於刺史則曰命官出於吏曹不敢廢也責於侍郎則曰量書判資考而授之不保其往也量音良責於令史則曰按由歷出入而行之不知其他也黎庶徒弊誰任其咎若牧守自用則罪將焉逃必州郡之濫獨換一刺史則革矣如吏部之濫雖更其侍郎無益也焉於虔翻更工衡翻蓋人物浩浩不可得而知法使之然非主司之過今諸道節度都團練觀察租庸等使自判官副將以下皆使自擇縱其間或有情故大舉其例十猶七全則辟吏之法已試於今但未及於州縣耳利害之理較然可觀曏令諸使僚佐盡受於選曹則安能鎮方隅之重理財賦之殷乎既濟吳人也等使疏吏翻下諸使同將即亮翻令力丁翻選須絹翻大曆十四年初衡州刺史曹王皋有治行治直吏翻行下孟翻衡州治衡陽縣屬湖南觀察湖南觀察使辛京杲疾之大曆五年辛京杲為湖南觀察使貶潮州刺史度嶺為貶知其直及入相復擢為衡州刺史相息亮翻復扶又翻始皋之遭誣在治在治者謂獄吏治其事皋以囚服在列將驚而戚出則囚服就辯入則擁笏垂魚唐高宗給五品以上隨身魚銀袋以防召命之詐三品以上金飾袋天授二年改佩魚為龜中宗罷龜復給以魚郡王嗣王亦佩金魚袋即就也及是然後跪謝告實皋明之玄孫也曹王明太宗之子大曆十四年朔方邠寧節度使李懷光既代郭子儀邠府宿將史抗溫儒雅龐仙鶴張獻明李光逸功名素出懷光右皆怏怏不服邠卑旻翻龐部江翻怏於兩翻懷光發兵防秋屯長武城軍期進退不時應令監軍翟文秀勸懷光奏令宿衞章十二行本衞下有懷光遣之四字乙十一行本同退齋校同既離營監工銜翻翟萇伯翻奏令力丁翻離力智翻使人追捕誣以他罪且曰黃萯之敗黃萯敗事見二百二十四卷九年萯音倍盡殺之大曆十四年九月甲戌改淮西曰淮寧大曆十四年西川節度使同平章事崔寧在蜀十餘年永泰元年崔旰入成都至是十四年矣恣為淫侈朝廷患之而不能易至是入朝加司空兼山陵使南詔王閤羅鳳卒子鳳迦異前死孫異牟尋立朝直遙翻使疏吏翻卒子恤翻迦音加冬十月丁酉朔吐蕃與南詔合兵十萬三道入寇一出茂州一出扶文吐從暾入聲文州漢陰平之地隋為曲水縣義寧三年分武都之曲水正西長松置文州扶州古鄧至地後周天和中置扶州舊本置龍涸防與陰平接界蓋吐蕃出扶文南詔出黎雅也黎州之地漢屬越巂郡界隋置漢源縣武后大足元年置黎州黎州漢沈黎縣雅州漢嚴道縣境相接也考異曰建中實錄裴垍德宗實錄此月吐蕃三道入寇皆在梁益之境而來年四月乃云去冬吐蕃三道來侵一自靈武一自山南一自蜀又云贊普謂韋倫曰今靈武之師聞命輟矣而山南已入扶文蜀師已趣灌口追且不及與此自相違今不取吾欲取蜀以為東府崔寧在京師所留諸將不能禦將即亮翻虜連陷州縣刺史棄城走士民竄匿山谷上憂之趣寧歸鎮趣讀曰促寧已辭楊炎言於上曰蜀地富饒寧據有之朝廷失其外府十四年矣寧雖入朝全師尚守其後貢賦不入與無蜀同且寧本與諸將等夷因亂得位威令不行今雖遣之必恐無功若其有功則義不可奪是蜀地敗固失之勝亦不得也願陛下熟察上曰然則柰何對曰請留寧發朱泚所領范陽兵數千人雜禁兵往擊之何憂不克泚且禮翻又音此因而得內親兵於其腹中蜀將必不敢動然後更授他帥將即亮翻更工衡翻帥所類翻使千里沃壤復為國有復扶又翻又如字是因小害而收大利也上曰善遂留寧初馬璘忌涇原都知兵馬使李晟功名遣入宿衞為右神策都將璘離珍翻使疏吏翻晟成正翻將即亮翻上發禁兵四千人使晟將之發邠隴范陽兵五千邠隴邠寧隴右二鎮之兵也將即亮翻又音如字下同以救蜀史炤曰曲姓也漢有代郡太守曲謙自江油趨白垻江油漢魏為無人之地晉始置平武縣隋改為江油縣帶龍州利州管下景谷縣西北有白垻鎮城垻必駕翻蜀人謂平川為垻破之范陽兵追及於七盤吐從暾入聲七盤縣屬巴州武后久視元年置遂克維茂二州李晟追擊於大渡河外大渡河在雅州盧山縣寰宇記大渡河自吐蕃界經雅州諸部落至黎州東界流入通望界於黎州為南邊要害之地吐蕃南詔飢寒隕於崖谷死者八九萬人吐蕃悔怒殺誘導使之來者異牟尋懼築苴咩城自瀘州南渡瀘水六百五十里至羊苴咩城舊史陽苴咩城南去大和城十餘里東北至成都二千四百里去雲南城三百里誘羊久翻咩莫者翻又徐婢翻史炤曰苴音酢又徐嗟切咩音養又彌嗟切薛能聞官軍破吉浪詩越巂通遊客苴咩鬧聚蚊又西縣塗中野色生肥羊鄉儀搗散茶梯航經杜宇烽火徹苴咩徙居之吐蕃封之為日東王大曆十四年上用法嚴百官震悚以山陵近禁人屠宰郭子儀之隸人潛殺羊載以入城隸人僕隸之屬或謂諝曰郭公有社稷大功君獨不為之地乎諝曰此乃吾所以為之地也郭公勳高望重上新即位以為㣥臣附之者衆德宗之猜忌裴諝於其初政已窺見之諝私呂翻以明郭公威權不足畏也如此上尊天子下安大臣不亦可乎大曆十四年己酉葬睿文孝武皇帝于元陵元陵在京兆富平縣西北二十五里檀山將發引上送之見轀輬車不當馳道稍指丁未之間引羊晉翻轀音溫輬音涼考異曰按車指丁未之間則行出道外矣蓋出門欲斜就道西不當道中間行耳問其故有司對曰陛下本命在午不敢衝也上哭曰安有枉靈駕而謀身利乎命改轅直午而行肅宗代宗皆喜陰陽鬼神喜許記翻事無大小必謀之卜祝故王嶼黎幹皆以左道得進上雅不之信璵音余雅素也山陵但取七月之期禮天子七月而葬不復擇日復扶又翻下謀復同大曆十四年十一月丁丑以晉州刺史韓滉為蘇州刺史浙江東西觀察使滉呼廣翻使疏吏翻大曆十四年喬琳衰老耳聵聵五怪翻上或時訪問應對失次所謀議復疏闊壬午以琳為工部尚書罷政事上由是疏張涉喬琳涉所薦也尚辰羊翻大曆十四年楊炎既留崔寧二人由是交惡炎託以北邊須大臣鎮撫癸巳以京畿觀察使崔寧為單于鎮北大都護朔方節度使鎮坊州單音蟬以荊南節度使張延賞為西川節度使又以靈鹽節度都虞候醴泉杜希全知靈鹽州留後代州刺史張光晟知單于振武等城綏銀麟勝州留後考異曰舊傳云王雄為振武今從實錄時寧既出鎮不當更置留後炎欲奪寧權且窺其所為令三人皆得特奏事仍諷之使伺寧過失令力丁翻伺相吏翻考異曰舊傳初寧代喬琳為御史大夫平章事寧以為選擇御史當出大夫不謀及宰相乃奏請以李衡于結等數人為御史楊炎大怒其狀遂寢炎又數讒毀劉晏寧又救解之因此大怒其年十月南蠻大至上遣寧還鎮炎懼怨己入蜀難制奏止之按寧為御史大夫在吐蕃南蠻寇蜀後舊傳恐誤大曆十四年十二月乙卯立宣王誦為皇太子大曆十四年舊制天下金帛皆貯於左藏太府四時上其數比部覆其出入唐制太府掌廩藏財貨出納比部掌句會蜀註曰唐制天下財賦皆納於左藏太府四時以數聞尚書比部覆校其出入貯丁呂翻藏徂浪翻上時掌翻比音毗琦音奇度徒洛翻使疏吏翻時京師多豪將求取無節琦不能制將即亮翻乃奏盡貯於大盈內庫百寶大盈庫始於玄宗朝詳見二百二十八卷德宗建中四年十月註天子亦以取給為便故久不出由是以天下公賦為人君私藏有司不復得窺其多少校其贏縮藏徂浪翻復扶又翻贏有餘也縮不足也殆二十年宦官領其事者三百餘員皆蠶食其中蟠結根據牢不可動楊炎頓首於上前曰財賦者國之大本生民之命重輕安危靡不由之是以前世皆使重臣掌其事猶或耗亂不集耗當讀曰眊或讀如字今獨使中人出入盈虛大臣皆不得知政之蠹敝莫甚於此請出之以歸有司度宮中歲用幾何度徒洛翻量數奉入量音良不敢有乏如此然後可以為政上即日下詔凡財賦皆歸左藏一用舊式歲於數中擇精好者三五千匹進入大盈下遐稼翻考異曰德宗實錄作三五十萬匹今從建中實錄炎以片言移人主意議者稱之大曆十四年丙寅晦日有食之大曆十四年湖南賊帥王國良阻山為盜帥所類翻上遣都官員外郎關播招撫之唐都官郎掌俘隸簿錄給衣糧醫藥而理其訴冤上問以為政之要對曰為政之本必求有道賢人與之為理上曰朕比以下詔求賢比毗至翻近也以當作已又遣使臣廣加搜訪庶幾可以為理乎使疏吏翻幾居希翻對曰下詔所求及使者所薦惟得文詞干進之士耳安有有道賢人肯隨牒舉選乎上悅大曆十四年崔祐甫有疾上令肩輿入中書或休假在第令力丁翻假古訝翻大事令中使咨決德宗神武孝文皇帝一諱适代宗長子也諡法諫爭不威曰德言不以威拒諫也執義揚善曰德言稱人之善也建中元年庚申七八大曆十四年春正月丁卯朔改元㣥臣上尊號曰聖神文武皇帝上時掌翻赦天下始用楊炎議命黜陟使與觀察刺史約百姓丁產定等級改作兩稅法楊炎作兩稅法夏輸無過六月秋輸無過十一月視大曆十四年墾田數為定一切罷之比毗至翻比來猶云近來也二稅外輒率一錢者以枉法論唐初賦斂之法曰租庸調有田則有租有身則有庸有戶則有調玄宗之末版籍浸壞多非其實及至德兵起所在賦斂迫趣取辦斂力贍翻調徒弔翻趣讀曰促無復常準復扶又翻又音如字賦斂之司增數而莫相統攝統他綜翻俗從上聲各隨意增科自立色目新故相仍不知紀極民富者丁多率為官為僧以免課役而貧者丁多無所伏匿故上戶優而下戶勞吏因緣蠶食旬章十二行本旬上有民字乙十一行本同張校同云無註本亦無輸月送不勝困弊勝音升率皆逃徙為浮戶其土著百無四五著直略翻至是炎建議作兩稅法先計州縣每歲所應費用及上供之數而賦於人量出以制入戶無主客以見居為簿人無丁中以貧富為差州縣有主戶客戶天寶三載令民十八以上為中男二十三以上成丁量音良見賢遍翻在所州縣稅三十之一使與居者均無僥利言居行皆無僥幸之利也僥堅堯翻秋夏兩徵之其租庸調雜傜悉省皆總統於度支上用其言因赦令行之大曆十四年初左僕射劉晏為吏部尚書楊炎為侍郎不相悅射寅謝翻尚辰羊翻元載之死晏有力焉事見上卷代宗大曆十三年載祖亥翻又如字晏久典利權衆頗疾之多上言轉運使可罷多上時掌翻使疏吏翻又有風言晏嘗密表勸代宗立獨孤為皇后者風言謂得於風聞而言之者也欲為元載報仇因為上流涕言晏與黎幹劉忠翼同謀幹忠翼死於大曆十四年事見上卷為于偽翻相息亮翻罪當萬死崔祐甫言茲事曖昧陛下已曠然大赦不當復究尋虛語曖音愛復扶又翻炎乃建言尚書省國政之本比置諸使分奪其權尚辰羊翻比毗至翻今宜復舊上從之甲子張子作午按是月無甲子恐是丙子否則戊子詔天下錢穀皆歸金部倉部唐志金部掌天下庫藏出納之數京市互市和市宮市交易之事倉部掌天下庫儲出納租稅祿糧倉廩之事考異曰建中實錄曰初大曆中上居東宮貞懿皇后方為有寵生韓王回帝又鍾愛故閹官劉清潭京兆尹黎幹與左右嬖幸欲立貞懿為皇后且言韓王所居獲黃蛇以為符動搖儲宮而晏附其謀冀立殊效圖為宰輔時宰臣元載獨保護上以為最長而賢且嘗有功義不當移王縉亦謂人曰晏黠者也今所圖無乃過黠乎後其議漸定貞懿卒不立上憾之至是以晏大臣而附邪為姦不去將為亂託陳奏不實謫為忠州刺史沈既濟楊炎所薦蓋附炎為說今從舊傳大曆十四年二月丙申朔命黜陟使十一人分巡天下黜陟使始置於太宗貞觀八年魏博節度使田悅事朝廷猶恭順先悉薦翻使疏吏翻朝直遙翻河北黜陟使洪經綸考異曰建中實錄黜陟使十一人而無名德宗實錄有十人名而無河北道及經綸名蓋脫誤也聞悅軍七萬人符下罷其四萬令還農下遐稼翻令力丁翻悅陽順命如符罷之既而集應罷者激怒之曰汝曹久在軍中有父母妻子今一旦為黜陟使所罷將何資以自衣食乎衆大哭悅乃出家財以賜之使各還部伍於是軍士皆德悅而怨朝廷為田悅連諸鎮之兵以拒命張本大曆十四年崔祐甫以疾多不視事楊炎獨任大政專以復恩讎為事奏用元載遺策城原州任音壬載祖亥翻又音如字元載策見二百二十四卷代宗大曆八年又欲發兩京關內丁夫浚豐州陵陽渠以興屯田陵陽渠在豐州九原縣訪以利害秀實以為今邊備尚虛未宜興事以召寇炎怒以為沮己徵秀實為司農卿使疏吏翻沮在呂翻丁未邠寧節度使李懷光兼四鎮北庭行營涇原節度使使移軍原州以四鎮北庭留後劉文喜為別駕為劉文喜以涇州拒命張本按朔方五城舊屯沃饒之地自喪亂以來郢以井翻喪息浪翻人功不及因致荒廢十不耕一若力可墾闢不俟浚渠今發兩京關輔人於豐州浚渠營田計所得不補所費而關輔之人不免流散是虛畿甸而無益軍儲也疏奏不報疏所據翻既而陵陽渠竟不成棄之大曆十四年上用楊炎之言託以奏事不實己酉貶劉晏為忠州刺史舊志忠州京師南二千一百二十二里大曆十四年癸丑以澤潞留後李抱真為節度使為李抱真以澤潞為國藩翰張本大曆十四年楊炎欲城原州以復秦原秦原謂秦州原州朱泚崔寧各將萬人翼其後泚且禮翻又音此將即亮翻又音如字詔下涇州為城具下遐稼翻為築城之具也涇之將士怒曰吾屬為國家西門之屏十餘年矣將即亮翻屏必郢翻蔽也始居邠州甫營耕桑有地著之安徙屯涇州邠卑旻翻著直略翻徙涇州見二百二十四卷大曆三年披荊榛立軍府坐席未暖又投之塞外先棄原州不守故云投之塞外李懷光始為邠寧帥即誅溫儒雅等事見上大曆十四年帥所類翻下同及兼涇原諸將皆懼曰彼五將何罪而為戮五將即史抗溫儒雅龐仙鶴張獻明李光逸將即亮翻吾屬能無憂乎劉文喜因衆心不安據涇州不受詔上疏復求段秀實為帥不則朱泚上時掌翻疏所據翻復扶又翻或如字不讀曰否又讀如字泚且禮翻又音此癸亥以朱泚兼四鎮北庭行營涇原節度使代懷光使疏吏翻大曆十四年三月翰林學士左散騎常侍張涉受前湖南觀察使辛京杲金事覺上怒欲置于法李忠臣以檢校司空同平章事奉朝請散悉亶翻騎奇寄翻校古效翻朝直遙翻陛下貴為天子而先生以乏財犯法以臣愚觀之非先生之過也張涉先侍讀東宮故李忠臣言以為先生上意解辛未放涉歸田里辛京杲以私忿杖殺部曲有司奏京杲罪當死上將從之李忠臣曰京杲當死久矣上問其故忠臣曰京杲諸父兄弟皆戰死獨京杲至今尚存臣故以為當死久矣上憫然左遷京杲諸王傅忠臣乘機救人多此類大曆十四年楊炎罷度支轉運使度徒洛翻命金部倉部代之既而省職久廢謂尚書省諸司失其職已久莫能振舉天下錢穀無所總領癸巳復以諫議大夫韓洄為戶部侍郎判度支以金部郎中萬年杜佑權江淮水陸轉運使皆如舊制復扶又翻或如字諸杜居城南時號城南韋杜去天尺五戶貫則萬年大曆十四年劉文喜又不受詔欲自邀旌節夏四月乙未朔據涇州叛遣其子質於吐蕃以求援質音致上命朱泚李懷光討之泚且禮翻又音此又命神策軍使張巨濟將禁兵二千助之使疏吏翻將即亮翻又音如字大曆十四年吐蕃始聞韋倫歸其俘吐從暾入聲帝初即位欲以德懷吐蕃遣倫歸代宗朝所獲之俘及俘入境各還部落稱新天子出宮人放禽獸英威聖德洽於中國吐蕃大悅除道迎倫贊普即發使隨倫入貢且致賻贈致代宗之賻贈也賻音附癸卯至京師上禮接之既而蜀將上言吐蕃豺狼所獲俘不可歸將上上即亮翻下時掌翻上曰戎狄犯塞則擊之服則歸之擊以示威歸以示信威信不立何以懷遠悉命歸之又悉歸劍南所獲之俘也考異曰建中實錄曰及境境上守陴者焚樓櫓棄城壁而去初吐蕃既得河湟之地土宇日廣守兵勞弊以國家始因用胡為邊將而致禍故得河隴之士約五十萬人以為非族類也無賢愚莫敢任者悉以為婢僕故其人苦之及見倫歸國皆毛裘蓬首窺覷牆隙或搥心隕泣或東向拜舞及密通章疏言蕃之虛實望王師之至若歲焉君子曰惜乎人心之可乘也若逾代之後斯人既沒後生安於所習難乎哉此恐沈既濟之溢美且欲附楊炎復河隴之說耳今不取大曆十四年代宗之世每元日冬至端午生日州府於常賦之外競為貢獻貢獻多者則悅之武將姦吏緣此侵漁下民自代宗迄于五代正至端午降誕州府皆有貢獻謂之四節進奉將即亮翻癸丑上生日上生於天寶元年四月十九日不置節名李正己田悅各獻縑三萬匹縑幷絲繒也度徒洛翻大曆十四年五月戊辰以韋倫為太常卿乙酉復遣倫使吐蕃復扶又翻倫請上自為載書載書盟誓之書楊炎以為非敵請與郭子儀輩為載書以聞令上畫可而已從之令力丁翻大曆十四年朱泚等圍劉文喜於涇州泚且禮翻又音此杜其出入而閉壁不與戰久之不拔天方旱徵發餽運內外騷然朝臣上書請赦文喜以蘇疲人者不可勝紀朝直遙翻上時掌翻勝音升上皆不聽曰微孼不除何以令天下文喜使其將劉海賓入奏孼魚列翻將即亮翻海賓言於上曰臣乃陛下藩邸部曲帝初以雍王為天下兵馬元帥討史朝義凡在行營皆部曲也必為陛下梟其首以獻為于偽翻梟堅堯翻但文喜今所求者節而已願陛下姑與之文喜必怠則臣計得施矣上曰名器不可假人孔子之言我節不可得也使海賓歸以告文喜而攻之如初減御膳以給軍士城中將士當受春服者賜予如故予讀曰與於是衆知上意不可移時吐蕃方睦於唐不為發兵為于偽翻城中勢窮庚寅海賓與諸將共殺文喜傳首考異曰邠志曰詔李懷光朱泚幷軍誅之師圍涇城數月不拔文喜使其子求救于吐蕃蕃衆將至二將議退軍以避之都遊弈使韓遊王褱爭之曰西戎若來涇衆必變義不為文喜沒身於戎虜秋七月西蕃遊騎登高麾涇人涇人果曰始吾為文喜求節度耳王師致討困則歸之安能赤土塗面為異方之人乎劉海賓因之殺文喜以衆降泚泚無所戮涇人德之萌泚之亂亦自此始按是時吐蕃通好無入援文喜事又實錄此月涇州平而邠志云七月西蕃至皆相違今從建中實錄自上即位李正己內不自安遣參佐入奏事會涇州捷奏至上使觀文喜之首而歸正己益懼大曆十四年六月甲午朔門下侍郎同平章事崔祐甫薨薨呼肱翻大曆十四年術士桑道茂上言陛下不出數年暫有離宮之厄上時掌翻離力智翻臣望奉天有天子氣宜高大其城以備非常辛丑命京兆發丁夫數千雜六軍之士築奉天城考異曰舊傳云道茂待詔翰林建中初神策脩奉天城道茂請高其垣牆大為制度德宗不之省及朱泚之亂帝蒼猝出幸至奉天方思道茂之言時道茂已卒命祭之今從實錄及崔庭光幸奉天錄大曆十四年初回紇風俗朴厚君臣之等不甚異故衆志專一勁健無敵紇下沒翻及有功於唐謂平安史也遺于季翻登里可汗始自尊大築宮殿以居婦人有粉黛文繡之飾中國為之虛耗可從刊入聲汗音寒為于偽翻及代宗崩上遣中使梁文秀往告哀登里驕不為禮九姓胡附回紇者說登里以中國富饒今乘喪伐之可有大利使疏吏翻說式芮翻考異曰既云乘喪入寇當在去年今因源休冊命追敍之耳登里從之欲舉國入寇其相頓莫賀達干登里之從父兄也相息亮翻從才用翻諫曰唐大國也無負於我吾前年侵太原獲羊馬數萬可謂大捷事見上卷代宗大曆十三年比歸士卒多徒行者比必利翻及也道遠糧乏士卒殺馬食之故多徒行今舉國深入萬一不捷將安歸乎登里不聽頓莫賀乘人心之不欲南寇也舉兵擊殺之幷九姓胡二千人自立為合骨咄祿毗伽可汗遣其臣聿達干與梁文秀俱入見咄當沒翻伽求迦翻可從刊入聲汗音寒見賢遍翻願為藩臣垂髮不翦以待詔命乙卯命京兆少尹臨漳源休冊頓莫賀為武義成功可汗少始照翻臨漳縣屬相州本鄴縣地東魏孝靜帝分鄴縣於鄴城中置臨漳縣考異曰舊傳曰休妻即吏部侍郎王翊女也因小忿而離妻族上訴下御史臺驗理休遲留不答款狀除名配流溱州久之移岳州建中初楊炎執政以京兆尹嚴郢威名稍著心欲傾之郢即王翊甥壻也休與王氏離絕之時炎風聞休郢有隙遂擢休自流人為京兆少尹俾令伺郢過失休既在職久與郢親善炎怒之奏令以本官兼御史中丞奉使回紇按休奉使時回紇方恭順張光晟未殺董突炎安知回紇欲殺休而遣之今不取大曆十四年秋七月丙寅邵州賊帥王國良降帥所類翻降戶江翻國良本湖南牙將觀察使辛京杲使戍武岡將即亮翻使疏吏翻武岡縣漢零陵郡都梁縣之地晉分都梁置武岡縣今岡東五十里有漢都梁故城是也後漢武陵蠻為漢所伐來保此岡故謂之武岡郡國志云武岡接武陵因以得名隋廢武德四年分邵陽復置武岡縣屬邵州新志曰本武攸縣武德四年更名梁夫夷縣在今武岡界以扞西原蠻京杲貪暴國良家富京杲以死罪加之國良懼據縣叛與西原蠻合聚衆千人侵掠州縣瀕湖千里咸被其害被皮義翻詔荊黔洪桂諸道合兵討之荊南節度使治荊州黔中觀察使治黔州江南西道觀察使治洪州桂管經略觀察使治桂州黔音禽及曹王皋為湖南觀察使曰驅疲甿誅反仄非策之得者也乃遺國良書遺于季翻言將軍非敢為逆欲救死耳我與將軍俱為辛京杲所構曹王皋事見上大曆十四年何心復加兵刃於將軍乎朝直遙翻復扶又翻又音如字將軍遇我不速降後悔無及國良且喜且懼遣使乞降猶疑未決皋乃假為使者從一騎越五百里抵國良壁鞭其門大呼曰我曹王也使疏吏翻騎奇寄翻呼火故翻來受降舉軍大驚國良趨出迎拜請罪皋執其手約為兄弟盡焚攻守之具散其衆使還農詔赦國良罪賜名惟新按新書南蠻傳西原蠻居廣容之南邕桂之西地數千里種落甚衆乾元以來累為叛亂與夷獠梁崇牽覃問西原酋長吳功曹合兵內寇陷道州進攻永州陷邵州辛京杲遣王國良戍武岡國良亦叛建中初城漵州以斷西原國良乃降降戶江翻大曆十四年辛巳遙尊上母沈氏為皇太后沈氏以開元末選入代宗宮安祿山之亂玄宗避賊諸王妾不及從者皆為賊所得拘之東都之掖庭代宗克東都入宮得沈氏留之東都宮中史思明再陷東都遂失所在大曆十四年荊南節度使庾準希楊炎指奏忠州刺史劉晏與朱泚書求營救辭多怨望又奏召補州兵欲拒朝命忠州荊南巡屬也故庾準得以誣奏劉晏使疏吏翻泚且禮翻又音此朝直遙翻下同上密遣中使就忠州縊殺之縊於賜翻又於計翻己丑乃下詔賜死天下冤之初安史之亂數年間天下戶口什亡八九州縣多為藩鎮所據貢賦不入朝廷府庫耗竭中國多故戎狄每歲犯邊所在宿重兵仰給縣官朝直遙翻仰牛向翻所費不貲皆倚辦於晏晏初為轉運使獨領陝東諸道寶應元年劉晏充度支轉運等使代宗廣德二年始以晏為河南江淮以來轉運使乃疏浚汴水以開漕運之利陝失冉翻末年兼領未幾而罷度徒洛翻大曆十四年晏兼判度支建中元年罷幾居豈翻晏有精力多機智變通有無曲盡其妙常以厚直募善走者置遞相望覘報四方物價覘丑廉翻雖遠方不數日皆達使司使司謂轉運使司悉制在掌握國家獲利而天下無甚貴甚賤之憂常以為辦集衆務在於得人故必擇通敏精悍廉勤之士而用之至於句檢簿書悍侯旰翻又下罕翻句古侯翻出納錢穀章十二行本穀下有事雖至細四字乙十一行本同退齋校同無事字必委之士類吏惟書符牒不得輕出一言常言士陷贓賄則淪棄於時名重於利故士多清脩吏雖潔廉終無顯榮利重於名故吏多貪汚然惟晏能行之他人效者終莫能逮其屬官雖居數千里外奉教令如在目前起居語言無敢欺紿紿待亥翻當時權貴或以親故屬之者屬之欲翻晏亦應之使俸給多少遷次緩速皆如其志然無得親職事其場院要劇之官俸扶用翻少始紹翻場謂交場船場院謂巡院必盡一時之選故晏沒之後掌財賦有聲者多晏之故吏也晏又以為戶口滋多則賦稅自廣故其理財章十二行本財下有常字乙十一行本同以愛章十二行本愛作養乙十一行本同民為先諸道各置知院官知院官掌諸道巡院者也具州縣雨雪豐歉之狀白使司豐則貴糴歉則賤糶或以穀易雜貨供官用及於豐處賣之知院官始見不稔之端先申至某月須如干蠲免某月須如干救助使疏吏翻如干猶言若干也程大昌曰若干者設數之言也干猶箇也若箇猶言幾何枚也又說干者十干自甲至癸也亦以數言也及期晏不俟州縣申請即奏行之應民之急未嘗失時不待其困弊流亡餓殍然後賑之也由是民得安其居業戶口蕃息殍居表翻賑津忍翻蕃音煩晏始為轉運使時天下見戶不過二百萬見賢遍翻其季年乃三百餘萬在晏所統則增非晏所統則不增也其初財賦歲入不過四百萬緡季年乃千餘萬緡晏專用榷鹽法充軍國之用時自許汝鄭鄧之西皆食河東池鹽度支主之汴滑唐蔡之東統他綜翻俗音如字緡眉巾翻榷古岳翻代宗寶應元年更豫州為蔡州避上名也皆食海鹽晏主之晏以為官多則民擾故但於出鹽之鄉置鹽官收鹽戶所煮之鹽轉鬻於商人任其所之自餘州縣不復置官復扶又翻下價復同其江嶺間去鹽鄉遠者轉官鹽於彼貯之或商絕鹽貴則減價鬻之謂之常平鹽後又榷茶遂置常平茶鹽官貯丁呂翻其始江淮鹽利不過四十萬緡季年乃六百餘萬緡由是國用充足而民不困弊其河東鹽利不過八十萬緡而價復貴於海鹽先是運關東穀入長安者先悉薦翻以河流湍悍率一斛得八斗至者則為成勞受優賞晏以為江汴河渭水力不同各隨便宜造運船教漕卒江船達揚州汴船達河陰悍下罕翻又侯旰翻汴皮變翻江船達揚州入淮汴船自清口達河陰開元二十二年分汜水武涉滎澤置河陰縣屬河南府有河陰倉河船達渭口渭口達太倉渭口謂渭水入河之口轉相受給自是每歲運穀或至百餘萬斛無斗升沈覆者沈持林翻船十艘為一綱使軍將領之艘蘇遭翻將即亮翻十運無失授優勞官其人數運之後無不斑白者晏於揚子置十場造船每艘給錢千緡艘蘇遭翻緡眉巾翻或言所用實不及半虛費太多晏曰不然論大計者固不可惜小費凡事必為永久之慮今始置船場執事者至多當先使之私用無窘則官物堅牢矣若遽與之屑屑校計錙銖窘巨隕翻八銖為錙十絫為銖安能久行乎異日必有患吾所給多而減之者減半以下猶可也過此則不能運矣其後五十年有司果減其半及咸通中有司計費以給之無復羨餘復扶又翻又音如字羨于線翻羨贏也船益脆薄易壞易以豉翻漕運遂廢矣宋白曰武德永徽之後姜行本薛大鼎褚朗皆言漕運未能通濟後監察御史王師順請運晉絳之粟于河渭之間始置渭橋倉開元初李傑為水運使始大興漕事十八年裴耀卿以言漕運拜江淮轉運使以崔希逸蕭炅為副轉運鹽鐵有副使自此始肅宗初第五琦以錢穀見始置江淮租庸使乾元初加鹽鐵使始大鹽鐵法就山海井竈收榷其鹽立監院官吏至劉晏始以鹽鐵兼漕運晏為人勤力事無閒劇必於一日中決之不使留宿後來言財利者皆莫能及之大曆十四年八月甲午振武留後張光晟殺回紇使者董突張作突董下同等九百餘人董突者武義可汗之叔父也晟成正翻紇下沒翻使疏吏翻可從刊入聲汗音寒代宗之世九姓胡常冒回紇之名雜居京師殖貨縱暴與回紇共為公私之患上即位命董突盡帥其徒歸國輜重甚盛帥讀曰率輜莊持翻重直用翻至振武留數月厚求資給日食肉千斤他物稱是稱尺證翻縱樵牧者暴踐果稼振武人苦之光晟欲殺回紇取其輜重而畏其衆強未敢發九姓胡聞其種族為新可汗所誅多道亡踐息淺翻種章勇翻董突防之甚急九姓胡不得亡又不敢歸乃密獻策於光晟請殺回紇光晟喜其黨自離許之上以陝州之辱事見二百二十二卷寶應元年陝失冉翻光晟知上旨乃奏稱回紇本種非多紇下沒翻晟成正翻種章勇翻所輔以強者㣥胡耳今聞其自相魚肉頓莫賀新立移地健有孼子登里可汗名移地健國相息亮翻宋白曰梅錄回鶻將軍號柳公綽帥河東時有梅錄將軍李暢入貢國未定彼無財則不能使其衆陛下不乘此際除之乃歸其人與之財正所謂借寇兵齎盜糧者也引李斯諫秦王逐客之言三奏上不許光晟乃使副將過其館門故不為禮董突怒執而鞭之數十光晟勒兵掩擊幷㣥胡盡殺之聚為京觀獨留一胡使歸國為證曰回紇鞭辱大將且謀襲據振武故先事誅之將即亮翻觀古玩翻先悉薦翻上徵光晟為右金吾將軍遣中使王嘉祥往致信幣回紇請得專殺者以復讎上為之貶光晟為睦王傅以慰其意睦王述上弟也為于偽翻大曆十四年加章十二行本加上有丁未二字乙十一行本同盧龍隴右涇原節度使朱泚兼中書令盧龍隴右節度如故使疏吏翻以舒王謨為四鎮北庭行軍涇原節度大使行軍當作行營為後姚令言以涇原兵作亂張本考異曰舊傳孟皞尋歸朝遂拜令言為四鎮北庭行營涇原節度使按實錄建中三年八月以涇原節度留後姚令言為節度使此年必始為留後也按姚令言傳建中元年孟皞為涇原節度留後自以文吏進身不樂軍旅頻表薦令言謹肅堪任將帥皞尋歸朝邈之子也邈代宗子大曆八年薨上子之大曆十四年癸丑詔贈太后父祖兄弟官及自餘宗族男女拜官封邑者告第告身第恐當作策中使以馬負而賜之大曆十四年九月壬午將作奏宣政殿廊壞十月魁岡未可脩陰陽家拘忌有天岡河魁凡魁岡之月及所繫之地忌脩造史炤曰魁岡者北斗魁星之氣十月在戌為魁岡宋白曰陰陽氏書謂是歲孟冬為魁岡不利脩作但不妨公害人則吉矣安問時日即命脩之大曆十四年大曆以前賦斂出納俸給皆無法長吏得專之重以元王秉政貨賂公行斂力贍翻長知兩翻俸扶用翻元王謂元載王縉也天下不按贓吏者殆二十年考異曰建中實錄云三十年蓋字之誤也流之上以宣歙觀察使薛邕文雅舊臣徵為左丞邕去宣州盜隱官物以巨萬計殿中侍御史員㝢發之時以宣歙二州依山而扼江湖之要分置觀察使使疏吏翻嗣祥吏翻歙音攝員音運姓也十月己亥貶連山尉連山縣屬連州晉武帝分桂陽立廣惠縣隋改為廣澤仁壽元年改為連山縣避太子廣諱也不敢放縱上初即位疏斥宦官親任朝士而張涉以儒學入侍薛邕以文雅登朝朝直遙翻繼以贓敗宦官武將得以藉口曰南牙文臣贓動至巨萬而謂我曹濁亂天下豈非欺罔邪將即亮翻邪音耶於是上心始疑不知所倚仗矣大曆十四年中書舍人高參請分遣諸沈訪求太后庚寅以睦王述為奉迎使工部尚書喬琳副之又命諸沈四人為判官與中使分行諸道求之尚辰羊翻行下孟翻又音如字大曆十四年十一月初令待制官外更引朝集使二人訪以時政得失遠人疾苦令力丁翻朝直遙翻使疏吏翻大曆十四年先是公主下嫁者舅姑拜之婦不答先悉薦翻上命禮官定公主拜見舅姑及壻之諸父兄姊之儀舅姑坐受於中堂兄章十二行本兄上有諸父二字乙十一行本同退齋校同姊立受於東序如家人禮有縣主將嫁擇用丁丑是日上之從父妹卒姊蔣兕翻從才用翻命罷之有司奏供張已備供居用翻張知亮翻且殤服不足廢事殤音傷說文未成人而死者為殤禮十九至十六死者為長殤十五至十二死者為中殤十一至八歲死者為下殤上曰爾愛其費我愛其禮卒罷之卒子恤翻至德以來國家多事公主郡縣主多不以時嫁有華髮者雖居禁中或十年不見天子上始引見諸宗女髮中白者曰華見賢遍翻卑者存慰悉命嫁之所齎小大之物必經心目己卯庚辰二日嫁岳陽等九章十二行本九作凡乙十一行本同十一縣主齎則兮翻大曆十四年吐蕃見韋倫再至益喜是年五月韋倫再使吐蕃吐從暾入聲辛卯朔倫還吐蕃遣其相論欽明思等入貢還從宣翻又音如字相息亮翻大曆十四年是歲冊太子母王氏為淑大曆十四年天下稅戶三百八萬五千七十六籍兵七十六萬八千餘人籍兵兵之著籍者也穀二百一十五萬七千餘斛緡眉巾翻二年二年春正月戊辰成德節度使李寶臣薨恆冀成德軍考異曰建中實錄云二月丁巳寶臣卒疑奏到之日也今從德宗實錄谷況燕南記曰忠志末年惟納妖妄之人兼陰陽術數諂媚苟且之輩爭獻圖讖稱有尊位詐作朱草靈芝鑿石上作名字又於後堂院結壇場清齋菜食置金杯玉斝銀盤云甘露神酒自至其內又言天符下降忠志自謂命符上天將吏罔有諫者使行文牒布告州縣云靈芝朱草王者之瑞輒生壇上香滿院中靈石呈祥天符飛應甘露如蜜神酒盈杯匪我所求不期自至各牒管內郡縣宜令知委同為喜慶也既而日為妖妄者更相矯云不日當有天神下降持金箱玉印而至然後即大位為天所授也四方皆自歸伏不待征討海內坐而定矣忠志大悅多以金銀羅錦異物賞之陰陽妖妄者自知虛偽恐事泄見誅共言相公宜服甘露靈芝草湯即天神降速忠志一任妖者遂於湯中密著毒藥既飲畢便失音三日而卒舊傳亦以為然按方士妖妄必為一府所疾所憑恃者寶臣一人耳若酖殺寶臣身在府中逃無所之安能免死乎計方士雖愚必不為此蓋時人見寶臣曾飲其湯遇疾而死以為方士所酖谷況承而書之耳以其年少闇弱少詩照翻豫誅諸將之難制者將即亮翻深州刺史張獻誠等至有十餘人同日死者寶臣召易州刺史張孝忠孝忠不往使其弟孝節召之孝忠使孝節謂寶臣曰諸將何罪連頸受戮孝忠懼死不敢往亦不敢叛正如公不入朝之意耳朝直遙翻孝節泣曰如此孝節必死孝忠曰往則併命我在此必不敢殺汝遂歸寶臣亦不之罪也兵馬使王武俊位卑而有勇故寶臣特親愛之以女妻其子士真使疏吏翻妻七細翻士真復厚結其左右故孝忠武俊獨全史言人不可妄殺且為孝忠武俊歸國張本復扶又翻及薨孔目官胡震家僮王他奴勸惟岳匿喪二十餘日詐為寶臣表求令惟岳繼襲上不許令力丁翻遣給事中汲人班宏往問寶臣疾且諭之惟岳厚賂宏宏不受還報惟岳乃發喪自為留後使將佐共奏求旌節上又不許汲縣屬衞州還從宣翻又音如字將即亮翻初寶臣與李正己田承嗣梁崇義相結事見上卷代宗大曆十二年嗣祥吏翻故承嗣之死見上卷大曆十四年為于偽翻下屢為同朝直遙翻使以節授田悅代宗從之悅初襲位事朝廷禮甚恭河東節度使馬燧表其必反請先為備至是悅屢為惟岳請繼襲上欲革前弊不許或諫曰惟岳已據父業不因而命之必為亂上曰賊本無資以為亂皆藉我土地假我位號以聚其衆耳曏日因其所欲而命之多矣而亂日益滋是爵命不足以已亂而適足以長亂也德宗銳於削平藩鎮而發是言誠中肅代之病而終不能已亂亦以召亂所行者未能副其言也長知丈翻命與不命等耳竟不許悅乃與李正己各遣使詣惟岳潛謀勒兵拒命魏博節度副使田庭玠謂悅曰爾藉伯父遺業田承嗣者悅之伯父也坐享富貴不亦善乎柰何無故與恆鄆共為叛臣成德節度使治恆州淄青節度使治鄆州故以恆鄆稱之恆戶登翻鄆音運逆亂者誰能保其家乎必欲行爾之志可先殺我無使我見田氏之族滅也因稱病臥家悅自往謝之庭玠閉門不內竟以憂卒卒子恤翻成德判官邵真聞李惟岳之謀泣諫曰先相公受國厚恩大夫衰絰之中相息亮翻衰倉回翻遽欲負國此甚不可勸惟岳執李正己使者送京師且請討之曰如此朝廷嘉大夫之忠則旄節庶幾可得使疏吏翻朝直遙翻幾居希翻惟岳然之使真草奏長史畢華曰先公與二道結好二十餘年長知兩翻好呼到翻柰何一旦棄之且雖執其使朝廷未必見信正己忽來襲我孤軍無援何以待之惟岳又從之前定州刺史谷從政惟岳之舅也有膽略頗讀書王武俊等皆敬憚之為寶臣所忌從政乃稱病杜門惟岳亦忌之不與圖事日夜獨與胡震王他奴等計議多散金帛以悅將士將即亮翻從政往見惟岳曰今海內無事自上國來者時藩鎮竊據自比古諸侯謂京師為上國志欲致太平深不欲諸侯子孫專地爾今首違詔命天子必遣諸道致討將士受賞章十二行本賞下有之際二字乙十一行本同退齋校同張校同云無註本亦無皆言為大夫盡死為于偽翻下且為同苟一戰不勝各惜其生誰不離心大將有權者乘危伺便咸思取爾以自為功矣伺相吏翻且先相公所殺高班大將殆以百數撓敗之際撓奴教翻其子弟欲復仇者庸可數乎又相公與幽州有隙謂李寶臣襲朱滔也事見上卷代宗大曆之十年今天子必以為將滔與吾擊柝相聞左傳曰魯擊柝聞於邾謂接境也若虎狼之得獸也何以當之是後李惟岳禍敗皆如谷從政所言身經百戰凶悍聞於天下嗣祥吏翻悍下罕翻又戶旰翻違詔舉兵自謂無敵及盧子期就擒吳希光歸國承嗣指天垂泣身無所措賴先相公按兵不進且為之祈請先帝寬仁赦而不誅事亦見上卷大曆十年相息亮翻為于偽翻田氏豈有種乎況爾生長富貴齒髮尚少不更艱危種章勇翻長知丈翻少詩照翻更工衡翻乃信左右之言欲效承嗣所為乎為爾之計不若辭謝將佐使惟誠攝領軍府身自入朝乞留宿衞因言惟誠且留攝事恩命決於聖志上必悅爾忠義縱無大位不失榮祿永無憂矣不然大禍將章十二行本將下有至悔之何四字乙十一行本同退齋校同張校同云無註本亦無及吾亦知爾素疏忌我顧以舅甥之情事急不得不言耳惟岳章十二行本岳下有及左右三字乙十一行本同張校同云無註本亦無見其言切益惡之從政乃復歸杜門稱病將即亮翻朝直遙翻惡烏路翻復扶又翻又音如字惟誠者惟岳之庶兄也謙厚好書得衆心好呼到翻其母妹為李正己子婦母妹者惟誠同母之妹也惟岳送惟誠於正己正己使復姓張遂仕淄青惟岳遣王他奴詣從政家察其起居將殺之示之以意使自引分卒子恤翻且死曰吾不憚死哀張氏今族滅矣李寶臣本張忠志故云然劉文喜之死也李正己田悅等皆不自安劉晏死正己等益懼劉文喜劉晏死皆見上年我輩罪惡豈得與劉晏比乎李正己田悅非面相告語也使人傳言有此語廣之東方人訛言上欲東封汴皮變翻隘烏介翻東封非東封泰山之謂蓋用左傳燭之武說秦伯既東封鄭又欲肆其西封之語故城汴州正己懼發兵萬人屯曹州曹州李正己巡屬與汴州接壤杜預曰完聚者完城郭聚人民河南士民騷然驚駭永平舊領汴宋滑亳陳潁泗七州此平李靈耀後永平軍所領巡屬也按代宗大曆七年賜滑亳軍號永平十一年平李靈耀增領宋泗二州十四年增領汴潁二州滑亳未賜軍號之前已領陳州共七州丙子分宋亳潁別為節度使以宋州刺史劉洽為之以泗州隸淮南又以東都留守路嗣恭為懷鄭汝陝四州河陽三城節度使使疏吏翻守式又翻嗣祥吏翻陝失冉翻旬日又以永平節度使李勉都統洽嗣恭二道仍割鄭州隸之選嘗為將者為諸州刺史以備正己等統他綜翻俗又讀如字將即亮翻二年初高力士有養女嫠居東京嫠里之翻無夫為嫠頗能言宮中事女官李真一意其為沈太后詣使者具言其狀去年遣使訪求太后驚喜時沈氏故老已盡無識太后者上遣宦官宮人往驗視之年狀頗同宦官宮人不審識太后皆言是高氏辭稱實非太后驗視者益疑之強迎入上陽宮強其兩翻下所強同上發宮女百餘人齎乘輿服御物就上陽宮供奉乘繩證翻輿音于左右誘諭百方誘音酉高氏心動乃自言是驗視者走馬入奏上大喜二月辛卯上以偶日御殿㣥臣皆入賀唐制天子以隻日受朝賀今喜於得太后故以耦日御殿而受賀高氏弟承悅在長安恐不言久獲罪遽自言本末上命力士養孫樊景超往覆視景超見高氏居內殿以太后自處處昌呂翻左右侍衞甚嚴景超謂高氏曰姑何自置身於俎上謂將以詐偽伏罪如置身俎上以俟刀也景超抗聲曰有詔太后詐偽左右可下左右皆下殿高氏乃曰吾為人所強非己出也強其兩翻以牛車載還其家還從宣翻又音如字上恐後人不復敢言太后皆不之罪曰吾寧受百欺庶幾得之復扶又翻幾居依翻自是四方稱得太后者數四皆非是而真太后竟不知所之之往也二年御史中丞盧奕之子也天寶十四載安祿山陷洛陽李憕盧奕死之色如藍有口辯上悅之丁未擢為大夫擢為御史大夫句姬妾不離側嘗往問疾子儀悉屏侍妾獨隱几待之離力智翻屏必郢翻隱於靳翻或問其故子儀曰貌陋而心險婦人輩見之必笑他日得志吾族無類矣楊炎既殺劉晏朝野側目李正己累表請晏罪譏斥朝廷炎懼遣腹心分詣諸道以宣慰為名實使之密諭節度使云晏昔朋附姦邪請立獨孤后上自惡而殺之上聞而惡之朝直遙翻度使疏吏翻惡烏路翻由是有誅炎之志隱而未發乙巳遷炎為中書侍郎擢盧為門下侍郎並同平章事不專任炎矣蕞陋無文學蕞徂外翻炎輕之多託疾不與會食唐制諸宰相日會食於政事堂陰狡欲起勢立威小不附者必欲置之死地引太常博士裴延齡為集賢殿直學士親任之為盧以姦邪致亂張本然為建中厲階人皆知之其引裴延齡以樹黨其禍蔓延迄於貞元之末年人未知其罪也故通鑑著言之二年丙午更汴宋軍曰宣武按是時李勉以永平軍節度使鎮汴州蓋以宋亳潁為宣武軍當從新書方鎮表更工衡翻二年振武節度使彭令芳苛虐監軍劉惠光貪婪婪盧含翻乙卯軍士共殺之二年發京西防秋兵萬二千人戍關東時吐蕃通和西邊無警而河南北諸鎮連兵拒命關東騷然故抽京西防秋之兵以戍關東望春樓在灞水之西臨廣運潭勞力到翻將即亮翻神策軍士獨不飲上使詰之其將楊惠元對曰臣等發奉天軍帥張巨濟戒之曰此行大建功名凱還之日相與為歡章十二行本歡下有苟未捷勿飲酒六字乙十一行本同退齋校同故不敢奉詔按建中元年遣神策軍使張巨濟將禁兵助朱泚等討劉文喜蓋涇州既平巨濟還屯奉天也詰去吉翻帥所類翻還音旋又如字有司緣道設酒食獨惠元所部缾罌不發罌烏莖翻上深歎美賜書勞之勞力到翻惠元平州人也平州北平郡二年三月置殷州於郾城魏收地形志潁川郡曲陽縣有郾城後齊置臨潁郡隋廢郡為郾城縣唐屬蔡州時分郾城臨潁陳州之殷水置殷州殷於巾翻郾於建翻二年辛巳以汾州刺史王翃為振武軍使鎮北綏銀等州留後翃戶萌翻二年遣殿中少監崔漢衡使于吐蕃少始照翻使疏吏翻吐從暾入聲二年梁崇義雖與李正己等連結兵勢寡弱禮數最恭或勸其入朝朝直遙翻崇義曰來公有大功於國上元中為閹宦所讒遷延稽命稽緩也不俟駕入朝猶不免族誅來公謂來瑱死於廣德元年事見二百二十二卷何可往也淮寧節度使李希烈屢請討之方鎮表大曆十四年淮西節度使復治蔡州賜號淮寧軍事見上益脩武備流人郭昔告崇義為變郭昔以告崇義得流罪史因稱流人以敍其事請罪上為之杖昔遠流之為于偽翻下為陳同使金部員外郎李舟詣襄州諭旨以安之舟嘗奉使詣劉文喜為陳禍福文喜囚之會帳下殺文喜以降諸道跋扈者聞之謂舟能覆城殺將將即亮翻至襄州崇義惡之舟又勸崇義入朝言頗切直崇義益不悅及遣使宣慰諸道舟復詣襄州崇義拒境不內惡烏路翻復扶又翻拒境者拒之於境上上言軍中疑懼請易以他使上時掌翻時兩河諸鎮方猜阻上欲示恩信以安之夏四月庚寅加崇義同平章事妻子悉加封賞賜以鐵券遣御史張著齎手詔徵之仍以其裨將藺杲為鄧州刺史裨賓彌翻鄧州治穰縣二年五月丙寅以軍興增商稅為什一楊炎定稅法商賈三十稅一今增之二年田悅卒與李正己李惟岳定計卒子恤翻終也竟也連兵拒命遣兵馬使孟祐將步騎五千北助惟岳將即亮翻又音如字騎奇寄翻薛嵩之死也田承嗣盜據洺相二州事見上卷大曆十年洺音名相息亮翻臨洺漢之易陽縣地屬趙國晉屬廣平郡後魏屬魏郡後齊廢入襄國縣置襄國郡後周改置易陽縣別置襄國縣隋開皇之六年改易陽為邯鄲十年改邯鄲為臨洺屬武安郡唐屬洺州范成大北使錄臨洺縣東至洺州三十五里朝直遙翻磁牆之翻曰邢磁如兩眼在吾腹中不可不取乃遣兵馬使康愔將八千人圍邢州使疏吏翻愔挹淫翻將即亮翻又音如字別將楊朝光將五千人柵於邯鄲西北以斷昭義救兵邯鄲縣漢屬趙國晉屬廣平郡東魏廢隋復置屬武安郡唐屬磁州余按隋開皇十年既改邯鄲為臨洺隋志不復言別置邯鄲至唐志則臨洺縣屬洺州邯鄲縣屬磁州蓋邯鄲縣必復置於唐世與臨洺各為一縣史逸其置縣之歲月也宋白曰臨洺縣漢易陽縣地屬趙國魏屬魏郡晉屬廣平郡後魏省入邯鄲孝文於北中府城復置易陽縣屬廣平郡今理是也隋開皇六年改易陽為邯鄲縣十年移邯鄲理陟鄉在今邯鄲縣界仍於北中府城置臨洺縣北濱洺水為名九域志邯鄲縣在磁州東北七十里柵測革翻邯音寒鄲音單斷音短考異曰馬燧傳悅自將兵三萬圍邢州次臨洺燕南記悅自統馬步五千人應接今從悅傳嚴共改洪臨洺將張伾堅壁拒守伾音丕貝州刺史邢曹俊田承嗣舊將也老而有謀悅寵信牙官扈崿而疏之嗣祥吏翻將即亮翻崿五各翻及攻臨洺召曹俊問計曹俊曰兵法十圍五攻此孫子兵法之言勢更不侔尚辰羊翻言以寡敵衆勢已不侔而以逆犯順更不侔也今頓兵堅城之下糧竭卒盡自亡之道也不若置萬兵於崞口以遏西師西師謂澤潞河東之師自西山而下崞音郭崞口當西山之下直相州之西河北二十四州即玄宗所謂河朔二十四郡也自至德改郡為州安史既平之後河北又有分置之州若以開元天寶河北道采訪使所統大界言之此時河北不止二十四州邢曹俊之說蓋因時俗傳習古語耳共毀之悅不用其策為田悅摧敗張本惡烏路翻容肇祖標點聶崇岐覆校
