body:
  text: 資治通鑑卷第二百一十端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註唐紀二十六睿宗玄真大聖大興孝皇帝下景雲元年景雲元年庚戌七一景雲元年八月庚寅往巽第按問此承上卷洛陽縣官微聞其謀縣官馳出白留守㣥官皆逃匿洛州長史崔日知獨帥衆討之重直龍翻守式又翻長知兩翻帥讀曰率留臺侍御史李邕遇重福於天津橋從者已數百人馳至屯營從才用翻即洛城左右屯營也告之曰譙王得罪先帝言重福得罪中宗居之均州此必為亂君等宜立功取富貴又告皇城東都皇城也重福先趣左右屯營營中射之趣七喻翻射而亦翻矢如雨下乃還趣左掖門還從宣翻掖音亦欲取留守兵見門閉大怒命焚之火未及然左屯營兵出逼之重福窘迫策馬出上東然與燃同窘渠隕翻上東洛城上東門也東面北來第一門明日留守大出兵搜捕重福赴漕渠溺死考異曰睿宗實錄舊本紀皆云癸巳重福反今從太上皇實錄日用之從父兄也從才用翻以功拜東都留守鄭愔貌醜多須既敗梳髻著婦人服匿車中愔於今翻著陟略翻擒獲被鞫股慄不能對被皮義翻張靈均神氣自若顧愔曰吾與此人舉事宜其敗也與愔皆斬於東都市初愔附來俊臣得進俊臣誅附張易之易之誅附韋氏韋氏敗又附譙王重福竟坐族誅史言張靈均雖幸禍好亂之人猶能臨死不變鄭愔者反覆於㣥憸之間冒利不顧而畏死乃爾烏足以權大事乎流靜州嶺南之靜州貞觀中已改為富州此靜州屬劍南儀鳳元年以悉州之悉唐縣置南和州武后天授二年更名靜州嚴善思免死而流此夙依嬖倖今從亂又得以偷生景雲元年萬騎恃討諸韋之功多暴橫騎奇寄翻橫戶孟翻長安中苦之詔並除外官又停以戶奴為萬騎戶奴為萬騎蓋必起於永昌之後隸左右羽林更工衡翻景雲元年姚元之宋璟及御史大夫畢構上言先朝斜封官悉宜停廢璟居影翻上時掌翻朝直遙翻上從之癸巳罷斜封官凡數千人斜封官見上卷中宗景龍三年景雲元年刑部尚書同中書門下三品裴談貶蒲州刺史舊志蒲州京師東北三百二十四里尚辰羊翻景雲元年贈蘇安恆諫議大夫蘇安恆死見二百八卷中宗景龍元年恆戶登翻景雲元年九月辛未以太子少師致仕唐休璟為朔方道大總管少始照翻景雲元年冬十月甲申禮儀使姚元之宋璟奏唐世凡有國恤皆以宰相為禮儀使掌山陵祔廟等事使疏吏翻大行皇帝神主應祔太廟請遷義宗神主於東都別立廟從之義宗祔廟見二百八卷中宗神龍元年景雲元年乙未追復天后尊號為大聖天后景雲元年丁酉以幽州鎮守經略節度大使薛訥為左武衞大將軍兼幽州都督節度使之名自訥始使疏吏翻考異曰統紀景雲二年四月以賀拔延秀為河西節度使節度之名自此始會要云景雲二年賀拔延嗣為涼州都督充河西節度始有節度之號又云范陽節度自先天二年始除甄道一新表景雲元年置河西諸軍州節度支度營田大使按訥先已為節度大使則節度之名不始於延嗣也今從太上皇實錄是後天寶緣邊御戎之地置八節度使其任愈重受命之日賜雙旌雙節得以專制軍事行則建節樹六纛入境州縣築節樓迎以鼓角衙仗居前旌幢居中大將鳴珂金鉦鼓角居後州縣齎印迎于道左又唐之制有節度大使副大使節度使其親王領節度大使而不出閤則在鎮知節度者為副大使其異姓為節度使者有節度副使至後唐開成二年七月敕頃因本朝親王遙領方鎮其在鎮者遂云副大使知節度事但年代已深相沿未改今天下侯伯並正節旄其未落副大使者祗言節度使景雲元年太平公主以太子年少意頗易之既而憚其英武欲更擇闇弱者立之以久其權數為流言云太子非長不當立少詩照翻易以豉翻數所角翻己亥制戒諭中外以息浮議公主每覘伺太子所為纖介必聞於上覘丑廉翻又丑豔翻伺相吏翻太子左右亦往往為公主耳目太子深不自安為誅太平公主及其支黨張本景雲元年諡故太子重俊曰節愍太府少卿萬年韋湊上書以為賞罰所不加者則考行立諡以褒貶之上時掌翻行下孟翻故太子重俊與李多祚等稱兵入宮中宗登玄武門以避之太子據鞍督兵自若及其徒倒戈多祚等死太子方逃竄曏使宿衞不守其為禍也胡可忍言明日中宗雨泣雨泣者淚下如雨也中書門下兩省官謂之供奉官其危如此幾居希翻今聖朝禮葬諡為節愍臣竊惑之夫臣子之禮過廟必下下遐嫁翻過位必趨漢成帝之為太子不敢絕馳道漢成帝為太子初居桂宮元帝嘗急召之太子出龍樓門不敢絕馳道西至直城門得絕乃度還入作室門上遲之問其故以狀對乃著令太子得絕馳道跨馬御前無禮甚矣若以其誅武三思父子而嘉之則興兵以誅姦臣而尊君父可也今欲自取之是與三思競為逆也又足嘉乎若以其欲廢韋氏而嘉之則韋氏於時逆狀未彰大義未絕苟無中宗之命而廢之是脅父廢母也庸可乎漢戾太子困於江充之讒發忿殺充雖興兵交戰非圍逼君父也兵敗而死事見二十二卷武帝征和二年始得改葬猶諡曰戾見二十四卷宣帝本始元年臣恐後之亂臣賊子得引以為比開悖逆之原非所以彰善癉惡也彰明也癉病也明其為善病其為惡者也癉丁但翻多祚等從重俊興兵不為無罪陛下今宥之可也名之為雪亦所未安上甚然其言而執政以為制命已行不為追改為于偽翻但停多祚等贈官而已景雲元年十一月戊申朔以姚元之為中書令景雲元年己酉葬孝和皇帝于定陵定陵在雍州富平城西北十五里朝議以韋后有罪不應祔葬追諡故英王趙氏曰和思順聖皇后求其瘞莫有知者死見二百二卷高宗上元二年唐制皇后之服三褘衣鞠衣襢衣褘衣者受冊助祭朝會大事之服也深青織成為之畫翬赤質五色十二等素紗中單黼領朱羅縠褾襈蔽膝隨裳色以緅領為緣用翟為章三等青衣革帶大帶隨衣色裨約紐佩綬如天子青韈舄加金舄覆敷又翻祔葬定陵景雲元年壬子侍中韋安石罷為太子少保左僕射同中書門下三品蘇王褱罷為少傅景雲元年甲寅追復裴炎官爵初裴伷先自嶺南逃歸復杖一百徙北庭伷讀曰冑復扶又翻至徙所殖貨任俠常遣客詗都下事武后之誅流人也裴炎死伷先流嶺南見二百三卷武后光宅元年誅流人見二百五卷長壽二年詗休正翻逃奔胡中北庭都護追獲囚之以聞使者至流人盡死伷先以待報未殺既而武后下制安撫流人有未死者悉放還伷先由是得歸至是求炎後獨伷先在拜詹事丞詹事丞正六品上掌判詹事府事景雲元年壬戌追復王同皎官爵王同皎死見二百八卷中宗神龍二年景雲元年庚午許文貞公蘇王褱薨制起復其子頲為工部侍郎頲固辭頲他鼎翻上使李日知諭旨日知終坐不言而還坐徂臥翻奏曰臣見其哀毀不忍發言恐其隕絕上乃聽其終制景雲元年十二月癸未上以二女西城隆昌公主為女官以資天皇太后之福仍欲於城西造觀觀古玩翻道士所居曰觀諫議大夫甯原悌上言以為先朝悖逆庶人以愛女驕盈而及禍新城宜都以庶孼抑損而獲全新城公主下嫁武延暉宜城公主下嫁裴巽皆中宗女不當廣營寺觀勞人費財梁武帝致敗於前先帝取災於後殷鑒不遠今二公主入道將為之置觀觀古玩翻為于偽翻不宜過為崇麗取謗四方又先朝所親狎諸僧尚在左右宜加屏斥朝直遙翻屏卑郢翻上覽而善之景雲元年宦者閭興貴以事屬長安令李朝隱屬之欲翻朝直遙翻下同朝隱繫於獄上聞之召見朝隱勞之曰卿為赤縣令能如此朕復何憂勞力到翻復扶又翻下無復同因御承天門集百官及諸州朝集使宣示以朝隱所為且下制稱宦官遇寬柔之代必弄威權朕覽前載每所歎息能副朕意實在斯人可加一階為太中大夫賜中上考及絹百匹景雲元年壬辰奚霫犯塞掠漁陽雍奴出盧龍塞而去漁陽縣本屬幽州中宗神龍元年分屬營州雍奴縣漢以來屬漁陽郡隋屬涿郡唐屬幽州盧龍漢肥如縣也屬遼西郡隋開皇十八年更名盧龍屬北平郡唐帶平州霫而立翻弗克景雲元年舊制三品以上官冊授五品以上制授六品以下敕授唐王言之制有七一曰冊書二曰制書三曰慰勞制書四曰發敕五曰敕旨六曰論事敕書七曰敕牒文屬吏部武屬兵部尚書曰中銓侍郎曰東西銓所謂三銓也嬖倖用事選舉混淆無復綱紀至是以宋璟為吏部尚書李乂盧從愿為侍郎皆不畏強禦請謁路絕集者萬餘人留者三銓不過二千人服其公以姚元之為兵部尚書陸象先盧懷慎為侍郎武選亦治選須絹翻治直吏翻從愿承慶之族子盧承慶見二百卷高宗顯慶四年元方之子也陸元方見二百五卷天后證聖元年景雲元年侍御史藳城倪若水藳城縣前漢屬真定國後漢以來屬鉅鹿郡唐屬恆州希旨病君謂郊祀請以韋后亞獻也山惲括州長史舊志饒州京師東南三千二百六十三里括州後為處州京師東南四千二百七十八里景雲元年侍御史楊孚彈糾不避權貴權貴毀之上曰鷹搏狡兔須急救之不爾必反為所噬御史繩姦慝亦然苟非人主保衞之則亦為姦慝所噬矣孚隋文帝之姪孫也景雲元年置河西節度支度營田等使領涼甘肅伊瓜沙西七州治涼州唐制凡天下邊軍皆有支度使以計軍資糧仗之用節度不兼支度者支度自為一司其兼支度者則節度使自支度凡邊防鎮守轉運不給則開置屯田以益軍儲於是有營田使使疏吏翻度徒洛翻景雲元年姚州㣥蠻先附吐蕃攝監察御史李知古請發兵擊之既降降戶江翻又請築城列置州縣重稅之黃門侍郎徐堅以為不可句斷知古發劍南兵築城因欲誅其豪傑掠子女為奴婢㣥蠻怨怒蠻酋傍名引吐蕃攻知古殺之以其尸祭天由是姚巂路絕連年不通酋慈由翻巂音髓安西都護張玄表侵掠吐蕃北境吐蕃雖怨而未絕和親乃賂鄯州都督楊矩請河西九曲之地以為公主湯沐邑矩奏與之九曲者去積石軍三百里水甘草良宜畜牧蓋即漢大小榆谷之地吐蕃置洪濟大漠門等城以守之史為楊矩後悔懼自殺張本鄯時戰翻又音善二年景雲二年春正月癸丑突厥可汗默啜遣使請和許之厥九勿翻可從刊入聲汗音寒使疏吏翻景雲二年己未以太僕卿郭元振中書侍郎張說並同平章事說讀曰悅景雲二年以溫王重茂為襄王充集州刺史遣中郎將將兵五百就防之舊志集州京師西南一千四百二十五里將即亮翻景雲二年乙丑追立劉氏曰肅明皇后陵曰惠陵德竇氏曰昭成皇后陵曰靖陵皆招魂葬於東都城南二死見二百五卷武后長壽二年號儀坤廟會要儀坤廟在親仁里太子之母也景雲二年太平公主與益州長史竇懷貞等結為朋黨欲以危太子使其壻唐晙邀韋安石至其第晙子峻翻安石固辭不往上嘗密召安石謂曰聞朝廷皆傾心東宮卿宜察之對曰陛下安得亡國之言此必太平之謀耳太子有功於社稷仁明孝友天下所知願陛下無惑讒言上瞿然曰瞿俱遇翻瞿然驚視之貌朕知之矣卿勿言時公主在簾下竊聽之以飛語陷安石欲收按之賴郭元振救之得免公主又嘗乘輦邀宰相於光範門內唐六典曰宣政殿前西廊曰月華門門西中書省省西南北街南直昭慶門出光範門韓愈伏光範門下上宰相書即此衆皆失色宋璟抗言曰東宮有大功於天下真宗廟社稷之主公主柰何忽有此議璟與姚元之密言於上曰宋王陛下之元子豳王高宗之長孫豳王守禮章懷太子賢之子長知兩翻將使東宮不安請出宋王及豳王皆為刺史罷岐薛二王左右羽林使為左右率以事太子韋氏初平二王領羽林東宮五率分為左右十率此指左右衞率上曰朕更無兄弟惟太平一妹豈可遠置東都諸王惟卿所處處昌呂翻乃先下制云諸王駙馬自今毋得典禁兵見任者皆改他官見賢遍翻頃之上謂侍臣曰術者言五日中當有急兵入宮卿等為朕備之為于季翻下為陛同張說曰此必讒人欲離間東宮間古莧翻願陛下使太子監國監古銜翻則流言自息矣姚元之曰張說所言社稷之至計也上說說與悅同二月丙子朔以宋王成器為同州刺史豳王守禮為豳州刺史舊志同州京師東北二百五十五里豳州京師西北四百九十三里右羽林大將軍薛王隆業為右衞率太平公主蒲州安置丁丑命太子監國六品以下除官及徒罪以下並取太子處分處昌呂翻分扶問翻景雲二年殿中侍御史崔蒞太子中允薛昭素言於上曰斜封官皆先帝所除恩命已布斜封官見上卷中宗景龍二年一朝盡奪之彰先帝之過為陛下招怨為于偽翻今衆口沸騰徧於海內恐生非常之變太平公主亦言之上以為然戊寅制諸緣斜封別敕授官先停任者並量材敍用量音良考異曰朝野僉載云宋璟畢構出後見鬼人彭君卿受斜封人賄奏云孝和怒曰我與人官何因奪卻於是斜封皆復舊職今不取景雲二年太平公主聞姚元之宋璟之謀大怒以讓太子太子懼奏元之璟離間姑兄姑謂太平公主兄謂宋王豳王間古莧翻甲申貶元之為申州刺史璟為楚州刺史舊志申州至京師一千七百九十六里楚州京師東南二千五百一里丙戌宋王豳王亦寢刺史之命景雲二年中書舍人參知機務劉幽求罷為戶部尚書以太子少保韋安石為侍中安石與李日知代姚宋為政自是綱紀紊亂復如景龍之世矣紊音問復扶又翻又如字前右率府鎧曹參軍柳澤上疏以為斜封官皆因僕妾汲引豈出孝和之意中宗諡孝和皇帝率所律翻上時掌翻疏所去翻天下莫不稱明一旦忽盡收敍善惡不定反覆相攻何陛下政令之不一也議者咸稱太平公主令胡僧慧範曲引此曹誑誤陛下誑居況翻臣恐積小成大為禍不細上弗聽澤亨之孫也柳亨事隋為王屋長歸高祖以女孫竇氏妻之歷事太宗位至檢校岐州刺史景雲二年左右萬騎與左右羽林為北門四軍使葛福順等將之騎奇寄翻將即亮翻又音如字景雲二年三月以宋王成器女為金山公主許嫁突厥默啜厥九勿翻啜叱劣翻景雲二年夏四月甲申宋王成器讓司徒許之以為太子賓客以韋安石為中書令景雲二年上召㣥臣三品以上謂曰朕素懷澹泊不以萬乘為貴澹徒覽翻乘繩證翻曩為皇嗣又為皇太弟皆辭不處為皇嗣見二百四卷天授元年辭太弟見二百八卷神龍元年嗣祥吏翻處昌呂翻何如㣥臣莫對太子使右庶子李景伯固辭不許殿中侍御史和逢堯附太平公主言於上曰陛下春秋未高方為四海所依仰豈得遽爾上乃止戊子制凡政事皆取太子處分處昌呂翻分扶問翻其軍旅死刑及五品已上除授皆先與太子議之然後以聞景雲二年辛卯以李日知守侍中景雲二年壬寅赦天下景雲二年五月太子請讓位於宋王成器不許請召太平公主還京師許之景雲二年庚戌制則天皇后父母墳仍舊為昊陵順陵量置官屬廢武氏二陵見上卷元年量音良為于偽翻下各為同景雲二年辛酉更以西城為金仙公主隆昌為玉真公主各為之造觀金仙玉真二觀皆造於京城內輔興坊玉真觀本竇誕舊宅與金仙觀相對更工衡翻用功數百萬右散騎常侍魏知古黃門侍郎李乂諫不聽散悉亶翻騎奇寄翻景雲二年壬戌殿中監竇懷貞為御史大夫同平章事景雲二年僧慧範恃太平公主勢逼奪民產御史大夫薛謙光與殿中侍御史慕容珣奏彈之公主訴於上出謙光為岐州刺史考異曰統紀曰監察御史慕容珣奏彈西明寺僧慧範以其通宮人張氏張即太平公主乳母也侵奪百姓上以為御史當不避豪貴見公主出居蒲州乃敢彈射在日不言狀涉離間骨肉遂貶為密州員外司馬今從舊傳景雲二年時遣使按察十道太宗貞觀十八年遣十七道巡察武后垂拱初亦嘗遣九道巡察天授二年又遣十道存撫使至是分為十道按察使以廉按州郡二周年一替使疏吏翻乃分為東西道又分隴右為河西道六月壬午又分天下置汴齊兗魏冀幷蒲鄜涇秦益帛丿糸遂荊岐通梁襄揚安閩越洪潭二十四都督武德元年改蜀郡為益州帛丿糸州漢涪縣地江左置巴西郡西魏曰潼州隋開皇改帛丿糸州大業初廢州為金山郡唐武德初復曰帛丿糸州又武德二年置閩州於閩縣開元十三年更閩州為福州鄜音膚惟洛及近畿州不隸都督府雍華同商岐豳為京畿洛汝為都畿俌音甫都督專殺生之柄權任太重或用非其人為害不細今御史秩卑望重以時巡察姦宄自禁宄音軌其後竟罷都督但置十道按察使而已景雲二年秋七月癸巳追復上官昭容諡曰惠文追復其昭容之職而加之以諡景雲二年乙卯以高祖故宅枯柿復生赦天下時詔以興聖寺是高祖舊宅有柿樹天授中枯死至是重生大赦天下復扶又翻又如字景雲二年己巳以右御史大夫解琬為朔方大總管琬考按三城戍兵三城三受降城也解戶買翻景雲二年庚午以中書令韋安石為左僕射兼太子賓客同中書門下三品太平公主以安石不附己故崇以虛名實去其權也去羌呂翻景雲二年九月庚辰以竇懷貞為侍中懷貞每退朝必詣太平公主第朝直遙翻時脩金仙玉真二觀㣥臣多諫懷貞獨勸成之身自督役時人謂懷貞前為皇后阿父事見上卷中宗景龍二年父正奢翻唐公主有邑司令丞掌其主家財貨出入田園徵封之事考異曰睿宗實錄云乙卯御史大夫竇懷貞為侍中太上皇實錄云庚辰御史大夫同中書門下三品竇懷貞為侍中知金仙玉真公主邑司事舊紀己卯懷貞為侍中新紀新表乙亥懷貞守侍中按是月癸酉朔無乙卯又懷貞以自督脩二觀之故時人語曰竇僕射前為皇后國父今為公主邑丞非真知邑司也今從舊紀景雲二年冬十月甲辰上御承天門引韋安石郭元振竇懷貞李日知張說宣制責以政教多闕水旱為災府庫益竭僚吏日滋雖朕之薄德亦輔佐非才安石可左僕射東都留守守手又翻元振可吏部尚書懷貞可左御史大夫日知可戶部尚書說可左丞並罷政事以吏部尚書劉幽求為侍中右散騎常侍魏知古為左散騎常侍太子詹事崔湜為中書侍郎並同中書門下三品中書侍郎陸象先同平章事皆太平公主之志也象先清淨寡欲言論高遠為時人所重湜私侍太平公主公主欲引以為相相息亮翻湜請與象先同升公主不可湜曰然則湜亦不敢當公主乃為之幷言於上為于偽翻上不欲用湜公主涕泣以請乃從之考異曰朝野僉載云湜妻美幷二女皆得幸於太子時人牓之曰託庸才於主第進豔婦於春宮今不取景雲二年右補闕辛替否上疏以為自古失道破國亡家者口說不如身逢耳聞不如目覩臣請以陛下所目覩者言之太宗皇帝陛下之祖也撥亂返正用太史公撥亂世返之正語意官不虛授財無枉費不多造寺觀而有福不多度僧尼而無災觀古玩翻下同尼女夷翻天地垂祐風雨時若若順也蠻夷率服享國久長名高萬古陛下何不取而法之中宗皇帝陛下之兄棄祖宗之業徇女子之意無能而祿者數千人無功而封者百餘家造寺不止費財貨者數百億度人無窮免租庸者數十萬所出日滋所入日寡奪百姓口中之食以養貪殘剝萬人體上之衣以塗土木於是人怨神怒衆叛親離水旱並臻公私俱罄享國不永禍及其身陛下何不懲而改之自頃以來水旱相繼兼以霜蝗人無所食未聞賑恤賑津忍翻而為二女造觀用錢百餘萬緡指言金仙玉真二觀為于偽翻中外之經費有幾而輕用百餘萬緡以供無用之役乎陛下族韋氏之家而不去韋氏之惡去羌呂翻忍棄太宗之法不忍棄中宗之政乎且陛下與太子當韋氏用事之時日夕憂危切齒於㣥兇㣥兇謂韋溫宗楚客等乃不改其所為臣恐復有切齒於陛下者也然則陛下又何惡於㣥凶而誅之復扶又翻惡烏路翻昔先帝之憐悖逆也帝追廢安樂公主為悖逆庶人故稱之悖蒲內翻又蒲沒翻趙履溫為之葺園為于偽翻殫國財竭人力第成不暇居園成不暇遊而身為戮沒今之造觀崇侈者必非陛下公主之本意殆有宗趙之徒從而勸之不可不察也陛下不停斯役臣恐人之愁怨不減前朝之時人人知其禍敗而口不敢言言則刑戮隨之矣韋月將燕欽融之徒先朝誅之陛下賞之豈非陛下知直言之有益於國乎臣今所言亦先朝之直也朝直遙翻下同惟陛下察之上雖不能從而嘉其切直景雲二年御史中丞和逢堯攝鴻臚卿使于突厥臚陵如翻使疏吏翻說默啜曰處密堅昆聞可汗結婚於唐皆當歸附可汗何不襲唐冠帶使諸胡知之豈不美哉默啜許諾明日襆頭衣紫衫南向再拜稱臣襆頭紫衫唐三品已上之服也襆頭起於後周便武事者也太宗時馬周上議以禮無服衫之文請加襴袖褾襈說輸芮翻襆防玉翻衣於既翻十一月戊寅至京師逢堯以奉使功遷戶部侍郎景雲二年壬辰令天下百姓二十五入軍五十五免景雲二年十二月癸卯以興昔亡可汗阿史那獻為招慰十姓使景雲二年上召天台山道士司馬承禎臨海記天台山超然秀出山有八重視之如一高一萬八千丈周回八百里又有飛泉垂流千仞時屬台州唐興縣界我朝太祖建隆元年始改唐興縣為天台縣其山在今縣西二十餘里對曰道者損之又損以至於無為安肯勞心以學術數乎上曰理身無為則高矣如理國何對曰國猶身也順物自然而心無所私則天下理矣上歎曰廣成之言無以過也廣成子居崆峒之上黃帝立下風而問道上許之尚書左丞盧藏用指終南山程大昌曰終南山橫亙關中南面西起秦隴東徹藍田凡雍岐郿鄠長安萬年相去且八百里而連綿峙據其南者皆此一山也毛公曰終南周之名山中南也中南即終南也關中記曰言居天之中都之南也此中大有佳處何必天台承禎曰以愚觀之此乃仕宦之捷徑耳藏用嘗隱終南則天時徵為左拾遺故承禎言之玄宗至道大聖大明孝皇帝上之上諱隆基睿宗第三子也此諡廣德元年所定先天元年壬子七一二是年八月方改元先天景雲二年春正月考異曰新紀表壬辰以陸象先同中書門下三品太上皇睿宗實錄舊紀皆無之不知新書何出今不取辛巳睿宗祀南郊初因章十二行本因作用乙十一行本同孔本同諫議大夫賈曾議合祭天地歐陽修曰古者祭天於圜丘在國之南祭地於澤中之方丘在國之北所以順陰陽因高下以事天地以其類也而後世有合祭之文則天天冊萬歲元年親享南郊始合祭天地至是曾議曰有虞氏禘黃帝而郊嚳夏后氏禘黃帝而郊鯀郊之與廟皆有禘也禘於廟則祖宗合食於太祖禘於郊則地祇㣥望皆合食於圜丘以始祖配享蓋有事之大祭非常祭也三輔故事祭於圜丘上帝后土位皆南面則漢嘗合祭也時皆以曾言為然言忠之子也言忠見二百一卷高宗總章元年景雲二年戊子幸滻東水經註霸水北歷藍田川又左合滻水滻水逕長樂坡西是後韋堅引為廣運潭在京師苑城之東此地又在滻水之東藉在亦翻景雲二年己丑赦天下改元太極景雲二年乙未上御安福門宴突厥楊我支以金山公主示之既而會上傳位婚竟不成景雲二年以左御史大夫竇懷貞戶部尚書岑羲並同中書門下三品景雲二年二月考異曰太上皇實錄云命皇太子送金山公主往幷州令幽州都督裴懷古節度內發三萬兵赴黑山道幷州長史薛訥節度內發四萬兵於汾州迎皇太子右御史大夫朔方大總管解琬節度內發二萬兵赴單于道太子既親征諸軍一事以上並取處分按以軍法從事他書皆無此事按太子送公主與突厥和親安用九萬兵又豈得謂之親征今不取辛酉廢右御史臺武后光宅元年改御史臺為肅政臺分左右神龍元年為左右御史臺景雲二年蒲州刺史蕭至忠自託於太平公主公主引為刑部尚書考異曰舊傳及劉餗小說皆云自晉州刺史入為尚書今從太上皇睿宗錄其妹夫也謂之曰如子之才何憂不達勿為非分妄求分扶問翻至忠不應欽緒退歎曰九代卿族一舉滅之可哀也哉引左傳衞太叔儀之言至忠蕭德言之曾孫故云然嘗自公主第門出遇宋璟璟曰非所望於蕭君也至忠笑曰善乎宋生之言遽策馬而去景雲二年幽州大都督薛訥鎮幽州二十餘年按武后聖曆元年薛訥方自藍田令擢為安東道經略未嘗舉兵出塞虜亦不敢犯與燕州刺史李璡有隙武德六年自營州遷燕州於幽州城中燕因肩翻璡將鄰翻又即刃翻幽求薦左羽林將軍孫佺代之佺此緣翻三月丁丑以佺為幽州大都督徙訥為幷州長史景雲二年夏五月益州獠反獠魯皓翻景雲二年戊寅上祭北郊景雲二年辛巳赦天下改元延和景雲二年六月丁未右散騎常侍武攸暨卒卒子恤翻追封定王景雲二年上以節愍太子之亂岑羲有保護之功節愍之難冉祖雍誣帝及太平與太子連謀賴羲與蕭至忠保護得免癸丑以羲為侍中景雲二年庚申幽州大都督孫佺與奚酋李大酺戰于冷陘貞觀中奚酋可度者內附賜姓李後遂以李為姓酋慈由翻酺音蒲陘音刑考異曰上皇錄云甲子今從睿宗錄是時佺帥左驍衞將軍李楷洛左威衞將軍周以悌發兵二萬騎八千分為三軍以襲奚契丹帥讀曰率驍堅堯翻騎奇寄翻契欺訖翻又音喫將軍烏可利諫曰道險而天熱懸軍遠襲往必敗佺曰薛訥在邊積年竟不能為國家復營州營州陷見二百五卷武后萬歲通天元年為于偽翻往必有功使楷洛將騎四千前驅遇奚騎八千楷洛戰不利佺怯懦不敢救將即亮翻懦奴臥翻又奴亂翻引兵欲還虜乘之唐兵大敗佺阻山為方陳以自固陳讀曰陣大酺使謂佺曰朝廷既與我和親今大軍何為而來佺曰吾奉敕來招慰耳楷洛不稟節度輒與汝戰請斬以謝大酺曰若然國信安在佺悉斂軍中帛得萬餘段幷紫袍金帶魚袋以贈之高宗永徽二年在京文武職事官五品已上並給隨身魚袋天后垂拱二年諸州都督並準京官帶魚唐六典曰隨身魚符所以明貴賤應徵召其制左二右一太子以玉親王以金庶官以銅皆題云某位姓名並以袋盛其袋三品已上飾以金五品已上飾以銀請將軍南還勿相驚擾將士懼無復部伍復扶又翻又如字虜追擊之士卒皆潰佺以悌為虜所擒獻於突厥默啜皆殺之楷洛可利脫歸景雲二年秋七月彗星出西方經軒轅入太微至于大角景雲二年有相者謂同中書門下三品竇懷貞曰公有刑厄相息亮翻懷貞懼請解官為安國寺奴雍錄曰安國寺在朱雀街東第四街之長樂坊唐會要景雲元年敕捨潛龍舊宅為寺便以本封安國為名乙亥復以懷貞為左僕射兼御史大夫平章軍國重事復扶又翻景雲二年太平公主使術者言於上曰彗所以除舊布新又帝座及心前星皆有變帝座在中宮華蓋之下心三星中星為明堂天子位前星為太子彗祥歲翻又音歲又音遂上曰傳德避災吾志決矣太平公主及其黨皆力諫以為不可上曰中宗之時㣥姦用事天變屢臻朕時請中宗擇賢子立之以應災異中宗不悅朕憂恐數日不食豈可在彼則能勸之在己則不能邪太子聞之馳入見見賢遍翻自投於地叩頭請曰臣以微功不次為嗣懼不克堪未審陛下遽以大位傳之何也上曰社稷所以再安吾之所以得天下皆汝力也今帝座有災故以授汝轉禍為福汝何疑邪太子固辭上曰汝為孝子何必待柩前然後即位邪柩音舊太子流涕而出壬辰制傳位於太子太子上表固辭上時掌翻太平公主勸上雖傳位猶宜自總大政上乃謂太子曰汝以天下事重欲朕兼理之邪昔舜禪禹猶親巡狩舜既禪禹南巡狩而崩於蒼梧引此為據也豈忘家國其軍國大事當兼省之省悉景翻考異曰太上皇錄全以為上皇之意睿宗錄云太子既為太平公主所構或唯遣皇帝知三品以下除授及徒罪其軍國大務幷重刑獄上仍兼省之五日一受朝于太極殿今兩取之八月庚子玄宗即位尊睿宗為太上皇上皇自稱曰朕命曰誥五日一受朝於太極殿皇帝自稱曰予命曰制敕日受朝於武德殿朝直遙翻三品以上除授及大刑政決於上皇餘皆決於皇帝景雲二年壬寅上大聖天后尊號曰聖帝天后景雲二年甲辰赦天下改元景雲二年乙巳於鄚州北置渤海軍莫縣自漢以來屬涿郡唐屬瀛州景雲二年分置鄚州開元十三年復單用莫字杜佑曰恆陽軍在恆州城東恆戶登翻屯兵五萬媯居為翻蔚紆勿翻景雲二年丙午立王氏為皇后以后父仁皎為太僕卿仁皎下邽人也戊申立皇子許昌王嗣直為郯王真定王嗣謙為郢王景雲二年以劉幽求為右僕射同中書門下三品魏知古為侍中崔湜為檢校中書令景雲二年初河內人王琚預於王同皎之謀謂中宗神龍元年王同皎謀殺武三思也傭書於江都上之為太子也琚還長安選補諸暨主簿諸暨越王允常故都也自漢以下為縣屬會稽琚至廷中故徐行高視宦者曰殿下在簾內琚曰何謂殿下當今獨有太平公主耳用范睢故智為此言以激發太子與語琚曰韋庶人弒逆人心不服誅之易耳易以豉翻太平公主武后之子凶猾無比大臣多為之用琚竊憂之太子引與同榻坐泣曰主上同氣唯有太平言之恐傷主上之意不言為患日深為之柰何琚曰天子之孝異於匹夫當以安宗廟社稷為事蓋主漢昭帝之姊自幼供養有罪猶誅之事見漢紀蓋古盍翻供居用翻養羊尚翻豈顧小節太子悅曰君有何藝可以與寡人遊琚曰能飛煉詼嘲飛煉謂飛丹砂以鍊丹也舊書載琚之言曰飛丹煉砂詼諧嘲詠可與優人比肩唐六典詹事府司直掌彈劾官寮糾舉職事處昌呂翻累遷太子中舍人唐六典曰太子中舍人本漢魏太子舍人也晉惠帝在儲宮以舍人四人有文學才美者與中庶子共理文書至咸寧三年齊王攸為太傅遂加名為中舍人與中庶子共掌禁令糾正違闕侍從左右儐相威儀盡規獻訥以為中書侍郎考異曰鄭綮開天傳信記云上於藩邸時每戲遊城南韋杜之間因逐狡兔意樂忘返與其徒十數人倦甚休息於封部大樹下適有書生延上過其家甚貧止於村妻一驢而已上坐未久書生殺驢拔蒜備饌酒肉霶霈上顧而奇之及與語磊落不凡問其姓名乃王琚也自是上每遊韋杜間必過琚家琚所諮議合上意上益親善焉及韋氏專制上憂甚獨密言於琚琚曰亂則殺之又何疑也上遂納琚之謀戡定禍難累拜為中書侍郎實預配享焉今從舊傳是時宰相多太平公主之黨劉幽求與右羽林將軍張暐謀以羽林兵誅之使暐密言於上曰竇懷貞崔湜岑羲皆因公主得進日夜為謀不輕若不早圖一旦事起太上皇何以得安請速誅之考異曰舊傳云幽求自謂功在朝臣之右志求左僕射兼領中書令俄而竇懷貞為左僕射崔湜為中書令幽求心甚不平形於言色乃與張暐請誅之按幽求素盡心於玄宗湜等附太平非幽求因私忿而害之也今不取惟俟陛下之命上深以為然暐洩其謀於侍御史鄧光賓上大懼遽列上其狀丙辰幽求下獄有司奏幽求等離間骨肉罪當死上為言幽求有大功不可殺列上時掌翻下遐嫁翻間古莧翻為于偽翻癸亥流幽求于封州封州漢廣信封陽縣地梁置成州隋改封州唐屬廣州都督府舊志封州去京師水陸四千五百一十里光賓于繡州舊志峯州隋交趾郡之嘉寧縣武德四年置峯州去京師七千七百一十里繡州去京師六千九十里初崔湜為襄州刺史密與譙王重福通書重福遺之金帶遺于季翻重福敗湜當死張說劉幽求營護得免既而湜附太平公主與公主謀罷說政事以左丞分司東都及幽求流封州湜諷廣州都督周利貞使殺之封州屬廣州都督章十二行本王上有景城二字乙十一行本同孔本同張校同晙知其謀留幽求不遣晙子峻翻利貞屢移牒索之索山客翻晙不應利貞以聞湜屢逼晙使遣幽求幽求謂晙曰公拒執政而保流人勢不能全徒仰累耳累力瑞翻固請詣廣州晙曰公所坐非可絕於朋友者也晙因公獲罪無所恨竟逗遛不遣幽求由是得免景雲二年九月丁卯朔日有食之景雲二年辛卯立皇子嗣昇為陝王陝失冉翻考異曰睿宗實錄作甲申太上皇錄作甲午今從玄宗實錄嗣昇母楊氏士達之曾孫也楊士達仕隋官至納言母養之景雲二年冬十月庚子上謁太廟赦天下景雲二年癸卯上幸新豐獵於驪山之下驪力知翻景雲二年辛酉沙陀金山遣使入貢沙陀者處月之別種也姓朱邪氏使疏吏翻種章勇翻邪音耶處月居金娑山之陽蒲類之東有大磧名沙陀故號沙陀考異曰薛居正五代史後唐太祖紀曰太祖姓朱邪氏始祖拔野古貞觀中為墨離軍使太宗平薛延陀分同羅僕骨之人置沙陀都督府蓋北庭有磧曰沙陀因以名焉永徽中以拔野古為都督其後子孫五世相承曾祖盡忠貞元中繼為沙陀府都督歐陽修五代史記曰李氏之先蓋出於西突厥本號朱邪至其後世別自號曰沙陀而以朱邪為姓拔野古為始祖其自序云沙陀者北庭之磧也當唐太宗時破西突厥諸部分同羅僕骨之人於此磧置沙陀府而以其始祖拔野古為都督且傳子孫數世皆為沙陀都督故其後世因自號沙陀然予考于傳記其說皆非也夷狄無姓氏朱邪部族之號耳拔野古與朱邪同時人非其始祖而唐太宗時未嘗有沙陀府也唐太宗破西突厥分其諸部置十三州以同羅為龜林都督府僕骨為金微都督府拔野古為幽陵都督府未嘗有沙陀府也當是時西突厥有鐵勒薛延陀阿史那之類為最大其別部有同羅僕骨拔野古等以十數蓋其小者也又有處月處密諸部又其小者也朱邪者處月別部之號耳太宗二十二年已降拔野古其明年阿史那賀魯叛至高宗永徽二年處月朱邪孤注從賀魯戰于牢山為契苾何力所敗遂沒不見後百五六十年當憲宗時有朱邪盡忠及子執宜見于中國而自號沙陀以朱邪為姓矣蓋沙陀者大磧也在金莎山之陽蒲類海之東自處月以來居此磧號沙陀突厥而夷狄無文字傳記朱邪又微不足錄故其後世自失其傳至盡忠孫始賜姓李氏李氏後大而夷狄之人遂以沙陀為貴種云今從之景雲二年十一月乙酉奚契丹二萬騎寇漁陽幽州都督宋璟閉城不出虜大掠而去景雲二年上皇誥遣皇帝巡邊西自河隴東及燕薊選將練卒燕因肩翻薊音計將即亮翻甲午以幽州都督宋璟為左軍大總管幷州長史薛訥為中軍大總管朔方大總管兵部尚書郭元振為右軍大總管景雲二年十二月刑部尚書李日知請致仕日知在官不行捶撻而事集捶止橤翻下同刑部有令史受敕三日忘不行忘巫放翻日知怒索杖集㣥吏欲捶之索山客翻既而謂曰我欲捶汝天下人必謂汝能撩李日知嗔撩落蕭翻取動也嗔昌真翻受李日知杖不得比於人妻子亦將棄汝矣遂釋之吏皆感悅無敢犯者脫有稽失衆共謫之開元元年癸丑七一三是年十二月方改元景雲二年春正月乙亥誥衞士自今二十五入軍五十免羽林飛騎並以衞士簡補騎奇寄翻景雲二年以吏部尚書蕭至忠為中書令景雲二年皇帝巡邊改期所募兵各散遣約八月復集復扶又翻竟不成行景雲二年二月庚子夜開門然燈按舊書嚴挺之傳先天二年正月望胡僧婆陀請夜開門燃千百燈元年受內禪不及賜天下酺乃追為之酺音蒲上皇與上御門樓臨觀或以夜繼晝凡月餘帝之侈心蓋已發露於此矣伎其綺翻以為酺者因人所利合醵為歡醵其虐翻合錢飲酒也今乃損萬人之力營百戲之資非所以光聖德美風化也乃止景雲二年初高麗既亡高麗亡見二百一卷高宗總章元年及李盡忠反李盡忠反見二百五卷武后萬歲通天元年風俗通大姓大庭氏之後大款為顓帝師按禮記曰大連善居喪東夷之子也蓋東夷之有大姓尚矣種章勇翻阻險自固靺鞨音末曷盡忠死武后使將軍李楷固討其餘黨楷固擊乞四北羽斬之引兵踰天門嶺逼祚榮新書天門嶺在土護真河北三百里楷固大敗僅以身免祚榮遂帥其衆東據東牟山築城居之東牟山在挹婁國界地直營州東二千里南北與新羅以泥河為境東窮海西契丹帥讀曰率驍堅堯翻下同高麗靺鞨之人稍稍歸之地方二千里戶十餘萬勝兵數萬人勝音升自稱振國王附于突厥時奚契丹皆叛道路阻絕武后不能討中宗即位遣侍御史張行岌招慰之岌魚及翻祚榮遣子入侍至是以祚榮為左驍衞大將軍勃海郡王以其所部為忽汗州令祚榮兼都督靺鞨自此盛矣始去靺鞨專號勃海景雲二年庚申敕以嚴挺之忠直宣示百官厚賞之景雲二年三月辛巳皇后親蠶舊制有皇后祀先蠶親桑之禮後周制皇后衣十二等採桑服鴇衣唐制皇后親蠶服鞠衣黃羅為之考異曰玄宗實錄脫此年二月三月事祀先蠶詔乃三月丁卯也而唐曆承其誤云正月辛巳皇后祀先蠶太上皇錄云三月辛巳皇后親蠶自嗣聖光宅以來廢闕此禮至是重行太上皇睿宗實錄舊本紀皆云辛卯按制書云以今月十八日祀先蠶是月甲子朔今從玄宗實錄景雲二年晉陵尉楊相如上疏言時政其略曰煬帝自恃其強不憂時政雖制敕交行而聲實舛謬言同堯舜迹如桀紂舉天下之大一擲而棄之又曰隋氏縱欲而亡太宗抑欲而昌願陛下詳擇之又曰人主莫不好忠正而惡佞邪好呼到翻惡烏路翻下同然忠正者常疏佞邪者常親以至於覆國危身而不寤者何哉誠由忠正者多忤意佞邪者多順指積忤生憎積順生愛此親疏之所以分也明主則不然愛其忤以收忠賢惡其順以去佞邪忤五故翻去羌呂翻下除去同則太宗太平之業將何遠哉又曰夫法貴簡而能禁罰貴輕而必行陛下方興崇至德大布新政請一切除去碎密不察小過小過不察則無煩苛大罪不漏則止姦慝使簡而難犯寬而能制則善矣上覽而善之景雲二年先是脩大明宮未畢先悉薦翻夏五月庚寅敕以農務方勤罷之以待閒月閒月謂農功畢入之後景雲二年六月丙辰以兵部尚書郭元振同中書門下三品考異曰六月辛丑郭元振同三品下註曰舊紀在丙辰今從睿宗實錄據考異則通鑑正文當改丙辰為辛丑景雲二年太平公主依上皇之勢亶權用事與上有隙宰相七人五出其門考異曰唐曆曰宰相有七四出其門天子孤立而無援新舊傳皆云宰相七人五出主門下按是時竇懷貞蕭至忠岑羲崔湜與主連謀其不附主者郭元振魏知古陸象先三人也薛稷太子少保不為宰相或者新舊傳幷象先數之唐曆不數象先耳太半附之與竇懷貞岑羲蕭至忠崔湜及太子少保薛稷雍州長史新興王晉雍於用翻左羽林大將軍常元楷知右羽林將軍事李慈左金吾將軍李欽中書舍人李猷右散騎常侍賈膺福鴻臚卿唐晙及僧慧範等謀廢立晙子峻翻又與宮人元氏謀於赤箭粉中置毒進於上陶弘景曰赤箭亦是芝類莖赤如箭簳葉生其端根如人足又如芋魁有十二子為衞其苗為粉久服益氣力長陰肥健輕身增年沈括曰赤箭天麻苗也根則抽苗徑直而上苗則結子成熟而落返從簳中而下至土而生赤箭則言苗用之有自表入裏之功天麻則言根用之有自內達外之理本草圖經曰赤箭莖中空依半而上貼莖微有尖葉梢頭生成穗開花結子如豆粒大其子至夏不落卻透虛入莖中潛生土內德良之孫也德良長平王叔良之弟武德初封新興王相與結謀數所角翻王琚言於上曰事迫矣不可不速發左丞張說自東都遣人遺上佩刀意欲上斷割遺于季翻君臣之禮當言獻佩刀此因舊史成文失於改定耳斷丁亂翻荊州長史崔日用入奏事言於上曰太平謀逆有日陛下往在東宮猶為臣子若欲討之須用謀力今既光臨大寶但下一制書誰敢不從萬一姦宄得志悔之何及上曰誠如卿言直恐驚動上皇日用曰天子之孝在於安四海若姦人得志則社稷為墟安在其為孝乎請先定北軍北軍謂左右羽林左右萬騎也則不驚動上皇矣上以為然以日用為吏部侍郎秋七月魏知古告公主欲以是月四日作亂考異曰上皇錄云公主謀不利於上與今上更立皇子獨專權期以是月七日作亂今上密知其事勒左右禁兵誅之按是月壬戌朔玄宗以三日甲子誅之今從玄宗錄時上於武德殿受㣥臣朝故欲突入為變西內以太極殿為正牙自北門言之曰南牙景雲初以左右萬騎與左右羽林為北門四軍置左右龍武將軍以領萬騎位從三品乘繩證翻內給事屬內侍省從五品下掌判省事元正冬至㣥臣朝賀中宮則出入宣傳凡宮人衣服費用則具其品秩計其多少春秋二時宣送中書果毅李守德等定計誅之皎謩之曾孫姜謩見一百八十四卷隋恭帝義寧元年靖弟客師之孫李客師亦有戰功仁皎之子力士潘州人也潘州古西甌駱越地漢屬合浦郡界江左置定州郡隋廢郡為縣唐武德四年置南宕州貞觀八年改潘州以潘水為名甲子上因王毛仲取閑广既馬及兵三百餘人自章十二行本自上有與同謀十餘人六字乙十一行本同孔本同退齋校同張校同云無註本亦無武德殿入虔化門西內太極殿北曰朱明門左曰虔化門右曰肅章門虔化之東曰武德西門門內則武德殿先斬之擒膺福猷於內客省以出四方館隸中書省故內客省在焉中書省在太極門之右膺福猷皆中書省官也東西朝堂在承天門內分左右朝直遙翻考異曰玄宗實錄作乙丑按僉載七月三日誅常元楷今從睿宗上皇實錄唐曆新舊本紀舊王琚傳琚與岐王範薛王業姜皎王毛仲等並預誅逆以鐵騎至承天門時睿宗聞鼓譟聲召郭元振升承天樓宣詔下關令侍御史任知古召募數百人於朝堂不得入頃間琚等從玄宗至樓上太上皇實錄公主期以是月七日令常元楷以羽林兵自北門入竇懷貞等於南衙舉兵應之今上密知其事登時勒左右禁兵出北門召常元楷李慈即斬於闕下還至承天門執岑羲蕭至忠斬於朝堂舊蕭至忠傳曰至忠遽遁入山寺數日捕而伏誅蓋誤以太平公主事為至忠事今從玄宗實錄朝野僉載曰羽林將軍常元楷三代告密得官至先天二年七月三日楷以反逆誅家口配沒玄宗實錄云上誅凶逆睿宗恐宮中有變御承天門號令南衙兵士以備非常郭元振帥兵侍衞登樓奏曰皇帝前奉誥誅竇懷貞等惟陛下勿憂睿宗大喜今擇其可信者取之自縊死戮其尸改姓曰毒縊於計翻上皇聞變登承天門樓郭元振奏皇帝前奉誥誅竇懷貞等無他也上尋至樓上上皇乃下誥罪狀懷貞等因赦天下惟逆人親黨不赦薛稷賜死於萬年獄乙丑上皇誥自今軍國政刑一皆取皇帝處分處昌呂翻分扶問翻考異曰舊本紀云七月三日誅懷貞等睿宗明日下詔軍國政刑並取皇帝處分新本紀云乙丑始聽政唐曆亦無乙丑下誥唯玄宗實錄云丙寅今從諸書朕方無為養志以遂素心是日徙居百福殿唐六典曰兩儀殿之右曰宜秋門宜秋之右曰百福門其內百福殿太平公主逃入山寺三日乃出賜死于家考異曰新傳云三日乃出太上皇實錄曰公主聞難作遁入山寺數日方出禁錮終身諸子皆伏誅今從新舊傳睿宗實錄薛崇簡以數諫其母被撻特免死數所角翻賜姓李官爵如故崇簡即崇暕財貨山積珍物侔於御府广既牧羊馬田園息錢收之數年不盡慧範家亦數十萬緡改新興王晉之姓曰厲姓譜本自有厲姓漢有魏郡太守義陽侯厲溫初上謀誅竇懷貞等召崔湜將託以心腹湜弟滌謂湜曰主上有問勿有所隱湜不從懷貞等既誅湜與右丞盧藏用俱坐私侍太平公主湜流竇州舊志竇州至京師水陸六千一百二里瀧閭江翻新興王晉臨刑歎曰本為此謀者崔湜今吾死湜生不亦冤乎會有司鞫宮人元氏元氏引湜同謀進毒乃追賜死於荊州舊志荊州京師東南一千七百三十里流嶺南於道自殺初太平公主與其黨謀廢立竇懷貞蕭至忠岑羲崔湜皆以為然陸象先獨以為不可公主曰廢長立少宋王成器長也長知兩翻少詩照翻且又失德若之何不去去羌呂翻象先曰既以功立當以罪廢言上平內難有大功於天下國家無罪不可廢象先終不敢從公主怒而去上既誅懷貞等召象先謂曰歲寒知松柏信哉論語孔子曰歲寒然後知松柏之後凋也當坐者衆象先密為申理所全甚多治直之翻為于偽翻然未嘗自言當時無知者百官素為公主所善及惡之者惡烏路翻或黜或陟終歲不盡丁卯上御承天門樓赦天下己巳賞功臣郭元振等官爵第舍金帛有差以高力士為右監門將軍知內侍省事監古銜翻初太宗定制內侍省不置三品官內侍省內侍四人以久次一人知省事從四品上守門傳命而已天后雖女主宦官亦不用事中宗時嬖倖猥多宦官七品以上至千餘人然衣緋者尚寡嬖卑義翻又博計翻衣於既翻下同上在藩邸力士傾心奉之力士馮盎曾孫也聖曆初嶺南討擊使李千里上二閹兒曰金剛曰力士中人高延福養為子故冒高姓既壯為宮闈丞帝在藩力士傾心附結奏為內給事至是以誅蕭岑功賞之是後宦官稍增至三千餘人除三品將軍者浸多衣緋紫至千餘人宦官之盛自此始衣去聲景雲二年壬申遣益州長史畢構等六人宣撫十道景雲二年乙亥以左丞張說為中書令景雲二年庚辰中書侍郎同平章事陸象先罷為益州長史劍南按察使使疏吏翻八月癸巳以封州流人劉幽求為左僕射平章軍國大事景雲二年丙辰突厥可汗默啜遣其子楊我支來求婚丁巳許以蜀王女南和縣主妻之妻七細翻景雲二年中宗之崩也同中書門下三品李嶠密表韋后請出相王諸子於外相息亮翻上即位於禁中得其表以示侍臣嶠時以特進致仕或請誅之張說曰嶠雖不識逆順然為當時之謀則忠矣上然之九月壬戌以嶠子率更令暢為虔州刺史唐六典曰漢率更令丞主庶子舍人更直職似光祿勳晉率更令掌宮殿門戶之禁郎將屯衞之士北齊率更令掌周衞禁防漏刻鍾鼓更工衡翻景雲二年庚午以劉幽求同中書門下三品景雲二年丙戌復置右御史臺督察諸州去年春廢右御史臺復扶又翻使疏吏翻景雲二年冬十月辛卯引見京畿縣令唐京城兩赤縣為京縣畿內諸縣為畿縣京縣令正五品上畿縣令正六品下見賢遍翻景雲二年己亥上幸新豐癸卯講武於驪山之下徵兵二十萬旌旗連亙五十餘里亙古鄧翻以軍容不整坐兵部尚書郭元振於纛下將斬之劉幽求張說跪於馬前諫曰元振有大功於社稷不可殺乃流新州舊志新州去京師五千五十二里以其制軍禮不肅故也上始欲立威亦無殺紹之意金吾衞將軍李邈遽宣敕斬之上尋罷邈官廢棄終身時二大臣得罪諸軍多震懾失次懾之涉翻惟左軍節度薛訥時講武分左右軍以訥為左軍節度上遣輕騎召之皆不得入其陳解戶買翻騎奇寄翻陳讀曰陣上深歎美慰勉之甲辰獵于渭川此即新豐界之渭川張說疾之使御史大夫趙彥昭彈之彈徒丹翻上不納又使殿中監姜皎言於上曰陛下常欲擇河東總管而難其人臣今得之矣上問為誰皎曰姚元之文武全才真其人也上曰此張說之意也汝何得面欺罪當死皎叩頭首服首式又翻上即遣中使召元之詣行在使疏吏翻既至上方獵引見見賢遍翻即拜兵部尚書同中書門下三品考異曰世傳升平源以為吳兢所撰云姚元崇初拒太平得罪上頗德之既誅太平方任元崇以相進拜同州刺史張說素不叶命趙彥昭驟彈之不許居無何上將獵於渭濱密召元崇會於行所初元崇聞上講武於驪山謂所親曰準式車駕行幸三百里內刺史合朝覲元崇必為權臣所擠若何參軍李景初進曰某有兒母者其父即教坊長入內相公儻致厚賂使其冒法進狀可達公然之輒效燕公說使姜皎入曰陛下久卜河東總管重難其人臣有所得何以見賞上曰誰邪如愜有萬金之賜乃曰馮翊太守姚崇文武全材即其人也上曰此張說意也卿罔上當誅皎首服萬死即詔中官追赴行在上方獵于渭濱公至拜馬首上曰卿頗知獵乎元崇曰臣少孤居廣成澤目不知書唯以射獵為事四十年方遇張憬藏謂臣當以文學備位將相無為自棄爾來折節讀書今雖官位過忝至於馳射老而猶能於是呼鷹放犬遲速稱旨上大悅上曰朕久不見卿思有顧問卿可於宰相行中行公行猶後上縱轡久之顧曰卿行何後公曰臣官疏賤不合參宰相行上曰可兵部尚書同平章事公不謝上顧訝焉至頓上命宰臣坐公跪奏臣適奉作弼之詔而不謝者欲以十事上獻有不可行臣不敢奉詔上曰悉數之朕當量力而行然定可否公曰自垂拱已來朝廷以刑法理天下臣請聖政先仁義可乎上曰朕深心有望於公也又曰聖朝自喪師青海未有牽復之悔臣請三數十年不求邊功可乎上曰可又曰自太后臨朝以來喉舌之任或出於閹人之口臣請中官不預公事可乎上曰懷之久矣又曰自武氏諸親猥侵清切權要之地繼以韋庶人安樂太平用事班序荒雜臣請國親不任臺省官凡有斜封待闕員外等官悉請停罷可乎上曰朕素志也又曰比來近密佞幸之徒冒犯憲網者皆以寵免臣請行法可乎上曰朕切齒久矣又曰比因豪家戚里貢獻求媚延及公卿方鎮亦為之臣請除租庸賦稅之外悉杜塞之可乎上曰願行之又曰太后造福先寺中宗造聖善寺上皇造金仙玉真觀皆費鉅百萬耗蠹生靈凡寺觀宮殿臣請止絕建造可乎上曰朕每覩之心即不安而況敢為者哉又曰先朝褻狎大臣或虧君臣之敬臣請陛下接之以禮可乎上曰事誠當然有何不可又曰自燕欽融韋月將獻直得罪由是諫臣沮色臣請凡在臣子皆得觸龍鱗犯忌諱可乎上曰朕非唯能容之亦能行之又曰呂氏產祿幾危西京馬竇閻梁亦亂東漢萬古寒心國朝為甚臣請陛下書之史冊永為殷鑒作萬代法可乎上乃潸然良久曰此事真可為刻肌刻骨者也公再拜曰此誠陛下致仁政之初是臣千載一遇之日臣敢當弼諧之地天下幸甚天下幸甚又再拜蹈舞稱萬歲者三從官千萬皆出涕上曰坐公坐於燕公之下燕公讓不敢坐上問對曰元崇是先朝舊臣合首坐公曰張說是紫微宮使今臣是客宰相不合首坐上曰可紫微宮使居首座果如所言則元崇進不以正又當時天下之事止此十條須因事啟沃豈一旦可邀似好事者為之依託兢名難以盡信今不取元之吏事明敏三為宰相皆兼兵部尚書姚崇始相武后後相睿宗今復為相士馬儲械無不默記上初即位勵精為治治直之翻每事訪於元之元之應答如響同僚唯諾而已唯于癸翻故上專委任之元之請抑權倖愛爵賞納諫諍卻貢獻不與㣥臣褻狎上皆納之此即前所獻十事之二三也乙巳車駕還京師景雲二年姚元之嘗奏請序進郎吏考異曰此出李德裕次柳氏舊聞不知郎吏為何官若郎中員外郎則是清要官不得云秩卑恐是郎將又不敢必故仍用舊文元之再三言之終不應元之懼趨出罷朝高力士諫曰陛下新總萬機宰臣奏事當面加可否柰何一不省察朝直遙翻省悉景翻上曰朕任元之以庶政大事當奏聞共議之郎吏卑秩乃一一以煩朕邪會力士宣事至省中唐世凡機事皆使內臣宣旨於宰相為于偽翻元之乃喜聞者皆服上識君人之體左拾遺曲江張九齡曲江縣漢屬桂陽郡江左置始興郡唐武德四年置番州尋改東衡州貞觀元年改韶州為上所信任奏記勸其遠諂躁進純厚遠于願翻躁則到翻其略曰任人當才為政大體與之共理無出此途而曏之用才非無知人之鑒其所以失溺在緣情之舉溺奴狄翻又曰自君侯職相國之重持用人之權而淺中弱植之徒已延頸企踵而至諂親戚以求譽媚賓客以取容其間豈不有才所失在於無恥元之嘉納其言新興王晉之誅也僚吏皆奔散惟司功李撝步從從才用翻唐制諸州功曹司功參軍事掌考課假使祭祀禮樂學校表疏書啟祿食祥異醫藥卜筮陳設喪葬不失在官之禮仍哭其尸姚元之聞之曰欒布之儔也欒布哭彭越擢為尚書郎景雲二年己酉以刑部尚書趙彥昭為朔方道大總管景雲二年十一月乙丑劉幽求兼侍中景雲二年辛巳㣥臣上表請加尊號為開元神武皇帝從之戊子受冊上時掌翻景雲二年中書侍郎王琚為上所親厚㣥臣莫及每進見侍笑語逮夜方出或時休沐往往遣中使召之或言於上曰王琚權譎縱橫之才見賢遍翻使疏吏翻譎古穴翻縱子容翻可與之定禍亂難與之守承平上由是浸疏之是月命琚兼御史大夫按行北邊諸軍行下孟翻考異曰朝野僉載曰琚以諂諛自進未周年為中書侍郎其母氏聞之自洛赴京戒之曰汝徒以諂媚險詖取容色交自達朝廷側目海內切齒吾嘗恐汝家墳隴無人守之琚慚懼表請侍母上初大怒後許之按舊傳琚未嘗去官侍母今不取舊傳又云使琚按行天兵以北諸軍按五年始置天兵軍於幷州蓋琚傳追言之耳景雲二年十二月庚寅赦天下改元改元開元中書省為紫微省門下省為黃門省侍中為監雍州為京兆府洛州為河南府長史為尹司馬為少尹隋以京守為牧武德初因隋置牧以親王為之或不出閤以長史知府事至是改為府升長史為尹從三品專總府事魏晉以下州府皆有治中隋文帝改為司馬煬帝改為贊理又為丞武德改為治中永徽避高宗名改為司馬至是改為少尹從四品下雍於用翻景雲二年甲午吐蕃遣其大臣來求和景雲二年壬寅以姚元之兼紫微令元之避開元尊號復名崇姚元之本名元崇武后長安四年命以字行今復舊名而省元字復扶又翻景雲二年敕都督刺史都護將之官皆引面辭畢側門取進止東內有左右側門左右側門之外即金吾左右仗景雲二年姚崇既為相紫微令張說懼乃潛詣岐王申款款誠也崇對於便殿行微蹇上問有足疾乎對曰臣有腹心之疾非足疾也上問其故對曰岐王陛下愛弟張說為輔臣而密乘車入王家恐為所誤故憂之癸丑說左遷相州刺史考異曰松窗雜錄姚崇為相忽一日對於便殿舉右足不甚輕利上曰卿有足疾邪崇奏曰臣有腹心之疾非足疾也因前奏張說罪狀數百言上怒曰卿歸中書宜宣與御史中丞共按其事而說未之知會朱衣吏報午後三刻說乘馬先歸崇急呼御史中丞李林甫以前詔付之林甫語崇曰說多智謀是必困之宜以劇地崇曰丞相得罪未宜太逼林甫又曰公必不忍即說當無害林甫止將詔付於小御史中路以馬墜告說未遭崇奏前旬月家有教授書生通於說侍兒最寵者會擒得姦狀以聞於說說怒甚將窮獄於京兆尹書生厲聲言曰覩色不能禁人之常情也公貴為宰相豈無緩急用人胡靳靳於一婢女邪說奇其言而釋之兼以侍兒與歸書生跳跡去旬餘無所聞知忽一日直訪於說憂色滿面而言曰某感公之恩當有謝者久矣今聞公為姚相所構外獄將具公不之知危將至矣某願得公平生所寶者用計於九公主必能立釋之說因自歷指狀所寶者書生皆曰未足解公之難又凝思久之忽曰近有以雞林郡夜明簾為寄信者書生曰吾事濟矣因請說手筆數行懇以情言遂急趨出逮夜始及九公主邸第書生具以說言之兼用夜明簾為贄且謂主曰上獨不念在東宮時思必始終恩加於張丞相乎而今反用快不利張丞相者之心邪明早公主上謁具為奏之上感動因急命高力士就御史臺宣前所按獄事並宜罷之書生迄亦不再見於張丞相也此說亦似出於好事者又元崇開元四年罷相林甫十四年始為御史中丞今從新傳甲寅以黃門侍郎盧懷慎同紫微黃門平章事齊思和標點聶崇岐覆校
