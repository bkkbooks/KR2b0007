body:
  text: 資治通鑑卷第一百五十四端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註梁紀十是月高祖武皇帝十中大通二年庚戌五三是月春正月己丑魏益州刺史長孫壽梁州刺史元儁等遣將擊嚴始欣斬之蕭玩等亦敗死玩援始欣見上卷上年長知兩翻將即亮翻是月辛亥魏東徐州城民呂文欣等殺刺史元大賓據城反魏孝昌元年置東徐州於下邳二月甲寅斬文欣是月万俟醜奴侵擾關中万莫北翻俟渠之翻魏爾朱榮遣武衞將軍賀拔岳討之岳私謂其兄勝曰醜奴勍敵也勍其京翻今攻之不勝固有罪勝之讒嫉將生勝曰然則柰何岳曰願得爾朱氏一人為帥而佐之帥所類翻勝為之言於榮為于偽翻榮悅以爾朱天光為使持節都督二雍二岐諸軍事驃騎大將軍雍州刺史後魏雍州治長安北雍州治華原縣東雍州治鄭縣岐州治扶風雍縣南岐州治河池故道縣使疏吏翻雍於用翻驃匹妙翻騎奇計翻又以征西將軍代郡侯莫陳悅為右大都督侯莫陳其先魏之別部也居庫斛真水世為渠帥遂以為氏其後鎮代郡武川因家焉天光初行唯配軍士千人發洛陽以西路次民馬以給之時赤水蜀賊斷路水經註赤水在鄭縣北即山海經之灌水也北注于渭蜀賊本蜀人之遷關中者乘亂相聚為賊斷丁管翻幷稅其馬華陰諸楊仕魏奕世貴顯關西所歸重故使之先行慰諭也軍至漳關天光不敢進岳曰蜀賊鼠竊公尚遲疑若遇大敵將何以戰天光曰今日之事一以相委岳遂進擊蜀於渭北破之獲馬二千匹簡其壯健以充軍士又稅民馬合萬餘匹以軍士尚少少詩沼翻淹留未進榮怒遣騎兵參軍劉貴乘驛至軍中責天光杖之一百以軍士二千人益之三月醜奴自將其衆圍岐州遣其大行臺尉遲菩薩李延壽曰其先魏之別號尉遲部因以為氏尉音鬱菩薄胡翻薩桑葛翻攻圍趣柵杵疑古翻考異曰北史作万俟行醜今從周書天光使賀拔岳將千騎救之菩薩等已拔柵而還還從宣翻又如字岳故殺掠其吏民以挑之菩薩率步騎二萬至渭北挑徒了翻帥讀曰率岳以輕騎數十自渭南與菩薩隔水而語稱揚國威菩薩令省事傳語省事蓋猶今之通事兩敵相向使之往來通傳言語省悉井翻我與菩薩語卿何人也射殺之射而亦翻明日復引百餘騎隔水與賊語復扶又翻稍引而東至水淺可涉之處岳即馳馬東出賊以為走乃棄步兵輕騎南渡渭追岳岳依橫岡設伏兵以待之賊半渡岡東岳還兵擊之賊兵敗走岳既還兵擊賊伏兵又發故敗走賊下馬者勿殺賊悉投馬俄獲三千人馬亦無遺遂擒菩薩仍渡渭北降步卒萬餘並收其輜重降戶江翻重直用翻醜奴聞之棄岐州北走安定走音奏置柵於平亭天光方自雍至岐與岳合平亭在涇州北自雍至岐自雍州至岐州也夏四月天光至汧渭之間汧水出汧縣西北而入于渭汧口堅翻宣言天時將熱未可行師俟秋涼更圖進止獲醜奴覘候者縱遣之覘丑廉翻又丑豔翻醜奴信之散衆耕於細川據令狐德棻後周書百里細川在岐州北又據元豐九域志涇州靈臺縣有百里鎮蓋即細川之地細川平亭當亦相近據險立柵侯伏侯虜三字姓將即亮翻天光知其勢分晡時密嚴諸軍相繼俱發黎明圍元進大柵拔之所得俘囚一皆縱遣諸柵聞之皆降唐末高仁厚平阡能等亦用此術降戶江翻下同抵安定城下賊涇州刺史侯幾長貴以城降侯幾虜複姓魏書官氏志內入諸姓有俟幾氏俟侯字相近欲趣高平九域志鎮戎軍古高平地也趣七喻翻丁卯及於平涼賊未成列直閤代郡侯莫陳崇單騎入賊中於馬上生擒醜奴因大呼衆皆披靡呼火故翻披普彼翻無敢當者後騎益集賊衆崩潰遂大破之天光進逼高平城中執送蕭寶寅以降万俟醜奴胡琛之將也普通六年破魏將崔延伯其衆始盛蕭寶寅大通元年叛魏至二年敗奔醜奴及是皆平是月壬申以吐谷渾王佛輔為西秦河二州刺史吐從暾入聲谷音浴是月甲戌魏以關中平大赦万俟醜奴蕭寶寅至洛陽置閶闔門外都街之中士女聚觀凡三日丹楊王蕭贊表請寶寅之命贊以寶寅為叔父故請其命欲左右之左右讀曰佐佑言於魏主曰寶寅叛逆事在前朝朝直遙翻會應詔王道習自外至應詔猶漢之待詔也在外何所聞對曰惟聞李尚書高黃門與蕭寶寅周款周至也密也款愛也必能全之且二人謂寶寅叛逆在前朝寶寅為醜奴太傅豈非陛下時邪賊臣不翦法欲安施帝乃賜寶寅死於駝牛署邪音耶後魏官有駝牛都尉署者其寺舍也五代志太僕寺之屬有駝牛署掌飼駝騾驢牛有令丞斬醜奴於都市是月六月丁巳帝復以魏汝南王悅為魏王復扶又翻考異曰梁帝紀中大通元年正月甲子魏汝南王悅求還本國許之二年六月丁巳遣悅還北為魏主按魏書悅傳悅未嘗歸魏復入梁今刪去元年事是月戊寅魏詔胡氏親屬受爵於朝者皆黜為民謂靈后親屬也朝直遙翻是月庚申以魏降將范遵為安北將軍司州牧從魏王悅北還范遵魏北海王顥之舅蓋與顥同來奔降戶江翻將即亮翻是月万俟醜奴既敗自涇豳以西至靈州後魏滅赫連以赫連果城置薄骨律鎮至孝昌中改鎮為靈州杜佑曰薄骨律鎮今靈武郡富平今迴樂縣唐靈州治迴樂括地志云薄骨律鎮城在河渚之中隨水上下未嘗陷沒故號靈州也唯所署行臺万俟道洛帥衆六千逃入山中不降降戶江翻帥讀曰率下同時高平大旱爾朱天光以馬乏草退屯城東五十里遣都督長孫邪利帥二百人行原州事以鎮之魏太延二年置高平鎮正光五年改曰原州治高平城領高平長城二郡掩襲邪利幷其所部皆殺之天光帥諸軍赴之道洛出戰而敗帥其衆西入牽屯山班志幵頭山在安定郡涇陽縣西涇水所出師古註曰幵音牽此山在今靈州東南俗語訛謂之幵屯山杜佑曰山牽屯山在今原州高平縣爾朱榮以天光失邪利不獲道洛復遣使杖之一百復扶又翻使疏吏翻以詔書黜天光為撫軍將軍雍州刺史降爵為侯天光追擊道洛於牽屯道洛敗走入隴隴隴山也晉武帝分天水置略陽郡隋廢為隴城縣屬秦州考異曰魏帝紀作白馬龍涸胡王慶雲今從爾朱天光傳帥音所類翻驍堅堯翻慶雲得之甚喜謂大事可濟遂稱帝於水洛城水經註水洛水導源隴山西逕水洛亭西南注略陽川九域志水洛城在德順軍西南一百里范仲淹曰朝那之西秦亭之東有水洛城以道洛為大將軍秋七月天光帥諸軍入隴至水洛城慶雲道洛出戰天光射道洛中臂射而亦翻中竹仲翻失弓還走拔其東城賊併兵趣西城趣七喻翻城中無水衆渴乏有降者言慶雲道洛欲突走天光恐失之乃遣人招諭慶雲使早降降戶江翻曰若未能自決當聽諸人今夜共議明晨早報慶雲等冀得少緩因待夜突出少詩沼翻乃報曰請俟明日天光因使謂曰知須水須者意所欲也為于偽翻任取澗水飲之賊衆悅無復走心天光密使軍士多作木槍各長七尺此即拒馬槍也杜佑曰拒馬槍以木徑二尺長短隨事十字鑿孔縱橫安檢長丈銳其端以塞要路繞城布列要路加厚又伏人槍中備其衝突兼令密縛長梯於城北其夜慶雲道洛果馳馬突出遇槍馬各傷倒伏兵起即時擒之軍士緣梯入城餘衆皆出城南遇槍而止窮窘乞降降戶江翻丙子天光悉收其仗而阬之死者萬七千人分其家口於是三秦河渭瓜涼鄯州皆降三秦秦東秦南秦也河州乞伏之地也魏太武真君六年置枹罕鎮後改為河州領金城武始洪和臨洮郡渭州領隴西南安南安陽廣寧郡瓜州即古敦煌之地鄯州禿髮氏之地漢金城西部都尉所統也師古曰瓜州即左傳所云允姓之戎居于瓜州者也其地今猶出大瓜長者狐入瓜中食之首尾不出天光頓軍略陽詔復天光官爵尋加侍中儀同三司以賀拔岳為涇州刺史侯莫陳悅為渭州刺史秦州城民謀殺刺史駱超南秦州城民謀殺刺史辛顯超顯皆覺之走歸天光天光遣兵討平之步兵校尉宇文泰從賀拔岳入關以功遷征西將軍行原州事時關隴彫弊泰撫以恩信民皆感悅曰早遇宇文使君吾輩豈從亂乎為宇文泰得賀拔岳之衆以創大業於關西張本是月八月庚戌上餞魏王悅於德陽堂遣兵送至境上考異曰悅傳云立為魏主號年更興衍遣其將軍王僧辯送至境上以冀侵逼按僧辯傳未嘗送悅蓋王弁耳是月魏爾朱榮雖居外藩遙制朝政朝直遙翻樹置親黨布列魏主左右伺察動靜大小必知伺相吏翻魏主雖受制於榮然性勤政事朝夕不倦數親覽辭訟理冤獄數所角翻榮聞之不悅史言魏主不能養晦治直之翻選須絹翻下同榮嘗關補曲陽縣令據榮傳即上曲陽縣也漢晉屬常山郡後魏屬中山郡關補者先補授而後關吏部五代志趙州鼓城縣舊曰曲陽劉昫曰漢上曲陽縣隋改曰恆陽唐元和十五年復曰曲陽趙州之曲陽下曲陽也不奏言階級相去懸絕其人不應補為縣令榮大怒即遣所補者往奪其任神儁懼而辭位榮使尚書左僕射爾朱世隆攝選榮啟北人為河南諸州帝未之許太宰天穆入見面論見賢遍翻帝猶不許天穆曰天柱既有大功為國宰相若請普代天下官恐陛下亦不得違之如何啟數人為州遽不用也帝正色曰天柱若不為人臣朕亦須代如其猶存臣節無代天下百官之理榮聞之大恚恨曰天子由誰得立今乃不用我語爾朱皇后性妬忌屢致忿恚帝遣爾朱世隆語以大理恚於避翻語牛倨翻大理謂事理之大致也后曰天子由我家置立今便如此我父本即自作今亦復決決判也謂天下事有判決也復扶又翻止自不為止當作正臣今亦封王矣帝既外逼於榮內逼皇后恆怏怏不以萬乘為樂恆音常怏於兩翻乘繩正翻樂音洛下同唯幸寇盜未息欲使與榮相持及關隴既定告捷之日乃不甚喜謂尚書令臨淮王彧曰即今天下便是無賊彧見帝色不悅曰臣恐賊平之後方勞聖慮帝畏餘人怪之還以他語亂之曰然撫寧荒餘荒餘謂兵荒之餘民也易以豉翻榮見四方無事奏稱參軍許周勸臣取九錫臣惡其言已斥遣令去榮時望得殊禮故以意諷朝廷帝實不欲與之因稱歎其忠榮好獵惡烏路翻好呼報翻不捨寒暑列圍而進令士卒必齊壹雖遇險阻不得違避一鹿逸出必數人坐死有一卒見虎而走榮謂曰汝畏死邪即斬之自是每獵士卒如登戰場嘗見虎在窮谷中榮令十餘人空手搏之毋得損傷死者數人卒擒得之魏道武帝因搏熊而謝于栗磾爾朱榮反是嗜殺人者烏能定天下邪卒音子恤翻以此為樂其下甚苦之太宰天穆從容謂榮曰樂音洛從千容翻大王勳業已盛四方無事唯宜脩政養民順時蒐狩禮春蒐夏田秋獮冬狩杜預曰蒐索擇取不孕者苗為苗除害也獮殺也以殺為名順秋氣也狩圍守也冬物畢成獲則取之無所擇也感傷和氣榮攘袂曰靈后女主不能自正推奉天子乃人臣常節葛榮之徒本皆奴才乘時作亂譬如奴走擒獲即已頃來受國大恩未能混壹海內何得遽言勳業如聞朝士猶自寬縱今秋欲與兄戒勒士馬校獵嵩高令貪汙朝貴入圍搏虎朝直遙翻仍出魯陽歷三荊悉擁生蠻北填六鎮杜佑曰北荊州今即伊陽縣東荊州後改曰淮州今淮安郡荊州今南陽郡余按榮言出魯陽則已越伊陽而南矣五代志舂陵郡後魏置南荊州當以此足三荊之數生蠻謂諸蠻戶之未附於魏者六鎮叛亂鎮戶荒殘故欲填之掃平汾胡稽胡皆居汾州界謂之汾胡簡練精騎分出江淮蕭衍若降乞萬戶侯騎奇計翻降戶江翻乞丘計翻與也如其不降以數千騎徑渡縛取然後與兄奉天子巡四方乃可稱勳耳今不頻獵兵士懈怠安可復用也懈七隘翻復扶又翻城陽王徽之帝之舅女侍中李彧延寔之子帝之姊壻也徽彧欲得權寵惡榮為己害日毀榮於帝勸帝除之帝懲河陰之難河陰之難事見一百五十二卷惡烏路翻難乃旦翻由是密有圖榮之意侍中楊侃尚書右僕射元羅亦預其謀元羅叉之弟也會榮請入朝欲視皇后孑免乳孑免與免同又音晚師古曰免乳為產子也乳人喻翻唐韻曰子母相解曰免刺殺之刺七亦翻唯膠東侯李侃晞濟陰王暉業言榮若來必當有備恐不可圖濟子禮翻又欲殺其黨與發兵拒之帝疑未定而洛陽人懷憂懼中書侍郎邢子才之徒已避之東出邢劭字子才避魏主兄彭城王劭諱故以字行本傳云少時有避遂不行名相任去留中書舍人溫子昇以書呈帝帝恆望其不來恆戶登翻及見書以榮必來色甚不悅子才名劭以字行巒之族弟也邢巒事魏宣武帝屢經將領有功考異曰北史邢巒卷首排目云族孫臧劭而卷中乃云巒叔祖祐祐從子虯虯子臧劭魏書亦云巒從祖祐然則臧劭乃巒族弟非族孫也舊史皆因之武衞將軍奚毅建義初往來通命事見二百五十二卷大通二年然猶以榮所親信不敢與之言情毅曰若必有變臣寧死陛下不能事契胡爾朱氏契胡種也契欺訖翻朕保天柱無異心亦不忘卿忠款款誠也爾朱世隆疑帝欲為變乃為匿名書自牓其門云天子與楊侃高道穆等為計欲殺天柱取以呈榮榮自恃其強不以為意手毀其書唾地曰世隆無膽誰敢生心榮妻北鄉長公主亦勸榮不行榮妻非元氏也以榮功封北鄉長公主考異作鄉郡長公主註曰北史世隆傳作北鄉郡公主今從魏帝紀按考異作鄉郡長公主是也通鑑作北鄉長公主傳寫之誤耳五代志上黨郡鄉縣石勒置武鄉郡後魏去武字為鄉郡證以魏收志無北鄉郡則從鄉郡為是唾吐臥翻長知兩翻是月榮將四五千騎發幷州將即亮翻騎奇計翻時人皆言榮反又云天子必當圖榮九月榮至洛陽考異曰魏帝紀曰辛卯榮天穆自晉陽來朝按北史九月初榮至京十五日天穆至是月甲戌朔辛卯乃十八日非也以太宰天穆在幷州恐為後患故忍未發幷召天穆有人告榮云帝欲圖之榮即具奏帝曰外人亦言王欲害我豈可信之於是榮不自疑每入謁帝從人不過數十從才用翻又皆挺身不持兵仗挺徒頂翻直也帝欲止城陽王徽曰縱不反亦何可耐耐忍也先是長星出中台掃大角恆州人高榮祖頗知天文榮問之對曰除舊布新之象也三台中台上星為諸侯三公大角者天王座也傳曰彗所以除舊布新先悉薦翻先悉薦翻恆戶登翻行臺郎中李顯和曰天柱至那無九錫安須王自索也李顯和蓋為幷肆九州行臺郎中時從榮至洛陽索山客翻都督郭羅察曰今年真可作禪文河陰之難榮已募朝士作禪文故羅察云然郭羅察即郭羅剎參軍褚光曰人言幷州城上有紫氣何慮天柱不應之榮下人皆陵侮帝左右無所忌憚故其事皆上聞皆上時掌翻奚毅又見帝求間求間即請間也知其至誠乃召城陽王徽及楊侃李彧告以毅語榮小女適帝兄子陳留王寬榮嘗指之曰我終得此壻力徽以白帝曰榮慮陛下終為己患脫有東宮必貪立孩幼孩何開翻若皇后不生太子則立陳留耳帝夢手持刀自割落十指惡之惡烏路翻告徽及楊侃徽曰蝮蛇螫手壯士解腕螫音釋腕烏貫翻割指亦是其類乃吉祥也戊子天穆至洛陽帝出迎之榮與天穆並從入西林園宴射榮奏曰近來侍官皆不習武陛下宜將五百騎出獵因省辭訟將即亮翻騎奇計翻省悉井翻先是奚毅言榮欲因獵挾天子移都先悉薦翻由是帝益疑之辛卯帝召中書舍人溫子昇告以殺榮狀幷問以殺董卓事子昇具道本末帝曰王允若即赦涼州人必不應至此董卓王允事見六十卷漢獻帝初平三年語子昇曰語牛倨翻朕之情理卿所具知死猶須為況不必死吾寧為高貴鄉公死不為常道鄉公生謂曹魏高貴鄉公欲誅司馬昭不克而死常道鄉公禪位于晉而生也即赦其黨皆應不動應詔王道習曰爾朱世隆司馬子如朱元龍特為榮所委任具知天下虛實謂不宜留徽及楊侃皆曰若世隆不全仲遠天光豈有來理爾朱仲遠時鎮徐州天光時鎮關隴徽曰榮腰間常有刀或能狼戾傷人狼當作很孟子樂歲粒米狼戾猶言狼藉也非此義乃伏侃等十餘人於明光殿東其日榮與天穆並入坐食未訖起出侃等從東階上殿上時掌翻見榮天穆已至中庭事不果壬辰帝忌日癸巳榮忌日親喪之日為忌日禮曰忌日不樂甲午榮暫入即詣陳留王家飲酒極醉遂言病動頻日不入帝謀頗泄世隆又以告榮且勸其速發榮輕帝以為無能為曰何怱怱預帝謀者皆懼帝患之城陽王徽曰以生太子為辭榮必入朝因此斃之帝曰后懷孕始九月可乎朝直遙翻孕以正翻徽曰婦人不及期而產者多矣彼必不疑帝從之戊戌帝伏兵於明光殿東序聲言皇子生遣徽馳騎至榮第告之騎奇計翻榮方與上黨王天穆博徽脫榮帽懽舞盤旋唐李太白詩云脫君帽為君笑脫帽懽舞蓋夷禮也趣讀曰促榮遂信之與天穆俱入朝帝聞榮來不覺失色中書舍人溫子昇曰陛下色變帝連索酒飲之酒能變貌又能張膽故連索飲之索山客翻既成執以出遇榮自外入問是何文書子昇顏色不變曰敕榮不取視而入帝在東序下西向坐榮天穆在御榻西北南向坐徽入始一拜榮見光祿少卿魯安典御李侃晞等抽刀從東戶入漢九卿惟正卿一人魏高祖太和十一年始各置少卿一人典御嘗食典御也少詩沼翻趣七喻翻帝先橫刀膝下遂手刃之安等亂斫榮與天穆同時俱死榮子菩提及車騎將軍爾朱陽覩等三十人從榮入宮亦為伏兵所殺菩薄乎翻帝得榮手版上有數牒啟皆左右去留人名非其腹心者悉在出限出不使在帝左右豎子若過今日遂不可制於是內外喜譟聲滿洛陽城百僚入賀帝登閶闔門下詔大赦遣武衞將軍奚毅前燕州刺史崔淵將兵鎮北中燕因肩翻將即亮翻是夜章甲十一行本夜下有爾朱世隆奉五字乙十一行本同孔本同張校同退齋校同北鄉長公主帥榮部曲焚西陽門出屯河陰西陽門即洛陽城西明門也衞將軍賀拔勝與榮黨田怡等聞榮死奔赴榮第時宮殿門猶未加嚴防怡等議即攻門勝止之曰天子既行大事必當有備吾輩衆少何可輕爾少詩沼翻但得出城更為他計怡乃止及世隆等走勝遂不從考異曰周書及北史云勝復從世隆至河橋勝以為臣無讎君之義遂勒所部還都莊帝大悅今從魏書朱瑞雖為榮所委而善處朝廷之間朱瑞本榮之行臺郎中也榮定魏主於洛陽以瑞為黃門侍郎兼中書舍人處昌呂翻故瑞從世隆走而中道逃還榮素厚金紫光祿大夫司馬子如榮死子如自宮中突出至榮第棄家隨榮妻子走出城世隆即欲還北子如曰兵不厭詐今天下恟恟唯強是視恟許勇翻當此之際不可以弱示人若亟北走恐變生肘腋腋音亦不如分兵守河橋還軍向京師出其不意或可成功假使不得所欲亦足示有餘力使天下畏我之強不敢叛散世隆從之己亥攻河橋擒奚毅等殺之據北中城魏朝大懼遣前華陽太守段育慰諭之魏分漢中之沔陽西縣置華陽郡以其地在華山之南也朝直遙翻華戶化翻魏以雍州刺史爾朱天光為侍中儀同三司雍於用翻以司空楊津為都督幷肆等九州諸軍事驃騎大將軍幷州刺史兼尚書令北道行臺經略河汾驃匹妙翻騎奇計翻榮之入洛也以高敖曹自隨禁於駝牛署爾朱榮誘拘高敖曹事見一百五十二卷大通二年帝引見勞勉之見賢遍翻勞力到翻兄乾自東冀州馳赴洛陽魏孝昌末葛榮作亂高翼聚衆河濟間魏因置東冀州以翼為刺史蓋因劉宋先置冀州於河濟間而置東冀州以別河北之冀州也翼乾之族也按後以高翼為乾之父使疏吏翻敖曹為直閤將軍使歸招集鄉曲為表裏形援帝親送之於河橋敖曹兄弟歸鄉里路當東出河橋在洛城北帝不應送之於此河橋二字意必有誤卿兄弟冀部豪傑能令士卒致死京城儻有變可為朕河上一揚塵乾垂涕受詔敖曹援劍起舞誓以必死為于偽翻下亦為吾為為陛下同援于元翻冬十月癸卯朔世隆遣爾朱拂律歸考異曰魏書無拂律歸名伽藍記有之按爾朱度律時在世隆所或者拂律歸即度律也皆白服來至郭下索太原王尸榮迎立敬宗封太原王將即亮翻騎奇計翻索山客翻洛陽城北有大夏廣莫二門夏戶雅翻太原王立功不終陰圖釁逆釁許覲翻王法無親言法在必行雖親無赦也餘皆不問卿等若降官爵如故拂律歸曰臣等隨太原王入朝忽致冤酷今不忍空歸願得太原王尸生死無恨因涕泣哀不自勝勝音升㣥胡皆慟哭聲振城邑帝亦為之愴然遣侍中朱瑞齎鐵券賜世隆世隆謂瑞曰太原王功格天地赤心奉國長樂不顧信誓枉加屠害魏敬宗本封長樂王樂音洛何足可信行戶剛翻吾為太原王報讎終無降理瑞還白帝帝即出庫物置城西門外募敢死之士以討世隆一日即得萬人與拂律歸等戰於郭外拂律歸等生長戎旅長知兩翻洛陽之人不習戰鬬屢戰不克甲辰以前車騎大將軍李叔仁為大都督帥衆討世隆戊申皇子生大赦以中書令魏蘭根兼尚書左僕射為河北行臺定相殷三州皆稟蘭根節度相悉亮翻爾朱氏兵猶在城下帝集朝臣博議皆恇懼不知所出通直散騎常侍李苗奮衣起曰朝直遙翻恇去王翻散悉亶翻騎奇寄翻今小賊唐突如此朝廷有不測之憂正是忠臣烈士效節之日臣雖不武請以一旅之衆為陛下徑斷河橋杜預曰五百人為一旅斷丁管翻帝許之乙卯苗募人從馬渚上流乘船夜下去橋數里縱火船焚河橋倏忽而至爾朱氏兵在南岸者望之爭橋北渡俄而橋絕溺死者甚衆苗將百許人泊於小渚以待南援溺奴狄翻將即亮翻下同官軍不至爾朱氏就擊之左右皆盡苗赴水死帝傷惜之贈車騎大將軍儀同三司封河陽侯諡曰忠烈世隆亦收兵北遁丙辰詔行臺源子恭將步騎一萬出西道楊昱將募士八千出東道以討之募士即洛城西門外所募者也築壘以防之水經註丹水出上黨高都縣故城東北阜下東南流注于丹谷晉書地道記曰縣有太行關丹溪為關之東谷塗自此去不復由關矣行戶剛翻考異曰伽藍記云源子恭楊寬領步騎三萬鎮河內今從魏書慕容永分上黨置建興郡魏真君元年省和平五年復置郡永安中罷郡置建州治高都城領高都長平安平恭寧郡據五代志建州即唐澤州之地世隆攻拔之殺城中人無遺類以肆其忿唯希質走免詔以前東荊州刺史元顯恭為晉州刺史魏孝昌中置唐州建義元年改曰晉州治白馬城領平陽西河南絳北絳永安北五城定陽西平城三字衍敷城河西五城冀氏義寧郡是月魏東徐州刺史廣牧斛斯椿廣牧縣漢朔方東部都尉治所也魏省朔方以廣牧縣屬新興郡魏收志屬朔州附化郡考椿傳椿廣牧富昌人則又似廣牧自為一郡也斛斯虜複姓榮死椿懼聞汝南王悅在境上乃帥部衆棄州歸悅帥讀曰率下同悅授椿侍中大將軍司空封靈丘郡公又為大行臺前驅都督是月汾州刺史爾朱兆聞榮死自汾州帥騎據晉陽騎奇計翻世隆至長子考異曰魏帝紀云世隆停建興之高都今從世隆傳壬申共推太原太守行幷州事長廣王曄即皇帝位守式又翻大赦改元建明曄英之弟子也中山王英著功於太和正始之間進爵為王世隆為尚書令賜爵樂平王加太傅司州牧又以榮從弟度律為太尉賜爵常山王從才用翻世隆兄天柱長史彥伯為侍中徐州刺史仲遠為車騎大將軍兼尚書左僕射三徐州大行臺仲遠亦起兵向洛陽三徐州徐州治彭城北徐州治琅邪永安二年置領東泰山琅邪二郡東徐州治下邳此皆長廣王所除授爾朱天光之克平涼也宿勤明達請降宿勤明達與万俟醜奴皆胡琛將也降戶江翻北走天光遣賀拔岳討之明達奔東夏東夏唐之延州夏戶雅翻不復窮追復扶又翻還涇州以待天光天光與侯莫陳悅亦下隴與岳謀引兵向洛魏敬宗使朱瑞慰諭天光天光與岳謀欲令帝外奔而更立宗室更工衡翻乃頻啟云臣實無異心唯欲仰奉天顏以申宗門之罪又使其下僚屬啟云天光密有異圖願思勝算以防之天光設兩端以疑魏朝范陽太守盧文偉誘平州刺史侯淵出獵閉門拒之淵本領平州鎮范陽范陽即涿郡後漢章帝改焉誘音酉為榮舉哀為于偽翻勒兵南向進至中山行臺僕射魏蘭根邀擊之為淵所敗敗補賣翻敬宗以城陽王徽兼大司馬錄尚書事總統內外徽意謂榮既死枝葉自應散落及爾朱世隆等兵四起黨衆日盛徽憂怖不知所出怖普布翻性多嫉忌不欲人居己前每獨與帝謀議㣥臣有獻策者徽輒勸帝不納且曰小賊何慮不平又靳惜財貨賞賜率皆薄少靳居焮翻少詩沼翻或多而中減或與而復追故徒有糜費而恩不感物史言徽誤魏主復扶又翻十一月癸酉朔敬宗以車騎將軍鄭先護為大都督與行臺楊昱共討爾朱仲遠乙亥以司徒長孫稚為太尉臨淮王彧為司徒丙子進雍州刺史廣宗公爾朱天光爵為王自此以上至鄭先護官爵皆敬宗所授爾朱仲遠攻西兗州魏太和中置西兗州於滑臺孝昌中置西兗州於定陶下云仲遠與賀拔勝戰于滑臺東則是時猶以滑臺為西兗州也丁丑拔之擒刺史王衍衍肅之兄子也王肅去齊入魏而貴顯癸未敬宗以右衞將軍賀拔勝為東征都督壬辰又以鄭先護兼尚書左僕射為行臺與勝共討仲遠戊戌詔罷魏蘭根行臺以定州刺史薛曇尚兼尚書為北道行臺曇徒含翻鄭先護疑賀拔勝置之營外庚子勝與仲遠戰於滑臺東兵敗降於仲遠初爾朱榮嘗從容問左右曰從千容翻一日無我誰可主軍皆稱爾朱兆榮曰兆雖勇於戰鬬然所將不過三千騎多則亂矣堪代我者唯賀六渾耳因戒兆曰爾非其匹終當為其穿鼻譬之以牛牛鼻既穿則為人所制及兆引兵向洛遣使召歡歡遣長史孫騰詣兆辭以山蜀未平蜀人徙汾晉依山而居者謂之山蜀不可委去致有後憂定蜀之日當隔河為掎角之勢掎居蟻翻兆不悅曰還白高晉州吾得吉夢夢與吾先人登高丘丘旁之地耕之已熟獨餘馬藺本草蠡實馬藺子也出冀州圖經曰馬藺子生河東川谷葉似薤而長厚衍義曰馬藺葉牛馬皆不食為纔出土葉已硬也隨手而盡以此觀之往無不克騰還報歡曰兆狂愚如是而敢為悖逆吾勢不得久事爾朱矣為歡起兵討爾朱張本悖蒲內翻又蒲沒翻十二月壬寅朔爾朱兆攻丹谷都督崔伯鳳戰死都督史仵龍開壁請降仵宜古翻降戶江翻源子恭退走兆輕兵倍道兼行從河橋西涉渡考異曰伽藍記云從雷波涉渡今從魏書兆傳敬宗以大河深廣謂兆未能猝濟先昔薦翻是日水不沒馬腹甲辰暴風黃塵漲天兆騎叩宮門宿衞乃覺彎弓欲射騎奇計翻下同射而亦翻矢不得發一時散走華山王鷙斤之玄孫也斤亂代事見一百四卷晉孝武太元元年魏以此始亦以此終天邪人邪帝始聞兆南下欲自帥諸軍討之鷙說帝曰黃河萬仞兆安得渡帝遂自安及兆入宮鷙復約止衞兵不使鬬帥音率說式芮翻復扶又翻帝步出雲龍門外遇城陽王徽乘馬走帝屢呼之不顧而去徽預國大謀敗不即死去將安之鎖於永寧寺樓上帝寒甚就兆求頭巾頭巾所謂袹頭也兆營於尚書省用天子金鼓設刻漏於庭撲殺皇子皇子爾朱后所生也撲弼角翻汙烏故翻嬪毘賓翻縱兵大掠殺司空臨淮王彧尚書左僕射范陽王誨青州刺史李延寔等城陽王徽走至山南山南伊潁南山之南也考異曰魏書作寇彌按寇讚諸孫所字皆連祖字或者名彌字祖仁今從伽藍記皆徽所引拔以有舊恩故投之徽齎金百斤馬五十匹祖仁利其財外雖容納而私謂子弟曰如聞爾朱兆購募城陽王得之者封千戶侯今日富貴至矣乃怖徽云官捕將至令其逃於他所怖普布翻使人於路邀殺之送首於兆徽背敬宗而祖仁亦背徽惡殃之報何速哉蒼蒼之不可欺也如此兆夢徽謂己曰我有金二百斤馬百匹在祖仁家卿可取之兆既覺覺古孝翻意所夢為實即掩捕祖仁徵其金馬祖仁謂人密告望風款服云實得金百斤馬五十匹款誠實也獄囚招承之辭曰款言得其實也依夢徵之祖仁家舊有金三十斤馬三十匹盡以輸兆兆猶不信發怒執祖仁懸首高樹大石墜足捶之至死捶止橤翻爾朱世隆至洛陽自長子至洛陽也責世隆曰叔父在朝日久世隆榮從弟兆榮從子故呼世隆為叔父靈后臨朝之時世隆已在朝故曰日久朝直遙翻如何令天柱受禍按劍瞋目聲色甚厲瞋七人翻世隆遜辭拜謝然後得已由是深恨之為爾朱兄弟叔姪互相猜疑以致夷滅張本戊申魏長廣王大赦爾朱榮之死也敬宗詔河西賊帥紇豆陵步蕃使襲秀容步蕃居北河之西紇豆陵虜三字姓魏書官氏志次南諸姓有紇豆陵氏帥音所類翻紇音下沒翻步蕃南下兵勢甚盛故兆不暇久留亟還晉陽以禦之使爾朱世隆度律彥伯等留鎮洛陽甲寅兆遷敬宗於晉陽兆自於河梁監閱財資河梁即河橋監工咸翻帥騎東巡欲邀之不及因與兆書為陳禍福不宜害天子受惡名兆怒不納爾朱天光輕騎入洛見世隆等即還雍州帥讀曰率騎奇計翻為于偽翻雍於用翻初敬宗恐北軍不利北軍謂源子恭鎮丹谷之軍也託云征蠻以高道穆為南道大行臺未及發而兆入洛道穆託疾去世隆殺之主者請追李苗封贈世隆曰當時衆議更一二日即欲縱兵大掠焚燒郭邑賴苗之故京師獲全天下之善一也不宜復追復扶又翻爾朱榮之死也世隆等徵兵於大寧太守代人房謨魏收志魏孝昌中置泰寧郡屬建州其地當在唐澤州沁水縣界大當作泰前後斬其三使使疏吏翻遣弟毓詣洛陽及兆得志其黨建州刺史是蘭安定是蘭姓也安定其名郡中蜀人聞之皆叛此謂蜀人之居泰寧者亦汾蜀絳蜀之類也令軍前慰勞勞力到翻諸賊見謨莫不遙拜謨先所乘馬安定別給將士將即亮翻戰敗蜀人得之謂謨遇害莫不悲泣善養其馬不聽人乘之兒童婦女競投草粟皆言此房公馬也爾朱世隆聞之捨其罪以為其府長史北道大行臺楊津以衆少留鄴召募欲自滏口入幷州會爾朱兆入洛津乃散衆輕騎還朝少詩沼翻滏音釜騎奇計翻朝直遙翻爾朱世隆與兄弟密謀慮長廣王母衞氏干預朝政伺其出行遣數十騎如劫盜者於京巷殺之直曰街曲曰巷京巷洛京之曲巷也朝直遙翻伺相吏翻甲子爾朱兆縊敬宗於晉陽三級佛寺年二十四廢帝諡帝曰武懷皇帝及孝武帝立以廟諱改諡曰孝莊皇帝廟號敬宗縊於賜翻又於計翻是月紇豆陵步蕃大破爾朱兆於秀容南逼晉陽兆懼使人召高歡幷力考異曰北齊慕容紹宗傳兆召高祖紹宗諫曰今天下擾攘人懷覬覦正是智士用策之秋高晉州才雄氣猛英略蓋世譬如蛟龍安可借以雲雨兆怒曰我與晉州推誠相待何得輒相間阻囚紹宗數日乃釋之北史紹宗語在神武請帥降戶就食山東下按兆始召歡以自救非猜嫌之時今從北史歡曰兆方急保無他慮遂行歡所親賀拔焉過兒請緩行以弊之歡往往逗留辭以河無橋不得渡此河蓋汾河也兆屢敗告急於歡歡乃往從之兆時避步蕃南出步蕃至平樂郡平樂郡據爾朱兆傳當作樂平郡後漢獻帝分太原置樂平郡治沾城唐遼州即其地大破之斬步蕃於石鼓山魏收志秀容郡秀容縣有石鼓山兆德歡相與誓為兄弟將數十騎詣歡通夜宴飲初葛榮部衆流入幷肆者二十餘萬為契胡凌暴契胡爾朱之種人也契欺訖翻大小二十六反誅夷者半猶謀亂不止兆患之問計於歡歡曰六鎮反殘不可盡殺自破六韓拔陵杜洛周之敗其衆盡歸葛榮皆六鎮人也有犯者罪其帥帥所類翻則所罪者寡矣兆曰善誰可使者賀拔允時在坐坐徂臥翻請使歡領之歡拳毆其口折一齒曰平生天柱時奴輩伏處分如鷹犬毆烏口翻歡自謂也詭為遜辭使兆不疑己折而設翻處昌呂翻分扶問翻下同今日天下事取捨在王而阿鞠泥敢僭易妄言請殺之賀拔允字阿鞠泥易以豉翻遂以其衆委焉歡以兆醉恐醒而悔之遂出宣言受委統州鎮兵魏改六鎮為州葛榮部衆皆六鎮人故曰州鎮兵乃建牙陽曲川水經註汾水自汾陽縣南流逕陽曲城西陽曲在秀容之南地形志陽曲縣二漢屬太原郡後魏永安中置永安郡陽曲縣屬焉宋白曰唐忻州秀容定襄二縣皆漢陽曲縣地河千里一曲縣當其陽故曰陽曲後漢末移陽曲縣於幷州太原縣界於舊陽曲縣置定襄縣又分置九原縣屬新興郡後魏以九原縣為平冠縣隋為秀容縣軍士素惡兆而樂屬歡分扶問翻惡烏故翻樂音洛莫不皆至居無何居無何言在事未多時也無何猶言無幾何時以幷肆頻歲霜旱降戶掘田鼠而食之降戶江翻面無穀色徒汙人境內幷肆之地兆統內也汙烏故翻幷肆冀定瀛相殷以大行常山為限幷肆在山西餘州皆在山東歡欲引衆就食山東正欲遠兆得以從容收衆心因之以起兵也兆從其議長史慕容紹宗諫曰不可方今四方紛擾人懷異望高公雄才蓋世復使握大兵於外復扶又翻譬如借蛟龍以雲雨將不可制矣兆曰有香火重誓何慮邪重誓謂與歡誓為兄弟親兄弟尚不可信何論香火時爾朱兆與其㣥從已搆嫌隙故紹宗以此言諷之因稱紹宗與歡有舊隙兆怒囚紹宗趣歡發趣讀曰促歡自晉陽出滏口道逢北鄉長公主自洛陽來有馬三百匹盡奪而易之兆聞之乃釋紹宗而問之紹宗曰此猶是掌握中物也兆乃自追歡至襄垣襄垣縣漢屬上黨郡後魏屬鄉郡至敬宗建義元年分置襄垣郡橋壞水經漳水自屯留縣東北流逕襄垣縣故城南所以借公主馬非有他故備山東盜耳王信公主之讒自來賜追歡稱兆為王因長廣王所封也恐此衆便叛兆自陳無此意因輕馬渡水與歡坐幕下章甲十一行本下下有陳謝二字乙十一行本同孔本同張校同退齋校同授歡刀引頸使歡斫之古之豪雄推赤心置人腹中者必其威望有以服其心智力足以制其命然後行之以安反側然亦未至如爾朱兆之輕率也自天柱之薨賀六渾更何所仰但願大家千萬歲以申力用耳今為旁人所搆間大家何忍復出此言歡之此言亦謬為恭敬耳歡以主事兆故稱為大家間古莧翻復音扶又翻下同復斬白馬與歡為誓因留宿夜飲尉景伏壯士欲執兆尉紆勿翻歡齧臂止之曰今殺之其黨必奔歸聚結兵飢馬瘦不可與敵若英雄乘之而起則為害滋甚不如且置之兆雖驍勇凶悍無謀不足圖也不足圖者謂其易圖也史言舉大事者必審而後發驍堅堯翻悍侯旰翻兆歸營復召歡歡將上馬詣之上時掌翻孫騰牽歡衣歡乃止兆隔水肆罵馳還晉陽當是時爾朱兆已知高歡之不可制而無如之何歡偽與之善觀其佩刀因取殺之按通鑑念賢後仕於西魏貴顯此豈別有一念賢邪又按李百藥北齊書歡取賢佩刀以殺其從者從者盡散則謂所殺者賢之從者非殺賢也姓譜有念姓益願附從是月齊州城民趙洛周聞爾朱兆入洛逐刺史丹楊王蕭贊以城歸兆贊變形為沙門逃入長白山五代志齊州章丘縣舊曰高唐有長白山杜佑曰長白山在淄州長山縣卒於陽平陽平縣漢屬東郡魏晉以來分屬陽平郡隋唐魏州之莘縣即其地卒子恤翻上猶以子禮葬於陵次豫章王綜奔魏改名贊事見一百五十卷普通六年贊不以帝為父而帝猶以贊為子可謂愛其所不當愛矣柩音舊是月魏荊州刺史李琰之韶之族弟也南陽太守趙修延以琰之敬宗外族敬宗母彭城王勰李氏也故云然發兵襲州城執琰之自行州事是月魏王悅改元更興更工行翻聞爾朱兆已入洛自知不及事遂南還斛斯椿復棄悅奔魏為斛斯椿誅爾朱世隆兄弟搆間高歡以分魏為東西張本復扶又翻是月是歲詔以陳慶之為都督南北司等四州諸軍事南北司二州刺史梁置南司州於安陸北司州於義陽破魏潁州刺史婁起等於溱水魏孝昌四年置潁州於汝陰領汝陰潁弋東恆農新興等郡水經註湊水出汝南平輿縣浮石嶺東北青衣山東南逕朗陵縣故城西東北逕北宜春縣故城北又東北入于汝溱緇詵翻宋白曰蔡州城南有溱水又破行臺孫騰等於楚城梁置西楚州於楚城在汝南郡城陽縣界其地當在唐申州界按孫騰此時猶從高歡在幷冀殷相之間慶之破騰必非此年事史究言之耳停水陸漕運江湖諸州並得休息謂瀕江及洞庭彭蠡間諸州也二年之後倉廩充實張政烺標點王崇武聶崇岐覆校
