body:
  text: 資治通鑑卷第二百八十一端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千六百戶食實封一千戶臣司馬光奉敕編集後學天台音註後晉紀二高祖聖文章武明德孝皇帝上之下春天福二年丁酉九三七春春正月乙卯日有食之考異曰實錄正月甲寅朔乙卯日食十國紀年蜀乙卯朔日食蓋晉人避三朝日食而改曆耳春詔以前北面招收指揮使安重榮此以在晉陽圍城中所授安重榮軍職言也故曰前重直龍翻時祕瓊自為成德留後以安重榮代之祕姓也漢魏之間有南安祕宜重榮與契丹將趙思溫偕如鎮州瓊不敢拒命畏契丹也丙辰重榮奏已視事為安重榮以成德反張本邢州人也春契丹以幽州為南京歐史曰以幽州為燕京參考趙思溫為留守事則南京為是春李崧呂琦逃匿於伊闕民間帝以始鎮河東崧有力焉德之李崧議以帝鎮河東事見二百七十八卷唐明宗長興三年李崧呂琦建和契丹以制河東之議見上卷上年三月乙丑以琦為祕書監丙寅以崧為兵部侍郎判戶部春初天雄節度使兼中書令范延光微時有術士張生語之云語牛倨翻必為將相延光既貴信重之延光嘗夢蛇自臍入腹以問張生張生曰蛇者龍也帝王之兆延光由是有非望之志唐潞王素與延光善及趙德鈞敗延光自遼州引兵還魏州趙德鈞敗見上卷上年閏十一月范延光屯遼州見上年十月其還魏州亦必在閏十一月降戶江翻內不自安以書潛結祕瓊欲與之為亂瓊受其書不報延光恨之瓊將之齊過魏境延光欲滅口且利其貨遣兵邀之於夏津殺之為范延光以魏反復以貨為楊光遠所殺張本夏津古鄃縣唐天寶元年更名夏津屬貝州宋以夏津屬北京在京東北二百五十里夏戶雅翻丁卯延光奏稱夏津捕盜兵誤殺瓊帝不問春戊寅以李崧為中書侍郎同平章事充樞密使桑維翰兼樞密使時晉新得天下藩鎮多未服從或雖服從反仄不安兵火之餘府庫殫竭民間困窮而契丹徵求無厭厭於鹽翻維翰勸帝推誠棄怨以撫藩鎮卑辭厚禮以奉契丹訓卒繕兵以脩武備務農桑以實倉廩通商賈以豐貨財數年之間中國稍安史言桑維翰有益於石晉草創之初者如此賈音古春吳太子璉納齊王知誥女為璉力展翻知誥始建太廟社稷改金陵為江寧府先是吳以昇州為金陵府今復更名廳堂曰殿以左右司馬宋齊丘徐玠為左右丞相馬步判官周宗內樞判官黟人周廷玉為內樞使黟漢縣唐屬歙州九域志在州西一百五十三里黟顏師古音伊劉昫音硻朝直遙翻置騎兵八軍步兵九軍春二月吳主以盧文進為宣武節度使宣武軍汴州時屬晉吳以盧文進遙領耳春戊子吳主使宜陽王璪如西都吳以金陵為西都見上卷上年璪子皓翻王受冊赦境內冊王曰王后春吳越王元瓘之弟順化節度使同平章事元珦獲罪於元瓘廢為庶人錢元珦得罪之始見二百七十八卷唐明宗長興四年珦音向春契丹主自上黨過雲州大同節度使沙彥珣出迎契丹主留之不使還鎮節度判官吳巒在城中謂其衆曰吾屬禮義之俗安可臣於夷狄乎衆推巒領州事閉城不受契丹之命契丹攻之不克應州馬軍都指揮使金城郭崇威亦恥臣契丹挺身南歸漢之金城唐蘭州五泉縣是也唐之金城漢為枝陽縣地涼置廣武郡隋廢郡為廣武縣唐乾元二年更曰金城屬蘭州按此非蘭州之金城乃應州之金城縣也唐明宗生於代北之金鳳城及即位以其地置金城縣仍置應州治焉郭崇威蓋以土人為本鎮都將又匈奴須知云應州東至幽州八百五十里金城縣東北至朔州八百里如須知所云應州與金城縣似為兩處南北風馬牛不相及未能審其是又當從涉其地者問之挺拔也契丹主過新州命威塞節度使翟璋斂犒軍錢十萬緡初契丹主阿保機強盛室韋奚霫皆役屬焉翟直格翻又徒歷翻姓也犒苦到翻霫似入翻奚王去諸苦契丹貪虐帥其衆西徙媯州帥讀曰率依劉仁恭父子號西奚東奚居琵琶川西奚徙媯州依北山而居子掃剌立剌來達翻下拽剌同唐莊宗滅劉守光賜掃剌姓李名紹威紹威娶契丹逐不魯之姊逐不魯獲罪於契丹奔紹威紹威納之契丹怒攻之不克紹威卒子拽剌立拽戶結翻及契丹主德光自上黨北還還從宣翻又如字拽剌迎降降戶江翻時逐不魯亦卒契丹主曰汝誠無罪掃剌逐不魯負我皆命發其骨磑而颺之磑五對翻䃺也今人謂之磨颺余章翻諸奚畏契丹之虐多逃叛契丹主勞翟璋曰當為汝除代令汝南歸勞力到翻為于偽翻己亥璋表乞徵詣闕既而契丹遣璋將兵討叛奚攻雲州有功留不遣璋璋鬱鬱而卒張礪自契丹逃歸為追騎所獲契丹主責之曰何故捨我去對曰臣華人飲食衣服皆不與此同生不如死願早就戮契丹主顧通事高彥英曰吾常戒汝善遇此人契丹置通事以主中國人以知華俗通華言者為之宋白曰契丹主腹心能華言者目曰通事謂其洞達庶務若失之安可復得邪復扶又翻笞彥英而謝礪礪事契丹主甚忠直遇事輒言無所隱避契丹主甚重之史言契丹主知重儒者春初吳越王鏐少子元王朮少詩照翻王朮思聿翻考異曰晉高祖實錄十國紀年作元球今從吳越備史九國志數有軍功數所角翻鏐賜之兵仗及吳越王元瓘立元王朮為土客馬步軍都指揮使章十二行本使下有靜江節度使五字乙十一行本同孔本同張校同兼中書令恃恩驕橫橫戶孟翻增置兵仗至數千國人多附之元瓘忌之使人諷元王朮請輸兵仗出判溫州元王朮不從銅官廟吏告元王朮遣親信禱神求主吳越江山又為蠟丸從水竇出入與兄元珦謀議蠟丸者蠟彈書也作書以蠟丸其外戊午元瓘遣使者召元王朮宴宮中既至左右稱元王朮有刃墜於懷袖即格殺之幷殺元珦元珦被幽見二百七十八卷唐明宗長興四年其子仁俊諫曰昔光武克王郎曹公破袁紹皆焚其書疏以安反側光武事見三十九卷漢更始二年曹公事見六十四卷獻帝建安五年元瓘從之春或得唐潞王膂及髀骨獻之庚申詔以王禮葬於徽陵南唐閔帝之葬從徽陵封纔數尺見者悲之潞王葬於徽陵南見者莫之悲也豈非人心之公是非邪春帝遣使詣蜀告即位且敍姻好蜀主孟知祥與帝皆後唐之主壻蜀主娶晉王克用姪女帝娶明宗女與蜀後主兄弟行也故敍姻好好呼到翻用敵國禮春范延光聚卒繕兵悉召巡內刺史集魏州天雄軍巡內有貝博衞澶相五州刺史會帝謀徙都大梁桑維翰曰大梁北控燕趙南通江淮水陸都會資用富饒今延光反形已露大梁距魏不過十驛唐制三十里一驛十驛三百里大軍尋至所謂疾雷不及掩耳也丙寅下詔託以洛陽漕運有闕東巡汴州春吳徐知誥立子景通為王太子固辭不受追尊考忠武王溫曰太祖武王妣明德太李氏曰王太后壬申更名誥更工衡翻徐知誥去名上知字單名誥示不與徐氏兄弟同也春庚辰帝發洛陽留前朔方節度使張從賓為東都巡檢使春漢主以疾愈大赦春交州將皎公羨殺安南節度使楊廷藝而代之長興二年楊廷藝得交州見唐明宗紀皎姓也春夏四月丙戌帝至汴州丁亥大赦春吳越王元瓘復建國如同光故事元瓘之初立罷建國事見二百七十八卷唐明宗長興三年丙申赦境內立其子弘僔為世子僔子損翻以曹仲達沈崧皮光業為丞相鎮海節度判官林鼎掌教令春丁酉加宣武節度使楊光遠兼侍中春閩主作紫微宮飾以水晶土木之盛倍於寶皇宮唐明宗長興二年閩主璘作寶皇宮伺人隱慝慝吐得翻春五月吳徐誥用宋齊丘策欲結契丹以取中國遣使以美女珍玩泛海脩好好呼到翻契丹主亦遣使報之春丙辰敕權署汴州牙城曰大寧宮時御史臺奏汴州在梁有京都之號及唐莊宗廢為宣武軍至明宗行幸時掌事者脩葺衙城遂掛梁時宮殿門牌額當時識者或竊非之一昨車駕省方暫居梁苑衙城內齋閤牌額一如明宗行幸之時無都號而有殿名恐非典據竊尋秦漢以來鑾輿所至多立宮名隋於揚州立江都宮太原立汾陽宮岐州立仁壽宮唐於太原立晉陽宮同州立長春宮岐州立九成宮宮中殿閤皆題署牌額以準皇居請依故事於汴州衙城門權掛一宮門牌額則其餘齋閤並可取便為名敕行闕宜以大寧宮為名春壬申進范延光爵臨清郡王以安其意春追尊四代考妣為帝后按五代會要高祖璟諡靖祖孝安皇帝妣秦氏諡元皇后曾祖郴諡肅祖孝簡皇帝妣安氏諡恭皇后祖昱諡睿祖孝平皇帝妣米氏諡獻皇后考紹雍諡獻祖孝元皇帝妣何氏諡懿皇后若以前史謂皇考名臬捩雞推之則四世之名意皆有司所撰者也己卯詔太社所藏唐室罪人首聽親舊收葬初武衞上將軍婁繼英嘗事梁均王為內諸司使至是請其首而葬之唐藏梁均王首於太社見二百七十二卷莊宗同光元年史為婁繼英請而不克葬張本春六月吳諸道副都統徐景遷卒春范延光素以軍府之政委元隨左都押牙孫銳銳恃恩專橫橫戶孟翻符奏有不如意者對延光手裂之會延光病經旬銳密召澶州刺史馮暉與之合謀逼延光反澶時連翻延光亦思張生之言張生之言見上正月甲午六宅使張言奉使魏州還言延光反狀義成節度使符彥饒奏延光遣兵渡河焚草市時天下兵爭凡民居在城外率居草屋以成市里以其價廉功省猝遇兵火不至甚傷財以害其生也此草市在滑州城外白馬津在滑州白馬縣雲州人也丁酉以東都巡檢使張從賓為魏府西南面都部署戊戌遣侍衞都軍使楊光遠侍衞都軍使即侍衞諸軍都指揮使己亥遣護聖都指揮使杜重威將兵屯衞州五代會要曰天福六年改成德兩軍為護聖左右軍據此則此時已有護聖軍矣朔州人也尚帝妹樂平長公主長知兩翻范延光以馮暉為都部署孫銳為兵馬都監將步騎二萬循河西抵黎陽口黎陽在魏州西南故循河西上而後至辛丑楊光遠奏引兵踰胡梁渡此即史思明所濟胡良渡也在滑州北岸澶州界薛史天福六年詔以胡梁渡月城為大通軍浮橋為大通橋春以翰林學士禮部侍郎和凝為端明殿學士凝署其門不通賓客前耀州團練推官襄邑張誼襄邑縣屬宋州九域志在大梁東南一百七十里以為切近之職為天子耳目宜知四方利病柰何拒絕賓客雖安身為便如負國何凝奇之薦於桑維翰未幾除左拾遺幾居豈翻誼上言北狄有援立之功宜外敦信好好呼到翻內謹邊備不可自逸以啟戎心帝深然之春契丹攻雲州半歲不能下吳巒遣使間道奉表求救帝為之致書契丹主請之間古莧翻陘北諸州皆歸契丹故間道南來為于偽翻契丹主乃命翟璋解圍去帝召巒歸以為武寧節度副使春丁未以侍衞使楊光遠為魏府四面都部署侍衞使即侍衞都軍使史從省文也昭義節度使高行周將本軍屯相州為魏府西面都部署相州在魏州之西使高行周自潞州將兵屯相州以臨范延光軍士郭威舊隸劉知遠當從楊光遠北征自大梁而征魏州為北征薛史周紀郭威初事李繼韜繼韜誅配從馬直晉祖領副侍衞召置麾下因而得事漢祖人問其故威曰楊公有姦詐之才無英雄之氣得我何用能用我者其劉公乎為郭威為劉知遠佐命張本春詔張從賓發河南兵數千人擊范延光河南兵河南府兵也張從賓時為洛陽巡檢使故使發之誘音酉從賓遂與之同反殺皇子河陽節度使重信重直龍翻下重乂同使上將軍張繼祚知河陽留後繼祚全義之子也張全義自唐末尹河南歷唐梁殺皇子權東都留守重乂以東都副留守都巡檢使張延播知河南府事從軍章十二行本軍作賓乙十一行本同孔本同張從賓雖以張延播知河南府事不使之在府治事而使之從軍取內庫錢帛以賞部兵留守判官李遐不與兵衆殺之從賓引兵扼汜水關汜水關以縣名關即虎牢關也詳見辯誤詔奉國都指揮使侯益帥禁兵五千會杜重威討張從賓帥讀曰率又詔宣徽使劉處讓自黎陽分兵討之時羽檄縱橫從官在大梁者無不恟懼羽檄縱橫言軍書紛委也從官家屬皆留東都而從駕在汴根本已拔故恟懼也縱子容翻從才用翻恟許拱翻從千容翻神色自若接對賓客不改常度衆心差安史言桑維翰能以整暇鎮物春方士言於閩主云有白龍夜見螺峯見賢遍翻螺盧戈翻閩主作白龍寺時百役繁興用度不足閩主謂吏部侍郎判三司候官蔡守蒙曰後漢置東候官縣隋廢入閩縣唐復置候官縣屬福州九域志治州郭下聞有司除官皆受賂有諸對曰浮議無足信也閩主曰朕知之久矣今以委卿擇賢而授不肖及罔冒者勿拒罔冒謂欺罔偽冒而求官者以事理之所無而欺上謂之罔假他人之所有以飾偽謂之冒籍而獻之守蒙素廉以為不可閩主怒守蒙懼而從之自是除官但以貨多少為差為蔡守蒙以賣官受誅張本堂牒即今人所謂省劄空名者未書所授人名既賣之得錢而後書填空苦貢翻無有盈厭斂力贍翻厭於鹽翻又如字又詔民有隱年者杖背隱口者死逃亡者族果菜雞豚皆重征之春秋七月張從賓攻汜水殺巡檢使宋廷浩帝戎服嚴輕騎將奔晉陽以避之桑維翰叩頭苦諫曰賊鋒雖盛勢不能久請少待之不可輕動帝乃止史言桑維翰有膽略晉朝倚以為社稷之固少詩沼翻春范延光遣使以蠟丸招誘失職者右武衞上將軍婁繼英右衞大將軍尹暉在大梁溫韜之子延濬延沼延袞居許州皆應之尹暉舉軍降潞王以得節鎮今居環衞則為散官溫韜自唐明宗時受誅其諸子廢棄而婁繼英子婦溫延沼女也繼英亦居宀儿散故皆應延光聚徒已及千人繼英暉事泄皆出走壬子敕以延光姦謀誣汙忠良自今獲延光諜人賞獲者殺諜人汙烏故翻諜達協翻禁章十二行本禁作焚張校同蠟書勿以聞不欲知所招誘主名所以安反側也為人所殺繼英奔許州依溫氏忠武節度使萇從簡盛為之備延濬等不得發欲殺繼英以自明延沼止之遂同奔張從賓繼英知其謀勸從賓執三溫皆斬之春白奉進在滑州是年六月遣白奉進屯白馬白馬滑州治所也捕之獲五人其三隸奉進其二隸符彥饒奉進皆斬之彥饒以其不先白己甚怒明日奉進從數騎詣彥饒謝彥饒曰軍中各有部分分扶問翻柰何取滑州軍士幷斬之殊無客主之義乎符彥饒自以鎮滑州為主白奉進屯滑州為客軍士犯法何有彼我僕已引咎謝公而公怒不解豈非欲與延光同反邪拂衣而起彥饒不留帳下甲士大譟擒奉進殺之從騎走出大呼於外諸軍爭擐甲操兵諠譟不可禁止從才用翻呼火故翻擐音宦操七刀翻奉國左廂都指揮使馬萬惶惑不知所為帥步兵欲從亂遇右廂都指揮使盧順密帥部兵出營帥讀曰率厲聲謂萬曰符公亶殺白公必與魏城通謀此去行宮纔二百里魏城謂魏州城也時范延光據魏州反九域志滑州南至大梁二百里時帝在大梁汝何不思報國乃欲助亂自求族滅乎今日當共擒符公送天子立大功軍士從命者賞違命者誅勿復疑也復扶又翻萬所部兵尚有呼躍者呼火故翻順密殺數人衆莫敢動萬不得已從之與奉國都虞候方太等共攻牙城執彥饒令太部送大梁甲寅敕斬彥饒於班荊館左傳楚伍舉與聲子相善伍舉出奔聲子遇於鄭郊班荊相與食而言杜預註曰班布也布荊坐地共議以班荊名館取諸此也此館必在汴州郊外按符存審諸子皆有材氣而彥卿又為一時名將彥饒不能馭下倉猝成亂兄弟初不通謀罪不相及古法也楊光遠自白皋引兵趣滑州趣七喻翻士卒聞滑州亂欲推光遠為主光遠曰天子豈汝輩販弄之物晉陽之降出於窮迫謂在晉安寨殺張敬達而降也事見上卷上年降戶江翻真反賊也其下乃不敢言時魏孟滑三鎮繼叛魏范延光孟張從賓滑符彥饒帝問計於劉知遠對曰帝者之興自有天命陛下昔在晉陽糧不支五日俄成大業今天下已定內有勁兵北結強虜強虜謂契丹願陛下撫將相以恩臣請戢士卒以威戢則立翻恩威兼著京邑自安本根深固則枝葉不傷矣知遠乃嚴設科禁科條也有軍士盜紙錢一幞幞逢玉翻釋云帊也主者擒之主者紙錢之主也知遠曰吾誅其情不計其直竟殺之唐法治盜計贓定罪劉知遠嚴刑以威衆欲鎮服其心以折亂萌非可常行於平世也乙卯以楊光遠為魏府行營都招討使兼知行府事以昭義節度使高行周為河南尹東京留守京當作都以侯益為河陽節度使侯益與杜重威同討張從賓就命鎮河陽擢萬為義成節度使就以滑帥賞馬萬晉漢之間有白再榮因亂而帥成德馬萬之類也丙辰以盧順密為果州團練使果州時屬蜀命盧順密遙領團練使既而知皆順密之功也更以順密為昭義留後更工衡翻時杜重威領昭義節以討張從賓故以盧順密為留後馮暉孫銳引兵至六明鎮六明鎮在胡梁渡北半渡而擊之暉銳衆大敗多溺死斬首三千級暉銳走還魏杜重威侯益引兵至汜水遇張從賓衆萬餘人與戰俘斬殆盡遂克汜水從賓走乘馬渡河溺死溺奴狄翻獲其黨張延播繼祚婁繼英送大梁斬之滅其族符彥饒張從賓等皆死馮暉孫銳又敗范延光之勢孤且衂矣張全義有再造洛邑之功事見二百五十七卷唐僖宗光啟三年乃止誅繼祚妻子濤回之族曾孫也李回唐武宗會昌中為相春詔東都留守司百官悉赴行在張從賓既平然後洛都留司百官得赴行在自是遂定都大梁春楊光遠奏知博州張暉舉城降博州范延光巡屬也春安州威和指揮使王暉五代會要唐有威和拱宸內直軍晉天福六年改為興順左右軍殺安遠節度使周王褱王褱古回翻自領軍府欲俟延光勝則附之敗則渡江奔吳帝遣右領軍上將軍李金全將千騎如安州巡檢許赦王暉為唐州刺史春范延光知事不濟歸罪於孫銳而族之孫銳勸范延光反見上六年戊寅楊光遠以聞帝不許春吳同平章事王令謀如金陵勸徐誥受禪誥讓不受春山南東道節度使安從進恐王暉奔吳遣行軍司馬張朏將兵會復州兵於要路邀之朏敷尾翻邀其自復州而奔吳鄂州之路也暉大掠安州將奔吳部將胡進殺之八月癸巳以狀聞李金全至安州將士之預於亂者數百人金全說諭悉遣詣闕說式芮翻既而聞指揮使武彥和等數十人挾賄甚多伏兵于野執而斬之彥和且死呼曰呼火故翻王暉首惡天子猶赦之我輩脅從何罪乎帝雖知金全之情掩而不問春吳歷陽公濛知吳將亡甲子章十二行本子作午乙十一行本同張校同殺守衞軍使王宏宏子勒兵攻濛濛射殺之濛被囚見二百七十九卷唐潞王清泰元年射而亦翻引二騎詣廬州欲依之九域志和州西至廬州五百三十里將見之其子弘祚固諫本怒曰我家郎君來何為不使我見弘祚合扉不聽本出門闢則兩扉開門闔則兩扉合送江都徐誥遣使稱詔殺濛于采石迎而殺之不使得至江都絕屬籍絕楊氏屬籍悖蒲內翻又蒲沒翻誥歸罪於悰貶池州悰徂宗翻春乙巳赦張從賓符彥饒王暉之黨未伏誅者皆不問梁唐以來士民奉使及俘掠在契丹者悉遣使贖還其家春吳司徒門下侍郎同平章事內樞使忠武節度使王令謀忠武軍許州時屬晉吳以王令謀遙領節鎮耳或勸之致仕令謀曰齊王大事未畢吾何敢自安疾亟亟紀力翻力勸徐誥受禪是月吳主下詔禪位于齊李德誠復詣金陵帥百官勸進宋齊丘不署表宋齊丘以受禪之議不自己發而為周宗等所先遂堅持異議欲以為名復扶又翻帥讀曰率癸丑令謀卒王令謀所見誠不可與王琨同日語也春甲寅以李金全為安遠節度使為李金全外叛張本春婁繼英未及葬梁均王而誅死婁繼英求葬梁均王見上五月春丙寅吳主命江夏王璘奉璽綬于齊楊行密據有江淮傳渥隆演至溥而亡璘離珍翻璽斯氏翻綬音受十月甲申齊王誥即皇帝位于金陵大赦改元昇元國號唐徐誥自以本李氏之子既舉大號欲纂唐緒故改國號為唐為復李姓張本猶不敢忘徐溫而追尊之其後立李氏宗廟遂以徐溫為義祖乙酉遣右丞相玠玠徐玠也稱受禪老臣誥謹拜稽首上皇帝尊號曰高尚思玄弘古讓皇宮室乘輿服御皆如故宗廟正朔徽章服色悉從吳制乘繩證翻丁亥立徐知證為江王徐知諤為饒王知證知諤皆徐溫之子於誥為弟封弘農公唐主宴㣥臣於天泉閣天泉閣蓋因晉宋時之天泉池故地起閣因以為名陛下應天順人惟宋齊丘不樂樂音洛因出齊丘止德誠勸進書考異曰十國紀年云遺宗信書令宗信諷止德誠勸進而不云宗信何人今但云止德誠勸進書曰子嵩三十年舊交必不相負齊丘頓首謝子嵩宋齊丘字也通鑑梁太祖乾化二年書齊丘謁知誥署昇州推官至是年二十六年今曰三十年舊交蓋乾化二年署推官而謁知誥又在乾化二年之前也己丑唐主表讓皇改東都宮殿名皆取於仙經唐都金陵以江都為東都習辟穀術辛卯吳宗室建安王珙等十二人皆降爵為公而加官增邑降王為公所以示易姓加官增邑所以慰其心珙居勇翻丙申以吳同平章事張延翰及門下侍郎張居詠中書侍郎李建勳並同平章事讓皇以唐主上表致書辭之唐主表謝而不改丁酉加宋齊丘大司徒齊丘雖為左丞相不預政事心慍懟慍於運翻懟直類翻聞制詞云布衣之交抗聲曰臣為布衣時陛下為刺史唐主為昇州刺史見二百六十六卷梁太祖乾化二年可以不用老臣矣還家請罪唐主手詔謝之亦不改命久之齊丘不知所出乃更上書請遷讓皇於他州及斥遠吳太子璉絕其婚唐主不從遠于願翻宋齊丘之心迹至是畢露吾觀唐主之心豈特疏之而已蓋惡而欲遠之不能也乙巳立王后宋氏為皇后戊申以諸道都統判元帥府事景通為諸道副元帥判六軍諸衞事太尉尚書令吳王春閩主命其弟威武節度使繼恭上表告嗣位于晉且請置邸于都下閩與中國絕見二百七十七卷唐明宗長興三年春十一月乙卯唐吳王景通更名璟更工衡翻璟俱永翻唐主賜楊璉號永興公主聞人呼公主則流涕而辭漢之孝平后周之天元后與夫吳楊璉之蓋異世而同轍也宋白曰永興縣本漢鄂縣地陳置永興縣唐屬鄂州戊午唐主立其子景遂為吉王景達為壽陽公以景遂為侍中東都留守江都尹帥留司百官赴東都南唐倣盛唐兩都之制建東西都置留臺百司於江都帥讀曰率春戊辰詔加吳越王元瓘天下兵馬副元帥進封吳越國王考異曰實錄天福二年十一月加元瓘副元帥國王程遜等為加恩使四年十月丙午以程遜沒于海廢朝贈官程遜傳云天福三年秋使吳越使回溺死元瓘傳云天福三年封吳越國王蓋二年冬制下遜等以三年至杭州不知溺死在何年而晉朝以四年十月始聞之也吳越備史天福二年四月敕遣程遜等授王副元帥國王甲午王即位用建國之儀如同光故事是歲程遜還京溺于海按元瓘初立稱鏐遺命止用藩鎮禮明年明宗封吳王應順初閔帝封吳越王故以天福三年即王位而備史以為授元帥國王然後即位誤矣春安遠節度使李金全以親吏胡漢筠為中門使軍府事一以委之漢筠貪猾殘忍聚斂無厭斂力贍翻厭於鹽翻帝聞之以廉吏賈仁沼代之考異曰薛史仁沼作仁紹今從實錄欲授以他職庶保全功臣漢筠大懼始勸金全以異謀乙亥金全表漢筠病未任行任音壬金全故人龐令圖屢諫曰仁沼忠義之士以代漢筠所益多矣漢筠夜遣壯士踰垣滅令圖之族又毒仁沼舌爛而卒漢筠與推官張緯相結以諂惑金全金全愛之彌篤李金全叛奔南唐之計自是定矣十二月戊申蜀大赦改明年元曰明德春詔加馬希範江南諸道都統制置武平靜江等軍事春是歲契丹改元會同國號大遼公卿庶官皆倣中國參用中國人以趙延壽為樞密使尋兼政事令為遼人用趙延壽以圖晉張本三年戊戌九三八帝春正月己酉日有食之帝唐德勝節度使兼中書令西平恭烈王周本以不能存吳愧恨而卒周本雖不能存吳然其過李德誠遠矣帝丙寅唐以侍中吉王景遂參判尚書都省帝蜀主以武信節度使同平章事張業為左僕射兼中書侍郎同平章事樞密使武泰節度使王處回兼武信節度使同平章事黔邊於諸蠻遂蜀之內地也以此為進律帝二月庚辰左散騎常侍張允上駮赦論駮北角翻以為帝王遇天災多肆赦謂之脩德借有二人坐獄遇赦則曲者幸免直者銜冤冤氣升聞聞音問乃所以致災非所以弭災也詔褒之帝樂聞讜言樂音洛讜音黨詔百官各上封事命吏部尚書梁文矩等十人置詳定院以考之無取者留中可者行之數月應詔者無十人乙未復降御札趣之復扶又翻趣讀曰促帝三月丁丑敕禁民作銅器初唐世天下鑄錢有三十六冶此謂後唐之世也若盛唐之世天下銅冶九十有餘所喪息浪翻皆廢絕錢日益耗民多銷錢為銅器故禁之帝中書舍人李詳上疏以為十年以來赦令屢降諸道職掌皆許推恩而藩方薦論動踰數百乃至藏典書吏優伶奴僕藏典主帑藏之吏藏徂浪翻被服皆紫袍象笏被皮義翻名器僭濫貴賤不分請自今諸道主兵將校之外節度州聽奏朱記大將以上十人節度州者節度使所治之州朱記大將者不給銅印給木朱記以為印信自餘但委本道量遷職名而已量音良從之帝夏四月甲申唐宋齊丘自陳丞相不應不豫政事唐主答以省署未備帝吳讓皇固辭舊宮以既讓位於唐不敢居江都宮李德誠等亦亟以為言亟去吏翻五月戊午唐主改潤州牙城為丹楊宮以李建勳為迎奉讓皇使帝楊光遠自恃擁重兵時范延光未平晉之重兵皆在楊光遠之手屢有抗奏帝常屈意從之為楊光遠請易置執政張本庚申以其子承祚為左威衞將軍尚帝女長安公主次子承信亦拜美官寵冠當時冠古玩翻為楊光遠叛亂張本帝壬戌唐主以左宣威副統軍王輿為鎮海留後客省使公孫圭為監軍使親吏馬思讓為丹楊宮使徙讓皇居丹楊宮選用王輿等以防衞故吳主宋齊丘復自陳為左右所間復扶又翻間古莧翻唐主大怒齊丘歸第白衣待罪或曰齊丘舊臣不宜以小過棄之唐主曰齊丘有才不識大體乃命吳王璟持手詔召之六月壬午或獻毒酒方於唐主唐主曰犯吾法者自有常刑安用此為史言唐主斯言得君人之體以吳者楊氏國號而陽字與楊字同音也留守判官楊嗣請更姓羊留守判官東都留守判官也陛下自應天順人事非逆取逆取本之漢陸賈逆取順守之言咸非急務不可從也唐主然之帝河南留守高行周奏脩洛陽宮丙戌左諫議大夫薛融諫曰今宮室雖經焚毀猶侈於帝堯之茅茨唐堯土階三尺茅茨不翦猶多於漢文之露臺露臺事見漢文帝紀謂范延光尚據魏州楊光遠攻之未下也窘渠隕翻誠非陛下脩宮館之日俟海內平寧營之未晚上納其言仍賜詔褒之帝己丑金部郎中張鑄奏竊見鄉村浮戶浮戶謂未有土著定籍者言其蓬轉萍流不常厥居若浮泛於水上然非不樂安居樂音洛但以種木未盈十年墾田未及三頃似成生業已為縣司收供傜役責之重賦威以嚴刑故不免捐功捨業更思他適乞自今民墾田及五頃以上三年外乃聽縣司傜役從之帝秋七月中書奏朝代雖殊朝直遙翻條制無異請委官取明宗及清泰時敕詳定可久行者編次之己酉詔左諫議大夫薛融等詳定帝辛酉敕作受命寶以受天明命惟德允昌為文以受命寶為潞王所焚故也時中書門下奏准敕製皇帝受命寶今按貞觀十六年太宗文皇帝刻之玄璽白玉為螭首其文曰皇帝受命有德者昌敕以受天明命惟德允昌為文按唐六典受命寶天子脩封禪禮神祇則用之帝帝章十二行本帝上有八月二字乙十一行本同孔本同上尊號於契丹主及太后戊寅以馮道為太后冊禮使考異曰周世宗實錄馮道傳云虜遣使加徽號於晉祖晉亦獻徽號於虜始命兵部尚書王權銜其命權辭以老病晉祖謂道曰此行非卿不可道無難色按晉高祖實錄天福三年八月戊寅道為契丹太后冊禮使十月戊寅北朝命使上帝徽號戊子王權以不受北使停任周世宗實錄誤也煦本作昫詣契丹行禮契丹主大悅帝事契丹甚謹奉表稱臣謂契丹主為父皇帝每契丹使至帝於別殿拜受詔敕歲輸金帛三十萬之外三十萬乃講和元約歲輸之數歲時贈遺玩好珍異相繼於道遺唯季翻好呼到翻乃至應天太后元帥太子偉王南北二王韓延徽趙延壽等諸大臣皆有賂章十二行本賂下有遺字乙十一行本同孔本同張校同小不如意輒來責讓帝常卑辭謝之應天太后即契丹主母述律氏應天之號蓋帝所上也契丹驕倨多不遜語使者還以聞還從宣翻朝野咸以為恥而帝事之曾無倦意以是終帝之世與契丹無隙然所輸金帛不過數縣租賦往往託以民困不能滿數其後契丹主屢止帝上表稱臣但令為書稱兒皇帝如家人禮初契丹既得幽州命曰南京天福元年契丹始得幽州思溫子延照在晉帝以為祁州刺史唐昭宗景福三年義武節度使王處存奏以定州無極深澤二縣置祁州請以幽州內附帝不許趙延照後遂入契丹為契丹用帝契丹遣使詣唐宋齊丘勸唐主厚賄之俟至淮北潛遣人殺之欲以間晉間古莧翻宋齊丘之意以謂殺契丹使於晉境則契丹主必謂晉人殺之而誚讓晉此所以間之也帝壬午楊光遠奏前澶州刺史馮暉自廣晉城中出戰因來降馮暉自澶州入廣晉與范延光同反見上年六月己丑以暉為義成節度使厚賞馮暉欲以攜范延光之黨楊光遠攻廣晉歲餘不下楊光遠自去年六月攻范延光七月破馮暉等始進兵攻廣晉今歲餘矣而猶不下唐莊宗即位改魏州為興唐府帝革命改為廣晉遣內職朱憲入城諭范延光內職蓋宦者也曰若降而殺汝白日在上吾無以享國延光謂節度副使李式曰主上重信云不死則不死矣乃撤守備然猶遷延未決宣徽南院使劉處讓復入諭之處昌呂翻下同復扶又翻延光意乃決九月乙巳朔楊光遠送延光二子守圖守英詣大梁己酉延光遣牙將奉表待罪壬子詔書至廣晉延光帥其衆素服於牙門使者宣詔釋之帥讀曰率朱憲汴州人也帝契丹遣使如洛陽取趙延壽妻唐燕國長公主以歸趙延壽妻唐明宗女也延壽入契丹其妻留洛今延壽在北用事故來取之長知兩翻帝壬戌唐太府卿趙可封請唐主復姓李立唐宗廟帝庚午嚴庚午改己巳楊光遠表乞入朝命劉處讓權知天雄軍府事楊光遠之討范延光也制令兼知天雄軍行府事延光既降而光遠請入朝時劉處讓奉詔入魏諭降延光因使之權知軍府己巳嚴己巳改庚午制以范延光為天平節度使仍賜鐵券賜鐵券者恕其死而明之以信誓今日謂制書到魏州之日也亦釋之延光腹心將佐李式孫漢威薛霸皆除防禦團練使刺史牙兵皆升為侍衞親軍初河陽行軍司馬李彥珣邢州人也父母在鄉里未嘗供饋後與張從賓同反從賓敗奔廣晉去年六月張從賓反踰月而敗使登城拒守楊光遠訪獲其母置城下以招之彥珣引弓射殺其母射而亦翻延光既降帝以彥珣為坊州刺史近臣言彥珣殺母殺母惡逆不可赦律有十惡殺父母者惡逆恩赦之所不原赦令已行不可改也乃遣之官臣光曰治國家者固不可無信治直之翻然彥珣之惡三靈所不容三靈謂天神地祇人鬼治其殺母之罪何損於信哉帝辛未以楊光遠為天雄節度使帝冬十月戊寅契丹遣使奉寶冊加帝尊號曰英武明義皇帝帝帝以大梁舟車所會便於漕運丙辰建東京於汴州自此歷漢周至宋皆都于汴梁建東都於汴州以汴州為開封府開平三年割滑州之酸棗長垣鄭州之中牟陽武宋州之襄邑曹州之戴邑許州之扶溝鄢陵陳州之太康九縣並隸開封府唐同光二年詔以陽武匡城扶溝考城四縣屬汴州餘還故屬匡城即長垣天成元年扶溝復隸許州至是詔汴州宜升東京仍升開封浚儀兩縣為赤縣其餘為畿縣應舊置開封府所管屬縣並依舊割屬收管亦升為畿縣以東都為西京以西都為晉昌軍節度唐以長安為西都以洛陽為東都梁始都汴以汴州為東京洛陽為西京而以長安為節鎮後唐滅梁復唐兩都之舊而以汴州為節鎮晉今復於汴州建東京開封府以洛陽之東都為西京以長安之西都為晉昌軍帝帝遣兵部尚書王權使契丹謝尊號權自以累世將相恥之王權唐左僕射起之曾孫父蕘官至右司郎中起之先世播相唐文宗薛史王起官至左僕射山南西道節度使冊贈太尉吾老矣安能向穹廬屈膝乃辭以老疾帝怒戊子權坐停官帝初郭崇韜既死郭崇韜死見二百七十四卷唐明宗天成元年帝即位桑維翰李崧兼之宣徽使劉處讓及宦官皆不悅楊光遠圍廣晉處讓數以軍事銜命往來光遠奏請多踰分數所角翻分扶問翻帝常依違維翰獨以法裁折之依違者謂若依若違無可否一定之說折之舌翻處讓曰是皆執政之意光遠由是怨執政范延光降光遠密表論執政過失光遠既平范延光挾功邀上以斥執政加維翰兵部尚書崧工部尚書皆罷其樞密使考異曰竇貞固晉少帝實錄及薛史劉處讓傳云楊光遠入朝遂於高祖前面言執政之失乃罷維翰等樞密使以處讓為之楊光遠傳云范延光降光遠面奏維翰亶權高祖以光遠方有功於國乃出維翰領安陽光遠為西京留守今按晉高祖實錄天福三年十月壬辰維翰崧罷樞密使庚子光遠始入朝對於便殿十一月戊申光遠為西京留守天福四年閏七月壬申維翰出為相州節度使蓋處讓光遠傳之誤晉少帝實錄及薛史桑維翰傳敍光遠鎮洛陽後疏維翰出相州是也帝太常奏今建東京而宗廟社稷皆在西京請遷置大梁敕旨且仍舊帝戊戌大赦帝楊延藝故將吳權自愛州舉兵攻皎公羨於交州延藝當作廷藝皎公羨殺楊廷藝見本卷上年劉昫曰愛州東至小黃江口四百六十里入交州界以下文考之羨上當有公字章乙十一行本正有公字以其子萬王弘操為靜海節度使徙封交王言將以交州為弘操封略漢主自將屯于海門為之聲援漢主問策於崇文使蕭益益曰今霖雨積旬海道險遠吳權桀黠未可輕也大軍當持重多用鄉導然後可進黠下八翻鄉讀曰嚮不聽命弘操帥戰艦自白藤江趣交州白藤江當在峯州界自此進至花步抵峯州帥讀曰率趣七喻翻據交州引兵逆戰先於海口多植大杙銳其首冒之以鐵杙與職翻橜也遣輕舟乘潮挑戰而偽遁章十二行本遁下有弘操逐之四字乙十一行本同孔本同挑徒了翻須臾潮落漢艦皆礙鐵杙不得返艦戶黯翻漢兵大敗士卒覆溺者太半弘操死漢主慟哭收餘衆而還還從宣翻又如字先是著作佐郎侯融勸漢主弭兵息民至是以兵不振追咎融剖棺暴其尸益倣之孫也先悉薦翻蕭倣相唐懿宗帝楚順賢夫人彭氏卒彭夫人貌陋而治家有法治直之翻楚王希範憚之既卒希範始縱聲色為長夜之飲內外無別別彼列翻有商人妻美希範殺其夫而奪之妻誓不辱自經死史以婦人能守節書其事而失其姓氏而馬希範之淫暴不可揜矣帝河決鄆州鄆音運帝十一月范延光自鄆州入朝范延光降自魏徙鄆今自鄆州入朝帝丙午以閩主昶為閩國王書閩主者表其已竊大號書以為國王者晉命也賜昶赭袍赭袍天子所服賜之是許之竊號也戊申以威武節度使王繼恭為臨海郡王閩主聞之遣進奏官林恩白執政以既襲帝號辭冊命及使者閩諫議大夫黃諷以閩主淫暴與妻子辭訣入諫閩主欲杖之諷曰臣若迷國不忠死亦無怨直諫被杖臣不受也閩主怒黜為民帝帝患天雄節度使楊光遠跋扈難制桑維翰請分天雄之衆加光遠太尉西京留守兼河陽節度使光遠由是怨望密以賂自訴於契丹養部曲千餘人常蓄異志楊光遠雖蓄異志而帝與契丹無間則無從而發也至出帝與契丹構隙則引契丹為援而速禍矣辛亥建鄴都於廣晉府唐莊宗之初即位也建東京於魏州以魏州為興唐府後改為鄴都明宗天成四年廢晉受命以魏州為廣晉府今復建鄴都以澶衞隸之彰德軍梁貞明間嘗置之矣張彥之變尋廢今復置之以博冀隸之分天雄之貝博成德之冀州為永清軍帝慮契丹為後世之患遣前淄州刺史汲人劉繼勳徙澶州跨德勝津幷頓丘徙焉澶州本治頓丘縣今併州縣皆徙治德勝按九域志之澶州距魏州一百三十里德勝之澶州晉人議者以為距魏州一百五十里有二十里之差蓋自澶州北城抵魏州止一百三十里若自南城渡河幷浮梁計程則一百五十里也貝州防禦使王廷胤為彰德節度使右神武統軍王周為永清節度使始升貝州為永清軍處存之孫唐末王處存鎮易定鄴都人也帝范延光屢請致仕甲寅詔以太子太師致仕居于大梁每預宴會與㣥臣無異延光之反也相州刺史掖人王景拒境不從范延光帥天雄相州其巡屬也掖漢縣唐帶萊州相息亮翻戊午以景為耀州團練使帝癸亥敕聽公私自鑄銅錢無得雜以鉛鐵每十錢重一兩以天福元寶為文仍令鹽鐵頒下模範鹽鐵者鹽鐵使司也下戶嫁翻五代會要時令三京鄴都諸道州府無問公私應有銅者並令鑄錢仍以天福元寶為文左環讀之委鹽鐵鑄樣頒下諸道每一錢重二銖四絫十錢重一兩或慮諸色人接便將鉛鐵鑄造雜亂銅錢仍令所屬依舊禁斷尚慮逐處銅數不多宜令諸道應有久廢銅冶許百姓取便開鍊永遠為主官司不取課利其有生熟銅仍許所在中賣入官或任自鑄錢行用不得接便別鑄銅器帝立左金吾衞上將軍重貴為鄭王充開封尹通鑑封子姪為王多書封亦或書立蓋因當時史官成文書之無義例也帝癸亥章十二行本作庚辰乙十一行本同孔本作庚戌張校同孔本敕先許公私鑄錢慮銅難得聽輕重從便但勿令缺漏許民私鑄已非可久之法況又聽其輕重從便則民必鑄輕安有鑄重者乎惟患鑄之不輕薄耳輕薄之甚必至缺漏此錢安可久行邪帝辛丑張丑作未吳讓皇卒年三十八考異曰薛史唐餘錄皆云溥禪位踰年以幽卒歐陽史但云卒九國志云溥能委運授終不罹篡殺之禍深於機者也十國紀年曰辛丑唐人弒讓皇事不可明今但云卒唐主於舊君之卒依傍漢朝臣為君服以日易月之制為廢朝日數自古以來易姓之君惟唐主於舊君若加厚者原心定罪是猶紾兄之臂而奪之食既奪其食矣乃引其臂而按摩之曰吾愛吾兄也朝直遙翻是歲唐主徙吳王璟為齊王帝鳳翔節度使李從曮厚文士而薄武人愛農民而嚴士卒由是將士怨之會發兵戍西邊既出郊作亂突門入城剽掠於市突城門而入剽掠也剽匹妙翻亂兵敗東走欲自訴於朝廷至華州鎮國節度使章十二行本使下有太原二字乙十一行本同孔本同張彥澤邀擊盡誅之鄧廣銘標點聶崇岐覆校
