body:
  text: 資治通鑑卷第一百九十端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註唐紀六高祖神堯大聖光孝皇帝中之下武德五年武德五年壬午六二二武德五年春正月劉黑闥自稱漢東王改元天造定都洺州以范願為左僕射董康買為兵部尚書高雅賢為右領軍徵王琮為中書令劉斌為中書侍郎琮藏宗翻斌音彬竇建德時文武悉復本位其設法行政悉師建德而攻戰勇決過之武德五年丙戌同安賊帥殷恭邃以舒州來降舒州隋之同安郡宋白曰舒州漢皖縣屬廬江郡晉置晉熙郡梁置南豫州復為晉州北齊改江州隋初改熙州大業改同安郡唐改舒州以其地古舒子之國也帥所類翻降戶江翻武德五年丁亥濟州別駕劉伯通執刺史竇務本以州附徐圓朗濟子禮翻武德五年庚寅東鹽州治中王才藝殺刺史田華以城應劉黑闥滄州鹽山縣本漢高成縣地去年置東鹽州以清池縣隸之武德五年秦王世民軍至獲嘉按宋白續通典隋開皇四年移獲嘉縣於脩武故城退保洺州宋白曰洺州城春秋晉曲梁之地相息亮翻丙申世民復取相州考異曰實錄云祿州人殺刺史獨孤徹以城應黑闥按地理志無祿州蓋字誤耳新書作相州尤誤也按劉黑闥攻拔相州執刺史房晃秦王兵至乃棄相州故秦王復取之新書帝紀拔相州殺房晃在正月乙酉相州人殺獨孤徹叛附黑闥在丙申其誤明矣祿州既莫考其地然黑闥之拔相州與秦王之復相州本末甚明與祿州全不相干而新書所書殺房晃拔相州月日亦誤復扶又翻又音如字肥鄉縣漢魏郡邯溝縣地曹魏置肥鄉縣屬廣平郡武德初屬紫州去年廢紫州以肥鄉屬磁州九域志肥鄉在洺州東南三十五里水經洺水東逕曲梁城曲梁即永年洺州所治也武德五年蕭銑既敗散兵多歸林士弘軍勢復振林士弘為張善安所敗兵勢自此衰見一百八十四卷隋義寧元年武德五年己酉嶺南俚帥楊世略以循潮二州來降循州龍川郡秦漢龍川博羅縣地南朝置郡隋置州潮州義安郡漢南海郡揭陽縣地梁置東揚州尋改瀛州隋平陳改潮州俚音里帥所類翻降戶江翻下同武德五年唐使者王義童下泉睦建三州睦州遂安郡漢富春歙縣地劉昫曰武德四年以建安郡之建安縣置建州蓋隋置泉州建安郡治閩縣景雲元年改為閩州開元十三年改為福州聖曆二年分泉州之南安龍溪莆田三縣置武榮州景雲二年更武榮州為泉州是今之福州乃唐初之泉州今之泉州乃景雲二年之泉州也使疏吏翻武德五年幽州總管李藝將所部兵數萬會秦王世民討劉黑闥黑闥聞之留兵萬人使范願守洺州自將兵拒藝夜宿沙河隋以漢襄國縣為龍岡縣又分龍岡置沙河縣時屬邢州宋白曰沙河即湡水也水經云湡水出趙郡襄國縣西山東過沙河縣沙河在縣南五里范成大曰臨洺鎮東去洺州三十五里過洺河三十里至沙河縣二十五里至邢州將即亮翻下同於城西二里隄上急擊之城中地皆震動范願驚懼馳告黑闥黑闥遽還遣其弟十善與行臺張君立將兵一萬擊藝於鼓城壬子戰於徐河鼓城縣舊曰曲陽後齊廢隋開皇十六年分置晉陽縣十八年改為鼓城按水經註下曲陽縣有鼓聚此因春秋鼓子之國以名縣也唐屬趙州水經徐水出廣昌縣東南大嶺下東北逕五回縣又逕北平縣界東南出山又東逕清苑城北又東至高陽入河范成大曰徐河在清苑北十里所失亡八千人武德五年洺水人李去惑隋志洺水縣舊曰斥漳後齊省入平恩開皇六年分置曲周大業初廢曲周入洺水唐末省洺水入曲周去羌呂翻秦王世民遣彭公王君廓將千五百騎赴之入城共守二月劉黑闥引兵還攻洺水癸亥行至列人列人縣漢屬廣平國後漢屬魏郡晉復屬廣平後魏復屬魏郡隋廢九域志洺州有列人城在漢斥丘縣東北武安縣西南杜佑曰漢列人縣古城在肥鄉縣東北騎奇寄翻破之考異曰實錄癸亥秦王擊劉黑闥於列人大破之革命記十一月太宗渡河入相州劉黑闥從洺州勒兵拒王師置營於鄴縣東三十里每日兩軍皆挑戰而大兵皆不出經十餘日洺水縣人李去惑李潘買李開弼等為車騎驃騎領兵在劉黑闥營去惑等背賊營來入洺州城誑人云劉黑闥已敗先走得歸乃喚得宗室子弟二百餘人守城定遣使間道以告太宗太宗遣彭國公王君廓領馬軍一千五百騎入洺州經十許日黑闥引兵攻洺州行至故列人城西秦叔寶等以五千騎擊之叔寶等為闥所敗又以伏兵從河下起橫擊黑闥敗之會日暮收軍其夜三更賊兵總至洺州城東營即於城兩門掘壕豎柵防王君廓之走洺州城四面有水闊五十步已上深皆三四尺黑闥於東北角兩處填柴運土作甬道以撞車攻城太宗三度將兵擊之賊置陣拒官軍攻城愈急按高祖太宗實錄皆以去年十二月命太宗討黑闥今年正月始至河北無十一月渡河之事太宗實錄亦無列人戰事蓋叔寶破賊秦王奏之耳又按洺水洺州屬縣去惑君廓所據者洺水縣城水字誤作州耳武德五年豫章賊帥張善安以虔吉等五州來降拜洪州總管洪州豫章郡虔州南康郡吉州廬陵郡皆隋平陳所置州帥所類翻武德五年戊辰金鄉人陽孝誠叛徐圓朗以城來降金鄉縣漢屬山陽郡晉屬高平郡隋屬曹州武德四年置金州是年廢州以縣屬戴州武德五年己巳秦王世民復取邢州辛未井州人馮伯讓以城來降隋開皇十六年以恆州井陘縣置井州大業初廢武德元年復置考異曰實錄作幷州按幷州未嘗失城蓋是時於井陘縣置井州字之誤也武德五年丙子李藝取劉黑闥定欒廉趙四州隋開皇十六年分趙州廣阿縣置欒州大業初州廢併為趙州新志武德五年改趙州為欒州按趙州治平棘欒州治廣阿竇建德劉黑闥相繼跨有山東蓋自置欒州是年黑闥破走之後始幷趙州為欒州也武德元年分恆州藳城縣置廉州考異曰實錄作定率廉隋四州按河北無率隋二州今從唐統紀引兵與秦王世民會洺州洺彌幷翻武德五年劉黑闥攻洺水甚急城四旁皆有水廣五十餘步廣古曠翻黑闥於城東北築二甬道以攻之世民三引兵救之黑闥拒之不得進世民恐王君廓不能守召諸將謀之將即亮翻李世勣曰若甬道達城下城必不守行軍總管郯勇公羅士信請代君廓守之世民乃登城南高冢以旗招君廓君廓帥其徒力戰潰圍而出士信帥左右二百人乘之入城代君廓固守帥讀曰率黑闥晝夜急攻會大雪救兵不得往凡八日丁丑城陷黑闥素聞其勇欲生之士信詞色不屈乃殺之時年二十考異曰高祖實錄王君廓知不可守潰圍而出秦王謂諸將曰誰能代者士信曰願以死守因遣之按君廓若已潰圍而出則黑闥圍守益固士信何以復得入城革命記曰太宗知賊勢盛恐王君廓不能固以問諸將士信以為無慮太宗使士信入守之太宗登段王墓以旗招王君廓從南門突圍不得即向北門併兵攻捉門人少退得出士信亦以左右二百人入城經八日晝夜被攻木石俱盡士信被左右執之以降賊五年正月城陷李去惑以數十人突圍出歸太宗去惑後授秦州都督李潘買拜檀州刺史李開弼城陷而沒贈上柱國以公禮葬今從之高祖實錄士信死時年二十八舊傳云年二十按士信始從張須陀擊王薄等時年十四若死時年二十八則在大業四年於時王薄未為盜年二十則在大業十二年是歲須陀死今從之武德五年戊寅汴州總管王要漢攻徐圓朗州拔之獲其將周文舉將即亮翻下同武德五年庚辰延州道行軍總管段德操延州漢上郡膚施之地元魏之末置東夏州西魏改曰延州隋曰延安郡師都自將救之將即亮翻德操與戰大破之師都以十六騎遁去上益其兵使乘勝進攻夏州克其東城騎奇寄翻夏戶雅翻師都以數百人保西城會突厥救至厥九勿翻詔德操引還還從宣翻武德五年辛巳秦王世民拔洺水洺彌幷翻世民與李藝營於洺水之南分兵屯水北黑闥數挑戰數所角翻挑徒了翻世民堅壁不應別遣奇兵絕其糧道壬辰黑闥以高雅賢為左僕射軍中高會李世勣引兵逼其營雅賢乘醉單騎逐之世勣部將潘毛刺之墜馬將即亮翻刺七亦翻左右繼至扶歸未至營而卒卒子恤翻甲午諸將復往逼其營復扶又翻潘毛為王小胡所擒黑闥運糧於冀貝滄瀛諸州水陸俱進程名振以千餘人邀之沈其舟焚其車沈持林翻武德五年宋州總管盛彥師帥齊州總管王薄攻須昌帥讀曰率徵軍糧於潭州刺史李義滿與薄有隙閉倉不與及須昌降降戶江翻彥師收義滿繫齊州獄詔釋之使者未至義滿憂憤死獄中使疏吏翻薄還過潭州戊戌夜義滿兄子武意執薄殺之潭州當作譚州武德二年李義滿以齊州之章丘縣來降於平陵置譚州幷置平陵縣蓋因春秋譚子之國以名州也坐死者朝廷以義滿之死為彥師罪而殺之武德五年上遣使賂突厥頡利可汗且許結婚使疏吏翻厥九勿翻可從刊入聲汗音寒頡利乃遣漢陽公王褱鄭元璹長孫順德等還王褱等被留事見上卷四年王褱工回翻璹殊玉翻長知兩翻庚子復遣使來修好復扶又翻好呼到翻上亦遣其使者特勒熱寒阿史那德等還還從宣翻幷州總管劉世讓屯鴈門頡利與高開道苑君璋合衆攻之章十二行本之下有不克二字乙十一行本同孔本同張校同退齋校同月餘乃退考異曰舊世讓傳云時鴻臚卿鄭元璹先使在蕃可汗令元璹來說之世讓厲聲曰大丈夫乃為夷狄作說客邪經月餘虜乃退及元璹還述世讓忠貞勇幹高祖下制褒美之按高祖稱元璹蘇武弗之過安肯為可汗遊說脫或果爾則元璹唯恐帝知之安肯稱世讓忠貞說之不下邪據實錄世讓傳無此事今不取武德五年甲辰以隋交趾太守丘和為交州總管以交趾郡為交州宋白曰交州周為越裳重譯之地漢交趾日南二郡界按交趾之稱今南方夷人其足大指開廣若並足而立其指相交故曰交趾吳黃武中以交趾縣遠分為二州割合浦以北海東四郡立廣州交趾以南立交州守式又翻朝直遙翻詔許之遣其子師利迎之義師之向長安丘師利以兵來附武德五年秦王世民與劉黑闥相持六十餘日黑闥潛師襲李世勣營世民引兵掩其後以救之為黑闥所圍尉遲敬德帥壯士犯圍而入尉紆勿翻帥讀曰率世民與略陽公道宗乘之得出道宗帝之從子也從才用翻世民度黑闥糧盡必來決戰度徒洛翻乃使人堰洺水上流洺彌幷翻待我與賊戰乃決之丁未黑闥帥步騎二萬南渡洺水壓唐營而陳陳讀曰陣世民自將精騎擊其騎兵破之乘勝蹂其步兵蹂人九翻黑闥帥衆殊死戰帥讀曰率自午至昏戰數合黑闥勢不能支王小胡謂黑闥曰智力盡矣宜早亡去遂與黑闥先遁餘衆不知猶格戰守吏決堰洺水大至深丈餘洺彌幷翻深式禁翻斬首萬餘級溺死數千人黑闥與范願等二百騎奔突厥山東悉平騎奇寄翻厥九勿翻按秦王之討黑闥前後接戰黑闥之衆皆決死確鬬特秦王大展方略黑闥智力俱困而敗走耳秦王之平㣥盜黑闥最為堅敵武德五年高開道寇易州殺刺史慕容孝幹武德五年夏四月己未隋鴻臚卿甯長真以寧越鬱林之地請降於李靖臚陵如翻降戶江翻交愛之道始通以長真為欽州總管寧越郡欽州漢合浦縣地宋為宋壽宋廣郡鬱林郡鬱州漢古郡隋置州愛州九真郡漢古郡梁置州劉昫曰交州至京師七千五百二十三里愛州至京師八千八百里武德五年以夔州總管趙郡王孝恭為荊州總管武德五年徐圓朗聞劉黑闥敗大懼不知所出河間人劉復禮說圓朗曰有劉世徹者其才不世出名高東夏說輸芮翻夏戶雅翻且有非常之相相息亮翻真帝王之器將軍若自立恐終無成若迎世徹而奉之天下指揮可定圓朗然之使復禮迎世徹於浚儀浚儀縣漢晉後魏屬陳留郡周隋唐為汴州治所將軍為人所惑欲迎劉世徹而奉之世徹若得志將軍豈有全地乎僕不敢遠引前古將軍獨不見翟讓之於李密乎李密翟讓事始一百八十三卷隋大業十二年終一百八十四卷義寧元年翟萇伯翻考異曰革命記云盛彥師以世徹有虛名於徐兗恐二人相得為患益深因說圓朗使不納按實錄彥師奔王薄與薄共殺李義滿三月戊戌王薄死丁未黑闥乃敗彥師在圓朗所時黑闥未敗也今稱或說以闕疑復扶又翻下同世徹至已有衆數千人頓於城外以待圓朗出迎圓朗不出使人召之世徹知事變欲亡走恐不免乃入謁圓朗悉奪其兵以為司馬使徇譙二州東人素聞其名所向皆下圓朗遂殺之秦王世民自河北引兵將擊圓朗會上召之使馳傳入朝乃以兵屬齊王元吉傳株戀翻屬之欲翻付也庚申世民至長安上迎之於長樂長樂坂在長安城東樂音洛上復遣之詣黎陽會大軍趨濟陰曹州治濟陰縣趨七喻翻濟子禮翻武德五年丁卯廢山東行臺劉黑闥敗走故也武德五年壬申代州總管定襄王李大恩為突厥所殺厥九勿翻先是大恩奏稱突厥饑饉馬邑可取先悉薦翻詔殿內少監獨孤晟將兵與大恩共擊苑君璋期以二月會馬邑失期不至大恩不能獨進頓兵新城新城當在朔州南杜佑曰魏都平城於馬邑郡北三百餘里置懷朔鎮及遷洛後於郡北三百餘里置朔州魏初雲中郡在今郡北三百餘里定襄故城北北齊置朔州在故都西南新城一名平城後移於馬邑即今郡城也馬邑郡治善陽縣亦漢定襄縣地新城即魏之新平城也晟承正翻將即亮翻上遣右驍衞大將軍李高遷救之騎奇寄翻驍堅堯翻未至大恩糧盡夜遁突厥邀之衆潰而死上惜之獨孤晟坐減死徙邊武德五年丙子行臺民部尚書史萬寶攻徐圓朗陳州拔之宋白曰陳州楚襄王自郢徙此謂之西楚漢為淮陽國之地後魏立陳郡天平二年置北揚州隋改陳州治宛丘春秋陳國都也武德五年戊寅廣州賊帥鄧文進隋合浦太守甯宣日南太守李晙並來降合浦郡越州貞觀改廉州日南郡德州貞觀改驩州帥所類翻守式又翻晙子峻翻武德五年五月庚寅瓜州土豪王幹斬賀拔行威以降瓜州晉昌郡是年分瓜州之常樂縣置瓜州舊瓜州為西沙州賀拔行威反事始見一百八十八卷三年武德五年突厥寇忻州忻州新興郡義寧元年以樓煩郡秀容縣置此秀容漢汾陽縣地非後魏之北秀容也武德五年六月辛亥劉黑闥引突厥寇山東詔燕郡王李藝擊之厥九勿翻燕因肩翻武德五年癸丑吐谷渾寇洮旭疊三州岷州總管李長卿擊破之後周武帝逐吐谷渾置疊州於疊川旭州於洮源岷州於臨洮義寧元年改臨洮於溢樂後周書曰於河州鷄鳴防置旭州於宕州渠株川置岷州吐從暾入聲谷音浴洮土刀翻旭吁玉翻長知兩翻武德五年乙卯遣淮安王神通擊徐圓朗武德五年丁卯劉黑闥引突厥寇定州武德五年秋七月甲申為秦王世民營弘義宮弘義宮後改為大安宮在宮城外西偏為于偽翻世民擊徐圓朗下十餘城聲震淮泗杜伏威懼請入朝朝直遙翻下同世民以淮濟之間略定濟子禮翻使淮安王神通行軍總管任王褱李世勣攻圓朗乙酉班師武德五年丁亥杜伏威入朝延升御榻拜太子太保仍兼行臺尚書令留長安位在齊王元吉上以寵異之以闞稜為左領軍將軍漢建安中魏武為丞相始置中領軍北齊置領軍府煬帝改為禦衞唐改為領軍衞李子通謂樂伯通曰伏威既來江東未定我往收舊兵可以立大功遂相與亡至藍田關雍州藍田縣有藍田關俱伏誅武德五年劉黑闥至定州其故將曹湛董康買亡命在鮮虞鮮虞縣舊曰盧奴開皇初更名以其地春秋鮮虞子之國也定州治所復扶又翻甲午以淮陽王道玄為河北道行軍總管以討之武德五年丙申遷州人鄧士政執刺史李敬昂以反西魏以房陵置遷州大業初改曰房州武德初復曰遷州房陵郡武德五年丁酉隋漢陽太守馮盎承李靖檄帥所部來降守式又翻帥讀曰率降戶江翻下同以其地為高羅春白崖儋林振八州高州高涼郡羅州石城郡春州陽春郡白州南昌郡崖州珠崖郡林州桂林郡振州臨振郡羅州今化州白州今鬱林州之博白縣崖儋振皆在海外振州今吉陽軍地林州後改繡州投荒錄高州高涼郡土厚而山環遶高而稍汙故名羅州宋將檀道濟於陵羅江口築城因置羅州今廢陵羅縣在化州北一百二十里宋白曰州在陵羅二水之間春州治陽春縣故名白州以博白江名崖州以珠崖名儋州以儋耳名林州以綏懷林邑名振州以漢臨振古縣而名儋丁甘翻封耿國公先是或說盎曰唐始定中原未能及遠公所領二十州地已廣於趙佗趙佗見漢紀先悉薦翻說輸芮翻佗徒何翻盎曰吾家居此五世矣馮氏居高涼事始見一百六十三卷梁簡文帝大寶元年富貴極矣常懼不克負荷為先人羞敢効趙佗自王一方乎荷下可翻又如字王于況翻遂來降於是嶺南悉平武德五年八月辛亥以洺荊交幷幽五州為大總管府洺彌幷翻幷卑名翻武德五年改葬隋煬帝於揚州雷塘雷塘漢所謂雷陂也在今揚州城北平岡上考異曰實錄武德二年六月癸巳有詔葬隋帝及子孫此又云葬煬帝蓋三年李子通猶據江都雖有是詔不果葬也武德五年甲戌吐谷渾寇岷州敗總管李長卿吐從暾入聲谷音浴敗補邁翻長知兩翻渭州隴西郡且姓也音子余翻武德五年乙卯突厥頡利可汗寇邊厥九勿翻可從刊入聲汗音寒遣左武衞將軍段德操雲州總管李子和將兵拒之子和本姓郭郭子和武德三年以榆林郡降榆林之地本屬雲州隋割置勝州榆林郡子和以榆林降因命之為雲州總管賜姓丙辰頡利十五萬騎入鴈門頡奚結翻騎奇寄翻己未寇幷州別遣兵寇原州庚子章十二行本子作申乙十一行本同孔本同退齋校同命太子出幽州道幽州當作豳州秦州當作泰州出豳州以禦原州之寇出泰州以禦幷州之寇泰州時治龍門掩擊可汗漢雲中古城在榆林郡東北四十里趨七喻翻邀其歸路夏戶雅翻辛酉上謂㣥臣曰突厥入寇而復求和厥九勿翻復扶又翻和與戰孰利太常卿鄭元璹曰戰則怨深不如和利璹殊玉翻中書令封德彞曰突厥恃犬羊之衆有輕中國之意若不戰而和示之以弱明年將復來復扶又翻臣愚以為不如擊之既勝而後與和則恩威兼著矣上從之己巳幷州大總管襄邑王神符破突厥於汾東汾州刺史蕭顗破突厥浩州西河郡武德三年更名汾州顗魚豈翻武德五年吐谷渾寇章十二行本寇作陷乙十一行本同孔本同退齋校同洮州遣武州刺史賀章十二行本賀下有拔字乙十一行本同孔本同退齋校同亮禦之武都郡西魏置武州唐後改曰階州洮土刀翻武德五年丙子突厥寇廉州戊寅陷大震關大震關在隴州源縣當隴山之路程大昌曰漢武帝至此遇雷大震因以為名按寇廉州者幷州之寇陷大震關者原州之寇也是時突厥精騎數十萬自介休至晉州數百里間填溢山谷元璹見頡利責以負約與相辨詰詰去吉翻頡利頗慚元璹因說頡利曰唐與突厥風俗不同突厥雖得唐地不能居也今虜掠所得皆入國人於可汗何有不如旋師復脩和親說輸芮翻復扶又翻可無跋涉之勞坐受金幣又皆入可汗府庫可從刊入聲汗音寒而結子孫無窮之怨乎頡利悅引兵還還從宣翻元璹自義寧以來五使突厥幾死者數焉使疏吏翻幾居依翻數所角翻武德五年九月癸巳交州刺史權士通西魏置北秦州於上郡廢帝三年改曰交州慶州弘化縣開皇十八年置弘州大業初州廢蓋唐復置也破之觀古玩翻乙未太子班師丙申宇文歆邀突厥於崇崗鎮大破之斬首千餘級歆許今翻壬寅定州總管雙士洛擊突厥於恆山之南雙姓也姓苑曰黃帝後封於雙蒙城恆戶登翻丙午領軍將軍安興貴擊突厥於甘州皆破之甘州張掖郡武德五年劉黑闥陷瀛州殺刺史馬匡武鹽州人馬君德以城叛附黑闥此鹽州即東鹽州武德五年以瀛州之博野清苑定州之義豐置蠡州因漢蠡吾亭以名州也武德五年冬十月己酉詔齊王元吉討劉黑闥於山東壬子以元吉為領軍大將軍幷州大總管癸丑貝州刺史許善護與黑闥弟十善戰於鄃縣鄃音輸善護全軍皆沒甲寅右武候將軍桑顯和擊黑闥於晏城破之隋開皇十六年分冀州之鹿城置晏城縣大業初廢入鹿城蓋其縣名猶在觀古喚翻武德五年契丹寇北平北平郡平州契欺訖翻又音喫武德五年甲子以秦王世民領左右十二衞大將軍左右衞左右驍衞左右武衞左右屯衞左右領軍衞左右候衞為十二衞武德五年乙丑行軍總管淮陽壯王道玄與劉黑闥戰于下博下博縣屬冀州考異曰高祖實錄諡曰忠本傳諡曰壯蓋後來改諡也為黑闥所殺時道玄將兵三萬與副將史萬寶不協道玄帥輕騎先出犯陳將即亮翻帥讀曰率騎奇寄翻陳讀曰陣下同使萬寶將大軍繼之萬寶擁兵不進謂所親曰我奉手敕云淮陽小兒軍事皆委老夫今王輕脫妄進若與之俱必同敗沒不如以王餌賊王敗賊必爭進我堅陳以待之破之必矣由是道玄獨進敗沒萬寶勒兵將戰士卒皆無鬬志軍遂大潰萬寶逃歸道玄數從秦王世民征伐死時年十九數所角翻世民深惜之謂人曰道玄常從吾征伐見吾深入賊陳心慕効之以至於此為之流涕為于偽翻世民自起兵以來前後數十戰常身先士卒先悉薦翻輕騎深入雖屢危殆而未嘗為矢刃所傷史言秦王有天命武德五年林士弘遣其弟鄱陽王藥師攻循州刺史楊略與戰斬之其將王戎以南昌州降士弘懼己巳請降尋復走保安成山洞袁州人相聚應之是年以洪州建昌縣置南昌州吉州安復本吳所置安成縣也唐後改為安福袁州宜春郡將即亮翻降戶江翻復扶又翻會士弘死其衆遂散隋大業十三年林士弘起為盜至是死散武德五年淮陽王道玄之敗也山東震駭洺州總管廬江王瑗棄城西走洺彌幷翻瑗于眷翻旬日間黑闥盡復故地乙亥進據洺州十一月庚辰滄州刺史程大買為黑闥所迫棄城走齊王元吉畏黑闥兵強不敢進上之起兵晉陽也皆秦王世民之謀事見一百八十一卷隋義寧元年若事成則天下皆汝所致當以汝為太子世民拜且辭及為唐王將佐亦請以世民為世子將即亮翻上將立之世民固辭而止太子建成性寬簡喜酒色喜許記翻遊畋句斷多過失皆無寵於上世民功名日盛上常有意以代建成建成內不自安乃與元吉協謀共傾世民各引樹黨友上晚年多內寵小王且二十人尹德生酆王元亨莫嬪生荊王元景孫嬪生漢王元昌宇文昭儀生韓王元嘉魯王靈夔瞿嬪生鄧王元裕楊嬪生江王元祥小楊嬪生舒王元名郭婕妤生徐王元禮劉婕妤生道王元慶楊美人生虢王鳳張美人生霍王元軌張寶林生鄭王元懿柳寶林生滕王元嬰王才人生彭王元則魯才人生密王元曉張氏生周王元方凡十七人且者將及未及之辭建成與元吉曲意事諸嬪諂諛賂遺無所不至遺于季翻以求媚於上或言蒸於張婕妤尹德宮禁深祕莫能明也是時東宮諸王公主之家及後宮親戚橫長安中橫戶孟翻下同恣章十二行本恣上有奪人田宅四字乙十一行本同孔本同張校同退齋校同為非法有司不敢詰世民居承乾殿閣本太極宮圖月華門內有承慶殿無承乾殿按新書承乾殿在西宮又按王溥會要承乾殿在宮中蓋皆指太極宮武德殿在東宮西按閣本太極宮圖武德殿在虔化門東入門過內倉廩立政殿萬春殿即東上閤門無復禁限上臺謂帝居復扶又翻皆乘馬攜弓刀雜物相遇如家人禮太子令秦齊王教與詔敕並行有司莫知所從唯據得之先後為定使唐之政終於如此亡隋之續耳諸嬪爭譽建成元吉而短世民譽音余世民平洛陽上使貴等數人詣洛陽選閱隋宮人及收府庫珍物貴等私從世民求寶貨及為親屬求官唐制皇后而下有貴淑德賢是為夫人昭儀昭容昭媛脩儀脩容脩媛充儀充容充媛是為九嬪婕妤美人才人各九合二十七是為世婦寶林御女采女各二十七合八十一是為御妻為于偽翻寶貨皆已籍奏官當授賢才有功者皆不許由是益怨世民以淮安王神通有功給田數十頃張婕妤之父因婕妤求之於上婕妤音接予上手敕賜之神通以教給在先不與婕妤訴於上曰敕賜妾父田秦王奪之以與神通上遂發怒責世民曰我手敕不如汝教邪邪音耶他日謂左僕射裴寂曰此兒久典兵在外為書生所教非復昔日子也尹德父阿鼠驕橫阿烏葛翻秦王府屬杜如晦過其門阿鼠家童數人曳如晦墜馬敺之折一指敺烏口翻折而設翻曰汝何人敢過我門而不下馬阿鼠恐世民訴於上先使德奏云秦王左右陵暴妾家上復怒復扶又翻責世民曰我嬪家猶為汝左右所陵況小民乎世民深自辯析上終不信世民每侍宴宮中對諸嬪思太穆皇后早終竇皇后諡太穆帝未即位先崩建成世民玄霸元吉皆其所生也或歔欷流涕上顧之不樂歔音虛欷音希又許既翻樂音洛下同諸嬪因密共譖世民曰海內幸無事陛下春秋高唯宜相娛樂而秦王每獨涕泣正是憎疾妾等陛下萬歲後妾母子必不為秦王所容無孑遺矣言必皆誅翦無有孑然見遺者也且曰皇太子仁孝陛下以妾母子屬之屬之欲翻必能保全上為之愴然為于偽翻由是無易太子意待世民浸疏而建成元吉日親矣考異曰高祖實錄曰建成幼不拘細行荒色嗜酒好畋獵常與博徒遊故時人稱為任俠高祖起義于太原建成時在河東本既無寵又以今上首建大計高祖不之思也而今上白高祖遣使召之盤遊不即往今上急難情切遽以手書諭之建成乃與元吉間行赴太原隋人購求之幾為所獲及義旗建而方至高祖亦喜其獲免因授以兵又曰建成帷薄不修有禽犬之行聞於遠邇今上以為恥嘗流涕諫之建成慙而成憾又曰太宗每總戎律惟以撫接才賢為務至於參請媛素所不行太宗實錄曰隱太子始則流宕河曲逸遊是好素無才略不預經綸於後雖統左軍非衆所附既陞儲兩坐構猜嫌太宗雖備禮竭誠以希恩睦而妬害之心日以滋甚又巢刺王性本兇愎志識庸下行同禽獸兼以棄鎮失守罪戾尤多反害太宗之能於是潛苞毀譖同惡相濟膚受日聞雖大名徽號禮冠㣥后而情疏意隔寵異曩時按建成元吉雖為頑愚既為太宗所誅史臣不無抑揚誣諱之辭今不盡取太子中允王珪洗馬魏徵太子左春坊左庶子為之長掌侍從贊相敷正啟奏中允為之貳洗馬漢官掌前馬唐為司經局長官掌四庫圖籍繕寫刊緝之事唐六典曰後漢太子官屬有中允在中庶子下洗馬上其後無聞唐始置太子中允洗悉薦翻秦王功蓋天下中外歸心殿下但以年長位居東宮說輸芮翻長知兩翻無大功以鎮服海內今劉黑闥散亡之餘衆不滿萬資糧匱乏以大軍臨之勢如拉朽拉盧合翻殿下宜自擊之以取功名因結納山東豪傑庶可自安太子乃請行於上上許之珪頍之兄子也王頍僧辯之子死於隋漢王諒反時頍丘弭翻甲申詔太子建成將兵討黑闥其陝東道大行臺及山東道行軍元帥河南河北諸州並受建成處分將即亮翻陝失冉翻帥所類翻處昌呂翻分扶問翻得以便宜從事武德五年乙酉封宗室略陽公道宗等十八人為郡王道宗道玄從父弟也從才用翻為靈州總管梁師都遣弟洛兒引突厥數萬圍之道宗乘間出擊大破之厥九勿翻間古莧翻突厥與師都相結遣其郁射設入居故五原五原縣屬鹽州武德初寄治靈州故地為突厥所居杜佑曰鹽州西魏五原郡地漢五原縣城在今榆林郡界斥地千餘里毛晃曰斥開拓也魏任城王彰曹操之子擊烏丸有功任音壬武德五年丙申上幸宜州義寧二年以京兆之華原宜君同官置宜君郡武德元年曰宜州武德五年己亥齊王元吉遣兵擊劉十善於魏州破之武德五年癸卯上校獵於富平富平縣屬雍州漢富平縣治唐靈州迴樂縣界後漢移寧州彭原縣界晉移懷德城魏移於懷德城東北今耀州東南富平縣即其地武德五年劉黑闥擁兵而南自相州以北州縣皆附之相息亮翻唯魏州總管田留安勒兵拒守黑闥攻之不下引兵南拔元城復還攻之元城縣治古殷城在朝城東北十二里時魏州治貴鄉縣相息亮翻復扶又翻考異曰實錄十二月甲子黑闥攻魏州蓋留安破黑闥奏到之日也按革命記黑闥攻魏州在十一月今從之武德五年十二月庚戌立宗室孝友等八人為郡王孝友神通之子也武德五年丙辰上校獵於華池京兆三原縣武德四年改池陽六年改華池武德五年戊午劉黑闥陷恆州殺刺史王公政恆戶登翻恆州漢常山郡唐置恆州因恆山為名武德五年庚申車駕至長安武德五年癸亥幽州大總管李藝復廉定二州武德五年甲子田留安擊劉黑闥破之獲其莘州刺史孟柱魏州莘縣隋開皇十六年置莘州大業二年廢唐復置降戶江翻將即亮翻是時山東豪傑多殺長吏以應黑闥長知兩翻上下相猜人益離怨留安待吏民獨坦然無疑白事者無問親疏皆聽直入臥內每謂吏民曰吾與爾曹俱為國禦賊為于偽翻固宜同心協力必欲棄順從逆者但自斬吾首去吏民皆相戒曰田公推至誠以待人當共竭死力報之必不可負有苑竹林者本黑闥之黨潛有異志留安知之不發其事引置左右委以管鑰竹林感激遂更歸心卒收其用卒子恤翻以功進封道國公乙丑幷州刺史成仁重擊范願破之幷卑名翻武德五年劉黑闥攻魏州未下太子建成齊王元吉大軍至昌樂劉昫曰晉置昌樂縣屬陽平郡今縣西古城是也隋廢縣入繁水武德元年復置仍築今治所樂音洛再陳皆不戰而罷陳讀曰陣魏徵言於太子曰前破黑闥其將帥皆懸名處死言亡命者先書其名處以死罪也將即亮翻帥所類翻下同處昌呂翻故齊王之來雖有詔書赦其黨與之罪皆莫之信今宜悉解其囚俘慰諭遣之則可坐視離散矣太子從之黑闥食盡衆多亡或縛其渠帥以降帥所類翻降戶江翻黑闥恐城中兵出與大軍表裏擊之遂夜遁至館陶永濟橋未成不得度館陶縣屬魏州在州北隋煬帝鑿永濟渠所經也宋白曰館陶春秋時晉冠氏邑陶丘在縣西北七里趙時置館於其側因為縣名壬申太子齊王以大軍至黑闥使王小胡背水而陳背蒲妹翻陳讀曰陣自視作橋成即過橋西衆遂大潰考異曰高祖實錄壬申太子與黑闥戰於魏州城下破之闥抽軍北遁甲戌追闥於毛州賊背永濟渠而陳接戰又破之舊傳六年二月太子破黑闥于館陶革命記闥遁至館陶二十五日官軍至闥敗走按館陶即毛州也長曆十二月壬申二十五日甲戌二十七日蓋實錄據奏到之日也舊傳尤疏今從革命記太宗實錄云黑闥重反高祖謂太宗曰前破黑闥欲令盡殺其黨使空山東不用吾言致有今日及隱太子征闥平之將遣唐儉往使男子年十五已上悉阬之小弱及婦女總驅入關以實京邑太宗諫曰臣聞唯德動天唯恩容衆山東人物之所河北蠶綿之鄉而天府委輸待以成績今一旦見其反覆盡戮無辜流離寡弱恐以殺不能止亂非行弔伐之道其事遂寢新書隱太子傳云黑闥敗於洺水太子建成問於洗馬魏徵曰山東其定乎對曰黑闥雖敗殺傷太甚其魁黨皆縣名處死妻子係虜欲降無繇雖有赦令獲者必戮不大蕩宥恐殘賊嘯結民未可安既而黑闥復振廬江王瑗棄洺州山東亂命齊王元吉討之有詔降者赦罪衆不信建成至獲俘皆撫遣之百姓欣悅賊懼夜奔兵追戰黑闥衆猶盛乃縱囚使相告曰褫而甲還鄉里若妻子獲者既已釋矣衆乃散或縛其渠長降遂禽黑闥按高祖雖不仁亦不至有欲空山東之理史臣專欲歸美太宗其於高祖亦太誣矣今采革命記及新書大軍度橋追黑闥度者纔千餘騎橋壞由是黑闥得與數百騎亡去降戶江翻下同騎奇寄翻下同武德五年上以隋末戰士多沒於高麗是歲賜高麗王建武書使悉遣還亦使州縣索高麗人在中土者遣歸其國麗力知翻索山客翻建武奉詔遣還中國民前後以萬數六年六年春正月己卯劉黑闥所署饒州刺史諸葛德威執黑闥舉城降時太子遣騎將劉弘基追黑闥黑闥為官軍所迫奔走不得休息至饒陽饒陽縣前漢屬涿郡後漢屬安平國晉魏屬博陵郡隋屬河間郡唐屬深州黑闥分置饒州將即亮翻從才用翻餒甚德威出迎延黑闥入城黑闥不可德威涕泣固請黑闥乃從之至城旁市中憩止憩去例翻德威饋之食食未畢德威勒兵執之送詣太子幷其弟十善斬於洺州洺彌幷翻考異曰革命記劉黑闥走至深州崔元愻為偽深州總管黑闥欲至城中陳列三千餘兵擬納黑闥據城拒守北勾突厥城人諸葛德威為車騎領當城之兵有張善護者先任鄉長來就軍中語三五少年曰可捉黑闥以取富貴今若不捉在後終是擾亂山東廢我等作生活諸少年咸云非諸葛車騎不可善護知德威非得酒食不肯出師乃於家宰一肥者出酒一石延德威而語之德威許諾黑闥至元愻乃請之入城而不許唯就市中遣鋪設而坐食元愻請以城中兵呈閱言並精銳必堪拒守黑闥食而許之元愻乃召兵以呈之德威以前領健卒出即就市中擒劉闥送於洺州皇太子所元愻與男野久奔突厥斬黑闥於洺州城西臨刑乃嘆云云今從實錄亦兼采革命記我幸在家鉏菜為高雅賢輩所誤至此六年壬午巂州人王摩沙舉兵巂音髓沙讀曰莎蘇何翻自稱元帥改元進通遣驃騎將軍衞彥討之帥所類翻驃匹妙翻騎奇寄翻下同六年庚子以吳王杜伏威為太保唐制太師太傅太保謂之三師正一品天子所師法無所統職功德崇重者乃使居之六年二月庚戌上幸驪山溫湯驪山在雍州新豐有湯泉天寶起華清宮於此驪力知翻甲寅還宮六年平陽昭公主薨戊午葬公主詔加前後部鼓吹班劍四十人班列也持劍成列夾道而行也吹昌瑞翻武賁虎賁也唐諱虎字改為武賁音奔禮婦人無鼓吹上曰鼓吹軍樂也公主親執金鼓興義兵以輔成大業事見一百八十五卷隋義寧元年六年丙寅徐圓朗窮蹙與數騎棄城走為野人所殺其地悉平六年林邑王梵志遣使入貢初隋人破林邑見一百八十卷隋大業九年梵扶汎翻使疏吏翻三郡比景海陰林邑也喪息浪翻林邑復國至是始入貢六年幽州總管李藝請入朝朝直遙翻庚午以藝為左翊衞大將軍六年廢參旗等十二軍十二軍詳見一百八十八卷二年參疏簪翻六年三月癸未高開道掠文安魯城文安縣前漢屬勃海郡後漢屬河間國晉屬章武郡隋唐屬瀛州魯城縣開皇十六年置亦屬瀛州破之驃匹妙翻騎奇寄翻六年庚子梁師都將賀遂索同以所部十二州來降將即亮翻降戶江翻六年乙巳前洪州總管張善安反遣舒州總管張鎮周等擊之舒州同安郡隋為熙州武德四年改舒州以古㣥舒之國也六年夏四月吐谷渾寇芳州刺史房當樹奔松州吐從暾入聲谷音浴西魏逐吐谷渾置同昌郡及封德等縣後周以縣立芳州隋大業初廢武德元年以同昌之常芬縣置芳州省封德松州交川郡治嘉誠縣生羌之地後魏時白水羌舒彭遣使朝貢始置甘松縣魏亂而絕後周復招慰之於此置龍涸防天和六年改置扶州隋改甘松縣為嘉誠縣屬同昌郡武德初置松州取甘松嶺為名六年張善安陷孫州舊唐志武德五