樅陽縣漢屬廬江郡梁置樅陽郡隋廢郡改為同安縣屬廬州祏音石將即亮翻樅七容翻七年庚寅鄒州人鄧同穎殺刺史李士衡反唐初以齊州之鄒平長山置鄒州七年丙申以白狗等羌地置維恭二州維州維川郡以白狗羌降戶姜維故城置其地乃漢蜀郡徼外冉駹之地蜀將姜維馬忠討汶山羌於此故壘在焉恭州即西恭州後改曰笮州又戎州都督府所領羈縻州有曲州本隋之恭州隋亂廢武德元年開南中復置八年改曲州故朱提郡地非此也劉昫曰維州即古西戎地也其地南界江陽岷山連嶺而西不知其極北望隴山積雪如玉東望成都若在井底地接石紐山夏禹生於石紐是也其城在岷山之孤峯三面臨江距成都四百里許杜佑曰維州在當州北二百六十里七年二月章十二行本月下有辛丑二字乙十一行本同孔本同輔公祏遣兵圍猷州刺史左難當嬰城自守宋白曰宣州涇縣唐武德二年置南徐州於此其年改為猷州破之使疏吏翻下同趙郡王孝恭攻公祏鵲頭鎮拔之新志宣州南陵縣有鵲頭鎮七年丁未高麗王建武遣使來請班曆遣使冊建武為遼東郡王高麗王以百濟王扶餘璋為帶方郡王新羅王金真平為樂浪郡王麗力知翻樂浪音洛郎七年始州獠反始州普安郡後改劍州獠魯皓翻七年己酉詔諸州有明一經以上未仕者咸以名聞州縣及鄉皆置學七年壬子行軍副總管權文誕破輔公祏之黨於猷州拔其枚洄等四鎮七年丁巳上幸國子監釋奠詔諸王公子弟各就學七年戊午改大總管為大都督府七年己未高開道將張金樹殺開道來降將即亮翻降戶江翻下同開道見天下皆定欲降自以數反覆不敢高開道既降而復叛自知有反覆之罪數所角翻遂無降意其將卒皆山東人思鄉里咸有離心開道選勇敢士數百謂之假子常直閤內使金樹領之故劉黑闥將張君立亡在開道所與金樹密謀取開道金樹遣其黨數人入閤內與假子遊戲向夕潛斷其弓弦斷丁管翻藏刀槊於牀下合瞑抱之趨出人睡則目合而瞑槊色角翻瞑莫定翻攻開道閤帥讀曰率譟蘇到翻假子將禦之弓弦皆絕刀槊已失爭出降君立亦舉火於外與相應內外惶擾開道知不免乃擐甲持兵坐堂上與妻妾奏樂酣飲擐音宦酣戶甘翻衆憚其勇不敢逼天且明開道縊縊於賜翻又於計翻妻妾及諸子乃自殺金樹陳兵悉收假子斬之幷殺君立死者五百餘人遣使來降詔以其地置媯州以媯水名州媯俱為翻壬戌以金樹為北燕州都督媯州媯川郡治懷戎縣北齊置北燕州本治懷戎唐既以懷戎之地置媯州又以北燕州都督之名寵金樹也燕因肩翻七年戊辰洋集二州獠反陷隆州晉城洋州洋川郡治西鄉縣西鄉漢成固縣蜀立西鄉縣後魏於此置洋州以水為名洋音祥集州符陽郡武德元年析梁州之難江巴州之符陽長池白石置隆州巴西郡漢閬中地劉昫曰西魏置隆州於閬中隋為巴西郡唐復為隆州宋白曰取其連岡地勢高隆為名後魏典略云此州古有隆城堅險因置隆州晉城縣亦閬中地梁置木蘭郡西魏廢郡改西充國曰晉城獠魯皓翻七年是月太保吳王杜伏威薨輔公祏之反也詐稱伏威之命以紿其衆紿蕩亥翻及公祏平趙郡王孝恭不知其詐以狀聞詔追除伏威名籍沒其妻子及太宗即位知其冤赦之復其官爵七年三月初定令以太尉司徒司空為三公次尚書門下中書祕書殿中內侍為六省次御史臺次太常至太府為九寺太常光祿衞尉宗正太僕大理鴻臚司農太府凡九寺次國子學次天策上將府將即亮翻次左右衞至左右領衞為十四衞十二衞及左右監門衞為十四衞兩坊門下坊典書坊三寺家令寺率更寺僕寺十率府左右衞率左右宗衞率左右虞候率左右監門率左右內率少詩照翻率讀如字公主置邑司並為京職事官王府有傅諮議參軍友文學東西閤祭酒長史司馬掾屬主簿史記室錄事參軍錄事功倉戶兵騎法士等七曹參軍參軍事行參軍典籤王國有國令大農尉丞錄事典衞舍人學官長食官長广既牧長典府長公主邑司有令丞主簿謁者舍人家吏掌主家財出入田園徵封之事自開府儀同三司至將仕郎二十八階為文散官開府儀同三司從一品特進正二品光祿大夫從二品金紫光祿大夫正三品銀青光祿大夫從三品正議大夫正四品太中大夫從四品上中大夫從四品下中散大夫正五品上朝議大夫正五品下朝請大夫從五品上朝散大夫從五品下朝議郎正六品上承議郎正六品下奉議郎從六品上通直郎從六品下朝請郎正七品上宣德郎正七品下朝散郎從七品上宣義郎從七品下給事郎正八品上徵事郎正八品下承奉郎從八品上承務郎從八品下儒林郎正九品上登仕郎正九品下文林郎從九品上將仕郎從九品下散悉亶翻下同為武散官驃騎大將軍從一品輔國大將軍正二品鎮軍大將軍從二品冠軍大將軍懷化大將軍正三品上懷化將軍正三品下雲麾將軍歸德大將軍從三品上歸德將軍從三品下忠武將軍正四品上壯武將軍懷化中郎將正四品下宣威將軍從四品上明威將軍歸德中郎將從四品下定遠將軍正五品上寧遠將軍懷化郎將正五品下游騎將軍從五品上游擊將軍歸德郎將從五品下昭武校尉正六品上昭武副尉懷化司階正六品下振威校尉從六品上振威副尉歸德司階從六品下致果校尉正七品上致果副尉懷化中候正七品下翊麾校尉從七品上翊麾副尉歸德中候從七品下宣節校尉正八品上宣節副尉懷化司戈正八品下禦侮校尉從八品上禦侮副尉歸德司戈從八品下仁勇校尉正九品上仁勇副尉懷化執戟長上正九品下陪戎校尉從九品上陪戎副尉歸德執戟長上從九品下驃匹妙翻騎奇寄翻下同為勳官勳級十有二轉為上柱國視正二品十有一轉為柱國視從二品十