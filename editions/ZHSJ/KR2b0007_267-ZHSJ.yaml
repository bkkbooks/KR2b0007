body:
  text: 資治通鑑卷第二百六十七端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千六百戶食實封一千戶賜紫金魚袋臣司馬光奉敕編集後學天台音註後梁紀二太祖神武元聖孝皇帝中開平二年開平二年戊辰九八開平二年八月吳越王鏐遣寧國節度使王景仁奉表詣大梁王茂章奔兩浙見二百六十五卷唐昭宣帝天祐三年景仁即茂章也避梁諱改焉帝曾祖諱茂琳按薛史梁紀元年六月司天監上言請改月辰內戊字為武避諱也淮南遣步軍都指揮使周本南面統軍使呂師造擊吳越九月圍蘇州吳越將張仁保攻常州之東洲拔之宋白曰通州海門縣東南隔水二百餘里本東洲鎮淮南以池州團練使陳璋為水陸行營都招討使帥柴再用等諸將救東洲帥讀曰率大破仁保於魚蕩復取東洲復扶又翻柴再用方戰舟壞長矟浮之僅而得濟矟所角翻家人為之飯僧千人再用悉取其食以犒部兵為于偽翻飯扶晚翻犒苦到翻曰士卒濟我僧何力焉史言柴再用善養士卒而不惑於異端開平二年丙子蜀立皇后周氏后許州人也周氏蓋蜀主建糟糠之妻也開平二年晉周德威李嗣昭將兵三萬出陰地關攻晉州刺史徐懷玉拒守帝自將救之丁丑發大梁乙酉至陝州將即亮翻陝式冉翻戊子岐王所署延州節度使胡敬璋寇上平關金人疆域圖隰州石樓縣有上平關按延州東至隰州百三十里耳胡敬璋蓋渡河來寇也周德威等聞帝將至乙未退保隰州九域志晉州西北至隰州二百五十五里開平二年荊南節度使高季昌遣兵屯漢口漢口漢水入江之口其地在鄂州漢陽縣東大別山下楚王殷遣其將許德勳將水軍擊之至沙頭沙頭即今江陵城南沙頭市殷又遣步軍都指揮使呂師周將兵擊嶺南呂師周降馬殷見上卷元年取昭賀梧蒙龔富六州蒙州隋始安郡之隋化縣唐武德四年置南恭州貞觀二年更名蒙州龔州本漢猛陵縣地隋為永平郡武林縣唐貞觀三年置鷰州七年移鷰州於今州東仍於鷰州舊所置龔州又武德四年以始安郡之龍平豪靜及蒼梧郡之蒼梧置富州九域志昭州東至賀州三百二十五里南至梧州四百九十里南稍斜至龔州五百五十里宋開寶廢富州以龍平縣隸昭州在州東南百六十二里熙寧五年廢蒙州以立山縣隸昭州在州南二百十二里乃養士息民湖南遂安開平二年冬十月蜀主立後宮張氏為貴徐氏為賢其妹為德張氏郪人宗懿之母也郪漢縣唐帶梓州耕之女也徐耕見二百五十八卷唐昭宗大順二年為徐亡蜀張本開平二年華原賊帥溫韜聚衆嵯峨山帥所類翻嵯才何翻峨音俄暴掠雍州諸縣唐帝諸陵發之殆徧溫韜傳韜在華原七年唐諸陵在其境內者悉發掘之取其所藏金寶而昭陵最固韜從埏道下見宮室制度閎麗不異人間中為正寢東西廂列石牀牀上石函中為鐵匣悉藏前代圖書鍾王筆迹紙墨如新韜悉取之遂傳人間惟乾陵風雨不可發雍於用翻開平二年庚戌蜀主講武於星宿山步騎三十萬宿音秀開平二年丁巳帝還大梁考異曰編遺錄在乙卯今從實錄薛史開平二年辛酉以劉隱為清海靜海節度使兼交廣二鎮也然劉氏終不能有安南隱皆留之史言㣥雄割據各收拾衣冠之冑以為用光逢之弟殷衡德裕之孫也開平二年依政進士梁震依政秦蒲陽縣漢臨邛縣後魏置蒲陽郡及依政縣唐屬邛州九域志在州東南五十里至是歸蜀過江陵高季昌愛其才識留之欲奏為判官震恥之高季昌出於奴僕故梁震恥為之僚屬恐及禍乃曰震素不慕榮宦明公不以震為愚必欲使之參謀議但以白衣侍樽俎可也何必在幕府季昌許之震終身止稱前進士不受高氏辟署季昌甚重之以為謀主呼曰先輩唐人呼進士為先輩至今猶然開平二年帝從吳越王鏐之請以亳州團練使寇彥卿為東南面行營都指揮使擊淮南十一月彥卿帥衆二千襲霍丘帥讀曰率為土豪朱景所敗敗補邁翻下同又攻廬壽二州皆不勝淮南遣滁州刺史史儼拒之彥卿引歸寇彥卿兵勢已挫而史儼河東健將汴兵所畏也故聞其至而退開平二年定難節度使李思諫卒難乃旦翻甲戌其子彞昌自為留後開平二年劉守文舉滄德兵攻幽州劉守光求救於晉晉王遣兵五千助之丁亥守文兵至盧蘆臺軍盧蘆宋為乾寧軍地九域志乾寧軍在滄州西北九十里為守光所敗又戰玉田亦敗玉田漢無終縣唐萬歲通天元年更名玉田屬薊州在薊州東南八十里又東北至平州二百里西至幽州三百里亦敗讀如字還從宣翻又如字開平二年癸巳中書侍郎同平章事張策以刑部尚書致仕以左僕射楊涉同平章事開平二年保塞節度使胡敬璋卒靜難節度使李繼徽以其將劉萬子代鎮延州保塞靜難二鎮時皆屬岐開平二年是歲弘農王遣軍將萬全感齎書間道詣晉及岐告以嗣位間古莧翻岐晉淮南之與國開平二年帝將遷都洛陽三年三年春正月己巳遷太廟神主於洛陽甲戌帝發大梁壬申以博王友文為東都留守梁以大梁為東都己卯帝至洛陽庚寅饗太廟辛巳祀圜丘大赦三年丙申以用度稍充初給百官全俸唐自廣明喪亂以來百官俸料額存而已至是復全給三年二月丁酉朔日有食之三年保塞節度使劉萬子暴虐失衆心且謀貳於梁李繼徽使延州牙將李延實圖之延實因萬子葬胡敬璋攻而殺之遂據延州馬軍都指揮使河西高萬興與其弟萬金聞變以其衆數千人詣劉知俊降為高萬興兄弟取鄜延張本後魏置敷城郡及敷城縣隋改曰鄜城唐屬坊州九域志縣在鄜州東一百二十里翟徒歷翻三年三月甲戌帝發洛陽以山南東道節度使楊師厚兼潞州四面行營招討使三年庚辰帝至河中發步騎會高萬興兵取丹延宋白曰丹州秦上郡地苻姚時為三堡鎮後魏大統三年割鄜延二州地置汾州理三堡鎮廢帝以河東汾州同名改為丹州因丹楊川以為名延州項羽以董翳為翟王都高奴即其地魏滅赫連以為統萬鎮後為東夏州後改延州三年丙戌以朔方節度使兼中書令韓遜為潁川王遜本靈州牙校校戶教翻唐末據本鎮朝廷因而授以節鉞三年辛卯丹州刺史崔公實請降丹州保塞軍巡屬三年徐溫以金陵形勝戰艦所聚艦戶黯翻乃自以淮南行軍副使領昇州刺史留廣陵以其假子元從指揮使知誥為昇州防遏兼樓船副使往治之從才用翻治直之翻為徐知誥完理昇州徐溫遂居之張本三年夏四月丙申朔劉知俊移軍攻延州李延實嬰城自守知俊遣白水鎮使劉儒分兵圍坊州後魏太和二年分澄城置白水郡及縣隋廢郡以縣屬馮翊唐屬同州九域志在州西北一百二十里三年庚子以王審知為閩王劉隱為南平王三年劉知俊克延州李延實降降戶江翻三年淮南兵圍蘇州推洞屋攻城推吐雷翻洞屋以木撐拄為之冒以牛皮其狀如洞吳越將臨海孫琰置輪於竿首垂緪投錐以揭之攻者盡露礮至則張網以拒之絙居登翻揭丘傑翻礮與砲同匹貌翻淮南人不能克吳越王鏐遣牙內指揮使錢鏢鏢甫招翻行軍副使杜建徽等將兵救之蘇州有水通城中淮南張網綴鈴懸水中魚鼈過皆知之吳越遊弈都虞候司馬福欲潛行入城故以竿觸網敵聞鈴聲舉網福因得過凡居水中三日乃得入城由是城中號令與援兵相應敵以為神吳越王鏐嘗遊府園見園卒陸仁章樹藝有智而志之志者記之於心被皮義翻果得報而返鏐以諸孫畜之畜吁玉翻養也累遷兩府軍糧都監使兩府鎮海鎮東兩節度府卒子恤翻仁章睦州人也辛亥吳越兵內外合擊淮南兵大破之擒其將何朗等三十餘人奪戰艦二百艘艘蘇遭翻周本夜遁又追敗之於皇天蕩此皇天蕩非真州大江中之皇天蕩按宋熙寧三年平江府崑山縣人郟亶上奏言水利長洲縣界有長蕩皇天蕩此則是也敗補邁翻殿丁練翻多樹旗幟於菰蔣中菰即蔣也幟昌志翻還從宣翻又如字三年岐王所署保大節度使李彥博考異曰編遺錄五代史作彥容今從劉恕廣本鄜州都將嚴弘倚舉城降鄜音夫己未以高萬興為保塞節度使以絳州刺史牛存節為保大節度使梁遂取鄜坊丹延兩鎮三年淮南初置選舉以駱知祥掌之喪亂以來選舉之法廢楊氏能復置之故書三年五月丁卯帝命劉知俊乘勝取邠州知俊難之李繼徽據邠州有鳳翔之援故劉知俊以取之為難乃召還三年佑國節度使王重師鎮長安數年帝在河中怒其貢奉不時己巳召重師入朝以左龍虎統軍劉捍為佑國留後三年癸酉帝發河中己卯至洛陽劉捍至長安王重師不為禮捍譖之於帝云重師潛與邠岐通甲申貶重師溪州刺史尋賜自盡夷其族為劉知俊殺劉捍以叛張本三年劉守文頻年攻劉守光不克劉守文自元年攻守光事始見上卷以重賂招契丹吐谷渾之衆合四萬屯薊州守光逆戰於雞蘇按薛史梁紀是年劉守光上言於薊州西與兄守文戰生禽守文蓋即雞蘇也敗補邁翻守文單馬立於陳前陳讀曰陣泣謂其衆曰勿殺吾弟守光將元行欽識之直前擒之劉守光以子囚父天下之賊也劉守文既聲其罪而討之有誅無赦小不忍以敗大事身為俘囚自取之也守光囚之別室栫以藂棘栫才甸翻藂與叢同乘勝進攻滄州滄州節度判官呂兗孫鶴推守文子延祚為帥乘城拒守兗安次人也安次漢縣唐屬幽州在州東南一百三十里帥所類翻三年忠武節度使兼侍中劉知俊去年更同州匡國軍為忠武軍事見上卷以帝猜忍日甚內不自安及王重師誅知俊益懼帝將伐河東河東謂晉欲以為河東西面行營都統且以知俊有丹延之功厚賜之知俊弟右保勝指揮使知浣從帝在洛陽密使人語知俊云語牛倨翻入必死又白帝請帥弟姪往迎知俊帥讀曰率帝許之六月乙未朔知俊奏為軍民所留遂以同州附於岐考異曰實錄六月庚戌知俊據本郡反削奪官爵興師討伐編遺錄六月乙未初奏本道軍民遮留尋聞擒使臣及將送鳳翔蓋編遺據奏到之日實錄據削奪之日也皆械送於岐遣兵襲華州逐刺史蔡敬思九域志同州南至華州七十里華戶化翻潛遣人以重利啗長安諸將啗徒濫翻執劉捍送於岐殺之知俊遣使請兵於岐亦遣使請晉人出兵攻晉絳遺晉王書曰不過旬日可取兩京復唐社稷遺唯季翻長安可以言取梁都洛陽未易取也三年丁未朔方節度使韓遜奏克鹽州斬岐所署刺史李繼直唐末鹽州奏事專達朝廷不隸靈夏至是靈鹽遂復合為一鎮三年帝遣近臣諭劉知俊曰朕待卿甚厚何忽相負對曰臣不背德背蒲妹翻但畏族滅如王重師耳帝復使謂之曰復扶又翻劉捍言重師陰結邠岐朕今悔之無及捍死不足塞責塞悉則翻知俊不報庚戌詔削知俊官爵以山南東道節度使楊師厚為西路行營招討使帥侍衞馬步軍都指揮使劉鄩等討之帥讀曰率辛亥帝發洛陽劉鄩至潼關東獲劉知俊伏路兵藺如海等三十人釋之使為前導劉知俊既得潼關於關外沿路伏兵以候望劉鄩反得而用之以為鄉導史炤曰藺姓也其先韓獻子玄孫曰康食采於藺因氏焉盤桓數日乃至關下關吏納之如海等繼至關吏不知其已被擒亦納之被皮義翻鄩兵乘門開直進遂克潼關追及知浣擒之癸丑帝至陝陝式冉翻三年丹州馬軍都頭王行思等作亂刺史宋知誨逃歸三年帝遣劉知俊姪嗣業持詔詣同州招諭知俊知俊欲輕騎詣行在謝罪弟知偃止之楊師厚等至華州知俊將聶賞開門降聶尼輒翻姓也史炤曰楚大夫食采於聶因以為氏知俊聞潼關不守官軍繼至蒼黃失圖乙卯章十二行本卯下有夜字乙十一行本同孔本同張校同舉族奔岐楊師厚至長安岐兵已據城師厚以奇兵並南山急趨自西門入遂克之並步浪翻按唐長安城十門西南三門惟延平門近南山耳長安既丘墟之餘且城大難守使楊師厚不以奇兵入西門岐兵亦不能久也庚申以劉鄩權佑國留後岐王厚禮劉知俊以為中書令地狹無藩鎮處之處昌呂翻但厚給俸祿而已蹄涔不容尺鯉為劉知俊奔蜀張本三年劉守光遣使上表告捷且言俟滄德事畢為陛下掃平幷寇為于偽翻河東幷州之地時與梁為敵故言幷寇亦致書晉王云欲與之同破偽梁劉守光反覆梁晉之間自以為得計不知乃所以速亡也三年撫州刺史危全諷自稱鎮南節度使帥撫信袁吉之兵號十萬攻洪州唐置鎮南軍於洪州撫信袁吉皆巡屬也危全諷自稱節度舉兵以攻洪州欲兼而有之九域志撫州西北至洪州二百九里帥讀曰率將吏皆懼節度使劉威密遣使告急於廣陵日召僚佐宴飲全諷聞之屯象牙潭不敢進象牙潭在撫州金溪縣東北楚王殷遣指揮使苑玫苑姓也左傳齊有大夫苑何忌玫莫杯翻玫蔡州人玫莫杯翻彥章玕之兄章十二行本兄下有子字孔本同也彭玕見二百六十有五卷唐昭宣帝天祐三年徐溫問將於嚴可求可求薦周本乃以本為西南面行營招討應援使將兵七千救高安本以前攻蘇州無功事見上四月可求即其臥內強起之強其兩翻本曰蘇州之役敵不能勝我但主將權輕耳今必見用願毋置副貳乃可可求許之本曰楚人為全諷聲援耳非欲取高安也吾敗全諷敗補邁翻援兵必還援兵謂圍高安之兵還從宣翻趣七喻翻過洪州劉威欲犒軍犒苦到翻本不肯留或曰全諷兵強君宜觀形勢然後進本曰賊衆十倍於我我軍聞之必懼不若乘其銳而用之三年秋七月甲子以劉守光為燕王三年梁兵克丹州擒王行思三年商州刺史李稠驅士民西走將奔蜀也考異曰薛史稠棄郡西奔本州將吏以都牙校李玟權知州事歐陽史商州軍亂逐其刺史李稠稠奔于岐實錄丙寅陝州奏商州刺史李稠棄郡逃山谷又曰商州將吏以稠驅虜士庶西遁追斬無遺暫令都押牙李玟主州事今從之三年庚午改佑國軍曰永平開平元年徙佑國軍於長安今改曰永平三年河東兵寇晉州抄掠至堯祠而去堯都平陽有祠在汾城東十里東原上平陽唐為臨汾縣晉州所治也三年癸酉帝發陝州乙亥至洛陽寢疾三年初帝召山南東道節度使楊師厚欲使督諸將攻潞州以前兗海留後王班為留後鎮襄州考異曰薛史作王王玉今從實錄宜備之為于偽翻班自恃左右有壯士不以為意每衆辱之戊寅讁求戍西境是夕作亂殺班推都指揮使雍丘劉王巳為留後雍於用翻王巳區里翻王巳偽從之明日與指揮使王延順逃詣帝所考異曰姚顗明宗實錄薛史王巳傳皆云翌日受賀衙庭享士伏甲幕下中筵盡斬其亂將以聞以功為復州刺史按梁祖實錄八月丁酉賜王巳王延順物以其違逆將之難來歸編遺錄斬李洪等敕云始扶劉王巳既奔竄以歸明若使王巳翌日便斬亂將襄州何由至九月始收復蓋王巳脫身歸朝及梁亡入唐妄云斬亂將自誇大史官不能考察從而書之耳附於蜀未幾房州刺史楊虔亦叛附于蜀幾居豈翻三年危全諷在象牙潭營柵臨溪亙數十里亙居鄧翻庚辰周本隔溪布陳陳讀曰陣先使羸兵嘗敵羸倫為翻嘗試也全諷兵涉溪追之本乘其半濟縱兵擊之全諷兵大潰自相蹂藉蹂忍久翻又如又翻藉慈夜翻溺水死者甚衆本分兵斷其歸路斷音短擒全諷及將士五千人乘勝克袁州執刺史彭彥章進攻吉州九域志袁州南至吉州三百一十五里信州刺史危仔倡請降唐僖宗中和二年危全諷據撫州仔倡據信州至是皆亡行營都指揮使米志誠都尉呂師造等敗苑玟於上高敗補邁翻吉州刺史彭玕帥衆數千人奔楚唐昭宗天祐三年彭玕附楚郴丑林翻為子希範娶其女為于偽翻淮南以左先鋒指揮使張景思知信州遣行營都虞候骨言將兵五千送之骨姓也唐初有骨儀奔吳越吳越王鏐以仔倡為淮南節度副使更其姓曰元氏歐史十國世家曰錢鏐惡危姓更之曰元更工衡翻弘農王以其嘗有德於武忠王釋之資給甚厚楊行密諡武忠時淮南諸將議曰昔先王攻趙鍠全諷屢饟給吾軍乃釋之虔州刺史盧光稠以州附于淮南於是江西之地盡入於楊氏光稠亦遣使附於梁三年甲寅上疾小瘳始復視朝自七月乙亥寢疾至是凡四十日朝直遙翻下同三年以鎮國節度使康懷貞為西路行營副招討使三年蜀主命太子宗懿判六軍開永和府妙選朝士為僚屬三年辛酉均州刺史張敬方奏克房州楊虔以房州附蜀見上九域志均州南至房州二百一十五里三年岐王欲遣劉知俊將兵攻靈夏夏戶雅翻且約晉王使攻晉絳晉王引兵南下先遣周德威等將兵出陰地關攻晉州刺史邊繼威悉力固守晉兵穿地道陷城二十餘步城中血戰拒之一夕城復成詔楊師厚將兵救晉州周德威以騎扼蒙阬之險蒙阬在汾水東東西三百餘里蹊徑不通進抵晉州晉兵解圍遁去考異曰實錄云殺戮生禽賊將蕭萬通等賊由是棄寨而遁莊宗實錄云汴軍至蒙阬周德威逆戰敗之斬首二百級師厚退絳州是役也小將蕭萬通戰沒師厚進營平陽德威收軍而退二軍各言勝捷然既殺蕭萬通師厚何肯退保絳州既敗而退豈得復進營平陽德威既戰勝安肯便收軍蓋晉軍實敗走莊宗實錄妄言耳三年李洪寇荊南高季昌遣其將倪可福擊敗之敗補邁翻詔馬步都指揮使陳暉將兵會荊南兵討洪三年蜀主以御史中丞王鍇為中書侍郎同平章事鍇苦駭翻三年陳暉軍至襄州李洪逆戰大敗王求死九月丁酉拔其城斬叛兵千人執李洪楊虔等送洛陽斬之三年丁未以保義節度使王檀為潞州東面行營招討使三年劉守光奏遣其子中軍兵馬使繼威安撫滄州吏民戊申以繼威為義昌留後三年辛亥侍中韓建罷守太保左僕射同平章事楊涉罷守本官以太常卿趙光逢為中書侍郎翰林奉旨工部侍郎杜曉為戶部侍郎並同平章事梁改翰林承旨為翰林奉旨以廟諱誠避嫌諱也然誠字與承字各自翻切不同讓能之子也杜讓能死國難見二百五十九卷唐昭宗景福二年三年淮南遣使者張知遠脩好於福建好呼到翻知遠倨慢閩王審知斬之表上其書上時掌翻審知性儉約常躡麻屨躡尼輒翻府舍卑陋未嘗營葺寬刑薄賦公私富實境內以安歲自海道登萊入貢沒溺者什四五自福建入貢大梁陸行當由衢信取饒池界渡江取舒廬壽渡淮而後入梁境然自信饒至廬壽皆屬楊氏而朱楊為世仇不可得而假道故航海入貢今自福州洋過溫州洋取台州洋過天門山入明州象山洋過涔江掠洌港直東北渡大洋抵登萊岸風濤至險故沒溺者衆三年冬十月甲子蜀司天監胡秀林獻永昌曆行之歐陽修曰永昌曆止行於其國今亡不復見三年湖州刺史高澧性凶忍嘗召州吏議曰吾欲盡殺百姓可乎吏曰如此租賦何從出當擇可殺者殺之耳時澧糾民為兵有言其咨怨者澧悉集民兵于開元寺開元寺今諸州間亦有之蓋唐開元中所置也入則殺之死者踰半在外者覺之縱火作亂澧閉城大索索山客翻凡殺三千人吳越王鏐欲誅之戊辰澧以州叛附于淮南高澧父子以一州之地介居錢楊之間率兩附以自存為日久矣今專附淮南錢氏之兵至矣九域志杭州仁和縣有臨平鎮按仁和縣本錢塘縣宋朝太平興國初改錢塘縣曰仁和蓋亦先有義和地名又避太宗藩邸舊名遂改曰仁和也三年十一月甲午帝告謝於圜丘告謝者告天而謝得天下也按歐史是日日南至徐無黨註曰不曰有事于南郊蓋比南郊禮差簡戊戌大赦三年鄴王羅紹威得風痹病痹必至翻上表稱魏故大鎮多外兵願得有功重臣鎮之臣乞骸骨歸第帝聞之撫案動容撫案動容非矜羅紹威之病也魏博大鎮世襲者百五十年一旦委鎮請代出於意料之表喜溢于中不知手之撫容之動也己亥以其子周翰為天雄節度副使知府事謂使者曰亟歸語而主亟紀力翻急也語牛倨翻而汝也為我強飯為于偽翻強其兩翻飯扶晚翻如有不可諱謂死也今使周翰領軍府尚冀爾復愈耳考異曰梁功臣列傳朝廷自開創有大事皆降使咨訪紹威有謀慮亦馳簡獻替或中途相遇意互合者十得五六太祖嘆曰竭忠力一人而已又曰子三人長廷規司農卿尚安陽公主又尚金華公主早卒次周翰起復雲麾將軍充天雄節度留後尋檢校司徒正授魏博節度使亦早卒次曰周敬薛史亦同實錄己亥以司門郎中羅廷規充魏博節度副使知府事仍改名周翰時鄴王紹威病日甚慮以後事故奏請焉莊宗列傳紹威卒溫以其子周翰嗣政莊宗實錄紹威厚率重斂傾府藏以奉溫小有違忤溫即遣人詬辱紹威方懷愧恥悔自弱之謀乃潛收兵市馬陰有覆溫之志而賂溫益厚溫怪其曲事慮蓄奸謀而莫之察乃賜紹威妓妾數人皆承嬖愛未半歲溫卻召還以此得其陰事內相矛楯薛史又云開平四年夏詔金華公主出家為尼居於宋州玄靜寺蓋太祖推恩於羅氏令終其婦節也唐餘錄歐陽史皆同惟唐莊宗實錄獨異按均帝時趙巖等言羅紹威前恭後倨太祖每深含怒似與此言合然梁祖若聞紹威有陰謀必不使周翰更居魏疑後唐史以紹威與梁最親疾之而載此傳聞之語今從衆書廷規更名周翰亦恐實錄之誤三年岐王欲取靈州以處劉知俊處昌呂翻且以為牧馬之地使知俊自將兵攻之朔方節度使韓遜告急章十二行本告上有遣使二字乙十一行本同孔本同張校同退齋校同詔鎮國節度使康懷貞感化節度使寇彥卿將兵攻邠寧以救之懷貞等所向皆捷克寧衍二州拔慶州南城刺史李彥廣出降寧慶衍三州皆靜難軍巡屬岐地也周顯德五年廢衍州為定平鎮隸汾州九域志熙寧五年以汾州定平縣隸涇州在州南六十里劉知俊聞之十二月己丑解靈州圍引兵還帝急召懷貞等還遣兵迎援於三原青谷懷貞等還至三水三水漢古縣唐屬邠州九域志在州東北六十里薛史曰知俊邀擊懷貞等於邠州長城嶺五代會要曰開平元年改左右親隨軍將馬軍為左右龍驤軍懷貞與裨將李德遇許從實王審權分道而行皆與援兵不相值至昇平唐天寶十二載分宜君置昇平縣屬坊州懷貞大敗僅以身免德遇等軍皆沒岐王以知俊為彰義節度使鎮涇州王彥章驍勇絕倫驍堅堯翻每戰用二鐵槍皆重百斤一置鞍中一在手所向無前時人謂之王鐵槍三年蜀蜀州刺史王宗弁稱疾罷歸成都杜門不出王宗弁鹿弁也蜀主養以為子賜姓名加檢校太保固辭不受謂人曰廉者足而不憂貪者憂而不足吾小人致位至此足矣豈可求進不已乎蜀主嘉其志而許之賜與有加宗弁之祈閒以蜀主之雄猜也三年劉守光圍滄州久不下劉守光自五月攻滄州猶固守城中食盡民食菫泥軍士食人驢馬相噉騣尾噉徒濫翻騣子紅翻呂兗選男女羸弱者飼以麴麥丏而烹之羸倫為翻飼祥吏翻麴丘六翻酒母麥丏眠見翻麥粉以給軍食謂之宰殺務四年四年春正月乙未劉延祚力盡出降時劉繼威尚幼劉繼威守光之子也為張萬進殺劉繼威張本族呂兗而釋孫鶴兗子琦年十五門下客趙玉紿監刑者曰此吾弟也勿妄殺監刑者信之遂挈以逃琦足痛不能行玉負之變姓名乞食於路僅而得免琦感家門殄滅力學自立晉王聞其名授代州判官孫鶴終不免於誅呂琦能自樹立天乎人也四年辛丑以盧光稠為鎮南留後盧光稠以虔州附梁鎮南軍置於洪州時已為淮南所有四年劉守光為其父仁恭請致仕為于偽翻丙午以仁恭為太師致仕守光尋使人潛殺其兄守文歸罪於殺者而誅之四年二月萬全感自岐歸廣陵前年淮南使萬全感使晉及岐嗣吳王唐昭宗天復二年封楊行密吳王今岐王承制加隆演嗣王四年高澧求救於吳吳常州刺史李簡等將兵應之湖州將盛師友沈行思閉城不內澧帥麾下五千人奔吳按唐昭宗乾寧四年李彥徽奔淮南錢鏐取湖州天復二年徐許亂杭州湖州刺史高彥遣子渭入援唐昭宣帝天祐三年彥卒子澧代立至是而敗帥讀曰率癸巳吳越王鏐巡湖州以錢鏢為刺史四年蜀太子宗懿驕暴好陵暴章十二行本暴作傲乙十一行本同孔本同張校同舊臣好呼到翻內樞密使唐道襲蜀主之嬖臣也太子屢謔之於朝嬖匹計翻又卑義翻謔迄卻翻戲也由是有隙互相訴於蜀主蜀主恐其交惡以道襲為山南西道節度使同平章事道襲薦宣徽北院使鄭頊為內樞密使頊受命之日即欲按道襲昆弟盜用內庫金帛道襲懼奏頊褊急不可大任褊補辨翻丙午出頊為果州刺史以宣徽南院使潘炕為內樞密使為宗懿殺道襲張本炕口盎翻四年夏州都指揮使高宗益作亂殺節度使李彞昌將吏共誅宗益推彞昌族父蕃漢都指揮使李仁福為帥考異曰薛史仁福本党項拓跋氏唐末拓跋思恭以破黃巢功賜姓故仁福之族亦姓李歐陽史云不知其於思諫為親疏也按仁福諸子皆連彞字則於彞昌必父行也按李仁福子孫強盛遂為宋朝西邊之禍所謂西夏也癸丑仁福以聞夏四月甲子以仁福為定難節度使難乃旦翻四年丁卯宋州節度使衡王友諒獻瑞麥一莖三穗帝曰豐年為上瑞今宋州大水安用此為詔除本縣令名本縣指產瑞麥之縣令力正翻詰去吉翻以兗海留後惠王友能代為宋州留後歐陽史職方考梁都大梁徙宣武節度使於宋州薛史開平三年五月升宋州為宣武軍節鎮仍以亳輝潁為屬郡皆全昱子也廣王全昱帝兄也四年帝以晉州刺史下邑華溫琪拒晉兵有功欲賞之華戶化翻姓也會護國節度使冀王友謙上言晉絳邊河東乞別建節鎮壬申以晉絳沁三州為定昌軍以溫琪為節度使沁七鴆翻四年左金吾大將軍寇彥卿入朝至天津橋有民不避道投諸欄外而死據歐史寇彥卿傳民姓梁名現首式又翻帝以彥卿才幹有功久在左右命以私財遺死者家以贖罪遺唯季翻御史司憲崔沂唐高宗以御史大夫為大司憲蓋以御史執法之官故名之梁置御史司憲既曰御史復曰司憲蓋不考名官之義也彥卿殺人闕下請論如法帝命彥卿分析崔沂請依法論彥卿之罪帝欲寬之故使分析分析者使彥卿置對分疏辯析梁現致死之由劾戶概翻又戶得翻令從者舉置欄外從才用翻不意誤死帝欲以過失論沂奏在法以勢力使令為首下手為從不得歸罪從者不鬬而故毆傷人毆烏口翻加傷罪一等不得為過失辛巳責授彥卿遊擊將軍左衞中郎將彥卿揚言有得崔沂首者賞錢萬緡沂以白帝帝使人謂彥卿謂者告語之也崔沂有毫髮傷我當族汝時功臣驕橫橫戶孟翻由是稍肅沂沆之弟也崔沆見二百五十四卷唐僖宗廣明元年四年五月吳徐溫母周氏卒將吏致祭為偶人高數尺衣以羅錦溫曰此皆出民力柰何施於此而焚之宜解以衣貧者偶人起於古之芻靈中世謂之俑則機械發動其手足耳目真有類於生人孔子曰始作俑者其無後乎正謂此也高居號翻衣於既翻起復為內外馬步軍都軍使領潤州觀察使幾居豈翻起復之制通古今疑之禮記子夏問曰三年之喪卒哭金革之事無避也者禮與其非禮與孔子曰吾聞諸老聃昔者魯公伯禽有為為之也今以三年之喪從其利者吾弗知也註云伯禽封於魯有徐戎作難卒哭而征之急王事也自漢以後不許二千石以上行三年喪魏晉聽行三年喪而大臣率有以奪情起復者習俗聞見以為當然莫之非也嗚呼此豈非孔子所謂以三年之喪從其利者乎若王莽之志不在喪徐溫之起復所謂從其利者又難言也四年岐王屢求貨於蜀蜀主皆與之又求巴劍二州蜀主曰吾奉茂貞勤亦至矣若與之地是棄民也寧多與之貨乃復以絲茶布帛七萬遺之復扶又翻遺唯季翻四年己亥以劉繼威為義昌節度使劉守光之請也四年癸丑天雄節度使兼中書令鄴貞莊王羅紹威卒自開平以後國主皆書殂其後書卒四年匡國節度使長樂忠敬王馮行襲疾篤二年改許州忠武軍為匡國軍見上卷樂音洛許州牙兵二千皆秦宗權餘黨帝深以為憂六月庚戌命崇政院直學士李珽馳往視行襲病崇政院直學士即宋朝樞密直學士之職五代會要開平二年十一月置崇政院直學士二員選有政術文學者為之後又改為直崇政院李珽即諫成汭造大船者汭敗歸趙匡凝匡凝敗歸梁珽徒鼎翻善諭朕意勿使亂我近鎮珽至許州謂將吏曰天子握百萬兵去此數舍三十里為一舍九域志許州至洛陽三百一十五里勿使上有所疑汝曹赤心奉國何憂不富貴由是衆莫敢異議行襲欲使人代受詔珽曰東首加朝服禮也論語曰疾君視之東首加朝服拖紳受詔如見君天威不違顏咫尺之意守式又翻朝直遙翻謂行襲曰公善自輔養勿視事此子孫之福也行襲泣謝遂解兩使印授珽兩使印節度使觀察使印使疏吏翻帝聞之曰予固知珽能辦事馮族亦不亡矣庚辰行襲卒甲申以李珽權知匡國留後悉以行襲兵分隸諸校冒馮姓者皆還宗冒馮姓者皆行襲之養子也使之歸宗所以消散其黨校戶教翻四年楚王殷求為天策上將詔加天策上將軍殷始開天策府以弟賨為左相存為右相賨藏宗翻殷遣將侵荊南軍于油口油口在江陵府公安縣斬首五千級逐北至白田而還還從宣翻又如字四年吳水軍指揮使敖駢圍吉州刺史彭玕弟瑊於赤石瑊古咸翻即吉州之赤石洞彭氏巢穴也楚兵救瑊虜駢以歸四年秋七月章十二行本月下有戊子朔三字乙十一行本同孔本同蜀門下侍郎兼吏部尚書同平章事韋莊卒四年吳越王鏐表宦者周延誥等二十五人唐末避禍至此非劉韓之黨乞原之劉韓謂劉季述韓全誨也此屬吾知其無罪但今革弊之初不欲置之禁掖可且留於彼諭以此意四年岐王與邠涇二帥邠帥李繼徽涇帥劉知俊帥所類翻請合兵攻定難節度使李仁福難乃旦翻晉王遣振武節度使周德威將兵會之合五萬衆圍夏州仁福嬰城拒守夏戶雅翻四年八月以劉守光兼義昌節度使考異曰實錄是歲五月以義昌留後劉繼威為義昌節度使八月又云以守光兼義昌節度使不言置繼威於何處或者復為留後不然守光兼幽滄節度使繼威但為滄州節度使皆不可知今兩存之余謂先是以劉守光子繼威為義昌節度使繼威童騃故復命守光兼領之蓋亦守光之志也四年鎮定自帝踐祚以來祚當作阼章十二行本正作阼孔本同而貢獻甚勤會趙王鎔母何氏卒庚申遣使弔之且授起復官時鄰道弔客皆在館使者見晉使歸言於帝曰鎔潛與晉通鎮定勢強恐終難制帝深然之為遣兵圖鎮定二鎮附晉張本四年壬戌李仁福來告急甲子以河南尹兼中書令張全義章十二行本作宗奭乙十一行本同孔本同張校同退齋校同為西京留守帝恐晉兵襲西京晉兵自潞州下懷孟則西京震動矣據歐史職方考梁以鄧州為宣化軍所以衞洛陽也丙寅帝發洛陽己巳至陝陝式冉翻辛未以鎮國節度使楊師厚為西路行營招討使會感化節度使康懷貞將兵三萬屯三原唐末以徐州數經叛亂廢武寧軍尋復以為感化軍歐史職方考徐州直註武寧軍華州註感化軍蓋梁改華州鎮國軍為感化軍也一曰感化軍陝州梁初改同州為忠武軍蓋劉知俊之叛又改同州為鎮國軍既而聞其在綏銀磧中晉兵趨夏州率自麟府濟河西至夏州按九域志麟州西至夏州三百五十里西南至銀州一百八十里綏州西至夏州四百里所謂磧中皆旱海及無定河川之地磧七迹翻無足慮也甲申遣夾馬指揮使李遇劉綰自鄜延趨銀夏邀其歸路梁置左右堅銳夾馬突將趨七喻翻四年吳越王鏐築捍海石塘今杭州城外瀕浙江皆有石塘上起六和塔下抵艮山門外皆錢氏所築大脩臺館由是錢唐富庶盛於東南四年九月己丑上發陝甲午至洛陽疾復作復扶又翻四年李遇等至夏州岐晉兵皆解去四年冬十月遣鎮國節度使楊師厚相州刺史李思安將兵屯澤州以圖上黨四年吳越王鏐之巡湖州也留沈行思為巡檢使與盛師友俱歸行思謂同列陳王褱曰王若以師友為刺史何以處我是年三月鏐巡湖州處昌呂翻王褱詣鎮海軍府何不自詣王所論之行思從之既至數日王褱送其家亦至行思恨王褱賣己鏐自衣錦軍歸錢鏐生於臨安石鏡鎮里中有大木鏐幼與㣥兒戲木下鏐坐大石指揮㣥兒為隊伍號令有法㣥兒憚之及貴唐昭宗改鏐所居鄉為廣義鄉里為勳貴里所居營曰衣錦營石鏡山為衣錦山鏐每遊衣錦軍宴故老山林皆覆以錦號其幼所常戲大木曰衣錦將軍作歌曰三郎還鄉兮衣錦衣父老遠來相追隨斗牛無孛人無欺吳越一王駟馬歸紿徒亥翻衣於既翻行思取鍛槌擊王褱殺之鍛都玩翻小冶也槌傳追翻因詣鏐與師友論功論逐高澧之功欲刺師友槊色角翻刺七亦翻衆執之鏐斬行思以師友為婺州刺史四年十一月己丑以寧國節度使同平章事王景仁充北面行營都指揮招討使潞州副招討使韓勍副之勍渠京翻以李思安為先鋒將趣上黨趣七喻翻尋遣景仁等屯魏州意在圖鎮定不在上黨也四年蜀主更太子宗懿名曰元坦更工衡翻庚戌立假子宗裕為通王宗範為夔王宗鐬為昌王鐬火外翻宗壽為嘉王宗翰為集王立其子宗仁為普王宗輅為雅王宗紀為褒王宗智為榮王宗澤為興王宗鼎為彭王宗傑為信王宗衍為鄭王初唐末宦官典兵者多養軍中壯士為子以自強如田令孜楊復恭之類而蜀主尤多惟宗懿等九人及宗特宗平真其子宗裕宗鐬宗壽皆其族人宗翰姓孟蜀主之姊子宗範姓張其母周氏為蜀主妾自餘假子百二十人皆功臣雖冒姓連名而不禁婚姻史言假父假子皆以利合非人倫之正四年上疾小愈辛亥校獵於伊洛之間伊洛二水之間也四年上疑趙王鎔貳於晉先有疑心因晉使在館愈疑之會燕王守光發兵屯淶水欲侵定州上遣供奉官杜廷隱丁延徽監魏博兵三千分屯深冀唐末置東頭供奉官西頭供奉官後皆為西班寄祿助趙守禦又云分兵就食趙將石公立戍深州白趙王鎔請拒之鎔遽命開門移公立於外以避之公立出門出深州城門朱氏滅唐社稷三尺童子知其為人而我王猶恃姻好以長者期之鎔子昭祚娶梁女見二百六十二卷唐昭宗光化三年好呼到翻長知兩翻惜乎此城之人今為虜矣梁人有亡奔真定以其謀告鎔者鎔大懼又不敢先自絕但遣使詣洛陽訴稱燕兵已還與定州講和如故定州謂義武節度使王處直也奔走驚駭乞召兵還上遣使詣真定慰諭之未幾廷隱等閉門盡殺趙戍兵乘城拒守幾居豈翻鎔始命石公立攻之不克乃遣使求援於燕晉鎔使者至晉陽義武節度使王處直使者亦至欲共推晉王為盟主合兵攻梁晉王會將佐謀之皆曰鎔久臣朱溫唐昭宗光化三年王鎔服於朱全忠及其受禪遂臣事之輸舂遇翻結以婚姻其交深矣此必詐也宜徐觀之王曰彼亦擇利害而為之耳王氏在唐世猶或臣或叛謂王武俊承宗及王庭湊也彼朱溫之女何如壽安公主王鎔曾祖元逵尚唐絳王悟女壽安公主何顧婚姻我若疑而不救正墮朱氏計中宜趣發兵赴之趣讀曰促晉趙叶力破梁必矣乃發兵遣周德威將之出井陘屯趙州史言晉王識虛實見兵勢陘音刑鎔使者至幽州燕王守光方獵幕僚孫鶴馳詣野謂守光曰趙人來乞師此天欲成王之功業也守光曰何故對曰比常患其與朱溫膠固比毗至翻近也溫之志非盡吞河朔不已今彼自為讎敵王若與之幷力破梁則鎮定皆斂袵而朝燕矣鎮王鎔定王處直朝直遙翻但恐晉人先我矣守光曰王鎔數負約先悉薦翻數所角翻今使之與梁自相弊吾可以坐承其利自戰國以來卞莊刺虎鷸蚌相持犬兔俱斃皆此說也苟不能審勢見機則此說誤人多矣章十二行本焉下有趙使者交錯於路守光竟不為出兵十四字乙十一行本同孔本同張校同退齋校同自是鎮定復稱唐天祐年號復以武順為成德軍鎮定臣梁稱開平年號避梁廟諱改成德軍為武順軍今既與梁猜阻故年號軍號皆復唐之舊司天言來月太陰虧不利宿兵於外上召王景仁等還洛陽十二月己未上聞趙與晉合晉兵已屯趙州乃命王景仁等將兵擊之庚申景仁等自河陽渡河會羅周翰兵合四萬軍于邢洺四年虔州刺史盧光稠疾病欲以位授譚全播疾革曰病譚全播與盧光稠同起兵者也光稠卒其子韶州刺史延昌來奔喪全播立而事之吳遣使拜延昌虔州刺史延昌受之亦因楚王殷密通表於梁曰我受淮南官以緩其謀耳必為朝廷經略江西為于偽翻盧延昌此言欲得鎮南旌節耳丙寅以延昌為鎮南留後延昌表其將廖爽為韶州刺史廖力救翻今讀如料姓苑云周王子伯廖之後後漢有廖湛爽贛人也贛音紺吳淮南節度判官嚴可求請置制置使於新淦縣新淦漢古縣唐屬吉州九域志在虔州北六百里宋白曰縣南有子淦山因名淦音紺又音甘以圖虔州每更代輒潛益其兵虔人不之覺也更工衡翻為淮南併虔州張本四年庚午蜀主以御史中丞周庠戶部侍郎判度支庾傳素並為中書侍郎同平章事四年太常卿李燕等刊定梁律令格式癸酉行之按五代會要新刪定令三十卷式二十卷格一十卷律幷目錄一十三卷律疏三十卷共一百三卷目為大梁新定格式律令頒下施行四年丁丑王景仁等進軍柏鄉四年辛巳蜀大赦改明年元曰永平四年趙王鎔復告急於晉復扶又翻王景仁等之軍侵逼故復告急晉王以蕃漢副總管李存審守晉陽自將兵自贊皇東下贊皇縣以山得名宋白曰贊皇本漢鄗縣地隋開皇六年置贊皇縣縣南有贊皇山因名按九域志宋廢贊皇縣為鎮屬高邑縣高邑縣在趙州西南四十二里章十二行本以上有五千二字乙十一行本同孔本同張校同從從才用翻辛巳晉王至趙州與周德威合獲梁芻蕘者二百人刈草曰芻采薪曰蕘蕘如招翻初發洛陽梁主有何號令對曰梁主戒上將云鎮州反覆終為子孫之患今悉以精兵付汝鎮州雖以鐵為城必為我取之必為于偽翻晉王命送於趙使趙人聞此言以堅其附晉之心壬午晉王進軍距柏鄉三十里遣周德威等以胡騎迫梁營挑戰挑徒了翻梁兵不出癸未復進距柏鄉五里營於野河之北又遣胡騎迫梁營馳射且詬之復扶又翻詬古候翻又許候翻梁將韓勍等將步騎三萬分三道追之鎧冑皆被繒綺鏤金銀光彩炫耀被皮義翻繒慈陵翻鏤郎豆翻炫熒絹翻晉人望之奪氣周德威謂李存璋曰梁人志不在戰徒欲曜兵耳不挫其銳則吾軍不振乃徇于軍曰彼皆汴州天武軍五代會要曰開平元年四月改左右長直為左右龍虎軍左右內衙為左右羽林軍左右堅銳夾馬突將為左右神武軍左右親隨軍將馬軍為左右龍驤軍其年九月置左右天興左右廣勝軍仍以親王為軍使二年十月置左右神捷軍十二月改左右天武為左右龍虎軍左右龍虎為左右天武軍左右天威為左右羽林軍左右羽林為左右天威軍左右英武為左右神武軍左右神武為左右英武軍前朝置神虎等六軍謂之衞士至是以天武天威英武等六軍易其軍號而任勳舊焉衣鎧雖鮮十不能當汝一擒獲一夫足以自富此乃奇貨不可失也德威自引千餘精騎擊其兩端陳有厚薄中軍堅厚不可衝擊擊其兩端以其薄也出入數四俘獲百餘人且戰且卻距野河而止梁兵亦退德威言於晉王曰賊勢甚盛宜按兵以待其衰王曰吾孤軍遠來救人之急三鎮烏合利於速戰鎮定河東是為三鎮言三鎮之兵合而為一當乘初至之銳以破敵曠日持久情見勢屈敵人聞之其心必離何也德威曰鎮定之兵長於守城短於野戰且吾所恃者騎兵利於平原廣野可以馳突今壓賊壘門騎無所展其足且衆寡不敵使彼知吾虛實則事危矣王不悅退臥帳中諸將莫敢言德威往見張承業曰大王驟勝而輕敵謂夾寨之勝也量音良今去賊咫尺所限者一水耳謂野河之水也我衆立盡矣不若退軍高邑高邑漢鄗縣光武更名高邑唐屬趙州九域志在州西南四十二里在柏鄉北三十餘里誘音酉離力智翻彼出則歸彼歸則出別以輕騎掠其饋餉不過踰月破之必矣承業入褰帳撫王曰褰起虔翻此豈王安寢時耶周德威老將知兵其言不可忽也王蹶然興曰予方思之時梁兵閉壘不出有降者詰之降戶江翻詰去吉翻曰景仁方多造浮橋王謂德威曰果如公言是日拔營退保高邑四年辰州蠻酋宋鄴漵州蠻酋潘金盛恃其所居深險數擾楚邊至是鄴寇湘鄉酋慈由翻漵音敍數所角翻宋白曰秦置黔中郡於今沅陵縣西二十里漢改黔中郡為武陵郡建武二十五年宗均受㣥蠻降置辰陽縣隋為辰州因辰溪為名唐貞觀八年分辰州龍標縣置巫州天授三年改沅州大曆五年改漵州唐武德四年分衡山置湘鄉縣屬潭州九域志在州西南一百五十五里楚書作潘全盛金盛寇武岡宋白曰晉武帝分都梁立武岡縣今岡東五十里有漢都梁故城是也後漢武陵蠻為漢所伐來保此岡故謂之武岡郡國志云武岡接武陵因以得名考異曰湖湘故事呂師周斬潘金晟於武岡其年十月十一日辰州宋鄴敍州昌師益一時歸投馬氏今從十國紀年四年寧遠節度使龐巨昭高州防禦使劉昌魯皆唐官也黃巢之寇嶺南也巨昭為容管觀察使昌魯為高州刺史帥㣥蠻據險以拒之帥讀曰率巢衆不敢入境唐嘉其功置寧遠軍於容州以巨昭為節度使按通鑑唐昭宗乾寧四年置寧遠軍於容州以李克用大將蓋寓領節度使考之新書方鎮表容州置節鎮亦在是年龐巨昭建節當在是年之後及劉隱據嶺南二州不從隱遣弟巖攻高州昌魯大破之又攻容州亦不克昌魯自度終非隱敵度徒洛翻是歲致書請自歸於楚楚王殷大喜遣橫州刺史姚彥章將兵迎之彥章至容州裨將莫彥昭說巨昭曰湖南兵遠來疲乏宜撤儲偫說式芮翻撤直列翻偫直里翻棄城潛於山谷以待之彼必入城我以全軍掩之彼外無繼援可擒也巨昭曰馬氏方興今雖勝之後將何如不若具牛酒迎之彥昭不從巨昭殺之舉州迎降考異曰湖湘故事龐巨曦本唐末邕容等州防禦使聞馬氏令公以征南步軍指揮使李瓊知桂州軍事領兵士收服嶺外昭梧象柳宜蒙賀桂等州巨曦聞此雄勢謂諸首領曰李瓊有破竹之勢若長驅兵馬此來侵吞吾境其將柰何時容南指揮使莫彥昭對曰李瓊兵馬其勢已雄必然輕敵今欲燒毀城內軍儲且各入山峒拋州城與李瓊候纔入州卻依前出諸山峒兵士復攻之堅守旬月之間城內必無軍糧外無救應方可制造攻具再攻擊之必取勝也龐巨曦曰吾每至中宵獨占氣象馬氏合當五十餘年興霸湖外苟五十餘年對壘安知孰非是以憂疑不暇遂至深夜斬莫彥昭於其私第明日以其故密走事宜於湖南又曰天復末甲子十有二月容南龐巨曦深慮廣南劉巖不道加害於己遂差小吏間路密馳書款歸於馬氏是時湖南遣澧州刺史姚彥章領馬步軍八千徑往容南巨曦遂帥萬餘衆歸于馬氏又曰高州防禦使劉昌魯以廣南先主劉巖欲幷吞嶺外數召昌魯欲籍沒其家族昌魯知之乃刺血寫書投馬氏具述懸急湖南遂遣捉生指揮使張可球部轄兵馬於界首應接一行三千餘口歸于馬氏今從十國紀年九域志容州東南至高州二百八十二里楚王殷以彥章知容州事為姚彥章不能守容州張本馬殷幷朗州奏改武貞軍為永順軍鄴人也乾化元年辛未九一一按歐史是年五月甲申朔大赦改元四年春正月丙戌朔日有食之考異曰李昊蜀書丁亥朔日食今從實錄等諸書四年柏鄉比不儲芻比毗至翻近也言近時趙人不儲芻於柏鄉蓋亦虞梁兵之至以資敵也梁兵刈芻自給晉人日以遊軍抄之抄楚交翻梁兵不出周德威使胡騎環營馳射而詬之環音宦詬古候翻梁兵疑有伏愈不敢出剉屋茅坐席以飼馬剉寸臥翻飼祥吏翻馬多死丁亥周德威與別將史建瑭李嗣源將精騎三千壓梁壘門而詬之王景仁韓勍怒悉衆而出德威等轉戰章十二行本戰下有而北二字乙十一行本同孔本同張校同至高邑南李存璋以步兵陳於野河之上陳讀曰陣下同梁軍橫亙數里競前奪橋鎮定步兵禦之勢不能支晉王謂匡衞都指揮使李建及曰賊過橋則不可復制矣建及選卒二百援鎗大譟復扶又翻援于元翻力戰卻之建及許州人姓王李罕之之假子也薛史李建及本姓王少事李罕之光啟中罕之選部下驍勇百人以獻李克用建及在籍中後以功賜姓名梁兵爭進而囂囂虛驕翻又牛刀翻我兵整而靜我必勝戰自巳至午勝負未決晉王謂周德威曰兩軍已合勢不可離我之興亡在此一舉我為公先登公可繼之德威叩馬而諫曰觀梁兵之勢可以勞逸制之未易以力勝也為于偽翻易以豉翻彼去營三十餘里雖挾糗糧亦不暇食日昳之後飢渴內迫矢刃外交糗去久翻昳徒結翻日昃也士卒勞倦必有退志當是時我以精騎乘之必大捷於今未可也王乃止梁晉爭天下周德威以勇聞是難能也然觀其制勝以計不以勇是又難能矣時魏滑之兵陳於東宋汴之兵陳於西至晡梁軍未食士無鬬志景仁等引兵稍卻周德威疾呼曰呼火故翻梁兵走矣晉兵大譟爭進魏滑兵先退李嗣源帥衆譟於西陳之前曰東陳已走爾何久留梁兵互相驚怖遂大潰置陣延亙東西不相知為敵所譟故驚怖而潰帥讀曰率怖普布翻呼曰梁人亦吾人也父兄子弟餉軍者勿殺於是戰士悉解甲投兵而棄之囂聲動天地趙人以深冀之憾不顧剽掠憾梁遣杜廷隱等殺深冀戍兵也剽匹妙翻梁之龍驤神捷精兵殆盡薛史本紀開成二年以尹皓部下五百人為神捷軍僵尸蔽地僵居良翻王景仁韓勍李思安以數十騎走王景仁嘗以勞逸制梁兵而不知又為周德威以勞逸制之也梁兵已去棄糧食資財器械不可勝計勝音升凡斬首二萬級李嗣源等追奔至邢州九域志自柏鄉西南至邢州一百五十餘里保義節度使王檀嚴備然後開城納敗卒給以資糧散遣歸本道晉王收兵屯趙州杜廷隱等聞梁兵敗棄深冀而去悉驅二州丁壯為奴婢老弱者阬之城中存者壞垣而已癸巳復以楊師厚為北面都招討使將兵屯河陽收集散兵旬餘得萬人己亥晉王遣周德威史建瑭將三千騎趣澶魏趣七喻翻澶魏二州名澶市連翻張承業李存璋以步兵攻邢州自以大軍繼之移檄河北州縣諭以利害帝遣別將徐仁溥將兵千人自西山夜入邢州西山即太行連延至上黨諸山己酉罷王景仁招討使落平章事以其敗也四年蜀主之女普慈公主嫁岐王從子秦州節度使繼崇蜀主以蕭梁郡名封其女宋白曰梁武帝置普慈郡於普州安岳縣從才用翻遺唯季翻言繼崇驕矜嗜酒求歸成都蜀主召公主歸寧已嫁之女父母在則有時而歸寧寧安也辛亥公主至成都蜀主留之以宋光嗣為閤門南院使岐王怒始與蜀絕為蜀伐岐張本福州人也四年呂師周章十二行本周下有引兵二字乙十一行本同孔本同張校同攀藤緣崖入飛山洞襲潘金盛擒送武岡斬之章十二行本之下有移兵擊宋鄴五字乙十一行本同孔本同張校同退齋校同飛山在今靖州北十五里比諸山為最高峻四面絕壁千仞環山有壕塹其遺趾尚存四年二月己未晉王至魏州攻之不克上以羅周翰年少且忌其舊將佐謂羅紹威之元從將佐也少詩照翻庚申以戶部尚書李振為天雄節度副使命杜廷隱將兵千人衞之先是帝以羅紹威之請撫案動容至此心術露矣間道夜入魏州助周翰城守間古莧翻守手又翻癸亥晉王觀河於黎陽梁兵萬餘將渡河聞晉王至皆棄舟而去史言梁兵懼晉王之甚四年帝召蔡州刺史張慎思至洛陽久未除代蔡州右廂指揮使劉行琮作亂縱兵焚掠將奔淮南順化指揮使王存儼誅行琮撫遏其衆自領州事以衆情馳奏時東京留守博王友文不先請遽發兵討之兵至鄢陵九域志鄢陵縣在大梁東南一百六十里存儼方懼若臨之以兵則飛去矣馳使召還甲子授存儼權知蔡州事四年乙丑周德威自臨清攻貝州拔夏津高唐夏津本古鄃縣唐天寶元年更名夏津屬貝州九域志在魏州東北二百五十里拔東武朝城漢東郡東武陽縣後魏曰武陽唐開元七年更名朝城屬魏州故朝城縣管內猶有地名東武九域志朝城在魏州東南八十里刺史張可臻棄城走帝斬之德威進攻黎陽拔臨河淇門逼衞州掠新鄉共城隋分汲獲嘉二縣地於古新樂城置新鄉縣共城漢共縣地唐志屬衞州九域志共城在州西北五十五里共音恭庚午帝親帥軍屯白司馬阪以備之史言晉兵乘勝聲勢之盛梁祖選富家子有材力者置帳下號廳子都薛居正曰太祖置廳子都最為親軍白司馬阪在洛陽城北帥讀曰率四年盧龍義昌節度使兼中書令燕王守光既克滄州去年正月克滄州淫虐滋甚每刑人必置諸鐵籠以火逼之又為鐵刷刷人面聞梁兵敗於柏鄉使人謂趙王鎔及王處直曰聞二鎮與晉王破梁兵舉軍南下僕亦有精騎三萬欲自將之為諸公啟行詩元戎十乘以先啟行註云啟突敵陣之前行行戶剛翻必有盟主僕若至彼何以處之四鎮謂幷幽鎮定處昌呂翻遣使告于晉王晉王笑曰趙人告急守光不能出一卒以救之及吾成功乃復欲以兵威離間二鎮復扶又翻間古莧翻愚莫甚焉諸將曰雲代與燕接境彼若擾我城戍動搖人情吾千里出征緩急難應此亦腹心之患也不若先取守光然後可以專意南討王曰善為晉攻燕滅之張本壬申晉解圍去師厚追之逾漳水而還邢州圍亦解先解魏州圍又解邢州圍磁祥之翻相息亮翻還音旋又如字趙王鎔自來謁晉王於趙州九域志鎮州南至趙州九十五里犒苦到翻自是遣其養子德明將三十七都常從晉王征討德明本姓張名文禮燕人也張文禮後遂殺王鎔而亂鎮州壬午晉王發趙州歸晉陽留周德威等將三千人戍趙州鄧廣銘標點聶崇岐覆校
