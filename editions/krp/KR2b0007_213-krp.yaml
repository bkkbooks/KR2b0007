body:
  text: 資治通鑑卷二百十三宋司馬光撰胡三省音注唐紀二十九起柔兆攝提格盡昭傷作噩凡八年𤣥宗至道大聖大明孝皇帝中之上開元十四年春正月癸未更立契丹松漠王李邵固為廣化王奚饒樂王李魯蘇為奉誠王契欺訖翻樂音洛以上從甥陳氏為東華公主妻邵固從才用翻妻七細翻下同考異曰東華出降實録在三月壬子於此終言之以成安公主之女韋氏為東光公主成安公主中宗之女下嫁韋㨗妻魯蘇張説奏今之五禮貞觀顯慶兩曽修纂説讀曰悦觀古玩翻前後頗有不同其中或未折衷衷竹仲翻宋白曰折斷也中當正也若折斷其物與度相中當也望與學士等討論古今删改施行制從之邕州封陵獠梁大海等據賔横州反封陵本山峒唐世以漸開拓乾无後始置為縣賔州漢領方縣地屬鬱林郡梁置領方郡隋廢郡為縣屬鬰州唐初屬南方州貞觀五年分置賓州横州漢廣鬰髙梁縣地江左置寜浦郡隋廢郡為縣屬鬰州唐初分置簡州貞觀八年曰横州二月巳酉遣内侍楊思勗發兵討之曰考異舊紀作庚戌朔今從實録上召河南尹崔隱甫欲用之中書令張説薄其無文奏擬金吾大將軍前殿中監崔日知素與説善説薦為御史大夫上不從丙辰以日知為左羽林大將軍丁巳以隱甫為御史大夫隱甫由是與説有隙說有才智而好賄百官白事有不合者好面折之至於叱罵惡御史中丞宇文融之為人好呼到翻折之舌翻惡烏路翻且患其權重宇文融既居風憲之地又貳户部故患其權重融所建白多抑之中書舍人張九齡言於説曰宇文融承恩用事辨給多權數不可不備説曰鼠輩何能為夏四月壬子隱甫融及御史中丞李林甫共奏彈説引術士占星徇私僣侈受納賄賂彈徒丹翻賄呼罪翻敕源乾曜及刑部尚書韋抗大理少卿明珪與隱甫等同於御史臺鞫之林甫叔良之曾孫長平王叔良髙祖從父弟抗安石之從父兄子也韋安石厯事武后中宗貶死於開元之初從才用翻丁巳以户部侍郎李元紘為中書侍郎同平章事元紘以清儉著故上用為相源乾曜等鞫張説事頗有狀上使髙力士視説力士還奏說蓬首垢面席藁食以瓦器惶懼待罪上意憐之力士因言説有功於國上以為然庚申但罷説中書令餘如故說讀曰悦丁卯太子太𫝊岐王範薨贈諡恵文太子上為之徹膳累旬為于偽翻百官上表固請上時掌翻然後復常丁亥太原尹張孝嵩奏有李子嶠者自稱皇子云生於潞州母曰趙妃上命杖殺之辛丑於定恒莫易滄五州置軍以備突厥定州置北平軍恒州置恒陽軍莫州置唐興軍易州置髙陽軍滄州置横海軍恒户登翻上欲以武惠妃為皇后或上言武氏乃不戴天之讐豈可以為國母人間盛言張説欲取立后之功更圖入相之計上時掌翻相息亮翻且太子非惠妃所生惠妃復自有子若登宸極太子必危上乃止復扶又翻上考異曰唐㑹要云侍御史潘好禮聞欲以恵妃為皇后進疏諫曰臣聞禮記曰父母之讐不可共戴天公羊傳曰子不復父讐不子也昔齊襄公復九世之讐丁蘭報木母之怨陛下豈得欲以武氏為國母當何以見天下之人乎不亦取笑於天下乎又恵妃再從叔三思再從父延秀等並干紀亂常遞窺神器豺狼同穴梟獍共林且匹夫匹婦欲結髪為夫妻者尚相揀擇况陛下是累聖之貴天子之尊乎伏願詳察古今鑒戒成敗慎擇華族之女必在禮義之家稱神祇之心允億兆之望又見人間盛言尚書右丞相張説自被停知政事之後毎諂附恵妃欲取立后之功更圖入相之計伏願杜之於将漸不可悔之於巳成且太子本非恵妃所生恵妃復自有子若恵妃一登宸極則儲位實恐不安古人所以諫其漸者良為是也昔商山四皓雖不食漢庭之禄尚能輔翊太子况臣愚昧職忝憲府蘇冕駮曰此表非潘好禮所作且好禮先天元年為侍御史開元十二年為温州刺史致仕表是十四年獻而云職忝憲府若題年恐錯則武恵妃先天元年始年十四王皇后有寵未衰張説又未為右丞相竟未知此表是誰獻之今除其名然宫中禮秩一如皇后五月癸卯户部奏今嵗户七百六萬九千五百六十五口四千一百四十一萬九千七百一十二秋七月河南北大水溺死者以千計溺奴狄翻八月丙午朔魏州言河溢九月巳丑以安西副大都䕶磧西節度使杜暹同平章事磧七迹翻暹息亷翻自王孝傑克復四鎮復四鎮見二百五卷武后長夀元年復於龜兹置安西都護府復扶又翻龜兹音丘慈以唐兵三萬戍之百姓苦其役為都䕶者惟田揚名郭元振張嵩及暹皆有善政為人所稱冬十月庚申上幸汝州廣成湯上考異曰令狐峘代宗實録云以開元十四年十月十三日生時𤣥宗幸汝州之温湯有望氣者云宫中有天子氣𤣥宗即日還宫是夜代宗降誕按𤣥宗實録此月十六日庚申始幸温湯己巳乃還宫與代宗實録不同舊紀云十二月十三日生舊后妃傳章敬皇后吳氏坐父事沒入掖庭開元二十三年𤣥宗幸忠王邸見王服御蕭然傍無勝侍命將軍髙力士選掖庭宫人以賜之而吴后在籍中明年生代宗皇帝十八年薨按代宗此年生而云二十三年以吴后賜忠王十八年薨葢誤以十三年為二十三年也以柳氏舊聞肅宗在東宫為李林甫所構勢幾危者數矣無何鬚鬂斑白嘗早朝上見之愀然曰汝歸第吾當幸汝及上至顧見宫庭殿宇皆不灑掃而樂器塵埃左右使令無有妓女上為之動色使力士詔掖庭閱視得三人乃以賜太子而章敬吴皇后在選中生代宗按開元二十三年李林甫初為相二十五年廢太子瑛二十六年乃立肅宗為太子天寳五年李林甫始構韋堅之獄舊聞所記事皆虚誕年月不合新書后妃傳全取之今皆不取有按漢廣成苑在唐汝州梁縣界其地湯泉己酉還宫十二月丁巳上幸夀安獵於方秀川壬戌還宫楊思勗討反獠獠魯皓翻生禽梁大海等三千餘人斬首二萬級而還還從宣翻又如字是嵗黑水靺鞨遣使入見黑水靺鞨在流鬼國西南女貞即其遣種也靺鞨音末曷見賢遍翻上以其國為黑水州仍為置長史以鎮之長史恐當作長吏仍為于偽翻勃海靺鞨王武藝曰黑水入唐道由我境往者請吐屯於突厥突厥置吐屯以領諸附從之國厥九勿翻先告我與我偕行今不告我而請吏於唐是必與唐合謀欲腹背攻我也遣其母弟門藝與其舅任雅將兵擊黑水將即亮翻下同門藝嘗為質子于唐質音致諫曰黑水請吏于唐而我以其故擊之是叛唐也唐大國也昔髙麗全盛之時彊兵三十餘萬不遵唐命掃地無遺掃地無遺言國亡無遺育也事見太宗髙宗紀麗力知翻况我兵不及髙麗什之一二一旦與唐為怨此亡國之執也武藝不從彊遣之彊其兩翻門藝至境上復以書力諫武藝怒遣其從兄大壹夏代之將兵召欲殺之門藝弃衆閒道來奔復扶又翻夏户雅翻從才用翻閒古莧翻制以為左驍衛將軍武藝遣使上表罪狀門藝請殺之驍堅堯翻使疏吏翻上時掌翻上密遣門藝詣安西留其使者别遣報云已流門藝於嶺南武藝知之上表稱大國當示人以信豈得為此欺誑誑居况翻固請殺門藝上以鴻臚少卿李道邃源復不能督察官屬致有漏泄皆坐左遷唐九寺皆有少卿二人鴻臚掌四夷之客故以泄漏為罪臚陵如翻少始照翻暫遣門藝詣嶺南以報之臣光曰王者所以服四夷威信而已門藝以忠獲罪自歸天子天子當察其枉直賞門藝而罰武藝為政之體也縱不能討猶當正以門藝之無辠告之今明皇威不能服武藝恩不能庇門藝顧效小人為欺誑之語以取困於小國乃辠鴻臚之漏洩不亦可羞哉杜暹為安西都䕶突騎施交河公主遣牙官以馬千匹詣安西互市使者宣公主教暹息廉翻騎竒寄翻使疏吏翻下同暹怒曰阿史那女交河公主阿史那懷道之女何得宣教於我杖其使者留不遣馬經雪死盡突騎施可汗蘇禄大怒發兵冦四鎮㑹暹入朝使疏吏翻朝直遥翻下同趙頥貞代為安西都䕶嬰城自守四鎮人畜儲積皆為蘇禄所掠畜許救翻安西僅存既而蘇禄聞暹入相稍引退相息亮翻尋遣使入貢十五年春正月辛丑凉州都督王君㚟破吐蕃於青海之西㚟丑略翻吐從暾入聲初吐蕃自恃其彊致書用敵國禮事見二百十一卷二年辭指悖慢悖蒲内翻又蒲沒翻上意常怒之返自東封張說言於上曰吐蕃無禮誠宜誅夷但連兵十餘年甘凉河鄯不勝其弊鄯時戰翻又音善勝音升雖師屢㨗所得不償所亡聞其悔過求和願聽其欵服以紓邊人上曰俟吾與王君㚟議之説退謂源乾曜曰君㚟勇而無謀常思僥幸僥堅堯翻若二國和親何以為功吾言必不用矣及君㚟入朝果請深入討之去冬吐蕃大將悉諾邏冦大斗谷將即亮翻邏郎仇翻進攻甘州焚掠而去君㚟度其兵疲勒兵躡其後度徒洛翻躡尼輙翻出考異曰吐蕃𫝊云君㚟畏其鋒不敢今從君㚟傳㑹大雪虜凍死者甚衆自積石軍西歸廓州逹化縣西有積石軍本靜邉鎮儀鳯二年為軍東有黄沙戍君㚟先遣人間道入虜境燒道旁草悉諾邏至大非川欲休士馬而埜草皆盡馬死過半君㚟與秦州都督張景順追之及於青海之西乘氷而度悉諾邏已去破其後軍獲其輜重羊馬萬計而還間古莧翻重直用翻考異曰君㚟𫝊曰十六年冬吐蕃大將悉諾邏帥衆入冦大斗谷又移攻甘州焚燒市里而去君㚟襲其後敗之於青海之西據實録及吐蕃傳入冦在十四年冬此云十六年冬誤也君㚟以功遷左羽林大將軍拜其父夀為少府監致仕上由是益事邉功初洛陽人劉宗器上言請塞汜水舊汴口更於熒澤引河入汴隋開皇四年分滎陽置廣武縣仁夀元年更名熒澤屬鄯州上時掌翻塞悉則翻下同汜音祀汴皮變翻擢宗器為左衛率府胄曹率所律翻至是新渠填塞不通貶宗器為循州安懷戌主命將作大匠范安及發河南懷鄭汴滑衛三萬人疏舊渠旬日而畢御史大夫崔隱甫中丞宇文融恐右丞相張説復用數奏毁之各為朋黨上惡之復扶又翻數所角翻惡烏路翻二月乙巳制説致仕隱甫免官侍母融出為魏州刺史乙夘制諸州逃户先經勸農使括定按比後復有逃來者隨到凖白丁例輸當年租庸有征役者先差使疏吏翻復扶又翻下不復同差初佳翻夏五月癸酉上悉以諸子慶王潭等領州牧刺史都督節度大使大都䕶經略使使疏吏翻實不出外初太宗愛晉王晉王治是為髙宗不使出閤豫王亦以武后少子不出閤及自皇嗣為相王始出閤中宗之世譙王失愛謫居外州温王年十七猶居禁中譙王重福温王重茂上即位附苑城為十王宅朱雀街東第五街有安國寺寺東附苑城為大宅分處十王十王謂慶忠棣鄂榮儀台潁永濟也後盛夀陳豐常凉六王又就封入内宅是為十六宅以居皇子宦官押之就夾城參起居自是不復出閤雖開府置官屬及領藩鎮惟侍讀時入授書歐陽修曰唐王府侍讀無定員自餘王府官屬但嵗時通名起居其藩鎮官屬亦不通名及諸孫浸多又置百孫院太子亦不居東宫常在乗輿所幸之别院乘䋲證翻上命妃嬪以下宫中育蠶欲使之知女功丁酉夏至賜貴近絲人一綟杜佑曰唐令綿六兩為屯絲五兩為絇麻三斤為綟未知絲綟輕重何如綟郎計翻秋七月戊寅冀州河溢己卯禮部尚書許文憲公蘇頲薨頲他鼎翻九月丙子吐蕃大將悉諾邏恭禄及燭龍莽布支攻陷瓜州執刺史田元獻及河西節度使王君㚟之父進攻玉門軍按王君㚟之父夀以少府監致仕居鄉里玉門軍在肅州之西二百里宋白曰肅州西門縣漢罷玉門闗屯徙其人於此故曰玉門縣石門周匝山間經二十里衆流北入延興海也縱所虜僧使歸凉州謂君㚟曰將軍常以忠勇許國何不一戰君㚟登城西望而泣竟不敢出兵莽布支别攻常樂縣宋白曰常樂縣屬瓜州即魏之宜禾郡前凉之凉興縣地凉武昭王於三危山東置常樂鎮唐武徳五年改置常樂縣縣令賈師順帥衆拒守樂音洛帥讀曰率及瓜州陷悉諾邏悉兵㑹攻之旬餘日吐蕃力盡不能克使人説降之説式芮翻降户江翻不從吐蕃曰明府既不降宜歛城中財相贈吾當退師順請脱士卒衣悉諾邏知無財乃引去毁瓜州城師順遽開門收器械修守備虜果復遣精騎還覘城中知有備乃去田元獻不能守瓜州而賈師順能守常樂固圉固存乎其人也復扶又翻覘丑亷翻又丑艶翻師順岐州人也初突厥黙啜之彊也迫奪鐵勒之地故囘紇契苾思結渾四部度磧徙居甘凉之間以避之啜叱劣翻紇下涘翻契欺訖翻苾毗必翻王君㚟微時往來四部為其所輕及為河西節度使以法繩之四部耻怨密遣使詣東都自訴君㚟遽發驛奏四部難制潜有叛計上遣中使往察之使疏吏翻諸部竟不得直於是瀚海大都督囘紇承宗流瀼州瀼如羊翻杜佑曰而章翻渾大徳流吉州賀蘭都督契苾承明流藤州藤州漢蒼梧猛陵縣地晉置永平郡隋置藤州盧山都督思結歸國流瓊州以囘紇伏帝難為瀚海大都督己夘貶右散騎常侍李令問為撫州别駕舊志撫州京師東南三千三百一十二里坐其子與承宗交游故也丙戌突厥毗伽可汗遣其大臣梅録啜入貢吐蕃之冦瓜州也遺毗伽書欲與之俱入冦遺子季翻毗伽并獻其書上嘉之聽於西受降城為互市降户江翻每嵗齎縑帛數十萬匹就市戎馬以助軍旅且為監牧之種種章勇翻由是國馬益壯焉閏月庚子吐蕃賛普與突騎施蘇禄圍安西城安西副大都䕶趙頥貞擊破之囘紇承宗族子瀚海司馬䕶輸糾合黨衆為承宗報仇㑹吐蕃遣使間道詣突厥王君㚟帥精騎邀之於肅州宋白曰隋仁夀元年分甘州福禄縣置肅州東南置甘州赤栁間二百里西南至瓜州界守樂烽三百四十里還至甘州南鞏筆驛為于偽翻間古莧翻甘州張掖縣西南有鞏筆驛䕶輸伏兵突起奪君㚟旌節先殺其判官宋貞剖其心曰始謀者汝也君㚟帥左右數十人力戰帥讀曰率自朝至晡左右盡死䕶輸殺君㚟載其尸奔吐蕃凉州兵追及之䕶輸棄尸而走既考異曰舊傳云囘紇殺君㚟上命郭知運討逐按知運九年已卒君㚟代鎮凉州舊傳誤也庚申車駕發東都冬己卯至西京冬字下逸十月二字辛巳以左金吾衛大將軍信安王禕為朔方節度等副大使禕恪之孫也吴王恪太宗之子禕吁韋翻以朔方節度使蕭嵩為河西節度等副大使時王君㚟新敗河隴震駭嵩引刑部貟外郎裴寛為判官與君㚟判官牛仙客俱掌軍政人心浸安寛漼之從弟也漼取猥翻從才用翻仙客本鶉觚小吏鶉觚縣前漢屬北地郡後漢晉屬安定郡後魏置趙平郡後周廢郡以縣屬涇州劉昫曰節度使置判官二人末九品秩鶉如倫翻觚攻于翻以才幹軍功累遷至河西節度判官為君㚟腹心嵩又奏以建康軍使河北張守珪為𤓰州刺史甘州西北百九十里祁連山有建康軍河北縣屬陜州帥餘衆築故城板榦裁立詩云縮板以載縮板兩旁内土其中而築之幹亦板也孔安國曰旁曰幹帥讀曰率吐蕃猝至城中相顧失色莫有鬬志守珪曰彼衆我寡又瘡痍之餘不可以矢刅相持當以竒計取勝乃於城上置酒作樂虜疑其有備不敢攻而退守珪縱兵擊之虜敗走守珪乃修復城市收合流散皆復舊業朝廷嘉其功以𤓰州為都督府以守珪為都督悉諾邏威名甚盛蕭嵩縱反閒於吐蕃閒古莧翻云與中國通謀賛普召而誅之吐蕃由是少衰少詩沼翻十二月戊寅制以吐蕃為邊患令隴右道及諸軍團兵五萬六千人河西道及諸軍團兵四萬人府兵廢行一切之法團結民兵謂之團兵又徵闗中兵萬人集臨洮朔方兵萬人集㑹州防秋至冬初無冦而罷伺虜入冦洮士力翻伺相吏翻互出兵腹背擊之乙亥上幸驪山温泉丙戌還宫十六年春正月壬寅安西副大都䕶趙頥貞敗吐蕃于曲子城敗蒲邁翻甲寅以魏州刺史宇文融為户部侍郎兼魏州刺史充河北道宣撫使宣撫使始此使疏吏翻下同乙卯春瀧等州獠陳行範廣州獠馮璘何遊魯反瀧閭江翻獠魯皓翻考異曰本紀作馮仁智今從楊思勗傳陷四十餘城行範稱帝遊魯稱定國大將軍璘稱南越王欲據嶺表命内侍楊思勗發桂州及嶺北近道兵討之丙寅以魏州刺史宇文融檢校汴州刺史充河南北溝渠堤堰决九河使校古孝翻汴皮變翻堰於扇翻使疏吏翻融請用禹貢九河故道開稻田并囘易陸運錢官收其利興役不息事多不就二月壬申以尚書右丞相致仕張説兼集賢殿學士説雖罷政事専文史之任朝廷每有大事上常遣中使訪之史言張説寵顧不衰尚辰羊翻相息亮翻説讀為悦使疏吏翻壬辰改彍騎為左右羽林軍飛騎彍騎見上卷十三年彍虚郭翻又古郭翻騎竒寄翻秋七月吐蕃大將悉末朗冦𤓰州吐從暾入聲將即亮翻都督張守珪擊走之乙巳河西節度使蕭嵩隴右節度使張忠亮大破吐蕃於渇波谷據新書吐蕃傳渇波谷當在青海西從考異曰實録唐厯蕭嵩傳作張志亮今舊本紀吐蕃傳忠亮追之㧞其大莫門城大莫門城在九曲擒獲甚衆焚其駱駝橋而還還從宣翻又如字八月乙巳特進張説上開元大衍厯行之僧一行推大衍數立術以應氣朔及日食以造新厯故曰大衍厯上時掌翻辛夘左金吾將軍杜賔客破吐蕃于祁連城下祁連城在甘州張掖縣祁連山時吐蕃復入冦復扶又翻蕭嵩遣賔客將彊弩四千擊之將即亮翻又音如字戰自辰至暮吐蕃大潰獲其大將一人將即亮翻又音如字虜散走投山哭聲四合冬十月己卯上幸驪山温泉己丑還宫其考異曰實録十二月丁卯又去幸温泉宫不言還唐厯丁夘幸温泉丁丑還宫按此月已幸温泉恐重複不取十一月癸巳以河西節度副大使蕭嵩為兵部尚書同平章事十二月丙寅敕長征兵無有還期人情難堪宜分五畨嵗遣一畨還家洗沐五年酬勲五轉是嵗制户籍三嵗一定分為九等楊思勗討陳行範至瀧州破之擒何遊魯馮璘行範逃於雲際盤遼二洞思勗追捕竟生擒斬之凡斬首六萬思勗為人嚴偏禆白事者不敢仰視故用兵所向有功然性忍酷所得俘虜或生剥面皮或以刀髪際掣去頭皮蠻夷憚之剺里之翻掣昌列翻去羌吕翻十七年春二月丁卯巂州都督張守素破西南蠻㧞昆明及鹽城昆明縣屬巂州漢定莋縣地後周置定莋鎮武徳二年改置昆明縣以其地接昆明故也縣有鹽有鐵築城以衛之故又有鹽城巂音髓殺獲萬人三月𤓰州都督張守珪沙州刺史賈師順擊吐蕃大同軍大破之甲寅朔方節度使信安王禕攻吐蕃石堡城㧞之初吐蕃陷石堡城留兵據之侵擾河右上命禕與河西隴右同議攻取諸將咸以為石堡據險而道逺攻之不克將無以自還且宜按兵觀舋舋許覲翻禕不聽引兵深入急攻㧞之乃分兵據守要害令虜不得前自是河隴諸軍遊奕拓境千餘里上聞大悦更命石堡城曰振武軍自鄯州鄯城縣河源軍西行百二十里至白水軍又西南六十里至定戎城又南隔澗七里有石堡城本吐蕃䥫仞城也宋白曰石堡城在龍支縣西四面懸崖數千仭石路盤屈長三四里西至赤嶺三十里更工衡翻丙辰國子祭酒楊瑒上言瑒徒杏翻又音暢上時掌翻以為省司奏限天下明經進士及第每年不過百人竊見流外出身每嵗二千餘人而明經進士不能居其什一則是服勤道業之士不如胥史之得仕也臣恐儒風浸墜亷耻日衰若以出身人太多則應諸色裁損不應獨抑明經進士也又奏諸司帖試明經不務求述作大指専取難知問以孤經絶句或年月日請自今並帖平文唐取士之科有進士有明經凡明經先帖文然後口試經問大義十條答時務策三道以文理粗通為上上上中上下中上凡四等為及第凡進士試時務策五道帖一大經經策全通為甲第策通四帖過四以上為乙第通典曰唐制帖經者以所習經掩其兩端其間惟開一行裁紙為帖凡帖三字隨時増損可否不一或得四得五得六者為通上甚然之夏四月庚午禘于太廟唐初祫則序昭穆禘則各祀於其室昭讀曰佋音時遥翻至是太常少卿韋縚等奏如此禘與常饗不異請禘祫皆序昭穆從之縚安石之兄子也縚上刀翻五月壬辰復置十道及京都兩畿按察使雍同華商岐邠為京畿洛汝為都畿十二年停諸道按察使今復置復扶又翻又如字初張說張嘉貞李元紘杜暹相繼為相用事源乾曜以清謹自守常讓事於説等唯諾署名而已元紘暹議事多異同遂有隙更相奏列唯于癸翻更工衡翻上不悦六月甲戌貶黄門侍郎同平章事杜暹荆州長史中書侍郎同平章事李元紘曹州刺史舊志曹州京師東北一千四百五十三里罷乾曜兼侍中止為左丞相開元初改尚書左右僕射為左右丞相唐初僕射之職無所不統是正丞相也至中宗神龍元年豆盧欽望專為僕射不敢預政事是後專拜僕射者不復知政事雖有丞相之名非復唐初丞相之職矣今源乾曜止為左丞相是止為尚書左僕射不復預政事也以户部侍郎宇文融為黄門侍郎兵部侍郎裴光庭為中書侍郎並同平章事蕭嵩兼中書令遥領河西遥領河西節度使開府王毛仲與龍武將軍葛福順為昏毛仲為上所信任言無不從故北門諸將多附之進退唯其指使吏部侍郎齊澣乘間言於上曰間古莧翻下離間同福順典禁兵葛福順所典萬騎也故云然不宜與毛仲為昏毛仲小人寵過則生姦不早為之所恐成後患上悦曰知卿忠誠朕徐思其宜澣曰君不密則失臣易大傳之言願陛下密之㑹大理丞麻察坐事左遷興州别駕舊志興州至京師九百四十八里澣素與察善出城餞之因道禁中諫語察性輕險遽奏之上怒召澣責之曰卿疑朕不密而以語麻察詎為密邪且察素無行語牛倨翻邪音耶行下孟翻卿豈不知邪澣頓首謝秋七月丁巳下制澣察交構將相離間君臣將即亮翻相息亮翻間古莧翻澣可高州良徳丞察可潯州皇化尉良徳亦漢合浦縣地吳置髙凉郡陳分置務徳縣後改為良徳潯州漢布山阿林之地梁於布山地置桂平郡隋廢郡為縣又於阿林地置皇化縣隋廢入桂平貞觀七年置潯州治桂平復置皇化縣屬焉八月癸亥上以生日宴百官於花萼樓下云考異曰實録癸亥朔按長厯是月己未朔癸亥五日也顧况歌曰八月五夜佳氣新昭成太后生聖人實録誤也左丞相乾曜右丞相説帥百官上表帥讀曰率上時掌翻請以每嵗八月五日為千秋節布于天下咸令宴樂聖節錫宴自此始後改千秋節為天長節徳順憲穆不置節名令力丁翻樂音洛尋又移社就千秋節自古以來社用戊日庚辰工部尚書張嘉貞薨嘉貞不營家産有勸其市田宅者嘉貞曰吾貴為將相何憂寒餒若其獲罪雖有田宅亦無所用比見朝士廣占良田身沒之日適足為無賴子弟酒色之資尚張羊翻將即亮翻相息亮翻比毗至翻朝直遥翻吾不取也聞者是之辛巳敕以人間多盗鑄錢始禁私賣銅鉛錫及以銅為器皿其采銅鉛錫者官為市取為于偽翻宇文融性精敏應對辨給以治財賦得幸於上始廣置諸使競為聚歛治直之翻使疏吏翻歛力瞻翻由是百官浸失其職而上心益侈史言唐𤣥宗時開利孔自宇文融始百姓皆怨苦之為人踈躁多言躁則到翻好自矜伐好呼到翻在相位謂人曰使吾居此數月則海内無事矣相息亮翻下同信安王禕以軍功有寵於上以平石堡城之功也融疾之禕入朝朝直遥翻融使御史李寅彈之彈徒丹翻泄於所親禕聞之先以白上明日寅奏果入上怒九月壬子融坐貶汝州刺史李考異曰舊傳曰殿中侍御史宙驛召禕將下獄禕既申訴得理融坐阿黨李宙貶今從唐厯凡為相百日而罷六月甲戍至九月壬子九十九日耳是後言財利以取貴仕者皆祖於融冬十月戊午朔日有食之不盡如鉤宇文融既得罪國用不足上復思之復扶又翻謂裴光庭曰卿等皆言融之惡朕既黜之矣今國用不足將若之何卿等何以佐朕光庭等懼不能對㑹有飛状告融贓賄事又貶平樂尉平樂縣漢蒼梧郡荔浦之地晉置平樂縣屬始安郡唐分置昭州有平樂水樂音洛計考異曰唐厯云裴光庭等諷有司劾之積其贓鉅萬舊傳曰裴光庭時兼御史大夫又彈融交遊朋黨及男受贓等事今從實録統紀又唐厯云十月乙未按長厯十月戊午朔無乙未今從統紀至嶺外嵗餘司農少卿蔣岑奏融在汴州隱沒官錢鉅萬計制窮治其事融坐流巖州高宗調露二年分横貴二州置巖州以巖岡之北因名治直之翻道卒卒子恤翻十一月辛卯上行謁橋定獻昭乾五陵行謁五陵以車駕經行近逺先後為次戊申還宫赦天下百姓今年地税悉蠲其半蠲古𤣥翻十二月辛酉上幸新豐温泉壬申還宫新豐温泉即驪山温泉驪山在新豐縣十八年春正月朝考異曰實録云癸酉上御含元殿受賀按長厯是月甲戌朔無癸酉實録此年事與本紀唐厯統紀皆不同正月甲子全差誤疑本書闕亡後人附益之新紀止據舊紀全不取此年實録又云丁巳新迎氣于東郊下制十八年正月五日以前天下囚徒常赦所不免者咸赦放之按是月無丁巳諸書及㑹要皆無十八年親迎氣事唐厯在二十六年正月七日丙子統紀在二十六年正月實録二十六年正月丁丑又載迎氣大赦其制文推恩大略與此年相似或者實録誤重出於此今不取辛卯以裴光庭為侍中二月癸酉初令百官於春月旬休選勝行樂令尋選勝地行遊而宴樂也自宰相至員外郎凡十二筵各賜錢五千緡上或御花萼樓邀其歸騎留飲迭使起舞盡歡而去騎竒寄翻三月丁酉復給京官職田收職田見上卷十年夏四月温考異曰實録云乙巳駕幸温泉宫丁未至自泉宮按長厯是月乙夘朔無乙巳丁未舊紀唐厯亦無幸温泉事今不取丁卯築西京外郭九旬而畢乙丑以裴光庭兼吏部尚書先是選司注官惟視其人之能否先悉薦翻選須絹翻或不次超遷或老於下位有出身二十餘年不得禄者又州縣亦無等級或自大入小或初久後逺皆無定制光庭始奏用循資格各以罷官若干選而集謂罷官之後經選凡幾各以多少為次而集于吏部官髙者選少少詩沼翻卑者選多無問能否選滿即注限年躡級毋得踰越非負譴者皆有升無降此即後魏崔亮之停年格循而行之至今猶然才俊之士老於常調者多矣其庸愚沈滯者皆喜沈持林翻謂之聖書而才俊之士無不怨歎宋璟爭之不能得光庭又令流外行署亦過門下省審省悉景翻五月吐蕃遣使致書于境上求和使疏吏翻初契丹王李邵固遣可突干入貢同平章事李元紘不禮焉左丞相張説謂人曰奚契丹必叛可突干狡而狠專其國政久矣人心附之此謂契丹國人之心也契欺訖翻又音喫狼户墾翻今失其心必不來矣己酉可突干弑邵固帥其國人并脅奚衆叛降突厥奚王李魯蘇及其妻韋氏邵固妻陳氏皆來犇史言張説之言之驗韋陳皆中國以為公主嫁兩蕃事見上十四年帥讀曰率降户江翻厥九勿翻制幽州長史趙含章討之又命中書舍人裴寛給事中薛侃等於闗内河東河南北分道募勇士六月唐考異曰朝年代記云初裴光庭娶武三思女髙力士私焉光庭有吏材力士為之推轂因以入相時彦鄙之宋璟王晙酒後舞囘波樂以為戲謔光庭患之乃奏天下三十餘州缺刺史昇平日久人皆不樂外官請重臣兼外官領刺史以雄其望于是擬璟揚州晙魏州陸象先荆州凡十餘人蕭嵩執奏天下務重實賴舊臣宿徳訪其得失今盡失之則朝廷空矣上乃悟遂止按實録是嵗閏六月以太子少保陸象先兼荆州長史璟晙未嘗除外官今不取丙子以單于大都䕶忠王浚領河北道行軍元帥單音蟬帥所類翻以御史大夫李朝隱京兆尹裴伷先副之帥十八總管以討奚契丹朝直遥翻伷與胄同帥讀曰率命浚與百官相見於光順門張説退謂學士孫逖韋述曰此集賢書院學士也吾嘗觀太宗畫像雅類忠王此社稷之福也可突干冦平盧先鋒使張掖烏承玼破之於捺禄山開元初置平盧軍於營州玼且禮翻又音此捺奴葛翻平考異曰韓愈烏氏先廟碑云尚書諱承洽開元中營盧先鋒軍屢破奚契丹從戰捺禄走可突干新傳云承玼開元中與族兄承恩皆為平盧先鋒沈勇而决號轅門二龍据此則承玼承洽一人也今從新書壬午洛水溢溺東都千餘家溺奴狄翻秋九月丁巳以忠王浚兼河東道元帥然竟不行吐蕃兵數敗而懼乃求和親數所角翻忠王友皇甫惟明唐諸王友從五品上掌陪侍規諷因奏事從容言和親之利上曰賛普嘗遺吾書悖慢吐蕃請用敵國禮見二百十一卷二年從千容翻遺于季翻悖蒲内翻又蒲沒翻此何可捨對曰賛普當開元之初年尚㓜穉武后長安三年賛普立方七嵗至開元初猶是㓜年也穉直利翻安能為此書殆邊將詐為之欲以激怒陛下耳夫邊境有事則將吏得以因緣盗匿官物妄述功狀以取勲爵將即亮翻下同此皆姦臣之利非國家之福也兵連不解日費千金兵法曰興師十萬日費千金河西隴右由兹困敝陛下誠命一使往視公主謂金城公主也使疏吏翻下方使遣使同因與賛普面相約結使之稽顙稱臣稽音啟永息邊患豈非御夷狄之長策乎上恱命惟明與内侍張元方使于吐蕃賛普大喜悉出貞觀以來所得敕書以示惟明冬十月遣其大臣論名悉獵隨惟明入貢月考異曰實録十九年七癸巳吐蕃遣其大臣名悉獵來朝請固和好之約且獻書云云按長厯十九年七月丁未朔無癸巳今從唐厯舊本紀吐蕃傳表稱甥世尚公主義同一家中間張𤣥表等先興兵冦鈔武后時張𤣥表為安西都䕶與吐蕃互相侵掠鈔楚交翻遂使二境交惡甥深識尊卑安敢失禮正為邊將交構致獲罪於舅屢遣使者入朝朝直遥翻皆為邊將所遏今䝉逺降使臣來視公主甥不勝喜荷勝音升荷下可翻儻使復修舊好死無所恨自是吐蕃復欵附復扶又翻好呼到翻庚寅上幸鳯泉湯癸卯還京師岐州郡縣有鳯泉府甲寅䕶密王羅真檀入朝留宿衛䕶密或曰逹摩悉鐵帝或曰鑊偘元魏所謂鉢和者亦吐火羅故地東北直京師九千里而嬴皆臨烏滸河當四鎮入吐火羅道十一月丁卯上幸驪山温泉丁丑還宫是嵗天下奏死罪止二十四人突騎施遣使入貢上宴之於丹鳯樓丹鳯門樓也東内大明宫正門曰丹鳯門突厥使者預焉二使爭長突厥曰突騎施小國本突厥之臣不可居我上突騎施曰今日之宴為我設也我不可以居其下長知兩翻為于偽翻上乃命設東西幕突厥在東突騎施在西開府儀同三司内外閑廐監牧都使霍國公王毛仲内外十二閑八坊四十八監及沙苑等監及諸牧皆屬之故曰都使恃寵驕恣日甚上每優容之毛仲與左領軍大將軍葛福順左監門將軍唐地文左武衛將軍李守徳右威衛將軍王景耀髙廣濟親善福順等倚其埶多為不法毛仲求兵部尚書不得怏怏形於辭色監占銜翻怏於兩翻上由是不恱是時上頗寵任宦官往往為三品將軍楊思勗髙力士之徒是也門施棨㦸棨音啟項安世家説曰棨㦸殳也以赤油韜之亦曰油㦸奉使過諸州官吏奉之惟恐不及所得賂遺少者不減千緡使疏吏翻遺于季翻由是京城郊畿田園參半皆宦官矣參半者或居三分之一或居其半楊思勗髙力士尤貴幸思勗屢將兵征討楊思勗屢出征嶺南皆有功明皇不以閹人殿國師為辱而又寵秩之將即亮翻力士常居中侍衛而毛仲視宦官貴近者若無人甚卑品者甚當作其小忤意輒詈辱如僮僕忤五故翻詈力智翻力士等皆害其寵而未敢言㑹毛仲妻産子三日上命力士賜之酒饌金帛甚厚饌雛戀翻又雛晥翻且授其兒五品官力士還上問毛仲喜乎對曰毛仲抱其襁中兒示臣曰此兒豈不堪作三品邪襁居兩翻上大怒曰昔誅韋氏此賊心持兩端事見二百九卷睿宗景雲元年朕不欲言之今日乃敢以赤子怨我力士因言北門奴官太盛王毛仲李守徳皆帝奴也又葛福順等皆出於萬騎中宗以户奴補萬騎故云然相與一心不早除之必生大患上恐其黨驚懼為變十九年春正月壬戌下制但述毛仲不忠怨望貶瀼州别駕瀼如羊翻又而章翻宋白曰瀼州臨潭郡隋將劉方始開此路貞觀十二年尋劉方故道行逹交趾開拓夷獠置瀼州州在欝林之西南交趾之東北有瀼水以為州名考異曰實録十八年六月乙丑王毛仲貶瀼州按唐厯統紀舊紀毛仲貶皆在十九年正月今從之福順地文守徳景耀廣濟皆貶逺州别駕毛仲四子皆貶逺州參軍連坐者數十人毛仲行至永州追賜死舊志永州京師南三千二百七十四里自是宦官勢益盛髙力士尤為上所寵信嘗曰力士上直上直掌翻吾寢則安故力士多留禁中稀至外第四方表奏皆先呈力士然後奏御小者力士即决之勢傾内外金吾大將軍程伯獻少府監馮紹正與力士約為兄弟力士母麥氏卒伯獻等被髪受弔擗踴哭泣過於己親被皮義翻擗毘亦翻撫心也力士娶瀛州吕𤣥晤女為妻擢𤣥晤為少卿子弟皆王傅唐諸王傳從三品掌輔相賛導匡其過失吕氏卒朝野爭致祭朝直遥翻自第至墓車馬不絶然力士小心㳟恪故上終親任之辛未遣鴻臚卿崔琳使于吐蕃琳神慶之子也崔神慶進用於武后之時臚陵如翻使疏吏翻下同吐蕃使者稱公主求毛詩春秋禮記正字于休烈上疏上時掌翻疏所去翻申考異曰實録十一年七月壬敇遣崔琳充入吐蕃使癸未命有司寫毛詩禮記等賜金城公主于休烈諫丁亥以崔琳為御史大夫八月辛夘降書與吐蕃按吐蕃傳此年十月論名悉獵至京師本紀唐厯皆同十九年正月辛未乃遣崔琳報使二月甲午以琳為御史大夫三月乙酉琳享于吐蕃金城公主因名悉獵請書于休烈乃諫實録皆誤在前年七月八月按七月癸丑朔亦無丁亥以為東平王漢之懿親求史記諸子漢猶不與漢成帝弟東平王宇來朝上疏求諸子及太史公書上以問大將軍王鳯鳯曰諸子書或反經術非聖人或明鬼神信物怪太史公書有戰國縱横權譎之謀漢興之初謀臣奇策天官災異地形阨塞皆不宜在諸侯王不可與遂不與况吐蕃國之冦讐今資之以書使知用兵權略愈生變詐非中國之利也事下中書門下議之事下遐嫁翻裴光庭等奏吐蕃聾昧頑嚚久叛新服因其有請賜以詩書庶使之漸陶聲教化流無外休烈徒知書有權略變詐之語不知忠信禮義皆從書出也上曰善遂與之休烈志寧之𤣥孫也于志寧事太宗髙宗得罪於武后丙子上躬耕於興慶宫側盡三百歩三月突厥左賢王闕特勒卒賜書弔之闕特勒殺黙啜之子而立毗伽威得行於其國故賜書弔之丙申初令兩京諸州各置太公廟以張良配享選古名將以備十哲張良配饗齊大司馬田穰苴吴將軍孫武魏西河太守吴起燕昌國君樂毅秦武安君白起漢淮隂侯韓信蜀丞相諸葛亮尚書右僕射衛國公李靖司空英國公李勣將即亮翻以二八月上戊致祭如孔子禮祠武成王自此始臣光曰經緯天地之謂文戡定禍亂之謂武自古不兼斯二者而稱聖人未之有也故黄帝堯舜禹湯文武伊尹周公莫不有征伐之功孔子雖不試猶能兵萊夷却費人曰我戰則克魯定公與齊㑹于夾谷孔子相齊使萊夷以兵刼魯公孔子曰士兵之兩君合好而裔夷以兵亂之非齊君所以命諸侯也齊侯聞之遽辟之及攝行相事將墮三都於是叔孫氏墮郈季氏將墮費公山不狃叔孫輙帥費人以襲魯仲尼命申句須樂頎伐之費人北國人追之敗諸姑蔑二子奔齊遂墮費又孔子曰我戰則克祭則受福費音秘豈孔子專文而太公專武乎孔子所以祀於學者禮有先聖先師故也自生民以來未有如孔子者豈太公得與之抗衡哉古者有發則命大司徒教士以車甲臝股肱决射御記王制之言有發謂有軍師發卒教以乘兵車衣甲之儀羸股肱决射御謂擐衣出其臂脛使之射御决勝負見勇力羸力果翻受成獻馘莫不在學詩魯頌泮水曰矯矯虎臣在泮獻馘淑問如臯陶在泮獻囚受成謂受獄辭之成也所以然者欲其先禮義而後勇力也先悉薦翻後户搆翻君子有勇而無義為亂小人有勇而無義為盗論語載孔子之言若専訓之以勇力而不使之知禮義奚所不為矣自孫吳以降皆以勇力相勝狙詐相髙豈足以數於聖賢之門而謂之武哉乃復誣引以偶十哲之目為後世學者之師復扶又翻使太公有神必羞與之同食矣五月壬戌初立五嶽真君祠程大昌演繁露曰開元十九年司馬承禎言今五嶽神祠是山林之神非正真之神也敕各置真君祠一所杜佑曰開元九年天台道士司馬承禎言今五嶽神祠是山林之神非正真之神五嶽皆有洞府有上清真人降任其職山川風雨隂陽氣序是所理焉冠冕服章佐從神仙皆有名數請别立齋祠之所上竒其説因敕五岳各置真君祠秋九月辛未吐蕃遣其相論尚它硉入見請於赤嶺為互市許之相悉亮翻硉郎兀翻見賢遍翻石堡城西二十里至赤嶺冬十月丙申上幸東都或告巂州都督解人張審素贓汚解縣屬河中府元魏分解縣置虞鄉縣貞覲十七年省解縣併入虞鄉二十年復置解縣省虞鄉天授二年復分解縣置虞鄉縣定為兩縣巂音髓解戸買翻制遣監察御史楊汪按之總管董元禮將兵七百圍汪殺告者監古銜翻將即亮翻謂汪曰善奏審素則生不然則死㑹救兵至擊斬之汪奏審素謀反十二月審素坐斬籍沒其家為後審素二子復讐張本浚苑中洛水六旬而罷二十年春正月乙卯以朔方節度副大使信安王禕為河東河北行軍副大總管將兵擊奚契丹壬申以户部侍郎裴耀卿為副總管二月癸酉朔日有食之上思右驍衛將軍安金藏忠烈金藏事見二百五卷武后長夀二年驍堅堯翻三月賜爵代國公仍於東西岳立碑以銘其功金藏竟以夀終信安王禕帥裴耀卿及幽州節度使趙含章分道擊契丹帥讀曰率下同含章與虜遇虜望風遁去平盧先鋒將烏承玼言於含章曰二虜劇賊也前日遁去非畏我乃誘我也將即亮翻玼且禮翻又音此誘音酉宜按兵以觀其變含章不從與虜戰於白山白山後漢時烏桓所居在五阮闗外大荒中果大敗承玼别引兵出其右擊虜破之己巳禕等大破奚契丹俘斬甚衆庚考異曰唐厯作午今從實録可突干帥麾下逺遁餘黨潜竄山谷奚酋李詩𤨏髙帥五千餘帳來降酋慈由翻降户江翻禕引兵還賜李詩爵歸義王充歸義州都督徙其部落置幽州境内髙宗總章中以新羅降户置歸義州於良鄉縣廣陽城後廢今復置以處李詩部落夏四月乙亥宴百官於上陽東洲上陽宫南臨洛水引洛水為中洲於宫之東醉者賜以衾褥肩輿以歸相屬于路屬之欲翻六月丁丑加信安王禕開府儀同三司上命裴耀卿齎絹二十萬匹分賜立功奚官耀卿謂其徒曰戎狄貪婪婪盧含翻今齎重貨深入其境不可不備乃命先期而往先悉薦翻分道並進一日給之俱畢突厥室韋果發兵邀隘道欲掠之比至耀卿已還比必利翻趙含章坐贓巨萬杖于朝堂朝直遥翻流瀼州道死秋七月蕭嵩奏自祠后土以來屢獲豐年宜因還京賽祠上從之祠后土見上卷十一年還京謂還西京也賽先代翻敕裴光庭蕭嵩分押左右廂兵此分押南牙左右廂兵也八月辛未朔日有食之初上命張説與諸學士刋定五禮説薨蕭嵩繼之起居舍人王仲丘請依明慶禮明慶即顯慶也避中宗諱改曰明慶祈榖大雩明堂皆祀昊天上帝嵩又請依上元敕父在為母齊衰三年皆從之禮父在為母服朞開元之初禇無量固嘗以為言矣為于偽翻齊音咨衰倉囘翻以髙祖配圓丘方丘太宗配雩祀及神州地祇睿宗配明堂九月乙巳新禮成上之上時掌翻號曰開元禮勃海靺鞨王武藝遣其將張文休帥海賊冦登州靺鞨音末曷將即亮翻帥讀曰率殺刺史韋俊上命右領軍將軍葛福順發兵討之去年春葛福順方以黨附王毛仲貶今則仍為宿衛葢毛仲既誅福順等復叙用也開元九年貶王晙梓州已而復為尚書復居邉任事亦類此壬子河西節度使牛仙客加六階初蕭嵩在河西委軍政於仙客仙客亷勤善於其職嵩屢薦之竟代嵩為節度使冬十月壬午上發東都辛卯幸潞州辛丑至北都十一月庚申祀后土于汾隂蕭嵩之言也赦天下十二月辛未還西京是嵗以幽州節度使兼河北采訪處置使増領衛相洺貝冀魏深趙恒定邢徳博棣營鄚十六州及安東都䕶府徳州漢安徳廣川平昌之地舊置平原郡時置徳州安東都䕶府時治平州處昌吕翻使疏吏翻恒户登翻鄚音莫天下户七百八十六萬一千二百三十六口四千五百四十三萬一千二百六十五二十一年春正月乙巳祔肅明皇后于太廟毁儀坤廟肅明留祀儀坤見二百十一卷四年丁巳上幸驪山温泉上遣大門藝詣幽州發兵以討勃海王武藝玼考異曰新書烏承傳云可突干殺其王邵固降突厥而奚亦亂是嵗奚契丹入冦詔承玼擊之破於捺禄山又云勃海大武藝行兵至馬都山屠城邑承玼窒要路塹以大石亘四百里於是流人得還土少休脱鎧而耕嵗省度支運錢按韓愈為烏重􅏷作廟碑叙重𦙍父承洽云屢破契丹從戰捺禄走可突干勃海上至馬都山吏民逃徙失業尚書領所部兵塞其道塹原累石綿四百里深髙皆三丈冦不得進民還其居嵗罷錢三千萬疑新書約此碑作承玼傳按新舊帝紀及勃海傳皆無武藝入冦至馬都山事或者韓碑云走可突干勃海上至馬都山謂破走可突干勃海上追之至馬都山耳二十一年郭英傑與可突干戰都山然則都山葢契丹之地也吏民逃徙失業葢因可突干入冦而然與上止是一事新書承之致誤然未知新書承玼傳中餘事别據何書庚申命太僕員外卿金思蘭使于新羅思蘭新羅王之侍子留京師官為太僕卿員外置發兵擊其南鄙㑹大雪丈餘山路阻隘士卒死者過半無功而還武藝怨門藝不已密遣客刺門藝於天津橋南不死上命河南搜捕賊黨盡殺之河南謂河南府刺七亦翻二月丁酉金城公主請立碑於赤嶺以分唐與吐蕃之境許之為後絶吐蕃和親仆赤嶺碑張本三月乙巳侍中裴光庭薨太常博士孫琬議光庭用循資格失勸奬之道請諡曰克其子稹訟之稹止忍翻上賜諡忠獻上問蕭嵩可以代光庭者嵩與右散騎常侍王丘善將薦之固讓於右丞韓休嵩言休於上蕭嵩既能用王丘之言而薦韓休使能與之和衷則丘之善乃嵩之善也甲寅以休為黄門侍郎同平章事休為人峭直峭七肖翻峻也不干榮利及為相甚允時望始嵩以休恬和謂其易制易以䜴翻故引之及與共事休守正不阿嵩漸惡之宋璟歎曰不意韓休乃能如是上或宫中宴樂及後苑遊獵小有過差輒謂左右曰韓休知否言終諫疏已至上嘗臨鏡黙然不樂左右曰韓休為相陛下殊瘦於舊何不逐之上歎曰吾貎雖瘦天下必肥蕭嵩奏事常順指既退吾寢不安韓休常力爭既退吾寢乃安吾用韓休為社稷耳非為身也惡烏路翻樂音洛為于偽翻明皇待韓休如此而不能久任之何也有供奉侏儒名黄㼐㼐部田翻性警黠黠下八翻慧也上常馮之以行謂之肉几寵賜甚厚一日晩入上恠之對曰臣曏入宫道逢捕盗官與臣爭道臣掀之墜馬故晩掀虚言翻因下階叩頭上曰但使外無章奏汝亦無憂有頃京兆奏其狀上即叱出付有司杖殺之閏月癸酉幽州道副總管郭英傑與契丹戰于都山敗死時節度薛楚玉遣英傑將精騎一萬及降奚擊契丹屯於榆闗之外榆當作渝此渝闗在營平之間古所謂臨渝之險者也漢書音義渝音喻又唐勝州界有榆闗隋之榆林郡界二闗有渝榆之異史家傳寫混淆無别故詳辯之將即亮翻騎竒寄翻降户江翻下同可突干引突厥之衆來合戰奚持兩端散走保險唐兵不利英傑戰死餘衆六千餘人猶力戰不已虜以英傑首示之竟不降盡為虜所殺楚玉訥之弟也夏六月癸亥制自今選人有才業操行委吏部臨時擢用流外奏用不復引過門下操七到翻行下孟翻復扶又翻雖有此制而有司以循資格便於己猶踵行之史言裴光庭之弊法後人循襲莫之能革是時官自三師以下一萬七千六百八十六員唐制太師太傅太保為三師吏自佐史以上五萬七千四百一十六員而入仕之塗甚多不可勝紀勝音升秋七月乙丑朔日有食之九月壬午立皇子沔為信王泚為義王漼為陳王澄為豐王潓為恒王漎為梁王沔彌兖翻泚且禮翻又音此潓胡桂翻漎徂聰翻又徂宗翻又將容翻又之戎翻恒户登翻滔為汴王汴皮變翻闗中久雨榖貴上將幸東都召京兆尹裴耀卿謀之對曰闗中帝業所興當百代不易但以地狹榖少故乘輿時幸東都以寛之少詩沼翻乘繩證翻臣聞貞觀永徽之際禄廪不多嵗漕闗東一二十萬石足以周贍贍而艶翻乘輿得以安居今用度寖廣運數倍於前猶不能給故使陛下數冒寒暑以恤西人下數所角翻今若使司農租米悉輸東都自都轉漕稍實闗中茍闗中有數年之儲則不憂水旱矣且吳人不習河漕所在停留日月既久遂生隱盗臣請於河口置倉河口汴水逹河之口也河口倉謂之武牢倉使吳船至彼即輸米而去官自雇載分入河洛又於三門東西各置一倉禹鑿底柱二石見於水中若柱然故曰底柱河水至此分為三𣲖流出其間故亦謂之三門時於三門東置集津倉西置鹽倉至者貯納貯丁吕翻水險則止水通則下或開山路車運而過時於三門旁側鑿山路十八里以陸運以避底柱之險則無復留滯省費鉅萬矣河渭之濵皆有漢隋舊倉葺之非難也上深然其言冬十月庚戌上幸驪山温泉己未還宫戊子左丞相宋璟致仕歸東都韓休數與蕭嵩爭論於上前面折嵩短數所角翻折之舌翻上頗不悦嵩因乞骸骨上曰朕未厭卿卿何為遽去對曰臣䝉厚恩待罪宰相富貴已極及陛下未厭臣故臣得從容引去從千容翻若已厭臣臣首領且不保安能自遂因泣下蕭嵩為乞憐之態既以自保寵禄亦所以傾韓休也上為之動容為于偽翻曰卿且歸朕徐思之丁巳嵩罷為左丞相休罷為工部尚書以京兆尹裴耀卿為黄門侍郎前中書侍郎張九齡時居母䘮起復中書侍郎並同平章事是嵗分天下為京畿都畿闗内河南河東河北隴右山南東道山南西道劒南淮南江南東道江南西道黔中嶺南凡十五道各置采訪使以六條檢察非法兩畿以中丞領之餘皆擇賢刺史領之京畿采訪使治西京城内都畿治東都闗内采訪使以京官領之河南采訪使治汴州河東治蒲州河北治魏州隴右治鄯州山南東道治襄州西道治梁州淮南治揚州江南東道治蘇州西道治洪州黔中治黔州劒南治益州嶺南治廣州其後有以邉鎮節度領采訪使者則闗中道固不拘京官而諸道采訪使治所亦難槩拘以定所也非官有遷免則使無廢更使疏吏翻更工衡翻惟變革舊章乃須報可自餘聽便宜從事先行後聞太府卿楊崇禮政道之子也楊政道隋煬帝之孫齊王暕之子在太府二十餘年前後為太府者莫能及時承平日久財貨山積嘗經楊卿者無不精美毎嵗句駮省便出錢數百萬緡句音鈎句者句考其出入或多或少駮者按文籍有並緣欺弊則駮異之省者節其冗濫之費便者貿遷各隨其便以取贏駮北角翻是嵗以户部尚書致仕年九十餘矣上問宰相崇禮諸子誰能繼其父者對曰崇禮三子慎餘慎矜慎名皆亷勤有才而慎矜為優上乃擢慎矜自汝陽令為監察御史知太府出納慎名攝監察御史知含嘉倉出納含嘉倉在東都監工衘翻亦皆稱職上甚悦之稱尺證翻慎矜奏諸州所輸布帛有漬汚穿破者漬疾智翻汚烏故翻皆下本州徵折估錢轉市輕貨徵調始繁矣估音古下遐嫁翻調徒弔翻資治通鑑卷二百十三
