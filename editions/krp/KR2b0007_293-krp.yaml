front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷二百九十三宋司馬光撰胡三省音註後周紀四起柔兆執徐三月盡彊圉大荒落凡一年有竒世宗睿文孝武皇帝中顯徳三年三月甲午朔上行視水寨至淝橋行下孟翻淝橋於淝水上為橋也自取一石馬上持之至寨以供礮從官過橋者人齎一石礮與砲同音普豹翻從才用翻齎牋西翻太祖皇帝乗皮船入夀春壕中城上發連弩射之皮船縫牛皮為之連弩即今之划車弩也射而亦翻矢大如屋椽牙將館陶張瓊遽以身蔽之矢中瓊髀椽重椽翻中竹仲翻髀部禮翻死而復蘇鏃著骨不可出著直畧翻瓊飲酒一大巵令人破骨出之流血數升神色自若史言張瓊之勇後太祖登極遂以瓊總侍衛親兵唐主復以右僕射孫晟為司空復扶又翻遣與禮部尚書王崇質奉表入見稱自天祐以來見賢遍翻天祐唐昭宗年號海内分崩或跨據一方或遷革異代跨據一方謂四方割劇之國遷革異代謂中國數易主也臣紹襲先業奄有江表顧以瞻烏未定附鳳何從詩曰瞻烏爰止于誰之屋漢耿純曰攀龍鱗附鳳翼此言未見真主則無從而歸附也今天命有歸聲教逺被被皮義翻願比兩浙湖南仰奉正朔謹守土疆兩浙自錢鏐以來湖南自馬殷以來皆奕世奉事中國乞收薄伐之威薄迫也有鐘鼓曰伐詩云薄伐西戎又云薄伐玁狁赦其後服之罪首於下國俾作外臣則柔逺之徳云誰不服又獻金千兩銀十萬兩羅綺二千匹晟謂馮延己曰此行當在左相唐以馮延己為左僕射位在孫晟上故晟云然晟若辭之則負先帝既行知不免中夜歎息謂崇質曰君家百口宜自為謀吾思之熟矣終不負永陵一培土餘無所知永陵者唐主父昇墓也培蒲枚翻唐陸龜䝉築城詞城上一培土手中千萬杵則培土以益土為義一培土猶言益一畚土也又薄口翻説文曰培塿小冡也一培土猶言一冢土也歐史作一抔土南漢甘泉宫使林延遇隂險多計數南漢主倚信之誅滅諸弟皆延遇之謀也南漢主誅諸弟事並見前乙未卒國人相賀延遇病甚薦内給事龔澄樞自代南漢主即日擢澄樞知承宣院及内侍省澄樞番禺人也龔澄樞繼林延遇用事南漢遂亡矣畨音潘禺魚容翻又音愚光舒黄招安廵檢使行光州刺史何超以安隨申蔡四州兵數萬攻光州九域志光州西南至安州六百里隨州東至安州二百四十里東北至申州二百五十里申州東至光州二百五十五里光州北至蔡州二百五十里葢以鄰郡之兵環而攻之丙申超奏唐光州刺史張紹棄城走都監張承翰以城降丁酉行舒州刺史郭令圖拔舒州唐蘄州將李福殺其知州王承雋舉州來降遣六宅使齊藏珍攻黄州九域志舒州西至蘄州二百九十八里蘄州西至黄州二百一十里三州皆瀕江彰武留後李彦頵性貪虐頵於倫翻部民與𦍑胡作亂攻之上召彦頵還朝自延州召還還從宣翻又如字朝直遥翻秦鳳之平也事見上卷上年上赦所俘蜀兵以𨽻軍籍五代㑹要顯徳二年十二月以新收秦鳳州所擒川軍署為懷恩軍所謂𨽻軍籍也從征淮南復亡降于唐復扶又反癸卯唐主表獻百五十人上悉命斬之舒州人逐郭令圖鐡騎都指揮使洛陽王審琦選輕騎夜襲舒州復取之令圖乃得歸得復歸舒州馬希崇及王延政之子繼沂皆在揚州招撫存之楚閩世事中國其後為南唐所俘囚於揚州周得揚州故撫存之丙午孫晟等至上所至行在所也庚戌上遣中使以孫晟詣夀春城下且招諭之仁贍見晟戎服拜於城上以邊帥見宰相禮拜晟晟謂仁贍曰君受國厚恩不可開門納㓂上聞之甚怒晟曰臣為宰相豈可教節度使外叛邪上乃釋之孫晟之辭直周世宗亦何以罪之唐主使李徳明孫晟言於上請去帝號去𦍑吕翻割夀濠泗楚光海六州之地六州之地皆瀕淮周既得之則唐失長淮之險藉使周從唐之請而罷兵江北之地它日亦不能守矣仍歳輸金帛百萬以求罷兵輸春遇翻上以淮南之地已半為周有諸將㨗奏日至欲盡得江北之地不許徳明見周兵日進奏稱唐主不知陛下兵力如此之盛願寛臣五日之誅得歸白唐主盡獻江北之地上乃許之晟因奏遣王崇質與徳明俱歸王崇質副孫晟來使上遣供奉官安𢎞道送徳明等歸金陵賜唐主書其略曰但存帝號何爽嵗寒爽差也言嵗寒知松柏之後彫此約不差也許唐主自帝江南儻堅事大之心終不廹人于險又曰俟諸郡之悉來謂江北諸郡也即大軍之立罷言盡於此更不煩云煩勞也言更不勞云云也茍曰未然請從茲絶又賜其將相書使熟議而來唐主復上表謝復扶又翻上時掌翻李徳明盛稱上威徳及甲兵之彊勸唐主割江北之地唐主不悦宋齊丘以割地為無益徳明輕佻言多過實國人亦不之信佻士彫翻國人謂南唐通國之人史言誕妄之士雅不足以孚乎人不惟喪身且誤國事樞密使陳覺副使李徴古素惡徳明與孫晟惡烏路翻使王崇質異其言因譖徳明於唐主曰徳明賣國求利唐主大怒斬徳明於市為鍾謨為李徳明修怨張本呉程攻常州破其外郭執唐常州團練使趙仁澤送于錢唐仁澤見呉越王𢎞俶不拜責以負約唐興呉越本通好而呉越以周之命而攻唐故責其負約𢎞俶怒决其口至耳元徳昭憐其忠為傅良藥得不死唐非無忠臣也不能用耳為于偽翻唐主以呉越兵在常州恐其侵逼潤州九域志常州西北至潤州一百七十一里以宣潤大都督燕王𢎞冀年少少詩照翻恐其不習兵徴還金陵還從宣翻部將趙鐸言於𢎞冀曰大王元帥衆心所恃逆自退歸所部必亂𢎞冀然之辭不就徴部分諸將為戰守之備分扶問翻龍武都虞候柴克宏再用之子也柴再用事楊氏為將屢立戰功又及事徐温父子沈黙好施沈持林翻好呼到翻施式豉翻不事家産雖典宿衛日與賔客博奕飲酒未嘗言兵時人以為非將帥才將即亮翻帥所類翻至是有言克宏久不遷官者唐主以為撫州刺史克宏請效死行陳其母亦表稱克宏有父風可為將茍不勝任分甘孥戮趙括之母不肯保任其子柴克宏之母自稱薦其子皆知之審也孥子也言與其子甘同戮也行户剛翻陳與陣同勝音升分扶問翻孥音奴唐主乃以克宏為右武衛將軍使將兵㑹袁州刺史陸孟俊救常州時唐精兵悉在江北克宏所將數千人皆羸老羸倫為翻樞密使李徴古復以鎧仗之朽蠧者給之克宏訴於徴古徴古慢罵之衆皆憤恚恚於避翻克宏怡然至潤州徴古遣使召還還從宣翻又如字以神衛統軍朱匡業代之燕王𢎞冀謂克宏謂者告語之也君但前戰吾當論奏乃表克宏才略可以成功常州危在旦莫莫讀曰暮不宜中易主將克宏引兵徑趣常州趣七喻翻徴古復遣使召之復扶又翻克宏曰吾計日破賊汝來召吾必奸人也命斬之使者曰受李樞密命而來克宏曰李樞密來吾亦斬之柴克宏前日之怡然乃養成今日之勇决也初鮑修讓羅晟在福州與呉程有隙漢天福十二年呉越使鮑修讓戍福州是年以呉程鎮福州至是程抑挫之二人皆怨先是唐主遣中書舎人喬匡舜使於呉越先悉薦翻壬子柴克宏至常州䝉其船以幕匿甲士於其中聲言迎匡舜呉越邏者以告邏即佐翻程曰兵交使在其間用左傳語不可妄以為疑唐兵登岸徑薄呉越營羅晟不力戰縱之使趣程帳趣七喻翻程僅以身免克宏大破呉越兵斬首萬級朱匡業至行營克宏事之甚謹呉程至錢唐呉越王𢎞俶悉奪其官甲寅蜀主以捧聖控鶴都指揮使李廷珪為左右衛聖諸軍馬步都指揮使仍分衛聖匡聖步騎為左右十軍以武定節度使吕彦琦等為使為軍使也廷珪總之如趙廷隱之任蜀自李仁罕之誅趙廷隱専總宿衛諸軍後為安思謙所譖罷事並見前初柴克宏為宣州廵檢使始至城塹不修器械皆闕吏云自田頵王茂章李遇相繼叛唐天復三年田頵以宣州叛楊行密天祐二年王茂章叛梁乾元二年李遇叛事並見前紀頵於倫翻後人無敢治之者治直之翻克宏曰時移事異安有此理悉繕完之由是路彦銖攻之不克史言宣州獲全亦柴克宏之力聞呉程敗乙卯引歸唐主以克宏為奉化節度使克宏復請將兵救夀州未至而卒人有身死而名全者柴克宏是也克宏敵呉越可以勝使遇周師未必能爾復扶又翻河陽節度使白重贊重直龍翻以天子南征慮北漢乗虚入冦繕完守備且請兵於西京西京留守王晏初不之與又慮事出非常乃自將兵赴之重贊以晏不奉詔而來拒不納遣人謂之曰令公昔在陜服已立大功謂天福十二年晏舉陜城降漢髙祖也晏時兼中書令故稱為令公陜失冉翻河陽小城不煩枉駕晏慙怍而還怍疾各翻還從宣翻又如字孟洛之民數日驚擾以王晏出兵而白重贊拒之恐兵交而罹其禍唐主命諸道兵馬元帥齊王景達將兵拒周以陳覺為監軍使前武安節度使邊鎬為應援都軍使邊鎬以失潭州奪節今叙用之中書舎人韓熙載上書曰信莫信於親王重莫重於元帥安用監軍使為句斷唐主不從遣鴻臚卿潘承祐詣泉建召募驍勇承祐薦前永安節度使許文稹稹止忍翻靜江指揮使陳徳誠建州人鄭彦華林仁肇唐主以文稹為西面行營應援使彦華仁肇皆為將將即亮翻仁肇仁翰之弟也林仁翰見二百八十四卷晉出帝開運元年唐主之保大二年也夏四月甲子以侍衛親軍都指揮使歸徳節度使李重進為廬夀等州招討使以武寜節度使武行徳為濠州城下都部署唐右衛將軍陸孟俊自常州將兵萬餘人趣泰州九域志自常州北至泰州一百九十七里周兵遁去孟俊復取之復取泰州遣陳徳誠戍泰州孟俊進攻掦州屯于蜀岡韓令坤棄掦州走蜀岡在掦州城西掦州城在蜀岡東南城之東南北皆平地溝澮交貫惟蜀岡諸山西接廬滁凡北兵南冦掦州率循山而來據髙為壘以臨之今陸孟俊據蜀岡以斷周兵援路故韓令坤懼而走帝遣張永徳將兵救之令坤復入掦州援兵至故復入掦州帝又遣太祖皇帝將兵屯六合六合縣屬掦州在州西北一百三十里劉昫曰六合漢臨淮郡之堂邑縣晉置秦郡北齊置秦州隋置方州後廢唐武徳初置六合縣太祖皇帝令曰掦州兵有過六合者折其足自掦州西北歸須過六合故云然折而設翻令坤始有固守之志帝自至夀春以來命諸軍晝夜攻城久不克㑹大雨營中水深數尺深式浸翻攻具及士卒失亡頗多時周兵以方舟載礟自淝河中流擊夀春城又束巨竹數十萬竿上施板屋號曰竹龍載甲士以攻之㑹淝水暴漲礟舟竹龍皆漂向南岸為唐兵所焚糧運不繼李徳明失期不至李徳明歸至金陵被誅乃議旋師或勸帝東幸濠州聲言夀州已破從之己巳帝自夀春循淮而東乙亥至濠州九域志夀州東至濠州三百八十里韓令坤販唐兵於城東此掦州城東也敗補邁翻擒陸孟俊初孟俊之廢馬希蕚立希崇也事見二百九十卷太祖廣順元年滅故舒州刺史楊昭惲之族而取其財惲於粉翻薛史曰楊昭惲長沙人父謚事馬殷為節度行軍司馬謚仲女為衡陽王夫人希聲襲位昭惲遷衡州刺史自以地連戚里積財貨建大第二子為牙内都將少長豪富任氣凌下士大夫惡之長沙兵亂陸孟俊怒曰楊氏怙寵滅義為國人所患久矣於是族滅楊氏舒當作衡楊氏有女美獻於希崇令坤入掦州希崇以楊氏遺令坤令坤嬖之遺唯季翻嬖卑義翻又必計翻愛也幸也既獲孟俊將械送帝所楊氏在簾下忽撫膺慟哭令坤驚問之對曰孟俊昔在潭州殺妾家二百口今日見之請復其寃令坤乃殺之史言人不可妄殺雖女子亦能復讐唐齊王景達將兵二萬自𤓰歩濟江距六合二十餘里設柵不進諸將欲擊之太祖皇帝曰彼設柵自固懼我也今吾衆不滿二千若往擊之則彼見吾衆寡矣不如俟其來而擊之破之必矣居數日唐出兵趣六合趣七喻翻太祖皇帝奮擊大破之殺獲近五千人近其靳翻餘衆尚萬餘爭舟走度江溺死者甚衆於是唐之精卒盡矣是戰也士卒有不致力者太祖皇帝陽為督戰以劔斫其皮笠明日徧閲其皮笠有劒跡者數十人皆斬之由是部兵莫敢不盡死先是唐主聞掦州失守命四旁發兵取之先悉薦翻己卯韓令坤奏敗掦州兵萬餘人於灣頭堰九域志掦州江都縣有灣頭鎮在今掦州城北十五里敗補邁翻獲漣州刺史秦進崇唐葢置漣州於漣水縣九域志漣水西南至楚州六十里張永徳奏敗泗州萬餘人於曲溪堰曲溪在盱眙縣西南十里按招信圖經曲溪堰亦謂之新河堰丙戌以宣徽南院使向訓為淮南節度使兼㳂江招討使渦口奏新作浮梁成丁亥帝自濠州如渦口渦口渦水入淮之口郡縣志渦口城東南至濠州九十里渦音戈帝鋭於進取欲自至掦州范質等以兵疲食少泣諫而止又嘗怒翰林學士竇儀欲殺之范質入救之帝望見識其意即起避之質趨前伏地叩頭諫曰儀罪不至死臣為宰相致陛下枉殺近臣罪皆在臣繼之以泣帝意解乃釋之北漢𦵏神武帝於交城北山隋分晉陽縣置交城縣取縣西北古交城為名初治交山唐天授元年移治却波村九域志在陽曲縣西南一百里宋白曰大通監本古交城之地管東西二冶烹鐡務東冶在綿上縣西冶在交城縣北山廟號世祖五月丙辰朔以渦口為鎮淮軍丙申唐永安節度使陳誨敗福州兵於南臺江今福州南九里有釣龍臺山臨江南臺江當即是此地薛史地理志福州福唐縣晉天福初改為南臺縣葢以江名縣也後復舊俘斬千餘級唐主更命永安曰忠義軍晉開運二年唐克建州置永安軍更工衡翻誨徳誠之父也戊戌帝留侍衛親軍都指揮使李重進等圍夀州自渦口北歸乙卯至大梁自渦口至大梁七百四十里六月壬申赦淮南諸州繫囚除李氏非理賦役事有不便於民者委長吏以聞長知兩翻侍衛步軍都指揮使彰信節度使李繼勲營於夀州城南唐劉仁贍伺繼勲無備伺相吏翻出兵擊之殺士卒數百人焚其攻具唐駕部員外郎朱元因奏事論用兵方略唐主以為能命將兵復江北諸州將即亮翻下同秋七月辛卯朔以周行逢為武平節度使制置武安靜江等軍事行逢既兼總湖湘乃矯前人之弊留心民事悉除馬氏横賦横戸孟翻下驕横同馬氏自希範以來始加賦於境内貪吏猾民為民害者皆去之去羌吕翻擇亷平吏為刺史縣令朗州民夷雜居劉言王逵舊將多驕横行逢壹以法治之無所寛假衆怨懟且懼治直之翻懟直類翻有大將與其黨十餘人謀作亂行逢知之大會諸將於座中擒之數曰吾惡衣糲食充實府庫正為汝曹數所具翻責數也糲盧達翻為于偽翻何負而反今日之會與汝訣也立撾殺之座上股栗行逢曰諸君無罪皆宜自安樂飲而罷撾則𤓰翻樂音洛行逢多計數善發隱伏將卒有謀亂及叛亡者行逢必先覺擒殺之所部凛然然性猜忍常散遣人密詗諸州事詗古永翻又翾正翻其之邵州者無事可復命但言刺史劉光委多宴飲行逢曰光委數聚飲數所角翻欲謀我邪即召還殺之親衛指揮使衡州刺史張文表恐獲罪求歸治所求解兵柄歸衡州也行逢許之文表嵗時饋獻甚厚及謹事左右由是得免其後行逢臨卒謂其子保權曰吾起隴畆為團兵同時十人皆誅張文表獨存是時王逵張倣何敬真朱全琇潘叔嗣皆已死唯蒲公益宇文瓊彭萬和與文表史不言其有它此三人者必又相繼為行逢所殺而文表獨免也行逢死則文表叛矣行逢妻鄖國夫人鄧氏鄖音云路振九國志作嚴氏陋而剛决善治生治直之翻嘗諫行逢用法太嚴人無親附者行逢怒曰汝婦人何知鄧氏不悦因請之村墅視田園遂不復歸府舎之往也墅承與翻復扶又翻府舎朗州府舎也行逢屢遣人迎之不至一旦自帥僮僕來輸税帥讀曰率輸舂遇翻下同行逢就見之曰吾為節度使夫人何自苦如此鄧氏曰税官物也公為節度使不先輸税何以率下且獨不記為里正代人輸税以免楚撻時邪行逢欲與之歸不可不肯歸府舎也曰公誅殺太過常恐一旦有變村墅易為逃匿耳易以豉翻行逢慙怒其僚屬曰夫人言直公宜納之行逢壻唐徳求補吏行逢曰汝才不堪為吏吾今私汝則可矣汝居官無狀吾不敢以法貸汝則親戚之恩絶矣與之耕牛農具而遣之行逢少時嘗坐事黥𨽻辰州銅阬少詩照翻黥具京翻唐文宗之世天下銅阬五十辰州不在其數辰州銅阬葢馬氏所置也或説行逢公面有文恐為朝廷使者所嗤説式芮翻嗤丑之翻請以藥滅之行逢曰吾聞漢有黥布不害為英雄吾何耻焉黥布事見八卷秦二世二年自劉言王逵以來屢舉兵將吏積功及所羈縻蠻夷檢校官至三公者以千數羈縻蠻夷謂溪峒諸蠻夷前天策府學士徐仲雅自馬希廣之廢杜門不出馬希廣廢事見二百八十九卷漢乾祐二年行逢慕之署節度判官仲雅曰行逢昔趨事我奈何為之幕吏辭疾不至行逢迫脅固召之面授文牒終辭不取行逢怒放之邵州既而召還㑹行逢生日諸道各遣使致賀行逢有矜色謂仲雅曰自吾兼鎮三府三府武平武安靜江軍府也四鄰亦畏我乎仲雅曰侍中境内周行逢加侍中故徐仲雅稱之彌天太保徧地司空四鄰那得不畏行逢復放之邵州復扶又翻竟不能屈有僧仁及為行逢所信任軍府事皆預之亦加檢校司空娶數妻出入導從如王公從才用翻辛亥宣懿皇后符氏殂唐將朱元取舒州刺史郭令圖棄城走李平取蘄州唐主以元為舒州團練使平為蘄州刺史元又取和州朱元李平皆李守貞所遣求救於唐者也事見二百八十八卷漢乾祐元年初唐人以茶鹽强民而徴其粟帛謂之博徴强其兩翻博博易也言以茶鹽博易而徴其粟帛又興營田於淮南民甚苦之及周師至爭奉牛酒迎勞勞力到翻而將帥不之恤帥所類翻専事俘掠視民如土芥民皆失望相聚山澤立堡壁自固操農器為兵操七刀翻積紙為甲時人謂之臼甲軍周兵討之屢為所敗敗補邁翻先所得唐諸州多復為唐有唐之援兵營於紫金山紫金山在夀春南或云即八公山與夀春城中烽火相應淮南節度使向訓奏請以廣陵之兵併力攻夀春俟克城更圖進取詔許之訓封府庫以授揚州主者命揚州牙將分部按行城中秋毫不犯分扶問翻行下孟翻揚州民感悦軍還或負糗糒以送之糗去久翻熬米麥為之糒平秘翻乾飯也滁州守將亦棄城去皆引兵趣夀春唐諸將請據險以邀周師宋齊丘曰如此則怨益深乃命諸將各自保守毋得擅出擊周兵由是夀春之圍益急齊王景達軍于濠州遥為夀州聲援軍政皆出於陳覺景達署紙尾而已擁兵五萬無决戰意嗚呼比年襄陽之䧟得非援兵不進之罪將吏畏覺無敢言者八月戊辰端明殿學士王朴司天少監王處訥撰顯徳欽天厯上之初王處訥私造明𤣥厯于家因唐世所行崇𤣥厯而明之也帝以王朴通於厯數乃詔朴撰定以步日步月步星步發歛為四篇合為厯經併著顯徳三年七政細行厯一卷以為欽天厯詔自來嵗行之殿前都指揮使義成節度使張永徳屯下蔡唐將林仁肇以水陸軍援夀春永徳與之戰仁肇以船實薪芻因風縱火欲焚下蔡浮梁俄而風回唐兵敗退永徳為鐡綆千餘尺綆若杏翻距浮梁十餘步横絶淮流繫以巨木由是唐兵不能近近其靳翻九月丙午以端明殿學士左散騎常侍權知開封府事王朴為户部侍郎充樞密副使冬十月癸酉李重進奏唐人冦盛唐鐡騎都指揮使王彦昇等擊破之斬首三千餘級彦昇蜀人也丙子上謂侍臣近朝徴歛榖帛多不俟收穫紡績之畢侍臣之下有曰字文意乃足近朝猶言近代也朝直遥翻下同乃詔三司自今夏税以六月秋税以十月起徴五代會要曰二税起徴皆以月一日民間便之山南東道節度使守太尉兼中書令安審琦鎮襄州十餘年漢天福十二年安審琦鎮襄陽至是十年矣至是入朝除守太師遣還鎮既行上問宰相卿曹送之乎對曰送至城南審琦深感聖恩五代以來方鎮入朝者或留不遣或易置之今加官遣還鎮故感恩上曰近朝多不以誠信待諸侯諸侯雖有欲効忠節者其道無由王者但能毋失其信何患諸侯不歸心哉壬午張永徳奏敗唐兵于下蔡敗補邁翻是時唐復以水軍攻永徳復扶又翻永徳夜令善游者沒其船下縻以鐵鎖縱兵擊之船不得進退溺死者甚衆永徳解金帶以賞善游者甲申以太祖皇帝為定國節度使兼殿前都指揮使定國軍即同州匡國軍也太祖登極避御名始改為定國軍史亦因以後所改軍號書之太祖皇帝表渭州軍事判官趙普為節度推官張永徳與李重進不相悦永徳密表重進有二心帝不之信時二將各擁重兵衆心憂恐重進一日單騎詣永徳營李重進時在夀州城下張永徳營下蔡從容宴飲謂永徳曰吾與公幸以肺腑俱為將帥從千容翻下同李重進太祖之甥張永徳太祖之婿故云然奚相疑若此之深邪永徳意乃解衆心亦安唐主聞之以蠟丸遺重進誘以厚利其書皆謗毁及反間之語遺唯季翻誘以乆翻間古莧翻重進奏之初唐使者孫晟鍾謨從帝至大梁帝待之甚厚每朝會班於中書省官之後時召見飲以醇酒飲於鴆翻問以唐事晟但言唐主畏陛下神武事陛下無二心及得唐蠟書帝大怒召晟責以所對不實晟正色抗辭請死而已問以唐虚實黙不對十一月乙巳帝命都承㫖曹翰送晟於右軍廵院侍衛親軍分左右軍各有廵院以鞫繫囚更以帝意問之翰與之飲酒數行從容問之晟終不言翰乃謂曰有敇賜相公死以唐所授官稱之晟神色怡然索袍笏整衣冠南向拜曰臣謹以死報國乃就刑索山客翻孫晟可謂盡節於所事矣并從者百餘人皆殺之從才用翻貶鍾謨耀州司馬既而帝憐晟忠節悔殺之召謨拜衛尉少卿帝召華山隱士真源陳摶真源漢古縣隋為谷陽縣唐髙宗乾封元年以老子所生之地改為真源縣載初元年改為仙源縣神龍元年復曰真源屬亳州宋大中祥符七年改曰衛真縣九域志在州西六十里摶徒九翻問以飛升黄白之術飛升者謂羽化而升仙黄白者謂煉白金為黄金對曰陛下為天子當以治天下為務安用此為戊申遣還山詔州縣長吏常存問之治直之翻長知兩翻十二月壬申以張永徳為殿前都㸃檢後唐以來車駕行幸及出征則置大内都㸃檢之官後周選驍勇之士充殿前諸班始置殿前都㸃檢於都指揮使之上自宋太祖皇帝以殿前都㸃檢登極是後不復除授分命中使發陳蔡宋亳潁兖曹單等州丁夫城下蔡單音善是嵗唐主詔淮南營田害民尤甚者罷之遣兵部郎中陳處堯持重幣浮海詣契丹乞兵處昌吕翻處考異曰十國紀年作兵部郎中叚常今從晉陽聞見録契丹不能為之出兵為于偽翻而留處堯不遣處堯剛直有口辯久之忿懟數面責契丹主懟直類翻數所角翻契丹主亦不之罪也蜀陵榮州獠反宋白曰晉太元中益州刺史毛璩置西城戍於漢武陽縣之東境周閔帝元年於此置陵州因陵并為名榮州古夜郎國漢開為南安縣地蕭齊於此晉南安郡隋廢郡以其地屬資陽郡唐武徳初割資州之太牢威逺二縣置榮州取境有崇徳山為名獠魯皓翻弓箭庫使趙季文討平之職官分紀曰唐有内弓箭庫使五代去内字呉越王𢎞俶括境内民兵勞擾頗多判明州錢𢎞億手疏切諫罷之四年春正月己丑朔北漢大赦改元天會以翰林學士衛融為中書侍郎同平章事内客省使叚恒為樞密使恒户登翻宰相屢請立皇子為王上曰諸子皆㓜上諸子宗訓是為恭帝次熙讓熙謹熙誨且功臣之子皆未加恩而獨先朕子能自安乎周兵圍夀春連年未下前年十一月周兵始攻夀州城中食盡齊王景達自濠州遣應援使永安節度使許文稹都軍使邊鎬北面招討使朱元將兵數萬泝淮救之軍於紫金山列十餘寨如連珠與城中烽火晨夕相應又築甬道抵夀春甬余拱翻欲運糧以饋之綿亘數十里將及夀春李重進邀擊大破之死者五千人奪其二寨丁未重進以聞戊申詔以來月幸淮上劉仁贍請以邊鎬守城自帥衆决戰帥讀曰率齊王景達不許仁贍憤邑成疾其㓜子崇諫夜泛舟度淮北為小校所執校户教翻仁贍命腰斬之左右莫敢救監軍使周廷構哭於中門以救之仁贍不許廷構復使求救於夫人復扶又翻使䟽吏翻夫人曰妾於崇諫非不愛也然軍法不可私名節不可虧若貸之則劉氏為不忠之門妾與公何面目見將士乎趣命斬之然後成喪趣讀曰促將士皆感泣議者以唐援兵尚彊多請罷兵帝疑之李榖寢疾在第二月丙寅帝使范質王溥就與之謀榖上疏以為夀春危困破在旦夕若鑾駕親征則將士爭奮援兵震恐城中知亡必可下矣上悦庚午詔有司更造祭器祭玉等命國子博士聶崇義討論制度為之圖祭器樽彞簠簋籩豆之屬也祭玉蒼璧禮天黄琮禮地青圭禮東方赤璋禮南方白琥禮西方𤣥璜禮北方也時禮官博士凖詔議祭器祭玉制度國子祭酒尹拙引崔靈恩三禮義宗云蒼璧所以禮天其長十有二寸葢法天之十二時又引江都集白虎通諸書所説云璧皆外圓内方又云黄琮所以禮地其長十寸以法地之數其琮外方内圓八角而有好國子博士聶崇義以為璧内外皆圓其徑九寸按阮氏鄭𤣥圖皆云九寸周禮玉人職又有九寸之璧及引爾雅云肉倍好謂之璧好倍肉謂之瑗肉好若一謂之環郭璞注云好孔也肉邊也而不載尺寸之數崇義又引冬官玉人云璧好三寸爾雅云肉倍好謂之璧葢兩邊肉各三寸通好共九寸則其璧九寸明矣崇義又云黄琮八方以象地每角各剡出一寸六分共長八寸厚一寸按周禮圖及阮氏圖並無好又引冬官玉人云琮八角而無好崇義又云琮璜圭璧並是禮天地之器而爾雅唯言璧環瑗三者有好其餘琮璜諸器並不言之則黄琮八角而無好明矣時太常卿田敏已下以崇義援引周禮正文為是乃從之更工衡翻聶尼輒翻甲戌以王朴權東京留守兼判開封府事以三司使張美為大内都廵檢以侍衛都虞候韓通為京城内外都廵檢乙亥帝發大梁先是周與唐戰先悉薦翻唐水軍鋭敏周人無以敵之帝每以為恨返自夀春於大梁城西汴水側造戰艦數百艘艦户黯翻艘蘇遭翻命唐降卒教北人水戰數月之後縱横出沒縱子容翻殆勝唐兵至是命右驍衛大將軍王環將水軍數千自閔河㳂潁入淮丁度曰閔河本曰琵琶溝今名蔡河潁潁河也注詳見後卷蔡河下今按蔡河自東京戴樓門入京城出宣化水門投東南下經陳州至蔡口入潁河潁河自嵩山發源由潁昌至鹿邑界過蔡河口與蔡河合流經順昌府潁上縣至西正陽入淮河唐人見之大驚乙酉帝至下蔡三月己丑夜帝度淮抵夀春城下庚寅旦躬擐甲胄擐音宦軍於紫金山南命太祖皇帝擊唐先鋒寨及山北一寨皆破之斬獲三千餘級斷其甬道斷音短由是唐兵首尾不能相救至暮帝分兵守諸寨還下蔡唐朱元恃功頗違元帥節度朱元恃其復舒和之功也陳覺與元有隙屢表元反覆不可將兵唐主以武昌節度使楊守忠代之守忠至濠州覺以齊王景達之命召元至濠州計事將奪其兵元聞之憤怒欲自殺門下客宋垍説元曰大丈夫何往不富貴何必為妻子死乎垍其冀翻説式芮翻為于偽翻辛卯夜元與先鋒壕寨使朱仁裕等舉寨萬餘人降禆將時厚卿不從元殺之帝慮其餘衆㳂流東潰遽命虎㨗左廂都指揮使趙晁五代㑹要廣順元年改侍衛馬軍曰龍㨗左右軍步軍曰虎㨗左右軍晁直遥翻將水軍數千㳂淮而下壬辰旦帝軍于趙步趙步在淮河北岸水濵泊舟之地人坎岸為道以上下謂之步趙步以趙氏居其地而得名今自夀春花靨鎮㳂淮東下百餘里得趙步灘又東逕梁城灘北齊梁控扼之地也淮水中有梁城灘又東二十五里至洛河口諸將擊唐紫金山寨大破之殺獲萬餘人擒許文稹邊鎬楊守忠餘衆果㳂淮東走帝自趙步將騎數百循北岸追之諸將以步騎循南岸追之水軍自中流而下唐兵戰溺死及降者殆四萬人獲船艦糧仗以十萬數晡時帝馳至荆山港荆山在濠州鍾離縣西八十三里即梁武帝築堰之地今懷逺軍正治荆山距趙步二百餘里是夜宿鎮淮軍鎮淮軍時置於渦口癸酉從官始至從才用翻劉仁贍聞援兵敗扼吭歎息吭苦郎翻甲午發近縣丁夫城鎮淮軍為二城夾淮水徙下蔡浮梁於其間扼濠夀應援之路㑹淮水漲唐濠州都監彭城郭廷詔以水軍泝淮欲掩不備焚浮梁右龍武綂軍趙匡贊覘知之覘丑廉翻又丑艶翻伏兵邀擊破之唐齊王景達及陳覺皆自濠州奔歸金陵惟靜江指揮使陳徳誠全軍而還陳徳誠誨之子也還從宣翻又如字戊戌以淮南節度使向訓為武寕節度使淮南道行營都監將兵戍鎮淮軍己亥上自鎮淮軍復如下蔡庚子賜劉仁贍詔使自擇禍福唐主議自督諸將拒周中書舎人喬匡舜上疏切諫唐主以為沮衆流撫州沮在吕翻唐主問神衛統軍朱匡業劉存忠以守禦方畧匡業誦羅隱詩曰時來天地皆同力運去英雄不自由存忠以匡業言為然唐主怒貶匡業撫州副使流存忠於饒州既而竟不敢自行甲辰帝耀兵于夀春城北唐清淮節度使兼侍中劉仁贍病甚不知人丙午監軍使周廷構營田副使孫羽等作仁贍表遣使奉之來降丁未帝賜仁贍詔遣閤門使萬年張保續入城宣諭仁贍子崇讓復出謝罪戊申帝大陳甲兵受降於夀春城北廷構等舁仁贍出城舁音余又羊茹翻仁贍臥不能起帝慰勞賜賚勞力到翻賚來代翻復令入城養疾復扶又翻諸考異曰實録時仁贍臥疾已亟遂翻然納欵而城中軍萬計皆屏息以聽其命又曰仁贍輕財重士法令嚴肅故能以一城之衆連年拒守逮其來降而其下無敢竊議者斯亦一時之名將也歐陽史三月仁贍病甚已不知人其副使孫羽詐為仁贍書以城降世宗命舁仁贍至帳前嗟嘆久之賜以玉帶御馬復使入城養疾是日制曰劉仁贍盡忠所事抗節無虧前代名臣幾人可比予之南伐得爾為多乃拜仁贍檢校太尉兼中書令天平軍節度使仁贍不能受命而卒世宗追封彭城郡王以其子崇讚為懷州刺史李景聞仁贍卒亦贈太師又曰仁贍既殺其子以自明矣豈有垂死而變節者乎今周世宗實録載仁贍降書葢其副使孫羽等所為也當世宗時王環為蜀守秦州攻之久不下其後力屈而降世宗頗嗟其忠然止以為大將軍視世宗待二人之薄厚而考其制書乃知仁贍非降者也今從之庚戌徙夀州治下蔡夀州宋升為夀春府至今治下蔡縣而夀春故縣自為縣在淮水之南西北距下蔡二十五里髙宗南渡復於夀州舊治夀春縣建安豐軍以為控扼之地葢地險所在通古今不能易也宋白曰下蔡古之蔡國吴之州來左傳蔡成公遷于州來謂之下蔡是也漢為下蔡縣梁於硤石山築城以拒魏即今縣城也赦州境死罪以下州民受唐文書聚山林者並召令復業勿問罪有嘗為其殺傷者毋得讎訟曏日政令有不便於民者令本州條奏辛亥以劉仁贍為天平節度使兼中書令制辭略曰盡忠所事抗節無虧前代名臣幾人堪比朕之伐叛得爾為多是日卒追賜爵彭城郡王唐主聞之亦贈太師帝復以清淮軍為忠正軍楊氏以夀州置忠正軍後改清淮軍今復為忠正軍以旌劉仁贍之節按薛史唐明宗天成二年詔昇夀州為忠正軍長興二年閏五月己丑升廬州為昭順軍八月癸酉升州為昭信軍宋白續通典曰夀州後唐天成元年升為順化軍節度今並存之以俟博考以旌仁贍之節以右羽林統軍楊信為忠正節度使同平章事前許州司馬韓倫侍衛馬軍都指揮使令坤之父也令坤領鎮安節度使倫居于陳州陳州鎮安軍治所干預政事貪汚不法為公私患為人所訟令坤屢為之泣請屢為于偽翻癸丑詔免倫死流沙門島登州蓬萊縣有沙門島置沙門寨倫後得赦還居洛陽與光禄卿致仕柴守禮及當時將相王溥王晏王彦超之父游處恃勢恣横洛陽人畏之謂之十阿父處昌吕翻下處之同横户孟翻阿烏葛翻帝既為太祖嗣人無敢言守禮子者但以元舅處之優其俸給未嘗至大梁嘗以小忿殺人有司不敢詰詰去吉翻帝知而不問詔開夀州倉賑饑民丙辰帝北還還從宣翻夏四月己巳至大梁詔修永福殿命宦官孫延希董其役丁丑帝至其所見役徒有削柹為匕瓦中噉飯者柹方廢翻木札也匕卑履翻噉徒濫翻大怒斬延希於市帝之克秦鳳也事見上卷二年以蜀兵數千人為懷恩軍乙亥遣懷恩指揮使蕭知逺等將士八百餘人西還既以示中國威徳又欲使之言已克平淮南數千里之地以恐動蜀人壬午李榖扶疾入見見賢遍翻帝命不拜坐於御坐之側御坐徂卧翻榖懇辭禄位不許甲申分江南降卒為六軍三十指揮號懷徳軍乙酉詔疏汴水北入五丈河河自都城厯曹濟及鄆其廣五丈舊名五丈河宋開寶六年詔改名廣濟河薛史曰浚五丈河東流於定陶入于濟以通齊魯運路由是齊魯舟楫皆達於大梁五月丁酉以太祖皇帝領義成節度使詔以律令文古難知格敇煩雜不壹命御史知雜事張湜等唐制御史臺有侍御史六人以久次者一人知雜事謂之雜端杜佑通典曰知雜事謂之南床殿中監察不得坐凡侍御史之例不出累月遷登南省故謂之南床百官察其行止出入揖讓去就殿中以下皆禀而隨之湜丞職翻訓釋詳定為刑統刑統一書終宋之世行之唐郭廷謂將水軍㫁渦口浮梁又襲敗武寕節度使武行徳于定逺㫁音短敗補邁翻行徳僅以身免唐主以廷謂為滁州團練使充上淮水陸應援使上淮謂淮水之上游也蜀人多言左右衛聖馬步都指揮使保寕節度使同平章事李廷珪為將敗覆敗覆謂敗軍而秦鳳階成四州之地覆沒不應復典兵應於陵翻不應猶言不當也復扶又翻廷珪亦自請罷去六月乙丑蜀主加廷珪檢校太尉罷軍職李太后以典兵者多非其人謂蜀主曰吾昔見莊宗跨河與梁戰及先帝在太原平二蜀諸將非有大功無得典兵故士卒畏服李太后本唐莊宗後宫莊宗以賜蜀髙祖故能言二主時事今王昭逺出於廝養王昭逺成都人年十三事東郭禪師智諲為童子蜀髙祖嘗飯僧於府昭逺執巾履隨智諲以入髙祖愛其慧黠時後主方就學令昭逺給事左右由是見親狎厮音斯養余亮翻伊審徴韓保貞趙崇韜皆膏粱乳臭子按路振九國志趙崇韜者廷隱之子素不習兵徒以舊恩寘於人上平時誰敢言者一旦疆場有事安能禦大敵乎以吾觀之惟髙彦儔太原舊人終不負汝自餘無足任者蜀主不能從及孟氏之亡僅髙彦儔一人能以死殉國至蜀主之死其母亦不食而卒婦人志節如此丈夫多有愧焉者丁丑以前華州刺史王祚為潁州團練使祚溥之父也溥為宰相祚有賔客溥常朝服侍立華户化翻朝直遥翻客坐不安席祚曰㹠犬不足為起㹠與豚同足為于偽翻秋七月丁亥上治定逺軍及夀春城南之敗定逺縣名屬濠州軍字衍定逺之敗見上五月夀春城南之敗見去年六月以武寕節度使兼中書令武行徳為左衛上將軍河陽節度使李繼勲為右衛大將軍北漢主初立七廟北漢主自以承髙祖隱帝之後與僭竊者不同然地狹國貧日困於兵今始能立七廟以倣天子之制司空兼門下侍郎同平章事李榖臥疾二年凡九表辭位八月乙亥罷守本官令每月肩輿一詣便殿議政事以樞密副使户部侍郎王朴檢校太保充樞密使懷恩軍至成都是年四月遣懷恩軍西還今方至成都蜀主遣梓州别駕胡立等八十人東還胡立為蜀所禽見上卷二年還從宣翻且致書為謝請通好好呼到翻癸未立等至大梁帝以蜀主抗禮不之答蜀主聞之怒曰朕為天子郊祀天地時爾猶作賊何敢如是九月中書舎人竇儼上疏請令有司討論古今禮儀作大周通禮考正鍾律作大周正樂又以為為政之本莫大擇人擇人之重莫先宰相自有唐之末輕用名器始為輔弼即兼三公僕射之官故其未得之也則以趨競為心既得之也則以容黙為事但思解密勿之務守崇重之官逍遥林亭保安宗族乞今即日宰相於南宫三品兩省給舎以上各舉所知即日宰相謂見在相位者南宫謂尚書省也三品謂六部尚書也兩省謂中書門下省也給舎謂給事中中書舎人也若陛下素知其賢自可登庸庸用也若其未也且令以本官權知政事期嵗之間察其職業若果能堪稱堪稱堪其任稱其職也稱尺證翻下不稱同其官已髙則除平章事未髙則稍更遷官權知如故若有不稱則罷其政事責其舉者又班行之中行户剛翻有員無職者太半如諸衛將軍東宮官屬内諸使之類乞量其才器量音良授以外任試之於事還以舊官登叙考其治狀治直吏翻能者進之否者黜之又請令盗賊自相糾告以其所告貲産之半賞之或親戚為之首則論其徒侣而赦其所首者如此則盗不能聚矣言或親戚相與為盗其中有能自首者則赦之其徒侣則論其罪也首式又翻又新鄭鄉村團為義營各立將佐一户為盗累其一村將即亮翻下同累力瑞翻一户被盗罪其一將每有盗發則鳴鼓舉火丁壯雲集盗少民多無能脱者由是鄰縣充斥而一境獨清充斥獨清皆言盗也請令它縣皆效之亦止盗之一術也又累朝已來屢下詔書聽民多種廣耕上輸舊税朝直遥翻輸舂遇翻及其既種則有司履畆而増之故民皆疑懼而田不加闢夫為政之先莫如敦信信茍著矣則田無不廣田廣則榖多榖多則藏之民猶藏之官也又言陛下南征江淮一舉而得八州八州謂光黄舒蘄和楊滁泰皆取之再駕而平夀春事見上三月威靈所加前無彊敵今以衆擊寡以治伐亂勢無不克治直吏翻但行之貴速則彼民免俘馘之災此民息轉輸之困矣帝覽而善之儼儀之弟也冬十月戊午設賢良方正直言極諫經學優深可為師法詳閑吏理達於教化等科此所謂制舉也時詔應天下諸色人中不限前資見任職官黄衣草澤並許應詔其逐處州府依每年貢舉人式例差官考試解送尚書吏部仍量試策論三道共三千字已上當日取文理俱優人物爽秀方得解送取來年十月集上都其登朝官亦許上表自舉癸亥北漢麟州刺史楊重訓舉城降太祖廣順二年楊重訓以麟州歸欵中間必又附北漢也以為麟州防禦使己巳以王朴為東京留守聽以便宜從事以三司使張美充大内都㸃檢壬申帝發大梁十一月丙戌至鎮淮軍是夜五鼓濟淮丁亥至濠州城西濠州東北十八里有灘唐人柵於其上環水自固環音宦謂周兵必不能涉戊子帝自攻之命内殿直康保裔帥甲士數百乗槖駝涉水帥讀曰率下同太祖皇帝帥騎兵繼之遂抜之李重進破濠州南闗城癸巳帝自攻濠州王審琦抜其水寨唐人屯戰船數百於城北植巨木於淮水以限周兵帝命水軍攻之抜其木焚戰船七十餘艘艘蘇遭翻下同斬首二千餘級又攻抜其羊馬城城中震恐丙申夜唐濠州團練使郭廷謂上表言臣家在江南今若遽降恐為唐所種族種章勇翻請先遣使詣金陵禀命然後出降帝許之辛丑帝聞唐有戰船數百艘在渙水東渙水逕宿亳之間東南至巉石山西而南入淮欲救濠州自將兵夜發水陸擊之癸卯大破唐兵於洞口今濠州東九十里有浮山山下有穴名浮山洞夏潦不能及而冬不加髙故人疑其山為浮洞口竊意即浮山洞口斬首五千餘級降卒二千餘人因鼓行而東所至皆下乙巳至泗州城下太祖皇帝先攻其南因焚城門破水寨及月城月城者臨水築城兩頭抱水形如却月帝居于月城樓督將士攻城北漢主自即位以來顯徳元年冬十一月北漢主即位方安集境内未遑外略是月契丹遣其大同節度使侍中崔勲將兵來會北漢欲同入冦北漢主遣其忠武節度使同平章事李存瓌將兵會之南侵潞州至其城下而還忠武軍許州屬周李存瓌遥領耳還從宣翻又如字北漢主知契丹不足恃而不敢遽與之絶贈送勲甚厚猶欲倚之以為聲援十二月乙卯唐泗州守將范再遇舉城降以再遇為宿州團練使上自至泗州城下禁軍中芻蕘者毋得犯民田蕘如招翻民皆感悦爭獻芻粟既克泗州無一卒敢擅入城者帝聞唐戰船數百艘泊洞口遣騎詗之唐兵退保清口詗古永翻又翾正翻清口即清河口也戊午上自將親軍自淮北進命太祖皇帝將步騎自淮南進諸將以水軍自中流進共追唐兵時淮濵久無行人葭葦如織多泥淖溝塹淖奴教翻塹七艶翻士卒乗勝氣苃涉爭進皆忘其勞苃蒲撥翻草行為苃水行為涉庚申追及唐兵且戰且行金鼓聲聞數十里聞音問辛酉至楚州西北大破之九域志泗州西至濠州一百七十五里東北至楚州二百二十里唐兵有㳂淮東下者帝自追之太祖皇帝為前鋒行六十里擒其保義節度使濠泗楚海都應援使陳承昭以歸保義軍陜州屬周陳承昭遥領耳所獲戰船燒沉之餘沉持林翻得三百餘艘士卒殺溺之餘得七千餘人唐之戰船在淮上者於是盡矣郭廷謂使者自金陵還還從宣翻又如字知唐不能救命録事參軍鄱陽李延鄒草降表延鄒責以忠義廷謂以兵臨之延鄒擲筆曰大丈夫終不負國為叛臣作降表為于偽翻史言李延鄒忠壯廷謂斬之舉濠州降得兵萬人糧數萬斛唐主賞李延鄒之子以官壬戌帝濟淮至楚州營于城西北乙丑唐雄武軍使知漣水縣事崔萬迪降丙寅以郭廷謂為亳州防禦使戊辰帝攻楚州克其月城庚午郭廷謂見於行宫見賢遍翻帝曰朕南征以來江南諸將敗亡相繼獨卿能斷渦口浮梁破定逺寨事見上五月所以報國足矣濠州小城使李璟自守能守之乎璟居永翻使將濠州兵攻天長帝遣鐡騎左廂都指揮使武守琦將騎數百趨揚州至髙郵九域志髙郵東南至揚州一百里趨七喻翻唐人悉焚揚州官府民居驅其人南渡江九域志揚州南至江四十五里後數日周兵至城中餘癃病十餘人而已癃良中翻疲病也癸酉守琦以聞帝聞泰州無備遣兵襲之丁丑抜泰州南漢中書侍郎同平章事盧膺卒南漢主聞唐屢敗憂形於色遣使入貢于周為湖南所閉閉塞也塞其道不得通也乃治戰艦修武備既而縱酒酣飲曰吾身得免幸矣何暇慮後世哉此所謂坐而待亡者也又古語云民主偷必死南漢主將死之徴也治直之翻艦户黯翻唐使者陳處堯在契丹白契丹主請南遊太原北漢主厚禮之留數日北還竟卒於契丹去年唐主遣陳處堯如契丹乞師資治通鑑卷二百九十三
