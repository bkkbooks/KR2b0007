body:
  text: 資治通鑑卷一百五十二宋司馬光撰胡三省音註梁紀八著雍涒灘一年髙祖武皇帝八大通二年春正月癸亥魏以北海王顥為驃騎大将軍開府儀同三司相州刺史驃匹妙翻騎竒寄翻相息亮翻魏北道行臺楊津守定州城居鮮于修禮杜洛周之間迭来攻圍津蓄薪糧治器械治直之翻隨機拒擊賊不能克津濳使人以鐵劵説賊黨賊黨有應津者遺津書曰賊所以圍城正為取北人耳説式芮翻遺于季翻為于偽翻城中北人宜盡殺之不然必為患津悉收北人内子城中而不殺衆無不感其仁及葛榮代修禮綂衆榮得修禮之衆見上卷普通七年使人説津許以為司徒津斬其使固守三年普通七年春津守定州至是三年説式芮翻其使䟽吏翻杜洛周圍之魏不能救津遣其子遁突圍出詣柔然頭兵可汗求救遁日夜泣請頭兵遣其從祖吐豆發帥精騎一萬南出前鋒至廣昌賊塞隘口廣昌縣自漢以来屬代郡自廣昌東南山南出倒馬闗至中山上曲陽縣闗山險隘實為深峭石嶝逶迤㳂塗九曲可從刋入聲汗音寒從才用翻帥讀曰率下同塞悉則翻柔然遂還乙丑津長史李裔引賊入執津欲烹之既而捨之史言城無糧援雖善守者不能支乆瀛州刺史元寧以城降洛周降户江翻乙丑魏潘嬪生女胡太后詐言皇子為後胡后立女張本嬪毗賔翻丙寅大赦改元武泰蕭寳寅圍馮翊未下長孫稚軍至恒農長知兩翻恒戸登翻行臺左丞楊侃謂稚曰昔魏武與韓遂馬超據潼闗相拒遂超之才非魏武敵也然而勝負乆不决者扼其險要故也事見六十六卷漢獻帝建安十六年今賊守禦已固雖魏武復生無以施其智勇復扶又翻不如北取蒲反此用前漢書地理志蒲反字度河而西入其腹心此亦魏武之故智也置兵死地則華州之圍不戰自解五代志馮翊郡後魏置華州華户化翻潼闗之守必内顧而走支節既解長安可坐取也若愚計可取願為明公前驅稚曰子之計則善矣然今薛修義圍河東薛鳯賢據安邑宗正珍孫守虞坂不得進水經注曰虞坂即左傳所謂顛軨在𫝊巖東北十餘里東西絶澗於中築以成道指南北之路謂之軨橋橋之東北有虞原上道東有虞城其城北對長坂二十餘里謂之虞坂戰國䇿曰昔騏驥駕鹽車上虞坂遷延不能進正此處也坂音反如何可往侃曰珍孫行陳一夫行户剛翻陳讀曰陣因縁為將將即亮翻可為人使安能使人河東治在蒲反治謂治所也西逼河漘漘船倫翻水厓也上平坦而下水深曰漘封疆多在郡東修義驅帥士民西圍郡城其父母妻子皆留舊村一旦聞官軍来至皆有内顧之心必望風自潰矣稚乃使其子子彦與侃帥騎兵自恒農北渡據石錐壁五代志河東郡虞鄉縣有石錐山於此築壘壁也侃聲言今且停此以待步兵且觀民情向背命送降名者各自還村俟臺軍舉三烽當亦舉烽相應其無應烽者乃賊黨也當進擊屠之以所獲賞軍於是村民轉相告語背蒲妹翻語牛倨翻降户江翻下同雖實未降者亦詐舉烽一宿之間火光遍數百里賊圍城者不測其故各自散歸修義亦逃還與鳯賢俱請降丙子稚克潼闗遂入河東㑹有詔廢鹽池税魏朝盖謂弛鹽利以與民可以得民也稚上表以為鹽池天産之貨宻邇京畿唯應寳而守之均贍以理今四方多虞府藏罄竭冀定擾攘冀定二州時為葛榮杜洛周攻圍常調之絹不復可收唯仰府庫藏徂浪翻調徒弔翻復扶又翻仰魚向翻有出無入略論鹽税一年之中凖絹而言不下三十萬匹乃是移冀定二州置於畿甸今若廢之事同再失前此宣武帝用甄琛之言廢鹽池税已為失計今又廢之是為再失臣前仰違嚴㫖不先討闗賊徑解河東者非緩長安而急蒲反一失鹽池三軍乏食天助大魏兹計不爽爽乖也昔髙祖昇平之年無所乏少少詩沼翻猶創置鹽官而加典䕶非與物競利恐由利而亂俗也况今國用不足租徴六年之粟調折来歳之資調徒弔翻折之列翻此皆奪人私財事不獲己臣輒符同監將尉謂監鹽池之將尉也監工銜翻將即亮翻下同還帥所部依常收税帥讀曰率下同更聽後敕謂合罷與否更聽後畨敕下也蕭寳寅遣其將矦終德擊毛遐㑹郭子恢等屢為魏軍所敗敗補邁翻下穆敗同終德因其勢挫還軍襲寳寅至白門長安城東出北来第三門曰青門意白門即西出南来第三門也寳寅始覺丁丑與終徳戰敗擕其妻南陽公主及其少子帥麾下百餘騎自後門出奔万俟醜奴少詩照翻騎竒寄翻万莫北翻俟渠之翻醜奴以寳寅為太傅二月魏以長孫稚為車騎大將軍開府儀同三司雍州刺史尚書僕射西道行臺雍於用翻羣盜李洪攻燒鞏西闕口以東謂鞏縣以西伊闕口以東也鞏縣漢屬河南尹晉分屬滎陽郡南結諸蠻魏都督李神軌武衛將軍費穆討之穆敗洪于闕口南遂平之葛榮擊杜洛周殺之併其衆魏靈太后再臨朝以來再臨朝見一百五十卷普通六年朝直遥翻嬖倖用事嬖卑義翻又博計翻政事縱弛恩威不立盗賊蠭起封疆日蹙謂秦隴以西冀并以北皆為盗區淮汝沂泗之間皆為梁所侵也魏肅宗年浸長太后自以所為不謹恐左右聞之於帝凡帝所愛信者太后輒以事去之長知兩翻去𦍑呂翻務為壅蔽不使帝知外事通直散騎常侍昌黎谷士恢有寵於帝使領左右散悉亶翻騎竒寄翻太后屢諷之欲用為州士恢懐寵不願出外太后乃誣以罪而殺之有蜜多道人能胡語帝常置左右太后使人殺之於城南而懸賞購賊由是母子之間嫌隙日深是時車騎將軍儀同三司并肆汾廣恒雲六州討虜大都督爾朱榮廣當作唐魏收志孝昌中置唐州髙歡建義改唐州曰晉州按爾朱榮時駐兵於晉陽兵勢彊盛魏朝憚之胡直遥翻髙歡叚榮尉景蔡儁先在杜洛周黨中髙歡等歸杜洛周見一百五十卷普通六年欲圖洛周不果逃奔葛榮又亡歸爾朱榮劉貴先在爾朱榮所屢薦歡於榮榮見其憔悴未之奇也憔而遥翻悴秦醉翻歡從榮之馬廐廐有悍馬榮命歡翦之髦馬而鬄落之為翦悍矦旰翻歡不加羈絆而翦之馬絡首曰羈繫足曰絆竟不蹄齧起謂榮曰御惡人亦猶是矣榮奇其言坐歡於牀下屏左右訪以時事歡曰文公有馬十二谷榮畜牧蕃庶以谷量馬屏必郢翻色别為羣畜此竟何用也畜吁玊翻榮曰但言爾意歡曰今天子闇弱太后淫亂嬖孽擅命朝政不行孽魚列翻朝直遥翻以明公雄武乗時奮發討鄭儼徐紇之罪以清帝側霸業可舉鞭而成此賀六渾之意也髙歡字賀六渾榮大悦語自日中至夜半乃出自是每參軍謀并州刺史元天穆孤之五世孫也孤拓䟦鬱律第四子與榮善榮兄事之榮常與天穆及帳下都督賀㧞岳宻謀欲舉兵入洛内誅嬖倖外清羣盗二人皆勸成之榮上書以山東羣盗方熾熾尺志翻冀定覆没官軍屢敗請遣精騎三千東援相州騎竒寄翻相息亮翻太后疑之報以念生梟戮寳寅就擒醜奴請降闗隴已定費穆大破羣蠻絳蜀漸平又北海王顥帥衆二萬出鎮相州不須出兵梟堅堯翻降户江翻帥讀曰率下同榮復上書復扶又翻下帝復同以為賊勢雖衰官軍屢敗人情危怯恐實難用若不更思方略無以萬全臣愚以為蠕蠕主阿那瓌荷國厚恩蠕蠕之亂魏援立阿那瓌事見一百四十九卷普通元年至三年蠕人兖翻荷下可翻未應忘報宜遣發兵東趣下口以躡其背言阿那瓌荷魏保䕶之思雖叛歸塞北未應漠然忘報恩之心下口盖指飛狐口趣七喻翻北海之軍嚴加警備以當其前臣麾下雖少輒盡力命自井陘以北滏口以西分據險要攻其肘腋少詩沼翻陘音刑滏音釡腋音亦葛榮雖并洛周威恩未著人類差異形勢可分杜洛周柔𤣥鎮民葛榮鮮于修禮之黨本非同也類吞并為一及其新合亟加招討則形勢可分遂勒兵召集義勇北捍馬邑東塞井陘徐紇説太后以鐵劵間榮左右榮聞而恨之魏肅宗亦惡儼紇等逼於太后不能去塞悉則翻説輸芮翻間古莧翻惡烏路翻去𦍑呂翻宻詔榮舉兵内向欲以脅太后榮以髙歡為前鋒行至上黨帝復以私詔止之儼紇恐禍及己隂與太后謀酖帝癸丑帝暴殂年十九甲寅太后立皇女為帝大赦既而下詔稱潘充華本實生女潘充華即前所謂潘嬪也生女見上正月乙丑故臨洮王寳暉世子釗體自髙祖臨洮王寳暉髙祖之孫宜膺大寳百官文武加二階宿衛加三階乙卯釗即位釗始生三嵗太后欲乆專政故貪其㓜而立之爾朱榮聞之大怒謂元天穆曰主上晏駕春秋十九海内猶謂之㓜君况今奉未言之兒以臨天下欲求治安其可得乎治直吏翻吾欲帥鐵騎赴哀山陵翦除姦佞更立長君更工衡翻長知兩翻何如天穆曰此伊霍復見於今矣乃抗表稱大行皇帝背棄萬方復扶又翻背蒲妹翻海内咸稱酖毒致禍豈有天子不豫初不召醫貴戚大臣皆不侍側安得不使逺近怪愕又以皇女為儲兩太子謂之儲君易曰明兩作離大人以繼明照四方故稱儲兩虛行赦宥上欺天地下惑朝野己乃選君於孩提之中實使姦豎專朝隳亂綱紀朝直遥翻此何異掩目捕雀塞耳盗鍾塞悉則翻今羣盗沸騰鄰敵窺窬而欲以未言之兒鎮安天下不亦難乎願聽臣赴闕參預大議問侍臣帝崩之由訪侍衛不知之狀以徐鄭之徒付之司敗雪同天之恥君父之仇義不同天謝逺近之怨然後更擇宗親以承寳祚榮從弟世隆時為直閣更工衡翻從才用翻下從子之從同太后遣詣晉陽慰諭榮榮欲留之世隆曰朝廷疑兄故遣世隆來今留世隆使朝廷得預為之備非計也乃遣之三月癸未葛榮陷魏滄州魏肅宗熈平二年分瀛冀二州置滄州治饒安城領浮陽樂陵郡執刺史薛慶之居民死者什八九乙酉魏𦵏孝明皇帝于定陵廟號肅宗爾朱榮與元天穆議以彭城武宣王有忠勲彭城王勰諡武宣忠勲謂侍孝文帝疾立宣武帝備極忠勤也其子長樂王子攸素有令望欲立之樂音洛又遣從子天光及親信奚毅倉頭王相入洛與爾朱世隆宻議天光見子攸具論榮心子攸許之天光等還晉陽榮猶疑之乃以銅為顯祖諸孫各鑄像唯長樂王像成魏人立后皆鑄像以卜之慕容氏謂冉閔以金鑄己像不成胡人鑄像以卜君其來尚矣故爾朱榮效之榮乃起兵𤼵晉陽世隆逃出㑹榮於上黨靈太后聞之甚懼悉召王公等入議宗室大臣皆疾太后所為莫肯致言徐紇獨曰爾朱榮小胡敢稱兵向闕文武宿衛足以制之但守險要以逸待勞彼懸軍千里士馬疲弊破之必矣太后以為然以黄門侍郎李神軌為大都督帥衆拒之别將鄭季明鄭先䕶將兵守河橋帥讀曰率將即亮翻武衛將軍費穆屯小平津先䕶儼之從祖兄弟也榮至河内復遣王相宻至洛迎長樂王子攸復扶又翻下榮復同夏四月丙申子攸與兄彭城王劭弟霸城公子正濳自髙渚渡河記考異曰楊衒之洛陽伽藍髙渚作霤波今從魏書丁酉㑹榮於河陽將士咸稱萬歳戊戍濟河子攸即帝位帝彭城王勰之第三子以劭為無上王劭彭城嫡嗣且魏主兄也封為無上王言其尊無上也有君而言無上君子是以知魏主之不終也子正為始平王以榮為侍中都督中外諸軍事大將軍尚書令領軍將軍領左右封太原王領左右領左右千牛備身也鄭先䕶素與敬宗善聞帝即位與鄭季明開城納之李神軌至河橋聞北中不守晉杜預建河橋於富平津河北側岸有二城相對魏髙祖置北中郎府徙諸從𨽻府户并羽林虎賁領隊防之北中不守可以平行至洛陽矣宋白曰北中城即今河陽城即遁還費穆棄衆先降於榮降江徐紇矯詔夜開殿門取驊驑廐御馬十匹驊驑駿馬也故魏以名御馬廐東奔兖州將依羊侃也為侃與紇南歸張本鄭儼亦走還鄉里鄭儼滎陽開封人太后盡召肅宗後宫皆令出家太后亦自落髪榮召百官迎車駕己亥百官奉璽綬備法駕迎敬宗於河橋璽斯氏翻綬音受考異曰伽藍記云十二日爾朱榮軍于邙山之北河隂之野十三日召百官迎駕至者盡誅之長厯是月戊子朔十二日己亥也今從魏書庚子榮遣騎執太后及㓜主送至河隂騎奇寄翻太后對榮多所陳説榮拂衣而起沈太后及㓜主於河費穆宻説榮曰公士馬不出萬人今長驅向洛前無横陳既無戰勝之威羣情素不厭服沈持林翻説式芮翻陳讀曰陣厭於葉翻以京師之衆百官之盛知公虛實有輕侮之心若不大行誅罰更樹親黨恐公還北之日未度太行而内變作矣更工衡翻行戸剛翻榮心然之謂所親慕容紹宗曰洛中人士繁盛驕侈成俗不加芟翦終難制馭芟所銜翻吾欲因百官出迎悉誅之何如紹宗曰太后荒淫失道嬖倖弄權殽亂四海殽雜也錯也嬖卑義翻又博計翻故明公興義兵以清朝廷今無故殱夷多士不分忠佞殱息㢘翻恐大失天下之望非長䇿也榮不聽乃請帝循河西至淘渚水經注孟津又曰富平津又謂之淘河杜畿試樓船於孟津覆於陶河即此也按爾朱榮傳陶渚在河隂西北三里南北長堤之西魏紀淘作陶杜佑曰河南河陽縣西南十三里有古遮馬堤即其處引百官於行宫西北云欲祭天百官既集列胡騎圍之責以天下䘮亂肅宗暴崩皆由朝臣貪虐不能匡弼騎奇寄翻䘮息浪翻朝直遥翻因縱兵殺之自丞相髙陽王雍司空元欽儀同三司義陽王略以下死者二千餘人機考異曰北史云榮惑費穆之言謂天下乘可取乃譎朝士共為盟誓將向河隂西北三里至南北長堤悉命下馬西度即遣胡騎圍之妄言丞相髙陽王反殺王公二千餘人榮𫝊一千三百餘人今從魏紀前黃門郎王遵業兄弟居父䘮其母敬宗之從母也相帥出迎俱死遵業慧龍之孫也劉裕得晉權殺王愉其孫慧龍奔魏著功名於南鄙從才用翻帥讀曰率儁爽涉學時人惜其才而譏其躁躁則到翻有朝士百餘人後至榮復以胡騎圍之令曰有能為禪文者免死侍御史趙元則出應募遂使為之曰考異北史曰時隴西李神儁頓丘李諧太原温子昇並當世辭人皆在圍中恥從是命俯伏不應按神儁等不應何得不死魏書本傳皆無其事榮又令其軍士言元氏既滅爾朱氏興皆稱萬歳榮又遣數十人㧞刀向行宫帝與無上王劭始平王子正俱出帳外榮先遣并州人郭羅刹西部髙車叱列殺鬼侍帝側刹初轄翻詐言防衛抱帝入帳餘人即殺劭及子正又遣數十人遷帝於河橋置之幕下帝憂憤無計使人諭㫖於榮曰帝王迭興盛衰無常今四方瓦解將軍奮袂而起所向無前此乃天意非人力也我本相投志在全生豈敢妄希天位希望也將軍見逼以至於此若天命有歸將軍宜時正尊號若推而不居推吐雷翻存魏社稷亦當更擇親賢而輔之更工衡翻時都督髙歡勸榮稱帝軍考異曰魏爾朱榮傳曰於是獻武王與外兵叅司馬子如等切諫陳不可之理榮曰愆誤若是唯當以死謝朝廷今日安危之機計將何出獻武王等曰未若還奉長樂以安天下於是還奉莊帝北齊書神武紀云榮將簒位神武諌恐不聽請鑄像卜之鑄不成乃止盖魏收與北齊史官欲為神武掩此惡故云爾今從周書賀㧞岳傳左右多同之榮疑未决賀㧞岳進曰將軍首舉義兵志除姦逆大勲未立遽有此謀正可速禍未見其福榮乃自鑄金為像凡四鑄不成功曹參軍燕郡劉靈助善卜筮漢髙祖定天下燕仍為國昭帝改為廣陽郡後漢光武併上谷和帝復為廣陽郡晉為廣陽國魏為燕郡燕因肩翻榮信之靈助言天時人事未可榮曰若我不吉當迎天穆立之靈助曰天穆亦不吉唯長樂王有天命耳榮亦精神恍惚不自支持乆而方寤史言天位不可以詐力奸恍呼廣翻惚音忽深思愧悔曰過誤若是唯當以死謝朝廷賀㧞岳請殺髙歡以謝天下左右曰歡雖復愚疎言不思難復扶又翻下更復同難乃旦翻今四方多事須藉武將將即亮翻請捨之收其後效榮乃止夜四更復迎帝還營更工衡翻榮望馬首叩頭請死榮所從胡騎殺朝士既多不敢入洛城即欲向北為遷都之計榮狐疑甚乆武衛將軍汎禮固諫皇甫謐云汎本姓凡遭秦亂避地於汜水因氏焉汎音凡辛丑榮奉帝入城帝御太極殿下詔大赦改元建義從太原王將士普加五階在京文官二階武官三階百姓復租役三年復方目翻除也時百官蕩盡存者皆竄匿不出唯散騎常侍山偉一人拜赦於闕下山偉稱頌元乂而得進其人可知特乾沒以茍一時之利禄耳洛中士民草草詩巷伯曰勞人草草注云草草勞心也箋云草草憂將妄得罪也人懐異慮或云榮欲縱兵大掠或云欲遷都晉陽富者弃宅貧者襁負率皆逃竄什不存一二襁居兩翻直衛空虛官守曠廢守手又翻曠空也榮乃上書稱大兵交際難可齊壹諸王朝貴横死者衆横戸孟翻臣今粉軀不足塞咎塞悉則翻乞追贈亡者微申私責無上王稱追尊為無上皇帝自餘死于河隂者王贈三司三品贈令僕五品贈刺史七品已下白民贈郡鎭身無官爵謂之白民猶言白丁也郡鎭郡守鎮將也死者無後聽繼即授封爵又遣使者循城勞問勞力到翻詔從之於是朝士稍出人心粗安粗坐五翻封無上王之子韶為彭城王榮猶執遷都之議帝亦不能違都官尚書元諶爭之以為不可漢成帝置三公曹尚書主㫁獄光武改三公曹主考課置中都官曹尚書主水火盗賊事魏置尚書都官郎佐督軍事晉以三公尚書掌刑獄宋三公比部主刑法又置都官尚書主軍事刑獄至隋乃改都官尚書為刑部尚書諶氏壬翻榮怒曰何闗君事而固執也且河隂之事君應知之諶曰天下事當與天下論之奈何以河隂之酷而恐元諶諶國之宗室位居常伯尚書古常伯之任生既無益死復何損復扶又翻正使今日碎首流腸亦無所懼榮大怒欲抵諶罪爾朱世隆固諫乃止見者莫不震悚諶顔色自若後數日帝與榮登髙見宫闕壯麗列樹成行行户剛翻乃歎曰臣昨愚闇有北遷之意今見皇居之盛熟思元尚書言深不可奪由是罷遷都之議諶謐之兄也癸亥以江陽王繼為太師北海王顥為太傅光禄大夫李延寔為太保賜爵濮陽王并州刺史元天穆為太尉賜爵上黨王前侍中楊椿為司徒車騎大將軍穆紹為司空領尚書令進爵頓丘王雍州刺史長孫稚為驃騎大將軍開府儀同三司賜爵馮翊王雍於用翻長知兩翻驃匹妙翻騎竒寄翻殿中尚書元諶為尚書右僕射賜爵魏郡王金紫光禄大夫廣陵王恭加儀同三司其餘起家暴貴者不可勝數延寔冲之子也李冲柄用於文明孝文之時勝音升以帝舅故得超拜徐紇弟獻伯為北海太守季産為青州長史紇使人告之皆將家屬逃去與紇俱奔泰山泰山郡屬兖州所謂東奔兖州也鄭儼與從兄滎陽太守仲明謀據郡起兵從才用翻為部下所殺丁未詔内外解嚴魏郢州刺史元顯逹請降降戸江翻詔郢州刺史元樹迎之魏克義陽以梁之司州為郢州梁之郢州治江夏郡夏侯䕫亦自楚城往㑹之遂留鎮焉改魏郢州為北司州以䕫為刺史兼督司州梁初義陽䧟僑置司州于闗南今黄州黄陂縣之地既復義陽因以為北司州䕫進攻毛城逼新蔡豫州刺史夏矦亶圍南頓攻陳項魏行臺源子恭拒之庚戍魏賜爾朱榮子乂羅爵梁郡王柔然頭兵可汗數入貢于魏可從刋入聲汗音寒數所角翻魏詔頭兵贊拜不名上書不稱臣魏汝南王悦及東道行臺臨淮王彧聞河隂之亂皆來奔先是魏人降者皆稱魏官為偽先悉薦翻彧表啓獨稱魏臨淮王上亦體其雅素不之責魏北海王顥將之相州至汲郡聞葛榮南侵及爾朱榮縱暴隂為自安之計盤桓不進以其舅殷州刺史范遵行相州事代前刺史李神守鄴行臺甄宻知顥有異志相帥廢遵甄之人翻帥讀曰率復推李神攝州事復扶又翻遣兵迎顥且察其變顥聞之帥左右來奔為後送顥北還張本帥讀曰率宻琛之從父弟也甄琛事魏宣武帝從才用翻北青州刺史元世儁南荆州刺史李志皆舉州來降魏北青州治東陽去梁境甚逺五代志東海郡梁置南北二青州郡領懐仁縣又注云梁置南北二青州意者元世儁以懐翻仁之地来降也志又曰春陵郡後魏置南荆州降戸江五月丁巳朔魏加爾朱榮北道大行臺以尚書右僕射元羅為東道大使使䟽吏翻光禄勲元欣副之巡方黜陟先行後聞欣羽之子也羽孝文帝之弟封廣陵王爾朱榮入見魏主於明光殿見賢遍翻下朝見同重謝河橋之事重直用翻誓言無復貳心帝自起止之因復為榮誓言無疑心復扶又翻下不復同為于偽翻榮喜因求酒飲之熟醉帝欲誅之左右苦諌乃止即以牀轝向中常侍省轝羊茹翻轝車為轝榮夜半方寤遂逹旦不眠自此不復禁中宿矣榮女先為肅宗嬪榮欲敬宗立以為后帝疑未决黄門侍郎祖瑩曰昔文公在秦懐嬴入侍事有反經合義左傳晉世子圉質于秦秦伯以女妻之子圉逃歸公子重耳入秦秦納女五人懐嬴與焉秦嬴氏也圉謚懐公故曰懐嬴漢儒以反經合道為權祖瑩本此嬪毗賔翻陛下獨何疑焉帝遂從之榮意甚悦榮舉止輕脱喜馳射喜許記翻每入朝見更無所為唯戲上下馬於西林園宴射恒請皇后出觀并召王公妃主共在一堂每見天子射中輒自起舞呌將相卿士悉皆盤旋上時掌翻恒戸登翻中竹仲翻將即亮翻相息亮翻乃至妃主亦不免隨之舉袂及酒酣耳熱必自匡坐唱虜歌匡坐正坐也虜歌胡歌也日暮罷歸與左右連手蹋地唱囘波樂而出此所謂蹋歌也囘波樂曲名樂音洛性甚嚴暴喜愠無常刀槊弓矢不離於手槊色角翻離力智翻毎有瞋嫌瞋昌真翻輒行擊射射而亦翻左右恒有死憂恒戸登翻嘗見沙彌重騎一馬去俗為僧受度而未受戒者謂之沙彌重騎者二人共騎也重直龍翻榮即令相觸力窮不能復動復扶又翻遂使傍人以頭相擊死而後己辛酉榮還晉陽帝餞之於邙隂邙隂邙山之北也榮令元天穆入洛陽加天穆侍中録尚書事京畿大都督兼領軍將軍以行臺郎中桑乾朱瑞為黄門侍郎兼中書舍人朝廷要官悉用其腹心為之丙寅魏主詔孝昌以來凡有寃抑無訴者悉集華林東門當親理之時承䘮亂之後䘮息浪翻倉廩虛竭始詔入粟八千石者賜爵散矦此有官入栗者之賜也魏制散矦降開國矦一品散悉亶翻白民輸五百石者賜出身沙門授本州綂及郡縣維那維那各管其郡縣之僧爾朱榮之趣洛也趣七喻翻遣其都督樊子鵠取唐州唐州刺史崔元珍行臺酈惲拒守不從乙亥子鵠㧞平陽斬元珍及惲惲於粉翻元珍挺之從父弟也從才用翻將軍曹義宗圍魏荆州堰水灌城不沒者數板時魏方多難不能救難乃旦翻城中糧盡刺史王羆煑粥與將士均分食之毎出戰不擐甲胄仰天大呼曰擐音宦呼火故翻荆州城孝文皇帝所置魏孝文太和中置荆州於穰城天若不祐國家令箭中王羆額不爾王羆必當破賊彌歴三年前後摶戰甚衆亦不被傷中作仲翻被皮義翻癸未魏以中軍將軍費穆都督南征諸軍事將兵救之將即亮翻魏臨淮王彧聞魏主定位乃以母老求還辭情懇至上惜其才而不能違六月丁亥遣彧還魏以彧為侍中驃騎大將軍加儀同三司驃匹妙翻騎奇寄翻魏員外散騎常侍髙乾祐之從子也髙祐允之從祖弟從才用翻與弟敖曹季式皆喜輕俠喜許記翻與魏主有舊爾朱榮之向洛也逃奔齊州聞河隂之亂遂集流民起兵於河濟之間受葛榮官爵頻破州軍魏主使元欣諭㫖乾等乃降濟子禮翻降户江翻以乾為給事黃門侍郎兼武衛將軍敖曹為通直散騎侍郎榮以乾兄弟前為叛亂不應復居近要魏主乃聽解官歸鄉里敖曹復行抄掠復扶又翻抄楚交翻榮誘執之與薛修義同拘於晉陽薛修義為龍門鎮將附蕭寳寅既降而反側故亦被拘誘音酉敖曹名昻以字行敖曹之父以其子昻藏敖曹故以為名字葛榮軍乏食遣其僕射任褒將兵南掠至沁水沁水縣自漢以來屬河南郡任音壬沁午侵翻魏以元天穆為大都督東北道諸軍事帥宗正珍孫等討之帥讀曰率下同前幽州平北府主簿河間邢杲帥河北流民十萬餘戸反於青州之北海自稱漢王改元天綂戊申魏以征東將軍李叔仁為車騎大將軍儀同三司帥衆討之辛亥魏主詔曰朕當親御六戎戎兵也六戎猶言六軍也掃静燕代燕因肩翻以大將軍爾朱榮為左軍上黨王天穆為前軍司徒楊椿為右軍司空穆紹為後軍葛榮退屯相州之北相息亮翻秋七月乙丑魏加爾朱榮柱國大將軍録尚書事魏初置柱國大將軍長孫嵩以開國元勲加此號壬子魏光州民劉舉聚衆反於濮陽濮博木翻自稱皇武大將軍是月万俟醜奴自稱天子置百官㑹波斯國獻師子於魏波斯國都宿利城在忸宻西古條支國也去代都二萬四千二百二十八里醜奴留之改元神獸魏泰山太守羊侃守式又翻以其祖規嘗為宋髙祖祭酒從事常有南歸之志徐紇往依之因勸侃起兵侃從之兖州刺史羊敦侃之從兄也從才用翻宻知之據州拒侃八月侃引兵襲敦弗克魏兖州刺史治瑕丘泰山太守治博築十餘城守之且遣使來降使䟽吏翻降戸江翻詔廣晉縣侯泰山羊鴉仁等將兵應接沈約志鄱陽郡有廣晉縣本吳所置廣昌縣晉武帝太康元年更名廣晉魏以侃為驃騎大將軍泰山公兖州刺史侃斬其使者不受將軍王弁侵魏徐州蕃郡民續靈珍擁衆萬人攻蕃郡以應梁魏徐州治彭城領彭城南陽平蕃沛蘭陵北濟隂碭郡蕃縣漢晉屬魯國魏孝昌三年置蕃郡治蕃城五代志徐州滕縣舊曰蕃置蕃郡隋開皇十六年改曰滕郡尋廢郡為縣蕃音皮又音翻魏徐州刺史楊昱擊靈珍斬之弁引還甲辰魏大都督宗正珍孫擊劉舉於濮陽滅之葛榮引兵圍鄴衆號百萬遊兵已過汲郡汲郡隋唐之衛州所至殘掠爾朱榮啟求討之九月爾朱榮召從子肆州刺史天光留鎮晉陽曰我身不得至處非汝無以稱我心從才用翻稱尺證翻自帥精騎七千馬皆有副魏收魏書云帥騎七萬帥讀曰率騎奇寄翻倍道兼行東出滏口以侯景為前驅滏音釡葛榮為盗日乆梁普通七年葛榮得鮮于修禮之衆㓂掠河北横行河北爾朱榮衆寡非敵議者謂無取勝之理葛榮聞之喜見於色見賢遍翻令其衆曰此易與耳易弋豉翻諸人俱辦長繩至則縳取自鄴以北列陳數十里箕張而進如箕之張也陳讀曰陣爾朱榮濳軍山谷為奇兵分督將已上三人為一處處有數百騎令所在揚塵鼓譟使賊不測多少將即亮翻少詩沼翻又以人馬逼戰刀不如棒勒軍士齎袖棒一枚置於馬側至戰時慮廢騰逐不聽斬級斬級者斬首以計功級以棒棒之而已棒蒲項翻分命壯勇所向衝突號令嚴明戰士同奮爾主榮身自陷陳出於賊後表裏合擊大破之於陳擒葛榮陳讀曰陣餘衆悉降降户江翻以賊徒既衆若即分割恐其疑懼或更結聚乃下令各從所樂樂音洛親屬相隨任所居止於是羣情大喜登即四散登者登時也數十萬衆一朝散盡待出百里之外乃始分道押領隨便安置咸得其宜擢其渠帥量才授任新附者咸安時人服其處分機速帥所類翻量音良處昌呂翻分扶問翻以檻車送葛榮赴洛冀定滄瀛殷五州皆平時上黨王天穆軍於朝歌之南穆紹楊椿猶未發而葛榮已滅乃皆罷兵是年夏魏主將北征以爾朱榮為左軍楊椿為右軍穆紹為後軍初宇文肱從鮮于修禮攻定州戰死于唐河魏收志定州中山郡唐縣有唐水水經唐水𨗳源盧奴縣西北東流至唐城西北隅堨而為河其水南入小溝下注􅋤水其子泰在修禮軍中修禮死從葛榮葛榮敗爾朱榮愛泰之才以為綂軍宇文泰事始此乙亥魏大赦改元永安辛巳以爾朱榮為大丞相都督河北畿外諸軍事榮子平昌公文殊昌樂公文暢並進爵為王樂音洛以楊椿為太保城陽王徽為司徒冬十月丁亥葛榮至洛魏主御閶闔門洛城西面有廣陽西明閶闔三門又洛陽宫城門曰閶闔注已見八十四卷晉惠帝太安元年引見斬於都市帝以魏北海王顥為魏王遣東宫直閣將軍陳慶之將兵送之還北將即亮翻魏考異曰梁魏帝紀皆云以顥為魏主唯顥傳作王按魏封劉昶為宋王蕭寳寅為齊王蕭詧為梁王皆俟得國然後使稱帝耳若顥在南已稱魏帝當行即位之禮又梁朝應以客禮待之又顥不應再即帝位於渙水盖由王字與主字止欠一㸃故多致謬誤今從顥傳丙申魏以太原王世子爾朱菩提為驃騎大將軍開府儀同三司菩薄乎翻丁酉以長樂等七郡各萬户通前十萬户為太原王榮國樂音洛戊戍又加榮太師皆賞擒葛榮之功也壬子魏江陽武烈王繼卒魏使征虜將軍韓子熈招論邢杲杲詐降而復反降戸江翻復扶又翻李叔仁擊杲於惟水惟水當作濰水水經濰水出琅琊箕縣東北過東武城縣西又北過平昌縣東又北過髙宻縣西又北過淳于縣東又東北過下宻縣故城西又東北過都昌縣東又東北入于海五代志後魏北海郡膠東縣隋改曰濰水縣後又改曰下宻縣濰音維失利而還還從宣翻又如字魏費穆奄至荆州曹義宗軍敗為魏所擒荆州之圍始解荆州受圍三年始解元顥襲魏銍城而據之銍縣漢屬沛郡魏晉屬譙郡宋白曰宿州臨渙縣漢銍縣地銍竹乙翻魏行臺尚書左僕射于暉等兵數十萬擊羊侃於瑕丘劉昫曰瑕丘春秋時魯之瑕邑宋以為兖州治所隋始置瑕丘縣徐紇恐事不濟説侃請乞師於梁説式芮翻侃信之紇遂來奔暉等圍侃十餘重重直龍翻柵中矢盡南軍不進十一月癸亥夜侃潰圍出且戰且行一日一夜乃出魏境至渣口水經引郡國志曰偪陽有柤水南亂于沂而注于沐謂之相口春秋諸矦㑹呉于柤即此渣側加翻衆尚萬餘人馬二千匹士卒皆竟夜悲歌侃乃謝曰卿等懐土理不能相隨幸適去留言或去或留各從其意也於此為别各拜辭而去魏復取泰山復扶又翻又如字暉勁之子也于勁事魏孝文帝戊寅魏以上黨王天穆為大將軍開府儀同三司世襲并州刺史十二月庚子魏詔于暉還師討邢杲葛榮餘黨韓樓復據幽州反為爾朱榮遣將平韓樓張本復扶又翻北邊被其患被皮義翻爾朱榮以撫軍將軍賀㧞勝為大都督鎮中山樓畏勝威名不敢南出資治通鑑卷一百五十二
