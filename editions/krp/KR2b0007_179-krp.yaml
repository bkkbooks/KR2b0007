front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百七十九宋司馬光撰胡三省音注隋紀三起上章涒灘盡昭陽大淵獻凡四年髙祖文皇帝中開皇二十年春二月熙州人李英林反隋志同安郡梁置豫州後改晉州後齊改江州陳復曰晉州開皇初曰熙州因晉熙郡名州也三月辛夘以揚州緫管司馬河内張衡為行軍緫管隋制緫管府置長史司馬河内郡置懷州帥步騎五萬討平之帥讀曰率騎竒寄翻賀若弼復坐事下獄若人者翻復扶又翻下遐嫁翻上數之曰數所具翻又所主翻公有三太猛嫉妬心太猛自是非人心太猛無上心太猛既而釋之它日上謂侍臣曰弼將伐陳謂髙熲曰陳叔寶可平也不作髙鳥盡良弓藏邪熲居永翻下同范蠡告大夫種嘗有是言邪音耶下同熲云必不然及平陳遽索内史又索僕射索山客翻射寅謝翻我語熲曰語牛倨翻下同功臣正宜授勲官隋置上柱國至帥都督凡十一等為勲官不可預朝政朝直遙翻弼後語熲皇太子於已出口入耳無所不盡公終久何必不得弼力何脉脉邪脉脉有言不得吐之意意圖廣陵又圖荆州皆作亂之地意終不改也夏四月壬戌突厥逹頭可汗犯塞厥九勿翻可從刋入聲汗音寒詔命晉王廣楊素出靈武道即靈州道漢王諒史萬歳出馬邑道即朔州道以擊之長孫晟帥降人為秦州行軍緫管天水郡置秦州長知兩翻晟承正翻帥讀曰率降户江翻受晉王節度晟以突厥飲泉易可行毒易以䜴翻因取諸藥毒水上流突厥人畜飲之多死于是大驚曰天雨惡水雨于具翻其亡我乎因夜遁晨追之斬首千餘級曰考異煬帝紀曰出靈武無虜而還突厥傳曰晉王出靈州逹頭逃遁而去晟傳曰逹頭與王相抗葢逹頭聞王來而遁晟將兵從别道與逹頭相遇耳史萬歳出塞至大斤山與虜相遇逹頭遣使問隋將為誰候騎報史萬歳也突厥復問得非敦煌戍卒乎史萬歳戍敦煌事見一百七十五卷陳長城公至徳元年使疏吏翻下同將即亮反騎竒寄翻復扶又翻下同敦徒門翻候騎曰是也逹頭懼而引去萬歳馳追百餘里縱擊大破之斬數千級逐北入磧數百里虜逺遁而還磧七迹翻下同還從宣翻又如字傳考異曰帝紀十九年六月史萬歳破賊據本在今年紀誤也按破賊當作破逹頭詔遣長孫晟復還大利城安撫新附逹頭復遣其弟子俟利伐從磧東攻唘民上又發兵助唘民守要路俟利伐退走入磧唘民上表陳謝曰大隋聖人可汗憐養百姓如天無不覆上時掌翻覆敷又翻地無不載染干如枯木更葉枯骨更肉千世萬世常為大隋典羊馬也爲于偽翻帝又遣趙仲卿為唘民築金河定襄二城隋志榆林郡金河縣隋初置榆關緫管定襄即雲内縣之恒安鎮秦孝王俊久疾未能起遣使奉表陳謝上謂其使者曰我戮力創茲大業作訓垂範庶臣下守之汝為吾子而欲敗之使疏吏翻敗補邁翻不知何以責汝俊慙怖怖普布翻疾遂篤乃復拜俊上柱國六月丁丑俊薨帝五子獨俊病死耳上哭之數聲而止俊所為侈麗之物悉命焚之王府僚佐請立碑隋親王置師友文學長吏司馬諮議參軍掾屬主簿録事功曹記室户倉兵等曹騎兵城局等參軍東西閣祭酒參軍事法田水鎧士等曹行參軍行叅軍長兼行參軍典籖等釋名碑者𦵏時所設臣子追述君父之功以書其上初學記碑悲也所以上往事也上曰欲求名一卷史書足矣何用碑為若子孫不能保家徒與人作鎮石耳鎮之人翻壓也俊子浩崔妃所生也庶子曰湛羣臣希旨奏漢之栗姬子榮郭后子彊皆隨母廢栗姬子榮事見十六卷漢景帝六年七年郭后子彊事見四十三卷漢光武建武十七年十九年斯二事者二帝之失也可以為法乎今秦王二子母皆有罪不合承嗣上從之以秦國官為喪主初上使太子勇叅决軍國政事時有損益上皆納之勇性寛厚率意任情無矯飾之行行下孟翻上性節儉勇嘗文飾蜀鎧蜀鎧蜀人所作也蜀人工巧所作鎧甲已精麗而勇又文飾之上見而不悦戒之曰自古帝王未有好奢侈而能久長者汝為儲后后君也儲后猶言儲君也好呼到翻當以儉約為先乃能奉承宗廟吾昔日衣服各留一物時復觀之以自警戒恐汝以今日皇太子之心忘昔時之事故賜汝以我舊所帶刀一枚并葅醬一合淹菜為葅醬醢也肉醬跂醬皆謂之醢又菜葅謂之醬内則芥醬汝㫺作上士時常所食也謂勇仕周時若存記前事應知我心後遇冬至百官皆詣勇勇張樂受賀上知之問朝臣曰近聞至日内外百官相帥朝東宫此何禮也太常少卿辛亶對曰於東宫乃賀也不得言朝朝直遙翻帥讀曰率少始照翻上曰賀者正可三數十人隨情各去何乃有司徴召一時普集太子法服設樂以待之可乎隋制太子衮冕垂白珠九旒青纊充耳犀笄𤣥衣纁裳衣山龍華蟲大宗彞五章裳藻粉米黼黻四章織成為之白紗内單黼領青褾襈裙革帶金鈎鍱大帶素帶不朱裏亦紕以朱綠􅀈隨裳色火山二章玉具劒火珠鏢首瑜玉雙珮朱組雙大綬四采赤白縹紺純朱質長一丈八尺三百二十首廣九寸小雙綬長二尺六寸色同大綬而首半之間施二玉環朱韈赤舄以金飾褾彼小翻襈雛冕翻鍱丑例翻又彼列翻紕頻彌翻鏢紕招翻綬音受縹匹沼翻純之尹翻長直亮翻廣苦曠翻因下詔曰禮有等差君臣不雜皇太子雖居上嗣義兼臣子而諸方岳正冬朝賀任土作貢别上東宫别上時掌翻事非典則宜悉停斷斷丁管翻自是恩寵始衰漸生猜阻勇多内寵昭訓雲氏尤幸姓苑雲姓縉雲氏之後又魏書官氏志逹宥氏後改雲氏此其後也其妃元氏無寵遇心疾二日而薨元妃薨見一百七十七卷十一年獨孤后意有佗故甚責望勇自是雲昭訓専内政生長寜王儼平原王裕安成王筠髙良娣生安平王嶷襄成王恪王良媛生髙陽王該建安王韶成姬生潁川王煚娣音弟嶷魚力翻媛于眷翻煚居永翻後宫生孝實孝範后彌不平頗遣人伺察求勇過惡晉王廣彌自矯飾唯與蕭妃居處伺相吏翻處昌吕翻後庭有子皆不育后由是數稱廣賢數所角翻大臣用事者廣皆傾心與交謂楊素等上及后每遣左右至廣所無貴賤廣必與蕭妃迎門接引為設美饌為于偽翻饌士戀翻説文具食也申以厚禮申重也婢僕往來者無不稱其仁孝上與后嘗幸其第廣悉屏匿美姬於别室屏必郢翻唯留老醜者衣以縵綵衣於既翻縵莫半翻縵無文者也給事左右屏帳改用縑素故絶樂器之絃不令拂去塵埃去羌吕翻上見之以為不好聲色還宫以語侍臣好呼到翻語牛倨翻意甚喜侍臣皆稱慶由是愛之特異諸子上宻令善相者來和相息亮翻徧視諸子對曰晉王眉上雙骨隆起貴不可言上又問上儀同三司韋鼎我諸兒誰得嗣位對曰至尊皇后所最愛者當與之非臣敢預知也來和韋鼎皆識帝於潛躍故尤信之上笑曰卿不肻顯言邪邪音耶晉王廣美姿儀性敏慧沈深嚴重沈持林翻好學善屬文好呼到翻屬之欲翻敬接朝士禮極卑屈由是聲名籍甚言聲名狼籍甚盛朝直遙翻下同冠於諸王冠古玩翻廣為揚州緫管入朝將還鎮入宫辭后伏地流涕后亦泫然泣下泫户畎翻廣曰臣性識愚下常守平生昆弟之意不知何罪失愛東宫恒蓄盛怒欲加屠陷恒户登翻每恐讒譛生於投杼用曾參母子事鴆毒遇於杯勺杯勺皆飲器周禮梓人為飲器勺一升勺市若翻是以勤憂積念懼履危亡后忿然曰睍地伐漸不可耐勇小字睍地伐我為之娶元氏女為于偽翻竟不以夫婦禮待之専寵阿雲阿烏葛翻使有如許豚犬曹操曰如袁本初劉景升兒豚犬耳後遂以詆其子前新婦遇毒而夭夭於紹翻我亦不能窮治治直之翻何故復於汝發如此意復扶又翻我在尚爾我死後當魚肉汝乎每思東宫竟無正嫡至尊千秋萬歳之後遣汝等兄弟向阿雲兒前再拜問訊此是幾許苦痛邪幾居豈翻邪音耶廣又拜嗚咽不能止后亦悲不自勝勝音升自是后決意欲廢勇立廣矣廣與安州緫管宇文述素善安陸郡置安州欲述近已奏為夀州刺史淮南郡舊屬南則為豫州屬北則為揚州開皇九年改曰夀州近其靳翻廣尤親任緫管司馬張衡衡為廣畫奪宗之策廣問計於述述曰皇太子失愛已久令徳不聞於天下大王仁孝著稱才能葢世數經將領頻有大功謂南平陳北伐突厥也數所角翻將即亮翻主上之與内宫咸所鍾愛内宫即中宫避國諱故云然四海之望實歸大王然廢立者國家大事處人父子骨肉之間誠未易謀也處昌吕翻易以䜴翻然能移主上意者惟楊素耳素所與謀者唯其弟約述雅知約請朝京師與約相見共圖之朝直遙翻廣大悦多齎金寶資述入關約時為大理少卿少始照翻素凡有所為皆先籌於約而後行之述請約盛陳器玩與之酣暢因而共博每陽不勝所齎金寶盡輸之約約所得既多稍以謝述述因曰此晉王之賜令述與公為歡樂耳此吕不韋之故智耳約大驚曰何為爾述因通廣意説之曰説輸芮翻夫守正履道固人臣之常致反經合義亦逹者之令圖夫音扶令力正翻自古賢人君子莫不與時消息以避禍患公之兄弟功名葢世當塗用事有年矣朝臣為足下家所屈辱者可勝數哉朝直遙翻勝音升數所具翻又儲后以所欲不行每切齒於執政公雖自結於人主而欲危公者固亦多矣主上一旦弃羣臣公亦何以取庇今皇太子失愛於皇后主上素有廢黜之心此公所知也今若請立晉王在賢兄之口耳誠能因此時建大功王必永銘骨髓斯則去累卵之危成太山之安也約然之因以白素素聞之大喜撫掌曰吾之智思思相吏翻殊不及此賴汝唘予約知其計行復謂素曰復扶又翻今皇后之言上無不用宜因機會早自結託則長保榮祿傳祚子孫兄若遲疑一旦有變令太子用事恐禍至無日矣令力丁翻素從之後數日素入侍宴㣲稱晉王孝悌恭儉有類至尊用此揣后意揣初委翻后泣曰公言是也吾兒大孝愛每聞至尊及我遣内使到内使猶言中使使疏吏翻必迎於境首言及違離未嘗不泣又其新婦亦大可憐我使婢去常與之同寢共食豈若睍地伐與阿雲對坐終日酣宴昵近小人昵尼質翻疑阻骨肉我所以益憐阿𡡉者廣小字阿𡡉𡡉睂波翻常恐其潛殺之素既知后意因盛言太子不才后遂遺素金遺于季翻使贊上廢立勇頗知其謀憂懼計無所出使新豐人王輔賢造諸厭勝新豐縣屬京兆厭於協翻又於後園作庶人村室屋卑陋勇時於中寢息布衣草褥冀以當之上知勇不自安在仁夀宫使楊素觀勇所為素至東宫偃息未入勇束帶待之素故久不進以激怒勇勇衘之形於言色素還言勇怨望恐有佗變願深防察上聞素譖毁甚疑之后又遣人伺覘東宫伺相吏翻下同覘丑廉翻又丑艷翻纎介事皆聞奏因加誣飾以成其辠上遂疏忌勇乃於𤣥武門逹至徳門𤣥武門隋大興宫城正北門至徳門在宫城東北隅量置候人以伺動静皆隨事奏聞量音良又東宫宿衛之人侍官以上侍官謂直閣直寢直齋直後備身直長等葢東宫率府所統略同十二衛府名籍悉令屬諸衛府有勇健者咸屏去之屏必郢翻去羌吕翻出左衛率蘇孝慈為淅州刺史蘇孝慈有器幹故出之隋志淅陽郡西魏置淅州勇愈不悦太史令袁充言於上曰臣觀天文皇太子當廢上曰𤣥象久見見賢遍翻羣臣不敢言耳充君正之子也袁君正見一百六十二卷梁武帝太清三年晉王廣又令督王府軍事姑臧段逹姑臧縣凉州武威郡治所私賂東宫幸臣姬威令伺太子動静宻告楊素於是内外諠謗過失日聞段逹因脅姬威曰東宫過失主上皆知之矣已奉宻詔定當廢立君能告之則大富貴威許諾即上書告之上時掌翻秋九月壬子上至自仁夀宫考異曰帝紀丁未至自仁夀宫今從太子勇傳翌日御大興殿開皇三年上入新都名其城曰大興城正殿曰大興殿宫曰大興宫宫北苑曰大興苑或曰帝由大興郡襲封隋公以登大位故以名新都宫殿城苑謂侍臣曰我新還京師應開懷歡樂樂音洛不知何意翻邑然愁苦吏部尚書牛𢎞對曰臣等不稱軄故至尊憂勞稱尺證翻上既數聞譖毁疑朝臣悉知之數所角翻故於衆中發問冀聞太子之過𢎞對既失旨上因作色謂東宫官屬曰仁夀宫此去不逺而令我每還京師嚴備仗衛如入敵國我為下利令力丁翻還從宣翻又如字泄利也為于偽翻不解衣臥昨夜欲近厠厠也近其靳翻故在後房恐有警急還移就前殿豈非爾輩欲壞我家國邪壞音怪邪音耶于是執太子左庶子唐令則等數人付所司訊鞫命楊素陳東宫事狀以告近臣素乃顯言之曰臣奉勅向京令皇太子檢校劉居士餘黨言自仁夀宫奉勅向長安劉居士事見上卷十七年太子奉詔作色奮厲骨肉飛騰語臣云語牛倨翻居士黨盡伏法遣我何處窮討爾作右僕射委寄不輕射音夜自檢校之何關我事又云㫺大事不遂我先被誅謂禪代時事被皮義翻今作天子竟乃令我不如諸弟一事以上不得自遂上時掌翻因長歎回視云我大覺身妨去音上曰此兒不堪承嗣久矣皇后恒勸我廢之恒户登翻我以布衣時所生地復居長復扶又翻長知兩翻望其漸改隱忍至今勇嘗指皇后侍兒謂人曰是皆我物此言幾許異事幾居豈翻其婦初亡謂元妃薨時也我深疑其遇毒嘗責之勇即懟曰會殺元孝矩孝矩元妃之父懟直類翻此欲害我而遷怒耳長寜初生勇長子儼封長寜王朕與皇后共抱養之自懷彼此連遣來索索山客翻且雲定興女在外私合而生想此由來何必是其體𦙍㫺晉太子取屠家女其兒即好屠割事見八十三卷晉惠帝元康九年好呼到翻今儻非類便亂宗祏祏音石我雖徳慙堯舜終不以萬姓付不肖子堯舜知朱均不肖不付以天下我恒畏其加害如防大敵今欲廢之以安天下恒户登翻左衛大將軍五原公元旻諫曰元旻封九原郡公五原郡豐州廢立大事詔旨若行後悔無及讒言罔極惟陛下察之上不應命姬威悉陳太子辠惡威對曰太子由來與臣語唯意在驕奢且云若有諫者正當斬之不殺百許人自然永息以文理觀之不字必誤營起臺殿四時不輟前蘇孝慈解左衛率率如字太子奮髯揚肘曰大丈夫會當有一日終不忘之決當快意又宫内所須須求也索也尚書多執法不與輒怒曰僕射以下吾會戮一二人使知慢我之禍每云至尊惡我多側庶惡烏路翻髙緯陳叔寶豈孽子乎言二君皆嫡出而亡國孽魚列翻説文庶子曰孽嘗令師姥卜吉凶師姥巫媪也姥女老稱姥莫補翻語臣云語牛倨翻至尊忌在十八年此期促矣上泫然曰誰非父母生乃至於此朕近覽齊書是時李百藥所撰齊書未出帝所覽者葢崔子發齊紀也泫户畎翻見髙歡縦其兒子不勝忿憤安可效尤邪於是禁勇及諸子部分收其黨與勝音升邪音耶分扶問翻楊素舞文巧詆鍜錬以成其獄居數日有司承素意奏元旻常曲事於勇情存附託在仁夀宫勇使所親裴𢎞以書與旻題云勿令人見上曰朕在仁夀宫有纖介事東宫必知疾於驛馬怪之甚久豈非此徒邪遣武士執旻於仗左衛仗也右衛大將軍元胄時當下直不去因奏曰臣向不下直者為防元旻耳為于偽翻上以旻及裴𢎞付獄先是勇見老枯槐問此堪何用或對曰古槐尤宜取火先悉薦翻時衛士皆佩火燧燧取火之木也勇命工造數千枚欲以分賜左右至是獲於庫又藥藏局貯艾數斛隋志東宫門下坊統司經宫門内直典膳藥藏齋帥六局藏徂浪翻貯直吕翻索得之索山客翻大以為怪以問姬威威曰太子此意别有所在至尊在仁夀宫太子常飼馬千匹飼祥吏翻云徑往守城門自然餓死素以威言詰勇詰去吉翻勇不服曰竊聞公家馬數萬匹勇忝備太子馬千匹乃是反乎素又發東宫服玩似加琱飾者悉陳之於庭以示文武羣臣為太子之辠上及皇后迭遣使責問勇勇不服使疏吏翻下同冬十月乙丑上使人召勇勇見使者驚曰得無殺我邪邪音耶上戎服陳兵御武徳殿武徳殿在延恩殿西集百官立于東面諸親立於西面諸親謂屬籍宗親也引勇及諸子列於殿庭命内史侍郎薛道衡宣詔廢勇及其男女為王公主者勇再拜言曰臣當伏尸都市為將來鑒戒幸蒙哀憐得全性命言畢泣下流襟既而舞蹈而去左右莫不閔黙哀之而不敢言長寜王儼上表乞宿衛辭情哀切上時掌翻上覽之閔然楊素進曰伏望聖心同於螫手蝮蛇螫手壯士斷腕楊素以讒慝滅人天性之親以此為喻亦太甚矣螫施隻翻不宜復留意復扶又翻己巳詔元旻唐令則及太子家令鄒文騰隋志太子家令掌刑法食膳倉庫什物奴婢等事左衛率司馬夏侯福隋左右衛率各置長史司馬夏户雅翻典膳監元淹隋志典膳局置監丞各二人屬門下坊前吏部侍郎蕭子寶前主璽下士何竦主璽下士後周官也璽斯氏翻並處斬妻妾子孫皆沒官處昌吕翻車騎將軍榆林閻毗閻毗榆林盛樂人以車騎將軍宿衛東宫閻姓也左傳晉有閻嘉騎竒寄翻東郡公崔君綽㳺騎尉沈福寶開皇六年置武騎屯騎驍騎㳺騎飛騎旅騎雲騎羽騎八尉其品則正六品以下從九品以上綽昌約翻瀛州處士章仇太翼瀛州河問郡後煬帝謂太翼曰于卿姓章仇四岳之胄與盧同源是賜姓為盧氏孫愐曰漢有章弇因避仇加仇字為章仇氏特免死各杖一百身及妻子資財田宅皆沒官副將作大匠髙龍乂率更令晉文建隋率更令掌東宫伎樂漏刻更工衡翻通直散騎侍郎元衡隋制東宫亦有通直散騎侍郎散悉亶翻騎竒寄翻皆處盡處其罪使自盡處昌吕翻於是集羣官於廣陽門外宣詔戮之乃移勇於内史省給五品料食賜楊素物三千段元胄楊約並千叚賞鞫勇之功也文林郎楊孝政上書諫曰皇太子為小人所誤宜加訓誨不宜廢黜上時掌翻上怒撻其胸初雲昭訓父定興出入東宫無節數進竒服異器以求悦媚數所角翻左庶子裴政屢諌隋制左庶子領門下坊勇不聽政謂定興曰公所為不合法度又元妃暴薨道路籍籍此於太子非令名也公宜自引退不然將及禍定興以告勇勇益疎政由是出為襄州總管襄陽郡置襄州唐令則為勇所昵狎昵尼質翻每令以絃歌敎内人右庶子劉行本責之隋制右庶子領典書坊曰庶子當輔太子以正道何有取媚於房帷之間哉令則甚慙而不能改時沛國劉臻隋志無沛國劉臻先世仕於江南江南僑置中原郡縣猶以沛國為貫平原明克讓克讓以平原為貫猶劉臻也魏郡陸爽魏郡置相州並以文學為勇所親行本怒其不能調䕶每謂三人曰卿等止解讀書耳言但能讀書而不能行其所學解尸買翻夏侯福嘗于閣内與勇戲福大笑聲聞於外聞音問夏户雅翻行本聞之待其出數之曰數所角翻殿下寛容賜汝顔色汝何物小人敢為䙝慢因付執法者治之治直之翻下同數日勇為福致請乃釋之為于偽翻勇嘗得良馬欲令行本乘而觀之行本正色曰至尊置臣於庶子欲令輔導殿下非為殿下作弄臣也勇慙而止及勇敗二人已卒上歎曰向使裴政劉行本在勇不至此勇嘗宴宫臣唐令則自彈琵琶歌娬媚娘娬音武洗馬李綱隋制門下坊司經局置洗馬四人洗悉薦翻起白勇曰令則身為公卿職當調䕶左右庶子謂之宫卿漢髙帝謂四皓曰煩公卒調䕶太子故言東宫官職當調䕶乃於廣坐自比倡優坐徂卧翻倡音昌進淫聲穢視聽事若上聞令則罪在不測豈不為殿下之累邪累力瑞翻邪音耶臣請速治其罪勇曰我欲為樂耳治直之翻樂音洛君勿多事綱遂趨出及勇廢上召東宫官屬切責之皆惶懼無敢對者綱獨曰廢立大事今文武大臣皆知其不可而莫肻發言臣何敢畏死不一為陛下别白言之乎為于偽翻下皆為謂為同别彼列翻太子性本中人可與為善可與為惡曩使陛下擇正人輔之足以嗣守鴻基今乃以唐令則為左庶子鄒文騰為家令二人唯知以絃歌鷹犬娛悦太子安得不至于是邪邪音耶此乃陛下之過非太子之罪也因伏地流涕嗚咽上慘然良久曰李綱責我非為無理然徒知其一未知其二我擇汝為宫臣而勇不親任雖更得正人何益哉對曰臣所以不被親任者良由姦人在側故也被皮義翻陛下但斬令則文騰更選賢才以輔太子安知臣之終見疎弃也更工衡翻自古廢立冡嫡鮮不傾危鮮息淺翻願陛下深留聖思無貽後悔上不悦罷朝朝直遙翻左右皆為之股栗為于偽翻會尚書右丞缺有司請人上指綱曰此佳右丞也即用之太平公史萬歳還自大斤山楊素害其功言於上曰突厥本降厥九勿翻降户江翻初不為冦來塞上畜牧耳遂寢之萬歳數抗表陳狀陳其功狀也數所角翻上未之悟上廢太子方窮東宫黨與上問萬歳所在萬歳實在朝堂朝直遙翻楊素曰萬歳謁東宫矣以激怒上上謂為信然令召萬歳時所將將士在朝堂稱寃者數百人令刀丁翻將即亮翻萬歳謂之曰吾今日為汝極言於上事當決矣為于偽翻既見上言將士有功為朝廷所抑詞氣憤厲上大怒令左右㩧殺之㩧弼角翻又匹角翻擊也既而追之不及因下詔陳其罪狀天下共寃惜之十一月戊子立晉王廣為皇太子天下地震廣始正位儲宫而天下地震其示戒亦昭昭矣太子請降章服宫官不稱臣十二月戊午詔從之以宇文述為左衛率始太子之謀奪宗也洪州緫管郭衍預焉隋志豫章郡平陳置洪州緫管府由是徴衍為左監門率隋志東宫置左右監門率掌詰門禁監工銜翻下同率所律翻帝囚故太子勇於東宫付太子廣掌之勇自以廢非其罪頻請見上申寃見賢遍翻下同申伸也明也而廣遏之不得聞勇於是升樹大呌聲聞帝所冀得引見楊素因言勇情志昏亂為癲鬼所著不可復收帝以為然卒不得見狂病而死者為顛鬼著直略翻復扶又翻卒子恤翻初帝之克陳也開皇九年克陳天下皆以為將太平監察御史房彦謙後齊御史臺置檢校御史十二人隋置監察御史十二人私謂所親曰主上忌刻而苛酷太子卑弱諸王擅權言秦晉蜀三王分據方而也天下雖安方憂危亂其子𤣥齡亦宻言於彦謙曰主上本無功徳以詐取天下諸子皆驕奢不仁必自相誅夷今雖承平其亡可翹足待彦謙法夀之𤣥孫也房法夀見一百三十二卷宋太宗泰始三年𤣥齡與杜果之兄孫如晦杜果有名周隋聞皆預選選者吏部選宣絹翻吏部侍郎髙孝基名知人有知人之名見𤣥齡歎曰僕閱人多矣未見如此郎者異日必為偉器恨不見其大成耳見如晦謂曰君有應變之才必任棟梁之重俱以子孫託之帝晩年深信佛道鬼神辛巳始詔有毁佛及天尊嶽鎮海瀆神像者以不道論隋志佛者西域天竺之迦維衛國浄飯王之太子釋迦牟尼捨太子位出家學道勤行精進覺悟一切種智而謂之佛道經云有元始天尊者生於太元之先稟自然之氣冲虛凝逺莫知其極天地淪壞劫數終盡而天尊之體常存不滅嶽者五嶽東嶽太山西嶽華山南嶽衡山北嶽恒山中嶽嵩山隋五嶽各置今又有吳山令葢吳山亦謂之吳嶽也鎮即周官職方氏揚州其山鎮曰會稽荆州其山鎮曰衡山豫州其山鎮曰華山青州其山鎮曰沂山兖州其山鎮曰岱山雍州其山鎮曰嶽山幽州其山鎮曰醫無閭并州其山鎮曰恒山冀州其山鎮曰霍山隋開皇十四年詔東鎮沂山南鎮會稽山北鎮醫無閭山冀州鎮霍山並就山立祠東海於㑹稽縣界南海於南海鎮南並近海立祠及四瀆吳山並取側近巫一人主知洒埽十六年又詔北鎮於營州龍山立祠岱嶽華嶽衡嶽恒嶽嵩嶽皆先有廟四瀆江河淮濟沙門毁佛像道士毁天尊像者以惡逆論是歳徴同州刺史蔡王智積入朝隋志馮翊郡後魏置華州西魏改曰同州朝直遙翻智積帝之弟子也智積帝弟整之子性修謹門無私謁自奉簡素帝甚憐之智積有五男止敎讀論語不令交通賔客或問其故智積曰卿非知我者其意葢恐諸子有才能以致禍也齊州行叅軍章武王伽齊郡齊州行叅軍在諸曹行叅軍之下典籖之上杜佑曰隋開皇三年詔佐官以曹為名者並以為司十二年諸州司以從事為名者並改為叅軍煬帝置諸司書佐改行叅軍為行書佐隋志河間郡平舒縣舊置章武郡伽求迦翻送流囚李參等七十餘人詣京師行至滎陽滎陽縣屬鄭州哀其辛苦悉呼謂曰卿輩自犯國刑身嬰縲紲縲黒索紲攣也所以拘罪人縲力追翻紲息列翻固其職也重勞援卒援送之卒豈不愧心哉參等辭謝伽乃悉脱其枷鎖停援卒與約曰某日當至京師如致前却謂或前或却不能如期吾當為汝受死為于偽翻遂捨之而去流人感悦如期而至一無離叛上聞而驚異召見與語稱善久之於是悉召流人令攜負妻子俱入賜宴於殿庭而赦之因下詔曰凡在有生含靈稟性咸知善惡並識是非若臨以至誠明加勸導則俗必從化人皆遷善往以海内亂離徳敎廢絶吏無慈愛之心民懷奸詐之意朕思遵聖敎以徳化民而伽深識朕意誠心宣導參等感悟自赴憲司明是率土之人非為難敎若使官盡王伽之儔民皆李參之輩刑厝不用厝七故翻其何逺哉乃擢伽為雍令雍縣岐州治所雍於用翻太史令袁充表稱隋興已後晝日漸長開皇元年冬至之景長一丈二尺七寸二分長一亘亮翻自爾漸短至十七年短於舊三寸七分日去極近則景短而日長去極逺則景長而日短行内道則去極近行外道則去極逺極北極也謹按元命包曰日月出内道璇璣得其常六緯之書有春秋元命包孔安國曰璇美玉璣者正天文之器璇似宣翻京房别對曰太平日行上道升平行次道霸代行下道伏惟大隋唘運上感乾元景短日長振古希有詩振古如茲毛傳曰振自也上臨朝朝直遙翻謂百官曰景長之慶天之祐也今太子新立當須改元宜取日長之意以為年號是後百工作役並加程課以日長故也丁匠苦之史言袁充誣天以病民仁夀元年春正月乙酉朔赦天下改元以尚書右僕射楊素為左僕射納言蘇威為右僕射丁酉徙河南王昭為晉王突厥步迦可汗犯塞敗代州總管韓𢎞於恒安鴈門郡隋代州厥九勿翻迦古牙翻可從刋入聲汗音寒敗補邁翻恒户登翻以晉王昭為内史令二月乙夘朔日有食之夏五月己丑突厥男女九萬口來降降户江翻六月乙夘遣十六使巡省風俗使疏吏翻省昔景翻乙丑詔以天下學校生徒多而不精校户敎翻唯簡留國子學生七十人太學四門及州縣學並廢漢置太學晉武帝立國子學後國子太學各置博士以授生徒後魏太和二十年於四門置學立四門博士自漢以來郡有文學隋郡縣皆置博士殿内將軍河間劉炫殿内將軍即殿中將軍隋避諱改之屬左右衛河間郡瀛州炫熒絹翻上表切諌不聽上時掌翻秋七月改國子學為太學初帝受周禪恐民心未服故多稱符瑞以耀之其偽造而獻者不可勝計勝音升冬十一月己丑有事於南郊如封禪禮板文備述前後符瑞以報謝云山獠作亂獠盧皓翻蜀有獠以衛尉少卿洛陽衛文昇為資州刺史隋志洛陽縣屬河南郡洛州資陽郡西魏置資州治盤石少始照翻鎮撫之文昇名𤣥以字行初到官獠方攻大牢鎮開皇十三年置大牢縣宋白曰榮州應靈縣本漢南安縣隋置大牢鎮九域志在州西一百五十里文昇單騎造其營騎竒寄翻造七到翻謂曰我是刺史衘天子詔安養汝等勿驚懼也羣獠莫敢動于是説以利害渠帥感悦解兵而去説輸芮翻帥所類翻下同前後歸附者十餘萬口帝大悦賜縑二千匹壬辰以文昇為遂州總管隋志遂寜郡後周置遂州潮成等五州獠反髙州酋長馮盎馳詣京師請討之隋志義安郡梁置東揚州後改曰瀛州平陳置潮州蒼梧郡梁置成州隋後改封州髙涼郡置髙州酋才由翻長知兩翻帝勅楊素與盎論賊形勢素歎曰不意蠻夷中有如是人即遣盎發江嶺兵擊之江嶺謂江南嶺南也事平除盎漢陽太守隋志漢陽郡後魏曰南秦州西魏曰成州守手又翻詔以楊素為雲州道行軍元帥隋志定襄郡開皇五年置雲州緫管府治大利長孫晟為受降使者長知兩翻晟承正翻降户江翻使疏吏翻挾唘民可汗北擊步迦挾户頰翻可從刋入聲汗音寒迦古牙翻二年春三月己亥上幸仁夀宫突厥思力俟斤等厥九勿翻俟渠之翻南度河掠唘民男女六千口雜畜二十餘萬而去畜許又翻楊素帥諸軍追擊轉戰六十餘里大破之帥讀曰率突厥北走素復進追夜及之復扶又翻恐其越逸令其騎稍後親引兩騎并降突厥二人與虜並行虜不之覺候其頓舍未定趣後騎掩擊騎竒寄翻趣讀曰促大破之悉得人畜以歸唘民自是突厥逺遁磧南無復寇抄磧七迹翻抄楚交翻素以功進子𤣥感爵柱國賜𤣥縱爵淮南公淮南郡公兵部尚書栁述慶之孫也栁慶見一百六十一卷梁武帝太清二年尚蘭陵公主怙寵使氣自楊素之屬皆下之下遐嫁翻帝問符璽直長萬年韋雲起符璽局屬門下省直長四人萬年屬京兆璽斯氏翻長知兩翻外間有不便事可言之述時侍側雲起奏曰栁述驕豪未嘗經事兵機要重非其所堪徒以主壻遂居要職臣恐物議以為陛下官不擇賢専私所愛斯亦不便之大者帝甚然其言顧謂述曰雲起之言汝藥石也可師友之秋七月丙戌詔内外官各舉所知栁述舉雲起除通事舍人曹魏中書置通事一人掌呈奏案章正始中改為通事舍人屬中書省隋改中書省為内史省益州總管蜀王秀容貌瓌偉瓖古回翻有膽氣好武藝好呼到翻帝每謂獨孤后曰秀必以惡終我在當無慮至兄弟必反矣大將軍劉噲之討西㸑也帝令上開府儀同三司楊武通將兵繼進此必㸑翫再反時將即亮翻秀以嬖人萬智光為武通行軍司馬嬖卑義翻又博義翻帝以秀任非其人譴責之因謂羣臣曰壞我法者子孫也壞音怪譬如猛虎物不能害反為毛間蟲所損食耳遂分秀所統自長史元巖卒後秀漸奢僭按隋書元巖傳開皇十三年巖卒是後仁夀四年帝卧疾仁夀宫又有黃門侍郎元巖與楊素栁述同侍疾參考廢太子勇傳栁述傳皆然如此則有兩元巖長知兩翻造渾天儀多捕山獠充宦者獠魯皓翻車馬被服擬於乘輿被皮義翻乗䋲證翻及太子勇以讒廢晉王廣為太子秀意甚不平太子恐秀終為後患隂令楊素求其罪而譖之令力丁翻上遂徴秀秀猶豫欲謝病不行緫管司馬源師諫源師即北齊源文宗之子葢是時亦老矣秀作色曰此自我家事何預卿也師垂涕對曰師忝恭府幕敢不盡忠聖上有勅追王以淹時月以當從隋書源師傳作已蜀本作已今乃遷延未去百姓不識王心但生異議内外疑駭發雷霆之詔降一介之使王何以自明願王熟計之朝廷恐秀生變戊子以原州緫管獨孤楷為益州揔管平涼郡置原州馳傳代之傳株戀翻楷至秀猶未肻行楷諷諭久之乃就路楷察秀有悔色因勒兵為備秀行四十餘里將還襲楷覘知有備乃止覘丑廉翻又丑艷翻八月甲子皇后獨孤氏崩太子對上及宫人哀慟絶氣若不勝喪者勝音升其處私室處昌吕翻飲食言笑如平常又每朝令進二溢米而私令取肥肉脯鮓乾肉為脯釀魚肉為鮓置竹筒中以蠟閉口衣襆褁而納之襆防玉翻帊也著作郎王劭上言佛説人應生天上及生無量夀國之時上時掌翻天佛放大光明以香花妓樂來迎妓渠綺翻伏惟大行皇后福善禎符備諸祕記皆云是妙善菩薩釋典菩普也薩濟也菩薩言能普濟衆生菩薄乎翻薩桑葛翻臣謹按八月二十二日仁夀宫内再雨金銀花雨于具翻二十三日大寶殿後夜有神光大寶殿在仁夀宫中寢殿也二十四日夘時永安宫北有自然種種音樂種章勇翻震滿虚室至夜五更更工衡翻奄然如寐遂即升遐與經文所説事皆符驗上覽之悲喜九月丙戌上至自仁夀宫冬十月癸丑以工部尚書楊逹為納言逹雄之弟也雄自廣平王改封清漳時又改封安徳閏月甲申詔楊素蘇威與吏部尚書牛𢎞等修定五禮五禮吉凶軍賔嘉上令上儀同三司蕭吉為皇后擇葬地為于偽翻得吉處云卜年二千卜世二百上曰吉凶由人不在扵地髙緯𦵏父豈不卜乎俄而國亡正如我家墓田若云不吉朕不當為天子若云不凶吾弟不當戰沒上弟整從周武帝伐齊至并州力戰而死然竟從吉言吉退告族人蕭平仲曰皇太子遣宇文左率深謝余云宇文述時為左衛率率所律翻公前稱我當為太子竟有其驗終不忘也今卜山陵務令我早立我立之後當以富貴相報吾語之云後四載太子御天下語牛倨翻載作亥翻若太子得政隋其亡乎吾前紿云紿徒亥翻卜年二千者三十字也卜世二百者取世二傳也汝其識之識職吏翻記也壬寅𦵏文獻皇后於太陵詔以楊素經營𦵏事勤求吉地論素此心事極誠孝豈與夫平戎定寇比夫音扶其功業可别封一子義康公邑萬户義康郡公隋志髙涼郡杜原縣舊有宋康郡平陳改曰義康郡并賜田三十頃絹萬段米萬石金珠綾錦稱是稱尺證翻蜀王秀至長安上見之不與語明日使使切讓之使使下疏吏翻秀謝罪太子諸王流涕庭謝上曰頃者秦王糜費財物我以父道訓之今秀蠧害生民當以君道繩之於是付執法者開府儀同三司慶整諫曰慶姓出齊大夫慶氏庶人勇既廢秦王已薨陛下見子無多見賢遍翻何至如是蜀王性甚耿介今被重責被皮義翻恐不自全上大怒欲斷其舌斷丁管翻因謂羣臣曰當斬秀於市以謝百姓乃令楊素等推治之治直之翻太子隂作偶人縛手釘心枷鎖杻械釘丁定翻杻敝九翻書上及漢王姓名仍云請西岳慈父聖母收楊堅楊諒神䰟如此形狀勿令散蕩宻埋之華山下華户化翻楊素發之又云秀妄述圖䜟稱京師妖異造蜀地徴神妖於驕翻徵與禎同并作檄文云指期問罪置秀集中集文集也隋志曰别集者葢漢東京之所創也自靈均已降屬文之士衆矣然其志尚不同風流殊别後之君子欲觀其體勢而見其心靈故别聚焉名之為集辭人景慕並自記載以成書部俱以聞奏上曰天下寜有是邪邪音耶十二月癸巳廢秀為庶人幽之内侍省不聽與妻子相見唯獠婢二人驅使獠魯皓翻連坐者百餘人秀上表摧謝曰上時掌翻伏願慈恩賜垂矜愍殘息未盡之間希與瓜子相見請賜一穴令骸骨有所瓜子其愛子也上因下詔數其十罪數所具翻且曰我不知楊堅楊諒是汝何親後乃聽與其子同處處昌吕翻初楊素嘗以少譴勅送南臺南臺者御史臺也立國面朝後市臺省皆在南故尚書省曰南省御史臺曰南臺少詩沼翻命治書侍御史栁彧治之治直之翻素恃貴坐彧牀彧從外來於階下端笏整容謂素曰奉勅治公之罪素遽下彧據案而坐立素於庭辨詰事狀素由是銜之詰去吉翻蜀王秀嘗從彧求李文博所撰治道集李文博博陵人仕隋不調性貞介鯁直好學不倦至子敎義名理特所留心讀書至治亂得失忠臣烈士未嘗不反覆吟翫長於議論亦善屬文著治道集十卷大行於世夫其文大行而仕不遇何也治直吏翻彧與之秀遺彧奴婢十口遺于季翻及秀得罪素奏彧以内臣交通諸侯除名為民配戍懷逺鎮新唐志營州有懷逺城帝使司農卿趙仲卿往益州窮按秀事秀之賔客經過之處仲卿必深文致法州縣長吏坐者大半過音戈長知兩翻上以為能賞賜甚厚久之貝州長史裴肅隋志清河郡後周置貝州遣使上書稱髙熲以天挺良才元勛佐命為衆所疾以至廢弃熲廢見上卷開皇十九年使疏吏翻上時掌翻願陛下錄其大功忘其小過又二庶人得辠已久二庶人謂勇秀寜無革心願陛下𢎞君父之恩顧天性之義經曰父子之道天性也各封小國觀其所為若能遷善漸更增益如或不悛悛丑縁翻貶削非晩今者自新之路永絶愧悔之心莫見豈不哀哉書奏上謂楊素曰裴肅憂我家事此亦至誠也於是徴肅入朝朝直遙翻太子聞之謂左庶子張衡曰使勇自新欲何為也衡曰觀肅之意欲令如吳太伯漢東海王耳吳太伯注已見前漢東海王疆事見光武紀此張衡為裴肅解也令力丁翻肅至上面諭以勇不可復收之意而罷遣之肅俠之子也裴俠見一百五十六卷梁武帝中大通五年復扶又翻楊素弟約及從父文思文紀從才用翻族父忌並為尚書列卿諸子無汗馬之勞位至柱國刺史廣營資産自京師及諸方都會處邸店碾磑碾尼展翻丁度集韻碾女箭翻所以離物器也磑五對翻並磨也便利田宅不可勝數勝音升家僮千數後庭妓妾曳綺羅者以千數妓渠綺翻第宅華侈制擬宫禁親故吏布列清顯隋書素傳作親戚故吏此逸戚字既廢一太子及一王威權日盛朝臣有違忤者或至誅夷忤五故翻有附會及親戚雖無才用必加進擢朝廷靡然莫不畏附敢與素抗而不撓者撓奴敎翻屈也獨栁彧及尚書右丞李綱大理卿梁毗而已始毗為西寜州刺史隋志越雋郡後周置嚴州開皇六年改曰西寜州十八年又改曰嶲州毗刺西寜葢十八年以前也凡十一年蠻夷酋長皆以金多者為豪雋遞相攻奪略無寜歳毗患之後因諸酋長相帥以金遺毗酋才由翻帥讀曰率長知兩翻遺于季翻毗置金坐側坐徂卧翻對之慟哭而謂之曰此物飢不可食寒不可衣衣於既翻汝等以此相滅不可勝數勝音升今將此來欲殺我邪邪音耶一無所納於是蠻夷感悟遂不相攻擊上聞而善之徴為大理卿處法平允處昌吕翻允信也當也毗見楊素専權恐為國患乃上封事曰臣聞臣無有作威作福其害于而家凶於而國書洪範之言上時掌翻竊見左僕射越國公素幸遇愈重權勢日隆搢紳之徒屬其視聽言注耳目也屬之欲翻忤㫖者嚴霜夏零阿旨者甘雨冬澍忤五故翻澍之戍翻又殊遇翻榮枯由其脣吻廢興候其指麾所私皆非忠讜讜音黨所進咸是親戚子弟布列兼州連縣天下無事容息異圖四海有虞必為禍始黎陽之變卒如毗言夫姦臣擅命有漸而來夫音扶王莽資之於積年桓𤣥基之於易世而卒殄漢祀終傾晉祚二事具漢晉紀卒子恤翻陛下若以素為阿衡臣恐其心未必伊尹也伏願揆鑒古今量為處置量音良處昌吕翻俾洪基永固率土幸甚書奏上大怒收毗繫獄親詰之詰去吉翻毗極言素擅寵㺯權將領之處殺戮無道將即亮翻又太子蜀王罪廢之日百僚無不震竦唯素揚眉奮肘喜見容色見賢遍翻利國家有事以為身幸上無以屈乃釋之其後上亦寖疎忌素乃下勅曰僕射國之宰輔不可躬親細務但三五日一向省評論大事外示優崇實奪之權也素由是終仁夀之末不復通判省事出楊約為伊州刺史隋志河南郡陸渾縣東魏置伊川郡及北荆州後周改曰和州開皇初又改曰伊州素既被疎被皮義翻吏部尚書栁述益用事攝兵部尚書參掌機宻按述傳仁夀中判兵部尚書事尋拜兵部尚書修掌機宻抗表陳讓乃令攝兵部尚書事素由是惡之惡烏路翻太子問於賀若弼曰楊素韓擒虎史萬歳皆稱良將其優劣何如弼曰楊素猛將非謀將韓擒虎鬬將非領將史萬歳驍將非大將太子曰然則大將誰也弼拜曰唯殿下所擇弼意自許也若人者翻將即亮翻騎竒寄翻交州俚帥李佛子作亂交趾郡交州俚音里帥所類翻據越王故城此城葢秦漢間駱越之王所築也遣其兄子大權據龍編城交州舊治龍編縣隋志治宋平而龍編以縣屬州其别帥李普鼎據烏延城帥所類翻楊素薦瓜州刺史長安劉方敦煌郡置𤓰州有將帥之畧詔以方為交州道行軍總管統二十七營而進方軍令嚴肅有犯必斬然仁愛士卒有疾病者親臨撫養士卒亦以此懷之至都隆嶺遇賊擊破之進軍臨佛子營先諭以禍福佛子懼請降降户江翻送之長安三年秋八月壬申賜幽州摠管燕榮死燕因肩翻榮性嚴酷鞭撻左右動至千數嘗見道次叢荆以為堪作杖命取之輒以試人人或自陳無罪榮曰後有罪當免汝既而有犯將杖之人曰前日被杖使君許以有罪宥之榮曰無罪尚爾况有罪邪被皮義翻使疏吏翻邪音耶杖之自若觀州長史元𢎞嗣隋志平原郡東光縣舊置勃海郡隋廢郡置觀州杜佑曰開皇三年改别駕治中為長史司馬觀古玩翻長知兩翻遷幽州長史懼為榮所辱固辭上勅榮曰𢎞嗣杖十已上罪皆須奏聞榮忿曰豎子何敢玩我於是遣𢎞嗣監納倉粟颺得一糠一粃皆罸之監古衘翻颺與章翻又餘亮翻粃音比每笞雖不滿十然一日之中或至三數如是歴年怨隙日搆榮遂收𢎞嗣付獄禁絶其糧𢎞嗣抽絮雜水咽之咽於甸翻其妻詣闕稱寃上遣使案驗使疏吏翻奏榮暴虐贓穢狼籍徴還賜死元𢎞嗣代榮為政酷又甚之九月壬戌置常平官開皇初置義倉今置常平官掌之是歳龍門王通詣闕獻太平十二策隋志龍門縣屬河東郡上不能用罷歸通遂敎授於河汾之間弟子自逺至者甚衆累徴不起楊素甚重之勸之仕通曰通有先人之敝廬足以蔽風雨薄田足以具􅊡粥􅊡諸延翻厚粥讀書談道足以自樂樂音洛願明公正身以治天下治直之翻時和歳豐通也受賜多矣不願仕也或譖通於素曰彼實慢公公何敬焉素以問通通曰使公可慢則僕得矣不可慢則僕失矣得失在僕公何預焉素待之如初弟子賈瓊問息謗通曰無辯問止怨曰不爭通嘗稱無赦之國其刑必平重歛之國其刑必削歛力贍翻又曰聞謗而怒者讒之囮也見譽而喜者佞之媒也絶囮去媒讒佞逺矣囮余周翻又五戈翻烏媒也爾雅翼曰説文囮譯也率鳥者繫生烏以來之名曰囮讀若譌譽音余去羌吕翻大業末卒于家卒子恤翻門人諡曰文中子通卒門人議曰禮男子生有字所以昭徳死有諡所以易名仲尼既沒文不在茲乎易曰黄裳元吉文在中也請諡曰文中子突厥步迦可汗所部大亂鐵勒僕骨等十餘部皆叛步迦降於唘民隋書鐵勒之先匈奴之苖裔也種類最多自西海之東依據山谷往往不絶獨洛河北有僕骨同羅韋紇拔也古覆羅並號俟斤蒙陳吐如紇斯結渾斛薛等諸姓勝兵可二萬伊吾以西焉耆之北傍白山則有契弊薄洛職乙咥蘇娑郍曷鳥讙紇骨也咥於尼讙等勝兵可二萬金山西有薛延陁咥勒兒十槃逹契等一萬餘兵康國北傍阿得水則有訶咥曷嶻撥忽比干具海曷比悉何嵳蘇㧞也末渴逹等有三萬餘兵得嶷海東有蘇路羯三索咽蔑促隆忽等諸姓八千餘拂菻東則有恩屈阿蘭比褥九離伏嗢昏等近二萬人北海南則都波等雖姓氏各别總謂為鐵勒並無君長分屬東西兩突厥人性凶忍善於騎射貪婪尤甚以寇抄為生自突厥有國東西征討皆資其用以制北荒迦古牙翻可從刋入聲汗音寒步迦衆潰西奔吐谷渾長孫晟送唘民置磧口唘民於是盡有步迦之衆磧七降翻資治通鑑卷一百七十九
