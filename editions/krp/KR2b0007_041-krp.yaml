body:
  text: 資治通鑑卷四十一宋司馬光撰胡三省音註漢紀三十三起強圉大淵獻盡屠維赤奮若凡三年世祖光武皇帝上之下建武三年春正月甲子以馮異為征西大將軍晉書職官志曰四征起於漢代謂此鄧禹慙於受任無功數以飢卒徼赤睂戰輒不利數所角翻徼一遥翻乃率車騎將軍鄧𢎞等自河北度至湖地理志河北縣屬河東郡湖縣屬京兆賢曰湖縣故城在今虢州湖城縣西南要馮異共攻赤睂要一遙翻下同異曰異與賊相拒數十日雖虜獲雄將餘衆尚多可稍以恩信傾誘難卒用兵破也卒讀曰猝下卒起同上今使諸將屯澠池要其東澠彌兖翻而異擊其西一舉取之此萬成計也十事九成猶有一不中萬事萬成言筭無遺計也要一遥翻禹𢎞不從𢎞遂大戰移日言日景移也赤睂陽敗棄輜重走重直用翻車皆載土以豆覆其上覆敷救翻兵士飢爭取之赤睂引還擊𢎞𢎞軍潰亂異與禹合兵救之赤睂小卻異以士卒飢倦可且休禹不聽復戰大為所敗復扶又翻敗補邁翻死傷者三千餘人禹以二十四騎脫歸宐陽異棄馬奔走上回谿阪杜佑通典曰冋谿在河南永寧縣東北俗名回坑長四里闊二丈深二丈五尺自漢以前道皆由此酈道元云曹公西討惡南路之險更開北道與麾下數人歸營收其散卒復堅壁自守復扶又翻辛巳立四親廟於雒陽祀父南頓君以上至舂陵節矦禮天子立親廟四今依以立舂陵節矦鬰林太守鉅鹿都尉南頓令廟壬午大赦閏月乙巳鄧禹上大司徒梁矦印綬上時掌翻下同詔還梁矦印綬以為右將軍馮異與赤睂約期㑹戰使壯士變服與赤睂同伏於道側旦日赤睂使萬人攻異前部異少出兵以救之所以示弱也賊見埶弱遂悉衆攻異異乃縦兵大戰日昃賊氣衰伏兵卒起衣服相亂赤睂不復識别卒讀曰猝復扶又翻别彼列翻衆遂驚潰追擊大破之於崤底崤谷之底也賢曰即崤阪也在今洛州永寜縣西北降男女八萬人降户江翻帝降璽書勞異曰勞力到翻始雖垂翅回谿終能奮翼澠池可謂失之東隅收之桑榆賢曰淮南子曰至於衡陽是謂隅中又前書谷永曰太白出西方六十日法當參天今已過期尚在桑榆間桑榆謂晚也余按淮南子曰西日垂景在樹端謂之桑榆方論功賞以荅大勲赤睂餘衆東向宐陽甲辰帝親勒六軍嚴陳以待之陳讀曰陣赤睂忽遇大軍驚震不知所謂乃遣劉恭乞降曰盆子將百萬衆降陛下何以待之帝曰待汝以不死耳丙午盆子及丞相徐宣以下三十餘人肉袒降上所得傳國璽綬璽斯氏翻綬音受積兵甲宐陽城西與熊耳山齊賢曰宐陽縣故城韓國城也在今洛州福昌縣東水經註曰洛水之北有熊耳山雙巒競舉狀同熊耳在宐陽西宋白曰宐陽故城在福昌縣東十三里赤睂衆尚十餘萬人帝令縣厨皆賜食宐陽縣廚也明旦大陳兵馬臨雒水帝改洛為雒令盆子君臣列而觀之帝謂樊崇等曰得無悔降乎朕今遣卿歸營勒兵鳴鼔相攻決其勝負不欲彊相服也彊其兩翻徐宣等叩頭曰臣等出長安東都門君臣計議歸命聖徳百姓可與樂成難與圗始樂音洛故不告衆耳今日得降猶去虎口歸慈母誠歡誠喜無所恨也帝曰卿所謂鐵中錚錚傭中佼佼者也賢曰説文曰錚錚金地鐵之錚言㣲有剛利也錚初耕翻佼古巧翻詩佼人僚兮今相傳胡巧翻言佼佼者凡庸之人稍為勝也戊申還自宐陽帝令樊崇等各與妻子居雒陽賜之田宅其後樊崇逢安反誅楊音徐宣卒於鄉里帝憐盆子以為趙王郎中趙王良帝叔父也以盆子為其國郎中後病失明賜滎陽均輸官地使食其税終身賢曰均輸官名屬司農桓寛鹽鐵論云郡國諸矦各以其方物貢輸往來物多苦惡不償其費故郡國置均輸官以相紹運故曰均輸劉恭為更始報仇殺謝禄禄殺更始事見上卷元年為于偽翻自繫獄帝赦不誅二月劉永立董憲為海西王賢曰海西縣屬琅邪郡永聞伏隆至劇地理志劇縣屬北海郡春秋紀國之地杜佑曰漢劇縣故城在夀光縣南亦遣使立張歩為齊王歩貪王爵猶豫未決隆曉譬曰髙祖與天下約非劉氏不王今可得為十萬戸矦耳歩欲留隆與共守二州二州青州徐州也隆不聽求得反命歩遂執隆而受永封隆遣間使上書曰間古莧翻使疏吏翻臣隆奉使無狀賢曰言罪大也受執凶逆雖在困阨授命不顧又吏民知歩反畔心不附之願以時進兵無以臣隆為念臣隆得生到闕廷受誅有司此其大願若令沒身寇手以父母昆弟長累陛下賢曰累托也音力偽翻陛下與皇后太子永享萬國與天無極帝得隆奏召其父湛流涕示之曰恨不且許而遽求還也其後歩遂殺之帝方北憂漁陽南事梁楚故張歩得專集齊地據郡十二焉歩據城陽琅邪髙宻膠東東萊北海齊千乗濟南平原泰山菑川十二郡帝幸懐吳漢率耿弇蓋延擊青犢於軹西大破降之賢曰軹縣屬河内郡故城在今洛州濟源縣東南蓋古盍翻三月壬寅以司直伏湛為大司徒涿郡太守張豐反郡國志涿郡在雒陽東北千八百里自稱無上大將軍與彭寵連兵朱浮以帝不自征彭寵上疏求救詔報曰往年赤睂跋扈長安賢曰跋扈猶言暴横也吾䇿其無榖必東果來歸附今度此反虜度徒洛翻埶無乆全其中必有内相斬者今軍資未充故須後麥耳須待也浮城中糧盡人相食㑹耿況遣騎來救浮乃得脱身走薊城遂降於彭寵考異曰朱浮傳尚書令矦霸奏浮敗亂幽州構成寵罪徒勞軍師不能死節罪當伏誅按霸明年乃為尚書令蓋追劾之寵自稱燕王攻拔右北平上谷數縣賂遺匈奴遺于季翻借兵為助又南結張歩及富平獲索諸賊皆與交通帝自將征鄧奉至堵陽堵陽縣屬南陽郡杜佑曰唐州方城縣漢堵陽縣應劭曰堵陽景帝改為順陽二説不同奉逃歸淯陽董訢降訢音欣降户江翻下同夏四月帝追奉至小長安與戰大破之奉肉袒因朱祜降去年奉禽祜今因祜而降帝憐奉舊功臣奉鄧晨之兄子也且釁起吳漢事見上卷上年欲全宥之岑彭耿弇諫曰鄧奉背恩反逆背蒲妹翻暴師經年陛下旣至不知悔善而親在行陳陳讀曰陣兵敗乃降若不誅奉無以懲惡於是斬之復朱祜位延岑旣破赤睂即拜置牧守欲據關中時關中衆宼猶盛岑據藍田王歆據下邽賢曰秦武公伐邽戎置以隴西有上邽故此云下芳丹據新豐芳姓也風俗通有漢幽州刺史芳乗蔣震據霸陵張邯據長安公孫守據長陵楊周據谷口呂鮪據陳倉角閎據汧角姓也漢有角善叔汧苦堅翻駱延據盩厔盩厔音舟窒姓譜齊太公之後有公子駱子孫以為氏史記秦之先有大駱任良據鄠鄠音户汝章據槐里汝姓也商有汝鳩汝方春秋晉有汝齊汝寛各稱將軍擁兵多者萬餘人少者數千人轉相攻擊馮異且戰且行屯軍上林苑中異自崤谷之勝引兵而西且戰且行進屯上林苑中延岑引張邯任良共擊異異擊大破之諸營保附岑者皆來降保與堡同岑遂自武關走南陽走音奏時百姓饑餓黄金一斤易豆五升道路斷隔委輸不至委於偽翻輸春遇翻馮異軍士悉以果實為糧詔拜南陽趙匡為右扶風將兵助異并送縑榖異兵榖漸盛乃稍誅擊豪傑不從令者襃賞降附有功勞者悉遣諸營渠帥詣京師帥所類翻散其衆歸本業威行關中唯呂鮪張邯蔣震遣使降蜀鮪于軌翻邯下甘翻其餘悉平吳漢率驃騎大將軍杜茂等七將軍圍蘇茂於廣樂周建招集得十餘萬人救之周建劉永將也漢迎與之戰不利墮馬傷䣛還營䣛與膝同建等遂連兵入城諸將謂漢曰大敵在前而公傷卧衆心懼矣三軍之氣以將為主故云然漢乃勃然裹創而起創初良翻椎牛饗士慰勉之士氣自倍旦日蘇茂周建出兵圍漢漢奮擊大破之茂走還湖陵睢陽人反城迎劉永蓋延率諸將圍之反音幡蓋古盍翻呉漢留杜茂陳俊守廣樂自將兵助延圍睢陽睢音雖車駕自小長安引還令岑彭率傅俊臧宫劉宏等三萬餘人南擊秦豐五月己酉車駕還宫乙卯晦日有食之六月壬戌大赦延岑攻南陽得數城建威大將軍耿弇與戰于穰地理志穰縣屬南陽郡大破之岑與數騎走東陽與秦豐合豐以女妻之走音奏妻七細翻建義大將軍朱祜率祭遵等與岑戰於東陽破之賢曰東陽聚名也故城在今鄧州南臨淮郡復有東陽縣非此地也余據郡國志南陽淯陽縣有東陽聚岑走歸秦豐祜遂南與岑彭等軍合延岑䕶軍鄧仲況擁兵據隂縣賢曰隂縣屬南陽郡故城在今襄州榖城縣界北水經注沔水南逕穀城東又南過隂縣西宋白曰今光化軍本隂縣地而劉歆孫龔為其謀主前侍中扶風蘇竟以書説之前此帝嘗用竟為侍中説翰芮翻仲況與龔降竟終不伐其功隠身樂道夀終於家樂音洛秦豐拒岑彭於鄧地理志鄧縣屬南陽郡春秋之鄧國也秋七月彭擊破之進圍豐於黎丘别遣積弩將軍傅俊將兵徇江東揚州悉定蓋延圍睢陽百日劉永蘇茂周建突出將走鄼此沛郡之鄼縣也賢曰今亳州縣音在何翻延追擊之急永將慶吾斬永首降姓譜齊大夫慶氏之後蘇茂周建犇垂惠郡國志沛郡山桑縣有垂惠聚賢曰在今亳州山桑縣西北一名禮城杜佑通典曰垂惠聚在亳州蒙城縣西北共立永子紆為梁王佼彊犇保西防佼古巧翻又音効冬十月壬申上幸舂陵祠園廟舂陵節矦以下四世園廟也耿弇從容言於帝從千容翻自請北收上谷兵未發者定彭寵於漁陽取張豐於涿郡還收富平獲索東攻張歩以平齊地帝壯其意許之十一月乙未帝還自舂陵是嵗李憲稱帝置百官擁九城衆十餘萬廬江十二城憲所得者九城耳帝謂太中大夫來歙曰姓譜郲子姓商之支孫食采於郲因以為氏後避難去邑漢功臣表有車犬矦來蒼歙許及翻今西州未附西州謂隗囂也子陽稱帝子陽公孫述字道里阻逺諸將方務關東思西州方畧未知所在歙曰臣嘗與隗囂相遇長安其人始起以漢為名事見三十九卷更始元年臣願得奉威命開以丹青之信揚子曰聖人之言炳若丹青囂必束手自歸則述自亡之埶不足圗也帝然之始令歙使於囂使疏吏翻下同囂旣有功於漢又受鄧禹爵署事見上卷元年其腹心議者多勸通使京師囂乃奉奏詣闕帝報以殊禮言稱字用敵國之儀所以慰藉之甚厚賢曰慰安也藉薦也言安慰而薦藉之也四年正月甲申大赦二月壬子上行幸懐壬申還雒陽延岑復宼順陽郡國志順陽縣屬南陽郡順水東南入蔡括地志順陽故城在鄧州穰縣西三十里楚之郇邑也復扶又翻下同遣鄧禹將兵擊破之岑犇漢中公孫述以岑為大司馬封汝寧王田戎聞秦豐破恐懼欲降降户江翻下同其妻兄辛臣圖彭寵張歩董憲公孫述等所得郡國以示戎曰雒陽地如掌耳如掌喻其狹也不如且按甲以觀其變戎曰以秦王之彊猶為征南所圍吾降決矣岑彭時為征南大將軍故戎云然乃留辛臣使守夷陵自將兵沿江泝沔上黎丘自夷陵沿江而下至沔口自沔口泝沔而上可至黎丘也上時掌翻辛臣於後盜戎珍寳從間道先降于岑彭間古莧翻而以書招戎曰宐以時降無拘前計戎疑臣賣已灼龜卜降兆中坼周禮菙氏凡卜以明火爇燋吹其焌契以授卜師鄭𤣥曰燋焌用荆菙之類兆者灼龜發於火其形可占者菙時髓翻燋哉約翻焌音俊又子寸翻遂復反與秦豐合岑彭擊破之戎亡歸夷陵夏四月丁巳上行幸鄴己巳幸臨平賢曰縣名屬鉅鹿郡故城在今定州鼔城縣東南遣吳漢陳俊王梁擊破五校於臨平鬲縣五姓共逐守長據城而反賢曰鬲縣屬平原郡故城在今徳州西北五姓蓋當土強宗豪右鬲音革余謂守長者守鬲縣長非正官也長知兩翻下同諸將爭欲攻之呉漢曰使鬲反者守長罪也敢輕冒進兵者斬乃移檄告郡使收守長而使人謝城中五姓大喜即相率降諸將乃服曰不戰而下城非衆所及也五月上幸元氏辛巳幸盧奴將親征彭寵伏湛諫曰今兖豫青冀中國之都而宼賊從横未及從化從子容翻漁陽邊外荒耗邊外者邊於外夷也豈足先圗陛下捨近務遠棄易求難易以䜴翻誠臣之所惑也上乃還帝遣建議大將軍朱祜建威大將軍耿弇征虜將軍祭遵祭則界翻驍騎將軍劉喜討張豐於涿郡祭遵先至急攻豐禽之初豐好方術有道士言豐當為天子西都有方士東都因稱為道士好呼到翻以五綵囊裹石繫豐肘云石中有玉璽豐信之遂反旣執當斬猶曰肘石有玉璽傍人為椎破之為于偽翻下同豐乃知被詐仰天歎曰當死無恨上詔耿弇進擊彭寵弇以父况與寵同功况與寵同有助漢之功事見上第三十九卷更始二年又兄弟無在京師者不敢獨進求詣雒陽詔報曰將軍舉宗為國功効尤著何嫌何疑而欲求徴况聞之更遣弇弟國入侍時祭遵屯良鄉劉喜屯陽鄉賢曰良鄉陽郷皆縣名並屬涿郡陽鄉故城在今幽州故安縣西北宋白曰良鄉在燕為中都漢為良鄉縣彭寵引匈奴兵欲擊之耿况使其子舒襲破匈奴兵斬兩王寵乃退走六月辛亥車駕還宫秋七月丁亥上幸譙月考異曰袁紀六幸譙今從范書遣捕虜將軍馬武騎都尉王霸圍劉紆周建於垂惠董憲將賁休以蘭陵降賢曰前書賁赫音肥今姓作賁音奔蘭陵縣屬東海郡故城在今沂州丞縣東憲聞之自郯圍之賢曰郯縣屬東海郡故城在今泗州下邳縣東北郯音談蓋延及平狄將軍山陽龎萌在楚楚彭城也請往救之帝敕曰可直往擣郯賢曰擣擊也余謂擣擣虚也此兵法所謂攻其必救也則蘭陵自解延等以賁休城危遂先赴之憲逆戰而陽敗退延等因拔圍入城明日憲大出兵合圍延等懼遽出突走因往攻郯帝讓之曰間欲先赴郯者以其不意故耳今旣犇走賊計已立圍豈可解乎延等至郯果不能克而董憲遂㧞蘭陵殺賁休八月戊午上幸夀春地理志壽春縣屬九江郡賢曰今夀州縣遣揚武將軍南陽馬成率誅虜將軍南陽劉隆等三將軍發㑹稽丹陽九江六安四郡兵擊李憲九月圍憲於舒地理志廬江郡治舒縣賢曰故城在今廬州廬江縣西㑹古外翻王莽末天下亂臨淮大尹河南矦霸獨能保全其郡郡國志臨淮郡在雒陽東千四百里帝徴霸㑹夀春拜尚書令時朝廷無故典又少舊臣少詩沼翻霸明習故事收録遺文條奏前世善政法度施行之冬十月甲寅車駕還宫隗囂使馬援往觀公孫述援素與述同里閈相善援與述皆茂陵人説文曰閈閭也矦旰翻以為旣至當握手歡如平生而述盛陳陛衛以延援入交拜禮畢使出就舘更為援制都布單衣何承天纂文曰都致錯履無極皆布名方言曰單衣江淮南楚之間謂之褋關之東西謂之禪衣為于偽翻交讓冠㑹百官於宗廟中立舊交之位述鸞旗旄騎鸞旗註見十三卷文帝元年旄騎旄頭騎也秦穆公伐南山大梓有一青牛出走入豐水中其後牛出豐水中使騎擊之不勝有騎墮地復上髪解牛畏之入不出故置旄頭騎以前驅警蹕就車磬折而入賢曰磬折屈身如磬之曲折敬也孔穎達曰磬折者屈身如磬之折殺案考工記云磬氏為磬倨句一矩有半鄭云必先度一矩為句一矩為股而求其弦既以一矩有半觸其弦則磬之倨句也是磬之折殺其形必曲人之倚式亦當然也禮饗官屬甚盛欲授援以封矦大將軍位賓客皆樂留樂音洛援曉之曰天下雄雌未定公孫不吐哺走迎國士周公一飯三吐哺以下天下之士與圗成敗反修飾邊幅賢曰言若布帛修整其邊幅也如偶人形此子何足乆稽天下士乎稽留也因辭歸謂囂曰子陽井底蛙耳言志識褊狹如坎井之蛙而妄自尊大不如專意東方東方謂雒陽也囂乃使援奉書雒陽援初到良乆中黄門引入中黄門宦者也屬少府帝在宣徳殿南廡下廡音武堂下周屋也但幘坐迎笑董巴曰古者有冠無幘其戴也加首有頍所以安物詩曰有頍者弁謂此也秦加武將首飾為絳袙其後稍稍作顔題漢興續其顔却摞之施巾連題却覆之今䘮幘是其制也名之曰幘幘者頭首嚴賾也至孝文乃髙顔題續之為耳崇其巾為屋合後施收貴賤皆服之蔡邕曰幘古者卑賤執事不冠者之所服元帝頟有壯髪不欲使人見始進幘服之謂援曰卿遨遊二帝間今見卿使人大慙援頓首辭謝因曰當今之世非但君擇臣臣亦擇君矣臣與公孫述同縣少相善少詩照翻臣前至蜀述陛㦸而後進臣陛㦸謂衛者持㦸夾陛也臣今遠來陛下何知非刺客姦人而簡易若是帝復笑曰卿非刺客顧説客耳説去聲援曰天下反覆盜名字者不可勝數盜名字謂僣竊位號稱帝稱王也易以䜴翻復扶又翻説輸芮翻勝音升今見陛下恢廓大度同符髙祖乃知帝王自有眞也太傅卓茂薨十一月丙申上行幸宛宛於元翻岑彭攻秦豐三嵗斬首九萬餘級豐餘兵裁千人食且盡十二月丙寅帝幸黎丘遣使招豐豐不肯降降户江翻下同乃使朱祜等代岑彭圍黎丘使岑彭傅俊南擊田戎公孫述聚兵數十萬人積粮漢中又造十層樓船多刻天下牧守印章守式又翻遣將軍李育程烏將數萬衆出屯陳倉就呂鮪將徇三輔馮異迎擊大破之育烏俱犇漢中述考異曰公孫傳使李育程烏與呂鮪徇三輔三年馮異擊鮪育於陳倉大敗之按本紀四年馮異與述將程馬戰陳倉破之馮異傳亦在今年蓋述傳誤以四年為三年焉作烏耳異還擊破呂鮪營保降者甚衆是時隗囂遣兵佐異有功遣使上狀帝報以手書曰慕樂徳義思相結納樂音洛昔文王三分猶服事殷孔子曰三分天下有其二以服事殷周之徳可謂至徳也已矣但駑馬鉛刀不可強扶賢曰周禮校人掌六馬駑馬最下者也説文鉛青金也似錫而包青言駑馬鉛刀不可強扶而用也強其兩翻數蒙伯樂一顧之價戰國䇿蘇代謂淳于髠曰人有賣駿馬者比三旦立於市市人莫之知往見伯樂曰臣有駿馬欲賣之比三旦立市市人莫與言願子還而視之去而顧之臣請獻一朝之價伯樂如其言一旦而價十倍也數所角翻樂音洛將軍南拒公孫之兵北御羌胡之亂御讀曰禦是以馮異西征得以數千百人躑躅三輔賢曰躑躅猶踟蹰也毛晃曰躑躅跳也躑直炙翻躅直録翻㣲將軍之助則咸陽已為他人禽矣如令子陽到漢中三輔願因將軍兵馬鼔旗相當儻肯如言即智士計功割地之秋也賢曰秋一嵗中功成之時故舉以為言管仲曰生我者父母成我者鮑子賢曰事見史記自今以後手書相聞勿用傍人間構之言間古莧翻下同其後公孫述數遣將間出囂輒與馮異合勢共摧挫之述遣使以大司空扶安王印綬授囂扶安謂相扶助而安也囂斬其使出兵擊之以故蜀兵不復北出復扶又翻泰山豪傑多與張歩連兵呉漢薦強弩大將軍陳俊為泰山太守擊破歩兵遂定泰山郡國志泰山郡在雒陽東千四百里五年春正月癸巳車駕還宫帝使來歙持節送馬援歸隴右遊考異曰袁紀曰援與拒蜀矦國遊先俱奉使先至長安為仇家所殺其弟為囂雲旗將軍來歙恐其怨恨與援俱還長安按囂使被殺者周遊也不在此時隗囂與援共卧起問以東方事曰前到朝廷上引見數十東觀記曰凡十四見每接燕語自夕至旦才明勇畧非人敵也且開心見誠無所隠伏闊達多大節畧與髙帝同經學博覽政事文辨前世無比囂曰卿謂何如髙帝援曰不如也髙帝無可無不可賢曰此論語孔子自言己之所行也今上好吏事好呼到翻動如節度又不喜飲酒喜許記翻囂意不懌曰如卿言反復勝邪復扶又翻二月丙午大赦蘇茂將五校兵救周建於垂惠校戸敎翻馬武為茂建所敗犇過王霸營大呼求救敗補邁翻呼火故翻霸曰賊兵盛出必兩敗努力而已乃閉營堅壁軍吏皆爭之霸曰茂兵精鋭其衆又多吾吏士心恐而捕虜與吾相恃馬武為捕虜將軍兩軍不一此敗道也今閉營固守示不相援賊必乗勝輕進捕虜無救其戰自倍人各致死則一人倍二人之力如此茂衆疲勞吾承其敝乃可克也茂建果悉出攻武悉兵而出攻也合戰良乆霸軍中壯士數十人斷髪請戰斷丁管翻霸乃開營後出精騎襲其背茂建前後受敵驚亂敗走霸武各歸營茂建復聚兵挑戰復扶又翻挑徒了翻下同霸堅卧不出方饗士作倡樂倡音昌茂雨射營中射矢如雨也射而亦翻中霸前酒樽中竹仲翻霸安坐不動軍吏皆曰茂前日已破今易擊也易以豉翻霸曰不然蘇茂客兵遠來粮食不足故數挑戰以徼一時之勝數所角翻徼堅堯翻又一遙翻今閉營休士所謂不戰而屈人兵者也孫子曰百戰百勝非善之善者也不戰而屈人兵善之善者也霸蓋引其言茂建旣不得戰乃引還營其夜周建兄子誦反閉城拒之建於道死茂犇下邳地理志下邳縣屬東海郡與董憲合劉紆犇佼彊乙丑上行幸魏郡彭寵妻數為惡夢數所角翻又多見怪變卜筮望氣者皆言兵當從中起寵以子后蘭卿質漢歸不信之子后蘭卿歸見上卷二年質音致使將兵居外無親於中寵齋在便室賢曰便坐之室非正室也蒼頭子宻等三人賢曰秦呼民為黔首謂奴為蒼頭者以别于良人也因寵卧寐共縛著牀著直畧翻告外吏云大王齋禁皆使吏休偽稱寵命收縛奴婢各置一處又以寵命呼其妻妻入驚曰奴反奴乃捽其頭擊其頰捽昨沒翻寵急呼曰趣為諸將軍辦裝趣讀曰促賢曰呼奴為將軍者欲其赦已也呼火故翻為于偽翻於是兩奴將妻入取寳物留一奴守寵寵謂守奴曰若小兒吾素所愛也今為子宻所廹刼耳解我縛當以女珠妻汝妻七細翻家中財物皆以與若若亦汝也小奴意欲解之視戸外見子宻聽其語遂不敢解於是收金玉衣物至寵所裝之被馬六匹被皮義翻加馬以鞍勒曰被馬使妻縫兩縑嚢昏夜後解寵手令作記告城門將軍云今遣子宻等至子后蘭卿所勿稽留之書成斬寵及妻頭置嚢中便持記馳出城因以詣闕明旦閤門不開官屬踰牆而入見寵尸驚怖怖普布翻其尚書韓立等共立寵子午為王國師韓利斬午首詣祭遵降國師以寵所署置也蓋遵王莽之制夷其宗族帝封子宻為不義矦權徳輿議曰伯通之叛命伯通彭寵字也子宻之戕君同歸于亂罪不相蔽宐各致於法昭示王度王度猶言王法也反乃爵于五等又以不義為名且舉以不義莫可矦也此而可矦漢爵為不足勸矣春秋書齊豹盜三叛人名之義衛司宼齊豹以私怨殺衛矦之兄孟縶春秋書之曰盜三叛人名謂襄二十一年邾庶其以漆閭丘來奔昭五年莒牟夷以牟婁及防兹來奔哀十四年小邾射以句繹來奔句音鉤無乃異於是乎帝以扶風郭伋為漁陽太守郡國志漁陽郡在雒陽東北二千里伋承離亂之後養民訓兵開示威信盜賊銷散匈奴遠迹在職五年户口増倍帝使光禄大夫樊宏持節迎耿况于上谷郡國志上谷郡在雒陽東北二千里曰邊郡寒苦不足乆居况至京師賜甲第奉朝請封牟平矦地理志牟平縣屬東萊郡唐宋屬登州宋白曰牟平縣以在牟山之陽其地平坦故曰牟平漢牟平故城在今黄縣東百三十里朝直遥翻請音才性翻又如字呉漢率耿弇王常擊富平獲索賊于平原郡國志平原郡在雒陽北一千三百里大破之追討餘黨至勃海郡國志勃海郡在雒陽北一千六百里降者四萬餘人上因詔弇進討張歩平敵將軍龐萌為人遜順前作平狄將軍帝信愛之常稱曰可以託六尺之孤寄百里之命者論語孔子之言吕與叔曰託六尺之孤謂輔㓜主寄百里之命謂為諸矦龐萌是也使與蓋延共擊董憲時詔書獨下延而不及萌下遐稼翻萌以為延譛已自疑遂反襲延軍破之東考異曰觀記漢書皆云萌攻延延與戰破之詔書勞延曰龐萌一夜反畔相去不逺營壁不堅殆令人齒欲相擊而將軍有不可動之節吾甚美之延傳言幸而得免與彼不同今從延傳與董憲連和自號東平王屯桃鄉之北東平國任城縣有桃鄉賢曰故城在今兖州龔丘縣西北帝聞之大怒自將討萌與諸將書曰吾嘗以龐萌為社稷之臣將軍得無笑其言乎老賊當族其各厲兵馬㑹睢陽睢陽梁國都郡國志在雒陽東南八百五十里龐萌攻破彭城將殺楚郡太守孫萌郡國志楚郡在雒陽東千二百二十里考異曰袁紀作楚相孫萌今從范書郡吏劉平伏太守身上號泣請代其死身被七創號戸刀翻下同被皮義翻創初良翻龐萌義而捨之太守已絶復蘇孔頴達曰更息曰蘇言氣絶而更息也渇求飲平傾創血以飲之岑彭攻拔夷陵田戎亡入蜀盡獲其妻子士衆數萬人公孫述以戎為翼江王岑彭謀伐蜀以夾川榖少夾川猶言夾江也江大川也水險難漕留威虜將軍馮駿軍江州都尉田鴻軍夷陵領軍李𤣥軍夷道地理志夷道縣屬南郡自引兵還屯津鄉郡國志南郡江陵縣有津郷賢曰所謂江津也當荆州要㑹喻告諸蠻夷降者奏封其君長夏四月旱蝗隗囂問於班彪曰往者周亡戰國並爭數世然後定意者從横之事將復起于今乎從子容翻復扶又翻將承運迭興在于一人也彪曰周之廢興與漢殊異昔周爵五等諸矦從政師古曰言諸矦之國各自為政本根旣㣲枝葉彊大本根謂王室枝葉謂諸矦故其末流有從横之事埶數然也漢承秦制改立郡縣主有專已之威臣無百年之柄至于成帝假借外家師古曰假音工暇翻又工雅翻哀平短祚國嗣三絶故王氏擅朝能竊號位危自上起傷不及下賢口成帝威權借於外家是危自上起也漢不得罪于百姓是傷不及下也朝直遥翻是以即真之後天下莫不引領而歎十餘年間中外騷擾遠近俱發假號雲合咸稱劉氏不謀同辭方今雄桀帶州域者皆無六國世業之資而百姓謳吟思仰漢必復興已可知矣囂曰生言周漢之埶可也至于但見愚人習識劉氏姓號之故而謂漢復興疎矣昔秦失其鹿劉季逐而掎之師古曰掎偏持其足也居蟻翻時民復知漢乎彪乃為之著王命論以風切之為于偽翻風讀曰諷曰昔堯之禪舜曰天之厯數在爾躬舜亦以命禹論語所載洎于稷契咸佐唐虞至湯武而有天下洎其冀翻契息列翻劉氏承堯之祚堯據火徳而漢紹之有赤帝子之符事見七卷秦二世元年故為鬼神所福饗天下所歸往由是言之未見運世無本功徳不紀師古曰不紀言不為人所記而得屈起在此位者也屈起特起也屈求勿翻俗見髙祖興于布衣不達其故至比天下於逐鹿幸㨗而得之不知神器有命不可以智力求也劉徳曰神器璽也李竒曰帝王賞罰之柄也師古曰李説是也仲馮曰神器聖人之大寳曰位是也悲夫此世所以多亂臣賊子者也夫餓饉流𨽻師古曰隷賤𨽻飢寒道路所願不過一金然終轉死溝壑何則貧窮亦有命也况乎天子之貴四海之富神明之祚可得而妄處哉處昌呂翻故雖遭罹阨㑹竊其權柄勇如信布彊如梁籍謂項梁項籍也成如王莽然卒潤鑊伏質師古曰質鍖也伏於鍖上而斬之也卒子恤翻亨醢分裂亨與烹同又况么麽尚不及數子師古曰么麽皆㣲小之稱也么音一堯翻麽音莫可翻而欲闇奸天位者乎奸音干昔陳嬰之母以嬰家世貧賤卒富貴不祥止嬰勿王卒讀曰猝事見八卷秦二世二年王陵之母知漢王必得天下伏劔而死以固勉陵事見九卷髙祖元年夫以匹婦之明猶能推事理之致探禍福之機而全宗祀于無窮垂䇿書於春秋師古曰凡言匹夫匹婦謂凡庶之人春秋史書記事之總稱而况大丈夫之事虖是故窮達有命吉凶由人嬰母知廢陵母知興審此二者帝王之分決矣分扶問翻下同加之髙祖寛明而仁恕知人善任使當食吐哺納子房之䇿拔足揮洗揖酈生之説舉韓信于行陳洗息典翻行戸剛翻陳讀曰陣收陳平於亡命事並見髙帝紀英雄陳力羣䇿畢舉此髙祖之大畧所以成帝業也若乃靈瑞符應其事甚衆故淮隂留矦謂之天授非人力也英雄誠知覺寤超然逺覽淵然深識收陵嬰之明分絶信布之覬覦覬音冀覦音俞距逐鹿之瞽説審神器之有授毋貪不可冀為二母之所笑則福祚流于子孫天禄其永終矣囂不聽彪遂避地河西竇融以為從事漢制將軍府及司𨽻刺史郡守皆有從事甚禮重之彪遂為融畫策為于偽翻使之專意事漢焉初竇融等聞帝威徳心欲東向以河西隔逺未能自通乃從隗囂受建武正朔囂皆假其將軍印綬囂外順人望内懐異心使辯士張𤣥説融等曰更始事已成尋復亡滅説輸芮翻復扶又翻此一姓不再興之效也今即有所主便相係屬一旦拘制自令失柄後有危敗雖悔無及方今豪桀競逐雌雄未決當各據土宇與隴蜀合從從子容翻髙可為六國下不失尉佗尉佗事見十二卷髙帝十一年佗徒何翻融等召豪桀議之其中識者皆曰今皇帝姓名見於圗書見賢遍翻自前世博物道術之士谷子雲夏賀良等皆言漢有再受命之符谷永書見三十一卷成帝永始二年夏賀良事見三十三卷哀帝建元二年故劉子駿改易名字冀應其占劉歆改名事見三十三卷成帝綏和二年歆字子駿意在改名之後及莽末西門君惠謀立子駿事覺被殺出謂觀者曰䜟文不誤劉秀眞汝主也事見三十九卷更始元年讖楚諧翻此皆近事暴著暴歩木翻毛見曰顯示也又如字義同衆所共見者也况今稱帝者數人而雒陽土地最廣甲兵最強號令最明觀符命而察人事它姓殆未能當也衆議或同或異融遂決䇿東向遣長史劉鈞等奉書詣雒陽時衆推融為大將軍故置長史先是帝亦發使遺融書以招之先悉薦翻遺于季翻遇鈞於道即與俱還帝見鈞歡甚禮饗畢乃遣令還賜融璽書曰今益州有公孫子陽天水有隗將軍方蜀漢相攻權在將軍舉足左右便有輕重言左投則蜀重右投則漢重也以此言之欲有厚豈有量哉欲遂立桓文輔㣲國當勉卒功業欲三分鼎足連衡合從亦宐以時定開兩説以觀融去就量音良卒子恤翻衡讀曰横從子容翻天下未并吾與爾絶域非相吞之國今之議者必有任囂教尉佗制七郡之計事見十二卷髙帝十一年賢曰七郡蒼梧鬰林合浦交趾九眞南海日南也余謂尉佗之時未置七郡光武據後來置郡言之王者有分土無分民分扶問翻自適己事而已因授融為涼州牧璽書至河西河西皆驚以為天子明見萬里之外朱祜急攻黎丘六月秦豐窮困出降轞車送雒陽呉漢劾祜廢詔命受豐降上誅豐不罪祜董憲與劉紆蘇茂佼彊去下邳還蘭陵使茂彊助龐萌圍桃城桃城即桃郷之城也賢曰在今兖州任城縣北帝時幸蒙聞之乃留輜重重直用翻自將輕兵晨夜馳赴至亢父賢曰蒙縣名屬梁國故城在今宋州北地理志亢父縣屬東平國師古曰音抗甫或言百官疲倦可且止宿上不聽復行十里宿任城復扶又翻任音壬欲度亢父之險故進而宿任城去桃城六十里旦日諸將請進龐萌等亦勒兵挑戰挑徒了翻帝令諸將不得出休士養鋭以挫其鋒時吳漢等在東郡郡國志東郡去雒陽八百里馳使召之萌等驚曰數百里晨夜行以為至當戰而堅坐任城致人城下眞不可往也乃悉兵攻桃城城中聞車駕至衆心益固萌等攻二十餘日衆疲困不能下吳漢王常蓋延王梁馬武王霸等皆至帝乃率衆軍進救桃城親自搏戰大破之龐萌蘇茂佼彊夜走從董憲秋七月丁丑帝幸沛進幸湖陵董憲與劉紆悉其兵數萬人屯昌慮地理志昌慮縣屬東海郡宋白曰徐州滕縣漢蕃昌慮二縣地應劭註蕃縣即小邾國又有邾國濫城在今縣東南即漢之昌慮縣也師古曰慮音廬憲招誘五校餘賊與之拒守建陽賢曰建陽縣屬東海郡故城在今沂州丞縣北丞時證翻帝至蕃賢曰蕃音皮又音婆地理志蕃縣屬魯國應劭曰小邾國也師古曰白裒云陳蕃為魯相國人為諱改曰皮此説非也郡縣之名土俗各有别稱不必皆依本字杜佑通典蕃音反余謂皮字乃傳寫反字之誤當從通典反音孚袁翻去憲所百餘里諸將請進帝不聽知五校乏食當退敕各堅壁以待其敝頃之五校果引去帝乃親臨四面攻憲三日大破之佼彊將其衆降降户江翻蘇茂犇張歩憲及龐萌走保郯八月己酉帝幸郯留呉漢攻之車駕轉徇彭城下邳呉漢拔郯董憲龐萌走保朐賢曰朐縣屬東海郡今海州朐山縣西有故朐城朐音劬宋白曰朐故城在朐山縣西九十里劉紆不知所歸其軍士髙扈斬之以降吳漢進圍朐冬十月帝幸魯魯國本屬徐州帝改屬豫州張歩聞耿弇將至使其大將軍費邑軍歴下賢曰厯下城在今齊州厯城縣弇考異曰袁紀作濟南王費邑今從耿傳又令兵屯祝阿地理志祝阿縣屬平原郡賢曰今齊州縣故城在今山荏縣東北天寳元年改祝阿為禹城以縣西有禹息故城也别于泰山鍾城列營數十以待之弇渡河先擊祝阿自旦攻城日未中而㧞之故開圍一角令其衆得奔歸鍾城鍾城人聞祝阿已潰大恐懼遂空壁亡去費邑分遣弟敢守巨里郡國志濟南厯城有巨里聚賢曰一名巨合城在今齊州全節縣東南弇進兵先脅巨里嚴令軍中趣修攻具趣讀曰促宣敕諸部後三日當悉力攻巨里城隂緩生口令得亡歸以弇期告邑邑至日果自將精兵三萬餘人來救之弇喜謂諸將曰吾所以修攻具者欲誘致之耳誘音酉野兵不擊何以城為即分三千人守巨里自引精兵上岡阪爾雅曰山脊曰岡坡者曰坂上時掌翻乗髙合戰大破之臨陳斬邑陳讀曰陣旣而收首級以示城中城中兇懼賢曰兇恐懼聲音呼勇翻費敢悉衆亡歸張歩弇復收其積聚復扶又翻積子賜翻聚才喻翻縱兵擊諸未下者平四十餘營遂定濟南郡國志濟南郡在雒陽東千八百里濟子禮翻時張歩都劇使其弟藍將精兵二萬守西安賢曰西安縣名屬齊郡故城在今青州臨菑縣西北諸郡太守合萬餘人守臨菑臨菑縣屬齊郡相去四十里弇進軍畫中賢曰畫中邑名也畫音胡麥翻故城在今西安城東南有澅水因名馬水經注澅水東去臨菑城十八里居二城之間弇視西安城小而堅且藍兵又精臨菑名雖大而實易攻易以䜴翻乃敕諸校後五日㑹攻西安校户教翻藍聞之晨夜警守至期夜半弇敕諸將皆蓐食前書音義曰未起而牀蓐中食也㑹明至臨菑城䕶軍荀梁等爭之以為攻臨菑西安必救之攻西安臨菑不能救不如攻西安弇曰不然西安聞吾欲攻之日夜為備方自憂何暇救人臨菑出不意而至必驚擾吾攻之一日必㧞㧞臨菑即西安孤與劇隔絶必復亡去復扶又翻所謂擊一而得二者也若先攻西安不能卒下卒讀曰猝頓兵堅城死傷必多縱能拔之藍引軍還奔臨菑并兵合埶觀人虛實吾深入敵地後無轉輸旬月之間不戰而困矣遂攻臨菑半日拔之入據其城張藍聞之懼遂將其衆亡歸劇弇乃令軍中無得虜掠須張歩至乃取之以激怒歩歩聞大笑曰以尤來大彤十餘萬衆吾皆即其營而破之今大耿兵少於彼即就也賢曰弇況之長子故呼為大耿少詩沼翻又皆疲勞何足懼乎乃與三弟藍𢎞夀及故大彤渠帥重異等兵賢曰重姓異名重直龍翻姓譜南正重之後號二十萬至臨菑大城東將攻弇弇上書曰臣據臨菑深塹髙壘張歩從劇縣來攻疲勞飢渇欲進誘而攻之欲去隨而擊之臣依營而戰精鋭百倍以逸待勞以實擊虚旬日之間歩首可獲於是弇先出菑水上水經淄水出泰山萊蕪縣原山東北過臨菑縣東與重異遇突騎欲縱弇恐挫其鋒令歩不敢進故示弱以盛其氣乃引歸小城陳兵于内使都尉劉歆泰山太守陳俊分陳于城下陳讀曰陣下同歩氣盛直攻弇營與劉歆等合戰弇升王宫壞臺望之賢曰臨菑本齊國所都即齊王宫中有壞臺也視歆等鋒交乃自引精兵以横突歩陳于東城下大破之飛矢中弇股中竹仲翻以佩刀截之左右無知者至暮罷弇明旦復勒兵出復扶又翻下同是時帝在魯聞弇為歩所攻自往救之未至陳俊謂弇曰劇虜兵盛可且閉營休士以須上來弇曰乗輿且到乗繩證翻臣子當擊牛釃酒以待百官釃山宐翻陸徳明曰以筐􅜷酒賢曰濾也反欲以賊虜遺君父邪遺于季翻乃出兵大戰自旦及昏復大破之殺傷無數溝塹皆滿弇知歩困將退豫置左右翼為伏以待之兩旁伏兵如鳥之舒翼人定時歩果引去昏後謂之人定時伏兵起縱擊追至鉅昩水上賢曰鉅昩水名一名巨洋水在今青州壽光縣西水經註巨洋水出朱虚縣東泰山袁宏謂之鉅昧王韶之以為巨蔑北過臨朐縣東又北過臨朐縣西又東北過夀光縣西昩音莫葛翻八九十里僵尸相屬屬之欲翻收得輜重二千餘兩重直用翻兩音亮下同風俗通車一乗為一兩箱轅及輪兩兩而偶故稱兩歩還劇兄弟各分兵散去後數日車駕至臨菑自勞軍勞力到翻羣臣大㑹帝謂弇曰昔韓信破歴下以開基事見十卷髙祖四年今將軍攻祝阿以發迹此皆齊之西界功足相方而韓信襲擊已降將軍獨拔勍敵其功又難於信也勍渠京翻又田横亨酈生及田横降髙祖詔衛尉不聽為仇事見十一卷髙帝五年亨與烹同張歩前亦殺伏隆事見上三年若歩來歸命吾當詔大司徒釋其怨又事尤相類也將軍前在南陽建此大䇿謂三年冬弇從帝幸舂陵自請平齊也常以為落落難合賢曰落落猶疎闊也有志者事竟成也帝進幸劇耿弇復追張歩歩犇平夀賢曰平壽縣名屬北海郡故城在今青州北海縣復扶又翻蘇茂將萬餘人來救之茂讓歩曰以南陽兵精延岑善戰而耿弇走之事見丄三年大王奈何就攻其營旣呼茂不能待邪歩曰負負無可言者賢曰負愧也再言負者愧之甚也帝遣使告歩茂能相斬降者封為列矦降戸江翻歩遂斬茂詣耿弇軍門肉袒降弇傳詣行在所傳直戀翻而勒兵入據其城平夀城也樹十二郡旗鼔令歩兵各以郡人詣旗下衆尚十餘萬輜重七千餘兩皆罷遣歸鄉里張歩三弟各自繫所在獄詔皆赦之封歩為安丘矦地理志安丘矦國屬琅邪郡又北海郡有安丘縣宋白曰宻州有安丘縣古根牟國城漢為安丘縣有渠丘亭故莒渠丘公所居也與妻子居雒陽於是琅邪未平郡國志琅邪郡在雒陽東千五百里上徙陳俊為琅邪太守始入境盜賊皆散耿弇復引兵至城陽地理志城陽國都莒賢曰城陽故城在今沂州臨沂縣南降五校餘黨校户教翻齊地悉平振旅還京師弇為將凡所平郡四十六屠城三百未嘗挫折焉初起太學車駕還宫幸太學陸機洛陽記曰太學在洛陽城故開陽門外去宫八里講堂長十丈廣三丈稽式古典修明禮樂煥然文物可觀矣十一月大司徒伏湛免以矦霸為大司徒霸聞太原閔仲叔之名而辟之旣至霸不及政事徒勞苦而已賢曰勞其勤苦也勞音力到翻仲叔恨曰始蒙嘉命且喜且懼今見明公喜懼皆去以仲叔為不足問邪不當辟也辟而不問是失人也遂辭出投劾而去賢曰案罪曰劾自投其劾狀而去也投猶下也今冇投辭投牒之言也劾户槩翻初五原人李興隨昱姓譜隨矦之後又杜伯之𤣥孫為晉大夫食采于隨曰隨㑹朔方人田颯颯音立代郡人石鮪閔堪各起兵自稱將軍匈奴單于遣使與興等和親欲令盧芳還漢地為帝興等引兵至單于庭迎芳十二月與俱入塞都九原縣賢曰九原縣名屬五原郡故城在今勝州銀城縣掠有五原朔方雲中定襄鴈門五郡並置守令與胡兵侵苦北邊馮異治關中出入三嵗上林成都賢曰成都言歸附之多也史記曰一年成邑二年成都治直之翻人有上章言異威權至重百姓歸心號為咸陽王帝以章示異異惶懼上書陳謝詔報曰將軍之于國家義為君臣恩猶父子何嫌何疑而有懼意隗囂矜已飾智每自比西伯西伯文王也與諸將議欲稱王鄭興曰昔文王三分天下有其二尚服事殷論語載孔子之言武王八百諸矦不謀同㑹猶還兵待時武王觀兵孟津諸矦不期而㑹者八百皆曰紂可伐矣王曰汝未知天命乃還師髙帝征伐累年猶以沛公行師今令徳雖明世無宗周之祚威畧雖振未有髙祖之功而欲舉未可之事昭速速不速之速明召也禍患昭明也無乃不可乎囂乃止後又廣置職位以自尊髙鄭興曰夫中郎將太中大夫使持節官皆王者之器非人臣所當制也無益於實有損于名非尊上之意也囂病之而止賢曰病猶難也時關中將帥數上書言蜀可擊之狀數所角翻下同帝以書示囂因使擊蜀以效其信效驗也囂上書盛言三輔單弱劉文伯在邊盧芳自稱劉文伯未宐謀蜀帝知囂欲持兩端不願天下統一于是稍黜其禮正君臣之儀帝與囂書初用敵國禮今黜其禮帝以囂與馬援來歙相善數使歙援奉使往來勸令入朝朝直遥翻許以重爵囂連遣使深持謙辭言無功徳須四方平定退伏閭里帝復遣來歙説囂遣子入侍復扶又翻説輸芮翻下同囂聞劉永彭寵皆已破滅乃遣長子恂隨歙詣闕帝以為胡騎校尉封鐫羌矦胡騎校尉武帝置秩二千石賢曰鐫謂鐫鑿也鐫子全翻鄭興因恂求歸葬父母囂不聽而徙興舍益其秩禮興入見曰今為父母未葬乞骸骨為于偽翻若以増秩徙舍中更停留是以親為餌也賢曰猶釣餌也無禮甚矣將軍焉用之焉於䖍翻願留妻子獨歸葬將軍又何猜焉囂乃令與妻子俱東馬援亦將家屬隨恂歸雒陽以所將賓客猥多求屯田上林苑中帝許之將如字囂將王元以為天下成敗未可知不願專心内事説囂曰昔更始西都四方響應天下喁喁賢曰喁喁魚口向上也音魚客翻謂之太平一旦壊敗將軍幾無所厝事見上卷元年今南有子陽北有文伯江湖海岱王公十數而欲牽儒生之説賢曰儒生謂馬援説囂歸光武余謂儒生指鄭興班彪等棄千乗之基列國之賦兵車千乗乗䋲證翻羈旅危國以求萬全此循覆車之軌者也今天水完富士馬㝡彊元請以一丸泥為大王東封函谷關為于偽翻此萬世一時也若計不及此且畜養士馬畜許六翻據隘自守曠日持乆以待四方之變圗王不成其敝猶足以霸前書徐樂之言要之魚不可脱于淵神龍失埶與蚯蚓同老子曰魚不可脱于泉脱失也失泉則涸矣慎子曰騰蛇游霧飛龍乗雲雲罷霧除與蚯蚓同失其所乗故也囂心然元計雖遣子入質質音致猶負其險阨欲專制方面申屠剛諫曰愚聞人所歸者天所與人所畔者天所去也本朝誠天之所福非人力也賢曰本朝謂光武也今璽書數到數所角翻委國歸信欲與將軍共同吉凶布衣相與尚有沒身不負然諾之信況于萬乗者哉今何畏何利而乆疑若是賢曰言從漢何畏附蜀何利而乆疑不決卒有非常之變卒讀曰猝上負忠孝下愧當世夫未至豫言固常為虚及其已至又無所及是以忠言至諫希得為用誠願反覆愚老之言囂不納于是游士長者稍稍去之王莽末交趾諸郡閉境自守賢曰交趾郡今交州縣也南濵大海輿地志云其夷足大指開析兩足並立則相交應劭曰始開北方遂交於南方為子孫基阯地余按武帝元鼎六年置交趾州治廣信時已開朔方遂交於南方為子孫基趾也七郡謂南海蒼梧鬱林合浦交趾九真日南並屬交州余謂唐之交州峯州皆漢交趾郡之地固不可指唐交趾一縣而言也岑彭素與交趾牧鄧讓厚善與讓書陳國家威徳又遣偏將軍屈充移檄江南班行詔命屈其勿翻於是讓與江夏太守矦登武陵太守王堂長沙相韓福桂陽太守張隆零陵太守田翕蒼梧太守杜穆交趾太守錫光等相率遣使貢獻郡國志江夏郡在雒陽南千五百里武陵郡在雒陽南二千一百里長沙郡在雒陽南二千八百里桂陽郡在雒陽南三千九百里零陵郡在雒陽南三千三百里蒼梧郡在雒陽南六千四百一十里交趾郡在雒陽南一萬一千里夏戸雅翻守式又翻下同錫姓光名悉封為列矦錫光者漢中人在交趾教民夷以禮義帝復以宛人任延為九眞太守郡國志九真郡在雒陽南萬一千五百八十里復扶又翻任音壬延教民耕種嫁娶故嶺南華風始于二守焉是嵗詔徴處士太原周黨㑹稽嚴光等至京師處昌吕翻㑹古外翻黨入見伏而不謁凡朝謁者必拜稽首以姓名自言見賢遍翻自陳願守所志博士范升奏曰伏見太原周黨東海王良山陽王成等蒙受厚恩使者三聘乃肯就車及陛見帝廷見賢遍翻黨不以禮屈伏而不謁偃蹇驕悍同時俱逝黨等文不能演義武不能死君釣采華名庶幾三公之位幾居希翻臣願與坐雲臺之下續漢志曰雲臺周家之所造圖書術籍珍玩寳怪皆藏焉考試圗國之道不如臣言伏虚妄之罪而敢私竊虚名誇上求髙皆大不敬書奏詔曰自古明王聖主必有不賔之士伯夷叔齊不食周粟太原周黨不受朕禄亦各有志焉其賜帛四十匹罷之帝少與嚴光同遊學少詩照翻及即位以物色訪之賢曰以其形貌求之得于齊國累徴乃至拜諫議大夫不肯受去耕釣於富春山中地理志富春縣屬㑹稽郡賢曰今杭州富陽縣本漢富春縣避晉簡文帝鄭太后諱改曰富陽以夀終於家王良後歴沛郡太守大司徒司直在位恭儉布被瓦器妻子不入官舍後以病歸一嵗復徴復扶又翻至滎陽疾篤不任進道言以疾篤稽留道上不進于行也任音壬過其友人友人不肯見曰不有忠言奇謀而取大位何其往來屑屑不憚煩也揚雄方言曰屑屑不安也秦晉曰屑屑郭景純曰往來貌遂拒之良慙自後連徴不應卒于家卒子恤翻元帝之世莎車王延嘗為侍子京師慕樂中國樂音洛及王莽之亂匈奴畧有西域唯延不肯附屬常敕諸子當世奉漢家不可負也延卒子康立康率旁國拒匈奴旁國猶鄰國也擁衛故都䕶吏士妻子千餘口王莽之亂西域攻沒都䕶其吏士妻子皆不得還檄書河西問中國動静竇融乃承制立康為漢莎車建功懷徳王西域大都尉五十五國皆屬焉資治通鑑卷四十一
