front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷二百一宋司馬光撰胡三省音注唐紀十七起𤣥黓閹茂八月盡上章敦牂凡八年有奇高宗天皇大聖大𢎞孝皇帝中之上龍朔二年八月壬寅以許敬宗爲太子少師同東西臺三品知西臺事同中書門下三品知中書事九月戊寅初令八品九品衣碧衣於既翻冬十月丁酉上幸驪山温湯太子監國監古衘翻丁未還宫庚戌西臺侍郎陜人上官儀同東西臺三品西臺侍郎即中書侍郎陜失冉翻癸丑詔以四年正月有事於泰山仍以來年二月幸東都左相許圉師之子奉輦直長自然遊獵犯人田奉輦直長即尚輦直長殿中六局直長正七品龍朔改尚輦局爲奉輦局相息亮翻長知兩翻田主怒自然以鳴鏑射之射而亦翻圉師杖自然一百而不以聞田主詣司憲訟之司憲大夫楊德裔不爲治治直之翻西臺舎人袁公瑜遣人易姓名上封事告之西臺舎人即中書舎人為于偽翻上時掌翻上曰圉師爲宰相侵陵百姓匿而不言豈非作威作福圉師謝曰臣備位樞軸以直道事陛下不能悉允衆心故爲人所攻訐訐居謁翻至於作威福者或手握彊兵或身居重鎮臣以文吏奉事聖明惟知閉門自守何敢作威福上怒曰汝恨無兵邪許敬宗曰人臣如此罪不容誅遽令引出詔特免官考異曰舊本紀十一月辛未圉師下獄新本紀十一月辛未圉師貶䖍州刺史今據實錄辛未免官乆之貶䖍州刺史舊紀貶䖍州刺史在三年二月新本紀誤癸酉立皇子旭輪爲殷王旭輪後改名旦是為睿宗十二月戊申詔以方討高麗百濟麗力知翻河北之民勞於征役其封泰山幸東都並停䫻海道總管蘇海政䫻越筆翻受詔討龜兹龜兹音丘慈敕興㫺亡繼徃絶二可汗發兵與之俱可從刋入聲汗音寒至興㫺亡之境繼徃絶素與興㫺亡有怨事見上卷顯慶二年注密謂海政曰彌射謀反請誅之阿史那彌射是為興昔亡可汗時海政兵纔數千集軍吏謀曰彌射若反我輩無噍類噍才笑翻不如先事誅之先悉薦翻乃矯稱敕令大總管齎帛數萬段賜可汗及諸酋長興㫺亡帥其徒受賜海政悉收斬之其䑕尼施抜塞幹兩部亡走䑕尼施啜咄陸五部之一也抜塞幹俟斤弩失畢五部之一也酋慈由翻長知兩翻帥讀曰率尼女夷翻海政與繼徃絶追討平之軍還至踈勒南弓月部復引吐蕃之衆來欲與唐兵戰海政以師老不敢戰以軍資賂吐蕃約和而還由是諸部落皆以興昔亡爲寃各有離心繼往絶尋卒復扶又翻卒子恤翻十姓無主有阿史那都支及李遮匐収其餘衆附於吐蕃為都支遮匐連兵反張本是歲西突厥宼庭州刺史來濟將兵拒之厥九勿翻將即亮翻謂其衆曰吾乆當死幸䝉存全以至今日當以身報國遂不釋甲胄赴敵而死三年春正月左武衞將軍鄭仁泰討鐵勒叛者餘種悉平之種章勇翻乙酉以李義府爲右相右相中書令也仍知選事選須絹翻二月徙燕然都䕶府於回紇更名瀚海都䕶徙故瀚海都䕶於雲中古城更名雲中都䕶燕然都䕶置於貞觀二十一年見一百九十八卷瀚海都䕶置於永徽元年見一百九十九卷燕因肩翻更工衡翻以磧爲境磧北州府皆𨽻瀚海磧南𨽻雲中雲中都䕶府治金河即秦漢雲中舊城東北至朔州三百七十里麟德元年更名單于大都䕶府杜佑曰單于都䕶府南至榆林郡百二十里東南到馬邑郡三百五十里磧七逆翻三月許圉師再貶䖍州刺史䖍州在京師東南四千一十七里至東都三千四百里楊德裔以阿黨流庭州圉師子文思自然並免官右相河間郡公李義府典選選須絹翻恃中宮之勢專以賣官爲事銓綜無次怨讟盈路上頗聞之從容謂義府曰卿子及壻頗不謹多爲非法我尚爲卿掩覆卿宜戒之從千容翻爲于偽翻覆敷又翻義府勃然變色頸頰俱張張知亮翻曰誰告陛下上曰但我言如是何必就我索其所從得邪索山客翻義府殊不引咎緩步而去上由是不恱望氣者杜元紀謂義府所居第有獄氣宜積錢二十萬緡以厭之厭於協翻義府信之聚歛尤急歛力贍翻義府居母䘮朔望給哭假假古訝翻輙㣲服與元紀出城東登古塜候望氣色或告義府窺覘災眚隂有異圖覘丑亷翻又丑艶翻眚所景翻又遣其子右司議郎津召長孫無忌之孫延受其錢七百緡除延司津監唐東宫司議郎四人正六品上掌啟奏記注龍朔改司議郎為左司議郎太子舎人為右司議郎漢官有都水長屬主爵掌諸池沼後改為使者後漢改為河隄謁者晉置都水臺有使者一人掌舟檝之事梁改為太舟卿北齊亦曰都水臺隋改為都水監唐因之貞觀改為使者從六品龍朔元年改為司津監掌川澤津梁之政令右金吾倉曹參軍楊行頴告之夏四月乙丑下義府獄下遐嫁翻遣司刑太常伯劉祥道與御史詳刑共鞫之司刑太常伯即刑部尚書詳刑大理也唐自永徽以後大獄以尚書刑部御史臺大理寺官雜按謂之三司仍命司空李勣監焉監古衘翻事皆有實戊子詔義府除名流嶲州津除名流振州諸子及壻並除名流庭州朝野莫不稱慶嶲音髓朝直遥翻或作河間道行軍元帥劉祥道破銅山大賊李義府露布李義府河間人故云然帥所類翻牓之通衢義府多取人奴婢及敗各散歸其家故其露布云混奴婢而亂放各識家而競入此姑述時人快義府之得罪而有是通鑑因采而誌之以為世鑒學者為文類有所祖漢髙帝為太上皇營新豐後人誌其事其辭云混雞犬而亂放各識家而競入此語所祖有自來矣乙未置鷄林大都督府於新羅國以金法敏為之丙午蓬萊宫含元殿成上始移仗居之更命故宫曰西内故宫謂太極宫自武德以來人主居之自是以後謂之西内更工衡翻戊申始御紫宸殿聽政蓬萊宫正殿曰含元殿含元之後曰宣政殿宣政殿北曰紫宸門内有紫宸殿即内衙之正殿五月壬午栁州蠻酋吳君解反栁州漢渾中縣地隋置馬平縣唐武徳四年置南昆州貞觀八年改曰栁州遣冀州長史劉伯英右武衛將軍馮士翽𤼵嶺南兵討之翽呼外翻吐蕃與吐谷渾互相攻各遣使上表論曲直更來求援吐從暾入聲谷音浴使疏吏翻上時掌翻更工衡翻迭也上皆不許吐谷渾之臣素和貴有罪逃奔吐蕃具言吐谷渾虚實吐蕃發兵擊吐谷渾大破之吐谷渾可汗曷鉢與𢎞化公主帥數千帳弃國走依涼州請徙居内地唐㑹要曰吐谷渾自永嘉之末始西度洮水建國於群羌之故地龍朔三年為吐蕃所滅凡三百五十年帥讀曰率下同上以涼州都督鄭仁泰為青海道行軍大總管帥右武衛將軍獨孤卿雲辛文陵等分屯涼鄯二州以備吐蕃鄯時戰翻涼鄯相去五百八十里六月戊申又以左武衛大將軍蘇定方為安集大使節度諸軍為吐谷渾之援吐蕃禄東賛屯青海遣使者論仲琮入見吐蕃立國之初有大論小論以統國事後因以為貴姓見賢遍翻表陳吐谷渾之罪且請和親上不許遣左衛郎將劉文祥使於吐蕃降璽書責讓之將即亮翻璽斯氏翻秋八月戊申上以海東累歲用兵百姓困於征調調徒弔翻士卒戰溺死者甚衆溺奴狄翻詔罷三十六州所造船遣司元太常伯竇德𤣥等司元太常伯即戸部尚書分詣十道問人疾苦黜陟官吏德𤣥毅之曽孫也竇毅太穆皇后之父九月戊午熊津道行軍總管右威衛將軍孫仁師等破百濟餘衆及倭兵於白江㧞其周畱城倭烏禾翻初劉仁願劉仁軌既克眞峴城克眞峴城見上卷二年詔孫仁師將兵浮海助之將即亮翻下同百濟王豐南引倭人以拒唐兵仁師與仁願仁軌合兵勢大振諸將以加林城水陸之衝欲先攻之仁軌曰加林險固急攻則傷士卒緩之則曠日持乆周留城虜之巢穴羣凶所聚除惡務本書㤗誓之言宜先攻之若克周留諸城自下於是仁師仁願與新羅王法敏將陸軍以進仁軌與别將杜爽扶餘隆將水軍及糧船自熊津入白江以㑹陸軍同趣周留城趣七喻翻遇倭兵於白江口四戰皆㨗焚其舟四百艘烟炎灼天艘蘇遭翻炎讀曰燄海水皆赤百濟王豐脫身奔髙麗王子忠勝忠志等帥衆降帥讀曰率下之帥皆帥降戸江翻下同百濟盡平唯别帥遲受信據任存城不下帥所類翻尉紆勿翻初百濟西部人黑齒常之長七尺餘驍勇有謀略長直亮翻驍堅堯翻仕百濟為達率兼郡將猶中國刺史也新羅官有十六品左平一品達率二品五方各有方領一人以達率為之方有十郡郡有將三人以德率為之德率四品百濟置官葢與新羅略同也率所類翻蘇定方克百濟常之帥所部隨衆降定方縶其王及太子縱兵刧掠壯者多死常之懼與左右十餘人遁歸本部收集亡散保任存山結柵以自固旬月間歸附者三萬餘人定方遣兵攻之常之拒戰唐兵不利常之復取二百餘城復扶又翻定方不能克而還還從宣翻又如字常之與别部將沙吒相如沙吒夷人複姓吒陟加翻各據險以應福信百濟既敗皆帥其衆降劉仁軌使常之相如自將其衆取任存城仍以糧仗助之孫仁師曰此屬獸心何可信也仁軌曰吾觀二人皆忠勇有謀敦信重義但向者所託未得其人今正是其感激立效之時不用疑也遂給其糧仗分兵隨之攻㧞任存城遲受信弃妻子奔髙麗詔劉仁軌將兵鎮百濟召孫仁師劉仁願還百濟兵火之餘比屋彫殘比毗必翻又毗至翻僵尸滿野仁軌始命瘞骸骨籍戸口理村聚署官長通道塗立橋梁補隄堰復陂塘課耕桑賑貧乏養孤老立唐社禝頒正朔及廟諱卒如仁軌之志所謂有志者事竟成也僵居良翻瘞於計翻長知兩翻賑津忍翻百濟大恱闔境各安其業然後修屯田儲糗粮訓士卒以圖高麗糗去九翻劉仁願至京師上問之曰卿在海東前後奏事皆合機宜復有文理復扶又翻卿本武人何能如是仁願曰此皆劉仁軌所為非臣所及也上恱加仁軌六階勲有級官有階正除帶方州刺史為築第長安厚賜其妻子遣使齎璽書勞勉之為于偽翻使疏吏翻勞力到翻上官儀曰仁軌遭黜削而能盡忠黜削謂白衣從軍自効也仁願秉節制而能推賢皆可謂君子矣冬十月辛巳朔詔太子毎五日於光順門内視諸司奏事唐六典大明宫紫宸殿内朝正殿也殿之南面曰紫宸門左曰崇明門右曰光順門其事之小者皆委太子决之十二月庚子詔改來年元壬寅以安西都䕶髙賢為行軍總管將兵擊弓月以救于闐是歲大食擊波斯拂菻破之拂菻古大秦國也居西海上一曰海西國去京師四萬里北直突厥可薩部西瀕海東南接波斯杜佑曰大秦前漢犂靬國也菻力錦翻又力鴆翻類篇曰佛菻南侵婆羅門吞滅諸胡勝兵四十餘萬勝音升麟德元年去年絳州麟見又含元殿前麟趾見於是改元春正月甲子改雲中都䕶府為單于大都䕶府以殷王旭輪為單于大都䕶單音蟬初李靖破突厥見一百九十三卷太宗貞觀四年厥九勿翻遷三百帳於雲中城阿史德氏為之長長知兩翻至是部落漸衆阿史德氏詣闕請如胡法立親王為可汗以統之上召見謂曰今之可汗古之單于也故更為單于都䕶府更工衡翻改也而使殷王遥領之二月戊子上行幸萬年宫永徽元年改九成宫為萬年宫夏四月壬子衛州刺史道孝王元慶薨丙午魏州刺史郇公孝協坐贓賜死司宗卿隴西王博义奏孝協父叔良死王事司宗卿即宗丘卿叔良太祖之孫髙祖時叔良擊突厥中流矢薨郇音荀孝協無兄弟恐絶嗣上曰畫一之法不以親疎異制漢書云蕭何為法講若畫一注云畫一言整齊也茍害百姓雖皇太子亦所不赦孝協有一子何憂乏祀乎孝協竟自盡於第五月戊申朔遂州刺史許悼王孝薨孝上子也後宫所生乙卯於昆明之弄棟川置姚州都督府劉昫曰漢益州郡之雲南縣古滇國後漢屬永昌郡蜀劉氏分永昌為建寜郡又分永昌建寜置雲南郡而治于弄棟晉改為晋寜郡又置寜州武德四年安撫大使李英以此川人多姓姚故置姚州今陞置都督府管州三十三秋七月丁未朔詔以三年正月有事於岱宗八月丙子車駕還京師幸舊宅舊宅帝為晋王時所居也留七日壬午還蓬萊宫丁亥以司列太常伯劉祥道兼右相司列太常伯即吏部尚書大司憲竇德𤣥為司元太常伯檢校左相太府憲即御史大夫司元太常伯即戸部尚書左相即侍中冬十月庚辰檢校熊津都督劉仁軌上言上時掌翻臣伏覩所存戌兵疲羸者多勇徤者少羸倫為翻少詩沼翻衣服貧敝唯思西歸無心展效臣問以徃在海西見百姓人人應募爭欲從軍或請自辦衣糧謂之義征何為今日士卒如此咸言今日官府與曩時不同人心亦殊曩時東西征役身没王事並䝉敕使弔祭使疏吏翻追贈官爵或以死者官爵囘授子弟凡度遼海者皆賜勲一轉自顯慶五年以來征人屢經度海官不記錄其死者亦無人誰何誰何問也問其為誰縁何而死也州縣毎發百姓為兵其壯而富者行錢參逐皆亡匿得免謂州縣官發人為兵其吏卒之參陪隨逐者富民行錢與之相為掩蔽得以亡匿按元和四年御史臺奏比來常參官入光範門及中書省所將參從人數頗多參從猶參逐也貧者身雖老弱被發即行頃者破百濟及平壤苦戰破百濟見上卷顯慶五年平壤苦戰見龍朔二年被皮義翻當時將帥號令許以勲賞無所不至及達西岸惟聞枷鏁推禁奪賜破勲州縣追呼無以自存公私困弊不可悉言以是昨發海西之日已有逃亡自殘者非獨至海外而然也又本因征役授勲級以為榮寵而比年出征皆使勲官挽引比毗至翻挽引謂挽引舟車勞苦與白丁無殊百姓不願從軍率皆由此臣又問曩日士卒留鎮五年尚得支濟今爾等始經一年何為如此單露咸言初發家日惟令備一年資裝今已二年未有還期臣檢校軍士所留衣今冬僅可充事來秋以往全無凖擬陛下留兵海外欲殄滅髙麗百濟髙麗舊相黨援倭人雖逺亦共為影響若無鎮兵還成一國今既資戍守又置屯田所藉士卒同心同德而衆有此議何望成功自非有所更張厚加慰勞董仲舒曰琴瑟不調必改而更張之更工衡翻勞力到翻明賞重罸以起士心若止如今日以前處置恐師衆疲老立效無日逆耳之事或無人為陛下盡言處昌吕翻為于偽翻故臣披露肝膽昧死奏陳上深納其言遣右威衛將軍劉仁願將兵渡海以代舊鎮之兵將即亮翻仍敕仁軌俱還仁軌謂仁願曰國家懸軍海外欲以經略髙麗其事非易易以豉翻今收穫未畢而軍吏與士卒一時代去軍將又歸將即亮翻下軍將同夷人新服衆心未安必將生變不如且留舊兵漸令收穫辦具資糧節級遣還節級猶今人言節次也軍將且留鎮撫未可還也仁願曰吾前還海西大遭䜛謗云吾多留兵衆謀據海東幾不免禍幾居希翻今日唯知准敕准與凖同本朝㓂凖為相省吏避其名凡文書準字皆去十後遂因而不改豈敢擅有所為仁軌曰人臣茍利於國知無不為豈恤其私乃上表陳便宜上時掌翻自請留鎮海東上從之仍以扶餘隆為熊津都尉考異曰實録作熊津都督按時劉仁軌檢校熊津都督豈可復以隆為之明年實録稱熊津都尉扶餘隆與金法敏盟今從之使招輯其餘衆初武后能屈身忍辱奉順上意故上排羣議而立之及得志專作威福上欲有所為動為后所制上不勝其忿有道士郭行眞出入禁中嘗為厭勝之術勝音升厭於協翻又於琰翻宦者王伏勝發之上大怒密召西臺侍郎同東西臺三品上官儀議之儀因言皇后專恣海内所不與請廢之上意亦以為然即命儀草詔左右奔告於后后遽詣上自訴詔草猶在上所上羞縮不忍復待之如初復扶又翻猶恐后怨怒因紿之曰我初無此心皆上官儀教我儀先為陳王諮議與王伏勝俱事故太子忠忠自陳王立為皇太子王府諮議參軍正五品上掌訏謨左右后於是使許敬宗誣奏儀伏勝與忠謀大逆十二月丙戍儀下獄下遐嫁翻與其子庭芝王伏勝皆死籍没其家戊子賜忠死於流所顯慶五年忠徙黔州右相劉祥道坐與儀善罷政事為司禮太常伯司禮太常伯即禮部尚書左肅機鄭欽泰等左肅機即尚書左丞朝士流貶者甚衆皆坐與儀交通故也朝直遥翻自是上毎視事則后垂簾於後政無大小皆與聞之與讀曰預天下大權悉歸中宫黜陟殺生决於其口天子拱手而已中外謂之二聖萬考異曰唐歴群臣朝謁方表奏皆呼為二聖帝坐于東間后坐于西間后隨其愛憎生殺在口按武后雖悍戾豈得高宗尚在與高宗對坐受群臣朝謁乎恐不至此今從實錄太子右中䕶檢校西臺侍郎樂彥瑋龍朔改左右庶子為左右中䕶西臺侍郎孫處約並同東西臺三品二年春正月丁卯吐蕃遣使入見請復與吐谷渾和親見賢遍翻復扶又翻仍求赤水地畜牧即河源之赤水也本吐谷渾地畜吁玉翻上不許二月壬午車駕發京師丁酉至合璧宫上語及隋煬帝謂侍臣曰煬帝拒諫而亡朕常以為戒虛心求諫而竟無諫者何也李勣對曰陛下所為盡善羣臣無得而諫禇遂良韓瑗之死不唯拒諫且殺諫者矣羣臣誰敢復諫乎李勣獻諛以茍利禄而不知凶于其家三月甲寅以兼司戎太常伯姜恪同東西臺三品恪寳誼之子也司戎太常伯即兵部尚書姜寳誼從髙祖起兵于太原辛未東都乾元殿成乾元殿洛陽宫正殿也武后垂拱四年毁為明堂閏月壬申朔車駕至東都踈勒弓月引吐蕃侵于闐敕西州都督崔知辯左武衞將軍曹繼叔將兵救之將即亮翻川考異曰實錄作西都督按於時未有西川之名必西州也夏四月戊辰左侍極陸敦信龍朔改左右散騎常侍為左右侍極檢校右相句斷西臺侍郎孫處約太子右中䕶檢校西臺侍郎樂彦瑋並罷政事處昌吕翻祕閣郎中李淳風龍朔改太史局為秘閣局令為郎中丞為郎以傅仁均戊寅厯推步浸踈乃增損劉焯皇極厯戊寅厯始行見一百八十七巻高祖武德二年隋時劉焯造甲子元厯謂之皇極厯為張賓所擯不得行焯之若翻更撰麟德厯五月辛卯行之更工衡翻秋七月己丑兖州都督鄧康王元裕薨上命熊津都尉扶餘隆與新羅王法敏釋去舊怨去羌吕翻八月壬子同盟于熊津城劉仁軌以新羅百濟耽羅倭國使者浮海西還耽羅國一曰儋羅居新羅武州南島上初附百濟後附新羅會祠泰山高麗亦遣太子福男來侍祠冬十月癸丑皇后表稱封禪舊儀祭皇地祗太后昭配而令公卿行事禮有未安至日妾請帥内外命婦奠獻内命婦自三妃至采女以備古者三夫人九嬪二十七世婦八十一御妻又有六尚二十四司二十四典二十四掌龍朔二年又置賛德宣儀承閨承㫖衛仙供奉侍櫛侍巾亦分為九品皆内官也外命婦皇姑封大長公主皇姊妹封長公主皇女封公主皇太子之女封郡主王之女封縣主王母妻為妃一品及國公母妻為國夫人三品以上母妻為郡夫人五品勲官三品封母妻為縣君散官並同職事勲官四品封母妻為鄉君其母並加太字各視其夫子之品詔禪社首以皇后為亞獻兖州傳城縣有社首山越國太妃燕氏為終獻燕氏越王貞之母葢太宗妃嬪此時唯燕氏在也燕因肩翻壬戍詔封禪壇所設上帝后上位先用藳秸陶匏等秸古黠翻並宜改用茵褥罍爵其諸郊祀亦宜凖此又詔自今郊廟享宴文舞用功成慶善之樂武舞用神功破陳之樂陳讀曰陣丙寅上發東都從駕文武儀仗數百里不絶從才用翻列營置幕彌亘原野東自髙麗西至波斯烏長諸國自吐火羅踰五種至婆羅覩邏北踰山行六百里得烏萇國長讀曰萇朝會者各帥其屬扈從穹廬毳幕牛羊駝馬填咽道路時比歳豐稔朝直遥翻帥讀曰率從才用翻比毗至翻米斗至五錢麥豆不列于市十一月戊子上至濮陽濮陽顓頊之墟春秋衛成公自楚丘徙此漢為濮陽縣帶東郡晉分為濮陽郡隋為縣屬滑州唐屬濮州濮慱木翻竇德𤣥騎從騎奇寄翻從才用翻上問濮陽謂之帝丘何也德𤣥不能對許敬宗自後躍馬而前曰昔顓頊居此故謂之帝丘上稱善敬宗退謂人曰大臣不可以無學吾見德𤣥不能對心實羞之德𤣥聞之曰人各有能有不能吾不強對以所不知此吾所能也強其兩翻李勣曰敬宗多聞信美矣德𤣥之言亦善也夀張人張公藝九世同居夀張縣前漢曰夀良屬東郡光武改夀張屬東平國隋屬濟州唐屬鄆州齊隋唐皆旌表其門上過夀張幸其宅問所以能共居之故公藝書忍字百餘以進上善之賜以縑帛十二月丙午車駕至齊州留十日丙辰發靈巖頓至泰山下有司於山南為圎壇山上為登封壇社首山上為降禪方壇乾封元年春正月戊辰朔上祀昊天上帝于泰山南己巳登泰山封玉牒上帝冊藏以玉匱配帝冊藏以金匱皆纒以金繩封以金泥印以玉璽藏以石䃭璽斯氏翻䃭古禫翻庚午降禪于社首祭皇地祗上初獻畢執事者皆趨下宦者執帷皇后升壇亞獻帷帟皆以錦繡為之周禮注在旁曰帷在上曰帟帟幄中座上承塵也帟音亦酌酒實爼豆登歌皆用宫人壬申上御朝覲壇受朝賀朝直遥翻下同赦天下改元文武官三品已上賜爵一等四品已下加一階先是階無泛加皆以勞考叙進至五品三品仍奏取進止先悉薦翻至是始有泛階比及末年服緋者滿朝矣比必利翻時大赦惟長流人不聽還李義府憂憤發病卒龍朔三年李義府流嶲州自義府流竄朝士日憂其復入及聞其卒衆心乃安復扶又翻卒子恤翻丙戍車駕發泰山辛卯至曲阜曲阜魯侯伯禽所都應劭云曲阜在魯城中委曲長七八里隋始置曲阜縣屬兖州贈孔子太師以少牢致祭少詩照翻癸未至亳州謁老君廟亳州谷陽縣漢苦縣也有老子祠是年改為真源縣亳州至東都八百九十八里上尊號曰太上𤣥元皇帝丁丑至東都留六日甲申幸合璧宫夏四月甲辰至京師東都至京師八百五十里謁太廟庚戌左侍極兼檢校右相陸敦信以老疾辭職拜大司成兼左侍極罷政事大司成即國子祭酒五月庚寅鑄乾封泉寳錢一當十俟期年盡廢舊錢期讀曰朞高麗泉葢蘇文卒長子男生代為莫離支卒子恤翻長知兩翻初知國政出廵諸城使其弟男建男産知留後事或謂二弟曰男生惡二弟之逼惡烏路翻意欲除之不如先為計二弟初未之信又有告男生者曰二弟恐兄還奪其權欲拒兄不納男生潜遣所親往平壤伺之伺相吏翻二弟收掩得之乃以王命召男生男生懼不敢歸男建自為莫離支發兵討之男生走保别城使其子獻誠詣闕求救六月壬寅以左驍衞大將軍契苾何力為遼東道安撫大使將兵救之以獻誠為右武衞將軍使為鄉導契欺訖翻苾毗必翻大使䟽吏翻將即亮翻鄉讀曰嚮又以右金吾衞將軍龎同善營州都督高侃為行軍摠管同討髙麗秋七月乙丑朔徙殷王旭輪為豫王以大司憲兼檢校太子左中䕶劉仁軌為右相初仁軌為給事中按畢正義事事見上巻顯慶元年李義府怨之出為青州刺史會討百濟仁軌當浮海運糧時未可行海行非遇順風不可義府督之遭風失船丁夫溺死甚衆命監察御史袁異式往鞫之溺奴狄翻監古衘翻義府謂異式曰君能辦事不憂無官異式至謂仁軌曰君與朝廷何人為讐宜早自為計仁軌曰仁軌當官不職國有常刑公以法斃之無所逃命若使遽自引决以快讐人竊所未甘乃具獄以聞異式將行仍自掣其鎻恐鎻不入簧行後得私開之也掣昌列翻獄上上時掌翻義府言於上曰不斬仁軌無以謝百姓舍人源直心曰海風暴起非人力所及上乃命除名以白衣從軍自效事見上巻顯慶五年義府又諷劉仁願使害之仁願不忍殺及為大司憲異式懼不自安仁軌瀝觴告之曰仁軌若念疇昔之事有如此觴仁軌既知政事異式尋遷詹事丞詹事丞正六品上時論紛然仁軌聞之遽薦為司元大夫司元大夫即户部郎中監察御史杜易簡謂人曰易以䜴翻斯所謂矯枉過正矣八月辛丑司元太常伯兼檢校左相竇德𤣥薨初武士彠娶相里氏彠一虢翻相息亮翻生男元慶元爽又娶楊氏生三女長適越王府法曹賀蘭越石長知兩翻次皇后次適郭孝慎士彠卒元慶元爽及士彠兄子惟良懐運皆不禮於楊氏楊氏深衘之越石孝慎及孝慎妻並早卒越石妻生敏之及一女而寡后既立楊氏號榮國夫人越石妻號韓國夫人唐制國夫人位一品惟良自始州長史超遷司衞少卿司衛少卿即衛尉少卿懐運自瀛州長史遷淄州刺史元慶自右衞郎將為宗正少卿此時已改宗正為司宗元爽自安州户曹累遷少府少監此時已改少府監為内府監榮國夫人嘗置酒謂惟良等曰頗憶疇昔之事乎今日之榮貴復何如對曰惟良等幸以功臣子弟早登宦籍揣分量才不求貴逹豈意以皇后之故曲荷朝恩夙夜憂懼不為榮也復扶又翻分扶問翻荷下可翻朝直遥翻榮國不恱皇后乃上疏請出惟良等為逺州刺史上時掌翻外示謙抑實惡之也惡烏路翻下后惡同於是以惟良檢校始州刺史元慶為龍州刺史元爽為濠州刺史龍州古江油秦漢曹魏為無人之地鄧艾伐蜀由隂平景谷行無人之地七百里始至江油晉置隂平郡於此置平武縣至梁有楊李二姓大豪分據其地後魏平蜀置龍州濠州漢鍾離縣地晉安帝分置鍾離郡梁置北徐州後齊曰西楚州隋開皇二年改曰豪州唐曰濠州始州至京師一千六百六十二里至東都二千五百六十里龍州至京師二千六百六十里東都三千一百一十五里豪州至京師二千一百五十里東都一千三百一十三里元慶至州以憂卒卒子恤翻下同元爽坐事流振州而死韓國夫人及其女以后故出入禁中皆得幸於上韓國尋卒其女賜號魏國夫人上欲以魏國為内職心難后未决后惡之會惟良懐運與諸州刺史詣泰山朝覲從至京師惟良等獻食朝直遥翻從才用翻楊考異曰舊傳云后諷上幸氏宅惟良等獻食今從實錄后密置毒醢中使魏國食之暴卒因歸罪於惟良懐運丁未誅之改其姓為蝮氏懐運兄懐亮早卒其妻善氏尤不禮於榮國坐惟良等沒入掖庭榮國令后以他事束棘鞭之肉盡見骨而死九月龎同善大破高麗兵泉男生帥衆與同善合詔以男生為特進遼東大都督兼平壤道安撫大使封𤣥莵郡公帥讀曰率使疏吏翻下同莵同都翻戊子金紫光禄大夫致仕廣平宣公劉祥道薨子齊賢嗣齊賢為人方正上甚重之為晉州司馬將軍史興宗嘗從上獵苑中因言晉州産佳鷂劉齊賢今為司馬請使捕之上曰劉齊賢豈捕鷂者邪鷂弋照翻卿何以此待之冬十二月己酉以李勣為遼東道行軍大摠管以司列少常伯安陸郝處俊副之安陸縣漢屬江夏郡宋分屬安陸郡隋唐屬安州處昌吕翻以擊高麗龎同善契苾何力並為遼東道行軍副大摠管兼安撫大使如故其水陸諸軍摠管并運粮使竇義積獨孤卿雲郭待封等並受勣處分處昌吕翻分扶問翻河北諸州租賦悉詣遼東給軍用待封孝恪之子也郭孝恪事太宗戰死於龜兹勣欲與其壻京兆杜懐恭偕行以求勲效懐恭辭以貧勣贍之復辭以無奴馬贍昌艶翻下同復扶又翻又贍之懐恭辭窮乃亡匿岐陽山中謂人曰公欲以我立法耳勣聞之流涕曰杜郎疎放今人猶呼壻為郎此或有之乃止二年春正月上耕藉田有司進耒耜加以彫餙上曰耒耜農夫所執豈宜如此之麗命易之耒盧對翻既而耕之九推乃止耕籍之制月令及鄭𤣥注周禮皆云天子三推盧植注禮記曰天子耕籍一發九推耒此用盧說也推吐雷翻自行乾封泉寳錢榖帛踊貴商賈不行賈音古癸未詔罷之二月丁酉涪陵悼王愔薨愔上弟也涪音浮愔於今翻辛丑復以萬年宫為九成宫永徽一年改九成宫為萬年宫復扶又翻又如字生羌十二州為吐蕃所破三月戊寅悉罷之上屢責侍臣不進賢衆莫敢對司列少常伯李安期對曰天下未嘗無賢亦非羣臣敢蔽賢也司列少常伯即吏部侍郎少始照翻比來公卿有所薦引為讒者已指為朋黨滯淹者未獲伸而在位者先獲辠是以各務杜口耳陛下果推至誠以待之其誰不願舉所知此在陛下非在羣臣也上深以為然安期百藥之子也李百藥德林之子比毗至翻夏四月乙卯西臺侍郎楊𢎞武戴至德正諫大夫兼東臺侍郎李安期東臺舍人昌樂張文瓘司列少常伯兼正諫大夫河北趙仁本並同東西臺三品龍朔改給事中為東臺舍人諫議大夫為正諫夫夫樂音洛𢎞武素之弟子楊素仕隋貴顯至德胄之兄子也戴胄相太宗時造蓬萊上陽合璧等宫上陽宫在洛陽宫城之西南隅南臨洛水西距榖水東即宫城北連禁苑宫内正門正殿皆東向正門曰提象正殿曰觀風其内别殿亭觀九所上陽之西隔榖水有西上陽宫虹梁跨榖行幸往來頻征伐四夷廐馬萬匹倉庫漸虛張文瓘諫曰隋鑒不逺願勿使百姓生怨上納其言减廐馬數千匹秋八月己丑朔日有食之辛亥東臺侍郎同東西臺三品李安期出為荆州長史荆州京師東南一千七百三十里至東都一千三百三十五里宋白曰荆州秦南郡地漢為臨江國江左置荆州以為重鎮擬周之分陜唐為大都督府九月庚申上以乆疾命太子𢎞監國監古衘翻辛未李勣㧞高麗之新城使契苾何力守之勣初度遼謂諸將曰新城高麗西邊要害不先得之餘城未易取也易以豉翻遂攻之城人師夫仇等縳城主開門降降戶江翻勣引兵進擊一十六城皆下之龎同善高侃尚在新城泉男建遣兵襲其營左武衞將軍薛仁貴擊破之侃進至金山與高麗戰不利高麗乗勝逐北仁貴引兵横擊大破之斬首五萬餘級新書作斬馘五千㧞南蘇木底蒼巖三城三城後皆置為州與泉男生軍合郭待封以水軍自别道趣平壤勣遣别將馮師本載糧仗以資之趣七喻翻將即亮翻師本船破失期待封軍中飢窘欲作書與勣恐為虜所得知其虗實乃作離合詩以與勣離合詩離析字畫合之成文以見其意勣怒曰軍事方急何以詩為必斬之行軍管記通事舍人元萬頃為釋其義管記掌軍中書檄為于偽翻勣乃更遣粮仗赴之萬頃作檄髙麗文曰不知守鴨綠之險泉男建報曰謹聞命矣即移兵據鴨綠津唐兵不得度上聞之流萬頃於嶺南郝處俊在髙麗城下未及成列高麗奄至軍中大駭處俊據胡床方食乾糒胡床即今之交床乾音干糒音備潜簡精鋭擊敗之敗補邁翻將士服其膽略冬十二月甲午詔自今祀昊天上帝五帝皇地祗神州地祗並以高祖太宗配仍合祀昊天上帝五帝於明堂北兼用貞觀顯慶之禮是歳海南獠䧟瓊州瓊州本隋朱崖郡之瓊山縣貞觀五年置瓊州獠魯皓翻總章元年以將作明堂改元是年三月方改元春正月壬子以右相劉仁軌為遼東道副大總管二月壬午李勣等㧞高麗扶餘城扶餘國之故墟故城存其名薛仁貴既破髙麗於金山乗勝將三千人將攻扶餘城諸將以其兵少止之仁貴曰兵不在多顧用之何如耳遂為前鋒以進與高麗戰大破之殺獲萬餘人遂㧞扶餘城扶餘川中四十餘城皆望風請服侍御史洛陽賈言忠奉使自遼東還使䟽吏翻上問以軍事言忠對曰髙麗必平上曰卿何以知之對曰隋煬帝東征而不克者人心離怨故也事見隋煬帝紀先帝東征而不克者髙麗未有舋也事見太宗紀舋許覲翻今高藏微弱權臣擅命蓋蘇文死男建兄弟内相攻奪男生傾心内附為我鄉導鄉讀曰嚮彼之情偽靡不知之以陛下明聖國家富彊將士盡力以乗高麗之亂其勢必克不俟再舉矣且高麗連年飢饉妖異屢降妖於喬翻人心危駭其亡可翹足待也上又問遼東諸將孰賢謂征遼東之諸將也對曰薛仁貴勇冠三軍龎同善雖不善鬬而持軍嚴整高侃勤儉自處忠果有謀契苾何力沈毅能斷雖頗忌前冠古玩翻處昌吕翻沈持林翻斷丁亂翻忌前忌人在己前也而有統御之才然夙夜小心忘身憂國皆莫及李勣也上深然其言泉男建復遣兵五萬人救扶餘城復扶又翻與李勣等遇於薛賀水新書作薩賀水合戰大破之斬獲三萬餘人進攻大行城拔之朝廷議明堂制度略定三月庚寅赦天下改元戊寅上幸九成宫夏四月丙辰彗星見于五車五車五星五帝車舍也五帝坐也主天子五兵一曰主五糓豐耗西北大星曰天庫主太白主秦次東北曰獄主辰星主燕趙次東星曰天倉主歳星主魯衛次東南曰司空主填星主楚次西南曰卿星主熒惑主魏五星有變皆以其所占之據舊紀五車在昴畢間見賢遍翻下同彗祥歳翻上避正殿减常膳撤樂許敬宗等奏請復常曰彗見東北高麗將滅之兆也上曰朕之不德謫見于天豈可歸咎小夷且髙麗百姓亦朕之百姓也不許戊辰彗星滅辛巳西臺侍郎同東西臺三品楊𢎞武薨八月辛酉卑列道行軍摠管右威衞將軍劉仁願坐征高麗逗留流姚州癸酉車駕還京師九月癸巳李勣㧞平壤勣既克大行城諸軍出它道者皆與勣會進至鴨綠柵髙麗發兵拒戰勣等奮擊大破之追奔二百餘里㧞辱夷城諸城遁逃及降者相繼降戶江翻下同契苾何力先引兵至平壤城下勣軍繼之圍平壤月餘髙麗王藏遣泉男産帥首領九十八人持白幡詣勣降勣以禮接之帥讀曰率泉男建猶閉門拒守頻遣兵出戰皆敗男建以軍事委僧信誠信誠密遣人詣勣請為内應後五日信誠開門勣縱兵登城鼓譟焚城四月月當作角否則作周男建自刺不死刺七亦翻遂擒之髙麗悉平冬十月戊午以烏荼國婆羅門盧迦逸多為懐化大將軍烏荼國一曰烏萇直天竺南東距勃律六百里西罽賓四百里婆羅門僧也唐置懐化大將軍從三品以授蕃官逸多自言能合不死藥合音閤上將餌之東臺侍郎郝處俊諫曰脩短有命非藥可延貞觀之末觀古玩翻先帝服那羅邇娑婆寐藥竟無效大漸之際名醫不知所為議者歸罪娑婆寐將加顯戮恐取笑戎狄而止娑婆寐事見上巻顯慶二年前鑒不逺願陛下深察上乃止李勣將至上命先以高藏等獻于昭陵具軍容奏凱歌入京師獻于太廟十二月丁巳上受俘于含元殿東内正殿曰含元殿唐六典曰含元殿即龍首山之東趾階上高於平地四十餘尺南去丹鳯門四百餘步東西廣五百步殿前玉階三級毎級引出一螭頭其下為龍尾道委蛇屈曲几七轉以高藏政非己出赦以為司平太常伯貟外同正司平太常伯即工部尚書按舊書永徽五年尚藥奉御蔣孝璋員外特置仍同正員員外同正自此始以泉男産為司宰少卿司宰少卿即光禄少卿僧信誠為銀青光祿大夫泉男生為右衞大將軍李勣以下封賞有差泉男建流黔中黔音琴扶餘豐流嶺南分高麗五部百七十六城六十九萬餘户為九都督府四十二州新城州遼城州哥勿州衛樂州舍利州居素州越喜州去旦州建安州凡有九都督府四十二州存於志者南蘇葢牟代那倉巖磨米積利黎山延津木底安市諸北識利拂湼拜漢十四州而已百縣置安東都䕶府於平壤以統之擢其酋帥有功者為都督刺史縣令與華人參理酋慈由翻帥所類翻理猶治也時避上名以治為理通鑑因唐史成文以右威衞大將軍薛仁貴檢校安東都䕶摠兵二萬人以鎮撫之丁卯上祀南郊告平高麗以李勣為亞獻己巳謁太廟渭南尉劉延祐弱冠登進士第渭南縣屬雍州後魏之渭南郡後周廢為縣冠古玩翻政事為畿縣最唐雍州諸縣萬年長安為赤縣餘縣為畿縣六典曰城内為京縣城外為畿縣李勣謂之曰足下春秋甫爾遽擅大名宜稍自貶抑無為獨出人右也史言李勣愛人以徳時有敇征遼軍士逃亡限内不首及首而更逃者身斬首式又翻妻子籍没太子上表上時掌翻以為如此之比其數至多或遇病不及隊伍怖懼而逃怖普布翻或因樵採為賊所掠或渡海漂没或深入賊庭為所傷殺軍法嚴重同隊恐并獲罪即舉以為逃軍旅之中不暇勘當當丁浪翻直據隊司通狀闗移所屬妻子没官情實可哀書曰與其殺不辜寧失不經書大禹謨之言注云經常也寧失不常之罪不枉不辜之善伏願逃亡之家免其配没從之甲戌司戎太常伯姜恪兼檢校左相司平太常伯閻立本守右相是歳京師及山東江淮旱飢二年春二月辛酉以張文瓘為東臺侍郎以右肅機檢校太子中䕶譙人李敬𤣥為西臺侍郎譙縣帶亳州並同東西臺三品先是同三品不入衘至是始入衘先悉薦翻考異曰陳紀在乾封二年文瓘始同三品衘今從舊本紀陳字必誤癸亥以雍州長史盧承慶為司刑太常伯雍於用翻承慶常考内外官有一官督運遭風失米承慶考之曰監運損粮考中下監古衘翻其人容色自若無言而退承慶重其雅量改注曰非力所及考中中既無喜容亦無愧詞又改曰寵辱不驚考中上三月丙戍東臺侍郎郝處俊同東西臺三品丁亥詔定明堂制度其基八觚觚攻乎翻方稜也其宇上圎覆以清陽玉葉覆敷又翻時按淮南子清陽為天故覆明堂以清陽之色玉葉非必以玉為之葢亦瓦之類謂之葉者尚朴之意猶茨之以茅也曰玉者示寳貴之耳其門牆階級窓櫺楣柱枊楶枅栱說文曰在牆曰牖在屋曰窓釋名窓聰也於内見外之聰明也櫺盧經翻楯間于窓隔也楣屋耜說文曰楣屋櫋毛晃曰棟下横木曰楣柱楹也枊魚剛翻斜桷謂之飛枊楶子結翻梁上欂櫨枅堅奚翻屋櫨所以承桁栱居竦翻大杙又栱科皆法天地隂陽律厯之數詔下之後衆議猶未决又會飢饉竟不果立夏四月己酉朔上幸九成宫髙麗之民多離叛者敇徙髙麗戶三萬八千二百於江淮之南及山南京西諸州空曠之地留其貧弱者使守安東六月戊申朔日有食之秋八月丁未朔詔以十月幸凉州時隴右虛耗議者多以為未宜遊幸上聞之辛亥御延福殿九成宫中有延福殿召五品已上謂曰自古帝王莫不廵守守手又翻故朕欲廵視逺俗若果為不可何不面陳而退有後言何也自宰相以下莫敢對詳刑大夫來公敏獨進曰詳刑大夫即大理少卿廵守雖帝王常事然髙麗新平餘冦尚多西邊經略亦未息兵隴右戶口彫弊鑾輿所至供億百端誠為未易易以䜴翻外閒實有竊議但明制己行故羣臣不敢陳論耳上善其言為之罷西廵為于偽翻未幾擢公敏為黄門侍郎幾居豈翻甲戍改瀚海都䕶府為安北都䕶府瀚海府見龍朔三年九月丁丑朔詔徙吐谷渾部落就凉州南山議者恐吐蕃侵暴使不能自存欲先發兵擊吐蕃右相閻立本以為去歳飢歉未可興師議乆不决竟不果徙庚寅大風海溢漂永嘉安固六千餘家漢順帝永建四年分章安束甌鄉立永寧縣江左改曰永豐隋平陳改曰永嘉縣又孫吳立羅陽縣孫皓改曰安陽縣晉平吳改曰安固縣並屬永嘉郡唐初屬東嘉州貞觀元年州廢二縣屬栝州冬十月丁巳車駕還京師十一月丁亥徙豫王旭輪為冀王更名輪更工衡翻司空太子太師英貞武公李勣寢疾英者封國名貞武其謚也上悉召其子弟在外者使歸侍疾上及太子所賜藥勣則餌之子弟為之迎醫為于偽翻下親為非為乆為同皆不聽進曰吾本山東田夫遭值聖明致位三公年將八十云考異曰舊傳云勣年八十六臨終語弟弼年將八十新傳改云年踰八十按新舊傳實録皆云大業末翟讓聚衆為盗勣年十七往從之自大業十三年至此五十二年若據舊傳年八十六則年十七當在開皇時不得云大業末也總章元年賈言忠對高宗云勣年登八十去此止一年若據新傳勣㓕高麗時年已八十五亦不得云年登八十今從實録豈非命邪脩短有期豈能復就醫工求活復扶又翻下不復同一旦忽謂其弟司衛少卿弼曰吾今日少愈可共置酒為樂日少詩沼翻樂音洛於是子孫悉集酒闌謂弼曰吾自度必不起度徒洛翻故欲與汝曹為别耳汝曹勿悲泣聽我約束武見房杜平生勤苦僅能立門户遭不肖子蕩覆無餘謂房遺愛杜荷也吾有此子孫今悉付汝葬畢汝即遷入我堂撫養孤㓜謹察視之其有志氣不倫交遊非類者皆先撾殺然後以聞以勣之智葢知敬業必為變也豈知敬業乃忠於唐室邪撾則𤓰翻自是不復更言十二月戊申薨上聞之悲泣葬日幸未央宫登樓望轜車慟哭起冡象隂山鐵山烏德鞬山轜音而轜車䘮車也所以載柩烏德鞬山在回紇牙帳西南以旌其破突厥薛延陀之功勣破突厥見一百九十三巻貞觀四年破薛延陀見一百九十八巻二十年厥九勿翻勣為將有謀善斷將即亮翻斷丁亂翻與人議事從善如流戰勝則歸功於下所得金帛悉散之將士故人思致死所向克㨗臨事選將必訾相其狀貌豐厚者遣之訾即移翻訾之為言量也相息亮翻或問其故勣曰薄命之人不足與成功名閨門雍睦而嚴其姊嘗病勣已為僕射親為之煑粥風回爇其須髩爇如悦翻姊曰僕妾幸多何自苦如是勣曰非為無人使令也顧姊老勣亦老雖欲乆為姊煑粥其可得乎勣常謂人我年十二三時為亡賴賊亡讀曰無逢人則殺十四五為難當賊有所不愜則殺人愜苦叶翻十七八為佳賊臨陳乃殺之陳讀曰陣二十為大將用兵以救人死勣長子震早卒長知兩翻卒子恤翻震子敬業襲爵劉考異曰餗小説云髙宗時羣蠻為冦討之輒不利乃除徐敬業為刺史發卒郊迎敬業盡放令還單騎至府賊聞新刺史至皆繕理以待敬業一無所問處置他事已畢方曰賊安在曰在南岸乃從二佐吏而往觀之莫不駭愕賊初持兵覘望及見船中無人及兵仗更閉營藏隠敬業直入其營内告云國家知汝等為貪吏所害非有他惡可悉歸田後去者為賊唯召其帥責以不早降之意各杖數十而遣之境内肅然其祖英公壯其膽略曰吾不辦此然破我家必此兒也按敬業武后時舉兵旋踵敗亡若有智勇何至如此今不取時承平既乆選人益多選須絹翻下同是歳司列少常伯裴行儉始與貟外郎張仁禕唐制尚書二十四司各司有郎中二員從五品上員外郎二員從六品上禕吁韋翻設長名姓厯牓引銓注之法又定州縣升降官資高下其後遂為永制無能革之者大畧唐之選法取人以身言書判唐擇人之法有四一曰身取其體貌豐偉二曰言取其言辭辯正三曰書取其楷法遒美四曰判取其文理優長計資量勞而擬官始集而試觀其書判已試而銓察其身言已銓而注詢其便利已注而唱集衆告之然後類以為甲先簡僕射乃上門下給事中讀侍郎省侍中審之不當者駮下上時掌翻省悉景翻當丁浪翻駮比角翻既審然後上聞主者受㫖奉行各給以符謂之告身兵部武選亦然武選兵部主之課試之法以騎射及翹闗負米翹闗長丈七尺徑二寸半凡十舉後手持闗距出處無過一尺負米者負米五斛行二十步皆為中第騎奇寄翻人有格限未至而能試文三篇謂之宏詞試判三條謂之㧞萃入等者得不限而授其黔中嶺南閩中州縣官不由吏部委都督選擇土人補授黔音琴閩睂巾翻選如字凡居官以年為考六品以下四考為滿咸亨二年是年三月始改元春正月丁丑右相劉仁軌請致仕許之三月甲戍朔以旱赦天下改元丁丑改蓬萊宫為含元宫即含元殿以為宫名壬辰太子少師許敬宗請致仕許之敕突厥酋長子弟事東宫酋慈由翻長知兩翻西臺舍人徐齊聃上疏聃他酣翻上時掌翻以為皇太子當引文學端良之士寘左右豈可使戎狄醜類入侍軒闥又奏齊獻公即陛下外祖雖子孫有犯豈應上延祖禰今周忠孝公廟甚修而齊獻公廟毁廢齊獻公文德皇后父長孫晟也周忠孝公皇后父武士彠也襧乃禮翻不審陛下何以垂示海内彰孝理之風孝理即孝治避上名改治為理上皆從之齊聃充容之弟也齊聃姊入宫為充容列於九嬪夏四月吐蕃陷西域十八州又與于闐襲龜兹撥換城陷之罷龜兹于闐焉耆踈勒四鎮闐徒賢翻龜兹音丘慈辛亥以右衛大將軍薛仁貴為邏娑道行軍大摠管邏娑川吐蕃賛普牙在焉有邏些城左衛貟外大將軍阿史那道真左衛將軍郭待封副之以討吐蕃且援送吐谷渾還故地庚午上幸九成宫高麗酋長劒牟岑反立髙藏外孫安舜為主以左監門大將軍髙侃為東州道行軍摠管高麗在東時巳列置州府故曰東州道監古衘翻發兵討之安舜殺劒牟岑奔新羅六月壬寅朔日有食之秋八月丁巳車駕還京師郭待封先與薛仁貴並列及征吐蕃耻居其下仁貴所言待封多違之軍至大非川自鄯州鄯城縣西行三百餘里至大非川將趣烏海烏海在漢哭山西隋屬河源郡界杜佑曰吐蕃國出鄯城五百里過烏海暮春之月山有積雪地有冷瘴令人氣急不甚為害趣七喻翻仁貴曰烏海險逺軍行甚難輜重自隨難以趨利重直用翻下同趣七喻翻宜留二萬人為兩柵於大非嶺上輜重悉置柵内吾屬帥輕鋭倍道兼行掩其未僃破之必矣仁貴帥所部前行擊吐蕃於河口大破之河口積石河口也帥讀曰率斬獲甚衆進屯烏海以俟待封待封不用仁貴策將輜重徐進未至烏海遇吐蕃二十餘萬待封軍大敗還走悉弃輜重仁貴退屯大非川吐蕃相論欽陵將兵四十餘萬就擊之將即亮翻下同杜佑曰禄東賛論欽陵本姓薛氏世為大論後遂以官為氏大論吐蕃統理國事之官也相息亮翻唐兵大敗死傷略盡仁貴待封與阿史那道真並脫身免與欽陵約和而還還音旋又如字敕大司憲樂彦瑋即軍按其敗狀械送京師三人皆免死除名欽陵禄東賛之子也禄東賛事始一百九十五巻太宗貞觀十四年與弟贊婆悉多于勃倫皆有才畧禄東賛卒卒子恤翻下氏卒同欽陵代之三弟將兵居外鄰國畏之關中旱飢九月丁丑詔以明年正月幸東都甲申皇后母魯國忠烈夫人楊氏卒敕文武九品以上及外命婦並詣宅弔哭閏月癸卯皇后以乆旱請避位不許壬子加贈司徒周忠孝公武士彠為太尉太原王夫人為王妃甲寅以左相姜恪為凉州道行軍大摠管以禦吐蕃冬十月乙未太子右中䕶同東西臺三品趙仁本為左肅機罷政事龍朔二年改左右庶子為左右中䕶庚寅詔官名皆復舊改官名見上巻龍朔二年按新書帝紀係十二月庚寅資治通鑑巻二百一
