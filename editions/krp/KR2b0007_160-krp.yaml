front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百六十宋司馬光撰胡三省音註梁紀十六彊圉單閼一年髙祖武皇帝十六太清元年是年四月始改元太清春正月朔日有食之不盡如鈎壬寅荆州刺史廬陵威王續卒諡法猛以彊果曰威以湘東王繹為都督荆雍等九州諸軍事荆州刺史雍於用翻續素貪婪婪盧南翻臨終有啟遣中録事參軍謝宣融獻金銀器千餘件中録事參軍盖使之録問中事在左右親任者也件其輦翻上方知其富因問宣融曰王之金盡此乎宣融曰此之謂多安可加也大王之過如日月之食欲令陛下知之故終而不隠終謂卒也上意乃解初湘東王繹為荆州刺史有㣲過續代之以状聞按繹在荆州有宫人李桃兒者以才慧得進及還以李氏行時得營户禁重續具状以聞繹對使者泣訴於太子綱太子和之不得繹懼送李氏還荆州自此二王不通音問繹聞其死入閤而躍屧為之破屧蘓協翻屐也又履中薦也史言繹續生無友于之情死則從而忻快為于偽翻丙午東魏勃海獻武王歡卒年五十二歡性深宻終日儼然人不能測機權之際變化若神制馭軍旅法令嚴肅聴斷明察斷丁亂翻不可欺犯擢人受任受當作授在於得才苟其所堪無問厮養厮音斯養余亮翻有虚聲無實者皆不任用雅尚儉素刀劒鞍勒無金玉之飾少能劇飲自當大任不過三爵知人好士全䕶勲舊如尉景司馬子如孫騰諸人是也少詩照翻好呼到翻毎獲敵國盡節之臣多不之罪如泉企裴讓之是也由是文武樂為之用樂音洛世子澄秘不發喪用歡遺言也唯行臺左丞陳元康知之侯景自念已與髙氏有隙内不自安辛亥據河南叛歸於魏潁州刺史司馬世雲以城應之景誘執豫州刺史髙元成襄州刺史李宻廣州刺史懐朔暴顯等誘音酉遣軍士二百人載仗暮入西兖州欲襲取之刺史邢子才覺之掩捕盡獲之因散檄東方諸州各為之備由是景不能取侯景之變當時覺之而能發其姦者邢子才一人耳孰謂文士不可以當藩翰哉諸将皆以景之叛由崔暹崔暹糾劾權貴諸将恨之故以景叛為暹罪将即亮翻下同澄不得已欲殺暹以謝景陳元康諌曰今雖四海未清綱紀已定若以數将在外茍悦其心枉殺無辜虧廢刑典豈直上負天神何以下安黎庶晁錯前事願公慎之晁錯事見十六卷漢景帝三年澄乃止遣司空韓軌督諸軍討景辛酉上祀南郊大赦甲子祀明堂三月魏詔自今應宫刑者直沒官勿刑魏以開府儀同三司若干恵為司空侯景為太傅河南道行臺上谷公庚辰景又遣其行臺郎中丁和來上表言臣與髙澄有隙請舉函谷以東瑕丘以西豫廣郢荆襄兖南兖濟東豫洛陽北荆北揚等十三州内附洛陽二州名注已見前魏收志武定二年置北荆州領伊陽新城汝北郡五代志河南郡陸渾縣有東魏北荆州淮陽郡項城縣東魏置北揚州及丹陽郡秣陵郡濟子禮翻顯考異曰梁書景𫝊云與豫州刺史髙成廣州刺史暴潁州刺史司馬世雲荆州刺史郎椿㐮州刺史李宻兖州刺史邢子才南兖州刺史石長宣濟州刺史許季良東豫州刺史丘元征洛州刺史爾朱渾願揚州刺史樂恂北荆州刺史梅季昌北揚州刺史元神和等隂結私圖剋相影㑹蕭韶太清紀又有兖州刺史胡延豫州刺史𫝊士哲揚州刺史可足渾洛無邢子才典略有荆州刺史庫狄暢無髙成暴顯許季良爾朱渾願樂恂梅季昌今依梁書而太清紀有兩豫州盖前官也惟青徐數州僅須折簡且黄河以南皆臣所職易同反掌易弋豉翻若齊宋一平齊謂青州宋謂徐州徐事燕趙燕趙謂河北之地上召羣臣廷議尚書僕射謝舉等皆曰頃嵗與魏通和大同二年東魏請和自是交聘使命不絶邊境無事今納其叛臣竊謂非宜上曰雖然得景則塞北可清機㑹難得豈宜膠柱謂不能圓轉如膠柱鼓瑟是嵗正月乙夘上夢中原牧守皆以其地來降舉朝稱慶守式又翻降户江翻朝直遥翻夜考異曰典畧云去年十二月夢今從梁書旦見中書舎人朱异告之且曰吾為人少夢少詩沼翻若有夢必實异曰此乃宇宙混壹之兆也及丁和至稱景定計以正月乙夘上愈神之帝不能自治其國而妖夢是踐其亡宜矣然意猶未决嘗獨言我國家如金甌無一傷缺今忽受景地詎是事宜脱致紛紜悔之何及獨言者宴閑之時非因與侍臣問答獨言其事盖帝欲受景地念兹在兹而不能自己於言也朱异揣知上意對曰聖明御宇南北歸仰正以事無機㑹未達其心今侯景分魏土之半以來自非天誘其𠂻杜預曰衷中也揣初委翻誘音酉人賛其謀何以至此若拒而不内恐絶後來之望此誠易見易弋豉翻願陛下無疑上乃定議納景壬午以景為大将軍封河南王都督河南北諸軍事大行臺承制如鄧禹故事平西諮議參軍周𢎞正善占候前此謂人曰國家數年後當有兵起及聞納景曰亂階在此矣為侯景亂梁張本丁亥上耕藉田藉在亦翻三月庚子上幸同泰寺捨身如大通故事大通元年帝捨身之始也事見一百五十一卷甲辰遣司州刺史羊鴉仁督兖州刺史桓和梁紀作上州刺史桓和五代志漢東郡上山縣梁曰龍巢置上州及東西二永寜真陽三郡仁州刺史湛海珍等魏收志梁置仁州治赤坎城帶臨淮郡領已吾義城縣已吾之下注云州郡治五代志彭城榖陽縣有已吾義城二縣後齊併以為臨淮縣将兵三萬趣懸瓠将即亮翻趣七喻翻運糧食應接侯景魏大赦東魏髙澄慮諸州有變乃自出巡撫留段韶守晉陽委以軍事以丞相功曹趙彦深為大行臺都官郎中使陳元康豫作丞相歡條教數十紙付韶及彦深在後以次行之臨發握彦深手泣曰以母弟相託幸明此心夏四月壬申澄入朝于鄴朝直遥翻東魏主與之宴澄起舞識者知其不終昔周景王䘮太子及后以䘮賔宴晉叔向曰王其不終乎吾聞之所樂必卒焉今王樂憂若卒以憂不可謂終景王之䘮伉儷及冢適也既𦵏而宴賢者非之髙澄則喪父也袐喪不發死肉未寒忘雞斯徒跣之哀縱蹮蹮僛僛之樂尚為有人心乎是故榮錡之禍猶輕柏堂之禍為慘蒼蒼之報應固不爽也雞斯讀為笄纚丙子羣臣奉贖自庚子捨身至丙子奉贖凡三十七日萬機之事不可一日曠廢而荒於佛若是帝忘天下矣三十七日之間天下不知為無君天下亦忘君矣丁亥上還宫丁亥當作丁丑大赦改元如大通故事甲午東魏遣兼散騎常侍李系來聘系繪之弟也李繪見一百五十八卷大同八年按考異曰魏帝紀作李緯今從本𫝊五月丁酉朔東魏大赦戊戌東魏以襄城王旭為太尉旭吁玉翻髙澄遣武衞将軍元柱等将數萬衆晝夜兼行以襲侯景将即亮翻遇景於潁川北柱等大敗景以羊鴉仁等軍猶未至乃退保潁川侯景不敢乗勝北向者盖以髙歡雖死髙澄猶能用其衆也甲辰東魏以開府儀同三司庫狄干為太師録尚書事孫騰為太傅汾州刺史賀拔仁為太保司徒髙隆之録尚書事司空韓軌為司徒青州刺史尉景為大司馬領軍将軍可朱渾道元為司空僕射髙洋為尚書令領中書監徐州刺史慕容紹宗為尚書左僕射髙陽王斌為右僕射斌盖因玉儀而進用斌音彬戊午尉景卒韓軌等圍侯景於潁川景懼割東荆北兖州魯陽長社四城賂魏以求救東魏東荆州治北陽城荆州治魯陽潁州治長社時無北兖州唯北荆州治伊陽與西魏接境豈史家誤以荆為兖邪尚書左僕射于謹曰景少習兵姦詐難測少詩沼翻不如厚其爵位以觀其變未可遣兵也荆州刺史王思政以為若不因機進取後悔無及即以荆州步騎萬餘從魯陽闗向陽翟先是王思政盖自恒農遷刺荆州陽翟縣漢屬潁川郡晉屬河南尹魏收志興和元年分置陽翟郡屬潁川丞相泰聞之加景大将軍兼尚書令遣太尉李弼儀同三司趙貴将兵一萬赴潁川按趙貴開府儀同三司此逸開府二字景恐上責之遣中兵參軍栁昕奉啟於上以為王旅未接謂羊鴉仁等軍未至也昕許斤翻死亡交急遂求援闗中自救目前臣既不安於髙氏豈見容於宇文但螫手解腕蝮蛇螫手壮士解腕螫音釋腕烏貫翻事不得已本圖為國為于偽翻願不賜咎臣獲其力不容即弃今以四州之地為餌敵之資已令宇文遣人入守自豫州以東齊海以西悉臣控壓見有之地盡歸聖朝見賢遍翻朝直遥翻懸瓠項城徐州南兖事須迎納願陛下速敇境上各置重兵與臣影響言若影之随形響之應聲彼此相應不失機㑹也不使差互上報之曰大夫出境尚有所専春秋之義大夫出彊専之可也上引此義欲以綏懐侯景不知狼子野心之難馴擾也况始創竒謀将建大業理須適事而行随方以應卿誠心有本何假詞費上報此詔已為侯景所窺矣魏以開府儀同三司獨孤信為大司馬六月戊辰以鄱陽王範為征北将軍總督漢北征討諸軍事撃穰城使範撃魏荆州欲以應接侯景穰如羊翻東魏韓軌等圍潁川聞魏李弼趙貴等将至乙巳引兵還鄴李考異曰周書帝紀三月弼救侯景今從典略侯景欲因㑹執弼與貴奪其軍貴疑之不往貴欲誘景入營而執之弼止之李弼之計以為執侯景不能猝兼河南之地徒為東魏去疾故止貴誘音酉羊鴉仁遣長史鄧鴻将兵至汝水弼引兵還長安東魏之師已退而梁之援兵始來弼若不還師則梁魏之兵必浪戰于汝潁之間矣引兵而還則禍集于梁王思政入據潁川景陽稱略地引兵出屯懸瓠景引兵出潁川以城與魏為王思政守潁川沒於東魏張本景復乞兵於魏復扶又翻丞相泰使同軌防主韋法保及都督賀蘭願徳等将兵助之五代志河南宜陽縣後周分置熊耳縣同軌郡周齊以宜陽為界以同軌名郡者言将自此出兵以混壹東西使天下車同軌也大行臺左丞藍田王悦言於泰曰侯景之於髙歡始敦鄉黨之情終定君臣之契髙歡侯景皆懐朔鎮人少相友善中間同事爾朱歡滅爾朱景遂委質於歡任居上将位重台司今歡始死景遽外叛盖所圖甚大終不為人下故也且彼能背徳於髙氏将即亮翻背蒲妹翻豈肯盡節於朝廷今益之以勢援之以兵竊恐貽笑将來也史言西魏多智士宇文泰能善用謀侯景之姦詐不得逞而其禍移于梁矣泰乃召景入朝朝直遥翻下同景隂謀叛魏事計未成厚撫韋法保等冀為已用外示親宻無猜閒閒古莧翻毎往來諸軍間侍從至少魏軍中名将皆身自造詣從才用翻少詩沼翻将即亮翻造七到翻同軌防長史裴寛謂法保曰侯景狡詐必不肯入闗言其不肯應召而入朝也欲託欵於公恐未可信若伏兵斬之此亦一時之功也如其不爾即應深為之防不得信其誑誘自貽後悔誑居况翻誘音酉法保深然之不敢圖景但自為備而已尋辭還所鎮辭景而還同軌也王思政亦覺其詐宻召賀蘭願徳等還分布諸軍據景七州十二鎮景果辭不入朝遺丞相泰書曰吾恥與髙澄鴈行安能比肩大弟記王制父之齒随行兄之齒鴈行鴈行言如鴈並飛而進也景知泰覺其情且知梁之可侮㺯也故以書絶泰而决意附梁遺丁季翻行户剛翻泰乃遣行臺郎中趙士憲悉召前後所遣諸軍援景者景遂决意來降魏将任約以所部千餘人降於景史言西魏諸将唯任約為侯景所誘降户江翻任音壬泰以所授景使持節太傅大将軍兼尚書令河南大行臺都督河南諸軍事回授王思政思政並讓不授頻使敦諭使疏吏翻下同唯受都督河南諸軍事髙澄将如晉陽以弟洋為京畿大都督留守於鄴使黄門侍郎髙徳政佐之徳政顥之子也髙顥見一百四十七卷天監七年考異曰北史作徳正今從北齊書丁丑澄還晉陽始發喪秋七月魏長樂武烈公若干恵卒若干恵魏司空樂音洛丁酉東魏主為丞相歡舉哀服緦縗紀間𫝊緦麻之縗十五升去其半有事其縷無事其布曰緦為于偽翻縗倉回翻凶禮依漢霍光故事凶禮猶言䘮禮也贈相國齊王備九錫殊禮戊戌以髙澄為使持節大丞相都督中外諸軍録尚書事大行臺勃海王澄啟辭爵位壬寅詔太原公洋攝理軍國遣中使敦諭澄庚申羊鴉仁入懸瓠城甲子詔更以懸瓠為豫州夀春為南豫州改合肥為合州後漢豫州治譙魏治汝南安成晉治陳國晉氏南度石氏强盛祖約自譙城退屯夀春始僑立豫州於夀春是後庾亮以豫州刺史鎮蕪湖毛寳治邾城趙胤治牛渚謝尚鎮歴陽又進馬頭柏冲戌姑孰盖不常厥居也宋武帝欲開拓河南綏定豫土割揚州大江以西悉屬豫州豫州基趾因此而立永初二年分淮東為南豫州治歴陽淮西為豫州然猶治夀春也大明以後豫州治懸瓠常珍竒歸北懸瓠入魏豫州復治夀陽齊東昏之時裴叔業又以夀陽附魏遂以歴陽為豫州至帝天監中韋叡克合肥以為豫州復以歴陽為南豫州後復夀陽又徙豫州復舊治今得懸瓠復宋之舊為豫州以夀陽為南豫以合肥為合州南北兵争疆場之間一彼一此易置州郡類如是矣以鴉仁為司豫二州刺史鎮懸瓠西陽太守羊思達為殷州刺史鎮項城改東魏之北楊州為殷州八月乙丑下詔大舉伐東魏遣南豫州刺史貞陽侯淵明南兖州刺史南康王㑹理分督諸将将即亮翻淵明懿之子㑹理續之子也始上欲以鄱陽王範為元帥朱异取急在外謂取休假在外舎也帥所類翻异羊至翻聞之遽入曰鄱陽雄豪盖世得人死力然所至殘暴非弔民之材且陛下昔登北顧亭以望謂江右有反氣骨肉為戎首登北顧亭謂幸京口時也江郢揚南徐之地為江左豫南豫南兖之地為江右朱异告帝以防鄱陽而不知防臨賀帝知江右有反氣而不料侯景自夀陽舉兵天邪人邪今日之事尤宜詳擇上黙然曰㑹理何如對曰陛下得之矣㑹理懦而無謀所乗襻輿襻普患翻襻輿者輿掆施襻人以肩舉之施版屋冠以牛皮冠古玩翻上聞不悦貞陽侯淵明時鎮夀陽屢請行上許之㑹理自以皇孫復為都督言既以皇孫之貴自髙又以都督之尊自處復扶又翻自淵明已下殆不對接淵明與諸将宻告朱异追㑹理還遂以淵明為都督辛未髙澄入朝於鄴固辭大丞相以通鑑書法言之辛未之下當有東魏二字朝直遥翻詔為大将軍如故餘如前命甲申虚𦵏齊獻武王於漳水之西潜鑿成安鼓山石窟佛寺之旁為穴魏收志魏郡臨漳縣有皷山成安縣後齊分臨漳置宋白曰成安縣本漢斥丘縣地春秋時乾侯邑也土地斥鹵故曰斥丘其地在鄴北齊分鄴置成安縣按臨漳縣亦分鄴縣所置納其柩而塞之柩音舊塞悉則翻殺其羣匠及齊之亡也一匠之子知之發石取金而逃史言潛𦵏之無益戊子武州刺史蕭㺯璋攻東魏磧泉吕梁二戍拔之五代志下邳郡下邳縣梁曰歸政置武州魏收志彭城郡吕縣有吕梁城水經注曰泗水之上有石梁焉故曰吕梁或告東魏大将軍澄云侯景有北歸之志㑹景将蔡道遵北歸言景頗知悔過景母及妻子皆在鄴澄乃以書諭之語以闔門無恙若還許以豫州刺史終其身還其寵妻愛子所部文武更不追攝語牛倨翻攝收也景使王偉復書曰今已引二邦二邦謂梁及西魏也揚旌北討熊豹齊奮克復中原幸自取之何勞恩賜昔王陵附漢母在不歸事見九卷漢髙帝元年太上囚楚乞羮自若事見十卷髙帝四年矧伊妻子而可介意脱謂誅之有益欲止不能殺之無損徒復阬戮家累在君何闗僕也復扶又翻累力瑞翻戊子詔以景録行臺尚書事東魏静帝羙容儀旅力過人旅與膂同脊骨也能挟石師子踰宫牆射無不中好文學從容沈雅中竹仲翻好呼到翻從千容翻沈持林翻時人以為有孝文風烈大将軍澄深忌之始獻武王自病逐君之醜謂逐孝武帝使入闗也事静帝禮甚恭事無大小必以聞可否聴㫖言不敢専决也毎侍晏俯伏上夀帝設法㑹乗輦行香歡執香爐步從上時掌翻從才用翻鞠躬屏氣屏必郢翻承望顔色故其下奉帝莫敢不恭及澄當國倨慢頓甚使中書黄門郎崔季舒察帝動静大小皆令季舒知之晉書職官志曹魏黄初初中書既置監令又置通事郎次黄門郎及晉改曰中書侍郎環濟要畧漢置中書掌宻詔有令僕丞郎漢舊儀云置中書領尚書事魏黄初中書置監令又置通事郎次黄門郎即中書侍郎之任也按二書皆謂黄門中書通為一官而五代志紀北齊之制黄門侍郎屬門下省中書侍郎屬中書省分為二官髙澄以崔季舒為中書黄門郎者盖澄欲使季舒伺察静帝以為黄門郎則侍從左右以為中書郎則典掌詔命故兼領二職也澄與季舒書曰癡人比復何似比毗至翻復扶又翻癡勢小差未差楚懈翻本作瘥疾稍愈謂之差宜用心檢校帝常獵于鄴東馳逐如飛監衛都督烏那羅受工伐從後呼曰天子勿走馬大将軍嗔監工衘翻監衞都督髙氏置此官以監宿衞所以防制其君者也烏那羅虜三字姓呼火故翻嗔昌真翻怒也澄嘗侍飲酒舉大觴屬帝曰臣澄勸陛下酒屬之欲翻舉酒相屬如儕軰然無復君臣之義帝不勝忿曰自古無不亡之國朕亦何用此生為澄怒曰朕朕狗脚朕使崔季舒敺帝三拳奮衣而出明日澄使季舒入勞帝勝音升敺烏口翻勞力到翻帝亦謝焉賜季舒絹百匹帝不堪憂辱徐知訓陵侮其主與髙澄異世同轍皆不能保其身詩云人而無禮胡不遄死諒哉詠謝靈運詩曰韓亡子房奮秦帝仲連恥本自江海人忠義感君子謝靈運作詩事見一百二十二卷宋文帝元嘉八年常侍侍講潁川荀濟知帝意荀濟以散騎常侍侍講乃與祠部郎中元瑾長秋卿劉思逸華山王大器淮南王宣洪濟北王徽等謀誅澄大器鷙之子也東魏華山王鷙卒于大同六年華户化翻濟子禮翻帝謬為敇問濟曰欲以何日開講乃詐於宫中作土山開地道向北城至千秋門門者覺地下響以告澄澄勒兵入宫見帝不拜而坐曰陛下何意反臣父子功存社稷何負陛下邪此必左右妃嬪軰所為欲殺胡夫人及李嬪帝正色曰自古惟聞臣反君不聞君反臣王自欲反何乃責我我殺王則社稷安不殺則滅亡無日我身且不暇惜况於妃嬪必欲弑逆緩速在王澄乃下牀叩頭大啼謝罪髙澄雖悖逆不能不屈於静帝之言理所在也於是酣飲夜久乃出居三日幽帝於含章堂含章堂盖取坤卦含章可貞之義必在鄴宫之内殿左右幽者閉帝於内不使出而専殺於外也壬辰烹濟等於市初濟少居江東少詩照翻博學能文與上有布衣之舊知上有大志然負氣不服常謂人曰㑹於盾鼻上磨墨檄之言上若有非常之舉亦當起兵於盾鼻上磨墨作檄以聲其罪上甚不平及即位或薦之於上上曰人雖有才亂俗好反不可用也濟上書諌上崇信佛法為塔寺奢費上大怒欲集朝衆斬之朝衆即謂在朝百官好呼到翻朝直遥翻朱异宻告之濟逃奔東魏澄為中書監大同十年東魏以髙澄領中書監欲用濟為侍讀獻武王曰我愛濟欲全之故不用濟濟入宫必敗澄固請乃許之史言髙歡識鑒非澄所及及敗侍中楊遵彦謂之曰楊愔字遵彦衰暮何苦復爾復扶又翻濟曰壮氣在耳言年雖衰而氣不衰也因下辨曰辨獄辭也自傷年紀摧頹功名不立故欲挟天子誅權臣澄欲宥其死親問之曰荀公何意反濟曰奉詔誅髙澄何謂反有司以濟老病鹿車載詣東市并焚之章懐太子賢曰鹿車小車僅容一鹿也澄疑諮議温子昇子昇盖為大将軍府諮議參軍知瑾等謀方使之作獻武王碑既成餓於晉陽獄食弊𥜗而死棄尸路隅沒其家口沒其家口為官奴婢填晉陽宫太尉長史宋遊道收𦵏之澄謂遊道曰吾近書與京師諸貴諸貴謂司馬子如孫騰等論及朝士以卿僻於朋黨将為一病今乃知卿真是重故舊尚節義之人天下人代卿怖者是不知吾心也史言士之狥義者固不計身之死亡亦未必死也怖普布翻九月辛丑澄還晉陽上命蕭淵明堰泗水於寒山以灌彭城俟得彭城乃進軍與侯景犄角左𫝊曰譬如捕鹿晉人角之諸戎犄之角者當其前犄者亢其下犄居綺翻癸夘淵明軍于寒山去彭城十八里斷流立堰斷音短侍中羊侃監作堰再旬而成監工衘翻東魏徐州刺史太原王則嬰城固守侃勸淵明乗水攻彭城不從諸将與淵明議軍事淵明不能對但云臨時制宜冬十一月魏丞相泰從魏主狩于岐陽岐陽岐山之陽也五代志扶風雍縣有岐陽宫東魏大将軍澄使大都督髙岳救彭城欲以金門郡公潘樂為副五代志河南郡宜陽縣有東魏所置金門郡因金門山以名郡陳元康曰樂緩於機變不如慕容紹宗且先王之命也髙歡令澄用慕容紹宗以敵侯景見上卷上年公但推赤心於斯人景不足憂也時紹宗在外澄欲召見之恐其驚叛元康曰紹宗知元康特䝉顧待新使人來餉金近時之事謂之新元康欲安其意受之而厚荅其書保無異也言保紹宗必無所違異乙酉以紹宗為東南道行臺與岳樂偕行初景聞韓軌來曰噉猪腸兒何能為噉吐濫翻聞髙岳來曰兵精人凡諸将無不為所輕者及聞紹宗來叩鞍有懼色曰誰教鮮卑兒解遣紹宗來解胡買翻若然若然猶今人言若如此也髙王定未死邪澄以廷尉卿杜弼為軍司攝行臺左丞臨發問以政事之要杜弼臨發從軍澄方問以政事之要盖弼在歡府夙有聲稱故問之也可為戒者録一二條弼請口陳之曰天下大務莫過賞罰賞一人使天下之人喜罰一人使天下之人懼茍二事不失自然盡羙澄大悦曰言雖不多于理甚要紹宗帥衆十萬據槖駝峴帥讀曰率峴户典翻羊侃勸貞陽侯淵明乗其逺來擊之不從旦日又勸出戰亦不從侃乃帥所領出屯堰上羊侃知淵明必敗故出屯堰上欲全所領而退若以行兵之節制言之則安營次舍皆當聴命於元帥豈有擅移屯之理哉丙午紹宗至城下引步騎萬人攻潼州刺史郭鳳營魏收志梁置潼州武定七年改曰睢州治取慮城領淮陽榖陽睢南南濟隂臨潼郡五代志下邳郡夏丘縣東魏置臨潼郡梁置潼州矢下如雨淵明醉不能起命諸将救之皆不敢出北兖州刺史胡貴孫謂譙州刺史趙伯超曰魏收志景明中置譙郡於過陽城孝昌中䧟領南譙汴龍亢蘄城下蔡臨涣䝉郡五代志譙郡山桑縣後魏置渦州渦陽郡東魏改曰譙郡吾屬将兵而來将即亮翻下同本欲何為今遇敵而不戰乎伯超不能對貴孫獨帥麾下與東魏戰斬首二百級伯超擁衆數千不敢救謂其下曰虜盛如此與戰必敗不如全軍早歸皆曰善遂遁還初侯景常戒梁人曰逐北不過二里紹宗将戰以梁人輕悍悍侯旰翻又下罕翻恐其衆不支一一引将卒謂之曰我當陽退誘吴兒使前誘音酉爾擊其背東魏兵實敗走梁人不用景言乗勝深入魏将卒以紹宗之言為信争共掩擊之梁兵大敗貞陽侯淵明及胡貴孫趙伯超等皆為東魏所虜失亡士卒數萬人羊侃結陳徐還陳讀曰陣上方晝寝宦者張僧𦙍白朱异啟事上駭之非時啟事故駭遽起升輿至文徳殿閣文徳殿建康宫前殿也异曰韓山失律韓山即寒山上聞之怳然将墜牀怳呼廣翻僧𦙍扶而就坐坐徂卧翻乃歎曰吾得無復為晉家乎謂為夷狄所取也史言帝危亡将至神不守舎復扶又翻郭鳳退保潼州慕容紹宗進圍之十二月甲子朔鳳弃城走東魏使軍司杜弼作檄移梁朝朝直遥翻下同曰皇家垂統光配彼天唯彼吴越獨阻聲教元首懐止戈之心上宰薄兵車之命元首謂東魏主上宰謂髙歡遂解縶南冠左傳楚伐鄭鄭人軍楚師囚鄖公鍾儀獻諸晉晉人囚諸軍府晉侯觀于軍府見鍾儀問曰南冠而縶者誰也有司對曰鄭人所獻楚囚也命税之使歸合晉楚之成喻以好睦大同三年梁初與東魏通和好呼到翻下同雖嘉謀長筭爰自我始罷戰息民彼獲其利侯景豎子自生猜貳逺託闗隴依憑姦偽逆主定君臣之分偽相結兄弟之親謂侯景先降西魏也分扶問翻相息亮翻豈曰無恩終成難養俄而易慮親尋干戈釁暴惡盈側首無託謂侯景不見容于西魏也以金陵逋逃之藪江南流寓之地甘辭卑禮進孰圖身此以下皆言侯景歸梁之心迹孰古熟字通言進軟熟之辭於梁以為容身之圖詭言浮説抑可知矣而偽朝大小幸災忘義主荒於上臣蔽於下連結姦惡斷絶鄰好徴兵保境縱盗侵國盖物無定方事無定勢或乗利而受害或因得而更失是以吳侵齊境遂得句踐之師左傳吴伐齊敗齊師於艾陵遂與晉侯㑹于黄池越子句踐乘虚伐吴獲其太子遂入吴吴王歸及越平其後越遂伐吴滅之句音鉤趙納韓地終有長平之役事見五卷周赧王五十三年至五十五年矧乃鞭撻疲民侵軼徐部築壘擁川舎舟徼利軼徒結翻又音逸杜預曰軼突也擁當作壅舎讀曰捨徼一遥翻是以援枹秉麾之将拔距投石之士師古曰拔距者有人連坐相把據地以為堅而能拔取之投石者以石投人皆言其有勇力也援于元翻枹音膚将即亮翻含怒作色如赴私讐彼連營擁衆依山傍水傍步浪翻舉螳螂之斧被蛣蜣之甲螳螂舉臂以捍物㣲有鋒利故以諭斧蛣蜣蜣蜋也翼在甲下故以諭甲言梁兵之輕弱也蛣音詰當窮轍以待輪古語云螳蜋怒臂以當車轍陸佃曰螳蜋有斧蟲也兖人謂之拒斧奮之當轍不避釋蟲不􅀈蟷蠰其子螵蛸舍人云不􅀈名蟷蠰今之螳蜋也方言云譚魯以南謂之蟷蠰三河之域謂之螳蜋燕趙之際謂之食厖齊把以東謂之馬榖然名其子同云螵蛸也坐積薪而候燎及鋒刃纔交埃塵且接已亡㦸弃戈土崩瓦解掬指舟中衿甲鼓下左傳晉荀林父帥師及楚子戰於邲楚乗晉師林父不知所為皷于軍中曰先濟者有賞中軍與下軍争舟舟中之指可掬也又晉伐齊齊師夜遁晉師從之夙沙衞連大車塞隧以殿殖綽郭最曰子殿齊師國之辱也乃代之殿衞殺馬于隘以塞道晉州綽及之射殖綽中肩弛弓而自後縛之其右具丙亦舎兵而縛郭最皆衿甲面縛坐于中軍之皷下衿其鴆翻同宗異姓縲紲相望曲直既殊彊弱不等獲一人而失一國左傳宋猛獲與南宫萬弑其君宋討之猛獲奔衞宋人請之衞人欲弗許石祁子曰天下之惡一也惡於宋而保於我保之何補得一夫而失一國與惡而棄好非謀也衞人歸之見黄雀而忘深穽穽疾正翻智者所不為仁者所不向誠既往之難逮猶将來之可追逮及也此二語以誘梁欲再與講和以携侯景侯景以鄙俚之夫遭風雲之㑹位班三事邑啟萬家揣身量分久當止足而周章向背離披不已周章怔營貌離披分散不可收束之意揣初委翻量音良分扶問翻背蒲妹翻夫豈徒然意亦可見彼乃授之以利器誨之以慢藏老子曰國之利器不可以授人易曰慢藏誨盗藏徂浪翻使其勢得容姦時堪乗便今見南風不競左傳晉圍齊楚乗其間伐鄭晉人聞之師曠曰不害吾驟歌南風又歌北風南風不競多死聲楚必無功果如其言天亡有徴徴讀曰證老賊姦謀将復作矣然推堅强者難為功復扶又翻推吐雷翻摧枯朽者易為力計其雖非孫吳猛将燕趙精兵猶是久涉行陳将即亮翻燕因肩翻易弋䜴翻行户剛翻陳讀曰陣曽習軍旅豈同剽輕之師漢張良曰楚兵剽輕剽匹妙翻輕牽正翻不比危脆之衆脆此芮翻拒此則作氣不足攻彼則為勢有餘終恐尾大於身踵麤于股倔彊不掉倔其勿翻彊其兩翻狼戾難馴狼當作狠呼之則反速而舋小舋許覲翻不徴則叛遲而禍大㑹應遥望廷尉不肯為臣用蘓峻事見九十三卷晉成帝咸和二年自據淮南亦欲稱帝用黥布事見十二卷漢髙帝十一年但恐楚國亡猨禍延林木城門失火殃及池魚池魚人姓名風俗通有池仲魚城門失火仲魚燒死故諺曰城門失火殃及池魚一曰城門失火汲城下之池水以救之池涸則魚受其殃横使江淮士子荆揚人物死亡矢石之下夭折霧露之中横户孟翻夭於紹翻折而設翻又之舌翻彼梁主者操行無聞輕險有素射雀論功蕩舟稱力國語晉平公射鷃不死使䜿襄摶之失公怒将殺之以告叔向叔向曰君必殺之昔先君唐叔射兕於徒林以為大甲以封於晉今君嗣先君唐叔射鷃不死摶之不得是揚吾君之恥者也必殺之君忸怩顔乃赦之鷃扈小鳥即鷃雀也左傳齊桓公與蔡姬乗舟于囿蕩公杜預注曰蕩揺也操七到翻行下孟翻射而亦翻年既老矣耄又及之政散民流禮崩樂壊加以用舎乖方廢立失所用舎乖方謂免周捨責顧琛而用朱异廢立失所謂衘昭明而不立世適孫乃立太子綱也舎讀曰捨矯情動俗飾智驚愚毒螫滿懐妄敦戒業躁競盈胸謬治清净此數語曲盡帝之心事螫音釋躁則到翻治直之翻災異降於上怨讟興於下人人厭苦家家思亂履霜有漸堅冰且至易坤卦初六爻辭曰履霜堅冰至象曰履霜堅冰隂始凝也馴致其道至堅冰也文言曰臣弑其君子弑其父非一朝一夕之故其所由來者漸矣由辯之不早辯也𫝊險躁之風俗任輕薄之子孫朋黨路開兵權在外必将禍生骨肉舋起腹心彊弩衝城長戈指闕徒探雀鷇無救府藏之虚探雀鷇趙武靈王事見四卷周赧王二十年探吐南翻蔵徂浪翻空請熊蹯詎延晷刻之命左傳楚世子商臣圍其父成王王請食熊蹯而死不許乃縊杜預注曰熊蹯難熟冀久将有外救蹯音煩外崩中潰今實其時鷸蚌相持我乗其弊戰國策趙且伐燕蘓代為燕謂恵王曰今者臣來過易水蚌方出曝而鷸啄其肉蚌合而拑其喙鷸曰今日不雨明日不雨必有死蚌蚌亦謂鷸曰今日不出明日不出即有死鷸兩者不肯相舎漁父得而并禽之今趙且伐燕燕趙久相支以弊大衆臣恐彊秦之為漁父也方使駿騎追風精甲輝日四七並列漢光武用二十八将以定天下後人賛之曰授鉞四七百萬為羣以轉石之形孫子曰任勢者其戰人也如轉木石木石之性安則静危則動方則止圓則行故善戰人之勢如轉圓石於千仭之山者勢也為破竹之勢破竹杜預之言見八十一卷晉武帝太康元年當使鍾山渡江青盖入洛荆棘生於建業之宫麋鹿遊於姑蘓之館青盖入洛事見七十九卷晉武帝泰始八年漢淮南王安隂有邪謀伍被諫曰昔子胥諫吳王吳王不用乃曰臣今見麋鹿遊姑蘓之臺也今臣亦見宫中将生荆棘露霑衣也但恐革車之所轥轢轥力刃翻踐也轢來各翻碾也劎騎之所蹂踐把梓於焉傾折竹箭以此摧殘杞梓竹箭東南之嘉産也蹂人九翻踐息淺翻折而設翻若吳之王孫蜀之公子晉左思設為東吴王孫西蜀公子以賦三都弼引用之歸欵軍門委命下吏當即授客卿之秩特加驃騎之號凡百君子勉求多福李斯自楚入秦為客卿孫秀自吳奔晉為驃騎将軍弼以此誘南人要亦書檄之常談耳其後梁室禍敗皆如弼言侯景圍譙城不下退攻城父拔之壬申遣其行臺左丞王偉等詣建康説上曰説式芮翻鄴中文武合謀召臣共討髙澄事泄澄幽元善見於金墉殺諸元六十餘人河北物情俱念其主請立元氏一人以從人望如此則陛下有繼絶之名臣景有立功之效河之南北為聖朝之邾莒言為小國以附于大國朝直遥翻國之男女為大梁之臣妾上以為然此杜弼所謂進孰圖身者也帝早在兵間曽不見此盖天奪其鑒也乙亥下詔以太子舎人元貞為咸陽王辰考異曰梁紀作戊遣貞今從典略資以兵力使還北主魏須渡江許即位須待也儀衞以乗輿之副給之乗繩證翻貞樹之子也元樹來奔中大通四年為樊子鵠所禽蕭淵明至鄴東魏主升閶闔門受俘讓而釋之送於晉陽大将軍澄待之甚厚為澄因淵明約和以間侯景張本慕容紹宗引軍擊侯景景輜重數千兩馬數千匹士卒四萬人退保渦陽輜重之上當有景字文意乃明重直用翻兩音亮渦音戈紹宗士卒十萬旗甲耀日鳴鼓長驅而進景使謂之曰公等為欲送客為欲定雌雄邪紹宗曰欲與公决勝負遂順風布陳陳讀曰陣景閉壘俟風止乃出戰不逆風故景俟風止乃出紹宗曰侯景多詭計好乗人背使備之果如其言景命戰士皆被短甲好呼到翻被皮義翻執短刀入東魏陳但低視斫人脛馬足東魏兵遂敗被短甲執短刀入敵陳力戰此必死之兵也紹宗之敗不亦宜乎其後景用此以敵陳霸先亦此術耳惟陳堅不可破是以一敗不能復振卒以走死紹宗墜馬儀同三司劉豐生被傷顯州刺史張遵業為景所擒魏收志永安中置顯州治汾州六壁城領定戎建平真君郡紹宗豐生俱奔譙城禆将斛律光張恃顯尤之尤之者責過之也将即亮翻紹宗曰吾戰多矣未見如景之難克者也君輩試犯之光等被甲将出紹宗戒之曰勿度渦水二人軍於水北光輕騎射之被皮義翻渦工禾翻射而亦翻下為射遷射同景臨渦水謂光曰爾求勲而來我懼死而去我汝之父友光父斛律金與景同事爾朱髙歡故自謂父友何為射我汝豈自解不度水南解户買翻慕容紹宗教汝也光無以應景使其徒田遷射光馬洞胷光易馬隠樹又中之中竹仲翻退入於軍景擒恃顯既而捨之光走入譙城紹宗曰今定何如而尤我也光金之子也開府儀同三司叚韶夹渦而軍潛於上風縱火景帥騎入水出而却走草濕火不復然斛律光之勇雖不利段韶之智雖不獲逞然東魏之士氣未衰也故慕容紹宗乗機而運其巧得以成功觀史者若祗以一時勝負論人非有識畧者也帥讀曰率復扶又翻魏岐州久經喪亂喪息浪翻刺史鄭穆初到有户三千穆撫循安集數年之間至四萬餘户考績為諸州之最丞相㤗擢穆為京兆尹侯景與東魏慕容紹宗相持數月景食盡司馬世雲降於紹宗至是則侯景潰敗之形成矣資治通鑑卷一百六十
