午上遣中使發元載祖父墓斵棺弃尸毁其家廟焚其木主戊寅卓英倩等皆杖死英倩之用事也弟英璘横於鄉里璘離珍翻横户孟翻及英倩下獄下户嫁翻英璘遂據險作亂上𤼵禁兵討之乙巳金州刺史孫道平擊擒之上方倚楊綰使釐革弊政㑹綰有疾秋七月己巳薨上痛悼之甚謂羣臣曰天不欲朕致太平何奪朕楊綰之速八月癸未賜東川節度使鮮于叔明姓李氏使疎吏翻元載王縉之為相也上日賜以内厨御饌可食十人饌雛戀翻又雛晥翻食祥吏翻遂為故事癸卯常衮與朱泚上言餐錢已多餐錢盖所謂食料錢也泚且禮翻又音此上時掌翻乞停賜饌許之衮又欲辭堂封同列不可而止唐制堂封嵗三千六百縑興元後纔千一百徳宗尋復舊時人譏衮以為朝廷厚禄所以養賢不能當辭位不當辭禄朝直遥翻臣光曰君子恥食浮於人衮之辭禄廉恥存焉與夫固位貪禄者不猶愈乎夫音扶詩云彼君子兮不素餐兮詩伐檀之辭如衮者亦未可以深譏也楊綰常衮薦湖州刺史顔眞卿大厯元年眞卿以攻元載貶峽州别駕尋改為吉州司馬遷撫湖二州刺史上即日召還還從宣翻又音如字甲辰以為刑部尚書尚辰羊翻綰衮又薦淮南判官汲人闗播擢為都官員外郎唐都官郎掌配役𨽻簿録俘囚以給衣糧藥療以理訴競雪寃凢公私良賤必周知之屬刑部九月辛酉以四鎮北庭行營兼涇原鄭潁節度使叚秀實為節度使西考異曰叚公别傳曰自受鉞三五年間鄰無烽燧之警又曰戎帥論乞力陀慕公清徳不敢侵陵我疆舊傳亦曰三四年間吐蕃不敢犯塞按是月吐蕃冦原州十二月朱泚拒吐蕃自涇州還明年九月吐蕃逼涇州云三四年間不敢犯塞盖史家溢美之辭耳秀實軍令簡約有威惠奉身清儉室無姬妾非公㑹未嘗飲酒聽樂吐蕃八萬衆軍于原州北長澤監盖長澤川唐舊置馬監於此吐從暾入聲下同己巳破方渠方渠漢縣屬北地郡後省中宗神龍三年分馬嶺置方渠縣屬慶州宋白續通典靈州方渠鎮宋初置通逺軍秦長城在城北一里入拔谷郭子儀使禆將李懷光救之吐蕃退庚午吐蕃冦坊州冬十月乙酉西川節度使崔寧奏大破吐蕃於望漢城吐蕃築城於西山以望蜀因名望漢城使疎吏翻先是秋霖河中府池鹽多敗河中府管下安邑解縣皆有鹽池先悉薦翻户部侍郎判度支韓滉恐鹽户減税丁亥奏雨雖多不害鹽仍有瑞鹽生度徒洛翻滉呼廣翻宋白曰大厯初韓滉進漫生鹽以為靈瑞後又奏乳鹽生上疑其不然遣諫議大夫義興蔣鎮往視之義興漢陽羡縣地晉置義興郡及縣隋廢郡存縣以屬常州吐蕃冦鹽夏州又冦長武邠州冝禄縣有長武城時郭子儀遣李懷光築長武城據原首臨涇水俯瞰通道吐蕃自是不敢輕犯宋白曰長武鎮在鳯翔府麟遊縣界西至涇州四十里夏户雅翻郭子儀遣將拒却之將即亮翻以永平軍押牙匡城劉洽為宋州刺史舊考異曰劉𤣥佐傳云李靈曜據汴州洽將兵乗其無備徑入宋州按劉昌以宋州牙門將説李僧惠歸順則是僧惠先已為靈曜守宋州朝廷因授宋州刺史耳若僧惠未降則洽不能得宋州已降則不敢取宋州盖僧惠已為李忠臣所殺洽因引兵據宋州耳舊傳欲以為洽功故云然其實非也永平軍治滑州仍以宋泗二州𨽻永平軍京兆尹黎幹奏秋霖損稼韓滉奏幹不實上命御史按視丁未還奏所損凢三萬餘頃渭南令劉澡渭南縣唐初屬華州時屬雍州宋白曰郭縁生述征記云渭南縣夷狄所置謂苻姚也阿附度支謂阿附韓滉度徒洛翻稱縣境苗獨不損御史趙計奏與澡同上曰霖雨溥博豈得渭南獨無更命御史朱敖視之損三千餘頃上歎息久之曰縣令字人之官不損猶應言損廼不仁如是乎貶澡南浦尉後魏分朐䏰縣置漁泉縣後周改曰萬川隋改曰南浦唐帶萬州計澧州司户而不問滉澧音禮滉呼廣翻十一月壬子山南西道節度使張獻恭奏破吐蕃萬餘衆于岷州使疎吏翻吐從暾入聲丙辰蔣鎮還奏言瑞鹽實如韓滉所言仍上表賀還從宣翻又音如字上時掌翻請宣付史臣錫以嘉名上從之賜號寶應靈應池賜號者安邑池也時人醜之十二月丙戌朱泚自涇州還京師朱泚自幽州入朝遂留京師因遣防秋而還還從宣翻又音如字丁亥崔寧奏破吐蕃十餘萬衆斬首八千餘級吐從暾入聲庚子以朱泚兼隴右節度使知河西澤潞行營平盧節度使李正已先有淄青齊海登萊沂宻徳棣十州之地及李靈曜之亂諸道合兵攻之所得之地各為己有正已又得曺濮徐兖鄆五州因自青州徙治鄆州使其子前淄州刺史納守青州濮博木翻鄆音運考異曰實録此年二月丙戌以納為青州刺史充淄青留後至此又云為青州刺史舊正已傳云正已自青州徙居鄆州使子納及腹心之將分理其地納傳云正已擊田承嗣署奏留後尋遷青州刺史今從之正已用刑嚴峻所在不敢偶語然法令齊一賦均而輕擁兵十萬雄據東方鄰藩皆畏之是時田承嗣據魏博相衛洺貝澶七州澶州漢東郡頓丘縣地隋開皇十六年分頓丘置澶淵縣唐改曰澶水避高祖諱也武徳四年分黎州之澶水魏州之頓丘觀州置澶州貞觀元年州廢大厯七年田承嗣表以魏州之頓丘臨黄復置澶州嗣祥吏翻相息亮翻洺音名澶時連翻李寶臣據恒易趙定深冀滄七州各擁衆五萬梁崇義據襄鄧均房復郢六州有衆二萬相與相根據蟠結雖奉事朝廷而不用其法令恒户登翻朝直遥翻官爵甲兵租賦刑殺皆自專之上寛仁一聽其所為朝廷或完一城增一兵輒有怨言以為猜貳常為之罷役為于偽翻而自於境内築壘繕兵無虛日以是雖在中國名藩臣而實如蠻貊異域焉十三年春正月辛酉勑毁白渠支流碾磑以漑田碾尼展翻磑五對翻磨也公輸班作磑後人又激水為之不煩人力引水激輪使自旋轉謂之水磨史炤曰碾磨也磑䃺也昇平公主有二磑入見於上請存之見賢遍翻上曰吾欲以利蒼生汝識吾意當為衆先公主即日毁之戊辰回紇冦太原河東押牙泗水李自良曰紇下没翻唐節度使置都押牙牙前重職也即今制置使司帳前都提舉之職泗水縣屬兖州漢之卞縣也隋時分西界為汶陽縣於卞縣古城置泗水縣回紇精鋭逺來求鬬難與爭鋒不如築二壘於歸路以兵戍之虜至堅壁勿與戰彼師老自歸乃出軍乗之二壘抗其前大軍蹙其後無不捷矣留後鮑防不從遣大將焦伯瑜等逆戰癸酉遇虜於陽曲將即亮翻宋白曰陽曲漢舊縣後漢末移於太原北四十五里後魏南移於陽曲故城隋改曰陽直又移於汾陽故城改曰汾陽縣因漢汾陽縣名也煬帝又改陽直移理木井城今縣是也大敗而還死者萬餘人回紇縱兵大掠二月代州都督張光晟擊破之於羊武谷還從宣翻又音如字紇下没翻晟成正翻九域志代州崞縣有陽武寨乃引去上亦不問回紇入冦之故待之如初己亥吐蕃遣其將馬重英帥衆四萬冦靈州吐從暾入聲帥讀曰率奪填漢御史尚書三渠水口以弊屯田史炤曰三渠謂填漢渠御史渠尚書渠也填讀曰鎮三月甲戌回紇使還過河中朔方軍士掠其輜重朔方軍士之留屯河中者使疎吏翻過古禾翻又古臥翻輜莊持翻重直用翻因大掠坊市夏四月甲辰吐蕃冦靈州朔方留後常謙光擊破之六月戊戌隴右節度使朱泚獻猫䑕同乳不相害者以為瑞泚且禮翻又音此乳如住翻常衮帥百官稱賀帥讀曰率中書舍人崔祐甫獨不賀曰物反常為妖猫捕䑕乃其職也今同乳妖也妖於驕翻何乃賀為宜戒法吏之不察姧邊吏之不禦冦者以承天意上嘉之祐甫沔之子也崔沔開元名臣沔彌兖翻秋七月以祐甫知吏部選事祐甫數以公事與常衮爭由是惡之為衮奏貶祐甫張本選須絹翻數所角翻惡烏路翻戊午郭子儀奏以回紇猶在塞上邊人恐懼請遣邠州刺史渾瑊將兵鎮振武軍邠卑旻翻瑊古咸翻將即亮翻又音如字振武軍在單于都護府城内秦漢之雲中郡城也宋白曰振武軍即漢定襄郡之盛樂縣也在隂山之陽黄河之北從之回紇始去辛未吐蕃將馬重英二萬衆冦鹽慶二州重直龍翻郭子儀遣朔方都虞候李懷光擊却之八月乙亥成徳節度使李寶臣請復姓張許之寶臣賜姓見二百二十二卷寶應元年使疏吏翻吐蕃二萬衆冦銀麟州略党項雜畜吐從暾入聲銀州漢西河郡圁隂縣地麟州漢新秦中之地党底朗翻畜許救翻郭子儀遣李懷光擊破之上悼念貞懿皇后不已貞懿皇后獨孤妃也十年薨殯于内殿累年不忍𦵏丁酉始葬于莊陵莊陵在京兆三原縣西北五里九月庚午吐蕃萬騎下青石嶺逼涇州青石嶺在涇州保定縣西宋白曰臨涇城直涇州西北九十里其界有青石嶺騎竒寄翻詔郭子儀朱泚與叚秀實共却之冬十二月丙戌以吏部尚書轉運鹽鐵等使劉晏為左僕射知三銓及使職如故尚辰羊翻射寅謝翻歐陽修曰凢選有文武文選吏部主之武選兵部主之皆為三銓尚書侍郎分主之尚書掌其一侍郎分其二郭子儀入朝命判官京兆杜黄裳主留務李懷光隂謀代子儀矯為詔書欲誅大將温儒雅等黄裳察其詐以詰懷光朝直遥翻將即亮翻詰去吉翻懷光流汗服罪於是諸將之難制者黄裳矯子儀之命皆出之於外軍府乃安以給事中杜亞為江西觀察使上召江西判官李泌入見泌毗必翻李泌出佐江西見上卷五年見賢遍翻語以元載事曰與卿别八年乃能誅此賊賴太子𤼵其隂謀此歸功於太子耳語牛倨翻不然幾不見卿對曰臣昔日固嘗言之陛下知羣臣有不善則去之幾居依翻去𦍑吕翻含容太過故至於此上曰事亦應十全不可輕𤼵上因言朕面屬卿於路嗣恭屬之欲翻而嗣恭取載意奏卿為䖍州别駕嗣恭初平嶺南獻琉璃盤徑九寸朕以為至寶及破載家得嗣恭所遺載琉璃盤徑尺遺于季翻程大昌曰漢西域傳罽賔國有琥珀流離師古注曰魏略云大秦國出赤白黑黄青緑縹紺紅紫十種流離此盖自然之物采澤光潤踰于衆玉今俗所用皆消冶石汁加以衆藥灌而為之虛脆不耐實非眞物案流離今書附玉旁為琉璃字師古之記是矣亦未得其詳也穆天子傳天子東征有采石之山凡好石之器於是出升山取采石鑄以成器注云采石文采之石也則鑄石為器古有之矣顔氏謂為自然之物恐不詳也北史大月氏傳魏太武礦時月氏人商販京師自云能鑄石為五色琉璃於是采於山中即京師鑄之既成光澤乃美於西方來者自是琉璃遂賤由此言推之則雖西域琉璃亦用石鑄無自然生成者兼外國竒産中國未始無之獨不聞有所謂眞琉璃也然中國所鑄有與西域異者鑄之中國色甚光鮮而質則輕脆沃以熱酒隨手破裂其來自海舶者制差鈍樸而色亦㣲暗其可異者雖百沸湯注之與磁銀無異了不復動是名蕃琉璃也蕃琉璃之異於中國其别盖如此而未嘗聞以石琢之也余謂路嗣恭所獻者盖師古所謂大秦琉璃自然之物否則代宗何以謂之至寶哉程大昌考之不詳耳俟其至當與卿議之泌曰嗣恭為人小心善事人畏權勢精勤吏事而不知大體昔為縣令有能名路嗣恭始名劍客為蕭闗令連徙神烏姑臧二縣考績為天下最𤣥宗以為可嗣漢魯恭因賜名陛下未暇知之而為載所用故為之盡力陛下誠知而用之彼亦為陛下盡力矣為之亦為于偽翻䖍州别駕臣自欲之非其罪也且嗣恭新立大功即謂平嶺南之功陛下豈得以一琉璃盤罪之邪上意乃解以嗣恭為兵部尚書邪音耶尚辰羊翻郭子儀以朔方節度副使張曇性剛率謂其以武人輕已銜之曇徒含翻銜户緘翻孔目官吴曜為子儀所任諸鎮州皆有孔目官以綜理衆事吏職也言一孔一目皆所綜理也因而搆之子儀怒誣奏曇扇動軍衆誅之掌書記高郢力爭之子儀不聽奏貶郢猗氏丞猗氏縣屬河中府宋白曰本郇國地猗頓於此起富故曰猗氏既而僚佐多以病求去子儀悔之悉薦之於朝曰吴曜誤我遂逐之史言郭子儀過而能改朝直遥翻常衮言於上曰陛下久欲用李泌泌毘必翻昔漢宣帝欲用人為公卿必先試理人請且以為刺史使周知人間利病俟報政而用之太公治齊五月而報政伯禽治魯三年而報政常衮用此語也十四年春正月壬戍以李泌為澧州刺史澧音禮二月癸未魏博節度使田承嗣薨使疏吏翻嗣祥吏翻有子十一人以其姪中軍兵馬使悦為才使知軍事而諸子佐之甲申以悦為魏博留後為田緒殺悦張本淮西節度使李忠臣貪殘好色將吏妻女美者多逼淫之悉以軍政委妺壻節度副使張惠光惠光挾勢暴横軍州苦之忠臣復以惠光子為牙將暴横甚於其父好呼到翻横户孟翻復扶又翻將即亮翻左廂都虞候李希烈忠臣之族子也為衆所服希烈因衆心怨怒三月丁未與大將丁暠等暠古老翻殺惠光父子而逐忠臣忠臣單騎奔京師騎竒寄翻上以其有功吐蕃冦京師忠臣先諸鎮赴援又有平李靈曜之功使以檢校司空同平章事留京師以希烈為蔡州刺史淮西留後為李希烈以淮蔡畔援張本以永平節度使李勉兼汴州刺史增領汴潁二州徙鎮汴州永平軍本治滑州汴皮變翻辛酉以容管經略使王翃為河中少尹知府事河東副元帥留後部將凌正暴横翃抑之使疏吏翻翃户萌翻少始照翻帥所類翻將即亮翻横户孟翻正與其徒乗夜作亂翃知之故縮漏水數刻以差其期賊驚潰走擒正誅之軍府乃安成徳節度使張寶臣既請復姓去年寶臣請復姓張又不自安更請賜姓夏四月癸未復賜姓李復扶又翻五月癸卯上始有疾辛酉制皇太子監國監古銜翻是夕上崩于紫宸之内殿上年五十二紫宸殿在東内宣政殿之北蓬萊殿之南遺詔以郭子儀攝冢宰癸亥徳宗即位在諒隂中動遵禮法嘗召韓王迥食迥徳宗弟也食馬齒羹不設鹽酪馬齒莧也酪音洛乳酪也常衮性剛急為政苛細不合衆心時羣臣朝夕臨臨力鴆翻哭也衮哭委頓從吏或扶之從才用翻中書舍人崔祐甫指以示衆曰臣哭君前有扶禮乎衮聞益恨之㑹議羣臣䘮服衮以為禮臣為君斬衰三年為于偽翻衰倉回翻漢文權制猶三十六日事見十五卷前漢文帝後七年高宗以來皆遵漢制及𤣥宗肅宗之䘮始服二十七日今遺詔云天下吏人三日釋服古者卿大夫從君而服皇帝二十七日而除在朝羣臣亦當如之祐甫以為遺詔無朝臣庶人之别朝直遥翻下同别彼列翻朝野内外莫非天下凡百執事孰非吏人皆應釋服相與力爭聲色陵厲衮不能堪乃奏祐甫率情變禮請貶潮州刺史上以為太重閏月壬申貶祐甫為河南少尹初肅宗之世天下務殷宰相常有數人更直决事更工衡翻或休沐各歸私第詔直事者代署其名而奏之自是踵為故事時郭子儀朱泚雖以軍功為宰相皆不預朝政衮獨居政事堂唐初政事堂在門下省裴炎自侍中遷中書令乃徙政事堂於中書省三省長官議事於此代二人署名奏祐甫祐甫既貶二人表言其非罪上問卿向言可貶今云非罪何也二人對初不知上初即位以衮為欺罔大駭甲辰百官衰絰序立于月華門程大昌日按六典宣政殿前有兩廡兩廡各自有門其東曰日華日華之東則門下省也西廊有門曰月華月華之西則中書省也衰倉回翻有制貶衮為潮州刺史潮州去京師五千許里以祐甫為門下侍郎同平章事聞者震悚祐甫至昭應而還昭應縣本新豐縣垂拱二年改曰應山神龍元年復故名𤣥宗更名昭應隋新豐治古新豐城北天寶昭應縣治昭應宫北還從宣翻又音如字既而羣臣䘮服竟用衮議上時居諒隂庶政皆委於祐甫所言無不允初至徳以後天下用兵諸將競論功賞故官爵不能無濫及永泰以來天下稍平而元載王縉秉政四方以賄求官者相屬於門將即亮翻論魯昆翻載祖亥翻又音如字縉音晉屬之欲翻大者出於載縉小者出於卓英倩等皆如所欲而去及常衮為相思革其弊杜絶僥幸四方奏請一切不與而無所甄别賢愚同滯相息亮翻僥堅堯翻甄稽延翻察也别彼列翻崔祐甫代之欲收時望推薦引㧞常無虛日作相未二百日除官八百人未考異曰舊紀云祐甫作相逾年凡除吏幾八百員多稱允當今從建中實録前後相矯終不得其適上嘗謂祐甫曰人或謗卿所用多渉親故何也對曰臣為陛下選擇百官為于偽翻不敢不詳慎茍平生未之識何以諳其才行而用之諳烏含翻行下孟翻下同上以為然臣光曰臣聞用人者無親疎新故之殊惟賢不肖之為察其人未必賢也以親故而取之固非公也茍賢矣以親故而捨之亦非公也夫天下之賢固非一人所能盡也若必待素識熟其才行而用之所遺亦多矣夫音扶行下孟翻古之為相者則不然舉之以衆取之以公衆曰賢矣己雖不知其詳姑用之待其無功然後退之有功則進之所舉得其人則賞之非其人則罰之進退賞罰皆衆人所共然也己不置豪髪之私於其間茍推是心以行之又何遺賢曠官之足病哉詔罷省四方貢獻之不急者又罷梨園使及樂工三百餘人使疏吏翻梨園事始二百一十一卷𤣥宗開元二年程大昌曰梨園在光化門北光化門者禁苑南面西頭第一門所留者悉𨽻太常郭子儀以司徒中書令領河中尹靈州大都督單于鎮北大都護闗内河東副元帥朔方節度闗内支度鹽池六城水運大使押蕃部及營田及河陽道觀察等使河中靈夏皆有鹽池朔方塞下有六城單音蟬帥所類翻使疏吏翻權任既重功名復大復扶又翻性寛大政令頗不肅代宗欲分其權而難之久不决甲申詔尊子儀為尚父太公望為周師尚父説者謂可尚可父天子師也加太尉兼中書令增實封滿二千户月給一千五百人糧二百馬食子弟諸壻遷官者十餘人所領副元帥諸使悉罷之以其禆將河東朔方都虞候李懷光為河中尹邠寧慶晉絳慈隰節度使以朔方留後兼靈州長史常謙光為靈州大都督西受降城定逺天徳鹽夏豐等軍州節度使振武軍使渾瑊為單于大都護東中二受降城振武鎮北綏銀麟勝等軍州節度使分領其任將即亮翻邠卑旻翻長知兩翻降户江翻夏户雅翻渾户昆翻又户本翻瑊古咸翻丙戌詔曰澤州刺史李鷃鷃烏諫翻上慶雲圖上時掌翻下得上上言同朕以時和年豐為嘉祥以進賢顯忠為良瑞如卿雲靈芝珍禽竒獸怪草異木何益於人卿雲即慶雲也布告天下自今有此無得上獻内莊宅使上言諸州有官租萬四千餘斛上令分給所在充軍儲先是諸國屢獻馴象凢四十有二令力丁翻先悉薦翻上曰象費豢養而違物性將安用之命縱於荆山之陽此禹貢所謂導汧及岐至于荆山者也唐屬京兆富平縣界及豹貀鬬雞獵犬之類悉縱之貀似豹無前足音女滑翻史炤曰貀似貍蒼黑無前足善捕䑕又出宫女數百人於是中外皆悦淄青軍士至投兵相顧曰明主出矣吾屬猶反乎淄莊持翻戊子以淮西留後李希烈為節度使使疏吏翻辛卯以河陽鎮遏使馬燧為河東節度使河東承百井之敗謂去年鮑防之敗也按東都事略張齊賢傳柏井在并州城北四十里宋朝徙并州城於陽曲縣騎士單弱燧悉召牧馬厮役得數千人教之數月皆為精騎騎竒寄翻造甲必為長短三等稱其所衣稱尺證翻衣於既翻以便進趨又造戰車行則載兵甲止則為營陳或塞險以遏奔衝陳讀曰陣塞悉則翻器械無不精利居一年得選兵三萬辟兖州人張建封為判官署李自良代州刺史委任之兵部侍郎黎幹狡險䛕佞與宦官特進劉忠翼相親善忠翼本名清譚恃寵貪縱二人皆為衆所惡惡烏路翻時人或言幹忠翼嘗勸代宗立獨孤貴妃為皇后妃子韓王迥為太子上即位幹宻乗轝詣忠翼謀事事覺丙申幹忠翼並除名長流至藍田賜死以户部侍郎判度支韓滉為太常卿以吏部尚書劉晏判度支度徒洛翻滉呼廣翻尚辰羊翻先是晏滉分掌天下財賦先悉薦翻大厯六年韓滉判度支分掌財賦當在此時晏掌江南山南江淮嶺南滉掌闗内河東劒南至是晏始兼之上素聞滉掊克過甚掊蒲矦翻故罷其利權尋出為晉州刺史晉州治臨汾縣古平陽也京師東北七百二十五里至徳初第五𤦺始𣙜鹽以佐軍用事見二百一十九卷至徳元載𤦺音竒𣙜古岳翻及劉晏代之法益精宻初嵗入錢六十萬緡末年所入逾十倍而人不厭苦大厯末計一嵗所入總一千二百萬緡緡眉巾翻而鹽利居其大半以鹽爲漕傭自江淮至渭橋此東渭橋也率萬斛傭七千緡自淮以北列置廵院擇能吏主之不煩州縣而集事六月己亥朔赦天下西川節度使崔寧永平節度使李勉並同平章事使疏吏翻詔天下寃滯州府不為理為于偽翻聽詣三司使所謂三司使即御史中丞中書省舍人門下省給事中也三人者各以一司官來朝堂受詞故謂之三司非五代時理財之三司使也以中丞舍人給事中各一人日於朝堂受詞推决尚未盡者聽撾登聞鼓唐時登聞鼓在西朝堂之前撾側𤓰翻自今無得復奏置寺觀復扶又翻及請度僧尼於是撾登聞鼓者甚衆右金吾將軍裴諝上疏諝私吕翻以為訟者所爭皆細故若天子一一親之則安用吏理乎上乃悉歸之有司制應山陵制度務從優厚當竭帑藏以供其費帑他朗翻藏徂浪翻刑部員外郎令狐峘上疏諫令力丁翻峘胡登翻上時掌翻其略曰臣伏讀遺詔務從儉約若制度優厚豈顧命之意邪邪音耶上答詔略曰非唯中朕之病中竹仲翻抑亦成朕之美敢不聞義而徙峘徳棻之𤣥孫也令狐徳棻事太宗棻扶分翻庚子立皇子誦為宣王謨為舒王諶為通王諒為䖍王詳為肅王乙巳立皇弟廼為益王傀為蜀王諶氏壬翻傀口猥翻又公回翻皆以州名為王國名丙午舉先天故事六品以上清望官雖非供奉侍衛之官日令二人更直待制以備顧問新志曰初太宗即位命京官五品以上更宿中書門下兩省以備訪問永徽巾命𢎞文館學士一人日待制於武徳殿西門文明元年詔京官五品以上清官日一人待制于章善明福門先天末又命朝集使六品以上隨仗待制永泰時勲臣罷節制無職事皆待制于集賢門凡十三人崔祐甫為相建議文官一品以下更直待制其後著令正衙待制官日二人宋白曰時祐甫奏准元敕文官一品以下更直待制其待制官待奏事官盡然後趨出便於内廊賜待進止至酉時然後放令力丁翻更工衡翻下同庚戍以朱泚為鳯翔尹泚且禮翻又音此代宗優寵宦官奉使四方者不禁其求取嘗遣中使賜妃族還問所得頗少使疎吏翻還從宣翻又音如字少詩沼翻代宗不悦以為輕我命妃懼遽以私物償之由是中使公求賂遺無所忌憚遺于季翻宰相嘗貯錢於閣中毎賜一物宣一㫖無徒還者相息亮翻貯丁吕翻出使所厯州縣移文取貨與賦税同皆重載而歸上素知其弊遣中使邵光超賜李希烈旌節希烈贈之僕馬及縑七百匹黄茗二百斤茗莫迥翻茶之晩取者上聞之怒杖光超六十而流之於是中使之未歸者皆濳弃所得於山谷雖與之莫敢受甲子以神䇿都知兵馬使右領軍大將軍王駕鶴為東都園苑使東都園苑使唐初苑總監之職也以司農卿白琇珪代之琇息救翻更名志貞駕鶴典禁兵十餘年權行中外上恐其生變崔祐甫吕駕鶴與語留連久之琇珪己視事矣李正已畏上威名表獻錢三十萬緡上欲受之恐見欺却之則無辭崔祐甫請遣使慰勞淄青將士使疏吏翻勞力到翻將即亮翻因以正已所獻錢賜之使將士人人戴上恩又諸道聞之知朝廷不重貨財上悦從之正已大慙服天下以為太平之治庶幾可望焉治直吏翻幾居衣翻秋七月戊辰朔日有食之禮儀使吏部尚書顔眞卿上言上元中政在宫壼始增祖宗之諡尚辰羊翻上時掌翻壼若本翻宫中道也按咸亨五年八月十五日改元上元是日追尊高祖太宗政在宫壼謂武后專政也𤣥宗末姦臣竊命累聖之諡有加至十一字者按天寶十三載加祖宗謚號并廟號皆為九字而羣臣上𤣥宗尊號凡十四字未知顔眞卿所謂加至十一字何帝也謚神至翻按周之文武言文不稱武言武不稱文豈盛徳所不優乎蓋羣臣稱其至者故也故諡多不為褒少不為貶少始紹翻今累聖諡號太廣有踰古制請自中宗以上皆從初謚初謚高祖太武皇帝太宗文皇帝高宗天皇大帝中宗孝和皇帝睿宗曰聖眞皇帝𤣥宗曰孝明皇帝肅宗曰宣皇帝以省文尚質正名敦本上命百官集議儒學之士皆從眞卿議獨兵部侍郎袁傪傪昌含翻又七感翻官以兵進奏言陵廟玉册木主皆已刋勒不可輕改事遂寢不知陵中玉册所刻乃初謚也按唐陵中玉册自睿宗聖眞皇帝以上所刻皆初謚然𤣥宗謚册曰至道大聖大明孝皇帝肅宗謚册曰文明武徳大聖大宣孝皇帝袁傪所謂木主玉册皆已刋勒有見乎此耳初代宗之世事多留滯四夷使者及四方奏計或連嵗不遣乃於右銀臺門使䟽吏翻右銀臺門在東内宫城西面又北則九仙門置客省以處之處昌吕翻及上書言事失職未叙亦寘其中動經十嵗常有數百人并部曲畜産動以千計度支廩給其費甚廣度徒洛翻上悉命䟽理拘者出之事竟者遣之當叙者任之嵗省榖萬九千二百斛壬申毁元載馬璘劉忠翼之第載祖亥翻又音如字璘離珍翻初天寶中貴戚第舍雖極奢麗而垣屋高下猶存制度然李靖家廟已為楊氏馬廐矣及安史亂後法度墮弛墮讀曰隳大臣將帥競治第舍各窮其力而後止時人謂之木妖將即亮翻帥所類翻治直之翻妖於驕翻上素疾之故毁其尤者仍命馬氏獻其園𨽻宫司宫司掌宫禁園籞者也謂之奉成園雍録奉成園在安邑坊自丹鳯門南出東街第六坊為安邑坊癸丑減常貢宫中服用錦千匹服玩數千事庚辰詔回紇諸胡在京師者各服其服無得效華人先是回紇留京師者常千人紇下没翻先悉薦翻商胡偽服而雜居者又倍之縣官日給饔餼熟曰饔生曰餼餼許既翻殖貲産開第舍市肆美利皆歸之日縱貪横横户孟翻吏不敢問或衣華服衣於既翻華服中華之服也誘取妻妾故禁之誘羊久翻辛卯罷天下𣙜酒收利唐初無酒禁乾元元年京師酒貴肅宗以廩食方絀乃禁京師酤酒期以麥熟如初二年饑復禁酤廣徳二年定天下酤户以月收税𣙜古岳翻上之在東宫也國子博士河中張渉為侍讀太宗時晉王府有侍讀及為太子亦置焉即位之夕召渉入禁中事無大小皆咨之明日置於翰林為學士翰林故事曰翰林院者在銀䑓門内以藝能伎術召見者之所處也𤣥宗初置翰林待詔掌四方表䟽批答應和文章又以詔勑文誥悉由中書多壅滯始選朝官有才藝學識者入居翰林供奉别㫖然亦未定名制詔書敕猶或分在集賢開元二十六年始以翰林供奉改稱學士别建學士院於翰林院之南俾専内命其後又置東翰林院於金鑾殿之西隨上所在凢學士無定員下自校書郎上及諸曺尚書皆為之入院一嵗則遷知制誥未知制誥者不作文書久次者一人為承㫖親重無比為張渉以賦賄得罪張本乙未以渉為右散騎常侍仍為學士散悉亶翻騎竒寄翻資治通鑑卷二百二十五
