body:
  text: 資治通鑑卷二百二十五宋司馬光撰胡三省音註唐紀四十一起閼逢攝提格盡屠維恊洽七月凢五年有竒始甲寅終己未七月凢五年零七月代宗睿文孝武皇帝中之下大厯九年春正月壬寅田神功薨於京師田神功入朝見上卷上平澧朗鎮遏使楊猷自澧州㳂江而下擅出境至鄂州詔聽入朝猷遂泝漢江而上澧音禮使疏吏翻朝直遥翻泝蘇故翻下遐稼翻上時掌翻復州郢州皆閉城自守復郢二州皆賔漢此時盖為山南東道廵屬守式又翻山南東道節度使梁崇義𤼵兵備之二月辛未徐州軍亂刺史梁乘逾城走徐州治彭城諫議大夫呉損使吐蕃留之累年竟病死虜中吐從暾入聲損出使見上卷六年庚辰汴宋兵防秋者千五百人盜庫財潰歸汴皮變翻作考異曰唐厯十日己酉按長厯是月庚午朔十日乃己夘也今從實録田神功薨故也己丑以神功弟神玉知汴宋留後癸巳郭子儀入朝上言朔方國之北門中間戰士耗散什纔有一今吐蕃兼河隴之地雜羌渾之衆朝直遥翻史炤曰羌党項之屬渾吐谷渾也勢强十倍願更於諸道各𤼵精卒成四五萬人則制勝之道必矣三月戊申以皇女永樂公主許妻魏博節度使田承嗣之子華樂音洛妻七細翻嗣祥吏翻上意欲固結其心而承嗣益驕慢史言狼子野心不可以恩結以澧朗鎮遏使楊猷為洮州刺史隴右節度兵馬使澧音禮使疏吏翻洮土刀翻洮州時已陷吐蕃楊猷特領刺史耳夏四月甲申郭子儀辭還邠州子儀自邠入朝今還還從宣翻又音如字考異曰唐厯作癸未今從實錄復為上言邊事復扶又翻為于偽翻下為已仍為同至涕泗交流壬辰赦天下五月丙午楊猷自澧州入朝是年正月已書楊猷離澧州㳂江泝漢今方至京師朝直遥翻涇原節度使馬璘入朝諷將士為己表求平章事璘離珍翻將即亮翻丙寅以璘為左僕射璘離珍翻六月盧龍節度使朱泚遣弟滔奉表請入朝且請自將歩騎五千防秋上許之泚且禮翻又音此將即亮翻又音如字騎竒寄翻仍為先築大第於京師以待之癸未興善寺胡僧不空卒贈開府儀同三司司空賜爵肅國公謚曰大辯正廣智不空三藏和尚釋典云佛在多羅柰最初為五人説契經修多羅藏佛在羅閲祗最初為須那提説毗尼藏佛在毗舍離獼㺅池最初為跂耆説阿毗曇藏五百羅漢夜集阿毗曇相續解説經此為三藏學又三藏學經律論也卒子恤翻藏徂浪翻京師旱京兆尹黎幹作土龍祈雨自與巫覡更舞覡刑狄翻更工衡翻彌月不雨又禱於文宣王上聞之命撤土龍減膳節用秋七月戊午雨朱泚入朝至蔚州有疾蔚紆勿翻此自幽州西出山後取太原路入朝宋白曰蔚州西南至代州四百六十里諸將請還俟閒而行待病閒而行也將即亮翻閒讀如字泚曰死則輿尸而前諸將不敢復言復扶又翻九月庚子至京師士民觀者如堵安史亂後河北諸帥阻兵不朝朱泚之来長安士民以為美事辛丑宴泚及將士於延英殿盧文紀曰上元以來置延英殿或宰相欲有奏對或天子欲有咨度皆非時召見程大昌曰高宗初剏蓬萊宫諸門殿亭皆已立名至上元二年延英殿當御座生玉芝則是初有大明宫即有延英殿顧召對宰臣則始於代宗耳代宗以苖晉卿年老蹇甚聽入閭不趨為御延英此優禮也案六典宣政殿前西上閤門之西即為延英門延英門之左即延英殿故陽城欲救陸䞇約拾遺王仲舒守延英殿上疏伏閤不去也犒賞之盛近時未有壬寅回紇擅出鴻臚寺白晝殺人紇下没翻臚陵如翻有司擒之上釋不問甲辰命郭子儀李抱玉馬璘朱泚分綂諸道防秋之兵璘離珍翻泚且禮翻又音此冬十月壬申信王瑝薨乙亥梁王璿薨二王皆𤣥宗子信以州為國名瑝户肓翻又音皇璿似宣翻魏博節度使田承嗣誘昭義將吏使作亂使疏吏翻嗣祥吏翻誘羊久翻十年春正月丁酉昭義兵馬使裴志清逐留後薛㟧帥其衆歸承嗣帥讀曰率承嗣聲言救援引兵襲相州取之相息亮翻下同㟧奔洺州洺音名上表請入朝許之上時掌翻朝直遥翻辛丑郭子儀入朝壬寅壽王瑁薨瑁亦𤣥宗子音莫報翻乙巳朱泚表請留闕下以弟滔知幽州盧龍留後許之昭義禆將薛擇為相州刺史薛雄為衛州刺史薛堅為洺州刺史皆薛嵩之族也相衛洺本皆昭義廵屬戊申上命内侍魏知古如魏州諭田承嗣使各守封疆承嗣不奉詔癸丑遣大將盧子期取洺州楊光朝攻衛州乙卯西川節度使崔寧奏破吐蕃數萬於西山吐從暾入聲斬首萬級捕虜數千人丙辰詔諸道兵有逃亡者非承制勑無得輒召募二月乙丑田承嗣誘衛州刺史薛雄雄不從使盜殺之屠其家盡據相衛四州之地相衛已䧟於承嗣磁洺雖未下而承嗣已據其地相衛二州自此屬魏博自置長吏掠其精兵良馬悉歸魏州逼魏知古與共廵磁相二州磁疾之翻使其將士割耳𠢐面𠢐力之翻請承嗣為帥帥所類翻下同辛未立皇子述為睦王逾為郴王連為恩王遘為鄜王郴丑林翻鄜芳無翻迅為隨王造為忻王暹為韶王運為嘉王遇為端王遹為循王遹余律翻通為恭王逹為原王逸為雅王諸皇子皆以州為王國名丙子以華州刺史李承昭知昭義留後華戶化翻河陽三城使常休明河陽縣本屬懷州顯慶二年分屬河南府城臨大河長橋架水古稱設險此城後魏之北中城也東西魏兵爭又築中潬及南城謂之河陽三城乾元中史思明再䧟東京李光弼以重兵守河陽及雍王平賊令魚朝恩守河陽乃以河南之河清濟源温四縣租税入河陽三城使河南尹但禮領其縣額尋又以汜水軍賦屬之使疏吏翻苛刻少恩其軍士防秋者歸休明出城勞之少詩沼翻勞力到翻防秋兵與城内兵合謀攻之休明奔東都軍士奉兵馬使王惟恭為帥大掠數日乃定上命監軍冉庭蘭慰撫之監古銜翻三月甲午陜州軍亂逐兵馬使趙令珍陜失冉翻三考異曰唐厯月二十八日辛卯陜州軍亂實録唐綂紀云甲午朔今從之觀察使李國清不能禁卑辭徧拜將士乃得脱去陜失冉翻將即亮翻軍士大掠庫物㑹淮西節度使李忠臣入朝過陜朝直遥翻過古禾翻上命忠臣按之將士畏忠臣兵威不敢動忠臣設棘圍令軍士匿名投庫物設棘四圍周之令投所掠庫物於其中一日獲萬緡盡以給其從兵為賞緡眉巾翻從才用翻乙巳薛㟧常休明皆詣闕請罪上釋不問初成徳節度使李寶臣淄青節度使李正巳皆為田承嗣所輕使疏吏翻淄莊持翻嗣祥吏翻寶臣弟寶正娶承嗣女在魏州與承嗣子維擊毬馬驚誤觸維死承嗣怒囚寶正以告寶臣寶臣謝教勑不謹封杖授承嗣使撻之承嗣遂杖殺寶正由是兩鎮交惡及承嗣拒命寶臣正巳皆上表請討之上時掌翻上亦欲因其隙討承嗣夏四月乙未勑貶承嗣為永州刺史永州漢零陵郡隋廢郡為永州仍命河東成徳幽州淄青淮西永平汴宋河陽澤潞諸道𤼵兵前臨魏博若承嗣尚或稽違即令進討罪止承嗣及其姪悦自餘將士弟姪茍能自㧞一切不問令力丁翻將即亮翻時朱滔方恭順與寶臣及河東節度使薛兼訓攻其北正已與淮西節度使李忠臣等攻其南五月乙未承嗣將霍榮國以磁州降磁州滏陽郡本漢廣平縣地隋廢郡於滏陽縣置磁州治滏陽本漢成安縣地將即亮翻降户江翻下同磁牆之翻丁未李正已攻徳州㧞之徳州自此屬平盧軍李忠臣綂永平河陽懷澤歩騎四萬進攻衛州綂地綜翻俗讀從上聲六月辛未田承嗣遣其將裴志清等攻冀州志清以其衆降李寳臣甲戌承嗣自將圍冀州寶臣使高陽軍使張孝忠將精騎四千禦之寶臣大軍繼至承嗣燒輜重而遁重直用翻冀州治信都縣將即亮翻又音如字騎竒寄翻高陽軍當置于瀛州高陽縣兵志横海北平高陽等軍皆屬平盧道盖安史之亂以兵授張孝忠綂制而屬於李寶臣因授高陽軍使耳孝忠本奚也張孝忠奚人世為乙失活部酋長田承嗣以諸道兵四合部將多叛而懼秋八月遣使奉表請束身歸朝嗣祥吏翻將即亮翻使疎吏翻朝直遥翻辛巳郭子儀還邠州入朝而還所鎮還從宣翻又音如字邠卑旻翻作考異曰汾陽家傳丁丑今從實録子儀嘗奏除州縣官一人不報僚佐相謂曰以令公勲徳奏一屬吏而不從何宰相之不知體子儀聞之謂僚佐曰自兵興以來方鎮武臣多䟦扈凢有所求朝廷常委曲從之此無它乃疑之也今子儀所奏事人主以其不可行而置之是不以武臣相待而親厚之也諸君可賀矣又何怪焉聞者皆服史言郭子儀忠純己丑田承嗣遣其將盧子期㓂磁州將即亮翻磁牆之翻九月戊申回紇白晝刺市人腸出紇下没翻刺七亦翻有司執之繫萬年獄其酋長赤心馳入縣獄酋才由翻長知兩翻斫傷獄吏劫囚而去上亦不問壬子吐蕃㓂臨涇吐從暾入聲臨涇漢縣屬安定郡隋大業初改曰湫谷縣尋復曰臨涇縣唐屬涇州癸丑冦隴州及普潤大掠人畜而去百姓往往遣家屬出城竄匿丙辰鳯翔節度使李抱玉奏破吐蕃於義寧隴州華亭縣大厯八年置義寧軍李寶臣正已㑹于棗强棗强縣前漢屬清河郡後漢省晉復置屬廣川郡魏隋以來屬冀州進圍貝州田承嗣出兵救之兩軍各饗士卒成徳賞厚平盧賞薄既罷平盧士卒有怨言正已恐其為變引兵退寶臣亦退李忠臣聞之釋衛州南度河屯陽武陽武縣屬鄭州本原武城武徳四年置陽武縣北至衛州五十許里寶臣與朱滔攻滄州承嗣從父弟庭玠守之從才用翻寶臣不能克吐蕃㓂涇州涇原節度使馬璘破之於百里城吐從暾入聲使疏吏翻璘離珍翻考異曰汾陽家傳九月吐蕃略潘原西而還八日至小石門白草川十八日下朝那川二十三日至里城營支磨原入華亭十月公遣渾瑊李懷光與幽州義寧汴宋軍㑹于故平凉縣三日詰朝大破之今從實録戊午命盧龍節度使朱泚出鎮奉天行營泚且禮翻又音此冬十月辛酉朔日有食之盧子期攻磁州磁牆之翻傳考異曰舊李寶臣作攻邢州今從實録城幾陷幾居依翻李寶臣與昭義留後李承昭共救之大破子期於清水按新書田承嗣傳清水作臨水晉置臨水縣於滏口之右屬廣平郡後魏及隋屬魏郡唐初省永泰元年薛嵩表于臨水故城置昭義縣屬磁州擒子期送京師斬之河南諸將又大破田悦于陳留陳留漢縣後魏廢隋開皇六年復置時屬汴州九域志在州東五十二里將即亮翻田承嗣懼初李正已遣使至魏州承嗣囚之至是禮而遣之遣使盡籍境内户口甲兵榖帛之數以與之曰承嗣今年八十有六嗣祥吏翻承考異曰按嗣卒時年七十五此云八十六盖欺正巳溘死無日溘口答翻奄也莊子曰溘然而死謂奄然也諸子不肖恱亦孱弱孱士山翻凢今日所有為公守耳為于偽翻豈足以辱公之師旅乎立使者於庭南向拜而授書又圖正巳之像焚香事之正巳悦遂按兵不進於是河南諸道兵皆不敢進承嗣既無南顧之虞得專意北方上嘉李寶臣之功遣中使馬承倩齎詔勞之勞力到翻將還寶臣詣其館遺之百縑遺于季翻承倩詬詈擲出道中寶臣慙其左右為承倩詈辱顧見左右而自慙也詬許候翻又古候翻兵馬使王武俊説寶臣曰使疎吏翻説式芮翻下客説同今公在軍中新立功豎子尚爾况冦平之後以一幅詔書召歸闕下一匹夫耳不如釋承嗣以為己資寶臣遂有玩冦之志承嗣知范陽寶臣鄉里心常欲之寶臣本范陽内屬奚范陽將張瑣高畜為假子因冒其姓歸唐又賜姓李因刻石作䜟云二帝同功勢萬全將田為侣入幽燕密令瘞寶臣境内䜟楚譖翻瘞於計翻使望氣者言彼有玉氣寳臣掘而得之又令客説之曰公與朱滔共取滄州得之則地歸國非公所有公能捨承嗣之罪請以滄州歸公仍願從公取范陽以自効公以精騎前驅承嗣以歩卒繼之蔑不克矣令力丁翻説式芮翻騎竒寄翻寶臣喜謂事合符䜟遂與承嗣通謀宻圖范陽承嗣亦陳兵境上寶臣謂滔使者曰聞朱公儀貌如神願得畫像觀之滔與之寶臣置于射堂與諸將共觀之曰眞神人也滔軍於瓦橋將即亮翻瓦橋古易京之地在莫州北三十里唐置瓦橋關宋白曰涿州歸義縣瓦子濟橋在涿州南易州東當九河之末舊置瓦橋闗後周置雄州寶臣選精騎二千通夜馳三百里襲之戒曰取貌如射堂者時兩軍方睦滔不虞有變狼狽出戰而敗㑹衣它服得免衣於既翻寶臣欲乘勝取范陽滔使雄武軍使昌平劉怦守留府怦普耕翻寶臣知有備不敢進承嗣聞幽恒兵交即引軍南還嗣祥吏翻恒户登翻還從宣翻又音如字使謂寶臣曰河内有警不暇從公石上䜟文吾戲為之耳寶臣慙怒而退功考異曰舊王武俊傳曰代宗嘉其使中貴人馬承倩齎詔宣勞承倩將歸止傳舍寶臣親遺百縑承倩詬罵擲出道中王武俊勸玩養承嗣以為己資寶臣曰今與承嗣有釁矣可推腹心哉武俊曰勢同患均轉㓂讎為父子欬唾間耳若傳虛言無益也今中貴人劉清譚在驛斬首送承嗣承嗣立質妻孥矣寶臣曰吾不能如此武俊曰朱滔為國屯兵滄州請擒送承嗣以取信許之按承嗣方求解于寶臣何必擒滔以取信且承倩尚在傳舍武俊何不勸斬承倩而斬清譚乎寶臣自以承嗣誘之共取幽州故襲朱滔非因承倩之辱也今從唐紀寶臣旣與朱滔有隙以張孝忠為易州刺史使將精騎七千以備之史言田承嗣凶狡過于諸帥宋白曰易州東至幽州二百一十四里將即亮翻又音如字騎竒寄翻丙寅貴妃獨孤氏薨丁卯追謚貞懿皇后諡神至翻十一月丁酉田承嗣將吴希光以瀛州降嶺南節度使路嗣恭擢流人孟瑶敬冕為將作考異曰鄴矦家傳敬俛今從舊傳討哥舒晃瑶以大軍當其衝冕自間道輕入間古莧翻輕墟正翻丁未克廣州斬哥舒晃曰考異舊嗣恭傳云嗣恭平廣州商舶之徒多因晃事誅之嗣恭前後没其家財寶數百萬貫盡入私室不以貢獻代宗心甚銜之故嗣恭雖有平方面功止轉檢校兵部尚書無所酬勞建中實録曰自兵興以來諸軍殺將帥而要君者多矣皆因授其任以茍安之其王師征討不失有罪始斯役也既而有謗其收南海府庫閲上不實不得用久之按代宗以嗣恭附元載遺載瑠璃盤惡之故不用耳事見鄴矦家傳或當時亦有人迎合以匿貨謗嗣恭不可知也今不取李肇國史補云路嗣恭初平五嶺元載奏嗣恭多取南人金寶是欲為亂陛下不信試召必不入朝三伏中追詔至嗣恭不慮請待秋凉以修覲禮江西判官柳渾入雨泣曰公有功方暑而追是為執政所中今少遷延必族滅也嗣恭懼曰為之柰何渾曰健歩追還表緘公今日過江宿石頭驛乃可從之代宗謂元載曰嗣恭不俟駕行矣載無以對按嗣恭素附元載載誅賴李泌營救得免事見鄴矦家傳載豈有譖嗣恭云欲為亂之理盖載已被誅而召嗣恭適在三伏渾冇此疑時人因以為渾美事耳今不取余按去年命路嗣恭為嶺南節度使討哥舒晃嗣恭既誅晃而平廣州則當在廣州柳渾若以江西判官從嗣恭亦當在廣州今諫嗣恭請奉詔就道乃言過江宿石頭驛石頭驛在豫章江之西岸嗣恭自江西觀察赴召可言宿石頭驛自嶺南節度赴召安得宿石頭驛哉亦可以明李肇之誤及其黨萬餘人嗣恭之討晃也容管經略使王雄遣將將兵助之西原賊帥覃問乘虛襲容州姓譜梁有東寧州刺史覃元先則蠻中有覃姓尚矣翃伏兵擊擒之十二月回紇千騎㓂夏州傳考異曰此事出汾陽家實録新舊紀皆無之按實録明年二月加朔方戍兵以備回紇則是回紇嘗入冦也州將梁榮宗破之於烏水烏水在夏州朔方縣貞觀七年開延化渠引烏水入庫狄澤將即亮翻郭子儀遣兵三千救夏州回紇遁去夏户雅翻紇下没翻元載王縉奏魏州鹽貴請禁鹽入其境以困之載祖亥翻又音如字縉音晉上不許曰承嗣負朕百姓何罪田承嗣請入朝李正已屢為之上表乞許其自新嗣祥吏翻朝直遥翻為于偽翻上時掌翻十一年春正月壬辰遣諫議大夫杜亞使魏州宣慰使疎吏翻辛亥西川節度使崔寧奏破吐蕃四節度及突厥吐谷渾氐𦍑羣蠻衆二十餘萬斬首萬餘級吐從暾入聲厥九勿翻二月庚辰田承嗣復遣使上表請入朝復扶又翻上乃下詔赦承嗣罪復其官爵聽與家屬入朝其所部拒朝命者一切不問辛巳增朔方五城戍兵以備回紇朔方先綂三受降城并振武豐安定逺為六城時三受降城屬振武軍使朔方綂豐安定逺新昌豐寧保寧謂之塞下五城紇下没翻三月戊子河陽軍亂逐監軍冉庭蘭出城大掠三日庭蘭成備而入誅亂者數十人乃定監古銜翻五月汴宋留後田神玉卒都虞候李靈曜殺兵馬使濮州刺史孟鑒北結田承嗣為援汴皮變翻卒子恤翻使踈吏翻濮博木翻嗣祥吏翻癸巳以永平節度使李勉兼汴宋等八州留後汴宋曹濮兖鄆徐泗八州濮博木翻乙未以靈曜為濮州刺史靈曜不受詔六月戊午以靈曜為汴宋留後遣使宣慰秋七月田承嗣遣兵冦滑州敗李勉滑州永平節度治所敗補邁翻吐蕃冦石門入長澤川長澤川後魏置闡熈郡隋廢郡為長澤縣屬夏州吐蕃㓂原州遂北入夏州界也宋白曰長澤縣漢朔方郡三封縣之地三封故城赫連勃勃據之築為綂萬城又按原州北有長澤監吐從暾入聲八月丙寅加盧龍節度使朱泚同平章事實考異曰録閏八月己亥遣朱泚如奉天行營按去年已云泚出鎮奉天行營至此又云明年九月又云盖泚每年往奉天防秋至春還京師但實録不載其入朝耳李靈曜既為留後益驕慢悉以其黨為管内八州刺史縣令欲效河北諸鎮甲申詔淮西節度使李忠臣永平節度使李勉河陽三城使馬燧討之淮南節度使陳少游淄青節度使李正已皆進兵擊靈曜汴宋兵馬使攝節度副使李僧惠少始照翻家考異曰汾陽傳作李思惠今從舊傳靈曜之謀主也宋州牙門將劉昌遣僧神表濳説僧惠僧惠召問計昌為之泣陳逆順將即亮翻說式芮翻為于偽翻僧惠乃與汴宋牙將高慿石隱金遣神表奉表詣京師請討靈曜九月壬戌以僧惠為宋州刺史慿為曹州刺史隱金為鄆州刺史乙丑李忠臣馬燧軍于鄭州汴皮變翻鄆音運靈曜引兵逆戰兩軍不意其至退軍滎澤隋分滎陽縣置滎澤縣唐屬鄭州九域志在州西北四十五里淮西軍士潰去者什五六鄭州士民皆驚走入東都忠臣將歸淮西燧固執不可曰以順討逆何憂不克柰何自弃功名堅壁不動忠臣聞之稍收散卒數日皆集軍勢復振史言李忠臣因馬燧以成功復扶又翻戊辰李正已奏克鄆濮二州壬申李僧惠敗靈曜兵于雍丘濮博木翻敗補邁翻下敗永同冬十月李忠臣馬燧進擊靈曜忠臣行汴南燧行汴北屢破靈曜兵壬寅與陳少游前軍合與靈曜大戰於汴州城西靈曜敗入城固守癸卯忠臣等圍之田承嗣遣田恱將兵救靈曜敗永平淄青兵於匡城少始照翻匡城漢長垣縣隋開皇十六年更名時屬滑州乘勝進軍汴州營於城北數里丙午忠臣遣禆將李重倩將輕騎數百夜入其營縱横貫穿縱子容翻穿尺絹翻斬數十人而還還從宣翻又如字營中大駭忠臣燧因以大軍乗之鼓譟而入悦衆不戰而潰悦脱身北走將士死者相枕藉不可勝數譟則竈翻枕職任翻藉慈夜翻勝音升靈曜聞之開門夜遁汴州平重倩本奚也丁未靈曜至韋城隋分白馬縣置韋城縣於古韋國之墟故曰韋城時屬滑州九域志韋城縣在滑州東南五十里永平將杜如江擒之燧知忠臣暴戾以己功讓之不入汴城將即亮翻汴皮變翻引軍西屯板橋忠臣入城果專其功宋州刺史李僧惠與之爭功忠臣因㑹擊殺之又欲殺劉昌昌遁逃得免甲寅李勉械送李靈曜至京師斬之十二月丁亥李正已李寶臣並加同平章事涇原節度使馬璘疾亟以行軍司馬叚秀實知節度事付以後事秀實嚴兵以備非常丙申璘薨使疎吏翻璘離珍翻公考異曰實録庚寅璘薨叚公别傳曰十二月景申馬薨十二年正月八日奉制除涇州刺史知節度事實録又云丁酉以叚秀實知河東留後按時馬璘新薨秀實涇原留後備禦吐蕃豈可撤之使攝河東盖奏報未至有斯命尋聞璘薨遂除涇原耳亟紀力翻軍中奔哭者數千人喧咽門屏秀實悉不聽入命押牙馬頔治䘮事於内頔徒厯翻治直之翻李漢惠接賔客於外妻妾子孫位於堂宗族位於庭將佐位於前牙士卒哭於營伍百姓各守其家有離立偶語於衢路輒執而囚之記曲禮曰離立者不出中間注云離兩也非護䘮從行者無得逺送致祭拜哭皆有儀節送䘮近逺皆有定處違者以軍法從事都虞候史廷幹兵馬使崔珍十將張景華謀因䘮作亂秀實知之奏廷幹入宿衛徙珍屯靈臺補景華外職不戮一人軍府晏然自高仙芝䘮師於大食叚秀實始見於史其後責李嗣業不赴難滏水之潰保河清以濟歸師在邠州誅郭晞暴横之卒與馬璘議論不阿及治䘮曲防周慮以安軍府最後笏擊朱泚以身徇國其事業風節卓然表出於唐諸將中璘家富有無算治第京師甲於勲貴以功勲致貴顯故曰勲貴治直之翻中堂費二十萬緡它室所減無幾幾居豈翻其子孫無行行下孟翻家貲尋盡史言殖貨無厭者適以為不肖子孫之資戊戌昭義節度使李承昭表稱疾篤以澤潞行軍司馬李抱眞兼知磁邪兩州留後使疎吏翻磁牆之翻庚戌加淮西節度使李忠臣同平章事仍領汴州刺史治汴州李忠臣破李靈曜得汴州即以與之汴皮變翻十二年春三月乙卯兵部尚書同平章事鳯翔懷澤潞秦隴節度使李抱玉薨尚辰羊翻弟抱真仍領懷澤潞留後癸亥以河東行軍司馬鮑防為河東節度使防襄州人也田承嗣竟不入朝又助李靈曜上復命討之承嗣乃復上表謝罪嗣祥吏翻朝直遥翻復扶又翻上時掌翻上亦無如之何庚午悉復承嗣官爵仍令不必入朝令力丁翻中書侍郎同平章事元載專横載祖亥翻又音如字横户孟翻黄門侍郎同平章事王縉附之二人俱貪載妻王氏載妻王忠嗣之女縉音晉及子伯和仲武縉弟妹及尼出入者爭納賄賂尼女夷翻又以政事委羣吏士之求進者不結其子弟及主書卓英倩等無由自逹上含容累年載縉不悛悛丑緣翻上欲誅之恐左右漏泄無可與言者獨與左金吾大將軍吴湊謀之湊上之舅也吴湊章敬皇后弟也㑹有告載縉夜醮圖為不軌者庚辰上御延英殿命湊收載縉於政事堂政事堂在東省屬堂門下自中宗後徙於中書省則堂在右省也案裴炎傳故事宰相於門下省議事謂之政事堂故長孫無忌為司空房𤣥齡為僕射魏徴為太子太師皆知門下省事至中宗時裴炎為中書令執政事筆故徒政事堂於中書省載祖亥翻又音如字縉音晉又收仲武及卓英倩等繫獄命吏部尚書劉晏與御史大夫李涵等同鞫之尚辰羊翻問端皆出禁中問端猶今言問頭也仍遣中使詰以隂事載縉皆伏罪使疎吏翻詰去吉翻是日先杖殺左衛將軍知内侍省事董秀於禁中乃賜載自盡於萬年縣載請主者願得快死主者曰相公須受少汚辱相息亮翻少詩沼翻勿恠乃脱穢韈塞其口而殺之韈勿伐翻足衣塞悉則翻王縉初亦賜自盡劉晏謂李涵等曰故事重刑覆奏况大臣乎且法有首從首謂罪首從謂從坐從才用翻宜更禀進止涵等從之上乃貶縉栝州刺史宋白曰栝州晉為永嘉郡隋改處州尋為栝州因栝蒼山為名劉昫曰京師東南四千二百七十八里載妻王氏忠嗣之女也及子伯和仲武季能皆伏誅有司籍載家財胡椒至八百石嗣祥吏翻本草曰胡椒生西戎形如䑕李子調食用之味甚辛辣徐表南中記曰生南海諸國它物稱是稱尺證翻夏四月壬午以太常卿楊綰為中書侍郎禮部侍郎常衮為門下侍郎並同平章事