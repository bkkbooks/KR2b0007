body:
  text: 資治通鑑卷二百三十宋司馬光撰胡三省音註唐紀四十六起閼逢困敦二月盡四月不滿一年徳宗神武聖文皇帝五興元元年二月戊申詔贈叚秀實太尉諡曰忠烈厚恤其家叚秀實死節事見二百二十八卷建中四年諡神至翻時賈隱林已卒贈左僕射賞其能直言也卒子恤翻射寅謝翻直言事見上卷上年李希烈將兵五萬圍寧陵引水灌之濮州刺史劉昌以三千人守之將即亮翻又音如字濮博木翻李希烈自建中四年改寧陵滑州刺史李澄宻遣使請降李澄降賊見上卷上年使疏吏翻降戸江翻上許以澄為汴滑節度使澄猶外事希烈希烈疑之遣養子六百人戍白馬汴皮變翻白馬滑州治所召澄共攻寧陵澄至石柱使其衆陽驚燒營而遁又諷養子令剽掠令力丁翻剽匹妙翻下同澄悉收斬之以白希烈希烈無以罪也劉昌守寧陵凡四十五日不釋甲韓滉遣其將王栖曜將兵助劉洽拒希烈栖曜以彊弩數千游汴水夜入寧陵城滉呼廣翻將即亮翻將兵之將音同上考異曰新書柏良器傳曰良器為武衛中郎將以兵𨽻浙西希烈圍寧陵遏水灌之親令軍中明日拔城良器以救兵至擇弩手善游者㳂河渠夜入及旦伏弩𤼵乘城者皆死疑韓滉遣栖曜及良器同救寧陵舊栖曜傳曰將强弩數千夜入寧陵與此共是一事今參取之明日從城上射希烈射而亦翻及其坐幄坐才卧翻希烈驚曰宣潤弩手至矣遂解圍去朱泚自奉天敗歸事見上卷建中四年泚且禮翻又音此李晟謀取長安劉徳信與晟俱屯東渭橋劉徳信屯東渭橋事始見二百二十八卷建中四年晟成正翻不受晟節制晟因徳信至營中數以滬澗之敗及所過剽掠之罪斬之數所具翻又所主翻滬俟古翻剽匹妙翻滬澗之敗見二百二十八卷建中四年是年十一月既加李晟神䇿行營節度劉徳信可得而不受節制乎况又有敗軍及剽掠之罪斬之宜矣因以數騎馳入徳信軍勞其衆勞力到翻騎竒寄翻無敢動者遂并將之軍勢益振將即亮翻又音如字李懷光既脅朝廷逐盧把等事見上卷上年朝直遥翻内不自安遂有異志又惡李晟獨當一面惡烏路翻下同恐其成功奏請與晟合軍詔許之晟與懷光㑹于咸陽西陳濤斜築壘未畢壘魯水翻泚衆大至晟謂懷光曰賊若固守宫苑宫苑謂宫城及苑城也或曠日持久未易攻取易以豉翻今去其巢穴敢出求戰此天以賊賜明公不可失也懷光曰軍適至馬未秣士未飯飯扶晩翻豈可遽戰邪邪音耶晟不得已乃就壁晟毎與懷光同出軍懷光軍士多掠人牛馬晟軍秋豪不犯懷光軍士惡其異已分所獲與之晟軍終不敢受懷光屯咸陽累月逗留不進逗音豆以考異曰實録云懷光堅壁自守凡八十餘日按懷光十一月癸巳解奉天圍李晟以二月戊申徙東渭橋其間纔七十六日實録所言謂懷光奔河中以前耳今但云累月上屢遣中使趣之使疏吏翻趣讀曰促辭以士卒疲弊且當休息觀釁諸將數勸之攻長安將即亮翻數所角翻下同懷光不從宻與朱泚通謀李晟屢奏恐其有變為所併請移軍東渭橋泚且禮翻又音此晟成正翻李懷光既有異謀李晟與之連營於咸陽有不能一息安者其奏請移軍當也然必歸東渭橋者晟之本規也盖朱泚擁涇卒而據長安其敗也必當西奔晟以師自東逼之所以開其走路耳兵法圍城為之闕此其近之上猶冀懷光革心收其力用寢晟奏不下下户嫁翻懷光欲緩戰期且激怒諸軍奏言諸軍糧賜薄神䇿獨厚厚薄不均難以進戰上以財用方窘窘巨隕翻若糧賜皆比神䇿則無以給之不然又逆懷光意恐諸軍觖望觖古穴翻怨望也乃遣陸䞇詣懷光營宣慰因召李晟參議其事懷光意欲晟自乞减損使失士心沮敗其功沮在吕翻敗補邁翻乃曰將士戰鬭同而糧賜異何以使之恊力將即亮翻贄未有言數顧晟晟曰公為元帥得專號令晟將一軍受指蹤而已數所角翻帥所類翻將即亮翻又音如字至於增减衣食公當裁之懷光黙然又不欲自减之遂止李晟之答懷光氣和而辭正故能伐其謀時上遣崔漢衡詣吐蕃𤼵兵見上巻本年正月吐從暾入聲吐蕃相尚結贊相息亮翻言蕃法𤼵兵以主兵大臣為信今制書無懷光署名故不敢進上命陸贄諭懷光懷光固執以為不可曰若克京城吐蕃必縱兵焚掠誰能遏之此一害也前有勑㫖募士卒克城者人賞百緡彼𤼵兵五萬若援敕求賞五百萬緡何從可得此二害也虜騎雖來必不先進勒兵自固觀我兵勢勝則從而分功敗則從而圖變譎詐多端不可親信此三害也李懷光雖欲飬冦以自資然其陳用吐蕃三害其言亦各有理緡眉巾翻騎竒寄翻譎古穴翻竟不肯署敕尚結贊亦不進軍陸贄自咸陽還上言賊泚稽誅保聚宫苑上時掌翻還從宣翻又音如字泚且禮翻又音此朱泚自據長安居白華殿重兵多在苑中故言保聚宫苑勢窮援絶引日偷生懷光總仗順之師乘制勝之氣謂醴泉之勝也鼓行芟翦易若摧枯芟所銜翻易以豉翻而乃冦奔不追師老不用諸帥毎欲進取懷光輙沮其謀諸帥謂李晟楊惠元等帥所類翻沮在吕翻據兹事情殊不可解解户買翻曉也陛下意在全䕶委曲聽從觀其所為亦未知感若不别務規略漸思制持惟以姑息求安終恐變故難測此誠事機危迫之秋也固不可以尋常容易處之易弋䜴翻處昌吕翻今李晟奏請移軍適遇臣銜命宣慰晟成正翻銜户緘翻懷光偶論此事臣遂汎問所宜懷光乃云李晟既欲别行某亦都不要藉要者須其用藉者借其力當時諸鎮有要藉官所以名官之意亦如此臣猶慮有飜覆因美其軍盛彊懷光大自矜誇轉有輕晟之意臣又從容問云從千容翻囘日或聖㫖顧問事之可否决定何如懷光已肆輕言不可中變遂云恩命許去事亦無妨言上已許李晟去咸陽則其移軍於事體無妨也要約再三要一遥翻非不詳審雖欲追悔固難為辭伏望即以李晟表出付中書敕下依奏敕下李晟依其所奏也下户嫁翻别賜懷光手詔示以移軍事由事由猶言事因也其手詔大意云昨得李晟奏請移軍城東以分賊勢東渭橋在京城東故云然晟成正翻朕本欲委卿商量適㑹陸䞇囘奏云見卿語及於此仍言許去事亦無妨遂勑本軍允其所請如此則詞婉而直理順而明雖蓄異端何由起怨上從之晟自咸陽結陳而行結陳而行以防李懷光追掩陳讀曰陣歸東渭橋時鄜坊節度使李建徽神䇿行營節度使楊惠元猶與懷光聨營陸䞇復上奏曰懷光當管師徒鄜音虜使疏吏翻復扶又翻上時掌翻當管猶言見管也足以獨制兇冦逗留未進抑有它由所患太彊不資傍助比者又遣李晟李建徽楊惠元三節度之衆附麗其營比毘至翻近也無益成功祗足生事何則四軍接壘羣帥異心李晟李建徽楊惠元之軍及李懷光之軍為四軍帥所類翻論勢力則懸絶高卑言懷光之軍最彊懷光之官最高相去懸絶據職名則不相統屬言懷光晟建徽惠元四人並為節度使各總一軍不相統屬懷光輕晟等兵㣲位下而忿其制不從心晟等疑懷光養冦蓄姦而怨其事多陵已端居則互防飛謗欲戰則遞恐分功齟齬不和齟壯所翻齬偶許翻嫌釁遂構俾之同處必不兩全處昌吕翻彊者惡積而後亡弱者勢危而先覆陸䞇言李懷光李建徽楊惠元之禍敗如燭照龜卜覆亡之禍翹足可期人立而翹一足則不能久翹足可期者言禍來之速也舊冦未平新患方起憂歎所切實堪疚心疚病也太上消慝於未萌太上猶言極上也慝惡也其次救失於始兆况乎事情已露禍難垂成難乃旦翻委而不謀何以寧亂李晟見機慮變先請移軍建徽惠元勢轉孤弱為其吞噬理在必然晟成正翻噬時制翻㗖也它日雖有良圖亦恐不能自㧞拯其危急唯在此時拯救也今因李晟願行便遣合軍同往託言晟兵素少少詩沼翻慮為賊泚所邀藉此兩軍迭為犄角泚且禮翻犄居蟻翻仍先諭㫖密使促裝詔書至營即日進路懷光意雖不欲然亦計無所施是謂先人有奪人之心左傳趙宣子之言先悉薦翻疾雷不及掩耳者也淮南子之言解鬭不可以不離救焚不可以不疾理盡於此惟陛下圖之上曰卿所料極善然李晟移軍懷光不免悵望悵丑亮翻怨也若更遣建徽惠元就東謂自咸陽東就李晟也恐因此生辭生辭猶今人言生言語也轉難調息調息猶今人言調停也且更俟旬時旬時猶言旬日也辛酉加王武俊同平章事兼幽州盧龍節度使欲使之討朱滔也使疏吏翻李晟以為懷光反狀已明緩急宜有備蜀漢之路不可壅此指漢蜀郡漢中郡二郡大界而言請以禆將趙光銑等為洋利劍三州刺史三州皆當入蜀之道之要禆賔彌翻將即亮翻洋音祥各將兵五百以防未然將音同上又音如字上疑未决欲親總禁兵幸咸陽以慰撫為名趣諸將進討趣讀曰促或謂懷光曰此漢祖遊雲夢之䇿也遊雲夢事見十一卷漢高祖六年懷光大懼反謀益甚上垂欲行懷光辭益不遜上猶疑讒人間之間古莧翻甲子加懷光太尉增實食賜鐵劵實食食實封也遣神䇿右兵馬使李卞等往諭㫖使疏吏翻下同加考異曰邠志曰十六日詔懷光太尉按實録甲子二十三日邠志誤幸奉天録舊傳李卞作李昇今從奉天録懷光對使者投鐵劵於地曰聖人疑懷光邪唐之臣子率稱君父為聖人邪音耶人臣反賜鐵劵懷光不反今賜鐵劵是使之反也辭氣甚悖悖蒲妺翻又蒲没翻朔方左兵馬使張名振當軍門大呼曰呼火故翻太尉視賊不許擊待天使不敬使疏吏翻朝廷所遣謂之天使盖謂君天也君之所遣猶天之所遣也果欲反邪功高太山一旦弃之自取族滅富貴它人何益哉言懷光反是自取族滅它人平其亂以為功而得富貴是富貴它人也我今日必以死爭之懷光聞之謂曰我不反以賊方彊故須蓄鋭俟時耳懷光又言天子所居必有城隍有水曰池無水曰隍乃𤼵卒城咸陽未幾移軍據之幾居豈翻張名振曰乃者言不反乃者猶言昨者也今日拔軍此來何也何不攻長安殺朱泚取富貴引軍還邠邪泚且禮翻又音此還從宣翻又音如字邠卑旻翻懷光所統朔方軍本屯邠州懷光曰名振病心矣命左右引去拉殺之拉落合翻右武鋒兵馬使石演芬本西域胡人懷光養以為子懷光潛與朱泚通謀演芬遣其客郜成義詣行在告之泚且禮翻又音此演以淺翻郜古到翻史炤曰郜姓也出自周文王子封郜國國在濟隂晉有尚書高昌郜久請罷其都統之權成義至奉天告懷光子璀統他綜翻俗音從上聲璀七罪翻璀宻白其父懷光召演芬責之曰我以爾為子柰何欲破我家今日負我死甘心乎演芬曰天子以太尉為股肱太尉以演芬為心腹太尉既負天子演芬安得不負太尉乎演芬胡人不能異心惟知事一人一人謂天子也茍免賊名而死死甘心矣懷光使左右臠食之皆曰義士也可令快死以刀斷其喉而去臠力兖翻令力丁翻斷音短考異曰邠志曰懷光投鐵劵于地使者懼焉名振呼於軍門又曰二月二十一日懷光拔其軍居咸陽又曰三月三日懷光廵咸陽城名振曰昨日言不反今悉軍此來何也又曰懷光既殺名振召演芬責之按名振云昨日言不反今何此來則是呼軍門之明日懷光即移軍咸陽若至得咸陽已十三日因廵城而名振言之何得云昨日又何云悉軍此來又名振與演芬同日死按舊傳云郜成義至奉天乃反其言告懷光子璀璀宻告其父懷光若三月三日則車駕已幸梁洋不在奉天且是時反狀已彰灼如此豈能尚欺人云不反邪今從幸奉天録悉因投鐵劵言之李卞等還言懷光驕慢之狀還從宣翻又音如字於是行在始嚴門禁嚴門闗出入之禁以防不虞從臣皆宻裝以待史炤曰宻具裝束所以備行從才用翻乙丑加李晟河中同絳節度使上猶以為薄徳宗當患難之時進人若將加諸膝當事定之後退人若將墜諸淵晟成正翻使疏吏翻丙寅又加同平章事上將幸梁州梁州古漢中山南節度使鹽亭嚴震聞之鹽亭漢廣漢縣地梁置鹽亭縣唐屬梓州以産鹽名縣遣使詣奉天奉迎又遣大將張用誠將兵五千至盩厔以來迎衛至盩厔以來者言若迎衛之兵至盩厔而乘輿未至則當㳂道漸進來前以迎乗輿不指定一處也盩厔音舟窒將即亮翻誠將音同上又音如字用誠為懷光所誘隂與之通謀誘音酉上聞而患之㑹震繼遣牙將馬勛奉表上語之故勛許云翻語牛倨翻勛請亟詣梁州取嚴震符召用誠還府若不受召臣請殺之上喜曰卿何時復至此還從宣翻又音如字復扶又翻又音如字勛刻日時而去既得震符請壯士五人與之俱出駱谷用誠不知事泄以數百騎迎之漢中取鳯翔之路南谷曰褒北谷曰駱騎竒寄翻勛與之俱入驛時天寒勛多然藁火於驛外然與燃同藁禾稈也軍士皆往附火勛乃從容出懷中符以示用誠曰大夫召君用誠錯愕起走從于容翻錯愕猝然驚也壯士自後執其手擒之用誠子在勛後斫傷勛首壯士格殺其子仆用誠於地跨其腹以刀擬其喉曰出聲則死勛入其營士卒已擐甲執兵矣仆方遇翻頓也擐户慣翻勛大言曰汝曹父母妻子皆在漢中一朝弃之與張用誠同反於汝曹何利乎大夫令我取用誠不問汝曹無自取族滅衆皆讋服令力丁翻讋之渉翻失氣也勛送用誠詣梁州震杖殺之命副將領其衆將即亮翻勛裹其首復命於行在愆期半日愆期過期也李懷光夜遣人襲奪李建徽楊惠元軍建徽走免惠元將奔奉天懷光遣兵追殺之懷光又宣言曰吾今與朱泚連和車駕且當逺避懷光以韓遊瓌朔方將也泚且禮翻又音此韓遊瓌初事郭子儀李懷光東征遊瓌為邠寧留後瓌古囘翻將即亮翻掌兵在奉天與遊瓌書約使為變遊瓌密奏之明日又以書趣之懷光又以書趣遊瓌遊瓌盖又奏之也若據考異則後書為渾瑊所獲通鑑疑而不取趣讀曰促上稱其忠義因問䇿安出對曰懷光總諸道兵故敢恃衆為亂今邠寧有張昕靈武有寗景璿邠卑旻翻昕許斤翻璿似宣翻河中有吕鳴岳振武有杜從政潼闗有唐朝臣渭北有竇覦潼音同朝直遥翻覦音俞皆守將也言此諸將各守其地也陛下各以其地及其衆授之尊懷光之官罷其權則行營諸將各受本府指麾矣罷懷光兵權則諸路兵雖在行營將不肯稟命於懷光而各稟本府之命懷光獨立安能為亂上曰罷懷光兵權若朱泚何言罷懷光恐無以制朱泚對曰陛下既許將士以克城殊賞將士奉天子之命以討賊取富貴誰不願之邠府兵以萬數借使臣得而將之將即亮翻又音如字足以誅泚况諸道必有杖義之臣泚不足憂也上然之丁邜懷光遣其將趙昇鸞入奉天約其夕使别將逹奚小俊燒乾陵奚考異曰邠志作逹小進今從實録令昇鸞為内應以驚脅乘輿令力丁翻乘繩證翻昇鸞詣渾瑊自言瑊遽以聞且請决幸梁州軍户昆翻又户本翻瑊古銜翻獲考異曰邠志二十六日懷光又使持書趣遊瓌渾公而奏之且使其卒物色我軍遊瓌不知不得以聞又怒瑊之虞已也慢罵于途上疑其變即日幸梁州今從實録奉天記曰上初㧞奉天而車駕至冝夀縣渭水之陽謂侍臣曰朕之此行莫同永嘉之勢因􅏰然流涕渾瑊對曰臨大難無憂懼者聖人之勇也言訖濟河按新傳李惟簡追及上於盩厔西然後渾瑊繼至則上至渭陽時瑊猶未來今不取上命瑊戒嚴瑊出部勒未畢上已出城西命戴休顔守奉天朝臣將士狼狽扈從朝直遥翻將即亮翻從才用翻戴休顔狥於軍中曰懷光已反遂乘城拒守朱泚之稱帝也朱泚稱帝見二百二十八巻建中四年泚且禮翻又音此兵部侍郎劉廼卧病在家泚召之不起使蔣鎮自往説之説式芮翻凡再往知不可誘脅誘音酉乃歎曰鎮亦忝列曹不能捨生以至於此蔣鎮仕唐為工部侍郎故云亦忝列曹為泚所得不能死而受泚官自愧不能捨生取義豈可復以己之腥臊汚漫賢者乎復扶又翻臊蘇遭翻汚烏故翻漫謨官翻塗也歔欷而返歔音虛欷音希又許既翻廼聞帝幸山南摶膺大呼呼火故翻自投於牀不食數日而卒梁州在長安南山之南劉廼以乘輿播遷浸以益逺故自絶於衾衽之間太子少師喬琳從上至盩厔稱老疾不堪山險削髪為僧匿於仙遊寺泚聞之召至長安以為吏部尚書於是朝士之竄匿者多出仕泚矣劉廼以乘輿不能復還而自絶義不臣賊也喬琳等以乘輿不能復還出仕於泚茍性命而貪禄利也唐於此時亦云殆矣少始照翻盩厔音舟窒尚辰羊翻懷光遣其將孟保孟考異曰邠志作廷寶今從實録惠靜壽孫福逹將精騎趣南山邀車駕逹將即亮翻又如字騎竒寄翻趣逡喻翻遇諸軍糧料使張增於盩厔使疏吏翻三將曰彼使我為不臣我以追不及報之不過不使我將耳過古禾翻又古卧翻將即亮翻言不過不使之為將也因目增曰目增示之以意欲因其言以紿衆軍士未朝食如何增紿其衆曰此東數里有佛祠吾貯糧焉三將帥衆而東縱之剽掠紿蕩亥翻貯丁吕翻帥讀曰率剽匹妙翻由是百官從行者皆得入駱谷以追不及還報還從宣翻又音如字百考異曰實録曰纔入駱谷懷光遣其將孟保等以數騎來襲為後軍將侯仲莊所拒而退遂焚店驛而去舊嚴震傳曰賴山南兵擊之而退輿駕無警急之患今從邠志懷光皆黜之河東將王權馬彚引兵歸太原將即亮翻彚于貴翻權彚入援見上卷上年以上幸山南聲聞不接故引兵歸史言馬燧怠於勤王李晟得除官制拜哭受命謂河中同綘及加同平章事之命晟成正翻謂將佐曰長安宗廟所在天下根本若諸將皆從行誰當滅賊者乃治城隍繕甲兵為復京城之計城隍即為東渭橋營塹治直之翻先是東渭橋有積粟十餘萬斛度支給李懷光軍幾盡先悉薦翻度徒洛翻幾居希翻是時懷光朱泚連兵聲勢甚盛車駕南幸人情擾擾晟以孤軍處二彊寇之間泚且禮翻又音此處昌吕翻内無資糧外無救援徒以忠義感激將士故其衆雖單弱而鋭氣不衰又以書遺懷光辭禮卑遜遺唯季翻雖示尊崇而諭以禍福勸之立功補過故懷光慙恧未忍擊之恧女六翻晟曰畿内雖兵荒之餘猶可賦斂斂力瞻翻宿兵飬寇患莫大焉乃以判官張彧假京兆尹擇四十餘人假官以督渭北芻粟不旬日皆充羨羨弋線翻乃流涕誓衆决志平賊李懷光自河北千里赴難不可謂不勇於勤王以其兵力固可以指期收復君臣猜乎嫌反忠為逆張名振所謂自取族滅富貴它人有味其言也後之觀史者觀懷光之勤王始末與張名振所以諫懷光之言與夫史家歸功李晟之言則凡居功名之際者可不戒哉田悦用兵數敗事並見前數所角翻士卒死者什六七其下皆厭苦之上以給事中孔巢父為魏博宣慰使巢父性辯博至魏州對其衆為陳逆順禍福為于偽翻悦及將士皆喜兵馬使田緒承嗣之子也凶險多過失悦不忍殺杖而拘之悦既歸國内外撤警備三月壬申朔悦與巢父宴飲緒對弟姪有怨言其姪止之緒怒殺姪既而悔之曰僕射必殺我僕射謂田悦也既夕悦醉歸寢緒與左右密穿後垣入殺悦及其母妻等十餘人即帥左右執刀立於中門之内夾道帥讀曰率將旦以悦命召行軍司馬扈㠋判官許士則都虞候蔣濟議事府署深邃外不知有變士則濟先至召入亂斫殺之緒恐旣明事泄乃出門出中門也遇悦親將劉忠信方排牙排牙者牙前將士各執其物以立於庭下俟節度使升聽事以次參謁也緒疾呼謂衆曰劉忠信與扈㠋謀反昨夜刺殺僕射呼火故翻下同刺七亦翻衆大驚諠譁忠信未及自辯衆分裂殺之扈㠋來及㦸門遇亂節鎭外門列㦸故謂之㦸門招諭將士將士從之者三分之一緒懼登城而立田緒所登者魏州牙城也大呼謂衆曰緒先相公之子諸君受先相公恩先相公謂田承嗣也若能立緒兵馬使賞緡錢二千大將半之下至士卒人賞百緡竭公私之貨五日取辦於是將士囘首殺扈㠋皆歸緒軍府乃安因請命於孔巢父巢父命緒權知軍府後數日衆乃知緒殺其兄田悦者緒之從兄雖悔怒怒其殺兄而悔立之而緒已立無如之何緒又殺悦親將薛有倫等二十餘人李抱眞王武俊引兵將救貝州聞亂不敢進朱滔聞悦死喜曰悦負恩天假手於緒也即遣其執憲大夫鄭景濟等執憲大夫猶天朝御史大夫將歩騎五千助馬寔合兵萬二千人攻魏州寔軍王莽河縱騎兵及囘紇四出剽掠滔别遣人説緒許以本道節度使緒方危急遣隨軍侯臧詣貝州送欵於滔滔喜遣臧還報使亟定盟約時緒部署城内已定謂魏州城内也李抱眞王武俊又遣使詣緒許以赴援如悦存日之約緒召將佐議之幕僚曾穆盧南史曰用兵雖尚威武亦本仁義然後有功今幽陵之兵恣行殺掠白骨蔽野雖先僕射背徳背蒲妹翻其民何罪今雖盛彊其亡可跂立而待也跂去智翻舉踵而立也况昭義恒冀方相與攻之昭義李抱眞恒冀王武俊柰何以目前之急欲從人為反逆乎不若歸命朝廷天子方䝉塵於外聞魏博使至必喜官爵旋踵而至矣旋踵轉足也緒從之遣使奉表詣行在城守以俟命上之𤼵奉天也謂自奉天幸山南韓遊瓌帥其麾下八百餘人還邠州帥讀曰率下同其考異曰邠志曰韓遊瓌使子欽緒扈從懷光知之以戴休顔代領其職仍假遊瓌邠州刺史將使其黨張昕害之遊瓌既失兵柄未知所從説客劉南金曰竊觀人心莫不戀主邠有留甲可以圖變公得之邠殆天假也乃使麾下將范希朝趙懷誘其軍歸邠士皆從之休顔率麾下卒據城門士不得盡出其從遊瓌至邠者八百餘人按舊遊瓌傳無受懷光邠州刺史事休顔傳云及李懷光叛據咸陽使誘休顔休顔集三軍斬其使嬰城自守懷光大駭遂自涇陽夜遁其月拜檢校工部尚書奉天行營節度使且上幸山南命休顔留守奉天遊瓌先𤼵懷光隂謀二人豈更受懷光節度盖當時出幸倉卒遊瓌扈從不及或以與渾瑊有隙不敢南行故率麾下歸邠州耳李懷光以李晟軍浸盛惡之惡烏路翻欲引軍自咸陽襲東渭橋三令其衆衆不應竊相謂曰若與我曹擊朱泚惟力是視若欲反我曹有死不能從也懷光知衆不可强强其兩翻問計於賔佐節度廵官良鄉李景略曰良鄉漢縣屬涿郡唐屬幽州取長安殺朱泚散軍還諸道單騎詣行在如此臣節亦未虧功名猶可保也頓首懇請至於流涕懷光許之都虞候閻晏等勸懷光東保河中徐圖去就懷光乃説其衆曰説式芮翻今且屯涇陽召妻孥於邠俟至與之俱徃河中春裝既辦還攻長安未晩也東方諸縣皆富實軍𤼵之日聽爾俘掠衆許之東方諸縣謂涇陽以東諸縣也日考異曰幸奉天録李晟至東渭橋旬之後軍用整備懷光患之稍移軍涇陽與朱泚約同㓕晟軍舊懷光傳曰懷光劫李建徽等軍移於好畤又曰居二旬乃驅兵掠涇陽富平自同州往河中朱泚傳曰懷光為泚所賣慙怒憤耻移於好畤按實録三月甲申懷光自咸陽燒營走歸河中幸奉天録曰三月懷光拔咸陽掠三原等十二縣雞犬無遺老小歩騎百餘萬皆不云移軍好畤及涇陽今從邠志及幸奉天録懷光乃謂景略曰曏者之議軍衆不從子宜速去不且見害遣數騎送之景略出軍門慟哭曰不意此軍䧟於不義朔方軍平安史拒囘紇吐蕃功高天下備盡忠力一旦從懷光反是䧟於不義懷光遣使詣邠州令留後張昕悉𤼵所留兵萬餘人及行營將士家屬㑹涇陽仍遣其將劉禮等將三千餘騎脅遷之韓遊瓌説昕曰説式芮翻李太尉功高自蹈禍機中丞今日可以自求富貴遊瓌請帥麾下以從從才用翻昕曰昕微賤賴李太尉得至此不忍負也遊瓌乃謝病不出隂與諸將高固楊懷賔等相結時崔漢衡以吐蕃兵營于邠南高固曰昕以衆去則邠城空矣乃詐為渾瑊書召吐蕃使稍逼邠城昕等懼竟不敢出昕等謀殺諸將之不從者遊瓌知之先與高固等舉兵殺昕昕許斤翻將即亮翻瓌古囘翻而考異曰邠志曰三月二十三日張昕戒劉禮等衷甲入昕小史李岌密報遊瓖遊瓖伏甲先起高固等帥衆應之遂斬昕于府中逰瓖既據邠府遣李旻懷光乃走蒲州按實録甲申懷光自咸陽燒營走歸河中然則遊瓌殺昕必在其前今因懷光走見之遣楊懷賔奉表以聞且遣人告崔漢衡漢衡矯詔以遊瓌知軍府事軍中大喜懷光子旻在邠邠卑旻翻遊瓌遣之或曰不殺旻何以自明言遣旻則上疑遊瓌與懷光通將無以自明也遊瓌曰殺旻則懷光怒其衆必至不如釋旻以走之時楊懷賔子朝晟在懷光軍中為右廂兵馬使朝直遥翻晟成正翻使疏吏翻聞之泣白懷光曰父立功於國言其父殺張昕以邠城返正也子當誅夷不可典兵懷光囚之為後赦朝晟張本於是遊瓌屯邠寧戴休顔屯奉天駱元光屯昭應尚可孤屯藍田皆受李晟節度晟軍聲大振始懷光方彊朱泚畏之與懷光書以兄事之約分帝闗中永為鄰國及懷光决反逼乘輿南幸泚且禮翻又音此乘繩證翻其下多叛之勢益弱泚乃賜懷光詔書以臣禮待之且徵其兵懷光慙怒内憂麾下為變外恐李晟襲之遂燒營東走掠涇陽等十二縣雞犬無遺曰考異曰舊高郢傳懷光將歸河中郢言西迎大駕豈非忠乎懷光不聽按徳宗因懷光迫逐遂幸梁州借使懷光欲迎駕徳宗豈肯來乎今不取及富平懷光行及富平也大將孟渉叚威勇將數千人奔于李晟將士在道散亡相繼至河中或勸河中守將吕鳴岳焚橋拒之鳴岳以兵少恐不能支遂納之若吕鳴岳焚蒲津橋懷光將士之心已離必潰散於河西不得至河中矣將即亮翻少詩紹翻河中尹李齊運弃城走懷光遣其將趙貴先築壘於同州備唐兵討之也刺史李紓懼奔行在幕僚裴向攝州事詣貴先責以逆順之理貴先感寤遂請降同州由是獲全向遵慶之子也裴遵慶肅宗朝為相懷光使其將符嶠襲坊州據之渭北守將竇覦帥獵團七百圍之團結獵户為兵謂之獵團帥讀曰率嶠請降詔以覦為渭北行軍司馬丁亥以李晟兼京畿渭北鄜坊丹延節度使鄜音夫庚寅車駕至城固唐安公主薨蜀州唐安郡上長女也上在道民有獻𤓰果者上欲以散試官授之散官即文散階武散階也試官事始見二百五卷武后長夀元年訪於陸贄贄上奏以為爵位恒宜慎惜不可輕用恒户登翻起端雖㣲流弊必大獻𤓰果者止可賜以錢帛不當酬以官上曰試官虛名無損於事贄又上奏其畧曰自兵興以來財賦不足以供賜而職官之賞興焉青朱雜㳫於胥徒周禮六官之屬大夫士之下有府史胥徒鄭氏注曰胥徒民之給徭役者若今衛士矣胥讀如諝謂其有才智為什長胥私吕翻又思餘翻金紫普施於輿皁左傳芋無宇曰人有十等王臣公公臣大夫大夫臣士士臣皁皁臣輿輿臣𨽻𨽻臣僚僚臣僕僕臣臺當今所病方在爵輕設法貴之猶恐不重若又自弃將何勸人夫誘人之方惟名與利名近虛而於教為重利近實而於徳為輕近其靳翻專實利而不濟之以虛則耗匱而物力不給專虛名而不副之以實則誕謾而人情不趨誕謾虛言也趨七喻翻又音如字故國家命秩之制有職事官有散官有勲官有爵號然掌務而授俸者唯繫職事之一官也此所謂施實利而寓虛名者也其勲散爵號三者所繫大抵止於服色資䕃而已服色謂紫緋淺緋深緑淺緑深青淺青及黄其色各以品為差資廕謂隨資品得廕其子若孫及曾孫也此所謂假虛名而佐實利者也今之員外試官頗同勲散爵號雖則授無費禄受不占員占音之贍翻然而突銛鋒排患難者則以是賞之銛息亷翻利也難乃旦翻竭筋力展勞效者又以是酬之若獻𤓰果者亦授試官則彼必相謂曰吾以忘軀命而獲官此以進𤓰果而獲官是乃國家以吾之軀命同於𤓰果矣視人如草木誰復為用哉復扶又翻今陛下既未有實利以敦勸又不重虛名而濫施人無藉焉則後之立功者將曷用為賞哉䞇在翰林為上所親信居艱難中雖有宰相大小之事上必與贄謀之故當時謂之内相相息亮翻下同上行止必與之俱梁洋道險嘗與䞇相失經夕不至上驚憂涕泣募得䞇者賞千金久之乃至上喜甚太子以下皆賀然贄數直諫迕上意數所角翻迕五故翻盧把雖貶官杞貶官見上卷上年上心庇之䞇極言把姦邪致亂上雖貎從心頗不悦故劉從一姜公輔皆自下陳登用二人為相見上卷上年劉從一自吏部郎中姜公輔自翰林學士下陳猶下列也贄恩遇雖隆未得為相為上追仇陸贄盡言而貶贄張本壬辰車駕至梁州山南地薄民貧自安史以來盗賊攻剽剽匹妙翻戸口減耗大半雖節制十五州十五州梁洋興鳯開通渠集蓬利壁巴閬果金也租賦不及中原數縣及大駕駐蹕糧用頗窘上欲西幸成都嚴震言於上曰山南地接京畿李晟方圖收復籍六軍以為聲援若幸西川則晟未有收復之期也衆議未决㑹李晟表至言陛下駐蹕漢中所以繫億兆之心成滅賊之勢若規小捨大規小謂欲幸成都以便資用捨大謂捨興復之功而茍安於一隅遷都岷峨則士庶失望雖有猛將謀臣無所施矣上乃止嚴震百方以聚財賦民不至困窮而供億無乏牙將嚴礪震之從祖弟也震使掌轉餉事甚修辨史言嚴震供奉車駕無闕之功辨讀曰辦初奉天圍既解李楚琳遣使入貢上不得已除鳯翔節度使而心惡之惡其殺張鎰而附朱泚且在肘腋之下也惡烏路翻議者言楚琳凶逆反覆若不隄防恐生窺伺伺相吏翻由是楚琳使者數輩至上皆不引見見賢遍翻留之不遣甫至漢中欲以渾瑊代楚琳鎮鳯翔陸䞇上奏以為楚琳殺帥助賊事見二百二十八卷建中四年帥所類翻其罪固大但以乘輿未復大憝猶存書云元惡大憝憝亦惡也音徒對翻勤王之師悉在畿内急宣速告晷刻是爭言較晷刻而爭遲速也商嶺則道迃且遥駱谷復為盗所扼復扶又翻僅通王命唯在褒斜據九域志商州之路逹金洋皆數百里而洋又逺於金自商州西至長安復二百餘里則其路迂遥至長安盖一千一百餘里自駱谷闗至洋州亦五百餘里惟寶雞南入大散闗至梁州五百里而近宋白曰興元府東北至長安取駱谷路六百五十二里取斜谷路九百二十三里驛路一千二百二十三里此路若又阻艱南北遂將夐絶夐休正翻以諸鎮危疑之勢居二逆誘脅之中二逆謂朱泚李懷光也誘音酉洶洶羣情各懷向背背蒲妹翻儻或楚琳𤼵憾公肆猖狂南塞要衝塞悉則翻東延巨猾則我咽喉梗而心膂分矣咽因肩翻今楚琳能兩端顧望乃是天誘其衷兩端顧望謂李楚琳外奉朝廷而隂事朱泚杜預曰衷中也陸徳明曰衷音中或丁仲翻故通歸塗將濟大業陛下誠宜深以為念厚加撫循得其遲疑便足集事必欲精求素行追抉宿疵行下孟翻抉於决翻則是改過不足以補愆自新不足以贖罪凡今將吏豈得盡無疵瑕人皆省思省悉景翻孰免疑畏又况阻命之輩脅從之流自知負恩安敢歸化斯釁非小所宜速圖伏願陛下思英主大略勿以小不忍虧撓興復之業也撓奴教翻上釋然開悟善待楚琳使者優詔存慰之丁酉加宣武節度使劉洽同平章事己亥以行在都知兵馬使渾瑊同平章事兼朔方節度使朔方邠寧振武永平奉天行營兵馬副元帥將罷李懷光兵權故先用渾瑊庚子詔數李懷光罪惡數所具翻又所主翻叙朔方將士忠順功名猶以懷光舊勲曲加容貸其副元帥太尉中書令河中尹并朔方諸道節度觀察等使宜並罷免將即亮翻貸來戴翻考異曰舊高郢傳曰懷光歸河中又欲悉衆而西時渾瑊軍孤羣帥未集郢與李鄘誓死駐之屬懷光長子璀候郢郢乃諭以逆順曰人臣所宜效順且自天寶以來阻兵者今復誰在况國家自有天命非獨人力今若恃衆西向自絶于天安知三軍不有奔潰者乎李璀震懼流淚氣索明年郢與都知兵馬使吕鳴岳都虞候張延英同謀間道上表及受密詔事泄二將立死懷光乃大集將卒白刃盈庭引郢詰之郢挺然抗詞無所慙隱憤氣感𤼵觀者淚下懷光慙沮而止按實録懷光以興元元年正月甲申走歸河中己亥以渾瑊為副元帥四月辛丑朔始臨軒授瑊節鉞與郢傳年月全不相應今不取授太子太保其所管兵馬委本軍自舉一人功高望重者便宜統領速具奏聞當授旌旄以從人欲旌旄猶言節旄也夏四月壬寅以邠寧兵馬使韓遊瓌為邠寧節度使癸卯以奉天行營兵馬使戴休顔為奉天行營節度使靈武守將寗景璿為李懷光治第别將李如暹曰李太尉逐天子而景璿為之治第治直之翻為于偽翻是亦反也攻而殺之甲辰加李晟鄜坊京畿渭北商華副元帥分李懷光兵柄以授李晟渾瑊鄜音夫華户化翻晟家百口及神䇿軍士家屬皆在長安朱泚善遇之軍中有言及家者晟泣曰天子何在敢言家乎泚使晟親近以家書遺晟遺唯季翻曰公家無恙晟怒曰爾敢為賊為間為賊于偽翻間古莧翻立斬之軍士未授春衣盛夏猶衣裘褐猶衣於既翻終無叛志史言李晟以忠義感激士心乙巳以陝虢防遏使唐朝臣為河中同絳節度使陜失冉翻前河中尹李齊運為京兆尹供晟軍糧役役者輓輸浚築之事庚戌以魏博兵馬使田緒為魏博節度使渾瑊帥諸軍出斜谷帥讀曰率崔漢衡勸吐蕃出兵助之尚結贊曰邠軍不出將襲我後韓遊瓌聞之遣其將曹子逹將兵三千往㑹瑊軍吐蕃遣其將論莽羅依將兵二萬從之李楚琳遣其將石鍠將卒七百從瑊㧞武功鍠户盲翻庚戌朱泚遣其將韓旻攻武功鍠以其衆迎降瑊戰不利收兵登西原其地高平在武功縣西故曰西原㑹曹子逹以吐蕃至擊旻大破之於武亭川邠考異曰志十日日破旻等而實録云乙丑盖奏到之日也今從邠志斬首萬餘級旻僅以身免瑊遂引兵屯奉天與李晟東西相應以逼長安上欲為唐安公主造塔厚𦵏之時唐安公主薨於城固塔浮圖也為于偽翻諫議大夫同平章事姜公輔表諫以為山南非久安之地公主之𦵏㑹歸上都㑹合也要也上都謂長安此宜儉薄以副軍須之急凡行軍資糧器械所須者皆謂之軍須上使謂陸贄曰唐安造塔其費甚㣲非宰相所宜論公輔正欲指朕過失自求名耳相負如此當如何處之相息亮翻處昌吕翻贄上奏以為公輔任居宰相遇事論諫不當罪之其略曰公輔頃與臣同在翰林臣今據理辯直則渉於私黨之嫌希㫖順成則違於匡輔之義渉嫌上貽於身患違義實玷於君恩徇身忘君臣之恥也玷都念翻玉病也又曰唯闇惑之主則怨讟溢於下國而耳不欲聞腥徳逹於上天而心不求寤讟徒牧翻謗也書吕刑曰徳刑𤼵聞惟腥迨乎顛覆猶未知非又曰當問理之是非豈論事之大小虞書曰兢兢業業一日二日萬幾幾居希翻見臯陶謨唐虞之際主聖臣賢慮事之㣲日至萬數然則㣲之不可不重也如此陛下又安可忽而不念乎又曰若以諫爭為指過爭讀曰諍則剖心之主不宜見罪於哲王武王數紂之罪曰斮朝渉之脛剖賢人之心以諫爭為取名則匪躬之臣不應垂訓於聖典易曰王臣蹇蹇匪躬之故應一凌翻又曰假有意將指過諫以取名但能聞善而遷見諫不逆則所指者適足以彰陛下莫大之善所取者適足以資陛下無疆之休因而利焉所獲多矣儻或怒其指過而不改則陛下招惡直之譏惡烏路翻又如字黜其取名而不容則陛下被違諫之謗被皮義翻是乃掩己過而過彌著損彼名而名益彰果而行之所失大矣上意猶怒甲寅罷公輔爲左庻子加西川節度使張延賞同平章事賞其供億無乏故也上在漢中藉西川供億為張延賞入相張本上時掌翻使疏吏翻朱泚姚令言數遣人誘涇原節度使馮河清泚且禮翻又音此數所角翻誘音酉使疏吏翻河清皆斬其使者大將田希鑒密與朱泚通殺河清以軍府附於泚泚以希鑒為涇原節度使將即亮翻四考異曰邠志曰興元元年月渾公受鉞專征出斜谷崔公勸吐蕃分軍應援尚結贊曰邠軍不出乘我也韓公使曹子逹帥甲三千赴于渾公吐蕃乃以三萬餘從之李楚琳使石鍠以卒七百人從渾瑊進收武功遂居之十日朱泚使韓旻田旻以卒三千冦武功渾公禦之陳于東郊石鍠以其卒降旻於陳渾公軍敗乃馳登西原建旗收卒㑹邠師以吐蕃至賊不知乃悉衆追渾公遂為吐蕃所覆皆死焉田旻以馬逸獲免吐蕃既勝泚軍乃大掠而去涇人相傳言吐蕃助國有功將以叛卒之孥賞而歸之涇人曰不殺馮公雖吾親族亦將不免矣十四日涇卒殺河清以田希鑒請命於泚泚授希鑒涇原節度大使賜金帛使和西戎西戎皆受賂焉希鑒疏涇將之不與己者以告朱泚請殺之泚曰我曲彼直不許按希鑒殺河清必有宿謀或為此訛言以揺衆耳今從實録河清死在三月今從邠志上問陸䞇近有卑官自山北來者梁州在山南岐雍在山北率非良士有邢建者論説賊勢語最張皇皇大也察其事情頗似窺覘覘丑亷翻又丑艶翻今已於一所安置如此之類更有數人若不追尋恐成姦計卿試思之如何為便䞇上奏以為今盗據宫闕有渉險逺來赴行在者當量加恩賞豈得復猜慮拘囚量音良復扶又翻其畧曰以一人之聽覽而欲窮宇宙之變態以一人之防慮而求勝億兆之姦欺役智彌精失道彌逺項籍納秦降卒二十萬慮其懷詐復叛一舉而盡阬之其於防虞亦已甚矣阬降卒事見九卷漢高祖元年漢高豁逹大度天下之士至者納用不疑其於備慮可謂䟽矣䟽與踈同然而項氏以滅劉氏以昌蓄疑之與推誠其效固不同也秦皇嚴肅雄猜而荆軻奮其隂計事見七卷秦始皇二十年光武寛容博厚而馬援輸其欵誠事見四十一卷漢世祖建武四年豈不以虗懷待人人亦思附任數御物物終不親情思附則感而悦之雖冦讐化為心膂矣意不親則懼而阻之雖骨肉結為仇慝矣又曰陛下智出庶物有輕待人臣之心思用萬機有獨馭區㝢之意謀吞衆畧有過慎之防明照羣情有先事之察先悉薦翻嚴束百辟有任刑致理之規威制四方有以力勝殘之志此數語曲盡徳宗心事異日安免追仇乎由是才能者怨於不任忠藎者憂於見疑藎徐刃翻詩王之藎臣毛氏傳曰藎進也著勲業者懼於不容懷反側者迫於及討馭致離叛搆成禍災天子所作天下式瞻小猶慎之矧又非小願陛下以覆車之轍為戒實宗社無疆之休丁巳以前山南東道節度使南皮賈耽為工部尚書先是耽使行軍司馬樊澤奏事行在先悉薦翻澤既復命方大宴有急牒至以澤代耽為節度使事見上卷興元元年耽内牒懷中宴飲如故顔色不改宴罷召澤告之且命將吏謁澤牙將張獻甫怒曰行軍為尚書問天子起居為于偽翻乃敢自圖節鉞奪尚書土地事人不忠請殺之耽曰是何言也天子所命即為節度使矣即日離鎮以獻甫自隨軍府遂安即日離鎮既得君命召不俟駕之義亦所以遏亂原以張獻甫自隨則樊澤無所猜嫌亦所以全獻甫也離力智翻左僕射李揆自吐蕃還甲子薨於鳯州李揆入吐蕃見二百二十八卷建中四年盖自吐蕃還赴興元至鳯州而薨韓遊瓌引兵㑹渾瑊於奉天丙寅加平盧節度使李納同平章事丁卯義王玼薨玼𤣥宗子玼音此又且禮翻朱滔攻貝州百餘日馬寔攻魏州亦踰四旬皆不能下賈林復為李抱真説王武俊復扶又翻為于偽翻説輸芮翻曰朱滔志呑貝魏復值田悦被害復抉又翻儻旬日不救則魏博皆為滔有矣魏博既下則張孝忠必為之臣張孝忠時鎮易定滔連三道之兵三道為幽州易定魏博益以囘紇時囘紇遣兵助滔進臨常山恒州常山郡王武俊居之明公欲保其宗族得乎常山不守則昭義退保西山自常山南至趙州皆恒冀廵屬又西南抵邢州界即昭義廵屬阻山以為固河朔盡入於滔矣不若乘貝魏未下與昭義合兵救之滔既破亡則闗中䘮氣朱泚不日梟夷朱泚竊據闗中滔破則泚䘮氣矣䘮息浪翻鑾輿反正諸將之功孰有居明公之右者哉武俊悦從之戊辰武俊軍于南宫東南抱真自臨洺引兵㑹之與武俊營相距十里兩軍尚相疑明日抱真以數騎詣武俊營賔客共諫止之抱真命行軍司馬盧𤣥卿勒兵以俟曰吾之此舉繫天下安危若其不還領軍事以聽朝命亦惟子勵將士以雪讎耻亦惟子言終遂行武俊嚴備以待之抱真見武俊叙國家禍難難乃旦翻天子播遷持武俊哭流涕縱横縱子容翻武俊亦悲不自勝勝音升左右莫能仰視遂與武俊約為兄弟誓同滅賊武俊曰相公十兄名高四海李抱真第十故呼為十兄曏䝉開諭得棄逆從順免葅醢之罪享王公之榮今又不間胡虜間古莧翻王武俊本出於夷落辱為兄弟武俊當何以為報乎滔所恃者囘紇耳不足畏也戰日願十兄按轡臨視武俊决為十兄破之决為于偽翻抱真退入武俊帳中酣寢久之武俊感激待之益恭指心仰天曰此身已許十兄死矣史言抱真推心待武俊以成大功遂連營而進山南地熱上以軍士未有春服亦自御裌衣裌音夾資治通鑑卷二百三十
