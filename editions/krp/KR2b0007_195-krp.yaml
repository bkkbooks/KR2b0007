body:
  text: 資治通鑑卷一百九十五宋司馬光撰胡三省音註唐紀十一起彊圉作噩五月盡上章困敦凡三年有竒始丁酉終庚子太宗文武大聖大廣孝皇帝中之上貞觀十一年觀古玩翻五月壬申魏徴上䟽以為陛下欲善之志不及於昔時聞過必改少虧於曩日上時掌翻少詩沼翻譴罰積多威怒㣲厲乃知貴不期驕富不期侈非虚言也書周官曰位不期驕禄不期侈孔安國注曰貴不與驕期而驕自至富不與侈期而侈自至魏徴引之且以隋之府庫倉廪户口甲兵之盛考之今日安得擬倫然隋以富疆動之而危我以寡弱静之而安安危之理皎然在目昔隋之未亂也自謂必無亂其未亡也自謂必無亡故賦役無窮征伐不息以至禍將及身而尚未之寤也夫鑒形莫如止水鑒敗莫如亡國夫音扶伏願取鑒於隋去奢從約親忠逺佞去羌吕翻逺于願翻以當今之無事行疇昔之恭儉則盡善盡羙固無得而稱焉夫取之實難守之甚易陛下能得其所難豈不能保其所易乎去羌吕翻逺干願翻易以豉翻六月右僕射虞恭公温彦博薨射寅謝翻諡法尊賢敬讓曰恭執事堅固曰恭執禮御賔曰恭彦博乆掌機務知無不為上謂侍臣曰彦博以憂國之故精神耗竭我見其不逮已二年矣恨不縱其安逸竟夭天年天於紹翻丁巳上幸明徳宫顯慶二年改明徳宫監為東都苑南面監己未詔荆州都督荆王元景等二十一王所任刺史咸令子孫世襲令力丁翻戊辰又以功臣長孫無忌等十四人為刺史長知两翻亦令世襲非有大故無得黜免己巳徙許王元祥為江王秋七月癸未大雨榖洛溢入洛陽宫按唐六典洛陽都城隋大業二年詔楊素宇丈愷移故都創造南直伊闕之口北倚邙山之塞東出瀍水之東西踰澗水之西洛水貫都有河漢之象焉東去故都十八里都城西連禁苑穀􅏖二水㑹于禁苑之間至𤣥宗開元二十四年以榖洛二水或泛溢疲費人功遂出内庫和雇修三陂以禦之一曰積翠二曰月陂三曰上陽爾後二水無勞役之患壊官寺民居壊音怪溺死者六千餘人溺奴狄翻魏徴上疏以為文子曰同言而信信在言前同令而行誠在令外漢書藝文志曰太子老子弟子與孔子並時上時掌翻自王道休明十有餘年然而徳化未洽者由待下之情未盡誠信故也今立政致治必委之君子治直吏翻事有得失或訪之小人其待君子也敬而疎遇小人也輕而狎狎則言無不盡疎則情不上通夫中智之人豈無小慧夫音扶然才非經國慮不及逺雖竭力盡誠猶未免有敗况内懐姦宄其禍豈不深乎宄音軌夫雖君子不能無小過茍不害於正道斯可略矣既謂之君子而復疑其不信復扶又翻何異立直木而疑其影之曲乎陛下誠能慎選君子以禮信用之何憂不治治直吏翻不然危亡之期未可保也上賜手詔褒羙曰昔晉武帝平吳之後志意驕怠何曽位極台司不能直諫乃私語子孫自矜明智事見八十七卷晉懐帝永嘉三年語牛倨翻此不忠之大者也得公之諫朕知過矣當置之几案以比弦韋用堇安于西門豹事乙未車駕還洛陽自明徳宫還洛陽宫還從宣翻又音如字詔洛陽宫為水所毁者少加修繕纔令可居少詩沼翻下同令九丁翻自外衆材給城中壊廬舍者令百官各上封事極言朕過上時掌翻壬寅廢明徳宫及飛山宫之𤣥圃院給遭水者八月甲子上謂侍臣曰上封事者皆言朕游獵太頻今天下無事武備不可忘朕時與左右獵于後苑無一事煩民夫亦何傷夫音扶魏徴曰先王惟恐不聞其過陛下既使之上封事正得恣其陳述茍其言可取固有益於國若其無取亦無所損上曰公言是也皆勞而遣之勞力到翻侍御史馬周上䟽上時掌翻以為三代及漢厯年多者八百少者不減四百良以恩結人心人不能忘故也自是以降多者六十年少者纔二十餘年皆無恩於人本根不固故也陛下當隆禹湯文武之業為子孫立萬代之基豈得但持當年而已今之户口不及隋之什一而給役者兄去弟還道路相繼陛下雖加恩詔使之裁損然營繕不休民安得息故有司徒行文書曽無事實昔漢之文景恭儉養民武帝承其豐富之資故能窮奢極欲而不至於亂曏使髙祖之後即傳武帝漢室安得乆存乎斯確論也又京師及四方所造乘輿器用及諸王妃主服飾議者皆不以為儉乘繩證翻夫昧爽丕顯後世猶怠左傳晉叔向引讒鼎之銘以為言杜預注曰昧旦早起也丕大也言夙興以務大顯後世猶懈怠夫音扶陛下少居民間知民疾苦尚復如此况皇太子生長深宫不更外事少詩照翻復扶又翻長竹两翻更工衡翻萬歳之後固聖慮所當憂也臣觀自古以來百姓愁怨聚為盗賊其國未有不亡者人主雖欲追改不能復全復扶又翻下不復同又音如字故當修於可修之時不可悔之於己失之後也盖幽厲嘗笑桀紂矣煬帝亦笑周齊矣不可使後之笑今如今之笑煬帝也貞觀之初天下饑歉觀古玩翻歉苦簟翻穀梁傳曰一穀不升曰歉斗米直匹絹而百姓不怨者知陛下憂念不忘故也今比年豐穰比毗至翻匹絹得粟十餘斛而百姓怨咨者知陛下不復念之多營不急之務故也復扶又翻自古以來國之興亡不以蓄積多少在於百姓苦樂少詩沼翻樂音洛且以近事驗之隋貯洛口倉而李密因之貯丁吕翻東都積布帛而世充資之西京府庫亦為國家之用至今未盡夫蓄積固不可無要當人有餘力然後收之不可强歛以資㓂敵也夫音扶强其两翻歛力贍翻夫儉以息人陛下已於貞觀之初親所履行在於今日為之固不難也陛下必欲為乆長之謀不必逺求上古但如貞觀之初則天下幸甚觀古玩翻陛下寵遇諸王頗有過厚者時魏王泰有寵於帝故周言及之萬代之後不可不深思也且魏武帝愛陳思王及文帝即位囚禁諸王但無縲絏耳事見漢獻帝紀及魏文帝紀縲力追翻絏息列翻朱元晦曰縲黒索也絏攣也古者獄以黒索拘攣罪人然則武帝愛之適所以苦之也又百姓所以治安治直吏翻唯在刺史縣令茍選用得人則陛下可以端拱無為今朝廷唯重内官而輕州縣之選刺史多用武人或京官不稱職治補外任朝直遥翻稱尺證翻邊逺之處用人更輕所以百姓未安殆由於此䟽奏上稱善乆之謂侍臣曰刺史朕當自選縣令宜詔京官已上各舉一人冬十月癸丑詔勲戚亡者皆陪葬山陵唐制凡功臣密戚請陪陵葬者聼之以文武分為左右兩列若宫人陪葬則陵户為之成墳唐㑹要載昭陵陪葬者宫嬪公主主壻勲貴及祖父陪陵而子孫從葬者及四夷君長入宿衛而陪葬者名氏最多用此詔也上獵于洛陽苑唐六典洛陽苑在都城之西北距北邙西至孝水南帶洛水支渠穀洛二水㑹于其間東而十七里南面三十九里西面五十里北面二十周廻一百二十六里有羣豕突出林中上引弓四發殪四豕有豕突前及馬鐙殪壹計翻鐙都鄧翻鞍鐙民部尚書唐儉投馬摶之上拔劎斬豕顧笑曰天䇿長史不見上將撃賊邪武徳中帝開天䇿上將府以唐儉為長史長知两翻將即亮翻邪音耶何懼之甚對曰漢髙祖以馬上得之不以馬上治之漢陸賈諫髙祖之言治直之翻陛下以神武定四方豈復逞雄心於一獸上恱為之罷獵復扶乂翻為于偽翻尋加光禄大夫安州都督吳王恪數出畋獵數所角翻頗損居人侍御史柳範奏彈之丁丑恪坐免官削户三百上曰長史權萬紀事吾兒不能匡正罪當死柳範曰房𤣥齡事陛下猶不能止畋獵豈得獨罪萬紀上大怒拂衣而入乆之獨引範謂曰何面折我折之舌翻對曰陛下仁明臣不敢不盡愚直古語有之君仁則臣直又曰君明則臣直故柳範云然上恱十一月辛卯上幸懐州丙午還洛陽宫故荆州都督武士彠女年十四上聞其羙召入後宫為才人為武氏亂唐張本彠一虢朝考異曰舊則天木紀崩時年八十三唐厯焦璐唐年代記統紀馬總唐年小録聖運圖㑹要皆云八十一唐録政要貞觀十三年入宫據武氏入宫年十四今從吳兢實録為八十二故置此年十二年春正月乙未禮部尚書王珪奏三品已上遇親王於路皆降乘非禮乘繩證翻上曰卿輩茍自崇貴輕我諸子特進魏徴曰諸王位次三公今三品皆九卿八座為王降乘誠非所宜當為于偽翻上曰人生壽夭難期萬一太子不幸安知諸王它日不為公輩之主何得輕之時太子承乾有足疾魏王㤗有寵太宗此言固有以泰代承乾之心矣夭于紹翻對曰自周以來皆子孫相繼不立兄弟所以絶庶孽之窺窬塞禍亂之源本孽魚列翻塞悉則翻此為國者所深戒也上乃從珪奏吏部尚書髙士亷黄門侍郎韋挺禮部侍郎令狐徳棻中書侍郎岑文本撰氏族志成上之令音鈴棻符分翻撰士免翻上時掌翻先是山東人士崔盧李鄭諸族好自矜地望先悉薦翻好呼到翻雖累葉陵夷茍他族欲與為昏姻白虎通曰昏者昏時行禮故曰昏姻者婦人因夫故曰姻賢曰妻父曰婚婿父曰姻必多責財幣或捨其鄉里而妄稱名族或兄弟齊列而更以妻族相陵上惡之惡烏路翻命士亷等徧責天下譜諜質諸史籍考其真偽辦其昭穆譜博古翻諜逹協翻昭時召翻第其甲乙褒進忠賢貶退姦逆分為九等士亷等以黄門侍郎崔民幹為第一上曰漢髙祖與蕭曹樊灌皆起閭閻布衣卿輩至今推仰以為英賢豈在世禄乎髙氏偏據山東梁陳僻在江南雖有人物盖何足言况其子孫才行衰薄行下孟翻下徳行同官爵陵替而猶卬然以門地自負販鬻松檟依託富貴棄亷忘恥不知世人何為貴之今三品以上或以徳行或以勲勞或以文學致位貴顯行下孟翻彼衰世舊門誠何足慕而求與為昏雖多輸金帛猶為彼所偃蹇我不知其觧何也解猶説也今欲釐正訛謬捨名取實而卿曹猶以崔民幹為第一是輕我官爵而徇流俗之情也乃更命刋定專以今朝品秩為髙下更工衡翻朝直遥翻於是以皇族為首外戚次之降崔民幹為第三九等之次皇族為上之上外戚為上之中崔民幹為上之下凡二百九十三姓千六百五十一家頒於天下二月乙卯車駕西還自洛陽西還長安還從宣翻又音如字癸亥幸河北觀砥柱自西還便道幸河北縣河北縣漢晉属河東郡後魏置河北郡隋廢郡復為縣属蒲州縣南河中有砥柱山貞觀元年以河北縣度属陜州括地志曰陜州河北縣本漢大陽縣甲子巫州獠反貞觀元年分辰州之龍標縣置巫州獠魯皓翻䕫州都督齊善行敗之敗補邁翻俘男女三千餘口乙丑上祀禹廟丁卯至柳谷觀鹽池禹都安邑後人立廟於其地安邑有鹽池則柳谷亦當在安邑庚午至蒲州刺史趙元楷課父老服黄紗單衣迎車駕盛飾廨舍樓觀廨古隘翻觀古玩翻又飼羊百餘頭魚數百頭以饋貴戚飼祥吏翻上數之曰朕廵省河洛數所具翻又所主翻省悉景翻凡有所須皆資庫物卿所為乃亡隋之弊俗也甲戌幸長春宫戊寅詔曰隋故鷹撃郎將堯君素雖桀犬吠堯有乖倒戈之志而疾風勁草實表歳寒之心可贈蒲州刺史仍訪其子孫以聞將即亮翻堯君素事始一百八十四卷隋恭帝義寧元年終一百八十六卷髙祖武徳二年漢鄒陽曰桀之犬可使吠堯武王伐紂前徒倒戈攻其後以北吠扶廢翻閏月庚辰朔日有食之丁未車駕至京師三月辛亥著作佐郎鄧世隆表請集上文章上曰朕之辭令有益于民者史皆書之足為不朽若為無益集之何用梁武帝父子陳後主隋煬帝皆有文集行於世何救於亡為人主患無徳政文章何為遂不許丙子以皇孫生宴五品以上於東宫上曰貞觀之前從朕經營天下𤣥齡之功也貞觀以來繩愆紏繆魏徴之功也觀古玩翻皆賜之佩刀上謂徴曰朕政事何如往年對曰威徳所加比貞觀之初則逺矣人恱服則不逮也上曰逺方畏威慕徳故來服若其不逮何以致之對曰陛下往以未治為憂故徳義日新今以既治為安故不逮治直吏翻上曰今所為猶往年也何以異對曰陛下貞觀之初恐人不諌常導之使言中間恱而從之今則不然雖勉從之猶有難色所以異也上曰其事可聞歟對曰陛下昔欲殺元律師孫伏伽以為法不當死陛下賜以蘭陵公主園直百萬或云賞太厚蘭陵公主上女也下嫁竇懐悊上以其園賞孫代伽陛下云朕即位以來未有諌者故賞之此導之使言也司户柳雄妄訴隋資隋資隋朝所授官資也陛下欲誅之納戴胄之諌而止是恱而從之也近皇甫徳參上書諌修洛陽宫陛下恚之雖以臣言而罷勉從之也皇甫徳麥事見上卷八年上時掌翻恚于避翻上曰非公不能及此人苦不自知耳夏五月壬申𢎞文館學士永興文懿公虞世南卒唐六典𢎞文館學士無員數後漢有東觀魏有崇文館宋元嘉有𤣥史两館宋泰始至齊永明有總文館梁有士林館北齊有文林館後周有崇文館或典校理或司撰著或兼訓生徒若今𢎞文館之任也武徳初置修文館武徳末改為𢎞文館永興縣屬鄂州謚法温柔賢善曰懿卒子恤翻上哭之慟世南外和柔而内忠直上嘗稱世南有五絶一徳行行下孟翻二忠直三博學四文辭五書翰秋七月癸酉以吏部尚書髙士亷為右僕射乙亥吐蕃㓂𢎞州𢎞恐當作松吐從暾入聲八月霸州山獠反按天寳元年招附生羌置静戎郡乾元元年方置霸州又松州都督府所管党項羈縻州有霸州然當以其酋豪為刺史而此霸州又是儀鳯二年松州加督三十八州之數獠魯皓翻燒殺刺史向邵陵及吏民百餘家初上遣使者馮徳遐撫慰吐蕃吐從暾入聲吐蕃聞突厥吐谷渾皆尚公主厥九勿翻谷音浴遣使隨徳遐入朝使疏吏翻朝直遥翻多齎金寳奉表求婚上未之許使者還言於贊普棄宗弄讚曰臣初至唐唐待我甚厚許尚公主㑹吐谷渾王入朝相離間間古莫翻唐禮遂衰亦不許昏弄讚遂發兵撃吐谷渾吐谷渾不能支遁千青海之北民畜多為吐蕃所掠吐蕃進破党項白蘭諸羌帥衆二十餘萬屯松州西境党底朗翻帥讀曰率遣使貢金帛云來迎公主尋進攻松州敗都督韓威敗補邁翻下敗吐同羌酋閻州刺史别叢臥施諾州刺史把利歩利並以州叛歸之貞觀五年以党項降羌置羈縻州有州諾州皆屬松州都督府無閻州酋慈由翻連兵不息其大臣諫不聼而自縊者凡八輩縊于計翻又于賜翻壬寅以吏部尚書侯君集為當彌道行軍大總管甲辰以右領軍大將軍執失思力為白蘭道左武衛將軍牛進逹為闊水道左領軍將軍劉簡為洮河道行軍總管督歩騎五萬撃之洮土刀翻騎竒寄翻吐蕃攻城十餘日進逹為先鋒九月辛亥掩其不備敗吐蕃于松州城下宋白曰松州之地漢魏諸羌居之及晉内附以其地属汶山郡後魏時鄧至王像舒據之遣使朝貢始置甘松縣後周置龍涸防唐置松州去長安二千二百五十里斬首千餘級弄讚懼引兵退遣使謝罪因復請婚使疏吏翻復扶又翻上許之甲寅上問侍臣創業與守成孰難房𤣥齡曰草昧之初易曰天造草昧王弼注云造物之始始于冥昧故曰草昧也廣雅草造也董云草昧微物與羣雄並起角力而後臣之創業難矣魏徴曰自古帝王莫不得之於艱難失之於安逸守成難矣上曰𤣥齡與吾共取天下出百死得一生故知創業之難徴與吾共安天下常恐驕奢生於富貴禍亂生於所忽故知守成之難然創業之難既已往矣守成之難方當與諸公慎之𤣥齡等拜曰陛下及此言四海之褔也初突厥頡利既亡北方空虛厥九勿翻頡奚結翻薛延陀真珠可汗帥其部落建庭于都尉揵山北獨邏水南按薛延陀建庭之地在鬱督軍山東南距京師纔三千里而贏新書曰烏徳揵山左右嗢昆河獨邏河皆屈曲東北流嗢昆在南獨邏在北過回紇牙帳東北五百里而合流可從刋入聲汗音寒帥讀曰率揵居言翻邏郎佐翻勝兵二十萬勝音升立其二子拔酌頡利苾主南北部苾翻必上以其彊盛恐後難制癸亥拜其二子皆為小可汗各賜鼓纛纛徒到翻外示優崇實分其勢冬十月乙亥巴州獠反後漢於宕渠北界置漢昌縣後魏於縣置大谷郡又於郡北置巴州随改為清化郡唐復為巴州獠魯皓翻下同己卯畋于始平曹魏置始平縣屬扶風晉分立始平郡後魏復為縣屬扶風隋屬京兆九域志在府西八十里乙未還京師鈞州獠反遣桂州都督張寳徳討平之十一月丁未初置左右屯營飛騎於𤣥武門以諸將軍領之又簡飛騎才力驍健善騎射者號百騎衣五色袍乘駿馬以虎皮為韀騎竒寄翻驍堅堯翻衣於既翻韀則前翻凡遊幸則從焉己巳明州獠反吳置越裳縣屬九徳郡以古越裳之地也隋屬驩州日南郡武徳五年以越裳地置明州遣交州都督李道彦討平之十二月辛巳左武候將軍上官懐仁擊反獠于壁州後漢和帝分岩縣之東置宣漢縣梁分宣漢置始寧縣元魏分始寧縣置諾水縣武徳八年分巴州之始寧縣置壁州始寧郡大破之虜男女萬餘口是歳以給事中馬周為中書舍人周有機辯中書侍郎岑文本常稱馬君論事援引事類掦𣙜古今毛晃曰掦𣙜大舉又掎也舉而引之也榷訖岳翻舉要刪煩㑹文切理一字不可増亦不可減聼之靡靡令人忘倦霍王元軌好讀書恭謹自守舉措不妄為徐州刺史與處士劉𤣥平為布衣交好呼到翻處昌吕翻人問𤣥平王所長𤣥平曰無長問者怪之𤣥平曰夫人有所短乃見所長夫音扶至於霍王無所短吾何以稱其長哉初西突厥咥利失可汗分其國為十部毎部有酋長一人酋慈由翻長知兩翻可從刋入聲汗音寒仍各賜一箭謂之十箭又分左右廂左廂號五咄陸置五大啜居碎葉以東右廂號五弩失畢置五大俟斤居碎葉以西通謂之十姓咄陸五啜號處木昆律啜胡禄屋闕啜攝舍提敦啜突騎施賀邏施啜䑕尼施處半啜弩失畢五俟斤號阿悉結闕俟斤哥舒闕俟斤拔寒幹暾沙鉢俟斤阿悉結泥孰俟斤阿舒虚半俟斤碎葉城在焉耆碎葉川出安西西北千里至碎葉杜佑曰碎葉川長千餘里東頭有熱海西頭有怛邏期城咄當沒翻啜陟劣翻康曰俟渠之切咥利失失衆心為其臣統吐屯所襲咥利失兵敗與其弟歩利設走保焉耆新書曰焉耆國直京師西七千里而嬴横六百里縱四百里其國東髙昌西龜兹南尉黎北烏孫漢舊國也統吐屯等將立欲谷設為大可汗㑹統吐屯為人所殺欲谷設兵亦敗咥利失復得故地復扶又翻又音如字至是西部竟立欲谷設為乙毗咄陸可汗乙毗咄陸既立與咥利失大戰殺傷甚衆因中分其地自伊列水以西屬乙咄陸以東屬咥利失伊列水亦名伊麗水注詳見後處月處宻與髙昌共攻抜焉耆五城掠男女一千五百人焚其廬舍而去為伐髙昌張本十三年春正月乙巳車駕謁獻陵唐謁陵之制設行宫距陵十里設坐於齋室設小次於陵所道西南大次於寝西南侍臣次於大次西南陪位者次又於西南皆東向文官於北武官於南朝集使又於其南皆相地之宜皇帝至行宫即齋室陵令以玉册進署設御位於陵東南隅西向有岡麓之陔則隨地之宜又設位於寢宫之殿東陛之東南西向尊坫陳於堂户東南百官行從宗室客使位神道左右寢宫則分方序立大次前其日未明五刻陳黄麾仗于陵寝三刻行事官及宗室親五等諸親三等以上及客使之當陪者就位皇帝素服乗馬華盖繖扇侍臣騎從詣小次出次至位再拜又再拜在位者皆再拜又再拜少選太常卿請辭皇帝再拜又再拜奉禮曰奉辭在位者再拜皇帝還小次乘馬詣大次仗衛列立以俟行百官宗室諸親客使序立次前皇帝歩至寢宮南門仗衛止乃入由東序進殿陛東南位再拜升自東階北向再拜又再拜入省服玩抆拭帳簀進太牢之饌加珍羞皇帝出尊所酌酒入三奠爵北向立太祝二人持玉册立于户外東向跪讀皇帝再拜又再拜乃出戸當前北向立太常卿請辭皇帝再拜出東門還大次宿行宫丁未還宫戊午加左僕射房𤣥齡太子少師𤣥齡自以居端揆十五年左右僕射尚書省長官故曰端揆按武徳九年房𤣥齡為中書令貞觀二年為左僕射至是財十一年未及十五年也少始照翻男遺愛尚上女髙陽公主女為韓王妃韓王元嘉髙袓之子深畏滿盈上表請解機務上時掌翻上不許𤣥齡固請不已詔斷表乃就職斷音短丁管翻今之讓官者奉表三讓不許勑斷來章則閤門不復受其表即唐制之斷表也太子欲拜𤣥齡設儀衛待之𤣥齡不敢謁見而歸時人善其有讓𤣥齡以度支繫天下利害嘗有闕求其人未得乃自領之唐制度支郎中掌天下租賦物産豐約之宜水陸道塗之利歳計所出而支調之以近及逺與中書門下議定乃奏國之大計所闗也𤣥齡審官求賢未得其人故自領之唐中世以後宰相多判度支盖昉于此度徒洛翻禮部尚書永寧懿公王珪薨永寧縣屬洛州珪性寛裕自奉飬甚薄於令三品已上皆立家廟唐制三品已上得立廟祭三代珪通貴已乆獨祭於寢為法司所劾劾户槩翻又戸得翻上不問命有司為之立廟以愧之司為于偽翻下上為同二月庚辰以光禄大夫尉遲敬徳為鄜州都督尉紆勿翻鄜芳無翻上嘗謂敬徳曰人或言卿反何也對曰臣反是實臣從陛下征伐四方身經百戰今之存者皆鋒鏑之餘也天下已定乃更疑臣反乎因解衣投地出其瘢痍瘢薄官翻痍音夷上為之流涕曰卿復服朕不疑卿故語卿何更恨邪上又嘗謂敬徳曰朕欲以女妻卿何如邪音耶語牛倨翻妻七細翻敬徳叩頭謝曰臣妻雖鄙陋相與共貧賤乆矣臣雖不學聞古人富不易妻此非臣所願也上乃止戊戍尚書奏近世掖庭之選掖音亦或微賤之族禮訓蔑聞謂由侍兒及歌舞得進者或刑戮之家憂怨所積謂縁坐沒入掖庭者請自今後宫及東宫内職有闕皆選良家有才行者充行下孟翻以禮聘納其沒宫口及素微賤之人皆不得補用上從之上既詔宗室羣臣襲封刺史左庶子于志寧以為古今事殊恐非乆安之道上䟽争之上時掌翻下同侍御史馬周亦上䟽以為堯舜之父猶有朱均之子朱均謂丹朱商均也儻有孩童嗣職萬一驕愚兆庶被其殃而國家受其敗孩何開翻被皮義翻正欲絶之也則子文之治猶在左傳楚闘椒作亂莊王滅若敖氏既而思子文之治楚國也曰子文無後何以勸善使其孫箴尹克黄復其所治直吏翻正欲留之也而欒黶之惡已彰右傳秦伯問於士鞅曰晉大夫其誰先亡對曰其欒氏乎欒黶汰虐已甚猶可以免其在盈乎秦伯曰何故對曰武子之徳在民如周人之思召公焉愛其甘棠况其子乎欒黶死盈之善未及民武子所施沒矣而黶之怨實彰將於是乎在與其毒害於見存之百姓見賢遍翻則寧使割恩於已亡之一臣明矣然則向所謂愛之者乃適所以傷之也臣謂宜賦以茅土疇其户邑必有材行隨器授官行下孟翻使其人得奉大恩而子孫終其褔禄㑹司空趙州刺史長孫無忌等皆不願之國上表固讓長知两翻稱承恩以來形影相弔若履春冰春來冰薄履之則有陷溺之懼宗族憂虞如寘湯火緬惟三代封建盖由力不能制因而利之禮樂節文多非已出兩漢罷候置守蠲除曩弊深恊事宜守式又翻今因臣等復有變更復扶又翻更工衡翻恐紊聖朝綱紀紊音問朝直遥翻且後世愚㓜不肖之嗣或抵冐邦憲自取誅夷冐莫北翻更因延世之賞致成勦絶之禍良可哀愍勦子小翻願停渙汗之㫖賜其性命之恩無忌又因子婦長樂公主固請於上主嫁無忌子冲樂音洛且言臣披荆棘事陛下今海内寧一奈何棄之外州與遷徙何異上曰割地以封功臣古今通義意欲公之後嗣輔朕子孫共傳永乆而公等乃復發言怨望朕豈强公等以茅土邪復扶又翻强其两翻邪音耶庚子詔停世封刺史髙昌王麴文泰多遏絶西域朝貢朝直遥翻下同伊吾先臣西突厥既而内屬事見一百九十三卷四年厥九勿翻文泰與西突厥共擊之上下書切責下遐嫁翻徴其大臣阿史那矩欲與議事文泰不遣遣其長史麴雍來謝罪長知兩翻頡利之亡也見一百九十三卷四年中國人在突厥者或奔髙昌詔文泰歸之文泰蔽匿不遣又與西突厥共擊破焉耆焉耆訴之掠焉耆見上卷六年又見上年上遣虞部郎中李道裕往問狀虞部郎掌京城街巷種植山澤苑囿草木薪炭供頓田獵之事屬工部且謂其使者曰髙昌數年以來朝貢脱略無藩臣禮所置官號皆凖天朝築城掘溝預備攻討我使者至彼文泰語之云鷹飛于天雉伏于蒿猫遊于堂䑕噍于宂使疏吏翻語牛倨翻噍而笑翻各得其所豈不能自生邪又遣使謂薛延陀曰既為可汗則與天子匹敵何為拜其使者事人無禮又聞鄰國為惡使疏吏翻下同間古莧翻不誅善何以勸明年當發兵擊汝三月薛延陀可汗遣使上言奴受恩思報請發所部為軍導以擊髙昌可從刋入聲汗音寒上時掌翻上遣民部尚書唐儉右領軍大將軍執失思力齎繒帛賜薛延陀與謀進取繒慈陵翻夏四月戊寅上幸九成宫初突厥突利可汗之弟結社率從突利入朝厥九勿翻可從刋入聲汗音寒朝直遥翻厯位中郎將將即亮翻居家無頼怨突利斥之乃誣告其謀反上由是薄之乆不進秩結社率隂結故部落得四十餘人謀因晉王治四鼓出官開門辟仗辟毗亦翻馳入宫門直指御帳可有大功甲申擁突利之子賀邏鶻夜伏于宫外邏郎佐翻鶻户骨翻㑹大風晉王未出結社率恐曉遂犯行宫踰四重幕弓矢亂發衛士死者數十人折衝孫武開等帥衆奮擊重直龍翻折之舌翻折衝折衝都尉也帥讀曰率乆之乃退馳入御廐盗馬二十餘匹北走度渭欲奔其部落追獲斬之原賀邏鶻投于嶺表庚寅遣武候將軍上官懐仁擊巴壁洋集四州反獠平之洋音祥獠魯皓翻虜男女六千餘口五月旱甲寅詔五品以上上封事上封時掌翻下同魏徴上䟽以為陛下志業比貞觀之初漸不克終者凡十條觀古玩翻其間一條以為頃年以來輕用民力乃云百姓無事則驕逸勞役則易使易以豉翻自古未有因百姓逸而敗勞而安者也此恐非興邦之至言上深加奬歎云已列諸屏障朝夕聸仰并録付史官仍賜徴黄金十斤廐馬二匹六月渝州人侯𢎞仁自牂柯開道經西趙出邕州以通交桂東謝蠻西接牂柯蠻南接西趙蠻牂柯之别帥曰羅殿今廣西買馬路自桂州至邕州横山寨二十餘程自横山至杞國二十二程又至羅殿十程此即候𢎞仁所通者也邕州漢欝林郡領方縣地晉分欝林置晉興郡隋廢晉興為宣化縣屬欝林郡唐武徳四年置南晉州貞觀六年改邕州朗寧郡牂柯音臧哥蠻俚降者二萬八千餘户俚音里降户江翻丙申立皇弟元嬰為滕王自結社率之反言事者多云突厥留河南不便河南謂北河之南漢衛青擊匈奴所収河南地是也厥九勿翻秋七月庚戍詔右武候大將軍化州都督懐化郡王李思摩為乙彌泥孰俟利苾可汗賜之鼓纛俟渠之翻苾毗必翻纛徒到翻突厥及胡在諸州安置者並令度河還其舊部俾世作藩屏屏必郢翻長保邊塞突厥咸憚薛延陀不肯出塞上遣司農卿郭嗣本賜薛延陀璽書璽斯氏翻言頡利既敗頡奚結翻其部落咸來歸化我略其舊過嘉其後善待其逹官皆如吾百寮部落皆如吾百姓中國貴尚禮義不滅人國前破突厥止為頡利一人為百姓害止為于偽翻實不貪其土地利其人畜恒欲更立可汗恒户登翻下同故置所降部落於河南任其畜牧今户口蕃滋蕃扶元翻吾心甚喜既許立之不可失信秋中將遣突厥度河復其故國爾薛延陀受册在前延陀受册見一百九十三卷二年突厥受册在後後者為小前者為大爾在磧北突厥在磧南各守土疆鎮撫部落其踰分故相抄掠磧七迹翻分扶問翻抄楚交翻我則發兵各問其罪薛延陀奉詔於是遣思摩帥所部建牙於河北河北則大磧之南帥讀曰率上御齊政殿餞之思摩涕泣奉觴上壽曰奴等破亡之餘分為灰壤上壽時掌翻分扶問翻陛下存其骸骨復立為可汗復扶又翻下復下同可從刋入聲汗音寒願萬世子孫恒事陛下恒户登翻又遣禮部尚書趙郡王孝恭等齎册書就其種落築壇於河上而立之種章勇翻上謂侍臣曰中國根榦也四夷枝葉也割根榦以奉枝葉木安得滋榮朕不用魏徴言㡬致狼狽謂結社率之變也魏徵言見上卷四年㡬居希翻又以左屯衛將軍阿史那忠為左賢王左武衛將軍阿失那泥孰為右賢王忠蘇尼失之子也蘓尼失見一百九十三卷四年上遇之甚厚妻以宗女妻七細翻及出塞懐慕中國見使者必泣涕請入待詔許之八月辛未朔日有食之詔以身體髮膚不敢毁傷引孝經孔子之言比來訴訟者或自毁耳目比毗至翻自今有犯先笞四十然後依法依法處斷其所訴之事也冬十月甲申車駕還京師自九成宫還也十一月辛亥以侍中楊師道為中書令戊辰尚書左丞劉洎為黄門侍郎叅知政事洎其冀翻上猶冀髙昌王文泰悔過復下璽書示以禍褔徴之入朝下遐嫁翻璽所氏翻朝直遥翻下同文泰竟稱疾不至十二月壬申遣交河行軍大總管吏部尚書侯君集副總管兼左屯衛大將軍薛萬均等將兵擊之將即亮翻乙亥立皇子褔為趙王己丑吐谷渾王諾曷鉢來朝以宗女為𢎞化公主妻之妻七細翻壬辰上畋于咸陽咸陽秦都漢為渭城縣屬右扶風晉廢縣後魏置咸陽郡隋廢武徳元年分涇陽始平置咸陽縣屬京兆九域志在府西四十里癸巳還宫太子承乾頗以遊畋廢學右庶子張𤣥素諌不聼是歲天下州府凡三百五十八縣一千五百一十一太史令傳奕精究術數之書而終不之信遇病不呼醫餌藥有僧自西域來善呪術能令人立死復呪之使蘇上擇飛騎中壯者試之皆如其言呪職救翻復扶又翻騎竒寄翻以告奕奕曰此邪術也臣聞邪不干正請使呪臣必不能行上命僧呪奕奕初無所覺須㬰僧忽僵仆若為物所擊遂不復蘇僵居良翻復扶又翻又有婆羅門僧天竺漢身毒國也或曰摩伽陀曰婆羅門言得佛齒所擊前無堅物長安士女輻湊如市奕時臥疾謂其子曰吾聞有金剛石性至堅物莫能傷唯羚羊角能破之杜佑曰扶南國出金剛石可以刻玉狀如紫石英其所生乃在百丈水底盤石上始如鍾乳人取之竟日乃出以鐵鎚之而不傷鐡乃自損以羚羊角扣之漼然冰泮陶𢎞景曰羚羊今出建平宜都蠻中及西域多两角一角者為勝角甚多節感蹙員繞陳藏器餘曰羚羊有神夜宿以角掛樹不著地羚音零汝往試焉其子往見佛齒出角叩之應手而碎觀者乃止奕臨終戒其子無得學佛書時年八十五又集魏晉以來駁佛教者為髙識傳十卷行於世駁北角翻傳直戀翻西突厥咥利失可汗之臣俟利發與乙毗咄陸可汗通謀作亂咥利失窮蹙逃奔鏺汗而死新書曰寧逺者本拔汗那或曰鏺汗元魏所謂破洛那居西鞬城在真珠河之北去京師八千里厥九勿翻咥徒結翻又丑栗翻可從刋入聲汗音寒俟渠之翻咄當沒翻鏺普活翻弩失畢部落迎其弟子薄布特勒立之是為乙毗沙鉢羅葉䕶可汗沙鉢羅葉䕶既立建庭於雖合水北謂之南庭自龜茲鄯善且末吐火羅焉耆石史何穆康等國皆附之龜茲一曰丘茲一曰屈茲東距京師七千里而贏自于闐東關東行入大流沙行千里至故折摩䭾那古且末也又千里至故納縳波古樓蘭也吐火羅或曰吐豁羅曰覩貨羅元魏謂之吐呼羅居葱嶺烏滸河之南古大夏也石國或曰柘支曰柘折曰赭時漢大宛北鄙也去京師九千里東北距西突厥王姓石治柘折城故康居小王窳匿城也史或曰佉沙曰羯霜那居獨莫水南康居小王蘇城故地南四百里抵吐火羅何或曰屈霜彌伽曰貴霜匿即康居小王附墨城故地新書康漢康居也枝庶分王曰安曰曹曰米曰何曰火尋曰戊地曰史世謂九姓意者穆亦康國枝庶歟龜茲音丘慈鄯時戰翻且子余翻咄陸建牙於鏃曷山西謂之北庭舊書自焉耆西北七日行至其南庭又正北八日行至其北庭鏃作木翻自厥越失拔悉彌駁馬結骨火燖觸水昆等國皆附之拔悉彌蓋即拔悉宻在葛邏禄之西駁馬或曰弊刺曰遏邏支直突厥之北距京師萬四千里北極于海以馬耕田雖畜馬而不乘資湩酪以食馬色皆駁故以名國結骨古堅昆國也當伊吾西焉耆北白山之旁堅昆後語訛為結骨稍號紇骨亦曰紇扢斯又曰黠戞斯火燖或為貨利習彌曰過利居烏滸水之陽西南與波斯接西北抵突厥駁北角翻燖徐塩翻以伊列水為境伊列漢時西域故國在康居北陳湯與甘延壽謀郅支曰北擊伊列西取安息此其證也咄考異曰沙鉢羅葉䕶傳云東以伊列河為界按乙毗陸傳云自伊列河以西屬咄陸以東屬咥利失沙鉢羅葉䕶既因咥利失之地應云西以伊列河為界今未知二傳孰誤故但云伊列水為境十四年春正月甲寅上幸魏王泰第赦雍州長安繫囚大辟以下免延康里今年租賦賜泰府僚屬及同里老人有差魏王泰第在長安城中延康里按雍州二赤縣長安萬年皆治長安城中今止赦長安囚盖延康里屬長安縣管雍於用翻辟毗亦翻二月丁丑上幸國子監觀釋奠按唐國子監在安上門西唐制仲春仲秋釋奠于文宣王皆以上丁上戊以祭酒司業博士三獻命祭酒孔頴逹講孝經賜祭酒以下至諸生髙第帛有差周官有師氏保氏漢始置祭酒博士晉始立國子學唐國子祭酒從三品掌那國儒學訓導之政令是時上大徴天下名儒為學官數幸國子監使之講論學生能明一大經已上皆得補官唐取士以禮記春秋左氏傳為大經詩儀禮周禮為中經易尚書春秋公羊傳榖梁傳為小經數所角翻已上時掌翻増築學舍千二百間増學生滿二千二百六十員自屯營飛騎亦給博士使授以經有能通經者聼得貢舉於是四方學者雲集京師乃至髙麗百濟新羅髙昌吐蕃諸酋長亦遣子弟請入國學升講筵者至八千餘人騎竒寄翻麗力知翻酋慈由翻長知兩翻吐從暾入聲十考異曰舊傳云八餘人今從新書上以師說多門章句繁雜命孔頴逹與諸儒撰定五經䟽謂之正義令學者習之五經正義今行於世撰士免翻䟽所去翻令力丁翻壬午上行幸驪山温湯驪力知翻辛卯還宫乙未詔求近世名儒梁皇甫侃禇仲都周熊安生沈重陳沈文阿周𢎞正張譏隋何妥劉炫等子孫以聞當加引擢妥吐火翻炫熒絹翻三月竇州道行軍總管党仁𢎞擊羅竇反獠破之俘七千餘口獠魯皓翻辛丑流鬼國遣使入貢去京師萬五千里濵於北海南鄰靺鞨流鬼國直黒水靺鞨東北少海之北三面阻海南與莫曳靺鞨鄰東南航海十五日行乃至人依島嶼散居多沮澤初附百濟後附新羅東夷也杜佑曰流鬼國在北海之北使疏吏翻靺音末鞨音曷未嘗通中國重三譯而來重直龍翻上以其使者佘志為騎都尉孫愐曰佘視遮翻姓也丙辰置寧朔大使以䕶突厥厥九勿翻夏五月壬寅徙燕王靈䕫為魯王燕因肩翻上將幸洛陽命將作大匠閻立徳行清暑之地行下孟翻秋八月庚午作襄城宫於汝州西山秦置將作掌營繕宫室厯代不改漢景帝置將作大匠唐從三品掌供邦國修造土木工匠之政令新志貞觀中置清暑宫于汝州臨汝縣鳴臯山南按汝水睨廣成澤立徳立本之兄也閻立本髙宗朝為相髙昌王文泰聞唐兵起謂其國人曰唐去我七千里沙磧居其二千里地無水草寒風如刀熱風如燒安能致大軍乎往吾入朝入朝見一百九十三卷四年磧七迹翻朝直遥翻見秦隴之北城邑蕭條非復有隋之北復扶又翻今來伐我發兵多則糧運不給三萬已下吾力能制之當以逸待勞坐收其弊若頓兵城下不過二十日食盡必走然後從而虜之何足憂也及聞唐兵臨磧口憂懼不知所為發疾卒卒子恤翻子智盛立軍至柳谷新志西州交河縣北行二百一十里至柳谷渡詗者言文泰刻日將葬詗休正翻又古迥翻國人咸集於彼諸將請襲之將即亮翻下同候君集曰不可天子以髙昌無禮故使吾討之今襲人於墟墓之間非問罪之師也於是鼓行而進至田城按考異曰實録作田地城今從舊傳田城即田地城也麴嘉之王髙昌也置田地太守封其二子一為交河公一為田地公新書曰田地城即漢戊已校尉所治地宋白曰西州髙昌縣本晉田地縣之地輿地志云晉咸和二年置髙昌郡立田地縣唐改髙昌縣諭之不下詰朝攻之詰去吉翻及午而克虜男女七千餘口以中郎將辛獠兒為前鋒夜趨其都城將即亮翻獠魯皓翻趨七喻翻髙昌逆戰而敗大軍繼至抵其城下智盛致書於君集曰得罪於天子者先王也天罰所加身已物故智盛襲位未㡬惟尚書憐察㡬居豈翻君集報曰茍能悔過當束手軍門智盛猶不出君集命填塹攻之飛石雨下城中人皆室處塹七艷翻處昌吕翻又為巢車髙十丈俯瞰城中左傳楚子登巢車以望晉軍釋文云兵車髙如巢以望敵也杜預曰車上施櫓杜佑説見前巢居傲翻瞰苦濫翻有行人及飛石所中皆唱言之先是文泰與西突厥可汗相結中竹仲翻先悉薦翻厥九勿翻可從刋入聲汗音寒歲考異曰舊傳云與欲谷設約按欲谷設去已敗死今不取約有急相助可汗遣其葉䕶屯可汗浮圖城葉䕶突厥逹官也為大臣之首自交河城至浮圖城三百七十里為文泰聲援及君集至可汗懼而西走千餘里葉䕶以城降智盛窮蹙癸酉開門出降髙昌自麴嘉有國傳九世一百三十四年而亡降户江翻君集分兵略地下其二十二城户八千四十六口一萬七千七百三考異曰舊傳户八千口萬七千七百今從實録地東西八百里南北五百里上欲以髙昌為州縣魏徴諌曰陛下初即位文㤗夫婦首來朝文泰入朝見四年其後稍驕倨故王誅加之罪止文泰可矣宜撫其百姓存其社稷復立其子則威徳被於遐荒四夷皆恱服矣復扶又翻被皮義翻今若利其土地以為州縣則常須千餘人鎮守數年一易往來死者什有三四供辦衣資違離親戚離力智翻十年之後隴右虚耗矣陛下終不得髙昌撮粟尺帛以佐中國所謂散有用以事無用臣未見其可上不從九月以其地為西州以可汗浮圖城為庭州西州治髙昌縣漢車師前王庭也庭州治金滿縣漢車師後王庭也宋白曰二州相去四百五十里各置屬縣乙卯置安西都䕶府於交河城留兵鎮之君集虜髙昌王智盛及其羣臣豪傑而還還從宣翻又如字於是唐地東極于海西至焉耆南盡林邑北抵大漠皆為州縣凡東西九千五百一十里南北一萬九百一十八里侯君集之討髙昌也遣使約焉耆與之合勢使疏吏翻焉耆喜聼命及髙昌破焉耆王詣軍門謁見君集且言焉耆三城先為髙昌所奪君集奏并髙昌所掠焉耆民悉歸之髙昌掠焉耆見六年冬十月甲戌荆王元景等復表請封禪復扶又翻上不許初陳倉折衝都尉魯寧坐事繫獄自恃髙班慢罵陳倉尉尉氏劉仁軌陳倉縣屬岐州唐制畿縣尉正九品下上縣尉從九品上中下縣從九品下仁軌杖殺之州司以聞上怒命斬之猶不解曰何物縣尉敢殺吾折衝命追至長安面詰之仁軌曰魯寧對臣百姓辱臣如此臣實忿而殺之辭色自若魏徴侍側曰陛下知隋之所以亡乎上曰何也徴曰隋末百姓彊而陵官吏如魯寧之比是也魯寧官為折衝本陳倉百姓上恱擢仁軌為櫟陽丞漢髙皇帝葬太上皇于櫟陽北原號萬年陵改櫟陽為萬年縣至隋猶因之唐都長安改隋大興縣曰萬年而舊萬年縣復曰櫟陽屬京兆唐畿縣丞正八品下上將幸同州校獵仁軌上言上時掌翻今秋大稔民收穫者什纔一二使之供承獵事治道葺橋動費一二萬功實妨農事願少留鑾輿旬日俟其畢務則公私俱濟上賜璽書嘉納之治直之翻少詩沼翻璽斯氏翻尋遷新安令唐初置新安郡貞觀元年廢郡為縣屬洛州唐制畿縣令正六品下上縣從六品上中縣正七品上下縣從七品下閏月乙未行幸同州庚戌還宫丙辰吐蕃贊普遣其相禄東贊獻金五千兩及珍玩數百以請昏相息亮翻上許以文成公主妻之文成公主宗女也妻七細翻十一月甲子朔冬至上祀南郊時戊寅厯以癸亥為朔行戊寅厯見一百八十七卷武徳三年宣義郎李淳風表稱古厯分日起於子半今歲甲子朔旦冬至而故太史令傅仁均減餘稍多子初為朔遂差三刻用乖天正請更加考定衆議以仁均定朔㣲差淳風推校精密請如淳風議從之丁卯禮官奏請加髙袓父母服齊衰五月嫡子婦服朞嫂叔弟妻夫兄舅皆服小功從之按新志髙袓作曽祖舊服齊衰三月嫡子婦舊服大功衆子婦舊服小功今加衆子婦服大功而嫂叔弟妻夫兄舅舊服緦者皆加服小功齊音咨衰土回翻丙子百官復表請封禪復扶又翻詔許之更命諸儒詳定儀注以太常卿韋挺等為封禪使使疏吏翻司門員外郎韋元方給給使過所稽緩唐司門郎掌天下諸門諸闗出入往來之籍凡天下之闗二十有六所以限内外隔華夷設險作固閑邪正禁者也凡度闗者先經刑部司門請過所給使禁中給使令者宦官也唐内給使無常員凡無官品者號内給使屬宫闈署令給使奏之上怒出元方為華隂令華隂縣屬華州華户化翻魏徴諌曰帝王震怒不可妄發前為給使遂夜出敕書為于偽翻事如軍機誰不驚駭况宦者之徒古來難飬輕為言語易生患害獨行逺使深非事宜漸不可長易以豉翻使䟽吏翻長知兩翻所宜深慎上納其言尚書左丞韋悰句司農木橦價貴於民間悰藏宗翻句古候翻橦諸容翻木一截也唐式柴方三尺五寸為一橦按通典韋棕句司農木橦七十價百姓四十價奏其隐沒奏其隐沒上召大理卿孫伏伽書司農罪伽求迦翻伏伽曰司農無罪上怪問其故對曰只為官橦貴所以私橦賤為于偽翻向使官橦賤私橦無由賤矣但見司農識大體不知其過也上悟屢稱其善顧謂韋悰曰卿識用不逮伏伽逺矣十二月丁酉侯君集獻俘于觀徳殿觀徳殿射殿也閣本太極宫圖射殿在宜春門北行飲至禮大酺三日酺薄乎翻尋以智盛為左武衛將軍金城郡公上得髙昌樂工以付太常増九部樂為十部唐六典曰凡大宴㑹則設十部之伎於庭以備華夷一曰宴樂伎有景雲樂之舞慶善樂之舞破陳樂之舞承天樂之舞二曰清樂伎三曰西涼伎四曰天竺伎五曰髙麗伎六曰龜茲伎七曰安國伎八曰䟽勒伎九曰髙昌伎十曰康國伎君集之破髙昌也私取其珍寳將士知之將即亮翻競為盗竊君集不能禁為有司所劾詔下君集等獄劾户槩翻又户得翻下遐嫁翻中書侍郎岑文本上疏上時掌翻以為髙昌昏迷陛下命君集等討而克之不踰旬日並付大理雖君集等自掛網羅恐海内之人疑陛下唯録其過而遺其功也臣聞命將出師主於克敵將即亮翻茍能克敵雖貪可賞若其敗績雖亷可誅是以漢之李廣利陳湯晉之王濬隋之韓擒虎皆負罪譴人主以其有功咸受封賞李廣利事見二十卷漢武帝太初四年陳湯事見二十九卷漢元帝竟寧元年王濬事見八十一卷晉武帝太康元年韓擒虎事見一百七十七卷隋文帝開皇九年由是觀之將帥之臣亷慎者寡貪求者衆帥所類翻是以黄石公軍勢曰使智使勇使貪使愚故智者樂立其功勇者好行其志貪者急趍其利愚者不計其死伏願録其㣲勞忘其大過使君集重升朝列樂音洛好呼到翻趍七喻翻重直龍翻朝直遥翻復備驅馳復扶又翻又音如字雖非清貞之臣猶得貪愚之將將即亮翻斯則陛下雖屈法而徳彌顯君集等雖蒙宥而過更彰矣上乃釋之又有告薛萬均私通髙昌婦女者萬均不服内出髙昌婦女付大理與萬均對辯魏徴諌曰臣聞君使臣以禮臣事君以忠論語載孔子答魯定公之言今遣大將軍與亡國婦女對辯帷箔之私實則所得者輕虚則所失者重昔秦穆飲盗馬之士秦穆公亡馬岐下野人得而共食之者三百人吏逐得欲法之公曰君子不以畜害人吾聞食馬肉不飲酒者傷人乃飲之酒其後穆公伐晉三百人者聞穆公為晉所圍椎鋒爭死以報食馬之徳於是穆公獲晉侯以歸飲於禁翻楚莊赦絶纓之罪說苑楚莊王賜羣臣酒日暮酒酣燭滅有引羙人之衣者羙人援絶其冠纓告王趣火來上視絶纓者王曰賜人酒使醉失禮奈何欲顯婦人之節而辱士乎乃命左右曰今日與寡人飲不絶冠纓者不歡羣臣皆絶去其纓而上火盡歡而罷後晉與楚戰有一臣常在前五合五獲首却敵卒勝之莊王怪問乃夜絶纓者報王也况陛下道髙堯舜而曽二君之不逮乎上遽釋之侯君集馬病蚛顙行軍總管趙元楷親以指霑其膿而齅之蚛直衆翻蟲食曰蚛齅許救翻御史劾奏其諂左遷栝州刺史永嘉郡隋開皇九年置處州十三年改曰栝州劾户槩翻又户得翻髙昌之平也諸將皆即受賞行軍總管阿史那社爾以無勑㫖獨不受及别勑既下下遐嫁翻乃受之所取唯老弱故弊而已上嘉其亷慎以髙昌所得寳刀及雜綵千叚賜之癸卯上獵於樊川酈道元曰樊川在漢杜縣亦曰樊鄉漢髙袓至櫟陽以樊噲灌廢丘功最賜食邑於此鄉因名樊川程大昌曰樊川一名御宿川在萬年縣南三十五里乙巳還宫魏徴上䟽以為在朝羣臣當樞機之寄者任之雖重信之未篤上時掌翻朝直遥翻是以人或自疑心懐茍且陛下寛於大事急於小罪臨時責怒未免愛憎夫委大臣以大體責小臣以小事夫音扶為治之道也今委之以職則重大臣而輕小臣至於有事則信小臣而疑大臣信其所輕疑其所重將求致治其可得乎治直吏翻若任以大官求其細過刀筆之吏順㫖成風舞文弄法曲成其罪自陳也則以為心不伏辜不言也則以為所犯皆實進退維谷莫能自明詩桑柔曰進退維谷註谷窮也則茍求免禍矯偽成俗矣上納之上謂侍臣曰朕雖平定天下其守之甚難魏徴對曰臣聞戰勝易守勝難易以豉翻陛下之及此言宗廟社稷之褔也上聞右庶子張𤣥素在東宫數諌爭數所角翻爭讀曰諍擢為銀青光禄大夫行左庶子太子嘗於宫中擊鼓𤣥素叩閤切諌太子出其鼓對𤣥素毁之太子乆不出見官屬𤣥素諌曰朝廷選俊賢以輔至徳今動經時月不見宫臣將何以裨益萬一且宫中唯有婦人不知有能如樊姬者乎樊姬楚莊王姬也莊王好畋樊姬為不食禽獸之肉鄙笑虞丘子虞丘子愧之進孫叔敖為相莊王以覇太子不聼𤣥素少為刑部令史少詩照翻上嘗對朝臣問之曰朝直遥翻卿在隋何官對曰縣尉又問未為尉時何官對曰流外按隋之視品即唐之流外銓也宋白曰唐制吏部郎中一人掌考天下之文吏班秩階品一人掌小銓亦分九品通謂之行署以其在九流之外故謂之流外銓亦謂之小選杜佑曰宋齊流外自諸衛録事及五省令史始又問何曹𤣥素耻之出閣殆不能歩色如死灰諌議大夫褚遂良上䟽上時掌翻以為君能禮其臣乃能盡其力𤣥素雖出寒㣲陛下重其才擢至三品翼贊皇儲豈可復對羣臣窮其門户復扶又翻棄宿昔之恩成一朝之耻使之鬰結于懐何以責其伏節死義乎上曰朕亦悔此問卿䟽深㑹我心遂良亮之子也褚亮始事薛舉武徳中為文學館學士孫伏伽與𤣥素在隋皆為令史伏伽或於廣坐自陳往事一無所隐史言孫伏伽識度過於張𤣥素伽求迦翻坐徂臥翻戴州刺史賈崇以所部有犯十惡者十惡之條一曰謀反二曰謀大逆三曰謀叛四曰謀惡逆五曰不道六曰大不敬七曰不孝八曰不睦九曰不義十曰内亂御史劾之劾户槩翻又户得翻下同上曰昔唐虞大聖貴為天子不能化其子况崇為刺史獨能使其民比屋為善乎比毗必翻又毗至翻若坐是貶黜則州縣互相掩蔽縱捨罪人自今諸州有犯十惡者勿劾刺史但令明加紏察如法施罪庶以肅清姦惡耳上自臨治兵治直之翻以部陳不整命大將軍張士貴杖中郎將等怒其杖輕下士貴吏陳讀曰陣下遐嫁翻下同郎將即亮翻魏徴諌曰將軍之職為國爪牙使之執杖已非後法况以杖輕下吏乎上亟釋之言事者多請上親覽表奏以防壅蔽上以問魏徴對曰斯人不知大體必使陛下一一親之豈惟朝堂朝直遥翻州縣之事亦當親之矣資治通鑑卷一百九十五
