body:
  text: 資治通鑑巻一百九十宋司馬光撰胡三省音注唐紀六起𤣥黓敦牂盡閼逢涒灘五月凡二年有竒髙祖神堯大聖光孝皇帝中之下武徳五年春正月劉黑闥自稱漢東王改元天造定都洺州以范願為左僕射董康買為兵部尚書髙雅賢為右領軍徴王琮為中書令劉斌為中書侍郎琮藏宗翻斌音彬竇建徳時文武悉復本位其設法行政悉師建徳而攻戰勇決過之丙戌同安賊帥殷恭邃以舒州來降舒州隋之同安郡宋白曰舒州漢皖縣屬廬江郡晉置晉熙郡梁置南豫州復為晉州北齊改江州隋初改熙州大業改同安郡唐改舒州以其地古舒子之國也帥所類翻降户江翻丁亥濟州别駕劉伯通執刺史竇務本以州附徐圓朗濟子禮翻庚寅東鹽州治中王才藝殺刺史田華以城應劉黑闥滄州鹽山縣本漢髙成縣地去年置東鹽州以清池縣𨽻之秦王世民軍至獲嘉按宋白續通典隋開皇四年移獲嘉縣於修武故城劉黑闥弃相州退保洺州宋白曰洺州城春秋晉曲梁之地相息亮翻丙申世民復取相州人考異曰實録云禄州殺刺史獨孤徹以城應黑闥按地里志無禄州蓋字誤耳新書作相州尤誤也按劉黑闥攻拔相州執刺史房晃秦王兵至乃弃相州故秦王復取之新書帝紀拔相州殺房晃在正月乙酉相州人殺獨孤徹叛附黑闥在丙申其誤明矣禄州既莫考其地然黑闥之拔相州與秦王之復相州本末甚明與禄州全不相干而新書所書殺房晃拔相州月日亦誤復扶又翻又音如字進軍肥鄉肥鄉縣漢魏郡邯溝縣地曹魏置肥鄉縣屬廣平郡武徳初屬紫州去年廢紫州以肥鄉屬磁州九域志肥鄉在洺州東南三十五里列營洺水之上以逼之水經洺水東逕曲梁城曲梁即永年洺州所治也蕭銑既敗散兵多歸林士𢎞軍勢復振林士𢎞為張善安所敗兵勢自此衰見一百八十四巻隋義寧元年己酉嶺南俚帥楊世畧以循潮二州來降循州龍川郡秦漢龍川博羅縣地南朝置郡隋置州潮州義安郡漢南海郡掲陽縣地梁置東揚州尋改瀛州隋平陳改潮州俚音里帥所類翻降户江翻下同唐使者王義童下泉睦建三州睦州遂安郡漢富春歙縣地劉昫曰武徳四年以建安郡之建安縣置建州蓋隋置泉州建安郡治閩縣景雲元年改為閩州開元十三年改為福州聖厯二年分泉州之南安龍溪莆田三縣置武榮州景雲二年更武榮州為泉州是今之福州乃唐初之泉州今之泉州乃景雲二年之泉州也使疏吏翻幽州摠管李藝將所部兵數萬㑹秦王世民討劉黑闥黑闥聞之留兵萬人使范願守洺州自將兵拒藝夜宿沙河隋以漢襄國縣為龍岡縣又分龍岡置沙河縣時屬邢州宋白曰沙河即湡水也水經云湡水出趙郡襄國縣西山東過沙河縣沙河在縣南五里范成大曰臨洺鎮東去洺州三十五里過洺河三十里至沙河縣二十五里至邢州將即亮翻下同程名振載鼔六十具於城西二里隄上急擊之城中地皆震動范願驚懼馳告黑闥黑闥遽還遣其弟十善與行臺張君立將兵一萬擊藝於鼓城壬子戰於徐河鼓城縣舊曰曲陽後齊廢隋開皇十六年分置晉陽縣十八年改為鼔城按水經註下曲陽縣有鼓聚此因春秋鼓子之國以名縣也唐屬趙州水經徐水出廣昌縣東南大嶺下東北逕五回縣又逕北平縣界東南出山又東逕清苑城北又東至髙陽入河范成大曰徐河在清苑北十里十善君立大敗所失亡八千人洺水人李去惑隋志洺水縣舊曰斥漳後齊省入平恩開皇六年分置曲周大業初廢曲周入洺水唐末省洺水入曲周去羌吕翻據城來降秦王世民遣彭公王君廓將千五百騎赴之入城共守二月劉黑闥引兵還攻洺水癸亥行至列人列人縣漢屬廣平國後漢屬魏郡晉復屬廣平後魏復屬魏郡隋廢九域志洺州有列人城在漢斥丘縣東北武安縣西南杜佑曰漢列人縣故城在肥鄉縣東北騎竒寄翻秦王世民使秦叔寶邀擊破之王考異曰實録癸亥秦擊劉黑闥於列人大破之革命記十一月太宗度河入相州劉黑闥從洺州勒兵拒王師置營於鄴縣東三十里每日兩軍皆挑戰而大兵皆不出經十日餘洺水縣人李去惑李潘買李開弼等為車騎驃騎領兵在劉黑闥營去惑等背賊營來入洺州城誑人云劉黑闥已敗先走得歸乃喚得宗室子弟二百餘人守城定遣使間道以告太宗太宗遣彭國公王君廓領馬軍一千五百騎入洺州經十許日黑闥引兵攻洺州行至故列人城西秦叔寶等以五千騎擊之叔寶等為闥所敗又以伏兵從河下起横擊黑闥敗之㑹日暮收軍其夜三更賊兵摠至洺州城東營即於城兩門掘壕豎柵防王廓之走洺州城四面有水闊五十步已上深皆三四尺黑闥於東北角兩處填柴運土作甬道以撞車攻城太宗三度將兵擊之賊置陣拒官軍攻城愈急按髙祖太宗實録皆以去年十二月命太宗討黑闥今年正月始至河北無十一月度河之事太宗實録亦無列人戰事蓋叔寶破賊秦王奏之耳又按洺水洺州屬縣去惑君廓所據者洺水縣城水字誤作州耳豫章賊帥張善安以䖍吉等五州來降拜洪州總管洪州豫章郡䖍州南康郡吉州廬陵郡皆隋平陳所置州帥所類翻戊辰金鄉人陽孝誠叛徐圓朗以城來降金鄉縣漢屬山陽郡晉屬髙平郡隋屬曹州武徳四年晉金州是年廢州以縣屬戴州己巳秦王世民復取邢州辛未井州人馮伯讓以城來降隋開皇十六年以恒州井陘縣置井州大業初廢武徳元年復置考異曰實録作并州按并州未嘗失城蓋是時於井陘縣置井州字之誤也丙子李藝取劉黑闥定欒亷趙四州隋開皇十六年分趙州廣阿縣置欒州大業初州廢併為趙州新志武徳五年改趙州為欒州按趙州治平棘欒州治廣阿竇建徳劉黑闥相繼跨有山東蓋自置欒州是年黑闥破走之後始併趙州為欒州也武徳元年分恒州藁城縣置亷州隋考異曰實録作定率亷隋四州按河北無率二州今從唐統紀獲黑闥尚書劉希道引兵與秦王世民㑹洺州洺彌并翻劉黑闥攻洺水甚急城四旁皆有水廣五十餘步廣古曠翻黑闥於城東北築二甬道以攻之世民三引兵救之黑闥拒之不得進世民恐王君廓不能守召諸將謀之將即亮翻李世勣曰若甬道達城下城必不守行軍總管郯勇公羅士信請代君廓守之世民乃登城南髙冢以旗招君廓君廓帥其徒力戰潰圍而出士信帥左右二百人乗之入城代君廓固守帥讀曰率黑闥晝夜急攻㑹大雪救兵不得往凡八日丁丑城陷黑闥素聞其勇欲生之士信詞色不屈乃殺之時年二十不考異曰髙祖實録王君廓知可守潰圍而出秦王謂諸將曰誰能代者士信曰願以死守因遣之按君廓若已潰圍而出則黑闥圍守益固士信何以復得入城革命記曰太宗知賊勢盛恐王君廓不能固以問諸將士信以為無慮太宗使士信入守之太宗登段王墓以旗招王君廓從南門突闈不得即向北門併兵攻捉門人少退得出士信亦以左右二百人入城經八日晝夜被攻木石俱盡士信被左右執之以降賊五年正月城陷李去惑以數十人突圍出歸太宗去惑後授秦州都督李潘買拜檀州刺史李開弼城陷而没贈上柱國以公禮葬今從之髙祖實録士信死時年二十八舊傳云年二十按士信始從張須陁擊王薄等時年十四若死時年二十八則在大業四年於時王薄未為盜年二十則在大業十二年是嵗須陁死今從之戊寅汴州總管王要漢攻徐圓朗杞州拔之獲其將周文舉將即亮翻下同庚辰延州道行軍總管段徳操延州漢上郡膚施之地元魏之末置東夏州西魏改曰延州隋曰延安郡擊梁師都石堡城師都自將救之將即亮翻徳操與戰大破之師都以十六騎遁去上益其兵使乗勝進攻夏州克其東城騎竒寄翻夏户雅翻師都以數百人保西城㑹突厥救至厥九勿翻詔徳操引還還從宣翻辛巳秦王世民拔洺水洺彌并翻三月世民與李藝營於洺水之南分兵屯水北黑闥數挑戰數所角翻挑徒了翻世民堅壁不應别遣竒兵絶其糧道壬辰黑闥以髙雅賢為左僕射軍中髙㑹李世勣引兵逼其營雅賢乗醉單騎逐之世勣部將潘毛刺之墜馬將即亮翻刺七亦翻左右繼至扶歸未至營而卒卒子恤翻甲午諸將復往逼其營復扶又翻潘毛為王小胡所擒黑闥運糧於冀貝滄瀛諸州水陸俱進程名振以千餘人邀之沈其舟焚其車沈持林翻宋州總管盛彦師帥齊州總管王薄攻須昌帥讀曰率徴軍糧於潭州刺史李義滿與薄有隙閉倉不與及須昌降降户江翻彦師收義滿繫齊州獄詔釋之使者未至義滿憂憤死獄中使疏吏翻薄還過潭州戊戌夜義滿兄子武意執薄殺之潭州當作譚州武徳二年李義滿以齊州之章丘縣來降於平陵置譚州并置平陵縣蓋因春秋譚子之國以名州也彦師亦坐死坐死者朝廷以義滿之死為彦師罪而殺之上遣使賂突厥頡利可汗且許結昏使疏吏翻厥九勿翻可從刋入聲汗音寒頡利乃遣漢陽公瓌鄭元璹長孫順徳等還瓌等被留事見上巻四年瓌工回翻璹殊玉翻長知兩翻庚子復遣使來修好復扶又翻好呼到翻上亦遣其使者特勒熱寒阿史那徳等還還從宣翻并州總管劉世讓屯鴈門頡利與髙開道苑君璋合衆攻之月餘乃退在考異曰舊世讓傳云時鴻臚卿鄭元璹先使蕃可汗令元璹來説之世讓厲聲曰大丈夫乃為夷狄作説客邪經月餘虜乃退及元璹還述世讓忠貞勇幹髙祖下制褒美之按髙祖稱元璹蘇武弗之過安肻為可汗遊説脱或果爾則元璹唯恐帝知之安肯稱世讓忠貞説之不下邪據實録世讓傳無此事今不取甲辰以隋交趾太守丘和為交州總管以交趾郡為交州宋白曰交州周為越裳重譯之地漢交趾日南二郡界按交趾之稱今南方夷人其足大指開廣若並足而立其指相交故曰交趾吳黄武中以交趾縣逺分為二州割合浦以北海東四郡立廣州交趾以南立交州守式又翻和遣司馬髙士亷奉表請入朝朝直遙翻詔許之遣其子師利迎之義師之向長安丘師利以兵來附秦王世民與劉黑闥相持六十餘日黑闥潛師襲李世勣營世民引兵掩其後以救之為黑闥所圍尉遲敬徳帥壯士犯圍而入尉紆勿翻帥讀曰率世民與畧陽公道宗乗之得出道宗帝之從子也從才用翻世民度黑闥糧盡必來決戰度徒洛翻乃使人堰洺水上流洺彌并翻謂守吏曰待我與賊戰乃決之丁未黑闥帥步騎二萬南度洺水壓唐營而陳陳讀曰陣世民自將精騎擊其騎兵破之乗勝蹂其步兵蹂人九翻黑闥帥衆殊死戰帥讀曰率自午至昏戰數合黑闥勢不能支王小胡謂黑闥曰智力盡矣宜蚤亡去遂與黑闥先遁餘衆不知猶格戰守吏決堰洺水大至深丈餘洺彌并翻深式禁翻黑闥衆大潰斬首萬餘級溺死數千人黑闥與范願等二百騎奔突厥山東悉平騎竒寄翻厥九勿翻按秦王之討黑闥前後接戰黑闥之衆皆決死確鬭特秦王大展方畧黑闥智力俱困而敗走耳秦王之平羣盜黑闥最為堅敵髙開道寇易州殺刺史慕容孝幹夏四月己未隋鴻臚卿甯長真以寧越鬱林之地請降於李靖臚陵如翻降户江翻交愛之道始通以長真為欽州總管寧越郡欽州漢合浦縣地宋為宋夀宋廣郡鬱林郡鬱州漢古郡隋置州愛州九真郡漢古郡梁置州劉昫曰交州至京師七千五百二十三里愛州至京師八千八百里以䕫州總管趙郡王孝恭為荆州總管徐圓朗聞劉黑闥敗大懼不知所出河間人劉復禮説圓朗曰有劉世徹者其才不世出名髙東夏説輸芮翻夏户雅翻且有非常之相相息亮翻真帝王之器將軍若自立恐終無成若迎世徹而奉之天下指揮可定圓朗然之使復禮迎世徹於浚儀浚儀縣漢晉後魏屬陳留郡周隋唐為汴州治所或説圓朗曰將軍為人所惑欲迎劉世徹而奉之世徹若得志將軍豈有全地乎僕不敢逺引前古將軍獨不見翟讓之於李宻乎李宻翟讓事始一百八十三巻隋大業十二年終一百八十四巻義寧元年翟萇伯翻考異曰革命記云盛彦師以世徹有虛名於徐兖恐二人相得為患益深因説圓朗使不納按實録彦師奔王薄與薄共殺李義滿三月戊戌王薄死丁未黑闥乃敗彦師在圓朗所時黑闥未敗也今稱或説以闕疑圓朗復以為然復扶又翻下同世徹至已有衆數千人頓於城外以待圓朗出迎圓朗不出使人召之世徹知事變欲亡走恐不免乃入謁圓朗悉奪其兵以為司馬使徇譙杞二州東人素聞其名所向皆下圓朗遂殺之秦王世民自河北引兵將擊圓朗㑹上召之使馳傳入朝乃以兵屬齊王元吉傳株戀翻屬之欲翻付也庚申世民至長安上迎之於長樂長樂坂在長安城東樂音洛世民具陳取圓朗形勢上復遣之詣黎陽㑹大軍趨濟隂曹州治濟隂縣趨七喻翻濟子禮翻丁卯廢山東行臺劉黑闥敗走故也壬申代州總管定襄王李大恩為突厥所殺厥九勿翻先是大恩奏稱突厥饑饉馬邑可取先悉薦翻詔殿内少監獨孤晟將兵與大恩共擊苑君璋期以二月㑹馬邑失期不至大恩不能獨進頓兵新城新城當在朔州南郡佑曰魏都平城於馬邑郡北三百餘里置懐朔鎮及遷洛後於郡北三百餘里置朔州魏初雲州郡在今郡北三百餘里定襄故城北北齊置朔州在故都西南新城一名平城後移於馬邑即今郡城也馬邑郡治善陽縣亦漢定襄縣地新城即魏之新平城也晟承正翻將即亮翻頡利可汗遣數萬騎與劉黑闥共圍大恩上遣右驍衛大將軍李髙遷救之騎竒寄翻驍堅堯翻未至大恩糧盡夜遁突厥邀之衆潰而死上惜之獨孤晟坐減死徙邊丙子行臺民部尚書史萬寶攻徐圓朗陳州拔之宋白曰陳州楚襄王自郢徙此謂之西楚漢以為淮陽國之地後魏立陳郡天平二年置北揚州隋改陳州治宛丘春秋陳國都也戊寅廣州賊帥鄧文進隋合浦太守甯宣日南太守李晙並來降合浦郡越州貞觀改亷州日南郡徳州貞觀改驩州帥所類翻守式又翻晙子峻翻五月庚寅𤓰州土豪王幹斬賀拔行威以降𤓰州晉昌郡是年分𤓰州之常樂縣置𤓰州舊𤓰州為西沙州賀拔行威反事始見一百八十八巻三年𤓰州平突厥寇忻州忻州新興郡義寧元年以樓煩郡秀容縣置此秀容漢汾陽縣地非後魏之北秀容也李髙遷擊破之六月辛亥劉黑闥引突厥寇山東詔燕郡王李藝擊之厥九勿翻燕因肩翻癸丑吐谷渾寇洮旭疊三州岷州總管李長卿擊破之後周武帝逐吐谷渾置疊州於疊川旭州於洮源岷州於臨洮義寧元年改臨洮於溢樂後周書曰於河州雞鳴防置旭州於宕州渠株川置岷州吐從暾入聲谷音浴洮土刀翻旭吁玉翻長知兩翻乙卯遣淮安王神通擊徐圓朗丁卯劉黑闥引突厥寇定州秋七月甲申為秦王世民營𢎞義宫𢎞義宫後改為大安宫在宫城外西偏為于偽翻使居之世民擊徐圓朗下十餘城聲振淮泗杜伏威懼請入朝朝直遙翻下同世民以淮濟之間畧定濟子禮翻使淮安王神通行軍總管任瓌李世勣攻圓朗乙酉班師丁亥杜伏威入朝延升御榻拜太子太保仍兼行臺尚書令留長安位在齊王元吉上以寵異之以闞稜為左領軍將軍漢建安中魏武為丞相始置中領軍北齊置領軍府煬帝改為禦衛唐改為領軍衛李子通謂樂伯通曰伏威既來江東未定我往收舊兵可以立大功遂相與亡至藍田闗雍州藍田縣有藍田闗為吏所獲俱伏誅劉黑闥至定州其故將曹湛董康買亡命在鮮虞鮮虞縣舊曰盧奴開皇初更名以其地春秋鮮虞子之國也定州治所復聚兵應之復扶又翻甲午以淮陽王道𤣥為河北道行軍總管以討之丙申遷州人鄧士政執刺史李敬昂以反西魏以房陵置遷州大業初改曰房州武徳初復曰遷州房陵郡丁酉隋漢陽太守馮盎承李靖檄帥所部來降守式又翻帥讀曰率降户江翻下同以其地為髙羅春白崖儋林振八州髙州髙涼郡羅州石城郡春州陽春郡白州南昌郡崖州珠崖郡林州桂林郡振州臨振郡羅州今化州白州今鬱林州之博白縣崖儋振皆在海外振州今吉陽軍地林州後改繡州投荒録髙州髙涼郡土厚而山環遶髙而稍汙故名羅州宋將檀道濟於陵羅江口築城因置羅州今廢陵羅縣在化州北一百二十里宋白曰州在陵羅二水之間春州治陽春縣故名白州以博白江名崖州以珠崖名儋州以儋耳名林州以綏懐林邑名振州以漢臨振古縣而名儋丁甘翻以盎為髙州總管封耿國公先是或説盎曰唐始定中原未能及逺公所領二十州地已廣於趙佗趙佗見漢紀先悉薦翻説輸芮翻佗徒何翻宜自稱南越王盎曰吾家居此五世矣馮氏居髙涼事始見一百六十三巻梁簡文帝大寶元年為牧伯者不出吾門富貴極矣常懼不克負荷為先人羞敢効趙佗自王一方乎荷下可翻又如字王於况翻遂來降於是嶺南悉平八月辛亥以洺荆交并幽五州為大總管府洺彌并翻并卑名翻改葬隋煬帝於揚州雷塘雷塘漢所謂雷陂也在今揚州城北平岡上子考異曰實録武徳三年六月癸巳已有詔葬隋帝及孫此又云葬煬帝蓋三年李子通猶據江都雖有是詔不果葬也甲戌吐谷渾寇岷州敗總管李長卿吐從暾入聲谷音浴敗補邁翻長知兩翻詔益州行臺右僕射竇軌渭州刺史且洛生救之渭州隴西郡且姓也音子余翻乙卯突厥頡利可汗寇邊厥九勿翻可從刊入聲汗音寒遣左武衛將軍段徳操雲州總管李子和將兵拒之子和本姓郭郭子和武德三年以榆林郡降榆林之地本屬雲州隋割置勝州榆林郡子和以榆林降因命之為雲州總管以討劉黑闥有功賜姓丙辰頡利十五萬騎入鴈門頡奚結翻騎竒寄翻己未寇并州别遣兵寇原州庚子命太子出幽州道幽州當作豳州秦王世民出秦州道以禦之秦州當作泰州出豳州以禦原州之寇出泰州以禦并州之寇泰州時治龍門李子和趨雲中掩擊可汗漢雲中古城在榆林郡東北四十里趨七喻翻段徳操趨夏州邀其歸路夏户雅翻辛酉上謂羣臣曰突厥入寇而復求和厥九勿翻復扶又翻和與戰孰利太常卿鄭元璹曰戰則怨深不如和利璹殊玉翻中書令封徳彞曰突厥恃犬羊之衆有輕中國之意若不戰而和示之以弱明年將復來復扶又翻臣愚以為不如擊之既勝而後與和則恩威兼著矣上從之己巳并州大總管襄邑王神符破突厥於汾東汾州刺史蕭顗破突厥浩州西河郡武徳三年更名汾州顗魚豈翻斬首五千餘級吐谷渾寇洮州遣武州刺史賀亮禦之武都郡西魏置武州唐後改曰階州洮土刀翻丙子突厥冦亷州戊寅陷大震闗大震闗在隴州汧源縣當隴山之路程大昌曰漢武帝至此遇雷大震因以為名按寇亷州者并州之寇陷大震闗者原州之寇也上遣鄭元璹詣頡利是時突厥精騎數十萬自介休至晉州數百里間填溢山谷元璹見頡利責以負約與相辯詰詰去吉翻頡利頗慙元璹因説頡利曰唐與突厥風俗不同突厥雖得唐地不能居也今虜掠所得皆入國人於可汗何有不如還師復修和親説輸芮翻復扶又翻可無跋涉之勞坐受金幣又皆入可汗府庫可從刋入聲汗音寒孰與弃昆弟積年之歡而結子孫無窮之怨乎頡利悦引兵還還從宣翻元璹自義寧以來五使突厥㡬死者數焉使疏吏翻㡬居依翻數所角翻九月癸巳交州刺史權士通西魏置北秦州於上郡廢帝三年改曰交州𢎞州總管宇文歆慶州𢎞化縣開皇十八年置𢎞州大業初州廢蓋唐復置也靈州總管楊師道擊突厥於三觀山破之觀古玩翻乙未太子班師丙申宇文歆邀突厥於崇崗鎮大破之斬首千餘級歆許今翻壬寅定州總管雙士洛擊突厥於恒山之南雙姓也姓苑曰黄帝後封於雙䝉城恒户登翻丙午領軍將軍安興貴擊突厥於甘州皆破之甘州張掖郡劉黑闥陷瀛州殺刺史馬匡武鹽州人馬君徳以城叛附黑闥此鹽州即東鹽州髙開道寇蠡州武徳五年以瀛州之博野清苑定州之義豐置蠡州因漢蠡吾亭以名州也冬十月己酉詔齊王元吉討劉黑闥於山東壬子以元吉為領軍大將軍并州大總管癸丑貝州刺史許善䕶與黑闥弟十善戰於鄃縣鄃音輸善䕶全軍皆没甲寅右武候將軍桑顯和擊黑闥於晏城破之隋開皇十六年分冀州之鹿城置晏城縣大業初廢入鹿城蓋其縣名猶在觀州刺史劉㑹以城叛附黑闥觀古喚翻契丹寇北平北平郡平州契欺訖翻又音喫甲子以秦王世民領左右十二衛大將軍左右衛左右驍衛左右武衛左右屯衛左右領軍衛左右候衛為十二衛乙丑行軍總管淮陽壯王道𤣥與劉黑闥戰於下博下博縣屬冀州諡考異曰髙祖實録謚曰忠本傳曰壯蓋後來改諡也軍敗為黑闥所殺時道𤣥將兵三萬與副將史萬寶不協道𤣥帥輕騎先出犯陳將即亮翻帥讀曰率騎竒寄翻陳讀曰陣下同使萬寶將大軍繼之萬寶擁兵不進謂所親曰我奉手敕云淮陽小兒軍事皆委老夫今王輕脱妄進若與之俱必同敗没不如以王餌賊王敗賊必爭進我堅陳以待之破之必矣由是道𤣥獨進敗没萬寶勒兵將戰士卒皆無鬭志軍遂大潰萬寶逃歸道𤣥數從秦王世民征伐死時年十九數所角翻世民深惜之謂人曰道𤣥常從吾征伐見吾深入賊陳心慕効之以至於此為之流涕為於偽翻世民自起兵以來前後數十戰常身先士卒先悉薦翻輕騎深入雖屢危殆而未嘗為矢刃所傷史言秦王有天命林士𢎞遣其弟鄱陽王藥師攻循州刺史楊畧與戰斬之其將王戎以南昌州降士𢎞懼己巳請降尋復走保安成山洞袁州人相聚應之是年以洪州建昌縣置南昌州吉州安復本吳所置安成縣也唐後改為安福袁州宜春郡將即亮翻降户江翻復扶又翻洪州總管若于則遣兵擊破之㑹士𢎞死其衆遂散隋大業十三年林士𢎞起為盜至是死散淮陽王道𤣥之敗也山東震駭洺州總管廬江王瑗弃城西走洺彌并翻瑗於眷翻州縣皆叛附於黑闥旬日間黑闥盡復故地乙亥進據洺州十一月庚辰滄州刺史程大買為黑闥所迫棄城走齊王元吉畏黑闥兵彊不敢進上之起兵晉陽也皆秦王世民之謀事見一百八十二巻隋義寧元年上謂世民曰若事成則天下皆汝所致當以汝為太子世民拜且辭及為唐王將佐亦請以世民為世子將即亮翻上將立之世民固辭而止太子建成性寛簡喜酒色喜許記翻遊畋句斷齊王元吉多過失皆無寵於上世民功名日盛上常有意以代建成建成内不自安乃與元吉協謀共傾世民各引樹黨友上晩年多内寵小王且二十人尹徳妃生酆王元亨莫嬪生荆王元景孫嬪生漢王元昌宇文昭儀生韓王元嘉魯王靈䕫瞿嬪生鄧王元裕楊嬪生江王元祥小楊嬪生舒王元名郭婕妤生徐王元禮劉婕妤生道王元慶楊美人生虢王鳳張美人生霍王元軌張寶林生鄭王元懿栁寶林生滕王元嬰王才人生彭王元則魯才人生宻王元曉張氏生周王元方凡十七人且者將及未及之辭其母競交結諸長子以自固建成與元吉曲意事諸妃嬪諂諛賂遺無所不至遺於季翻以求媚於上或言蒸於張婕妤尹徳妃宫禁深祕莫能明也是時東宫諸王公妃主之家及後宫親戚横長安中横户孟翻下同恣為非法有司不敢詰世民居承乾殿閣本太極宫圖月華門内有承慶殿無承乾殿按新書承乾殿在西宫又按王溥㑹要承乾殿在宫中蓋皆指太極官元吉居武徳殿後院武徳殿在東宫西按閣本太極宫圖武徳殿在䖍化門東入門過内倉廪立政殿萬春殿即東上閭門與上臺東宫晝夜通行無復禁限上臺謂帝居復扶又翻太子二王出入上臺皆乗馬攜弓刀雜物相遇如家人禮太子令秦齊王教與詔敕並行有司莫知所從唯據得之先後為定使唐之政終於如此亡隋之續耳世民獨不奉事諸妃嬪諸妃嬪爭譽建成元吉而短世民譽音余世民平洛陽上使貴妃等數人詣洛陽選閲隋宫人及收府庫珍物貴妃等私從世民求寶貨及為親屬求官唐制皇后而下有貴妃淑妃徳妃賢妃是為夫人昭儀昭容昭媛脩儀脩容脩媛充儀充容充媛是為九嬪婕妤美人才人各九合二十七是為世婦寶林御女采女各二十七合八十一是為御妻為于偽翻世民曰寶貨皆已籍奏官當授賢才有功者皆不許由是益怨世民以淮安王神通有功給田數十頃張婕妤之父因婕妤求之於上婕妤音接予上手敕賜之神通以教給在先不與婕妤訴於上曰敕賜妾父田秦王奪之以與神通上遂發怒責世民曰我手敕不如汝教邪邪音耶它日謂左僕射裴寂曰此兒久典兵在外為書生所教非復昔日子也尹徳妃父阿鼠驕横阿烏葛翻秦王府屬杜如晦過其門阿鼠家童數人曳如晦墜馬敺之折一指敺烏口翻折而設翻曰汝何人敢過我門而不下馬阿鼠恐世民訴於上先使徳妃奏云秦王左右陵暴妾家上復怒復扶又翻責世民曰我妃嬪家猶為汝左右所陵况小民乎世民深自辯析上終不信世民每侍晏宫中對諸妃嬪思太穆皇后早終竇皇后謚太穆帝未即位先崩建成世民𤣥霸元吉皆其所生也不得見上有天下或歔欷流涕上顧之不樂歔音虚欷音希又許既翻樂音洛下同諸妃嬪因宻共譖世民曰海内幸無事陛下春秋髙唯宜相娛樂而秦王每獨涕泣正是憎疾妾等陛下萬嵗後妾母子必不為秦王所容無孑遺矣言必皆誅翦無有孑然見遺者也因相與泣且曰皇太子仁孝陛下以妾母子屬之屬之欲翻必能保全上為之愴然為于偽翻由是無易太子意待世民浸疎而建成元吉日親矣行考異曰髙祖實録曰建成幼不拘細荒色嗜酒好畋獵常與博徒遊故時人稱為任俠髙祖起義於太原建成時在河東本既無寵又以今上首建大計髙祖不之思也而今上白髙祖遣使召之盤游不即往今上急難情切遽以手書諭之建成乃與元吉間行赴太原隋人購求之㡬為所獲及義旗建而方至髙祖亦喜其獲免因授以兵又曰建成帷簿不修有禽獸之行聞於逺邇今上以為恥嘗流涕諌之建成慙而成憾又曰太宗每摠戎律惟以撫接才賢為務至於參請妃媛素所不行太宗實録曰隠太子始則流宕河曲逸遊是好素無才畧不預經綸於後雖統左軍非衆所附既陞儲兩坐構猜嫌太宗雖備禮竭誠以希恩睦而妬害之心日以滋甚又巢刺王性本兇愎志識庸下行同禽獸兼以弃鎮失守罪戾尤多反害太宗之能於是潛苞毁譖同惡相濟膚受日聞雖大名徽號禮冠羣后而情疎意隔寵異曩時按建成元吉雖為頑愚既為太宗所誅史臣不無抑揚誣諱之辭今不盡取太子中允王珪洗馬魏徴太子左春坊左庶子為之長掌侍從贊相敷正啟奏中允為之貳洗馬漢官掌前馬唐為司經局長官掌四庫圖籍繕寫刋緝之事唐六典曰後漢太子官屬有中允在中庶子下洗馬上其後無聞唐始置太子中允洗悉薦翻説太子曰秦王功蓋天下中外歸心殿下但以年長位居東宫説輸芮翻長音知兩翻無大功以鎮服海内今劉黑闥散亡之餘衆不滿萬資糧匱乏以大軍臨之勢如拉朽拉音盧合翻殿下宜自擊之以取功名因結納山東豪傑庶可自安太子乃請行於上上許之珪頍之兄子也王頍僧辯之子死於隋漢王諒反時頍音丘弭翻甲申詔太子建成將兵討黑闥其陜東道大行臺及山東道行軍元帥河南河北諸州並受建成處分將即亮翻陜失冉翻帥所類翻處昌吕翻分扶問翻得以便宜從事乙酉封宗室畧陽公道宗等十八人為郡王道宗道𤣥從父弟也從才用翻為靈州總管梁師都遣弟洛兒引突厥數萬圍之道宗乗間出擊大破之厥九勿翻間古莧翻突厥與師都相結遣其郁射設入居故五原五原縣屬鹽州武徳初寄治靈州故地為突厥所居杜佑曰鹽州西魏五原郡地漢五原縣城在今榆林郡界道宗逐出之斥地千餘里毛晃曰斥開拓也上以道宗武幹如魏任城王彰魏任城王彰曹操之子擊烏丸有功任音壬乃立為任城郡王丙申上幸宜州義寧二年以京兆之華原宜君同官置宜君郡武徳元年曰宜州己亥齊王元吉遣兵擊劉十善於魏州破之癸卯上校獵於富平富平縣屬雍州漢富平縣治唐靈州迴樂縣界後漢移寧州彭原縣界晉移懐徳城魏移於懐徳城東北今耀州東南富平縣即其地劉黑闥擁兵而南自相州以北州縣皆附之相息亮翻唯魏州摠管田留安勒兵拒守黑闥攻之不下引兵南拔元城復還攻之元城縣治古郡城在朝城東北十二里時魏州治貴鄉縣相息亮翻復扶又翻闥考異曰實録十二月甲子黑闥攻魏州蓋留安破黑奏到之日也案革命記黑闥攻魏州在十一月今從之十二月庚戌立宗室孝友等八人為郡王孝友神通之子也丙辰上校獵於華池京兆三原縣武徳四年改池陽六年改華池戊午劉黑闥陷恒州殺刺史王公政恒户登翻恒州漢常山郡唐置恒州因恒山為名庚申車駕至長安癸亥幽州大摠管李藝復亷定二州甲子田留安擊劉黑闥破之獲其莘州刺史孟柱魏州莘縣隋開皇十六年置莘州大業二年廢唐復置降將卒六千人降户江翻將即亮翻是時山東豪傑多殺長吏以應黑闥長知兩翻上下相猜人益離怨留安待吏民獨坦然無疑白事者無問親疎皆聴直入卧内每謂吏民曰吾與爾曹俱為國禦賊為于偽翻固宜同心協力必欲弃順從逆者但自斬吾首去吏民皆相戒曰田公推至誠以待人當共竭死力報之必不可負有苑竹林者本黑闥之黨潛有異志留安知之不發其事引置左右委以管鑰竹林感激遂更歸心卒收其用卒子恤翻以功進封道國公乙丑并州刺史成仁重擊范願破之并卑名翻劉黑闥攻魏州未下太子建成齊王元吉大軍至昌樂劉昫曰晉置昌樂縣屬陽平郡今縣西古城是也隋廢縣入繁水武徳元年復置仍築今治所樂音洛黑闥引兵拒之再陳皆不戰而罷陳讀曰陣魏徴言於太子曰前破黑闥其將帥皆懸名處死言亡命者先書其名處以死罪也將即亮翻帥所類翻下同處昌吕翻妻子係虜故齊王之來雖有詔書赦其黨與之罪皆莫之信今宜悉解其囚俘慰諭遣之則可坐視離散矣太子從之黑闥食盡衆多亡或縛其渠帥以降帥所類翻降户江翻黑闥恐城中兵出與大軍表裏擊之遂夜遁至館陶永濟橋未成不得度館陶縣屬魏州在州北隋煬帝鑿永濟渠所經也宋白曰館陶春秋時晉冠氏邑陶丘在縣西北七里趙時置館于其側因為縣名壬申太子齊王以大軍至黑闥使王小胡背水而陳背蒲妹翻陳讀曰陣自視作橋成即過橋西衆遂大潰闥考異曰髙祖實録壬申太子與黑戰於魏州城下破之闥抽軍北遁甲戌追闥於毛州賊背永濟渠而陳接戰又破之舊傳六年二月太子破黑闥于館陶革命記闥遁至館陶二十五日官軍至闥敗走按館陶即毛州也長厯十二月壬申二十五日甲戌二十七日蓋實録據奏到之日也舊傳尤疎今從革命記太宗實録云黑闥重反髙祖謂太宗曰前破黑闥欲令盡殺其黨使空山東不用吾言致有今日及隠太子征闥平之將遣唐儉往使男子年十五已上悉阬之小弱及婦女摠驅入闗以實京邑太宗諫曰臣聞惟徳動天唯恩容衆山東人物之所河北蠶綿之鄉而天府委輸待以成績今一旦見其反覆盡戮無辜流離寡弱恐以殺不能止亂非行弔伐之道其事遂寢新書隠太子傳云黑闥敗於洺水太子建成問於洗馬魏徴曰山東其定乎對曰黑闥雖敗殺傷太甚其魁黨皆縣名處死妻子係虜欲降無繇雖有赦令獲者必戮不大蕩宥恐殘賊嘯結民来可安既而黑闥復振廬江王瑗弃洺州山東亂命齊王元吉討之有詔降者赦罪衆不信建成至獲俘皆撫遣之百姓欣悦賊懼夜奔兵追戰黑闥衆猶盛乃縱囚使相告曰禠而甲還鄉里若妻子獲者既已釋矣衆乃散或縛其渠長降遂禽黑闥按髙祖雖不仁亦不至有欲空山東之理史臣專欲歸美太宗其於髙祖亦太誣矣今采革命記及新書捨仗來降大軍度橋追黑闥度者纔千餘騎橋壞由是黑闥得與數百騎亡去降户江翻下同騎竒寄翻下同上以隋末戰士多没於髙麗是嵗賜髙麗王建武書使悉遣還亦使州縣索髙麗人在中土者遣歸其國麗力知翻索山客翻建武奉詔遣還中國民前後以萬數六年春正月己卯劉黑闥所署饒州刺史諸葛徳威執黑闥舉城降時太子遣騎將劉𢎞基追黑闥黑闥為官軍所迫奔走不得休息至饒陽饒陽縣前漢屬涿郡後漢屬安平國晉魏屬博陵郡隋屬河間郡唐屬深州黑闥分置饒州將即亮翻從者纔百餘人從才用翻餒甚徳威出迎延黑闥入城黑闥不可徳威涕泣固請黑闥乃從之至城旁市中憩止憩去例翻徳威饋之食食未畢徳威勒兵執之送詣太子并其弟十善斬於洺水洺彌并翻考異曰革命記劉黑闥走至深州崔元愻為偽深州摠管黑闥欲至城中陳列三千餘兵擬納黑闥據城拒守北勾突厥諸葛徳威為車騎領當城之兵有張善䕶者先任鄉長來就軍中語三五少年曰可捉黑闥以取富貴今若不捉在後終是擾亂山東廢我等作生活諸少年咸云非諸葛車騎不可善䕶知徳威非得酒食不肯出師乃于家宰一肥猪出酒一石延徳威而語之徳威許諾黑闥至元愻乃請之入城而不許唯就市中遣鋪設而坐食元愻請以城中兵呈閲言並精鋭必堪拒守黑闥食而許之元愻乃召兵以呈之徳威以前領軍卒出即就市擒劉黑闥送於洺州皇太子所元愻與數十人奔突厥斬黑闥於洺州城西臨刑乃嘆云云今從實録亦兼采革命記黑闥臨刑歎曰我幸在家鉏菜為髙雅賢輩所誤至此壬午巂州人王摩沙舉兵巂音髓沙讀曰莎蘇何翻自稱元帥改元進通遣驃騎將軍衛彦討之帥所類翻驃匹妙翻騎竒寄翻下同庚子以吳王杜伏威為太保唐制太師太傅太保謂之三師正一品天子所師法無所統職功徳崇重者乃使居之二月庚戌上幸驪山温湯驪山在雍州新豐有湯泉天寶起華清宫於此驪力知翻甲寅還宫平陽昭公主薨戊午葬公主詔加前後部鼓吹班劒四十人班列也持劒成列夾道而行也吹昌瑞翻武賁甲卒武賁虎賁也唐諱虎字改為武賁音奔太常奏禮婦人無鼓吹上曰鼓吹軍樂也公主親執金鼓興義兵以輔成大業事見一百八十五巻隋義寧元年豈與常婦人比乎丙寅徐圓朗窮蹙與數騎弃城走為野人所殺其地悉平林邑王梵志遣使入貢初隋人破林邑見一百八十巻隋大業九年梵扶汎翻使疏吏翻分其地為三郡三郡比景海隂林邑也及中原喪亂喪息浪翻林邑復國至是始入貢幽州摠管李藝請入朝朝直遙翻庚午以藝為左翊衛大將軍廢參旗等十二軍十二軍詳見一百八十八巻二年參疏簪翻三月癸未髙開道掠文安魯城文安縣前漢屬勃海郡後漢屬河間國晉屬章武郡隋唐屬瀛州魯城縣開皇十六年置亦屬瀛州驃騎將軍平善政邀擊破之驃匹妙翻騎竒寄翻庚子梁師都將賀遂索同以所部十二州來降將即亮翻降户江翻乙巳前洪州摠管張善安反遣舒州摠管張鎮周等擊之舒州同安郡隋為熈州武徳四年改舒州以古羣舒之國也夏四月吐谷渾寇芳州刺史房當樹奔松州吐從暾入聲谷音浴西魏逐吐谷渾置同昌郡及封徳等縣後周以縣立芳州隋大業初廢武徳元年以同昌之常芬縣置芳州省封徳松州交川枯治嘉誠縣生羌之地後魏時白水羌舒彭遣使朝貢始置甘松縣魏亂而絶後周復招慰之於此置龍涸防天和六年改置扶州隋改甘松縣為嘉誠縣屬同昌郡武徳初置松州取甘松嶺為名張善安陷孫州舊唐志武徳五年分洪州置南昌州摠管府管南昌西吳靖米孫五州南昌州領建昌龍安永修三縣八年廢南昌州及孫州以南昌州新吳永修龍安入建昌縣以孫州之建昌入豫章縣而以豫章屬洪州新志武徳五年以洪州南昌縣置孫州以建昌縣置南昌州執總管王戎而去乙丑鄜州道行軍摠管段徳操擊梁師都至夏州俘其民畜而還鄜音膚夏户雅翻還從宣翻又如字丙寅吐谷渾寇洮岷二州洮土刀翻丁卯南州刺史龎孝恭南越州民甯道明髙州首領馮暄俱反陷南越州進攻姜州合州刺史甯純引兵救之武徳四年以合浦郡之南昌合浦地置南州六年改白州合浦郡舊置越州隋改合州武徳四年復曰越州加南字以别㑹稽之越州也舊志桂州摠管府所管有姜州武徳五年以合州之封山縣置姜州貞觀十年廢入越州雷州海康郡本合州徐聞郡武徳四年置貞觀更州郡名龎孝恭新書作龎孝泰壬申立皇子元軌為蜀王鳳為豳王元慶為漢王為考異曰實録以皇子元真邵王鶴為豳王新本記封元璹為蜀王按髙祖子無名元真鶴元璹及封邵王者今從舊傳及唐厯癸酉以裴寂為左僕射蕭瑀為右僕射瑀音禹楊恭仁為吏部尚書兼中書令封徳彞為中書令五月庚辰遣岐州刺史柴紹救岷州岐州扶風郡庚寅吐谷渾及党項寇河州吐從暾入聲谷音浴河州枹罕郡党底朗翻刺史盧士良擊破之丙申梁師都將辛獠兒引突厥寇林州將即亮翻下同獠盧皓翻厥九勿翻舊志慶州華池縣武徳四年置林州摠管府戊戌苑君彰將髙滿政寇代州驃騎將軍林寶言擊走之驃匹妙翻騎竒寄翻癸卯髙開道引奚騎寇幽州長史王詵擊破之長知兩翻詵疏臻翻劉黑闥之叛也突地稽引兵助唐徙其部落於幽州之昌平城昌平城在軍都闗南髙開道引突厥寇幽州突地稽將兵邀擊破之六月戊午髙滿政以馬邑來降降户江翻先是前并州總管劉世讓除廣州總管將之官上問以備邊之策先悉薦翻世讓對曰突厥比數為寇比毗至翻數所角翻下同良以馬邑為之中頓故也中頓者謂中道有城有糧可以頓食也置食之所曰頓唐人多言置頓請以勇將戍崞城崞音郭多貯金帛貯直吕翻募有降者厚賞之數出騎兵掠其城下蹂其禾稼敗其生業不出嵗餘彼無所食必降矣數所角翻蹂人九翻敗補邁翻上然其計曰非公誰為勇將即命世讓戍崞城馬邑病之是時馬邑人多不願屬突厥上復遣人招諭苑君璋髙滿政説苑君璋盡殺突厥戍兵降唐復扶又翻説輸芮翻厥九勿翻君璋不從滿政因衆心所欲夜襲君璋君璋覺之亡奔突厥滿政殺君璋之子及突厥戍兵二百人而降壬戌梁師都以突厥寇匡州武徳分綏州延福縣地置北吉州羅州匡州丁卯苑君璋與突厥吐屯設寇馬邑髙滿政與戰破之以滿政為朔州總管封榮國公朔州馬邑郡𤓰州總管賀若懷廣按部至沙州隋以敦煌郡置𤓰州武徳五年改沙州分沙州之常樂縣為𤓰州晉昌郡宋白曰𤓰州西至沙州二百八十里若人者翻值州人張䕶李通反懷廣以數百人保子城涼州總管楊恭仁遣兵救之為䕶等所敗敗補邁翻癸酉柴紹與吐谷渾戰紹救岷州遂與吐谷渾戰吐從暾入聲谷音浴為其所圍虜乗髙射之射而亦翻矢下如雨紹遣人彈胡琵琶二女子對舞虜怪之駐弓矢相與聚觀紹察其無備潛遣精騎出虜陳後擊之虜衆大潰騎竒寄翻陳讀曰陣秋七月丙子苑君璋以突厥寇馬邑右武候大將軍李髙遷及髙滿政禦之戰於臘河谷破之張䕶李通殺賀拔懷廣今考異曰實録上云張䕶此云髙䕶從上余按賀拔意亦當從上作賀若立汝州别駕竇伏明為主汝當作進逼𤓰州長史趙孝倫擊却之長知兩翻髙開道掠赤岸鎮及靈壽九門行唐三縣而去九域志定州唐縣有赤岸鎮三縣皆屬恒州時以靈夀屬并州丁丑崗州刺史馮士翽據新㑹反隋以新㑹郡置岡州以地有金岡故名大業初廢武徳四年復以廣州新㑹義寜二縣置岡州翽呼㑹翻廣州刺史劉感討降之使復其位降户江翻辛巳髙開道所部𢎞陽統漢二鎮來降癸未突厥寇原州原州漢髙平縣地後魏立原州取髙平曰原以名州厥九勿翻乙酉寇朔州李髙遷為虜所敗行軍總管尉遲敬徳將兵救之己亥遣太子將兵屯北邊備原州之寇敗補邁翻尉紆勿翻將即亮翻秦王世民屯并州備朔州之寇以備突厥八月丙辰突厥寇真州舊志武徳二年置綏州總管府管雲銀真等十一州真州蓋置於銀州真鄉縣也又寇馬邑壬子淮南道行臺僕射輔公祏反據考異曰舊傳云沈法興毗陵公祏擊破之按法興武徳三年已為李子通所滅舊傳誤也初杜伏威與公祏相友善公祏年長長知兩翻伏威兄事之軍中謂之伯父畏敬與伏威等伏威浸忌之乃署其養子闞稜為左將軍王雄誕為右將軍潛奪其兵權公祏知之怏怏不平怏於兩翻與其故人左遊仙陽為學道辟穀以自晦及伏威入朝入朝見上年朝直遙翻留公祏守丹陽此南朝之舊丹陽郡令雄誕典兵為之副隂謂雄誕曰吾至長安茍不失職勿令公祏為變伏威既行左遊仙説公祏謀反説輸芮翻而雄誕握兵公祏不得發乃詐稱得伏威書疑雄誕有貳心雄誕聞之不悦稱疾不視事公祏因奪其兵使其黨西門君儀諭以反計雄誕始寤而悔之曰今天下方平吳王又在京師杜伏威封吳王大唐兵威所向無敵奈何無故自求族滅乎雄誕有死而已不敢聞命今從公為逆不過延百日之命耳大丈夫安能愛斯須之死而自陷於不義乎公祏知不可屈縊殺之縊於賜翻又於計翻雄誕善撫士卒得其死力又約束嚴整每破城邑秋毫無犯死之日江南軍中及民間皆為之流涕為于偽翻公祏又詐稱伏威不得還江南貽書令其起兵大修鎧仗鎧可亥翻運糧儲尋稱帝於丹陽國號宋修陳故宫室而居之署置百官以左遊仙為兵部尚書東南道大使越州總管使疏吏翻下同與張善安連兵以善安為西南道大行臺己未突厥寇原州厥九勿翻乙丑詔襄州道行臺僕射趙郡王孝恭以舟師趣江州江州南朝之尋陽郡隋改為九江郡趣七喻翻又逡須翻九考異曰實録八月乙丑已云遣孝恭率兵趣江州至月戊子又云蓋因徐紹宗等侵邊而言之也嶺南道大使李靖以交廣泉桂之衆趣宣州宣州宣城郡懷州總管黄君漢出譙亳齊州總管李世勣出淮泗自泗水入淮也以討輔公祏孝恭將發與諸將宴集命取水忽變為血在坐者皆失色坐徂卧翻孝恭舉止自若曰此乃公祏授首之徴也飲而盡之衆皆悦服丙寅吐谷渾内附吐從暾入聲谷音浴辛未突厥陷原州之善和鎮癸酉又寇渭州渭州隴西郡髙開道以奚侵幽州州兵擊却之九月太子班師自豳州道班師戊子輔公祏遣其將徐紹宗寇海州陳政通寇夀陽祏音石將即亮翻夀陽夀州治所邛州獠反邛州臨邛郡武徳元年析雅州置邛渠容翻獠盧皓翻遣沛公鄭元璹討之璹殊玉翻庚寅突厥寇幽州厥九勿翻壬辰詔以秦王世民為江州道行軍元帥欲使之討輔公祏也帥所類翻乙未竇伏明以沙州降降户江翻年考異曰實録云伏明斬賀拔威以城來降按五五月實録𤓰州人王幹殺賀拔威以降則威死久矣此誤也按上文作賀若懐廣死而立竇伏明為沙州主當考髙昌王麴伯雅卒卒子恤翻子文泰立丙申渝州人張大智反渝州巴郡漢江州縣地刺史薛敬仁弃城走壬寅髙開道引突厥二萬騎寇幽州騎竒寄翻突厥惡𢎞農公劉世讓為己患惡烏路翻遣其臣曹般陁來言世讓與可汗通謀欲為亂般補末翻可從刋入聲汗音寒上信之冬十月丙午殺世讓籍其家聽言之道必以其事觀之突厥用間髙祖遽信之而殺干城之將不明甚矣秦王世民猶在并州己未詔世民引兵還太子與秦王分道備突厥太子先已班師故亦詔秦王引還上幸華隂華户化翻張大智侵涪州涪州涪陵郡武徳元年以渝州之涪陵鎮置涪音浮刺史田世康等討之大智以衆降初上遣右武候大將軍李髙遷助朔州摠管髙滿政守馬邑宋白曰朔州春秋北狄之地曹魏立為馬邑縣西晉米其地為猗盧所據都代郡此後魏為畿内之地亦曽為懐朔鎮孝文遷洛之後於定襄故城置朔州髙齊又於新平郡置朔州天保八年乃移於馬邑城苑君璋引突厥萬餘騎至城下滿政擊破之頡利可汗怒大發兵攻馬邑髙遷懼帥所部二千人斬闗宵遁虜邀之失亡者半頡利自帥衆攻城帥讀曰率滿政出兵禦之或一日戰十餘合上命行軍摠管劉世讓救之至松子嶺不敢進松子嶺地闕還保崞城㑹頡利遣使求婚使疏吏翻上曰釋馬邑之圍乃可議婚頡利欲解兵義成公主固請攻之頡利以髙開道善為攻具召開道與之攻馬邑甚急頡利誘滿政使降滿政罵之糧且盡救兵未至滿政欲潰圍走朔州右虞候杜士逺隋文帝於東宫置左右虞候府掌斥候是後州鎮各置虞候以為衙前之職以備候不虞名官以虜兵盛恐不免壬戌殺滿政降於突厥按通鑑據新唐書髙祖本紀自丙午至壬戌排日書之但十七日間先書殺劉世讓後復書命世讓救馬邑及退保事蓋通鑑序突厥陷馬邑事書之不詳排日之近逺也苑君璋復殺城中豪傑與滿政同謀者三十餘人上以滿政子𤣥積為上柱國襲爵丁卯突厥復請和親復扶又翻下同以馬邑歸唐上以將軍秦武通為朔州摠管突厥數為邊患數所角翻并州大摠管府長史竇靜表請於太原置屯田以省餽運議者以為煩擾不許靜切論不已敕徴靜入朝長知兩翻朝直遙翻使與裴寂蕭瑀封徳彞相論難於上前瑀音禹難乃旦翻寂等不能屈乃從靜議嵗收穀數千斛上善之命檢校并州大總管靜抗之子也竇抗榮定之子十一月辛巳秦王世民復請増置屯田於并州之境從之黄州摠管周法明將兵擊輔公祏黄州漢邾縣地蕭齊置齊安郡隋置黄州祏音石張善安據夏口拒之將即亮翻夏户雅翻法明屯荆口鎮蓋當荆江之口置鎮其地在漢陽界壬午法明登戰艦飲酒艦户黯翻善安遣刺客數人詐乗魚艓而至艓達協翻丁度曰舟名見者不以為虞遂殺法明而去甲申舒州摠管張鎮周等擊輔公祏將陳當世於猷州之黄沙大破之武徳三年以宣州之涇縣置南徐州尋改曰猷州丁亥上校獵於華隂華户化翻己丑迎勞秦王世民於忠武頓秦王自并州還勞力到翻十二月癸卯安撫使李大亮誘張善安執之使疏吏翻誘音酉大亮擊善安於洪州與善安隔水而陳陳讀曰陣遙相與語大亮諭以禍福善安曰善安初無反心正為將士所誤欲降又恐不免將即亮翻大亮曰張摠管有降心則與我一家耳因單騎度水入其陳與善安執手共語示無猜間降下江翻間古莧翻善安大悦遂許之降既而善安將數十騎詣大亮營大亮止其騎於門外引善安入與語久之善安辭去大亮命武士執之從騎皆走從才用翻善安營中聞之大怒悉衆而來將攻大亮大亮使人諭之曰吾不留摠管摠管赤心歸國謂我曰若還營恐將士或有異同為其所制故自留不去耳卿輩何怒於我其黨復大罵曰張摠管賣我以自媚於人遂皆潰去大亮追擊多所虜獲送善安於長安善安自稱不與輔公祏交通祏音石上赦其罪善遇之及公祏敗得所與往還書乃殺之甲寅車駕至長安己巳突厥寇定州州兵擊走之庚申白簡白狗羌並遣使入貢白簡恐當作白蘭隋書附國有白蘭白狗等種風俗畧同党項或役屬於吐谷渾或附附國新書白蘭羌吐蕃謂之丁零左屬党項右與多彌接勝兵萬人勇戰鬭善作兵器武徳六年使者入朝明年以其地為維恭二州白狗羌與東㑹州接勝兵纔千人使疏吏翻七年春正月依周齊舊制每州置大中正一人州置大中正周齊又因魏晉之制掌知州内人物品量望第以本州門望髙者領之無品秩壬午趙郡王孝恭擊輔公祏别將於樅陽破之樅陽縣漢屬廬江郡梁置樅陽郡隋廢郡改為同安縣屬廬州祏音石將即亮翻樅七容翻庚寅鄒州人鄧同頴殺刺史李士衡反唐初以齊州之鄒平長山置鄒州丙申以白狗等羌地置維恭二州維州維川郡以白狗羌降户姜維故城置其地乃漢蜀郡徼外冉駹之地蜀將姜維馬忠討汶山羌於此故壘在焉恭州即西恭州後改曰笮州又戎州都督府所領羈縻州有曲州本隋之恭州隋亂廢武徳元年開南中復置八年改曲州故朱提郡地非此也劉昫曰維州即古西戎地也其地南界江陽岷山連嶺而西不知其極北望隴山積雪如玉東望成都若在井底地接石紐山夏禹生於石紐是也其城在岷山之孤峯三面臨江距成都四百里許杜佑曰維州在當州北二百六十里二月輔公祏遣兵圍猷州刺史左難當嬰城自守宋白曰宣州涇縣唐武徳二年置南徐州於此其年改為猷州安撫使李大亮引兵擊公祏破之使疏吏翻下同趙郡王孝恭攻公祏鵲頭鎮拔之新志宣州南陵縣有鵲頭鎮丁未髙麗王建武遣使來請班厯遣使冊建武為遼東郡王髙麗王以百濟王扶餘璋為帶方郡王新羅王金真平為樂浪郡王麗力知翻樂浪音洛郎始州獠反始州普安郡後改劔州獠魯皓翻遣行臺僕射竇軌討之己酉詔諸州有明一經以上未仕者咸以名聞州縣及鄉皆置學壬子行軍副總管權文誕破輔公祏之黨於猷州拔其枚洄等四鎮丁巳上幸國子監釋奠詔諸王公子弟各就學戊午改大總管為大都督府己未髙開道將張金樹殺開道來降將即亮翻降户江翻下同開道見天下皆定欲降自以數反覆不敢髙開道既降而復叛自知有反覆之罪數所角翻且恃突厥之衆遂無降意其將卒皆山東人思鄉里咸有離心開道選勇敢士數百謂之假子常直閤内使金樹領之故劉黑闥將張君立亡在開道所與金樹宻謀取開道金樹遣其黨數人入閤内與假子遊戲向夕潛斷其弓弦斷丁管翻藏刀槊於牀下合瞑抱之趨出人睡則目合而瞑槊色角翻瞑莫定翻金樹帥其黨大譟攻開道閤帥讀曰率譟蘇到翻假子將禦之弓弦皆絶刀槊已失爭出降君立亦舉火於外與相應内外惶擾開道知不免乃擐甲持兵坐堂上與妻妾奏樂酣飲擐音宦酣户甘翻衆憚其勇不敢逼天且明開道縊縊於賜翻又於計翻妻妾及諸子乃自殺金樹陳兵悉收假子斬之并殺君立死者五百餘人遣使來降詔以其地置媯州以媯水名州媯俱為翻壬戌以金樹為北燕州都督媯州媯川郡治懐戎縣北齊置北燕州本治懐戎唐既以懐戎之地置媯州又以北燕州都督之名寵金樹也燕因肩翻戊辰洋集二州獠反陷隆州晉城洋州洋川郡治西鄉縣西鄉漢成固縣蜀立西鄉後魏於此置洋州以水為名洋音祥集州符陽郡武徳元年析梁州之難江巴州之符陽長池白石置隆州巴西郡漢閬中地劉昫曰西魏置隆州於閬中隋為巴西郡唐復為隆州宋白曰取其連岡地勢髙隆為名後魏典畧云此州古有隆城堅險因置隆州晉城縣亦閬中地梁置木蘭郡西魏廢郡改西充國曰晉城獠魯皓翻是月太保吳王杜伏威薨輔公祏之反也詐稱伏威之命以紿其衆紿蕩亥翻及公祏平趙郡王孝恭不知其詐以狀聞詔追除伏威名籍没其妻子及太宗即位知其寃赦之復其官爵三月初定令以太尉司徒司空為三公次尚書門下中書祕書殿中内侍為六省次御史臺次太常至太府為九寺太常光禄衛尉宗正太僕大理鴻臚司農太府凡九寺次將作監次國子學次天策上將府將即亮翻次左右衞至左右領衞為十四衞十二衞及左右監門衞為十四衞東宫置三師三少詹事及兩坊三寺十率府兩坊門下坊典書坊三寺家令寺率更寺僕寺十率府左右衞率左右宗衞率左右虞候率左右監門率左右内率少詩沼翻率讀如字王公置府佐國官公主置邑司並為京職事官王府有傳諮議參軍友文學東西閤祭酒長史司馬掾屬主簿史記室録事參軍録事功倉户兵騎法士等七曹參軍參軍事行參軍典籖王國有國令大農尉丞録事典衞舍人學官長食官長廏牧長典府長公主邑司有令丞主簿謁者舍人家吏掌主家財出入田園徴封之事州縣鎮戍為外職事官自開府儀同三司至將仕郎二十八階為文散官開府儀同三司從一品特進正二品光禄大夫從二品金紫光禄大夫正三品銀青光禄大夫從三品正議大夫正四品太中大夫從四品上中大夫從四品下中散大夫正五品上朝議大夫正五品下朝請大夫從五品上朝散大夫從五品下朝議郎正六品上承議郎正六品下奉議郎從六品上通直郎從六品下朝議郎正七品上宣徳郎正七品下朝散郎從七品上宣義郎從七品下給事郎正八品上徴事郎正八品下承奉郎從八品上承務郎從八品下儒林郎正九品上登仕郎正九品下文林郎從九品上將仕郎從九品下散悉亶翻下同驃騎大將軍至陪戎副尉三十一階為武散官驃騎大將軍從一品輔國大將軍正二品鎮軍大將軍從二品冠軍大將軍懷化大將軍正三品上懷化將軍正三品下雲麾將軍歸徳大將軍從三品上歸徳將軍從三品下忠武將軍正四品上壯武將軍懷化中郎將正四品下宣威將軍從四品上明威將軍歸徳中郎將從四品下定逺將軍正五品上寧逺將軍懷化郎將正五品下游騎將軍從五品上游擊將軍歸徳郎將從五品下昭武校尉正六品上昭武副尉懷化司階正六品下振威校尉從六品上振威副尉歸徳司階從六品下致果校尉正七品上致果副尉懷化中候正七品下翊麾校尉從七品上翊麾副尉徳歸中候從七品下宣節校尉正八品上宣節副尉懷化司戈正八品下禦侮校尉從八品上禦侮副尉歸徳司戈從八品下仁勇校尉正九品上仁勇副尉懐化執㦸長上九品下陪戎校尉從九品上陪戎副尉歸徳執㦸長上從九品下驃匹妙翻騎竒寄翻下同上柱國至武騎尉十二等為勲官勲級十有二轉為上柱國視正二品十有一轉為柱國視從二品十轉為上䕶軍視正三品九轉為䕶軍視從三品八轉為上輕車都尉視正四品七轉為輕車都尉視從四品六轉為上騎都尉視正五品五轉為騎都尉視從五品四轉為驍騎校視正六品三轉為飛騎尉視從六品二轉為雲騎尉視正七品一轉為武騎尉視從七品丙戌趙郡王孝恭破輔公祏於蕪湖拔梁山等三鎮蕪湖時在宣州當塗縣界梁山在和州厯陽縣南七十里臨江祏音石辛卯安撫使任瓌拔揚子城廣陵城主龍龕降揚子城在揚州江都縣界揚州治江都古廣陵城也姓苑龍姓古龍伯氏之後任音壬瓌古回翻龕口含翻丁酉突厥寇原州戊戌趙郡王孝恭克丹陽先是輔公祏遣其將馮慧亮陳當世將舟師三萬屯博望山天門山在宣州當塗縣西南三十里又名蛾眉山夾江對峙東曰博望西曰梁山先悉薦翻將即亮翻下同考異曰舊趙郡王孝恭傳作陳當時舊李靖傳云屯當塗今皆從髙祖實録陳正通徐紹宗將步騎三萬屯青林山水經注即水出廬江郡之東陵鄉禹貢所謂過九江至於東陵者也西南流水積為湖湖西有青林山又今當塗縣東南有青山仍於梁山連鐵鏁以斷江路斷丁管翻築却月城延袤十餘里袤音茂又結壘江西以拒官軍孝恭與李靖帥舟師次舒州李世勣帥步卒一萬度淮拔夀陽次硤石帥讀曰率慧亮等堅壁不戰孝恭遣竒兵絶其糧道慧亮等軍乏食夜遣兵薄孝恭營孝恭堅卧不動孝恭集諸將議軍事皆曰慧亮等擁彊兵據水陸之險攻之不可猝拔不如直指丹陽掩其巢穴丹陽既潰慧亮等自降矣降户江翻孝恭將從其議李靖曰公祏精兵雖在此水陸二軍然所自將亦不為少今博望諸柵尚不能拔公祏保據石頭豈易取哉易以豉翻進攻丹陽旬月不下慧亮躡吾後腹背受敵此危道也李靖此議與長孫無忌安市之議畧同然李靖决勝而太宗無功及安市班師靖咎其不能用道宗之策此用兵之所以難也慧亮正通皆百戰餘賊其心非不欲戰正以公祏立計使之持重欲以老我師耳我今攻其城以挑之挑徒了翻一舉可破也孝恭然之使羸兵先攻賊營而勒精兵結陳以待之羸倫為翻陳讀曰陣攻壘者不勝而走賊出兵追之行數里遇大軍與戰大破之此左傳楚五大夫破吳師以滅舒鳩之故智也闞稜免胄謂賊衆曰汝曹不識我邪邪音耶何敢來與我戰賊多稜故部曲皆無鬭志或有拜者由是遂敗孝恭靖乗勝逐北轉戰百餘里博山青林兩戍皆潰慧亮正通等遁歸殺傷及溺死者萬餘人溺奴狄翻李靖兵先至丹楊公祏大懼擁兵數萬弃城東走欲就左遊仙於㑹稽李世勣追之公祏至句容句容縣漢屬丹陽郡時屬蔣州在建康城東九十里從兵能屬者纔五百人從才用翻屬之欲翻夜宿常州其將吳騷等謀執之公祏覺之弃妻子獨將腹心數十人斬闗走至武康吳分烏程餘抗立永安縣晉改為永康又改為武康屬湖州在州西南一百七里為野人所攻西門君儀戰死執公祏送丹陽梟首梟堅堯翻分捕餘黨悉誅之江南皆平己亥以孝恭為東南道行臺右僕射李靖為兵部尚書頃之廢行臺以孝恭為揚州大都督靖為府長史上深美靖功曰靖蕭輔之膏肓也謂蕭銑輔公祏皆為靖所殺也肓呼光翻闞稜功多頗自矜伐公祏誣稜與己通謀㑹趙郡王孝恭籍没賊黨田宅籍没者舉籍賊黨所有田宅没而入官稜及杜伏威王雄誕田宅在賊境者孝恭并籍没之稜自訴理忤孝恭忤五故翻孝恭怒以謀反誅之夏四月庚子朔赦天下是日頒新律令比開皇舊制増新格五十三條初定均田租庸調法調徒釣翻丁中之民給田一頃篤疾減什之六寡妻妾減七皆以什之二為世業八為口分分扶問翻每丁嵗入租粟二石調隨土地所宜綾絹絁布嵗役二旬不役則收其傭日三尺新志凡授田丁嵗輸粟二斛謂之租丁隨鄉所出嵗輸絹二匹綾絁二丈布加五之一綿三兩麻三斤非蠶郷則輸銀十四兩謂之調用人之力嵗二十日閏加三日不役收其庸日三尺絁式支翻繒似布有事而加役者旬有五日免其調三旬租調俱免水旱蟲霜為災什損四以上免租損六以上免調損七已上課役俱免凡民貲業分九等上中下各有三等也百户為里五里為鄉四家為鄰四鄰為保為考異曰唐厯云四家鄰五家為保按通典四鄰為保唐厯誤也在城邑者為坊田野者為村食禄之家無得與民爭利工商雜類無預士伍男女始生為黄四嵗為小十六為中二十為丁六十為老嵗造計帳三年造户籍丁未党項寇松州庚申通事舎人李鳳起擊萬州反獠平之後魏分朐䏰置魚泉縣後周改為萬川隋改為南浦屬信州武徳元年分置萬州南浦郡獠魯皓翻下同五月辛未突厥寇朔州甲戌羌與吐谷渾同寇松州吐從暾入聲谷音浴遣益州行臺左僕射竇軌自翼州道扶州刺史蔣善合自芳州道擊之西魏逐吐谷渾置鄧州隋開皇七年改曰扶州同昌郡武徳元年分㑹州之左封翼斜置翼州臨翼郡唐制上州刺史從三品中正四品上下正四品下丙戌作仁智宫於宜君宜君縣置於古祋祤城隋屬京兆郡時屬宜州丁亥竇軌破反獠於方山俘二萬餘口資治通鑑巻一百九十
