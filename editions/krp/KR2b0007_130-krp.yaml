body:
  text: 資治通鑑卷一百三十宋司馬光撰胡三省音註宋紀十二旃䝉大荒落一年太宗眀皇帝上之上諱彧字休景小字榮期文帝第十一子也㤗始元年春正月乙未朔廢帝改元永光大赦是歳八月殺江夏王義恭柳元景顔師伯改元景和既弑廢帝改元㤗始一年凡三改元丙申魏大赦二月丁丑魏主如樓煩宫樓煩縣漢屬雁門郡魏晉棄之荒外魏收地形志雁門郡原平縣有樓煩城賢曰樓煩故城在今代州崞縣東北余按唐書憲州古樓煩地也自孝建以來民間盗鑄濫錢事始一百二十八卷孝武帝孝建二年商貨不行庚寅更鑄二銖錢更工衡翻形式轉細官錢每出民間即模效之而更薄小無輪郭不磨鑢謂之耒子鑢良倨翻錯也耒盧對翻杜佑通典耒子作來子三月乙巳魏主還平城夏五月癸卯魏高祖殂年二十六謚曰文成皇帝初魏世祖經營四方國頗虚耗重以内難重直用翻難乃旦翻内難謂宗愛既弑世祖又弑南安王余朝野楚楚楚楚酸痛之貌朝直遥翻高宗嗣之與時消息消衰减也息生長也靜以鎮之懷集中外民心復安復扶又翻甲辰太子𢎞即皇帝位𢎞文成帝之長子也蕭子顯曰𢎞字萬民大赦尊皇后曰皇太后顯祖魏獻文帝廟號顯祖時年十二侍中車騎大將軍乙渾專權騎竒寄翻矯詔殺尚書楊保年平陽公賈愛仁南陽公張天度于禁中侍中司徒平原王陸麗治疾於代郡温泉魏土地記曰代城北九十里有桑乾城城西渡桑乾水去桑乾城十里有温湯療疾有驗治直之翻乙渾使司衛監穆多侯召之魏官有司衛監典宿衛多矦謂麗曰渾有無君之心今宫車晏駕王德望素重魏高宗之立麗冇功焉而又忠篤故德望重於一時姦臣所忌宜少淹留以觀之朝廷安靜然後入未晩也少詩照翻麗曰安有聞君父之喪慮患而不赴者乎即馳赴平城乙渾所為多不灋麗數爭之數所角翻戊申渾又殺麗及穆多矦多矦壽之弟也穆壽事魏世祖封宜都王己酉魏以渾為太尉録尚書事東安王劉尼為司徒尚書左僕射代人和其奴為司空殿中尚書順陽公郁謀誅乙渾渾殺之主少國疑姦臣擅命屠戮忠賢魏之不亡者幸也壬子魏以淮南王它為鎮西大將軍儀同三司鎮凉州魏開酒禁魏設酒禁見一百二十八卷孝武孝建三年壬午加柳元景南豫州刺史加顔師伯丹陽尹秋七月癸巳魏以太尉乙渾為丞相位居諸王上事無大小皆决於渾廢帝幼而狷暴狷吉掾翻及即位始猶難太后大臣及戴法興等未敢自恣太后既殂去年太后殂帝年漸長長知兩翻欲有所為灋興輒抑制之謂帝曰官所為如此欲作營陽邪營陽王事見一百二十卷文帝元嘉元年廢帝固狂暴戴法興此言亦足以取死帝稍不能平所幸閹人華願兒賜與無算華户化翻灋興常加裁減願兒恨之帝使願兒於外察聽風謡願兒言於帝曰道路皆言宫中有二天子灋興真天子官為贗天子贗五晏翻偽考異曰宋書作應天子宋畧作鴈天子按字書贗物也韓愈詩曰居然見真贗書或作鴈今從宋畧且官居深宫與人物不接灋興與太宰顔柳共為一體義恭録尚書事栁元景為尚書令顔師伯為僕射而事皆法興專决故云然徃來門客恒有數百恒户登翻内外士庶莫不畏服灋興是孝武左右乆在宫闈今與它人作一家深恐此坐席非復官有坐徂卧翻復扶又翻又如字帝遂𤼵詔免灋興免者免其所居官也遣還田里仍徙逺郡八月辛酉賜灋興死解巢尚之舍人巢尚之自孝武時為中書通事舍人員外散騎侍郎東海奚顯度散悉亶翻騎竒寄翻亦有寵於世祖常典作役課督苛虐捶扑慘毒捶止橤翻扑普卜翻擊也人皆苦之帝嘗戲曰顯度為百姓患比當除之比毗寐翻左右因唱諾即宣㫖殺之尚書右僕射領衛尉卿丹陽尹顔師伯居權日久孝武大明四年徵顔師伯於歴城自侍中遷尚書僕射居權要驕奢淫恣為衣冠所疾帝欲親朝政朝直遥翻庚午以師伯為尚書左僕射解卿尹解衛尉卿及丹陽尹以吏部尚書王彧為右僕射分其權任師伯始懼彧於六翻初世祖多猜忌王公大臣重足屏息重直龍翻屏必郢翻莫敢妄相過從過古禾翻世祖殂太宰義恭等皆相賀曰今日始免横死矣横户孟翻甫過山陵義恭與柳元景顔師伯等聲樂酣飲不捨書夜酣户甘翻帝内不能平既殺戴法興諸大臣無不震慴慴之渉翻各不自安於是元景師伯宻謀廢帝立義恭日夜聚謀而持疑不能决元景以其謀告沈慶之慶之與義恭素不厚又師伯常專斷朝事不與慶之參懷斷丁亂翻朝直遥翻下同孝武遺詔令慶之參决大事見上卷上年謂令史曰尚書令史也沈公爪牙耳安得預政事慶之恨之乃𤼵其事癸酉帝自帥羽林兵討義恭殺之并其四子斷絶義恭支體分裂腸胃挑取眼睛以蜜漬之謂之鬼目粽宋人以蜜漬物曰粽盧循以益智粽遺文帝即蜜漬益智也帥讀曰率斷丁管翻睛七真翻眼珠子漬疾智翻粽子宋翻别遣使者稱詔召柳元景以兵隨之使疏吏翻下同左右奔告兵刃非常非常言異於常時也元景知禍至入辭其母整朝服乗車應召弟車騎司馬叔仁戎服帥左右壯士欲拒命元景苦禁之既出巷軍士大至元景下車受戮容色恬然并其八子六弟及諸姪獲顔師伯於道殺之并其六子又殺廷尉劉德願改元景和文武進位二等遣使誅湘州刺史江夏世子伯禽義恭命其世子曰伯禽是以周公自處矣自是公卿以下皆被捶曵如奴𨽻矣卑賤之人有所附屬謂之𨽻人之下者謂之奴被皮義翻捶止橤翻初帝在東宫多過失世祖欲廢之而立新安王子鸞侍中袁顗盛稱太子好學有日新之美世祖乃止帝由是德之既誅羣公欲引進顗任以朝政遷為吏部尚書顗魚豈翻好呼到翻為袁顗寵衰求出張本與尚書左丞徐爰皆以誅義恭等功賜爵縣子徐爰便辟善事人頗渉書傳便皮連翻傳直戀翻自元嘉初入侍左右豫參顧問既長於附㑹又飾以典文故為太祖所任遇大明之世委寄尤重時殿省舊人多見誅逐唯爰巧於將迎始終無迕廢帝待之益厚迕五故翻迎也羣臣莫及帝每出常與沈慶之及山隂公主同輦爰亦預焉徐爰得志於大明景和之間宜也而啓寵實在於元嘉便僻之足以惑人雖明君不能免也漢宣用恭顯而遺禍於元帝事正如此山隂公主帝姊也適駙馬都尉何戢戢偃之子也何偃尚之之子戢疾立翻公主尤淫恣嘗謂帝曰妾與陛下男女雖殊俱託體先帝陛下六宫萬數而妾唯駙馬一人事太不均帝乃為公主置面首左右三十人面取其貌美首取其髪美進爵㑹稽郡長公主秩同郡王長知兩翻吏部郎褚淵貌美公主就帝請以自侍帝許之淵侍公主十餘日備見逼廹以死自誓乃得免淵湛之之子也褚湛之進用於元嘉孝建之間帝令太廟别畫祖考之像畫讀曰畫帝入廟指高祖像曰渠大英雄生擒數天子謂擒桓𤣥慕容超姚泓也大讀曰太指太祖像曰渠亦不惡但末年不免兒斫去頭謂為元凶劭所弑也指世祖像曰渠大齄鼻如何不齄立召畫工令齄之齄壯加翻鼻上麭也栁宗元詩曰嗜酒鼻成齄以建安王休仁為雍州刺史雍於用翻湘東王彧爲南豫州刺史皆留不遣甲戍以司徒揚州刺史豫章王子尚領尚書令以始興公沈慶之為侍中太尉慶之固辭徴青冀二州刺史王𤣥謨為領軍將軍魏葬文成皇帝于金陵廟號高宗九月癸巳帝如湖熟湖熟漢湖熟侯國屬丹楊郡晉宋為縣淳化中廢為鎮屬上元縣戊戌還建康新安王子鸞寵於世祖事見上卷大明五年帝疾之辛丑遣使賜子鸞死又殺其母弟南海王子師及其母妹𤼵殷貴妃墓殷貴妃盖生子鸞子師及一女母弟母妹謂同母弟妹也又欲掘景寧陵太師以為不利於帝乃止初金紫光禄大夫謝莊為殷貴妃誄誄魯水翻誄丈夫者述其功德誄婦人者述其容德也曰贊軌堯門帝以莊比貴妃於鉤弋夫人鉤弋事見二十二卷漢武帝大始三年欲殺之或説帝曰死者人之所同一往之苦不足為困莊生長冨貴説輸芮翻長知兩翻謝莊𢎞微之子謝萬之𤣥孫諸謝自晉以來貴盛故云然今繫之尚方使知天下苦劇劇甚也言莊享天下之所甚樂而未知天下之所甚苦今繫囚則使知之然後殺之未晚也帝從之徐州刺史義陽王昶素為世祖所惡昶丑兩翻昶文帝子世祖之諸弟也惡烏路翻民間每訛言昶當反是歳訛言尤甚廢帝常謂左右曰我即大位以來遂未嘗戒嚴使人邑邑邑邑不得志也昶使典籖蘧法生奉表詣建康求入朝蘧姓也春秋時衛有大夫蘧伯玉蘧其於翻朝直遥翻帝謂灋生曰義陽與太宰謀反我正欲討之今知求還甚善又屢詰問灋生詰去吉翻義陽謀反何故不啓灋生懼逃還彭城帝因此用兵己酉下詔討昶内外戒嚴帝自將兵渡江將即亮翻命沈慶之統諸軍前驅法生至彭城昶即聚兵反移檄綂内諸郡沈約宋志以大明八年為正徐州統彭城沛郡下邳蘭陵東海東莞東安琅邪淮陽陽平濟隂比濟隂鍾離馬頭等郡皆不受命斬昶使將佐文武悉懷異心昶知事不成棄母妻擕愛妾夜與數十騎開北門奔魏使疏吏翻將即亮翻騎竒寄翻昶頗渉學能屬文屬之欲翻魏人重之使尚公主拜侍中征南將軍駙馬都尉賜爵丹陽王為後魏挾劉昶以伐齊張本吏部尚書袁顗始為帝所寵任俄而失指待遇頓衰使有司糾奏其罪白衣領職顗懼詭辭求出甲寅以顗督雍梁諸軍事雍州刺史雍於用翻顗舅蔡興宗謂之曰襄陽星惡何可徃興宗盖以天道言之顗曰白刅交前不救流矢言白刅交乎前則流矢之來不暇救禍近而急故圖出外以求賖死後患非所計也今者之行唯願生出虎口耳且天道遼遠何必皆驗是時臨海王子頊為都督荆湘等八州諸軍事荆州刺史朝廷以興宗為子頊長史南郡太守行府州事興宗辭不行顗説興宗曰説輸芮翻朝廷形勢人所共見在内大臣朝不保夕舅今出居陜西為八州行事蕭子顯曰江左大鎮莫過荆揚𢎞農郡陜縣周世二伯主諸侯周公主陜東召公主陜西故稱荆州為陜西顗在襄沔地勝兵彊去江陵咫尺水陸流通襄陽至江陵水則由漢沔陸則由長林當陽沔彌兖翻若朝廷有事可以共立桓文之功豈比受制凶狂臨不測之禍乎今得間不去間隙也謂得可行之隙而興宗不肯去間古莧翻後復求出豈可得邪復扶又翻興宗曰吾素門平進蔡興宗蔡廓之子蔡謨之𤣥孫以方嚴自處官以序遷謂之平進可也謂之素門可乎盖江左以王謝為高門其餘有才望者或以姻戚擢用或以舊思興宗此言盖亦感切其甥指其在世祖之世調䕶昏狂階此以見寵任寵衰則求出以避禍進退皆無所據也與主上甚踈未容有患宫省内外人不自保㑹應有變若内難得弭外舋未必可量難乃旦翻舋許覲翻量音良汝欲在外求全我欲居中免禍各行其志不亦善乎蔡興宗可謂先見矣顗於是狼狽上路狼狽者倉皇而行如恐不及之意上時掌翻猶慮見追行至尋陽喜曰今始免矣鄧琬為晉安王子勛鎮軍長史尋陽内史行江州事子勛以鎮軍將軍為江州刺史鎮尋陽鄧琬為長史行事顗與之欵狎過常每清閒必盡日窮夜顗與琬人地本殊袁顗有清望又名門也鄧琬性貪鄙又寒族也故云人地本殊見者知其有異志矣為顗琬起兵奉子勛張本尋復以蔡興宗為吏部尚書復扶又翻戊午解嚴帝因自白下濟江至𤓰歩晉宋都建康新亭白下皆江津要地新亭在西白下在東白下盖今之龍灣也按白下城合白石壘唐武德中移江寧縣於此名白下縣沈慶之復啓聽民私鑄錢慶之始議見一百二十八卷孝武帝孝建二年由是錢貨亂敗千錢長不盈三寸大小稱此謂之鵝眼錢稱尺證翻劣於此者謂之綖環錢綖與線同私箭翻貫之以縷入水不沈沈持林翻隨手破碎市井不復料數料音聊料量也料數者料其多少之數也十萬錢不盈一掬鄭𤣥曰兩手曰掬斗米一萬商貨不行冬十月丙寅帝還建康帝舅東陽太守王藻尚世祖女臨川長公主公主妬譖藻於帝己卯藻下獄死王太后晉丞相導之𤣥孫女藻后弟也下户稼翻㑹稽太守孔靈符所至有政績以忤犯近臣近臣譖之帝遣使鞭殺靈符并誅其二子㑹工外翻忤立故翻使䟽吏翻寧朔將軍何邁瑀之子也何瑀見一百二十八卷孝武孝建二年尚帝姑新蔡長公主主文帝第十女也名英媚長知兩翻帝納主於後宫謂之謝貴嬪詐言公主薨殺宫婢送邁第殯葬行喪禮庚辰拜貴嬪為夫人嬪毗賔翻加鸞輅龍旂岀警入蹕邁素豪俠多養死士俠戸頰翻謀因帝出遊廢之立晉安王子勛事泄十一月壬辰帝自將兵誅邁初沈慶之既發顔栁之謀遂自昵於帝數盡言規諌將即亮翻昵尼質翻數所角翻帝浸不悦慶之懼杜門不接賔客嘗遣左右范羡至吏部尚書蔡興宗所興宗使羡謂慶之曰公閉門絶客以避悠悠請託者耳如興宗非有求於公者也何為見拒慶之使羡邀興宗興宗往見慶之因説之曰主上比者所行人倫道盡言内亂也説輸芮翻比毗至翻率德改行無可復望行下孟翻復扶又翻下不復同今所忌憚唯在於公百姓喁喁喁魚容翻喁魚口向上也以喻百姓仰望如羣魚然所瞻頼者亦在公一人而已瞻仰視也賴倚恃也公威名素著天下所服今舉朝遑遑遑遑急也朝直遥翻人懷危怖怖普布翻指麾之日誰不響應如猶豫不斷斷丁亂翻欲坐觀成敗豈惟旦夕及禍四海重責將有所歸言慶之自昵於廢帝今忤帝意不惟行且及禍若他人舉事必謂慶之從君於昏慶之何所逃其責僕䝉眷異常故敢盡言願公詳思其計慶之曰僕誠知今日憂危不復自保但盡忠奉國始終以之當委任天命耳言委之於天任命所至加老退私門兵力頓闕頓讀曰鈍又讀如字雖欲為之事亦無成興宗曰當今懐謀思奮者非欲邀功賞富貴止求脱朝夕之死耳殿中將帥唯聼外間消息將即亮翻帥所類翻若一人唱首則俯仰可定况公綂戎累朝慶之自元嘉以來統兵歴事三世朝直遥翻舊日部曲布在宫省受恩者多謂宗越等沈攸之輩皆公家子弟耳沈攸之者慶之從父兄子也何患不從且公門徒義附並三吳勇士殿中將軍陸攸之公之鄉人陸攸之盖亦吳興人今入東討賊大有鎧仗在青溪未𤼵公取其噐仗以配衣麾下鎧可亥翻衣於既翻使陸攸之帥以前驅帥讀曰率下同僕在尚書中自當帥百僚案前代故事更簡賢明以奉社稷天下之事立定矣又朝廷諸所施為民間傳言公悉豫之公今不决當有先公起事者公亦不免附從之禍此興宗所謂重責將有所歸也先悉薦翻聞車駕屢幸貴第貴第謂時貴之宅第也酣醉淹留又聞屏左右屏必郢翻獨入閤内此萬世一時不可失也慶之曰感君至言然此大事非僕所能行事至固當抱忠以没耳事至猶言若事果至如興宗所言當抱忠以死也青州刺史沈文秀慶之弟子也將之鎮帥部曲出屯白下亦說慶之曰說輸芮翻主上狂暴如此禍亂不久而一門受其寵任萬物皆謂與之同心盈天地之間者萬物人亦物也此萬物謂人且若人愛憎無常猜忍特甚若人謂廢帝不測之禍進退難免今因此衆力圖之易於反掌易以䜴翻機㑹難值不可失也再三言之至於流涕慶之終不從文秀遂行沈慶之從君於昏狂杜門以待死伊霍之事固非常人所能行也及帝誅何邁量慶之必當入諌量音良度也先閉青溪諸橋以絶之慶之聞之果徃不得進而還還從宣翻又如字帝乃使慶之從父兄子直閤將軍攸之賜慶之藥慶之不肯飲攸之以被揜殺之攸之隨慶之討隨王誕有功慶之抑其賞由是恨之故果於殺從才用翻時年八十慶之子侍中文叔欲亡恐如太宰義恭被支觧被皮義翻謂其弟中書郎文季曰我能死爾能報中書郎即中書侍郎左傳楚平王信費無極之譛執伍奢無極曰奢之子材若在吳必憂楚國盍以免其父召之彼仁必來不然將為患王使召之曰來吾免而父棠君尚謂其弟員曰爾適吳我將歸死吾智不若我能死爾能報伍尚至楚弁奢殺之員奔吳藉兵以報楚入郢鞭平王之墓遂飲慶之之藥而死弟秘書郎昭明亦自經死杜佑通典曰後漢馬融為秘書郎詣東觀典校書晉掌中外三閣經書校閲脱誤亦謂之郎中武帝分秘圖書籍為甲乙丙丁四部使祕書郎中四人各掌其一宋齊尤為美職皆為甲族起家之選居職例十日便遷齊梁末多以貴遊子弟為之無其才實文季揮刀馳馬而去追者不敢逼遂得免為後沈文季盡誅沈攸之親屬以報仇張本帝詐言慶之病薨贈侍中太尉謚曰忠武公葬禮甚厚領軍將軍王𤣥謨數流涕諌帝以刑殺過差數所角翻帝大怒𤣥謨宿將有威名王𤣥謨自元嘉末為將孝建初有破臧質平義宣之功將即亮翻道路訛言𤣥謨已見誅蔡興宗嘗為東陽太守𤣥謨典籖包灋榮家在東陽𤣥謨使灋榮至興宗所興宗謂灋榮曰領軍殊當憂懼灋榮曰領軍比日殆不復食夜亦不眠比日近日也比毗寐翻復扶又翻恒言收已在門不保俄頃收謂帝將遣吏兵收之也恒户登翻興宗曰領軍憂懼當為方略那得坐待禍至因使灋榮勸𤣥謨舉事𤣥謨使灋榮謝曰此亦未易可行易以䜴翻期當不泄君言右衛將軍劉道隆為帝所寵任專典禁兵興宗嘗與之俱從帝夜岀從才用翻道隆過興宗車後興宗曰劉君比日思一閒寫閒寫者謂欲清閒寫其所懐也道隆解其意解户買翻曉也搯興宗手搯苦洽翻以𤓰搯之也曰蔡公勿多言廢昏立明非常之謀也蔡興宗建非常之謀既以告沈慶之又以告王𤣥謨又以擿𤼵劉道隆而人不敢泄其言何也昏暴之朝人不自保時日害喪予及汝皆亡盖人心之所同然也壬寅立皇后路氏太皇太后弟道慶之女也帝畏忌諸父恐其在外為患皆聚之建康拘於殿内毆捶陵曵無復人理親親悌長人之常理廢帝悖之毆烏口翻捶止橤翻復扶又翻又如字湘東王彧建安王休仁山陽王休佑皆肥壯帝為竹籠盛而稱之彧於六翻盛時征翻下同稱勑陵翻稱其輕重也以彧尤肥謂之猪王謂休仁為殺王休祐為賊王以三王年長尤惡之長知兩翻惡烏路翻常録以自隨不離左右録收也攝也離力智翻東海王禕性凡劣劣弱也鄙也禕吁韋翻謂之驢王桂陽王休範巴陵王休若年尚少故並得從容少詩照翻從于容翻嘗以木槽盛飯并雜食攪之攪古巧翻掘地為坑實以泥水裸彧内坑中使以口就槽食之用為歡笑裸即果翻前後欲殺三王以十數休仁多智數每以談笑佞䛕説之故得推遷推移也遷轉也言以談笑佞䛕轉移帝意也或曰推遷延緩之意説讀曰悦少府劉曚妾孕臨月曚謨蓬翻將産之月曰臨月廷考異曰宋書帝紀作少府劉勝始安王休仁傳作尉劉曚宋畧及南史帝紀皆作少府劉曚休仁傳作廷尉劉曚今從其多者帝迎入後宫俟其生男欲立為太子彧嘗忤㫖帝裸之縛其手足貫之以杖使人擔付太官忤五故翻裸郎果翻擔都甘翻荷也曰今日屠猪休仁笑曰猪未應死帝問其故休仁曰待皇子生殺猪取其肝肺帝怒乃解曰且付廷尉一宿釋之丁未曚妾生子名曰皇子為之大赦為于偽翻賜為父後者爵一級帝又以太祖世祖在兄弟數皆第三太祖高祖第三子世祖太祖第三子江州刺史晉安王子勛亦第三子勛世祖第三子故惡之惡烏路翻因何邁之謀使左右朱景雲送藥賜子勛死景雲至湓口停不進子勛典籖謝道遇主帥潘欣之侍書褚靈嗣聞之諸王有侍讀掌授王經有侍書掌教王書帥所類翻馳以告長史鄧琬泣涕請計子考異曰勛傳云景雲遣信使告琬宋略曰帝使道遇賫敕至潯陽琬謂道遇云云今從琬傳琬曰身南土寒士鄧琬南昌人起於寒素䝉先帝殊恩以愛子見託豈得惜門户百口期當以死報効幼主昏暴社稷危殆雖曰天子事猶獨夫猶若也似也今便指帥文武直造京邑帥讀曰率造七到翻與羣公卿士廢昏立眀耳戊申琬稱子勛教令所部戒嚴子勛戎服岀聽事集僚佐使潘欣之口宣㫖諭之四座未對録事叅軍陶亮首請效死前驅衆皆奉㫖乃以亮為諮議叅軍領中兵摠綂軍士功曹張沈為諮議叅軍綂作舟艦沈持林翻艦户黯翻南陽太守沈懷寶岷山太守薛常寶岷山即漢武帝所開汶山郡也宣帝地節三年併入蜀郡劉蜀復立沈懷寳薛常寶先常為郡守因各以其官稱之守手又翻彭澤令陳紹宗等並為將帥將即亮翻帥所類翻初帝使荆州録送前軍長史荆州行事張悦至湓口琬稱子勛命釋其桎梏桎職日翻梏工沃翻迎以所乗車以為司馬悦暢之弟也張暢見一百二十五卷六卷文帝元嘉二十六年七年琬悦二人共掌内外衆事遣將軍俞伯竒帥五百人斷大雷帥讀曰率斷丁管翻禁絶商旅及公私使命遣使上諸郡民丁遣使詣江州部内諸郡籍民丁上之以為兵使疏吏翻上時掌翻收斂噐械旬日之内得甲士五千人岀頓大雷於兩岸築壘又以巴東建平二郡太守孫冲之為諮議叅軍領中兵與陶亮並統前軍移檄遠近戊午帝召諸妃主列於前彊左右使辱之彊其兩翻南平王鑠妃江氏不從妃即江湛之妹鑠式灼翻帝怒殺妃三子南平王敬猷廬陵王敬先安南矦敬淵鞭江妃一百先是民間訛言湘中岀天子先悉薦翻帝將南巡荆湘二州以厭之厭一渉翻師古曰塞當也明旦欲先誅湘東王彧然後𤼵初帝既殺諸公恐羣下謀已以直閤將軍宗越譚金童太一沈攸之等有勇力引為爪牙賞賜美人金帛充牣其家江左以直閤將軍岀入省閤總領宿衛牣滿也越等久在殿省衆所畏服皆為帝盡力為于偽翻帝恃之益無所顧憚恣為不道中外騷然左右宿衛之士皆有異志而畏越等不敢發時三王久幽不知所為湘東王彧主衣㑹稽阮佃夫内監始興王道隆江左之制天子及諸王皆有内監内監齋監也齋内自主帥以下皆得監察之㑹工外翻佃音田學官令臨淮李道兒晉制諸王國置學官令一人與直閤將軍桞光世及帝左右琅邪淳于文祖等謀弑帝帝以立后故假諸王閹人閹於廉翻彧左右錢藍生亦在中密使候帝動止先是帝遊華林園竹林堂先悉薦翻竹林堂華林園後堂也使宫人倮相逐倮郎果翻一人不從命斬之夜夢在竹林堂有女子罵曰帝悖虐不道悖蒲妹翻明年不及熟矣帝於宫中求得一人似所夢者斬之又夢所殺者罵曰我已訴上帝矣通鑑不語怪而獨書此事者以明人不可妄殺而天聰明為不可欺也於是巫覡言竹林堂有鬼是日晡時帝岀華林園建安王休仁山陽王休祐㑹稽公主並從覡刑狄翻晡奔謨翻從才用翻湘東王彧獨在秘書省祕書省藏圖書之所在禁中不被召益憂懼被皮義翻帝素惡主衣吳興壽寂之見輙切齒惡烏路翻風俗通壽姓吳王壽夢之後又有大夫壽越阮佃夫以其謀告寂之及外監典事東陽朱幼李延壽㤙倖傳論曰若徴兵動衆大興人役擾劇逺近斷於内監之心譴辱詆訶恣於典事之口抑符緩詔姦偽非一書死為生請謁成市左臂揮金右手刋字紙為銅落茟為利染細鎧主南彭城姜産之晉氏渡江立南彭城郡於晉陵界鎧可亥翻畧考異曰産或作彦宋書宋南史皆作産今從之細鎧將晉陵王敬則吳分吳郡無錫以西為毘陵郡晉東海王越世子名毗而東海國故食毘陵懐帝永嘉五年改為晉陵郡將即亮翻中書舎人戴明寶寂之等聞之皆響應幼豫約勒内外使錢藍生宻報休仁休祐時帝欲南廵腹心宗越等並聽岀外裝束唯隊主樊僧整防華林閤防守華林閤門也栁光世與僧整鄉人因宻邀之僧整即受命栁氏本河東人僑居襄陽樊僧整盖亦河東人也凡同謀十餘人阮佃夫慮力少不濟更欲招合少詩沼翻壽寂之曰謀廣或泄不煩多人其夕帝悉屏侍衛屏必郢翻與羣巫及綵女數百人綵女倣後漢采女之制射鬼於竹林堂射而亦翻下射之同事畢將奏樂壽寂之抽刀前入姜産之次之淳于文祖等皆隨其後休仁聞行聲甚急謂休祐曰事作矣相隨奔景陽山文帝元嘉二十三年起景陽山於華林園帝見寂之至引弓射之不中綵女皆迸走帝亦走大呼寂寂者三中竹仲翻迸北孟翻呼火故翻寂之追而弑之年十七宣令宿衛曰湘東王受太皇太后令除狂主今已平定殿省惶惑未知所為休仁就祕書省見湘東王即稱臣引升西堂登御座召見諸大臣見賢遍翻于時事起倉猝王失履跣至西堂猶著烏帽著陟畧翻坐定休仁呼主衣以白帽代之江南天子宴居著白紗㡌令備羽儀雖未即位凡事悉稱令書施行宣太皇太后令數廢帝罪惡數所具翻命湘東王纂承皇極及明宗越等始入湘東王撫接甚厚廢帝母弟司徒揚州刺史豫章王子尚頑悖有兄風悖蒲内翻又蒲没翻下同己未湘東王以太皇太后令賜子尚及㑹稽公主死㑹工外翻建安王休仁等始得岀居外舎外舎外第也釋謝莊之囚謝莊以誄殷貴妃被囚事見上廢帝猶横尸太醫閤口蔡興宗謂尚書右僕射王彧曰此雖凶悖要是天下之主宜使喪禮粗足若直如此四海必將乗人言乗此以奉辭伐罪王彧湘東王妃兄也故蔡興宗與之言粗坐五翻乃葬之秣陵縣南葬於秣陵縣南郊壇西初湘東王母沈婕妤早卒婕妤音接予卒子恤翻路太后養之王事太后甚謹太后愛王亦篤王既弑廢帝欲慰太后心下令以太后弟子休之為黄門侍郎茂之為中書侍郎論功行賞壽寂之等十四人皆封縣侯縣子十二月庚申朔以東海王禕為中書監太尉禕於湘東王兄也禕吁韋翻進鎮軍將軍江州刺史晉安王子勛為車騎將軍開府儀同三司騎竒寄翻癸亥以建安王休仁為司徒尚書令揚州刺史以山陽王休祐為荆州刺史桂陽王休範為南徐州刺史乙丑徙安陸王子綏為江夏王丙寅湘東王即皇帝位大赦改元至此始改元奉始其廢帝時昏制謬封並加刋削庚午以右衛將軍劉道隆為中䕶軍道隆暱於廢帝常無禮於建安太妃此廢帝使左右辱妃主時事暱尼質翻至是建安王休仁求解職明帝乃賜道隆死書明帝者因前史成文宗越譚金童太一等雖為上所撫接内不自安上亦不欲使居中從容謂之曰從于容翻卿等遭罹暴朝朝直遥翻勤勞日乆應得自養之地兵馬大郡隨卿等所擇越等素已自疑聞之皆相顧失色因謀作亂以告沈攸之攸之以聞上收越等下獄死攸之復入直閤沈攸之繼此有平尋陽之功遂總戎北討歴居方面之任下户嫁翻復扶又翻辛未徙臨賀王子産為南平王晉熈王子輿為廬陵王壬申以尚書右僕射王景文為尚書僕射景文即彧也避上名以字行乙亥追尊沈太妃曰宣太后即上母沈婕妤也陵曰崇寧初豫州刺史山陽王休祐入朝以長史南梁郡太守殷琰行府州事晉孝武太元中僑立南梁郡於淮南安帝義熈中土斷始有淮南故地屬南豫州五代志淮南郡壽春縣舊有南梁郡朝直遥翻及休祐徙荆州即以琰為督豫司二州諸軍事豫州刺史為殷琰舉州以附尋陽張本有司奏路太后宜即前號移居外宮上不許戊寅尊路太后為崇憲皇太后居崇憲宫供奉禮儀不異舊日立妃王氏為皇后后景文之妹也罷二銖錢禁鵝眼綖環錢二銖鵝眼綖環並見卷首綖與線同餘皆通用江州佐吏得上所下令書皆喜共造鄧琬曰暴亂既除殿下又開黄閤造七到翻時加子勛開府儀同三司故云開黄閤實為公私大慶琬以晉安王子勛次第居三又以尋陽起事與世祖同符世祖於兄弟次第三以尋陽起兵事見一百二十七卷文帝元嘉三十年謂事必有成取令書投地曰殿下當開端門天子開端門宫門正南門曰端門黄閤是吾徒事耳衆皆駭愕琬更與陶亮等繕治噐甲徴兵四方治直之翻袁顗既至襄陽即與諮議參軍劉胡繕修兵械簡集士卒詐稱被太皇太后令使其起兵顗魚豈翻被皮義翻即建牙馳檄奉表勸子勛即大位辛巳更以山陽王休祐為江州刺史欲以代子勛更工衡翻荆州刺史臨海王子頊即留本任休祐不之荆州留子頊本任以安之先是廢帝以邵陵王子元為湘州刺史先悉薦翻中兵參軍沈仲玉為道路行事未至州使為道路行事沿途之事一以委之至鵲頭聞尋陽兵起不敢進琬遣數百人刼迎之令子勛建牙於桑尾桑尾即桑落洲尾傳檄建康稱孤志遵前典黜幽陟眀子勛自稱曰孤黜幽陟明即廢昏立明又謂上矯立眀荗明荗謂明德荗親謂上矯太皇太后令賜豫章王子尚死也簒竊大寳干我昭穆禮父為昭子為穆昭時招翻寡我兄弟藐孤同氣猶有十三左傳晉獻公曰以是藐諸孤藐猶小也孝武帝二十八子時存者子勛子綏子房子頊子仁子真子元子輿子孟子嗣子趨子期子凡十三人藐妙小翻又亡角翻聖靈何辜而當乏饗聖靈謂世祖之靈也乏饗不祀也郢州刺史安陸王子綏承子勛初檄欲攻廢帝言初檄者以别今此傳建康之檄聞廢帝已隕即解甲下標初起兵立標以募兵罷兵故下標既而聞江雍猶治兵江謂鄧琬雍謂袁顗雍於用翻治直之翻郢府行事茍卞之大懼郢州居江雍之間懼其夾攻以問罷兵之由即遣諮議領中兵參軍鄭景𤣥帥衆馳下并送軍糧帥讀曰率荆州行事孔道存奉刺史臨海王子頊㑹稽將佐奉太守尋陽王子房皆舉兵以應子勛㑹工外翻將即亮翻資治通鑑卷一百三十
