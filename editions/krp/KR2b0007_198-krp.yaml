  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百九十八宋司馬光撰胡三省音註唐紀十四起旃蒙大荒落六月盡著雍涒灘三月凡二年有竒太宗文武大聖大廣孝皇帝下之上貞觀十九年觀古玩翻六月丁酉李世勣攻白巖城西南上臨其西北城主孫代音濳遣腹心請降降户江翻下同臨城投刀鉞為信且曰奴願降城中有不從者上以唐幟與其使幟昌志翻使䟽吏翻曰必降者宜建之城上代音建幟城中人以為唐兵已登城皆從之上之克遼東也白巖城請降既而中悔上怒其反覆令軍中曰得城當悉以人物賞戰士言以其男女及財物為賞也李世勣見上將受其降帥甲士數十人請曰士卒所以爭冐矢石不顧其死者貪虜獲耳帥讀曰率下同冐莫北翻下同今城垂㧞奈何更受其降孤戰士之心觀世勣此言葢少年為盗之氣習未除耳上下馬謝曰將軍言是也然縱兵殺人而虜其妻孥孥音奴朕所不忍將軍麾下有功者朕以庫物賞之庶因將軍贖此一城世勣乃退得城中男女萬餘口上臨水設幄受其降仍賜之食八十以上賜帛有差他城之兵在白巖者悉慰諭給糧仗任其所之先是遼東城長史為部下所殺其省事奉妻子奔白巖省事吏職也自後魏以來有之賀㧞岳之攻尉遲菩薩也菩薩使省事傳語是也先悉薦翻省悉景翻上憐其有義賜帛五匹為長史造靈輿歸之平壤為于偽翻下自為彼為汝為當為同以白巖城為巖州以孫代音為刺史契苾何力瘡重契欺訖翻苾毘必翻上自為傅藥推求得刺何力者髙突勃付何力使自殺之何力奏稱彼為其主冐白刃刺臣乃忠勇之士也刺七亦翻與之初不相識非有怨讐遂捨之怨於元翻初莫離支遣加尸城七百人戍葢牟城李世勣盡虜之其人請從軍自效上曰汝家皆在加尸汝為我戰莫離支必殺汝妻子得一人之力而滅一家吾不忍也戊戍皆廩賜遣之己亥以葢牟城為葢州丁未車駕發遼東丙辰至安市城安市漢古縣屬遼東郡舊書薛仁貴傳作安地城進兵攻之丁巳髙麗北部耨薩延壽惠真帥髙麗靺鞨兵十五萬救安市後漢書東夷傳髙句麗有五族有消奴部絶奴部順奴部灌奴部桂婁部賢曰案今髙麗五部一曰内部一名黄部即桂婁部也二曰北部一名後部即絶奴部也三曰東部一名左部即順奴部也四曰南部一名前部即灌奴部也五曰西部一名右部即消奴部也據北史髙麗五部各有耨薩葢其酋長之稱也耨奴屋翻新書髙麗大城置耨薩一比都督也麗力知翻靺鞨音末曷上謂侍臣曰今為延壽䇿有三引兵直前連安市城為壘據髙山之險食城中之粟縱靺鞨掠吾牛馬攻之不可猝下欲歸則泥潦為阻坐困吾軍上䇿也若髙延壽出於上䇿不知太宗何以應之唯有江夏王道宗之計䇿耳㧞城中之衆與之宵遁中䇿也不度智能來與吾戰下䇿也度徒洛翻卿曹觀之必出下䇿成擒在吾目中矣髙麗有對盧年老習事東夷傳髙句麗置官有相加對盧沛者陳壽曰其置官有對盧則不置沛者有沛者則不置對盧薛居正曰髙麗官其大者號大對盧比一品總知國事對盧以下官總十一級列置州縣六十餘大城置耨薩比都督小城置運使比刺史謂延壽曰秦王内芟羣雄芟所銜翻外服戎狄獨立為帝此命世之材今舉海内之衆而來不可敵也為吾計者莫若頓兵不戰曠日持乆分遣竒兵斷其運道斷丁管翻糧食既盡求戰不得欲歸無路乃可勝也此即帝所謂上䇿也延壽不從引軍直進去安市城四十里上猶恐其低徊不至命左衛大將軍阿史那社爾將突厥千騎以誘之厥九勿翻騎竒寄翻誘音酉兵始交而偽走髙麗相謂曰易與耳競進乘之至安市城東南八里依山而陳易以䜴翻陳讀曰陣下為陳陳於布陳其陳同上悉召諸將問計長孫無忌對曰臣聞臨敵將戰必先觀士卒之情臣適行經諸營見士卒聞髙麗至皆㧞刀結斾喜形於色此必勝之兵也陛下未冠冠古玩翻身親行陣行户剛翻凡出竒制勝皆上禀聖謀諸將奉成算而已今日之事乞陛下指蹤以獵為喻指示獸蹤則狗得以追殺上笑曰諸公以此見讓朕當為諸公商度度徒洛翻乃與無忌等從數百騎乘髙望之觀山川形勢可以伏兵及出入之所髙麗靺鞨合兵為陳長四十里長直亮翻江夏王道宗曰髙麗傾國以拒王師平壤之守必弱願假臣精卒五千覆其本根則數十萬之衆可不戰而降上不應為上悔不用道宗䇿張本夏户雅翻遣使紿延壽曰我以爾國彊臣弑其主故來問罪至於交戰非吾本心入爾境芻粟不給故取爾數城俟爾國修臣禮則所失必復矣延壽信之不復設僃使䟽吏翻紿蕩亥翻復扶又翻上夜召文武計事命李世勣將歩騎萬五千陳於西嶺長孫無忌將精兵萬一千為竒兵自山北出於狹谷以衝其後上自將歩騎四千挾鼓角偃旗幟登北山上敕諸軍聞鼓角齊出奮擊因命有司張受降幕於朝堂之側降户江翻朝直遥翻行營僃宫省之制故亦有朝堂戊午延壽等獨見李世勣布陳勒兵欲戰上望見無忌軍塵起命作鼓角舉旗幟諸軍鼓譟並進延壽等大懼欲分兵禦之而其陳已亂㑹有雷電方合戰而雷電皆至龍門人薛仁貴龍門漢皮氏縣地後魏曰龍門縣并置龍門郡隋廢郡以縣屬蒲州唐武徳初為泰州治所貞觀十七年州廢屬綘州薛仁貴自編户應募著竒服大呼陷陳著陟略翻呼火故翻所向無敵髙麗兵披靡披普彼翻大軍乘之髙麗兵大潰斬首二萬餘級上望見仁貴召拜游擊將軍唐制武散階游擊將軍從五品下同仁貴安都之六世孫薛安都為將以勇聞於宋魏之間名禮以字行延壽等將餘衆依山自固上命諸軍圍之長孫無忌悉撤橋梁斷其歸路斷丁管翻己未延壽惠真帥其衆三萬六千八百人請降曰考異曰實錄云李勣奏向若陛下不自親行臣與道宗將數萬人攻安市城未克延壽等十餘萬抽戈齊至城内兵士復應開門而出臣救首救尾旋踵即敗必為延壽等縳送向平壤為莫離支所笑今日臣敢謝陛下性命恩澤帝素狎勣笑而領之按勣後獨將兵取髙麗豈必太宗親行邪此非史官虚羙乃勣諛辭耳今不取入軍門膝行而前拜伏請命上語之曰東夷少年跳梁海曲至於摧堅决勝故當不及老人自今復敢與天子戰乎語牛倨翻少詩照翻復扶又翻下無復同皆伏地不能對上簡耨薩以下酋長三千五百人授以戎秩遷之内地酋慈由翻長知兩翻餘皆縱之使還平壤皆䨇舉手以顙頓地歡呼聞數十里外聞音問收靺鞨三千三百人悉阬之以靺鞨犯陣也獲馬五萬匹牛五萬頭鐵甲萬領佗器械稱是稱尺證翻髙麗舉國大駭後黄城銀城皆自㧞遁去數百里無復人煙上驛書報太子仍與髙士亷等書曰朕為將如此何如史言太宗有矜功之心將即亮翻更名所幸山曰駐驆山據舊史其山本名六山更工衡翻秋七月辛未上徙營安市城東嶺己卯詔標識戰死者尸識音志俟軍還與之俱歸戊子以髙延壽為鴻臚卿臚陵如翻髙惠直為司農卿張亮軍過建安城下壁壘未固士卒多出樵牧髙麗兵奄至軍中駭擾亮素怯踞胡床直視不言將士見之更以為勇總管張金樹等鳴鼓勒兵擊髙麗破之八月甲辰候騎獲莫離支諜者髙竹離反接詣軍門反接兩手縳之也騎竒寄翻諜逹恊翻下同上召見解縳問曰何瘦之甚對曰竊道間行間古莧翻下同不食數日矣命賜之食謂曰爾為謀宜速反命為我寄語莫離支語牛倨翻下語爾同欲知軍中消息可遣人徑詣吾所何必間行辛苦也竹離徒跣上賜屩而遣之屩居灼翻草履也丙午徙營於安市城南上在遼外凡置營但明斥候不為塹壘雖逼其城髙麗終不敢出為冦抄塹七艶翻軍士單行野宿如中國焉史言帝威懾絶域所謂善師者不陳上之伐髙麗也薛延陀遣使入貢使䟽吏翻上謂之曰語爾可汗可從刋入聲汗音寒今我父子東征髙麗汝能為㓂宜亟來真珠可汗惶恐遣使致謝且請發兵助軍上不許及髙麗敗於駐驆山莫離支使靺鞨說真珠啗以厚利真珠懾服不敢動說輸芮翻啗徒覽翻又徒濫翻懾之渉翻者考異曰實録上謂近臣曰以我量之延陀其死矣聞莫能測按太宗雖明安能料薛延陀之死今不取九月壬申真珠卒卒子恤翻上為之發哀為于偽翻初真珠請以其庶長子曵莽為突利失可汗居東方統雜種長知兩翻種章勇翻嫡子㧞灼為肆葉䕶可汗居西方統薛延陀詔許之皆以禮冊命曵莾性躁擾躁則到翻輕用兵與㧞灼不恊真珠卒來㑹䘮既葬曵莾恐㧞灼圖已先還所部㧞灼追襲殺之自立為頡利俱利薛沙多彌可汗為薛延陀亂亡張本上之克白巖也謂李世勣曰吾聞安市城險而兵精其城主材勇莫離支之亂城守不服莫離支擊之不能下因而與之建安兵弱而糧少少詩沼翻若出其不意攻之必克公可先攻建安建安下則安市在吾腹中此兵法所謂城有所不攻者也孫子兵法之言對曰建安在南安市在北吾軍糧皆在遼東今踰安市而攻建安若賊斷吾運道將若之何斷丁管翻不如先攻安市安市下則鼓行而取建安耳上曰以公為將将即亮翻安得不用公䇿勿誤吾事世勣遂攻安市安市人望見上旗葢輙乘城鼓譟上怒世勣請克城之日男女皆阬之安市人聞之益堅守攻乆不下髙延壽髙惠真請於上曰奴既委身大國不敢不獻其誠欲天子早成大功奴得與妻子相見安市人顧惜其家人自為戰未易猝㧞易以豉翻今奴以髙麗十餘萬衆望旗沮潰沮在吕翻國人膽破烏骨城耨薩老耄不能堅守移兵臨之期至夕克其餘當道小城必望風奔潰然後收其資糧鼓行而前平壤必不守矣羣臣亦言張亮兵在沙城沙城即卑沙城召之信宿可至乘髙麗兇懼兇許拱翻倂力㧞烏骨城度鴨緑水直取平壤在此舉矣上將從之獨長孫無忌以為天子親征異於諸將不可乘危徼幸徼古堯翻今建安新城之虜衆猶十萬若向烏骨皆躡吾後不如先破安市取建安然後長驅而進此萬全之䇿也上乃止太宗之定天下多以出竒取勝獨遼東之役欲以萬全制敵所以無功諸軍急攻安市上聞城中雞彘聲謂李世勣曰圍城積乆城中煙火日㣲今雞彘甚喧此必饗士欲夜出襲我宜嚴兵僃之是夜髙麗數百人縋城而下縋馳偽翻上聞之自至城下召兵急擊斬首數十級髙麗退走江夏王道宗督衆築土山於城東南隅浸逼其城城中亦増髙其城以拒之士卒分畨交戰日六七合衝車礮石壊其樓堞礮與砲同匹貌翻壤音怪城中隨立木栅以塞其缺道宗傷足上親為之針塞悉則翻為于偽翻築山晝夜不息凡六旬用功五十萬山頂去城數丈下臨城中道宗使果毅𫝊伏愛將兵屯山頂以僃敵山頺壓城城崩㑹伏愛私離所部離力智翻髙麗數百人從城缺出戰遂奪據土山塹而守之塹士艶翻上怒斬伏愛以狥命諸將攻之三日不能克道宗徒跣詣旗下請罪上曰汝罪當死但朕以漢武殺王恢見十八卷元光二年不如秦穆用孟明秦穆公使孟明帥師東伐再為晉師所敗穆公復用孟明孟明増修其政帥師伐晉晉人不敢出遂覇西戎且有破葢牟遼東之功故特赦汝耳上以遼左早寒草枯水凍士馬難乆留且糧食將盡癸未勑班師先㧞遼葢二州户口渡遼乃耀兵於安市城下而旋城中皆屏跡不出屏必郅翻城主登城拜辭上嘉其固守賜縑百匹縑幷絲繒也以勵事君命李世勣江夏王道宗將歩騎四萬為殿殿丁練翻乙酉至遼東丙戍度遼水遼澤泥潦車馬不通命長孫無忌將萬人翦草填道水深處以車為梁上自繫薪於馬鞘以助役将即亮翻鞘所交翻鞭鞘也按孔頴逹禮記正義曰弓頭為鞘此所謂馬鞘葢馬鞍頭也冬十月丙申朔上至蒲溝駐馬督填道諸軍度渤錯水蒲溝渤錯水皆在遼澤中暴風雪士卒沾濕多死者勑然火於道以待之凡征髙麗㧞𤣥莵横山葢牟磨米遼東白巖卑沙麥谷銀山後黄十城莵同都翻磨莫臥翻徙遼葢巖三州户口入中國者七萬人七考異曰實録上云徙三州户口入内地者前後萬人下癸丑詔書云獲户十萬口十有八萬葢并不徙者言之耳新城建安駐驆三大戰斬首四萬餘級戰士死者㡬二千人㡬音祁近也戰馬死者什七八上以不能成功深悔之歎曰魏徴若在不使我有是行也命馳驛祀徴以少牢少詔照翻復立所製碑踣碑見上卷十七年召其妻子詣行在勞賜之勞力到翻丙午至營州營州至洛陽二千九百一十里詔遼東戰亡士卒骸骨並集柳城東南命有司設太牢上自作文以祭之臨哭盡哀其父母聞之曰吾兒死而天子哭之死何所恨上謂薛仁貴曰朕諸將皆老思得新進驍勇者將之將即亮翻驍堅堯翻無如卿者朕不喜得遼東喜得卿也丙辰上聞太子奉迎將至從飛騎三千人馳入臨渝闗漢遼西郡有臨渝縣唐志營州有渝闗守捉城杜佑曰臨渝闗在平州盧龍縣城東百八十里騎竒寄翻師古曰渝音喻道逢太子上之發定州也指所御褐袍謂太子曰俟見汝乃易此袍耳在遼左雖盛暑流汗弗之易及秋穿敗左右請易之上曰軍士衣多弊吾獨御新衣可乎至是太子進新衣乃易之諸軍所虜髙麗民萬四千口先集幽州將以賞軍士上愍其父子夫婦離散命有司平其直悉以錢布贖為民讙呼之聲三日不息讙許爰翻十一月辛未車駕至幽州髙麗民迎於城東拜舞呼號號户髙翻宛轉於地塵埃彌望庚辰過易州境司馬陳元璹使民於地室蓄火種蔬而進之上惡其諂免元璹官璹殊玉翻惡烏路翻丙戍車駕至定州丁亥吏部尚書楊師道坐所署用多非其才左遷工部尚書壬辰車駕發定州十二月辛丑上病癰御歩輦而行戊申至并州太子為上吮癰扶輦歩從者數日為于偽翻吮徐兖翻從才用翻辛亥上疾瘳百官皆賀廖丑留翻上之征髙麗也使右領軍大將軍執失思力將突厥屯夏州之北以僃薛延陀力將即亮翻下同夏户雅翻薛延陀多彌可汗既立以上出征未還引兵寇河南河南者北河之南即朔方新秦之地上遣左武候中郎將長安田仁㑹與思力合兵擊之思力嬴形偽退誘之深入及夏州之境整陳以待之嬴倫為翻誘音酉陳讀曰陣薛延陀大敗追奔六百餘里耀威磧北而還磧七迹翻還從宣翻又如字還考異曰髙宗實録云㑹延陀死耀威漠北而其意指真珠為延陀也按真珠憚太宗威靈不敢入寇又死在九月而此云冬來寇必非真珠也田仁㑹傳作十八年亦誤也多彌復發兵寇夏州復扶又翻己未敕禮部尚書江夏王道宗發朔并汾箕嵐代忻蔚雲九州兵鎮朔州武徳三年分并州之樂平遼山平城石艾置遼州樂平郡八年改曰箕州後周置蔚州於漢代郡之靈丘隋廢州以靈丘縣屬肆州唐武徳六年分肆州之靈丘易州之飛狐地置蔚州雲州雲中郡貞觀十四年自朔州北定襄城徙治定襄縣其地寔隋馬邑郡之雲内縣恒安鎮即後魏所都平城也開元十八年改定襄縣為雲中縣蔚紆勿翻右衛大將軍代州都督薛萬徹左驍衛大將軍阿史那社爾發勝夏銀綏丹延鄜坊石隰十州兵鎮勝州勝州隋之榆林郡後魏舊有銀州隋廢為儒林縣屬綏州貞觀二年分綏州之儒林真鄉縣復置銀州銀川郡漢西河之圁隂圁陽縣地也圁音銀杜祐曰銀州春秋白狄地治儒林縣漢圁隂縣地丹州古孟門河西之地西魏置汾州義川郡後改州為丹州隋廢州及郡以義川縣屬延州義寧元年分延州之義川咸寕汾川置丹州咸寧郡坊州春秋白狄之地姚興置中部縣後魏置中部郡隋廢郡以中部縣屬敷州武徳二年分鄜州置坊州中部郡以周天和七年元皇帝放牧鄜州於此置馬坊也鄜音膚勝州都督宋君明左武候將軍薛孤吳發靈原寧鹽慶五州兵鎮靈州西魏於五原置西安州後改為鹽川隋廢州為鹽川郡貞觀二年復置鹽州又令執失思力發靈勝二州突厥兵與道宗等相應薛延陀至塞下知有僃不敢進初上留侍中劉洎輔皇太子於定州仍兼左庶子檢校民部尚書總吏禮户部三尚書事劉洎既檢校民部尚書又總吏禮是為三尚書事民部之外安得復有户部哉唐六典貞觀二十三年始改民部為户部洎其冀翻上將行謂洎曰我今逺征爾輔太子安危所寄宜深識我意對曰願陛下無憂大臣有罪者臣謹即行誅上以其言妄發頗怪之戒曰卿性踈而太徤必以此敗深宜慎之及上不豫洎從内出色甚悲懼謂同列曰疾勢如此聖躬可憂或譛於上曰洎言國家事不足憂但當輔幼主行伊霍故事大臣有異志者誅之自定矣上以為然因洎於上前先有誅有罪大臣之言遂信譛者之言為然庚申下詔稱洎與人竊議窺窬萬一謀執朝衡自處伊霍朝直遥翻處昌吕翻猜忌大臣皆欲夷戮宜賜自盡賜自盡即賜死也令自盡其命奏考異曰實録云黄門侍郎褚遂良誣之曰國家之事不足慮也正當輔少主行伊霍大臣有異志者誅之自然定矣太宗疾愈詔問其故洎以實對遂良執證之不已洎引中書令馬周以自明太宗問周周對與洎所陳不異帝以詰遂良又證周諱之洎遂及罪按此事中人所不為遂良忠直之臣且素無怨仇何至如此蓋許敬宗惡遂良故修實録時以洎死歸咎於遂良耳今不取免其妻孥孥音奴中書令馬周攝吏部尚書以四時選為勞四時選始一百九十二卷元年選須絹翻請復以十一月選至三月畢從之復扶又翻是歲右親衛中郎將裴行方六典曰隋氏左右親衛左右勲衛左右翊衛各置開府一人武徳七年改開府各置中郎將一人正四品下掌各領其屬以宿衛而各總其府事將即亮翻討茂州叛羌黄郎弄大破之貞觀八年改㑹州汶山郡曰茂州取界内茂滋山為名後書冉駹其山有六夷七羌九氏各部落窮其餘黨西至乞習山臨弱水而歸蜀之西山有弱水二十年春正月辛未夏州都督喬師望右領軍大將軍執失思力等擊薛延陀大破之虜獲二千餘人多彌可汗輕騎遁去騎竒寄翻部内騷然矣丁丑遣大理卿孫伏伽等二十二人以六條廵察四方用漢六條也刺史縣令以下多所貶黜其人詣闕稱寃者前後相屬屬之欲翻上令褚遂良類狀以聞上親臨决以能進擢者二十人以罪死者七人流以下除免者數百千人二月乙未上發并州三月己巳車駕還京師并州至京師一千三百六十里上謂李靖曰吾以天下之衆困於小夷何也靖曰此道宗所解觧户買翻上顧問江夏王道宗具陳在駐驆時乘虚取平壤之言上悵然曰當時匆匆吾不憶也是役也不唯不用乘虚取平壤之䇿乘勝取烏骨之䇿亦不用也上疾未全平欲專保養庚午詔軍國機務並委皇太子處决於是太子間日聼政於東宫既罷則入侍藥膳不離左右處昌吕翻間古莧翻離力智翻上命太子暫出遊觀太子辭不願出上乃置别院於寢殿側使太子居之褚遂良請遣太子旬日一還東宫與師傅講道義從之上嘗幸未央宫辟仗已過辟仗者衛士在駕前攘辟左右止行人所謂陳兵清道而後行也辟音闢忽於草中見一人帶横刀横刀者用皮襻帶之刀横於掖下詰之詰去吉翻曰聞辟仗至懼不敢出辟仗者不見遂伏不敢動上遽引還顧謂太子茲事行之則數人當死汝於後逹縱遣之又嘗乘腰輿腰輿令人舉之其髙至腰有三衛誤拂御衣親衛勲衛翊衛謂之三衛其人懼色變上曰此間無御史吾不汝罪也陜人常惪𤣥告刑部尚書張亮養假子五百人與術士公孫常語云名應圖䜟陜失冉翻䜟楚譛翻又問術士程公頴曰吾臂有龍鱗起欲舉大事可乎上命馬周等按其事亮辭不服上曰亮有假子五百人養此軰何為正欲反耳命百官議其獄皆言亮反當誅獨將作少匠李道裕言亮反形未具将作少匠從四品下罪不當死上遣長孫無忌房𤣥齡就獄與亮訣曰法者天下之平與公共之公自不謹與凶人徃還陷入於法今將奈何公好去好去者與之决别之辭己丑亮與公潁俱斬西市籍沒其家歲餘刑部侍郎缺上命執政妙擇其人擬數人皆不稱㫖既而曰朕得其人矣徃者李道裕議張亮獄云反形未具此言當矣稱尺證翻當丁浪翻朕雖不從至今悔之遂以道裕為刑部侍郎閏月癸巳朔日有食之戊戍罷遼州都督府及巖州伐髙麗所得二州夏四月甲子太子太保蕭瑀解太保仍同中書門下三品五月甲寅髙麗王藏及莫離支葢金遣使謝罪使䟽吏翻下同并獻二羙女上還之金即蘇文也六月丁卯西突厥乙毗射匱可汗遣使入貢且請昏上許之且使割龜茲于闐踈勒朱俱波蔥嶺五國以為聘禮于闐時兼有漢戎廬扞彌渠勒皮山五國故地踈勒在蔥嶺東北判汗國治葱嶺中都城杜佑曰朱俱波亦曰朱俱槃漢子合國也去踈勒八九百里薛延陀多彌可汗性褊急猜忌無恩廢弃父時貴臣專用已所親昵昵尼質翻國人不附多彌多所誅殺人不自安回紇酋長吐迷度與僕骨同羅共擊之紇下沒翻酋慈由翻長知兩翻多彌大敗乙亥詔以江夏王道宗左衛大將軍阿史那社爾為瀚海安撫大使又遣右領衛大將軍執失思力將突厥兵右驍衛大將軍契苾何力將凉州及胡兵代州都督薛萬徹營州都督張儉各將所部兵分道並進以擊薛延陀上遣校尉宇文法詣烏羅䕶靺鞨烏羅䕶直京師東北六千里一日烏羅渾即後魏之烏洛侯也東鄰靺鞨大抵風俗皆靺鞨也将即亮翻驍堅堯翻契欺訖翻苾毘必翻校户教翻靺鞨音未曷遇薛延陀阿波設之兵於東境法帥靺鞨擊破之薛延陀國中驚擾曰唐兵至矣諸部大亂多彌引數千騎奔阿史悳時健部落頡利滅李靖徙突厥嬴破數百帳於雲中以阿史徳為之長衆稍盛迴紇攻而殺之并其宗族殆盡遂據其地諸俟斤互相攻擊爭遣使來歸命俟渠之翻薛延陀餘衆西走猶七萬餘口共立真珠可汗兄子咄摩支為伊特勿失可汗歸其故地尋去可汗之號咄當沒翻去羌呂翻遣使奉表請居欝督軍山之北使兵部尚書崔敦禮就安集之敕勒九姓酋長以其部落素服薛延陀種聞咄摩支來皆恐懼朝議恐其為磧北之患乃更遣李世勣與九姓勑勒共圖之上戒世勣曰降則撫之叛則討之種草勇翻朝直遥翻磧七迹翻降户江翻下同考異曰舊李勣𫝊云詔勣以二百騎發突厥兵討擊今從鐵勒傳己丑上手詔以薛延陀破滅其勑勒諸部或來降附或未歸服今不乘機恐貽後悔朕當自詣靈州招撫其去歲征遼東兵皆不調發調徒釣翻時太子當從行少詹事張行成上䟽以為皇太子從幸靈州不若使之監國上時掌翻監古銜翻接對百寮明習庶政既為京師重鎮且示四方盛悳宜割私愛俯從公道上以為忠進位銀青光禄大夫李世勣至欝督軍山異考曰勣傳作烏徳揵山唐厯云即欝督軍山虜語兩音也鐵勒傳云至于天山今従唐厯其酋長梯真逹官帥衆來降帥讀曰率薛延陀咄摩支南奔荒谷世勣遣通事舍人蕭嗣業徃招慰咄摩支詣嗣業降其部落猶持兩端世勣縱兵追擊前後斬五千餘級虜男女三萬餘人秋七月咄摩支至京師拜右武衛大將軍八月甲子立皇孫忠為陳王己巳上行幸靈州江夏王道宗兵既渡磧遇薛延陀阿波逹官衆數萬拒戰道宗擊破之斬首千餘級追奔二百里道宗與薛萬徹各遣使招諭勑勒諸部其酋長皆喜頓首請入朝朝直遥翻庚午車駕至浮陽浮陽舊書作涇陽當從之涇陽縣前漢屬安定郡後漢晉省後魏屬隴東郡隋唐屬京兆杜佑曰京兆涇陽縣乃秦封涇陽君之地漢涇陽縣在今平凉郡界涇陽故城是此時車駕葢至京兆之涇陽迴紇㧞野古同羅僕骨多濫葛思結阿跌契苾跌結渾斛薛等十一姓各遣使入貢跌徒結翻𫝊考異曰舊回紇鐵勒作多覽葛今從實録及本紀唐厯又回紇𫝊陳彭年唐紀作斛薩鐵勤𫝊作解薛今從實録實録又有契丹奚云十三姓按契丹奚本非薛延陀所統又内附已乆嘗從征遼非至此乃降今從舊本紀稱薛延陁不事大國暴虐無道不能與奴等為主自取敗死部落鳥散不知所之奴等各有分地分扶問翻不從薛延陀去歸命天子願賜哀憐乞置官司養育奴等上大喜辛未詔回紇等使者宴樂頒賚拜官樂音洛賜其酋長璽書璽斯氏翻遣右領軍中郎將安永壽報使使䟽吏翻壬申上幸漢故甘泉宫甘泉宫在京兆雲陽縣界磨石嶺又曰磨盤嶺又曰車盤嶺元和志曰當其登山必自車箱阪而上阪在雲陽縣西北三十八里縈紆曲折單車財通上阪即平原宏敞樓觀相屬以其曲折故名詔以戎狄與天地俱生上皇並列流殃構禍乃自運初言戎狄之流殃構禍乃自唐興運之初也朕聊命偏師遂擒頡利始𢎞廟略已滅延陁鐵勒百餘萬户散處北溟處昌呂翻逺遣使人委身内屬請同編列並為州郡混元以降太極元氣函三為一混沌未分謂之混元殊未前聞宜僃禮告廟仍頒示普天庚辰至涇州丙戍踰隴山隴山時屬隴州汧源縣界至西瓦亭觀馬牧原州平髙縣南有瓦亭故闗瓦亭水出隴山東北斜趣西南流經成紀略陽顯親界又東南出新陽峽入于渭故有東西瓦亭之别九月上至靈州靈州在京師西北千二百五十里勑勒諸部俟斤遣使相繼詣靈州者數千人咸云願得天至尊為奴等天可汗子子孫孫常為天至尊奴死無所恨甲辰上為詩序其事曰雪耻酬百王除凶報千古公卿請勒石於靈州從之特進同中書門下三品宋公蕭瑀性狷介與同寮多不合狷吉縣翻嘗言於上曰房𤣥齡與中書門下衆臣朋黨不忠執權膠固陛下不詳知但未反耳上曰卿言得無大甚人君選賢才以為股肱心膂當推誠任之人不可以求僃必捨其所短取其所長朕雖不能聰明何至頓迷臧否乃至於是否音鄙瑀内不自得既數忤㫖數所角翻忤五故翻上亦銜之但以其忠直居多未忍廢也上嘗謂張亮曰卿既事佛何不出家瑀因自請出家上曰亦知公雅好桑門今不違公意好呼到翻瑀須臾復進曰復扶又翻臣適思之不能出家上以瑀對羣臣發言反覆尤不能平㑹稱足疾不朝或至朝堂而不入見上知瑀意終快怏冬十月手詔數其罪曰朝直遥翻見賢遍翻怏於兩翻數所具翻朕於佛教非意所遵求其道者未驗福於將來修其教者翻受辜於既徃至若梁武窮心於釋氏簡文銳意於法門傾帑藏以給僧袛殫人力以供塔廟帑他朗翻藏徂浪翻袛巨支翻事並見梁紀及乎三淮沸浪三淮本之詩淮有三洲五嶺騰煙謂侯景既亂而蕭勃元蘭又復亂於嶺南也假餘息於熊蹯引殘魂於雀鷇熊蹯楚成王事雀鷇趙武靈王事引以喻梁武餓死於䑓城蹯音煩鷇苦侯翻子孫覆亡而不暇社稷俄頃而為墟報施之徵何其謬也施式豉翻瑀踐覆車之餘軌襲亡國之遺風弃公就私未明隐顯之際身俗口道莫辨邪正之心修累葉之殃源祈一躬之福本上以違忤君主下則扇習浮華自請出家尋復違異復扶又翻一迴一惑在乎瞬息之間自可自否變於帷扆之所帷扆之所謂天子朝羣臣之所乖棟梁之體豈具曕之量乎朕隐忍至今瑀全無悛改悛丑縁翻可商州刺史商州漢𢎞農上洛商縣地晉置上洛郡後魏置洛州後周改商州京師至商州二百八十一里仍除其封上自髙麗還葢蘇文益驕恣雖遣使奉表其言率皆詭誕又待唐使者倨慢常窺伺邊隙屢勑令勿攻新羅而侵陵不止壬申詔勿受其朝貢更議討之使䟽吏翻伺相吏翻朝直遥翻丙戌車駕還京師冬十月己丑上以幸靈州徃還冒寒疲頓欲於歲前專事保攝十一月己丑詔祭祀表䟽胡客兵馬宿衛行魚契給驛祭祀謂郊廟社稷明堂也表䟽在朝羣臣及四方所上者胡客四夷朝貢之客兵馬調遣征伐及畨上宿衛者也符寳郎掌天子八寳及國之符節辨其所用有事則請之於内既事則奉而藏之藏其左而班其右以合中外之契一曰銅魚符所以起軍旅易守長二曰𫝊符所以給郵驛通制命三曰隨身魚符所以明貴賤應徵召四曰木契所以重鎮守慎出納五曰旌節所以委良能假賞罰魚符之制王畿之内左三右一王畿之外左五右一左者在内右者在外行用之日從第一為首後事須用以次發之周而復始大事兼敕書小事但降符函封遣使合而行之𫝊符之制太子監國曰雙龍符左右各十京都留守曰麟符左二十其右一十有九東方曰青龍符西方曰騶虞符南方曰朱雀符北方曰𤣥武符左四右三左者進内右者付外隨身符之制左二右一太子以玉親王以金庶官以銅佩以為飾刻姓名者去官而納焉不刻者𫝊而佩之木契之制太子監國則王畿之内左右各三王畿之外左右各五庶官鎮守則左右各十旌節之制命大将帥及遣使於四方則請而假之旌以專賞節以專殺授五品以上官及除解决死罪皆以聞餘並取皇太子處分處昌吕翻分扶問翻十二月己丑羣臣累請封禪從之詔造羽衛送洛陽宫戊寅迴紇俟利發吐迷度僕骨俟利發歌濫㧞延多濫葛俟斤末㧞野古俟利發屈利失同羅俟利發時徤啜思結酋長烏碎及渾斛薛奚結阿跌契苾白霫酋長皆來朝庚辰上賜宴於芳蘭殿按閣本大明宮圖𤣥武門右𤣥武殿後有紫蘭殿大樂宴胡客率引入𤣥武門今此芳蘭殿豈紫蘭殿邪命有司每五日一會癸未上謂長孫無忌等曰今日吾生日世俗皆為樂樂音洛下宴樂同在朕翻成傷感今君臨天下富有四海而承歡膝下永不可得此子路所以有負米之恨也家語子路見孔子曰㫺由事二親之時常食藜藿之實為親負米百里之外親沒之後南游於楚後車百乘積粟萬鍾累茵而坐列鼎而食願欲食藜藿為親負米不可得也子曰由也事親可謂生事盡力死事盡思者也詩云哀哀父母生我劬勞詩蓼莪之辭奈何以劬勞之日更為宴樂乎因泣數行下行户剛翻左右皆悲房𤣥齡嘗以㣲譴歸第褚遂良上䟽以為𤣥齡自義旗之始翼賛聖功謂謁見於軍門署為記室時也上時掌翻武悳之季冐死决䇿謂誅建成元吉時也貞觀之初選賢立政謂遜直於王魏在朝文武隨能收叙也觀古玩翻人臣之勤𤣥齡為最自非有罪在不赦搢紳同尤不可遐弃陛下若以其衰老亦當諷諭使之致仕退之以禮不可以淺鮮之過鮮少也鮮息淺翻弃數十年之勲舊上遽召出之頃之𤣥齡復避位還家復扶又翻乆之上幸芙蓉園芙蓉園在京城東南隅秦之隑州漢之樂遊苑唐之曲江同此地也長安志曰隋營宫城宇文愷以其地在京城東南隅地髙不便故闕此地不為居人坊巷而鑿之為池以厭勝之又㑹黄渠水自城外南来入城為芙蓉池且為芙蓉園也劉餗小説曰園本古曲江文帝惡其名曲改曰芙蓉為其水盛而芙蓉富也𤣥齡勑子弟汛掃門庭曰乘輿且至乗繩證翻有頃上果幸其第因載𤣥齡還宫二十一年春正月開府儀同三司申文獻公髙士亷疾篤辛卯上幸其第流涕與訣壬辰薨上將徃哭之房𤣥齡以上疾新愈固諌上曰髙公非徒君臣兼以故舊姻戚髙士亷長孫后之母舅也士亷識帝於龍濳因以甥女妻帝豈得聞其䘮不徃哭乎公勿復言復扶又翻帥左右自興安門出按六典大明宫南面五門次西曰興安門但貞觀以前人主常居太極宫髙宗龍朔之後方居大明宫然此時已營永安宫永安即大明也或者帝自永安宫而出興安門歟按舊書髙士亷傳上出興安門至延喜門長孫無忌迎諌馬首延喜門直皇城之東北隅而興安門直大明宫城之西南隅由大明之興安門至皇城之延喜門其路迂且逺意太極宫中别自有興安門也帥讀曰率長孫無忌在士亷䘮所聞上將至輟哭迎諫於馬首曰陛下餌金石於方不得臨䘮奈何不為宗廟蒼生自重為于偽翻且臣舅臨終遺言深不欲以北首夷衾輙屈鑾駕死者北首夷衾覆尸之衾鄭氏曰夷之言尸也尸之槃曰夷槃床曰夷牀衾曰夷衾移尸曰夷于堂皆依尸而為言者也首式又翻上不聼無忌中道伏臥流涕固諫上乃還入東苑南望而哭涕下如雨及柩出横橋長安故城横門外有橋曰横橋柩音舊横音光上登長安故城西北樓望之慟哭丙申詔以迴紇部為瀚海府僕骨為金㣲府曰考異舊書作金微今從實録唐厯多濫葛為燕然府㧞野古為幽陵府同羅為龜林府思結為盧山府府者都督府也燕因肩翻渾為臯蘭州斛薛為髙闕州奚結為雞鹿州阿跌為雞田州契苾為榆溪州思結别部為蹛林州白霫為寘顔州蹛音帶寘徒年翻各以其酋長為都督刺史各賜金銀繒帛及錦袍繒慈陵翻勑勒大喜捧戴歡呼拜舞宛轉塵中及還上御天成殿宴設十部樂而遣之諸酋長奏稱臣等既為唐民徃來天至尊所如詣父母請於迴紇以南突厥以北開一道謂之參天可汗道置六十八驛各有馬及酒肉以供過使使䟽吏翻歲貢貂皮以充租賦仍請能屬文人屬之欲翻使為表䟽䟽所去翻上皆許之於是北荒悉平然迴紇吐迷度己私自稱可汗官號皆如突厥故事丁酉詔以明年仲春有事泰山禪社首應劭曰社首山在漢泰山郡博縣晉灼曰山在鉅平縣南十二里唐志兖州博城縣有社首山餘並依十五年議二月丁丑太子釋奠于國學上將復伐髙麗復扶又翻朝議以為髙麗依山為城攻之不可猝㧞朝直遥翻前大駕親征國人不得耕種所克之城悉收其榖繼以旱災民太半乏食今若數遣偏師更迭擾其疆埸數所角翻更工衡翻場音亦使彼疲於奔命釋耒入堡耒廬對翻數年之間千里蕭條則人心自離鴨緑之北可不戰而取矣上從之三月以左武衛大將軍牛進逹為青丘道行軍大總管相如子虗賦曰夫齊東陼鉅海觀乎成山射乎之罘秋獵乎青丘彷徨乎海外服䖍曰青丘國在海東三百里晉天文志有青丘七星在軫東南蠻夷之國也右武候將軍李海岸副之發兵萬餘人乘樓舩自萊州汎海而入又以太子詹事李世勣為遼東道行軍大總管右武衛將軍孫貳朗等副之將兵三千人將即亮翻因營州都督府兵自新城道入兩軍皆選習水善戰者配之辛卯上曰朕於戎狄所以能取古人所不能取臣古人所不能臣者皆順衆人之所欲故也㫺禹帥九州之民鑿山槎木帥讀曰率槎士下翻逆斫木也䟽百川注之海其勞甚矣而民不怨者因人之心順地之勢與民同利故也是月上得風疾苦京師盛暑夏四月乙丑命修終南山太和廢宫為翠㣲宫楊大年曰翠㣲宫在驪山絶頂丙寅置燕然都䕶府統瀚海等六都督臯蘭等七州六都督七州並見上新書曰置燕府都䕶府於右單于䑓宋白曰在西受降城東南四十里以揚州都督府司馬李素立為之素立撫以恩信夷落懐之共率馬牛為獻素立唯受其酒一盃餘悉還之五月戊子上幸翠㣲宫冀州進士張昌齡獻翠㣲宫頌上愛其文命於通事舍人裏供奉資格淺不得除正官命於通事舍人班裏供奉初昌齡與進士王公治皆善屬文名振京師考功貟外郎王師旦知貢舉屬之欲翻唐初以考功員外郎知貢舉至開元間考功員外郎李昻為舉人詆訶帝以員外郎望輕遂移貢舉於禮部以侍郎主之禮部選士自此始黜之舉朝莫曉其故及奏第上怪無二人名詰之朝直遥翻詰去吉翻師旦對曰二人雖有辭華然其體輕薄終不成令器若置之髙第恐後進效之傷陛下雅道上善其言壬辰詔百司依舊啓事皇太子庚辰上御翠㣲殿翠㣲宫之正殿也問侍臣曰自古帝王雖平定中夏不能服戎狄夏户雅翻朕才不逮古人而成功過之自不諭其故諸公各率意以實言之羣臣皆稱陛下功悳如天地萬物不得而名言上曰不然朕所以能及此者止由五事耳自古帝王多疾勝己者朕見人之善若己有之人之行能不能兼僃行下孟翻朕常弃其所短取其所長人主徃徃進賢則欲寘諸懐退不肖則欲推諸壑推吐雷翻朕見賢者則敬之不肖者則憐之賢不肖各得其所人主多惡正直惡烏路翻隂誅顯戮無代無之朕踐祚以來正直之士比肩於朝未嘗黜責一人朝直遥翻自古皆貴中華賤夷狄朕獨愛之如一故其種落皆依朕如父母種章勇翻此五者朕所以成今日之功也顧謂褚遂良曰公嘗為史官褚遂良嘗知起居注十八年拜黄門侍郎參縂朝政不復兼史職故曰嘗如朕言得其實乎對曰陛下盛悳不可勝載勝音升獨以此五者自與葢謙謙之志耳李世勣軍既渡遼厯南蘇等數城前漢書𤣥莵郡髙句驪縣有南蘇水西北經塞外髙麗多背城拒戰背蒲妹翻世勣擊破其兵焚其羅郭而還還從宣翻又如字六月癸亥以司徒長孫無忌領揚州都督實不之任丁丑詔以隋末䘮亂䘮息浪翻邊民多為戎狄所掠今鐵勒歸化宜遣使詣燕然等州使䟽吏翻下同燕因肩翻與都督相知訪求沒落之人贖以貨財給糧逓還本貫其室韋烏羅䕶靺鞨三部人為薛延陀所掠者亦令贈還癸未以司農卿李緯為户部尚書緯于貴翻時房𤣥齡留守京師守手又翻有自京師來者上問𤣥齡何言對曰𤣥齡聞李緯拜尚書但云李緯羙髭鬢髭郎移翻帝遽改除緯洛州刺史改考異曰唐厯云居無何緯太子詹事今從舊𫝊秋七月牛進逹李海岸入髙麗境凡百餘戰無不㨗攻石城㧞之進至積利城下髙麗兵萬餘人出戰海岸擊破之斬首二千級上以翠㣲宫險隘不能容百官庚子詔更營玉華宫於宜春之鳯皇谷玉華宫在宜春縣西四十里庚戌車駕還宫還從宣翻又音如字八月壬戌詔以薛延陀新降土功屢興降户江翻屢力句翻又音如字加以河北水災停明年封襌辛未骨利幹遣使入貢丙戍以骨利幹為𤣥闕州拜其俟斤為刺史使䟽吏翻俟渠之翻骨利幹於鐵勒諸部為最逺晝長夜短日沒後天色正曛煑羊脾適熟日已復出矣骨利幹居瀚海北産良馬其地北距海至京師最逺又北渡海則晝長夜短蓋近日出處復扶又翻考異曰實録唐厯皆作羊脾僧一行大衍厯義及舊天文志唐統紀皆作脾新天文志云胹羊髀按正言羊脾者取其易熟故也若煮羊肺及髀則雖中國通夕亦未爛矣今從大衍厯義己丑齊州人叚志冲上封事上時掌翻請上致政於皇太子太子聞之憂形於色發言流涕長孫無忌等請誅志冲長知兩翻上手詔曰五岳陵霄四海亘地納汙藏疾無損髙深左𫝊云川澤納汙山林藏疾亘吉鄧翻志冲欲以匹夫解位天子言欲使天子解位也朕若有罪是其直也若其無罪是其狂也譬如尺霧障天不虧於大寸雲㸃日何損於明丁酉立皇子明為曹王明母楊氏巢刺王之妃也有寵於上刺盧逹翻文徳皇后之崩也欲立為皇后魏徵諌曰陛下方比徳唐虞奈何以辰嬴自累左𫝊晉太子圉為質於秦秦穆公以女妻子圉將逃歸謂之曰與子歸乎嬴氏不敢從圉遂逃歸及晉公子重耳入秦秦穆公納女五人懐嬴與焉謂之辰嬴賈季曰辰嬴嬖於二君是也累力瑞翻乃止尋以明繼元吉後戊戍勅宋州刺史王波利等發江南十二州工人造大船數百艘欲以征髙麗十二州宣潤常蘇湖杭越台㜈括睦洪也艘蘇遭翻麗力知翻冬十月庚辰奴刺啜匐俟友帥其所部萬餘人内附奴刺部落居吐谷渾党項之間刺來逹翻啜陟劣翻匐蒲北翻俟渠之翻帥讀曰率下同十一月突厥車鼻可汗遣使入貢車鼻名斛勃本突厥同族世為小可汗頡利之敗突厥餘衆欲奉以為大可汗時薛延陁力强車鼻不敢當帥其衆歸之或說薛延陁車鼻貴種有勇略説輸芮翻種章勇翻為衆所附恐為後患不如殺之車鼻知之逃去薛延陁遣數千騎追之騎竒寄翻車鼻勒兵與戰大破之乃建牙於金山之北其地三垂斗絶惟一面可容車騎壤土夷博自稱乙注車鼻可汗突厥餘衆稍稍歸之數年間勝兵三萬人勝音升時出抄掠薛延陁抄楚交翻及薛延陁敗車鼻埶益張張知亮翻遣其子沙鉢羅特勒入見見賢遍翻又請身自入朝朝直遥翻下同詔遣將軍郭廣敬徵之車鼻特為好言初無來意竟不至軍考異曰實録詔遣雲麾將安調遮右屯衛郎將韓華迎之車鼻徒飾其辭初無來意韓華将招歌邏禄其刦之車鼻覺其謀華與車鼻子陟苾特勒相射而死調遮亦被殺今從舊突厥𫝊癸卯徙順陽王泰為濮王濮博木翻壬子上疾愈三日一視朝十二月壬申西趙酋長趙磨帥萬餘户内附以其地為明州東謝之南有西趙蠻西抵昆明南即西洱河山宂阻深趙氏世為酋長酋慈由翻長知兩翻龜茲王伐疊卒弟訶黎布失畢立龜茲音丘茲訶虎何翻浸失臣禮侵漁鄰國上怒戊寅詔使持節崑丘道行軍大總管自古相𫝊西域有崑崙山河源所出又爾雅曰三城為崑崙丘故曰崑丘道使䟽吏翻左驍衛大將軍阿史那社爾副大總管左驍衛大將軍契苾何力安西都䕶郭孝恪等將兵擊之仍命鐵勒十三州突厥吐蕃吐谷渾連兵進討驍堅堯翻契欺訖翻苾毘必翻将即亮翻吐從暾入聲谷音浴髙麗王使其子莫離支任武入謝罪上許之二十二年春正月己丑上作帝範十二篇以賜太子曰君體建親求賢審官納諫去䜛戒盈崇儉賞罰務農閲武崇文去羌吕翻且曰修身治國僃在其中治直之翻一旦不諱更無所言矣又曰汝當更求古之哲王以為師如吾不足法也夫取法於上僅得其中取法於中不免為下吾居位已來不善多矣錦繡珠玉不絶於前宫室䑓榭屢有興作犬馬鷹隼無逺不致隼息尹翻行遊四方供頓煩勞此皆吾之深過勿以為是而法之顧我𢎞濟蒼生其益多肇造區夏其功大益多損少故人不怨功大過㣲故業不墮夏户雅翻少詩沼翻墮讀曰隳然比之盡羙盡善固多愧矣汝無我之功勤而承我之富貴竭力為善則國家僅安驕惰奢縱則一身不保且成遲敗速者國也失易得難者位也可不惜哉可不慎哉太宗自䟽其所行之過差者以戒太子可謂至矣然太子病於柔弱好内乃無一言及此以警䇿之人莫知其子之惡信矣易以豉翻中書令兼右庶子馬周病上親為調藥為于偽翻使太子臨問庚寅薨戊戍上幸驪山温湯己亥以中書舍人崔仁師為中書侍郎參知機務新羅王金善悳卒以善徳妹真徳為柱國封樂浪郡王遣使冊命卒子恤翻樂浪音洛琅使䟽吏翻丙午詔以右武衛大將軍薛萬徹為青丘道行軍大總管右衛將軍裴行方副之將兵三萬餘人及樓舩戰艦艦户黯翻自萊州泛海以擊髙麗長孫無忌檢校中書令知尚書門下省事長孫無忌葢總三省之事戊申上還宫結骨自古未通中國杜祐曰結骨在回紇西北三千里聞鐵勒諸部皆服二月其俟利𤼵失鉢屈阿棧入朝俟渠之翻屈居勿翻阿烏葛翻棧士限翻朝直遥翻其國人皆長大赤髪緑睛睛音精有黒髪者以為不祥上宴之於天成殿謂侍臣曰㫺渭橋斬三突厥首自謂功多謂武徳九年頡利犯便橋時也今斯人在席更不以為怪邪失鉢屈阿棧請除一官執笏而歸誠百世之幸戊午以結骨為堅昆都督府以失鉢屈阿棧為右屯衛大將軍堅昆都督𨽻燕然都䕶燕因肩翻又以阿史徳時徤俟斤部落置祈連州𨽻營州都督是時四夷大小君長爭遣使入獻見長知兩翻使䟽吏翻見賢遍翻下引見同道路不絶每元正朝賀常數百千人辛酉上引見諸胡使者謂侍臣曰漢武帝窮兵三十餘年疲弊中國所獲無㡬㡬居豈翻豈如今日綏之以徳使窮髪之地盡為編户乎陸徳明經典釋文曰司馬云窮髪北極之下無毛之地也崔云北方無毛地也按毛草也地理書曰山以草木為髪上營玉華宫程大昌曰玉華宫在坊州宜君縣務令儉約惟所居殿覆以瓦覆敷又翻餘皆茅茨然備設太子宫百司苞山絡野所費已巨億計乙亥上行幸玉華宫己卯畋于華原華原宜君銅官漢雲陽祋祤之地後魏於華原置北雍州西魏改為宜州又置北地郡隋開皇初郡廢大業初州廢以縣屬京兆唐初復置宜州貞觀十七年州廢而以華原復屬於京兆中書侍郎崔仁師坐有伏閤自訴者仁師不奏除名流連州連州漢桂陽陽山之地梁置陽山郡隋置連州大業初廢州為熈平郡唐復為連州連州在京師南三千六百六十五里考異曰舊𫝊本龔州今從新舊本紀三月己丑分瀚海都督俱羅勃部置燭龍州甲午上謂侍臣曰朕少長兵間頗能料敵少詩照翻長知兩翻今崑丘行師處月處宻二部及龜茲用事者羯獵顛那利每懐首䑕必先授首弩失畢其次也弩失畢當作布失畢龜茲王也庚子隋蕭后卒詔復其位號諡曰愍使三品䕶𦵏備鹵薄儀衛送至江都與煬帝合𦵏充容長城徐惠唐會要曰舊制昭儀昭容昭媛脩儀脩容脩媛充儀充容充媛各一人為九嬪正二品晉武帝太康三年分烏程立長城縣屬吴興郡今湖州長興縣是也惠徐孝徳之女以上東征髙麗西討龜茲翠㣲玉華營繕相繼又服玩頗華靡上䟽諫其略曰以有盡之農功填無窮之巨浪圖未獲之他衆䘮已成之我軍䘮息浪翻下䘮國同昔秦皇并吞六國反速危亡之基晉武奄有三方翻成覆敗之業魏蜀吴三方鼎峙至晉混一豈非矜功恃大弃徳輕邦圖利忘危肆情縱欲之所致乎是知地廣非常安之術人勞乃易亂之源也又曰雖復茅茨示約易以豉翻復扶又翻猶興木石之疲和雇取人不無煩擾之弊又曰珍玩伎巧乃䘮國之斧斤伎渠綺翻䘮息浪翻珠玉錦繡寔迷心之酖毒又曰作法於儉猶恐其奢作法於奢何以制後上善其言甚禮重之資治通鑑卷一百九十八
