body:
  text: 資治通鑑巻四宋司馬光撰胡三省音註周紀四起閼逢困敦盡著雍困敦凡二十五年始甲子終戊子赧王中十八年楚懷王亡歸秦人覺之遮楚道遮其歸楚之路也懷王從間道走趙間隙也從空隙之路而行也間古莧翻走音奏又音如字趙主父在代趙人不敢受懷王將走魏秦人追及之以歸魯平公薨子緡公賈立世本緡作湣十九年楚懷王發病薨於秦秦人歸其喪喪息郎翻楚人皆憐之如悲親戚諸侯由是不直秦齊韓魏趙宋同擊秦至鹽氏而還括地志鹽氏故城一名司鹽城在蒲州安邑縣掌鹽池之官因稱鹽氏徐廣曰鹽一作監秦與韓武遂與魏封陵以和十二年秦取魏封陵又取韓武遂今皆歸之以和趙主父行新地趙新取中山之地也行下孟翻遂出代西遇樓煩王於西河而致其兵趙北有林胡樓煩之戌漢鴈門郡樓煩縣樓煩胡所居地西河即漢西河郡之地魏襄王薨子昭王立世本曰昭王名遫韓襄王薨子釐王咎立釐讀曰僖二十年秦尉錯伐魏襄城尉蓋國尉也班志襄城縣屬潁川郡以分地考之潁川屬韓境蓋魏與韓分有潁川之地用兵争彊疆埸之間朝韓暮魏則此時襄城或為魏土容亦有之埸音亦趙主父與齊燕共滅中山遷其王於膚施燕因肩翻班志膚施縣屬上郡唐屬延州為州治所歸行賞大赦置酒酺五日酺音蒲説文曰王德布大飲酒也師古曰酺之為言布也王德布於天下而合聚飲食為酺師古所註漢法也此言趙國内酺耳赦者宥有罪也趙主父封其長子章於代號曰安陽君長知丈翻班志代郡有東安陽縣括地志東安陽故城在朔州定襄縣界安陽君素侈心不服其弟不服其弟為王也主父使田不禮相之相息亮翻李兑謂肥義曰公子章彊壯而志驕黨衆而欲大田不禮忍殺而驕二人相得必有陰謀夫小人有欲輕慮淺謀徒見其利不顧其害難必不乆矣夫音扶難乃旦翻下同子任重而勢大亂之所始而禍之所集也子何不稱疾毋出而傳政於公子成毋為禍梯梯猶階也以木為之以升高者也禍梯猶言禍階也梯天黎翻不亦可乎肥義曰昔者主父以王屬義也屬之欲翻曰毋變而度毋易而慮而猶汝也堅守一心以殁而世義再拜受命而籍之記王命於籍也今畏不禮之難而忘吾籍變孰大焉諺曰死者復生生者不愧吾欲全吾言安得全吾身乎子則有賜而忠我矣雖然吾言已在前矣終不敢失李兑曰諾子勉之矣吾見子已今年耳已止也言肥義命止於今年也涕泣而出李兑數見公子成以備田不禮數見者相與謀為之備也數所角翻肥義謂信期曰索隱曰即下文高信也史記正義曰信音申康曰如字公子章與田不禮聲善而實惡内得主而外為暴得主謂章為主父所憐也矯令以擅一旦之命不難為也矯令矯主父之令也令力正翻擅時戰翻今吾憂之夜而忘寐飢而忘食盜出入不可以不備言盜在主父左右出入不可不備也自今以來有召王者必見吾面我將以身先之無故而後王可入也先悉薦翻信期曰善主父使惠文王朝羣臣而自從旁窺之見其長子傫然也朝直遥翻長知丈翻傫倫追翻懶懈貌少子臨朝而長子朝之故其貌如此反北面為臣詘於其弟詘與屈同心憐之於是乃欲分趙而王公子章於代王于況翻又音如字計未决而輟主父及王游沙丘史記正義曰沙丘在邢州平鄉縣東北二十里余按沙丘臺紂所作也班志云沙丘在鉅鹿郡鉅鹿縣東北七十里異宫異宫而處也公子章田不禮以其徒作亂詐以主父令召王肥義先入殺之高信即與王戰高信以王與公子章之徒戰也公子成與李兌自國至趙都邯鄲自邯鄲至也邯鄲音寒丹也乃起四邑之兵入距難距猶拒也難乃旦翻殺公子章及田不禮滅其黨公子成為相號安平君相息亮翻班志涿郡有安平縣非趙地也以公子成能平難而安國故以為號李兑為司寇司寇周六卿之一也掌刑是時惠文王少少詩照翻成兑專政公子章之敗也往走主父主父開之謂開宫門内之也走音奏成兑因圍主父公子章死成兑謀曰以章故圍主父即解兵吾屬夷矣夷誅也滅也乃遂圍之令宫中人後出者夷令力正翻宫中人悉出主父欲出不得又不得食探雀鷇而食之爾雅曰生哺鷇生噣雛釋云辯鳥子之異名也鳥子生而須母哺食者為鷇謂燕雀之屬也生而能自啄食者為雛謂雞雉之屬也探吐南翻鷇居候翻三月餘餓死沙丘宫主父定死乃發喪赴諸侯主父初以長子章為太子後得吳娃愛之長知丈翻吳娃謂吳廣之女孟姚也見上巻五年吳楚之間謂美女曰娃娃音於佳翻為不出者數歲為于偽翻生子何乃廢太子章而立之何即惠文王也吳娃死愛弛憐故太子欲兩王之猶豫未决故亂起秦樓緩免相魏冉代之相息亮翻二十一年秦敗魏師于解敗補邁翻班志解縣屬河東郡宋白曰解縣地即夏鳴條之野有鹽池之利後漢乾祐元年騎帥李茂貞奏置解州師古曰解蒲買翻二十二年韓公孫喜魏人伐秦魏書人其將微也將即亮翻穰矦薦左更白起於秦王以代向壽將兵白姓也春秋之時秦有白乙丙穰人羊翻更工衡翻向息亮翻敗魏師韓師于伊闕斬首二十四萬級虜公孫喜拔五城秦王以白起為國尉戰國之時有國尉有郡尉應劭曰自上安下曰尉武官悉以為稱敗補邁翻秦王遺楚王書曰楚倍秦秦且率諸矦伐楚願王之飭士卒飭治也整也遺于季翻倍蒲妹翻得一樂戰樂音洛快意也言一戰以快其意楚王患之乃復與秦和親和親者結和以相親也復扶又翻又音如字二十三年楚襄王迎婦於秦臣光曰甚哉秦之無道也殺其父而劫其子謂楚懷王畱於秦而以困死秦王復遺襄王書以兵威劫之楚之不競也杜預曰競強也或曰競争也言不能與秦争也忍其父而婚其讐謂楚襄王父死于秦是仇讐之國也忍恥而與之婚烏呼楚之君誠得其道臣誠得其人秦雖彊烏得陵之哉善乎荀卿論之曰夫道善用之則百里之地可以獨立不善用之則楚六千里而為讐人役夫音扶故人主不務得道而廣有其勢是其所以危也秦魏冉謝病免以客卿燭壽為丞相燭姓也左傳鄭有大夫燭之武二十四年秦伐韓拔宛宛故申伯國班志宛縣屬南陽郡唐為鄧州南陽縣宛於元翻秦燭壽免魏冉復為丞相相息亮翻封於穰與陶謂之穰矦又封公子市于宛公子悝于鄧悝苦回翻二十五年魏入河東地四百里河東地蓋安邑大陽蒲阪解縣瀕河之地阪音反解下買翻韓入武遂地二百里于秦武遂地十八年秦以予韓予讀曰與魏芒卯始以詐見重芒謨郎翻姓也卯其名二十六年秦大良造白起客卿錯伐魏至軹取城大小六十一大良造即大上造之良者大上造秦十六爵軹音只軹縣班志屬河内郡唐為孟州濟源縣二十七年冬十月秦王稱西帝遣使立齊王為東帝欲約與共伐趙蘓代自燕來使疏吏翻燕因肩翻齊王曰秦使魏冉致帝子以為何如對曰願王受之而勿稱也秦稱之天下安之王乃稱之無後也無後猶言未晩秦稱之天下惡之惡烏路翻王因勿稱以收天下此大資也且伐趙孰與伐桀宋利桀宋見下二十九年今王不如釋帝以收天下之望發兵以伐桀宋宋舉則楚趙梁衛皆懼矣是我以名尊秦而令天下憎之令盧經翻所謂以卑為尊也古人有言曰自卑者人尊之齊王從之稱帝二日而復歸之歸帝號而不稱也復扶又翻又音如字十二月呂禮自齊入秦姓譜曰太嶽為禹心呂之臣故封呂矦後因以為氏古字脊骨之膂本作呂秦王亦去帝復稱王去羗呂翻除也後以義推秦攻趙拔杜陽徐廣曰杜一作梗按班志杜陽在太原郡榆次縣界杜陽縣屬扶風注云杜水南入渭詩曰自土師古注云緜詩自土沮漆齊詩作自杜言公劉自狄而來居杜與沮漆之地又云扶風栒邑有豳鄉公劉所都審爾則杜陽近栒邑接上郡北地之境趙地西至上郡膚施或者其時併有杜陽歟沮七余翻枸須倫翻豳彼貧翻二十八年秦攻趙拔新垣曲陽史記正義曰年表及括地志曲陽故城在懷州濟源縣西四十里新垣近曲陽未詳端的之處余按班志王屋山在河東垣縣沇水所出東流為濟水經濟水出河東垣縣王屋山為沇水注云濟水重源出温西北平地水有二源東源出原城東北晉文公以信降原即此城也俗以濟水重源所發因復謂之濟源城如此則濟源去垣不逺矣蓋新垣即河東之垣縣也以縣有遷徙謂其新邑為新垣也垣干元翻濟子禮翻沇以轉翻降戸江翻重直龍翻復扶又翻二十九年秦司馬錯擊魏河内漢河内郡即魏河内之地秦并屬河東郡孟子記梁惠王曰河内凶則移其民於河東移其粟於河内蓋魏之有國河東河内自為二郡也錯七各翻又千故翻魏獻安邑以和秦出其人歸之魏秦敗韓師於夏山敗補邁翻夏戸雅翻宋有雀生􅀈於城之陬􅀈劉向説苑作鸇字林曰鷂屬陸璣曰鸇似鷂青黄色燕頷句啄向風揺翅乃因風飛急疾擊鳩鴿燕雀食之陬子矦翻隅也句古矦翻史占之史太史之屬掌卜筮者曰吉凶人吉其凶小而生巨必覇天下宋康王喜起兵滅滕伐薛班志沛郡公丘縣古滕國水經注滕城在蕃縣西唐志滕縣屬徐州薛即孟甞君所封地蕃音反又音如字東敗齊取五城南敗楚取地三百里西敗魏軍與齊魏為敵國乃愈自信其覇欲覇之亟成故射天笞地敗補邁翻亟己力翻射而亦翻後以義推笞擊也音丑之翻斬社稷而焚滅之記曰共工氏有子曰句龍能平水土故祀以為社烈山氏之子曰柱為稷自夏以上祀之周棄亦為稷自商以來祀之自漢以下夏禹配食官社后稷配食官稷周禮注社稷土穀之神共讀曰恭夏戸雅翻以示威服鬼神為長夜之飲於室中室中人呼萬歲則堂上之人應之堂下之人又應之門外之人又應之以至於國中無敢不呼萬歲者天下之人謂之桀宋言其昏暴如桀也齊湣王起兵伐之民散城不守宋王奔魏死於温温周司冦蘓忿生之邑班志温縣屬河内郡宋至此而滅湣讀曰閔三十年秦王㑹楚王於宛宛於元翻㑹趙王於中陽班志中陽縣屬西河郡水經註文水逕太原兹氏縣故城之東瀦為文湖文湖水又東逕中陽縣故城東秦蒙武擊齊拔九城風俗通東蒙主以蒙山為氏齊湣王既滅宋而驕乃南侵楚西侵三晉欲并二周為天子狐喧正議斮之檀衢狐姓也春秋之時晉有狐突狐毛狐偃父子左傳齊簡公與婦人飲酒于檀臺檀衢意其地為通檀臺之衢路也爾雅四達謂之衢咺况晚翻又况逺翻斮側略翻斬也陳舉直言殺之東閭左傳晉圍齊州綽門于東閭杜預注曰齊東門燕昭王日夜撫循其人益以富實燕因肩翻乃與樂毅謀伐齊樂毅曰齊霸國之餘業也毅魚器翻自齊桓公霸天下國以彊大田氏藉其餘業地大人衆未易獨攻也易弋䜴翻王必欲伐之莫如約趙及楚魏於是使樂毅約趙别使使者連楚魏且令趙嚪秦以伐齊之利使者上疏吏翻令力丁翻以利誘之曰嚪嚪音田濫翻誘羊乆翻諸矦害齊王之驕暴皆爭合謀與燕伐齊燕因肩翻三十一年燕王悉起兵以樂毅為上將軍上將軍猶春秋之元帥帥所類翻秦尉斯離帥師與三晉之師㑹之尉秦官也斯離其名或曰斯姓也離名也斯蜀之西南夷種遂以為姓帥讀曰率趙王以相國印授樂毅樂毅并將秦魏韓趙之兵以伐齊齊湣王悉國中之衆以拒之戰於濟西相息亮翻將即亮翻湣讀曰閔水經濟水東北過壽張縣西界北逕須昌榖城臨邑縣西又北逕北平隂城西又東北過盧縣北皆齊地也濟西地在濟水之西濟子禮翻下同齊師大敗樂毅還秦韓之師分魏師以略宋地部趙師以收河間秦韓與齊隔遠故先還其師宋地近於魏故使略之河間近於趙故以方略部趙取之此其部分非人所能及也宋地齊滅宋所取之地身率燕師長驅逐北劇辛曰齊大而燕小燕因肩翻劇竭㦸翻頼諸矦之助以破其軍宜及時攻取其邊城以自益此長乆之利也劇竭㦸翻姓也今過而不攻以深入為名無損於齊無益於燕而結深怨後必悔之樂毅曰齊王伐功矜能謀不逮下廢黜賢良信任謟諛政令戾虐百姓怨懟懟直類翻今軍皆破亡若因而乘之其民必叛禍亂内作則齊可圖也若不遂乘之待彼悔前之非改過恤下而撫其民則難慮也遂進軍深入齊人果大亂失度難慮謂難為計慮也失度失其常度也湣王出走樂毅入臨淄取寳物祭器輸之於燕燕王親至濟上勞軍行賞饗士燕因肩翻濟子禮翻勞力到翻封樂毅為昌國君班志昌國縣屬齊郡封毅為昌國君以其能昌大燕國也遂使畱徇齊城之未下者齊王出亡之衛衛君辟宮舍之稱臣而共具辟讀曰避共音供又居用翻齊王不遜衛人侵之齊王去奔鄒魯有驕色鄒魯弗内遂走莒莒春秋莒子之國齊滅之班志莒縣屬城陽國國都也宋白曰周武王封少昊之後嬴姓兹輿於莒始都計斤城在今高密縣東南四十里春秋時徙於莒隱公二年莒人入向註云今城陽莒縣莒自初封二十三君為楚簡王所滅漢為莒縣城陽王所都莒音居禦翻楚使淖齒將兵救齊因為齊相淖齒欲與燕分齊地索隱曰淖女教翻康曰竹角切姓也相息亮翻乃執湣王而數之數其罪也師古曰數所具翻宋祁曰所主翻曰千乘博昌之間方數百里雨血沾衣漢置千乘郡博昌縣屬焉後漢更千乘郡為樂安國十三州志曰昌水其勢平故曰博昌唐志千乘博昌二縣皆屬青州乘繩證翻雨主遇翻自上而下曰雨王知之乎曰知之嬴博之間地坼及泉班志嬴博二縣屬泰山郡王知之乎曰知之有人當闕而哭者求之不得去則聞其聲王知之乎曰知之淖齒曰天雨血沾衣者天以告也地坼及泉者地以告也有人當闕而哭者人以告也天地人皆告矣而王不知誡焉誡與戒同戒警敕也毛晃曰警敇之辭曰誡此言天地人皆以相警敕也何得無誅遂弑王於鼓里鼔里莒中地名近齊廟荀子論之曰國者天下之利勢也得道以持之則大安也大榮也積美之源也不得道以持之則大危也大累也累力偽翻事相縁及也有之不如無之及其綦也齊人謂極為綦音其下綦之同索為匹夫不可得也索山客翻求也齊湣宋獻是也湣讀曰閔宋獻意即指宋康王故用國者義立而王信立而霸權謀立而亡挈國以呼禮義而無以害之挈即提挈之挈音詰結翻行一不義殺一無罪而得天下仁者不為也擽然扶持心國且若是其固也擽然落石貌言其持心持國擽然如石之固擽歴各翻之所與為之者之人則舉義士也之所以為布陳於國家刑法者則舉義法也主之所極然毛晃曰然如也是也帥羣臣而首嚮之者則舉義志也帥讀曰率首所救翻志者心之所主也如是則下仰上以義矣仰魚亮翻凡仰給仰成之仰皆同音是基定也基定而國定國定而天下定故曰以國濟義一日而白湯武是也基址也本也為土立址曰基為木立根本亦曰基白明也是所謂義立而王也德雖未至也義雖未濟也然而天下之理略奏矣楊倞曰略有節奏也刑賞已諾信於天下矣諾人應聲也信人不疑而心孚也臣下曉然皆知其可要也要一遥翻約也勤也求也政令已陳雖覩利敗不欺其民令力正翻約結已定雖覩利敗不欺其與與黨與也即下文所謂與國也如是則兵勁城固敵國畏之國一綦明楊倞曰此綦當作基今謂此綦字從上註所謂齊人之言其義亦通明顯也與國信之雖在僻陋之國威動天下五伯是也是所謂信立而霸也伯讀曰霸五霸夏昆吾商大彭豕韋周齊桓晉文或曰齊桓晉文宋襄秦穆楚荘為五霸挈國以呼功利不務張其義齊其信唯利之求内則不憚詐其民而求小利焉外則不憚詐其與而求大利焉内不修正其所以有然常欲人之有如是則臣下百姓莫不以詐心待其上矣上詐其下下詐其上則是上下析也析先的翻分也離也如是則敵國輕之與國疑之權謀日行而國不免危削綦之而亡齊湣薛公是也湣讀曰閔薛公謂孟嘗君孟嘗君卒齊與諸矦共滅薛卒子恤翻故用彊齊非以修禮義也非以本政教也非以一天下也綿綿常以結引馳外為務引讀曰靷音羊晉翻丁度曰靷駕牛具在胷曰靷蓋駕馬亦用靷也故彊南足以破楚西足以詘秦北足以敗燕中足以舉宋史記齊閔王十年伐燕取之二十三年與秦敗楚于重丘南割楚之淮北三十六年與韓魏攻秦至函谷三十八年伐宋滅之通鑑據孟子以取燕事屬之齊宣王敗補邁翻詘與屈同音渠勿翻燕因肩翻及以燕趙起而攻之若振槁然燕因肩翻槁枯木也振揺也振已枯之木則其葉摧落而木根撥矣槁苦皓翻又音古老翻而身死國亡為天下大戮後世言惡則必稽焉稽考也又計校也是無他故焉唯其不由禮義而由權謀也三者明主之所謹擇也仁人之所務白也白明白也善擇者制人不善擇者人制之樂毅聞晝邑人王蠋賢劉熈曰畫齊西南近邑音獲索隱曰音胡卦翻括地志㦸里城在臨淄城西北三十里春秋時棘邑又云澅邑蠋所居即此邑因澅水為名也京相璠曰今臨淄有澅水西北入沛即班志所謂如水如時聲相似然則澅水即時水也余按後漢耿弇攻張歩進軍畫中在臨淄西安二邑之間蠋班固古今人表作歜音觸據蠋字則當音蜀或音之欲翻康珠玉切通鑑以畫邑為晝邑以孟子去齊宿于晝為據也若以孟子為據則晝讀如字令軍中環晝邑三十里無入環據漢書音義音宦使人請蠋蠋謝不往燕人曰不來吾且屠晝邑蠋曰忠臣不事二君烈女不更二夫燕因肩翻蠋音蜀更工衡翻國破君亡吾不能存而又欲劫之以兵吾與其不義而生不若死遂經其頸於樹枝自奮絶脰而死經絞也縊也頸居郢翻頭莖也自奮自奮起而還擲也脰大透翻頸也燕師乘勝長驅齊城皆望風奔潰樂毅修整燕軍禁止侵掠求齊之逸民顯而禮之寛其賦歛歛力驗翻後以義推除其暴令修其舊政齊民喜悦乃遣左軍渡膠東東萊膠東漢為王國水經膠水出琅邪黔陬縣膠山北過膠東下密又北過東萊當利縣入海膠水之東為膠東國膠水之西為膠西國東萊春秋萊子之國漢置東萊郡邪音耶前軍循泰山以東至海略琅邪琅邪秦置為郡其地東至海南距淮右軍循河濟屯阿鄄以連魏師河濟注己見一巻安王十五年然僅及濟水入河而溢為滎一節今據水經濟水自滎澤東流至濟陰乘氏縣西分為二瀆其南瀆為荷水東南流至山陽湖陸縣與泗水合其北凟東北流入于鉅野澤東北過東郡壽良縣西界北逕須昌穀城至臨邑縣四瀆津口與河水合此蓋言齊地在河濟之間者也參考上濟西注可見濟子禮翻阿東阿鄄鄄城鄄音絹乘繩證翻荷音柯後軍旁北海以撫千乘旁歩浪翻自臨淄東北至海北海地也漢置郡乘繩證翻中軍據臨淄而鎭齊都祀桓公管仲於郊表賢者之閭封王蠋之墓王蠋墓蓋在晝齊人食邑於燕者二十餘君封為君也有爵位於薊者百有餘人薊燕都也班志薊縣屬廣陽國唐為幽州治所今為燕京水經注薊城西北隅有薊丘故名燕因肩翻薊音計六月之間下齊七十餘城皆為郡縣秦王魏王韓王㑹于京師三十二年秦趙㑹于穰秦拔魏安城班志安城縣屬汝南郡司馬彪志作安城時魏地南至汝南秦自武關出兵攻拔之括地志安城在豫州汝陽縣東南十七里一曰在豫州吳房縣東南穰人羊翻兵至大梁而還還音旋齊淖齒之亂湣王子法章變姓名為莒太史敫家傭淖女教翻湣讀曰閔徐廣曰敫音躍一音皎康吉了切余按班書王子矦表有敫字師古曰古穆字今從之傭顧身為人力作為于偽翻太史敫女竒法章狀貌以為非常人憐而常竊衣食之竊私也私為之而不使人知衣於既翻食祥吏翻因與私通王孫賈從湣王失王之處其母曰汝朝出而晩來則吾倚門而望汝暮出而不還則吾倚閭而望閭里門也周禮二十五家為閭汝今事王王走汝不知其處汝尚何歸焉王孫賈乃入市中呼曰呼火故翻呌號也號戸高翻淖齒亂齊國殺湣王欲與我誅之者袒右袒右肩也市人從者四百人與攻淖齒殺之於是齊亡臣相與求湣王子欲立之法章懼其誅己乆之乃敢自言遂立以為齊王保莒城以拒燕燕因肩翻布告國中曰王已立在莒矣其時樂毅以燕中軍鎭臨淄法章已立而保莒田單自安平保即墨奔敗之餘猶可置之不問法章布告國中自言已立在莒可安坐而不問乎後人論樂毅以為善藏其用吾未敢以為然也趙王得楚和氏璧楚人卞和得玉璞獻之楚厲王王使玉人視之曰石也王以和為詐刖其左足及武王立和又獻之玉人又曰石也王又以為詐而刖其右足及文王立和乃抱璞而泣於荆山之下王聞之使玉人理其璞而得寳因命曰和氏之璧爾雅肉倍好謂之璧外圓象天内方象地秦昭王欲之請易以十五城趙王欲勿與畏秦彊欲與之恐見欺以問藺相如姓譜曰韓獻子𤣥孫曰康食采於藺因氏焉藺力刃翻對曰秦以城求璧而王不許曲在我矣我與之璧而秦不與我城則曲在秦均之二䇿寧許以負秦使秦負曲也臣願奉璧而往使秦城不入臣請完璧而歸之趙王遣之相如至秦秦王無意償趙城相如乃以詐紿秦王復取璧償辰羊翻紿蕩亥翻欺也誑也遣從者懷之間行歸趙從才用翻間古莧翻而以身待命於秦秦王以為賢而弗誅禮而歸之趙王以相如為上大夫衛嗣君薨子懐君立嗣君好察微隱縣令有發褥而席弊者嗣祥吏翻好呼到翻令力正翻古者縣大夫至春秋時有邑大夫縣令起於戰國之時秦漢因之嗣君聞之乃賜之席令大驚以君為神又使人過關市賂之以金此蓋賂掌關市之官周禮司關掌國貨之節以聨門市司貨賄之出入者掌其治禁與其征廛司市掌市之治教政刑量度禁令戰國之時合為一官量音亮既而召關市問有客過與汝金汝回遣之回遣謂還其金也關市大恐又愛泄姬重如耳而恐其因愛重以壅已也泄姓也與洩同春秋時鄭有大夫洩駕陳有大夫洩冶如亦姓也張守節以如耳為魏大夫姓名非也蓋衛大夫是時魏王有如姬重音輕重之重乃貴薄疑以敵如耳薄姓也風俗通衛賢人薄疑敵當也尊魏妃以偶泄姬偶匹也對也曰以是相參也參三也相參列也間厠也荀子論之曰成矦嗣君聚歛計數之君也未及取民也子産取民者也未及為政也管仲為政者也未及修禮也故修禮者王為政者彊取民者安聚歛者亡斂力艷翻三十三年秦伐趙拔兩城三十四年秦伐趙拔石城史記正義曰地理志右北平有石城縣括地志石城在相州林慮縣西南九十里疑相州石城是余謂北平之石城燕境也相州之石城魏境也皆非趙地此石城即漢西河之離石縣城拓拔魏分西河置五城郡又置石城縣蓋此地是也相息亮翻慮音廬燕因肩翻秦穰矦復為丞相穰人羊翻復扶又翻楚欲與齊韓共伐秦因欲圖周王使東周武公謂楚令尹昭子曰周不可圖也令尹楚上卿執其國之政猶秦之丞相也令力正翻昭子曰乃圖周則無之雖然何不可圖武公曰西周之地絶長補短不過百里名為天下共主言天下共宗周以為諸矦主杜佑曰洛陽古成周之地今洛陽城東三十餘里故城是周之下都也晉帥諸矦城之以居敬王至孝王封其弟桓公于河南以續周公之官職至孫惠公乃封少子於鞏號曰東周王赧立東西周分理又徙都西周則王城也帥讀曰率少始照翻鞏居勇翻赧奴版翻裂其地不足以肥國得其衆不足以勁兵雖然攻之者名為弑君然而猶有欲攻之者見祭器在焉故也謂三代所傳之祭器如九鼎之類是也夫虎肉臊而兵利身人猶攻之若使澤中之麋蒙虎之皮人之攻之也必萬倍矣夫音扶劉伯莊曰虎之爪牙如兵之利刃在身其肉雖臊而人猶攻之者以其皮之所在也鹿之大者曰麋麋無爪牙之利而肉可食若更蒙虎之皮人之攻之必萬倍於虎矣臊蘓遭翻魚腥肉臊麋武悲翻更古孟翻裂楚之地足以肥國詘楚之名足以尊王詘讀曰黜言黜其僣王之名也今子欲誅殘天下之共主居三代之傳器器南則兵至矣於是楚計輟不行共音如字傳直專翻言三代之器傳於周周亡則所傳之器將南歸於楚天下將合兵至楚而共討其罪也三十五年秦白起敗趙軍斬首二萬取代光狼城索隱曰地志不載光狼城蓋屬趙國史記正義曰光狼故城在澤州高平縣西二十里康曰本中山地趙武靈王取之其地在代余考史以代光狼城聨而書之康以為其地在代何也又云本中山地中山與代舊為兩國代在山之陰中山在山之陽既云在代不當又云本中山地如康意抑以為光狼本代地趙襄子滅代而中山侵有光狼地武靈王既滅中山始有光狼之地白起自上郡九原雲中下兵始能敗趙軍取光狼史既不先序其兵行之路後又無考光狼城之所闕疑可也又使司馬錯發隴西兵扶風汧縣之西有大隴山名隴坻上者七日方越自隴以西本冀戎䝠戎氐羗之地秦累世攘拓以其地置隴西郡錯七各翻又倉故翻汧若堅翻䝠戸官翻因蜀攻楚黔中拔之按秦兵時因蜀出巴郡和縣路以攻拔楚之黔中黔音琴楚獻漢北及上庸地漢北謂漢水以北宛葉樊鄧隋唐之地上庸曹魏新城唐房陵郡之地三十六年秦白起伐楚取鄢鄧西陵史記正義曰鄢鄧二城並在襄州括地志故鄢城在襄州安養北三里古鄢子之國又按水經注鄢城當在宜城南有鄢水左傳楚屈瑕伐羅及鄢鄢亂次而濟即其地徐廣曰西陵屬江夏余謂西陵即夷陵班志夷陵縣屬南郡水經江水東逕夷陵縣又東逕西陵峽蓋縣城去峽不逺夏户雅翻秦王使使者告趙王願為好㑹於河外澠池使使之使疏吏翻好呼到翻凡和好之好皆同音漢志澠池縣屬弘農郡杜佑曰澠池有東西俱利二城即秦趙㑹處宋白曰在今縣西十三里澠莫踐翻又莫忍翻趙王欲毋行廉頗藺相如計曰姓譜廉姓顓帝曾孫大廉之後頗普河翻王不行示趙弱且怯也趙王遂行相如從從才用翻廉頗送至境與王訣訣音决别也曰王行度道里㑹遇之禮畢度徒洛翻還不過三十日三十日不還還從宣翻又音如字則請立太子以絶秦望王許之㑹于澠池王與趙王飲此句作秦王與趙王飲文意乃明酒酣酣戸甘翻樂也洽也秦王請趙王鼓瑟瑟二十五絃伏羲所作史記曰泰帝使素女鼔五十絃瑟帝悲不止故破其瑟為二十五絃趙人善瑟故秦請鼓之瑟色櫛翻趙王鼓之藺相如復請秦王擊缶缶瓦器爾雅曰盎謂之缶注云盆也楊惲曰仰天拊缶而歌嗚嗚秦聲也説文曰缶所以盛酒秦人鼓之以節樂劉昫曰缶如足盆古西戎之樂秦俗因而用之其形如覆盆以四杖擊之復扶又翻又音如字缶方九翻惲於粉翻盛時征翻昫旴句翻秦王不肯相如曰五歩之内臣請得以頸血濺大王矣言將殺秦王也頸居郢翻濺音箭康音贊汙灑也汙烏故翻左右欲刃相如相如張目叱之左右皆靡靡委靡不振之貌王不懌不悦也為一擊缶為于偽翻罷酒秦終不能有加於趙趙人亦盛為之備秦不敢動趙王歸國以藺相如為上卿位在廉頗之右藺力刃翻頗普何翻毛晃曰人道尚右故左右手之右以右為尊廉頗曰我為趙將有攻城野戰之功將即亮翻藺相如素賤人徒以口舌而位居我上吾羞不忍為之下宣言曰我見相如必辱之宣言者宣布其言於外也相如聞之不肯與㑹每朝常稱病不欲争列朝直遥翻毛晃曰列行次也位序也出而望見輒引車避匿匿藏也隱也其舍人皆以為恥相如曰子視廉將軍孰與秦王曰不若若猶如也相如曰夫以秦王之威而相如廷叱之辱其羣臣此謂請秦王擊缶時也相如雖駑夫音扶駑音奴字林曰駘也駘堂來翻獨畏廉將軍哉顧吾念之彊秦所以不敢加兵於趙者徒以吾兩人在也今兩虎共鬭其勢不俱生吾所以為此者先國家之急而後私讐也先悉薦翻後户遘翻廉頗聞之肉袒負荆至門謝罪荆所以笞故負之以請罪肉袒者袒而露其肉笞丑之翻遂為刎頸之交刎式粉翻頸居郢翻言襟相契雖刎斷其首無所顧也崔顥曰言要齊生死斷首無悔初燕人攻安平燕因肩翻班志東安平縣屬淄川司馬彪志屬北海郡括地志安平城在青州臨淄縣東十九里古紀國之酅邑唐志青州有安平縣後省入博昌縣按三十一年樂毅入臨淄以中軍據之燕人攻安平當在三十二年三十三年之間故通鑑於是年以初字發之酅户圭翻臨淄市掾田單在安平使其宗人皆以鐵籠傅車轊掾以絹翻掌市官屬也巻鐵以傅車轊故謂之鐵籠籠盧東翻傅音附轊音衛車軸頭謂之轊及城潰人争門而出皆以軸折車敗為燕所擒潰户對翻潰散也折食列翻燕因肩翻獨田單宗人以鐵籠得免遂犇即墨是時齊地皆屬燕獨莒即墨未下樂毅乃并右軍前軍以圍莒左軍後軍圍即墨即墨大夫出戰而死即墨人曰安平之戰田單宗人以鐵籠得全是多智習兵因共立以為將以拒燕燕因肩翻將即亮翻樂毅圍二邑朞年不剋乃令解圍各去城九里而為壘令曰城中民出者勿獲困者賑之令力正翻勿獲勿禽之以為俘獲賑即忍翻救也恤也毅欲懐柔二邑使之自服不及計其死守也使即舊業即就也以鎭新民恐新民思為齊而反則以此鎭之三年而猶未下或讒之於燕昭王曰樂毅智謀過人伐齊呼吸之間剋七十餘城今不下者兩城耳非其力不能拔所以三年不攻者欲乆仗兵威以服齊人南面而王耳今齊人已服所以未發者以其妻子在燕故也且齊多美女又將忘其妻子願王圖之昭王於是置酒大㑹引言者而讓之曰讓責也先王舉國以禮賢者非貪土地以遺子孫也遺于季翻遭所傳德薄不能堪命國人不順齊為無道乘孤國之亂以害先王謂王噲讓國於子之以至亡國殺身也事見上巻愼靚王五年今王元年堪勝也任也不能堪命者言王噲命子之子之不能勝王噲所命而任燕國之事也噲苦怪翻靚疾正翻勝音升任音壬寡人統位統他綜翻丁度曰統攝理也痛之入骨故廣延羣臣外招賓客以求報讐其有成功者尚欲與之同共燕國今樂君親為寡人破齊夷其宗廟夷平也為于偽翻報塞先仇塞悉則翻齊國固樂君所有非燕之所得也樂君若能有齊與燕並為列國結歡同好以抗諸矦之難燕國之福寡人之願也塞悉則翻燕因肩翻好呼到翻難乃旦翻汝何敢言若此乃斬之賜樂毅妻以后服賜其子以公子之服輅車乘馬後屬百兩夏奚仲作車至周而備其制輿方象地蓋圓象天三十輻以象日月蓋弓二十八以象列星龍旂九斿七仭齊軫以象大火鳥旟七斿五仞齊較以象鶉火熊旂六斿五仞齊肩以象參伐龜旐四斿四仞齊首以象營室弧旌枉矢以象弧此諸矦以下所建者也輅車之後又有屬車百兩亦當時諸國之儀乘馬四馬也孔頴達曰書序云武王戎車三百兩皆以一乘為一兩謂之兩者風俗通以車有兩輪故車稱兩乘繩正翻好呼到翻難乃旦翻屬音蜀兩音亮旂渠希翻斿夷周翻旒也參所今翻列宿星名也旐音兆遣國相奉而致之樂毅立樂毅為齊王相息亮翻樂毅惶恐不受拜書以死自誓由是齊人服其義諸矦畏其信莫敢復有謀者頃之昭王薨惠王立頃之言無幾何時毅魚器翻復扶又翻惠王自為太子時嘗不快於樂毅田單聞之乃縱反間於燕孫子五間有反間因其敵間而用之又曰敵間之間我者因而利之導而舍之故反間可得而用也間古莧翻宣言曰齊王已死城之不拔者二耳樂毅與燕新王有隙畏誅而不敢歸以伐齊為名實欲連兵南面王齊王于况翻又音如字齊人未附故且緩攻即墨以待其事齊人所懼唯恐他將之來即墨殘矣燕王固已疑樂毅得齊反間乃使騎劫代將而召樂毅將即亮翻燕因肩翻下同騎竒寄翻康曰姓也余謂騎劫時以能而將騎以官稱非姓也毅魚器翻樂毅知王不善代之知王遣代其意不善將誅之也遂犇趙燕將士由是憤惋不和燕因肩翻將即亮翻惋烏貫翻田單令城中人食必祭其先祖於庭飛鳥皆翔舞而下城中燕人怪之田單因宣言曰當有神師下教俄有一卒曰臣可以為師乎因反走田單起引還坐東鄉師事之鄉讀曰嚮卒曰臣欺君田單曰子勿言也因師之毎出約束必稱神師田單恐衆心未一故假神以令其衆乃宣言曰吾唯懼燕軍之劓所得齊卒劓魚器翻割鼻也置之前行行户剛翻即墨敗矣燕人聞之如其言城中見降者盡劓皆怒堅守唯恐見得降户江翻單又縱反間言吾懼燕人掘吾城外冢墓可為寒心掘其月翻冢而隴翻燕軍盡掘冢墓燒死人齊人從城上望見皆涕泣其欲出戰怒自十倍田單知士卒之可用乃身操版鍤與士卒分功操七刀翻鍤則洽翻鍫也妻妾編於行伍之間盡散飲食饗士令甲卒皆伏使老弱女子乘城乘登也登城而守也遣使約降於燕使疏吏翻降户江翻燕因肩翻燕軍皆呼萬歲田單又收民金得千鎰令即墨富豪遺燕將曰即降願無虜掠吾族家燕將大喜許之燕軍益懈田單乃收城中得牛千餘為綘繒衣鎰弋質翻遺于季翻令盧經翻懈古隘翻繒慈陵翻絹也畫以五采龍文畫古畵字通束兵刃於其角而灌脂束葦於其尾葦于鬼翻葭也燒其端鑿城數十穴夜縱牛壯士五千隨其後史記田單傳壯士五千下有人字牛尾熱怒而犇燕軍燕軍大驚視牛皆龍文所觸盡死傷而城中鼓譟從之譟先到翻羣呼也老弱皆擊銅器為聲聲動天地燕軍大駭敗走齊人殺騎劫追亡逐北亡逃亡也北奔北也逃亡者追之奔北者逐之楊倞曰北者乖背之名故以敗走為北毛晃曰人道面南偝北北者偝也故古以堂北為背背亦偝也以敗走為北者取偝之而走耳所過城邑皆叛燕復為齊田單兵日益多乘勝燕日敗亡走至河上而齊七十餘城皆復焉燕因肩翻為于偽翻又音如字乃迎襄王於莒入臨淄封田單為安平君齊以田單安國平難又嘗保安平故因以安平封之齊王以太史敫之女為后生太子建太史敫曰女不取媒因自嫁非吾種也汙吾世徐廣曰敫音躍一音皎師古曰敫古穆字種之隴翻汙烏故翻凡染汙之汙皆同音終身不見君王后君王后亦不以不見故失人子之禮趙王封樂毅於觀津班志觀津縣屬信都國觀工喚翻尊寵之以警動於燕齊燕惠王乃使人讓樂毅且謝之曰將軍過聼以與寡人有隙遂捐燕歸趙捐余專翻弃也將軍自為計則可矣而亦何以報先王之所以遇將軍之意乎樂毅報書曰昔伍子胥説聼於闔閭而吳逺迹至郢夫差弗是也賜之鴟夷而浮之江吳王不寤先論之可以立功故沈子胥而不悔子胥不蚤見主之不同量是以至於入江而不化逺迹言自吳至郢其道里甚逺而行迹得至也弗是謂夫差弗以子胥之言為是也伍子胥楚人也楚平王信讒殺其父兄子胥奔吳吳王闔閭信而用之伐楚入郢闔閭卒夫差立子胥屢諫不聼賜之屬鏤以死子胥既死夫差取其尸盛之鴟夷浮之江中應劭曰鴟夷搕形也以馬革為之韋昭曰革囊也或曰生牛皮也索隱曰言子胥怨恨故雖投江而神不化猶為波濤之神也郢以井翻説式芮翻夫音扶差初加翻鴟丑之翻沈持林翻量力讓翻闔户臘翻卒子恤翻鏤力俱翻又力矦翻盛時征翻榼户盍翻夫免身立功以明先王之迹臣之上計也夫音扶離毀辱之誹謗墮先王之名臣之所大恐也離與罹同墮與隳同音火規翻後凡墮毀之墮皆同音臨不測之罪以幸為利義之所不敢出也謂不敢與趙謀燕臣聞古之君子交絶不出惡聲忠臣去國不潔其名臣雖不佞不佞猶言不才也數奉教於君子矣數所角翻唯君王之畱意焉於是燕王復以樂毅子閒為昌國君燕因肩翻索隱曰閒音紀閑翻而樂毅往來復通燕卒於趙號曰望諸君望諸澤名本齊地毅自齊奔趙趙人以此號之本其所從來也卒子恤翻田單相齊相息亮翻過淄水水經淄水出泰山萊蕪縣原山東北過臨淄縣又東過利縣東東北入于海有老人渉淄而寒出水不能行田單解其裘而衣之襄王惡之曰田單之施於人衣于既翻惡烏路翻施式䜴翻後凡布施之施皆同音將以取我國乎不早圖恐後之變也左右顧無人巖下有貫珠者巖下殿巖之下也昔舜遊巖廊襄王呼而問之曰汝聞吾言乎對曰聞之王曰汝以為何如對曰王不如因以為己善王嘉單之善下令曰寡人憂民之饑也單收而食之寡人憂民之寒也單解裘而衣之寡人憂勞百姓而單亦憂稱寡人之意食祥吏翻稱昌孕翻愜也後凡稱愜之稱皆同音單有是善而王嘉之單之善亦王之善也王曰善乃賜單牛酒後數日貫珠者復見王曰王朝日宜召田單而揖之於庭口勞之復扶又翻朝陟遥翻旦日又直遥翻朝羣臣之日也勞力到翻几撫勞之勞皆同音乃布令求百姓之饑寒者收榖之榖如字養也收榖收而養乏也乃使人聼於閭里聞大夫之相與語者曰田單之愛人嗟乃王之教也田單任貂勃於王任汝鴆翻保也今之任子義亦如此貂丁聊翻康曰姓也王有所幸臣九人欲傷安平君傷譛毀也害也損也相與語於王曰燕之伐齊之時楚王使將軍將萬人而佐齊軍將即亮翻又音如字領也今國已定而社稷已安矣何不使使者謝於楚王王曰曰左右孰可九人之屬曰貂勃可貂勃使楚楚王受而觴之數月不反使疏吏翻觴之者舉觴以禮之也九人之屬相與語曰夫一人之身而牽畱萬乘者豈不以據勢也哉謂貂勃以安平君之重楚王畱而禮遇之也夫音扶乘繩證翻且安平君之與王也君臣無異而上下無别别彼列翻且其志欲為不善内撫百姓外懷戎翟翟與狄同禮天下之賢士其志欲有為願王察之異日王曰召相單而來異日猶言他日也相息亮翻田單免冠徒跣肉袒而進徒跣徒行而跣足也跣先典翻不屨而以足親地也李巡曰䄠裼脱衣袒肩見體曰肉袒䄠與袒同裼先的翻退而請死罪五日而王曰子無罪於寡人子為子之臣禮吾為吾之王禮而已矣貂勃從楚來王賜之酒酒酣王曰召相單而來貂勃避席稽首酣戸甘翻酒樂也應劭曰洽也稽音啟下首拜也曰王上者孰與周文王王曰吾不若也貂勃曰然臣固知王不若也下者孰與齊桓公王曰吾不若也貂勃曰然臣固知王不若也然則周文王得呂尚以為太公呂尚釣于渭濱周文王出獵載與俱歸曰吾太公望子乆矣因號曰太公望齊桓公得管夷吾以為仲父齊公子無知之亂管夷吾奉公子糾與桓公争國子糾死管仲囚桓公釋其罪任之以政號曰仲父姓譜管姓周文王子管叔之後今王得安平君而獨曰單安得此亡國之言乎且自天地之闢民人之始為人臣之功者誰有厚於安平君者哉王不能守王之社稷燕人興師而襲齊王走而之城陽之山中襄王從湣王走莒班志莒縣屬城陽國故云城陽之山中湣讀曰閔莒許與翻安平君以惴惴即墨三里之城五里之郭敝卒七千人禽其司馬而反千里之齊安平君之功也惴之睡翻危恐之貌司馬蓋指騎劫當是之時舍城陽而自王舍讀曰捨王于况翻天下莫之能止然而計之於道歸之於義以為不可故棧道木閣而迎王與后於城陽山中架木通路曰棧道棧士限翻康士諫切非王乃得反子臨百姓今國已定民已安矣王乃曰單嬰兒之計不為此也王亟殺此九子者以謝安平君不然國其危矣乃殺九子而逐其家益封安平君以夜邑萬戸夜邑戰國䇿作掖邑班志掖縣屬東萊郡掖羊益翻田單將攻狄班志狄縣屬千乘郡後漢安帝改曰臨濟徐廣曰狄今樂安臨濟縣也史記正義曰故狄城在淄州高苑縣西北往見魯仲連姓譜魯以國為姓魯仲連曰將軍攻狄不能下也田單曰臣以即墨破亡餘卒破萬乘之燕復齊之墟今攻狄而不下何也上車弗謝而去乘繩證翻燕因肩翻上時掌翻遂攻狄三月不克齊小兒謡曰大冠若箕謡余韶翻徒歌曰謡大冠武冠也脩劒拄頥脩長也拄冢庾翻攻狄不能下壘枯骨成丘田單乃懼問魯仲連曰先生謂單不能下狄請聞其説魯仲連曰將軍之在即墨坐則織蕢蕢其位翻草器也立則仗鍤顔師古曰仗直亮翻慿荷也鍤則洽翻為士卒倡曰無可往矣宗廟亡矣今日尚矣歸於何黨矣毛晃曰尚庶幾也言單于其時蓋言曰今日之事尚庶幾焉黨類也言戰有勝負不死則降將歸于何類也當此之時將軍有死之心士卒無生之氣聞君言莫不揮泣奮臂而欲戰此所以破燕也當今将軍東有夜邑之奉西有淄上之娛此蓋言安平封邑益之以夜邑夜邑在安平東淄水在安平西夜邑有租賦之奉淄上有遊觀之樂故魯仲連云然燕因肩翻夜讀曰掖音羊益翻黄金横帶而騁乎淄澠之間水經註淄水自利縣東北流逕安平城北又東逕廣饒縣與濁水㑹濁水出廣饒縣冶嶺山亦謂之繩水又北與時澠之水㑹時水出齊城西北北㑹繩水繩水出管城東世謂漢溱水西逕樂安博縣與時水合孔子謂淄澠之合易身甞而知之即斯水也騁丑郢翻馳騖也澠時陵翻溱仄詵翻又音秦有生之樂無死之心所以不勝也樂音洛田單曰單之有心先生志之矣志者心之所主也明日乃厲氣循城厲嚴厲也勉厲也奮厲也振厲也是三者有修飭振起之意立於矢石之所援枹鼔之狄人乃下援于元翻引也後以義推枹芳無翻擊鼔杖初齊湣王既滅宋欲去孟嘗君二十九年書齊滅宋先書宋滅薛時孟嘗君已封於薛宋所滅者何薛邪去羗呂翻孟嘗君奔魏魏昭王以為相與諸矦共伐破齊湣王死襄王復國而孟嘗君中立為諸矦無所屬襄王新立畏孟嘗君與之連和孟嘗君卒諸子争立而齊魏共滅薛孟嘗君絶嗣嗣祥吏翻三十七年秦大良造白起伐楚拔郢括地志郢城在江陵縣東北六里楚平王築都之地燒夷陵楚襄王兵散遂不復戰東北徙都於陳陳即古陳國班志陳縣屬淮陽國註云楚頃襄王自郢徙北復扶又翻頃窺營翻秦以郢為南郡封白起為武安君班志武安縣屬魏郡戰國之君分封其臣如平原武安之𩔖非眞食其縣之入也張守節曰言能撫養軍士戰必克得百姓安集故曰武安三十八年秦武安君定巫黔中初置黔中郡括地志黔中故城在辰州沅陵縣西二十二里江南今黔府亦其地按秦黔中郡地非唐黔州地也宋白曰秦黔中郡所理在今辰州西二十里黔中故郡城是漢改黔中為武陵郡移理義陵即今辰州溆浦縣是後漢移理臨沅即今朗州所理是今辰州叙奬溪澧朗施八州是秦漢黔中郡之地自永嘉以後没于夷䝤元魏之後圖記不傳至後周保定四方涪陵首領田思鶴歸化初于其地立奉州續改為黔州大業中又改為黔安郡因周隋州郡之名遂為秦漢黔中郡交㸦難辯今黔州及夷費思播與秦黔中郡隔越峻嶺以山川言之炳然自分黔其今翻又其炎翻沅音元溆音叙澧里弟翻䝤魯皓翻涪音浮㸦與互同費兵媚翻以水名魏昭王薨子安釐王立世本曰安釐王名圉釐讀曰僖三十九年秦武安君伐魏拔兩城楚王收東地兵東地蓋楚之東境淮汝之地也得十餘萬復西取江南十五邑復扶又翻又音如字魏安釐王封其弟無忌為信陵君宋白曰信陵君邑于甯今宋州寜陵縣古甯城也四十年秦相國穰矦伐魏韓暴鳶救魏暴曰報翻姓也周有卿士暴公其後遂以為氏鳶以專翻名也穰矦大破之穰人羊翻斬首四萬暴鳶走開封班志開封縣屬河南郡賢曰開封故城在今汴城南宋白曰今汴州開封縣南五十里開封故城是漢理所汴皮變翻魏納八城以和穰矦復伐魏走芒卯入北宅北宅即宅陽復扶又翻芒莫即翻魏人割温以和温縣即春秋温邑屬晉唐屬孟州四十一年魏復與齊合從秦穰矦伐魏拔四城斬首四萬從子容翻穰人羊翻魯湣公薨子頃公讐立湣讀曰閔頃音傾謚法甄心動懼曰頃敏以敬慎曰頃四十二年趙人魏人伐韓華陽司馬彪曰華陽山名在河南密縣括地志在鄭州管城縣南四十里水經註黄水出新鄭縣太山黄泉東南流逕華城西史伯謂鄭桓公曰華君之土也韋昭曰華國名也華戸化翻韓人告急於秦秦王弗救韓相國謂陳筮曰事急矣相息亮翻願公雖病為一宿之行陳筮如秦如往也見穰矦穰矦曰事急乎故使公來陳筮曰未急也穰矦怒曰何也陳筮曰彼韓急則將變而他從謂從趙魏也以未急故復來耳復扶又翻穰矦曰請發兵矣乃與武安君及客卿胡陽救韓姓譜舜後胡公滿封於陳子孫以為氏又陸終氏六子長曰昆吾次曰參胡董姓封於韓墟周為胡國楚滅之八日而至敗魏軍於華陽之下蓋華陽城下也走芒卯虜三將斬首十三萬武安君又與趙將賈偃戰沈其卒二萬人于河將即亮翻沈持林翻人皆貪生而畏死二萬人與戰烏得盡沈諸河以計沈之也魏叚干子請割南陽予秦以和古予與字通下書南陽寔脩武班志脩武縣屬河内郡應劭曰晉始啟南陽今南陽城是也其地在晉山南河北故曰南陽劉原父曰脩武即晉之甯邑武王伐紂名之韓詩外傳武王伐紂勒兵於甯故曰脩武有古南陽城父音甫傳直戀翻蘇代謂魏王曰欲璽者叚干子也欲地者秦也今王使欲地者制璽欲璽者制地魏地盡矣璽印也言叚干子欲得秦相印故請魏割地璽斯氏翻夫以地事秦猶抱薪救火夫音扶薪不盡火不滅王曰是則然也雖然事始已行不可更矣更工衡翻對曰夫博之所以貴梟者便則食不便則止今何王之用智不如用梟也夫音扶鄭司農註考工記曰博立梟棊宋玉楚辭曰箟蔽象棊有六博成梟而牟呼五白謝艾曰六博得梟者勝史記正義曰博頭有刻為梟鳥形者擲得梟者合食其子不便則為餘行也梁湘東王繹博食子未下以其有便不便也梟堅堯翻魏王不聼卒以南陽為和卒子恤翻寔脩武韓釐王薨子桓惠王立韓魏既服於秦秦王將使武安君與韓魏伐楚未行而楚使者黄歇至姓譜陸終之後受封於黄為楚所滅其後以國為氏使疏吏翻歇許竭翻聞之畏秦乘勝一舉而滅楚也乃上書曰臣聞物至則反冬夏是也上時掌翻至極也物極則反也冬至陰之極而陽生焉夏至陽之極而陰生焉致至則危累棊是也致亦極也極其至則危也累棊至於極高則必危矣楚司馬子期累十二博棊不墜王曰危哉今大國之地徧天下有其二垂史記正義曰極東極西也余謂秦國之地有天下西北之二垂也此從生民以來萬乘之地未嘗有也先王三世不忘接地於齊以絶從親之要乘繩證翻從子容翻索隱曰要讀曰腰以言山東合從韓魏是其腰康曰於笑切約也余謂索隱説是今王使盛橋守事於韓盛橋以其地入秦索隱曰秦使盛橋守事於韓亦猶楚使召滑相趙然也盛姓也相息亮翻是王不用甲不信威而得百里之地王可謂能矣信讀曰申後屈信之信皆同音王又舉甲而攻魏杜大梁之門舉河内拔燕酸棗虚桃入邢魏之兵雲翔而不敢捄徐廣曰始皇五年取酸棗燕虚蘇代曰决宿胥之口魏無虛頓丘又曰燕縣有桃城班志東郡有燕縣陳畱郡有酸棗縣水經註濮渠東北逕燕城内為陽清湖又逕桃城南即戰國䇿所謂燕酸棗虛桃者史記正義曰故桃城在滑州昨城縣東三十里燕於賢翻虛如字徐廣曰平臯有邢丘劉昭曰邢丘故邢國史記正義曰邢丘在懷州武德縣東南二十里捄與救同王之功亦多矣王休甲息衆三年而後復之又并蒲衍首垣以臨仁平丘黄濟陽嬰城而魏氏服徐廣曰皆屬陳畱索隱曰仁及平丘二縣名班志平丘外黄濟陽三縣屬陳畱仁地闕張晏曰魏郡有内黄故加外臣瓚曰縣有黄溝師古曰左傳魯惠公敗宋師於黄杜預以為外黄縣有黄城即此地也索隱又曰謂秦以兵臨仁平丘二縣則黄濟陽嬰城而自守也平丘句斷史記正義曰故黄城在曹州考城縣東按水經註黄溝名也河水舊於白馬南泆通濮濟黄溝濟陽故城在曹州寃句縣西南康曰蒲在長垣之蒲鄉衍在河南與巻近首蓋牛首垣即長垣濟子禮翻垣于元翻瓚藏旱翻索山客翻傳直戀翻王又割濮磨之北注齊秦之要絶楚趙之脊天下五合六聚而不敢捄王之威亦單矣濮博木翻要讀曰腰脊資昔翻徐廣曰濮水北於鉅野入濟索隱曰濮磨地名近濮水水經濮水上承濟水於封丘縣班志所謂濮水首濟者也東北流左㑹别濮水水受河於酸棗縣杜預所謂濮水出酸棗縣首受河者也東至乘氏縣與濟同入鉅野澤磨康莫賀切言秦既服魏又割濮磨之北則地連於齊是注齊之要也魏地既入於秦則楚趙之聲勢不接是絶楚趙之脊也單與殫同索隱曰單盡也言秦王之威盡行也濟子禮翻乘繩證翻索山客翻王若能保功守威絀攻取之心絀敕律翻黜也而肥仁義之地使無後患三王不足四五伯不足六也伯讀曰覇王若負人徒之衆仗兵革之彊乘毀魏之威而欲以力臣天下之主臣恐其有後患也詩曰靡不有初鮮克有終詩變大雅蕩之辭鮮息善翻少也後以義推易曰狐渉水濡其尾易未濟小狐汔濟濡其尾彖曰小狐汔濟未出中也濡其尾無攸利不續終也濡汝朱翻此言始之易終之難也易弋豉翻昔吳之信越也從而伐齊既勝齊人於艾陵還為越王禽於三江之浦事見左傳史記正義曰艾山在兗州博縣南六十里三江即禹貢所謂三江既入震澤底定者也吳地記松江東北行七十里得三江口東北入海為婁江東南入海為東江併松江為三江水瀕曰浦智氏之信韓魏也從而伐趙攻晉陽城勝有日矣韓魏叛之殺智伯瑶於鑿臺之下事見一巻威烈王二十三年水經註太原榆次縣同過水側有鑿臺今王妬楚之不毀孔頴達曰本以色曰妬以行曰忌但後之作者妬亦兼行而忘毀楚之彊韓魏也臣為王慮而不取也為于偽翻夫楚國援也鄰國敵也夫音扶今王信韓魏之善王此正吳之信越也臣恐韓魏卑辭除患而實欲欺大國也何則王無重世之德於韓魏而有累世之怨焉索隱曰重世猶再世也重直龍翻累魯水翻夫韓魏父子兄弟接踵而死於秦將十世矣故韓魏之不亡秦社稷之憂也今王資之與攻楚不亦過乎資之謂資以兵也且攻楚將惡出兵惡音烏王將借路於仇讐之韓魏乎兵出之日而王憂其不反也王若不借路於仇讐之韓魏必攻隨水右壤索隱曰楚都陳隨水右壤蓋在隨水之西今鄧州之西其地多山林者是余謂右壤蓋其地在楚都之右此皆廣川大水山林谿谷不食之地記擅弓成子高曰死則擇不食之地而葬註云不食謂不墾耕是王有毀楚之名而無得地之實也且王攻楚之日四國必悉起兵而應王秦楚之兵構而不離魏氏將出而攻畱方與銍湖陵碭蕭相故宋必盡班志畱縣屬楚國方與湖陵縣屬山陽郡銍蕭相三縣屬沛郡碭縣屬梁國銍竹乙翻方音房與音預碭音唐又徒浪翻相息亮翻史記正義曰徐州西宋州東兗州南並故宋地齊人南面攻楚泗上必舉時楚蠶食魯國有泗上之地此皆平原四達膏腴之地如此則天下之國莫彊於齊魏矣臣為王慮莫若善楚秦楚合而為一以臨韓韓必斂手而朝王施以東山之險帶以曲河之利東山謂華山以至崤塞諸山皆在咸陽之東曲河謂河千里一曲按水經河水自雲中沙南縣屈而南流至華陰潼關曲而東流所謂曲河也春秋説題辭曰河之為言荷也荷精分布懷陰引度也釋名曰河下也隨地下處而通流也韓必為關内之矦若是而王以十萬戍鄭鄭韓之國都也梁氏寒心許鄢陵嬰城而上蔡召陵不往來也許春秋許國班志許鄢陵二縣皆屬潁川郡上蔡故蔡國蔡仲所封後徙新蔡故此為上蔡召陵即齊桓公伐楚所次之地二縣班志皆屬汝南郡魏都大梁其境南至汝南許鄢陵居其間二邑皆脅於秦兵嬰城自守則楚之上蔡召陵不能與大梁往來矣嬰繞也嬰城者謂以兵繞城而守也郾漢書音義音甚多丁度毛晃音從於建翻召讀曰邵如此魏亦關内矦矣大王壹善楚而關内兩萬乘之主乘繩證翻注地於齊齊右壤可拱手而取也齊右壤謂濟西之地也王之地一經兩海要約天下東西為經兩海東海西海也謂自西海至東海其地一為秦所有也要約猶約束也要於遥翻是燕趙無齊楚齊楚無燕趙也此極言山東諸國連從之為秦害也燕因肩翻然後危動燕趙直揺齊楚此四國者不待痛而服矣燕因肩翻王從之止武安君而謝韓魏使黄歇歸約親於楚資治通鑑巻四
