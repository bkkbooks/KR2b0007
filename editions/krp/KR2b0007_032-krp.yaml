body:
  text: 資治通鑑卷三十二宋司馬光撰胡三省音註漢紀二十四起著雍涒灘盡昭陽赤奮若凡六年孝成皇帝中永始四年春正月上行幸甘泉郊泰畤大赦天下三月行幸河東祠后土夏大旱四月癸未長樂臨華殿未央宫東司馬門皆災師古曰東面之司馬門也樂音洛六月甲午霸陵園門闕災秋七月辛未晦日有食之冬十一月庚申衞将軍王商病免梁王立驕恣無度立梁孝王武八世孫也至一日十一犯法相禹奏立對外家怨望有惡言梁相名禹相息亮翻有司案驗因發其與姑園子姦事奏立禽獸行請誅漢法内亂為禽獸行行下孟翻太中大夫谷永上書曰臣聞禮天子外屏不欲見外也師古曰屏謂當門之牆以屏蔽者也外屏於門外為之是以帝王之意不窺人閨門之私聴聞中冓之言韓詩云中冓中夜應劭曰中冓材冓在堂之中也晋灼曰魯詩以為夜也師古曰冓謂舎之交積材木也應説近之冓音工豆翻春秋為親者諱春秋公羊傳閔元年齊仲孫來齊仲孫者何公子慶父也公子慶父則曷為謂之齊仲孫外之也曷為外之春秋為親者諱為于偽翻下同今梁王年少少詩照翻下同頗有狂病始以惡言按驗既無事實而發閨門之私非本章所指王辭又不服猥强劾立傅致難明之事劾户槩翻師古曰傅讀曰附獨以偏辭成辠斷獄斷丁亂翻無益於治道治直吏翻汙衊宗室汙烏故翻孟康曰衊音漫師古曰衊音秣謂塗染也以内亂之惡披布宣揚於天下非所以為公族隠諱為于偽翻下為公同増朝廷之榮華昭聖徳之風化也臣愚以為王少而父同産長姑者父之同産長知兩翻年齒不倫梁國之富足以厚聘美女招致妖麗妖巧也艷也好也妖於驕翻父同産亦有恥辱之心師古曰言其姑亦當自恥必不與姦案事者乃驗問惡言師古曰本所問者怨望朝廷之言也何故猥自發舒言何為而自發内亂之事以三者揆之殆非人情疑有所廹切過誤失言文吏躡尋不得轉移躡尋者謂躡其失言之後而尋其内亂之跡也萌牙之時加恩勿治上也如淳曰覆盖之則計之上治直之翻下同既已案驗舉憲舉憲者舉以法也宜及王辭不服詔廷尉選上徳通理之吏更審考清問上與尚同書吕刑皇帝清問下民孔安國曰清問詳問也馬曰清訊著不然之效定失誤之法著明也效驗也明其事之不然具有證驗也失誤謂誤入人罪為失而反命於下吏師古曰使者還反以清白之状付有司也以廣公族附疏之徳附疏者使疏屬親附也為宗室刷汙亂之恥師古曰刷謂拭刷除之也音所劣翻甚得治親之誼天子由是寝而不治是嵗司𨽻校尉蜀郡何武為京兆尹姓譜何出自周成王母弟唐叔虞後封於韓韓滅子孫分散江淮問音以韓為何字隨音變遂為何氏武為吏守法盡公進善退惡所居無赫赫名去後常見思元延元年春正月己亥朔日有食之壬戌王商復為大司馬衛将軍商去年以病免今復位三月上行幸雍祠五畤雍於用翻畤音止夏四月丁酉無雲而雷劉向曰雷當託於雲猶君之託于臣隂陽之合也人君不恤天下萬民有怨畔之心故無雲而雷有流星従日下東南行四面燿燿如雨自晡及昏而止赦天下秋七月有星孛于東井孛蒲内翻上以災變博謀羣臣北地太守谷永對曰王者躬行道徳承順天地則五徵時序五徵即洪範之八庶徵曰雨曰暘曰寒曰燠曰風也百姓夀考符瑞並降失道妄行逆天暴物則咎徵著郵洪範之常雨常暘常寒常燠常風為咎徵著明也天見咎徴以明著人君之過也師古曰郵與尤同尤過也妖孽並見洪範五行傳説曰凡草木之類謂之妖妖猶夭胎言尚㣲也蟲豸之類謂之孽孽則芽孽矣見賢遍翻饑饉薦臻終不改寤惡洽變備不復譴告更命有徳如魯哀禍大天不降譴是也復扶又翻更工衡翻此天地之常經百王之所同也加以功徳有厚薄期質有修短時世有中季師古曰中讀曰仲天道有盛衰陛下承八世之功業八世髙恵文景武昭宣元當陽數之標季孟康曰陽九之末紀也師古曰標音必遥翻渉三七之節紀孟康曰至平帝乃三七二百一十嵗之厄今已渉向其節紀遭無妄之卦運應劭曰天必先雲而後雷雷而後雨而今無雲而雷無妄者無所望也萬物無所望于天災異之最大者也師古曰取易之無妄卦為義項安世曰古妄與望通秦漢言无妄皆無望也朱英之説黄歇與揚子法言皆然故太𤣥以去凖无妄謂其無所復望也在易則自為誠妄之妄直百六之災阸易九戹曰初入元百六陽九孟康曰易傳也所謂陽九之戹百六之㑹也初入元百六嵗有戹者則前元之餘氣也師古曰直當也孔穎達曰凡水旱之嵗歴運有常按律歴志云十九嵗為一章四章為一部二十部為一統三綂為一元則一元有四千五百六十嵗初入元一嵗有陽九為旱九年次三百七十四嵗隂九謂水九年以一百六嵗并三百七十四嵗為四百八十嵗注云六乗八之數次四百八十嵗有陽九謂旱九年次七百二十嵗隂七謂水七年次七百二十嵗陽七謂旱七年又注云七百二十者九乗八之數次六百嵗隂五謂水五年次六百嵗陽五謂旱五年注云六百嵗者以八乗八八八六十四又以七乗八七八五十六相并為一千二百嵗于易七八不變氣不通故合而數之各得六百嵗次四百八十嵗隂三次四百八十嵗陽三除入元至陽三除去災嵗摠有四千五百六十年其災嵗兩個陽九年一個隂九年一個隂陽各七年一個隂陽各五年一個隂陽各三年摠有五十七年并前四千五百六十年通為四千六百一十七嵗此一元之氣終矣此是隂陽水旱之大數也所以正用七八九六相乗者以水數六火數七木數八金數九此交互相乗也以七八九六隂陽之數自然故有九年七年五年三年之災三難異科雜焉同㑹師古曰雜謂相參也一曰雜音先合翻雜焉總萃難乃旦翻建始元年以來二十載間載子亥翻羣災大異交錯鋒起多於春秋所書内則為深宫後庭将有驕臣悍妾醉酒狂悖卒起之敗驕臣指淳于長等悍妾指趙昭儀姊弟也悍下罕翻又侯旰翻師古曰卒讀曰猝悖蒲内翻又蒲沒翻北宫苑囿街巷之中臣妾之家幽閒之處苑園也孔穎達曰有蕃曰園有牆曰囿園囿大同蕃牆異耳囿者域飬禽獸之處園者種菜殖果之處毛晃曰苑亦以飬禽獸直曰街曲曰巷師古曰閒讀曰閑徵舒崔杼之亂陳靈公滛于夏姬數如其家夏姬之子徵舒病之自廐射而殺之齊荘公通於崔杼之妻姜氏數如崔氏杼伏甲殺之事並見左傳此指帝㣲行将有徵舒崔杼之禍也外則為諸夏下土将有樊並蘇令陳勝項梁奮臂之禍樊並蘇令事見上卷永始三年陳勝項梁事見七卷秦二世元年夏户雅翻下同安危之分界宗廟之至憂師古曰分音扶問翻臣永所以破膽寒心豫言之累年下有其萌然後變見於上見賢遍翻可不致慎禍起細㣲姦生所易易輕也忽也言姦生于所輕忽也易以豉翻願陛下正君臣之義無復與羣小媟黷宴飲師古曰媟狎也音私列翻黷汚也復扶又翻下同勤三綱之嚴師古曰三綱君臣父子夫婦也余按君為臣綱父為子綱夫為婦綱所謂嚴也修後宫之政抑逺驕妬之寵崇近婉順之行逺於願翻近其靳翻行下孟翻朝覲法駕而後出朝直遥翻陳兵清道而後行無復輕身獨出飲食臣妾之家三者既除内亂之路塞矣三者謂㣲行崇飲好色也塞悉則翻諸夏舉兵萌在民饑饉而吏不恤興於百姓困而賦歛重發於下怨離而上不知永書曰諸夏舉兵以大角為期盖言已有其萌而将至於興發也歛力贍翻傳曰饑而不損兹謂泰厥咎亡師古曰洪範傳之辭余按五行志盖京房易傳之辭也比年郡國傷於水災禾麥不收禾粟苖也又稼之摠名比毗至翻宜損常税之時謂此時宜減税也而有司奏請加賦甚繆經義逆於民心市怨趨禍之道也趨讀曰趣與促同臣願陛下勿許加賦之奏益减奢泰之費流恩廣施施式豉翻振贍困乏勅勸耕桑以慰綏元元之心諸夏之亂庶幾可息贍而艷翻幾居希翻又巨衣翻中壘校尉劉向武帝置中壘校尉掌北軍壘門之内又外掌西域八校尉之首也上書曰臣聞帝舜戒伯禹毋若丹朱傲師古曰事見虞書后稷篇丹朱堯子也敖讀曰傲仲馮曰此禹戒舜之語非舜戒禹之辭也上時掌翻周公戒成王毋若殷王紂商書無逸篇周公戒成王曰毋若殷王紂之迷亂酗于酒徳哉聖帝明王常以敗亂自戒不諱廢興故臣敢極陳其愚唯陛下留神察焉謹案春秋二百四十二年日食三十六師古曰従隠公元年至哀公十四年獲麟凡二百四十二年日食三十六謂隠三年二月己巳桓三年七月壬辰朔十七年十月朔荘十八年三月二十五年六月辛未朔二十六年十二月癸亥朔三十九九月庚午朔僖五年九月戊申朔十二年三月庚午十五年五月文元年二月己亥朔十五年六月辛丑朔宣八年七月甲子十年四月丙辰十七年六月癸邜成十六年六月丙寅朔十七年十二月丁巳朔襄十四年二月乙未朔十五年秋八月丁巳二十年冬十月丙辰朔二十一年九月庚戌朔冬十月庚辰朔二十三年二月癸酉朔二十四年秋七月甲子朔八月癸巳朔二十七年冬十二月乙亥朔昭七年夏四月甲辰朔十五年六月丁巳朔十七年六月甲戌朔二十一年秋七月壬午朔二十二年十二月癸酉朔二十四年夏五月乙未朔三十一年十二月辛亥朔定五年正月辛亥朔十二年卜一月丙寅朔十五年八月庚辰朔也今連三年比食比毗至翻自建始以來二十嵗間而八食率二嵗六月而一發古今罕有建始三年十二月戊申朔河平元年四月癸亥晦三年八月乙邜晦四年三月癸丑朔陽朔元年二月丁未晦永始二年二月乙酉晦三年正月己邜晦四年七月辛未晦凡八食而是年春正月己亥又不預此數異有小大希稠占有舒疾緩急觀秦漢之易世覽恵昭之無後察昌邑之不終視孝宣之紹起皆有變異著於漢紀天之去就豈不昭昭然哉按向書曰秦始皇之末至二世時日月薄食山林淪亡星辰出於四孟太白經天而行無雲而雷枉矢夜光熒惑襲月㜸火燒宫野禽戲庭都門内崩長人見臨洮石隕於東郡星孛大角大角以亡及項籍之敗亦孛大角漢之入秦五星聚於東井得天下之象也孝恵時有雨血日食於衝滅光星見之異孝昭時有太山卧石自立上林僵桞復起大星如月西行衆星隨之此為特異孝宣興起之表天狗夹漢而西乆隂不雨者二十餘日昌邑不終之異也臣幸得託末屬誠見陛下寛明之徳冀銷大異而興髙宗成王之聲向書曰髙宗成王亦有雊雉拔木之變能思其故故髙宗有百年之福成王有復風之報向之所以望帝者如此以崇劉氏崇増髙也謂増髙劉氏之業愈巍巍也故懇懇數奸死亡之誅師古曰懇懇欲誠之意也奸犯也數所角翻奸音千天文難以相曉臣雖圗上猶須口説然後可知願賜清燕之閒指圗陳状上輒入之師古曰謂召入也上時掌翻閒讀曰閑又如字上輙之上如字然終不能用也傳考異曰向云星孛東井岷山崩向懐不能已上此奏按岷山崩在三年此奏云自建始以來二十嵗間而食八率二嵗六月而一發則上此奏當在今年也胡旦亦載之三年若余按劉向傳若以星孛東井為據則上奏當在今年以岷山崩為據則上奏當在三年若以二十嵗間日八食為據則上奏當在去年然向言日食之變率二嵗六月而一發以班書考之自建始三年十二月至河平元年四月則一年五月而食至四年三月癸丑朔則纔一年而食又至陽朔元年二月丁未晦則又期年而食永始元年九月丁巳晦志書食而紀不書至二年二月乙酉晦則凡九期而志所書永始元年九月丁巳晦不計也又至永始三年正月己卯晦則未及一期而食又至四年七月辛未晦則一年六月而食向所謂率二嵗六月而一發亦通二十嵗而約言之耳自建始三年至今年以紀考之則九食以志考之則十食此其差異又未有所折衷也紅陽侯立舉陳咸方正對䇿拜為光禄大夫給事中丞相方進復奏咸前為九卿坐為貪邪免咸免見上卷永始二年復扶又翻不當䝉方正舉備内朝臣孟康曰内朝中朝也大司馬前後左右将軍侍中常侍散騎諸吏給事中為中朝官丞相以下至六百石為外朝官也并劾紅陽侯立選舉故不以實漢制列侯選舉不以實削封户劾户槩翻下同有詔免咸勿劾立十二月乙未王商為大将軍辛亥商薨其弟紅陽侯立次當輔政先是立使客因南郡太守李尚占墾草田數百頃先悉薦翻據孫寳傳占墾草田頗有民所假少府陂澤略皆開發師古曰隠度而取之也草田荒田也舊為陂澤本屬少府其後以假百姓百姓皆已田之而立摠謂為草田占云新自墾占音之贍翻百畆為頃上書以入縣官師古曰立上書云新墾得此田請以入官也貴取其直一億萬以上師古曰直價直也貴者増於時價丞相司直孫寳發之上由是廢立而用其弟光禄勲曲陽侯根庚申以根為大司馬驃騎将軍紀考異曰荀云十一月成紀云十二月按是嵗十一月甲子朔無乙未辛亥庚申荀悦誤今按考異又有揚雄待詔一條注云雄傳云車騎将軍王音竒其文雅薦雄待詔按雄自序云上方郊祠甘泉泰畤召雄待詔承明之庭奏甘泉賦其十二月奏羽獵賦事在今年時王音卒已乆盖王根也胡旦遂誤以為曲陽侯云余按曲陽侯即王根也王音則封安陽侯特進安昌侯張禹請平陵肥牛亭地師古曰肥牛亭名禹欲得置亭之處為冢塋曲陽侯根争以為此地當平陵寝廟衣冠所出游道宜更賜禹它地請别以地賜之更工衡翻上不従卒以賜禹卒子恤翻根由是害禹寵數毁惡之數所角翻下同師古曰惡謂言其過惡依顔注惡當讀如字後凡毁惡之惡皆同音天子愈益敬厚禹每病輙以起居聞師古曰謂其飲食寝卧之増損車駕自臨問之上親拜禹牀下禹頓首謝恩禹小子未有官禹數視其小子上即禹牀下拜為黄門郎給事中即就也禹雖家居以特進為天子師國家每有大政必與定議師古曰與讀曰豫余謂與讀如字言天子與禹定其可否也時吏民多上書言災異之應譏切王氏専政所致上時掌翻上意頗然之未有以明見未能灼見人言之當否也乃車駕至禹弟弟與第同舎也宅也辟左右師古曰辟讀曰闢親問禹以天變因用吏民所言王氏事示禹禹自見年老子孫弱又與曲陽侯不平恐為所怨則謂上曰春秋日食地震或為諸侯相殺夷狄侵中國為于偽翻災變之意深逺難見故聖人罕言命不語怪神師古曰罕稀也論語云子罕言利與命與仁又曰子不語怪力亂神性與天道自子貢之屬不得聞師古曰論語稱子貢曰夫子之言性與天道不可得而聞也謂孔子未嘗言性命及天道何况淺見鄙儒之所言陛下宜修政事以善應之與下同其福喜漢書張禹傳喜作善此經義意也新學小生亂道誤人宜無信用以經術斷之斷丁亂翻上雅信愛禹由此不疑王氏元帝師蕭望之成帝師張禹皆敬重之矣元帝不能聴望之言疎許史而去恭顯成帝則聴禹言而不疑王氏望之以此殺身禹以此茍富貴漢祚中衰實由此也又成帝之時吏民猶譏切王氏平帝之末吏民以王莽不受新野田上書者至四十八萬七千五百七十二人何元帝之時吏民猶忠於漢平帝之時吏民則附王氏也政自之出乆矣人心能無従之乎有國家者尚監兹哉後曲陽侯根及諸王子弟聞知禹言皆喜説遂親就禹張氏安矣劉氏危矣説讀曰悦故槐里令朱雲元帝時雲為槐里令坐論石顯廢錮故稱故上書求見見賢遍翻公卿在前雲曰今朝廷大臣上不能匡主下無以益民皆尸位素餐師古曰尸主也素空也尸位者不舉其事但主其位而已素餐者徳不稱官空食禄當孔子所謂鄙夫不可與事君茍患失之亡所不至者也師古曰論語所載孔子之言也茍患失其寵禄則言行僻邪無所不至也謹案孔子曰鄙夫可與事君也與哉其未得之也患得之既得之患失之茍患失之無所不至矣亡與無同臣願賜尚方斬馬劒師古曰尚方少府之屬官也作供御器物故有斬馬劒劒利可以斬馬斷佞臣一人頭以厲其餘斷丁管翻上問誰也對曰安昌侯張禹上大怒曰小臣居下訕上盖引用論語惡居下流而訕上之言師古曰訕謗也音所諌翻又音刪廷辱師傅罪死不赦御史将雲下雲攀殿檻檻折師古曰檻軒前欄也折而故翻雲呼曰臣得下従龍逢比干遊於地下足矣師古曰呼呌也音火故翻龍逢桀臣王子比干紂臣皆以諫而死故云然逢音皮江翻未知聖朝何如耳師古曰言殺直臣其聲惡余謂雲盖言亦将如夏殷之亡也朝直遥翻下入朝同毎朝同御史遂将雲去将如字挟也攜也於是左将軍辛慶忌免冠解印綬叩頭殿下曰此臣素著狂直於世師古曰著表也言此名乆已章表使其言是不可誅其言非固當容之臣敢以死争慶忌叩頭流血上意解然後得已言殺雲之事得止也及後當治檻治直之翻上曰勿易因而輯之以旌直臣師古曰輯與集同謂補合之也旌表也匈奴搜諧單于将入朝未入塞病死弟且莫車立為車牙若鞮單于以囊知牙斯為左賢王單音蟬且子余翻車尺遮翻鞮丁奚翻北地都尉張放到官數月復徵入侍中復扶又翻下同太后與上書曰前所道尚未效張晏曰謂太后言班侍中大将軍所舉宜寵異之詳上卷永始二年見富平侯反復來其能黙虖如淳曰富平侯張放又來太后安能黙然不以為言上謝曰請今奉詔上於是出放為天水屬國都尉地理志天水屬國都尉治勇土縣張少府許商光禄勲師丹為光禄大夫姓譜師古者掌樂之官因以為氏班伯為水衡都尉並侍中皆秩中二千石每朝東宫常従従才用翻及大政俱使諭指於公卿使傳上指以諭公卿也上亦稍厭游宴復修經書之業上為太子時好經書及即位幸酒樂宴樂今出放等復修經書業太后甚悦是嵗左将軍辛慶忌卒慶忌為國虎臣爪牙扞禦之臣曰虎臣遭世承平匈奴西域親附敬其威信二年春正月上行幸甘泉郊泰畤三月行幸河東祠后土既祭行遊龍門師古曰龍門山在今蒲州龍門縣北登歴觀晋灼曰歴觀在河東蒲反縣師古曰歴山上有觀觀音古玩翻陟西岳而歸陟登也師古曰西岳華山也夏四月立廣陵孝王子守為王廣陵孝王霸厲王胥之子也元帝初元二年紹封傳子意孫護人薨無後今立守以紹封考異曰荀紀守作憲今従漢書初烏孫小昆彌安日為降民所殺諸翖侯大亂降户江翻翖許及翻詔徵故金城太守段㑹宗為左曹中郎将光禄大夫使安輯烏孫陽朔中㑹宗復為西域都護終更而還以擅發戊巳校尉兵迎康居降者不遂劾乏興詔以贖論拜金城太守以病免故曰故金城太守守式又翻立安日弟末振将為小昆彌服䖍曰末振将人姓名師古曰其名也昆彌之弟不可别舉姓也兄考異曰烏孫傳以末振将為安日弟段㑹宗傳以為兄字誤耳定其國而還還従宣翻又如字時大昆彌雌栗靡勇健末振将恐為所并使貴人烏日領詐降刺殺雌栗靡刺七亦翻漢欲以兵討之而未能遣中郎将段㑹宗立公主孫伊秩靡為大昆彌公主謂楚主解憂也公主之孫于雌栗靡為季父乆之大昆彌翖侯難栖殺末振将安日子安犂靡代為小昆彌漢恨不自誅末振将復遣段㑹宗發戊巳校尉諸國兵復扶又翻校户教翻即誅末振将太子番丘即就也師古曰番音盤㑹宗恐大兵入烏孫驚番丘亡逃不可得即留所發兵墊婁地服䖍曰墊音墊阸之墊鄭氏曰婁音羸師古曰墊音丁念翻婁音樓選精兵三十弩李竒口三十人人持一弩徑至昆彌所在召番丘責以末振将之罪即手劒擊殺番丘手執劒曰手劒記檀弓曰子手弓子射諸手守又翻官屬以下驚恐馳歸小昆彌安犁靡勒兵數千騎圍㑹宗㑹宗為言來誅之意為言奉天子命來誅番丘之意為于偽翻今圍守殺我如取漢牛一毛耳司馬遷答任安書假令僕伏法受誅若九牛亡一毛與螻蟻何異自諭其身甚㣲也宛王郅支頭縣槀街宛王事見二十一卷武帝太初三年郅支事見二十九卷元帝建昭三年宛於元翻烏孫所知也昆彌以下服曰末振将負漢誅其子可也獨不可告我令飲食之邪師古曰飲於禁翻食讀曰飤下同㑹宗曰豫告昆彌逃匿之為大罪謂豫以誅番丘之事告昆彌昆彌以叔姪之情必使番丘逃匿漢欲誅之而昆彌匿之則於漢為有大罪也即飲食以付我傷骨肉恩若飲食之而使之就死則於骨肉為傷恩故不先告昆彌以下號泣罷去號户刀翻㑹宗還奏事天子賜㑹宗爵闗内侯黄金百斤㑹宗以難栖殺末振将奏以為堅守都尉烏孫有大将都尉各一人以難栖能為雌栗靡復讐堅守臣節異於諸翖侯故以堅守二字寵之責大禄大監以雌栗靡見殺状奪金印紫綬更與銅墨云宣帝甘露三年大禄大監賜金印紫綬末振将弟卑爰疐師古曰疐音竹二翻本共謀殺大昆彌将衆八萬北附康居謀欲借兵兼并昆彌卑爰疐自此彊其後都護孫建襲殺之将即亮翻漢復遣㑹宗與都護孫建并力以備之復扶又翻下同自烏孫分立兩昆彌漢用憂勞且無寧嵗分立兩昆彌見二十七卷宣帝甘露元年時康居復遣子侍漢元帝時康居遣子入侍陳湯上言其非王子今復遣子入侍貢獻既遣子入侍而又奉貢也都護郭舜上言此時郭舜為都護平帝元始閒孫建始為都䕶上時掌翻本匈奴盛時非以兼有烏孫康居故也及其稱臣妾非以失二國也言匈奴之强弱不繫二國之叛服漢雖皆受其質子然三國内相輸遺交通如故三國謂匈奴烏孫康居質音致遺于季翻亦相侯司司讀曰伺見便則發合不能相親信離不能相臣役以今言之結配烏孫竟未有益反為中國生事謂自武帝以來以宗室女下嫁烏孫也為于偽翻然烏孫既結在前今與匈奴俱稱臣義不可距而康居驕黠訖不肯拜使者師古曰訖竟也黠户八翻都䕶吏至其國坐之烏孫諸使下王及貴人先飲食已乃飲啗都尉吏師古曰飲音于禁翻啗音徒濫翻故為無所省以夸旁國師古曰言故不省視漢使也余謂夸者自矜耀其能傲漢也旁國隣國也省悉并翻以此度之何故遣子入侍其欲賈市為好辭之詐也謂特欲行賈以市易其為好辭者詐也度徒洛翻賈音古匈奴百蠻大國師古曰於百蠻中最大國也今事漢甚備聞康居不拜且使單于有悔自卑之意師古曰言單于見康居不事漢以為髙自以事漢為太卑而悔之也宜歸其侍子絶不復使師古曰不通使於其國也使疏吏翻以章漢家不通無禮之國章顯著也漢為其新通為于偽翻重致逺人師古曰以此聲名為重也終羈縻不絶三年春正月丙寅蜀郡岷山崩地理志岷山在蜀郡湔氏道西徼外禹貢所謂岷山導江即此山也水經注曰岷山即瀆山水曰瀆水亦曰汶阜山在氐道徼外江水所導也大江泉源發羊膊嶺下縁崖散漫小大百數殆未濫觴東南下百餘里至白馬嶺西歴天彭闗亦謂之天谷天彭山兩山相對其髙若闕謂之天彭門江水自此以上至㣲弱所謂其源濫觴者也漢延元中岷山崩壅江水三日不流即其處岷音武申翻壅江三日江水竭劉向大惡之惡音烏路翻惡其徵異也曰昔周岐山崩三川竭而幽王亡周幽王二年三川竭岐山崩師古曰三川涇渭洛也洛即漆沮也余按幽王時有是異後卒為犬戎所殺岐山者周所興也周自太王避狄去豳而邑于岐山之下周之王業遂興于此漢家本起於蜀漢髙帝始王漢中起兵還定三秦誅項羽遂有天下今所起之地山崩川竭星孛又及攝提大角従參至辰天文志房南衆星曰騎官左角理右角将大角者天王帝坐庭其兩旁各有三星鼎足句之曰攝提攝提者直斗扚所指以建時節故曰攝提格晋天文志參十星千辰在申至辰者至大火也自氐五度至尾九度為大火于辰在卯如淳曰孛星尾長及攝提大角始發于參至辰也孛蒲内翻參疏簪翻殆必亡矣二月丙午封淳于長為定陵侯恩澤侯表定陵侯國於汝南三月上行幸雍祠五畤上将大誇胡人以多禽獸秋命右扶風發民入南山西自褒斜師古曰褒斜南山二谷名余按自秦川逕南山通漢中南谷曰褒北谷曰斜徑五百里斜余遮翻東至𢎞農長安南山連延東至𢎞農今商虢二州之山皆是也南敺漢中敺與驅同張羅罔罝罘罔與網同古字通用罝音咨邪翻兎罟也罘音房尤翻翻車大網也捕熊羆禽獸熊似豕而大黒色羆似熊黄白色被髪人立而絶有力載以檻車輸之長楊射熊館師古曰長楊宫中有射熊館以罔為周阹李竒曰阹遮禽獸圍陳也師古曰阹音袪縦禽獸其中令胡人手搏之自取其獲上親臨觀焉二考異曰成紀元延年冬行幸長楊宫従胡客大校獵宿萯陽宫賜従官胡旦用之按揚雄傳祀甘泉河東之嵗十二月羽獵雄上校獵賦明年従至射熊館還上長楊賦然則従胡客校獵當在今年紀因去年冬有羽獵事致此誤耳四年春正月上行幸甘泉郊泰畤中山王興定陶王欣皆來朝興帝少弟欣帝弟定陶共王康之子朝直遥翻中山王獨従傅定陶王盡従傅相中尉師古曰三官皆従王入朝相息亮翻上怪之以問定陶王對曰令諸侯王朝得従其國二千石傅相中尉皆國二千石故盡従之上令誦詩通習能説師古曰説其義也佗日問中山王獨従傅在何法令不能對令誦尚書又廢師古曰中忘之也法令力政翻令誦力呈翻及賜食於前後飽起下韈係解師古曰食而獨在後飽及起又韈係解也韈音武伐翻余謂賜食於君前禮主於敬食而獨後又致飽而止皆非敬也及起而降階韈係解而不知是皆不能執禮夫禮所以固人肌膚之㑹筋骸之束也韈足衣也係所以結韈帝由此以為不能而賢定陶王數稱其材數所角翻是時諸侯王唯二人於帝為至親定陶王祖母傅太后隨王來朝傅太后元帝傅昭儀定陶共王母也隨共王就國為定陶太后私賂遺趙皇后昭儀及票騎将軍王根遺于季翻票匹妙翻后昭儀根見上無子亦欲豫自結為長乆計皆更稱定陶王迭互稱其材美也師古曰更工衡翻勸帝以為嗣帝亦自美其材為加元服而遣之師古曰為之冠也為于偽翻時年十七矣三月上行幸河東祠后土隕石于闗東二據漢書闗東當作都闗師古曰都闗山陽之縣王根薦谷永徵入為大司農自北地太守徵入永前後所上四十餘事上時掌翻略相反覆専攻上身與後宫而已黨於王氏上亦知之不甚親信也為大司農嵗餘病滿三月上不賜告即時免故事公卿病輒賜告上以其黨於王氏故即時免數月卒史終言之綏和元年春正月大赦天下上召丞相翟方進御史大夫孔光右将軍亷褒後将軍朱博入禁中票騎将軍王根先勸帝立定陶王為嗣漢書孔光傳先書根勸立定陶王事下即書召方進光褒博入禁中通鑑因之亦不言根今但以下文觀之根亦召入禁中也議中山定陶王誰宜為嗣者方進根褒博皆以為定陶王帝弟之子禮曰昆弟之子猶子也為其後者為之子也昆弟之子視猶子也以弟之子為兄後則為兄之子矣公羊春秋成十五年仲嬰齊卒此公孫嬰齊也曷為謂之仲嬰齊為兄後也為兄後則曷為謂之仲嬰齊為人後者為之子也為其子則其稱仲何孫以王父字為氏也定陶王宜為嗣光獨以為禮立嗣以親謂兄弟同父之親子其親親於兄弟之子以尚書盤庚殷之及王為比兄終弟及兄終弟及殷法也殷自外丙仲壬至於盤庚率多兄弟代立而尚書無文光所引盖今文尚書也師古曰比音必寐翻余謂當如字讀中山王先帝之子帝親弟宜為嗣上以中山王不材又禮兄弟不得相入廟父為昭子為穆則兄弟不得相入廟也不従光議二月癸丑詔立定陶王欣為皇太子封中山王舅諫議大夫馮參為宜鄉侯益中山國三萬户以慰其意師古曰以不得繼統為帝之後恐其怨恨使執金吾任宏守大鴻臚持節徵定陶王大鴻臚掌諸侯故任宏守大鴻臚之官以徵定陶王守者權守也任音壬臚陵如翻定陶王謝曰臣材質不足以假充太子之宫師古曰謙不言為太子故云假充若元非正余謂王謝意盖以将有皇嗣今為太子特假充耳臣願且得留國邸旦夕奉問起居謂昏定晨省記曰文王之為世子也朝於王季日三雞初鳴而衣服至于寝門外問内竪之御者曰今日安否如何内竪曰安文王乃喜及日中又至亦如之及暮再至亦如之其有不安節則内竪以告文王文王色憂行不能正履此旦夕問起居之禮也國邸謂定陶國邸也俟有聖嗣歸國守藩書奏天子報聞報聞報已覽其書而不従其請也戊午孔光以議不合意左遷廷尉何武為御史大夫光左遷廷尉而何武自廷尉為御史大夫初詔求殷後分散為十餘姓殷子姓也其後為宋為孔為華為戴為桓為向為樂等姓推求其嫡不能得匡衡梅福皆以為宜封孔子世為湯後匡衡議以為王者存三王後所以尊其先王而通三綂也其犯誅絶之罪者絶而更封他親為始封君上承其王者之始祖春秋之義諸侯不能守其社稷者絶今宋國已不守其綂而失國矣則宜更立殷後為始封君而上承湯統非當繼宋之絶侯也宜明得殷後而已今之故宋推求其嫡乆逺不可得雖得其嫡嫡之先已絶為不當得立禮孔子曰丘殷人也先師所傳宜以孔子世湯後此元帝時議也是時梅福復言之上従之封孔結為殷紹嘉侯恩澤侯表殷紹嘉侯國于沛三月與周承休侯皆進爵為公地各百里上行幸雍祠五畤初何武之為廷尉也公卿表元延三年何武自沛郡太守為廷尉是年三月戊午為御史大夫建言末俗之敝政事煩多宰相之材不能及古而丞相獨兼三公之事所以乆廢而不治也廢謂廢事也宜建三公官上従之夏四月賜曲陽侯根大司馬印綬置官屬罷票騎将軍官武帝初置大司馬以冠将軍之號宣帝地節三年置大司馬不冠将軍亦無印綬官屬今賜大司馬金印紫綬置官屬而大司馬為專官故根不復領票騎将軍以御史大夫何武為大司空封汜鄉侯武封汜鄉侯在琅邪不其縣後改食南陽博望鄉師古曰汜音凡其音基皆増奉如丞相如淳曰律大司馬大将軍與丞相奉月錢六萬御史大夫奉月四萬也奉讀曰俸以備三公焉秋八月庚戌中山孝王興薨匈奴車牙單于死弟囊知牙斯立為烏珠留若鞮單于烏珠留單于立以弟樂為左賢王輿為右賢王樂呼韓邪單于大閼氏之子輿弟五閼氏之子漢遣中郎将夏侯藩副校尉韓容使匈奴或説王根曰説輸芮翻匈奴有斗入漢地直張掖郡師古曰斗絶也地之斗曲入漢界者也直當也生竒材箭竿鷲羽師古曰鷲大鵰也黄頭赤目其羽可為箭竿音工旱翻鷲音就余按鷲羽可為箭翎也山海經曰景山多鷲黑色多力所謂皂鵰是也如得之於邉甚饒國家有廣地之實将軍顯功垂於無窮根為上言其利言得此地為中國利也為于偽翻下同上直欲従單于求之師古曰直猶正也余謂直徑直也為有不得傷命損威師古曰詔命不行為傷命余謂天子之命不行於夷狄為損中國之威根即但以上指曉藩令従藩所説而求之師古曰自以藩意説單于而求之説輸芮翻下同藩至匈奴以語次説單于曰語次交語之次也竊見匈奴斗入漢地直張掖郡漢三都尉居塞上士卒數百人寒苦候望乆勞張掖兩都尉一治日勒澤索谷一治居延又有農都尉治畨和是為三都尉師古曰澤音鐸索音先各翻如淳曰畨音盤單于宜上書獻此地直斷割之謂従直割地以其斗入者與漢也斷下管翻上時掌翻下同省兩都尉士卒數百人以復天子厚恩師古曰復亦報也其報必大師古曰漢得此地必厚報單于單于曰此天子詔語邪邪音耶疑未定之辭将従使者所求也藩曰詔指也然藩亦為單于畫善計耳為于偽翻單于曰此温偶駼王所居地也師古曰偶音五口翻駼音塗下同余按後漢書匈奴有温禺犢王班固燕然銘曰斬温禺以釁鼓血尸遂以染鍔意温偶即温禺也後人妄加禺旁従人耳當讀曰禺未曉其形状所生請遣使問之形状謂地形之夷險可割與不可割之状也師古曰所生謂山之所生草木鳥獸為用者藩容歸漢後復使匈奴復扶又翻至則求地單于曰父兄傳五世呼韓邪傳其長子復株絫復株絫傳其弟搜諧搜諧又傳其弟車牙車牙傳之囊知牙斯是為五世漢不求此地至知獨求何也單于名囊知牙斯王莽専政諷其慕中國不二名始名知史従簡便因以單名書于此已問温偶駼王匈奴西邉諸侯作穹廬及車皆仰此山材木師古曰謂諸小王為諸侯效中國之言耳仰音牛向翻且先父地不敢失也先父謂呼韓邪藩還遷太原太守單于遣使上書以藩求地状聞守式又翻使疏吏翻詔報單于藩擅稱詔従單于求地法當死更大赦二余按是年後至明年哀帝即位大赦又明年改元赦詔云更大赦二以此知夏侯藩再使匈奴必在建平初師古曰更經也音工衡翻今徙藩為濟南太守不令當匈奴濟子禮翻冬十月甲寅王根病免上以太子既奉大宗後不得顧私親按禮祖父以上正嫡相傳為大宗别子為祖繼别為宗繼禰者為小宗定陶王以帝弟之子入奉大宗後義不得復顧定陶共王親也十一月立楚孝王孫景為定陶王楚孝王囂宣帝之子太子議欲謝少傳閻崇以為人後之禮不得顧私親不當謝少詩照翻下少府同太傅趙𤣥以為當謝太子従之詔問所以謝状尚書劾奏𤣥左遷少府劾户槩翻以光禄勲師丹為太傅初太子之幼也王祖母傅太后躬自飬視在定陶國時也及為太子詔傅太后丁姬自居定陶國邸丁姬事定陶共王實生太子不得相見頃之王太后欲令傅太后丁姬十日一至太子家帝曰太子承正綂當共飬陛下漢亦稱太后為陛下後世多稱殿下唯臨朝乃稱陛下共音居用翻飬音弋尚翻不得復顧私親此私親謂傅太后丁姬復扶又翻下同王太后曰太子小而傅太后抱飬之今至太子家以乳母恩耳謂抱飬太子恩猶乳母也不足有所妨於是令傅太后得至太子家丁姬以不飬太子獨不得衛尉侍中淳于長有寵於上大見信用貴傾公卿外交諸侯牧守賂遺牧州牧也守郡守也遺于季翻下同賞賜累鉅萬滛於聲色滛過也放也許后姊孊為龍雒思侯夫人龍雒思侯韓寳増子也晋灼曰孊音靡余按韓寳已死故書謚謚法外内思索曰思追悔前過曰思寡居長與孊私通因取為小妻孊雖皇后之姊列侯之夫人以滛放失身於長而長自有正室故為小妻記曰聘則為妻奔則為妾婦人女子之持身不可不慎也許后時居長定宫許后廢徙昭臺宫嵗餘還徙長定宫師古曰三輔黄圗林光宫中有長定宫因孊賂遺長欲求復為媫妤長受許后金錢乗輿服御物前後千餘萬乗繩證翻詐許為白上立為左皇后許為于偽翻孊每入長定宫輙與孊書戲侮許后嫚易無不言師古曰嫚䙝汙也易輕也易音弋䜴翻交通書記賂遺連年時曲陽侯根輔政乆病數乞骸骨數所角翻長以外親居九卿位長太后姊子於帝室為外家之親次第當代根侍中騎都尉光禄大夫王莽心害長寵私聞其事莽侍曲陽侯病因言長見将軍乆病意喜自以當代輔政至對衣冠議語署置衣冠當時士大夫及貴游子弟也師古曰自謂當輔政故豫言某人為某官某人主某事具言其辠過根怒曰即如是何不白也莽曰未知将軍意故未敢言根曰趣白東宫東宫太后宫師古曰趣讀曰促莽求見太后具言長驕佚欲代曲陽侯私與長定貴人姊通受取其衣物太后亦怒曰兒至如此長太后姊子故呼為兒徃白之帝莽白上上以太后故免長官勿治罪遣就國就定陵侯國治直之翻初紅陽侯立不得輔政疑為長毁譖常怨毒長毒苦也痛也怨之甚也上知之及長當就國立嗣子融従長請車騎以長當就國所常従車騎無所用故請之師古曰嗣子謂嫡長子當為嗣者也長以珍寳因融重賂立立因上封事為長求留上時掌翻為于偽翻曰陛下既託文以皇太后故蘇林曰託於詔文也誠不可更有佗計師古曰言不宜遣長就國於是天子疑焉帝知立素怨長今為長上封事求留疑心於是而起下有司按驗下户稼翻下同吏捕融立令融自殺以滅口恐融就吏而事泄故令其自殺以滅口上愈疑其有大姦遂逮長繫洛陽詔獄凡詔所繫治皆為詔獄非必洛陽先有詔獄也窮治考鞠以窮其姦也長具服戲侮長定宫謀立左皇后辠至大逆死獄中妻子當坐者徙合浦母若歸故郡長母若即王太后姊故居魏郡元城師古曰若者其母名上使廷尉孔光持節賜廢后藥自殺丞相方進復劾奏紅陽侯立狡猾不道師古曰狡狂也猾亂也復扶又翻請下獄上曰紅陽侯朕之舅不忍致法遣就國于是方進復奏立黨友後将軍朱博鉅鹿太守孫閎皆免官與故光禄大夫陳咸皆歸故郡朱博杜陵人孫閎亦京師世家陳咸本沛郡相人㨿漢書翟方進傳則博閎免官獨咸歸故鄉耳與字皆字衍元延元年咸免光禄大夫故稱故咸自知廢錮以憂死方進智能有餘兼通文法吏事以儒雅縁飾師古曰縁飾譬之於衣加純縁者純音之允翻號為通明相相息亮翻天子器重之又善求人主㣲指㣲指謂上意所嚮未著見於外者奏事無不當意方淳于長用事方進獨與長交稱薦之據方進傳長初用事方進獨與長交及長寵盛與之交者不獨一方進也及長坐大逆誅上以方進大臣為之隠諱為于偽翻方進内慙上疏乞骸骨上時掌翻上報曰定陵侯長已伏其辜君雖交通傳不云乎朝過夕改君子與之師古曰與許也余謂此盖論語傳音直戀翻君何疑焉其専心壹志毋怠醫藥以自持方進起視事復條奏長所厚善京兆尹孫寳右扶風蕭育刺史二千石以上免二十餘人孫寳蕭育皆能吏也以急於求進比匪人以得罪是以君子慎交函谷都尉建平侯杜業素與方進不平函谷闗置都尉以譏出入業杜延年之孫平素不事權貴與翟方進淳于長皆不方進奏業受紅陽書聴請不敬免就國據業傳業與淳于長不平長當就國紅陽侯立與業書屬之勿復用前事相侵長出闗後罪復發下洛陽獄丞相史搜得紅陽侯書奏業聴請不敬服䖍曰受立屬請為不敬上以王莽首發大姦稱其忠直王根因薦莽自代丙寅以莽為大司馬時年三十八莽既拔出同列繼四父而輔政師古曰鳳商音根四人皆為大司馬而莽之諸父也欲令名譽過前人遂克己不倦聘諸賢良以為掾史賞賜邑錢悉以享士邑錢封邑所入之錢也掾俞絹翻愈為儉約母病公卿列侯遣夫人問疾莽妻迎之衣不曵地布蔽膝蔽膝鞸也亦曰􅀈鄭𤣥曰韍太古蔽膝之象見之者以為僮使問知其夫人此下依漢書有皆驚二字文意乃足它本皆有此二字其飾名如此丞相方進大司空武奏言春秋之義用貴治賤不以卑臨尊春秋首止之㑹殊㑹王世子世子貴也宋之盟楚駕晋而書先晋黄池之㑹吴主㑹而書先晋不以卑臨尊也治直之翻刺史位下大夫而臨二千石刺史六百石下大夫之秩也其朝位亦班于下大夫輕重不相準臣請罷刺史更置州牧以應古制古制九州一為畿内八州八伯以綂諸侯之國今請置州牧以應古州伯之制更工衡翻下同十二月罷刺史更置州牧秩二千石犍為郡於水濵得古磬十六枚師古曰濵水厓也音賔説文曰磬樂石也古者母句氏作磬後或以玉為之犍為言翻議者以為善祥劉向因是説上宜興辟雍記王制天子之學曰辟雍鄭𤣥曰辟明也雍和也所以明和天下説輸芮翻設庠序古者黨有庠遂有序庠者飬也序者教也陳禮樂隆雅頌之聲盛揖讓之名以風化天下如此而不治者未之有也治直吏翻或曰不能具禮師古曰或曰者劉向設為難者之言而後答釋也禮以飬人為本如有過差師古曰過差猶失錯也是過而飬人也刑罸之過或至死傷今之刑非臯陶之法也而有司請定法削則削筆則筆服䖍曰言隨君意也師古曰削者言有所刪去以刀削簡牘也筆者謂有所增益以筆就而書也救時務也至於禮樂則曰不敢是敢於殺人不敢於飬人也為其爼豆管絃之間小不備為于偽翻因是絶而不為是去小不備而就大不備惑莫甚焉為其不能具禮而廢禮是去小不備而就大不備也爼祭器如機盛牲體者也豆似籩亦所以盛肉籩用竹而豆用木管笙簫之屬也絃琴瑟之屬也夫教化之比於刑法刑法輕是舎所重而急所輕也師古曰舎廢也舍讀曰捨教化所恃以為治也刑法所以助治也治直吏翻今廢所恃而獨立其所助非所以致太平也自京師有誖逆不順之子孫師古曰誖乖也音布内翻至於䧟大辟受刑戮者不絶由不習五常之道也師古曰五常仁義禮智信人性之所常行也辟毗亦翻夫承千嵗之衰周繼暴秦之餘敝民漸漬惡俗貪饕險詖不閑義理漸子亷翻師古曰貪甚曰饕言行險曰詖饕音吐髙翻詖音皮義翻閑習也不示以大化而獨敺以刑罰敺讀與驅同終已不改帝以向言下公卿議下遐稼翻丞相大司空奏請立辟雍按行長安城南營表未作而罷師古曰營度地也表立標也行下孟翻時又有言孔子布衣飬徒三千人今天子太學弟子少詩沼翻於是増弟子貟三千人嵗餘復如故元帝設弟子貟千人劉向自見得信於上故常顯訟宗室譏刺王氏及在位大臣其言多痛切發於至誠上數欲用向為九卿數所角翻輙不為王氏居位者及丞相御史所持師古曰持謂扶持佐助也故終不遷居列大夫官前後三十餘年而卒後十三嵗而王氏代漢資治通鑑卷三十二
