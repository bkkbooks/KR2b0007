  - {type: variant, offset: 7286, length: 263, content: 漢地理志雲中郡治雲中縣酈道元曰雲中城東八十里有成樂城今雲中郡治一名石盧城又有後魏雲中宫在雲中故城東四十里虞氏記云趙武侯自五原河曲築長城東至陰山又於河西造一大城其一箱崩不就乃改卜隂山河曲而禱焉畫見羣鵠遊於雲中徘徊經日見大光在其下武侯曰此為我乎乃即其處築城今雲中故城是也又有芒于水出塞外南逕陰山東西千餘里芒于水又西南逕白道南谷口有城在右策帶長城背山面澤謂之白道自北出有髙阪謂之白道嶺芒于水又南西逕雲中城北新志雲州雲中縣有隂山道青坡道皆出兵路宋白曰漢雲中郡在唐勝州東北四十里榆林縣界雲中故城是也趙武侯所築漢五原故城亦在今勝州榆林縣界, SBCK: ''}
