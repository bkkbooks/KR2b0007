  - {type: variant, offset: 6846, length: 230, content: 舊志朔州馬邑郡治善陽縣漢定襄縣地有秦時馬邑城武周塞後魏置桑乾郡隋置善陽縣又隋志雲州定襄郡治大利城即文帝所築以處突厥啟民可汗者也李靖所襲破者當是此城唐謂之北定襄城又舊志曰雲州隋馬邑郡之雲内縣恒安鎮也貞觀十四年自朔州北定襄城移雲州及定襄縣置於此即後魏所都平城也開元二十年改定襄為雲中縣而武德四年已分忻州之秀容為定襄縣今見於九域志者忻州之定襄而北定襄自石晉割地入於北國其名晦矣宋祁曰古定襄城其地南大河北白道畜牧廣衍龍荒之最壤宋白曰朔州北三百餘里定襄故城後魏初之雲中也, SBCK: ''}
