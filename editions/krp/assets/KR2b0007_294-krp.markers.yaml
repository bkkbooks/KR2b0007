  - {type: variant, offset: 6898, length: 848, content: 之時兵部尚書張昭等議曰昔帝鴻氏之作樂也候八節之風聲測四時之正氣氣之清濁不可以筆授聲之善否不可以口傳故鳬氏鑄鍾伶倫截竹為律吕相生之筭宫商正和之音乃播之於管絃宣之於鐘石然後覆載之情訢合隂陽之氣和同八風從律而不奸五色成文而不亂空桑孤竹之韻足以禮神雲門大夏之容無虧觀徳然月律有旋宫之法備於太師之職經秦滅學雅道陵夷漢初制氏所調唯存鼔舞旋宫十二均更用之法世莫得聞漢元帝時京房善易别音探求古義以周宫均法每月更用五音乃至凖調旋相為宫成六十調又以日法析為三百六十傳於樂府而編懸復舊律吕無差遭漢中微雅音淪缺京房律凖屢有言者事終不成錢樂空記其名沈重但條其説六十律法寂寥不嗣梁武帝素精音律自造四通十二笛以叙八音又引古五正二變之音旋相為宫得八十四調與律凖所調音同數異侯景之亂其音又絶隋朝初定雅樂羣黨沮議厯載不成而沛公鄭譯因龜茲琵琶七音以飲月律五正二變七調克諧旋相為宫復為八十四調工人萬寶常又減其絲數稍令古淡隋髙祖不重雅樂令羣臣集議博士何妥駁奏其鄭萬所奏八十四調並廢隋代郊廟所奏惟黄鍾一均與五郊迎氣雜用蕤賔但七調而已其餘五鍾懸而不作三朝宴樂用縵樂九部迄於革命未能改更唐太宗爰命舊工祖孝孫張文收整比鄭譯寶常所均七音八十四調方得絲管並施鍾石俱奏七始之音復振四廂之韻皆調自安史亂離咸秦蕩覆崇牙樹羽之器掃地無餘戞擊搏拊之工窮年不嗣郊廟所奏何異南箕波蕩不還知音殆絶臣等竊以音之所起出自人心䕫曠不能長存人事不能常泰人亡則音息世亂則樂崩若不得知禮樂之情安明制作之本臣等據樞密使王朴條奏採京房之凖法練梁武之通音考鄭譯寶常之七均校孝孫文收之九變積黍累以審其度聴聲詩以測其情依權衡嘉量之前文得備數和聲之大㫖施於鍾虡足洽簫韶臣等今月十九日於太常寺集命太樂令賈峻奏王朴新法黄鍾調七均音律和諧不相凌越其餘十一管諸調望依新法教習以備禮寺施用其五郊天地宗廟社稷三廟大禮合用十二管諸調並載唐史開元禮近代常行廣順中太常卿邊蔚奉勅定前件祠祭朝會舞名樂曲歌詞寺司合有簿籍伏恐所定與新法曲調聲韻不叶請下太常寺檢詳校試若或乖舛請本寺依新法聲調别撰樂章舞曲令歌者誦習從, SBCK: ''}
