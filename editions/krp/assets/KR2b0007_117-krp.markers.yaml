  - {type: variant, offset: 0, length: 236, content: 欽定四庫全書資治通鑑卷一百十七宋司馬光撰胡三省音注晉紀三十九起旃蒙單閼盡柔兆執徐凡三年安皇帝壬義熈十一年春正月丙辰魏主嗣還平城至自伐柔然也太尉裕收司馬休之次子文寳兄子文祖竝賜死發兵擊之詔加裕黄鉞領荆州刺史庚午大赦丁丑以吏部尚書謝裕為尚書左僕射辛巳太尉裕發建康以中軍將軍劉道憐監留府事監工銜翻劉穆之兼右僕射事無大小皆決於穆之又以髙陽内史劉鍾領石頭戍事屯冶亭冶亭今謂之東冶亭在半山寺後自建康東門往蔣山至此半道因以為名王安石詩遙望鍾山岑因知冶城路陸游曰今天慶觀在冶城山之麓休之府, SBCK: ''}
