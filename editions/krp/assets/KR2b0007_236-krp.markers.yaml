  - {type: variant, offset: 10505, length: 304, content: 實考異曰録詳本曰叔文母將死前一日叔文以五十人擔酒饌入翰林讌李忠言劉光𤦺俱文珍及諸學士等中飲叔文執盞云云又曰羊士諤毁叔文叔文將杖殺之而韋執誼懦不敢劉闢以韋臯廹脅叔文求三川叔文平生不識闢叔文今日名位何如而闢欲前執叔文手豈非凶人邪叔文時已令掃木場將集衆斬之執誼又執不可毎念失此兩賊令人不快又自陳判度支已來所為國家興利除害出若干錢以為功能俱文珍隨語折之叔文無以對命滿酌雙巵對飲酒數行而罷方飲時有暫起至㕔側者聞叔文從人相謂曰母死已臰不欲棺歛方與人飲酒不知欲何所為歸之明日而其母死或傳母死數日乃發喪國史補曰王叔文以度支使設饌于翰林大宴諸閹䄂金以贈明日又至揚言聖人適于苑中射兎上下馬如飛敢有異議者腰斬其日丁母憂今從二本實録, SBCK: ''}
