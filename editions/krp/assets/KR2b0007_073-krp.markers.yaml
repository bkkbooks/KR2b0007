  - {type: variant, offset: 0, length: 224, content: 欽定四庫全書資治通鑑卷七十三宋司馬光撰胡三省音註魏紀五起旃䝉單閼盡彊圉大荒落凡三年烈祖明皇帝中之下青龍三年春正月戊子以大將軍司馬懿為太尉丁巳皇太后郭氏殂帝數問甄后死狀於太后甄后死見六十五卷文帝之黄初年數所角翻甄之人翻由是太后以憂殂漢楊儀既殺魏延事見上卷上年自以為有大功宜代諸葛亮秉政而亮平生宻指以儀狷狹宻指蓋亮宻以語諸僚佐特儀不知耳狷吉掾翻意在蔣琬儀至成都拜中軍師無所統領從容而已從千容翻初儀事昭烈帝為尚書琬時為尚書郎後雖俱為丞相參軍長史儀每從行當, SBCK: ''}
