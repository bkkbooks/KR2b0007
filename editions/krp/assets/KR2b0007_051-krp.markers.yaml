  - {type: variant, offset: 0, length: 246, content: 欽定四庫全書資治通鑑卷五十一宋司馬光撰胡三省音註漢紀四十三起旃䝉赤奮若盡昭陽作噩凡九年孝安皇帝下延光四年春二月乙亥下邳惠王衍薨甲辰車駕南廵三月戊午朔日有食之庚申帝至宛不豫宛於元翻書金縢王有疾弗豫孔安國注曰不悦豫乙丑帝發自宛丁夘至葉崩于乘輿葉式渉翻乘繩證翻年三十二皇后與閻顯兄弟江京樊豐等謀曰今晏駕道次賢曰晏晚也臣下不敢斥言帝崩猶言晚駕而出道次猶言路次也濟隂王在内邂逅公卿立之還為大害邂下廨翻逅户茂翻乃偽云帝疾甚徙御卧車所在上食問起居如故上時掌翻驅馳行四日庚午還宫自葉至雒陽六百餘里辛未遣司徒劉, SBCK: ''}
