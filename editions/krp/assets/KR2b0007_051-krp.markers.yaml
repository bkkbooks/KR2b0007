  - {type: variant, offset: 8446, length: 465, content: 洪氏𨽻釋曰東漢書鄧隲𫝊元二之災注云元二即元元也古書字當再讀者於上字之下為小二字當兩度言之後人不曉遂讀為元二或同之陽九或附之百六良由不悟致斯乖舛岐州石鼔銘凡重言者皆為二字明驗也趙氏云楊孟文石門碑漢威宗建和二年立其文有曰申遭元二橋梁斷絶若讀為元元則為不成文理疑當時自有此語漢注未必然也予按漢刻如北海相景君及李翊夫人碑之類凡重文皆以小二字贅其下此碑有烝烝明明蕩蕩世世勤勤亦不再出上一字然非若元二遂書為二大字也又孔耽碑云遭元二轗軻人民相食若作元元則下文不應言人民漢注之非明矣王充論衡曰今上嗣位元二之間嘉徳布流三年零陵生芝草五本四年甘露降五縣則論衡所云元二者葢謂即位之元年二年也鄧君𫝊云永初元年夏涼部叛羌揺蕩西州詔隲將羽林五校士擊之冬徴隲班師迎拜為大將軍帝紀班師在二年十一月𫝊有脱字也又云時遭元二之災人士荒饑盗賊羣起四夷侵叛隲崇節儉罷力役進賢士故天下復安則此𫝊所云元二者亦謂元年二年也安帝紀書兩年之間萬民饑流羌貊叛戾又與𫝊同此碑所云西戎虐殘橋梁斷絶正是鄧隲出師時則史𫝊碑碣皆與論衡合建初者章帝之始年永初者安帝之始年乃知東漢之文所謂元二者如此, SBCK: ''}
