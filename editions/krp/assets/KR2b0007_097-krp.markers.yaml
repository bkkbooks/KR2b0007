  - {type: variant, offset: 0, length: 230, content: 欽定四庫全書資治通鑑卷九十七宋司馬光撰胡三省音注晉紀十九起𤣥黓攝提格盡彊圉協洽凡六年顯宗成皇帝下咸康八年春正月己未朔日有食之作考異曰天文志乙未今從帝紀及長厯乙丑大赦豫州刺史庾懌以酒餉江州刺史王允之允之覺其毒飲犬飲於禁翻犬斃密奏之帝曰大舅已亂天下謂庾亮也小舅復欲爾邪復扶又翻二月懌飲鴆而卒卒子恤翻三月初以武悼后配食武帝廟楊皇后惠帝永康元年幽廢而死今乃得配食武帝庾翼在武昌數有妖怪數所角翻妖於驕翻欲移鎮樂鄉征虜長史王述與庾氷牋曰樂鄉去武昌千有餘里數萬之衆一旦移徙興, SBCK: ''}
