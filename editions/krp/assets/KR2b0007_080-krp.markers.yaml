  - {type: variant, offset: 2026, length: 334, content: 女考異曰江表傳曰張布有寵於皓而死皓厚葬之國人見葬太奢麗皆謂皓已死所葬者是也皓舅子何都顔状似皓故民間訛言都代立臨海太守奚熈信訛言舉兵欲還秣陵誅都都叔父植時為備海督擊殺熈夷三族訛言乃息又云奮本在章安徙還吳城禁錮使男女不得通婚或年三十四十不得嫁娶奮上表乞自比禽獸使男女自相配偶皓大怒遣察戰齎藥賜奮父子皆飲藥死裴松之按建衡二年至奮之死孫皓即位尚未久若奮未被疑之前男女年二十左右至奮死時不得年三十四十也若先已長大自失時未婚娶不由皓之禁錮矣此雖欲増皓之惡然非實理又吳志孫皓傳鳯凰三年㑹稽妖言奮為天子遂誅奚熈不言誅奮孫奮傳建衡二年左夫人王氏卒民間訛言遂誅奮及五子三十國晉春秋自皓納張布女至殺奮皆在天冊元年按奮若以建衡二年死不容至鳯凰三年㑹稽方冇訛言不知奮死果在何年今因奚熈之死終言之, SBCK: ''}
