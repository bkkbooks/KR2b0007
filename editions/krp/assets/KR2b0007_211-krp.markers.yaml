  - {type: variant, offset: 7128, length: 354, content: 麗力知翻􅎤奚結翻跌徒結翻帥讀曰率鉢考異曰實録二年九月壬子葛邏禄車鼻施失羅俟斤等十二人詣凉州内屬乙卯胡禄屋闕及首領等一千三百十一人來降十月庚辰胡禄二萬帳詣北庭内屬明年正月突厥葛邏禄下首領裴羅逹干來降二月突厥十姓部落左廂五咄陸啜右廂五弩失畢俟斤等相繼内屬前後二千餘帳三月突厥支副忌等來朝詔曰胡禄屋大首領之匐忌四月三姓葛邏禄率衆歸國五月詔葛邏禄胡屋䑕尼施等又云宜令北庭都䕶湯嘉恵與葛邏禄胡屋等相應安西都䕶吕休璟與䑕尼施相應又云及新來十姓大首領計㑹掎角唐厯九月云胡禄屋闕啜十月云胡禄屋二萬帳新傳前云胡禄屋後云胡屋按十姓有胡禄居闕啜鼠尼施處半啜諸書名號雖各參差要之葛邏胡禄屋鼠尼施為三姓必矣然胡禄屋以二萬帳而云十姓内屬前後二千餘帳參差難據今從舊傳余考新舊史時黙啜既破突騎施不能撫安西突厥十姓故來降而髙文簡則黙啜之子壻也, SBCK: ''}
