  - {type: variant, offset: 0, length: 330, content: 欽定四庫全書資治通鑑卷十七宋司馬光撰胡三省音註漢紀九起重光赤奮若盡强圉恊洽凡七年世宗孝武皇帝上之上荀悦曰諱徹之字曰通景帝中子也應劭曰禮諡法威强叡徳曰武建元元年自古帝王未有年號始起於此貢父曰封禪書云其後三年有司言元宜以天瑞命不宜以一二􅾌推所謂其後三年者盖盡元狩六年至元鼎三年也然元鼎四年方得寳鼎又無縁先三年稱之以此而言自元鼎以前之年皆有司所追命其實年號之起在元鼎故元封改元則始有詔書也冬十月詔舉賢良方正直言極諫之士上親䇿問以古今治道對者百餘人廣川董仲舒對曰道者所繇適於治之路也師古曰繇從也適往也治直吏翻繇古由字仁義禮樂皆其具也故聖王已没而子孫長久安寧數百嵗此皆禮樂教化之功也夫人君莫不欲安存而政亂國危者甚衆所任者非其人而所繇者非其道是以政日以仆滅也夫周道衰於幽厲, SBCK: ''}
