  - {type: variant, offset: 9581, length: 1208, content: 之考異曰始建宿衛時嘗領壁州刺史光啓三年四月已出為利州刺史而舊紀薛居正五代史實録新紀皆云以壁州刺史攻成都誤也張􅒷耆舊傳曰光啓四年戊申十月十日田軍容除西川監軍使此月到十一月一日僖宗皇帝晏駕昭宗即位改文徳元年文徳二年己酉太師有除未下聞朝廷降使三軍百姓僧道詣驛就使車訴論二十年鐵劵有一人驛亭截耳時有微雨卧蹍於泥天使視之無言良乆曰不必不必索馬揮鞭便發太師軍容専差親信於人衆中探使有何言既聞二人神色俱喪乃理兵講武更創置三都黄頭都以親密者管之諸軍頻閲隊十月探知朝廷除韋相公授西川節度使已宣麻軍容甚有懼色乃以書召閬州王司徒計其過綿州即出兵拒之令其怒怒必攻諸州所在出兵交戰此是軍容計恐韋相公來交代以兵隔之言王司徒來侵我我所舉兵葢與王氏相敵欲遮其反名十二月二十日驅人上城一更出兵數千人排於城外北向堤上二十一日王司徒大軍已至城下於城北街去來鬭數合已時川軍被一時築過橋堤上排者大走並收入城至暮王司徒收軍宿七里亭二十二日早又進軍逼城至午又退止七里亭二十三日早引軍入新繁濛陽諸縣界城内出軍日有相持此年十一月改元龍紀元年己酉二月二十五日大戰三郊郊當作交乃各下數寨相守所至縣邑大遭焚燒户口逃竄十國紀年曰王建起兵攻成都諸書嵗月不同葢建事成之後其徒以擅舉兵為恥為之隠惡襲據閬州多言除移尤諱光啓末㓂西川攻陳敬瑄事或移在文徳年韋昭度鎮蜀敬瑄不受代後或云朝廷削奪敬瑄官爵建始㑹昭度討伐皆若受命勤王之師故李昊蜀書毛文錫紀事張彭錦里耆舊傳楊堪平蜀徳政碑吳融生祠堂碑馮涓大㕔壁記收復卭州壁記皆當時撰錄而自相抵牾吳融云嵗在作噩之年相國韋公奉命代蜀又云聖上即位之明年詔大丞相韋公鎮蜀起兵屬丞相以討不庭尋拜公永平節度兼都指揮使今按舊僖宗紀光啟三年十二月東川顧彦朗壁州刺史王建連兵五萬攻成都陳敬瑄告難於朝詔中使諭之唐年補録光啟三年十二月以西川陳敬瑄東川顧彦朗相持詔李茂貞移書和解與唐莊宗功臣列傳唐烈祖實録五代史王建傳莊宗實録范質五代通録王衍傳所載略同韋昭度以文徳元年六月始除西川節度使十月至成都陳敬瑄不受代昭度表敬瑄叛十二月丁亥除昭度招討使王建永平節度使據長厯是年十二月甲子朔丁亥二十四日也龍紀元年丁酉嵗正月詔命始至成都吳融据昭度受招討使嵗月故云作噩之年伐蜀是嵗乃昭宗即位之明年韋公鎮蜀在前一年葢融誤以伐蜀為鎮蜀耳舊紀云文徳元年六月以韋昭度為西川節度兩川招撫制置使新書昭宗本紀文徳元年十月陳敬瑄反十二月丁亥韋昭度為招討使皆是也而舊紀誤云龍紀元年正月除昭度東都留守五月王建陷成都自稱留後新書陳敬瑄傳全用張􅒷耆舊傳云先除昭度節度使然後田令孜召建以限朝廷與本紀及韋昭度傳自相違戾最為差繆張􅒷自言年僅八十追記為兒童以來平生見聞為耆舊傳故其叙事鄙俚倒錯與舊史年月不相符合今從五代史王建傳又新紀文徳元年六月王建陷漢州執刺史張頊實録龍紀元年正月建破鹿頭闗張頊來拒戰敗之按光啟三年十二月韋昭度討陳敬瑄以漢州刺史顧彦暉為軍前指揮使葢其年冬建破漢州顧彦朗即以彦暉為刺史新紀實録皆誤今從十國紀年, SBCK: ''}
