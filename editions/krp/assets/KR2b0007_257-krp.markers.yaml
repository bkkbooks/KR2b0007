  - {type: variant, offset: 5856, length: 316, content: 士考異曰編遺録八月丙午都指揮使朱珍以諸都將日有逃逸者初未曉其端今乃知為鄆帥朱瑄因前年與我師㑹合討伐蔡㓂睹將士驍勇潛有窺覬之心密於境上懸金帛招誘如至者皆厚而納焉積亡既多上察之且不平是事因移文追索亡者朱瑄來言不遜上益怒其欺罔乃議舉兵伐之新傳全忠與朱瑄情好篤密而内忌其雄且所據皆勁兵地欲造怨乃圖之即聲言瑄納汴亡命移書讓瑄以新有恩於全忠故答檄恚望全忠由是顯結其隙高若拙後史補曰梁太祖皇帝到梁園深有大志然兵力不足常欲外掠又虞四境之難每有鬱然之狀時有薦敬秀才於門下乃白梁祖曰明公方欲圖大事輕重必為四境所侵但令麾下將士詐為叛者而逃即明公奏於主上及告四鄰以自襲叛徒為名梁祖曰天降竒人以佐於吾初從其謀一出而致聚十倍葢翔為温畫策詐令軍士叛歸瑄以為舋端也, SBCK: ''}
