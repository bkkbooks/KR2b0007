  - {type: variant, offset: 0, length: 221, content: 欽定四庫全書資治通鑑卷九十九宋司馬光撰胡三省音註晉紀二十一起重光大淵獻盡閼逢攝提格凡四年孝宗穆皇帝中之上永和七年春正月丁酉日有食之苻健左長史賈𤣥碩等請依劉僃稱漢中王故事事見六十八卷漢獻帝建安二十四年表健爲都督關中諸軍事大將軍大單于秦王𤣥碩欲表言之於晉朝單音蟬健怒曰吾豈堪爲秦王邪且晉使未返使疏吏翻我之官爵非汝曹所知也旣而密使梁安諷𤣥碩等上尊號上時掌翻健辭讓再三然後許之丙辰健即天王大單于位苻健字建業洪第三子國號大秦大赦改元皇始追尊殳洪爲武惠皇, SBCK: ''}
