  - {type: variant, offset: 0, length: 306, content: 欽定四庫全書資治通鑑卷三十九宋司馬光撰胡三省音註漢紀三十一起昭陽協洽盡閼逢涒灘凡二年淮陽王諱𤣥字聖公光武族兄也帝王世紀曰舂陵戴矦熊渠生蒼梧太守利利生子張子張生𤣥後敗降赤眉光武詔封為淮陽王更始元年更工衡翻是年二月即位改元春正月甲子朔漢兵與下江兵共攻甄阜梁丘賜斬之甄之人翻殺士卒二萬餘人王莽納言將軍嚴尤秩宗將軍陳茂引兵欲據宛宛於元翻劉縯與戰于淯陽下續漢志淯陽縣屬南陽郡賢曰故城在今鄧州南陽縣南淯水之陽因名淯音育大破之遂圍宛先是青徐賊衆雖數十萬人訖無文書號令旌旗部曲師古曰文謂文章號謂大位號也一曰號謂號令也先悉薦翻及漢兵起皆稱將軍攻城略地移書稱說稱說者數莽之罪也莽聞之始懼舂陵戴矦曽孫𤣥在平林兵中號更始將軍更工衡翻時漢, SBCK: ''}
