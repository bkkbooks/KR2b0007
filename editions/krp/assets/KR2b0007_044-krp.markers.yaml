  - {type: variant, offset: 0, length: 322, content: 欽定四庫全書資治通鑑巻四十四宋司馬光撰胡三省音註漢紀三十六起強圉協洽盡上章涒灘凡十四年世祖光武皇帝下建武二十三年春正月南郡蠻叛郡國志南郡在雒陽南一千五百里蠻即縁沔諸山蠻也杜佑曰時南郡潳山蠻反劉尚討破之徙其種人七千餘口置江夏界中其後沔中蠻是也遣武威將軍劉尚討破之夏五月丁卯大司徒蔡茂薨秋八月丙戍大司空杜林薨九月辛未以陳留玉況為大司徒賢曰玉音肅姓也冬十月丙申以太僕張純為大司空武陵蠻精夫相單程等反秦昭王使白起伐楚畧取蠻夷始置黔中郡漢興改為武陵范書曰長沙武陵蠻名渠帥曰精夫槃瓠之後也遣劉尚發兵萬餘人泝沅水入武谿擊之賢曰沅水出牂柯故且蘭東北經辰州潭州岳州經洞庭湖入江武谿在今辰州盧谿縣西百八十里即五谿之一也沅音元尚輕敵深入蠻乗險邀之尚一軍悉沒初匈奴單于, SBCK: ''}
