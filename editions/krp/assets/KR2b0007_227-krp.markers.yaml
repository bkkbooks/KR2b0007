  - {type: variant, offset: 2400, length: 319, content: 諸考異曰舊李晟傳戰于臨洺軍皆却晟引兵度洺水乘水而濟横擊悦軍王師復振擊悦大破之據此則是臨洺戰在冬也與馬燧傳十一月師次邯鄲相應實録十二月庚寅馬燧加左僕射又云先是悦遣將康愔領兵圍邢州楊光朝圍臨洺燧與抱眞及神䇿將李晟合勢救之大敗賊於䨇岡斬楊朝光禽其大將盧子昌乗勝進軍又破悦於臨洺故燧等加官按實録此戰無月日但於馬燧加官時言之今據燧傳先敗悦於䨇岡斬楊朝光居五日乃進至臨洺即實録此月癸未衆軍破悦於臨洺也實録在此年冬與此相違燕南記亦云七月燧與抱眞兵八萬自潞府東下壺闗先收邯鄲盧家砦朝光戰死臨洺城又大破悦悦退走在李正已死前與實録此月相應臨洺之戰疑諸軍已集燧等若未至張伾必不能獨破悦軍新本紀十一月丁丑馬燧及田悦戰于䨇岡敗之不知此日何出亦與諸書相違今止從七月悦, SBCK: 悅}
