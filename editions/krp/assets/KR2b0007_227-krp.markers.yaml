  - {type: variant, offset: 1383, length: 458, content: 射寅謝翻云考異曰舊傳初炎之南來途經襄漢固勸梁崇義入朝崇義不能從己懷反側尋又使其黨李舟奉使馳説崇義因而拒命遂圖叛逆皆炎迫而成之至是徳宗欲假希烈兵勢以討崇義炎又固言不可上不能平㑹徳宗嘗訪宰相羣臣中可以大任者盧杞薦張鎰嚴郢而炎舉崔昭趙惠伯上以炎論議疎闊遂罷炎相建中實録曰炎與盧把同執大政把形神詭陋夙為人所褻而炎氣岸高峻罕防細故方病飲食無節或為糜餐别食閤中毎登堂㑹食辭不能偶䜛者乗之謂把曰楊公鄙公不欲同食把銜之舊制中書舍人分署尚書六曹以平奏報中廢其職杞議復之以䟽其煩炎不可杞曰把不才幸措足于斯亦當有運用以荅天造寧常拳杞之手乎因宻啟中書主書有過局者有詔逐之炎怒曰中書吾局也政之不修吾自理之設不理當共議何隂訴而越官邪因不相平時淮西節度使李希烈寵任方盛上欲以之平襄陽炎以為不可上曰卿勿復言遂以希烈統之時夏潦方壯澶漫數百里故希烈軍久不得發㑹炎病請急累日把啟免炎相以悦之上以為然使中官朱如玉就第先諭㫖翌日遷左僕射謁謝之日恩㫖甚渥把大懼按沈既濟為炎所引故建中實録言炎罷相與徳宗實録頗異今取其可信者書之然舊傳云梁崇義之反炎迫而成之亦近誣也, SBCK: ''}
