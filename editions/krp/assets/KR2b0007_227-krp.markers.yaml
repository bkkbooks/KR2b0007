  - {type: variant, offset: 15034, length: 967, content: 考異曰實録六月辛巳朱滔王武俊兵至魏州是日李懷光之師亦至七月庚子馬燧等四節度兵退保魏縣又曰田悦等築堰欲决御河水灌王莽故河以絶我糧道燧令白懷光欲退軍懷光不可抱眞晟亦欲决死守之賊築堰愈急勢迫㑹夜乃俱引退燕南記曰六月朱滔武俊懷光俱至懷光即欲戰馬燧抱眞不得已從之七月六日懷光等擊滔勝之尋為王武俊所敗其夜决河水絶懷光等西歸之路明日水深三尺餘馬燧與朱滔有外族之親呼滔為表侄使人説滔曰老夫不度氣力與李相公等昨日先陳王大夫善戰海内所知也司徒五郎與商議放老夫等却歸太原諸節度亦各歸本道當為聞奏河北地任五郎收取滔見武俊戰勝私心忌其勝已乃謂武俊曰大夫二兄破懷光等氣已沮䘮馬司徒既屈服如此且放去漸圖未晩武俊曰豈有四五節度兵逾十萬使打賊始經一陣被殺却五萬人將何面目歸見天子今窮蹙詐求退去料不過到洺州界必築壘相待悔難及也滔心明知其事竟絶水放燧等既離魏府城下退行三十里遂連魏縣河列營相拒滔雖慙謝武俊終有恨意又同進軍魏橋河東南去懷光營五里移營在七月中旬也邠志曰三年夏詔懷光率邠甲五千兼統諸軍東征六月師及魏郛戰焉陷燕人之衆師入賊營收其寶貨馬公燧曰我二年困此賊彼旦至而夕破之人其為我何乃稍抽戰卒以孤其勢田悦曰馬太原妬功也朔方軍可襲矣乃使歩卒七百人負刀而趨乘我失度擠之于河死者数百人皆精騎也馬公遽命平射三百人爭橋以出我軍故歩軍不敗軍勢大衂詔唐朝臣自河南引軍㑹之舊田悦傳曰王武俊以二千騎横擊懷光陳滔軍繼踵而進禁軍大敗人相蹈藉投尸于河二十里河水為之不流馬燧收軍保壘是夜王武俊決河水入王莽故河欲隔官軍水已深三尺糧餉路絶王師計無從出乃遣人告朱滔云云時武俊戰勝滔心忌之即曰大夫二兄已敗官軍馬司徒卑屈若此不宜迫人於險也武俊曰燧等連兵十萬皆是國之名臣一戰而北貽國之耻不知此等何面目見天子邪然吾不惜放還但不行五十里必反相拒按長厯六月壬子朔七月壬午朔然則辛巳六月三十日庚子七月十九日也滔與懷光至魏之日滔營壘猶未立懷光即與之戰豈得至七月六日邪戰于愜山之夜武俊決水明日燧等即退保魏縣豈得至十九日邪實録燕南記所載日皆不可據也然實録多據奏到之日不知戰與移營的在何日要之必在六七月之際故但記七月退保魏縣耳朱滔與王武俊同舉兵志在破馬燧軍豈有一戰纔勝遽忌武俊縦燧令去自貽後患邪直是滔無逺識謂燧等不足畏得其卑辭而縱去邪又舊悦傳云決河水若決黄河不須築堰決水經日不止三尺既決之後不可復壅今從實録決御河水灌王莽河耳, SBCK: ''}
