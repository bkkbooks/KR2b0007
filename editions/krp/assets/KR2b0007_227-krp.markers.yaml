  - {type: variant, offset: 6235, length: 429, content: 勝音升枕職任翻藉慈夜翻水考異曰實録閏月庚戌馬燧等破田悦於洹按舊馬燧傳洹水之戰李惟岳救兵與田悦兵猶連營相拒又燕南記惟岳見悦在圍故謀歸順然則洹水戰在惟岳死前實録誤也燕南記又曰燧與抱眞雖頻破悦聞李納助軍到乃駐軍候勢晝必取之計去悦軍三十里下營夜坐帳中使心手人濳領悦兵及小將等五千餘人立帳外燧因矯與兵馬衙官已下高語曰昨日所以頻破田悦兵馬者盖偶然之事本亦不料有此勝也看悦兵雖敗其將健皆能死戰亦天下之强敵矣今更得李納兵助其勢不小我雖頻利利則有鈍他日田悦更戰大將必須審看便宜如悦直進不可當鋒耳悦帳外兵將往往共聞燧語良久曰昨日陣上獲得田悦將健所由領過既至燧大罵曰田悦小賊菽麥未分敢肆猖狂妄動兵馬你有何所解與我相敵汝皆不自由被驅入陣又何過也今矜汝放去兵等大歡呌拜謝而去其燧前後言見悦悦召大將喜而謂曰馬燧放言懼我對人罵我此可知矣吾再戰必㨗也又恃李納助軍新到乃引兵出洹水又陳燧先伏兵要處佯不勝引退悦使兵盡出逐燧燧引至伏兵處伏兵齊𤼵横截悦軍兩段與抱眞縱兵擊之大破悦軍三萬餘人今從馬燧傳, SBCK: ''}
