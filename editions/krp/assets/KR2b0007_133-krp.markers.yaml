  - {type: variant, offset: 0, length: 310, content: 欽定四庫全書資治通鑑卷一百三十三宋司馬光撰胡三省音註宋紀十五起重光大淵獻盡旃蒙單閼凡五年太宗明皇帝下㤗始七年春二月戊戌分交廣置越州治臨漳劉昫曰廉州治合浦縣秦象郡地吳改為珠官郡宋分置臨漳郡及越州領郡三治於此又據沈約志越州領百梁龍蘇永寧永昌富昌南流臨漳合浦宋夀九郡蕭子顯曰臨漳郡本合浦郡之北界也按沈約宋志作臨障宋白續通典作臨瘴以臨界内瘴江為名瘴江一名合浦江初上為諸王寛和有令譽獨為世祖所親即位之初義嘉之黨多䝉全宥晉安王子勛改元義嘉隨才引用有如舊臣及晩年更猜忌忍虐好鬼神好呼到翻多忌諱言語文書有禍敗凶䘮及疑似之言應囘避者數百千品有犯必加罪戮改騧字為􅚷騧古花翻以其似禍字故也左右忤意往往有刳斮者忤五故翻斮側畧翻斬也時淮泗用兵府藏, SBCK: ''}
