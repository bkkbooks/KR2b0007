  - {type: variant, offset: 8958, length: 397, content: 人考異曰實録洛陽李奉節上封事告太子洗馬韋季方監察御史李巢交通朝貴有朋黨之事詔敬宗與辛茂將鞫之敬宗按之甚急季方事迫自刺不死又搜奉節得私書有題與趙師者遂奏言趙師即無忌也隂爲隱語欲陷忠良伺隙謀反上驚曰豈當有此或容惡人間構小生疑阻至於即反猶恐不然敬宗奏曰臣始末推勘自奉節有趙師之言又得僞書是季方所作即疑無忌欲反使其潛行構間斥除忠臣近戚此計若行自然權歸無忌蹤跡已露陛下猶有所疑恐非社稷之福舊無忌𫝊云敬宗使人上封事稱監察御史李巢與無忌交通謀反詔敬宗與茂將鞫之唐歴統紀與實錄略同按奉節乃告事之人推鞫者豈得反搜奉節之家且與趙師者誰之私書若是季方書安得在奉節家若在奉節家奉節當執以興訟何待搜而後得又既云趙師是無忌乃是實與無忌書何得謂之僞書實錄叙此事殊鹵莾首尾差舛不可知其詳實故略取大意而已舊𫝊所云雖爲簡徑然高宗初無疑無忌之心故李𢎞泰告無忌反高宗立斬之何至奉節而獨令敬宗鞫之也且實錄在前而詳列𫝊在後而略故亦未可據也, SBCK: ''}
