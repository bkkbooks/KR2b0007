  - {type: variant, offset: 3883, length: 569, content: 陸考異曰舊西突厥咄陸𫝊咄可汗泥熟父莫賀設貞觀七年遣鴻臚少卿劉善因冊爲吐谷妻狀奚利苾咄陸可汗明年泥熟卒弟同娥設立爲咥利失可汗彌射傳云彌射者室點宻可汗五代孫也世統十姓部落在本蕃爲莫賀咄葉䕶貞觀六年詔遣鴻臚少卿劉善因就蕃立爲奚利邲咄陸可汗其族兄步眞欲自立謀殺彌射彌射既與步眞有隙以貞觀十三年率所部處月處宻部落入朝其後步眞遂自立爲咄陸葉䕶部落不服步眞復携家屬入朝彌射後從太宗征高麗有功封平襄縣伯顯慶二年轉右武衞大將軍新𫝊略同今欲以咄陸彌射爲二人則事多相類以爲一人則事又相違疑不能明故但云西突厥酋長自余按彌射爲咄陸可汗唐所冊也步眞爲咄陸葉䕶稱也咄陸之號雖同而可汗葉䕶位之尊卑有異不必泥咄陸之號而𫝊疑而彌射步眞實二人也余前注所引者新𫝊也其辭略考異所引者舊傳也其辭詳大略同也又參考新舊書劉善因冊可汗事與通鑑有六年七年之差而新舊書可汗號有婁抜妻狀之差舊書又多一奚字而貞觀中立彌射爲奚利邲咄陸可汗則新舊書同詳而考之劉善因冊泥孰爲奚利邲咄陸可汗明年而泥孰死弟同娥設立爲沙鉢羅咥利失可汗又三年而咥利失不爲衆所歸西部又立欲谷設爲乙毗咄陸可汗二可汗兵爭咄利失乙毗相繼走死他國而射匱寔承之太宗崩賀魯反而射匱爲賀魯所并西突厥世次曉然可考而新舊書於彌射𫝊皆云貞觀中遣劉善因立彌射爲奚利邲咄陸可汗以泥敦𫝊觀之則善因所立者泥孰也以彌射𫝊觀之則善因所立者彌射也考異所疑當以此耳, SBCK: ''}
