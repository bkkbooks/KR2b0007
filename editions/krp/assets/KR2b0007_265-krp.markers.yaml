  - {type: variant, offset: 5264, length: 266, content: 月考異曰梁太祖實録薛居正五代史梁記皆云七南庚午遣楊師厚帥前軍討趙匡凝于襄州辛未帝征唐實録七月全忠奏匡凝擅通好西川淮南又遣弟專領荆南請削奪官爵已遣都將楊師厚討之翌日全忠自帥軍以進編遺録八月壬辰先抽武寧楊師厚是日到乃議伐襄州帥趙匡凝乙未大發車徒委楊師厚總其軍政乙亥上領親從步騎繼大軍之後是夜宿尉氏今從之薛史太祖將圖禪代以匡凝兄弟並據藩鎮乃遣使先諭㫖焉凝對使者流涕荅以受國恩深豈敢隨時妄有它志使者復命太祖大怒天祐二年秋七月遣楊師厚帥師討之辛未全忠南征表匡凝罪狀請削官爵按全忠劫遷昭宗於洛陽匡凝與行密等移檄諸道共討之全忠安肯以禪代問之今不取, SBCK: ''}
