  - {type: variant, offset: 0, length: 337, content: 欽定四庫全書資治通鑑卷一百五十一宋司馬光撰胡三省音註梁紀七起柔兆敦牂盡彊圉協洽凡二年髙祖武皇帝七普通七年春正月辛丑朔大赦壬子魏以汝南王悦領太尉魏安州石離宂城斛鹽三戍兵反應杜洛周衆合二萬洛周自松岍赴之水經注大榆河出禦夷鎮北塞中南流逕密雲戊西又南流逕孔山西又歴密雲戍東右合孟廣􅛜水􅛜水西逕孔山南上有洞宂開明故謂之孔山大榆河又東南流白楊泉水注之水北𤼵白楊溪望離石大榆河又東南流出峽逕安州舊漁陽郡之滑鹽縣南世謂之斛鹽城西北去禦夷鎮二百里岍輕煙翻或曰岍􅛜字之誤也讀作陘唐志營州西北百里曰松陘嶺行臺常景使别将崔仲哲屯軍都闗以邀之将即亮翻仲哲戰沒元譚軍夜潰元譚軍於居庸闗見上卷上年魏以别将李琚代譚為都督仲哲秉之子也崔秉時為燕州刺史初魏廣陽王深通於城陽王徽之妃徽為尚書令為胡太后所信任會恒州, SBCK: ''}
