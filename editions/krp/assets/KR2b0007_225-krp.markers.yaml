  - {type: variant, offset: 4634, length: 488, content: 曰考異舊嗣恭傳云嗣恭平廣州商舶之徒多因晃事誅之嗣恭前後没其家財寶數百萬貫盡入私室不以貢獻代宗心甚銜之故嗣恭雖有平方面功止轉檢校兵部尚書無所酬勞建中實録曰自兵興以來諸軍殺將帥而要君者多矣皆因授其任以茍安之其王師征討不失有罪始斯役也既而有謗其收南海府庫閲上不實不得用久之按代宗以嗣恭附元載遺載瑠璃盤惡之故不用耳事見鄴矦家傳或當時亦有人迎合以匿貨謗嗣恭不可知也今不取李肇國史補云路嗣恭初平五嶺元載奏嗣恭多取南人金寶是欲為亂陛下不信試召必不入朝三伏中追詔至嗣恭不慮請待秋凉以修覲禮江西判官柳渾入雨泣曰公有功方暑而追是為執政所中今少遷延必族滅也嗣恭懼曰為之柰何渾曰健歩追還表緘公今日過江宿石頭驛乃可從之代宗謂元載曰嗣恭不俟駕行矣載無以對按嗣恭素附元載載誅賴李泌營救得免事見鄴矦家傳載豈有譖嗣恭云欲為亂之理盖載已被誅而召嗣恭適在三伏渾冇此疑時人因以為渾美事耳今不取余按去年命路嗣恭為嶺南節度使討哥舒晃嗣恭既誅晃而平廣州則當在廣州柳渾若以江西判官從嗣恭亦當在廣州今諫嗣恭請奉詔就道乃言過江宿石頭驛石頭驛在豫章江之西岸嗣恭自江西觀察赴召可言宿石頭驛自嶺南節度赴召安得宿石頭驛哉亦可以明李肇之誤, SBCK: ''}
