  - {type: variant, offset: 13319, length: 400, content: 遺于季翻程大昌曰漢西域傳罽賔國有琥珀流離師古注曰魏略云大秦國出赤白黑黄青緑縹紺紅紫十種流離此盖自然之物采澤光潤踰于衆玉今俗所用皆消冶石汁加以衆藥灌而為之虛脆不耐實非眞物案流離今書附玉旁為琉璃字師古之記是矣亦未得其詳也穆天子傳天子東征有采石之山凡好石之器於是出升山取采石鑄以成器注云采石文采之石也則鑄石為器古有之矣顔氏謂為自然之物恐不詳也北史大月氏傳魏太武礦時月氏人商販京師自云能鑄石為五色琉璃於是采於山中即京師鑄之既成光澤乃美於西方來者自是琉璃遂賤由此言推之則雖西域琉璃亦用石鑄無自然生成者兼外國竒産中國未始無之獨不聞有所謂眞琉璃也然中國所鑄有與西域異者鑄之中國色甚光鮮而質則輕脆沃以熱酒隨手破裂其來自海舶者制差鈍樸而色亦㣲暗其可異者雖百沸湯注之與磁銀無異了不復動是名蕃琉璃也蕃琉璃之異於中國其别盖如此而未嘗聞以石琢之也余謂路嗣恭所獻者盖師古所謂大秦琉璃自然之物否則代宗何以謂之至寶哉程大昌考之不詳耳, SBCK: ''}
