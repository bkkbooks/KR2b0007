  - {type: variant, offset: 9702, length: 273, content: 緡眉巾翻使疏吏翻自是年定俸之後至于㑹昌則又倍之節度使三十萬都防禦使副使監軍十五萬觀察使十萬諸府尹大都督府長史都團練使副使上州刺史八萬節度副使中下州刺史知軍事七萬上州别駕五萬五千長史司馬五萬觀察團練判官掌書記五萬諸大都督府司録參軍事鴘赤縣令四萬五千節度推官支使防禦判官上州録事參軍畿縣上縣令四萬諸大都督府判官赤縣丞三萬五千觀察防禦團練推官廵官鴘赤縣丞兩赤縣主簿尉上州功曹參軍以下上縣丞三萬畿縣丞鴘赤縣簿尉二萬五千畿縣上縣主簿尉二萬由㑹昌以前其間世有增減不可計也按類篇鴘翻阮切鷹二嵗色新地理志唐京兆有赤縣次赤縣諸負郭亦皆為次赤縣鴘赤字義不可曉盖次赤也, SBCK: ''}
