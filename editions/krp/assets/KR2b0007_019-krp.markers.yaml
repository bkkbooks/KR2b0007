  - {type: variant, offset: 0, length: 355, content: 欽定四庫全書資治通鑑卷十九宋司馬光撰胡三省音註漢紀十一起彊圉大荒落盡𤣥黓閹茂凡六年世宗孝武皇帝中之上元朔五年冬十一月乙丑薛澤免以公孫𢎞為丞相封平津侯勃海郡髙成縣有平津鄉宋白曰滄州鹽山縣勃海髙成縣也冇平津郷考異曰史記将相名臣表漢書公卿百官表𢎞為相皆在今年建元以來侯者表恩澤侯表皆云元朔三年封侯按三年𢎞始為御史大夫盖誤書五為三因置于三年耳丞相封侯自𢎞始漢初常以列侯為丞相𢎞則既相而後封侯故丞相封侯自𢎞始時上方興功業𢎞于是開東閣以延賢人師古曰閣小門也東向開之避當庭門而引客别於掾史官屬也與參謀議每朝覲奏事因言國家便冝上亦使左右文學之臣與之論難難乃旦翻𢎞嘗奏言十賊彍弩張晏曰彍音郭師古曰引滿曰彍百吏不敢前請禁民毋得挾弓弩便上下其議下遐嫁翻侍中吾丘夀王對曰臣聞古者作五兵師古曰五兵謂矛㦸弓劒戈吾讀曰虞非以相害以禁暴討邪也, SBCK: ''}
