  - {type: variant, offset: 3832, length: 401, content: 禁錮重擊也臣瓉曰茂陵中書有武功爵一級曰造士二級曰閑輿衛三級曰良士四級曰元戎士五級曰官首六級曰秉鐸七級曰千夫八級曰樂卿九級曰執戎十級曰政戾庶長十一級曰軍衛此武帝所制以寵軍功師古曰下云級十七萬凡直三十餘萬金今瓚引茂陵中書説之不盡也貢父曰直三十餘萬金其價之差殊不可詳也或説七當作一與茂陵書合矣予謂賣爵當級級稍増其價豈可例云級十七萬若每級十七萬比至三十餘萬金當一萬七千餘級又非也然則誤衍此萬字盖武功爵其級十七參考顔劉注皆因求其説而不得遂疑茂陵書所謂十一級為不足又疑史之正文萬字為衍皆未為允也盖級十七萬者賣爵一級為錢十七萬至二級則三十四萬矣自此以上烏得不每級而増乎王莽時黄金一斤直錢萬以此推之則三十萬金為錢三十餘萬萬矣此當時鬻武功爵所直之數也夫民入錢買爵隨其錢之多少為爵級之髙下爵之髙下有定直而民錢之多少無定數若比而同之其失彌逺矣史記作直八十萬金索隠曰一金萬錢初一級十七萬自此以上每級加二萬至十七級合成三十四萬也, SBCK: ''}
