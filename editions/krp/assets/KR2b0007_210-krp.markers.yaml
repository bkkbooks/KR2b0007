  - {type: variant, offset: 14152, length: 329, content: 之僉考異曰𤣥宗實録作乙丑按載七月三日誅常元楷今從睿宗上皇實録唐厯新舊本紀舊王琚傳琚與岐王範薛王業姜皎王毛仲等並預誅逆以鐵騎至承天門時睿宗聞鼔譟聲召郭元振升承天楼宣詔下闕令侍御史任知古召募數百人於朝堂不得入頃間琚等從𤣥宗至楼上太上皇實録公主期以是月七日令常元楷以羽林兵自北門入竇懐貞等於南衙舉兵應之今上宻知其事登時勒左右禁兵出北門召常元楷李慈即斬於闕下還至承天門執岑羲蕭至忠斬於朝堂舊蕭至忠傳曰至忠遽遁入山寺數日捕而伏誅盖以太平公主事為至忠事今從𤣥宗實録朝野僉載曰羽林将軍常元楷三家告宻得官至先天二年七月三日楷以反逆誅家口配沒𤣥宗實録云上誅凶逆睿宗恐宫中有變御承天門號令南衙兵士以備非常郭元振帥兵侍衛登楼奏曰皇帝前奉誥誅竇懐貞等惟陛下勿憂睿宗大喜今擇其可信者取, SBCK: ''}
