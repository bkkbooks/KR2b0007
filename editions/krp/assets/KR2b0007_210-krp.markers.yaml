  - {type: punctuation, offset: 18485, content: (, id: KR2b0007_krp_210-bkkpn1528}
  - {type: variant, offset: 18485, length: 525, content: 忽考異曰松窗雜録姚崇為相一日對于便殿舉右足不甚輕利上曰卿有足疾邪崇奏曰臣有心腹之疾非足疾也因前奏張説罪状數百言上怒曰卿歸中書宜宣與御史中丞共按其事而説未之知㑹朱衣吏報午後三刻説乘馬先歸崇急呼御史中丞李林甫以前詔付之林甫語崇曰説多智謀是必困之宜以劇地崇曰丞相得罪未宜太逼林甫又曰公必不忍即説當無害林甫止將詔付於小御史中路以馬墜告説未遭崇奏前旬月家有教授書生通于説侍兒最寵者㑹擒得姦状以聞於説說怒甚将窮獄于京兆尹書生厲聲言曰覩色不能禁人之常情也公貴為宰相豈無緩急用人何靳靳於一婢女邪説竒其言而釋之兼以侍兒與歸書生跳跡去旬餘無所聞知忽一日直訪于説憂色滿面而言曰某感公之恩當有謝者久矣今聞公為姚相所構外獄将具公不之知危将至矣某願得公平生所寳者用計于九公主必能立釋之説因自厯指状所寳者書生皆曰未足解公之難又凝思久之忽曰近有雞林郡夜明簾為寄信者書生曰吾事濟矣因請説手筆數行懇以情言遂急趍出夜始及九公主邸第書生具以説言之兼用夜明簾為贄且謂主曰上獨不念在東宫時思必始終恩加於張丞相乎而今反用快不利張丞相者之心邪明早公主上謁具為奏之上感動因急命髙力士就御史臺宣前所按獄事並宜罷之書生迄亦不再見于張丞相也此説亦似出於好事者又元崇開元四年罷相林甫十四年始為御史中丞今從新傳, SBCK: ''}
