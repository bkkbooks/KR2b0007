  - {type: variant, offset: 11080, length: 569, content: 使疏吏翻種章勇翻邪音耶處月居金娑山之陽蒲類之東有大磧名沙陀故號沙陀氏考異曰薛居正五代史後唐太祖紀曰太祖姓朱邪始祖拔野古貞觀中為墨離軍使太宗平薛延陀分同羅僕骨之人置沙陀都督府盖北庭有磧曰沙陀因以名焉永徽中以㧞野古為都督其後子孫五世相承曾祖盡忠貞元中繼為沙陀府都督歐陽修五代史記曰李氏之先盖出於西突厥本號朱邪至其後世别自號曰沙陀而以朱邪為姓㧞野古為始祖其自叙云沙陀者北庭之磧也當唐太宗時破西突厥諸部分同羅僕骨之人於此磧置沙陀府而以其始祖㧞野古為都督且傳子孫數世皆為沙陀都督故其後世因自號沙陀然予考于傳紀其説皆非也夷狄無姓氏朱邪部族之號耳㧞野古與朱邪同時人非其始祖而唐太宗時未嘗有沙陀府也唐太宗破西突厥分其諸部置三十州以同羅為龜林都督府僕骨為金㣲都督府㧞野古為幽陵都督府未嘗有沙陀府也當是時西突厥有鐵勒薛延陀阿史那之類為最大其别部有同羅僕骨㧞野古以十數盖其小者也又有處月處宻諸部又其小者也朱邪者處月别部之號耳太宗二十二巻已降㧞野古其明年阿史那賀魯叛至髙宗永徽二年處月朱邪孤注從賀魯戰于牢山為契苾何力所敗遂沒不見後百五六十年當憲宗時有朱邪盡忠及子執冝見于中國而自號沙陀以朱邪為姓矣盖沙陀者大磧也在金莎山之陽蒲類海之東自處月以來居此磧號沙陀突厥而夷狄無文字𫝊記朱邪又㣲不足録故其後世自失其𫝊至盡忠孫始賜姓李氏李氏後大而夷狄之人遂以沙陀為貴種云今從之, SBCK: ''}
