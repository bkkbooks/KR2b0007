  - {type: variant, offset: 16232, length: 1037, content: 拒考異曰世𫝊升平源以為吴兢所撰云姚元崇初太平得罪上頗徳之既誅太平方任元崇以相進拜同州刺史張説素不叶命趙彦昭驟彈之不許居無何上将獵于渭濵宻召元崇㑹於行所初元崇聞上講武于驪山謂所親曰凖式車駕行幸三百里内刺史合朝覲元崇必為權臣所擠若何參軍李景初進曰某有兒母者其父即教坊長入内相公儻致厚賂使其冒法進状可逹公然之輒効燕公説使姜皎入曰陛下久卜河東總管重難其人臣有所得何以見賞上曰誰邪如愜有萬金之賜乃曰馮翊太守姚崇文武全材即其人也上曰此張説意也卿罔上當誅皎首服萬死即詔中官追赴行在上方獵于渭濱公至拜馬首上曰卿頗知獵乎元崇曰臣少孤居廣成澤目不知書唯以射獵為事四十年方遇張憬藏謂臣當以文學備位将相無為自弃爾來折節讀書今雖官位過沗至于馳射老而猶能於是呼鷹放犬遲速稱㫖上大悦上曰朕久不見卿思有顧問卿可於宰相行中行公行猶後上縱轡久之顧曰卿行何後公曰臣官疎賤不合參宰相行上曰可兵部尚書同平章事公不謝上顧訝焉至頓上命宰臣坐公跪奏臣適奉作弼之詔而不謝欲以十事上獻有不可行臣不敢奉詔上曰悉數之朕當量力而行然定可否公曰自垂拱已來朝廷以刑法理天下臣請聖政先仁義可乎上曰朕深心有望于公也又曰聖朝自喪師青海未有牽復之悔臣請三數十年不求邉功可乎上日可又曰自太后臨朝以來㗋舌之任或出于閹人之口臣請中官不預公事可乎上曰懷之久矣又曰武氏諸親猥侵清切權要之地繼以韋庶人安樂太平用事班序荒雜臣請國親不任䑓省官凡有斜封待闕員外等官悉請停罷可乎上曰朕素志也又曰比來近宻佞幸之徒冒犯憲網皆以寵免臣請行法可乎上曰朕切齒久矣又曰比因豪家戚里貢獻求媚延及公卿方鎮亦為之臣請除租庸賦税之外悉杜塞之可乎上曰願行之又曰太后造福先寺中宗造聖善寺上皇造金仙玉真觀皆費鉅百萬耗蠧生靈凡寺觀宮殿臣請止絶建造可乎上曰朕毎覩之心即不安而况敢為者哉又曰先朝褻狎大臣或虧君臣之敬臣請陛下接之以禮可乎上曰事誠當然有何不可又曰自燕欽融韋月将獻直得罪由是諫臣沮色臣請凡在臣子皆得觸龍鱗犯忌諱可乎上曰朕非唯能容之亦能行之又曰吕氏産禄㡬危西京馬竇閻梁亦亂東漢萬古寒心國朝為甚臣請陛下書之于史冊永為殷鑒作萬代法可乎上乃澘然良久曰此事真可為刻肌刻骨者也公再拜曰此誠陛下致仁政之初是臣千載一遇之日臣敢當弼諧之地天下幸甚天下幸甚又再拜蹈舞稱萬嵗者三從官千萬皆出涕上曰坐公坐于燕公之下燕公譲不敢坐上問對曰元崇是先朝舊臣合首坐公曰張説是紫㣲宫使今臣是客宰相不合首坐上曰可紫㣲宫使居首座果如所言則元崇進不以正又當時天下之事止此十條須因事啓沃豈一旦可邀似好事者為之依託兢名難以盡信今不取, SBCK: ''}
