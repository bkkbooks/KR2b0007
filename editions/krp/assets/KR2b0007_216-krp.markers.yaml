  - {type: variant, offset: 1461, length: 317, content: 三恪二王後注已見前杜佑曰周得天下封夏殷二王後又封舜後謂之恪恪敬也義取王之所敬故曰三恪天寶十三載公卿議曰三恪二王之議有三説焉一曰二王之前更立三代之後為三恪此據樂記武王克商未及下車封黄帝堯舜之後下車封夏殷之後而言一曰二王之前但在一代通二王為三恪此據左傳但封胡公以備三恪明王者所敬先王有二更封一代以備三恪三云二王之後為一恪妻之父母為二恪夷狄之君為三恪此據王有不臣者三而言之梁崔靈恩云三説以初為長按二王三恪經無正文靈恩據禮記遂以為通存五代竊恐未安記云尊賢不過二代第三代者雖逺難師法豈得不錄其後故亦存之示敬其道而已因謂之三恪故左傳云封胡公以備三恪足知其無五代也况歴代至今皆以三代為三恪焉以此攷之葢以後魏子孫與周隋子孫為三恪也明年尋罷魏後注又見後, SBCK: ''}
