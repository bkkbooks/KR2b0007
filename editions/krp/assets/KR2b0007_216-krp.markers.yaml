  - {type: variant, offset: 7960, length: 315, content: 聞音問觀明皇所以待祿山者昏庸之主所不為殆天奪之魄也眞考異曰祿山事迹正月二十日祿山生日𤣥宗及太賜祿山器皿衣服件目甚多後三日召祿山入内貴妃以錦繡繃縳祿山令内人以綵輿舁之宫中歡呼動地𤣥宗使人問之報云貴妃與祿兒作三日洗兒𤣥宗就觀之大悦因賜貴妃洗兒金銀錢物極歡而罷自是宫中皆呼祿山為祿兒不禁其出入温畬天寶亂離西幸記祿山謟約楊妃誓為子母自虢國已下次及諸玉皆戲祿兒與之促膝娛宴上時聞後宫三千合處喧笑宻偵則祿山果在其内貴戚猱雜未之前聞凡曰釵鬟皆㗖厚利或通宵禁掖暱狎嬪嬙和士開之出入臥内方此為疎薊城侯之獲厠刑餘又奚足尚王仁裕天寶遺事云祿山常與妃子同食無所不至帝恐外人以酒毒之遂賜金牌子繫于臂上每有王公召宴欲沃以巨􅘑即祿山以金牌示之云凖敕戒酒今略取之, SBCK: ''}
