  - {type: variant, offset: 1504, length: 232, content: 左傳鄧三甥勸鄧侯殺楚子曰若不早圖後君噬臍考異曰御史臺記曰張東之勒兵於景運門将收諸武誅之彦範以事既竟不欲廣誅遽觧其兵柬之固爭不果狄梁公傳曰袁謂張公曰昔有遺言使先收梁王武三思豈可捨諸張公曰但大事畢功此皆几上之物豈有逃乎按舊唐書薛季昶傳敬暉傳唐統紀唐厯狄梁公傳皆云張柬之敬暉不欲誅武三思惟御史臺記以為柬之固爭而彦範不從新唐書彦範傳亦云薛季昶勸誅三思㑹日暮事遽彦範不欲廣殺因曰三思几上肉耳留為天子藉手季昶嘆曰吾無死所矣按東之時為宰相首建此謀當是與桓敬等皆不可不應獨由彦範也, SBCK: ''}
