  - {type: variant, offset: 7473, length: 658, content: 御考異曰史臺記曰同皎與張仲之等謀誅三思為宋談所發御史大夫李承嘉御史姚紹之按問事連椒宫内敕宰相問對諸宰佯假寐無所聞獨嶠與承嘉竊議同皎仲之等遇族又曰張仲之等謀誅武三思宋之遜子曇知其謀将發之未果㑹冉祖雍李恮於路白之雍恮以聞又曰張仲之宋之遜祖延慶謀於衣䄂中發銅弩射三思伺其便未果之遜子曇宻發之敕李承嘉與紹之按於新開門内初紹之将直其事未定敕宰相對問諸相畏三思但僶俛佯不聞仲之延慶言諸相中有附㑹三思者屢與承嘉耳言復説誘紹之事乃變遂宻置人力十餘命引仲之對問至則塞口反接送繫所紹之還謂仲之曰張三事不諧矣仲之固言三思反状紹之命撾之而臂折仲之大呼天者六七謂紹之反賊我臂且折矣已輸你當訴爾於天曹乃自誣反而遇族朝野僉載曰初之遜諂附張易之兄弟出為兖州司倉遂亡歸王同皎匿之於小房皎慷慨之士也忿逆韋與武三思亂國與一二所親論之毎至切齒之遜於簾下竊聽之遣姪曇上書告之以希逆韋之㫖武三思等果大怒奏誅同皎之黨實録同皎與周憬等潜謀誅三思乃招集将士期以則天靈駕發引因刼殺三思李悛等知而告三思三思因言同皎等謀反竟坐斬唐厯統紀亦與實録略同而云仲之誤泄於友人宋之問之問偽應之祖雍之遜亦預其謀既而背之李悛之問甥也命以告三思因言同皎謀反舊傳云之問左遷瀧州參軍未幾逃還匿於張仲之家仲之與同皎等謀殺武三思之問令兄子發其事以自贖及同皎等獲罪起之問為鴻臚主簿按三思得幸於中宗韋后權傾天下同皎等若擅殺之豈得晏然無事茍無脅君之志豈得輕為此謀又云䄂中發銅弩此則殆同兒戯盖忿疾三思或與仲之憬等有欲殺之言而之遜等以告三思三思因教曇等誣告同皎云謀於靈駕發引日刼殺三思因廢皇后謀反耳今從僉載, SBCK: ''}
