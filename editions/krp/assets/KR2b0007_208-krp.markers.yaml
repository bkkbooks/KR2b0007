  - {type: variant, offset: 3783, length: 450, content: 側考異曰統紀曰太后善自粉飾雖子孫在不覺其衰老及在上陽宫不復櫛頮形容羸悴上入見大驚太后泣曰我自房陵迎汝來固以天下授汝矣而五賊貪功驚我至此上悲泣不自勝伏地拜謝死罪由是三思等得入其謀按中宗頑鄙不仁太后雖毀容涕泣未必能感動移其意其所以踈忌五王自用韋后三思之言耳今不取五王尊卑先後不定實録誅張易之時以張柬之為首賜鐵劵以崔𤣥暐為首封王及謫為司馬長流皆以敬暉為首舊傳及開元復官詔並以桓彦範為首按長安四年六月𤣥暐為鸞臺侍郎平章事十月張柬之自秋官侍郎同平章事十一月守鳯閣侍郎誅易之時唯此二人為相神龍元年正月袁恕己自司刑少卿為鳯閣侍郎同平章事庚戌張柬之為夏官尚書𤣥暐守内史敬暉桓彦範並為納言三月恕己守中書令四月東之為中書令敬暉為侍中五王遷轉先後如此疑實録但以誅易之時柬之首謀故以柬之為首暉與彦範同為侍中疑侍中在中書令上故削諸武表及罷政事皆以暉為首賜鐡券時𤣥暐已加特進暉等罷政方加特進而𤣥暐如舊疑特進雖散階而品秩最髙故以𤣥暐為首彦範與暉同為侍中而彦範被禍最酷疑開元詔及史官特以為首未必以當時位次也天后中宗時侍中疑在中書令上, SBCK: ''}
