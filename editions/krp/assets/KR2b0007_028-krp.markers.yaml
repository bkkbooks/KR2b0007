  - {type: variant, offset: 0, length: 369, content: 欽定四庫全書資治通鑑卷二十八宋司馬光撰胡三省音註漢紀二十起昭陽作噩盡屠維單閼凡七年孝元皇帝上荀悦曰諱奭之字曰盛應劭曰諡法行義悦民曰元初元元年春正月辛丑葬孝宣皇帝于杜陵臣瓉曰自崩至葬凡二十八日杜陵在長安南五十里赦天下三月丙午立皇后王氏封后父禁為陽平侯恩澤侯表陽平侯食邑於東郡以三輔太常郡國公田及苑可省者振業貧民太常掌諸陵邑故亦有公田苑師古曰振業振起之令有作業貲不滿千錢者賦貸種食師古曰賦給與之也貸假也種音之勇翻賈公彦曰種食者或為種子或為食用封外祖平恩戴侯同産弟子中常侍許嘉為平恩侯文頴曰戴侯許廣漢諡法典禮不愆曰戴余按廣漢先坐腐刑及薨無後今以嘉紹封百官表侍中中常侍皆加官西都參用士人東都始以宦者為中常侍夏六月以民疾疫令太官省膳減樂府員省苑馬以振困乏樂府員大凡八百二十九人武帝所立漢官儀牧師諸苑三十六所分置北邊西邊養馬三十萬匹闗東郡國十一大水饑, SBCK: ''}
