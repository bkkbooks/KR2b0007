  - {type: variant, offset: 5385, length: 517, content: 五代㑹要曰吐谷渾酋長有赫連鐸者唐咸通中從太原節度使康承訓平徐方有功朝廷授振武節度使復盜據雲中後唐太祖逐之乃歸幽州李匡儔其部落散居蔚州界互為君長其氏不常有白承福者自同光初代為都督依中山北石門為柵莊宗賜其額為寧朔奉化兩府以都督為節度使仍賜承福姓李名紹魯其畜牧就善水草丁壯常數千人羊馬生息入市中土朝廷常存恤之潞王清泰三年白可久為寧朔奉化留後始見於史晉天福元年髙祖以契丹有助立之功割雁門以北及幽州之地以賂之由是吐谷渾部族皆𨽻於契丹其後苦契丹之虐政復為鎮州節度使安重榮所誘乃背契丹率車帳羊馬取五臺路歸國契丹大怒以朝廷招納叛亡遣使責讓至六年正月髙祖命供奉官張澄等率兵二千搜索并鎮忻代四州山谷吐渾還其舊地然亦以契丹誅求無厭心不平之命漢髙祖出鎮太原潜加慰撫其年五月大首領白承福及麾下來朝九月又遣首領白可久來朝少主嗣位絶契丹之好數召其酋長入朝厚加錫賜毎大讌㑹皆命列坐於勲臣之次至開運捍虜於澶州召承福等帥其部衆從行屬嵗多暑熱部下多死復遣歸太原移帳於嵐石州然承福馭下無法多于軍令其族白可久在承福之亞因牧馬帥本帳北遁契丹授以官爵復遣潜誘承福承福亦思叛去事未果漢祖知之乃以兵還其部族擒承福與其族白鐵匱赫連海龍等五家凡四百有餘人伏誅籍其牛馬命别部長王義宗統其餘屬, SBCK: ''}
