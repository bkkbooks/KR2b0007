  - {type: variant, offset: 13614, length: 646, content: 李心傳曰秦璽者李斯之蟲魚篆也其圍四寸按玉璽圖以此璽為趙璧所刻璧本卞和所獻之璞藺相如所奪者是也余嘗以禮制考之璧五寸而有好則不得復刻為璽此説謬矣秦璽至漢謂之傳國璽自是迄于漢帝所寳用者秦璽也子嬰所封元后所投王憲所得赤眉所上皆是物也董卓之亂失之吳書謂孫堅得之洛陽甄官井中復為袁術所奪徐璆得而上之殆不然也若然則魏氏何不實用而自刻璽乎厥後歴世皆用其名永嘉之亂没于劉石永和之世復歸江左者晉璽也魏氏有國刻傳國璽如秦之文但秦璽讀自右魏璽讀自左耳晉有天下又自刻璽其文曰受命于天皇帝夀昌本書輿服志乃以為漢所傳秦璽實甚誤矣此璽更劉聰石勒逮石祗死其臣蔣幹求援於謝尚乃以璽送江南王彪之辯之亦不云秦璽也太元之末得自西燕更渉六朝至于隋代者慕容燕璽也晉孝武太元十九年西燕主永求救於郄恢併獻玉璽一紐方闊六寸髙四寸六分文如秦璽自是歴宋齊梁皆寳之侯景既死北齊辛術得之廣陵獻之髙氏後歴周隋皆誤指為秦璽後平江南知其非是乃更謂之神璽焉劉裕北伐得之闗中歴晉暨陳復為隋有者姚秦璽也晉義熙十三年劉裕入闗得傳國璽上之大四寸文與秦同然隠起而不深刻隋滅陳得此指為真璽遂以宇文所傳神璽為非是識者又謂古璽深刻以印泥後人隠起以印紙則隠起者非秦璽也姚氏取其文作之耳開運之亂没于邪律女真獲之以為大寳者石晉璽也唐太宗貞觀十六年刻受命璽文曰皇帝景命有徳者昌後歸朱全忠及從珂自焚璽亦隨失徳光入汴重貴以璽上之云先帝所刻蓋指敬瑭也蓋在唐時皆誤以為秦璽而秦璽之亡則久矣今按石袛死當作冉閔死李心傳之説與唐六典異今並存之以俟知者及周又製二寳有司所奏其説亦祖六典詳注于後詰其吉翻, SBCK: ''}
