  - {type: variant, offset: 14384, length: 523, content: 德光乃記天顯之耳名疑當時未得其傳不然虜人恥安巴堅無號追為之保機虜中又號天皇王虜庭雜記太祖一舉併吞奚國仍立奚人依舊為奚王命契丹監督兵甲又滅勃海虜其王大諲譔立長子為勃海東丹王號人皇王自號天皇王始立年號曰天贊國稱大遼於所居大部落置樓謂之西樓今謂之上京又於其南木葉山置樓謂之南樓又於其東千里置樓謂之東樓又於其北三百里置樓謂之北樓大祖四季常遊獵於四樓之間又曰安巴堅變家為國之後始以王族號為横帳姓錫里錫里以漢語誤譯謂之耶律氏賜后族姓曰蕭氏王族惟與后族同昏其諸部若不奉北主之命不得與二部落通昏歐陽史曰安巴堅用其妻舒嚕䇿使人告諸部大人曰我有鹽池諸部所食然諸部知食鹽之利而不知鹽有主人可乎當來犒我諸部以為然共以酒㑹鹽池安巴堅伏兵其旁酒酣伏發盡殺諸部大人遂立不復代安巴堅稱皇帝前史不見年月莊宗列傳契丹傳在莊宗即帝位李存審守范陽後漢高祖實錄唐餘錄皆云安巴堅設䇿併諸族遂稱帝在乾寧中劉仁恭鎮幽州前薛史在莊宗天祐末按紀元通譜安巴堅神䇿元年嵗在丙子乃莊宗天祐十三年梁貞明二年似不在天祐末及莊宗即位後編遺錄開平二年五月太祖賜安巴堅記事猶呼之為卿及言臣事我朝望國家降使冊立必未稱帝安得在劉仁恭鎮幽州前唐餘錄全取漢高祖實錄契丹事作傳最為差錯不知其稱帝實在何年今因其改年號置於此舒嚕, SBCK: ''}
