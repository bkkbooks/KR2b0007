  - {type: variant, offset: 12935, length: 256, content: 殪壹計翻州考異曰莊宗實錄賊將張源德固守貝旣聞河北皆平而有翻然之志詢謀於衆羣賊皆河南人懼其歸罪不從因殺源德噉人為糧固守其城王師歴年攻圍賊旣食竭呼我大將曰今欲請罪懼晉王不我赦我將衿甲持兵而見已即解之如何報曰無便於此者賊衆三千衿甲出降我將甘言諭之俱釋兵解甲旣而四靣陳兵皆殺之歐陽史死事傳曰晉王入魏河北六鎮數十州之地皆歸晉獨貝一州圍之踰年不可下城中食且盡貝人勸源德出降源德不從遂見殺按源德若以不降而死其衆當即降於晉豈得猶拒守與晉邀約而後出哉明是衆懼死不降耳今從莊宗實錄余謂若如通鑑之去取則張源德非一心守死者不得與於死事傳, SBCK: ''}
