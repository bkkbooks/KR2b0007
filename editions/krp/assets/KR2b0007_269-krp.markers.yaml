  - {type: variant, offset: 16659, length: 423, content: 金虜節要曰燕山之地易州西北乃金坡關昌平縣之西乃居庸關順州之地乃古北口景州之東北乃松亭關平州之東乃渝關渝關之東即金人來路也此數關皆天造地設以分蕃漢之限一夫守之可以當百本朝復燕之役若得諸關則燕山之境可保然關内之地平欒營三州自後唐陷於安巴堅改平州為遼興府以營欒二州𨽻之號為平州路至石晉之初耶律德光又得燕山檀順景薊涿易諸州建燕山為燕京以轄六郡號燕京路而與平州自成兩路海上議割地但云燕雲兩路而已初謂燕山路盡得關内之地殊不知燕山平州盡在關内而異路也破遼之後金人復得平州路地據之故斡里雅布後由平州入冦乃當時議燕雲不明理之故又金虜行程云灤州古無之唐末安巴堅攻陷平營劉守光據幽州暴虐民多亡入虜中乃築此城營州古栁城郡舜所築也乃殷之孤竹國漢唐遼西地其城外多大山高下皆石不産草木地當營室故以為名自營州東至渝關並無保障沃野千里北限大山重岡複嶺中有五關唯渝關居庸可以通餉饋松亭金坡古北口止通人馬不可行車其山之南則五榖百果良材美木無所不有出關未數里則地皆瘠鹵豈天設此以限華夷乎, SBCK: ''}
