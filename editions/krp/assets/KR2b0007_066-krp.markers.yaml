  - {type: variant, offset: 7836, length: 351, content: 秣陵屬丹陽郡本金陵也秦始皇改孫權改曰建業後避晉愍帝諱改曰建康石頭城在今建康城西二里金陵志石頭城去臺城九里南合秦淮水張舜民曰石頭城者天生城壁有如城然在清涼寺北覆舟山上江行自北來者循石頭城轉入秦淮陸游曰龍灣望石頭山不甚高然峭立江中繚繞如垣牆清涼寺距石頭里餘西望宣化渡及厯陽諸山宋白曰晉平吴分為二邑自淮水南為秣陵北為建業江表傳紘謂權曰秣林楚武王所置名為金陵地勢岡阜連石頭昔秦始皇東巡經此縣望氣者云金陵地形有王者都邑之氣故掘斷連岡改名秣陵今處所具存宜為都邑獻帝春秋又載權曰秣陵有小江百餘里可以安大船吾方理水軍當移據之又據晉書郗隆傳隆為揚州刺史鎮秣陵齊王冋檄令赴討趙王倫隆停檄不下時王邃鎮石頭隆軍西赴邃者甚衆隆遣從事于牛渚禁之不得止將士卷邃攻殺隆則石頭在牛渚西詳考是事秣陵軍將赴邃欲自牛渚而西勤王也石頭自在牛渚東, SBCK: ''}
