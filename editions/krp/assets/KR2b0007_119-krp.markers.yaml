  - {type: variant, offset: 0, length: 330, content: 欽定四庫全書資治通鑑卷一百十九宋司馬光撰胡三省音注宋紀一起上章涒灘盡昭陽大淵獻凡四年故劉氏世居彭城彭城於春秋之時宋土也帝之始建國號曰宋高祖武皇帝諱裕字徳輿小字寄奴姓劉氏彭城縣綏徳里人漢楚元王交二十一世孫也彭城楚都故苗裔家焉晉氏東遷劉氏移居晉陵丹徒之京口里永初元年是年六月改元春正月己亥魏主還宫晉有天下通鑑於魏主率兼書名是年宋主受禪秦王熾磐立其子乞伏暮末為大子熾昌志翻茂考異曰晉書作乞伏慕末宋書又作乞佛蔓今従崔鴻十六國春秋作暮末仍領撫軍大將軍都督中外諸軍事大赦改元建𢎞宋王欲受禪而難於發言乃集朝臣宴飲此宋朝之臣也朝直遥翻従容言曰従千容翻桓𤣥簒位鼎命已移我首唱大義興復帝室南征北伐平定四海功成業著遂荷九錫荷下可翻今年將衰暮崇極如此物忌盛滿非可乆安今欲奉還爵位歸老京, SBCK: ''}
