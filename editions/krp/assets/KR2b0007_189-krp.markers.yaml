  - {type: punctuation, offset: 13826, content: (, id: KR2b0007_krp_189-bkkpn1309}
  - {type: variant, offset: 13826, length: 570, content: 已考異曰高祖實録癸趙郡王孝恭與蕭銑將文士𢎞相遇於清江合口擊之獲其戰艦千餘艘下宜昌當陽枝江松滋四縣舊書孝恭傳攻其水城克之所得船散於江中諸將皆曰虜得賊船當藉其用何為弃之無乃資賊邪孝恭曰不然蕭銑偽境南極嶺外東至洞庭若攻城未㧞援兵復到我則内外受敵進退不可雖有舟楫何所用之今銑緑江州鎮忽見船舸亂下必知銑敗未敢進兵來去覘伺動淹旬月用緩其救吾克之必矣銑救兵至巴陵見船被江而下果狐疑不敢輕進太宗實録孝恭傳進師至清江銑遣其將文士𢎞以兵拒戰擊走之追奔至于百里洲士𢎞收兵復戰又敗之追入北江銑悉兵以拒之孝恭將戰李靖止之曰楚人輕鋭難與爭鋒今新失荆門盡兵出戰此救敗之師也非其本圖勢不能久一日不戰賊必兩分留輕兵抗我退羸師以自守此即勢攜力弱擊之必捷孝恭不從遣靖撫營自以鋭師水戰孝恭果敗奔于南岸賊委舟大掠人皆負重靖見其軍亂進兵擊之賊大敗乘勝進軍入其郛郭攻其水城尅之悉取其舟楫散於江中賊救兵見之謂城已䧟莫敢輕進銑内外阻絶城中攜貮由是懼而出降唐厯孝恭靖乘勝進兵攻其水城尅之悉取其船艦散於江中諸將曰弃之無乃資敵靖曰不然云云如舊書所載孝恭語既而銑救兵見之謂城已䧟莫敢輕進銑由是懼而出降按十道志荆門在峽州宜都縣界夷陵峽州縣名清江在峽州巴山縣界百里洲在荆州枝江縣界江自此洲𣲖别去江陵已近故銑悉兵死戰太宗實録近為得實今從之其餘則參取四書之語孝恭以李靖為謀主盖靖畫策而孝恭為諸將言之今從唐厯, SBCK: ''}
