  - {type: variant, offset: 16488, length: 285, content: 新志武徳二年以黎陽縣置黎州宗城本廣宗縣隋仁壽初改為宗城縣避煬帝名也屬清河郡時置宗州洺彌并翻記考異曰實録世勣與黑闥戰於宋州我師敗績革命李勣為大揔管張仕貴為副領兵二萬人入宋州勣以五百騎自探聞黑闥到南宫馳至宋州不入城而西過至洺州騎馬於南門外喚陳君賔党仁𢎞秦武通等弃城西抜永年縣令程名振見武通狼狽走出馳馬向縣取家口入城城人恐相劫掠即閉城門自守名振乃於城北門上以繩懸下將母妻男女歩走西去不踰四五里母妻等被劫散失名振脱身而免黑闥攻宋城破之仕貴以輕騎突圍而走投相州數日黒闥大軍至洺州案舊地里志武徳四年置宗州於宗城縣宋字皆當作宗世勣名將必不至如革命記所云但力不能拒而弃城耳今從舊書黑闥傳, SBCK: ''}
