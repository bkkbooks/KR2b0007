  - {type: variant, offset: 8829, length: 299, content: 夫作樂者先定律律起于黄鍾黄鍾之長以黍審其度黄鍾之龠以黍審其容周禮典同雖曰掌六律六同之和以辯天地四方隂陽之聲以為樂器然度之長短容之多少未嘗詳言之也冬官考工既出于漢而鳬氏為鍾但言其廣長圓徑深厚而絫黍之法無聞焉肇請令芳依周禮造樂器未知其何所依也魏收曰太和中詔中書監髙閭修正音律久未能定閭表太樂祭酒公孫崇參知律吕鐘磬之事景明四年并州獲古銅權詔付崇以為鍾律之準永平中崇更造新尺以一黍之長絫為寸法尋太常卿劉芳受詔修樂以秬黍中者一黍之廣即為一分而中尉元匡以一黍之廣度黍二縫以取一分三家分競久不能决太和十九年髙祖詔以一黍之廣用成分體九十黍之長以定銅尺有司奏從前詔而芳尺同髙祖所制故遂典修金石更工衡翻𫝊直戀翻詰去吉翻, SBCK: ''}
