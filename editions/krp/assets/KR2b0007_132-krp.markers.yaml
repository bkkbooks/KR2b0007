  - {type: variant, offset: 57, length: 242, content: 去考異曰宋夲紀年冬永攸之大敗遂失淮北四州及豫州淮西地宋畧今年正月永攸之師次彭城虜掩其輜重敗王穆之於武原薛安都開彭城以納虜永等引退虜追之王師敗績畢捺亦舉兖州歸虜遂失淮北之地魏帝紀去年九月常珍奇薛安都内属張永沈攸之擊安都詔尉元救彭城西河公石救懸瓠十一月畢衆敬内属十二月己未次于秺周凱張永沈攸之相繼退走今年正月癸巳尉元破永攸之於呂梁東閏月沈文秀崔道固舉州内属按青冀今嵗始叛宋去年豈得已失淮北安都為永攸之所逼故降魏豈得今年永攸之始次彭城安都始納魏兵乎盖去年穆之等已敗退今春永大敗耳今從後魏帝紀, SBCK: ''}
