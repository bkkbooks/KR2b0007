  - {type: variant, offset: 451, length: 315, content: 録尚書六條事始見於此沈約志曰晉康帝世何充讓録表云咸康中分置三録王導録其一荀崧陸曄各録六條事然則似有二十四條若止有十二條則荀陸各録六條導又何所司乎若導總録荀陸分掌則不得復云導録其一也其後毎置二録輒云各録六條事又似止有十二條十二條者不知悉何條也江右張華江左庾亮並經關尚書七條則亦不知皆何事也余按宋元嘉以後江夏王義恭始興王濬南譙王義宣皆録尚書六條事沈氏世仕江左厯位通顯且不知為何事後之人何所取徴杜佑曰何充讓録表曰咸康中分置三録王導録其一荀松陸曄各録二條事晉氏度江有吏部祠部左民五兵度支五尚書是五條也晉初有吏部三公客曹駕部屯田度支六曹太康有吏部殿中五兵田曹度支左民六曹葢六條也如杜佑之言則六條葢六曹也沈約以何充表各録二條為各録六條致有此誤, SBCK: ''}
