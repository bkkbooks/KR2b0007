  - {type: variant, offset: 0, length: 258, content: 欽定四庫全書資治通鑑卷八十九宋司馬光撰胡三省音註晉紀十一起閼達閹茂盡柔兆困敦凡三年孝愍皇帝下建興二年春正月辛未有如日隕于地又有三日相承出西方而東行天文占曰三四五六日俱出並爭天下兵作又曰三日並出不過三旬諸矦爭為帝丁丑大赦有流星出牽牛入紫微晉天文志牽牛六星在河鼓南光燭地墜于平陽北化為肉長三十步廣二十七步長直亮翻廣右曠翻後倣此漢主聰惡之惡烏路翻以問公卿陳元達以為女寵太盛亡國之徴後考異曰載記元達等曰臣恐庭有三后之事按立三后在明年於時未也聰曰此隂陽之理何闗人事聰后劉氏賢明聰所為不道劉氏每規正之己丑劉氏卒諡曰武宣自是嬖寵競, SBCK: ''}
