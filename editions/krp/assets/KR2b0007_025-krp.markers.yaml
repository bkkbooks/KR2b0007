  - {type: variant, offset: 0, length: 288, content: 欽定四庫全書資治通鑑卷二十五宋司馬光撰胡三省音註漢紀十七起閼逢攝提格盡屠維協洽凡六年中宗孝宣皇帝上之下地節三年春三月詔曰盖聞有功不賞有罪不誅雖唐虞不能化天下今膠東相王成勞來不怠師古曰謂勸勉招懐百姓勞郎到翻來郎代翻流民自占八萬餘口師古曰隠度名數而來附業也占音之贍翻治有異等之效師古曰異于常等治直吏翻其賜成爵闗内矦秩中二千石未及徴用㑹病卒官卒子恤翻後詔使丞相御史問郡國上計長史守丞以政令得失貢父曰郡使守丞國使長史皆一物也故揔言郡國上計長史守丞後漢百官志諸矦王相如太守長史如郡丞又邉郡有丞元有長史長史上計無疑矣上時掌翻或對言前膠東相成偽自増加以䝉顯賞是後俗吏多為虛名云夏四月戊申立子, SBCK: ''}
