  - {type: variant, offset: 27, length: 374, content: 撰胡三省音注光撰通鑑以元豐七年十二月戊辰書成與目録考異同奏上之其著述大㫖具見光進書原表及馬端臨經籍考中當時劉安世所作音義十巻世已無傳南渡後有蜀史炤釋文又有偽托司馬釋文及廣都費氏註又有謝珏郭仲威直音及閩本直音羣書並行而乖謬咸甚三省本其父遺志因彚集衆説覃思以為之註元袁桷清容集載先友淵源録稱三省天台人寶祐進士賈相館之釋通鑑三十年兵難藁三失乙酉嵗留袁氏塾日手抄定註己丑冦作以書蔵窖中得免頗見是書顛末惟桷稱定註而今本題作音註疑出三省所自改也通鑑文繁義博貫串最難三省所釋於象緯推測地形建置制度沿革諸大端極為賅備讀通鑑者奉為圭臬真不啻左傳之有杜當陽矣又袁桷稱定註今在家尚未付梓而黄溥簡籍遺聞謂刋於臨海洪武初取藏南京國學則元末始鐫諸板今世所通行乃天啟中陳仁錫重刋本也乾隆四十五年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀進資治通鑑表臣光言先奉勅編集厯, SBCK: 論次歷}
