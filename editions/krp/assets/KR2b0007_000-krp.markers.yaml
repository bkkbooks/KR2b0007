  - {type: variant, offset: 17, length: 7, content: 二百九十四巻宋, SBCK: 戒於後丗者也漢司馬遷􆉒石室金匱之書據左氏國語推丗本戰國策楚漢春秋采經摭傳罔羅天下放失舊聞考之行事馳騁上下數千載閒首記軒轅至于麟止作爲紀表丗家書傳後之述者不能易此體也惟其是非不謬於聖人襃貶岀於至當則良史之才矣􅀂稽古英考留神載籍萬機之暇未甞廢卷甞命龍圖閣直學士}
