  - {type: variant, offset: 406, length: 7, content: 又奉聖㫖賜名資, SBCK: 俾就祕閣繙閱給吏史筆札起周威烈王訖于五代光之志以爲周積衰王室微禮樂征伐自諸矦岀平王東遷齊楚秦􅀳始大􅁊文更霸猶託尊王爲辭以服天下威烈王自陪臣命韓趙魏爲諸矦周雖未滅王制盡矣此亦古人述作造端立意之所繇也其所載明君良臣切摩}
