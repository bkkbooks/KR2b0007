  - {type: variant, offset: 576, length: 228, content: 編集臣夙昔所願一朝獲伸踊躍奉承惟懼不稱先帝仍命自選辟官屬於崇文院置局許借龍圖天章閣三館秘閣書籍賜以御書筆墨繒帛及御前錢以供果餌以内臣為承受眷遇之榮近臣莫及不幸書未進御先帝違棄羣臣陛下紹膺大統欽承先志寵以冠序錫之嘉名每開經筵常令進讀臣雖頑愚荷兩朝知待如此甚厚隕身喪元未足報塞茍智力所及豈敢有遺㑹差知永興軍以衰疾不任治劇乞就冗官陛下俯從所欲曲賜容養差判西京留司御史臺及提舉嵩山崇福宫前後六任仍聴以書局自隨給之禄秩不責職業臣既無他事得以研精極慮窮竭所有日力不足繼, SBCK: 條敎斷}
