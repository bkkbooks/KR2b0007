  - {type: variant, offset: 0, length: 348, content: 欽定四庫全書資治通鑑卷一百三宋司馬光撰胡三省音註晉紀二十五起重光協洽盡旃䝉大淵獻凡五年太宗簡文皇帝諱昱字道萬元帝之少子也封琅邪王後徙封㑹稽王海西即位琅邪絶嗣復徙封琅邪固讓故雖封琅邪而不去㑹稽之號諡法一徳不懈曰簡道德博聞曰文咸安元年是年十一月海西廢帝即位始改元咸安通鑑編年因以新元繋之春正月袁瑾朱輔求救於秦秦王堅以瑾為揚州刺史瑾渠吝翻輔為交州刺史遣武衛將軍武都王鑒前將軍張蚝帥步騎二萬救之蚝七吏翻帥讀曰率騎竒寄翻大司馬温遣淮南太守桓伊南頓太守桓石䖍等撃鑒蚝於石橋據桓温傳石橋在肥水北守式又翻大破之秦兵退屯慎城慎縣漢屬汝南郡晉分屬汝隂郡唐廬州之慎縣則梁魏之閒南梁郡之慎縣漢九江逡遒縣之地非此慎城伊宣之子也桓宣佐祖逖拒祖約守襄陽皆有功丁亥温拔壽春擒瑾及輔并其宗族送建康斬之秦王堅徙關東豪傑及雜夷十五萬户, SBCK: ''}
  - {type: page-break, offset: 0, content: '', id: KR2b0007_WYG_103-1a, image: WYG0306/WYG0306-0238a.png}
