  - {type: variant, offset: 8913, length: 397, content: 事考異曰蔣階李司空論云絳奏從史比來事就彰露頗多意不自安務欲生事所以曲陳利害頻獻計謀冀許用兵以求姑息令請親領士馬欲往邢洺假以就糧實為動衆去就之際情狀可知舊從史傳曰前年丁父憂朝㫖未議起復屬王士真卒從史竊獻誅承宗計以希上意用是起授委其成功及詔下討賊兵出逗留不進隂與承宗通謀令軍士潛懐賊號按三年九月戊戌李吉甫罷相出鎮掦州四年二月丁夘鄭絪罷相三月乙酉王士真卒承宗始襲位四月壬辰從史起復若以從史山東就糧即請討承宗之時則於是吉甫絪皆已罷相何得有譖絪之事又貶從史制辭云况近年上請就食山東及遣旋師不時㳟命致動其衆覬生其心頼劉濟抗忠正之辭使邪豎絶遲廻之計加以偏毁鄰境宻疏事情反覆百端髙下在手若是討承宗時朝廷不違其請何嘗使之旋師蓋李鄭未罷之前從史嘗毁鄰道乞加征討因擅引兵出山東朝廷命旋師託以就食邢洺不時奉詔但不知事在何年月日所欲攻討者何人劉濟有何辭而從史肯旋今因李絳論李錡家財事并言之新史云從史與承宗連和有詔歸潞誤也, SBCK: ''}
