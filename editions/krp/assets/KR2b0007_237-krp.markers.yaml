  - {type: variant, offset: 9320, length: 609, content: 唐禁中有浴堂殿德宗以來常居之沈括曰浴堂殿在翰林院北翰林院别設北扉以便於應召按舊書裴延齡傳德宗謂延齡曰朕所居浴堂院殿一栿以年多之故似有損蠧欲換之未能以此知德宗常居浴堂殿也程大昌曰沈氏謂學士院北扉為在浴堂之南便於應召此誤也學士院在紫宸蓬萊殿之西浴堂殿自在紫宸之東不在學士院南也唐學士多對浴堂殿李絳之極論中官栁公權之濡紙繼燭皆其地也然自六典以及吕圖皆無此一殿石林葉氏曰學士院北扉者浴堂之南便於應召此恐未審也學士院之北為翰林院翰林院之北為少陽院設或浴堂在此亦為寢殿三殿之所間隔不容有北門可以與之相屬也館本唐圖則有浴堂殿而殿之位置乃在綾綺殿南也綾綺者長安志曰在蓬萊殿東也而有學士院者自在蓬萊正西也東西既已相絶中間多有别殿無由有門可以相為南北也長安志嘗記浴堂門浴堂殿浴堂院矣且曰文宗嘗於此殿召對鄭注而於浴堂殿對學士焉又别有浴堂院亦同一處可以知其必在大明矣而不著其正在何地故予意館圖所記在綾綺殿南者是也而元稹承㫖㕔記又有可證者其説曰乗輿奉郊廟則承㫖得乘厩馬自浴殿由内朝以從若外賔進見於麟德則止直禁中以俟夫内朝也者紫宸殿也唐之郊廟皆在都城之南人主有事郊廟若非自丹鳯門出必由承天門出决不向後迂出西銀臺門也則浴堂之可趨内朝也内朝之必趨丹鳯門也其理固已可必矣又謂殿在蓬萊殿東即與紫宸殿相屬又可必矣然則館圖位置其與元稹所記殆相發揮大可信也至於外賔客見于麟德則麟德並學士院東則不待班從而可居院以待也合二語以想事宜則浴堂也必在紫宸殿東而不在其西也, SBCK: ''}
