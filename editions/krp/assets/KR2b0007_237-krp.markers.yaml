  - {type: variant, offset: 12757, length: 668, content: 近其靳翻懿考異曰趙鳯後唐祖紀年録懿祖諱執宜烈考諱盡忠自曽祖入覲復典兵於磧北德宗貞元五年回紇葛禄部及白眼突厥叛回紇忠貞可汗附于吐蕃因為鄉導驅吐蕃之衆三十萬冦我北庭烈考謂忠貞可汗曰吐蕃前年屠䧟靈鹽聞唐天子欲與吐蕃贊普和親可汗數世有功尚主恩若驕兒若贊普有寵於唐則可汗必無前日之寵矣忠貞曰若之何烈考曰唐將楊襲古固守北庭無路歸朝今吐蕃突厥併兵攻之儻無援助䧟亡必矣北庭既沒次及于吾可汗得無慮乎忠貞懼乃命其將頡千迦斯與烈考將兵援北庭貞元六年與吐蕃戰於磧口頡千迦斯不利而退烈考牙於城下以援襲古吐蕃攻圍經年諸部繼沒十二月北庭之衆劫烈考降於吐蕃由是舉族七千帳徙於甘州臣事贊普貞元十三年回紇奉誠可汗收復涼州大敗吐蕃之衆或有間烈考於贊普者云沙陀本回紇部人今聞回紇彊必為内應贊普將遷烈考之牙於河外時懿祖年已及冠白烈考曰吾家世為唐臣不幸䧟虜為它效命反見猜嫌不如乗其不意復歸本朝烈考然之貞元十七年自烏德鞬山率其部三萬東奔居三日吐蕃追兵大至自洮河轉戰至石門闗委曲三千里凡數百戰烈考戰沒懿祖挾䕶靈輿收合餘衆至於靈州猶有馬三千騎勝兵一萬時范希朝為河西靈鹽節度使聞懿祖至自帥師蕃界應接而歸以事奏聞德宗遣中使賜詔慰勞賞錫數十萬因於鹽州置隂山府以懿祖為都督授特進驍衛將軍同正憲宗即位詔懿祖入朝元和元年七月乃自振武至長安授特進金吾衛將軍留宿衛時范希朝亦徵為金吾上將軍二年吐蕃誘我党項部冦犯河西天子復命希朝為靈鹽節度命懿祖將兵佐之賊平戍西受降城據德宗實録貞元十七年無沙陀歸國事范希朝傳德宗時為振武節度使元和二年乃為朔方靈鹽節度使誘致沙陀元和元年亦無沙陀朝見紀年録恐誤今從實録舊傳新書, SBCK: ''}
