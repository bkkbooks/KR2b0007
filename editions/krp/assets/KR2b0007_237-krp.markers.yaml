  - {type: variant, offset: 14553, length: 335, content: 均考異曰舊吉甫傳曰初裴為僕射判度支交結權倖欲求宰相先是制試直言極諫料其中有譏刺時政忤犯權倖者因此均黨揚言皆執政教指冀以揺動吉甫頼諫官李約獨孤郁李正辭蕭俛宻疏陳奏帝意乃解吉甫早嵗知奬羊士諤擢為監察御史又司封員外郎吕温有詞藝吉甫亦眷接之竇羣初拜御史中丞奏請士諤為侍御史温為郎中知雜事吉甫怒其不先闗白而所請又有超資者持之數日不行因而有隙羣遂伺得日者陳克明出入吉甫家宻捕以聞憲宗詰之無姦狀吉甫以裴垍久在翰林憲宗親信必當大用遂宻薦垍代已因自圖出鎮其年九月拜淮南節度使在揚州毎有朝廷得失皆宻疏論列按牛僧孺等指陳時政之失吉甫泣訴故貶考覆官裴垍等雖欲為䜛若云執政自教舉人詆時政之失豈近人情邪吉甫自以誣搆鄭絪貶斥裴垍蓋憲宗察見其情而疎薄之故出鎮淮南及子德裕秉政掩先人之惡改定實録故有此説耳, SBCK: ''}
