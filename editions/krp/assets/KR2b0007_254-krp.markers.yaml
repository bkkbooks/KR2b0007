  - {type: variant, offset: 7285, length: 214, content: 開元十六年以六胡州殘人置宥州乾元元年理經畧軍後移治長澤縣長澤漢朔方郡三封縣地諱考異曰歐陽修五代史作拓拔思敬意謂薛史避國耳按舊唐書實録皆作思恭實録天復二年九月武定軍節度使李思敬以城降王建思敬本姓拓跋鄜夏節度使思恭保大節度使思孝之弟也思孝致仕以思敬為保大留後遂升節度又徙武定軍新唐書党項傳曰思恭為定難節度使卒弟思諫代為節度思孝為保大節度以老薦弟思敬為保大留後俄為節度然則思恭思敬乃是兩人思敬後附李茂貞或賜國姓故更姓李修合以為一人誤也, SBCK: ''}
