  - {type: variant, offset: 6803, length: 341, content: 蔚考異曰實録陳景斯齎詔入達靼召李克用軍屯州克用因大掠雁門以北軍鎮薛居正五代史先是景思與李友金𤼵沙陀諸部五千騎南赴京師友金即武皇之族父也中和元年二月友金軍至絳州將度河刺史瞿稹謂景思曰巢賊方盛不如且還代北徐圖利害四月友金旋軍雁門瞿稹至代州半月之間募兵三萬營於崞縣之西其軍皆北邊五部之衆不閑軍法瞿稹李友金不能制友金謂景思云云景思然之促奏行在天子乃以武皇為雁門節度使仍令以本軍討賊李友金𤼵五百騎齎詔召武皇於逹靼武皇即帥逹靼諸部萬人趨雁門按景思請赦國昌父子而克用至者葢國昌已老獨使克用來耳是嵗克用但攻掠太原又陷忻代二州明年十二月始自忻代留後除雁門節度使葢此際止赦其罪復為大同防禦使乃陷忻代自稱留後朝廷再召之始除雁門薛史誤也新表中和二年以河東忻代二州𨽻雁門節度更大同節度為雁門節度治代州此其證也, SBCK: ''}
