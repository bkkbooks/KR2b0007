  - {type: variant, offset: 13040, length: 423, content: 師考異曰舊紀中和元年七月鐸為都統十二月帥二萬至京畿屯於盩厔舊鐸傳亦在元年唐年補録元年十一月乙巳制以鐸為都統十二月乙亥鐸屯盩厔續寳運録元年八月鐸拜天下都統唐補紀中和元年四月髙駢帥師駐泊東塘自五月出府九月却歸朝廷即以鐸統諸道兵馬收復長安鐸為都統諸書年月不同如此新紀二年正月辛亥王鐸為諸道行營都都統髙駢罷都統據寳録四月答髙駢詔罷都都統當在此年今從實録新紀舊駢傳云僖宗知駢無赴難意乃以鐸為京城四面諸道行營兵馬都統韋昭度領江淮鹽鐵轉運使駢既失兵柄又落利權攘袂大詬累上章自訴語詞不遜按駢罷都統依前為諸道鹽鐵轉運使五月方罷北夢𤨏言曰王鐸初鎮荆南黄巢入冦望風而遁他日將兵潼關黄巢令人傳語云相公儒生且非我敵無汚我鋒刃自取敗亡也後到成都行朝拜諸道都統所以髙駢上表目之為敗軍之將也按鐸自荆南䘮師貶官未嘗将兵潼關皮光業見聞録為都統在此年二月亦誤又舊紀傳新傳鐸正為都都統新紀作都統實録初除及罷時皆為都統中間多云都都統又西門思恭為都都監按此時諸將為都統者甚多疑鐸為都都統是也, SBCK: ''}
