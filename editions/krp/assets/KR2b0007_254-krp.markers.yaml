  - {type: variant, offset: 11779, length: 458, content: 州初髙潯援京師廣帥師至陽平謀為亂不行還據潞州自稱留後用法嚴酷三軍畏之方立乗虛襲殺焉又曰貶昭義節度使髙潯為端州刺史中和三年實録又曰初孟方立殺髙潯自立薛居正五代史方立傳曰中和二年為澤州天井闗戍將時黄巢犯闗輔州郡易帥有同博奕先是沈詢髙湜相繼為昭義節度怠於軍政及有歸秦劉廣之亂方立見潞帥交代之際乗其無備率戍兵徑入潞州自稱留後新紀八月昭義軍節度使髙潯及黄巢戰於石橋敗績十將成麟殺潯入于潞州九月己巳昭義軍戍將孟方立殺成麟自稱留後方立傳惟以成麟為成鄰餘如新紀按乾符二年實録十月昭義軍亂逐節度使髙湜貶湜象州司户栁玭傳云貶髙要尉三年十一月詔魏博韓簡云劉廣逐帥擅權云云是廣逐湜擅據潞州也薛史孟方立傳亦云沈詢髙湜怠於軍政致有歸秦劉廣之亂是廣亂在前也舊紀九月髙潯牙將劉廣擅還潞州是月潯天井闗戍将孟方立攻廣殺之自稱留後貶潯端州刺史此葢舊紀誤實録因之薛史方立傳曰見潞帥交代之際帥兵入潞州不言何帥交代若不逐帥何能據州事無所因殊為踈畧舊紀恐是誤以髙湜事為髙潯事實録此云殺廣明年又云殺潯自相違新紀傳皆云成麟殺潯方立斬麟月日事實頗詳必有所出今從之方立汧, SBCK: ''}
