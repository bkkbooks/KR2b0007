  - {type: variant, offset: 4919, length: 508, content: 處考異曰舊王存傳曰時李都守河中降賊㑹王重榮斬偽使通使於處存乃同盟誓營於渭北時巢賊僣號天下藩鎮多受其偽命惟鄭畋守鳯翔鄭從讜守太原處存王重榮首倡義舉俄而鄭畋破賊前鋒王鐸自行在至故諸鎮翻然改圖以出勤王之師按鐸中和二年始至於時未也王重榮傳曰初重榮為河中馬歩都虞侯巢賊據長安蒲帥李都不能拒稱臣於賊賊偽授重榮節度副使重榮以賊徵求無已欲拒之都曰吾兵㣲力寡絶之立見其患願以節鉞假公翌日都歸行在重榮知留後事乃斬賊使求援鄰藩北夢𤨏言曰重榮始為牙將黄巢犯闕元戎李都奉偽畏重榮附者多因薦為副使一日忽謂都曰令公助賊陷一邦於不忠而又日加箕歛衆口紛紜倐忽變生何以遏也遽命斬其偽使都無以對因以軍印授重榮而去及都至行在朝廷又以前京兆尹竇潏間道至河中代都重榮迎之潏前為京兆尹有慘酷之名時謂之垜疊及至翌日進軍校于庭謂曰天子命重臣作鎮將遏賊衝安可輕議斥逐令北門出去且為惡者必一兩人而已爾等可言之潏不知軍衆皆重榮之親黨也衆皆不對重榮乃屏肅佩劔厯階而上謂潏曰為惡者非我而誰遂召潏之僕吏控馬及堦請依李都前例乃云速去潏不敢仰視躍馬復由北門而出新傳取之按十一月辛亥朔重榮已作亂掠坊市辛酉以重榮為留後都為太子少傅則都已去河中矣及黄巢犯闕都何嘗奉偽亦未嘗聞以潏代都今不取, SBCK: ''}
