  - {type: variant, offset: 0, length: 270, content: 欽定四庫全書資治通鑑卷一百二宋司馬光撰胡三省音註晉記二十四起屠維大荒落盡上章敦牂凡二年海西公下太和四年春三月大司馬温請與徐兖二州刺史郗愔江州刺史桓冲豫州刺史袁真等伐燕慕容恪死温乃伐燕自謂相時而動可以制勝豈知為慕容垂所敗哉郗丑之翻愔挹淫翻初愔在北府晉都建康以京口為北府歴陽為西府姑孰為南州温常云京口酒可飲兵可用京口兵可用葢山川風氣然也豈必至謝𤣥用之而後敵人知畏哉深不欲愔居之而愔暗於事機乃遺温牋遺于季翻欲共奬王室請督所部出河上愔子超為温參軍取視寸寸毁裂乃更作愔牋更工衡翻自陳非將帥才不堪軍旅將即亮翻帥所類翻老病乞閒地自養勸温并領已所統温得牋大, SBCK: ''}
