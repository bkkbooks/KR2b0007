  - {type: variant, offset: 0, length: 290, content: 欽定四庫全書資治通鑑卷一百四十四宋司馬光撰胡三省音註齊紀十重光大荒落一年和皇帝諱寳融字智昭明帝第八子也中興元年是年三月始改元春正月丁酉東昏矦以晉安王寳義為司徒建安王寳寅為車騎將軍開府儀同三司東昏矦以永元三年紀年騎奇寄翻乙巳南康王寳融始稱相國相悉亮翻下同大赦以蕭頴胄為左長史蕭衍為征東將軍楊公則為湘州刺史去年楊公則取長沙因就用為湘州刺史戊申蕭衍發襄陽異考曰梁高祖紀云二月戊申𤼵襄陽按戊申正月十三日梁紀誤也留弟偉總府州事憺守壘城壘城者築壘附近大城猶今堡寨也憺徒敢翻又徒濫翻府司馬莊丘黒守樊城莊丘黑盖為征東府司馬衍既行州中兵及儲偫皆虛偫直里翻積物以待用謂之偫魏興太守裴師仁齊興太守顏僧都, SBCK: ''}
