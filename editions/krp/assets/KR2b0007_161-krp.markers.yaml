  - {type: variant, offset: 0, length: 277, content: 欽定四庫全書資治通鑑卷一百六十一宋司馬光撰胡三省音註梁紀十七著雍執徐一年髙祖武皇帝十七太清二年春正月己亥慕容紹宗以鐵騎五千夹擊侯景承上卷上年紹宗與景相持事故不書東魏景誑其衆曰汝輩家屬已為髙澄所殺衆信之盖前乎此時景以此言誑衆也誑居况翻紹宗遥呼曰呼火故翻汝軰家屬並完若歸官勲如舊歸謂復歸東魏官者各人先所居之官勲勲階也被髮向北斗為誓質北斗為誓以明其言之不欺被皮義翻景士卒不樂南渡樂音洛其将暴顯等各帥所部降於紹宗暴顯去年春為侯景所執将即亮翻帥讀曰率降户江翻景衆大潰争赴渦水渦音戈水為之不流為于偽翻景與腹心數騎自硖石濟淮稍收散卒得步騎八百人騎竒寄翻南過小城人登陴詬, SBCK: ''}
