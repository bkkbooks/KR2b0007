  - {type: variant, offset: 4067, length: 512, content: 其考異曰平剡録曰諸軍圍賊於剡賊悍甚所謂女軍者亦乗城摘礫以中人三日凡八十三戰賊雖衂官軍亦疲裘甫佯言乞降諸將使騎來白公曰賊憊蹔休耳謹備之仍遣押牙薛敬義謂諸將曰功成矣勉之勿怠也果復三戰二十一日夜甫與劉暀劉慶十餘輩又從百餘人出遙與諸將語伺我軍之懈將使勇者潰圍焉諸將得公誡夜皆設伏於營前甫輩離城數十步伏兵疾走以間之鋭師數百復繼之城中賊不出甫遽甚不知所為遂成擒焉至是用兵六十六日矣二十三日縛致府城公於衙門陳兵以見執其徒劉暀劉慶二十餘輩三斬之械裘甫獻闕下玉泉子見聞録曰王式討裘甫甫始起於剡既為官軍所敗復入於剡城堅卒鋭不可遽拔式乃約降許奏以金吾將軍甫許焉其將劉暀獨以為不可比及越城左右則械手以木曳頸以組甫曰吾既已降何用是為左右曰法也到越則釋去公且行有命矣既至式登南樓俟之曰裘甫何罪罪皆劉暀輩命三斬之暀顧謂甫曰君竟拜金吾乎斬甫于長安東市初甫之入剡也雖已屢敗向使城守朞嵗未可平也玉泉子曰古人有言殺降不祥李廣所以不侯良有以也王公亦不聞大貴鄭公述平剡録一何曲筆哉雖驟歷清顯而卒以喪明不復起可不愼哉按二書所言莫知孰是然裘甫在剡城窮困已極勢不能久式不必更以詐誘之或者諸將為之不可知也甫之出降也或欲突走或被誘而來皆不可知要之為出城乞降官軍因邀斷其後擒之耳, SBCK: ''}
