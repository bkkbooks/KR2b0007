  - {type: variant, offset: 7228, length: 422, content: 劉昫曰唐武徳四年以隋朱崖郡為崖州自雷州徐聞縣南舟行四百三十里度大海達崖州宋白曰宋開寳六年割舊崖州之地屬瓊州却改振州為崖州殺考異曰實録又賜寛手詔云云如聞李琢在安南日害杜存誠李鄠又處置其子守澄使誘導羣蠻陷沒城邑卿到鎮日於李鄠處索取前後敕詔一一參詳初李琢在鎮蠻首領愛州刺史兼土軍兵馬使杜存誠宻誘溪洞夷獠為之鄉導琢察其不忠戮死焉及李鄠至鎮蠻陷安南鄠走武州召土軍收復城邑而存誠家兵甚衆朝廷務姑息乃贈存誠金吾將軍鄠以失備貶儋州補國史蠻陷安南李鄠投武州召土軍收復頗有功績殺首領杜存誠以捍禦盤桓不戮力盡敵兼洞夷獠為鄉導之罪也鄠貶儋州後以存誠谿洞強獷家兵數多子弟繼總軍旅皆輸忠勇軍府倚賴方甚朝廷亦加姑息乃再舉憲章長流鄠崖州贈存誠金吾將軍以誘其竭力命前鹽州刺史王宙為都䕶按鄠所殺存誠之子守澄已為王式所逐鄠至旬日殺之非因扞禦不戮力也代鄠者乃王寛非王宙補國史誤也今獨取鄠克復安南一事餘皆從平剡録實録不按唐朝若以杜守澄之戮為李鄠罪則當贈守澄官當贈其父官此余所以致疑於前也, SBCK: ''}
