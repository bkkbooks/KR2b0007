  - {type: punctuation, offset: 5285, content: (, id: KR2b0007_krp_250-bkkpn445}
  - {type: variant, offset: 5285, length: 774, content: 徳裕貶見二百四十八卷宣宗大中元年六考異曰裴旦李太尉南行録載咸通二年九月二十日右拾遺内供奉劉鄴表略云子曄貶立山尉去年獲遇陛下惟新之命覃作解之恩移授郴縣尉今已沒於貶所又曰血屬已盡生涯悉空又曰枯骨未歸於塋域一男又殞於江湘又曰其李徳裕請特賜贈官敕依奏實録注引東觀奏記云令狐相綯夢徳裕曰某已謝明時幸相公哀之許歸葬故里綯具為其子滈言之滈曰李衞公犯衆怒又崔相鉉魏相謩皆敵人也見持政必將上前異同未可言也後數日上將坐延英綯又夢徳裕曰某委骨海上思還故里與相公有舊幸憫而許之既寤復謂滈曰向見衞公精爽尚可畏吾不言必掇禍明日入中書且為同列言之既而於帝前論奏許其子蒙州立山尉曄䕶喪歸葬又是時栁仲郢鎮東蜀設奠於荆南命從事李商隠為文曰躬承新渥言還舊止又云身留蜀郡路隔伊川鄴奏乃云孤骨未歸塋域曄懿宗初纔徙郴縣尉未詳或者後人偽作之非鄴本奏也實録注又云白敏中為中書令時與右庶子段全緯書云故衛公太尉災興鴿鳥怨結江魚親交雨散於西園子弟蓬飄於南土嘗蒙一顧繼履三台保持獲盡於天年論請爰加於寵贈全緯嘗為徳裕西川從事故敏中語及云按此似繇敏中開發而數本追復贈官多連鄴奏徳裕素有恩於敏中敏中前作相既逺貶之至此又掠其美鄙哉按劉鄴表云去年獲遇陛下惟新之命覃作解之恩則上此表在咸通元年非二年也舊傳鄴為翰林學士承旨以李徳裕貶死朱崖大中朝令狐綯當權累有赦宥不蒙恩列懿宗即位綯在方鎮屬郊天大赦鄴奏論之李太尉南行録鄴此時未為翰林學士因上此表敕批便令内養宣喚入翰林充學士餘依奏金華子雜編曰宣宗嘗私行經延資庫見廣厦連綿錢帛山積問左右曰誰為此庫侍臣對曰宰相李徳裕執政日以天下每嵗備用之餘自是已來邊庭有急支備無乏者兹實有賴上曰今何在曰頃以坐吳湘獄貶于崖州上曰如有此功於國微罪豈合深譴由是劉公鄴得以進表乞追雪之上一覽表遂許其加贈歸葬焉按宣宗素惡徳裕故始即位即逐之豈有不知其在崖州而云豈合深譴又劉鄴追雪在懿宗時此説殊為淺陋今不取, SBCK: ''}
