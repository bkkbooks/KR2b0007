  - {type: variant, offset: 11422, length: 458, content: 蔡考異曰實録二月安南經略使襲奏蠻賊楊思僣羅伏州扶耶縣令麻光髙部領其衆於城西角下營嶺南東道節度使韋宙奏蠻賊去十二月二十七日逼安南城池經略使檢校工部尚書蔡襲出兵格鬬殺傷相當正月三日賊衆圍城進攻甚急襲城上以車弩射之至七日城陷襲左膊中弩箭死家口并元從七千餘人悉隕於賊從事樊綽携印度江其荆南江西鄂岳襄州兵突到城東水際無船却囘相率入東羅門殺蠻僅一二千人至夜賊救兵至遂屠其城按此二奏似後人采集蠻書為之其中又多差舛如楊思僣蠻書中兩處有之皆作楊思縉葢草書誤為僣耳彼雖蠻夷豈肯名思僣也張􅒷錦里耆舊傳載高駢與雲南牒亦云楊思縉善蘭節度新書亦承此誤為僣又蠻書所云思縉光高部領者桃花蠻五六千人耳非謂盡將羣蠻也補國史云蠻衆五萬攻安南非止五六千人也又十二月二十一日裸形蠻茫蠻桃花人已在城下豈至二十七日始逼安南也蠻言書言二十七日逼城者但記見河蠻尋傳蠻之日耳又正月二日三日者但記以車弩射得苴子之日耳非其日始圍城也且城陷奔迸之際非樊綽身在其間豈知其詳然四道兵所殺人數猶因僧無碍説始知之韋宙身在廣州何得所奏一如樊綽之書其偽明矣新傳曰是夜蠻遂屠城亦因實録而誤, SBCK: ''}
