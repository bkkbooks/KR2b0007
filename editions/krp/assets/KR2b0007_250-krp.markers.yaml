  - {type: variant, offset: 12818, length: 385, content: 酈道元曰湘灕同源分為二水南則灕水北則湘川湘灕之間陸地廣百餘步謂之始安嶠漢伐南越岀零陵下灕水即此路也湘水出零陵始安縣陽朔山自零陵西南謂之澪渠新書曰桂州有灕水岀海陽山世言秦命史禄伐越鑿為漕馬援討徴側復治以通餽後為江水潰毁渠遂廞淺唐李渤復浚之范成大桂海虞衡志曰湘灕二水皆出靈川之海陽行百里分南北下北下曰湘稠灘急瀧又二千里至長沙水始緩南下曰灕名灘三百六十又千二百里至畨禺以入海又曰靈渠在桂之興安縣秦始皇戍嶺時史禄鑿此以運之遺迹湘水源於雲泉之陽海山在此下瀜江牂柯下流本南下廣西興安水行其間地勢最高二水遠不相謀禄始作此渠派湘之流而注之瀜使北水南合北舟踰嶺其作渠之法於湘流沙磕中壘石作鏵觜鋭其前逆分湘流為兩激之六十里行渠中以入瀜江與俱南渠繞興安界深不數尺廣丈餘六十里間置斗門三十六土人但謂之斗舟入一斗則復閘斗伺水積漸進故能循崖而上建瓴而下千斛之舟亦可徃來治水巧妙無如靈渠者澪音零灕音离, SBCK: ''}
