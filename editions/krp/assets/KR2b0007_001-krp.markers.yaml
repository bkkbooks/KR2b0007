  - {type: variant, offset: 17581, length: 257, content: 侯戰國䇿以聶政刺韓相事及并中哀侯為一事此從史記蜀本注曰按太史公年表及韓世家於韓烈侯三年皆書聶政殺韓相俠累於哀侯六年又皆書嚴遂弑哀侯以刺客傳考之聶政殺俠累事在哀侯時以戰國䇿考之亦然從傳與戰國策則是年表世家於烈侯三年書盗殺俠累誤矣通鑑於烈侯三年載聶政刺俠累事又於哀侯六年韓嚴遂殺其君哀侯是從年表世家所書蓋刺客傳初不言并殺哀侯止戰國䇿言之通鑑豈以此疑之歟故載并刺哀侯不書聶政止曰使人以此求之則通鑑之意不以嚴仲子為嚴遂亦不以俠累為韓廆止從年表世家而不信其傳也余按温公與劉道原書亦疑此事廆户賄翻相息亮翻刺七亦翻朝直遥翻走音奏, SBCK: 矦}
