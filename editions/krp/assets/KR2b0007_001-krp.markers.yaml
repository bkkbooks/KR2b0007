  - {type: variant, offset: 16287, length: 711, content: 謚法布徳就義曰穆中情見貌曰穆尊賢敬讓曰共既過能改曰共執事堅固曰共共讀曰㳟魯考異曰司馬遷史記六國表周威烈王十九年甲戌穆公元年烈王元年丙午共公元年顯王十七年己巳康公元年二十六年戊寅景公元年赧王元年丁未平公元年二十年丙寅文公元年四十三年己丑頃公元年五十九年乙巳周亡秦荘襄元年壬子楚滅魯按魯世家穆公三十三年卒若元甲戌終乙巳則是三十二年也共公二十二年卒若元丙午終戊辰則是二十三年也康公九年卒景公二十五年卒平公二十二年卒若元丁未終乙丑則是十九年也文公二十三年卒頃公二十四年楚滅魯班固漢書律厯志文公作緡公其在位之年與世家異者惟平公二十年耳本志自魯僖公五年正月辛亥朔旦冬至推之至成公十二年正月庚寅朔旦冬至定公七年正月己巳朔旦冬至元公四年正月戊申朔旦冬至康公四年正月丁亥朔旦冬至緡公二十二年正月丙寅朔旦冬至漢高祖八年十一月乙巳朔旦冬至武帝元朔六年十一月甲申朔旦冬至元帝初元二年十一月癸亥朔旦冬至共間相距皆七十六年此最為得實又與魯世家注皇甫謐所紀歳次皆合今從之六國表差謬難可盡據也余按考異自魯僖公五年至漢元帝初元二年六百餘年間十二月朔旦冬至相距皆七十六年此最為得實又與魯世家注皇甫謐所紀歳次皆合葢謂劉彛叟長厯也且言史記六國表差謬難可盡據又按通鑑目錄編年用劉彝叟長厯漢武帝太初元年初用夏正定厯史記厯書是年書閼逢攝提格目錄書彊圉赤奮若閼逢攝提格甲寅也彊圉赤奮若丁丑也有二十四年之差温公用彝叟厯邵康節皇極經世書亦用彝叟厯康節少自雄其才既學力慕高逺一見李之才遂從而受學廬于共城百源冬不爐夏不扇夜不就席者數年覃思於易經也皇極經世書不能違彜叟厯及其來居於洛而温公亦奉祠以書局在洛相過從稔又夙所敬者也余意其講明之間必嘗及此而决于用彜叟厯讀考異此一段辭意可見, SBCK: ''}
