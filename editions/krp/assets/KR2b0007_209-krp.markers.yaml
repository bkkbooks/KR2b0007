  - {type: punctuation, offset: 6581, content: (, id: KR2b0007_krp_209-bkkpn517}
  - {type: variant, offset: 6581, length: 425, content: 謂受闕啜忠莭賂以致娑葛畔換也考異曰景龍文舘記曰監察御史崔琬具衣冠對仗彈大學士兵部尚書郢國公宗楚客及侍中紀處訥時楚客在列奏言臣以庸妄叨居樞宻中外朋結謀臣臣先奏聞計垂天鍳上頷之謂琬曰楚客事朕知且去侍仗下來至仗下後琬方讀奏敕令於西省對問中書門下奏無状有進止即令復位初娑葛父子與阿史那忠莭代為仇讐娑葛頻乞國家為除忠莭安西都䕶郭元振表請如其奏宗楚客固執言忠莭竭誠於國作扞玉闕若許娑葛除之恐非威彊拯弱之義上由是不許無何娑葛擅殺御史中丞馮嘉賓殿中侍御史吕守素破滅忠莭侵擾四鎮時碎葉鎮守使中郎周以悌率鎮兵數百人大破之奪其所侵忠莭及于闐部衆數萬口奏到上大悦拜以悌左屯衛将軍仍以元振四鎮經畧使授之敕書簿責元振宗議發勁卒令以悌同郭䖍瓘比討仍邀吐蕃及西域諸部計㑹同擊娑葛右臺御史觧琬議稱不可後竟與之和娑葛聞前事大怨乃付元振状稱宗先取忠莭金上以問之宗具以前事奏時太平安樂二公主以親貴權寵各立黨與隂相傾奪爰自要官宰臣皆分為兩時太平尤與宗不善故諷琬以弹之外傳取娑葛金非也今從實録記, SBCK: ''}
