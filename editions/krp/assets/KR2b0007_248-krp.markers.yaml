  - {type: variant, offset: 9079, length: 383, content: 即考異曰韋昭度續皇王寳運錄曰宣宗憲皇第四子自憲皇崩便合紹位乃與姪文宗文宗崩武皇慮有他謀乃密令中常侍四人擒宣宗於永巷幽之數日沈於宫厠宦者仇公武愍之乃奏武宗曰前者王子不宜乆於宫厠誅之武宗曰唯唯仇公武取出於車中以糞土雜物覆之將别路歸家密養之三年後武皇宫車晏駕百官奉迎于玉宸殿立之尋擢仇公武為軍容使尉遲偓中朝故事曰敬宗文宗武宗相次即位宣皇皆叔父也武宗初登極深忌焉一日㑹鞠於禁苑間武宗召上遥覩瞬目於中官仇士良士良躍馬向前曰適有㫖王可下馬士良命中官輿出軍中奏云落馬已不救矣尋請為僧遊行江表間㑹昌末中人請還京遂即位令狐澄貞陵遺事曰上在藩時甞從駕迴而上誤墮馬人不之覺比二更方能興時天大雪四顧悄無人聲上寒甚㑹巡警者至大驚上曰我光王也不悟至此方困且渇若為我求水警者即於旁近得水以進遂委而去上良乆起舉甌將飲顧甌中水盡為芳醪矣上獨喜自負一舉盡甌已而體微煖有力遂步歸藩邸此三事皆鄙妄無稽今不取, SBCK: ''}
