  - {type: variant, offset: 14649, length: 733, content: 寅考異曰實録五月戊以太皇太后寢疾權不聽政宰臣帥百寮問太后起居己夘復問起居下遺令是日太后崩初上纂位以憲宗遇弑頗疑后在黨中至是暴得疾崩帝之志也甲申白敏中帥百寮上表請聽政不許乙酉又上表不許丙戌三上表乃依六月貶禮院檢討官王皥為潤州句容令舊傳曰宣宗繼統即后之諸子也思禮愈異於前朝大中年崩袝景陵后歴位七朝五居太母之尊人君行子孫之禮福夀隆貴四十餘年雖漢之馬鄧無以加焉識者以為汾陽社稷之功未泯復鍾慶于懿安焉裴延裕東觀奏記曰憲宗皇帝晏駕之夕上雖幼頗記其事追恨光陵商臣之酷即位後誅鉏惡黨無漏網者郭太后以上英察孝果且懷慙懼時居興慶宫一日與一二侍兒同升勤政樓倚衡而望便欲殞於樓下欲成上過左右急持之即聞于上上大怒其夕大后暴崩上志也又曰懿安郭太后既崩喪服許如故事禮院檢討官王皥抗疏請后合葬景陵配饗憲宗廟室既入上大怒宰臣白敏中召皥詰其事皥對云云翌日皥貶潤州句容縣令周墀亦免相按實錄所言暴崩事皆出于東觀奏記若實有此事則既云是夕暴崩何得前一日先下詔云以太后寢疾權不聽政若無此事則廷裕豈敢輒誣宣宗或者郭后實以病終而宣宗以平日疑忿之心欲黜其禮故皥爭之疑以傳疑今參取之東觀奏記又曰杜悰通貴日久門下有術士姓李悰任西川節度使馬植罷黔中赴闕至西川李術士一見植謂悰曰馬中丞非常人也相公厚遇之悰未之信術士一日密言於悰曰相公將有甚禍非馬中丞不能救乞厚結之悰始驚信𤼵日厚幣贈之仍令邸吏為植買宅生生之費無闕焉植至門方知感悰不知其㫖尋除光禄卿報狀至蜀悰謂術士曰貴人到闕作光禄勲矣術士曰姑待之稍進大理卿又遷刑部侍郎充諸道鹽鐵使悰始驚憂俄而作相懿安皇太后崩後悰懿安子壻也忽一日内榜子索檢責宰相元載故事植諭㫖翌日延英上前萬端營救植素辯能回上㫖事遂中寢按植㑹昌中已自黔中入為大理卿悰今年二月始為西川節度今不取按裴延裕後作廷裕必有一誤, SBCK: ''}
