  - {type: variant, offset: 5700, length: 394, content: 東考異曰實録中書門下奏請上都都兩街各留寺十所毎寺留僧十人大藩鎮各一所僧亦依前詔敕上都東都毎街各留寺兩所毎寺僧各留三十人中書門下奏奉敕諸道所留僧尼數宜令更商量分為三等上至二十人中至十人下至五人今據天下諸道共五十處四十六道合配三等鎮州魏博淮南西川山南東道荆南嶺南汴宋幽州東川鄂岳浙西浙東宣歙湖南江西河南府望毎道許留僧二十人山南西道河東鄭滑陳許潞磁鄆曹徐泗鳯翔兖海淄青滄景易定福建同華州望今毎道許留十人夏桂邕管黔中安南汝金商州容管望毎道許留五人一道河中已敕下留十三人按鎮州凡五十六州四十一道今云五十處四十六道誤也杜牧杭州南亭記曰武宗即位始去其山臺野邑四萬所冠其徒幾至十萬人後至㑹昌五年始命西京留佛寺四僧惟十人東都二寺天下所謂節度觀察同華汝三十四治所得留一寺僧凖西京數其他刺史州不得有寺凡除寺四千六百僧尼䈂冠二十六萬五百實録注又云按唐時石刻云兩都留寺僧各十人郡國留寺二僧各三人數皆不同今從實録前文, SBCK: ''}
