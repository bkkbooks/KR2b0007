  - {type: variant, offset: 6934, length: 468, content: 五臺在代州五臺縣山形五峙相傳以為文殊示現之地華嚴經疏云清涼山者即代州鴈門五臺山也以嵗積堅冰夏仍飛雪曽無炎暑故曰清涼五峯聳出頂無林木有如壘土之臺故曰五臺古傳云山在長安東北一千六百餘里代州之所管山頂至州城一百餘里其山左隣恒山右接天池南屬五臺縣北至繁畤縣環基所至五百餘里靈記云五臺山有四埵去臺各一百二十里據古經所載今北臺即是中臺中臺即是南臺大黄尖即是北臺栲栳山即是西臺漫天石即是東臺惟北臺中臺古時無異東臺西臺古今無别無恤臺恒山頂是也昔趙襄子名無恤曽登此山觀代國下瞰東海西瞢山有宫池古廟隋煬帝避暑於此而居因天池造立宫室龍樓鳯閣遍滿池邊號為西埵南繋舟山上有銅環船軸猶在昔帝堯遭水繋舟於此世傳文殊見于南臺號為南埵北有覆宿堆即夏屋山也後魏孝文皇帝避暑往復宿此下見雲州謂之北埵中臺稍近西北有太華泉有古寺二十餘處東臺去太華泉四十二里䑓上遥見滄瀛諸州日出時下視大海猶陂澤焉有古寺十五處西臺去太華泉四里危嶝千雲喬林拂日有古寺十二處南臺去太華泉八十里最為幽寂有古寺九處北臺去太華泉十二里有古寺八處唐末所添寺不在其數五臺縣本漢慮虒縣慮虒音驢夷隋大業二年改為五臺縣, SBCK: ''}
