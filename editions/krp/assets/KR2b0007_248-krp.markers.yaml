  - {type: variant, offset: 10787, length: 250, content: 考異曰蔡京王貴妃傳曰帝疾亟才人乆視帝而歸燕息處濃粧潔服如常日乃取所翫用物散與内家淨盡持帝所授巾至帝前已見升遐容易自縊而仆於御座下以縊為名而得卒舊紀武宗葬端陵徳妃王氏祔焉李徳裕獻替記自上臨御王妃有專房之寵至是以嬌妬忤㫖一夕而殞羣情無不驚懼以謂上功成之後喜怒不測徳裕因以進諫在五年十月與王貴妃傳不同恐獻替記誤康軿劇談録曰孟才人善歌有寵於武宗屬一旦聖體不豫召而問之曰我或不諱汝將何之對曰若陛下萬嵗之後無復生為是口令於御前歌河滿子一曲聲調悽咽聞者涕零及宫車晏駕哀慟數日而殞窆於端陵之側此事恐正是王才人傳聞不同, SBCK: ''}
