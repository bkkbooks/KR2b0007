  - {type: variant, offset: 7640, length: 455, content: 臣考異曰獻替記上信任宰無不先訪問無獨斷之事唯誅討澤潞不肯捨赴振武官健及誅翦党項此二事並禁中𤼵詔處分更不顧問振武官健回旗不肯進𤼵先害監軍傔一人監軍王惟直自出曉諭又被傷痍旬日而卒禁中兩軍樞密已下恨其不殺節將唯害中人所以激上之怒盡須𠞰戮上問宰臣曰我送石雄領兵至澤潞令盧鈞不誅討罪人如何徳裕曰盧鈞已失律性又寛愞必恐自誅不得若便替却盧鈞亂卒罪惡轉大須興兵討伐恐不如先除替令新帥誅翦上謂徳裕曰勿惜盧鈞本非材將救澤潞叛兵疑李丕報嫌往劉稹平後處置澤潞與劉稹同惡僅五千餘人皆是取得髙文端王釗狀通姓名勘李丕狀同然後處分其間有三兩人或王釗狀無名並不更問足明是李丕不能逞其憾又云惟務茍安因循為政凡方鎮𤼵兵只合不出軍城嚴兵自衛於城門閱過部伍更令軍將慰安豈有自出送兵馬又令家口縱觀事同兒戲實不足惜緣大兵之後須有防虞臣不敢隠黙由是中詔處分不復顧問殺按盧鈞還入潞州諭戍兵使赴振武尋遣兵追擊盡之非上不肯捨也既云不可便替又云不如先除替語自相違上云勿惜盧鈞是上語下云臣不敢隠黙乃是徳裕語獻替記至此差舛尤甚不可復據又處置澤潞五千餘人太多必是五十字誤耳, SBCK: ''}
