  - {type: variant, offset: 0, length: 406, content: 欽定四庫全書資治通鑑卷八十四宋司馬光撰胡三省音註晉紀六起重光作噩盡𤣥黓閹茂凡二年孝惠皇帝中之上永寧元年此猶是永康二年正月乙丑趙王倫改元建始四月帝反正始改元永寧春正月以散騎常侍安定張軌為涼州刺史散悉置翻騎奇寄翻軌以時方多難隂有保據河西之志故求為涼州時州境盜賊縱横難乃旦翻縱子容翻鮮卑為冦軌至以宋配汜瑗為謀主楊正衡曰汜音凡姓也瑗于眷翻悉討破之威著西土張氏保據涼土始此嗚呼世亂則人思自全然求全而不能自全者亦多矣竇融張軌之求出河西此求全而得全者也謝晦袁顗之求鎮荆襄此求全而不能自全者也蓋竇融張軌始終一心以奉漢晉此固宜永終福禄詒及子孫者也謝晦袁顗志在據地險以全身其用心非矣天所不與也然劉焉求牧益州袁紹志圖冀部石敬塘心欲河東皆以之潛規非望至其成敗久速則有非智慮所及者相國倫與孫秀使牙門趙奉詐傳宣帝神語云倫宜早入西宫司馬懿追謚宣皇帝時倫以東宫為相國府謂禁中為西宫散騎常侍義陽王威望之孫也素諂事倫倫以威兼侍中使威逼奪帝璽綬作禪詔, SBCK: ''}
