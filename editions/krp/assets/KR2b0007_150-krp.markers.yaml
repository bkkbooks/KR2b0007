  - {type: variant, offset: 221, length: 340, content: 至考異曰勝𫝊云朔州見彧按後魏地理志雲中舊名朔州及改懐朔鎮為朔州不容更以雲中為朔州今但云雲中按魏氏初都平城北邊列置諸鎮孝昌以後改鎮為州尋即荒廢其地漫不可考杜佑以為魏都平城於郡北三百餘里置懐朔鎮又云遷洛之後於郡北三百餘里置朔州又云後魏初雲中在郡北三百餘里定襄故城北夫其曰皆在郡北三百餘里将是一處邪将是三處邪宋白曰朔州馬邑郡東北至故雲中三百六十里後魏為畿内之地亦曾為懐朔鎮孝文遷洛之後於州北三百八十里定襄故城置朔州又曰後魏初雲中定襄故城是則是朔州與後魏初雲中共一處通鑑此後書改懐朔鎮為朔州更命朔州為雲州此即魏志所謂雲中舊名朔州之證也是則懐朔鎮與雲中是兩處矣是後李崇自崔暹白道之敗引還雲中後又自雲中引還平城其退師道里先後可見而唐之雲中郡乃魏之平城詳而考之歴代建置州郡其名淆雜難指一處為定也, SBCK: ''}
