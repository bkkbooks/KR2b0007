  - {type: variant, offset: 0, length: 427, content: 欽定四庫全書資治通鑑卷二十三宋司馬光撰胡三省音註漢紀十五起旃䝉協洽盡柔兆敦牂凡十二年孝昭皇帝上諱弗陵武帝少子也張晏曰後以二名難諱但名弗荀悅曰諱弗之字曰不應劭曰禮諡法聖聞周逹曰昭始元元年夏益州夷二十四邑三萬餘人皆反遣水衡都尉吕破胡募吏民及發犍為蜀郡犇命徃擊大破之犍為蜀郡皆屬益州犍為郡唐瀘戎嘉眉榮資簡州地蜀郡唐成都府彭蜀卭雅翼茂州之地應劭曰舊時郡國皆有材官騎士以赴急難今夷反常兵不足以討之故權發精勇聞命犇走故謂之犇命李竒曰平居發二十以上至五十為甲卒今者五十以上六十以下為犇命犇命言急也師古曰應說是余據左傳子重子反一歲七奔命奔命者救急之師固不拘五十以上六十以下也犍居言翻秋七月赦天下大雨至於十月渭橋絶武帝初崩賜諸矦王璽書左傳襄公在楚季武子使公冶問璽書追而與之盖君臣通用也秦漢以來惟至尊以為信燕王旦得書不肻哭曰璽書封小張晏曰文小則封小京師疑有變遣幸臣夀西長孫縱之王孺等之長安蘇林曰夀西姓長名師古曰之徃也以問禮儀為名隂刺候朝廷事刺七亦翻探也及有詔褒賜旦錢三十萬益, SBCK: ''}
