  - {type: variant, offset: 9238, length: 387, content: 祭祀謂郊廟社稷明堂也表䟽在朝羣臣及四方所上者胡客四夷朝貢之客兵馬調遣征伐及畨上宿衛者也符寳郎掌天子八寳及國之符節辨其所用有事則請之於内既事則奉而藏之藏其左而班其右以合中外之契一曰銅魚符所以起軍旅易守長二曰𫝊符所以給郵驛通制命三曰隨身魚符所以明貴賤應徵召四曰木契所以重鎮守慎出納五曰旌節所以委良能假賞罰魚符之制王畿之内左三右一王畿之外左五右一左者在内右者在外行用之日從第一為首後事須用以次發之周而復始大事兼敕書小事但降符函封遣使合而行之𫝊符之制太子監國曰雙龍符左右各十京都留守曰麟符左二十其右一十有九東方曰青龍符西方曰騶虞符南方曰朱雀符北方曰𤣥武符左四右三左者進内右者付外隨身符之制左二右一太子以玉親王以金庶官以銅佩以為飾刻姓名者去官而納焉不刻者𫝊而佩之木契之制太子監國則王畿之内左右各三王畿之外左右各五庶官鎮守則左右各十旌節之制命大将帥及遣使於四方則請而假之旌以專賞節以專殺, SBCK: ''}
