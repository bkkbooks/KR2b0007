  - {type: variant, offset: 11490, length: 267, content: 六岡横亘如乾卦六畫之象裴度平樂里第偶居第五岡程大昌曰宇文愷之營隋都也曰朱雀街南北盡郭有六條髙坡象乾卦六爻故於九二置宫殿以當帝王之居九三立百司以應君子之數九五貴位不欲常人居之故置𤣥都觀及興善寺以鎭其地劉禹錫賦看花詩即此也裴度宅在朱雀街東自北而南則為第四坊名永樂坊畧與𤣥都觀東西相對而其第之比觀基蓋退北兩坊不正相當也唐實錄裴度在興元自請入覲李逢吉之黨有張權輿者排之以為度名應圖䜟宅據乾岡不召而來其意可見蓋權輿之所謂宅據乾岡者即龍首第五坡之餘勢也然度之所居張說第在其西尤與𤣥都觀相近而張嘉貞之第正在坊北何獨指度為占據乾岡也小人挾私欺君皆此類, SBCK: ''}
