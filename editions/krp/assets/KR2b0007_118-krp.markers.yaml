  - {type: variant, offset: 0, length: 229, content: 欽定四庫全書資治通鑑卷一百十八宋司馬光撰胡三省音注晉紀四十起强圉大荒落盡屠維協洽凡三年安皇帝癸義熈十三年春正月甲戌朔日有食之秦主泓朝㑹百官於前殿朝直遙翻以内外危迫君臣相泣以内則兄弟搆難外為晉夏所迫也征北將軍齊公恢帥安定鎮戸三萬八千焚廬舎自北雍州趨長安秦分嶺北五郡為北雍州鎮安定泓不用東平公紹懿横之言以召亂帥讀曰率雍於用翻趨七喻翻自稱大都督建義大將軍移檄州郡欲除君側之惡揚威將軍姜紀帥衆歸之建節將軍彭完都棄隂宻犇還長安恢至新支姜紀説恢曰國家重將大兵皆在東方京師, SBCK: ''}
