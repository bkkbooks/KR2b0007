  - {type: variant, offset: 5443, length: 698, content: 左傳祝佗曰成王分魯公以官司彞器杜預註彞器常用之器漢武帝時洛下閡鮮于妄人耿壽昌造員儀以考歴度和帝時賈逵又加黄道順帝時張衡又制渾象具内外規黄赤道南北極列二十四氣二十八宿中外星官及日月五緯以漏水轉之於殿上室内星中出没與天相應其後吳陵績造渾象王蕃制渾儀舊渾象以二分為一度凡周七尺三寸半分張衡更制以四分為一度凡周一丈四尺六寸渾王蕃以古制局小星辰稠穊衡器傷大難可轉移更制象以三分為一度凡周天一丈九寸五分分之三周禮大司徒以土圭之法測土深正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂日至之景尺有五寸謂之地中註云土圭所以致四時日月之景也鄭司農云測土深謂南北東西之深也日南立表處太南近日也日北謂立表處太北逺日也景夕謂日昳景乃中立表處太東近日也景朝謂日未中而景中立表處太西逺日也𤣥謂晝漏半而置土圭表隂陽審其南北景短於土圭謂之日南是地於日為近南也景長於土圭謂之日北是地於日為近北也東於土圭謂之日東是地於日為近東也西於土圭謂之日西是地於日為近西也如是則寒暑隂風偏而不和是未得其所求凡日景於地千里而差一寸鄭司農又云土圭之長尺有五寸以夏至之日立八尺之表其景適與土圭等謂之地中今潁川陽城地為然晉輿服志記里鼔車駕四馬制如司南車崔豹古今註曰大章車所以識道里也起於西京亦曰記里車車上有二層皆有木人行一里下層撃鼓行十里上層擊鐲黄帝作指南車晉輿服志司南車一名指南車駕四馬其下制如樓三級四角金龍銜羽葆刻木為仙人衣羽衣立車上車雖囘轉手常南指大駕出行為先啓之乘蕭子顯曰指南車四周廂上施屋指南人衣裙襦天衣在廂中上四角皆施龍孑干縁帷色青孔雀毦烏布皁複幔漆畫輪駕牛皆銅校飾記里鼔車制如指南上施華葢孑繖衣漆畫鼔機皆在内渾戸本翻, SBCK: ''}
