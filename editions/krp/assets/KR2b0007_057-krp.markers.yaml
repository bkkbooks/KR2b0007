  - {type: variant, offset: 0, length: 258, content: 欽定四庫全書資治通鑑卷五十七宋司馬光撰胡三省音註漢紀四十九起𤣥武困敦盡上章君灘凡九年孝靈皇帝上之下熹平元年春正月車駕上原陵司徒掾陳留蔡邕曰吾聞古不墓祭朝廷有上陵之禮始謂可損今見威儀察其本意乃知孝明皇帝至孝惻隠不易奪也據禮儀志西都舊有上陵至東都則其儀文愈備其畧見四十四卷永平元年丄時掌翻掾俞絹翻易以䜴翻禮有煩而不可省者此之謂也三月壬戌太傅胡廣薨年八十二廣周流四公太傅太尉司徒司空三十餘年賢曰廣以順帝漢安元年為司空至熹平元年薨三十一年也歴事六帝安順冲質桓靈禮任極優罷免未甞滿嵗輒復升進復扶又翻所辟多天下名士與故吏陳蕃李咸, SBCK: ''}
