  - {type: variant, offset: 2725, length: 1520, content: 雒陽記曰太學在雒陽城南開陽門外講堂長十丈廣二丈堂前石經四部本碑凡四十六枚西行尚書周易公羊傳十六碑存十二碑毁南行禮記十五碑悉崩壞東行論語三碑毁禮記碑上有諫議大夫馬日磾議郎蔡邕名古文科斗書也大也𨽻今謂之八分書後魏江式曰伏羲氏作而八卦形其畫軒轅氏興而靈龜彰其采古史蒼頡覽二象之爻觀鳥獸之迹别剏文字以代結繩迄于三代厥體頗異雖依類取制未能殊蒼氏矣周禮保氏教國子以六書一曰指事二曰象形三曰諧聲四曰㑹意五曰轉注六曰假借葢是蒼頡之遺法及宣王太史史籕著大十五篇與古文或同或異時人即謂之籕書孔子修六經左丘明述春秋皆以古文七國殊軌文字乖别秦兼天下李斯奏罷不合秦文者斯作蒼頡篇車府令趙髙作爰歴篇太史令胡母敬作博學篇皆取史籕或頗有省改所謂小者也秦燒經書滌除舊典官獄繁多以趣約易始用隷書古文由此息矣隷書者始皇使下杜人程邈附于小所作也世人以邈徒隷即謂之隷書故秦有八體一曰大二曰小三曰符書四曰蟲書五曰摹印六曰署書七曰殳書八曰隷書漢興有尉律學教以籕書乂習八體乂有草書莫知誰始其形書雖無厥誼亦是一時之變通也孝宣時召通蒼頡讀者獨張敞從受之凉州刺史杜業沛人爰禮講學大夫秦近亦能言之孝平時徵禮等百餘人説文字于未央宫中黄門侍郎揚雄採以作訓纂亡新居攝使大司馬甄豐校文字之部頗改定古文時有六書一曰古文孔子壁中書也二曰竒字即古文而異者三曰書云小也四曰佐書秦隷書也五曰繆所以摹印也六曰鳥蟲所以書幡信也壁中書者魯恭王壊孔子宅而得尚書春秋論語孝經也又北平侯張蒼獻春秋左氏傳書體與孔氏相類即前代之古文也後漢郎中扶風曹喜號曰工小異斯法而甚精巧自是後學皆其法也又詔侍中賈逵修理舊文殊藝異術王教一端苟有可以加於國者靡不悉集逵即汝南許慎古學之師也慎嗟時人之好竒歎俗儒之穿鑿撰説文解字十五篇類聚羣分雜而不越最可得而論也左中郎將陳留蔡邕採李斯曹喜之灋為古今雜形詔于太學立石經刋載五經題書楷灋多是邕書後開鴻都書畫竒能莫不雲集時諸方獻無出邕者魏初博士清河張揖著埤蒼廣雅古今字詁綴拾遺漏增長事類抑于文為益然其字詁方之許篇古今體用或得或失陳留邯鄲淳亦與揖同特善倉雅許氏字指八體六書精究開理有名于揖又建三字石經於漢碑西較之説文隷大同而古字小異又有京兆韋誕河東衛覬二家並號能當時臺觀榜題寶器之名悉是誕書咸𫝊之子孫世稱其妙晉世義陽王典祠令吕忱表上字林六卷尋其况趣附託許慎説文而按偶章句隱别古籕竒惑之字文得正隷不差意也忱弟靜别放故左校令李登聲韻之法作韻集五卷使宫商龣徵羽各為一篇而文字與兄便是魯衛音讀楚夏時有不同皇魏承百王之季世易風移文字改變形繆錯隷體失真俗學鄙習復加虛造巧談辯士以意為疑炫惑于時難以釐改乃曰追來為歸巧言為辯小兔為䨲神蟲為蠶如斯甚衆皆不合孔氏古書史籕大許氏説文石經三字也式言字學本末頗詳故備著之趙明誠金石録曰石經葢漢靈帝熹平四年所立其字則蔡邕小字八分書也後漢書儒林傳叙云為古文隷三體者非也蓋邕所書乃八分而三體石經乃魏時所建也洪氏隷續曰石經見于范史帝紀及儒林宦者傳皆云五經蔡邕張馴𫝊則曰六經惟儒林傳云為古文𨽻三體書法酈氏水經云漢立石經于太學魏正始中又刻古文𨽻三字石經唐志有三字石經古兩種曰尚書曰左傳獨隋志所書異同其目有一字石經七種三字石經三種既以七經為蔡邕書矣又云魏立一字石經乃其誤也范蔚宗時三體石經與熹平所䥴並列于學宮故史筆誤書其事後人襲其譌錯或不見石刻無以考正趙氏雖以一字為中郎所書而未見三體者歐陽氏以三體為漢碑而未嘗見一字者近世方勺作泊宅編載其弟匋所䟦石經亦為范史隋志所惑指三體為漢字至公羊碑有馬日磾等名乃云世用其所正定之本因存其名可謂謬論北史江式云魏邯鄲淳以書教皇子建三字石經于漢碑西按此碑以正始年中立漢書云元嘉元年度尚命邯鄲淳作曹娥碑時淳已弱冠自元嘉至正始亦九十餘年式以三字為魏碑則是謂之邯鄲淳所書非也, SBCK: ''}
