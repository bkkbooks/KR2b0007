  - {type: variant, offset: 0, length: 296, content: 欽定四庫全書資治通鑑卷八十三宋司馬光撰胡三省音註晉紀五起屠維協洽盡上章涒灘凡二年孝惠皇帝上之下元康九年春正月孟觀大破氐衆於中亭水經注扶風美陽縣有中亭水亦謂之中亭川在美陽縣西獲齊萬年太子洗馬陳留江統洗悉薦翻以為戎狄亂華宐早絶其原乃作徙戎論以警朝廷曰夫夷蠻戎狄地在要荒周禮九州之外謂之蕃國謂東夷南蠻西戎北狄也國語曰蠻夷要服戎狄荒服韋昭注曰要者要結好信而服從之荒者言荒忽無常也要一遥翻禹平九土而西戎即叙孔安國曰言荒服之外流沙之内皆就次叙班固曰即叙者言就而叙之其性氣貪婪婪盧含翻凶悍不仁悍矦罕翻又下罕翻四夷之中戎狄為甚弱則畏服彊則侵叛當其彊也以漢高祖困於白登孝文軍於霸上及其弱也以元成之微而單于入朝此, SBCK: ''}
