  - {type: variant, offset: 2563, length: 3627, content: 司馬彪志曰京房六十律相生之法以上生下皆三生二以下生上皆三生四陽下生隂隂上生陽終于中吕而十二律畢矣中吕上生執始執始下生去滅上下相生終于南事而六十律畢矣夫十二律之變至于六十猶八卦之變至于六十四也宓羲作易紀陽氣之初以為律法建日冬至之宫以黄鍾為宫太簇為商姑洗為角林鍾為徵南吕為羽應鍾為變宫㽔賔為變徵此聲氣之元五音之正也故各終一日其餘以次運行當日者各自為宫而商徵以類從焉禮運曰五聲六律十二管還相為宫此之謂也以六十律分朞之日黄鍾自冬至始及冬至而復隂陽寒燠風雨之占生焉於以檢攝羣音考其髙下茍非草木之聲則無所不合虞書曰律和聲此之謂也房又曰竹聲不可以度調故作準以定數準之狀如瑟長丈而十三弦隠間九尺以應黄鍾之律九寸中央一弦下有畫分寸以為六十律清濁之節房言律詳於劉歆所奏其術施行於史官侯部用之律術曰陽以圓為形其性動隂以方為節其性静動者數三静者數一以陽生隂倍之以隂生陽四之皆三而一陽生隂曰下生隂生陽曰上生上生不得過黄鍾之清濁下生不得及黄鍾之數實皆參天兩地圓蓋方覆六耦承奇之道也黄鍾律吕之首而生十一律者也其相生也皆三分而損益之是故十二律之得十七萬七千一百四十七是為黄鍾之實又以二乗而三約之是為下生林鍾之實又以四乗而三約之是為上生太簇之實推此上下以定六十律之實以九三之數萬九千六百八十三為法律為寸於準為尺不盈者十之所得為分又不盈十之所得為小分以其餘正其强弱以黄鍾十七萬七千一百四十七下生林鍾黄鍾為宫太簇商林鍾徵一日律九寸準九尺色育十七萬六千七百七十六下生謙待未知商謙待徵六日律八寸九分小分八微强準八尺九寸萬五千九百七十三執始十七萬四千七百六十二下生去滅執始為宫時息商去滅徵六日律八寸八分小分七大强準八尺八寸萬五千五百一十六丙盛十七萬二千四百一十下生安度丙盛為宫屈齊商安度徵六日律八寸七分小分六微弱準八尺七寸萬一千六百七十九分動十七萬八十九下生歸嘉分動為宫随期商歸嘉徵六日律八寸六分小分四强準八尺六寸八千一百五十二質未十六萬七千八百下生否與質未為宫形晉商否與徵六日律八寸五分小分二微强準八尺五寸四千九百四十五大吕十六萬五千八百八十八下生夷則大吕為宫夾鍾商夷則徵八日律八寸四分小分三弱準八尺四寸五千五百八分否十六萬三千六百五十四下生解形分否為宫開時商解形徵八日律八寸三分小分一强準八尺三寸二千八百五十一凌隂十六萬一千四百五十二下生去南凌隂為宫族嘉商去南徵八日律八寸二分小分一弱準八尺二寸五百一十四少出十五萬九千二百八十下生分積少出為宫争南商分積徵六日律八寸小分九强準八尺萬八千一百六十太蔟十五萬七千四百六十四下生南吕太簇為宫姑洗商南吕徵一日律八寸準八尺未知十五萬七千一百三十四下生白吕未知為宫南授商白吕徵六日律七寸九分小分八强準七尺九寸萬六千三百八十三時息十五萬五千三百四十四下生結躬時息為官變虞商結躬徵六日律七寸八分小分九少强準七尺八寸萬八千一百六十六屈齊十五萬三千二百五十三下生歸期屈齊為宫路時商歸期徵六日律七寸七分小分九弱準七尺七寸萬六千九百三十九随期十五萬一千一百九十下生未夘随期為宮形始商未夘徵六日律七寸六分小分八强準七尺六寸萬五千九百九十二形晉十四萬九千一百五十五下生夷汗形晉為宫依行商夷汗徵六日律七寸五分小分八弱準七尺五寸萬五千三百二十五夾鍾十四萬七千四百五十六下生無射夾鍾為宫中吕商無射徵六日律七寸四分小分九强凖七尺四寸萬八千四十八開時十四萬五千四百七十下生閉掩開時為宫中吕商閉掩徵八日律七寸三分小分九微弱準七尺三寸萬七千八百四十一族嘉十四萬三千五百一十三下生鄰齊族嘉為宫内負商鄰齊徵八日律七寸二分小分九微强準七尺二寸萬七千九百五十四争南十四萬一千五百八十二下生期保争南為宫物應商期保徵八日律七寸一分小分九强準七尺一寸萬八千三百二十七姑洗十三萬九千九百六十八下生應鍾姑洗為宫㽔賔商應鍾徵一日律七寸一分小分一微强準七尺一寸二千一百八十七南授十三萬九千六百七十下生分烏南授為宫南事商分烏徵六日律七寸小分九大强準七尺萬八千九百三十變虞十三萬八千八十四下生遲内變虞為官盛變商遲内徵六日律七寸小分一半强準七尺三千三十路時十三萬六千二百二十五下生未育路時為宫離宫商未育徵六日律六寸九分小分二微强準六尺九寸四千一百三十三形始十三萬四千三百九十二下生遲時形始為宮制時商遲時徵五日律六寸八分小分三弱準六尺八寸五千四百七十六依行十三萬二千五百八十二上生色育依行為宫謙待商色育徵七日律六寸七分小分三大强準六尺七寸七千五十九中吕十三萬一千七十二上生執始中吕為宫去滅商執始徵八日律六寸六分小分六弱準六尺六寸萬一千六百四十二南中十二萬九千三百八上生丙盛南中為宫安度商丙盛徵七日律六寸五分小分七微弱準六尺五寸萬三千六百八十五内負十二萬七千五百六十七上生分動内負為宫歸嘉商分動徵八日律六寸四分小分八强準六尺四寸萬五千四百五十物應十二萬