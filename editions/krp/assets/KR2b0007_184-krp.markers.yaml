  - {type: variant, offset: 3766, length: 351, content: 復音如字武考異曰創業注帝集文官人及大郎二郎等而謂之曰以天賛我應無此勢以人事見機而發無冇不為借遣吾當突厥武周之地何有不來之理諸公謂云何議者以老生屈突通相去不逺李密譎誑奸謀難測突厥見利而行武周事胡者也太原一都之㑹義兵家屬在焉愚夫所慮伏聽教㫖唐公顧謂大郎二郎曰爾軰何如對曰武周位極而志滿突厥少信而貪利外雖相附内實相猜突厥必欲來利太原寧肯近忘馬邑武周悉其此勢未必同謀同志老生突厥奔競來拒進闕圖南退窮自北還無所入往無所之畏溺先沈近於斯矣今禾菽被野人馬無憂坐即有糧行即得衆李密戀於倉粟未遑逺畧老生輕躁破之不疑定業取威在兹一决諸人保家愛命言不可聽雨罷進軍若不殺老生兒等敢以死謝唐公喜曰爾謀得之吾其决矣三占從二何籍與言懦夫之徒幾敗乃公事耳太宗實錄盡以為太宗之策無建成名葢没之耳據建成同追左軍則建成意亦不欲還也今從創業注, SBCK: ''}
