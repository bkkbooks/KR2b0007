  - {type: variant, offset: 5192, length: 412, content: 異考曰革命記帝以李密在洛口征遼回日令右翊衛將軍薛世雄於留鎮兵内簡練精鋭及幽易驍勇討密經過之處若有草竊隨便誅翦仍令王世充等諸軍並取世雄處分世雄乃自領精兵六萬四月末至河間郡城下作營州縣皆備牛酒軍糧以待薛將軍時建徳以無糧食兵士先皆分散餘軍不滿千人在武强縣境收麥充食聞世雄兵至河間惶懼無計問一女巫欲走避之如何巫云不免問欲首如何巫云亦不吉問欲掩其不備擊之如何巫云今夜天未明到大吉卜時日己午卜處去河間一百四十里建徳簡精兵二百八十人先行餘勒續發建徳與衆决云夜到即打明即降之吉凶之事在此舉耳遂行去世雄營二里天已屬明又聞吹角聲擬發建徳惶惑欲降須㬰大霧忽起建徳曰此天助我也遂引兵入營攻之兵遂大亂世雄左右先已裝束擬發世雄遂得上馬奔走仍中數槍傼而獲免幽易之士並不欲作留鎮兵先無闘意既不知賊多少悉弃甲奔亡遂使山東賊勢轉盛李密先招慰河北州縣多悉從之世雄慙憤而卒唐竇建徳傳云七月世雄討之建徳帥敢死士千人襲之世雄以數百騎遁去今從隋薛世雄傳以建徳傳革命記參之, SBCK: ''}
