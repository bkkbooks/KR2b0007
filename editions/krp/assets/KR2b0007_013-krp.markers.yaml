  - {type: variant, offset: 0, length: 266, content: 欽定四庫全書資治通鑑卷十三宋司馬光撰胡三省音註漢紀五起閼逢攝提格盡昭陽大淵獻凡十年髙皇后荀悦曰諱雉之字曰野雞索隱曰字娥姁應劭曰禮婦人從夫諡故稱髙也師古曰諱雉故臣下諱雉也姁許于翻元年冬太后議欲立諸吕為王問右丞相陵陵曰髙帝刑白馬盟曰髙祖刑白馬與羣臣盟曰非劉氏不王非有功不侯非劉氏而王天下共擊之今王吕氏非約也太后不説説讀曰悦問左丞相平太尉勃對曰髙帝定天下王子弟今太后稱制王諸吕無所不可王于况翻太后喜罷朝朝直遥翻王陵讓陳平絳侯曰始與髙帝啑血盟諸君不在耶啑所甲翻小啜也索隱引鄒氏音使接翻今髙帝崩太后女主欲王吕氏諸君縱欲阿意背約背蒲妹翻何面目見, SBCK: ''}
