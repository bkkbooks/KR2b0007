  - {type: variant, offset: 3272, length: 389, content: 唐制戸部度支以本司郎中侍郎判其事又置鹽鐵轉運使其後用兵以國計為重遂以宰相領其職乾符已後天下喪亂國用愈空始置租庸使用兵無常隨時調斂兵罷則止梁興置租庸使領天下錢榖廢鹽鐵戸部度支之官莊宗滅梁因而不改明宗入立誅租庸使孔謙而廢其使職以大臣一人判户部度支鹽鐵號曰判三司至長興元年張延朗因請置三司使事下中書中書用唐故事拜延朗特進工部尚書充諸道鹽鐵轉運等使兼判戸部度支事詔以延朗充三司使班在宣徽使下三司置使則自梁始宋白曰同光二年左諫議大夫竇專奏請廢租庸使名目歸三司畧曰伏見天下諸色錢榖比屬戸部設度支金部倉部各有郎中員外將地賦山海鹽鐵分擘支計徴輸後為租賦繁多添置三司使領同資國力共致豐財安史作亂民戸流亡征租不時經費多闕惟江淮嶺表郡縣完全總三司貨財發一使徴賦在處勘覆名曰租庸收復京城尋廢其職務廣明中黄巢叛逆僖宗播遷依前又以江淮徴賦置租庸使及至還京旋亦停廢偽梁將四鎮節制徴輸置宫使名目後廢宫使改置租庸, SBCK: ''}
