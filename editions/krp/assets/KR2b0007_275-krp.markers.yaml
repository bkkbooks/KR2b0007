  - {type: variant, offset: 11653, length: 333, content: 喪息浪翻朝直遥翻復扶又翻考異曰閻自若唐末汎聞録云同光四年京師亂朝命斷絶鏐遂僭大號改元保正明年明宗錫命至乃去號復用唐正朔紀年通譜云鏐雖外勤貢奉而隂為僭竊私改年號于其國其後子孫奉中朝正朔漸諱改元事及錢俶納土凡其境土有石刻偽號者悉使人交午鑿滅之惟杭州西湖落星山塔院中有鏐封此山為壽星寶石山偽詔刻之於石雖經鑱毁其文尚可讀後題云寶正六年嵗在辛卯明宗長興二年也其元年即天成元年也好事者或傳曰保正非也余公綽閩王事迹云同光元年梁策錢鏐為尚父來年改寶正元年永隆三年吳越世宗文穆王薨林仁志王氏啟運圖云同光元年梁封浙東尚父為吳越國王尋自改元寳正長興三年吳越武肅王崩子世皇嗣永隆二年吳越世皇崩子成宗嗣公綽仁志所記年嵗差繆然可見錢氏改元及廟號故兼載焉至今兩浙民間猶謂錢鏐為錢太祖今㕘取諸書為據, SBCK: ''}
