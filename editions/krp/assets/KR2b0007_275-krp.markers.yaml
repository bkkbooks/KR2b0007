  - {type: variant, offset: 6614, length: 454, content: 莊宗之伐蜀也詔髙季興自取夔忠萬三州為巡屬季興不能取王衍既敗三州歸唐季興乃求為巡屬雖不許可也為季興不式王命興兵致討張本夔考異曰莊宗實録云王建于夔州置鎮江軍節度以忠萬施為屬郡雲安監有𣙜鹽之利建升為安州上舉軍平蜀詔季興自收元管屬郡荆南軍未進夔州連帥以州降繼岌十國紀年荆南史天成元年二月王表請夔忠萬州及雲安監𨽻木道莊宗許之詔命未下莊宗遇弑六月王表求三州明宗許之劉恕按莊宗實録及薛史帝紀同光三年十一月庚戌荆南髙季興奏收復夔忠等州曽顔勃海行年記云得夔忠萬等州明宗實録及薛史韋説傳云討西蜀季興請攻峽内先朝許之如能得三州俾為屬郡三川既定季興無尺寸之功莊宗實録同光四年三月丙寅髙季興請峽内夔忠萬等州割歸當道明宗實録天成元年六月甲寅髙季興奏去冬先朝詔命攻取峽内屬郡尋有施州官吏知臣上峽率先歸投忠萬夔三州旦夕期於收復被郭崇韜專將文字約臣回歸方欲陳論便值更變此説頗近實故從之葢三年十月夔忠萬三州降於繼岌十一月庚戌季興奏請三州為屬郡舊史誤云奏收復也行年記差繆最多不可為據或者夔州雖自降于繼岌季興表云收復三州攘為己功亦無足怪今從明宗實録, SBCK: ''}
