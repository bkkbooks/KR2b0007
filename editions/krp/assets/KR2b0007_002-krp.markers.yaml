  - {type: variant, offset: 2400, length: 623, content: 劉邵爵制曰春秋傳有庻長鮑商君為政備其法品為十八級合闗内侯列侯凡二十等其制因古義古者天子寄軍政於六卿居則以田警則以戰所謂入使治之出使長之素信者與衆相得也故啓伐有扈乃召六卿大夫之在軍為将者也及周之六卿亦以居軍在國也則以比長閭胥族師黨州長鄉大夫為稱其在軍也則以司馬将軍卒伍為號所以異在國之名也秦依古制其在軍賜爵為等級其師人皆更卒也有功賜爵則在軍吏之例自一等以上至不更四等皆士也大夫以上至五大夫五等比大夫也九等依九命之義也曰左庻長至大庻長比九卿也闗内侯者依古圻内子男之義也秦都山西以闗内為王畿故曰闗内侯也列侯者依古列國諸侯之義也然則卿大夫士下之品皆倣古比朝之制而異其名亦所以殊軍國也古者以車戰兵車一乘步卒七十二人分翼左右車大夫在左御者處中勇士為右凡七十五人一爵曰公士者步卒之有爵為公士者也二爵曰上造造成也古者成士升於司徒曰造士雖依此名皆步卒也三爵曰簮褭御駟馬者要褭者古之名馬也駕駟馬其形似簮故云簮褭也四爵曰不更不更者為車右不復與凡更卒同也五爵曰大夫大夫在車左者也六爵為官大夫七爵為公大夫八爵為公乘九爵為五大夫皆軍吏也吏民爵不得過公乘者得貰與子若同産然則公乘者軍吏之爵最高者也雖非臨戰得公乘車故曰公乘也十爵為左庻長十一爵為右庻長十二爵為左更十三爵為中更十四爵為右更十五爵為少上造十六爵為大上造十七爵為駟車庻長十八爵為大庻長十九爵為闗内侯二十爵為列侯自左庻長至大庻長皆卿大夫皆軍将也所将皆庻人更卒也故以庻更為名大庻長即大将軍也左右庻長即左右偏裨将軍也長知丈翻, SBCK: ''}
