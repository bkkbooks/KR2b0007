  - {type: variant, offset: 6229, length: 226, content: 索隱曰大良造即大上造余謂大良造大上造之良者也按史記秦紀孝公十年衞鞅為大良造将兵圍魏安邑降之又按六國年表秦孝公之十年顯王之十七年所謂大良造伐魏即衞鞅将兵也是時魏都安邑其兵猶強龎涓太子申公子卭未敗安邑不應遽降於秦至顯王二十九年卭軍既敗魏獻河西之地於秦始去安邑徙都大梁史記六國表不書徙大梁而世家書之魏世家於是年不書安邑降秦而秦紀孝公十年書之通鑑從魏世家於顯王二十九年書魏去安邑徙大梁而是年不書魏安邑降秦蓋亦疑而除去之但大良造之下當有衞鞅二字意謂傳寫通鑑者逸之, SBCK: ''}
