  - {type: variant, offset: 0, length: 622, content: 欽定四庫全書資治通鑑巻二宋司馬光撰胡三省音註周紀二起昭陽赤奮若盡上章困敦凡四十八年起癸丑終庚子顯王十一家諡法行見中外曰顯受禄于天曰顯百辟惟刑曰顯周公蓋未有此諡而周之末世諡顯王曰顯意謂後世傳寫周公諡法者遺之元年齊伐魏取觀津康曰齊伐魏魏惠王請獻觀以和即觀津余按班志信都國有觀津縣與齊相去甚逺且趙地也又東郡有畔觀縣水經大河故瀆東逕五鹿之野又東逕衞國故城南古卙觀也此其魏之觀津歟徐廣曰觀今衛縣史記正義曰魏州觀城縣古觀國國語云觀國夏太康第五弟之所封也觀工喚翻趙侵齊取長城劉昭志濟北盧縣有長城史記蘇代説燕王曰齊有長城鉅防即此三年魏韓㑹于宅陽水經注曰滎澤之際有沙城世謂水城非也魏冉走芒卯入北宅即此宅陽城括地志曰宅陽故城在鄭州滎陽縣東十七里秦敗魏師韓師于洛陽洛陽在洛水之北周公遷殷民於此謂之成周班志屬河南郡敗補邁反四年魏伐宋五年秦獻公敗三晉之師于石門水經注馮翊雲陽縣有石門山括地志在雍州三原縣西北三十二里又曰堯門山俗名石門上有路其狀若門故老云堯鑿山為門因名之武徳中於此山南置石門縣貞觀中改雲陽縣斬首六萬王賜以黼黻之服黼者刺繡為斧形黻者刺繡為兩已相背孔頴達曰白與黒謂之黼黑與青謂之黻黼音甫黻音弗七年魏敗韓師趙師于澮澮古外翻括地志澮水在絳州翼城縣東南二十五里水側有皮牢城秦魏戰于少梁班志馮翊夏陽縣故少梁師古曰本梁國為秦所滅至惠文王十一年更名夏陽康曰魏有大梁故此稱少以别之少詩沼翻夏戸雅翻更工衡翻魏師敗績獲魏公孫痤左傳師大崩曰敗績痤才何翻衞聲公薨子成矦速立燕桓公薨子, SBCK: ''}
