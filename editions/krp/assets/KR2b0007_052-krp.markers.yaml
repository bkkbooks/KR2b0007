  - {type: variant, offset: 0, length: 198, content: 欽定四庫全書資治通鑑卷五十二宋司馬光撰胡三省音註漢紀四十四起閼逢閹茂盡旃䝉作噩凡十二年孝順皇帝下陽嘉三年夏四月車師後部司馬率後王加特奴掩擊北匈奴於閶吾陸谷閶音昌大破之獲單于母五月戊戌詔以春夏連旱赦天下上親自露坐徳陽殿東廂請雨按范書桓帝紀徳陽殿在北宫掖庭中以尚書周舉才學優深特加策問舉對曰臣聞隂陽閉隔則二氣否塞否皮鄙翻塞悉則翻陛下廢文帝光武之法而循亡秦奢侈之欲内積怨女外有曠夫自枯旱以來彌歴年嵗未聞, SBCK: ''}
