  - {type: variant, offset: 9353, length: 820, content: 師古曰謂共卿大夫謀事尚不專决猶雜問蓍龜也蓍筮也龜卜也孔頴達曰卜筮必用龜蓍者案劉向云蓍之言耆龜之言乆龜千嵗而靈蓍百年而神以其長乆故能辯吉凶也説文蓍蒿屬也生千嵗三百莖易以為數天子九尺諸侯七尺大夫五尺士三尺陸璣草木疏云似藾蕭青色科生洪範五行傳曰蓍生百年一本生百莖論衡云七十年生一莖七百年十莖神靈之物故生遲也史記曰滿百莖者其下必有神龜守之其上常有雲氣覆之淮南子云上有藂蓍下有伏龜卜筮實問於神龜筮能傳神命以告人故金縢告太王王季文王乃卜三龜一習吉是能傳神命也又鄭注天府云卜筮實問於鬼神筮龜能出其卦兆之占耳按白虎通稱禮三正記天子龜一尺二寸諸侯一尺大夫八寸士六寸龜隂也故其數偶蓍陽也故其數竒所以謂之卜筮者師説云卜覆也以覆審吉㐫筮决也以决定其惑劉向以為卜赴也赴来者之心筮問也問筮者之事赴問互言之易繫辭云定天下之吉㓙成天下之亹亹者莫大乎蓍龜又曰蓍之德圓而神又説卦云幽賛於神明而生蓍據此諸文蓍龜知靈相似傳云蓍短龜長不如從長者史蘇欲止獻公之意託云爾實無優劣也杜預鄭𤣥因是言以為實有長短杜預注傳云物生而後有象象而後有滋滋而後有數龜象筮數故象長數短是也象所以長者以物初生則有象去初既近且包羅萬形故為長數短者數是終去初既逺推尋事數始能求象故為短也鄭注占人云占人亦占筮掌占龜者筮短龜長主于長者是也凡卜筮天子諸侯若大事則卜筮並用皆先筮後卜大事則卜立君卜大封大祭祀出軍旅䘮事及龜之八命一曰征二曰象三曰與四曰謀五曰果六曰至七曰雨八曰瘳此等皆為大事鄭注占人云將卜八事皆先以筮筮之是也若次事則惟卜不筮故表記云天子無筮小事無卜惟筮筮人掌九筮之名一曰筮更謂遷都邑也二曰筮咸咸猶僉也謂筮衆心歡不也三曰筮式謂筮作法式也四曰筮目謂事衆筮其所要當也五曰筮易謂民衆不説筮所改易也六曰筮比謂與民和比也七曰筮祠謂筮牲與日也八曰筮參謂筮御與右也九曰筮環謂筮可致師不鄭注古人不卜而徒筮者則用九筮是也僖十五年晉卜納襄王得黄帝戰阪泉之兆又筮之得大有之睽哀九年卜伐宋亦卜而後筮是大事卜筮並用也與讀曰預蓍音升脂翻, SBCK: ''}
