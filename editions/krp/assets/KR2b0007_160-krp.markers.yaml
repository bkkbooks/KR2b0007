  - {type: variant, offset: 4077, length: 260, content: 後漢豫州治譙魏治汝南安成晉治陳國晉氏南度石氏强盛祖約自譙城退屯夀春始僑立豫州於夀春是後庾亮以豫州刺史鎮蕪湖毛寳治邾城趙胤治牛渚謝尚鎮歴陽又進馬頭柏冲戌姑孰盖不常厥居也宋武帝欲開拓河南綏定豫土割揚州大江以西悉屬豫州豫州基趾因此而立永初二年分淮東為南豫州治歴陽淮西為豫州然猶治夀春也大明以後豫州治懸瓠常珍竒歸北懸瓠入魏豫州復治夀陽齊東昏之時裴叔業又以夀陽附魏遂以歴陽為豫州至帝天監中韋叡克合肥以為豫州復以歴陽為南豫州後復夀陽又徙豫州復舊治今得懸瓠復宋之舊為豫州以夀陽為南豫以合肥為合州南北兵争疆場之間一彼一此易置州郡類如是矣, SBCK: ''}
