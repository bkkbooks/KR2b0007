  - {type: variant, offset: 0, length: 268, content: 欽定四庫全書資治通鑑卷七十六宋司馬光撰胡三省音註魏紀八起昭陽作噩盡旃䝉大淵獻凡三年邵陵厲公下嘉平五年春正月朔蜀大将軍費禕與諸将大會於漢夀郭循在坐費父沸翻坐徂卧翻蜀先主改葭萌為漢夀禕歡飲沈醉循當作修下同沈持林翻循起刺禕殺之刺七亦翻禕資性汎愛汎孚梵翻廣也言無所不愛也不疑於人越嶲太守張嶷嶲音髓嶷魚力翻嘗以書戒之曰昔岑彭率師來歙杖節咸見害於刺客岑彭來歙事見四十二卷漢光武建武十一年歙許及翻今明将軍位尊權重待信新附太過宜鑒前事少以為警少詩沼翻禕不從故及禍詔追封郭循為長樂鄉侯樂音洛使其子襲爵王昶毋丘儉聞東軍敗時三道伐呉東關最在東故曰東軍昶丑兩翻, SBCK: ''}
