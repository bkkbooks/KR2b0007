  - {type: variant, offset: 0, length: 378, content: 欽定四庫全書資治通鑑卷十宋司馬光撰胡三省音註漢紀二起彊圉作噩盡著雍閹茂凡二年太祖髙皇帝上之下三年冬十月韓信張耳以兵數萬東擊趙趙王及成安君陳餘聞之聚兵井陘口陘音刑杜佑曰井陘口在鎮州鹿泉縣今謂之土門按宋白續通典鎮州石邑縣有井陘山甚險固又鹿泉縣本漢石邑縣地隋開皇十六年置至徳初改名獲鹿又井陘縣穆天子傳天子獵于鉶山即此地注云燕趙謂山脊為陘陘山在縣東南十八里四方髙中央下如井故曰井陘號二十萬廣武君李左車説成安君曰韓信張耳乗勝而去國逺鬬謂乗取代之勝勢也説輸芮翻其鋒不可當臣聞千里餽糧士有飢色樵蘇後㸑樵取薪也蘇取草也師不宿飽今井陘之道車不得方軌方軌謂車併行騎不得成列行數百里其勢糧食必在其後鄭康成曰行道曰糧謂糒也止居曰食謂米也願足下假臣竒兵三萬人從間路絶其輜重師古曰間路㣲路也間古莧翻師古曰輜衣車也重謂載重物車也故行者之資總曰輜重釋名云輜厠也所載衣服雜厠其中重直用翻足下, SBCK: ''}
