  - {type: variant, offset: 0, length: 229, content: 欽定四庫全書資治通鑑卷一百七宋司馬光撰胡三省音註晉紀二十九起彊圉大淵獻盡重光單閼凡五年烈宗孝武皇帝中之下太元十二年春正月乙巳以朱序為兖青二州刺史代謝𤣥鎮彭城序求鎮淮隂許之序求鎮淮隂以燕方强必進取河南彭城去建康道逺聲援不接故也以𤣥為㑹稽内史優𤣥以内地也㑹工外翻丁未大赦燕主垂觀兵河上韋昭曰觀示也陳兵以示威武觀古玩翻髙陽王隆曰温詳之徒皆白面儒生烏合為羣徒恃長河以自固若大軍濟河必望旗震壊不待戰也垂從之戊午遣鎮北将軍蘭汗䕶軍将軍平幼於碻磝西四十里濟河隆以大衆陳於北, SBCK: ''}
