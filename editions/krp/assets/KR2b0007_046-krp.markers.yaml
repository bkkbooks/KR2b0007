  - {type: variant, offset: 0, length: 252, content: 欽定四庫全書資治通鑑巻四十六宋司馬光撰胡三省音註漢紀三十八起柔兆困敦盡閼逢涒灘凡五年肅宗孝章皇帝上諱炟顯宗第五子母賈貴人以馬后母養為嫡即位諡法温克令儀曰章伏侯古今註炟之字曰著建初元年春正月詔兖豫徐三州稟贍飢民上問司徒鮑昱何以消復旱災消復者消去災異而復其常對曰陛下始踐天位雖有失得未能致異臣前為汝南太守典治楚事賢曰永平十三年楚王英謀反連坐者在汝南昱時主劾之也治直之翻繫者千餘人恐未能盡當其罪夫大獄一起寃者過半又諸徙者骨肉離分孤魂不祀宜一切還諸徙家蠲除禁錮使死生獲所則和氣可致帝納其言校書郎楊終上疏曰間者北征, SBCK: ''}
