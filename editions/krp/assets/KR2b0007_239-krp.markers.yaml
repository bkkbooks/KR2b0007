  - {type: variant, offset: 6456, length: 424, content: 連州漢桂陽陽山地唐置連州以郡南有黄連嶺為名京師南三千六百六十五里考異曰舊禹錫傳元和十年自武陵召還宰相復欲置之郎署時禹錫作遊𤣥都觀詠看花君子詩語渉譏刺執政不悦復出為播州刺史禹錫集載其詩曰𤣥都觀裏桃千樹盡是劉郎去後栽按當時叔文之黨一切除逺州刺史不止禹錫一人豈縁此詩蓋以此得播州惡處耳實録曰中丞裴度奏其母老必與此子為死别臣恐傷陛下孝理之風憲宗曰為子尤須謹慎恐貽親之憂禹錫更合重於它人卿豈可以此論之度無以對良久帝改容而言曰朕所言是責人子之事然終不欲傷其所親之心明日改授禹錫連州趙元拱唐諫諍集裴度曰陛下方侍太后以孝理天下至如禹錫誠合哀矜憲宗乃從之明日制授禹錫連州既而語左右裴度終愛我切趙璘因話錄曰憲宗初徵栁宗元劉禹錫至京城俄而桞為栁州刺史劉為播州刺史栁以劉須侍親播州最為惡處請以栁州換上不許宰相對曰禹錫有老親上曰但要與郡豈繫母在裴晉公進曰陛下方侍太后不合發此言上有愧色劉遂改為連州按栁宗元墓誌將拜疏而未上耳非已上而不許也禹錫除播州時裴度未為相今從實録及諫諍集, SBCK: ''}
