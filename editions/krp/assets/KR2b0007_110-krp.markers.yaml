  - {type: variant, offset: 0, length: 230, content: 欽定四庫全書資治通鑑卷一百一十宋司馬光撰胡三省音註晉紀三十二著雍閹茂一年安皇帝乙隆安二年春正月燕范陽王德自鄴帥户四萬南徙滑臺帥讀曰率下同魏衛王儀入鄴收其倉庫追德至河弗及趙王麟上尊號於德上時掌翻德用兄垂故事稱燕王事見一百五卷孝武太元九年改永康三年為元年以統府行帝制統府者諸方鎮皆統於燕王府行帝制者稱制以行事置百官以趙王麟為司空領尚書令慕容法為中軍將軍慕輿㧞為尚書左僕射丁通為右僕射麟復謀反德殺之慕容麟背父叛兄姦詐反覆天下其誰能容之復扶又翻庚子魏王珪自中山南巡至高, SBCK: ''}
