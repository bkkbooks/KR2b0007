  - {type: variant, offset: 3643, length: 629, content: 未考異曰齊本紀四月丁以張冲為南兖州刺史崔慧景於廣陵起兵襲京師壬子左興盛督衆軍寶𤣥以京口納慧景乙卯王瑩屯北籬門壬戌慧景至瑩等敗甲子慧景入京師蕭懿入援癸酉慧景棄衆走死慧景傳四月至廣陵回軍十二日攻䧟竹里按長歴是歲三月辛丑朔四月庚午朔丁未三月七日壬子十二日乙卯十五日壬戌二十二日甲子二十四日四月皆無也盖四月當作三月至癸酉乃四月四日耳南史云時江夏王寶𤣥鎮京口聞慧景北行遣左右余文興説之曰江劉徐沈君之所見今擁強兵北取廣陵收吴楚勁卒身舉州以相應取大功如反掌耳慧景常不自安聞言響應于是廬陵王長史蕭寅司馬崔恭祖守廣陵城慧景以寶𤣥事告恭祖恭祖口雖相和心實不同俄而慧景至恭祖閉門不敢出慧景密遣軍主劉靈運間行突入慧景俄至遂據其城子覺至仍使領兵襲京口寶𤣥本謂大軍併來及見人少極失所望拒覺擊走之恭祖及覺精兵八千濟江恭祖心本不同及至蒜山欲斬覺以兵降京口事既不果而止覺等軍器精嚴栁憕沈佚等謂寶𤣥曰崔䕶軍威名既重乃誠可見既已脣齒忽中道立異彼以樂歸之衆亂江而濟誰能拒之於是登北固樓並千蠟燭為烽火舉以應覺慧景停二日便率大衆一時俱濟趣京口寶𤣥仍以覺為前鋒恭祖次之慧景領大都督為衆軍節度又云時栁憕别推寶𤣥崔恭祖為寶𤣥羽翼不復承奉慧景慧景嫌之巴陵王昭胄先逃人間出投慧景意更向之故猶豫未知所立此聲頗泄憕恭祖始貳於慧景又云慧景單馬至蠏浦投漁人太叔榮之榮之故為慧景門人時為蠏浦戍斬慧景送都按恭祖始若閉城拒慧景慧景襲得其城而據之豈肯更授以兵柄又慧景若不立寶𤣥栁憕豈能别推又榮之既云漁人又云為戍自相違錯今並從齊書, SBCK: ''}
