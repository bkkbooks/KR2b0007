  - {type: variant, offset: 0, length: 226, content: 欽定四庫全書資治通鑑卷一百二十五宋司馬光撰胡三省音註宋紀七起彊圉大淵獻盡上章攝提格凡四年太祖文皇帝中之下元嘉二十四年春正月甲戌大赦魏吐京胡及山胡曹僕渾等反二月征東將軍武昌王提等討平之癸未魏主如中山魏師之克敦煌也敦煌當作姑臧事見一百二十三卷十六年沮渠牧犍使人斫開府庫沮子余翻犍居言翻取金玉及寳噐因不復閉復扶又翻下同小民爭入盗取之有司索盜不獲索山客翻下同至是牧犍所親及守藏者告之藏徂浪翻且言牧犍父子多蓄毒藥潜殺人前後以百數况復姊妹皆學左道謂學曇無䜟之術也有, SBCK: ''}
