  - {type: variant, offset: 0, length: 284, content: 欽定四庫全書資治通鑑卷一百二十四宋司馬光撰胡三省音註宋紀六起𤣥黓敦牂盡柔兆閹茂凡五年太祖文皇帝中之中元嘉十九年春正月甲申魏主備法駕詣道壇受符籙旗幟盡青自是每帝即位皆受籙此所受者今道士所謂法籙也隋志曰道士受道之法初受五千文籙次受三洞籙次受洞𤣥籙次受上清籙籙皆素書紀諸天曹官屬佐吏之名又有諸符錯在其間文章詭怪世所不識籙龍玉翻謙之又奏作静輪宫水經註静輪宫在道壇東北道壇在平城東灅水之左必令其髙不聞雞犬欲以上接天神崔浩勸帝為之功費萬計經年不成太子晃諌曰天人道殊卑髙定分分扶問翻不可相接理在必然今虚耗府庫疲弊百姓為無益之事將安用之必如謙之所言請因東山萬仞之髙謂平城之東山也為功差, SBCK: ''}
