  - {type: variant, offset: 6483, length: 1143, content: 長直亮翻中讀曰仲律厯志黄鍾律九寸三分損一下生林鍾律六寸三分林鍾益一上生太簇三分大簇損一下生南吕三分南吕益一上生姑洗三分姑洗損一下生應鍾三分應鍾益一上生㽔賓三分㽔賓損一下生大吕三分大吕益一上生夷則三分夷則損一下生夾鍾三分夾鍾益一上生無射三分無射損一下生中吕隂陽相生自黄鍾始而左旋八八為伍孟康注曰從子數至未得八下生林鍾數未至寅得八上生太簇律上下相生皆以此為率伍耦也八八為耦然月令注中吕律長六寸萬九千六百八十三分寸之萬二千九百七十四若上生黄鍾當不止九寸故孔穎達考其同異於月令疏曰十二律有上生下生冋位異位長短分寸之别故鄭注周禮太師職云其相生則以隂陽六體黄鍾初九下生林鍾之初六林鍾又上生太簇之九二太簇又下生南吕之六二南吕又上生姑洗之九三姑洗又下生應鍾之六三應鍾又上生㽔賓之九四㽔賓又上生大吕之六四大吕又下生夷則之九五夷則又上生夾鍾之六五夾鍾又下生無射之上九無射又上生中吕之上六同位者象夫妻異位者象子母所謂律娶妻而吕生子也同位象夫妻者則黄鍾之初九下生林鍾之初六同是初位故為夫婦又是律娶妻也異位為子母者謂林鍾上生太簇林鍾是初位太簇是二位故云異位為子母又是吕生子也云五下六上者鄭注云五下六上乃一終矣謂林鍾夷則南吕無射應鍾皆被子午以東之管三分減一而下生之大吕太簇夾鍾姑洗中吕㽔賓皆被子午以西之管三分益一而上生之子午皆上生應云七上而云六上者以黄鍾為諸律之首物莫之先似若無所稟生者故不數黄鍾也其實十二律終于中吕反歸黄鍾生于中吕三分益一大略得應黄鍾九寸之數也律厯志云黄鍾為天統林鍾為地統太簇為人統故數整餘律則各有分數随其相生之次毎辰各自為宫各有五聲黄鍾為第一宫下生林鍾為徵上生太簇為商下生南吕為羽上生姑洗為角林鍾為第二宫上生太簇為徵下生南吕為商上生姑洗為羽下生應鍾為角太簇為第三宫下生南吕為徵上生姑洗為商下生應鍾為羽上生㽔賓為角南吕為第四宫上生姑洗為徵下生應鍾為商上生㽔賓為羽下生大吕為角姑洗為第五宫下生應鍾為徵上生㽔賓為商上生大吕為羽下生夷則為角應鍾為第六宫上生㽔賓為徵上恐當作下上生大吕為商下生夷則為羽上生夾鍾為角㽔賓為第七宫上生大吕為徵下生夷則為商上生夾鍾為羽下生無射為角大吕為第八宫下生夷則為徵上生夾鍾為商下生無射為羽上生中吕為角夷則為第九宫上生夾鍾為徵下生無射為商上生中吕為羽上生黄鍾為角夾鍾為第十宫下生無射為徵上生中吕為商上生黄鍾為羽下生林鍾為角無射為第十一宫上生中吕為徵上生黄鍾為商下生林鍾為羽下生太簇為角中吕為第十二宫上生黄鍾為徵下生林鍾為商上生太簇為羽下生南吕為角是十二宫各有五聲凡六十聲京房六十律相生之法以上生下皆三生二以下生上皆三生四陽下生隂隂上生陽終于中吕而十二律畢矣中吕上生執始執始下生去滅上下相生終于南事而六十律畢矣夫十二律之變至于六十猶八卦之變至于六十四也六十律之名詳見續漢書補志, SBCK: ''}
