  - {type: variant, offset: 5934, length: 297, content: 記玉藻曰史進象笏書思對命注云意所思念將以告君者也對所以對君也命所受命也書之於笏為失忘也又曰凡有指畫於君前者用笏造受命於君前用笏笏畢用也因飾焉笏度二尺有六寸其中博三寸其殺六分而去一應劭曰昔荆軻逐秦王其後謁者持匕首以備不虞從此侍宫皆執刀劒髙祖偃武脩文始制手版代焉隋志曰中世以来唯八座尚書執笏笏者白筆綴其頭紫囊裹之其餘公卿但執手版謂之筆笏盖以記事受言西魏以降通用象牙五品以下通用竹木爾雅釋名笏忽也君有教命及所白則書其上以備忽忘也唐㑹要曰笏舊制三品已上前挫後直五品以上前挫後屈武德已來一例上圓下方開元八年諸笏三品已上前詘後直五品已上前詘後挫並用象九品已上任用竹木上挫下方男以上聽依品爵執笏假官板亦依此例, SBCK: ''}
