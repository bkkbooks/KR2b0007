  - {type: variant, offset: 8861, length: 0, content: '', SBCK: 思明復攻河陽光弼謂鄭陳節度使李抱玉曰將軍能為我守南城二日乎抱玉曰過期何如光弼曰過期救不至任弃之抱玉許諾勒兵拒守城且陷抱玉紿之曰吾糧盡明旦當降賊喜歛軍以待之抱玉繕完成備明日復請戰賊怒急攻之抱玉出奇兵表裏夾擊殺傷甚衆董秦從思明宼河陽夜帥其衆五百㧞柵突圍降于光弼時光弼自將屯中潬城外置柵柵外穿壍深廣二丈乙巳賊將周摯捨南城併力攻中潬光弼命荔非元禮出勁卒於羊馬城以拒賊光弼自於城東北隅建小朱旗以望賊賊恃其衆直進逼城以車載攻具自隨督衆填壍三面各八道以過兵又開柵為門光弼望賊逼城使問元禮曰中丞視賊填壍開柵過兵晏然不動何也元禮曰司空欲守乎戰乎光弼曰欲戰元禮曰欲戰則賊為吾填壍何為禁之光弼曰善吾所不及勉之元禮俟柵開帥敢死士突出擊賊却走數百步元禮度賊陳堅未易摧陷乃復引退須其怠而擊之光弼望見元禮退怒遣左右召欲斬之元禮曰戰正急召何為乃退入柵中賊亦不敢逼良久鼔譟出柵門􅁬擊破之周摯復收兵趣北城光弼遽帥衆入北城登城望賊曰賊兵雖多囂而不整不足畏也不過日中保為諸軍破之乃命諸將出戰及期不决召諸將問曰向來賊陳何方最堅曰西北隅光弼命其將郝廷玉當之廷玉請􅀐兵五}
