  - {type: variant, offset: 4790, length: 434, content: 昌考異曰舊紀咸通十三年七月以前義節度使盧簡方為太僕卿十二月以振武節度使李國昌為雲州刺史大同軍防禦等使國昌稱病辭軍務乃以太僕卿盧簡方為雲州刺史充大同軍防禦等使上召簡方於思政殿謂之曰卿以滄州節制屈居大同然朕以沙陀退渾撓亂邊鄙以卿曽在雲中惠及部落且忍屈為朕此行具逹朕㫖安慰國昌勿令有所猜嫌也十四年正月辛未以雲朔暴亂代北騷動賜盧簡方詔曰近知大同軍不安殺害段文楚李國昌小男克用主領兵權又曰若克用暫勿主兵務束手待朝廷除人則事出權宜不足猜慮若便圗軍柄欲奄大同則患繫乆長故難依允料國昌輸忠效節必當已有指揮簡方準詔諭之國昌不奉詔乃詔太原節度使崔彦昭幽州節度使張公素出師討之三月以簡方為振武節度使至嵐州卒實録乾符元年十二月簡方除大同二年正月賜詔亦不云使彦昭公素討之葢舊記實録各随段文楚死之後載除簡方及詔書使事相接續耳恐皆未足据也舊紀所云太原幽州討之葢因叙後來事實録所以不取者方知招諭未必攻討也唐末見聞録又云五年四月勑除簡方振武節度使五月卒實録亦在五年而云六月卒葢約奏到之月耳今從三朝聞見録, SBCK: ''}
