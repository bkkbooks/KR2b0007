  - {type: variant, offset: 15032, length: 340, content: 紀考異曰舊廣明元年二月巢陷潭州王鐸弃江陵奔襄陽漢宏大掠寶録閏月湖南奏黄巢賊衆自衡永州下十月二十七日攻陷潭州新巢傳曰廣明初賊自嶺南冦湖南諸郡攻潭州陷之舊巢傳巢欲據南海之地坐邀朝命是歲自春及夏其衆大疫死者十三四衆勸請北歸以圖大利巢不得已廣明元年北踰五嶺犯湖湘江浙按舊紀傳皆云廣明元年敗王鐸今月日從實録事從舊紀又据舊紀傳則劉漢宏本王鐸將鐸去而漢宏留江陵大掠遂為盜也實録用之而於鐸奔襄陽下添先是字若鐸在江陵漢宏時為羣盜安能入其城大掠借使漢宏先曽冦掠江陵與黄巢事了不相干何必言後半月餘賊衆乃據其城也吳越備史云漢宏本兖州小吏領本州兵禦巢冦遂殺將首劫輜重而叛後命前濠州刺史崔鍇招降之据此則漢宏本羣盜也新傳用之而云鐸招降之或者漢宏本羣盜中間降鐸為部將鐸去江陵漢宏復大掠為盜其後又降於崔鍇遂為唐臣也, SBCK: ''}
