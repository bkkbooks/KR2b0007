  - {type: variant, offset: 7987, length: 1023, content: 與考異曰舊紀六年五月賊圍廣州李苕崔璆書求天平節鉞畋攜爭論於中書辭語不遜俱罷分司畋傳曰五年黄巢東渡江淮衆百萬所經屢陷郡邑六年陷安南府據之致書與浙東觀察使崔璆求鄆州節鉞璆言賊勢難圗宜因授之以絶北顧之患天子下百僚議初黄巢之起也宰相盧攜以浙西觀察使髙駢素有軍功奏為淮南節度使令扼賊衝尋以駢為諸道行營都統及崔璆之奏朝臣議之有請假節以紓患者畋採衆議欲以南海節制縻之攜以始用髙駢欲其立功以圗勝曰髙駢将畧無雙淮土甲兵甚銳今諸道之師方集蕞爾纎冦不足平殄何事捨之示怯而令諸軍解體邪畋曰巢賊之亂本因飢歲人以利合乃至寔繁江淮以南荐食殆半國家乆不用兵皆忘戰所在節將閉門自守尚不能枝不如釋咎包容權降恩澤彼本以飢年利合一遇豐歲孰不懐思鄉土其衆一離則巢賊几上肉耳若此際不以計攻全恃兵力恐天下之憂未艾也羣議然之而左僕射于琮曰南海有市舶之利歲貢珠璣如令為妖賊所有國藏漸當廢竭上亦望駢成功乃依攜議及中書商量制勑畋曰妖賊百萬横行天下髙公遷延玩冦無意翦除又從而保之彼得計矣國祚安危在我輩三四人畫度公倚淮南用兵吾不知稅駕之所矣攜怒拂衣而起染袂於硯因投之僖宗聞之怒曰大臣相詬何以表儀四海二人俱罷政事攜傳曰五年黄巢陷荆南江西外郛及饒吉䖍信等州自浙東陷福建遂至嶺南陷廣州殺節度使李岧遂抗表求節鉞初王仙芝起河南攜舉宋威齊克讓曽衮等有將畧用為招討使及宋威殺尚君長致賊充斥朝廷遂以宰臣王鐸為都統攜深不恱浙帥崔璆等上表請假黄巢廣州節旄上令宰臣議攜以王鐸為統帥欲激怒黄巢堅言不可假賊節制止授率府率而已與同列鄭畋爭論投硯於地由是兩罷之實録五年五月丙申朔是日宰臣鄭畋盧攜議南蠻事攜請降公主通和畋固爭以為不可抗論是非攜怒拂衣而起袂染於硯因投碎之丁酉以畋攜並為太子賔客分司注云舊史洎雜說皆云畋攜議黄巢節制忿爭賜罷而鄭延昌撰畋行狀乃云議蠻事無可證之然當時所述恐不謬又畋傳曰時黄巢攻陷江浙上表乞節鉞畋與同列盧攜謀議攻討及拔用將帥事多異同又南詔蠻請降公主和好畋固爭以為不可遂抗論之乃與攜俱罷相又攜傳曰攜人質甚陋語亦不正與鄭畋俱李翺之外孫及同輔政議論不協初王仙芝起河南攜舉宋威齊克讓曽衮等有將畧用為招討使討賊皆無功致賊充斥又主髙駢之請欲以公主和南詔蠻鄭畋執之以為不可帝前忿爭由是兩罷之舊紀六年五月賊圍廣州仍與廣南節度使李苕浙東觀察使崔璆書求保薦乞天平節璆岧上表論之宰相鄭畋盧攜爭論於中書詞語不遜俱罷為太子賔客分司東都按新舊傳舊紀皆以畋攜罷相在六年實録新紀表在此年五月實録新書皆自相矛楯然宋氏多書知二人罷在五月必有所据今從之, SBCK: ''}
