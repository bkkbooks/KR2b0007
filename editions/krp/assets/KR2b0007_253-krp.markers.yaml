  - {type: variant, offset: 14018, length: 365, content: 曰考異賊圍廣州仍與廣南節度使李迢浙東觀察使崔璆書求保薦乞天平節鉞迢璆上表論之實録迢璆上表論請詞甚懇激乃詔公卿集議巢又自表乞廣州節度安南都䕶巢自春夏其衆大疫死者什三四欲㨿有嶺表永為巢穴乃繼有是請右僕射于琮議云云時朝廷倚髙駢成功不允其奏乃議除官或云以正員將軍縻之宰相亦沮其議乃除率府率舊巢傳曰時髙駢鎮淮南表請招討賊許之議加都統巢乃渡淮偽降于駢駢遣將張潾帥兵受降于天長鎮巢禽潾殺之因虜其衆尋南陷湖湘遂據交廣託崔璆奏乞天平節度朝議不允又乞除官時宰臣鄭畋與樞密使楊復恭欲請授同正貟將軍盧攜駁其議請授率府率如其不受請以髙駢討之新巢傳曰有詔髙駢為諸道行營都統巢進冦廣州詒李迢書求表為天平節度使又脅崔璆言于朝宰相鄭畋欲許之盧攜田令孜執不可巢又乞安南都䕶廣州節度使書聞右僕射于琮議云云乃拜巢率府率舊盧攜傳亦皆以為攜議授巢率府率按此時攜已罷相今從實録, SBCK: ''}
