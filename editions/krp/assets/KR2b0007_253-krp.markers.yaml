  - {type: variant, offset: 16367, length: 382, content: 䟽其畧曰陛下不納李蔚杜希教之諌又曰臣乃明祈五道暗祝㝠官悚息於班列之中願早過於閻浮之世又曰受爵不逢於有徳之君立㦸毎佐於無道之主又曰不望堯舜之年得同先帝之日又曰明取尹希復指揮暗䇿王士成進狀强奪波斯之寳貝抑取茶店之珠珍渾取匱坊全城般運又曰莫是唐家合盡之歲為復是陛下壽足之年又曰伏惟陛下蹔停戲賞救接蒼生於殿内立掲諦道場以無私財帛供養諸佛用資世禄共力攘災表奏聖上龍威震怒侍臣驚悸宣徽使宣云侯昌業付内侍省侯進止翌日午時又内養劉季逺宣口敕云矦昌業出自寒門擢居清近不能修慎妄奏閒詞訕謗萬乘君王毁斥百辟卿士在我彛典是不能容其矦昌業宜賜自盡北夢𤨏言曰唐自廣明後閹人擅權置南北廢置使軍容田令孜有囘天之力中外側目而王仙芝黄巢剽掠江淮朝廷憂之左拾遺矦昌業上䟽極言時病留中不出命于仗内戮之後有傳侯昌業䟽詞不合事體其末云請開掲諦道場以銷兵厲似為庸僧偽作也必若矦昌業以此識見犯上宜其死也今從之上好, SBCK: 善}
