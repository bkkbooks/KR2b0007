  - {type: punctuation, offset: 5334, content: (, id: KR2b0007_krp_253-bkkpn436}
  - {type: variant, offset: 5334, length: 629, content: 帥讀曰率奏考異曰實録元裕大破仙芝於黄梅縣殺戮五萬餘人追至曹州南華縣斬仙芝傳首京師舊紀二月王仙芝餘黨攻江西招討使宋威出軍屢敗之仍宣詔書諭仙芝仙芝致書於威求節鉞威偽許之仙芝令其大將尚君長蔡温玉奉表入朝威乃斬君長温玉以狗仙芝怒急攻洪州陷其郛宋威赴援與賊戰大敗之殺仙芝傳首京師君長弟讓與黄巢大掠淮南舊傳曰齊克讓為兖州節度使以本軍討仙芝仙芝懼引衆厯陳許襄鄧無少長皆虜之衆號三十萬三年七月陷江陵又遣将徐唐莒陷洪州時仙芝表請符節不允以宋威為荆南節度招討使楊復光為監軍復光遣判官吳彦宏諭以朝㫖釋罪别加官爵仙芝乃令尚君長蔡温玉楚彦威相次詣闕請罪且求恩命時宋威害復光之功並擒送闕勑於狗脊嶺斬之賊怒悉精銳擊官軍威軍大敗復光收其餘衆以統之朝廷以王鐸代為招討五年八月收復荆州斬仙芝首獻于闕下新傳黄巢自蘄州與仙芝分其衆尚君長入陳蔡巢北掠齊魯衆萬人入鄆州殺節度使薛崇進陷沂州由潁蔡保查岈山引兵復與仙芝合圍宋州㑹自勉救兵至仙芝解而南渡漢攻荆南陷之賊不能守巢攻和州未克仙芝自圍洪州取之使徐唐莒守進破朗岳遂圍潭州觀察使崔瑾拒却之乃向浙西擾宣潤不能得所欲身留江西趣别部還入河南帝詔崔安潜歸忠武復起宋威曽元裕以招討使還之而楊復光監軍復光以詔諭賊仙芝遣尚君長等詣闕請罪又遺威書求節度威陽許之上言與君長戰擒之復光固言其降命侍御史與中人即訊不能明卒斬之仙芝怒還攻洪州入其郛威自將徃救敗仙芝於黄梅斬五萬級獲仙芝傳首京帥當此時巢方圍亳州未下君長弟讓帥仙芝潰黨歸巢新舊傳叙賊所經歴皆不同又云宋威殺仙芝今皆從實録, SBCK: ''}
