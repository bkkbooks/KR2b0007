  - {type: variant, offset: 17787, length: 325, content: 駢傳四年為鎮海節度使尋授諸道兵馬都統六年冬徙淮南節度使兵馬都統如故盧攜傳曰及王鐸失守罷都統以髙駢代之實録五年六月駢移鎮海六年正月以駢為諸道行營兵馬都統仍賜詔如寶運録所載者八月駢上表亦如之十月駢徙淮南依前充都統按駢表請追郎幼復備守浙西則是在鎮海時也詔云周旋六鎮則是駢已移淮南後也六鎮謂安南天平西川荆南鎮海淮南也又詔云今以卿為諸道都統則似移淮南後方為都統也疑駢在浙西方為招討使既數破巢軍乃以滅巢為己任上表請布置諸軍自攻巢于廣州及王鐸敗盧攜遂以駢代之攜欲重其權故為諸道都統若駢先為諸道都統鐸但為南靣都統則鐸已在駢統下可以指揮不須云乞降敕指揮鐸也且鐸自宰相都統諸將討賊故立都統之名不應同時有兩都統也其在浙西領江西招討使者時黄巢方掠䖍吉饒信故也今從舊紀及盧攜傳, SBCK: ''}
