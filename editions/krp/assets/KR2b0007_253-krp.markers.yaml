  - {type: variant, offset: 4229, length: 434, content: 其書云乾符五年戊戍竇澣自前守京兆尹拜河東節度使在任便值大同軍變殺防禦使段文楚正月二十六日軍於石窯二十七日到白泊二十九日至静邊軍三十日築却四靣城門二月一日在城將士三人共賞絹一匹監軍使差仇判官聞奏李盡忠等准詔各賞馬一匹銀鞍轡一副銀三鋌銀椀一枚絹一束錦二匹紫羅三匹諸軍將銀椀絹等三日李盡忠却入四日兩面馬歩五萬餘人城四面下營五日又賞土團牛酒六日監軍使送牌印與李九郎七日城南門樓上繫縛下段尚書栁漢璋雍侍御陳韜等四人尋分付軍兵於鬬雞臺西剮却又令馬軍踐踏却骸骨八日李九郎被上團馬歩軍約一千人持弓刀送上與舊紀五年事㣲合實録亦頗采之云五年正月壬戍竇澣奏沙陀首領李盡忠冦石窯白泊至静邊軍二月奏李盡忠求賞詔賞馬一匹銀鞍勒綿絹等按莊宗列傳舊紀克用殺文楚在咸通十三年十二月歐陽修五代史記取之太祖紀年録在乾符三年薛居正五代史新沙陀傳取之見聞録在乾符五年二月新記取之惟實録在乾符元年不知其所据何書也克用既殺文楚豈肯晏然安處必更侵擾邊陲朝廷亦湏𤼵兵征討而自乾符四年以前皆不見其事唐末見聞録叙日月今從之, SBCK: ''}
