  - {type: variant, offset: 3262, length: 561, content: 盡忠夜帥牙兵攻牙城攻雲州牙城也帥讀曰率下同執文楚及判官柳漢璋繫獄自知軍州事遣召克用克用帥其衆趣雲州趣七喻翻行収兵二月庚午至城下衆且萬人屯於鬭雞臺下壬申盡忠遣使送符印請克用為防禦留後癸酉盡忠械文楚等五人送鬭雞臺下克用令軍士冎而食之以騎踐其骸冎古瓦翻踐慈演翻甲戍克用入府舍視事録考異曰趙鳯後唐太祖紀年曰乾符三年河南水災盜冦蜂起朝廷以段文楚為代北水陸𤼵運雲州防禦使以代支謨時歲荐飢文楚削軍人衣米諸軍咸怨太祖為雲中防邊督將部下爭訴以軍食不充請具聞奏邊校程懐信康君立等十餘帳日譁於太祖之門請共除虐帥以謝邊人衆因大譟擁太祖上馬比及雲中衆且萬人城中械文楚出以應太祖後唐閔帝時史官張昭逺撰莊宗功臣列傳曰康君立為雲中牙校事防禦使段文楚時天下將亂代北仍歲阻飢諸部豪傑咸有嘯聚邀功之志文楚法令稍峻軍食轉餉不給戍兵咨怨雲州沙陀兵馬使李盡忠私謂君立等曰段公儒者難與共事方今四方雲擾皇威不振丈夫不能於此時立功立事非人豪也吾等雖擁部衆然以雄勁聞於時者莫若李振武父子官髙功大勇冠諸軍吾等合勢推之則代北之地旬月可定功名富貴事無不濟也時武皇為沙陀三部落副兵馬使在蔚州盡忠令君立私徃圖之曰方今天下大亂天子付將臣以邊事歲偶飢荒便削儲給我等邊人焉能守死公家父子素以威惠及五部當共除虐帥以謝邊人武皇曰予家尊在振武萬一相逼俟予稟命君立曰事機已泄遲則變生咸通十三年十二月, SBCK: ''}
