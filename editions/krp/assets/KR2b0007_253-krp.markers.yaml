  - {type: variant, offset: 6962, length: 517, content: 也是時朝議謂使李國昌以父臨子子必無以拒豈知李國昌父子欲兼據兩鎮回考異曰唐末聞見録遮虜軍及代州告急竇尚書差鶻五百騎邊界廵檢至四月三日進發至五里􅕤北副將康叔譚恃酒叛逆射損都將趙歸義斫損將判官閻建𢎞擒縛入府尚書令下於衙南門全家處斬使司差副兵馬使趙元掠領馬軍進𤼵閻建𢎞逓送海西當月内有勑送節到除前大同軍防禦使盧簡方充振武節度使除振武節度使李尚書充大同軍節度使實録云戊辰以簡方為振武國昌為大同葢誤以康叔譚作亂之日為簡方等建節之日也新沙陀傳曰李克用既殺段文楚諸校共丐克用為大同防禦留後不許𤼵諸道兵進捕諸道不甚力而黄巢方引兵度江朝廷度未能制乃赦之以國昌為大同軍防禦使國昌不受命詔河東節度使崔彦昭幽州張公素共擊之無功据此則是大同防禦使非節度使也薛居正五代史紀曰武皇殺段文楚諸將列狀以聞請授武皇旄鉞朝廷不允徵諸道兵以討之乾符五年黄巢度江其勢滋蔓天子乃悟其事以武皇為大同軍節度使檢校工部尚書是克用為大同軍節度使非國昌實録國昌傳及獻祖紀年録舊唐本紀俱不言國昌為大同節度使獨實録於此言之下五月又云國昌殺監軍不肻代必有所据葢國昌父子俱不肻受代朝廷以為用國昌代克用必無違命故徙國昌為大同軍節度使而以盧簡方鎮振武二人竟不受命故簡方不得赴鎮而死於嵐州國昌亦未嘗赴大同, SBCK: ''}
