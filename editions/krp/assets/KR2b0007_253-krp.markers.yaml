  - {type: variant, offset: 9547, length: 491, content: 異考曰唐末聞見録五月振武損却别勑不受除替李尚書收却遮虜軍進打寧武及岢嵐軍代州告急二十二日指揮在府三城排門差夫一人齊掘四面壕塹盧尚書𤼵赴振武至嵐州身薨二十四日拜都押牙康傳圭充代州刺史又𤼵太原晉陽兩縣㸃到土團子弟一千人徃代州屯駐至城北卓隊不𤼵索出軍優賞差馬歩都虞候鄧䖍安慰尋被冎却牀舁尸柩入府尚書監軍自出安慰定毎人各給錢三百文布一端差押牙田公鍔給散不放却囘便被請將充都將𤼵赴軍前使司有榜借商人助軍錢五萬貫文實録五月李國昌殺監軍使不肻受代起兵進打寧武及岢嵐軍代州出兵禦之始國昌遣克用以兵襲大同三軍表克用為留後朝廷不允乃以國昌命之欲以其子無能拒也時國昌貪其土地欲父子分統故拒命焉實録六月乙丑朔嵐州奏新除振武節度使盧簡方卒以太原府都押衙康傳圭為代州刺史𤼵太原晉陽土團千人戍代州至城北卓隊不𤼵索優賞馬歩都虞候鄧䖍安慰為其衆殺之節度使竇澣自出撫慰乃定初太原府帑空竭毎有賞賚必科民家至是尤窘迫乃牓借商人助軍錢五萬此皆約唐末見聞録為之而後其月日以象奏到之時唐末見聞録又云六月十一日左散騎常侍支謨奉勅到府充大同軍制置使兼攝河東節度副使軍前同指揮使此謂到府之日而實録云甲戍以謨為制置使甲戍乃六月十日亦誤也, SBCK: ''}
