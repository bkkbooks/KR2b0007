  - {type: variant, offset: 20859, length: 1035, content: 痺必至翻賊考異曰舊駢傳駢怨朝議有不附己者欲縱横河洛令朝廷聳振則從而誅之大將畢師鐸說駢云云駢駭然曰君言是也即令出軍有愛將吕用之以左道媚駢駢頗用其言用之懼師鐸等立功即奪已權從容謂駢曰相公勲業髙矣妖賊未殄朝廷已有間言賊若盪平則威望震主功居不賞公安稅駕邪為公良畫莫若觀釁自求多福駢深然之乃止諸將但握兵保境而已驚聽録朝廷議駢以文以武國之名將今此黄巢必無䘮於淮海也尋淮南表至云今大冦忽至入臣封廵未肯綿伏狼􅋃必能晦沉大衆但以山東兵士屯駐揚州各思故鄉臣遂放去亦具聞奏非臣自專今奉詔書責臣無備不合放囘武勇又告城危致勞徵兵勞於徃返臣今以寡擊衆然白武經與賊交鋒已當數陣粗成勝捷不落姧謀固䕶一方臣必能了但慮冦設深計支梧官軍迤邐過淮彼岸無敵即東道將士以至蕃臣繫朝廷速下明詔上委中書門下速與商量表至中書咸有異議遂京國士庶浮謗日興云淮南與巢衷私通連自固城池放賊過淮也妖亂志曰廣明元年七月黄巢自采石北度直抵天長時城内土客諸軍尚十餘萬皆良將勁兵議者有狂冦奔犯闗防之患悉願盡力死戰用之慮其立功之後侵奪已權謂勃海曰黄巢起於羣盜遂至横行所在雄藩望風瓦解天時人事斷然可知令公既統强兵又居重地只得坐觀成敗不可更與爭鋒若稍損威名則大事去矣勃海深以為然竟不議出軍巢遂至北焉初巢冦廣陵也江東諸侯以勃海屯數道勁卒居將相重任巢江海一逋逃耳固可掉折箠而擒之及聞安然度淮由是方鎮莫不解體按駢宿將豈不知賊過淮之後不可復制若怨朝議不附己者則尤欲破賊立功以間執䜛慝之口若縱賊過淮乃適足實議者之言非所以消謗也借使駢實有意使賊震驚朝廷從而誅之則賊入汝洛之後當晨夜追擊以爭功名豈得返坐守淮南數年逗留不出兵乎又舊傳吕用之云恐成功不賞妖亂志云恐敗衂稍損威名夫大功既成則有不賞之懼豈有未戰不知勝負豫憂威望震主乎駢為都統控扼江淮而擁兵縱賊使安然北度其於威名獨無損乎雖用之淺謀無所不至駢自無參酌一至此邪葢駢好驕矜大言自恃累有戰功謂巢烏合疲弊之衆可以節鉞誘致淮南坐而取之不意巢初無降心反為所欺張璘驍將一戰敗死巢奄濟采石諸軍北去見兵不多狼狽惴恐自保不暇故歛兵退縮任賊過淮非故欲縱之實不能制也盧攜闇於知人致中原覆沒駢先銳後怯致京邑丘墟吕用之妖妄姧囘致廣陵塗炭皆人所深疾故衆惡歸焉未必實然也又唐末見聞録廣明二年十二月五日黄巢傾陷京國轉牒諸軍据牒云屯軍淮甸牧馬潁陂則似在淮南時非入長安後又續寳運録云王仙芝既叛自稱天補均平大將軍兼海内諸豪帥都統傳檄諸道其文與此畧同末云願垂聽知謹告乾符二年正月三日此葢當時不逞之士偽作此文託於仙芝及巢以譏斥時病未必二人實有此檄牒也, SBCK: ''}
