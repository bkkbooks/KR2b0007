  - {type: variant, offset: 12998, length: 300, content: 涿考異曰實録無除安南年月蠻書云大中八年安南都䕶擅罷林西原防冬戍卒洞主李由獨等七綰首領被蠻誘引復為親情日往月來漸遭侵軼又曰桃花蠻本屬由獨管轄亦為界上戍卒自大中八年被峯州知州官申文狀與李涿請罷防冬將健六千人不要味真登等州界上防遏其由獨兄弟力不禁被蠻柘東節度使與書信將外甥嫁與由獨小男補拓東押衙自此後七綰洞悉為蠻收管舊紀咸通四年十一月劉蛻等言令狐綯受李涿賄除安南生蠻冦實錄咸通二年六月詔如聞李涿在安南日殺害杜存誠貪殘頗甚致令溪洞懷怨據此則本因李涿貪暴無謀以致蠻冦明矣然則大中八年至十一年舊紀實錄不言蠻為邊患蓋但時於邊境小有鈔盜未敢犯州縣至此冦安南而舊紀實録始載之又不知此冦安南即鄭言平剡錄所謂至錦田步時非也, SBCK: ''}
