  - {type: variant, offset: 6419, length: 862, content: 五考異曰薛居正代史李振十一月太祖遣振入奏於長安邸吏程巖白振曰劉中尉命其姪希貞來計大事既至巖乃先啓曰主上嚴急内官憂恐左中尉欲行廢黜敢以事告振顧希貞曰百歲奴事三歲主亂國不義廢君不祥非敢聞也况梁王以百萬之師匡輔天子幸熟計之希貞大沮而去振復命劉季述果作亂程巖率諸道邸吏牽帝下殿以立㓜主振至陜陜已賀矣護軍韓彛範言其事振曰懿皇初昇遐韓中尉殺長立㓜以利其權遂亂天下今將軍復欲爾邪彛範即文約孫也由是不敢言編遺録上雖聞其事未知摭實但懐憤激丁未上離定州軍前十二月戊辰達大梁欲潜謀返正乃遣李振偵視其事振迴益詳其宜也尋馳蔣𤣥暉與崔𦙍密圖大義薛史梁紀季述幽昭宗立徳王裕為帝仍遣其養子希度來言為以唐之神器輸於帝時帝方在河朔聞之遽還于汴大計未決㑹李振自長安使回因言於帝云云帝悟因請振復使于長安與時宰潜謀返正按季述廢立之前李振若已嘗立異今豈敢復入長安與崔𦙍謀返正乎今從編遺録注曰貞明中史臣李琪張衮郗殷象馮錫嘉修撰太祖實録事多漏略敬翔别纂成三十卷補其闕號曰大梁編遺録又按唐太祖紀年録及舊張濬傳皆云濬勸諸藩匡復而梁實録及李振傳皆云濬勸全忠附中官與紀年録及舊傳相違恐梁實録誤振傳据實録也唐補紀曰自監國居位將及五旬牋表不來朝野驚虞亢旱時多虹蜺背璚崔𦙍覩其不祥便謀内變潜行書檄於關外播楊辭舌於街衢朱全忠封崔𦙍檄書併手扎等與季述云彼已翻覆早宜别圖無何季述以此書示于崔𦙍曰比來同匡社稷却為鬭亂藩方不審相公何至於此𦙍唯云無此事遭人反圖刻蠟偽名自古乃有軍容若行怪怒則乞俯存家族季述乃與言誓相保始終𦙍其夜便致書謝全忠云昨以丹誠諮撓尊聴却䝉封示左軍劉公其人已知意㫖今日與𦙍設盟不相損害然逺託令公為主方應保全兼送女僕二人細馬兩匹全忠覧書大詬曰劉季述我與伊同王事十二三年兄弟之故特令報渠不能自謀却示崔相道我兩頭三面直是難容我若不殺此公不姓朱也乃擲於地囚其使者走一健步直申崔公從兹與大梁同謀大事按崔𦙍曏來内倚昭宗外挾全忠與宦官為敵今昭宗既廢𦙍所以得未死者以與全忠親密故也全忠安肯以其書示季述季述恨𦙍深入骨髓若得此書立當殺𦙍豈肯復以示𦙍而與之盟誓也此殊不近人情皆由程匡柔黨宦官疾𦙍之亂耳, SBCK: ''}
