  - {type: variant, offset: 16511, length: 356, content: 慮韓建中路逸而歸岐又慮其在華久其將士有刼奪之者上考異曰編遺録上引兵逼華州韓建輕騎出牆歸投於西溪亭子與建飲膳畢却歸赤水營旬日乃請建充忠武節度使梁太祖實録乙卯大軍及華州建來降甲辰署建權知華州事仍以宣武牙推龔麟佐之唐太祖紀年録丙辰汴軍攻華州九日建以城降唐補紀同州刺史王行約閉城登壘全忠斫開城門屠之不留噍類華州韓建聞此出城三十里迎之只於迎處云令公本貫許州便仰衣錦乃差人押出關東舊傳建今李巨川至河中送款敬翔疾其文筆勸全忠害之薛居正五代史梁祖紀丙辰帝表建權知忠武軍事徙令赴任實録乙卯全忠取華州丙辰次武功徙建為忠武節度使按此月無甲辰葢丙辰字誤也全忠乙卯取華州丙辰豈能遽至武功唐補紀又云昭宗不知崔𦙍偽行詔命聞朱全忠平陷兩州十一月三日亥時奔波西去按行約乃克用取同州時節度使也程匡柔妄謬多此類今取華州日從梁太祖實録李巨川死從昭宗實録, SBCK: ''}
