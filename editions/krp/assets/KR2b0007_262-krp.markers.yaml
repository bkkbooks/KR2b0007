  - {type: variant, offset: 10521, length: 682, content: 寧考異曰唐末見聞録乾四年六月差軍將發往汴州為使其書云云汴州回書云云據全忠書有前年洹水曽獲賢郎去歲青山又擒列將又云鎮定歸款蒲晉求和則非乾寧四年明矣唐年補録天復元年五月壬午制以朱全忠兼領河中仍詔與太原通和初朝廷以全忠吞併河朔又收下蒲津必恐兵起相侵乃下詔太原夷門使務和好時太原意亦以全忠漸强先以書聘全忠書辭與見聞錄同全忠答太原書又進表云臣與太原曽於頃歲首締歡盟及其偶掇猜嫌止為各爭言氣又云但以來書意㫖未息披攘又云臣詳兹來意益切憤懐不敢遂與通和必恐有孤朝寄已遣諸軍進討訖續寳運録載全忠表云臣當道先自河府抽軍便赴太原進討已累具狀分析聞奏訖臣今月二十三日部領牙隊到東都李克用差到專使張特與臣書一封并駞馬弓箭銀器匹段等與臣通和其張特臣且與回書放歸訖當月河府抽回兵士即勒權於河陽屯駐見排比收復潞州使邐迤赴太原進討次日李克用與臣書一封謹隨狀封進天復四年二月奏其年三月二日表到駕前奉襄宗三月八日敕云云云天復四年尤誤也編遣録天復元年二月李克用遣軍將張特執檄厚幣而來釋憾亦差軍將持函以為報又曰辛巳上欲北回軍便征北虜近者李克用以甘言重幣請通和好遂具事奏聞語與補録同唐太祖紀年録天復元年六月太祖以梁㓂方强難以兵伏陽降心以緩其謀乃遣押牙張特持幣馬書檄以諭之請復舊好書詞大陳北邊五部壬馬之盛皆吾外援朱温視之不懌令敬翔修報詞㫖踈拙人士嗤之薛居正五代史梁紀天復元年二月李克用遣牙將張特來聘帝亦遣使報命李襲吉傳天復中武皇議欲修好於梁命襲吉以貽梁祖書辭與見聞録同其年月日各參差不同據全忠答太原書云今月二十二日使至又上表云先自河府抽軍赴太原又云二十三日到東都則克用書達全忠必在天復元年二月下旬今從編遺録梁紀, SBCK: ''}
