  - {type: punctuation, offset: 8895, content: (, id: KR2b0007_krp_262-bkkpn796}
  - {type: variant, offset: 8895, length: 401, content: 李繼筠卒與宦官劫帝幸鳯翔考異曰唐補紀曰其月八日李茂貞朝覲留二千人在右街侍衞而回崔𦙍申朱全忠請三千人在南坊宅側安下鳯翔劫駕西去朱全忠又闇以車子載器仗稱是紬絹進奉推車子人皆是官健入崔𦙍宅中人心驚惶不同前後崔𦙍累差人喚召朱全忠不到新傳韓全誨等知崔𦙍必除已乃已因諷茂貞留選士四千宿衞以李繼徽總之𦙍亦諷朱全忠納兵二千居南司以婁敬思領之盖取唐補紀耳按韓偓金鑾密記偓對昭宗云當留兵之時臣五六度與崔𦙍力爭𦙍曰某實不留兵是兵不肯去臣曰其初何用召來又𦙍云且喜岐兵只留三千人據此則是𦙍召茂貞入朝仍留其兵也又舊紀梁實録編遺録薛居正五代史梁紀等諸書皆不言全忠嘗遣兵宿衞京師若如唐補紀所言岐汴各遣兵數千人戍京師則昭宗欲西幸時兩道兵必先鬭於闕下不則汴兵皆為宦官所誅不則先遁去今皆無此事葢程匡柔得於傳聞又黨於宦官深疾崔𦙍未足信也然𦙍所以欲留茂貞兵為已援者葢以茂頁自以誅劉季述為已功必能與已同心讐疾宦官以利誘之遂復與宦官為一耳今從金鑾記, SBCK: ''}
