  - {type: punctuation, offset: 13231, content: (, id: KR2b0007_krp_256-bkkpn1093}
  - {type: variant, offset: 13231, length: 430, content: 湔則前翻連考異曰實録楊復恭兄弟於李克用王重榮有破賊衡之舊乃奏遣劉崇望齎詔宣諭兼達復恭之意重榮克用皆聴命按後唐太祖紀年録偽使至太原太祖詰其事狀曰皆朱玫所為將斬之以徇大將葢寓等言云云太祖燔偽詔械其使馳檄喻諸鎮曰今月二十日得襄王偽詔及朱玫文字云田令孜脅遷鑾駕播越梁洋行至半塗六軍變擾遂至蒼黄而晏駕不知弑逆者何人永念丕基不可無主昨四鎮藩后推朕纂承已於正殿受冊畢改元大赦者李煴出自贅疣名汙藩邸智昏菽麥識昧機權李符虜之以塞辭朱玫賣之以為利吕不韋之竒貨可見奸邪蕭世誠之上囊期於匪夕近者當道徑差健步奉表起居行朝見駐巴梁宿衛比無騷動而朱玫脅其孤騃自號台衡敢首亂階明言晏駕熒惑藩鎮凌弱廟朝云云按舊復恭崇望傳及諸家五代史亦不言克用因復恭崇望而推戴僖宗今不取又於時煴未即位改元偽詔亦恐非也編遺録二年春正月壬午唐室有襄王之亂僖宗駐蹕梁洋襄王遂下偽命以檢校太傅令邸吏左環賫所授偽官告一通左環至具事以聞上怒切責環將加其罪乆乃赦之遂令焚毁於庭按正月朱玫未立襄王編遺録亦誤也今從薛居正五代史梁紀, SBCK: ''}
