  - {type: variant, offset: 16764, length: 381, content: 考異曰實録載勑曰令孜雖已削奪在身官爵宜剝服色配端州長流百姓新傳曰削官爵流儋州然猶依敬瑄不行張􅒷耆舊傳曰大駕廣明二年春孟到蜀叟嘗接識北司諸官子弟有光啓承㫖似先大夫為叟言去年黄巢凌犯聖上蒼忙就路諸王多是徒行夀王至斜谷行不得襪一足跣一足偃卧磻石上田軍容在後收拾驅夀王夀王起告軍容行不得與箇馬騎軍容云山谷間何處得馬以鞭一抶之令行雖迴首無言衷心深銜此恨爾後經今八年僖宗皇帝在行宫寢疾月餘彌留臣下皆知不起于疾内外屬望在於夀王夀王仁孝大度𢎞寛有斷衆所歸心軍容聞大恐就御寢問識臣否帝目瞪不語軍容大驚尋時矯制除西川監軍使仍馳驛赴任遂將拱宸奉鑾兩都自衛星夜倍程軍容才到西川僖宗已崩國朝果冊夀王登極皇帝位於是積年怨恨今日逞其志矣新令孜傳取之据實録令孜光啓二年為西川監軍此月流端州在昭宗即位前自為楊復恭所擯耳十國紀年曰三月僖宗東還詔流令孜儋州敬瑄端州皆拒朝命此据張􅒷耆舊傳致誤耳今從實録, SBCK: ''}
