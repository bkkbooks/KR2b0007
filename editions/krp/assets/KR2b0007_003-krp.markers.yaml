  - {type: variant, offset: 12964, length: 272, content: 史記正義曰丹邱邢州縣予按隋唐志邢州有内邱縣漢之中邱縣也未嘗有丹邱不知其何據爽陽鴻之塞史記作華陽䲭之塞括地志曰北岳别名曰華陽臺即常山也在定州恒陽縣北百四十里徐廣曰䲭作鴻鴻上故闗今名汝城在定州唐縣東北六十里又有鴻上水出唐縣北葛洪山山接北岳恒山皆在定州界班志石邑縣屬常山郡井陘山在西括地志石邑故城在恒州鹿泉縣南三十五里封龍山一名飛龍山在恒州鹿泉縣南四十五里邑盖因山為名洪氏𨽻釋載後漢所立白石碑云常山國元氏縣界有封龍山東垣即漢眞定國之眞定縣漢髙帝更名史記正義曰趙之東垣在恒州眞定縣南八里故常山城是也鄗呼各翻垣于元翻華户化翻恒户登翻䲭丑之翻陘音刑更工衡翻, SBCK: ''}
