  - {type: variant, offset: 7794, length: 463, content: 左傳晉禦秦師於殽殽有二陵焉南陵夏后臯之墓也北陵文王所以避風雨也酈道元曰言山徑委湥峯阜交隂故可以避風雨水經有盤崤石崤千崤之山盤崤之山崤水所出也石崤之山石崤水所出也所謂崤有二陵則石崤之山也千崤之山千崤之水出焉其水北流瀍洛二道漢建安中曹公西討惡南路之嶮更開北道自後行旅率多從之山側附路有石銘云晉太康三年𢎞農太守梁柳修復故道太崤以東西崤以西明非一崤也魏書地形志恒農郡有治崤縣太和十一年置縣有三崤山志又有西恒農郡恒農縣有桃林隋志河南郡桃林縣開皇十六年置有上陽宫陜縣後魏置陜州恒農郡後周又置崤郡開皇初郡廢大業初州廢置恒農宫又熊耳縣後周置有後魏崤縣大業初廢有二崤及峽石山新唐志陜州峽石縣本崤移治峽石塢有繡嶺宫靈寶縣本桃林古函谷關在縣西有桃源宫洛州永寧縣本熊耳西五里有崎岫宫南三十三里有蘭峯宫此皆東西二京往來縁道離宫雜出於隋唐所置不載所謂葼冊道不知此道起於何所入於何所山海經曰夸父之山在湖縣西九里其山多椶柟其北曰桃林或者椶柟字後訛為葼冊遂為葼冊道歟無徵不信又當博考杜佑曰隋大業七年移潼關道於南北鎮城間坍獸檻谷置去舊關四里餘賈音古坍音闕葼子紅翻, SBCK: ''}
