  - {type: variant, offset: 10050, length: 286, content: 府考異曰二月丙辰密遣其將夜襲倉城二兵擊退之己未又悉衆來攻而府兵敗遂入據倉然二府將士猶各固小倉城二十餘日不下既而外救不至食又盡城乃陷没死者大半於是鞏縣長柴孝和監察御史鄭頲等舉縣降賊密開倉招納降者日數百千人於是趙魏以南江淮以北莫不歸附自是賊徒滋蔓矣壬子遣劉長恭房崱等繞兵東討大敗戊午還都王慰撫不責也於是發教募士庶商旅奴等分置營壁各立將帥統領而固守其諸里居民皆移入三城之内於省寺府舍安置焉又使宋遵貴將兵鎮陜縣太原倉雜記密稱魏公改年于時倉猶自固守既而密遣翟讓將兵夜襲倉城官軍擊退之明日又引衆攻倉連戰三日陷外城官軍猶捉子城月餘外援不至城盡陷没死者十六七按二月壬午朔無丙辰等日今從隋書, SBCK: ''}
