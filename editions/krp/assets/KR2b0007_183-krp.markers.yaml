  - {type: variant, offset: 14629, length: 279, content: 仁考異曰創業注曰隋主遣司直姓名馳驛繫帝而斬恭帝自以姓名著於圖錄太原王氣所在恐被猜忌因而禍及頗有所悔時皇太子在河東獨有秦王侍側耳語謂王曰隋歴將盡吾家繼膺符命不早起兵者顧爾兄弟未集耳今遭羑里之厄爾昆季須㑹孟津之師不可從吾同受拏戮家破身亡為英雄笑王泣而啓帝曰芒碭山澤是處容人請同漢祖以觀時變帝曰今遇時來逢茲錮繫雖覩機變何能為也然天命有在吾應㑹昌未必不以此相啓今吾激厲謹當敬天之誡以卜興亡自天祐吾彼焉能害天必亡我何所逃刑乃後數日果有詔使馳驛而至釋淵而免仁恭各依舊檢校所部案煬帝若有詔斬仁恭則比後使之至仁恭已死矣又髙祖身為留守且被禁繫亡去何之恐此亦非太宗之謀也今皆不取, SBCK: ''}
