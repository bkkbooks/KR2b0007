  - {type: variant, offset: 0, length: 267, content: 欽定四庫全書資治通鑑卷一百三十六宋司馬光撰胡三省音註齊紀二起閼達困敦盡屠維大荒落凡六年世祖武皇帝上之下永明二年春正月乙亥以後將軍柳世隆為尚書右僕射竟陵王子良為䕶軍將軍兼司徒領兵置佐鎮西州子良少有清尚少詩照翻傾意賓客才雋之士皆遊集其門開西邸據子良傳西邸在雞籠山多聚古人器服以充之記室參軍范雲蕭琛樂安任昉法曹參軍王融衛軍東閤祭酒蕭衍記室參軍掌書記法曹參軍掌刑法此皆子良府屬也時王儉為衛將軍辟蕭衍為東閤祭酒自晉以來公府屬長史之下有東西閤祭酒琛丑林翻任音壬昉孚往翻鎮西功曹謝朓朓土了翻步兵校尉沈約揚州秀才吳郡陸倕校户教翻倕是為翻竝以文學尤見親, SBCK: ''}
