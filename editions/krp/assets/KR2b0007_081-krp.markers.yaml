  - {type: line-break, offset: 0, content: '', id: KR2b0007_WYG_081-1a01}
  - {type: variant, offset: 0, length: 248, content: 欽定四庫全書資治通鑑卷八十一宋司馬光撰胡三省音註晉紀三起上章困敦盡著雍涒灘凡九年世祖武皇帝中太康元年是年四月改元春正月呉大赦杜預向江陵王渾岀横江攻呉鎮戍所向皆克二月戊午王濬唐彬擊破丹陽監盛紀丹陽城在秭歸縣東八里昔周武王封熊繹於荆丹陽之地即此今謂之屈沱楚王城呉人於江磧要害之處磧七逆翻水渚有沙石曰磧並以鐡鎖横截之又作鐡錐長丈餘暗置江中以逆拒舟艦長直亮翻艦戸黯翻濬作大筏數十方百餘歩縛草為人被甲持仗令善水者以筏先行遇鐵錐錐輒著筏而去筏音伐被皮義翻著陟略翻後著手同又作大炬長十餘丈長直亮翻大數十圍灌以麻, SBCK: ''}
