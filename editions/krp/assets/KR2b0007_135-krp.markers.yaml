  - {type: variant, offset: 0, length: 397, content: 欽定四庫全書資治通鑑卷一百三十五宋司馬光撰胡三省音註齊紀一起屠維協洽盡昭陽大淵獻凡五年祖按蕭子顯齊書崔祖思𫝊宋朝初議封太為梁公祖思啓太祖曰䜟書云金刀利刃齊刈之今宜稱齊實應天命太祖従之遂以齊建國太祖髙皇帝諱道成姓蕭氏字紹伯小字鬬將本居東海蘭陵縣中都鄉中都里晉惠帝時分東海為蘭陵郡故為蘭陵郡人髙祖整過江居晉陵武進縣之東城里時寓居江左者皆僑置本土加以南名更為南蘭陵人整生雋雋生樂子樂子生承之承之生帝建元元年是年四月受禪始改元建元春正月甲辰以江州刺史蕭嶷為都督荆湘等八州諸軍事荆州刺史嶷魚力翻尚書左僕射王延之為江州刺史安南長史蕭子良為督㑹稽等五郡諸軍事㑹稽太守去年已命蕭映蕭晃分鎮兖豫矣嶷道成次子也子良道成之孫也江左之勢莫重於上流莫富於東土故又分布子孫以居之會工外翻守式又翻初沈攸之欲聚衆開民相告士民坐執役者甚衆嶷至鎮一日罷遣三千餘人府州儀物務存儉約輕刑薄斂斂力瞻翻所部大悅辛亥以竟陵世子賾為尚書僕射進, SBCK: ''}
