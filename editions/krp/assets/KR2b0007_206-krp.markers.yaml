  - {type: variant, offset: 8155, length: 704, content: 郎考異曰統紀云癸丑遣職方員外徐彦伯徃房州召廬陵王男女入都醫療狄梁公傳曰後潜發内人十人至房州宣敕云我兒在此令内人就㸔州縣長吏仰數出數入無令混雜隂令内人一人以代廬陵王令廬陵王衣内人衣服以舊數還州縣不悟數日逹京朝廷百僚一無知者舊傳曰廬陵王自房陵還宫太后匿之帳中又召狄仁傑以廬陵為言仁傑慷慨敷奏言發涕流遽出廬陵謂仁傑曰還卿儲君仁傑降階泣賀既已奏曰太子還宫人無知者物議安審是非則天以為然乃復置中宗於龍門具禮迎歸人情感悦狄梁公傳曰天后御一小殿垂簾於後左右隠蔽外不能知乃命公坐於階下曰前者所議事實非小寤寐反覆思卿所言彌覺理非甚乖朕意忠臣事主豈在多違今日之間須易前見以天下之位在卿一言可朕意即兩全逆朕心即俱斃公從容言曰陛下所言天子之位可得專之以臣所知是太宗文武皇帝之位陛下豈得而自有也太宗身䧟鋒鏑經綸四海所以不告勞者盖為子孫豈為武三思邪陛下身是大帝皇后大帝寢疾權使陛下監國大帝崩後合歸冡嫡陛下遂奄有神器十有餘年今議纉承豈可更易且姑與母孰親子與姪孰近云云太后於是歔欷流涕命左右褰簾手撫公背大呌曰卿非朕之臣是唐社稷之臣回謂廬陵王曰拜國老今日國老與爾天子公免冠頓首涕血灑地左右扶䇿久不能起天后曰即具所言宣付中外擇日禮冊公揮涕而言曰自古以來豈有偷人作天子廬陵王留在房州天下所悉知今日在内臣亦不知臣欲奉詔若同衛太子之變陛下何以明臣天后曰安可却向房陵只於石像驛安置具法駕陳百僚就迎之於是大呼萬嵗儲位乃定按武后若宻召廬陵王宫人十人既知其謀洛陽至房陵往來道路甚遠豈得外人都不知乎又實録豈能搆虛立徐彦伯徃迎之事及冇廬陵王至自房州之日又於時若儲位已定豈可自三月來九月始立為太子盖廬陵既至太后以長㓜之次欲立之皇嗣亦以此遜位故遷延半載今皆取實録為正, SBCK: ''}
