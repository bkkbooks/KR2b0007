  - {type: variant, offset: 1902, length: 283, content: 為考異曰舊歸道傳云聖歴初黙啜請和遣閻知㣲冊立功報國可汗知㣲擅與使者緋袍歸道上言不可及黙啜将至單于都䕶府乃令歸道攝司賓卿迎勞之黙啜請六胡州不許遂拘縶歸道突厥傳云李盡忠孫萬榮䧟營府黙啜請為國討契丹許之黙啜部衆漸盛則天遣使冊為立功報國可汗朝野僉載云歸道為知㣲副見黙啜不拜黙啜倒懸待殺之元珍諫乃放之按神功元年姚璹左遷益州長史則與之榖帛必在此前非聖歴初也實録萬嵗通天元年九月丁夘以黙啜不同契丹之逆遣閻知㣲冊為遷善可汗則於時未為立功報國可汗也冊拜此號實録無之不知的在何時今因契丹未平姚璹未出附見於此歸道在朝為左衛郎將何得預論黙啜盖在道見知㣲所為而上所言耳其事則兼采諸書可信者存之, SBCK: ''}
