  - {type: variant, offset: 6952, length: 1130, content: 傳考異曰世有狄梁公云李邕撰其辭鄙誕殆非邕所為其言曰后納諸武之議将移宗社擬立武三思為儲副遷廬陵於房陵諸武隂計日夜獻謀曰陛下姓武合立武氏未冇天子而取别姓将為後者也天后既已許禮問羣臣曰朕年齒将衰國無儲主今欲擇善誰可當之朕雖得人終在群議諸宰臣多聞計定言皆希㫖仁傑獨立無一言天后問曰卿獨無言當有異見公曰有之臣上觀乾象無易主之文中察人心實未厭唐徳天后曰卿何以知之公曰頃者匈奴犯邉陛下使梁王三思於都市召募一月之外不滿千人後廬陵王踵之未經二旬數盈五萬以此觀之人心未去陛下将欲繼統非廬陵王餘實非臣所知天后震怒命左右扶而去之按廬陵王為河北元帥在立為太子後且當是時睿宗為皇嗣若仁傑請以廬陵王繼統則是勸太后廢立也此固未可信或者仁傑以廬陵母子至親而幽囚房陵勸召還左右則有之矣談賓録曰聖厯二年臘月張易之兄弟貴寵逾分懼不全請計於天官侍郎吉頊頊曰公兄弟承恩深矣非有大功於天下自古罕冇全者唯有一䇿苟能行之豈止全家亦當享茅土之封耳除此之外非頊所謀易之兄弟泣請之頊曰天下思唐徳乆矣主上春秋髙武氏諸王殊非所屬意公何不從容請立廬陵以繋生人之望易之乃乘間屢言之則天意乃易既知頊首謀乃召問頊頊曰廬陵相王皆陛下之子髙宗切託於陛下唯陛下裁之則天意乃定御史䑓記曰則天置控鶴府頊與易之昌宗同於府供奉與昌宗親狎昌宗自以貴寵踰分懼不全問計於頊頊云云如談賓録盖太后寵信諸武誅鉏李氏雖己子廬陵亦廢徙房陵故仁傑勸召還左右以强李氏抑諸武耳張吉之能為唐社稷謀也欲求己利耳若仍立皇嗣則己有何功故勸太后立廬陵為太子而太后從之然則欲召還廬陵者仁傑之志也立為太子張吉之謀也談賓言聖厯二年及以頊為天官侍郎䑓記謂睿宗為相王則皆誤也新狄仁傑傳云張易之嘗從容問自安計仁傑曰唯勸迎廬陵王可以免祸計仁傑亦安肯與易之深言此事狄梁公傳又云後經旬召公入曰朕昨夜夢與人雙陸頻不見勝何也對曰雙陸不勝盖為宫中無子此是上天之意假此以示陛下安可久虚儲位哉天后曰是朕家事斷在胸中卿豈合預焉仁傑對曰臣聞王者以天下為家四海之内悉為臣妾何者不為陛下家事君為元首臣為股肱臣安得不預焉又命扶出竟不納按於時王嗣在宫中不得言無子及久虚儲位也朝野僉載云則天曽夢一鸚鵡羽毛甚偉兩翅俱折以問宰臣群公黙然内史狄仁傑曰鵡者陛下姓也兩翅折者陛下二子廬陵相王也陛下起此二子兩翅全也魏王承嗣武三思連頃皆赤後契丹圍幽州檄朝廷曰還我廬陵相王來則天乃憶狄公之言謂之曰卿曽為我占夢今乃應矣朕欲立太子何者為得仁傑曰陛下内有賢子外有賢姪取舍詳擇斷在宸衷則天曰我自有聖子承嗣三思是何疥癬承嗣等懼掩耳而走即降敕追廬陵河内王等奏不許入城龍門安置賊徒轉盛䧟沒冀州則天急乃立廬陵王為太子充元帥初募兵無有應者聞太子行比邙山頭兵滿無容人處賊自退散按是時睿宗未為相王又仁傑若言内有賢子外有賢姪乃是懐兩端也今採衆説之可信者存之, SBCK: ''}
