  - {type: variant, offset: 2820, length: 262, content: 考異曰唐厯天授元年十月誅喬知之新本紀八月壬戌殺右司郎中喬知之盧藏用陳氏别傳趙儋陳子昻旌徳碑皆云契丹以營州叛建安郡王武攸宜親總戎律特詔右補闕喬知之及公参謀幃幕及軍罷以父年老表乞歸侍攸宜討契丹在萬嵗通天元年明年平契丹子昻集冇西還至散闗荅喬補闕詩云昔君事戎馬余得奉戎旃攜手同沙塞闗河緬幽燕嘆此南歸日猶聞北戍邉疑知之之死在神功年後但唐厯統紀新紀殺知之皆在天授元年今據子昻詩必無誤者然猶聞比戍邉則軍未罷也又武后云來俊臣死後不聞有反者故置於此據朝野僉載知之以婢碧玉事為武承嗣諷人羅告之斬於市南破家籍沒此時知之在邉盖承嗣先衘之至此乃殺之耳, SBCK: ''}
