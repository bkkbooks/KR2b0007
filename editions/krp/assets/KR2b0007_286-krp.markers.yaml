  - {type: variant, offset: 9466, length: 738, content: 歐陽修曰唐故事天子日御殿見羣臣曰常參朔朢薦食諸陵寢有思慕之心不能臨前殿則御便殿見羣臣曰入閤宣政前殿也謂之衙衙有仗紫宸便殿也謂之閤其不御前殿而御紫宸也乃自正衙喚仗由閤門而入百官俟朝於衙者因隨而入見故謂之入閤然衙朝也其禮尊閤宴見也其事殺自乾符以後因亂禮缺天子不能日見羣臣而見朔朢故正衙常日廢仗而朔朢入閤有仗其後習見遂以入閤為重至出御前殿猶謂之入閤五代之時羣臣五日一入見中興殿便殿也此入閤之遺制而謂之起居朔朢一出御文明殿前殿也反謂之入閤今按五伐㑹要有入閤儀司天進時刻牌閤門進班齊牌皇帝自内著袍衫穿靴乗輦至常朝殿門駐輦受樞密使已下起居訖引駕至正朝殿皇帝坐定卷簾殿上添香喝控鶴官拜次鷄呌次閤門勘契次閤門承㫖喚仗次閤門使引金吾將軍南班拜訖分引至位對揖次細仗相次入次執文武班簿至位對揖次宰臣南班拜訖分引至位對揖次金吾將軍奏平安次文武百官入通事舍人揖殿靸靴入沙墀兩拜立定次引宰臣及兩省官金吾將軍合班立定閤門使喝拜搢笏舞跪三拜奏聖躬萬福又引宰臣班首一人至近前又兩拜舞跪三拜引至位對揖通事舍人引宰臣於東西踏道下立次文武百官出次兩省官南班揖殿出次翰林學士南班揖殿出次執文武班簿南班揖殿出次金吾將軍南班揖殿出次細仗出次引宰臣香案前奉事訖宣徽使喝好去南班揖殿出次閤門使引待制官到位兩拜引近前奏事訖却歸位罄折宣徽使宣所奏知又兩拜舞跪三拜舍人喝好去南班揖殿出次刑法官奏事準上次監奏御史南班揖殿出次閤門承㫖放仗次閤門使奏衙内無事次喝控鶴官門外祗候次下簾皇帝上輦歸内又按歐史梁太祖乾化元年九月辛巳朔御文明殿入閤則入閤儀梁所定也㫝唐之正牙朝㑹其儀畧而野而五代謂之行禮㑹要又詳載而為書則其儀為一時之上儀矣姑備録之以志朝儀之變文明殿洛陽宫之正衙殿也崇元殿汴宮之正衙殿也薛史曰梁制每月初入閤朢日延英聴政後唐制朔朢皆入閤, SBCK: ''}
