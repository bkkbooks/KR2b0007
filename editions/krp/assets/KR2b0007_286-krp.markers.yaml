  - {type: variant, offset: 6484, length: 385, content: 惡烏路翻更工衡翻歐陽修曰人君即位稱元年常事爾古不以為重也孔子未修春秋其前固己如此雖暴君昏主妄庸之史其紀事先後逺近莫不以嵗月一二數之乃理之自然也其謂一為元未嘗有法焉古人之語爾古謂嵗之一月亦不云一而曰正月國語言六吕曰元間大吕周易列六爻曰初九大抵古人言數多不云一不獨謂年為元也及後世曲學之士始謂孔子書元年為春秋大法遂以改元為重事自漢以後又名年以建元而正偽紛雜稱號遂多不勝其紀也五代亂世也其事無法而不合於理者多矣至其年號乖錯以惑後世則不可以不明梁太祖以乾化二年遇弑明年末帝誅友珪黜其鳯厯之號稱乾化三年尚為有說至漢髙祖建國黜晉出帝開運四年復稱天福十二年者何哉蓋以愛憎之私耳方出帝時漢髙祖居太原常憤憤下視晉晉亦陽優禮之幸而未見其隙及契丹滅晉漢未嘗有赴難之意出帝已北遷方陽以兵聲言追之至土門而還及其即位改元而黜開運之號則其用心可知矣蓋其於出帝無復君臣之義而幸禍以為利者其素志也可勝歎哉, SBCK: ''}
