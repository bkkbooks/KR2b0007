  - {type: variant, offset: 1491, length: 600, content: 監古衘翻武徳三年以并州之太谷祈縣置太州六年州廢當是此時復置也考異曰梁公傳云張柬之桓彦範敬暉崔𤣥暐袁恕己皆公所薦公嘗退食之後謂五公曰所恨衰老身先朝露不得見五公盛事冀各保愛願盡本心五公心知目擊懸悟公意公寢疾五公候問偶對終日竟無一言少頃流涕及枕但相視而已五公退出遽不測其由袁恕己曰豈不氣力轉羸須問家事乎張柬之曰未聞大賢廢國謀家者也斯須命張柬之袁恕己桓彦範三公入餘二公立於門外曰向者無言盖以二公之故此二公能斷而不能宻若先與議之事必外泄一泄之後則國異而家亡也至是時或不與共之事亦不就梁王三思掌權可先取而後行也不然則必反生大禍狄公沒後經嵗餘五公潜㑹於幽聞之處叙公當時之言重結盟約徹饌之後相顧欲言未至其時恐負前諾欲言又止前後數四桓彦範乃叙其言言猶未畢聞戸牖之外聲若雷霆須臾風雨咫尺莫辨所坐牀褥悉擲於階下五公戰懼不知所據乃相謂曰此是狄公忠烈之至假此靈變以警衆心不欲吾軰先論此事未至其時不可復言也斯須天清日明不異於初易之等既誅袁謂張公曰昔有遺言使先収三思豈可舍諸張公曰但大事畢功此是机上之物豈有逃乎後梁王交通於内五公果為所譛俱遭流竄所期興廢年月遺約軌模少無異也按東之等五人偶同時在位恊力立功仁傑豈能預知其事舉此五人專欲使之輔立太子耶且易之等若有可誅之便太子有可立之勢仁傑身為宰相豈待五年之後須柬之等然後發邪此盖作傳者因五人建興復之功附㑹其事云皆仁傑所舉受教於仁傑耳其言譎怪無稽今所不取舊傳惟著舉柬之彦範暉三人姓名今從之, SBCK: ''}
