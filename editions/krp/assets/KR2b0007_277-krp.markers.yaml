  - {type: punctuation, offset: 5149, content: (, id: KR2b0007_krp_277-bkkpn466}
  - {type: variant, offset: 5149, length: 541, content: 今利州昭化縣南有白衞嶺與劍門相接九域志劍州東北至劍門五十五里考異曰實録軍前奏今月十三日王𢎞贄馮暉自利州入山路出劍門闗外倒下殺董璋把闗兵士約三千人獲都指揮使齊彦温大軍進攻入劍門次又丙戌奏今月十七日收下劍州破賊千餘人獲指揮使劉太李昊蜀髙祖實録己卯東川告急今月十八日北軍自白衞嶺人頭山後過從小劍路至漢源驛出頭倒入劍門打破闗寨掩捉彦温及將士五百餘人遂相次構喚大軍據闗下營又龐福誠謝鍠相謂曰北軍昨來既得闗寨之後隔一日大軍曽下至劍州而乃搬運糧食燒舍自驚還奔闗寨十國紀年後蜀史壬申𢎞贄暉襲陷劍門癸酉攻焚劍州取糧還屯劍門己卯東川告急使至成都知祥命牙内都指揮使李肇帥兵五千赴援董璋自閬州帥兩川兵屯木馬寨先是龎福誠謝鍠屯閬州北來蘇寨聞劍門陷懼北軍據劍州帥部兵千餘人由間道先董璋至劍州壁于衙城後士卒方食北軍萬餘人自北山馳下福誠等趨河橋迎擊之北軍小却福誠帥數百人夜升北山顛轉至北軍壁外大呼譟鍠命將士以弓弩短兵急擊之北軍驚擾棄戈甲而遁鍠追襲之北軍退保劍門十餘日不窺劍州按劍門至成都尚十許程若十八日劍門失守何得二十日孟知祥已聞之邪今從實録十三日壬申為定若隔一日下至劍州則十五日甲戌非十七日也葢思同等以大軍未至故收糧燒舍還保劍門故福誠等得復入劍州李昊叙事甚詳無執劉太事今刪之晉髙祖實録云甲申平劍州破賊千餘人尤誤也, SBCK: ''}
