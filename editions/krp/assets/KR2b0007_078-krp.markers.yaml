  - {type: variant, offset: 0, length: 446, content: 欽定四庫全書資治通鑑卷七十八宋司馬光撰胡三省音註魏紀十起𤣥黓敦牂盡閼逢涒灘凡三年涒音暾元皇帝下景元三年秋八月乙酉吳主立皇后朱氏朱公主之女也戊子立子雨單為太子雨單烏關翻據吳志吳主休為四子作名字雨單音湖水灣澳之灣非先有此音也漢大将軍姜維将出軍右車騎将軍廖化曰兵不戢必自焚伯約之謂也左傳魯襄仲曰兵猶火也不戢将自焚姜維字伯約廖力教翻今力弔翻智不出敵而力小於宼用之無厭将何以存謂較智則不出于敵人之上而較力則又弱小也厭於鹽翻冬十月維入宼洮陽洮陽洮水之陽也洮水之隂魏不置郡縣維渡洮而攻之也沙州記曰嵹城東北三百里有曾城臨洮水曰洮陽城杜佑曰臨洮郡城本洮陽城臨洮水洮土刀翻鄧艾與戰於侯和破之維退住沓中水經注洮水逕洮陽城又東逕共和山南城在四山中又東逕迷和城北意侯和即此地也沓中在諸羗中即沙漒之地晉張駿據河西因前趙之亂收河南地至于狄道置武街石門侯和漒川甘松五屯䕶軍與後趙分境乞伏熾盤攻漒川師次沓中則侯和之地在塞内沓中之地在羗中明矣初維以羈旅依漢維降漢見七十一卷明帝太和元年身受重任興兵累年功績不立黄皓用事於中與右大将, SBCK: 將}
