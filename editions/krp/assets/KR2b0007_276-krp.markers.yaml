  - {type: variant, offset: 13593, length: 245, content: 賜考異曰鄭文寳南唐近事烈祖曲宴便殿引酖􅘑周本本疑而不飲佯醉别引一巵均酒之半跪捧而進曰陛下千萬嵗陛下若不飲此非君臣同心同德之義也臣不敢奉詔上色變無言久之左右皆相顧流汗莫知所從伶倫申漸髙有機智者竊諭其㫖乃乗詼諧盡併兩盞以飲之内杯于懐中亟趍而出上密使親信持良藥詣其私第解之已不及矣漸髙腦潰而卒江表志烈祖曲宴引金鍾賜知詢酒曰願我弟百千長壽知詢疑懼引它器均之曰願與兄各享五百嵗知誥不飲久之樂工申漸髙乗詼諧併而飲之至家腦潰而卒二書皆出文寶而不同乃爾按知誥既即位欲除周本自應多方不須如此云酖知詢近是今從之, SBCK: ''}
