  - {type: variant, offset: 0, length: 238, content: 欽定四庫全書資治通鑑巻四十五宋司馬光撰胡三省音註漢紀三十七起重光作噩盡旃蒙大淵獻凡十五年顯宗孝明皇帝下永平四年春帝近出觀覽城第城雒陽城第宅也賢曰有甲乙之次故曰第欲遂校獵河内河内郡在雒陽北百二十里東平王蒼上書諫帝覽奏即還宫秋九月戊寅千乗哀王建薨無子國除乗䋲證翻冬十月乙卯司徒郭丹司空馮魴免魴音房以河南尹沛國范遷為司徒太僕伏恭為司空恭湛之兄子也陵鄉矦梁松坐怨望縣飛書誹謗下獄死松嗣父綂爵為陵鄉矦縣讀曰懸下遐稼翻初上為太子太中大夫鄭興子衆以通經知名知名者有名於時人皆知之也太子及山陽, SBCK: ''}
