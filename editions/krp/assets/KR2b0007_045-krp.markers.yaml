  - {type: variant, offset: 2203, length: 370, content: 袁宏漢紀浮屠佛也西域天竺國有佛道焉佛者漢言覺也將以覺悟羣生也其教以修善慈心為主不殺生專務清静其精者為沙門沙門漢言息也盖息意去欲以歸於無為長丈六尺黄金色初明帝夢見金人長大以問羣臣或曰西方有神其名曰佛陛下所夢得無是乎於是遣使天竺問其道術而圗其形像焉賢曰伊蒲塞即優婆塞也中國翻為近住言受戒行堪近僧住也桑門即沙門梵云沙門那或曰桑門唐言勤息秦譯云勤行又云善覺魏收曰漢武帝遣霍去病討匈奴獲休屠王金人以為大神列於甘泉宫不祭祀但燒香禮拜而已此則佛道流通之漸也張騫使大夏傳其旁有身毒國一名天竺始聞有浮屠之教哀帝元夀元年博士弟子秦景憲受大月氏王使伊存口授浮屠經中國聞之未信了也後明帝夜夢金人頂有白光飛行殿庭乃訪羣臣傅毅始以佛對帝遣郎中蔡愔等使天竺寫浮屠遺範仍與沙門攝摩騰竺法蘭東還洛陽中國有沙門跪拜之法自此始愔之還以白馬負經而至漢因立白馬寺於洛城雍關西好呼到翻, SBCK: ''}
