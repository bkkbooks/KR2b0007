  - {type: variant, offset: 1801, length: 1379, content: 隋志宇文愷依月令文造明堂木様重檐複廟五房四逹丈尺規矩皆有凖憑帝異之命有司於安業里為規兆葢在長安南郭内也既以異議罷至大業中愷復奏明堂議及木様其議云尚書帝命驗曰帝者承天立五府以尊天重象赤曰文祖黃曰神斗白曰顯紀黒曰𤣥矩蒼曰靈府注曰唐虞之天府夏之世室殷之重屋周之明堂皆同矣尸子曰有虞氏曰總章周官考工記曰夏后氏世室堂修四七博四脩一注云脩南北之深也夏度以步今堂脩十四步其博益以四分修之一則明堂博十七歩半也臣愷按三王之世夏最為近古從質尚文理應漸就寛大何因夏室乃大殷堂相形為論理恐不爾記云堂脩七博四脩若夏度以步則應脩七歩注云今堂脩十四步乃是增益記文殷周二堂獨無加字便是其義類例不同山東禮本輒加二七之字何獨殷無加尋之文周闕増筵之義研覈其趣或是不然讐校古書並無二字此乃桑間俗儒信情加減黃圖議云夏后氏益其堂之大一百四十四尺周人明堂以為兩杼間馬宫之言止論堂之一面㨿此為凖則三代堂基並方得為上圓之制諸書所説並為下方鄭注周官獨為此義非直與古違異亦乃乖背禮文尋文求理深恐未愜尸子曰殷人陽館考工記曰殷人重屋堂脩七尋堂崇三尺四阿重屋注曰其脩七尋五丈六尺放夏周則其博九尋七丈二尺又曰周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡二筵禮記明堂位曰天子之廟複廟重檐鄭注云複廟重屋也注玉藻云天子廟及路寢皆如明堂制禮圖云於内室之上起通天之觀觀八十一尺得宫之數其聲濁君之象也大戴禮云明堂者古有之凡九室一室有四户八牖以茅葢上圓下方外水曰璧雝赤綴户白綴牖堂髙三尺東西九仞南北七筵其宫方三百步周書明堂曰堂方百一十二尺髙四尺階博六尺三寸室居内方百尺室内方六十尺户髙八尺博四尺作洛曰明堂太廟路寤咸有四阿重亢重廊孔氏注云重亢累棟重廊累屋也禮圖曰秦明堂九室十二階各有所居吕氏春秋曰有十二堂與月令同並不論尺丈臣愷案十二階雖不與禮合一月一階非無理思黄圖曰堂方百四十四尺坤之䇿也方象地屋圓楣徑二百一十六尺法乾之䇿也圓象天室九宫法九州太室方六丈法坤之變數十二堂法十二月三十六户法極隂之變數七十二牖法五行所行日數八逹象八風法八卦通天臺徑九尺象乾以九覆六髙八十一尺法黃鍾九九之數二十八柱象二十八宿堂髙三尺土階三等法三統堂四向五色法四時五行殿門去殿七十二步法五行所行門堂長四丈取太室三之二垣髙無蔽目之照目恐當作日牖六尺其外倍之殿垣方在水内法地隂也水四周於外象四海圓法陽也水闊二十四丈象二十四氣水内徑三丈應覲禮經武帝立明堂汶上無室其外畧依此制太山通議今亡不可得而辨也元始四年起明堂辟雍長安城南門制度如儀一殿垣四面門八觀水外周堤壤髙四尺禮圖曰建武三十年作明堂上圓下方上圓法天下方法地十二堂法日辰九室法九州室八牕八九七十二法一時之王室有二户二九十八户法土王十八日内堂正壇髙三尺土階三等胡伯始注漢官云古清廟葢以茅今葢以瓦下藉茅以存古制自晉以前未有鵄尾其圓墻璧水一依本圖晉堂方構不合天文既缺重樓又無璧水空堂乖五室之義直殿違九階之文非古欺天一何過甚後魏於北臺城南造圓墻在璧水外門在水内迥立不與墻相連其堂上九室三三相重不依古制室間通巷違舛處多其室皆用墼累極成褊陋宋起居注曰孝武帝大明五年立明堂其墻宇規範擬則太廟唯十二間以應朞數梁武帝移宋時太極殿以為明堂無室十二間自古明堂圖惟有二本一是宗周劉熙阮諶劉昌宗等作三圖畧同一是後漢建武三十年作禮圖有本不詳撰人臣逺尋經傳傍求子史研究衆説摠撰今圖其様以木為之下為方堂堂有五室上為圓觀觀有四門會遼東之役不果行, SBCK: ''}
