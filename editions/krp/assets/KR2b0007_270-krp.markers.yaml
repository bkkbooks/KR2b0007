  - {type: variant, offset: 5073, length: 330, content: 歐史職方考曰五代之際外屬之州揚州曰淮南宣州曰寧國鄂州曰武昌洪州曰鎮南復州曰武威杭州曰鎮海越州曰鎮東江陵府曰荆南益州梓州曰劒南東西川遂州曰武信興元府曰山南西道洋州曰武定黔州曰黔南潭州曰武安桂州曰靜江容州曰寧逺邕州曰建武廣州曰清海皆唐故號更五代無所易而今因之者也其餘僣偽改置之名不可悉考而不足道其因著于今者略著于譜按歐公之時去五代未逺十國僭偽自相署置其當時節鎮之名已無所考况欲考之于二三百年之後乎今台州有魯洵作杜雄墓碑云唐僖宗光啓三年陞台州為德化軍洵乃雄吏時為德化軍判官者也又嘉定中黄巖縣永寧江有泅于水者拾一銅印其文曰台州德化軍行營朱記宋太祖乾德元年錢昱以德化軍節度使本路安撫使兼知台州台州小郡猶置節度其它州郡從可知矣吳之昌化威武葢亦置之境内屬城但不可得而考其地耳, SBCK: ''}
