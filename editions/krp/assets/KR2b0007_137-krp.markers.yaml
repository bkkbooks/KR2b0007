  - {type: variant, offset: 9025, length: 1017, content: 記大𫝊曰禮不王不禘王者禘其祖之所自出以其祖配之鄭氏注曰凡大祭曰禘大祭其先祖所由生謂郊祀天也王者之先皆感太微五帝之精以生皆用正嵗之正月郊祭之又祭法言虞夏殷周禘郊祖宗之法鄭注云禘郊祖宗謂祭祀以配食也此禘謂祭昊天於圜丘也孔頴逹曰王肅論引賈逵說告禘于莊公禘者遞也審諦昭穆遷主遞位孫居王父之處又引禘于太廟逸禮昭尸穆尸其祝辭總稱孝子孝孫則是父子並列逸禮又云皆升合於太祖所以劉歆賈逵鄭衆馬融等皆以為然鄭不從者以公羊傳為正逸禮不可用也左氏說及杜元覬皆以為禘三年一大祭在太祖之廟𫝊無祫文然則祫即禘也取其序昭穆謂之禘取其合集羣祖謂之祫杜佑通典孝文帝太和十三年詔鄭𤣥云天子祭員丘曰禘宗廟大祭亦曰禘三年一祫五年一禘祫則毁廟羣廟之主於太祖廟合而祭之禘則增及百官配食者審諦而祭之魯禮三年䘮畢而祫明年而禘員丘宗廟大祭俱稱禘祭有兩禘明也王肅又云天子諸侯皆禘於宗廟非祭天之祭郊祀后稷不稱禘禘祫一名也合祭故稱祫禘而審諦之故稱禘非兩祭之名三年一祫五年一禘總而互舉故稱五年再殷祭不言一禘一祫斷可知矣諸儒之說大略如是公卿可議其是非尚書游明根言曰鄭氏之義禘者大祭之名大祭員丘謂之禘者審諦五精星辰也大祭宗廟謂之禘者審諦其昭穆百官也貟丘常合不言祫宗廟時合故言祫斯則宗廟祫禘並行貟丘一禘而已宜於宗廟俱行禘祫之禮二禮異故名殊依禮春祭特礿於嘗於烝則祫嘗祫烝不於三時皆行禘祫之禮中書監髙閭又言禘祭員丘與鄭義同者以為有虞氏禘黄帝黄帝非虞在廟之帝不在廟非員丘而何又大𫝊云祖其所自出之祖又非在廟之文論語稱禘自既灌以往據爾雅禘大祭也諸侯無禘禮惟夏祭稱禘又非宗廟之禘魯行天子之儀不敢專行員丘之禘改殷之禘取其禘名於宗廟因先有祫遂生兩名其宗廟禘祫之祭據王氏之義祫而禘禘止於一時一時者祭不欲數一嵗三禘為過數詔曰明根閭等據二家之義論禘祫詳矣至於事取折衷猶有未允閭以禘祫為名義同王氏禘祭員丘事與鄭同無所間然明根以鄭氏等兩名兩祭並存並用理有未俱稱據二義一時禘祫而闕二時之禘事有難從先王制禮内緣人子之情外協尊卑之序故天子七廟數盡則毁藏主於太祖之廟三年而祫祭之世盡則毁以示有終之義三年而祫以申追逺之情禘祫既是一祭分而兩之事無所據毁廟三年一祫又有不盡四時於禮為闕七廟四時常祭祫則三年一祭而又不究四時於情為蕳王以祫為一祭於義為長鄭以員丘為禘與宗廟大祭同名義亦為當今互取鄭王二義禘祫并為一祭從王禘是祭員丘大祭之名上下同用從鄭若以數則凟五年一禘改祫從禘五年一禘則四時盡禘以稱今情則旅天禮文先禘而後時祭便即施行著之於令永為世法, SBCK: ''}
