  - {type: variant, offset: 8502, length: 368, content: 尚書禋于六宗而諸儒互說不同王莽以易六子遂立六宗祠王肅亦以為易六子摯虞以為月令孟冬天子祈來年于天宗天宗六宗之神也劉邵以為萬物負隂而抱陽冲氣以為和六宗者太極冲和之氣為六氣之宗者也虞書謂之六宗周書謂之天宗孔頴逹曰王肅六宗之說用家語之文以四時也寒暑也日也月也水旱也為六宗孔注尚書同之伏生與馬融以天地四時為六宗劉歆孔晁以乹坤之子六為六宗賈逵以為天宗三日月星也地宗三河海岱也今尚書歐陽夏侯說六宗者上及天下及地旁及四方中央恍惚助隂陽變化有益於人者也古尚書說天宗日月北辰岱河海也日月為隂陽宗北辰為星宗河為水宗岱為山宗海為澤宗鄭𤣥以星也辰也司中也司命也風師也而師也為六宗虞喜别論曰地有五色太社象之總五為一則成六六為地數推校經𫝊别無他祭也劉昭以為此說近得其實張髦曰父祖之廟六宗即三昭三穆也魏文帝以天皇大帝五帝為六宗杜佑取之鄭氏曰禋之言烟周人尚臭烟氣之臭聞者, SBCK: ''}
