  - {type: variant, offset: 12371, length: 405, content: 曰考異曰玉泉子聞見録徐公商判鹺以瞻為從事商拜相命官曽不及瞻瞻出於覊旅以楊𤣥翼樞密權重可倚以圖事而密啗閽者謁焉瞻有儀表加之詞辯俊利𤣥翼一見悦之毎𤣥翼歸第瞻輙候之由是日加親熟遂許以内廷之拜既有日矣瞻即復謁徐公曰相公過聽以某辱在門舘幸遇相公登庸四海之人孰不受相公之惠某故相公從事窮飢日加且環歳矣相公曾不以下位處之某雖不佞亦相公之恩不終也今已别有計矣請從此辭即下拜焉商初聞瞻言徒唯唯而已迨聞别有計不覺愕然方欲遜謝瞻已疾趨出矣明日内牓子出以瞻為翰林學士舊瞻傳劉瑑作相以宗人遇之薦為翰林學士按瞻素有清節必不至如玉泉子所云恐出於愛憎之説聞見録又云𤣥翼為鳯翔監軍瞻即出為太原亞尹鄭從讜為節度使殊不禮焉洎復入翰林而作相也常謂人曰吾在北門為鄭尚書冷將息不復病熱矣從讜南海之命瞻所致也按舊傳瞻自户部侍郎承㫖出為太原尹河東節度使瞻為學士若非罪謫恐不為少尹又舊紀咸通十二年十二月鄭從讜自宣武節度使為廣州在瞻驩州後故知玊泉子所記皆虛今不取, SBCK: ''}
