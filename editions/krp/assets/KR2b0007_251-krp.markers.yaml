  - {type: variant, offset: 7844, length: 541, content: 月考異曰續寳運録曰正十八日戴可師陷失賊遂凶狂彭門紀亂曰可師引兵三萬欲先奪淮口遂救泗州十二月十三日遲明圍賊於都梁山下賊已就降而可師自恃兵强不為備賊將王𢎞立者將兵數萬人㨗徑赴救奔突而前官軍潰亂遂為所敗可師并監使將校已下咸沒於陣於是龎勛自謂前無彊敵矣舊紀十一月可師與賊轉戰賊黨屢敗盡弃淮南之守十年正月以可師充曹州行營招討使時賊將劉行及吳迴攻圍泗州可師乘勝救之屯於石梁驛賊退去可師追擊生擒行及賊保都梁城登城拜曰見與都頭謀歸降可師既知其窘乃退軍五里其城西面有水三面大軍賊乃夜中渉水而遁明早開城門惟病嫗數人而已王師入壘未整翌日詰旦重霧賊軍大至可師方大醉單馬奔出為虹縣人郭真所殺一軍盡沒賊將吳迴進軍復圍泗州又曰龎勛奏當道先𤼵戍嶺南兵士三千人春冬衣今欲差人送赴邕管鄂岳觀察使劉允章上書言龎勛聚徒十萬今若遣人逹嶺表如戍卒與勛合勢則禍難非細尋詔龎勛止絶兼令江淮諸道紀綱捕之實録可師敗繫於閏月下亦云十二月十三日新紀十二月壬申亦用紀亂之日也按紀亂上有臘月又云十二月十三日其下無閏月疑謂閏月十三日也然據續寳運録閏月十一日辛讜離泗州十四日至揚州乞兵粮若於時可師在都梁則讜必不舍可師而詣揚潤也若讜出在可師敗後則令狐綯方自救不暇何暇救泗州若可師敗在正月則新紀十二月已除馬舉南面招討使要之必在辛讜適揚潤之後故置於此龎, SBCK: 龐}
