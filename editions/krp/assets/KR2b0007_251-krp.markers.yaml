  - {type: variant, offset: 6314, length: 638, content: 綯考異曰舊紀十月賊攻泗州勢急令狐慮失淮口乃令大將李湘赴援舉軍皆沒湘與都監郭厚本俱為賊所執送徐州令狐綯傳曰賊聞湘來援遣人致書于綯辭情遜順言朝廷累有詔赦宥但抗拒者三兩人耳旦夕圗去之即束身請命願相公保任之綯即奏聞請賜勛節鉞仍誠李湘但戍淮口賊已招降不得立異繇是湘軍觧甲安寢去警撤備日與賊相對歡笑交言一日賊軍乘閒歩騎徑入湘壘淮卒五千人皆被生縶送徐州為賊蒸而食之湘與監軍郭厚本為龎勛斷手足以徇於康承訓軍時浙西杜審權𤼵軍千人與李湘約㑹兵大將翟行約勇敢知名浙軍未至而湘軍敗賊乃分兵立淮南旗幟為交鬬之狀行約軍望見急趣之千人並為賊所縳送徐州綯既䘮師朝廷以馬舉代綯為淮南節度使辛讜傳曰湘率五千來援賊詐降敗于淮口湘與郭厚本皆為賊所執彭門紀亂曰勛以泗州堅守遣劉佶共謀攻取時淮南宣潤三道𤼵兵戍都梁山舊城與泗州隔淮而已賊衆乃夜潜師屯淮及明而逼城濠州賊帥劉行及亦遣王𢎞立侵掠淮南於是合衆急攻官軍遂弃城出戰十一月三十日賊乃大敗官軍殺害二千人生降七八百人并虜其将李湘等咸送於徐州賊遂據有淮口斷絶驛路又曰賊既破戴可師令狐綯愳乃遣使誘諭約為奏請節旄續皇王寳運録曰十一月二十九日浙西節度使杜審權差都頭翟行約將兵二千來救三十日行約領兵方欲入泗州又破賊奔突行約古山尋被圍合城中兵士無可出救賊又開圍行約不知是計便走欲去而被着山下伏兵須㬰被殺匹馬不餘賊遂圍淮口鎮有淮南都押衙李湘鎮將袁公弁領馬歩三千人被圍從十一月三十日至十二月五日李湘束甲出軍被襲逐殺盡却入鎮者使豎降旗鎮内兵士老小一萬餘人被刼驅送濠州郭厚本此時遇害今從續寳運録, SBCK: ''}
