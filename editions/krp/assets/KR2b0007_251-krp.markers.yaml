  - {type: variant, offset: 8706, length: 353, content: 兖海號泰寧軍門考異正文曰曹翔馬舉為徐州南北招討使注曰彭紀亂作馬士舉今從新紀紀亂曰王晏權數為賊所攻雖不敗傷亦時退縮朝廷復除隴州牧曹翔領兖海節度使充北面都統招討等使又魏博元帥何公遣行軍薛尤將兵三萬人掎角破賊曹翔軍於膝沛魏博軍於豐蕭其衆都六七萬人又言賊冦海州夀州皆敗又言辛讜救泗州雖繫正月之下葢追叙以前之事實録二月以馬舉為淮南節度使充南面招討使初康承訓率諸将正月一日進軍攻徐州不克賊圍壽州王晏權數為賊所攻退縮不敢出戰乃以曹翔為兖海等州節度使充北面招討使魏博遣薛尤將兵三千掎角討賊賊衆攻海州戍兵擊之大敗康承訓率衆屯於柳子之西皆承此而誤也新紀翔舉除南北招討在十二月而無閏今因翔與魏博同討徐州而見之置於歲末余據考異及明年馬舉解泗州圍事則通鑑正文曹翔為徐州北面招討使之下當有以馬舉為淮南節度使充南面招討使十四字傳寫逸之也, SBCK: ''}
