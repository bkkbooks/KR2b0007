  - {type: variant, offset: 15962, length: 244, content: 圍考異曰張雲咸通解録曰十年十月南蠻衆擊董舂烏部落傾其巢窟舂烏以其衆保北栅俄而蠻掩至沐源川遂逼嘉州南自清黎關冦黎雅張􅒷錦里耆舊傳曰十一年庚寅節度使盧僕射耽冬雲南蠻數萬冦邊突破清溪闗犯大渡河遂進陷沈黎突卭崍直雅卭按解圍録新舊紀皆在十年冬而􅒷獨以為十一年冬誤也新傳曰十年乃入冦以兵綴清溪闗密引衆伐木開道徑雪坡盛夏卒凍死者二千人出沐源闚嘉州按蠻以十一月至沭源川非盛夏新傳誤也實録又曰驃信以十月三日離善闡毎人止將米炒一斗隨身乃詔髙駢乘其國内無兵備進攻善闡以解衝突按駢時為鄆州節度使不在安南恐實録誤也, SBCK: ''}
