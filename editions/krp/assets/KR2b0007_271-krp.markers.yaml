  - {type: variant, offset: 777, length: 483, content: 實考異曰莊宗錄天祐十五年賀瓌屯于濮州北行臺里十二月辛酉上次于臨濮賊亦捨營踵我癸亥次于胡栁明日接戰王彦章敗走濮陽甲子進攻濮陽一鼓而拔按唐地里志濮州亦謂之濮陽郡治鄄城有濮陽臨濮二縣據莊宗實錄則行臺里在臨濮東湖柳在濮陽東彦章所保莊宗所拔者皆濮陽縣非濮州也而莊宗列傳薛史閻寶傳皆云彦章騎軍已入濮州山下惟列步兵向晚皆有歸心是以濮陽即為濮州也李嗣昭傳嗣昭云賊無營壘去臨濮地逺日已晡晚皆有歸心但以精騎撓之無令夕食晡後追擊破之必矣我若收軍拔寨賊入臨濮俟彼整齊復來則勝負未決是又以濮陽即為臨濮也按薛史梁紀貞明五年四月制書攷濮州税課是濮州猶屬梁也莊宗實錄天祐十六年十二月攻下濮陽下教告諭曹濮百姓勸令歸附是濮州未屬晉也又賀瓌屯于山西晉軍在其東彦章已西入濮陽瓌豈得更東歸臨濮疑寶傳濮州嗣昭傳臨濮皆當為濮陽史氏文飾之誤也又莊宗實錄去年十二月晉已拔濮陽至此又云攻下濮陽按薛史梁紀去年十二月晉人攻濮陽陷之今年十二月又云晉人陷濮陽唐紀去冬拔濮陽今年四月追襲賀瓌至濮陽十二月無攻下濮陽事賀瓌傳貞明四年領大軍營於行臺村十二月戰敗四月退軍行臺尋卒若非實錄及梁紀重複則是去冬唐雖得濮陽弃而不守今年復攻拔之也, SBCK: ''}
