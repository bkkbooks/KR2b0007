  - {type: punctuation, offset: 6183, content: (, id: KR2b0007_krp_271-bkkpn589}
  - {type: variant, offset: 6183, length: 650, content: 張承業唐之純臣也烏可以宦者待之哉承考異曰莊宗實錄上初獲玉璽諸將勸上復唐正朔業自太原急趣謁上曰殿下父子血戰三十餘年葢緣報國復仇為唐宗社今元凶未殄軍賦不充河朔數州弊於供億遽先大號費養兵之事力困凋弊之生靈臣以為一未可也殿下旣化家為國新創廟朝典禮制度須取太常準的方今禮院未見其人儻失舊章為人輕笑二未可也因泣下霑襟上曰余非所願奈諸將意何承業自是多病日加危篤尋卒莊宗列傳上受諸道勸進將簒帝位承業以為晉王三代有功於國先王怒賊臣簒逆匡復舊邦賊旣未平不宜輕受推戴方疾作肩輿之鄴宫見上力諫大指皆如實錄薛史唐餘錄皆與莊宗列傳同五代闕文承業謂莊宗吾王世奉唐家最為忠孝自貞觀以來王室有難未嘗不從所以老奴三十餘年為吾王捃拾財賦召補車馬者誓滅逆賊朱温復本朝宗社耳今河朔甫定朱氏尚存吾王遽即大位可乎莊宗曰奈諸將意何承業知不可諫止乃慟哭曰諸侯血戰本為李家今吾王自取之悞老奴矣即歸太原不食而死秦再思洛中紀異承業諫帝曰大王何不待誅克梁孽更平吳蜀俾天下一家且先求唐氏子孫立之復更以天下讓有功者何人輒敢當之讓一月即一月牢讓一年即一年牢設使高祖再生太原復出又胡為哉今大王一旦自立頓失從前仗義征伐之㫖人情怠矣老夫是閹官不愛大王官職富貴直以受先王付囑之重欲為先王立萬年之基爾莊宗不能從乃謝病歸太原而卒歐陽史兼採闕文紀異之意按實錄等書承業止惜費多及儀物不備太似淺陋如闕文所言承業事莊宗父子數十年唐室近親已盡豈不知其欲自取之意乎褒美承業亦恐太過又按傳真以天祐十八年獻寶承業以十九年十一月卒云即歸太原不食而死亦非實也如紀異之語承業為莊宗忠謀近得其實今從之, SBCK: ''}
