  - {type: variant, offset: 490, length: 252, content: 漢書曰立嗣必子所從來逺矣公羊傳曰宋宣公謂繆公曰以吾愛與夷則不若愛汝以為社稷宗廟主則與夷不若汝盍終為君矣宣公死繆公立逐其二子莊公馮與左師勃而致國乎與夷故君子大居正宋之禍宣公為之也吳子謁餘祭夷昧與季子同母季子弱而才兄弟皆愛之同欲立之以為君謁曰今若退而與季子國季子猶不受也請無與子而與弟弟兄迭為君而致國乎季子夷昧死則國宜之季子季子使而亡焉僚者長庶也即之季子使反而君之闔閭曰先君所以不與子國而與弟者凡為季子故也將從先君之命歟則國宜之季子如不從先君之命則我宜立者也僚惡得為君乎於是使專諸刺僚張守節曰祭側界翻昧莫葛翻, SBCK: ''}
