  - {type: variant, offset: 0, length: 264, content: 欽定四庫全書資治通鑑卷九十三宋司馬光撰胡三省音註晉紀十五起閼逄涒灘盡强圉大淵獻凡四年肅宗明皇帝下太寜二年春正月王敦誣周嵩周筵與李脫謀為不軌收嵩筵於軍中殺之遣參軍賀鸞就沈充於吳盡殺周札諸兄子進兵襲㑹稽㑹工外翻札拒戰而死後趙將兵都尉石瞻冦下邳彭城取東莞東海東莞縣漢屬琅邪郡莞音官武帝泰始元年分琅邪立東莞郡將即亮翻劉遐退保泗口水經註泗水自淮陽城東流逕角城北而東南流注于淮謂之泗口杜佑曰泗口在今臨淮郡宿遷縣界司州刺史石生擊趙河南太守尹平於新安斬之新安縣漢屬𢎞農郡晉屬河南郡守式又翻下同掠五千餘戸而歸自是二趙搆隙日相攻掠河東𢎞農之間民不聊, SBCK: ''}
