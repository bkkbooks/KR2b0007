  - {type: variant, offset: 0, length: 264, content: 欽定四庫全書資治通鑑卷十五宋司馬光撰胡三省音註漢紀七起𤣥黓涒灘盡柔兆閹茂凡十五年太宗孝文皇帝下前十一年冬十一月上行幸代春正月自代還夏六月梁懐王揖薨揖受封事見十三卷二年無子賈誼復上疏曰復扶又翻陛下即不定制如今之埶不過一傳再傳服䖍曰一二傳世也諸侯猶且人恣而不制言人人自恣而不可制也豪植而大强言其矜豪自植立太過於强也漢法不得行矣陛下所以為藩扞及皇太子之所恃者唯淮陽代二國耳淮陽王武代王參帝之子而太子之弟也故云所恃唯此二國代北邊匈奴與强敵為鄰能自完則足矣而淮陽之比大諸侯廑如黒子之著面廑與僅同師古曰黒子今所謂黶子也著則畧翻下北著同適足以, SBCK: ''}
