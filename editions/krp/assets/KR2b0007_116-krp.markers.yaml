  - {type: variant, offset: 0, length: 254, content: 欽定四庫全書資治通鑑卷一百十六宋司馬光撰胡三省音注晉紀三十八起重光大淵獻盡閼逢攝提格凡四年安皇帝辛義熈七年春正月己未劉裕還建康秦廣平公弼有寵於秦王興為雍州刺史鎮安定姚秦分嶺北五郡置雍州刺史鎮安定雍於用翻姜紀諂附於弼勸弼結興左右以求入朝興徴弼為尚書令侍中大將軍弼遂傾身結納朝士朝直遙翻收采名勢以傾東宫國人惡之惡烏路翻㑹興以西北多叛亂欲命重將鎮撫之將即亮翻下待將同隴東太守郭播請使弼出鎮魏收地形志有隴東郡領涇陽祖厲撫夷三縣不載立郡之始蓋苻姚所置也西魏置隴東於汧源唐之隴州是也興不從以太常索稜為太尉領隴西内史使招撫, SBCK: ''}
