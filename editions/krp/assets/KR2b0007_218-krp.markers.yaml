  - {type: variant, offset: 14093, length: 337, content: 媯州漢潘縣地檀州漢白檀縣地續書云白檀縣即古北平六考異曰張中丞傳自三月二日潮至雍丘城下攻守十餘日潮大敗而走則於時已五月初矣又云未幾潮又帥衆来攻謂巡曰木朝危蹙兵不出闗則是潼闗未破也又巡答潮書主上縁哥舒被衂幸于西蜀孝義皇帝收河隴之馬取太原之甲蕃漢雲集不減四十萬衆前月二十七日已到土門蜀漢之兵吳楚驍勇循江而下永王申王部統已到申息之南門竊料胡虜遊䰟終不臘矣則是七月十五日丁卯以後也其曰前月二十七日兵到土門葢圍城中傳聞之誤也又云相守四十餘日潮收兵入陳留不敢出其下乃云五月魯炅敗于葉六月哥舒翰敗于潼闗上皇幸蜀皇帝北廵靈武六月九日賊將瞿伯玉據圉城十二日賊屯白沙渦十四日夜巡襲破之七月十二日潮伯玉至雍丘又破之其日月前後差舛不可考葢李翰亦得于傳聞不能精審今但置闗破以前事於五月闗破以後事于七月耳, SBCK: ''}
