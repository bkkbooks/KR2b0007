  - {type: variant, offset: 15170, length: 854, content: 月考異曰肅宗實錄八壬子子儀光弼皆於常山郡嘉山大破賊子儀等俱奉詔領士馬五萬至自河北以子儀為某官光弼為某官汾陽家傳六月八日破史思明於嘉山之下公謂光弼曰賊散矣其餘幾何可長驅而南以定天下其月發恒陽至常山中使邢延恩至奉詔取河北路席卷而南㑹哥舒翰敗績𤣥宗幸蜀肅宗如朔方公聞之獨總精兵五萬奔肅宗行在𤣥宗有誥以肅宗嗣皇帝位肅宗奉誥歔欷哀不自勝公諫云云跪上天子璽以七月十三日即皇帝位二十七日制可武部尚書平章事幸蜀記六月十一日𤣥宗追郭子儀赴京李光弼守太原河洛春秋六月二十五日大破賊于嘉山二十六日覆陳二十七日有詔至恒陽云潼闗失守駕幸劒南儲君又往靈武由是拔軍入井陘口邠志六月八日敗史思明于嘉山㑹潼闗失守二公班師唐歴七月二十八日子儀光弼並加平章事又詔子儀收軍赴朔方光弼赴太原河洛春秋又云光弼至太原殺王承恩固守晉陽舊紀與實錄同子儀傳七月肅宗即位以賊據兩京方謀收復詔子儀班師八月子儀與光弼帥步騎五萬至自河北光弼傳肅宗理兵於靈武遣中使劉智達追光弼子儀赴行在又云以景城河間之卒五千赴太原𤣥宗實錄六月壬午光弼子儀破史思明於嘉山舊紀六月癸未朔庚寅哥舒翰敗於靈寶其日光弼破史思明于嘉山子儀光弼傅皆云六月無日諸書言李郭事不同如此按嵗朔厯六月癸未朔與舊紀同𤣥宗實錄云壬午誤也肅宗實錄八月壬午朔日也子儀光弼皆於嘉山大破賊領士馬至自河北以為某官某官葢壬午乃拜官日因言已前事耳汾陽家傳邠志皆云六月八日破思明與舊紀同家傳云勸肅宗即位上璽則恐不然哥舒翰以六月八日敗亦須旬日方傳至河北肅宗七月十三日即位若六月二十七日班師七月十三日豈能便逹靈武也河洛春秋二十五日破賊與諸書皆不合恐太後也今據舊𤣥宗紀汾陽家傳邠志唐厯皆云六月八日破史思明宜可從幸蜀記十一日𤣥宗召子儀光弼事或如此但二傳皆云肅宗召之恐是二人在河北聞潼闗不守已收軍赴難在道遇肅宗中使遂趨靈武今從舊傳唐厯拜相在七月二十八日汾陽家傳二十七日肅宗實錄八月一日三書皆不相逺子儀傳云八月雖無日與實錄亦略相應今従實錄據舊傳光弼亦曾到靈武疑朔方兵盡從肅宗故光弼但領河北兵赴太原耳河洛春秋月日尤疎所云殺王承恩固守晉陽必誤也囘, SBCK: 回}
