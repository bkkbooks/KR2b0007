  - {type: variant, offset: 17771, length: 508, content: 弼考異曰鄴侯家傳曰以李光為元帥左廂兵馬使出井陘以攻常山圖范陽郭子儀為右廂兵馬使帥衆南取馮翊河東按汾陽家傳時郭子儀方北討同羅未向河東也鄴侯家傳又曰上召光弼子儀議征討計二人有遷延之言上大怒作色叱之二人皆仆地不畢詞而罷上告公曰二將自偏禆一年遇國家有難朕又即位於此遂至三公將相看已有驕色啇議征討欲遷延適來叱之皆倒方圖克復而將已驕朕深憂之朕今委先生戎事府中議事因示以威令使其知懼對曰陛下必欲使畏臣二人未見廣平伏望令王亦暫至府二人至時寒臣與飲酒二人必請謁王臣因為酒令約不起王至但談笑共臣同慰安酒散乃諭其脩謁於元帥則二人見元帥以帝子之尊俯從臣酒令可以知陛下方寵任臣軍中之令必行它時或失律能死生之也上稱善又奏曰伏望言於廣平知是聖意欲李郭之畏臣非臣敢恃恩然也上曰廣平於卿豈有形迹對曰帝子國儲以陛下故親臣臣何人敢不懼明日將曉王亦至及李郭至具軍容脩敬乃坐飲二人因言未見元帥乃使報王王將至執盞為令並不得起及王至先公曰適有令許二相公不起王曰寡人不敢遽就座飲李郭失色談笑皆歡先公曰二人起謝廣平曰先公能為二相公如此復何憂寡人亦盡力今者同心成宗社大計以副聖意既出李謂郭曰適来飲令非行軍意皆上㫖也欲令吾徒禀令耳按肅宗温仁二公沈勇必無靣叱仆地之事今不取, SBCK: ''}
