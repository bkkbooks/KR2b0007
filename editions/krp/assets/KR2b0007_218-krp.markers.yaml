  - {type: variant, offset: 991, length: 538, content: 將即亮翻下同降戸江翻下同山考異曰河洛春秋云五月蔡希德從東都見禄山禄又與馬步二萬人至邢州取堯山招慶射趙州東界効曲鼔鹿城閒渡洿池水入無極至定州牛介從幽州占歸檀幽易兼大同紇蠟共萬餘人帖思明思明軍既壯共五萬餘人其中精騎萬人悉是同羅曳落河精於馳突光弼以十五萬衆頓軍恒陽樵採往來人有難色召有䇿者試之時趙州司戸叅軍先人亡父包處遂上書與光弼曰思明用軍惟將勁悍觀其舉措實謂無謀昔秦趙爭山先居者勝豈不為勞逸勢倍高下相懸今宜重出軍人有膂力者五萬被甲兩重陌刀各二東有高山甚大先令五千甲士於山上設伏後出二千人山東取糧賊見必追之則奔山上伏兵馬與一百靣鼔應山上避賊百姓壯者亦與器械令隨大軍老弱者令居險固守遥為聲援賊必圍山攻之城内出五萬人擇將二人統之各領二萬一將於南靣一將於城北門出賊營悉在山東其軍夜出長去賊三十里行廣張左右翼以天曉合圍其軍每二十五為隊每隊置旗兩口鼕鼕鼓子一具圍落纔合則動鼔子賊必不測人之多少然于城中出軍一萬人布掌㡳陳山上亦擊鼔而下齊攻之必克勝光弼尤然此計乃出朔方計㑹出人取糧賊果然來襲即奔山上至六月二十五日依前計大破賊於嘉山下斬首數萬餘級生擒數千思明落馬步遁至暮拄折槍歸營希徳中搶索押衙劉旻斬斷而走生擒得旻至二十六日覆陣二十七日有詔至恒陽云潼闗失守駕幸劒南包諝專欲歸功其父而它書皆無之今不取, SBCK: ''}
