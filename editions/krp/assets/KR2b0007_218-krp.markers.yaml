  - {type: variant, offset: 11952, length: 313, content: 隆州巴西郡先天二年避上皇諱更名閬州天寶元年更名閬中郡更綿州金山郡曰已西郡聞考異曰肅宗實録作辛未今従𤣥宗實録次柳氏舊上始入斜谷天尚早煙霧甚昧知頓使給事中韋倜於墅中得新熟酒一壺跪獻于馬首者數四上不為之舉倜懼乃注于他器自引滿于前上曰卿以我為疑也始吾御宇之初嘗大醉損一人吾悼之因以為戒迨今四十年矣未嘗甘酒味指力士近臣曰此皆知之非紿卿也從者聞之無不感悦幸蜀記上皇在巴西郡宰臣請高力士奏蜀中氣厚温瘴宜數進酒上皇令高力士宣㫖曰朕本嗜酒斷之已乆終不再飲深愧卿等意也力士因説上皇開元四年因醉怒殺一人明日都不記得猶召之左右具奏上愴然不言乃賜御庫絹五百匹用給喪事更令力士就宅宣㫖致祭從兹斷酒雖下藥亦不輒飲按𤣥宗荒于聲色幾喪天下斷酒小善夫何足言今不取, SBCK: ''}
