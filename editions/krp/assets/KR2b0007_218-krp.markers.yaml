  - {type: variant, offset: 2712, length: 531, content: 逗音豆使疏吏翻趣讀曰促西考異曰幸蜀記曰賊將崔乾祐於陜郡濳鋒蓄鋭卧鼔偃旗而偵者奏云賊全無備上然之又曰𤣥宗乆處太平不練軍事既被國忠眩惑中使相繼督責於公不得已撫膺慟哭久之乃引師出闗國忠又令杜乾運領所募兵於馮翊境上濳備哥舒公公曰令軍出闗勢十全矣更置乾運於側以為疑軍人心憂疑即不俟見賊吾軍潰矣必當併之以除内憂遂令衙前總管叱萬進追軍誡之曰若不受追即便斬頭來乾運果不肯赴進詐詞如欲叛哥舒竊請見乾運遂喜遽見之與語進忽抽佩刀曰奉處分取公頭乾運驚懼其左右悉新招募者悉投仗散走進遂斬乾運攜首至於軍門衆皆攝氣乃統其軍赴闗按翰若擅殺乾運而奪其軍則是己反也朝廷安能趣之出闗乎葢奏乞以其軍𨽻潼闗朝廷已許之翰召乾運受處分或有所違拒因託軍法以斬之耳凌準邠志云郭子儀李光弼將進軍聞朝廷議出潼闗圖復陜洛二公議曰哥舒公老疾昏耄賊素知請軍烏合不足以戰今祿山悉鋭南馳宛洛賊之餘衆盡委思明我且破之便覆其巢質叛徒之族取禄山之首其勢必矣若潼闗出師有戰必敗闗城不守京室有變天下之亂何可平之乃陳利害以聞且請固闗無出唐歷會偵人自陜至云崔乾祐所將衆不滿四千不足圖也上大悦舊翰傳翰既斬乾運心不自安又素有風疾至是頗甚軍中之務不復躬親委政于行軍司馬田良丘良丘復不敢專斷教令不一頗無部伍其將王思禮李承光又爭長不叶人無鬭志今兼采之, SBCK: ''}
