  - {type: variant, offset: 1986, length: 278, content: 説式芮翻云考異曰𤣥宗實録或勸翰留兵二萬守闗悉以精鋭回誅楊國忠此漢挫七國之計也公以為何如翰心許之未𤼵有客泄其謀于國忠國忠大懼按翰若回兵誅國忠則正與禄山無異思禮勸翰抗表言國忠罪猶不敢况敢舉兵乎事必不然且翰雖心計它人安得知之正由翰按兵不進故國忠及其黨疑懼恐翰回兵誅之其實翰無此心也若果欲誅國忠則安肯慟哭出闗乎幸蜀記云翰使王思禮至陜郡見賊偽御史中丞無敵將軍平西大使崔乾祐令傳檄與禄山數其干紀亂常背天逆理且曰若靣縳而來束身歸死赦爾九族罪爾一身如更屈彊王師遲疑未決大軍一鼓玉石俱焚爾審思之悔無及矣按翰與乾祐方對壘相攻思禮軍中大將豈可使齎罵禄山之檄詣乾祐乎必無此理今不取, SBCK: ''}
