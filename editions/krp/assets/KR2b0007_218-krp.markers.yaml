  - {type: variant, offset: 12696, length: 313, content: 異考曰肅宗實錄忽聞同羅突厥背祿山走投朔方與六州羣胡共圖河朔諸將皆恐上曰因之招諭當益我軍威上使宣慰果降者過半舊崔光遠傳云同羅背祿山以廐馬二千出至滻水孫孝哲安神威從而召之不得神威憂死陳翃汾陽王家傳云安禄山多譎詐更謀河曲熟蕃以為己屬使蕃將阿史那從禮領同羅突厥五千騎偽稱叛乃投朔方出塞門説九姓府六胡州悉已來矣甲兵五萬部落五十萬蟻集於經略軍北按同羅叛賊則當西出豈得復至滻水此舊傳誤也若禄山使從禮偽叛則孝哲何故召之神威何為怖死又必須先送降欵于肅宗如此則諸將當喜而不恐賊之陰計豈徒取河曲熟蕃也葢同羅等乆客思歸故叛祿山欲乗世亂結諸胡據邉地耳肅宗錄所謂共圖河朔者欲據河朔西方兩道猶言河隴也肅宗從而招之必有降者若又大半則似太多今參取諸書可信者存之, SBCK: ''}
