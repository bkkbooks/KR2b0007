  - {type: variant, offset: 0, length: 429, content: 欽定四庫全書資治通鑑卷八十二宋司馬光撰胡三省音註晉紀四起屠維作噩盡著雍敦牂凡十年世祖武皇帝下太康十年夏四月太廟成乙巳祫祭祫大合祭也公羊傳曰大祫者何合祭也其合祭奈何毁廟之主陳于太祖未毁廟之主皆升合食於太祖祫胡夾翻大赦慕容廆遣使請降降户江翻五月詔拜廆鮮卑都督廆謁見何龕以士大夫禮巾衣到門魏晉間士大夫謁見尊貴以巾褠為禮褠單衣也龕口含翻龕嚴兵以見之廆乃改服戎衣而入人問其故廆曰主人不以禮待客客何為哉龕聞之甚慙深敬異之受降如受敵居邉之帥嚴兵以見四夷之客未為過也何必以為慙乎時鮮卑宇文氏段氏方彊段氏東部鮮卑也杜佑曰宇文莫槐出於遼東塞外代為鮮卑東部大人徒河叚疾六眷出遼西因亂被賣為漁陽烏桓大人厙傉家奴厙傉以其健使將人衆詣遼西逐食遂招誘亡叛以至彊盛余按晉書王浚𫝊段疾六眷務勿塵之世子段氏自務勿塵以來强盛久矣疾六眷因亂被掠容或有之務勿塵既能為部落之帥恐不待其子招誘而後能彊盛也數侵掠廆廆卑辭厚幣以事之段國單于階以女妻廆生皝仁昭慕容段氏遂為婚姻之國數所角翻單音蟬妻七細翻廆以遼東, SBCK: ''}
