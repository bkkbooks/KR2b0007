  - {type: variant, offset: 8342, length: 216, content: 考異曰漢書武紀云元光元年五月詔策賢良於是董仲舒公孫𢎞等出焉按𢎞傳元光五年復徴賢良文學甾川國推上𢎞其策文頗與武紀元年策文相類又云一嵗中至左内史百官表元光五年𢎞為左内史然則𢎞之冄舉賢良不在元光元年明矣荀紀著于此年徵吏民明當世之務下葛洪西京雜記亦云𢎞以元光五年為國士所推上為賢良若此續食之詔在八月則𢎞不容於今年已為左内史蓋此詔在今年不知何月故班氏繋之於年末耳其策文相類蓋出偶然或者此策乃𢎞先舉賢良時所對班氏誤以為此年之策疑未能明今從漢紀𢎞, SBCK: 􅀪}
