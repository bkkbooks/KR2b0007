  - {type: variant, offset: 0, length: 321, content: 欽定四庫全書資治通鑑卷十八宋司馬光撰胡三省音註漢紀十起著雍涒灘盡柔兆執徐凡九年世宗孝武皇帝上之下元光二年冬十月上行幸雍祠五畤雍於用翻畤音止李少君以祠竈却老方見上祠竈者祭竈以致鬼物化丹砂以為黄金以為飲食器可以延年方士之言云爾少詩照翻上尊之少君者故深澤侯舍人髙祖功臣有深澤侯趙将夕景帝三年孫修嗣侯七年有罪耐為司寇少君當是為修舍人班志涿郡有南深澤縣匿其年及其生長謂其生時及長時所居止處也長知兩翻其游以方徧諸侯無妻子人聞其能使物及不死如淳曰物謂鬼物也更饋遺之更工衡翻遺于季翻常餘金錢衣食人皆以為不治生業而饒給又不知其何所人愈信争事之治直之翻少君善為巧發奇中如淳曰時時發言有所中中竹仲翻嘗從武安侯飲田蚡封武安侯坐中有九十餘老人坐徂卧翻下同少君乃言與其大, SBCK: ''}
