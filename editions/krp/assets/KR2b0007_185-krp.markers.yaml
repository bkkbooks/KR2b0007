  - {type: variant, offset: 779, length: 531, content: 隋考異曰書北史李密傳曰世充復移營洛北南對鞏縣其後遂於洛水造浮橋悉衆以擊密密出擊之官軍稍却自相䧟溺者數萬人世充僅而獲免不敢還東都遂趣河陽其夜雨雪尺餘衆隨之者死亡殆盡王世充傳曰充敗績赴水溺死者萬餘人時天寒大雪兵士既度水衣皆霑濕在道凍死者又數萬人蒲山公傳曰世充移營就洛水之北與密隔洛水以相望密乃築長城掘深塹周迴七十里以自固十五日世充與密戰於石窟寺東密軍退敗世充度洛水以乘之逼倉城為營塹密縱兵疾戰世充兵馬棄仗奔亡沉溺死者不可勝數密又令露布上府曰世充以今月十一日平旦屯兵洛北偷入月城其月十五日世充及王辯才等又於倉城北偷渡水南敢逼城堞河洛記曰十六日充與密戰於石窟寺東又曰其夜遇風寒疾雨士卒凍死十不存一充脱身宵遁直向河陽餘如蒲山公傳略記曰辛酉王世充移兵洛北仍令諸軍臨岸布兵軍别造浮橋橋先成者輙渡既前後不一而李密伏發我師敗績爭橋赴水溺死者十五六雜記曰十二月越王遣太常少卿韋霽等率留守兵三萬並受世充節度又曰王辯縱等敗衆軍亦潰爭橋赴水死者大半王辯縱等皆沒唯世充敗免與數百騎奔大通城敗兵得還者於道遭大雨凍死者六七千人世充停留大通十餘日懼罪不還十四年正月越王遣世充兄世惲往大通慰諭赦世充喪師之罪按李道𤣥勸進於李密表云子時律始太簇未宜霡霂而澍雨忽降凍殕將盡今參取衆書日從蒲山公傳両從河洛記, SBCK: ''}
