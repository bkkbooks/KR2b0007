  - {type: variant, offset: 3441, length: 611, content: 公考異曰蒲山傳曰趙行樞楊士覽以司馬徳戡謀告化及化及兄弟聞之大喜因引徳戡等相見士及説徳戡等曰足下等因百姓之心謀非常之事直欲走逃故非長䇿徳戡曰為之奈何士及曰官家雖言無道臣下尚畏服之聞公叛亡必急相追捕竇賢之事殷鍳在近不如嚴勒士馬攻其宮闕因人之欲稱廢昏凶事必克成然後詳立明哲天下可安吾徒無患矣勲庸一集公等坐延榮禄縱事不成威聲大振足得官家膽懾不敢輕相追討遲疑之間自延數日比其議定公等行亦已逺如此則去住之計俱保萬全不亦可乎徳戡等大悦曰明哲之望豈惟楊家衆心實在許公故是人天協契士及佯驚曰此非意所及但與公等思救命耳革命記曰帝知歴數將窮意欲南渡江水咸言不可帝知朝士不欲渡乃將毒藥醖酒二十石擬三月十六日為宴㑹而酖殺百官南陽公主恐其夫死乃陰告之而事泄為此始謀害帝以免禍並是兇逆之旅妄搆此詞于時上下離心人懷異志帝深猜忌情不與人醖若不虛藥須分付有處遣何人併醖二十石藥酒必其酒有酖毒一石堪殺千人審欲擬殺羣寮謀之者必有三五衆謀自然早泄豈得獨在南陽只是䖍通恥有殺害之謀推過惡於人主耳隋書化及傳云化及弑逆士及在公主第弗之知也智及遣家僮莊桃樹就第殺之桃樹不忍執詣智及乆之乃見釋南陽公主傳責士及云但謀逆之日察君不預知耳舊唐書士及傳云化及謀逆以其主壻深忌之而不告按士及仕唐為宰相隋書亦唐初修或者史官為士及隱惡賈杜二書之言亦似可信但杜儒童自知醖藥酒為虛則南陽陰告之事亦非其實如賈潤甫之說則弑君之謀皆出士及而智及為良人矣今且從隋書而刪去莊桃樹事及南陽之語庶幾疑以傳疑, SBCK: ''}
