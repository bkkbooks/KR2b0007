  - {type: variant, offset: 803, length: 261, content: 隋志三師不主事不置府僚蓋與天子坐而論道者也三公參議國之大事依後齊置府僚無其人則闕祭祀則太尉亞獻司徒奉俎司空行掃除其位多曠皆攝行事尋省府及僚佐置公則坐於尚書都省朝之衆務總歸於臺閣尚書省事無不總置令左右僕射各一人總吏部禮部兵部都官度支工部六曹事屬官左右丞各一人都事八人分司管轄六曹尚書分統三十六侍郎各司曹務直宿禁省如漢之制門下省置納言給事黄門侍郎散騎常侍侍郎通直員外諫議大夫等官内史省置監令侍郎舍人等官祕書省置監丞郎等官領著作太史二曹内史省即中書省避武元諱改曰内史門下内史二省主出納朝直代言猶有職事祕書省較優閑内侍省則皆宦官也, SBCK: ''}
