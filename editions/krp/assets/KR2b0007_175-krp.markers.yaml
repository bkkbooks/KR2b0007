  - {type: variant, offset: 0, length: 228, content: 欽定四庫全書資治通鑑卷一百七十五宋司馬光撰胡三省音注陳紀九起重光赤奮若盡昭陽單閼凡三年高宗宣皇帝下之下太建十三年春正月壬午以晉安王伯恭為尚書左僕射吏部尚書袁憲為右僕射憲樞之弟也周改元大定二月甲寅隋王始受相國百揆九錫自初命至是五十一日乃受建臺置官置百官也丙辰詔進王妃獨孤氏為王后世子勇為太子開府儀同大將軍庾季才勸隋王宜以今月甲子應天受命庾季才持正於宇文䕶擅權之時而勸進於楊氏革命之日巫史之學自信其術耳非胸中眞有所見也太傅李穆開府儀同大將軍盧賁亦勸之於是周主下, SBCK: ''}
