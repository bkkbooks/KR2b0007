  - {type: variant, offset: 0, length: 304, content: 欽定四庫全書資治通鑑卷五十六宋司馬光撰胡三省音註漢紀四十八起彊圉協洽盡重光大淵獻凡五年孝桓皇帝下永康元年是年六月始改元春正月東羌先零圍祋祤掠雲陽二縣皆屬左馮翊宋白曰耀州華原同官縣本漢祋祤縣地雲陽故城在今縣西北六十里零音憐祋音丁活翻又音丁外翻祤音詡煎當諸種復反種章勇翻復扶又翻下同段熲擊之於鸞鳥熲髙迥翻鸞音雚鳥讀曰雀大破之西羌遂定夫餘王夫台冦𤣥菟夫音扶莬同都翻𤣥菟太守公孫域擊破之守式又翻夏四月先零羌冦三輔攻没兩營兩營京兆虎牙營扶風雍營零音憐殺千餘人五月壬子晦日有食之陳蕃既免朝臣震栗莫敢復為黨人言者復扶又翻朝直遥翻下同為于偽翻賈彪曰吾不西行大禍不解賈彪潁川定陵人自潁川至洛陽為西行乃入雒陽説城門校尉竇武尚書魏, SBCK: ''}
