  - {type: variant, offset: 18874, length: 355, content: 似先知宦官也舊書帝紀作部將嗣光審斬順節頭考異曰唐補紀景福二年四月十七日夜見掃星長十丈餘承㫖陳匡用奏當有亂臣將入宫内昭宗乳母名曰芥子自即位加夫人衆呼白婆左神䇿軍天威都軍使胡𢎞立先是軍中馬騎官巧佞取容朝廷達官多重之楊復恭為軍主與改姓名為楊守節主上每出畋逰經天威軍内其楊守節以憸巧趨附乞與主上為兒既而允從頗生驕縱於是引聖人入堂室令妻妾對於庭簷或入内中經旬不出致主有撫楹之咎為臣懷通室之非承醉奏云王印金箱兒未曽識望阿郎畧將宣示以慰平生其白婆在側曰此寳非凡人得見不用發言於是奏曰除此老嫗方應太平從此白婆得罪不見蹤由兩神䇿軍以其事漸乖必為大禍與諸王商議須急去除於重陽節向樞密院中排宴喚入謝恩却出宣化門供奉官似先知袖劒揮之諸王相次剚刃以為葅醢按胡𢎞立即順節也新舊紀及諸書景福二年皆無此事葢程匡柔傳聞之誤今日從實録事則參取諸書, SBCK: ''}
