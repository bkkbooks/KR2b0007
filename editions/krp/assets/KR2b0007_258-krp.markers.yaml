  - {type: variant, offset: 9595, length: 523, content: 從考異曰唐太祖紀年錄六月朱崇節葛周據潞州李重𦙍鄧季筠張全義將兵七萬攻澤州李存孝將三千騎赴援初汴軍攻城門呼李罕之云云李存孝憤其言引鐵騎五百追擊入季筠營門生獲其都將十數是夜汴將李讜收軍而遁存孝罕之追擊至馬牢山斬首萬級追襲掩擊至於懷州而還存孝復引軍攻潞州九月二日葛從周帥衆棄城而遁唐末見聞録閏九月昭義軍前狀申昭義軍人拔滅逃遁收下城池擒獲到餘黨五十人巾縛送上至二十日行營都指揮使李存孝迴戈歸府薛居正五代史梁太祖紀九月壬寅帝至河陽遣李讜引軍趨澤潞行至馬牢川為晉人所敗帝又遣朱友裕張全義率精兵至澤州北以為應援既而崇節從周棄潞來歸戊申帝廷責諸將敗軍之罪斬李重𦙍以徇遂班師焉實録九月甲申朔康君立急攻潞州朱全忠駐河陽遣李讜引軍趨澤潞至馬牢山川與并師大戰不利鄧季筠被執復遣朱友裕張全義至澤州北應援葛從周朱崇節率衆棄潞州歸按六月李存孝若已破李讜追至懷州懷州去河陽止一程豈得九月方到河陽讜之敗必在九月戊申前一兩日也葢紀年録因從周據潞州事終言之九月甲申朔十九日壬寅二十五日戊申若全忠至河陽始遣讜等趣澤潞既敗而從周等棄潞來歸七日之間豈容許事葢薛史因讜敗追本前事耳若九月二日從周已棄潞州何得十九日後攻澤州者猶云葛司空入潞府乎葢實録承紀年録而誤也今全忠徃來月曰從薛史事則兼采諸書, SBCK: ''}
