  - {type: variant, offset: 1526, length: 538, content: 安考異曰實録克用以弟克修守潞遣澤州刺史金俊討方立方立因結諸鎮救援其將奚忠信攻遼州克用復遣李罕之等急攻方立將馬溉出戰為罕之所擒溉謂曰欲圖邢州當先取磁州及并師圍磁州方立與奚忠信帥兵大戰軍敗陷磁州而方立單騎還邢州忠信死焉方立愧之乃自圖死三軍立其弟遷求援汴州朱全忠遣王䖍裕赴之鎮州王鎔遺克用書而退唐年補録方立有謀將石元佐為金俊所獲金俊問之元佐請攻磁州破奚忠信金俊乃殺之方立果與忠信引兵入磁金俊與之戰大敗忠信死方立單騎入邢州愧見父老遂自裁薛居正五代史方立傳六月李存孝下洺磁兩郡方立遣馬溉袁奉韜盡率其衆逆戰於琉璃陂存孝擊之盡殪生獲馬溉奉韜初方立性苛急恩不逮下攻圍累旬夜自巡城慰諭守陴者皆倨方立知其不可乃飲酖而卒其從弟洺州刺史遷素得士心衆乃推為留後求援於汴時梁祖方攻時溥援兵不出按李罕之攻下磁州進攻洺州乃擒馬溉實録云溉為罕之謀取磁州葢誤以石元佐為溉也又奚忠信去年已為李克脩所擒乃云與方立率兵大戰亦誤也舊紀六月邢洺節度使孟方立卒三軍推其弟洺州刺史遷為留後李克用出軍攻之新紀六月李克用㓂邢州昭義軍節度使孟方立卒其弟遷自稱留後按唐年補録載王鎔奏得邢洺大將等狀以孟方立奄辭昭代二軍百姓同以親弟攝洺州刺史遷權知兵馬留後事及新舊紀實録薛史方立傳皆云立其弟遷惟太祖紀年録及薛史武皇紀云立其姪遷恐誤今從諸書, SBCK: ''}
