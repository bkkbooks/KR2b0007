  - {type: variant, offset: 253, length: 278, content: 璠孚袁翻為考異曰實録申叢裴涉欲復立宗權帥汴將李璠知之斬叢涉以宗權送汴州薛居正五代史初申叢縳宗權折足而囚之雖納欵於太祖欲自獻於長安以邀旄鉞及姦謀不就乃欲復奉宗權以接取其柄為其將郭璠所殺縶宗權送於太祖即以璠為留後太祖遣都統判官韋震奏事且疏時溥之罪願委討伐仍請降滄兖二帥之命按全忠若自求兼領滄兖二鎮則明年朝廷命兼領滑州全忠猶辭不受今豈敢遽求滄兖邪若為滄兖二帥求之則兖帥朱瑾乃其仇讐也當時不知全忠欲以何人為滄帥諸書皆無其名薛史實録皆云申叢欲復立宗權按叢折宗權足而囚之豈有復奉為帥之理葢郭璠欲奪其功誣之云爾新舊紀五代紀傳皆云郭璠殺申叢而實錄云李璠誤也李璠乃檻送宗權者, SBCK: ''}
