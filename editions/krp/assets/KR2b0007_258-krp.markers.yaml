  - {type: variant, offset: 10249, length: 265, content: 考異曰太祖紀年錄是月幽帥李匡威㑹赫連鐸引吐蕃黠戛斯之衆十萬㓂我北鄙攻遮虜軍太祖御親軍出塞營於渾河川之田村李存孝引前鋒與賊戰於樂安鎮賊軍大敗遁走舊紀九月幽州雲州蕃漢兵三萬攻雁門太原府將李存信薛阿檀擊敗之實録閏月甲寅朔幽州李匡威下蔚州克用援兵至匡威大敗赫連鐸引吐蕃黠戛斯之衆攻遮虜軍克用營渾河川戰於樂安鎮破之鐸乃退軍此葢約奏到日唐末見聞録十一月十五日發徃向北打鹿有使報稱幽州李匡威收却蔚州十六日至十八日旋發諸州兵士至軍前二十九日大捷有榜曉告殺燕軍三萬餘人十九日知客押衙苖仲周賫榜到殺得退渾一千帳二十九日下復云十九日亦誤今但繫此月不書日, SBCK: ''}
