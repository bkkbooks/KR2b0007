  - {type: variant, offset: 11424, length: 1053, content: 隰考異曰實錄十一月王師入隂地闗至汾李克用遣將薛阿檀李承嗣拒之李存信以兵五千圍趙城韓建以華州兵戰存信設伏擊破之邠鳳之師未戰而走禁軍自潰由是大敗存信直壓晉州西門引軍攻絳州十二月壬午朔晉州刺史張行恭棄城而遁韓建以諸軍保晉州李存信追擊戰敗退保絳州張濬以汴卒禁軍屯晉州存信攻之三日濬建拔晉絳遁還存信收二州舊紀克用遣李存信薛阿檀拒王師於隂地三戰三捷由是河西鄜夏邠岐之軍渡河西歸韓建以諸軍保平陽存信追之建軍又敗建退保絳州張濬在晉州存信攻之三日相與謀云云遂退舍五十里十二月壬午朔濬建拔晉絳遁去存信收晉絳大掠河中四郡張濬傳曰十月濬軍至隂地邠岐華三鎮之師營平陽李存孝擊之一戰而敗進攻晉州薛居正五代史武皇紀曰十月張濬之師入晉州逰軍至邠濕武皇遣薛鐵山李承嗣將騎三千出隂地闗營於洪洞遣李存孝將兵五千營於趙城華州韓建以壯士三百人冒犯存孝之營存孝追擊直壓晉州西門張濬之師出戰為存孝所敗自是閉壁不出存孝引軍攻絳州李存孝傳曰十月存孝引收潞之師圍張濬於平陽云云存孝引軍攻絳州十一月刺史張行恭棄城而去張濬韓建亦由含口而遁存孝收晉絳太祖紀年錄十月張濬之師入隂地闗犯汾隰令薛鐵山李承嗣將騎三千出隂地繼發李存孝將兵五千進擊營於趙城敗韓建直壓晉州西門自是閉壁不出存孝攻絳州十二月晉州刺史張行恭棄城遁建濬由含山路逃遁遂收晉絳初濬部禁軍至晉州邠鳳之師望風遁歸葢楊復恭隂沮之也唐末見聞録曰八月五日相公差晉州捉到天使閭大夫入京奏事兼貢表曰臣某乙言今月二十六日臣所部南界晉州長寜闗使張承暉等投臣當道齎到宰臣張濬牓一道内稱招討處置使兼錄到詔白云陛下削臣屬籍奪臣本官仍欲㑹兵討問云云唐補紀曰朱全忠自攻破徐州頻貢章表克用與朱玫同立襄王以為大逆其朱玫以下並已誅鋤克用時最為魁首據其罪狀請舉天兵臣率師闗東掎角相應朝廷遂以宰臣張濬為都統授崔𦙍為河中節度應援使大軍行到同州克用領蕃漢馬步稱三十萬入河北界其張濬使人探朱全忠兵馬並不來相應乃於昭義西與太原交戰不利而回朝廷知為全忠所賣便差使至克用所與賞給令回貶都統張濬於雲夢除崔𦙍於嶺外薛史李承嗣傳初大軍入隂地薛志勤與承嗣率騎三千抗之敗韓建之軍於䝉坑進收晉絳以功授忻州刺史時鳳翔軍營霍邑承嗣帥一軍收之岐人夜遁追擊至趙城合大軍攻平陽旬有三日而拔按李存信傳無攻晉絳事葢舊紀十月存孝已背太原故此戰皆云存信實録因之而誤据五代紀傳太祖紀年録當是存孝又隰州𨽻河中節度所云入隂地闗犯汾隰者葢謂汾水之旁下濕曰隰耳又紀年録實録以張行恭為晉州刺史亦誤也今從薛史晉州刺史若已走則濬建安能保城實録誤也今從李存孝傳唐補紀云崔𦙍為河中節度尤為疏繆自餘諸書參取之, SBCK: ''}
