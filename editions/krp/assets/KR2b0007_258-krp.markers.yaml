  - {type: variant, offset: 15693, length: 340, content: 為考異曰舊紀龍紀元年正月昭度東都留守實録大順二年三月乙亥復陳敬瑄官爵丙子以昭度為東都留守按昭度已除留守不領西川節度及招討使則便應釋兵東歸不應更留在彼縱使彊留諸軍亦安肻稟服王建亦何必更説之云相公宜早歸廟堂與天子籌之舊傳建脅說昭度奏請還都建以重兵守劒門急攻成都昭度還以檢校司空充東都留守新傳亦同葢今年三月既復敬瑄官爵但召昭度還朝王建不肻罷兵昭度為所牽率亦同執奏以為敬瑄不可赦既而為建所脅授兵東歸朝廷責其進退失據故左遷留守如新舊傳所云者是也今從之又昭度初圍成都楊守亮為招討副使顧彦朗為行軍司馬王建為都指揮使同在成都城下及昭度東歸時獨建在彼以兵授之不見二人者按三月乙亥詔書但云令彦朗各歸本鎮則是守亮先已歸也彦朗得此詔必亦歸獨昭度與建留在彼耳然建令東川將唐友通食駱保是彦朗身歸而留兵攻成都也, SBCK: ''}
