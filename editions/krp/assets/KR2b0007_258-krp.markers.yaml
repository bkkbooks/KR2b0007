  - {type: variant, offset: 7186, length: 439, content: 異考曰編遺録八月甲寅馮霸殺李克恭來降上請河陽帥朱崇節領兵入潞兼充留後戊辰李克用圍之上遣葛從周率驍勇夜銜枚斫營突入上黨以壯潞人之心薛居正五代史梁太祖紀亦同按克用未嘗自圍潞也克恭傳李元審戰傷收軍於潞五月十五日克恭視元審於孔目吏劉崇之第是日州縣將安居受引兵攻克恭克恭元審並遇害州民推居受為留後居受遣人召馮霸於沁水霸不受命居受懼將奔歸朝廷至長子為野人所殺傳首馮霸軍霸乃引衆據潞州自稱留後求援於汴武皇令康君立討之汴將葛從周求援霸唐末見聞錄曰五月十七日昭義狀申軍變殺節使當日㸃汾州五縣土團將士赴昭義二十三日昭義僕射家累入府新紀五月壬寅安居受殺李克恭按壬寅十七日乃報到太原日也今從太祖紀年錄薛史克恭傳舊紀五月丙午潞州軍亂殺李克恭監軍使薛績本函克恭首獻之於朝濬方起兵朝廷稱賀此葢克恭首到日也舊紀又曰七月全忠遣從周帥千騎入潞州唐太宗紀年録薛史唐紀五月葛從周入潞太早葢因克恭死終言之編遺錄薛史梁紀八月克恭死太晚葢因從周入潞推本之又從周入潞全忠始請孫揆付鎮當在揆被執前也今克恭死從紀年錄從周入潞從舊紀, SBCK: ''}
