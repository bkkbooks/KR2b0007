  - {type: variant, offset: 9607, length: 378, content: 朔考異曰實錄三月方節度使郭子儀大破賊于潼闗汾陽家傳云正月二十八日使宗子懷文濳募郭俊苟文俊入河東搆忠義與大軍約期以翻城公乃進軍出洛交分兵收馮翊二月十一日郭俊等伺大軍將至中夜舉火剋斬幽檀勁卒千人崔乾祐尋縋而免乾祐先置兵於城北廢府遂以三千兵攻城自領馬步五千伏於闗城中公使旴及僕固懷恩等先擊之賊大破遽焚橋我軍蹈之而滅乾祐棄闗城尋白涇嶺而逸遂收河東郡舊子儀傳曰二年三月子儀大破賊於潼闗崔乾祐退保蒲津時永樂尉趙復河東司戸韓旻司士徐炅宗子李藏鋒等䧟賊在蒲州四人密謀伺王師至則為内應及子儀攻蒲州趙復等斬賊守陴者開門納子儀乾祐與麾下數千人北走安邑百姓偽降乾祐兵入將半下懸門擊之乾祐未入遂得脱身東走子儀遂收陜郡永豐倉自是潼陜之間無復冦鈔唐厯云子儀收蒲州又襲下潼闗按潼闗在河東馮翊之南若未破河東馮翊安能先取潼闗又實錄云三月取河東而下復載二月戊戍以後事與舊傳皆誤也今従汾陽傳及唐厯, SBCK: ''}
