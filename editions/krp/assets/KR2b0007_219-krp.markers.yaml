  - {type: variant, offset: 1361, length: 267, content: 玢音彬不考異曰明皇雜錄賀蘭進明之初守北海也城卑完儲積于外冦又將至懼資其用進明遂焚之適有寺人至北海求貨于進明不獲歸以損軍用聞於上遂詔罷郡守屬延王玢従上不及遣中使訪之而加刑焉會進明赴蜀遇使訪于路曰王罪不宜及刑願少留於路使者感而受約既至蜀進明言于上曰延王陛下之愛子也無兵權以變其心無郡國以驕其志間道于豺狼乃責其不以時至陛下罪之人復何望臣恐漢武望思之築將見於聖朝矣因遽馳使赦之謂進明曰俾父子如初卿之力也遂遣進明往靈武道遇延王進明馳馬亦慰之王望之降車稽首而去肅宗謂之曰卿解平原之圍阻賊冦之軍而不以䜛口介意復全我兄弟乃社稷之臣因授御史大夫今従舊傳, SBCK: ''}
