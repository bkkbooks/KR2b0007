  - {type: variant, offset: 0, length: 258, content: 欽定四庫全書資治通鑑卷一百五十七宋司馬光撰胡三省音註梁紀十三起旃䝉單閼盡彊圉大荒落凡三年髙祖武皇帝十三大同元年春正月戊申朔大赦改元是日魏文帝即位於城西城西長安城西也古者天子即位御前殿魏自髙歡立孝武帝復用夷禮於郊拜天而後即位大赦改元大統追尊父京兆王為文景皇帝妣楊氏為皇后魏渭州刺史可朱渾道元先附侯莫陳悦悦死悦死見上卷中大通六年丞相泰攻之不能克與盟而罷道元世居懐朔與東魏丞相歡善又母兄皆在鄴由是常與歡通泰欲擊之道元帥所部三千户西北度烏蘭津抵靈州烏蘭津在平涼西北唐分平涼之㑹寧鎮置㑹州又置烏蘭縣屬焉縣西南有烏蘭闗帥讀曰率靈, SBCK: ''}
