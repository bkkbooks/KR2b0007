  - {type: variant, offset: 17160, length: 373, content: 自李泌為相觀其處置天下事姚崇以來未之有也史臣謂其出入中禁事四君數為權倖所疾常以智免好縱横大言時時讜議能寤移人主意然常持黄老鬼神説故言為人所譏余謂泌以智免信如史臣言矣然其縱横大持黄老鬼神說亦智也泌處肅代父子之間其論與復形勢言無不効及張李之間所以保右代宗者言無不行元載之讒疾卒能自免可謂智矣至其與徳宗論天下事若指諸掌以肅代之信泌而泌不肯為相以德宗之猜忌而泌夷然當之亦智也嗚呼仕而得君諫行言聽則置身宰輔宜也歴事三世㓗身逺害筋力向衰乃方入政事堂與新貴人伍所謂經濟之畧曏未能為肅代吐者盡為德宗吐之豈德宗之度𢎞于祖父邪泌盖量而後入耳彼德宗之猜忌刻薄直如蕭姜謂之輕已賣直功如李馬忌而置之散地而泌也恣言無憚彼其心以泌為祖父舊人智畧無方𢎞濟中興其敬信之也久矣泌之所以敢當相位者其自量亦審矣庸非智乎其持黄老鬼神説則子房欲從赤松游之故智也但子房功成後為之泌終始篤好之耳, SBCK: ''}
