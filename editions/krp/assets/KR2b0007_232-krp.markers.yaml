  - {type: variant, offset: 4174, length: 393, content: 降户江翻州考異曰杜牧竇烈女傳曰初希烈入汴聞户曹參軍竇良女美使甲士至良門取桂娘以去將出門顴其父曰慎無戚必能滅賊使大人取富貴于天子桂娘以才色在希烈側復能巧曲取信凡希烈之宻謀雖妻子不知者悉皆得聞希烈歸蔡州桂娘謂希烈曰忠而勇一軍莫如陳仙奇其妻竇氏仙奇寵且信之願得先徃來以姊妹叙齒因徐説之使堅仙奇之心希烈然之桂娘因以姊事仙奇妻嘗問曰為賊遲晚必敗姊宜早圖遺種之地仙奇妻然之興元元年四月希烈暴死其子不發喪欲盡誅老將校以卑少者代之計未决有獻含桃者桂娘白希烈子請分遺仙竒妻且以示無事于外因為蠟帛書曰前日已死殯在後堂欲誅大臣須自為計以朱染帛丸如含桃仙奇發丸見之言于薛育育曰兩日希烈稱疾但怪樂曲雜𤼵晝夜不絶此乃有誅未定示暇于外事不疑矣明日仙奇薛育各以所部譟于牙門請見希烈希烈子迫出拜曰願去偽號一如李納仙奇曰爾父勃逆天子有命誅之因斬希烈及妻子函七首以獻暴其尸于市後兩月吳少誠殺仙奇知桂娘謀因亦殺之今從實錄及舊傳, SBCK: ''}
