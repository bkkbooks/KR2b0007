  - {type: variant, offset: 7613, length: 648, content: 舊志雷州至京師六千五百一十二里考異曰實錄曰初元琇判度攴闕輔旱儉請運江淮租米以給京師上以韓滉素著威名加江淮轉運使欲令專督運務琇以滉性剛愎難與集事乃條奏令滉督運江南未至楊子凡一百十八里自楊子以北皆琇主之滉深怒于琇琇以京師錢重貨輕乃于江東監院収獲見錢四十餘萬今轉送入闗滉不許誣奏以為運千錢至京師費錢萬上以問琇琇奏曰千錢之重納與一斗米均自江南水路至京師所費三二百耳上然之遣中使齎手詔令運錢滉堅執以為不可及滉總度支遂逞宿心累誣奏琇至是而貶焉舊崔造傳曰造與元琇素厚罷使之後以鹽鐵委之而韓滉以司務久行不可遽改德宗復以滉為江淮轉運使餘如造所條奏其年秋初江淮漕運大至京師德宗嘉其功以滉專領度支諸道鹽鐵轉運等使造所條奏皆改乃罷造知政事貶雷州司户鄴侯家傳曰時元琇判度支江淮進米相次已入汴州而淄青及魏府蝗旱尤甚人皆相食李納無計欲束身入朝元琇廼支米十五萬石與之納軍遂濟三月入河運第一綱米三萬石自集津車般至三門十日而畢造入渭船亦成米至陜俄而度支牒至支充河中軍相糧先公憂迫不知所為欲使人聞奏先令走馬與韓謀之韓相報曰慎不可奏某判度支米在外勢不禁它反被它更鼓作言語待某今冬運畢當請朝覲此時面奏時蝗旱運路阻澀自四月初後有一日之内七奉手詔者皆為催米且言軍國糧儲自今月半後悉盡此米所藉公忠副朕憂屬星夜𤼵遣以濟憂勤其㫖如此而不知米皆被外支盖琇及時宰忌韓相及先公運米功成而不為朝廷大計幾至再亂十月韓相以饋運功成請入朝及對見上大悦言無不從遂奏運事且言元琇支米與淄青河中臣在外與先公俱不敢奏上大驚即日貶琇為雷州司户二説相違恐各有所私今但取其大要, SBCK: ''}
