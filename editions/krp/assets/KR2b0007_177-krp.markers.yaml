  - {type: variant, offset: 9724, length: 443, content: 隋志譯云考尋樂府鍾石律呂皆有宫商角徵羽變宫變徵之名七聲之内三聲乖應每恒求訪終莫能通先是周武帝時有龜兹人蘇祇婆從突厥皇后入國善胡琵琶聴其所奏一均之中間有七聲因而問之調有七種以其七調勘校七聲冥若合符一曰婆陁力華言平聲即宫聲也二曰雞識華言長聲即南呂聲也三曰沙識華言質直聲即角聲也四曰沙侯加儖華言應聲即變徵聲也五曰沙臘華言應和聲即徵聲也六曰般瞻華言五聲即羽聲也七曰俟利􅝍華言斛牛聲即變宫聲也譯因習而彈之始得七聲之正然其就此七調又有五旦之名旦作七調以華言譯之旦者則謂均也其聲亦應黄鍾太簇林鍾姑洗五均已外七律更無調聲譯遂因其所捻琵琶絃柱相飲為均推演其聲更立七均合成十二以應十二律律有七音音立一調故成七調十二律合八十四調旋轉相交盡皆和合仍以其聲考校太樂所奏林鍾之宫應用林鍾為宫乃用黄鍾為宫應用南吕為商乃用太簇為商應用應鍾為角乃取姑洗為角故林鍾一宫七聲三聲並戾其十一宫七十七音例皆乖越莫有通者又以編懸有八因作八音之樂七音之外更立一聲謂之應聲作書二十餘篇以明其指龜兹音丘兹賢曰今音丘勿翻兹音沮帷翻蓋急言耳, SBCK: ''}
