  - {type: variant, offset: 0, length: 215, content: 欽定四庫全書資治通鑑卷三十一宋司馬光撰胡三省音註漢紀二十三起屠維大淵獻盡彊圉恊洽凡九年孝成皇帝上之下陽朔三年春三月壬戌隕石東郡八夏六月潁川鐵官徒申屠聖等百八十人殺長吏盗庫兵自稱将軍經歴九郡遣丞相長史御史中丞逐捕以軍興従事長知兩翻師古曰逐捕之事須有發興皆依軍法皆㐲辜秋王鳳疾天子數自臨問數所角翻親執其手涕泣曰将軍病如有不可言師古曰不可言謂死也不欲斥言之平阿侯譚次将軍矣鳳頓首泣曰譚等雖與臣至親行皆奢僣行下孟翻無以率導百姓不如御史大夫, SBCK: ''}
