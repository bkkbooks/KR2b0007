  - {type: variant, offset: 0, length: 235, content: 欽定四庫全書資治通鑑卷七十一宋司馬光撰胡三省音註魏紀三起著雍涒灘盡上章閹茂凡三年烈祖明皇帝上之下太和二年春正月司馬懿攻新城旬有六日拔之斬孟達申儀久在魏興擅承制刻印多所假授懿召而執之歸于洛陽歸儀于京師也初征西將軍夏侯淵之子楙尚太祖女清河公主此女欲以妻丁儀文帝止之以妻楙楙音茂文帝少與之親善少詩照翻及即位以為安西將軍都督闗中鎭長安使承淵處淵鎮長安見六十六巻漢獻帝建安十六年諸葛亮將入冦與羣下謀之丞相司馬魏延曰漢丞相有長史而無司馬是時用兵故置司馬聞夏侯楙主壻也怯而無謀今假延精, SBCK: ''}
