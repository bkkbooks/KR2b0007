  - {type: variant, offset: 10718, length: 392, content: 僴下赧翻其考異曰肅宗實錄曰張后因太子監國謀誅輔國日使人以上命召太子語之太子不可乙丑后矯上命將喚太子程元振知之密告輔國丙寅元振與輔國夜勒兵於三殿前使人收捕越王及同謀内侍朱光輝叚恒俊等百餘人繫之移皇后于别殿其夜六宫内人中官等驚駭奔走及明上崩代宗實錄曰乙丑皇后召上既夜輔國元振勒兵捕係幽后丁卯肅宗崩係傳乙丑后召太子丙寅夜元振輔國勒兵捕係幽后是日俱為輔國所害舊肅宗紀丁卯宣遺詔是日上崩代宗紀乙丑皇后矯詔召大子輔國元振衛從太子入飛龍厩以俟變是夕勒兵於三殿收係及朱光輝馬英俊等丁卯肅宗崩新本紀丙寅閑厩使李輔國飛龍厩副使程元振遷皇后于别殿殺越王係兖王僴是夜皇帝崩代宗録唐厯統紀係傳皆以叚恒俊為馬英俊按張后以乙丑日召太子迨夜不至時必知冇變矣輔國等安能待至來夜然後勒兵收係等乎盖收係等在乙丑之夜也今從代宗實録舊代宗紀新舊傳皆云兖王僴寳應元年薨而代宗實錄羣臣議係僴之罪云二王同惡共扇姦謀盖僴亦預謀也今從之, SBCK: ''}
