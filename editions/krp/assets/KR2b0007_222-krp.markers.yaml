  - {type: variant, offset: 17039, length: 593, content: 曰考異曰河洛春秋朝義戰敗走歸范陽途經衡水僕固瑒領蕃漢兵一十五萬追及朝義接戰敗之是夏涉秋苦雨陂湖流注河東兵馬使李竭誠成德軍將李令崇咸統精兵亦革靣來王競為犄角其漳河及諸津渡船悉是虜獲朝義遣人致命竟不應續令散雇舟船並皆掠盡四路俱絶諸將或請戰或請降朝義不恱田承嗣上疏與朝義曰臣聞兵勢兩均成敗由將衆寡不敵全滅在權昔劉主破于白帝曹公敗于赤壁陸遜黄盖皆以權道取之今部統之師皆自疲頓主客勢倍勞逸力殊若驅而令戰未見其利請用車五十乗於古夏康王城北作三箇車營車上皆設棚排倒戈為禦毎車甲士二人持兵而伏随軍子女羅於帳中每營輜重分列其次營後選二萬人布偃月陣凡敵衆我寡則設此陣左右有險亦設此陣左右奇軍亦設此陣各令猛將主之左者東南行右者西南行令去車營十里餘營前選精卒五千人雁行陣使之接戰不勝則退於偃月陣後前軍既却敵必至車營愛其珍玩必將攻取候其兵縦陣勢已分然後桴鼔齊鳴前後俱至貔貅奮勇鹵楯争先左軍西行右軍東邁皆取古城之南令首尾相屬伏兵之𤼵料敵必驚後軍之來自然斷絶前後既不相救中軍又遇精兵服色相亂不敗何待令文景義主左軍逹干義感主右軍足下自主中軍若其不捷老臣請以弱卒五千為足下吞之朝義覧疏大恱因用其計官軍敗績䘮師三千餘級僕固瑒大震退師數十里由是朝義得達莫州朝義既敗官軍威聲復振凡所追集人莫已違鳩集舟舫并連牌栰先濟輜重兼及老弱方以軍南行若有攻擊僕固瑒令吏士各顧所部以抗其鋒朝義乃整師徒一時北濟僕固瑒亦連船艦宵濟趨之今從舊懐恩傳, SBCK: ''}
