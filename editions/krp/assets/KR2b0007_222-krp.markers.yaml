  - {type: variant, offset: 2671, length: 2535, content: 燕因肩翻守式又翻陽考異曰實錄曰朝義既殺思明密遣使馳至范殺偽太子朝英及偽皇后辛氏并不附己者數十人偽范陽留守張通儒知有變遂引兵戰於城中數日戰不利死者數千人通儒被斬于亂兵中薊門紀亂曰思明既王有數十州之地年餘朝興遂為皇太子朝興辛氏之長男特為思明所愛嗜酒好色凶獷頑戾招集幽薊惡少與其年齒相類者百餘人為左右皆彎弓利劍飾以丹雘珠玉帯佩印雕鏤金銀控弦揮刃常如見敵以南行大將子弟統之毎與其黨飲宴酒酣爇燎其鬚髮或以銅弹丸擊之以頥顙為的血流至地無楚痛之色則賞巵酒少似嚬蹙乃鞭之從脛至腫或至數千困絶將殞方捨之候稍愈復鞭之有杖六七千不死者姬妾皆思明所掠良家子有不稱命則殺之亦有以湯鑊死者既火盛湯沸令壯士抱而投之初宛轉呌呼湏臾骨肉糜爛旁人皆毛竪股慄朝興笑臨而觀之以所䇿毬杖于鑊中撞擊顔色自若上元二年三月甲寅使使告捷云王師敗績于洛北斬首萬餘級勒其六宫及朝興備車馬為赴洛之計賊庭之黨相慶踊躍呌唤聲振天地十餘日又宦者二人傳思明偽勑云收兵陜虢以朝興為周京留守仍勒馳驛速𤼵并辛氏已下續行朝興大喜其宦者朝義偽遣之人莫知也時朝義已殺思明僣位濳勒偽左散騎常侍張通儒户部尚書康孝忠與朝興衙將高鞫仁高如震等謀誅朝興其日朝興速召工匠與其母妻造寳鈿鞍勒搜索庫藏修乗騎之具並命左右各備行装唯數十人侍衛思明留駿馬百餘匹在其厩中朝興出入馳驟毎日則於桑乾河飲之通儒將入潜令康孝忠從數十人持兵詣飲處馳取其馬閉於城南毗沙門神之院通儒與鞫仁領步兵十餘人入其日華門偽皇城留守劉象昌逢之驚問其故通儒顧左右斬之俄而朝興腹心衛鳴鶴又問亦斬之子城擾亂朝興惶怖猶能擐甲持兵與親信二三十人出拒奔走亍厩中取馬馬盡矣唯病馬一匹朝興乗而䇿之不前遂步戰通儒立白旗招朝興之黨降者捨罪復官爵惡少等雖沐朝興之錫賚亦怨其無道鞭捶降者大半朝興猶從十餘人接戰弓矢所𤼵無不中者中者皆應弦沒羽通儒軍披靡所傷者數十百人退出子城外人不知甲兵之故皆惶恐潜匿通儒于城門拒戰良久日已云暮朝興衆寡不敵走匿城上之逍遙樓遂失所在通儒兵入禁中劫掠金帛思明朝興妻衣服皆盡夜丰蕃將曹閔之於樓上擒獲之朝興曰我兄弟六七人朝興一身斬之何益高如雲對曰以殿下殘酷人各有怨心朝興曰乞放此一度後更不敢執者皆笑又謂閔之曰此腰帯三十兩黄金新造謹奉將軍閔之曰殿下但死腰帯閔之自解取左右益笑縊以弓弦斷其首函送洛陽偽侍中向閏客特受思明委託朝興亦甚敬憚至是惶怖走入私第不自安匍匐待罪通儒頷之勒馳驛赴洛通儒收朝興黨與悉誅之思明驍將辛萬年特有寵于朝興叉與鞫仁如震等友善為兄弟當誅朝興之黨也通儒有意於萬年及令行刑遂㤀之至是勑鞫仁如震斬萬年首送鞫仁置酒與萬年同飲謂曰張尚書令殺弟故相報萬年稽首但乞快死鞫仁抗聲曰只可兄弟謀取通儒終不肯殺弟於是如震萬年領其部曲百餘人入子城斬通儒於子城南廊下城中擾亂又殺其素不快者軍將數人共推偽中書令阿史那承慶為留守函通儒等首使萬年送洛陽誣其欲以薊城歸順朝義聞之使使令向閏客所在却回為留守鞫仁如震等各從數百人被甲廵城城中人心彌懼承慶為留守一兩日又不自安逓相疑阻於是領蕃兵數十騎出子城至如震宅門立令屈將軍暫要相見如震不虞有難馳至馬前承慶斬之應聲而殞承慶入東軍與偽尚書康孝忠招集蕃羯鞫仁聞如震遇害驚而且怒統麾下軍討之相逢于宴設樓下接戰自午至酉鞫仁兵皆城旁少年驍勇勁捷馳射如飛承慶兵雖多不敵大敗殺傷甚衆積尸成丘承慶孝忠出城收散卒東保潞縣又南掠屬縣野營月餘徑詣洛陽自陳其事城中蕃軍家口盡踰城相繼而去鞫仁令城中殺胡者皆重賞於是羯胡俱殪小兒皆擲於空中以戈承之高鼻類胡而濫死者甚衆時鞫仁在城中最尊使使奏朝義以承慶等反向閏客行至貝州承朝義命廻將至衆官迎之鞫仁嚴兵不出閏客甚懼戒其子弟從者無帯兵器從數人而入鞫仁待之於日華門閏客望見下馬執手相慰鞫仁亦抗禮還營閏客但專守子城端坐餘不敢輙有所問奏承慶等使廻朝義以鞫仁為燕京都知兵馬使五月甲戌朔朝義以偽大常卿李懐仙為御史大夫范陽節度使燕州頗有兵甲故委腹心鞫仁聞之意不快也無何懷仙至從羸馬數千自薊城南門入鞫仁不出迎之於日華門懐仙至卑身過禮立談約為兄弟結盟相固期同保燕邦以奨其主鞫仁意少解懷仙以薊縣為節度院雖任節制鞫仁兵五千餘人皆不受命十數日懐仙待之彌厚每衙皆降階交接鞫仁亦不為之屈既而懐仙命饗軍士中宴鞫仁疑有變兵皆驚走還營被甲懐仙憂懼無計遂囚其牙將朱希彩賁以驚軍中之罪其夜鞫仁將襲懐仙遇大雨持疑未决徹明遂止单騎至節度門懐仙已潛備壯士待之鞫仁趨入懐仙亦不改常禮與坐良久乃問驚軍之罪門已闗顧左右拉殺之立捨希彩自暮春至夏中兩月間城中相攻殺凡四五死者數千戰闘皆在坊市閭巷間但兩敵相向不入人家剽劫一物盖家家自有軍人之故又百姓至於婦人小童皆閑習弓矢以此無虞六月丙申宣思明遺誥𤼵䘮將相百僚縞素哭于其聽政樓前卑㓜相視而笑笑聲與哭聲参半焉朝義又追向閏客赴洛陽加懐仙燕京留守河洛春秋初朝義令人與向貢并阿史那王殺朝清朝凊既受父命常有君臨之心惟以毬獵為務車下勇敢之士僅三千人毎日教習然其殘酷頗有父風而加婬亂幽州士庶無不吁嗟向貢高久仁等既見諸將之書又聞思明已死因說朝清曰昨有密㫖令大王主器承祧其事尤重今敵國猶在上人未還倘更移恩于人誠恐自貽窘廹朝凊然之是日顧左右各令辭訣便自飭装高久仁高如震等及其無備率壯士數百人濳入子城門阿史那王向貢等共率三百人繼至朝清時在卧内僕妾侍側忽聞兵士問是何人門人曰三軍叛乃擐甲登樓賁讓向貢等高如震乃於樓下佯戰朝清自援弓射之凡斃數人阿史那軍佯北朝清下樓向貢等令人擒殺之向貢攝知軍事經四十日阿史那又殺向貢阿史那自稱長史三日後斬高久仁以其首梟之殺朝清故也高如震還固守與阿史那相持城中分兩軍經五日以燕州街為界各自禦備逓相捉搦不得往來阿史那從經略軍領諸蕃部落及漢兵三萬人至宴設樓前與如震㑹戰如震不利乃使輕兵二千人于子城東出直至經略軍南街腹背而擊之并招漢軍萬餘人阿史那軍敗走于武清縣界野營後朝義使招之盡歸東都應是胡面不擇少長盡誅之於是朝義偽受李懐仙幽州節度髙如震旅拒之中承阿史那遁逸之後野行卓次人各持兵糗糧芻茭非戮不應朝義令兵士悉為高賈白衣先行至幽州盡被捉為團練懐仙方自統五千餘騎直叩薊門高如震方欲出師以抗其命慮其卒叛因出迎之懐仙實内圖之且外示寛宥天行誘募咸捨厥愆於是士衆帖然競皆欣戴乃大賞設經三日因衆前却乃斬高如震幽州遂平舊傳亦云朝義令人殺偽太子朝英新傳作朝清今從河洛春秋及新傳餘從薊門紀亂, SBCK: ''}
