  - {type: variant, offset: 18578, length: 544, content: 縊於賜翻又於計翻還音旋又如字考異曰河洛春秋曰朝義東投廣陽郡不受北取潞縣漁陽擬投兩蕃至榆闗李懐仙使使招回却至漁陽過從潞縣至幽州城東阿婆門外於巫閭神廟中兄弟同被絞縊而死乃授首與駱奉仙經一日諸軍方知歸莫州城下舊僕固懐恩傳曰寳應二年三月朝義至平州石城縣温泉柵窮蹙走入長林自縊懐仙使妻弟徐有濟傳其首以獻史朝義傳二年正月李懐仙於莫州生擒之送欵來降梟首至闕下實錄寳應元年十一月己亥僕固懐恩上言幽州平河北州縣盡平史朝義為亂兵所戮傳首上都舊紀寳應二年十月河北州郡悉平李懐仙以幽州降田承嗣以魏州降沈既濟建中實錄二年正月賊將李懐仙擒朝義以降山東平唐厯正月甲辰李懐仙擒史朝義梟首獻至闕下盡以所管来降年代記寳應元年十二月己亥僕固懐恩上言史朝義為亂兵所殺傳首上都二年正月甲申朝義梟首至闕新紀廣徳元年正月甲申朝義自殺其將李懐仙以幽州降按諸軍圍朝義於莫州已在去年十一月末而河洛春秋云圍城四十日懐恩舊傳亦云攻守月餘日然則朝義之死必在今年正月明矣諸書皆云朝義此年正月被殺而實錄在元年十一月舊記因之又脫十一月字懐恩傳誤以正月為三月甲申正月十日甲辰三十日也新本紀盖據年代記但年代記元年冬十一月己亥朝義死亦與實錄同若正月被殺不應十月首級已至長安疑甲申自殺甲辰傳首至闕新紀正用年代記甲辰至闕為自殺日未知何所據今從唐厯以甲辰傳首至京師, SBCK: ''}
