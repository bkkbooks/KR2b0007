  - {type: variant, offset: 1342, length: 917, content: 舊志郴州京師南三千三百里郴丑林翻考異曰柳珵上清傳曰貞元壬申歲春三月相國竇公居光福里第月夜閒步於中庭有常所寵青衣上清者乃曰今欲啟事郎須到堂前方敢言之竇公亟上堂上清曰庭樹上有人恐驚郎請謹避之竇公曰陸贄乆欲傾奪吾權位今有人在庭樹上吾禍將至且此事奏與不奏皆受禍必竄死於道路汝在軰流中不可多得吾身死家破汝定為宫婢聖君若顧問善為我辭焉上清泣曰誠如是死生以之竇公下階大呼曰樹上君子應是陸贄使來能全老夫性命敢不厚報樹上應聲而下乃衣衰麤者也曰家有大喪貧甚不辦葬禮伏知相公推心濟物所以卜夜而來幸相公無怪公曰某罄所有堂封絹千匹而已方擬修私廟今且輟贈可乎縗者拜謝竇公答之如禮又曰便辭相公請左右齎所賜絹擲於牆外某先於街中俟之竇公依其請命僕使偵其絕蹤且方敢歸寢翌日執金吾先奏其事竇公得次又奏之徳宗厲聲曰卿交通節將蓄養俠刺位崇台鼎更欲何求竇公頓首曰臣起自刀筆小才官以至貴皆陛下奬拔實不由人今不幸至此抑亦仇家所為耳陛下忽震雷霆之怒臣便合死中使下殿宣曰卿且歸私第待候進止越月貶郴州别駕㑹宣武節度使劉士寧通好于郴州亷使條䟽上聞徳宗曰交通節将言而有徴流竇公于驩州沒入家資一簮不著身竟未逹流所詔自盡上清果𨽻名掖庭後數年以善應對能煎茶數得在帝左右徳宗謂曰宫掖間人數不少汝了事從何得至此上清對曰妾本故宰相竇參家女奴竇某妻早亡故妾得陪掃灑及竇某家破幸得塡宫旣侍龍顔如在天上徳宗曰竇某罪不止養俠刺亦甚有贓汙前時納官銀器至多上清流涕而言曰竇某自御史中丞厯度支户部鹽鐵三使至宰相首尾六年月入數十萬前後非時賞賜亦不知紀極乃者郴州所送納官銀物皆是恩賜當部録日妾在郴州親見州縣希陸䞇意指刮去所進銀器上刻作藩鎭官衘姓名誣為贓物伏乞陛下驗之於是宣索竇某沒官銀器覆視其刮字處皆如上清言時貞元十二年徳宗又問蓄養俠刺事上清曰本實無悉是陸贄陷害使人為之徳宗怒陸贄曰這獠奴我脱却伊緑衫便與紫衫著又常喚伊作陸九我任使竇參方稱意次須教我枉殺却它及至權入伊手其為軟弱甚於泥團乃下詔雪竇參時裴延齡探知陸贄恩衰得恣行媒糵贄竟受譴後上清特勑丹書度為女道士終嫁為金忠義妻世以陸贄門生名位多顯達者不敢傳説故此事絕無人知信如此説則參為人所劫徳宗豈得反云蓄養俠刺况陸贄賢相安肯為此就使欲陷參其術固多豈肯為此兒戲全不近人情今不取, SBCK: 再}
