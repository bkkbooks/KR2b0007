  - {type: variant, offset: 5614, length: 397, content: 姜公輔居猜忌之朝不能安於命義而由此重竇參之罪亦陸䞇之一言也庻考異曰實録初公輔罷相為左庻子以憂免復除右子數私謁竇參參數奏公輔以他官上不許而有怒公輔之言公輔恐乃請免官為道士乆之未報因開延英奏之上問其故公輔對以參言上曉之固不已大怒貶之而詔書責參推過於上公輔傳曰陸贄知政事以有翰林之舊數告䞇求官贄密謂公輔曰予常見郴州竇相言為公奏擬數矣上㫖不允有怒公之言公輔恐懼乞罷官為道士乆之未報後又庭奏徳宗問其故公輔不敢泄䞇言便以參言為對帝怒貶公輔為泉州别駕又遣使齎詔責參贄傳曰姜公輔奏竇參常語臣云陛下怒臣未已徳宗怒再貶參竟殺之時議云公輔奏竇參語得之於贄云參之死贄有力焉按贄請令長官舉屬吏状云亦由私訪所親轉為所賣其弊非遠聖鑒明知此乃解參之語也及參之死贄救解甚至由是觀之贄豈有殺參之意邪且䞇語公輔之時安知公輔請為道士及於上前以泄言之罪歸參此乃公輔之意非贄意也當時之人見參贄有隙遂以己意猜之史官不悦贄者因歸罪於贄耳今不取, SBCK: ''}
