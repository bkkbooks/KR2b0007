  - {type: variant, offset: 0, length: 404, content: 欽定四庫全書資治通鑑卷一百四十二宋司馬光撰胡三省音註齊紀八屠維單閼一年東昏矦上諱寶卷字智藏明帝第二子也本名明賢明帝輔政後改焉明帝長子寶義有廢疾故立帝為太子其後蕭衍蕭頴胄以荆雍起兵輔南康王寶融以攻帝廢帝為東昏矦荆雍在西謂帝以昏虐居東故廢為東昏矦永元元年春正月戊寅朔大赦改元太尉陳顯達督平北將軍崔慧景軍四萬擊魏欲復雍州諸郡去年魏克雍州五郡雍於用翻癸未魏遣前將軍元英拒之元英即拓䟦英魏既改姓元氏史因而書之乙酉魏主𤼵鄴去年十二月甲寅魏主自鄴班師今車駕始自鄴𤼵辛卯帝祀南郊戊戌魏主至洛陽過李冲冢冲死見上卷上年魏主令葬冲於洛陽覆舟山近杜預冢今自鄴還過其冢按魏主詔代人遷洛者葬洛餘州從便冲隴西人也以其貴寵亦令葬洛時臥疾望之而泣見留守官語及冲輙流涕李冲與任城王澄等同守留臺魏主還洛見留守官而冲已死故語及輙流涕念之之甚也守式又翻魏主謂任城王澄曰朕離京以来舊俗少變不任音壬離力智翻少詩沼翻下同不讀曰否對曰聖化日新帝曰朕入城見車上, SBCK: ''}
