  - {type: variant, offset: 12079, length: 1924, content: 燧音遂朝直遥翻必爲于偽翻速考異曰鄴侯家傳稱李泌語曰臣但恐梟于帳下太何足憂也臣能為陛下取之上曰未諭卿意何故以太速為憂而卿能取也對曰臣為陛下憂不在河中乃在太原今馬燧亦蹭蹬矣領河東十萬之師遣王權領五千赴難及再幸梁洋遂抽歸本道男暢在奉天亦使北歸陛下更収復後宣慰云王權擅抽兵馬暢不扈從並宜釋放此則尤不安矣臣比年曾與之言甚有心路今之雄傑也若使之有異志則不比希烈朱泚之徒或能旰食伏望陛下聽臣之言援鞚逺馭以羈之上曰卿所欲何也對曰馬燧保有河東十餘州以待陛下還官此亦功也臣為常侍與燧兄炫同列然其兄弟素不相能其語無益臣重表兄鄭叔規為賓佐臣令以炫意請至京城欲與相見即至臣激燧令其取懐光自効必可致也因令燧為忠臣矣又曰貞元元年上因郊天改元時馬燧在太原遣其行軍司馬鄭叔規奏事請因鴻恩以雪懷光并致書與先公先公不與之報留其信物且令叔規語之曰比年展奉得接語言心期以爲大夫且河東節度以破靈曜之功上所與也奉天之難握十萬彊兵而令懐光解圍及懷光圖危社稷車駕幸梁洋逢此際㑹又令它人立盖代之功今聖主已歸宮闕懐光蹭蹬在于近畿旦夕為帳下所梟乃尸居也不速出軍収取以自解而快上心者即不及矣若河中既平公即如懐光之蹭蹬矣欲於滔俊之下作倔彊之臣亦必不成不言公才畧不及也緣腹中有三二百卷書蹭蹬至此必自内慙是進不立忠勲退不能効夷狄既而持疑則舟中帳下皆敵國矣可惜八尺之軀聲氣如鍾而心不果决乃婦人也著裙可矣欲奉答以裙衫而家累在冮東未至今聖上収復之後含垢匿瑕與人更始某又特䝉聽信已于上前保薦可使司徒以取懐光今弟來又請雪之大失所望且望弟速去為説若河中既平司徒何面目更來朝而與士人相見今雖請雪昨赦書亦許束身入朝矣若以建中冋征之故當𤼵一使諭之準赦歸朝必為保全如不奉詔當領全師問罪因速上表求自征之至河中輕騎入朝親禀廟畧乃天與之便也能如是當與司徒為中朝應接有須陳奏必聞聖聽若不能何敢有書也叔規既去具奏于上上每憂河中驍將達奚小俊等突犯官闕居常不安㑹東靣苑牆忽有崩倒者上大驚以為有應之者將啟賊上顧問泌對曰此賊不足憂也乃猶杋上肉耳但恐梟懸太速不得與馬燧藉手為憂上曰古人云輕敵者亡今卿心輕敵如是朕甚憂之對曰陛下初經難危憂慮太過輕敵者亡誠如聖㫖至如懷光豈可謂之敵乎陛下比在梁洋元惡據宮闕渠以朔方全軍在河中李晟在東渭橋此時可以傍助逆順之勢不然茍欲偷安脅為遲棊亦可而竟如醉如魘都不能動令陛下復歸宮闕又安足慮之哉臣伏計馬燧請討之章即至若以宗社之靈此賊且未為帳下所圖得河東軍有以藉手陛下無憂矣不喜于平懐光喜于得馬燧也既而馬燧表至請全軍南収河中仍自供糧上大悦召先公對曰馬燧果請全軍討懐光來矣兼請至行營已來自備軍糧何其畏伏卿如此也對曰此乃畏伏天威而然于臣何有而能使其畏伏臣曾與之言諳其為人頗見機識勢今之雄傑也臣非故令叔規傳詞以激怒之且曰欲寄婦人之服當艱虞之時握十萬彊兵収復功在它人今聖主已還宮闕惟有懐光不速収取以立功自解它時復何面目至朝廷與公卿相見則蹭蹬之勢又不及懐光猶有解重圍之功料以此告之燧必能覺悟果得如此既以師至河中旬月當平而燧因此有功便為忠臣矣上曰當盡用卿言初叔規至太原具以先公言告燧燧搏䏶驚曰有是哉頼子之至京也不然燧幾為懷光矣非賢表兄豈有告燧者乎即日上表請行叔規又請如泌言先冩表本示懷光勸其束身歸朝彼必不從然後表請全軍徃討則聖上信司徒誠心又可以忠義告四鄰不然朝救而夕請誅恐中外尤疑燧曰誠然乃令叔規草書寫表本馳驛以告懐光果不從於是乃請全軍南討尋發太原使者相繼奏事及與先公書言征討之謀及須上聞者先公因對皆為奏之又諷令下營訖輕騎由臨晉度朝謁燧皆然之七月乃自臨晉度夏陽來朝上大悦遂具告以先公言卿才畧必可使圖懐光初見卿請雪朕所未諭今乃果然比亦有人毀卿言詞百端聞於逺近惟先公保卿于朕朕信其言今見卿益知先公忠讜豁然體至誠奉國矣燧謝㤙出而請先公至中書具説上言泣下拜謝後對上曰馬燧昨對其器質意趣固不易有且甚有心路感而用之必有成算皆如卿言信雄傑也按泌到長安數日即除常侍興元元年七月乙未也八月癸卯加燧晉慈隰節度使然則癸卯之前燧已取晉慈隰三州矣故朝廷命爲副元帥以討懐光十月已拔絳州及猗氏等諸縣矣貞元元年正月改元赦於時燧豈得猶在太原雪懐光邪自乙未至癸卯纔九日自長安至晉陽千餘里若因泌諷諭鄭叔規始來京師又令叔規還激勸燧又使燧以書諭懷光懷光不從然後上表興師伐之事多如此豈九日之内所能容也此直李繁欲取馬燧平河中之功皆歸于其父耳今從舊燧傳李肇國史補曰馬司徒面雪李懷光上曰惟卿不合雪人惶恐而退李公聞之請全軍自備資糧以討兇逆由此李馬不平邠志曰七月馬公朝于京師請赦懷光隴右節度李公聞之上表請𤼵示兵二萬獨討懐光芻糧之費軍中自備上以李公表馬燧因曰朱泚之反不得已也懷光悖逆使朕再遷此而可赦何者爲罪馬公雨泣曰十日之内請獻其首上遣之按是時懷光垂亡燧功已成八九故自入朝爭之豈肯面雪懷光邪今從舊傳, SBCK: ''}
