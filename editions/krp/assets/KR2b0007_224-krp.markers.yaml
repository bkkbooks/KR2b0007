  - {type: punctuation, offset: 9028, content: (, id: KR2b0007_krp_224-bkkpn748}
  - {type: variant, offset: 9028, length: 569, content: 將即亮翻朔方兵分屯邠蒲始此考異曰實錄己酉以吐蕃嵗犯西疆増修鎮守乃以邠寜節度馬璘鎮涇州仍為涇原節度使以邠寜慶等州𨽻朔方汾陽家傳四年五月詔集兵於邠郊六月公自河中遣一萬兵二十八日公如邠州舊子儀傳時以西蕃侵冦京師不安馬璘雖在邠州力不能拒乃以子儀兼邠寜慶節度自河中移鎮邠州徙馬璘涇原節度使邠志初吐蕃既退諸侯入覲是時馬鎮西以四鎮兼邠寜李公軍澤潞以防秋軍盩厔丞相元公載使人諷諸將使責已曰今四郊多壘中外未寜公執國柄有年矣安危大計一無所聞如之何載曰非所及也他日又言且曰得非曠職乎載莞然曰安危繫於大臣非獨宰臣也先王作兵置之四境所以禦戎狄也今内地無虞朔方兵在河中澤潞軍在盩厔逰軍伺冦不遠京室王畿之外豈假是邪必令損益湏自此始故曰非所及也郭李曰宰臣但圗之載曰今若徙四鎮于涇朔方于邠澤潞于岐則内地無虞三邉有備三賢之意何如三公曰惟所指揮既而相謂曰我曹既為所冊得無行乎十二月詔馬公兼領涇原尋以鄭潁資之李公兼領山南猶以澤潞資之郭公兼領邠寜亦以河中資之三將皆如詔朔方軍自此大徙於邠郭公雖連統數道軍之精甲悉聚邠府其它子弟分居蒲靈各置守將以專其令蒲之餘卒稍遷於邠十年之間無遺甲矣叚公别傳曰馬公朝於京師以公掌留事馬公懇奏請以邠寜慶三州讓副帥子儀令以朔方河中之軍鎮之自帥四鎮北庭之衆遷赴涇州將以拓西境代宗壯而許之十二月二日朝廷以馬公為涇原節度使盖三年立此議至四年子儀始遷邠今参取諸書, SBCK: ''}
