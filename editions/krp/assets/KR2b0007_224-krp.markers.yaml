  - {type: variant, offset: 12903, length: 294, content: 公考異曰邠志五年春詔以寒食召郭豊年令節思與大臣為樂時欲誅朝恩因喻郭公朔方一軍有社稷勞宜以功卒數千人入朝朕因宴賞得以相識正月郭公以組甲三千人入覲魚朝恩請公逰章敬寺公許之丞相元公意其相得使諷邠吏請公無往邠吏自中書馳告郭公曰軍容將不利於公亦告諸將須臾朝恩使至郭公將行士之衷甲請從者三百人願備非常郭公怒曰我大臣也彼非有密㫖安敢害我若天子之命爾曹胡為獨與僮僕十數人赴之朝恩候之驚曰何車騎之省公以所聞對且曰恐勞思慮耳軍容撫膺捧手嗚咽雪涕曰非公長者得無疑乎按汾陽家傳子儀五月入朝七月至汾州或是四年正月入朝時事於時未有誅朝恩之謀今不取家傳又曰三月公上言魚朝恩潜結周智光為外應久掌禁兵若不早圗禍將作矣亦不取, SBCK: ''}
