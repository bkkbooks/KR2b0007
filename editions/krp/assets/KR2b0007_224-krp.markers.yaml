  - {type: punctuation, offset: 17690, content: (, id: KR2b0007_krp_224-bkkpn1489}
  - {type: variant, offset: 17690, length: 360, content: 鹽倉在涇州城西戎考異曰邠志曰十月西冦汾涇原節度使馬公襲之郭公使其將渾瑊率步騎五千為之犄角十八日師登黄萯原望見吐蕃瑊急引其衆前據乗險仍設拒馬槍以遏馳突之勢史抗溫儒雅等宿將五六人任氣自負輕侮都將置酒高飲使人召之至則皆醉矣見拒馬槍曰野地見賊湏擊設此何為命去之戎衆既陳抗等叱馬軍使馳賊既回自衝其軍吐蕃躡背而入我師大敗卒之不死者什二三汾陽家傳十月吐蕃四節度厯涇川過閣川南與渭河合軍公遣渾瑊等前後相接以待之二十四日大戰於長武城我師敗績瑊等突出乃免唐厯十八日吐蕃冦邠州瑊與戰於宜禄官軍大敗二十二日馬璘出兵擊之又敗二十七日己巳璘遣軍斫吐蕃營破之二十八日庚午詔追諸道兵屯西郊十一月一日吐蕃退叚公别傳曰八年冬十月二十三日犬戎入冦大戰於鹽倉我軍與朔方兵馬使渾瑊之衆併力齊攻防秋諸軍望賊而退於是我師不利今日從邠志唐厯叚公家傳事從實録舊傳兼採諸書, SBCK: ''}
