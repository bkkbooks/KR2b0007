  - {type: variant, offset: 2881, length: 262, content: 記文王世子凡始立學者必釋奠于先聖先師攷之鄭注凡學四時皆有釋奠釋奠者設薦饌酌奠而已無迎尸以下之事記又曰始立學者既釁器用幣然後釋菜不舞不授器注云釋菜禮輕也釋奠則舞舞則授器司馬之属司兵司戈司盾祭祀授舞者兵也周禮大胥春入學釋菜合舞注云合舞等其進退鄭司農云舍菜謂舞者皆持芬香之菜秦漢釋奠無文魏則以太常行事晋宋以學官主祭南齊武帝時有司奏釋奠先聖先師禮文又有釋菜未詳今當行何禮用何樂時從喻希議用元嘉故事設軒懸之樂六佾之舞牲牢器用悉依上公梁及北齊車駕視學皆親釋奠唐春秋釋奠三獻皆以學官太宗貞觀十四年親釋奠於國學𤣥宗開元十一年詔春秋釋奠用牲牢, SBCK: ''}
