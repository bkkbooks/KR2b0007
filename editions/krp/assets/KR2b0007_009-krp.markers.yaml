  - {type: variant, offset: 0, length: 1136, content: 欽定四庫全書資治通鑑卷九宋司馬光撰胡三省音註漢紀一起旃䝉協洽盡柔兆涒灘凡二年項羽之分天下王諸將也王沛公於巴蜀漢中曰漢王王怒欲攻羽蕭何諫曰語曰天漢其稱甚美於是就國及滅項羽冇天下遂因始封國名而號曰漢太祖髙皇帝上之上姓劉氏諱邦字季沛豐邑中陽里人張晏曰諡法無髙以帝為功最髙而為帝之太祖故特起此名也元年冬十月古有三正子為天正周用之以十一月為嵗首丑為地正殷用之以十二月為嵗首寅為人正夏用之以十三月為嵗首秦水徳謂建亥之月水得位故以十月為嵗首髙祖以十月至霸上因而不革至武帝太初元年定歴改用夏正始以寅為嵗首至於今因之沛公至霸上考異曰史記漢書荀恱漢紀皆云是月五星聚東井按魏收後魏書髙允傳崔浩集諸術士考校漢元以來日月薄蝕五星行度并譏前史之失别為魏厯以示允允曰善言逺者必先驗於近且漢元年冬十月五星聚於東井此乃厯術之淺事今譏漢史而不覺此謬恐後之譏今猶今之譏古浩曰所繆云何允曰按星傳金水二星常附日而行冬十月日旦在尾箕昏沒於申南而東井方出於寅北何因背日而行是史官欲神其事不復推之於理浩曰欲為變者何所不可君獨不疑三星之聚而怪二星之來允曰此不可以空言争宜更審之時坐者咸怪東宫少傅游雅曰髙君長於厯當不虚言也後嵗餘浩謂允曰先所論者本不經心及更考究果如君語以前三月聚於東井非十月也今従之十月不言五星聚秦王子嬰素車白馬係頸以組封皇帝璽符節降軹道旁應劭曰子嬰不敢襲帝號但稱王耳素車白馬䘮人之服組者天子韍也係頸言欲自殺也師古曰此組謂綬也所以帶璽也組總五翻今綬分絛是也應劭曰璽信也古者尊卑共之左傳襄公在楚季武子使公冶問璽書追而與之秦漢尊者以為信羣下乃避之漢官儀曰子嬰上始皇璽因服御之代代傳受號漢傳國璽沈約曰髙祖入關得秦始皇藍田玉璽螭虎紐文曰受天之命皇帝夀昌後代名傳國璽史記正義曰天子有六璽皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽皇帝信璽凡事皆用之璽令施行天子信璽以遷拜封諸侯之璽以發兵皆以武都紫泥封虞喜志林曰傳國璽自在六璽之外天子凡七璽符說文曰信也韋昭曰符發兵符也師古曰符諸所合符以為契者也周禮地官之屬有掌節鄭𤣥注云節猶信也行者所執之信三禮義宗曰節長尺二寸秦漢以下改為旌􅓚之形韋昭曰節者使所擁也釋名云為號令賞罰之節也師古曰節以毛為之上下相重取象竹節將命者持之以為信徐廣曰軹道在霸陵蘇林曰亭名也在長安東十三里漢宫殿疏曰軹道亭東去霸城觀四里觀東去霸水百步括地志軹音紙軹道在雍州萬年縣東北十六里苑中諸將或言誅秦王沛公曰始懐王遣我固以能寛容事見上卷秦二世二年且人已降殺之不祥乃以屬吏屬付也屬吏者付之於吏使監守之也屬之欲翻賈誼論曰秦以區區之地致萬乗之權招八州而朝同列蘇林曰招音翹舉也秦國周職方雍州之地耳既破六國乃舉豫兖青揚荆幽冀并八州有之六國與秦俱稱王是為同列朝直遥翻百有餘年然後以六合為家六合謂天地東西南北殽函為宫一夫作, SBCK: ''}
