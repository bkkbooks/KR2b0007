  - {type: variant, offset: 0, length: 237, content: 欽定四庫全書資治通鑑卷四十七宋司馬光撰胡三省音註漢紀三十九起旃䝉作噩盡重光單閼凡七年肅宗孝章皇帝下元和二年春正月乙酉詔曰令云民有産子者復勿筭三歲復方目翻復其夫勿輸筭也今諸懐􅗖者賢曰􅗖孕也音壬賜胎飬榖人三斛復其夫勿筭一歲著以為令又詔三公曰安靜之吏悃愊無華説文曰悃愊至誠也悃音苦本翻愊音孚逼翻日計不足月計有餘莊子有是言此謂以日計功若不足者然久而計之則民安其生家給人足固有餘矣如襄城令劉方襄城縣屬潁川郡吏民同聲謂之不煩雖未有他異斯亦殆近之矣近其靳翻夫以苛為察以刻為明以輕為德以重為, SBCK: ''}
