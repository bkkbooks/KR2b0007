  - {type: variant, offset: 0, length: 417, content: 欽定四庫全書資治通鑑卷三十六宋司馬光撰胡三省音註漢紀二十八起昭陽大淵獻盡著雍執徐凡六年孝平皇帝下元始三年春太后遣長樂少府夏侯藩宗正劉宏尚書令平晏納采見女婚有五禮納采問名納吉納徵請期陸徳明曰采音七在翻擇也師古曰謂采擇其可者還奏言公女漸漬徳化漸音沾有窈窕之容窈窕幽閒也王肅曰善心曰窈善容曰窕宜承天序奉祭祀太師光大司徒宮大司空豐左將軍孫建執金吾尹賞行太常事太中大夫劉秀及太卜太史令服皮弁素積百官表太常有太卜太史等令師古曰皮弁以鹿皮為冠形如人手之弁合也素積謂素裳也朱衣而素裳積謂襞績若今之襈為也襈音雛戀翻賢曰素積者積以為裳也言要中辟積也賈公彦曰皮弁之服十五升白布衣積素以為裳以禮雜卜筮皆曰兆遇金水王相卦遇父母得位兆卜也卦筮也孟康曰金水相生也張晏曰金王則水相也遇父母則泰卦乾下坤上天下於地是配享之卦師古曰王音于放翻原父曰但言父母得位安知是泰卦乎相息亮翻所謂康彊之占逢吉之符也洪範曰汝則從龜從筮從卿士從庶民從是之謂大同身其康彊子孫其逢吉又以太牢策, SBCK: ''}
