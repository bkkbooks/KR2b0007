  - {type: variant, offset: 4585, length: 351, content: 法應劭曰九錫一曰車馬二曰衣服三曰樂器四曰朱戸五曰納陛六曰虎賁百人七曰鈇鉞八曰弓矢九曰秬鬯此皆天子制度尊之故事事錫與但數少耳張晏曰九錫經本無文周禮以為九命春秋説有之臣瓉曰九錫備物覇者之盛禮齊桓晉文猶不能備鄭𤣥曰按九錫之名古無有也王制三公一命衮若有加則賜也不過九命孔穎達曰鄭意以為九命之外别加九賜案禮緯含文嘉上列九錫之差下云四方所瞻之成侯子所望宋均注云九錫者乃四方所共見公侯伯子男所希望孔引含文嘉所謂九錫與應劭同獨樂器曰樂則耳宋均注云進退有節行步有度賜之車馬以代其步言成文章行成法則賜之衣服以表其徳長於教訓内懐至仁賜之樂則以化其民居處修理房内不渫賜之朱戸以明其别動作有禮賜之納陛以安其體勇猛勁疾執義堅彊賜之虎賁以備非常亢揚威武志在宿衛賜之斧鉞使得專殺内懐仁徳執㒸不傾賜之弓矢使得專征孝慈父母賜之秬鬯以事先祖, SBCK: 灋}
