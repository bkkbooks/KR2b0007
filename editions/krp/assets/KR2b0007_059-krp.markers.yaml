  - {type: variant, offset: 262, length: 514, content: 蔡邕月令章句自危十度至壁八度謂之豕韋之次衛之分野自壁八度至胃一度謂之降婁之次魯之分野自胃一度至畢六度謂之大梁之次趙之分野自畢六度至井十度謂之實沈之次晉之分野自井十度至柳三度謂之鶉首之次秦之分野自柳三度至張十二度謂之鶉火之次周之分野自張十二度至軫六度謂之鶉尾之次楚之分野自軫六度至亢八度謂之壽星之次鄭之分野自亢八度至尾四度謂之大火之次宋之分野自尾四度至斗六度謂之析木之次燕之分野自斗六度至須女二度謂之星紀之次越之分野自須女二度至危十度謂之𤣥枵之次齊之分野晉書天文志用後魏太史令陳卓所言郡國所入宿受今亦載之自軫十二度至氐四度為壽星於辰在辰鄭分屬兖州自氐五度至尾九度為大火於辰在卯宋分屬豫州自尾十度至南斗十一度為析木於辰在寅燕分屬幽州自南斗十二度至須女七度為星紀於辰在丑吳越分屬揚州自須女八度至危十五度為𤣥枵於辰在子齊分屬青州自危十六度至奎四度為諏訾於辰在亥衛分屬并州自奎五度至胃六度為降婁於辰在戌魯分屬徐州自胃七度至畢十一度為大梁於辰在酉趙分屬冀州自畢十二度至東井十五度為實沈於辰在申魏分屬益州自東井十六度至柳八度為鶉首於辰在未秦分屬雍州自柳九度至張十六度為鶉火於辰在午周分屬三河自張十七度至軫十一度為鶉尾於辰在已楚分屬荆州分扶問翻, SBCK: ''}
