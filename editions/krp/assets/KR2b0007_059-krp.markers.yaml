  - {type: variant, offset: 0, length: 258, content: 欽定四庫全書資治通鑑卷五十九宋司馬光撰胡三省音註漢紀五十一起著雍執徐盡上章敦牂凡三年孝靈皇帝下中平五年春正月丁酉赦天下二月有星孛于紫宫紫宫即太微也匡衞十二星之内皆曰紫宫天子之宫也孛蒲内翻黄巾餘賊郭大等起於河西白波谷帝紀作西河當從之又按宋白續通此典河南府河清縣今理白波鎮無以谷於孟津為河西歟冦太原河東三月屠各胡攻殺并州刺史張懿屠直於翻太常江夏劉焉見王室多故建議以為四方兵冦由刺史威輕既不能禁且用非其人以致離叛宜改置牧伯選清名重臣以居其任焉内欲求交阯牧以交阯僻遠可以避禍也侍中廣漢董扶扶學圖䜟何進薦之徵拜侍中私謂焉曰京師, SBCK: ''}
