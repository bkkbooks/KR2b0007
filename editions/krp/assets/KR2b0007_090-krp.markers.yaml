  - {type: variant, offset: 0, length: 295, content: 欽定四庫全書資治通鑑卷九十宋司馬光撰胡三省音註晉紀十二起彊圉赤奮若盡著雍攝提格凡二年中宗元皇帝上諱睿字景文宣帝曽孫琅邪武王伷之孫恭王靚之子諡法始建國都曰元建武元年是年三月方改元春正月漢兵東略𢎞農太守宋哲犇江東哲屯華隂漢兵自長安東略故棄城來犇守式又翻黄門郎史淑侍御史王冲自長安犇涼州稱愍帝出降前一日降户江翻使淑等齎詔賜張寔拜寔大都督涼州牧侍中司空承制行事且曰朕已詔琅邪王時攝大位君其協贊琅邪共濟多難淑等至姑臧寔大臨三日難乃旦翻臨力鴆翻辭官不受初寔叔父肅為西海太守王莽置西海郡光武中興棄之至獻帝興平二年武威太守張雅請置西海郡分張掖之居延一縣以屬之雖郡名同而非王莽西海郡之地聞長安危逼請為先鋒入援, SBCK: ''}
