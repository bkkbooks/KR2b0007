  - {type: variant, offset: 0, length: 400, content: 欽定四庫全書資治通鑑卷四十宋司馬光撰胡三省音註漢紀三十二起旃蒙作噩盡柔兆閹茂凡二年世祖光武皇帝上之上諱秀字文叔賢曰禮祖有功而宗有徳光武中葉興故廟稱世祖謚法能紹前業曰光克定禍亂曰武伏矦古今註曰秀之字曰茂伯仲叔季兄弟之次長兄伯升次仲故字文叔焉建武元年是年六月即位改元春正月方望與安陵人弓林姓譜弓魯大夫叔弓之後又孔子弟子有仲弓又有馯臂子弓共立前定安公嬰為天子聚黨數千人居臨涇臨涇縣屬安定郡賢曰今涇州縣更始遣丞相松等擊破皆斬之鄧禹至箕關賢曰箕關在今王屋縣東余據唐王屋縣屬懐州水經註箕關故城在垣縣擊破河東都尉進圍安邑縣名屬河東郡赤睂二部俱㑹𢎞農更始遣討難將軍蘇茂拒之難乃旦翻茂軍大敗赤睂衆遂大集乃分萬人為一營凡三十營三月更始遣丞相松與赤睂戰於蓩鄉賢曰蓩音莫老翻字林曰毒草也因以為地名續漢志𢎞農有蓩鄉東觀記曰崇等入至𢎞農枯樅山下與茂戰崇比至蓩鄉轉至湖湖即湖城縣也以此而言其地蓋在今虢州湖城縣之間松等大敗死者三萬餘, SBCK: ''}
