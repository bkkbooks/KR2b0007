  - {type: variant, offset: 10049, length: 584, content: 續漢志曰立社稷於雒陽在宗廟之右皆方壇四面及中各依方色無屋有牆門而已白虎通曰天子之壇方五丈諸矦之壇半天子之壇社者土也人非土不立非穀不食故封土立社示有上也稷者五穀之長得隂陽中和之氣故祭之也沈約曰禮云共工氏之霸九州其子句龍曰后土能平九土故祀以為社烈山氏之有天下其子曰神農能殖百榖其裔曰柱佐顓頊為稷官主農事周弃繼之法施於人故祀以為稷禮王為羣姓立社曰太社王自為立社曰王社故國有二社而稷亦有二也漢魏則有官社無稷故常二社一稷也傅咸曰天子親耕以供粢盛親耕自報故自為立社為籍而報也國以人為本人以國為命故又為百姓立社而祈報也此社之所以有二也王肅論王社謂春祈籍田秋而報之也其論太社則曰王者布下圻内為百姓立之謂之太社不自立之京師也杜佑曰社者五土之神五土者山林川澤丘陵墳衍原隰等各有所育羣生賴之故特於吐生物處别立其名為社稷者於五土之中特指原隰之祗以五土雖各有所生而山林川澤丘陵墳衍此四者雜出材用等物於五穀之功則少且生人所急者食故於五土之中别旌異原隰之祗以報之以其能生五榖名其神但五榖不可遍言以稷為五榖之長春生秋成之主稷者原隰之中能生五榖之祗是也續漢書曰制郊兆於雒陽城南七里為壇八階中又為重壇天地位皆在壇上其外壇上為五帝位青帝位在甲寅赤帝位在丙巳黄帝位在丁未白帝位在庚申黒帝位在壬亥其外為壝重營皆紫以象紫宫營有通道以為門日月在營内南道日在東月在西北斗在北道之西外營中營凡千五百一十四神髙皇帝配食焉, SBCK: ''}
