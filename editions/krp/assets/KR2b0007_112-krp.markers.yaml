  - {type: variant, offset: 0, length: 202, content: 欽定四庫全書資治通鑑卷一百十二宋司馬光撰胡三省音注晉紀三十四起重光赤奮若盡𤣥黓攝提格凡二年安皇帝下隆安五年春正月武威王利鹿孤欲稱帝羣臣皆勸之安國將軍鍮勿崙曰安國将軍漢獻帝以授張楊鍮託侯翻崙盧昆翻吾國自上世以來被髮左袵被皮義翻無冠帶之飾逐水草遷徙無城郭室廬故能雄視沙漠抗衡中夏夏户雅翻今舉大號誠順民心然建都立邑難以避患儲蓄倉庫啟敵人心不如處晉民於城郭勸課農桑以供資儲帥國人以習戰射鄰國弱則乗之强則避之此久長, SBCK: ''}
