  - {type: punctuation, offset: 239, content: (, id: KR2b0007_krp_112-bkkpn19}
  - {type: variant, offset: 239, length: 380, content: 質受斧的受矢按詩發彼有的毛傳云的質也正義曰毛氏於射侯之事正鵠不明惟猗嗟傳云二尺曰正亦不言正之所施周禮鄭衆馬融注皆云十尺曰侯四尺曰鵠二尺曰正四寸曰質則以為侯皆一丈鵠及正質於一侯之中為此等級則以質為四寸也王肅引爾雅云射張皮謂之侯侯中謂之鵠鵠中謂之正正方二尺正中謂之𣙗𣙗方六寸𣙗則質也舊云方四寸今云方六寸爾雅説明宜從之肅意惟改質為六寸餘同鄭馬賈逵周禮注云四尺曰正正五重鵠居其内而方二尺以為正正大於鵠鵠在正内雖内外不同亦共在一侯鄭於周禮上下檢之以為大射之侯其中制皮為鵠賔射之侯其中采畫為正正大如鵠皆居侯中三分之一其燕射則射獸侯侯中畫為獸形即鄉射記所謂熊侯白質之類射義云孔子曰循聲而發發而不失正鵠者其惟賢者乎詩云發彼有的以祈爾爵旣言正鵠即引此的則詩人之意以的為正鵠之謂也司裘注説皮侯之狀云以虎熊豹麋之皮飾其側又方制之以為質謂之鵠是鄭意以侯中所射之處為質也此毛傳唯言的質也, SBCK: ''}
  - {type: voice, offset: 239, length: 380, name: note, id: n6}
