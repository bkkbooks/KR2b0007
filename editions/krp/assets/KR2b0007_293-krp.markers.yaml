  - {type: variant, offset: 8339, length: 386, content: 祭器樽彞簠簋籩豆之屬也祭玉蒼璧禮天黄琮禮地青圭禮東方赤璋禮南方白琥禮西方𤣥璜禮北方也時禮官博士凖詔議祭器祭玉制度國子祭酒尹拙引崔靈恩三禮義宗云蒼璧所以禮天其長十有二寸葢法天之十二時又引江都集白虎通諸書所説云璧皆外圓内方又云黄琮所以禮地其長十寸以法地之數其琮外方内圓八角而有好國子博士聶崇義以為璧内外皆圓其徑九寸按阮氏鄭𤣥圖皆云九寸周禮玉人職又有九寸之璧及引爾雅云肉倍好謂之璧好倍肉謂之瑗肉好若一謂之環郭璞注云好孔也肉邊也而不載尺寸之數崇義又引冬官玉人云璧好三寸爾雅云肉倍好謂之璧葢兩邊肉各三寸通好共九寸則其璧九寸明矣崇義又云黄琮八方以象地每角各剡出一寸六分共長八寸厚一寸按周禮圖及阮氏圖並無好又引冬官玉人云琮八角而無好崇義又云琮璜圭璧並是禮天地之器而爾雅唯言璧環瑗三者有好其餘琮璜諸器並不言之則黄琮八角而無好明矣時太常卿田敏已下以崇義援引周禮正文為是乃從之更工衡翻聶尼輒翻, SBCK: ''}
