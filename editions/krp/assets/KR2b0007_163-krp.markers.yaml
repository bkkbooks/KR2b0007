  - {type: variant, offset: 0, length: 342, content: 欽定四庫全書資治通鑑卷一百六十三宋司馬光撰胡三省音註梁紀十九上章敦牂一年太宗簡文皇帝上諱綱字世讚小字六通武帝第三子昭明太子母弟也謚法平易不訾曰簡學勤好問曰文大寳元年春正月辛亥朔大赦改元陳霸先發始興至大庾嶺大庾嶺在今南安軍大庾縣西南二十里吳錄南野縣有大庾山自嶺嶠九嶝二里至嶺下平行十里至平亭蔡路養將二萬人軍於南野以拒之南野縣漢屬豫章郡晋屬南康郡劉昫曰唐韶州始興縣漢南野縣地宋白曰䖍州之南康大庾嶺南雄州之始興皆漢南野縣地輿地志今䖍州龍南縣漢南野縣地將即亮翻路養妻姪蘭陵蕭摩訶年十三單騎出戰無敢當者杜僧明馬被傷騎竒寄翻被皮義翻陳霸先救之授以所乗馬僧明上馬復戰上時掌翻復扶又翻衆軍因而乗之路養大敗脱身走霸先進軍南康清考異曰太紀在二月今從陳帝紀湘東王繹承制授霸先明威將軍交州刺史戊辰東魏進太原公, SBCK: ''}
