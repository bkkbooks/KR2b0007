  - {type: variant, offset: 0, length: 227, content: 欽定四庫全書資治通鑑卷一百五十宋司馬光撰胡三省音註梁紀十四起著雍敦䍧盡閉逢困敦凡七年髙祖武皇帝十四大同四年春正月辛酉朔日有食之東魏碭郡獲巨象送鄴魏收志孝昌二年置碭郡治下邑城屬徐州碭徒朗翻丁夘大赦改元元象二月己亥上耕籍田東魏大都督善無賀拔仁攻魏南汾州刺史韋子粲降之降户江翻下同丞相泰滅子粲之族東魏大行臺侯景等治兵於虎牢冶直之翻将復河南諸州魏梁迥韋孝寛趙繼宗皆棄城西歸梁迥在潁川韋孝寛在汝南未知趙繼宗所棄何城也侯景攻廣州未拔廣州治襄城聞魏救兵将至集諸将議之行, SBCK: ''}
