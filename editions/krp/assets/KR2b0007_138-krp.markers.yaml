  - {type: variant, offset: 0, length: 331, content: 欽定四庫全書資治通鑑卷一百三十八宋司馬光撰胡三省音註齊紀四昭陽作噩一年世祖武皇帝下永明十一年春正月以驃騎大將軍王敬則為司空驃匹妙翻騎竒寄翻鎮軍大將軍陳顯逹為江州刺史顯逹自以門寒位重陳顯逹南彭城人起於卒伍每遷官常有愧懼之色戒其子勿以富貴陵人而諸子多事豪侈顯逹聞之不悦以陳顯逹之居寵思畏終不能自免於猜暴之朝至於稱兵而死豈非繫於所遇之時哉子休尚為郢府主簿過九江自建康至郢府先過九江顯逹曰麈尾蠅拂麈腫庾翻麈麋屬尾能生風辟蠅蜹陸佃埤雅曰麈似鹿而大其尾辟塵以置舊帛中能令嵗久紅色不黦又以拂氊令氊不蠧名苑曰鹿之大者曰麈羣鹿隨之皆視麈所徃麈尾所轉為凖於文主鹿為麈古之談者揮焉良為是也是王謝家物汝不須捉此言不須以風流自標置也捉執也即取於前燒之初上於石頭造露車三千乘欲步道取彭城魏人, SBCK: ''}
