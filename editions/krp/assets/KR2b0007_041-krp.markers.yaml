  - {type: variant, offset: 33, length: 240, content: 奮若凡三年世祖光武皇帝上之下建武三年春正月甲子以馮異為征西大將軍晉書職官志曰四征起於漢代謂此鄧禹慙於受任無功數以飢卒徼赤睂戰輒不利數所角翻徼一遥翻乃率車騎將軍鄧𢎞等自河北度至湖地理志河北縣屬河東郡湖縣屬京兆賢曰湖縣故城在今虢州湖城縣西南要馮異共攻赤睂要一遙翻下同異曰異與賊相拒數十日雖虜獲雄將餘衆尚多可稍以恩信傾誘難卒用兵破也卒讀曰猝下卒起同上今使諸將屯澠池要其東澠彌兖翻而異擊其西一舉取之此萬成計也十事九成猶有一不中萬事萬成言筭無遺計也要一遥翻禹𢎞不從𢎞遂大戰移日言日景移也赤睂, SBCK: 眉}
