  - {type: punctuation, offset: 7801, content: (, id: KR2b0007_krp_123-bkkpn688}
  - {type: variant, offset: 7802, length: 1385, content: 延昌三年强孫式上表曰臣聞伏羲氏作而八卦形其畫軒轅氏興而靈龜彰其彩古史倉頡覽二象之爻觀鳥獸之迹别剏文字以代結繩用書契以維事迄于三代厥體頗異雖依類取制未能達倉氏矣故周禮八嵗入小學保氏教以六書蓋是史頡之遺法及宣王太史史籀著大篆十五篇與古文或同或異時書謂之籀書孔子脩六經左丘明述春秋皆以古文厥意可得而言其後七國殊軌文字乖引暨秦兼天下丞相李斯乃奏蠲罷不合秦文者斯作倉頡篇車府令髙作爰歴篇太史令胡母敬作博學篇皆取史籀式頗有省改所謂小者也於是秦燒經書滌除舊典官獄煩多以趣簡易始用𨽻書古文自此息矣𨽻書者始皇使下杜人程邈附于小篆所作也世人以邈徒𨽻即謂之𨽻書故秦有八體一曰大二曰小三曰符書四曰蟲書五曰摹印六曰署書七曰殳書八曰𨽻書漢興有尉律學復教以籀書又習八體試之課最以為尚書史書省字不正輙舉劾焉又有草書莫知誰始其形書雖無厥誼亦一時之變通也孝宣時召通倉頡讀者獨張敞從受之凉州刺史杜業沛人爰禮講學大夫秦近亦能言之孝平時徵禮等百餘人説文字於未央宫中以禮為小學元士黄門侍郎揚雄採以作訓纂篇及亡新居攝自以運應制作使大司馬甄豐校文字之部頗改定古文時有六書一曰古文孔子壁中書也二曰竒字即古文而異者三曰書云小也四曰佐書秦𨽻書也五曰繆所以摹印也六曰鳥蟲所以書旛信也壁中書者魯恭王壊孔子宅而得尚書春秋論語孝經也又北平矦張蒼獻春秋左氏傳書體與孔氏相類即前代之古文矣後漢扶風曹喜號曰工篆小異斯法而甚精巧自是後學皆其法也又詔侍中賈逵脩理舊文殊藝異術王教一端茍有可以加于國者靡不悉集逵即汝南許慎古學之師也後慎嗟時人之好竒歎俗儒之穿鑿故撰説文解字十五篇首一終𤣥各有部屬可謂類聚羣分雜而不越文質彬彬最可得而論也左中郎將蔡邕採李斯曹喜之法以為古今雜形詔于太學立石碑刋載五經題書楷法多是邕書也後開鴻都書畫竒能莫不雲集特諸方獻篆無出邕者魏初博士清河張揖著埤蒼廣雅古今字詁方之許篇古今體用或得或失陳留邯鄲淳亦與揖同博聞古藝特善蒼雅許氏字指八體六書精究厥理有名於揖以書教諸皇子又建三字石經於漢碑西其文蔚煥三體復宣較之説文篆𨽻大同而古字小異又有京兆韋誕河東衛覬二家並號能篆當時臺觀牋題寳噐之銘悉是誕書咸傳之子孫世稱其妙晉世吕忱表上字林六卷尋其况趣附託許慎説文而按偶章句隠别古籀竒惑之字文得正𨽻不差篆意也忱弟静别倣故左校令李登聲類之法作韻集五卷使宫商録徵羽各為一篇而文字與兄便是魯衛音讀楚夏時有不同皇魏承百王之季紹五運之緒世易風移文字改變篆形謬錯𨽻體失真俗學鄙習復加虚造巧談辨士以意為疑炫惑于時難以釐改乃曰追來為歸巧言為辯小兎為神虫為蠶如斯甚衆皆不合孔氏古書史籀大篆許氏説文石經三字也嗟夫文字者六籍之宗王教之始前人所以垂今今人所以識古臣六世祖瓊家世陳留住晉之初與從父兄皆受學于衛覬古篆之法蒼雅方言説文之誼當時並收善譽而祖遇洛陽之亂避地河西數世傳習斯業所以不墜也世祖大延中牧犍内附臣亡祖文威杖䇿歸國奉獻五世傳掌之書古篆八體之法時䝉褒録叙列于儒林官班文省家號世業臣藉六世之資奉遵祖考之訓切慕古人乏軌企踐儒門之轍求撰集古來文字以許慎説文為主及孔氏尚書五經音註籀篇爾雅三蒼凡將方言通俗文祖文宗埤蒼廣雅古今字詁三字石經字林韻集諸賦文字有六書之誼者以類編聯文無複重統為一部其石籀竒惑俗𨽻諸體咸使班于篆下各有區别訓詁假借之誼随文而解音讀楚夏之聲逐字而註其所不知則闕如也冀省百氏之觀而同文字之域詔如所請中書自曹魏置監令以來未嘗置博士蓋拓抜氏初置是官也魏, SBCK: ''}
