  - {type: variant, offset: 5468, length: 616, content: 續漢志秦有監郡御史監諸郡漢興省之但遣丞相史分刺諸州無常官孝武初置刺史十三人秩六百石古今注曰常以春分行部郡國各遣一吏迎界上漢舊儀曰詔書舊典刺史班宣周行郡國省察治政黜陟能否斷理寃獄以六條問事非條所問即不省一條强宗豪右田宅踰制以强陵弱以衆暴寡二條二千石不奉詔書遵承典制倍公向私㫄詔牟利侵漁百姓聚歛為姦三條二千石不恤疑獄風厲殺人怒則任刑喜則任賞煩擾苛暴剝戮黎元為百姓所疾山崩石裂妖祥訛言四條二千石選置不平茍阿所愛蔽賢寵頑五條二千石子弟怙恃榮勢請託所監六條二千石違公下比阿附豪强通行貨賂割損政令續漢志又曰諸州常以八月巡行郡國録囚徒考殿最初嵗盡詣京都奏事中興但因計吏與古今注異據晉志帝改禹貢雍州曰凉州梁州曰益州又置徐州復禹貢舊號北置朔方南置交阯與荆揚兖豫青冀幽幷為十三州春秋元命包及晉書地理志昴畢散為冀州其地有險有易帝王所都亂則冀安弱則冀强荒則冀豐箕星散為幽州言北方太隂故以幽㝠為號營室流為幷州不以衛水為號又不以恒山為稱而云并者盖以其在兩谷之間也五星流為兖州端也信也又云盖取沇水以名焉天氐流為徐州盖取舒緩之義或云因徐丘以立名虚危流為青州周禮曰正東曰青州盖取地居少陽其色青故名牽牛流為揚州以為江南之氣躁勁厥性輕揚亦云州界多水水波輕揚也軫星散為荆州强也言其氣躁强亦曰警也言南蠻數為冦逆其人有道後服無道先强常警備也又云取名於荆山鉤鈴星别為豫州豫者舒也言稟中和之氣性理安舒也參代流為益州益之言阨言其所在之地險阨亦曰疆壤益大故以名焉凉州以地處西方常寒凉也, SBCK: ''}
