  - {type: variant, offset: 0, length: 255, content: 欽定四庫全書資治通鑑卷二十一宋司馬光撰胡三省音註漢紀十三起𤣥黓涒灘盡𤣥黓敦牂凡十一年世宗孝武皇帝下之上元封二年冬十月上行幸雍祠五畤還祝祠泰一以拜德星師古曰拜而祠之加祝辭春正月公孫卿言見神人東莱山若云欲見天子天子於是幸緱氏城緱工侯翻拜卿為中大夫遂至東莱宿留之數日無所見宿留音秀溜見大人迹云復遣方士求神怪採芝藥以千數復扶又翻時嵗旱天子既出無名乃禱萬里沙應劭曰萬里沙神祠也在東莱曲城孟康曰沙徑三百餘里杜佑通典萬里沙在莱州掖縣界夏四月還過祠泰山初河决瓠子河始决見十八卷元光二年後二十餘嵗不復塞復扶又翻塞悉則翻下同梁楚之, SBCK: ''}
