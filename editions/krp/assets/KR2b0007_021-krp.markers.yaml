  - {type: variant, offset: 15508, length: 0, content: '', SBCK: 謂惠等屈節辱命雖生何面目以歸漢引佩刀自刺衞律驚自抱持武馳召醫鑿地爲坎置煴火覆武其上蹈其背以出血武氣絶半日復息惠等哭輿歸營單于壯其節朝夕遣人􅇋問武而收繫張勝武益愈單于使使曉武欲降之會論虞常欲因此時降武劒斬虞常巳律曰漢使張勝謀殺單于近臣當死單于募降者赦罪舉劒欲擊之勝請降律謂武曰副有罪當相坐武曰本無謀又非親屬何謂相坐復舉劒擬之武不動律曰蘇君律前負漢歸匈奴幸䝉大恩賜號稱王擁衆數萬馬畜彌山富貴如此蘇君今日降明日復然空以身膏草野誰復知之武不應律曰君因我降與君爲兄弟今不聽吾計後雖欲復見我尚可得乎武罵律曰汝爲人臣子不顧恩義畔主背親爲降虜於蠻夷何以汝爲見且單于信汝使決人死生不平心持正反欲􅃲兩主觀禍敗南越殺漢使者屠爲九郡宛王殺漢使者頭縣北闕朝鮮殺漢使者即時誅滅獨匈奴未耳􅀂知我不降明欲令兩國相攻匈奴之禍從我始矣律知武終不可脅白單于單于愈益欲降之乃幽武置太窖中絶不飲食天雨雪武卧齧雪與旃毛并咽之數日不死匈奴以爲神乃徙武北海上無人處使牧羝曰羝乳乃得歸别其官屬常惠等各置他所天雨白氂夏大旱五月赦天下發謫戍屯五原浞野矦趙破奴自匈奴亡歸}
