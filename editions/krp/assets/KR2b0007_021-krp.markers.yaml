  - {type: variant, offset: 13845, length: 741, content: 謂惠等謂猶語也武語恵等也屈節辱命雖生何面目以歸漢引佩刀自刺刺七亦翻衛律驚自抱持武馳召醫鑿地為坎置煴火師古曰煴謂聚火無燄者也煴于云翻覆武其上師古曰覆身於坎上也覆音方目翻蹈其背以出血武氣絶半日復息師古曰息謂出氣也惠等哭輿歸營單于壯其節朝夕遣人候問武而收繫張勝武益愈單于使使曉武欲降之師古曰喻説令武降也會論虞常欲因此時降武劒斬虞常已律曰漢使張勝謀殺單于近臣師古曰近臣衛律自謂也當死單于募降者赦罪舉劒欲擊之勝請降律謂武曰副有罪當相坐武曰本無謀又非親屬何謂相坐復舉劒擬之復扶又翻下同武不動律曰蘇君律前負漢歸匈奴幸䝉大恩賜號稱王擁衆數萬馬畜彌山師古曰彌滿也畜許又翻富貴如此蘇君今日降明日復然空以身膏艸野膏古號翻誰復知之武不應律曰君因我降與君為兄弟今不聽吾計後雖欲復見我尚可得乎武罵律曰汝為人臣子不顧恩義畔主背親背蒲妹翻為降虜於蠻夷何以汝為見師古曰言何用見汝為也且單于信汝使决人死生不平心持正反欲鬬兩主觀禍敗南越殺漢使者屠為九郡宛王殺漢使者頭縣北闕朝鮮殺漢使者即時誅滅南越事見上卷元鼎五年六年宛事見上太初三年朝鮮事見上元封二年縣讀曰懸獨匈奴未耳若知我不降明師古曰若汝也言汝知我不降明矣欲令兩國相攻匈奴之禍從我始矣律知武終不可脅白單于單于愈益欲降之乃幽武置大窖中師古曰舊米粟之窖而空者也窖工孝翻絶不飲食天雨雪武卧齧雪與旃毛幷咽之師古曰飲於禁翻食讀曰飤雨于具翻齧魚結翻咽音宴吞也數日不死匈奴以為神乃徙武北海上無人處使牧羝曰羝乳乃得歸師古曰羝牡羊也羝不當産乳故設此言示絶其事若燕太子丹烏白頭馬生角之比也羝音丁奚翻乳音人喻翻别其官屬常惠等各置他所天雨白氂師古曰氂毛之彊曲者音力之翻夏大旱五月赦天下發讁戍屯五原五原郡屬并州括地志勝州連谷縣本秦九原郡漢武帝更名五原浞野矦趙破奴自匈奴亡歸太初元年破奴為匈奴所獲, SBCK: ''}
