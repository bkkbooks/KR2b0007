  - {type: punctuation, offset: 9004, content: (, id: KR2b0007_krp_244-bkkpn727}
  - {type: variant, offset: 9004, length: 393, content: 史考異曰補國曰文宗朝劉從諫朝覲渥澤甚厚自謂河朔近無比倫頗矜臣節文武百辟盡湊其門從諫廣行金帛賂諸權要求登台席人情多可相國李公固言獨無一言從諫欲市其歡玉不可染欲諛其意氷不可穿門館不敢導其誠懇遇休假謁於私第投誠瀝懇至於再三相公正色謂曰僕射先君以東平之功鎭潞二十餘年及即世之後僕射擅領戎務生邀朝命朝廷以先君勲績不絶賞延任居蕃閫位劇南宫豈是恩澤降於等倫欲以何事效忠報國僕射若請邉陲一鎭大展籌謀拓境復疆乃為勲業朝廷豈不以衮職之重命賞封功區區躁求一何容易某比謂僕射英雄忠義首冠蕃臣今求佩相印擁節旄榮歸舊藩亦河朔尋常倔彊之臣所措履也忠節安在深為解體從諫矍然噤口無辭再拜趨出然從諫厚賂倖臣旬日間果以本官加平章事遽辭歸鎭宰相餞於郵亭李相公謂曰相公少年昌盛勉報國恩幸望保家勿殃後嗣從諫以笏扣頭灑淚而辭及至本鎭謂從事將校曰昨者入覲闕庭遍觀朝德唯李公峻直貞明凜然可懼眞社稷之重臣也按固言此年未為相其說妄也今從實錄, SBCK: ''}
