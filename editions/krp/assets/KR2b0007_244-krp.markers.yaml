  - {type: variant, offset: 14699, length: 360, content: 金考異曰開成紀事曰五年吾將軍孟文亮出鎭邠郊以與注姻懿之故奏為軍司馬路經奉天防遏使御史大夫王從亮薄其為人不為之禮注毁從亮於守澄竟為守澄誣構决杖投荒未㡬文亮没罷職還城守澄濳置為軍晝時澤潞劉從諫本欲誅注忌其權勢因辟為節度副使纔至潞州渉旬之間㑹上乖愈太和七年十一月驛徴之赴闕偶遭其時聖體獲愈上恱之自此恩寵漸隆凡臺省府縣軍戎莫不從風七年九月十三日侍御史李欵彈注内通勑使外連朝臣兩地徃來卜射財貨晝伏夜動干竊化權人不敢言道路以目城社轉回恐為禍胎罪不容誅理合顯戮其鄭注請付有司時王涯重處台司注之所致又慮守澄黨援遂寢不行注潛遁軍司矣李德裕文武兩朝獻替記曰八年春暮上對宰相歎天下無名醫便及鄭注精於服食或欲置於翰林技術院或欲令為左神䇿判官注自稱衣冠皆不願此職守澄遂託從諫奏為行軍司馬及赴職宗閔又自山南令判官楊儉至澤潞與從諫要約令却薦入今從實錄, SBCK: ''}
