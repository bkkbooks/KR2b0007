  - {type: variant, offset: 767, length: 251, content: 循州古龍川地隋置循州考異曰實録四月李祐收德州同㨗請降於祐祐疑其詐柏耆請以騎兵三百入滄州祐從之耆徑入滄收同㨗與其家屬赴京師又詔曰假勢張皇乘險縱恣指揮彈壓奏報蔑聞擅入滄州專殺大將補署逆校潛送兇渠舊傳曰滄德平諸將害耆邀功争上表論列上不獲已貶循州司户新傳曰同㨗請降祐使萬洪代守滄州同㨗未出也耆以三百騎馳入滄以事誅洪與同㨗朝京師既行諜言王庭湊欲以竒兵刼同㨗耆遂斬其首以獻諸將疾其功比奏攢詆文宗不獲已貶耆循州司户參軍蓋耆張皇邀功則有之然諸將疾之而論奏文宗不得已而貶黜亦其實也至於賜死則因馬國亮奏其受同㨗奴婢綾絹故也, SBCK: ''}
