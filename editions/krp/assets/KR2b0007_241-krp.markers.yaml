  - {type: variant, offset: 9961, length: 250, content: 歐陽脩曰唐故事天子日御殿見羣臣曰常參朔望薦食諸陵寢有思慕之心不能臨前殿則御便殿見羣臣曰入閤宣政前殿也謂之衙衙有仗紫宸便殿也謂之閤其不御前殿而御紫宸也乃自正衙喚仗由閤門而入百官俟朝於衙者因隨而入見故謂之入閤程大昌曰宣政之左有東上閤宣政之右有西上閤二閤在殿左右而入閤者由之而入也西内太極宫兩儀殿左右有東西閤門而兩廊下有日華月華門其曰閤者即内殿也非真有閤也又曰西内太極殿北有兩儀殿即常日視朝之所太極殿兩廡有東西二上閤則是兩閤皆有門可入已又可轉北而入兩儀按程大昌言西内二閤門後説較為明白而宣政殿入閤則東内也諫, SBCK: 退諌}
