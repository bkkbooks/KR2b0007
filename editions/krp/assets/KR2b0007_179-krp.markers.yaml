  - {type: variant, offset: 14044, length: 277, content: 隋書鐵勒之先匈奴之苖裔也種類最多自西海之東依據山谷往往不絶獨洛河北有僕骨同羅韋紇拔也古覆羅並號俟斤蒙陳吐如紇斯結渾斛薛等諸姓勝兵可二萬伊吾以西焉耆之北傍白山則有契弊薄洛職乙咥蘇娑郍曷鳥讙紇骨也咥於尼讙等勝兵可二萬金山西有薛延陁咥勒兒十槃逹契等一萬餘兵康國北傍阿得水則有訶咥曷嶻撥忽比干具海曷比悉何嵳蘇㧞也末渴逹等有三萬餘兵得嶷海東有蘇路羯三索咽蔑促隆忽等諸姓八千餘拂菻東則有恩屈阿蘭比褥九離伏嗢昏等近二萬人北海南則都波等雖姓氏各别總謂為鐵勒並無君長分屬東西兩突厥人性凶忍善於騎射貪婪尤甚以寇抄為生自突厥有國東西征討皆資其用以制北荒迦古牙翻可從刋入聲汗音寒, SBCK: ''}
