  - {type: variant, offset: 0, length: 392, content: 欽定四庫全書資治通鑑卷六十九宋司馬光撰胡三省音註魏紀一起上章困敦盡𤣥黓攝提格凡三年治操破袁尚得冀州遂居於鄴鄴漢之魏郡所魏大名也遂封為魏公又䜟云代漢者當塗高當塗高者魏也文帝受漢禪國遂號魏世祖文皇帝上諱丕字子桓武王操長子也謚法學勤好問曰文世祖廟號也禮祖有功而宗有德諡法景物四方曰世承命不遷曰世靖民則法曰皇明一德者曰皇明一合道曰皇德象天地曰帝案道無為曰帝黄初元年魏受漢禪推五德之運以土繼火土色黄故紀元曰黄初是年十月受禪方改元春正月武王至洛陽庚子薨魏王操謚曰武王知人善察難眩以偽眩者目無常主難眩以偽謂人不能亂其明識拔竒才不拘微賤隨能任使皆獲其用與敵對陳陳讀曰陣意思安閒思相吏翻如不欲戰然及至決機乗勝氣埶盈溢勲勞宜賞不吝千金無功望施施式䜴翻分豪不與豪即亳字用法峻急有犯必戮或對之流涕然終無所赦雅性節儉不好華麗好呼到翻故能芟刈羣雄幾平海内曰幾者以不能并呉蜀也芟所銜翻幾居希翻是時太子在鄴軍中騷動羣, SBCK: ''}
