  - {type: variant, offset: 7130, length: 263, content: 帥讀曰率下同其考異曰邠志曰韓遊瓌使子欽緒扈從懷光知之以戴休顔代領其職仍假遊瓌邠州刺史將使其黨張昕害之遊瓌既失兵柄未知所從説客劉南金曰竊觀人心莫不戀主邠有留甲可以圖變公得之邠殆天假也乃使麾下將范希朝趙懷誘其軍歸邠士皆從之休顔率麾下卒據城門士不得盡出其從遊瓌至邠者八百餘人按舊遊瓌傳無受懷光邠州刺史事休顔傳云及李懷光叛據咸陽使誘休顔休顔集三軍斬其使嬰城自守懷光大駭遂自涇陽夜遁其月拜檢校工部尚書奉天行營節度使且上幸山南命休顔留守奉天遊瓌先𤼵懷光隂謀二人豈更受懷光節度盖當時出幸倉卒遊瓌扈從不及或以與渾瑊有隙不敢南行故率麾下歸邠州耳, SBCK: ''}
