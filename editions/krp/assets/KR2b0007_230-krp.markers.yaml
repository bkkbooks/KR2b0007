  - {type: variant, offset: 12041, length: 312, content: 將即亮翻四考異曰邠志曰興元元年月渾公受鉞專征出斜谷崔公勸吐蕃分軍應援尚結贊曰邠軍不出乘我也韓公使曹子逹帥甲三千赴于渾公吐蕃乃以三萬餘從之李楚琳使石鍠以卒七百人從渾瑊進收武功遂居之十日朱泚使韓旻田旻以卒三千冦武功渾公禦之陳于東郊石鍠以其卒降旻於陳渾公軍敗乃馳登西原建旗收卒㑹邠師以吐蕃至賊不知乃悉衆追渾公遂為吐蕃所覆皆死焉田旻以馬逸獲免吐蕃既勝泚軍乃大掠而去涇人相傳言吐蕃助國有功將以叛卒之孥賞而歸之涇人曰不殺馮公雖吾親族亦將不免矣十四日涇卒殺河清以田希鑒請命於泚泚授希鑒涇原節度大使賜金帛使和西戎西戎皆受賂焉希鑒疏涇將之不與己者以告朱泚請殺之泚曰我曲彼直不許按希鑒殺河清必有宿謀或為此訛言以揺衆耳今從實録河清死在三月今從邠志, SBCK: ''}
