  - {type: variant, offset: 0, length: 271, content: 欽定四庫全書資治通鑑卷八十六宋司馬光撰胡三省音註晉紀八起旃䝉赤奮若盡著雍執徐凡四年孝惠皇帝下永興二年夏四月張方廢羊后游楷等攻皇甫重累年不能克游楷等自太安二年攻皇甫重至是首尾二年重遣其養子昌求救於外昌詣司空越越以太宰顒新與山東連和事見上卷上年不肯出兵昌乃與故殿中人楊篇故殿中人舊屬二衞部曲者詐稱越命迎羊后於金墉城入宫以后令發兵討張方奉迎大駕是年四月張方廢羊后其時方已奉帝入闗蓋以威令遥脇留臺百官使廢羊后耳今皇甫昌迎后入宫欲發兵討方特以是起兵非因方在洛而討之也事起倉猝百官初皆從之俄知其詐相與誅昌顒請遣御史宣詔諭重令降降户江翻下同重不奉詔先是城中, SBCK: ''}
