  - {type: variant, offset: 16438, length: 608, content: 遺于季翻上時掌翻惡烏路翻誘音酉内考異曰明皇雜錄曰慎矜父墓封域之草木流血慎矜大懼問術者史敬思敬思曰禳之可以免於慎矜後園大陳法事令貫桎梏坐於叢林間以厭之唐厯云敬思本胡人出家還俗涉獵書傳陰陽𤣥象慎矜與之善毎言天下將亂居於臨汝山中亦勸慎矜於臨汝買得山莊良田數十頃嘗於慎矜第夜坐談宴怒婢春草將杖殺之敬思曰七郎何須虚殺却十頭壯牛慎矜曰何謂也敬思曰賣却買牛每年耕田十頃慎矜雅厚敬思曰任公收取明曰至市賣與大真柳氏姊得錢百二十千文買牛以歸柳氏數將春草来往宫中𤣥宗見其狀貌壯大應對分明數目之謂柳曰幾錢買得此婢以實對遂留之𤣥宗曾晝寢問春草曰汝木何人何以得至柳家春草曰本楊慎矜婢賣與柳家𤣥宗曰慎矜豈少錢而賣你春草曰不是要錢木将殺某敬思救得不殺所以賣之𤣥宗素聞敬思名因詰問春草以實對曰每夜坐中庭或説天文遙指宿曜某亦盡知其言𤣥宗怒變色良久後王鉷因奏事言引慎矜𤣥宗勃然曰慎矜與卿有親更不須相往來鉷初内怨慎矜凌已常隠忍不泄至是覺上意異楊釗先知之以告鉷鉷心喜數悖慢似侵之慎矜尤怒明皇雜録又曰慎矜之婢有美者字明珠敬思數目之慎矜即以遺之兼以囊槖甚厚以車送之敬思乗馬隨之路經貴妃妹八姨樓下方登樓張樂姨素與敬思相識固邀敬思登樓乃曰車中美人請以見遺敬思不敢拒姨明日入宫婢從上見而異之問所從來明珠曰本楊慎矜家人也近贈史敬思上曰敬思何人而慎矜輒贈以婢明珠乃具言厭勝之事上大怒曰彼為妖乎遂告林甫林甫素忌慎矜才恐其作相以告中丞吉温温險害亦有憾于慎矜因構成其事今參取書之, SBCK: ''}
