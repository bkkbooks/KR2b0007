  - {type: variant, offset: 17978, length: 329, content: 間古莧翻屬考異曰明皇雜錄云上與李林甫議立太子意忠王林甫從容言于上曰古者建立儲君必推賢德茍非有大勲於社稷則惟元子上黙然曰朕長子琮往年因獵苑中所傷面目尤甚林甫曰破面不猶愈於破國乎陛下其圖之上微感其言徐思之林甫亦素知其有疾意欲動搖肅宗而託附武惠妃因以夀王瑁為請竟以肅宗孝友聰明中外所屬故姦邪之計莫得行焉按是時忠王若未為太子上用林甫之言則琮為太子矣安能及瑁新書林甫傳云林甫數危太子未得志一日從容曰古者立儲君非冇大勲于社稷則莫若元子帝乆之曰慶王獵為豽傷面甚荅曰破面不愈於破國乎帝頗惑曰朕徐思之此則情理似近然新書此事必出于雜錄若太子已立則不當云止與林甫議立太子意屬忠王也今雜錄本於所傷字上脱為豽兩字别本必有之按説文豽獸名無前足此非常有之物或者豹字誤為豽字耳事既可疑今不取, SBCK: ''}
