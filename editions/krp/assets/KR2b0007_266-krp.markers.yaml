  - {type: variant, offset: 6882, length: 246, content: 唐考異曰大祖紀年録太祖以安巴堅族黨稍盛召之天祐二年五月安巴堅領其部族三十萬至雲州東城帳中言事握手甚歡約為兄弟旬日而去留男果勒圖錫里首領濟必羙楞為質約冬初大舉渡河反正㑹昭宗遇盜而止歐陽史曰梁將簒唐晉王李克用使人聘于契丹安巴堅以兵三十萬㑹克用於雲州東城握手約為兄弟期共舉兵擊梁按雲州之㑹莊宗列傳薛史皆在天祐四年而紀年録獨在天祐二年又云約今年冬同收汴洛㑹昭宗遇盜而止如此則應在天祐元年昭宗崩已前不應在二年也且昭宗遇盜則尤宜興兵討之何故止也唐室為賊臣所簒此乃四年語也其冬武皇寢疾蓋以此不果出兵耳今從之, SBCK: ''}
