  - {type: variant, offset: 10849, length: 334, content: 臨考異曰五代史闕文世傳武皇薨以三矢付莊宗曰一矢討劉仁恭汝不先下幽州河南未可圖也一矢擊契丹且曰安巴堅與吾把臂而盟結為兄弟誓復唐家社稷今背約附梁汝必伐之一矢滅朱溫汝能成善志死無恨矣莊宗藏三矢於武皇廟庭及討劉仁恭命幕吏以少牢告廟請一矢盛以錦囊使親將負之以為前驅凱旋之日隨俘馘納矢於太廟伐契丹滅朱氏亦如之按薛史契丹傳荘宗初嗣位亦遣使告哀賂以金繒求騎軍以救潞州契丹荅其使曰我與先王為兄弟兒即吾兒也寧有父不救子邪許出師㑹潞平而止廣本劉守光為守文所攻屢求救於晉晉王遣將部兵五千救之然則此時荘宗未與契丹及守光為仇也此蓋後人因莊宗成功撰此事以誇其英武耳余按晉王實怨燕與契丹垂沒以屬荘宗容有此理莊宗之告哀於安巴堅與遣兵救劉守光此兵法所謂將欲取之必固與之也其心豈忘父之治命哉觀後來之事可見已, SBCK: ''}
