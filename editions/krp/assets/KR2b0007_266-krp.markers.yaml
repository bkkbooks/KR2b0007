  - {type: variant, offset: 5199, length: 959, content: 歐陽修曰契丹君長曰達呼哩後分為八部一曰達爾扎部二曰伊斯琿部三曰舍琿部四曰諾爾威部五曰頗摩部六曰訥古濟部七曰濟勒勤部八曰實袞部部之長號大人路振九國志契丹古匈奴之種也代居遼澤之中潢水南岸南距榆關一千一百里榆關南距幽州七百里考異曰蘓逢吉漢髙祖實録曰契丹本姓大賀氏後分八族一曰利皆邸二曰乙失活邸三曰實活邸四曰納尾邸五曰頻沒邸六曰内㑹雞邸七曰集解邸八曰奚嗢邸管縣四十一縣有令八族之長皆號大人稱刺史常推一人為王建旗鼔以尊之毎三年第其名以相代莊宗列傳曰咸通末其王曰習爾疆土稍大累來朝貢光啟中其王曰欽徳乗中原多故北邊無備遂蠶食諸部達靼奚室韋之屬咸被驅役漢髙祖實録唐餘録皆曰僖昭之際其王邪律安巴堅怙强恃勇距諸侯不受代自鼔號天皇王後諸族邀之請用舊制安巴堅不得已傳旗且曰我為長九年所得漢又頗衆欲以古漢城領本族率漢人守之自為一部諸部諾之俄設䇿復併諸族僣稱皇帝土地日廣大順中後唐武皇遣使與之連和大㑹於雲州東城延之帳中約為昆弟莊宗列傳又曰及欽徳政衰安巴堅族盛自稱國王天祐二年大冦我雲中太祖遣使連和因與之面㑹於雲州東城延入帳中約為兄弟謂曰唐室為賊臣所簒吾以今冬大舉弟助以國我精騎二萬同收汴洛安巴堅許諾安巴堅既還欽徳事傳之賈緯備史云武皇㑹保機故雲州城結以兄弟之好時列兵相去五里使人馬上持杯徃來以展酬酢之禮安巴堅喜謂武皇曰我蕃中酋長舊法三年則罷若它日見公復相禮否武皇曰我受朝命鎮太原亦有遷移之制但不受代則可何憂罷乎安巴堅由此用其教不受諸族之代趙志忠虜庭雜紀云太祖諱億畨名安巴堅父色勒迪太祖生而智八部落主愛其雄勇遂退其主約尼氏歸本部立太祖為王又云凡立王則衆部酋長皆集㑹議其有徳行功業者立之或災害不生羣牧孶盛人民安堵則王更不替代茍不然其諸酋㑹衆部别選一名為王故王以畨法亦甘心退焉不為衆所害又曰有韓知古韓潁康枚王奏事王郁皆中國人共勸太祖不受代新唐書載契丹八部名與漢髙祖實録所載八部名多不同蓋年紀相逺虜語不常耳其實一也安巴堅云我為長九年則其在國不受代久矣非因武皇之教也今從漢髙祖實録又唐餘録前云乾寧中劉仁恭鎮幽州安巴堅入冦仁恭擒其妻兄舒嚕阿巴由此十餘年不能犯塞下乃云大順中與武皇㑹於雲中按大順在乾寧前乾寧二年仁恭方為幽州節度大順中末也又武皇謂曰唐室為賊臣所簒吾以今冬大舉此非大順中事唐餘録誤也又編遺録開平二年五月契丹主安巴堅及前國王欽徳貢方物然則於時七部猶在也, SBCK: ''}
