  - {type: variant, offset: 3049, length: 849, content: 涪陵縣漢屬巴郡蜀分置涪陵郡唐之涪州宋白曰涪州涪陵郡漢為涪陵縣地蜀先主以地控江源於此立涪陵郡領漢平漢葭二縣四夷縣道記云故城在蜀江之南涪江之西其涪江南自黔中來由城之西泝蜀江十五里有雞鳴峽上有枳城即漢枳縣也李雄據蜀後枳縣荒廢桓温定蜀别立枳縣於今郡東北十里周武帝保定四年涪陵首領田思鶴歸化於故枳城立涪陵鎮隋開皇三年移漢平縣於鎮城仍改漢平為涪陵縣因鎮為名唐為涪州元和三年以涪州疆理與黔中接近勑𨽻黔中按華陽國志云涪陵巴之南鄙從枳縣入泝涪水秦司馬錯由之取楚黔中地漢興常為都尉理山險水灘人多獽蜑唯出丹漆蜜枳縣即涪州所理漢建安中涪陵謝本以涪陵廣大白州牧劉璋分置丹興漢葭二縣以為郡璋乃分涪陵立永寧兼丹興漢葭合四縣置屬國都尉理涪陵蜀先主改為郡改永寧曰萬寧又増立漢復縣後主又立漢平縣晉太康地志省丹興縣郡移理漢復又言萬寧在郡南水道九百里其萬寧蓋今費州是蜀後主延熈中涪陵大姓徐巨反鄧艾討平之漢涪陵蓋在今涪州東南三百三十里黔州是其故理在江之東又言漢復縣北至涪陵九十里蓋今黔州所管洪杜縣是其故理又言漢葭在郡東百里澧源出界蓋今州東九十里故黔州城是其丹興縣蓋在今黔州東二百里黔江縣是又按漢平縣在今涪州東百二十里羅浮山之北岷江之南白水入江處側近又按十三州志枳在郡東北涪陵在郡東按今黔州亦與巴郡東南相抵據謝本所論晉志所云今夷費思播及黔府等五州悉是涪陵故地又隋圖經黔中是武陵郡酉陽縣地按漢酉陽在今溪州犬鄉縣界與黔州約相去千餘里今三亭縣西北九百餘里别有酉陽城乃劉蜀所置非漢之酉陽隋圖經及貞觀地志並言蜀所置酉陽為漢酉陽蓋誤認漢涪陵之地也自永嘉後没於夷獠元魏後圖記不𫝊至後周田思鶴歸化初於其地立奉州續改黔州大業中又改黔安郡因周隋州郡名遂與秦漢黔中郡交牙難辨其秦黔中郡理在今辰州西二十里黔中故城是漢改黔中為武陵郡移治義陵即今辰州叙浦縣是後漢移理臨沅即今朗州所理是今辰錦叙奨溪澧朗施八州是秦漢黔中郡地與今黔州及夷費思播隔越峻嶺東有沅江水及諸溪並合而東注洞庭湖嶺西有巴江水一名涪陵江自牂柯北歴播費思黔等州北注岷江以山川言之巴郡之涪陵與黔中故地炳然自分矣, SBCK: ''}
