  - {type: punctuation, offset: 9036, content: (, id: KR2b0007_krp_246-bkkpn745}
  - {type: variant, offset: 9036, length: 837, content: 文考異曰舊紀開成五年八月十七日𦵏宗于章陵知樞密劉𢎞逸薛季稜率禁軍䕶靈駕二人素為文宗奬遇仇士良惡之心不自安因是欲倒戈誅士良𢎞志鹵簿使王起山陵使崔鄲覺其謀先諭鹵簿諸軍是日𢎞逸季稜伏誅以楊嗣復為湖南觀察使李珏為桂管觀察使中丞裴夷直為杭州刺史皆坐𢎞逸季稜也賈緯唐年補錄曰五年八月云是月誅樞密使劉𢎞逸薛季稜帝即位尤忌宦官季稜𢎞逸深懼之及將葬文宗于章陵聚禁兵欲議廢立賴山陵使崔鄲鹵簿使王起拒而獲濟遂擒𢎞逸季稜殺之舊王起傳八月充山陵鹵簿使樞密使劉𢎞逸薛季稜懼誅欲因山陵兵士謀廢立起與山陵使知其謀密奏皆伏誅舊嗣復傳五年九月貶湖南明年誅季稜𢎞逸中人言二人頃附嗣復李珏不利于陛下武宗性急立命中使往湖南桂管殺嗣復與珏按去年八月若已誅𢎞逸季稜不當至此月始再貶嗣復等舊紀王起傳與嗣復傳自相違今從實錄實錄又曰時有再以其事動帝意者帝赫怒欲殺之中使既𤼵雖宰相亦不知之户部尚書判度支杜悰奔馬見徳裕云云舊嗣復傳曰宰相崔鄲崔珙等亟請開延英極言云云獻替記曰㑹昌元年三月二十四日遇假在宅向晚聞有中使一人向東一人向南處置二故相及裴夷直余遣人問鹽鐵崔相度支杜尚書京兆盧尹皆云聞有使去不知其故余遂草約奏狀二十五日早入中書崔相珙續至崔鄲次至陳相最後至己巳時矣余令三相㑹食自歸㕔寫狀請開延英賜對進狀後更無報答至午又自寫第二狀封進兼請得樞宻使至中書問有此事無樞密使對曰向者不敢言相既知只是二人嗣復李珏徳裕言此事至重陛下都不訪問便遣使去物情無不驚懼請附徳裕奏聖㫖若疑徳裕情故請先自逺貶惟此一事不可更行徳裕等至夜不敢離中書請早開延英賜對至中時報開延英余邀得丞相兩省官謂曰上性剛若有一人進狀伏問必不捨矣容徳裕極力救解繼以叩頭流血徳裕救不得它人固不可矣及召入延英徳裕率三相公立當御榻奏事嗚咽流涕云云上既捨之又令徳裕召丞郎兩省官宣示今從實錄亦采獻替記宋白曰天福六年修撰起居注賈緯奏伏覩史館唐髙祖至代宗已有紀傳徳宗亦存實錄武宗至濟隂廢帝凡六代惟有武宗實錄一卷餘皆闕落臣今采訪遺文及耆舊傳説編六十五卷目為唐年補遺錄以備將來史館修述詔褒美付史館, SBCK: ''}
