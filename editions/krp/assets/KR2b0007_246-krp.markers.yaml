  - {type: variant, offset: 10910, length: 358, content: 為考異曰舊紀八月烏介遣使告故可汗死部人推可汗今奉公主南投大國時烏介至塞上嗢沒斯與赤心相攻殺赤心率數千帳近西城田牟以聞烏介又令其相頡干迦斯表借天徳城仍乞糧儲牛羊詔王㑹李師偃往宣慰令放公主入朝賑粟二萬石舊徳裕傳曰開成末回鶻為黠戛斯所破部族離散烏介奉太和公主南來㑹昌二年二月牙于塞上遣使求助兵糧收復本國權借天徳軍田牟請以沙陀退渾諸部擊之下百寮議議者多云如牟之奏徳裕云云帝以為然許借米三萬石伐叛記曰㑹昌元年二月回鶻逺涉沙漠饑餓尤甚將金寳于塞上部落博糴糧食邊人貪其財寳生攘奪之心至其年秋城使田牟監軍韋仲平上表稱退渾党項與回鶻宿有嫌怨願出本部兵馬驅逐其時天徳城内只有將士一千人職事又居其半上令宰臣商量徳裕面奏云云八月二十四日請賜田牟仲平詔漢兵及番渾不得先犯回鶻語在㑹要集奏狀中按舊紀實錄皆采集衆書為之事前後多差互今從伐叛記一品集, SBCK: ''}
