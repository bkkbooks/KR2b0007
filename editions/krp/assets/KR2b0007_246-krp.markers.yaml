  - {type: variant, offset: 15764, length: 843, content: 太考異曰實錄六月回鶻冦雲州劉沔出原兵禦之又云劉沔救雲州為回鶻所敗七月又云烏介過天徳至把頭烽突入大同川驅太原部落牛馬數萬轉戰至雲州新紀正月回鶻冦横水撫畧天徳振武軍三月回鶻冦雲朔六月劉沔及回鶻戰于雲州敗績按一品集奏回鶻事宜狀臣等見楊觀説緣回鶻赤心下兵馬多散在山北恐與奚契丹室韋同邀截可汗所以未敢逺去今因賜仲武詔令諭以朝㫖緣回鶻曽有忠效又因殘破歸附國家朝廷事體須有存恤令奚契丹等與其同力討除赤心下散卒遣可汗漸出漢界免有滯留此狀雖無日月約須在楊觀自回鶻還赤心死那頡啜未敗前也又賜可汗書云一昨數使却回皆言可汗只待馬價及令交付之次又聞所止屢遷則是可汗邀求馬價而朝廷于此盡以給之也又七月十九日狀云望賜可汗書得嗢沒斯表稱在本國之時各有本分馬其馬價絹並合落下請充進奉以可汗本國殘破乆在邉陲此已量與嗢沒斯優當其嗢沒斯以下本分馬價絹便賜可汗然則給其馬價必在七月十九日前當是時回鶻必未冦雲州敗劉沔突入大同川掠太原牛馬故朝廷曲徇所求欲其早離塞下北去尚未有攻討之意也又實錄八月壬戌朔李徳裕奏請遣石雄斫營取公主擒可汗戊辰又奏斫營事令且住辛未詔𤼵陳許徐汝襄陽兵屯太原振武天徳救援按一品集徳裕論討襲回紇狀云臣頻奉聖㫖緣回鶻漸逼杷頭烽早須討襲臣比知戎虜不解攻城只知馬上馳突臣料必無遊奕伏道又不㑹斫營儻令石雄以義武馬軍兼退渾馬騎精選步卒以為羽翼衘枚夜襲必易成功狀無月日實錄據七日狀云今月一日所商量石雄斫營事望且令住故置之朔日耳此時猶云漸逼杷頭烽則是尚未知過杷頭烽南也又八月七日論回鶻事宜狀云回鶻自至杷頭烽北已是數旬奏報寂然更無侵軼察其情狀只與在天徳振武界首不殊臣等今月一日所商量石雄斫營事望且令住更審候事勢據此狀意則是殊未知可汗深入犯雲州也又八月十日請𤼵陳許等兵狀云臣等昨日已于延英面奏請太原振武天徳各加兵備請更徴𤼵陳許徐汝襄陽等兵至河冰合時深慮可汗突出過河兼與吐蕃連結則為患不細深要防虞其所徴諸道兵恐不可停須令及冰未合各到所在然則回鶻突入大同川犯雲州必在八月之初一日七日猶未知九日始奏到故議𤼵兵守備驅逐實錄新紀皆誤今從舊紀, SBCK: ''}
