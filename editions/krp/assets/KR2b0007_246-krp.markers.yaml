  - {type: variant, offset: 5734, length: 373, content: 異考曰唐闕史曰武宗皇帝王夫人者燕趙倡女也武宗為潁王獲愛幸文宗于十六宅西别建安王溶潁王瀍陀上數幸其中縱酒如家人禮及文宗晏駕後宫無子所立敬宗男陳王年幼且病未任軍國事中貴主禁掖者以安王大行親弟既賢且長遂起左右神䇿軍及飛龍羽林驍騎數千衆即藩邸奉迎安王中貴遥呼曰迎大者迎大者如是者數四意以安王為兄即大者也及兵仗至二王宅首兵士相語曰奉命迎大者不知安潁孰為大者王夫人竊聞之擁髻褰裙走出矯言曰大者潁王也大家左右以王魁梧頎長皆呼為大王且與中尉有死生之契汝曹或誤必赤族矣時安王心云其次第合立志少疑懦懼未敢出潁王神氣抑揚隠于屏間夫人自後聳出之衆惑其語遂扶上馬戈甲霜擁前至少陽院諸中貴知己誤無敢出言者遂羅拜馬前連呼萬嵗尋下詔以潁王瀍立為皇太弟權句當軍國事新后妃傳曰武宗賢妃王氏開成末王嗣帝位妃隂為助畫故進號才人蓋亦取於闕史也按立嗣大事豈容繆誤闕史難信今不取從文宗武宗實録, SBCK: ''}
