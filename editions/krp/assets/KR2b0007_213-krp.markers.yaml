  - {type: variant, offset: 13776, length: 296, content: 玼考異曰新書烏承傳云可突干殺其王邵固降突厥而奚亦亂是嵗奚契丹入冦詔承玼擊之破於捺禄山又云勃海大武藝行兵至馬都山屠城邑承玼窒要路塹以大石亘四百里於是流人得還土少休脱鎧而耕嵗省度支運錢按韓愈為烏重􅏷作廟碑叙重𦙍父承洽云屢破契丹從戰捺禄走可突干勃海上至馬都山吏民逃徙失業尚書領所部兵塞其道塹原累石綿四百里深髙皆三丈冦不得進民還其居嵗罷錢三千萬疑新書約此碑作承玼傳按新舊帝紀及勃海傳皆無武藝入冦至馬都山事或者韓碑云走可突干勃海上至馬都山謂破走可突干勃海上追之至馬都山耳二十一年郭英傑與可突干戰都山然則都山葢契丹之地也吏民逃徙失業葢因可突干入冦而然與上止是一事新書承之致誤然未知新書承玼傳中餘事别據何書, SBCK: ''}
