  - {type: variant, offset: 1572, length: 387, content: 上考異曰令狐峘代宗實録云以開元十四年十月十三日生時𤣥宗幸汝州之温湯有望氣者云宫中有天子氣𤣥宗即日還宫是夜代宗降誕按𤣥宗實録此月十六日庚申始幸温湯己巳乃還宫與代宗實録不同舊紀云十二月十三日生舊后妃傳章敬皇后吳氏坐父事沒入掖庭開元二十三年𤣥宗幸忠王邸見王服御蕭然傍無勝侍命將軍髙力士選掖庭宫人以賜之而吴后在籍中明年生代宗皇帝十八年薨按代宗此年生而云二十三年以吴后賜忠王十八年薨葢誤以十三年為二十三年也以柳氏舊聞肅宗在東宫為李林甫所構勢幾危者數矣無何鬚鬂斑白嘗早朝上見之愀然曰汝歸第吾當幸汝及上至顧見宫庭殿宇皆不灑掃而樂器塵埃左右使令無有妓女上為之動色使力士詔掖庭閱視得三人乃以賜太子而章敬吴皇后在選中生代宗按開元二十三年李林甫初為相二十五年廢太子瑛二十六年乃立肅宗為太子天寳五年李林甫始構韋堅之獄舊聞所記事皆虚誕年月不合新書后妃傳全取之今皆不取有按漢廣成苑在唐汝州梁縣界其地湯泉, SBCK: ''}
