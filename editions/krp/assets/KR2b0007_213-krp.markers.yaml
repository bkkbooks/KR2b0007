  - {type: variant, offset: 977, length: 403, content: 復扶又翻上考異曰唐㑹要云侍御史潘好禮聞欲以恵妃為皇后進疏諫曰臣聞禮記曰父母之讐不可共戴天公羊傳曰子不復父讐不子也昔齊襄公復九世之讐丁蘭報木母之怨陛下豈得欲以武氏為國母當何以見天下之人乎不亦取笑於天下乎又恵妃再從叔三思再從父延秀等並干紀亂常遞窺神器豺狼同穴梟獍共林且匹夫匹婦欲結髪為夫妻者尚相揀擇况陛下是累聖之貴天子之尊乎伏願詳察古今鑒戒成敗慎擇華族之女必在禮義之家稱神祇之心允億兆之望又見人間盛言尚書右丞相張説自被停知政事之後毎諂附恵妃欲取立后之功更圖入相之計伏願杜之於将漸不可悔之於巳成且太子本非恵妃所生恵妃復自有子若恵妃一登宸極則儲位實恐不安古人所以諫其漸者良為是也昔商山四皓雖不食漢庭之禄尚能輔翊太子况臣愚昧職忝憲府蘇冕駮曰此表非潘好禮所作且好禮先天元年為侍御史開元十二年為温州刺史致仕表是十四年獻而云職忝憲府若題年恐錯則武恵妃先天元年始年十四王皇后有寵未衰張説又未為右丞相竟未知此表是誰獻之今除其名, SBCK: ''}
