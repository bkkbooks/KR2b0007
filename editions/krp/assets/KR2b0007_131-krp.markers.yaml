  - {type: variant, offset: 1324, length: 968, content: 任音壬荷下可翻自宋以來率謂江州為九江晁氏志曰太湖一湖而曰五湖昭餘祁一澤而曰九澤九江一水而曰九江余按書禹貢曰荆及衡陽惟荆州江漢朝宗于海九江孔殷孔安國注曰江於此州界分為九道甚得地勢之中漢書地理志廬江郡尋陽縣禹貢九江在南皆東合於大江應劭曰江自廬江尋陽分為九尋陽地記曰九江一曰烏江二曰蜯江三曰烏白江四曰嘉靡江五曰畎江六曰源江七曰廩江八曰提江九曰箘江張須元九江圖云一曰三里江二曰五州江三曰嘉靡江四曰烏土江五曰白蚌江六曰白烏江七曰箘江八曰沙提江九曰廪江參差隨水長短或百里或五十里始於鄂陵終於江口㑹於桑落洲太康地記曰九江劉歆以為湖漢九水入彭蠡澤也夏撰曰據此數説皆謂江水至是分為九道獨曽氏謂為不然曽氏謂下文導江過九江至于東陵東迤北㑹為匯説者謂東陵巴陵也盖今巴陵與夷陵相為東西夷陵一曰西陵則巴陵為東陵可知許慎曰迤邪行也今江水過洞庭至巴陵而後東北邪行合於彭蠡即經所謂過九江至于東陵東迤北㑹為匯也由是觀之九江不在潯陽明矣所謂九江者盖今洞庭也考之前志沅水漸水潕水辰水叙水酉水醴水湘水資水皆合洞庭中東入于江所謂九江者豈非此乎宋白曰江州潯陽郡禹貢九江孔殷彭蠡既瀦彭蠡在州南東五十三里九江在州西北二十五里是也然則彭蠡以東為揚州之域九江以西即荆州之域周景式廬山記云柴桑彭蠡之郊古三苗國舊属廬江地又案尋陽記云春秋時為呉之西境楚之東境本在大江之北今蘄州界古蘭城是也秦并天下以此属廬江郡漢属淮南國後漢為豫章廬江二郡之境三國之時此地雖為督䕶要津而未立郡呉但分尋陽𨽻武昌晉初尋陽猶理江北温嶠移於此始置尋陽郡隋為九江郡余按秦并天下置九江郡項羽封黥布為九江王都六漢地理志所謂九江在潯陽縣南沈約宋志尋陽本縣名因水名縣水南注江二漢属廬江吳立蘄春郡尋陽縣属焉此時尋陽之地在江北晉亂立尋陽郡後郡治於柴桑而尋陽之名遂移於江南晉惠帝置江州治豫章成帝移江州治尋陽時人盖因漢志所謂九江在尋陽縣南而尋陽又為江州治所遂謂尋陽為九江若禹貢之九江其地實難考見若必以夷陵為西陵遂以巴陵為禹貢之東陵摭取㑹洞庭之水為九江考之前志㑹洞庭者不止九水而酈道元水經注謂廬江郡有東陵鄉江夏有西陵縣故是言東尚書云江水過九江至于東陵者也西南流水積為湖湖西有青林山又考水經注自沔口以下有湖口水加湖江水武口水烏石水舉水巴水希水蘄水利水皆南流注于江而後至青林水口亦可傳合九水之説但未敢以為是九河之迹至漢已不可悉考而欲彊為九江之説難矣, SBCK: ''}
