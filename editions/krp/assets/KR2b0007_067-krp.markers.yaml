  - {type: variant, offset: 0, length: 265, content: 欽定四庫全書資治通鑑卷六十七宋司馬光撰胡三省音註漢紀五十九起閼逢敦牂盡柔兆涒灘凡三年孝獻皇帝壬建安十九年春馬超從張魯求兵北取凉州魯遣超還圍祁山姜敘告急於夏侯淵諸將議欲須魏公操節度淵曰公在鄴反覆四千里比報敘等必敗非救急也比必寐翻遂行使張郃督步騎五千為前軍郃古合翻又曷閤翻超敗走韓遂在顯親顯親縣屬漢陽郡班志無之盖光武所置以封竇友賢曰顯親故城在今秦州成紀縣東淵欲襲取之遂走淵追至畧陽城去遂三十餘里諸將欲攻之或言當攻興國氐魏畧曰建安中興國氐王阿貴百頃氐王千萬各有部落萬餘從馬超為亂超破之後阿貴為夏侯淵所攻滅千萬南入蜀淵以為遂兵精興國城固攻, SBCK: ''}
