  - {type: variant, offset: 288, length: 238, content: 為愬乗虚取蔡張本長考異曰舊傳曰愬沈勇筭推誠待士故能用其卑弱之勢出賊不意居半嵗知人可用乃謀襲蔡表請濟師詔以河中鄜坊騎兵二千人益之鄭澥平蔡録曰正月二十四日甲申公至所部先是士卒經萬勝蕭陂鐵城之敗人心皆惴恐不敢言戰公佯曰戰爭非吾所能既而隂召大將計其事是時公以表請徑襲元濟人皆笑其説乃使觀察判官王擬請師闕下詔徵義成河中鄜坊馬歩共二千以補其闕据此則是始至便請益兵又二月即擒丁士良降呉秀珠是不待半嵗然後知人可用舊傳恐誤然愬宻謀襲蔡豈可先洩之而云以表請襲元濟人皆笑其説則是人人知之恐非也今不取, SBCK: ''}
