  - {type: variant, offset: 17209, length: 1, content: 為, SBCK: 爲}
  - {type: variant, offset: 17215, length: 545, content: 之立考異曰舊傳云嘉運請懷道之子昕為可汗以鎮撫之莫賀逹干不肯曰討平蘇禄本是我之元謀若立史昕為主則國家何以酬賞於我乃不立史昕便令莫賀逹干統衆二十七年嘉運詣闕獻俘仍令將吐火仙獻于太廟㑹要二十九年以解瑟羅之子昕為可汗遣兵送之天寳元年昕至碎葉西南俱南城為莫賀咄逹干所殺三年安西節度使馬靈詧斬之更立其酋長為在地米里骨咄禄毗伽可汗按實録開元二十八年三月甲寅葢嘉運俘吐火仙來獻四月辛未冊十姓可汗阿史那昕妻李氏為交河公主十二月乙夘突騎施可汗莫賀逹干率其妻子及纛官首領百餘帳内屬初莫賀逹干與烏蘇萬洛扇誘諸蕃叛于我上命葢嘉運宣恩招諭皆相率而降新傳云逹干不肯立昕即誘部落叛詔嘉運招諭乃率妻子等降遂命統其衆後數年復以昕為可汗遣兵䕶送昕至俱闌城為莫賀咄所殺莫賀咄自為可汗安西節度使天䝉靈詧誅斬之若如舊傳所言嘉運便以莫賀逹干為可汗統衆則莫賀不應復叛且立可汗當須朝廷冊命嘉運豈得擅立于塞外也若未以為可汗則實録十二月不應謂突騎施可汗莫賀逹干也若如㑹要所言二十九年始立昕為可汗則實録二十八年四月不應已謂昕為十姓可汗也葢嘉運既平突騎施即奏立昕為十姓可汗故莫賀逹干不服而叛明皇乃以莫賀逹干為小可汗止統突騎施之衆使嘉運招諭之故來降然昕為十姓可汗兼統諸部故明皇遣兵送之而為莫賀逹干所殺事或然也但實録脱略疑不敢質故略采諸書所見存其梗槩書, SBCK: ''}
