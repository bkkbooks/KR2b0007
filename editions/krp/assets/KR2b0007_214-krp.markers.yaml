  - {type: variant, offset: 4576, length: 1140, content: 守考異曰𤣥宗實録四月辛亥張珪奏禄山統戎失律挫敗軍威請依軍法决斬許之禄山臨刑抗聲言曰兩蕃未和忍殺壮士豈為大夫謀也守珪以禄山嘗㨗於擒生聞其言遂捨之以聞肅宗實録云禄山為互市牙郎盗羊事發守珪怒追捕至欲擊殺之禄山大呼曰大夫不欲滅奚契丹兩蕃邪而殺壮士守珪竒其貌壮其言遂釋之姚汝能作禄山事迹其盗羊事與肅宗實録同又云二十一年守珪令禄山奏事中書令張九齡見之謂裴光庭曰亂幽州者此胡也又云二十四年禄山為平盧將討奚契丹失利守珪奏請斬之九齡批曰穰苴出征必誅荘賈孫武行令亦斬宫嬪守珪軍令若行禄山不宜免死𤣥宗惜其勇鋭但令免官白衣展効九齡奏請誅之𤣥宗曰卿豈以王夷甫識石勒使臆斷禄山難制邪竟不誅之孫樵作西齋録其序曰張守珪以安禄山叛者何貸刑咈教稔禍階也禄山乃張守珪部將嘗犯令張曲江令守珪斬之不從果使亂天下故書曰張守珪以安禄山叛舊張九齡傳云張守珪以禆將安禄山討奚契丹敗衂執送京師請行朝典九齡奏劾曰穰苴出軍必誅莊賈孫武教戰亦斬宫嬪守珪軍令必行禄山不宜免死上特捨之九齡奏曰禄山狼子野心面有逆相臣請因罪戮之冀絶後患上曰卿勿以王夷甫知石勒故事誤害忠良遂放歸蕃新傳語裴光庭事如事迹執送京師事如舊傳舊禄山傳盗羊事如事迹而無失利請斬事新傳亦然舊傳仍云二十年守珪為幽州節度使禄山盗羊事覺按裴光庭二十一年卒是年冬九齡乃為相云與光庭語誤也孫樵云曲江令守珪斬之尤為失實實録二十一年守珪猶在隴右與吐蕃立分界碑未至幽州舊傳云二十年為節度亦誤也按禄山若始為互市牙郎守珪安能知其終亂天下釋而不殺孫樵豈得以叛罪加之邪若如舊九齡傳守珪執送京師𤣥宗自赦之則守珪何罪而時人咎之也若謂盗羊䘮師兩次當死則禄山豈祇用辭而得免兩死邪若如𤣥宗實録守珪奏請行法得報聽許感其一言輙舍之則守珪必不敢輕易反覆如此且九齡何從而得見其面而云面有逆相邪若云守珪未嘗奏請行灋則張九齡集有賜守珪敕云禄山等輕我兵威曽不審料致令損失宜其就誅卿既行之軍灋合爾又賜平盧將士敕云安禄山之誅緣輕敵太過勿因此畏懦致失後圖是當時曽許之行誅矣若云守珪自捨之非𤣥宗意則又賜守珪敕云禄山勇而無謀遂至失利衣甲資盗挫我軍威論其輕敵合加重罪然初聞勇鬭亦有誅殺又冦戎未滅軍令從權故不以一敗棄之將欲收其後效也不行薄責又無所懲宜且停官令白衣將領卿更審量本状亦任隨事處之今以諸書參考葢禄山失律守珪奏請行灋故前敕云卿既行之軍灋合爾又云禄山之誅緣輕敵太過似謂守珪已誅之矣既而守珪感其言惜其驍勇欲殺則不忍欲捨則已先奏聞且恐不能厭服將士之心或者報未到故執送京師使上自裁之冀上見其材力而赦之亦猶陳平執樊噲衛青囚蘇建耳上因是欲赦之而九齡執奏云守珪軍令若行禄山不宜免死是并劾守珪不斷於閫外乃更執以諉上之辭也九齡因此見之而云面有逆相上終欲赦之故九齡不得已草敕云卿更審量本状隨事處之守珪得此敕即捨之以聞如此則與𤣥宗實録相應而於人情差似相近, SBCK: ''}
