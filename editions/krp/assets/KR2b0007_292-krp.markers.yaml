  - {type: variant, offset: 13119, length: 600, content: 奉考異曰湖湘故事云王逵詔伐呉有蜜蜂無萬數集逵繖葢周行逢内喜潛與潘叔嗣張文表等謀曰我覩王公妖怪入繖他時忽落别人之手我輩處身何地我等若三人同心共保馬氏舊基同處富貴豈不是男兒哉叔嗣文表聞行逢之言已㑹深意遂乃拜受此語各散歸營廣本逵命行營副使毛立為袁州營統軍使潘叔嗣張文表為前鋒軍次醴陵縣吏請具牛酒犒軍立不許叔嗣文表因士卒之怒縛立送于行逢以兵叛逵逵大懼乗輕舟奔朗州叔嗣追至朗州殺之湖湘故事逵連夜走歸朗州去經數日潘叔嗣始到潭州既聞王逵走歸朗州亦以舟楫倍程而趨至朗州殺之今按世宗實録顯徳三年二月丙寅朗州王逵言領大軍入淮南界庚寅言入鄂州界攻下長山寨癸巳荆南髙保融言進逵自鄂州領兵復歸本道又云潘叔嗣為先鋒行及鄂州叔嗣囘戈襲武陵進逵聞之倍道先入武陵叔嗣攻其城進逵敗走為叔嗣所殺又云三月壬寅進逵差牙將押送淮南將陳澤等葢進逵未敗前奏事三月始逵行在與薛史承襲傳及湖南傳記略同惟湖湘故事及丁璹馬氏行事記載逵攻袁州叔嗣叛之丁璹云逵三月至潭州四月叔嗣叛丁璹云五月五日叔嗣殺逵于朗州皆妄也周行逢據湖南仕進尚門䕃衍屢獻文章不得調退居鄉里教授及張文表叛辟為幕職事敗逃遁㑹赦乃敢出窮困無以自進採摭故事撰湖湘馬氏故事二十卷如京師獻之太宗憫其窮且老授將作監丞衍本小人言辭鄙俚非有意著書故叙事顛倒前後自相違背以無為有不可勝數素怨周行逢尤多誣毁不欲行逢不預叔嗣之謀乃妄造此説凡載行逢罪惡之甚者皆出于衍云璹亦國初人疑其説得于衍書皆不可為據今從十國紀年, SBCK: ''}
