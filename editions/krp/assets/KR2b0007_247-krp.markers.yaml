  - {type: variant, offset: 2153, length: 461, content: 孔穎達曰天子賜姓賜氏諸侯但得賜氏不得賜姓降於天子也故隠八年左傳云無駭卒公問族於衆仲衆仲對曰天子建徳因生以賜姓胙之土而命之氏諸侯以字為諡因以為族官有世功則有官族邑亦如之以此言之天子因諸侯先祖所生賜之曰姓杜預注云若舜生媯汭賜姓曰媯封舜之後於陳以所封之土命為氏舜後姓媯而氏曰陳故鄭駮異義云炎帝姓姜太皥之所賜也黄帝姓姬炎帝之所賜也故堯賜伯夷姓曰姜賜禹姓曰姒賜契姓曰子賜稷姓曰姬著在書傳如鄭此言是天子賜姓也諸侯賜卿大夫以氏若同姓公之子曰公子公子之子曰公孫公孫之子其親已逺不得上達於公故以王父字為氏若適夫人之子則以五十字伯仲為氏若魯之仲孫季孫是也若庶子妾子則以二十字為氏若臧氏展氏是也若異姓則以父祖官及所食之邑為氏以官為氏者則司馬司城是也以邑為氏者若韓趙魏是也凡賜氏族者此為卿乃賜有大功者生賜以族若叔孫得臣是也雖公子之身有大功徳則以公子之字賜以為族若襄仲遂是也其無功徳死後乃賜族若無駭是也若子孫若為卿其君不賜族自以王父字為族也氏族對之為别散則通也故左傳問族於衆仲下云公命以字為展氏是也其姓與氏散亦得通故春秋有姜氏子氏姜子皆姓而云氏是也, SBCK: ''}
