  - {type: punctuation, offset: 362, content: (, id: KR2b0007_krp_247-bkkpn28}
  - {type: variant, offset: 362, length: 624, content: 畧考異曰舊石雄傳曰三年回鶻大雲朔劉沔以太原之師屯于雲州沔謂雄曰國家以公主之故不欲急攻我輩捍邉但能除患專之可也雄受教自選勁騎得沙陀部落兼契苾拓跋雜虜夜𤼵馬邑徑趨烏介之牙時虜帳逼振武雄既入城登堞視其衆寡見氊車數十云云遂迎公主還太原回鶻傳烏介去幽州八十里下營是夜河東劉沔帥兵奄至烏介驚走東北依和解室韋下營不及將太和公主同走石雄兵遇公主帳因迎歸國後唐獻祖紀年錄曰沔表帝為前鋒回鶻可汗樹牙於殺胡山帝與石雄銜枚夜進圍其牙帳烏介可汗輕騎而遁帝於牙帳謁見太和公主奉而歸國按一品集㑹昌二年十月十七日狀訪聞劉沔頗練邉事唯臨機決策不免遲疑深恐過為慎重漸失事機望賜劉沔詔比緣回鶻未為侵擾且務綏懷今既殺戮邊人驅劫牛馬頻已有詔速令驅除自度便宜臨機應變不得過懷疑慮皆待朝廷指揮既假以使名令為諸軍節制邊境之事皆以責成向後或要移營進軍一切自取機便不必皆候進止實録戊寅詔劉沔云云如前據徳裕此狀則沔豈敢不俟詔㫖擅遣石雄襲擊可汗牙帳况已有不須聞奏之詔也舊徳裕傳徳裕曰杷頭烽北便是沙磧彼中野戰須用騎兵若以步卒敵之理難必勝今烏介所恃者公主如令勇將出騎奪得公主虜自敗矣上然之即令徳裕草制處分伐叛記曰上問討襲之計徳裕奏若以步兵與回鶻野戰必無勝理回鶻常質公主同行臣思得一計料回鶻必未知有斫營石雄驍勇無敵若令揀蕃渾及漢兵鋭卒銜枚夜進必取得公主兼可汗可擒上從之遂令石雄領蕃渾及漢兵夜進回鶻果無遊奕伏道直至帳幕方覺遂取得公主惟可汗輕騎而遁按徳裕尋自請駐斫營事而石雄於城上見公主牙帳迎得之非因徳裕之䇿今不取, SBCK: ''}
