  - {type: variant, offset: 0, length: 237, content: 欽定四庫全書資治通鑑卷一百二十二宋司馬光撰胡三省音註宋紀四起重光協洽盡旃䝉大淵獻凡五年太祖文皇帝上之下元嘉八年春正月壬午朔燕大赦改元大興丙申檀道濟等自清水救滑臺魏叔孫建長孫道生拒之丁酉道濟至夀張遇魏安平公乙旃眷魏收官氏志獻帝命叔父之裔為乙旃氏道濟帥寧朔將軍王仲徳驍騎將軍段宏奮擊大破之帥讀曰率驍堅堯翻騎奇寄翻轉戰至髙梁亭斬魏濟州刺史悉煩庫結魏明元帝泰常八年置濟州治碻磝城濟子禮翻夏主擊秦將姚獻敗之將即亮翻敗補邁翻遂遣其叔父北平公韋代帥衆一萬攻南安去年暮末保南安城中大饑人相食, SBCK: ''}
