  - {type: variant, offset: 0, length: 262, content: 欽定四庫全書資治通鑑卷一百二十九宋司馬光撰胡三省音註宋紀十一起屠維大淵獻盡閼逢執徐凡六年世祖孝武皇帝下大明三年春正月己巳朔兖州兵與魏皮豹子戰於髙平兖州兵不利己丑以驃騎將軍柳元景為尚書令驃匹妙翻騎竒寄翻右僕射劉遵考為領軍將軍己酉魏河南公伊馛卒馛蒲撥翻卒子恤翻三月乙夘以揚州六郡為王畿六郡丹陽淮南宣城呉郡呉興義興也更以東揚州為揚州徙治㑹稽置東揚州見上卷孝建元年㑹工外翻猶以星變故也星變見上卷孝建三年三月庚寅以義興太守垣閬為兖州刺史閬遵之子也垣遵即垣苗也武帝西征長安使遵守洛當城城據河濟之㑹後人謂之垣苗城守式又翻夏四月乙巳魏主立其, SBCK: ''}
