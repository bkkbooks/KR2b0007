  - {type: punctuation, offset: 971, content: (, id: KR2b0007_krp_261-bkkpn85}
  - {type: variant, offset: 971, length: 456, content: 僖宗中和二年朱瑄得鄆州至是而亡次考異曰薛居正五代史梁太祖紀辛卯營于濟水之龎師古令諸將撤木為橋乙未夜師古以中軍先濟朱瑄弃壁夜走葛從周擒瑄并妻男以獻按濟水自王莽時大旱不復能絶河而南自是河南無濟水編遺錄曰五月遣騎於鄆州軍前追從周徑徃洹水董師以代矦言師古留攻鄆梁太祖實錄四年正月復以洹水之師大舉伐鄆十五日辛卯營其西南河外龎師古命諸將撤木為橋以圖宵濟癸巳前軍以心膂百人盜决河口甲午浮橋集水次乙未夜師古中軍先濟聲振壁内朱瑄聞之弃壁走編遺錄四年正月己卯朱瑄兵少糧盡不敢出戰然深溝高壘難越也從周師古乃取清河内小舟採野葛草茅索之以為巨纜乃於其牆南建浮橋丙申功就我師渡橋朱瑄奔遁皆不云濟水師古去年三月已敗鄆兵于馬頰追至西門據故洛亭子為寨乙未夜先濟葢鄆城下清河水疑朱瑄引之以環城固守故師古等為浮橋以濟師河既可决明非自然之水也舊紀癸未龎師古陷鄆州朱瑄與妻榮氏潰圍走瑄至中都為野人所殺榮氏俘於軍新紀丙申全忠陷鄆州實錄二月丙午朔陷鄆州瑄至中都為亂兵所殺妻榮至汴為尼據薛史辛卯營於濟水則癸未鄆未破也新紀云丙申陷鄆實錄二月葢約奏到今從編遺錄新紀, SBCK: ''}
