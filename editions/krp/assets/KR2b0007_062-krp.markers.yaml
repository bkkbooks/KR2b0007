  - {type: punctuation, offset: 3431, content: (, id: KR2b0007_krp_062-bkkpn292}
  - {type: variant, offset: 3431, length: 730, content: 前漢志冶縣屬會稽郡師古曰故閩越地光武改曰章安晉志曰建安郡故秦閩中郡漢高祖五年以立閩越王及武帝滅之徙其人名為東冶後漢改為候官都尉及呉置建安郡洪氏𨽻釋據西漢志曰會稽西部都尉治錢唐南部都尉治回浦李宗諤圖經曰文帝時以山隂為都尉治元狩中徙治錢唐為西部元鼎中又立東部都尉治冶光武改回浦為章安以冶立東候官呉孫亮𫝊曰五鳯中以會稽東部為臨海郡孫休𫝊永安中以會稽南部為建安郡沈約宋志曰東陽太守本會稽西部都尉又曰臨海太守夲會稽東部都尉前漢都尉治鄞後漢分會稽為呉郡疑是都尉徙治章安續漢志章安故冶光武更名晉太康記夲鄞縣南之回浦鄉章帝立未詳孰是又曰司馬彪云章安是故冶然則臨海亦冶地也張勃呉録曰是句踐冶鑄之所後分為會稽東南二部都尉東部臨海是也南部建安是也杜佑通典曰後漢改冶縣為候官都尉後分冶縣為會稽東南二都尉今福州是南部台州是東部又曰二漢會稽西部都尉理婺州數説異同各有脱誤嘗參訂之自秦置會稽郡其治在今呉門至順帝分置呉郡而會稽徙郡於山隂以浙江為兩郡之境故錢唐在西漢時屬會稽所以為西部治所及會稽移於浙東則西部亦移於婺女回浦後改章安乃會稽之東部今台州蓋其地冶縣則是南部在呉屬建安郡至唐遂為福州太康記嘗云回浦夲鄞之南鄉或云東部治鄞因致休文之疑然鄞及回浦皆西漢縣名謂西漢割鄞而置縣或未可知至章帝時回浦已非鄉矣太康所紀亦誤也前志註會稽之冶縣云夲閩越地續志口章安故冶閩越地光武更名因脱其中數字故劉昭補注惑於太康記而休文復不能剖判也當云章安故回浦章帝更名東侯官故冶閩越地光武更名於文乃足此郡之末有東部侯國四字却是衍文侯與候相近而南部所治故文有錯亂班史註回浦為南部司馬彪謂章安是故冶張勃謂分冶為東南二都尉杜佑謂二漢西部皆在婺女圖經以冶為東部皆誤也余按洪説甚詳其言錢唐西漢時屬會稽所以為西部治所此語亦恐有未安處, SBCK: ''}
