  - {type: variant, offset: 4041, length: 907, content: 傳國寶及受命寶也五代㑹要曰時製寶兩座用白玉方六寸螭虎紐馮道書寶文其一以皇帝承天受命之寶為文其一以皇帝神寶為文宋白曰時内司製二寳詔太常具制度以閒有司言唐六典符寶郎掌天子八璽其一曰神寶二曰受命寶其神寶方六寸髙四寸六分厚一寸七分蟠龍紐文與傳國璽同傳國璽秦皇以藍田玉刻之李斯篆方四寸面文曰受命于天既夀永昌紐盤五龍二寶厯代相傳以為神器别有六寶一曰皇帝行璽二曰皇帝之璽三曰皇帝信璽四曰天子行璽五曰天子之璽六曰天子信璽此六璽因文為名並白玉螭虎紐厯代傳受或亡失則補之北朝鑄之以金貞觀十六年别製𤣥璽一座文曰皇天景命有徳者昌白玉螭虎紐同光中製寶一座文曰皇帝受命之寶天福四年製寶一座文曰皇帝神寶其同光天福二寶内司製造不見紐篆分寸制度勑今製國寶兩座其一宜以皇帝承天受命之寶為文其一以皇帝神寶為文命中書令馮道書寶議者曰國以玉璽為傳授神器邃古無聞運計樞曰舜禹天子黄龍負璽世本曰魯昭公始作璽秦兼六國稱皇帝禮取藍田之玉玉工孫夀刻之方四寸李斯為大篆書之形制如龍魚鳳鳥之狀希世之至寶也秦亡子嬰以璽降漢漢世世傳寶之王莽之簒求璽於元后后投之於堦一角微缺莽誅歸之更始更始敗歸之盆子及熊耳之敗盆子以璽降光武漢末黄巾亂投璽於井孫堅入洛見井有五色氣取得之以歸袁術術敗荆州刺史徐璆得之詣許以進獻帝魏受漢得之以傳于晉洛陽之陷劉聰得之劉曜為石勒所禽璽歸于鄴石氏之亂冉閔得之閔敗晉將戴施入鄴得之送江東傳之宋齊梁臺城之破侯景得之景敗其將侯子鑒以璽走為追兵所迫投於栖霞寺井中僧永杼得平而匿之陳永定二年永杼弟子普智以璽上陳文帝隋陳始得秦真傳國璽煬帝江都之禍宇文化及得之化及敗璽歸竇建徳建徳敗其妻曹氏以璽獻于唐唐禪楊涉送寶于大梁莊宗滅梁得之同光末内難作寶為火灼文字訛缺明宗得之清泰敗以寶隨身自焚而死寶遂亡失其神寶者方六寸厚一寸七分髙四寸六分蟠龍隱起文與秦璽同但玉色不及形制髙大耳不知何代製造東晉孝武十九年雍州刺史郗恢得之慕容永送於金陵傳之宋齊梁臺城之破侯景得之景敗侍中趙思齊攜走江北獻之齊文宣帝宇文滅齊得之宇文亡入隋隋文帝改號傳國璽又改為受命璽及平陳始得秦真傳國璽仍以秦璽後出得於亡陳以北朝所傳神璽為第一秦璽次之隋亡竇建徳妻與神璽俱獻長安唐末不知所在其説頗有源委因載于此更工衡翻, SBCK: ''}
