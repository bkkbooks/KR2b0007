  - {type: variant, offset: 0, length: 199, content: 欽定四庫全書資治通鑑卷一百六十二宋司馬光撰胡三省音註梁紀十八屠維大荒落凡一年髙祖武皇帝十八太清三年春正月丁巳朔栁仲禮自新亭徙營大桁㑹大霧韋粲軍迷失道比及青塘比必利翻夜已過半立柵未合侯景望見之亟帥鋭卒攻粲過工禾翻帥讀曰率粲使軍主鄭逸逆擊之命劉叔𦙍以舟師截其後截其渡淮之路叔𦙍畏懦不敢進逸遂敗景乗勝入粲營左右牽粲避賊粲不動叱子弟力戰遂與子尼及三弟助警搆從弟昻皆戰死從才用翻親戚死者數百人史言韋粲忠勇仲禮, SBCK: ''}
