  body:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 資治通鑑凡二百九十四卷周紀五秦紀三漢紀六十魏紀十晉紀四十宋紀十六齊紀十梁紀二十二陳紀十隋紀八唐紀八十一後梁紀六後唐紀八後晉紀六後漢紀四後周紀五臣光言先奉勑編集歷代君臣事迹又奉聖旨賜名資治通鑑今巳了畢者伏念臣性識愚魯學術荒踈凡百事爲皆岀人下獨於前史粗甞盡心自幼至老嗜之不厭每患遷固以來文字繁多自布衣之士讀之不徧況於人主日有萬機何暇周覽臣常不自揆欲删削冗長舉撮機要專取關國家興衰繫生民休戚善可爲法惡可爲戒者爲編年一書使先後有倫精粗不雜私家力薄無由可成伏遇英宗皇帝資䜭智之性敷文明之治思歷覽古事用恢張大猷爰詔下臣俾之編集臣夙昔所願一朝􅀗伸踊躍奉承惟懼不稱先帝仍命自選辟官屬於崇文院置局許借龍圖天章閣三館袐閣書籍賜以御府筆墨繒帛及御前錢以供果餌以内臣為承受眷遇之榮近臣莫及不幸書未進御先帝違弃羣臣陛下詔膺大統欽承先志寵以冠序錫之嘉名每開經筵常令進讀臣雖頑愚荷兩朝知待如此其厚隕身喪元未足報塞苟智力所及豈敢有遺㑹差知永興軍以衰疾不任治劇乞就冗官陛下俯從所欲曲賜容養差判西京留司御史臺及提舉嵩山崇福宫前後六任仍聽以書局自隨給之䘵秩不責職業臣旣無它事得以研精極慮窮竭所有日力不足繼之以夜徧閱舊史旁采小說􅂤牘盈積浩如煙海抉擿幽隱挍計豪􅁵上起戰國下終五代凡一千三百六十二年修成二百九十四卷又略舉事目年經國緯以備檢尋爲目録三十卷又參考羣書評其同異俾歸一塗爲考異三十卷合三百五十四卷自治平開局迨今始成歳月淹乆其閒抵捂不敢目仲罪負之重困無所逃臣光誠惶誠懼頓首頓首重念臣違離闕廷十有五年雖身處于外區區之心朝夕寤寐何甞不在陛下之左右顧以駑蹇無施而可是以專事􅉢槧用酬大恩庶竭㳙塵少裨海獄臣今筯骸癯瘁目視昬近齒牙無幾神識衰秏目前所爲旋踵遣忘臣之精力盡於此書伏望陛下寛其妄作之誅察其願忠之意以淸閒之燕時賜省覽監前丗之興衰考當今之得失嘉善矜惡取是捨非足以懋稽古之盛德躋無前之至治俾四海羣生咸蒙其福則臣雖委骨九泉志願永畢矣謹奉表陳進以聞臣光誠惶誠懼頓首頓首謹言司馬光上表元豐七年十一月進呈檢閱文字承事郎臣司馬康同修奉議郎臣范祖禹同修袐書丞臣劉恕同修尚書屯田員外郎充集賢校理臣劉攽編集端明殿學士兼翰林侍讀學士太中大夫臣司馬光􅅄諭詔書勑司馬光修資治通鑑成事史學之廢乆矣紀次無法論議不明豈足以示懲勸明乆逺哉卿博學多聞貫穿今古上自晚周下迄五代發揮綴緝成一家之書襃貶去取有所據依省閱以還良深嘉歎今賜卿銀絹對衣腰帶鞍轡馬具如别録至可領也故兹􅅄諭想宜知悉冬寒􅀸比平安好遣書指不多及十五日元豐八年九月十七日准尚書省箚子奉聖旨重行校定元祐元年十月四日奉聖旨下杭州鏤板校對宣德郎袐書省正字臣張耒校對宣德郎祕書省正字臣晁􅀘之校對朝奉郎行祕書省正字上􅀐都尉臣宋匪躬臣盛次仲校定承議郎充祕閤校理武􅀐尉賜緋魚袋臣張舜民臣孔武仲臣黄庭堅校定宣徳郎守右正言臣劉安丗臣司馬康臣范祖禹臣吕大防臣李淸臣臣吕公著紹興二年七月初一日兩浙東路提舉茶鹽司公使庫下紹興府餘姚縣刋扳紹興三年十二月二十日畢工印造進入左迪功郎紹興府司法扵軍主管本司文字兼造帳官臣邊智右迪功郎充提舉茶鹽司幹辦公事臣常任佚右文林郎充提舉茶鹽司幹辦公事臣强公徹右修職郎充提舉茶鹽司幹辦公事臣石公憲右奉議郎提舉兩浙東路茶鹽司公事臣韓協降授右朝奉郎前提舉兩浙東路茶鹽司公事臣王然校勘監視􅌘縣進士婁諤進士茹賛廷進士唐奕進士婁時升進士婁時敏進士石袤進士茹幵進士王愈進士張綱右迪功郎新䖍州興縣主簿唐自餘姚縣進士棄汝士進士杜􅀖彦進士錢移哲進士陸􅩇進士顧大冶進士吕克勤進士張彦衡進士朱國輔進士杜紱進士孫彬右迪功郎紹興府餘姚縣主簿王絪右從事郎紹興府􅌘縣尉薛鎡右修職郎紹興府􅌘縣丞桂祐之左迪功郎紹興府府學教授晏肅右承務郎知紹興府餘姚縣丞馮滎叔左宣教郎知紹興府餘姚縣丞晏敦臨仲將端禮九成}
