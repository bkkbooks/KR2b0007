  - {type: variant, offset: 11844, length: 392, content: 恒冀成徳軍考異曰建中實録云二月丁已寶臣卒疑奏到之日也今從徳宗實録谷况燕南記曰忠志末年惟納妖妄之人兼隂陽術數謟媚茍且之軰爭獻圖䜟稱有尊位詐作朱草靈芝鑿石上作名字又于後堂院結壇場清齋菜食置金杯玉斚銀盤云甘靈神酒自至其内又言天符下降忠志自謂命符上天將吏罔有諫者使行文牒布告州縣云靈芝朱草王者之瑞輙生壇上香滿院中靈石呈祥天符飛應甘露如蜜神酒盈杯匪我所求不期自至各牒管内郡縣宜令知委同為喜慶也既而日為妖妄者更相矯云不日當有天神下降持金箱玉印而至然後即大位為天所授也四方皆自歸伏不待征討海内坐而定矣忠志大悦多以金銀羅錦異物賞之隂陽妖妄者自知虛偽恐事泄見誅共言相公宜服甘露靈芝草湯即天神降速忠志一任妖者遂於湯中宻著毒藥既飲畢便失音三日而卒舊傳亦以為然按方士妖妄必為一府所疾所慿恃者寶臣一人耳若酖殺寶臣身在府中逃無所之安能免死乎計方士雖愚必不為此盖時人見寶臣曾飲其湯遇疾而死以為方士所酖谷况承而書之耳, SBCK: ''}
