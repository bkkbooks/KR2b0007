  - {type: variant, offset: 0, length: 284, content: 欽定四庫全書資治通鑑卷一百二十宋司馬光撰胡三省音註宋紀二起閼逢困敦盡彊圉單閼凡四年太祖文皇帝上之上諱義隆小字車兒武帝第三子也元嘉元年是年八月始改元春正月考異曰宋本紀正月癸巳朔日有食之宋紀二月己巳宋畧二月癸巳李延夀南史二月己夘朔皆悞也按長厯是年正月丁巳二月丁亥朔後魏書紀紀志是年無日食今從之魏改元始光丙寅魏安定殤王彌卒營陽王居䘮無禮好與左右狎暱好呼到翻下情好同遊戲無度特進致仕范泰上封事曰伏聞陛下時在後園頗習武備鼔鞞在宫聲聞于外鞞與鼙同音駢迷翻聞音問黷武掖庭之内諠譁省闥之間非徒不足以威四夷秖生逺近之怪陛下踐祚委政宰臣實同髙宗諒闇之美闇讀如隂而更親狎小人懼非社稷至計經世, SBCK: ''}
