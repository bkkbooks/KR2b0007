  - {type: variant, offset: 8948, length: 276, content: 僖宗中和元年時溥據徐州至是而亡張建封之鎮徐也有愛妓愛曰盻盻建封既歿張氏舊第有小樓名燕子盻盻念舊而不嫁居是樓十餘年幽獨悵然出白樂天集重考異曰實錄五月汴州奏拔徐州舊紀四月汴將王師牛存節陷徐州舊傳溥求援于兖州朱瑾出兵救之值大雪糧盡而還汴將王重師牛存節夜乘梯而入漙與妻子登樓自焚而卒景福二年也新紀四月戊子朱全忠陷徐州時漙死之薛居正五代史梁紀丁亥師古下彭門梟漙首以獻唐太祖紀年錄四月澤州李罕之上言懐孟降人報汴將龎師古於今月八日攻陷徐州徐帥時溥舉族皆沒温既下徐方詐請朝廷命帥昭宗乃以兵部尚書孫儲為徐帥既而温以他詞斥去自以其將鎮之四月八日葢河東傳聞之誤今從編遺錄新紀, SBCK: ''}
