  - {type: punctuation, offset: 6011, content: (, id: KR2b0007_krp_259-bkkpn532}
  - {type: variant, offset: 6011, length: 457, content: 太考異實錄大順元年十月原將邢州刺史李存孝自晉州帥行營兵據邢州舊記十一月癸丑朔大原將邢州刺史李存孝自恃擒孫揆功合為昭義帥怨克用授康君立存孝自晉州帥行營兵歸邢州據城上表歸明仍致書與張濬王鎔求救援唐末見聞錄十月二十四日李存孝領兵打晉州遁歸邢州背叛與宰臣張濬狀曰某自主三郡已近二年又曰常思安知建在此之日歸順朝廷之時四鄰不有保持一家俄受塗炭以此猶豫莫敢申明遂至去年遽絶鄰好豈是某之情願葢因李某之指揮又曰自今春戰争之後實願休罷戈鋌自九月十五日以來有李某之人使促令某南至進軍面趙州牽脅李某即土門路入直届鎮州今月十四日昭義軍人百姓等衆請某權知兵馬留後歸順朝廷大王聞存孝致逆大震雄威令下先差大將進軍速至邢州仍候指揮不得輒有鬬敵但圍小壘専俟大軍據唐太祖紀年錄薛居正五代史紀傳實錄新紀皆云景福元年十月存孝叛太原歸朝廷而紀唐末見聞錄在大順元年十月舊紀恐是連言以後事按二年三月安知建方叛太原而此書中已説知建又云自主三郡已近二年存孝大順二年方為邢洺磁節度至景福元年乃二年也然則實錄邢州刺史據邢州亦因舊記之誤見聞錄所載存孝書葢與王鎔誤云與張濬也, SBCK: ''}
