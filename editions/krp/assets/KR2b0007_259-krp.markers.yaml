  - {type: variant, offset: 12654, length: 375, content: 考異曰續實運錄曰大順二年相國杜讓能孔緯值上京頻嬰離亂朝綱紊墜是時徇意諸道扈駕兵五十四都坊坊皆滿兼近藩連帥要行征討便自綂軍至如岐陽李茂貞先朝封為太子本姓宋洋州牧先祖討昭義劉從諫有功子孫爵賞不絶洎夀王登位後遣禮部侍郎薛廷珪持璽書具禮冊為岐王茂貞先中和年中投判軍容使田令孜作養男姓田名彦賔葢趨其勢也汴州朱温先朝冊東平王至今上又遣薛廷珪為禮儀使延王為冊命使封為梁王且岐王與北司人情方洽宰相甚不和睦累表章云臣今駐斾咸陽未敢入中書問罪杜讓能等請寘極法表奏上不恱遂詔孔杜二相國令往咸陽謝及見岐王戰不能言岐王大怒却令歸中書省過纔到中書上又發遣令祈謝岐王如是往來三度岐王又奏曰二相見臣並不措一言如此曠官有辱聖代請行朝典别選英賢上不樂敕罷知政事不得已除昭緯荆南節度杜讓能除河中節度三日後貶于嶺表出國門三十里並賜自盡時岐王率驍果五千人住咸陽及貶二相乃退此皆誤謬之説今從實錄, SBCK: ''}
