  - {type: variant, offset: 5443, length: 302, content: 光啓三年楊守亮鎮興元至是而敗之考異曰舊紀景福元年十一月辛丑鳯翔邠寧衆攻興元陷之節度使楊守亮前中尉楊復恭判官李巨川突圍而遁十二月辛未華州刺史韓建奏於乾元縣遇興元散兵撃敗之斬楊守亮楊復恭傳首實錄乾寜元年七月鳯翔邠寧之兵攻興元陷之楊守亮楊復恭突圍而遁新紀景福元年八月茂貞冦興元守亮滿存奔閬州乾寧元年七月茂貞陷閬州八月守亮伏誅新復恭傳景福元年茂貞攻興元破其城復恭守亮守信奔閬州十國紀年蜀史景福元年十月行瑜茂貞表守亮招納叛臣請討之感義節度使滿存救守亮為茂貞所敗奔興元十一月邠岐攻陷興元楊復恭帥守亮守貞守忠滿存同奔閬州十二月壬午華洪敗守亮等於州按實錄景福二年正月移茂貞山南於時守亮不應猶在山南今年月從新紀事則參取諸書, SBCK: ''}
