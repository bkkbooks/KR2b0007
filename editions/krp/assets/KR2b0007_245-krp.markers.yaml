  - {type: variant, offset: 10533, length: 374, content: 光考異曰皮業見聞錄曰崔慎由以元和元年登第至開成已入翰林因寓直之夕二更以來有中使宣召引入數重門至一處堂宇華煥簾幕俱垂見左右二廣燃蠟而坐謂慎由曰上不豫來已數日兼自登極後聖政多虧今奉太后中㫖命學士草廢立令慎由大驚曰某有中外親族數千口列在搢紳長行兄弟甥姪僅三百人一旦聞此覆族之言寜死不敢承命况聖上髙明之德覆於八荒豈可輕議二廣黙然無以為對良乆啟後户引慎由至一小殿見文宗坐於殿上二廣徑登階而䟽文宗過惡上唯俛首又曰不為此抝木枕措大不合更在此坐矣街談以好抝為抝木枕仍戒慎由曰事泄即是此措大也於是二廣自執炬送慎由出䆳殿門復令中使送至本院慎由尋以疾出翰林遂金縢其事付𦙍故𦙍切於勦絶北司者由此也誅北司後𦙍方彰其事新傳曰慎由記其事藏箱枕間將没以授其子𦙍故𦙍惡中官終討除之按舊傳崔慎由大中初始入朝為右拾遺員外郎知制誥文宗時未為翰林學士蓋崔𦙍欲重宦官之罪而誣之新傳承皮錄之誤也, SBCK: ''}
