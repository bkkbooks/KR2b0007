  - {type: variant, offset: 7646, length: 438, content: 唐宫殿中罘罳以絲為之狀如網以捍燕雀非如漢宫闕之罘罳也今諸宦者能决之而出則可知矣程大昌曰罘罳者鏤木為之其中䟽通可以透明或為方空或為連鎻其狀扶䟽故曰罘罳讀如浮思猶曰䯱髵也因其形似而想其夲狀自可見矣罘罳之名既立於是隨其所施而附著以為之名其在宮闕則為闕上罘罳臣朝於君至闕下復思所奏是也在陵垣則為陵上罘罳王莽斫去陵上罘罳而曰使人無復思漢者是也却而求之上古則禮記䟽屏亦其物也䟽者刻為雲氣而中空玲瓏也又有網户刻為連文逓為綴屬其形如網也宋玉曰網户朱綴刻方連是也既曰刻則是雕木為之其狀如網耳後人因此遂有直織絲網而張之簷忩以䕶禽雀者文宗甘露之變出殿北門裂斷罘罳而去是真網也此又㳂放楚辭而施網焉者也元微之謂承㫖時詩曰蘂珠深處少人知網索西臨太液池浴殿曉開天語後歩廊騎馬笑相隨自注云網索在太液池上學士候對歇於此予按網索乃是無壁或有窓處以索掛網遮䕶飛雀故云網索猶掛鈴之索為鈴索也宋元獻喜子京召還為學士詩曰網索軒窓䆳鑾坡羽衛重用微之句也若並今世俗語求之則門屏鏤明格子其制與青鎻同類顧所施之地不同而名亦隨異耳, SBCK: ''}
