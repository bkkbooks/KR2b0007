  - {type: variant, offset: 2724, length: 338, content: 雍錄唐曲江本秦隑州至漢為樂遊苑基地最髙四望寛敞隋營京城宇文愷以其地在京城東南隅地髙不便故闕此地不為居人坊巷而鑿為池以厭勝之又㑹黄渠水自城外南來故隋世遂從城外包之入城為芙蓉池且為芙蓉園也漢武帝時池周囘六里餘唐周七里占地三千頃又加展拓矣其地在城東南昇道坊龍華寺之南昆明池漢武帝所鑿在長安西南周囘四十里三輔故事曰池周三百二十頃長安志曰今為民田夫既可以為民田則非有水之地矣然則漢於何取水也長安志引水經曰交水西至石堨武帝穿昆明池所造有石闥堰在縣西南三十二里則昆明之周三百餘頃者用此堰之水也昆明基髙故其下流尚可壅激以為都城之用於是並城䟽别三𣲖城内外皆賴之此池仍在括地志曰豐鎬二水皆已堰入昆明池無復流𣲖括地志作於太宗之世則唐初仍自壅堰不廢至文宗而猶嘗加濬也然則圖經之作當在文宗後故竭而為田也, SBCK: ''}
