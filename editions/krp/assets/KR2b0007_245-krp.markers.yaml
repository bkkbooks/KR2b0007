  - {type: punctuation, offset: 427, content: (, id: KR2b0007_krp_245-bkkpn49}
  - {type: variant, offset: 427, length: 582, content: 舊考異曰傳李訓初名仲言居洛中李逢吉為留守思入相訓揣知其意即以竒計動之自言與鄭注善逢吉遺訓金帛珍寳數百萬令持入長安以賂注又曰初注搆宋申錫事帝深惡之欲令京兆尹杖殺至是以藥稍效始善遇之獻替記曰先是上惡鄭注極甚甞謂樞密使曰卿知有善和端公無歎京兆尹懦弱不能斃於枯木開成紀事曰訓除名流象州㑹恩歸於東洛投謁諸處困乏逢吉叱之不顧㑹鄭注賔副上黨路經東都于道投之廣以古今義烈披述𠂻欵注本兇邪趨而附之自此豁然相然諾情契稠疊及注徴赴闕訓隨而到京别第安置注因陳奏言訓文學優盛無比上納之太和八年三月以布衣在翰林注之援也甘露記曰訓為人長大美貎口辯無前常以英雄自任㑹鄭注介工黨出洛陽訓慨然太息曰當世操權力者握齪苛細無足與言吾聞鄭注為人好義而求竒士且通於内官易為因緣乃徃說之注見訓大驚如舊相識遂結為死交及注赴闕請訓行京師為卜居供給日夕徃來乘間奏於上按實錄去年九月李欵彈鄭注云前邠州行軍司馬今年九月庚申王守澄宣召鄭注對於浴堂門獻替記八年春暮上對宰臣歎天下無名醫便及鄭注精於服食或欲置於技術或欲令為神䇿判官注皆不願此職守澄遂託從諫奏為行軍司馬又云去歲春夏李仲言猶䘮母已潛入城稱王山人兩度對於含元殿今年八月十三日欲與諫官至九月三日鄭注自絳州至便於宣徽對然則訓自去年已因注謁守澄得見上注今年暮春方從昭義辟然則訓舊與注善去春已入長安見上非注赴昭義時始定交亦非去年十一月徴注於潞州又非訓隨注到京也今從實錄獻替記, SBCK: ''}
