  - {type: variant, offset: 8590, length: 0, content: '', SBCK: 使自陳為盧從史所離間乞輸貢賦請官吏許其自新李師道等數上表請雪承宗朝廷亦以師久無功丁未制洗雪承宗以為成德軍節度使復以德棣二州與之悉罷諸道行營將士共賜布帛二十八萬端匹加劉濟中書令劉濟之討王承宗也以長子緄為副大使掌幽州留務濟軍瀛州次子緫為瀛州刺史濟署行營都知兵馬使使屯饒陽濟有疾緫與判官張玘孔目官成國寳謀詐使人從長安來曰朝廷以相公逗留無功已除副大使為節度使矣明日又使人來告曰副大使旌節已至太原又使人走而呼曰旌節已過代州舉軍驚駭濟憤怒不知所為殺大將素與緄厚者數十人追緄詣行營以張玘兄臯代知留務濟自朝至日昊不食渇索飲緫因寘毒而進之乙夘濟薨緄行至􅃰州緫矯以父命杖殺之遂領軍務嶺南監軍許遂振以飛語毁節度使楊於陵於上上命召於陵還除宂官裴垍曰於陵性亷直陛下以遂振故黜藩臣不可丁巳以於陵為吏部侍郎遂振尋自抵罪八月乙亥上與宰相語及神仙問果有之乎李藩對曰秦始皇漢武帝學仙之效具載前史太宗服天笁僧長年藥致疾此古今之明戒也陛下春秋鼎盛方勵志太平宜拒絶方士之説茍道盛德充人安國理何憂無堯舜之壽乎九月己亥吐突承璀自行營還辛亥復為左衛上將軍充左軍中尉裴}
