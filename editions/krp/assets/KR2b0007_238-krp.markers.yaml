  - {type: variant, offset: 13825, length: 205, content: 更工衡翻恒户登翻吐考異曰舊澧王惲傳曰時突承璀恩寵特異惠昭太子薨議立儲副承璀獨排羣議屬澧王欲以威權自樹頼上明斷不惑承璀傳曰八年欲召承璀還乃罷絳相位承璀還復為神䇿中尉惠昭太子薨承璀建議請立澧王寛為太子憲宗不納立遂王宥崔羣傳曰憲宗以澧王居長又多内助新傳亦曰惠昭太子薨承璀請立澧王不從据實録六年十一月承璀監淮南軍閏十二月惠昭太子薨明年承璀乃召還而新舊傳皆如此穆宗卒以此殺承璀蓋憲宗末年承璀欲廢太子立澧王耳非惠昭初薨時也, SBCK: ''}
