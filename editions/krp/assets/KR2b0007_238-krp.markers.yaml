  - {type: variant, offset: 7288, length: 663, content: 使自陳為盧從史所離間間古莧翻乞輸貢賦請官吏許其自新李師道等數上表請雪承宗數所角翻承考異曰實録淄青幽州累有章表請赦宗按劉濟素與成德有怨攻之最力白居易請罷兵狀云劉濟近日情似近忠今忽罷兵慮傷其意又豈縁劉濟一人惆悵而不顧天下逺圖然則濟豈肯請赦承宗今不取朝廷亦以師久無功丁未制洗雪承宗以為成德軍節度使復以德棣二州與之復扶又翻悉罷諸道行營將士共賜布帛二十八萬端匹唐制布帛六丈為端四丈為匹加劉濟中書令劉濟之討王承宗也以長子緄為副大使長知兩翻緄古本翻掌幽州留務濟軍瀛州次子緫為瀛州刺史濟署行營都知兵馬使使屯饒陽濟有疾緫與判官張玘玘瓐里翻孔目官成國寳謀詐使人從長安來曰朝廷以相公逗留無功已除副大使為節度使矣明日又使人來告曰副大使旌節已至太原又使人走而呼曰呼火故翻旌節已過代州舉軍驚駭濟憤怒不知所為殺大將素與緄厚者數十人追緄詣行營以張玘兄臯代知留務濟自朝至日昃不食渇索飲索山客翻緫因寘毒而進之乙夘濟薨緄行至涿州涿州南至莫州百六十里莫州南至瀛州八十八里緫矯以父命杖殺之遂領軍務嶺南監軍許遂振以飛語毁節度使楊於陵於上上命召於陵還除宂官楊於音烏召於同宂官散官也宂而隴翻裴垍曰於陵性亷直陛下以遂振故黜藩臣不可丁巳以於陵為吏部侍郎遂振尋自抵罪八月乙亥上與宰相語及神仙問果有之乎憲宗信方士之心已露於此李藩對曰秦始皇漢武帝學仙之效具載前史事各見本紀太宗服天竺僧長年藥致疾事見二百一卷髙宗緫章二年此古今之明戒也陛下春秋鼎盛方勵志太平宜拒絶方士之説茍道盛德充人安國理何憂無堯舜之壽乎九月己亥吐突承璀自行營還自討王承宗還也還從宣翻又如字辛亥復為左衛上將軍充左軍中尉裴, SBCK: ''}
