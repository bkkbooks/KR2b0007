  - {type: variant, offset: 0, length: 236, content: 欽定四庫全書資治通鑑卷九十四宋司馬光撰胡三省音注晉紀十六起著雍困敦盡重光單閼凡四年顯宗成皇帝上之下咸和三年春正月温嶠入救建康軍于尋陽自武昌東下軍于尋陽韓晃襲司馬流於慈湖流素懦怯將戰食炙不知口處兵敗而死炙之夜翻燔肉也丁未蘇峻帥祖渙許栁等衆二萬人濟自横江登牛渚軍于陵口牛渚山在今太平州當塗縣北三十里山下有磯津渡之處與和州横江渡相對陵口當在牛渚山東北即東陵口也帥讀曰率臺兵禦之屢敗二月庚戌峻至蔣陵覆舟山陵阜也蔣陵蔣山之阜也覆舟山形如覆舟故名陶囘謂庾亮曰峻知石頭有重戍不敢直下必向, SBCK: ''}
