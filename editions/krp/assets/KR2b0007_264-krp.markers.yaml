  - {type: variant, offset: 12937, length: 753, content: 陜失冉翻今考異曰梁實録丁巳詔以月二十二日先遣士庶出京朕將翌日命駕壬戌襄宗發自秦雍甲子暨華州二月丁夘上至河中乙亥天子駐蹕陜郡翌日上來覲于行在編遺録正月丁酉上聞闕下人心不遑遂往河中以審都邑動静己酉離梁園行至汜水聞崔𦙍死是時皆言崔𦙍以下潜諫帝不令東遷雒陽又密與岐鳯交通及斯禍也洎上至蒲津帝謀東幸決取二十一日屬車離長安是日丁巳王鑾東指癸亥到甘棠二月乙亥上離河中丁丑到陜郊戊寅朝上欲躬往洛下催促百工壬辰朝辭明日東邁唐太祖紀年録丁巳下詔與梁實録同又曰壬戌昭宗發長安遷幸洛陽丁夘車駕次華州乙亥駐蹕陜州丙子朱温自汴州迎覲見已先發自此人使相望于路請駕早行幸洛陽舊紀正月己酉全忠帥師屯河中遣牙將寇彦卿奉表請車駕遷都洛陽丁巳車駕發京師癸亥次陜州全忠迎謁于路二月丙寅朔乙亥全忠辭赴洛陽親督工作薛居正五代史梁紀正月辛酉帝發自大梁西赴河中京師聞之為之震懼唐年補録丁巳帝御延喜樓全忠迎扈表至及還宫至暮全忠已移書宰臣裴樞促百官東行是日下詔與梁實録同尋以張廷範為御營使便毁拆宫室㳂河而下仍起豪民從行貧者亦繼焉車駕以其月二十三日己未至華州二月丙寅車駕駐陜郊又曰三月三日戊辰車駕離華下其差舛如此實録丁巳全忠遣牙將寇彦卿奉表言慮邠岐兵士侵迫請車駕遷都洛陽乃下詔與梁實録同二月丙寅朔丁卯次華州時朱全忠屯河中乙亥駐陜州丙子全忠來朝又賜王建絹詔云正月二十日朕登樓二十二日東軍兵士擁脇朕東去新紀正月戊午全忠遷唐都于洛陽二月戊寅次陜州朱全忠來朝按梁實録唐紀年録唐年補録唐實録所載詔書皆云二十二日遣士庶出京朕翌日命駕而諸書月日各不同莫有與此詔相應者編遺汴人所録比唐紀年宜得其實而正月二十一日丁巳全忠請遷都表始至長安車駕當日豈能便發長安去陜猶八程而癸亥已到甘棠首尾七日太似怱遽實録全用紀年録正月二十六日始離長安二月二日至華州駐留數日故同以十日至陜差似相近今從之, SBCK: ''}
