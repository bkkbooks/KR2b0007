  - {type: punctuation, offset: 11627, content: (, id: KR2b0007_krp_264-bkkpn1087}
  - {type: variant, offset: 11627, length: 623, content: 崔𦙍有誤國之罪無負國之心忠考異曰舊傳全忠攻鳯翔𦙍寓居華州為全畫圖王之䇿又曰天子還宫全忠東歸𦙍以事權在已慮全忠急於簒代乃與鄭元規謀召致兵甲以扞茂貞為辭全忠知其意從之令汴州軍人入關應募者數百人及友倫死全忠怒遣其子宿衞軍使友諒誅𦙍而應募者突然而出唐太祖紀年録曰及事權既失知朱温懐簒奪之志慮一朝禍發與國俱亡因圖自安之計與朱温外貌相厚私心漸異與元規密為計畫倍招兵數繕治鎧甲朝夕不止朱温察之乃隂令部下驍果數千紿為散卒於京師應募𦙍每日教閲弓弩梁卒偽示怯懦或倒弓背矢有若不能𦙍莫之識俄而朱友倫打毬墜死温愈不悦又聞𦙍欲挾天子出幸荆襄温乃抗言𦙍將交亂天下傾覆朝廷宜急誅之無令事發天子將罷𦙍知政事貶太子賓客鄭元規循州司户事未行温子友諒引兵攻𦙍詰旦擒之又攻鄭元規於京府擒之崔鄭俱獻首岐下實録𦙍重世宰相而志滅唐祚按崔𦙍隂狡險躁其罪固多然本召全忠欲假其兵力以除宦官耳宦官既誅全忠兵勢益彊遂有簒奪之心𦙍復欲以譎詐并圖全忠故全忠覺而殺之若云唐室因𦙍而亡則可矣舊傳云𦙍為全忠畫圖王之䇿實録云𦙍志滅唐祚恐未必然也𦙍任唐已為上相滅唐立梁於已何益假令𦙍實有此志則惟患全忠簒代之不速何故復謀拒之此所謂天下之惡皆歸焉者也紀年録序朱崔之情近得其實今從之然紀年録云傳首岐下誤也又全忠之去長安也留步騎萬人何患無兵何必更令汴卒應募若在訓練之際突出擒𦙍猶須此卒𦙍既貶官家居一夫可制安用此計邪葢全忠以𦙍募兵既多或能圖已故使汴卒應募察其動靜以壊其謀非籍此兵以誅𦙍也人始不知及誅𦙍之際皆突出人方知是汴卒耳初, SBCK: 􅀄}
