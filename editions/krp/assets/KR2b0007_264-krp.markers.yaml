  - {type: variant, offset: 4323, length: 354, content: 爭城而戰殺人盈城朱友寧之隕身喪元未足以謝寃䰟也號户刀翻聞音問考異曰唐太祖紀年録師範之舉兵也朱温令朱友寧討之三月己酉朱温至汴州大舉魏博四鎮之衆十萬擊師範朱友寧楊師厚攻博興旬餘不下攻城之衆死者大半俄而朱温至大怒斬其主將復起土山翌日而拔城中無少長皆屠之仍毁其垣四月進陷臨淄傅青州别將攻北海渡膠水寇登萊等郡實録據此而置於四月梁太祖實録四月丙子上至鄆領事辛卯從子友寧帥師破青州之博昌臨淄二邑殺戮五千餘衆暨北海焉編遺録五月辛亥却離歴下宿豐齊驛甲寅上到汶陽乙卯奏王師範逆狀己未上又往歴下壬戌上以兵士攻取博昌寨下少樹木時當炎毒却勒親從騎兵皆歸齊州因又前行夜將半客將劉捍謀曰捍請馳赴軍前傳諭上意敦將士今戮力速攻必可尅也今請上却歸歴下上悦而從之便令捍馳騎東往上乃西歸汶陽丙寅捷音至攻拔博昌盡戮其黨矣據此則破博昌在五月今從朱友寧傳, SBCK: ''}
