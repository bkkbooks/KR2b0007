  - {type: variant, offset: 0, length: 222, content: 欽定四庫全書資治通鑑卷三十八宋司馬光撰胡三省音註漢紀三十起旃䝉大淵獻盡𤣥黓敦牂凡八年王莽下天鳳三年春二月大赦天下民訛言黄龍墮死黄山宫中晉灼曰黄山宫在槐里黄圖黄山宫在興平縣西三十里百姓犇走往觀者有萬數莽惡之師古曰莽自謂黄徳故有此妖惡烏路翻捕繫問所從起不能得單于咸既和親求其子登屍莽欲遣使送致恐咸怨恨害使者乃收前言當誅侍子者故將軍陳欽以他辠殺之誅侍子事見上卷始建國三年使疏吏翻莽選辯士濟南王咸為大使夏五月莽復遣和親矦歙與咸等送右厨唯姑夕王因奉歸前所, SBCK: ''}
