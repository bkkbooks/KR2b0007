  - {type: variant, offset: 9012, length: 453, content: 舊考異曰錦里耆傳咸通十四年十一月五日雲南蠻冦再犯大度河黄景復擊敗之十二月二十五日復攻大度河三十日蠻乘勝進攻黎州十二月二十八日蠻來只到新津前後蜀州界左右便退竟不到城下按咸通十四年南詔冦西川事舊紀南詔傳唐年補録唐録備闕讀寳運録皆無之獨耆舊傳載之甚詳新書取之作南詔傳而實録但云十二月西川奏南蠻入冦黎州刺史黄景復擊退之新紀但云十二月雲南蠻冦黎州蓋亦出於耆舊傳耳舊紀乾符元年冬南詔蠻冦西蜀詔河西河東山南西道東川徴兵赴援實録乾符元年十月西川奏雲南蠻入冦十二月雲南蠻冦西川坦綽致書於牛叢欲求入覲河東山南西道及東川兵援之月末又云南蠻侵犯黎州而成都守禦無備殊不拒敵踰河越嶺洞無籬障賴積雪丈餘遂阻隔奔衝之勢又邛雅二州刺史望風奔遁蠻燒劫一空牛叢不曉兵失於探候而奏報差戾詔切責之蠻劫畧黎雅間破黎州入邛崍闗成都閉三日蠻乃去新紀乾符元年十二月雲南蠻冦黎雅二州河西河東山南東道東川兵伐雲南按實録咸通十四年十一月七日路巖始移荆南八日牛叢始除西川而耆舊傳蠻入冦皆叢任内事恐誤先一年也實録新紀因此於十四年十二月添雲南冦黎州事實皆在乾符元年冬也, SBCK: ''}
