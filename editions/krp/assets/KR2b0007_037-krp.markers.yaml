  - {type: variant, offset: 0, length: 310, content: 欽定四庫全書資治通鑑卷三十七宋司馬光撰胡三省音註漢紀二十九起屠維大荒落盡閼逢閹蔑鹿六年王莽中始建國元年春正月朔去年十二月莽改元以十二月為歲首逋鑑不書不與其改正朔也莽帥公侯卿士奉皇太后璽韍帥讀曰率璽斯氏翻師古曰韍謂璽之組音弗上太皇太后順符命去漢號焉上時掌翻去𦍑呂翻初莽娶故丞相王訢孫宜春侯咸女為妻師古曰王訢為丞相初封宜春矦𫝊爵至孫咸恩澤侯表宜春侯國於汝南立以為皇后生四男宇獲前誅死安頗荒忽師古曰荒音呼廣翻乃以臨為皇太子安為新嘉辟師古曰辟君也謂之辟者取為國君之義辟音壁封宇子六人皆為公千為功隆公夀為功明公吉為功成公宗為功崇公世為功昭公利為功著公大赦天下莽乃策命孺子為定安公封以萬户地方百里立漢祖宗之廟於其國與周後並行其正朔服, SBCK: ''}
