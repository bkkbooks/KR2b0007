  - {type: variant, offset: 0, length: 264, content: 欽定四庫全書資治通鑑卷一百二十六宋司馬光撰胡三省音註宋紀八起重光單閼盡𤣥黓執徐凡二年太祖文皇帝下之上元嘉二十八年春正月丙戌朔魏主大㑹羣臣於𤓰歩山上班爵行賞有差魏人縁江舉火太子左衛率尹𢎞言於上曰六夷如此必走北兵欲退慮南兵之追截故舉火以示威尹弘習知北人軍情因言于上自晉氏失馭劉石以來始有六夷之名率所律翻丁亥魏掠居民焚廬舍而去胡誕世之反也見上卷二十四年江夏王義恭等奏彭城王義康數有怨言揺動民聽故不逞之族因以生心夏戶雅翻數所角翻不逞之族謂廢放之家不得逞志于時者也請徙義康廣州上將徙義康先遣使語之使䟽吏翻語牛倨翻義康曰人生㑹死吾豈愛生必為, SBCK: 爲}
