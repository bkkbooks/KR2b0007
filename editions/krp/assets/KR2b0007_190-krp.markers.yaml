  - {type: variant, offset: 10301, length: 469, content: 闥考異曰髙祖實録壬申太子與黑戰於魏州城下破之闥抽軍北遁甲戌追闥於毛州賊背永濟渠而陳接戰又破之舊傳六年二月太子破黑闥于館陶革命記闥遁至館陶二十五日官軍至闥敗走按館陶即毛州也長厯十二月壬申二十五日甲戌二十七日蓋實録據奏到之日也舊傳尤疎今從革命記太宗實録云黑闥重反髙祖謂太宗曰前破黑闥欲令盡殺其黨使空山東不用吾言致有今日及隠太子征闥平之將遣唐儉往使男子年十五已上悉阬之小弱及婦女摠驅入闗以實京邑太宗諫曰臣聞惟徳動天唯恩容衆山東人物之所河北蠶綿之鄉而天府委輸待以成績今一旦見其反覆盡戮無辜流離寡弱恐以殺不能止亂非行弔伐之道其事遂寢新書隠太子傳云黑闥敗於洺水太子建成問於洗馬魏徴曰山東其定乎對曰黑闥雖敗殺傷太甚其魁黨皆縣名處死妻子係虜欲降無繇雖有赦令獲者必戮不大蕩宥恐殘賊嘯結民来可安既而黑闥復振廬江王瑗弃洺州山東亂命齊王元吉討之有詔降者赦罪衆不信建成至獲俘皆撫遣之百姓欣悦賊懼夜奔兵追戰黑闥衆猶盛乃縱囚使相告曰禠而甲還鄉里若妻子獲者既已釋矣衆乃散或縛其渠長降遂禽黑闥按髙祖雖不仁亦不至有欲空山東之理史臣專欲歸美太宗其於髙祖亦太誣矣今采革命記及新書, SBCK: ''}
