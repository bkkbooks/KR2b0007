  - {type: variant, offset: 8615, length: 346, content: 行考異曰髙祖實録曰建成幼不拘細荒色嗜酒好畋獵常與博徒遊故時人稱為任俠髙祖起義於太原建成時在河東本既無寵又以今上首建大計髙祖不之思也而今上白髙祖遣使召之盤游不即往今上急難情切遽以手書諭之建成乃與元吉間行赴太原隋人購求之㡬為所獲及義旗建而方至髙祖亦喜其獲免因授以兵又曰建成帷簿不修有禽獸之行聞於逺邇今上以為恥嘗流涕諌之建成慙而成憾又曰太宗每摠戎律惟以撫接才賢為務至於參請妃媛素所不行太宗實録曰隠太子始則流宕河曲逸遊是好素無才畧不預經綸於後雖統左軍非衆所附既陞儲兩坐構猜嫌太宗雖備禮竭誠以希恩睦而妬害之心日以滋甚又巢刺王性本兇愎志識庸下行同禽獸兼以弃鎮失守罪戾尤多反害太宗之能於是潛苞毁譖同惡相濟膚受日聞雖大名徽號禮冠羣后而情疎意隔寵異曩時按建成元吉雖為頑愚既為太宗所誅史臣不無抑揚誣諱之辭今不盡取, SBCK: ''}
