  - {type: variant, offset: 2224, length: 287, content: 不考異曰髙祖實録王君廓知可守潰圍而出秦王謂諸將曰誰能代者士信曰願以死守因遣之按君廓若已潰圍而出則黑闥圍守益固士信何以復得入城革命記曰太宗知賊勢盛恐王君廓不能固以問諸將士信以為無慮太宗使士信入守之太宗登段王墓以旗招王君廓從南門突闈不得即向北門併兵攻捉門人少退得出士信亦以左右二百人入城經八日晝夜被攻木石俱盡士信被左右執之以降賊五年正月城陷李去惑以數十人突圍出歸太宗去惑後授秦州都督李潘買拜檀州刺史李開弼城陷而没贈上柱國以公禮葬今從之髙祖實録士信死時年二十八舊傳云年二十按士信始從張須陁擊王薄等時年十四若死時年二十八則在大業四年於時王薄未為盜年二十則在大業十二年是嵗須陁死今從之, SBCK: ''}
