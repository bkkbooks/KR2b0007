  - {type: variant, offset: 1335, length: 378, content: 王考異曰實録癸亥秦擊劉黑闥於列人大破之革命記十一月太宗度河入相州劉黑闥從洺州勒兵拒王師置營於鄴縣東三十里每日兩軍皆挑戰而大兵皆不出經十日餘洺水縣人李去惑李潘買李開弼等為車騎驃騎領兵在劉黑闥營去惑等背賊營來入洺州城誑人云劉黑闥已敗先走得歸乃喚得宗室子弟二百餘人守城定遣使間道以告太宗太宗遣彭國公王君廓領馬軍一千五百騎入洺州經十許日黑闥引兵攻洺州行至故列人城西秦叔寶等以五千騎擊之叔寶等為闥所敗又以伏兵從河下起横擊黑闥敗之㑹日暮收軍其夜三更賊兵摠至洺州城東營即於城兩門掘壕豎柵防王廓之走洺州城四面有水闊五十步已上深皆三四尺黑闥於東北角兩處填柴運土作甬道以撞車攻城太宗三度將兵擊之賊置陣拒官軍攻城愈急按髙祖太宗實録皆以去年十二月命太宗討黑闥今年正月始至河北無十一月度河之事太宗實録亦無列人戰事蓋叔寶破賊秦王奏之耳又按洺水洺州屬縣去惑君廓所據者洺水縣城水字誤作州耳, SBCK: ''}
