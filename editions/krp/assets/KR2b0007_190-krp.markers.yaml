  - {type: variant, offset: 11058, length: 246, content: 崔元愻為偽深州摠管黑闥欲至城中陳列三千餘兵擬納黑闥據城拒守北勾突厥諸葛徳威為車騎領當城之兵有張善䕶者先任鄉長來就軍中語三五少年曰可捉黑闥以取富貴今若不捉在後終是擾亂山東廢我等作生活諸少年咸云非諸葛車騎不可善䕶知徳威非得酒食不肯出師乃于家宰一肥猪出酒一石延徳威而語之徳威許諾黑闥至元愻乃請之入城而不許唯就市中遣鋪設而坐食元愻請以城中兵呈閲言並精鋭必堪拒守黑闥食而許之元愻乃召兵以呈之徳威以前領軍卒出即就市擒劉黑闥送於洺州皇太子所元愻與數十人奔突厥斬黑闥於洺州城西臨刑乃嘆云云今從實録亦兼采革命記, SBCK: ''}
