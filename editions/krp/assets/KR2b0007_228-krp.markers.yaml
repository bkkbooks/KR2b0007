  - {type: variant, offset: 10440, length: 316, content: 之夜考異曰叚公别傳云五日泚使涇原將李忠臣高昻等統鋭兵五千以襲奉天六日賊泚又令兵馬使韓旻領馬歩二千以繼之奉天記曰秀實與海賔宻謀誅泚佯入請間計事而海賔置七首於靴欲以相應為閽者見覺秀實遽奪源休笏挺而擊之舊泚傳曰秀實與劉海賔謀朱泚且虞叛卒之震驚法駕乃潛為賊符追所發兵至六日兵及駱驛而回因與海賔同入見泚為陳逆順之理而海賔於靴中取七首為其所覺遂不得前秀實知不可以義動遽奪源休象笏挺而擊泚秀實傳曰與海賔約事急為繼而令明禮應於外及秀實擊泚而海賔等不至按李忠臣等若已將五千人襲奉天則秀實雖追還旻兵無益矣又海賔若於靴中取七首為賊所覺則登時死矣焉能復逃若為閽者所覺亦應時被擒事跡諠著賊為之備秀實亦不得發矣此數者皆恐難信今但取叚公行狀幸奉天録及舊傳可信者存, SBCK: ''}
