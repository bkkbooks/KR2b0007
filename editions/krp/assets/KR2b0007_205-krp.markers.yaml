  - {type: variant, offset: 12038, length: 371, content: 帥讀曰率敺烏口翻夫考異曰舊傳云又有發其隂謀者太平公主乳母張人令壮士縳而縊殺之送尸白馬寺其侍者僧徒皆流竄遠惡處李啇隠宜都内人傳云武后簒既久頗放縱耽内習不敬宗廟四方日有叛逆防豫不暇時宜都内人以唾壺進思有以諌者后坐帷下倚檀几與語問四方事宜内人曰大家知女卑於男邪后曰知内人曰古有女媧亦不正是天子佐伏羲理九州耳後世孃姥冇越出房閤斷天下事皆不得其正多是輔昏主不然抱小兒獨大家改夫姓改去釵釧襲服冠冕符瑞日至大臣不敢動真天子也然今内之弄臣狎人朝夕進御者乆未屏去妾疑此未當天意后曰何内人曰女隂也男陽也陽尊而隂卑雖大家以隂事主天然宜體取剛亢明烈以銷群陽陽銷然後隂得志也今狎㺯日至處大家夫宫尊位其勢隂求陽也陽勝而隂亦㣲不可久也大家始今日能屛去男妾獨立天下則陽之剛亢明烈可有矣如是過萬萬世男子益削女子益專妾之願在此后雖不能盡用然即日下令誅作明堂者此盖文士寓言今從實録, SBCK: ''}
