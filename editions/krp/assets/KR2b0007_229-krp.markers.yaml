  - {type: variant, offset: 11010, length: 320, content: 歐陽修曰書云七世之廟可以觀徳而禮家之説世數不同然自禮記王制祭法禮器大儒荀卿劉歆班固王肅之徒以為七廟者多盖自漢魏以來創業之君特起其上世又㣲無功徳以備祖宗故其初皆不能立七廟唐武徳元年始立四廟高祖崩朱子奢請立七廟虛太祖之室以待尚書入座議禮曰天子三昭三穆與太祖之廟而七晉宋齊梁皆立親廟六此故事也於是宣簡公懿王景元二帝四廟更祔𢎞農府君及高祖為六室太宗崩𢎞農以世逺毁而祔太宗高宗崩又遷宣簡而祔高宗皆為六室中宗神龍初以景帝為始祖而元帝不遷而祔孝敬帝由是爲七室中宗崩孝敬别立廟而祔中宗遂為七室至睿宗崩中宗立别廟而祔睿宗開元十年詔宣皇帝復祔正室諡爲獻祖并諡光帝爲懿祖又以中宗遷祔太廟於是太廟爲九室寳應二年祧獻懿而祔𤣥宗肅宗代宗崩又遷元皇帝而祔代宗自是常為九室, SBCK: ''}
