  - {type: variant, offset: 0, length: 343, content: 欽定四庫全書資治通鑑卷一百四十五宋司馬光撰胡三省音註梁紀一起𤣥黓敦牂盡閼逢涒灘凡三年公齊宣徳太后詔蕭衍自建安郡公進爵梁衍志也尋進爵為王尋受齊禪國因號曰梁髙祖武皇帝諱衍字叔達小字練兒南蘭陵中都里人姓蕭氏與齊同出淮陰令整三世至順之順之於齊髙帝為族弟帝順之之子也按通鑑武皇帝紀凡十八卷以一二為次此卷武皇帝之下合有一字天監元年自是年三月以前猶是齊和帝中興二年春正月齊和帝遣兼侍中席闡文等慰勞建康勞力到翻大司馬衍下令凡東昏時浮費自非可以習禮樂之容繕甲兵之備者餘皆禁絶戊戌迎宣徳太后入宫臨朝稱制衍解承制衍承制見上卷上年蹔解之以覘人心朝直遥翻己亥以寧朔將軍蕭昺監南兖州諸軍事昺衍之從父弟也昺兵永翻昺與帝同祖治書侍御史道賜監工衘翻從才用翻壬寅進大司馬衍都督中外諸軍事劒履上殿贊拜不名上時掌翻己酉以大司馬, SBCK: ''}
