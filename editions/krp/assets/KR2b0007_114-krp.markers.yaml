  - {type: variant, offset: 0, length: 340, content: 欽定四庫全書資治通鑑卷一百十四宋司馬光撰胡三省音注晉紀三十六起旃蒙大荒落盡著雍涒灘凡四年安皇帝已義熙元年春正月南陽太守扶風魯宗之起兵襲襄陽桓蔚走江陵蔚紆勿翻己丑劉毅等諸軍至馬頭桓振挾帝出屯江津江津戍在江陵南臨江滸荆州記曰江陵縣東三里有津鄉水經注江陵城南有馬牧城此洲始自枚回下迄于此長七十餘里洲上有奉城江津長所治遣使求割江荆二州奉送天子毅等不許辛卯宗之擊破振將温楷于柞溪水經注柞溪水出江陵縣北葢諸池散流咸所㑹合積以成川東流逕魯宗之壘南又東注船官湖將即亮翻柞才各翻又音作進屯紀南郡國志江陵縣北十餘里有紀南城振留桓謙馮該守江陵引兵與宗之戰大破之劉毅等擊破馮該於豫章口水經注江水過江陵而東得豫章口夏水所通也西北有豫章岡葢因岡而得名其地去江陵城二十里桓謙棄城走毅等入江陵執卞範之等斬之桓振還, SBCK: ''}
