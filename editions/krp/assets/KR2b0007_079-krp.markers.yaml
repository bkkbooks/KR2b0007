  - {type: variant, offset: 0, length: 323, content: 欽定四庫全書資治通鑑卷七十九宋司馬光撰胡三省音註晉紀一起旃䝉作噩盡𤣥黓執徐凡八年王司馬氏河内温縣人宣王懿得魏政傳景師至文王昭始封晉公以温縣本晉地故以為國號世祖武皇帝上之上諱炎字安世姓司馬氏宣王懿之孫文王昭之長子文王廟號太祖故帝廟號世祖謚法克定禍亂曰武泰始元年是年十二月方受禪改元此猶是魏咸熈二年春三月吳主使光禄大夫紀陟五官中郎将洪璆璆渠尤翻與徐紹孫彧偕來報聘紹彧聘吳見上卷上年紹行至濡須有言紹譽中國之美者譽音余吳主怒追還殺之夏四月吳改元甘露時因蒋陵言甘露降改元五月魏帝加文王殊禮謂旌旗車馬樂舞冕服皆如帝者之儀進王妃曰后世子曰太子癸未大赦秋七月吳主逼殺景皇后遷景帝四子於吳尋又殺其長者二人吳主貶景后封四弟事見上卷上年長知兩翻八月辛夘文王卒太子嗣為相, SBCK: ''}
