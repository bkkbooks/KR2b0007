front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷二百三十八宋司馬光撰胡三省音注唐紀五十四起屠維赤奮若七月盡𤣥黓執徐九月凡三年有竒憲宗昭文章武大聖至神孝皇帝上之下元和四年秋七月壬戌御史中丞李夷簡彈京兆尹楊憑前為江西觀察使貪汚僭侈丁邜貶憑臨賀尉臨賀漢縣屬蒼梧郡以臨賀水故名唐帶賀州夷簡元懿之𤣥孫也鄭王元懿髙祖之子上命盡籍憑資産財物田園人資以生謂之資産李絳諫曰舊制非反逆不籍其家上乃止憑之親友無敢送者櫟陽尉徐晦獨至藍田與别櫟音藥太常卿權德輿素與晦善謂之曰君送楊臨賀誠為厚矣無乃為累乎累良瑞翻對曰晦自布衣䝉楊公知奬今日逺謫豈得不與之别借如明公它日為䜛人所逐晦敢自同路人乎德輿嗟嘆稱之於朝朝直遥翻後數日李夷簡奏為監察御史晦謝曰晦平生未嘗得望公顔色公何從而取之夷簡曰君不負楊臨賀肯負國乎上宻問諸學士曰今欲用王承宗為成德留後割德棣二州更為一鎮以離其勢并使承宗輸二税請官吏一如師道何如李師道事見上卷元年李絳等對曰德棣之𨽻成德為日已久貞元初王武俊破朱滔取德棣今一且割之恐承宗及其將士憂疑怨望得以為辭况其鄰道情狀一同各慮他日分割或潛相構扇萬一旅拒倍難處置願更三思旅衆也旅拒者挾衆而拒上命也處昌吕翻三息暫翻又如字所是二税官吏願因弔祭使至彼自以其意諭承宗令上表陳乞如師道例勿令知出陛下意如此則幸而聽命於理固順若其不聽體亦無損上又問今劉濟田季安皆有疾若其物故物故注已見漢紀史炤曰顔師古曰物故死也言其同於鬼物而故也一曰不欲斥言云其所服用之物皆已故也豈可盡如成德付授其子天下何時當平議者皆言宜乗此際代之不受則發兵討之時不可失如何對曰羣臣見陛下西取蜀東取呉蜀謂劉闢呉謂李錡易於反掌易以豉翻下同故謟䛕躁競之人躁輕也競爭也爭獻䇿畫勸開河北不為國家深謀逺慮為于偽翻陛下亦以前日成功之易而信其言臣等夙夜思之河北之勢與二方異何則西川浙西皆非反側之地其四鄰皆國家臂指之臣臂指用賈誼語意言其順使也劉闢李錡獨生狂謀其下皆莫之與闢錡徒以貨財㗖之大軍一臨則渙然離耳故臣等當時亦勸陛下誅之以其萬全故也成德則不然内則膠固嵗深外則蔓連勢廣膠固如膠之附著堅固也蔓連如蔓草之曼衍連屬也其將士百姓懐其累代喣嫗之恩喣吁句翻嫗衣遇翻鄭𤣥曰氣曰喣體曰嫗不知君臣逆順之理諭之不從威之不服將為朝廷羞又鄰道平居或相猜恨及聞代易必合為一心蓋各為子孫之謀亦慮他日及此故也萬一餘道或相表裏兵連禍結財盡力竭西戎北狄乗間窺窬西戎謂吐蕃北狄謂回鶻間古莧翻下同其為憂患可勝道哉勝音升濟季安與承宗事體不殊若物故之際有間可乗當臨事圖之於今用兵則恐未可太平之業非朝夕可致願陛下審處之處昌吕翻時呉少誠病甚絳等復上言少誠病必不起復扶又翻上時掌翻淮西事體與河北不同四旁皆國家州縣不與賊鄰無黨援相助朝廷命帥帥所類翻今正其時萬一不從可議征討臣願捨恒冀難致之䇿就申蔡易成之謀脱或恒冀連兵事未如意蔡州有舋勢可興師南北之役俱興財力之用不足儻事不得已須赦承宗絳等之言後無不驗則恩德虚施威令頓廢不如早賜處分處昌吕翻分扶問翻以收鎮冀之心此時未改恒州為鎮州史以後來所改州名書之耳坐待機宜必獲申蔡之利既而承宗久未得朝命頗懼累表自訴八月壬午上乃遣京兆少尹裴武詣真定宣慰恒州古真定承宗受詔甚㳟曰三軍見廹不暇俟朝㫖議獻德棣二州以明懇欵丙申安南都䕶張舟奏破環王三萬衆林邑國至德後改號環王九月甲辰朔裴武復命庚戍以承宗為成德節度使恒冀深趙州觀察使德州刺史薛昌朝為保信軍節度德棣二州觀察使考異曰李司空論事初武衘命使鎮州令諭王承宗割德棣兩州歸朝廷武飛表上言一如朝廷意㫖遂除昌朝德棣節度及旌節至徳州而昌朝已追到鎮州朝命遂不行比及武還事宜與先上表參差按實録甲辰武至自鎮州庚戌除昌朝非武未還據所上表除之也論事集誤今從實録昌朝嵩之子薛嵩亦安史舊將代宗初來降王氏之壻也故就用之田季安得飛報先知之使謂承宗曰昌朝隂與朝廷通故受節鉞承宗遽遣數百騎馳入德州執昌朝至真定囚之中使送昌朝節過魏州季安陽為宴勞留使者累日比至德州已不及矣勞力到翻比必利翻及也上以裴武為欺罔又有譖之者曰武使還使疏吏翻還音旋先宿裴垍家明旦乃入見上怒甚以語李絳見賢遍翻語牛倨翻欲貶武於嶺南絳曰武昔陷李懐光軍中守節不屈蓋貞元初李懐光據河中時也豈容今日遽為姦回蓋賊多變詐人未易盡其情承宗始懼朝廷誅討故請獻二州既䝉恩貸而鄰道皆不欲成德開分割之端計必有間説誘而脅之使不得守其初心者李絳可謂洞見田季安王承宗之情間古莧翻説式芮翻誘音酉非武之罪也今陛下選武使入逆亂之地使還一語不相應遽竄之遐荒臣恐自今奉使賊庭者以武為戒茍求便身率為依阿兩可之言史炤曰依阿謂不特立其説常附順人言兩可謂無所可否莫肯盡誠具陳利害如此非國家之利也且垍武久處朝廷處昌吕翻諳練事體諳烏含翻豈有使還未見天子而先宿宰相家乎臣敢為陛下必保其不然為于偽翻此殆有䜛人欲傷武及垍者願陛下察之上良久曰理或有此遂不問丙辰振武奏吐蕃五萬餘騎至拂梯泉史炤曰拂薄勿切梯天黎切本又作鸊鵜泉在豐州西受降城北三百里辛未豐州奏吐蕃萬餘騎至大石谷掠回鶻入貢還國者左神䇿軍吏李昱貣長安富人錢八千緡滿三嵗不償貣吐得翻假貣也京兆尹許孟容收捕械繫立期使償曰期滿不足當死一軍大驚中尉訴於上上遣中使宣㫖付本軍孟容不之遣中使再至孟容曰臣不奉詔當死然臣為陛下尹京畿京兆以長安萬年為京縣餘屬縣為畿縣非抑制豪彊何以肅清輦下錢未畢償昱不可得上嘉其剛直而許之京城震栗上遣中使諭王承宗使遣薛昌朝還鎮使之遣還德州承宗不奉詔冬十月癸未制削奪承宗官爵以左神䇿中尉吐突承璀為左右神䇿河中河陽浙西宣歙等道行營兵馬使招討處置等使唐實録云開元二十年置諸道採訪處置使専以觀省風俗黜陟官吏其後伐叛討有罪則置招討處置使處昌吕翻翰林學士白居易上奏以為國家征伐當責成將帥近嵗始以中使為監軍自古及今未有徵天下之兵專令中使統領者也今神䇿軍既不置行營節度使則承璀乃制將也制將言諸軍進退皆受制於承璀將即亮翻又充諸軍招討處置使則承璀乃都統也都統謂都統諸軍唐中世以後專征之任臣恐四方聞之必窺朝廷四夷聞之必笑中國白居易之言自春秋書多魚漏師左傳夙沙衛殿齊師來况吐突承璀以寺人專征乎崇觀間金人有所侮而動正如此陛下忍令後代相傳云以中官為制將都統自陛下始乎臣又恐劉濟茂昭及希朝從史乃至諸道將校皆恥受承璀指麾心既不齊功何由立此是資承宗之計而挫諸將之勢也陛下念承璀勤勞貴之可也憐其忠赤富之可也至於軍國權柄動闗理亂朝廷制度出自祖宗陛下寧忍徇下之情而自隳法制從人之欲而自損聖明何不思於一時之間而取笑於萬代之後乎時諫官御史論承璀職名太重者相屬屬之欲翻上皆不聽戊子上御延英殿度支使李元素鹽鐵使李鄘京兆尹許孟容御史中丞李夷簡給事中吕元膺穆質右補闕獨孤郁等極言其不可曰考異曰舊承璀傳諫官御史上疏相相屬言自古無中貴人為兵馬統帥者補闕獨孤郁叚平仲尤激切吕元膺傳元膺與給事中穆質孟簡兵部侍郎許孟容等八人抗論不可若据承璀傳則是九人又平仲時為諫議大夫非補闕恐誤今從實録上不得已明日削承璀四道兵馬使改處置為宣慰而已李絳嘗極言宦官驕横横户孟翻侵害政事䜛毁忠貞上曰此屬安敢為䜛就使為之朕亦不聽絳曰此屬大抵不知仁義不分枉直惟利是嗜得賂則譽跖蹻為亷良怫意則毁龔黄為貪暴李竒曰跖秦大盗也楚之大盗為莊蹻師古曰莊周云跖栁下惠之弟蓋寓言也龔黄龔遂黄霸也譽音余蹻居畧翻怫符弗翻能用傾巧之智構成疑似之端朝夕左右浸潤以入之陛下必有時而信之矣自古宦官敗國者敗蒲邁翻備載方冊陛下豈得不防其漸乎己亥吐突承璀將神䇿兵發長安命恒州四面藩鎮各進兵招討初呉少誠寵其大將呉少陽名以從弟從才用翻署為軍職出入少誠家如至親累遷申州刺史少誠病不知人家僮鮮于熊兒詐以少誠命召少陽攝副使知軍州事少誠有子元慶少陽殺之十一月己巳少誠薨少陽自為留後是嵗雲南王尋閤勸卒子勸龍晟立田季安聞吐突承璀將兵討王承宗聚其徒曰師不跨河二十五年矣自德宗討田悦不克王師不復跨河今一旦越魏伐趙趙虜魏亦虜矣計為之奈何其將有超伍而言者超伍出位而言也蓋超出儔伍之中而言曰願借騎五千以除君憂季安大呼曰壯哉兵决出格沮者斬呼火故翻格音閣幽州牙將絳人譚忠為劉濟使魏為于偽翻使疏吏翻知其謀入謂季安曰如某之謀是引天下之兵也何者今王師越魏伐趙不使耆臣宿將而專付中臣耆老也宿舊也不輸天下之甲而多出秦甲關中之地古秦地也故謂關中之兵為秦甲君知誰為之謀此乃天子自為之謀欲將夸服於臣下也夸服謂欲自衒於筭畧以服臣下之心若師未叩趙而先碎於魏是上之謀反不如下且能不恥於天下乎既恥且怒必任智士畫長䇿仗猛將練精兵畢力再舉渉河鑑前之敗必不越魏而伐趙校罪輕重必不先趙而後魏先悉薦翻後户遘翻是上不上下不下當魏而來也季安曰然則若之何忠曰王師入魏君厚犒之於是悉甲壓境號曰伐趙而可隂遺趙人書曰犒苦到翻遺唯季翻下遺魏同魏若伐趙則河北義士謂魏賣友魏若與趙則河南忠臣謂魏反君賣友反君之名魏不忍受執事若能隂解陴障遺魏一城魏得持之奏㨗天子以為符信此乃使魏北得以奉趙西得以為臣長安在魏西為臣言能承上命不悖臣道於趙有角尖之耗角尖言所耗者小於魏獲不世之利執事豈能無意於魏乎趙人脱不拒君是魏霸基安矣季安曰善先生之來是天眷魏也遂用忠之謀與趙隂計得其堂陽堂陽漢縣屬鉅鹿郡唐屬冀州在州西南忠歸幽州謀欲激劉濟討王承宗㑹濟合諸將言曰天子知我怨趙今命我伐之今當作必趙亦必大備我伐與不伐孰利忠疾對曰天子終不使我伐趙趙亦不備燕濟怒曰爾何不直言濟與承宗反乎命繫忠獄使人視成德之境果不為備後一日詔果來令濟專䕶北疆勿使朕復掛胡憂而得專心於承宗復扶又翻濟乃解獄召忠曰信如子斷矣解獄謂釋其囚也斷丁亂翻何以知之忠曰盧從史外親燕内實忌之外絶趙内實與之此為趙畫曰為于偽翻燕以趙為障雖怨趙必不殘趙不必為備一且示趙不敢抗燕二且使燕獲疑天子趙人既不備燕潞人則走告于天子曰盧從史鎮潞州故謂之潞人燕厚怨趙趙見伐而不備燕是燕反與趙也此所以知天子終不使君伐趙趙亦不備燕也濟曰今則奈何忠曰燕趙為怨天下無不知自朱滔以來燕趙交惡今天子伐趙君坐全燕之甲一人未濟易水此正使潞人以燕賣恩於趙敗忠於上言燕本忠於上而盧從史以計敗之敗補邁翻兩皆售也賣物去手曰售是燕貯忠義之心卒染私趙之口不見德於趙人惡聲徒嘈嘈於天下耳貯丁吕翻卒子恤翻嘈昨勞翻惟君熟思之濟曰吾知之矣乃下令軍中曰五日畢出後者醢以徇譚忠頗有戰國説士之風而心為唐五年春正月劉濟自將兵七萬人擊王承宗時諸軍皆未進濟獨前奮擊㧞饒陽束鹿河東河中振武義武四軍為恒州北面招討㑹于定州㑹望夜軍吏以有外軍請罷張燈張茂昭曰三鎮官軍也三鎮謂河中河東振武何謂外軍命張燈不禁行人不閉里門三夜如平日亦無敢喧嘩者唐制兩京及諸州縣街巷率置邏卒曉暝傳呼以禁夜行惟元夕張燈弛禁前後各一日丁夘河東將王榮㧞王承宗洄湟鎮吐突承璀至行營威令不振與承宗戰屢敗左神䇿大將軍酈定進戰死定進驍將也酈定進擒劉闢有驍名軍中奪氣河南尹房式有不法事東臺監察御史元稹奏攝之唐制御史分司東都謂之東臺攝收也擅令停務朝廷以為不可罸一季俸召還西京至敷水驛華州華隂縣西二十四里有敷水渠九域志華隂縣有敷水鎮有内侍後至破驛門呼罵而入以馬鞭擊稹傷面良考異曰實録云中使仇士與元稹爭㕔按稹及白居易傳皆云劉士元而實録云仇士良恐誤今止云内侍上復引稹前過貶江陵士曹復扶又翻前過謂擅令河南尹停務上知曲在中官故引前過以貶稹翰林學士李絳崔羣言稹無罪白居易上言中使陵辱朝士中使不問而稹先貶恐自今中使出外益暴横横户孟翻人無敢言者又稹為御史多所舉奏不避權勢切齒者衆恐自今無人肯為陛下當官執法疾惡繩愆為于偽翻有大姦猾陛下無從得知上不聽上以河朔方用兵不能討呉少陽三月己未以少陽為淮西留後果如李絳之言諸軍討王承宗者久無功白居易上言以為河北本不當用兵今既出師承璀未嘗苦戰已失大將謂酈定進戰死也與從史兩軍入賊境遷延進退不惟意在逗留亦是力難支敵希朝茂昭至新市鎮竟不能過新市漢縣名屬中山郡唐初新市縣屬觀州武德五年廢州并廢新市為鎮屬九門縣劉濟引全軍攻圍樂壽久不能下按劉濟時軍瀛洲而攻樂壽樂壽時屬深州在瀛洲南六十里師道季安元不可保察其情狀似相計㑹各收一縣遂不進軍譚忠之為田季安計者白居易已窺見之矣陛下觀此事勢成功有何所望以臣愚見須速罷兵若又遲疑其害有四可為痛惜者二可為深憂者二何則若保有成即不論用度多少既的知不可即不合虛費貲糧貲財也或曰當作資悟而後行事亦非晩今遲校一日則有一日之費更延旬月所費滋多終須罷兵何如早罷以府庫錢帛百姓脂膏資助河北諸侯轉令彊大此臣為陛下痛惜者一也為于偽翻下同臣又恐河北諸將見呉少陽已受制命言制以呉少陽為淮西留後必引事例輕重同詞請雪承宗若章表繼來即義無不許請而後捨體勢可知轉令承宗膠固同類如此則與奪皆由鄰道恩信不出朝廷實恐威權盡歸河北此為陛下痛惜者二也今天時已熱兵氣相蒸至於饑渇疲勞疾疫暴露驅以就戰人何以堪縱不惜身亦難忍苦况神䇿烏雜城市之人例皆不慣如此忽思生路連兵不解不死於戰亦死於久屯必思逃奔潰散為求生之路一人若逃百人相扇一軍若散諸軍必揺事忽至此悔將何及此為陛下深憂者一也臣聞回鶻吐蕃皆有細作細作古之諜者中國之事小大盡知今聚天下之兵唯討承宗一賊自冬及夏都未立功則兵力之彊弱資費之多少豈宜使西戎北虜一一知之忽見利生心乗虛入冦以今日之勢力可能救其首尾哉兵連禍生何事不有萬一及此實闗安危此其為陛下深憂者二也其字衍考異曰白氏集云五月十日進据此疏云從史雖經接戰與賊勝負畧均則是未就縳也此月戊戌從史已流驩州疑五月當為四月故移於此盧從史首建伐王承宗之謀事見上卷上年五月及朝廷興師從史逗留不進隂與承宗通謀令軍士潛懐承宗號凡行軍各有號以相識别又髙芻粟之價以販度支時吐突承璀總行營兵屯邢趙界邢州昭義廵屬也度夬芻粟不能逺致以給行營就昭義市糴故盧從史得髙其價以牟利度徒洛翻諷朝廷求平章事誣奏諸道與賊通不可進兵上甚患之㑹從史遣牙將王翊元入奏事裴垍引與語為言為臣之義為言于偽翻微動其心翊元遂輸誠言從史隂謀及可取之狀垍令翊元還本軍經營復來京師復扶又翻遂得其都知兵馬使烏重𦙍等款要款誠也垍言於上曰從史狡猾驕狠必將為亂今聞其與承璀對營視承璀如嬰兒往來都不設備失今不取後雖興大兵未可以嵗月平也上初愕然熟思良久乃許之從史性貪承璀盛陳竒玩視其所欲稍以遺之遺唯季翻從史喜益相昵狎昵尼質翻甲申承璀與行營兵馬使李聽謀召從史入營慱伏壯士於幕下突出擒詣帳後縳之内車中馳詣京師王考異曰承璀傳曰承璀出師經年無功乃遣宻人告承宗令上疏待罪許以罷兵為觧仍奏昭義節度使盧從史素與賊通許為承宗求節鉞乃誘潞洲牙將烏重𦙍謀執從史送京師今從裴垍等傳左右驚亂從史之左右也承璀斬十餘人諭以詔㫖從史營中士聞之皆甲以出操兵趨譁操七刀翻趨譁言趨走而喧譁也烏重𦙍當軍門叱之曰天子有詔從者賞敢違者斬士卒皆歛兵還部伍會夜車疾驅未明已出境重𦙍承洽之子新書作承玼之子韓愈烏氏先廟碑亦作承玼一本云玼或作洽聽晟之子也丁亥范希朝張茂昭大破承宗之衆於木刀溝新唐書地理志定州新樂縣東南二十里有木刀溝有民木刀居溝旁因名之上加烏重𦙍之功欲即授以昭義節度使李絳以為不可請授重𦙍河陽以河陽節度使孟元陽鎮昭義㑹吐突承璀奏已牒重𦙍句當昭義留後句舌候翻當丁浪翻絳上言昭義五州據山東要害五州澤潞邢洺磁要害者於我為要於敵為害魏博恒幽諸鎮蟠結魏博一鎮恒一鎮幽一鎮謂之河朔三鎮朝廷惟恃此以制之邢磁洺入其腹内邢州臨趙境磁洺臨魏境其界犬牙相入誠國之寳地安危所繫也曏為從史所據使朝廷旰食今幸而得之承璀復以與重𦙍復扶又翻臣聞之驚歎實所痛心昨國家誘執從史雖為長䇿已失大體不能明斥從史之罪而行天討乃誘執之是為失體今承璀又以文牒差人為重鎮留後為之求旌節為于偽翻無君之心孰甚於此陛下昨日得昭義人神同慶威令再立今日忽以授本軍牙將物情頓沮紀綱大紊校計利害校數也考也計算也度也更不若從史為之何則從史雖蓄姦謀已是朝廷牧伯重𦙍出於列校校户教翻以承璀一牒代之竊恐河南北諸侯聞之無不憤怒恥與為伍且謂承璀誘重𦙍逐從史而代其位彼人人麾下各有將校能無自危乎儻劉濟茂昭季安執㳟韓𢎞師道繼有章表陳其情狀張茂昭田季安程執㳟李師道并指承璀專命之罪不知陛下何以處之處昌吕翻若皆不報則衆怒益甚若為之改除為于偽翻則朝廷之威重去矣上復使樞宻使梁守謙宻謀於絳曰復扶又翻今重𦙍已總軍務事不得已須應與節對曰從史為帥不由朝廷事見二百三十六卷德宗貞元二十年帥所類翻下同故啓其邪心終成逆節今以重𦙍典兵即授之節威福之柄不在朝廷可以異於從史乎重𦙍之得河陽已為望外之福豈敢更為旅拒况重𦙍所以能執從史本以杖順成功一旦自逆詔命安知同列不襲其跡而動乎重𦙍軍中等夷甚多必不願重𦙍獨為主帥移之它鎮乃惬衆心惬苦叶翻何憂其致亂乎上悦皆如其請壬辰以重𦙍為河陽節度使元陽為昭義節度使戊戌貶盧從史驩州司馬五月乙巳昭義軍三千餘人夜潰奔魏州潰奔者盧從史之黨也劉濟奏㧞安平庚申吐蕃遣其臣論思邪熱入見見賢遍翻且歸路泌鄭叔矩之柩平凉刼盟泌叔矩沒于吐蕃柩巨救翻鄭注曰在床曰尸在棺曰柩甲子奚冦靈州六月甲申白居易復上奏以為臣比請罷兵易以豉翻下同復扶又翻下同上時掌翻下同上言比毗至翻今之事勢又不如前不知陛下復何所待是時上毎有軍國大事必與諸學士謀之嘗踰月不見學士李絳等上言臣等飽食不言其自為計則得矣如陛下何陛下詢訪理道理道治道也開納直言實天下之幸豈臣等之幸上遽令明日三殿對來三殿麟德殿也殿有三面故曰三殿三殿之西即翰林學士院對來者言明日當召對可前來也時召對廷臣詔㫖率有對來之語白居易嘗因論事言陛下錯上色莊而罷宻召承㫖李絳唐置翰林學士之始無承㫖永貞元年上始命鄭絪為承㫖大誥令大廢置丞相之宻畫内外之宻奏上之所甚注意者莫不專受專對翰林學士凡十㕔南㕔五間北㕔五間中隔花甎道承㫖居北㕔東第一間謂白居易小臣不遜白當作曰須令出院欲出居易不令復入翰林絳曰陛下容納直言故羣臣敢竭誠無隱居易言雖少思少思猶今人言欠入思慮也少詩紹翻志在納忠陛下今日罪之臣恐天下各思箝口箝其亷翻非所以廣聰明昭聖德也上悦待居易如初官考異曰舊居易傳曰吐突承璀為招討使諫上章者十七八居易面論辭情切至既而又請罷河北用兵凡數千百言皆人之所難言者上多聽納唯諫承璀事切上頗不悦謂李絳曰白居易小子是朕㧞擢而無禮於朕朕實難耐絳對曰居易所以不避死亡之誅事無巨細必言者蓋欲酬陛下特力拔擢耳陛下欲開諫諍之路不宜阻居易言上曰卿言是也由是多見聽納今從李司空論事上嘗欲近獵苑中至蓬萊池西蓬萊池在蓬萊殿之北一曰太液池池中有蓬萊山自蓬萊池西出𤣥武門入重元門即苑中重元門苑之南門南對宫城𤣥武門謂左右曰李絳必諫不如且止秋七月庚子王承宗遣使自陳為盧從史所離間間古莧翻乞輸貢賦請官吏許其自新李師道等數上表請雪承宗數所角翻承考異曰實録淄青幽州累有章表請赦宗按劉濟素與成德有怨攻之最力白居易請罷兵狀云劉濟近日情似近忠今忽罷兵慮傷其意又豈縁劉濟一人惆悵而不顧天下逺圖然則濟豈肯請赦承宗今不取朝廷亦以師久無功丁未制洗雪承宗以為成德軍節度使復以德棣二州與之復扶又翻悉罷諸道行營將士共賜布帛二十八萬端匹唐制布帛六丈為端四丈為匹加劉濟中書令劉濟之討王承宗也以長子緄為副大使長知兩翻緄古本翻掌幽州留務濟軍瀛州次子緫為瀛州刺史濟署行營都知兵馬使使屯饒陽濟有疾緫與判官張玘玘瓐里翻孔目官成國寳謀詐使人從長安來曰朝廷以相公逗留無功已除副大使為節度使矣明日又使人來告曰副大使旌節已至太原又使人走而呼曰呼火故翻旌節已過代州舉軍驚駭濟憤怒不知所為殺大將素與緄厚者數十人追緄詣行營以張玘兄臯代知留務濟自朝至日昃不食渇索飲索山客翻緫因寘毒而進之乙夘濟薨緄行至涿州涿州南至莫州百六十里莫州南至瀛州八十八里緫矯以父命杖殺之遂領軍務嶺南監軍許遂振以飛語毁節度使楊於陵於上上命召於陵還除宂官楊於音烏召於同宂官散官也宂而隴翻裴垍曰於陵性亷直陛下以遂振故黜藩臣不可丁巳以於陵為吏部侍郎遂振尋自抵罪八月乙亥上與宰相語及神仙問果有之乎憲宗信方士之心已露於此李藩對曰秦始皇漢武帝學仙之效具載前史事各見本紀太宗服天竺僧長年藥致疾事見二百一卷髙宗緫章二年此古今之明戒也陛下春秋鼎盛方勵志太平宜拒絶方士之説茍道盛德充人安國理何憂無堯舜之壽乎九月己亥吐突承璀自行營還自討王承宗還也還從宣翻又如字辛亥復為左衛上將軍充左軍中尉裴垍曰承璀首唱用兵事見上卷上年四月疲弊天下卒無成功卒子恤翻陛下縱以舊恩不加顯戮吐突承璀事帝於東宫故言舊恩豈得全不貶黜以謝天下乎給事中叚平仲吕元膺言承璀可斬李絳奏稱陛下不責承璀它日復有敗軍之將何以處之復扶又翻處昌吕翻若或誅之則同罪異罰彼必不服若或釋之則誰不保身而玩冦乎願陛下割不忍之恩行不易之典有功必賞敗軍必誅此古今不易之典使將帥有所懲勸間二日間如字上罷承璀中尉降為軍器使唐中世以後置内諸司使以宦官為之軍器庫使其一也宋白曰軍器本屬軍器監中世置軍器使貞元四年廢武庫其器械𨽻於軍器使中外相賀裴垍得風疾上甚惜之中使候問旁午於道一縱一横為旁午丙寅以太常卿權德輿為禮部尚書同平章事義武節度使張茂昭請除代人欲舉族入朝河北諸鎮互遣人説止之説輸芮翻茂昭不從凡四上表上乃許之以左庶子任廸簡為義武行軍司馬茂昭悉以易定二州簿書管鑰授廸簡遣其妻子先行曰吾不欲子孫染於汚俗茂昭既去冬十月戊寅虞候楊伯玊作亂囚廸簡辛巳義武將士共殺伯玉兵馬使張佐元又作亂囚廸簡廸簡乞歸朝既而將士復殺佐元奉廸簡主軍務復扶又翻時易定府庫罄竭閭閻亦空周禮五家為比五比為閭閻里中門也廸簡無以犒士乃設糲飯與士卒共食之糲盧逹翻脱粟飯也身居㦸門下經月藩鎮府門列㦸因謂之㦸門將士感之共請廸簡還寢然後得安其位上命以綾絹十萬匹賜易定將士壬辰以廸簡為義武節度使憲宗用任廸簡而得易定穆宗用張𢎞靖而失幽燕節鎮命代可不謹哉甲午以張茂昭為河中慈隰晉絳節度使從行將校皆拜官右金吾大將軍伊慎以錢三萬緡賂右軍中尉第五從直求河中節度使從直恐事泄奏之十一月庚子貶慎為右衛將軍坐死者三人初慎自安州入朝入朝見上卷元和元年留其子宥主留事朝廷因以為安州刺史未能去也去羌吕翻㑹宥母卒於長安宥利於兵權不時發喪鄂岳觀察使郗士美遣僚屬以事過其境宥出迎因告以凶問凶問母卒之問也先備籃輿即日遣之籃輿即今之轎也甲辰㑹王纁薨纁上弟也薨呼肱翻庚戍以前河中節度使王鍔為河東節度使上左右受鍔厚賂多稱譽之譽音余上命鍔兼平章事李藩固執以為不可權德輿曰宰相非序進之官唐興以來方鎮非大忠大勲則䟦扈者朝廷或不得已而加之今鍔既無忠勲朝廷又非不得已何為遽以此名假之上乃止侍考異曰舊李藩傳曰鍔以錢數千萬賂權求兼宰相藩與權德輿在中書有宻㫖曰王鍔可兼宰相宜即擬來藩遂以筆塗兼宰相字却奏上云不可德輿失色曰縱不可宜别作奏豈可以筆塗詔邪曰勢廹矣出今日便不可止日又暮何暇别作奏事果寢㑹要崔鉉曰此乃不諳故事者之妄傳史官之謬記耳既稱奉宻㫖宜擬狀中陳論固不假以筆塗詔矣凡欲降白麻若啇量於中書門下皆前一日進文書然後付翰林草麻又稱藩曰勢廹矣出今日便不可止尤為疎闊蓋由史氏以藩有直亮之名欲委曲成其美豈所謂直筆哉舊徳輿傳曰初鍔來朝貴倖多譽鍔者上將加平章事李藩堅執以為不可德輿繼奏云云乃止今從之鍔有吏才工於完聚范希朝以河東全軍出屯河北謂討王承宗也耗散甚衆鍔到鎮之初兵不滿三萬人馬不過六百匹嵗餘兵至五萬人馬有五千匹器械精利倉庫充實又進家財三十萬緡上復欲加鍔平章事李絳諫曰鍔在太原雖頗著績効今因獻家財而命之若後世何上乃止復扶又翻中書侍郎裴垍數以疾辭位數所角翻庚申罷為兵部尚書十二月戊寅張茂昭入朝請遷祖考之骨于京兆張茂昭祖謐父孝忠皆𦵏河北壬午以御史中丞吕元膺為鄂岳觀察使元膺嘗欲夜登城門已鏁守者不為開鏁蘇果翻不為于偽翻左右曰中丞也對曰夜中難辯真偽雖中丞亦不可元膺乃還還音旋又如字明日擢為重職翰林學士司勲郎中李絳面陳吐突承璀專横語極懇切横户孟翻懇誠至也上作色曰卿言太過絳泣曰陛下置臣於腹心耳目之地若臣畏避左右愛身不言是臣負陛下言之而陛下惡聞惡烏路翻乃陛下負臣也上怒解曰卿所言皆人所不能言使朕聞所不聞真忠臣也它日盡言皆應如是己丑以絳為中書舍人學士如故絳嘗從容諫上聚財從千容翻上曰今兩河數十州皆國家政令所不及河湟數千里淪於左祍朕日夜思雪祖宗之恥而財力不贍故不得不蓄聚耳不然朕宫中用度極儉薄多藏何用邪淮西既平帝之所聚適為驕侈之資耳六年春正月甲辰以彰義留後呉少陽為節度使庚申以前淮南節度使李吉甫為中書侍郎同平章事二月壬申李藩罷為太子詹事己丑忻王造薨造代宗之子皇叔祖也宦官惡李絳在翰林惡烏路翻以為户部侍郎判本司判本司者判户部職事唐自中世以後户部侍郎或判度支故以判户部為判本司此二十四司之司也上問故事户部侍郎皆進羡餘羡弋線翻卿獨無進何也對曰守土之官厚歛於人以市私恩天下猶共非之况户部所掌皆陛下府庫之物給納有籍安得羡餘若自左藏輸之内藏歛力贍翻藏徂浪翻以為進奉是猶東庫移之西庫臣不敢踵此弊也自𤣥宗時王鉷嵗進錢以供天子燕私至裴延齡而其弊極矣上嘉其直益重之乙巳上問宰相為政寛猛何先權德輿對曰秦以慘刻而亡漢以寛大而興太宗觀明堂圖禁抶人背事見一百九十三卷貞觀四年抶丑栗翻是故安史以來屢有悖逆之臣皆旋踵自亡悖蒲内翻又蒲沒翻由祖宗仁政結於人心人不能忘故也然則寛猛之先後可見矣上善其言夏四月戊辰以兵部尚書裴垍為太子賔客李吉甫惡之也惡烏路翻庚午以刑部侍郎鹽鐵轉運使盧坦為户部侍郎判度支或告泗州刺史薛謇為代北水運使有異馬不以獻事下度支謇知輦翻下户嫁翻使廵官往驗未返上遲之使品官劉泰昕按其事唐内待省有品官白身二千九百三十二人昕許斤翻盧坦曰陛下既使有司驗之又使品官繼往豈大臣不足信於品官乎臣請先就黜免上召泰昕還還音旋又如字五月前行營糧料使于臯謩董溪行營謂前討恒州行營坐贓數千緡敕貸其死臯謨流春州溪流封州行至潭州並追遣中使賜死春州漢合浦郡髙凉縣地隋為髙凉郡之陽春縣唐置春州京師東南六千四百四十八里封州至京師水陸四千五百一十里潭州古長沙郡晉置湘州隋改潭州京師南二千四百四十五里權德輿上言以為臯謨等罪當死陛下肆諸市朝何晏曰已刑而陳其尸曰肆朝直遥翻誰不懼法不當已赦而殺之溪晉之子也董晉相德宗後鎮宣武薨于鎮庚子以金吾大將軍李惟簡為鳯翔節度使李惟簡惟岳之弟也隴州地與吐蕃接舊常朝夕相伺伺相吏翻更入攻抄更工衡翻抄楚交翻人不得息惟簡以為邊將當謹守備蓄財榖以待冦不當覩小利起事盗恩生事邀功竊取官賞是為盗恩禁不得妄入其地禁妄入吐蕃界益市耕牛鑄農器以給農之不能自具者増懇田數十萬畝屬嵗屢稔屬之欲翻屢良遇翻又如字公私有餘販者流及他方賜振武節度使阿跌光進姓李氏六月丁夘李吉甫奏自秦至隋十有三代吉甫所謂十三代以秦漢魏晉宋齊梁陳北魏北齊周隋為數也設官之多無如國家者天寳以後中原宿兵見在可計者八十餘萬見賢遍翻其餘為啇賈僧道不服田畝者什有五六賈音古是常以三分勞筋苦骨之人奉七分待衣坐食之輩也今内外官以税錢給俸者不下萬員天下三百餘縣或以一縣之地而為州一鄉之民而為縣者甚衆請敕有司詳定廢置吏員可省者省之州縣可併者併之入仕之塗可減者減之又國家舊章依品制俸官一品月俸錢三十緡永徽之制一品月俸八千開元二十四年令百官防閤庶僕俸食雜用以月給之揔稱月俸一品為錢三萬一千職田禄米不過千斛唐初給一品職田六十頃禄七百石艱難以來増置使額厚給俸錢自兵興後權臣増領諸使月給厚俸比開元制禄數倍大厯中權臣月俸至九千緡州無大小刺史皆千緡新志云權臣月俸有至九十萬者刺史亦至十萬即此數也常衮為相始立限約事見二百二十五卷代宗大厯十二年李泌又量其閒劇隨事増加事見一百三十三卷德宗貞元四年量音良下同時謂通濟理難減削然猶有名存職廢或額去俸存閒劇之間厚薄頓異請敕有司詳考俸料雜給量定以聞按常衮為相増京官正員及諸道觀察使都團練使副使以下料錢李泌為相又増百官及畿内官月俸復置手力資課嵗給錢左右衛上將軍以下又有六雜給一曰糧米二曰鹽三曰私馬四曰手力五曰隨身六曰春冬服私馬則有芻豆手力則有資錢隨身則有糧米鹽春冬服則有布絹絁紬綿射生神䇿大將軍増以鞋州縣官有手力雜給錢李吉甫請就加詳校而量定之也於是命給事中叚平仲中書舍人韋貫之兵部侍郎許孟容户部侍郎李絳同詳定秋九月富平人梁悦報父仇殺秦杲自詣縣請罪敕復讐據禮經則義不同天禮記曰父之讐不與共戴天徵法令則殺人者死禮法二事皆王教之大端有此異同固資論辯宜令都省集議聞奏都省尚書都省職方員外郎韓愈議以為律無其條非闕文也蓋以不許復讐則傷孝子之心而乖先王之訓許復讐則人將倚法專殺無以禁止其端矣故聖人丁寧其義於經而深沒其文於律其意將使法吏一斷於法斷丁亂翻而經術之士得引經而議也宜定其制曰凡復父讐者事發具申尚書省集議奏聞酌其宜而處之處昌吕翻則經律無失其指矣敕梁悦杖一百流循州循州古龍川縣地舊志至東都四千八百里加東都至京師道里從可知也甲寅吏部奏凖敕併省内外官計八百八員諸司流外一千七百六十九人黔州大水壊城郭黔音禽又其亷翻壊音怪觀察使竇羣發溪洞蠻以治之黔中觀察使領辰錦施叙奬夷播思費南溪溱等州又有羈縻州五十大率皆溪洞蠻也治直之翻督役太急於是辰溆二州蠻反溆州本巫州天授二年改沅州開元十三年以沅原聲相近復為巫州大厯五年更名溆州二考異曰舊傳作辰錦州今從實錄羣討之不能定戊午貶羣開州刺史開州治開江縣因縣名州京師南一千四百六十里冬十一月弓箭庫使劉希光唐内諸司使弓箭庫使在軍器庫使之下受羽林大將軍孫璹錢二萬緡為求方鎮璹神六翻為于偽翻事覺賜死事連左衛上將軍知内侍省事吐突承璀丙申以承璀為淮南監軍上問李絳朕出承璀何如對曰外人不意陛下遽能如是上曰此家奴耳曏以其驅使之久承璀事帝於東宫故假以恩私若有違犯朕去之輕如一毛耳去羌吕翻十六宅諸王既不出閤唐考異曰新李吉甫傳作十宅按舊紀自此至末皆云十六宅新傳誤也余按開元以來皇子多居禁中詔附苑城為大宫分院而處號十王宅中人押之就夾城參天子起居其後増為十六宅舊史曰開元於安國寺東附苑城為大宅分院而居號十王宅十王謂慶忠棣鄂儀潁永榮延濟其後盛儀壽豐恒梁六王又就封入内宅此十六宅得名之始也其女嫁不以時選尚者皆由宦官率以厚賂自逹李吉甫上言自古尚主必擇其人獨近世不然十二月壬申詔封恩王等六女為縣主委中書門下宗正吏部選門地人才稱可者嫁之稱尺證翻己丑以户部侍郎李絳為中書侍郎同平章事舊考異曰傳曰吐突承璀恩寵莫二是嵗將用絳為宰相前一日出璀為淮南監軍翌日降制以絳同平章事新傳曰絳所言無不聽帝欲遂以為相而承璀寵方盛忌其進隂有毀短帝乃出璀淮南監軍翌日拜絳同平章事今據實録出承璀至絳入相五十四日舊傳云翌日誤也李吉甫為相多修舊怨上頗知之故擢絳為相吉甫善逢迎上意而絳鯁直數爭論於上前數所角翻上多直絳而從其言由是二人有隙閏月辛夘朔黔州奏辰溆賊帥張伯靖冦播州費州溆音叙試太子通事舍人李渉唐太子通事舍人屬右春坊員八人正七品下掌導宫臣辭見承令勞問此職事官也若李渉則試官知上於吐突承璀恩顧未衰乃投匭上疏稱承璀有功希光無罪承璀久委心腹不宜遽弃知匭使諫議大夫孔戣見其副章詰責不受渉乃行賂詣光順門通之戣渠龜翻武后垂拱四年置匭四枚共為一室列於朝堂東方木位主春色青配仁仁者以亭育為本以青匭置於東有能告養人及勸農之事者投之銘曰延恩匭南方火位主夏色赤配信信者風化之本以丹匭置於南有能正諫論時政得失者投之銘曰招諫匭西方金位主秋色白配義義者以斷决為本以素匭置於西有欲自陳抑屈者投之銘曰申寃匭北方水位主冬色𤣥配智智者謀慮之本以𤣥匭置於北能告以謀智者投之銘曰通𤣥匭以諫議補拾充使於朝堂知匭事毎日所有投書至暮並即進入其詣光順門進狀者閤門使收而進之宋朝改知匭使為理檢使宋白曰光順門外即昭慶門匭居洧翻戣聞之上疏極言渉姦險欺天請加顯戮戊申貶渉峽州司倉峽州古夷陵地蜀置宜都郡梁置宜州後魏改拓州取開拓之義周武帝以州扼三峽之口改曰峽州舊志峽州京師東南一千八百八十八里渉渤之兄李渤時隱於少室山戣巢父之子也孔巢父死於李懐光之難辛亥惠昭太子寧薨寧立為太子見上卷四年三月是嵗天下大稔米斗有直二錢者七年春正月辛未以京兆尹元義方為鄜坊觀察使初義方媚事吐突承璀李吉甫欲自託於承璀擢義方為京兆尹李絳惡義方為人故出之惡烏路翻義方入謝因言李絳私其同年許季同除京兆少尹出臣鄜坊專作威福欺罔聰明上曰朕諳李絳不如是諳烏舍翻明日將問之義方惶愧而出明日上以詰絳曰人於同年固有情乎對曰同年乃九州四海之人偶同科第或登科然後相識情於何有唐人謂同榜進士為同年至今猶然且陛下不以臣愚備位宰相宰相職在量才授任若其人果才雖在兄弟子姪之中猶將用之况同年乎避嫌而弃才是乃便身非徇公也上曰善朕知卿必不爾遂趣義方之官趣讀曰促振武河溢毁東受降城東受降城瀕河河溢故毀城三月丙戌上御延英殿李吉甫言天下已太平陛下宜為樂樂音洛下同李絳曰漢文帝時兵木無刃家給人足賈誼猶以為厝火積薪之下不可謂安見十四卷漢文帝六年今法令所不能制者河南北五十餘州犬戎腥羶近接涇隴烽火屢驚唐六典烽候所置大率三十里若有山岡隔絶須逐便安置得相望見不必要限三十里其逼邊境者築城而置之每烽置帥副各一人其放烽有一炬兩炬三炬四炬隨賊多少為差加之水旱時作倉廩空虛此正陛下宵衣旰食之時豈得謂之太平遽為樂哉旰古按翻上欣然曰卿言正合朕意退謂左右曰吉甫專為悦媚如李絳真宰相也上嘗問宰相貞元中政事不理何乃至此李吉甫對曰德宗自任聖智不信宰相而信他人是使姦臣得乗間弄威福間古莧翻政事不理職此故也上曰然此亦未必皆德宗之過朕㓜在德宗左右見事有得失當時宰相亦未有再三執奏者皆懐禄偷安今日豈得專歸咎於德宗邪卿輩宜用此為戒事有非是當力陳不已勿畏朕譴怒而遽止也李吉甫常言人臣不當强諫左傳宫之竒之為人也懦而不能强諫陸德明音義曰彊其良翻又其兩翻使君悦臣安不亦美乎李絳曰人臣當犯顔苦口指陳得失若陷君於惡豈得為忠上曰絳言是也吉甫至中書卧不視事長吁而已李絳或久不諫上輙詰之曰豈朕不能容受邪將無事可諫也李吉甫又嘗言於上曰賞罰人主之二柄不可偏廢陛下踐阼以來惠澤深矣而威刑未振中外懈惰懈古隘翻怠也願加嚴以振之上顧李絳曰何如對曰王者之政尚德不尚刑豈可捨成康文景而效秦始皇父子乎上曰然後旬餘于頔入對亦勸上峻刑又數日上謂宰相曰于頔大是姦臣勸朕峻刑卿知其意乎皆對曰不知也上曰此欲使朕失人心耳吉甫失色退而抑首不言笑竟日上以于頔峻刑之言為姦故吉甫愧前之失言夏四月丙辰以庫部郎中翰林學士崔羣為中書舍人學士如故庫部郎掌戎器鹵簿儀仗屬兵部上嘉羣讜直讜音黨命學士自今奏事必取崔羣連署然後進之羣曰翰林舉動皆為故事必如是後來萬一有阿媚之人為之長長知兩翻則下位直言無從而進矣固不奉詔章三上上時掌翻上乃從之五月庚申上謂宰相曰卿輩屢言淮浙去嵗水旱近有御史自彼還言不至為災事竟如何李絳對曰臣按淮南浙西浙東奏狀皆云水旱人多流亡求設法招撫設為法制以招撫流亡之民其意似恐朝廷罪之者豈肯無災而妄言有災邪此蓋御史欲為姦謏以悦上意耳願得其主名按致其法上曰卿言是也國以人為本聞有災當亟救之豈可尚復疑之邪復扶又翻朕適者不思失言耳命速蠲其租賦上嘗與宰相論治道於延英殿治直吏翻日旰暑甚汗透御服宰相恐上體倦求退上留之曰朕入禁中所與處者獨宫人宦官耳故樂與卿等且共談為理之要殊不知倦也為理猶言為治唐避髙宗諱改治為理處昌吕翻樂音洛六月癸巳司徒同平章事杜佑以太保致仕秋七月乙亥立遂王宥為太子更名恒更工衡翻恒户登翻吐考異曰舊澧王惲傳曰時突承璀恩寵特異惠昭太子薨議立儲副承璀獨排羣議屬澧王欲以威權自樹頼上明斷不惑承璀傳曰八年欲召承璀還乃罷絳相位承璀還復為神䇿中尉惠昭太子薨承璀建議請立澧王寛為太子憲宗不納立遂王宥崔羣傳曰憲宗以澧王居長又多内助新傳亦曰惠昭太子薨承璀請立澧王不從据實録六年十一月承璀監淮南軍閏十二月惠昭太子薨明年承璀乃召還而新舊傳皆如此穆宗卒以此殺承璀蓋憲宗末年承璀欲廢太子立澧王耳非惠昭初薨時也恒郭貴妃之子也諸姫子澧王寛長於恒長知兩翻上將立恒命崔羣為寛草讓表為于偽翻羣曰凡推己之有以與人謂之讓推吐雷翻遂王嫡子也寛何讓焉史言崔羣力為憲宗言立子以嫡不以長之義上乃止八月戊戌魏博節度使田季安薨初季安娶洺州刺史元誼女元誼奔魏見二百三十五卷德宗貞元十二年生子懐諫為節度副使新志節度副使在行軍司馬之下節度副大使則在行軍司馬之上河北三鎮以為儲帥牙内兵馬使田興庭玠之子也田庭玠見二百二十六卷德宗建中二年有勇力頗讀書性㳟遜季安淫虐興數規諫數所角翻軍中頼之季安以為收衆心出為臨清鎮將將欲殺之將欲如字興陽為風痺痺必至翻冷濕病也炙灼滿身炙居又翻灼艾也乃得免季安病風殺戮無度軍政廢亂夫人元氏召諸將立懐諫為副大使知軍務時年十一考異曰論事集作十二今從實録及舊傳遷季安於别寢月餘而薨召田興為歩射都知兵馬使辛亥以左龍武大將軍薛平為鄭滑節度使欲以控制魏博上與宰相議魏博事李吉甫請興兵討之李絳以為魏博不必用兵當自歸朝廷吉甫盛陳不可不用兵之狀上曰朕意亦以為然絳曰臣竊觀兩河藩鎮之䟦扈者皆分兵以𨽻諸將不使專在一人恐其權任太重乗間而謀己故也間古莧翻諸將勢均力敵莫能相制欲廣相連結則衆心不同其謀必泄欲獨起為變則兵少力微勢必不成加以購賞既重刑誅又峻是以諸將互相顧忌莫敢先發䟦扈者恃此以為長䇿然臣竊思之若常得嚴明主帥能制諸將之死命者以臨之則粗能自固矣帥所類翻粗坐五翻讀從去聲今懐諫乳臭子不能自聽斷斷丁亂翻軍府大權必有所歸諸將厚薄不均怨怒必起不相服從則曏日分兵之䇿適足為今日禍亂之階也田氏不為屠肆謂舉家見屠骨肉分裂若屠家之屠羊豕然掛肉於枅以為列肆則悉為俘囚矣何煩天兵哉天子之兵謂之天兵彼自列將起代主帥鄰道所惡莫甚於此惡烏路翻彼不倚朝廷之援以自存則立為鄰道所粉矣與韲同牋西翻碎切薑蒜為之故臣以為不必用兵可坐待魏博之自歸也但願陛下按兵養威嚴敕諸道選練士馬以須後敕須待也使賊中知之不過數月必有自效於軍中者矣至時惟在朝廷應之敏速中其機㑹中竹仲翻不愛爵禄以賞其人使兩河藩鎮聞之恐其麾下效之以取朝廷之賞必皆恐懼爭為㳟順矣此所謂不戰而屈人兵者也上曰善它日吉甫復於延英盛陳用兵之利復扶又翻下同且言芻糧金帛皆已有備上顧問絳顧廻視也絳對曰兵不可輕動前年討恒州恒户登翻四面發兵二十萬又發兩神䇿兵自京師赴之天下騷動所費七百餘萬緡訖無成功為天下笑謂吐突承璀討王承宗也今瘡痍未復人皆憚戰若又以敕命驅之臣恐非直無功或生他變况魏博不必用兵事勢明白願陛下勿疑上奮身撫案曰朕不用兵决矣撫拍也傳考異曰新吉甫魏博節度使田季安疾甚吉甫請任薛平為義成節度使以重兵控邢洺因圖上河北險要所在帝張於浴堂門壁毎議河北事必指吉甫曰朕目按圖信如卿料矣按憲宗竟用李絳之䇿不用兵而魏博平不如新傳所言今不取絳曰陛下雖有是言恐退朝之後復有熒惑聖聽者上正色厲聲曰朕志已决誰能惑之絳乃拜賀曰此社稷之福也既而田懐諫㓜弱軍政皆决於家僮蔣士則數以愛憎移易諸將數所角翻衆皆憤怒朝命久不至朝直遥翻軍中不安田興晨入府士卒數千人大譟環興而拜環音宦請為留後興驚仆於地衆不散久之興度不免度徒洛翻乃謂衆曰汝肯聽吾言乎皆曰惟命興曰勿犯副大使守朝廷法令申版籍請官吏然後可皆曰諾興乃殺蔣士則等十餘人遷懐諫於外代宗廣德元年田承嗣帥魏博四世四十九年而滅資治通鑑卷二百三十八
