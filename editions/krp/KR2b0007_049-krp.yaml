front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑巻四十九宋司馬光撰胡三省音註漢紀四十一起柔兆敦䍧盡旃䝉單閼凡十年孝殤皇帝諱隆和帝少子也諡法短折不成曰殤㐲侯古今注曰隆之字曰盛延平元年春正月辛夘以太尉張禹為太傅司徒徐防為太尉叅録尚書事太后以帝在襁褓襁居兩翻褓音保欲令重臣居禁内乃詔禹舍宫中五日一歸府每朝見特贊與三公絶席特贊者每朝見賛拜者先獨賛禹名既乃賛大尉名以下禹不與三公同賛也絶席者朝位獨在百僚上不與三公聮席也朝直遥翻見賢遍翻封皇兄勝為平原王癸夘以光禄勲梁鮪為司徒鮪于軌翻三月甲申葬孝和皇帝于慎陵賢曰慎陵在雒陽東南三十里廟曰穆宗丙戌清河王慶濟北王夀河間王開常山王章始就國濟子禮翻太后特加慶以殊禮殊異也其禮異於諸王也慶子祜年十三太后以帝㓜弱逺慮不虞留祜與嫡母耿姬居清河邸為帝崩立祜張本耿姬况之曾孫也耿况以上谷從光武祜母犍為左姬也犍居言翻夏四月鮮卑寇漁陽漁陽太守張顯率數百人出塞追之兵馬掾嚴授諫曰前道險阻賊執難量掾俞絹翻量音良宜且結營先令輕騎偵視之顯意甚鋭怒欲斬之遂進兵遇虜伏發士卒悉走唯授力戰身被十創手殺數人而死縁邉郡曹有兵馬掾掌兵馬偵丑鄭翻創初良翻主簿衛福功曹徐咸皆自投赴顯俱沒於陳陳讀曰陣丙寅以虎賁中郎將鄧隲為車騎將軍儀同三司三司三公也晉職官志曰儀同三司之名始此隲職日翻隲弟黄門侍郎悝為虎賁中郎將宏閶皆侍中悝苦回翻閶齒良翻司空陳寵薨五月辛夘赦天下壬辰河東垣山崩賢曰垣縣今絳州縣也六月丁未以太常尹勤為司空郡國三十七雨水己未太后詔減大官導官尚方内署諸服御珍膳靡麗難成之物賢曰大官令周官也秩千石典天子御膳導官掌擇御米導擇也尚方掌作御刀劒諸器物内署掌内府衣物令秩皆六百石自非供陵廟稻粱米不得導擇朝夕一肉飯而已舊太官湯官經用嵗且二萬萬自是裁數千萬百官志湯官丞主酒屬太官令及郡國所貢皆減其過半悉斥賣上林鷹犬東都亦冇上林苑在雒陽西斥開也棄也離宫别館儲峙米糒薪炭悉令省之峙丈里翻糒音備丁夘詔免遣掖庭宮人及宗室沒入者皆為庶民秋七月庚寅敕司𨽻校尉部刺史曰司𨽻校尉及諸州部刺史也間者郡國或有水災妨害秋稼朝廷惟咎憂惶悼懼惟思也咎過也而郡國欲獲豐穰虚飾之譽遂覆蔽災害覆敷又翻多張墾田不揣流亡揣初委翻競增戶口掩匿盗賊令姦惡無懲隠蔽盗賊不以上聞弗加誅計使姦惡無所懲艾署用非次選舉乖宜貪苛慘毒延及平民賢曰平民謂善人也刺史垂頭塞耳阿私下比塞悉則翻比毗至翻不畏于天不愧于人詩小雅何人斯之辭假貸之恩不可數恃數所角翻自今以後將糾其罪二千石長吏其各實覈所傷害為除田租芻稾長知兩翻為于偽翻八月辛夘帝崩年二嵗癸丑殯于崇徳前殿賢曰雒陽南宫有崇徳殿太后與兄車騎將軍隲虎賁中郎將悝等定䇿禁中悝苦回翻其夜使隲持節以王青蓋車迎清河王子祜賢曰續漢志曰皇太子皇子皆安車朱班輪青盖金華蚤皇子為王錫以乗之故曰王青盖車皇孫則緑車齋于殿中皇太后御崇徳殿百官皆吉服陪位賢曰不可以凶事臨朝改吉服也引拜祜為長安侯賢曰不即立為天子而封侯者不欲從微即登皇位余謂先封候者用立孝宣帝故事也乃下詔以祜為孝和皇帝嗣又作䇿命有司讀䇿畢太尉奉上璽綬即皇帝位上時掌翻璽斯氏翻綬音受太后猶臨朝公羊𫝊曰猶者可止之辭詔告司𨽻校尉河南尹南陽太守曰毎覽前代外戚賓客濁亂奉公言其挾埶恣横奉公之吏為所濁亂也為民患苦咎在執法怠懈不輙行其罰故也懈古隘翻今車騎將軍隲等雖懐敬順之志而宗門廣大姻戚不小賔客姦猾多干禁憲賢曰干犯也其明加檢敕勿相容䕶自是親屬犯罪無所假貸九月六州大水丙寅葬孝殤皇帝于康陵賢曰康陵在慎陵塋中庚地以連遭大水百姓苦役方中秘藏賢曰方中陵中也冡藏之中故言秘也孔頴逹曰凡天子之葬掘地為方壙漢書謂之方中方中之内先累椁於其方中南而為羡道以蜃車載柩至壙説而載以龍輴從羡道而入至方中乃屬紼於棺之緘從上而下棺入於椁之中方上謂覆坑方石上及諸工作事減約十分居一十分居一者減其九分也乙亥殞石于陳留陳留郡在雒陽東五百三十里詔以北地梁慬為西域副校尉慬音勤校户教翻慬行至河西㑹西域諸國反攻都䕶任尚於䟽勒尚上書求救詔慬將河西四郡𦍑胡五千騎馳赴之慬未至而尚已得解詔徴尚還以騎都尉叚禧為都護西域長史趙博為騎都尉禧博守它乾城班超為都䕶居龜兹它乾城城小梁慬以為不可固乃譎説龜兹王白覇譎古宂翻説輸芮翻龜兹音丘慈欲入共保其城白覇許之吏民固諫白覇不聼慬既入遣將急迎叚禧趙博合軍八九千人龜兹吏民並叛其王而與温宿姑墨數萬兵反共圍城慬等出戰大破之連兵數月胡衆敗走乘勝追撃凡斬首萬餘級獲生口數千人龜兹乃定梁慬非不徤闘然終不能定西域者徒勇而無䇿畧也冬十月四州大水雨雹雨于具翻清河孝王慶病篤上書求葬樊濯宋貴人冡旁欲從其母也十二月甲子王薨乙酉罷魚龍曼延戯武帝元封二年作魚龍曼延戯今罷之曼音萬延衍而翻尚書郎南陽樊凖以儒風寖衰上疏曰臣聞人君不可以不學光武皇帝受命中興東西誅戰不遑啓處處昌吕翻然猶投戈講蓺蓺六蓺也息馬論道孝明皇帝庶政萬機無不簡心朱子曰簡閲也而垂情古典游意經藝每饗射禮畢正坐自講諸儒並聼四方欣欣又多徴名儒布在廊廟每宴㑹則論難衎衎賢曰衎衎和樂貎也難乃旦翻衎苦旱翻又苦汗翻共求政化期門羽林介胄之士悉通孝經期門即虎賁士化自聖躬流及蠻荒是以議者每稱盛時咸言永平今學者益少少詩沼翻逺方尤甚博士倚席不講賢曰禮記曰凡侍坐於大司成者逺間三席又曰若非飲食之客則布席席間函文注云謂講問客也倚席言不施講坐也儒者競論浮麗忘蹇蹇之忠習諓諓之辭賢曰諓諓謟言也音踐前書曰昔秦穆公説諓諓之言臣愚以為宜下明詔博求幽隠寵進儒雅以俟聖上講習之期時安帝始年十三故請求儒雅以俟講習太后深納其言詔公卿中二千石各舉隠士大儒務取高行以勸後進行下孟翻妙簡博士妙精也簡擇也必得其人孝安皇帝上諱祜肅宗孫也父曰清河孝王慶諡法寛容和平曰安伏侯古今注曰祜之字曰福永初元年春正月癸酉朔赦天下蜀郡徼外𦍑内屬徼吉弔翻下同二月丁夘分清河國封帝弟常保為廣川王廣川縣屬信都國賢曰故城在今冀州棗彊縣東北庚午司徒梁鮪薨三月癸酉日有食之己卯永昌徼外僬僥種夷陸類等舉種内附永昌郡在雒陽西七千二百六十里僬僥國人長不過三尺徼吉弔翻僬兹消翻僥倪么翻種章勇翻甲申葬清河孝王於廣丘廣丘在清河厝縣後更名甘陵司空宗正護䘮事儀比東海恭王恭王葬見四十五巻明帝永平元年考異曰帝紀書車騎將軍䕶葬今從𫝊自和帝之䘮鄧隲兄弟常居禁中隲不欲乆在内連求還第太后許之夏四月封太傅張禹太尉徐防司空尹勤車騎將軍鄧隲城門校尉鄧悝虎賁中郎將鄧宏黄門郎鄧閶皆為列侯禹安鄉侯防龍鄉侯隲上蔡侯悝葉侯宏西平侯閶西華侯閶音昌誤考異曰袁紀前作閶後作闓盖食邑各萬户隲以定策功增三千户隲及諸弟辭讓不獲遂逃避使者間關詣闕賢曰間關猶﨑嶇也上疏自陳至于五六乃許之五月甲戌以長樂衛尉魯恭為司徒樂音洛恭上言舊制立秋乃行薄刑自永元十五年以來改用孟夏事見上巻而刺史太守因以盛夏徴召農民拘對考驗連滯無已連謂獄辭相連及也滯謂留滯不决也上逆時氣下傷農業案月令孟夏斷薄刑者謂其輕罪已正謂已結正也㫁丁亂翻下同不欲令乆繫故時斷之也臣愚以為今孟夏之制可從此令其决獄案考皆以立秋為斷又奏孝章皇帝欲助三正之微定律著令斷獄皆以冬至之前事見四十七卷章帝元和三年小吏不與國同心者率十一月得死罪賊不問曲直便即格殺雖有疑罪不復讞正復扶又翻讞魚列翻又魚戰翻又魚蹇翻議獄也可令大辟之科辟毗亦翻盡冬月乃斷朝廷皆從之丁丑詔封北海王睦孫夀光侯普為北海王和帝永元八年北海王威自殺今復紹封夀光縣本屬北海後屬樂安國九真徼外夜郎蠻夷舉土内屬西域都䕶叚禧等雖保龜兹而道路隔塞塞悉則翻檄書不通公卿議者以為西域阻逺數有背叛數所角翻背蒲妹翻吏士屯田其費無已六月壬戌罷西域都䕶和帝永元三年復置西域都䕶今罷遣騎都尉王宏發關中兵迎禧及梁慬趙博伊吾盧栁中屯田吏士而還初燒當𦍑豪東號之子麻奴隨父來降東號降見四十七巻和帝永元元年降户江翻居于安定時諸降羌布在郡縣皆為吏民豪右所徭役徭使也積以愁怨及王宏西迎叚禧發金城隴西漢陽羌數百千騎與俱郡縣廹促發遣羣羌懼逺屯不還行到酒泉頗有散叛諸郡各發兵邀遮或覆其廬落于是勒姐當煎大豪東岸等愈驚遂同時犇潰姐音紫且翻又音紫麻奴兄弟因此與種人俱西出塞滇零與鍾𦍑諸種大為冦掠斷隴道零音憐續漢書曰鍾𦍑九千餘户在隴西臨洮谷隴道隴坁之道也種章勇翻㫁丁管翻時𦍑歸附既乆無復器甲或持竹竿木枝以代戈矛或負板案以為楯楯食尹翻或執銅鏡以象兵銅鏡映日人遥望之以為兵也郡縣畏懦不能制丁夘赦除諸𦍑相連結謀叛逆者罪秋九月庚午太尉徐防以災異冦賊策免三公以災異免自防始辛未司空尹勤以水雨漂流䇿免仲長統昌言曰仲姓也商湯左相仲虺周冇仲山甫舜十六相有仲堪仲熊周八士有仲突仲忽光武皇帝愠數世之失權忿彊臣之竊命賢曰昌當也愠猶恨也數世謂元成哀平彊臣謂王莽矯枉過直政不任下雖置三公事歸臺閣賢曰臺閣謂尚書余謂三公失職非至光武時始然也自武帝游宴後庭用宦者處樞機至于宣帝専任恭顯而丞相御史取充位事歸臺閣其所由來者漸也自此以來三公之職備員而已然政有不治猶加譴責而權移外戚之家寵被近習之豎被皮義翻親其黨類用其私人内充京師外布州郡顛倒賢愚貿易選舉貿音茂疲駑守境駑音奴駑駘馬之下乘以喻不才之吏貪殘牧民撓擾百姓撓音火髙翻忿怒四夷招致乖叛亂離斯瘼用詩語賢曰瘼病也怨氣並作隂陽失和三光虧缺怪異數至數所角翻蟲螟食稼水旱為災此皆戚宦之臣所致然也反以䇿讓三公至于死免乃足為呌呼蒼天號咷泣血者矣放聲而哭曰號咷號户刀翻咷徒刀翻又中世之選三公也務於清慤謹慎循常習故者是以婦女之檢柙賢曰檢柙猶規矩也揚子曰蠢廸檢柙注云檢柙猶隠栝也毛晃曰檢柙檢束也輔也俗作撿押非鄉曲之常人耳惡足以居斯位邪惡音烏下同埶既如彼選又如此而欲望三公勲立於國家績加於生民不亦逺乎昔文帝之於鄧通可謂至愛而猶展申徒嘉之志事見十四巻文帝後二年夫見任如此則何患於左右小臣哉至於近世外戚宦豎請託不行意氣不滿立能陷人於不測之禍惡可得彈正者哉曩者任之重而責之輕今者任之輕而責之重光武奪三公之重至今而加甚不假后黨以權數世而不行葢親疏之埶異也賢曰言光武奪三公重任今奪更甚光武不假后黨威權數代遂不遵行此為三公疏后黨親故也今人主誠専委三公分任責成而在位病民病民謂百姓受其害也舉用失賢百姓不安争訟不息天地多變人物多妖妖於驕翻然後可以分此罪矣壬午詔太僕少府減黄門鼔吹以補羽林士漢官儀曰黄十門鼔吹百四五人羽林左監主羽林八百人右監主九百人杜佑曰漢代有黄門鼔吹享宴食舉樂十三曲與魏代鼔吹長簫伎録並云絲竹合作執節者歌又建初録云務成黄爵𤣥雲逺期皆騎吹曲非鼔吹曲此則列於殿庭者為鼔吹今之從行者為騎吹二曲異也孫權觀魏武軍作鼔吹而還應是此鼔吹魏晉代給鼓吹甚輕牙門督將五校悉有鼔吹齊梁至陳則重矣今代短簫鐃歌亦謂之鼓吹蔡邕曰鼔吹軍樂也黄帝岐伯所作以揚威武勸士諷敵也雍門周説孟嘗君鼔吹於不測之淵説者云鼔自一物吹自竽籟之屬非簫鼔合奏别為一樂之名也然則短簫鐃歌此時未名鼔吹矣宋白曰鼔吹據崔豹古今注張騫使西域得摩訶兠勒一曲李延年増之分為二十八曲梁置清商鼓吹令二人唐又有揺鼔金鉦大鼓長鳴歌簫笳笛合為鼓吹十二案大享㑹則設於懸外廐馬非乗輿常所御者皆減半食賢曰乘輿所乘車輿也不敢斥言尊者故稱乘輿見蔡邕獨㫁乘繩證翻諸所造作非供宗廟園陵之用皆且止庚寅以太傅張禹為太尉太常周章為司空大長秋鄭衆中常侍蔡倫等皆秉勢豫政周章數進直言數所角翻太后不能用初太后以平原王勝有痼疾而貪殤帝孩抱飬為己子故立焉及殤帝崩羣臣以勝疾非痼意咸歸之大后以前不立勝恐後為怨乃迎帝而立之周章以衆心不附宻謀閉宫門誅鄧隲兄弟及鄭衆蔡倫刼尚書廢太后於南宫封帝為逺國王而立平原王事覺冬十一月丁亥章自殺戊子敕司𨽻校尉冀幷二州刺史民訛言相驚弃捐舊居老弱相携窮困道路其各敇所部長吏躬親曉喻長知兩翻若欲歸本郡在所為封長檄不欲勿彊為于偽翻賢曰封謂印封之也長檄猶今長牒也欲歸者皆給以長牒為驗彊音其兩翻十二月乙夘以頴川太守張敏為司空詔車騎將軍鄧隲征西校尉任尚將五營及諸郡兵五萬人五營北軍五校營也屯漢陽以備𦍑六考異曰帝紀在月今從西𦍑傳是嵗郡國十八地震四十一大水二十八大風雨雹鮮卑大人燕荔陽詣闕朝賀太后賜燕荔陽王印綬赤車參駕赤車者帷裳衡軛皆赤恭駕者駕二馬燕於賢翻荔力計翻令止烏桓校尉所居寗城下寗城屬上谷郡通胡市因築南北兩部質館賢曰築館以受降質質音致下同鮮卑邑落百二十部各遣入質二年春正月鄧隲至漢陽諸郡兵未至鍾𦍑數千人擊敗隲軍于冀西冀縣之西也敗補邁翻殺千餘人梁慬還至燉煌自西域還也燉徒門翻逆詔慬留為諸軍援逆迎也慬至張掖張掖郡在雒陽西四千二百里應劭曰張掖者言為國張臂掖也破諸羌萬餘人其能脱者十二三進至姑臧羌大豪三百餘人詣慬降並慰譬遣還故地御史中丞樊凖以郡國連年水旱民多飢困上疏請令大官尚方考功上林池籞諸官實減無事之物賢曰前書百官表少府掌山海池澤之税屬官有太官考工尚方上林中十池監太官掌御膳飲食考工主作器械尚方主作刀劒實減謂實覆其數減之也功當作工籞偶許翻五府調省中都官吏京師作者賢曰五府謂太𫝊太尉司徒司空大將軍也調徴𤼵也省減也中都官吏在京師之官吏也作謂營作者也余按是時不拜大將軍獨鄧隲為車騎將軍耳調徒弔翻又被災之郡百姓凋殘恐非賑給所能勝贍被皮義翻勝音升雖有其名終無其實可依征和元年故事賢曰武帝征和元年詔曰當今務在禁苛暴止擅賦力本農桑母乏武備而已予據此乃征和四年詔也征和元年當有遣使慰安故事遣使持節慰安尤困乏者徙置荆揚孰郡孰古熟字通今雖有西屯之役冝先東州之急西屯謂討羌之師東州謂雒陽以東冀兖諸州被水旱也先悉薦翻太后從之悉以公田賦與貧民賦布也即擢凖與議郎吕倉並守光禄大夫二月乙丑遣凖使冀州倉使兖州稟貸流民咸得蘇息稟給也貸施也死而更生曰蘇氣絶而復續曰息夏旱五月丙寅皇太后幸雒陽寺賢曰寺官舍也風俗通曰寺嗣也理事之吏嗣續於其中及若盧獄前漢有若盧獄屬少府漢舊儀曰主鞫將相大臣東都初省和帝永元九年復置録囚徒雒陽有囚實不殺人而被考自誣羸困輿見輿箯輿也獄囚被掠委困者以箯輿處之師古曰編竹木以為輿形如今之食輿見賢遍翻箯音編畏吏不敢言將去舉頭若欲自訴太后察視覺之即呼還問狀具得枉實得其見枉之實也即時收雒陽令下獄抵罪下遐稼翻行未還宮澍雨大降㴻音注又殊遇翻時雨也六月京師及郡國四十大水大風雨雹東觀記曰雹大如芋魁鷄子風㧞樹發屋雨于具翻秋七月太白入北斗晉書天文志北斗七星在太微北七政之樞機隂陽之元本也故運乎中央而臨制四方所以建四時而均五行也天文志曰太白入斗中為貴相凶閏月廣川王常保薨無子國除癸未蜀郡徼外𦍑舉土内屬東觀記曰徼外𦍑薄申等八種舉衆降徼吉弔翻冬鄧隲使任尚及從事中郎河内司馬鈞率諸郡兵與滇零等數萬人戰于平襄平襄縣屬漢陽郡賢曰故襄戎邑零音憐尚軍大敗死者八千餘人𦍑衆遂大盛朝廷不能制湟中諸縣粟石萬錢百姓死亡不可勝數而轉運難劇劇甚也勝音升故左校令河南龎參將作大匠屬官而左右校令各一人秩六百石左校令掌左工徒右校令掌右工徒校户教翻龎皮江翻先坐法輸作若盧使其子俊上書曰方今西州流民擾動而徴發不絶水潦不休地力不復賢曰言其耗損不復於舊重之以大軍重直用翻疲之以逺戍農功消於轉運資財竭於徴發田疇不得墾闢禾稼不得收入摶手困窮賢曰兩手相摶言無計也無望來秋百姓力屈不復堪命復扶又翻臣愚以為萬里運糧逺就𦍑戎不若總兵飬衆以待其疲車騎將軍隲宜且振旅𫝊曰三年而治兵入而振旅書曰班師振旅振整也整衆而還也留征西校尉任尚使督凉州士民轉居三輔參建棄凉州之議發於此書休徭役以助其時止煩賦以益其財令男得耕種女得織絍賢曰絍音如深翻杜預注左𫝊云織絍織繒布也字釋云絍機縷也又如沁翻然後畜精鋭乘懈沮出其不意攻其不備則邉民之仇報犇北之耻雪矣懈古隘翻沮在吕翻書奏㑹樊凖上疏薦參太后即擢參於徒中召拜謁者使西督三輔諸軍屯十一月辛酉詔鄧隲還師留任尚屯漢陽為諸軍節度遣使迎拜隲為大將軍既至使大鴻臚親迎中常侍郊勞臚陵如翻勞力到翻王主以下候望於道寵靈顯赫光震都鄙王主諸王及諸公主也鄧隲西征無功而還當引罪求自貶以天下據埶持權冐受榮寵於心安乎君子是以知其不終也滇零自稱天子於北地招集武都參狼𦍑居武都者為参狼種参所簮翻上郡西河諸雜種羌斷隴道冦鈔三輔斷丁管翻鈔楚交翻南入益州殺漢中太守董炳梁慬受詔當屯金城聞羌冦三輔即引兵赴擊轉戰武功羙陽間武功羙陽二縣屬扶風連破走之𦍑稍退散十二月廣漢塞外參狼𦍑降此與武都參狼同種而分居廣漢塞外者也是嵗郡國十二地震三年春正月庚子皇帝加元服赦天下遣騎都尉任仁督諸郡屯兵救三輔仁戰數不利數所角翻當煎勒姐𦍑攻沒破𦍑縣破羌縣屬金城縣鍾𦍑攻沒臨洮縣執隴西南部都尉臨洮縣隴西南部都尉治所洮土刀翻三月京師大飢民相食壬辰公卿詣闕謝詔務思變復以助不逮變改也改過以復於善也壬寅司徒魯恭罷恭再在公位和帝永元十二年恭代吕葢為司徒永初元年復代梁鮪為司徒選辟髙第至列卿郡守者數十人此謂恭府掾屬之髙第也守手又翻而門下耆生耆老也或不䝉薦舉至有怨望者恭聞之曰學之不講是吾憂也論語孔子之言諸生不有鄉舉者乎賢曰言人患學之不習耳若能究習自有鄉里之舉豈要待三公之辟乎終無所言亦不借之議論學者受業必窮核問難難乃旦翻道成然後謝遣之學者曰魯公謝與議論不可虛得夏四月丙寅以大鴻臚九江夏勤為司徒三公以國用未足奏令吏民入錢榖得為關内矦虎賁羽林郎五官大夫官府吏緹騎營士各有差五官亦郎也大夫光禄太中中散諫議大夫也官府吏給事諸官府者賢曰續漢志曰執金吾緹騎二百人緹赤黄色營士謂五校營士也緹丁禮翻又丁奚翻甲申清河愍王虎威薨無子五月丙申封樂安王寵子延平為清河王奉孝王後六月漁陽烏桓與右北平胡千餘冦代郡上谷漢人韓琮隨匃奴南單于入朝漢人與匈奴錯居韓琮因事南單于琮徂宗翻既還説南單于云説式芮翻關東水􅕙人民飢餓死盡可擊也單于信其言遂反秋七月海賊張伯路等冦濵海九郡殺二千石令長長知兩翻遣侍御史巴郡龎雄督州郡兵擊之伯路等乞降尋復屯聚復扶又翻九月鴈門烏桓率衆王無何允與鮮卑大人邱倫等及南匈奴骨都合七千騎冦五原與大守戰于髙渠谷賢曰東觀記戰九原髙梁谷渠梁相類必有誤漢兵大敗南單于圍中郎將耿种於羙稷使匈奴中郎將也种音冲冬十一月以大司農陳國何熈行車騎將軍事中郎將龎雄為副將五營及邉郡兵二萬餘人又詔遼東太守耿䕫率鮮卑及諸郡共擊之以梁慬行度遼將軍事雄䕫擊南匈奴薁鞬日逐王破之薁於六翻鞬居言翻十二月辛酉郡國九地震乙亥有星孛于天苑晉書天文志天苑十六星在昴畢南天子之苑圃飬獸之所也孛蒲内翻是嵗京師及郡國四十一雨水幷凉二州大飢人相食太后以隂陽不和軍旅數興數所角翻詔嵗終饗遣衛士勿設戯作樂西都之制嵗盡衛卒交代上臨饗罷遣之續漢志曰饗遣故衛士儀百官㑹位定謁者持節引故衛士入自端門衛司馬執幡鉦䕶行行定侍御史持節慰勞以詔恩問所疾苦受其章奏所欲言畢饗賜作樂觀以角扺樂闋罷遣勸以農桑減逐疫侲子之半賢曰侲子逐疫之人也音振薛綜注西京賦云侲之言善也善童㓜子也續漢書曰大儺選中黄門子弟年十嵗以上十二以下百二十人為侲子皆赤幘皂製執大鞉四年春正月元㑹徹樂不陳充庭車賢曰每大朝㑹必陳乘輿法物車輦於庭以年飢故不陳鄧隲在位頗能推進賢士薦何熈李郃等列於朝廷郃曷閤翻又辟𢎞農楊震巴郡陳禪等置之幕府天下稱之震孤貧好學明歐陽尚書通達博覽諸儒為之語曰關西孔子楊伯起楊震字伯起居𢎞農在函谷闗之西教授二十餘年不答州郡禮命禮謂延聘之禮命謂辟置之命衆人謂之晚暮謂嵗月已老而出仕遲也而震志愈篤隲聞而辟之時震年已五十餘累遷荆州刺史東萊太守郡國志東萊郡在雒陽東三千一百二十八里當之郡道經昌邑昌邑縣屬山陽郡賢曰昌邑故城在今兖州金鄉縣西北故所舉荆州茂才王宻為昌邑令夜懐金十斤以遺震遺于季翻下同震曰故人知君君不知故人何也宻曰暮夜無知者震曰天知地知我知子知何謂無知者宻愧而出後轉涿郡太守郡國志涿郡在雒陽東北千八百里性公廉子孫常蔬食歩行食不魚肉行不車騎也故舊或欲令為開産業為于偽翻震不肯曰使後世稱為清白吏子孫以此遺之不亦厚乎張伯路復攻郡縣殺守令復扶又翻下同黨衆浸盛詔遣御史中丞王宗持節發幽冀諸郡兵合數萬人徴宛陵令扶風法雄為青州刺史宛陵縣屬河南尹法姓也齊襄王法章之後秦滅齊子孫不敢稱田姓故以法為氏與宗并力討之南單于圍耿种數月梁慬耿䕫撃斬其别將於屬國故城班志西河羙稷縣屬國都尉治故城盖在羙稷縣界將即亮翻下同單于自將迎戰慬等復破之單于遂引還虎澤班志西河郡榖羅縣虎澤在西北師古避唐諱以虎為武丙午詔減百官及州郡縣奉各有差奉讀曰俸二月南匈奴冦常山滇零遣兵冦褒中褒中縣屬漢中郡古褒國也賢曰今梁州褒城縣漢中太守鄭勤移屯褒中任尚軍乆出無功民廢農桑乃詔尚將吏民還屯長安罷遣南陽穎川汝南吏士乙丑初置京兆虎牙都尉於長安扶風都尉於雍如西京三輔都尉故事賢曰漢官儀京兆虎牙扶風都尉以凉州近羌數犯三輔將兵衛䕶園陵扶風都尉居雍故俗人稱雍營西京三輔京兆有京輔都尉馮翊有左輔都尉扶風有右輔都尉謁者龎參説鄧隲説輸芮翻徙邉郡不能自存者入居三輔隲然之欲棄凉州并力北邉乃㑹公卿集議隲曰譬若衣敗壊一以相補猶有所完壊音怪若不如此將兩無所保郎中陳國虞詡言於太尉張禹曰若大將軍之䇿不可者三先帝開拓土宇劬勞後定而今憚小費舉而棄之此不可一也凉州既棄即以三輔為塞隴西安定北地皆凉州所部凉州既弃則三輔為極邉則園陵單外此不可二也喭曰闗西出將闗東出相賢曰説文喭傳言也前書秦漢以來山西出將山東出相秦時郿白起穎陽王翦漢興義渠公孫賀𫝊介子成紀李廣李蔡上邽趙充國狄道辛武賢皆名將也丞相則蕭曹魏丙韋平孔翟之類也烈士武臣多出凉州土風壯猛便習兵事今羌胡所以不敢入據三輔為心腹之害者以凉州在後故也凉州士民所以推鋒執鋭䝉矢石於行陳行户剛翻陳讀曰陣父死於前子戰於後無反顧之心者為臣屬於漢故也為于偽翻今推而捐之推通回翻割而弃之民庶安土重遷必引領而怨曰中國弃我於夷狄雖赴義從善之人不能無恨如卒然起謀卒讀曰猝因天下之飢敝乘海内之虚弱豪雄相聚量材立帥量音良帥所類翻驅氐𦍑以為前鋒席卷而東雖賁育為卒太公為將賁音奔將即亮翻猶恐不足當禦如此則函谷以西園陵舊京非復漢有復扶又翻此不可三也是後北宫伯玉王國閻忠馬騰韓遂之變卒如詡言賢曰席卷言無餘也前書曰雲徹席巻後無餘災也予謂席巻者言其埶便易也議者喻以補衣猶有所完詡恐其疽食侵滛而無限極也賢曰疽癰瘡也余謂食者言其侵食肌肉也禹曰吾意不及此微子之言幾敗國事微無也幾居希翻詡因説禹收羅凉土豪桀説輸芮翻引其牧守子弟於朝守式又翻朝直遥翻令諸府各辟數人外以勸厲答其功勤内以拘致防其邪計禹善其言更集四府皆從詡議於是辟西州豪桀為掾屬拜牧守長吏子弟為郎以安慰之掾俞絹翻長知兩翻下同鄧隲由是惡詡欲以吏法中傷之惡烏路翻中竹仲翻㑹朝歌賊寗季等數千人攻殺長吏屯聚連年州郡不能禁乃以詡為朝歌長朝歌縣屬河内郡賢曰朝歌故城在今衛州衛縣西故舊皆弔之謂其將得罪也詡笑曰事不避難臣之職也不遇槃根錯節無以别利器以斤斧自喻也别彼列翻此乃吾立功之秋也始到謁河内太守馬稜稜曰君儒者當謀謨廟堂乃在朝歌甚為君憂之為于偽翻詡曰此賊犬羊相聚以求温飽耳願明府不以為憂稜曰何以言之詡曰朝歌者韓魏之郊賢曰韓界上黨魏界河内相接太行故云郊也背太行背蒲妹翻行户剛翻臨黄河去敖倉不過百里而青冀之民流亡萬數賊不知開倉招衆刼庫兵守成臯斷天下右臂賢曰右臂喻要便也余謂右臂之説祖張儀見三巻周赧王四年㫁丁管翻此不足憂也今其衆新盛難與争鋒兵不厭權願寛假轡䇿勿令有所拘閡而已詡欲用度外之人以制羣盗恐郡家循常襲故以文法繩之故先以此言於稜賢曰閡與礙同及到官設三科以募求壯士自掾史以下各舉所知百官志縣有廷掾猶郡之五官掾也監鄉部春夏為勸農掾秋冬為制度掾史則有獄史佐史斗食令史掾史幹小史其攻刼者為上傷人偷盗者次之不事家業者為下收得百餘人詡為饗㑹悉貰其罪此三等人皆惡少年負宿罪者也悉貰之使入賊為間為于偽翻貰始制翻使入賊中誘令刼掠乃伏兵以待之遂殺賊數百人誘賊出刼掠而伏兵殺之誘音酉又潜遣貧人能縫者傭作賊衣以采線縫其裾有出市里者吏輙禽之賊由是駭散咸稱神明縣境皆平三月何熈軍到五原曼柏暴疾不能進遣龎雄與梁慬耿种將歩騎萬六千人攻虎澤連營稍前單于見諸軍並進大恐怖怖普布翻顧讓韓琮曰汝言漢人死盡今是何等人也賢曰顧反也讓責也反顧責韓琮也乃遣使乞降許之單于脱帽徒跣對龎雄等拜陳道死罪自陳謝罪言當死也於是赦之遇待如初乃還所鈔漢民男女鈔楚交翻及𦍑所畧轉賣入匈奴中者合萬餘人㑹熈卒即拜梁慬為度遼將軍龎雄還為大鴻臚先零𦍑復冦褒中復扶又翻下同鄭勤欲擊之主簿叚崇諌以為虜乘勝鋒不可當宜堅守待之勤不從出戰大敗死者三千餘人叚崇及門下史王宗原展周原伯之後有原莊公又晉卿先軫邑於原子孫以為氏又孔子弟子有原憲以身扞刅與勤俱死郡門下有掾有史徙金城郡居襄武襄武縣屬隴西郡賢曰今渭州縣戊子杜陵園火宣帝陵園也癸巳郡國九地震夏四月六州蝗東觀記曰司𨽻豫兖徐青冀六州丁丑赦天下王宗法雄與張伯路連戰破走之㑹赦到赦書到也賊以軍未解甲不敢歸降降户江翻王宗召刺史太守共議刺史青州刺史太守青州所部諸郡太守皆以為當遂擊之法雄曰不然兵凶器戰危事賢曰史記范蠡之辭勇不可恃勝不可必賊若乘船浮海深入逺島島都老翻水中有山曰島攻之未易也易以䜴翻及有赦令可且罷兵以慰誘其心埶必解散然後圖之可不戰而定也宗善其言即罷兵賊聞大喜乃還所畧人而東萊郡兵猶未解甲賊復驚恐遁走遼東止海島上果如法雄之言秋七月乙酉三郡大水騎都尉任仁與𦍑戰累敗而兵士放縱檻車徴詣廷尉死䕶𦍑校尉叚禧卒復以前校尉侯覇代之移居張掖永初二年侯覇以衆𦍑反叛免護𦍑校尉時居狄道按水經注𦍑水出湟中西南山下逕䕶𦍑城東故䕶𦍑校尉治又東逕臨𦍑城西護羌校尉盖治金城郡臨羌縣界也然宣帝置䕶𦍑校尉本治金城令居東都定河隴之後䕶𦍑校尉治安夷縣既而自安夷徙臨𦍑侯覇先居隴西狄道以𦍑叛而臨𦍑不可居也今移居張掖以隴西殘破復度河而西九月甲申益州郡地震賢曰益州郡故城在今昆州晉寧縣皇太后母新野君病續漢志曰婦人封君儀比公主油鞬軿車帶綬以采組為緄帶各如其綬色黄金辟邪加其首為帶太后幸其第連日宿止三公上表固争乃還宫冬十月甲戌新野君薨使司空䕶䘮事儀比東海恭王恭王事見四十四卷明帝永平元年鄧隲等乞身行服太后欲不許以問曹大家大家上疏曰妾聞謙讓之風徳莫大焉今四舅深執忠孝引身自退賢曰四舅謂隲悝宏閶也而以方垂未静拒而不許如後有毫毛加於今日誠恐推讓之名不可再得賢曰謂有纎微之過則推讓之羙失也太后乃許之及服除詔隲復還輔朝政朝直遥翻更授前封帝即阼之初封隲悝宏閶皆辭不受隲等叩頭固讓乃止于是並奉朝請位次三公下特進侯上賢曰在特進及侯之上請才性翻又如字其有大議乃詣朝堂與公卿叅謀太后詔隂后家屬皆歸故郡隂后家南徙事見上卷和帝永元十四年歸故郡歸南陽也還其資財五百餘萬五年春正月庚辰朔日有食之丙戌郡國十地震己丑太尉張禹免甲申以光禄勲潁川李修為太尉先零羗冦河東至河内零音憐百姓相驚多南奔度河使北軍中候朱寵將五營士屯孟津北軍中候掌監屯騎越騎歩兵長水射聲五營續漢志曰舊有中壘校尉領北軍營壘之事中興省中壘但置中候以監五營洪氏𨽻釋曰按祝睦後碑書為北軍軍中候則知此亦省文耳詔魏郡趙國常山中山繕作塢候六百一十六所郡國四皆屬冀州懼𦍑自河東河内北入冀州界故作塢候以備之𦍑既轉盛而縁邉二千石令長多内郡人並無守戰意皆争上徙郡縣以避冦難長知兩翻上時掌翻三月詔隴西徙襄武隴西郡本治狄道紀考異曰上云金城徙襄武此又云隴西徙襄武傳皆然或者二郡皆寄治於襄武歟安定徙羙陽北地徙池陽上郡治衙賢曰安定郡今涇州也羙陽故城在今武功縣北北地郡今寜州池陽縣故城在今涇陽縣北上郡今綏州也衙縣故城在今同州白水縣東北左𫝊秦晉戰于彭衙即此也予按郡國志羙陽縣屬扶風池陽衙二縣屬馮翊衙音牙百姓戀土不樂去舊樂音洛遂乃刈其禾稼發撤室屋夷營壁破積聚積子賜翻聚慈喻翻時連旱蝗飢荒而驅䠞刼掠流離分散隨道死亡或弃捐老弱或為人僕妾䘮其太半䠞與蹙同䘮息浪翻復以任尚為侍御史擊羌於上黨羊頭山破之賢曰羊頭山在上黨郡榖逺縣復扶又翻下同乃罷孟津屯夫餘王冦樂浪夫餘為冦始此夫音扶樂浪音洛琅髙句驪王宫與濊貊冦𤣥莵句如字又音駒驪力知翻濊音穢貊莫百翻莵同都翻夏閏四月丁酉赦凉州河西四郡海賊張伯路復冦東萊青州刺史法雄擊破之賊逃還遼東遼東人李乆等共斬之張伯路永初三年作亂至是始平於是州界清静秋九月漢陽人杜𤦺及弟季貢同郡王信等與𦍑通謀聚衆據上邽城冬十二月漢陽太守趙博遣客杜習刺殺琦刺七亦翻封習討姧侯杜季貢王信等將其衆據樗泉營是嵗九州蝗郡國八雨水六年春正月甲寅詔曰凡供薦新味多非其節或欝飬彊孰謂為土室蓄火使土氣蒸欝而飬之彊使成熟也前書召信臣𫝊曰大官園種冬生葱韭菜茹覆以屋廡晝夜然藴火待温氣乃生彊其兩翻或穿掘萌芽味無所至而夭折生長夭於兆翻短折曰夭長知兩翻豈所以順時育物乎𫝊曰非其時不食賢曰論語曰不時不食言非其時物則不食之前書召信臣曰不時之物有傷於人不宜以奉供飬自今當奉祠陵廟及給御者皆須時乃上時熟乃上進也上時掌翻凡所省二十三種種章勇翻三月十州蝗夏四月乙丑司空張敏罷己夘以太常劉愷為司空詔建武元功二十八將皆紹封五月旱丙寅詔令中二千石下至黄綬一切復秩董巴輿服志中二千石青綬四百石三百石二百石黄綬四年減百官奉今復之六月壬辰豫章員谿原山崩豫章郡在雒陽南二千七百里屬揚州辛巳赦天下侍御史唐喜討漢陽賊王信破斬之杜季貢亡從滇零是嵗滇零死子零昌立年尚少同種狼莫為其計策滇音顛零音憐少詩照翻種章勇翻以季貢為將軍别居丁奚城按東觀記丁奚城在北地郡靈州縣七年春二月丙午郡國十八地震夏四月己未平原懐王勝薨無子太后立樂安夷王寵子得為平原王丙申晦日有食之秋䕶羌校尉侯覇騎都尉馬賢擊先零别部牢𦍑於安定零音憐獲首虜千人蝗元初元年春正月甲子改元二月乙夘日南地坼長百餘里東觀記曰坼長百八十二里廣五十六里長直亮翻三月癸亥日有食之本考異曰帝紀二月己夘日南地坼三月癸酉日食志及袁紀皆云三月己夘日南地坼按長歴是年二月壬辰朔無己夘三月壬戌朔癸酉十二日不應日食二月當是乙夘三月當是癸亥詔遣兵屯河内通谷衝要三十六所皆作塢壁設鳴鼔以備𦍑冦自太行北至恒山限隔并冀其間多有谷道以相通今於衝要之地作塢壁以備𦍑冦夏四月丁酉赦天下京師及郡國五旱蝗五月先零𦍑冦雍城右扶風雍縣城也雍於用翻蜀郡夷冦蠶陵殺縣令蠶陵縣屬蜀郡賢曰蠶陵故城在今翼州翼水縣西有蠶陵山因以名焉九月乙丑太尉李修罷𦍑豪號多與諸種鈔掠武都漢中巴郡板楯蠻救之按范書板楯蠻夷者秦昭襄王時射殺白虎有功昭王復夷人頃田不租十妻不筭傷人者論殺人者得以倓錢贖死髙祖為漢王發夷人以定三秦復其渠帥七姓不輸租賦餘户乃嵗入賨錢口四十世號為板楯蠻夷閬中有渝水其人多居水左右天性勁勇數䧟陳喜歌舞髙祖為制巴渝舞蠻盖挾板楯而戰因以為名楯食尹翻倓徒濫翻賨蔵宗翻漢中五官掾程信率郡兵與蠻共擊破之百官志郡冇五官掾署功曹及諸曹事掾俞絹翻號多走還斷隴道與零昌合斷丁管翻零音憐侯霸馬賢與戰於枹罕破之枹罕縣屬隴西郡唐之河州枹音膚辛未以大司農山陽司馬苞為大尉冬十月戊子朔日有食之凉州刺史皮楊姓譜皮樊仲皮之後又鄭有上卿子皮出于罕氏擊羌於狄道大敗死者八百餘人作考異曰紀皮陽今從西羌𫝊予按隴西郡舊治狄道去年􅑫襄武則其地已弃而不有矣是嵗郡國十五地震二年春䕶羌校尉龎參以恩信招誘諸羌號多等帥衆降帥讀曰率降户江翻參遣詣闕賜號多侯印遣之參始還治令居自張掖徙還令居也通河西道零昌分兵冦益州遣中郎將尹就討之夏四月丙午立貴人滎陽閻氏為皇后閻后之母鄧宏之妻之同産也故得立后性妬忌後宫李氏生皇子保后鴆殺李氏為后廢保張本保後立是為順帝五月京師旱河南及郡國十九蝗河南即京師也六月丙戌大尉司馬苞薨秋七月辛巳以太僕㤗山馬英為太尉八月遼東鮮卑圍無慮無慮縣屬遼東郡應劭曰慮音閭師古曰即所謂毉無閭按郡國志無慮縣時屬遼東屬國九月又攻夫犂營殺縣令賢曰夫犂縣屬遼東屬國故城在今營州東南余按兩漢志遼東郡及遼東屬國皆無夫犂縣今言殺縣令則嘗為縣矣未知賢所據者何書也壬午晦日有食之尹就擊𦍑黨吕叔都等蜀人陳省羅横應募刺殺叔都刺七亦翻皆封侯賜錢詔屯騎校尉班雄屯三輔雄超之子也以左馮翊司馬鈞行征西將軍督關中諸郡兵八千餘人龎參將羌胡兵七千餘人與鈞分道並擊零昌參兵至勇士東賢曰勇士縣屬天水郡余按天水時已改為漢陽郡為杜季貢所敗引退敗補邁翻鈞等獨進攻㧞丁奚城杜季貢率衆偽逃鈞令右扶風仲光等收羌禾稼風考異曰袁紀作右扶太守种暠今從范書光等違鈞節度散兵深入羌乃設伏要擊之要一遥翻鈞在城中怒而不救冬十月乙未光等兵敗並沒死者三千餘人鈞乃遁還龎參既失期稱病引還皆坐徴下獄下遐稼翻鈞自殺時度遼將軍梁慬亦坐事抵罪校書郎中扶風馬融融以郎中校蘭臺書故稱校書郎中上書稱參慬智能宜宥過責效詔赦參等定考異曰慬傳曰慬為度遼將軍明年安北地上郡皆被羌冦不能自立詔慬發邉兵迎三郡吏民徙扶風界慬即遣南單于兄子優孤塗奴将兵迎之既還慬以塗奴接其家屬有勞輙授以𦍑侯印綬坐専擅徴下獄扺罪明年校書郎馬融上書訟慬與參按慬為度遼將軍在永初四年徙三郡民在五年參下獄在今年不得云明年融訟之也疑𫝊誤以馬賢代參領䕶羌校尉復以任尚為中郎將代班雄屯三輔月考異曰帝紀冬十遣任尚屯三輔按西羌𫝊司馬鈞扺罪後尚乃代雄屯三輔耳復扶又翻懷令虞詡説尚曰説輸芮翻兵法弱不攻彊走不逐飛自然之埶也今虜皆馬騎日行數百里來如風雨去如絶絃以歩追之埶不相及所以雖屯兵二十餘萬曠日而無功也為使君計莫如罷諸郡兵各令出錢數千二十人共市一馬以萬騎之衆逐數千之虜追尾掩截賢曰尾猶尋也予謂尾者隨其後而擊之也掩襲也截邀也其道自窮言虜之路自窮不能㨗出而冦掠也便民利事大功立矣尚即上言用其計遣輕騎擊杜季貢於丁奚城破之太后聞虞詡有將帥之畧以為武都太守冦考異曰詡𫝊曰羌武都太后以詡有將帥之畧遷武都太守又曰賊敗散南入益州本紀元初元年𦍑冦武都漢中據此似詡以元初元年為武都大守也然按西羌𫝊龎參抵罪後任尚屯三輔時詡猶為懐令説尚用騎兵袁紀亦云懐令虞詡説尚如范書所言又云上問何從發此計尚表之受於懐令虞詡由是知名遷武都太守以此驗之當在龎參抵罪後也羌衆數千遮詡於陳倉崤谷此崤谷當在陳倉縣界即今之大散關非宏農澠池縣之崤山也詡即停軍不進而宣言上書請兵須到當發羌聞之乃分鈔傍縣鈔楚交翻詡因其兵散日夜進道兼行百餘里令吏士各作兩竈日增倍之羌不敢逼或問曰孫臏減竈而君增之減竈事見二卷周顯王二十八年臏頻忍翻兵法日行不過三十里以戒不虞前書吉行五十里師行三十里而今日且二百里何也詡曰虜衆多吾兵少徐行則易為所及易以䜴翻速進則彼所不測虜見吾竈日增必謂郡兵来迎衆多行速必憚追我孫臏見弱見賢遍翻吾今示彊埶有不同故也既到郡兵不滿三千而羌衆萬餘攻圍赤亭數十日賢曰赤亭故城在今渭州襄武縣東南有赤亭水予按唐渭州漢隴西郡地漢武都唐階成州地此自是武都之赤亭非渭州之赤亭也又按郡國志武都下辨縣有赤亭即此詡乃令軍中彊弩勿發而濳發小弩羌以為矢力弱不能至并兵急攻詡于是使二十彊弩共射一人發無不中射而亦翻中竹仲翻羌大震退詡因出城奮擊多所傷殺明日悉陳其兵衆令從東郭門出北郭門入貿易衣服回轉數周羌不知其數更相恐動貿音茂更工衡翻詡計賊當退乃潜遣五百餘人於淺水設伏候其走路詡知賊退遇水必踏淺而度因於其處設伏以待之虜果大犇因掩擊大破之斬獲甚衆賊由是走散詡乃占相地埶相息亮翻築營壁百八十所招還流亡假賑貧民開通水運詡案行川谷自沮至下辨數十里燒石剪木開漕船道詡始到郡榖石千鹽石八千見户萬三千見存之户也見賢遍翻視事三年米石八十鹽石四百民増至四萬餘户人足家給一郡遂安十一月庚申郡國十地震十二月武陵澧中蠻反澧中今澧州地澧音禮州郡討平之己酉司徒夏勤罷夏户雅翻庚戌以司空劉愷為司徒光禄勲袁敞為司空敞安之子也前虎賁中郎將鄧宏卒宏自遭母䘮去官奉朝請故曰前宏性儉素治歐陽尚書漢千乘歐陽生𫝊伏生尚書由是尚書有歐陽氏學治直之翻授帝禁中有司奏贈宏驃騎將軍位特進封西平侯西平縣屬汝南郡太后追宏雅意不加贈位衣服但賜錢千萬布萬匹兄隲等復辭不受復扶又翻下同詔封宏子廣徳為西平侯將葬有司復奏發五營輕車騎士禮儀如霍光故事賢曰霍光薨宣帝遣太中大夫侍御史持節䕶䘮事中二千石修莫府冢上賜玉衣梓宫便房黄腸題湊輼輬車黄屋左纛輕車材官五校士以送葬也太后皆不聼但白葢雙騎門生輓送賢曰白葢車也輓音晚騎竒寄翻後以帝師之重分西平之都鄉封廣徳弟甫德為都鄉矦資治通鑑卷四十九
