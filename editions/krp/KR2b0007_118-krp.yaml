body:
  text: 宋司馬光撰胡三省音注晉紀四十起强圉大荒落盡屠維協洽凡三年安皇帝癸義熈十三年春正月甲戌朔日有食之秦主泓朝㑹百官於前殿朝直遙翻以内外危迫君臣相泣以内則兄弟搆難外為晉夏所迫也征北將軍齊公恢帥安定鎮戸三萬八千焚廬舎自北雍州趨長安秦分嶺北五郡為北雍州鎮安定泓不用東平公紹懿横之言以召亂帥讀曰率雍於用翻趨七喻翻自稱大都督建義大將軍移檄州郡欲除君側之惡揚威將軍姜紀帥衆歸之建節將軍彭完都棄隂宻犇還長安恢至新支姜紀説恢曰國家重將大兵皆在東方京師空虚公亟引輕兵襲之必克恢不從南攻郿城鎮西將軍姚諶為恢所敗説輸芮翻敗補邁翻將即亮翻郿音眉又音媚諶氏壬翻姚諶去年棄雍東奔遂屯于郿長安大震泓馳使徴東平公紹遣姚裕及輔國將軍胡翼度屯灃西闗中無灃水澧當作灃灃水出鄠南灃谷北過上林苑入渭使䟽吏翻扶風太守姚儁等皆降於恢降户江翻東平公紹引諸軍西還與恢相持於靈臺水經注漢靈臺在秦阿房宫南鎬水逕其北姚讚留寧朔將軍尹雅為𢎞農太守守潼關太守式又翻亦引兵還恢衆見諸軍四集皆有懼心其將齊黄等詣大軍降恢進兵逼紹讚自後擊之恢兵大敗殺恢及其三弟泓哭之慟𦵏以公禮太尉裕引水軍發鼔城留其子彭城公義隆鎮彭城詔以義隆為監徐兖青冀四州諸軍事徐州刺史監工衘翻涼公暠寢疾暠古老翻遺命長史宋繇曰吾死之後世子猶卿子也善訓導之二月暠卒卒子恤翻下將卒同官屬奉世子歆為大都督大將軍涼公領涼州牧大赦改元嘉興尊歆母天水尹氏為太后以宋繇錄三府事三府大都督大將軍府凉公府州牧府也諡暠曰武昭王廟號太祖西秦安東將軍木弈于擊吐谷渾樹洛干破其弟阿柴於堯杆川堯杆川在塞外杆居寒翻又居案翻俘五千餘口而還還而宣翻又如字樹洛干走保白蘭山慙憤發疾將卒謂阿柴曰吾子拾䖍幼弱今以大事付汝樹洛干卒卒子恤翻阿柴立自稱驃騎將軍沙州刺史驃匹妙翻騎竒寄翻諡樹洛干曰武王阿柴稍用兵侵併其傍小種種章勇翻地方數千里遂為疆國河西王䝉遜遣其將襲烏啼部大破之烏啼虜居張掖刪丹縣金山之西將即亮翻又撃卑和部降之卑和羌居西海降戸江翻王鎭惡進軍澠池澠彌兖翻遣毛徳祖襲尹雅於蠡吾城禽之秦以雅為𢎞農太守屯蠡吾城據載記蠡吾城當在宜陽之西宋白曰蠡吾城後魏初猶屬𢎞農唐以來為澠池縣理所余按蠡吾自是漢清河國界城名此乃蠡城非蠡吾城也通鑑葢承晉書之誤雅殺守者而逃鎮惡引兵徑前扺潼關檀道濟沈林子自陜北渡河拔襄邑堡陜式冉翻秦河北太守薛帛犇河東襄邑堡在河北郡河北縣漢晉屬河東郡秦分立河北郡又攻秦并州刺史尹昭於蒲阪不克阪音反别將攻匈奴堡為姚成都所敗將即亮翻下同敗蒲邁翻辛酉滎陽守將傅洪以虎牢降魏秦主泓以東平公紹為太宰大將軍都督中外諸軍事假黄鉞改封魯公使督武衛將軍姚鸞等步騎五萬守潼關又遣别將姚驢救蒲阪沈林子謂檀道濟曰蒲阪城堅兵多不可猝拔攻之傷衆守之引日王鎮惡在潼關勢孤力弱不如與鎮惡合勢并力以争潼關若得之尹昭不攻自潰矣道濟從之三月道濟林子至潼關秦魯公紹引兵出戰道濟林子奮擊大破之斬獲以千數紹退屯定城郭縁生述征記曰定城去潼關三十里夾道各一城渭水逕其北據險拒守謂諸將曰道濟等兵力不多懸軍深入不過堅壁以待繼援吾分軍絶其糧道可坐禽也乃遣姚鸞屯大路以絶道濟糧道自澠池西入關有兩路南路由囘谿阪自漢以前皆由之曹公惡南路之險更開北路遂以北路為大路載記曰紹留鸞守險以絶道濟糧道葢鸞雖屯大路亦據險而邀絶糧道也紹初遣胡翼度據東原葢與大路相為唇齒所謂據險也及沈林子襲鸞營翼度不能救何也人心危駭面面受敵故也鸞遣尹雅將兵與晉戰於闗南闗南潼闗之南也為晉兵所獲將殺之雅曰雅前日已當死幸得脱至今死固甘心然夷夏雖殊夏戸雅翻君臣之義一也晉以大義行師獨不使秦有守節之臣乎乃免之丙子夜沈林子將鋭卒襲鸞營斬鸞殺其士卒數千人紹又遣東平公讚屯河上以㫁水道㫁丁管翻下兵㫁同沈林子擊之讚敗走還定城薛帛據河曲來降河水自蒲阪南至潼關激而東流蒲阪河北之間謂之河曲太尉裕將水軍自淮泗入清河將泝河西上上時掌翻下必上北上同先遣使假道於魏使疏吏翻秦主泓亦遣使請救於魏魏主嗣使羣臣議之皆曰潼闗天險劉裕以水軍攻之甚難若登岸北侵其勢便易易以䜴翻裕聲言伐秦其志難測且秦婚姻之國不可不救也秦女歸魏見上卷十一年宜發兵㫁河上流勿使得西博士祭酒崔浩曰裕圗秦久矣今姚興死子泓懦劣國多内難難乃旦翻裕乗其危而伐之其志必取若遏其上流裕心忿戾必上岸北侵是我代秦受敵也今柔然宼邊民食又乏若復與裕為敵發兵南赴則北宼愈深救北則南州復危南州謂魏之南境相州瀕河諸郡復扶又翻非良計也不若假之水道聽裕西上然後屯兵以塞其東塞悉則翻使裕克捷必徳我之假道不捷吾不失救秦之名此策之得者也且南北異俗借使國家棄恒山以南恒戸登翻裕必不能以吳越之兵與吾争守河北之地安能為吾患乎夫為國計者惟社稷是利豈顧一女子乎議者猶曰裕西入闗則恐吾㫁其後腹背受敵北上則姚氏必不出闗助我其勢必聲西而實北也嗣乃以司徒長孫暠督山東諸軍事長知兩翻又遣振威將軍娥清孫愐泓娥姓也冀州刺史阿薄干魏書官氏志内入諸姓阿伏干氏後為阿氏將步騎十萬屯河北岸庚辰裕引軍入河以左將軍向彌為北青州刺史留戍碻磝晉氏南渡僑置青州於江北裕平廣固置北青州於東陽而江北之青州如故今向彌以北青州刺史戍碻磝東陽之青州亦如故向式亮翻初裕命王鎮惡等若克洛陽須大軍到俱進鎮惡等乘利徑趨潼關趨七喻翻為秦兵所拒不得前久之乏食衆心疑懼或欲棄輜重還赴大軍重直用翻沈林子按劒怒曰相公志清六合今許洛已定闗右將平事之濟否繫於前鋒奈何沮乘勝之氣棄垂成之功乎沮在吕翻且大軍尚逺賊衆方盛雖欲求還豈可得乎下官授命不顧論語子張曰士見危授命今日之事當自為將軍辦之為于偽翻未知二三君子將何面以見相公之旗鼔邪相公謂裕也鎮惡等遣使馳告裕求遣糧援裕呼使者開舫北戸使疏吏翻舫甫妄翻方舟也大舟也指河上魏軍以示之曰我語令勿進今輕佻深入語牛倨翻佻他雕翻岸上如此何由得遣軍鎮惡乃親至𢎞農説諭百姓説輸芮翻百姓競送義租軍食復振復扶又翻下則復子復同魏人以數千騎縁河隨裕軍西行軍人於南岸牽百丈百丈者所以挽船今南人用麻䋲北人以竹為之陸游曰蜀人百丈以巨竹四破為之大如人臂風水迅急有漂渡北岸者漂匹招翻輒為魏人所殺略裕遣軍擊之裁登岸則走退則復來夏四月裕遣白直隊主丁旿裕選白丁之壯勇者入直左古使旿領之杜佑曰白直無月紿之數旿阮古翻帥仗士七百人車百乘帥讀曰率乗繩證翻渡北岸去水百餘步為却月陣兩端抱河車置七仗士事畢使竪一白毦竪上主翻説文曰竪立也毦仍吏翻績羽為之魏人不解其意解戸買翻曉也皆未動裕先命寧朔將軍朱超石戒嚴白毦既舉超石帥二千人馳往赴之齎大弩百張一車益二十人設彭排於轅上魏人見營陣既立乃進圍之長孫嵩帥三萬騎助之四面肉薄攻營薄普各翻肉薄者以身薄營血戰弩不能制時超石别齎大鎚及矟千餘張鎚傳為翻乃㫁矟長三四尺以鎚鎚之一矟輒洞貫三四人魏兵不能當一時犇潰死者相積臨陳斬阿薄干魏人退還畔城㫁丁管翻長直亮翻陳與陣同魏收地形志平原郡聊城縣有畔城超石帥寧朔將軍胡藩寧逺將軍劉榮祖追擊又破之殺獲千計魏主嗣聞之乃恨不用崔浩之言秦魯公紹遣長史姚洽寧朔將軍安鸞䕶軍姚墨蠡蠡魯戈翻河東太守唐小方帥衆三千屯河北之九原阻河為固欲以絶檀道濟糧援載記曰紹欲以絶𢎞農諸縣糧援沈林子邀擊破之斬洽墨蠡小方殺獲殆盡林子因啓太尉裕曰紹氣葢關中今兵屈於外國危於内恐其凶命先盡不得以膏齊斧耳齊讀曰資應劭曰齊利也張晏曰齊如字征伐斧也以整齊天下也一説齊作齋凡師出入齊戒入廟而受斧鉞也紹聞洽等敗死憤恚發病嘔血以兵屬東平公讚而卒恚於避翻屬之欲翻卒子恤翻讚既代紹衆力猶盛引兵襲林子林子復擊破之復扶又翻太尉裕至洛陽行視城塹行下孟翻嘉毛脩之完葺之功賜衣服玩好直二千萬好呼到翻丁巳魏主嗣如髙栁壬戌還平城河西王䝉遜大赦遣張掖太守沮渠廣宗詐降以誘涼公歆沮子余翻降戸江翻下同歆發兵應之䝉遜將兵三萬伏於蓼泉新唐書地理志甘州張掖郡西北百九十里有祁連山山北有建康軍軍西百二十里有蓼泉守捉城歆覺之引兵還䝉遜追之歆與戰於解支澗解支澗晉書作鮮支澗當從之大破之斬首七千餘級䝉遜城建康置戍而還五月乙未齊郡太守王懿降於魏上書言劉裕在洛宜發兵絶其歸路可不戰而克魏主嗣善之崔浩侍講在前嗣問之曰劉裕伐姚泓果能克乎對曰克之嗣曰何故對曰昔姚興好事虛名而少實用子泓懦而多病兄弟乖争好呼到翻少詩紹翻謂弼懿恢皆與泓争國裕乗其危兵精將勇何故不克將即亮翻嗣曰裕才何如慕容垂對曰勝之垂藉父兄之資修復舊業國人歸之若夜蟲之就火少加倚仗易以立功少詩沼翻易以豉翻劉裕奮起寒微不階尺土討滅桓𤣥興復晉室事見一百一十三卷元興三年北禽慕容超事見一百一十五卷五年六年南梟盧循事見六年七年梟堅堯翻所向無前非其才之過人安能如是乎嗣曰裕既入闗不能進退我以精騎直擣彭城夀春騎奇寄翻裕將若之何對曰今西有屈丏北史曰明元改赫連勃勃名曰屈丏北方言屈丏者卑下也北有柔然窺伺國隙伺相吏翻陛下既不可親御六師雖有精兵未睹良將將即亮翻長孫嵩長於治國短於用兵非劉裕敵也治直之翻下同興兵逺攻未見其利不如且安静以待之凡兵之動知敵之主知敵之將此之謂也裕克秦而歸必簒其主關中華戎雜錯風俗勁悍悍侯旰翻又下罕翻裕欲以荆揚之化施之函秦此無異解衣包火張羅捕虎雖留兵守之人情未洽趨尚不同適足為寇敵之資耳赫連之得關中崔浩固料之矣願陛下按兵息民以觀其變秦地終為國家之有可坐而守也嗣笑曰卿料之審矣浩曰臣嘗私論近世將相之臣若王猛之治國苻堅之管仲也治直之翻慕容恪之輔幼主慕容暐之霍光也劉裕之平禍亂司馬徳宗之曹操也嗣曰屈丏何如浩曰屈丏國破家覆孤孑一身孑居列翻單也寄食姚氏受其封殖不思醻恩報義而乘時徼利盜有一方事見一百一十四巻三年徼一遙翻結怨四鄰謂與魏秦涼搆怨也撅竪小人撅與掘同其月翻撅竪言撅起自竪立也雖能縱暴一時終當為人所吞食耳嗣大恱語至夜半賜浩御縹醪十觚縹匹紹翻青白色曰縹醅酒曰醪觚飲器受三升此魏主所自御者故曰御縹醪水精鹽一兩鹽透明如水精故謂之水精鹽曰朕味卿言如此鹽酒故欲與卿共饗其羙然猶命長孫嵩叔孫建各簡精兵伺裕西過自成臯濟河南侵彭沛若不時過則引兵隨之彭沛謂彭城沛郡也魏主嗣西巡至雲中遂濟河畋于大漠魏置天地四方六部大人以諸公為之諸公謂時居公位及位從公者秋七月太尉裕至陜陜式冉翻沈田子傅𢎞之入武關秦戍將皆委城走將即亮翻田子等進屯青泥秦主泓使給事黄門侍郎姚和都屯嶢桞以拒之嶢音堯西秦相國翟勍卒勍渠京翻八月以尚書令曇達為左丞相左僕射元基為右丞相御史大夫麴景為尚書令侍中翟紹為左僕射翟勍既卒曇達皆序遷通鑑即西秦舊史書之曇徒含翻太尉裕至閺鄉閺音旻沈田子等將攻嶢栁秦主泓欲自將以禦裕軍將即亮翻恐田子等襲其後欲先擊滅田子等然後傾國東出乃帥步騎數萬奄至青泥帥讀曰率騎奇寄翻田子本為疑兵所領裁千餘人聞泓至欲擊之傅𢎞之以衆寡不敵止之田子曰兵貴用竒不必在衆且今衆寡相懸勢不兩立若彼結圍既固則我無所逃矣不如乗其始至營陳未立先薄之可以有功遂帥所領先進𢎞之繼之秦兵合圍數重陳讀曰陣重直龍翻田子撫慰士卒曰諸君冒險逺來正求今日之戰死生一决封侯之業於此在矣士卒皆踴躍鼔譟執短兵奮擊秦兵大敗沈田子以千餘人敗姚泓數萬之衆者置兵死地人自為戰也斬馘萬餘級得其乘輿服御物乘繩證翻秦主泓犇還灞上初裕以田子等衆少少詩沼翻遣沈林子將兵自秦嶺往助之秦嶺在長安南班固西都賦所謂前乘秦嶺自此出藍田關裕葢遣林子自陽華循山西南至秦嶺至則秦兵已敗乃相與追之關中郡縣多潛送欵於田子辛丑太尉裕至潼闗以朱超石為河東太守使與振武將軍徐猗之㑹薛帛於河北共攻蒲阪秦平原公璞與姚和都共擊之姚和都葢青泥既敗而犇蒲阪也或曰和都當作成都猗之敗死超石犇還潼關東平公讚遣司馬國璠引魏兵以躡裕後璠孚袁翻躡尼輒翻王鎮惡請帥水軍自河入渭以趨長安帥讀曰率水經河水歴船司空與渭水㑹春秋之渭汭即其地也趨七喻翻裕許之秦恢武將軍姚難自香城引兵而西香城在渭水之北蒲津之口恢武將軍葢姚秦創置鎮惡追之秦主泓自灞上引兵還屯石橋以為之援石橋在長安城洛門東北有石橋水經註曰石橋水南出馬嶺山積石據其東驪山距其西其水北逕鄭城西水上有橋東去鄭城十里故世以橋名水三輔黄圖曰洛門長安城北出東頭第一門鎮北將軍姚彊與難合兵屯涇上以拒鎮惡涇水出安定涇陽縣开頭山東南至陽陵入渭此涇上在漢京兆陽陵界鎮惡使毛徳祖進擊破之彊死難犇長安東平公讚退屯鄭城太尉裕進軍逼之泓使姚丕守渭橋胡翼度屯石積東平公讚屯灞東泓屯逍遙園水經註沈水上承樊川皇子陂北逕長安城西與昆明池水合其枝津東北流逕鄧艾祠南又東分為二水一水入逍遙園鎮惡沂渭而上上時掌翻乘䝉衝小艦行船者皆在艦内秦人見艦進而無行船者皆驚以為神艦戸黯翻壬戌旦鎮惡至渭橋令軍士食畢皆持仗登岸後登者斬衆既登渭水迅急艦皆隨流倐忽不知所在時泓所將尚數萬人將即亮翻鎮惡諭士卒曰吾屬並家在江南此為長安北門去家萬里舟楫衣糧皆已隨流今進戰而勝則功名俱顯不勝則骸骨不返無他岐矣岐旁出之道卿等勉之乃身先士卒先悉薦翻衆騰踴爭進大破姚丕於渭橋泓引兵救之為丕敗卒所蹂踐不戰而潰諶等皆死蹂人九翻踐慈演翻諶氏壬翻泓單馬還宫鎮惡入自平朔門漢無平朔門葢長安城北門也後人改其名耳泓與姚裕等數百騎逃犇石橋東平公讚聞泓敗引兵赴之衆皆潰去胡翼度降于太尉裕泓將出降其子佛念年十一言於泓曰晉人將逞其欲雖降必不免不如引決降戸江翻引決謂自裁也泓憮然不應憮音武悵也失意貌佛念登宫牆自投而死姚佛念雖不及劉諶然以童稚之年氣烈如此亦可尚也癸亥泓將妻子羣臣詣鎮惡壘門請降鎮惡以屬吏屬之欲翻城中夷晉六萬餘戸鎮惡以國恩撫慰號令嚴肅百姓安堵九月太尉裕至長安鎮惡迎於灞上裕勞之曰成吾霸業者卿也鎮惡再拜謝曰明公之威諸將之力鎮惡何功之有裕笑曰卿欲學馮異耶謂馮異謙退不伐而能定關中鎮惡性貪秦府庫盈積鎮惡盜取不可勝紀勝音升裕以其功大不問或譛諸裕曰鎮惡藏姚泓偽輦將有異志裕使人覘之覘丑㢘翻又丑艶翻鎮惡剔取其金銀棄輦於垣側裕意乃安裕收秦彞器渾儀土圭記里鼓指南車送詣建康左傳祝佗曰成王分魯公以官司彞器杜預註彞器常用之器漢武帝時洛下閡鮮于妄人耿壽昌造員儀以考歴度和帝時賈逵又加黄道順帝時張衡又制渾象具内外規黄赤道南北極列二十四氣二十八宿中外星官及日月五緯以漏水轉之於殿上室内星中出没與天相應其後吳陵績造渾象王蕃制渾儀舊渾象以二分為一度凡周七尺三寸半分張衡更制以四分為一度凡周一丈四尺六寸渾王蕃以古制局小星辰稠穊衡器傷大難可轉移更制象以三分為一度凡周天一丈九寸五分分之三周禮大司徒以土圭之法測土深正日景以求地中日南則景短多暑日北則景長多寒日東則景夕多風日西則景朝多隂日至之景尺有五寸謂之地中註云土圭所以致四時日月之景也鄭司農云測土深謂南北東西之深也日南立表處太南近日也日北謂立表處太北逺日也景夕謂日昳景乃中立表處太東近日也景朝謂日未中而景中立表處太西逺日也𤣥謂晝漏半而置土圭表隂陽審其南北景短於土圭謂之日南是地於日為近南也景長於土圭謂之日北是地於日為近北也東於土圭謂之日東是地於日為近東也西於土圭謂之日西是地於日為近西也如是則寒暑隂風偏而不和是未得其所求凡日景於地千里而差一寸鄭司農又云土圭之長尺有五寸以夏至之日立八尺之表其景適與土圭等謂之地中今潁川陽城地為然晉輿服志記里鼔車駕四馬制如司南車崔豹古今註曰大章車所以識道里也起於西京亦曰記里車車上有二層皆有木人行一里下層撃鼓行十里上層擊鐲黄帝作指南車晉輿服志司南車一名指南車駕四馬其下制如樓三級四角金龍銜羽葆刻木為仙人衣羽衣立車上車雖囘轉手常南指大駕出行為先啓之乘蕭子顯曰指南車四周廂上施屋指南人衣裙襦天衣在廂中上四角皆施龍孑干縁帷色青孔雀毦烏布皁複幔漆畫輪駕牛皆銅校飾記里鼔車制如指南上施華葢孑繖衣漆畫鼔機皆在内渾戸本翻其餘金玉繒帛珍寳皆以頒賜將士繒慈陵翻秦平原公璞并州刺史尹昭以蒲阪降東平公讚帥宗族百餘人詣裕降降戸江翻帥讀曰率裕皆殺之送姚泓至建康斬於市孝武大元九年姚萇建國改元白雀歳在甲申傳三主三十四年而亡裕以薛辯為平陽太守使鎮捍北道裕議遷都洛陽諮議參軍王仲徳曰非常之事固非常人所及必致駭動今暴師日久士卒思歸遷都之計未可議也裕乃止羌衆十餘萬口西犇隴上沈林子追擊至槐里俘虜萬計姚氏羌也姚氏既滅故羌衆西奔河西王䝉遜聞太尉裕滅秦怒甚門下校即劉祥入言事自曹操孫權置校事司察羣臣謂之校郎後遂因之䝉遜置諸曹校即如門下校郎中兵校郎是也䝉遜曰汝聞劉裕入闗敢研研然也遂斬之楊正衡曰研五見翻然有其音而無其義河西士民乃心晉室蒙遜胡人竊據其上聞裕入關慮其響應故斬祥以威衆以鎮服其心也姦雄之喜怒豈茍然哉魏書沮渠傳作妍妍華人服飾妍靡自喜故䝉遜云然妍讀如字音義皆通當従魏書初夏王勃勃聞太尉裕伐秦謂羣臣曰姚泓非裕敵也且其兄弟内叛安能拒人裕取關中必矣然裕不能久留必將南歸留子弟及諸將守之將即亮翻下鎮將同吾取之如拾芥耳乃秣馬礪兵訓養士卒進據安定秦嶺北郡縣鎭戍皆降之裕遣使遺勃勃書降戸江翻使疏吏翻遺于季翻約為兄弟勃勃使中書侍即皇甫徽為報書而隂誦之對裕使者口授舎人使書之裕讀其文歎曰吾不如也史言夷豪多權數廣州刺史謝欣卒東海人徐道期聚衆攻陷州城進攻始興始興相彭城劉謙之討誅之詔以謙之為廣州刺史癸酉司馬休之司馬父思司馬國璠司馬道賜魯軌韓延之刁雍王慧龍及桓温之孫道度道子族人桓謐桓璲陳郡袁式等皆詣魏長孫嵩降姚秦既滅司馬休之等懼為裕所誅故皆降魏璠孚袁翻雍於容翻璲音遂降戸江翻秦匈奴鎮將姚成都及弟和都舉鎮降魏魏主嗣詔民間得姚氏子弟送平城者賞之冬十月己酉嗣召長孫嵩等還司馬休之尋卒於魏卒子恤翻魏賜國璠爵淮南公道賜爵池陽子魯軌爵㐮陽公刁雍表求南鄙自效嗣以雍為建義將軍建義將軍魏以是號寵刁雍言使之建義以復父兄之仇雍聚衆於河濟之間濟子禮翻擾動徐兖太尉裕遣兵討之不克雍進屯固山衆至二萬詔進宋公爵為王增封十郡辭不受西秦王熾磐遣左丞相曇達等擊秦故將姚艾艾秦上邽之鎮將將即亮翻艾遣使稱藩使疏吏翻熾磐以艾為征東大將軍秦州牧徴王松夀為尚書左僕射十二年熾磐遣松夀屯馬頭以逼秦之上邽上邽降故徴還十一月魏叔孫建等討西山丁零翟蜀洛支等平之西山魏安州之西山辛未劉穆之卒太尉裕聞之驚慟哀惋者累日卒子恤翻惋烏貫翻始裕欲留長安經畧西北而諸將佐皆久役思歸多不欲留將即亮翻㑹穆之卒裕以根本無託遂決意東還還從宣翻又如字穆之之卒也朝廷恇懼恇音匡怯也欲發詔以太尉左司馬徐羨之代之中軍諮議參軍張邵曰今誠急病任終在徐然世子無專命宜須諮之裕欲以王𢎞代穆之從事中郎謝晦曰休元輕易不若羨之王𢎞字休元易以䜴翻乃以羨之為吏部尚書建威將軍丹陽尹代管留任於是朝廷大事常決於穆之者並悉北諮裕以次子桂陽公義真為都督雍梁秦三州諸軍事安西將軍領雍東秦二州刺史雍於用翻義真時年十二以太尉諮議參軍京兆王脩為長史王鎮惡為司馬領馮翊太守沈田子毛徳祖皆為中兵參軍仍以田子領始平太守徳祖領秦州刺史天水太守傅𢎞之為雍州治中從事史先是隴上流戸寓闗中者望因兵威得復本土及置東秦州時裕未得天水東秦州即毛徳祖所領或曰裕置東秦州使義真兼領先悉薦翻知裕無復西略之意復扶又翻下同皆嘆息失望闗中人素重王猛裕之克長安王鎮惡功為多由是南人皆忌之沈田子自以嶢栁之捷與鎮惡争功不平裕將還田子及傅𢎞之屢言於裕曰鎮惡家在闗中不可保信裕曰今留卿文武將士精兵萬人彼若欲為不善正足自滅耳勿復多言裕私謂田子曰鍾㑹不得遂其亂者以有衛瓘故也㑹瓘事見七十八卷魏元帝咸熈元年語曰猛獸不如羣狐卿等十餘人何懼王鎮惡為沈田子殺王鎮惡張本臣光曰古人有言疑則勿任任則勿疑裕既委鎮惡以闗中而復與田子有後言是鬬之使為亂也惜乎百年之寇千里之土得之艱難失之造次造七到翻使豐鄗之都復輸寇手鄗音浩荀子曰兼并易能也堅凝之難信哉三秦父老聞裕將還詣門流涕訴曰殘民不霑王化於今百年始覩衣冠人人相賀長安十陵是公家墳墓咸陽宫殿是公家室宅漢高帝長陵惠帝安陵文帝覇陵景帝陽陵武帝茂陵昭帝平陵宣帝杜陵元帝渭陵成帝延陵哀帝義陵平帝康陵皆在關中凡十一陵言十者舉大數也長安咸陽宫殿皆漢故跡裕劉氏子孫故父老以是為言而留之捨此欲何之乎裕為之愍然為于偽翻慰諭之曰受命朝廷不得擅留誠多諸君懐本之志今以次息次息猶言次子也與文武賢才共鎮此境勉與之居十二月庚子裕發長安自洛入河開汴渠而歸汴音卞氐豪徐駭奴齊元子等擁部落三萬在雍遣使請降於魏雍於用翻使疏吏翻降戸江翻魏主嗣遣將軍王洛生河内太守楊聲等西行以應之閏月壬申魏主嗣如大甯長川秦雍人千餘家推襄邑令上谷寇讚為主以降於魏讃秦之襄邑令也魏主嗣拜讚魏郡太守久之秦雍人流入魏之河南滎陽河内者戸以萬數嗣乃置南雍州以讚為刺史封河南公治洛陽治直之翻立雍州郡縣以撫之讚善於招懐流民歸之者三倍其初夏王勃勃聞太尉裕東還大喜善用兵者觀釁而動問於王買徳曰朕欲取關中卿試言其方略買徳曰關中形勝之地而裕以幼子守之狼狽而歸正欲急成簒事耳不暇復以中原為意劉裕之心事崔浩王買徳皆知之復扶又翻此天以關中賜我不可失也青泥上洛南北之險要宜先遣遊軍㫁之東塞潼關㫁丁管翻塞悉則翻絶其水陸之路然後傳檄三輔施以威徳則義真在網罟之中不足取也勃勃敗義真取關中卒如買徳之計罟音古勃勃乃以其子撫軍大將軍璝都督前鋒諸軍事帥騎二萬向長安璝古回翻帥讀曰率騎竒寄翻前將軍昌屯潼闗以買徳為撫軍右長史屯青泥劉裕得洛陽而不能禁寇讚窺伺於其側使義真守關中而不能禁夏兵之㫁潼闗青泥南歸彭城席未煖而義真敗既棄天下肉未寒而四鎮失宜也勃勃將大軍為後繼將即亮翻下同是歳魏都坐大官章安侯封懿卒坐徂臥翻十四年春正月丁酉朔魏主嗣至平城命䕶髙車中郎將薛繁帥髙車丁零北略至弱水而還魏倣漢置匈奴中即將之官置䕶髙車中郎將帥讀曰率卒已大赦夏赫連璝至渭陽關中民降之者屬路降户江翻屬之欲翻龍驤將軍沈田子將兵拒之驤思將翻畏其衆盛退屯劉迴堡遣使還報王鎮惡鎮惡謂王脩曰公以十歳兒付吾屬當共思竭力而擁兵不進虜何由得平使者還以告田子田子與鎮惡素有相圗之志由是益忿懼未㡬鎮惡與田子俱出北地以拒夏兵赫連璝已至渭陽王沈烏能出北地乎此言北地者謂長安以北之地耳幾居豈翻軍中訛言鎮惡欲盡殺南人以數十人送義眞南還因據闗中反辛亥田子請鎮惡至傅𢎞之營計事田子求屏人語屏必郢翻使其宗人沈敬仁斬之幕下矯稱受太尉令誅之𢎞之犇告劉義真義真與王脩被甲登横門以察其變横門長安城北出東頭第一門被皮義翻横音光俄而田子帥數十人來言鎮惡反脩執田子數以專戮斬之數所具翻以冠軍將軍毛脩之代鎮惡為安西司馬冠古玩翻傅𢎞之大破赫連璝於池陽又破之於寡婦渡按宋白續通典今慶州北十五里有寡婦山盖水發源是山其下流為寡婦渡斬獲甚衆夏兵乃退壬戌太尉裕至彭城解嚴琅邪王徳文先歸建康裕聞王鎮惡死表言沈田子忽發狂易奄害忠勲狂易謂病狂而變易其常心易如字追贈鎮惡左將軍青州刺史以彭城内史劉遵考為并州刺史領河東太守鎮蒲阪徴荆州刺史劉道憐為徐兖二州刺史裕欲以世子義符鎮荆州以徐州刺史劉義隆為司州刺史鎮洛陽中軍諮議張邵諫曰諮議諮議參軍也儲貳之重四海所繫不宜處外處昌吕翻乃更以義隆為都督荆益寧雍梁秦六州諸軍事西中郎將荆州刺史更上衡翻雍於用翻以南郡太守到彦之為南蠻校尉張邵為司馬領南郡相冠軍功曹王曇首為長史冠古玩翻曇徒含翻北徐州從事王華為西中郎主簿晉置南徐州於京口北徐州仍治彭城到彦之王曇首王華輔義隆入立遂居將相之任沈林子為西中郎參軍義隆尚幼府事皆決於邵曇首𢎞之弟也裕謂義隆曰王曇首沈毅有器度宰相才也汝每事諮之沈持林翻以南郡公劉義慶為豫州刺史義慶道憐之子也裕解司州領徐冀二州刺史秦王熾磐以乞伏木弈干為沙州刺史鎮樂都樂音洛二月乙弗烏地延帥戸二萬降秦三月遣使聘魏使疏吏翻夏四月己巳魏徙冀定幽三州徒河於代都魏主珪皇始二年克中山置安州又立行臺以鎮撫其民天興三年改曰定州領中山常山鉅鹿博陵北平河間高陽趙郡宋白曰初置安州尋改定州以安定天下為名徒河葢徒河之民從慕容入中國留居三州者魏人因謂之徒河初和龍有赤氣四塞蔽日塞悉則翻自寅至申燕太史令張穆言於燕王跋曰此兵氣也今魏方彊盛而執其使者謂留于什門也事見一百十六卷義熈十年好命不通臣竊懼焉好呼到翻跋曰吾方思之五月魏主嗣東巡至濡源及甘松濡乃官翻遣征東將軍長孫道生安東將軍李先給事黄門侍即奚觀帥精騎二萬襲燕觀古玩翻帥讀曰率騎奇寄翻又命驍騎將軍延普幽州刺史尉諾自幽州引兵趨遼西為之聲勢魏書官氏志内入諸姓可地延氏為延氏驍堅堯翻西方尉遲氏後改為尉氏尉音鬱嗣屯突門嶺以待之道生等拔乙連城進攻和龍與燕單于右輔古泥戰破之義熈七年跋置單于四輔單音蟬殺其將皇甫規將即亮翻燕王跋嬰城自守魏人攻之不克掠其民萬餘家而還還從宣翻又如字六月太尉裕始受相國宋公九錫之命十二年命下至是乃受赦國中殊死以下崇繼母蘭陵蕭氏為太妃以太尉軍諮祭酒孔靖為宋國尚書令左長史王𢎞為僕射領選選須絹翻從事中郎傅亮蔡廓皆為侍中謝晦為右衛將軍右長史鄭鮮之為奉常行參軍殷景仁為祕書郎其餘百官悉依天朝之制朝直遙翻下同靖辭不受亮咸之孫傳咸仕于武帝之間以直顯廓謨之曾孫蔡謨歴事成康穆三朝出藩入輔皆有聲績鮮之渾之𤣥孫鄭渾見六十六卷漢獻帝建安十七年景仁融之曾孫也殷融見九十四卷成帝咸和三年景仁學不為文敏有思致思相吏翻口不談義深達理體至於國典朝儀舊章記注莫不撰録撰士免翻識者知其有當世之志魏天部大人白馬文貞公崔宏疾篤去年魏置天地四方六部大人魏主遣侍臣問病一夜數返及卒詔羣臣及附國渠帥皆㑹葬渠大也卒子恤翻帥所類翻秋七月戊午魏主嗣至平城九月甲寅魏人命諸州調民租戸五十石積於定相冀三州魏主珪天興四年置相州于鄴領魏陽平廣平汲郡東郡頓丘濮陽清河等郡冀州所領止長樂渤海武邑章武樂陵而已調徒弔翻相息亮翻河西王䝉遜復引兵伐涼復扶又翻下復歸同涼公歆將拒之左長史張體順固諫乃止䝉遜芟其秋稼而還芟所銜翻歆遣使來告襲位冬十月以歆為都督七郡諸軍事鎮西大將軍酒泉公都督燉煌酒泉晉興建康涼興及歆父暠所置㑹稽廣夏凡七縣姚艾叛秦降河西王䝉遜姚艾稱藩於乞伏事見上年降戸江翻䝉遜引兵迎之艾叔父雋言於衆曰秦王寛仁有雅度自可安居事之何為從河西王西遷衆咸以為然乃相與逐艾推雋為主復歸於秦秦王熾磐徴雋為侍中中書監賜爵隴西公以左丞相曇達為都督洮罕以東諸軍事征東大將軍秦州牧鎮南安洮罕謂臨洮抱罕也曇徒含翻洮土刀翻劉義真年少少詩照翻賜與左右無節王脩每裁抑之左右皆怨譛脩於義真曰王鎮惡欲反故沈田子殺之脩殺田子是亦欲反也義真信之使左右劉乞等殺脩脩既死人情離駭莫相統壹義真悉召外軍入長安外軍謂屯蒲阪以捍魏屯渭北以捍夏之軍也閉門拒守闗中郡縣悉降於夏赫連璝夜襲長安不克降戸江翻璝古回翻夏王勃勃進據咸陽長安樵采路絶宋公裕聞之使輔國將軍蒯恩如長安召義真東歸蒯苦怪翻以相國右司馬朱齡石為都督闗中諸軍事右將軍雍州刺史代鎮長安晉先置雍州於㐮陽此為北雍州雍於用翻裕謂齡石曰卿至可勅義真輕裝速發既出闗然可徐行然下當有後字若闗右必不可守可與義真俱歸又命中書侍即朱超石慰勞河洛勞力到翻十一月齡石至長安義真將士貪縱大掠而東將即亮翻多載寳貨子女方軌徐行雍州别駕韋華犇夏韋華本姚氏臣也裕用為雍州别駕赫連璝帥衆三萬追義真建威將軍傅𢎞之曰公處分亟進今多將輜重帥讀曰率處昌吕翻分扶問翻重直用翻一日行不過十里虜追騎且至騎竒寄翻下同何以待之宜棄車輕行乃可以免義真不従俄而夏兵大至傅𢎞之蒯恩㫁後㫁丁管翻力戰連日至青泥晉兵大敗𢎞之恩皆為王買徳所禽買徳先屯青泥故二將為所邀而見禽司馬毛脩之與義真相失亦為夏兵所禽義真行在前㑹日暮夏兵不窮追故得免左右盡散獨逃草中中兵參軍段宏單騎追尋縁道呼之義真識其聲出就之曰君非段中兵邪身在此行矣晉人多自稱為身必不兩全可刎身頭以南使家公望絶魏晉之間凡人子者稱其父曰家公人稱之曰尊公刎扶粉翻宏泣曰死生共之下官不忍乃束義真於背單馬而歸義真謂宏曰今日之事誠無算畧然丈夫不經此何以知艱難夏王勃勃欲降傅𢎞之降戸江翻𢎞之不屈勃勃裸之𢎞之呌罵而死裸郎果翻勃勃積人頭為京觀號曰髑髏臺觀古玩翻髑徒谷翻髏洛侯翻長安百姓逐朱齡石齡石焚其宫殿犇潼關義真既大掠長安而歸長安之人固仇視晉人也齡石奉宋公之命與義真俱歸可矣癡坐長安以待逐何歟勃勃入長安大饗將士舉觴謂王買徳曰卿往日之言一朞而驗可謂算無遺策此觴所集非卿而誰以買徳為都官尚書封河陽侯龍驤將軍王敬先戍曹公壘曹公壘在潼關曹操伐韓馬所築也驤思將翻齡石往從之朱超石至蒲阪聞齡石所在亦往從之赫連昌攻敬先壘㫁其水道㫁丁管翻衆渴不能戰城且陷齡石謂超石曰弟兄俱死異域使老親何以為心爾求間道亡歸間古莧翻我死此無恨矣超石持兄泣曰人誰不死寧忍今日辭兄去乎遂與敬先及右軍參軍劉欽之皆被執送長安勃勃殺之被皮義翻欽之弟秀之悲泣不歡燕者十年欽之穆之之従兄子也従才用翻宋公裕聞青泥敗未知義真存亡刻日北伐使裕能復北伐則聞青泥之敗當投袂而起矣何待刻日乎英雄所為固非常人所測識也侍中謝晦諫以士卒疲弊請俟他年不從晦請俟他年亦裕所謂識機變者也鄭鮮之之言則異於是鄭鮮之上表以為虜聞殿下親征必併力守潼闗徑往攻之恐未易可克易以䜴翻若輿駕頓洛則不足上勞聖躬且虜雖得志不敢乗勝過陜者猶攝服大威陜失冉翻攝讀曰懾為將來之慮故也若造洛而反虜必更有揣量之心或益生邊患造七到翻揣初委翻量音良况大軍逺出後患甚多昔歳西征劉鍾狼狽謂十一年盜襲冶亭時也去年北討廣州傾覆謂徐道期陷廣州也既往之效後來之鑒也今諸州大水民食寡乏三呉羣盜攻没諸縣皆由困於征役故也江南士庶引領顒顒顒魚容翻以望殿下之返斾聞更北出不測淺深之謀往還之期臣恐返顧之憂更在腹心也若慮西虜更為河洛之患者宜結好北虜北虜親則河南安北虜魏也好呼到翻河南安則濟泗静矣濟子禮翻㑹得段宏啓知義真得免裕乃止但登城北望慨然流涕而已降義真為建威將軍司州刺史以段宏為宋臺黄門郎領太子右衛率率所律翻裕以天水太守毛徳祖為河東太守代劉遵考守蒲阪裕雖知徳祖善守而用之然人心已搖宜其不能固也為下徳祖棄蒲阪張本夏王勃勃築壇於灞上即皇帝位改元武昌西秦王熾磐東巡十二月徙上邽民五千餘户于枹罕枹音膚彗星出天津入太㣲經北斗絡紫㣲晉書天文志曰箕四星一曰天津又曰天漢經尾箕之間謂之漢津太㣲天子庭也在北斗南紫㣲十五星在北斗北彗祥歳翻八十餘日而滅魏主嗣復召諸儒復扶又翻術士問之曰今四海分裂災咎之應果在何國朕甚畏之卿輩盡言勿有所隱衆推崔浩使對浩曰夫災異之興皆象人事人茍無舋又何畏焉舋許覲翻昔王莽將簒漢彗星出入正與今同漢書天文志曰哀帝建平二年彗星出牽牛七十餘日傳曰彗者所以除舊布新牽牛日月五星所従起三正之始彗而出之改更之象也其後卒有王莽簒國之禍國家主尊臣卑民無異望晉室陵夷危亡不逺彗之為異其劉裕將簒之應乎衆無以易其言宋公裕以䜟云昌明之後尚有二帝晉書帝紀曰初簡文帝見䜟云晉祚盡昌明及孝武帝之在孕也李太后夢神人謂之曰汝生男以昌明為字及産東方始明因以為名簡文後悟乃流涕又曰䜟云昌明之後有二帝裕乃使縊帝而立恭帝以應二帝云䜟楚讚翻乃使中書侍即王韶之與帝左右密謀酖帝而立琅邪王徳文徳文常在帝左右飲食寢處未嘗暫離處昌吕翻離力智翻韶之伺之經時不得間㑹徳文有疾出居於外戊寅韶之以散衣縊帝於東堂年三十七伺相吏翻間古莧翻散悉亶翻縊於賜翻又於計翻韶之廙之曾孫也廙王敦之従弟廙羊至翻又逸職翻裕因稱遺詔奉徳文即皇帝位大赦是歳河西王䝉遜奉表稱藩拜涼州刺史尚書右僕射袁湛卒恭皇帝諱徳文字徳文安帝母弟也諡法尊賢貴義敬事供上尊賢敬讓愛民長弟執禮御賓芘親之闕皆曰恭長弟謂順長接弟御賓迎待賓也元熈元年春正月壬戌朔改元立琅邪王妃褚氏為皇后后裒之曾孫也褚裒崇徳太后之父裒蒲侯翻魏主嗣畋于犢渚據北史犢渚在柞山西臨河甲午徴宋公裕入朝朝直遙翻進爵為王裕辭癸夘魏主嗣還平城庚申葬安皇帝于休平陵刺劉道憐司空出鎮京口刺者敕字之誤也司空之上又當逸以字夏將叱奴侯提帥步騎二萬攻毛徳祖於蒲阪將即亮翻帥讀曰率騎竒寄翻阪音反徳祖不能禦全軍歸彭城二月宋公裕以徳祖為滎陽太守戍虎牢宋白曰虎牢古東虢國春秋為鄭之制邑漢為成臯縣穆天子傳天子獵于鄭有虎在葭中匕萃之士禽之以獻命畜之東虢號曰虎牢後為成臯縣北臨黄河後漢為成臯關後魏為東中郎將府唐為汜水縣夏主勃勃徴隠士京兆韋祖思祖思既至恭懼過甚勃勃怒曰我以國士徴汝汝乃以非類遇我汝昔不拜姚興今何獨拜我我在汝猶不以我為帝王我死汝曹弄筆當置我於何地邪遂殺之勃勃之殺祖思虐矣然祖思之恭懼過甚勃勃以為薄已而殺之則勃勃為有見而祖思為無所守也羣臣請都長安勃勃曰朕豈不知長安歴世帝王之都沃饒險固然晉人僻逺終不能為吾患魏與我風俗略同土壤鄰接自統萬距魏境裁百餘里朕在長安統萬必危若在統萬魏必不敢濟河而西諸卿適未見此耳皆曰非所及也使勃勃常在猶云可也勃勃死則統萬為魏有古人所以貽厥子孫者固有道也乃於長安置南臺以赫連璝領大將軍雍州牧録南臺尚書事璝工回翻雍於用翻勃勃還統萬大赦改元真興勃勃性驕虐視民如草芥常居城上置弓劒於側有所嫌忿手自殺之羣臣迕視者鑿其目索隠曰迕者逆也迕五故翻笑者決其脣諌者先截其舌而後斬之初司馬楚之奉其父榮期之喪歸建康榮期死見一百一十四卷安帝義熈二年㑹宋公裕誅翦宗室之有才望者楚之叔父宣期兄貞之皆死楚之亡匿竟陵蠻中及從祖休之自江陵犇秦休之宣帝弟魏中郎進之六世孫楚之宣帝弟太常馗之八世孫故休之於楚之為從祖休之犇秦見上卷義熈十一年從才用翻楚之亡之汝潁間聚衆以謀復讎楚之少有英氣能折節下士少詩照翻折而設翻下遐稼翻有衆萬餘屯據長社裕使刺客沐謙往刺之沐莫卜翻姓也風俗通漢有東平太守沐寵蜀本作沐音述非也楚之待謙甚厚謙欲發未得間乃夜稱疾知楚之必往問疾因欲刺之間古莧翻刺七亦翻楚之果自齎湯藥往視疾情意勤篤謙不忍發乃出匕首於席下以狀告之曰將軍深為劉裕所忌願勿輕率以自保全遂委身事之為之防衛王鎮惡之死也沈田子殺其兄弟七人唯弟康得免逃就宋公裕于彭城裕以為相國行參軍晉制諸公府置諸曹參軍又有正参軍行参軍長兼行参軍等貟康求還洛陽視母㑹長安不守康糾合闗中徙民得百許人驅帥僑戸七百餘家共保金墉城帥讀曰率下同時宗室多逃亡在河南有司馬文榮者帥乞活千餘戸屯金墉城南惠帝時并州饑荒其吏民隨東燕王騰東下號曰乞活是後流徙逐糧者亦曰乞活又有司馬道恭自東垣帥三千人屯城西按魏收地形志洛州新安郡有東垣縣注云二漢晉屬河東後屬參攷漢晉志河東郡有垣縣無東垣孝武太元十一年馮該撃斬苻丕於東垣此時已有東垣之名宋白曰宋武入洛更置東垣西垣二縣新唐書地理志河南府新安縣髙祖武徳初析置東垣縣則知東垣在新安界司馬順明帥五千人屯陵雲臺司馬楚之屯柏谷塢魏河内鎮將于栗磾遊騎在芒山上將即亮翻磾丁奚翻騎竒寄翻攻逼交至康堅守六旬裕以康為河東太守遣兵救之平等皆散走詳考上文未知平等為何人康勸課農桑百姓甚親賴之司馬順明司馬道恭及平陽太守薛辯皆降於魏降戸江翻下同魏以辯為河東太守以拒夏人夏四月秦征西將軍孔子帥騎五千討吐谷渾覔地於弱水南孔子亦乞伏氏也禹貢導弱水至于合黎餘波入于流涉地志云弱水出刪丹縣亦謂之張掖河合黎在酒泉㑹水縣東北流沙張掖居延縣東北之居延澤是也曾氏曰弱水出窮谷大破之覔地帥其衆六千降於秦拜弱水䕶軍庚辰魏主嗣有事於東廟古制左祖右社魏建宗廟於平城宫之東因曰東廟杜佑曰明元永興四年立太祖道武廟於白登山歳一祭無常月又於白登西大祖舊遊之處立昭成獻明太祖廟常以九月十月之交親祀焉則東廟者白登山廟也以山西又有廟故以此為東廟助祭者數百國辛巳南巡至雁門五月庚寅朔魏主嗣觀漁于灅水己亥還平城灅力水翻涼公歆用刑過嚴又好治宫室好呼到翻治直之翻從事中郎張顯上疏以為涼土三分謂李氏沮渠乞伏也勢不支久兼并之本在於務農懐逺之略莫如寛簡今入歳已來隂陽失序風雨乖和是宜減膳徹懸古者天子膳用六牲具馬牛羊犬豕雞諸侯膳用三牲懸樂懸也天子宫懸諸侯軒懸大荒大札天地有烖國有大故則減膳徹樂穀梁傳曰五穀不升為天饑一穀不升謂之嗛二穀不升謂之饑三穀不升謂之饉四穀不升謂之康五穀不升謂之大侵大侵之禮君食不兼味臺榭不塗弛侯廷道不除百官布而不祭鬼神禱而不祀白虎通曰一穀不升徹鶉鷃二榖不升徹鳬雁三穀不升徹雉兎四穀不升損囿獸五穀不升不偹三牲側身修道而更繁刑峻法繕築不止殆非所以致興隆也昔文王以百里而興二世以四海而滅周文王興於岐周地方百里秦二世承始皇之後奄有四海卒以滅亡前車之軌得失昭然太祖以神聖之姿為西夏所推左取酒泉右開西域李暠廟號大祖為西夏所推事見一百一十二卷安帝隆安四年取酒泉見五年開西域亦見四年夏戸雅翻殿下不能奉承遺志混壹涼土侔蹤張后張后謂張軌及其子若孫也將何以下見先王乎沮渠䝉遜西土之傑内修政事外禮英賢攻戰之際身均士卒百姓懐之樂為之用沮子余翻樂音洛臣謂殿下非但不能平殄䝉遜亦懼䝉遜方為社稷之憂歆覽之不悦主簿汜稱上疏諫曰汜音凡天之子愛人主殷勤至矣故政之不修下災異以戒告之改者雖危必昌不改者雖安必亡元年三月癸夘敦煌謙徳堂陷張駿據河西起謙光殿于姑臧自謂專制一方而事晉不改臣節雖謙而光也李暠得敦煌亦稱藩於晉起謙徳堂其志猶張氏也敦煌徒門翻八月效穀地裂二年元日昏霧四塞四月日赤無光二旬乃復十一月狐上南門今茲春夏地頻五震六月隕星于建康臣雖學不稽古行年五十有九請為殿下畧言耳目之所聞見不復能逺論書傳之事也塞悉則翻上時掌翻為于偽翻不復扶又翻傳直戀翻乃者咸安之初西平地裂狐入謙光殿前俄而秦師奄至城都不守咸安簡文帝年號涼土以姑臧為都城孝武太元元年秦入姑臧葢地裂狐入在咸安之初而其應在太元之初也梁熈既為涼州不撫百姓專為聚斂斂力贍翻建元十九年姑臧南門崩隕石於閑豫堂明年為吕光所殺大元元年秦主堅建元之十二年也堅以梁熈鎮涼州建元十九年堅敗於淮南晉太元之八年也明年吕光殺梁熈段業稱制此方三年之中地震五十餘所既而先王龍興於瓜州瓜州敦煌郡也攷之晉志張氏置沙州于敦煌未嘗置𤓰州又攷之唐志沙州敦煌郡本瓜州武徳五年曰西沙州貞觀七年曰沙州𤓰州晉昌郡武徳五年析沙州之常樂置盖李暠興于敦煌自稱秦涼二州牧其後遷于酒泉以敦煌為𤓰州至唐復以敦煌為沙州以晉昌為瓜州而𤓰州分為二州矣䝉遜簒弑於張掖此皆目前之成事殿下所明知也效穀先王鴻漸之地暠自效穀令得敦煌遂有七郡故云然易所謂鴻漸者鴻水鳥也自水而漸于干又漸于磐又漸于陸又漸于木自下而進漸升而上也謙徳即尊之室基陷地裂大凶之徴也日者太陽之精中國之象赤而無光中國將衰諺曰諺音彦野獸入家主人將去狐上南門亦變異之大者也今變夷益盛中國益㣲願殿下亟罷宫室之役止逰畋之娛延禮英俊愛養百姓以應天變防未然歆不從秋七月宋公裕始受進爵之命八月移鎮夀陽以度支尚書劉懐慎為督淮北諸軍事徐州刺史鎮彭城曹魏文帝置度支尚書掌軍國支計晉因之度徒洛翻辛未魏主嗣東巡甲申還平城九月宋王裕自解揚州牧秦左衛將軍匹達等將兵討彭利和于漒川大破之利和單騎奔仇池獲其妻子徙羌豪三千戸于枹罕漒川羌三萬餘尸皆安堵如故冬十月以尚書右僕射王松夀為益州刺史鎮漒川漒其良翻騎奇寄翻枹音膚宋王裕以河南蕭條乙酉徙司州刺史義真為揚州刺史鎮石頭蕭太妃謂裕曰道憐汝布衣兄弟宜用為揚州裕曰寄奴於道憐豈有所惜裕小字寄奴道憐蕭太妃所生也揚州根本所寄事務至多非道憐所了太妃曰道憐年出五十豈不如汝十歳兒邪裕曰義真雖為刺史事無大小悉由寄奴道憐年長不親其事於聽望不足聽望猶言觀聽也長知兩翻太妃乃無言道憐性愚鄙而貪縱故裕不肯用十一月丁亥朔日有食之十二月癸亥魏主嗣西巡至雲中從君子津西渡河大獵於薛林山按魏書帝紀薛林山在屋竇城西辛夘宋王裕加殊禮進王太妃為太后世子為太子資治通鑑卷一百十八
