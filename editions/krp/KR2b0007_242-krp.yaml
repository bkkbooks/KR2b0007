front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷二百四十二宋司馬光撰胡三省音註唐紀五十八起重光赤奮若七月盡𤣥黓攝提格凡一年有竒穆宗睿聖文惠孝皇帝中長慶元年秋七月甲辰韋雍出逢小將策馬衝其前導雍命曳下欲於街中杖之河朔軍士不貫受杖不服韋雍欲以栁公綽治京兆之體治豳燕然公綽行之則可肅清輦轂韋雍行之則召禍興戎所居之地不同也貫讀曰慣雍以白𢎞靖𢎞靖命軍虞侯繫治之治直之翻是夕士卒連營呼譟作亂將校不能制遂入府舍掠𢎞靖貨財婦女囚𢎞靖於薊門館薊門館幽州驛館也殺幕僚韋雍張宗元考異曰舊傳作張宗厚今従實録崔仲卿鄭塤塤許元翻都虞侯劉操押牙張抱元明日軍士稍稍自悔悉詣館謝𢎞靖請改心事之凡三請𢎞靖不應軍士乃相謂曰相公無言是不赦吾曹軍中豈可一日無帥乃相與迎舊將朱洄奉以為留後帥所類翻將即亮翻洄克融之父也時以疾廢臥家自辭老病請使克融為之衆從之或問當亂軍相率詣館謝𢎞靖之時𢎞靖若能以任迪簡行於中山者行之可以弭亂乎曰否迪簡能與其下同甘苦𢎞靖驕貴簡黙𢎞靖婦女為兵所掠僚佐為兵所殺使燕人果能改心以事𢎞靖亦徒建節帥空名於悍将兇卒之上耳悍兇慿陵無所不至祗重辱而已衆以判官張徹長者不殺徹罵曰汝何敢反行且族滅衆共殺之靖考異曰實録徹到職纔數日軍人不之殺與𢎞同館處之後數日軍人恐徹與𢎞靖為謀将移之他所徹自疑就戮因抗聲大罵復遇害舊傳曰續有張徹者自逺使迴軍人以其無過不欲加害将引置館中徹不知其心遂索𢎞靖所在大罵軍人亦為亂兵所殺韓愈徹墓誌曰徹累官至范陽府監察御史長慶二年今牛宰相為中丞奏君為御史其府惜不敢留遣之而密奏臣始至孤怯須彊佐乃濟𤼵半道有詔以君還之至數日軍亂怨其府従事盡殺之而囚其帥且相約張御史長者無庸殺置之帥所居月餘聞有中貴人自京師至君謂其帥公無負此土人上使至可因請見自辯幸得脱免歸即推門求出守者以告其魁魁與其徒皆駭曰張御史忠義必為其帥告此餘人不如遷之别館即以衆出君君出門罵衆曰汝何敢反前日吳元濟斬東市昨日李師道斬於軍中同惡者父母妻子皆屠死肉餧狗䑕鴟鵶汝何敢反行且罵衆畏惡其言不忍聞且虞生變即撃君以死君抵死口不絶罵衆皆曰義士義士或收瘞之以俟據舊傳徹以𢎞靖囚時被殺實録云後數日墓誌云居月餘三書各不同按此月丁巳𢎞靖已貶官月餘則離幽州今従實録參以墓誌余謂韓愈墓誌能紀張徹所以罵賊之言實録及舊傳能原張徹所以罵賊之心若其月日則考異已有所去取矣壬子羣臣上尊號曰文武孝徳皇帝赦天下甲寅幽州監軍奏軍亂丁巳貶張𢎞靖為賔客分司貶為太子賔客分司東都也己未再貶吉州刺史刺考異曰舊傳貶撫州史按明年乃改撫州今従實録庚申以昭義節度使劉悟為盧龍節度使悟以朱克融方彊奏請且授克融節鉞徐圖之乃復以悟為昭義節度使辛酉太和公主𤼵長安初田𢎞正受詔鎮成徳自以久與鎮人戰有父兄之仇憲宗之世田𢎞正兩出兵攻鎮冀乃以魏兵二千從赴鎮因留以自衛奏請度支供其糧賜舊制諸鎮兵出境度支給其衣糧户部侍郎判度支崔倰性剛褊無逺慮倰力曽翻以為魏鎮各自有兵恐開事例不肯給𢎞正四上表不報不得已遣魏兵歸七考異曰舊𢎞正傳月歸卒於魏州王庭湊傳云六月魏兵還鎮崔倰傳曰遣魏卒還鎮不數日而鎮州亂今従之倰沔之孫也崔沔開元初名臣𢎞正厚於骨肉兄弟子姪在兩都者數十人競為侈靡𢎞正兄弟子姪皆仕於朝分居東西兩都日費約二十萬𢎞正輦魏鎮之貨以供之相屬於道屬之欲翻河北將士頗不平詔以錢百萬緡賜成徳軍度支輦運不時至軍士益不悦都知兵馬使王庭湊本回鶻阿布思之種也庭湊曽祖五哥之驍果善鬭王武俊養以為子故冒姓王氏阿布思者天寳中以反誅種章勇翻性果悍隂狡悍下罕翻又侯旰翻潜謀作亂每抉其細故以激怒之抉一決翻挑也尚以魏兵故不敢發及魏兵去壬戌夜庭湊結牙兵譟於府署殺𢎞正及僚佐元從將吏并家屬三百餘人従才用翻下再従同廷湊自稱留後逼監軍宋惟澄奏求節鉞八月癸巳惟澄以聞朝廷震駭崔倰於崔植為再從兄故時人莫敢言其罪初朝廷易置魏鎮帥臣左金吾將軍楊元卿上言以為非便又詣宰相深陳利害及鎮州亂上賜元卿白玉帶辛未以元卿為涇原節度使楊元卿以言驗受賞然無救於鎮州之亂者古之明君不徒賞言者而已其言可行必先従而行之瀛莫將士家屬多在幽州壬申莫州都虞侯張良佐潜引朱克融兵入城刺史吳暉不知所在莫州北接幽薊故先䧟癸酉王庭湊遣人殺冀州刺史王進岌分兵據其州魏博節度使李愬聞田𢎞正遇害素服令將士曰魏人所以得通聖化至今安寧富樂者樂音洛田公之力也今鎮人不道輒敢害之是輕魏以為無人也諸君受田公恩宜如何報之衆皆慟哭深州刺史牛元翼成徳良將也愬使以寳劒玉帶遺之遺唯季翻曰昔吾先人以此劒立大勲謂平朱泚也吾又以之平蔡州今以授公努力翦庭湊元翼以劒帶徇于軍報曰願盡死愬將出兵㑹疾作不果元翼趙州人也乙亥起復前涇原節度使田布為魏博節度使令乗驛之鎮布固辭不獲與妻子賔客訣曰吾不還矣悉屏去旌節導從而行屏必郢翻又卑正翻從才用翻未至魏州三十里被髮徒跣號哭而入居于堊室被皮義翻號户刀翻堊遏各翻白埴也按間傳父母之喪居倚廬齊衰之喪居堊室扎穎達正義曰斬衰居倚廬齊衰居堊室論其正耳亦有斬衰不居倚廬者則雜記云大夫居倚廬士居堊室是士服斬衰而居堊室田布父為鎮人所殺寢苫枕戈之時也今居堊室蓋用士禮也月俸千緡一無所取賣舊産得錢十餘萬緡皆以頒士卒舊將老者兄事之以田布所為宜可以得魏卒之心而卒不濟者人心已揺而布之威略不振也丙子瀛州軍亂執觀察使盧士玫及監軍僚佐送幽州囚於客館王庭湊遣其將王立攻深州不克丁丑詔魏博横海昭義河東義武諸軍各出兵臨成徳之境若王庭湊執迷不復宜即進討成徳大將王儉等五人謀殺王庭湊事泄并部兵三千人皆死己卯以深州刺史牛元翼為深冀節度使深州南至冀州八十五里丁亥以殿中侍御史温造為起居舍人充鎮州四面諸軍宣慰使歴澤潞河東魏博横海深冀易定等道諭以軍期造大雅之五世孫也髙祖起兵温大雅掌書翰己丑以裴度為幽鎮兩道招撫使癸巳王庭湊引幽州兵圍深州九月乙巳相州軍亂殺刺史邢濋濋音楚吐蕃遣其禮部尚書論訥羅來求盟庚戌以大理卿劉元鼎為吐蕃㑹盟使壬子朱克融焚掠易州淶水遂城滿城淶水漢涿郡遒縣地隋開皇元年以范陽為遒更置范陽縣於此地六年改范陽曰固安八年廢十年又置永陽縣十八年又改為淶水周官職方其浸淶易蓋因淶水以名縣也淶音來遂城漢北新城縣地屬中山國後魏置南營州於其地置五郡十都後省併為昌黎一郡領永樂新昌二縣隋廢郡因舊有武遂縣置遂城縣唐屬易州宋以遂城縣置威虜軍金以縣置遂州以滿城縣屬保州自定兩税以來定兩税見二百二十六卷徳宗建中元年錢日重物日輕民所輸三倍其初詔百官議革其弊户部尚書楊於陵以為錢者所以權百貨貿遷有無所宜流散貿音茂流散謂錢流布於天下不應蓄聚今税百姓錢藏之公府又開元中天下鑄錢七十餘爐嵗入百萬新志云天寳末天下罏九十九絳州三十楊潤宣鄂蔚皆十益郴皆五洋州三定州一蓋天寳末又加多於開元矣今纔十餘爐嵗入十五萬又積於商賈之室賈音古及流入四夷又大厯以前淄青太原魏博貿易雜用鉛鐵嶺南雜用金銀丹砂象齒今一用錢如此則錢焉得不重物焉得不輕焉於䖍翻今宜使天下輸税課者皆用穀帛廣鑄錢而禁滯積積子賜翻及出塞者錢出邊闗則流入於夷狄則錢日滋矣朝廷從之始令兩税皆輸布絲纊獨鹽酒課用錢冬十月丙寅以鹽鐵轉運使刑部尚書王播為中書侍郎同平章事使職如故播為相專以承迎為事未嘗言國家安危以裴度為鎮州四面行營都招討使左領軍大將軍杜叔良以善事權倖得進時幽鎮兵勢方盛諸道兵未敢進上欲功速成宦官薦叔良以為深州諸道行營節度使為杜叔良喪師張本以牛元翼為成徳節度使癸酉命宰相及大臣凡十七人與吐蕃論訥羅盟于城西遣劉元鼎與訥羅入吐蕃亦與其宰相以下盟吐蕃國有大相副相史因亦以宰相書之乙亥以沂州刺史王智興為武寧節度副使先是副使皆以文吏為之先悉薦翻上聞智興有勇略欲用之於河北故以是寵之為王智興逐其帥崔羣張本丁丑裴度自將兵出承天軍故闗以討王庭湊承天軍當在遼州界故闗即孃子闗也宋朝廢遼州以平城和順二縣為鎮以并州之樂平平定二縣為平定軍二鎮屬焉以承天軍為寨屬平定縣平定唐之廣陽縣也按沈存中筆談鎮州通河東有兩路飛狐路在大茂山之西大茂山恒山之岑也自銀治寨北出倒馬闗却自石門子今水鋪入缾形梅回兩寨之間至代州自石晉割地與契丹以大茂山分脊為界此路已不通惟北寨西出承天闗路可至河東然路極峭峽宋白曰承天軍太原東鄙土門路所衝也朱克融遣兵冦蔚州媯州西南至蔚州二百四十里蔚紆勿翻戊寅王庭湊遣兵冦貝州己卯易州刺史柳公濟敗幽州兵於白石嶺敗補邁翻殺千餘人庚辰横海軍節度使烏重􅏷奏敗成徳兵於饒陽辛巳魏博節度使田布將全軍三萬人討王庭湊屯於南宫之南拔其二柵翰林學士元稹與知樞密魏𢎞簡深相結求為宰相由是有寵於上毎事咨訪焉元稹交結大閹變其素守憲宗之過也稹止忍翻稹無怨於裴度但以度先達重望恐其復有功大用復扶人翻妨已進取故度所奏畫軍事多與𢎞簡從中沮壞之度乃上表極陳其朋比姦蠧之狀沮在吕翻瓌音怪比毗至翻以為逆豎搆亂震驚山東逆豎指王庭湊等姦臣作朋撓敗國政姦臣指元稹等撓奴教翻敗補邁翻屈也陛下欲掃蕩幽鎮先宜肅清朝廷何者為患有大小議事有先後河朔逆賊祗亂山東禁闈姧臣必亂天下是則河朔患小禁闈患大小者臣與諸將必能翦滅大者非陛下覺悟制斷無以驅除斷丁亂翻今文武百寮中外萬品有心者無不憤忿憤懣也忿怒也有口者無不咨嗟直以奬用方深不敢抵觸恐事未行而禍已及不為國計且為身謀臣自兵興以來所陳章疏事皆要切所奉書詔多有參差參楚簮翻差楚宜翻參差不齊也䝉陛下委付之意不輕遭姧臣抑損之事不少臣素與佞倖亦無讐嫌正以臣前請乗傳詣闕面陳軍事傳株戀翻乗傳乗驛馬也姦臣最所畏憚恐臣𤼵其過百計止臣臣又請與諸軍齊進隨便攻討姦臣恐臣或有成功曲加阻礙逗遛日時進退皆受羈牽羈馬絡頭也牽牛紖也諭以牛馬動為人所制意見悉遭蔽塞塞悉則翻但欲令臣失所使臣無成則天下理亂山東勝負悉不顧矣為臣事君一至于此若朝中姦臣盡去則河朔逆賊不討自平若朝中姦臣尚存則逆賊縱平無益陛下儻未信臣言乞出臣表使百官集議彼不受責臣當伏辜表三上上時掌翻上雖不悦以度大臣不得已癸未以𢎞簡為弓箭庫使稹為工部侍郎稹雖解翰林恩遇如故為相稹及于方張本宿州刺史李直臣坐贓當死宦官受其賂為之請為于偽翻御史中丞牛僧孺固請誅之上曰直臣有才可惜僧孺對曰彼不才者無過温衣飽食以足妻子安足慮本設法令所以擒制有才之人安禄山朱泚皆才過於人法不能制者也上從之横海節度使烏重􅏷將全軍救深州時王庭湊圍牛元翼於深州諸軍倚重􅏷獨當幽鎮東南横海當鎮州之東幽州之南重􅏷宿將知賊未可破按兵觀釁上怒以杜叔良為横海節度使徙重􅏷為山南西道節度使靈武節度使李進誠奏敗吐蕃三千騎於大石山下敗補邁翻大石山在魯州東南魯州六胡州之一也在靈夏西河曲之地十一月辛酉淄青節度使薛平奏突將馬廷崟作亂伏誅崟魚音翻時幽鎮兵攻棣州平遣大將李叔佐將兵救之刺史王稷供饋稍薄軍士怨怒宵潰推廷崟為主行且收兵至七千餘人徑逼青州城中兵少不敵平悉𤼵府庫及家財召募得精兵二千人逆戰大破之斬廷崟其黨死者數千人記考異曰河南曰韓國公之節制青州也長慶元年詔徴數道兵馬且問罪於常山平盧𤼵二千餘人駐于無棣臨當回戈青州所駐兵部内隊長有馬士端者殺其首領遂驅所部士卒兼招召迫脅比到博昌已萬餘人便謀入青州有日矣韓公聞之便議除討大将等進計曰彼賊者兇頑一卒無經逺之謀可令紿以尚書已赴闕庭三軍将吏皆延頸以待留後賊必信之懈然無備可伏甲而虜之韓公大然其策於是賊心不復疑貳翌日引兵而來遂於城北三十餘里三面伏兵賊衆果陷於我圍信旗一麾步騎雲合賊衆驚擾不知所為悉皆降伏遂令投戈釋甲驅入青州矯令還家待以不死遂條其數目明立簿書三千二千各屯一處霜刀齊𤼵蟻衆湯消二萬餘人同命一日賊帥馬士端潰圍奔走尋於鄒平渡口追獲磔於城北於是具列其狀以上聞旋除左僕射據實録作馬廷崟舊傳作馬狼兒河南記作馬士端今名従實録事従舊傳明年二月平加僕射舊傳云封魏國公河南記作韓公恐誤横海節度使杜叔良將諸道兵與鎮人戰遇敵輒北鎮人知其無勇常先犯之十二月庚午監軍謝良通奏叔良大敗於博野博野漢涿郡蠡吾縣之地後漢分置博陵縣後魏改為博野唐屬深州宋為永寜軍治所宋白曰雍熙四年於博野縣置寧邊軍失亡七千餘人叔良脱身還營喪其旌節喪息浪翻丁丑義武節度使陳楚奏敗朱克融兵於望都及北平望都漢縣屬中山郡張晏曰都山在縣南堯母慶都所居堯山在縣北登堯山望見都山故以望都為名北齊併望都入北平唐武徳四年復置望都縣屬定州九域志縣在州東北六十里北平亦漢古縣唐屬定州九域志在州北九十里宋白曰定州北平縣漢曲逆縣地後漢改蒲隂後魏孝昌中於今縣東北二十里置北平郡於北平城唐為北平縣按漢志北平縣屬中山國敗補邁翻斬獲萬餘人戊寅以鳳翔節度使李光顔為忠武節度使兼深州行營節度使代杜叔良自憲宗征伐四方國用已虚上即位賞賜左右及宿衛諸軍無節及幽鎮用兵久無功府藏空竭勢不能支藏徂浪翻支持也當也執政乃議王庭湊殺田𢎞正而朱克融全張𢎞靖罪有重輕請赦克融專討庭湊上從之乙酉以朱克融為平盧節度使平盧當作盧龍戊子義武奏破莫州清源等三柵斬獲千餘人柵側革翻二年春正月丁酉幽州兵陷弓髙先是弓髙守備甚嚴弓髙縣宋朝為永静軍地先悉薦翻有中使夜至守將不内旦乃得入中使大詬怒詬許侯翻又古侯翻賊諜知之諜達協翻他日偽遣人為中使投夜至城下守將遽内之賊衆隨之遂陷弓髙史言唐宦者陵轢守禦捍敵之臣使之失守又圍下博中書舍人白居易上言以為自幽鎮逆命朝廷徵諸道兵計十七八萬白考異曰集作七八十萬計無此數恐是十七八萬誤耳四面攻圍已踰半年王師無功賊勢猶盛弓髙既陷糧道不通下博深州飢窮日急深州西南皆逼於王庭湊惟恃弓髙以通横海之餫弓髙既陷糧道遂梗九域志弓髙東至滄州一百二十里西北至深州二百里蓋由節將太衆其心不齊莫肯率先遞相顧望又朝廷賞罰近日不行未立功者或已拜官已敗衂者不聞得罪衂女六翻既無懲勸以至遷延若不改張改張猶更張也董仲舒曰譬如琴瑟不調必改絃而更張之乃可鼔也必無所望請令李光顔將諸道勁兵約三四萬人從東速進開弓髙糧路解深邢重圍深邢當作深州重直龍翻與元翼合勢令裴度將太原全軍兼招討舊職西面壓境壓鎮州之境觀釁而動若乗虛得便即令同力翦除若戰勝賊窮亦許受降納欵降户江翻如此則夾攻以分其力招諭以動其心必未及誅夷自生變故謂賊之麾下将有誅逆而效順者又請詔光顔選諸道兵精鋭者留之其餘不可用者悉遣歸本道自守土疆蓋兵多而不精豈唯虛費衣糧兼恐撓敗軍陳故也撓奴巧翻敗補邁翻陳讀曰陣今既祗留東西二帥謂令裴度居西李光顔居東請各置都監一人諸道監軍一時停罷如此則衆齊令一必有成功又朝廷本用田布令報父讐令報王庭湊殺𢎞正之讐今領全師出界供給度支言仰供給於度支數月已來都不進討非田布固欲如此抑有其由聞魏博一軍屢經優賞自田𢎞正舉魏博一軍歸朝其後代恒平蔡平鄆朝廷犒賞優厚兵驕將富莫肯為用况其軍一月之費計實錢二十八萬緡若更遷延將何供給此尤宜早令退軍者也若兩道止共留兵六萬所費無多兩道謂河東横海既易支持易以豉翻自然豐足今事宜日急其間變故逺不可知茍兵數不抽軍費不減食既不足衆何以安不安之中何事不有况有司迫於供軍百端歛率不許即用度交闕盡許則人心無憀指言将有建中之禍而微其辭憀落蕭翻無憀賴也自古安危皆繫於此伏乞聖慮察而念之疏奏不省白居易之論事李絳之流亞歟顧憲穆有用不用耳省悉景翻己亥度支饋滄州糧車六百乗至下愽盡為成徳軍所掠時諸軍匱乏供軍院所運衣糧往往不得至院此時供軍院置於行營者謂之北供軍院度支自南供軍院運以給之乗繩證翻在塗為諸軍邀奪其懸軍深入者皆凍餒無所得初田布從其父𢎞正在魏善視牙將史憲誠屢稱薦至右職及為節度使遂寄以腹心以為先鋒兵馬使軍中精鋭悉以委之憲誠之先奚人也世為魏將魏與幽鎮本相表裏及幽鎮叛魏人固揺心布以魏兵討鎮軍於南宫上屢遣中使督戰而將士驕惰無鬭志又屬大雪屬之欲翻度支饋運不繼布發六州租賦以供軍魏博貝衛澶相六州也將士不悦曰故事軍出境皆給朝廷言仰給於朝廷也今尚書刮六州肌肉以奉軍雖尚書瘠已肥國六州之人何罪乎憲誠隂蓄異志因衆心不悦離間鼓扇之以衆情諭大火本有熾烈之性鼓鞴以吹之揺扇以扇之則愈熾烈矣間古莧翻㑹有詔分魏博軍與李光顔使救深州庚子布軍大潰多歸憲誠布獨與中軍八千人還魏壬寅至魏州癸卯布復召諸將議出兵復扶又翻諸將益偃蹇曰尚書能行河朔舊事則死生以之謂行田承嗣李寳臣之事也若使復戰則不能也布無如之何歎曰功不成矣即日作遺表具其狀略曰臣觀衆意終負國恩臣既無功敢忘即死即就也伏願陛下速救光顔元翼不然者忠臣義士皆為河朔屠害矣奉表號哭號户刀翻拜授幕僚李石乃入啟父靈孝子之喪其親也設几筵朝夕具盥洗上飲食事之如生俗謂之靈筵抽刀而言曰上以謝君父下以示三軍遂刺心而死刺七亦翻憲誠聞布已死乃諭其衆遵河北故事衆悦擁憲誠還魏奉為留後戊申魏州奏布自殺己酉以憲誠為魏博節度使憲誠雖喜得旄鉞外奉朝廷然内實與幽鎮連結庚戌以徳州刺史王日簡為横海節度使日簡本成徳牙將也壬子貶杜叔良為歸州刺史王庭湊圍牛元翼於深州官軍三面救之裴度以河東軍臨其西李光顔以横每諸軍營其東陳楚以易定軍逼其北是三面救之皆以乏糧不能進雖李光顔亦閉壁自守而已軍士自采薪芻日給不過陳米一勺陳舊也經年之米為陳米勺職略翻又時灼翻周禮梓人為飲器勺一升按一升之勺乃飲器也非以量米凡量十勺為合十合為升十升為斗以量言之則一人日給一勺之陳米有餒死而已作史者蓋極言其匱乏猶武成血流漂杵之語深州圍益急朝廷不得已二月甲子以庭湊為成徳節度使軍中將士官爵皆復其舊以兵部侍郎韓愈為宣慰使上之初即位也兩河略定蕭俛段文昌以為天下已太平漸宜消兵請密詔天下軍鎮有兵處每嵗百人之中限八人逃死或以逃或以死除其籍俛音免上方荒宴不以國事為意遂可其奏軍士落籍者衆皆聚山澤為盜及朱克融王庭湊作亂一呼而亡卒皆集呼火故翻詔徵諸道兵討之諸道兵既少少詩沼翻皆臨時召募烏合之衆又諸節度既有監軍其領偏軍者亦置中使監陳監古銜翻陳讀曰陣主將不得專號令戰小勝則飛驛奏捷自以為功不勝則迫脅主將以罪歸之悉擇軍中驍勇以自衛遣羸懦者就戰故每戰多敗又凡用兵舉動皆自禁中授以方略朝令夕改不知所從不度可否度徒洛翻惟督令速戰中使道路如織驛馬不足掠行人馬以繼之人不敢由驛路行取間道而行由驛路則馬為所掠故也故雖以諸道十五萬之衆裴度元臣宿望烏重𦙍李光顔皆當時名將討幽鎮萬餘之衆屯守踰年竟無成功財竭力盡崔植杜元穎為相皆庸才無逺略史憲誠既逼殺田布朝廷不能討遂并朱克融王庭湊以節授之由是再失河朔迄于唐亡不能復取史極言唐再失河朔之由若以三叛得節之時言之須有先後復扶又翻朱克融既得旌節乃出張𢎞靖及盧士玫去年七月朱克融囚張𢎞靖八月囚盧士玫丙寅以牛元翼為山南東道節度使以左神策行營樂壽鎮兵馬使清河傅良弼為沂州刺史樂夀鎮即置於深州樂夀縣樂音洛以瀛州博野鎮遏使李寰為忻州刺史良弼寰所戍在幽鎮之間朱克融王庭湊互加誘脅良弼寰不従各以其衆堅壁賊竟不能取故賞之誘音酉丙子賜横海節度使王日簡姓名為李全略辛巳中書侍郎同平章事崔植罷為刑部尚書以工部侍郎元稹同平章事翰考異曰實録以御史中丞牛僧孺為户部侍郎林學士李徳裕為御史中丞舊李徳裕傳元和初用兵伐叛始於杜黄裳誅蜀吉甫經畫欲定兩河方欲出師而卒繼之元衡裴度而韋貫之李逢吉沮議深以用兵為非而韋李相次罷相故逢吉常怒吉甫裴度而徳裕於元和時久之不調逢吉僧孺宗閔以私怨恒排擯之時徳裕與李紳元稹俱在翰林以學識才名相類情頗款密逢吉之黨深惡之其月自學士出為御史中丞按徳裕元和中剔歴清要非為不調此際元稹入相逢吉在淮南豈能排擯徳裕蓋出於徳裕黨人之語耳今不取癸未加李光顔横海節度滄景觀察使其忠武深州行營節度如故以横海節度使李全略為徳棣節度使時朝廷以光顔懸軍深入饋運難通故割滄景以𨽻之王庭湊雖受旌節不解深州之圍丙戌以知制誥東陽馮宿為山南東道節度副使權知留後垂拱二年分烏傷縣置東陽縣取舊郡名以名縣也屬婺州九域志在州東一百五十五里仍遣中使入深州督牛元翼赴鎮裴度亦與幽鎮書責以大義朱克融即解圍去王庭湊雖引兵少退猶守之不去元稹怨裴度欲解其兵柄故勸上雪庭湊而罷兵丁亥以度為司空東都留守平章事如故徒考異曰舊紀傳皆云度守司為東都留守實録此云司徒後領淮南及拜相皆云司空新書度自檢校司空為守司空東都留守及領淮南乃為司徒蓋實録此月誤紀傳遂因之新傳後云司徒亦誤今据實録除淮南及拜相制書自此至罷相止是守司空舊裴度傳又曰元稹為相請上罷兵洗雪廷湊克融解深州之圍蓋欲罷度兵柄故也按此月甲子雪廷湊辛巳稹為相蓋稹未為相時勸上也諫官争上言時未偃兵度有將相全才不宜置之散地散蘇但翻上乃命度入朝然後赴東都以靈武節度使李聴為河東節度使初聴為羽林將軍有良馬上為太子遣左右諷求之聴以職總親軍不敢獻及河東缺帥帥所類翻上曰李聴不與朕馬是必可任遂用之昭義監軍劉承偕恃恩憲宗之崩也劉承偕預有援立穆宗之功故恃恩陵轢節度使劉悟轢郎狄翻數衆辱之數所角翻衆辱者於衆中慢辱之也又縦其下亂法隂與磁州刺史張汶謀縳悟送闕下以汶代之悟知之諷其軍士作亂殺汶圍承偕欲殺之汶音問幕僚賈直言入責悟曰公所為如是欲効李司空邪此軍中安知無如公者李師道為司空賈直言舊僚屬也故猶稱其鉞官言李師道悖逆劉悟倒戈取師道而得節今悟効師道所為昭義軍中亦将有効悟所為而取節鉞者使李司空有知得無笑公於地下乎悟遂謝直言救免承偕囚之府舍曰考異實録監軍劉承偕頗恃恩侵權嘗對衆辱悟又縦其下亂法悟不能平異日有中使至承偕宴之請悟悟欲往左右皆曰往必為其困辱矣軍衆因亂悟不止之遂擒承偕殺其二傔欲并害承偕悟救之獲免新劉悟傳曰承偕與都将張問謀縳悟送京師以問代節度事悟知之以兵圍監軍殺小使其屬賈直言質責悟悟即撝兵退匿承偕囚之新直言傳張問作張汶杜牧上李司徒書亦云其軍大亂殺磁州刺史張汶又云汶既因依承偕謀殺悟自取軍人忌怒遂至大亂蓋軍士圍承偕必出於悟志及奏朝廷則云軍衆所為耳今承偕名従實録汶名従杜書初上在東宫聞天下厭苦憲宗用兵故即位務優假將卒以求姑息三月壬辰詔神策六軍使及南牙常參武官南牙常參武官十六衛上将軍大将軍将軍也具由歴功績牒送中書量加奨擢由者得官之由歴者所歴職任量音良其諸道大將久次及有功者悉奏聞與除官應天下諸軍各委本道據守舊額不得輒有減省於是商賈胥吏賈音古争賂藩鎮牒補列將而薦之即升朝籍朝直遥翻唐末藩鎮列將帶朝銜者著之朝籍奏章委積士大夫皆扼腕歎息腕烏貫翻武寧節度副使王智興將軍中精兵三千討幽鎮節度使崔羣忌之奏請即用智興為節度使不則召詣闕除以他官不讀曰否事未報智興亦自疑㑹有詔赦王庭湊諸道皆罷兵智興引兵先期入境羣懼遣使迎勞先悉薦翻勞力到翻且使軍士釋甲而入智興不從乙巳引兵直進徐人開門待之智興殺不同己者十餘人乃入府牙見羣及監軍見賢遍翻拜伏曰軍衆之情不可如何為羣及判官從吏具人馬及治裝為于偽翻從才用翻下同治直之翻皆素所辦也遣兵衛從羣至埇橋而返埇余隴翻班考異曰實録羣累表請追智興授以他官事未行詔師智興帥衆斬闗而入舊智興傳亦同舊羣傳則曰羣以智興早得士心表請因授智興旄鉞寢不報智興回戈城内皆是父兄開闗延入今兼取之遂掠鹽鐵院錢帛埇橋有鹽鐵院及諸道進奉在汴中者謂諸道進奉船在汴河中者并商旅之物皆三分取二史言唐下陵上慢無復紀綱丙午加朱克融王庭湊檢校工部尚書上聞其解深州之圍故褒之然庭湊之兵實猶在深州城下韓愈既行衆皆危之詔愈至境更觀事勢勿遽入愈曰止君之仁死臣之義言止之勿使遽入鎮者君之仁不畏死而徑往致命者臣之義也遂往至鎮庭湊拔刃弦弓以逆之及館甲士羅於庭庭湊言曰所以紛紛者乃此曹所為非庭湊心愈厲聲曰天子以尚書有將帥材故賜之節鉞不知尚書乃不能與健兒語邪甲士前曰先太師為國擊走朱滔王武俊贈太師擊走朱滔見二百三十二卷徳宗興元元年為于偽翻血衣猶在此軍何負朝廷乃以為賊乎愈曰汝曹尚能記先太師則善矣夫逆順之為禍福豈逺邪自禄山思明以來至元濟師道其子孫有今尚存仕宦者乎田令公以魏博歸朝廷子孫雖在孩提皆為美官田𢎞正之徙成徳也進兼中書令子孫為美官見上卷憲宗元和十四年王承元以此軍歸朝廷弱冠為節度使見上卷元和十五年冠古玩翻劉悟李祐今皆為節度使汝曹亦聞之乎庭湊恐衆心動麾之使出恐其衆聞愈言而心動有如劉悟李祐者謂愈曰侍郎來韓愈時為兵部侍郎故稱之欲使庭湊何為愈曰神策六軍之將如牛元翼者不少少詩沼翻但朝廷顧大體不可弃之耳尚書何為圍之不置庭湊曰即當出之因與愈宴禮而歸之未幾牛元翼將十騎突圍出㡬居豈翻深州大將臧平等舉城降庭湊責其久堅守殺平等將吏百八十餘人戊申裴度至長安見上謝討賊無功先是上詔劉悟送劉承偕詣京師悟託以軍情不時奉詔上問度宜如何處置處昌吕翻下同度對曰承偕在昭義驕縦不法臣盡知之悟在行營謂討王承宗在行營時與臣書具論其事時有中使趙𢎞亮在軍中持悟書去云欲自奏之不知嘗奏不奏不讀曰否上曰朕殊不知也且悟大臣何不自奏對曰悟武臣不知事體然今事狀籍籍如此顔師古曰籍籍猶紛紛也臣等面論陛下猶不能決况悟當日單辭豈能動聖聴哉單辭一人之言上曰前事勿論直言此時如何處置對曰陛下必欲收天下心止應下半紙詔書具陳承偕驕縱之罪令悟集將士斬之則藩鎮之臣孰不思為陛下効死為于偽翻非獨悟也上俛首良久曰俛音免朕不惜承偕然太后以為養子今兹囚縶太后尚未知之况殺之乎卿更思其次度乃與王播等奏請流承偕於逺州必得出言既明底其罪則悟必釋承偕上從之後月餘悟乃釋承偕李光顔所將兵聞當留滄景皆大呼西走呼火故翻西走欲歸許州光顔不能制因驚懼成疾己酉上表固辭横海節乞歸許州許之李光顔本忠武節度使許州忠武軍治所考異曰舊光顔傳曰光顔以朝廷制置乖方賊帥連結未可朝夕平定事若差跌即前功盡弃乃懇辭兼鎮尋以疾作表祈歸鎮朝廷果以討賊無功而赦庭湊今従實録壬子以裴度為淮南節度使餘如故餘官如故也加劉悟檢校司徒餘如故自是悟浸驕欲效河北三鎮魏鎮幽為河北三鎮招聚不逞不逞者欲為非而不得逞志者也章表多不遜裴度之討幽鎮也回鶻請以兵從従才用翻朝議以為不可遣中使止之回鶻遣其臣李義節將三千人已至豐州北却之不從詔𤼵繒帛七萬匹以賜之甲寅始還還音旋又如字王智興遣輕兵二千襲濠州丙辰刺史侯𢎞度弃城奔壽州言事者皆謂裴度不宜出外上亦自重之戊午制留度輔政以中書侍郎同平章事王播同平章事代度鎮淮南仍兼諸道鹽鐵轉運使李寰帥其衆三千出博野帥讀曰率王庭湊遣兵追之寰與戰殺三百餘人庭湊兵乃還餘衆二千猶固守博野朝廷以新罷兵力不能討徐州己未以王智興為武寧節度使復以徳棣節度使李全略為横海節度使李光顔既還許州故全略復鎮横海夏四月丁酉朔日有食之甲戌以傅良弼李寰為神策都知兵馬使户部侍郎判度支張平叔上言官自糶鹽糶他弔翻可以獲利一倍又請令所由將鹽就村糶易所由綰掌官物之吏也事必經由其手故謂之所由又乞令宰相領鹽鐵使又請以糶鹽多少為刺史縣令殿最殿丁練翻又乞檢責所在實户據口團保團保者團結户口使之互相保識給一年鹽使其四季輸價又行此策後富商大賈或行財賄邀截喧訴其為首者所在杖殺連狀人皆杖脊連狀人謂連名告狀者也詔百官議其可否兵部侍郎韓愈上言以為城郭之外少有見錢少詩沼翻見賢遍翻下同糴鹽當屬上句多用雜物貿易鹽商則無物不取或賖貸徐還鬻物而緩取直曰賖貸借也用此取濟兩得利便今令吏人坐鋪自糶列物而鬻之謂之鋪鋪普故翻非得見錢必不敢授如此貧者無從得鹽自然坐失常課如何更有倍利又若令人吏將鹽家至而户糶必索百姓供應索山客翻供應言各供其物以應官吏所須也騷擾極多又刺史縣令職在分憂人君憂民有不得其生者故置守令以撫字之是其職在分憂也豈可惟以鹽利多少為之升黜不復考其理行復扶又翻理行猶言治行也行户孟翻又貧家食鹽至少或有淡食動經旬月若據户給鹽依時徵價官吏畏罪必用威刑臣恐因此所在不安此尤不可之大者也中書舍人韋處厚議以為宰相處論道之地處昌吕翻書曰三公論道經邦雜以鹺務鹺才何翻記曲禮曰鹽曰鹹鹺實非所宜竇參皇甫鎛皆以錢穀為相名利難兼卒蹈禍敗竇參事見徳宗紀皇甫鎛事見憲宗紀卒子恤翻又欲以重法禁人喧訴謂為首告訴者杖殺連名者杖脊也夫强人之所不能事必不立强其兩翻禁人之所必犯法必不行矣事遂寢寅考異曰實録因三月壬平叔遷户部侍郎事遂言變鹽法及處厚駮議按韓愈時奉使鎮州猶未還又壬寅三月十一日愈論鹽法狀云奉今月九日敕不知其何月也今附於四月之末平叔又奏徵逺年逋欠江州刺史李渤上言度支徵當州貞元二年逃户所欠錢四千餘緡當州今嵗旱灾田損什九刺史自以所守州為當州陛下奈何於大旱中徵三十六年前逋負詔悉免之邕州人不樂屬容管廢邕管入容管見上卷元和十五年樂音洛刺史李元宗以吏人狀授御史使奏之容管經略使嚴公素聞之遣吏按元宗擅以羅陽縣歸蠻酋黄少度羅陽當在西原羈縻縣也蓋裴行立攻黄洞時得之而元宗擅以歸之也酋慈由翻五月壬寅元宗將兵百人并州印奔黄洞王庭湊之圍牛元翼也和王傅于方欲以竒策干進和王綺順宗子言於元稹請遣客王昭于友明友考異曰實録作于明後作于啟明舊元稹傳作王友明今従實録之初及新書間説賊黨使出元翼間古莧翻説式芮翻仍賂兵吏部令史偽出告身二十通文官告身賂吏部令史偽為之武官告身賂兵部令史偽為之令以便宜給賜稹皆然之元稹方圖進取而先與兵吏部令史為偽曽是以為相業乎有李賞者知其謀乃告裴度云方為稹結客刺度為于偽翻度隠而不𤼵賞詣左神策告其事曰考異舊裴度傳曰初度與李逢吉素不協度自太原入朝而惡度者以逢吉善於隂計足能構度乃自襄陽召逢吉入朝為兵部尚書度既復知政事而魏𢎞簡劉承偕之黨在禁中逢吉用族子仲言之謀因毉人鄭注與中尉王守澄交結内官皆為之助五月左神策軍奏告事人李賞稱于方受元稹所使結客欲刺裴度按惡度者不過元稹與宦官彼欲害度其術甚多何必召逢吉又如所謀則稹當獲罪非所以害度也又逢吉若使李賞告之下御史按鞫賞急必連引逢吉非所以自謀也蓋賞自告耳非逢吉教令也丁巳詔左僕射韓臯等鞫之戊午幽州節度使朱克融進馬萬匹羊十萬口而表云先請其直充犒賞史言朱克融玩弄朝廷三司按于方刺裴度事皆無驗六月甲子度及元稹皆罷相度為右僕射稹為同州刺史以兵部尚書李逢吉為門下侍郎同平章事党項冦靈州渭北掠官馬先冦靈州遂及渭北也諫官上言裴度無罪不當免相元稹與于方為邪謀責之太輕上不得已壬申削稹長春宫使長春宫在同州元稹以出刺兼使今削之吐蕃冦靈武庚辰鹽州奏党項都督抜䟦萬誠請降党底朗翻拔跋當作拓跋降户江翻壬午吐蕃冦鹽州戊子復置邕管經略使復扶又翻初張𢎞靖為宣武節度使𢎞靖代韓𢎞見上卷憲宗元和十四年屢賞以悦軍士府庫虚竭李愿繼之性奢侈賞勞既薄於𢎞靖時勞力到翻又峻威刑軍士不悦愿以其妻弟竇瑗典宿直兵瑗驕貪軍中惡之惡烏路翻牙將李臣則等作亂秋七月壬辰夜即帳中斬瑗頭因大呼呼火故翻府中響應愿與一子踰城奔鄭州汴州西至鄭州一百五十里亂兵殺其妻推都押牙李㝏為留後㝏古拜翻考異曰實録戊戌汴州監軍使奏六月四日夜軍亂節度使李愿踰城以遁新紀亦云六月癸亥李㝏反逐李愿按李愿若以六月四日夜被逐不應至此月十日方奏到疑實録十字誤為六舊紀止用此奏到日今従愿傳七月四日丙申宋王結薨結順宗子戊戌宣武監軍奏軍亂庚子李㝏自奏已權知留後乙巳詔三省官與宰相議汴州事三省官自遺補舍人丞郎以上皆以為宜如河北故事授李㝏節李逢吉曰河北之事蓋非獲已今若并汴州弃之則是江淮以南皆非國家有也杜元穎張平叔争之曰奈何惜數尺之節不愛一方之死乎議未決㑹宋亳穎三州各上奏請别命帥三州皆宣武巡屬帥所類翻上大喜以逢吉議為然遣中使詣三州宣慰逢吉因請以將軍徵㝏入朝以義成節度使韓充鎮宣武充𢎞之弟素寛厚得衆心韓𢎞鎮宣武二十餘年将士懷之其弟又以寛厚得衆故逢吉請以代㝏脱㝏旅拒則命徐許兩軍攻其左右而滑軍蹙其北徐帥王智興許帥李光顔充必得入矣上皆從之丙午貶李愿為隨州刺史隨州古隨國漢為隨縣江左為隨郡西魏置隨州京師東南一千三百八十八里以韓充為宣武節度兼義成節度使徵李㝏為右金吾將軍㝏不奉詔宋州刺史髙承簡斬其使者㝏遣兵二千攻之陷寧陵襄邑宋州西至汴州二百八十五里寧陵州西四十五里襄邑州西微北宋州有三城賊已陷其南城承簡保北二城與賊十餘戰癸丑忠武節度使李光顔將兵二萬五千討李㝏屯尉氏尉氏在汴州西南許州東北兖海節度使曹華聞㝏作亂不俟詔即𤼵兵討之㝏遣兵三千人攻宋州適至城下丙辰華逆擊破之丁巳李光顔敗宣武兵於尉氏敗補邁翻下同斬獲二千餘人八月辛酉大理卿劉元鼎自吐蕃還元鼎去年使吐蕃甲子韓充入汴境軍于千塔千塔當在汴州北武寧節度使王智興與髙承簡共破宣武兵斬首千餘級餘衆遁去壬申韓充敗宣武兵於郭橋九域志汴州祥符縣有郭橋鎮斬首千餘級進軍萬勝九域志汴州中牟縣有萬勝鎮初李㝏既為留後以都知兵馬使李質為腹心及㝏除將軍不奉詔質屢諫不聴㑹㝏疽𤼵於首遣李臣則等將兵拒李光顔於尉氏既而官軍四集兵屢敗㝏疾甚悉以軍事屬李質屬之欲翻臥於家丙子質與監軍姚文壽擒㝏殺之詐為㝏牒追臣則等至皆斬之執㝏四子送京師韓充未至質權知軍務時牙兵三千人日給酒食物力不能支質曰若韓公始至而罷之則人情大去矣不可留此弊以遺吾帥遺唯李翻帥所類翻即命罷給而後迎充丁丑充入汴癸未以韓充專為宣武節度使以曹華為義成節度使髙承簡為兖海沂密節度使加李光顔兼侍中以李質為右金吾將軍韓充既視事人心粗定乃密籍軍中為惡者千餘人一朝并父母妻子悉逐之曰敢少留境内者斬於是軍政大治除亂而去其根則亂無従生矣治直史翻九月戊子朔浙西觀察使京兆竇易直易弋豉翻奏大將王國清作亂伏誅初易直聞汴州亂而懼欲散金帛以賞軍士或曰賞之無名恐益生疑乃止而外已有知之者故國清作亂易直討擒之并殺其黨二百餘人委考異曰舊易直傳曰時江淮旱水淺轉運司錢帛積不能漕國清指以為賞激諷州兵謀亂先事有告者乃收國清下獄其黨數千人大呼入獄中篡取國清而出之因欲大剽易直登樓謂将吏曰能誅為亂者每獲一人賞千萬衆喜倒戈擊亂黨擒國清等三百餘人皆斬之今従實録徳州刺史王稷承父鍔餘貲家富厚横海節度使李景略利其財李景略當作李全略丙申密敎軍士殺稷屠其家納其女為妾以軍亂聞象有齒而焚其身賄也王鍔僅能免其身而禍鍾其子君子是以知守富之難朝廷之討李㝏也遣司門郎中韋文恪宣慰魏博史憲誠表請授㝏旌節又於黎陽築馬頭為度河之勢附河岸築土植木夾之至水次以便兵馬入船謂之馬頭見文恪辭禮倨慢及聞㝏死辭禮頓恭曰憲誠胡人譬如狗雖被捶擊終不離主耳捶比蘂翻離力智翻冬十一月庚午皇太后幸華清宫辛未上自複道幸華清宫遂畋于驪山即日還宫太后數日乃返丙子集王緗薨緗順宗子庚辰上與宦者擊毬於禁中有宦者墜馬上驚因得風疾不能履地自是人不聞上起居宰相屢乞入見不報裴度三上疏請立太子且請入見見賢遍翻十二月辛卯上見羣臣於紫宸殿御大繩牀程大昌演繁露曰今之交牀制本自虜來始名胡牀隋以䜟有胡改名交牀唐穆宗於紫宸殿御大繩牀見羣臣則又名繩牀矣余按交牀繩牀今人家有之然二物也交牀以木交午為足足前後皆施横木平其底使錯之地而安足之上端其前後亦施横木而平其上横木列竅以穿繩條使之可坐足交午處復為圓穿貫之以鐵歛之可挾放之可坐以其足交故曰交牀繩牀以板為之人坐其上其廣前可容膝後有靠背左右有托手可以閤臂其下四足著地悉去左右衛官去羌吕翻獨宦者十餘人侍側人情稍安李逢吉進言景王已長請立為太子裴度請速下詔副天下望既而兩省官亦繼有請立太子者癸巳詔立景王湛為皇太子愈考異曰劉軻牛羊日厯曰穆宗不宰臣議立敬宗為皇太子時牛僧孺獨懷異圖欲立諸子僧孺乃昌言於朝曰梁守謙王守澄将不利於上又使楊虡卿漢公輩宣言于外曰王守澄欲謀廢立又令其徒於街衢門牆上施牓毎於穆宗行幸處路傍或苑内草間削白而書之冀謀大亂其兇險如此此出于朋黨之言不足信也上疾浸瘳是嵗初行宣明厯憲宗即位司天徐昻上新厯曰觀象起元和二年用之然無蔀章之數至於𤼵歛啟閉之候循用舊法測驗不合上立以累世纉緒必更厯紀乃詔厯官改撰厯名曰宣明其氣朔𤼵斂日躔月離皆因大衍舊術晷漏交㑹則稍増損之資治通鑑卷二百四十二
