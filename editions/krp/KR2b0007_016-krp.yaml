  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷十六宋司馬光撰胡三省音註漢紀八起強圉大淵獻盡上章困敦凡十四年孝景皇帝下前三年冬十月梁王來朝朝直遥翻時上未置太子與梁王宴飲從容言曰從千容翻千秋萬嵗後傳於王王辭謝雖知非至言然心内喜孔穎達曰喜者外境㑹心之謂太后亦然詹事竇嬰班表詹事秦官掌皇后太子家應劭曰詹省也給也臣瓉曰茂陵書詹事秩真二千石師古曰皇后太子各置詹事隨其所在以名官引巵酒進上曰天下者髙祖之天下父子相傳漢之約也上何以得傳梁王太后由此憎嬰引酒進之盖罰爵也嬰因病免太后除嬰門籍不得朝請門籍出入宫殿門之籍也請材性翻又如字梁王以此益驕春正月乙巳赦長星出西方洛陽東宫災洛陽縣河南郡治所髙祖先居洛陽因築宫室有南宫北宫東宫初孝文時吳太子入見楚漢春秋曰吳太子名賢字徳明見賢遍翻得侍皇太子飲博吳太子博爭道不恭皇太子引博局提吳太子殺之提徒計翻遣其喪歸葬至吳吳王愠曰愠於問翻師古曰怒也孔穎達曰愠者外境違心之謂事與心違所以怒生天下同宗師古曰猶言同姓共為一家死長安即𦵏長安何必來𦵏為復遣喪之長安𦵏吳王由此稍失藩臣之禮稱疾不朝朝直遥翻京師知其以子故繫治驗問吳使者吳王恐始有反謀後使人為秋請應劭曰冬當斷獄秋先請擇其輕重也孟康曰律春曰朝秋曰請如淳曰濞不自行使人代己致請禮索隠曰音淨孟説是文帝復問之復扶又翻使者對曰王實不病漢繫治使者數輩吳王恐以故遂稱病夫察見淵中魚不祥服䖍曰言天子察見下之私則不祥也索隱曰案此語見韓子及文子韋昭曰知臣下隂私使憂患生變為不祥故當赦宥使自新也唯上棄前過與之更始師古曰言赦其已往之事使得自新也更工衡翻於是文帝乃赦吳使者歸之而賜吳王几杖老不朝吳得釋其罪謀亦益解然其居國以銅鹽故百姓無賦索隱曰吳國有鑄錢煮鹽之利故百姓不别徭賦也卒踐更輒予平賈服䖍曰以當為更卒出錢三百謂之過更自行為卒謂之踐更吳王欲得民心以為卒者雇其庸隨時月予平賈晉灼曰謂借人自代為卒者官為岀錢雇其時庸平賈也師古曰晉説是索隱曰案漢律卒更有三踐更居更過更也此言踐更輒與平賈者謂為踐更合自出錢今吳王欲得人心乃予平賈官讎之也予讀曰與下同賈讀曰價嵗時存問茂材賞賜閭里他郡國吏欲來捕亡人者公共禁弗予如此者四十餘年鼂錯數上書言吳過可削文帝寛不忍罰以此吳日益横鼂直遥翻錯千故翻數所角翻横户孟翻及帝即位錯説上曰昔髙帝初定天下昆弟少諸子弱説式芮翻少詩沼翻大封同姓齊七十餘城楚四十餘城吳五十餘城封三庶孽分天下半今吳王前有太子之郤郤與隙同下有郤同詐稱病不朝於古灋當誅文帝弗忍因賜几杖徳至厚當改過自新反益驕溢即山鑄錢師古曰即就也煮海水為鹽誘天下亡人謀作亂今削之亦反不削亦反削之其反亟禍小不削反遲禍大上令公卿列侯宗室雜議莫敢難獨竇嬰爭之由此與錯有郤難乃旦翻郤與隙同及楚王戊來朝錯因言戊往年為薄太后服私姦服舍師古曰服舍居喪之次若堊室之屬也請誅之詔赦削東海郡東海郡即秦郯郡髙帝更名及前年趙王有罪削其常山郡膠西王卬以賣爵事有姦膠西後改為髙宻削其六縣廷臣方議削吳吳王恐削地無己因發謀舉事念諸侯無足與計者聞膠西王勇好兵好呼到翻諸侯皆畏憚之於是使中大夫應髙口説膠西王曰應本自周武王後左傳曰䢴晉應韓武之穆也今者主上任用邪臣聽信讒賊侵削諸侯誅罰良重師古曰良實也信也日以益甚語有之曰狧穅及米師古曰狧古􅜻字食爾翻狧用舌食也盖以犬為諭言初狧穅遂至食米也索隱曰言狧穅盡則至米謂削土盡則至滅國也吳與膠西知名諸侯也一時見察不得安肆矣師古曰肆縱也吳王身有内疾師古曰謂疾在身中不顯於外也不能朝請二十餘年常患見疑無以自白脅肩累足猶懼不見釋師古曰脅翕也謂斂之也累足重足也並謂懼耳釋解也放也累與絫同竊聞大王以爵事有過所聞諸侯削地罪不至此師古曰言其罪皆不至于削地此恐不止削地而已王曰有之子將奈何髙曰吳王自以為與大王同憂願因時循理棄軀以除患於天下意亦可乎膠西王瞿然駭曰瞿居具翻説文瞿逺視貌師古曰瞿然無守之貌寡人何敢如是主上雖急固有死耳安得不事髙曰御史大夫鼂錯營惑天子師古曰營謂囘繞之也侵奪諸侯諸侯皆有背叛之意人事極矣彗星出背蒲妹翻彗祥嵗翻又徐醉翻又旋芮翻蝗蟲起此萬世一時而愁勞聖人所以起也索隱曰所謂殷憂以啟明聖也吳王内以鼂錯為誅外從大王後車方洋天下方音房又音旁洋音羊師古曰方洋猶翺翔也所向者降降户江翻所指者下莫敢不服大王誠幸而許之一言則吳王率楚王略函谷闗守滎陽敖倉之粟距漢兵治次舍須大王師古曰次舍息止之處須待也治直之翻大王幸而臨之則天下可併兩主分割不亦可乎王曰善歸報吳王吳王猶恐其不果乃身自為使者至膠西面約之膠西羣臣或聞王謀諫曰諸侯地不能當漢十二為叛逆以憂太后非計也文頴曰謂王之太后也今承一帝尚云不易易以䜴翻假令事成兩主分爭患乃益生王不聽遂發使約齊菑川膠東濟南皆許諾齊王將閭菑川王賢膠東王雄渠濟南王辟光皆文帝封濟子禮翻初楚元王好書好呼到翻與魯申公穆生白生俱受詩於浮丘伯及王楚以三人為中大夫及王于况翻穆生不耆酒元王毎置酒常為穆生設醴及子夷王孫王戊即位楚元王交髙祖異母弟楚子重子辛皆出於穆王楚人謂之二穆故楚有穆姓秦有白乙丙白圭楚有白公浮丘複姓夷王名郢客元王子戊元王孫師古曰醴甘酒少麯多米二宿而熟不耆之耆讀曰嗜為于偽翻下同常設後乃忘設焉忘巫放翻穆生退曰可以逝矣醴酒不設王之意怠不去楚人將鉗我於市遂稱疾卧申公白生彊起之彊其兩翻曰獨不念先王之徳與與讀曰歟今王一旦失小禮何足至此穆生曰易稱知幾其神乎幾者動之微吉㓙之先見者也幾居依翻師古曰易下繫之辭見户電翻君子見幾而作不俟終日先王之所以禮吾三人者為道存也今而忽之是忘道也忘道之人胡可與久處豈為區區之禮哉區區謂小也處昌吕翻為于偽翻遂謝病去申公白生獨留王戊稍淫暴太傅韋孟作詩諷諫不聽亦去居於鄒姓譜韋姓出顓頊大彭豕韋之後戊因坐削地事遂與吳通謀申公白生諫戊戊胥靡之衣之赭衣使雅舂於市晉灼曰髙肱舉杵正身而舂之師古曰為木杵而手舂即今所謂步臼者耳衣之於既翻休侯富使人諫王孟子去齊居休趙岐註曰休地名盖即富所封之地富楚元王之子夷王之弟也王曰季父不吾與我起先取季父矣休侯懼乃與母太夫人犇京師臣瓉曰侯母號太夫人及削吳㑹稽豫章郡書至吳王遂先起兵誅漢吏二千石以下膠西膠東菑川濟南楚趙亦皆反楚相張尚太傅趙夷吾諫王戊戊殺尚夷吾趙相建徳内史王悍諫王遂遂燒殺建徳悍悍下罕翻又矦旰翻齊王後悔背約城守背蒲妹翻守式又翻濟北王城壊未完其郎中令刼守王不得發兵膠西王膠東王為渠率師古曰渠大也率所類翻與菑川濟南共攻齊圍臨菑臨菑齊都趙王遂發兵住其西界欲待吳楚俱進北使匈奴與連兵使疏吏翻下同吳王悉其士卒下令國中曰寡人年六十二身自將將即亮翻少子年十四亦為士卒先諸年上與寡人同下與少子等皆發凡二十餘萬人南使閩東越使疏吏翻閩東越亦發兵從從才用翻吳王起兵于廣陵廣陵吳都西涉淮因并楚兵發使遺諸侯書罪狀鼂錯遺于季翻欲合兵誅之吳楚共攻梁破棘壁索隱曰按左氏傳宣公二年宋華元戰於大棘杜預曰在襄邑東南盖即棘壁是也括地志大棘故城在宋州寧陵縣西南七十里殺數萬人乗勝而前鋭甚梁孝王遣將軍擊之又敗梁兩軍敗補邁翻士卒皆還走梁王城守睢陽睢陽梁都睢音雖初文帝且崩戒太子曰即有緩急周亞夫真可任將兵及七國反書聞上乃拜中尉周亞夫為太尉將三十六將軍往擊吳楚遣曲周侯酈寄擊趙班志曲周縣屬廣平國將軍欒布擊齊復召竇嬰拜為大將軍使屯滎陽監齊趙兵班志滎陽縣屬河南郡監古銜翻初鼂錯所更令三十章更工衡翻諸侯讙譁讙許元翻錯父聞之從潁川來錯潁川人謂錯曰上初即位公為政用事侵削諸侯疏人骨肉疏與疎同口語多怨公何為也錯曰固也不如此天子不尊宗廟不安父曰劉氏安矣而鼂氏危吾去公歸矣遂飲藥死曰吾不忍見禍逮身後十餘日吳楚七國俱反以誅錯為名上與錯議出軍事錯欲令上自將兵而身居守守式又翻又言徐僮之旁吳所未下者可以予吳徐僮二縣皆屬臨淮郡錯初議削諸侯地以彊漢及七國反乃欲以徐僮之旁予吳是自畔其説惡得無死乎予讀曰與錯素與吳相袁盎不善相息亮翻錯所居坐盎輒避盎所居坐錯亦避坐徂卧翻兩人未嘗同堂語及錯為御史大夫使吏按盎受吳王財物抵辠詔赦以為庶人吳楚反錯謂丞史曰班表御史大夫有兩丞秩千石侍御史十五人袁盎多受吳王金錢専為蔽匿言不反今果反欲請治盎宜知其計謀丞史曰事未發治之有絶如淳曰事未發之時治之乃有所絶也治直之翻今兵西向治之何益且盎不宜有謀錯猶與未決猶與即猶豫也與去聲人有告盎盎恐夜見竇嬰為言吳所以反願至前口對狀嬰入言上乃召盎盎入見為于偽翻入見賢遍翻上方與錯調兵食師古曰調計也計發兵食也調徒釣翻上問盎今吳楚反於公意何如對曰不足憂也上曰吳王即山鑄錢煮海為鹽誘天下豪傑白頭舉事此其計不百全豈發乎何以言其無能為也對曰吳銅鹽之利則有之安得豪傑而誘之誘音酉誠令吳得豪傑亦且輔而為誼不反矣吳所誘皆無賴子弟亡命鑄錢姦人章懐太子賢曰命名也謂脱其名籍而逃亡故相誘以亂錯曰盎䇿之善上曰計安出盎對曰願屏左右上屏人獨錯在盎曰臣所言人臣不得知乃屏錯屛必郢翻錯趨避東廂甚恨上卒問盎卒子恤翻下卒受同對曰吳楚相遺書言髙皇帝王子弟各有分地遺于季翻分扶問翻今賊臣鼂錯擅適諸侯適讀曰讁削奪之地以故反欲西共誅錯復故地而罷方今計獨有斬錯發使赦吳楚七國使疏吏翻下使吳同復其故地則兵可毋血刃而俱罷於是上黙然良久曰顧誠何如吾不愛一人以謝天下盎曰愚計岀此唯上孰計之孰與熟同乃拜盎為太常中六年始改奉常為太常時盎猶為奉常也密裝治行治直之翻後十餘日上令丞相青中尉嘉廷尉歐丞相陶青中尉嘉失其姓廷尉張歐劾奏錯不稱主上徳信欲疏羣臣百姓又欲以城邑予吳無臣子禮大逆無道錯當要斬劾户槩翻疏與疎同予讀曰與要與腰同父母妻子同産無少長皆棄市少詩照翻長知兩翻制曰可錯殊不知壬子上使中尉召錯紿載行市師古曰誑云乗車案行市中也行下孟翻錯衣朝衣斬東市衣朝上於既翻下直遥翻上乃使袁盎與吳王弟子宗正徳侯通使吳髙祖兄仲之子廣封徳侯生通徳侯國在泰山界謁者僕射鄧公為校尉上書言軍事見上校户教翻上書之上時掌翻上問曰道軍所來如淳曰道路從吳軍所來也臣瓉曰道由也聞鼂錯死吳楚罷不不讀曰否鄧公曰吳為反數十嵗矣發怒削地以誅錯為名其意不在錯也且臣恐天下之士拑口不敢復言矣拑其炎翻復扶又翻上曰何哉鄧公曰夫鼂錯患諸侯彊大不可制故請削之以尊京師萬世之利也計畫始行卒受大戮卒子恤翻或讀為猝内杜忠臣之口外為諸侯報仇臣竊為陛下不取也為于偽翻於是帝喟然長息曰公言善吾亦恨之袁盎劉通至吳吳楚兵已攻梁壁矣宗正以親故先入見諭吳王令拜受詔宗正於濞猶子之親也吳王聞袁盎來知其欲説説式芮翻下同笑而應曰我已為東帝尚誰拜不肯見盎而留軍中欲刼使將將即亮翻盎不肯使人圍守且殺之盎得間脱亡歸報間古莧翻太尉亞夫言於上曰楚兵剽輕難與爭鋒剽匹妙翻輕虚勁翻願以梁委之絶其食道乃可制也上許之亞夫乗六乗傳張晏曰傳車六乗也乗繩證翻傳張戀翻余據漢有乗傳馳傳文帝之自代入立也張武等乗六乗傳今亞夫乗六乗傳六乗傳之見於史者二盖又與乗傳不同也將㑹兵滎陽師古曰㑹兵謂集大兵發至霸上趙涉遮説亞夫曰吳王素富懐輯死士久矣此知將軍且行必置間人於殽澠阸陿之間澠彌兗翻殽山澠池之間其道阸陿阸於懈翻陿與狹同且兵事尚神密將軍何不從此右去走藍田出武闗抵洛陽間不過差一二日自霸上左趨殽澠至洛陽其道便近若自霸上右趨藍田出武闗至洛陽其道迂曲故差一二日走音奏間如字直入武庫洛陽有武庫擊鳴鼓諸侯聞之以為將軍從天而下也太尉如其計至洛陽喜曰七國反吾乗傳至此不自意全師古曰言不自意得安全至洛陽也今吾據滎陽滎陽以東無足憂者皆考異曰史記漢書云太尉得劇孟喜如得一敵國曰吳楚無足憂者按孟一游俠之士耳亞夫得之何足為輕重盖其徒欲為孟重名妄撰此言不足信也使吏搜殽澠間果得吳伏兵乃請趙涉為護軍太尉引兵東北走昌邑昌邑梁地後為山陽郡治所走音奏下同吳攻梁急梁數使使條侯求救條侯不許班志勃海郡有脩縣音條數所角翻使使上如字下疏吏翻又使使愬條侯於上上使告條侯救梁亞夫不奉詔堅壁不出而使弓髙侯等將輕騎兵出淮泗口韓王信之子頽當自匈奴中來歸封為弓髙侯功臣表弓髙屬營陵地理志弓髙屬河間國盖頽當受封於文帝之初而河間國則二年所置故志與表異泗水南入淮故謂之淮泗口騎竒寄翻絶吳楚兵後塞其饟道塞悉則翻饟古餉字梁使中大夫韓安國及楚相張尚弟羽為將軍羽力戰安國持重乃得頗敗吳兵吳兵欲西梁城守不敢西敗補邁翻守式又翻即走條侯軍㑹下邑下邑縣屬梁國欲戰條侯堅壁不肯戰吳糧絶卒飢數挑戰終不出數所角翻挑徙了翻條侯軍中夜驚内相攻擊擾亂至帳下亞夫堅卧不起頃之復定吳犇壁東南陬陬子矦翻隅也亞夫使備西北已而其精兵果犇西北不得入吳楚士卒多飢死叛散乃引而去二月亞夫出精兵追擊大破之吳王濞棄其軍與壯士數千人夜亡走楚王戊自殺吳王之初發也吳臣田禄伯為大將軍田禄伯曰兵屯聚而西無它竒道難以立功臣願得五萬人别循江淮而上上時掌翻收淮南長沙入武闗與大王㑹此亦一竒也吳王太子諫曰王以反為名此兵難以借人人亦且反王奈何且擅兵而别多它利害蘇林曰禄伯儻將兵降漢自為己利於吳生患也徒自損耳吳王即不許田禄伯吳少將桓將軍説王曰吳多步兵歩兵利險漢多車騎車騎利平地願大王所過城不下直去疾西據洛陽武庫食敖倉粟阻山河之險以令諸侯雖無入闗天下固已定矣大王徐行留下城邑漢軍車騎至馳入梁楚之郊事敗矣吳王問諸老將老將曰此年少椎鋒可耳安知大慮老將即亮翻下并將為將同於是王不用桓將軍計王専并將兵兵未度淮諸賓客皆得為將校尉候司馬凡軍行有大將禆將領軍皆有部曲部有校尉曲有軍候軍司馬又有假候假司馬皆有副其别營領屬為别部司馬獨周丘不用丘者下邳人班志下邳屬東海郡亡命吳酤酒無行行下孟翻王薄之不任周丘乃上謁説王曰臣以無能不得待罪行間上時掌翻説式芮翻行户剛翻臣非敢求有所將也將即亮翻願請王一漢節必有以報王乃予之予讀曰與周丘得節夜馳入下邳下邳時聞吳反皆城守至傳舍召令入户使從者以罪斬令傳張戀翻令力正翻從才用翻遂召昆弟所善豪吏吿曰吳反兵且至屠下邳不過食頃今先下家室必完能者封侯矣出乃相吿下邳皆下周丘一夜得三萬人使人報吳王遂將其兵北畧城邑比至陽城兵十餘萬破陽城中尉軍陽城漢書作城陽城陽國都莒其地南接下邳之境班表王國有中尉掌武職比必寐翻及也聞吳王敗走自度無與共成功度徒洛翻即引兵歸下邳未至疽發背死史言吳王有才不能用以至于敗壬午晦日有食之吳王之棄軍亡也軍遂潰往往稍降太尉條侯及梁軍降户江翻吳王度淮走丹徒班志丹徒縣屬㑹稽郡即春秋之朱方括地志丹徒故城在潤州丹徒縣東南十八里南徐州記秦使赭衣鑿其處因謂之丹徒鑿處今在故縣西北六里丹徒峴東南保東越欲依東越以自保也兵可萬餘人收聚亡卒漢使人以利㗖東越㗖徒覽翻餌之也又徒濫翻譙也食也東越即紿吳王出勞軍勞力到翻使人鏦殺吳王孟康曰方言㦸謂之鏦蘇林曰鏦音從容之從師古曰鏦謂以矛㦸撞殺之鏦楚江翻盛其頭馳傳以聞盛時征翻傳張戀翻吳太子駒亡走閩越吳楚反凡三月皆破滅於是諸將乃以太尉謀為是然梁王由此與太尉有隙為梁王毁短亞夫張本三王之圍臨菑也齊王使路中大夫吿於天子張晏曰姓路官為中大夫姓譜路本自帝摯之後天子復令路中大夫還報告齊王堅守漢兵今破吳楚矣路中大夫至三國兵圍臨菑數重無從入三國將與路中大夫盟曰若反言漢已破矣重直龍翻將即亮翻師古曰若汝也反謂反易其辭也齊趣下三國趣讀曰促不且見屠路中大夫既許至城下望見齊王曰漢已發兵百萬使太尉亞夫擊破吳楚方引兵救齊齊必堅守無下三國將誅路中大夫齊初圍急隂與三國通謀約未定㑹路中大夫從漢來其大臣乃復勸王無下三國㑹漢將欒布平陽侯等兵至齊據班史齊王傳作平陽侯曹襄史記索隱曰平陽矦按表是簡矦曹竒擊破三國兵解圍已句斷後聞齊初與三國有謀將欲移兵伐齊齊孝王懼飲藥自殺膠西膠東菑川王各引兵歸國膠西王徒跣席藁飲水謝太后王太子徳曰漢兵還臣觀之已罷罷與疲同可襲願收王餘兵擊之不勝而逃入海未晚也王曰吾士卒皆已壊不可用弓髙侯韓頺當遺膠西王書曰奉詔誅不義降者赦除其罪復故不降者滅之遺于季翻降户江翻王何處須以從事謂膠西王於降與不降之間欲以何自處吾待以行事處昌吕翻王肉袒叩頭詣漢軍壁謁曰臣卬奉法不謹驚駭百姓乃苦將軍逺道至于窮國敢請菹醢之罪弓髙侯執金鼓見之曰王苦軍事願聞王發兵狀王頓首䣛行䣛與膝同對曰今者鼂錯天子用事臣變更髙皇帝法令侵奪諸侯地卬等以為不義恐其敗亂天下更工衡翻敗補邁翻七國發兵且誅錯今聞錯己誅卬等謹已罷兵歸將軍曰王茍以錯為不善何不以聞及未有詔虎符擅發兵擊義國以此觀之意非徒欲誅錯也乃出詔書為王讀之為于偽翻下同曰王其自圖王曰如卬等死有餘罪遂自殺太后太子皆死膠東王菑川王濟南王皆伏誅酈將軍兵至趙趙王引兵還邯鄲城守邯鄲趙都酈寄攻之七月不能下匈奴聞吳楚敗亦不肯入邊欒布破齊還并兵引水灌趙城城壊王遂自殺帝以齊首善師古曰言其初首無逆亂之心以迫刼有謀非其辠也召立齊孝王太子夀是為懿王濟北王亦欲自殺濟北王志齊悼恵王子文帝十六年受封幸全其妻子齊人公孫玃謂濟北王曰玃俱碧翻康俱縛切臣請試為大王明説梁王通意天子説而不用死未晚也為于偽翻説式芮翻公孫玃遂見梁王曰夫濟北之地東接彊齊南牽吳越北脅燕趙此四分五裂之國張晏曰四方受敵濟北居中央為五晉灼曰四分即交午而裂如田字也權不足以自守勁不足以捍寇又非有竒怪云以待難也雖墜言於吳非其正計也如淳曰非有竒材異計欲為亂逆也但假權許吳以避禍耳晉灼曰非有以怪異之心而城守須待變難以應吳也師古曰二説皆非也此言權謀勁力旣不能扞守又無竒怪神靈可以禦難恐不能自全故墜言於吳也墜猶失也難乃旦翻鄉使濟北見情實示不從之端鄉讀曰向見賢遍翻則吳必先歴齊畢濟北歴過也畢了也招燕趙而總之如此則山東之從結而無隙矣從子容翻今吳王連諸侯之兵敺白徒之衆師古曰敺與驅同白徒素非習軍旅之人猶言白丁也西與天子爭衡濟北獨底節不下使吳失與而無助跬步獨進師古曰半步曰跬跬空累翻瓦解土崩破敗而不救者未必非濟北之力也夫以區區之濟北而與諸侯爭彊是以羔犢之弱而扞虎狼之敵也小羊曰羔小牛曰犢守職不橈橈奴教翻可謂誠一矣功義如此尚見疑於上脅肩低首累足撫衿使有自悔不前之心自悔者悔不與吳同也不前不敢前進以自歸於漢也非社稷之利也臣恐藩臣守職者疑之臣竊料之能厯西山徑長樂抵未央攘袂而正議者師古曰西山謂殽及華山也抵至也攘郤也袂衣袖也攘袂猶今人言捋臂耳余謂長樂太后居之未央天子居之徑長樂抵未央猶言自太后所至帝所也樂音洛獨大王耳上有全亡之功下有安百姓之名徳淪於骨髓恩加於無窮願大王留意詳惟之惟思也孝王大説説讀曰悦使人馳以聞濟北王得不坐徙封於菑川河間王太傅衛綰擊吳楚有功拜為中尉綰以中郎將事文帝醇謹無他上為太子時召文帝左右飲而綰稱病不行文帝且崩屬上曰綰長者善遇之故上亦寵任焉屬之欲翻夏六月乙亥詔吏民為吳王濞等所詿誤當坐及逋逃亡軍者皆赦之詿户卦翻亡軍從軍而逃者也帝欲以吳王弟徳哀侯廣之子續吳以楚元王子禮續楚徳哀侯廣之子即徳侯通也禮時封平陸侯為宗正竇太后曰吳王老人也宜為宗室順善今乃首率七國紛亂天下奈何續其後不許吳許立楚後乙亥徙淮陽王餘為魯王汝南王非為江都王王故吳地立宗正禮為楚王立皇子端為膠西王勝為中山王中山王都盧奴四年春復置闗用傳出入應劭曰文帝十三年除闗無用傳至此復用傳以七國新反備非常傳張戀翻夏四月己巳立子榮為皇太子徹為膠東王六月赦天下秋七月臨江王閼薨冬十月戊戌晦月末為晦日有食之李心傳曰漢景帝四年中四年皆以冬十月日食今通鑑書於夏秋之後盖編輯者自志中摘出不思漢初以十月為嵗首故誤係之嵗末耳余按此誤劉貢父已言之通鑑盖承用漢書本紀也初吳楚七國反吳使者至淮南淮南王欲發兵應之其相曰王必欲應吳臣願為將王乃屬之將即亮翻下同屬之欲翻委也言以兵事委之相已將兵因城守不聽王而為漢守式又翻為于偽翻漢亦使曲城侯將兵救淮南晉灼曰曲城矦功臣表蟲達也師古曰晉説非此蟲達之子耳名捷達已先薨也班志曲城縣屬東萊郡以故得完吳使者至廬江廬江王不應而往來使越使疏吏翻至衡山衡山王堅守無二心及吳楚已破衡山王入朝上以為貞信勞苦之曰勞來到翻南方卑濕徙王王於濟北以褒之王於之王于况翻廬江王以邊越數使使相交師古曰邊越者邊界與越相接據班志廬江故淮南文帝别為國廬江水出陵陽東南而北入於江陵陽縣屬丹陽郡文帝初分淮南為廬江國在江南若班志之廬江郡則其地盡在江北矣數所角翻徙為衡山王王江北衡山王都六其地在江北五年春正月作陽陵邑班志陽陵縣屬馮翊本弋陽縣索隱曰帝豫作夀陵於此因更縣名在長安東北四十五里夏募民徙陽陵賜錢二十萬遣公主嫁匈奴單于徙廣川王彭祖為趙王濟北貞王勃薨諡法清白守節曰貞六年冬十二月雷霖雨雨三日以往為霖初上為太子薄太后以薄氏女為妃及即位為皇后無寵秋九月皇后薄氏廢楚文王禮薨初燕王臧荼有孫女曰臧兒嫁為槐里王仲妻生男信與兩女而仲死班志槐里縣屬扶風秦之廢丘也髙祖二年更名更嫁長陵田氏更工衡翻生男蚡勝蚡扶粉翻文帝時臧兒長女為金王孫婦生女俗長知兩翻下同臧兒卜筮之曰兩女皆當貴臧兒乃奪金氏婦金氏怒不肯予決予讀曰與決别也言不肯與别師古曰決絶也内之太子宫生男徹徹方在身身與娠同師古曰漢史多以娠為任身字時王夫人夢日入其懐及帝即位長男榮為太子其母栗姬齊人也長公主嫖欲以女嫁太子長知兩翻嫖文帝女景帝之姊師古曰年最長故謂之長公主余謂帝女稱公主帝之姊妹稱長公主嫖降堂邑矦陳午生女是為武帝陳皇后嫖匹昭翻栗姬以後宫諸美人皆因長公主見帝故怒而不許長公主欲予王夫人男徹予讀曰與王夫人許之由是長公主日讒栗姬而譽王夫人之美譽音余帝亦自賢之又有曩者所夢日符王夫人之震武帝也夢日入其懐所謂符也計未有所定王夫人知帝嗛栗姬嗛乎監翻口有所銜也康曰恨也史記曰帝嘗體不安屬諸子為王者於栗姬曰善視之栗姬怒不肯應言不遜帝恚心嗛之而未發也因怒未解隂使人趣大行晉灼曰禮有大行人小行人主諡官臣瓚曰大行是官名掌九儀之制以賔諸侯者師古曰大行令本名行人典客屬官也後改曰大行令余按班表帝中六年改典客曰大行令武帝太初元年改大行令為大鴻臚更名行人為大行令意其有誤不然則追書也原父曰史記文景事最畧漢書則頗有所録盖班氏博採他書成之故於景帝世謂典客為鴻臚行人為大行由他書即武帝時官記景帝世事班氏失於改革耳非表誤也趣讀曰促請立栗姬為皇后帝怒曰是而所宜言邪而汝也遂按誅大行七年冬十一月己酉廢太子榮為臨江王太子太傅竇嬰力爭不能得乃謝病免栗姬恚恨而死庚寅晦日有食之二月丞相陶青免乙巳太尉周亞夫為丞相罷太尉官夏四月乙巳立皇后王氏丁巳立膠東王徹為皇太子是嵗以太僕劉舍為御史大夫劉舍髙祖功臣桃安侯劉襄之子襄本項氏親賜姓濟南太守郅都為中尉濟南王辟光反國除為郡郅之日翻風俗通郅商時侯國後以為氏始都為中郎將敢直諫嘗從入上林賈姬如厠賈姬即賈夫人生趙王彭祖中山王勝野彘卒來入厠卒讀曰猝上目都都不行上欲自持兵救賈姬都伏上前曰亡一姬復一姬進復扶又翻天下所少寧賈姬等乎陛下縱自輕奈宗廟太后何上乃還彘亦去太后聞之賜都金百斤由此重都都為人勇悍公㢘不發私書問遺無所受悍下罕翻遺于季翻請謁無所聽及為中尉先嚴酷先悉薦翻行法不避貴戚列侯宗室見都側目而視號曰蒼鷹師古曰言其鷙擊之甚中元年夏四月乙巳赦天下地震衡山原都雨雹大者尺八寸原都地名盖屬衡山國雨王遇翻二年春二月匈奴入燕燕因肩翻三月臨江王榮坐侵太宗廟壖垣為宫徴詣中尉府對簿帝即位之初令天下郡國各立太祖太宗之廟故臨江王國亦有之壖與堧同而縁翻師古曰簿者獄辭之文書簿步户翻臨江王欲得刀筆為書謝上師古曰刀所以削治書也古者著書於簡牘故必用刀焉而中尉郅都禁吏不予魏其矦使人間與臨江王伺間隙而與之也魏其矦竇嬰班志魏其矦國屬琅邪郡予讀曰與間古莧翻臨江王既為書謝上因自殺竇太后聞之怒後竟以危法中都而殺之師古曰謂構成其罪中竹仲翻𫝊考異曰史記本紀後二年正月郅將軍擊匈奴酷吏郅都死後宗室多犯法上乃召甯成為中尉成為中尉在中六年則後二年所謂郅將軍者非都也疑别一人漢書紀無郅將軍事夏四月有星孛于西北孛蒲内翻立皇子越為廣川王寄為膠東王廣川王彭祖王趙故立越為王膠東王徹為太子故立寄為王秋九月甲戌晦日有食之初梁孝王以至親有功梁王以母弟之親又有破吳楚之功得賜天子旌旗從千乗萬騎出蹕入警王寵信羊勝公孫詭以詭為中尉勝詭多竒邪計欲使王求為漢嗣栗太子之廢也太子榮栗姬之子故號栗太子太后意欲以梁王為嗣嘗因置酒謂帝曰安車大駕用梁王為寄帝跪席舉身曰諾罷酒帝以訪諸大臣大臣袁盎等曰不可昔宋宣公不立子而立弟以生禍亂五世不絶宋宣公舍其子與夷而立穆公穆公又舍其子馮而立與夷其後馮卒與與夷爭國見春秋傳小不忍害大義故春秋大居正公羊傳之言由是太后議格遂不復言格音閣止也王又嘗上書願賜容車之地徑至長樂宫自使梁國士衆築作甬道朝太后甬余拱翻朝直遥翻袁盎等皆建以為不可建建議也梁王由此怨袁盎及議臣乃與羊勝公孫詭謀隂使人刺殺袁盎及他議臣十餘人刺七亦翻賊未得也於是天子意梁意梁者以意測度知其為梁所為也逐賊果梁所為上遣田叔吕季主往按梁事捕公孫詭羊勝詭勝匿王後宫使者十餘輩至梁責二千石急梁相軒丘豹及内史韓安國以下舉國大索姓譜楚文王庶子食采於軒丘其後為氏索山客翻月餘弗得安國聞詭勝匿王所乃入見王而泣曰主辱者臣死大王無良臣故紛紛至此今勝詭不得請辭賜死王曰何至此安國泣數行下曰大王自度於皇帝孰與臨江王親王曰弗如也安國曰臨江王適長太子行户剛翻度徒洛翻適讀曰嫡長知兩翻以一言過師古曰景帝常屬諸姬子栗姬言不遜由是廢太子廢王臨江用宫垣事卒自殺中尉府王于況翻卒子恤翻下同何者治天下終不用私亂公治直之翻今大王列在諸侯訹邪臣浮説訹音戌誘也犯上禁橈明法橈奴敎翻天子以太后故不忍致法於大王太后日夜涕泣幸大王自改大王終不覺寤有如太后宫車即晏駕大王尚誰攀乎語未卒王泣數行而下卒子恤翻行户剛翻謝安國曰吾今出勝詭王乃令勝詭皆自殺出之上由此怨望梁王梁王恐使鄒陽入長安見皇后兄王信説曰説式芮翻下同長君弟得幸於上後宫莫及而長君行迹多不循道理者長知兩翻行下孟翻今袁盎事即窮竟梁王伏誅太后無所發怒切齒側目於貴臣竊為足下憂之為于偽翻下精為同長君曰為之奈何陽曰長君誠能請為上言之得毋竟梁事長君必固自結於太后太后厚徳長君入於骨髓而長君之弟幸於兩宫長君之弟謂皇后也如淳曰兩宫太后宫及帝宫也金城之固也師古曰言其榮寵無極而不可壊故取喻於金城昔者舜之弟象日以殺舜為事及舜立為天子封之於有卑卑音鼻師古及栁宗元皆以為零陵之鼻亭即象所封夫仁人之於兄弟無蔵怒無宿怨厚親愛而已用孟子語意是以後世稱之以是説天子徼幸梁事不奏長君曰諾乗間入言之徼一遥翻間古莧翻帝怒稍解是時太后憂梁事不食日夜泣不止帝亦患之㑹田叔等按梁事來還至霸昌廐霸昌廐在長安東括地志在雍州萬年縣東北三十八里取火悉燒梁之獄辭空手來見帝見賢遍翻帝曰梁有之乎叔對曰死罪有之上曰其事安在田叔曰上毋以梁事為問也上曰何也曰今梁王不伏誅是漢法不行也伏法而太后食不甘味卧不安席此憂在陛下也上大然之使叔等謁太后且曰梁王不知也造為之者獨在幸臣羊勝公孫詭之屬為之耳謹已伏誅死梁王無恙也恙余亮翻太后聞之立起坐餐氣平復梁王因上書請朝朝直遥翻既至闗茅蘭説王使乗布車從兩騎入匿於長公主園服䖍曰茅蘭孝王大夫張晏曰布車降服自比喪人也長公主即館陶長公主嫖漢使使迎王王已入闗車騎盡居外不知王處太后泣曰帝果殺吾子帝憂恐於是梁王伏斧質於闕下謝罪太后帝大喜相泣復如故悉召王從官入闗從才用翻然帝益疏王不與同車輦矣疏與疎同下同帝以田叔為賢拜為魯相相魯王餘也三年冬十一月罷諸侯御史大夫官夏四月地震旱禁酤酒酤工護翻謂賣酒也三月丁巳立皇子乗為清河王髙帝置清河郡於齊趙之間今以為王國秋九月蝗有星孛于西北孛蒲内翻戊戌晦日有食之初上廢栗太子周亞夫固爭之不得上由此疏之而梁孝王每朝常與太后言條侯之短梁王與條侯有隙見前三年竇太后曰皇后兄王信可侯也帝讓曰始南皮章武先帝不侯南皮侯竇彭祖太后弟長君之子章武侯竇廣國太后弟也班志南皮章武皆屬勃海郡及臣即位乃侯之信未得封也竇太后曰人生各以時行耳自竇長君在時竟不得侯死後其子彭祖顧得侯吾甚恨之帝趣侯信也趣讀曰促帝曰請得與丞相議之上與丞相議亞夫曰髙皇帝約非劉氏不得王非有功不得侯今信雖皇后兄無功侯之非約也帝黙然而止其後匈奴王徐盧等六人降降户江翻帝欲侯之以勸後丞相亞夫曰彼背主降陛下背蒲内翻陛下侯之則何以責人臣不守節者乎帝曰丞相議不可用乃悉封徐盧等為列侯徐盧容城侯賜栢侯陸疆遒侯僕䵣易侯范代范陽侯邯鄲翕侯䵣師古音怛亞夫因謝病九月戊戌亞夫免以御史大夫桃侯劉舍為丞相索隱曰桃縣屬信都郡四年夏蝗冬十月戊午日有食之五年夏立皇子舜為常山王髙帝置常山郡屬趙國吕后分為王國文帝併為趙國今復以王舜六月丁巳赦天下大水秋八月己酉未央宫東闕災九月詔諸獄疑若雖文致於法謂原情定罪本不至於死而以律文傅致之而於人心不厭者輒讞之厭服也師古曰一涉翻又於涉翻讞魚列翻又魚蹇翻平議也地震六年冬十月梁王來朝上疏欲留上弗許禇少孫曰諸侯王朝見天子漢法凡當四見耳始到入小見到正月朔旦奉皮薦璧玉賀正月法見後三日為王置酒賜金錢財物後二日復入小見辭去凡留長安不過二十日小見者燕見於禁門内飲於省中王歸國意忽忽不樂樂音洛十一月改諸廷尉將作等官名時改廷尉為大理將作少府為大匠奉常為太常典客為大行令長信詹事為長信少府將行為大長秋主爵中尉為都尉春二月乙卯上行幸雍郊五畤畤音止三月雨雪夏四月梁孝王薨竇太后聞之哭極哀不食曰帝果殺吾子帝哀懼不知所為與長公主計之乃分梁為五國盡立孝王男五人為王買為梁王明為濟川王彭離為濟東王定為山陽王不識為濟隂王梁仍都睢陽濟川國在陳留東郡之間濟東國後入漢為大河郡後又為東平國山陽國即山陽郡濟隂國即濟隂郡濟子禮翻女五人皆食湯沐邑奏之太后太后乃説為帝加一餐説讀曰悦為于偽翻孝王未死時財以巨萬計及死蔵府餘黄金尚四十餘萬斤蔵徂浪翻他物稱是稱尺證翻上既減笞法見上卷元年笞者猶不全乃更減笞三百曰二百笞二百曰一百又定箠令師古曰箠䇿也所以擊者也箠止蕊翻箠長五尺長直亮翻其本大一寸竹也末薄半寸皆平其節當笞者笞臋如淳曰然則先時笞背也臋徒門翻畢一罪乃更人更工衡翻自是笞者得全然死刑既重而生刑又輕民易犯之易以豉翻六月匈奴入雁門至武泉入上郡取苑馬雁門有句注之險如淳曰漢儀注太僕牧師諸苑三十六所分布北邊西邊以郎為苑監官奴婢三萬人養馬三十萬疋師古曰武泉雲中縣也養鳥獸通名曰苑故謂牧馬處曰苑食貨志景帝始造苑馬以廣用吏卒戰死者二千人隴西李廣為上郡太守嘗從百騎出遇匈奴數千騎見廣以為誘騎誘騎者見少以誘敵誘音酉下同皆驚上山陳師古曰為陳以待廣也陳讀曰陣下同廣之百騎皆大恐欲馳還走廣曰吾去大軍數十里今如此以百騎走匈奴追射我立盡射而亦翻下同今我留匈奴必以我為大軍之誘必不敢擊我廣令諸騎曰前未到匈奴陣二里所止令曰皆下馬解鞍其騎曰虜多且近即有急奈何廣曰彼虜以我為走今皆解鞍以示不走用堅其意師古曰示以堅牢令敵意知之於是胡騎遂不敢擊有白馬將出護其兵師古曰將之乗白馬者也護謂監視之將即亮翻李廣上馬與十餘騎犇射殺白馬將而復還至其騎中解鞍令士皆縱馬卧是時㑹暮胡兵終怪之不敢擊夜半時胡兵亦以為漢有伏軍於旁欲夜取之胡皆引兵而去平旦李廣乃歸其大軍秋七月辛亥晦日有食之自郅都之死長安左右宗室多暴犯法上乃召濟南都尉南陽甯成為中尉其治效郅都其㢘弗如然宗室豪傑皆人人惴恐惴之瑞翻城陽共王喜薨共王喜文帝前四年嗣父章爵為王八年徙王淮陽後四年復還城陽至是而薨共讀曰恭後元年春正月詔曰獄重事也人有智愚官有上下獄疑者讞有司有司所不能決移廷尉讞而後不當讞者不為失師古曰假令讞訖其理不當所讞之人不為罪失讞魚列翻又魚蹇翻欲令治獄者務先寛治直之翻三月赦天下夏大酺五日民得酤酒中三年禁民酤酒今弛此禁酺音蒲五月丙戌地震上庸地震二十二日班志上庸縣屬漢中郡壊城垣壊音怪秋七月丙午丞相舍免乙巳晦日有食之八月壬辰以御史大夫衛綰為丞相衛尉南陽直不疑為御史大夫姓譜楚人直弓之後初不疑為郎同舍有告歸悞持其同舍郎金去已而同舍郎覺亡意不疑師古曰疑其盜取不疑謝有之師古曰告云實取買金償後告歸者至而歸金亡金郎大慙以此稱為長者稍遷至中大夫人或廷毁不疑師古曰當廷見之時而毁之以為盜嫂不疑聞曰我乃無兄然終不自明也帝居禁中召周亞夫賜食獨置大胾師古曰胾大臠孔穎達曰熟肉帶骨而臠曰殽純肉而臠曰胾胾側吏翻無切肉又不置箸亞夫心不平顧謂尚席取箸應劭曰尚席主席者也上視而笑曰此非不足君所乎孟康曰設胾無箸者此非不足滿於君所乎嫌恨之也如淳曰非故不足君之食具偶失之也師古曰孟説近之帝言賜君食而不設箸此由我意於君有不足乎亞夫免冠謝上上曰起亞夫因趨出上目送之曰此鞅鞅非少主臣也居無何亞夫子為父買工官尚方甲楯五百被可以𦵏者少詩沼翻為于偽翻楯食尹翻如淳曰工官官名張晏曰被具也五百具甲楯也師古曰被皮義翻取庸苦之不與錢師古曰庸謂賃也苦謂極苦使也余謂亞夫之子無識苦使其人而不與賃錢致其懐怨而禍及其父亞夫之死雖由景帝之少恩其子亦深可罪也庸知其盜買縣官器怨而上變告子上時掌翻事連汙亞夫書既聞上下吏吏簿責亞夫如淳曰簿問其辭情師古曰簿責者書之於簿一一責問之也汙烏故翻下户嫁翻亞夫不對上罵之曰吾不用也孟康曰言不用汝對欲殺之也如淳曰恐獄吏畏其復用事不敢折辱也師古曰孟説是也一云帝責吏云不勝其任吾不用汝故召亞夫令詣廷尉也召詣廷尉廷尉責問曰君侯欲反何亞夫曰臣所買器乃𦵏器也何謂反乎吏曰君縱不欲反地上即欲反地下耳吏侵之益急初吏捕亞夫亞夫欲自殺其夫人止之以故不得死遂入廷尉因不食五日歐血而死是嵗濟隂哀王不識薨濟子禮翻二年春正月地一日三動三月匈奴入鴈門太守馮敬與戰死發車騎材官屯鴈門春以嵗不登禁内郡食馬粟没入之師古曰食讀曰飤以粟食馬者没其馬入官夏四月詔曰雕文刻鏤傷農事者也鏤力豆翻錦繡纂組害女工者也應劭曰纂今五采屬綷是也組今綬紛絛是也臣瓉曰許慎云纂赤組也師古曰瓉説是也綷㑹也㑹五采者今謂之錯綵非纂也綷子内翻絛他牢翻農事傷則飢之本女工害則寒之原也夫飢寒並至而能亡為非者寡矣亡古無字通朕親耕后親桑以奉宗廟粢盛祭服為天下先盛時征翻不受獻減太官省繇賦師古曰省所領翻繇讀曰徭欲天下務農蠶素有蓄積以備災害彊毋攘弱衆毋暴寡老耆以夀終幼孤得遂長師古曰遂成也長知兩翻今嵗或不登民食頗寡其咎安在或詐偽為吏張晏曰以詐偽人為吏也臣瓉曰律所謂矯枉以為吏者也師古曰二説並非也直謂詐自稱吏耳以貨賂為市漁奪百姓侵牟萬民師古曰漁言若漁獵之為也李竒曰牟食苗根蟲也侵牟食民比之蛑賊也杜佑曰牟取也縣丞長吏也姦法與盜盜甚無謂也李斐曰姦法因法作姦也文頴曰與盜謂盜者當治而知情反佐與之是則共盜無異也師古曰與盜盜者共盗為盜耳其令二千石各脩其職不事官職耗亂者師古曰耗不明也讀與眊同音莫報翻丞相以聞請其罪布告天下使明知朕意五月詔算貲四得官服䖍曰貲萬錢算百二十七也應劭曰古者疾吏之貪衣食足知榮辱限貲十算乃得為吏十算十萬也賈人有財不得為吏㢘士無貲又不得官故減貲四算得官矣秋大旱三年冬十月日月皆食赤五日十二月晦雷日如紫五星逆行守太㣲晉天文志太㣲天子廷也五帝座也十二諸侯府也其外蕃九卿也南蕃中二星間曰端門東曰左執法廷尉象也西曰右執法御史大夫象也左執法之東左掖門也右執法之西右掖門也東蕃四星南第一星曰上相其北東太陽門也第二星曰次相其北中華東門也第三星曰次將其北東太隂門也第四星曰上將所謂四輔也西蕃四星第一星曰上將其北西太陽門也第二星曰次將其北中華西門也第三星曰次相其北西太隂門也第四星曰上相次亦四輔也月貫天廷中春正月詔曰農天下之本也黄金珠玉飢不可食寒不可衣以為幣用師古曰幣者所以通有無易貴賤也不識其終始間嵗或不登意為末者衆農民寡也其令郡國務勸農桑益種樹可得衣食物吏發民若取庸韋昭曰發民用其民也取庸取其資以顧庸也采黄金珠玉者坐贓為盜二千石聽者與同罪甲寅皇太子冠冠古玩翻甲子帝崩于未央宫臣瓉曰夀四十八太子即皇帝位年十六尊皇太后為太皇太后皇后為皇太后二月癸酉葬孝景皇帝于陽陵臣瓉曰自崩及葬凡十日三月封皇太后同母弟田蚡為武安侯班志武安縣屬魏郡又據溝洫志蚡封武安而奉邑食清河之鄃蚡房吻翻勝為周陽侯史記正義絳州聞喜縣東二十九里有周陽故城班固贊曰孔子稱斯民也三代之所以直道而行也師古曰此論語載孔子之辭也言今此時之人亦夏殷周之所馭以政化淳壹故能直道而行傷今不然信哉周秦之敝罔密文峻而姦軌不勝師古曰不可勝漢興掃除煩苛與民休息至于孝文加之以恭儉孝景遵業五六十載之間至於移風易俗黎民醇厚師古曰黎衆也醇不澆雜周云成康漢言文景美矣漢興接秦之弊作業劇而財匱自天子不能具鈞駟四馬一色謂之鈞駟而將相或乗牛車師古曰以牛駕車也余據漢時以牛車為賤魏晉以後王公始多乗牛車齊民無蔵盖蘇林曰無物可盖蔵天下已平髙祖乃令賈人不得衣絲乗車重租税以困辱之賈音古衣於既翻孝恵髙后時為天下初定復弛商賈之律然市井之子孫亦不得仕宦為吏量吏禄度官用以賦於民師古曰纔取足量音良度徒洛翻而山川園池市井租税之入自天子以至於封君湯沐邑皆各為私奉養焉不領于天子之經費師古曰言各收其所賦税以自供不入於國朝之倉廪府庫也經常也漕轉山東粟以給中都官師古曰中都官京師諸官府也嵗不過數十萬石繼以孝文孝景清淨恭儉安養天下七十餘年之間國家無事非遇水旱之災民則人給家足都鄙廩庾皆滿而府庫餘貨財京師之錢累鉅萬貫朽而不可校師古曰累鉅萬謂數百萬萬也校謂計數也太倉之粟陳陳相因師古曰陳謂久舊也充溢露積於外至腐敗不可食衆庶街巷有馬而阡陌之間成羣師古曰謂田中之阡陌也乗字牝者擯而不得聚㑹孟康曰皆乗父馬有牝馬間其間則踶齧故斥出不得㑹同師古曰言時富饒恥乗字牝不必以其踶齧也守閭閻者食粱肉為吏者長子孫如淳曰時無事吏不數轉至于生長子孫而不轉職也長知兩翻居官者以為姓號如淳曰貨殖傳倉氏庫氏是也故人人自愛而重犯法先行義而後詘辱焉師古曰以行義為先以愧辱相絀也行下孟翻當此之時罔疏而民富役財驕溢或至兼并豪黨之徒以武斷於鄉曲師古曰恃其豪富則擅行威罰也斷丁亂翻宗室有土師古曰謂國之宗姓受封邑土地者也公卿大夫以下爭於奢侈室廬輿服僣于上無限度物盛而衰固其變也自是之後孝武内窮侈靡外攘夷狄天下蕭然財力耗矣資治通鑑卷十六
