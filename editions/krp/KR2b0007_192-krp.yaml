body:
  text: 資治通鑑巻一百九十二宋司馬光撰胡三省音注唐紀八起柔兆閹茂九月盡著雍困敦七月几二年髙祖神堯大聖光孝皇帝下之下武徳九年九月突厥頡利獻馬三千匹羊萬口上不受自是年八月甲子以後凡稱上者皆太宗也厥九勿翻但詔歸所掠中國户口徴温彦博還朝彦博没于突厥見上巻八年朝直遙翻丁未上引諸衞將卒習射於顯徳殿庭是年八月上即位於東宫顯徳殿是後常御之將即亮翻下同諭之曰戎狄侵盜自古有之患在邊境少安則人主逸遊忘戰少詩照翻下同是以寇來莫之能禦今朕不使汝曹穿池築苑專習弓矢居閒無事則為汝師突厥入寇則為汝將庶㡬中國之民可以少安乎將即亮翻㡬居希翻少始紹翻於是日引數百人教射於殿庭上親臨試中多者賞以弓刀帛其將帥亦加上考唐考功之法上中下皆分三等中多之中竹仲翻帥所類翻羣臣多諫曰於律以兵刃至御在所者絞今使卑碎之人張弓挾矢於軒陛之側陛下親在其間萬一有狂夫竊發出於不意非所以重社稷也韓州刺史封同人詐乗驛馬入朝切諫唐舊志武徳三年分同州之河西韓城郃陽置西韓州又于陜州界置南韓州封同人當是自韓城乗驛入朝也上皆不聴曰王者視四海如一家封域之内皆朕赤子朕一一推心置其腹中奈何宿衞之士亦加猜忌乎由是人思自勵數年之間悉為精鋭上嘗言吾自少經畧四方頗知用兵之要少詩照翻每觀敵陳則知其彊弱陳讀曰陣下其陳同常以吾弱當其彊彊當其弱彼乗吾弱逐奔不過數十百步吾乗其弱必出其陳後反擊之無不潰敗所以取勝多在此也己酉上面定勲臣長孫無忌等爵邑長知兩翻命陳叔達於殿下唱名示之且曰朕叙卿等勲賞或未當宜各自言當丁浪翻於是諸將爭功紛紜不已將即亮翻淮安王神通曰臣舉兵闗西首應義旗事見一百八十四巻隋恭帝義寧元年今房𤣥齡杜如晦等專弄刀筆功居臣上臣竊不服上曰義旗初起叔父雖首唱舉兵蓋亦自營脱禍及竇建徳吞噬山東叔父全軍覆没事見一百八十八巻武徳二年劉黑闥再合餘燼叔父望風奔北事見一百八十九巻四年𤣥齡等運籌帷幄坐安社稷論功行賞固宜居叔父之先叔父國之至親朕誠無所愛但不可以私恩濫與勲臣同賞耳諸將乃相謂曰陛下至公雖淮安王尚無所私吾儕何敢不安其分遂皆悦服儕士皆翻分扶問翻房𤣥齡嘗言秦府舊人未遷官者皆嗟怨曰吾屬奉事左右㡬何年矣今除官反出前宫齊府人之後上曰王者至公無私故能服天下之心朕與卿輩日所衣食皆取諸民者也故設官分職以為民也為于偽翻當擇賢才而用之豈以新舊為先後哉必也新而賢舊而不肖安可捨新而取舊乎今不論其賢不肖而直言嗟怨豈為政之體乎詔民間不得妄立妖祠妖於驕翻自非卜筮正術其餘雜占悉從禁絶上於𢎞文殿聚四部書二十餘萬巻歐陽修曰厯代盛衰文章與時髙下然其變態百出不可窮極何其多也自漢以來史官列其名氏篇第以為六藝七畧至唐始分為四類曰經史子集以甲乙丙丁為次謂之四庫書亦曰四部書置𢎞文館於殿側唐㑹要武徳四年於門下省置修文館至九年三月改為𢎞文館至其年九月太宗即位於𢎞文殿聚四部書二十餘萬巻於殿側置𢎞文館貞觀三年移於納義門西按閣本太極宫圖𢎞文館在門下省東而不載𢎞文殿納義門在嘉徳門之西即我朝之崇文館也避宣祖諱改𢎞為崇精選天下文學之士虞世南禇亮姚思亷歐陽詢蔡允恭蕭徳言等以本官兼學士令更日宿直聴朝之隙引入内殿講論前言往行商𣙜政事或至夜分乃罷唐太宗以武定禍亂出入行間與之俱者皆西北驍武之士至天下既定精選𢎞文館學生日夕與之議論商𣙜者皆東南儒生也然則欲守成者捨儒何以哉更工衡翻朝直遙翻行下孟翻𣙜紇岳翻又取三品已上子孫充𢎞文館學士冬十月丙辰朔日有食之詔追封故太子建成為息王諡曰隠齊王元吉為刺王息古國名諡法隠拂不成曰隠不思忘愛曰刺暴戾無親曰刺諡神至翻刺盧達翻以禮改葬葬日上哭之於宜秋門甚哀太極宫圖宜秋門在千秋殿之西百福門之東魏徴王珪表請陪送至墓所改考異曰髙祖實録建成元吉傳太宗踐阼葬加諡太宗實録及本紀皆不書葬月日唯唐厯在此年十月貞觀政要此表在二年據此年七月魏徴為諫議大夫宣慰山東王珪亦未為黄門侍郎葬建成元吉恐在後但别無月日可附今且從唐厯上許之命宫府舊僚皆送葬癸亥立皇子中山王承乾為太子生八年矣生於承乾殿因以名之庚辰初定功臣實封有差唐爵九等一曰王食邑萬户正一品二曰嗣王郡王食邑五千户從一品三曰國公食邑三千户從一品四曰開國郡公食邑二千户正二品五曰開國縣公食邑千五百户從二品六曰開國縣侯食邑千户從三品七曰開國縣伯食邑七百户正四品上八曰開國縣子食邑五百户正五品上九曰開國縣男食邑三百户從五品上凡封户三丁以上為率嵗租三之一入于朝廷食實封者得真户分食諸州初蕭瑀薦封徳彞於上皇上皇以為中書令及上即位瑀為左僕射徳彞為右僕射議事已定徳彞數反於上前瑀音禹射寅謝翻數所角翻由是有隙時房𤣥齡杜如晦新用事皆疎瑀而親徳彞太宗初政之時以房杜之賢蕭瑀之直而不相親乃親封徳彞者蓋以瑀之疎直難與共事於危疑之時而封徳彞之狡數不與之親宻則不能得其情也後之為相者其心無所權量但曰親君子逺小人未有能濟者也瑀不能平遂上封事論之上時掌翻辭指寥落由是忤㫖忤五故翻㑹瑀與陳叔達忿爭於上前庚辰瑀叔達皆坐不敬免官傳考異曰舊太宗以𤣥齡等功髙由是忤㫖廢於家俄拜少師復為左僕射坐與叔達忿爭免按實録忿爭在作少師前今從之甲申民部尚書裴矩奏民遭突厥暴踐者厥九勿翻踐慈演翻請户給絹一匹上曰朕以誠信御下不欲虚有存恤之名而無其實户有大小豈得雷同給賜乎於是計口為率初上皇欲彊宗室以鎮天下故皇再從三從弟同曽祖為再從兄弟同髙祖為三從兄弟從才用翻及兄弟之子雖童孺皆為王王者數十人封宗室為郡王見一百九十巻五年上從容問羣臣徧封宗子於天下利乎從千容翻封徳彞對曰前世唯皇子及兄弟乃為王自餘非有大功無為王者上皇敦睦九族大封宗室自兩漢以來未有如今之多者爵命既崇多給力役力役蓋防閤庶僕白直之類恐非示天下以至公也上曰然朕為天子所以養百姓也豈可勞百姓以養己之宗族乎十一月庚寅降宗室郡王皆為縣公惟有功者數人不降丙午上與羣臣論止盜或請重法以禁之上哂之笑不壞顔為哂哂式忍翻曰民之所以為盜者由賦繁役重官吏貪求饑寒切身故不暇顧亷恥耳朕當去奢省費去羌吕翻輕徭薄賦選用亷吏使民衣食有餘則自不為盜安用重法邪邪音耶自是數年之後海内升平路不拾遺外户不閉商旅野宿焉上又嘗謂侍臣曰君依於國國依於民刻民以奉君猶割肉以充腹腹飽而身斃君富而國亡故人君之患不自外來常由身出夫欲盛則費廣費廣則賦重賦重則民愁民愁則國危國危則君喪矣夫音扶喪息浪翻朕常以此思之故不敢縱欲也十二月己巳益州大都督竇軌奏稱獠反是年六月廢大行臺置大都督府是後分諸州都督府為上中下三等大州都督從二品長史從三品司馬從四品中州都督正三品别駕正四品長史正五品上司馬正五品下下州都督從三品别駕長史司馬亦皆逓降一等僚魯皓翻請發兵討之上曰獠依阻山林時出鼠竊乃其常俗牧守茍能撫以恩信自然帥服守式又翻帥與率同安可輕動干戈漁獵其民比之禽獸豈為民父母之意邪邪音耶竟不許上謂裴寂曰比多上書言事者比毗至翻朕皆粘之屋壁粘女亷翻得出入省覽每思治道或深夜方寢公輩亦當恪勤職業副朕此意上厲精求治數引魏徴入卧内訪以得失省悉景翻治直吏翻數所角翻下者數同徴知無不言上皆欣然嘉納上遣使㸃兵使疏吏翻封徳彝奏中男雖未十八其軀幹壯大者亦可并㸃唐制民年十六為中男十八始成丁二十一為丁充力役上從之敕出魏徴固執以為不可不肯署敕按唐制中書舍人則署敕魏徴時為諫議大夫抑太宗亦使之連署邪至於數四上怒召而讓之曰中男壯大者乃姦民詐妄以避征役取之何害而卿固執至此對曰夫兵在御之得其道不在衆多陛下取其壯健以道御之足以無敵於天下何必多取細弱以増虚數乎且陛下每云吾以誠信御天下欲使臣民皆無欺詐今即位未㡬失信者數矣㡬居豈翻數所角翻上愕然曰朕何為失信對曰陛下初即位下詔云逋負官物悉令蠲免蠲圭淵翻有司以為負秦府國司者非官物徴督如故陛下以秦王升為天子國司之物非官物而何又曰闗中免二年租調闗外給復一年既而繼有敕云已役已輸者以來年為始散還之後方復更徴調徒弔翻給復方目翻方復扶又翻下復㸃同言既散還其已輸之物而復徴之百姓固已不能無怪今既徴得物復㸃為兵何謂以來年為始乎又陛下所與共治天下者在於守宰治直之翻守式又翻居常簡閲咸以委之至於㸃兵獨疑其詐豈所謂以誠信為治乎治直吏翻下同上悦曰曏者朕以卿固執疑卿不達政事今卿論國家大體誠盡其精要夫號令不信則民不知所從天下何由而治乎夫音扶治直吏翻下同朕過深矣乃不㸃中男賜徴金甕一上聞景州録事參軍張𤣥素名景州漢平原郡鬲縣地隋置弓髙縣屬觀州唐平河北分弓髙置景州上州録事參軍從七品上掌勾稽省署抄目録事掌受事發辰兼勾稽失召見問以政道對曰隋主好自専庶務好呼到翻不任羣臣羣臣恐懼唯知禀受奉行而已莫之敢違以一人之智决天下之務借使得失相半乖謬已多下諛上蔽不亡何待陛下誠能謹擇羣臣而分任以事髙拱穆清而考其成敗以施刑賞何憂不治又臣觀隋末亂離其欲爭天下者不過十餘人而已其餘皆保鄉黨全妻子以待有道而歸之耳乃知百姓好亂者亦鮮但人主不能安之耳好呼到翻鮮悉善翻上善其言擢為侍御史前幽州記室直中書省張藴古上大寶箴唐諸州無記室唯王國有記室參軍從六品上藴古蓋廬江王瑗督幽州時為記室也唐制資序未至以它官入省者為直上時掌翻其畧曰聖人受命拯溺亨屯屯陟倫翻故以一人治天下不以天下奉一人又曰壯九重於内所居不過容膝治直之翻重直龍翻彼昏不知瑶其臺而瓊其室羅八珍於前所食不過適口周禮膳夫珍用八物注云珍謂淳熬淳毋炮豚炮䍧擣珍漬熬肝膋也淳之純翻毋莫胡翻一音武由翻䍧作郎翻膋力彫翻惟狂罔念丘其糟而池其酒又曰勿没没而闇勿察察而明雖冕旒蔽目而視於未形雖黈纊塞耳而聴於無聲冕而前旒所以蔽明黈纊充耳所以塞聰師古曰以黄綿為圜用兩組掛之於冕垂兩耳旁示不外聴也黈他口翻塞悉則翻上嘉之賜以束帛唐制凡賜十段其率絹三匹布三端綿四屯若雜綵十段則絲布二匹紬二匹綾二匹縵四匹若賜蕃客錦綵率十段則錦一張綾二匹縵四匹綿四屯凡時服稱一具者全給之一副者減給之正冬之㑹稱賜束帛有差者五品已上五匹六品已下一匹命婦視其夫子除大理丞大理丞正六品掌分判寺事上召傅奕賜之食謂曰汝前所奏㡬為吾禍事見上巻是年六月㡬居依翻然凡有天變卿宜盡言皆如此勿以前事為懲也上嘗謂奕曰佛之為教𤣥妙可師卿何獨不悟其理對曰佛乃胡中桀黠㸃户八翻誑耀彼土中國邪僻之人取老莊𤣥談飾以妖幻之語用欺愚俗無益於民有害於國臣非不悟鄙不學也上頗然之上患吏多受賕枉法受賂曰賕賕音求宻使左右試賂之有司門令史受絹一匹司門郎屬刑部掌天下門闗出入往來之籍賦而審其政有令史六人唐令布帛皆闊尺八寸長四丈為匹上欲殺之民部尚書裴矩諫曰為吏受賂罪誠當死但陛下使人遺之而受遺于季翻乃陷人於法也恐非所謂道之以徳齊之以禮引論語孔子之言道讀曰導上悦召文武五品已上告之曰裴矩能當官力爭不為面從儻每事皆然何憂不治治直吏翻臣光曰古人有言君明臣直裴矩佞於隋而忠於唐非其性之有變也君惡聞其過則忠化為佞君樂聞直言則佞化為忠烏烏路翻樂音洛是知君者表也臣者景也表動則景隨矣是嵗進皇子長沙郡王恪為漢王宜陽郡王祐為楚王新羅百濟髙麗三國有宿仇北史曰新羅本辰韓種在髙麗東南亦曰秦韓相傳秦世亡人避役來適馬韓割東界居之故名秦韓始有六國稍分為十二新羅其一也或稱魏母丘儉破髙麗奔沃沮後復國其留者為新羅兼有沃沮不耐韓濊之地其王本百濟人自海逃入新羅遂王其國附庸百濟後致彊盛因與百濟為敵百濟伐髙麗來請救悉兵往破之自是相攻不置後獲百濟王殺之滋結怨麗力知翻迭相攻擊上遣國子助教朱子奢往諭指晉武帝咸寧四年立國子學置祭酒博士各一人助教十五人以教生徒孝武太元十年損助教為十人唐助教五人從六品上掌佐博士分經教授三國皆上表謝罪上時掌翻太宗文武大聖大廣孝皇帝上之上諱世民髙祖次子也帝初諡文皇帝廟號太宗咸亨五年追諡太宗文武聖皇帝天寶八載追尊太宗文武大聖皇帝十三載又加尊太宗文武大聖大廣孝皇帝貞觀元年春正月乙酉改元觀古玩翻丁亥上宴羣臣奏秦王破陳樂陳讀曰陣新志太宗為秦王破劉武周軍中相與作秦王破陳樂曲上曰朕昔受委專征民間遂有此曲雖非文徳之雍容然功業由茲而成不敢忘本封徳彞曰陛下以神武平海内豈文徳之足比上曰戡亂以武守成以文文武之用各隨其時卿謂文不及武斯言過矣徳彝頓首謝己亥制自今中書門下及三品以上入閤議事皆命諫官隨之有失輒諫程大昌曰唐西内太極殿即朔望受朝之所蓋正殿也太極之北有兩儀殿即常日視朝之所太極殿兩廡有東西二上閤則是兩閤皆有門可入已又可轉北而入兩儀也此太宗時入閤之制也至髙宗以後多居東内御宣政前殿則謂之衙衙有仗御紫宸便殿則謂之入閤其不御宣政前殿而御紫宸也乃自正衙喚仗由閤門而入百官候朝于衙者因隨而入見謂之入閤上命吏部尚書長孫無忌等與學士法官更議定律令長知兩翻寛絞刑五十條為斷右趾斷丁管翻上猶嫌其慘曰肉刑廢已久宜有以易之蜀王法曹參軍裴𢎞獻唐制諸王有功倉户兵騎法士等七曹參軍正七品上請改為加役流徙三千里居作三年詔從之異考曰新舊刑法志皆云居作二年今從王溥㑹要上以兵部郎中戴胄忠清公直兵部郎中掌判帳及天下武官之階品衞府之名數擢為大理少卿少始照翻上以選人多詐冒資䕃敕令自首不首者死選息絹翻下同首手又翻未㡬有詐冒事覺者㡬居豈翻上欲殺之胄奏據法應流上怒曰卿欲守法而使朕失信乎對曰敕者出於一時之喜怒法者國家所以布大信於天下也陛下忿選人之多詐故欲殺之而既知其不可復斷之以法斷丁亂翻此乃忍小忿而存大信也上曰卿能執法朕復何憂復扶又翻下不復朕復何復同胄前後犯顔執法言如涌泉上皆從之天下無寃獄上令封徳彞舉賢久無所舉上詰之詰去吉翻對曰非不盡心但於今未有竒才耳上曰君子用人如器各取所長古之致治者豈借才於異代乎治直吏翻正患己不能知安可誣一世之人徳彝慙而退御史大夫杜淹奏諸司文案恐有稽失請令御史就司檢校上以問封徳彝對曰設官分職各有所司果有愆違御史自應糾舉若徧厯諸司搜摘疵纇摘他狄翻纇盧對翻太為煩碎淹黙然上問淹何故不復論執對曰天下之務當盡至公善則從之徳彝所言真得大體臣誠心服不敢遂非上悦曰公等各能如是朕復何憂右驍衞大將軍長孫順徳受人餽絹事覺長知兩翻驍堅堯翻上曰順徳果能有益國家朕與之共有府庫耳何至貪冒如是乎冒莫北翻猶惜其有功不之罪但於殿庭賜絹數十匹大理少卿胡演曰順徳枉法受財罪不可赦柰何復賜之絹上曰彼有人性得絹之辱甚於受刑如不知愧一禽獸耳殺之何益辛丑天節將軍燕郡王李藝據涇州反宜州道為天節軍置將軍一人燕因肩翻藝之初入朝也武徳五年藝引兵與太子建成㑹討劉黑闥遂入朝朝直遙翻恃功驕倨秦王左右至其營藝無故敺之敺烏口翻上皇怒收藝繫獄既而釋之上即位藝内不自安曹州妖巫李五戒妖於驕翻謂藝曰王貴色已發勸之反藝乃詐稱奉宻敕勒兵入朝遂引兵至豳州豳州治中趙慈皓馳出謁之諸州治中即别駕藝入據豳州詔吏部尚書長孫無忌等為行軍總管以討之長知兩翻趙慈皓聞官軍將至宻與統軍楊岌圖之岌魚及翻事洩藝囚慈皓岌在城外覺變勒兵攻之藝衆潰弃妻子將奔突厥至烏氏厥九勿翻漢烏氏縣屬安定郡故城在彈箏峽東氏音支左右斬之傳首長安弟夀為利州都督亦坐誅初隋末喪亂喪息浪翻豪傑並起擁衆據地自相雄長唐興相帥來歸上皇為之割置州縣以寵禄之帥讀曰率長知兩翻為于偽翻由是州縣之數倍於開皇大業之間上以民少吏多思革其弊少詩沼翻二月命大加併省因山川形便分為十道一曰闗内二曰河南三曰河東四曰河北五曰山南六曰隴右七曰淮南八曰江南九曰劒南十曰嶺南京兆同華商岐邠隴涇原寧慶鄜坊丹延靈㑹鹽夏綏銀豐勝為闗内道洛汝陜虢鄭滑許潁陳蔡汴宋亳徐濠宿鄆齊曹濮青淄登萊棣兖海近宻為河南道蒲晉絳汾濕并南汾遼沁嵐石忻代朔蔚澤潞為河東道懷孟魏博相衞澶貝邢洺磁恒冀深趙滄景徳易定幽涿瀛莫燕檀營平為河北道荆峽歸䕫澧朗忠涪萬襄唐隨鄧均房郢復金梁洋利鳳興成扶文壁巴蓬通開隆果渠為山南道秦渭河鄯蘭階洮岷廓疊宕涼𤓰沙甘肅為隴右道楊楚滁和夀廬舒光蘄黄安申為淮南道潤常蘇湖杭睦越衢婺括台福建泉宣歙池洪江鄂岳饒信䖍吉袁橅潭衡永道郴邵黔辰夷思僰為江南道益嘉眉邛簡資巂雅南㑹翼維松姚恭戎梓遂綿劒合龍普渝陵榮瀘為劒南道廣番循潮南康瀧端新封南宕春羅南石髙南合崖振邕南方南簡淳欽南尹象藤桂梧賀連南昆靜樂南恭融容牢南林南扶南越南義交陸峯愛南徳為嶺南道三月癸巳皇后帥内外命婦親蠶内命婦宫内女官自貴妃至侍巾亦分九品外命婦有六王嗣王郡王之母妻為妃一品之國公母妻為國夫人三品以上母妻為郡夫人四品母妻為郡君五品母妻為縣君勲官四品有封者母妻為鄉君凡外命婦朝參視夫子之品唐制皇后以季春吉已享先蠶遂以親桑輿服志皇后親蠶服鞠衣黄羅為之帥讀曰率閏月癸丑朔日有食之壬申上謂太子少師蕭瑀曰朕少好弓矢少詩照翻瑀音禹好呼到翻得良弓十數自謂無以加近以示弓工乃曰皆非良材朕問其故工曰木心不直則脉理皆邪弓雖勁而發矢不直朕始悟曏者辯之未精也朕以弓矢定四方識之猶未能盡况天下之務其能徧知乎乃令京官五品以上京官即在京職事官也更宿中書内省更工衡翻數延見問以民間疾苦政事得失數所角翻下數與同凉州都督長樂王幼良性麤暴樂音洛左右百餘人皆無賴子弟侵暴百姓又與羌胡互市或告幼良有異志上遣中書令宇文士及馳驛代之并按其事左右懼謀劫幼良入北虜又欲殺士及據有河西復有告其謀者復扶又翻下汗復復與同夏四月癸巳賜幼良死五月苑君璋帥衆來降帥讀曰率降户江翻下同初君璋引突厥陷馬邑殺髙滿政事見一百九十巻髙祖武徳六年厥九勿翻退保恒安隋朔州雲内縣之恒安鎮即後魏所都之平城也唐後置雲州及雲中縣恒户登翻其衆皆中國人多弃君璋來降君璋懼亦降請捍北邊以贖罪上皇許之君璋請約契上皇使鴈門人元普賜之金券鴈門縣帶代州漢廣武縣地頡利可汗復遣人招之頡奚結翻可從刋入聲汗音寒君璋猶豫未决恒安人郭子威説君璋以恒安地險城堅説輸芮翻突厥方彊且當倚之以觀變未可束手於人君璋乃執元普送突厥復與之合數與突厥入寇數所角翻至是見頡利政亂知其不足恃遂帥衆來降苑君璋與劉武周同起至是始降上以君璋為隰州都督芮國公芮古國名有上書請去佞臣者上時掌翻去羌吕翻上問佞臣為誰對曰臣居草澤不能的知其人願陛下與羣臣言或陽怒以試之彼執理不屈者直臣也畏威順㫖者佞臣也上曰君源也臣流也濁其源而求其流之清不可得矣君自為詐何以責臣下之直乎朕方以至誠治天下見前世帝王好以權譎小數接其臣下者常竊恥之治直之翻好呼到翻譎古穴翻卿策雖善朕不取也六月辛巳右僕射宻明公封徳彝薨諡法思慮果逺曰明注云自任近乎專壬辰復以太子少師蕭瑀為左僕射蕭瑀去年免官復扶又翻下第復同少始照翻瑀音禹戊申上與侍臣論周秦修短蕭瑀對曰紂為不道武王征之周及六國無罪始皇滅之得天下雖同人心則異上曰公知其一未知其二周得天下増修仁義秦得天下益尚詐力此修短之所以殊也蓋取之或可以逆得守之不可以不順故也瑀謝不及山東大旱詔所在賑恤無出今年租賦賑津忍翻秋七月壬子以吏部尚書長孫無忌為右僕射無忌與上為布衣交加以外戚有佐命功無忌皇后之兄以佐誅建成元吉為功長知兩翻上委以腹心其禮遇羣臣莫及欲用為宰相者數矣歐陽修曰唐因隋制以三省之長尚書令侍中中書令共議國政此宰相職也後以太宗為尚書令臣下避不敢居其職由是僕射為尚書省長官與侍中中書令號為宰相其品位既崇不欲輕以授人故常以他官居宰相職而假以他名如杜淹以吏部尚書參議朝政魏徴以祕書監參預朝政或曰參議得失參知政事之類其名非一皆宰相職也數所角翻文徳皇后固請曰妾備位椒房家之貴寵極矣誠不願兄弟復執國政吕霍上官可為切骨之戒幸陛下矜察上不聴卒用之卒子恤翻初突厥性淳厚政令質畧頡利可汗得華人趙徳言委用之厥九勿翻頡奚結翻可從刋入聲汗音寒華人謂中國人也華讀如字徳言專其威福多變更舊俗政令煩苛國人始不悦頡利又好信任諸胡而疎突厥胡人貪冒多反覆兵革嵗動數興兵討其反覆者故無寧嵗更工衡翻好呼到翻冒莫北翻㑹大雪深數尺深式鴆翻雜畜多死連年饑饉民皆凍餒頡利用度不給重斂諸部畜許救翻斂力贍翻由是内外離怨諸部多叛兵浸弱言事者多請擊之上以問蕭瑀長孫無忌瑀音禹長知兩翻曰頡利君臣昏虐危亡可必今擊之則新與之盟不擊恐失機㑹如何而可瑀請擊之無忌對曰虜不犯塞而弃信勞民非王者之師也上乃止上問公卿以享國久長之策蕭瑀言三代封建而久長秦孤立而速亡上以為然於是始有封建之議黄門侍郎王珪有宻奏附侍中髙士亷寢而不言上聞之八月戊戌出士亷為安州大都督九月庚戌朔日有食之辛酉中書令宇文士及罷為殿中監御史大夫杜淹參預朝政朝直遙翻也考異曰實録云杜淹署位不知所謂署位何今從新書宰相表是時宰相無定名或云參預朝政或云參知機務之類甚衆不知其入銜否也如李靖三兩日一至門下中書平章政事魏徴朝章國典參議得失之類則决不入銜矣它官參預政事自此始淹薦刑部員外郎邸懷道刑部郎掌貳尚書侍郎舉其典憲而辯其輕重邸丁禮翻姓也後魏有邸珍上問其行能行下孟翻對曰煬帝將幸江都召百官問行留之計懷道為吏部主事唐承隋志尚書諸司皆有主事從九品上獨言不可臣親見之上曰卿稱懷道為是何為自不正諫對曰臣爾時不居重任又知諫不從徒死無益上曰卿知煬帝不可諫何為立其朝既立其朝何得不諫卿仕隋容可云位卑後仕王世充尊顯矣何得亦不諫對曰臣於世充非不諫但不從耳上曰世充若賢而納諫不應亡國若暴而拒諫卿何得免禍淹不能對上曰今日可謂尊任矣可以諫未對曰願盡死上笑辛未幽州都督王君廓謀叛道死君廓在州驕縱多不法徴入朝朝直遙翻下同長史李𤣥道房𤣥齡從甥也從才用翻憑君廓附書君廓私發之不識草書疑其告己罪行至渭南後魏於新豐鄭縣之間置渭南郡隋廢郡為縣屬京兆尹在長安東一百一十五里殺驛吏而逃將奔突厥厥九勿翻為野人所殺嶺南酋長馮盎談殿等迭相攻擊談姓殿名姓譜蜀録云晉有征東將軍談巴酋慈由翻長知兩翻久未入朝朝直遙翻諸州奏稱盎反前後以十數上命將軍藺謩等發江嶺數十州兵討之魏徵諫曰中國初定嶺南瘴癘險遠不可以宿大兵且盎反狀未成未宜動衆上曰告者道路不絶何云反狀未成對曰盎若反必分兵據險攻掠州縣今告者已數年而兵不出境此不反明矣諸州既疑其反陛下又不遣使鎮撫使疏吏翻下同彼畏死故不敢入朝若遣信臣示以至誠彼喜於免禍可不煩兵而服上乃罷兵冬十月乙酉遣員外散騎侍郎李公掩持節慰諭之散悉亶翻騎竒寄翻前考異曰魏文貞公故事作李公淹又有蒲州刺史韋叔諧偕行今從實録盎遣其子智戴隨使者入朝上曰魏徴令我發一介之使而嶺表遂安使疏吏翻朝直遙翻勝十萬之師不可不賞賜徴絹五百匹十二月壬午左僕射蕭瑀坐事免瑀音禹戊申利州都督李孝常等謀反伏誅孝常因入朝留京師與右武衞將軍劉徳裕及其甥統軍元𢎞善監門將軍長孫安業互説符命謀以宿衞兵作亂監工銜翻長知兩翻安業皇后之異母兄也嗜酒無賴父晟卒卒子恤翻弟無忌及后並幼安業斥還舅氏髙士亷無忌及后之舅也及上即位后不以舊怨為意恩禮甚厚及反事覺后涕泣為之固請曰泣為于偽翻安業罪誠當萬死然不慈於妾天下知之今寘以極刑人必謂妾所為恐亦為聖朝之累累力瑞翻由是得減死流巂州巂音髓或告右丞魏徴私其親戚上使御史大夫温彦博按之無狀言無其事狀彦博言於上曰徴不存形迹逺避嫌疑逺於願翻心雖無私亦有可責上令彦博讓徴且曰自今宜存形迹它日徴入見見賢遍翻下進見同言於上曰臣聞君臣同體宜相與盡誠若上下俱存形迹則國之興喪尚未可知喪息浪翻臣不敢奉詔上瞿然曰吾已悔之瞿九遇翻徴再拜曰臣幸得奉事陛下願使臣為良臣勿為忠臣上曰忠良有以異乎對曰稷契臯陶君臣協心俱享尊榮所謂良臣契息列翻陶音遙龍逢比干面折廷爭身誅國亡所謂忠臣逢皮江翻折之舌翻爭讀曰諍上悦賜絹五百匹上神采英毅羣臣進見者皆失舉措上知之每見人奏事必假以辭色冀聞規諫嘗謂公卿曰人欲自見其形必資明鏡君欲自知其過必待忠臣茍其君愎諫自賢愎符逼翻其臣阿諛順㫖君既失國臣豈能獨全如虞世基等謟事煬帝以保富貴煬帝既弑世基等亦誅事見二百八十五巻髙祖武徳元年公輩宜用此為戒事有得失毋惜盡言或上言秦府舊兵宜盡除武職追入宿衞上時掌翻上謂之曰朕以天下為家惟賢是與豈舊兵之外皆無可信者乎汝之此意非所以廣朕徳於天下也上謂公卿曰昔禹鑿山治水而民無謗讟者與人同利故也治直之翻秦始皇營宫室而人怨叛者病人以利己故也夫靡麗珍竒固人之所欲夫音扶若縱之不已則危亡立至朕欲營一殿材用己具鑒秦而止王公已下宜體朕此意由是二十年間風俗素朴衣無錦繡公私富給上謂黄門侍郎王珪曰國家本置中書門下以相檢察中書詔敕或有差失則門下當行駮正中書出命門下審駮按唐制凡詔㫖制敕璽書冊命皆中書舍人起草進畫既下則署行而過門下省有不便者塗竄而奏還謂之塗歸駮北角翻人心所見互有不同茍論難往來務求至當難乃旦翻當丁浪翻捨己從人亦復何傷比來或獲己之短遂成怨隙復扶又翻比毗至翻或茍避私怨知非不正言知其非而不加駮正也順一人之顔情為兆民之深怨此乃亡國之政也煬帝之世内外庶官務相順從當是之時皆自謂有智禍不及身及天下大亂家國兩亡雖其間萬一有得免者亦為時論所貶終古不磨卿曹各當徇公忘私勿雷同也上謂侍臣曰吾聞西域賈胡得美珠剖身以藏之賈音古有諸侍臣曰有之上曰人皆知彼之愛珠而不愛其身也吏受賕抵法與帝王徇奢欲而亡國者何以異於彼胡之可笑邪賕音求邪音耶魏徴曰昔魯哀公謂孔子曰人有好忘者徙宅而忘其妻孔子曰又有甚者桀紂乃忘其身亦猶是也好呼到翻忘巫放翻上曰然朕與公輩宜戮力相輔庶免為人所笑也青州有謀反者州縣逮捕支黨收繫滿獄詔殿中侍御史安喜崔仁師覆按之曹魏時蘭臺遣御史二人居殿中伺察姦非遂稱殿中侍御史唐從七品下掌朝廷供奉之儀式安喜縣屬定州漢為盧奴安儉二縣地章帝改為安喜慕容垂改安喜為不連後魏復曰安喜後齊廢盧奴縣入安喜隋改曰鮮虞唐復曰安喜仁師至悉脱去杻械去羌吕翻杻女九翻與飲食湯沐寛慰之止坐其魁首十餘人餘皆釋之還報敕使將往决之此時敕使非宦官凡奉敕出使者則謂之敕使使疏吏翻大理少卿孫伏伽謂仁師曰足下平反者多少始照翻反音飜人情誰不貪生恐見徒侣得免未肯甘心深為足下憂之為于偽翻下不為竊為同仁師曰凡治獄當以平恕為本豈可自規免罪規圖也治直之翻知其寃而不為伸邪邪音耶萬一闇短誤有所縱以一身易十囚之死亦所願也伏伽慙而退及敕使至更訊諸囚皆曰崔公平恕事無枉濫請速就死無一人異辭者上好騎射好呼到翻下同騎竒寄翻孫伏伽諫以為天子居則九門大門九重人主之門亦曰九重所謂禁衞九重虎豹九闗皆言九門也行則警蹕非欲茍自尊嚴乃為社稷生民之計也陛下好自走馬射的以娛悦近臣此乃少年為諸王時所為少詩沼翻非今日天子事業也既非所以安養聖躬又非所以儀刑後世臣竊為陛下不取上悦未㡬以伏伽為諫議大夫㡬居豈翻疏考異曰韓琬御史臺記伏伽武徳中自萬年主簿上極諫太宗怒命引出斬之伏伽曰臣寧與闗龍逢遊于地下不願事陛下太宗曰朕試卿耳卿能若是朕何憂杜稷命授之三品宰臣曰伏伽匡陛下之過自主簿授之三品彰陛下之過深矣請授之五品遂拜為諫議大夫按髙祖實録武徳元年伏伽自萬年縣法曹上書髙祖詔授治書侍御史御史臺記誤也今據魏徵故事隋世選人十一月集至春而罷人患其期促至是吏部侍郎觀城劉林甫觀縣古之觀國國語注曰夏啟子太康之弟所封也觀縣漢屬東郡光武改曰衞縣晉魏屬頓丘郡曰衞國縣隋開皇六年改曰觀城縣屬魏州唐屬澶州選須絹翻下同觀古玩翻奏四時聴選隨闕注擬人以為便唐初士大夫以亂離之後不樂仕進官員不充省符下諸州差人赴選州府及詔使樂音洛下遐嫁翻使疏吏翻詔使即前所謂敕使多以赤牒補官至是盡省之勒赴省選集者七千餘人林甫隨才銓叙各得其所時人稱之詔以闗中米貴始分人於洛州選上謂房𤣥齡曰官在得人不在員多命𤣥齡併省留文武總六百四十三員隋祕書監晉陵劉子翼晉陵縣帶常州有學行性剛直朋友有過常面責之李百藥常稱劉四雖復罵人劉子翼第四唐人多以第行相呼學行下孟翻復扶又翻人終不恨是嵗有詔徵之辭以母老不至鄃令裴仁軌鄃縣漢晉屬清河郡中廢隋開皇十六年屬置貝州鄃音輸私役門夫上怒欲斬之殿中侍御史長安李乾祐諫曰法者陛下所與天下共也非陛下所獨有也今仁軌坐輕罪而抵極刑臣恐人無所措手足上悦免仁軌死以乾祐為侍御史唐制殿中侍御史從七品下侍御史從六品下上嘗語及闗中山東人意有同異殿中侍御史義豐張行成跪奏曰義豐漢中山安國縣隋開皇六年改曰義豐屬定州天子以四海為家不當有東西之異恐示人以隘上善其言厚賜之自是每有大政常使預議初突厥既彊敕勒諸部分散有薛延陁迴紇都播骨科幹多濫葛同羅僕固拔野古思結渾斛薛結阿跌契苾白霫等十五部皆居磧北風俗大抵與突厥同厥九勿翻敕勒即鐵勒也薛延陁先與薛種雜居後滅延陁部有之號薛延陁姓一利咥氏回紇先曰袁紇亦曰烏䕶曰烏紇至隋曰韋紇後稱回紇姓藥葛羅氏居薛延陁北娑陵水上距長安七千里都播亦曰都波其地北瀕小海西堅昆南回紇骨利幹居瀚海北多濫葛亦曰多覽葛在薛延陁東瀕同羅水同羅在薛延陁北多濫葛之東距長安七千里而贏僕固亦曰僕骨在多濫葛之東地最北拔野古一曰拔野固或為拔曳固漫散磧北地千里直僕固鄰于靺􅀈思結在延陁故牙渾在諸部最南斛薛居多濫葛北奚結在同羅北阿跌一曰訶跌或為􅎤跌契苾一曰契苾羽在焉耆西北鷹娑川多濫葛之南白霫居鮮卑故地直京師東北五千里與同羅僕固接避薛延陁保奥支水令陘山斛薛之下結之上當有奚字紇音鶻跌徒結翻契欺紇翻苾毗必翻又蒲結翻霤似入翻磧七迹翻曰考異曰舊書敕勒作鐵勒新書云即元魏時髙車或敕勒訛為鐵勒今從新書舊書多濫葛作多覽葛又作多臘葛今從實録唐統紀又舊書僕固或作僕骨按胡語難明以中國字寫之故訛謬不壹今從陳子昂集及僕固懐恩傳薛延陁於諸部為最彊西突厥曷薩那可汗方彊敕勒諸部皆臣之曷薩那徴税無度諸部皆怨曷薩那誅其渠帥百餘人敕勒相帥叛之薛桑葛翻可從刋入聲汗音寒渠帥所類翻相帥讀曰率共推契苾哥楞為易勿真莫賀可汗居貪于山北楞盧登翻貪于山新書作貪汚山又以薛延陁乙失鉢為也咥小可汗咥徒結翻居燕末山北燕因肩翻及射匱可汗兵復振復扶又翻薛延陁契苾二部並去可汗之號以臣之此上皆序隋時事去羌吕翻回紇等六部在鬱督軍山者東屬始畢可汗鬱督軍山在大漠外直長安西北六千里統葉䕶可汗勢衰乙失鉢之孫夷男帥部落七萬餘家附于頡利可汗帥讀曰率下同頡奚結翻亂考異曰舊鐵勒傳云貞觀二年葉䕶可汗死其國大夷異始附于頡利按突厥傳元年薛延陁已叛頡利擊走其欲谷設安得二年始附頡利乎頡利政亂薛延陁與回紇拔野古等相帥叛之頡利遣其兄子欲谷設將十萬騎討之新書阿史那社爾傳以欲谷設為頡利子回紇酋長菩薩將五千騎與戰於馬鬛山大破之將即亮翻騎竒寄翻酋慈由翻長知兩翻菩薄乎翻薩桑葛翻欲谷設走菩薩追至天山部衆多為所虜回紇由是大振薛延陁又破其四設突厥號典兵者為設四設四部帥之典兵者也頡利不能制頡利益衰國人離散㑹大雪平地數尺羊馬多死民大饑頡利恐唐乗其弊引兵入朔州境上揚言㑹獵實設備焉鴻臚卿鄭元璹使突厥還周有大行人之官秦為典客漢景帝曰大行武帝曰大鴻臚梁置十二卿鴻臚為冬卿去大字唐因之掌賔客及凶儀之事璹殊玉翻臚陵如翻言於上曰戎狄興衰專以羊馬為候今突厥民饑畜瘦瘦許救翻下同此將亡之兆也不過三年上然之羣臣多勸上乗間擊突厥上曰新與人盟而背之不信間古莧翻背蒲妹翻利人之災不仁乗人之危以取勝不武縱使其種落盡叛六畜無餘朕終不擊必待有罪然後討之種章勇翻畜許救翻西突厥統葉䕶可汗厥九勿翻可從刋入聲汗音寒䕶考異曰髙祖實録止云葉䕶舊傳作統葉今從之遣真珠統俟斤與髙平王道立來髙平王道立使西突厥見上巻髙祖武徳八年俟渠之翻獻萬釘寶鈿金帶馬五千匹以迎公主頡利不欲中國與之和親數遣兵入寇數所角翻又遣人謂統葉䕶曰汝迎唐公主要須經我國中過統葉䕶患之未成昏二年春正月辛亥右僕射長孫無忌罷從無忌之請也考下文可見長知兩翻時有宻表稱無忌權寵過盛者上以表示之曰朕於卿洞然無疑若各懷所聞而不言則君臣之意有不通又召百官謂之曰朕諸子皆幼視無忌如子非它人所能間也無忌自懼滿盈固求遜位皇后又力為之請間古莧翻為于偽翻上乃許之以為開府儀同三司置六司侍郎副六尚書六司侍郎吏部正四品上餘皆正四品下并置左右司郎中各一人左右司郎中從五品上尚書左丞勾吏户禮十二司右丞管兵刑工十二司左右司郎中各掌副十二司之事以舉正稽違省署符目癸丑吐谷渾寇岷州都督李道彦擊走之吐從暾入聲谷音浴丁巳徙漢王恪為蜀王衞王泰為越王楚王祐為燕王燕因肩翻上問魏徴曰人主何為而明何為而暗對曰兼聴則明偏信則暗昔堯清問下民故有苗之惡得以上聞書吕刑曰皇帝清問下民鰥寡有辭於苗上時掌翻舜明四目達四聰故共鯀驩兜不能蔽也舜明目達聰而難任人故四凶不能逃其罪也共音恭秦二世偏信趙髙以成望夷之禍事見秦紀梁武帝偏信朱异以取臺城之辱事見梁紀隋煬帝偏信虞世基以致彭城閣之變事見隋煬帝紀及髙祖武徳元年是故人君兼聴廣納則貴臣不得擁蔽而下情得以上通也上曰善上謂黄門侍郎王珪曰開皇十四年大旱隋文帝不許賑給而令百姓就食山東比至末年賑津忍翻比必利翻及也天下儲積可供五十年煬帝恃其富饒侈心無厭厭於鹽翻卒亡天下卒子恤翻下同但使倉廪之積足以備凶年其餘何用哉二月上謂侍臣曰人言天子至尊無所畏憚朕則不然上畏皇天之監臨下憚羣臣之瞻仰兢兢業業猶恐不合天意未副人望魏徴曰此誠致治之要治直吏翻下同願陛下慎終如始則善矣上謂房𤣥齡等曰為政莫若至公昔諸葛亮竄廖立李嚴於南夷亮卒而立嚴皆悲泣有死者事見七十二卷魏明帝青龍二年廖力救翻又力弔翻卒子恤翻非至公能如是乎又髙熲為隋相公平識治體隋之興亡繫熲之存没事見隋紀朕既慕前世之明君卿等不可不法前世之賢相也相息亮翻三月戊寅朔日有食之壬子大理少卿胡演進每月囚帳少始照翻囚帳具每月禁繫罪囚之姓名猶今之禁厯也上命自今大辟辟毗亦翻皆令中書門下四品已上自二省長貳而下至諫議大夫也及尚書議之庶無寃濫既而引囚至岐州刺史鄭善果上謂胡演曰善果雖復有罪復扶又翻官品不卑豈可使與諸囚為伍自今三品已上犯罪不須引過聴於朝堂俟進止太極宫承天門左右有東西朝堂朝直遙翻下同闗内旱饑民多賣子以接衣食己巳詔出御府金帛為贖之歸其父母為于偽翻庚午詔以去嵗霖雨今茲旱蝗赦天下詔書畧曰若使年穀豐稔天下乂安移災朕身以存萬國是所願也甘心無吝㑹所在有雨民大悦夏四月己卯詔以隋末亂離因之饑饉暴骸滿野傷人心目宜令所在官司收瘞瘞於計翻初突厥突利可汗建牙直幽州之北主東偏奚霫等數十部多叛突厥來降厥九勿翻可從刋入聲汗音寒霤而立翻降户江翻頡利可汗以其失衆責之及薛延陁回紇等敗欲谷設頡奚結翻紇下没翻敗補邁翻頡利遣突利討之突利兵又敗輕騎奔還騎竒寄翻還從宣翻頡利怒拘之十餘日而撻之突利由是怨隂欲叛頡利頡利數徴兵於突利數所角翻突利不與表請入朝上謂侍臣曰曏者突厥之彊控弦百萬憑陵中夏夏户雅翻用是驕恣以失其民今自請入朝非困窮肯如是乎朕聞之且喜且懼何則突厥衰則邊境安矣故喜然朕或失道它日亦將如突厥能無懼乎卿曹宜不惜苦諫以輔朕之不逮也頡利發兵攻突利丁亥突利遣使來求救頡奚結翻使疏吏翻下同上謀於大臣曰朕與突利為兄弟有急不可不救結兄弟事見上卷髙祖武徳七年然頡利亦與之有盟謂渭橋之盟也見上卷武徳九年奈何兵部尚書杜如晦曰戎狄無信終當負約今不因其亂而取之後悔無及夫取亂侮亡書仲虺之誥之辭夫音扶古之道也丙申契丹酋長帥其部落來降契欺紇翻又音喫酋慈由翻長知兩翻降户江翻下同頡利遣使請以梁師都易契丹上謂使者曰契丹與突厥異類今來歸附何故索之索山客翻師都中國之人盜我土地暴我百姓突厥受而庇之我興兵致討輒來救之彼如魚游釜中何患不為我有借使不得亦終不以降附之民易之也先是上知突厥政亂不能庇梁師都先悉薦翻以書諭之師都不從上遣夏州都督長史劉旻司馬劉蘭成圖之夏户雅翻長知兩翻旻等數遣輕騎踐其禾稼多縱反間離其君臣其國漸虚降者相屬數所角翻騎竒寄翻踐慈演翻間古莧翻屬之欲翻其名將李正寶等謀執師都事洩來奔將即亮翻洩息列翻由是上下益相疑旻等知可取上表請兵上時掌翻上遣右衞大將軍柴紹殿中少監薛萬均擊之少始照翻又遣旻等據朔方東城以逼之克東城見一百九十卷武徳五年師都引突厥兵至城下劉蘭成偃旗卧鼓不出師都宵遁蘭成追擊破之突厥大發兵救師都柴紹等未至朔方數十里與突厥遇奮擊大破之遂圍朔方突厥不能救城中食盡壬寅師都從父弟洛仁殺師都以城降梁師都隋大業末起兵至是而滅從才用翻以其地為夏州夏户雅翻太常少卿祖孝孫以梁陳之音多吳楚周齊之音多胡夷於是斟酌南北考以古聲少始照翻作唐雅樂凡八十四調三十一曲十二和律有七聲十二律凡八十四調隋有皇夏十四曲孝孫制十二和以法天之成數凡三十一曲十二和者一曰豫和二曰順和三曰永和四曰肅和五曰雍和六曰夀和七曰舒和八曰太和九曰昭和十曰休和十一曰正和十二曰承和調徒弔翻和如字詔協律郎張文收與孝孫同修定漢協律都尉佩二千石印綬唐協律郎正八品上屬太常寺六月乙酉孝孫等奏新樂上曰禮樂者蓋聖人縁情以設教耳治之隆替豈由於此治直吏翻御史大夫杜淹曰齊之將亡作伴侣曲北齊之時陽俊之多作六言歌辭淫蕩而拙世俗流傳名為陽五伴侣陳之將亡作玉樹後庭花杜佑曰玉樹後庭花堂堂黄鸝留金釵兩鬢垂並陳後主所造恒與宫中女學士及朝臣唱和為詩太樂令何胥採其尤輕艷者為此曲其聲哀思思相吏翻行路聞之皆悲泣何得言治之隆替不在樂也上曰不然夫樂能感人故樂者聞之則喜夫音扶故樂音洛憂者聞之則悲悲喜在人心非由樂也將亡之政民必愁苦故聞樂而悲耳今二曲具存朕為公奏之為于偽翻公豈悲乎右丞魏徴曰古人稱禮云禮云玉帛云乎哉樂云樂云鍾鼓云乎哉論語載孔子之言樂誠在人和不在聲音也臣光曰臣聞垂能目制方圓心度曲直垂古之巧人度徒洛翻然不能以教人其所以教人者必規矩而已矣聖人不勉而中中竹仲翻不思而得然不能以授人其所以授人者必禮樂而已矣禮者聖人之所履也樂者聖人之所樂也聖人履中正而樂和平所樂音洛下所樂哀樂同又思與四海共之百世傳之於是乎作禮樂焉故工人執垂之規矩而施之器是亦垂之功巳王者執五帝三王之禮樂而施之世是亦五帝三王之治已治直吏翻下同五帝三王其違世已久後之人見其禮知其所履聞其樂知其所樂炳然若猶存於世焉此非禮樂之功邪所樂音洛邪音耶夫禮樂有本有文夫音扶中和者本也容聲者末也二者不可偏廢先王守禮樂之本未嘗須臾去於心行禮樂之文未嘗須臾逺於身興於閨門著於朝廷被於鄉遂比隣遠於願翻被皮義翻朝直遥翻比毗至翻又音毗達於諸侯流於四海自祭祀軍旅至於飲食起居未嘗不在禮樂之中如此數十百年然後治化周浹鳳凰來儀也浹即協翻茍無其本而徒有其末一日行之而百日捨之求以移風易俗誠亦難矣是以漢武帝置協律歌天瑞非不美也不能免哀痛之詔見本紀王莽建羲和考律吕非不精也不能救漸臺之禍王莽令劉歆考定律吕羲和掌之班固取以志律厯漸臺事見漢淮陽王紀漸子亷翻晉武制笛尺調金石非不詳也不能弭平陽之災晉武帝使荀勗定鍾律平陽之災謂懷愍二帝䝉塵也梁武帝立四器調八音非不察也不能免臺城之辱四器謂制四通也事見一百四十五卷天監元年臺城之辱見一百六十二卷太清三年然則韶夏濩武之音具存於世舜樂曰韶禹樂曰夏湯樂曰濩周武王樂曰武夏户雅翻濩户故翻茍其餘不足以稱之稱尺證翻曽不能化一夫况四海乎是猶執垂之規矩而無工與材坐而待器之成終不可得也况齊陳淫昏之主亡國之音蹔奏於庭烏能變一世之哀樂乎蹔與暫同樂音洛而太宗遽云治之隆替不由於樂何發言之易易以䜴翻而果於非聖人也如此夫禮非威儀之謂也夫音扶然無威儀則禮不可得而行矣樂非聲音之謂也然無聲音則樂不可得而見矣譬諸山取其一土一石而謂之山則不可然土石皆去山於何在哉故曰無本不立無文不行記禮器之言奈何以齊陳之音不驗於今世而謂樂無益於治亂何異暏拳石而輕泰山乎必若所言則是五帝三王之樂皆妄也君子於其不知蓋闕如也論語載孔子之言惜哉戊子上謂侍臣曰朕觀隋煬帝集文辭奥博亦知是堯舜而非桀紂然行事何其反也魏徴對曰人君雖聖哲猶當虚已以受人故智者獻其謀勇者竭其力煬帝恃其俊才驕矜自用故口誦堯舜之言而身為桀紂之行行下孟翻曽不自知以至覆亡也上曰前事不逺吾屬之師也畿内有蝗辛卯上入苑中出𤣥武門北入禁苑見蝗掇數枚掇丁活翻又陟劣翻拾取也祝之曰民以穀為命而汝食之寧食吾之肺腸舉手欲吞之左右諫曰惡物或成疾上曰朕為民受災為于偽翻何疾之避遂吞之是嵗蝗不為災上曰朕每臨朝欲發一言未嘗不三思朝直遙翻三息暫翻又如字恐為民害是以不多言給事中知起居事杜正倫曰臣職在記言古者有左右史天子言則左史書之動則右史書之隋始置起居舍人貞觀二年省起居舍人移其職於門下省置起居郎二員以其它官兼者謂之知起居注知起居事陛下之失臣必書之豈徒有害於今亦恐貽譏於後上悦賜帛二百段上曰梁武帝君臣惟談苦空言所談者惟苦行空寂也侯景之亂百官不能乗馬元帝為周師所圍猶講老子百官戎服以聴事見一百六十五卷梁元帝承聖三年此深足為戒朕所好者好呼到翻唯堯舜周孔之道以為如鳥有翼如魚有水失之則死不可暫無耳以辰州刺史裴䖍通隋煬帝故人特䝉寵任而身為弑逆事見一百八十五卷髙祖武徳元年按通鑑紀事各為段凡改段處率空一字别為一節此段頭既空字以字之上合有上字文乃明雖時移事變屢更赦令更工衡翻幸免族夷不可猶使牧民乃下詔除名流驩州貞觀元年改徳州日南郡曰驩州䖍通常言身除隋室以啟大唐自以為功頗有觖望之色觖窺瑞翻又於决翻怨望也及得罪怨憤而死秋七月詔宇文化及之黨萊州刺史牛方裕絳州刺史薛世良廣州都督長史唐奉義隋武牙郎將元禮並除名徙邊長知兩翻武牙郎將即虎牙郎將唐避諱改虎曰武將即亮翻上謂侍臣曰古語有之赦者小人之幸君子之不幸一嵗再赦善人喑啞喑于今翻啞烏下翻夫養稂莠者害嘉穀夫音扶稂魯當翻莠與久翻稂莠皆惡草害稼赦有罪者賊良民故朕即位以來不欲數赦數所角翻恐小人恃之輕犯憲章故也資治通鑑卷一百九十二
