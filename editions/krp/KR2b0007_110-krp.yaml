front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百一十宋司馬光撰胡三省音註晉紀三十二著雍閹茂一年安皇帝乙隆安二年春正月燕范陽王德自鄴帥户四萬南徙滑臺帥讀曰率下同魏衛王儀入鄴收其倉庫追德至河弗及趙王麟上尊號於德上時掌翻德用兄垂故事稱燕王事見一百五卷孝武太元九年改永康三年為元年以統府行帝制統府者諸方鎮皆統於燕王府行帝制者稱制以行事置百官以趙王麟為司空領尚書令慕容法為中軍將軍慕輿㧞為尚書左僕射丁通為右僕射麟復謀反德殺之慕容麟背父叛兄姦詐反覆天下其誰能容之復扶又翻庚子魏王珪自中山南巡至高邑得王永之子憲喜曰王景略之孫也以為本州中正王猛青州北海劇縣人太康中分劇屬東筦郡晉東筦屬徐州晉書載記以北海劇縣書之葢猛自占漢郡縣也然家於魏郡而隱於華隂由是歸秦其子永鎮幽州從苻丕戰死於襄陵故憲流寓高邑今魏以為本州中正則未得青徐葢使之銓叙東夏人士耳領選曹事兼掌門下選曹吏部尚書之職門下侍中常侍給事黄門之職選須絹翻至鄴置行臺鄭樵曰行臺自魏晉有之晉文王討諸葛誕散騎常侍裴秀尚書僕射陳泰以行臺從東海王越帥衆屯許昌以行臺自隨後魏謂之尚書大行臺别置官屬以龍驤將軍日南公和䟦為尚書與左丞賈彞帥吏兵五千人鎮鄴自漢光武委任尚書事歸臺閣謂尚書省曰尚書臺晉惠帝西遷長安置留臺於洛陽主留事於是有留臺之名至拓䟦氏置行臺隨其所置掌一道之事魏書官氏志内入諸姓有素和氏後改為和氏驤思將翻珪自鄴還中山將北歸發卒萬人治直道治直之翻自望都鑿恒嶺至代五百餘里恒嶺恒山之嶺也在上曲陽西北即倒馬闗路晉書地道記謂之鴻上闗山沈括曰北岳恒山今謂之大茂山者是也岳祠舊在下石晉之後稍遷近裏今其地謂之神棚今祠乃在曲陽祠北有望岳亭新晴氣清則望見大茂飛狐路在大茂之西自銀冶寨北出倒馬闗却自石門子令水鋪入缾形梅回兩寨之間至代州然沈括所謂代州乃鴈門也自此亦可至魏之代都但恐非直道耳水經註祁夷水出平舒縣柬東北流逕蘭亭南又東北逕石門闗北舊道出中山故闗也魏土地記代城西九里有平舒城此則古代城也恒户登翻珪恐已既去山東有變復置行臺於中山復扶又翻命衛王儀鎮之以撫軍大將軍略陽公遵為尚書左僕射鎮勃海之合口右將軍尹國督租于冀州聞珪將北還謀襲信都安南將軍長孫嵩執國斬之長知兩翻燕啟倫還至龍城去年寳遣啟崙南觀形勢倫當作崙音盧昆翻言中山已䧟燕主寳命罷兵遼西王農言於寳曰今遷都尚新未可南征宜因成師襲庫莫奚取其牛馬以充軍資更審虚實俟明年而議之寳從之己未北行庚申渡澆洛水澆洛水葢即饒樂水也賢曰水在今營州北唐太宗時奚内附置饒樂都督府㑹南燕王德遣侍郎李延詣寳言涉珪西上西上謂自中山取恒嶺而西歸雲代也上時掌翻中國空虚延追寳及之寳大喜即日引還辛酉魏王珪發中山徙山東六州吏民雜夷十餘萬口以實代此漢髙帝徙關東豪傑以實闗中之策也博陵勃海章武羣盗竝起漢時章武城屬勃海平舒縣界晉武帝泰始元年置章武國後為郡隋廢屬瀛州入平舒縣略陽公遵等討平之廣川太守賀賴盧性豪健廣川縣前漢屬信都國後漢屬清河郡晉屬勃海郡後分為廣川郡守式又翻恥居冀州刺史王輔之下襲輔殺之驅勒守兵掠陽平頓丘諸郡南渡河奔南燕南燕王徳以賴盧為并州刺史封廣甯王西秦王乾歸遣乞伏益州攻凉支陽鸇武允吾三城克之支陽允吾皆漢古縣屬金城郡鸇武城當在二縣之間張寔分支陽屬廣武郡允吾葢仍為金城郡治所劉昫曰唐蘭州廣武縣漢枝陽縣鄯州龍支縣漢允吾縣允吾音鈆牙虜萬餘人而去燕主寳還龍城宮詔諸軍就頓頓者軍行頓舍之地不聴罷散文武將士皆以家屬隨駕駕謂車駕猶漢人言乘輿也遼西王農長樂王盛切諫樂音洛以為兵疲力弱魏新得志未可與敵宜且養兵觀釁寳將從之撫軍將軍慕輿騰曰百姓可與樂成難與圖始用商鞅語意樂音洛今師衆已集宜獨决聖心乘機進取不宜廣采異同以沮大計沮在呂翻寳乃曰吾計决矣敢諫者斬二月乙亥寳出就頓留盛統後事已夘燕軍發龍城慕輿騰為前軍司空農為中軍寳為後軍相去各一頓觀下文連營百里葢三十里為一頓連營百里壬午寳至乙連長上叚速骨宋赤眉等因衆心之憚征役遂作亂凡衛兵皆更畨迭上長上者不畨代也唐官制懐化執㦸長上歸德執㦸長上皆武散階九品長上之官尚矣上時掌翻速骨等皆髙陽王隆舊隊共逼隆子髙陽王崇為主殺樂浪威王宙中牟熙公叚誼及宗室諸王樂浪音洛琅河間王熙素與崇善崇擁佑之故獨得免燕主寳將十餘騎奔司空農營農將出迎左右抱其腰止之曰宜小清澄言衆方亂如水之溷濁宜少俟其定如水之清澄不可輕出也不可便出農引刀將斫之遂出見寳又馳信追慕輿騰癸未寳農引兵還趣大營大營謂寳營也討速骨等農營兵亦厭征役皆棄仗走以佚道使民雖勞不怨以生道殺民雖死不怨殺者違是鮮有不敗者也騰營亦潰寳農犇還龍城長樂王盛聞亂引兵出迎寳農僅而得免會稽王道子忌王殷之逼會工外翻以譙王尚之及弟休之有才略引為腹心尚之説道子曰今方鎮彊盛宰相權輕宜宻樹腹心於外以自藩衛道子從之以其司馬王愉為江州刺史都督江州及豫州之四郡軍事用為形援日夜與尚之謀議以伺四方之隙為庾楷説王殷復舉兵張本説輸芮翻伺相吏翻魏王珪如繁畤宮繁畤縣屬鴈門郡魏築宮於此天平初置繁畤郡隋復為縣唐屬代州畤音止給新徙民田及牛珪畋於白登山酈道元曰今平城東十七里有臺即白登臺臺南對岡阜即白登山見熊將數子師古曰將謂率領也讀如字謂冠軍將軍于栗磾曰冠古玩翻磾丁奚翻卿名勇健能搏此乎對曰獸賤人貴若搏而不勝豈不虚斃一壯士乎乃驅致珪前盡射而獲之射而亦翻珪顧謝之秀容川酋長爾朱羽健從珪攻晉陽中山有功拜散騎常侍環其所居割地三百里以封之此北秀容也為爾朱榮亂魏張本爾朱榮傳云羽健之先世為部落酋帥居爾朱川因氏焉珪初以南秀容川原衍沃欲今居之羽健曰家世奉國給侍左右北秀容既在剗内差近京師豈以沃塉更遷逺地珪許之則北秀容蓋近平城也環音宦酋慈由翻長知兩翻散悉亶翻騎竒寄翻下同柔然數侵魏邉數所角翻尚書中兵郎李先請擊之珪從之大破柔然而還還從宣翻又如字楊軌以其司馬郭緯為西平相帥步騎二萬北赴郭黁秃髪烏孤遣其弟車騎將軍傉檀帥騎一萬助軌緯于季翻相息亮翻帥讀曰率黁奴昆翻傉奴沃翻軌至姑臧營于城北燕尚書頓丘王蘭汗隂與叚速骨等通謀引兵營龍城之東城中留守兵至少汗音寒少詩沼翻長樂王盛徙内近城之民得丁夫萬餘乘城以禦之速骨等同謀纔百餘人餘皆為所驅脅莫有鬬志三月甲午速骨等將攻城遼西桓烈王農恐不能守且為蘭汗所誘夜潜出赴之冀以自全農號為有智略乃欲投叚速骨以自全不知適以速死殆天奪之鑒也明旦速骨等攻城城上拒戰甚力速骨之衆死者以百數速骨乃將農循城將如字引也挾也農素有忠節威名城中之衆恃以為彊忽見在城下無不驚愕喪氣喪息浪翻遂皆逃潰速骨入城縱兵殺掠死者狼籍寳盛與慕輿騰餘崇張真李旱趙恩等輕騎南走速骨幽農於殿内長上阿交羅速骨之謀主也騎竒寄翻上時掌翻以髙陽王崇幼弱更欲立農崇親信鬷讓出力犍等聞之鬷祖紅翻春秋左氏傳有鬷蔑晉有鬷戾姓譜鬷姓古鬷夷氏之後犍居言翻丁酉殺羅及農使速骨果立農亦必同死於蘭汗之手葢事勢已去智無所施也速骨即為之誅讓等偽于偽翻農故吏左衛將軍宇文㧞亡奔遼西庚子蘭汗襲擊速骨并其黨盡殺之廢崇奉太子策承制大赦遣使迎寳及於薊城使疏吏翻薊音計寳欲還長樂王盛等皆曰汗之忠詐未可知今單騎赴之萬一汗有異志悔之無及不如南就范陽王合衆以取冀州若其不捷收南方之衆徐歸龍都亦未晚也寳從之龍城燕故都故謂之龍都慕容盛智慮逾其父逺矣離石胡帥呼延鐵西河胡帥張崇等不樂徙代帥所類翻樂音洛聚衆叛魏魏安逺將軍庾岳討平之魏王珪召衛王儀入輔以略陽公遵代鎮中山夏四月壬戌以征虜將軍穆崇為太尉安南將軍長孫嵩為司徒燕主寳從間道過鄴間古莧翻鄴人請留寳不許南至黎陽伏於河西河水自遮害亭屈而東北流過黎陽縣南河之西岸為黎陽界東岸為滑臺界遣中黄門令趙思告北地王鍾曰上以二月得丞相表寳以德為司徒故稱之為丞相即時南征至乙連會長上作亂失據來此人主所據者勢也衆叛親離大勢已去失所據矣王亟白丞相奉迎鍾德之從弟也首勸德稱尊號聞而惡之執思付獄從才用翻惡烏路翻以狀白南燕王德德謂羣下曰卿等以社稷大計勸吾攝政吾亦以嗣帝播越播逋也遷也越逺也走也民神乏主故權順羣議以繫衆心今天方悔禍嗣帝得還吾將具法駕奉迎謝罪行闕何如天子行幸所至有行宮宮前闕門謂之行闕黄門侍郎張華曰今天下大亂非雄才無以寧濟羣生嗣帝闇懦不能紹隆先統陛下若蹈匹夫之節捨天授之業威權一去身首不保况社稷其得血食乎慕輿䕶曰嗣帝不達時宜委棄國都寳棄中山見上卷上年自取敗亡不堪多難難乃旦翻亦已明矣昔蒯聵出奔衛輒不納春秋是之蒯苦怪翻聵五怪翻以子拒父猶可况以父拒子乎德於寳為叔父今趙思之言未明虚實臣請為陛下馳往詗之為于偽翻詗火迥翻又翾正翻候俟也刺探也德流涕遣之流涕遣䕶將使之殺寶也䕶帥壯士數百人帥讀曰率下同隨思而北聲言迎衛其實圖之寳既遣思詣鍾於後得樵者言德已稱制懼而北走䕶至無所見執思以還還從宣翻又如字德以思練習典故欲留而用之思曰犬馬猶知戀主思雖刑臣乞還就上宦者謂之刑臣上謂寳也德固留之思怒曰周室東遷晉鄭是依周平王東遷洛邑晉文侯鄭武寔定王室故周桓公曰我周之東遷晉鄭焉依殿下親則叔父位為上公不能帥先羣后以匡帝室而幸本根之傾為趙王倫之事事見八十九卷惠帝永寧元年言趙王倫以宗室而簒晉德所為類之倫於惠帝叔祖也德於寳叔父也帥讀曰率思雖不能如申包胥之存楚吳破楚入郢申包胥乞師於秦遂破吳師楚昭王復國猶慕龔君賔不偷生於莽世也龔勝字君賔事見三十七卷王莽始建國三年德斬之寳遣扶風忠公慕輿騰與長樂王盛收兵冀州盛以騰素暴横為民所怨乃殺之行至鉅鹿長樂説諸豪傑横戸孟翻樂音洛説輸芮翻皆願起兵奉寳寳以蘭汗祀燕宗廟所為似順意欲還龍城不肯留冀州乃北行至建安建安城在令支之北乙連之南抵民張曹家曹素武健請為寳合衆為于偽翻盛亦勸寳宜且駐留察汗情狀寳乃遣冗從僕射李旱先往見汗冗而隴翻從才用翻寳留頓石城石城縣前漢屬右北平郡後漢晉省縣屬建德郡隋唐併入營州栁城縣界宋白曰石城縣取碣石立如城以名之會汗遣左將軍蘇超奉迎陳汗忠欵寳以汗燕王垂之舅盛之妃父也謂必無他不待旱返遂行盛流涕固諫寳不聴留盛在後盛與將軍張真下道避匿丁亥寶至索莫汗陘索昔各翻汗音寒陘音刑去龍城四十里城中皆喜汗惶怖欲自出請罪怖普布翻兄弟共諫止之汗乃遣弟加難帥五百騎出迎又遣兄堤閉門止仗禁人出入城中皆知其將為變而無如之何加難見寳於陘北拜謁已已者拜謁之禮畢從寳俱進頴隂烈公餘崇宻言於寳曰觀加難形色禍變甚逼宜留三思奈何徑前寳不從行數里加難先執崇崇大呼罵曰汝家幸緣肺附呼火故翻師古曰肺附謂親戚也舊解云肺附如肺腑之相附著一説肺斫木札也喻其輕薄附著大材也䝉國寵榮覆宗不足以報今乃敢謀簒逆此天地所不容計旦暮即屠滅但恨我不得手膾汝曹耳膾細切肉也加難殺之引寳入龍城外邸弑之年四十四汗諡寳曰靈帝殺獻哀太子策及王公卿士百餘人自稱大都督大將軍大單于昌黎王單音蟬改元青龍以堤為太尉加難為車騎將軍封河間王熙為遼東公如杞宋故事周武王封夏之後於杞殷之後於宋長樂王盛聞之馳欲赴哀張真止之盛曰我今以窮歸汗汗性愚淺必念婚姻不忍殺我旬月之間足以展吾情志遂徃見汗汗妻乙氏及盛妃皆泣涕請盛於汗盛妃復頓頭於諸兄弟復扶又翻汗惻然哀之乃舍盛於宮中以為侍中左光祿大夫親待如舊堤加難屢請殺盛汗不從堤驕狠荒滛狠户墾翻事汗多無禮盛因而間之間古莧翻由是汗兄弟浸相嫌忌為盛誅汗張本凉太原公纂將兵擊楊軌郭黁救之纂敗還叚業使沮渠蒙遜攻西郡郡在武威西據嶺之要蒙遜得之故晉昌敦煌皆降沮子余翻執太守呂純以歸純光之弟子也於是晉昌太守王德敦煌太守趙郡孟敏皆以郡降業敦徒門翻降户江翻業封䝉遜為臨池侯以德為酒泉太守敏為沙州刺史六月丙子魏王珪命羣臣議國號皆曰周秦以前皆自諸侯升為天子因以其國為天下號漢氏以來皆無尺土之資我國家百世相承開基代北遂撫有方夏據孔安國尚書註方夏謂四方中夏夏户雅翻今宜以代為號黄門侍郎崔宏曰昔商人不常厥居故兩稱殷商契始封於商皇甫謐曰今上洛商是也契孫相土居商丘自契至于成湯八遷湯始居亳從先王居後仲丁遷於囂河亶甲居相祖乙居耿書曰盤庚五遷將治亳殷從先王居謂從帝嚳所居居亳也代雖舊邦其命維新登國之初已更曰魏事見一百六卷孝武太元十年更工衡翻夫魏者大名神州之上國也左傳卜偃曰魏大名也戰國之時魏為大國中國謂之神州宜稱魏如故珪從之楊軌自恃其衆欲與凉王光决戰郭黁每以天道抑止之言天道未利也郭黁善數故如此黁奴昆翻凉常山公𢎞鎮張掖叚業使沮渠男成及王德攻之光使太原公纂將兵迎之將即亮翻楊軌曰呂𢎞精兵一萬若與光合則姑臧益彊不可取矣乃與秃髪利鹿孤共邀擊纂纂與戰大破之軌奔王乞基王乞基田胡也黁性褊急殘忍不為士民所附褊補典翻聞軌敗走降西秦降户江翻西秦王乾歸以為建忠將軍散騎常侍散悉亶翻騎竒寄翻𢎞引兵棄張掖東走叚業徙治張掖治直之翻將追擊𢎞沮渠蒙遜諫曰歸師勿遏窮寇勿追孫子之言此兵家之戒也業不從大敗而還還從宣翻賴蒙遜以免業城西安以其將臧莫孩為太守業置西安郡於張掖東境孩河開翻蒙遜曰莫孩勇而無謀知進不知退此乃為之築冢非築城也為于偽翻冢知隴翻業不從莫孩尋為呂纂所破燕太原王竒楷之子蘭汗之外孫也汗亦不殺以為征南將軍得入見長樂王盛盛潛使竒逃出起兵竒起兵於建安衆至數千汗遣蘭堤討之盛謂汗曰善駒小兒未能辦此善駒竒小字也豈非有假託其名欲為内應者乎太尉素驕難信不宜委以大衆汗以堤為太尉故稱之汗然之罷堤兵蘇軾有言木必先蠧然後蟲生之人必先疑然後讒入之蘭汗凶逆兄弟自相嫌忌故慕容盛得間之以奮其智報君父之讎更遣撫軍將軍仇尼慕將兵討竒更工衡翻於是龍城自夏不雨至于秋七月汗日詣燕諸廟及寳神座頓首禱請委罪於蘭加難言弑寶者加難之罪堤及加難聞之怒且懼誅乙巳相與率所部襲仇尼慕軍敗之敗補邁翻汗大懼遣太子穆將兵討之將即亮翻穆謂汗曰慕容盛我之仇讎必與竒相表裏此乃腹心之疾不可養也宜先除之汗欲殺盛先引見察之盛妃知之宻以告盛盛稱疾不出蘭妃之為異於雍姬雖曰婦人内夫家而外父母家若蘭妃者處夫妻父母之變得其一而失其一者也汗亦止不殺李旱衞雙劉忠張豪張真皆盛素所厚也而穆引以為腹心旱雙得出入至盛所潛與盛結謀丁未穆擊堤加難等破之庚戌饗將士汗穆皆醉盛夜如厠因踰垣入于東宮與旱等共殺穆時軍未解嚴皆聚在穆舍聞盛得出呼躍爭先攻汗斬之汗子魯公和陳公揚分屯令支白狼令音鈴又郎定翻支音祁盛遣旱真襲誅之堤加難亡匿捕得斬之於是内外帖然士女相慶宇文㧞率壯士數百來赴宇文㧞自遼西來也盛拜㧞為大宗正辛亥告于太廟令曰賴五祖之休五祖謂慕容涉歸廆皝雋垂凡五廟文武之力宗廟社稷幽而復顯不獨孤以眇眇之身免不同天之責禮記曰父之讎不與共戴天凡在臣民皆得明目當世因大赦改元建平盛謙不敢稱尊號以長樂王攝行統制盛字道運寳之庶長子也樂音洛諸王皆降稱公以東陽公根為尚書左僕射衞倫陽璆魯恭王滕為尚書璆渠尤翻悦真為侍中陽哲為中書監張通為中領軍自餘文武各復舊位改諡寳曰惠閔皇帝廟號烈宗初太原王竒舉兵建安南北之人翕然從之南人謂自中原來者北人則鮮卑也蘭汗遣其兄子全討竒竒擊滅之匹馬不返進屯乙連盛既誅汗命竒罷兵竒用丁零嚴生烏桓王龍之謀遂不受命甲寅勒兵三萬餘人進至横溝去龍城十里盛出擊大破之執竒而還斬其黨與百餘人賜竒死桓王之嗣遂絶慕容恪封太原王諡曰桓楚莊王滅若敖氏而赦箴尹克黄曰子文無後何以勸善以慕容恪之輔成燕業而可使之絶祀乎羣臣固請上尊號上時掌翻盛弗許魏王珪遷都平城始營宮室建宗廟立社稷宗廟歳五祭用分至及臘魏都平城置代尹及司州於平城杜佑曰後魏都平城今雲中郡治雲中縣是今馬邑郡北平城即今郡隋為雲内縣恒安鎮此所謂宗廟即代都之東廟也桓𤣥求為廣州會稽王道子忌𤣥會工外翻不欲使居荆州因其所欲以𤣥為督交廣二州軍事廣州刺史𤣥受命而不行豫州刺史庾楷以道子割其四郡使王愉督之上疏言江州内地江州治尋陽在江南故云内地西府北帶寇戎晉以京口為北府歴陽為西府豫州治歴陽在江西故云北帶寇戎不應使愉分督朝廷不許楷怒遣其子鴻説王恭曰尚之兄弟謂譙王尚之及弟休之也説輸芮翻下同復秉機權復扶又翻下同過於國寳欲假朝威削弱方鎮朝直遥翻懲艾前事為禍不測艾倪祭翻今及其謀議未成宜早圖之恭以為然以告殷仲堪桓𤣥仲堪𤣥許之推恭為盟主刻期同趣京師趣七喻翻時内外疑阻津邏嚴急邏郎佐翻巡也津邏者凡江津之要皆置邏卒仲堪以斜絹為書内箭簳中簳古旱翻字林曰箭笴也合鏑漆之鏑箭鏃也因庾楷以送恭恭發書絹文角戾不復能辨仲堪手書戾曲也乖也斜絹無邊幅經緯不相持故斜角乖曲疑楷詐為之且謂仲堪去年已違期不赴事見上卷今必不動乃先期舉兵先悉薦翻司馬劉牢之諫曰將軍國之元舅㑹稽王天子叔父也會稽王又當國秉政曏為將軍勠其所愛王國寳王緒又送王廞書事見上卷為于偽翻其深伏將軍已多矣頃所授任雖未允愜亦非大失割庾楷四郡以配王愉於將軍何損晉陽之甲豈可數興乎數所角翻恭不從上表請討王愉司馬尚之兄弟道子使人説楷曰昔我與卿恩如骨肉楷先黨於王國寳道子亦親之帳中之飲結帶之言可謂親矣此必太元二十一年庾楷赴難時事卿今棄舊交結新援忘王恭疇昔陵侮之恥乎王恭以元舅之親風神簡貴志氣方嚴視庾楷蔑如也故道子以為陵侮楷若欲委體而臣之使恭得志必以卿為反覆之人安肯深相親信首身且不可保况富貴乎楷怒曰王恭昔赴山陵相王憂懼無計我知事急尋勒兵而至恭不敢發事見一百八卷孝武太元二十一年去年之事我亦俟命而動我事相王無相負者相王不能拒恭反殺國寳及緒自爾以來自爾以來猶今言自那時以來也又爾言如此也誰敢復為相王盡力者復扶又翻為于偽翻庾楷實不能以百口助人屠滅時楷已應恭檄正徵士馬信返朝廷憂懼内外戒嚴會稽世子元顯言於道子曰前不討王恭故有今日之難今若復從其欲難乃旦翻復扶又翻則太宰之禍至矣道子時為太宰道子不知所為悉以事委元顯日飲醇酒而已元顯聰警頗涉文義志氣果鋭以安危為已任附會之者謂元顯神武有明帝之風殷仲堪聞恭舉兵自以去嵗後期乃勒兵趣發趣讀曰促仲堪素不習為將將即亮翻悉以軍事委南郡相楊佺期兄弟相息亮翻使佺期帥舟師五千為前鋒桓𤣥次之仲堪帥兵二萬相繼而下帥讀曰率佺期自以其先漢太尉震至父亮九世皆以才德著名矜其門地謂江左莫及有以比王珣者佺期猶恚恨而時流以其晩過江婚宦失類佺期曾祖凖晉太常自震至凖七世有名德祖林少有才望值亂沒胡殳亮少仕偽朝後歸晉比王謝諸家為晚亮及佺期皆以武力為官又與傖荒為婚故云失類時流猶言時輩也恚於避翻佺期及兄廣弟思平從弟孜敬皆麄獷從才用翻獷古猛翻獷獷不可附每排抑之佺期常慷慨切齒欲因事際以逞其志故亦賛成仲堪之謀八月佺期𤣥奄至湓口湓口湓浦口也晉人於此築城置戍今其地在江州德化縣西一里湓蒲奔翻王愉無備惶遽奔臨川吳孫亮太平二年分豫章東部都尉立臨川郡隋唐為撫州𤣥遣偏軍追獲之燕以河間公熙為侍中車騎大將軍中領軍司𨽻校尉城陽公元為衞將軍元寳之子也又以劉忠為左將軍張豪為後將軍竝賜姓慕容氏李旱為中常侍輔國將軍衞雙為前將軍張順為鎮西將軍昌黎尹張真為右將軍燕都龍城以昌黎太守為昌黎尹皆封公乙亥燕步兵校尉馬勒等謀反伏誅事連驃騎將軍髙陽公崇崇弟東平公澄皆賜死驃匹妙翻騎竒寄翻寧朔將軍鄧啓方南陽太守閭丘羨將兵二萬擊南燕燕自慕容寳之敗北歸龍城慕容德稱號於滑臺故稱南燕以别之與南燕中軍將軍法撫軍將軍和戰於管城魏收志滎陽郡京縣有管城故管叔邑也杜預曰在京縣東北啓方等兵敗單騎走免魏王珪命有司正封畿宋白曰魏道武都平城東至上谷軍都關西至河南至中山隘門塞北至五原地方千里以為甸服標道里平權衡審度量遣使循行郡國使疏吏翻行下孟翻舉奏守宰不法者親考察黜陟之九月辛夘加會稽王道子黄鉞以世子元顯為征討都督遣衞將軍王珣右將軍謝琰將兵討王恭譙王尚之將兵討庾楷乙未燕以東陽公根為尚書令張通為左僕射衞倫為右僕射慕容豪為幽州刺史鎮肥如己亥譙王尚之大破庾楷於牛渚楷單騎奔桓𤣥為後𤣥殺楷張本會稽王道子以尚之為豫州刺史弟恢之為驃騎司馬丹楊尹允之為吳國内史休之為襄城太守元帝渡江以丹楊春榖縣置襄城郡各擁兵馬以為已援乙巳桓𤣥大破官軍於白石白石在巢縣界水經註柵江水導源巢湖束左會清溪水謂之清溪口柵水又東左會白石山水水發白石山西逕李鵲城南西南注柵水𤣥與楊佺期進至横江尚之退走恢之所領水軍皆沒丙午道子屯中堂元顯守石頭己酉王珣守北郊謝琰屯宣陽門以備之宣陽門建康城南面西頭第一門王恭素以才地陵物既殺王國寳自謂威無不行仗劉牢之為爪牙而但以部曲將遇之將即亮翻牢之負其才深懐恥恨元顯知之遣廬江太守髙素説牢之高素亦北府將故使説之説輸芮翻下可説同使叛恭許事成即以恭位號授之又以道子書遺牢之為陳禍福遺于季翻為于偽翻牢之謂其子敬宣曰王恭昔受先帝大恩今為帝舅不能翼戴王室數舉兵向京師數所角翻吾不能審恭之志事捷之日必能為天子相王之下乎相王謂道子也吾欲奉國威靈以順討逆何如敬宣曰朝廷雖無成康之美亦無幽厲之惡而恭恃其兵威暴蔑王室蔑之者視之若無也大人親非骨肉義非君臣雖共事少時意好不恊少時言不多時也少詩沼翻好呼到翻今日討之於情義何有恭參軍何澹之知其謀以告恭澹徒覽翻恭以澹之素與牢之有隙不信乃置酒請牢之於衆中拜之為兄精兵堅甲悉以配之王恭素以部曲將遇牢之及聞何澹之言則拜之為兄此豈能得其死力邪適足以速其背已耳使帥帳下督顔延為前鋒帥讀曰率牢之至竹里斬延以降降户江翻遣敬宣及其壻東莞太守髙雅之還襲恭東莞漢舊縣武帝㤗始元年分瑯邪立東莞郡南渡後又置南東莞郡於晉陵界莞音官恭方出城曜兵敬宣縱騎横擊之騎竒寄翻下同恭兵皆潰恭將入城雅之已閉城門恭單騎奔曲阿素不習馬髀中生瘡曲阿人殷確恭故吏也以船載恭將奔桓𤣥至長塘湖長塘湖在晉陵延陵縣杜佑曰在潤州金壇縣風土記陽羡縣有洮湖别名長塘湖洮余招翻單鍔曰長塘湖在義興西為人所告獲之送京師斬於倪塘倪塘在建康東北方山埭南倪氏築塘因以為名恭臨刑猶理須鬢神色自若須與鬚同謂監刑者曰我闇於信人所以至此自悔悉以軍事委劉牢之也監工銜翻原其本心豈不忠於社稷邪但令百世之下知有王恭耳并其子弟黨與皆死以劉牢之為都督兖青冀幽并徐揚州晉陵諸軍事以代恭俄而楊佺期桓𤣥至石頭殷仲堪至蕪湖元顯自竹里馳還京師遣丹楊尹王愷等發京邑士民數萬人據石頭以拒之佺期𤣥等上表理王恭求誅劉牢之牢之帥北府之衆馳赴京師軍于新亭帥讀曰率佺期𤣥見之失色回軍蔡洲蔡洲在今建康府上元縣西二十五里朝廷未知西軍虛實仲堪等擁衆數萬充斥郊畿内外憂逼言内憂而外逼也左衞將軍桓脩冲之子也言於道子曰西軍可説而解也説輸芮翻脩知其情矣殷桓之下專恃王恭恭既破滅西軍沮恐沮恐言氣沮而心恐也沮在呂翻今若以重利啗𤣥及佺期啗徒覽翻餌也二人必内喜𤣥能制仲堪佺期可使倒戈取仲堪矣道子納之以𤣥為江州刺史召郗恢為尚書以佺期代恢為都督梁雍秦三州諸軍事雍州刺史以脩為荆州刺史權領左衞文武之鎮左衞文武左衛將軍府之僚屬及部曲也之往也郗丑之翻雍於用翻又令劉牢之以千人送之黜仲堪為廣州刺史遣仲堪叔父太常茂宣詔敇仲堪回軍張驤子超收合三千餘家據南皮自號烏桓王抄掠諸郡張驤烏桓種也奉燕見一百五卷孝武帝太元九年歸魏見上卷元年驤思將翻抄楚交翻魏王珪命庾岳討之楊軌屯亷川收集夷夏衆至萬餘夏户雅翻王乞基謂軌曰秃髪氏才髙而兵盛且乞基之主也不如歸之軌乃遣使降於西平王烏孤降户江翻軌尋為羌酋梁飢所敗酋慈由翻敗補邁翻西犇􅀈海闞駰曰金城臨羌縣西有卑和羌海酈道元曰古西零之地也􅀈音憐襲乙弗鮮卑而據其地烏孤謂羣臣曰楊軌王乞基歸誠於我卿等不速救使為羌人所覆孤甚愧之平西將軍渾屯曰渾古有是姓左傳鄭有渾罕衞有渾良夫吐谷渾氏後改為渾姓渾戸昆翻梁飢無經逺大略可一戰擒也飢進攻西平西平人田𤣥明執太守郭倖而代之以拒飢遣子為質於烏孤質音致烏孤欲救之羣臣憚飢兵彊多以為疑左司馬趙振曰楊軌新敗呂氏方彊洪池以北未可冀也洪池嶺名在凉州姑臧之南唐凉州有洪池府嶺南五郡庶幾可取嶺南謂洪池嶺南也五郡謂廣武西平樂都澆河湟河也幾居希翻大王若無開拓之志振不敢言若欲經營四方此機不可失也使羌得西平華夷震動非我之利也烏孤喜曰吾亦欲乘時立功安能坐守窮谷乎廉川在塞外故謂之窮谷乃謂羣臣曰梁飢若得西平保據山河不可復制西平據湟河之要有大小榆谷之饒故云然復扶又翻下同飢雖驍猛驍堅堯翻軍令不整易破也易以豉翻遂進擊飢大破之飢退屯龍支堡唐鄯州有龍支縣劉昫曰龍支漢允吾縣地此時當為西平界烏孤進攻㧞之飢單騎奔澆河澆河吐谷渾之地呂光開以為郡隋唐之廓州即其地也澆堅堯翻水洄洑曰澆此郡葢置於洮河洄曲處杜佑曰澆河城在廓州達化縣賀蘭山劉昫曰廓州隋澆河郡治廣威縣即後漢燒當羌之地前凉置湟河郡後魏置石城郡廢帝因縣内化隆谷置化隆縣後周置廓州唐天寳元年改為廣威縣管下有達化縣吐渾澆河城在縣西百二十里杜佑曰澆河城吐谷渾阿豺所築俘斬數萬以田𤣥明為西平内史樂都太守田瑶樂都註已見二十六卷漢宣帝神爵元年五代志西平郡湟水縣後周置樂都郡觀此則呂氏已置郡矣杜佑曰湟水一名樂都水唐鄯州治樂音洛湟河太守張裯裯除留翻湟水郡葢置於此地澆河太守王稚皆以郡降降戸江翻嶺南羌胡數萬落皆附於烏孤西秦王乾歸遣秦州牧益州武衞將軍慕兀慕兀晉書載記作慕容兀慕兀葢亦乞伏氏載記誤也冠軍將軍翟瑥帥騎二萬伐吐谷渾冠古玩翻瑥音温冬十月癸酉燕羣臣復上尊號復扶又翻上時掌翻丙子長樂王盛始即皇帝位樂音洛大赦尊皇后叚氏曰皇太后太妃丁氏曰獻莊皇后初蘭汗之當國也盛從燕主寳出亡蘭妃奉事丁后愈謹及汗誅盛以妃當從坐欲殺之丁后以妃有保全之功固爭之得免然終不為后大赦殷仲堪得詔書大怒得黜廣州之詔書也趣桓𤣥楊佺期進軍趣讀曰促𤣥等喜於朝命朝直遥翻下同欲受之猶豫未决仲堪聞之遽自蕪湖南歸遣使告諭蔡洲軍士曰汝輩不各自散歸吾至江陵盡誅汝餘口使疏吏翻餘口謂蔡洲之軍所餘家口留在江陵者佺期部將劉系帥二千人先歸帥讀曰率𤣥等大懼狼狽西還還從宣翻又如字追仲堪至尋陽及之仲堪既失職倚𤣥等為援𤣥等亦資仲堪兵雖内相疑阻勢不得不合乃以子弟交質質音致壬午盟于尋陽俱不受朝命連名上疏申理王恭求誅劉牢之及譙王尚之并訴仲堪無罪獨被降黜被皮義翻朝廷深憚之内外騷然乃復罷桓脩復扶又翻以荆州還仲堪優詔慰諭以求和解仲堪等乃受詔御史中丞江績劾奏桓脩専為身計疑誤朝廷謂分江雍以授桓𤣥楊佺期自取荆州也劾戸槩翻又戸得翻詔免脩官初桓𤣥在荆州所為豪縱仲堪親黨皆勸仲堪殺之仲堪不聴及在尋陽資其聲地聲謂威聲地謂門地推𤣥為盟主𤣥愈自矜倨楊佺期為人驕悍悍侯旰翻又下罕翻𤣥每以寒士裁之佺期甚恨宻說仲堪以𤣥終為患請於壇所襲之説輸芮翻仲堪忌佺期兄弟勇健恐既殺𤣥不可復制復扶又翻苦禁之於是各還所鎮𤣥亦知佺期之隂謀有取佺期之志為後𤣥殺殷楊張本乃屯於夏口引始安太守濟隂卞範之為長史以為謀主吳孫皓甘露元年分零陵南部都尉立始安郡屬廣州晉成帝度屬荆州隋唐為桂州之地夏戸雅翻濟子禮翻是時詔書獨不赦庾楷𤣥以楷為武昌太守初郗恢為朝廷拒西軍為于偽翻𤣥未得江州欲奪恢雍州雍於用翻以恢為廣州恢聞之懼詢於衆衆皆曰楊佺期來者誰不勠力若桓𤣥來恐難與為敵桓氏世居西楚故衆畏之既而聞佺期代已乃與閭丘羡謀阻兵拒之閭丘羡時為南陽太守雍之部屬也佺期聞之聲言𤣥來入沔沔彌兖翻以佺期為前驅恢衆信之望風皆潰恢請降降户江翻佺期入府斬閭丘羡放恢還都至楊口殷仲堪隂使人殺之及其四子託言羣蠻所殺西秦乞伏益州與吐谷渾王視羆戰於度周川度周川在臨洮塞外龍涸之西吐從暾入聲谷音浴視羆大敗走保白蘭山遣子宕豈為質於西秦以請和宕徒浪翻質音致西秦王乾歸以宗女妻之妻子細翻凉建武將軍李鸞以興城降於秃髪烏孤興城在允吾縣西南龍支堡之東十一月以琅邪王德文為衞將軍開府儀同三司征虜將軍元顯為中領軍領軍將軍王雅為尚書左僕射辛亥魏王珪命尚書吏部郎鄧淵立官制恊音律儀曹郎清河董謐制禮儀三公郎王德定律令吏部儀曹三公郎皆曹魏所置太史令鼂崇考天象鼂直遥翻吏部尚書崔宏總而裁之以為永式淵羌之孫也鄧羌苻秦之名將楊軌王乞基帥戸數千自歸於西平王烏孤帥讀曰率下同十二月己丑魏王珪即皇帝位大赦改元天興命朝野皆束髪加帽朝直遥翻下同説文曰帽小兒蠻夷蒙頭衣晉書輿服志曰帽猶冠也義取於蒙覆其首其本纚也古者冠無幘冠下有纚以繒為之後世施幘於冠因復裁纚為帽自乘輿宴居下至庶人無爵者皆服之江左時野人已著帽人士亦往往而然但其頂圓耳後乃髙其屋云纚所爾翻追尊逺祖毛以下二十七人皆為皇帝魏諡毛為成皇帝五世至推寅南遷大澤方千餘里諡宣皇帝七世至鄰始南出居匈奴故地諡獻皇帝獻帝之子曰詰汾諡聖武皇帝諡六世祖力微曰神元皇帝廟號始祖祖什翼犍曰昭成皇帝廟號髙祖父寔曰獻明皇帝諡力微曰神元皇帝子沙漠汗曰文皇帝沙漠汗之子弗政曰思皇帝弗政卒力微之子祿官立諡曰昭皇帝分國為三部猗㐌猗盧沙漠汗之二子與祿官分統三部猗㐌西略服屬諸國諡曰桓皇帝猗盧自祿官之卒合三部為一又助晉國以益强諡穆皇帝猗盧死祿官之子鬱律繼之諡平文皇帝鬱律弑猗㐌之子賀傉立謚惠皇帝賀傉卒弟紇那立諡煬皇帝翳槐者鬱律之子國人逐紇那而立之諡烈皇帝魏之舊俗孟夏祀天及東廟宗廟在東葢亦左祖之義季夏帥衆却霜於隂山孟秋祀天於西郊至是始依倣古制定郊廟朝饗禮樂然惟孟夏祀天親行杜佑曰魏道武天賜二年祀天于西郊為方壇東為二陛土陛無等周垣四門各依方色為名置木主七於壇上牲用白犢黄駒白羊各一祭之日帝御大駕至郊所立青門内近南西面内朝臣皆位於壇北外朝臣及大人方客咸位於青門外后率六宮自黒門入列於青門内近北竝西面廩犧令掌牲陳於壇前女巫執鼓立於壇東西面帝七族子弟七子執酒在巫南西面北上女巫升壇揺鼓帝拜后肅拜内外百官拜祀訖乃殺牲七執酒七人西向以酒洒天神主復拜如此者三禮畢而退自是歳一祭其餘多有司攝事又用崔宏議自謂黄帝之後魏收曰魏之先出自黄帝黄帝子曰昌意昌意之子受封北國有大鮮卑山因以為號其後世為君長統幽都之北廣漠之野黄帝以土德王北俗謂土為托謂后為䟦故以托䟦為氏以土德王徙六州二十二郡守宰豪傑二千家于代都東至代郡魏都平城以平城為代都依漢建國之名也漢平城縣本屬鴈門郡而代郡治桑乾後漢徙髙栁晉徙平舒魏收地形志之上谷郡晉之代郡也唐為蔚州之地魏之代都唐為雲州雲中縣之地西及善無南極隂館善無縣漢屬鴈門郡後漢屬定襄郡元魏天平二年置善無郡班志隂館縣屬鴈門郡本樓煩鄉景帝後三年置隂館縣有累頭山治水所出五代史志代州鴈門縣有纍頭山則漢之隂館縣已併入鴈門縣矣北盡參合皆為畿内其外四方四維置八部帥以監之魏書作八部帥八部帥勸課農耕量校收入以為殿最監工銜翻己亥燕幽州刺史慕容豪尚書左僕射張通昌黎尹張順坐謀反誅初琅邪人孫泰學妖術於錢唐杜子恭妖於驕翻士民多奉之王珣惡之惡烏路翻流泰於廣州王雅薦泰於孝武帝云知養性之方召還累官至新安太守泰知晉祚將終因王恭之亂以討恭為名收合兵衆聚貨鉅億億億為鉅億三吳之人多從之識者皆憂其為亂以中領軍元顯與之善無敢言者會稽内史謝輶發其謀輶夷周翻又音酉己酉會稽王道子使元顯誘而斬之㑹工外翻誘音酉并其六子兄子恩逃入海愚民猶以泰蟬蜕不死蟬解殻曰蜕神仙家有尸解之説言尸解登仙如蟬之蜕殻也蜕輸芮翻又吐外翻就海中資給恩恩乃聚合亡命得百餘人以謀復讎為後孫恩反張本西平王禿髪烏孤更稱武威王更工衡翻是歳楊盛遣使附魏魏以盛為仇池王使疏吏翻資治通鑑卷一百一十
