front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷二百三十四宋司馬光撰胡三省音註唐紀五十起𤣥黓涒灘盡閼逢閹茂五月二年有竒始壬申終甲戌五月凡二年零五月徳宗神武聖文皇帝九貞元八年春二月壬寅執夢衝數其罪而斬之數所具翻又所主翻雲南之路始通三月丁丑山南東道節度使曹成王臯薨使疏吏翻臯諡曰成薨呼肱翻宣武節度使劉𤣥佐有威略每李納使至𤣥佐厚結之故常得其隂事先為之備納憚之孫子五間有因間因間者因其鄉人而用之張預注云因敵國人知其㡳裏就而用之可使伺候也劉𤣥佐之制李納正用此術其母雖貴日織絹一匹謂𤣥佐曰汝本寒㣲天子富貴汝至此必以死報之故𤣥佐始終不失臣節史言𤣥佐忠順母教也此言葢本之劉氏母墓誌唐人誌墓不無溢美者然此等言語有益於世教庚午𤣥佐薨山南東道節度判官李實知留後事性刻薄裁損軍士衣食鼓角將楊清潭帥衆作亂將即亮翻鼓角將掌軍中鼓角者也帥讀曰率夜焚掠城中獨不犯曹王臯家曹王臯之家葢已出次外館不居使宅實踰城走免明旦都將徐誠縋城而入縋馳為翻號令禁遏然後止收清潭等六人斬之實歸京師以為司農少卿少詩照翻實元慶之𤣥孫也道王元慶髙祖之子丙子以荆南節度使樊澤為山南東道節度使初竇參為度支轉運使度徒洛翻使疏吏翻班宏副之參許宏俟一歳以使職歸之歳餘參無歸意宏怒司農少卿張滂宏所薦也少始照翻滂普郎翻參欲使滂分主江淮鹽鐵宏不可滂知之亦怨宏及參為上所疎乃譲度支使於宏又不欲利權專歸於宏乃薦滂於上以滂為户部侍郎鹽鐵轉運使仍𨽻於宏以悦之竇參隂狡而愎狡古巧翻愎弼力翻恃權而貪每遷除多與族子給事中申議之申招權受賂時人謂之喜鵲竇参每遷除朝士先與申議申因先報其人以招權納賂時人謂之喜鵲者以人家有喜事鵲必先噪於門庭以報之也上頗聞之謂參曰申必為卿累累良瑞翻宜出之以息物議參再三保其無他申亦不悛悛丑縁翻左金吾大將軍虢王則之巨之子也虢王巨肅宗上元二年為段子璋所殺與申善左諫議大夫知制誥吴通𤣥與陸贄不叶竇申恐贄進用隂與通𤣥則之作謗書以傾贄上皆察知其狀夏四月丁亥貶則之昭州司馬昭州漢荔浦縣地屬蒼梧郡晉置平樂縣屬始安郡武徳四年置樂州貞觀八年改曰昭州宋白曰郡北有昭崗潭因山岡為名舊志昭州至京師四千四百三十六里通𤣥泉州司馬隋置泉州治閩縣南安莆田縣屬焉武后聖厯二年分泉州之南安莆田龍溪置武榮州景雲二年改武榮為泉州而閩之泉州改為閩州開元十三年又改閩州為福州舊志泉州京師東南六千二百一十六里申道州司馬尋賜通𤣥死劉𤣥佐之喪將佐匿之稱疾請代上亦為之隱将即亮翻為于偽翻遣使即軍中問以陜虢觀察使吳湊為代可乎監軍孟介行軍司馬盧瑗皆以為便然後除之陜失冉翻監古銜翻瑗于眷翻湊行至汜水汜音祀汜水縣本屬鄭州時屬孟州𤣥佐之柩將發軍中請備儀仗瑗不許又令留器用以俟新使將士怒𤣥佐之壻及親兵皆被甲擁𤣥佐之子士寧釋衰絰登重榻被皮義翻衰倉回翻重直龍翻自為留後執城將曹金㟁城將使之領兵廵視城堞晨夕警邏浚儀令李邁曰爾皆請吳湊者遂冎之冎古瓦翻盧瑗逃免士寧以財賞將士劫孟介以請於朝上以問宰相竇參曰今汴人指李納以邀制命不許將合於納庚寅以士寧為宣武節度使俊考異曰實録士寧位未定遣使通王武劉濟田緒以士寧未受詔有國使皆留之舊傳云以士寧未受詔於國皆留之新傳云諸鎭不直之皆執其使然則舊傳是也士寧疑宋州刺史翟良佐不附己翟直格翻託言廵撫至宋州以都知兵馬使劉逸準代之作考異曰韓愈集逸淮今從舊傳逸準正臣之子也劉正臣肅宗至徳初為平盧節度使乙未貶中書侍郎同平章事竇參為郴州别駕舊志郴州京師南三千三百里郴丑林翻考異曰柳珵上清傳曰貞元壬申歲春三月相國竇公居光福里第月夜閒步於中庭有常所寵青衣上清者乃曰今欲啟事郎須到堂前方敢言之竇公亟上堂上清曰庭樹上有人恐驚郎請謹避之竇公曰陸贄乆欲傾奪吾權位今有人在庭樹上吾禍將至且此事奏與不奏皆受禍必竄死於道路汝在軰流中不可多得吾身死家破汝定為宫婢聖君若顧問善為我辭焉上清泣曰誠如是死生以之竇公下階大呼曰樹上君子應是陸贄使來能全老夫性命敢不厚報樹上應聲而下乃衣衰麤者也曰家有大喪貧甚不辦葬禮伏知相公推心濟物所以卜夜而來幸相公無怪公曰某罄所有堂封絹千匹而已方擬修私廟今且輟贈可乎縗者拜謝竇公答之如禮又曰便辭相公請左右齎所賜絹擲於牆外某先於街中俟之竇公依其請命僕使偵其絕蹤且方敢歸寢翌日執金吾先奏其事竇公得次又奏之徳宗厲聲曰卿交通節將蓄養俠刺位崇台鼎更欲何求竇公頓首曰臣起自刀筆小才官以至貴皆陛下奬拔實不由人今不幸至此抑亦仇家所為耳陛下忽震雷霆之怒臣便合死中使下殿宣曰卿且歸私第待候進止越月貶郴州别駕㑹宣武節度使劉士寧通好于郴州亷使條䟽上聞徳宗曰交通節将言而有徴流竇公于驩州沒入家資一簮不著身竟未逹流所詔自盡上清果𨽻名掖庭後數年以善應對能煎茶數得在帝左右徳宗謂曰宫掖間人數不少汝了事從何得至此上清對曰妾本故宰相竇參家女奴竇某妻早亡故妾得陪掃灑及竇某家破幸得塡宫旣侍龍顔如在天上徳宗曰竇某罪不止養俠刺亦甚有贓汙前時納官銀器至多上清流涕而言曰竇某自御史中丞厯度支户部鹽鐵三使至宰相首尾六年月入數十萬前後非時賞賜亦不知紀極乃者郴州所送納官銀物皆是恩賜當部録日妾在郴州親見州縣希陸䞇意指刮去所進銀器上刻作藩鎭官衘姓名誣為贓物伏乞陛下驗之於是宣索竇某沒官銀器覆視其刮字處皆如上清言時貞元十二年徳宗又問蓄養俠刺事上清曰本實無悉是陸贄陷害使人為之徳宗怒陸贄曰這獠奴我脱却伊緑衫便與紫衫著又常喚伊作陸九我任使竇參方稱意次須教我枉殺却它及至權入伊手其為軟弱甚於泥團乃下詔雪竇參時裴延齡探知陸贄恩衰得恣行媒糵贄竟受譴後上清特勑丹書度為女道士終嫁為金忠義妻世以陸贄門生名位多顯達者不敢傳説故此事絕無人知信如此説則參為人所劫徳宗豈得反云蓄養俠刺况陸贄賢相安肯為此就使欲陷參其術固多豈肯為此兒戲全不近人情今不取貶竇申錦州司户以尚書左丞趙憬兵部侍郎陸贄並為中書侍郎同平章事憬仁本之曽孫也憬居永翻趙仁本見二百一卷高宗咸亨元年張滂請鹽鐵舊簿於斑宏宏不與共擇巡院官莫有合者闕官甚多滂言於上曰如此職事必廢臣罪無所逃丙午上命宏滂分掌天下財賦如大厯故事大厯元年命第五𤦺劉晏分理天下財賦事見二百二十四巻壬子吐蕃冦靈州䧟水口支渠敗營田敗補邁翻詔河東振武救之遣神策六軍二千戍定遠懷遠城懷遠縣屬靈州後周置隋五原郡在縣界宋白曰定遠縣在靈州東北二百里吐蕃乃退陸贄請令臺省長官各舉其屬長知兩翻著其名於詔書異日考其殿最并以升黜舉者殿丁練翻所舉得人則升舉主以昭進賢之賞所舉非人則黜舉主以昭失舉之罰五月戊辰詔行贄議未幾或言於上曰諸司所舉皆有情故或受貨賂不得實才上密諭贄自今除改卿宜自擇勿任諸司諸司即謂臺省長官贄上奏其略曰國朝五品以上制敕命之蓋宰相商議奏可者也六品以下則㫖授蓋吏部銓材署職詔㫖畫聞而不可否者也六品以下告身皆畫聞字開元中起居遺補御史等官猶並列於選曹言起居郎舍人拾遺補闕及御史皆由吏部奏擬選須絹翻其後倖臣專朝朝直遥翻捨僉議而重己權廢公舉而行私惠是使周行庻品行户剛翻下班行同茍不出時宰之意則莫致也又曰宣行以來纔舉十數議其資望既不愧於班行考其行能又未聞於闕敗行下孟翻而議者遽以騰口上煩聖聰道之難行亦可知矣請使所言之人指陳其状某人受賄某舉有情付之有司覈其虛實謬舉者必行其罰誣善者亦反其辜謂反坐以罪也何必貸其姦贓不加辯詰私其公議不出主名主名告主之名也使無辜見疑有罪獲縱枉直同貰人何賴焉又宰相不過數人豈能徧諳多士諳烏含翻若令悉命羣官理須展轉詢訪是則變公舉為私薦易明揚以闇投公私明闇以相形而文理自見此作文之法然明揚二字本之虞書闇投二字本之漢書作文又不可無來處近世敎人為文者類此文詎止於此而已情故必多為弊益甚所以承前命官罕不涉謗雖則秉鈞不一或自行情亦由私訪所親轉為所賣其弊非遠聖鍳明知又曰今之宰相則往日臺省長官今之臺省長官乃將來之宰相但是職名暫異固非行舉頓殊行舉者臺省長官舉之宰相行之豈有為長官之時則不能舉一二屬吏居宰相之位則可擇千百具僚物議悠悠其惑斯甚蓋尊者領其要卑者任其詳是以人主擇輔臣輔臣擇庻長庻長庻官之長也庻長擇佐僚將務得人無易於此夫求才貴廣考課貴精往者則天欲收人心進用不次則天謂武后也非但人得薦士亦得自舉其才然而課責既嚴進退皆速是以當代謂知人之明累朝賴多士之用又曰則天舉用之法傷易而得人朝直遥翻易以豉翻陛下愼簡之規書曰愼簡乃僚太精而失士上竟追前詔不行癸酉平盧節度使李納薨軍中推其子師古知留後六月吐蕃千餘騎㓂涇州掠田軍千餘人而去田軍屯田之軍也嶺南節度使奏近日海舶珍異多就安南市易欲遣判官就安南收市乞命中使一人與俱上欲從之陸贄上言以為遠國商販惟利是求緩之斯來擾之則去廣州素為衆舶所湊舶音白今忽改就安南若非侵刻過深則必招攜失所攜離也言所以招攜離者失其道也左傳管仲曰招攜以禮曽不内訟論語孔子曰吾未見能見其過而内自訟者也注云訟猶責也言人有過莫能自責更蕩上心記月令毋或作為淫巧以蕩上心注蕩謂動揺之也况嶺南安南莫非王土中使外使悉是王臣豈必信嶺南而絕安南重中使以輕外使所奏望寢不行秋七月甲寅朔户部尚書判度支班宏薨尚辰羊翻度徒洛翻薨呼肱翻陸贄請以前湖南觀察使李巽權判度支上許之既而復欲用司農少卿裴延齡使疏吏翻度徒洛翻復扶又翻又音如字少詩照翻贄上言以為今之度支準平萬貨上時掌翻刻吝則生患寛假則容姦延齡誕妄小人用之交駭物聽尸禄之責固宜及於微臣知人之明亦恐傷於聖鑒上不從己未以延齡判度支事為裴延齡譛贄張本河南北江淮荆襄陳許等四十餘州大水溺死者二萬餘人陸贄請遣使賑撫上曰聞所損殊少溺奴狄翻少詩沼翻即議優恤恐生姦欺贄上奏其略曰流俗之弊多徇諂諛揣所悦意則侈其言度所惡聞則小其事揣初委翻度徒洛翻惡烏路翻制備失所恒病於斯制備謂隨事為之制而豫備也恒户登翻又曰所費者財用所收者人心茍不失人何憂乏用上許為遣使為于偽翻而曰淮西貢賦既闕不必遣使贄復上奏復扶又翻以為陛下息師含垢宥彼渠魁渠大也魁率也惟兹下人所宜矜恤昔秦晉讎敵穆公猶救其饑左傳晉饑秦輸之粟秦饑晉閉之糴穆公伐晉執惠公而晉又饑穆公復餼之粟曰吾怨其君而矜其民况帝王懷柔萬邦唯徳與義寧人負我無我負人反曹操之言則有帝王氣象八月遣中書舍人京兆奚陟等宣撫諸道水災以前青州刺史李師古為平盧節度使韋臯攻維州代宗廣徳元年維州沒於吐蕃獲其大將論贊熱陸贄上言以邊儲不贍由措置失當當丁浪翻蓄歛乖宜其略曰所謂措置失當者戍卒不𨽻於守臣守臣不總於元帥至有一城之将一旅之兵各降中使監臨監古銜翻皆承别詔委任分鎭亘千里之地莫相率從縁邊列十萬之師不設謀主每有冦至方從中覆比䝉徴發赴援比必利翻及也冦已獲勝罷歸吐蕃之比中國衆寡不敵工拙不侔然而彼攻有餘我守不足蓋彼之號令由將而我之節制在朝將即亮翻朝直遥翻彼之兵衆合并而我之部分離析故也分扶問翻所謂蓄歛乖宜者陛下頃設就軍和糴之法以省運制與人加倍之價以勸農此令初行人皆悦慕此李泌所行之法也事見卷二年而有司競為茍且專事纎嗇歲稔則不時歛藏艱食則抑使收糴遂使豪家貪吏反操利權歛力驗翻操士刀翻賤取於人以俟公私之乏又有勢要近親羈遊之士委賤糴於軍城取高價於京邑又多支絺紵充直絺丑之翻紵直吕翻窮邊寒不可衣鬻無所售上既無信於下下亦以偽應之度支物估轉高度徒洛翻估音古價也軍城穀價轉貴度支以茍售滯貨為功利軍城以所得加價為羨餘羨弋線翻雖設巡院轉成囊槖元和四年十二月十二日勑遠處州使率情違法臺司無由盡知轉運使度支悉有巡院委以訪察當道使司及州縣有兩税外𣙜率及違格勑文法等事状報臺司蓋劉晏始置巡院自江淮以來達于河渭其後逐及縁邊諸道亦置之至有空申簿帳偽指囷倉囷區倫翻囷倉皆以藏穀圓曰囷方曰倉計其數則億萬有餘考其實則百十不足又曰舊制以闗中用度之多歲運東方租米至有斗錢運斗米之言習聞見而不達時宜者則曰國之大事不計費損雖知勞煩不可廢也習近利而不防遠患者則曰每至秋成之時但令畿内和糴既易集事令力丁翻糴亭厯翻易以䜴翻又足勸農臣以兩家之論互有長短將制國用須權重輕食不足而財有餘則弛於積財而務實倉廪廪力錦翻毛晃曰倉有屋曰廩食有餘而財不足則緩於積食而嗇用貨泉近歲闗輔屢豐公儲委積屢力注翻委於偽翻積子智翻足給數年今夏江淮水潦米貴加倍人多流庸流謂流徙庸謂庸雇闗輔以榖賤傷農宜加價以糴而無錢江淮以穀貴人困宜減價以糶而無米糶他弔翻而又運彼所乏益此所餘斯所謂習見聞而不達時宜者也今江淮斗米直百五十錢運至東渭橋僦直又約二百米糙且陳僦子就翻糙七到翻米僅剥穀為糙尤為京邑所賤據市司月估今之市令司亦月具物價低昂之數以聞於上斗糶三十七錢耗其九而存其一以江淮之米合運漕之僦直率一斗為錢三百五十而京師米價斗止三十七錢是耗其九而存其一也餒彼人而傷此農制事若斯可謂深失矣頃者每年自江湖淮浙運米百一十萬斛至河隂留四十萬斛貯河隂倉至陜州又留三十萬斛貯太原倉貯丁吕翻餘四十萬斛輸東渭橋今河隂太原倉見米猶有三百二十餘萬斛見賢遍翻京兆諸縣斗米不過直錢七十請令來年江淮止運三十萬斛至河隂河隂陜州以次運至東渭橋其江淮所停運米八十萬斛委轉運使每斗取八十錢於水災州縣糶之以救貧乏糶它吊翻計得錢六十四萬緡减僦直六十九萬緡請令戸部先以二十萬緡付京兆令糴米以補渭橋倉之缺數渭橋倉即東渭橋倉斗用百錢以利農人増價以糴則利農以一百二萬六千緡付邊鎭使糴十萬人一年之糧餘十萬四千緡以充來年和糴之價糴徒厯翻其江淮米錢僦直並委轉運使折市綾絹絁綿以輸上都折之舌翻絁式支翻繒之似布者今謂之紬唐都長安謂之上都償先貸户部錢九月詔西北邊貴糴以實倉儲状考異曰實録云凡積米三十三萬斛按陸贄論守備坐致邊儲數逾百萬諸鎭收糴今已向終又云更經一年可積十萬人三歲之糧矣蓋實録所言今年之數贄状通計來春也邊備浸充冬十一月壬子朔日有食之吐蕃雲南日益相猜每雲南兵至境上吐蕃輙亦發兵聲言相應實為之備辛酉韋臯復遺雲南王書復扶又翻遺唯季翻欲與共襲吐蕃驅之雲嶺之外雲南之地本漢雲南縣也漢屬益州郡後漢分屬永昌郡南中志曰雲南縣西高山相連衆山之中又有山特高大状如扶風太一鬱然高峻與雲氣相連視之不見其山固隂沍寒雖五月盛暑不熱所謂雲嶺也悉平吐蕃城堡獨與雲南築大城於境上置戍相保永同一家右庻子姜公輔乆不遷官詣陸䞇求遷贄密語之曰語牛倨翻聞竇相屢奏擬上不允今人謂聖㫖不從所請為不允習聞唐人之言也有怒公之言公輔懼請為道士上問其故公輔不敢泄贄語以聞參言為對上怒參歸怨於君己巳貶公輔為吉州别駕又遣中使責參姜公輔居猜忌之朝不能安於命義而由此重竇參之罪亦陸䞇之一言也庻考異曰實録初公輔罷相為左庻子以憂免復除右子數私謁竇參參數奏公輔以他官上不許而有怒公輔之言公輔恐乃請免官為道士乆之未報因開延英奏之上問其故公輔對以參言上曉之固不已大怒貶之而詔書責參推過於上公輔傳曰陸贄知政事以有翰林之舊數告䞇求官贄密謂公輔曰予常見郴州竇相言為公奏擬數矣上㫖不允有怒公之言公輔恐懼乞罷官為道士乆之未報後又庭奏徳宗問其故公輔不敢泄䞇言便以參言為對帝怒貶公輔為泉州别駕又遣使齎詔責參贄傳曰姜公輔奏竇參常語臣云陛下怒臣未已徳宗怒再貶參竟殺之時議云公輔奏竇參語得之於贄云參之死贄有力焉按贄請令長官舉屬吏状云亦由私訪所親轉為所賣其弊非遠聖鑒明知此乃解參之語也及參之死贄救解甚至由是觀之贄豈有殺參之意邪且䞇語公輔之時安知公輔請為道士及於上前以泄言之罪歸參此乃公輔之意非贄意也當時之人見參贄有隙遂以己意猜之史官不悦贄者因歸罪於贄耳今不取庚午山南西道節度使嚴震奏敗吐蕃於芳州及黑水堡敗補邁翻芳州高宗上元二年已為吐蕃所陷酈道元曰黑水出羌中西南逕黑水城西其地蓋在隂平西北臨洮西南古沓中之地也使疏吏翻敗補邁翻堡音保初李納以棣州蛤􅀈有鹽利城而據之又戍徳州之南三汊城以通田緒之路棣大計翻蛤古合翻􅀈康音螺余按集韻螺字下無􅀈字同韻有垜字音都戈翻小堆也􅀈恐當作垜汊楚嫁翻李納之阻兵也李長卿以棣州入朱滔而蛤􅀈為納所據因城而戍之其後王武俊敗朱滔得徳棣二州蛤􅀈猶為納戍納又於徳州南跨河而城守之謂之三汊以交魏博通田緒及李師古襲位王武俊以其年少輕之少詩照翻是月引兵屯徳棣將取蛤􅀈及三汊城師古遣趙鎬将兵拒之上遣中使諭止之武俊乃還鎬下老翻將即亮翻又音如字使疏吏翻還從宣翻又音如字初劉怦薨見二百三十二卷貞元元年怦普萌翻薨呼肱翻劉濟在莫州其母弟澭在父側以父命召濟而以軍府授之莫州治鄚縣在幽州南二百八十里澭於用翻濟以澭為瀛州刺史瀛州河間郡幽州巡屬大州也其地在幽州南許它日代己既而濟用其子為副大使河朔三鎭及淄青皆以其子為副大使儲帥也澭怨之擅通表朝廷遣兵千人防秋濟怒發兵擊澭破之朝直遥翻為劉澭歸朝張本左神策大将軍柏良器唐左右神策大将軍正二品史炤曰柏皇氏古帝號後為氏顓帝師柏亮父帝嚳父柏超之裔也募才勇之士以易販鬻者監軍竇文場惡之惡烏路翻㑹良器妻族飲醉寓宿宫舍宫舍宫中直宿之舍也史言䆠官惡柏良器能舉其職因其妻黨犯衛禁而文致其罪十二月丙戍良器坐左遷右領軍自是䆠官始専軍政為䆠官挾兵權以脅天子張本右領軍十六衛之一也時南牙諸衛具位而已北軍掌禁兵權重故良器為左遷九年春正月癸卯初稅茶爾雅釋木云檟苦茶郭璞注云樹大小似梔子冬生葉可煑作羮飲今呼早採者為􅖗晩採者為茗一名荈蜀人為之苦茶是也今通謂之茶茶􅖗聲近故呼之春中始生嫩葉蒸焙去苦水末之乃可喫與古所食殊不同也本草衍義曰晉温嶠上表貢茶千斤茗三百斤郭璞曰早採為茶晚採為茗茗或曰荈兖葉老者也古人謂其芽為雀舌麥顆言其至嫩也又有新芽一發便長寸餘微麄如針惟芽長為上品其根榦土力皆有餘故也如雀舌麥顆又下品前人未盡識史言税茶始此遂開利孔凡州縣産茶及茶山外要路皆估其直什稅一從鹽鐵使張滂之請也滂奏去歲水災减稅用度不足請稅茶以足之自明年以往稅茶之錢令所在别貯俟有水旱以代民田稅自是歲收茶稅錢四十萬緡未嘗以救水旱也𣙜茶之稅始於趙贊至張滂而始行滂又奏姦人銷錢為銅器以求贏請悉禁銅器銅山聽人開采無得私賣二月甲寅以義武留後張昇雲為節度使初鹽州既䧟鹽州陷見二百三十二卷二年塞外無復保障吐蕃常阻絕靈武侵擾鄜坊既阻絕靈武往來之路又侵擾鄜坊之民辛酉詔發兵三萬五千人城鹽州張考異曰邠志八年詔遣張公議築鹽夏二城公奏曰師之進取切籍驍将神策散將魏茪者武藝冠絕得茪足以集事上遣之張公以茪為邠寧馬軍兵馬使三月師及諸軍赴于五原去城百里而軍茪獨以其騎徑至城下䧟城而入逐吐蕃召諸軍城之更引其軍西掠境上往復走望為師耳目蕃衆距境而不敢入官軍城二郡而歸白居易樂府鹽州注亦云貞元壬申歲特詔城之而實錄在九年二月蓋去歲詔使城之今年因命杜彦光等而言之又詔涇原山南劒南各發兵深入吐蕃以分其勢城之二旬而畢命鹽州節度使杜彦光戍之朔方都虞候楊朝晟戍木波堡木波堡在慶州方渠縣界九域志方渠宋朝改為通遠縣置環州有木波鎮由是靈夏河西獲安上使人諭陸贄以要重之事勿對趙憬陳論當密封手疏以聞又苖粲以父晉卿往年攝政寳應間連有國憂晉卿攝冢宰嘗有不臣之言諸子皆與古帝王同名晉卿十子發丕堅垂與帝王同名今不欲明行斥逐兄弟亦各除外官勿使近屯兵之地近其靳翻又卿清愼太過諸道饋遺遺唯季翻一皆拒絕恐事情不通如鞭靴之類受亦無傷贄上奏其略曰昨臣所奏惟趙憬得聞陛下已至勞神委曲防護是於心膂之内尚有形迹之拘迹同事殊鮮克以濟鮮息淺翻恐爽無私之徳爽差也且傷不吝之明書曰改過不吝又曰爵人必於朝刑人必於市惟恐衆之不覩事之不彰記曰爵人於朝與衆共之刑人於市與衆弃之朝直遥翻君上行之無愧心兆庶聽之無疑議受賞安之無怍色當刑居之無怨言此聖王所以宣明典章與天下公共者也凡是譖訴之事多非信實之言利於中傷中作仲翻懼於公辯或云歲月已乆不可究尋或云事體有妨須為隠忍為于偽翻或云惡迹未露宜假它事為名或云但弃其人何必明言責辱詞皆近於情理近其靳翻意實苞於矯誣傷善售姦莫斯為甚若晉卿父子實有大罪則當公議典憲若被誣枉豈令隂受播遷夫聽訟辨讒必求情辨跡情見跡著見賢遍翻辭服理窮然後加刑罰焉是以下無寃人上無謬聽又曰監臨受賄盈尺有刑律諸監臨之官受所監臨財物者一尺笞四十諸監臨主司受財而枉法者一尺杖一百監古銜翻至於士吏之微尚當嚴禁矧居風化之首反可通行風化之首謂宰相者風化之所自出賄道一開展轉滋甚鞭鞾不已必及金玉鞾與靴同目見可欲何能自窒于心古語有之不見可欲此心不亂已與交私何能中絕其意謂既受其私饋則難以絕其私謁是以涓流不絕溪壑成災矣又曰若有所受有所却則遇却者疑乎見拒而不通矣若俱辭不受則咸知不受者乃其常理復何嫌阻之有乎復扶又翻下同初竇參惡左司郎中李巽惡烏路翻出為常州刺史及參貶郴州巽為湖南觀察使郴丑林翻汴州節度使劉士寧遺參絹五十匹遺唯季翻巽奏參交結藩鎮上大怒欲殺參陸贄以為參罪不至死上乃止既而復遣中使謂贄曰參交結中外其意難測社稷事重卿速進文書處分處昌吕翻分扶問翻下無分同贄上言參朝廷大臣誅之不可無名昔劉晏之死罪不明白至今衆議為之憤邑為于偽翻叛臣得以為辭見二百二十六卷建中元年二月參貪縱之罪天下共知至於濳懷異圖事跡曖昧曖音愛不明貌若不推鞠遽加重辟駭動不細辟音闢刑辟竇參於臣無分言無契分之雅分扶問翻陛下所知豈欲營救其人盖惜典刑不濫三月更貶參驩州司馬男女皆配流上又命理其親黨理治也贄奏罪有首從法有重輕首謂為頭者從謂隨從者為首者重隨從者輕參既䝉宥親黨亦應末減況參得罪之初私黨並已連坐人心乆定請更不問從之上又欲籍其家貲贄曰在法反逆者盡沒其財贜汚者止徴所犯皆須結正施刑然後收藉今罪法未詳陛下已存惠貸若簿錄其家恐以財傷義時䆠官左右恨參尤深謗毁不已參未至驩州竟賜死於路竇申杖殺貨財奴婢悉傳送京師傳知戀翻海州團練使張昇璘昇雲之弟李納之壻也以父大祥歸于定州海州東海郡淄青巡屬璘離珍翻壻西計翻定州義武帥治所子居父䘮再朞而大祥嘗於公座罵王武俊武俊奏之夏四月丁丑詔削其官遣中使杖而囚之使所吏翻定州富庶武俊常欲之因是遣兵襲取義豐掠安喜無極萬餘口徒之徳棣義豐屬定州安喜縣本定州治所盖州治徙也無極漢古縣因無極山為名唐屬定州按無極山碑云無極山與天地俱生從上至體可三里所立石為體二丈五尺所石上青下黄白所前正平可鋪兩大席在無極西南三十里景福二年以無極縣為祁州棣大計翻昇雲閉城自守屢遣使謝之乃止上命李師古毁三汊城李納築三汊城見上年汉楚嫁翻師古奉詔然常招聚亡命有得罪於朝廷者皆撫而用之朝直遥翻五月甲辰以中書侍郎趙憬為門下侍郎同平章事義成節度使賈耽為右僕射右丞盧邁守本官並同平章事邁翰之族子也憬居永翻耽都含翻射寅謝翻興元時盧翰與李勉劉從一同為相憬疑陸贄恃恩欲専大政排己置之門下政事堂在中書省今憬遷東省故疑贄排己右僕射屬門下省多稱疾不豫事由是與贄有隙為趙憬附裴延齡張本恃考異曰舊憬傳曰憬與陸贄同知政事贄乆在禁庭特承恩顧以國政為己任纔周歲轉憬為門下侍郎憬由是深銜之數以目疾請告不甚當政事因是不相恊按憬遷門下猶為宰相又益以賈耽盧邁贄豈得専政盖憬以此心疑之耳陸贄上奏論備邊六失以為措置乖方課責虧度財匱於兵衆力分於将多怨生於不均機失於遥制自措置乖方以下所謂六失也上時掌翻将即亮翻下同闗東戍卒不習土風身苦邊荒心畏戎虜國家資奉若驕子姑息如倩人倩七政翻屈指計歸張頥待哺或利王師之敗乘擾攘而東潰或㧞棄城鎭搖遠近之心豈惟無益實亦有損復有犯刑讁徙者復扶又翻下同既是無良之類且加懷土之情思亂幸災又甚戍卒可謂措置乖方矣此一失也自頃權移於下柄失於朝将之號令既鮮克行之於軍國之典常又不能施之於将朝直遥翻鮮息淺翻将即亮翻務相遵養遵率也言相率以養惡也茍度歲時欲賞一有功翻慮無功者反仄欲罰一有罪復慮同惡者憂虞罪以隠忍而不彰功以嫌疑而不賞姑息之道乃至於斯故使忘身效節者獲誚於等夷誚才笑翻率衆先登者取怨於士卒僨軍蹙國者不懐於愧畏僨方問翻緩救失期者自以為智能此義士所以痛心勇夫所以解體可謂課責虧度矣此二失也虜毎入冦将帥遞相推倚帥所類翻推吐雷翻無敢誰何虛張賊勢上聞則曰兵少不敵朝廷莫之省察朝直遥翻省悉景翻唯務徴發益師無禆備禦之功重增供億之幣重直用翻閭井日耗徴求日繁以編戸傾家破産之資兼有司𣙜鹽税酒之利𣙜古岳翻總其所入歲以事邊可謂財匱於兵衆矣此三失也吐蕃舉國勝兵之徒勝音升勝兵謂人之才力堪執兵以戰者也纔當中國十數大郡而已動則中國懼其衆而不敢抗静則中國憚其强而不敢侵厥理何哉良以中國之節制多門蕃醜之統帥専一故也帥讀曰率夫統帥專一則人心不分號令不貳進退可齊疾徐如意機會靡愆愆違也氣勢自壮斯乃以少為衆以弱為强者也開元天寳之間控禦西北兩蕃唯朔方河西隴右三節度中興以來未遑外討抗兩蕃者亦朔方涇原隴右河東四節度而已言西北兩蕃者以别奚契丹兩蕃若開元天寳以來西則吐蕃北則突厥中興以來所謂兩蕃西則吐蕃北則囘紇自頃分朔方之地建牙擁節者凡三使焉事見二百二十五卷大厯十四年使疏吏翻其餘鎮軍數且四十皆承特詔委寄各降中貴監臨人得抗衡莫相禀屬監古銜翻史炤曰衡車上横木抗衡謂兩相抗拒有若車衡相抗也余謂衡所以揆平首尾有所偏重則衡為之低昻商輕重者所必争也抗衡者言無所低昻而平視之也每俟邊書告急方令計會用兵既無軍法下臨惟以客禮相待令力丁翻夫兵以氣勢為用者也氣聚則盛散則消勢合則威析則弱今之邊備勢弱氣消可謂力分於将多矣夫音扶将即亮翻此四失也理戎之要在於練覈優劣之科以為衣食等級之制使能者企及企去智翻否者息心雖有厚薄之殊而無觖望之釁觖古宂翻今窮邊之地長鎮之兵皆百戰傷夷之餘終年勤苦之劇然衣糧所給唯止當身例為妻子所分常有凍餒之色而闗東戍卒怯於應敵懈於服勞衣糧所頒厚踰數等又有素非禁旅本是邊軍将校詭為媚詞因請遥𨽻神䇿不離舊所當丁浪翻懈俱賣翻離去智翻唯改舊名其於廪賜之饒遂有三倍之益夫事業未異而給養有殊茍未忘懐就能無愠可謂怨生於不均矣愠於問翻此五失也凡欲選任将帥必先考察行能将即亮翻帥所類翻行下孟翻可者遣之不可者退之疑者不使使者不疑故將在軍君命有所不受此孫子兵法之言自頃邊軍去就裁斷多出宸𠂻斷丁亂翻選置戎臣先求易制易以䜴翻多其部以分其力輕其任以弱其心遂令爽於軍情亦聽命乖於事宜亦聽命戎虜馳突迅如風飊馹書上聞馹人質翻驛傳遞馬旬月方報守土者以兵寡不敢抗敵分鎮者以無詔不肯出師賊既縱掠退歸此乃陳功告㨗其敗喪則減百而為一其捃獲則張百而成千䘮息浪翻捃居隕翻将帥既幸於總制在朝不憂罪累累良瑞翻陛下又以為大權由己不究事情可謂機失於遥制矣此六失也臣愚謂宜罷諸道将士防秋之制令本道但供衣糧募戍卒願留及蕃漢子弟以給之又多開屯田官為收糴為于偽翻冦至則人自為戰時至則家自力農與夫倐來忽往者豈可同等而論哉又宜擇文武能臣為隴右朔方河東三元帥分統縁邊諸節度使有非要者隨所便近而併之然後減姦濫虛浮之費以豐財定衣糧等級之制以和衆𢎞委任之道以宣其用懸賞罰之典以考其成如是則戎狄威懐疆場寧謐矣上雖不能盡從心甚重之韋臯遣大将董勔等将兵出西山勔彌兖翻自彭州導江縣西出蠶崖闗厯維茂至當悉諸州皆西山也破吐蕃之衆拔堡柵五十餘丙午門下侍郎同平章事董晉罷為禮部尚書雲南王異牟尋遣使者三軰一出戎州宋白曰戎州漢𤏡道南安縣地梁置戎州言以鎮戎夷也西南取曲恊州并南寧州安寧鹽井路至南詔所居羊苴哶城二千三百里舊志戎州在京師西南三千一百四里一出黔州一出安南各齎生金丹砂詣韋臯金礦未經鍜鍊者為生金丹砂産石中鑿石取之黔音琴金以示堅丹砂以示赤心三分臯所與書為信皆達成都異牟尋上表請弃吐蕃歸唐并遺臯帛書遺唯季翻自稱唐雲南王孫吐蕃贊普義弟日東王吐蕃以雲南王為弟見二百一十六卷天寳十載封日東王見二百二十六卷代宗大厯十四年臯遣其使者詣長安并上表賀上賜異牟尋詔書令臯遣使慰撫之并上時掌翻令力丁翻使疏吏翻賈耽陸贄趙憬盧邁為相百官白事更讓不言耽都含翻憬居永翻相息亮翻更工衡翻互也秋七月奏請依至徳故事宰相迭秉筆以處政事事見二百一十九卷肅宗至徳元載十月處昌吕翻下同旬日一易詔從之其後日一易之劒南西山諸𦍑女王湯立志女王亦羌别種東與吐蕃党項茂州接西屬三波訶北距于闐屬雅州羅女蠻白狼夷以女為君居康延川巗險四繚有弱水南流湯立志新書作湯立悉杜陽編女蠻國人危髻金冠瓔珞被體故謂之菩薩蠻當時倡優遂因制菩薩蠻曲哥隣王董卧庭白狗王羅陀怱弱水王董辟和南水王薛莫庭悉董王湯悉贊清遠王蘇唐磨咄霸王董邈蓬及逋租王自哥隣以下諸種皆散居西山西山即雪山今威州保寧縣有雪山連乳川白狗嶺有九峯積雪春夏不消白狗嶺與雪山相連威州唐之維州也先皆役屬吐蕃至是各帥衆内附韋臯處之於維保覇州天寳元年招附生羌置覇州給以耕牛種糧種章勇翻立志陀怱辟和入朝皆拜官厚賜而遣之癸卯户部侍郎裴延齡奏自判度支以來檢責諸州欠負錢八百餘萬緡收諸州抽貫錢三百萬緡呈様物三十餘萬緡請别置欠負耗賸季庫以掌之耗虧減也賸贏餘也賸以證翻又食證翻三月為一季凡三月終則入物于庫故謂之季庫柒練物則别置月庫以掌之每月入物故謂之月庫詔從之欠負皆貧人無可償徒存其數者抽貫錢給用隨盡呈様染練皆左藏正物藏徂浪翻延齡徒置别庫虛張名數以惑上上信之以為能富國而寵之於實無所增也於實者於其實也虛費吏人簿書而已京城西汚濕地生蘆葦數畞延齡奏稱長安咸陽有陂澤數百頃可牧廐馬上使有司閱視無之亦不罪也左補闕權徳輿上奏權本顓頊之後為楚武王所滅子孫以國為氏上時掌翻以為延齡取常賦支用未盡者充羡餘以為己功羡弋線翻縣官先所市物再給其直用充别貯貯丁吕翻邊軍自今春以來並不支糧陛下必以延齡孤貞獨立時人醜正流言何不遣信臣覆視究其本末明行賞罰今羣情衆口喧於朝市朝直遥翻豈京城士庶皆為朋黨邪陛下亦宜稍囘聖慮而察之上不從八月庚戍太尉中書令西平忠武王李晟薨冬十月甲子韋臯遣其節度巡官崔佐時齎詔書詣雲南并自為帛書答之節度巡官在判官推官之下衙推之上十一月乙酉上祀圓丘赦天下劉士寧既為宣武節度使八年三月命劉士寧為宣武節度使諸将多不服士寧淫亂殘忍出畋輙數日不返軍中苦之都知兵馬使李萬榮得衆心士寧疑之奪其兵權令攝汴州事十二月乙卯士寧帥衆二萬畋于外野帥讀曰率萬榮晨入使府召所留親兵千餘人詐之曰敕徴大夫入朝以吾掌留務汝軰人賜錢三十緡衆皆拜又諭外營兵皆聽命乃分兵閉城門使馳白士寧曰敕徴大夫宜速即路即就也少或遷延當傳首以獻士寧知衆不為用以五百騎逃歸京師北至東都比必利翻及也所餘僕妾而已至京師敕歸第行喪禁其出入淮西節度使吳少誠聞變發兵屯郾城郾城漢晉之郾縣也後魏省倂入曲陽縣隋開皇初置郾城縣屬汴州時屬蔡州蔡北鄙也東有漢召陵縣故城東南有後漢征羌縣故城郾一戰翻遣使問故問所以逐士寧之故且請戰萬榮以言戲之戲之示無所畏少誠慙而退上聞萬榮逐士寧使問陸贄贄上奏以為今軍州已定宜且遣朝臣宣勞勞力到翻徐察事情冀免差失其略曰今士寧見逐雖是衆情萬榮典軍且非朝㫖此安危彊弱之機也願陛下審之愼之上復使謂贄復扶又翻下同若更淹遲恐於事非便今譏除一親王充節度使且令萬榮知留後其制即從内出贄復上奏其略曰臣雖服戎角力諒匪克堪而經武伐謀或有所見夫制置之安危由勢付授之濟否由才勢如器焉惟在所置置之夷地則平才如負焉唯在所授授踰其力則踣踣蒲北翻萬榮今所陳奏頗涉張皇但露徼求之情徼一遥翻殊無退讓之禮據兹鄙躁殊異循良又聞本是滑人劉𤣥佐滑州匡城人萬榮與同里相善偏厚當州将士當州猶言本州謂滑州也與之相得纔止三千諸營之兵已甚懷怨據此頗僻頗滂何翻偏也亦非将材若得志驕盈不悖則敗悖則犯上敗則僨軍将即亮翻悖蒲内翻僨方問翻又曰茍邀則不順茍允則不誠君臣之間勢必嫌阻邀求也非所當求而求之為茍邀允從也非所當從而從之為茍允下以不順求之上以不誠應之其勢必至於嫌阻與其圖之於滋蔓左傳曰毋使滋蔓蔓難圖也不若絕之於萌芽又曰為國之道以義訓人将教事君先令順長長知兩翻下獨長同又曰方鎮之臣事多専制欲加之罪誰則無辭若使傾奪之徒便得代居其任利之所在人各有心此源濳滋禍必難救非獨長亂之道亦闗謀逆之端又曰昨逐士寧起於倉卒卒讀曰猝諸郡守将固非連謀将即亮翻一城師人亦未恊志各計度於成敗之勢度徒洛翻迴遑於逆順之名安肯捐軀與之同惡又曰陛下但選文武羣臣一人命為節度仍降優詔慰勞本軍勞力到翻奨萬榮以撫定之功别加寵任褒将士以輯睦之義厚賜資装揆其大情理必寧息萬榮縱欲䟦扈勢何能為又曰儻後事有愆素左傳曰不愆于素杜預注云不過素所慮也臣請受敗橈之罪橈奴敎翻上不從壬戍以通王諶為宣武節度大使諶氏壬翻以萬榮為留後丁卯納故駙馬都尉郭曖女為廣陵王淳妃淳太子之長子是為憲宗妃母即昇平公主也十年春正月劒南西山羌蠻二萬餘户來降詔加韋臯押近界羌蠻及西山八國使八國即前女王哥鄰等弱水最弱小不得預八國數崔佐時至雲南所都羊苴咩城蜀注苴徐嗟翻咩彌嗟翻詳見前考異曰舊傳作羊苴咩城今從舊傳吐蕃使者數百人先在其國雲南王異牟尋尚不欲吐蕃知之令佐時衣牂柯服而入牂柯蠻在昆明東九百里東距辰州二千四百里其南千五百里即交州衣於既翻下同佐時不可曰我大唐使者豈得衣小夷之服異牟尋不得已夜迎之佐時大宣詔書大聲以宣詔書異牟尋恐懼顧左右失色業已歸唐事已成為業乃歔欷流涕俯伏受詔歔音虛欷許既翻又音希鄭囘密見佐時敎之鄭囘勸異牟歸唐事見二百三十二卷三年故佐時盡得其情因勸異牟尋悉斬吐蕃使者去吐蕃所立之號獻其金印去羌吕翻吐蕃給雲南金印見二百一十一卷𤣥宗天寳十載復南詔舊名異牟尋皆從之時考異曰舊韋臯傳四年正月臯遣判官崔佐至苴咩城接西南夷事状四年臯微聞異牟尋之意始因諸蠻寓書於牟尋自是比年招諭至九年牟尋始遣使分臯書以來朝廷賜之詔書臯乃遣佐時齎詔以往牟尋猶欲使佐時易服而入臯傳誤也仍刻金契以獻異牟尋帥其子尋夢湊等與佐時盟於㸃蒼山神祠帥讀曰率先是吐蕃與囘鶻爭北庭大戰死傷甚衆爭北庭事見上卷五年六年先悉薦翻徴兵萬人於雲南異牟尋辭以國小請發三千人吐蕃少之以為少也少詩紹翻益至五千乃許之異牟尋遣五千人前行自将數萬人踵其後晝夜兼行襲擊吐蕃戰于神川大破之取鐵橋等十六城鐵橋在施蠻東南據新書是戰也異牟尋破施順二蠻並虜其王置白崖城又據新志自戎州開邊縣南行至白崖城三千里而近南詔傳曰南詔居永昌姚州之間鐵橋之南将即亮翻虜其五王降其衆十餘萬戊戍遣使來獻㨗降户江翻使䟽吏翻瀛州刺史劉澭為兄濟所逼濟澭不恊事始上卷八年請西扞隴坻坻丁禮翻遂将部兵千五百人男女萬餘口詣京師號令嚴整在道無一人敢取人雞犬者上嘉之二月丙午以為秦州刺史隴右經略軍使理普潤理治也以普潤為治所軍中不撃柝不設音樂士卒病者澭親視之死者哭之乙丑義成節度使李融薨丁卯以華州刺史李復為義成節度使復齊物之子也李齊物淮安王神通之孫復辟河南尉洛陽盧坦為判官監軍薛盈珍數侵軍政數所角翻坦每據理以拒之盈珍常曰盧侍御所言公我固不違也坦後卒能脫於盈珍之譛侍御坦之寄禄官所謂憲街也横海節度使程懐直入朝厚賜遣歸夏四月庚午宣武軍亂留後李萬榮討平之先是宣武親兵三百人素驕横先悉薦翻横户孟翻萬榮惡之惡烏路翻遣詣京西防秋親兵怨之大将韓惟清張彦琳誘親兵作亂攻萬榮萬榮擊破之親兵掠而潰多奔宋州宋州刺史劉逸準厚撫之史言李萬榮不能制劉逸準惟清奔鄭州彦琳奔東都萬榮悉誅亂者妻子數千人有軍士數人呼於市曰呼火故翻今夕兵大至城當破萬榮收斬之奏稱劉士寧所為五月庚子徙士寧於郴州郴丑林翻欽州蠻酋黄少卿反圍州城少卿者西原黄洞蠻酋也酋兹由翻邕管經略使孫公器奏請發嶺南兵救之上元後置邕管經略使領邕貴黨横等州上不許遣中使諭解之陸贄上言郊禮赦下已近半年而竄謫者尚未霑恩乃為三状擬進上使謂之曰故事左降官準赦量移史炤曰移徙也謂得罪遠謫者遇赦則量徙近地不過三五百里今所擬稍似超越又多近兵馬及當路州縣當路州縣謂其地當入京之路者近其靳翻事恐非便贄復上言復扶又翻下同以為王者待人以誠有責怒而無猜嫌有懲沮而無怨忌斥遠以儆其不恪遠于願翻甄恕以勉其自新甄稽延翻察也免也不儆則浸及威刑不勉而復加黜削雖屢進退俱非愛憎行法乃暫使左遷念材而漸加進叙又知復用誰不增脩何憂乎亂常何患乎蓄憾如或以其貶黜便謂姦凶恒處防閑之中處昌吕翻長從擯弃之例則是悔過者無由自補蘊才者終不見伸凡人之情窮則思變含悽貪亂或起于兹悽悲也痛也今若所移不過三五百里則有疆域不離於本道風土反惡於舊州離力智翻風土之同道而獨甚惡者如廣府統廣韶端康封岡新樂瀧竇義雷春高循潮等州而春循新瘴氣特重於諸州是也徒有徙家之勞寔增移配之擾又當今郡府多有軍兵所在封疆少無舘驛示人疑慮體又非𢎞乞更賜裁審上性猜忌不委任臣下官無大小必自選而用之宰相進擬少所稱可稱尺證翻稱愜也下同少詩沼翻及羣臣一有譴責往往終身不復收用好以辯給取人好呼到翻下同不得敦實之士艱於進用羣材滯淹贄上奏諫其略曰夫登進以懋庸懋勉也庸功也黜退以懲過二者迭用理如循環進而有過則示懲懲而改脩則復進既不廢法亦無弃人雖纎介必懲而用材不匱故能使黜退者克勵以求復登進者警飭而恪居恪居謂恪居官次也上無滯疑下無蓄怨又曰明主不以辭盡人不以意選士如或好善而不擇所用恱言而不驗所行進退隨愛憎之情離合繫異同之趣是由捨繩墨而意裁曲直弃權衡而手揣重輕雖甚精微不能無謬由與猶同揣初委翻又曰中人以上迭有所長茍區别得宜别彼列翻付授當器當丁浪翻下過當同各適其性各宣其能及乎合以成功亦與全才無異但在明鑒大度御之有道而已又曰以一言稱愜為能愜苦叶翻而不核虛實以一事違忤為咎而不考忠邪忤五故翻其稱愜則付任逾涯不思其所不及其違忤則罪責過當不恕其所不能是以職司之内無成功君臣之際無定分上不聽分扶問翻贄又請均節財賦凡六條其一論兩税之弊其略曰舊制賦役之法曰租調庸調徒弔翻丁男一人受田百畞歲輸粟二石謂之租每户各隨土宜出絹若綾若絁共二丈絁式支翻綿三兩不蠶之土輸布二丈五尺麻三斤謂之調每丁歲役則收其庸日準絹三尺謂之庸天下為家法制均一雖欲轉徙莫容其姦故人無揺心而事有定制及羯胡亂華謂安禄山史思明黎庶雲擾版圖墮於避地墮讀曰隳賦法壊於奉軍建中之初再造百度執事者知弊之宜革而所作兼失其原知簡之可從而所操不得其要操七刀翻執事者謂楊炎凡欲拯其弊須窮致弊之由時弊則但理其時法弊則全革其法所為必當其悔乃亡易曰革而當其悔乃亡當丁浪翻兵興以來供億無度此乃時弊非法弊也而遽更租庸調法更工衡翻分遣使者搜擿郡邑擿他狄翻校驗簿書每州取大厯中一年科率最多者以為兩税定額事見二百二十六卷建中元年夫財之所生必因人力故先王之制賦入必以丁夫為本不以務穡增其税不以輟稼减其租則播種多不以殖産厚其征不以流寓免其調則地著固著直略翻不以飭勵重其役不以窳怠蠲其庸則功力勤窳勇主翻惰也如是故人安其居盡其力矣兩税之立惟以資産為宗不以丁身為本曾不悟資産之中有蔵於襟懐囊篋物雖貴而人莫能窺謂商賈居寶貨待時而取利者有積於場圃囷倉直雖輕而衆以為富謂力田而蓄穀粟者有流通蕃息之貨數雖寡而計日收贏蕃讀如繁謂貸子錢而收利者有廬舍器用之資價雖高而終歲無利謂美居室侈服用而夸一時者如此之比其流實繁一槩計估筭緡宜其失平長偽長知兩偽由是務輕資而樂轉徙者恒脱於徭税樂音洛敦本業而樹居産者每困於徴求此乃誘之為姦驅之避役誘音酉力用不得不弛賦入不得不闕復以創制之首創制之首猶言立法之初復扶又翻不務齊平供應有煩簡之殊牧守有能否之異所在徭賦輕重相懸所遣使臣意見各異計奏一定有加無除又大厯中供軍進奉之類既收入兩税今於兩税之外復又並存望稍行均减以救凋殘其二請二税以布帛為額不計錢數其略曰凡國之賦税必量人之力量音良任土之宜故所入者惟布麻繒纊繒疾陵翻纊苦謗翻與百糓而已先王懼物之貴賤失平而人之交易難凖又定泉布之法以節輕重之宜班固曰太公為周立九府圜法貨寳於金利於刀流於泉布於布束於帛又鄭氏周禮注曰其藏曰泉其行曰布取名於水泉其流行無不徧歛散弛張必由於是蓋御財之大柄為國之利權守之在官不以任下然則糓帛者人之所為也錢貨者官之所為也是以國朝著令租出榖庸出絹調出繒纊布曷嘗有禁人鑄錢而以錢為賦者哉今之兩税獨異舊章但估資産為差便以錢榖定税臨時折徴雜物謂折錢穀之價以徴他雜物也折之舌翻每歳色目頗殊唯計求得之利宜靡論供辦之難易易以豉翻所徴非所業所業非所徴遂或増價以買其所無減價以賣其所有一増一減耗損已多望勘㑹諸州初納兩税年絹布定估比類當今時價加賤減貴酌取其中縂計合税之錢折為布帛之數又曰夫地力之生物有大限取之有度用之有節則常足取之無度用之無節則常不足生物之豐敗由天用物之多少由人是以聖王立程量入為出雖遇災難難乃旦翻下無困窮理化既衰則乃反是理化猶言治化也量出為入不恤所無桀用天下而不足湯用七十里而有餘是乃用之盈虚在節與不節耳其三論長吏以増户加税闢田為課績其畧曰長人者罕能推忠恕易地之情體至公徇國之意迭行小惠競誘姦甿長知丈翻甿謨耕翻以傾奪鄰境為智能以招萃逋逃為理化捨彼適此者既為新收而有復萃聚也復方目翻復除也倐往忽来者又以復業而見優唯懐土安居首末不遷者則使之日重斂之日加斂力贍翻下同是令地著之人恒代惰遊賦役何異驅之轉徙教之澆訛恒户登翻澆古堯翻此由牧宰不克𢎞通各私所部之過也又曰立法齊人乆無不弊理之者若不知維御損益之宜則巧偽萌生恒因沮勸而滋矣請申命有司詳定考績若當管之内人益阜殷所定税額有餘任其據户口均减以减數多少為考課等差其當管稅物通比毎户十分减三者為上課減二者次焉減一者又次焉此不以増户為課最而以户額増之税能減地著户之税額為課最也如或人多流亡加税見户見賢遍翻比校殿罰亦如之殿丁練翻其四論税限迫促其畧曰建官立國所以養人也賦人取財所以資國也明君不厚其所資而害其所養故必先人事而借其暇力先家給而歛其餘財先悉薦翻又曰蠶事方興已輸縑税農功未艾遽斂榖租上司之繩責既嚴下吏之威暴愈促有者急賣而耗其半直無者求假而費其倍酬望更詳定徴税期限其五請以税茶錢置義倉以備水旱税茶見上九年其畧曰古稱九年六年之蓄者記王制曰三年耕必有一年之食九年耕必有三年之食以三十年之通制國用量入以為出國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也率土臣庶通為之計耳固非獨豐公庾不及編甿也近者有司奏請稅茶歳約得五十萬貫元敕令貯户部用救百姓凶饑今以蓄糧適副前㫖其六論兼并之家私斂重於公稅其畧曰今亰畿之内毎田一畝官稅五升而私家收租殆有畝至一石者是二十倍於官稅也降及中等租猶半之夫土地王者之所有耕稼農夫之所為而兼并之徒居然受利又曰望凡所占田占之贍翻約為條限裁減租價務利貧人法貴必行慎在深刻裕其制以便俗嚴其令以懲違微損有餘稍優不足失不損富優可賑窮此乃安富恤窮之善經不可捨也周禮地官以保息六養萬民一曰慈幼二曰養老三曰振窮四曰恤貧五曰寛疾六曰安富資治通鑑卷二百三十四
