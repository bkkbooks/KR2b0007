body:
  text: 資治通鑑卷九宋司馬光撰胡三省音註漢紀一起旃䝉協洽盡柔兆涒灘凡二年項羽之分天下王諸將也王沛公於巴蜀漢中曰漢王王怒欲攻羽蕭何諫曰語曰天漢其稱甚美於是就國及滅項羽冇天下遂因始封國名而號曰漢太祖髙皇帝上之上姓劉氏諱邦字季沛豐邑中陽里人張晏曰諡法無髙以帝為功最髙而為帝之太祖故特起此名也元年冬十月古有三正子為天正周用之以十一月為嵗首丑為地正殷用之以十二月為嵗首寅為人正夏用之以十三月為嵗首秦水徳謂建亥之月水得位故以十月為嵗首髙祖以十月至霸上因而不革至武帝太初元年定歴改用夏正始以寅為嵗首至於今因之沛公至霸上考異曰史記漢書荀恱漢紀皆云是月五星聚東井按魏收後魏書髙允傳崔浩集諸術士考校漢元以來日月薄蝕五星行度并譏前史之失别為魏厯以示允允曰善言逺者必先驗於近且漢元年冬十月五星聚於東井此乃厯術之淺事今譏漢史而不覺此謬恐後之譏今猶今之譏古浩曰所繆云何允曰按星傳金水二星常附日而行冬十月日旦在尾箕昏沒於申南而東井方出於寅北何因背日而行是史官欲神其事不復推之於理浩曰欲為變者何所不可君獨不疑三星之聚而怪二星之來允曰此不可以空言争宜更審之時坐者咸怪東宫少傅游雅曰髙君長於厯當不虚言也後嵗餘浩謂允曰先所論者本不經心及更考究果如君語以前三月聚於東井非十月也今従之十月不言五星聚秦王子嬰素車白馬係頸以組封皇帝璽符節降軹道旁應劭曰子嬰不敢襲帝號但稱王耳素車白馬䘮人之服組者天子韍也係頸言欲自殺也師古曰此組謂綬也所以帶璽也組總五翻今綬分絛是也應劭曰璽信也古者尊卑共之左傳襄公在楚季武子使公冶問璽書追而與之秦漢尊者以為信羣下乃避之漢官儀曰子嬰上始皇璽因服御之代代傳受號漢傳國璽沈約曰髙祖入關得秦始皇藍田玉璽螭虎紐文曰受天之命皇帝夀昌後代名傳國璽史記正義曰天子有六璽皇帝行璽皇帝之璽皇帝信璽天子行璽天子之璽天子信璽皇帝信璽凡事皆用之璽令施行天子信璽以遷拜封諸侯之璽以發兵皆以武都紫泥封虞喜志林曰傳國璽自在六璽之外天子凡七璽符說文曰信也韋昭曰符發兵符也師古曰符諸所合符以為契者也周禮地官之屬有掌節鄭𤣥注云節猶信也行者所執之信三禮義宗曰節長尺二寸秦漢以下改為旌􅓚之形韋昭曰節者使所擁也釋名云為號令賞罰之節也師古曰節以毛為之上下相重取象竹節將命者持之以為信徐廣曰軹道在霸陵蘇林曰亭名也在長安東十三里漢宫殿疏曰軹道亭東去霸城觀四里觀東去霸水百步括地志軹音紙軹道在雍州萬年縣東北十六里苑中諸將或言誅秦王沛公曰始懐王遣我固以能寛容事見上卷秦二世二年且人已降殺之不祥乃以屬吏屬付也屬吏者付之於吏使監守之也屬之欲翻賈誼論曰秦以區區之地致萬乗之權招八州而朝同列蘇林曰招音翹舉也秦國周職方雍州之地耳既破六國乃舉豫兖青揚荆幽冀并八州有之六國與秦俱稱王是為同列朝直遥翻百有餘年然後以六合為家六合謂天地東西南北殽函為宫一夫作難而七廟墮墮讀曰隳記天子七廟三昭三穆與太祖之廟而七身死人手為天下笑者何也仁誼不施而攻守之勢異也沛公西入咸陽諸將皆争走金帛財物之府分之走音奏蕭何獨先入收秦丞相府圖藉藏之以此沛公得具知天下阨塞阨乙革翻塞悉則翻户口多少彊弱之處沛公見秦宫室帷帳狗馬重寳婦女以千數意欲留居之樊噲諫曰沛公欲有天下邪將為富家翁邪凡此奢麗之物皆秦所以亡也沛公何用焉願急還霸上無留宫中樊噲起於狗屠識見如此予謂噲之功當以諫留秦宫為上鴻門誚讓項羽次之姓譜周宣王封仲山甫於樊後因氏焉沛公不聽張良曰秦為無道故沛公得至此夫為天下除殘賊宜縞素為資縞素有䘮之服謂弔民也為音于偽翻縞音工老翻今始入秦即安其樂樂音洛此所謂助桀為虐且忠言逆耳利於行毒藥苦口利於病願沛公聴樊噲言沛公乃還軍霸上十一月沛公悉召諸縣父老豪傑謂曰父老苦秦苛法久矣苛音柯細也吾與諸侯約先入關者王之王於况翻又如字吾當王關中與父老約法三章耳殺人者死傷人及盜抵罪服䖍曰隨輕重制法也李竒曰傷人冇曲直盜贓有多少罪名不可預定凡言抵罪未知抵何罪也師古曰抵至也當也服李二説並得之抵丁禮翻餘悉除去秦法諸吏民皆案堵如故案次第也堵墻堵也言不遷動也去𦍑吕翻凡吾所以來為父老除害非有所侵暴無恐且吾所以還軍霸上待諸侯至而定約束耳乃使人與秦吏行縣鄉邑告諭之秦制縣大率方百里十里一亭十亭一鄉所封食邑為於偽翻行下孟翻秦民大喜争持牛羊酒食獻饗軍士沛公又讓不受曰倉粟多非乏不欲費民民又益喜唯恐沛公不為秦王項羽既定河北率諸侯兵欲西入關先是諸侯吏卒繇使屯戍過秦中者秦中吏卒遇之多無狀言無善狀也先悉薦翻繇讀曰徭及章邯以秦軍降諸侯諸侯吏卒乗勝多奴虜使之輕折辱秦吏卒秦吏卒多怨竊言曰章將軍等詐吾屬降諸侯今能入關破秦大善即不能諸侯虜吾屬而東秦又盡誅吾父母妻子奈何諸將微聞其計以告項羽項羽召黥布蒲將軍計曰秦吏卒尚衆其心不服至關不聴事必危不如撃殺之而獨與章邯長史欣都尉翳入秦於是楚軍夜擊阬秦卒二十餘萬人新安城南班志縣屬𢎞農郡師古曰今榖州縣括地志新安故城在洛州澠池縣東一十二里或說沛公曰秦富十倍天下地形彊聞項羽號章邯為雍王王闗中雍於用翻王關之王於况翻下欲王同今則來沛公恐不得有此可急使兵守函谷闗無内諸侯軍内音納又如字今𫝊内従人奴對翻従入者讀為納稍徴闗中兵以自益距之沛公然其計従之已而項羽至闗關門閉聞沛公已定關中大怒使黥布等攻破函谷關十二月項羽進至戲戲許宜翻沛公左司馬曹無傷使人言項羽曰沛公欲王關中令子嬰為相珍寳盡有之欲以求封項羽大怒饗士卒期旦日擊沛公軍當是時項羽兵四十萬號百萬在新豐鴻門新豐縣本秦驪邑髙祖七年方置史以後來縣名書之應劭曰太上皇思東歸於是髙祖築城市街里以象豐徙豐民以實之故號新豐孟康曰鴻門在新豐東十七里舊大道下阪口名也姚察云在新豐古城東末至戯水道南有㫁原南北洞門是也水經注今新豐古城東冇阪長二里餘塹原通道南北洞門有同門汏謂之鴻門孟康言在新豐東十七里無之葢指縣治而言非謂城也自新豐古城西至霸城五十里霸城西十里則霸水又西二十里則長安城沛公兵十萬號二十萬在霸上范増說項羽曰沛公居山東時貪財好色今入關財物無所取婦女無所幸此其志不在小吾令人望其氣皆為龍虎成五采此天子氣也周禮眡祲氏掌十煇之法以觀妖祥辨吉凶即後世所謂望氣者也晉天文志天子氣内赤外黄四方所發之處當有王者若天子欲有遊往處其地亦先發此氣或如城門隐隠在氣霧中或氣象青衣人無手在日西或如龍馬或雜色欝欝衝天者皆帝王之氣急擊勿失楚左尹項伯者楚官有左尹右尹項羽季父也素善張良乃夜馳之沛公軍私見張良具告以事欲呼與俱去曰毋俱死也張良曰臣為韓王送沛公沛公今有急亡去不義不可不語為於偽翻語牛居翻良乃入具告沛公沛公大驚良曰料公士卒足以當項羽乎沛公黙然曰固不如也且為之奈何張良曰請往謂項伯言沛公之不敢叛也沛公曰君安與項伯有故張良曰秦時與臣游嘗殺人臣活之今事有急故幸來告良沛公曰孰與君少長良曰長於臣少詩照翻長知两翻沛公曰君為我呼入吾得兄事之張良出固要項伯要一遥翻項伯即入見沛公沛公奉巵酒為夀約為婚姻曰吾入闗秋毫不敢有所近文穎曰毫秋乃成好舉盛而言也師古曰毫成之時端極纎細適足喻小非言其盛近其靳翻籍吏民封府庫而待將軍所以遣將守闗者備它盜之出入與非常也日夜望將軍至豈敢反乎願伯具言臣之不敢倍徳也倍讀曰背項伯許諾謂沛公曰旦日不可不蚤自來謝沛公曰諾於是項伯復夜去至軍中具以沛公言報項羽因言曰沛公不先破關中公豈敢入乎今人有大功而擊之不義也不如因善遇之項羽許諾沛公旦日従百餘騎來見項羽鴻門謝曰臣與將軍勠力而攻秦將軍戰河北臣戰河南不自意能先入關破秦得復見將軍於此今者有小人之言令將軍與臣有隙項羽曰此沛公左司馬曹無傷言之不然籍何以至此項羽因留沛公與飲范増數目項羽數所角翻舉所佩玉玦以示之者三玦如環而有缺増舉以示羽盖欲其决意殺沛公也項羽黙然不應范増起出召項莊謂曰君王為人不忍若入前為夀若汝也師古曰凡言為夀者謂進爵於尊者而獻無疆之夀夀畢請以劒舞因擊沛公於坐殺之坐徂卧翻不者若屬皆且為所虜莊則入為夀夀畢曰軍中無以為樂樂音洛請以劒舞項羽曰諾項莊㧞劒起舞項伯亦㧞劒起舞常以身翼蔽沛公莊不得擊於是張良至軍門見樊噲噲曰今日之事何如良曰今項莊㧞劒舞其意常在沛公也噲曰此廹矣臣請入與之同命噲即帶劒擁盾入盾所以蔽身者也盾食尹翻軍門衛士欲止不内樊噲側其盾以撞衛士仆地撞丈江翻擊也遂入披帷立在旁曰帷釋名曰帷圍也以自障圍也瞋目視項羽瞋怒目也昌真翻頭髮上指目眦盡裂眦才賜翻又在計翻目際也項羽按劒而跽曰跽其紀翻長跪也客何為者張良曰沛公之參乗樊噲也項羽曰壯士賜之巵酒則與斗巵酒噲拜謝起立而飲之項羽曰賜之彘肩則與一生彘肩樊噲覆其盾於地加彘肩其上㧞劒切而㗖之項羽曰壯士復能飲乎復扶又翻樊噲曰臣死且不避巵酒安足辭夫秦有虎狼之心殺人如不能舉刑人如恐不勝天下皆叛之懐王與諸將約曰先破秦入咸陽者王之今沛公先破秦入咸陽毫毛不敢有所近近其靳翻還軍霸上以待將軍勞苦而功髙如此未有封爵之賞而聴細人之說欲誅有功之人此亡秦之續耳竊為將軍不取也項羽未有以應曰坐樊噲従良坐坐須臾沛公起如厠因招樊噲出沛公曰今者出未辭也為之奈何樊噲曰如今人方為刀爼我方為魚肉何辭為於是遂去鴻門去霸上四十里沛公則置車騎置留也留車騎於鴻門不以自隨脫身獨騎樊噲夏侯嬰靳彊紀信等四人姓譜夏侯出自夏后之後杞簡公為楚所滅其弟佗奔魯魯悼公以佗出自夏后氏受爵為侯謂之夏侯因而命氏紀春秋紀侯之後以國為姓持劒盾步走従驪山下道芷陽間行趣霸上班志京兆霸陵縣故芷陽也文帝更名間空也投空隙而行間古莧翻趣讀如趣嚮之趨逡須翻後以義推又七喻翻留張良使謝項羽以白璧獻羽玉斗與亞父沛公謂良曰從此道至吾軍不過二十里耳度我至軍中公乃入度徒洛翻沛公已去間至軍中張良入謝曰沛公不勝桮杓不能辭勝音升謹使臣良奉白璧一雙再拜獻將軍足下玉斗一雙再拜奉亞父足下項羽曰沛公安在良曰聞将軍有意督過之師古曰謂視責也脫身獨去已至軍矣項羽則受璧置之坐上坐徂卧翻亞父受玉斗置之地㧞劒撞而破之曰唉歎恨之聲音烏開翻又於其翻豎子不足與謀奪將軍天下者必沛公也吾屬今為之虜矣沛公至軍立誅殺曹無傷居數日項羽引兵西屠咸陽殺秦降王子嬰燒秦宫室火三月不滅收其貨寳婦女而東秦民大失望秦民初見沛公無所侵暴而恱及為項羽殘滅失其初所望也韓生說項羽曰關中阻山帶河四塞之地地肥饒可都以霸項羽見秦宫室皆已燒殘破又心思東歸曰富貴不歸故鄉如衣繡夜行誰知之者韓生退曰人言楚人沐猴而冠耳果然師古曰沐猴獮猴也言雖著人衣冠其心不類人也果然如人之言也項羽聞之烹韓生項羽使人致命懐王懐王曰如約言如前約使沛公王關中項羽怒曰懐王者吾家所立耳非有功伐張晏曰積功曰伐何以得専主約天下初發難時謂初起兵時難乃旦翻假立諸侯後以伐秦然身被堅執銳首事暴露於野史記正義曰暴蒲北翻又如字三年滅秦定天下者皆將相諸君與籍之力也懐王雖無功固當分其地而王之諸將皆曰善春正月羽陽尊懐王為義帝曰古之帝者地方千里必居上㳺游即流也言居水之上流乃徙義帝於江南都郴史記曰長沙郴縣班志郴縣屬桂陽郡盖髙祖定天下方分長沙為桂陽郡也郴丑林翻二月羽分天下王諸將羽自立為西楚霸王文頴曰史記貨殖傳淮以北沛陳汝南南郡為西楚彭城以東吴廣陵為東楚衡山九江江南長沙豫章為南楚羽欲都彭城故自稱西楚孟康曰舊名江陵為南楚吴為東楚彭城為西楚師古曰孟說是王梁楚地九郡都彭城班志縣屬楚國史記正義曰徐州縣羽與范増疑沛公而業已講解又惡負約惡烏路翻乃隂謀曰巴蜀道險秦之遷人皆居之乃曰巴蜀亦關中地也故立沛公為漢王王巴蜀漢中都南鄭巴蜀漢中秦所置三郡地也班志南鄭縣屬漢中括地志南鄭縣今梁州治所近世有季文子者蜀人也著蜀鑑曰南鄭自南鄭漢中自漢中南鄭乃古褒國秦未得蜀以前先取之漢中乃金洋均房等州六百里是也秦既得漢中乃分南鄭以𨽻之而置郡焉南鄭與漢中為一自此始春秋楚人巴人㓕庸即今均房兩州地班志漢中郡治西城今金州上庸郡是也而三分關中王秦降將以距塞漢路塞悉則翻章邯為雍王王咸陽以西都廢邱班志扶風槐里縣周曰犬邱懿王所都也秦曰廢邱髙祖三年更名韋昭曰犬邱周懿王所都秦欲廢周故曰廢邱括地志廢邱故城在雍州始平縣東南一十里長史欣者故為櫟陽獄掾嘗有徳於項梁都尉董翳者本勸章邯降楚故立欣為塞王王咸陽以東至河都櫟陽韋昭曰塞在長安名桃林塞史記正義曰桃林塞今華州潼闗師古曰取河華之固為阨塞耳非桃林也塞先代翻櫟陽縣屬馮翊括地志漢七年分櫟陽城内為萬年縣隋改為大興縣唐復萬年秦獻公所城櫟陽故城在今雍州櫟陽縣東北二十五里項梁嘗有櫟陽逮請蘄獄掾曹咎書以抵欣而事得已所謂有徳於梁也櫟音藥立翳為翟王王上郡都髙奴以上郡北近戎翟因以名國班志髙奴縣屬上郡索隠曰今鄜州有髙奴城括地志延州城即漢髙奴縣杜佑曰延州春秋白翟之地漢為膚施髙奴臨河縣地後魏置東夏州後改延州以界内延水為名董翳都髙奴今金明縣是也項羽欲自取梁地乃徙魏王豹為西魏王王河東都平陽班志縣屬河東郡瑕邱申陽者張耳嬖臣也先下河南郡迎楚河上故立申陽為河南王都洛陽括地志洛陽故城在洛州洛陽縣東北二十六里周公所築即成周城也輿地志成周之地秦莊襄王以為洛陽縣三川守治焉後漢都雒陽改為雒漢以火徳忌水故去洛旁水而加佳魏於行次為土土水之忌也水得土而流土得水而柔故除佳而加水韓王成因故都都陽翟趙將司馬卬定河内數有功故立卬為殷王王河内都朝歌河内郡朝歌縣故殷都也因以名國徙趙王歇為代王趙相張耳素賢又従入關故立耳為常山王王趙地治襄國括地志邢州本漢襄國縣秦置三十六郡於此置信都縣屬鉅鹿郡項羽改曰襄國子據班志襄國縣屬趙國信都縣屬信都國漢盖又分為二縣宋白曰趙王歇都襄國今邢州所理龍岡縣城是也當陽君黥布為楚將常冠軍冠音古玩翻故立布為九江王都六班志當陽縣屬南郡九江應劭曰江自廬江尋陽分為九地理志九江在尋陽縣南皆束合為大江史記正義曰九江郡即夀州楚自陳徙夀春號曰郢秦滅楚于此置九江郡番君吴芮率百越佐諸侯又従入關故立芮為衡山王都邾班志邾縣屬江夏郡括地志曰邾故城在黄州黄岡縣東南二十里番音婆義帝柱國共敖將兵擊南郡功多因立敖為臨江王都江陵共音龔人姓也姓譜共商諸侯之國晉有左行共華又云鄭共叔叚後臨江孟康曰本南郡漢改為臨江國江陵縣屬焉徙燕王韓廣為遼東王都無終故無終子之國班志無終縣屬北平郡非遼東郡界盖羽令韓廣都于無終而令併王遼東之地故也燕將臧荼従楚救趙姓譜臧姓魯孝公子臧僖伯之後因従入關故立荼為燕王都薊班志薊縣屬廣陽國師古曰今幽州縣水經注薊城西北隅有薊丘故名薊音計徙齊王田市為膠東王都即墨齊將田都従楚救趙因従入關故立都為齊王都臨菑項羽方渡河救趙田安下濟北數城引其兵降項羽故立安為濟北王都博陽史記正義曰博陽在濟北班志太山郡盧縣濟北王都豈博陽即此地邪余據濟北有博關博陽葢在博關之南也濟子禮翻田榮數負項梁數所角翻又不肯將兵従楚擊秦以故不封成安君陳餘棄將印去不従入關亦不封客多說項羽曰張耳陳餘一體有功於趙今耳為王餘不可以不封羽不得已聞其在南皮班志南皮縣屬勃海郡闞駰曰章武有北皮亭故此云南括地志南皮故城在滄州南皮縣北四里因環封之三縣環音宦番君將梅鋗功多封十萬户侯漢王怒欲攻項羽周勃灌嬰樊噲皆勸之灌風俗通曰斟灌氏之後蕭何諫曰雖王漢中之惡不猶愈於死乎漢王曰何為乃死也何曰今衆弗如百戰百敗不死何為夫能詘於一人之下而信於萬乗之上者湯武是也詘與屈同信與伸同臣願大王王漢中養其民以致賢人收用巴蜀還定三秦雍翟塞為三秦天下可圖也漢王曰善乃遂就國以何為丞相漢王賜張良金百鎰珠二斗良具以獻項伯漢王亦因令良厚遺項伯遺于季翻使盡請漢中地項王許之夏四月諸侯罷戯下兵師古曰戯謂軍之旌麾也先是諸侯従項羽入闗者各帥其兵聴命於羽今既受封爵各使就國故總言罷戯下也一說云時従羽在戯水之上故言罷戯下此說非也羽見髙祖於鴻門此時已過戲矣又入燒宮室不復在戯也漢書通以戯為麾許宜翻各就國項王使卒三萬人従漢王之國楚與諸侯之慕従者數萬人従杜南入蝕中漢京兆杜縣之南也如淳曰蝕入漢中道川谷名近世有程大昌者著雍錄曰以地望求之闗中南面背礙南山其冇微徑可逹漢中者唯子午谷在長安正南其次向西則駱谷此蝕中若非駱谷即是子午谷李竒蝕音力張良送至褒中地理志褒中縣屬漢中郡師古曰褒中言居褒谷之中括地志褒谷在梁州褒城縣北五十里南中山李文子曰褒谷在褒城北南谷曰褒北谷曰斜同為一谷自褒谷至鳳州界一百三十里始通斜谷斜谷在鳳翔府郿縣谷中褒水所流穴山架木而行漢王遣良歸韓良因說漢王燒絶所過棧道以備諸侯盗兵師古曰棧即閣也今謂之閣道葢架木為之棧士限翻公休士諌翻且示項羽無東意田榮聞項羽徙齊王市於膠東而以田都為齊王大怒五月榮發兵距擊田都都亡走楚走音奏榮留齊王市不令之膠東市畏項羽竊亡之國榮怒六月追擊殺市於即墨自立為齊王是時彭越在鉅野有衆萬餘人無所屬榮與越將軍印使擊濟北秋七月越擊殺濟北王安榮遂并王三齊之地三齊謂齊及濟北膠東也王于况翻又使越擊楚項王命蕭公角將兵擊越越大破楚軍張耳之國陳餘益怒曰張耳與餘功等也今張耳王餘獨侯此項羽不平乃隂使張同夏説說齊王榮曰夏說讀曰恱項羽為天下宰不平盡王諸將善地徙故王於醜地今趙王乃北居代餘以為不可聞大王起兵不聽不義願大王資餘兵擊常山復趙王請以趙為扞蔽師古曰扞蔽猶言藩屛也齊王許之遣兵従陳餘項王以張良従漢王韓王成又無功故不遣之國與俱至彭城廢以為穰侯班志穰縣屬南陽郡已又殺之初淮隂人韓信家貧無行班志武帝元狩六年置臨淮郡淮隂縣屬焉史記正義曰今楚州縣無行言無善行可推擇也行下孟翻不得推擇為吏又不能治生商賈行賣曰商坐販曰賈治直之翻常従人寄食飲人多厭之信釣於城下有漂母見信飢飯信漂匹妙翻以水擊絮曰漂飯扶晚翻信喜謂漂母曰吾必有以重報母母怒曰大丈夫不能自食吾哀王孫而進食豈望報乎淮隂屠中少年有侮信者曰若雖長大好帶刀劒中情怯耳因衆辱之曰信能死刺我刺七亦翻不能死出我袴下徐廣曰袴一作胯胯股也漢書作跨同耳師古曰跨兩股之間索隠曰胯枯化翻然尋此文作袴欲依字讀何為不通袴下乃胯下也何必須要作胯下于是信孰視之俛出袴下蒲伏俛音免俯首也伏蒲北翻一市人皆笑信以為怯及項梁渡淮信杖劒従之居麾下無所知名項梁敗又屬項羽羽以為郎中數以䇿干羽羽不用數所角翻漢王之入蜀信亡楚歸漢未知名為連敖坐當斬據史記表信為連敖典客班表作栗客索隠以為誤徐廣於周竈表以連敖為典客葢以信表為據李竒曰楚官名如淳曰連敖楚官左傳楚有連尹莫敖其後合為一官號其輩十三人皆已斬次至信信乃仰視適見滕公曰滕公即夏侯嬰初従髙祖為滕令故號滕公上不欲就天下乎何為斬壯士滕公竒其言壯其貌釋而不斬與語大説之説讀曰恱言於王王拜以為治粟都尉班表治粟内史秦官掌穀貨都尉盖其屬也至漢改内史為大司農亦未之竒也信數與蕭何語何竒之漢王至南鄭諸將及士卒皆歌謳思東歸多道亡者信度何等已數言王王不我用即亡去數所角翻何聞信亡不及以聞自追之人有言王曰丞相何亡王大怒如失左右手居一二日何來謁王王且怒且喜罵何曰若亡何也何曰臣不敢亡也臣追亡者耳王曰若所追者誰何曰韓信也王復罵曰諸將亡者以十數公無所追追信詐也何曰諸將易得耳至如信者國士無雙師古曰為國家之竒士予謂何言漢國之士僅有信一人它無與比也王必欲長王漢中無所事信長王于况翻必欲争天下非信無可與計事者顧王䇿安所决耳王曰吾亦欲東耳安能欝欝久居此乎何曰計必欲東能用信信即留不能用信終亡耳王曰吾為公以為將吾為于偽翻何曰雖為將信不留王曰以為大將何曰幸甚於是王欲召信拜之何曰王素慢無禮今拜大將如呼小兒此乃信所以去也王必欲拜之擇良日齋戒設壇場具禮乃可耳王許之諸將皆喜人人各自以為得大將至拜大將乃韓信也一軍皆驚信拜禮畢上坐上時掌翻坐徂卧翻王曰丞相數言將軍將軍何以教寡人計䇿信辭謝因問王曰今東鄉争權天下豈非項王邪鄉讀曰嚮漢王曰然曰大王自料勇悍仁彊孰與項王漢王黙然良久曰不如也信再拜賀曰惟信亦以為大王不如也惟史記作惟漢書作唯師古曰唯弋癸翻應辭仲馮曰惟字當屬下句讀如本字予謂如漢書本文則當如師古如史記本文則當如仲馮賀曰句斷然臣嘗事之請言項王之為人也項王喑噁叱咤喑於鴆翻噁烏路翻懐怒氣也叱昌栗翻咤卓嫁翻發怒聲也千人皆廢晉灼曰廢不收也然不能任屬賢將屬之欲翻此特匹夫之勇耳項王見人恭敬慈愛言語嘔嘔索隠曰嘔嘔猶姁姁同音吁鄧展曰和好貌人有疾病涕泣分食飲至使人有功當封爵者印刓敝忍不能予蘇林曰手㺯角訛不忍授也予謂角訛者刓之義敝舊敝也師古曰刓五丸翻蘇林大官翻又音専此所謂婦人之仁也項王雖覇天下而臣諸侯不居關中而都彭城背義帝之約而以親愛王諸侯不平背蒲妹翻王于况翻下而王威王王王當王同逐其故主而王其將相又遷逐義帝置江南所過無不殘滅百姓不親附特刼於威彊耳名雖為覇實失天下心故其彊易弱今大王誠能反其道任天下武勇何所不誅以天下城邑封功臣何所不服以義兵従思東歸之士何所不散散謂四散而立功劉氏曰用東歸之兵擊東方之敵此敵無不敗散也貢父曰何不散者言義兵無敵諸侯之兵無不離散以敗也且三秦王為秦將謂章邯司馬欣董翳三人將秦子弟數嵗矣所殺亡不可勝計勝音升又欺其衆降諸侯至新安項王詐坑秦降卒二十餘萬唯獨邯欣翳得脫秦父兄怨此三人痛入骨髓今楚强以威王此三人秦民莫愛也大王之入武闗秋毫無所害除秦苛法與秦民約法三章秦民無不欲得大王王秦者於諸侯之約大王當王關中關中民咸知之大王失職入漢中秦民無不恨者今大王舉而東三秦可𫝊檄而定也于是漢王大喜自以為得信晩遂聴信計部署諸將所擊師古曰部分而署置之留蕭何收巴蜀租給軍糧食八月漢王引兵従故道出襲雍春秋釋例掩其不備曰襲班志故道縣屬武都郡括地志故道今鳳州兩當縣杜佑通典曰故道鳳州梁泉兩當縣地雍王章邯迎擊漢陳倉雍兵敗還走止戰好畤又敗班志陳倉縣屬扶風唐之岐州寳鷄縣是也杜佑曰故城在縣東二十里班志好畤縣屬扶風孟康曰畤音止神靈之所止也師古曰即今雍州好畤縣宋白曰漢好畤故縣在今縣東南四十三里奉天縣界好畤故城是也李文子曰在今鳳翔天興縣界走廢丘漢王遂定雍地東至咸陽引兵圍雍王於廢丘而遣諸將略地塞王欣翟王翳皆降以其地為渭南河上上郡渭南後曰京兆河上後曰馮翊令將軍薛歐王吸出武關歐惡后翻吸音翕因王陵兵以迎太公吕后項王聞之發兵距之陽夏不得前夏音賈王陵者沛人也先聚黨數千人居南陽至是始以兵屬漢項王取陵母置軍中陵使至則東鄉坐陵母欲以招陵古以東鄉之位為尊沛公見羽於鴻門羽東鄉坐韓信東鄉坐李左車而師事之是也鄉讀曰嚮陵母私送使者泣曰願為老妾語陵善事漢王漢王長者終得天下毋以老妾故持二心妾以死送使者遂伏劒而死項王怒亨陵母為于偽翻語牛倨翻亨讀曰烹項王以故吴令鄭昌為韓王以距漢班志吴縣屬㑹稽郡張良遺項王書曰漢王失職欲得關中如約即止不敢東又以齊梁反書遺項王曰遺于季翻齊欲與趙并滅楚項王以此故無西意而北擊齊燕王廣不肯之遼東臧荼擊殺之并其地是嵗以内史沛周苛為御史大夫班表御史大夫秦官位上卿掌副宰相應劭曰侍御史之率故稱大夫項王使趣義帝行其羣臣左右稍稍叛之趣讀曰促二年冬十月項王宻使九江衡山臨江王擊義帝殺之江中九江王黥布衡山王吴芮臨江王共敖陳餘悉三縣兵與齊兵共襲常山常山王張耳敗走漢謁漢王於廢丘漢王厚遇之陳餘迎趙王於代復為趙王趙王徳陳餘立以為代王陳餘為趙王弱國初定不之國為于偽翻留傅趙王而使夏說以相國守代張良自韓間行歸漢間古莧翻漢王以為成信侯良多病未嘗特將特將未嘗獨將兵也將即亮翻常為畫䇿臣時時従漢王漢王如陜陜失冉翻鎮撫關外父老河南王申陽降置河南郡漢王以韓襄王孫信為韓太尉將兵略韓地信急擊韓王昌於陽城昌降十一月立信為韓王常將韓兵従漢王漢王還都櫟陽諸將㧞隴西春正月項王北至城陽齊王榮將兵㑹戰敗走平原平原民殺之項王復立田假為齊王遂北至北海燒夷城郭室屋坑田榮降卒係虜其老弱婦女所過多所殘滅齊民相聚叛之漢將㧞北地虜雍王弟平章平也雍於用翻三月漢王自臨晉渡河臨晉注見三卷赧王五年師古曰其地在河之西濵東臨晉境即今之同州朝邑界也史記正義曰臨晉即蒲津闗魏王豹降將兵従下河内虜殷王卬置河内郡初陽武人陳平家貧好讀書里中社孔𨽻達曰按祭法曰大夫以下成羣立社曰置社注云大夫不得特立社與民族居百家以上則共立一社今時里社是也如鄭此言則周之政法百家以上得立社其秦漢以來雖非大夫民二十五家以上則得立社故云今之里社又鄭志云月令命民社謂秦社也自秦以下民始得立社平為宰師古曰宰主切割肉也分肉甚均父老曰善陳孺子之為宰平曰嗟乎使平得宰天下亦如是肉矣及諸侯叛秦平事魏王咎於臨濟為太僕班表大僕秦官掌輿馬應劭曰周穆王所置盖太御衆僕之長也濟子禮翻說魏王不聽人或讒之平亡去後事項羽賜爵為卿張晏曰禮秩如卿不治事殷王反項羽使平擊降之還拜為都尉賜金二十鎰居無何師古曰言無㡬時漢王攻下殷項王怒將誅定殷將吏平懼乃封其金與印使使歸項王而挺身間行挺待鼎翻㧞也言平㧞身間出而行也杖劒亡渡河歸漢王於修武因魏無知求見漢王漢王召入賜食遣罷就舍平曰臣為事來為于偽翻所言不可以過今日于是漢王與語而說之説讀曰恱問曰子之居楚何官曰為都尉是日即拜平為都尉使為參乗典䕶軍使平典䕶軍而監䕶諸將也諸將盡讙曰讙音喧譁然不服之聲大王一日得楚之亡卒未知其髙下而即與同載反使監護長者監古銜翻漢王聞之愈益幸平漢王南渡平隂津至洛陽新城班志平隂縣屬河南郡水經河水逕平隂縣北魏文帝改平隂曰河隂洛陽縣屬河南郡新城時屬縣界恵帝四年始置新城縣括地志洛州伊闕縣在州南七十里本漢新城也隋文帝改新城為伊闕取伊闕山為名三老董公遮說王曰班表十里一亭亭有長十亭一鄉鄉有三老掌教化秦制横道自言曰遮說式芮翻臣聞順徳者昌逆徳者亡兵出無名伐有罪則兵出有名事故不成故曰明其為賊敵乃可服項羽為無道放殺其主放謂遷義帝于郴殺謂殺之江中殺讀曰弑天下之賊也夫仁不以勇義不以力文頴曰以用也已有仁天下歸之可不用勇而天下自服已有義天下奉之可不用力而天下自定大王宜率三軍之衆為之素服以告諸侯而伐之則四海之内莫不仰徳此三王之舉也于是漢王為義帝發䘮袒而大哭哀臨三日如淳曰袒亦如禮袒踊也師古曰袒謂脱衣之袖也袒徒旱翻衆哭曰臨力禁翻發使告諸侯曰天下共立義帝北面事之今項羽放殺義帝江南大逆無道寡人悉發關中兵收三河士韋昭曰河南河東河内也南浮江漢以下願従諸侯王擊楚之殺義帝者史記正義曰南收三河士發關内兵従雍州入子午道至漢中厯漢水而下東行至徐州擊楚予謂正義之說迂矣三河在彭城之北已不可謂南收三河士若發闗内兵南浮江漢獨不能出武關而浮江漢而必入子午谷至漢中而下漢水邪况子午道此時亦未通鑿其可引之而為説乎此特言發三河士以攻其北又南浮江漢下兵以夾攻之也服䖍曰漢名王為諸侯師古曰非也當時漢未有此稱號直言諸侯及王耳使者至趙陳餘曰漢殺張耳乃従於是漢王求人類張耳者斬之持其頭遺陳餘遺于季翻餘乃遣兵助漢田榮弟横收敗卒得數萬人起城陽史記正義曰城陽濮州雷澤是子考正義所謂城陽乃班志濟隂郡之城陽縣田榮初與項羽㑹戰之地榮既敗而北走死於平原羽遂至北海燒夷城郭室屋則濟隂之城陽已隔在羽軍之後田横所起葢班志城陽國之地春秋莒之故墟也羽既連戰未能克横而漢入彭城遂南従魯出胡陵至蕭以擊漢莒魯舊為鄰國則此城陽為莒之故墟明矣夏四月立榮子廣為齊王以拒楚項王因留連戰未能下雖聞漢東既擊齊欲遂破之而後擊漢漢王以故得率諸侯兵凡五十六萬人伐楚到外黄彭越將其兵三萬餘人歸漢漢王曰彭將軍收魏地得十餘城項羽併王梁楚徙魏王豹於河東號西魏王今越所下外黄十餘城皆梁地也欲急立魏後今西魏王豹真魏後乃拜彭越為魏相國擅將其兵略定梁地漢王遂入彭城收其貨寳美人日置酒髙㑹項王聞之令諸將擊齊而自以精兵三萬人南従魯出胡陵至蕭魯即伯禽所都秦置魯縣屬薛郡漢後以薛郡為魯國史記正義曰魯今兖州曲阜縣蕭縣秦屬泗水郡唐徐州蕭縣是也晨擊漢軍而東至彭城日中大破漢軍漢軍皆走相隨入榖泗水死者十餘萬人漢卒皆南走山楚又追擊至靈壁東睢水上臣瓉曰榖泗二水皆在沛郡彭城水經注睢水出陳留縣西蒗蕩渠東過沛郡相縣又逕彭城郡之靈壁東而東南流項羽敗漢王處也漢書又云東逼榖泗服䖍曰水名也在沛國相縣界又詳睢水逕穀熟而兩分而睢水為蘄水故二水所在枝分通為兼稱榖水之名葢因地變然則榖水即睢水也睢水又東南至下相而入于泗謂之睢口泗水又東南過彭城縣東北南至下邳入淮孟康曰靈壁故小縣在彭城南史記正義曰靈壁在徐州符離縣西北九十里漢軍却為楚所擠擠子詣翻排也又子奚翻卒十餘萬人皆入睢水水為之不流圍漢王三匝㑹大風従西北起折木發屋揚沙石窈㝠晝晦逢迎楚軍大亂壊散而漢王乃得與數十騎遁去欲過沛收家室而楚亦使人之沛取漢王家家皆亡不與漢王相見漢王道逢孝恵魯元公主魯元公主帝女也服䖍曰元長也食邑于魯韋昭曰元謚也師古曰公主恵帝姊也以其最長故號曰元不得為謚貢父曰韋昭是也載以行楚騎追之漢王急推墮二子車下推吐雷翻滕公為太僕滕公夏侯嬰也史記曰嬰従擊秦軍洛陽東賜爵封轉為滕公漢書曰嬰為滕令奉車故號滕公班表太僕秦官掌輿馬應劭曰周穆王所置葢大御衆僕之長中大夫也常下收載之如是者三日今雖急不可以驅奈何棄之故徐行漢王怒欲斬之者十餘滕公卒保䕶脫二子卒子恤翻審食其従太公吕后間行求漢王不相遇反遇楚軍審姓食其名食其音異基將間行以避楚軍乃反與楚軍相遇也間古莧翻下同楚軍與歸項王常置軍中為質質音致是時吕后兄周吕侯為漢將兵居下邑班志下邑縣屬梁國梁國秦碭郡漢改焉宋白曰今宋州碭山縣即古下邑城漢王間往従之稍稍收其士卒諸侯皆背漢復與楚背蒲妺翻塞王欣翟王翳亡降楚田横進攻田假假走楚楚殺之横遂復定三齊之地漢王問羣臣曰吾欲捐關以東等弃之誰可與共功者師古曰捐闗以東謂不自有其地將以與人令其立功共破楚也予謂等弃之者言捐以與人與弃等也張良曰九江王布楚梟將師古曰梟謂最勇健也與項王有隙彭越與齊反梁地此兩人可急使而漢王之將獨韓信可屬大事當一面師古曰屬委也音之欲翻即欲捐之捐之此三人則楚可破也初項王擊齊徴兵九江九江王布稱病不往遣將將軍數千人行漢之破楚彭城布又稱病不佐楚楚王由此怨布數使使者誚讓數所角翻以辭相責曰誚譲誚才笑翻召布布愈恐不敢往項王方北憂齊趙西患漢所與者獨九江王又多布材師古曰多者猶重也欲親用之以故未之擊漢王自下邑徙軍碭遂至虞班志虞縣屬梁國師古曰今宋州虞城縣宋白曰古虞國舜禪禹封其子商均於虞少康奔虞即此謂左右曰如彼等者無足與計天下事謁者隨何進曰不審陛下所謂姓譜隨姓隨侯之後又云杜伯之𤣥孫㑹為晉大夫食采于隨曰隨武子後因以為姓漢王曰孰能為我使九江令之發兵倍楚倍蒲妹翻留項王數月我之取天下可以百全隨何曰臣請使之漢王使與二十人俱五月漢王至滎陽諸敗軍皆㑹蕭何亦發關中老弱未傅者傅讀曰附孟康曰古者二十而傅三年耕有一年儲故二十三而後役之如淳曰律言二十三傳之疇官各従其父疇學之高不滿六尺二寸以下為罷癃漢儀注云民年二十三為正一嵗為衛士一嵗為材官騎士習射御馳戰陳又曰年五十六乃得免為庶民就田里今老弱未傅者皆發之未二十為弱過五十六為老師古曰傅著也言著名籍給公家徭役也悉詣滎陽漢軍復大振楚起於彭城常乗勝逐北與漢戰滎陽南京索閒京縣秦屬三川郡漢改曰河南郡即鄭共叔所居京城也應劭曰京縣今有大索小索亭括地志京縣城在鄭州滎陽縣東南二十里滎陽縣即大索城杜預曰成臯城東有大索城又有小索故城在滎陽縣北四里宋白曰滎陽縣故城在鄭州滎澤縣南十七里平原上索水逕其東即項羽圍漢王處秦三川郡亦曽移理於此括地志所謂滎陽縣即大索城乃唐之滎陽縣晉灼曰索音冊師古音求索之索楚騎來衆漢王擇軍中可為騎將者皆推故秦騎士重泉人李必駱甲班志重泉縣屬馮翊括地志重泉故城在同州蒲城縣東南四十五里姓譜齊太公之後有公子駱子孫以為氏史記惡來革之𤣥孫曰大駱漢王欲拜之必甲曰臣故秦民恐軍不信臣願得大王左右善騎者傅之如淳曰傅音附猶言隨従者乃拜灌嬰為中大夫令李必駱甲為左右校尉將騎兵擊楚騎於滎陽東大破之楚以故不能過滎陽而西漢王軍滎陽築甬道屬之河以取敖倉粟括地志敖倉在鄭州滎陽西北十五里縣門之東北臨汴水南帶三皇山屬之欲翻周勃灌嬰等言于漢王曰陳平雖美如冠玉孟康曰飾冠以玉光好外見中無所有也其中未必有也臣聞平居家時盜其嫂事魏不客亡歸楚不中中竹仲翻又亡歸漢今日大王尊官之令䕶軍臣聞平受諸將金金多者得善處金少者得惡處平反覆亂臣也願王察之漢王疑之召讓魏無知無知曰臣所言者能也陛下所問者行也今有尾生孝已之行尾生古之信士或曰即微生髙孝已商髙宗之子以孝行著行下孟翻而無益勝負之數陛下何暇用之乎楚漢相距臣進竒謀之士顧其計誠足以利國家不耳不讀曰否盜嫂受金又何足疑乎漢王召讓平曰先生事魏不中事楚而去今又従吾游信者固多心乎平曰臣事魏王魏王不能用臣說故去事項王項王不能信人其所任愛非諸項即妻之昆弟雖有竒士不能用聞漢王能用人故歸大王臣躶身來躶郎果翻赤身也不受金無以為資誠臣計畫有可采者願大王用之使無可用者金具在請封輸官得請骸骨漢王乃謝厚賜拜為䕶軍中尉盡護諸將諸將乃不敢復言魏王豹謁歸視親疾謁歸謂謁告而歸也至則絶河津反為楚豹都平陽在河東故㫁其津濟以拒漢軍為于偽翻六月漢王還櫟陽壬午立子盈為太子赦罪人漢兵引水灌廢丘廢丘降章邯自殺盡定雍地以為中地北地隴西郡自置中地郡後至九年罷屬内史武帝建元六年分為右内史太初元年更名主爵都尉為右扶風關中大飢米斛萬錢人相食令民就食蜀漢初秦之亡也豪桀争取金玉宣曲任氏獨窖倉粟漢有長水宣曲胡騎高祖功臣有宣曲侯葢地名也張楫曰宣曲宫名在昆明池西師古曰宣曲觀名索隠曰上林賦云西馳宣曲當在京輔今闕其地窖工孝翻穿地以蔵粟也及楚漢相距滎陽民不得耕種而豪桀金玉盡歸任氏任氏以此起富者數世秋八月漢王如滎陽命蕭何守關中侍太子為法令約束立宗廟社稷宫室縣邑事有不及奏决者輙以便宜施行上來以聞計關中户口轉漕調兵以給軍未嘗乏絶調徒弔翻漢王使酈食其往說魏王豹且召之豹不聽曰漢王慢而侮人罵詈諸侯羣臣如罵奴耳吾不忍復見也復扶又翻於是漢王以韓信為左丞相與灌嬰曹參俱擊魏漢王問食其魏大將誰也對曰柏直姓譜柏柏皇氏之後顓頊師柏招帝嚳師柏景春秋柏國為楚所滅王曰是口尚乳臭言其少不經事弱不任事若未離乳保之懐者安能當韓信騎將誰也曰馮敬曰是秦將馮無擇子也雖賢不能當灌嬰步卒將誰也曰項它曰不能當曹參吾無患矣韓信亦問酈生魏得無用周叔為大將乎酈生曰柏直也信曰豎子耳遂進兵魏王盛兵蒲坂以塞臨晉塞悉則翻信乃益為疑兵陳船欲渡臨晉而伏兵従夏陽以木罌渡軍襲安邑班志夏陽縣屬馮翊秦之少梁也秦恵文王十一年更名史記正義曰夏陽在同州止韓城界木罌服䖍曰以木押縳罌缶以渡也韋昭曰以木為器如罌缶以渡軍無船且尚宻也師古曰服說是罌缶謂瓶之大腹小口者也罌一政翻康於耕翻魏王豹驚引兵迎信九月信擊虜豹傳詣滎陽傳直戀翻言以驛馬傳送詣漢王所悉定魏地置河東上黨太原郡漢之敗於彭城而西也陳餘亦覺張耳不死即背漢背蒲妺翻韓信既定魏使人請兵三萬人願以北舉燕趙東擊齊南絶楚粮道漢王許之乃遣張耳與俱引兵東北擊趙代時趙王歇王趙陳餘王代後九月信破代兵禽夏說於閼與信之下魏破代漢輙使人收其精兵詣滎陽以距楚資治通鑑卷九
