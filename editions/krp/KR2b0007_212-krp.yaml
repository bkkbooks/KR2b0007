front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷二百十二宋司馬光撰胡三省音注唐紀二十八起著雍敦牂盡㫋䝉赤奮若凡八年𤣥宗至道大聖大明孝皇帝上之下開元六年春正月辛丑突厥毗伽可汗來請和許之厥九勿翻伽求迦翻可從刋入聲汗音寒廣州吏民為宋璟立遺愛碑去年宋璟自廣州入相為于偽翻璟居永翻璟上言臣在州無它異迹今以臣光寵成彼諂䛕欲革此風望自臣始請敕下禁止上時掌翻下遐稼翻上從之於是它州皆不敢立辛酉敕禁惡錢武徳四年鑄開元通寳錢其後盗鑄漸起顯慶五年以惡錢多官為市之以一善錢售五惡錢民間藏惡錢以待禁弛乾封以後私錢犯法日蕃有以舟筏鑄于江中者詔所在納惡錢而姦亦不息武后時錢非穿宂及鐵錫銅液皆得用之熟銅排斗沙澀之錢皆售自是盗鑄蜂起吏莫能捕先天之際兩京錢益濫或鎔錫模錢須㬰百十故禁之重二銖四分以上乃得行歛人間惡錢鎔之更鑄如式錢更工衡翻於是京城紛然賣買殆絶宋璟蘇頲請出太府錢二萬緡置南北市以平價買百姓不售之物可充官用者及聽兩京百官豫假俸錢庶使良錢流布人間從之頲他鼎翻俸芳用翻二月戊子移蔚州横野軍於山北杜佑曰横野軍在蔚州東北百四十里去太原九百里此蓋指言開元所移軍之地蔚紆勿翻屯兵三萬為九姓之援以拔曵固都督頡質略同羅都督毗伽末啜霫都督比言囘紇都督夷健頡利發僕固都督曵勒歌等各出騎兵為前後左右軍討擊大使頡户結翻啜陟劣翻霫而立翻騎竒寄翻使疏吏翻下同皆受天兵軍節度天兵軍在并州城中考異曰實録壬辰制大舉擊突厥五都督及㧞悉密金山道總管處木昆執米啜堅昆都督骨篤禄毗伽契丹都督李失活奚都督李大酺及黙啜之子右賢王黙特勒逾輸等夷夏之師凡三十萬並取朔方道大總管王晙節度而於後俱不見出師勝敗按此年正月突厥請和帝有答詔而二月伐之恐無此事舊紀及王晙突厥傳皆無此月出兵事新突厥傳云黙棘連遣使請和帝以不情答而不許俄下詔伐之以王晙統之期以八年並集稽落水上行兵密不應前二年半先下詔蓋取實録附會舊傳耳有所討捕量宜追集量音良無事各歸部落營生仍常加存撫三月乙巳徴嵩山處士盧鴻入見見賢遍翻拜諫議大夫鴻固辭傳考異曰舊作盧鴻一本紀新𫝊皆作鴻按中岳真人劉君碑云盧鴻撰今從之天兵軍使張嘉貞入朝朝直遥翻有告其在軍奢僭及贓賄者按驗無狀上欲反坐吿者反坐者以誣告人所得罪坐之嘉貞奏曰今若罪之恐塞言路塞悉則翻使天下之事無由上逹願特赦之其人遂得减死上由是以嘉貞為忠有大用之意為張嘉貞入相張本有薦山人范知璿文學者并獻其所為文璿從宣翻宋璟判之曰觀其良宰論頗渉佞䛕良宰論葢稱美當時宰相山人當極言讜議讜音黨豈宜偷合茍容文章若髙自宜從選舉求試不可别奏夏四月戊子河南參軍鄭銑朱陽丞郭仙舟投匭獻詩河南參軍河南府參軍也唐制諸府州諸曹參軍之外又有參軍事掌出使賛導新志注曰武徳初改行書佐曰行參軍尋又改曰參軍事朱陽漢弘農縣南界地後魏分置朱陽郡屬析州後周廢郡為縣隋屬𢎞農郡唐龍朔初屬商州萬嵗通天二年度屬洛州匭居洧翻敕曰觀其文理乃崇道法至於時用不切事情宜各從所好好呼到翻並罷官度為道士五月辛亥以突騎施都督蘇禄為左羽林大將軍順國公充金方道經略大使騎竒寄翻契丹王李失活卒癸巳以其弟娑固代之契欺訖翻又音喫娑素何翻秋八月頒鄉飲酒禮于州縣令毎嵗十二月行之唐鄉飲酒之禮刺史為主人先召致仕鄉有徳者謀之賢者為賔其次為介其次為衆賔與之行禮縣則令為主人鄉之老人年六十以上有徳望者一人為賔次一人為介又其次為三賔又其次為衆賔年六十者三豆七十者四豆八十者五豆九十者及主人皆六豆主賔介三賔衆賔既升即席工持瑟升自階就位鼔鹿鳴卒歌笙入立於堂下北面奏南陔乃間歌歌南有嘉魚笙崇丘乃合樂周南闗睢召南鵲巢司正升自西階賛禮揚觶而戒之以忠孝之本主賔介以下皆再拜奠酬既畢乃行無筭爵無筭樂唐初州縣官俸皆令富户掌錢出息以給之息至倍稱多破産者唐初在京諸司官及天下官置公廨本錢以典史主之收贏十之七富户幸免徭役貧者破産甚衆稱音尺證翻祕書少監崔沔上言請計州縣官所得俸于百姓常賦之外㣲有所加以給之時沔請計户均出每丁加升尺以給之從之冬十一月辛卯車駕至西京戊辰吐蕃奉表請和乞舅甥親署誓文吐蕃以尚文成公主與唐為舅甥之國吐從暾入聲又令彼此宰相皆著名于其上宋璟奏括州員外司馬李邕儀州司馬鄭勉並有才略文詞先天元年避帝名改箕州為儀州但性多異端好是非改變若全引進則咎悔必至若長棄捐則才用可惜請除渝硤二州刺史又奏大理卿元行冲素稱才行初用之時實允僉議當事之後頗非稱職請復以為左散騎常侍以李朝隱代之好呼到翻行下孟翻稱尺證翻復扶又翻散悉亶翻騎竒寄翻朝直遥翻陸象先閑於政體寛不容非請以為河南尹從之七年春二月俱密王那羅延俱密國治山中在吐火羅東北南臨黒河其王突厥延陁種康王烏勒伽安王篤薩波提杜佑曰康國在米國西南三百餘里漢康居國皆上表言為大食所侵掠乞兵救援敕太府及府縣出粟十萬石糶之府謂京兆府縣謂京縣及畿縣也糶他弔翻以歛人間惡錢送少府銷毁三月乙卯以左武衛大將軍檢校内外閑廏使苑内營田使王毛仲行太僕卿初唐以尚乘局掌内外閑廐之馬十二閑既置内外閑廄使専掌御馬因以尚乘局𨽻閑廐使苑内諸監本𨽻司農寺今亦𨽻苑内營田使毛仲嚴察有幹力萬騎功臣閑廏官吏皆憚之騎竒寄翻苑内所收常豐溢上以為能故有寵雖有外第常居閑廏側内宅上或時不見則悄然若有所失宦官楊思勗髙力士皆畏避之渤海王大祚榮卒録考異曰實六月丁夘祚榮卒遣左監門率呉思謙攝鴻盧卿充使弔祭按此月丙辰已云祚榮卒盖六月方遣思謙弔祭耳丙辰命其子武藝襲位夏四月壬午開府儀同三司祁公王仁皎薨其子駙馬都尉守一請用竇孝諶例築墳髙五丈二尺竇孝諶上外祖也諶氏壬翻上許之宋璟蘇頲固爭以為凖令一品墳髙一丈九尺髙居號翻其陪陵者髙出三丈而已竇太尉墳議者頗譏其髙大當時無人極言其失豈可今日復踵而為之復扶又翻下蕃復同昔太宗嫁女資送過于長公主魏徴進諫太宗既用其言文徳皇后亦賞之事見一百九十四卷太宗貞觀六年長知兩翻豈若韋庶人崇其父墳號曰酆陵事見二百八卷中宗景龍元年以自速其禍乎夫以后父之尊欲髙大其墳何足為難而臣等再三進言者葢欲成中宫之美耳况今日所為當𫝊無窮永以為法可不慎乎上悦曰朕每欲正身率下况于妻子何敢私之然此乃人所難言卿能固守典禮以成朕美埀法將來誠所望也賜璟頲帛四百匹五月己丑朔日有食之上素服以俟變徹樂减膳命中書門下察繫囚賑饑乏勸農功賑津忍翻辛夘宋璟等奏曰陛下勤恤人隱此誠蒼生之福然臣聞日食修徳月食修刑親君子逺小人絶女謁除讒慝所謂修徳也君子耻言浮于行論語孔子曰君子恥其言而過其行逺于願翻慝吐得翻行下孟翻茍推至誠而行之不必數下制書也數所角翻下遐稼翻六月戊辰吐蕃復遣使請上親署誓文上不許曰昔嵗誓約已定茍信不由𠂻亟誓何益用左傳語意吐從暾入聲復扶又翻亟去吏翻秋閏七月右補闕盧履氷上言禮父在為母服周年則天皇后改服齊衰三年事見二百二卷髙宗上元元年為于偽翻齊音咨衰倉囘翻上時掌翻請復其舊上下其議下遐稼翻左散騎常侍禇無量以履氷議為是諸人爭論連年不决八月辛夘敕自今五服並依䘮服𫝊文散悉亶翻騎竒寄翻傳直戀翻然士大夫議論猶不息行之各從其意無量歎曰聖人豈不知母恩之厚乎厭降之禮厭於叶翻所以明尊卑異戎狄也俗情膚淺不知聖人之心一紊其制誰能正之紊音問九月甲寅徙宋王憲為寧王四年成器更名憲上嘗從複道中見衛士食畢弃餘食于竇中怒欲杖殺之左右莫敢言憲從容諫曰陛下從複道中窺人過失而殺之臣恐人人不自安且陛下惡弃食於地者為食可以養人也憲從千容翻惡烏路翻為于偽翻今以餘食殺人無乃失其本乎上大悟蹶然起曰㣲兄幾至濫刑㡬居希翻遽釋衛士是日上宴飲極歡自解紅玉帶并所乘馬以賜憲冬十月辛夘上幸驪山温湯癸夘還宫驪力知翻還從宣翻又音如字壬子冊拜突騎施蘇禄為忠順可汗可從刊入聲汗音寒十一月壬申上以岐山令王仁琛岐山縣隋置屬岐州琛丑林翻藩邸故吏墨敕令與五品官宋璟奏故舊恩私則有大例除官資厯非無公道仁琛曏緣舊恩已獲優改今若再䝉超奬遂于諸人不類又是后族王仁琛蓋仁皎羣從須杜輿言輿衆也乞下吏部檢勘茍無負犯於格應留請依資稍優注擬從之選人宋元超于吏部自言侍中璟之叔父冀得優假璟聞之牒吏部云元超璟之三從叔三從同髙祖下遐嫁翻選須絹翻從才用翻常在洛城不多參見見賢遍翻既不敢緣尊輒隱又不願以私害公向者無言自依大例既有聲聽事須矯枉請放元超兾得饒假今乃不得留注所謂矯枉過正也寧王憲奏選人薛嗣先請授㣲官事下中書門下選須絹翻事下遐嫁翻璟奏嗣先兩選齋郎雖非灼然應留以懿親之故固應㣲假官資在景龍中常有墨敕處分謂之斜封處昌吕翻分扶問翻自大明臨御兹事杜絶行一賞命一官必是緣功與才皆厯中書門下至公之道唯聖能行嗣先幸預姻戚不為屈法許臣等商量望付吏部知不出正敕從之量音良先是朝集使往往齎貨入京師先悉薦翻及春將還多遷官宋璟奏一切勒還以革其弊是嵗置劒南節度使領益彭等二十五州八年春正月丙辰左散騎常侍禇無量卒按通鑑例惟公輔書薨偏王者公輔書卒今書禇無量卒以整比羣書未竟改命元行冲故書以始事考異曰舊本紀正月甲子朔皇太子加元服壬申右散騎常侍禇無量卒按長厯正月甲寅朔甲子十一日也唐厯亦云壬申無量卒今從實録辛酉命右散騎常侍元行冲整比羣書比毗至翻侍中宋璟疾負罪而妄訴不已者悉付御史臺治之治直之翻謂中丞李謹度曰服不更訴者出之尚訴未已者且繫由是人多怨者㑹天旱有魃魃蒲撥翻旱神也神異經曰南方有人長二三尺袒身目在項上走行如風其名曰魃所見之國大旱赤地千里一名旱母遇者得之投溷中即死優人作魃狀戲於上前問魃何為出對曰奉相公處分相息亮翻處昌吕翻分扶問翻又問何故魃曰負寃者三百餘人相公悉以繫獄抑之故魃不得不出上心以為然時璟與中書侍郎同平章事蘇頲建議嚴禁惡錢江淮間惡錢尤甚璟以監察御史蕭隱之充使括惡錢監工衘翻使疏吏翻隱之嚴急煩擾怨嗟盈路上于是貶隱之官辛巳罷璟為開府儀同三司頲為禮部尚書紀考異曰唐厯云二十八日辛夘舊云己夘按是月無辛夘今從實録以京兆尹源乾曜為黄門侍郎并州長史張嘉貞為中書侍郎並同平章事於是弛錢禁惡錢復行矣復扶又翻二月戊戍皇子敏卒追立為懷王此懷王以州為國號諡曰哀壬子敕以役莫重於軍府一為衛士六十乃免宜促其嵗限使百姓更迭為之更工衡翻夏四月丙午遣使賜烏長王骨咄王俱位王冊命三國皆在大食之西烏長即烏萇又曰烏荼骨咄在鑊沙之東或曰阿咄羅治思助建城俱位或曰商瀰治阿賖䫻師多城在大雪山勃律河北地寒冬窟室咄當沒翻大食欲誘之叛唐誘音酉三國不從故褒之五月辛酉復置十道按察使罷按察見上卷五年丁夘以源乾曜為侍中張嘉貞為中書令乾曜上言形要之家多任京官使俊乂之士沈廢于外沈持林翻臣三子皆在京請出其二人上從之因下制稱乾曜之公命文武官効之於是出者百餘人張嘉貞吏事彊敏而剛躁自用躁則到翻中書舍人苗延嗣吕太一考功員外郎貟嘉靜殿中侍御史崔訓皆嘉貞所引進常與之議政事四人頗招權時人語曰令公四俊苗吕崔員貟音運六月瀍榖漲溢漂溺幾二千人溺奴狄翻㡬居希翻云考異曰實録云漂居人四百餘家舊紀漂没九百餘户溺死八百餘人掌閑溺死者千一百餘人今從舊紀人數按舊紀掌閑之下有畨兵二字突厥降户僕固都督勺磨及􅎤跌部落散居受降城側降户江翻勺職略翻􅎤奚結翻跌徒結翻朔方大使王晙言其隂引突厥謀陷軍城密奏請誅之誘勺磨等宴於受降城伏兵悉殺之河曲降户殆盡㧞曵固同羅諸部在大同横野軍之側者聞之皆忷懼大同軍即大武軍武后大足元年更名杜佑曰在代州北三百里去并州八百餘里晙子峻翻誘音酉忷許拱翻秋并州長史天兵節度大使張說引二十騎持節即其部落慰撫之説讀曰悦騎竒寄翻因宿其帳下副使李憲以虜情難信馳書止之説復書曰吾肉非黄羊必不畏食北人謂麞為黄羊血非野馬必不畏刺非人家及廐牧所畜而自孳生於野者謂之野馬士見危致命論語載子張之言此吾效死之秋也拔曵固同羅由是遂安冬十月辛巳上行幸長春宫壬午畋于下邽上禁約諸王不使與羣臣交結光禄少卿駙馬都尉裴虛已與岐王範遊宴仍私挾讖緯讖楚譛翻緯于貴翻戊子流虛已於新州離其公主睿宗女霍國公主下嫁虚已舊志新州至京師五千五十二里萬年尉劉庭琦太祝張諤唐太常寺有太祝六人正九品上數與範飲酒賦詩貶庭琦雅州司户諤山茌丞山茌縣漢晉屬泰山郡宋屬東太原郡隋廢入濟州長清縣武徳元年分置山茌縣屬齊州數所角翻然待範如故謂左右曰吾兄弟自無間但趨競之徒彊相託附耳間古莧翻彊其兩翻吾終不以此責兄弟也上嘗不豫薛王業妃弟内直郎韋賔唐六典東宫有内直局内直郎二人掌符璽繖扇几案衣服之事職擬尚輦奉御與殿中監皇甫恂私議休咎事覺賔杖死恂貶錦州刺史武后垂拱二年以辰州麻陽縣地及開山洞置錦州業與妃惶懼待罪上降階執業手曰吾若有心猜兄弟者天地實殛之即與之宴飲仍慰諭妃令復位十一月乙夘上還京師辛未突厥冦甘凉等州凉州西至甘州五百里在考異曰唐厯突厥冦凉州九月舊突厥傳云八年冬御史大夫王晙為朔方大總管奏請西征抜悉密東發奚契丹兩蕃期以明年秋初引朔方兵數道俱入掩突厥牙帳于稽落河上按王晙此月為幽州都督今從實録舊紀敗河西節度使楊敬述敗補邁翻掠契苾部落而去貞觀中契苾來降處其部落于凉州契欺訖翻苾毗必翻先是朔方大總管王晙奏請西發㧞悉密㧞悉密酋長姓阿史那氏盖亦突厥之種也居北庭先悉薦翻東發奚契丹期以今秋掩毗伽牙帳于稽落水上稽落水盖導源稽落山毗伽聞之大懼暾欲谷曰不足畏也㧞悉密在北庭與奚契丹相去絶逺勢不相及朔方兵計亦不能來此若必能來俟其垂至徙牙帳北行三日唐兵食盡自去矣且㧞悉密輕而好利輕牽正翻好呼到翻得王晙之約必喜而先至晙與張嘉貞不相悦奏請多不相應必不敢出兵史言在廷在邊之謀不叶為夷狄所窺晙兵不出㧞悉密獨至擊而取之勢甚易耳易以䜴翻既而拔悉密果發兵逼突厥牙帳而朔方及奚契丹兵不至拔悉密懼引退毗伽欲擊之暾欲谷曰此屬去家千里將死戰未可擊也不如以兵躡之去北庭二百里暾欲谷分兵間道先圍北庭間古莧翻因縱兵擊拔悉密大破之拔悉密衆潰走趨北庭不得入趨逡喻翻盡為突厥所虜暾欲谷引兵還出赤亭掠凉州羊馬楊敬述遣禆將盧公利判官元澄將兵邀擊之將即亮翻暾欲谷謂其衆曰吾乘勝而來敬述出兵破之必矣公利等至刪丹刪丹縣漢屬張掖郡後漢晉屬西郡後魏曰山丹隋復曰刪丹屬甘州與暾欲谷遇唐兵大敗公利澄脱身走毗伽由是大振盡有黙啜之衆契丹牙官可突干驍勇得衆心李娑固猜畏欲去之驍堅堯翻娑素何翻去羌吕翻是嵗可突干舉兵擊娑固娑固敗奔營州營州都督許欽澹遣安東都䕶薛泰帥驍勇五百與奚王李大酺奉娑固以討之戰敗娑固李大酺皆為可突干所殺帥讀曰率酺音蒲生擒薛泰營州震恐許欽澹移軍入渝闗可突干立娑固從父弟鬱干為主遣使請罪上赦可突干之罪以鬱干為松漠都督以李大酺之弟魯蘇為饒樂都督使疏吏翻下同樂音洛九年春正月制削楊敬述官爵以刪丹之敗也以白衣檢校凉州都督仍充諸使諸使謂節度支度營田等使也丙辰改蒲州為河中府置中都官僚一凖京兆河南丙寅上幸驪山温湯乙亥還宫監察御史宇文融上言天下户口逃移巧偽甚衆請加檢括融㢸之𤣥孫也宇文㢸見一百七十二卷陳宣帝太建七年監古銜翻上時掌翻㢸古弼字源乾曜素愛其才賛成之二月乙酉敕有司議招集流移按詰巧偽之法以聞詰去吉翻丙戌突厥毗伽復使來求和上賜書諭以曩昔國家與突厥和親華夷安逸甲兵休息國家買突厥羊馬突厥受國家繒帛彼此豐給自數十年來不復如舊正由黙啜無信口和心叛數出盗兵冦抄邊鄙人怨神怒隕身䘮元復扶又翻下今復同數所角翻䘮息浪翻元首也斬黙啜事見上卷四年吉凶之驗皆可汗所見今復蹈前迹掩襲甘凉隨遣使人更來求好國家如天之覆如海之容好呼到翻覆敷又翻但取來情不追往咎可汗果有誠心則共保遐福不然無煩使者徒爾往來若其侵邉亦有以待可汗其審圖之丁亥制州縣逃亡户口聽百日自首或于所在附籍或牒歸故鄉各從所欲過期不首首式又翻即加檢括謫徙邉州公私敢容庇者抵罪以宇文融充使括逃移户口及籍外田所獲巧偽甚衆使疏吏翻遷兵部員外郎兼侍御史融奏置勸農判官十人通典及新書並云二十九人通典且列其姓名並攝御史分行天下其新附客户免六年賦調調徒弔翻使者競為刻急州縣承風勞擾百姓苦之陽翟尉皇甫憬上疏言其狀陽翟縣漢屬穎川郡晉屬河南郡後魏置陽翟郡隋廢郡為縣屬襄城郡唐初屬嵩州貞觀元年屬許州龍朔三年度屬洛州為畿縣憬居永翻上方任融貶憬盈川尉州縣希㫖務于獲多虚張其數或以實户為客凡得户八十餘萬田亦稱是稱尺證翻蘭池州胡康待賔誘諸降户同反夏四月攻陷六胡州誘音酉降户江翻髙宗調露元年于靈夏南境以降突厥置魯州麗州含州塞州依州契州以唐人為刺史謂之六胡州長安二年併爲匡長二州神龍三年置蘭池都督府分六州為縣宋白曰六胡州在夏州徳靜縣北于考異曰實録四月庚寅康待賔反命王晙討平之斬都市五月丁巳既誅康待賔下詔云云壬寅叛胡康待賔偽稱葉䕶安慕容以叛七月癸酉王晙擒康待賔至京師腰斬之前後重複交錯相違今從舊紀有衆七萬進逼夏州夏户雅翻命朔方大總管王晙隴右節度使郭知運共討之戊戌敕京官五品以上外官刺史四府上佐四府謂京兆府河南府河中府太原府各舉縣令一人視其政善惡為舉者賞罰以太僕卿王毛仲為朔方道防禦討擊大使與王晙及天兵軍節度大使張説相知討康待賔六月己夘罷中都復為蒲州復扶又翻蒲州刺史陸象先政尚寛簡吏民有罪多曉諭遣之州録事言于象先曰明公不施箠撻何以示威唐上州置録事三人正九品上中下州各一人下州從九品下箠止可翻象先曰人情不逺此屬豈不解吾言邪解户買翻曉也必欲箠撻以示威當從汝始録事慙而退象先嘗謂人曰天下本無事但庸人擾之耳茍清其源何憂不治治直吏翻秋七月巳酉王晙大破康待賔生擒之殺叛胡萬五千人辛酉集四夷酋長腰斬康待賔于西市酋慈由翻長知兩翻先是叛胡濳與党項通謀攻銀城連谷據其倉庾後周置銀城縣後改曰銀城防貞觀四年以銀城屬銀州八年屬勝州又以隋連谷戍置連谷縣亦屬勝州杜佑曰銀城連谷皆漢圁隂縣地漢光禄塞在今縣北先悉薦翻党底朗翻張説將歩騎萬人出合河闗掩擊大破之嵐州合河縣北有合河闗宋白曰合河縣城下有蔚汾水西與黄河合故曰合河趙珣聚米圖經合河闗在府州南二百里將即亮翻騎竒寄翻追至駱駝堰堰於扇翻党項乃更與胡戰胡衆潰西走入鐵建山説安集党項使復其居業討擊使阿史那獻以党項翻覆請并誅之説曰王者之師當伐叛柔服豈可殺已降邪因奏置麟州以鎮撫党項餘衆分勝州銀城連谷置麟州又置新秦縣為麟州治所杜佑曰麟州漠新秦中地九月乙巳朔日有食之康待賔之反也詔郭知運與王晙相知討之晙上言朔方兵自有餘力請敕知運還本軍上時掌翻未報知運已至由是與晙不協晙所招降者知運復縱兵擊之虜以晙為賣已由是復叛降户江翻復扶又翻上以晙不能遂定羣胡丙午貶晙為梓州刺史梓州漢郪廣漢氐道之地西魏梁末置新州隋改梓州王晙貶官未必離任也如婁師徳以素羅汗山之敗貶亦此類丁未梁文獻公姚崇薨遺令佛以清淨慈悲為本而愚者冩經造像兾以求福昔周齊分據天下周則毁經像而修甲兵齊則崇塔廟而弛刑政一朝合戰齊㓕周興近者諸武諸韋造寺度人不可勝紀勝音升無救族誅汝曹勿效兒女子終身不寤追薦冥福道士見僧獲利效其所為尤不可延之於家當永為後法癸亥以張説為兵部尚書同中書門下三品考異曰朝野僉載曰説為并州刺史諂事王毛仲毛仲廵邉説於天兵軍大設酒肴恩敕忽降授兵部尚書同中書門下三品謝訖便抱毛仲起舞吮其靴鼻今不取冬十月河西隴右節度大使郭知運卒知運與同縣右衛副率王君㚟率所律翻㚟丑略翻郭知運𤓰州晉昌人王君㚟𤓰州常樂人皆以驍勇善騎射著名西陲為虜所憚驍堅堯翻騎竒寄翻時人謂之王郭㚟遂自知運麾下代為河西隴右節度使判凉州都督十一月丙辰國子祭酒元行冲上羣書四録甲部經録乙部史録丙部子録丁部集録考異曰集賢注記在九年春今從唐厯統紀舊紀凡書四萬八千一百六十九卷庚午赦天下十二月乙酉上幸驪山温湯壬辰還宫是嵗諸王為都督刺史者悉召還京師開元二年有司請依故事出諸王刺外州新作蒲津橋鎔鐵為牛以繫絙時鑄八牛牛下有山皆鐵也夾岸以維浮梁蒲津東岸即河東縣西岸即河西縣絙居登翻大索也安州别駕劉子𤣥卒子𤣥即知㡬也避上嫌名以字行劉子𤣥卒重史臣也例猶禇無量上名隆基知幾犯嫌名幾居希翻著作郎吳兢撰則天實録言宋璟激張説使證魏元忠事事今見二百七卷武后長安三年撰士免翻説修史見之知兢所為謬曰劉五殊不相借知幾第五唐人多以第行相呼兢起對曰此乃兢所為史草具在不可使明公枉怨死者同僚皆失色其後説隂祈兢改數字兢終不許曰若徇公請則此史不為直筆何以取信于後太史上言麟徳厯浸踈是厯行于髙宗麟徳二年上時掌翻日食屢不効上命僧一行更造新厯此所謂大衍厯也歐陽修曰自太初至麟徳厯有二十三家與天雖近而未宻也至一行密矣其倚數立法固無以易也後世雖有改作者皆依倣而已行下孟翻更工衡翻率府兵曹梁令瓉造黄道遊儀以測候七政唐東宫十率府各有兵曺參軍從九品上掌判句大朝㑹及皇太子出則從鹵簿而涖其儀一行更造新厯欲知黄道進退而太史無黄道儀令瓉以木為遊儀一行是之請更鑄銅鐵使黄道運行以追列舍之變因二分之中以立黄道交于奎軫之間二至升降各十四度黄道内施白道月環用究隂陽朓朒動合天運七政日月五星也置朔方節度使領單于都䕶府夏鹽等六州定逺豐安二軍三受降城單音蟬夏户雅翻降户江翻十年春正月丁巳上行幸東都以刑部尚書王志愔為西京留守愔於今翻癸亥命有司收公廨錢以稅錢充百官俸武徳元年制京司及州縣官各給公廨田課其管種以供公私之費又有公廨園公廨地皆收其税以給百官廨古隘翻俸方用翻乙丑收職田唐文武官有職分田一品十二頃二品十頃三品九頃四品七頃五品六頃六品四頃七品三頃五十畝八品二頃五十畝九品二頃皆給百里内之地諸州都督都䕶親王府官二品十二頃三品十頃四品八頃五品七頃六品五頃七品四頃八品三頃九品二頃五十畝鎮戍闗津嶽瀆官五品五頃六品三頃五十畝七品三頃八品二頃九品一頃五十畝貞觀十一年以職田侵漁百姓詔給逃還貧户視職田多少毎畝給粟二斗謂之地租尋以水旱復罷之畝率給倉粟二斗二月戊寅上至東都夏四月巳亥以張説兼知朔方軍節度使五月伊汝水溢漂溺數千家溺奴狄翻漢志伊水出𢎞農郡盧氏縣東北入洛汝水出𢎞農入淮史言伊汝溢而漂數千家既二水分流相去日益逺何至能漂流數千家此必于發源之地水溢而并流也被灾之家當在虢洛三州界閏月壬申張説如朔方廵邊巳丑以餘姚縣主女慕容氏為燕郡公主妻契丹王鬱干燕因肩翻妻七細翻六月丁巳博州河决命按察使蕭嵩等治之嵩梁明帝之孫也後梁主巋諡明帝治直之翻巳巳制増太廟為九室遷中宗主還太廟中宗遷别廟見上卷五年秋八月癸卯武彊令裴景仙武彊漢河間之武隧縣也晉更名武彊唐屬冀州坐贓五千匹事覺亡命上怒命集衆斬之大理卿李朝隱奏景仙贓皆乞取罪不至死朝直遥翻又其曽祖寂有建義大功載初中以非罪破家據裴寂𫝊寂孫承先武后時為酷吏所殺惟景仙獨存今為承嫡宜宥其死投之荒逺其辭略曰十代宥賢功實宜録左傳晉祁奚請叔向曰社稷之固也猶將十世宥之一門絶祀情或可哀制令杖殺朝隱又奏曰生殺之柄人主得專輕重有條臣下當守今若乞取得罪便處斬刑處昌吕翻後有枉法當科欲加何辟辟毗亦翻所以為國惜法期守律文為于偽翻非敢以法隨人曲矜仙命又曰若寂勲都棄仙罪特加則叔向之賢何足稱者若敖之鬼不其餒而左傳楚令尹子文之言上乃許之杖景仙一百流嶺南惡處制考異曰實録云初上令集衆殺之李朝隱執奏又下云集衆决殺朝隱又奏乃流嶺南蓋本欲斬之也安南賊帥梅叔焉等攻圍州縣遣驃騎將軍兼内侍楊思勗討之帥所類翻驃匹妙翻騎竒寄翻朔考異曰舊紀云八月丙戍按八月庚子無丙戍思勗𫝊云首領梅𤣥成自稱黒帝與林邑真臘國通謀陷安南府今從本紀周尹上神宗書作梅叔鸞思勗募羣蠻子弟得兵十餘萬襲擊大破之斬叔焉積尸為京觀而還觀古玩翻還從宣翻又如字初上之誅韋氏也王皇后頗預密謀及即位數年色衰愛弛武惠妃有寵隂懷傾奪之志后心不平時對上有不遜語上愈不悦密與祕書監姜皎謀以后無子廢之皎泄其言嗣滕王嶠按新書滕王元嬰薨長子修琦嗣為長樂王垂拱中死詔獄神龍初以少子脩信子渉嗣無嗣滕王嶠也新書姜皎𫝊言皎泄禁中語為嗣濮王嶠所劾又按新書太宗子魏王泰得罪後封濮王薨子欣嗣武后時為酷吏所陷貶神龍初子嶠嗣王則嗣滕王嶠當作嗣濮王嶠明矣后之妹夫也奏之上怒張嘉貞希㫖構成其罪云皎妄談休咎甲戍杖皎六十流欽州弟吏部侍郎晦貶春州司馬舊志春州京師東南六千四百四十八里親黨坐流死者數人皎卒于道巳亥敕宗室外戚駙馬非至親毋得往還其卜相占候之人皆不得出入百官之家相息亮翻巳夘夜左領軍兵曹權楚璧與其黨李齊損等作亂立楚璧兄子梁山為光帝詐稱襄王之子景雲二年重茂改封襄王擁左屯營兵數百人入宫城求留守王志愔不獲比曉比必利翻屯營兵自潰斬楚璧等𫝊首東都志愔驚怖而薨楚璧懷恩之姪權懷恩為吏以嚴能稱怖普布翻齊損㢠秀之子也李㢠秀始見一百六卷武后神功元年㢠户頃翻壬午遣河南尹王怡如京師按問宣慰癸未吐蕃圍小勃律王沒謹忙小勃律在大勃律西北三百里去京師九千里而贏東少南三千里距吐蕃賛普牙謹忙求救于北庭節度使張嵩曰勃律唐之西門勃律亡則西域皆為吐蕃矣嵩乃遣䟽勒副使張思禮將蕃漢歩騎四千救之據新書張嵩即張孝嵩使疏吏翻將即亮翻騎竒寄翻晝夜倍道與謹忙合擊吐蕃大破之斬獲數萬自是累嵗吐蕃不敢犯邊王怡治權楚璧獄連逮甚衆久之不决治直之翻上乃以開府儀同三司宋璟為西京留守璟至止誅同謀數人餘皆奏原之康待賔餘黨康願子反自稱可汗張説發兵追討擒之其黨悉平徙河曲六州殘胡五萬餘口於許汝唐鄧仙豫等州貞觀八年改伊州襄城郡為汝州唐州漢南陽郡東界比陽湖陽平氏之地後魏於比陽置東荆州後改為昌州又改為淮州隋改為顯州武徳五年以郡有唐城山改為唐州開元三年以汝州之葉襄城唐州之方城豫州之西平許州之舞陽置仙州空河南朔方千里之地先是緣邊戍兵常六十餘萬先悉薦翻説以時無彊冦奏罷二十餘萬使還農上以為疑説曰臣久在疆場具知其情將帥茍以自衛及役使營私而已場音亦將即亮翻帥所類翻若禦敵制勝不必多擁冗卒以妨農務陛下若以為疑臣請以闔門百口保之上乃從之初諸衛府兵自成丁從軍六十而免其家又不免雜徭浸以貧弱逃亡略盡百姓苦之張説建議請召募壯士充宿衛不問色役優為之制逋逃者必爭出應募上從之旬日得精兵十三萬分𨽻諸衛更畨上下更工衡翻上時掌翻兵農之分從此始矣史言唐養兵之弊始于張説冬十月癸丑復以乾元殿為明堂以東都明堂復為乾元殿見上卷五年復扶又翻甲寅上幸夀安興泰宫夀安古新安九曲之地後魏置甘棠縣隋仁夀四年改為夀安縣屬洛州獵于上宜川庚申還宫上欲耀兵北邊丁夘以秦州都督張守潔等為諸衛將軍十一月乙未初令宰相共食實封三百户唐㑹要曰舊制凡有功之臣賜實封者皆以課户充準户數州縣與國官邑官執帳供其租調各凖配租調逺近州縣官司收其脚直然後附國邑官司其丁凖此入國邑者收其庸前廣州都督裴伷先下獄下遐嫁翻伷與胄同上與宰相議其罪張嘉貞請杖之張説曰臣聞刑不上大夫記曲禮之言上時掌翻為其近于君且所以養亷耻也為于偽翻近其靳翻故士可殺不可辱記儒行之言臣曏廵北邊聞杖姜皎于朝堂朝直遥翻皎官登三品亦有微功有罪應死則死應流則流奈何輕加笞辱以皂𨽻待之笞丑之翻皁昨早翻姜皎事往不可復追伷先據狀當流豈可復蹈前失復扶又翻上深然之嘉貞不悦退謂説曰何論事之深也説曰宰相時來則為之若國之大臣皆可笞辱但恐行及吾輩吾此言非為伷先乃為天下士君子也為于偽翻下為農同嘉貞無以應十二月庚子以十姓可汗阿史那懷道女為交河公主武后長安四年冊懷道為十姓可汗嫁突騎施可汗蘇禄上將幸晉陽因還長安張説言于上曰汾隂脽上有漢家后土祠立后土祠見二十卷漢武帝元鼎四年脽音誰其禮久廢陛下宜因廵幸修之為農祈榖上從之上女永穆公主將下嫁永穆公主下嫁王繇敕資送如太平公主故事僧一行諫曰武后惟太平一女故資送特厚卒以驕敗太平公主始嫁薛紹而敗于開元之初卒子恤翻奈何為法上遽止之十一年春正月巳巳車駕自東都北廵庚辰至潞州給復五年上嘗為潞州别駕故也復方目翻辛夘至并州置北都以并州為太原府刺史為尹二月戊申還至晉州張説與張嘉貞不平㑹嘉貞弟金吾將軍嘉祐贓發説勸嘉貞素服待罪于外巳酉左遷嘉貞幽州刺史壬子祭后土于汾隂乙夘貶平遥令王同慶為贑尉平遥即漢太原郡平陶縣後魏避國諱改平陶為平遥周隋屬介州唐屬汾州贑音紺坐廣為儲偫煩擾百姓也偫直里翻癸亥以張説兼中書令巳巳罷天兵大武等軍以大同軍為太原以北節度使領太原遼石嵐汾代忻朔蔚雲十州武徳三年分并州之樂平遼山平城石艾置遼州八年曰箕州先天元年避上名改曰儀州至中和三年方復曰遼州此以後來一定州名書之嵐盧含翻蔚紆勿翻三月庚午車駕至京師夏四月甲子以吏部尚書王晙為兵部尚書同中書門下三品五月巳丑以王晙兼朔方軍節度大使廵河西隴右河東河北諸軍上置麗正書院聚文學之士漢魏以來有祕書之職梁於文徳殿内藏聚羣書北齊有文林館學士後周有麟趾殿學士皆掌著述隋冩羣書正副二本藏于宫中其餘以實秘書外閣煬帝于東都觀文殿東西廂貯書自漢延嘉至隋皆秘書掌圖籍而禁中之書時或有焉太宗在藩置學士十八人其後𢎞文崇文二館皆有學士開元五年乾元殿冩四部書置乾元院使有刋正官四人知書官八人分掌四庫書六年更號麗正修書院置使及檢校官改修書官為麗正殿學士八年加文學直又加修撰校理判正校勘官十一年置麗正院修書學士十三年改麗正修書院為集賢殿書院五品以上為學士六品以下為直學士宰相一人為學士知院事常侍一人為副知院事又置判院一人押院中使一人又置集賢院侍講學士侍讀直學士其後又增修撰官校理官侍制官留院官知檢討官文學直之類祕書監徐堅太常博士㑹稽賀知章監察御史鼔城趙冬曦等㑹稽縣帶越州鼔城縣漢臨平下曲陽兩縣之地隋分槀城于下曲陽故城東五里置昔陽縣尋改為鼔城唐屬定州㑹古外翻監右衘翻或修書或侍講以張説為修書使以總之有司供給優厚中書舍人洛陽陸堅以為此屬無益于國徒為糜費欲悉奏罷之堅考異曰舊傳作徐今從集賢注記張説曰自古帝王于國家無事之時莫不崇宫室廣聲色今天子獨延禮文儒發揮典籍所益者大所損者㣲陸子之言何不逹也上聞之重説而薄堅秋八月癸夘敕前令檢括逃人慮成煩擾天下大同宜各從所樂樂音洛令所在州縣安集遂其生業戊申追尊宣皇帝廟號獻祖光皇帝廟號懿祖宣皇帝諱熈凉武昭王暠之曾孫凉王歆之孫𢎞農太守重耳之子也光皇帝諱天賜宣皇帝長子也祔于太廟九室先是吐谷渾畏吐蕃之彊附之者數年先悉薦翻吐從暾入聲九月壬申帥衆詣沙州降帥讀曰率降户江翻河西節度使張敬忠撫納之冬十月丁酉上幸驪山作温泉宫雍録曰驪山温湯在臨潼縣南一百五十歩直驪山之西北十道志曰泉有三所其一處即皇堂石井後周宇文䕶所造隋文帝又修屋宇并植松柏千餘株貞觀十八年詔閻立本營建宫殿御賜名湯泉宫是年更名温泉宫而改作之甲寅還宫十一月禮儀使張説等奏以髙祖配昊天上帝罷三祖並配之禮此因郊祀置禮儀使也武徳初定令圓丘以景帝配明堂以元帝配貞觀奉髙祖配圓丘永徽二年又奉太宗配明堂垂拱初用元萬頃議奉髙宗配圓丘自是郊祀之禮三祖並配三祖謂高祖太宗髙宗也使疏吏翻戊寅上祀南郊赦天下戊考異曰實録癸酉日長至戊寅祀南郊唐厯寅冬至祀南郊按長厯去年閏五月來年閏十二月唐厯近是戊子命尚書左丞蕭嵩與京兆蒲同岐華州長官選府兵及白丁一十二萬謂之長從宿衛華户化翻長知兩翻一年兩畨州縣毋得雜役使十二月甲午上幸鳯泉湯戊申還宫庚申兵部尚書同中書門下三品王晙坐黨引疎族貶蘄州刺史舊志蘄州至京師二千五百六十里蘄渠希翻時考異曰舊𫝊云上親郊祀追晙赴京以㑹大禮晙以屬氷壯恐虜騎乘隙入冦表辭不赴手敕慰勉仍賜衣一副㑹許州刺史王喬家奴告喬與晙濳謀搆逆敕侍中源乾曜中書令張説鞫其状晙既無反状乃以違詔追不到罪之今從實録是嵗張説奏改政事堂曰中書門下列五房于其後分掌庶政舊制宰相常于門下省議事謂之政事堂永淳元年中書令裴炎以中書執政事筆遂移政事堂于中書省至是説改政事堂為中書門下其政事印改為中書門下之印五房一曰吏房二曰樞機房三曰兵房四曰户房五曰刑禮房初監察御史濮陽杜暹因按事至突騎施監古衘翻濮博木翻暹息亷翻突騎施饋之金暹固辭左右曰君寄身異域不宜逆其情乃受之埋于幕下出境移牒令取之虜大驚度磧追之不及及安西都䕶闕或薦暹往使安西人服其清慎磧七迹翻使疏吏翻時暹自給事中居母憂十二年春三月甲子起暹為安西副大都䕶磧西節度等使神龍初追復澤王上金官爵上金死見二百四卷武后天授元年求得庶子義珣於嶺南紹其故封許王素節之子瓘利其爵邑與弟璆謀璆音求使人告義珣非上金子妄冒襲封復流嶺南以璆繼上金後為嗣澤王至是玉真公主表義珣實上金子為瓘兄弟所擯夏四月庚子復立義珣為嗣澤王削璆爵貶瓘鄂州别駕舊志鄂州京師東南二千九百四十八里壬寅敕宗室旁繼為嗣王者並令歸宗復扶又翻紀考異曰舊在癸夘今從實録壬子命太史監南宫説等唐太史局屬秘書省景龍二年改大史局為太史監令名不改不𨽻祕書開元二年又改令為監説讀曰悦於河南北平地測日晷及極星夏至日中立八尺之表同時候之陽城晷長一尺四寸八分弱陽城縣前漢屬潁川郡後漢屬河南郡後魏置陽城郡隋置嵩州貞觀三年廢嵩州以縣屬洛州武后登封元年改曰告成中宗神龍元年復故晷居洧翻長直亮翻夜視北極出地髙三十四度十分度之四高古號翻浚儀岳臺晷長一尺五寸㣲强項安世曰按日行黄道每嵗有差地中亦當隨之故測日景以求地中周在洛邑漢在潁川陽城唐在汴州浚儀也長直亮翻考異曰新志云浚儀岳臺晷尺五寸三分今從僧一行大衍厯議及舊志極髙三十四度八分南至朗州晷長七寸七分極髙二十九度半北至蔚州晷長二尺二寸九分極髙四十度南北相距三千六百八十八里九十歩晷差一尺五寸二分極差十度半又南至交州晷出表南三寸三分八月海中南望老人星下衆星粲然皆古所未名大率去南極二十度以上星皆見見賢遍翻温公作通鑑不特紀治亂之迹而已至于禮樂厯數天文地理尤致其詳讀通鑑者如飲河之鼠各充其量而已五月丁亥停諸道按察使八年復置諸道按察使使疏吏翻六月壬辰制聽逃户自首首式又翻闢所在閒田隨宜收税毋得差科征役租庸一皆蠲免仍以兵部員外郎兼侍御史宇文融為勸農使廵行州縣行下孟翻與吏民議定賦役上以山東旱命臺閣名臣以補刺史壬午以黄門侍郎王丘中書侍郎長安崔沔沔彌兖翻禮部侍郎知制誥韓休等五人出為刺史丘同皎之從父兄子王同皎預誅二張死於武三思之手從才用翻休大敏之孫也按舊書韓休𫝊休伯父大敏則天初以雪反者賜死休父曰大智初張説引崔沔為中書侍郎故事承宣制皆出宰相侍郎署位而已承宣制者承宣及承制也沔曰設官分職上下相維各申所見事乃無失侍郎令之貳也豈得拱黙而已由是遇事多所異同説不恱故因是出之秋七月突厥可汗遣其臣哥解頡利發來求昏溪州蠻覃行璋反溪州漢沅陵零陵二縣地梁分置大鄉縣舊置辰州武后天授二年分置溪州覃音徒含翻姓也姓譜梁有東寧州刺史覃元亮以監門衛大將軍楊思勗為黔中道招討使將兵擊之監古衘翻黔音琴使疏吏翻將即亮翻癸亥思勗生擒行璋斬首三萬級而歸加思勗輔國大將軍俸禄防閤皆依品級貞觀初百官得上考者給禄一季未㡬得上下考者給禄一年出使者禀其家新至官者計日給糧中書舍人髙季輔言外官卑品貧匱宜給禄養親自後以地租春秋給京官嵗凡五十萬一千五百餘斛外官降京官一等一品以五十石為一等二品三品以三十石為一等四品五品以二十石為一等六品七品以五石為一等八品九品以二石五斗為一等典粟則以鹽為禄職事官又有防閤庶僕一品防閤九十六人二品七十二人三品四十八人四品三十二人五品二十四人六品庶僕十五人七品四人八品三人九品二人外官以州府縣上中下為差又按唐六典輔國大將軍勲階正二品唐制宦官不得登三品今思勗階二品矣宋白曰唐制凡京師文武職官皆有防閤州縣官僚皆有白直赦行璋以為洵水府别駕唐制商州有洵水府又按唐制諸府無别駕各有别將一人上府正七品下中府從七品上下府從七品下别駕當為别將洵須倫翻姜皎既得罪王皇后愈憂畏不安然待下有恩故無隨而譖之者上猶豫不决者累嵗后兄太子少保守一以后無子使僧明悟為后祭南北斗為于偽翻剖霹靂木書天地字及上名合而佩之霹靂木者霹靂所震之木今為張道陵之術者用霹靂木為印云有雷氣可以鎮服鬼物祝曰佩此有子當如則天皇后事覺己卯廢為庶人移别室安置貶守一潭州别駕中路賜死户部尚書張嘉貞坐與守一交通貶台州刺史舊志台州京師東南四千一百七十七里八月丙申突厥哥解頡利發還其國以其使者輕禮數不備未許昏使疏吏翻下同己亥以宇文融為御史中丞融乘驛周流天下事無大小諸州先牒上勸農使上時掌翻後申中書句斷省司亦待融指撝然後處决省司謂尚書都省左右司主者也處昌吕翻時上將大攘四夷急于用度州縣畏融多張虛數凡得客户八十餘萬田亦稱是融獻策括籍外羡田逃户自占者給復五年毎丁税錢千五百州縣希㫖以正田為羡編户為客稱尺證翻嵗終増緡錢數百萬緡眉巾翻悉進入宫由是有寵議者多言煩擾不利百姓上亦令集百寮於尚書省議之公卿已下畏融恩勢不敢立異惟户部侍郎楊瑒獨抗議以為括客免税不利居人徵籍外田税使百姓困弊所得不補所失未幾瑒出為華州刺史瑒雉杏翻又音暢幾居豈翻壬寅以開府儀同三司宋璟為西京留守冬十月丁酉謝䫻王特勒遣使入奏謝䫻國居吐火羅西南或曰漕矩吒或曰漕矩顯慶時曰訶逹羅支武后改曰謝䫻東距罽賔四百里南天竺西波斯䫻于筆翻稱去年五月金城公主遣使詣箇失密國箇失密或曰迦濕彌邏北距勃律五百里云欲走歸汝箇失密王從臣國王借兵共拒吐蕃王遣臣入取進止上以為然賜帛遣之廢后王氏卒後宫思慕后不已上亦悔之十一月庚午上幸東都戊寅至東都辛巳司徒申王撝薨贈諡惠莊太子羣臣屢上表請封禪上時掌翻閏月丁卯制以明年十一月十日有事于泰山時張説首建封禪之議而源乾曜不欲為之由是與説不平是嵗契丹王李鬱干卒弟吐干襲位卒子恤翻吐從暾入聲十三年春二月庚申以御史中丞宇文融兼户部侍郎制以所得客户税錢均充所在常平倉本又委使司與州縣議作勸農社使司勸農使司也使疏吏翻使貧富相恤耕耘以時乙亥更命長從宿衛之士曰彍騎彍虚郭翻引滿曰彍分𨽻十二衛總十二萬人為六畨上自選諸司長官有聲望者大理卿源光裕尚書左丞楊承令兵部侍郎冦泚等十一人為刺史命宰相諸王及諸司長官臺郎御史諸司長官省寺監之長也臺郎謂尚書郎先是改尚書為中臺臺郎及御史則三省官必皆集也長知兩翻泚且禮翻又音此餞于洛濵供張甚盛供居用翻張知亮翻賜以御膳太常具樂御膳尚食奉御所掌天子日供之常膳太常具樂者使太常為之具樂耳若盡具太常之樂則雅樂鼔吹文武二舞及十部樂恐非宴餞之所得備也内坊歌妓内坊内敎坊也即開元二年選置宜春院之妓女妓渠綺翻上自書十韻詩賜之光裕乾曜之從孫也從才用翻三月甲午太子嗣謙更名鴻徙郯王嗣直為慶王更名潭陜王嗣昇為忠王更名浚鄫王嗣真為棣王更名洽讀通鑑至此可以知前此嗣直之誤為嗣真矣更工衡翻下同鄂王嗣初更名溳鄄王嗣𤣥為榮王更名滉又立子琚為光王濰為儀王澐為潁王溳圭淵翻鄄吉椽翻澐音云澤為永王清為夀王洄為延王沭為盛王沭食聿翻溢為濟王濟子禮翻丙申御史大夫程行湛奏周朝酷吏朝直遥翻來俊臣等二十三人情状尤重子孫請皆禁錮傅遊藝等四人差輕子孫不聼近任從之汾州刺史楊承令不欲外補舊志汾州去京師一千二百六里意怏怏自言吾出守有由怏於兩翻守手又翻上聞之怒壬寅貶睦州别駕張説草封禪儀獻之夏四月丙辰上與中書門下及禮官學士宴于集仙殿上曰仙者慿虚之論朕所不取賢者濟理之具朕今與卿曹合宴宜更名曰集賢殿唐六典洛陽宫南面三門中曰應天左曰興敎右曰光政光政之内曰廣運其北曰明福明福之西曰崇賢門其内曰集賢殿其書院官五品以上為學士六品以下為直學士以張説知院事右散騎常侍徐堅副之上欲以説為大學士説固辭而止説以大駕東廵恐突厥乘閒入冦間古莧翻議加兵守邊召兵部郎中裴光庭謀之光庭曰封禪者告成功也今將升中于天記曰因名山升中于天注云謂封泰山也而戎狄是懼非所以昭盛徳也説曰然則若之何光庭曰四夷之中突厥為大比屢求和親而朝廷羈縻未决許也比毗至翻今遣一使徵其大臣從封泰山使疏吏翻彼必欣然承命突厥來則戎狄君長無不皆來長知兩翻可以偃旗卧皷髙枕有餘矣枕職任翻説曰善說所不及即奏行之光庭行儉之子也裴行儉事髙宗典選有識鑒為將著功名上遣中書直省袁振以他官直中書省謂之直省今之直省吏職也攝鴻臚卿諭㫖於突厥臚陵如翻小殺與闕特勒暾欲谷環坐帳中置酒謂振曰吐蕃狗種西戎古曰犬戎故謂吐蕃為狗種奚契丹本突厥奴也夷言奴猶華言臣也皆得尚主突厥前後求昏獨不許何也且吾亦知入蕃公主皆非天子女今豈問真偽但屢請不獲愧見諸蕃耳振許為之奏請小殺乃使其大臣阿史徳頡利發入貢因扈從東廵為于偽翻從才用翻五月庚寅妖賊劉定髙帥衆夜犯通洛門妖于喬翻帥讀曰率悉捕斬之秋八月張說議封禪儀請以睿宗配皇地祇從之九月丙戌上謂宰臣曰春秋不書祥瑞惟記有年敕自今州縣毋得更奏祥瑞冬十月癸丑作水運渾天成上具列宿注水激輪令其自轉晝夜一周別置二輪絡在天外綴以日月逆天而行淹速合度每天西旋一周日東行一度月行十三度十九分度之七二十九轉而日月㑹三百六十五轉而日周天孔頴達曰天之晝夜以日出入為分人之晝夜以昏明為限日未出以前二刻半為明日入後二刻半為昏損夜五刻以禆于晝則晝多于夜復校五刻古今厯術與太史所候皆云夏至之晝六十五刻夜三十五刻冬至之晝四十五刻夜五十五刻春分秋分之晝五十五刻夜四十五刻此其不易之法也然今太史細侯之法則較常法半刻也從春分至夏至晝漸長増九刻半夏至至于秋分所减亦如之從秋分至于冬至晝漸短减十刻半從冬至至于春分其増亦如之又于每氣之間増减刻數有多有少不可通以為率漢初未能審知率九日増减一刻和帝時霍融始請改之置木匱為地平令儀半在地下又立二木人毎刻擊鼔每辰擊鐘機械皆藏匱中辛酉車駕發東都百官貴戚四夷酋長從行酋慈由翻長知兩翻每置頓數十里中人畜被野畜許救翻被皮義翻有司輦載供具之物數百里不絶司馬法曰夏后氏謂輦曰余車殷曰胡奴車周曰輜輦輦一斧一鑿一梩一鋤周輦加二版二築又曰夏后氏二十人而輦殷十八人而輦周十五人而輦賈公彦曰輦以其束載輜重余按司馬法及賈公彦所云皆言行軍之輦此所謂輦載兼凡器物而言十一月丙戌至泰山下御馬登山統考異曰實録唐厯紀皆云備法駕登泰山開天傳信記云上將封泰山益州進白騾上親乘之不知登降之倦纔下山無疾而殪諡曰白騾將軍按泰山非法駕可登白騾近怪今從舊志留從官於谷口從才用翻獨與宰相及祠官俱登儀衛環列於山下百餘里上問禮部侍郎賀知章曰前代玉牒之文何故祕之對曰或密求神仙故不欲人見上曰吾為蒼生祈福耳為于偽翻乃出玉牒宣示羣臣庚寅上祀昊天上帝於山上羣臣祀五帝百神於山下之壇其餘倣乾封故事事見一百一卷髙宗乾封元年辛夘祭皇地祇于社首壬辰上御帳殿受朝覲野次連幄以為殿因謂之帳殿朝直遥翻赦天下封泰山神為天齊王禮秩加三公一等古制四岳眡三公張說多引兩省吏兩省中書省門下省也及以所親攝官登山禮畢推恩往往加階超入五品而不及百官中書舍人張九齡諫不聽又扈從士卒但加勲而無賜物從才用翻勲勲級也由是中外怨之初隋末國馬皆為盗賊及戎狄所掠唐初纔得牝牡三千匹於赤岸澤徙之隴右命太僕張萬嵗掌之隴考異曰統紀云萬嵗三世典羣牧恩信行右故隴右人謂馬嵗爲齒爲張氏諱也按公羊傳晉獻公謂荀息曰吾馬之齒則已長矣然則謂馬嵗為齒有自來矣萬嵗善于其職自貞觀至麟徳馬蕃息及七十萬匹蕃音煩分為八坊四十八監各置使以領之唐制凡馬五千匹為上監三千匹以上為中監一千匹以上為下監麟德中置八使分總監坊秦蘭原渭四州及河曲之地凡監四十八南使有監十五西使有監十六北使有監七鹽州使有監八嵐州使有監二自京師西屬隴右有七馬坊置隴右三使領之歐陽脩曰置八坊豳岐涇寜間地廣千里一曰保樂二曰甘露三曰南普閏四曰北普閏五曰岐陽六曰太平七曰宜禄八曰安定八坊之田千二百三十頃募民耕之以給芻秣八坊之馬為四十八監而馬多地狹不能容又析八監列置河西豐曠之野是時天下以一縑易一馬垂拱以後馬濳耗太半上初即位牧馬有二十四萬匹以太僕卿王毛仲為内外閑廐使少卿張景順副之至是有馬四十三萬匹牛羊稱是使疏吏翻下同稱尺證翻上之東封以牧馬數萬匹從從才用翻下宴從同色别為羣望之如雲錦上嘉毛仲之功癸巳加毛仲開府儀同三司甲午車駕發泰山庚申幸孔子宅致祭上還至宋州宴從官于樓上刺史冦泚預焉酒酣上謂張説曰曏者屢遣使臣分廵諸道察吏善惡今因封禪厯諸州乃知使臣負我多矣懷州刺史王丘餼牽之外一無它獻魏州刺史崔沔供張無錦繡示我以儉濟州刺史裴耀卿表數百言莫非規諫懷魏二州在河北濟州治鉅野上行幸泰山往還皆得迎候車駕餼許氣翻供居用翻張知亮翻濟子禮翻且曰人或重擾則不足以告成朕常寘之坐隅重直用翻坐徂卧翻且以戒左右如三人者不勞人以市恩真良吏矣顧謂冦泚曰比亦屢有以酒饌不豐訴于朕者比毗至翻饌雛戀翻又雛皖翻知卿不借譽於左右也自舉酒賜之宰臣帥羣臣起賀樓上皆稱萬嵗譽音余帥讀曰率由是以丘為尚書左丞沔為散騎侍郎耀卿為定州刺史耀卿叔業之七世孫也尚辰羊翻沔彌兖翻散悉亶翻騎竒寄翻蕭齊東昏侯之時裴叔業叛齊入魏十二月乙巳還東都還從宣翻又如字突厥頡利發辭歸上厚賜而遣之竟不許昏厥九勿翻頡奚結翻王毛仲有寵于上百官附之者輻湊毛仲嫁女上問何須須求也索也毛仲頓首對曰臣萬事已備但未得客上曰張説源乾曜輩豈不可呼邪説讀為悦邪音耶對曰此則得之上曰知汝所不能致者一人耳必宋璟也對曰然上笑曰朕明日為汝召客為于偽翻明日上謂宰相朕奴毛仲有昏事卿等宜與諸逹官悉詣其第既而日中衆客未敢舉筯待璟久之方至先執酒西向拜謝謝為君命而來非為毛仲來也飲不盡巵遽稱腹痛而歸璟之剛直老而彌篤先是契丹王李吐干與可突干復相猜忌攜公主來奔不敢復還更封遼陽王留宿衛吐從暾入聲可從刋入聲先悉薦翻復扶又翻更工衡翻可突干立李盡忠之弟邵固為主車駕東廵邵固詣行在因從至泰山拜左羽林大將軍靜折軍經略大使四年契丹來降置静折軍于松漠府以其酋長為經略大使言中國之兵不動而契丹自降以靜而折遐衝也使疏吏翻上疑吏部選試不公時選期已迫御史中丞宇文融密奏請分吏部為十銓甲戌以禮部尚書蘇頲等十人掌吏部選選須絹翻下同頲他鼎翻試判將畢遽召入禁中决定吏部尚書侍郎皆不得預左庶子吴兢上表上時掌翻以為陛下曲受讒言不信有司非居上臨人推誠感物之道昔陳平丙吉漢之宰相尚不對錢榖之數不問鬬死之人陳平事見十三卷漢文帝元年丙吉事見二十六卷漢宣帝神爵三年况大唐萬乘之君豈得下行銓選之事乎凡選人書判並請委之有司停此十銓上雖不即從明年復故是嵗東都斗米十五錢青齊五錢粟三錢于闐王尉遲眺隂結突厥及諸胡謀叛尉紆勿翻安西副大都䕶杜暹發兵捕斬之更為立王為于偽翻資治通鑑卷二百十二
