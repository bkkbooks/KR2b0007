  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷二百二十八宋司馬光撰胡三省音註唐紀四十四起昭陽大淵獻正月盡十月不滿一年是年癸亥諸藩連兵拒命而徳宗玩兵召禍日尋干戈最為多事是卷所紀纔十月耳徳宗神武聖文皇帝三建中四年春正月丁亥隴右節度使張鎰與吐蕃尚結贊盟于清水使疎吏翻鎰弋質翻吐從暾入聲清水漢古縣唐屬秦州九域志在州東九十里庚寅李希烈遣其將李克誠襲陷汝州執别駕李元平將即亮翻汝州治梁縣漢承休侯封邑也元平本湖南判官薄有才藝性疎傲敢大言好論兵好呼到翻闗播竒之薦於上以為將相之器以汝州距許州最近九域志汝州東南至許州二百七十里史言闗播所用非才相息亮翻擢元平為汝州别駕知州事元平至汝州即募工徒治城治直之翻希烈隂使壯士應募執役入數百人元平不之覺希烈遣克誠將數百騎突至城下將即亮翻又音如字騎竒寄翻應募者應之於内縳元平馳去元平為人𦕈小無須須古字取象以彡類耏毛也後人從而加髟為鬚字此俗書耳見希烈恐懼便液汚地便毗連翻便液謂屎溺也液音亦汚烏故翻希烈罵之曰盲宰相以汝當我何相輕也以判官周晃為汝州刺史又遣别將董待名等四出抄掠取尉氏尉氏縣屬汴州九域志在州南九十里抄楚交翻圍鄭州官軍數為所敗邏騎西至彭婆數所角翻敗補邁翻邏郎佐翻騎竒寄翻邏騎廵邏遊奕之騎九域志河南府河南縣有彭婆鎮金人疆域圖洛陽縣有彭婆鎮東都士民震駭竄匿山谷留守鄭叔則入保西苑東都西苑在東都城西鄭叔則盖備有急易於西奔也守式又翻上問計於盧把對曰希烈年少驍將恃功驕慢將佐莫敢諫止誠得儒雅重臣奉宣聖澤為陳逆順禍福少詩照翻驍堅堯翻將即亮翻為于偽翻希烈必革心悔過可不勞軍旅而服顔眞卿三朝舊臣眞卿厯事𤣥肅代三朝朝直遥翻忠直剛决名重海内人所信服眞其人也上以為然甲午命眞卿詣許州宣慰希烈詔下舉朝失色下遐嫁翻眞卿乘驛至東都鄭叔則曰徃必不免宜少留須後命少詩沼翻須待也眞卿曰君命也將焉避之焉於䖍翻遂行李勉表言失一元老為國家羞請留之又使人邀眞卿不及眞卿與其子書但敕以奉家廟撫諸孤而已至許州欲宣詔㫖希烈使其養子千餘人環繞慢罵李希烈養壯士為子謂之養子環胡慣翻㧞刃擬之為將剸啗之勢剸㫖兖翻細割也眞卿足不移色不變希烈遽以身蔽之麾衆令退館眞卿而禮之令力丁翻館古玩翻希烈欲遣眞卿還還從宣翻又音如字㑹李元平在座眞卿責之元平慙而起以密啟白希烈希烈意遂變留眞卿不遣朱滔王武俊田悦李納各遣使詣希烈上表稱臣勸進使者拜舞於希烈前説希烈曰使疏吏翻上時掌翻説式芮翻朝廷誅滅功臣失信天下都統英武自天功烈盖世已為朝廷所猜忌將有韓白之禍朝直遥翻統他綜翻俗從上聲韓白之禍謂韓信斬於鍾室白起死於杜郵也願亟稱尊號使四海臣民知有所歸希烈召顔眞卿示之曰今四王遣使見推不謀而同以朱滔稱冀王王武俊稱趙王田悦稱魏王李納稱齊王故希烈謂之四王使疏吏翻太師觀此事勢豈吾獨為朝廷所忌無所自容邪邪音耶眞卿曰此乃四凶何謂四王相公不自保功業為唐忠臣乃與亂臣賊子相從求與之同覆滅邪希烈不悦扶眞卿出它日又與四使同宴四使曰久聞太師重望今都統將稱大號而太師適至是天以宰相賜都統也顔眞卿為太子太師故皆以其官稱之相息亮翻眞卿叱之曰何謂宰相汝知有罵安禄山而死者顔杲卿乎顔杲卿事見二百一十七卷肅宗至徳元載叱尺栗翻乃吾兄也吾年八十知守節而死耳豈受汝輩誘脅乎史炤曰以利動之曰誘以威廹之曰脅誘音酉四使不敢復言復扶又翻希烈乃使甲士十人守眞卿於館舍掘坎于庭云欲阬之眞卿怡然見希烈曰怡然安和之貌死生已定何必多端亟以一劒相與豈不快公心事邪希烈乃謝之後考異曰顔氏行狀以為公至許州希烈前許為公表奏請汴州者數十上知而寢之舊眞卿傳以為希烈逼為章表令雪已願罷兵馬累遣眞卿兄子峴與從吏凡數輩繼來京師上皆不報希烈大宴逆黨倡優斥黷朝政眞卿拂衣起後張伯儀敗績令以首級夸示眞卿號慟周曾謀奉眞卿遂送眞卿于龍興寺按滔等推尊希烈在去年眞卿使許在今年正月盖滔等始勸希烈稱帝希烈但稱都元帥建興王故今年滔等再遣樊播等勸進稱為都統也眞卿剛烈守之以死希烈豈能逼之使為章表雪已行狀云詐為表奏是也戊戌以左龍武大將軍哥舒曜為東都汝州節度使將鳯翔邠寧涇原奉天好畤行營兵萬餘人討希烈鳯翔邠寧涇原三節鎮之兵奉天好畤神䇿屯兵也又詔諸道共討之曜行至郟城郟音夾郟城縣屬汝州東魏之龍山縣也隋開皇初改曰汝南十八年改曰輔城大業初改曰郟城九域志郟城縣在汝州東南九十里宋白曰春秋楚令尹子瑕城郟即此遇希烈前鋒將陳利貞擊破之希烈勢小沮沮在吕翻曜翰之子也天寶末安禄山反哥舒翰敗没于潼闗希烈使其將封有麟據鄧州南路遂絶貢獻商旅皆不通壬寅詔治上津山路置郵驛上津縣屬商州治直之翻二月戊申朔命鴻臚卿崔漢衡送區頰贊還吐蕃區頰贊入見事始見上卷上年臚陵如翻丙戌以河陽三城懷衛州為河陽軍丁卯哥舒曜克汝州擒周晃三月戊寅江西節度使曹王臯敗李希烈將韓霜露於黄梅斬之辛卯㧞黄州時希烈兵栅蔡山敗補邁翻九域志黄梅縣屬蘄梅界州距州一百二十里蔡山在黄即江左新蔡郡治所魯悉逹保聚之地宋白曰宋分江夏郡置南新蔡郡隋開皇十八年改為黄梅縣以界内黄梅山名之祝穆曰蔡山出大龜春秋左氏傳所謂大蔡盖以山得名也險不可攻臯聲言西取蘄州蘄音祈蘄州後漢為蘄春侯國吳置蘄春郡北齊置齊昌郡及羅州後周改蘄州州北有蘄水南入于江地名觧云蘄春以水隈多蘄菜因名引舟師泝江而上希烈之將引兵循江隨戰去蔡山三百餘里臯乃復放舟順流而下上時掌翻復扶又翻下遐嫁翻急攻蔡山㧞之希烈兵還救之不及而敗臯遂進㧞蘄州表伊慎為蘄州刺史王鍔為江州刺史淮寧都虞候周曾鎮遏兵馬使王玢押牙姚憺韋清密輸欵於李勉玢府巾翻憺徒濫翻又徒敢翻李希烈遣曾與十將康秀琳將兵三萬攻哥舒曜至襄城襄城縣漢屬潁川郡晉屬襄城郡後周置汝州唐貞觀元年廢州以襄城縣屬許州貞觀八年以伊州為汝州襄城仍屬許州天寶七載復屬汝州九域志襄城縣在汝州東南一百有五十里曾等宻謀還軍襲希烈奉顔眞卿為節度使使玢憺清為内應希烈知之遣别將李克誠將騾軍三千人淮西地少馬乘騾以戰號騾子軍尤為驍鋭將即亮翻誠將音同又音如字騾落戈翻襲曾等殺之并殺玢憺及其黨甲午詔贈曾等官始韋清與曾等約事泄不相引故獨得免清恐終及禍説希烈請詣朱滔乞師説式芮翻希烈遣之行至襄邑逃奔劉洽襄邑縣屬宋州劉洽時以宣武節度鎮宋州希烈聞周曾等有變閉壁數日其黨冦尉氏鄭州者聞之亦遁歸希烈乃上表歸咎於周曾等引兵還蔡州上時掌翻還從宣翻蔡州治汝陽縣淮寧本鎮也希烈時自許州退還外示悔過從順實待朱滔等之援也置顔眞卿於龍興寺寺盖在蔡州丁酉荆南節度使張伯儀與淮寧兵戰於安州安州漢安陸地官軍大敗伯儀僅以身免亡其所持節希烈使人以其節及俘馘示顔眞卿眞卿號慟投地絶而復蘇自是不復與人言俘方無翻馘古獲翻號户高翻復扶又翻又音如字夏四月上以神䇿軍使白志貞為京城召募使募禁兵以討李希烈志貞請諸嘗為節度觀察都團練使者不問存没並勒其子弟帥奴馬自備資裝從軍帥讀口率授以五品官貧者甚苦之人心始搖史言徳宗窮兵亂將作矣上命宰相尚書與吐蕃區頰贊盟於豐邑里區頰贊以清水之盟疆埸未定不果盟是年春張鎧與吐蕃盟于清水宋白曰張鎰與吐蕃盟文曰今國家所守界涇州西至彈箏峽西口隴州西至清水縣鳯州西至同谷縣暨劒南西山大渡河東為漢界蕃國守備在蘭渭原㑹西至臨洮又東至成州抵劒南西界磨些諸蠻大渡水西南為蕃界相息亮翻尚辰羊翻吐從暾入聲埸音亦己未命崔漢衡入吐蕃决於贊普是年二月命崔漢衡送區頰贊盖欲與之盟而遣之久而盟未定又命漢衡入吐蕃决于贊普此時中國疲於兵彼固有以窺唐矣盟無益也庚申加永平宣武河陽都統李勉淮西招討使東都汝州節度使哥舒曜為之副以荆南節度使張伯儀為淮西應援招討使山南東道節度使賈耽江西節度使曹王臯為之副上督哥舒曜進兵曜至潁橋九域志襄城縣有潁橋鎮遇大雨還保襄城李希烈遣其將李光輝攻襄城曜擊却之五月乙酉潁王璬薨璬𤣥宗子音古了翻乙未以宣武節度使劉洽兼淄青招討使李晟謀取涿莫二州以絶幽魏往來之路與張孝忠之子升雲圍朱滔所署易州刺史鄭景濟于清苑水經注徐水出北平東逕清苑城東至高陽入于河劉昫曰清苑縣漢之樂鄉縣屬信都國隋為清苑縣屬瀛州唐景雲元年屬冀州至宋以清苑縣為保州治所宋白曰漢高祖訪樂毅之後得樂叔封于樂鄉高齊省仍自今易州滿城縣界移永寧縣理此城隋改為清苑縣因滿城縣界清苑河為名累月不下滔以其司武尚書馬寔為留守司武尚書猶天朝兵部尚書將歩騎萬餘守魏營自將歩騎萬五千救清苑李晟軍大敗退保易州滔還軍瀛州張升雲奔滿城劉昫曰滿城縣漢北平縣地後魏置永樂縣天寶元年改為滿城屬易州㑹晟病甚引軍還保定州等考異曰燕南記曰晟與張升雲圍鄭景濟于清苑自二月至四月滔自統馬歩萬五千人救清苑四月二日發館陶砦五月内到晟出戰不利城中又出攻晟晟敗去滔乘勝逐晟等大破之晟奔易州染病不復更出實録曰庚子李晟自清苑退保易州舊晟傳曰自正月至于五月㑹晟病甚不知人者數焉軍吏合謀乃以馬輿還定州今從之實録所云庚子盖奏到日也王武俊以滔既破李晟留屯瀛州未還魏橋遣其給事中宋端趣之趣讀曰促端見滔言頗不遜滔怒使謂武俊曰滔以熱疾蹔未南還大王二兄遽有云云滔以救魏博之故叛君弃兄如脱屣耳履不躡跟曰屣脱之易耳二兄必相疑惟二兄所為端還報武俊自辨於馬寔寔以狀白滔言趙王知宋端無禮於大王深加責讓實無它志武俊亦遣承令官鄭和隨寔使者見滔謝之時武俊等改要藉官為承令官滔乃悦相待如初然武俊以是益恨滔矣六月李抱眞使參謀賈林詣武俊壁詐降節度參謀闗預軍中機密武俊見之林曰林來奉詔非降也武俊色動問其故林曰天子知大夫宿著誠効謂誅李惟岳也及登壇之日謂稱王時也撫膺顧左右曰我本徇忠義天子不察諸將亦嘗共表大夫之志天子語使者曰朕前事誠誤悔之無及朋友失意尚可謝况朕為四海之主乎賈林先言武俊心事後述天子詔㫖鋪陳悔過之意可謂善説矣語牛倨翻武俊曰僕胡人也為將尚知愛百姓况天子豈專以殺人為事乎今山東連兵暴骨如莽杜預曰草之生於廣野莽莽然故曰草莽莽莫朗翻暴歩卜翻又薄報翻就使克㨗與誰守之僕不憚歸國但已與諸鎮結盟胡人性直不欲使曲在己天子誠能下詔赦諸鎮之罪僕當首唱從化諸鎮有不從者請奉辭伐之如此則上不負天子下不負同列不過五旬河朔定矣使林還報抱眞隂相約結為武俊與抱眞破走朱滔張本庚戌初行税間架除陌錢法時河東澤潞河陽朔方四軍屯魏縣神䇿永平宣武淮南浙西荆南江泗沔鄂湖南黔中劒南嶺南諸軍環淮寧之境江謂江南西道泗當作西黔音琴環音宦舊制諸道軍出境皆仰給度支仰牛向翻上優恤士卒毎出境加給酒肉本道糧仍給其家一人兼三人之給故將士利之各出軍纔逾境而止書有之威克厥愛允濟愛克厥威允罔功徳宗盖未知此者月費錢百三十餘萬緍常賦不能供判度支趙贊乃奏行二法二法即所謂税間架及除陌錢也所謂税間架者毎屋兩架為間上屋税錢二千中税千下税五百吏執筆握算入人室廬計其數史炤曰算所以籌算也其法用竹徑一分長六寸二百七十一枚而成六觚為一握或有宅屋多而無它資者出錢動數百緍敢匿一間杖六十賞告者錢五十緍所謂除陌錢者公私給與及賣買毎緍官留五十錢給它物及相貿易者約錢為率貿音茂敢隱錢百杖六十罰錢二千賞告者錢十緍其賞錢皆出坐事之家於是愁怨之聲盈於逺近丁卯徙郴王逾為丹王鄜王遘為簡王二王皆上弟也庚午答蕃判官監察御史于頔答蕃判官因當時出使署署置以為官名頔徒厯翻與吐蕃使者論刺没藏至自青海刺盧逹翻言疆埸已定請遣區頰贊歸國秋七月甲申以禮部尚書李揆為入蕃㑹盟使入蕃命官猶答蕃也壬辰詔諸將相與區頰贊盟於城西李揆有才望盧把惡之惡烏路翻故使之入吐蕃揆言於上曰臣不憚逺行恐死於道路不能逹詔命上為之惻然為于偽翻謂杞曰揆無乃太老把曰使逺夷非諳練朝廷故事者不可使疏吏翻諳烏含翻且揆行則自今年少於揆者少詩照翻不敢辭逺使矣使疏吏翻八月丁未李希烈將兵三萬圍哥舒曜於襄城詔李勉及神䇿將劉徳信將兵救之乙卯希烈將曹季昌以隨州降尋復為其將康叔夜所殺復扶又翻初上在東宫聞監察御史嘉興陸贄名嘉興漢由拳縣地吳大帝黄龍三年以其地嘉禾生改為禾興縣後避太子和名改為嘉興縣隋廢縣唐初復置屬蘇州即位召為翰林學士韋執誼翰林志曰自太宗時名儒學士時召革制然猶未有名號乾封以後始號北門學士𤣥宗初置翰林待詔掌四方表䟽批答應和文章繼以詔勑文告悉由中書多壅滯始選朝官有詞藝學識者入居翰林供奉别㫖然亦未定名制詔書勑猶或分在集賢開元二十六年翰林供奉始改稱學士别建學士院於翰林院之南俾專内命其後又置東翰林院於金鑾殿之西隨上所在數問以得失時兩河用兵久不决兩河謂河南河北賦役日滋贄以兵窮民困恐别生内變乃上奏其略曰克敵之要在乎將得其人馭將之方在乎操得其柄將即亮翻下同操千高翻將非其人者兵雖衆不足恃操失其柄者將雖材不為用又曰將不能使兵國不能馭將非止費財翫冦之弊亦有不戢自焚之災左氏傳曰兵猶火也不戰將自焚又曰今兩河淮西為叛亂之帥者獨四五凶人而已四五凶人為河北則朱滔王武俊田悦河南則李納淮西則李希烈也帥所類翻尚恐其中或遭詿誤詿古賣翻又胡卦翻内蓄危疑蒼黄失圖勢不得止况其餘衆盖並脅從史炤曰書云脅從罔治孔潁逹疏云謂被脅從而距王命者余謂脅從者為威力所廹脅不得已而從于逆非同心為逆者也茍知全生豈願為惡又曰無紓目前之虞或興意外之變人者邦之本也財者人之心也其心傷則其本傷其本傷則枝幹顛瘁矣瘁秦醉翻又曰人揺不寧事變難測是以兵貴拙速不貴巧遲若不靖於本而務救於末則救之所為乃禍之所起也又論闗中形勢以為王者蓄威以昭徳偏廢則危居重以馭輕倒持則悖王畿者四方之本也太宗列置府兵分𨽻禁衛大凢諸府八百餘所而在闗中者殆五百焉舉天下不敵闗中則居重馭輕之意明矣承平漸久武備浸㣲雖府衛具存而卒乘罕習卒臧没翻乘繩證翻故禄山竊倒持之柄乘外重之資一舉滔天兩京不守事見𤣥宗天寶十四載肅宗至徳元載尚賴西邊有兵諸牧有馬毎州有糧故肅宗得以中興中竹仲翻乾元之後繼有外虞悉師東討邊備既弛禁戎亦空吐蕃乘虛深入為冦故先皇帝莫與為禦避之東遊事見二百二十三卷代宗廣徳元年是皆失居重馭輕之權忘深根固柢之慮柢都禮翻又都計翻内冦則殽函失險外侵則汧渭為戎汧口肩翻于斯之時雖有四方之師寧救一朝之患陛下追想及此豈不為之寒心哉為于偽翻今朔方太原之衆逺在山東謂李懷光以朔方軍馬燧以太原軍討田悦兵不解也神䇿六軍之兵繼出闗外左右羽林左右龍武左右神䇿為六軍又曰左右羽林龍武神武為六軍神䇿軍最盛在六軍之右時李晟哥舒曜劉徳信等皆以禁兵出闗討賊儻有賊臣啗冦黠虜覷邊啗徒濫翻又徒覽翻覷七慮翻伺視也伺隙乘虛㣲犯亭障此愚臣所竊憂也伺相吏翻未審陛下其何以禦之側聞伐叛之初議者多易其事以其事為易也易弋豉翻僉謂有征無戰役不踰時計兵未甚多度費未甚廣度徒洛翻於事為無擾於人為不勞曾不料兵連禍拏變故難測日引月長漸乖始圖曾户增翻拏女加翻相牽引也圖謀也往嵗為天下所患咸謂除之則可致升平者李正已李寶臣梁崇義田悦是也往嵗為國家所信咸謂任之則可除禍亂者朱滔李希烈是也既而正巳死李納繼之寶臣死惟岳繼之崇義平希烈叛惟岳戮朱滔攜攜離也貳也然則往嵗之所患者四去其三矣去羗吕翻而患竟不衰往嵗之所信今則自叛矣而餘又難保是知立國之安危在勢任事之濟否在人勢茍安則異類同心也勢茍危則舟中敵國也陛下豈可不追鑒往事惟新令圖修偏廢之柄以靖人復倒持之權以固國漢人曰秦倒持太阿授楚其柄而乃孜孜汲汲極思勞神思相吏翻徇無已之求望難必之效乎今闗輔之間徴𤼵已甚宫苑之内備衛不全北軍皆屯苑中時悉在行營萬一將帥之中又如朱滔希烈或負固邊壘誘致豺狼將即亮翻帥所類翻誘羊久翻或竊發郊畿驚犯城闕此亦愚臣所竊為憂者也未審陛下復何以備之姚令言朱泚之變卒如陸贄所料復扶又翻又音如字陛下儻過聽愚計所遣神䇿六軍李晟等及節將子弟悉可追還晟成正翻節將子弟白志貞所奏遣東征者還從宣翻又音如字明敕涇隴邠寧但令嚴備封守邠卑旻翻令力丁翻仍云更不徵𤼵使知各保安居又降徳音罷京城及畿縣間架等雜税則冀已輸者弭怨見處者獲寧見賢遍翻處昌吕翻人心不揺邦本自固上不能用壬戌以汴西運使崔縱兼魏州四節度都糧料使汴東西運使事始見上卷上年河東節度使馬燧澤潞節度使李抱眞河陽節度使李芁朔方節度使李懷光四軍時並在魏州行營宋白曰建中用兵諸道行營出境者皆仰給度支謂之食出界糧又於諸軍各以臺省官一人司其供億謂之糧料使余按代宗廣徳初郭子儀自商州進收京師請第五琦為糧料使縱渙之子也崔渙者𤣥暐之孫𤣥宗幸蜀以為相九月丙戌神䇿將劉徳信宣武將唐漢臣與淮寧將李克誠戰敗于滬澗將即亮翻滬侯古翻唐考異曰徐岱奉天記曰大將漢臣劉徳信高秉哲合統兵一萬屯於汝州三帥各領本軍城小卒衆教令不一軍進至薛店更無它路又不設支軍賊謀知之乘霧而進三帥望敵大潰戈楯資實山積馬萬餘蹄皆没馬汝州遂陷攝刺史李元平為冦所獲賊邏兵北至彭婆今從實録時李勉遣漢臣將兵萬人救襄城上遣徳信帥諸將家應募者三千人助之將即亮翻又音如字帥讀曰率下同勉奏李希烈精兵皆在襄城許州空虛若襲許州則襄城圍自解去年希烈徙鎮許州盖欲乘虗擣其巢穴則希烈必釋襄城之圍以自救遣二將趣許州趣七喻翻未至數十里上遣中使責其違詔二將狼狽而返無復斥候克誠伏兵邀之殺傷大半漢臣奔大梁徳信奔汝州希烈遊兵剽掠至伊闕剽匹妙翻伊闕禹所鑿春秋為戎蠻子之國漢為新城縣隋為伊闕縣唐屬河南府勉復遣其將李堅帥四千人助守東都復扶又翻又音如字從考異曰新傳作李堅華今實録希烈以兵絶其後堅軍不得還還從宣翻又音如字汴軍由是不振襄城益危汴皮變翻汴軍宣武兵也此時則李勉帥永平軍方鎮表大厯十四年永平軍增領汴潁二州徙治汴州故使史有汴軍之稱上以諸軍討淮寧者不相統壹庚子以舒王謨為荆襄等道行營都元帥更名誼更工衡翻以户部尚書蕭復為長史右庶子孔巢父為左司馬諫議大夫樊澤為右司馬自餘將佐皆選中外之望將即亮翻未行㑹涇師作亂而止復嵩之孫也蕭嵩開元中為相巢父孔子三十七世孫也上𤼵涇原諸道兵救襄城冬十月丙午涇原節度使姚令言將兵五千至京師考異曰舊傳云令言率本鎮兵五萬赴援按奉天記曰哥舒曜表請加師上使涇州節度使姚令言赴援令言本領三千請加至五千今從之軍士冒雨寒甚多擕子弟而來冀得厚賜遺其家遺唯季翻既至一無所賜丁未𤼵至滻水詔京兆尹王翃犒師惟糲食菜餤衆怒蹴而覆之糲盧逹翻餤戈亷翻又徒甘翻蹴子六翻因揚言曰吾輩將死於敵而食且不飽安能以㣲命拒白刃邪聞瓊林大盈二庫𤣥宗時王鉷為户口邑役使徵剥財貨毎嵗進錢百億寶貨稱是入百寶大盈庫以供人主宴私賞賜之用則𤣥宗時已有大盈庫陸贄諫帝曰瓊林大盈自古悉無其制傳諸耆舊之説皆云創自開元聚歛之臣貪權飾巧求媚乃言郡國貢獻所合區分賦税當委於有司以給經用貢獻宜歸於天子以奉私求𤣥宗悦之新置是二庫蕩心侈欲萌禍於兹迨乎失邦終以餌冦則庫始於𤣥宗明矣宋白曰大盈庫内庫也以中人主之欲至徳中第五𤦺始悉以租賦進入大盈庫天子以出納為便故不復出金帛盈溢不如相與取之乃擐甲張旗鼓譟還趣京師趣七喻翻令言入辭尚在禁中聞之馳至長樂阪遇之長樂阪在滻水西本滻阪也隋文帝惡其名取其北對長樂改曰長樂阪亦曰長樂坡樂音洛軍士射令言令言抱馬鬛突入亂兵呼曰射而亦翻呼火故翻諸君失計東征立功何患不富貴乃為族滅之計乎軍士不聽以兵擁令言而西自長樂阪西入京城上遽命賜帛人二匹衆益怒射中使射而亦翻又命中使宣慰賊已至通化門外通化門京城東面北來第一門程大昌曰通化門北去丹鳯門止兩坊中使出門賊殺之又命出金帛二十車賜之賊已入城喧聲浩浩不復可遏復扶又翻百姓狼狽駭走賊大呼告之曰汝曹勿恐不奪汝商貨僦質矣不税汝間架陌錢矣呼火故翻僦即就翻上遣普王誼翰林學士姜公輔出慰諭之賊已陳於丹鳯門外陳讀曰陣小民聚觀者以萬計初神䇿軍使白志貞掌召募禁兵東征死亡者志貞皆隱不以聞但受市井富兒賂而補之名在軍籍受給賜而身居市廛為販鬻司農卿叚秀實上言禁兵不精其數全少卒有患難將何待之不聽少詩沼翻卒讀曰猝難乃旦翻至是上召禁兵以禦賊竟無一人至者賊已斬闗而入上乃與王貴妃韋淑妃太子諸王唐安公主自苑北門出王貴妃以傳國寶繫衣中以從從才用翻下同後宫諸王公主不及從者什七八初魚朝恩既誅宦官不復典兵事見二百二十四卷代宗大厯五年有竇文塲霍仙鳴者嘗事上於東宫至是帥宦官左右僅百人以從帥讀曰率使普王誼前驅太子執兵以殿殿丁練翻司農卿郭曙以部曲數十人獵苑中禁苑在京城之北東至㶚水西連故長安城南連京城北枕渭水聞蹕謁道左遂以其衆從曙曖之弟也曖曙皆郭子儀之子右龍武軍使令狐建方教射於軍中聞之帥麾下四百人從帥讀曰率下相帥同乃使建居後為殿姜公輔叩馬言曰朱泚嘗為涇帥見二百二十六卷元年帥所類翻坐弟滔之故廢處京師事見上卷上年處昌吕翻心嘗怏怏臣謂陛下既不能推心待之則不如殺之毋貽後患今亂兵若奉以為主則難制矣請召使從行上倉猝不暇用其言曰無及矣遂行夜至咸陽飯數七而過飯扶晩翻時事出非意羣臣皆不知乘輿所之之往也乘繩證翻盧把闗播踰中書垣而出白志貞王翃及御史大夫于頎中丞劉從一户部侍郎趙贊翰林學士陸贄吴通㣲等追及上於咸陽頎頔之從父兄弟頎渠希翻之從才用翻從一齊賢之從孫也劉齊賢祥道之子以方正為高宗所重賊入宫登含元殿大呼曰天子已出宜人自求富遂讙譟爭入府庫運金帛極力而止讙許元翻小民因之亦入宫盗庫物通夕不已其不能入者剽奪於路諸坊居民各相帥自守姚令言與亂兵謀曰今衆無主不能持久朱太尉閒居私第請相與奉之衆許諾乃遣數百騎迎泚於晉昌里第按長安圖自京城啟夏門北入東街第二坊曰進昌坊里考異曰舊泚傳作招國今從實録夜半泚按轡列炬傳呼入宫居含元殿設警嚴設鼓角以警嚴一曰設卒以警備嚴衛自稱權知六軍戊申旦泚徙居白華殿考李晟收復京城次第白華殿盖近光泰門内大明宫東北隅程大昌曰晟收長安亦自白華門入諸家不載何地以晟兵所届言之當在大明東苑之東出榜於外稱涇原將士久處邊陲處昌吕翻不閑朝禮閑習也朝直遥翻下同輙入宫闕致驚乘輿西出廵幸乘繩證翻太尉以權臨六軍應神䇿軍士及文武百官凢有禄食者悉詣行在不能徃者即詣本司若出三日檢勘彼此無名者皆斬於是百官出見泚或勸迎乘輿泚不悦百官稍稍遁去源休以使回紇還賞薄怨朝廷賞薄事見上卷上年使疏吏翻入見泚屏人宻語移時屏必郢翻又卑正翻為泚陳成敗引符命勸之僭逆為于偽翻泚喜然猶未决宿衛諸軍舉白幡降者列於闕前甚衆降户江翻泚夜於苑門出兵旦自通化門入駱驛不絶張弓露刃欲以威衆上思桑道茂之言道茂言見二百二十六卷元年自咸陽幸奉天縣僚聞車駕猝至欲逃匿山谷主薄蘇弁止之弁良嗣之兄孫也蘇良嗣武后初為相文武之臣稍稍繼至己酉左金吾大將軍渾瑊至奉天瑊素有威望衆心恃之稍安瑊古咸翻庚戌源休勸朱泚禁十城門唐都長安京城東面通化春明延興三門南面啓夏明徳安化三門西延秋金光開逺三門北光化一門凢十門毋得出朝士朝士往往易服為傭僕濳出休又為泚説誘文武之士使之附泚又為于偽翻説輸芮翻檢校司空同平章事李忠臣久失兵柄太僕卿張光晟自負其才皆鬱鬱不得志李忠臣失兵柄見二百二十五卷代宗大厯十四年張光晟事見二百二十六卷元年校古效翻晟成正翻泚悉起而用之工部侍郎蔣鎮出亡墜馬傷足為泚所得泚且禮翻又音此先是休以才能光晟以節義鎮以清素都官員外郎彭偃以文學太常卿敬釭以勇略先悉薦翻釭古紅翻又古䨇翻皆為時人所重至是皆為泚用鳯翔涇原將張廷芝叚誠諫將數千人救襄城原將即亮翻諫將音同又音如字未出潼闗聞朱泚據長安殺其大將隴右兵馬使戴蘭潰歸於泚泚先帥鳯翔涇原故二鎮之兵聞亂皆歸之潼音同使疏吏翻泚於是自謂衆心所歸謀反遂定以源休為京兆尹判度支度徒洛翻李忠臣為皇城使唐六典皇城在京城之中東西五里一百一十五歩南北三里一百四十歩南面三門中曰朱雀左曰安上右曰含光東面二門北曰延喜南曰景風西面二門北曰安福南曰順義其中右社稷左宗廟百僚廨署列乎其間唐自開元以前以城門郎掌皇城諸門開闔之節中世以後置皇城使百司供億六軍宿衛咸擬乘輿乘繩證翻辛亥以渾瑊為京畿渭北節度使行在都虞候白志貞為都知兵馬使令狐建為中軍鼓角使以神䇿都虞候侯仲莊為左衛將軍兼奉天防城使渾户昆翻又户本翻瑊古咸翻使疏吏翻令力丁翻朱泚以司農卿叚秀實久失兵柄叚秀實失兵柄見二百二十六卷元年意其必怏怏怏於兩翻遣數十騎召之秀實閉門拒之騎士踰垣入劫之以兵秀實自度不免騎竒寄翻垣于元翻度徒洛翻乃謂子弟曰國家有患吾於何避之當以死徇社稷汝曹宜人自求生乃往見泚泚喜曰叚公來吾事濟矣延坐問計秀實説之曰公本以忠義著聞天下謂泚能釋鎮入朝及與弟滔絶也説式芮翻今涇軍以犒賜不豐遽有披猖使乘輿播越夫犒賜不豐有司之過也犒口到翻乘繩證翻夫音扶天子安得知之公宜以此開諭將士示以禍福奉迎乘輿復歸宫闕此莫大之功也將即亮翻復扶又翻又音如字泚黙然不悦泚且禮翻又音此然以秀實與己皆為朝廷所廢遂推心委之左驍衛將軍劉海賔涇原都虞候何明禮孔目官岐靈岳皆秀實素所厚也朝直遥翻驍堅堯翻叚秀實鎮涇原時厚遇此三人唐藩鎮吏職使院有孔目官軍府事無細大皆經其手言一孔一目無不綜理也史炤曰岐姓也黄帝時有岐伯從考異曰舊傳云判官岐靈岳今叚公别傳秀實宻與之謀誅泚迎乘輿上初至奉天詔徵近道兵入援有上言朱泚為亂兵所立且來攻城宜早修守備上時掌翻盧把切齒言曰朱泚忠貞羣臣莫及奈何言其從亂傷大臣心臣請以百口保其不反上亦以為然又聞羣臣勸泚奉迎乃詔諸道援兵至者皆營於三十里外姜公輔諫曰今宿衛單寡防慮不可不深若泚竭忠奉迎何憚於兵多如其不然有備無患上乃悉召援兵入城盧把及白志貞言於上曰臣觀朱泚心迹必不至為逆願擇大臣入京城宣慰以察之上以問從臣皆畏憚莫敢行從才用翻金吾將軍吴溆獨請行上悦溆退而告人曰食其禄而違其難何以為臣吾幸託肺附溆敬章皇后弟也溆音徐吕翻難乃旦翻下同非不知往必死但舉朝無蹈難之臣使聖情慊慊耳慊慊嫌恨不足之意朝直遥翻慊苦簟翻遂奉詔詣泚泚反謀已决雖陽為受命館溆於客省館古玩翻尋殺之溆湊之兄也泚遣涇原兵馬使韓旻將鋭兵三千聲言迎大駕實襲奉天使疏吏翻將即亮翻又音如字時奉天守備單弱叚秀實謂岐靈岳曰事急矣使靈岳詐為姚令言符令旻且還當與大軍俱𤼵竊令言印未至秀實倒用司農印印符募善走者追之旻至駱驛駱驛地名史炤曰駱谷闗之驛也余按韓旻若至駱谷闗之驛則已過奉天而西南矣炤説非也但未知駱驛在何地得符而還還從宣翻又音如字秀實謂同謀曰旻來吾屬無類矣我當直摶泚殺之不克則死終不能為之臣也乃令劉海賔何明禮隂結軍中之士欲使應之於外令力丁翻旻兵至泚令言大驚岐靈岳獨承其罪而死不以及秀實等是日泚召李忠臣源休姚令言及秀實等議稱帝事秀實勃然起奪休象笏武徳初因隋舊制五品以上執象笏三品以下前挫後直五品已上後屈自時厥後一例上圓下方曾不分别前唾泚面大罵曰狂賊吾恨不斬汝萬叚豈從汝反邪唾吐卧翻邪音耶因以笏擊泚泚舉手扞之纔中其額濺血灑地泚與秀實相搏恟恟中竹仲翻恟許救翻恟恟喧擾之狀左右猝愕不知所為海賔不敢進乘亂而逸忠臣前助泚泚得匍匐脱走秀實知事不成謂泚黨曰我不同汝反何不殺我衆爭前殺之泚一手承血一手止其衆曰義士也勿殺秀實既死泚哭之甚哀以三品禮葬之唐制司農卿從三品海賔縗服而逃劉海賔不能助叚秀實與之同死逃將焉徃縗倉回翻後二日捕得殺之夜考異曰叚公别傳云五日泚使涇原將李忠臣高昻等統鋭兵五千以襲奉天六日賊泚又令兵馬使韓旻領馬歩二千以繼之奉天記曰秀實與海賔宻謀誅泚佯入請間計事而海賔置七首於靴欲以相應為閽者見覺秀實遽奪源休笏挺而擊之舊泚傳曰秀實與劉海賔謀朱泚且虞叛卒之震驚法駕乃潛為賊符追所發兵至六日兵及駱驛而回因與海賔同入見泚為陳逆順之理而海賔於靴中取七首為其所覺遂不得前秀實知不可以義動遽奪源休象笏挺而擊泚秀實傳曰與海賔約事急為繼而令明禮應於外及秀實擊泚而海賔等不至按李忠臣等若已將五千人襲奉天則秀實雖追還旻兵無益矣又海賔若於靴中取七首為賊所覺則登時死矣焉能復逃若為閽者所覺亦應時被擒事跡諠著賊為之備秀實亦不得發矣此數者皆恐難信今但取叚公行狀幸奉天録及舊傳可信者存之亦不引何明禮明禮從泚攻奉天復謀殺泚亦死史終言之復扶又翻上聞秀實死恨委用不至涕泗久之壬子以少府監李昌巙為京畿渭南節度使巙奴刀翻鳯翔節度使同平章事張鎰性儒緩好修飾邊幅好呼到翻不習軍事聞上在奉天欲迎大駕具服用貨財獻于行在後營將李楚琳為人剽悍將即亮翻剽匹妙翻軍中畏之嘗事朱泚為泚所厚行軍司馬齊映與同幕齊抗言於鎰曰不去楚琳必為亂首去羌吕翻鎰命楚琳出戍隴州九域志鳯翔府西至隴州一百五十里楚琳託事不時發鎰方以迎駕為憂謂楚琳已去矣楚琳夜與其黨作亂鎰縋城而走縋馳偽翻賊追及殺之判官王沼等皆死映自水竇出抗為傭保負荷而逃皆免荷下可翻又讀如字之考異曰舊映傳云鎰不從映言乃示寛大召楚琳語曰欲令公使於外楚琳恐是夜作亂殺鎰以應泚今從鎰傳始上以奉天迫隘欲幸鳯翔户部尚書蕭復聞之遽請見見賢遍翻曰陛下大誤鳯翔將卒皆朱泚故部曲其中必有與之同惡者臣尚憂張鎰不能久豈得以鑾輿蹈不測之淵乎上曰吾行計已决試為卿留一日為于偽翻明日聞鳯翔亂乃止齊映齊抗皆詣奉天以映為御史中丞抗為侍御史楚琳自為節度使降于朱泚隴州刺史郝通奔于楚琳郝呼各翻商州團練兵殺其刺史謝良輔朱泚自白華殿入宣政殿東内含元殿之北為宣正殿自稱大秦皇帝改元應天癸丑泚以姚令言為侍中闗内元帥李忠臣為司空兼侍中源休為中書侍郎同平章事判度支蔣鎮為吏部侍郎樊系為禮部侍郎彭偃為中書舍人自餘張光晟等各拜官有差立弟滔為皇太弟姚令言與源休共掌朝政朝直遥翻下同凢泚之謀畫遷除軍旅資糧皆禀於休休勸泚誅翦宗室在京城者以絶人望殺郡王王子王孫凢七十七人尋又以蔣鎮為門下侍郎李子平為諫議大夫並同平章事鎮憂懼毎懷刀欲自殺又欲亡竄然性怯竟不果源休勸泚誅朝士之竄匿者以脅其餘鎮力救之賴以全者甚衆樊系為泚譔册文既成仰藥而死樊系距朱泚之命不為譔册不過死耳譔册而死於義何居大理卿膠水蔣沇詣行在為賊所得沇絶食稱病濳竄得免沇以轉翻哥舒曜食盡弃襄城奔洛陽李希烈陷襄城右龍武將軍李觀將衛兵千餘人從上於奉天上委之召募數日得五千餘人列之通衢旗鼓嚴整城人為之增氣為于偽翻姚令言之東出也涇州在西故以救襄城為東出以兵馬使京兆馮河清為涇原留後判官河中姚况知涇州事河清况聞上幸奉天集將士大哭激以忠義𤼵甲兵器械百餘車通夕輸行在通夕而行自晩至旦也城中方苦無甲兵得之士氣大振詔以河清為四鎮北庭行營涇原節度使况為行軍司馬上至奉天數日右僕射同平章事崔寧始至上喜甚撫勞有加崔寧鎮西川有威名危難之中見其至可以鎮安人心故喜甚而撫勞加於他人勞力到翻寧退謂所親曰主上聰明英武從善如流但為盧把所惑以至於此因􅏰然出涕􅏰音刪又數板翻把聞之與王翃謀陷之翃言於上曰臣與寧俱出京城寧數下馬便液數所角翻便液溺也便毗連翻液羊益翻久之不至有顧望意㑹朱泚下詔以左丞柳渾同平章事寧為中書令渾襄陽人也時亡在山谷翃使盩厔尉康湛詐為寧遺朱泚書獻之遺唯季翻把因譖寧與朱泚結盟約為内應故獨後至乙卯上遣中使引寧就幕下云宣宻㫖二力士自後縊殺之中外皆稱其寃上聞之乃赦其家朱泚遣使遺朱滔書遺唯季翻稱三秦之地指日克平大河之北委卿除殄當與卿㑹于洛陽滔得書宣示軍府移牒諸道以自誇大上遣中使告難於魏縣行營魏縣行營馬燧諸軍之討田悦者難乃旦翻諸將相與慟哭李懷光帥衆赴長安為李懷光救奉天破朱泚張本帥讀曰率馬燧李芁各引兵歸鎮馬燧歸太原李芁歸河陽李抱眞退屯臨洺丁巳以户部尚書蕭復為吏部尚書吏部郎中劉從一為刑部侍郎翰林學士姜公輔為諫議大夫並同平章事朱泚自將逼奉天軍勢甚盛以姚令言為元帥泚且禮翻又音此將即亮翻帥所類翻考異曰奉天記十月十日賊泚自統衆攻奉天以姚令言為都統今從實録舊泚傳張光晟副之以李忠臣為京兆尹皇城留守仇敬忠為同華等州節度拓東王以扞闗東之師李日月為西道先鋒經略使晟成正翻守式又翻拓逹各翻扞户旰翻使疎吏翻華户化翻邠寧留後韓遊瓌慶州刺史論惟明監軍翟文秀受詔將兵三千拒泚於便橋與泚遇於醴泉遊瓌欲還趣奉天邠卑旻翻瓌古回翻監古銜翻翟萇伯翻將音同上又音如字還從宣翻又音如字趣七喻翻下同文秀曰我向奉天賊亦隨至是引賊以迫天子也不若留壁於此賊必不敢越我向奉天若不顧而過則與奉天夾攻之遊懷曰賊彊我弱若賊分軍以綴我直趣奉天奉天兵亦弱何夾攻之有我今急趣奉天所以衛天子也且吾士卒饑寒而賊多財彼以利誘吾卒吾不能禁也翟文秀欲留拒賊詔㫖也夾攻之説兵家常論也挾詔㫖而依兵家常論以制將帥未有不折而從之者也微韓遊瓌持之奉天殆矣誘羊久翻遂引兵入奉天泚亦隨至官軍出戰不利泚兵爭門欲入渾瑊與遊瓌血戰竟日門内有草車數乘渾户昆翻又户本翻瑊古咸翻乘繩證翻瑊使虞候高固帥甲士以長刀斫賊皆一當百帥讀曰率曳車塞門縱火焚之塞悉則翻衆軍乘火擊賊賊乃退㑹夜泚營於城東三里擊柝張火布滿原野使西明寺僧法堅造攻具毁佛寺以為梯衝西明寺在長安城中延康坊本隋楊素宅也梯雲梯衝衝車代宗飯僧以䕶國今朱泚乃用僧造攻具以攻奉天柝逹各翻韓遊瓌曰寺材皆乾薪乾音干但具火以待之固侃之𤣥孫也高侃事太宗高宗為將有功泚自是日來攻城瑊遊瓌等晝夜力戰幽州兵救襄城者聞泚反突入潼闗歸泚於奉天幽州兵即代宗時朱泚入朝詣京西防秋兵也普潤戍卒亦歸之普潤戍卒神䇿兵也有衆數萬上與陸贄語及亂故深自克責贄曰致今日之患皆羣臣之罪也上曰此亦天命非由人事䞇退上䟽以為陛下志壹區宇四征不庭杜預曰不庭謂不朝也下之事上皆成禮于庭中一説庭直也不庭不直也兇渠稽誅逆將繼亂兇渠謂田悦李納也逆將謂朱滔李希烈等也渠大也將即亮翻兵連禍結行及三年建中二年兵端始啟至是及三年徵師日滋賦歛日重歛力贍翻内自京邑外洎邊陲洎其既翻行者有鋒刃之憂居者有誅求之困是以叛亂繼起怨黷並興非常之虞億兆同慮唯陛下穆然凝邃獨不得聞至使兇卒鼓行白晝犯闕豈不以乘我間隙因人擕離哉間古莧翻陛下有股肱之臣有耳目之任有諫諍之列有備衛之司見危不能竭其誠臨難不能效其死難乃旦翻臣所謂致今日之患羣臣之罪者豈徒言歟聖㫖又以國家興衰皆有天命臣聞天所視聽皆因於人書曰天視自我民視天聽自我民聽故祖伊責紂之辭曰我生不有命在天武王數紂之罪曰乃曰吾有命罔懲其侮並見尚書數所類翻此又捨人事而推天命必不可之理也易曰視履考祥履卦上九爻辭王弼曰禍福之祥生於所履處履之極履道成矣故可以視履而考祥又曰吉凶者失得之象易大傳之辭此乃天命由人其義明矣然則聖哲之意六經㑹通皆謂禍福由人不言盛衰有命盖人事理而天命降亂者未之有也人事亂而天命降康者亦未之有也鄭𤣥曰降康者下平安之福自頃征討頗頻刑網稍宻物力耗竭人心驚疑如居風濤洶洶靡定上自朝列朝直遥翻下逹蒸黎日夕族黨聚謀咸憂必有變故旋屬涇原叛卒果如衆庶所虞屬之欲翻虞度也京師之人動逾億計固非悉知算術皆曉占書則明致冦之由未必盡闗天命臣聞理或生亂亂或資理理治也唐人避高宗諱皆以治為理有以無難而失守有以多難而興邦難乃旦翻今生亂失守之事則既往而不可復追矣復扶又翻其資理興邦之業在陛下克勵而謹脩之何憂乎亂人何畏於厄運勤勵不息足致升平豈止盪滌妖氛旋復宫闕而已田悦説王武俊使與馬寔共擊李抱眞於臨洺魏縣行營既散李抱眞退屯臨洺説式芮翻下林説因説復説同抱眞復遣賈林説武俊曰臨洺兵精而有備未易輕也復扶又翻易以豉翻今戰勝得地則利歸魏博不勝則恒冀大傷易定滄趙皆大夫之故地也時張孝忠據易定滄康日知據趙州不如先取之武俊乃辭悦與馬寔北歸壬戌悦送武俊於館陶九域志館陶在元城北四十五里執手泣别下至將士贈遺甚厚先是武俊召回紇兵使絶李懷光等糧道遺于季翻先悉薦翻懷光等已西去而回紇逹干將回紇千人雜虜二千人適至幽州北境朱滔因説之將即亮翻説式芮翻下同欲與俱詣河南取東都應接朱泚許以河南子女賂之滔娶回紇女為側室回紇謂之朱郎且利其俘掠許之賈林復説武俊曰復扶又翻自古國家有患未必不因之更興况主上九葉天子自高祖太宗高宗中宗睿宗𤣥宗肅宗代宗至帝凢九世聰明英武天下誰肯捨之共事朱泚乎滔自為盟主以來輕蔑同列河朔古無冀國冀乃大夫之封域也滔稱冀王盖奄禹跡冀州之域以自大而王武俊廵屬有冀州故林以是間之今滔稱冀王又西倚其兄泚者滔兄北引回紇其志欲盡吞河朔而王之大夫雖欲為之臣不可得矣田悦之間王武俊朱滔與賈林之説王武俊者同一利害耳人惟趨利而避害故説行非有它巧也且大夫雄勇善戰非滔之比又本以忠義手誅叛臣謂殺李惟岳也當時宰相處置失宜處昌吕翻為滔所誑誘故蹉跌至此蹉倉何翻跌徒結翻不若與昭義併力取滔其勢必獲滔既亡則泚自破矣此不世之功轉禍為福之道也今諸道輻湊攻泚不日當平天下已定大夫乃悔過而歸國則已晩矣時武俊已與滔有隙因攘袂作色曰二百年天子吾不能臣豈能臣此田舍兒乎遂與抱眞及馬燧相結約為兄弟然猶外事滔禮甚謹與田悦各遣使見滔於河間瀛州治河間縣賀朱泚稱尊號且請馬寔之兵共攻康日知於趙州汝鄭應援使劉徳信將子弟軍在汝州是年四月募諸嘗為節度觀察都團練使子弟帥奴馬從軍使劉徳信將之以救襄城聞難引兵入援難乃旦翻與泚衆戰於見子陵破之新書本紀作思子陵水經注閺鄉縣西皇天原上有漢武帝思子臺又漢薄太后陵在覇陵之南近文帝陵故薄太后曰南望吾子北望吾夫故俗呼為見子陵也以東渭橋有轉輸積粟癸亥進屯東渭橋程大昌曰東渭橋在萬年縣北五十里㶚水合渭之地朱泚夜攻奉天東西南三面甲子渾瑊力戰却之左龍武大將軍李希倩戰死乙丑泚復攻城復扶又翻將軍高重㨗與泚將李日月戰於梁山之隅破之梁山在奉天城北五里乾陵在焉重直龍翻乘勝逐北身先士卒先悉薦翻賊伏兵擒之其麾下十餘人奮不顧死追奪之賊不能拒乃斬其首弃其身而去麾下收之入城上親撫而哭之盡哀結蒲為首而𦵏之贈司空朱泚見其首亦哭之曰忠臣也束蒲為身而𦵏之李日月泚之驍將也戰死於奉天城下泚歸其尸於長安厚𦵏之其母竟不哭罵曰奚奴國家何負於汝而反死已晩矣及泚敗賊黨皆族誅獨日月之母不坐己巳加渾瑊京畿渭南北金商節度使壬申王武俊與馬寔至趙州城下初朱泚鎮鳯翔遣其將牛雲光將幽州兵五百人戍隴州宋白曰後魏分涇岐之地置東秦州大統十七年改為隴州因隴山為名以隴右營田判官韋臯領隴右留後翔考異曰奉天記作鳯節度判官今從實録及郝通奔鳯翔李楚琳作亂郝通隴州奔歸之牛雲光詐疾欲俟臯至伏兵執之以應泚事泄帥其衆奔泚至汧陽汧陽縣屬隴州九域志在州東六十里帥讀曰率汧口肩翻遇泚遣中使蘇玉齎詔書加臯中丞玉説雲光曰説式芮翻韋臯書生也君不如與我俱之隴州臯幸而受命乃吾人也不受命君以兵誅之如取孤㹠耳㹠與豚同豕子也雲光從之臯從城上問雲光曰曏者不告而行今而復來何也復扶又翻下同雲光曰曏者未知公心今公有新命謂朱泚加臯中丞之命也故復來願託腹心臯乃先納蘇玉受其詔書謂雲光曰大使茍無異心請悉納甲兵使城下無疑衆乃可入雲光以臯書生易之易以豉翻輕易乃悉以甲兵輸之而入明日臯宴玉雲光及其卒於郡舍伏甲誅之築壇盟將士曰李楚琳賊虐本使本使謂張鎰也李楚琳鎰之部曲將而殺鎰從逆故云然既不事上安能恤下隴州鳯翔廵屬也言李楚琳見虐殺其帥安能恤隴州將士乎宜相與討之遣兄平弇詣奉天請命于行在所復遣使求援於吐蕃恐朱泚遣兵攻之引吐蕃以為援資治通鑑卷二百二十八
