body:
  text: 資治通鑑卷三十四宋司馬光撰胡三省音註漢紀二十六起柔兆執徐盡著雍敦牂凡三年孝哀皇帝中建平二年春正月有星孛于牽牛晋天文志牽牛六星天之闗梁主犧牲事孛蒲内翻丁傅宗族驕奢皆嫉傅喜之恭儉又傅太后欲求稱尊號與成帝母齊尊喜與孔光師丹共執以為不可上重違大臣正議師古曰重難也又内迫傅太后依違者連嵗如淳曰依違不决事之言也余謂上二語即依違之意傅太后大怒上不得已先免師丹以感動喜師丹免見上卷上年喜終不順朱博與孔鄉矦傅晏連結共謀成尊號事數燕見數所角翻見賢遍翻奏封事毀短喜及孔光毀短者譛毀而言其短也丁丑上遂䇿免喜以矦就第御史大夫官既罷成帝綏和元年罷御史大夫置大司空事見三十二卷議者多以為古今異制漢自天子之號下至佐史皆不同扵古漢官至斗食佐史而止言漢承秦號為皇帝下至百官稱號皆不與古同而獨改三公職事難分明無益扵治亂治直吏翻扵是朱博奏言故事選郡國守相髙第為中二千石守式又翻相息亮翻選中二千石為御史大夫任職者為丞相言御史大夫能任其職則進而為相位次有序所以尊聖徳重國相也今中二千石未更御史大夫而為丞相師古曰更經也音工衡反權輕非所以重國政也臣愚以為大司空官可罷復置御史大夫遵奉舊制臣願盡力以御史大夫為百僚率上從之夏四月戊午更拜博為御史大夫又以丁太后兄陽安侯明為大司馬衛将軍置官属大司馬冠號如故事復綏和以前之制也冠古玩翻傅太后又自詔丞相御史大夫曰高武侯喜附下罔上與故大司空丹同心背畔放命圯族應劭曰謂放棄教令圯其族類背蒲妹反圯皮美反不宜奉朝請朝直遥反請才性反又如字其遣就國丞相孔光自先帝時議繼嗣有持異之隙又重忤傅太后指持異事見三十二卷成帝綏和元年重忤傅太后指謂不使居北宮奏傅遷持稱尊號之議也師古曰重音直用翻忤五故翻由是傅氏在位者與朱博為表裏共毁譛光表外也裏内也傅氏譛之于内朱博毁之扵外也乙亥䇿免光為庶人師古曰漢舊儀云丞相有他過使者奉䇿書即時歩出府乗棧車歸田里以御史大夫朱博為丞相封陽鄉侯恩澤侯表陽鄉侯國于山陽湖陵四考異曰公卿表四月乙未孔光免朱博為丞相又曰月戊午博為御史大夫乙亥遷五行志五月乙亥朔博為丞相荀紀乙亥孔光免按長厯是月丁巳朔無乙未十九日乙亥非朔也表志皆有誤少府趙𤣥為御史大夫成帝綏和元年趙𤣥自太子太傅左遷今復進用皆丁傅之意也臨延登受䇿師古曰延入而登殿也漢書儀云丞相御史大夫初拜皇帝延登親詔也有大聲如鐘鳴殿中郎吏陛者皆聞焉師古曰陛者謂執兵列扵陛側上以問黄門侍郎蜀郡揚雄續漢志給事黄門侍郎六百石掌侍従左右給事中關通中外及諸王朝見扵殿上引王就坐揚雄解嘲所謂官不過侍郎擢纔給事黄門者也揚雄自謂其先出自有周伯僑者食采扵晋之揚因氏焉不知伯僑周何别也及李㝷尋對曰此洪範所謂鼓妖者也師灋以為人君不聰為衆所惑空名得進則有聲無形不知所從生洪範五行傳曰聴之不聰是謂不謀時則有鼓妖君嚴猛而閉下臣戰栗而塞耳則妄聞之氣發於音聲故有鼓妖妖扵驕翻其傳曰嵗月日之中則正卿受之今以四月日加辰巳有異是為中焉以一嵗三分之則四月巳為嵗之中以一日三分之則辰巳巳為日之中正卿謂執政大臣也宜退丞相御史以應天變然雖不退不出期年其人自䝉其咎師古曰期年十二月也䝉猶被也期音基揚雄亦以為鼓妖聴失之象也朱博為人彊毅多權謀宜将不宜相将即亮翻相息亮翻恐有㓙惡亟疾之怒師古曰亟急也音居力翻上不聴朱博既為丞相上遂用其議下詔曰定陶共皇之號不宜復稱定陶復扶又翻尊共皇太后曰帝太太后稱永信宮共皇后曰帝太后稱中安宮為共皇立寝廟扵京師為于偽翻比宣帝父悼皇考制度宣帝既立八年有司言禮父為士子為天子祭以天子悼園宜稱皇考立廟因園為寝以時薦享焉然悼園在廣明之鄉長安東郭之外也定陶其王葬定陶而立廟京師則非因園為寝矣扵是四太后各置少府太僕秩皆中二千石傅太后丁太后趙太后與太皇太后為四太后傅太后既尊後尤驕與太皇太后語至謂之嫗嫗威遇翻時丁傅以一二年間暴興尤盛為公卿列侯者甚衆然帝不甚假以權埶不如王氏在成帝世也丞相博御史大夫𤣥奏言前高昌侯宏首建尊號之議而為關内侯師丹所劾奏免為庻人事見上卷綏和二年劾户槩翻時天子衰麤委政扵丹師古曰言新有成帝之䘮斬衰麤服故天子不親政事也衰音倉回翻丹不深惟褒廣尊號之義惟思也而妄稱説抑貶尊號虧損孝道不忠莫大焉陛下仁聖昭然定尊號宏以忠孝復封髙昌侯丹惡逆暴著雖蒙赦令不宜有爵邑請免為庶人奏可又奏新都侯莽前為大司馬不廣尊尊之義抑貶尊號虧損孝道事亦見上卷綏和二年當伏顯戮幸䝉赦令不宜有爵土請免為庶人上曰以莽與皇太后有属勿免遣就國及平阿侯仁臧匿趙昭儀親屬皆遣就國仁譚之子也臧古藏字通天下多寃王氏者為下元壽二年王莽復柄國張本諫大夫楊宣上封事言孝成皇帝深惟宗廟之重稱述陛下至徳以承天序天序謂帝王正統相𫝊之次天所命也上時掌翻聖䇿深逺㤙徳至厚惟念先帝之意豈不欲以陛下自代奉承東宮哉師古曰言供飬太后太皇太后春秋七十數更憂傷謂先罹元帝之䘮而後又哭成帝也數所角翻更工衡翻敕令親屬引領以避丁傅師古曰引領自引首領而退也行道之人為之隕涕為于偽翻况扵陛下登高逺望獨不慙扵延陵乎言王氏斥逐而丁傅貴寵若登高而望成帝陵寝寧不有慙扵付託乎帝深感其言復封成都侯商中子邑為成都侯綏和二年商子况以罪奪侯今以邑紹封中讀曰仲朱博又奏言漢家故事置部刺史秩卑而賞厚漢刺史秩六百石耳居部九嵗舉為守相秩二千石其有異材功效著者輙登擢咸勸功樂進師古曰勸功自勸勉而立功也樂音洛前罷刺史更置州牧事見三十二卷成帝綏和元年更工衡翻秩眞二千石位次九卿九卿缺以高第補其中材則茍自守而已恐功效陵夷師古曰陵夷謂漸廢替姦軌不禁臣請罷州牧置刺史如故上從之六月庚申帝太后丁氏崩詔歸葬定陶共皇之園從夫也共皇葬扵其國賢曰在今曹州濟隂縣北共讀曰恭發陳留濟隂近郡國五萬人穿復土近郡國謂郡國之近定陶者讀書音義曰穿復土謂穿壙填塞事也言下棺訖復以土為墳故曰復上近其靳翻初成帝時齊人甘忠可詐造天官厯包元太平經十二卷言漢家逢天地之大終當更受命扵天以教渤海夏賀良等夏户雅翻中壘校尉劉向奏忠可假鬼神罔上惑衆忠可詐稱天帝使眞人赤精子下教我故向奏之下獄治服服其挟詐也下遐稼翻未㫁病死㫁丁亂翻賀良等復私以相教復扶又翻下同上即位司𨽻校尉觧光騎都尉李尋白賀良等皆待詔黄門應劭曰諸以材技徴召未有正官故曰待詔董巴曰黄門禁門黄闥數召見數所角翻見賢遍翻陳説漢厯中衰當更受命成帝不應天命故絶嗣今陛下久疾變異屢數師古曰數音所角翻天所以譴告人也宜急改元易號乃得延年益夀皇子生災異息矣得道不得行師古曰言知道而不能行咎殃且無不有洪水将出災火且起滌盪民人上久寝疾班固曰上即位痿痺末年寖劇兾其有益遂従賀良等議詔大赦天下以建平二年為太初元年號曰陳聖劉太平皇帝李斐曰陳道也言得神道聖者劉也如淳曰陳舜後王莽陳之後謬語陳當立而不知韋昭曰敷陳聖劉之徳也師古曰如韋二説是也余謂韋説不詭扵正如説則流于巫顔以為二説皆是将安從乎漏刻以百二十為度師古曰舊漏晝夜共百刻今増其二十秋七月以渭城西北原上永陵亭部為初陵勿徙郡國民上既改號月餘寝疾自若夏賀良等復欲妄變政事大臣爭以為不可許賀良等奏言大臣皆不知天命宜退丞相御史以解光李尋輔政上以其言無驗八月詔曰待詔賀良等建言改元易號増益漏刻可以永安國家朕信道不篤過聴其言師古曰過誤也兾為百姓䕶福卒無嘉應為于偽翻卒子恤翻夫過而不改是謂過矣論語載孔子之言六月甲子詔書非赦令皆蠲除之如淳曰悔前赦令不䝉其福故赦令還之臣瓉曰改元易號大赦天下以求延祚而不䝉福哀帝悔之故更下制書諸非赦事皆除之謂改制易號今皆復故也師古曰如説非也瓉説是矣唯赦令不改餘皆除之賀良等反道惑衆奸態當窮竟皆下獄伏誅下遐稼翻尋及解光減死一等徙燉煌郡此漢法所謂减死徙邉也减死者罪至死而特為末減也减死罪一等為城旦舂上以寝疾盡復前世所嘗興諸神祠凡七百餘所成帝建始初匡衡張譚奏罷諸神祠不應禮者今盡復之一嵗三萬七千祠云神祠既多而有嵗五祠者有嵗四祠者故其數若是之多傅太后怨傅喜不已使孔鄉侯風丞相朱博令奏免喜侯師古曰風讀曰諷博與御史大夫趙𤣥議之𤣥言事已前决謂前已决遣就國罪無重科也得無不宜師古曰得無猶言無乃也博曰已許孔鄉侯矣匹夫相要尚相得死要一遥翻得死謂得其死力一曰得其相為死也何况至尊至尊謂傅太后博唯有死耳大臣以道事君而博以死奉私屬貪權藉勢之心為之也𤣥即許可博惡獨斥奏喜惡烏故翻以故大司空汜鄉侯何武前亦坐過免就國事見上卷綏和二年事與喜相似即并奏喜武前在位皆無益扵治治直吏翻雖已退免爵土之封非所當也皆請免為庶人上知傅太后素嘗怨喜疑博𤣥承指即召𤣥詣尚書問状𤣥辭服丞相御史同奏而獨召問𤣥者以博强毅多權詐難遽得其情而𤣥易以窮詰也有詔左将軍彭宣與中朝者雜問宣等奏劾博𤣥晏皆不道不敬劾户槩切請召詣廷尉詔獄上减𤣥死罪三等削晏户四分之一减死罪三等為𨽻臣妾晏封五千户削其千二百五十假謁者節召丞相詣廷尉博自殺國除九月以光禄勲平當為御史大夫冬十月甲寅遷為丞相以冬月故且賜爵關内侯如淳曰漢儀注御史大夫為丞相更春乃封故先賜爵關内侯也李竒曰以冬月非封侯時故且先賜爵關内侯也師古曰李説是也以京兆尹平陵王喜為御史大夫按表傳喜當作嘉詳見下年及審是上欲令丁傅處爪牙官處昌吕翻是嵗䇿免左将軍淮陽彭宣以關内侯歸家而以光禄勲丁望代為左将軍上䇿宣曰前有司數奏言諸侯國人不得宿衛将軍不宜典兵馬處大位朕惟将軍任漢将之重而子又前娶淮陽王女婚姻不絶非國之制其上左将軍印綬余按彭宣以連姻藩國而免官丁傅以戚黨而見用卒之奪劉氏者非藩國乃外戚也丁傅於國有大故之時拱手授柄于王氏而彭宣乃能辭三公位於王莽専權之初任官惟賢材烏得拘小嫌乎烏孫畀爰疐侵盜匈奴西界單于遣兵擊之殺數百人畧千餘人敺牛畜去卑爰疐恐遣子趨逯為質匈奴疐竹二翻師古曰敺與驅同逯音録質音致下同單于受以状聞漢遣使者責讓單于告令還歸卑爰疐質子責以匈奴烏孫並為漢臣單于不當擅受卑爰疐質子單于受詔遣歸三年春正月立廣徳夷王弟廣漢為廣平王廣徳夷王雲客成帝鴻嘉二年封又二年薨無後今立廣漢以奉中山靖王嗣謚法安心好静曰夷克殺秉政曰夷帝太太后所居桂宮正殿火殿考異曰五行志云桂宮鴻寜災荀紀云桂宮正殿火今從哀紀上使使者召丞相平當欲封之當病篤不應不應召也室家或謂當不可强起受侯印為子孫邪室家當之妻子也謂受侯印而死得以封爵遺子孫也强其兩翻為于偽翻下仝當曰吾居大位已負素餐責矣起受侯印還卧而死死有餘罪今不起者所以為子孫也遂上書乞骸骨上不許三月己酉當薨有星孛于河鼓天文志河鼓在牽牛北大星上将左右星左右将孛蒲内翻夏四月丁酉王嘉為丞相河南太守王崇為御史大夫守式又翻崇京兆尹駿之子也嘉以時政苛急郡國守相數有變動數所角翻乃上疏曰臣聞聖王之功在於得人孔子曰才難不其然與師古曰論語載孔子之言也才難言有賢材者難得也與讀曰歟余謂才難二語古語也孔子引之謂其言之是也故繼世立諸侯象賢也禮記郊特牲之文師古曰象其先父祖之賢耳非必皆賢也雖不能盡賢天子為擇臣立命卿以輔之記王制大國三卿皆命於天子次國三卿二卿命扵天子一卿命扵其君小國二卿皆命扵其君春秋之時如晋之六卿以中軍帥為正卿亦其君先命之而後聞于天子耳齊之高國魯之三桓皆世卿也漢之王國傅相中尉命扵天子猶古之命卿也居是國也累世尊重然後士民之衆附焉是以教化行而治功立治直吏翻今之郡守重扵古諸侯周初班爵五等公侯地方百里伯七十里子男五十里其後齊晋秦楚以兼并而地始廣大耳漢郡守方制千里連城以十數是重于古諸侯也守式又翻下同往者致選賢材致極也賢材難得拔擢可用者或起於囚徒昔魏尚坐事繫文帝感馮唐之言遣使持節赦其罪拜為雲中太守匈奴忌之事見十四卷文帝十四年武帝擢韓安國扵徒中拜為梁内史骨肉以安按韓安國𫝊安國坐法抵罪㑹梁内史缺漢使使者拜安國為梁内史起徒中為二千石此景帝時事也武帝當作景帝師古曰骨肉以安言梁孝王免罪也張敞為京兆尹有罪當免黠吏知而犯敞黠下八翻敞收殺之其家自寃自言其寃也使者覆獄劾敞賊殺人上逮捕不下上奏請逮捕敞而天子不下其奏也上時掌翻下遐嫁翻㑹免亡命十數日宣帝徴敞拜為兾州刺史卒獲其用事見二十七卷宣帝甘露元年卒子恤翻前世非私此三人貪其材噐有益扵公家也孝文時吏居官者或長子孫長知兩翻下同倉氏庫氏則倉庫吏之後也其二千石長吏亦安官樂職樂音洛然後上下相望莫有茍且之意其後稍稍變易公卿以下𫝊相促急又數改更政事傳知戀翻數所角翻更工衡翻司𨽻部刺史舉劾苛細發揚隂私司𨽻部三輔三河𢎞農其餘部刺史分部諸郡國劾户槩翻吏或居官數月而退送故迎新交錯道路中材茍容求全師古曰不敢操持群下也下材懐危内顧師古曰常恐獲罪每為私計也壹切營私者多二千石益輕賤吏民慢易之或持其微過増加成罪言扵司𨽻刺史或上書告之衆庶知其易危師古曰言易可傾危易以鼓翻小失意則有離畔之心前山陽亡徒蘓令等縦横事見三十一卷成帝永始三年師古曰横音胡孟翻吏士臨難難乃旦翻莫肯伏節死義以守相威權素奪也師古曰守郡守也相諸侯相也素奪謂不先假之威權也孝成皇帝悔之下詔書二千石不為故縦孟康曰不以故縦為罪所以優之也遣使者賜金尉厚其意誠以為國家有急取辦于二千石二千石尊重難危乃能使下孝宣皇帝愛其善治民之吏有章劾事留中㑹赦壹解師古曰不即下治其事恐為擾重故毎留中或經赦令壹切皆解散也余謂善治民之吏宣帝愛其材或有章劾留中不下㑹赦則其事得釋治直之翻劾户槩翻故事尚書希下章為煩擾百姓證驗繫治或死獄中章文必有敢告之字乃下師古曰所以丁寜告者之辭絶其相誣也余謂此乃防其誣告耳下遐稼翻為于偽翻唯陛下留神扵擇賢記善忘過容忍臣子勿責以備師古曰不求備扵一人也余謂責備者求全也二千石部刺史三輔縣令有材任職者人情不能不有過差宜可濶略師古曰當寛恕其小罪也令盡力者有所勸此方今急務國家之利也前蘓令發欲遣大夫使逐問状使之逐盜而問其状也時見大夫無可使者師古曰謂見在大夫皆不堪為使見賢遍翻召盩厔令尹逢拜為諌大夫遣之盩厔音舟窒今諸大夫有材能者甚少宜豫畜飬可成就者則士赴難不愛其死臨事倉卒乃求非所以明朝廷也人材當聚扵朝廷事㑹之来無可用者倉猝求之適所以明朝廷之無人耳少詩沼翻畜許六翻難乃旦翻卒讀曰猝嘉因薦儒者公孫光滿昌風俗通荆蠻有暪氏音舛變為滿國語路潞泉余滿皆赤狄隗姓及能吏蕭咸薛修皆故二千石有名稱者天子納而用之按嘉此疏誠中當時之病然為相者在扵朝夕納誨隨事矯正天下不能窺其際而自臻於治平不在著見於奏疏以騰口説也自宣帝之後為相者始加詳扵奏疏而考其治迹愈不逮前相業固不在乎此也稱曲證翻六月立魯頃王子部鄉侯閔為王魯共王曽孫頃王封𫝊國扵其子文王睃睃薨無後今立閔紹封部鄉據紀表及𫝊當作郚鄉師古曰郚音吾又音魚睃音子縁翻地理志東海郡有郚鄉侯國上以寝疾未定定猶安也冬十一月壬子令太皇太后下詔復甘泉秦畤汾隂后土祠罷南北郊成帝崩皇太后詔罷甘泉汾隂祠復南北郊畤音止上亦不能親至甘泉河東遣有司行事而禮祠焉無鹽危山土自起覆草如馳道状無鹽縣屬東平國危山山名言土自起覆草成路如人力開掘作馳道状也又瓠山石轉立晋灼曰漢書作報山山脅石一枚轉側起立高九尺六寸旁行一丈廣四尺也師古曰報山山名也古作瓠字為其形似瓠耳晋説是也東平王雲及后謁自之石所祭治石象瓠山立石束倍草并祠之雲元帝子東平王宇之子也謁后名也蘇林曰於宫中作山象師古曰倍草黄倍草也倍音歩賄翻原父曰立石屬上句治直之翻河内息夫躬息夫複姓姓譜媯姓之國為息氏公子邉受爵為大夫又有息夫氏出焉長安孫寵相與謀共告之曰此取封侯之計也乃與中郎右師譚張晏曰右師姓譚名余謂右師以官為氏共因中常侍宋𢎞上變事告焉上時掌翻是時上被疾多所惡事下有司逮王后謁下獄驗治服祠祭詛祝上為雲求為天子被皮義翻下遐稼翻詛荘助翻祝職救翻為雲于偽翻以為石立宣帝起之表也事見二十三卷昭帝元鳳三年有司請誅王有詔廢徙房陵雲自殺謁及舅伍宏及成帝舅安成共侯夫人放皆棄市安成共侯王崇時已死矣故稱帝舅及諡以别下御史大夫王崇也伍宏以醫伎得幸出入禁門盖放薦之故并得禍共音恭事連御史大夫王崇左遷大司農擢寵為南陽太守譚潁川都尉𢎞躬皆光禄大夫左曹給事中四年春正月大旱關東民無故驚走持槀或掫一枚如淳曰掫麻幹也師古曰藁禾稈也音工老翻掫音鄒又音側九翻轉相付與曰行西王母籌師古曰西王母元后夀考之象行籌又言執國家籌䇿行於天下道中相過逢多至千數或被髮徒跣或夜入關或踰牆入或乗車騎犇馳以置驛𫝊行被皮義翻折而設翻傳知戀翻經郡國二十六至京師不可禁止民又聚㑹里巷阡陌設博具師古曰博戲之具歌舞祠西王母至秋乃止五行志曰此異乃王太后莽之應也上欲封傅太后従父弟侍中光禄大夫商従才用翻尚書僕射平陵鄭崇諫曰孝成皇帝封親舅五侯天為赤黄晝昏日中有黒氣事見三十卷成帝建始元年為于偽翻孔鄉侯皇后父髙武侯以三公封尚有因縁孔鄉侯傅晏髙武侯傅喜言皇后父及三公封侯尚有漢家舊比可因縁也今無故復欲封商壞亂制度復扶又翻壞音怪逆天人之心非傅氏之福也臣願以身命當國咎崇因持詔書案起李竒曰持當受詔書案起也師古曰李説非也案者即寫詔之文余按更始時常侍奏事韓夫人起抵破書案則案非文案之案也李説是傅太后大怒曰何有為天子乃反為一臣所顓制邪二月癸夘上遂下詔封商為汝昌侯恩澤侯表汝昌侯國於東郡須昌之陽穀孫考異曰哀紀及恩澤侯表皆云商以今年二月封而寳傳云制詔丞相大司空按建平二年已罷大司空闕疑傳誤官駙馬都尉侍中雲陽董賢得幸於上出則參乗入御左右乗繩證翻御侍也賞賜累鉅萬貴震朝廷常與上卧起甞晝寝偏藉上袖師古曰藉謂身卧其上也上欲起賢未覺師古曰覺寐之寤也覺音工劾翻不欲動賢乃斷袖而起斷丁管翻又詔賢妻得通引籍殿中止賢廬師古曰廬謂殿中所止宿處又召賢女弟以為昭儀位次皇后昭儀及賢與妻旦夕上下並侍左右上時掌翻以賢父恭為少府賜爵關内侯詔将作大匠為賢起大第北闕下重殿洞門師古曰重殿謂有前後殿洞門謂闕門相當也皆僣天子之制度者也為于偽翻重直龍翻土木之功窮極技巧技渠綺翻賜武庫禁兵上方珍寳禁中謂之上方其選物上弟盡在董氏選物物之選其尤者上第於衆物之中等第居上也弟與第同而乗輿所服乃其副也乗繩證翻及至東園秘器珠襦玉匣師古曰東園署名屬少府漢舊儀云東園秘器作棺梓素木長三丈崇廣四尺珠襦以珠為襦如鎧状連縫之以黄金為縷腰以下玉為柙長尺廣三寸半為甲至足亦縫以黄金縷豫以賜賢無不備具又令将作為賢起冢塋義陵旁義陵帝夀陵也塋余傾翻墓域内為便房剛柏題凑服䖍曰便房藏中便坐也蘇林曰以柏木黄心致累棺外曰黄腸木頭皆内向故曰題凑師古曰便房小曲室也外為徼道周垣數里徼道徼循之道師古曰徼謂遮繞也音工釣翻垣牆也門闕罘罳甚盛罘音浮愚音思鄭崇以賢貴寵過度諫上由是重得罪師古曰重音直用翻數以職事見責數所角翻發疾頸癰欲乞骸骨不敢尚書令趙昌佞讇讇古諂字素害崇知見疏因奏崇與宗族通疑有姦請治治直之翻下同上責崇曰君門如市人師古曰言請求者多交通賔客何以欲禁切主上崇對曰臣門如市臣心如水師古曰言至清也願得考覆上怒下崇獄下遐稼翻司𨽻孫寳上書曰成帝元延四年省司𨽻校尉綏和二年上復置但曰司𨽻冠進賢冠屬大司空按尚書令昌奏僕射崇獄覆榜掠将死卒無一辭師古曰榜掠謂笞擊而考問之也榜音彭掠音亮卒音子恤翻道路稱寃疑昌與崇内有纎介師古曰言有細故宿嫌也浸潤相陷自禁門樞機近臣䝉受寃譛虧損國家為謗不小臣請治昌以解衆心書奏上下詔曰司𨽻寳附下罔上以春月作詆欺遂其姦心盖國之賊也免寳為庶人崇竟死獄中三月諸吏散騎光禄勲賈延為御史大夫延為光禄勲而加諸吏散騎也百官表諸吏得舉法散騎騎旁乗輿車師古曰騎而散従無常職也散悉亶翻上欲侯董賢而未有縁侍中傅嘉勸上定息夫躬孫寵告東平本章去宋𢎞更言因董賢以聞更定告章刋去宋𢎞名而入董賢名師古曰定謂改治其章也去羌吕翻更工衡翻欲以其功侯之皆先賜爵關内侯頃之上欲封賢等而心憚王嘉乃先使孔鄉侯晏持詔書示丞相御史於是嘉與御史大夫賈延上封事言竊見董賢等三人始賜爵衆庶匈匈咸曰賢貴其餘并䝉恩師古曰言董賢以貴寵故妄得封而躬寵等遂䝉恩至今流言未解陛下仁恩於賢等不已宜暴賢等本奏語言師古曰暴謂章露也延問公卿大夫博士議郎考合古今明正其義然後乃加爵土不然恐大失衆心海内引領而議引領猶言引頸也項背曰領暴評其事必有言當封者在陛下所従天下雖不説師古曰説讀曰悦咎有所分不獨在陛下前定陵侯淳于長初封其事亦議事見三十一卷成帝永始二年大司農谷永以長當封衆人歸咎於永先帝不獨䝉其譏臣嘉臣延材駑不稱稱尺證翻死有餘責知順指不迕師古曰迕逆也音五故翻可得容身須㬰所以不敢者思報厚恩也上不得已且為之止為于偽翻下同夏六月尊帝太太后為皇太太后傅太后也秋八月辛夘上下詔切責公卿曰昔楚有子玉得臣晉文公為之側席而坐晉文公與楚戰勝于城濮文公猶有憂色曰得臣猶在憂未歇也記曰有憂者側席而坐近事汲黯折淮南之謀事見十九卷武帝元狩元年今東平王雲等至有圗弑天子逆亂之謀者是公卿股肱莫能悉心務聰明以銷厭未萌故也師古曰悉盡也務聰明者廣視聴也厭音一渉翻賴宗廟之靈侍中駙馬都尉賢等發覺以聞咸伏厥辜書不云乎用徳章厥善師古曰尚書盤庚之辭也其封賢為髙安侯恩澤侯表髙安侯國於朱扶而朱扶之地無所考南陽太守寵為方陽侯恩澤侯表方陽侯國於沛郡龍亢左曹光禄大夫躬為宜陵侯恩澤侯表宜陵侯國於南陽村衍賜右師譚爵關内侯又封傅太后同母弟鄭惲子業為陽信侯恩澤侯表陽信侯國於南陽新野惲於粉翻息夫躬既親近數進見言事近其靳翻數所角翻見賢遍翻議論無所避上疏歴詆公卿大臣衆畏其口見之仄目上使中黄門續漢志中黄門比百石掌給事禁中發武庫兵前後十輩送董賢及上乳母王阿舎執金吾母将隆奏言武庫兵器天下公用國家武備繕治造作皆度大司農錢毋将複姓治直之翻蘇林曰用度皆出大司農大司農錢自乗輿不以給共飬共飬勞賜一出少府乗繩證翻師古曰共音居用翻飬音弋尚翻勞郎到翻盖不以本臧給末用不以民力共浮費臧古藏字通音徂浪翻師古曰共讀曰供下同别公私示正路也别彼列翻古者諸侯方伯得顓征伐乃賜斧鉞禮記曰諸侯賜斧鉞然後征王制八州八伯謂之方伯各統其州之國漢家邉吏職任距冦亦賜武庫兵皆任事然後䝉之任音壬春秋之誼家不臧甲春秋公羊傳載孔子墮三都之言臧與藏通讀従平聲所以抑臣威損私力也今賢等便僻弄臣便頻連翻私恩㣲妾而以天下公用給其私門契國威器共其家備李竒曰契缺也晉灼曰契取也師古曰李説是也音詰結翻民力分於弄臣武兵設於㣲妾建立非宜以廣驕僣非所以示四方也孔子曰奚取於三家之堂師古曰論語云三家者以雍徹孔子曰相維辟公天子穆穆奚取於三家之堂言以雍徹食乃天子之禮何為在三家之堂也三家謂魯叔孫仲孫季孫也余謂隆引孔子之言以謂武庫兵器不當以共婦妾之家猶歌雍不當在三家之堂也臣請收還武庫上不説説讀曰悦頃之傅太后使謁者賤買執金吾官婢八人隆奏言買賤請更平直漢書作賈賤賈讀曰價下同上於是制詔丞相御史隆位九卿既無以匡朝廷之不逮而反奏請與永信宫争貴賤之賈傅太后稱永信宫傷化失俗以隆前有安國之言左遷為沛郡都尉初成帝末隆為諫大夫甞奏封事言古者選諸侯入為公卿以褒功徳如衛武公鄭武公荘公是也宜徵定陶王使在國邸以填萬方師古曰填讀曰鎮音竹忍翻故上思其言而宥之諌大夫渤海鮑宣上書曰姓譜鮑本自夏禹之裔因封為鮑氏齊之鮑氏世為上卿竊見孝成皇帝時外親持權人人牽引所私以充塞朝廷塞悉則翻妨賢人路濁亂天下奢泰亡度亡古無字通窮困百姓是以日食且十彗星四起日食十注已見三十二卷元延二年建始元年星孛于營室元延元年星孛于營室元延元年星孛于東井後又晨出東方十三日又夕見西方是四起也彗祥嵗翻延芮翻又徐醉翻危亡之徵陛下所親見也今奈何反覆劇於前乎覆當作復劇増也甚也今民有七亡師古曰亡謂失其作業也隂陽不和水旱為災一亡也縣官重責更賦租税二亡也師古曰更謂為更卒也音工衡翻貪吏並公受取不已三亡也師古曰並依也音歩浪翻豪族大姓蠶食亡厭四亡也亡厭上古無字通下音於鹽翻苛吏繇役失農桑時五亡也繇古徭字通部落鼓鳴男女遮列六亡也師古曰言閒桴鼔之聲以為有盗賊皆當遮列而追捕盗賊刼略取民財物七亡也七亡尚可又有七死酷吏毆殺一死也師古曰毆擊也音一口翻治獄深刻二死也治直之翻寃陷亡辜三死也亡古無字通下同盜賊横發四死也師古曰横音尸孟翻怨讐相殘五死也嵗惡饑餓六死也時氣疾疫七死也天有六氣隂陽風雨晦明也分為四時序為五節過則為災而生疾疫亦非時之氣所為也民有七亡而無一得欲望國安誠難民有七死而無一生欲望刑措誠難此非公卿守相貪殘成化之所致邪羣臣幸得居尊官食重禄豈有肯加惻隠於細民助陛下流教化者邪師古曰惻隠皆痛也志但在營私家稱賔客為姦利而已師古曰務稱賔客所求也稱尺證翻以茍容曲従為賢以拱黙尸禄為智拱黙拱手而黙然不言也師古曰尸主也不憂其職但主食禄而已謂如臣宣等為愚陛下擢臣巖穴誠冀有益豪毛豈徒使臣美食大官重髙門之地哉晉灼曰髙門殿名也師古曰在未央宫中余謂宣言徒知飬賢為朝廷之重而不計其有益於時與否天下乃皇天之天下也陛下上為皇天子下為黎庶父母為天牧飬元元為天之為于偽翻視之當如一合尸鳩之詩師古曰尸鳩曹國風之篇也其詩曰尸鳩在桑其子七兮淑人君子其儀一兮言尸鳩飬其子七平均如一善人君子布徳施恵亦當然也毛氏曰尸鳩秸鞠也尸鳩之飬其子朝従上下暮従下上平均如一秸音居八翻又音吉今貧民菜食不厭衣又穿空師古曰厭飽足也空孔也穿空言破敝也父子夫婦不能相保誠可為酸鼻陛下不救将安所歸命乎奈何獨飬外親與幸臣董賢多賞賜以大萬數使奴従賔客漿酒藿肉劉徳曰視酒如漿視肉如藿也師古曰藿豆菜也貧人茹之従才用翻蒼頭廬兒皆用致富孟康曰黎民黔首黔黎皆黒也下民隂類故以黑為號漢名奴為蒼頭非純黒以别於良人也諸給事殿中者所居為廬蒼頭侍従因呼為廬兒臣瓉曰漢儀注官奴給事計従侍中已下為蒼頭青幘非天意也及汝昌侯傅商亡功而封古亡無字通下同夫官爵非陛下之官爵乃天下之官爵也陛下取非其官官非其人師古曰此官不當加於此人此人不當受此官也而望天説民服豈不難哉説讀曰悦方陽侯孫寵宜陵侯息夫躬辯足以移衆彊可用獨立姦人之雄惑世尤劇者也宜以時罷退及外親幼童未通經術者皆宜令休就師傅急徵故大司馬傅喜使領外親故大司空何武師丹故丞相孔光故左将軍彭宣經皆更博士言經學有師法也更工衡翻位皆歴三公龔勝為司直郡國皆慎選舉司直掌佐丞相舉不法勝守正不阿郡國懼為所舉奏故皆慎於選舉可大委任也陛下前以小不忍退武等師古曰少有不快於心不能忍也海内失望陛下尚能容亡功徳者甚衆曾不能忍武等邪治天下者當用天下之心為心治直之翻不得自専快意而已也宣語雖刻切上以宣名儒優容之匈奴單于上書願朝五年朝直遥翻下同時帝被疾被皮義翻或言匈奴従上游來厭人服䖍曰㳺猶流也河水従西北來故曰上㳺也師古曰上㳺亦總謂地形耳不必係於河水也厭音一涉翻厭勝也自黄龍竟寧時單于朝中國輙有大故師古曰大故謂國之大喪上由是難之以問公卿亦以為虛費府帑師古曰府物所聚也帑藏金帛之所也帑音他莽翻又音奴可且勿許單于使辭去未發已辭而未行也使疏吏翻黄門郎揚雄上書諫曰臣聞六經之治貴於未亂兵家之勝貴於未戰書周官曰制治于未亂兵法曰戰不必勝不茍接刃師古曰已亂而後治之戰鬬而後獲勝則不足貴治直吏翻二者皆㣲師古曰㣲謂精妙也然而大事之本不可不察也今單于上書求朝國家不許而辭之臣愚以為漢與匈奴従此隙矣言嫌隙従此而開也匈奴本五帝所不能臣三王所不能制其不可使隙明甚臣不敢逺稱請引秦以來明之以秦始皇之彊䝉恬之威然不敢窺西河乃築長城以界之䝉恬斥逐匈奴以北河為竟漢朔方郡地是也若西河則漢武威張掖燉煌酒泉地是也秦不能取築長城起臨洮以界之㑹漢初興以髙祖之威靈三十萬衆困於平城事見十一卷髙帝七年時竒譎之士石畫之臣甚衆鄧展曰石大也師古曰石言堅固如石也畫計䇿也音獲卒其所以脱者世莫得而言也師古曰卒終也莫得而言謂自免之計其事醜惡故不𫝊卒子恤翻又髙后時匈奴悖慢大臣權書遺之然後得解事見十二卷恵帝三年杜佑曰以權道為書順辭以答遺于季翻及孝文時匈奴侵暴北邉候騎至雍甘泉京師大駭發三将軍屯棘門細栁覇上以備之數月乃罷事見十五卷文帝後六年雍於用翻孝武即位設馬邑之權欲誘匈奴徒費財勞師一虜不可得見况單于之靣乎事見十七卷武帝元光二年言欲見匈奴一人且不可得况使單于靣來獻見乎其後深惟社稷之計規恢萬載之䇿載子亥翻乃大興師數十萬使衛青霍去病操兵前後十餘年於是浮西河絶大幕破窴顔襲王庭窮極其地追犇逐北封狼居胥山禪於姑衍以臨瀚海虜名王貴人以百數自是之後匈奴震怖益求和親然而未肯稱臣也事並見武帝紀操千髙翻窴音填怖普布翻且夫前世豈樂傾無量之費役無罪之人快心狼望之北哉師古曰狼望匈奴中地名余謂邉人謂舉燧為狼烟狼望謂狼烟候望之地樂音洛以為不壹勞者不乆逸不暫費者不永寧是以忍百萬之師以摧餓虎之喙師古曰喙口也摧百萬之師於獸口也喙許穢翻余謂順文而為説其義自通唐諱虎故師古改曰獸運府庫之財填盧山之壑而不悔也師古曰盧山匈奴中山也余按衛青薨起冢象盧山青唯絶幕至填顔山耳或者寘顔山即盧山歟孟康曰盧山單于南庭也至本始之初匈奴有桀心師古曰桀竪也言其起立不順欲掠烏孫侵公主乃發五将之師十五萬騎以擊之時鮮有所獲徒奮揚威武明漢兵若雷風耳雖空行空反尚誅兩将軍事見二十四卷宣帝本始三年鮮息踐翻兵若雷風言師速而疾風驅霆行一過而不留也故北狄不服中國未得髙枕安寝也枕職任翻逮至元康神爵之間大化神明鴻恩溥洽而匈奴内亂五單于争立日逐呼韓邪攜國歸死扶伏稱臣事並見宣帝紀歸死者歸死命于漢也扶伏猶言匍匐也師古曰伏音蒲北翻然尚羈縻之計不顓制師古曰顓與専同専制謂以為臣妾也自此之後欲朝者不距朝直遥翻不欲者不彊師古曰彊音其兩翻何者外國天性忿鷙形容魁健負力怙氣難化以善易肄以惡師古曰鷙音竹二翻鷙狠也魁大也負恃也余謂肄習也言易習於為惡也其彊難詘詘與屈同其和難得故未服之時勞師逺攻傾國殚貨伏尸流血破堅拔敵如彼之難也既服之後慰薦撫循交接賂遺威儀俯仰如此之備也徃時甞屠大宛之城事見二十一卷武帝太初三年宛於元翻蹈烏桓之壘事見二十三卷昭帝元鳳三年探姑繒之壁事見二十三卷昭帝始元四年探吐南翻藉蕩姐之場劉徳曰蕩姐𦍑屬師古曰藉猶蹈也姐音紫余據元帝永光三年隴西𦍑彡姐反豈是邪艾朝鮮之旃事見二十一卷武帝元封三年師古曰艾讀曰刈刈絶也朝音潮拔兩越之旗見二十卷武帝元鼎六年近不過旬月之役逺不離二時之勞師古曰離歴也三月為一時固已犂其庭師占曰犂耕也掃其閭郡縣而置之雲徹席卷後無餘災如雲之徹如席之卷天清地浄無纎毫之塵翳也唯北狄為不然真中國之堅敵也三垂比之懸矣師古曰懸絶也前世重之兹甚師古曰兹益也余謂兹此也兹甚此為甚也未易可輕也易以豉翻今單于歸義懷欵誠之心欲離其庭陳見于前離力智翻此乃上世之遺䇿神靈之所想望國家雖費不得已者也奈何距以來厭之辭謂或言従上㳺來厭人也踈以無日之期止其來朝辭以他日而無一定之期則匈奴與漢踈消徃昔之恩開将來之隙夫疑而隙之使有恨心負前言縁徃辭歸怨於漢師古曰言單于因縁徃昔和好之辭以怨漢也余謂負恃也負前言者恃前者有和好之言也因以自絶終無北面之心威之不可諭之不能焉得不為大憂乎焉於䖍翻夫明者視於無形聰者聴於無聲誠先於未然先悉薦翻即兵革不用而憂患不生不然壹有隙之後雖智者勞心於内辯者轂擊於外師古曰轂擊言使車交馳其轂相擊也轂户容翻猶不若未然之時也且徃者圗西域制車師置城郭都䕶三十六國事並見武帝宣帝紀豈為康居烏孫能踰白龍堆而冦西邉哉為于偽翻下同乃以制匈奴也夫百年勞之一日失之費十而愛一謂向者不惮十分之費以制匈奴今來朝之費十分之一耳乃愛惜之臣竊為國不安也為于偽翻唯陛下少留意於未亂未戰少詩沼翻以遏邉萌之禍萌與氓同謂邉民也書奏天子寤焉召還匈奴使者更報單于書而許之更工衡翻改也賜雄帠五十匹黄金十斤單于未發㑹病復遣使願朝明年復扶又翻上許之董賢貴幸日盛丁傅害其寵孔鄉侯晏與息夫躬謀欲求居位輔政㑹單于以病未朝躬因是而上奏上時掌翻以為單于當以十一月入塞後以病為解師古曰自解説云病疑有他變烏孫兩昆彌弱卑爰疐彊盛東結單于遣子徃侍事見上建平二年疐竹二翻恐其合埶以并烏孫烏孫并則匈奴盛而西域危矣可令降胡詐為卑爰疐使者來上書欲因天子威告單于歸臣侍子因下其章降户江翻下遐稼翻令匈奴客聞焉則是所謂上兵伐謀匈奴客謂匈奴使者也服䖍曰謀者舉兵伐解之也師古曰此説非也言知敵有謀者則以事而應之沮其所為不用兵革所以為貴上兵伐謀其次伐交孫武子之言其次伐交者也師古曰知敵有外交連結相援者則間而誤之令其解散也書奏上引見躬見賢遍翻下屢見之見同召公卿将軍大議左将軍公孫禄以為中國常以威信懷伏夷狄躬欲逆詐逆詐者敵之詐謀未見欲迎測其情也造不信之謀不可許且匈奴賴先帝之徳保塞稱藩今單于以疾病不任奉朝賀遣使自陳不失臣子之禮任音壬臣禄自保沒身不見匈奴為邉竟憂也竟讀曰境躬掎禄曰師古曰掎従後引之也謂引躡其言也音居綺翻臣為國家計為于偽翻冀先謀将然師古曰謂彼欲有其事則為謀䇿以壞之豫圗未形師古曰圗謀也未有形兆而圗之為萬世慮而禄欲以其犬馬齒保目所見臣與禄異議未可同日語也上曰善乃罷羣臣獨與躬議躬因建言災異屢見恐必有非常之變可遣大将軍行邉兵敕武備師古曰行音下孟翻敕整也斬一郡守以立威震四夷守手又翻因以厭應變異師古曰厭音一渉翻上然之以問丞相嘉對曰臣聞動民以行不以言行下孟翻應天以實不以文下民㣲細猶不可詐况於上天神明而可欺哉天之見異師古曰見謂顯示也所以敕戒人君欲令覺悟反正推誠行善民心説而天意得矣説讀曰悦辯士見一端或妄以意傅著星厯師古曰傅讀曰附著音治畧翻虛造匈奴西羌之難難乃旦翻謀動干戈設為權變非應天之道也守相有辠相息亮翻車馳詣闕交臂就死恐懼如此而談説者欲動安之危師古曰之徃也言揺動安全之計徃就危殆也辯口快耳其實未可従夫議政者苦其讇䛕傾險辯恵深刻也讇古諂字昔秦繆公不従百里奚蹇叔之言以敗其師其悔過自責疾詿誤之臣思黄髮之言名垂於後世秦穆公欲襲鄭蹇叔百里奚諌不聴遂出師晉襄公要而敗諸殽還歸作秦誓以悔過其辭曰惟古之謀人則曰未就予忌惟今之謀人姑将以為親雖則云然尚猷詢兹黄髪則罔所愆又曰惟截截善諞言俾君子易辭我皇多有之昩昧我思之敗補邁翻詿户卦翻願陛下觀覽古戒反覆參考無以先入之語為主師古曰謂躬為此計先入於帝耳上不聴為董賢沮躬䇿躬遂得罪張本資治通鑑卷三十四
