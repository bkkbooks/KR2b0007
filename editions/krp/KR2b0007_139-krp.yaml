body:
  text: 資治通鑑卷一百三十九宋司馬光撰胡三省音註齊紀五閼逢開茂一年髙宗明皇帝上諱鸞字景栖小字𤣥度髙帝兄始安貞王道生之子建武元年是年十月始改元建武春正月丁未改元隆昌此鬰林王改元也大赦雍州刺史晉安王子懋雍於用翻以主㓜時艱密為自全之計令作部造仗諸州各有作部主造器仗征南大將軍陳顯逹屯襄陽去年秋武帝以魏將入冦遣顯逹鎮樊城子懋欲脅取以為將將即亮翻下同顯逹密啓西昌侯鸞鸞徵顯逹為車騎大將軍騎竒寄翻徙子懋為江州刺史仍令留部曲助鎮襄陽單將白直俠轂自隨諸王有白直有夾轂隊俠讀曰夾顯逹過襄陽過音戈子懋謂曰朝廷令身單身而返身是天王豈可過爾輕率子懋自稱天王葢謂是天家諸王也今猶欲將二三千人自隨公意何如顯逹曰殿下若不留部曲乃是大違敕㫖其事不輕且此間人亦難可收用此間人謂襄陽人也子懋黙然顯逹因辭出即𤼵去子懋計未立乃之尋陽西昌侯鸞將謀廢立引前鎮西諮議參軍蕭衍與同謀隨王子隆初以鎮西將軍鎮荆州引衍為諮議參軍荆州刺史隨王子隆性温和有文才鸞欲徵之恐其不從衍曰隨王雖有美名其實庸劣既無智謀之士爪牙唯仗司馬垣厯生武陵太守卞白龍耳二人唯利是從若啗以顯職無有不來隨王止須折簡耳鸞從之徵歴生為太子左衛率白龍為游擊將軍啗徒濫翻折之舌翻率所律翻二人並至續召子隆為侍中撫軍將軍此時西昌侯已有殺諸王之心矣蕭衍由是以籌略見用豫州刺史崔慧景髙武舊將將即亮翻鸞疑之以蕭衍為寜朔將軍戍夀陽慧景懼白服出迎白服若得罪而白衣領職者衍撫安之辛亥鬰林王祀南郊戊午拜崇安陵鬰林王即位追尊父文惠太子曰文帝陵曰崇安廟號世宗據竟陵王子良𫝊陵在夾右癸亥魏主南巡戊辰過比干墓水經注河内朝歌縣南有牧野有比干冡前有石銘題𨽻云殷大夫比干之墓不知誰所誌也祭以太牢魏主自為祝文曰嗚呼介士胡不我臣帝寵幸中書舍人綦毋珍之朱隆之直閤將軍曹道剛周奉叔宦者徐龍駒等帝謂鬰林王珍之所論薦事無不允允信也肯也内外要職皆先論價旬月之間家累千金擅取官物及役作不俟詔㫖有司至相語云語牛倨翻寜拒至尊敇不可違舍人命帝以龍駒為後閤舍人後閤禁中後閤也南史曰龍駒日夜在六宫房内常居含章殿著黄綸㡌被貂裘著陟略翻被皮義翻南面向案代帝畫敇左右侍直與帝不異帝自山陵之後即與左右㣲服遊走市里好於世宗崇安陵隧中擲塗賭跳好呼到翻文惠太子廟號世宗塗泥也以塗泥相擲為樂也跳躍也賭跳者以跳躍髙出者為勝跳他弔翻作諸鄙戲極意賞賜左右動至百數十萬每見錢曰我昔思汝一枚不得今日得用汝未世祖聚錢上庫五億萬齋庫亦出三億萬上庫所儲以備軍國之用齋庫以供齋内所須人主之好用出者出三億萬數之外也金銀布帛不可勝計勝音升鬰林王即位未朞嵗所用垂盡入主衣庫令何后及寵姬以諸寳器相投擊破碎之用為笑樂樂音洛蒸於世祖幸姬霍氏更其姓曰徐更工衡翻李延夀史以霍為文帝幸姬則世祖當作世宗朝事大小皆决於西昌侯鸞朝直遥翻下同鸞數諫爭數所角翻爭讀曰諍帝多不從心忌鸞欲除之以尚書右僕射鄱陽王鏘為世祖所厚世祖恐亦當作世宗私謂鏘曰公聞鸞於法身如何鬰林王小字法身鏘素和謹對曰臣鸞於宗戚最長且受寄先帝臣等皆年少長知兩翻少詩沼翻朝廷所頼唯鸞一人願陛下無以為慮帝退謂徐龍駒曰我欲與公共計取鸞公既不同我不能獨辦且復小聽復扶又翻下無復同言且又小時聽鸞専政也衛尉蕭諶世祖之族子也蕭子顯齊書曰諶於太祖為絶服族子諶氏壬翻自世祖在郢州諶已為腹心宋元徽末世祖在郢州欲知都下消息太祖遣諶就世祖宣𫝊謀計留為腹心及即位常典宿衛機密之事無不預聞征南諮議蕭坦之諶之族人也嘗為東宫直閤為世宗所知蕭子顯齊書曰坦之以懃直為世祖所知既為東宫直閤則從世宗為是東宫亦有直閤將軍帝以二人祖父舊人甚親信之諶每請急出宿帝通夕不寐諶還乃安坦之得出入後宫帝䙝狎宴遊坦之皆在側帝醉後常裸袒裸郎果翻坦之輙扶持諫諭西昌侯鸞欲有所諌帝在後宫不出唯遣諶坦之徑進乃得聞逹何后亦淫泆泆音逸淫泆放也私於帝左右楊珉與同寢處如伉儷處昌呂翻下處之同杜預曰伉敵也儷耦也伉苦浪翻儷力計翻又與帝相愛狎故帝恣之迎后親戚入宫以耀靈殿處之齋閤通夜洞開外内淆雜無復分别别彼列翻西昌侯鸞遣坦之入奏誅珉何后流涕覆面覆敷又翻曰楊郎好年少無罪何可枉殺少詩沼翻坦之附耳語帝曰語牛倨翻下每語同外間並云楊珉與皇后有情事彰遐邇不可不誅帝不得已許之俄敇原之已行刑矣鸞又啓誅徐龍駒帝亦不能違而心忌鸞益甚蕭諶蕭坦之見帝狂縱日甚無復悛改悛丑緣翻恐禍及己乃更回意附鸞勸其廢立隂為鸞耳目帝不之覺也周奉叔恃勇挾勢陵轢公卿轢郎狄翻常翼單刀二十口自隨翼者分列左右若兩翼然也出入禁闥門衛不敢訶訶虎何翻每語人曰周郎刀不識君鸞忌之使蕭諶蕭坦之說帝出奉叔為外援說輸芮翻下鸞說此說同己巳以奉叔為青州刺史蕭子顯曰宋秦始中淮北没虜徙青州治欝洲齊建元四年徙治胊山後復舊曹道剛為中軍司馬奉叔就帝求千户侯許之鸞以為不可封曲江縣男食三百户奉叔大怒於衆中攘刀厲色鸞說諭之乃受說輸芮翻下同奉叔辭畢將之鎮部伍已出鸞與蕭諶稱敇召奉叔於省中敺殺之省中尚書省中也敺烏口翻啓云奉叔慢朝廷帝不獲已可其奏溧陽令錢唐杜文謙嘗為南郡王侍讀溧陽縣自漢以來屬丹陽郡其地在建康東南帝初封南郡王溧音栗前此說綦毋珍之曰天下事可知灰盡粉滅匪朝伊夕不早為計吾徒無類矣珍之曰計將安出文謙曰先帝舊人多見擯斥今召而使之誰不忼慨近聞王洪範王洪範即轉言日月相者也與宿衛將萬靈㑹等共語皆攘袂搥牀將即亮翻搥𫝊追翻君其密報周奉叔使萬靈㑹等殺蕭諶則宫内之兵皆我用也蕭諶時以衛軍司馬兼衛尉卿掌宿衛兵即勒兵入尚書斬蕭令尚書省在雲龍門内兩都伯力耳都伯行刑者也今謂之劊子今舉大事亦死不舉事亦死二死等耳死社稷可乎若遲疑不斷復少日錄君稱敕賜死復扶又翻少詩沼翻少日言無多日也鸞錄尚書事故稱為錄君父母為殉謂皆將從坐而死也在眼中矣珍之不能用及鸞殺奉叔并收珍之文謙殺之乙亥魏主如洛陽西宫中書侍郎韓顯宗上書陳四事其一以為竊聞輿駕今夏不巡三齊當幸中山往冬輿駕停鄴當農隙之時猶比屋供奉不勝勞費比毗必翻又毗至翻勝音升况今蠶麥方急將何以堪命且六軍涉暑恐生癘疫臣願早還北京以省諸州供張之苦北京謂平城張竹亮翻成洛都營繕之役其二以為洛陽宫殿故基皆魏明帝所造前世已譏其奢今兹營繕宜加裁損又頃來北都富室競以第舍相尚北都亦謂平城魏既遷洛以平城為北都宜因遷徙為之制度及端廣衢路通利溝渠其三以為陛下之還洛陽輕將從騎從才用翻王者於闈闥之内宫中門曰闈韓詩門屏間曰闥猶施警蹕况涉履山河而不加三思乎三息暫翻其四以為陛下耳聽法音法音謂雅樂也目翫墳典謂三墳五典書序伏羲神農黄帝之書謂之三墳言大道也少昊顓頊髙辛唐虞之書謂之五典言常道也孔子序書斷自唐虞三墳五典後世不復見其全此特大槩言之口對百辟心虞萬機景昃而食虞度也景昃日昃也日景過中則昃昃音側夜分而寢加以孝思之至隨時而深謂文明太后之殂已久而帝孝思不忘也文章之業日成篇卷雖叡明所用未足為煩然非所以嗇神養性嗇愛也保無疆之祚也伏願陛下垂拱司契而天下治矣老子曰有徳司契司主也契要也治直吏翻帝頗納之顯宗麒麟之子也韓麒麟見一百三十五卷武帝永明元年顯宗又上言以為州郡貢察徒有秀孝之名而無秀孝之實貢察者謂察舉秀才孝廉而貢之於朝朝廷但檢其門望不復彈坐復扶又翻彈坐者彈劾其違而坐之以罪如此則可令别貢門望以叙士人何假冐秀孝之名也夫門望者乃其父祖之遺烈亦何益於皇家益於時者賢才而已苟有其才雖屠釣奴虜聖王不恥以為臣太公屠牛於朝歌釣於渭濱又紂時箕子為奴周文王武王皆禮而用之茍非其才雖三后之𦙍墜于皂𨽻矣左傳申無宇曰人有十等士臣皁皁臣輿輿臣𨽻釋曰皁直馬者𨽻附屬者三后謂夏商周之王也議者或云今世等無竒才不若取士於門此亦失矣豈可以世無周召遂廢宰相邪但當校其寸長銖重者先叙之言其人比之衆人稍有一寸之長一銖之重則先叙用之則賢才無遺矣又刑罸之要在於明當當丁浪翻不在於重茍不失有罪雖捶撻之薄人莫敢犯若容可僥幸雖參夷之嚴不足懲禁參夷謂夷三族也捶止橤翻僥堅堯翻今内外之官欲邀當時之名爭以深刻為無私迭相敦厲敦迫也厲嚴以勉之遂成風俗陛下居九重之内視人如赤子百司分萬務之任遇下如仇讐是則堯舜止一人而桀紂以千百和氣不至葢由於此謂宜敕示百僚以惠元元之命又昔周居洛邑猶存宗周周成王宅洛以豐為宗周存故都也漢遷東都京兆置尹後漢都雒陽置河南尹而長安仍置京兆尹亦存故都也察春秋之義有宗廟曰都無曰邑况代京宗廟山陵所託王業所基其為神鄉福地實亦遠矣今便同之郡國臣竊不安謂宜建畿置尹一如故事魏初都平城分畫甸畿置司州於平城置代尹崇本重舊光示萬葉又古者四民異居欲其業専志定也管仲相齊使士農工商各羣萃而州處其言曰四民者勿使雜處雜處則其言厖其事易昔聖王之處士也使就閑燕處工就官府處商就市井處農就田野長而安焉不見異物而遷焉太祖道武皇帝創基撥亂日不暇給然猶分别士庶不令雜居工伎屠沽各有攸處别彼列翻伎渠綺翻處昌呂翻下同處同但不設科禁久而混殽今聞洛邑居民之制専以官位相從不分族類夫官位無常朝榮夕悴悴秦醉翻則是衣冠皁𨽻不日同處矣借使一里之内或調習歌舞或講肄詩書肄羊至翻縱羣兒隨其所之則必不棄歌舞而從詩書矣然則使工伎之家習士人風禮百年難成士人之子効工伎容態一朝而就是以仲尼稱里仁之美孟母勤三徙之訓論語孔子曰里仁為美擇不處仁焉得知列女傳曰孟軻母其舍近墓孟子少嬉遊為墓間之事孟母曰此非吾所以處子也乃去舎市旁其嬉戲乃賈人衒賣之事又曰此非吾所以處子也復徙舎學宫之旁其嬉戲乃設爼豆揖遜進退孟母曰此真可以居吾子矣遂居焉此乃風俗之原不可不察朝廷每選人士校其一㛰一宦以為升降何其密也至于度地居民則清濁連甍何其略也度徙洛翻甍謨耕翻屋棟所以承瓦今因遷徙之初皆是空地分别工伎在於一言有何可疑而闕盛美又南人昔有淮北之地自比中華僑置郡縣如豫州界止於汝陽而僑置譙梁陳潁等郡縣又於青州界僑置冀州諸郡縣是也僑渠驕翻自歸附聖化仍而不改名實交錯文書難辨宜依地理舊名一皆釐革小者并合大者分置及中州郡縣昔以户少併省魏初得河南止置四鎮郡縣多所併省少詩沼翻今民口既多亦可復舊又君人者以天下為家不可有所私倉庫之儲以供軍國之用自非有功徳者不可加賜在朝諸貴受祿不輕比來賜賚動以千計朝直遥翻比毗至翻若分以賜鰥寡孤獨之民所濟實多今直以與親近之臣殆非周急不繼富之謂也論語孔子曰君子周急不繼富帝覽奏甚善之二月乙丑魏主如河隂規方澤規度其地以立方澤辛卯帝祀眀堂司徒參軍劉斆等聘于魏斆胡教翻丙申魏徙河南王幹為趙郡王潁川王雍為髙陽王將以河南潁川為畿甸故二王徙封壬寅魏主北巡癸卯濟河三月壬申至平城魏考異曰魏帝紀作閏月按閏二月齊厯之三月也使羣臣更論遷都利害各言其志燕州刺史穆羆曰魏營洛以洛為司州改平城之司州為恒州分恒州東部置燕州治昌平今四方未定未宜遷都且征伐無馬將何以克帝曰廐牧在代何患無馬今代在恒山之北九州之外非帝王之都也恒户登翻尚書于果曰臣非以代地為勝伊洛之美也但自先帝以來久居於此百姓安之一旦南遷衆情不樂樂音洛平陽公丕曰遷都大事當訊之卜筮帝曰昔周召聖賢乃能卜宅書洛誥曰召公既相宅周公往營成周使來告卜曰我卜河朔黎水我又卜澗水東瀍水西惟洛食我又卜瀍水東亦惟洛食今無其人卜之何益且卜以决疑不疑何卜左傳載鬭廉之言黄帝卜而龜焦天老曰吉黄帝從之杜預曰龜焦兆不成也字書釋灼龜不兆為焦然則至人之知未然審於龜矣王者以四海為家或南或北何常之有朕之逺祖世居北荒平文皇帝始都東木根山拓跋欝律謚平文皇帝晉明帝大寜二年通鑑書惠帝賀傉徙居東木根山昭成皇帝更營盛樂拓跋什翼犍謚昭成皇帝通鑑晉成帝咸康元年烈帝翳槐城盛樂次年昭成嗣國咸康七年築盛樂新城更工衡翻道武皇帝遷于平城晉安帝隆安二年道武帝遷都平城朕幸屬勝殘之運論語孔子曰善人為邦百年亦可以勝殘去殺矣朱元晦曰勝殘謂化善人不為惡也屬之欲翻㑹也勝音升而獨不得遷乎羣臣不敢復言復扶又翻羆夀之孫穆夀事魏太武帝果烈之弟也癸酉魏主臨朝堂部分遷留分扶問翻夏四月庚辰魏罷西郊祭天禮考異曰魏帝紀志北史紀皆云三月庚辰按長厯三月丙午朔無庚辰魏閏二月齊閏四月魏三月乙亥朔齊厯之四月也故置於此辛巳武陵昭王曅卒戊子竟陵文宣王子良以憂卒帝常憂子良為變聞其卒甚喜欝林但虞子良為變而不知鸞諶之謀已成矣臣光曰孔子稱鄙夫不可與事君未得之患得之既得之患失之茍患失之無所不至見論語王融乗危徼倖徼堅堯翻謀易嗣君子良當時賢王雖素以忠慎自居不免憂死迹其所以然正由融速求富貴而已輕躁之士烏可近哉躁則到翻近其靳翻己亥魏罷五月五日七月七日饗祖考魏端午七夕之饗猶寒食之饗皆夷禮也魏錄尚書事廣陵王羽奏令文每嵗終州鎮列屬官治狀及再考則行黜陟治直吏翻去十五年京官盡經考為三等去十五年猶云昨太和十五年也今已三載臣輒凖外考以定京官治行欲以考州鎮屬官之法考京官載子亥翻行下孟翻魏主曰考績事重應闗朕聽不可輕𤼵且俟至秋史言魏孝文明於君人之體不使權在臣下閏月丁卯鎮軍將軍鸞即本號開府儀同三司本號鎮軍將軍也戊辰以新安王昭文為揚州刺史五月甲戌朔日有食之此考異曰齊魏書帝紀皆無日今據齊書志南史紀六月己巳魏遣兼員外散騎常侍盧昶兼員外散騎侍郎王清石來聘昶度世之子也盧度世避崔浩之禍其後自出魏太武寵任之散悉亶翻騎竒寄翻昶丑兩翻清石世仕江南魏主謂清石曰卿勿以南人自嫌彼有知識欲見則見欲言則言凡使人以和為貴勿迭相矜夸見於辭色使疏吏翻下同見賢遍翻失將命之體也將奉也奉命而行謂之將命秋七月乙亥魏以宋王劉昶為使持節都督吳越楚諸軍事大將軍鎮彭城江南皆春秋時吳越楚三國之地魏主親餞之以王肅為昶府長史昶至鎮不能撫接義故宋蒼梧王初昶鎮彭城棄鎮奔魏故義故在焉卒無成功卒子恤翻壬午魏安定靖王休卒自卒至殯魏主三臨其第葬之如尉元之禮尉紆勿翻送之出郊慟哭而返壬戌魏主北巡西昌侯鸞既誅徐龍駒周奉叔而尼媪外入者頗𫝊異語媪烏皓翻異語謂外人籍籍口語言鸞等相與有異謀也中書令何𦙍以后之從叔從才用翻為帝所親使直殿省帝與𦙍謀誅鸞令𦙍受事𦙍不敢當依違諌説帝意復止乃謀出鸞於西州中敇用事不復闗咨於鸞復扶又翻是時蕭諶蕭坦之握兵權左僕射王晏摠尚書事諶密召諸王典籖約語之不許諸王外接人物約語者約束而語之語牛倨翻諶親要日久衆皆憚而從之鸞以其謀告王晏晏聞之響應又告丹陽尹徐孝嗣孝嗣亦從之驃騎錄事南陽樂豫謂孝嗣曰外𫝊籍籍似有伊周之事君䝉武帝殊常之恩荷託付之重徐孝嗣為王儉所薦武帝擢而用之遺詔託以尚書衆事驃匹妙翻騎竒寄翻荷下可翻恐不得同人此舉人笑褚公至今齒冷謂褚淵也笑則啓齒故云齒冷孝嗣心然之而不能從帝謂蕭坦之曰人言鎮軍與王晏蕭諶欲共廢我鸞時領鎮軍將軍故稱之似非虛𫝊卿所聞云何坦之曰天下寜當有此誰樂無事廢天子邪樂音洛朝貴不容造此論當是諸尼姥言耳豈可信耶朝直遥翻姥莫補翻女老稱官若無事除此三人誰敢自保直閤將軍曹道剛疑外間有異密有處分謀未能𤼵言曹道剛密有圖鸞等之謀而未能𤼵處昌呂翻分扶問翻時始興内史蕭季敞南陽太守蕭頴基皆内遷諶欲待二人至藉其埶力以舉事以二人方自外郡歸各有兵力自送為可藉也鸞慮事變以告坦之坦之馳謂諶曰廢天子古來大事比聞曹道剛朱隆之等轉已猜疑比毗至翻衛尉明日若不就事無所復及復扶又翻弟有百嵗母豈能坐聽禍敗正應作餘計耳諶惶遽從之壬辰鸞使蕭諶先入宫遇曹道剛及中書舍人朱隆之皆殺之直後徐僧亮盛怒直後亦宿衛之官待衛於乘輿之後者也大言於衆曰吾等荷恩荷下可翻今日應死報又殺之鸞引兵自尚書入雲龍門戎服加朱衣於上比入門三失履懼而夫其常度也比必寐翻及也王晏徐孝嗣蕭坦之陳顯逹王廣之沈文季皆隨其後帝在夀昌殿夀昌殿武帝所起宴居常居之聞外有變猶密為手敇呼蕭諶又使閉内殿諸房閤俄而諶引兵入夀昌閤帝走趨徐姬房拔劍自刺不入趨七喻翻刺七亦翻以帛纒頸輿接出延徳殿諶初入殿宿衛將士皆操弓楯欲拒戰操千髙翻楯食尹翻諶謂之曰所取自有人卿等不湏動宿衛素𨽻服於諶皆信之及見帝出各欲自奮帝竟無一言行至西弄弑之此延徳殿之西弄也丁度集韻曰弄厦也屏也亦作㢅帝死時年二十二輿尸出殯徐龍駒宅葬以王禮徐姬及諸嬖倖皆伏誅鸞既執帝欲作太后令徐孝嗣於袖中出而進之鸞大悦癸巳以太后令追廢帝為鬰林王又廢何后為王妃迎立新安王昭文吏部尚書謝瀹方與客圍棊左右聞有變驚走報瀹瀹每下子子棊子也輒云其當有意竟局乃還齋卧竟不問外事謝瀹為此兄朏之教也大匠卿虞悰竊歎曰王徐遂縳袴廢天子天下豈有此理邪大匠卿即漢將作大匠之官蕭子顯曰掌宗廟土木悰徂宗翻悰嘯父之孫也虞嘯父虞潭之子事晉孝武帝父音甫朝臣被召入宫朝直遥翻被皮義翻國子祭酒江斆至雲龍門託藥𤼵吐車中而去吐土故翻嘔也西昌侯鸞欲引中散大夫孫謙為腹心散悉亶翻使兼衛尉給甲仗百人謙不欲與之同輙散甲士鸞亦不之罪也史言謝瀹江斆以名義自將僅能如此而已特立不懼孫謙庶幾焉丁酉新安王即皇帝位時年十五王諱昭文字季尚文惠太子第二子也以西昌侯鸞為驃騎大將軍錄尚書事揚州刺史宣城郡公大赦改元延興辛丑魏主至朔州魏收地形志雲州舊置朔州又有朔州本漢五原郡魏為懐朔鎮孝昌中始改為朔州今此朔州當置于雲中之盛樂時置朔州於定襄故城領盛樂廣牧二郡宋白曰孝文遷洛之後於今朔州北二百八十里定襄故城置朔州後亂廢八月甲辰以司空王敬則為太尉鄱陽王鏘為司徒車騎大將軍陳顯逹為司空鏘千羊翻騎奇寄翻尚書左僕射王晏為尚書令魏主至隂山以始安王遥光為南郡太守不之官遥光鸞之兄子也鸞兄鳳生遥光遥欣遥光嗣始安王爵鸞有異志遥光賛成之凡大誅賞無不預謀戊申以中書郎蕭遥欣為兖州刺史遥欣遥光之弟也鸞欲樹置親黨故用之癸丑魏主如懐朔鎮己未如武川鎮辛酉如撫宜鎮甲子如柔𤣥鎮此六鎮自西徂東之次第也水經注懐朔鎮城在漢光祿城東北考其地當在漢五原稒陽塞外杜佑曰在馬邑郡北三百餘里武川鎮城在白道中溪水上白道在隂山之北又北出大漠柔𤣥鎮在于延水東于延水出塞外柔𤣥鎮西長川城南小山東南流逕漢代郡且如縣故城南則魏柔𤣥鎮城在漢且如縣西北塞外也且音子閭翻撫宜鎮城未考其地若以前說六鎮自五原抵濡源分置于三千里中則撫宜當在武州柔𤣥之間相距各五百里據前髙閭之說則相距各一百七十許里耳按北史宜當作𠖇乙丑南還辛未至平城九月壬申朔魏詔曰三載考績三考黜陟唐虞之制三考黜陟三考九年也載子亥翻可黜者不足為遲可進者大成賖緩朕今三載一考即行黜陟欲令愚滯無妨於賢者才能不擁於下位各令當曹考其優劣為三等其上下二等仍分為三上等下等各又分為三等六品已下尚書重問重直用翻五品已上朕將親與公卿論其善惡上上者遷之下下者黜之中者守其本任魏主之北巡也留任城王澄銓簡舊臣自公侯已下有官者以萬數澄品其優劣能否為三等人無怨者史言任城王澄之平明壬午魏主臨朝堂黜陟百官朝直遥翻謂諸尚書曰尚書樞機之任非徒摠庶務行文書而已朕之得失盡在於此卿等居官年垂再朞未嘗獻可替否進一賢退一不肖此最罪之大者又謂錄尚書事廣陵王羽曰汝為朕弟居機衡之右無勤恪之聲有阿黨之迹今黜汝錄尚書廷尉但為特進太子太保又謂尚書令陸叡曰叔翻到省之初甚有善稱比來偏頗懈怠廣陵王羽字叔翻稱昌孕翻比毗至翻頗傍禾翻亦偏也懈居隘翻由卿不能相導以義雖無大責宜有小罸今奪卿祿一朞又謂左僕射拓跋賛曰叔翻受黜卿應大辟辟毗亦翻但以咎歸一人不復重責今解卿少師削祿一朞又謂左丞公孫良右丞乞伏義受曰卿罪亦應大辟可以白衣守本官冠服祿䘏魏官本祿之外别有恤親之祿盡從削奪若三年有成還復本任無成永歸南畝又謂尚書任城王澄曰叔神志驕傲可解少保澄於魏主叔也又謂長兼尚書于果曰卿不勤職事數辭以疾數所角翻可解長兼削祿一朞其餘守尚書尉羽盧淵等並以不軄或解任或黜官或奪祿皆面數其過而行之尉紆勿翻數所具翻唐虞三載考績三考黜陟幽明其黜陟行於九年之後非賖緩也俗淳事簡在位者各思盡其職不為奸欺就有不稱者一考而未黜冀其能自盡也其不能盡者才力有所不逮耳再考不稱而猶未黜謂才有短長臨事有過誤前考已稱其職而今考不稱者必過誤也前考不稱而今考能稱其職者能自勉也三考皆不稱則其人信不可用矣於是乎黜之此唐虞忠厚之至也周官計羣吏之治旬終則令正日成月終則令正月要歳終則令正嵗㑹三嵗則大計羣吏之治而誅賞之是葢無日而不考覈而誅賞則行于三年大計之時葢俗益薄人益媮而行九年之黜陟則為賖緩觀魏孝文之考績不過慕古而務名非能行考績之實也淵昶之兄也昶丑兩翻帝又謂陸叡曰北人每言北俗質魯何由知書朕聞之深用憮然憮罔甫翻憮然者悵然失意之貌今知書者甚衆豈皆聖人顧學與不學耳朕修百官興禮樂其志固欲移風易俗朕為天子何必居中原正欲卿等子孫漸染美俗漸子廉翻聞見廣博若永居恒北恒户登翻復值不好文之主復扶又翻好呼到翻不免面墻耳書曰不學墻面言猶正墻面而立無所睹見也對曰誠如聖言金日磾不入仕漢朝何能七世知名金日磾事見七十一卷漢武帝後元元年七世知名謂七世内侍也磾丁奚翻朝直遥翻帝甚悅鬰林王之廢也鄱陽王鏘初不知謀及宣城公鸞權埶益重中外皆知其蓄不臣之志鏘毎詣鸞鸞常履履至車後迎之言急於出迎不暇躡履至跟也語及家國言淚俱發鏘以此信之宫臺之内皆屬意於鏘宫臺猶言宫省也屬之欲翻勸鏘入宫發兵輔政制局監謝粲說鏘及隨王子隆曰二王但乘油壁車入宫李延夀恩倖傳曰武官有制局監外監皆領器仗兵役油壁車者加青油衣於車壁也王儉議曰衾書車十二乘古副車之象也榆轂輪簟子壁綠油衣說輸芮翻下之說說子因説同出天子置朝堂夾輔號令朝直遥翻粲等閉城門上仗誰敢不同上時掌翻下直上西上同東城人正共縳送蕭令耳東城謂東府城也按蕭子顯齊書世祖遺詔以鸞為侍中尚書令此時已進錄尚書事粲曰蕭令葢以舊官稱之子隆欲定計鏘以上臺兵力既悉度東府海陵王既即位鸞出鎮東府上臺兵力悉割以自隨度過也且慮事不捷意甚猶豫馬隊主劉巨世祖時舊人詣鏘請間叩頭勸鏘立事鏘命駕將入復還内復扶又翻與母陸太妃别日暮不成行典籖知其謀告之癸酉鸞遣兵二千人圍鏘第殺鏘遂殺子隆及謝粲等於時太祖諸子子隆最壯大有才能太祖當作世祖故鸞尤忌之江州刺史晉安王子懋聞鄱陽隨王死欲起兵謂防閤吳郡陸超之曰事成則宗廟獲安不成猶為義鬼諸王置防閤以勇畧之士為之以防衛齋閤杜佑通典唐制親王府並給防閤庻僕白直下至州縣亦有白直防閤丹陽董僧慧曰此州雖小宋孝武常用之謂宋孝武帝自江州起兵誅元凶劭也若舉兵向闕以請鬰林之罪誰能禦之子懋母阮氏在建康密遣書迎之阮氏報其同母兄于瑶之為計瑶之馳告宣城公鸞乙亥假鸞黄鉞内外纂嚴壬考異曰齊帝紀作乙未按是月申朔上有癸未而下有乙酉丁亥葢癸未當作癸酉乙未當作乙亥耳遣中䕶軍王𤣥邈討子懋又遣軍主裴叔業與于瑶之先襲尋陽聲云為郢府司馬子懋知之遣三百人守湓城叔業泝流直上上時掌翻至夜回襲湓城城局參軍樂賁開門納之諸州刺史各有城局參軍掌修浚備禦子懋聞之帥府州兵力據城自守子懋部曲多雍州人皆勇躍願奮子懋自雍州徙為江州故部曲多雍州人勇當作踴帥讀曰率雍於用翻叔業畏之遣于瑶之說子懋曰今還都必無過憂正當作散官不失富貴也說輸芮翻散悉但翻子懋既不出兵攻叔業衆情稍沮中兵參軍于琳之瑶之兄也說子懋重賂叔業可以免禍子懋使琳之往琳之因說叔業取子懋叔業遣軍主徐𤣥慶將四百人隨琳之入州城僚佐皆奔散沮在呂翻說輸芮翻將即亮翻琳之從二百人拔白刃入齋子懋罵曰小人何忍行此琳之以袖障面使人殺之王𤣥邈執董僧慧將殺之僧慧曰晉安舉義兵僕實預其謀得為主人死不恨矣願至大斂畢退就鼎鑊為于偽翻斂力贍翻下殯斂同鑊户郭翻𤣥邈義之具以白鸞免死配東冶子懋子昭基九嵗以方二寸絹為書參其消息并遺錢五百遺于季翻行金得逹僧慧視之曰郎君書也悲慟而卒卒子恤翻于琳之勸陸超之逃亡超之曰人皆有死此不足懼吾若逃亡非唯孤晉安之眷亦恐田横客笑人田横客事見十一卷漢髙帝五年超之守死故以此言愧琳之𤣥邈等欲囚以還都超之端坐俟命超之門生謂殺超之當得賞密自後斬之頭墜而身不僵僵居良翻𤣥邈厚加殯斂門生亦助舉棺棺墜壓其首折頸而死史言董僧慧陸超之之義烈折而設翻鸞遣平西將軍王廣之襲南兖州刺史安陸王子敬廣之至歐陽歐陽今真州閘即其地也遣部將濟隂陳伯之先驅將即亮翻濟子禮翻伯之因城開獨入斬子敬鸞又遣徐𤣥慶西上害諸王上時掌翻臨海王昭秀為荆州刺史西中郎長史何昌㝢行州事𤣥慶至江陵欲以便宜從事昌㝢曰僕受朝廷意寄意寄謂屬意寄託之翼輔外藩殿下未有愆失君以一介之使來何容即以相付邪使疏吏翻若朝廷必湏殿下當自啓聞更聽後㫖昭秀由是得還建康異考曰南史明帝使裴叔業賫㫖詔昌㝢令以便宜從事昌㝢拒之曰臨海王未有失寜得從君單詔邪即時自有啓聞湏反更議叔業曰若爾便是拒詔拒詔軍法行事答曰能見殺者君也能拒詔者僕也叔業不敢逼而退昭秀由此得還都今從齊書昌㝢尚之之弟子也何昌㝢於此有周昌之節矣鸞以吳興太守孔琇之行郢州事欲使之殺晉熈王銶琇音秀銶音求琇之辭不許遂不食而死琇之靖之孫也孔靖見一百二十三卷晉安帝元興二年裴叔業自尋陽仍進向湘州欲殺湘州刺史南平王銳防閤周伯玉大言於衆曰此非天子意今斬叔業舉兵匡社稷誰敢不從銳典籖叱左右斬之乙酉殺銳又殺郢州刺史晉熈王銶南豫州刺史宜都王鏗丁亥以廬陵王子卿為司徒桂陽王鑠為中軍將軍開府儀同三司冬十月丁酉解嚴尋陽已定諸藩王已死故解嚴以宣城公鸞為太傅領大將軍揚州牧都督中外諸軍事加殊禮進爵為王宣城王謀繼大統多引朝廷名士與參籌策侍中謝朏心不願乃求出為吳興太守至郡致酒數斛遺其弟吏部尚書瀹朏敷尾翻遺于季翻為書曰可力飲此勿豫人事臣光曰臣聞衣人之衣者懐人之憂食人之食者死人之事史記載淮陰侯答蒯徹之言衣人之衣於既翻二謝兄弟比肩貴近安享榮祿危不預知為臣如此可謂忠乎世多有如此而得名者宣城王雖専國政人情猶未服王胛上有赤誌胛古洽翻肩背之間為胛驃騎諮議參軍考城江祏勸王出以示人祐音石考城前漢之甾縣也屬梁國後漢章帝改曰考城屬陳留郡晉惠帝分屬濟陽郡蕭子顯齊志南徐州南濟陽郡有考城縣皆晉氏因郡人南渡而僑置也王以示晉夀太守王洪範曰人言此是日月相卿幸勿泄洪範曰公日月在軀如何可隱當轉言之王洪範禁衛舊臣鸞以此覘之其言如此鸞益無所忌矣相息亮翻王母祏之姑也戊戌殺桂陽王鑠衡陽王鈞江夏王鋒建安王子真巴陵王子倫鑠與鄱陽王鏘齊名鏘好文章鑠好名理好呼到翻時人稱為鄱桂鏘死鑠不自安至東府見宣城王還謂左右曰向錄公見接慇勤鸞以太𫝊錄尚書事太傅上公故稱錄公流連不能已流連不能相捨之意而面有慙色此必欲殺我是夕遇害宣城王每殺諸王常夜遣兵圍其第斬關踰垣呼譟而入家貲皆封籍之江夏王鋒有才行行下孟翻宣城王嘗與之言遥光才力可委鋒曰遥光之於殿下猶殿下之於髙皇衛宗廟安社稷實有攸寄東昏侯之世遥光卒如鋒言宣城王失色及殺諸王鋒遺宣城王書誚責之遺于季翻誚才笑翻宣城王深憚之不敢於第收鋒使兼祠官於太廟祠官使行祭事也夜遣兵廟中收之鋒出登車兵人欲上車上時掌翻鋒有力手撃數人皆仆地然後死宣城王遣典籖柯令孫殺建安王子真姓譜柯姓也吳公子柯廬之後子真走入牀下令孫手牽出之叩頭乞為奴不許而死又遣中書舎人茹法亮殺巴陵王子倫茹音如子倫性英果時為南蘭陵太守鎮琅邪城有守兵晉置南琅邪郡於江乗蒲洲上齊徙治白下北臨江滸故有守兵宣城王恐不肯就死以問典籖華伯茂華户化翻伯茂曰公若以兵取之恐不可即辦若委伯茂一夫力耳乃手自執鴆逼之子倫正衣冠出受詔謂法亮曰先朝昔滅劉氏見一百三十五卷高祖建元元年朝直遥翻今日之事理數固然君是身家舊人茹灋亮事世祖權寄甚重今衘此使當由事不獲已使疏吏翻此酒非勸酬之爵因仰之而死時年十六灋亮及左右皆流涕初諸王出鎮皆置典籖主帥一方之事悉以委之帥所類翻下同時入奏事一嵗數返時主輒與之間語閒讀曰閑訪以州事刺史美惡専繫其口自刺史以下莫不折節奉之恒慮弗及恒户登翻於是威行州部州部謂一州之部内也大為姦利武陵王曅為江州性烈直不可干典籖趙渥之謂人曰今出都易刺史及見世祖盛毁之曅遂免還南海王子罕戍琅邪欲暫游東堂典籖姜秀不許子罕還泣謂母曰兒欲移五步亦不得與囚何異邵陵王子貞嘗求熊白本草圖經曰熊形類犬豕而性輕健好攀緣上髙木見人則顛倒自投而下冬多入宂而藏蟄始春而出其脂謂之熊白十一月取之須其背上者陸佃埤雅曰熊當心有白脂如玉味甚美俗呼熊白厨人答典籖不在不敢與永明中巴東王子響殺劉寅等事見一百三十八卷永明八年世祖聞之謂羣臣曰子響遂反戴僧靜大言曰諸王都自應反豈唯巴東上問其故對曰大主無罪而一時被囚被皮義翻取一挺藕一杯漿皆諮籖帥籖帥不在則竟日忍渴諸州唯聞有籖帥不聞有刺史何得不反竟陵王子良嘗問衆曰士大夫何意詣籖帥參軍范雲曰詣長史以下皆無益詣籖帥立有倍本之價謂所持以詣籖帥而其所得倍其所持之本也不詣謂何子良有愧色及宣城王誅諸王皆令典籖殺之竟無一人能抗拒者孔珪聞之流涕曰齊之衡陽江夏最有意言有意於翼輔帝室而復害之復扶又翻下勿復同若不立籖帥故當不至於此此上歴叙典籖之弊宣城王亦深知典籖之弊乃詔自今諸州有急事當密以奏聞勿復遣典籖入都自是典籖之任浸輕矣蕭子顯論曰帝王之子生長富厚長知兩翻朝出閨閫暮司方岳防驕翦逸積代常典故輔以上佐簡自帝心勞舊左右用為主帥飲食起居動應聞啓處地雖重處昌呂翻行已莫由威不在身恩未下及一朝艱難揔至望其釋位扶危何可得矣左傳諸侯釋位以間王室杜預注曰間猶與也去其位與治王之政事斯宋氏之餘風至齊室而尤弊也諸王置典籖始於宋故云然癸卯以寜朔將軍蕭遥欣為豫州刺史黄門郎蕭遥昌為郢州刺史輔國將軍蕭誕為司州刺史遥昌遥欣之弟誕諶之兄也史言宣城王用其親黨分據方面諶氏壬翻甲辰魏以太尉東陽王丕為太傅錄尚書事留守平城守手又翻戊申魏主親告太廟使髙陽王雍于烈奉遷神主于洛陽辛亥發平城海陵王在位起居飲食皆諮宣城王而後行嘗思食蒸魚菜太官令答無錄公命竟不與辛亥皇太后令曰嗣主冲幼庶政多昧且早嬰尫疾嬰纒也尫烏黄翻弱也杜預曰瘠疾也弗克負荷荷下可翻又如字太傅宣城王𦙍體宣皇鍾慈太祖蕭承之追謚宣皇帝太祖之父而鸞之祖也太祖又素愛鸞故云然宜入承寳命帝可降封海陵王吾當歸老别館蕭子顯齊書自此以上著於海陵王紀且以宣城王為太祖第三子蕭子顯齊書此語著於明帝紀癸亥髙宗即皇帝位大赦改元此時方改元建武以太尉王敬則為大司馬司空陳顯逹為太尉尚書令王晏加驃騎大將軍驃匹妙翻騎竒寄翻左僕射徐孝嗣加中軍大將軍中領軍蕭諶為領軍將軍度支尚書虞悰稱疾不陪位悰徂宗翻帝以悰舊人欲引參佐命使王晏齎廢立事示悰悰曰主上聖明公卿戮力寜假朽老以賛惟新乎詩曰其命維新不敢聞命因慟哭史言虞悰柔而能正過謝瀹兄弟逺甚朝議欲糾之朝直遥翻徐孝嗣曰此亦古之遺直乃止帝與羣臣宴㑹詔功臣上酒王晏等興席上時掌翻興起也謝瀹獨不起曰陛下受命應天順人王晏妄叨天功以為已力帝大笑解之座罷晏呼瀹共載還令省令省謂尚書令所舍也瀹正色曰卿巢窟在何處晏甚憚之丁卯詔藩牧守宰或有薦獻事非任土謂非如禹貢任土作貢也悉加禁斷斷音短己巳魏主如信都庚午詔曰比聞緣邊之蠻多竊掠南土比毗至翻使父子乖離室家分絶朕方蕩壹區宇子育萬姓若茍如此南人豈知朝徳哉謂江南之人將不知魏朝之徳也朝直遥翻可詔荆郢東荆三州禁勒蠻民勿有侵暴魏初置荆州於上洛太和中徙治穰城置郢州於真陽真陽漢汝南郡之慎陽縣也置東荆州於沘陽十一月癸酉以始安王遥光為揚州刺史丁丑魏主如鄴庚辰立皇子寳義為晉安王寳𤣥為江夏王夏户雅翻寳源為廬陵王寳寅為建安王寳融為隨郡王寳攸為南平王甲申詔曰邑宰祿薄雖任土恒貢自今悉斷觀此則江左之政縣邑不由郡州亦得入貢天臺矣乙酉追尊始安真王為景皇妃為懿后丙戌以聞喜公遥欣為荆州刺史豐城公遥昌為豫州刺史時上長子晉安王寳義有廢疾痼疾不可復用為廢疾長知兩翻諸子皆弱小故以遥光居中居中謂為揚州刺史遥欣鎮撫上流戊子立皇子寳卷為太子卷讀曰捲魏主至洛陽欲澄清流品以尚書崔亮兼吏部郎亮道固之兄孫也宋㤗始初崔道固降魏魏主敇後軍宇文福行牧地福表石濟以西河内以東距河凡十里行下孟翻牧地縱則石濟以西河内以東横則距河十里按杜佑通典衛州汲縣古牧野之地則其地宜畜牧有自來矣魏主自代徙雜畜置其地使福掌之畜無耗失畜許救翻以為司衛監初世祖平統萬及秦涼宋文帝元嘉四年魏平統萬八年赫連定滅秦定尋西奔為吐谷渾所禽秦地皆入于魏十六年魏平凉州以河西水草豐美用為牧地畜甚蕃息蕃讀如繁馬至二百餘萬匹槖駞半之牛羊無數及髙祖置牧場於河陽常畜戎馬十萬匹河陽牧埸即宇文福所規牧地畜許六翻每嵗自河西徙牧并州稍復南徙復扶又翻欲其漸習水土不至死傷而河西之牧愈更蕃滋及正光以後皆為寇盜所掠無孑遺矣梁武帝普通元年魏改元正光史厯言魏之馬政永明中御史中丞沈淵表百官年七十皆令致仕用古者七十而致事之說並窮困私門庚子詔依舊銓叙上輔政所誅諸王皆復屬籍封其子為侯上詐稱海陵恭王有疾數遣御師瞻視數所角翻御師醫師也以其供御故謂之御師至于隋世尚藥局有侍御醫又有醫師因而殞之葬禮並依漢東海恭王故事漢東海王彊以天下讓葬用殊禮魏郢州刺史韋珍韋珍先以樂陵鎮將與東荆州刺史桓誕同鎮沘陽尋為郢州刺史在州有聲績魏主賜以駿馬榖帛珍集境内孤貧者悉散與之謂之曰天子以我能綏撫卿等故賜以榖帛吾何敢獨有之魏主以上廢海陵王自立謀大舉入寇㑹邊將言雍州刺史下邳曹虎遣使請降於魏將即亮翻雍於用翻使疏吏翻降户江翻十一月辛丒朔魏遣行征南將軍薛真度督四將向襄陽大將軍劉昶平南將軍王肅向義陽徐州刺史拓跋衍向鍾離平南將軍廣平劉藻向南鄭真度安都從祖弟也從才用翻以尚書僕射盧淵為安南將軍督襄陽前鋒諸軍淵辭以不習軍旅不許淵曰但恐曹虎為周魴耳周魴事見七十一卷魏明帝太和二年魴符方翻魏主欲變易舊風壬寅詔禁士民胡服國人多不恱國人者與魏同起於北荒之子孫也通直散騎常侍劉芳纉之族弟也劉纉臣於齊而屢使於魏與芳皆彭城人葢同出於楚元王之後與給事黄門侍郎太原郭祚皆以文學為帝所親禮多引與講論及密議政事大臣貴戚皆以為踈已怏怏有不平之色怏許兩翻帝使給事黄門侍郎陸凱私諭之曰至尊但欲廣知古事詢訪前世法式耳終不親彼而相疎也衆意乃稍解凱馛之子也陸馛見一百三十三卷宋明帝泰始七年馛蒲撥翻魏主欲自將入寇癸卯中外戒嚴戊申詔代民遷洛者復租賦三年復方目翻相州刺史髙閭相息亮翻上表稱洛陽草創曹虎既不遣質任必無誠心質音致無宜輕舉魏主不從久之虎使竟不再來使疏吏翻魏主引公卿問行留之計公卿或以為宜止或以為宜行帝曰衆人紛紜莫知所從必欲盡行留之勢宜有客主共相起𤼵任城鎮南為留議鎮南為鎮軍任音壬朕為行論諸公坐聽得失長者從之衆皆曰諾鎮軍將軍李冲曰臣等正以遷都草創人思少安少詩沼翻為内應者未得審諦諦音帝亦審也不宜輕動帝曰彼降欵虛實誠未可知降中江翻若其虛也朕巡撫淮甸訪民疾苦使彼知君德之所在有北向之心若其實也今不以時應接則失乗時之機孤歸義之誠敗朕大畧矣孤負也敗補邁翻任城王澄曰虎無質任又使不再來其詐可知也今代都新遷之民皆有戀本之心扶老㩦㓜始就洛邑居無一椽之室椽重緣翻食無甔石之儲應劭曰齊人名小甕為甔甔受二石甔音都濫翻又冬月垂盡東作將起乃百堵皆興俶載南畝之時百堵皆興謂新遷之人當作室也俶載南畝謂入春當東作也二語皆詩語俶昌六翻始也而驅之使擐甲執兵泣當白刃殆非歌舞之師也武王伐紂前歌後舞擐音宦且諸軍已進非無應接若降欵有實待既平樊沔然後鑾輿順動亦何晩之有今率然輕舉率然輕易之意上下疲勞若空行空返恐挫損天威更成賊氣非䇿之得者也司空穆亮以為宜行公卿皆同之澄謂亮曰公輩在外之時見張旗授甲皆有憂色平居論議不願南征何得對上即為此語面背不同事涉欺佞豈大臣之義國士之體乎萬一傾危皆公輩所為也冲曰任城王可謂忠於社稷帝曰任城以從朕者為佞不從朕者豈必皆忠夫小忠者大忠之賊無乃似諸澄曰臣愚闇雖涉小忠要是竭誠謀國不知大忠者竟何所據帝不從辛亥發洛陽以北海王詳為尚書僕射統留臺事李冲兼僕射同守洛陽給事黄門侍郎崔休為左丞趙郡王幹都督中外諸軍事始平王勰將宗子軍宿衛左右將即亮翻休逞之𤣥孫也魏道武伐中山崔逞降之戊辰魏主至懸瓠己巳詔夀陽鍾離馬頭之師所掠男女皆放還南曹虎果不降降户江翻魏主命盧淵攻南陽淵以軍中乏糧請先攻赭陽以取葉倉魏主許之赭陽即漢晉之堵陽縣堵亦音者至宋時猶屬南陽郡至蕭子顯齊書赭陽葉二縣皆不見於志下言北襄城太守成公期拒魏則北襄城郡置于赭陽明矣葉式涉翻乃與征南大將軍城陽王鸞安南將軍李佐荆州刺史韋珍共攻赭陽曰考異齊書作盧陽烏韋靈智按陽烏淵小字靈智珍字也鸞長夀之子城陽王長夀見一百三十二年宋蒼梧王元徽三年佐寳之子也宋文帝元嘉二十一年李寳入朝于魏北襄城太守成公期閉城拒守薛真度軍于沙堨堨烏葛翻堨壅也聚沙以壅水故以為地名南陽太守房伯玉新野太守劉思忌拒之晉武帝太康中分南陽置義陽郡惠帝又分義陽南陽置新野郡先是魏主遣中書監髙閭治古樂先悉薦翻治直之翻㑹閭出為相州刺史是嵗表薦著作郎韓顯宗太樂祭酒公孫崇參知鐘律帝從之太樂祭酒葢太和中初置是官資治通鑑卷一百三十九
