body:
  text: 資治通鑑卷二十三宋司馬光撰胡三省音註漢紀十五起旃䝉協洽盡柔兆敦牂凡十二年孝昭皇帝上諱弗陵武帝少子也張晏曰後以二名難諱但名弗荀悅曰諱弗之字曰不應劭曰禮諡法聖聞周逹曰昭始元元年夏益州夷二十四邑三萬餘人皆反遣水衡都尉吕破胡募吏民及發犍為蜀郡犇命徃擊大破之犍為蜀郡皆屬益州犍為郡唐瀘戎嘉眉榮資簡州地蜀郡唐成都府彭蜀卭雅翼茂州之地應劭曰舊時郡國皆有材官騎士以赴急難今夷反常兵不足以討之故權發精勇聞命犇走故謂之犇命李竒曰平居發二十以上至五十為甲卒今者五十以上六十以下為犇命犇命言急也師古曰應說是余據左傳子重子反一歲七奔命奔命者救急之師固不拘五十以上六十以下也犍居言翻秋七月赦天下大雨至於十月渭橋絶武帝初崩賜諸矦王璽書左傳襄公在楚季武子使公冶問璽書追而與之盖君臣通用也秦漢以來惟至尊以為信燕王旦得書不肻哭曰璽書封小張晏曰文小則封小京師疑有變遣幸臣夀西長孫縱之王孺等之長安蘇林曰夀西姓長名師古曰之徃也以問禮儀為名隂刺候朝廷事刺七亦翻探也及有詔褒賜旦錢三十萬益封萬三千户旦怒曰我當為帝何賜也遂與宗室中山哀王子長齊孝王孫澤等結謀中山哀王昌靖王勝子齊孝王將閭悼惠王肥子詐言以武帝時受詔得職吏事修武僃偹非常如淳曰諸侯不得治民與職事是以詐言受詔得知職事發兵為備也郎中成軫謂旦曰大王失職獨可起而索姓譜成姓本自周文王成伯之後周有成肅公又楚有令尹成得臣師古曰失職謂當為漢嗣而不被用也索求也音山客翻不可坐而得也大王壹起國中雖女子皆奮臂隨大王旦即與澤謀為姦書言少帝非武帝子大臣所共立天下宜共伐之使人傳行郡國以揺動百姓澤謀歸發兵臨菑臨菑齊郡太守青州刺史治所殺青州刺史雋不疑雋辭兖翻旦招來郡國姦人賦斂銅鐵作甲兵數閱其車騎材官卒發民大獵以講士馬須期日師古曰講習也須待也余謂澤歸臨菑謀舉兵故旦閲兵以待期數所角翻下同郎中韓義等數諫旦旦殺義等凡十五人㑹缾矦成知澤等謀成菑川靖王之子班志缾侯國屬琅邪郡缾歩丁翻以告雋不疑八月不疑收捕澤等以聞天子遣大鴻臚丞治續漢志大鴻臚丞秩千石臚陵如翻連引燕王有詔以燕王至親勿治而澤等皆伏誅遷雋不疑為京兆尹百官表武帝太初元年改右内史為京兆尹張晏曰地絶髙曰京左傳曰莫之與京十億曰兆尹正也師古曰京大也兆者衆數言大衆所在故云京兆也酈道元曰尹正也所以董正京畿率先百郡也孔穎達曰釋詰文曰萬億曰兆依如筭法億之數有大小二法其小數以十為等十萬為億十億為兆也其大數以萬億為等萬至萬是萬之為億又從億而數至萬億曰兆億億曰兆億億曰秭兆在億秭之間不疑為京兆尹吏民敬其威信每行縣録囚徒還師古曰省録之知其情狀有寃滯與否也今云慮囚本録聲之去者耳音力具翻而近俗不曉其意訛其文遂為思慮之慮失其源也甚矣行下孟翻其母輒問不疑有所平反活幾何人即不疑多有所平反毛晃曰平反理正幽枉也反音幡母喜笑異於他時或無所出母怒為不食為於偽翻故不疑為吏嚴而不殘九月丙子秺敬矦金日磾薨秺音妬磾丁奚翻初武帝病有遺詔封金日磾為秺侯上官桀為安陽矦恩澤侯表安陽矦食邑於河内之蕩隂水經註陜縣有安陽城武帝封上官桀為侯國霍先為博陸矦文頴曰博大陸平取其嘉名無此縣也食邑於北海河間東郡師古曰盖亦取郷聚之名以為國號非必縣也博陸初封食北海河間後益封食東郡皆以前捕反者馬何羅等功封捕馬何羅事見上卷武帝後元元年日磾以帝少不受封少詩照翻光等亦不敢受及日磾病困光白封日磾卧受印綬一日薨日磾兩子賞建俱侍中與帝畧同年共卧起賞為奉車建駙馬都尉及賞嗣侯佩兩綬上謂霍將軍曰金氏兄弟兩人不可使俱兩綬邪對曰賞自嗣父為矦耳上笑曰矦不在我與將軍乎對曰先帝之約有功乃得封矦遂止閏月遣故廷尉王平等五人持節行郡國舉賢良問民疾苦寃失職者行下孟翻冬無冰二年春正月封大將軍光為博陸矦按師古注光初封食邑北海河間左將軍桀為安陽侯桀食邑蕩隂或說霍光曰將軍不見諸吕之事乎處伊尹周公之位說式芮翻處昌吕翻攝政擅權而背宗室不與共職是以天下不信卒至於滅亡背蒲妹翻卒子恤翻今將軍當盛位帝春秋富宜納宗室又多與大臣共事服䖍曰共議事也師古曰每事皆與叅共知之反諸吕道如是則可以免患師古曰言諸呂専權而滅亡今納宗室是反其道乃可免患也光然之乃擇宗室可用者遂拜楚元王孫辟彊及宗室劉長樂皆為光禄大夫辟彊守長樂衛尉漢長樂建章甘泉各有衛尉以掌其宫衛然不常置樂音洛三月遣使者振貸貧民無種食者師古曰種者五榖之種也食者所以為糧食也種之勇翻秋八月詔曰徃年災害多今年蠺麥傷所振貸種食勿收責毋令民出今年田租初武帝征伐匈奴深入窮追二十餘年匈奴馬畜孕重墯殰罷極苦之師古曰孕重懐任者也墯落也殰敗也罷極困也苦之心厭苦也罷讀曰疲殰音讀鄭𤣥曰内敗曰殰陸云謂懐任不成也常有欲和親意未能得狐鹿孤單于有異母弟為左大都尉賢國人鄉之郷讀曰嚮謂悉皆附之母閼氏恐單于不立子而立左大都尉也閼氏音煙支乃私使殺之左大都尉同母兄怨遂不肻復㑹單于庭復扶又翻是歲單于病且死謂諸貴人我子少不能治國立弟右谷蠡王少詩照翻治直之翻谷蠡音鹿黎及單于死衛律等與顓渠閼氏謀顓渠閼氏單于之正室也位大閼氏上匿其䘮矯單于令更立子左谷蠡王為壺衍鞮單于更工衡翻左賢王右谷蠡王怨望率其衆欲南歸漢恐不能自致即脅盧屠王欲與西降烏孫降户江翻盧屠王告之單于使人驗問右谷蠡王不服反以其罪罪盧屠王國人皆寃之于是二王去居其所不復肻㑹龍城匈奴諸王長少嵗正月㑹單于庭五月大㑹龍城祭其先天地鬼神今二王自居其本處不復㑹祭龍城也復扶又翻匈奴始衰三年春二月有星孛于西北孛蒲内翻冬十一月壬辰朔日有食之初霍光與上官桀相親善光每休沐出漢制中朝官五日一下里舍休沐三署諸郎亦然桀常代光入决事光女為桀子安妻生女年甫五嵗甫始也安欲因光内之宫中光以為尚幼不聽盖長公主私近子客河間丁外人地理志盖縣屬泰山郡師古曰食邑於鄂為盖侯所尚故曰盖長公主長公主儀比諸王帝姊妹乃稱之盖侯王充武帝舅王信之子襲爵盖如字又古盍翻子客子賔客也丁姓外人其名長知兩翻下同近其靳翻安素與外人善說外人曰説式芮翻安子容貌端正誠因長主時得入為后以臣父子在朝而有椒房之重師古曰椒房殿在未央宫中皇后所居以椒和泥塗壁取其温而芳朝直遥反成之在於足下漢家故事常以列矦尚主足下何憂不封矦乎外人喜言于長主長主以為然詔召安女為倢伃倢伃音接予安為騎都尉為安父子與霍光争權謀亂張本四年春三月甲寅立皇后上官氏赦天下西南夷姑繒葉榆復反姑繒葉榆皆西南夷别種其所居地在益州郡界葉榆澤名武帝開為縣繒慈陵翻葉式涉翻遣水衡都尉吕辟胡將益州兵擊之此益州刺史所部兵也宋昌漢武帝元鼎中分雍州之南置益州釋名曰益阨也所在之地險阨也應劭地理風俗記曰疆理益廣故曰益州班志漢中廣漢蜀郡越嶲益州牂柯巴郡皆屬益州師古曰辟音璧辟胡不進蠻夷遂殺益州太守武帝元封二年開滇王國置益州郡治滇池縣守式又翻乗勝與辟胡戰士戰及溺死者四千餘人冬遣大鴻臚田廣明擊之臚陵如翻廷尉李种坐故縱死罪种音冲棄市是歳上官安為車騎將軍今考異曰昭紀作驃騎從百官表外戚傳五年春正月追尊帝外祖趙父為順成矦順成矦趙父鉤弋夫人之父也父時已死追封為順成矦置園邑三百户于扶風順成侯有姊君姁師古曰姁音况羽翻賜錢二百萬奴婢第宅以充實焉諸昆弟各以親疏受賞賜孔頴達曰五服之内大功已上服麄者為親小功已下服精者為疏疏與疎同無在位者有男子乗黄犢車詣北闕未央宫北闕蕭何築也師古曰未央宫雖南向而上書奏事謁見者皆詣北闕公車司馬在焉自謂衛太子公車以聞班表公車屬衛尉天下上事皆總領之師古曰公車主受章奏詔使公卿將軍中二千石雜識視師古曰雜共也有素識之者令視知其是非也長安中吏民聚觀者數萬人右將軍勒兵闕下以備非常丞相御史中二千石至者並莫敢發言京兆尹不疑後到叱從吏收縛從才用翻或曰是非未可知且安之安猶徐也不疑曰諸君何患於衛太子昔蒯聵違命出奔輙距而不納春秋是之師古曰蒯聵衛靈公太子輒蒯聵子也蒯聵得罪於靈公而出奔晉及靈公卒使輒嗣位晉趙鞅納蒯聵於戚欲求入衛齊國夏衛石曼姑帥師圍戚公羊傳曰曼姑受命於靈公而立輙曼姑之義固可以距蒯聵也輙之義可以立乎曰可奈何不以父命辭王父命也蒯苦怪翻瞆五怪翻衛太子得罪先帝亡不即死即就也今來自詣此罪人也遂送詔獄天子與大將軍霍光聞而嘉之曰公卿大臣當用有經術明於大誼者繇是不疑名聲重於朝廷在位者皆自以不及也廷尉驗治何人凡不知姓名及所從來皆曰何人竟得姦詐本夏陽人姓成名方遂居湖以卜筮為事有故太子舍人嘗從方遂卜謂曰子狀貌甚似衛太子方遂心利其言冀得以富貴坐誣罔不道要斬要與腰同又考異曰昭紀云張延年雋不疑傳云成方遂云一姓張名延年今從不疑傳夏六月封上官安為桑樂侯恩澤侯表桑樂侯食邑於千乘樂來各翻安日以驕滛受賜殿中對賔客言與我壻飲大樂樂音洛見其服飾使人歸欲自燒物子病死仰而罵天其頑悖如此悖蒲内翻罷儋耳真番郡武帝元鼎六年置儋耳郡元封二年置眞番郡今皆罷之儋都甘翻秋大鴻臚廣明軍正王平擊益州斬首捕虜三萬餘人獲畜産五萬餘頭諫大夫杜延年見國家承武帝奢侈師旅之後數為大將軍光言年歲比不登數所角翻為於偽翻比毗至翻流民未盡還宜修孝文時政示以儉約寛和順天心說民意說讀曰悅年歲宜應光納其言延年故御史大夫周之子也六年春二月詔有司問郡國所舉賢良文學民所疾苦教化之要皆對願罷鹽鐵酒𣙜均輸官鹽鐵事始見十九卷武帝元狩四年均輸事始見二十卷元鼎三年酒𣙜事始見上卷天漢三年𣙜古岳翻毋與天下争利示以儉節然後教化可興桑𢎞羊難以為此國家大業所以制四夷安邉足用之本不可廢也難乃旦翻於是鹽鐵之議起焉師古曰議罷鹽鐵之官百姓皆得鬻鹽鑄錢因摠論政治得失也據班史藝文志有鹽鐵論十篇今行於世初蘇武既徙北海上事見二十一卷天漢元年禀食不至禀給也掘野䑕去草實而食之蘇林曰掘野䑕所去草實而食之張晏曰取䑕及草實并而食之師古曰蘇說是去謂藏之也貢父曰今北方野䑕甚多皆可食也武掘野䑕得即食之其草實乃頗去藏耳去丘吕翻杖漢節牧羊卧起操持節旄盡落操千髙翻武在漢與李陵俱為侍中陵降匈奴不敢求武久之降匈奴事見二十一卷天漢二年降户江翻下同單于使陵至海上為武置酒設樂為于偽翻下同因謂武曰單于聞陵與子卿素厚子卿蘇武字故使來說足下虚心欲相待終不得歸漢空自苦亡人之地說式芮翻亡古無字通信義安所見乎見賢遍反足下兄弟二人前皆坐事自殺來時太夫人已不幸不幸謂死也子卿婦年少少詩照翻聞已更嫁矣獨有女弟二人兩女一男今復十餘年更工衡翻復扶又翻下同存亡不可知人生如朝露師古曰朝露見日則晞乾人命短促亦如之何久自苦如此陵始降時忽忽如狂自痛負漢加以老母繫保宫班表少府屬官有居室武帝太初元年更名保宫子卿不欲降何以過陵且陛下春秋髙法令無常大臣無罪夷滅者數十家安危不可知子卿尚復誰為乎武曰武父子無功徳皆為陛下所成就位列將爵通侯兄弟親近皆為如字將即亮翻近其靳翻常願肝腦塗地今得殺身自效雖斧鉞湯鑊誠甘樂之師古曰鼎大而無足曰鑊樂音洛臣事君猶子事父也子為父死無所恨願勿復再言陵與武飲數日復曰子卿壹聽陵言武曰自分已死久矣分扶問翻王必欲降武匈奴封李陵為右校王故稱之請畢今日之驩効死於前陵見其至誠喟然嘆曰嗟乎義士陵與衛律之罪上通于天因泣下霑衿與武决去師古曰决别也賜武牛羊數十頭後陵復至北海上語武以武帝崩武南郷號哭歐血旦夕臨數月語牛倨翻郷讀曰嚮號户髙翻臨哭也力禁翻及壺衍鞮單于立母閼氏不正閼氏音煙支國内乖離常恐漢兵襲之於是衛律為單于謀與漢和親漢使至求蘓武等匈奴詭言武死後漢使復至匈奴常惠私見漢使教使者謂單于謂告語也言天子射上林中得鴈足有係帛書言武等在某澤中使者大喜如惠語以讓單于單于視左右而驚謝漢使曰武等實在乃歸武及馬宏等馬宏者前副光禄大夫王忠使西國西國謂西域諸國使疏吏翻為匈奴所遮忠戰死馬宏生得亦不肯降故匈奴歸此二人欲以通善意於是李陵置酒賀武曰今足下還歸還音旋又如字揚名於匈奴功顯於漢室雖古竹帛所載丹青所畫何以過子卿陵雖駑怯令漢貰陵罪駑音奴貰寛也貰時夜翻全其老母使得奮大辱之積志庻幾乎曹柯之盟李竒曰言欲刼單于如曹劌劫齊桓公柯盟之時幾居衣翻此陵宿昔之所不忘也收族陵家為世大戮事見上卷天漢三年陵尚復何所顧乎已矣令子卿知吾心耳陵泣下數行行戸剛翻因與武决單于召㑹武官屬前已降及物故凡隨武還者九人既至京師詔武奉一太牢謁武帝園廟程大昌演繁露曰牛羊豕具為太牢有羊豕而無牛則為少牢今人獨以太牢名牛失之矣拜為典屬國秩中二千石班表典屬國本秦官掌歸義蠻夷漢因之今以命武以武久在匈奴中習外夷事故使為是官其後省併大鴻臚賜錢二百萬公田二頃宅一區武留匈奴凡十九歲始以彊壯出及還須髪盡白須與鬚同霍光上官桀與李陵素善遣陵故人隴西任立政等三人俱至匈奴招之陵曰歸易耳易以䜴翻丈夫不能再辱遂死於匈奴陵意謂降匈奴已辱矣今若歸漢漢將使刀筆吏簿責其䘮師降匈奴之罪是謂再辱也故遂不歸夏旱秋七月罷𣙜酤官從賢良文學之議也酤古護翻武帝之末海内虚耗户口减半霍光知時務之要輕徭薄賦與民休息至是匈奴和親百姓充實稍復文景之業焉詔以鉤町侯毋波鉤町西南夷種武帝開為縣屬牂柯郡雖置官吏而仍以其君長為鉤町矦使主其種類鉤音劬町音梃母波漢書作亡波亡古無字也率其邑君長人民擊反者有功長如兩翻立以為鉤町王賜田廣明爵關内侯元鳳元年應劭曰三年中鳳凰比下東海海西樂郡故以冠元春武都氐人反武都郡屬凉州氐人即白馬氐也魚豢魏畧曰其人分竄山谷或號青氐或號白氐氐丁奚翻遣執金吾馬適建龍頟侯韓増大鴻臚田廣明將三輔太常徒皆免刑擊之師古曰姓馬適名建也據班書功臣表弓髙侯韓頽當之孫說以擊匈奴功封龍頟侯坐酎金失侯復以破東越功封按道侯後為衛太子所殺子興嗣侯坐巫蠱誅後元元年復以増嗣龍頟侯増興弟也班志龍頟侯國屬平原郡頟音洛作額者非崔浩曰今有龍頟村蘇林曰是時太常主諸陵縣治民也余謂此刑徒輸作三輔及太常者也夏六月赦天下秋七月乙亥晦日有食之既八月改元上官桀父子既尊盛徳長公主欲為丁外人求封侯霍光不許又為外人求光禄大夫欲令得召見又不許盖主大以是怨光而桀安數為外人求官爵弗能得亦慙長知兩翻為于偽翻數所角翻又桀妻父幸充國為太醫監充國史失其姓大醫監屬少府䦨入殿中闌妄也漢制諸入宫殿門皆著籍無藉而妄人謂之䦨入下獄當死冬月且盡漢論上囚不過冬月下遐嫁翻盖主為充國入馬二十匹贖罪乃得减死論於是桀安父子深怨光而重徳盖主自先帝時桀已為九卿位在光右武帝時桀為太僕位九卿秩中二千石光為奉車太尉光禄大夫秩比二千石是桀之位在光右也右上也及父子並為將軍桀為左將軍安為車騎將軍皇后親安女光乃其外祖而顧專制朝事師古曰顧猶反也朝直遥翻由是與光争權燕王旦自以帝兄不得立常懐怨望及御史大夫桑𢎞羊建造酒𣙜鹽鐵為國興利伐其功伐矜也𣙜古岳翻為於偽翻下同欲為子弟得官亦怨恨光於是盖主桀安𢎞羊皆與旦通謀旦遣孫縱之等前後十餘輩多齎金寶走馬賂遺盖主桀𢎞羊等師占曰走馬馬之善走者也遺于季翻桀等又詐令人為燕王上書言光出都肄郎羽林孟康曰都試也肄習也張晏曰都肄郎羽材也師古曰都大也大㑹試之漢光禄勲令諸當試者不㑹都所免之都肄謂緫閱試習武偹也肄羊至翻道上稱䟆天子出稱䟆以清道止行人䟆與蹕同太官先置師古曰供飲食之具太官屬少府主膳食凡車駕所幸太官先徃其處供置又引蘇武使匈奴二十年不降乃為典屬國實十九年而言二十者欲久其事以見寃屈故言多也使䟽史翻降户江翻大將軍長史敞無功為搜粟都尉又擅調益莫府校尉師古曰調選也莫府大將軍府也調音徒釣翻光專權自姿疑有非常臣旦願歸符璽人宿衛察姦臣變璽斯氏翻候司光出沐日奏之桀欲從中下其事伺光出沐不在禁中桀欲自從禁中下其事也司讀曰伺師古曰下謂下有司也下音胡稼翻下同𢎞羊當與諸大臣共執退光當者以之自任也書奏帝不肻下明旦光聞之止畫室中不入如淳曰近臣調計畫之室或曰雕畫之室師古曰雕畫是也上問大將軍安在左將軍桀對曰以燕王告其罪故不敢入有詔召大將軍光入免冠頓首謝上曰將軍冠師古曰令復著冠也朕知是書詐也將軍無罪光曰陛下何以知之上曰將軍之廣明都郎近耳師古曰之徃也廣明亭名今據廣明亭在長安城東東都門外水經注京兆奉明縣廣成郷有廣明苑史皇孫及王夫人葬于郭北宣帝移于苑北以為悼園在東都門外調校尉以來未能十日燕王何以得知之且將軍為非不須校尉文頴曰帝云將軍欲反不由一校尉是時帝年十四尚書左右皆驚班表少府屬官有尚書等十二官令丞又有中書謁者等七官令丞續漢志尚書令千石本注曰承秦所置武帝用宦者更為中書謁者令成帝用士人復故掌凡選署及奏下尚書曹文書衆事余據表則尚書中書為兩官據續志則合為一官此時既有尚書則與中書謁者為兩官明矣沈約曰秦世少府遣吏四人在殿中主發書故謂之尚書尚猶主也漢初有尚冠尚衣尚席尚浴尚食尚書故謂之六尚秦時尚書有令有僕射有丞至漢並𨽻少府武帝使左右曹諸吏分平尚書事昭帝即位霍光領尚書約又曰漢武遊後庭始使宦者典尚書事謂之中書謁者置令僕射成帝改中書謁者令為中謁者令罷謁者東京省中謁者令而有中宫謁者令非其職也沈約亦以尚書中書為兩官明矣而上書者果亡捕之甚急桀等懼白上小事不足遂師古曰遂猶竟也言不須窮竟也上不聽後桀黨與有譛光者上輙怒曰大將軍忠臣先帝所屬以輔朕身敢有毁者坐之自是桀等不敢復言屬之欲翻復扶又翻李徳裕論曰人君之徳莫大於至明明以照姦則百邪不能蔽矣漢昭帝是也周成王有慙徳矣髙祖文景俱不如也成王聞管蔡流言遂使周公狼䟦而東漢髙聞陳平去魏背楚欲捨腹心臣背蒲妹翻漢文惑季布使酒難近罷歸股肱郡疑賈生擅權紛亂復踈賢士景帝信誅晁錯兵解遂戮三公武王崩周公相成王管叔蔡叔流言於國曰公將不利于孺子周公于是東征成王不知周公之志公乃為䲭鴞之詩周大夫亦為賦狼䟦之詩曰狼跋其胡載疐其尾毛氏註云䟦躐也疐跲也老狼有胡進則躐其胡退則跲其尾進退有難然而不失其猛疏曰李廵曰䟦前行曰躐跲却頓曰疐也說文云䟦蹎丁千翻跲躓竹二翻躓即疐也然則䟦與疐皆是顚倒之類以䟦為躐者謂䟦其胡而倒耳老狼有胡謂頷垂胡近則躐其胡謂躐胡而前倒也退則跲其尾謂却頓而倒於尾上也髙祖疑陳平事見九卷二年文帝罷季布事見十四卷前四年疎賈生事同上景帝誅晁錯事見十六卷前三年所謂執狐疑之心來讒賊之口劉向之言使昭帝得伊呂之佐則成康不足侔矣桀等謀令長公主置酒請光伏兵格殺之因廢帝迎立燕王為天子旦置驛書徃來相報許立桀為王外連郡國豪桀以千數旦以語相平平為燕相史失其姓語牛倨翻平曰大王前與劉澤結謀事未成而發覺者以劉澤素夸好侵陵也好呼到翻平聞左將軍素輕易車騎將軍少而驕易以豉翻少詩照翻臣恐其如劉澤時不能成又恐既成反大王也旦曰前日一男子詣闕自謂故太子長安中民趣郷之趣七喻翻郷讀曰嚮正讙不可止師古曰人衆既多故讙譁讙况爰翻大將軍恐出兵陳之以自備耳我帝長子帝謂武帝長知兩翻天下所信何憂見反後謂羣臣盖主報言獨患大將軍與右將軍王莽張晏曰王莽天水人也字稚叔今右將軍物故丞相病幸事必成徴不久令羣臣皆裝令皆治行裝也安又謀誘燕王至而誅之誘音酉因廢帝而立桀或曰當如皇后何安曰逐麋之狗當顧莬邪師古曰言所求者大不顧小也糜鹿之大者莬讀曰吐故翻且用皇后為尊一旦人主意有所移雖欲為家人亦不可得家人謂凡庶匹夫也此百世之一時也㑹盖主舍人父稻田使者燕倉知其謀如淳曰特為諸稻田置使者假與民收其稅入也燕音煙姓譜召公封于燕其後為秦所滅子孫以為氏以告大司農楊敞敞素謹畏事不敢言乃移病卧師古曰移病謂移書言病一曰以病而移居尒謂前說是以告諫大夫杜延年延年以聞九月詔丞相部中二千石逐捕孫縱之及桀安𢎞羊外人等并宗族悉誅之盖主自殺燕王旦聞之召相平曰事敗遂發兵乎相息亮翻平曰左將軍已死百姓皆知之不可發也王憂懣師古曰懣音滿又音悶煩也置酒與羣臣妃妾别㑹天子以璽書讓旦璽斯氏翻旦以綬自絞死后夫人隨旦自殺者二十餘人天子加恩赦王太子建為庶人賜旦諡曰刺王刺來違翻諡法暴戾無親曰刺皇后以年少不與謀與讀曰豫亦霍光外孫故得不廢庚午右扶風王訢為御史大夫訢與欣同冬十月封杜延年為建平侯班表建平侯食邑于濟陽燕倉為宜城矦宜城矦食邑於濟隂故丞相徴事任宫捕得桀為弋陽矦文頴曰徴事丞相官屬位差尊掾屬也如淳曰時宫以時事待詔丞相府故曰丞相徵事張晏曰漢儀注徴事比六百石皆故吏二千石不以贓罪免者為徴事絳衣奉朝賀正月師古曰張說是班志弋陽侯國屬汝南郡任音壬丞相少史王山夀誘安入府為商利侯如淳曰漢儀注武帝置丞相少史秩四百石班表商利侯食邑於臨淮之徐少詩照翻久之文學濟隂魏相對䇿濟隂郡屬兖州唐為曹州濟子禮翻以為日者燕王為無道韓義出身彊諫為王所殺義無比干之親而蹈比干之節比干紂之賢臣諌紂而死宜顯賞其子以示天下明為人臣之義乃擢義子延夀為諌大夫大將軍光以朝無舊臣朝無直遥翻光禄勲張安世自先帝時為尚書令班表少府屬官有尚書令續漢志尚書令承秦所置掌凡選署及奏下尚書曹文書衆事秩千石志行純篤行下孟翻乃白用安世為右將軍兼光禄勲以自副焉安世故御史大夫湯之子也光又以杜延年有忠節以其發燕盖上官之謀也擢為太僕右曹給事中太僕正卿右曹給事中加官也晉灼曰漢儀注諸吏給事中日上朝謁平尚書奏事分為左右曹班表給事中掌顧問慮對位中常待下盖得入出禁中光持刑罰嚴延年常輔之以寛吏民上書言便宜輙下延年平處復奏下遐嫁翻先平處其可否復奏言之處昌吕翻可官試者至為縣令或丞相御史除用滿歲以狀聞或抵其罪法師古曰抵至也言事之人有姦妄者則致之於罪法是歲匈奴發左右部二萬騎為四隊並入邊為冦漢兵追之斬首獲虜九千人生得甌脫王漢無所失亡匈奴見甌脫王在漢恐以為道擊之道讀曰導即西北逺去不敢南逐水草發人民屯甌脫二年夏四月上自建章宫徙未央宫六月赦天下是嵗匈奴復遣九千騎屯受降城以備漢復扶又翻北橋余吾水令可度以備奔走師古曰于余吾水上作橋擬有廹急奔走避漢從此橋度也欲求和親而恐漢不聼故不肻先言常使左右風漢使者風讀曰諷然其侵盗益希遇漢使愈厚欲以漸致和親漢亦覊縻之三年春正月泰山有大石自起立上林有栁樹枯僵自起生僵居良翻什也有蟲食其葉成文曰公孫病已立此為宣帝興于民間之符符節令魯國眭𢎞上書班表符節令屬少府秩六百石續漢志曰為符節臺率主符節事漢改秦薛郡為魯國屬豫州唐兖州地師古曰眭息隨翻今河朔猶有此姓言大石自立僵栁復起復扶又翻下同當有匹庶為天子者枯樹復生故廢之家公孫氏當復興乎漢家承堯之後班賛曰春秋晉史蔡墨有言陶唐既衰其後有劉累學擾龍事孔甲范氏其後也而范宣子亦曰祖自虞以上為陶唐氏在夏為御龍氏在商為豕韋氏在周為唐杜氏晉主夏盟為范氏范氏為晉士師魯文公世奔秦後歸于晉其處者為劉氏劉向云戰國時劉氏自秦獲於魏秦滅魏遷大梁都于豐故周市說雍齒曰豐故梁徙也是以頌髙祖云漢帝本系出自唐帝降及於周在秦作劉渉魏而東遂為豐公豐公葢太上皇父及髙祖即位置祠祀官則有秦晉梁荆之巫世祠天地綴之以祀豈不信哉由是言之漢承堯運協于火徳得天統矣有傳國之運當求賢人禪帝位退自封百里以順天命𢎞坐設妖言惑衆伏誅匈奴單于使犂汙王窺邉據王莽時使譯出塞誘呼右犂汙王咸則犂汙王所居地盖近塞下也言酒泉張掖兵益弱出兵試擊冀可復得其地時漢先得降者聞其計天子詔邉警偹後無幾幾居豈翻右賢王犂汙王四千騎分三隊入日勒屋蘭番和班志三縣皆屬張掖郡賢曰日勒故城在今甘州刪丹縣東南師古曰番音盤張掖太守屬國都尉續漢志張掖屬國都尉治居延縣守式又翻發兵擊大破之得脫者數百人屬國義渠王射殺犂汙王義渠王屬國義渠胡之君長射而亦翻賜黄金二百斤馬二百匹因封為犂汙王自是後匈奴不敢入張掖燕盖之亂燕王盖主也燕于賢翻盖古盍翻桑𢎞羊子遷亡過父故吏矦史吳侯史姓也吳其名也晉武帝時有侯史光過古禾翻後遷捕得伏法㑹赦矦史吳自出繫獄廷尉王平少府徐仁雜治反事皆以為桑遷坐父謀反而侯史吳臧之治直之翻下同臧讀曰藏非匿反者乃匿為隨者也言桑遷但隨坐耳非匄反也即以赦令除吳罪後侍御史治實師古曰重覈治其事也以桑遷通經術知父謀反而不諌争争與諍同與反者身無異侯史吳故三百石吏首匿遷師古曰首匿者言身為謀首而藏匿人也不與庶人匿隨從者等吳不得赦奏請覆治此深文傳致吳之罪從才用翻劾廷尉少府縱反者劾戸槩翻師古曰縱放也少府徐仁即丞相車千秋女壻也車千秋即田千秋漢以其年老得乘小車入殿中因呼為車丞相故千秋數為侯史吳言數所角翻恐大將軍光不聽千秋即召中二千石博士㑹公車門公車門即未央宫北闕門也議問吳法師古曰于法律之中吳當得何罪議者知大將軍指皆執吳為不道明日千秋封上衆議上時掌翻光於是以千秋擅召中二千石以下外内異言張晏曰外則去疾欲盡内則為其壻也師古曰非也外内謂内朝及外朝也遂下廷尉平少府仁獄下遐嫁翻朝廷皆恐丞相坐之太僕杜延年奏記光曰吏縱罪人有常法今更詆吳為不道師古曰詆誣也恐於法深又丞相素無所守持而為好言於下盡其素行也師古曰言非故有所執持但其素行好與在下人言議耳至擅召中二千石甚無狀師古曰無善狀也延年愚以為丞相久故及先帝用事言在位已久是為故舊又甞及相先帝而任事也非有大故不可棄也間者民頗言獄深吏為峻詆今丞相所議又獄事也如是以及丞相恐不合衆心羣下讙譁讙許爰翻庻人私議流言四布延年竊重將軍失此名於天下也師古曰重猶難也以此為重事也光以廷尉少府弄法輕重卒下之獄卒子恤翻夏四月仁自殺平與左馮翊賈勝胡皆要斬内史周官秦因之景帝二年分置左内史武帝更名左馮翊要與腰同而不以及丞相終與相竟師古曰謂終丞相之身無貶黜也余謂言與千秋共事終其身延年論議持平合和朝廷皆此類也冬遼東烏桓反初冒頓破東胡東胡餘衆散保烏桓及鮮卑山為二族遼東郡屬幽州唐嘗置安東都護府於其地東胡破見十一卷髙祖六年後漢書烏桓之地在丁零西南烏孫東北武帝遣霍去病擊破匈奴左地因徙烏桓于上谷漁陽右北平遼東遼西五郡塞外為漢偵察匈奴動静其大人嵗一朝見於是始置護烏桓校尉秩比二千石鮮卑先逺竄于遼東塞外與烏桓相接未嘗通中國至後漢稍徙遼西塞外始為中國患世役屬匈奴武帝擊破匈奴左地因徙烏桓於上谷漁陽右北平遼東塞外上谷漁陽北平皆屬幽州上谷唐媯州漁陽唐檀薊州北平唐平州之地為漢偵察匈奴動静為于偽翻偵丑鄭翻又尹貞翻候也置護烏桓校尉監領之監占衘翻使不得與匈奴交通至是部衆漸彊遂反先是匈奴三千餘騎入五原五原郡屬并州先悉薦翻殺略數千人後數萬騎南旁塞獵旁歩浪翻行攻塞外亭障略取吏民去是時漢邉郡熢火候望精明匈奴為邉冦者少利希復犯塞少詩沼翻復扶又翻下同漢復得匈奴降者言烏桓甞發先單于冡匈奴怨之方發二萬騎擊烏桓霍光欲發兵邀擊之師古曰邀迎而擊之以問護軍都尉趙充國護軍都尉秦官武帝以屬大司馬此時盖屬大將軍也充國以為烏桓間數犯塞師古曰間即中間也猶言比日也數所角翻今匈奴擊之於漢便又匈奴希冦盗北邉幸無事蠻夷自相攻擊而發兵要之要與邀同招冦生事非計也光更問中郎將范明友明友言可擊於是拜明友為度遼將軍度遼將軍盖使之度遼水以伐烏桓至後漢遂以為將軍之號以護匈奴將二萬騎出遼東匈奴聞漢兵至引去初光誡明友兵不空出即後匈奴遂擊烏桓師古曰後匈奴者言兵遲後邀匈奴不及後户遘翻烏桓時新中匈奴兵師古曰為匈奴所中傷中竹仲翻明友既後匈奴因乗烏桓敝擊之斬首六千餘級獲三王首匈奴由是恐不能復出兵四年春正月丁亥帝加元服如淳曰元服謂初冠加上服也師古曰如氏以為衣服之服非也元首也冠者首之所著故曰元服没黯序傳云上正元服是知謂冠為元服余按續漢志有加元服之禮甲戌富民定侯田千秋薨諡法安民大慮曰定時政事壹决大將軍光千秋居丞相位謹厚自守而已夏五月丁丑孝文廟正殿火人火曰火上及群臣皆素服發中二千石將五校作治將作大匹屬官有左右前後中五校令掌五校士校户教翻六日成太常及廟令丞郎吏皆劾大不敬劾户槩翻㑹赦太常轑陽侯徳免為庶人班表轑陽侯食邑清河文穎曰轑陽在魏郡清淵轑音料又音聊六月赦天下初杅罙遣太子賴丹為質于龜兹龜兹國治延城去長安七千四百八十里杅音烏罙與彌同質音致下同龜音丘兹音慈賢曰今龜音丘劾翻兹音沮惟翻盖急言之也貳師擊大宛還事見二十一卷武帝太初元年宛于元翻將賴丹入至京師霍光用桑𢎞羊前議以賴丹為校尉將軍田輪臺𢎞羊議田輪臺見二十二卷征和元年龜兹貴人姑翼謂其王曰賴丹本臣屬吾國今佩漢印綬來廹吾國而田必為害王即殺賴丹而上書謝漢樓蘭王死匈奴先聞之遣其質子安歸歸得立為王今考異曰西域傳作常歸從昭紀及傅介子傳漢遣使詔新王令入朝王辭不至樓蘭國最在東垂西域之東垂也近漢當白龍堆孟康曰龍堆形如土龍身無頭有尾髙大者三四丈埤者長丈餘皆東北向而相似也近其靳翻下同乏水草常主發導負水擔糧送迎漢使擔都甘翻又數為吏卒所冦懲艾不便與漢通師古曰艾讀曰又數所角翻下同後復為匈奴反閒閒古莧反數遮殺漢使其弟尉屠耆降漢具言狀駿馬監北地傅介子使大宛班表太僕屬官有駿馬監北地郡屬凉州刺史姓譜傳說出傅嚴因以為氏詔因令責樓蘭龜兹介子至樓蘭龜兹責其王皆謝服介子從大宛還到龜兹㑹匈奴使從烏孫還在龜兹介子因率其吏士共誅斬匈奴使者還奏事詔拜介子為中郎遷平樂監平樂監監平樂觀樂音洛介子謂大將軍霍光曰樓蘭龜兹數反覆而不誅無所懲艾介子過龜兹時其王近就人易得也願徃刺之以威示諸國易以豉翻刺七亦翻下同大將軍曰龜兹道逺且驗之於樓蘭於是白遣之介子與士卒俱齎金幣揚言以賜外國為名至樓蘭樓蘭王意不親介子介子陽引去至其西界使譯謂曰班表大鴻臚有譯官令典屬國有九譯令皆掌譯此譯則樓蘭國之譯人漢使者持黄金錦繡行賜諸國王不來受我去之西國矣即出金幣以示譯譯還報王王貪漢物來見使者介子與坐飲陳物示之飲酒皆醉介子謂王曰天子使我私報王師古曰謂宻有所論王起隨介子入帳中屏語屛人而獨共語也屛必郢翻壯士二人從後刺之刺七亦翻刃交匈立死匈與胷同其貴臣左右皆散走介子告諭以王負漢罪天子遣我誅王當更立王弟尉屠耆在漢者更工衡翻漢兵方至毋敢動自令滅國矣介子遂斬王安歸首馳傳詣闕縣首北闕下傳張戀翻縣古懸字通乃立尉屠耆為王更名其國為鄯善為刻印章賜以宫女為夫人備車騎輜重更工衡翻鄯上扇翻為刻于偽翻重直用翻丞相率百官送至横門外祖而遣之三輔黄圖横門長安城北出西頭第一門孟康曰横音光祖祖道也王自請天子曰身在漢久今歸單弱而前王有子在恐為所殺國中有伊循城其地肥美願漢遣一將屯田積榖令臣得依其威重於是漢遣司馬一人吏士四十人田伊循以填撫之填讀曰鎮秋七月乙巳封范明友為平陵矦賞破烏桓之功也班表平陵矦食邑于南陽之武當傅介子為義陽侯班表義陽矦食邑于南陽之平氏臣光曰王者之於戎狄叛則討之服則舍之舍讀曰捨今樓蘭王既伏其罪又從而誅之後有叛者不可得而懐矣必以為有罪而討之則宜陳師鞠旅毛詩注曰鞠告也將戰之日陳其師旅誓告之也明致其罰今乃遣使者誘以金幣而殺之後有奉使諸國者復可信乎復扶又翻且以大漢之彊而為盜賊之謀於蠻夷不亦可羞哉論者或美介子以為竒功過矣五年夏大旱秋罷象郡分屬鬰林牂柯班志鬱林故秦桂林郡冬十一月大雷十二月庚戍宜春敬侯王訢薨恩澤侯表宜春侯食邑於汝南訢音欣六年春正月募郡國徒築遼東𤣥菟城菟音塗夏赦天下烏桓復犯塞復扶又翻遣度遼將軍范明友擊之冬十一月乙丑以楊敞為丞相少府河内蔡義為御史大夫河内郡時屬司隷唐懐孟衛州地資治通鑑卷二十三
