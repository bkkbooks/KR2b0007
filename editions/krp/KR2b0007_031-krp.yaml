body:
  text: 資治通鑑卷三十一宋司馬光撰胡三省音註漢紀二十三起屠維大淵獻盡彊圉恊洽凡九年孝成皇帝上之下陽朔三年春三月壬戌隕石東郡八夏六月潁川鐵官徒申屠聖等百八十人殺長吏盗庫兵自稱将軍經歴九郡遣丞相長史御史中丞逐捕以軍興従事長知兩翻師古曰逐捕之事須有發興皆依軍法皆㐲辜秋王鳳疾天子數自臨問數所角翻親執其手涕泣曰将軍病如有不可言師古曰不可言謂死也不欲斥言之平阿侯譚次将軍矣鳳頓首泣曰譚等雖與臣至親行皆奢僣行下孟翻無以率導百姓不如御史大夫音謹敕敕整也正也固也理也臣敢以死保之及鳳且死上疏謝上復固薦音自代復扶又翻言譚等五人必不可用天子然之初譚倨不肯事鳳師古曰倨慢也而音敬鳳卑恭如子故鳳薦之八月丁巳鳳薨九月甲子以王音為大司馬車騎将軍而王譚位特進領城門兵長安十二城門皆有屯兵安定太守谷永以譚失職勸譚辭讓不受城門職由是譚音相與不平冬十一月丁卯光禄勲于永為御史大夫永定國之子也四年春二月赦天下夏四月雨雪雨于具翻秋九月壬申東平思王宇薨宇宣帝之子少府王駿為京兆尹駿吉之子也先是京兆有趙廣漢張敞王尊王章至駿皆有能名故京師稱曰前有趙張後有三王趙廣漢張敞宣帝時尹京三王皆帝所用史言尹京者難其材先悉薦翻閏月壬戌于永卒烏孫小昆彌烏就屠死子拊離代立師古曰拊讀與撫同為弟日貳所殺漢遣使者立拊離子安日為小昆彌日貳亡阻康居亡奔康居依阻其逺以自全安日使貴人姑莫匿等三人詐亡従日貳刺殺之師古曰詐畔亡而投之因得以刺殺刺七亦翻於是西域諸國上書願復得前都䕶叚㑹宗㑹宗前為西域都䕶終更而還復扶又翻上従之城郭諸國聞之皆翕然親附谷永奏言聖王不以名譽加於實效御史大夫任重職大少府宣逹於従政唯陛下留神考察上然之鴻嘉元年春正月癸巳以薛宣為御史大夫用谷永之言也二月壬午上行幸初陵赦作徒師古曰徒人之在陵役作者以新豐之戲鄉為昌陵縣師古曰戲水之鄉也戲音許宜翻奉初陵上始為㣲行張晏曰出入市里不復警蹕若㣲賤者之所為故曰㣲行従期門郎或私奴十餘人或乗小車或皆騎騎竒寄翻出入市里郊野逺至旁縣旁縣諸縣環長安旁者也甘泉長楊五柞柞才各翻鬭雞走馬常自稱富平侯家人富平侯者張安世四世孫放也放父臨尚敬武公主文穎曰公主成帝姊也臣瓉曰敬武公主是元帝姊也師古曰二説皆非也薛宣傳云主怒曰嫂何以取妺殺之既謂元后為嫂是即元帝妹也地理志鉅鹿郡有敬武縣生放放為侍中中郎将娶許皇后女弟當時寵幸無比故假稱之三月庚戌張禹以老病罷以列侯朝朔望位特進見禮如丞相朝直遥翻賞賜前後數千萬夏四月庚辰薛宣為丞相封髙陽侯恩澤侯表髙陽侯食邑于東莞京兆尹王駿為御史大夫王音既以従舅越親用事小心親職従才用翻上以音自御史大夫入為将軍将軍中朝官故曰入不獲宰相之封自公孫𢎞以來為相者封侯六月乙巳封音為安陽侯地理志汝南郡有安陽侯國冬黄龍見真定見賢遍翻是嵗匈奴復株累單于死弟且麋胥立為搜諧若鞮單于遣子左祝都韓王昫留斯侯入侍以且莫車為左賢王累力追翻單音蟬且子余翻鞮丁兮翻昫漢書作胊師古曰音許干翻二年春上行幸雲陽甘泉甘泉宮在雲陽縣三月博士行大射禮古者天子諸侯大夫士皆有大射之禮博士所行士之射禮也有飛雉集于庭歴階登堂而雊師古曰歴階謂以次而登也雊古豆翻後雉又集太常宗正丞相御史大夫車騎将軍之府又集未央宮承明殿屋上車騎将軍音待詔寵等上言師古曰以經術待詔其人名寵不記姓也天地之氣以類相應譴告人君甚㣲而著雉者聴察先聞雷聲故月令以紀氣師古曰謂季冬之月雉雊鷄乳經載髙宗雊雉之異以明轉禍為福之驗師古曰髙宗祭成湯有飛雉升鼎耳而雊祖已曰惟先假王正厥事故能禳妖而致百年之夀今雉以博士行禮之日歴階登堂萬衆睢睢師古曰睢睢仰目視貌音呼惟翻驚怪連日徑歴三公之府太常宗正典宗廟骨肉之官然後入宮其宿留告曉人具備深切師古曰宿音先就翻留音力救翻雖人道相戒何以過是後帝使中常侍鼂閎詔音曰鼂古朝字聞捕得雉毛羽頗摧折類拘執者得無人為之師古曰言人放此雉故欲為變異者折而設翻音復對曰陛下安得亡國之語不知誰主為佞讇之計誣亂聖徳如此者左右阿䛕甚衆不待臣音復讇而足復扶又翻讇古諂字師古曰足益也音子喻翻足其不足曰足公卿以下保位自守莫有正言如令陛下覺寤懼大禍且至身深責臣下繩以聖灋臣音當先誅豈有以自解哉今即位十五年繼嗣不立日日駕車而出失行流聞行所行也言帝所行多非道過失流布聞於逺方也行下孟翻海内𫝊之甚於京師外有㣲行之害内有疾病之憂皇天數見災異欲人變更數所角翻見賢遍翻更工衡翻下同終已不改天尚不能感動陛下臣子何望獨有極言待死命在朝暮而已如有不然老母安得處所尚何皇太后之有髙祖天下當以誰屬乎如淳曰老母音之老母也當隨己受罪誅也又謂己言深切觸悟人主積恚而犯必行之誅不能復顧太后也師古曰如説非也此言摠屬於成帝耳不然者謂不如所諫而自修改也老母即帝之母太后也言帝不自修改國家危亡太后不知所處髙祖天下無所付屬也屬音之欲翻宜謀於賢智克己復禮用論語孔子答顔淵之言以求天意繼嗣可立災變尚可銷也初元帝儉約渭陵不復徙民起邑事見二十九卷元帝永光四年復扶又翻帝起初陵即延陵也數年後樂覇陵曲亭南更營之即新豐戲鄉之地闗中記昌陵在霸城東二十里樂音洛将作大匠解萬年解尸買翻姓也姓譜自晉唐叔虞食邑於解今解縣也晉有解狐解揚使陳湯為奏請為初陵徙民起邑欲自以為功求重賞湯因自請先徙冀得美田宅上従其言果起昌陵邑為萬年湯得罪罷昌陵張本夏徙郡國豪桀貲五百萬以上五千户于昌陵五月癸未隕石于杜郵三六月立中山憲王孫雲客為廣徳王中山憲王福靖王勝之𤣥孫也地節元年福薨客子懐王修嗣五鳳三年修薨無後今立雲是嵗城陽哀王雲薨無子國除城陽景王章傳國十世至雲三年夏四月赦天下大旱王氏五侯争以奢侈相尚成都侯商嘗病欲避暑従上借明光宮師古曰黄圖云明光宮在城内近桂宮後又穿長安城引内灃水地理志灃水出鄠縣東南北流過上林苑入渭注第中大陂以行船立羽盖羽盖編羽為之張周帷周帷船之四周皆張帷楫棹越歌師古曰楫棹皆所以行船也令執楫棹人為越歌也楫謂棹之短者也今吴越之人謂之撓音饒越歌為越之歌上幸商第見穿城引水意恨内衘之未言後㣲行出過曲陽侯第又見園中土山漸臺象白虎殿起土山漸臺又為室屋象白虎殿也於是上怒以讓車騎将軍音商根兄弟欲自黥劓以謝太后劓魚器翻又牛倨翻上聞之大怒乃使尚書責問司𨽻校尉京兆尹知成都侯商等奢僣不軌藏匿姦猾皆阿縦不舉奏正灋二人頓首省户下司𨽻校尉察三輔京兆尹治京邑而阿縦不舉奏故責之省户禁門也又賜車騎将軍音䇿書曰外家何甘樂禍敗師古曰言此罪過並身自為之余謂言商等奢侈必将得罪何乃甘心為之以為樂也樂音洛而欲自黥劓相戮辱於太后前傷慈母之心以危亂國家外家宗族彊上一身寖弱日乆今将一施之師古曰行刑罪君其召諸侯令待府舎諸侯指商根等師古曰令摠集音舍待詔命是日詔尚書奏文帝誅将軍薄昭故事見十四卷文帝前十年車騎将軍音藉稾請罪師古曰自坐稾上言待刑戮也商立根皆負斧質謝良乆乃已上特欲恐之實無意誅也秋八月乙卯孝景廟北闕災初許皇后與斑偼伃皆有寵於上上嘗遊後庭欲與倢伃同輦載偼伃音接于下同偼伃辭曰觀古圗畫賢聖之君皆名臣在側三代末主乃有嬖妾今欲同輦得無近似之乎師古曰嬖愛也音必計翻又卑義翻近音巨靳翻上善其言而止太后聞之喜曰古有樊姬張晏曰楚王好田樊姬為不食禽獸之肉按樊姬事楚荘王今有斑偼伃斑偼伃進侍者李平得幸亦為偼伃賜姓曰衞其後上㣲行過陽阿主家師古曰陽阿平原之縣也應劭曰平原漯隂東南五十里有陽阿鄉故縣也考異曰五行志作河陽主伶𤣥趙后外傳及荀紀亦作河陽外戚傳顔師古注曰陽阿平原之縣也今俗書阿字作河或為河陽皆後人所妄改耳今従之悦歌舞者趙飛燕師古曰以其體輕故曰飛燕召入宮大幸有女弟復召入復扶又翻姿性尤醲粹左右見之皆嘖嘖嗟賞嘖嘖衆口稱羡而作聲也音側革翻有宣帝時披香博士淖方城在帝後披香博士後宮女職也淖音女教翻姓也唾曰此禍水也滅火必矣姊弟俱為偼伃貴傾後宮許皇后斑偼伃皆失寵於是趙飛燕譛告許皇后斑偼伃挟媚道婦人挟媚道者蠱詛他人求已親媚祝詛後宮詈及主上祝職救翻詛荘助翻詈力智翻冬十一月甲寅許后廢處昭臺宮師古曰宮在上林苑中處昌呂翻后姊謁皆誅死親屬歸故郡后姊謁為平安剛侯夫人許氏本山陽人也考問斑偼伃偼伃對曰妾聞死生有命富貴在天論語載子夏答司馬牛之言修正尚未䝉福為邪欲以何望使鬼神有知不受不臣之愬師古曰祝詛主上是不臣也如其無知愬之何益故不為也上善其對赦之賜黄金百斤趙氏姊弟驕妬偼伃恐乆見危乃求共養太后於長信宮師古曰共音居用翻養音弋向翻宮閣記長信殿在長樂宮太后常居之上許焉廣漢男子鄭躬等六十餘人攻官寺簒囚徒盗庫兵自稱山君廣漢郡髙帝分蜀郡置屬益州師古曰逆取曰簒風俗通寺司也諸官府所止皆曰寺四年秋勃海清河信都河水湓溢勃海唐滄景州清河唐貝州信都唐冀州師古曰湓湧也音普頓翻灌縣邑三十一敗官亭民舍四萬餘所敗補邁翻平陵李尋奏言議者常欲求索九河故迹而穿之今因其自决可且勿塞以觀水埶索山客翻塞悉則翻下同河欲居之當稍自成川跳出沙土然後順天心而圗之必有成功而用財力寡於是遂止不塞朝臣數言百姓可哀上遣使者處業振贍之師古曰䖏業謂安處之使得居業數所角翻處昌呂翻廣漢鄭躬黨與濅廣犯歴四縣衆且萬人州郡不能制冬以河東都尉趙䕶為廣漢太守發郡中及蜀郡合三萬人擊之或相捕斬除罪師古曰賊黨相捕斬赦其本罪旬月平遷䕶為執金吾賜黄金百斤是嵗平阿安侯王譚薨上悔廢譚使不輔政而薨也乃復進成都侯商復扶又翻以特進領城門兵置幕府得舉吏如将軍漢制列将軍置幕府得舉吏魏郡杜鄴時為郎素善車騎将軍音見音前與平阿侯有隙即説音曰夫戚而不見殊孰能無怨師古曰戚近也殊謂異於疏也説輸芮翻昔秦伯有千乗之國而不能容其母弟師古曰秦景公母弟公子鍼有寵於其父桓公景公立鍼懼而奔晉事在昭元年故經書秦伯之弟鍼出奔晉傳曰稱弟罪秦伯也春秋譏焉周召則不然師古曰言周公召公無私怨也余謂不然者不為秦伯之為也召讀曰邵忠以相輔義以相匡同己之親等已之尊不以聖徳獨兼國寵又不為長専受榮任分職於陕並為弼凝師古曰分職於陕謂自陕以東周公主之自陕以西召公主之陕即今陕州縣也音式冉翻而説者妄云分陕是潁川郟縣謬矣弼凝謂左輔右弼前凝後丞也今按字書陕従兩入郏従兩人人自不考耳為于偽翻長知兩翻故内無感恨之隙師古曰感音胡闇翻外無侵侮之羞俱享天祐兩荷髙名者盖以此也荷下可翻竊見成都侯以特進領城門兵復有詔得舉吏如五府丞相御史及車騎左右将軍府也復扶又翻此明詔所欲必寵也将軍宜承順聖意加異徃時每事凡議必與及之發於至誠則孰不説諭師古曰言皆出於至誠彼必和説無憂乖異也説讀曰悦音甚嘉其言由是與成都侯商親宻二人皆重鄴永始元年春正月癸丑太官凌室火師古曰凌室藏氷之室凌音力證翻又音陵戊午戾后園南闕火二考異曰五行志及荀紀火皆作災今従漢書上欲立趙偼伃為皇后皇太后嫌其所出㣲甚難之太后姊子淳于長為侍中數徃來通語東宮數所角翻嵗餘乃得太后指許之夏四月乙亥上先封偼伃父臨為成陽侯恩澤侯表成陽侯食邑於汝南新息諌大夫河間劉輔上書漢書劉輔河間宗室言昔武王周公承順天地以饗魚烏之瑞然猶君臣祗懼動色相戒今文尚書㤗誓曰白魚入于王舟有火復于王屋流為烏周公曰復哉復哉况於季世不䝉繼嗣之福屢受威怒之異者虖威怒謂皇天降威震怒也虖古乎字雖夙夜自責改過易行行下孟翻畏天命念祖業妙選有徳之世考卜窈窕之女鄭𤣥曰考猶稽也師古曰窈窕幽閒也以承宗廟順神祗心塞天下望塞悉則翻子孫之祥猶恐晚暮今乃觸情縦欲傾於卑賤之女欲以母天下不畏於天不愧於人惑莫大焉里語曰腐木不可以為柱人婢不可以為主可考異曰劉輔傳云腐木不可以為柱卑人不以為主荀紀柱作珪卑人作人婢今柱従漢書人婢従荀紀天人之所不予必有禍而無福市道皆共知之師古曰市道市中之道也一曰市人及行於道路者也予讀曰與朝廷莫肯壹言臣竊傷心不敢不盡死書奏上使侍御史收縛輔繫掖庭祕獄師古曰漢舊儀掖庭詔獄令丞宦者為之主理婦人女宫也羣臣莫知其故於是左将軍辛慶忌右将軍亷褒光禄勲琅邪師丹太中大夫谷永四人皆中朝官俱上書曰竊見劉輔前以縣令求見擢為諌大夫輔以襄賁令上書言得失召見擢諫大夫襄賁東海縣也賁音肥此其言必有卓詭切至當聖心者故得拔至於此旬月之間收下秘獄下遐稼翻臣等愚以為輔幸得託公族之親在諫臣之列新従下土來未知朝廷體獨觸忌諱不足深過過猶罪也小罪宜隠忍而已如有大惡宜暴治理官與衆共之理官謂廷尉也師古曰令衆人知其罪抶而罰之暴顯示也顯示其罪使理官治之今天心未豫張晏曰豫悦豫也災異屢降水旱迭臻方當隆寛廣問褒直盡下之時也而行慘急之誅於諫争之臣争讀曰諍震驚羣下失忠直心假令輔不坐直言所坐不著師古曰著明也天下不可户曉師古曰言不可家家曉諭之也同姓近臣本以言顯其於治親養忠之義治直之翻誠不宜幽囚於掖庭獄公卿以下見陛下進用輔亟而折傷之暴人有懼心精鋭銷耎師古曰人人皆懼也蘇林曰耎弱也師古曰耎音乃亂翻又乳兖翻莫敢盡節正言非所以昭有虞之聴師古曰舜有敢諫之鼓故言有虞之聴也一曰謂達四聰也廣徳美之風臣等竊深傷之惟陛下留神省察省悉井翻上乃徙輔繫共工獄蘇林曰考工也師古曰少府之屬官亦有詔獄共讀與龔同減死罪一等論為鬼薪應劭曰取薪給宗廟為鬼薪三嵗刑也初太后兄弟八人獨弟曼早死不侯鳳嗣父爵陽平侯崇安成侯庶弟五人同日封謂之五侯八人之中獨曼不侯太后憐之曼寡婦渠供養東宮供古用翻養余亮翻子莽幼孤不及等比師古曰比音必寐翻余謂當音毗至翻其羣兄弟皆将軍五侯子乗時侈靡師古曰乗因也因富貴之時以輿馬聲色佚游相髙師古曰佚與逸同莽因折節為恭儉勤身博學折而設翻被服如儒生師古曰被音皮義翻事母及寡嫂養孤兄子行甚敕備莽兄永早死有子光行下孟翻又外交英俊内事諸父曲有禮意大将軍鳳病莽侍疾親嘗藥鄭𤣥曰嘗藥度其所堪亂首垢面不解衣帶連月鳳且死以託太后及帝拜為黄門郎漢舊儀曰黄門郎屬黄門令日暮入對青瑣門拜名曰夕郎董巴曰禁門曰黄闥遷射聲校尉乆之叔父成都侯商上書願分户邑以封莽長樂少府戴崇姓譜戴宋戴公之後一曰宋滅戴子孫以國為氏侍中金渉中郎陳湯等皆當世名士咸為莽言為于偽翻下同上由是賢莽太后又數以為言數所角翻五月乙未封莽為新都侯莽傳以南陽新野之都鄉為新都侯國遷騎都尉光禄大夫侍中宿衞謹敕爵位益尊節操愈謙散輿馬車裘振施賔客師古曰振舉也施式智翻家無所餘收贍名士交結将相卿大夫甚衆故在位者更推薦之更工衡翻游者為之談説虚譽隆洽傾其諸父矣隆盛也洽漸浃也周徧也敢為激發之行處之不慚恧師古曰激急動恧愧也激音工歴翻行下孟翻處昌吕翻恧音女六翻嘗私買侍婢昆弟或頗聞知莽因曰後将軍朱子元無子朱博字子元莽聞此兒種宜子師古曰此兒謂所買婢也種章勇翻即日以婢奉朱博其匿情求名如此王莽事始此六月丙寅立皇后趙氏大赦天下皇后既立寵少衰而其女弟絶幸為昭儀居昭陽宮其中庭彤朱而殿上髹漆師古曰以漆漆物謂之髹音許求翻又許昭翻今闗東俗器物一再著漆者謂之捎漆捎即髹聲之轉重耳髹字或作䰍音義亦與髹同今闗西俗云黒髹盤朱髹盤其音如此兩義並通毛晃曰髹赤黒漆切皆銅沓黄金塗師古曰切門限也音千結翻沓冒其頭也塗以金塗銅上也沓音他合翻白玉階師古曰階所由陞殿陛也壁帶徃徃為黄金缸函藍田璧明珠翠羽飾之服䖍曰缸壁中之横帶也晉灼曰以金環飾之也師古曰壁帶壁之横木露出如帶者也於壁帶之中徃徃以金為缸若車缸之形也其缸中著玉璧明珠翠羽耳藍田山名出美玉缸音工流俗讀之音江非也自後宫未嘗有焉趙后居别館多通侍郎宫奴多子者侍郎郎之得出入禁中者宫奴有罪沒為宫奴給使宫中者昭儀嘗謂帝曰妾姊性剛有如為人構陷則趙氏無種矣種章勇翻因泣下悽惻帝信之有白后姦状者帝輙殺之由是后公為淫恣無敢言者然卒無子卒子恤翻光禄大夫劉向以為王教由内及外自近者始詩大序關睢后妃之徳也風之始也所以風天下而正夫婦也故曰正始之道王化之基於是採取詩書所載賢妃貞婦興國顯家及孽嬖亂亡者師古曰孽庶也嬖愛也序次為列女傳凡八篇及采𫝊記行事著新序説苑凡五十篇奏之數上疏言得失陳法戒數所角翻書數十上以助觀覽補遺闕上時掌翻上雖不能盡用然内嘉其言常嗟歎之昌陵制度奢泰乆而不成劉向上疏曰臣聞王者必通三統應劭曰二王之後與己為三綂也孟康曰天地人之始也張晏曰一曰天綂謂周以十一月建子為正天始施之端也二曰地綂謂殷以十二月建丑為正地始化之端也三曰人綂謂夏以十三月建寅為正人始成之端也師古曰諸家之説皆不備也言王者象天地人之三綂故存三代也明天命所授者博非獨一姓也自古及今未有不亡之國孝文皇帝嘗美石槨之固張釋之曰使其中有可欲雖錮南山猶有隙夫死者無終極而國家有廢興故釋之之言為無窮計也釋之對詳見十四卷文帝前三年孝文寤焉遂薄塟棺槨之作自黄帝始古之塟者厚衣之以薪塟之中野不封不樹黄帝易之以棺槨黄帝尭舜禹湯文武周公丘隴皆小塟具甚㣲晋灼曰丘壠冢墳也其賢臣孝子亦承命順意而薄塟之此誠奉安君父忠孝之至也孔子塟母於防師古曰防魯邑名也杜預曰昌邑縣西有防城墳四尺記檀弓曰孔子既得合塟於防曰古者墓而不墳今丘也東西南北之人也不可以不識也於是封之崇四尺師古曰墳者謂積土也春秋緯天子墳髙三仞樹以松諸侯半之樹以柏大夫八尺樹以藥草士四尺樹以槐庶人無墳樹以楊栁鄭𤣥曰孔子盖用士禮延陵季子塟其子封墳掩坎其髙可隠孟康曰隠蔽之財可見而已臣瓉曰謂人立可隠肘也師古曰瓉説是也隠音於靳翻故仲尼孝子而延陵慈父舜禹忠臣周公弟弟師古曰弟弟者言弟能順理也上弟音徒計翻其塟君親骨肉皆㣲薄矣非茍為儉誠便於體也秦始皇塟於驪山之阿下錮三泉上崇山墳水銀為江海黄金為鳬鴈珎寶之臧臧古藏字通下臧椁同機械之變棺槨之麗宫館之盛不可勝原詳見七卷秦始皇三十七年勝音升天下苦其役而反之驪山之作未成而周章百萬之師至其下矣事見七卷秦二世二年項籍燔其宫室營宇事見九卷髙帝元年牧兒持火照求亡羊失火燒其臧椁自古及今塟未有盛如始皇者也數年之間外被項籍之災被皮義翻内離牧竪之禍師古曰離遭也豈不哀哉是故徳彌厚者塟彌薄知愈深者塟愈㣲無徳寡知知讀曰智下賢知同其塟愈厚丘壠愈髙宫闕甚麗發掘必速由是觀之明暗之效塟之吉凶昭然可見矣陛下即位躬親節儉始營初陵其制約小天下莫不稱賢明始營陵見上卷建始二年及徙昌陵増庳為髙師古曰庳下也音婢積土為山發民墳墓積以萬數營起邑居期日廹卒師古曰卒讀曰猝功費大萬百餘應劭曰大萬億也大巨也死者恨於下生者愁於上臣甚惛焉師古曰惛謂不了言惑於此事也惛音昏一云惛古閔字憂病也余謂當從後説以死者為有知發人之墓其害多矣若其無知又安用大謀之賢知則不説説讀與悦同下同以示衆庶則苦之若茍以説愚夫淫侈之人又何為哉唯陛下上覽明聖之制以為則下觀亡秦之禍以為戒初陵之模宜従公卿大夫之議以息衆庶上感其言初解萬年自詭昌陵三年可成卒不能就卒子恤翻羣臣多言其不便者下有司議下遐稼翻皆曰昌陵因卑為髙度便房猶在平地上漢書音義曰便房藏中便坐也度徒洛翻客土之中不保幽冥之靈淺外不固服䖍曰取它處土以増髙為客土卒徒工庸以鉅萬數至然脂夜作取土東山且與穀同賈師古曰賈讀曰價作治數年天下徧被其勞治直之翻被皮義翻故陵因天性㨿真土處勢髙敞旁近祖考初陵近渭陵又西近茂陵處昌吕翻近其靳翻前又已有十年功緒師古曰緒謂端次也宜還復故陵勿徙民便秋七月詔曰朕執徳不固謀不盡下師古曰言不博謀於羣下過聴将作大匠萬年言昌陵三年可成師古曰過誤也萬年解萬年也作治五年中陵司馬殿門内尚未加功如淳曰陵中有司馬殿門如生時制也臣瓉曰天子之藏壙中無司馬殿門也此謂陵上寝殿及司馬門也時皆未作之故曰尚未加功師古曰中陵陵中正寝也司馬殿門瓉説是也天下虛耗百姓罷勞客土疏惡罷讀曰疲疏音疎終不可成朕惟其難師古曰惟思也怛然傷心怛當割翻驚也懼也悼也不安也夫過而不改是謂過矣師古曰論語載孔子之言故詔引之其罷昌陵及故陵勿徙吏民罷昌陵還故陵而故陵勿起陵邑徙吏民也令天下毋有動揺之心初鄼侯蕭何之子嗣為侯者無子及有罪凡五絶祀髙后文帝景帝武帝宣帝思何之功輒以其支庶紹封蕭何薨子祿嗣薨亡子髙后乃封何夫人同為鄼侯小子延為筑陽侯孝文元年罷同更封延為鄼侯薨子遺嗣薨亡子文帝復以遺弟則嗣有罪免景帝二年封則弟嘉為武陽侯薨子勝嗣有罪免武帝元狩中復以鄼户二千四百封何曾孫慶為鄼侯慶則子也薨子夀成嗣坐罪免宣帝封何𤣥孫建世為鄼侯凡五紹封是嵗何七世孫鄼侯獲坐使奴殺人减死完為城旦獲建世孫也先是上詔有司訪求漢初功臣之後乆未省録杜業説上曰先悉薦翻省悉井翻説輸芮翻唐虞三代皆封建諸侯以成太平之美是以燕齊之祀與周並傳太公封於齊至周安王二十三年始為田氏所滅召公封於燕後周而滅子繼弟及歴載不墮師古曰弟繼兄位謂之及載子亥翻墮毁也音火規翻豈無刑辟辟毗亦翻繇祖之竭力故支庶賴焉師古曰言國家非無刑辟而功臣子孫得不䧟罪辜而能長存者思其先人之力令有嗣續也迹漢功臣亦皆剖符世爵受山河之誓髙帝封爵之誓曰使黄河如帶泰山若厲國以永存爰及苖裔百餘年間而襲封者盡朽骨孤於墓苖裔流於道生為愍𨽻死為轉屍應劭曰死不能塟故屍流轉在溝壑之中師古曰愍𨽻者言為徒𨽻在可哀愍之中以徃况今師古曰况譬也甚可悲傷聖朝憐閔詔求其後四方忻忻靡不歸心出入數年而不省察恐議者不思大義徒設虛言則厚徳掩息吝簡布章吝靳也簡略也言既詔求其後復靳而不封畧而不問若如此必布聞於天下也非所以示化勸後也雖難盡繼宜従尤功言漢之功臣絶世者多雖難盡繼宜取功尤重者後紹其國封也上納其言癸夘封蕭何六世孫南䜌長喜為鄼侯地理志南䜌縣屬鉅鹿郡孟康曰䜌音力全翻百官表縣令長皆秦官掌治其縣萬户以上為令秩千石至六百石减萬户為長秩五百石至三百石長知兩翻考異曰成紀元延元年封蕭相國後喜為鄼侯荀胡皆用之按功臣表永始元年釐侯喜紹封三年薨永始四年質侯尊嗣五年薨質侯章嗣蓋本紀誤以永始為元延故也立城陽哀王弟俚為王鴻嘉二年哀王雲薨無後考異曰漢紀俚作悝今従漢書八月丁丑太皇太后王氏崩師古曰宣帝王皇后也九月黑龍見東萊見賢遍翻丁巳晦日有食之曰考異荀紀作乙巳按長歴丁巳晦荀説誤是嵗以南陽太守陳咸為少府侍中淳于長為水衡都尉二年春正月己丑安陽敬侯王音薨王氏唯音為修整數諫正數所角翻有忠直節二月癸未夜星隕如雨繹繹未至地滅師古曰繹繹光采貌乙酉晦日有食之三月丁酉以成都侯商為大司馬衞将軍紅陽侯王立位特進領城門兵京兆尹翟方進為御史大夫翟亭歴翻又直格翻谷永為凉州刺史奏事京師訖當之部凉州部隴西天水武都金城安定北地武威張掖燉煌酒泉等郡漢制諸州刺史常以八月廵行所部録囚徒考殿最嵗盡詣京師奏事上使尚書問永受所欲言師古曰永冇所言令尚書即受之永對曰臣聞王天下有國家者王于况翻患在上有危亡之事而危亡之言不得上聞如使危亡之言輙上聞師古曰如若也冇即上聞則商周不易姓而迭興三正不變改而更用更工衡翻夏商之将亡也行道之人皆知之師古曰凡在道路行者也晏然自以若有天日莫能危尚書大傳曰桀云天之有日猶吾之有民日冇亡哉日亡吾亦亡矣師古曰自謂如日在天而無有能傷危也是故惡日廣而不自知大命傾而不寤易曰危者有其安者也亡者保其存者也師古曰易下繫之辭也言安必思危存不忘亡乃得保其安存陛下誠垂寛明之聴無忌諱之誅使芻蕘之臣得盡所聞於前刈草曰芻采薪曰蕘文王詢于芻蕘羣臣之上願社稷之長福也元年九月黑龍見見賢遍翻其晦日有食之今年二月己未夜星隕乙酉日有食之己當作癸此承谷永傳之誤六月之間大異四發二二而同月三代之末春秋之亂未嘗有也臣聞三代所以隕社稷喪宗廟者皆由婦人與羣惡沈湎於酒喪息浪翻沈持林翻秦所以二世十六年而亡者秦始皇二十六年初幷天下三十七年崩二世三年而亡其有天下財十六年養生泰奢奉終泰厚也二者陛下兼而有之臣請略陳其效建始河平之際許斑之貴傾動前朝師古曰許皇后及斑偼伃之家朝直遥翻熏灼四方女寵至極不可上矣師古曰上猶加也今之後起十倍于前如淳曰謂趙李本從㣲賤起也廢先帝法度聴用其言官秩不當縦釋王誅師古曰縦放也釋解也王誅謂王法當誅者當丁浪翻驕其親屬假之威權従横亂政師古曰従音子用翻横音胡孟翻刺舉之吏莫敢奉憲又以掖庭獄大為亂阱師古曰阱穿也為阬阱以拘繫人也亂者言其非正而又多也阱音才性翻仲馮曰言設獄陷人如阱耳余謂仲説是榜箠㿊於炮烙師古曰㿊痛也炮烙紂所作刑也膏塗銅柱加之火上令罪人行其上輙墮炭中笑而以為樂㿊音千感翻絶滅人命主為趙李報徳復怨師古曰復亦報也為于偽翻反除白罪建治正吏師古曰反讀曰幡罪之明白者反而除之吏之公正者建議劾治也多繫無辜掠立廹恐師古曰掠笞服之立其罪名至為人起責分利受謝師古曰言富賈有錢假託其名代之為主放與它人以取利息而共分之或受報謝别取財物為于偽翻生入死出者不可勝數勝音升是以日食再既以昭其辜孟康曰既盡也師古曰昭明也王者必先自絶然後天絶之今陛下棄萬乗之至貴樂家人之賤事師古曰謂私畜田及奴婢財物樂音洛厭髙美之尊號好匹夫之卑字孟康曰成帝好㣲行更作私字以相呼如淳曰稱張放家人為卑字好呼到翻崇聚僄輕無義小人以為私客師古曰僄疾也音頻妙翻又匹妙翻數離深宫之固數所角翻離力智翻挺身晨夜與羣小相隨師古曰挺引也音大鼎翻烏集雜㑹醉飽吏民之家師古曰言聚散不常如烏鳥之集亂服共坐沈湎媟嫚溷淆無别黽勉遁樂師古曰黽勉言不息也遁流遁也言流遁為樂也沈持林翻樂音洛晝夜在路典門户奉宿衞之臣執干戈而守空宫公卿百僚不知陛下所在積數年矣王者以民為基民以財為本財竭則下畔下畔則上亡是以明王愛飬基本不敢窮極使民如承大祭論語孔子答仲弓之言師古曰言常畏慎今陛下輕奪民財不愛民力聴邪臣之計去髙敞初陵改作昌陵役百乾谿費擬驪山楚靈王侈心無厭民不堪其役潰於乾谿王縊而死驪山事見秦紀師古曰擬比也言勞役之工百倍於楚靈王費財之廣比於秦始皇杜預曰乾谿在譙國城父縣南乾音干靡敝天下師古曰靡音武皮翻五年不成而後反故百姓愁恨感天饑饉仍臻師古曰仍頻也流散宂食餧死於道以百萬數師古曰宂亦散也餧餓也冗音人勇翻餧音乃賄翻公家無一年之畜師古曰畜讀曰蓄百姓無旬月之儲上下俱匱無以相救詩云殷鑒不逺在夏后之世師古曰大雅蕩之篇也願陛下追觀夏商周秦所以失之以鏡考已行師古曰鏡謂鑒照之考校也行下孟翻有不合者臣當伏妄言之誅師古曰言上所為違於節儉皆與永言同余謂此言帝之失行與夏殷周秦所以失者合耳漢興九世百九十餘載載子亥翻繼體之主七皆承天順道遵先祖灋度或以中興或以治安治直吏翻至於陛下獨違道縦欲輕身妄行當盛壮之隆無繼嗣之福有危亡之憂積失君道不合天意亦以多矣為人後嗣守人功業如此豈不負哉方今社稷宗廟禍福安危之機在於陛下陛下誠能昭然逺寤専心反道師古曰反猶還也舊愆畢改新徳既章則赫赫大異庶幾可銷天命去就庶幾可復師古曰去就言去離無徳而就有徳社稷宗廟庶幾可保唯陛下留神反覆孰省臣言帝性寛好文辭而溺於宴樂省悉井翻好呼到翻樂音洛皆皇太后與諸舅夙夜所常憂至親難數言數所角翻故推永等使因天變而切諌勸上納用之永自知有内應展意無所依違師古曰展申也每言事輙見答禮師古曰如禮而答之余謂答禮者答之而又加禮也至上此對上時掌翻上大怒衞将軍商宻擿永令發去師古曰擿謂發動之上使侍御史收永敕過交道廐者勿追晋灼曰交道廐去長安六十里近延陵御史不及永還上意亦解自悔悔遣侍御史收永也上嘗與張放及趙李諸侍中共宴飲禁中皆引滿舉白服䖍曰舉滿桮有餘白瀝者罸之也孟康曰舉白見驗飲酒盡不也師古曰謂引取滿觴而飲飲訖舉觴告白盡不也一説白者罸爵之名飲有不盡者則以此爵罰之魏文侯與大夫飲酒令曰不釂者浮以大白於是公乗不仁舉白浮君是也釂子省翻飲酒盡爵也談笑大噱師古曰噱笑聲也音其略翻或曰噱謂唇口之中大笑則見此説非時乗輿幄坐張畫屏風乗繩證翻師古曰坐音材卧翻畫占畫字通下同畫紂醉踞妲己作長夜之樂妲當割翻妲己有蘓氏之女樂音洛侍中光禄大夫班伯乆疾新起姓譜班楚令尹鬬班之後斑書叙傳自以為楚令尹子文之後子文初生棄於夣中而虎乳之楚人謂乳為穀謂虎為於菟故名穀於菟楚人謂虎班其子以為號師古注曰子文之子鬪班亦為楚令尹余按左傳荘三十年申公鬪班殺令尹子元鬬穀於菟為令尹恐班非子文之子上顧指畫而問伯曰紂為無道至於是虖虖古乎字對曰書云乃用婦人之言師古曰今文尚書㤗誓之辭何有踞肆於朝師古曰肆放也陳也朝直遥翻所謂衆惡歸之不如是之甚者也師古曰論語稱子貢曰紂之不善不如是之甚也是以君子惡居下流天下之惡皆歸焉上曰茍不若此此圗何戒對曰沈湎于酒㣲子所以告去也孔穎達云酒誥注云飲酒齊色曰湎然則湎者顔色湎然齊一之辭師古曰㣲子殷之卿士封於㣲爵稱子也殷紂錯亂天命㣲子作誥告箕子比干而去其誥曰用沈酗于酒用亂敗厥徳于下我其發出狂吾家耄遜于荒事見尚書㣲子篇式號式謼大雅所以流連也師古曰大雅蕩之詩曰式號式謼俾晝作夜言醉酒號呼以晝為夜也流連言作詩之人嗟歎而泣涕流連也而説者乃以流連為荒亡盖失之矣大雅所以流連不謂飲酒之人也謼音火故翻詩書滛亂之戒其原皆在於酒上乃喟然歎曰吾乆不見班生今日復聞讜言復扶又翻師古曰讜言善言也讜音黨放等不懌師古曰懌悦也音亦稍自引起更衣更工衡翻因罷出時長信庭林表適使來聞見之孟康曰長信太后宫名也庭林表宫中婦人官名也師古曰長信宮庭之林表也林表官名耳庭非官稱也使疏吏翻後上朝東宫朝直遥翻太后泣曰帝閒顔色瘦黑師古曰閒謂比日也班侍中本大将軍所舉大将軍謂王鳳也宜寵異之益求其比以輔聖徳鳳初薦伯宜勸學召見親近今太后以其能諫正欲令帝寵異之也師古曰比類也音必寐翻當如字宜遣富平侯且就國富平侯張放上曰諾上諸舅聞之以風丞相御史師古曰風讀曰諷求放過失於是丞相宣御史大夫方進奏放驕蹇縦恣奢滛不制拒閉使者侍御史修奉使至放家逐名捕賊奴従者閉門設弓弩距使者不肯内賊傷無辜放知李游君欲獻女求不得使奴康等之其家賊傷三人従者支屬並乗權勢為暴虐従才用翻請免放就國丞考異曰叙傳云王音以風丞相御史按放傳相宣御史大夫方進奏放過惡音以正月乙巳薨方進以三月丁酉為御史大夫然則風丞相御史者疑非音也放傳又云上諸舅皆害其寵故但云上諸舅上不得已師古曰已止也左遷放為北地都尉其後比年數有災變師古曰比頻也比毗至翻數所角翻故放乆不得還璽書勞問不絶璽斯氏翻勞力到翻敬武公主有疾詔徵放歸第視母疾數月主有瘳後復出放為河東都尉復扶又翻上雖愛放然上廹太后下用大臣故常涕泣而遣之卭成太后之崩也卭成太后孝宣王皇后也父奉光封卭成侯故書卭成太后以别孝元王皇后恩澤侯表卭成侯國於濟隂喪事倉卒吏賦歛以趨辦卒讀曰猝歛力贍翻師古曰趨讀曰趣言茍取辦趣與促同上聞之以過丞相御史過罪也冬十一月己丑䇿免丞相宣為庶人御史大夫方進左遷執金吾二十餘日丞相官缺羣臣多舉方進者上亦器其能十一月壬子擢方進為丞相封髙陵侯恩澤侯表髙陵侯國于琅邪方考異曰方進傳丞相薛宣免進亦左遷執金吾二十餘日遂擢為丞相而荀紀云秋八月方進貶為執金吾盖以公卿表云三月丁酉京兆尹方進為御史大夫八月貶為執金吾故致此誤也按公卿表所云者謂方進自三月為御史大夫至十一月而貶凡居官八月耳又黒龍見東萊在去年九月谷永傳著之甚明而荀悦亦載之于此年云冬黒龍見東萊盖因陳湯獲罪在今年故也漢春秋雖正黒龍之誤而方進貶官猶承荀悦之失以諸吏散騎光禄勲孔光為御史大夫散悉亶翻方進以經術進方進以射䇿甲科為郎舉明經遷議郎其為吏用灋刻深好任勢立威有所忌惡峻文深詆中傷甚多好呼到翻惡烏路翻中竹仲翻有言其挟私詆欺不専平者上以方進所舉應科不以為非也科律條也光褒成君霸之少子也霸見二十八卷元帝永光元年領尚書典樞機十餘年守法度修故事上有所問據經灋以心所安而對不希指茍合師古曰希指希望天子之意指也如或不従不敢强諫争争讀曰諍以是乆而安時有所言輙削草藳服䖍曰言己繕書更削壊其草也以為章主之過以奸忠直人臣大罪也師古曰奸求也奸忠直之名也奸音干有所薦舉惟恐其人之聞知沐日歸休兄弟妻子燕語終不及朝省政事朝直遥翻或問光温室省中樹皆何木也光嘿不應更答以他語其不泄如是上行幸雍祠五畤建始二年罷雍五畤今以乆無繼嗣并甘泉秦畤皆復之雍於用翻畤音止衞将軍王商惡陳湯奏湯妄言昌陵且復發徙初湯請起昌陵邑既罷昌陵丞相御史請廢昌陵邑中室奏未下人以問湯第宅不徹得無復發徙湯曰縣官且順聴羣臣言猶復發徙之也惡烏路翻又言黑龍冬出㣲行數出之應東萊郡黒龍出人以問湯曰是所謂𤣥門開㣲行數出出入不時故龍以非時出也數所角翻廷尉奏湯非所宜言大不敬詔以湯有功有斬郅支功免為庶人徙邉上以趙后之立也淳于長有力焉故徳之乃追顯其前白罷昌陵之功下公卿議封長下遐稼翻光禄勲平當以為長雖有善言不應封爵之科姓譜平齊相晏平仲之後一曰韓哀侯少子婼食采平邑因以為氏髙祖之法非有功不侯當坐左遷鉅鹿太守上遂下詔以常侍閎衞尉長首建至䇿師古曰閎王閎也賜長閎爵闗内侯将作大匠萬年佞邪不忠毒流衆庶與陳湯俱徙燉煌燉徒門翻初少府陳咸衞尉逢信官簿皆在翟方進之右逢皮江翻姓也古有逢䝉師古曰簿謂伐閲也簿音主簿之簿方進晚進為京兆尹與咸厚善及御史大夫缺三人皆名卿俱在選中而方進得之㑹丞相薛宣得罪與方進相連上使五二千石雜問丞相御史晉灼曰大臣獄重故以秩二千石者五人詰責之咸詰責方進冀得其處方進心恨詰去吉翻陳湯素以材能得幸於王鳳及王音咸信皆與湯善湯數稱之於鳳音所數所角翻以此得為九卿及王商黜逐湯方進因奏咸信附㑹湯以求薦舉茍得無恥皆免官考異曰咸信免官皆在明年以後因陳湯事連言之是嵗琅邪太守朱博為左馮翊博治郡常令縣屬各用其豪桀以為大吏文武従宜師古曰各因其材而任之治直之翻縣有劇賊及它非常博輙移書以詭責之其盡力有效必加厚賞懐詐不稱誅罰輙行師古曰稱副也稱尺證翻以是豪强懾服事無不集懾之渉翻三年春正月己卯晦日有食之初帝用匡衡議罷甘泉泰畤事見上卷建始元年其日大風壊甘泉竹宫武帝以正月上辛有事甘泉圜丘自竹宫而望拜韋昭曰以竹為宫天子居中師古曰漢舊儀竹宫去壇三里壊音怪折拔畤中樹木十圍以上百餘折而設翻帝異之以問劉向對曰家人尚不欲絶種祠師古曰家人謂庶人之家也種祠繼嗣所傳祠也况於國之神寳舊畤且甘泉汾隂及雍五畤始立皆有神祇感應然後營之非茍而已也武帝祠泰一於甘泉夜常有神光如流星集于祠壇汾隂男子公孫滂洋等見汾旁有光如絳上遂立后土祠於汾隂脽上文帝十四年黄龍見成紀始幸雍郊見五畤武宣之世奉此三神禮敬敕備神光尤著祖宗所立神祇舊位誠未易動易以豉翻前始納貢禹之議後人相因多所動揺元帝時貢禹建言漢家祭祀多不應古禮韋𤣥成匡衡等因之易大傳曰誣神者殃及三世恐其咎不獨止禹等上意恨之師古曰恨悔也又以乆無繼嗣冬十月庚辰上白太后令詔有司復甘泉泰畤汾隂后土如故及雍五畤陳寳祠長安及郡國祠著明者皆復之是時上以無繼嗣頗好鬼神方術之屬好呼到翻上書言祭祀方術得待詔者甚衆祠祭費用頗多谷永説上曰説輸芮翻臣聞明於天地之性不可惑以神怪知萬物之情不可罔以非類師古曰罔猶蔽余謂罔欺也欺人以所無者罔諸背仁義之正道背蒲妺翻不遵五經之灋言而盛稱竒怪鬼神廣崇祭祀之方求報無福之祠及言世有僊人服食不終之藥遥興輕舉如淳曰遥逺也興舉也師古曰興起也謂起而逺去也黄冶變化之術者晋灼曰黄者鑄黄金也道家言冶丹沙令變化可鑄作黄金也皆姦人惑衆挟左道懐詐偽以欺罔世主師古曰左道邪僻之道非正義也王制曰執左道以亂政者殺聴其言洋洋滿耳若将可遇師古曰洋洋美盛之貌洋音羊又音祥求之盪盪如係風捕景終不可得師古曰盪盪空曠之貎也盪音蕩景影也是以明王距而不聴聖人絶而不語師古曰謂孔子不語怪神昔秦始皇使徐福發男女入海求神采藥因逃不還天下怨恨事見秦始皇紀漢興新垣平事見文帝紀齊人少翁公孫卿欒大等事見武帝紀皆以術窮詐得誅夷伏辜師古曰詐得謂主上得其詐偽之情唯陛下距絶此類毋令姦人有以窺朝者朝直遥翻上善其言十一月尉氏男子樊並等十三人謀反地理志尉氏縣屬陳留郡應劭曰古獄官曰尉氏鄭之别獄也臣瓉曰鄭大夫尉氏之邑故遂以為邑名師古曰鄭大夫尉氏亦以掌獄之官故為侯耳應説是也殺陳留太守刼略吏民自稱将軍徒李譚稱忠鍾祖訾順共殺並以聞皆封為侯姓譜稱平聲漢功臣表有新山侯稱忠楚有鍾儀鍾建又有知音鍾子期訾即移翻何氏姓苑云今齊是本姓祭氏譚延鄉侯忠新山侯祖童鄉侯順樓虛侯有考異曰本紀云五人而功臣表止四人盖紀誤十二月山陽鐵官徒蘇令等二百二十八人攻殺長吏盗庫兵自稱将軍地理志山陽郡有鐵官經郡國十九殺東郡太守及汝南都尉汝南太守嚴訢捕斬令等遷訢為大司農師古曰訢與欣同故南昌尉九江梅福上書曰地理志南昌縣屬豫章郡後漢志尉主盗賊凡有賊發主名不立則推索行尋案察姦宄以起端緒昔髙祖納善若不及従諌如轉圜師古曰不及恐失之也轉圜者言其順易也聴言不求其能舉功不考其素師古曰直取其功不論其舊行及所従來也陳平起於亡命而為謀主韓信拔於行陳而建上将事並見髙帝紀行户剛翻陳讀曰陣故天下之士雲合歸漢師古曰言四面而至争進竒異知者竭其䇿知讀曰智下同愚者盡其慮勇士極其節怯夫勉其死合天下之知并天下之威是以舉秦如鴻毛取楚若拾遺師古曰鴻毛諭輕拾遺言其易也此髙祖所以無敵於天下也孝武皇帝好忠諫説至言好呼到翻説讀曰悦出爵不待亷茂亷茂孝亷秀才也光武諱秀改為茂才慶賜不須顯功師古曰謂諫争合意即得爵賜不由薦舉及軍功也亷亷吏也茂茂材也是以天下布衣各厲志竭精以赴闕庭自衒鬻者不可勝數師古曰衒行賣也鬻亦賣也衒音州縣之縣又音工縣翻勝音升漢家得賢於此為盛使孝武皇帝聴用其計升平可致張晏曰民有三年之儲曰升平於是積尸暴骨快心胡越故淮南王安縁間而起間古莧翻下同所以計慮不成而謀議泄者以衆賢聚於本朝故其大臣埶陵不敢和従也事見武紀師古曰本朝謂漢朝也大臣謂淮南相内史之屬也服䖍曰臣埶陵君和户卧翻方今布衣乃窺國家之隙見間而起者蜀郡是也孟康曰鴻嘉中廣漢男子鄭躬等反是也及山陽亡徒蘇令之羣蹈藉名都大郡賢曰前書曰十二萬户為大郡求黨與索隨和而無逃匿之意李竒曰求索與己和及隨己者原父曰漢氏世寳隨和珠玉謂匹夫至欲索此物所謂與上争衡也索山谷翻此皆輕量大臣無所畏忌量音良國家之權輕故匹夫欲與上争衡也士者國之重器得士則重失士則輕詩云濟濟多士文王以寧師古曰詩大雅文王之詩也濟濟盛貌也言文王能多用賢人故邦國得以安寧也濟子禮翻廟堂之議非草茅所言也漢書所字下有當字臣誠恐身塗野草尸并卒伍故數上書求見輙報罷福去南昌歸夀春數因縣道上書求假軺傳詣行在所條對急政輙報罷數音所角翻見賢遍翻臣聞齊桓之時有以九九見者桓公不逆欲以致大也今臣所言非特九九也陛下距臣者三矣此天下士所以不至也昔秦武王好力任鄙叩闗自鬻事見三卷周赧王七年周禮司闗凡四方之賔客叩闗者則為之告注曰叩闗謂謁闗人也疏曰叩猶至也好呼到翻繆公行霸由余歸徳秦繆公開霸業由余自西戎歸之繆讀曰穆今欲致天下之士民有上書求見者輙使詣尚書問其所言言可采取者秩以升斗之禄賜以一束之帛若此則天下之士發憤懣懣音悶吐忠言嘉謀日聞於上天下條貫國家表裏爛然可覩矣師古曰爛然分明之貌也夫以四海之廣士民之數數趨玉翻能言之類至衆多也然其雋桀指世陳政言成文章質之先世而不繆施之當世合時務若此者亦無幾人師古曰無幾言不多也幾音居豈翻故爵禄束帛者天下之砥石髙祖所以厲世摩鈍也師古曰砥細石也音之履翻又音祇孔子曰工欲善其事必先利其器師古曰論語載孔子之言也工以諭國政利器諭賢材至秦則不然張誹謗之罔以為漢敺除為于偽翻倒持泰阿授楚其柄師古曰太阿劒名歐冶所鑄也言秦無道令陳渉項羽乗間而發譬倒持劒以把授人也故誠能勿失其柄天下雖有不順莫敢觸其鋒此孝武皇帝所以辟地建功為漢世宗也師古曰辟讀曰闢今陛下既不納天下之言又加戮焉夫鳶鵲遭害則仁鳥増逝師古曰鳶鴟也仁鳥鸞鳳也鳶音縁愚者䝉戮則智士深退間者愚民上書多觸不急之灋師古曰言以其所言為不急而罪之也或下廷尉而死者衆下遐稼翻下同自陽朔以來天下以言為諱朝廷尤甚懲王章之死也師古曰防人之口法禁嚴切也羣臣皆承順上指莫有執正何以明其然也取民所上書陛下之所善試下之廷尉廷尉必曰非所宜言大不敬以此卜之一矣故京兆尹王章資質忠直敢面引廷争争讀曰諍孝元皇帝擢之以厲具臣而矯曲朝元帝初擢章為左曹中郎将師古曰具臣具位之臣無益者也矯正也朝直遥翻及至陛下戮及妻子事見上卷陽朔元年且惡惡止其身公羊傳惡惡止其身善善及子孫王章非有反畔之辜而殃及室家言王章妻子坐徙也孔穎達曰左傳曰男有室女有家謂男處妻之室女安夫之家夫婦共為家室故為夫婦家室之道為室家也折直士之節折而設翻結諫臣之舌羣臣皆知其非然不敢争天下以言為戒最國家之大患也願陛下循髙祖之軌杜亡秦之路除不急之灋下無諱之詔博覽兼聴謀及疏賤令深者不諱逺者不塞所謂辟四門明四目也師古曰虞書舜典曰闢四門明四目言開四門以致衆賢則明視於四方也塞悉則翻辟讀曰闢徃者不可及來者猶可追方今君命犯而主威奪師古曰君命犯者謂大臣犯君之命外戚之權日以益隆陛下不見其形願察其景建始以來日食地震以率言之三倍春秋水災無與比數師古曰言其極多不可比校而數也亡讀曰無隂盛陽㣲金鐵為飛此何景也張晏曰河平二年沛郡鐵官鑄鐵如星飛上去權臣用事之異也蘇林曰言之不従是為不又則金不従革景象也何象言将危亡也為于偽翻漢興以來社稷三危吕霍上官皆母后之家也親親之道全之為右師古曰務全安之此為上當與之賢師良傅教以忠孝之道今乃尊寵其位授以魁柄師古曰以斗為諭也斗身為魁使之驕逆至於夷滅師古曰夷平也謂平除之此失親親之大者也自霍光之賢不能為子孫慮故權臣易世則危書曰毋若火始庸庸師古曰周書洛誥之辭也庸庸㣲小貌也言火始㣲小不早撲滅則至熾盛大臣貴擅亦當早圗黜其權也埶陵於君權隆於主然後防之亦無極已師古曰已語終辭上不納資治通鑑卷三十一
