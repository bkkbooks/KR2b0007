body:
  text: 資治通鑑卷一百三宋司馬光撰胡三省音註晉紀二十五起重光協洽盡旃䝉大淵獻凡五年太宗簡文皇帝諱昱字道萬元帝之少子也封琅邪王後徙封㑹稽王海西即位琅邪絶嗣復徙封琅邪固讓故雖封琅邪而不去㑹稽之號諡法一徳不懈曰簡道德博聞曰文咸安元年是年十一月海西廢帝即位始改元咸安通鑑編年因以新元繋之春正月袁瑾朱輔求救於秦秦王堅以瑾為揚州刺史瑾渠吝翻輔為交州刺史遣武衛將軍武都王鑒前將軍張蚝帥步騎二萬救之蚝七吏翻帥讀曰率騎竒寄翻大司馬温遣淮南太守桓伊南頓太守桓石䖍等撃鑒蚝於石橋據桓温傳石橋在肥水北守式又翻大破之秦兵退屯慎城慎縣漢屬汝南郡晉分屬汝隂郡唐廬州之慎縣則梁魏之閒南梁郡之慎縣漢九江逡遒縣之地非此慎城伊宣之子也桓宣佐祖逖拒祖約守襄陽皆有功丁亥温拔壽春擒瑾及輔并其宗族送建康斬之秦王堅徙關東豪傑及雜夷十五萬户于關中處烏桓于馮翊北地丁零翟斌于新安澠池為翟斌乗秦亂起兵張本處昌呂翻澠彌兖翻斌音彬諸因亂流移欲還舊業者悉聽之二月秦以魏郡太守韋鍾為青州刺史青州刺史治廣固中壘將軍梁成為兖州刺史射聲校尉徐成為并州刺史武衛將軍王鑒為豫州刺史左將軍彭越為徐州刺史太尉司馬皇甫覆為荆州刺史晉志曰秦既滅燕以兖州刺史鎮倉垣并州刺史鎮晉陽豫州刺史鎮洛陽徐州刺史鎮彭城秦初以荆州刺史鎮豐陽後移襄陽余按此時秦未得襄陽蓋仍燕之舊鎮魯陽也屯騎校尉天水姜宇為涼州刺史扶風内史王統為益州刺史凉州屬張天錫益州晉土也秦蓋置凉州於天水界置益州於扶風界校户敎翻秦州刺史西縣矦雅為使持節都督秦晉凉雍州諸軍事秦州牧雅苻氏也前此未有晉州凉之張氏分西平界置晉興郡秦蓋於此置晉州也雍於用翻吏部尚書楊安為使持節都督益梁州諸軍事梁州刺史堅欲進圖梁益故置梁益二州刺史楊安既克仇池始加督南秦州鎮仇池使疏吏翻復置雍州治蒲阪秦省雍州見上卷上年復扶又翻雍於用翻阪音反以長樂公丕為使持節征東大將軍雍州刺史樂音洛使疏吏翻成平老之子統擢之子也穆帝永和十年王擢降秦堅以關東初平守令宜得人令王猛以便宜簡召英俊補六州守令授訖言臺除正奏上秦朝除為正官也嗚呼荀卿子有言兼并易也堅凝之難以苻堅之明王猛之畧簡召六州英俊以補守令然鮮卑乗亂一呼翕然為燕以此知天下之勢但觀人心向背何如耳三月壬辰益州刺史建成定公周楚卒諡法大慮静民曰定秦後將軍金城俱難攻蘭陵太守張閔子于桃山俱姓難名魏收地形志蘭陵昌慮縣有桃山大司馬温遣兵擊却之秦西縣矦雅楊安王統徐成及羽林左監朱肜揚武將軍姚萇帥步騎七萬伐仇池公楊纂肜余中翻萇仲良翻帥讀曰率騎竒寄翻代將長孫斤謀弑代王什翼犍世子寔格之傷脇遂執斤殺之代之先拓拔鄰以次兄為拓拔氏後改為長孫氏將即亮翻犍居言翻夏四月戊午大赦秦兵至鷲峽鷲峽在仇池北亦謂之塞峽鷲音就楊纂帥衆五萬拒之梁州刺史𢎞農楊亮遣督䕶郭寳卜靖帥千餘騎助纂與秦兵戰于峽中纂兵大敗死者什三四寳等亦沒纂收散兵遁還西縣矦雅進攻仇池楊統帥武都之衆降秦統與纂爭國見上卷上年降户江翻下同纂懼面縛出降雅送纂于長安以統為南秦州刺史秦置秦州於丄邽仇池在其南故置南秦州加楊安都督南秦州諸軍事鎮仇池王猛之破張天錫于枹罕也事見一百一卷海西公太和元年枹音膚獲其將敦煌陰據及甲士五千人孰徒門翻秦王堅既克楊纂遣據帥其甲士還凉州使著作郎梁殊閻負送之穆帝永和十二年秦遣殊負使凉今復遣之因命王猛為書諭天錫曰昔貴先公稱藩劉石者惟審于彊弱也張茂稱藩于劉曜事見九十二卷明帝太寧元年張駿稱藩於石勒事見九十四卷成帝咸和五年今論凉土之力則損于往時語大秦之徳則非二趙之匹而將軍翻然自絶絶秦見一百一卷太和元年無乃非宗廟之福也歟以秦之威旁振無外可以囘弱水使東流返江河使西注禹之治水髙髙下下因天地之性弱水西流江河東注今言能反之囘之喻秦威力之彊也關東既平將移兵河右恐非六郡士民所能抗也凉州六郡以張軌初鎮河西之時統治武威張掖酒泉敦煌西郡西海六郡言之也元康以後張氏所分置其為郡多矣劉表謂漢南可保事見漢獻帝紀將軍謂西河可全吉凶在身元龜不逺宜深筭妙慮自求多福無使六世之業一旦而墜地也自張軌保據河西至天錫凡九主今言六世者不以耀靈祚𤣥靚為世數天錫大懼遣使謝罪稱藩堅拜天錫使持節都督河右諸軍事驃騎大將軍開府儀同三司凉州刺史西平公使疏吏翻下同驃匹妙翻騎竒寄翻吐谷渾王辟奚聞楊纂敗五月遣使獻馬千匹金銀五百斤于秦吐從暾入聲谷音浴秦以辟奚為安逺將軍漒川矦辟奚葉延之子也葉延見九十四卷成帝咸和四年漒其良翻好學仁厚無威斷好呼到翻斷丁亂翻下無斷同三弟專恣國人患之長史鍾惡地西漒羌豪也漒渠良翻羌人據漒川之地分為東西謂司馬乞宿雲曰三弟縱横勢出王右横户孟翻右上也㡬亡國矣㡬居希翻吾二人位為元輔長史司馬府之元僚豈得坐而視之詰朝月望日行遲一年一周天月行速一月一周天而與日㑹日月之㑹謂之合朔自合朔之後月又先日而行至十五日日月相望謂之月望詰去吉翻文武並會吾將討焉王之左右皆吾羌子轉目一顧立可擒也宿雲請先白王惡地曰王仁而無斷白之必不從萬一事泄吾屬無類矣事已出口何可中變遂於坐收三弟殺之坐徂卧翻辟奚驚怖怖普布翻自投床下惡地宿雲趨而扶之曰臣昨夢先王敕臣云三弟將為逆不可不討故誅之耳辟奚由是發病恍惚人無精爽謂之恍惚命世子視連曰吾禍及同生何以見之于地下國事大小任汝治之吾餘年殘命寄食而已遂以憂卒卒子恤翻下同視連立不飲酒遊畋者七年軍國之事委之將佐將即亮翻鍾惡地諫以為人主當自娛樂樂音洛建威布徳視連泣曰孤自先世以來以仁孝忠恕相承先王念友愛之不終悲憤而亡孤雖纂業尸存而已聲色遊娯豈所安也威徳之建當付之將來耳辟奚之死視連之立其事非皆在是年通鑑因辟奚入貢于秦遂連而書之以見辟奚父子天性仁孝不可以夷狄異類視之也代世子寔病傷而卒格長孫斤而被傷也秋七月秦王堅如洛陽代世子寔娶東部大人賀野干之女據北史賀野干即賀蘭部酋長魏書官氏志北方賀蘭後改為賀氏有遺腹子甲戌生男代王什翼犍為之赦境内為于偽翻名曰涉圭拓跋珪造魏事始此大司馬温以梁益多寇周氏世有威名周訪周撫周楚皆著威名于梁益八月以寧州刺史周仲孫監益梁二州諸軍事領益州刺史監工銜翻仲孫光之子也周光見九十三卷明帝太寧三年秦以光禄勲李儼為河州刺史鎮武始河西張駿以興晉金城武始南安永晉大夏武城漢中為河州武始郡治狄道亦張駿所置王猛以潞川之功見上卷上年請以鄧羌為司𨽻秦王堅下詔曰司𨽻校尉董牧皇畿吏責甚重非所以優禮名將光武不以吏事處功臣見四十三卷漢光武建武十三年處昌呂翻實貴之也羌有亷李之才亷李謂亷頗李牧朕方委以征伐之事北平匈奴南蕩揚越羌之任也司𨽻何足以嬰之其進號鎮軍將軍位特進九月秦王堅還長安歸安元矦李儼卒于上邽諡法能思辨衆曰元行義説民曰元晉武受禪當時之臣死多有諡元者固非以行定諡也堅復以儼子辯為河州刺史復扶又翻冬十月秦王堅如鄴獵于西山旬餘忘返伶人王洛叩馬諫曰鄭𤣥曰伶官樂官也伶氏世掌樂官而善焉故後世多號樂官為伶官陛下羣生所繫今久獵不歸一旦患生不虞奈太后天下何堅為之罷獵還宮為于偽翻王猛因進言曰畋獵誠非急務王洛之言不可忘也堅賜洛帛百匹拜官箴左右左傳昔周辛甲之為太史命百官官箴王闕於虞人之箴曰芒芒禹迹畫為九州經啟九道民有寢廟獸有茂草各有攸處徳用不擾在帝夷羿冒于原獸忘其國恤而思其麀牡武不可重用不恢于夏家獸臣司原敢告僕夫虞箴如是以戒獵也堅倣其意拜洛為官箴左右自是不復獵復扶又翻大司馬温恃其材畧位望陰蓄不臣之志嘗撫枕歎曰男子不能流芳百世亦當遺臭萬年桓温心迹固不畏人之知之也然而不獲逞者制於命也孰謂天位可以智力奸邪術士杜炅炅古迥翻能知人貴賤温問炅以禄位所至炅曰明公勲格宇宙據孔安國尚書注格至也位極人臣温不悦其志願不止于此故不悦温欲先立功河朔以收時望還受九錫及枋頭之敗威名頓挫枋頭之敗事見上卷太和四年既克壽春謂參軍郗超曰郗丑之翻足以雪枋頭之恥乎超曰未也久之超就温宿中夜謂温曰明公都無所慮乎温曰卿欲有言邪超曰明公當天下重任今以六十之年敗于大舉不建不世之勲不足以鎮愜民望愜苦叶翻温曰然則奈何超曰明公不為伊霍之舉者無以立大威權鎮壓四海温素有心深以為然遂與之定議超知温心而迎合之温遂與定議以帝素謹無過而床第易誣第側里翻又壯士翻床簀也易以䜴翻乃言帝早有痿疾楊正衡曰字林痿痺也人垂翻又於佳翻余謂此蓋言陰痿也嬖人相龍計好朱靈寳等相與計皆姓也何承天姓苑相悉良翻范曄後漢書有計子勲參侍内寢二美人田氏孟氏生三男將建儲立王傾移皇基密播此言于民間時人莫能審其虛實十一月癸卯温自廣陵將還姑孰屯于白石此白石蓋在牛渚西南桓𤣥破譙王尚之處非陶侃令庾亮所守白石壘也丁未詣建康諷褚太后請廢帝立丞相會稽王昱并作令草呈之先草定太后令而呈之於太后會工外翻太后方在佛屋燒香建屋於宫中以奉佛故謂之佛屋内侍啟云外有急奏太后出倚户視奏數行行户剛翻下數十行同乃曰我本自疑此至半便止索筆益之曰索山客翻未亡人不幸罹此百憂感念存沒心焉如割杜預曰婦人既寡自稱未亡人己酉温集百官于朝堂朝直遥翻下同廢立既曠代所無莫有識其故典者百官震慄温亦色動不知所為尚書左僕射王彪之知事不可止乃謂温曰公阿衡皇家伊尹曰阿衡放太甲于桐喻温廢立行伊尹之事也孔安國曰阿倚衡平當依傍先代傍蒲浪翻乃命取漢書霍光傳禮度儀制定於須臾用霍光廢昌邑王故事傳直戀翻彪之朝服當階神彩毅然曾無懼容文武儀準莫不取定朝廷以此服之晉朝以此服王彪之余甚恨彪之得此名于晉朝也彪之父彬不畏死以折王敦此為可服耳於是宣太后令廢帝為東海王以丞相録尚書事㑹稽王昱統承皇極會工外翻百官入太極前殿温使督䕶竺瑶散騎侍郎劉亨收帝璽綬散悉亶翻騎竒寄翻璽斯氏翻綬音受書考異曰帝紀三十國春秋亨皆作享後魏僭晉傳作亨今從之帝著白帢單衣著側略翻帢苦洽翻步下西堂乗犢車出神虎門晉制諸公給朝車安車皁輪犢車各一乗東漢都雒陽宫有廣義神虎門賢注曰廣義神虎洛陽宫西門也在金商門外然則神虎門亦建康宫西門乎羣臣拜辭莫不歔欷歔音虚欷許既翻又音希侍御史殿中監將兵百人衛送東海第殿中監掌監天子服御之事將即亮翻温帥百官具乗輿法駕迎會稽王于會稽邸帥讀曰率桑繩證翻會工外翻王於朝堂變服著平巾幘單衣東向流涕拜受璽綬平巾幘蓋即平上幘單衣江左諸人所以見尊者之服所謂巾褠也是日即皇帝位改元改元咸安温出次中堂分兵屯衛温有足疾詔乗輿入殿乗如字温撰辭欲陳述廢立本意撰雛免翻預撰辭欲入見而陳之帝引見見賢遍翻便泣下數十行行户剛翻温兢懼竟不能一言而出太宰武陵王晞好習武事好呼到翻為温所忌欲廢之以事示王彪之彪之曰武陵親尊武陵王晞亦元帝子出繼武陵王喆後未有顯罪不可以猜嫌之間便相廢徙公建立聖明當崇奬王室與伊周同美此大事宜更深詳温曰此已成事卿勿復言王彪之能全晞于㑹稽輔政之時而不能全之于會稽纘服之日㑹稽可以理喻而習武者桓温之所忌也復扶又翻乙卯温表晞聚納輕剽剽匹妙翻息綜矜忍息子也袁真叛逆事相連染頃日猜懼將成亂階温以此誣晞請免晞官以王歸藩從之并免其世子綜梁王㻱等官㻱與璡同音津温使魏郡太守毛安之帥所領宿衛殿中沈約曰南徐州備有徐兖幽冀青并揚七州郡邑安之虎生之弟也庚戌尊褚太后曰崇徳太后初殷浩卒大司馬温使人齎書弔之浩子㳙不荅㳙圭淵翻亦不詣温而與武陵王晞遊廣州刺史庾藴希之弟也素與温有隙温惡殷庾宗彊欲去之惡烏路翻去羌呂翻辛亥使其弟祕逼新蔡王晃晃父邈本汝南王祐之子也嗣新蔡王後詣西堂叩頭自列西堂太極殿西堂也自列自陳列其事稱與晞及子綜著作郎殷㳙太宰長史庾倩掾曹秀舎人劉彊散騎常侍庾柔等謀反帝對之流涕温皆收付廷尉倩柔皆藴之弟也倩千甸翻掾于絹翻癸丑温殺東海王三子及其母即田氏孟氏及所生三男也甲寅御史中丞譙王恬承温㫖請依律誅武陵王晞詔曰悲惋惶怛惋烏貫翻非所忍聞況言之哉其更詳議恬承之孫也譙王氶死於王敦之難承當作氶音注見前乙卯温重表固請誅晞詞甚酷切帝乃賜温手詔曰若晉祚靈長公便宜奉行前詔如其大運去矣請避賢路温覽之流汗變色乃奏廢晞及其三子家屬皆徙新安郡吳孫權分丹楊立新都郡武帝太康元年更名新安郡唐為歙州今之徽州丙辰免新蔡王晃為庶人徙衡陽吳孫亮分長沙西部都尉置衡陽郡今之衡州殷㳙庾倩曹秀劉彊庾柔皆族誅庾藴飲酖死藴兄東陽太守友子婦桓豁之女也故温特赦之庾希聞難難乃旦翻與弟會稽參軍邈及子攸之逃于海陵陂澤中海陵縣前漢屬臨淮郡後漢晉屬廣陵郡今泰州即其地温既誅殷庾威埶翕赫翕盛也赫炎之極也侍中謝安見温遥拜温驚曰安石卿何事乃爾安曰未有君拜于前臣揖于後當是時晉之君臣蓋可知矣春秋之義所謂㣲而顯者也戊午大赦增文武位二等己未温如白石上書求歸姑孰庚申詔進温丞相大司馬如故留京師輔政温固辭仍請還鎮辛酉温自白石還姑孰秦王堅聞温廢立謂羣臣曰温前敗灞上見九十九卷穆帝太和十年後敗枋頭見上卷太和四年不能思愆自貶以謝百姓方更廢君以自説説載記作悦讀當從悦一曰説讀如字謂自解説也六十之叟舉動如此將何以自容于四海乎諺曰怒其室而作色於父其桓温之謂矣秦車騎大將軍王猛以六州任重言于秦王堅請改授親賢及府選便宜輒已停寢騎竒寄翻堅先是命猛以便宜選賢俊補六州郡縣守令别乞一州自效堅報曰朕之于卿義則君臣親踰骨肉雖復桓昭之有管樂齊桓公有管仲燕昭王有樂毅𤣥徳之有孔明自謂踰之夫人主勞于求才逸于得士王褒聖主得賢臣頌曰君人者勤於求賢而逸于得人既以六州相委則朕無東顧之憂非所以為優崇乃朕自求安逸也夫取之不易守之亦難易以䜴翻茍任非其人患生慮表表外也孔頴達曰界外之畔為表豈獨朕之憂亦卿之責也故虛位台鼎而以分陜為先陜式冉翻卿未照朕心殊乖素望新政俟才宜速銓補俟東方化洽當衮衣西歸周公東征周大夫為作九罭之詩其辭曰九罭之魚鱒魴我覯之子衮衣繡裳又曰是以有衮衣兮無以我公歸兮無使我心悲兮箋云王迎周公當以上公之服仍遣侍中梁讜詣鄴諭㫖猛乃視事如故史言苻堅王猛君臣相與之至所以猛得展其才讜多朗翻十二月大司馬温奏廢放之人屏之以逺屏必政翻又必郢翻不可以臨黎元東海王宜依昌邑故事昌邑事見二十四卷漢昭帝元平元年築第吳郡太后詔曰使為庶人情有不忍可特封王温又奏可封海西縣矦庚寅封海西縣公安考異曰海西公紀云咸二年正月降封今從簡文帝紀温威振内外帝雖處尊位處昌吕翻拱黙而已常懼廢黜先是熒惑守太㣲端門天文志太㣲南蕃中二星間曰端門先悉薦翻踰月而海西廢辛卯熒惑逆行入太㣲帝甚惡之惡烏路翻中書侍郎郗超在直入直省中也帝謂超曰命之脩短本所不計故當無復近日事邪帝之為撫軍也辟超為掾故於今敢以情問之復扶又翻超曰大司馬臣温方内固社稷外恢經略非常之事臣以百口保之及超請急省其父晉令急假者五日一急一嵗以六十日為限史書所稱取急請急皆謂假也省悉景翻帝曰致意尊公家國之事遂至於此由吾不能以道匡衛愧歎之深言何能諭因詠庾闡詩云志士痛朝危忠臣哀主辱遂泣下霑襟此亦清談但情溢于言外耳朝直遥翻下同帝美風儀善容止留心典籍凝塵滿席湛如也雖神識恬暢然無濟世大略謝安以為惠帝之流但清談差勝耳清談無益於國事謝安當此之時能立此論可謂拔乎流俗者也郗超以温故朝中皆畏事之謝安嘗與左衛將軍王坦之共詣超日旰未得前旴古案翻坦之欲去安曰獨不能為性命忍須㬰邪史言謝安于風流之中能處事應物又郗超勢燄如此桓温既死之後超得終于牖下蓋以智免也為于偽翻秦以河州刺史李辯領興晉太守還鎮枹罕興晉枹罕河西張氏皆置為郡興晉亦當近枹罕界徙涼州治金城自天水徙治金城張天錫聞秦有兼并之志大懼以秦徙鎮偪之故懼立壇于姑臧西刑三牲帥其官屬遥與晉三公盟帥讀曰率下同遣從事中郎韓博奉表送盟文并獻書於大司馬温期以明年夏會于上邽欲使晉起兵攻蜀而出㑹于上邽也是嵗秦益州刺史王統攻隴西鮮卑乞伏司繁于度堅山司繁帥騎三萬拒統于苑川統潜襲度堅山乞伏氏先自漠北南出屯髙平川又自髙平西南遷麥田山司繁又自麥田遷于度堅山水經注苑川在天水勇士縣界杜佑曰在蘭州五泉縣界以下文乞伏吐雷為勇士䕶軍觀之則水經注為是司繁部落五萬餘皆降於統其衆聞妻子已降秦不戰而潰司繁無所歸亦詣統降降户江翻秦王堅以司繁為南單于留之長安以司繁從叔吐雷為勇士護軍勇士漢縣晉省此因漢縣名而置護軍撫其部衆為後乞伏步頹以鮮卑叛秦張本二年春二月秦以清河房曠為尚書左丞徵曠兄黙及清河崔逞燕國韓亂為尚書郎北平陽陟田勰陽瑶為著作佐郎晉志著作郎一人謂之大著作專掌史任又置佐著作郎八人勰音協郝略為清河相皆關東士望王猛所薦也瑶騖之子也陽騖仕燕歴事三朝騖音務冠軍將軍慕容垂言于秦王堅曰臣叔父評燕之惡來輩也惡來以多力事紂紂嬖之以亡國惡來輩一作惡來革史記曰惡來善毁讒諸矦以此益疏輩當作革不宜復汚聖朝復扶又翻汚烏故翻願陛下為燕戮之為于偽翻下為人同堅乃出評為范陽太守燕之諸王悉補邊郡臣光曰古之人滅人之國而人悦何哉為人除害故也此惟湯武足以當之下此則漢髙帝猶庶㡬焉為于偽翻彼慕容評者蔽君專政忌賢疾功愚闇貪虐以喪其國喪息浪翻國亡不死逃遁見禽事見上卷海西公太和五年秦王堅不以為誅首又從而寵秩之秩序也官也寵秩謂寵而序其官使不失次也是愛一人而不愛一國之人也其失人心多矣是以施恩于人而人莫之恩盡誠于人而人莫之誠卒于功名不遂容身無所卒子恤翻由不得其道故也三月戊午遣侍中王坦之徵大司馬温入輔温復辭復扶又翻秦王堅詔關東之民學通一經才成一藝者在所以禮送之在官百石以上學不通一經才不成一藝者罷遣還民苻堅之政如此而猶不能終況不及苻堅者乎夏四月徙海西公于吳縣西柴里敕吳國内史刁彞防衛又遣御史顧允監察之監工銜翻彞協之子也刁協元帝信用之六月癸酉秦以王猛為丞相中書監尚書令太子太傅司𨽻校尉特進常侍持節將軍矦如故仍帶特進散騎常侍使持節車騎大將軍清河郡矦印綬也陽平公融為使持節都督六州諸軍事鎮東大將軍冀州牧代王猛鎮鄴使疏吏翻庾希庾邈與故青州刺史武沈之子遵聚衆夜入京口城沈持林翻晉陵太守卞􅀈踰城奔曲阿􅀈丁含翻沈約曰呉時分無錫以西為毗陵郡治丹徒後復還毗陵東海王越世子名毗東海國故食毗陵永嘉五年改為晉陵大興初郡及丹徒縣悉治京口希詐稱受海西公密㫖誅大司馬温建康震擾内外戒嚴卞􅀈發諸縣兵二千人擊希希敗閉城自守温遣東海内史周少孫討之元帝割吳郡海虞縣之北境為東海郡秋七月壬辰拔其城擒希邈及其親黨皆斬之庾亮之後滅矣􅀈壼之子也卞壼事元明二帝死于蘇峻之難甲寅帝不豫急召大司馬温入輔一日一夜發四詔温辭不至初帝為會稽王娶王述從妹為妃生世子道生及弟俞生道生疎躁無行從才用翻行下孟翻母子皆以幽廢死餘三子郁朱生天流皆早夭夭於紹翻諸姬絶孕將十年王使善相者視之孕以證翻相息亮翻下同皆曰非其人又使視諸婢媵媵以證翻卑女為婢婢女之下者送女從嫁曰媵有李陵容者在織坊中黑而長宮人謂之崑崙謂其人如崑崙也崑崙國在南海外崙盧昆翻相者驚曰此其人也王召之侍寢生子昌明及道子晉書曰初簡文帝見䜟曰晉祚盡昌明及孝武帝之在孕也李太后夢神人謂之曰汝生男以昌明為字及産東方始明因以為名焉帝後悟乃流涕及孝武帝崩晉自此傾矣己未立昌明為皇太子生十年矣以道子為琅邪王領會稽國以奉帝母鄭太妃之祀帝封琅邪王所生母鄭夫人薨固請服重徙封㑹稽王追號鄭夫人為會稽太妃會工外翻遺詔大司馬温依周公居攝故事又曰少子可輔者輔之如不可君自取之用漢昭烈屬諸葛亮之言少詩照翻侍中王坦之自持詔入于帝前毁之帝曰天下儻來之運卿何所嫌坦之曰天下宣元之天下宣帝肇基帝業元帝中興故云然陛下何得専之帝乃使坦之改詔曰家國事一稟大司馬如諸葛武侯王丞相故事王丞相導也是日帝崩年五十三羣臣疑惑未敢立嗣或曰當須大司馬處分處昌呂翻分扶問翻尚書僕射王彪之正色曰天子崩太子代立大司馬何容得異若先面諮必反為所責朝議乃定朝直遥翻太子即皇帝位大赦崇徳太后令康獻褚太后既歸政于穆帝居崇徳宫及哀帝海西公之世復臨朝稱制海西既廢簡文即位尊后為崇徳太后以帝沖㓜加在諒闇闍音陰令温依周公居攝故事事已施行王彪之曰此異常大事大司馬必當固讓使萬機停滯稽廢山陵未敢奉令謹具封還事遂不行此事即封還詔書之始也温望簡文臨終禪位於己不爾便當居攝既不副所望甚憤怨與弟冲書曰遺詔使吾依武侯王公故事耳温疑王坦之謝安所為心銜之詔謝安徵温入輔温又辭八月秦丞相猛至長安復加都督中外諸軍事復扶又翻猛辭曰元相之重儲傅之尊端右事繁京牧任大總督戎機出納帝命元相丞相也儲傅太子太傅也端右尚書令也京牧司𨽻校尉也總督戎機都督中外諸軍事也出納帝命中書監常侍之職也文武兩寄巨細並關以伊呂蕭鄧之賢尚不能兼謂伊尹呂望蕭何鄧禹也況臣猛之無似無似猶言不肖也章三四上上時掌翻秦王堅不許曰朕方混壹四海非卿無可委者卿之不得辭宰相猶朕不得辭天下也猛為相堅端拱于上百官總已於下軍國内外之事無不由之猛剛明清肅善惡著白放黜尸素尸素尸位素餐者也顯拔幽滯勸課農桑練習軍旅官必當才刑必當罪由是國富兵彊戰無不克秦國大治治直吏翻堅敕太子宏及長樂公丕等曰汝事王公如事我也樂音洛陽平公融在冀州髙選綱紀綱紀謂官屬綱紀衆事者也以尚書郎房黙河間相申紹為治中别駕姓譜房姓本自丹朱舜封為房邑矦子陵以父封為氏清河崔宏為州從事管記室融年少為政好新竒貴苛察申紹數規正少詩照翻好呼到翻數所角翻下同導以寛和融雖敬之未能盡從後紹出為濟北太守濟子禮翻融屢以過失聞數致譴讓乃自恨不用紹言融嘗坐擅起學舎為有司所糾遣主簿李纂詣長安自理纂憂懼道卒卒子恤翻融問申紹誰可使者紹曰燕尚書郎髙泰清辯有膽智可使也先是丞相猛及融屢辟泰泰不起先悉薦翻至是融謂泰曰君子救人之急卿不得復辭復扶又翻泰乃從命至長安猛見之笑曰髙子伯於今乃來何其遟也髙泰字子伯泰曰罪人來就刑何問遟速猛曰何謂也泰曰昔魯僖公以泮宫發頌詩魯頌泮水頌僖公能脩泮宫也齊宣王以稷下垂聲史記齊宣王喜文學遊説之士騶衍淳于髠田駢慎到接子環淵之徒七十六人皆賜列第稷下學士且數百千人劉向别録曰齊有稷門城門也談説之士期會於稷下也虞喜曰齊有稷山立館其下以待遊士今陽平公開建學宫追蹤齊魯未聞明詔褒美乃更煩有司舉劾劾户槩翻又户得翻明公阿衡聖朝懲勸如此下吏何所逃其罪乎猛曰是吾過也事遂得釋猛因歎曰髙子伯豈陽平所宜吏乎言于秦王堅堅召見悦之問以為治之本對曰治本在得人得人在審舉審舉在核真未有官得其人而國家不治者也治直吏翻堅曰可謂辭簡而理博矣以為尚書郎泰固請還州還冀州也堅許之九月追尊故會稽王妃王氏曰順皇后即王述從妹也會工外翻尊帝母李氏為淑妃冬十月丁卯葬簡文帝于髙平陵彭城妖人盧悚晉氏南渡僑置彭城郡於晉陵界妖於驕翻自稱大道祭酒事之者八百餘家十一月遣弟子許龍如吳晨到海西公門稱太后密詔奉迎興復公初欲從之納保母諫而止龍曰大事垂捷焉用兒女子言乎焉於䖍翻公曰我得罪于此幸蒙寛宥豈敢妄動且太后有詔便應官屬來何獨使汝也汝必為亂因叱左右縛之龍懼而走甲午悚帥衆三百人晨攻廣莫門廣莫門建康城北門也帥讀曰率下同詐稱海西公還由雲龍門突入殿庭雲龍門建康宫門也略取武庫甲仗門下吏士駭愕不知所為吏士守衛雲龍門者也游擊將軍毛安之聞難帥衆直入雲龍門難乃旦翻帥讀曰率手自奮擊左衛將軍殷康中領軍桓祕入止車門與安之并力討誅之并黨與死者數百人海西公深慮横禍横户孟翻專飲酒恣聲色有子不育時人憐之朝廷知其安于屈辱故不復為虞虞防也備也復扶又翻秦都督北蕃諸軍事鎮北大將軍開府儀同三司朔方桓矦梁平老卒平老在鎮十餘年鮮卑匈奴憚而愛之平老鎮朔方始一百卷穆帝升平三年三吳大旱人多餓死吳郡呉興義興為三吳注已見前烈宗孝武皇帝上之上諱曜字昌明簡文帝第三子諡法五宗安之曰孝克定禍亂曰武寧康元年春正月己夘朔大赦改元二月大司馬温來朝朝直遥翻辛巳詔吏部尚書謝安侍中王坦之迎于新亭是時都下人情恟恟恟許勇翻或云欲誅王謝因移晉室坦之甚懼安神色不變曰晉祚存亡決於此行温既至百官拜于道側温大陳兵衛延見朝士朝直遥翻有位望者皆戰慴失色位列位也中庭左右謂之位孟子曰賢者在位能者在職則有位者公卿大臣也望名望也慴質涉翻坦之流汗沾衣倒執手版沈約曰手版則古笏矣尚書令僕射尚書手版頭復有白筆以紫皮裹之名笏安從容就席從千容翻坐定謂温曰安聞諸矦有道守在四隣左傳楚沈尹戌曰天子守在四夷諸矦守在四隣明公何須壁後置人邪温笑曰正自不能不爾遂命左右撤之與安笑語移日史言王坦之雖忠於晉室而識度劣於謝安移日言笑語之乆不覺日晷之移郗超常為温謀主郗丑之翻安與坦之見温温使超臥帳中聽其言風動帳開安笑曰郗生可謂入幕之賔矣時天子㓜弱外有彊臣安與坦之盡忠輔衛卒安晉室卒子恤翻温治盧悚入宮事治直之翻收尚書陸始付廷尉免桓祕官連坐者甚衆遷毛安之為左衛將軍桓祕由是怨温三月温有疾停建康十四日甲午還姑孰夏代王什翼犍使燕鳯入貢于秦犍居言翻燕於賢翻姓也秋七月己亥南郡宣武公桓温薨初温疾篤諷朝廷求九錫屢使人趣之趣讀曰促謝安王坦之故緩其事有心為之謂之故使袁宏具草宏以示王彪之彪之歎其文辭之美因曰卿固大才安可以此示人言不當為此文也謝安見其草輒改之由是厯旬不就宏密謀於彪之彪之曰聞彼病日増亦當不復支乆自可更小遲迴安晉之功人皆歸之謝安王坦之彪之實預有力於其間復扶又翻温弟江州刺史沖問温以謝安王坦之所任温曰渠等不為汝所處分吳俗謂他人為渠儂處昌呂翻分扶問翻其意以為已存彼必不敢立異死則非冲所制若害之無益于沖更失時望故也觀桓温所以待安坦之者如此二人者豈易及哉温以世子熙才弱使沖領其衆於是桓祕與熙弟濟謀共殺冲冲密知之不敢入俄頃温薨冲先遣力士拘録熙濟而後臨喪録收也祕遂被廢棄熙濟俱徙長沙詔𦵏温依漢霍光及安平獻王故事冲稱温遺命以少子𤣥為嗣為桓𤣥簒晉張本少詩照翻時方五嵗襲封南郡公庚戌加右將軍荆州刺史桓豁征西將軍督荆揚雍交廣五州諸軍事揚恐當作梁雍於用翻桓冲為中軍將軍都督揚豫江三州諸軍事揚豫二州刺史鎮姑孰竟陵太守桓石秀為寧逺將軍江州刺史鎮潯陽三分温所統以授其弟姪石秀豁之子也冲既代温居任盡忠王室或勸冲誅除時望専執時權冲不從始温在鎮死罪皆專決不請冲以為生殺之重當歸朝廷凡大辟皆先上辟毗亦翻上時掌翻須報然後行之史言桓冲事晉朝忠順謝安以天子幼冲新喪元輔喪息浪翻欲請崇徳太后臨朝王彪之曰前世人主幼在襁褓母子一體故可臨朝朝直遥翻下同太后亦不能決事要須顧問大臣今上年出十嵗垂及冠婚冠古玩翻反令從嫂臨朝帝元帝之孫於康帝為從弟故太后為從嫂從才用翻示人主幼弱豈所以光揚聖徳乎諸公必欲行此豈僕所制所惜者大體耳安不欲委任桓冲故使太后臨朝已得以專獻替裁決遂不從彪之之言史言彪之所陳者正義謝安所行者時宜八月壬子太后復臨朝攝政復扶又翻梁州刺史楊亮遣其子廣襲仇池簡文帝咸安元年秦取仇池與秦梁州刺史楊安戰廣兵敗沮水諸戍皆委城奔潰班志沮水出武都沮縣東狼谷東流合為漢水晉蓋阻沮水列戍以備秦沮千余翻亮懼退守磬險九月安進攻漢川漢川即漢中郡之地丙申以王彪之為尚書令謝安為僕射領吏部共掌朝政朝直遥翻安每歎曰朝廷大事衆所不能決者以諮王公無不立決以吳國内史刁彞為徐兖二州刺史鎮廣陵冬秦王堅使益州刺史王統祕書監朱肜帥卒二萬出漢川肜余冲翻帥讀曰率下同前禁將軍毛當秦置左右前後四禁將軍鷹揚將軍徐成帥卒三萬出劔門入冦梁益梁州刺史楊亮帥巴獠萬餘拒之蜀先無獠李勢之時始自山出獠盧皓翻戰于青谷新唐志洋州真符縣本華陽縣開元十八年析興道置天寳八載開清水谷路興道縣即興埶之地亮兵敗奔固西城西城縣漢屬漢中郡魏晉屬魏興郡奔固者奔西城以自固也肜遂拔漢中徐成攻劔閣克之楊安進攻梓潼梓潼太守周虓固守涪城遣步騎數千送母妻自漢水趣江陵朱肜邀而獲之此漢水蓋蜀人所謂西漢水也與涪水會至渝州入江順江而下則達江陵然朱肜克漢中因得邀獲虓母妻則又似自漢中之漢水趣江陵但秦兵已至梓潼自涪以北皆為秦有虓母妻安能越劔閣取漢水路而趣江陵乎意謂當以此漢水為西漢水虓虚交翻涪音浮趣七喻翻虓遂降于安降戶江翻下同十一月安克梓潼梓潼縣漢屬廣漢郡劉蜀分為梓潼郡治涪潼音同荆州刺史桓豁遣江夏相笁瑤救梁益瑶聞廣漢太守趙長戰死引兵退益州刺史周仲孫勒兵拒朱肜于緜竹聞毛當將至成都仲孫帥騎五千奔于南中秦遂取梁益二州卭筰夜郎皆附于秦卭渠容翻筰才各翻秦王堅以楊安為益州牧鎮成都毛當為梁州刺史鎮漢中姚萇為寧州刺史屯墊江墊音疊王統為南秦州刺史鎮仇池秦王堅欲以周虓為尚書郎虓曰蒙晉厚恩但老母見獲失節于此母子獲全秦之惠也雖公矦之貴不以為榮況郎官乎遂不仕每見堅或箕踞而坐呼為氐賊堅本氐也故以氐賊呼之此必虓母死後事嘗值元會正月一日為元日是日朝會為元會儀衛甚盛堅問之曰晉朝元會與此何如虓攘袂厲聲曰犬羊相聚何敢比擬天朝秦之君臣皆六夷也故詆之為犬羊天朝謂晉也朝直遥翻秦人以虓不遜屢請殺之堅待之彌厚周仲孫坐失守免官桓冲以冠軍將軍毛虎生為益州刺史領建平太守冠古玩翻以虎生子球為梓潼太守虎生與球伐秦至巴西以糧乏退屯巴東以侍中王坦之為中書令領丹楊尹是嵗鮮卑勃寒掠隴右勃寒亦隴西鮮卑也秦王堅使乞伏司繁討之勃寒請降遂使司繁鎮勇士川勇士川即漢天水勇士縣之地有彗星出于尾箕長十餘丈彗祥嵗翻又旋芮翻又徐醉翻長直亮翻經太㣲掃東井自四月始見及秋冬不滅秦太史令張孟言于秦王堅曰尾箕燕分東井秦分天文志尾九星箕四星燕幽州分東井八星秦雍州分見賢遍翻分扶問翻今彗起尾箕而掃東井十年之後燕當滅秦二十年之後代當滅燕按天文志雲中入東井一度定襄入東井八度鴈門入東井十六度代郡入東井二十八度是皆拓跋氏所有之地也所以知代當滅燕者天道好還彗起燕分而掃秦分此燕滅秦之徵秦已滅矣代乗天道好還之運反而滅燕自然之大數也太元十年慕容冲破長安距是嵗僅十一年安帝隆安元年拓跋珪克中山距是嵗二十三年慕容暐父子兄弟我之仇敵而布列朝廷貴盛莫二臣竊憂之宜翦其魁桀者以消天變堅不聽陽平公融上疏曰東胡跨據六州鮮卑東胡之餘種也南面稱帝陛下勞師累年然後得之事見上卷海西公太和四年五年本非慕義而來今陛下親而幸之使其父兄子弟森然滿朝木多為林森然猶林然也朝直遥翻執權履職埶傾勲舊臣愚以為狼虎之心終不可養星變如此願少留意堅報曰朕方混六合為一家視夷狄為赤子汝宜息慮勿懐耿介詩曰憂心耿耿賢曰介介猶耿耿也夫惟修徳可以禳災茍能内求諸已何懼外患乎史言苻堅養虎自遺患為悔不用融言張本二年春正月癸未朔大赦己酉刁彞卒二月癸丑以王坦之為都督徐兖青三州諸軍事徐兖二州刺史鎮廣陵詔謝安摠中書王坦之出鎮安兼摠中書安好聲律朞功之慘不廢絲竹朞功朞及大功小功之喪也好呼到翻士大夫效之遂以成俗王坦之屢以書苦諫之曰天下之寳當為天下惜之為于偽翻言禮法為天下之寳安不能從三月秦太尉建寧烈公李威卒夏五月蜀人張育楊光起兵擊秦有衆二萬遣使來請兵使疏吏翻秦王堅遣鎮軍將軍鄧羌帥甲士五萬討之帥讀曰率益州刺史笁瑤威逺將軍桓石䖍帥衆三萬攻墊江姚萇兵敗退屯五城晉志廣漢郡有五城縣武帝咸寧四年立唐梓州之𤣥武縣也華陽國志云漢時立倉於此發五縣人尉部主之後因以為五城縣有五城山瑶石虔屯巴東張育自號蜀王與巴獠酋帥張重尹萬萬餘人進圍成都獠魯皓翻酋慈由翻帥所類翻六月育改元黒龍秋七月張育與張重等爭權舉兵相攻秦楊安鄧羌襲育敗之敗補邁翻下同育與楊光退屯緜竹八月鄧羌敗晉兵于涪西九月楊安敗張重尹萬于成都南敗補邁翻重死斬首二萬三千級鄧𦍑撃張育楊光于緜竹皆斬之益州復入于秦復扶又翻冬十二月有人入秦明光殿大呼曰甲申乙酉魚羊食人悲哉無復遺魚羊合成鮮字謂鮮卑也是後慕容起兵攻秦果在甲申乙酉之嵗呼火故翻秦王堅命執之不獲祕書監朱肜祕書侍郎略陽趙整晉祕書省有丞有郎無侍郎秦以整為祕書郎内侍左右故曰侍郎固請誅鮮卑堅不聽整宦官也博聞彊記能屬文屬之欲翻好直言上書及面諫前後五十餘事好呼到翻上時掌翻慕容垂夫人得幸于堅即段夫人也堅與之同輦遊于後庭整歌曰不見雀來入鷰室但見浮雲蔽白日堅改容謝之命夫人下輦是嵗代王什翼犍擊劉衛辰南走衛辰之下更有衛辰字文意乃足為下衛辰求救於秦張本犍居言翻三年春正月辛亥大赦夏五月丙午藍田獻矦王坦之卒臨終與謝安桓冲書惟以國家為憂言不及私桓冲以謝安素有重望欲以揚州讓之自求外出桓氏族黨皆以為非計莫不扼腕固諫腕烏貫翻郗超亦深止之揚州統攝京畿權仕要重故皆止冲冲皆不聽處之澹然處昌呂翻澹徒覽翻甲寅詔以冲都督徐豫兖青揚五州諸軍事徐州刺史鎮京口以安領揚州刺史並加侍中六月秦清河武矦王猛寢疾秦王堅親為之祈南北郊及宗廟社稷為于偽翻下同分遣侍臣徧禱河嶽諸神蓋黄河及華嶽諸神不盡徧四嶽也猛疾少瘳為之赦殊死以下身首横分為殊死少詩􅀈翻猛上疏曰不圖陛下以臣之命而虧天地之徳開闢以來未之有也臣聞報徳莫如盡言謹以垂沒之命竊獻遺欵欵誠也伏惟陛下威烈振乎八荒八方之外為八荒爾雅觚竹北户西王母日下謂之四荒聲敎光乎六合六合天地東西南北九州百郡十居其七平燕定蜀有如拾芥師古曰草芥之横在地上者俛而拾之言易而必得也夫善作者不必善成善始者不必善終樂毅荅燕惠王書之言是以古先哲王知功業之不易戰戰兢兢如臨深谷詩小宛惴惴小心如臨于谷戰戰兢兢如履薄冰易以豉翻伏惟陛下追蹤前聖天下幸甚堅覽之悲慟秋七月堅親至猛第視疾訪以後事猛曰晉雖僻處江南然正朔相承王猛事秦亦知正統之在江南徐光之論非矣處昌呂翻上下安和臣没之後願勿以晉為圖鮮卑西羌我之仇敵終為人患後卒如猛言宜漸除之以便社稷言終而卒堅比歛三臨哭比必寐翻及也歛力贍翻臨如字謂太子宏曰天不欲使吾平壹六合邪何奪吾景略之速也𦵏之如漢霍光故事八月癸巳立皇后王氏大赦后濛之孫也王濛善清談與劉惔齊名以后父晉陵太守藴為光禄大夫領五兵尚書魏始置五兵尚書謂總録中兵外兵别兵都兵騎兵事也封建昌矦藴固辭不受九月帝講孝經始覽典籍延儒士謝安薦東莞徐邈補中書舎人晉初中書置通事舎人各一人掌呈奏案及掌詔命沈約曰晉置中書侍郎又置舎人一人通事一人江左初合舎人通事謂之通事舎人掌呈案奏章後省通事莞音官毎被顧問多所匡益帝或晏集酣樂之後好為手詔詩章以賜侍臣或文詞率爾所言穢雜邈應時收歛還省省謂中書省被皮義翻樂音洛好呼到翻刋削皆使可觀經帝重覽重直龍翻然後出之時議以此多邈冬十月癸酉朔日有食之秦王堅下詔曰新喪賢輔百司或未稱朕心可置聽訟觀于未央南喪息浪翻稱尺證翻下同觀古玩翻朕五日一臨以求民隠今天下雖未大定權可偃武修文以稱武矦雅㫖其增崇儒敎禁老莊圖䜟之學犯者棄市王猛諡武侯稱尺證翻䜟楚譛翻妙簡學生太子及公侯百僚之子皆就學受業中外四禁二衛四軍長上將士皆令受學秦有中軍外軍將軍前禁後禁左禁右禁將軍是為四禁左衛右衛將軍是為二衛衛軍撫軍鎮軍冠軍將軍是為四軍長上者長上宿衛將士也上時掌翻將即亮翻二十人給一經生教讀音句後宫置典學以教掖庭選閹人及女𨽻敏慧者詣博士授經女𨽻沒入為官婢者奚官次是也尚書郎王佩讀䜟堅殺之學䜟者遂絶資治通鑑卷一百三
