front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百十二宋司馬光撰胡三省音注晉紀三十四起重光赤奮若盡𤣥黓攝提格凡二年安皇帝下隆安五年春正月武威王利鹿孤欲稱帝羣臣皆勸之安國將軍鍮勿崙曰安國将軍漢獻帝以授張楊鍮託侯翻崙盧昆翻吾國自上世以來被髮左袵被皮義翻無冠帶之飾逐水草遷徙無城郭室廬故能雄視沙漠抗衡中夏夏户雅翻今舉大號誠順民心然建都立邑難以避患儲蓄倉庫啟敵人心不如處晉民於城郭勸課農桑以供資儲帥國人以習戰射鄰國弱則乗之强則避之此久長之良䇿也自漢以來善為夷狄謀者莫過此策矣處昌吕翻帥讀曰率且虚名無實徒足為世之質的將安用之質受斧的受矢按詩發彼有的毛傳云的質也正義曰毛氏於射侯之事正鵠不明惟猗嗟傳云二尺曰正亦不言正之所施周禮鄭衆馬融注皆云十尺曰侯四尺曰鵠二尺曰正四寸曰質則以為侯皆一丈鵠及正質於一侯之中為此等級則以質為四寸也王肅引爾雅云射張皮謂之侯侯中謂之鵠鵠中謂之正正方二尺正中謂之𣙗𣙗方六寸𣙗則質也舊云方四寸今云方六寸爾雅説明宜從之肅意惟改質為六寸餘同鄭馬賈逵周禮注云四尺曰正正五重鵠居其内而方二尺以為正正大於鵠鵠在正内雖内外不同亦共在一侯鄭於周禮上下檢之以為大射之侯其中制皮為鵠賔射之侯其中采畫為正正大如鵠皆居侯中三分之一其燕射則射獸侯侯中畫為獸形即鄉射記所謂熊侯白質之類射義云孔子曰循聲而發發而不失正鵠者其惟賢者乎詩云發彼有的以祈爾爵旣言正鵠即引此的則詩人之意以的為正鵠之謂也司裘注説皮侯之狀云以虎熊豹麋之皮飾其側又方制之以為質謂之鵠是鄭意以侯中所射之處為質也此毛傳唯言的質也利鹿孤曰安國之言是也乃更稱河西王更工衡翻王武威則一郡而已王河西則欲兼漢四郡之地此利鹿孤之志也以廣武公傉檀為都督中外諸軍事凉州牧録尚書事傉奴沃翻二月丙子孫恩出浹口浹即叶翻攻句章不能拔劉牢之撃之恩復走入海復扶又翻秦王興使乞伏乾歸還鎮苑川盡以其故部衆配之為乞伏氏復强張本凉王纂嗜酒好獵好呼到翻太常楊頴諌曰陛下應天受命當以道守之今疆宇日蹙﨑嶇二嶺之間姑臧南有洪池嶺西有丹嶺一作刪丹嶺陛下不兢兢夕愓以恢𢎞先業而沈湎遊畋沈持林翻不以國家為事臣竊危之纂遜辭謝之然猶不悛番禾太守吕超擅擊鮮卑思盤番禾縣漢屬張掖郡後漢晉省番音盤此郡盖吕氏置劉昫曰唐凉州天寳縣漢番禾縣地悛七縁翻番音盤思盤遣其弟乞珍訴於纂纂命超及思盤皆入朝朝直遙翻超懼至姑臧深自結於殿中監杜尚纂見超責之曰卿恃兄弟桓桓孔安國曰桓桓武貌乃敢欺吾今人謂相陵為相欺要當斬卿天下乃定超頓首謝纂本以恐愒超愒許葛翻實無意殺之因引超思盤及羣臣同宴於内殿超兄中領軍隆數勸纂酒數所角翻纂醉乗步輓車步輓車不用牛馬若羊等令人步而輓之魏書禮志步輓車天子小駕亦為副乗將超等游禁中將如字至琨華堂東閤車不得過纂親將竇川駱騰倚劒於壁推車過閤將即亮翻推吐雷翻超取劒擊纂纂下車禽超超刺纂洞胷刺七亦翻川騰與超格戰超殺之纂后楊氏命禁兵討超杜尚止之超之結尚也蓋有密約皆捨仗不戰將軍魏益多入取纂首楊氏曰人已死如土石無所復知何忍復殘其形骸乎復扶又翻益多罵之遂取纂首以徇曰纂違先帝之命殺太子而自立事見上卷三年荒淫暴虐番禾太守起順人心而除之以安宗廟凡我士庶同茲休慶纂叔父巴西公佗佗徒河翻弟隴西公緯皆在北城緯于貴翻或説緯曰超為逆亂公以介弟之親杜預曰介大也説輸芮翻下同仗大義而討之姜紀焦辨在南城楊桓田誠在東苑皆吾黨也何患不濟緯嚴兵欲與佗共撃超佗妻梁氏止之曰緯超俱兄弟之子何為舎超助緯自為禍首乎舎讀曰捨佗乃謂緯曰超舉事已成據武庫擁精兵圖之甚難且吾老矣無能為也超弟邈有寵於緯説緯曰纂賊殺兄弟謂殺紹又殺𢎞也説輸芮翻隆超順人心而討之正欲尊立明公耳方今明公先帝之長子當主社稷人無異望夫復何疑長知兩翻復扶又翻緯信之乃與隆超結盟單馬入城超執而殺之讓位於隆隆有難色超曰今如乗龍上天豈可中下隆遂即天王位隆字永基光弟寶之子也大赦改元神鼎超先於番禾得小鼎以為神瑞故以紀元尊母衞氏為太后妻楊氏為后以超為都督中外諸軍事輔國大將軍録尚書事封安定公諡纂曰靈帝纂后楊氏將出宫超恐其挾珍寶命索之索山客翻楊氏曰爾兄弟不義手刃相屠我旦夕死人安用寳為超又問玉璽所在璽斯氏翻楊氏曰已毁之矣后有美色超將納之謂其父右僕射桓曰后若自殺禍及卿宗桓以告楊氏楊氏曰大人賣女與氐以圖富貴一之謂甚其可再乎引左傳之言遂自殺諡曰穆后桓犇河西王利鹿孤利鹿孤以為左司馬三月孫恩北趣海鹽海鹽縣本武原鄉秦以為海鹽縣漢屬㑹稽郡後漢晉屬呉郡今在秀州東南八十里趣七喻翻劉裕隨而拒之築城於海鹽故治恩日來攻城裕屢擊破之斬其將姚盛城中兵少不敵將即亮翻少詩沼翻裕夜偃旗匿衆明晨開門使羸疾數人登城羸倫為翻賊遙問劉裕所在曰夜已走矣賊信之爭入城裕奮擊大破之恩知城不可拔乃進向滬瀆裕復棄城追之滬音户復扶又翻海鹽令鮑陋遣子嗣之帥呉兵一千請為前驅帥讀曰率裕曰賊兵甚精呉人不習戰若前驅失利必敗我軍敗補邁翻可在後為聲埶嗣之不從裕乃多伏旗鼓前驅既交諸伏皆出裕舉旗鳴鼓賊以為四面有軍乃退嗣之追之戰沒裕且戰且退所領死傷且盡至向戰處令左右脱取死人衣以示閒暇閒讀曰閑賊疑之不敢逼裕大呼更戰呼火故翻賊懼而退裕乃引歸河西王利鹿孤伐凉與凉王隆戰大破之徙二千餘户而歸夏四月辛邜魏人罷鄴行臺魏置鄴行臺見一百一十卷隆安二年以所統六郡置相州以庾岳為刺史魏相州統魏郡陽平廣平汲郡頓丘清河六郡杜佑曰後魏置相州於鄴取河亶甲居相以名州乞伏乾歸至苑川以邊芮為長史王松壽為司馬公卿将帥皆降為僚佐偏禆将即亮翻帥所類翻北凉王業憚沮渠蒙遜勇略欲逺之沮子余翻逺于願翻蒙遜亦深自晦匿業以門下侍郎馬權代蒙遜為張掖太守守式又翻權素豪雋為業所親重常輕侮蒙遜蒙遜譛之於業曰天下不足慮惟當憂馬權耳業遂殺權以余觀之索嗣馬權皆庸夫耳恃倚世資而使氣無能為也蒙遜謂沮渠男成曰段公無鑒㫁之才鑒明也㫁决也㫁丁亂翻非撥亂之主曏所憚者惟索嗣馬權今皆已死索嗣死見上卷四年蒙遜欲除之以奉兄何如男成曰業本孤客為吾家所立恃吾兄弟猶魚之有水夫人親信我而圗之不祥蒙遜乃求為西安太守業喜其出外許之蒙遜與男成約同祭蘭門山而陰使司馬許咸告業曰男成欲以取假日為亂假居訝翻休假也若求祭蘭門山臣言驗矣至期果然業收男成賜死男成曰䝉遜先與臣謀反臣以兄弟之故隱而不言今以臣在恐部衆不從故約臣祭山而反誣臣其意欲王之殺臣也乞詐言臣死暴臣罪惡蒙遜必反臣然後奉王命而討之無不克矣業不聽殺之蒙遜泣告衆曰男成忠於段王而段王無故枉殺之諸君能為報仇乎為于偽翻且始者共立段王欲以安衆耳今州土紛亂非段王所能濟也男成素得衆心衆皆憤泣爭奮比至氐池氐池縣漢屬張掖郡晉省其地屬唐甘州張掖縣界比必寐翻及也氐丁尼翻又音低衆逾一萬鎮軍將軍臧莫孩率所部降之孩河開翻降户江翻下同羌胡多起兵應蒙遜者蒙遜進逼侯塢業先疑右將軍田昻囚之至是召昻謝而赦之使與武衛將軍梁中庸共討蒙遜别將王豐孫言於業曰將即亮翻西平諸田世有反者昻貌恭而心險不可信也業曰吾疑之久矣但非昻無可以討蒙遜者昻至侯塢率騎五百降於䝉遜業軍遂潰中庸亦詣蒙遜降危疑反側之時用言為難而用人為尤難當此之際非有明略雄㫁不能濟也五月蒙遜至張掖田昻兄子承愛斬闗内之業左右皆散蒙遜至業謂蒙遜曰孤孑然一已為君家所推願匄餘命匄古泰翻乞也使得東還與妻子相見䝉遜斬之北凉段業四年而亡業儒素長者長知兩翻無他權略威禁不行羣下擅命尤信卜筮巫覡覡它狄翻故至於敗沮渠男成之弟富占将軍俱傫帥户五百降于河西王利鹿孤傫石子之子也傫倫追翻俱石子見一百六卷孝武太元十年帥讀曰率下同孫恩陷滬瀆殺呉國内史袁崧死者四千人崧當作山松凉王隆多殺豪望以立威名内外囂然人不自保魏安人焦朗魏安縣在武威昌松縣界盖曹魏所置也而晉志不見後魏置魏安郡遣使説秦隴西公碩徳曰吕氏自武皇棄世吕光偽諡懿武皇帝説輸芮翻兄弟相攻政綱不立競為威虐百姓饑饉死者過半今乗其簒奪之際取之易於返掌易以豉翻返當作反不可失也碩徳言於秦王興帥步騎六萬伐凉乞伏乾歸帥騎七千從之六月甲戌孫恩浮海奄至丹徒丹徒縣古朱方也後日谷陽秦改曰丹徒漢屬㑹稽郡後漢屬呉郡晉屬晉陵郡地理志曰秦時望氣者云其地有天子氣始皇使赭衣三千人鑿城敗其勢改曰丹徒戰士十餘萬樓船千餘艘艘蘇遭翻建康震駭乙亥内外戒嚴百官入居省内冠軍將軍髙素等守石頭冠古玩翻輔國將軍劉襲柵㫁淮口秦淮入江之口也㫁丁管翻丹陽尹司馬恢之戍南岸冠軍將軍桓謙等備白石左衛將軍王嘏等屯中堂徴豫州刺史譙王尚之入衛京師劉牢之自山陰引兵邀擊恩未至而恩已過乃使劉裕自海鹽入援裕兵不滿千人倍道兼行與恩俱至丹徒裕衆既少少詩沼翻加以涉逺疲勞而丹徒守軍莫有鬭志恩帥衆鼓譟登蒜山蒜山今在鎮江府城西三里山上多蒜故名蒜蘇貫翻居民皆荷擔而立荷下可翻擔都濫翻裕帥所領奔擊大破之帥讀曰率下同投崖赴水者甚衆恩狼狽僅得還船然恩猶恃其衆尋復整兵徑向京師復扶又翻下同後將軍元顯帥兵拒戰頻不利㑹稽王道子無他謀略唯日禱蔣侯廟蔣侯廟在蔣山在今建康府上元縣東北十八里漢末秣陵尉蔣子文討賊戰死山下呉孫權為立廟江東朝野禱之率有靈應恩來漸近百姓忷懼忷許拱翻譙王尚之帥精鋭馳至徑屯積弩堂恩樓船髙大泝風不得疾行數日乃至白石恩本以諸軍分散欲掩不備既而知尚之在建康復聞劉牢之已還至新洲新洲在京口西大江中意即今之珠金沙是也復扶又翻不敢進而去浮海北走郁洲水經註曰束海朐縣東北海中有大洲謂之郁洲山海經所謂郁山在海中者也恩别將攻陷廣陵殺三千人寧朔將軍髙雅之擊恩於郁洲為恩所執寧朔將軍盖晉置桓𤣥厲兵訓卒常伺朝廷之隙伺相吏翻聞孫恩逼京師建牙聚衆上疏請討之元顯大懼㑹恩退元顯以詔書止之𤣥乃戒嚴梁中庸等共推沮渠䝉遜為大都督大將軍凉州牧張掖公赦其境内改元永安蒙遜署從兄伏奴為張掖太守和平侯弟挐為建忠將軍都谷侯從才用翻挐女余翻田昻為西郡太守臧莫孩為輔國將軍房晷梁中庸為左右長史張騭謝正禮為左右司馬騭之目翻擢任賢才文武咸悦河西王利鹿孤命羣臣極言得失西曹從事史暠曰暠古老翻陛下命將出征將即亮翻下同往無不捷然不以綏寧為先唯以徙民為務民安土重遷故多離叛此所以斬將拔城而地不加廣也利鹿孤善之秋七月魏兖州刺史長孫肥魏未得兖州也使肥以兖州刺史南略地耳将步騎二萬南徇許昌東至彭城将軍劉該降之将步即亮翻騎奇寄翻降户江翻下同秦隴西公碩德自金城濟河直趣廣武河西王利鹿孤攝廣武守軍以避之趣七喻翻攝收也秦軍至姑臧凉王隆遣輔國大将軍超龍驤将軍邈等逆戰驤思将翻碩徳大破之生禽邈俘斬萬計隆嬰城固守巴西公佗帥東苑之衆二萬五千降於秦帥讀曰率西凉公暠河西王利鹿孤沮渠蒙遜各遣使奉表入貢於秦暠古老翻使疏吏翻沮子余翻初凉将姜紀降於河西王利鹿孤廣武公傉檀與論兵略甚愛重之傉奴沃翻坐則連席出則同車每談論以夜繼晝利鹿孤謂傉檀曰姜紀信有美才然視候非常必不久留於此不如殺之紀若入秦必為人患傉檀曰臣以布衣之交待紀紀必不相負也八月紀将數十騎奔秦軍秃髪兄弟皆推傉檀之明略余究觀傉檀始末未敢許也又究觀姜紀自凉入秦始末則紀盖反覆詭譎之士而傉檀愛重之則傉檀盖以才辨為諸兄所重而智略不能濟此其所以亡國也説碩徳曰吕隆孤城無援明公以大軍臨之其勢必請降然彼徒文降而已未肯遂服也請給紀步騎三千與王松怱因焦朗華純之衆王松怱秦将也焦朗華純皆凉人説輸芮翻華户化翻伺其釁隙隆不足取也不然今秃髪在南兵彊國富若兼姑臧而據之威埶益盛沮渠蒙遜李暠不能抗也必将歸之如此則為國家之大敵矣碩徳乃表紀為武威太守配兵二千屯據晏然班固地理志武威休屠縣王莽改曰晏然後復曰休屠永寧中張軌於姑臧西北置武興郡晏然縣屬焉秦王興聞楊桓之賢而徵之利鹿孤不敢留史言諸凉畏秦之强詔以劉裕為下邳太守討孫恩於郁洲累戰大破之恩由是衰弱復縁海南走復扶又翻裕亦隨而邀擊之燕王盛懲其父寶以懦弱失國務峻威刑又自矜聰察多所猜忌羣臣有纎介之嫌皆先事誅之先悉薦翻由是宗親勲舊人不自保丁亥左将軍慕容國與殿上将軍秦輿段讃謀帥禁兵襲盛殿上将軍盖慕容所置縁晉之殿中将軍而名官也帥讀曰率事發死者五百餘人壬辰夜前将軍段璣與秦輿之子興段讃之子泰潜於禁中鼓譟大呼呼火故翻盛聞變帥左右出戰帥讀曰率賊衆逃潰璣被創創初良翻匿廂屋間俄有一賊從闇中擊盛盛被傷輦升前殿申約禁衞事定而卒年二十九慕容盛臨變而整此其雄略亦有過人者然以猜忌好殺致斃則天下之人固非一人可舞其智略而盡殺也中壘将軍慕容拔冗從僕射郭仲白太后丁氏以為國家多難宜立長君冗而隴翻從才用翻難乃旦翻長知兩翻時衆望在盛弟司徒尚書令平原公元而河間公熙素得幸於丁氏丁氏乃廢太子定密迎熙入宫明旦羣臣入朝朝直遥翻始知有變因上表勸進於熙熙以讓元元不敢當癸巳熙即天王位熙字道文垂之少子也捕獲段璣等皆夷三族甲午大赦丙申平原公元以嫌賜死閏月辛酉葬盛於興平陵諡曰昭武皇帝廟號中宗丁氏送葬未還中領軍慕容提步軍校尉張佛等謀立故太子定事覺伏誅定亦賜死燕立定為太子見上卷四年丙寅大赦改元光始秦隴西公碩徳圍姑臧累月東方之人在城中者多謀外叛魏益多復誘扇之復扶又翻下復生同欲殺凉王隆及安定公超事發坐死者三百餘家碩徳撫納夷夏分置守宰夏户雅翻守式又翻節食聚粟為持久之計凉之羣臣請與秦連和隆不許安定公超曰今資儲内竭上下嗷嗷雖使張陳復生亦無以為策張良陳平智謀之士故稱之陛下當思權變屈伸何愛尺書單使為卑辭以退敵使疏吏翻敵去之後修德政以息民若卜世未窮何憂舊業之不復周成王定鼎于郟鄏卜世三十卜年七百若天命去矣亦可以保全宗族不然坐守困窮終将何如隆乃從之九月遣使請降於秦降户江翻下同同考異曰姚興載記姚平伐魏與姚碩徳伐吕隆時魏書天興五年五月姚平來侵晉元興元年秦𢎞始四年也晉帝紀晉春秋皆云隆安五年降秦十六國西秦春秋云太初十四年五月乾歸隨姚碩徳伐凉南凉春秋云建和二年七月姚碩徳伐吕隆孤攝廣武守軍以避之皆隆安五年也按秦小國既與魏相持豈暇更興兵伐凉盖載記之誤也今以晉帝紀晉春秋十六國西秦南凉春秋為據碩徳表隆為鎮西大将軍凉州刺史建康公隆遣子弟及文武舊臣慕容筑楊頴等五十餘家入質于長安慕容筑燕宗室也苻堅滅燕其宗室悉補邊郡故筑留河西筑張六翻質音致下為質同碩徳軍令嚴整秋毫不犯祭先賢禮名士西土悦之沮渠蒙遜所部酒泉凉寧二郡叛降於西凉酒泉郡治福禄縣魏收地形志凉寧郡領園池貢澤二縣又聞吕隆降秦大懼遣其弟建忠将軍挐牧府長史張潜蒙遜自稱凉州牧置牧府長史挐女居翻見碩徳於姑臧請帥其衆東遷帥讀曰率碩徳喜拜潜張掖太守挐建康太守潜勸蒙遜東遷挐私謂蒙遜曰姑臧未拔吕氏猶存碩徳糧盡將還不能久也何為自棄土宇受制於人乎臧莫孩亦以為然孩何開翻蒙遜遣子奚念為質於河西王利鹿孤蒙遜既不東遷故為質於利鹿孤以求援利鹿孤不受曰奚念年少可遣挐也少詩沼翻冬十月蒙遜復遣使上疏於利鹿孤曰臣前遣奚念具披誠欵而聖㫖未昭復徴弟挐復扶又翻臣竊以為茍有誠信則子不為輕若其不信則弟不為重今冦難未夷難乃旦翻不獲奉詔願陛下亮之利鹿孤怒遣張松侯俱延興城侯文支將騎一萬襲蒙遜至萬歲臨松晉書地理志酒泉郡有延壽縣當是後改為萬嵗張天錫置臨松郡五代志曰臨松縣有臨松山後周省入張掖縣宋白曰隋煬帝併萬嵗入刪丹縣屬張掖郡將即亮翻騎奇寄翻執蒙遜從弟鄯善茍子從才用翻下同鄯時戰翻康曰鄯善複姓其先西域人以國為姓茍子其名余據紀文以鄯善茍子為蒙遜從弟則鄯善非姓也明矣虜其民六千餘户蒙遜從叔孔遮入朝于利鹿孤朝直遙翻許以挐為質利鹿孤乃歸其所掠召俱延等還文支利鹿孤之弟也南燕主備徳宴羣臣於延賢堂備徳本名徳既據齊地増上一字名備徳酒酣謂羣臣曰朕可方自古何等主青州刺史鞠仲曰陛下中興聖主少康光武之儔少詩照翻備徳顧左右賜仲帛千疋仲以所賜多辭之備徳曰卿知調朕朕不知調卿邪調徒了翻又如字調戲也卿所對非實故朕亦以虛言賞卿耳韓範進曰天子無戲言今日之論君臣俱失備徳大悦賜範絹五十匹備徳母及兄納皆在長安備徳遣平原人杜𢎞往訪之𢎞曰臣至長安若不奉太后動止當西如張掖徳仕秦為張掖太守其兄納因家于張掖故𢎞欲往張掖訪之以死為効臣父雄年踰六十乞本縣之祿以申烏鳥之情慈烏反哺故云然李宻陳情表曰烏烏私情願乞終養中書令張華曰杜𢎞未行而求禄要君之罪大矣要音邀備徳曰𢎞為君迎母為父求禄為于偽翻忠孝備矣何罪之有以雄為平原令𢎞至張掖為盗所殺十一月劉裕追孫恩至滬瀆海鹽又破之滬音扈俘斬以萬數恩遂自浹口逺竄入海浹音接十二月辛亥魏主珪遣常山王遵定陵公和䟦帥衆五萬襲沒弈干於髙平髙平漢屬安定魏收志屬涇州新平郡又原州有髙平郡酈道元云髙平川西南去安定三百四十里帥讀曰率乙邜魏虎威将軍宿沓干伐燕攻令支令音鈴又郎定翻支音祁又音祗乙丑燕中領軍宇文拔救之壬午宿沓干拔令支而戍之吕超攻姜紀不克遂攻焦朗姜紀時據晏然焦朗據魏安朗遣其弟子嵩為質於河西王利鹿孤以請迎利鹿孤遣車騎将軍傉檀赴之比至超已退質音致比必寐翻朗閉門拒之傉檀怒将攻之鎮北将軍俱延諫曰安土重遷人之常情朗孤城無食今年不降降户江翻後年自服何必多殺士卒以攻之若其不捷彼必去從他國棄州境士民以資鄰敵非計也不如以善言諭之傉檀乃與朗連和遂曜兵姑臧壁於胡阬胡阬在姑臧西傉檀知吕超必來斫營畜火以待之超夜遣中壘将軍王集帥精兵二千斫傉檀營帥讀曰率下同傉檀徐嚴不起集入壘中内外皆舉火光照如晝縱兵擊之斬集及甲首三百餘級吕隆懼偽與傉檀通好好呼到翻請於苑内結盟傉檀遣俱延入盟俱延疑其有伏毁苑牆而入超伏兵擊之俱延失馬步走淩江將軍郭祖力戰拒之俱延乃得免傉檀怒攻其昌松太守孟禕於顯美昌松顯美漢晉皆為縣屬武威郡吕光改昌松為東張掖郡尋復為昌松郡五代志後周廢顯美入姑臧禕許韋翻隆遣廣武將軍荀安國寧逺將軍石可帥騎五百救之安國等憚傉檀之彊遁還桓𤣥表其兄偉為江州刺史鎮夏口夏户雅翻司馬刁暢為輔國將軍督八郡軍事鎮襄陽遣其將皇甫敷馮該戍湓口移沮漳蠻二千户於江南左傳曰江漢沮漳楚之望也水經沮水出漢中房陵東南過臨沮界又束過枝江縣南入于江漳水出臨沮縣東荆山南至枝江縣北入于沮二水上下皆蠻所居也沮于余翻漳諸良翻立武寧郡更招集流民立綏安郡綏安郡治長寧縣隋省長寧入長林詔徴廣州刺史刁逵豫章太守郭昶之昶丑兩翻𤣥皆留不遣𤣥自謂有晉國三分之二數使人上已符瑞數所角翻上時掌翻欲以惑衆又致牋於㑹稽王道子曰賊造近郊以風不得進以雨不致火食盡故去耳非力屈也㑹工外翻造七到翻謂孫恩也昔國寳死後王恭不乗此威入統朝政朝直遙翻下在朝同足見其心非侮於明公也而謂之不忠今之貴要腹心有時流清望者誰乎豈可云無佳勝直是不能信之耳江東人士其名位通顯於時者率謂之佳勝名勝爾來一朝一夕遂成今日之禍爾來猶言如此以來也在朝君子皆畏禍不言𤣥沗任在逺是以披冩事實元顯見之大懼張法順謂元顯曰桓𤣥承藉世資素有豪氣既并殷楊專有荆楚殷楊謂殷仲堪楊佺期也并殷楊事見上卷隆安三年第下之所控引止三呉耳第府第也第下猶言門下閤下之類孫恩為亂東土塗地公私困竭𤣥必乗此縱其姦兇竊用憂之元顯曰為之奈何法順曰𤣥始得荆州人情未附方務綏撫未暇佗圖若乗此際使劉牢之為前鋒而第下以大軍繼進𤣥可取也元顯以為然㑹武昌太守庾楷以𤣥與朝廷構怨恐事不成禍及於已庾楷歸桓玄見一百十卷隆安二年密使人自結於元顯云𤣥大失人情衆不為用若朝廷遣軍已當為内應元顯大喜遣張法順至京口謀於劉牢之牢之以為難法順還謂元顯曰觀牢之言色必貳於我不如召入殺之不爾敗人大事敗必邁翻元顯不從於是大治水軍徴兵裝艦以謀討𤣥治直之翻艦戸黯翻元興元年春正月庚午朔是年三月元顯敗復隆安年號桓𤣥尋改曰大亨𤣥簒又改曰永始元興之元改於是年正月通鑑自是年迄義熙初元皆不改元興之元不與桓𤣥之簒撥亂世返之正也下詔罪狀桓𤣥以尚書令元顯為驃騎大將軍征討大都督都督十八州諸軍事加黄鉞時晉之境内有揚徐南徐兖南兖豫南豫青冀司荆江雍梁益寧交廣十八州而已元顯盡督之使其果能誅桓𤣥亦必凌上而簒奪之驃匹妙翻騎奇寄翻又以鎮北將軍劉牢之為前鋒都督前將軍譙王尚之為後部因大赦改元内外戒嚴加會稽王道子太傅㑹工外翻元顯欲盡誅諸桓中䕶軍桓脩驃騎長史王誕之甥也誕有寵於元顯因陳脩等與𤣥志趣不同元顯乃止誕導之曾孫也張灋順言於元顯曰桓謙兄弟每為上流耳目宜斬之以杜姦謀且事之濟不繫在前軍不讀曰否而牢之反覆萬一有變則禍敗立至可令牢之殺謙兄弟以示無貳心若不受命當逆為之所逆為之所及禍患未來而先為之圖欲殺牢之也元顯曰今非牢之無以敵𤣥且始事而誅大將將即亮翻人情不安再三不可法順與元顯言之再三終以為不可也又以桓氏世為荆土所附桓冲特有遺惠而謙冲之子也乃自驃騎司馬除都督荆益寧梁四州諸軍事荆州刺史欲以結西人之心丁丑燕慕容拔攻魏令支戍克之宿沓干走執魏遼西太守那頡那諾何翻姓也魏書官氏志内入諸姓有那氏頡胡結翻燕以拔為幽州刺史鎮令支以中堅將軍遼西陽豪為本郡太守丁亥以章武公淵為尚書令博陵公䖍為尚書左僕射尚書王騰為右僕射戊子魏材官將軍和突攻黜弗素古延等諸部破之初魏主珪遣北部大人賀狄干獻馬千匹求昏於秦秦王興聞珪已立慕容后立慕容后事見上卷隆安四年止狄干而絶其昏沒弈干黜弗素古延皆秦之屬國也而魏攻之由是秦魏有隙庚寅珪大閲士馬命并州諸郡積穀於平陽之乾壁以備秦魏收地形志平陽禽昌縣漢晉之北屈也有乾城隋并禽昌入襄陵又據姚興載記乾壁即乾城柔然社崙方睦於秦遣將救黜弗素古延崙盧昆翻將即亮翻辛邜和突逆擊大破之社崙帥其部落逺遁漠北奪高車之地而居之帥讀曰率斛律部帥倍侯利擊社崙大為所敗帥所類翻敗補邁翻倍侯利奔魏社崙於是西北擊匈奴遺種日拔也雞大破之種章勇翻遂吞併諸部士馬繁盛雄於北方其地西至焉耆東接朝鮮朝音潮鮮音仙南臨大漠旁側小國皆羈屬焉自號豆代可汗魏收書作丘豆代魏言駕馭開張也汗音寒社佑曰可汗之號起於柔然社崙猶言皇帝也而拓拔氏之先通鑑皆書可汗又在社崙之前始立約束以千人為軍軍有將百人為幢幢有帥軍將幢帥皆魏制社崙盖效而立之将即亮翻幢宅江翻帥所類翻攻戰先登者賜以虜獲畏懦者以石擊其首而殺之柔然為魏患自此始秃髪傉檀克顯美執孟禕而責之以其不早降秃髪傉檀自去年攻顯美至是乃克禕曰禕受呂氏厚恩分符守土若明公大軍甫至望旗歸附恐獲罪於執事矣傉檀釋而禮之徙二千餘户而歸以褘為左司馬褘辭曰吕氏將亡聖朝必取河右朝直遙翻人無愚智皆知之但褘為人守城不能全復忝顯任於心竊所未安為于偽翻復扶又翻若蒙明公之惠使得就戮姑臧死且不朽傉檀義而歸之東土遭孫恩之亂因以饑饉漕運不繼桓𤣥禁㫁江路㫁讀曰短公私匱乏以粰橡給士卒粰房尤翻博雅曰粰粰􅦴饊也又曰鬻也又稃榖皮也音同橡似兩翻説文曰栩實也𤣥謂朝廷方多憂虞必未暇討已可以蓄力觀釁及大軍將發從兄太傅長史石生宻以書報之從才用翻𤣥大驚欲完聚保江陵長史卞範之曰明公英威振於逺近元顯口尚乳臭劉牢之大失物情若兵臨近畿示以禍福土崩之勢可翹足而待何有延敵入境自取窮蹙者乎𤣥從之留桓偉守江陵抗表傳檄罪狀元顯舉兵東下檄至元顯大懼二月丙午帝餞元顯於西池元顯下船而不發元顯内畏桓𤣥故下船而不發癸丑魏常山王遵等至髙平去年十二月魏遣遵等襲髙平至是而至沒弈干棄其部衆帥數千騎與劉勃勃奔秦州秦州治上邽帥讀曰率騎奇寄翻魏軍追至瓦亭不及而還盡獲其府庫蓄積馬四萬餘匹雜畜九萬餘口畜許救翻徙其民於代都魏以平城為代都餘種分迸種章勇翻迸北孟翻平陽太守貳塵復侵秦河東姓譜春秋貳軫二國後皆為氏貳塵之貳則虜姓也復扶又翻長安大震闗中諸城晝閉秦人簡兵訓卒以謀伐魏秦王興立子泓為太子大赦泓孝友寛和喜文學喜許記翻善談詠而懦弱多病興欲以為嗣而狐疑不决久乃立之為姚泓以懦弱亡秦張本姑臧大饑米斗直錢五千人相食餓死者十餘萬口城門晝閉樵采路絶民請出城為胡虜奴婢者日有數百吕隆惡其沮動衆心惡烏路翻沮在吕翻盡阬之積尸盈路沮渠䝉遜引兵攻姑臧沮子余翻隆遣使求救於河西王利鹿孤利鹿孤遣廣武公傉檀帥騎一萬救之使疏吏翻傉奴沃翻帥讀曰率騎奇寄翻未至隆擊破䝉遜軍䝉遜請與隆盟留穀萬餘斛遺之而還遺于季翻傉檀至昌松聞䝉遜已退乃徙凉澤段冢民五百餘户而還凉澤即禹貢之豬野澤也在武威縣東亦曰休屠澤還從宣翻中散騎常侍張融言於利鹿孤曰散悉亶翻騎奇寄翻焦朗兄弟據魏安潛通姚氏數為反覆數所角翻今不取後必為朝廷憂利鹿孤遣傉檀討之朗面縛出降焦朗以魏安招秦軍事見去年五月降户江翻下同傉檀送於西平徙其民於樂都樂音洛桓𤣥發江陵慮事不捷常為西還之計及過尋陽不見官軍意甚喜將士之氣亦振史言桓𤣥畏怯劉牢之等不能仗順取之将即亮翻下同庾楷謀泄𤣥囚之丁巳詔遣齊王柔之以騶虞幡宣告荆江二州使罷兵騶則尤翻𤣥前鋒殺之柔之宗之子也孝武太元十年以柔之襲封齊王紹攸冏之祀宗封南頓王丁邜𤣥至姑孰使其將馮該等攻厯陽豫州刺史治厯陽襄城太守司馬休之嬰城固守𤣥軍斷洞浦洞浦即洞口魏曹休破呂範處斷丁管翻焚豫州舟艦艦户黯翻豫州刺史譙王尚之帥步卒九千陣於浦上帥讀曰率遣武都太守楊秋屯横江秋降于𤣥軍尚之衆潰逃于涂中𤣥捕獲之涂與滁同司馬休之出戰而敗棄城走劉牢之素惡驃騎大將軍元顯惡烏路翻恐桓𤣥既滅元顯益驕恣又恐已功名愈盛不為元顯所容且自恃材武擁彊兵欲假𤣥以除執政復伺𤣥之隙而自取之復扶又翻伺相吏翻故不肯討𤣥元顯日夜昏酣以牢之為前鋒牢之驟詣門不得見及帝出餞元顯遇之公坐而已坐徂卧翻牢之軍溧州溧音栗溧水出溧陽縣在建康東南元顯遣牢之西上擊桓𤣥非其路也晉書劉牢之傳作洌洲又桓冲發建康謝安送至溧洲宋武陵王討元凶邵四月戊午至南州辛酉次溧洲丙寅次江寧今舟行自采石東下未至三山江中有洌山即洌洲也洌溧聲相近故又為溧洲張舜民曰過三山十餘里至溧洲自溧洲過白土磯入慈湖夾舜民郴行録言沂流之先後水程也參軍劉裕請擊𤣥牢之不許𤣥使牢之族舅何穆説牢之曰自古戴震主之威挾不賞之功而能自全者誰邪越之文種秦之白起漢之韓信皆事明主為之盡力説輸芮翻為于偽翻功成之日猶不免誅夷况為凶愚者之用乎君如今日戰勝則傾宗戰敗則覆族欲以此安歸乎不若翻然改圗則可以長保富貴矣古人射鉤斬袪猶不害為輔佐齊桓公與子糾爭國管仲射桓公中帶鉤子糾死桓公釋管仲之囚而以為相晉獻公使寺人披伐公子重耳於蒲城重耳踰垣而走披斬其袪重耳反國披屢納忠射而亦翻况𤣥與君無宿昔之怨乎時譙王尚之已敗人情愈恐牢之頗納穆言與𤣥交通東海中尉東海何無忌牢之之甥也與劉裕極諫不聽其子驃騎從事中郎敬宣諌曰今國家衰危天下之重在大人與𤣥𤣥藉父叔之資𤣥父溫叔冲據有全楚割晉國三分之二一朝縱之使陵朝廷𤣥威望旣成恐難圖也董卓之變将在今矣董卓事見五十九卷漢靈帝中平六年獻帝初平元年牢之怒曰吾豈不知今日取𤣥如反覆手耳但平𤣥之後令我奈驃騎何元顯為驃騎将軍故稱之三月乙巳朔牢之遣敬宣詣𤣥請降降戸江翻𤣥陰欲誅牢之乃與敬宣宴飲陳名書畫共觀之以安悦其意敬宣不之覺𤣥佐吏莫不相視而笑𤣥板敬宣為諮議參軍未有朝命以板授之也元顯將𤼵聞𤣥已至新亭棄船退屯國子學辛未陳於宣陽門外軍中相驚言𤣥已至南桁陳讀曰陣南桁即朱雀桁在臺城南桁户剛翻元顯引兵欲還宫𤣥遣人拔刀隨後大呼曰放仗軍人皆崩潰呼火故翻元顯乗馬走入東府唯張灋順一騎隨之騎奇寄翻元顯問計於道子道子但對之涕泣𤣥遣太傅從事中郎毛泰收元顯送新亭縳於舫前而數之數所具翻舫甫曠翻元顯曰為王誕張灋順所誤耳壬申復隆安年號帝遣侍中勞𤣥於安樂渚勞力到翻樂音洛𤣥入京師稱詔解嚴以𤣥總百揆都督中外諸軍事丞相録尚書事揚州牧領徐荆江三州刺史假黄鉞是時晉土全有荆江楊三州徐州率多僑郡而京口則重鎮也𤣥悉領之全有晉國矣且將奪劉牢之之兵故領徐州以制之𤣥以桓偉為荆州刺史桓謙為尚書左僕射桓脩為徐兖二州刺史桓石生為江州刺史卞範之為丹陽尹卞範之為𤣥長史謀主也丹陽京邑故使為尹初𤣥之舉兵侍中王謐奉詔詣𤣥𤣥親禮之及𤣥輔政以謐為中書令謐導之孫也新安太守殷仲文覬之弟也殷覬見一百九卷隆安元年覬音冀𤣥姊為仲文妻仲文聞𤣥克京師棄郡投𤣥𤣥以為諮議參軍劉邁往見𤣥𤣥曰汝不畏死而敢來邪邁曰射鉤斬袪并邁為三𤣥悦以為參軍邁折𤣥事見一百八卷孝武太元十七年癸酉有司奏會稽王道子酣縱不孝當棄市㑹工外翻詔徙安成郡呉孫皓寶鼎二年分豫章長沙廬陵立安成郡唐吉州安福縣及袁州諸縣皆其地也劉昫曰安福縣呉安成郡治斬元顯及東海王彦璋彦璋元顯之子隆安初使繼東海王後譙王尚之庾楷張灋順毛泰等於建康市桓脩為王誕固請得流嶺南為于偽翻𤣥以劉牢之為㑹稽内史牢之曰始爾便奪我兵禍其至矣劉敬宣請歸諭牢之使受命𤣥遣之敬宣勸牢之襲𤣥牢之猶豫不决移屯班瀆班瀆在新洲西南私告劉裕曰今當北就高雅之於廣陵舉兵以匡社稷卿能從我去乎裕曰將軍以勁卒數萬望風降服彼新得志威震天下朝野人情皆已去矣降户江翻朝直遙翻廣陵豈可得至邪裕當反服還京口耳反服謂反初服也離騷曰退将脩吾初服此言釋戎服而服常服何無忌謂裕曰我将何之裕曰吾觀鎮北必不免牢之以討孫恩功進號鎮北將軍卿可隨我還京口桓𤣥若守臣節當與卿事之不然當與卿圗之此時劉裕已有誅𤣥之心於是牢之大集僚佐議據江北以討𤣥參軍劉襲曰事之不可者莫大於反将軍往年反王兖州王兖州謂王㳟近日反司馬郎君司馬郎君謂元顯今復反桓公復扶又翻下復推同一人三反何以自立語畢趨出佐吏多散走牢之懼使敬宣之京口迎家失期不至牢之以為事已泄為𤣥所殺乃率部曲北走帥讀曰率至新洲縊而死敬宣至不暇哭即渡江奔廣陵将吏共殯殮牢之将即亮翻殮力贍翻以其喪歸丹徒𤣥令斲棺斬首暴尸於市暴步卜翻又如字大赦改元大亨桓𤣥讓丞相荆江徐三州𤣥既以其兄弟領荆江徐三州且已得建康握朝權不復以丞相為重故悉讓之改授太尉都督中外諸軍事揚州牧領豫州刺史總百揆以琅邪王徳文為太宰司馬休之劉敬宣髙雅之俱奔洛陽各以子弟為質於秦以求救質音致秦王興與之符信使於闗中募兵得數千人復還屯彭城間孫恩冦臨海臨海太守辛景擊破之恩所虜三呉男女死亡殆盡恩恐為官軍所獲乃赴海死其黨及妓妾從死者以百數妓渠綺翻從才用翻謂之水仙餘衆數千人復推恩妹夫盧循為王復扶又翻循諶之曾孫也盧諶盧志之子初從劉琨琨死仕於段氏段遼敗仕趙諶氏壬翻神采清秀雅有材藝少時少詩照翻沙門惠逺嘗謂之曰君雖體渉風素而志存不軌如何太尉𤣥欲撫安東土乃以循為永嘉太守明帝太寧元年分臨海立永嘉郡今之溫州循雖受命而冦暴不已盧循事始此甲戌燕大赦河西王秃髪利鹿孤寢疾遺令以國事授弟傉檀初秃髪思復鞬愛重傉檀傉奴沃翻鞬居言翻謂諸子曰傉檀器識非汝曹所及也故諸兄不以傳子而傳於弟呉壽夢以少子季札為賢故其諸子兄弟相傳欲以次傳國於季札而季札終於不受禿髪烏孤利鹿孤致國於傉檀猶呉志也豈知國亡於傉檀之手哉利鹿孤在位垂拱而已垂拱謂垂衣拱手無所為也軍國大事皆委於傉檀利鹿孤卒傉檀襲位更稱凉王自此史稱秃髪氏為南凉改元𢎞昌遷于樂都樂音洛諡利鹿孤曰康王夏四月太尉𤣥出屯姑孰辭録尚書事詔許之而大政皆就諮焉小事則决於尚書令桓謙及卞範之自隆安以來中外之人厭於禍亂及𤣥初至黜姦佞擢雋賢京師欣然冀得少安少詩沼翻旣而𤣥奢豪縱逸政令無常朋黨互起陵侮朝廷裁損乗輿供奉之具帝幾不免饑寒乗繩證翻幾居希翻由是衆心失望三呉大饑户口減半會稽減什三四會工外翻臨海永嘉殆盡富室皆衣羅紈懷金玉閉門相守餓死此固上之人失政所致而人消物盡亦天地之大數也周餘黎民靡有孑遺以此觀之容有是事衣於旣翻乞伏熾磐自西平逃歸苑川乞伏乾歸送熾磐於西平見上卷隆安四年南凉王傉檀歸其妻子乞伏乾歸使熾磐入朝于秦朝直遙翻秦主興以熾磐為興晉太守五月盧循自臨海入東陽太尉𤣥遣撫軍中兵參軍劉裕将兵擊之将即亮翻下同循敗走永嘉走音奏高句麗攻宿軍宿軍城在龍城東北句如字又音駒麗力知翻燕平州刺史慕容歸棄城走北燕平州刺史治宿軍秦主興大發諸軍遣義陽公平尚書右僕射狄伯支等将步騎四萬伐魏興自将大軍繼之以尚書令姚晃輔太子泓守長安沒弈干權鎮上邽廣陵公欽權鎮洛陽平攻魏乾壁六十餘日拔之秋七月魏主珪遣毗陵王順及豫州刺史長孫肥將六萬騎為前鋒自將大軍繼發以擊之八月太尉𤣥諷朝廷以𤣥平元顯功封豫章公平殷楊功封桂陽公并本封南郡如故𤣥以豫章封其子昇桂陽封其兄子俊魏主珪至永安永安本漢彘縣屬河東郡順帝改曰永安晉屬平陽郡隋唐晉州之霍邑縣本永安縣也酈道元曰永安故霍伯之都也縣有霍太山秦義陽公平遣驍將帥精騎二百覘魏軍驍堅堯翻将即亮翻騎奇寄翻覘丑亷翻又丑艶翻長孫肥逆擊盡擒之平退走珪追之乙巳及於柴壁平嬰城固守魏軍圍之秦王興将兵四萬七千救之将據天渡運糧以餽平柴壁在汾東天渡盖汾津之名在汾水西岸魏博士李先曰兵法高者為敵所棲深者為敵所囚今秦皆犯之宜及興未至遣騎兵先據天渡柴壁可不戰而取也珪命增築重圍重直龍翻下同内以防平之出外以拒興之入廣武将軍安同曰汾東有蒙坑東西三百餘里蹊徑不通興來必從汾西直臨柴壁如此虜聲勢相接重圍雖固不能制也不如為浮梁渡汾西築圍以拒之虜至無所施其智力矣珪從之興至蒲阪阪音反憚魏之彊乆乃進兵甲子珪帥步騎三萬逆擊興於蒙坑之南帥讀曰率下同斬首千餘級興退走四十餘里平亦不敢出珪乃分兵四據險要使秦兵不得近柴壁近其靳翻興屯汾西憑壑為壘東栢材從汾上流縱之欲以毁浮梁魏人皆鈎取以為薪蒸麄曰薪細曰蒸冬十月平糧竭矢盡夜悉衆突西南圍求出興列兵汾西舉烽鼓譟為應興欲平力戰突免平望興攻圍引接但叫呼相和和户卧翻莫敢逼圍平不得出計窮乃帥麾下赴水死諸將多從平赴水珪使善游者鉤捕之無得免者執狄伯支及越騎校尉唐小方等四十餘人餘衆二萬餘人皆斂手就禽興坐視其窮力不能救舉軍慟哭聲震山谷數遣使求和於魏數所角翻珪不許乗勝進攻蒲阪秦晉公緒固守不戰㑹柔然謀伐魏珪聞之戊申引兵還還從宣翻又如字或告太史令鼂崇及弟黃門侍郎懿潜召秦兵珪至晉陽賜崇懿死鼂直遙翻秦徙河西豪右萬餘户于長安太尉𤣥殺呉興太守髙素將軍竺謙之及謙之從兄朗之劉襲并襲弟季武皆劉牢之北府舊将也從才用翻将即亮翻襲兄冀州刺史軌邀司馬休之劉敬宣高雅之等共據山陽沈約曰山陽本射陽縣境地名義熙土斷始分廣陵郡立山陽郡及山陽縣唐楚州即其地欲起兵攻𤣥不克而走将軍袁䖍之劉壽高長慶郭恭等皆往從之将奔魏至陳留南分為二輩軌休之敬宣奔南燕䖍之壽長慶恭奔秦魏主珪初聞休之等當來大喜後怪其不至令兖州求訪隆安五年魏以長孫肥為兖州刺史南徇地然未能有兖州也獲其從者問其故皆曰魏朝威聲逺被從才用翻被皮義翻朝直遙翻是以休之等咸欲歸附旣而聞崔逞被殺崔逞死見上卷三年故犇二國珪深悔之自是士人有過頗見優容南凉王傉檀攻吕隆於姑臧燕王熙納故中山尹苻謨二女燕王實即位之初苻謨為中山尹長曰娀娥為貴人長知兩翻娀音戎幼曰訓英為貴嬪貴嬪尤有寵丁太后怨恚恚於避翻與兄子尚書信謀廢熙立章武公淵事覺熙逼丁太后令自殺葬以后禮諡曰獻幽皇后丁太后素與熙通事見上年十一月戊辰殺淵及信辛未熙畋于北原龍城北原也石城令高和石城縣漢屬北平郡燕屬建徳郡髙和本為石城令時以大喪㑹于龍城耳與尚方兵於後作亂殺司𨽻校尉張顯人掠宫殿取庫兵脅營署閉門乗城熙馳還城上人皆投仗開門盡誅反者唯和走免甲戌大赦魏以庾岳為司空十二月辛亥魏主珪還雲中柔然可汗社崙聞珪伐秦自參合陂侵魏至豺山豺山在善無縣北魏天興六年築宫於此崙盧昆翻及善無北澤魏常山王遵以萬騎追之不及而還太尉𤣥使御史杜林防衛㑹稽文孝王道子至安成㑹工外翻林承𤣥㫖酖道子殺之沮渠蒙遜所署西郡太守梁中庸叛奔西凉蒙遜聞之笑曰吾待中庸恩如骨肉而中庸不我信但自負耳孤豈在此一人邪乃盡歸其孥西凉公暠問中庸曰我何如索嗣中庸曰未可量也暠曰嗣才度若敵我者我何能於千里之外以長繩絞其頸邪索嗣死見上卷四年孥音奴暠古老翻索晋各翻量音良中庸曰智有短長命有成敗殿下之與索嗣得失之理臣實未之能詳若以身死為負計行為勝則公孫瓉豈賢於劉虞邪公孫瓉劉虞事見六十卷漢獻帝初平四年暠黙然袁䖍之等至長安秦王興問曰桓𤣥才略何如其父卒能成功乎卒子恤翻䖍之曰𤣥乗晉室衰亂盜據宰衡猜忌安忍刑賞不公以臣觀之不如其父逺矣𤣥今已執大柄其埶必將簒逆正可為它人驅除耳興善之以䖍之為廣州刺史秦以廣州授袁䖍之示以名位寵綏之耳是嵗秦王興立昭儀張氏為皇后封子懿弼洸宣諶愔璞質逵裕國兒皆為公洸古黃翻諶氏壬翻愔於今翻遣使拜秃髮傉檀為車騎將軍廣武公沮渠蒙遜為鎮西將軍沙州刺史西海侯李暠為安西將軍髙昌侯秦鎮逺將軍趙曜帥衆二萬西屯金城建節將軍王松怱帥騎助吕隆守姑臧松怱至魏安傉檀弟文真擊而虜之傉檀大怒送松怱還長安深自陳謝史言河湟諸國皆畏姚秦之彊資治通鑑卷一百十二
