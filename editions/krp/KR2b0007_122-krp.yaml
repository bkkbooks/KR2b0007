  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百二十二宋司馬光撰胡三省音註宋紀四起重光協洽盡旃䝉大淵獻凡五年太祖文皇帝上之下元嘉八年春正月壬午朔燕大赦改元大興丙申檀道濟等自清水救滑臺魏叔孫建長孫道生拒之丁酉道濟至夀張遇魏安平公乙旃眷魏收官氏志獻帝命叔父之裔為乙旃氏道濟帥寧朔將軍王仲徳驍騎將軍段宏奮擊大破之帥讀曰率驍堅堯翻騎奇寄翻轉戰至髙梁亭斬魏濟州刺史悉煩庫結魏明元帝泰常八年置濟州治碻磝城濟子禮翻夏主擊秦將姚獻敗之將即亮翻敗補邁翻遂遣其叔父北平公韋代帥衆一萬攻南安去年暮末保南安城中大饑人相食秦侍中征虜將軍出連輔政侍中右衞將軍乞伏延祚吏部尚書乞伏跋跋踰城犇夏秦王暮末窮蹙輿櫬出降乞伏氏四主四十九年而滅櫬初覲翻降戸江翻并沮渠興國送于上邽興國為秦所禽見上卷六年沮子余翻秦太子司直焦楷犇廣寧太子司直掌糾劾宫僚及帥府兵晉志無是官當是二趙燕秦所置泣謂其父遺曰大人荷國寵靈荷下可翻居藩鎮重任今本朝顛覆豈得不率見衆唱大義以殄寇讎朝直遥翻見賢遍翻遺曰今主上已陷賊庭吾非愛死而忘義顧以大兵追之是趣絶其命也趣讀曰促不如擇王族之賢者奉以為主而伐之庻有濟也楷乃築壇誓衆二旬之間赴者萬餘人㑹遺病卒卒子恤翻楷不能獨舉事亡犇河西二月戊午以尚書右僕射江夷為湘州刺史檀道濟等進至濟上濟子禮翻下同二十餘日間前後與魏三十餘戰道濟多捷軍至厯城厯城縣自漢以來屬濟南郡宋為冀州刺史治所叔孫建等縱輕騎邀其前後焚燒草榖騎竒寄翻道濟軍乏食不能進由是安頡司馬楚之等得專力攻滑臺頡戸結翻魏主復使楚兵將軍王慧龍助之復扶又翻朱脩之堅守數月糧盡與士卒熏䑕食之辛酉魏克滑臺執脩之及東郡太守申謨東郡自漢魏以來治白馬白馬滑臺之地也虜獲萬餘人謨鍾之曾孫也申鍾見九十五卷晉成帝咸和五年癸酉魏主還平城大饗告廟將帥及百官皆受賞戰士賜復十年賞北伐柔然西伐夏南禦宋之功也將即亮翻帥所類翻復方目翻復勿事也下復境同於是魏南鄙大水民多饑死尚書令劉絜言於魏主曰自頃邊寇内侵戎車屢駕天贊聖明所在克殄方難既平難乃旦翻皆䝉優錫而郡國之民雖不征討服勤農桑以供軍國實經世之大本府庫之所資今自山以東徧遭水害應加哀矜以𢎞覆育覆敷又翻下米覆同魏主從之復境内一嵗租賦檀道濟等食盡自厯城引還軍士有亡降魏者具告之魏人追之衆忷懼將潰降戸江翻忷許拱翻道濟夜唱籌量沙以所餘少米覆其上量音良少詩沼翻下同及旦魏軍見之謂道濟資糧有餘以降者為妄而斬之時道濟兵少魏兵甚盛騎士四合道濟命軍士皆被甲被皮義翻已白服乘輿引兵徐出魏人以為有伏兵不敢逼稍稍引退道濟全軍而返青州刺史蕭思話聞道濟南歸欲委鎮保險宋青州治東陽城濟南太守蕭承之固諫不從丁丑思話棄鎮犇平昌平昌縣前漢屬琅邪後漢屬北海晉太康地志屬城陽惠帝分立平昌郡五代志密州膠西縣舊曰黔陬置平昌郡參軍劉振之戍下邳聞之亦委城走魏軍竟不至而東陽積聚已為百姓所焚積子智翻凡指所聚之物曰積則去聲聚才諭翻思話坐徵繋尚方燕王立夫人慕容氏為王后庚戌魏安頡等還平城魏主嘉朱脩之守節妻以宗女為脩之自北還張本妻子細翻初帝之遣到彦之也戒之曰若北國兵動先其未至徑前入河先悉薦翻若其不動留彭城勿進及安頡得宋俘魏主始聞其言謂公卿曰卿輩前謂我用崔浩計為謬驚怖固諫怖普布翻崔浩計見上卷元年常勝之家始皆自謂踰人至於歸終歸終謂事勢究極處乃不能及司馬楚之上疏以為諸方已平請大舉伐宋魏主以兵久勞不許徵楚之為㪚騎常侍散悉亶翻騎竒寄翻以王慧龍為滎陽太守魏雖置滎陽太守實以虎牢為重鎮按魏書宮氏志髙宗太安三年始以諸部䕶軍各為太守蓋是時唯以滎陽太守命王慧龍至太安三年遂悉改之也守式又翻慧龍在郡十年農戰並脩大著聲績歸附者萬餘家帝縱反間于魏云慧龍自以功髙位下欲引宋人入寇因執司馬楚之以叛間古莧翻楚之時屯潁川魏主聞之賜慧龍璽書曰劉義隆畏將軍如虎欲相中害璽斯氏翻中竹仲翻朕自知之風塵之言想不足介意帝復遣刺客吕𤣥伯刺之復扶又翻曰得慧龍首封二百戸男賞絹千匹𤣥伯詐為降人降戸江翻求屏人有所論慧龍疑之使人探其懐得尺刀屏必郢翻探吐南翻𤣥伯叩頭請死慧龍曰各為其主耳釋之為于偽翻左右諫曰宋人為謀未已不殺𤣥伯無以制將來慧龍曰死生有命彼亦安能害我我以仁義為扞蔽又何憂乎遂捨之史因慧龍守滎陽終言之夏五月庚寅魏主如雲中六月乙丑大赦夏主殺乞伏暮末及其宗族五百人夏主畏魏人之逼擁秦民十餘萬口秦民所得乞伏氏之民也自治城濟河欲擊河西王䝉遜而奪其地吐谷渾王慕璝遣益州刺史慕利延寧州刺史拾虔璝古囬翻延考異曰十六國春秋作没利拾虎今從宋書帥騎三萬乘其半濟邀擊之執夏主定以歸赫連氏厯三主二十六年而滅自是中原及西北之地一歸于魏矣帥讀曰率騎竒寄翻沮渠興國被創而死沮子余翻被皮義翻創初良翻拾虔樹洛干之子也樹洛干卒於晉安帝義熈十三年魏之邊吏獲柔然邏者二十餘人魏主賜衣服而遣之柔然感悦閏月乙未柔然敇連可汗遣使詣魏魏主厚禮之邏郎佐翻使疏吏翻魏主遣散騎侍郎周紹來聘散悉亶翻騎竒寄翻且求昏帝依違答之荆州刺史江夏王義恭年寖長欲專政事長史劉湛毎裁抑之遂與湛有隙宋制幼王臨州率以長史行府州事事皆決于行事義恭欲專之而湛不可遂有隙長知兩翻帝心重湛使人詰讓義恭且和解之詰去吉翻是時王華王曇首皆卒卒子恤翻領軍將軍殷景仁素與湛善白帝以時賢零落徵湛為太子詹事加給事中共叅政事以雍州刺史張邵代湛為撫軍長史南蠻校尉頃之邵坐在雍州營私畜聚贓滿二百四十五萬下廷尉當死永嘉五年邵刺雍州雍於用翻左衞將軍謝述上表陳邵先朝舊勲武帝討桓𤣥邵白父敞表獻忠欵又不附劉毅宜䝉優貸帝手詔酬納免邵官削爵土述謂其子綜曰主上矜邵夙誠特加曲恕吾所言謬㑹故特見酬納耳若此迹宣布則為侵奪主恩不可之大者也使綜對前焚之帝後謂邵曰卿之獲免謝述有力焉秋七月己酉魏主如河西八月乙酉河西王䝉遜遣子安周入侍于魏吐谷渾王慕璝遣侍郎謝太寧奉表于魏請送赫連定己丑魏以慕璝為大將軍西秦王璝古囬翻左僕射臨川王義慶固求解職甲辰以義慶為中書令丹陽尹如故九月癸丑魏主還宫庚申加太尉長孫嵩柱國大將軍柱國大將軍始此以左光祿大夫崔浩為司徒征西大將軍長孫道生為司空道生性清儉一熊皮鄣泥數十年不易類篇馬障泥曰韂韂昌艷翻蜀註云遮擁泥濘也魏主使歌工厯頌羣臣曰智如崔浩㢘若道生魏主欲選使者詣河西崔浩薦尚書李順乃以順為太常拜河西王䝉遜為侍中都督涼州西域羌戎諸軍事太傅行征西大將軍涼州牧涼王王武威張掖敦煌酒泉西海金城西平七郡使疏吏翻王武于況翻敦徒門翻冊曰盛衰存亡與魏升降北盡窮髮南極庸㟭西被崐嶺東至河曲經典釋文司馬曰窮髮北極之下無毛之地也按毛草也地理書云山以草木為髪庸魏興上庸之地㟭㟭山也崑嶺謂崑崙河曲朔方之河曲也㟭與岷同被皮義翻王實征之以夾輔皇室置將相羣卿百官承制假授建天子旌旗出入警蹕如漢初諸侯王故事壬申魏主詔曰今二寇摧殄將偃武修文理廢職舉逸民范陽盧𤣥博陵崔綽趙郡李靈河間邢穎勃海髙允廣平游雅太原張偉等皆賢雋之胄冠冕周邦周當作州易曰我有好爵吾與爾縻之易中孚九二爻辭如𤣥之比者盡敇州郡以禮𤼵遣遂徵𤣥等及州郡所遣至者數百人差次叙用崔綽以母老固辭𤣥等皆拜中書博士𤣥諶之曾孫晉永嘉之後盧諶展轉于石氏之間冉閔之敗逆死於兵諶氏壬翻靈順之從父兄也從才用翻𤣥舅崔浩毎與𤣥言輒歎曰對子真使我懐古之情更深盧𤣥字子真浩欲大整流品明辨姓族𤣥止之曰夫創制立事各有其時樂為此者詎有㡬人宜加三思樂音洛三息暫翻浩不從由是得罪于衆初魏昭成帝始制法令什翼犍諡昭成帝反逆者族其餘當死者聽入金馬贖罪殺人者聽與死家牛馬塟具以平之盜官物一備五私物一備十備陪償也今人多云陪備四部大人共坐王庭決辭訟無繫訊連逮之苦境内安之太祖入中原道武帝廟號太祖患前代律令峻宻命三公郎王徳刪定務崇簡易事見一百十卷晉安帝隆安二年易以䜴翻季年被疾刑罰濫酷事見一百十一卷晉安帝隆安四年被皮義翻太宗承之吏文亦深明元帝廟號太祖冬十月戊寅世祖命崔浩更定律令除五嵗四嵗刑增一年刑巫蠱者負羖羊抱犬沈諸淵羖果五翻説文夏羊壯曰羖一説羖䍽羊也沈持林翻初令官階九品者得以官爵除刑漢官以石秩為差魏晉始定品秩之次婦人當刑而孕産後百日乃決闕左懸登聞鼔以達寃人禹令有獄訟者揺鞀周禮左嘉石以平罷民皆所以達幽枉也登聞鼓令負寃者得詣闕檛鼔登時上聞也魏主如漠南十一月丙辰北部敇勒莫弗庫若干髙車酋長謂之莫弗考異曰後魏書北史本紀皆作敇勒鄧淵傳皆作髙車按髙車即敇勒别名也帥所部數萬騎驅鹿數百萬頭詣魏主行在帥讀曰率騎竒寄翻魏主大獵以賜從官從才用翻十二月丁丑還宫是嵗涼王改元義和林邑王范陽邁寇九徳交州兵擊却之九徳郡古越裳氏國隋唐為驩州九年春正月丙午魏主尊保太后竇氏為皇太后尊保母為毋非禮也立貴人赫連氏為皇后子晃為皇太子大赦改元延和燕王立慕容后之子王仁為太子三月庚戌衞將軍王𢎞進位太保加中書監丁巳征南大將軍檀道濟進位司空還鎮尋陽道濟自厯城還師至建康復使之還鎮尋陽壬申吐谷渾王慕璝送赫連定于魏魏人殺之慕璝上表曰臣俘擒僣逆獻捷王府爵秩雖崇而土不增廓車旗既飾而財不周賞願垂鑒察魏主下其議下戸嫁翻公卿以為慕璝所致唯定而已塞外之民皆為己有而貪求無厭不可許也厭於鹽翻魏主乃詔曰西秦王所得金城枹罕隴西之地枹音膚朕即與之乃是裂土何須復廓復扶又翻西秦欵至綿絹隨使疏數臨時增益非一賜而止也使疎吏翻下同疏與疎同數所角翻自是慕璝貢使至魏者稍簡魏方士祁纎奏改代為萬年代尹為萬年尹以代令為萬年令崔浩曰昔太祖應天受命兼稱代魏以法殷商帝嚳都亳子契受封于商自契至湯八遷湯始都亳從先王居謂之亳殷故兼稱殷商國家積徳當享年萬億不待假名以為益也纎之所聞皆非正義宜復舊號魏主從之夏五月壬申華容文昭公王𢎞卒𢎞明敏有思致而輕率少威儀性褊隘好折辱人人以此少之思相吏翻少詩沼翻褊方緬翻好呼到翻折之舌翻雖貴顯不營財利及卒家無餘業帝聞之特賜錢百萬米千斛魏主治兵于南郊謀伐燕治直之翻帝遣使者趙道生聘于魏六月戊寅司徒南徐州刺史彭城王義康改領揚州刺史王𢎞卒義康始領揚州詔分青州置冀州宋冀州領廣川平原清河樂陵魏郡河間頓丘髙陽勃海九郡皆僑置於河濟間治厯城吐谷渾王慕璝遣其司馬趙叙入貢且來告捷告擒赫連定之捷也璝古囬翻庚寅魏主伐燕命太子晃錄尚書事時晃纔五嵗又遣左僕射安原建寧王崇等屯漠南以備柔然辛夘魏主遣㪚騎常侍鄧穎來聘乙未以吐谷渾王慕璝為都督西秦河沙三州諸軍事征西大將軍西秦河二州刺史進爵隴西王且命慕璝悉歸南方將士先没於夏者得百五十餘人劉義真之敗没于夏者又加北秦州刺史楊難當征西將軍難當以兄子保宗為鎮南將軍鎮宕昌宕昌隋唐為宕州之地宕徒浪翻以其子順為秦州刺史守上邽保宗謀襲難當事泄難當囚之壬寅以江夏王義恭為都督南兖等六州諸軍事開府儀同三司南兖州刺史臨川王義慶為都督荆雍等七州諸軍事荆州刺史雍於用翻竟陵王義宣為中書監衡陽王義季為南徐州刺史初髙祖以荆州居上流之重土地廣逺資實兵甲居朝廷之半故遺詔令諸子居之上以義慶宗室令美且烈武王有大功于社稷臨川王道規諡烈武王故特用之秋七月己未魏主至濡水水經濡水自塞外來過遼西令支肥如海陽等縣而入于海濡乃官翻庚申遣安東將軍奚斤𤼵幽州民及密雲丁零萬餘人魏收曰道武帝皇始二年置密雲郡密雲縣治提攜城本漢厗奚縣地孟康曰厗音題運攻具出南道㑹和龍魏主至遼西燕王遣其侍御史崔聘奉牛酒犒師己巳魏主至和龍庚午以領軍將軍殷景仁為尚書僕射太子詹事劉湛為領軍將軍益州刺史劉道濟粹之弟也信任長史費謙别駕張熙等聚歛興利費扶沸翻傷政害民立官冶禁民鼓鑄而貴賣鐵器商賈失業吁嗟滿路歛力瞻翻賈音古流民許穆之變姓名稱司馬飛龍自云晉室近親往依氐王楊難當難當因民之怨資飛龍以兵使侵擾益州飛龍招合蜀人得千餘人攻殺巴興令沈約曰巴興令徐志不註置立疑李氏所立屬遂寧郡宋白曰晉永初十一年置巴興縣西魏改曰長江縣唐屬遂州逐隂平太守晉孝武帝泰始中置隂平郡至武帝永初間又分為南隂平北隂平此南隂平也隋併南隂平入雒縣宋白曰文州古隂平也戰國氐羌所據漢為隂平道魏晉為隂平郡隂平縣永嘉末太守玉鑒以郡降李雄晉人於是悉流移於蜀漢其氐羌並屬楊茂搜此郡不復預受正朔故南史諸志悉無所錄其晉人流寓於蜀者仍於益州立南北二隂平寓于漢中者亦於梁州立南北二隂平今劍州隂平縣益州之北隂平郡也道濟遣軍擊斬之道濟欲以五城人帛氐奴梁顯為叅軍督護孫愐曰帛姓也費謙固執不與氐奴等與鄉人趙廣構扇縣人詐言司馬殿下猶在陽泉山中聚衆得數千人引向廣漢沈約曰蜀分緜竹立陽泉縣屬廣漢郡隋復併入緜竹道濟叅軍程展㑹治中李抗之將五百人擊之皆敗死巴西人唐頻聚衆應之趙廣等進攻涪城陷之將即亮翻涪音浮於是涪陵江陽遂寧諸郡守皆棄城走蜀土僑舊俱反沈約曰遂寧郡永初郡國志有之疑晉末分廣漢所立唐為遂州守手又翻下太守同燕石城太守李崇等十郡降于魏石城縣前漢屬右北平燕分置石城郡魏真君八年置建徳郡於白狼以石城為縣屬焉降户江翻魏主發其民三萬穿圍塹以守和龍崇績之子也李績見一百卷晉穆帝升平四年塹七艷翻八月燕王使數萬人出戰魏昌黎公丘等擊破之公丘之下當有漏字死者萬餘人燕尚書髙紹帥萬餘家保羌胡固帥讀曰率辛巳魏主攻紹斬之平東將軍賀多羅攻帶方撫軍大將軍永昌王健攻建徳驃騎大將軍樂平王丕攻冀陽皆拔之九月乙夘魏主引兵西還徙營丘成周遼東樂浪帶方𤣥菟六郡民三萬家於幽州五代志曰後魏置營州於和龍城領建徳冀陽遼東樂浪營丘等郡龍城大興永樂帶方定荒石城廣都陽武襄平新昌平剛栁城富平等縣蓋燕國自慕容以來分置郡縣於遼西其後或省或併為郡為縣皆不可攷如𤣥菟郡亦當置於遼西也驃匹妙翻騎竒寄翻樂浪音洛琅菟同都翻燕尚書郭淵勸燕王送欵獻女於魏乞為附庸燕王曰負舋在前結忿已深降附取死不如守志更圖也舋許覲翻降戸江翻魏主之圍和龍也宿衞之士多在戰陳陳與陣同行宫人少雲中鎮將朱脩之謀與南人襲殺魏主因入和龍浮海南歸以告冠軍將軍毛脩之毛脩之不從乃止少詩沼翻將即亮翻冠古玩翻既而事泄朱脩之逃奔燕魏人數伐燕數所角翻燕王遣脩之南歸求救脩之汎海至東萊遂還建康拜黄門侍郎趙廣等進攻成都劉道濟嬰城自守賊衆屯聚日久不見司馬飛龍欲散去廣懼將三千人及羽儀詣陽泉寺以羽為儀故曰羽儀詐云迎飛龍至則謂道人枹罕程道養曰枹音膚汝但自言是飛龍則坐享富貴不則㫁頭㫁丁管翻道養惶怖許諾怖普布翻廣乃推道養為蜀王車騎大將軍益梁二州牧改元泰始備置百官以道養弟道助為驃騎將軍長沙王鎮涪城趙廣帛氐奴梁顯及其黨張尋嚴遐皆為將軍奉道養還成都衆至十餘萬四面圍城使人謂道濟曰但送費謙張熙來我輩自解去道濟遣中兵叅軍裴方明任浪之各將千餘人出戰皆敗還任音壬冬十一月乙巳魏主還平城壬子以少府中山甄法崇為益州刺史代劉道濟也甄之人翻初燕王嫡妃王氏生長樂公崇崇於兄弟為最長樂音洛最長知兩翻及即位立慕容氏為王后王氏不得立又黜崇使鎮肥如燕以幽州刺史鎮肥如遼西之地也崇母弟廣平公朗樂陵公邈相謂曰今國家將亡人無愚智皆知之王復受慕容后之譛復扶又翻吾兄弟死無日矣乃相與亡奔遼西説崇使降魏崇從之㑹魏主使給事郎王徳招崇給事郎北史作給事中説輸芮翻降戸江翻下同十二月己丑崇使邈如魏請舉郡降燕王聞之使其將封羽圍崇於遼西將即亮翻下同魏主徵諸名士之未仕者州郡多逼遣之魏主聞之下詔令守宰以禮申諭申重也重直龍翻守式又翻任其進退毋得逼遣初帝以少子紹為廬陵孝獻王嗣義真諡曰孝獻少詩照翻以江夏王義恭子朗為營陽王嗣庚寅封紹為廬陵王朗為南豐縣王裴方明等復出撃程道養營破之復扶又翻下衆復豈復順復同焚其積聚積子賜翻聚才諭翻賊黨江陽楊孟子將千餘人屯城南江陽隋併入陽州隆山縣叅軍梁雋之統南樓投書説諭孟子邀使入城見劉道濟道濟板為主簿克期討賊趙廣知其謀孟子懼將所領奔晉原晉原太守文仲興與之同拒守趙廣遣帛氐奴攻晉原破之李雄分蜀郡為漢原郡晉穆帝更名晉原郡治江原縣唐為蜀州晉原縣宋白曰晉原縣本漢江原縣地李雄立江原郡晉改為多融縣又改晉原以縣界晉原山為名仲興孟子皆死裴方明復出擊賊屢戰破之賊遂大潰程道養收衆得七千人還廣漢趙廣别將五千餘人還涪城先是張熈説道濟糶倉榖先悉薦翻説輸芮翻故自九月末圍城至十二月糧儲俱盡方明將二千人出城求食為賊所敗敗補邁翻單馬獨還賊衆復大集方明夜縋而上縋馳偽翻上時掌翻道濟為設食為于偽翻下㣲為同涕泣不能食道濟曰卿非大丈夫小敗何苦賊勢既衰臺兵垂至但令卿還何憂于賊即減左右以配之賊於城外揚言云方明已死城中大恐道濟夜列炬火出方明以示衆衆乃安道濟悉出財物於北射堂令方明募人時城中或傳道濟已死莫有應者梁携之説道濟遣左右給使三十餘人出外梁携之蓋即梁雋之携字悞也且告之曰吾病小損各聽歸家休息給使既出城中乃安應募者日有千餘人初晉謝混上晉陵公主晉陵公主晉孝武之女混死見一百十六卷晉安帝義熙八年詔公主與謝氏絶婚公主悉以混家事委混從子𢎞微從才用翻混仍世宰輔僮僕千人唯有二女年數嵗𢎞微為之紀理生業一錢尺帛有文簿為于偽翻九年而髙祖即位公主降號東鄉君聽還謝氏入門室宇倉廩不異平日田疇墾闢有加于舊東鄉君歎曰僕射平生重此子可謂知人僕射為不亡矣混仕晉為尚書左僕射親舊見者為之流涕是嵗東鄉君卒為于偽翻卒子恤翻公私咸謂貲財宜歸二女田宅僮僕應屬𢎞微𢎞微一無所取自以私祿塟東鄉君混女夫殷叡好樗蒲好呼到翻聞𢎞微不取財物乃奪其妻妹及伯母兩姑之分以還戲責分扶問翻責如字又讀曰債内人皆化𢎞微之讓一無所争或譏之曰謝氏累世財産充殷君一朝戲責理之不允莫此為大卿視而不言譬棄物江海以為㢘耳設使立清名而令家内不足亦吾所不取也𢎞微曰親戚争財為鄙之甚今内人尚能無言豈可導之使争乎分多共少不至有乏身死之後豈復見闗也秃髮保周自涼奔魏保周奔涼見一百十六卷晉安帝義熙十年魏封保周為張掖公魏李順復奉使至涼復扶又翻使疏吏翻涼王䝉遜遣中兵校郎楊定歸謂順曰年衰多疾腰髀不隨不堪拜伏比三五日消息小差當相見比必寐翻及也順曰王之老疾朝廷所知豈得自安不見詔使明日䝉遜延順入至庭中䝉遜箕坐應几無動起之狀師古曰謂伸兩脚而坐其形如箕隠於靳翻順正色大言曰不謂此叟無禮乃至于此今不憂覆亡而敢陵侮天地䰟魄逝矣何用見之握節將出涼王使定歸追止之曰太常既雅恕衰疾雅素也傳聞朝廷有不拜之詔是以敢自安耳順曰齊桓公九合諸侯一匡天下周天子賜胙命無下拜桓公猶不敢失臣禮下拜登受齊桓公合諸侯于葵丘王使宰孔賜胙齊矦將下拜孔曰天子以伯舅耄老加勞賜一級無下拜對曰天威不違顔咫尺小白余敢貪天子之命無下拜恐隕越于下以為天子羞敢不下拜下拜登受今王雖功高未如齊桓朝廷雖相崇重未有不拜之詔而遽自偃蹇此豈社稷之福邪䝉遜乃起拜受詔使還魏主問以涼事順曰䝉遜控制河右踰三十年晉安帝隆安五年䝉遜殺段業篡有其國至是三十一年經涉艱難粗識機變粗坐五翻綏集荒裔羣下畏服雖不能貽厥孫謀猶足以終其一世然禮者徳之輿敬者身之基也䝉遜無禮不敬以臣觀之不復年矣復扶又翻言其死在朝夕魏主曰易世之後何時當滅順曰䝉遜諸子臣畧見之皆庸才也如聞敦煌太守牧犍器性粗立敦徒門翻犍居言翻繼䝉遜者必此人也然比之於父皆云不及此殆天之所以資聖明也遜考異曰後魏書順初奉冊拜沮渠䝉為涼州牧即有䝉遜不拜及順使還論牧犍事南史順冊拜䝉遜還拜都督四州長安鎮都大將徵為四部尚書加常侍延和初使涼始有不拜等事今據順云不復周矣明年䝉遜死帝曰卿言䝉遜死騐矣故從南史魏主曰朕方有事東方謂方圖燕也未暇西略如卿所言不過數年之外不為晩也初罽賓沙門曇無䜟自云能使鬼治病且有袐術北史曰曇無䜟自云能使鬼療病令婦人多子罽音計曇徒含翻䜟楚譛翻治直之翻涼王䝉遜甚重之謂之聖人諸女及子婦皆往受術魏主聞之使李順往徵之䝉遜留不遣仍殺之魏主由是怒涼䝉遜荒淫猜虐羣下苦之為魏滅涼張本十年春正月乙夘魏主遣永昌王健督諸軍救遼西以馮崇被圍也己未大赦丙寅魏以樂安王範為都督秦雍等五州諸軍事衞大將軍開府儀同三司長安鎮都大將都大將又在鎮大將之上雍於用翻將即亮翻下同魏主以範年少少詩沼翻更選舊徳平西將軍崔徽征北大將軍鴈門張黎為之副共鎮長安徽宏之弟也崔宏崔浩之父也範謙恭寛惠徽務敦大體黎清約公平政刑簡易易以豉翻輕傜薄賦闗中遂安二月庚午魏主以馮崇為都督幽平東夷諸軍事車騎大將軍幽平二州牧封遼西王錄其國尚書事食遼西十郡承制假授尚書刺史征虜以下官自征虜以下雜號將軍皆得假授騎竒寄翻魏平涼休屠征西將軍金崖句㫁屠直於翻羌涇州刺史狄子玉魏置涇州于安定郡治臨涇城與安定鎮將延普争權崖子玉舉兵攻普不克退保胡空谷即胡空堡之地魏主以虎牢鎮大將陸俟為安定鎮大將擊崖等皆擒之魏主徵陸俟為散騎常侍出為懐荒鎮大將懐荒鎮魏降髙車所置六鎮之一也散悉亶翻騎竒寄翻未期嵗髙車諸莫弗訟俟嚴急無恩復請前鎮將郎孤復扶又翻下無復將復同魏主徵俟還以孤代之俟既至言于帝曰不過期年郎孤必敗髙車必叛期讀曰朞帝怒切責之使以建業公歸第明年諸莫弗果殺郎孤而叛帝大驚立召俟問之曰卿何以知其然也俟曰髙車不知上下之禮故臣臨之以威制之以法欲以漸訓導使知分限分扶問翻而諸莫弗惡臣所為惡烏路翻訟臣無恩稱孤之美臣以罪去孤獲還鎮悦其稱譽譽音余益收名聲專用寛恕待之無禮之人易生驕慢易以豉翻不過朞年無復上下孤所不堪必將復以法裁之如此則衆心怨懟必生禍亂矣魏裴潜去代郡而烏桓叛事亦如此懟直類翻帝笑曰卿身雖短思慮何長也即日復以為散騎常侍壬午魏主如河西遣兼散騎常侍宋宣來聘且為太子晃求婚為于偽翻帝依違答之劉道濟卒梁儁之裴方明等密埋其尸於齋後詐為道濟教命以答籖疏雖其母妻亦不知也程道養于毁金橋登壇郊天方明將三千人出擊之將即亮翻下同道養等大敗退保廣漢荆州刺史臨川王義慶以巴東太守周籍之督巴西等五郡諸軍事將二千人救成都三月亡人司馬天助降於魏自稱晉㑹稽世子元顯之子降戸江翻㑹工外翻魏人以為青徐二州刺史東海公壬子魏主還宫趙廣等自廣漢至郫郫縣自漢以來屬蜀郡師古曰郫音疲連營百數周籍之與裴方明等合兵攻郫克之進擊廣等于廣漢廣等走還涪及五城涪音浮夏四月戊寅始發劉道濟䘮帝聞梁南秦二州刺史甄法䕶刑政不治甄之人翻失氐羌之和乃自徒中起蕭思話為梁南秦二州刺史按考異曰思話傳云楊難當寇漢中乃用思話本紀及氏胡傳難當寇漢中皆在十一月法䕶法崇之兄也涼王䝉遜病甚國人共議以世子菩提幼弱立菩提之兄敦煌太守牧犍為世子加中外都督大將軍錄尚書事菩薄乎翻犍居言翻後考異曰宋書十六國春秋作茂䖍魏書紀傳作牧犍今從之䝉遜卒諡曰武宣王廟號太祖牧犍即河西王位大赦改元永和立子封壇為世子加撫軍大將軍錄尚書事遣使請命于魏牧犍聰頴好學使疏吏翻好呼到翻和雅有度量故國人立之先是魏主遣李順迎武宣王女為夫人先悉薦翻㑹卒牧犍稱先王遺意遣左丞宋繇送其妹興平公主于魏拜右昭儀李延夀曰魏主增置左右昭儀魏主謂李順曰卿言䝉遜死今則驗矣又言牧犍立何其妙哉朕克涼州亦當不逺於是賜絹千匹廏馬一乘乘繩證翻進號安西將軍寵待彌厚政事無巨細皆與之叅議李順以言中見寵待而亦以為涼隠受誅為臣之不易也如此遣順拜牧犍都督涼沙河三州西域羌戎諸軍事車騎將軍開府儀同三司涼州刺史河西王騎竒寄翻以宋繇為河西王右相牧犍以無功受賞留順上表乞安平一號謂若安西將軍若平西將軍乞一號優詔不許牧犍尊敦煌劉昞為國師敦徒門翻親拜之命官屬以下皆北面受業五月己亥魏主如山北武周山之北也林邑王范陽邁遣使入貢求領交州使疏吏翻詔答以道逺不許裴方明進軍向涪城破張尋唐頻擒程道助斬嚴遐于是趙廣等皆奔散六月魏永昌王健左僕射安原督諸軍擊和龍將軍樓㪍别將五千騎圍凡城魏書官氏志内入諸姓賀樓氏改為樓氏將即亮翻下同燕守將封羽以凡城降降戸江翻下同收其三千餘家而還辛巳魏人𤼵秦雍兵一萬築小城於長安城内雍於用翻秋八月馮崇上表請説降其父説輸芮翻魏主不聽九月益州刺史甄法崇至成都收費謙誅之費扶沸翻程道養張尋將二千餘家逃入郪山廣漢郪縣之山也師古曰郪音妻又音于私翻餘黨各擁衆藏竄山谷時出為寇不絶戊午魏主遣兼大鴻臚崔賾持節拜氐王楊難當為征南大將軍開府儀同三司秦梁二州牧南秦王賾逞之子也崔逞自燕歸魏以侮慢為魏主珪所殺賾士革翻楊難當因蕭思話未至甄法䕶將下舉兵襲梁州破白馬獲晉昌太守張範白馬戊在沔水北即陽平闗晉桓温平蜀以巴漢流人立晉昌郡于上庸之西敗法䕶叅軍魯安期等敗補邁翻又攻葭萌獲晉夀太守范延朗晉孝武太元十五年梁州刺史周馥表分梓潼立晉夀郡古葭萌之地也葭音家冬十一月丁未法䕶棄城犇洋川之西城後魏方立洋川郡于漢中之西鄉縣此蓋因其地有洋水故謂之洋川洋音祥又如字難當遂有漢中之地以其司馬趙溫為梁秦二州刺史甲寅魏主還宫十一月己巳魏大赦辛未魏主如隂山之北魏寧朔將軍盧𤣥來聘前祕書監謝靈運好為山澤之遊五年靈運免官故曰前好呼到翻窮幽極險從者數百人從才用翻伐木開徑百姓驚擾以為山賊㑹稽太守孟顗與靈運有隙㑹工外翻顗魚豈翻表其有異志𤼵兵自防靈運詣闕自陳上以為臨川内史靈運遊放自若廢棄郡事為有司所糾是嵗司徒遣使隨州從事鄭望生收靈運使疏吏翻望生蓋為江州從事靈運執望生興兵逃逸作詩曰韓亡子房奮秦帝魯連恥靈運自以世為晉臣故賦是詩子房事見七卷秦始皇二十九年魯連事見考異追討擒之廷尉奏靈運率衆反叛論正斬刑上愛其才欲免官而已彭城王義康堅執謂不宜恕乃降死一等徙廣州久之或告靈運令人買兵器結健兒欲于三江口簒取之不果水經温水出䍧柯夜郎縣東至欝林廣欝縣為欝水灕水出陽海山南過蒼梧荔浦縣又南至廣信縣入于欝封水出臨賀郡馮乘縣西牛屯山西南流入廣信縣南流注于欝水此蓋三水所㑹之地謂之三江口詔於廣州棄市靈運恃才放逸多所陵忽故及於禍魏立徐州於外黄以刁雍為刺史雍於用翻十一年春正月戊戌燕王遣使請和於魏使疏吏翻魏主不許楊難當以克漢中告捷于魏送雍州流民七千家於長安雍於用翻蕭思話至襄陽遣横野司馬蕭承之為前驅思話時以横野將軍鎮梁州以承之為司馬承之縁道收兵得千人進據磝頭水經註漢水逕黄金南東流厯敖頭魏興安康縣治磝敖同音楊難當焚掠漢中引衆西還留趙溫守梁州又遣其魏興太守薛健據黄金山思話遣隂平太守蕭坦攻鐵城戍拔之黄金山註見七十四卷魏邵陵厲公正始五年水經註鐵城與黄金戍相對一城在山上一城在山下二月趙温薛健與其馮翊太守蒲甲子合攻坦營坦擊破之溫等退保西水水經註西水作酉水臨川王義慶遣龍驤將軍裴方明將三千人助承之驤思將翻將即亮翻下同拔黄金戍而據之溫棄州城退據小城健甲子退保下桃城思話繼至與承之共擊趙溫等屢破之行叅軍王靈濟别將出洋川攻南城拔之沈約曰譙縱滅梁州刺史還治漢中之苞中縣所謂南城也余考前史漢中郡無苞中縣意即褒中縣蓋因語近而字遂訛也褒中縣在南鄭西南故謂之南城擒其守將趙英南城空無所資靈濟引兵還與承之合魏主以西海公主妻柔然敇連可汗妻七細翻可從入聲汗音寒又納其妹為夫人遣潁川王提往逆之丁夘敇連遣其異母兄秃鹿傀送妹并獻馬二千匹傀公回翻魏主以其妹為左昭儀提曜之子也辛夘魏主還宫三月甲寅復如河西復扶又翻楊難當遣其子和將兵與蒲甲子等共撃蕭承之相拒四十餘日圍承之數十重短兵接弓矢無所復施氐悉衣犀甲戈矛所不能入重直龍翻復扶又翻下可復同衣於既翻周禮考工記犀甲夀百年以牛皮為之承之㫁矟長數尺以大斧椎之一矟輒貫數人㫁丁管翻矟色角翻長直亮翻氐不能當燒營走據大桃閏月承之等追擊之至南城氐敗走斬獲甚衆悉收漢中故地置戍于葭萌水水經註白水出臨洮縣西南西傾山東南流至葭萌縣北因謂之葭萌水水有津闗即所謂白水闗也初桓希既敗希敗見一百十三卷晉安帝元興三年氐王楊盛據漢中梁州刺史范元之傅歆皆治魏興治直之翻唯得魏興上庸新城三郡及索邈為刺史見一百十六卷晉安帝義熙九年索昔各翻乃治南城至是南城為氐所焚不可復固蕭思話徙鎮南鄭自此梁州治南鄭甲戌赫連昌叛魏西走丙子河西候將格殺之此河西五原河西也候將斥候將也將即亮翻魏人并其羣弟誅之己夘魏主還宫辛巳燕王遣尚書髙顒上表稱藩請罪于魏顒魚容翻乞以季女充掖庭魏主乃許之徵其太子王仁入朝燕王送魏使者于什門還平城朝直遥翻使疏吏翻下同什門在燕二十一年不屈節什門使燕見一百十六卷晉安帝義熙十年考異曰後魏書節義傳云什門在燕厯二十四年按後魏本紀神瑞元年八月遣于什門招諭馮䟦至此年二十一年矣若二十四年乃在太延三年而太延二年馮氏亡矣魏主下詔褒稱以比蘇武拜治書御史治直之翻賜羊千口帛千匹策告宗廟頒示天下戊子休屠金當川圍魏隂密隂密縣漢晉屬安定郡魏收志屬平涼郡括地志隂密故城在涇州鷄觚縣西屠直於翻夏四月乙未魏征西大將軍常山王素擊之丁未魏主行如河西壬戍獲當川斬之甄法䕶坐委鎮賜死于獄甄之人翻楊難當遣使奉表謝罪帝下詔赦之河西王牧犍遣使上表告嗣位戊寅詔以牧犍為都督涼秦等四州諸軍事征西大將軍涼州刺史河西王犍居言翻六月甲辰魏主還宮燕王不遣太子質魏質音致散騎常侍劉滋諫曰散悉亶翻騎竒寄翻昔劉禪有重山之險孫皓有長江之阻皆為晉擒劉禪事見七十八卷魏元帝景元四年孫浩事見七十九卷晉武帝太康元年重直龍翻何則疆弱之勢異也今吾弱於呉蜀而魏彊於晉不從其欲將有危亡之禍願亟遣太子而修政事撫百姓收離㪚賑饑窮勸農桑省賦役社稷猶庻㡬可保燕王怒殺之辛亥魏主遣撫軍大將軍永昌王健等伐燕收其禾稼徙民而還還從宣翻又如字秋七月壬午魏主如美稷遂至隰城隰城縣自漢以來屬西河郡劉昫曰汾州西河縣漢美稷縣隋為隰城縣上元元年更名西河蓋二縣皆併于汾州西河縣矣命陽平王它督諸軍擊山胡白龍于西河山胡即稽胡一日步落稽蓋匈奴别種劉元海五部之苗裔也或云山戎赤狄之後自離石以西安定以東方七八百里居山谷間種落繁熾它熙之子也陽平王熙見一百十九卷武帝永初二年魏主輕山胡日引數十騎登山臨視之騎竒寄翻白龍伏壯士十餘處掩擊之魏主墜馬㡬為所擒㡬居希翻内入行長代人陳建以身扞之内入行長魏官也蓋選勇力之士入直禁中行長則其部帥也魏書官氏志次南諸姓侯莫陳氏改為陳氏行户剛翻長知兩翻大呼奮擊殺胡數人身被十餘創呼火故翻被皮義翻魏主乃免九月戊子大破胡衆斬白龍屠其城冬十月甲午魏人破白龍餘黨于五原誅數千人以其妻子賜將士十一月魏主還宫十二月甲辰復如雲中復扶又翻十二年春正月己未朔日有食之辛酉大赦辛未上祀南郊燕王數為魏所攻數所角翻遣使詣建康稱藩奉貢癸酉詔封為燕王江南謂之黄龍國以其都和龍也今北國以和龍為黄龍府甲申魏大赦改元太延有老父投書於敦煌東門敦徒門翻求之不獲書曰涼王三十年若七年河西王牧犍以問奉常張慎對曰昔虢之將亡神降于莘左傳莊公三十二年有神降于莘虢公使祝應宗區史嚚享焉神賜之土田史嚚曰虢其亡乎吾聞之國將興聽於民將亡聽于神神聰眀正直而壹者也依人而行虢多涼徳其何土之能得後七年晉滅虢犍居言翻虢古百翻願陛下崇徳脩政以享三十年之祚若盤于遊田荒于酒色臣恐七年將有大變牧犍不悦史言涼之將亡二月丁未魏主還宫三月癸亥燕王遣大將湯燭入貢於魏將即亮翻辭以太子王仁有疾故未之遣領軍將軍劉湛與僕射殷景仁素善湛之入也景仁實引之見上八年湛既至以景仁位遇本不踰已而一旦居前意甚憤憤俱被時遇以景仁專管内任謂為間已被皮義翻間古莧翻猜隙漸生知帝信仗景仁不可移奪時司徒義康專秉朝權朝直遙翻下同湛嘗為義康上佐見一百十九卷武帝永初元年遂委心自結欲因宰相之力以囬上意傾黜景仁獨當時務夏四月己巳帝加景仁中書令中䕶軍即家為府湛加太子詹事湛愈憤怒使義康毁景仁于帝帝遇之益隆景仁對親舊歎曰引之令入入便噬人乃稱疾解職表疏累上上時掌翻帝不許使停家養病湛議遣人若刼盜者於外殺之以為帝雖知當有以解之不能傷義康至親之愛帝微聞之遷䕶軍府于西掖門外使近宫禁近其靳翻故湛謀不行義康僚屬及諸附麗湛者潜相約勒無敢厯殷氏之門彭城王主簿沛郡劉敬文父成未悟其機詣景仁求郡敬文遽往謝湛曰老父悖耄遂就殷鐵干祿鐵景仁小字也悖蒲内翻由敬文闇淺上負生成闔門慙懼無地自處史言劉湛怙權時輩諂事之處昌吕翻唯後將軍司馬庾炳之遊二人之間皆得其歡心而密輸忠於朝廷景仁卧家不朝謁帝常使炳之銜命往來湛不疑也為後廢義康誅湛張本炳之登之之弟也庾登之見一百二十卷元嘉三年燕王遣右衞將軍孫徳來乞師五月庚申魏主進宜都公穆夀爵為王汝隂公長孫道生為上黨王宜城公奚斤為恒農王奚斤先封宜城王以罪降為公魏顯祖諱𢎞乃改𢎞農為恒農史以後來郡名書之長知兩翻恒户登翻廣陵公樓伏連為廣陵王加夀征東大將軍夀辭曰臣祖父崇所以得効功前朝流福於後者由梁眷之忠也事見一百六卷晉孝武太元十年今眷元勲未錄而臣獨奕世受賞心實愧之魏主悦求眷後得其孫賜爵郡公夀觀之子也穆觀見一百十九卷武帝永初三年龜兹疏勒烏孫悦般渇槃陁鄯善焉耆車師粟持九國入貢于魏龜兹疏勒烏孫鄯善焉耆車師漢時舊國也悦般國在烏孫西北去代一萬九百三十里其先北匈奴之部落為竇憲所破北單于度金微山西走康居其羸弱不能去住龜兹北地為悦般國涼州人猶謂之單于王渴槃陁國在蔥嶺東朱駒波西粟持當從魏書隋書作粟特粟特國在蔥嶺之西當康居西北去代一萬六千里漢之奄蔡國也龜兹音丘慈般釋典音鉢槃薄官翻陁徒河翻鄯上扇翻考異曰後魏書皆作烏耆云漢時舊國也按漢書作焉耆今從之魏主以漢世雖通西域有求則卑辭而來無求則驕慢不服蓋自知去中國絶逺大兵不能至故也今報使往來徒為勞費終無所益欲不遣使使疏吏翻下同有司固請以為九國不憚險逺慕義入貢不宜拒絶以抑將來乃遣使者王恩生等二十輩使西域恩生等始度流沙為柔然所執恩生見敇連可汗可從刋入聲汗音寒持魏節不屈魏主聞之切責敇連敇連乃遣恩生等還竟不能達西域甲戌魏主如雲中六月甲午魏主以時和年豐嘉瑞沓臻詔大酺五日酺音蒲徧祭百神用答天貺丙午髙句麗王璉遣使入貢于魏句如字又音駒麗力知翻璉力展翻且請國諱魏主使錄帝系及諱以與之拜璉都督遼海諸軍事征東將軍遼東郡公髙句麗王璉釗之曾孫也髙句麗王制為燕所破見八十七卷晉成帝咸康八年戊申魏主命驃騎大將軍樂平王丕驃匹妙翻騎竒寄翻樂音洛鎮東大將軍徒河屈垣等帥騎四萬伐燕魏書官氏志内入諸姓尸突氏為屈氏揚州諸郡大水己酉運徐豫南兖榖以賑之賑津忍翻揚州西曹主簿沈亮建義以為酒糜榖而不足療饑自晉以來公府分東西曹各有掾屬主簿請權禁止詔從之亮林子之子也沈林子隨武帝征伐有功秋七月魏主畋于稒陽稒陽北出即光禄塞漢五原之北邊也師古曰稒音固己夘魏樂平王丕等至和龍燕王以牛酒犒軍犒苦到翻獻甲三千屈垣責其不送侍子掠男女六千口而還八月丙戍魏主如河西九月甲戌還宮魏左僕射河間公安原恃寵驕恣或告原謀為逆冬十月癸夘原坐族誅甲辰魏主如定州十一月乙丑如冀州己巳畋于廣川丙子如鄴魏人數伐燕數所角翻燕日危蹙上下憂懼太常楊㟭復勸燕王速遣太子入侍㟭音岷復扶又翻燕王曰吾未忍為此若事急且東依髙麗以圖後舉㟭曰魏舉天下以擊一隅理無不克髙麗無信始雖相親終恐為變燕王不聽密遣尚書陽伊請迎於髙麗為燕王為髙麗所殺張本麗力知翻丹陽尹蕭摹之上言佛化被于中國已厯四代四代漢魏晉宋也被皮義翻形像塔寺所在千數自頃以來情敬浮末不以精誠為至更以奢競為重材竹銅綵糜損無極無闗神祗有累人事累力瑞翻不為之防流遁未息請自今欲鑄銅像及造塔寺者皆當列言須報乃得為之詔從之摹之思話從叔也從才用翻魏秦州刺史薛謹撃吐没骨滅之楊難當釋楊保宗之囚囚保宗事見上九年使鎮童亭水經註谷水出上邽東南注谷之山東北厯董亭下楊難當使兄子保宗鎮董亭即是亭也董童字相近作考異曰後魏書作薫亭宋書童今從之資治通鑑卷一百二十二
