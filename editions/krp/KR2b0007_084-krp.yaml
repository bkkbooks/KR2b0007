body:
  text: 資治通鑑卷八十四宋司馬光撰胡三省音註晉紀六起重光作噩盡𤣥黓閹茂凡二年孝惠皇帝中之上永寧元年此猶是永康二年正月乙丑趙王倫改元建始四月帝反正始改元永寧春正月以散騎常侍安定張軌為涼州刺史散悉置翻騎奇寄翻軌以時方多難隂有保據河西之志故求為涼州時州境盜賊縱横難乃旦翻縱子容翻鮮卑為冦軌至以宋配汜瑗為謀主楊正衡曰汜音凡姓也瑗于眷翻悉討破之威著西土張氏保據涼土始此嗚呼世亂則人思自全然求全而不能自全者亦多矣竇融張軌之求出河西此求全而得全者也謝晦袁顗之求鎮荆襄此求全而不能自全者也蓋竇融張軌始終一心以奉漢晉此固宜永終福禄詒及子孫者也謝晦袁顗志在據地險以全身其用心非矣天所不與也然劉焉求牧益州袁紹志圖冀部石敬塘心欲河東皆以之潛規非望至其成敗久速則有非智慮所及者相國倫與孫秀使牙門趙奉詐傳宣帝神語云倫宜早入西宫司馬懿追謚宣皇帝時倫以東宫為相國府謂禁中為西宫散騎常侍義陽王威望之孫也素諂事倫倫以威兼侍中使威逼奪帝璽綬作禪詔又使尚書令滿奮持節奉璽綬璽斯氏翻綬音受禪位於倫左衛將軍王輿前軍將軍司馬雅等帥甲士入殿帥讀曰率曉諭三部司馬示以威賞無敢違者張林等屯守諸門屯守宫城諸門也乙丑倫備灋駕入宫即帝位陽考異曰三十國春秋云倫將篡位義王威執詔示嵇紹曰聖上法堯舜之舉卿其然乎紹厲聲曰有死而已終不有二威怒抜劒而出及惠帝遷于金墉城唯紹固志不從直于金墉絶不通倫時人皆為之懼晉書忠義傳云倫簒位紹為侍中惠帝復祚遂居其職二説不同今皆不取復祚之祚當作阼赦天下改元建始帝自華林西門出居金墉城華林西門華林園西門也倫使張衡將兵守之將即亮翻丙寅尊帝為太上皇改金墉曰永昌宫廢皇太孫為濮陽王濮博木翻立世子荂為太子荂枯花翻楊正衡音孚封子馥為京兆王䖍為廣平王詡為霸城王皆侍中將兵以梁王肜為宰衡肜余中翻何劭為太宰孫秀為侍中中書監票騎將軍儀同三司票匹妙翻義陽王威為中書令張林為衛將軍其餘黨與皆為卿將卿將列卿及諸中郎將也將即亮翻超階越次不可勝紀勝音升下至奴卒亦加爵位每朝㑹貂蟬盈座武冠一曰武弁諸武官冠之侍中中常侍加黄金璫附蟬為文貂尾為飾謂之趙惠文冠胡廣説曰趙武靈王效胡服以金璫飾首前插貂尾為貴職秦滅趙以其冠賜近臣應劭漢官曰說者以金取堅剛百鍊不耗蟬居高飲潔口在腋下貂内勁悍而外温潤此因物生義也徐廣曰趙武靈王胡服有此秦漢即而用之說者蟬取其清高飲露而不食貂紫蔚采潤而毛采不彰故於義亦取胡廣又曰意謂北方寒涼本以貂皮暖額附施於冠因遂變成首飾沈約曰貂蟬之說因物生義非其實也其實趙武靈王變胡服秦滅趙以其君冠賜侍臣故秦漢以來侍臣有貂蟬也朝直遥翻時人為之諺曰貂不足狗尾續史記曰狐裘雖敝不可補以黄狗之皮亦此意是嵗天下所舉賢良秀才孝亷皆不試舊制賢良秀孝皆策試而後補官郡國計吏及太學生年十六以上皆署吏守令赦日在職者皆封侯守式又翻郡綱紀並為孝亷縣綱紀並為亷吏郡綱紀功曹之屬縣綱紀主簿録事史之屬亷吏亦選舉之一科史言倫秀欲以濫恩收衆心府庫之儲不足以供賜與應侯者多鑄印不給或以白板封之初平南將軍孫旂之子弼弟子髦輔琰皆附㑹孫秀與之合族旬月間致位通顯及倫稱帝四子皆為將軍封郡侯以旂為車騎將軍開府旂以弼等受倫官爵過差必為家禍遣㓜子回責之弼等不從旂不能制慟哭而已據晉書孫旂四子並以吏才稱於當世附麗非人至於滅族擇交之難也然孫旂先與孫秀親善故諸子從而附㑹之擇交之不審何以詔其子哉雖慟哭無益也孫族之赤旂實為之癸酉殺濮陽哀王臧孫秀專執朝政倫所出詔令秀輒改更與奪朝直遥翻更工衡翻自書青紙為詔或朝行夕改百官轉易如流張林素與秀不相能且怨不得開府潛與太子荂牋言秀專權不合衆心而功臣皆小人撓亂朝廷撓火高翻又奴巧翻可悉誅之荂以書白倫倫以示秀秀勸倫收林殺之夷其三族秀以齊王冏成都王頴河間王顒各擁彊兵據方面惡之冏鎮許昌頴鎮鄴顒鎮關中惡烏路翻顒魚容翻乃盡用其親黨為三王參佐加冏鎮東大將軍頴征北大將軍皆開府儀同三司以寵安之李庠驍勇得衆心趙廞浸忌之而未言驍堅堯翻廞許今翻長史蜀郡杜淑張粲說廞曰將軍起兵始爾而遽遣李庠握彊兵於外謂廞使庠招合壯勇以斷北道也說輸芮翻非我族類其心必異此倒戈授人也宜早圖之㑹庠勸廞稱尊號淑粲因白廞以庠大逆不道引斬之并其子姪十餘人從考異曰載記曰及其子姪宗族三十餘人今華陽國志又國志庠死在本年冬晉春秋在今年春今從之時李特李流皆將兵在外廞遣人慰撫之曰庠非所宜言罪應死兄弟罪不相及復以特流為督將將即亮翻特流怨廞引兵歸緜竹廞牙門將涪陵許弇求為巴東監軍涪陵縣漢屬巴郡蜀分為涪陵郡涪音浮監音工銜翻杜淑張粲固執不許弇怒手殺淑粲於廞閤下淑粲左右復殺弇復扶又翻三人皆廞之腹心也廞由是遂衰腹心既死廞無所倚故其勢衰廞遣長史犍為費逺犍居言翻費扶沸翻蜀郡太守李苾督䕶常俊督萬餘人斷北道屯緜竹之石亭苾毘必翻緜竹縣漢屬廣漢郡晉屬新都郡唐屬漢州斷丁管翻李特宻收兵得七千餘人夜襲逺等軍燒之死者十八九遂進攻成都費逺李苾及軍祭酒張微夜斬關走文武盡散廞獨與妻乗小船走至廣都為從者所殺從才用翻特入成都縱兵大掠遣使詣洛陽陳廞罪狀初梁州刺史羅尚聞趙廞反表廞非雄才蜀人不附敗亡可計日而待詔拜尚平西將軍益州刺史督牙門將王敦此别一王敦蜀郡太守徐儉廣漢太守辛冉等七千餘人入蜀特等聞尚來甚懼使其弟驤於道奉迎并獻珍玩尚悦以驤為騎督驤斯將翻騎奇寄翻騎督督騎兵特流復以牛酒勞尚於緜竹王敦辛冉說尚曰復扶又翻勞力到翻說輸芮翻特等專為盜賊宜因㑹斬之不然必為後患尚不從冉與特有舊謂特曰故人相逢不吉當㓙矣特深自猜懼三月尚至成都汶山𦍑反尚遣王敦討之為𦍑所殺汶音岷紀考異曰帝在八月疑是洛陽始知今從華陽國志齊王冏謀討趙王倫未發㑹離狐王盛離狐縣前漢屬東郡後漢晉屬濟隂郡唐天寶元年改為南華縣屬鄆州頴川處穆晉書作王處穆聚衆於濁澤濁澤在頴川長社縣百姓從之日以萬數倫以其將管襲為齊王軍司討盛穆斬之冏因收襲殺之考異曰齊王冏傳曰冏潛與盛穆謀起兵誅倫未發恐事泄乃與襲殺穆送首於倫以安其意今從三十國春秋與豫州刺史何勗龍驤將軍董艾等起兵遣使告成都王頴河間王顒常山王乂及南中郎將新野公歆晉志曰四中郎將並後漢置武帝以來四中郎將或領刺史或持節為之歆扶風王駿之子也移檄征鎮州郡縣國征鎮四征四鎮居方面者稱逆臣孫秀迷誤趙王當共誅討有不從命者誅及三族使者至鄴成都王頴召鄴令盧志謀之志曰趙王簒逆人神共憤殿下收英俊以從人望杖大順以討之百姓必不召自至攘臂爭進蔑不克矣蔑無也頴從之以志為諮議參軍諮議參軍晉公府皆置之蓋取諮詢謀議軍事也其位在諸參軍之上仍補左長史志毓之孫也盧毓見七十三卷魏明帝景初元年頴以兖州刺史王彦冀州刺史李毅督䕶趙驤石超等為前鋒逺近響應至朝歌朝歌縣前漢屬河内郡晉分屬汲郡隋大業二年改朝歌縣為衛縣屬衛州有紂所都朝歌城在縣西衆二十餘萬超苞之孫也石苞事文帝武帝功參佐命常山王乂在其國與太原内史劉暾各帥衆為頴後繼暾他昆翻帥讀曰率新野公歆得冏檄未知所從嬖人王綏曰趙親而彊齊疎而弱歆父扶風王駿與趙王倫皆宣帝子歆於倫為叔姪其屬親冏於歆為從子其屬視倫為疎嬖卑義翻又博計翻公宜從趙參軍孫詢大言於衆曰趙王㓙逆天下當共誅之何親疎彊弱之有歆乃從冏前安西參軍夏矦奭在始平合衆數千人以應冏遣使邀河間王顒顒用長史李含謀遣振武將軍河間張方討擒奭及其黨腰斬之沈約志振武將軍始於西漢之末王莽以命王況冏檄至顒執冏使送於倫使疏吏翻遣張方將兵助倫方至華隂華户化翻顒聞二王兵盛復召方還更附二王二王謂齊王冏成都王頴冏檄至揚州州人皆欲應冏刺史郗隆慮之𤣥孫也郗丑之翻郗慮漢獻帝時為御史大夫以兄子鑒及諸子悉在洛陽疑未决悉召僚吏謀之主簿淮南趙誘前秀才虞潭皆曰趙王簒逆海内所疾今義兵四起其敗必矣為明使君計莫若自將精兵徑赴許昌上䇿也齊主冏時鎮許昌遣將將兵㑹之中䇿也量遣小軍隨形助勝下䇿也將息亮翻量音良隆退宻與别駕顧彦謀之彦曰誘等下䇿乃上計也治中留寶主簿張褒西曹留承聞之請見曰不審明使君今當何施隆曰我俱受二帝恩二帝謂宣帝武帝或曰二帝謂惠帝及趙王倫非也無所偏助欲守州而已承曰天下世祖之天下也文帝廟號世祖文帝平諸葛誕滅蜀始宏晉業太上承代已久太上謂惠帝時號太上皇今上取之不平今上謂趙王倫齊王順時舉事成敗可見言齊王冏舉事必成趙王倫必敗也使君不早發兵應之狐疑遷延變難將生難乃旦翻此州豈可保也隆不應潭翻之孫也虞翻事吴主權以直聞隆停檄六日不下停冏檄不下曹下遐嫁翻將士憤怨參軍王邃鎮石頭將士爭徃歸之隆遣從事於牛渚禁之不能止平呉之後揚州移鎮秣陵今於牛渚禁將士徃石頭疑此時揚州又還治淮南也將士遂奉邃攻隆隆父子及顧彦皆死傳首於冏安南將軍監沔北諸軍事孟觀以為紫宫帝座無他變晉志北極五星鉤陳六星皆在紫宫中鉤陳中一星曰天皇大帝大帝上九星曰華蓋所以覆蔽大帝之座也觀徒占天象而不察諸人事此其所以死也監古銜翻沔兖翻倫必不敗乃為之固守為于偽翻倫秀聞三王兵起大懼三王謂齊王冏成都王頴河間王顒也詐為冏表曰不知何賊猝見攻圍臣懦弱不能自固乞中軍見救魏晉以禁兵為中軍庶得歸死以其表宣示内外遣上軍將軍孫輔折衝將軍李嚴上軍將軍蓋當時所置沈約志折衝將軍始於建安中曹公以樂進為之帥兵七千自延壽關出晉志河南矦氏縣有延夀城帥讀曰率下同征虜將軍張泓左軍將軍蔡璜前軍將軍閭和帥兵九千自崿阪關出晉志河南陽城縣有崿阪關杜佑曰崿嶺在河南登封縣登封故嵩陽也崿五各翻阪音反鎮軍將軍司馬雅揚威將軍莫原沈約志揚威將軍魏置姓譜莫姓楚莫敖之後帥兵八千自成臯關出晉志河南成臯縣有成臯關以拒冏三路出兵以拒冏遣孫秀子㑹督將軍士猗許超帥宿衛兵三萬以拒頴召東平王楙為衛將軍都督諸軍又遣京兆王馥廣平王䖍帥兵八千為三軍繼援孫㑹士猗許超三人所將之軍為三軍倫秀日夜禱祈厭勝以求福厭益葉翻使巫覡選戰日覡他狄翻又使人於嵩山著羽衣詐稱仙人王喬作書述倫祚長久欲以惑衆嵩山中嶽在穎川陽城縣漢武帝分置崈高縣以奉中嶽東漢省併入陽城縣晉陽城縣屬河南郡著陟畧翻劉向列仙傳曰王子喬周靈王太子晉也好吹笙作鳳鳴遊伊洛間道士浮邱公接上嵩山三十餘年後來於山上告桓良曰告我家七月七日待我於􅚆氏山頭果乗白鶴駐山嶺望之不得到舉手謝時人而去故倫秀詐以惑衆著陟畧翻閏月丙戍朔日有食之自正月至于是月五星互經天縱横無常志曰傳曰日陽君道也星隂臣道也日出則星亡臣不得專也晝而星見午上為經天其占為不臣為更王今五星悉經天天變所未有也縱子容翻張泓等進據陽翟陽翟縣漢屬頴川郡晉屬河南郡與齊王冏戰屢破之冏軍頴隂穎隂縣在穎川郡穎隂去陽翟四十里夏四月泓乗勝逼之冏遣兵逆戰諸軍不動而孫輔徐建軍夜亂徑歸洛自首曰首式救翻齊王兵盛不可當泓等已没矣趙王倫大恐祕之而召其子䖍及許超還欲召河北之軍還以自衛㑹泓破冏露布至倫乃復遣之復扶又翻泓等悉帥諸軍濟頴攻冏營潁水出頴川陽城縣少室東南流過陽翟縣之北帥讀曰率下同冏出兵擊其别將孫髦司馬譚等破之泓等乃退孫秀詐稱已破冏營擒得冏令百官皆賀成都王頴前鋒至黄橋朝歌西有黄澤澤水右入蕩水謂之黄雀溝橋當在溝上為孫㑹士猗許超所敗敗補邁翻殺傷萬餘人士衆震駭頴欲退保朝歌盧志王彦曰今我軍失利敵新得志有輕我之心我若退縮士氣沮䘐不可復用沮在吕翻䘐女六翻復扶又翻且戰何能無勝負不若更選精兵星行倍道出敵不意此用兵之奇也星行者夜行戴星而行也頴從之倫賞黄橋之功士猗許超與孫㑹皆持節由是各不相從軍政不一且恃勝輕頴而不設備頴帥諸軍擊之大戰于溴水湨水出河内軹縣東南至温入河溴古閴翻考異曰趙王倫傳作激水今從帝紀㑹等大敗棄軍南走頴乗勝長驅濟河自冏等起兵百官將士皆欲誅倫秀秀懼不敢出中書省及聞河北軍敗憂懣不知所為懣母木翻又莫困翻孫㑹許超士猗等至與秀謀或欲收餘卒出戰或欲焚宫室誅不附己者挾倫南就孫旂孟觀孫旂在荆州孟觀在宛或欲乗船東走入海計未决辛酉左衛將軍王輿與尚書廣陵公漼漼取猥翻帥營兵七百餘人自南掖門入宫三部司馬為應於内攻孫秀許超士猗於中書省皆斬之遂殺孫奇孫弼及前將軍謝惔等惔徒甘翻漼伷之子也伷音胄王輿屯雲龍門召八坐皆入殿中坐徂卧翻使倫為詔曰吾為孫秀所誤以怒三王今已誅秀其迎太上皇復位吾歸老于農畝傳詔以騶虞幡勑將士解兵傳詔者使之宣傳詔命因以為官名黄門將倫自華林東門出及太子荂皆還汶陽里第將如字引也荂枯花翻楊士衡音孚洛陽城中有汶陽里倫私第在焉楊正衡曰汶音問遣甲士數千迎帝于金墉城百姓咸稱萬嵗帝自端門入升殿羣臣頓首謝罪詔送倫荂等赴金墉城廣平王䖍自河北還至九曲水經注九曲瀆在河南鞏縣西聞變棄軍將數十人歸里第癸亥赦天下改元改元永寧大酺五日酺薄乎翻分遣使者慰勞三王勞力到翻梁王肜等表趙王倫父子㓙逆宜伏誅丁夘遣尚書袁敞持節賜倫死收其子荂馥䖍詡皆誅之凡百官為倫所用者皆斥免臺省府衛僅有存者尚書御史謁者臺門下中書祕書省府諸公府也衛二衛及六軍也是日成都王頴至己巳河間王顒至頴使趙驤石超助齊王冏討張泓等於陽翟泓等皆降降户江翻自兵興六十餘日戰鬬死者近十萬人近其靳翻斬張衡閭和孫髦于東市蔡璜自殺五月誅義陽王威襄陽太守宗岱承冏檄斬孫旂沈約曰魏武帝分南郡編縣以北及南陽之山都立襄陽郡魚豢曰魏文帝立永饒冶令空桐機斬孟觀永饒冶當在南陽宛縣空桐姓機名姓譜曰漢覆姓有空桐空相二氏世本云空同子姓蓋因崆峒山也皆傳首洛陽夷三族立襄陽王尚為皇太孫六月乙夘齊王冏帥衆入洛陽帥讀曰率頓軍通章署甲士數十萬威震京都晉避景帝諱謂京師曰京都戊辰赦天下復封賔徒王晏為呉王晏貶見上卷永康元年倫考異曰晏傳自賓徒徙封代王誅復本封今從帝紀甲戍詔以齊王冏為大司馬加九錫備物典策如宣景文武輔魏故事成都王頴為大將軍都督中外諸軍事假黄鉞録尚書事加九錫入朝不趨劒履上殿都考異曰頴傳曰至鄴詔王粹加九錫進位大將軍督中外頴拜受徽號讓殊禮按頴在洛盧志已謂頴曰今當與齊王共輔朝政明已有録尚書之命但頴不受歸鄴故朝廷使粹追命之耳且頴功大於冏不應獨賞冏而頴未賞也今從帝紀河間王顒為侍中太尉加三賜之禮記王制諸侯賜弓矢然後征賜鈇鉞然後殺賜圭瓉然後為鬯常山王乂為撫軍大將軍領左軍左軍即左軍將軍所統進廣陵公漼爵為王領尚書加侍中進新野公歆爵為王都督荆州諸軍事加鎮南大將軍歆自南中郎將加鎮南齊成都河間三府各置掾屬四十人武號森列自東漢以來公府皆有掾有屬但不帶武號耳掾以絹翻文官備員而已識者知兵之未戢也己夘以梁王肜為太宰領司徒肜以太師領丞相之職光禄大夫劉蕃女為趙世子荂妻故蕃及二子散騎侍郎輿冠軍將軍琨皆為趙王倫所委任冠古玩翻大司馬冏以琨父子有才望特宥之以輿為中書郎中書郎即中書侍郎琨為尚書左丞又以前司徒王戎為尚書令劉暾為御史中丞暾他昆翻王衍為河南尹新野王歆將之鎮將出鎮荆州也與冏同乗謁陵乗繩正翻因說冏曰成都王至親帝弟之親故曰至親說輸芮翻同建大勲今宜留之與輔政若不能爾當奪其兵權常山王乂與成都王頴俱拜陵乂謂頴曰天下者先帝之業王宜維正之聞其言者莫不憂懼憂懼者以冏與乂頴必阻兵相圖將罹其禍也盧志謂頴曰齊王衆號百萬與張泓等相持不能决大王逕前濟河功無與貳今齊王欲與大王共輔朝政志聞兩雄不俱立宜因太妃微疾求還定省頴母程才人冊為成都太妃記曲禮凡為人子者冬温而夏凊昏定而晨省省悉景翻委重齊王以收四海之心委朝政之重於齊王則四海之人謂穎功大不居將歸心於頴此計之上也頴從之帝見頴于東堂慰勞之勞力到翻頴拜謝曰此大司馬冏之勲臣無豫焉因表稱冏功德宜委以萬機自陳母疾請歸藩即辭出不復還營便謁太廟出自東陽城門洛陽城東面北頭第二門曰東陽門遂歸鄴遣信與冏别冏大驚馳出送頴至七里澗及之水經注鴻臺陂在洛陽東北二十里其水東流左合七里澗武帝泰始十年立城東七里澗石橋頴住車言别流涕滂沱滂沱淚下如雨也惟以太妃疾苦為憂不及時事由是士民之譽皆歸頴冏辟新興劉殷為軍諮祭酒洛陽令曹攄為記室督漢建安三年曹公置軍謀祭酒晉制文武官公及諸方面征鎮府皆置軍諮祭酒漢三公及大將軍府皆有記室令史主上章表奏報書記曹公輔漢以陳琳阮瑀管記室晉諸公府皆有記室督攄抽居翻尚書郎江綂陽平太守河内茍晞參軍事晉諸公諸從公為持節都督増參軍為六員呉國張翰為東曹掾孫惠為户曹掾前廷尉正顧榮及順陽王豹為主簿晉制東曹在倉曹之上户曹在倉曹之下廷尉屬官有正監平魏分南陽立南鄉郡武帝太康中更名順陽郡掾俞絹翻豹補敎翻惠賁之曽孫孫賁吴主權從兄榮雍之孫也顧雍呉相也殷㓜孤貧養曽祖母以孝聞養羊亮翻人以榖帛遺之遺于季翻殷受而不謝直云待後貴當相酧耳及長博通經史性倜儻有大志長知兩翻倜他歴翻倜儻卓異也劉殷後事劉聰貴顯女充聰後宫何足尚也儉而不陋清而不介望之頹然而不可侵也冏以何勗為中領軍董艾典樞機又封其將佐有功者葛旟路秀衛毅劉真韓泰皆為縣公委以心膂號曰五公葛旟牟平公路秀小黄公衛毅隂平公劉真安鄉公韓泰封邱公旟音輿考異曰路秀帝紀作路季今從齊王冏傳成都王頴至鄴詔遣使者就申前命頴受大將軍譲九錫殊禮表論興義功臣皆封公矦頴亦表封盧志和演董洪王彦趙驤等又表稱大司馬前在陽翟與賊相持既久百姓困敝乞運河北邸閣米十五萬斛以賑陽翟饑民造棺八千餘枚以成都國秩為衣服歛祭黄橋戰士歛力贍翻旌顯其家加常戰亡二等又命温縣瘞趙王倫戰士萬四千餘人此溴水之戰也温縣屬河内郡周司冦蘇忿生之國也瘞於計翻皆盧志之謀也頴貌美而神昏不知書然氣性敦厚委事於志故得成其美焉詔復遣使諭頴入輔并使受九錫復扶又翻頴嬖人孟玖不欲還洛嬖卑義翻又博計翻又程太妃愛戀鄴都故頴終辭不拜初大司馬冏疑中書郎陸機為趙王倫撰禪詔收欲殺之大將軍頴為之辯理得免死為于偽翻因表為平原内史以其弟雲為清河内史機友人顧榮及廣陵戴淵以中國多難難乃旦翻勸機還呉機以受頴全濟之恩且謂頴有時望可與立功遂留不去為陸機陸雲為穎所殺張本秋七月復封常山王乂為長沙王武帝太康十年封乂為長沙王楚王瑋之誅乂以同母貶為常山王今復舊封遷開府驃騎將軍東萊王蕤㓙暴使酒數陵侮大司馬冏數所角翻又從冏求開府不得而怨之宻表冏專權與左衛將軍王輿謀廢冏事覺八月詔廢蕤為庶人誅輿三族徙蕤於上庸上庸内史陳鍾承冏㫖潛殺之輿考異曰帝紀六月庚午蕤與王謀廢冏事覺得罪甲戌冏為大司馬按誅輿詔已稱冏為大司馬則輿事覺不應在冏為大司馬前今從三十國春秋在八月赦天下東武公澹坐不孝徙遼東九月徴其弟東安王繇復舊爵繇廢徙見八十二卷元康元年拜尚書左僕射繇舉東平王楙為都督徐州諸軍事鎮下邳州考異曰楙為平東督徐九月繇復爵按楙傳繇為僕射舉楙為平東故移在繇還後初朝廷符下秦雍州使召還流民入蜀者下遐嫁翻雍於用翻又遣御史馮該張昌督之李特兄輔自略陽至蜀言中國方亂不足復還特然之累遣天水閻式詣羅尚求權停至秋又納賂於尚及馮該尚該許之朝廷論討趙廞功拜特宣威將軍弟流奮武將軍皆封矦璽書下益州條列六郡流民與特同討廞者將加封賞廣漢太守辛冉欲以滅廞為己功寢朝命寢封拜特流之命也下遐嫁翻朝直遥翻不以實上所謂條列者不以實上上時掌翻下同衆咸怨之六郡之衆也羅尚遣從事督遣流民限七月上道上時掌翻時流民布在梁益為人傭力聞州郡逼遣人人愁怨不知所為且水潦方盛年榖未登無以為行資特復遣閻式詣尚求停至冬復扶又翻下日復復值同辛冉及犍為太守李苾以為不可犍居言翻苾毗必翻尚舉别駕杜弢秀才式為弢說逼移利害弢亦欲寛流民一年弢他刀翻為于偽翻下數為同尚用冉苾之謀不從弢乃致秀才板出還家送至為致冉性貪暴欲殺流民首領取其資貨乃與苾白尚言流民前因趙廞之亂多所剽掠宜因移設關以奪取之剽匹妙翻移即移書也流民安於蜀土雖以朝命驅使還本猶恐其不去况欲設關以奪取其資財是速之為亂也尚移書梓潼太守張演於諸要施關搜索寶貨蜀劉民分廣漢立梓潼郡諸要者凡路所通其地當徃來之津要者施關者先未嘗立闗今特設之特數為流民請留數所角翻流民皆感而恃之多相帥歸特特乃結大營於綿竹以處流民帥讀曰率處昌吕翻移辛冉求自寛冉大怒遣人分牓通衢購募特兄弟許以重賞特見之悉取以歸與弟驤改其購云能送六郡酋豪李任閻趙上官及氐叟矦王一首賞百匹蜀叟自是一種酋慈由翻任音壬於是流民大懼歸特者愈衆旬月間過二萬人流亦聚衆數千人特又遣閻式詣羅尚求申期申重也求重為期限使流民得自寛也式見營柵衝要謀揜流民歎曰民心方危今而速之亂將作矣又知辛冉李苾意不可回乃辭尚還緜竹尚謂式曰子且以吾意告諸流民今聽寛矣式曰明公惑於姦說恐無寛理弱而不可輕者民也今趣之不以理趣讀曰促衆怒難犯左傳鄭子産之言恐為禍不淺尚曰然吾不欺子子其行矣式至緜竹言於特曰尚雖云爾然未可信也何者尚威刑不立冉等各擁彊兵一旦為變亦非尚所能制深宜為備特從之閻式已覘知冉等之情冬十月特分為二營特居北營流居東營繕甲厲兵戒嚴以待之冉苾相與謀曰羅矦貪而無斷斷丁亂翻日復一日令流民得展姦計李特兄弟並有雄才吾屬將為所虜矣宜為决計欲一戰以决之也羅矦不足復問也復扶又翻乃遣廣漢都尉曽元牙門張顯劉並等潛帥步騎三萬襲特營帥讀曰率羅尚聞之亦遣督䕶田佐助元元等至特安卧不動待其衆半入發伏擊之死者甚衆殺田佐曽元張顯傳首以示尚冉尚謂將佐曰此虜成去矣謂特雖求申行期而去計已成也而廣漢不用吾言以張賊勢辛冉為廣漢太守故稱之尚言冉輕用兵為特所敗使其勢愈張也張知亮翻今若之何於是六郡流民共推特行鎮北大將軍承制封拜以其弟流行鎮東大將軍號東督䕶以相鎮綂又以兄輔為驃騎將軍弟驤為驍騎將軍驃匹妙翻驍堅堯翻進兵攻冉於廣漢廣漢郡治廣漢縣後宋置遂寧郡齊梁加東字後魏改廣漢縣為方義縣後周改東遂寧為遂州方義為遂州治所尚遣李苾費逺帥衆救冉費扶沸翻畏特不敢進冉出戰屢敗潰圍奔德陽德陽縣後漢置屬廣漢郡至唐屬劒州特入據廣漢以李超為太守進兵攻尚於成都尚以書諭閻式式復書曰辛冉傾巧曽元小豎李叔平非將帥之才李苾字叔平將即亮翻帥所類翻式前為節下及杜景文論留徙之宜晉人稱方面專征之將率曰節下杜弢字景文為于偽翻人懷桑梓桑梓祖父之所樹以遺子孫者故謂懷故鄉者為懷桑梓孰不願之但徃日初至隨榖庸賃謂徃日流民初至蜀之時無以自給隨所徃逐糧出力為人傭作賃女禁翻亦傭也一室五分復值秋潦潦魯皓翻雨水大貌復扶又翻乞須冬熟而終不見聽繩之太過窮鹿抵虎流民不肯延頸受刀以致為變即聽式言寛使治嚴即就也治嚴猶云治裝也冶直之翻不過去九月盡集日月已過者為去十月進道令達鄉里何有如此也特以兄輔弟驤子始蕩雄及李含含子國離任回李攀攀弟恭上官晶任臧楊褒上官惇等為將帥閻式李逺等為僚佐羅尚素貪殘為百姓患特與蜀民約灋三章施捨賑貸杜預曰施恩惠捨勞役禮賢抜滯軍政肅然蜀民大悅尚頻為特所敗敗隋邁翻乃阻長圍緣郫水作營連延七百里水經注綿水西出綿竹縣又與湔水合亦謂之郫江載記曰尚緣水作營自都安至犍為七百里師古曰郫音疲與特相拒求救於梁州及南夷校尉南夷校尉綂南中都郡十二月穎昌康公何邵薨封大司馬冏子氷為樂安王英為濟陽王超為淮南王太安元年是年十二月齊王冏死方改元太安此猶是永寧二年春三月冲太孫尚薨冲諡也夏五月己酉梁孝王肜薨以右光禄大夫劉寔為太傅尋以老病罷河間王顒遣督䕶衙博討李特姓譜秦穆公子食采於衙因氏焉衙縣漢屬馮翊軍于梓潼梓潼縣漢屬廣漢郡劉蜀分廣漢置梓潼郡唐劒州之梓潼普安黄安求歸武連臨津劒門皆漢梓潼縣地潼音同朝廷復以張微為廣漢太守軍于德陽復扶又翻下同羅尚遣督䕶張龜軍于繁城繁縣屬蜀郡劉昫曰唐彭州九隴縣漢繁縣地宋白曰益州新繁縣本漢繁縣特使其子鎮軍將軍蕩等襲博而自將擊龜破之蕩敗博兵於陽沔敗補邁翻下所敗同梓潼太守張演委城走巴西丞毛植以郡降蕩進攻博於葭萌巴西郡唐為閬果二州之地劉蜀改漢葭萌縣為漢壽縣晉又改為晉壽此本之漢舊縣名而書之唐為利州之緜谷葭萌二縣地博走其衆盡降降户江翻河間王顒更以許雄為梁州刺史特自稱大將軍益州牧都督梁益二州諸軍事大司馬冏欲久專大政以帝子孫俱盡太子遹死帝無子矣虨臧尚死帝無孫矣大將軍穎有次立之勢穎於帝諸弟之次當及清河王覃遐之子也方八嵗乃上表請立之癸夘立覃為皇太子以冏為太子太師東海王越為司空領中書監秋八月李特攻張微微擊破之遂進攻特營李蕩引兵救之山道險陿陿與狹同蕩力戰而前遂破微兵特欲還涪蕩及司馬王幸諫曰微軍已敗智勇俱竭宜乘銳氣遂禽之特復進攻微殺之生禽微子存以微䘮還之特以其將寋碩守德陽寋九件翻姓也李驤軍毗橋今懷安軍西北有中江源從漢州彌牟雒水毗橋水三水㑹為一江懷安軍漢廣漢新都縣之地羅尚遣軍擊之屢為驤所敗驤遂進攻成都燒其門李流軍成都之北尚遣精勇萬人攻驤驤與流合擊大破之還者什一二許雄數遣軍攻特不勝數所角翻特勢益盛建寧大姓李叡毛詵逐太守許俊建寧古滇王國之地漢開置益州郡劉蜀更名建寧郡唐為昆州之地朱提大姓李猛逐太守雍約以應特朱提縣前漢屬犍為郡後漢屬犍為屬國都尉劉蜀分置朱提郡唐為曲州之地朱提蘇林音銖時雍於用翻衆各數萬南夷校尉李毅討破之斬詵李猛奉牋降而辭意不遜毅誘而殺之冬十一月丙戍復置寧州罷寧州見八十一卷武帝太康五年以毅為刺史齊武閔王冏既得志頗驕奢擅權大起府第壞公私廬舎以百數壞音怪制與西宫等中外失望侍中嵇紹上疏曰存不忘亡易之善戒也易大傳子曰危者有其安者也亡者保其存者也亂者有其治者也君子安而不忘危存而不忘亡治而不忘亂然後身安而國家可保也易曰其亡其亡繫于苞桑臣願陛下無忘金墉大司馬無忘頴上大將軍無忘黄橋則禍亂之萌無由而兆矣齊桓公與鮑叔牙管夷吾寗戚飲酒酣叔牙為壽曰願君無忘在莒時願管子無忘束縛於魯時寗子無忘飯牛車下時嵇紹之言祖其意又與冏書以為唐虞茅茨夏禹卑宫唐虞采椽不斵茅茨不翦禹卑宫室今大興第舎及為三王立宅為于偽翻豈今日之急邪冏遜辭謝之然不能從冏耽於宴樂不入朝見樂音洛朝直遥翻見賢遍翻坐拜百官坐受百官之拜也一說天子用三公九卿諸將軍猶引而拜之今冏安坐府第拜受百官也符勑三臺選用不均以私意選用符勑三臺使奉行不均之大者也嬖寵用事凡史書其人將敗必先叙其致敗之由此左氏傳例殿中御史桓豹奏事不先經冏府即加考竟魏制蘭臺遣二御史居殿中伺察非法及晉置四人史言冏但欲專權考竟殿中御史不知無君之迹愈著南陽處士鄭方處昌吕翻上書諫冏曰今大王安不慮危宴樂過度一失也樂音洛宗室骨肉當無纎介今則不然二失也蠻夷不靜大王謂功業已隆不以為念三失也蠻夷不静謂李特等寇亂梁益也兵革之後百姓窮困不聞賑救四失也此一失葢指成都王穎運米以收河南人心而不敢察察言之耳大王與義兵盟約事定之後賞不踰時而今猶有功未論者五失也兵法曰賞不踰時欲民速得為善之利也此言頴上之功猶有未叙者冏謝曰非子孤不聞過孫惠上書曰天下有五難四不可而明公皆居之冒犯鋒刃一難也冒莫北翻聚致英豪二難也與將士均勞苦三難也將即亮翻以弱勝彊四難也興復皇業五難也大名不可久荷荷下可翻大功不可久任大權不可久執大威不可久居大王行其難而不以為難謂在穎上時也處其不可而謂之可惠之此言婉而切處昌吕翻惠切所不安也明公宜思功成身退之道老子曰功成名遂身退天之道崇親推近委重長沙成都二王長揖歸藩則太伯子臧不專美於前矣吴太伯以天下讓曹子臧以國讓今乃忘高亢之可危亢口浪翻高極為亢貪權埶以受疑雖遨遊高臺之上逍遥重墉之内重直龍翻愚竊謂危亡之憂過於在頴翟之時也頴翟謂頴川陽翟也冏不能用惠辭疾去冏謂曹攄曰或勸吾委權還國何如攄曰物禁太盛大王誠能居高慮危褰裳去之斯善之善者也冏不聽張翰顧榮皆慮及禍翰因秋風起思菰菜蓴羮鱸魚鱠菰一名蔣本草曰菰又謂之茭嵗久中心生白臺謂之菰米其臺中有黒者謂之茭至後結實乃雕胡黒米也蓴生水中葉似鳬茨春夏細長肥滑三月至八月為絲蓴九月至十一月為猪蓴鱸魚出呉松江者佳呉人以為鱠甚美蓴殊倫翻歎曰人生貴適志耳富貴何為即引去榮故酣飲不省府事省悉景翻長史葛旟以其廢職白冏徙榮為中書侍郎頴川處士庾衮姓譜庾姓堯時為掌庾大夫因氏焉處昌吕翻下處要同聞冏朞年不朝歎曰晉室卑矣禍亂將興帥妻子逃於林慮山中帥讀曰率慮音廬王豹致牋於冏曰伏思元康以來宰相在位未有一人獲終者元康元年楊駿誅繼而汝南王亮死永康元年張華裴頠死乃事埶使然非皆為不善也今公克平禍亂安國定家乃復尋覆車之軌復扶又翻欲冀長存不亦難乎今河間樹根於關右成都盤桓於舊魏曹魏以鄴都基王業故謂之舊魏新野大封於江漢三王方以方剛强盛之年並典戎馬處要害之地而明公以難賞之功挾震主之威獨據京都專執大權進則亢龍有悔易乾上九爻辭象曰亢龍有悔盈不可久也退則據于蒺藜易困六三爻辭陶宏景曰蒺藜多生道上而葉布地子有刺狀若菱而小有三角長安最饒人以故多著木屐今軍家乃鑄鉄作之以布敵路亦呼為蒺藜易云據于蒺藜言其凶傷也爾雅翼茨蒺藜詩曰牆有茨蒺昨失翻藜力脂翻又力兮翻冀此求安未見其福也因請悉遣王矦之國豹因此語掇長沙王乂之怒以殺其身依周召之法召讀曰邵以成都王為北州伯治鄴冏自為南州伯治宛分河為界各統王矦以夾輔天子周之時周召分陜而治為二伯以夾輔王室故王豹欲依以為法宛於元翻冏優令答之長沙王乂見豹牋謂冏曰小子離間骨肉何不銅駞下打殺冏乃奏豹讒内間外間右莧翻坐生猜嫌不忠不義鞭殺之豹將死曰縣吾頭大司馬門見兵之攻齊也縣讀曰懸昔伍子胥為吴王夫差所殺將死曰縣吾目於呉東門見越之入呉也豹倣此語冏以河間王顒本附趙王倫心常恨之梁州刺史安定皇甫商與顒長史李含不平含被徴為翊軍校尉時商參冏軍事夏矦奭兄亦在冏府含心不自安顒附趙王倫奭為顒所殺事並見上永寧元年又與冏右司馬趙驤有隙遂單馬犇顒詐稱受宻詔使顒誅冏因說顒曰説輸芮翻成都王至親有大功推讓還藩甚得衆心推吐雷翻齊王越親而專政朝廷側目今檄長沙王使討齊齊王必誅長沙吾因以為齊罪而討之必可禽也去齊立成都去羌吕翻除逼建親以安社稷大勲也顒從之是時武帝族弟范陽王虓都督豫州諸軍事虓宣帝弟東武城侯馗之少子虓虛交翻顒上表陳冏罪狀且言勒兵十萬欲與成都王頴新野王歆范陽王虓共㑹洛陽請長沙王乂廢冏還第以頴代冏輔政顒遂舉兵以李含為都督帥張方等趨洛陽復遣使邀頴帥讀曰率趨七喻翻復扶又翻頴將應之盧志諫不聽十二月丁卯顒表至冏大懼㑹百官議之曰孤首唱義兵臣子之節信著神明今二王信讒作難將若之何二王謂河間王顒成都王頴難乃旦翻尚書令王戎曰公勲業誠大然賞不及勞故人懷貳心今二王兵盛不可當也若以王就第委權崇讓庶可求安冏從事中郎葛旟怒曰三臺納言不恤王事謂尚書也賞報稽緩賞以報功故曰賞報稽留也緩遟也責不在府自謂過不在齊府也讒言逆亂當共誅討奈何虛承偽書遽令公就第乎漢魏以來王矦就第寧有得保妻子者邪議者可斬百官震悚失色戎偽藥發墮厠得免李含屯隂盤魏收地形志隂盤縣漢屬安定郡晉屬京兆郡鴻門戲水皆在縣界余按漢京兆與馮翊以渭水為界安定在馮翊之北晉安得割安定之隂盤以屬京兆邪此魏收之誤也水經注冷水逕隂盤新豐兩原之間北流注于渭漢靈帝建寧三年改新豐為都鄉封段頴為侯國後立隂槃城其水際城北出謂是水為隂槃水又北絶漕槃溝注于渭是則李含所屯之隂盤也五代史志隋廢後魏平涼郡入隂盤縣地形志涇州有平原郡治隂盤縣一志之間兩隂盤並載而不覺其誤以是見史學之難精也劉昫曰唐涇州良原縣隋隂盤縣是即漢安定之隂盤縣宋白曰京兆昭應縣東十三里有漢新豐縣故城亦謂之隂盤城後漢靈帝未移安定隂盤縣寄理於此是即京兆之隂盤也張方帥兵二萬軍新安新安縣漢屬宏農郡晉屬河南郡帥讀曰率檄長沙王乂使討冏冏遣董艾襲乂乂將左右百餘人馳入宫閉諸門奉天子攻大司馬府董艾陳兵宫西縱火燒千秋神武門千秋神武門宫西門也東漢曰神虎晉及南北諸史皆唐羣臣所定唐太祖諱虎置之改為武冏使人執騶虞幡唱云長沙王乂矯詔乂又稱大司馬謀反是夕城内大戰飛矢雨集火光屬天屬之欲翻帝幸上東門此上東門非洛城之上東門宫城之上東門也矢集御前羣臣死者相枕枕職鴆翻連戰三日冏衆大敗大司馬長史趙淵殺何勗因執冏以降何勗與冏同起兵時為中領軍降户江翻冏至殿前帝惻然欲活之乂叱左右趣牽出趣讀曰促斬於閶闔門外水經注曰按禮王有五門謂臯門庫門雉門惠門路門魏明帝上法太極於洛陽南宫起太極殿于漢崇徳殿之故處改雉門曰閭闔門余按天門曰閶闔法以名門又按晉志洛陽城西有廣陽西明閶闔三門未知孰是此時怱怱奚暇牽冏出都城西門乎此必宫城之閶闔門也徇首六軍同黨皆夷三族死者二千餘人囚冏子超氷英於金墉城廢冏弟北海王寔赦天下改元改元太安李含等聞冏死引兵還長安長沙王乂雖在朝廷事無巨細皆就鄴諮大將軍頴頴以孫惠為參軍陸雲為右司馬是嵗陳留王薨謚曰魏元皇帝晉受魏禪奉魏帝為陳留王鮮卑宇文單于莫圭部衆彊盛遣其弟屈雲攻慕容廆廆擊其别帥素怒延破之單音蟬帥所類翻素怒延恥之復發兵十萬圍廆於棘城復扶又翻廆衆皆懼廆曰素怒延兵雖多而無灋制已在吾算中矣諸君但為力戰為于偽翻無所憂也遂出擊大破之追犇百里俘斬萬計下考異曰載記作素延云素延怒率衆圍棘城按燕書紀傳皆謂之素怒延然則怒延是其名也遼東孟暉先没於宇文部帥其衆數千家降于廆帥讀曰率降户江翻廆以為建威將軍廆以其臣慕輿句勤恪亷靖使掌府庫句心計黙識識音志記也不按簿書始終無漏以慕輿河明敏精審使典獄訟覆訊清允慕輿蓋亦鮮卑之種别為一姓史言慕容廆善用人資治通鑑卷八十四
