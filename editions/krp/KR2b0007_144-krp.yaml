front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百四十四宋司馬光撰胡三省音註齊紀十重光大荒落一年和皇帝諱寳融字智昭明帝第八子也中興元年是年三月始改元春正月丁酉東昏矦以晉安王寳義為司徒建安王寳寅為車騎將軍開府儀同三司東昏矦以永元三年紀年騎奇寄翻乙巳南康王寳融始稱相國相悉亮翻下同大赦以蕭頴胄為左長史蕭衍為征東將軍楊公則為湘州刺史去年楊公則取長沙因就用為湘州刺史戊申蕭衍發襄陽異考曰梁高祖紀云二月戊申𤼵襄陽按戊申正月十三日梁紀誤也留弟偉總府州事憺守壘城壘城者築壘附近大城猶今堡寨也憺徒敢翻又徒濫翻府司馬莊丘黒守樊城莊丘黑盖為征東府司馬衍既行州中兵及儲偫皆虛偫直里翻積物以待用謂之偫魏興太守裴師仁齊興太守顏僧都並不受衍命舉兵欲襲襄陽偉憺遣兵邀擊於始平大破之齊分魏興郡東界鄖鄉錫二縣地為齊興郡沈約曰江左僑立始平郡治武當五代志曰浙陽郡武當縣舊僑置始平郡又置齊興郡則二郡皆置於今均州界宋白曰齊永明七年置齊興郡於均州鄖鄉縣守式又翻雍州乃安雍於用翻魏咸陽王禧為上相禧以太尉輔政位居羣臣之上故曰上相不親政務驕奢貪淫多為不法魏主頗惡之惡烏路翻禧遣奴就領軍于烈求舊羽林虎賁執仗出入舊字衍執仗出入毎出入欲使之執兵翊衛賁音奔烈曰天子諒闇事歸宰輔闇音陰領軍但知典掌宿衛非有詔不敢違理從私禧奴惘然而返惘然失志貌惘音㒺禧復遣謂烈曰復扶又翻我天子之叔父身為元輔有所求須意之所欲為須與詔何異烈厲色曰烈非不知王之貴也奈何使私奴索天子羽林索山客翻烈頭可得羽林不可得禧怒以烈為恒州刺史恒户登翻烈不願出外固辭不許遂稱疾不出卧私第不出也烈子左中郎將忠領直閤北齊左右衛有直閤屬官有朱衣直閤直閤將軍直寢直齋直後之屬常在魏主左右烈使忠言於魏主曰諸王專恣意不可測宜早罷之自攬權綱北海王詳亦密以禧過惡白帝且言彭城王勰大得人情不宜乆輔政勰音協帝然之時將礿祭宗廟之祭春曰礿礿余若翻薄也春物始生其祭尚薄王公並齋於廟東坊帝夜使于忠語烈明旦入見當有處分質明烈至語牛倨翻見賢遍翻處昌呂翻分扶問翻質正也質明天正明也帝命烈將直閤六十餘人宣㫖召禧勰詳衛送至帝所將即亮翻禧等入見於光極殿光極殿魏孝文帝太和十九年所起以引見羣臣見賢遍翻帝曰恪雖寡昧沗承寳厯比纒尫疢魏主名恪見諸父自稱其名示謙挹也比毘至翻近也尫烏光翻弱也疢丑刃翻疾也實慿諸父茍延視息奄渉三齡諸父歸遜殷勤今便親攝百揆且還府司當别處分還府司謂各歸公府司存之所又謂勰曰頃來南北務殷不容仰遂冲操南北務殷謂使勰北鎮中山南取壽陽因而守之也冲謙也虚也冲操謙虚之操恪是何人而敢久違先敕先敕謂高祖遺敕見一百四十二卷東昏矦永元元年令遂叔父髙蹈之意勰謝曰陛下孝恭仰遵先詔上成睿眀之美下遂微臣之志感今惟徃悲喜交深惟思也庚戌詔勰以王歸第禧進位太保進其位而奪之權詳為大將軍録尚書事為詳以專恣得罪張本尚書清河張彞邢巒聞處分非常亡走出洛陽城為御史中尉中山甄琛所彈甄之人翻彈徒丹翻詔書切責之復以于烈為領軍仍加車騎大將軍復扶又翻又如字自是長直禁中軍國大事皆得參焉魏主時年十六不能親决庶務委之左右於是倖臣茹皓茹音如趙郡王仲興上谷宼猛趙郡趙脩南陽趙邕及外戚高肇等始用事魏政浸衰趙脩尤親幸旬月間累遷至光禄卿每遷官帝親至其宅設宴王公百官皆從為後趙脩誅張本從才用翻辛亥東昏矦祀南郊大赦丁巳魏主引見羣臣於太極前殿告以親政之意見賢遍翻壬戌以咸陽王禧領太尉廣陵王羽為司徒魏主引羽入内面授之羽固辭曰彥和本自不願而陛下強與之彭城王勰字彥和事見上卷上年強其兩翻今新去此官而以臣代之必招物議乃以為司空二月乙丑南康王以冠軍長史王茂為江州刺史冠古玩翻竟陵太守曹景宗為郢州刺史邵陵王寳攸為荆州刺史甲戌魏大赦壬午東昏矦遣羽林兵擊雍州中外纂嚴甲申蕭衍至竟陵命王茂曹景宗為前軍以中兵參軍張法安守竟陵城茂等至漢口諸將議欲併兵圍郢分兵襲西陽武昌將即亮翻下同衍曰漢口不闊一里箭道交至謂船自中流而下敵人夾岸射之其箭交至也房僧寄以重兵固守與郢城為掎角掎居蟻翻若悉衆前進僧寄必絶我軍後悔無所及不若遣王曹諸軍濟江與荆州軍合以逼郢城吾自圍魯山以通沔漢沔即漢也一水二名使鄖城竟陵之粟方舟而下安陸春秋鄖子之國故曰鄖城鄖音云杜預曰江夏雲杜縣東南有鄖城劉昫曰郢州長壽縣古竟陵也方泭也舟船也詩云就其深矣方之舟之泭音桴江陵湘中之兵相繼而至兵多食足何憂兩城之不㧞天下之事可以卧取之耳卧而取之言不煩力戰也乃使茂等帥衆濟江頓九里其地去郢城九里因以為名帥讀曰率張冲遣中兵參軍陳光靜開門迎戰茂等擊破之光靜死冲嬰城自守景宗遂據石橋浦連軍相續下至加湖加湖在江夏灄陽縣界湖水自北南注江去郢城三十里荆州遣冠軍將軍鄧元起軍主王世興田安之將數千人會雍州兵於夏首雍於用翻夏户雅翻衍築漢口城以守魯山命水軍主義陽張惠紹等遊遏江中絶郢魯二城信使使疏吏翻楊公則舉湘州之衆會於夏口蕭頴胄命荆州諸軍皆受公則節度雖蕭頴逹亦𨽻焉府朝議欲遣人行湘州事而難其人南康王開相國府故曰府朝朝直遥翻西中郎中兵參軍劉坦謂衆曰湘土人情易擾難信易以豉翻用武士則侵漁百姓用文士則威略不振必欲鎮靜一州軍民足食無踰老夫乃以坦為輔國長史長沙太守行湘州事坦先嘗在湘州多舊恩迎者屬路劉坦傳先嘗在湘州盖客㳺也屬之欲翻下車選堪事吏分詣十郡湘州領長沙桂陽零陵衡陽營陽湘東邵陵始興臨賀始安十郡𤼵民運租米三十餘萬斛以助荆雍之軍由是資糧不乏三月蕭衍使鄧元起進據南堂西渚南堂在郢城南北盖射堂西近江渚田安之頓城北王世興頓曲水故城曲水故城盖郢府官僚袚禊之地在城東丁酉張冲病卒驍騎將軍薛元嗣與冲子孜及征虜長史江夏内史程茂共守郢城張冲自輔國將軍進征虜將軍以程茂為長史驍堅堯翻騎奇寄翻乙巳南康王即皇帝位於江陵康考異曰東昏紀云丁未南王諱即皇帝位盖是日建康始聞之耳今從和帝紀及梁武帝紀改元大赦始改元為中興元年立宗廟南北郊州府城門悉依建康宫置尚書五省以南郡太守為尹以蕭頴胄為尚書令蕭衍為左僕射晉安王寳義為司空廬陵王寳源為車騎將軍開府儀同三司建安王寳寅為徐州刺史寳義寳源寳寅皆在建康遥授之耳散騎常侍夏矦詳為中領軍冠軍將軍蕭偉為雍州刺史丙午詔封庶人寳卷為涪陵王涪音浮乙酉以尚書令蕭頴胄行荆州刺史加蕭衍征東大將軍都督征討諸軍事假黄鉞時衍次楊口和帝遣御史中丞宗夬勞軍夬古賣翻勞力到翻寧朔將軍新城庾域諷夬曰黄鉞未加非所以總帥矦伯武王伐紂諸矦畢會至于牧野王左杖黄鉞右秉白旄以麾後世自魏武以下率加黄鉞孔安國曰黄鉞以黄金飾斧帥讀曰率下同夬返西臺江陵在西故曰西臺遂有是命薛元嗣遣軍主沈難當帥輕舸數千亂流來戰張惠紹等擊擒之横絶流而渡曰亂詩云渉渭為亂舸苦我翻癸丑東昏矦以豫州刺史陳伯之為江州刺史假節都督前鋒諸軍事西擊荆雍夏四月蕭衍出沔命王茂蕭頴逹等進軍逼郢城薛元嗣不敢出不敢出戰也諸將欲攻之衍不許衍欲持乆以全力弊郢魯二城魏廣陵惠王羽通於貟外郎馮俊興妻夜徃為俊興所擊而匿之五月壬子卒魏主既親政事嬖倖擅權王公希得進見見賢遍翻齊帥劉小茍屢言於禧云帥所類翻聞天子左右人言欲誅禧禧益懼乃與妃兄給事黄門侍郎李伯尚氐主楊集始楊靈祐乞伏馬居等謀反會帝出獵北邙禧與其黨會城西小宅欲發兵襲帝使長子通竊入河内舉兵相應長知兩翻乞伏馬居説禧還入洛城勒兵閉門説式芮翻天子必北走桑乾謂北歸平城也平城魏故都乾音干殿下可斷河橋為河南天子斷丁管翻衆情前却不壹禧心更緩自旦至晡猶豫不决遂約不泄而散楊集始既出即馳至北邙告之直寢符承祖薛魏孫與禧通謀當是時馮太后所幸宦者符承祖已死此又别一符承祖後魏孝文帝太和九年初置直齋直寢是日帝寢於浮圖之隂魏孫欲弑帝承祖曰吾聞殺天子者身當病癩癩音賴惡疾也魏孫乃止俄而帝寤集始亦至帝左右皆四出逐禽直衛無幾幾居豈翻倉猝不知所出左中郎將于忠曰臣父領軍留守京城守式又翻計防遏有僃必無所慮帝遣忠馳騎觀之騎奇寄翻于烈已分兵嚴僃使忠還奏曰臣雖老心力猶可用此屬猖狂不足為慮願陛下清蹕徐還以安物望帝甚悦自華林園還宫華林園魏明帝所築芳林園也後避齊王芳諱改曰華林園還從宣翻又如字撫于忠之背曰卿差彊人意禧不知事露與姬妾及左右宿洪池别墅洪池即漢之鴻池在洛陽東二十里田廬曰墅今人謂之别業晉人以來徃徃治池館觀㳺於其中墅承與翻遣劉小茍奉啟云檢行田收行下孟翻小茍至北邙已逢軍人怪小茍赤衣欲殺之小茍困廹言欲告反乃緩之或謂禧曰殿下集衆圖事見意而停言意趣已𤼵見而中止也見賢遍翻恐必漏泄今夕何宜自寛禧曰吾有此身應知自惜豈待人言又曰殿下長子已濟河兩不相知豈不可慮禧曰吾已遣人追之計今應還時通已入河内列兵仗放囚徒矣于烈遣直閤叔孫矦將虎賁三百人收禧將即亮翻賁音奔禧聞之自洪池東南走僮僕不過數人濟洛至柏谷塢追兵至擒之送華林都亭華林都亭盖在華林園門外帝面詰其反状詰去吉翻壬戌賜死於私第同謀伏誅者十餘人諸子皆絶屬籍微給貲產奴婢自餘家財悉分賜高肇及趙脩之家其餘賜内外百官逮于流外雜色補官不入品者謂之流外官多者百餘匹下至十匹禧諸子乏衣食獨彭城王勰屢賑給之河内太守陸琇聞禧敗斬送禧子通首魏朝以琇於禧未敗之前不收捕通責其通情徵詣廷尉死獄中陸馛以傅孝文於受内禪之初福澤及其子至是其子敗矣勰音協賑津忍翻琇音秀朝直遥翻帝以禧無故而反由是益疎忌宗室巴西太守魯休烈巴東太守蕭惠訓不從蕭頴胄之命惠訓遣子璝將兵擊頴胄璝古回翻頴胄遣汶陽太守劉孝慶屯峽口此西陵峽口也在宜都夷陵界夷陵今峽州也與巴東太守任漾之等拒之任音壬東昏矦遣軍主吳子陽陳虎牙等十三軍救郢州進屯巴口水經注巴水出廬江雩婁縣之下靈山亦曰巴山南流注于江謂之巴口今黄州之巴河口是也虎牙伯之之子也六月西臺遣衛尉席闡文勞蕭衍軍勞力到翻齎蕭頴胄等議謂衍曰今頓兵兩岸不併軍圍郢定西陽武昌取江州此機已失莫若請救於魏與北連和猶為上䇿衍曰漢口路通荆雍控引秦梁泝漢水而上至漢中秦梁二州刺史所治也故可以控引糧運資儲仰此氣息所以兵壓漢口連結數州今若併軍圍郢又分兵前進魯山必阻沔路搤吾咽㗋搤於革翻咽因肩翻若糧運不通自然離散何謂持乆鄧元起近欲以三千兵徃取尋陽彼若懽然知機一説士足矣説輸芮翻脱距王師脱或也脱者未可必之辭固非三千兵所能下也進退無據未見其可西陽武昌取之即得然既得之即應鎮守欲守兩城不減萬人糧儲稱是卒無所出稱尺證翻卒讀曰猝脱東軍有上者上時掌翻以萬人攻兩城兩城勢不得相救若我分兵應援則首尾俱弱如其不遣孤城必陷一城既没諸城相次土崩天下大事去矣若郢州既拔席卷沿流卷讀曰捲西陽武昌自然風靡何遽分兵散衆自貽憂患乎且丈夫舉事欲清天步天步天路也詩云天步艱難况擁數州之兵以誅羣小懸河注火奚有不滅豈容北面請救戎狄以示弱於天下彼未必能信徒取醜聲此乃下計何謂上䇿蕭衍以計可謂有英雄之略矣卿為我輩白鎮軍前途攻取但以見付事在目中無患不㨗但借鎮軍靖鎮之耳蕭頴胄時為西臺尚書令盖加號鎮軍將軍為于偽翻下佑為同吳子陽等進軍武口武口武湖水出江之口水上通安陸之延頭今謂之沙武口張舜民曰武口在陽羅洑西北十餘里距汴京纔十八驛二廣湖湘皆由此而濟衍命軍主梁天惠等屯漁湖城唐脩期等屯白陽壘時築壘於白陽浦夾岸待之子陽進軍加湖茄考異曰梁韋叡傳作湖今從齊梁帝紀去郢三十里傍山帶水築壘自固子陽舉烽城内亦舉火應之而内外各自保不能相救會房僧寄病卒衆復推助防張樂祖代守魯山復扶又翻下篹復祐復同助防者使之助城主防守因以為稱樂祖即去年張冲所遣助房僧寄者參考前後張當作孫蕭頴胄之初起也弟頴孚自建康出亡廬陵民脩靈祐為之聚兵得二千人襲廬陵克之内史謝篹奔豫章篹蘇管翻頴胄遣寧朔將軍范僧簡自湘州赴之僧簡拔安成吳孫皓寳鼎二年分豫章廬陵長沙立安成郡時屬江州劉昫曰吉州安福縣吳置安成郡九域志安福縣在吉州西一百二十里頴胄以僧簡為安成太守以頴孚為廬陵内史東昏矦遣軍主劉希祖將三千人擊之南康太守王丹以郡應希祖南康今之贛州頴孚敗奔長沙尋病卒謝篹復還郡希祖攻拔安成殺范僧簡東昏矦以希祖為安成内史脩靈祐復合餘衆攻謝篹篹敗走東昏矦作芳樂苑樂音洛山石皆塗以五采望民家有好樹美竹則毁牆撤屋而徙之時方盛暑隨即枯萎朝暮相繼言徙樹竹者朝夕相繼也又於苑中立市使宮人宦者共為禆販禆益也買賤賣貴以自禆益故曰禆販以潘貴妃為市令東昏矦自為市録事小有得失妃則予杖予讀曰與乃敕虎賁不得進大荆實中荻大荆牡荆也俗謂之黄荆以為箠杖荻之實中者以箠人則重而痛楚虛中者差輕賁音奔又開渠立埭身自引船埭徒耐翻或坐而屠肉又好巫覡好呼到翻覡户狄翻左右朱光尚詐云見鬼東昏入樂遊苑人馬忽驚以問光尚對曰曏見先帝大嗔樂音洛先時為曏嗔昌真翻怒也不許數出數所角翻東昏大怒拔刀與光尚尋之既不見乃縛菰為高宗形菰音孤雕胡也一名蔣江南人呼為茭草北向斬之縣首苑門縣讀曰懸崔慧景之敗也巴陵王昭胄永新矦昭頴出投臺軍各以王矦還第心不自安昭胄昭頴投慧景事見上卷上年永新縣屬安成郡吳立竟陵王子良故防閤桑偃為梅蟲兒軍副與前巴西太守蕭寅謀立昭胄昭胄許事克用寅為尚書左僕射䕶軍許之以僕射領䕶軍將軍時軍主胡松將兵屯新亭寅遣人説之曰須昏人出須待也以帝昏狂斥指為昏人説式芮翻寅等將兵奉昭胄入臺閉城號令將即亮翻昏人必還就將軍但閉壘不應則三公不足得也松許諾會東昏新作芳樂苑經月不出遊偃等議募健兒百餘人從萬春門入突取之昭胄以為不可偃同黨王山沙慮事乆無成以事告御刀徐僧重寅遣人殺山沙於路吏於麝幐中得其事幐徒登翻囊可帶者曰幐山沙以盛麝香故曰麝幐猶今之香袋昭胄兄弟與偃等皆伏誅雍州刺史張欣泰與弟前始安内史欣時密謀結胡松及前南譙太守王靈秀直閤將軍鴻選等誅諸嬖倖廢東昏晉孝武帝僑立南譙郡於淮南五代志江都郡清流縣舊置南譙郡鴻姓也姓譜帝鴻氏之後或曰大鴻之後左傳衛有鴻聊魋雍於用翻嬖卑義翻又博計翻東昏遣中書舍人馮元嗣監軍救郢監工銜翻秋七月甲午茹法珍梅蟲兒及太子右率李居士制局監楊明泰送之中興堂宋孝武帝即位於新亭改新亭曰中興堂茹音如率所律翻欣泰等使人懐刀於座斫元嗣頭墜果柈中柈蒲官翻柈以盛果及魚肉又斫明泰破其腹蟲兒傷數創手指皆墮居士法珍等散走還臺靈秀詣石頭迎建康王寳寅建康王當作建安王帥城中將吏見力見力見在兵力也帥讀曰率見賢遍翻去車輪載寳寅文武數百唱警蹕向臺城百姓數千人皆空手隨之欣泰聞事作馳馬入宮冀法珍等在外東昏盡以城中處分見委表裏相應既而法珍得返處分閉門上仗不配欣泰兵鴻選在殿内亦不敢發寳寅至杜姥宅日已暝城門閉城上人射外人外人棄寳寅潰去寳寅亦逃三日乃戎服詣草市尉臺城六門之外各有草市置草市尉司察之去羌呂翻處昌呂翻分扶問翻上仗時掌翻射而亦翻尉馳以啟東昏東昏召寳寅入宮問之寳寅涕泣稱爾日不知何人逼使上車仍將去制不自由爾日猶言其日也上時掌翻東昏笑復其爵位張欣泰等事覺與胡松皆伏誅蕭衍使征虜將軍王茂軍主曹仲宗等乗水漲以舟師襲加湖鼓譟攻之丁酉加湖潰吳子陽等走免將士殺溺死者萬計將即亮翻俘其餘衆而還還從宣翻於是郢魯二城相視奪氣乙巳柔然犯魏邊魯山乏糧軍人於磯頭捕細魚供食磯居希翻沙聚成磧水所漸浸曰磯密治輕船將奔夏口治直之翻夏户雅翻蕭衍遣偏軍斷其走路斷音短丁巳孫樂祖窘迫以城降降户江翻下同己未東昏矦以程茂為郢州刺史薛元嗣為雍州刺史雍於用翻是日茂元嗣以郢城降郢城之初圍也士民男女近十萬口閉户二百餘日疾疫流腫流腫言毒氣流注而浮腫也近其郢翻死者什七八八考異曰齊張冲𫝊云死者七百家按死者不可以家數今從梁高祖紀及韋叡傳積尸牀下而寢其上比屋皆滿比毗至翻周禮五家為比取其相連比而居也又毗必翻次也茂元嗣等議出降降户江翻使張孜為書與衍張沖故吏青州治中房長瑜明帝時張沖為青冀二州刺史以房長瑜為治中謂孜曰前使君忠貫昊天郎君但當坐守畫一以荷析薪畫一用漢書語蕭何為法較若畫一曹參代之守而勿失此取守而勿失之義左傳曰其父析薪其子不克負荷荷下可翻又如字若天運不與當幅巾待命下從使君今從諸人之計非唯郢州士女失高山之望亦恐彼所不取也詩曰高山仰止注云有高徳則慕而仰之彼謂蕭衍孜不能用蕭衍以韋叡為江夏太守行郢府事夏户雅翻收瘞死者而撫其生者瘞於計翻郢人遂安諸將欲頓軍夏口衍以為宜乗勝直指建康車騎諮議參軍張𢎞䇿寧逺將軍庾域亦以為然衍命衆軍即日上道緣江至建康凡磯浦村落軍行宿次立頓處所𢎞䇿逆為圖畫如在目中郢魯未克蕭衍則違衆議駐兵漢口而不輕進圖萬全也郢魯既克衍遽督諸軍直指建康乗勝勢也逆為圖畫者畫緣江可立頓及次宿之地為圖使諸將按之以為進止上時掌翻辛酉魏大赦魏安國宣簡矦王肅卒於壽陽安國縣漢屬中山國晉魏屬博陵郡贈侍中司空初肅以父死非命王奐死見一百三十八卷武帝永明十一年四年不除䘮高祖曰三年之䘮賢者不敢過記檀弓子夏既除䘮而見予之琴和之而不和彈之而不成聲作而曰哀未忘也先王制禮而弗敢過也命肅以祥禫之禮除䘮朞而小祥再朞而大祥大祥之後中月而禫鄭氏曰祥吉也禫澹澹然平安之意禫徒感翻釋曰除服祭名然肅猶素服不聽樂終身汝南民胡文超起兵於灄陽沈約曰汝南大沙羡土晉末汝南郡民流寓夏口因立為汝南縣為江夏太守治所宋白曰晉汝南郡人流寓夏口因僑立汝南郡在潼口又為汝南縣晉末改為江夏縣荆湘記云金水北岸有汝南舊城是也晉惠帝世立灄陽縣晉書朱伺傳曰張昌之亂安陸人多附昌唯伺令其鄉人討之昌既滅伺部曲以逆順有嫌求别立縣遂從之分安陸東界立灄陽縣屬江夏郡灄書渉翻時汝南之地已入於魏蕭子顯齊志司州汝南郡寄治義陽以應蕭衍求取義陽安陸等郡以自効衍又遣軍主唐脩期攻隨郡晉武帝分南陽義陽立隨郡屬荆州宋孝武帝度屬郢州前廢帝永光元年改屬雍州明帝泰始五年改為隨陽郡還屬郢州後廢帝元徽四年度屬司州齊曰隨郡五代志隨州隨縣舊置隨郡皆克之司州刺史王僧景遣子為質於衍司部悉平司部謂司州所部諸郡質音致崔慧景之死也其少子偃為始安内史逃潜得免少詩照翻及西臺建以偃為寧朔將軍偃詣公車門上書曰臣竊惟高宗之孝子忠臣而昏主之亂臣賊子者江夏王與陛下先臣與鎮軍是也慧景既死江夏王寳𤣥併誅事見上卷上年夏户雅翻雖成敗異術而所由同方陛下初登至尊與天合符天下纎芥之屈尚望陛下申之况先帝之子陛下之兄所行之道即陛下所由哉此尚不恤其餘何冀今不可幸小民之無識而㒺之以非道欺人謂之罔若使曉然知其情節相帥而逃陛下將何以應之哉帥讀曰率事寢不報偃又上疏曰近冐陳江夏之寃非敢以父子之親而傷至公之義誠不曉聖朝所以然之意若以狂主雖狂實是天子江夏雖賢實是人臣先臣奉人臣逆人君為不可未審今之嚴兵勁卒直指象魏者象魏闕也其故何哉臣所以不死茍存視息人目不能視氣不復息則死矣非有他故所以待皇運之開泰申忠魂之枉屈今皇運已開泰矣而死社禝者反為賊臣臣何用此生於陛下之世矣臣謹案鎮軍將軍臣頴胄中領軍臣詳皆社禝之臣也同知先臣股肱江夏匡濟王室天命未遂主亡與亡而不為陛下瞥然一言瞥普蔑翻暫見也為于偽翻知而不言不忠不知而不言不智也如以先臣遣使江夏斬之則征東之驛使何為見戮陛下斬征東之使實詐山陽斬王天虎以詐山陽事見上卷上年使疏吏翻江夏違先臣之請實謀孔矜事亦見上卷上年天命有歸故事業不遂耳臣所言畢矣乞就湯鑊然臣雖萬没猶願陛下必申先臣何則惻愴而申之則天下伏不惻愴而申之則天下叛先臣之忠有識所知南董之筆千載可期南董謂齊南史晉董狐也崔杼弑齊莊公太史書曰崔杼弑其君崔子殺之其弟嗣書而死者二人其弟又書乃舍之南史氏聞太史盡死執簡以徃聞既書矣乃還晉趙盾弟穿弑靈公董狐以盾不討賊書曰趙盾弑其君以示於朝孔子曰董狐古之良史也書法不隱載子亥翻亦何待陛下屈申而為褒貶然小臣惓惓之愚為陛下計耳詔報曰具知卿惋切之懐今當顯加贈諡偃尋下獄死惓逵貟翻惋烏貫翻下遐嫁翻八月丁卯東昏矦以輔國將軍申胄監豫州事辛未以光禄大夫張瓌鎮石頭監工銜翻瓌古回翻初東昏矦遣陳伯之鎮江州以為吳子陽等聲援子陽等既敗蕭衍謂諸將曰用兵未必須實力所聽威聲耳今陳虎牙狼狽奔歸尋陽人情理當恟懼恟許拱翻可傳檄而定也乃命搜俘囚得伯之幢主蘇隆之幢傳江翻厚加賜與使説伯之許即用為安東將軍江州刺史即就也説式芮翻下同伯之遣隆之返命雖許歸附而云大軍未須遽下衍曰伯之此言意懐首䑕漢書田蚡曰首䑕兩端服䖍注云首䑕一前一卻也及其猶豫急徃逼之計無所出勢不得不降降户江翻乃命鄧元起引兵先下楊公則徑掩柴桑柴桑漢縣屬豫章郡晉屬武昌郡晉惠帝立尋陽郡冶柴桑五代志日江州湓城縣舊曰柴桑杜佑曰今尋陽縣南楚城驛舊柴桑縣也衍與諸將以次進路元起將至尋陽今江州徳化縣六朝之尋陽也伯之收兵退保湖口湖口彭蠡湖入江之口也今江州湖口縣即其地留陳虎牙守湓城選曹郎吳興沈瑀説伯之迎衍選須絹翻瑀音禹伯之泣曰余子在都不能不愛瑀曰不然人情匈匈毛晃曰匈匈喧擾之意漢書高帝紀天下匈匈勞苦又匈匈讙議之聲荀子居子不為小人之匈匈而易其行匈匈漢書無音荀子有平去二音皆思改計若不早圖衆散難合丙子衍至尋陽伯之束甲請罪初新蔡太守席謙蕭子顯齊志江州有南新蔡郡豫州有北新蔡郡以五代志考之北新蔡當置於今光州界父恭祖為鎮西司馬為魚復矦子響所殺事見一百三十七卷武帝永明八年復音腹謙從伯之鎮尋陽聞衍東下曰我家世忠貞有殞不二伯之殺之乙卯以伯之為江州刺史虎牙為徐州刺史魯休烈蕭璝破劉孝慶等於峽口任漾之戰死休烈等進至上明江陵大震蕭頴胄恐馳告蕭衍令遣楊公則還援根本衍曰公則今泝流上江陵雖至何能及事休烈等烏合之衆尋自退散正須少時持重耳上時掌翻少詩照翻良須兵力良信也兩弟在雍謂蕭偉總雍州事憺守壘城也雍於用翻指遣徃徵指謂上指徵徵兵也不為難至頴胄乃遣蔡道恭假節屯上明以拒蕭璝辛巳東昏矦以太子左率李居士總督西討諸軍事屯新亭左率左衛率也九月乙未詔蕭衍若定京邑得以便宜從事衍留驍騎將軍鄭紹叔守尋陽驍堅堯翻騎奇寄翻與陳伯之引兵東下謂紹叔曰卿吾之蕭何寇恂也漢高帝委蕭何以闗中光武任冦恂以河内使給餽餉事並見漢紀前途不㨗我當其咎糧運不繼卿任其責紹叔流涕拜辭比克建康比必利翻及也紹叔督江湘糧運未嘗乏絶魏司州牧廣陽王嘉請築洛陽三百二十三坊各方三百歩曰雖有暫勞姦盜永息丁酉詔𤼵畿内夫五萬人築之四旬而罷己亥魏立皇后于氏后征虜將軍勁之女勁烈之弟也自祖父栗磾以來于栗磾魏開國功臣磾丁奚翻累世貴盛一皇后四贈公三領軍二尚書令三開國公甲申東昏矦以李居士為江州刺史冠軍將軍王珍國為雍州刺史建安王寳寅為荆州刺史輔國將軍申胄監郢州龍驤將軍扶風馬仙琕監豫州冠古玩翻雍於用翻驤思將翻琕部田翻驍騎將軍徐元稱監徐州軍事珍國廣之之子也王廣之歷事高武明三帝是日蕭衍前軍至蕪湖申胄軍二萬人棄姑孰走衍進軍據之戊申東昏矦以後軍參軍蕭璝為司州刺史前輔國將軍魯休烈為益州刺史蕭衍之克江郢也東昏逰騁如舊謂茹法珍曰須來至白門前當一决騁丑郢翻茹音如須待也白門建康城西門也西方色白故以為稱一决言一戰以决勝負也衍至近道乃聚兵為固守之計簡二尚方二冶囚徒以配軍建康有左右二尚方東西二冶其不可活者於朱雀門内日斬百餘人衍遣曹景宗等進頓江寧沈約曰晉武帝太康元年分秣陵立臨江縣二年更名江寧其治所盖臨江濵金陵覽古云新亭去江寧十里丙辰李居士自新亭選精騎一千至江寧騎奇寄翻景宗始至營壘未立且師行日乆器甲穿弊居士望而輕之鼓譟直前薄之景宗奮擊破之因乗勝而前徑至皁莢橋於是王茂鄧元起呂僧珍進據赤鼻邏邏即佐翻新亭城主江道林引兵出戰衆軍擒之於陳陳讀曰陣衍至新林命王茂進據越城鄧元起據道士墩墩音敦陳伯之據籬門陳伯之盖據西籬門呂僧珍據白板橋據陶𢎞景書板橋時屬江寧縣界按板橋市今在建康府城之西江寧鎮北李居士覘知僧珍衆少帥鋭卒萬人直來薄壘覘丑亷翻又丑艶翻少詩照翻帥讀曰率僧珍曰吾衆少不可逆戰可勿遥射須至塹裏當併力破之俄而皆越塹㧞柵塹七艶翻僧珍分人上城矢石俱𤼵自帥馬歩三百人出其後城上復踰城而下内外奮擊居士敗走獲其器甲不可勝計上時掌翻復扶又翻下遐嫁翻勝音升居士請於東昏矦燒南岸邑屋以開戰場自大航以西新亭以北皆盡衍諸弟皆自建康自拔赴軍衍諸弟亡匿於建康里巷事見上卷上年冬十月甲戌東昏矦遣征虜將軍王珍國軍主胡虎牙將精兵十萬餘人陳於朱雀航南宦官王寳孫持白虎旛督戰開航背水以絶歸路衍軍小却王茂下馬單刀直前其甥韋欣慶執鐵纒矟以翼之鐵纒矟以鐵線纒矟把齊武陵王晃有銀纒矟將即亮翻陳讀曰陣下突陳同背蒲妹翻纒直彥翻矟色角翻衝擊東軍應時而陷曹景宗縱兵乗之呂僧珍縱火焚其營將士皆殊死戰鼓譟震天地珍國等衆軍不能抗王寳孫切罵諸將帥帥所類翻直閤將軍席豪發憤突陣而死豪驍將也既死士卒土崩赴淮死者無數積尸與航等後至者乗之而濟於是東昏矦諸軍望之皆潰據齊書云朱爵諸軍望之皆潰盖東昏矦自登朱爵門督戰也衍軍長驅至宣陽門諸將移營稍前陳伯之屯西明門西明門建康城西門也每城中有降人出伯之輒呼與耳語耳語附耳而語也降户江翻下同衍恐其復懐翻覆密語伯之曰聞城中甚忿卿舉江州降欲遣刺客中卿宜以為慮復扶又翻語牛倨翻中竹仲翻伯之未之信會東昏矦將鄭伯倫來降衍使伯倫過伯之謂曰城中甚忿卿欲遣信誘卿以封賞誘音酉須卿復降當生割卿手足卿若不降復欲遣刺客殺卿宜深為僃伯之懼自是始無異志蕭衍之使鄭伯倫此孫子五間所謂因間也須待也復扶又翻戊寅東昏寧朔將軍徐元瑜以東府城降青冀二州刺史桓和入援屯東宮己卯和詐東昏云出戰因以其衆來降光禄大夫張瓌棄石頭還宮李居士以新亭降於衍琅邪城主張木亦降壬午衍鎮石頭命諸軍攻六門東昏燒門内營署官府驅逼士民悉入宮城閉門自守衍命諸軍築長圍守之守式又翻與考異曰齊帝紀梁帝紀叙此事先後多不同按齊紀皆有甲子今用梁紀事以齊紀甲子次之楊公則屯領軍府壘北樓與南掖門相對嘗登樓望戰城中遥見麾盖以神鋒弩射之矢貫胡牀左右失色公則曰幾中吾脚談笑如初射而亦翻幾居依翻中竹仲翻東昏夜選勇士攻公則柵軍中驚擾公則堅臥不起徐命擊之東昏兵乃退公則所領皆湘州人素號怯懦城中輕之每出盪輒先犯公則壘公則奬厲軍士克獲更多先是東昏遣軍主左僧慶屯京口常僧景屯廣陵李叔獻屯𤓰歩及申胄自姑孰奔歸使屯破墩據梁書鄱陽王恢𫝊破墩即破岡在曲阿界秦始皇所鑿也先悉薦翻墩音敦以為東北聲援至是衍遣使曉諭皆帥其衆來降史言東昏唯孤城自守使疏吏翻帥讀曰率衍遣弟輔國將軍秀鎮京口輔國將軍恢鎮破墩從弟寧朔將軍景鎮廣陵景本名昺李延壽作南史避唐廟諱改昺為景通鑑因之十一月丙申魏以驃騎大將軍穆亮為司空驃匹妙翻騎奇寄翻丁酉以北海王詳為太傅領司徒初詳欲奪彭城王勰司徒勰音協故譛而黜之既而畏人議已故但為大將軍至是乃居之詳貴盛翕赫將作大匠王遇多隨詳所欲私以官物給之李延壽曰王遇本馮翊李潤鎮𦍑其先為𦍑中強族自云姓王後改為鉗耳氏至魏宣武時復改為王坐事腐刑累遷吏部尚書爵宕昌公司徒長史于忠責遇於詳前曰殿下國之周公阿衡王室阿衡謂如伊尹也鄭𤣥曰阿倚也衡平也伊尹湯所依倚以取平故以為官名所須材用自應闗㫖闗㫖謂闗上㫖也何至阿諛附勢損公惠私也遇既踧踖踧昌六翻踖資昔翻踧踖恭而不自安之貌詳亦慙謝忠毎以鯁直為詳所忿嘗罵忠曰我憂在前見爾死不憂爾見我死時也忠曰人生於世自有定分分扶問翻若應死於王手避亦不免若其不爾王不能殺忠以討咸陽王禧功封魏郡公遷散騎常侍兼武衛將軍散悉亶翻騎奇寄翻詳因忠表讓之際密勸魏主以忠為列卿令觧左右常侍武衛之職常在天子左右聽其讓爵於是詔停其封優進太府卿詳能以計疎于忠而不知高肇已制其後矣巴東獻武公蕭頴胄以蕭璝與蔡道恭相持不决憂憤成疾蕭頴胄以蕭衍東伐所向戰克而已輔南康居江陵近不能制蕭璝外無以服姦雄之心而内有肘掖之宼此其所以憂憤成疾璝古回翻壬午卒卒子恤翻夏矦詳祕之使似其書者假為敎命密報蕭衍衍亦祕之詳徵兵雍州蕭偉遣蕭憺將兵赴之璝等聞建康已危衆懼而潰璝及魯休烈皆降乃發頴胄䘮贈侍中丞相於是衆望盡歸於衍夏矦詳請與蕭憺共參軍國詔以詳為侍中尚書右僕射尋除使持節撫軍將軍荆州刺史詳固讓于憺乃以憺行荆州府州軍豈特衆望歸衍哉西臺之權又歸於憺矣憺徒敢翻又徒濫翻使疏吏翻魏改築圜丘於伊水之陽齊明帝建武二年魏孝文定圜丘於委粟山今改之水經伊水出南陽縣西荀渠山東北過陸渾新城縣又東北過伊闕中又東北至洛陽縣南而北入于洛魏盖立圜丘于洛陽之南伊水之北乙卯始祀於其上魏鎮南將軍元英上書曰蕭寳卷荒縱日甚虐害無辜卷讀曰捲其雍州刺史蕭衍東伐秣陵掃土興兵順流而下唯有孤城更無重衛此謂襄陽空虛也乃皇天授我之日曠世一逢之秋此而不乗將欲何待臣乞躬帥歩騎三萬直指沔隂襄陽在沔南水南為隂帥讀曰率據襄陽之城斷黒水之路斷丁管翻水經注黒水出南鄭北山南流入漢諸葛亮牋云朝𤼵南鄭暮宿黑水四五十里英盖謂得襄陽則梁州之路斷也昏虐君臣自相魚肉我居上流威震遐邇長驅南出進拔江陵則三楚之地一朝可收太史公曰楚有三俗自淮沛陳汝南南郡此西楚也彭城以東東海吳廣陵此東楚也衡山九江江南豫章長沙此南楚也岷蜀之道自成斷絶若取荆湘則岷蜀趣建康之道亦絶矣又命揚徐二州聲言俱舉魏揚州治壽陽徐州治彭城建業窮蹙魚游釡中可以齊文軌而大同混天地而為一伏惟陛下獨决聖心無取疑議此期脱爽爽差也并吞無日事寢不報車騎大將軍源懐上言蕭衍内侮寳巻孤危廣陵淮隂等戍皆觀望得失斯實天啟之期并吞之會宜東西齊舉以成席卷之勢若使蕭衍克濟上下同心豈唯後圖之難亦恐揚州危逼何則壽春之去建康纔七百里魏置揚州於壽春見上卷上年山川水陸皆彼所諳諳烏含翻彼若内外無虞君臣分定乗舟藉水倐忽而至未易當也分扶問翻易弋豉翻今寳卷都邑有土崩之憂邊城無繼援之望廓清江表正在今日魏主乃以任城王澄為都督淮南諸軍事鎮南大將軍開府儀同三司揚州刺史使為經略既而不果使魏從二臣之計畫江為境不待矦景之亂也任音壬懐賀之子也源賀秃髮傉檀之子入魏賜姓源氏東豫州刺史田益宗上表曰蕭氏亂常君臣交爭江外州鎮中分為兩謂西陽以西盡歸蕭衍歷陽以下猶屬建康也東西抗峙已淹歲時民庶窮於轉輸甲兵疲於戰鬪事救於目前力盡於麾下無暇外維州鎮綱紀庶方藩城棊立孤存而已不乗機電掃廓彼蠻疆恐後之經畧未易於此易以豉翻且壽春雖平三面仍梗鎮守之宜實須豫設義陽差近淮源利渉津要朝廷行師必由此道水經淮水出南陽平氏縣胎簮山東北過桐柏山又東逕義陽縣故曰義陽差近淮源淮源淺狹魏人行師以此地為利渉津要若江南一平有事淮外謂若蕭衍平定江南勢必用兵淮外須乗夏水汎長列舟長淮此謂江南用兵之常勢汎長知兩翻師赴壽春須從義陽之北此謂魏師赴壽春之路便是居我㗋要謂義陽也在慮彌深義陽之滅今實時矣度彼不過須精卒一萬二千度徒洛翻然行師之法貴張形勢請使兩荆之衆西擬隨雍兩荆謂魏置荆州於穰城東荆州於泚陽也隨雍謂隨郡襄陽也雍於用翻揚州之卒頓于建安得捍三闗之援然後二豫之軍直據南闗對抗延頭二豫謂魏置豫州於汝南東豫州於新息也南闗謂隂山闗延頭在安陸界遣一都督總諸軍節度季冬進師迄于春末不過十旬克之必矣曰考異益宗傳曰世宗納之遣元英攻義陽按英攻義陽在景明四年八月此表言蕭氏君臣交爭則是梁武攻東昏時盖益宗建䇿於今日而行於後年耳元英又奏稱今寳卷骨肉相殘藩鎮鼎立義陽孤絶密邇王土内無兵儲之固外無糧援之期此乃欲焚之鳥不可去薪去羌呂翻授首之㓂豈容緩斧若失此不取豈唯後舉難圖亦恐更為深患今豫州刺史司馬悦已戒嚴垂發東豫州刺史田益宗兵守三闗請遣軍司為之節度魏主乃遣直寢羊靈引為軍司直寢因直寢殿以為官稱益宗遂入㓂建寧太守黄天賜與益宗戰于赤亭宋有建寧左郡孝武大明八年省建寧左郡為建寧縣屬西陽郡後復為郡隋志黄州麻城縣舊置建寧郡又宋文帝元嘉二十五年以豫部蠻民置二十八縣赤亭其一也水經注舉水自湖陂城南流逕赤亭下謂之赤亭水西陽五水蠻赤亭其一也天賜敗績乙考異曰魏帝紀七月未田益宗破蕭寳卷將黄天賜於赤亭田益光傳景明初蕭衍遣軍主吳子陽帥衆㓂三闗益宗遣光城太守梅與之據長風城逆擊子陽大破之斬獲千餘級按吳子陽乃東昏將非衍將也且衍方與東昏相拒何暇㓂魏三闗此必益宗傳誤益光傳當作益宗傳崔慧景之逼建康也東昏矦拜蔣子文為假黄鉞使持節相國太宰大將軍録尚書事揚州牧鍾山王使疏吏翻及衍至又尊子文為靈帝迎神像入後堂使巫禱祀求福及城閉城中軍事悉委王珍國兖州刺史張稷入衛京師以稷為珍國之副稷瓌之弟也張瓌時為光禄大夫時城中實甲猶七萬人東昏素好軍陳與黄門刀敕及宮人於華光殿前習戰鬪詐作被創勢使人以板掆去用為猒勝好呼到翻陳讀曰陣被皮義翻創初良翻掆音岡猒於叶翻又於琰翻常於殿中戎服騎馬出入以金銀為鎧胄具裝飾以孔翠孔翠孔雀翡翠也鎧苦亥翻晝眠夜起一如平常聞外鼓呌聲被大紅袍登景陽樓屋上望之今建康法寳寺景陽樓故基也被皮義翻弩幾中之幾居依翻中竹仲翻始東昏與左右謀以為陳顯逹一戰即敗崔慧景圍城尋走謂衍兵亦然敕太官辦樵米為百日調而已調徒釣翻筭度也及大桁之敗衆情兇懼兇凶勇翻茹法珍等恐士民逃潰故閉城不復出兵復扶又翻既而長圍已立塹柵嚴固然後出盪屢戰不㨗塹工艶翻東昏尤惜金錢不肯賞賜法珍叩頭請之東昏曰賊來獨取我耶何為就我求物後堂儲數百具榜榜比朗翻木片也啟為城防東昏欲留作殿竟不與又督御府作三百人精仗待圍觧以擬屏除屏必郢翻金銀雕鏤雜物倍急于常衆皆怨怠不為致力外圍既乆城中皆思早亡莫敢先發茹法珍梅蟲兒説東昏曰鏤盧矦翻為于偽翻説式芮翻大臣不留意使圍不觧宜悉誅之王珍國張稷懼禍珍國密遣所親獻明鏡於蕭衍衍斷金以報之鏡所以照物獻鏡者欲衍照其心也易大傳曰二人同心其利斷金故衍取以為報斷丁亂翻王肅丁管翻兖州中兵參軍張齊稷之腹心也珍國因齊密與稷謀同弑東昏齊夜引珍國就稷造膝定計造七到翻造至也對席而坐兩下促席俱前至膝以定密謀故曰造膝定計齊自執燭又以計告後閤舍人錢強後閤舍人盖江左所置使主殿後閤者也按後閤舍人常在宮中觀徐龍駒事可見十二月丙寅夜強密令人開雲龍門珍國稷引兵入殿御刀豐勇之為内應豐勇之右衛軍人為東昏所委任姓譜豐姓鄭七穆子豐之後東昏在含徳殿作笙歌寢未熟聞兵入趨出北户欲還後宮門已閉宦者黄泰平刀傷其膝仆地張齊斬之東昏時年十九稷召尚書右僕射王亮等列坐殿前西鍾下令百僚署牋以黄油裹東昏首黄絹施油可以禦雨謂之黄油以黄油裹物表可見裏盖欲蕭衍易於審視也遣國子博士范雲等送詣石頭曰考異南史王亮傳曰張稷等議立湘東嗣王寳晊領軍王瑩曰城閉已乆人情離觧征東在近何不諮問按時和帝已立稷等知建康不可守故弑東昏豈敢復議立寳晊今從齊紀右衛將軍王志嘆曰冠雖弊何可加足取庭中樹葉挼服之挼奴禾翻兩手相切摩也今俗語云挼莎偽悶不署名衍覽牋無志名心嘉之亮瑩之從弟志僧虔之子也王瑩蕭衍引為相國左長史王僧虔齊初位登台司衍與范雲有舊衍與雲同遊竟陵西邸見一百三十六卷武帝永明二年即留參帷幄王亮在東昏朝以依違取容蕭衍至新林百僚皆間道送欵朝直遥翻間古莧翻亮獨不遣東昏敗亮出見衍衍曰顛而不扶安用彼相亮曰若其可扶明公豈有今日之舉論語孔子曰危而不持顛而不扶則將焉用彼相矣衍引以詰王亮城中出者或被刧剥楊公則親帥麾下陳於東掖門衛送公卿士民故出者多由公則營焉被皮義翻帥讀曰率衍使張𢎞䇿先入清宮封府庫及圖籍於時城内珍寳委積𢎞䇿禁勒部曲秋毫無犯收潘妃及嬖臣茹法珍梅蟲兒王喧之等四十一人皆屬吏陳讀曰陣茹音如喧况晚翻屬之欲翻初海陵王之廢也事見一百三十九卷明帝建武元年王太后出居鄱陽王故第號宣徳宮乙巳蕭衍以宣徳太后令追廢涪陵王為東昏矦涪音浮禇后及太子誦並為庶人以衍為中書監大司馬録尚書事驃騎大將軍揚州刺史封建安郡公依晉武陵王遵承制故事百僚致敬不待西臺詔命而以宣徳太后令高自署置蕭衍之心路人所知也豈必待范雲沈約𤼵其端哉武陵王遵事見一百一十三卷晉安帝元興三年以王亮為長史壬申更封建安王寳寅為鄱陽王更工衡翻癸酉以司徒揚州刺史晉安王寳義為太尉領司徒己卯衍入屯閲武堂下令大赦又下令凡昏制謬賦淫刑濫役外可詳檢前原悉皆除盪原南史作源前源謂日前興事之源也盪字作蕩音徒朗翻其主守散失諸所損耗精立科條咸從原例原赦也守式又翻又下令通檢尚書衆曹東昏時諸諍訟失理諍讀曰爭及主者淹停不時施行者精加訊辯依事議奏訊問也王制三訊然後制刑辯别白也左傳曰子辭君必辯焉辯兵免翻又下令收葬義師瘞逆徒之死亡者瘞一計翻潘妃有國色衍欲留之以問侍中領軍將軍王茂茂曰亡齊者此物留之恐貽外議乃縊殺於獄并誅嬖臣茹法珍等縊於賜翻又於計翻嬖卑義翻又博計翻茹音如以宮女二千分賚將士賚洛代翻乙酉以輔國將軍蕭宏為中䕶軍衍之東下也豫州刺史馬仙琕擁兵不附衍琕部田翻衍使其故人姚仲賔説之説輸芮翻仙琕先為設酒乃斬於軍門以徇衍又遣其族叔懐逺説之仙琕曰大義滅親又欲斬之軍中為請乃得免説式芮翻為于偽翻衍至新林仙琕猶於江西日抄運船豫州治歷陽在大江之西抄楚交翻衍圍宮城州郡皆遣使請降使疏吏翻降户江翻吳興太守袁昂獨拒境不受命昂顗之子也袁顗死於義嘉之難衍使駕部郎考城江革曹魏置二十三郎駕部其一也杜佑曰宋齊駕部屬左民尚書為書與昂曰根本既傾枝葉安附今竭力昏主未足為忠家門屠滅非所謂孝豈若翻然改圖自招多福昂復書曰三吳内地非用兵之所况以偏隅一郡何能為役自承麾斾届止莫不膝袒軍門膝袒謂膝行肉袒也唯僕一人敢後至者政以内揆庸素文武無施雖欲獻心不增大師之勇置其愚黙寧沮衆軍之威沮在呂翻幸藉將軍含𢎞之大可得從容以禮竊以一餐微施尚復投殞從千容翻施式豉翻投殞言投命殞身也復扶又翻况食人之禄而頓忘一旦非唯物議不可亦恐明公鄙之所以躊躇未遑薦璧薦璧謂銜璧而降也薦進也昂問時事於武康令北地傅暎吳分烏程餘杭立永安縣晉武帝太康元年更名武康屬吳興郡暎曰昔元嘉之末開闢未有故太尉殺身以明節袁淑贈太尉淑死見一百二十七卷宋文帝元嘉三十年司徒當寄託之重理無茍全所以不顧夷險以徇名義司徒謂昂父顗也顗死見一百三十一卷宋明帝泰始二年今嗣主昏虐曾無悛改荆雍協舉乗據上流悛丑縁翻雍於用翻天人之意可知願明府深慮無取後悔及建康平衍使豫州刺史李元履廵撫東土敕元履曰袁昂道素之門世有忠節即謂淑顗也天下須共容之勿以兵威陵辱元履至吳興宣衍㫖昂亦不請降開門撤僃而已仙琕聞臺城不守號泣謂將士曰我受人任寄義不容降君等皆有父母我為忠臣君為孝子不亦可乎乃悉遣城内兵出降餘壯士數十閉門獨守俄而兵入圍之數十重號户刀翻重直用翻仙琕令士皆持滿兵不敢近近其靳翻日暮仙琕乃投弓曰諸君但來見取我義不降乃檻送石頭衍釋之使待袁昂至俱入曰令天下見二義士衍謂仙琕曰射鉤斬袪昔人所美卿勿以殺使斷運自嫌斷音短仙琕謝曰小人如失主犬後主飼之則復為用矣飼祥吏翻復扶又翻又如字衍笑皆厚遇之丙戌蕭衍入鎮殿中劉希祖既克安成移檄湘部始興内史王僧粲應之僧粲自稱湘州刺史引兵襲長沙去城百餘里於是湘州郡縣兵皆蜂起以應僧粲唯臨湘湘隂瀏陽羅四縣尚全臨湘羅二縣自漢以來屬長沙郡吳立瀏陽縣亦屬長沙宋蒼梧王元徽二年分益陽湘西羅及巴峽流民立湘隂縣屬湘東郡隋改臨湘為長沙縣潭州治所也唐廢羅縣入湘隂屬岳州瀏陽今仍屬潭州瀏音留又音柳長沙人皆欲汎舟走行事劉坦悉聚其舟焚之遣軍主尹法略拒僧粲戰數不利數所角翻前湘州鎮軍鍾𤣥紹按當時州府官屬無鎮軍之稱此必梁書之誤潜結士民數百人刻日翻城應僧粲坦聞其謀陽為不知因理訟至夜而城門遂不閉以疑之𤣥紹未𤼵明旦詣坦問其故坦乆留與語密遣親兵收其家書𤣥紹在坐而收兵已報具得其文書本末𤣥紹即首服坐徂臥翻下於坐同首手又翻於坐斬之焚其文書餘黨悉無所問衆愧且服州郡遂安法略與僧粲相持累月建康城平楊公則還州僧粲等散走王丹為郡人所殺王丹先以南康應劉希祖劉希祖亦舉郡降公則克己亷慎輕刑薄賦頃之湘州户口幾復其舊幾居依翻資治通鑑卷一百四十四
