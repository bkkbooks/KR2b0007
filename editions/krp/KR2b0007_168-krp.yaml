front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百六十八宋司馬光撰胡三省音註陳紀二起上章執徐盡𤣥黓敦牂凡三年世祖文皇帝上諱蒨字子華髙祖兄始興王道譚之長子天嘉元年春正月癸丑朔大赦改元齊大赦改元乾明辛酉上祀南郊齊髙陽王湜以滑稽便辟有寵於顯祖湜常職翻史記索隠曰滑謂亂也稽同也以言辯㨗之人言非若是言是若非能亂同異也楚辭將突梯滑稽如脂如韋崔浩云滑音骨稽流酒器也轉注吐酒終日不已言出口成章詞不空竭若滑稽之吐酒故楊雄酒賦云鴟夷滑稽腹如大壺盡日盛酒人復藉沽是也又姚察云滑稽猶俳諧也滑讀如字稽音計以其言語滑利智計㨗出故云滑稽也尹焞曰便辟足恭也朱元晦曰便辟謂習於威儀而不直便毘連翻辟匹亦翻常在左右執杖以撻諸王太皇太后深銜之及顯祖殂湜有罪太皇太后杖之百餘癸亥卒辛未上祀北郊齊主自晉陽還至鄴二月乙未髙州刺史紀機自軍所逃還宣城軍所侯瑱軍前也據郡應王琳涇令賀當遷討平之王琳至柵口柵口在濡須口之東水導巢湖今謂之柵江口宋白曰廬州東南至柵口三百九十里今謂之新婦口侯瑱督諸軍出屯蕪湖瑱他甸翻又音鎮相持百餘日東關春水稍長長知两翻舟艦得通琳引合肥漅湖之衆舳艫相次而下艦戶黯翻漅音巢又子小翻舳艫音逐盧軍勢甚盛瑱進軍虎檻洲琳亦出船列於江西隔洲而泊明日合戰琳軍少却退保西㟁少詩沼翻及夕東北風大起吹其舟艦並壊沒於沙中浪大不得還浦及旦風静琳入浦治船治直之翻瑱等亦引軍退入蕪湖周人聞琳東下遣都督荆襄等五十二州諸軍事荆州刺史史寜將兵數萬乘虛襲郢州孫瑒嬰城自守去年王琳東下留孫瑒守郢州將即亮翻瑒雉杏翻又音暢琳聞之恐其衆潰乃帥舟師東下去蕪湖十里而泊擊柝聞於陳軍帥讀曰率柝他各翻聞音問齊儀同三司劉伯球將兵萬餘人助琳水戰行臺慕容恃德之子子㑹將鐵騎二千屯蕪湖西㟁為之聲勢騎奇寄翻丙申瑱令軍中晨炊蓐食以待之時西南風急琳自謂得天助引兵直趣建康趣七喻翻瑱等徐出蕪湖躡其後西南風翻為瑱用琳擲火炬以燒陳船皆反燒其船逆風而用火攻此王琳所以敗也瑱發拍以擊琳艦戰船前後置拍竿以拍敵船又以牛皮冒蒙衝小船以觸其艦并鎔鐵灑之琳軍大敗軍士溺死者什二三溺奴狄翻餘皆棄船登㟁為陳軍所殺殆盡齊歩軍在西㟁者自相蹂踐並陷於蘆荻泥淖中蹂人九翻踐慈演翻淖奴敎翻濘泥也騎皆棄馬脫走得免者什二三擒劉伯球慕容子㑹斬獲萬計盡收梁齊軍資器械琳乘舴艋冒陳走舴陟格翻艋音猛陳讀曰陣至湓城欲收合離散衆無附者乃與妻妾左右十餘人奔齊先是琳使侍中袁泌先悉薦翻泌毘必翻又兵媚翻考異曰北齊書作長史袁泌今從陳書御史中丞劉仲威侍衞永嘉王莊及敗左右皆散泌以輕舟送莊達於齊境拜辭而還遂來降還從宣翻又如字降戶江翻下同仲威奉莊奔齊泌昻之子也袁昻著名節於齊梁之間樊猛及其兄毅帥部曲来降自此江南皆為陳有矣帥讀曰率齊葬文宣皇帝於武寜陵廟號髙祖後改曰顯祖戊戌詔衣冠士族將帥戰兵陷在王琳黨中者皆赦之隨材銓叙將即亮翻帥所類翻己亥齊以常山王演為太師錄尚書事此鄴省尚書也以長廣王湛為大司馬并省錄尚書事晉陽并州故曰并省并必經翻以尚書左僕射平秦王歸彥為司空趙郡王叡為尚書左僕射詔諸元良口配没入官及賜人者並縱遣去年齊顯祖夷諸元没其家口今縱遣良口奴婢仍不縱也乙巳以太尉侯瑱都督湘巴等五州諸軍事鎮湓城齊顯祖之喪常山王演居禁中䕶喪事婁太后欲立之而不果太子即位乃就朝列朝直遙翻以天子諒隂詔演居東館東館盖在鄴宮昭陽殿東欲奏之事皆先咨决楊愔等以演與長廣王湛位地親逼恐不利於嗣主心忌之居頃之演出歸第曰考異北齊書孝昭紀云除太傅錄尚書朝政皆决於帝月餘乃居藩邸今從楊愔傳藩邸常山第也自是詔敕多不關預或謂演曰鷙鳥離巢必有探卵之患離力智翻探吐南翻今日王何宜屢出中山太守陽休之詣演演不見休之謂王友王晞曰昔周公朝讀百篇書夕見七十士猶恐不足錄王何所嫌疑乃爾拒絶賔客演以常山王錄尚書事故稱為錄王先是顯祖之世羣臣人不自保先悉薦翻及濟南王立濟子禮翻演謂王晞曰一人垂拱吾曹亦保優閒因言朝廷寛仁真守文良主晞曰先帝時東宫委一胡人傅之今春秋尚富驟覽萬機殿下宜朝夕先後先悉薦翻後戶遘翻親承音旨而使他姓出納詔命大權必有所歸殿下雖欲守藩其可得耶借令得遂冲退自審家祚得保靈長乎家祚猶云國祚也演以叔父之親與國同休等戚故言家祚王晞勸常山傾大宗其来乆矣演黙然乆之曰何以處我處昌吕翻晞曰周公抱成王攝政七年然後復子明辟惟殿下慮之演曰我何敢自比周公晞曰殿下今日地望欲不為周公得邪演不應顯祖常遣胡人康虎兒保䕶太子故晞言及之齊主將發晉陽發晉陽者嗣位而詣鄴時議謂常山王必當留守根本之地髙歡建大丞相府於晉陽文宣席之以移魏鼎宿將勁兵咸在焉故以為根本之地執政欲使常山王從帝之鄴留長廣王鎮晉陽既而又疑之乃敕二王俱從至鄴外朝聞之莫不駭愕朝直遙翻又敕以王晞為并州長史演既行晞出郊送之演恐有覘察覘丑亷翻又丑艶翻命晞還城執晞手曰努力自慎躍馬而去平秦王歸彥總知禁衞楊愔宣敕留從駕五千兵於西中晉陽在鄴西故謂之西中從才用翻隂僃非常至鄴數日歸彥乃知之由是怨愔領軍大將軍可朱渾天和道元之子也可朱渾道元自隴右歸髙歡北考異曰典畧云道元弟今從齊書尚帝姑東平公主齊主之姑則髙歡之女也每曰若不誅二王少主無自安之理少詩照翻燕子獻謀處太皇太后於北宫燕因肩翻鄴城有北宫處昌吕翻使歸政皇太后又自天保八年已來爵賞多濫楊愔欲加澄汰以水為諭也澄者去泥滓汰者去砂石乃先自表解開府及開封王諸叨竊恩榮者皆從黜免由是嬖寵失職之徒盡歸心二叔演湛皆齊主之叔平秦王歸彥初與楊燕同心既而中變盡以疎忌之迹告二王侍中宋欽道弁之孫也宋弁見任於魏孝文帝顯祖使在東宫敎太子以吏事欽道面奏帝稱二叔威權既重宜速去之去羌吕翻帝不許曰可與令公共詳其事楊愔時為尚書令故稱之為令公愔等議出二王為刺史以帝慈仁恐不可所奏乃通啓皇太后具述安危宫人李昌儀昌儀意亦内職而北史后妃傳無之盖太后女官之名髙仲密之妻也髙仲宻因妻而外叛事見一百五十八卷梁武帝大同九年李太后以其同姓甚相昵愛昵尼質翻以啓示之昌儀宻啓太皇太后史言謀及婦人之禍愔等又議不可令二王俱出乃奏以長廣王湛鎮晉陽以常山王演錄尚書事二王既拜職乙巳於尚書省大㑹百僚愔等將赴之散騎常侍兼中書侍郎鄭頥止之散悉亶翻騎奇寄翻曰事未可量不宜輕脫量音良愔曰吾等至誠體國豈常山拜職有不赴之理長廣王湛旦伏家僮數十人於錄尚書後室錄尚書後室錄尚書者宴息之所仍與席上勲貴賀㧞仁斛律金等數人相知約曰行酒至愔等我各勸雙盃彼必致辭我一曰執酒二曰執酒三曰何不執爾軰即執之及宴如之愔大言曰諸王反逆欲殺忠良邪尊天子削諸侯赤心奉國何罪之有常山王演欲緩之湛曰不可於是拳杖亂毆毆烏口翻愔及天和欽道皆頭面血流各十人持之燕子獻多力頭又少髪少詩沼翻狼狽排衆走出門斛律光逐而擒之子獻歎曰丈夫為計遲遂至於此使太子太保薛孤延等執頥於尚藥局五代志尚藥局總知御藥事屬門下省後齊制也頥曰不用智者言至此豈非命也二王與平秦王歸彥賀㧞仁斛律金擁愔等唐突入雲龍門唐突廣韻作傏􅀈不遜也今時謂千乘輿者為唐突見都督叱利騷招之不進使騎殺之叱利虜複姓開府儀同三司成休寜抽刃呵演演使歸彥諭之休寜厲聲不從歸彥乆為領軍素為軍士所服皆弛仗休寜方歎息而罷演入至昭陽殿湛及歸彥在朱華門外後齊禁中有朱華閤門下省領左右局領左右二人掌知朱華閤内諸事宣傳已下白衣齋子已上皆主之又有左右直長四人朱華閤以外左右衞將軍各一人主之各武衞將軍二人貳之御仗屬官直盪屬官直衞屬官直突屬官直閤屬官皆屬焉分為左右廂帝與太皇太后並出太皇太后之下疑當更有皇太后三字太皇太后坐殿上皇太后及帝側立演以塼叩頭塼朱緣翻範土為塼陶而成之進言曰臣與陛下骨肉至親楊遵彥等欲獨擅朝權楊愔字遵彥朝直遙翻威福自已自王公已下皆重足屏氣重直龍翻屛必郢翻共相唇齒以成亂階若不早圖必為宗社之害臣與湛為國事重為於偽翻賀㧞仁斛律金惜獻武皇帝之業共執遵彥等入宫未敢刑戮專輒之罪誠當萬死時庭中及兩廡衞士二千餘人皆被甲待詔被皮義翻武衞娥永樂武力絶倫素為顯祖所厚叩刀仰視娥姓也後魏有娥清樂音洛叩刀者㧞刀離鞘纔寸許考異曰北齊書作領軍劉桃枝今從北史帝不睨之睨研計翻邪視也帝素吃訥吃音訖吃訥之由見上卷武帝永定三年倉猝不知所言太皇太后令却仗不退又厲聲曰奴軰即今頭落乃退衞士被甲者皆退當未退之時使宇文覺處之常山長廣身首分矣永樂内刀而泣太皇太后因問楊郎何在賀㧞仁曰一眼已出太皇太后愴然曰楊郎何所能為留使豈不佳邪楊愔主壻故謂之楊郎留使留之以任使愴初亮翻乃讓帝曰此等懐逆欲殺我二子演湛皆太皇太后之子次將及我爾何為縱之帝猶不能言太皇太后怒且悲曰豈可使我母子受漢老嫗斟酌婁太后鮮卑也李太后華族也故云然嫗威遇翻太后拜謝太皇太后又為太后誓言演無異志但欲去逼而已逼謂楊愔等以疏踰戚故欲去之為於偽翻下敢為同去羌吕翻演叩頭不止太后謂帝何不安慰爾叔帝乃曰天子亦不敢為叔惜况此漢軰但匄兒命兒自下殿去此屬任叔父處分處昌吕翻分扶問翻遂皆斬之楊愔受託孤之寄不能尊主庇身者鮮卑之勢素盛華人不足以制之也長廣王湛以鄭頥昔嘗讒已楊愔傳云湛以頥昔讒已作詔書先㧞其舌截其手而殺之演令平秦王歸彥引侍衞之士向華林園鄴都華林園魏武之舊也以京畿軍士入守門閤髙歡遷魏主於鄴而身居晉陽以其子為京畿大都督防遏内外故有京畿軍士斬娥永樂於園太皇太后臨愔喪哭曰楊郎忠而獲罪婁后此言出於人心是非之真也以御金為之一眼御金御府之金也親内之曰以表我意演亦悔殺之於是下詔罪狀愔等且曰罪止一身家屬不問頃之復簿錄五家楊愔可朱渾天和燕子獻宋欽道鄭頥凡五家復扶又翻王晞固諫乃各没一房孩㓜盡死兄弟皆除名以中書令趙彥深代楊愔總機務鴻臚少卿陽休之私謂人曰將渉千里殺騏驎而䇿蹇驢可悲之甚也馬黑脊曰騏驎毛晃曰馬青驪色曰騏驎東方朔傳騏驎騄駬蜚鳴驊騮天下良馬也驎力珍翻戊申演為大丞相都督中外諸軍錄尚書事自後魏敬宗以爾朱榮為大丞相後髙歡復為之位絶羣后威權震主湛為太傅京畿大都督段韶為大將軍平陽王淹為太尉平秦王歸彥為司徒彭城王浟為尚書令浟夷周翻江陵之陷也見一百六十五卷梁元帝承聖三年長城世子昌武帝封長城公昌為世子及中書侍郎頊皆没於長安髙祖即位屢請之於周周人許而不遣髙祖殂周人乃遣昌還髙祖存而不遣髙祖殂而遣還欲以間陳使兄弟爭國也以王琳之難居於安陸王琳據中流昌還建康路梗故居安陸難乃旦翻琳敗昌發安陸將濟江致書於上辭甚不遜上不懌召侯安都從容謂曰從千容翻太子將至須别求一藩為歸老之地安都曰自古豈有被代天子被皮義翻臣愚不敢奉詔因請自迎昌於是羣臣上表請加昌爵命庚戌以昌為驃騎將軍湘州牧驃匹妙翻騎奇寄翻封衡陽王齊大丞相演如晉陽既至謂王晞曰演從少帝還鄴晞為并州長史留晉陽不用卿言幾至傾覆今君側雖清終當何以處我幾居依翻處昌吕翻下出處同晞曰殿下往時位地猶可以名教出處今日事勢遂關天時非復人理所及晞勸演簒史䆒言之復扶又翻演奏趙郡王叡為長史王晞為司馬三月甲寅詔軍國之政皆申晉陽稟大丞相䂓算詔演志也周軍初至郢州助防張世貴舉外城以應之所失軍民三千餘口周人起土山長梯晝夜攻之因風縱火燒其内城南面五十餘樓孫瑒兵不滿千人身自撫循行酒賦食士卒皆為之死戰周人不能克史言千人一心雖大敵不能克郢人之死戰不下者畏江陵之俘戮也為於偽翻乃授瑒柱國郢州刺史封萬户郡公瑒偽許以緩之而潛脩戰守之備一朝而具乃復拒守復扶又翻既而周人聞王琳敗陳兵將至乃解圍去瑒集將佐謂之曰吾與王公同奬梁室勤亦至矣今時事如此豈非天乎遂遣使奉表舉中流之地來降將即亮翻使疏吏翻降戶江翻王琳之東下也帝徵南川兵江州刺史周廸髙州刺史黄法氍帥舟師將赴之熊曇朗據城列艦塞其中路熊曇朗時據豫章氍巨俱翻帥讀曰率曇徒含翻艦戶黯翻塞悉則翻廸等與周敷共圍之琳敗曇朗部衆離心廸攻㧞其城虜男女萬餘口曇朗走入村中村民斬之丁巳傳首建康盡滅其族齊軍先守魯山戊午棄城走詔南豫州刺史程靈洗守之甲子置沅州武州梁置武州於武陵帝分荆州之義陽天門郡郢州之武陵郡置武州督沅州領武陵太守治武陵郡其都尉所部六縣為沅州别置通寜郡以刺史領太守治都尉城省舊都尉沅音元以右衞將軍吳明徹為武州刺史以孫瑒為湘州刺史瑒懐不自安固請入朝史言孫瑒能自全朝直遙翻徵為中領軍未拜除吳郡太守壬申齊封世宗之子孝珩為廣寜王珩音行長恭為蘭陵王甲戌衡陽獻王昌入境詔主書舍人緣道迎候主書及中書舍人皆當時要近之職也丙子濟江中流殞之使以溺告溺奴狄翻侯安都以功進爵清逺公以殺昌之功也五代志南海郡翁源縣陳置清逺郡初髙祖遣滎陽毛喜從安成王頊詣江陵梁世祖以喜為侍郎沒於長安與昌俱還因進和親之䇿上乃使侍中周𢎞正通好於周好呼到翻夏四月丁亥立皇子伯信為衡陽王奉獻王祀昌諡曰獻周世宗明敏有識量晉公䕶憚之使膳部中大夫李安寘毒於糖䭔而進之周禮有膳夫唐六典紀前世官制沿革以後周之典庖中士為唐太官署令之職肴藏中士為珍羞署令之職掌醢中士為掌醢署令之職獨不言膳部中大夫以類推之則後周之膳部中大夫唐光祿卿之職也杜佑通典後周膳部中大夫屬冢宰六命又有膳部下大夫五命䭔都囘翻丸餅也江陵未敗時梁將陸法和有道術先具大䭔薄餅及江陵陷梁人入魏果見䭔餅盖北食也今城市間元宵所賣焦䭔即其物但較小耳糖出南方煎蔗為之絶甘帝頗覺之庚子大漸口授遺詔五百餘言且曰朕子年㓜未堪當國魯公朕之介弟杜預曰介大也寛仁大度海内共聞能𢎞我周家必此子也𢎞大也世宗之知武帝史所謂明敏有識孰大於此辛丑殂年二十七魯公㓜有器質特為世宗所親愛朝廷大事多與之參議性深沈有逺識沈持林翻非因顧問終不輒言世宗每歎曰夫人不言言必有中引論語孔子之言夫音扶中竹仲翻壬寅魯公即皇帝位諱邕字彌羅突安定公泰之第四子也大赦五月壬子齊以開府儀同三司劉洪徽為尚書右僕射侯安都父文捍為始興内史卒官卒官卒於官也卒子恤翻上迎其母還建康母固求停鄉里乙卯為置東衡州梁先已置東衡州於始興盖中廢而今復置也為於偽翻以安都從弟曉為刺史從才用翻安都子袐纔九歲上以為始興内史並令在鄉侍養以安都能定䇿以安國家故寵之養余亮翻六月壬辰詔葬梁元帝於江寜梁敬帝太平二年周人歸元帝之柩於王琳琳敗陳人乃得而葬之車旗禮章悉用梁典齊人收永安上黨二王遺骨葬之齊二王死見上卷武帝永定二年敕上黨王妃李氏還第馮文洛尚以故意脩飾詣之妃盛列左右立文洛於階下數之曰遭難流離數所具翻難乃旦翻以至大辱志操寡薄不能自盡言不能自殺也幸蒙恩詔得反藩闈藩闈言藩王之閨闈也汝何物奴猶欲見侮杖之一百血流灑地秋七月丙辰封皇子伯山為鄱陽王齊丞相演以王晞儒緩恐不允武將之意將即亮翻每夜載入晝則不與語嘗進晞宻室謂曰比王侯諸貴每見敦廹比毘至翻言我違天不祥恐當或有變起吾欲以法繩之何如晞曰朝廷比者疎逺親戚殿下倉猝所行非復人臣之事芒刺在背用漢霍光事逺於願翻復扶又翻上下相疑何由可乆殿下謙退粃糠神器實恐違上元之意上元天也墜先帝之基先帝謂髙歡演曰卿何敢發此言須致卿於法晞曰天時人事皆無異謀是以敢冒犯斧鉞抑亦神明所贊耳演曰拯難匡時難乃旦翻方俟聖哲吾何敢私議幸勿多言丞相從事中郎陸杳將出使使疏吏翻握晞手使之勸進晞以杳言告演演曰若内外咸有此意趙彥深朝夕左右何故初無一言史言演非不欲簒特覘衆心晞乃以事隙宻問彥深事隙公事之隙少暇之時也彥深曰我比亦驚此聲論聲論謂輿論皆歸演聲滿朝野也比毘至翻每欲陳聞則口噤心悸噤其禁翻悸其季翻弟既發端吾亦當昧死一披肝膽因共勸演演遂言於太皇太后趙道德曰相王不效周公輔成王演為丞相故呼之為相王演於齊主居親親之地猶周公之於成王而不能以周公自任故趙道德責之而欲骨肉相奪不畏後世謂之簒邪太皇太后曰道德之言是也未幾幾居豈翻演又啓云天下人心未定恐奄忽變生須蚤定名位太皇太后乃從之八月壬午太皇太后下令廢齊主為濟南王出居别宫濟子禮翻以常山王演入纂大統且戒之曰勿令濟南有他也為演殺濟南王太后怒張本肅宗即皇帝位於晉陽諱演字延安勃海王歡第六子文宣帝之母弟也大赦改元皇建太皇太后還稱皇太后皇太后稱文宣皇后宫曰昭信乙酉詔紹封功臣禮賜耆老延訪直言褒賞死事追贈名德帝謂王晞曰卿何為自同外客畧不可見自今假非局司但有所懐隨宜作一牒毛晃曰牒書板小簡也候少隙即徑進也少隙言少有間隙也少詩沼翻因敕與尚書陽休之鴻臚卿崔劼等三人臚陵如翻劼邱八翻每日職務罷並入東廊共舉録厯代禮樂職官及田市徵稅或不便於時而相承施用或自古為利而於今廢墜或道德髙儁乆在沈淪沈持林翻下沈敏同或巧言眩俗妖邪害政者悉令詳思以漸條奏朝晡給御食畢景聽還景日景日入而後聽還私舍故云畢景聽還妖於驕翻晡奔謨翻帝識度沈敏少居臺閣明習吏事即位尤自勤勵大革顯祖之弊時人服其明而譏其細人君而親小事為細所謂元首叢脞也少詩照翻嘗問舍人裴澤在外議論得失澤率爾對曰陛下聰明至公自可逺侔古昔而有識之士咸言傷細帝王之度頗為未宏帝笑曰誠如卿言朕初臨萬機慮不周悉故致爾耳顔之推曰如是為爾而已為耳此事安可乆行恐後又嫌疎漏澤由是被寵遇庫狄顯安侍坐被皮義翻坐徂卧翻帝曰顯安我姑之子庫狄顯安父干娶勃海王歡之妹樂陵長公主今序家人之禮除君臣之敬可言我之不逮顯安曰陛下多妄言帝曰何故對曰陛下昔見文宣以馬鞭撻人常以為非今自行之非妄言邪帝握其手謝之又使直言對曰陛下太細天子乃更似吏帝曰朕甚知之然無法日乆將整之以至無為耳又問王晞晞曰顯安言是也顯安干之子也羣臣進言帝皆從容受納從千容翻性至孝太后不豫帝行不能正履容色貶悴悴秦醉翻衣不解帶殆將四旬太后疾小增即寢伏閤外食飲藥物皆手親之太后嘗心痛不自堪帝立侍帷前以爪搯掌代痛搯苦洽翻血流出袖友愛諸弟無君臣之隔戊子以長廣王湛為右丞相平陽王淹為太傅彭城王浟為大司馬浟夷周翻周軍司馬賀若敦唐六典曰周官大司馬屬官有軍司馬下大夫盖兵部郎中之任也後周依周官其爵列中大夫也六命若人者翻帥衆一萬奄至武陵帥讀曰率武州刺史吳明徹不能拒引軍還巴陵江陵之陷也巴湘之地皆入於周周使梁人守之太尉侯瑱等將兵逼湘州賀若敦將歩騎救之乘勝深入按賀若敦傳屢戰破瑱乘勝深入軍於湘川九月乙卯周將獨孤盛將水軍與敦俱進辛酉遣儀同三司徐度將兵㑹侯瑱於巴邱將即亮翻㑹秋水汎溢盛敦糧援斷絶分軍抄掠以供資費抄楚交翻敦恐瑱知其糧少乃於營内多為土聚覆之以米少詩沼翻覆敷又翻此檀道濟量沙之故智也召旁村人營旁之村人也陽有訪問隨即遣之瑱聞之良以為實敦又増脩營壘造廬舍為乆留之計湘羅之間遂廢農業梁置湘州於長沙置羅州於湘隂縣瑱等無如之何先是土人亟乘輕船先悉薦翻亟去吏翻數也載米粟雞鴨以餉瑱軍敦患之乃偽為土人裝船伏甲士於中瑱軍人望見謂餉船之至逆來争取敦甲士出而擒之唐裴行儉詐為糧車以破突厥亦用此䇿又敦軍數有叛人乘馬投瑱者敦乃别取一馬牽以趣船令船中逆以鞭鞭之如是者再三馬畏船不上數所角翻趣七喻翻上時掌翻然後伏兵於江㟁使人乘畏船馬以招瑱軍詐云投附瑱遣兵迎接競來牽馬馬既畏船不上伏兵發盡殺之此後實有饋餉及亡降者瑱猶謂之詐並拒擊之冬十月癸巳瑱襲破獨孤盛於楊葉洲據姚思亷陳書楊葉洲在西江口西江謂湘江也盛收兵登㟁築城自保丁酉詔司空侯安都帥衆㑹瑱南討帥讀曰率十一月辛亥齊主立妃元氏為皇后世子百年為太子百年時纔五歳齊主徵前開府長史盧叔虎為中庶子太子中庶子職如侍中後齊門下坊之長也叔虎柔之從叔也從才用翻帝問時務於叔虎叔虎請伐周曰我彊彼弱我富彼貧其勢相懸然干戈不息未能并吞者此失於不用彊富也以當時東西二國觀之齊若富彊而其根本實撥周若貧弱而其根本實牢若齊孝昭欲用其富彊周固有以待之輕兵野戰勝負難必是胡騎之法非萬全之術也宜立重鎮於平陽與彼蒲州相對魏神䴥元年置雍州於河東延和元年改曰秦州太和中罷魏既分為東西東魏天平初復置秦州於河東沙苑敗後河東之地入於西魏後周因蒲坂舊名而置蒲州深溝髙壘運糧積甲彼閉關不出則稍蠶食其河東之地日使窮蹙若彼出兵非十萬以上不足為我敵所損糧食損當作資咸出關中我軍士年别一代一年一更戍也穀食豐饒彼來求戰我則不應彼若退去我乘其弊自長安以西民疏城逺敵兵來往實自艱難與我相持農業且廢不過三年彼自破矣帝深善之齊主自將擊庫莫奚將即亮翻下同至天池庫莫奚出長城北遁此文宣帝所築長城也齊主分兵追擊獲牛羊七萬而還還從宣翻又如字十二月乙未詔自今孟春訖於夏首大辟事已款者已款謂囚已款服也今人謂獄辭為獄款辟毘至翻宜且申停及秋冬乃行刑也己亥周巴陵城主尉遲憲降尉紆勿翻降戶江翻遣巴州刺史侯安鼎守之庚子獨孤盛將餘衆自楊葉洲潛遁賀若敦之勢愈孤矣丙午齊主還晉陽齊主斬人於前問王晞曰是人應死不不讀曰否齊主以文宣殺人多非其罪自謂誅當其罪故以問晞晞曰應死但恨死不得其地耳臣聞刑人於市與衆棄之記王制之言殿庭非行戮之所帝改容謝曰自今當為王公改之為於偽翻帝欲以晞為侍郎按北史王晞傳侍郎當作侍中苦辭不受或勸晞勿自踈晞曰我少年以來閱要人多矣少詩照翻要人謂位居勢要者得志少時鮮不顛覆少時言不多時也少始紹翻鮮息翦翻且吾性實疎緩不堪時務人主恩私何由可保萬一披猖求退無地非不好作要官但思之爛熟耳好呼到翻初齊顯祖之末穀糴踊貴濟南王即位濟子禮翻尚書左丞蘇珍芝建議脩石鼈等屯自是淮南軍防足食杜佑曰石鼈在楚州安宜縣西八十里鄧艾築城於此作白水塘北接連洪澤屯田一萬三千頃安宜唐寳應元年改為寳應縣肅宗即位平州刺史嵇曄建議開督亢陂置屯田歲收稻粟數十萬石北境周贍督亢陂在唐涿州新城縣界燕荆軻獻圖於秦即此地亢音剛又於河内置懐義等屯以給河南之費齊分河内汲郡為義州置懐義等屯由是稍止轉輸之勞此是五代志序齊濟南王至孝昭時軍餉鑑取之附見於此二年春正月戊申周改元保定以大冢宰䕶為都督中外諸軍事令五府總於天官事無巨細皆先斷後聞五府地官春官夏官秋官冬官府也史言宇文䕶之權愈重斷丁亂翻庚戌大赦周主祀圜丘辛亥齊主祀圜丘壬子禘於太廟周主祀方丘甲寅祀感生帝於南郊用鄭𤣥之説祀感生帝靈威仰於南郊以祈穀乙卯祭太社齊主使王琳出合肥召募傖楚更圖進取傖助庚翻合州刺史裴景徽作考異曰北齊書景暉今從陳書琳兄珉之壻也請以私屬為鄉導鄉讀曰嚮齊主使琳與行臺左丞盧潛將兵赴之琳沈吟不决景徽恐事泄挺身奔齊按梁置合州於合肥侯景之亂已入於齊齊之境土南盡厯陽陳盖僑置合州於江濱以景徽為刺史沈持林翻齊主以琳為驃騎大將軍開府儀同三司揚州刺史鎮夀陽己巳周主享太廟班太祖所述六官之法宇文泰廟號太祖泰之相魏也建六官述周禮六典以為六官之法辛未周湘州城主殷亮降降戶江翻下同湘州平侯瑱與賀若敦相持日乆瑱不能制乃借船送敦等渡江按賀若敦傳借船之上有求字敦慮其詐不許報云湘州我地為爾侵逼必須我歸可去我百里之外瑱留船江㟁引兵去之敦乃自㧞北歸軍士病死者什五六武陵天門南平義陽河東宜都郡悉平五代志澧陽郡孱陵縣舊置南平郡安鄉縣舊置義陽郡南郡松滋縣舊置河東郡宋白曰澧陽郡安鄉縣本漢孱陵縣地後漢為漢夀縣地晉曽立義陽郡晉公䕶以敦失地無功除名為民二月甲午周主朝日於東郊三代之禮春朝朝日秋暮夕月周人慕古舉行其禮朝直遙翻周人以小司徒韋孝寛嘗立勲於玉壁事見一百五十九卷梁武帝中大同元年後周之制小司徒六命上大夫也乃置勲州於玉壁以孝寛為刺史孝寛有恩信善用間諜間古莧翻或齊人受孝寛金貨遙通書疏故齊之動静周人皆先知之有主帥許盆以所戌城降齊孝寛遣諜取之俄斬首而還帥所類翻諜徒協翻離石以南生胡數為抄掠五代志離石郡後齊置西汾州生胡即稽胡之不附屬周者數所角翻抄楚交翻而居於齊境不可誅討孝寛欲築城於險要以制之乃發河西役徒十萬甲士百人河西龍門河之西也遣開府儀同三司姚岳監築之岳以兵少懼不敢前監工銜翻少詩沼翻孝寛曰計此城十日可畢城距晉州四百餘里吾一日創手二日敵境始知設使晉州徵兵三日方集謀議之間自稽二日計其軍行二日不到我之城隍足得辦矣乃令築之齊人果至境上疑有大軍停留不進其夜孝寛使汾水以南傍介山稷山諸村縱火傍蒲浪翻唐志蒲州萬泉縣有介山介子推隠處稷山縣有稷山齊人以為軍營收兵自固岳卒城而還卒子恤翻三月乙卯太尉零陵壯肅公侯瑱卒丙寅周改八丁兵為十二丁兵率歲一月而役八丁兵者凡境内民丁分為八番遞上就役十二丁兵者分為十二番月上就役周而復始夏四月丙子朔日有食之周以少傅尉遲綱為大司空尉紆勿翻丙午周封愍帝子康為紀國公皇子贇為魯公贇李后之子也贇於倫翻六月乙酉周使御正殷不害來聘周書申徽傳曰御正任專絲綸盖中書舍人之職也北史盧辯傳武成元年増置御正四人位上大夫考之唐六典則曰後周依周官春官府置内史中大夫掌王言盖比中書監令之任後又増為上大夫小史下大夫比中書侍郎之任小史上士比中書舍人之任然則為御正者亦代言之職在帝左右又親宻於中書杜佑通典御正屬天官府秋七月周更鑄錢更工衡翻文曰布泉一當五與五銖並行己酉周追封皇伯父顥為邵國公以晉公䕶之子㑹為嗣顥弟連為杞國公以章武公導之子亮為嗣連弟洛生為莒國公以䕶之子至為嗣追封太祖之子武邑公震為宋公以世宗之子實為嗣顥與衞可孤戰殁有子什肥導䕶什肥與其叔連皆為髙歡所殺無後故以㑹亮嗣之洛生為爾朱榮所殺震早卒皆無後故亦立嗣齊主之誅楊燕也燕因肩翻許以長廣王湛為太弟既而立太子百年湛心不平帝在晉陽湛居守於鄴楊燕謂楊愔燕子獻守手又翻散騎常侍髙元海髙祖之從孫也髙歡廟號髙祖元海父思宗歡之從子散悉亶翻騎奇寄翻從用翻才留典機宻帝以領軍代人庫狄伏連為幽州刺史斛律光之弟羡為領軍以分湛權湛留伏連不聽羨視事齊主以伏連代羡為幽州以羡代伏連為領軍以分鄴下之權湛知其故乃留伏連不使之幽州而羡至又不聽其視領軍府事先是濟南閔悼王常在鄴濟南王殷諡閔悼先悉薦翻濟子禮翻望氣者言鄴中有天子氣平秦王歸彥恐濟南復立為己不利齊主藉歸彥握兵以殺楊燕楊燕死而濟南廢矣故恐其復立為己不利復扶又翻勸帝除之帝乃使歸彥至鄴徵濟南王如晉陽湛内不自安問計於髙元海元海曰皇太后萬福至尊孝友異常殿下不須異慮湛曰此豈我推誠之意邪元海乞還省一夜思之湛即留元海於後堂元海達旦不眠唯遶牀徐歩夜漏未盡湛遽出曰神算如何元海曰有三䇿恐不堪用耳請殿下如梁孝王故事從數騎入晉陽先見太后求哀梁孝王事見十六卷漢景帝中二年後見主上請去兵權見賢遍翻去羌吕翻以死為限不干朝政朝直遙翻必保太山之安此上䇿也不然當具表云威權太盛恐取謗衆口請青齊二州刺史沈靖自居沈持林翻必不招物議此中䇿也更問下䇿曰發言即恐族誅固逼之元海曰濟南世嫡主上假太后令而奪之今集文武示以徵濟南之敕執斛律豐樂斛律羨字豐樂樂音洛斬髙歸彥尊立濟南號令天下以順討逆此萬世一時也湛大悅然性怯狐疑未能用使術士鄭道謙等卜之皆曰不利舉事静則吉有林慮令潘子宻曉占候林慮縣漢屬河内郡晉屬汲郡魏敬宗永安元年置林慮郡帶林慮縣慮讀如閭潛謂湛曰宫車當晏駕殿下為天下主湛拘之於内以候之又令巫覡卜之覡刑狄翻多云不須舉兵自有大慶湛乃奉詔令數百騎送濟南王至晉陽九月帝使人酖之濟南王不從乃扼殺之帝尋亦悔之冬十月甲戌朔日有食之丙子齊以彭城王浟為太保長樂王尉粲為太尉樂音洛下同齊肅宗出畋有兎驚馬墜地絶肋婁太后視疾問濟南所在者三齊主不對太后怒曰殺之邪不用吾言死其宜矣遂去不顧十一月甲辰詔以嗣子冲眇可遣尚書右僕射趙郡王叡諭㫖徵長廣王湛統兹大寳又與湛書曰百年無罪汝可以樂處置之勿效前人也樂音洛楚靈王乾谿之役楚人殺其諸子王聞之自投於車下曰余殺人子多矣能無及此乎齊肅宗殺其兄之子臨終乃戒其弟勿殺已之子良可憫笑是日殂於晉陽宫年二十七臨終言恨不見太后山陵顔之推論曰孝昭天性至孝而不知忌諱乃至於此良由不學之所為也趙郡王叡先使黄門侍郎王松年馳至鄴宣肅宗遺命湛猶疑其詐使所親先詣殯所發而視之使者復命使疏吏翻下同湛喜馳赴晉陽使河南王孝瑜先入宫改易禁衞癸丑世祖即皇帝位於南宫諱湛勃海王歡第九子孝昭帝之母弟南宫晉陽南宫也大赦改元太寜周人許歸安成王頊頊吁玉翻使司㑹上士杜杲來聘周禮天官之屬有司㑹凡邦國都鄙官府之治及其財用在書契版圖者皆聽其㑹計以歳月日考其成鄭元曰㑹大計也司㑹主天下之大計計官之長若今尚書余按後周地官即唐户部尚書之任司㑹當如唐之度支郎中而六典不言所以杜佑通典後周司㑹屬天官府有中大夫上士中士上悅即遣使報之并賂以黔中地及魯山郡周得黔中則全有巴蜀得魯山則全有漢沔故因其所欲而餌之齊以彭城王浟為太師錄尚書事平秦王歸彥為太傅尉粲為太保平陽王淹為太宰博陵王濟為太尉叚韶為大司馬豐州刺史婁叡為司空五代志上黨郡鄉縣後魏置南垣州尋改曰豐州趙郡王叡為尚書令任城王湝為尚書左僕射任音壬湝居諧翻并州刺史斛律光為右僕射婁叡昭之兄子也婁昭婁太后之弟叡昭兄㧞之子立太子百年為樂陵王丁巳周主畋於岐陽十二月壬午還長安太子中庶子餘姚虞荔御史中丞孔奐以國用不足奏立煮海鹽賦及𣙜酤之科吳王濞煮海為鹽今淮鹽也至此則東南瀕海煮鹽之地皆歸於筦𣙜矣酤音固荔力計翻𣙜古岳翻詔從之初髙祖以帝女豐安公主妻留異之子貞臣徵異為南徐州刺史異遷延不就帝即位復以異為縉州刺史領東陽太守自侯景之亂梁南郡王大連之敗留異跨據東陽陳興以為縉州刺史因縉雲山以名州妻七細翻復扶又翻下異復同異屢遣其長史王澌入朝澌每言朝廷虛弱澌斯義翻異信之雖外示臣節恒懐兩端恒戶登翻與王琳自鄱陽信安嶺潛通使往來今有嶺路自衢州經信州達於鄱陽使疏吏翻琳敗上遣左衞將軍沈恪代異實以兵襲之異出軍下淮以拒恪恪與戰而敗退還錢塘異復上表遜謝時衆軍方事湘郢乃降詔書慰諭且羈縻之異知朝廷終將討已乃以兵戍下淮及建德以備江路劉昫曰建德縣漢㑹稽富春縣地吳分置建德縣隋廢唐復置建德縣為睦州治所丙午詔司空南徐州刺史侯安都討之三年春正月乙亥齊主至鄴自晉陽宫至鄴辛巳祀南郊壬午享太廟丙戌立妃胡氏為皇后子緯為皇太子緯于貴翻后魏兖州刺史安定胡延之之女也戊子齊大赦己亥以馮翊王潤為尚書左僕射周凉景公賀蘭祥卒凉國公景諡也壬寅周人鑿河渠於蒲州龍首渠於同州二渠皆以灌溉丁未周以安成王頊為柱國大將軍遣杜杲送之南歸杜考異曰典畧作杲今從周書辛亥上祀南郊以胡公配天胡公始封於陳故郊祀之以配天二月辛酉祀北郊閏月丁未齊以太宰平陽王淹為青州刺史太傅平秦王歸彥為太宰冀州刺史歸彥為肅宗所厚歸彥以殺楊燕之功為肅宗所厚恃勢驕盈陵侮貴戚世祖即位侍中開府儀同三司髙元海御史中丞畢義雲黄門郎髙乾和數言其短數所角翻且云歸彥威權震主必為禍亂帝亦㝷其反覆之跡漸忌之歸彥始為文宣所親任其後背楊愔附孝昭以成濟南之禍又為孝昭所委信孝昭既殂又迎武成以貪天之功故武成跡其反覆而忌之伺歸彥還家召魏收於帝前作詔草除歸彥冀州伺相吏翻使乾和繕寫晝日仍敕門司不聽歸彥輒入宫時歸彥縦酒為樂經宿不知至明欲參參朝參也毛晃曰參造也趨承也樂音洛至門知之大驚而退及通名謝敕令早發别賜錢帛等物甚厚又敕督將悉送至清陽宫齊有别宫在清淇之陽因以為名五代志清河郡清陽縣舊曰清河縣後齊省貝邱入焉改為貝邱隋開皇六年改為清陽將即亮翻拜辭而退莫敢與語唯趙郡王叡與之乆語時無聞者帝之為長廣王也清都和士開以善握槊彈琵琶有寵辟為開府行參軍及即位累遷給事黄門侍郎髙元海畢義雲髙乾和皆疾之將言其事士開乃奏元海等交結朋黨欲擅威福乾和由是被疎被皮義翻義雲納賂於士開得為兗州刺史為和士開怙寵亂齊張本帝徵江州刺史周廸出鎮湓城周廸領江州刺史而屯據臨川徵之鎮湓城若以江州授之者又徵其子入朝朝直遙翻下同廸趑且顧望並不至趑子移翻且七余翻趑且不進之貎其餘南江酋帥私署令長多不受召酋慈秋翻帥所類翻長知兩翻朝廷未暇致討但羈縻之豫章太守周敷獨先入朝進號安西將軍給鼓吹一部賜以女妓金帛令還豫章周敷先與周廸分據臨川既破熊曇朗敷移據豫章吹尺瑞翻妓渠綺翻廸以敷素出已下深不平之乃隂與留異相結遣其弟方興襲敷敷與戰破之又遣其兄子伏甲船中詐為賈人欲襲湓城賈音古未發事覺尋陽太守監江州事晉陵華皎遣兵逆擊之盡獲其船仗監工銜翻上以閩州刺史陳寳應之父為光禄大夫五代志建安郡陳置閩州陳寳應父羽子女皆受封爵命宗正編入屬籍而寳應以留異女為妻隂與異合虞荔弟寄流寓閩中荔思之成疾上為荔徵之寳應留不遣寄嘗從容諷以逆順為於偽翻從千容翻寳應輒引它語以亂之寳應嘗使人讀漢書臥而聽之至蒯通説韓信曰相君之背貴不可言蹶然起坐曰可謂智士寄曰通一説殺三士何足稱智班固曰蒯通一説而喪三儁應劭注云謂烹酈生敗田横驕韓信也説式芮翻相息亮翻豈若班彪王命識所歸乎王命論見四十一卷漢光武建武五年寄知寳應不可諫恐禍及已乃著居士服著陟畧翻居東山寺陽稱足疾寳應使人燒其屋寄安臥不動親近將扶之出寄曰吾命有所懸避將安徃言託跡閩中生死之命懸於人手無所避之也縱火者自救之乙卯齊以任城王湝為司徒任音壬湝戶皆翻齊揚州刺史行臺王琳數欲南侵尚書盧潛以為時事未可上遣移書夀陽欲與齊和親潛以其書奏齊朝仍上啟請且息兵數所角翻上時掌翻朝直遙翻齊主許之遣散騎常侍崔瞻来聘且歸南康愍王曇朗之喪曇朗為齊所殺見一百六十六卷梁敬帝太平元年琳於是與潛有隙更相表列更工衡翻齊主徵琳赴鄴以潛為揚州刺史領行臺尚書瞻㥄之子也髙歡起兵於信都崔㥄為參佐㥄力膺翻梁末喪亂鐵錢不行梁普通中鑄鐵錢喪息浪翻民間私用鵝眼錢甲子改鑄五銖錢一當鵝眼之十嘉考異曰隋志在天五年今從陳帝紀後梁主安於儉素不好酒色好呼到翻雖多猜忌而撫將士有恩以封疆褊隘邑居殘毁干戈日用鬱鬱不得志疽發背而殂年四十四葬平陵諡曰宣皇帝廟號中宗太子巋即皇帝位巋字仁逺宣帝之第三子也巋音歸又區胃翻改元天保尊龔太后為太皇太后王后曰皇太后母曹貴嬪為皇太妃嬪昆賓翻二月丙子安成王頊至建康詔以為中書監中衞將軍上謂杜杲曰家弟今蒙禮遣實周朝之惠然魯山不返亦恐未能及此言若不賂以魯山亦恐未及遣安成王還也朝直遙翻下同杲對曰安成長安一布衣耳而陳之介弟也介大也其價豈止一城而已哉本朝敦睦九族恕已及物上遵太祖遺㫖下思繼好之義好呼到翻是以遣之南歸今乃云以尋常之土易骨肉之親非使臣之所敢聞也使疏吏翻上甚慚曰前言戲之耳待杲之禮有加焉頊妃栁氏及子叔寳猶在穰城上復遣毛喜如周請之頊吁玉翻復扶又翻周人皆歸之丁丑以安右將軍吳明徹為江州刺史督髙州刺史黄法氍氍巨俱翻豫章太守守式又翻周敷共討周廸甲申大赦留異始謂臺軍必自錢塘上既而侯安都歩由諸暨出永康上時掌翻諸暨縣自漢以来屬㑹稽郡永康縣吳赤烏八年分上虞烏傷立屬東陽郡自永安至東陽一百九里異大驚奔桃枝嶺於巖口竪柵以拒之堅而主翻安都為流矢所中血流至踝中竹仲翻踝胡瓦翻足跟也乘轝指麾容止不變因其山勢迮而為堰迮側百翻廹也堰於建翻㑹潦水漲滿安都引船入堰起樓艦與異城等發拍碎其樓堞潦盧皓翻艦戶黯翻堞達協翻異與其子忠臣脫身奔晉安依陳寳應安都虜其妻及餘子盡收鎧仗而還鎧可亥翻還從宣翻又音如字異黨向文政據新安上以貞毅將軍程文季為新安太守梁置貞毅將軍班第二十二在五德將軍之下陳制擬官品第五帥精甲三百輕往攻之文政戰敗遂降文季靈洗之子也陳氏建國程靈洗蕭摩訶等俱為健將帥讀曰率降戶江翻夏四月辛丑齊武明婁太后殂齊主不改服緋袍如故未幾未幾言未幾時也幾居豈翻登三臺置酒作樂宫女進白袍帝投諸臺下散騎常侍和士開請止樂帝怒撾之和士開長君之惡者也自此益無所忌憚矣乙巳齊遣使來聘使疏吏翻下同齊青州上言河水清齊主遣使祭之改元河清先是周之君臣受封爵者皆未給租賦先悉薦翻癸亥始詔柱國等貴臣邑戶聽寄食佗縣五月庚午周大赦己丑齊以右僕射斛律光為尚書令壬辰周以柱國楊忠為大司空六月己亥以柱國蜀國公尉遲迥為大司馬尉紆勿翻秋七月己丑納太子妃王氏金紫光禄大夫周之女也姚思亷陳書周作固齊平秦王歸彦至冀州内不自安欲待齊主如晉陽乘虛入鄴其郎中令吕思禮告之此王國郎中令也詔大司馬叚韶司空婁叡討之歸彥於南境置私驛聞大軍將至即閉城拒守長史宇文仲鸞等不從皆殺之歸彥自稱大丞相有衆四萬齊主以都官尚書封子繪冀州人祖父世為本州刺史得人心子繪父隆之祖囘皆為冀州刺史使乘傳至信都傳張戀翻巡城諭以禍福吏民降者相繼城中動静大小皆知之歸彥登城大呼云降戶江翻呼火故翻孝昭皇帝初崩六軍百萬悉在臣手投身向鄴奉迎陛下當時不反今日豈反邪正恨髙元海畢義雲髙乾和誑惑聖上疾忌忠良但為殺此三人誑居况翻為於偽翻即臨城自刎刎扶粉翻既而城破單騎北走至交津獲之水經注衡漳水逕武邑郡南又東逕武强縣北又東北逕武隧縣故城南白馬河注之水上承呼沱東逕樂鄉縣北饒陽縣南又東南逕武邑郡北而東入衡漳水謂之交津口鎻送鄴乙未載以露車銜木面縛李百藥北齊書銜木作銜枚劉桃枝臨之以刄擊鼓隨之并其子孫十五人皆棄市命封子繪行冀州事齊主知歸彥前譖清河王岳事見一百六十六卷梁敬帝紹泰元年以歸彥家良賤百口賜岳家贈岳太師丁酉以段韶為太傅婁叡為司徒平陽王淹為太宰斛律光為司空趙郡王叡為尚書令河間王孝琬為左僕射癸亥齊主如晉陽上遣使聘齊九月戊辰朔日有食之以侍中都官尚書到仲舉為尚書右僕射丹陽尹仲舉溉之弟子也到溉彥之之曽孫梁初以文學顯以亷白稱吳明徹至臨川攻周廸不能克丁亥詔安成王頊代之廸考異曰陳書帝紀云丁亥請降詔安成王諱督衆軍以招納之今從南史廸傳冬十月戊戌詔以軍旅費廣百姓空虛凡供乗輿飲食衣服及宫中調度悉從減削乘繩證翻調徒釣翻至於百司宜亦思省約十一月丁卯周以趙國公招為益州總管丁丑齊遣兼散騎常侍封孝琰来聘十二月丙辰齊主還鄴自晉陽還鄴齊主逼通昭信李后文宣李后宫曰昭信曰若不從我我殺爾兒后懼從之既而有娠太原王紹德至閤不得見見賢遍翻愠曰兒豈不知邪姊腹大故不見兒后大慚由是生女不舉帝横刀詬曰詬時候翻殺我女我何得不殺爾兒對后以刀環築殺紹德后大哭帝愈怒裸后亂撾之后號天不已帝命盛以絹囊號戶刀翻盛時征翻流血淋漉投諸渠水良乆乃蘇犢車載送妙勝寺為尼武成之淫虐文宣教之也是以詩貴正始資治通鑑卷一百六十八
