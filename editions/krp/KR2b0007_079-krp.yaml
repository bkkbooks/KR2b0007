body:
  text: 資治通鑑卷七十九宋司馬光撰胡三省音註晉紀一起旃䝉作噩盡𤣥黓執徐凡八年王司馬氏河内温縣人宣王懿得魏政傳景師至文王昭始封晉公以温縣本晉地故以為國號世祖武皇帝上之上諱炎字安世姓司馬氏宣王懿之孫文王昭之長子文王廟號太祖故帝廟號世祖謚法克定禍亂曰武泰始元年是年十二月方受禪改元此猶是魏咸熈二年春三月吳主使光禄大夫紀陟五官中郎将洪璆璆渠尤翻與徐紹孫彧偕來報聘紹彧聘吳見上卷上年紹行至濡須有言紹譽中國之美者譽音余吳主怒追還殺之夏四月吳改元甘露時因蒋陵言甘露降改元五月魏帝加文王殊禮謂旌旗車馬樂舞冕服皆如帝者之儀進王妃曰后世子曰太子癸未大赦秋七月吳主逼殺景皇后遷景帝四子於吳尋又殺其長者二人吳主貶景后封四弟事見上卷上年長知兩翻八月辛夘文王卒太子嗣為相國晉王九月乙未大赦戊子以魏司徒何曾為晉丞相癸亥以票騎将軍司馬望為司徒票匹妙翻騎竒寄翻乙亥葬文王于崇陽陵酉考異曰晉書文紀作癸今從魏志陳留王紀冬吳西陵督歩闡西陵即夷陵吳主權黄武元年改夷陵曰西陵宜都郡治焉表請吳主徙都武昌吳主從之使御史大夫丁固右将軍諸葛靚守建業靚􅍚正翻闡騭之子也吳主權時騭為西陵督騭之日翻十二月壬戌魏帝禪位于晉魏元帝時年二十困敦上章魏文帝始受漢禪傳五世歴四十六年而亡甲子出舍于金墉城金墉城在洛陽城西北角太傅司馬孚拜辭執帝手流涕􅒣欷不自勝􅒣音虚欷音希又許既翻勝音升曰臣死之日固大魏之純臣也丙寅王即皇帝位大赦改元至是方改元泰始丁卯奉魏帝為陳留王即宫于鄴即就也優崇之禮皆倣魏初故事見六十九卷魏文帝黄初元年魏氏諸王皆降為侯追尊宣王為宣皇帝景王為景皇帝文王為文皇帝尊王太后曰皇太后封皇叔祖孚為安平王叔父幹為平原王亮為扶風王伷為東莞王駿為汝隂王肜為梁王倫為琅邪王弟攸為齊王鑑為樂安王機為燕王又封羣從司徒望等十七人皆為王望孚之子也帝封諸王以郡為國邑二萬戶為大國置上中下三軍兵五千人萬户為次國置上軍下軍兵三千人五千戸為小國置一軍兵五百人王不之國官於京師伷音胄從才用翻莞音官肜余中翻燕於賢翻以石苞為大司馬鄭冲為太傅王祥為太保何曾為太尉賈充為車騎将軍王沈為驃騎将軍騎竒寄翻沈持林翻驃匹妙翻其餘文武增位進爵有差乙亥以安平王孚為太宰都督中外諸軍事晉志曰太宰太傅太保周之三公官也晉初以景帝諱故又採周官官名置太宰以代太師之任秩增三師與太傅太保皆為上公大司馬古官也漢制以冠大将軍驃騎将軍之上以代太尉之職故恒與太尉迭置不並列及魏有太尉而大司馬大将軍各自為官位在三司上晉因其制以太宰太傅太保司徒司空為文官公左右光禄大夫光祿大夫開府者位從公冠進賢三梁黒介幘大司馬大将軍太尉為武官公驃騎車騎衛将軍伏波撫軍都䕶鎮軍中軍四征四鎮龍驤典軍上軍輔國等大将軍開府者位從公皆著武冠平上黒幘未幾幾居豈翻又以車騎将軍陳騫為大将軍與司徒義陽王望司空荀顗凡八公同時並置帝懲魏氏孤立之敝故大封宗室授以職任又詔諸王皆得自選國中長吏長知兩翻衛将軍齊王攸獨不敢皆令上請上時掌翻詔除魏宗室禁錮罷部曲将及長吏納質任魏防禁宗室甚峻又錮不得仕進今除之又諸将征戍及長吏仕州郡者皆留質任於京師今亦罷之将即亮翻質音致帝承魏氏刻薄奢侈之後矯以仁儉太常丞許竒允之子也晉太常光禄勲衛尉太僕廷尉大鴻臚宗正大司農少府将作大匠太后三卿大長秋皆為列卿各置丞功曹主簿五官等員帝将有事於太廟朝議以竒父受誅竒父允誅事見七十六卷高貴鄉公正元元年朝直遥翻不宜接近左右近其靳翻請出為外官帝乃追述允之宿望稱竒之才擢為祠部郎魏尚書曹有祠部郎晉因之有司言御牛青絲紖斷紖直忍翻索也牛系也禮迎牲君執紖周禮封人祭祀餙其牛牲置其絼注曰絼著牛鼻繩所以牽牛者今人謂之雉䟽曰自漢以前皆謂之絼案禮記少儀牛則執紖紖則絼之别名今亦謂之為紖陸徳明曰絼與紖同又以忍翻又周禮釋音羊晉翻詔以青麻代之初置諫官以散騎常侍𫝊𤣥皇甫陶為之秦漢以來有諫大夫鄭昌所謂官以諌為名者也東漢有諫議大夫魏不復置晉以㪚騎常侍拾遺補闕即諌官職也𤣥幹之子也傅幹漢傅爕之子𤣥以魏末士風頽敝上疏曰臣聞先王之御天下敎化隆於上清議行於下近者魏武好法術而天下貴刑名好呼到翻魏文慕通逹而天下賤守節其後綱維不攝攝整也放誕盈朝謂何晏阮籍輩也朝直遥翻遂使天下無復清議陛下龍興受禪𢎞堯舜之化惟未舉清逺有禮之臣以敦風節未退虚鄙之士以懲不恪臣是以猶敢有言上嘉納其言使𤣥草詔進之然亦不能革也初漢征西将軍司馬鈞鈞事見五十卷漢安帝元初二年生豫章太守量量生潁川太守雋雋生京兆尹防防生宣帝序司馬氏之世為下立廟張本二年春正月丁亥即用魏廟祭征西府君以下并景帝凡七室沈約志曰晉初祭征西将軍豫章府君潁川府君京兆府君與宣皇帝景皇帝文皇帝為三昭三穆是時宣皇未升太祖虚位所以祠六世與景帝為七廟其禮則據王肅説也尊景帝夫人羊氏曰景皇后居𢎞訓宫丙午立皇后𢎞農楊氏后魏通事郎文宗之女也魏黄初初中書既置監令又置通事郎羣臣奏五帝即天帝也王氣時異故名號有五自今明堂南郊宜除五帝座從之帝王肅外孫也故郊祀之禮有司多從肅議周禮曰祀昊天上帝則服大裘而冕祀五帝亦如之鄭𤣥以為昊天上帝者天皇大帝北辰耀魄寶也五帝者五行精氣之神也曰青帝靈威仰曰赤帝赤熛怒曰黄帝含樞紐曰白帝白招矩曰黒帝汁光紀由是有六天之説六天者指其尊極清虚之體其實是一論其五時生育之功其别有五故為六天據其在上之體謂之天天為體稱故説天云天顛也因其生育之功謂之帝帝為徳稱故毛詩傳云審諦如帝王肅駁之以為五帝非天唯用家語之文謂太皥炎帝黃帝少皥顗頊五帝為五人帝晉羣臣祖肅之説以為五帝即天帝王氣時異故殊其號雖五其實一神明堂南郊宜除五帝之座五郊改五精之號同稱昊天上帝從之王于况翻二月除漢宗室禁錮魏既代漢禁錮諸劉今除之三月吳遣大鴻臚張儼五官中郎将丁忠來弔祭以文王之䘮也臚陵如翻吳散騎常侍王蕃體氣高亮不能承顔順指吳主不悦散騎常侍萬彧中書丞陳聲從而譖之散悉亶翻騎竒寄翻丁忠使還使䟽吏翻還從宣翻又如字吳主大㑹羣臣蕃沈醉頓伏沈持林翻下王沈同吳主疑其詐轝蕃出外轝羊如翻頃之召還蕃好治威儀好呼到翻治直之翻行止自若吳主大怒呵左右於殿下斬之出登來山水經注武昌城南有來山即樊山也吳孫皓登之使親近擲王蕃首而虎爭之使親近擲蕃首作虎跳狼爭咋齧之跳它弔翻咋側革翻啖也齧魚結翻噬也首皆碎壞丁忠説吳主曰北方無守戰之備弋陽可襲而取弋陽縣漢屬汝南郡魏文帝分立弋陽郡説輸芮翻吳主以問羣臣鎮西大将軍陸凱曰北方新并巴蜀遣使求和非求援於我也欲蓄力以俟時耳敵埶方彊而欲徼幸求勝未見其利也徼工堯翻吳主雖不出兵然遂與晉絶凱遜之族子也夏五月壬子博陵元公王沈卒沈持林翻六月丙午晦日有食之文帝之䘮臣民皆從權制三日除服既葬帝亦除之然猶素冠䟽食食祥吏翻哀毁如居䘮者秋八月帝将謁崇陽陵羣臣奏言秋暑未平恐帝悲感摧傷帝曰朕得奉瞻山陵體氣自佳耳又詔曰漢文不使天下盡哀亦帝王至謙之志漢文帝遺詔見十五卷後七年真徳秀曰文帝此詔乃短䘮之始也然本文蓋為吏民設耳景帝嗣君也可緣此而短其䘮乎當見山陵何心無服其議以衰絰從行衰七回翻羣臣自依舊制尚書令裴秀奏曰陛下既除而復服義無所依若君服而臣不服亦未之敢安也詔曰患情不能跂及耳衣服何在言患哀慕之情不至耳不在乎衣服也跂去智翻舉踵也諸君勤勤之至豈茍相違遂止中軍将軍羊祜謂傅𤣥曰三年之䘮雖貴遂服禮也三年之䘮自天子逹于庻人言雖以天子之貴亦得以遂其孝思為三年之服今主上至孝雖奪其服實行䘮禮若因此復先王之法不亦善乎𤣥曰以日易月已數百年以日易月漢儒之謬説也注見十五卷漢文帝後七年一旦復古難行也祜曰不能使天下如禮且使主上遂服不猶愈乎𤣥曰主上不除而天下除之此為但有父子無復君臣也乃止戊辰羣臣奏請易服復膳詔曰每感念幽冥而不得終苴絰之禮左傳齊晏桓子卒晏嬰麤縗苴絰帶杜預注云苴麻之有子者取其麤也苴七余翻以為沈痛沈持林翻深也况當食稻衣錦乎衣於既翻適足激切其心非所以相解也朕本諸生家傳禮來乆何至一旦便易此情於所天相從已多可試省孔子答宰我之言論語宰我問三年之䘮朞已乆矣君子三年不為禮禮必壊三年不為樂樂必崩舊榖既没新穀既升朞可已矣孔子曰食夫稻衣夫錦於女安乎曰安孔子曰女安則為之宰我出孔子曰予之不仁也子生三年然後免於父母之懐夫三年之䘮天下之通䘮也儀禮曰父者子之天省悉景翻無事紛紜也遂以疏素終三年臣光曰三年之䘮自天子逹於庻人此先王禮經百世不易者也漢文師心不學變古壞禮壞音怪絶父子之恩虧君臣之義後世帝王不能篤於哀戚之情而羣臣謟諛莫肯釐正釐力之翻理也至于晉武獨以天性矯而行之可謂不世之賢君而裴傅之徒固陋庸臣習常玩故而不能将順其美惜哉孝經曰君子之事上也将順其美匡救其惡注云将奉也吳改元寶鼎以所在得大鼎改元吳主以陸凱為左丞相萬彧為右丞相吳主惡人視已羣臣侍見莫敢舉目惡音烏路翻見音賢遍翻陸凱曰君臣無不相識之道若猝有不虞不知所赴吳主乃聽凱自視而它人如故唯凱得視之它人仍舊不得視也吳主居武昌揚州之民泝流供給甚苦之吳武昌屬荆州而丹陽宣城毗陵吳吳興㑹稽東陽新都臨海建安豫章臨川鄱陽廬陵皆屬揚州故苦於西上泝流以供給又奢侈無度公私窮匱凱上疏曰今四邉無事當務養民豐財而更窮奢極欲無災而民命盡無為而國財空臣竊憂之昔漢室既衰三家鼎立今曹劉失道皆為晉有此目前之明驗也臣愚但為陛下惜國家耳武昌土地危險塉确塉秦昔翻土薄也确音克角翻山多大石也非王者之都且童謠云寜飲建業水不食武昌魚寧還建業死不止武昌居此苦於泝流供給而為是謠也以此觀之足明人心與天意矣今國無一年之蓄禮記王制國無六年之蓄曰急無三年之蓄曰國非其國也况無一年之蓄乎民有離散之怨國有露根之漸以木為喻也本之所以能生殖者以有根本也根漸露則其本将撥而官吏務為苛急莫之或恤大帝時後宫列女及諸織絡數不滿百景帝以來乃有千數此耗財之甚也又左右之臣率非其人羣黨相扶害忠隱賢此皆蠧政病民者也臣願陛下省息百役罷去苛擾料出宫女去𦍑吕翻料音聊清選百官則天悦民附國家永安矣吳主雖不悦以其宿望特優容之得考異曰陳夀曰予連從荆揚來者凱所諌皓二十事博問吳人多云不聞凱有此表又按其文殊甚切直恐非皓之所能容忍也或以為凱藏之篋笥未敢宣行病困皓遣董朝省問欲言因以付之虛實難明故不著于篇然愛其指擿皓事足為後戒故鈔列于凱傳左今不取九月詔自今雖詔有所欲及已奏得可而於事不便者皆不可隱情既不可希指迎合又不可以遂事而不諫也戊戍有司奏大晉受禪於魏宜一用前代正朔服色如虞遵唐故事從之家語季康子問於孔子曰唐虞二帝其所尚何色孔子曰堯以火徳王色尚黄舜以土徳王色尚青董仲舒䇿引孔子曰無為而治者其舜乎改正朔易服色以順天命而已其餘盡循堯道何更為哉如二説則舜之承堯固改正朔易服色矣然考之古文尚書堯命羲和厯象日月星辰敬授人時舜正月上日受終于文祖協時用正日而已不言改正朔也易大傳曰黄帝堯舜埀衣裳而天下治書益稷帝曰予欲觀古人之象以五采彰施于五色作服而已不言易服色也漢興六厯有黄帝厯顓頊厯夏厯殷厯周厯魯厯無堯舜厯豈堯舜時用顓頊厯邪孔頴逹以為古之真厯至戰國及秦而亡漢初所存六厯後人託而為之此固無從考正也冬十月丙午朔日有食之無考異曰宋書志此食今從晉書永安山賊施但吳録曰永安今武康縣也沈約曰吳分烏程餘杭立永安縣晉武帝太康元年更名武康屬吳興郡宋白曰永安縣本漢烏程縣之餘不鄉因民勞怨聚衆數千人刼吳主庻弟永安侯謙作亂北至建業衆萬餘人未至三十里住擇吉日入城遣使以謙命召丁固諸葛靚固靚斬其使發兵逆戰於牛屯據吳厯牛屯去建業城二十一里靚􅍚正翻但兵皆無甲胄即時敗散謙獨坐車中生獲之固不敢殺以状白吳主吳主并其母及弟俊皆殺之初望氣者云荆州有王氣當破揚州王于况翻故吳主徙都武昌及但反自以為得計遣數百人鼓譟入建業殺但妻子云天子使荆州兵來破揚州賊十一月初并圓丘方丘之祀於南北郊鄭氏注禮記為高必因丘陵謂冬至祭天於圓丘之上為下必因川澤謂夏至祭地於方澤之中而四郊之祭又在圓丘方澤之外魏景初元年始營洛陽南委粟山為圓丘以冬至祭皇皇帝天於圓丘夏至祭皇皇后地於方丘而天郊所祭曰皇天之神地郊所祭曰皇地之祗今以二至之祀合於二郊是後圓丘方澤不别立罷山陽國督軍除其禁制魏奉漢獻帝為山陽公國於河内山陽縣之濁鹿城置督軍以防衛之至晉時帝孫康嗣立人心去漢乆矣故罷其衛兵除其禁制十二月吳主還都建業月考異曰吳志陸凱傳或曰寶鼎元年十二凱與丁奉丁固謀因皓謁廟欲廢皓立孫休子時左将軍留平領兵先驅故密語平平拒而不許誓以不泄是以不果按凱盡忠執義必不為此事况皓殘酷猜忌留平庸人若聞凱謀必不能不泄殆虛語耳今不取使后父衛将軍錄尚書事滕牧留鎮武昌朝士以牧尊戚頗推令諫爭爭讀曰諍滕后之寵由是漸衰更遣牧居蒼梧雖爵位不奪其實遷也在道以憂死何太后常保佑滕后太史又言中宮不可易吳主信巫覡在女曰巫在男曰覡覡刑狄翻故得不廢常供養升平宮皓尊其母何太后宫曰升平宮供居用翻養羊尚翻不復進見見賢遍翻諸姬佩皇后璽紱者甚衆滕后受朝賀表䟽而已璽斯氏翻紱音弗朝直遥翻吳主使黄門徧行州郡料取将吏家女行戶孟翻料音聊其二千石大臣子女歳歳言名年十五六一簡閲簡閲不中乃得出嫁中竹仲翻後宫以千數而採擇無已三年春正月丁卯立子衷為皇太子為惠帝亡晉張本詔以近世每立太子必有赦漢高帝為漢王立太子赦有罪文景武立太子賜民爵至宣帝立太子始大赦天下元帝立太子復賜民爵光武立太子彊赦天下其後立太子陽及明章立太子皆不赦魏文明率病篤然後立太子尋而踐阼有赦故革之今世運将平當示之以好惡好呼到翻惡烏路翻使百姓絶多幸之望曲惠小人朕無取焉遂不赦司𨽻校尉上黨李憙憙許記翻又讀曰憙劾故立進令劉友前尚書山濤中山王睦尚書僕射武陔各占官稻田劾戶槩翻又戶得翻陔柯開翻占之贍翻請免濤睦等官陔已亡請貶其謚詔曰友侵剥百姓以繆惑朝士其考竟以懲邪佞濤等不貳其過皆勿有所問憙亢志在公當官而行憙與喜同又音憙亢與抗同口浪翻可謂邦之司直矣詩鄭國風羔裘之辭光武有云貴戚且歛手以避二鮑事見四十二卷建武十一年其申敕羣僚各慎所司寛宥之恩不可數遇也數所角翻睦宣帝之弟子也臣光曰政之大本在於刑賞刑賞不明政何以成晉武帝赦山濤而褒李憙其於刑賞兩失之使憙所言為是則濤不可赦所言為非則憙不足褒褒之使言言而不用怨結於下威玩於上将安用之且四臣同罪劉友伏誅而濤等不問避貴施賤可謂政乎創業之初而政本不立将以垂統後世不亦難乎帝以李憙為太子太傅徴犍為李密為太子洗馬犍居言翻洗馬自漢以來有之晉職官志太子洗馬職為謁者祕書掌圖書釋奠講經則掌其事出則直者前驅導威儀洗漢書作先如淳曰先前驅也國語越王句踐親為夫差先馬先一作洗音悉薦翻密以祖母老固辭許之密所以辭者以旁無兼侍祖母與孫相依為命故也密與人交每公議其得失而切責之常言吾獨立於世顧影無儔然而不懼者以無彼此於人故也吳大赦以右丞相萬彧鎮巴丘夏六月吳主作昭明宫晉太康地記曰昭明宮方五百丈吳厯曰昭明宮在太初宮之東二千石以下皆自入山督伐木大開苑囿起土山樓觀窮極伎巧觀古玩翻伎渠綺翻功役之費以億萬計陸凱諫不聽中書丞華覈上䟽曰華戶化翻覈戶革翻上時掌翻漢文之世九州晏然賈誼獨以為如抱火厝於積薪之下而寝其上事見十四卷漢文帝六年今大敵據九州之地有大半之衆欲與國家為相吞之計非徒漢之淮南濟北而已也濟子禮翻比於賈誼之世孰為緩急今倉庫空匱編戶失業而北方積榖養民専心東向自洛進師而造江濱自蜀下兵而臨荆楚皆東向也又交趾淪没嶺表動揺事見上卷魏元帝咸熈元年胷背有嫌首尾多難乃國朝之厄會也若舍此急務盡力功作卒有風塵不虞之變難乃旦翻舍讀曰捨卒讀曰猝當委版築而應烽燧驅怨民而赴白刃此乃大敵所因以為資者也時吳俗奢侈覈又上䟽曰今事多而役繁民貧而俗奢百工作無用之器婦人為綺靡之飾轉相倣效耻獨無有兵民之家猶復逐俗言下至兵民之家亦隨俗好而事奢侈也復扶又翻内無甔石之儲應劭曰齊人名小甕曰甔受二斛晉灼曰石斗石也師古曰甔音都濫翻而出有綾綺之服上無尊卑等級之差下有耗財費力之損求其富給庸可得乎吳主皆不聽秋七月王祥以睢陵公罷睢音雖九月甲申詔増吏俸俸扶用翻以何曾為太保義陽王望為太尉荀顗為司徒顗魚豈翻禁星氣䜟緯之學星為星者氣望氣者東漢以來有䜟緯之學吳主以孟仁守丞相奉法駕東迎其父文帝神於明陵明陵在吳興烏程縣沈約曰孫皓改葬其父於烏程西山曰明陵中使相繼奉問起居巫覡言見文帝被服顔色如平生覡刑狄翻被皮義翻吳主悲喜迎拜於東門之外建業城東門也既入廟比七日三祭設諸倡伎晝夜娛樂比毗寐翻倡音昌樂音洛是歳遣鮮卑拓䟦沙漠汗歸其國沙漠汗入質見七十七卷魏元帝景元二年汗音寒四年春正月丙戌賈充等上所刋修律令充等所刋修就漢律九章増十一篇合二十篇六百二十條其不入律者悉以為令施行凡律令合二千九百二十六條上時掌翻帝親自臨講使尚書郎裴楷執讀始考異曰刑法志云泰三年事畢表上今從武紀裴楷傳云文帝時詔楷於御前執讀今從刑法志楷秀之從弟也從才用翻侍中盧珽珽它鼎翻中書侍郎范陽張華請抄新律死罪條目抄楚交翻謄冩也懸之亭傳以示民從之傳株戀翻又詔河南尹杜預為黜陟之課預奏古者黜陟擬議於心不泥於法泥乃計翻末世不能紀逺而專求密㣲疑心而信耳目疑耳目而信簡書簡書愈繁官方愈偽方術也言為官之方術也魏氏考課即京房之遺意劉劭考課法其畧見七十三卷魏明帝景初元年其文可謂至密然失於苛細以違本體故歴代不能通也豈若申唐堯之舊制取大捨小去密就簡俾之易從也易以豉翻下難易夫曲盡物理神而明之存乎其人去人而任法則以文傷理莫若委任逹官各考所統逹官顯官也居一官之長其事得專逹於上歳第其人言其優劣如此六載載子亥翻年也主者總集採案其言六優者超擢六劣者廢免六優謂六載俱優六劣謂六載俱劣優多劣少者平叙劣多優少者左遷其間所對不鈞品有難易主者固當凖量輕重㣲加降殺量音良殺所戒翻不足曲以法盡也其有優劣徇情不叶公論者當委監司隨而彈之監古銜翻監司御史司𨽻及諸州刺史也彈唐干翻劾也抨也若令上下公相容過此為清議大頽雖有考課之法亦無益也事竟不行丁亥帝耕籍田於洛水之北戊子大赦二月吳主以左御史大夫丁固為司徒右御史大夫孟仁為司空吳錄曰孟仁本名宗避皓字易焉三月戊子皇太后王氏殂帝居䘮之制一遵古禮夏四月戊戍睢陵元公王祥卒門無雜弔之賓其族孫戎歎曰太保當正始之世不在能言之流及閒與之言理致清逺豈非以徳掩其言乎正始所謂能言者何平叔數人也魏轉而為晉何益於世哉王祥所以可尚者孝於後母與不拜晉王耳君子猶謂其任人柱石而傾人棟梁也理致清逺言乎徳乎清談之禍迄乎永嘉流及江左猶未巳也己亥葬文明皇后有司又奏既虞除衰服葬日虞遇柔日再虞而三虞用剛日三虞必反而行之鄭氏曰虞安神之祭也骨肉歸于土䰟氣則無所不之孝子為其彷徨故三祭以安之詔曰受終身之愛而無數年之報情所不忍也有司固請詔曰患在不能篤孝勿以毁傷為憂前代禮典質文不同何必限以近制使逹䘮闕然乎逹䘮猶通䘮也羣臣請不已乃許之然猶素冠疏食以終三年如文帝之䘮秋七月衆星西流如雨而隕己卯帝謁崇陽陵九月青徐兖豫四州大水青州統齊國濟南樂安城陽東萊徐州統彭城下邳東海琅邪廣陵臨淮兖州統陳留濮陽濟隂高平任城東平濟北泰山豫州統潁川汝南襄城汝隂梁國沛譙魯弋陽安豐晉志曰青州取土居少陽其色青為名徐州取舒緩之義兖端也信也又云取兖水以名州豫者舒也言禀中和之氣性理安舒也大司馬石苞乆在淮南威惠甚著魏髙貴鄉公甘露三年平諸葛誕苞代鎮淮南至是凡十一年淮北監軍王琛惡之監古䘖翻惡烏路翻密表苞與吳人交通㑹吳人将入宼苞築壘遏水以自固帝疑之羊祜深為帝言苞必不然為于偽翻帝不信乃下詔以苞不料賊埶築壘遏水勞擾百姓䇿免其官武考異曰晉書紀及苞傳皆無苞免官年月蕭方等三十國春秋杜延業晉春秋置在此今從之苞傳又云敕琅邪王伷自下邳㑹夀春按武紀伷明年二月乃鎮下邳恐傳誤蕭方等梁元帝子也遣義陽王望帥大軍以徴之帥讀曰率苞辟河内孫鑠為掾掾俞絹翻鑠先與汝隂王駿善駿時鎮許昌鑠過見之駿知臺已遣軍襲苞私告之曰無與於禍與讀曰預鑠既出馳詣夀春勸苞放兵歩出都亭待罪夀春都亭也苞從之帝聞之意解苞詣闕以樂陵公還第吳主出東關冬十月使其将施績入江夏萬彧寇襄陽夏戶雅翻彧於六翻吳考異曰晉帝紀作郁今從志詔義陽王望統中軍歩騎二萬屯龍陂龍陂即摩陂更名見七十二卷魏明帝青龍元年為二方聲援㑹荆州刺史胡烈拒績破之望引兵還吳交州刺史劉俊大都督修則姓譜元冥之佐有修氏漢有屯騎校尉修炳将軍顧容前後三攻交趾交趾太守楊稷皆拒破之鬰林九真皆附於稷稷遣将軍毛炅董元攻合浦戰于古城古城葢合浦郡古城也炅古逈翻又古惠翻大破吳兵殺劉俊修則餘兵散還合浦稷表炅為鬰林太守元為九真太守十一月吳丁奉諸葛靚出芍陂攻合肥靚疾正翻芍音鵲安東将軍汝隂王駿拒却之以義陽王望為大司馬荀顗為太尉顗魚豈翻石苞為司徒五年春正月吳王立子瑾為皇太子二月分雍凉梁州置秦州晉志曰雍州以其四山之地故以雍名焉亦謂西北之位陽所不及隂陽氣雍閼也統京兆馮翊扶風安定北地新平始平凉州以其地處西方當寒凉也統金城西平武威張掖西郡燉煌酒泉西海梁州以西方金剛之氣彊梁也統漢中梓潼廣漢新都涪陵巴西巴東秦州統隴西南安天水略陽武都隂平等郡以胡烈為刺史先是鄧艾納鮮卑降者數萬先悉薦翻降戶江翻下同置於雍凉之間與民雜居朝廷恐其乆而為患以烈素著名於西方故使鎮撫之此河西鮮卑也青徐兖三州大水帝有滅吳之志壬寅以尚書左僕射羊祜都督荆州諸軍事鎮襄陽征東大将軍衛瓘都督青州諸軍事鎮臨菑鎮東大将軍東莞王伷都督徐州諸軍事鎮下邳祜綏懷逺近甚得江漢之心與吳人開布大信降者欲去皆聽之降戶江翻減戍邏之卒邏郎佐翻以墾田八百餘頃其始至也軍無百日之糧及其季年乃有十年之積祜在軍常輕裘緩帶身不披甲被皮義翻鈴閤之下侍衛不過十數人鈴下卒及閤下威儀也鈴下者有使令則掣鈴以呼之因以為名閣下威儀掌出入贊導及納謁受事濟隂太守巴西文立濟子禮翻守式又翻上言故蜀之名臣子孫流徙中國者宜量才叙用量音良以慰巴蜀之心以傾吳人之望帝從之太考異曰立傳載此表在遷子中庻子後按泰始七年立舉郤詵時猶為濟隂太守於今未為庻子也若諸葛京署吏不因立表則京先已署吏立不當更云宜量才叙用也乙未詔曰諸葛亮在蜀盡其心力其子瞻臨難而死義事見七十八卷魏元帝景元四年難乃旦翻其孫京宜隨才署吏又詔曰蜀将傅僉父子死於其主傅肜死見六十九卷魏文帝黄初三年傅僉死與諸葛瞻同年天下之善一也豈由彼此以為異哉僉息著募没入奚官息子也著與募二子之名也少府有奚官令凡男女没入者屬焉魏以來鄴都又有奚官督宜免為庻人帝以文立為散騎常侍漢故尚書犍為程瓊雅有徳業犍居言翻與立深交帝聞其名以問立對曰臣至知其人但年垂八十禀性謙退無復當時之望言其意望不求聞逹於當時也故不以上聞耳瓊聞之曰廣休可謂不黨矣文立字廣休論語曰君子不黨此吾所以善夫人也秋九月有星孛于紫宫孛蒲内翻冬十月吳大赦改元建衡封皇子景度為城陽王初汝南何定嘗為吳大帝給使及吳主即位自表先帝舊人求還内侍吳主以為樓下都尉典知酤糴事遂専為威福吳主信任之委以衆事左丞相陸凱靣責定曰卿見前後事主不忠傾亂國政寧有得以夀終者邪何以専為姦邪塵穢天聽宜自改厲不然方見卿有不測之禍定大恨之凱竭心公家忠懇内發表䟽皆指事不飾皆指實事不為文飾也及疾病吳主遣中書令董朝問所欲言凱陳何定不可信用宜授以外任奚熈小吏建起浦里塘亦不可聽吳主休之時嚴密嘗建此議熈盖祖其説姚信樓𤣥賀卲張悌郭逴逴敕角翻又勅畧翻薛瑩滕修及族弟喜抗或清白忠勤或資才卓茂皆社稷之良輔願陛下重留神思思相吏翻訪以時務使各盡其忠拾遺萬一邵齊之孫賀齊為吳主權将瑩綜之子𤣥沛人修南陽人也凱尋卒吳主素銜其切直有所恨怒蓄而不發者為銜且日聞何定之譖乆之竟徙凱家於建安吳主遣監軍虞汜汜音祀威南将軍薛珝珝况羽翻蒼梧太守丹陽陶璜從荆州道監軍李朂督軍徐存從建安海道從荆州道踰嶺而入交廣也從建安海道汎海而南也沈約曰建安本閩越秦立為閩中郡漢虛其地後立為冶縣屬㑹稽郡後分冶地為㑹稽東南二部都尉東部臨海是也南部建安是也吳主休永安三年分南部立為建安郡宋白曰孫䇿於建安十二年分東候官之地立建安縣即以年號為名皆㑹於合浦以擊交趾十二月有司奏東宫施敬二傅其儀不同晉制太子太傅中二千石少傅二千石太子先拜諸傅然後答之時末置詹事宮事大小皆由二𫝊帝曰夫崇敬師傅所以尊道重教也何言臣不臣乎臣不臣盖有司所奏之言其令太子申拜禮六年春正月吳丁奉入渦口水經渦水首受河南陽武縣蒗蕩渠東南至下邳淮陵縣入淮謂之渦口渦音戈載考異曰吳志丁奉𫝊建衡元年攻晉榖陽晉帝紀不奉傳不言入渦口疑是一事揚州刺史牽𢎞擊走之吳萬彧自巴丘還建業夏四月吳左大司馬施績卒以鎮軍大将軍陸抗都督信陵西陵夷道樂鄉公安諸軍事治樂鄉水經注樂鄉城在南平郡之孱陵縣江水逕其北江水又東逕公安縣北宋白曰樂鄉者春秋鄀國之地其城陸抗所築在松滋縣界晉地理志信陵縣屬建平郡沈約曰疑是吳立水經注曰江水自䕫城而東逕信陵縣南又東過夷陵縣南夷陵即西陵也樂鄉城在今江陵府松滋縣東樂鄉城北江中有砂磧對岸踏淺可渡江津要害之地也抗以吳主政事多闕上疏曰臣聞徳均則衆者勝寡力侔則安者制危此六國所以并於秦西楚所以屈於漢也今敵之所據非特關右之地鴻溝以西而國家外無連衡之援内非西楚之彊庻政陵遲黎民未乂議者所恃徒以長江峻山限帶封域此乃守國之末事非智者之所先也臣毎念及此中夜撫枕臨餐忘食夫事君之義犯而勿欺謹陳時宜十七條以聞抗傳云十七條失本不載吳主不納李朂以建安道不利殺導将馮斐引軍還将即亮翻初何定嘗為子求㛰於勗勗不許乃白勗枉殺馮斐擅徹軍還誅勗及徐存并其家屬仍焚勗尸定又使諸将各上御犬上時掌翻一犬至直縑數十匹纓紲直錢一萬紲私列翻係也以捕兎供㕑吳人皆歸罪於定而吳主以為忠勤賜爵列侯陸抗上疏曰小人不明理道所見既淺雖使竭情盡節猶不足任况其姦心素篤而憎愛移易哉吳主不從六月戊午胡烈討鮮卑秃髪樹機能於萬斛堆樹機能祖夀闐之在孕也其母相掖氏因寝而産於被中鮮卑謂被為秃髪因而氏焉至南凉秃髪烏孤則樹機能之五世孫也萬斛堆在温圍水東北安定郡高平縣界兵敗被殺都督雍凉州諸軍事扶風王亮遣将軍劉旂救之旂觀望不進亮坐貶為平西将軍旂當斬亮上言節度之咎由亮而出乞丐其死丐居太翻貸其死命也詔曰若罪不在旂當有所在乃免亮官遣尚書樂陵石鑑行安西将軍都督秦州諸軍事樂陵縣漢屬平原郡後分屬樂陵國討樹機能樹機能兵盛鑑使秦州刺史杜預出兵擊之預以虜乘勝馬肥而官軍縣乏縣讀曰懸宜并力大運芻糧須春進討鑑奏預稽乏軍興檻車徴詣廷尉以贖論時預以尚主在八議以侯贖論既而鑑討樹機能卒不能克卒子恤翻秋七月乙巳城陽王景度卒丁未以汝隂王駿為鎮西大将軍都督雍凉等州諸軍事鎮關中冬十一月立皇子東為汝南王吳主從弟前将軍秀為夏口督吳主惡之民間皆言秀當見圖秀吳主權弟匡之孫從才用翻惡烏路翻㑹吳主遣何定将兵五千人獵夏口秀驚夜将妻子親兵數百人來奔十二月拜秀票騎将軍開府儀同三司封㑹稽公厚其封賞以攜吳人票匹妙翻㑹工外翻是歳吳大赦初魏人居南匈奴五部於并州諸郡與中國民雜居南匈奴自東漢以來分居并州諸郡魏但分其衆為五部耳事見六十七卷漢獻帝建安二十一年時左部所統可萬餘落居太原故兹氏縣右部可六千餘落居祁縣南部可三千餘落居浦子縣北部可四千餘落居新興縣中部可六千餘落居大陵縣自謂其先漢氏外孫因改姓劉氏初漢高帝以女妻單于故自謂漢氏外孫冒姓劉氏七年春正月匈奴右賢王劉猛叛出塞豫州刺史石鑑坐擊吳軍虛張首級詔曰鑑備大臣吾所取信而乃下同為詐義得爾乎爾猶言如此也今遣歸田里終身不得復用復扶又翻吳人刁𤣥詐増讖文曰黄旗紫葢見於東南終有天下者荆揚之君姓譜刁姓齊大夫豎刁之後予按豎刁安得有後漢書貨殖傳有刁閒江表傳曰𤣥使蜀得司馬徽論運命厯數事因詐増其文以誑吳人見賢遍翻吳主信之是月晦大舉兵出華里華里在建業西載太后皇后及後宫數千人從牛渚西上水經注牛渚在姑孰烏江兩縣界中今太平州當塗縣北三十里有牛渚山山下有牛渚磯與和州横江渡相對杜佑曰牛渚圻即今當塗縣采石東觀令華覈等固諫不聽東觀令典校圖書及記述觀古玩翻華戸化翻覈戶革翻行遇大雪道途䧟壞兵士被甲持仗被皮義翻百人共引一車寒凍殆死皆曰若遇敵便當倒戈紂發兵與周武王㑹戰于牧野前徒倒戈攻其後以北吳主聞之乃還還從宣翻又如字帝遣義陽王望統中軍二萬騎三千屯夀春以備之聞吳師退乃罷三月丙戍鉅鹿元公裴秀卒夏四月吳交州刺史陶璜襲九真太守董元殺之楊稷以其将王素代之意考異曰璜傳云出其不徑至交趾按元乃九真太守非交趾也華陽國志云元病亡楊稷更以王素代之按武帝紀四月九真太守董元為吳将虞汜所攻軍敗死之則元非病亡葢稷雖以素代元未至郡而元死也北地胡宼金城凉州刺史牽𢎞討之衆胡皆内叛與樹機能共圍𢎞於青山續漢志青山在北地郡參䜌縣界賢曰青山在今慶州有青山水𢎞軍敗而死崔考異曰鴻十六國春秋秃髪烏孤傳云其先樹機能本河西鮮卑泰始中殺秦州刺史胡烈斬凉州刺史牽𢎞晉帝紀叛虜殺胡烈北地胡殺牽𢎞皆不言鮮卑蓋言羣虜内叛則鮮卑亦在其中矣或北地胡即樹機能也初大司馬陳騫言於帝曰胡烈牽𢎞皆勇而無謀彊於自用非綏邉之材也将為國耻時𢎞為揚州刺史多不承順騫命時騫以大司馬都督揚州諸軍鎮夀春帝以為騫與𢎞不協而毁之于是徴𢎞既至尋復以為凉州刺史騫竊歎息以為必敗二人果失羌戎之和兵敗身没征討連年僅而能定帝乃悔之五月立皇子憲為城陽王辛丑義陽成王望卒侍中尚書令車騎将軍賈充自文帝時寵任用事帝之為太子充頗有力事見七十七卷七十八卷魏紀故益有寵於帝充為人巧謟與太尉行太子太傅荀顗晉志曰帝以儲副體尊命諸公居二傅職以本位尊故或行或領顗魚豈翻侍中中書監荀勗越騎校尉安平馮統安平縣前漢屬涿郡後漢屬安平國晉屬博陵郡紞都感翻相為黨友朝野惡之惡烏路翻帝問侍中裴楷以方今得失對曰陛下受命四海承風所以未比徳於堯舜者但以賈充之徒尚在朝耳朝直遥翻宜引天下賢人與𢎞政道不宜示人以私侍中樂安任愷河南尹潁川庾純皆與充不協充欲解其近職近職謂侍中任音壬乃薦愷忠貞宜在東宫帝以愷為太子少傅而侍中如故晉志曰侍中任愷帝所親敬使領少傅盖一時之制也觀此則充欲以計踈愷㑹樹機能寇亂秦雍雍於用翻帝以為憂愷曰宜得威望重臣有智畧者以鎮撫之帝曰誰可者愷因薦充純亦稱之秋七月癸酉以充為都督秦凉二州諸軍事侍中車騎将軍如故並考異曰三十國春秋晉春秋充出在八年二月按武帝紀充出在此月盖二春秋以太子納妃在八年二月致此誤也充患之吳大都督薛珝珝况羽翻與陶璜等兵十萬共攻交趾城中糧盡援絶為吳所䧟虜揚稷毛炅等璜愛炅勇徤欲活之炅謀殺璜璜乃殺之修則之子允生剖其腹割其肝曰復能作賊不不讀曰否炅猶罵曰恨不殺汝孫皓汝父何死狗也允父則為炅所殺見上四年與考異曰漢晉春秋曰初霍弋遣楊稷毛炅等戊交趾之誓曰若賊圍城未百日而降者家屬誅若過百日救兵不至而城没者吾受其罪稷等守未百日糧盡乞降於璜不許而給糧使守諸将並諌璜曰霍弋已死不能救稷等必矣可須其日滿然後受降使彼得無罪而我取有義内訓吾民外懐鄰國不亦可乎稷等期訖糧盡救兵不至乃納之華陽國志則云稷等城破被囚稷歐血死炅罵賊死二者相戾不可得合而晉陶璜傳兼載之按孫皓猜暴恐璜不敢以糧資敵今從華陽國志王素欲逃歸南中呉人獲之九真日南皆降於吳降戶江翻吳大赦以陶璜為交州牧璜討降夷獠獠魯皓翻州境皆平八月丙申城陽王憲卒分益州南中四郡置寧州寧州以建寧郡名州統建寧興古雲南永昌四郡九月吳司空孟仁卒冬十月丁丑朔日有食之晉考異曰宋書五行志有五月庚寅食無十月丁丑食書紀及天文志有十月丁丑食無五月庚寅食今從晉書十一月劉猛宼并州并州刺史劉欽擊破之晉志并州不以衛水為號又不以恒為稱而云并者以其在兩谷之間也統太原上黨西河樂平雁門新興按晉志所云以周禮并州鎮曰恒山春秋元命包曰營室流為并州分為衛國也賈充将之鎮公卿餞於夕陽亭賢曰夕陽亭在河南城西充私問計於荀勗勗曰公為宰相乃為一夫所制不亦鄙乎然是行也辭之實難獨有結婚太子可不辭而自留矣充曰然則孰可寄懷勗曰勗請言之因謂馮紞曰賈公逺出吾等失埶太子婚尚未定何不勸帝納賈公之女乎紞亦然之初帝将納衛瓘女為太子妃充妻郭槐賂楊后左右使后説帝求納其女帝曰衛公女有五可賈公女有五不可衛氏種賢而多子羙而長白五可種賢一也多子二也美三也長四也白五也五不可可以類推説輸芮翻種章勇翻下同賈氏種妬而少子醜而短黒后固以為請荀顗荀勗馮紞皆稱充女絶美且有才徳帝遂從之留充復居舊任為賈氏亂晉張本十二月以光禄大夫鄭袤為司空袤固辭不受袤音茂是歳安樂思公劉禪卒樂音洛考異曰晉春秋云禪謚惠公今從王隱蜀記吳以武昌都督廣陵范慎為太尉右将軍司馬丁奉卒據丁奉傳以救夀春之功拜左将軍誅孫綝拜大将軍加左右都䕶共迎吳主皓遷右大司馬左軍師當書右大司馬左軍師吳改明年元曰鳯皇以西苑言鳯皇集改元八年春正月監軍何楨討劉猛屢破之濳以利誘其左部帥李恪左部五部之一也帥所類翻恪殺猛以降降戶江翻二月辛夘皇太子納賈妃妃年十五長於太子二歳長知兩翻妬忌多權詐太子嬖而畏之嬖卑義翻又博計翻壬辰安平獻王孚卒年九十三孚性忠慎宣帝執政孚常自退損後逢廢立之際未嘗預謀景文二帝以孚屬尊亦不敢逼孚於廢立之際柔而能正事見七十六卷正元元年七十七卷景元元年及帝即位恩禮尤重元㑹詔孚乘輿上殿帝於阼階迎拜阼階東階主階也上時掌翻下同既坐親奉觴上夀如家人禮帝每拜孚跪而止之孚雖見尊寵不以為榮常有憂色臨終遺令曰有魏貞士河内司馬孚字叔逹不伊不周不夷不惠立身行道終始若一當衣以時服歛以素棺衣於既翻歛力瞻翻詔賜東園温明祕器服䖍曰東園温明形如方漆桶開一面漆畫之以鏡置其中以懸尸上大歛并蓋之師古曰東園署名也屬少府其署主作此器祕器梓棺以凶器故祕之諸所施行皆依漢東平獻王故事見四十八卷漢章帝建初八年其家遵孚遺㫖所給器物一不施用帝與右将軍皇甫陶論事泰始五年罷鎮軍将軍復置左右将軍姓譜左傳宋有皇父充石公族也漢初有皇父鸞自魯徙居茂陵改父為甫陶與帝爭言散騎常侍鄭徽表請罪之帝曰忠讜之言讜多曩翻善言也唯患不聞徽越職妄奏豈朕之意遂免徽官夏汶山白馬胡侵掠諸種漢武帝誅冉駹開汶山郡宣帝地節三年合於蜀郡蜀漢劉氏又立汶山郡白馬胡即白馬夷也汶讀與㟭同種章勇翻益州刺史皇甫晏欲討之益州統蜀犍為汶山漢嘉江陽朱提越嶲䍧柯晉志曰益之為言阨言所在之地險阨也亦曰疆壤益大故以名焉典學從事蜀郡何旅等典學從事典學挍及部諸郡文學掾漢諸州刺史有孝經師主監試經月令師主時節祭祀魏晉合其職為典學從事諫曰胡夷相殘固其常性未為大患今盛夏出軍水潦将降必有疾疫宜須秋冬圖之晏不聽胡康木子燒香言軍出必敗康木子燒香胡人之名晏以為沮衆斬之軍至觀阪水經注觀阪在都安縣晉書地理志都安縣屬汶山郡沈約曰都安縣蜀立宋白曰永康軍導江縣蜀都安縣地沮在吕翻牙門張𢎞等以汶山道險且畏胡衆因夜作亂殺晏軍中驚擾兵曹從事犍為楊倉勒兵力戰而死自漢以來諸州有軍事則置兵曹從事犍居言翻𢎞遂誣晏云率已共反故殺之傳首京師晏主簿蜀郡何攀州主簿錄閤下事省文書郡主簿所職略同方居母䘮聞之詣洛證晏不反𢎞等縱兵抄掠抄楚交翻廣漢主簿李毅言於太守𢎞農王濬曰皇甫侯起自諸生何求而反且廣漢與成都密邇而統於梁州者朝廷欲以制益州之衿領漢廣漢郡治雒泰始二年分新都郡治雒而廣漢郡治廣漢縣與成都相近衿衣系領衣要禬著項頷處也正防今日之變也今益州有亂乃此郡之憂也張𢎞小豎衆所不與宜即時赴討不可失也濬欲先上請上時掌翻下先上同毅曰殺主之賊為惡尤大當不拘常制何請之有濬乃發兵討𢎞詔以濬為益州刺史濬擊𢎞斬之夷三族𢎞考異曰華陽國志殺晏在十年五月武帝紀在今年六月按王濬請伐吳表云臣作船七年日有朽敗濬再為益州刺史方受詔作船咸寧五年下詔伐吳借使濬以其年上表則再為益州亦在泰始九年之前矣今從晉紀為定封濬關内侯初濬為羊祜參軍晉制諸位從公為持節都督參軍六人祜深知之祜兄子暨白濬為人志大奢侈不可専任宜有以裁之祜曰濬有大才将以濟其所欲必可用也更轉為車騎從事中郎祜為車騎将軍其屬有從事中郎秩比千石濬在益州明立威信蠻夷多歸附之俄遷大司農時帝與羊祜隂謀伐吳祜以為伐吳宜藉上流之埶宻表留濬復為益州刺史使治水軍治直之翻㝷加龍驤将軍監益梁諸軍事龍驤将軍之號始此驤思将翻監工銜翻晉制方靣之任資重者為都督諸軍事資望輕者為監軍事考異曰羊祜傳曰表留濬監益州諸軍事加龍驤将軍按濬傳祜密表留濬重拜益州刺史又曰尋以謠言拜龍驤将軍監梁益諸軍事然則作刺史與監軍自是二事也華陽國志又云咸寧四年濬遷大司農五年拜龍驤監梁益二州按是時羊祜已卒尤不可據詔濬罷屯田軍大作舟艦艦戶黯翻别駕何攀以為屯田兵不過五六百人作船不能猝辦後者未成前者已腐宜召諸郡兵合萬餘人造之嵗終可成濬欲先上須報上時掌翻攀曰朝廷猝聞召萬兵必不聽不如輙召輙専也設當見却功夫已成埶不得止濬從之令攀典造舟艦器仗於是作大艦長百二十歩長直亮翻受二千餘人以木為城起樓櫓開四出門其上皆得馳馬徃來華考異曰陽國志云咸寧二年三月濬受詔作船按濬表云作船七年則國志不可據也時作船木柹蔽江而下柹芳廢翻説文曰削木札樸也字本作柹詳見辨誤吳建平太守吳郡吾彦建平郡漢南郡之巫縣吳主權分置宜都郡吳主休永安三年分宜都立建平郡領信陵興山秭歸沙渠四縣杜佑曰建平今巴東郡吳置建平郡於柹歸姓譜吾本已姓夏昆吾氏之後取流柹以白吳主曰晉必有攻吳之計宜增建平兵以塞其衝要塞悉則翻吳主不從彥乃為鐵鎻斷江路斷丁管翻為後王濬燒斷銕鎻張本王濬雖受中制募兵而無虎符廣漢太守敦煌張斆收濬從事列上敦徒門翻斆胡教翻上時掌翻帝召斆還責曰何不宻啟而便收從事斆曰蜀漢絶逺劉備嘗用之矣輙收臣猶以為輕帝善之壬辰大赦秋七月以賈充為司空侍中尚書令領兵如故充自文帝時統城外諸軍充與侍中任愷皆為帝所寵任充欲専名埶而忌愷於是朝士各有所附朝直遥翻朋黨紛然帝知之召充愷宴于式乾殿而謂之曰朝廷宜壹大臣當和充愷等各拜謝既而充愷以帝已知而不責愈無所憚外相崇重内怨益深充乃薦愷為吏部尚書愷侍覲轉希既不為侍中則侍覲希矣充因與荀勗馮紞承間共譖之間古莧翻愷由是得罪廢於家八月吳主徴昭武将軍西陵督歩闡闡世在西陵自吳主權用歩隲督西陵隲卒子協繼之關協弟也猝被徴自以失職且懼有讒九月據城來降遣兄子璣璿詣洛陽為任璣璿皆協子降戶江翻璿如緣翻詔以闡為都督西陵諸軍事衛将軍開府儀同三司侍中領交州牧封宜都公冬十月辛未朔日有食之敦煌太守尹璩卒敦徒門翻璩求於翻凉州刺史楊欣表敦煌令梁澄領太守功曹宋質輙廢澄表議郎令狐豐為太守璩考異曰晉春秋作據今從武紀武紀云令狐豐廢澄自領郡事今從晉春秋楊欣遣兵擊之為質所敗敗補邁翻吳陸抗聞歩闡叛亟遣将軍左弈吾彥等討之帝遣荆州刺史楊肇迎闡於西陵車騎将軍羊祜帥歩軍出江陵巴東監軍徐𦙍帥水軍擊建平以救闡帥讀曰率陸抗敕西陵諸軍築嚴圍自赤谿至于故市水經注江水出西陵峽東南流逕故城洲洲北附岸洲頭曰郭洲長二里廣一里上有歩闡故城方圓稱洲周廻畧滿故城洲上城周里闡父騭所築也又東逕陸抗故城今峽州逺安縣在江北有孤山有陸抗故城有丹山時有赤氣意赤溪當出於丹山故市即歩騭故城所居成市而闡别築城故曰故市内以圍闡外以禦晉兵晝夜催切切迫也如敵已至衆甚苦之諸将諫曰今宜及三軍之鋭急攻闡比晉救至必可㧞也比必寐翻何事於圍以敝士民之力抗曰此城處埶既固處昌呂翻糧榖又足且凡備禦之具皆抗所宿規抗先嘗督西陵今反攻之不可猝㧞北兵至而無備表裏受難難乃旦翻何以禦之諸将皆欲攻闡抗欲服衆心聽令一攻果無利圍備始合而羊祜兵五萬至江陵諸将咸以抗不宜上自樂鄉而西赴西陵為上上時掌翻抗曰江陵城固兵足無可憂者假令敵得江陵必不能守所損者小若晉據西陵則南山羣夷皆當擾動其患不可量也乃自帥衆赴西陵南山謂江南諸山羣夷所依阻量音良帥讀曰率初抗以江陵之北道路平易易以豉翻敕江陵督張咸作大堰遏水漸漬平土以絶宼叛堰於扇翻今江陵有三海八櫃引諸湖及沮漳之水注之瀰漫數百里即作堰之故智也漸将亷翻羊祜欲因所遏水以船運糧揚聲将破堰以通歩軍抗聞之使咸亟破之諸将皆惑屢諫不聽祜至當陽聞堰敗乃改船以車運糧大費功力十一月楊肇至西陵陸抗令公安督孫遵循南岸拒羊祜防托南岸使祜軍不得渡而已水軍督畱慮拒徐𦙍恐𦙍順流東下故以水軍拒之抗自大将軍慿圍對肇慿長圍以對之則彼為客我為主将軍朱喬營都督俞贊亡請肇姓譜俞古善醫俞附之後抗曰贊軍中舊吏知吾虛實吾常慮夷兵素不簡練若敵攻圍必先此處先悉薦翻即夜易夷兵皆以精兵守之明日肇果攻故夷兵處抗命擊之矢石雨下肇衆死者相屬屬之欲翻十二月肇計屈夜遁抗欲追之而慮歩闡畜力伺間間古莧翻兵不足分于是但鳴鼔戒衆若将追者肇衆􅀢懼悉解甲挺走􅀢許拱翻恐懼聲挺待鼎翻㧞也挺走㧞身而走也抗使輕兵躡之肇兵大敗躡尼輙翻祜等皆引軍還抗遂㧞西陵誅闡及同謀将吏數十人皆夷三族自餘所請赦者數萬口元非同謀而脅從者請而赦之東還樂鄉貌無矜色謙冲如常吳主加抗都䕶吳官有左右都䕶今加都䕶盡䕶諸将也羊祜坐貶平南将軍征鎮安平四平最下車騎位次驃騎自此而下六等至四征祜自車騎貶平南凡降十四號楊肇免為庶人吳主既克西陵自謂得天助志益張大使術士尚廣筮取天下姓譜尚姓師尚父之後後漢有高士尚子平對曰吉庚子歳青葢當入洛陽其後吳亡皓入洛歳在庚子吳主喜不修徳政専為兼并之計賈充與朝士宴飲朝直遥翻十考異曰三十國春秋在十一月晉春秋在月己巳恐皆非實故附于冬末河南尹庾純醉與充爭言充曰父老不歸供養供居用翻養羊尚翻卿為無天地純曰高貴鄉公何在斥其弑君也充慙怒上表解職純亦上表自劾詔免純官仍下五府正其臧否當時除賈充之外居公位者有五故下五府下遐稼翻否音鄙石苞以為純榮官忘親當除名齊王攸等以為純於禮律未有違詔從攸議復以純為國子祭酒帝初立國子學定置國子祭酒博士各一人助教十五人以敎生徒吳主之游華里也事見上七年右丞相萬彧與右大司馬丁奉左将軍留平宻謀曰若至華里不歸社稷事重不得不自還吳主頗聞之以彧等舊臣隱忍不發是歳吳主因㑹以毒酒飲彧傳酒人私减之又飲留平飲於鴆翻平覺之服它藥以解得不死彧自殺彧考異曰吳志孫皓傳云被譴憂死今從江表傳平憂懣月餘亦死懣音悶又音滿徙彧子弟於廬陵初彧請選忠清之士以補近職吳主以大司農樓𤣥為宫下鎮主殿中事吳舊事禁中主者自用親近人皓以彧言用𤣥主殿中事𤣥正身帥衆帥讀曰率奉法而行應對切直吳主浸不悦中書令領太子太傅賀邵上疏諫曰自頃年以來朝列紛錯朝直遥翻真偽相貿貿音茂忠良排墜信臣被害被皮義翻是以正士摧方摧方言刓稜角而為圓也而庸臣茍媚先意承指各希時趣先悉薦翻人執反理之評士吐詭道之論詭違也異也遂使清流變濁忠臣結舌陛下處九天之上隱百里之室管子曰堂上逺於百里處昌呂翻言出風靡令行景從親洽寵媚之臣日聞順意之辭将謂此輩實賢而天下已平也臣聞興國之君樂聞其過荒亂之主樂聞其譽樂音洛譽音余或音如字聞其過者過日消而福臻聞其譽者譽日損而禍至陛下嚴刑法以禁直辭黜善士以逆諫口杯酒造次死生不保造七到翻仕者以退為幸居者以出為福誠非所以保光洪緒熈隆道化也何定本僕𨽻小人身無行能行下孟翻而陛下愛其佞媚假以威福夫小人求入必進奸利定間者妄興事役發江邉戍兵以驅麋鹿老弱饑凍大小怨歎傳曰國之興也視民如赤子其亡也以民為草芥左傳曰陳逢滑曰國之興也視民如傷其亡也以民為土芥今法禁轉苛賦調益繁調徒釣翻中官近臣所在興事而長吏畏罪苦民求辦是以人力不堪家戸離散呼嗟之聲感傷和氣今國無一年之儲家無經月之蓄田而後宫之中坐食者萬冇餘人又北敵注目伺國盛衰伺相吏翻長江之限不可乆恃茍我不能守一葦可杭也詩云誰謂河廣一葦杭之毛氏曰抗渡也鄭𤣥曰言一葦加之則可以渡也願陛下豐基彊本割情從道則成康之治興聖祖之祚隆矣治直吏翻聖祖謂孫權吳主深恨之於是左右共誣樓𤣥賀邵相逢駐共耳語大笑駐駐車也謗訕政事俱被詰責訕山諫翻詰去吉翻送𤣥付廣州邵原復職既而復徙𤣥於交趾竟殺之乆之何定姦穢發聞亦伏誅聞音問羊祜歸自江陵務修徳信以懷吳人每交兵刻日方戰不為掩襲之計将帥有欲進譎計者輙飲以醇酒使不得言譎古宂翻飲於鴆翻祜出軍行吳境刈榖為糧皆計所侵送絹償之每㑹衆江沔遊獵常止晉地若禽獸先為吳人所傷而為晉兵所得者皆送還之于是吳邉人皆悦服成伐吳之計者祜也凡其所為皆豢吳也正以陸抗對境無間可乘故為是耳若曰務修德信則吾不知也祜與陸抗對境使命常通抗遺祜酒祜飲之不疑使䟽吏翻遺于季翻抗疾求藥於祜祜以成藥與之抗即服之人多諫抗抗曰豈有酖人羊叔子哉羊祜字叔子抗告其邊戍曰彼專為徳我專為暴是不戰而自服也各保分界而已分扶問翻無求細利吳主聞二境交和以詰抗抗曰一邑一鄉不可以無信義况大國乎臣不如此正是彰其徳於祜無傷也吳主用諸将之謀數侵盜晉邉數所角翻陸抗上疏曰昔有夏多罪而殷湯用師紂作淫虐而周武授鉞湯數夏之罪曰有夏多罪天命殛之武王數紂之罪曰淫酗肆虐穢徳彰聞戎商必克上時掌翻茍無其時雖復大聖亦宜養威自保不可輕動也今不務力農富國審官任能明黜陟任刑賞訓諸司以德諸司謂百執事之人有司存者撫百姓以仁而聽諸将徇名窮兵黷武動費萬計士卒彫瘁瘁秦醉翻宼不為衰而我已大病矣今爭帝王之資而昧十百之利此人臣之姦便非國家之良䇿也昔齊魯三戰魯人再克而亡不旋踵何則大小之埶異也祖張儀説齊湣王之言而畧變其文况今師所克獲不補所䘮乎吳主不從䘮息浪翻羊祜不附結中朝權貴朝直遥翻荀勗馮紞之徒皆惡之從甥王衍嘗詣祜陳事紞都感翻惡烏路翻從才用翻下同辭甚清辯祜不然之衍拂衣去祜顧謂賓客曰王夷甫方當以盛名處大位然敗俗傷化必此人也史言羊祜知人之鑑為懷帝時王衍誤國亡身張本夷甫衍字也敗補邁翻處昌吕翻及攻江陵祜以軍法将斬王戎衍戎之從弟也故二人皆憾之言論多毁祜時人為之語曰二王當國羊公無徳資治通鑑卷七十九
