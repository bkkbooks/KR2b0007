  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷二百七宋司馬光撰胡三省音注唐紀二十三起上章困敦七月盡㫋䝉大荒落正月凡四年有竒則天順聖皇后下久視元年秋七月獻俘於含樞殿季楷固獻契丹之俘也含樞殿盖在三陽宫太后以楷固為左玉鈐衛大將軍燕國公鈐其㢘翻燕因肩翻賜姓武氏召公卿合宴召公卿謂将帥合宴也舉觴屬仁傑曰屬之欲翻公之功也將賞之對曰此乃陛下威靈將帥盡力将帥上即亮翻下所類翻臣何功之有固辭不受閏月戊寅車駕還宫自三陽宫還洛陽宫己丑以天官侍郎張錫為鳯閣侍郎同平章事鸞臺侍郎同平章事李嶠罷為成均祭酒錫嶠之舅也故罷嶠政事丁酉吐蕃將麴莽布支寇凉州圍昌松吐從瞰入聲将即亮翻昌松縣即漢武威郡蒼松縣吕光改為昌松隴右諸軍大使唐休璟與戰於洪源谷使疏吏翻璟居永翻麴莽布支兵甲鮮華休璟謂諸將曰諸論既死諸論死見上卷聖厯二年麴莽布支新為將不習軍事望之雖如精鋭實易與耳請為諸君破之乃被甲先陷陳易以䜴翻為于偽翻被皮義翻陳讀曰陣六戰皆㨗吐蕃大奔斬首二千五百級獲二禆將而還還音旋又如音司府少卿楊元亨光宅元年改大府寺為司府寺尚食奉御楊元禧皆𢎞武之子也楊𢎞武見二百一卷髙宗乾封二年元禧嘗忤張易之忤五故翻易之言於太后元禧楊素之族素父子隋之逆臣子孫不應供奉太后從之壬寅制楊素及其兄弟子孫皆不得任京官左遷元亨睦州刺史元禧貝州刺史馬何羅為逆於漢武之時而馬援貴顕於東都再造之日沈充失身於王敦而沈勁盡節於司馬惡惡止其身追罪異代之臣而併弃其子孫此盖出於一時之愛憎姑以是説而藉口耳睦州京師東南三千六百五十九里至東都二千八百二十一里貝州京師東北一千七百八十二里至東都九百九十三里庚戌以魏元忠為隴右諸軍大使撃吐蕃庚申太后欲造大像使天下僧尼日出一錢以助其功尼女夷翻狄仁傑上䟽諫其略曰今之伽藍上時掌翻疏所去翻伽藍佛寺也梵語云僧伽藍摩僧伽藍摩猶中華言衆園也伽求加翻制過宫闕功不使鬼止在役人物不天來終須地出不損百姓將何以求又曰游僧皆託佛法詿誤生人詿戸卦翻里陌動有經坊闤闠亦立精舍崔豹古今注闤市垣闠市門闤戸闗翻闠户對翻化誘所急切於官徴誘音酉法事所須嚴於制敕又曰梁武簡文捨施無限施式䜴翻及三淮沸浪五嶺騰烟用太宗詔中語列刹盈衢無救危亡之禍刹初鎋翻緇衣蔽路豈有勤王之師又曰雖歛僧錢百未支一尊容既廣不可露居覆以百層覆敷又翻尚憂未遍自餘廊宇不得全無如來設敎以慈悲為主釋氏謂佛為如來豈欲勞人以存虚飾又曰比來水旱不節比毗至翻當今邊境未寧若費官財又盡人力一隅有難將何以救之難乃旦翻太后曰公敎朕為善何得相違遂罷其役阿悉吉薄露叛阿悉吉即西突厥弩失畢五俟斤之阿悉結也薄露其名遣左金吾將軍田揚名殿中侍御史封思業討之軍至碎葉薄露夜於城傍剽掠而去思業將騎追之反為所敗剽匹妙翻將即亮翻騎竒寄翻敗補邁翻揚名引西突厥斛瑟羅之衆攻其城旬餘不克九月薄露詐降思業誘而斬之降戸江翻誘音酉遂俘其衆太后信重内史梁文惠公狄仁傑羣臣莫及常謂之國老而不名仁傑好面引廷爭好呼到翻爭讀曰諍太后毎屈意從之嘗從太后遊幸遇風吹仁傑巾墜而馬驚不能止太后命太子追執其鞚而繫之鞚苦貢翻仁傑屢以老疾乞骸骨太后不許入見常止其拜見賢遍翻曰毎見公拜朕亦身痛仍免其宿直戒其同僚曰自非軍國大事勿以煩公辛丑薨太后泣曰朝堂空矣自是朝廷有大事衆或不能决太后輒嘆曰天奪吾國老何太早邪太后嘗問仁傑朕欲得一佳士用之誰可者仁傑曰未審陛下欲何所用之太后曰欲用為將相將即亮翻相悉亮翻仁傑對曰文學緼藉緼於問翻藉慈夜翻則蘇味道李嶠固其選矣必欲取卓犖竒才犖吕角翻則有荆州長史張柬之其人雖老宰相才也太后擢柬之為洛州司馬自大州長史進神州司馬故曰擢數日又問仁傑對曰前薦柬之尚未用也太后曰已遷矣對曰臣所薦者可為宰相非司馬也乃遷秋官侍郎久之卒用為相卒子恤翻仁傑又嘗薦夏官侍郎姚元崇監察御史曲阿桓彦範太州刺史敬暉等數十人監古衘翻武徳三年以并州之太谷祈縣置太州六年州廢當是此時復置也考異曰梁公傳云張柬之桓彦範敬暉崔𤣥暐袁恕己皆公所薦公嘗退食之後謂五公曰所恨衰老身先朝露不得見五公盛事冀各保愛願盡本心五公心知目擊懸悟公意公寢疾五公候問偶對終日竟無一言少頃流涕及枕但相視而已五公退出遽不測其由袁恕己曰豈不氣力轉羸須問家事乎張柬之曰未聞大賢廢國謀家者也斯須命張柬之袁恕己桓彦範三公入餘二公立於門外曰向者無言盖以二公之故此二公能斷而不能宻若先與議之事必外泄一泄之後則國異而家亡也至是時或不與共之事亦不就梁王三思掌權可先取而後行也不然則必反生大禍狄公沒後經嵗餘五公潜㑹於幽聞之處叙公當時之言重結盟約徹饌之後相顧欲言未至其時恐負前諾欲言又止前後數四桓彦範乃叙其言言猶未畢聞戸牖之外聲若雷霆須臾風雨咫尺莫辨所坐牀褥悉擲於階下五公戰懼不知所據乃相謂曰此是狄公忠烈之至假此靈變以警衆心不欲吾軰先論此事未至其時不可復言也斯須天清日明不異於初易之等既誅袁謂張公曰昔有遺言使先収三思豈可舍諸張公曰但大事畢功此是机上之物豈有逃乎後梁王交通於内五公果為所譛俱遭流竄所期興廢年月遺約軌模少無異也按東之等五人偶同時在位恊力立功仁傑豈能預知其事舉此五人專欲使之輔立太子耶且易之等若有可誅之便太子有可立之勢仁傑身為宰相豈待五年之後須柬之等然後發邪此盖作傳者因五人建興復之功附㑹其事云皆仁傑所舉受教於仁傑耳其言譎怪無稽今所不取舊傳惟著舉柬之彦範暉三人姓名今從之率為名臣或謂仁傑曰天下桃李悉在公門矣程大昌演繁露趙簡子謂陽虎曰惟賢者為能報恩不肖者不能矣夫植桃李者夏得休息秋得其食植蒺藜者夏不得休息秋得其刺焉今子之所得者蒺藜也今世通以所薦士為桃李者説皆此本仁傑曰薦賢為國非為私也為于偽翻下為之同初仁傑為魏州刺史見二百五卷萬嵗通天元年有惠政百姓為之立生祠後其子景暉為魏州司功參軍貪暴為人患人遂毁其像焉史言狄仁傑盡忠所以勸天下之為人臣言其以景暉貪暴而毁祠所以戒天下之為人子冬十月辛亥以魏元忠為蕭闗道大總管以備突厥蕭闗在原州平髙縣界貞觀六年以突厥降戸置縁州治平髙之他樓城髙宗置他樓縣神龍元年省更置蕭闗縣厥九勿翻甲寅制復以正月為十一月一月為正月以十一月為正月事見二百四卷天授元年以一月為正月用夏正建寅也復扶又翻赦天下丁巳納言韋巨源罷以文昌右丞韋安石為鸞臺侍郎同平章事納言侍中文昌左丞尚書右丞鸞䑓門下安石津之孫也韋津死隋事見一百八十五卷髙祖武徳元年時武三思張易之兄弟用事安石數面折之數所角翻折之舌翻嘗侍宴禁中易之引蜀商宋覇子等數人在座同博安石跪奏曰商賈賤類不應得預此㑹顧左右逐出之座中皆失色太后以其言直勞勉之賈音古勞力到翻同列皆歡服而考異曰舊傳曰時鳯閣侍郎陸元方在座退告人曰此乃真宰相非吾屬所及也按新紀元方已罷相今不取丁夘太后幸新安壬申還宫還從宣翻又音如字十二月甲寅突厥掠隴右諸監馬萬餘匹而去厥九勿翻時屠禁尚未解禁屠見二百五卷長夀元年鳯閣舍人全節崔融上言鳯閣中書全節縣屬齊州漢晉之東平陵縣地後魏曰平陵屬濟南郡貞觀十七年齊王祐反平陵人不從更名全節上時掌翻以為割烹犧牲弋獵禽獸聖人著之典禮不可廢闕又江南食魚河西食肉一日不可無富者未革貧者難堪况貧賤之人仰屠為生日戮一人終不能絶但資恐喝喝呼葛翻徒長姦欺長知兩翻為政者茍順月令合禮經自然物遂其生人得其性矣戊午復開屠禁復扶又翻又音如字祠祭用牲牢如故長安元年是年十月始改元長安春正月丁丑以成州言佛迹見見賢遍翻改元大足自此以後是大足元年考異曰朝野僉載云司刑寺囚三百餘人秋分後無計可作乃於圓獄外羅墻角邊作聖人迹五尺至夜半三百人一時大呌内使推問云昨夜有一聖人見身長三丈靣作金色云汝等並枉寃不須怕懼天子萬年即有恩赦放汝把火照之見有偽跡即大赦天下改為大足元年識者相謂曰武家理天下足也按改元在春不在秋又無赦今不取二月己酉以鸞臺侍郎柏人李懐遠同平章事鸞䑓門下柏人縣自漢以來屬鉅鹿郡鉅鹿唐邢州天寳改曰堯山縣三月鳯閣侍郎同平章事張錫坐知選漏泄禁中語贓滿數萬當斬臨刑釋之流循州舊志循州至東都四千八百里選須絹翻時蘇味道亦坐事與錫俱下司刑獄下遐嫁翻錫乘馬意氣自若舍於三品院先是制獄既繁司刑寺别置三品院以處三品以上官之下獄者帷屏食飲無異平居味道歩至繫所席地而臥蔬食而已太后聞之赦味道復其位是月大雪蘇味道以為瑞帥百官入賀帥讀曰率殿中侍御史王求禮止之曰三月雪為瑞雪臘月雷為瑞雷乎味道不從既入求禮獨不賀進言曰今陽和布氣草木發榮而寒雪為災豈得誣以為瑞賀者皆諂䛕之士也太后為之罷朝為于偽翻下同左考異曰統紀在延載元年僉載在久視二年統紀云拾遺僉載云侍御史御史臺記云殿中侍御史統紀云味道無以對舊傳云求禮止之味道不從今年從僉載官從臺記事則參取諸書時又有獻三足牛者宰相復賀復扶又翻求禮颺言曰孔安國曰大言而疾曰颺颺于章翻凡物反常皆為妖妖於喬翻此鼎足非其人三公鼎足承君政敎不行之象也太后為之愀然愀七小翻夏五月乙亥太后幸三陽宫以魏元忠為靈武道行軍大總管以備突厥天官侍郎鹽官顧琮同平章事鹽官縣漢屬吴郡吴屬嘉興置海昌都尉梁陳屬錢塘郡隋屬餘杭郡唐屬杭州六月庚申以夏官尚書李迥秀同平章事迥秀性至孝其母本㣲賤妻崔氏常叱媵婢毋聞之不悦迥秀即時出之迥戸頃翻媵以證翻或曰賢室雖不避嫌疑然過非七出律妻犯七出者弃之一無子二淫佚三不事舅姑四口舌五竊盗六妬忌七惡疾何遽如是迥秀曰娶妻本以養親今乃違忤顔色養余亮翻忤五故翻安敢留也竟出之秋七月甲戌太后還宫甲申李懐遠罷為秋官尚書八月突厥黙啜寇邊命安北大都䕶相王為天兵道元師相悉亮翻帥所類翻統諸軍撃之未行而虜退丙寅武邑人蘇安恒上疏曰陛下欽先聖之顧托受嗣子之推讓先聖謂大帝嗣子謂皇嗣相王恒戸登翻上時掌翻疏所去翻下同推吐雷翻敬天順人二十年矣豈不聞帝舜搴裳周公復辟舜之於禹事祗族親旦與成王不離叔父史記舜黄帝之八代孫禹黄帝之𤣥孫故云族親周公武王之弟成王之叔父旦其名也離力智翻族親何如子之愛叔父何如母之恩今太子孝敬是崇春秋既壯若使統臨宸極何異陛下之身陛下年徳既尊寳位將倦機務煩重浩蕩心神何不禪位東宫自怡聖體自昔理天下者不見二姓而俱王也當今梁定河内建昌諸王武三思封梁王攸暨封定王懿宗封河内王攸寧封建昌王承陛下之䕃覆覆敷又翻並得封王臣謂千秋萬嵗之後於事非便臣請黜為公侯任以閒簡臣又聞陛下有二十餘孫今無尺寸之封此非長久之計也臣請分土而王之擇立師傅教其孝敬之道以夾輔周室屏藩皇家斯為羙矣屏卑郢翻疏奏太后召見見賢遍翻賜食慰諭而遣之太后春秋髙政事多委張易之兄弟邵王重潤與其妹永泰郡主主婿魏王武延基竊議其事重直龍翻易之訴於太后九月壬申太后皆逼令自殺人考異曰重潤傳云重潤為所構與其妹永泰郡主壻武延基等竊議張易之兄弟何得恣入宫中則天令杖殺今從實録延基承嗣之子也承嗣太后之姪丙申以相王知左右羽林衛大將軍事冬十月壬寅太后西入闗辛酉至京師赦天下改元改元長安十一月戊寅改含元宫為大明宫長安東内本曰大明宫髙宗龍朔三年曰蓬萊宫咸亨元年曰含元宫今復舊名天官侍郎安平崔𤣥暐安平縣漢屬涿郡後漢屬安平國後魏屬博陵郡唐屬定州性介直未嘗請謁執政惡之惡烏路翻改文昌左丞月餘太后謂𤣥暐曰自卿改官以來聞令史設齋自慶唐吏部四司令史八十人此欲盛為姦貪耳今還卿舊任乃復拜天官侍郎復扶又翻又如字仍賜綵七十段唐制凡品十段其率絹三疋布三端綿四屯若雜綵十段則絲布二疋紬二疋綾二疋縵四疋以主客郎中郭元振為凉州都督隴右將軍大使唐主客郎掌二王後及諸蕃朝聘之事屬禮部使疏吏翻先是凉州南北境不過四百餘里先悉薦翻突厥吐蕃頻嵗奄至城下百姓苦之元振始於南境硤口置和戎城北境磧中置白亭軍杜佑曰白亭守捉在凉州城西北五百里磧七迹翻控其衝要拓州境千五百里自是寇不復至城下復扶又翻元振又令甘州刺史李漢通開置屯田盡水陸之利舊凉州粟麥斛至數千及漢通收率之後收率者收民而率其耕一縑糴數十斛積軍粮支數十年元振善於撫御在凉州五年夷夏畏慕令行禁止牛羊被野夏戸雅翻被皮義翻路不拾遺二年春正月乙酉初設武舉武舉之制有長垜馬射步射平射筒射馬槍翹闗負重身材之選唐六典曰武舉以七等閲其人一曰射長垜試射長垜三十發不出第三院為第入中院為上入次院為次上入外院為次二曰騎射發而並中為上或中或不中為次上總不中為次三曰馬槍三板四板為上二板為次上一板反不中為次四曰歩射射草人中者為次上雖中而不法雖法而不中者為次五曰材貌以身長六尺已上者為次上已下為次六曰言語冇神采堪統領者為次上無者為次七曰舉重謂翹率以五次上為第皆試其髙第以名聞突厥寇鹽夏二州三月庚寅突厥破石嶺忻州定襄縣有石嶺闗杜佑曰定襄縣本漢陽曲縣有石嶺闗甚險固漢定襄郡在今馬邑郡地寇并州以雍州長史薛季昶攝右臺大夫充山東防禦軍大使滄瀛幽易恒定等州諸軍皆受季昶節度使疏吏翻恒戸登翻夏四月以幽州刺史張仁愿專知幽平媯檀防禦媯居為翻仍與季昶相知以拒突厥五月壬申蘇安恒復上疏曰復扶又翻臣聞天下者神堯文武之天下也髙祖神堯皇帝太宗文武皇帝陛下雖居正統實因唐氏舊基當今太子追回謂召廬陵王自房陵回復為太子年徳俱盛陛下貪其寳位而忘母子深恩將何聖顔以見唐家宗廟將何誥命以謁大帝墳陵髙宗稱天皇大帝陛下何故日夜積憂不知鐘鳴漏盡魏田豫告老曰譬猶鐘鳴漏盡而夜行不休此辠人也臣愚以為天意人事還歸李家陛下雖安天位殊不知物極則反器滿則傾臣何惜一朝之命而不安萬乘之國哉言不顧其死而上疏欲以安國也乘䋲證翻太后亦不之辠乙未以相王為并州牧充安北道行軍元帥帥所翻翻以魏元忠為之副六月壬戌召神都留守韋巨源詣京師以副留守李嶠代之守手又翻秋七月甲午突厥寇代州司僕卿張昌宗光宅元年改太僕寺為司僕寺兄弟貴盛埶傾朝野朝直遥翻八月戊午太子相王太平公主上表請封昌宗為王制不許壬戌又請乃賜爵鄴國公敕自今有告言揚州及豫博餘黨揚州事見二百三卷光宅元年豫博事見二百四卷垂拱四年一無所問内外官司無得為理為于偽翻九月乙丑朔日有食之不盡如鉤神都見其既壬申突厥寇忻州己夘吐蕃遣其臣論彌薩來求和薩桑葛翻庚辰以太子賓客武三思為大谷道大總管洛州長史敬暉為副辛巳又以相王旦為并州道元帥三思與武攸宜魏元忠為之副姚元崇為長史司禮少卿鄭杲為司馬欲以撃突厥然竟不行癸未宴論彌薩於麟徳殿麟徳殿在大明宫右銀臺門内殿西重廊之後即翰林院是殿有三面亦曰三殿時凉州都督唐休璟入朝亦預宴璟居永翻朝直遥翻彌薩屢窺之太后問其故對曰洪源之戰此將軍猛厲無敵故欲識之太后擢休璟為右武威金吾二衛大將軍龍朔改左右威衛曰左右武威衛休璟練習邊事自碣石以西踰四鎮綿亘萬里山川要害皆能記之碣石在遼西四鎮在西域此言唐之西北二邊其山川要害休璟皆能記之也碣其謁翻亘古鄧翻冬十月甲辰天官侍郎同平章事顧琮薨戊申吐蕃贊普將萬餘人寇茂州將即亮翻都督陳大慈與之四戰皆破之斬首千餘級十一月辛未監察御史魏靖上疏以為陛下既知來俊臣之姦處以極法監古衘翻上時掌翻疏所去翻處昌吕翻乞詳覆俊臣等所推大獄伸其枉濫太后乃命監察御史蘇頲按覆俊臣等舊獄由是雪寃者甚衆考異曰松忩雜録中宗嘗召宰相蘇瓌李嶠子進見二丞相子皆童年迎撫於赭𫀆前賜與甚厚因語二兒曰爾宜意所通書可為奏吾者言之頲應曰木從䋲則正后從諌則聖嶠子亡其名亦進曰斮朝渉之脛剖賢人之心上曰蘇瓌有子李嶠無兒按頲此年已為御史瓌為相時頲為中書舍人父子同掌樞宻非童年也今不取頲䕫之曾孫也頲它鼎翻蘇䕫威之子隋開皇初議樂戊子太后祀南郊赦天下十二月甲午以魏元忠為安東道安撫大使使疏吏翻下同羽林衛大將軍李多祚檢校幽州都督右羽林衛將軍薛訥左武衛將軍駱務整為之副戊申置北庭都䕶府於庭州太宗平髙昌於西州之北置庭州即漢車師後王之地侍御史張循憲為河東采訪使有疑事不能决病之問侍吏曰此有佳客可與議事者乎吏言前平鄉尉猗氏張嘉貞有異才魏収志廣平郡任縣有平鄉城隋置平鄉縣治古鉅鹿城屬邢州猗氏縣古郇國自漢以來屬河東郡循憲召見詢以事嘉貞為條析理分隨條而析之隨理而分之為于偽翻莫不洗然洗與洒同蘇蟹翻洗然悚然也循憲因請為奏皆意所未及循憲還見太后見賢遍翻太后善其奏循憲具言嘉貞所為且請以己之官授之太后曰朕寧無一官自進賢邪因召嘉貞入見内殿見賢遍翻與語大悦即拜監察御史擢循憲司勲郎中唐司勲郎掌邦國宫人之勲級屬吏部監古衘翻賞其得人也三年春三月壬戌朔日有食之夏四月吐蕃遣使獻馬千匹金二千兩以求昏使疏吏翻下同閏月丁丑命韋安石留守神都己夘改文昌臺為中䑓光宅元年改尚書省為文昌䑓以中臺左丞李嶠知納言事新羅王金理洪卒卒子恤翻遣使立其弟崇基為王六月辛酉突厥黙啜遣其臣莫賀干來請以女妻皇太子之子妻七細翻寧州大水溺殺二千餘人溺奴狄翻秋七月癸夘以正諫大夫朱敬則同平章事厯考異曰新紀云壬寅唐云十四日癸夘今從之戊申以相王旦為雍州牧相悉亮翻雍於用翻從考異曰唐厯十八日丁未今實録庚戌以夏官尚書檢校凉州都督唐休璟同鳯閣鸞䑓三品時突騎施酋長烏質勒與西突厥諸部相攻騎竒寄翻酋慈由翻長知兩翻記考異曰武平一景龍文舘作烏折勒今從新舊書安西道絶太后命休璟與諸宰相議其事頃之奏上上時掌翻太后即依其議施行後十餘日安西諸州請兵應接程期一如休璟所畫太后謂休璟曰恨用卿晩謂諸宰相曰休璟練習邊事卿曹十不當一時西突厥可汗斛瑟羅用刑殘酷諸部不服烏質勒本𨽻斛瑟羅號莫賀逹干能撫其衆諸部歸之斛瑟羅不能制烏質勒置都督二十員各將兵七千人屯碎葉西北将即亮翻後攻陷碎葉徙其牙帳居之斛瑟羅部衆離散因入朝不敢復還天授元年書斛瑟羅入居内地神功元年書來俊臣誣陷斛瑟羅則其入朝必不在是年此因書烏質勒事叙其得國之由遂及斛瑟羅失國事耳朝直遥翻烏質勒悉併其地九月庚寅朔日有食之既初左臺大夫同鳯閣鸞臺三品魏元忠為洛州長史洛陽令張昌儀恃諸兄之埶每牙直上長史聽事凡牙參者立於庭下上時掌翻聽讀曰㕔元忠到官叱下之下遐嫁翻張易之奴暴亂都市元忠杖殺之及為相太后召易之弟岐州刺史昌期欲以為雍州長史對仗問宰相曰誰堪雍州者元忠對曰今之朝臣無以易薛季昶雍於用翻朝直遥翻太后曰季昶久任京府朕欲别除一官昌期何如諸相皆曰陛下得人矣元忠獨曰昌期不堪太后問其故元忠曰昌期少年不閑吏事少詩照翻曏在岐州戸口逃亡且盡雍州帝京事任繁劇不若季昶彊幹習事太后黙然而止元忠又嘗面奏臣自先帝以來䝉被恩渥今承乏宰相元忠自言朝廷乏人已得承乏備位宰相被皮義翻不能盡忠死節使小人在側臣之罪也小人在側斥張易之兄弟太后不悦由是諸張深怨之司禮丞髙戩太平公主之所愛也司禮丞即太常丞戩即淺翻㑹太后不豫張昌宗恐太后一日晏駕為元忠所誅乃譛元忠與戩私議云太后老矣不若挾太子為久長言為久長之計太后怒下元忠戩獄下遐嫁翻將使與昌宗廷辨之昌宗宻引鳯閣舍人張説賂以羙官使證元忠説許之説讀曰悦明日太后召太子相王及諸宰相使元忠與昌宗參對往復不决昌宗曰張説聞元忠言請召問之太后召説説將入鳯閣舍人南和宋璟南和縣漢屬廣平國宋白曰水經云北有和成縣故此縣云南後周置南和郡隋廢郡為縣唐屬邢州璟居永翻謂説曰名義至重鬼神難欺不可黨邪陷正以求茍免若獲罪流竄其榮多矣若事有不測璟當叩閤力爭言叩閤門而力爭也程大昌曰凡内殿便殿皆可謂之閤與子同死努力為之萬代聸仰在此舉也殿中侍御史濟源張廷珪曰朝聞道夕死可矣論語載孔子之言濟子禮翻左史劉知幾曰無汚青史為子孫累幾居希翻汚烏故翻累力瑞翻及入太后問之説未對元忠懼謂説曰張説欲與昌宗共羅織魏元忠邪説叱之曰元忠為宰相何乃效委巷小人之言昌宗從旁廹趣説使速言趣謂曰促説曰陛下視之在陛下前猶逼臣如是况在外乎臣今對廣朝不敢不以實對朝直遥翻臣實不聞元忠有是言但昌宗逼臣使誣證之耳易之昌宗遽呼曰呼火故翻張説與魏元忠同反太后問其状對曰説嘗謂元忠為伊周伊尹放太甲周公攝王位非欲反而何説曰易之兄弟小人徒聞伊周之語安知伊周之道日者元忠初衣紫衣於既翻太宗貞觀四年詔三品以上服紫臣以郎官往賀元忠語客曰無功受寵不勝慙愳語牛倨翻勝音升臣實言曰明公居伊周之任何愧三品彼伊尹周公皆為臣至忠古今慕仰陛下用宰相不使學伊周當使學誰邪且臣豈不知今日附昌宗立取台衡三台為㤗階北斗杓三星為玉衡宰輔得人則玉衡正而㤗階平故謂宰輔為台衡附元忠立教族滅但臣畏元忠寃魂不敢誣之耳太后曰張説反覆小人宜并繫治之治直之翻它日更引問説對如前太后怒命宰相與河内王武懿宗共鞫之説所執如初朱敬則抗疏理之曰元忠素稱忠正張説所坐無名若令抵罪失天下望蘓安恒亦上疏恒戸登翻上時掌翻疏所去翻以為陛下革命之初人以為納諫之主暮年以來人以為受佞之主自元忠下獄里巷恟恟下遐嫁翻恟許勇翻皆以為陛下委信姦宄斥逐賢良忠臣烈士皆撫髀於私室而箝口於公朝畏迕易之等意箝其㢘翻朝直遥翻迕五故翻徒取死而無益方今賦役煩重百姓凋弊重以讒慝專恣刑賞失中重以直用翻竊恐人心不安别生它變爭鋒於朱雀門内問鼎於大明殿前朱雀門謂宫城南門大明殿即含元殿陛下將何以謝之何以禦之易之等見其疏大怒欲殺之頼朱敬則及鳯閣舍人桓彦範著作郎陸澤魏知古保救得免先天元年方復置深州又分饒陽鹿城於古􅀈城置陸澤縣史因魏知古貴顕於開元之時遂以後來土斷書之􅀈苦么翻遣考異曰舊傳云易之欲遣刺客殺之若遣刺客必不人知敬則等安能保䕶盖欲白太后殺之耳丁酉貶魏元忠為髙要尉髙要縣漢屬蒼梧郡宋齊屬南海郡陳置髙要郡隋帶端州戩説皆流嶺表元忠辭日言於太后曰臣老矣今向嶺南十死一生陛下它日必有思臣之時太后問其故時易之昌宗皆侍側元忠指之曰此二小兒終為亂階易之等下殿叩膺自擲稱寃太后曰元忠去矣殿中侍御史景城王睃景城縣漢屬勃海郡後魏并入城平縣隋開皇十八年改曰景城屬滄州睃私潤翻又音俊復奏申理元忠復扶又翻下子復同宋璟謂之曰魏公幸已得全今子復冒威怒得無狼狽乎睃曰魏公以忠獲罪睃為義所激顛沛無恨璟嘆曰璟不能申魏公之枉深負朝廷矣太子僕崔貞慎等八人餞元忠於郊外唐制太子僕從四品下掌太子車輿乘騎儀仗之政令易之詐為告宻人柴明狀稱貞慎等與元忠謀反太后使監察御史丹徒馬懐素鞫之丹徒春秋時吴之朱方也漢為丹徒縣屬㑹稽郡吴為京口戍晉以下為南徐州隋為延陵縣屬江都郡唐為丹徒縣帶潤州監古衘翻謂懷素曰兹事皆實略問速以聞頃之中使督趣者數四使疏吏翻趣讀曰促曰反狀昭然何稽留如此懷素請柴明對質太后曰我自不知柴明處但據狀鞫之安用告者懷素據實以聞太后怒曰卿欲縱反者邪對曰臣不敢縱反者元忠以宰相謫官貞慎等以親故追送若誣以為反臣實不敢昔欒布奏事彭越頭下漢祖不以為辠欒布事見十二卷漢髙祖十一年况元忠之刑未如彭越而陛下欲誅其送者乎且陛下操生殺之柄操干髙翻欲加之罪取决聖衷可矣若命臣推鞫臣不敢不以實聞太后曰汝欲全不罪邪對曰臣智識愚淺實不見其罪太后意解貞慎等由是獲免太后嘗命朝貴宴集朝直遥翻易之兄弟皆位在宋璟上易之素憚璟欲悦其意虚位揖之曰公方今第一人何乃下坐璟曰才劣位卑張卿以為第一何也天官侍郎鄭杲謂璟曰中丞奈何卿五郎是考異曰新舊傳皆作鄭善果按善果乃髙祖時人新舊傳皆誤當從御史臺記璟曰以官言之正當為卿足下非張卿家奴何郎之有門生家奴呼其主為郎今俗猶謂之郎主舉坐悚惕坐徂臥翻時自武三思以下皆謹事易之兄弟璟獨不為之禮諸張積怒常欲中傷之中竹仲翻太后知之故得免丁未以左武衛大將軍武攸宜充西京留守守式又翻冬十月丙寅車駕發西京乙酉至神都十一月突厥遣使謝許昏使疏吏翻丙寅宴於宿羽臺宿羽臺在東都宿羽宫中髙宗調露元年所起太子預焉宫尹崔神慶上疏上時掌翻疏所去翻以為今五品以上所以佩龜者為别敕徴召恐有詐妄内出龜合然後應命况太子國本古來徴召皆用玉契唐制百官冇隨身魚符以明貴賤應召命左二右一左者進内右者隨身皇太子以玉契召勘合乃赴親王以金庻官以銅皆題其位姓名盛以魚袋天授二年改佩魚為龜張鷟朝野僉載曰唐以鯉魚為符遂為魚符至偽周武姓也𤣥武龜也因改魚符為龜符為于偽翻此誠重慎之極也昨縁突厥使見太子應預朝參使疏吏翻見賢遍翻朝直遥翻下同直有文符下宫曽不降敕處分下遐嫁翻處昌吕翻分扶問翻臣愚謂太子非朔望朝參應别召者望降墨敕及玉契太后甚然之始安獠歐陽倩始安郡桂州范成大桂海虞衡志曰獠依山林而居無酋長版籍蠻之荒忽無常者也以射生食動為活蟲豸能蠕動者皆取食獠魯皓翻擁衆數萬攻陷州縣朝廷思得良吏以鎮之朱敬則稱司封郎中裴懷古有文武才唐司封郎掌國之封爵屬吏部制以懷古為桂州都督仍充招慰討撃使使疏吏翻懷古纔及嶺上飛書示以禍福倩等迎降降戸江翻且言為吏所侵逼故舉兵自救耳懐古輕騎赴之騎竒寄翻左右曰夷獠無信不可忽也懷古曰吾仗忠信可通神明而况人乎遂詣其營賊衆大喜悉歸所掠貨財諸洞酋長素持兩端者皆來欵附酋慈由翻長知兩翻嶺外悉定是嵗分命使者以六條察州縣使疏吏翻吐蕃南境諸部皆叛贊普器弩悉㺯自將撃之卒於軍中将即亮翻卒子恤翻諸子爭立久之國人立其子弃𨽻蹜贊為贊普生七年矣史言諸論既死吐蕃國勢稍衰四年春正月丙申冊拜右武衛將軍阿史那懷道為西突厥十姓可汗懷道斛瑟羅之子也厥九勿翻可從刋入聲汗音寒丁未毁三陽宫以其材作興泰宫於萬安山萬安山在洛州夀安縣西南四十里二宫皆武三思建議為之請太后每嵗臨幸功費甚廣百姓苦之左拾遺盧藏用上疏以為左右近臣多以順意為忠朝廷具僚皆以犯忤為戒上時掌翻疏所去翻朝直遥翻忤五故翻致陛下不知百姓失業傷陛下之仁陛下誠能以勞人為辭發制罷之則天下皆知陛下苦已而愛人也不從藏用承慶之弟孫也盧承慶見二百卷顕慶二年壬子以天官侍郎韋嗣立為鳯閣侍郎同平章事天官吏部嗣祥吏翻夏官侍郎同鳯閣鸞臺三品李迥秀頗受賄賂監察御史馬懷素劾奏之夏官兵部鳯閣鸞臺中書門下迥户頃翻監古衘翻劾户槩翻又戸得翻二月癸亥迥秀貶廬州刺史隋改梁周之合州為廬州唐因之舊志廬州京師東南二千三百八十七里至東都一千五百六十九里壬申正諫大夫同平章事朱敬則以老疾致仕敬則為相相悉亮翻以用人為先自餘細務不之視太后嘗與宰相議及刺史縣令三月己丑李嶠唐休璟等奏竊見朝廷物議遠近人情莫不重内官輕外職每除授牧伯皆再三披訴比來所遣外任多是貶累之人比毗至翻累力瑞翻罪累也風俗不澄實由於此望於臺閣寺監妙簡賢良分典大州共康庶績臣等請輟近侍率先具僚太后命書名探之探吐南翻得韋嗣立及御史大夫楊再思等二十人癸巳制各以本官檢校刺史嗣立為汴州刺史舊志汴州京師東一千三百五十里東都四百一里其後政績可稱者唯常州刺史薛謙光徐州刺史司馬鍠而已鍠户萌翻又音皇常州京師東南二千八百四十三里至東都一千九百八十三里徐州京師東二千六百四里東都東一千二百五十七里丁丑徙平恩王重福為譙王重直龍翻以夏官侍郎宗楚客同平章事鳯閣侍郎同鳯閣鸞臺三品蘇味道謁歸葬其父制州縣供𦵏事味道趙州欒城縣人味道因之侵毁鄉人墓田役使過度監察御史蕭至忠劾奏之左遷坊州刺史唐之先元皇帝周天和中為敷州刺史於中部縣置馬坊髙祖武徳二年因分鄜州之中部鄜城置坊州至忠引之𤣥孫也蕭引見一百七十卷陳宣帝太建二年監古衘翻劾户槩翻又戸得翻夏四月壬戌同鳯閣鸞臺三品韋安石知納言李嶠知内史事太后幸興泰宫太后復税天下僧尼作大像於白司馬阪復扶又翻洛城北邛山有白司馬阪令春官尚書武攸寧檢校糜費巨億李嶠上疏以為天下編户貧弱者衆造像錢見有一十七萬餘緡若將散施見賢遍翻下見在同散如字施式豉翻人與一千濟得一十七萬餘户拯饑寒之弊省勞役之勤順諸佛慈悲之心霑聖君亭育之意人神胥悦功徳無窮方作過後因縁豈如見在果報監察御史張廷珪上疏諫曰臣以時政論之則宜先邊境蓄府庫養人力以釋教論之則宜救苦厄滅諸相先悉薦翻相息亮翻崇無為伏願陛下察臣之愚行佛之意務以理為上不以人廢言太后為之罷役為于偽翻仍召見廷珪見賢遍翻深賞慰之鳯閣侍郎同鳯閣鸞臺三品姚元崇以母老固請歸侍六月辛酉以元崇行相王府長史秩位並同三品乙丑以天官侍郎崔𤣥暐同平章事召鳯閣侍郎同平章事檢校汴州刺史韋嗣立赴興泰宫丁丑以李嶠同鳯閣鸞臺二品嶠自請觧内史壬午以相王府長史姚元崇兼知夏官尚書同鳯閣鸞臺三品秋七月丙戌以神都副留守楊再思為内史守手又翻再思為相專以諂媚取容司禮少卿張同休易之之兄也嘗召公卿宴集酒酣戯再思曰楊内史面似髙麗再思欣然即翦紙帖巾反披紫袍為髙麗舞唐十部樂有髙麗伎舞者四人楊冄思盖倣之為此舞舉坐大笑坐徂卧翻時人或譽張昌宗之羙譽音余曰六郎面似蓮花再思獨曰不然昌宗問其故再思曰乃蓮花似六郎耳甲午太后還宫乙未司禮少卿張同休汴州刺史張昌期尚方少監張昌儀皆坐贓下獄下遐嫁翻命左右臺共鞫之丙申敕張易之張昌宗作威作福亦命同鞫辛丑司刑正賈敬言奏張昌宗强市人田光宅改大理正為司刑正從五品掌參議刑辟詳正科條之事應徴銅二十斤制可乙巳御史大夫李承嘉中丞桓彦範奏張同休兄弟贓共四千餘緡張昌宗法應免官昌宗奏臣有功於國所犯不至免官太后問諸宰相昌宗有功乎楊再思曰昌宗合神丹合音閣聖躬服之有驗此莫大之功太后悦赦昌宗罪復其官左補闕戴令言作兩脚狐賦以譏再思言再思妖媚如狐特兩脚耳再思出令言為長社令丙午夏官侍郎同平章事宗楚客有罪左遷原州都督充靈武道行軍大總管癸丑張同休貶岐山丞後魏分扶風雍縣置平秦郡西魏改為岐山郡隋廢郡為縣屬岐州張昌儀貶博望丞鸞臺侍郎知納言事同鳯閣鸞臺三品韋安石舉奏張易之等罪敕付安石及右庶子同鳯閣鸞臺三品唐休璟鞫之未竟而事變八月甲寅以安石兼檢校揚州刺史考異曰唐厯云五日戊午今從實録庚申以休璟兼幽營都督安東都䕶休璟將行宻言於太子曰二張恃寵不臣必將為亂殿下宜備之相王府長史兼知夏官尚書事同鳯閣鸞臺三品姚元崇上言臣事相王不宜典兵馬夏官即兵部也故云然相息亮翻臣不敢愛死恐不益於王辛酉改春官尚書餘如故元崇字元之時突厥叱列元崇反太后命元崇以字行突厥黙啜既和親戊寅始遣淮陽王武延秀還武延秀被拘見上卷聖歴元年九月壬子以姚元之充靈武道行軍大總管辛酉以元之為靈武道安撫大使使疏吏翻元之將行太后令舉外司堪為宰相者外司謂外朝諸司官對曰張柬之沈厚有謀能斷大事沈持林翻斷丁亂翻且其人已老惟陛下急用之冬十月甲戌以秋官侍郎張柬之同平章事時年且八十矣乙亥以韋嗣立檢校魏州刺史餘如故壬午以懷州長史河南房融同平章事太后命宰相各舉堪為員外郎者韋嗣立薦廣武令岑羲曰但恨其伯父長倩為累長倩死見二百四卷天授二年累力瑞翻下同太后曰茍或有才此何所累遂拜天官員外郎唐六典曰周官太宰之屬官有上士盖今員外郎之任也宋百官階次有員外郎羙遷為尚書郎隋文帝開皇六年尚書二十四曹各置員外郎一人品從第六謂曹郎本員之外復置郎也焬帝大業三年又廢二十四司員外郎毎司減一員置承務郎一人同開皇員外郎之職曰選部承務郎唐尚書諸曹各置員外郎吏部置二人天官即吏部由是諸縁坐者始得進用十一月丁亥以天官侍郎韋承慶為鳯閣侍郎同平章事癸夘成均祭酒同鳯閣鸞臺三品李嶠罷為地官尚書十二月甲寅敕大足已來新置官並停丙辰鳯閣侍郎同平章事韋嗣立罷為成均祭酒檢校魏州刺史如故以兄承慶入相故也相息亮翻太后寢疾居長生院長生院即長生殿明年五王誅二張進至太后所寢長生殿同此處也盖唐寑殿皆謂之長生殿此武后寑疾之長生殿洛陽宫寑殿也肅宗大漸越王係授甲長生殿長安大明宫之寑殿也白居易長恨歌所謂七月七日長生殿夜半無人私語時華清宫之長生殿也宰相不得見者累月惟張易之昌宗侍側疾少間間如字崔𤣥暐奏言皇太子相王仁明孝友足恃湯藥相息亮翻宫禁事重伏願不令異姓出入太后曰徳卿厚意易之昌宗見太后疾篤恐禍及已引用黨援隂為之備屢有人為飛書及牓其書於通衢云易之兄弟謀反太后皆不問辛未許州人楊元嗣告昌宗嘗召術士李𢎞泰占相𢎞泰言昌宗有天子相相息亮翻勸於定州造佛寺則天下歸心長考異曰實録云安四年秋元嗣告之太后令鳯閣侍郎韋承慶推鞫按十一月丁亥承慶始為鳯閣侍郎今從唐厯太后命韋承慶及司刑卿崔神慶御史中丞宋璟鞫之神慶神基之弟也承慶神慶奏言昌宗欵稱𢎞泰之語尋已奏聞凖法首原法自首者原其罪承慶神慶欲凖此條以脱昌宗之罪首式又翻𢎞泰妖言請收行法妖於喬翻下同璟與大理丞封全禎奏昌宗寵榮如是復召術士占相復扶又翻志欲何求𢎞泰稱筮得純乾天子之卦昌宗儻以𢎞泰為妖妄何不執送有司雖云奏聞終是包藏禍心法當處斬破家處昌吕翻請收付獄窮理其罪太后久之不應璟又曰儻不即收繫恐其揺動衆心太后曰卿且停推停其事且莫推究俟更檢詳文狀璟退左拾遺江都李邕進曰江都縣帶楊州向觀宋璟所奏志安社稷非為身謀願陛下可其奏太后不聽尋敕璟揚州推按又敕璟按幽州都督屈突仲翔贓汚屈九勿翻又敕璟副李嶠安撫隴蜀璟皆不肯行奏曰故事州縣官有罪品髙則侍御史卑則監察御史按之中丞非軍國大事不當出使監古衘翻使疏吏翻今隴蜀無變不識陛下遣臣出外何也臣皆不敢奉制後考異曰御史臺記云易之昌宗冀璟使當列状誅璟按易之等若果可以列状誅璟則何必待其出使然後為之此盖璟方奏請収禁昌宗故太后欲遣璟出以散其事耳璟必欲收禁故辭不肯行大后自省理屈故不迫遣耳不然璟若無事不行太后豈不能以拒違制命罪之邪又云時璟家禮㑹易之等伺其夕以刺之有宻告暻者乘庫車於它所而免按若實有其迹璟安得不自陳於太后若無其迹則人妄言耳今不取司刑少卿桓彦範上疏以為昌宗無功荷寵荷下可翻而包藏禍心自招其咎此乃皇天降怒陛下不忍加誅則違天不祥且昌宗既云奏訖則不當更與𢎞泰往還使之求福禳災是則初無悔心所以奏者擬事發則云先已奏陳不發則俟時為逆此乃奸臣詭計若云可捨誰為可刑况事已再發陛下皆釋不問使昌宗益自負得計天下亦以為天命不死此乃陛下養成其亂也茍逆臣不誅社稷亡矣請付鸞臺鳯閣三司考竟其罪三司謂尚書刑部大理寺御史臺也唐制大獄則召大三司考竟又詔中書門下同鞫之疏奏不報崔𤣥暐亦屢以為言太后令法司議其罪𤣥暐弟司刑少卿昪處以大辟昪皮變翻處昌吕翻辟毗亦翻宋璟復奏収昌宗下獄復抉又翻下遐嫁翻太后曰昌宗已自奏聞對曰昌宗為飛書所逼窮而自陳埶非得已且謀反大逆無容首免首式又翻若昌宗不伏大刑安用國法太后温言解之璟聲色逾厲曰昌宗分外承恩分扶問翻臣知言出禍從然義激於心雖死不恨楊再思恐其忤㫖遽宣敕令出忤五故翻璟曰聖主在此不煩宰相擅宣敕命太后乃可其奏遣昌宗詣臺璟庭立而按之事未畢太后遣中使召昌宗特敕赦之使疏吏翻璟嘆曰不先擊小子腦裂負此恨矣太后乃使昌宗詣璟謝璟拒不見傳考異曰御史臺記唐厯舊並云収按易之等按璟止鞫昌宗占相事耳無縁及易之今所不取舊張易之傳云宋璟請按易之則天陽許尋敕宋璟使幽州按都督屈突仲翔令司禮卿崔神慶希㫖雪昌宗兄弟唐厯云桓彦範上疏不報璟登時出使按璟傳云特敕原易之仍令詣璟謝則是昌宗敕免時璟在都不出使也實録云令韋承慶崔神慶與璟推鞫當時璟執正其罪而神慶寛之耳非璟出使後神慶始鞫之也舊宋璟易之傳自相違今從御史臺記左臺中丞桓彦範右臺中丞東光袁恕己共薦詹事司直陽嶠為御史光宅分御史左右臺各置大夫中丞侍御史東光縣漢屬勃海郡唐屬滄州詹事司直正九品上掌彈劾宫僚糾舉職事楊再思曰嶠不樂搏擊之任如何彦範曰為官擇人豈必待其所欲所不欲者尤須與之所以長難進之風抑躁求之路樂音洛為于偽翻長知兩翻躁則到翻乃擢為右䑓侍御史嶠休之之𤣥孫也陽休之仕髙齊貴顕先是李嶠崔𤣥暐奏往屬革命之時人多逆節遂致刻薄之吏恣行酷法其周興等所劾破家者並請雪免司刑少卿桓彦範又奏陳之表疏前後十上先悉薦翻屬之欲翻劾戸槩翻又户得翻上時掌翻太后乃從之中宗大和大聖大昭孝皇帝上諱顕髙宗第七子也中更名哲已而復舊名景雲元年諡孝和皇帝廟號中宗天寶八年追尊大和大聖皇帝十三載追尊大和大聖大昭孝皇帝神龍元年春正月壬午朔赦天下改元長考異曰新紀安五年正月壬午大赦甲子太子監國改元按則天實録神龍元年正月壬午朔大赦改元舊紀唐厯統紀㑹要皆同紀年通譜亦以神龍為武后年號中宗因之新紀誤也自文明以來得罪者非揚豫博三州及諸反逆魁首咸赦除之太后疾甚麟臺監張易之春官侍郎張昌宗居中用事張東之崔𤣥暐與中臺右丞敬暉光宅元年改尚書左右丞為文昌左右丞長安三年又改為中臺左右丞司刑少卿桓彦範相王府司馬袁怒己謀誅之柬之謂右羽林衛大將軍李多祚曰將軍今日富貴誰所致也多祚泣曰大帝也柬之曰今大帝之子為二豎所危將軍不思報大帝之徳乎多祚曰茍利國家惟相公處分處昌吕翻分扶問翻不敢顧身及妻子因指天地以自誓遂與定謀初柬之與荆府長史閺鄉楊元琰相代荆州都督府長史故曰荆府閺鄉在漢𢎞農湖縣界隋分置縣屬洛州唐屬虢州二人相代當在久視元年閺音旻同泛江至中流語及太后革命事元琰慨然有匡復之志及柬之為相引元琰為右羽林將軍謂曰君頗記江中之言乎今日非輕授也柬之又用彦範暉及右散騎侍郎李湛魏晋置散騎常侍侍郎與侍中黄門共平尚書奏事其後用人或雜江左不重此官或省或置隋初省侍郎置常侍從三品掌陪從朝直煬帝又省之武徳初以為加官貞觀初置常侍二人屬門下省為職事官顕慶二年又置二員屬中書省始冇左右之號並金蟬珥貂左常侍與侍中左貂右常侍與中書令右貂謂之八貂唐末嘗置散騎侍郎也據舊書湛時為右散騎常侍當從之散悉亶翻騎竒寄翻皆為左右羽林將軍委以禁兵易之等疑懼乃更以其黨武攸宜為右羽林大將軍易之等乃安俄而姚元之自靈武至柬之彦範相謂曰事濟矣遂以其謀告之彦範以事白其母母曰忠孝不兩全先國後家可也先悉薦翻後户遘翻時太子於北門起居洛陽宫北門亦曰𤣥武門不從端門入而從北門入問起居取便近也彦範暉謁見見賢遍翻宻陳其䇿太子許之癸夘柬之𤣥暐彦範與左威衛將軍薛思行等帥左右羽林兵五百餘人至𤣥武門帥讀曰率遣多祚湛及内直郎駙馬都尉安陽王同皎唐東宫内直局有内直郎二人從六品下掌符璽扇繖几案衣服之事安陽漢侯國屬魏郡其故城在湯隂曹魏時廢安陽併入鄴後周移鄴置縣於安陽故城仍為鄴縣隋又改為安陽縣為魏州治所漢魏郡城在縣西北七里詣東宫迎太子太子疑不出同皎曰先帝以神器付殿下横遭幽廢横户孟翻人神同憤二十三年矣按光宅元年廢太子廬陵王至是三十二年今天誘其衷誘音酉北門南牙同心協力以誅凶豎復李氏社稷南牙謂宰相北門謂羽林諸将願陛下蹔至𤣥武門以副衆望蹔與暫同太子曰凶豎誠當夷滅然上體不安得無驚怛怛當割翻諸公更為後圗李湛曰諸將相不顧家族以狥社稷殿下奈何欲納之鼎鑊乎請殿下自出止之詣考異曰舊李湛傳曰湛與右羽林大將軍李多祚等東宫迎皇太子拒而不時出湛進啟曰逆竪反道亂常将圖不軌宗社危敗實在須臾湛等諸将與南衙執事克期誅翦伏願陛下暫至𤣥武門以副衆望太子曰凶竪悖亂誠合誅夷然聖躬不豫慮有驚動公等且止以俟後圖湛曰諸将弃家族共宰相同心匡輔社稷陛下奈何欲陷之鼎鑊陛下速出自止遏太子乃上馬就路按劉子𤣥中宗實録唐厯統紀皆以此為王同皎之言而舊傳以為李湛進説今從實録唐厯等参取舊傳太子乃出同皎扶抱太子上馬從至𤣥武門斬闗而入上時掌翻從才用翻太后在迎仙宫東之等斬易之昌宗於廡下廡音武進至太后所寢長生殿環繞侍衛環音宦太后驚起問曰亂者誰邪對曰張易之昌宗謀反臣等奉太子令誅之恐有漏洩故不敢以聞稱兵宫禁罪當萬死太后見太子曰乃汝邪小子既誅可還東宫彦範進曰太子安得更歸昔天皇以愛子託陛下今年齒已長長知兩翻久居東宫天意人心久思李氏羣臣不忘太宗天皇之徳故奉太子誅賊臣願陛下傳位太子以順天人之望李湛義府之子也李義府朋附武后髙宗以取相位太后見之謂曰汝亦為誅易之將軍邪我於汝父子不薄乃有今日湛慙不能對又謂崔𤣥暐曰它人皆因人以進惟卿朕所自擢亦在此邪對曰此乃所以報陛下之大徳於是收張昌期同休昌儀皆斬之與易之昌宗梟首天津南梟堅堯翻是日袁恕己從相王統南牙兵以備非常相息亮翻收韋承慶房融及司禮卿崔神慶繫獄皆易之之黨也初昌儀新作第甚羙逾於王主王主謂儲王及諸公主也或夜書其門曰一日絲能作幾日絡言其且誅滅能作樂得幾日也滅去復書之去羌吕翻復扶又翻如是六七昌儀取筆注其下曰一日亦足乃止甲辰制太子監國監古銜翻赦天下以袁恕己為鳯閣侍郎同平章事分遣十使齎璽書宣慰諸州十道各遣一使使疏吏翻璽斯氏翻乙巳太后傳位於太子丙午中宗即位赦天下惟張易之黨不原其為周興等所枉者咸令清雪子女配沒者皆免之相王加號安國相王拜太尉同鳯閣鸞臺三品太平公主加號鎮國太平公主皇族先配沒者子孫皆復屬籍仍量叙官爵量音良丁未太后徙居上陽宫李湛留宿衛戊申帝帥百官詣上陽宫上太后尊號曰則天大聖皇帝帥讀曰率上時掌翻庚戌以張柬之為夏官尚書同鳯閣鸞臺三品崔𤣥暐為内史袁恕己同鳯閣鸞臺三品敬暉桓彦範皆為納言並賜爵郡公李多祚賜爵遼陽郡王王同皎為右千牛將軍琅邪郡公李湛為右羽林大將軍趙國公自餘官賞有差等考異曰中宗實録初冬官侍郎朱敬則以張易之權寵日盛恐冇異圗時敬暉為右羽林将軍敬則謂之曰公若假皇太子之令舉北軍誅易之兄弟兩飛騎之力耳暉等竟用其䇿及易之昌宗伏誅暉遂矜功自恃故賞不及於敬則俄出為鄭州刺史按敬則長安四年以老罷知政事累轉冬官侍郎而則天實録誅易之時有庫部員外郎朱敬則恐誤張柬之等之討張易之也殿中監田歸道將千騎宿𤣥武門貞觀初太宗選善射者百人為二番於北門長上曰百騎武后改曰千騎将即亮翻騎竒寄翻敬暉遣使就索千騎使疏吏翻索山客翻歸道先不預謀拒而不與事寧暉欲誅之歸道以理自陳乃免歸私第帝嘉其忠壯召拜太僕少卿資治通鑑卷二百七
