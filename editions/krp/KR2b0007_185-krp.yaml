front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百八十五宋司馬光撰胡三省音註唐紀一起著雍攝提格正月盡七月不滿一年唐古國名陸德明曰周成王母弟叔虞封於唐其地帝堯夏禹所都之墟漢曰太原郡在古冀州太行恒山之西太原太岳之野李唐之先李虎與李弼等八人佐周伐魏有功皆為柱國家周閔帝受魏禪虎已卒乃追録其功封唐國公生子昞襲封昞生淵襲封起兵克長安進封唐王遂受隋禪國因號曰唐髙祖神堯大聖光孝皇帝上之上諱淵字叔徳本隴西成紀人七世祖暠王西凉是為凉武昭王至曾孫熈家于武川熈孫虎從周文帝始家長安武徳元年是年五月受隋禪始改元春正月丁未朔隋恭帝詔唐王劒履上殿贊拜不名隋志按漢自天子至于百官無不佩刀蔡謨儀云大臣優禮者皆劒履上殿非侍臣解之蓋防刃也近代以木未詳所起東齊著令謂為象劍言象於劒周武帝時百官燕㑹並帶刀升座至開皇初因襲舊式朝服升殿亦不解焉十二年因蔡徴上事始制凡朝會應登殿坐者劒履俱脱其不坐者勑召奏事及須升殿亦就席解劒乃登納言黄門内史令侍郎舎人既夾侍之官則不脱其劒皆真刃非假又准晉咸康元年定今故事自天子以下皆衣冠帶劒今天子則玉具火珠鏢首惟侍臣帶劎上殿自王公以下非殊禮引升殿皆就席解而後升複下曰舄單下曰履諸非侍臣皆脱履升殿舄唯冕服及具服箸之履則諸服皆用凡朝會賛拜則曰某官某不名亦殊禮也上時掌翻鏢紕招翻唐王既克長安以書諭諸郡縣於是東自商洛隋志商洛縣屬上洛郡取商山洛水以名縣也南盡巴蜀郡縣長吏及盜賊渠帥氐羌酋長爭遣子弟入見請降有司復書日以百數長知兩翻帥所類翻酋才由翻見賢遍翻降戸江翻王世充既得東都兵進擊李密於洛北敗之敗補邁翻遂屯鞏北鞏縣之北辛酉世充命諸軍各造浮橋度洛擊密橋先成者先進前後不一虎賁郎將王辯破密外柵賁音奔將即亮翻密營中驚擾將潰世充不知鳴角收衆密因帥敢死士乘之帥讀曰率世充大敗爭橋溺死者萬餘人溺奴狄翻王辯死世充僅自免洛北諸軍皆潰世充不敢入東都北趣河陽趣七喻翻又逡須翻是夜疾風寒雨軍士涉水沾濕道路凍死者又以萬數世充獨與數千人至河陽隋考異曰書北史李密傳曰世充復移營洛北南對鞏縣其後遂於洛水造浮橋悉衆以擊密密出擊之官軍稍却自相䧟溺者數萬人世充僅而獲免不敢還東都遂趣河陽其夜雨雪尺餘衆隨之者死亡殆盡王世充傳曰充敗績赴水溺死者萬餘人時天寒大雪兵士既度水衣皆霑濕在道凍死者又數萬人蒲山公傳曰世充移營就洛水之北與密隔洛水以相望密乃築長城掘深塹周迴七十里以自固十五日世充與密戰於石窟寺東密軍退敗世充度洛水以乘之逼倉城為營塹密縱兵疾戰世充兵馬棄仗奔亡沉溺死者不可勝數密又令露布上府曰世充以今月十一日平旦屯兵洛北偷入月城其月十五日世充及王辯才等又於倉城北偷渡水南敢逼城堞河洛記曰十六日充與密戰於石窟寺東又曰其夜遇風寒疾雨士卒凍死十不存一充脱身宵遁直向河陽餘如蒲山公傳略記曰辛酉王世充移兵洛北仍令諸軍臨岸布兵軍别造浮橋橋先成者輙渡既前後不一而李密伏發我師敗績爭橋赴水溺死者十五六雜記曰十二月越王遣太常少卿韋霽等率留守兵三萬並受世充節度又曰王辯縱等敗衆軍亦潰爭橋赴水死者大半王辯縱等皆沒唯世充敗免與數百騎奔大通城敗兵得還者於道遭大雨凍死者六七千人世充停留大通十餘日懼罪不還十四年正月越王遣世充兄世惲往大通慰諭赦世充喪師之罪按李道𤣥勸進於李密表云子時律始太簇未宜霡霂而澍雨忽降凍殕將盡今參取衆書日從蒲山公傳両從河洛記自繫獄請罪越王侗遣使赦之侗它紅翻使疏吏翻召還東都賜金帛美女以安其意世充収合亡散得萬餘人屯含嘉城含嘉城盖在都城之北按舊書王世充傳含嘉倉城也不敢復出復扶又翻密乘勝進據金墉城修其門堞廬舍而居之堞達恊翻鉦鼓之聲聞於東都開音問未幾擁兵三十萬陳於北邙陳讀曰陣南逼上春門乙丑金紫光禄大夫叚達民部尚書韋津出兵拒之達望見密兵盛懼而先還密縱兵乘之軍遂潰韋津死戰考異曰隋書列傳不言日蒲山公傳此戰在四月九日略記亦云四月乙未李密率衆北據邙山南接上春門叚達韋津出兵拒之兵未交而達懼先還入城軍遂潰亂乙未二十一日也今據河洛記正月十九日世充又與密戰於上春門外韋津沒焉又二月房彦藻與竇建徳書亦云幕府以去月十九日親董貔虎西取洛邑其蒲山公傳四月已後月日與事多差互不合今日從河洛記事從略記及隋叚達傳於是偃師柏谷及河陽都尉獨孤武都檢校河内郡丞桞爕職方郎桞續等隋制職方郎屬兵部尚書各舉所部降於密竇建徳朱粲孟海公徐圓朗等並遣使奉表勸進降戸江翻使疏吏翻祖考異曰河洛記云盧祖尚亦通表於密按尚本起兵為隋事恐不爾今不取密官屬裴仁基等亦上表請正位號上時掌翻密曰東都未平不可議此戊辰唐王以世子建成為左元帥秦公世民為右元帥帥所類翻督諸軍十餘萬人救東都東都乏食太府卿元文都等募守城不食公糧者進散官二品於是商賈執象而朝者不可勝數象者象笏也西魏以來五品已上通用象牙賈音古朝直遥翻勝音升二月己卯唐王遣太常卿鄭元璹將兵出商洛狥南陽煬帝改鄧州為南陽郡璹殊玉翻將即亮翻左領軍府司馬安陸馬元規狥安陸及荆襄隋十二衛府各有長史司馬煬帝改安州為安陸郡荆州南郡襄州襄陽郡李密遣房彦藻鄭頲等頲他鼎翻東出黎陽分道招慰州縣以梁郡太守楊汪為上柱國宋州總管煬帝改宋州為梁郡守式又翻又以手書與之曰昔在雍丘曾相追捕事見一百八十三卷大業十二年射鉤斬袂不敢庶幾管仲射齊桓公中帶鉤桓公用之以相晉寺人披伐公子重耳斬其祛文公不怨今以祛爲袂射而亦翻幾居希翻汪遣使往來通意密亦羈縻待之使疏吏翻彦藻以書招竇建徳使來見密建徳復書卑辭厚禮託以羅藝南侵請捍禦北垂彦藻還至衛州賊帥王徳仁邀殺之帥所類翻下同徳仁有衆數萬據林慮山衛州隋為汲郡林慮山在魏郡林慮縣慮音廬四出抄掠為數州之患抄楚交翻三月己酉以齊公元吉為鎮北將軍一考異曰創業注改太原留守為鎮北府在去年十月己巳盖因元吉進封齊公言之耳今從實錄太原道行軍元帥都督十五郡諸軍事聽以便宜從事隋煬帝至江都大業十二年煬帝至江都荒淫益甚宮中為百餘房各盛供張張竹亮翻實以美人日令一房為主人江都郡丞趙元楷掌供酒饌饌雛戀翻又雛皖翻帝與蕭后及幸姬歴就宴飲酒巵不離口從姬千餘人亦常醉離力智翻從才用翻然帝見天下危亂意亦擾擾不自安退朝則幅巾短衣䇿杖步遊徧歴臺館非夜不止汲汲顧景唯恐不足帝自曉占候卜相好為吳語朝直遥翻相息亮翻好呼到翻常夜置酒仰視天文謂蕭后曰外間大有人圖儂呉人率自稱曰儂然儂不失為長城公卿不失為沈后長城公陳叔寳叔寳后沈氏且共樂飲耳樂音洛因引滿沈醉沈持林翻又嘗引鏡自照顧謂蕭后曰好頭頸誰當斫之后驚問故帝笑曰貴賤苦樂更迭為之樂音洛更工衡翻亦復何傷復扶又翻帝見中原已亂無心北歸欲都丹楊帝改蔣州為丹楊郡盖欲都建康也書考異曰大業記帝欲南巡㑹稽今從隋保據江東命羣臣廷議之内史侍郎虞世基等皆以為善右候衛大將軍李才極陳不可請車駕還長安與世基忿爭而出門下錄事衡水李桐客曰隋制門下省置錄事通事令史各六人衡水縣屬信都郡開皇十六年分信都北界武邑西界下博南界置宋白曰衡水縣本漢桃縣江東卑濕土地險狹内奉萬乘外給三軍民不堪命亦恐終散亂耳御史劾桐客謗毁朝政乘䋲證翻劾戸槩翻又戸得翻朝直遥翻於是公卿皆阿意言江東之民望幸已乆陛下過江撫而臨之此大禹之事也禹南巡狩㑹諸侯於㑹稽乃命治丹楊宮將徙都之治直之翻時江都糧盡從駕驍果多闗中人從才用翻驍堅堯翻乆客思鄉里見帝無西意多謀叛歸郎將竇賢遂帥所部西走將即亮翻下同帥讀曰率帝遣騎追斬之騎竒寄翻而亡者猶不止帝患之虎賁郎將扶風司馬徳戡素有寵於帝賁音奔戡音堪帝使領驍果屯於東城徳戡與所善虎賁郎將元禮直閤裴䖍通謀曰煬帝制左右監門府有直閤各六人正五品今驍果人人欲亡我欲言之恐先事受誅先悉薦翻不言於後事發亦不免族滅奈何又聞闗内淪沒李孝常以華陰叛事見上卷上年華戸化翻上囚其二弟欲殺之我輩家屬皆在西能無此慮乎二人皆懼曰然則計將安出徳戡曰驍果若亡不若與之俱去二人皆曰善因轉相招引内史舍人元敏虎牙郎將趙行樞鷹揚郎將孟秉符璽郎牛方裕直長許𢎞仁薛世良城門郎唐奉義醫正張愷勲侍楊士覽等隋初門下省統城門尚食尚藥符璽御府殿内等六局各有直長煬帝以城門尚食尚藥御府等五局隷殿内省改符璽監為郎城門置校尉後又改校尉為城門郎又置司醫醫佐等官意者醫正即司醫也勲侍三侍之一也璽斯氏翻長知兩翻皆與之同謀日夜相結約於廣座明論叛計無所畏避有宫人白蕭后曰外間人人欲反后曰任汝奏之宮人言於帝帝大怒以為非所宜言斬之其後宮人復白后復扶又翻后曰天下事一朝至此無可救者何用言之徒令帝憂耳令力丁翻自是無復言者趙行樞與將作少監宇文智及素厚少始照翻楊士覽智及之甥也二人以謀告智及智及大喜徳戡等期以三月望日結黨西遁智及曰主上雖無道威令尚行卿等亡去正如竇賢取死耳今天實喪隋喪息浪翻英雄並起同心叛者已數萬人因行大事此帝王之業也徳戡等然之行樞薛世良請以智及兄右屯衛將軍許公化及為主結約既定乃告化及化及性駑怯聞之變色流汗既而從之公考異曰蒲山傳曰趙行樞楊士覽以司馬徳戡謀告化及化及兄弟聞之大喜因引徳戡等相見士及説徳戡等曰足下等因百姓之心謀非常之事直欲走逃故非長䇿徳戡曰為之奈何士及曰官家雖言無道臣下尚畏服之聞公叛亡必急相追捕竇賢之事殷鍳在近不如嚴勒士馬攻其宮闕因人之欲稱廢昏凶事必克成然後詳立明哲天下可安吾徒無患矣勲庸一集公等坐延榮禄縱事不成威聲大振足得官家膽懾不敢輕相追討遲疑之間自延數日比其議定公等行亦已逺如此則去住之計俱保萬全不亦可乎徳戡等大悦曰明哲之望豈惟楊家衆心實在許公故是人天協契士及佯驚曰此非意所及但與公等思救命耳革命記曰帝知歴數將窮意欲南渡江水咸言不可帝知朝士不欲渡乃將毒藥醖酒二十石擬三月十六日為宴㑹而酖殺百官南陽公主恐其夫死乃陰告之而事泄為此始謀害帝以免禍並是兇逆之旅妄搆此詞于時上下離心人懷異志帝深猜忌情不與人醖若不虛藥須分付有處遣何人併醖二十石藥酒必其酒有酖毒一石堪殺千人審欲擬殺羣寮謀之者必有三五衆謀自然早泄豈得獨在南陽只是䖍通恥有殺害之謀推過惡於人主耳隋書化及傳云化及弑逆士及在公主第弗之知也智及遣家僮莊桃樹就第殺之桃樹不忍執詣智及乆之乃見釋南陽公主傳責士及云但謀逆之日察君不預知耳舊唐書士及傳云化及謀逆以其主壻深忌之而不告按士及仕唐為宰相隋書亦唐初修或者史官為士及隱惡賈杜二書之言亦似可信但杜儒童自知醖藥酒為虛則南陽陰告之事亦非其實如賈潤甫之說則弑君之謀皆出士及而智及為良人矣今且從隋書而刪去莊桃樹事及南陽之語庶幾疑以傳疑徳戡使許𢎞仁張愷入備身府帝改左右領左右府為左右備身府告所識者云陛下聞驍果欲叛多醖毒酒欲因享㑹盡鴆殺之獨與南人留此驍果皆懼轉相告語語牛倨翻反謀益急乙卯徳戡悉召驍果軍吏諭以所為皆曰唯將軍命是日風霾晝昏霾亡皆翻雨土也晡後徳戡盜御廐馬濳厲兵刃是夕元禮裴䖍通直閤下專主殿内唐奉義主閉城門與䖍通相知諸門皆不下鍵鍵戸偃翻陳楚謂戸鑰牡為鍵至三更更工衡翻徳戡於東城集兵得數萬人舉火與城外相應帝望見火且聞外諠囂問何事䖍通對曰草坊失火外人共救之耳時内外隔絶帝以為然智及與孟秉於城外集千餘人此城外謂江都宮城之外劫候衛虎賁馮普樂布兵分守衢巷左右候衞主晝夜巡察故劫之普樂盖虎賁郎將賁音奔樂音洛燕王倓覺有變倓元徳太子昭之子代王侑之弟倓徒甘翻夜穿芳林門側水竇而入至𤣥武門詭奏曰臣猝中風中竹仲翻命懸俄頃請得面辭裴䖍通等不以聞執囚之丙辰天未明徳戡授䖍通兵以代諸門衛士䖍通自門將數百騎至成象殿將即亮翻騎竒寄翻宿衛者傳呼有賊䖍通乃還閉諸門獨開東門驅殿内宿衛者令出皆投仗而走右屯衛將軍獨孤盛謂䖍通曰何物兵勢太異䖍通曰事勢已然不預將軍事將軍慎毋動盛大罵曰老賊是何物語不及被甲與左右十餘人拒戰為亂兵所殺被皮義翻䖍考異曰蒲山公傳通於成象殿前遇將軍獨孤盛時内直宿陳兵廊下以拒之詬曰天子在此爾等何敢兇逆叱兵接戰兵皆倒戈䖍通謂盛曰公何暗於機㑹恐他人以公為勲耳盛叱之曰國家榮寵盛者正擬今日且宿衛天居唯當效之以死注弦不動俄為亂兵所擊斃於階下略記詰旦諸門已開而外傳呌有賊䖍通乃還閉諸門唯開正東一門而驅殿内執仗者出莫不投仗亂走屯衛大將軍獨孤盛揮刀叱之曰天子在此爾等走欲何之然亂兵交萃俄而斃於階下今從隋書亦采略記盛楷之弟也獨孤楷見一百七十九卷文帝仁夀二年千牛獨孤開逺煬帝制千牛十六人掌執千牛刀屬領左右府開逺獨孤后之兄子帥殿内兵數百人詣𤣥覽門叩閤請曰兵仗尚全猶堪破賊陛下若出臨戰人情自定不然禍今至矣竟無應者軍士稍散賊執開逺義而釋之先是帝選驍健官奴數百人置𤣥武門先悉薦翻謂之給使以備非常待遇優厚至以宮人賜之司宮魏氏為帝所信司宮盖即尚宮之職化及等結之使為内應是日魏氏矯詔悉聽給使出外倉猝際制無一人在者徳戡等引兵自𤣥武門入帝聞亂易服逃於西閤䖍通與元禮進兵排左閤魏氏啓之遂入永巷問陛下安在有美人出指之校尉令狐行達拔刀直進校戸教翻令音鈴帝映窻扉謂行達曰汝欲殺我邪邪音耶對曰臣不敢但欲奉陛下西還耳因扶帝下閤還從宣翻又音如字䖍通本帝為晉王時親信左右也帝見之謂曰卿非我故人乎何恨而反對曰臣不敢反但將士思歸欲奉陛下還京師耳將即亮翻帝曰朕方欲歸正為上江米船未至夏口以上為上江為于偽翻今與汝歸耳䖍通因勒兵守之至旦孟秉以甲騎迎化及騎竒寄翻下同化及戰栗不能言人有來謁之者但俛首據鞍稱罪過罪過今世俗謙謝之辭俛音免化及至城門宮城門也徳戡迎謁引入朝堂號爲丞相朝直遥翻下同號戸刀翻呼也裴䖍通謂帝曰百官悉在朝堂陛下須親出慰勞勞力到翻進其從騎逼帝乘之從才用翻帝嫌其鞍勒弊更易新者乃乘之䖍通執轡挾刀出宮門賊徒喜譟動地化及揚言曰何用持此物出亟還與手與手魏齊間人率有是言言與之毒手而殺之也宋孝建初薛安都助順有大功從弟道生亦以軍功為大司馬參軍犯罪為秣陵令薛淑之所鞭安都大怒乗馬執稍從數十人欲往殺淑之行至朱雀航逢桞元景問何之安都曰薛淑之鞭我從弟指往刺殺之元景曰小子無宜適卿往與手甚快安都既囘馬元景復呼使入車讓止之此與手之徴也亟紀力翻帝問世基何在賊黨馬文舉曰已梟首矣於是引帝還至寢殿䖍通徳戡等拔白刃侍立帝歎曰我何罪至此文舉曰陛下違棄宗廟巡遊不息外勤征討内極奢淫使丁壯盡於矢刃女弱填於溝壑四民喪業喪息浪翻盜賊蠭起專任佞諛飾非拒諌何謂無罪帝曰我實負百姓至於爾輩榮祿兼極何乃如是今日之事孰為首邪邪音耶徳戡曰溥天同怨何止一人化及又使封徳彝數帝罪數所具翻又所主翻帝曰卿乃士人何為亦爾徳彞赧然而退帝愛子趙王杲年十二在帝側號慟不已䖍通斬之血濺御服赧奴板翻慙而面赤也號戸刀翻濺子賤翻賊欲弑帝帝曰天子死自有法何得加以鋒刃取鴆酒來文舉等不許使令狐行達頓帝令坐帝自解練巾授行達縊殺之令力丁翻縊於賜翻又於計翻絞也考異曰蒲山公傳河洛記皆云于洪達縊帝今從隋書及略記初帝自知必及於難常以甖貯毒藥自隨難乃旦翻甖於耕翻貯丁吕翻謂所幸諸姬曰若賊至汝曹當先飲之然後我飲及亂顧索藥索山客翻左右皆逃散竟不能得蕭后與宮人撤漆牀板為小棺與趙王杲同殯於西院流珠堂帝每巡幸常以蜀王秀自隨囚於驍果營化及弑帝欲奉秀立之衆議不可乃殺秀及其七男又殺齊王􅌔及其二子并燕王倓隋氏宗室外戚無少長皆死􅌔古限翻驍堅堯翻少詩照翻長知兩翻唯秦王浩素與智及往來且以計全之浩秦王俊之子齊王􅌔素失愛於帝􅌔失愛事始一百八十一卷大業四年恒相猜忌帝聞亂顧蕭后曰得非阿孩邪􅌔小字阿孩恒戸登翻化及使人就第誅􅌔􅌔謂帝使收之曰詔使且緩兒使䟽吏翻兒不負國家賊曵至街中斬之􅌔竟不知殺者為誰父子至死不相明又殺内史侍郎虞世基御史大夫裴藴左翊衛大將軍來護兒秘書監袁充右翊衛將軍宇文協千牛宇文皛皛戸了翻梁公蕭鉅等及其子鉅琮之弟子也蕭琮故梁主琮藏宗翻難將作江陽長張惠紹馳告裴藴江陽縣帶江都郡舊廣陵也大業初更名長知兩翻與惠紹謀矯詔發郭下兵收化及等扣門援帝與上更有藴字文意乃明議定遣報虞世基告反者不實抑而不許須臾難作難乃旦翻藴歎曰謀及播郎竟誤人事播郎虞世基小字虞世基宗人伋謂世基子符璽郎熈曰事勢已然吾將濟卿南度同死何益熈曰棄父背君璽斯氏翻背蒲妹翻求生何地感尊之懐尊謂伋也自此決矣世基弟世南抱世基號泣請代化及不許號戸刀翻黄門侍郎裴矩知必將有亂雖厮役皆厚遇之厮音斯今人讀如瑟又建䇿為驍果娶婦事見上卷上年為于偽翻及亂作賊皆曰非裴黄門之罪既而化及至矩迎拜馬首故得免化及以蘇威不預朝政亦免之朝直遥翻威名位素重徃參化及化及集衆而見之曲加殊禮百官悉詣朝堂賀給事郎許善心獨不至許𢎞仁馳告之曰天子已崩宇文將軍攝政闔朝文武咸集朝直遥翻天道人事自有代終何預於叔而低回若此善心怒不肯行𢎞仁反走上馬泣而去化及遣人就家擒至朝堂既而釋之善心不舞蹈而出化及怒曰此人大負氣復命擒還殺之其母范氏年九十二撫柩不哭曰能死國難吾有子矣因卧不食十餘日而卒上時掌翻復扶又翻柩音舊難乃旦翻卒子恤翻唐王之入關也張季珣之弟仲琰為上洛令張季珣死節見上卷上年上洛縣隋帶上洛郡帥吏民拒守部下殺之以降帥讀曰率降戸江翻宇文化及之亂仲琰弟琮為千牛左右隋制領左右府有千牛左右司射左右化及殺之兄弟三人皆死國難時人愧之化及自稱大丞相總百揆以皇后令立秦王浩為帝居别宫令發詔畫敕書而已仍以兵監守之令力丁翻監古銜翻化及以弟智及為左僕射士及為内史令裴矩為右僕射乙卯徙秦公世民為趙公戊辰隋恭帝詔以十郡益唐國仍以唐王為相國總百揆唐國置丞相以下官又加九錫王謂僚屬曰此諂諛者所為耳孤秉大政而自加寵錫可乎必若循魏晉之迹彼皆繁文偽飾欺天罔人考其實不及五覇而求名欲過三王此孤常所非笑竊亦恥之或曰歴代所行亦何可廢王曰堯舜湯武各因其時取與異道皆推其至誠以應天順人未聞夏商之末必效唐虞之禪也若使少帝有知必不肯為少詩照翻若其無知孤自尊而餙譲平生素心所不為也但改丞相為相國府其九錫殊禮皆歸之有司宇文化及以左武衛將軍陳稜為江都太守綜領留事守式又翻壬申令内外戒嚴云欲還長安皇后六宫皆依舊式為御營營前别立帳化及視事其中仗衛部伍皆擬乗輿乘䋲證翻奪江都人舟檝取彭城水路西歸煬帝改徐州為彭城郡檝與楫同以折衝郎將沈光驍勇煬帝置折衝郎將正四品掌領驍果屬領左右府將即亮翻下同驍堅堯翻使將給使營於禁内既立御營以御營之内為禁内行至顯福宫虎賁郎將麥孟才虎牙郎錢傑煬帝制十二衛府每衛置䕶軍四人掌副貳將軍尋改䕶軍為虎賁郎將而置虎牙郎將副焉虎牙郎下當有將字與光謀曰吾儕受先帝厚恩今俛首事讎受其驅帥儕士皆翻俛音免帥讀曰率不同何面目視息世間哉吾必欲殺之死無所恨光泣曰是所望於將軍也孟才乃紏合恩舊恩舊與之有舊恩者帥所將數千人期以晨起將發時襲化及語洩帥讀曰率洩息列翻化及夜與腹心走出營外留人告司馬徳戡等使討之光聞營内諠知事覺即襲化及營空無所獲值内史侍郎元敏數而斬之數所具翻又所主翻徳戡引兵入圍之殺光其麾下數百人皆鬬死一無降者降戸江翻孟才亦死孟才鐵杖之子也鐵杖死於渡遼之役武康沈法興隋志武康縣屬餘杭郡劉昫曰呉分烏程餘杭二縣立永安縣晉改為永康又改為武康唐分屬湖州世為郡著姓宗族數千家法興為吳興太守守式又翻聞宇文化及弑逆舉兵以討化及為名丹考異曰太宗實録舊唐帝紀二月法興㨿楊起兵按法興起兵討化及當在弑逆後比至烏程得精卒六萬遂攻餘杭毗陵丹陽皆下之按烏程縣帶呉興郡沈法興既為吳興守而云舉兵至烏程者法興傳云大業末法興為吳興郡守東陽賊樓世幹略其郡煬帝詔法興與太僕丞元祐討之義寧二年江都亂法興執祐舉兵名討宇文化及三月發東陽行収兵趨江都下餘杭北至烏程衆六萬如此則自東陽至烏程也比必寐翻據江表十餘郡自稱江南道大總管承制置百官陳國公竇抗唐王之妃兄也煬帝使行長城於靈武行循行也音下孟翻聞唐王定關中癸酉帥靈武鹽川等數郡來降煬帝改靈州為靈武郡鹽州為鹽川郡帥讀曰率夏四月稽胡㓂富平隋志富平縣屬京兆郡杜佑曰稽胡一名歩落稽盖匈奴别種自離石以西安定以東方七八百里將軍王師仁擊破之又五萬餘人㓂冝春相國府諮議參軍竇軌將兵討之戰於黄欽山宜春當作宜君隋志宜君縣屬京兆郡有清水水經注清水出雲陽縣之石門山東南流逕黄嶔山西將即亮翻下同稽胡乗髙縱火官軍小却軌斬其部將十四人拔隊中小校代之勒兵復戰校戸教翻復扶又翻軌自將數百騎居軍後令之曰聞鼓聲有不進者自後斬之既而鼓之將士争先赴敵稽胡射之不能止騎竒寄翻射而亦翻遂大破之虜男女二萬口世子建成等至東都軍於芳華苑東都閉門不出遣人招諭不應李密出軍争之小戰各引去城中多欲為内應者趙公世民曰吾新定關中根本未固雖得東都不能守也遂不受戊寅引軍還還從宣翻又音如字世民曰城中見吾退必來追躡乃設三伏於三王陵以待之水經注三王陵在河南縣西南柏亭東北三王或言周景王悼王定王也崔浩曰定當為敬子朝作亂西周政弱人荒悼敬二王與景王俱𦵏於此故世以三王名陵段逹果將萬餘人追之遇伏而敗世民逐北抵其城下東都城下斬四千餘級遂置新安宜陽二郡新安後周置中州及東垣縣隋廢州改縣名宜陽後魏置郡隋開皇初廢為縣與新安皆屬河南郡今並置郡使行軍總管史萬寳盛彦師鎮宜陽姓苑後漢西羗傳有北海大守盛苞其先姓奭避元帝諱改姓盛余按戰國䇿秦有盛橋則盛姓尚矣吕紹宗任瓌將兵鎮新安而還任音壬瓌古回翻置二郡内以蔽關輔外以圖東都還從宣翻又如字初五原通守櫟陽張長遜煬帝改豊州為五原郡新唐書張五遜京兆櫟陽人隋志京兆無櫟陽縣櫟音藥守式又翻以中原大亂舉郡附突厥突厥以為割利特勒郝瑗説薛舉厥九勿翻郝呼各翻瑗子眷翻説輸芮翻下同與梁師都及突厥連兵以取長安舉從之時啓民可汗之子咄苾可從刋入聲汗音寒咄當没翻苾毗必翻號莫賀咄設建牙直五原之北舉遣使與莫賀咄設謀入㓂咄當没翻使䟽吏翻下同莫賀咄設許之唐五使都水監宇文歆賂莫賀咄設開皇初立都水臺置使者大業改為都水監改使者為監且為陳利害止其出兵又説莫賀咄設遣張長遜入朝以五原之地歸之中國莫賀咄設並從之為于偽翻咄當没翻朝直遥翻下同己卯武都宕渠五原等郡皆降武都漢郡西魏置武州煬帝復為郡宕渠漢縣梁置渠州煬帝改為宕渠郡此二郡與五原同日來降故連書之宕徒浪翻王即以長遜為五原太守守式又翻長遜又詐為詔書與莫賀咄設示知其謀莫賀咄設乃拒舉師都等不納其使使䟽吏翻戊戌世子建成等還長安異考曰創業注在三月今從太宗實録東都號令不出四門人無固志朝議郎段世宏等謀應西師㑹西師已還西師謂建成等之師還從宣翻又音如字乃遣人招李密期以己亥夜納之事覺越王命王世充討誅之密聞城中已定乃還宇文化及擁衆十餘萬據有六宫自奉飬一如煬帝每於帳中南面坐人有白事者嘿然不對下牙方取啓狀與唐奉義牛方裕薛世良張愷等參决之劉馮事始曰兵書曰牙旗者將軍之精凡始建牙必以制日制者其辰在五行以上剋下之日也又尚書曰門旗二口色紅八幅大將牙門之旗出引將軍前列又黄帝出軍决曰牙旗者將軍之精金枝者將軍之氣周禮司常職云軍旅㑹同置旌門夫以旌為門即旗門也後世軍中遂置牙門將又有牙兵典總此名者以押牙為名至於官府早晚軍吏兩謁亦名為衙呼謂既熟雖天子正殿受朝謁亦名正衙以少主浩付尚書省令衛士十餘人守之少始照翻遣令史取其畫敕隋門下省有録事通事令史各六人百官不復朝參至彭城水路不通復奪民車牛得二千兩復扶又翻朝直遥翻兩力譲翻並載宫人珍寳其戈甲戎器悉令軍士負之道逺疲劇軍士始怨司馬徳戡竊謂趙行樞曰君大謬誤我行樞建言以化及為主當今撥亂必籍英賢化及庸暗羣小在側事將必敗若之何行樞曰在我等耳廢之何難初化及既得政賜司馬徳戡爵温國公加光禄大夫以其專統驍果心忌之後數日化及署諸將分部士卒驍堅堯翻將即亮翻以徳戡為禮部尚書外示羙遷實奪其兵柄徳戡由是憤怨所獲賞賜皆以賂智及智及為之言乃使之將後軍萬餘人以從及為于偽翻將即亮翻從才用翻於是徳戡行樞與諸將李本尹正卿宇文導師等謀以後軍襲殺化及更立徳戡為主遣人詣孟海公結為外助孟海公據曹州遷延未發待海公報許宏仁張愷知之以告化及化及遣宇文士及陽為遊獵至後軍徳戡不知事露出營迎謁因執之化及譲之曰與公戮力共定海内出於萬死今始事成方願共守富貴公又何反也徳戡曰本殺昏主苦其淫虐推立足下而又甚之逼於物情不得已也化及縊殺之并殺其支黨十餘人孟海公畏化及之彊帥衆具牛酒迎之帥讀曰率下同李密據鞏洛以拒化及洛水至鞏入河故曰鞏洛化及不得西引兵向東郡東郡通守王軌以城降之守式又翻降户江翻下同辛丑李密將井陘王君廊帥衆來降隋志井陘縣屬恒山郡將即亮翻下同陘音刑帥讀曰率君考異曰太宗實録曰王君愕邯鄲人君廊冦畧邯鄲愕徃投之因謂君廊陳井陘之險勸先徃據之君廊從其言屯井陘山歲餘㑹義師入定關中乃與君廊率所部萬餘人歸順拜大將軍與君廊事皆出太宗實録而不同如此今據髙祖實録稱李密將王君廊降從君廊傳君廊本羣盗有衆數千人與賊帥韋寳鄧豹合軍虞鄉劉昫曰虞鄉縣漢解縣地後魏分置虞鄉縣隋志屬河東郡帥所類翻唐王與李密俱遣使招之使䟽吏翻寳豹欲從唐王君廊偽與之同乗其無備襲撃破之奪其輜重重直用翻奔李密密不禮之復來降復扶又翻拜上柱國假河内太守蕭銑即皇帝位置百官凖梁室故事諡其從父琮為孝靖皇帝謚神至翻從才用翻祖巖為河間忠烈王父璿為文憲王璿音旋封董景珍等功臣七人皆為王遣宋王楊道生撃南郡下之徙都江陵煬帝改荆州為南郡江陵帶郡修復園廟引岑文本為中書侍郎使典文翰委以機密又使魯王張繡徇嶺南隋將張鎮周王仁壽等拒之既而聞煬帝遇弑皆降於銑欽州刺史寗長真亦以鬱林始安之地附於銑煬帝改欽州為寜越郡長真刺史文帝所命也鬰林郡梁定州也後改為南定州平陳改為尹州大業初改為鬰州尋改為郡又改桂州為始安郡漢陽太守馮盎以蒼梧髙凉珠崖番禺之地附於林士宏新唐書馮盎傳曰隋仁壽初盎平潮成叛獠拜漢陽太守隋亡奔還嶺表據有諸郡蒼梧郡梁置成州開皇初改為封州煬帝改為郡改髙州為髙凉郡崖州為珠崖郡畨禺南海郡治畨音潘禺音愚銑士宏各遣人招交趾太守丘和煬帝改交州為交趾郡和不從銑遣寗長眞帥嶺南之兵自海道攻和帥讀曰率下同和欲出迎之司法書佐髙士亷煬帝改郡諸司參軍為書佐說和曰長真兵數雖多懸軍逺至不能持乆城中勝兵足以當之説輸芮翻下並同勝音升奈何望風受制於人和從之以士廉為軍司馬將水陸諸軍逆擊破之將即亮翻長真僅以身免盡俘其衆既而有驍果自江都至驍堅堯翻得煬帝凶問亦以郡附於銑士廉勱之子也高勱北齊清河王岳之子勱音邁始安郡丞李襲志遷哲之孫也李遷哲見一百七十七卷太建二年隋末散家財募士得三千人以保郡城蕭銑林士宏曹武徹迭來攻之皆不克聞煬帝遇弑帥吏民臨三日臨力鴆翻或説襲志曰公中州貴族按李襲志之先隴西狄道人後為金州安康人此必出其家傳以門地自髙耳久臨鄙郡華夷悦服今隋室無主海内鼎沸以公威惠號令嶺表尉佗之業可坐致也尉佗事見漢髙帝紀佗徒何翻襲志怒曰吾世繼忠貞今江都雖覆宗社尚存尉佗狂僭何足慕也欲斬説者衆乃不敢言堅守二年外無聲援城䧟為銑所虜銑以為工部尚書檢校桂州總管於是東自九江煬帝改江州為九江郡西抵三峽南盡交趾北距漢川此漢川謂漢水以南之地非漢中之漢川郡銑皆有之勝兵四十餘萬勝音升煬帝凶問至長安唐王哭之慟曰吾北面事人失道不能救敢忘哀乎五月山南撫慰使馬元規撃朱粲於冠軍破之冠軍縣屬南陽郡使䟽吏翻冠古玩翻王徳仁既殺房彦藻事見上二月李密遣徐世勣討之徳仁兵敗甲寅與武安通守袁子幹皆來降詔以徳仁為鄴郡太守煬帝改洺州為武安郡相州為魏郡此又改魏郡為鄴郡也守式又翻戊午隋㳟帝禪位於唐遜居代邸隋開皇元年受禪歲在辛丑三主三十八年而亡考異曰創業注此詔在四月今從實録甲子唐王即皇帝位於太極殿即隋大興殿也唐既受禪改為大極殿遣刑部尚書蕭造告天於南郊大赦改元改元武徳罷郡置州以太守為刺史大業三年改州為郡推五運為土徳色尚黄隋煬帝凶問至東都戊辰留守官奉越王即皇帝位越王侗亦元徳太子昭子大赦改元皇泰是時於朝堂宣㫖以時鐘金革朝直遥翻説文曰鐘當也公私皆即日大祥大祥而禫追諡大行曰明皇帝廟號世祖追尊元徳太子曰成皇帝廟號世宗尊母劉良娣為皇太后以段達為納言陳國公王世充為納言鄭國公隋制門下省納言二人元文都為内史令魯國公皇甫無逸為兵部尚書杞國公又以盧楚為内史令隋初内史省置監令各一人尋廢監置令二人郭文懿為内史侍郎趙長文為黄門侍郎共掌朝政長知兩翻朝直遥翻時人號七貴皇泰主眉目如畫温厚仁愛風格儼然辛未突厥始畢可汗遣骨咄禄特勒來厥九勿翻可從刋入聲汗音寒突厥官子弟曰特勒咄當没翻宴之於太極殿奏九部樂杜佑曰武徳初因隋舊制九部樂一宴樂二清商三西凉四扶南五髙麗六龜兹七安國八踈勒九康國前一百八十一卷隋大業四年引杜佑註九部樂與此不同乂考宋祁新唐志唐有十部樂有十四國技以八國入十部而不明指八國為何國此亦異同而難考者也時中國人避亂者多入突厥突厥彊盛東自契丹室韋西盡吐谷渾髙昌諸國皆臣之契欺訖翻又音喫吐從暾入聲谷音浴控弦百餘萬帝以初起資其兵馬前後餉遺不可勝紀遺于季翻勝音升突厥恃功驕倨每遣使者至長安多暴横使䟽吏翻横戸孟翻帝優容之壬申命裴寂劉文静等修定律令置國子太學四門生合三百餘員唐六典國子生文武官三品已上及國公子孫從二品已上曾孫太學生文武官五品已上及郡縣公子孫從三品曾孫四門生文武官七品已上及侯伯子男子若庶人子為後士生者後魏劉芳表云太和二十年立四門博士於四門置學按禮記云天子設四學鄭𤣥注周四郊之虞庠也今以其遼逺故置於四門請移與太學同處從之郡縣學亦各置生員六月甲戌朔以趙公世民為尚書令黄臺公瑗為刑部侍郎黄臺縣公東魏置黄臺縣於潁川大業初廢瑗子眷翻相國府長史裴寂為右僕射知政事司馬劉文静為納言司録竇威為内史令李綱為禮部尚書參掌選事長知兩翻選宣絹翻掾殷開山為吏部侍郎掾于絹翻屬趙慈景為兵部侍郎韋義節為禮部侍郎主簿陳叔逹博陵崔民幹並為黄門侍郎煬帝改定州為博陵郡唐儉為内史侍郎録事參軍裴晞為尚書左丞以隋民部尚書蕭瑀為内史令禮部尚書竇璡為戸部尚書按六典貞觀二十三年避大宗諱始改民部尚書為户部尚書史家以後來官名書之也瑀音禹進則鄰翻蔣公屈突通為兵部尚書屈居勿翻長安令獨孤懷恩為工部尚書瑗上之從子懷恩舅子也從木用翻上待裴寂特厚羣臣無與為比賞賜服玩不可勝紀勝音升命尚書奉御日以御膳賜寂尚書當作尚食六典尚食奉御二人屬殿中省視朝必引與同坐入閤則延之卧内言無不從稱為裴監而不名寂仕隋為晉陽宮監親之以舊官稱之朝直遥翻委蕭瑀以庶政事無大小無不關掌瑀亦孜孜盡力繩違舉過人皆憚之毁之者衆終不自理上嘗有敕而内史不時宣行隋唐之制凡王言下内史省皆宣署申覆而施行之上責其遲瑀對曰大業之世内史宣敕或前後相違有司不知所從其易在前其難在後臣在省日久瑀在隋朝為内史侍郎故云然易以豉翻備見其事今王業經始事繫安危遠方有疑恐失機㑹故臣每受一敕必勘審使與前敕不違始敢宣行稽緩之愆實由於此上曰卿用心如是吾復何憂復扶又翻初帝遣馬元規慰撫山南南陽郡丞河東吕子臧獨據郡不從是年二月遣馬元規元規遣使數輩諭之使疏吏翻皆為子臧所殺及煬帝遇弑子臧發喪成禮然後請降拜鄧州刺史南陽郡復為鄧州降戸江翻下同封南郡公廢大業律令頒新格上每視事自稱名引貴臣同榻而坐劉文靜諫曰昔王導有言若太陽俯同萬物使羣生何以仰照事見九十卷晉元帝太興元年今貴賤失位非常乆之道上曰昔漢光武與嚴子陵共寢子陵加足於帝腹事見後漢書嚴光傳今諸公皆名徳舊齒平生親友宿昔之歡何可忘也公勿以為嫌戊寅隋安陽令吕珉以相州來降隋安陽縣帶相州相息亮翻以為相州刺史己卯祔四親廟主追尊皇髙祖瀛州府君曰宣簡公皇曾祖司空曰懿王皇祖景王曰景皇帝廟號太祖祖妣曰景烈皇后皇考元王曰元皇帝廟號世祖妣獨孤氏曰元貞皇后追諡妃竇氏曰穆皇后瀛州府君熈司空天賜景王亮元王昞每歲祀昊天上帝皇地祗神州地祗以景帝配神州地祗神州迎州冀州戎州拾州柱州營州咸州陽州九州之祇也祗翹移翻感生帝明堂以元帝配古者帝王之興必感五精之氣以生隋以火徳王祀赤熛怒為感帝唐以土徳王祀含樞紐為感帝庚辰立世子建成為皇太子趙公世民為秦王齊公元吉為齊王宗室黄𤓰公白駒為平原王案白駒盖先封黄𤓰縣公黄𤓰縣盖拓㧞魏所置在上邽界水經注黄𤓰水發源黄𤓰谷西東流逕黄𤓰縣北又東北歸於藉水藉水既與黄𤓰水合又東逕上邽城南蜀公孝基為永安王柱國道𤣥為淮陽王長平公叔良為長平王鄭公神通為永康王安吉公神符為襄邑王柱國徳良為新興王上柱國博义為隴西王上柱國奉慈為勃海王孝基叔良神符徳良帝之從父弟博义奉慈弟子道𤣥從父兄子也從才用翻癸未薛舉㓂涇州復以安定郡為涇州後魏置涇州治髙平因涇水為名以秦王世民為元帥將八總管兵以拒之帥所類翻將即亮翻遣太僕卿宇文明逹招慰山東以永安王孝基為陜州總管義寧初以河南陜縣為宏農郡今為陜州陜失冉翻時天下未定凡邊要之州皆置總管府以統數州之兵乙酉奉隋帝為酅國公酅戸圭翻詔曰近世以來時運遷革前代親族莫不誅夷興亡之效豈伊人力其隋蔡王智積等子孫並付所司量才選用量音良東都聞宇文化及西来上下震懼有盖琮者盖古盍翻姓也上疏請説李密與之合勢拒化及説輸芮翻元文都謂盧楚等曰今讐恥未雪而兵力不足若赦密罪使撃化及兩賊自闘吾徐承其弊化及既破密兵亦疲又其將士利吾官賞易可離間易以豉翻間占莧翻并密亦可擒也楚等皆以為然即以琮為通直散騎常侍散悉亶翻騎竒寄翻齎敕書賜密丙申隋信都郡丞東萊麴稜來降拜冀州刺史隋信都郡入唐為冀州東萊郡為萊州宋白曰萊州古萊夷地春秋萊子之國齊滅萊以在國之東故曰東萊降戸江翻萬年縣法曹武城孫伏伽上表周明帝二年分長安為萬年縣與長安並居京城隋改為大興縣唐受禪復為萬年與長安並為赤縣萬年縣治宣揚坊領朱雀街東五十四坊長安縣治長壽坊領街西五十四坊隋煬帝改縣尉為縣正尋改正為戸曹法曹分司以丞郡之六司唐復為縣尉而六司各置佐史孫㐲伽萬年法曹盖隋官也武城縣漢之東武城也唐志屬貝州伽求加翻以為隋以惡聞其過亡天下陛下龍飛晉陽逺近響應未㫷年而登帝位徒知得之之易不知隋失之之不難也惡烏路翻易以豉翻下同臣謂宜易其覆轍務盡下情凡人君言動不可不慎竊見陛下今日即位而明日有獻鷂雛者此乃少年之事豈聖主所須哉鷂戈召翻少詩詔翻又百戲散樂亡國淫聲百戲散樂齊周隋所以亡國散悉亶翻近太常於民間借婦女裙襦五百餘襲襦人朱翻以充妓衣妓渠綺翻擬五月五日𤣥武門遊戲此亦非所以為子孫法也凡如此類悉冝廢罷善惡之習朝夕漸染漸子廉翻易以移人皇太子諸王參僚左右宜謹擇其人其有門風不能雍穆為人素無行義專好奢靡以聲色遊獵為事者皆不可使之親近也行下孟翻好呼到翻近其靳翻自古及今骨肉乖離以至敗國亡家未有不因左右離間而然也間古莧翻願陛下慎之上省表大悦省悉景翻下詔褒稱擢為治書侍御史冶直之翻賜帛三百匹仍頒示遠近辛丑内史令延安靖公竇威薨以將作大匠竇抗兼納言黄門侍郎陳叔逹判納言兼判皆非正官宇文化及留輜重於滑臺滑䑓滑州治所重直用翻以王軌為刑部尚書使守之引兵北趣黎陽趣七喻翻又逡須翻李密將徐世勣據黎陽畏其軍鋒以兵西保倉城將即亮翻化及度河保黎陽分兵圍世勣密帥歩騎二萬壁於清淇汲郡之衛縣古朝歌也隋開皇十六年分置清淇縣大業初廢入衛縣李密盖壁于故縣也與世勣以烽火相應深溝髙壘不與化及戰化及每攻倉城密輒引兵以掎其後掎居豈翻密與化及隔水而語隔淇水也密數之曰卿本匈奴皂𨽻破野頭耳隋書宇文述傳本姓破野頭役屬鮮卑侯豆歸從其主為宇文氏數所具翻父兄子弟並受隋恩冨貴累世舉朝莫二朝置遥翻主上失徳不能死諫反行弑逆欲規簒奪不追諸葛瞻之忠誠諸亮瞻亮之子蜀之亡也瞻死之乃為霍禹之惡逆霍禹光之子漢宣親政禹謀為大逆遂以滅族天地所不容將欲何之若速來歸我尚可得全後嗣化及黙然俯視良久瞋目大言曰與爾論相殺事何須作書語邪嗣祥吏翻瞋昌眞翻邪音耶密謂從者曰從才用翻化及庸愚如此忽欲圖為帝王吾當折杖驅之耳化及盛修攻具以逼倉城世勣於城外掘深溝以固守化及阻塹不得至城下世勣於塹中為地道出兵撃之塹七艶翻化及大敗焚其攻具時密與東都相持日久又東拒化及常畏東都議其後見盖琮至大喜遂上表乞降盖古盍翻上時掌翻降戸江翻請討滅化及以贖罪送所獲雄武郎將于洪建煬帝募驍果置左右雄武府雄武郎將以領之也將即亮翻遣元帥府記室參軍李儉上開府徐師譽等入見皇泰主命戮洪建於左掖門外如斛斯政之法戮斛斯政見一百八十二卷大業十年帥所類翻下同見賢遍翻下同元文都等以密降為誠實盛飾賔館於宣仁門東六典東都東城在皇城之東東曰宣仁門皇泰主引見儉等以儉為司農卿師譽為尚書右丞使具導從列鐃吹從才用翻鐃女交翻似鈴無舌吹昌瑞翻還館玉帛酒饌中使相望饌雛戀翻又士免翻冊拜密太尉尚書令東南道大行臺行軍元帥魏國公令先平化及然後入朝輔政朝直遥翻以徐世勣為右武侯大將軍仍下詔稱密忠欵且曰其用兵機略一禀魏公節度元文都喜於和解謂天下可定於上東門置酒作樂六典東都城東面三門中曰建春南曰永通北曰上東自段逹已下皆起舞王世充作色謂起居侍郎崔長文曰六典起居郎因起居注以為名起居注者記録人君動止之事漢獻帝及西晉以後諸帝皆有起居注皆史官所録自隋置為職員列為侍臣專掌其事每季為卷送付史官按隋志煬帝減内史舍人員加置起居舍人員然未有侍郎起居侍郎始見於此長知兩翻朝廷官爵乃以與賊其志欲何為邪邪音耶文都等亦疑世充欲以城應化及由是有隙然猶外相彌縫陽為親善秋七月皇泰主遣大理卿張權鴻臚卿崔善福賜李密書曰今日以前咸共刷蕩臚如陵翻使至以後使䟽吏翻彼此通懷七政之重佇公匡弼日月五星謂之七政佇待也九伐之利委公指揮周官大司馬以九伐之法正邦國權等既至密北面拜受詔書既無西慮密軍在鞏洛東都城在西悉以精兵東撃化及密知化及軍糧且盡因偽與和化及大喜恣其兵食冀密饋之㑹密下有人獲罪亡扺化及具言其情化及大怒其食又盡乃度永濟渠與密戰于童山之下隋志汲郡衛縣有同山自辰逹酉密為流矢所中墮馬悶絶左右奔散追兵且至唯秦叔寳獨捍衛之密由是獲免叔寳復収兵與之力戰化及乃退中竹仲翻復扶又翻化及入汲郡求軍糧又遣使考掠東郡吏民以責米粟使䟽吏翻拷音考掠音亮王軌等不堪其弊遣通事舍人許敬宗詣密請降隋内書省有通事舍人十六人降户江翻以軌為滑州總管改東郡為滑州滑州治白馬春秋衛之漕邑宋魏兵争以滑臺為重鎮隋開皇三年置滑州取滑臺為名也以敬宗為元帥府記室與魏徴共掌文翰敬宗善心之子也善心死於江都之難房公蘇威在東郡隨衆降密密以其隋氏大臣虛心禮之威見密初不言帝室艱危唯再三舞蹈稱不圖今日復覩聖明時人鄙之化及聞王軌叛大懼自汲郡引兵欲取以北諸郡其將陳智畧帥嶺南驍果萬餘人樊文超帥江淮排䂎將即亮翻帥讀曰率䂎作管翻張童兒帥江東驍果數千人皆降於密文超子盖之子也樊子盖事煬帝有守東都之功化及猶有衆二萬北趣魏縣隋志魏縣屬武陽郡時李密改武陽郡為魏州趣七喻翻又須翻密知其無能為西還鞏洛留徐世勣以備之乙巳宣州刺吏周超撃朱粲敗之宣州疑當作冝州敗補邁翻下同丁未梁師都㓂靈州復以靈武郡為靈州宋白曰靈州漢富平縣地後魏孝昌二年置靈州驃騎將軍藺興粲撃破之義師初起改隋鷹揚郎將曰軍頭尋改軍頭口驃騎將軍驃匹妙翻騎竒寄翻突厥闕可汗遣使内附西突厥闕度設處於㑹寧隋亂自稱可汗使䟽吏翻可從刋入聲汗音寒初闕可汗附於李軌隋西戎使者曹瓊據甘州誘之西戎使者盖隋煬帝所置宋白曰西魏廢帝二年以張掖為甘州隋大業以為張掖郡唐復以張掖郡為甘州誘音酉乃更附瓊與之拒軌為軌所敗竄於逹斗㧞谷與吐谷渾相表裏敗補邁翻吐從暾入聲谷音浴至是内附尋為李軌所滅薛舉進逼髙墌新志寧州定平縣有髙墌城墌章恕翻遊兵至於豳岐唐復以北地郡為豳州扶風郡為岐州詳見下卷秦王世民深溝髙壘不與戰㑹世民得瘧疾瘧魚約翻委軍事於長史納言劉文靜劉文靜以納言為秦王行軍長史長知兩翻司馬殷開山殷開山以吏部侍郎為行軍司馬且戒之曰薛舉懸軍深入食少兵疲若來挑戰少始紹翻挑徒了翻愼勿應也俟吾疾愈為君等破之為于偽翻開山退謂文靜曰王慮公不能辦故有此言耳且賊聞王有疾必輕我冝曜武以威之乃陳於髙墌西南陳讀曰陣恃衆而不設備舉濳師掩其後壬子戰於淺水原新志豳州冝禄縣有淺水原八總管皆敗士卒死者什五六大將軍慕容羅李安遠劉宏基皆沒世民引兵還長安舉遂㧞髙墌収唐兵死者為京觀觀古玩翻文靜等皆坐除名乙卯榆林賊帥郭子和遣使來降帥所類翻使䟽吏翻下同降户江翻以為靈州總管李密每戰勝必遣使告捷於皇泰主隋人皆喜王世充獨謂其麾下曰元文都輩刀筆吏耳吾觀其勢必為李密所擒且吾軍士屢與密戰没其父兄子弟前後已多一旦為之下吾屬無類矣欲以激怒其衆文都聞之大懼與盧楚等謀因世充入朝伏甲誅之朝直遥翻段逹性庸懦懦奴過翻又奴亂翻恐其事不就遣其壻張志以楚等謀告世充戊午夜三鼓世充勒兵襲含嘉門含嘉門盖以通含嘉城而名史考異曰河洛記初元文都欲自為御盧楚等為宣詔王世充固執以為不可乃止文都大恨盧楚私謂文都曰王世充是外軍一將非留守逹官比者領軍屢為奔徙吾方䘏外姦且從捨過翻更宰制人事䟦扈縱横此而不除恐為國患文都曰未可即殺且欲當朝上奏御前縳之鏁繋於獄楚曰善文都懷奏入殿臨欲施行趙季卿私告之世充遂奔含嘉以作亂是時宫中亦遣使傳報世充為皇姨故也初世充妻蕭氏早亡後有胡氏者復在江都皇泰主乃以皇姨嫁之至是爭權遂起兵馬文都等令趙方海前後追世充世充乃托疾不受召按世充正為與文都爭李密事相誅耳恐事不因此今不取元文都聞變入奉皇泰主御乾陽殿乾陽殿隋東都宫正殿陳兵自衛命諸將閉門拒守將即亮翻將軍䟦野綱將兵出遇世充下馬降之䟦野虜複姓將軍費曜田闍戰於門外不利費父沸翻闍視遮翻又音都文都自將宿衛兵欲出𤣥武門以襲其後𤣥武門宫城北門長秋監段瑜煬帝大業三年改内侍省為長秋監稱求門鑰不獲稽留遂久天且曙文都復欲引兵出太陽門逆戰還至乾陽殿世充已攻太陽門得入按舊書王世充傳太陽門宫城東門皇甫無逸棄母及妻子斫右掖門西奔長安六典皇城在都城西北隅南面三門中曰端門左曰左掖右曰右掖盧楚匿於太官署太官署在光禄寺百僚廨署皆在皇城之内世充之黨擒之至興教門見世充皇宫南面三門左曰興教世充令亂斬殺之進攻紫微宫門皇泰主使人登紫微觀觀門闕也音古玩翻問稱兵欲何為世充下馬謝曰元文都盧楚等横見規圖横戸孟翻請殺文都甘從刑典段逹乃令將軍黄桃樹執送文都文都顧謂皇泰主曰臣今朝死陛下夕至矣皇泰主慟哭遣之出興教門亂斬如盧楚并殺盧元諸子段逹又以皇泰主命開門納世充世充悉遣人代宿衛者然後入見皇泰主於乾陽殿見賢遍翻丅同皇泰主謂世充曰擅相誅殺曾不聞奏豈為臣之道乎公欲肆其彊力敢及我邪邪音耶世充拜伏流涕謝曰臣䝉先皇采㧞粉骨非報文都等苞藏禍心欲召李密以危社稷疾臣違異深積猜嫌臣廹於救死不暇聞奏若内懷不臧違負陛下天地日月實所照臨使臣闔門殄滅無復遺類復扶又翻詞淚俱發皇泰主以為誠引令升殿與語久之因與俱入見皇太后皇泰主之母劉良娣世充被髪為誓稱不敢有貳心被皮義翻乃以世充為左僕射總督内外諸軍事比及日中比必寐翻捕獲趙長文郭文懿殺之二人盖盧元之黨長知兩翻然後廵城告諭以誅元盧之意世充自含嘉城移居尚書省漸結黨援恣行威福用兄世惲為内史令惲於粉翻入居禁中子弟咸典兵馬分政事為十頭悉以其黨主之勢震内外莫不趨附皇泰主拱手而已李密將入朝朝直遥翻至温隋志温縣屬河内郡聞元文都等死乃還金墉東都大饑私錢濫惡大半雜以錫鐶隋開皇初見用之錢皆須和以錫鑞錫鑞既賤求利者多私鑄之錢不可禁約乃詔禁出錫鑞之處不得私採立榜置様錢不中様者不入於市大業之季王綱弛紊私鑄益多錢轉薄惡初焉每千猶重二斤漸輕至一斤或剪鐵鍱裁皮糊紙以為錢相雜用之錢鐶固冝多矣鐶户關翻其細如線米斛直錢八九萬初李密嘗受業於儒生徐文遠文遠為皇泰主國子祭酒自出樵采為密軍所執密令文遠南面坐備弟子禮北面拜之文遠曰老夫既荷厚禮荷下可翻敢不盡言未審將軍之志欲為伊霍以繼絶扶傾乎則老夫雖遲暮猶願盡力若為莾卓乘危邀利則無所用老夫矣密頓首曰昨奉朝命備位上公朝直遥翻下同冀竭庸虛匡濟國難難乃旦翻此密之本志也文遠曰將軍名臣之子李宻寛之子寛為周將以驍勇著名失塗至此若能不遠而復猶不失為忠義之臣及王世充殺元文都等密復問計於文遠復扶又翻文遠曰世充亦門人也其為人殘忍𥚹隘既乘此勢必有異圖將軍前計為不諧矣非破世充不可入朝也朝直遥翻密曰始謂先生儒者不逹時事今乃坐决大計何其明也文遠孝嗣之𤣥孫也徐孝嗣相蕭齊庚申詔隋氏離宫遊幸之所並廢之戊辰遣黄臺公瑗安撫山南瑗於眷翻己巳以隋右武衛將軍皇甫無逸為刑部尚書隋河間郡丞王琮守郡城以拒羣盗琮祖宗翻竇建徳攻之歲餘不下聞煬帝凶問帥吏士發䘮乘城者皆哭建徳遣使弔之琮因使者請降帥讀曰率使䟽吏翻降户江翻下同建徳退舍具饌以待之琮言及隋亡俯伏流涕建徳亦為之泣饌雛戀翻又雛晼翻為於偽翻諸將曰琮久拒我軍殺傷甚衆力盡乃降請烹之建徳曰琮忠臣也吾方賞之以勸事君奈何殺之徃在髙雞泊為盗容可妄殺人今欲安百姓定天下豈得害忠良乎乃狥軍中曰先與王琮有怨敢妄動者夷三族以琮為瀛州刺史復以河間郡為瀛州宋白曰瀛州漢為河間國後漢為樂成國後魏於樂成縣立瀛州取瀛海為名於是河北郡縣聞之争附於建徳盗亦有道豈欺我哉先是建徳䧟景城執户曺河東張𤣥素將殺之景城縣隋志屬河間郡舊曰成平開皇十八年改名張𤣥素為縣户曹也先悉薦翻縣民千餘人號泣請代其死號户口翻曰戸曹清愼無比大王殺之何以勸善建徳乃釋之以為治書侍御史固辭及江都敗復以為黄門侍郎𤣥素乃起史言隋之故官漸就仕於他姓治直之翻復扶又翻饒陽令宋正本隋志饒陽縣屬河間郡博學有才氣説建徳以定河北之䇿説輸芮翻建徳引為謀主建徳定都樂壽隋志樂壽縣屬河間郡舊曰樂城開皇十八年改為廣城仁壽初改今名劉昫曰後魏移縣東北近古樂縣亭因改為樂壽焉按瀛州河間郡時治樂壽宋白曰太和十一年河間郡自樂城移理於今樂壽縣西一里樂壽亭城隋開皇廢郡置瀛州大業廢州為河間郡樂音洛命所居曰金城宫備置百官資治通鑑卷一百八十五
