body:
  text: 資治通鑑卷一百十六宋司馬光撰胡三省音注晉紀三十八起重光大淵獻盡閼逢攝提格凡四年安皇帝辛義熈七年春正月己未劉裕還建康秦廣平公弼有寵於秦王興為雍州刺史鎮安定姚秦分嶺北五郡置雍州刺史鎮安定雍於用翻姜紀諂附於弼勸弼結興左右以求入朝興徴弼為尚書令侍中大將軍弼遂傾身結納朝士朝直遙翻收采名勢以傾東宫國人惡之惡烏路翻㑹興以西北多叛亂欲命重將鎮撫之將即亮翻下待將同隴東太守郭播請使弼出鎮魏收地形志有隴東郡領涇陽祖厲撫夷三縣不載立郡之始蓋苻姚所置也西魏置隴東於汧源唐之隴州是也興不從以太常索稜為太尉領隴西内史使招撫西秦為索稜降西秦張本索昔各翻西秦王乾歸遣使送所掠守宰謝罪請降謂去年克南安畧陽隴西諸郡所得守宰也使疏吏翻降戸江翻興遣鴻臚拜乾歸都督隴西嶺北雜胡諸軍事征西大將軍河州牧單于河南王太子熾磐為鎮西將軍左賢王平昌公臚陵如翻單音蟬熾昌志翻興命羣臣搜舉賢才右僕射梁喜曰臣累受詔而未得其人可謂世之乏才興曰自古帝王之興未嘗取相於昔人相息亮翻待將於將來隨時任才皆能致治將即亮翻治直吏翻卿自識拔不明豈得逺誣四海乎羣臣咸悦姚興之折梁喜誠是矣羣臣體興之意而明揚仄陋者誰乎此所謂好虚名而無實用者也秦姚詳屯杏城為夏王勃勃所逼夏戸雅翻南奔大蘇勃勃遣平東將軍鹿弈干追斬之盡俘其衆勃勃南攻安定破尚書楊佛嵩于青石北原降其衆四萬五千降戸江翻進攻東鄉下之徙三千餘戸于貳城秦鎮北參軍王買徳奔夏夏王勃勃問以滅秦之策買徳曰秦徳雖衰藩鎮猶固願且蓄力以待之勃勃以買徳為軍師中郎將買徳遂為夏之謀臣秦王興遣衛大將軍常山公顯迎姚詳弗及遂屯杏城劉藩帥孟懐玉等諸將追盧循至嶺表帥讀曰率二月壬午懐玉克始興斬徐道覆河南王乾歸徙鮮卑僕渾部三千餘戸于度堅城僕渾降乾歸見上卷上年度堅城即乞伏先所都度堅山城也以子敕勃為秦興太守以鎮之乞伏乾歸本建國號日秦故置秦興郡于度堅山焦朗猶據姑臧朗據姑臧見上卷上年沮渠蒙遜攻抜其城沮子余翻執朗而宥之以其弟拏為秦州刺史鎮姑臧孥女居翻遂伐南凉圍樂都樂音洛三旬不克南凉王傉檀以子安周為質乃還質音致吐谷渾樹洛于伐南凉敗南凉太子虎臺敗補邁翻南凉王傉檀欲復伐沮渠蒙遜邯川䕶軍孟愷諌曰復扶又翻水經河水自西平郡東流逕澆河郡故城北又東逕石城南又東逕邯川城南劉昫日廓州化隆縣東古邯川地杜佑日後漢和帝時侯霸置東西邯屯田五部邯水名也分流左右在寜塞郡據唐志寜塞本澆河郡唐𤣥宗天寳中更名今之廓州蒙遜新并姑臧凶勢方盛不可攻也傉檀不從五道俱進至畨禾苕藋畨音盤藋徒弔翻掠五千餘户而還還從宣翻又如字下同將軍屈右曰今既獲利宜倍道旋師早度險阨蒙遜善用兵若輕軍猝至大敵外逼徙戸内叛此危道也衛尉伊力延曰彼步我騎騎竒寄翻勢不相及今倍道而歸則示弱且捐棄資財非計也俄而昏霾風雨蒙遜兵大至傉檀敗走蒙遜進圍樂都傉檀嬰城固守以子染干為質以請和質音致䝉遜乃還三月劉裕始受太尉中書監加太尉見上卷五年加中書監見六年以劉穆之為太尉司馬陳郡殷景仁為行參軍行參軍未得與參軍事班也事已見前裕問穆之曰孟昶參佐誰堪入我府者穆之舉前建威中兵參軍謝晦晦安兄據之曾孫也孟昶為建威將軍辟晦為中兵參軍裕即命為參軍裕嘗訊囚其旦刑獄參軍有疾以晦代之于車中一覽訊牒催促便下下遐稼翻相府多事相息亮翻獄繫殷積晦隨問酬辨曾無違謬裕由是竒之即日署刑獄賊曹刑獄葢分民曹賊曹賊曹掌盜賊事宋志諸府參軍有長流賊曹刑獄賊曹城局賊曹刑獄無民曹謝晦為參軍未掌曹職今乃升署晦美風姿善言笑博贍多通贍時艶翻裕深加賞愛盧循行收兵至番禺遂圍之孫處拒守二十餘日番禺音潘愚處昌吕翻沈田子言於劉蕃曰番禺城雖險固本賊之巢穴今循圍之或有内變且孫季髙衆力寡弱孫處字季髙不能持久若使賊還據廣州凶勢復振矣復扶又翻夏四月田子引兵救番禺擊循破之所殺萬餘人循走田子與處共追之又破循於蒼梧鬱林寜浦蒼梧鬱林漢古郡寜浦郡吳分合浦郡立蒼梧唐之鬱州鬱林唐之鬱林州寜浦唐之横州㑹處病不能進循奔交州初九真太守李遜作亂九真漢古郡唐之愛州交州刺史交趾杜瑗討斬之瑗卒瑗于眷翻卒子息翻朝廷以其子慧度為交州刺史詔書未至循襲破合浦合浦漢古郡唐之㢘州徑向交州慧度帥州府文武拒循於石碕破之碕渠羈翻岸曲曰碕帥讀曰率循餘衆猶三千人李遜餘黨李脱等結集俚獠五千餘人以應循俚音里獠魯皓翻庚子循晨至龍編南津交趾郡龍編縣州郡皆治焉水經註漢建安二十三年立州之始蛟龍磐編於水南北二津故改龍淵曰龍編余據二漢志皆作龍編無亦師古章懐避唐諱因亦改淵為編乎慧度悉散家財以賞軍士與循合戰擲雉尾炬焚其艦雉尾炬束草之一頭施鐡鏃草尾則散開如雉尾然爇火以投敵艦戸黯翻以步兵夾岸射之射而亦翻循衆艦俱然兵衆大潰循知不免先鴆妻子召妓妾問曰妓渠綺翻誰能従我死者多云雀鼠貪生就死實難或云官尚當死某豈願生乃悉殺諸辭死者因自投于水慧度取其尸斬之并其父子及李脱等函七首送建康初劉毅在京口貧困與知識射於東堂庾悦為司徒右長史後至奪其射堂衆人皆避之毅獨不去悦厨饌甚盛不以及毅毅従悦求子鵝炙饌雛戀翻又雛睆翻炙之夜翻子鵝為炙尤肥美悦怒不與毅由是銜之至是毅求兼督江州詔許之因奏稱江州内地以治民為職治直之翻不當置軍府彫耗民力宜罷軍府移鎮豫章而尋陽接蠻可即州府千兵以助郡戍於是解悦都督將軍官以刺史鎮豫章毅以親將趙恢領千兵守尋陽悦府文武三千悉入毅府符攝嚴峻符攝符下江州追攝之也恱忿懼至豫章疽發背卒疽千余翻卒子恤翻河南王乾歸徙羌句豈等部衆五千餘戸於疊蘭城句豈降乾歸見上卷上年疊蘭城在大夏西南嵻㟍東北以兄子阿柴為興國太守以鎮之漢末興國氐王阿貴據興國城在略陽郡界乞伏因其地名置郡五月復以子木弈干為武威太守鎮嵻㟍城嵻㟍城四年乞伏熾磐所築復扶又翻丁夘魏主嗣謁金陵山陽侯奚斤居守守式又翻昌黎王慕容伯兒謀反己巳奚斤并其黨收斬之秋七月燕王跋以太子永領大單于置西輔太子領大單于始於劉漢時置左右輔而已跋增置前輔後輔單音蟬柔然可汗斛律遣使獻馬三千匹於跋可從刋入聲汗音寒使疏吏翻求娶跋女樂浪公主樂浪音洛琅跋命羣臣議之遼西公素弗曰前世皆以宗女妻六夷宜許以妃嬪之女嬪毗賓翻樂浪公主不宜下降非類跋曰朕方崇信殊俗奈何欺之乃以樂浪公主妻之妻七細翻跋勤於政事勸課農桑省徭役薄賦斂斂力贍翻每遣守宰必親引見見賢遍翻問為政之要以觀其能燕人悦之河南王乾歸遣平昌公熾磐及中軍將軍審䖍伐南涼審䖍乾歸之子也八月熾磐兵濟河此濟金城河也熾昌志翻南涼王傉檀遣太子虎臺逆戰於嶺南傉奴沃翻南涼兵敗虜牛馬十餘萬而還還從宣翻又如字下同沮渠䝉遜帥輕騎襲西涼帥讀曰率騎竒寄翻西涼公暠曰兵有不戰而敗敵者暠古老翻敗補邁翻挫其鋭也䝉遜新與吾盟事見上卷上年而遽來襲我我閉門不與戰待其鋭氣竭而擊之蔑不克矣頃之䝉遜粮盡而歸暠遣世子歆帥騎七千邀擊之蒙遜大敗獲其將沮渠百年河南王乾歸攻秦畧陽太守姚龍于柏陽堡克之冬十一月進攻南平太守王憬於水洛城水經注水洛亭在隴山之西漢略陽縣界鄭戩曰水洛城西占隴坁通秦州往來路隴之二水環城西流繞帶渭河川平上沃廣數百里元豐九域志徳順軍西南一百里有水洛城仁宗朝鄭戩使劉滬所築也憬居永翻又克之徙民三千餘戸於譚郊譚郊在冶城西北遣乞伏審䖍帥衆二萬城譚郊帥讀曰率十二月西羌彭利髮襲據枹罕枹音膚自稱大將軍河州牧乾歸討之不克是歳并州刺史劉道憐為北徐州刺史移鎮彭城八年春正月河南王乾歸復討彭利髮復扶又翻至奴葵谷利髮棄衆南走乾歸遣振威將軍乞伏公府追至清水斬之收羌戸一萬三千以乞伏審䖍為河州刺史鎮枹罕而還二月丙子以呉興太守孔靖為尚書右僕射河南王乾歸徙都譚郊命平昌公熾磐鎮苑川乾歸擊吐谷渾阿若干於赤水降之五代志隋大業五年平吐谷渾置河源郡於古赤水城葢近積石山魏收地形志臨洮郡有赤水縣水經注赤水城亦曰臨洮東城降音戸江翻夏四月劉道規以疾求歸許之道規在荆州累年元年道規刺荆州秋毫無犯及歸府庫帷幕儼然若舊隨身甲士二人遷席於舟中道規刑之於市以後將軍豫州刺史劉毅為衛將軍都督荆寧秦雍四州諸軍事荆州刺史雍於用翻毅謂左衛將軍劉敬宣曰吾沗西任欲屈卿為長史南蠻為南蠻校尉府長史也豈有見輔意乎敬宣懼以告太尉裕裕笑曰但令老兄平安必無過慮毅性剛愎愎弼力翻自謂建義之功與裕相埒埒龍輟翻等也深自矜伐雖權事推裕而心不服觀去年荅弟藩之言可知已及居方岳常怏怏不得志怏於兩翻裕每柔而順之毅驕縱滋甚嘗云恨不遇劉項與之爭中原及敗於桑落事見上卷六年知物情已去彌復憤激復扶又翻裕素不學而毅頗涉文雅故朝士有清望者多歸之朝直遙翻與尚書僕射謝混丹陽尹郗僧施深相慿結僧施超之從子也郗丑之翻郗超黨於桓温僧施黨於劉毅超僅免而僧施及禍矣從才用翻毅既據上流隂有圗裕之志求兼督交廣二州裕許之毅又奏以郗僧施為南蠻校尉後軍司馬毛修之為南郡太守裕亦許之以劉穆之代僧施為丹陽尹毅表求至京口辭墓裕往㑹之於倪塘寧逺將軍胡藩言於裕曰公謂劉衛軍終能為公下乎毅為衛將軍故稱之裕黙然久之曰卿謂何如藩曰連百萬之衆攻必取戰必克毅以此服公至於涉獵傳記師古日涉若涉水獵若獵獸言歴覽之不專精也傳直戀翻一談一詠自許以為雄豪以是搢紳白面之士輻輳歸之恐終不為公下不如因㑹取之裕曰吾與毅俱有克復之功其過未彰不可自相圖也裕雖以是言荅藩隂有以處毅者矣乞伏熾磐攻南凉三河太守呉隂于白土克之以乞伏出累代之水經河水過邯川城南又東逕臨津城北白土城南闞駰十三州志曰左南津西六十里有白土城在大河之北為縁河濟渡之地累力追翻魏收曰白土縣漢屬上郡晉屬金城郡後魏屬新平郡余謂後魏新平之白土乃漢上郡之白土晉金城之白土乃左南西之白土各是一處五代志邠州新平縣舊曰白土此漢上郡及後魏之白土也南凉之白土當在唐鄯州界六月乞伏公府弑河南王乾歸公府國仁之子也以不得立故行弑逆并殺其諸子十餘人走保大夏夏戸雅翻下同平昌公熾磐遣其弟廣武將軍智達揚武將軍木奕干帥騎三千討之以其弟曇達為鎮京將軍鎮譚郊乞伏都譚郊自謂為京師故置鎮京將軍以鎮之帥讀曰率騎竒寄翻下同曇徒含翻驍騎將軍婁機鎮苑川驍堅堯翻熾磐帥文武及民二萬餘戸遷于枹罕秦人多勸秦王興乘亂取熾磐興曰伐人喪非禮也夏王勃勃欲攻熾磐軍師中即將王買徳諫曰熾磐吾之與國今遭喪亂喪息郎翻吾不能恤又恃衆力而伐之匹夫猶且恥為况萬乗乎乗繩證翻勃勃乃止閏月庚子南郡烈武公劉道規卒秋七月己巳朔魏主嗣東巡置四廂大將十二小將以山陽侯斤元城侯屈行左右丞相奚斤封山陽侯拓跋屈封元城侯庚寅嗣至濡源濡乃官翻巡西北諸部落乞伏智達等擊破乞伏公府於大夏公府奔疊蘭城就其弟阿柴智達等攻拔之斬阿柴父子五人公府奔嵻㟍南山嵻音康㟍音即追獲之并其四子轘之於譚郊轘音宦八月乞伏熾磐自稱大將軍河南王熾磐乾歸長子大赦改元永康葬乾歸於枹罕枹音膚諡曰武元廟號髙祖皇后王氏崩庚戌魏主嗣還平城出巡而還也九月河南王熾磐以尚書令武始翟勍為相國勍渠京翻侍中太子詹事趙景為御史大夫罷尚書令僕尚書六卿侍中等官癸酉葬僖皇后于休平陵劉毅至江陵多變易守宰輒割豫州文武江州兵力萬餘人以自隨㑹毅疾篤郗僧施等恐毅死其黨危乃勸毅請從弟兖州刺史藩以自副從才用翻下同太尉裕偽許之藩自廣陵入朝朝直遙翻己邜裕以詔書罪狀毅云與藩及謝混共謀不軌收藩及混賜死初混與劉毅欵昵款尼賢翻混從兄澹常以為憂澹徒覽翻漸與之疎謂弟璞及從子瞻曰益夀此性終當破家益夀混小字也澹安之孫也庚辰詔大赦以前㑹稽内史司馬休之為都督荆雍梁秦寜益六州諸軍事荆州刺史雍於用翻北徐州刺史劉道憐為兖青二州刺史鎮京口北徐州刺史治彭城使道憐鎮京口以為建康北藩之重使豫州刺史諸葛長民監太尉留府事監工銜翻裕疑長民難獨任乃加劉穆之建武將軍置佐吏配給資力以防之是時裕已有殺長民之心矣壬午裕帥諸軍發建康叅軍王鎮惡請給百舸為前驅帥讀曰率舸古我翻丙申至姑孰以鎮惡為振武將軍與龍驤將軍蒯恩將百舸前發驤思將翻蒯苦怪翻將即亮翻裕戒之曰若賊可擊擊之不可者燒其船艦艦戸黯翻留屯水際以待我於是鎮惡晝夜兼行揚聲言劉兖州上上時掌翻下步上藩上同冬十月己未鎮惡至豫章口去江陵城二十里捨船步上蒯恩軍居前鎮惡次之舸留一二人對舸岸上立六七旗旗下置鼓語所留人語牛倨翻下同計我將至城便鼓嚴令若後有大軍狀鼓嚴擂鼓也又分遣人燒江津船艦鎮惡徑前襲城語前軍士告語在前軍士也有問者但云劉兖州至津戍及民間皆晏然不疑未至城五六里逢毅要將朱顯之要將者所親之將掌兵要者欲出江津問劉兖州何在軍士曰在後顯之至軍後不見藩而見軍人擔彭排戰具彭排即今之旁排所以扞鋒矢孫愐曰樐彭排釋名日彭排軍器也彭旁也在旁排敵禦攻也望江津船艦已被燒鼓嚴之聲甚盛知非藩上上時掌翻便躍馬馳去吿毅行令閉諸城門鎮惡亦馳進門未及下關軍人因得入城衛軍長史謝純入參承毅僚佐省府公謂之參承出聞兵至左右欲引車歸純叱之曰我人吏也言為人之吏逃將安之馳還入府純安兄據之孫也鎮惡與城内兵鬭且攻其金城凡城内牙城晉宋時謂之金城自食時至中晡日加申為晡中晡正申時也申末為下晡城内人敗散鎮惡穴其金城而入遣人以詔及赦文并裕手書示毅毅皆燒不視與司馬毛修之等督士卒力戰城内人猶未信裕自來軍士從毅自東來者與臺軍多中表親戚且鬬且語知裕自來人情離駭逮夜聽事前兵皆散斬毅勇將趙蔡將即亮翻毅左右兵猶閉東西閤拒戰鎮惡慮闇中自相傷犯乃引軍出圍金城開其南面毅慮南有伏兵夜半帥左右三百許人帥讀曰率開北門突出毛修之謂謝純曰君但隨僕去純不從為人所殺毅夜投牛牧佛寺牛牧寺在江陵城北二十里初桓蔚之敗也事見一百一十四卷元年蔚紆勿翻走投牛牧寺僧昌昌保藏之毅殺昌至是寺僧拒之曰昔亡師容桓蔚為劉衞軍所殺今實不敢容異人毅嘆曰為法自弊一至於此史記商君得罪於秦亡至關下投舎客舎人不知其是商君也曰商君之法舎人無驗者坐之商君歎曰嗟乎為法自弊一至此哉遂縊而死明日居人以告乃斬首於市并子姪皆伏誅毅兄模奔襄陽魯宗之斬送之初毅季父鎮之閒居京口不應辟召常謂毅及藩曰汝輩才器足以得志但恐不久耳我不就汝求財位亦不同汝受罪累累力瑞翻每見毅藩導従到門輒詬之従才用翻詬許候翻又古候翻罵也毅甚敬畏未至宅數百步悉屏儀衛屏必郢翻與白衣數人俱進及毅死太尉裕奏徴鎮之為散騎常侍光禄大夫散悉亶翻騎竒寄翻固辭不至仇池公楊盛叛秦義熈元年盛降秦今復叛侵擾祁山秦王興遣建威將軍趙琨為前鋒立節將軍姚伯夀繼之前將軍姚恢出鷲峽鷲音就秦州刺史姚嵩出羊頭峽右衛將軍胡翼度出汧城以討盛興自雍赴之汧苦堅翻雍於用翻與諸將㑹于隴口隴道之口也將即亮翻天水太守王松忽言於嵩曰先帝神略無方徐洛生以英武佐命再入仇池無功而還姚萇再攻仇池當攷非楊氏智勇能全也直地埶險固耳今以趙琨之衆使君之威準之先朝實未見成功使君具悉形便何不表聞嵩不從盛帥衆與琨相持伯夀畏懦不進琨衆寡不敵為盛所敗帥讀曰率下同敗補邁翻興斬伯夀而還興以楊佛嵩為雍州刺史帥嶺北見兵以擊夏秦雍州統嶺北五郡治安定見賢遍翻行數日興謂羣臣曰佛嵩每見敵勇不自制吾常節其兵不過五千人今所將既多遇敵必敗行已逺追之無及將若之何佛嵩與夏王勃勃戰果敗為勃勃所執絶亢而死亢與吭同居郎翻秦立昭儀齊氏為后沮渠䝉遜遷於姑臧十一月己夘太尉裕至江陵殺郗僧施初毛修之雖為劉毅僚佐素自結於裕故裕特宥之賜王鎮惡爵漢夀子裕問毅府諮議參軍申永曰今日何施而可永曰除其宿釁倍其惠澤貫叙門次魏晉以來率以門地髙下為用人之次第貫叙者以次叙之若穿錢貫然也顯擢才能如此而已裕納之下書寛租省調調徒弔翻節役原刑禮辟名士荆人恱之諸葛長民驕縱貪侈所為多不法為百姓患常懼太尉裕按之及劉毅被誅長民謂所親曰昔年醢彭越今年殺韓信漢薛公之言被皮義翻禍其至矣乃屏人問劉穆之曰屏必郢翻下同悠悠之言皆云太尉與我不平何以至此穆之曰公泝流逺征以老母稚子委節下若一豪不盡稚直利翻豪古毫字通豈容如此邪長民意乃小安長民弟輔國大將軍黎民説長民曰説輸芮翻劉氏之亡亦諸葛氏之懼也宜因裕未還而圗之長民猶豫未發既而歎曰貧賤常思富貴富貴必履危機今日欲為丹徒布衣豈可得邪長民琅邪陽都人僑居丹徒因遺冀州刺史劉敬宣書曰盤龍狠戾專恣自取夷滅遺于季翻劉毅小字盤龍異端將盡世路方夷富貴之事相與共之敬宣報曰下官自義熈以來沗三州七郡敬宣自北還拜晉陵太守遷江州鎮尋陽兼領郡事徴拜宣城内史領襄城太守遷鎮蠻䕶軍安豐太守梁國内史又遷青州刺史尋改冀州常懼福過災生思避盈居損富貴之㫖非所敢當且使以書呈裕裕曰阿夀故為不負我也敬宣字萬夀故裕稱之曰阿夀劉穆之憂長民為變屏人問太尉行參軍東海何承天曰公今行濟否承天曰荆州不憂不時判判決也别有一慮耳公昔年自左里還入石頭甚脱爾謂破盧循還時也脱爾謂輕脱而還不為嚴偹也今還宜加重慎穆之曰非君不聞此言裕在江陵輔國將軍王誕白裕求先下裕曰諸葛長民似有自疑心卿詎宜便去誕曰長民知我蒙公垂盻今輕身單下必當以為無虞乃可以少安其意耳裕笑曰卿勇過賁育矣盼匹莧翻少詩沼翻賁音奔乃聽先還沮渠蒙遜即河西王位沮渠蒙遜臨松盧水胡人也其先世為匃奴左沮渠遂以官為氏大赦改元𤣥始置官僚如涼王光為三河王故事吕光稱三河王見一百七卷孝武太元十四年太尉裕謀伐蜀擇元帥而難其人帥所類翻以西陽太守朱齡石既有武幹又練吏職欲用之衆皆以為齡石資名尚輕難當重任裕不從十二月以齡石為益州刺史帥寜朔將軍臧熹河間太守蒯恩下邳太守劉鍾等伐蜀帥讀曰率分大軍之半二萬人以配之熹裕之妻弟位居齡石之右亦𨽻焉裕與齡石宻謀進取曰劉敬宣往年出黄虎無功而退事見一百十四卷四年賊謂我今應從外水往而料我當出其不意猶從内水來也庾仲雍曰巴郡江州縣對二水口右則涪内水左則蜀外水如此必以重兵守涪城以備内道涪音浮若向黄虎正墮其計今以大衆自外水取成都疑兵出内水此制敵之竒也而慮此聲先馳賊審虚實别有函書封付齡石署函邉曰至白帝乃開諸軍雖進未知處分所由處昌吕翻分扶問翻毛修之固請行裕恐修之至蜀必多所誅殺土人與毛氏有嫌亦當以死自固不許以毛璩之家為蜀人所滅故也分荆州十郡置湘州成帝咸和三年省湘州入荆州今復置加太尉裕太傅揚州牧丁巳魏主嗣北巡至長城而還秦所築長城也九年春二月庚戌魏主嗣如髙栁川甲寅還宫太尉裕自江陵東還還從宣翻又如字下同駱驛遣輜重兼行而下重直用翻前刻至日毎淹留不進諸葛長民與公卿頻日奉候於新亭輒差其期乙丑晦裕輕舟徑進潜入東府劉穆之何承天所慮者裕已了了於胷中矣三月丙寅朔旦長民聞之驚趨至門裕伏壯士丁旿於幔中旿阮古翻引長民却人閒語凡平生所不盡者皆及之長民甚恱丁旿自幔後出於座拉殺之幔莫半翻拉盧合翻輿尸付廷尉收其弟黎民黎民素驍勇驍堅堯翻格鬬而死并殺其季弟大司馬參軍幼民從弟寧朔將軍秀之從才用翻庚午秦王興遣使至魏修好使疏吏翻好呼到翻太尉裕上表曰大司馬温以民無定本傷治為深庚戌土斷以一其業庚戌制見一百一卷哀帝興寧二年于時財阜國豐實由於此自茲迄今漸用頽弛請申前制于是依界土斷唯徐兖青三州居晉陵者不在斷例徐青兖三州都督率治晉陵故難以土斷斷丁亂翻諸流寓郡縣多所併省戊寅加裕豫州刺史裕固讓太傅州牧辭去年冬所加也林邑范胡達寇九真杜慧度擊斬之河南王熾磐遣鎮東將軍曇達平東將軍王松夀將兵東擊休官權小即吕破胡於白石川闕含翻將即亮翻大破之虜其男女萬餘口進據白石城顯親休官權小成吕奴迦等二萬餘戸據白阬不服迦居牙翻曇達攻斬之隴右休官悉降秦太尉索稜以隴西降熾磐七年秦令索稜守隴西以招撫乞伏索昔各翻降戸江翻熾磐以稜為太傅夏王勃勃大赦改元鳯翔以叱干阿利領將作大匠發嶺北夷夏十萬人築都城於朔方水北黒水之南水經注奢延水又謂之朔方水源出奢延縣西南赤沙阜東北流逕奢延縣故城南赫連於是水之南築統萬城奢延水又東流黒水入焉水出奢延縣黒澗東南歴沙陵注奢延水統萬城唐為夏州定難節度使治所夏戸雅翻勃勃曰朕方統一天下君臨萬邦宜名新城曰統萬阿利性巧而殘忍蒸土築城錐入一寸即殺作者而并築之勃勃以為忠委任之凡造兵器成呈之工人必有死者射甲不入則斬弓人射而亦翻入則斬甲匠又鑄銅為一大鼓飛㢘翁仲銅駝龍虎之屬飾以黄金列於宫殿之前凡殺工匠數千由是器物皆精利勃勃自謂其祖從母姓為劉非禮也載託曰漢髙祖以宗女妻單于冒頓約為兄弟故其子孫冒姓劉氏古人氏族無常乃改姓赫連氏言帝王係天為子其徽赫與天連也其非正統者皆以鐡伐為氏勃勃父衛辰本鐡佛氏故改其非正統者為鐡伐氏言其剛鋭如鐡皆堪伐人也夏四月乙夘魏主嗣西巡命鄭兵將軍奚斤鄭兵北史作都兵鴻飛將軍尉古眞都將閭大肥等擊越勤部於跋那山大肥柔然人也鴻飛將軍拓跋氏所創置將即亮翻柔然姓郁久閭氏今曰閭從省便也跋那山盖在廣甯郡之塞外河南王熾磐遣安北將軍烏地延冠軍將軍翟紹擊吐谷渾别統句旁于泣勤川大破之冠古玩翻别統猶别帥也别統部落者也句古侯翻河西王䝉遜立子政徳為世子加鎮衛大將軍録尚書事南涼王傉檀伐河西王䝉遜蒙遜敗之於若厚塢又敗之於若涼敗補邁翻因進圍樂都樂音洛下長樂同二旬不克南涼湟河太守文支以郡降于蒙遜降戸江翻䝉遜以文支為廣武太守蒙遜復伐南涼傉檀以太尉俱延為質乃還復扶又翻質音致蒙遜西如苕藋藋徒弔翻遣冠軍將軍伏恩將騎一萬襲卑和烏啼二部大破之漢有卑和羌居鮮水海俘二千餘落而還蒙遜寢于新臺閹人王懐祖擊蒙遜傷足其妻孟氏禽斬之蒙遜母車氏卒車尺遮翻五月乙亥魏主嗣如雲中舊宫唐單于都䕶府領金河一縣秦漢之雲中也新書云金河本後魏道武所都丙子大赦西河胡張外等聚衆為盜乙夘嗣遣㑹稽公長樂劉絜等屯西河招討之按乙亥至丙子幾四十日五月無乙夘明矣恐是己夘㑹江外翻六月嗣如五原朱齡石等至白帝發函書曰衆軍悉從外水取成都臧熹從中水取廣漢水經注曰洛水出洛縣章山南逕洛縣故城南廣漢郡治也又南逕新都縣與綿水合又與湔水合亦謂之郫江又逕犍為牛鞞水又東逕資中縣謂之緜水緜水至江陽縣方山下入江謂之緜水口曰中水老弱乘髙艦十餘從内水向黄虎艦戸黯翻於是諸軍倍道兼行譙縱果命譙道福將重兵鎮涪城將即亮翻涪音浮下同以備内水齡石至平模去成都二百里縱遣秦州刺史侯暉尚書僕射譙詵帥衆萬餘屯平模詵萃臻翻夾岸築城以拒之齡石謂劉鍾曰今天時盛熱而賊嚴兵固險攻之未必可拔祇增疲困且欲養鋭息兵以伺其隙何如鍾曰不然前揚聲言大衆向内水譙道福不敢捨涪城今重軍猝至出其不意侯暉之徒已破膽矣賊阻兵守險者是其懼不敢戰也因其兇愳兇許勇翻盡銳攻之其埶必克克平模之後自可鼓行而進成都必不能守矣若緩兵相守彼將知人虛實涪軍忽來并力拒我人情既安良將又集良將謂譙道福將即亮翻此求戰不獲軍食無資二萬餘人悉為蜀子虜矣齡石從之諸將以水北城地險兵多欲先攻其南城齡石曰今屠南城不足以破北若盡鋭以拔北城則南城不麾自散矣秋七月齡石帥諸軍急攻北城克之斬侯暉譙詵引兵迴趣南城帥讀曰率趣七喻翻南城自潰齡石捨船步進譙縱大將譙撫之屯牛脾牛脾當作牛鞞孟康日鞞音髀師古曰音必爾翻牛鞞縣自漢以來屬犍為郡何承天曰晉穆帝度屬蜀郡今簡州西岸有古牛鞞戍城譙小茍塞打鼻打鼻山在今眉州彭山縣南十餘里山形孤起東臨江水俗云昔周鼎淪於此或見其鼻故名塞悉則翻臧熹擊撫之斬之小茍聞之亦潰于是縱諸營屯望風相次奔潰戊辰縦棄成都出走尚書令馬耽封府庫以待晉師壬申齡石入成都誅縦同祖之親餘皆按堵使復其業縦出成都先辭墓其女曰走必不免祇取辱焉等死死於先人之墓可也縦不従譙道福聞平模不守自涪引兵入赴縦往投之道福見縦怒曰大丈夫有如此功業而棄之將安歸乎人誰不死何怯之甚也因投縦以劔中其馬鞍中竹仲翻縦乃去自縊死縊於賜翻又於計翻巴西人王志斬其首以送齡石道福謂其衆曰蜀之存亡實係於我不在譙王今我在猶足一戰衆皆許諾道福盡散金帛以賜衆衆受之而走道福逃於獠中獠魯皓翻巴民杜瑾執送之斬於軍門義熙元年譙縦據蜀九年而滅瑾渠吝翻齡石徙馬耽於越巂巂音髓耽謂其徒曰朱侯不送我京師欲滅口也謂齡石多取庫物殺耽以滅口吾必不免乃盥洗而臥引繩而死須臾齡石使至戮其尸使疏吏翻詔以齡石進監梁秦州六郡諸軍事監古銜翻賜爵豐城縣侯魏奚斤等破越勤於跋郍山西徙二萬餘家於大甯河西胡曹龍等擁部衆二萬人來入蒲子張外降之推龍為大單于降戸江翻單音蟬丙戌魏主嗣如定襄大洛城二漢志定襄郡有駱縣河南王熾磐擊吐谷渾支旁于長栁川虜旁及其民五千餘戸而還八月癸夘魏主嗣還平城曹龍請降于魏執送張外斬之丁丑魏主嗣如豺山宫癸未還九月再命太尉裕為太傅揚州牧固辭河南王熾磐擊吐谷渾别統掘逵於渴渾川大破之虜男女二萬三千冬十月掘逵帥其餘衆降於熾磐掘其月翻帥讀曰率吐京胡與離石胡出以眷叛魏水經注曰吐京即漢西河土軍縣夷夏俗音訛也後魏真君九年置吐京郡隋為隰州石樓縣地魏主嗣命元城侯屈督㑹稽公劉絜永安侯魏勤以討之丁巳出以眷引夏兵邀擊絜禽之以獻于夏勤戰死㑹工外翻夏戸雅翻嗣以屈亡二將將即亮翻欲誅之既而赦之使攝并州刺史屈到州縱酒廢事嗣積其前後罪惡檻車徴還斬之魏主嗣之入立也屈子磨渾有功焉屈恃之而驕積其惡而誅之非所以保功臣之門也十一月魏主嗣遣使請昏於秦使疏吏翻秦王興許之是歳以敦煌索邈為梁州刺史敦徒門翻索昔各翻苻宣乃還仇池苻宣入漢中見一百十四卷元年初邈寓居漢川與别駕姜顯有隙凡十五年而邈鎮漢川顯乃肉袒迎候邈無愠色愠於問翻待之彌厚退而謂人曰我昔寓此失志多年若讐姜顯懼者不少少詩沼翻但服之自佳何必逞志於是闔境聞之皆恱鞠羨之安東萊亦若是而已世人修怨以致禍者由不知此道也十年春正月辛酉魏大赦改元神瑞辛巳魏主嗣如繁畤畤音止二月戊戌還平城夏王勃勃侵魏河東蒲子庚戌魏主嗣如豺山宫魏并州刺史婁伏連襲殺夏所置吐京䕶軍及其守兵魏書官氏志内入諸姓有匹婁氏後改為婁氏去年夏破拓跋屈因置守兵於吐京司馬休之在江陵頗得江漢民心子譙王文思在建康文思休之之長子也譙王尚之死於桓𤣥之難帝反正以文思嗣國性㐫暴好通輕俠大尉裕惡之好呼到翻惡烏路翻三月有司奏文思擅捶殺國吏捶止蘂翻詔誅其黨而宥文思休之上疏謝罪請解所任不許裕執文思送休之令自訓厲意欲休之殺之休之但表廢文思并與裕書陳謝裕由是不悦為後裕伐休之張本以江州刺史孟懐玉兼督豫州六郡以備之豫州六郡宣城襄城淮南廬江安豐歴陽也夏五月辛酉魏主嗣還平城秦後將軍歛成討叛羌為羌所敗敗補邁翻懼罪出奔夏秦王興有疾妖賊李𢎞與氐仇常反於貳城妖於驕翻興輿疾徃討之斬常執𢎞而還還從宣翻又如字秦左將軍姚文宗有寵於太子泓廣平公弼惡之惡烏路翻誣文宗有怨言秦王興怒賜文宗死于是羣臣畏弼側目弼言於興無不従者以所親天水尹冲為給事黄門侍即唐盛為治書侍御史治直之翻下同興左右掌機要者皆其黨也右僕射梁喜侍中任謙京兆尹尹昭承間言於興曰父子之際人所難言然君臣之義不薄於父子任音壬間古莧翻父子君臣皆人之大倫故云然故臣等不得黙然廣平公弼潜有奪嫡之志陛下寵之太過假其威權傾險無賴之徒輻湊附之道路皆言陛下將有廢立之計信有之乎興曰豈有此邪喜等曰茍無之則陛下愛弼實所以禍之願去其左右去羌吕翻損其威權如此非特安弼乃所以安宗廟社稷興不應大司農竇温司徒左長史王弼皆宻疏勸興立弼為太子興雖不従亦不責也興疾篤弼潛聚衆數千人謀作亂姚裕遣使以弼逆狀吿諸兄在藩鎮者使疏吏翻于是姚懿治兵於蒲阪鎮東將軍豫州牧洸治兵於洛陽懿洸皆興子也冶直之翻洸姑黄翻平西將軍諶治兵於雍諶氏壬翻雍於用翻皆欲赴長安討弼㑹興疾瘳瘳且留翻見羣臣征虜將軍劉羌泣以告興梁喜尹昭請誅弼且曰茍陛下不忍殺弼亦當奪其權任興不得已免弼尚書令使以將軍公還第弼為大將軍封廣平公懿等各罷兵懿洸諶與姚宣皆入朝使裕入白興求見朝直遙翻見賢遍翻下同興曰汝等正欲論弼事耳吾已知之裕曰弼茍有可論陛下所宜垂聽若懿等言非是便當寘之刑辟辟毗亦翻奈何逆拒之於是引見懿等於諮議堂宣流涕極言興曰吾自處之處昌吕翻下同非汝曹所憂撫軍東曹屬姜虬上疏曰廣平公弼釁成逆著道路皆知之昔文王之化刑于寡妻詩思齊曰刑于寡妻至于兄弟今聖朝之亂起自愛子雖欲含忍掩蔽而逆黨扇惑不已弼之亂心何由可革宜斥散凶徒以絶禍端興以虬表示梁喜曰天下人皆以吾兒為口實孔安國曰口實謂常不去口將何以處之喜曰信如虬言陛下宜早裁決興黙然史言姚興不聽臣子之言養成泓弼爭國之禍唾契汗乙弗等部皆叛南涼契欺訖翻汗何干翻北史曰乙弗國有契翰一部風俗亦同杜佑曰乙弗敵後魏聞焉在吐谷渾北衆有萬餘落風俗與吐谷渾同然不識五穀唯食魚與蘇子蘇子狀若中國枸杞子或赤或黒西有契翰一部風俗亦同南涼王傉檀欲討之邯川䕶軍孟愷諫曰邯戸甘翻今連年饑饉南逼熾磐北逼蒙遜百姓不安逺征雖克必有後患不如與熾磐結盟通糴慰撫雜部足食繕兵俟時而動傉檀不從謂太子虎臺曰蒙遜近去不能猝來旦夕所慮唯在熾磐然熾磐兵少易禦汝謹守樂都少詩沼翻易以豉翻樂音洛下同吾不過一月必還矣乃帥騎七千襲乙弗帥讀曰率騎奇寄翻大破之獲馬牛羊四十餘萬河南王熾磐聞之欲襲樂都羣臣咸以為不可太府主簿焦襲曰傉檀不顧近患而貪逺利近患謂蒙遜熾磐逺利謂乙弗我今伐之絶其西路樂都之西路此傉檀自乙弗還樂都路也使不得還救則虎臺獨守窮城可坐禽也此天亡之時必不可失熾磐従之帥步騎二萬襲樂都虎臺慿城拒守熾磐四面攻之南涼撫軍從事中即尉肅言於虎臺曰外城廣大難守殿下不若聚國人守内城國人謂鮮卑秃髪之種落肅等帥晉人拒戰於外雖有不捷猶足自存虎臺曰熾磐小賊旦夕當走卿何過慮之深虎臺疑晉人有異心夷人謂華人為晉人悉召豪望有謀勇者閉之於内孟愷泣曰熾磐乗虛内侮國家危於累卵愷等進欲報恩退顧妻子人思效死而殿下乃疑之如是邪虎臺曰吾豈不知君之忠篤懼餘人脱生慮表以君等安之耳一夕城潰熾磐入樂都遣平逺將軍捷䖍帥騎五千追傉檀以鎮南將軍謙屯為都督河右諸軍事涼州刺史鎮樂都捷䖍謙屯皆乞伏種秃髪赴單為西平太守鎮西平以趙恢為廣武太守鎮廣武曜武將軍王基為晉興太守鎮浩亹浩亹音誥門徙虎臺及其文武百姓萬餘戸於枹罕枹音膚赴單烏孤之子也河間人褚匡言於燕王跋曰陛下龍飛遼碣舊邦族黨傾首朝陽言日生於東猶馮跋興於遼碣也其族黨在長樂者傾首而東望之碣其謁翻以日為歳請徃迎之跋曰道路數千里復隔異國如何可致復扶又翻匡曰章武臨海跋之先長樂信都人而章武郡則晉分漢勃海郡所置也自信都至章武可以浮海至遼西舟楫可通出於遼西臨渝不為難也臨渝縣漢屬遼西郡師古曰渝音喻水經曰碣石在縣南跋許之以匡為游擊將軍中書侍郎厚資遣之匡與跋從兄買從弟睹從才用翻自長樂帥五千餘戸歸于和龍漢髙帝置信都郡景帝二年為廣川國明帝更名樂成安帝改曰安平晉改曰長樂樂音洛帥讀曰率契丹庫莫奚皆降于燕契欺訖翻又音喫降戸江翻跋署其大人為歸善王跋弟丕避亂在髙句麗句如字又音駒麗力知翻跋召之以為左僕射封常山公柔然可汗斛律將嫁女於燕可從刋入聲汗音寒斛律兄子步鹿真謂斛律曰幼女逺嫁憂思請以大臣樹黎等女為媵媵以證翻斛律不許步鹿真出謂樹黎等曰斛律欲以汝女為媵逺適它國樹黎恐與步鹿真謀使勇士夜伏於斛律穹廬之後伺其出而執之與女皆送於燕伺相吏翻立步鹿真為可汗而相之相息亮翻初社崘之徙髙車也事見一百十二卷元興元年崘盧昆翻髙車人叱洛侯為之鄉導以併諸部鄉讀曰嚮社崘徳之以為大人步鹿真與社崘之子社拔共至叱洛侯家淫其少妻妻告步鹿真曰叱洛侯欲奉大檀為主大檀者社崘季父僕渾之子也領别部鎮西境素得衆心步鹿真歸而發兵圍叱洛侯叱洛侯自殺遂引兵襲大檀大檀逆擊破之執步鹿真及社拔殺之自立為可汗號牟汗紇升蓋可汗魏收曰魏言制勝也斛律至和龍燕王跋賜斛律爵上谷侯館之遼東待以客禮納其女為昭儀斛律上書請還其國跋曰今棄國萬里又無内應若以重兵相送則饋運難繼兵少則不足成功少詩沼翻如何可還斛律固請曰不煩重兵願給三百騎送至敇勒國人必欣然來迎跋乃遣單于前輔萬陵帥騎三百送之騎奇寄翻單音蟬帥讀曰率下同陵憚逺役至黑山黑山在唐振武之北塞外即殺胡山也殺斛律而還大檀亦遣使獻馬三千匹羊萬口于燕使疏吏翻六月泰山太守劉研等帥流民七千餘家河西胡酋劉遮等帥部落萬餘家皆降於魏酋慤由翻降戸江翻戊申魏主嗣如豺山宫丁亥還平城樂都之潰也南涼安西將軍樊尼自西平奔告南涼王傉檀傉檀謂其衆曰今妻子皆為熾磐所虜退無所歸卿等能與吾藉乙弗之資取契汗以贖妻子乎契欺訖翻汗音寒乃引兵西衆多逃還傉檀遣鎮北將軍段茍追之茍亦不還於是將士皆散唯樊尼與中軍將軍紇勃後軍將軍洛肱散騎侍即隂利鹿不去散悉亶翻騎竒寄翻傉檀曰蒙遜熾磐昔皆委質於吾蒙遜稱臣於利鹿孤見一百一十二卷隆安五年熾磐父子歸利鹿孤見一百一十一卷四年質之日翻今而歸之不亦鄙乎四海之廣無所容身何其痛也與其聚而同死不若分而或全樊尼吾長兄之子樊尼蓋烏孤之子也長知兩翻宗部所寄吾衆在北者戸垂一萬蒙遜方招懐士民存亡繼絶汝其從之紇勃洛肱亦與尼俱行紇戸骨翻吾年老矣所適不容寧見妻子而死遂歸于熾磐唯隂利鹿隨之傉檀謂利鹿曰吾親屬皆散卿何獨留利鹿曰臣老母在家非不思歸然委質為臣忠孝之道難以兩全臣不才不能為陛下泣血求救於鄰國為于偽翻敢離左右乎離力智翻傉檀歎曰知人固未易易以䜴翻大臣親戚皆棄我去今日忠義終始不虧者唯卿一人而已傉檀諸城皆降於熾磐降戸江翻獨尉賢政屯浩亹浩亹音告門固守不下熾磐遣人謂之曰樂都已潰卿妻子皆在吾所獨守一城將何為也賢政曰受涼王厚恩為國藩屏屏必郢翻雖知樂都已陷妻子為禽先歸獲賞後順受誅然不知主上存亡主上謂傉檀也未敢歸命妻子小事豈足動心若貪一時之利忘委付之重者大王亦安用之熾磐乃遣虎臺以手書諭之賢政曰汝為儲副不能盡節面縳於人棄父忘君墮萬世之業墮讀曰隳賢政義士豈效汝乎聞傉檀至左南乃降闞駰十三州志曰左南城在金城白土縣東六十里晉志張氏置晉興郡左南縣屬焉是縣葢亦張氏所置也熾磐聞傉檀至遣使郊迎待以上賓之禮使疏吏翻秋七月熾磐以傉檀為驃騎大將軍賜爵左南公驃匹妙翻騎竒寄翻南涼文武依才銓叙歳餘熾磐使人鴆傉檀左右請解之傉檀曰吾病豈宜療邪遂死諡曰景王載記曰秃髪烏孤至傉檀三世十九年而滅虎臺亦為熾磐所殺傉檀子保周賀俱延子覆龍利鹿孤孫副周烏孤孫承鉢皆奔河西王蒙遜久之又奔魏魏以保周為張掖王覆龍為酒泉公賀西平公副周永平公承鉢昌松公魏主嗣愛賀之才謂曰卿之先與朕同源賜姓源氏為源氏昌大於魏張本八月戊子魏主嗣遣馬邑侯陋孫使於秦辛丑遣謁者于什門使於燕悦力延使於柔然使疏吏翻于什門至和龍不肻入見曰大魏皇帝有詔須馮王出受然後敢入燕王跋使人牽逼令入什門見跋不拜跋使人按其項什門曰馮王拜受詔吾自以賓主致敬何苦見逼邪跋怒留什門不遣什門數衆辱之左右請殺之跋曰彼各為其主耳數所角翻為于偽翻乃幽執什門欲降之什門終不降降戸江翻久之衣冠弊壊略盡蟣蝨流溢跋遺之衣冠遺于季翻什門皆不受魏主嗣以博士王諒為平南參軍使以平南將軍相州刺史尉太眞書與太尉裕相聞太眞古眞之弟也九月丁巳朔日有食之冬十月河南王熾磐復稱秦王置百官熾磐嗣位自稱河南王今并南涼復稱秦王燕主跋與夏連和夏王勃勃遣御史中丞烏洛孤如燕涖盟春秋之時列國釋仇通好兩君不及相見而盟必使其臣涖盟左傳陳五父如鄭涖盟是也杜預曰涖臨也十一月壬午魏主嗣遣使者巡行諸州行下孟翻校閱守宰資財守式又翻非家所齎悉簿為贓西秦王熾磐立妃禿髮氏為后妃傉檀之女也十二月丙戌朔柔然可汗大檀侵魏丙申魏主嗣北擊之大檀走遣奚斤等追之遇大雪士卒凍死及墮指者什二三河内人司馬順宰自稱晉王魏人討之不克燕遼西公素弗卒燕王跋比葬七臨之古者大臣卒君三臨其喪比必寐翻及也是歳司馬國璠兄弟聚衆數百潜渡淮夜入廣陵城祇傳曰自北徐州界渡淮璠孚袁翻青州刺史檀祇領廣陵相國璠兵直上聽事上時掌翻聽讀作㕔祇驚出將禦之被射傷而入射而亦翻謂左右曰賊乗闇得入欲掩我不備但擊五鼓彼懼曉必走矣左右如其言國璠兵果走國璠之擾淮至是十年矣魏博士祭酒崔浩為魏主嗣講易及洪範為于偽翻嗣因問浩天文術數浩占決多驗由是有寵凡軍國宻謀皆預之夏王勃勃立夫人梁氏為王后子璝為太子璝古回翻封子延為陽平公昌為太原公倫為酒泉公定為平原公滿為河南公安為中山公資治通鑑卷一百十六
