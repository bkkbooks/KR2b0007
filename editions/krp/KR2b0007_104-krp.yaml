body:
  text: 資治通鑑卷一百四宋司馬光撰胡三省音註晉紀二十六起柔兆困敦盡𤣥黓敦牂凡七年烈宗孝武皇帝上之中太元元年春正月壬寅朔帝加元服皇太后下詔歸政太后攝政見上卷上年復稱崇徳太后甲辰大赦改元丙午帝始臨朝朝直遥翻以會稽内史郗愔為鎮軍大將軍都督浙江東五郡諸軍事浙江東五郡會稽東陽臨海永嘉新安也㑹工外翻郗丑之翻愔挹淫翻徐州刺史桓冲為車騎將軍都督豫江二州之六郡諸軍事豫州之歴陽淮南廬江安豐襄城及江州之尋陽共六郡騎竒寄翻自京口徙鎮姑孰謝安欲以王藴為方伯故先解冲徐州乙夘加謝安中書監録尚書事二月辛夘秦王堅下詔曰朕聞王者勞于求賢逸於得士齊桓公用管仲之言斯言何其驗也往得丞相常謂帝王易為易以䜴翻自丞相違世鬚髮中白丞相謂王猛中半也中丁仲翻毎一念之不覺酸慟今天下既無丞相或政教淪替替廢也可分遣侍臣周巡郡縣問民疾苦三月秦兵寇南鄉拔之山蠻三萬户降秦自春秋之時伊洛以南巴巫漢沔以北大山長谷皆蠻居之文公十六年庸人率羣蠻以叛楚庸則漢之上庸縣也哀公四年楚人襲梁及霍以圍蠻氏執蠻子赤梁則漢河南之梁縣霍則梁縣南之霍陽山也漢髙帝用巴渝蠻以定三秦則板楯蠻也後漢祭遵攻新城蠻柏華蠻破霍陽聚則春秋蠻氏之聚落也其後又有巫蠻南郡蠻江夏蠻襄陽以西中廬宜城之西山皆蠻居之所謂山蠻也宋齊以後謂之雍州蠻降户江翻夏五月甲寅大赦初張天錫之殺張邕也劉肅及安定梁景皆有功事見一百一卷穆帝升平五年二人由是有寵賜姓張氏以為己子使預政事天錫荒于酒色不親庶務黜世子大懐而立嬖妾之子大豫嬖卑義翻又博計翻以焦氏為左夫人人情憤怨從弟從事中郎憲輿櫬切諫不聽從才用翻櫬初覲翻秦王堅下詔曰張天錫雖稱藩受位然臣道未純可遣使持節武衛將軍茍萇左將軍毛盛中書今梁熙歩兵校尉姚萇等將兵臨西河河水過敦煌酒泉張掖郡南武威郡東北為西河使疏吏翻萇仲良翻將即亮翻尚書郎閻負梁殊奉詔徴天錫入朝朝直遥翻若有違王命即進師撲討撲普卜翻是時秦步騎十三萬軍司段鏗謂周虓曰以此衆戰誰能敵之用左傳齊桓公之言鏗丘耕翻虓虚交翻虓曰戎狄以來未之有也周虓拘執於秦其尊本朝之心雖造次不忘也考異曰虓傳曰呂光征西域堅出餞之戎士二十萬旌旗數百里問虓曰朕衆力何如虓曰戎夷以來未之有也按建元十八年二月虓謀反徙朔方十九年正月呂光發長安故知在伐涼州時今從十六國春秋堅又命秦州刺史茍池河州刺史李辯涼州刺史王統帥三州之衆為茍萇後繼帥讀曰率秋七月閻負梁殊至姑臧張天錫會官屬謀之曰今入朝必不返如其不從秦兵必至將若之何禁中録事席仂曰禁中録事張氏所置使摠録禁中事也仂與力同又音勒以愛子為質質音致賂以重寳以退其師然後徐為之計此屈伸之術也衆皆怒曰吾世事晉朝朝直遥翻忠節著于海内今一旦委身賊庭辱及祖宗醜莫大焉且河西天險百年無虞若悉境内精兵右招西域北引匈奴以拒之何遽知其不捷也天錫攘袂大言曰孤計決矣言降者斬降户江翻下同使謂閻負梁殊曰君欲生歸乎死歸乎殊等辭氣不屈天錫怒縳之軍門命軍士交射之曰射而不中射而亦翻中竹仲翻不與我同心者也其母嚴氏泣曰秦主以一州之地横制天下東平鮮卑南取巴蜀兵不留行汝若降之猶可延數年之命今以蕞爾一隅抗衡大國蕞徂外翻又殺其使者亡無日矣天錫使龍驤將軍馬建帥衆二萬拒秦驤思將翻帥讀曰率秦人聞天錫殺閻負梁殊八月梁熈姚萇王統李辯濟自清石津攻涼驍烈將軍梁濟于河會城降之驍烈將軍蓋張氏置五代志允吾縣有青巖山水經注湟河至允吾與大河㑹意者清石津在青巖山之下河㑹城在二河之會歟驍堅堯翻甲申茍萇濟自石城津闞駰曰石城津在金城西北與梁熈會攻纒縮城拔之馬建懼自楊非退屯清塞水經注逆水出允吾縣之參街谷東南流逕街亭城南又東南逕楊非亭北又東南逕廣武城西據載記楊非在支陽東北三百餘里天錫又遣征東將軍掌據帥衆三萬軍于洪池洪池嶺名在姑臧南掌據晉書作常據當從之天錫自將餘衆五萬軍于金昌城金昌城在赤岸西北安西將軍敦煌宋皓言於天錫曰敦徒門翻臣晝察人事夜觀天文秦兵不可敵也不如降之天錫怒貶皓為宣威䕶軍廣武太守辛章曰張寔分金城之令居枝陽置廣武郡宋白曰蘭州廣武縣本漢枝陽縣地張駿分晉興置廣武郡馬建出于行陳行户剛翻陳讀曰陣必不為國家用茍萇使姚萇帥甲士三千為前驅庚寅馬建帥萬人迎降餘兵皆散走辛夘茍萇及常據戰于洪池據兵敗馬為亂兵所殺其屬董儒授之以馬據曰吾三督諸軍再秉節鉞八將禁旅十摠禁兵寵任極矣天錫之攻李儼也常據首破其兵蓋河西推為良將故其言如此今卒困於此卒子恤翻此吾之死地也尚安之乎乃就帳免胄西向稽首伏劔而死稽音啟秦兵殺軍司席仂癸巳秦兵入清塞天錫遣司兵趙充哲帥衆拒之河西張氏置官僚擬于王者而㣲異其名司兵蓋晉五兵尚書之職也秦兵與充哲戰于赤岸大破之水經注河水自左南而東逕赤岸北亦謂之河夾岸秦州記曰枹罕有河夾岸俘斬三萬八千級充哲死天錫出城自戰城内又叛天錫與數千騎奔還姑臧甲午秦兵至姑臧天錫素車白馬面縛輿櫬降于軍門茍萇釋縛焚櫬送于長安惠帝永寜元年張軌為涼州刺史遂有涼土共九主七十五年而亡櫬初覲翻涼州郡縣悉降于秦九月秦王堅以梁熈為涼州刺史鎮姑臧徙豪右七千餘户於關中餘皆按堵如故封天錫為歸義矦拜北部尚書秦置北部尚書以掌北蕃初秦兵之出也先為天錫築第於長安為于偽翻至則居之以天錫晉興太守隴西彭和正為黄門侍郎張軌分西平界置晉興郡治中從事武興蘇膺張軌以秦雍移人于姑臧西北置武興郡敦煌太守張烈為尚書郎敦徒門翻西平太守金城趙凝為金城太守髙昌楊幹為髙昌太守髙昌漢車師之髙昌壁也張氏始置郡後為髙昌國唐以其地置西州餘皆隨才擢叙梁熈清儉愛民河右安之為梁熈為呂光所殺張本以天錫武威太守敦煌索泮為别駕索昔各翻宋皓為主簿西平郭䕶起兵攻秦熙以皓為折衝將軍討平之桓冲聞秦攻涼州遣兖州刺史朱序江州刺史桓石秀與荆州督䕶桓羆遊軍沔漢為涼州聲援沔彌兖翻又遣豫州刺史桓伊帥衆向壽陽帥讀曰率下同淮南太守劉波汎舟淮泗欲橈秦以救涼橈奴敎翻聞涼州敗沒皆罷兵初哀帝減田租畝收二升見一百一卷隆和元年乙巳除度田收租之制度徒洛翻王公以下口税米三斛蠲在役之身冬十月移淮北民於淮南畏秦也劉衛辰為代所逼求救於秦秦王堅以幽州刺史行唐公洛為北討大都督帥幽冀兵十萬擊代帥讀曰率使并州刺史俱難鎮軍將軍鄧羌尚書趙遷李柔前將軍朱肜前禁將軍張蚝蚝七吏翻右禁將軍郭慶帥步騎二十萬東出和龍西出上郡皆與洛會以衛辰為鄉導洛菁之弟也秦主健之入關菁有功焉健之垂没也菁以逆誅鄉讀曰嚮茍萇之伐涼州也遣揚武將軍馬暉建武將軍杜周帥八千騎西出恩宿邀張天錫走路期會姑臧暉等行澤中值水失期於法應斬有司奏徵下獄下遐稼翻秦王堅曰水春冬耗竭秋夏盛漲此乃茍萇量事失宜量音良非暉等罪今天下方有事宜宥過責功命暉等回赴北軍擊索虜以自贖代本鮮卑索頭種故謂之索虜索昔各翻衆咸以為萬里召將非所以應速將即亮翻下同堅曰暉等喜于免死不可以常事疑也暉等果倍道疾驅遂及東軍暉等自西方囘故謂伐代之軍為東軍十一月己巳朔日有食之代王什翼犍使白部獨孤部南禦秦兵皆不勝鮮卑有白部後漢時鮮卑居白山者最為強盛後因曰白部令狐徳棻曰魏氏之初三十六部其先伏留屯者與魏俱起為部落大人遂為獨孤部犍居言翻又使南部大人劉庫仁將十萬騎禦之庫仁者衛辰之族什翼犍之甥也與秦兵戰於石子嶺石子嶺當雲中盛樂西南新唐書曰自夏州北渡烏水一百二十里至可朱渾水源又百餘里至石子嶺庫仁大敗什翼犍病不能自將乃帥諸部奔陰山之北髙車雜種盡叛李延夀曰髙車蓋赤狄之餘種也北方以為髙車丁零或云其先匈奴甥也其遷徙隨水草衣皮食肉牛羊畜產並與柔然同唯車輪髙大輻數至多因以為號種章勇翻四面寇鈔鈔楚交翻不得芻牧什翼犍復度漠南復扶又翻聞秦兵稍退十二月什翼犍還雲中初什翼犍分國之半以授弟孤事見九十六卷成帝咸康四年孤卒子斤失職怨望不復得國之半故自以為失職而怨卒子恤翻世子寔及弟翰早卒寔卒見上卷簡文帝咸安元年寔子珪尚幼慕容妃之子閼婆壽鳩紇根地干力真窟咄皆長閼於葛翻紇下没翻窟苦骨翻咄當没翻長知兩翻下同慕容妃燕女也什翼犍娶燕女為妃見九十七卷康帝建元二年繼嗣未定時秦兵尚在君子津水經河水南入雲中楨陵縣西北又南過赤城東又南過定襄桐過縣西河水於二縣之間濟有君子之名酈道元注曰昔漢桓帝西幸榆中東行代地洛陽大賈賫金貨隨帝後行夜迷失道徃投津長曰子封送之度河賈人卒死津長埋之其子尋求父喪發冢舉尸資貨一無所損其子悉以金與之津長不受事聞于帝曰君子也即名其津為君子濟在雲中城西南二百餘里諸子每夜執兵警衛斤因説什翼犍之庶長子寔君曰説輸芮翻王將立慕容妃之子欲先殺汝故頃來諸子毎夜戎服以兵遶廬帳北狄之長居大氈帳環設兵衛氈帳漢人謂之穹廬因曰廬帳伺便將發耳伺相吏翻寔君信之遂殺諸弟并弑什翼犍是夜諸子婦及部人奔告秦軍秦李柔張蚝勒兵趨雲中趨七喻翻部衆逃潰國中大亂珪母賀氏以珪走依賀訥訥野干之子也賀野干見上卷簡文帝咸安元年秦王堅召代長史燕鳯問其所以亂故鳳具以狀對堅曰天下之惡一也左傳載石祁子之言乃執寔君及斤至長安車裂之堅欲遷珪於長安鳳固請曰代王初亡羣下叛散遺孫冲幼莫相統攝其别部大人劉庫仁勇而有智鐵弗衛辰狡猾多變劉衛辰本匈奴鐵弗種李延壽曰鐵弗南單于苗裔衛辰者左賢王去卑之𤣥孫北人謂父為鮮卑母為鐵弗因以為姓皆不可獨任宜分諸部為二令此兩人統之兩人素有深讐其勢莫敢先發俟其孫稍長引而立之是陛下有存亡繼絶之徳於代使其子子孫孫永為不侵不叛之臣用左傳戎子駒支之言此安邊之良䇿也堅從之分代民為二部自河以東屬庫仁自河以西屬衛辰各拜官爵使統其衆賀氏以珪歸獨孤部與南部大人長孫嵩拓跋鬱律生二子長曰沙莫雄次曰什翼犍沙莫雄為南部大人後改名仁號為拔拔氏生嵩道武以嵩宗室之長改為長孫氏此言長孫所出與前注略不同元佗等皆依庫仁行唐公洛以什翼犍子窟咄年長長知兩翻遷之長安堅使窟咄入太學讀書下詔曰張天錫承祖父之資藉百年之業擅命河右叛換偏隅鄭康成曰叛換猶跋扈也韓詩曰叛換武強也索頭世跨朔北中分區域東賔穢貊穢當作濊西引烏孫控弦百萬虎視雲中爰命兩師兩師謂茍萇伐河西之師行唐公洛伐代之師也分討黠虜黠下八翻役不淹嵗窮殄二兇俘降百萬降户江翻闢土九千五帝之所未賔周漢之所未至莫不重譯來王重直龍翻懷風率職有司可速班功受爵杜預曰班次也受當作授戎士悉復之五嵗復方目翻賜爵三級於是加行唐公洛征西將軍以鄧羌為并州刺史陽平國常侍慕容紹私謂其兄楷曰秦恃其彊大務勝不休北戍雲中南守蜀漢轉運萬里道殣相望左傳之言詩云行有死人尚或殣之毛氏曰殣路冢也殣音覲説文曰道中死人人所覆也又餓殍為殣兵疲於外民困於内危亡近矣冠軍叔仁智度英拔必能恢復燕祚秦以慕容垂為冠軍將軍楷紹之叔父也叔仁當作叔父冠古玩翻吾屬但當愛身以待時耳史言鮮卑窺秦有乗釁報復之志初秦人既克涼州議討西障氐羌西障西邊也秦王堅曰彼種落雜居種章勇翻不相統壹不能為中國大患宜先撫諭徵其租税若不從命然後討之乃使殿中將軍張旬前行宣慰庭中將軍魏曷飛帥騎二萬七千隨之庭中將軍秦所置蓋立仗殿庭中者也帥讀曰率騎竒寄翻曷飛忿其恃險不服縱兵擊之大掠而歸堅怒其違命鞭之二百斬前鋒督䕶儲安以謝氐羌氐羌大悦降附貢獻者八萬三千餘落降户江翻雍州士族先因亂流寓河西者皆聽還本雍於用翻劉庫仁招撫離散恩信甚著奉事拓拔珪恩勤周備不以廢興易意常謂諸子曰此兒有髙天下之志必能恢隆祖業汝曹當謹遇之天下之英雄雖在童穉中固不與羣兒同也秦王堅賞其功加廣武將軍給幢麾鼔蓋幢直江翻劉衛辰恥在庫仁之下怒殺秦五原太守而叛五原漢郡也魏晉省弃其地於荒外秦復置郡隋唐為豐鹽二州庫仁擊衛辰破之追至陰山西北千餘里獲其妻子又西擊庫狄部徙其部落置之桑乾川桑乾縣漢屬代郡晉省孟康曰乾音干拓跋魏後置桑乾郡唐屬朔州善陽縣界魏收志拓跋力㣲時次南諸部有庫狄部後改為狄氏乆之堅以衛辰為西單于督攝河西雜類屯代來城代來城在北河西蓋秦築以居衛辰言自代來者居此城也單音蟬是嵗乞伏司繁卒子國仁立為乞伏國仁乗秦亂據隴西張本二年春髙句麗新羅西南夷皆遣使入貢于秦新羅弁韓苗裔也居漢樂浪地杜佑曰新羅本辰韓種魏時為斬盧國晉宋曰新羅其國在百濟東南五百餘里兼有沃沮不耐韓濊地句如字又音駒麗力知翻使疏吏翻趙故將作功曹熊邈屢為秦王堅言石氏宮室器玩之盛堅以邈為將作長史領將作丞晉將作大匠有丞闕屢為于偽無長史長史蓋秦所置翻大脩舟艦兵器飾以金銀頗極精巧艦户黯翻慕容農私言于慕容垂曰自王猛之死秦之法制日以頹靡今又重之以奢侈重直用翻殃將至矣圖䜟之言行當有驗大王宜結納英傑以承天意時不可失垂笑曰天下事非爾所及慕容農所見猶紹楷也桓豁表兖州刺史朱序為梁州刺史鎮襄陽秋七月丁未以尚書僕射謝安為司徒安讓不拜復加侍中都督揚豫徐兖青五州諸軍事復扶又翻丙辰征西大將軍荆州刺史桓豁卒冬十月辛丑以桓冲都督江荆梁益寧交廣七州諸軍事領荆州刺史以冲子嗣為江州刺史又以五兵尚書王藴都督江南諸軍事領徐州刺史江南諸軍謂晉陵諸軍也征西司馬領南郡相謝𤣥為兖州刺史領廣陵相監江北諸軍事桓豁為征西將軍以𤣥為司馬監工銜翻桓冲以秦人彊盛欲移阻江南此江南即上明也奏自江陵徙鎮上明晉志上明在漢武陵郡孱陵縣界水經注上明城在枝江縣其地夷敞北據大江江汜枝分東入大江縣治洲上故以枝江為稱杜佑曰上明即今江陵松滋縣西廢大明城桓冲所築也冲疏曰南平孱陵縣界地名上明田土膏良可以資業軍人在吳時樂鄉城以上四十餘里北枕大江西接三峽宋白曰上明城桓冲所築在今松滋縣西使冠軍將軍劉波守江陵冠古玩翻諮議參軍楊亮守江夏王藴固讓徐州謝安曰卿居后父之重不應妄自菲薄以虧時遇時遇謂一時之恩遇也藴乃受命初中書郎郗超自以其父愔位遇應在謝安之右而安入掌機權愔優遊散地郗愔自徐兖二州刺史移鎮㑹稽郗丑之翻愔挹淫翻散悉亶翻常憤邑形于辭色由是與謝氏有隙是時朝廷方以秦寇為憂詔求文武良將可以鎮禦北方者將即亮翻謝安以兄子𤣥應詔超聞之歎曰安之明乃能違衆舉親𤣥之才足以不負所舉衆咸以為不然超曰吾嘗與𤣥共在桓公府桓公謂桓温超𤣥同府事見一百一卷哀帝興寧元年見其使才雖履展間未嘗不得其任是以知之履以皮為之屐以木為之屐竭戟翻𤣥募驍勇之士驍堅堯翻得彭城劉牢之等數人以牢之為參軍常領精鋭為前鋒戰無不捷時號北府兵晉人謂京口為北府謝安破俱難等始兼領徐州號北府兵者史終言之敵人畏之壬寅䕶軍將軍散騎常侍王彪之卒散悉亶翻騎竒寄翻初謝安欲増修宮室彪之曰中興之初即東府為宮東府在建康臺城之東殊為儉陋蘇峻之亂成帝止蘭臺都坐蘭臺御史臺也都坐御史臺官會坐之地坐徂卧翻殆不蔽寒暑是以更營新宮見九十四卷成帝咸和五年比之漢魏則為儉比之初過江則為侈矣今寇敵方彊豈可大興功役勞擾百姓邪安曰宮室弊陋後人謂人無能彪之曰凡任天下之重者當保國寧家緝熙政事緝續也熙廣也鄭𤣥曰緝熙光明也乃以脩室屋為能邪安不能奪其議故終彪之之世無所營造十二月臨海太守郗超卒臨海本㑹稽東部都尉治沈約曰前漢都尉治鄞後漢分會稽為吳郡疑是都尉徙治章安孫亮太平二年立臨海郡初超黨于桓氏以父愔忠于王室不令知之及病甚出一箱書授門生曰公年尊我死之後若以哀惋害寢食者可呈此箱不爾即焚之既而愔果哀惋成疾惋烏貫翻門生呈箱皆與桓温往反密計愔大怒曰小子死已晩矣遂不復哭復扶又翻三年春二月乙巳作新宮帝移居會稽王邸㑹工外翻秦王堅遣征南大將軍都督征討諸軍事守尚書令長樂公丕武衛將軍茍萇尚書慕容暐帥步騎七萬寇襄陽以荆州刺史楊安帥樊鄧之衆為前鋒征虜將軍始平石越帥精騎一萬出魯陽關南陽郡魯陽縣有魯陽關樂音洛萇仲良翻帥讀曰率下同騎竒寄翻下同京兆尹慕容垂揚武將軍姚萇帥衆五萬出南鄉領軍將軍茍池右將軍毛當強弩將軍王顯帥衆四萬出武當會攻襄陽夏四月秦兵至沔北沔彌兖翻梁州刺史朱序以秦無舟檝不以為虞虞防也備也既而石越帥騎五千浮渡漢水序惶駭固守中城越克其外郭獲船百餘艘以濟餘軍艘蘇遭翻長樂公丕督諸將攻中城序母韓氏聞秦兵將至自登城履行行下孟翻至西北隅以為不固帥百餘婢及城中女丁築邪城於其内邪即斜翻及秦兵至西北隅果潰衆移守新城襄陽人謂之夫人城桓冲在上明擁衆七萬憚秦兵之彊不敢進丕欲急攻襄陽苟萇曰吾衆十倍于敵糗糧山積糗去九翻但稍遷漢沔之民于許洛塞其運道塞悉則翻絶其援兵譬如網中之禽何患不獲而多殺將士急求成功哉丕從之慕容垂拔南陽執太守鄭裔與丕會襄陽秋七月新宮成辛巳帝入居之秦兖州刺史彭超請攻沛郡太守戴􅋟於彭城􅋟領沛郡太守戊彭城楊正衛曰􅋟古遁字且曰願更遣重將攻淮南諸城為征南棊刼之勢征南謂苻丕也時督諸軍攻襄陽棊刼者以棊勢喻兵勢也圍棊者攻其右而敵手應之則擊其左取之謂之刼東西並進丹陽不足平也晉都建康漢丹陽秣陵縣地秦王堅從之使都督東討諸軍事後將軍俱難右禁將軍毛盛洛州刺史邵保帥步騎七萬冦淮陽盱眙俱姓也秦初以洛州刺史治陜城晉志曰滅燕之後移洛州治豐陽參考前鄧羌以洛州刺史鎮洛陽則是時洛州刺史猶治洛陽是後北海公重以豫州刺史及平原公暉以豫州牧鎮洛陽洛州刺史始移治豐陽淮陽晉書載記作淮陰當從之淮陰盱眙前漢並屬臨淮郡後漢晉以淮陰屬廣陵超越之弟保羌之從弟也邵羌見一百一卷海西公太和二年從才用翻八月彭超攻彭城詔右將軍毛虎生帥衆五萬鎮姑孰以禦秦兵秦梁州刺史韋鍾圍魏興太守吉挹于西城杜佑曰金州西城縣南九里吉挹於峻山築壘今其山曰魏山九月秦王堅與羣臣飲酒以祕書監朱肜為正正酒正也肜余中翻人以極醉為限祕書侍郎趙整作酒徳之歌曰地列酒泉天垂酒池九州春秋曰曹公禁酒孔融以書嘲之曰天有酒旗之星地列酒泉之郡天文志曰軒轅右角南二星曰酒旗酒官之旗也此曰天垂酒池既曰垂矣池當作旗杜康妙識儀狄先知魏武樂府短歌行云何以解憂唯有杜康注云杜康占之造酒者戰國䇿曰昔帝女儀狄作酒以進于禹禹飲而甘之遂疏儀狄曰後世必有以酒亡國者紂喪殷邦桀傾夏國由此言之前危後則紂為酒池肉林長夜之飲以亡殷史曰夏桀淫驕乃放鳴條蓋亦以酒也前危後則謂前人之危後人之法則也喪息浪翻夏户雅翻堅大悦命整書之以為酒戒自是宴羣臣禮飲而已禮臣侍君宴不過三爵秦涼州刺史梁熈遣使入西域揚秦威徳冬十月大宛獻汗血馬使疏吏翻宛於元翻秦王堅曰吾嘗慕漢文帝之為人用千里馬何為文帝却千里馬見十三卷元年命羣臣作止馬之詩而反之反則反之何以作詩為哉此亦好名之過也巴西人趙寳起兵涼州自稱晉西蠻校尉巴郡太守史言蜀人思晉秦豫州刺史北海公重鎮洛陽謀反秦王堅曰長史呂光忠正必不與之同即命光收重檻車送長安赦之以公就第重洛之兄也十二月秦御史中丞李柔劾奏長樂公丕等擁衆十萬攻圍小城日費萬金乆而無効請徵下廷尉劾户槩翻又戸得翻下遐稼翻秦王堅曰丕等廣費無成實宜貶戮但師已淹時淹滯也久留也不可虛返其特原之令以成功贖罪使黄門侍郎韋華持節切讓丕等賜丕劔曰來春不捷汝可自裁勿復持面見吾也周虓在秦密與桓冲書言秦陰計又逃奔漢中秦人獲而赦之虓虛交翻四年春正月辛酉大赦秦長樂公丕等得詔惶恐乃命諸軍并力攻襄陽秦王堅欲自將攻襄陽將即亮翻詔陽平公融以關東六州之兵會壽春梁熈以河西之兵為後繼陽平公融諫曰陛下欲取江南固當博謀熟慮不可倉猝若止取襄陽又豈足親勞大駕乎未有動天下之衆而為一城者為于偽翻所謂以隨侯之珠彈千仭之雀也呂氏春秋曰以隨矦之珠彈千仭之雀世必笑之所用重所要輕也搜神記曰隨矦行見大蛇傷救而治之其後蛇含珠以報之徑盈寸純白而夜光可燭堂故歴世稱隨珠焉梁熙諫曰晉主之暴未如孫皓江山險固易守難攻易以䜴翻陛下必欲廓清江表亦不過分命將帥將即亮翻帥所類翻引關東之兵南臨淮泗下梁益之卒東出巴峽又何必親屈鸞輅逺幸沮澤乎沮將豫翻下濕之地曰沮昔漢光武誅公孫述晉武帝擒孫皓未聞二帝自統六師親執枹鼓蒙矢石也光武用岑彭吳漢以滅公孫述晉武帝用王濬王渾以平孫皓苻融梁熙未嘗離所鎮皆上疏以諫枹音膚堅乃止詔冠軍將軍南郡相劉波帥衆八千救襄陽波畏秦不敢進朱序屢出戰破秦兵引退稍逺序不設備二月襄陽督䕶李伯䕶密遣其子送欵于秦請為内應長樂公丕命諸軍進攻之戊午克襄陽執朱序送長安秦王堅以序能守節拜度支尚書曹魏置度支尚書度徙洛翻以李伯䕶為不忠斬之秦將軍慕容越拔順陽晉志曰太康中置順陽郡唐鄧州臨湍菊潭二縣古順陽地執太守譙國丁穆堅欲官之穆固辭不受堅以中壘將軍梁成為荆州刺史配兵一萬鎮襄陽選其才望禮而臣之桓冲以襄陽䧟沒上疏送章節章印也上時掌翻請解職不許詔免劉波官俄復以為冠軍將軍秦以前將軍張蚝為并州刺史蚝七吏翻兖州刺史謝𤣥帥衆萬餘救彭城帥讀曰率軍于泗口欲遣間使報戴􅋟而不可得間古莧翻部曲將田泓請沒水潜行趣彭城趣七喻翻𤣥遣之泓為秦人所獲厚賂之使云南軍已敗泓偽許之既而告城中曰南軍垂至我單行來報為賊所得勉之秦人殺之彭超置輜重于留城留縣城也自漢以來屬彭城郡重直用翻下同謝𤣥揚聲遣後軍將軍何謙向留城超聞之釋彭城圍引兵還保輜重戴􅋟帥彭城之衆隨謙奔𤣥超遂據彭城謝考異曰𤣥傳云何謙進解彭城圍又云於是罷彭城下邳二戍帝紀及諸傳皆不言此年彭城䧟沒而十六國秦春秋云超據彭城又云超分兵下邳留徐褒守彭城至七月以毛當為徐州刺史鎮彭城王顯為揚州戍下邳是二城俱䧟也留兖州治中徐褒守之南攻盱眙盱眙音吁怡俱難克淮陰南北對境圖曰淮陰縣距淮五十步北對清河口十里進可以窺山東内則蔽沿江晉宋以為重鎮留邵保戍之三月壬戌詔以疆埸多虞埸音亦年榖不登其供御所須事從儉約九親供給九親即九族衆官廩俸權可減半凡諸役費自非軍國事要皆宜停省癸未使右將軍毛虎生帥衆三萬擊巴中以救魏興巴中即巴郡前鋒督䕶趙福等至巴西為秦將張紹等所敗敗補邁翻亡七千餘人虎生退屯巴東蜀人李烏聚衆二萬圍成都以應虎生秦王堅使破虜將軍呂光擊滅之破虜將軍蓋苻秦所置夏四月戊申韋鍾拔魏興吉挹引刀欲自殺左右奪其刀會秦人至執之挹不言不食而死秦王堅歎曰周孟威不屈于前丁彦逺潔已于後吉祖冲閉口而死何晉氏之多忠臣也周虓字孟威丁穆字彦逺吉挹字祖冲挹參軍史頴得歸得挹臨終手疏詔贈益州刺史秦毛當王顯帥衆二萬自襄陽東㑹俱難彭超攻淮南五月乙丑難超拔盱眙執髙密内史毛璪之髙密僑國也璪之領内史戍盱眙璪子皓翻秦兵六萬圍幽州刺史田洛于三阿晉僑置幽冀青并四州於江北三阿今寶應軍即其地去廣陵百里朝廷大震臨江列戍遣征虜將軍謝石帥舟師屯涂中涂讀曰除石安之弟也右衛將軍毛安之等帥衆四萬屯堂邑秦毛當毛盛帥騎二萬襲堂邑安之等驚潰兖州刺史謝𤣥自廣陵救三阿丙子難超戰敗退保盱眙六月戊子𤣥與田洛帥衆五萬進攻盱眙難超又敗退屯淮陰𤣥遣何謙等帥舟師乗潮而上夜焚淮橋秦作橋于淮水以渡兵上時掌翻邵保戰死難超退屯淮北𤣥與何謙戴􅋟田洛共追之戰于君川今盱眙縣北六里有君山此葢君山之川也復大破之復扶又翻難超北走僅以身免謝𤣥還廣陵詔進號冠軍將軍加領徐州刺史冠古玩翻秦王堅聞之大怒秋七月檻車徵超下廷尉下遐稼翻超自殺難削爵為民以毛當為徐州刺史鎮彭城毛盛為兖州刺史鎮湖陸續漢志湖陸故湖陵章帝更名前漢志曰王莽改曰湖陸今按湖陸縣漢屬山陽郡晉分屬髙平國魏收地形志髙平縣有湖陵城當在唐兖州任城縣界王顯為揚州刺史戍下邳謝安為宰相秦人屢入寇邊兵失利安毎鎮之以和静其為政務舉大綱不為小察時人比安于王導而謂其文雅過之八月丁亥以左將軍王藴為尚書僕射頃之遷丹陽尹藴自以國姻藴后父也不欲在内苦求外出復以為都督浙江東五郡諸軍事會稽内史藴先督徐州今復督浙東復扶又翻會工外翻是嵗秦大饑五年春正月秦王堅復以北海公重為鎮北大將軍鎮薊重謀反而不誅復任之以方面宜其與弟洛反也復扶又翻二月作敎武堂于渭城漢髙帝元年改咸陽曰新城武帝元鼎三年更名渭城後漢晉省石勒置石安縣苻秦復曰渭城命太學生明陰陽兵法者敎授諸將將即亮翻祕書監朱肜諫曰陛下東征西伐所向無敵四海之地什得其八雖江南未服蓋不足言是宜稍偃武事增修文徳乃更始立學舎教人戰鬬之術殆非所以馴致升平也馴從也言從此而致升平也且諸將皆百戰之餘何患不習於兵而更使受敎于書生非所以彊其志氣也此無益於實而有損于名惟陛下圖之堅乃止秦征北將軍幽州刺史行唐公洛洛以幽州刺史鎮和龍行唐戰國時趙邑秦以為縣魏晉因之勇而多力能坐制奔牛射洞犂耳犂耳之鐵厚而堅自以有滅代之功滅代見上元年求開府儀同三司不得由是怨憤三月秦王堅以洛為使持節都督益寧西南夷諸軍事征南大將軍益州牧使疏吏翻使自伊闕趨襄陽泝漢而上趨七喻翻上時掌翻洛謂官屬曰孤帝室至親洛苻健兄子也不得入為將相而常擯棄邊鄙今又投之西裔復不聽過京師復扶又翻過古禾翻此必有陰計欲使梁成沈孤於漢水耳梁成時鎮襄陽沈持林翻幽州治中平規曰逆取順守湯武是也漢陸賈曰湯武逆取而順守之因禍為福桓文是也齊桓晉文皆因兄弟爭國得國而霸主上雖不為昏暴然窮兵黷武民思有所息肩者十室而九若明公神旗一建必率土雲從今跨據全燕地盡東海北摠烏桓鮮卑東引句麗百濟燕於賢翻句音駒麗力知翻控弦之士不減五十餘萬奈何束手就徴蹈不測之禍乎洛攘袂大言曰孤計决矣沮謀者斬沮在呂翻於是自稱大將軍大都督秦王以平規為幽州刺史𤣥莬太守吉貞為左長史莬同都翻遼東太守趙讃為左司馬昌黎太守王緼為右司馬遼西太守王琳北平太守皇甫傑牧官都尉魏敷等為從事中郎漢邊郡有牧官秦置牧官都尉分遣使者徵兵于鮮卑烏桓髙句麗百濟新羅休忍諸國遣兵三萬助北海公重戍薊諸國皆曰吾為天子守藩為于偽翻不能從行唐公為逆洛懼欲止猶豫未決王緼王琳皇甫傑魏敷知其無成欲告之洛皆殺之吉貞趙讃曰今諸國不從事乖本圖明公若憚益州之行者當遣使奉表乞留使疏吏翻下同主上亦不慮不從平規曰今事形已露何可中止宜聲言受詔盡幽州之兵南出常山陽平公必郊迎因而執之進據冀州陽平公融以冀州牧鎮鄴平規使洛出中山以臨鄴摠關東之衆以圖西土天下可指麾而定也洛從之夏四月洛帥衆七萬發和龍帥讀曰率下同秦王堅召羣臣謀之步兵校尉呂光曰行唐公以至親為逆此天下所共疾願假臣步騎五萬取之如拾遺耳堅曰重洛兄弟據東北一隅兵賦全資未可輕也光曰彼衆迫於凶威一時蟻聚耳若以大軍臨之勢必瓦解不足憂也堅乃遣使讓洛使還和龍當以幽州永為世封洛謂使者曰汝還白東海王堅本封東海王幽州褊狹不足以容萬乗須王秦中以承髙祖之業苻健廟號髙祖乗紳證翻王于況翻若能迎駕潼關者當位為上公爵歸本國堅怒遣左將軍武都竇衝及呂光帥步騎四萬討之右將軍都貴馳傳詣鄴都姓貴名鄭公孫閼字子都子孫以為氏傳株戀翻將冀州兵三萬為前鋒將即亮翻以陽平公融為征討大都督北海公重悉薊城之衆與洛會屯中山有衆十萬薊音計五月竇衝等與洛戰于中山洛兵大敗生擒洛送長安北海公重走還薊呂光追斬之屯騎校尉石越自東萊帥騎一萬浮海襲和龍斬平規幽州悉平堅赦洛不誅徙涼州之西海郡漢獻帝興平二年武威太守張雅請置西海郡於居延臣光曰夫有功不賞有罪不誅雖堯舜不能為治用漢宣帝詔而畧變其文治直吏翻況他人乎秦王堅毎得反者輒宥之使其臣狃于為逆狃狎也行險徼幸徼堅堯翻雖力屈被擒猶不憂死亂何自而息哉書曰威克厥愛允濟愛克厥威允罔功書􅏷征之辭詩云毋縱詭隨以謹罔極式遏冦虐無俾作慝詩民勞第三章之辭今堅違之能無亡乎朝廷以秦兵之退為謝安桓冲之功拜安衛將軍與冲皆開府儀同三司六月甲子大赦丁夘以會稽王道子為司徒會工外翻固讓不拜秦王堅召陽平公融為侍中中書監都督中外諸軍事車騎大將軍司𨽻校尉録尚書事以征南大將軍守尚書令長樂公丕為都督關東諸軍事征東大將軍冀州牧樂音洛堅以諸氐種類繁滋種章勇翻秋七月分三原九嵕武都汧雍氐十五萬户九嵕山在漢馮翊雲陽縣界唐在醴泉縣嵕祖紅翻汧苦堅翻雍於用翻使諸宗親各領之散居方鎮如古諸矦長樂公丕領氐三千户以仇池氐酋射聲校尉楊膺為征東左司馬九嵕氐酋長水校尉齊午為右司馬各領一千五百户為長樂世卿古者封建諸矦國命卿皆世其官堅分諸宗親散居方鎮各以種類為世卿樂音洛酋慈由翻長樂郎中令略陽垣敞為録事參軍垣氐姓也後隨宋武南歸遂為累世將家侍講扶風韋幹為參軍事申紹為别駕膺丕之妻兄也午膺之妻父也八月分幽州置平州晉書曰按平州禹貢冀州之域于周為幽州界漢屬北平郡後漢末公孫度自號平州牧至孫文懿為魏所㓕因置平州統遼東昌黎𤣥菟帶方五郡後還合於幽州苻秦滅燕復分幽州置平州公孫淵字文懿唐避髙祖諱稱其字以石越為平州刺史鎮龍城中書令梁讜為幽州刺史鎮薊城撫軍將軍毛興為都督河秦二州諸軍事河州刺史鎮枹罕枹音膚長水校尉王騰為并州刺史鎮晉陽河并二州各配氐户三千興騰並苻氏婚姻氐之崇望也平原公暉為都督豫洛荆南兖東豫陽六州諸軍事鎮東大將軍豫州牧鎮洛陽秦兖州刺史鎮倉垣南兖州鎮湖陸又秦初以豫州刺史鎮許昌㓕燕之後以豫州刺史鎮洛陽於許昌置東豫州陽當作揚按後魏書地形志天平初始置揚州于宜陽苻堅以王顯為揚州刺史戍下邳正屬暉所統移洛州刺史治豐陽苻秦初以洛州刺史鎮陜城荆州刺史鎮豐陽既得襄陽以為荆州徙洛州于豐陽豐陽漢上洛縣地也宋白曰豐陽漢商縣地晉泰始三年分置豐陽縣在豐陽川鉅鹿公叡為雍州刺史雍於用翻各配氐户三千二百堅送丕至灞上諸氐别其父兄皆慟哭哀感路人趙整因侍宴援琴而歌曰項安世家説伏羲作琴長三尺六寸六分象三百六十六日也廣六寸象六合也文上曰池下曰宕池水平也前廣後狹象尊卑也上圜下方法天地也五弦官也大弦君也寛和而温小弦臣也清亷而不亂文王加三弦合君臣恩也援干元翻杜佑曰世本云琴神農所造琴操云伏羲作琴所以修身理性反其天真白虎通曰琴禁也禁止于邪以正人心也廣雅曰文王武王加二絃以合君臣之恩也揚雄琴清英曰舜彈五絃而天下化堯加二絃以合君臣之恩阿得脂阿得脂博勞舅父是仇綏爾雅鵙伯勞郭璞曰伯勞似鶷鶡而大飛不能翺翔竦翅上下而已廣雅曰伯勞一曰傳勞一名伯趙仇綏不知為何物尾長翼短不能飛逺徙種人留鮮卑謂徙諸氐而留慕容也種章勇翻一旦緩急當語誰堅笑而不納語牛倨翻九月癸未皇后王氏崩冬十月九真太守李遜據交州反秦王堅以左禁將軍揚壁為秦州刺史尚書趙遷為洛州刺史南巴校尉姜宇為寧州刺史苻秦于南中置南巴校尉十一月乙酉𦵏定皇后于隆平陵十二月秦以左將軍都貴為荆州刺史鎮彭城都貴鎮襄陽彭城誤也置東豫州以毛當為刺史鎮許昌是嵗秦王堅遣髙密太守毛璪之等二百餘人來歸毛璪之被禽見上四年六年春正月帝初奉佛法立精舎于殿内後漢書姜肱傳曰就精廬求見徵君賢曰精廬即精舎也蓋以専精講習所業為義今儒釋肄業之地通曰精舎引諸沙門居之尚書左丞王雅表諫不從雅肅之曾孫也王肅仕曹魏以經學著名武帝肅外孫也丁酉以尚書謝石為僕射二月東夷西域六十二國入貢于秦夏六月庚子朔日有食之秋七月甲午交阯太守杜瑗斬李遜交州平冬十月故武陵王晞卒于新安晞徙新安見上卷簡文帝咸安元年追封新寧郡王命其子遵為嗣十一月己亥以前㑹稽内史郗愔為司空愔固辭不起秦荆州刺史都貴遣其司馬閻振中兵參軍呉仲帥衆二萬寇竟陵竟陵矦國前漢屬江夏郡惠帝分立竟陵郡桓冲遣南平太守桓石䖍衛軍參軍桓石民等帥水陸二萬拒之帥讀曰率石民石䖍之弟也十二月甲辰石䖍襲擊振仲大破之振仲退保管城石䖍進攻之癸亥拔管城據載記石䖍襲破振仲于滶水振仲退保管城又據水經沔水逕郡縣故城南又東滶水注之滶水西南注于沔寔曰滶口沔水又南逕石城西城因山為固晉竟陵郡所治也以此攷之管城當在滶水北獲振仲斬首七千級俘虜萬人詔封桓冲子謙為宜陽矦以桓石䖍領河東太守沈約曰成帝咸康三年征西將軍庾亮以司州僑户立南河東郡屬荆州五代志南郡松滋縣江左置河東郡是嵗江東大饑七年秦大司農東海公陽貟外散騎侍郎王皮晉職官志散騎侍郎四人魏初與散騎常侍同置貟外散騎侍郎晉武帝置散悉亶翻騎竒寄翻尚書郎周虓謀反虓虛交翻事覺收下廷尉下遐稼翻陽法之子皮猛之子也秦王堅問其反狀陽曰臣父哀公死不以罪法死見一百卷穆帝升平元年臣為父復讐耳為于偽翻下嘗為同堅泣曰哀公之死事不在朕卿豈不知之王皮曰臣父丞相有佐命之勲而臣不免貧賤故欲圖富貴耳堅曰丞相臨終託卿以十具牛為治田之資未嘗為卿求官治直之翻為于偽翻知子莫若父何其明也周虓曰虓世荷晉恩生為晉臣死為晉鬼復何問乎荷下可翻復扶又翻下同先是虓屢謀反叛先悉薦翻左右皆請殺之堅曰孟威烈士秉志如此豈憚死乎殺之適足成其名耳皆赦不誅徙陽于涼州之髙昌郡徵諸晉志河西張氏未嘗置髙昌郡苻堅之平河西也以髙昌楊幹為髙昌太守疑張氏置是郡苻氏因之髙昌即漢車師後部髙昌壁之地注又見後皮虓于朔方之北虓卒于朔方卒子恤翻陽勇力兼人尋復徙鄯善及建元之末秦國大亂建元十九年堅伐晉而敗秦遂以亂二十年堅死是建元十八年也復扶又翻鄯上扇翻陽刼鄯善之相欲求東歸鄯善王殺之史終言之秦王堅徙鄴銅駞銅馬飛亷翁仲于長安石虎所置于鄴者夏四月堅扶風太守王永為幽州刺史堅下當有以字永皮之兄也皮凶險無行而永清修好學行下孟翻好呼到翻故堅用之以陽平公融為司徒融固辭不受堅方謀伐晉乃以融為征南大將軍開府儀同三司五月幽州蝗生廣袤千里廣古曠翻秦王堅使散騎常侍彭城劉蘭發幽冀青并民撲除之撲普卜翻秋八月癸卯大赦秦王堅以諫議大夫裴元略為巴西梓潼二郡太守使密具舟師欲祖王濬之故智順流東下而伐晉也九月車師前部王彌窴鄯善王休密䭾窴堂見翻䭾堂何翻入朝于秦朝直遥翻請為鄉導以伐西域之不服者鄉讀曰嚮因如漢法置都䕶以統理之秦王堅以驍騎將軍呂光為使持節都督西域征討諸軍事驍堅堯翻騎竒寄翻下同使疏吏翻與凌江將軍姜飛凌江將軍晉文王所置以授羅憲輕車將軍彭晃將軍杜進康盛等杜進康盛位至將軍未有將軍號摠兵十萬鐵騎五千以伐西域陽平公融諌曰西域荒逺得其氏不可使得其地不可食漢武征之得不補失謂漢武伐大宛破樓蘭姑師田車師也今勞師萬里之外以踵漢氏之過舉臣竊惜之不聽桓冲使揚威將軍朱綽擊秦荆州刺史都貴于襄陽焚踐沔北屯田掠六百餘户而還沔彌兖翻冬十月秦王堅會羣臣于太極殿議曰自吾承業垂三十載堅以升平元年自立至是凡二十六年惟年之乆長懼于不終尚庶㡬焉乃欲疲民以逞宜其亡也四方略定唯東南一隅未霑王化今略計吾士卒可得九十七萬吾欲自將以討之將即亮翻何如祕書監朱肜曰陛下恭行天罰必有征無戰晉主不銜璧軍門則走死江海陛下返中國士民使復其桑梓謂永嘉之末避亂南渡之子孫也然後囘輿東巡告成岱宗杜佑曰岱宗東岳也特謂太山為岱宗者以其處東北居寅丑之間萬物終始之地陰陽交代之所為衆山之宗故曰岱宗此千載一時也載子亥翻堅喜曰是吾志也尚書左僕射權翼曰昔紂為無道三仁在朝武王猶為之旋師論語㣲子去之箕子為之奴比干諫而死孔子曰殷有三仁焉史記武王即位九年東觀兵至于盟津諸矦不期而會者八百皆曰紂可伐矣武王曰未可也乃還師居二年紂暴虐滋甚殺王子比干囚箕子㣲子奔周武王告諸矦曰殷有重罪不可不伐遂滅之朝直遥翻猶為干偽翻今晉雖㣲弱未有大惡謝安桓冲皆江表偉人君臣輯睦内外同心以臣觀之未可圖也堅嘿然良久曰諸君各言其志太子左衛率石越曰今嵗鎮守斗福徳在呉嵗木星鎮土星斗牛女呉越揚州分伐之必有夭殃且彼據長江之險民為之用殆未可伐也堅曰昔武王伐紂逆嵗違卜荀子曰武王之誅紂也東面而迎太嵗揚倞注曰迎謂逆太嵗也尸子曰武王伐紂魚辛諌曰嵗在北方不可北征武王不從史記齊世家武王將伐紂卜龜兆不吉風雨暴至羣公盡懼唯太公彊之勸武王武王遂行天道幽逺未易可知易以䜴翻夫差孫皓皆保據江湖不免于亡今以吾之衆投鞭于江足斷其流斷丁管翻又何險之足恃乎對曰三國之君皆淫虐無道三國之君謂紂夫差孫皓故敵國取之易于拾遺易以豉翻今晉雖無徳未有大罪願陛下且案兵積榖以待其釁于是羣臣各言利害久之不決堅曰此所謂築舎道傍無時可成詩曰如彼築室于道謀是用不潰于成吾當内斷於心耳斷丁亂翻羣臣皆出獨留陽平公融謂之曰自古定大事者不過一二臣而已今衆言紛紛徒亂人意吾當與汝決之對曰今伐晉有三難天道不順一也晉國無釁二也我數戰兵疲數所角翻民有畏敵之心三也羣臣言晉不可伐者皆忠臣也願陛下聽之堅作色曰汝亦如此吾復何望復扶又翻吾彊兵百萬資仗如山吾雖未為令主亦非闇劣劣弱也乗累捷之勢擊垂亡之國何患不克豈可復留此殘寇使長為國家之憂哉漢魏相有言恃國家之大矜人民之衆欲見威于敵者謂之驕兵兵驕者滅其苻堅之謂歟復扶又翻下復留同融泣曰晉未可滅昭然甚明今勞師大舉恐無萬全之功且臣之所憂不止于此陛下寵育鮮卑羌羯布滿畿甸此屬皆我之深仇太子獨與弱卒數萬留守京師臣懼有不虞之變生于腹心肘腋不可悔也臣之頑愚誠不足采王景畧一時英傑陛下常比之諸葛武矦諸葛亮諡武矦獨不記其臨沒之言乎見上卷寧康三年堅不聽于是朝臣進諌者衆堅曰以吾擊晉校其彊弱之埶猶疾風之掃秋葉而朝廷内外皆言不可誠吾所不解也朝直遥翻下同解户買翻曉也太子宏曰今嵗在吳分分扶問翻又晉君無罪若大舉不捷恐威名外挫財力内竭此羣下所以疑也堅曰昔吾滅燕亦犯嵗而捷天道固難知也秦滅六國六國之君豈皆暴虐乎冠軍京兆尹慕容垂冠軍即冠軍將軍也晉書載記所書率書將軍號而不繫將軍通鑑因之冠古玩翻言于堅曰弱併于彊小併於大此理勢自然非難知也以陛下神武應期威加海外虎旅百萬韓白滿朝韓白謂韓信白起言秦多良將也而蕞爾江南蕞徂外翻小也獨違王命豈可復留之以遺子孫哉復扶又翻遺于季翻詩云謀夫孔多是用不集詩小旻之辭陛下斷自聖心足矣斷丁亂翻何必廣詢朝衆晉武平吳所仗者張杜二三臣而已若從朝衆之言豈有混壹之功謂張華杜預也事見八十卷武帝咸寧五年朝直遥翻堅大悦曰與吾共定天下者獨卿而已賜帛五百匹堅鋭意欲取江東寢不能旦陽平公融諌曰知足不辱知止不殆老子道徳經立戒篇之辭自古窮兵極武未有不亡者且國家本戎狄也正朔會不歸人㑹要也言大要中國正朔相傳不歸夷狄也江東雖㣲弱僅存然中華正統天意必不絶之堅曰帝王厯數豈有常邪惟徳之所在耳劉禪豈非漢之苗裔邪終為魏所滅汝所以不如吾者正病此不達變通耳堅素信重沙門道安道安在襄陽堅破襄陽輿而致之羣臣使道安乗間進言間古莧翻十一月堅與道安同輦遊于東苑堅曰朕將與公南遊吳越泛長江臨滄海不亦樂乎樂音洛安曰陛下應天御世居中土而制四維自足比隆堯舜何必櫛風沐雨經畧遐方乎且東南卑濕沴氣易構沴音戾五行之氣相克勝則為沴氣虞舜遊而不歸大禹往而不復虞舜南巡狩崩于蒼梧之野禹東巡狩至于㑹稽而崩何足以上勞大駕也堅曰天生烝民而樹之君使司牧之朕豈敢憚勞使彼一方獨不被澤乎被皮義翻必如公言是古之帝王皆無征伐也道安曰必不得已陛下宜駐蹕洛陽遣使者奉尺書于前諸將摠六師于後彼必稽首入臣不必親涉江淮也稽音啟堅不聽堅所幸張夫人諫曰妾聞天地之生萬物聖王之治天下治直之翻皆因其自然而順之故功無不成是以黄帝服牛乗馬因其性也言因牛馬之性故可引重而致逺禹濬九川障九澤因其勢也言因髙下之勢故可滌源而陂澤后稷播殖百榖因其時也因天時而播殖則百榖成湯武帥天下而攻桀紂因其心也因人心而用兵則天下服帥讀曰率皆有因則成無因則敗今朝野之人皆言晉不可伐陛下獨決意行之妾不知陛下何所因也書曰天聰明自我民聰明書臯陶謨之辭天猶因民而况人乎妾又聞王者出師必上觀天道下順人心今人心既不然矣請驗之天道諺云雞夜鳴者不利行師犬羣嘷者宮室將空嘷户刀翻兵動馬驚軍敗不歸自秋冬以來衆雞夜鳴羣犬哀嘷廄馬多驚武庫兵器自動有聲此皆非出師之祥也堅曰軍旅之事非婦人所當預也堅幼子中山公詵最有寵亦諫曰臣聞國之興亡繫賢人之用捨今陽平公國之謀主而陛下違之晉有謝安桓冲而陛下伐之臣竊惑之堅曰天下大事孺子安知秦劉蘭討蝗經秋冬不能滅十二月有司奏徵蘭下廷尉下遐稼翻秦王堅曰災降自天非人力所能除此由朕之失政蘭何罪乎是嵗秦大熟上田畝收七十石下者三十石蝗不出幽州之境不食麻豆上田畝收百石下者五十石物反常為妖蝗之為災尚矣蝗生而不食五榖妖之大者也農人服田力穡至于有秋自古以來未有畝收百石七十石之理而畝收五十石三十石亦未之聞也使其誠有之又豈非反常之大者乎使其無之則州縣相與誣飾以罔上亦不祥之大者也秦亡宜矣資治通鑑卷一百四
