body:
  text: 資治通鑑卷二百五十九宋司馬光撰胡三省音註唐紀七十五起𤣥黓用敦盡閼逢攝提格凡三年昭宗聖穆景文孝皇帝上之中景福元年春正月丙寅赦天下改元鳯翔李茂貞静難王行瑜難乃旦翻鎮國韓建同州王行約秦州李茂莊五節度使上言楊守亮容匿叛臣楊復恭事見上卷上年上時掌翻請出軍討之乞加茂貞山南西道招討使朝議以茂貞得山南不可復制復扶又翻下詔和解之皆不聴王鎔李匡威合兵十餘萬攻堯山李克用遣其將李嗣勲撃之大破幽鎮兵斬獲三萬奏考異曰實錄在二月恐約到今從唐太祖紀年錄楊行密謂諸將曰孫儒之衆十倍於我吾戰數不利數所角翻欲退保銅官何如劉威李神福曰儒掃地逺來利在速戰宜屯據險要堅壁清野以老其師時出輕騎抄其饋餉抄楚交翻奪其俘掠彼前不得戰退無資糧可坐擒也戴友規曰儒與我相持數年僖宗光啓三年楊行密孫儒争揚州至是五年矣勝負略相當今悉衆致死於我我若望風弃城正墮其計淮南士民從公度江及自儒軍來降者甚衆公宜遣將先䕶送歸淮南降户江翻將即亮翻使復生業儒軍聞淮南安堵皆有思歸之心人心既搖安得不敗行密恱從之以孫儒驅淮南人以攻楊行密故其謀云爾為行密擒孫儒張本友規廬州人也威戎節度使楊晟僖宗文徳元年置威戎軍於彭州與楊守亮等約攻王建二月丁丑晟出兵掠新繁漢州之境使其將吕蕘將兵二千㑹楊守厚攻梓州蕘如招翻梓州東川節度使顧彦暉治所建遣行營都指揮使李簡擊蕘斬之戊寅朱全忠出兵擊朱瑄遣其子友裕將兵前行軍於斗門據舊書李師道傳斗門城在濮陽縣界李茂貞王行瑜擅舉兵撃興元不以天子之命舉兵故曰擅茂貞表求招討使不已遺杜讓能西門君遂書遣唯季翻杜讓能時為相西門君遂時為神䇿中尉此内外二大臣也陵蔑朝廷上意不能容御延英召宰相諫官議之時宦官有隂與二鎮相表裏者宰相相顧不敢言上不恱給事中牛徽曰先朝多難茂貞誠有翼衛之功此謂僖宗再幸山南時也難乃旦翻諸楊阻兵亟出攻討其志亦在疾惡但不當不俟詔命耳比聞兵過山南比毗至翻殺傷至多陛下儻不以招討使授之使用國法約束則山南之民盡矣上曰此言是也乃以茂貞為山南西道招討使牛徽之言上所以誘掖其君下所以彌縫悍將若以之為國謀則未也甲申朱全忠至衛南朱瑄將步騎萬人襲斗門朱友裕弃營走瑄據其營全忠不知乙酉引兵趣斗門趣七喻翻至者皆為鄆人所殺全忠退軍瓠河九域志濮州雷澤縣有瓠河鎮丁亥瑄擊全忠大破之全忠走張歸厚於後力戰全忠僅免歸考異曰厚傳云十一月誤也今從梁紀副使李璠等皆死璠音煩朱全忠奏貶河陽節度使趙克裕全考異曰實錄在正月末云全忠欲義得河陽乃奏克裕有誣謗之言而貶新紀云己未朱全忠陷孟州逐河陽節度使趙克裕今從編遺錄以佑國節度使張全義兼河陽節度使二鎮時皆屬朱全忠或貶或兼唯其所奏孫儒圍宣州初劉建鋒為孫儒守常州將兵從儒撃楊行密甘露鎮使陳可言帥部兵千人據常州潤州城東角土山上有甘露寺前對北固山後枕大江寳歴中李徳裕建寺適有甘露降因以名之孫儒葢因此寺而置甘露鎮也帥讀曰率行密將張訓引兵奄至城下可言倉猝出迎訓手刃殺之遂取常州按考異曰新紀景福二年二月楊行密陷常州行密自宣歸楊過常州巳歎張訓之功新紀誤也今從十國紀年行密别將又取潤州楊行密自此遂有潤州而與錢氏争常州矣朱全忠連年攻時溥光啓三年徐汴始交兵徐泗濠三州民不得耕穫兖鄆河東兵救之皆無功復值水災復扶又翻人死者什六七溥困甚請和於全忠全忠曰必移鎮乃可溥許之全忠乃奏請移溥他鎮仍命大臣鎮徐州詔以門下侍郎同平章事劉崇望同平章事充感化節度使以溥為太子太師溥恐全忠詐而殺之據城不奉詔崇望及華隂而還華户化翻還從宣翻又如字忠義節度使趙徳諲薨子匡凝代之趙考異曰實錄此月以前忠義軍節度使匡凝起復某官不言徳諲卒在何時新溥薛史但云匡凝為唐州刺史兼七州馬步軍都校及徳諲卒自為襄州留後朝廷即以旄鉞授之亦下言年月今附於此范暉驕侈失衆心范暉據福州見上卷上年王潮以從弟彦復為都統弟審知為都監將兵攻福州從才用翻監古銜翻民自請輸米餉軍平湖洞及濵海蠻夷皆以兵船助之平湖洞在泉州莆田縣界外几域志曰今興化軍大飛山地本平湖數頃一夕風雨暴至旦見此山聳峙一名大飛辛丑王建遣族子嘉州刺史宗裕雅州刺史王宗侃威信都指揮使華洪茂州刺史王宗瑤將兵五萬攻彭州按九域志彭州距成都几十餘里此其壤地相接煙火相望所謂卧榻之側豈容他人鼾腄者也王建安得而不急攻之邪楊晟逆戰而敗宗裕等圍之楊守亮遣其將符昭救之徑趨成都營三學山趨七喻翻漢州金堂縣東北十里有三學山建亟召華洪還洪疾驅而至王建一時諸將唯華洪饒智略建所倚也故亟召之以禦符昭華户化翻後軍尚未集以數百人夜去昭營數里多擊更鼓昭以為蜀軍大至引兵宵遁更工衡翻更鼓持更之鼓官府及行軍每更撃之以為節更鼓多則敵人以為營寨多故宵遁三月以户部尚書鄭延昌為中書侍郎同平章事延昌從讜之從兄弟也僖宗乾符間鄭從讜鎮河東有聲績之從才用翻左神䇿勇勝三都都指揮使楊子實子遷子釗皆守亮之假子也勇勝三都亦神䇿五十二都之數自渠州引兵救楊晟知守亮必敗壬子帥其衆二萬降於王建帥讀曰率李克用王處存合兵攻王鎔癸丑拔天長鎮天長鎮在滹沱河東北戊午鎔與戰於新市大破之殺獲三萬餘人新市漢古縣唐併入鎮州九門縣辛酉克用退屯欒城詔和解河東及鎮定幽四鎮楊晟遺楊守貞楊守忠楊守厚書遺于季翻使攻東川以解彭州之圍守貞等從之神䇿督將竇行實戍梓州守厚密誘之為内應誘音酉守厚至涪城行實事泄顧彦暉斬之攻考異曰實錄明年正月楊守厚東川以竇行實為内應事泄行實死守厚遁去因李茂貞與王建争東川追叙今年事耳今從十國紀年守厚遁去守貞守忠軍至無所歸盤桓綿劒閣綿劒二州名宋白曰綿州漢涪城縣地西魏置潼州隋置綿州以綿水為稱九域志綿州東北至劒州二百九十四里王建遣其將吉諫襲守厚破之癸亥西川將李簡邀擊守忠於鍾陽九域志綿州巴西縣有鍾陽鎮斬獲三千餘人夏四月簡又破守厚於銅鉾鉾亡侯翻斬獲三千餘人降萬五千人守忠守厚皆走乙酉置武勝軍於杭州以錢鏐為防禦使天威軍使賈徳晟以李順節之死頗怨憤李順節死見上卷上年西門君遂惡之惡烏路翻奏而殺之徳晟麾下千餘騎奔鳯翔李茂貞由是益彊李匡威出兵侵雲代壬寅李克用始引兵還自鎮州引還時溥遣兵南侵至楚州楊行密將張訓李徳誠敗之于夀河敗補邁翻下同遂取楚州執其刺史劉瓚朱全忠以劉瓚刺楚州見二百五十七卷僖宗光啓三年張訓等既破徐兵乘勝遂取汴之楚州考異曰新紀三月乙巳楊行密陷楚州執刺史劉瓚十國紀年三月時溥遣兵三萬南侵至楚州四月楊行密將張訓李徳誠敗徐兵于夀河俘斬三千級取楚州執瓚今從之加邠寧節度使王行瑜兼中書令楊行密屢敗孫儒兵破其廣徳營廣徳營孫儒之兵營於廣徳者也敗補邁翻張訓屯安吉㫁其糧道義寜二年沈法興分烏程置安吉縣唐因之屬湖州九域志在州西南百七十一里㫁音短儒食盡士卒大疫遣其將劉建鋒馬殷分兵掠諸縣六月行密聞儒疾瘧瘧逆約翻疾而寒熱迭作謂之瘧戊寅縦兵擊之㑹大雨晦㝠儒軍大敗安仁義破儒五十餘寨田頵擒儒于陳陳讀曰陣斬之傳首京師儒衆多降於行密光啓三年孫儒始與行密交兵至是而敗孫儒以十倍之衆攻行密其智勇亦無以大相過而卒斃於行密者儒専務殺掠人心不附又後無根本行密雖為儒所困分遣張訓李徳誠略淮浙之地以自廣又斥餘廩以飼饑民既得人心又有根本所以勝也劉建鋒馬殷収餘衆七千南走洪州走音奏推建鋒為帥殷為先鋒指揮使張佶為謀主比至江西衆十餘萬帥所類翻比必利翻及也丁酉楊行密帥衆歸揚州帥讀曰率常考異曰十國紀年行密過常州謂左右曰州大城也張訓以一劔下之不亦牡哉舊紀大順二年三月淮南節度使孫儒為寅州觀察使楊行密所殺初行密揚州失守據宣州孫儒以兵攻圍三年是春淮南大饑軍中疫癘是月孫儒亦病為帳下所執降行密行密乃併孫儒之衆復據廣陵薛居正五代史行密傳曰大順元年行密危蹙出據宣州儒復入揚州二年儒攻行密屬江淮疾疫師人多死儒亦卧病為部下所執送於行密殺之行密自宣城長驅入于廣陵唐補紀大順二年六月孫儒兵敗于宛陵城下楊行密進首級於西京吳錄曰景福元年六月六日太祖盡率諸將晨出擊儒田頵臨陳擒儒以獻斬儒于市傳首京師新紀實錄十國紀年皆據此舊紀薛史唐補紀皆誤秋七月丙辰至廣陵表田頵守宣州安仁義守潤州先是揚州富庶甲天下先悉薦翻時人稱揚一益二言揚州居一益州為次也及經秦畢孫楊兵火之餘秦彦畢師鐸孫儒楊行密也江淮之間東西千里掃地盡矣王建圍彭州久不下民皆竄匿山谷諸寨日出俘掠謂之淘虜都將先擇其善者餘則士卒分之以是為常將即亮翻有軍士王先成者新津人本書生也世亂為兵度諸將惟北寨王宗侃最賢乃徃説之曰度徒洛翻説式苪翻彭州本西川之巡屬也陳田召楊晟割四州以授之見二百五十七卷文徳元年陳田謂陳敬瑄田令孜偽署觀察使與之共拒朝命朝直遙翻今陳田已平而晟猶據之州民皆知西川乃其大府巡屬諸州以節度使府為大府亦謂之㑹府而司徒乃其主也時朝命以王建檢校司徒故稱之故大軍始至民不入城而入山谷避之以俟招安今軍至累月未聞招安之命軍士復從而掠之復扶又翻與盜賊無異奪其貲財驅其畜産分其老弱婦女以為奴婢使父子兄弟流離愁怨其在山中者暴露於暑雨殘傷於蛇虎孤危饑渇無所歸訴彼始以楊晟非其主而不從今司徒不加存恤彼更思楊氏矣宗侃惻然不覺屢移其牀前問之先成曰又有甚於是者今諸寨每旦出六七百人入山淘虜薄暮乃返薄迫也曽無守備之意賴城中無人耳萬一有智者為之畫䇿為于偽翻使乘虚奔突先伏精兵千人於門内登城望淘虜者稍逺出弓弩手礮手各百人礮與砲同匹貌翻攻寨之一面隨以役卒五百負薪土填壕為道然後出精兵奮擊且焚其寨又於三面城下各出耀兵耀兵者以耀敵使不知所備諸寨咸自備禦無暇相救城中得以益兵繼出如此能無敗乎宗侃矍然曰矍居縳翻此誠有之將若之何先成請條列為狀以白王建宗侃即命先成草之大指言今所白之事須四面通共時西川兵圍彭州四面下寨宗裕宗侃華洪宗瑤各當一面宗侃所司止於北面或所白可從乞以牙舉施行牙舉謂從使牙檢舉而見之施行事凡七條其一乞招安山中百姓其二乞禁諸寨軍士及子弟無得一人輒出淘虜仍表諸寨之旁七里内聴樵牧敢越表者斬其三乞置招安寨中容數千人以處所招百姓處昌吕翻宗侃請選所部將校謹幹者為招安將使將三十人書夜執兵巡衛其四招安之事須委一人總領今牓帖既下下户嫁翻諸寨必各遣軍士入山招安百姓見之無不驚疑如鼠見狸誰肯來者狸捕䑕者也鼠見狸則知必死特恨不可得而走耳詎肯前就之哉故以為諭欲招之必有其術願降帖付宗侃専掌其事其五乞嚴勒四寨指揮使悉索前日所虜彭州男女老幼集於營場有父子兄弟夫婦自相認者即使相從牒具人數部送招安寨有敢私匿一人者斬仍乞勒府中諸營亦令嚴索府謂成都府索山客翻有自軍前先寄歸者量給資糧量音良悉部送歸招安寨其六乞置九隴行縣於招安寨中彭州治九隴縣彭州未下故乞置行縣九隴故漢繁縣地後魏改曰九隴以州西冇九隴山為名九隴一伏隴二豆隴三秋隴四龍奔隴五走馬隴六駱駞隴七千秋隴八較車隴九横擔隴以前南鄭令王丕攝縣令南鄭漢古縣唐帶興元府設置曹局撫安百姓擇其子弟之壯者給帖使自入山招其親戚彼知司徒嚴禁浸掠前日為軍士所虜者皆獲安堵必歡呼踊躍相帥下山帥讀曰率如子歸母不日盡出其七彭州土地宜麻益州記彭之地號小郫言土地肥良北之郫邑也百姓未入山時多漚藏者漚烏候翻久漬也宜令縣令曉諭各歸田里出所漚麻鬻之以為資糧必漸復業建得之大喜即行之悉如所申考異曰張􅒷耆舊傳云五月二十日諸軍馬步兵士到彭州城下至七月初已經五十餘日諸軍兵士始到刈麥充糧至七月初麥盡並無顆粒兵士但託求食乃每日逺去入山虜刼逃避百姓有一軍士本是儒生乃往北面寨説于統帥云云十國紀年王先成謂王宗侃云云先成上招攜七事建皆納之先成蜀州新津人按十國紀年王建自二月辛丑遣王宗裕等擊楊晟遂圍彭州又晟遺楊守忠書云弊邑雖小圍守三年矣而張􅒷云五月二十日方圍彭州或者先圍之不克而再往歟􅒷但云有一軍士而十國紀年姓王名先成不知其本出何書也明日牓帖至威令赫然無敢犯者三日山中民競出赴招安寨如歸市寨不能容斥而廣之浸有市井又出麻鬻之民見村落無抄暴之患抄楚交翻稍稍辭縣令復故業月餘招安寨皆空己巳李茂貞克鳯州感義節度使滿存奔興元僖宗光啓二年滿存得鳯州至是而敗奔興元就楊守亮茂貞又取興洋二州皆表其子弟鎮之大考異曰薛居正五代史茂貞傳曰順二年楊復恭得罪奔山南與楊守亮據興元叛茂貞與王行瑜討平之詔以徐彦若鎮興元茂貞違詔表其假子繼徽為留後堅請旄鉞昭宗不得已而授之自是茂貞始萌問鼎之志既而逐涇原節度使張球洋州節度使楊守忠鳯州刺史滿存皆奪據其地云大順二年誤也今從新紀八月以楊行密為淮南節度使同平章事以田頵知宣州留後安仁義為潤州刺史孫儒降兵多蔡人降户江翻行密選其尤勇健者五千人厚其稟賜以皁衣䝉甲稟筆錦翻給也皁才早翻號黒雲都每戰使之先登陷陳陳讀曰陣四鄰畏之行密以用度不足欲以茶鹽易民布帛掌書記舒城髙勗曰兵火之餘十室九空又漁利以困之記坊記諸侯不下漁色注曰象捕魚然中網取之是無所擇漁利之漁猶漁色之漁將復離叛復扶又翻下同不若悉我所有易鄰道所無足以給軍選賢守令勸課農桑數年之間倉庫自實行密從之守式又翻令力正翻田頵聞之日賢者之言其利逺哉行密馳射武伎皆非所長伎渠綺翻而寛簡有智略善撫御將士與同甘苦推心待物無所猜忌嘗早出從者㫁馬鞦取其金從才用翻斷音短鞦七由翻史炤曰馬紂也行密知而不問他日復早出如故人服其度量淮南被兵六年光啓三年卑師鐸亂淮南始被兵被皮義翻士民轉徙幾盡幾居依翻下幾復同行密初至賜與將吏將即亮翻帛不過數尺錢不過數百而能以勤儉足用非公宴未嘗舉樂招撫流散輕徭薄歛歛力贍翻未及數年公私富庶幾復承平之舊復還也讀如字李克用北巡至天寧軍代州西有天安軍天寳十二載置聞李匡威赫連鐸將兵八萬冦雲州遣其將李君慶發兵於晉陽克用潛入新城伏兵於神堆神堆在雲州城南新城又在神堆東南神堆即神武川之黄花堆新城在其側盖克用祖執宜保黄花堆時所築也按薛史唐紀李克用生於神武川之新城宋白曰雲州西南至神堆柵九十里擒吐谷渾邏騎三百邏郎佐翻匡威等大驚丙申君慶以大軍至克用遷入雲州丁酉出撃匡威等大破之己亥匡威等燒營而遁追至天成軍蔚州東北有天成軍斬獲不可勝計勝音升辛丑李茂貞攻拔興元楊復恭楊守亮楊守信楊守貞楊守忠滿存奔閬州光啓三年楊守亮鎮興元至是而敗之考異曰舊紀景福元年十一月辛丑鳯翔邠寧衆攻興元陷之節度使楊守亮前中尉楊復恭判官李巨川突圍而遁十二月辛未華州刺史韓建奏於乾元縣遇興元散兵撃敗之斬楊守亮楊復恭傳首實錄乾寜元年七月鳯翔邠寧之兵攻興元陷之楊守亮楊復恭突圍而遁新紀景福元年八月茂貞冦興元守亮滿存奔閬州乾寧元年七月茂貞陷閬州八月守亮伏誅新復恭傳景福元年茂貞攻興元破其城復恭守亮守信奔閬州十國紀年蜀史景福元年十月行瑜茂貞表守亮招納叛臣請討之感義節度使滿存救守亮為茂貞所敗奔興元十一月邠岐攻陷興元楊復恭帥守亮守貞守忠滿存同奔閬州十二月壬午華洪敗守亮等於州按實錄景福二年正月移茂貞山南於時守亮不應猶在山南今年月從新紀事則參取諸書茂貞表其子繼密權知興元府事九月加荆南節度使成汭同平章事時溥迫監軍奏稱將士留已是年二月召時漙為太子太師冬十月復以漙為侍中感化節度朱全忠奏請追溥新命詔諭解之溥初邢洺磁州留後李存孝與李存信俱為李克用假子不相睦存信有寵於克用存孝在邢州欲立大功以勝之乃建議取鎮冀見上卷大順二年存信從中沮之不時聴許及王鎔圍堯山存孝救之不克克用以存信為蕃漢馬步都指揮使與存孝共擊之二人互相猜忌逗留不進克用更遣李嗣勲等擊破之事見上是年正月存信還譖存孝無心擊賊疑與之有私約存孝聞之自以有功於克用而信任顧不及存信顧反也憤怨且懼及禍乃潛結王鎔及朱全忠上表以三州自歸於朝廷太考異實錄大順元年十月原將邢州刺史李存孝自晉州帥行營兵據邢州舊記十一月癸丑朔大原將邢州刺史李存孝自恃擒孫揆功合為昭義帥怨克用授康君立存孝自晉州帥行營兵歸邢州據城上表歸明仍致書與張濬王鎔求救援唐末見聞錄十月二十四日李存孝領兵打晉州遁歸邢州背叛與宰臣張濬狀曰某自主三郡已近二年又曰常思安知建在此之日歸順朝廷之時四鄰不有保持一家俄受塗炭以此猶豫莫敢申明遂至去年遽絶鄰好豈是某之情願葢因李某之指揮又曰自今春戰争之後實願休罷戈鋌自九月十五日以來有李某之人使促令某南至進軍面趙州牽脅李某即土門路入直届鎮州今月十四日昭義軍人百姓等衆請某權知兵馬留後歸順朝廷大王聞存孝致逆大震雄威令下先差大將進軍速至邢州仍候指揮不得輒有鬬敵但圍小壘専俟大軍據唐太祖紀年錄薛居正五代史紀傳實錄新紀皆云景福元年十月存孝叛太原歸朝廷而紀唐末見聞錄在大順元年十月舊紀恐是連言以後事按二年三月安知建方叛太原而此書中已説知建又云自主三郡已近二年存孝大順二年方為邢洺磁節度至景福元年乃二年也然則實錄邢州刺史據邢州亦因舊記之誤見聞錄所載存孝書葢與王鎔誤云與張濬也乞賜旌節及㑹諸道兵討李克用詔以存孝為邢洺磁節度使不許㑹兵十一月時溥濠州刺史張璲泗州刺史張諫以州附于朱全忠璲徐醉翻史言時溥巡屬皆附于汴漙僅保徐州乙未朱全忠遣其子友裕將兵十萬攻濮州拔之執其刺史邵倫濮州朱瑄巡屬濮博木翻遂令友裕移兵擊時溥孫儒將王壇陷婺州刺史蔣瓌奔越州中和四年蔣瓌據婺州廬州刺史蔡儔發楊行密祖父墓光啓三年楊行密留蔡儔守廬州明年儔以州附孫儒儒既敗儔遂阻兵以拒行密與舒州刺史倪章連兵遣使送印於朱全忠以求救全忠惡其反覆惡烏路翻納其印不救且牒報行密行密謝之行密遣行營都指揮使李神福將兵討儔宣明歴浸差穆宗立以為累世纘緒必更歴紀乃詔日官改撰歴術名曰宣明太子少詹事邊岡造新歴成十二月上之命曰景福崇𤣥歴邊岡與司天少監胡秀林均州司馬王穉改治新歴然術一出於岡岡用算巧能馳騁反覆於乘除間由是簡捷超徑等接之術興而經制逺大衰序之法廢矣雖籌䇿便易然皆冥於本原上時掌翻壬午王建遣其將華洪擊楊守亮於閬州破之建遣節度押牙延陵鄭頊使於朱全忠延陵漢曲阿縣地晉分置延陵郡隋移治丹徒武徳三年移於舊郡治屬潤州今丹楊縣之延陵鎮即其地全忠問劔閣頊極言其險全忠不信頊曰茍不以聞恐誤公軍機全忠大笑是嵗明州刺史鍾文季卒其將黄晟自稱刺史路振九國志黄晟明州鄞縣人歴為將領㑹刺史鍾文季卒遂據其郡二年春正月時溥遣兵攻宿州刺史郭言戰死大順二年朱全忠取宿州事見上卷東川留後顧彦暉既與王建有隙大順二年楊守亮攻東川王建遣兵救之欲因而取之不克由是與顧彦暉有隙事亦見上卷李茂貞欲撫之使從已奏請更賜彦暉節大順二年朝廷遣中使賜顧彦暉節楊守厚邀而奪之故請更賜詔以彦暉為東川節度使申前命也茂貞又奏遣知興元府事李繼密救梓州梓州朱受兵而救之何也非救之也遣兵助彦暉以致西川之師耳未幾建遣兵敗東川鳯翔之兵於利州幾居豈翻敗補邁翻下同彦暉求和請與茂貞絶乃許之鳯翔節度使李茂貞自請鎮興元詔以茂貞為山南西道兼武定節度使以中書侍郎同平章事徐彦若同平章事充鳯翔節度使考異曰舊紀在七月癸未今從實錄新紀又割果閬二州𨽻武定軍茂貞欲兼得鳯翔不奉詔二月甲戍加西川節度使王建同平章事李克用引兵圍邢州王鎔遣牙將王藏海致書解之克用怒斬藏海進兵撃鎔敗鎮兵於平山平山漢蒲吾縣隋為房山縣至徳元年改為平山縣屬鎮州九域志在州西六十五里辛巳攻天長鎮旬日不下鎔出兵三萬救之克用逆戰於叱日嶺下大破之斬首萬餘級餘衆潰去河東軍無食脯其尸而啗之啗徒濫翻時溥求救於朱瑾朱全忠遣其將霍存將騎兵三千軍曹州以備之瑾將兵二萬救徐州存引兵赴之與朱友裕合擊徐兖兵於石佛山下大破之石佛山近彭城薛史曰石佛山在彭門南述征記彭城南有石佛山頂方二丈二尺瑾遁歸兖州辛夘徐兵復出存戰死霍存恃勝而不虞徐兵之復出故戰敗而死復扶又翻李克用進下井陘李存孝將兵救王鎔遂入鎮州與鎔計事鎔又乞師於朱全忠全忠方與時溥相攻不能救但遺克用書遺唯季翻言鄴下有十萬精兵抑而未進克用復書儻實屯軍鄴下顒望降臨顒魚容翻仰也必欲真决雌雄願角逐於常山之尾甲午李匡威引兵救鎔敗河東兵於元氐敗補邁翻克用引還邢州鎔犒匡威於藁城輦金帛二十萬以酬之朱友裕圍彭城時溥數出兵友裕閉壁不戰去年十一月朱全忠遣友裕攻彭城此言其積時相持之事數所角翻朱瑾宵遁友裕不追謂石佛山下戰時都虞侯朱友恭以書譖友裕于全忠全忠怒驛書下都指揮使龎師古下户嫁翻使代之將且按其事書誤達於友裕友裕大懼以二千騎逃入山中按薛史元貞張后傳作二十騎朱友裕傳作數騎二千騎太多當以二十騎為是潛詣碭山匿於伯父全昱之所朱全忠兄弟本居碭山全昱全忠長兄也碭音唐全忠夫人張氏聞之使友裕單騎詣汴州見全忠泣涕拜伏于庭人王忠命左右捽抑將斬之捽者持其髻抑者按其頸捽昨沒翻夫人趨就抱之泣曰汝捨兵衆束身歸罪無異志明矣全忠悟而捨之使權知許州友恭夀春人李彦威也幼為全忠家僮曰考異薛居正五代史高季興傳以友恭為汴之賈人李七郎十國紀年以為夀春賈人友恭傳云彦威丱角事太祖今從之全忠養以為子張夫人碭山人多智略全忠敬憚之雖軍府事時與之謀議或將兵出中塗夫人以為不可遣一介召之全忠立為之返為于偽翻龎師古攻佛山寨拔之佛山寨即石佛山寨自是徐兵不敢出李匡威之救王鎔也將發幽州家人㑹别家人悉㑹於使宅以送别弟匡籌之妻美匡威醉而淫之二月匡威自鎮州還至博野匡籌據軍府自稱留後以符追行營兵匡威衆潰歸但與親近留深州深州在博野東南一百五十里進退無所之遣判官李抱真入奏請歸京師京師屢更大亂更工衡翻經也聞匡威來坊市大恐曰金頭王來圖社稷士民或竄匿山谷王鎔徳其以己故致失地徳其救己以致失幽州迎歸鎮州為築第父事之為于偽翻為李匡威刼王鎔而死張本薛史曰鎔館匡威於寳夀佛寺以渝州刺史栁玭為瀘州刺史九域志渝州西至瀘州七百六十里玭部田翻言考異曰新傳云玭坐事貶瀘州刺史卒北夢瑣亦云謫授瀘州新舊書玭貶官無年月今据實錄此月玭自渝為瀘州刺史當是初貶渝州後移瀘州新傳北夢瑣言誤也栁氏自公綽以來世以孝悌禮法為士大夫所宗言自元和以來為名家玭為御史大夫上欲以為相宦官惡之惡烏路翻故久謫於外玭嘗戒其子弟曰凡門地髙可畏不可恃也立身行巳一事有失則得罪重於他人死無以見先人於地下此其所以可畏也門高則驕心易生族盛則為人所嫉懿行實才人未之信行下孟翻下同小有玼纇玼疾移翻纇盧對翻玉病曰玼絲節曰纇衆皆指之此其所以不可恃也故膏粱子弟學宜加勤行宜加勵僅得比他人耳使栁氏子姪常能守玼之戒各務修飭雖至今為名家可也王建屢請殺陳敬瑄田令孜朝廷不許夏四月乙亥建使人告敬瑄謀作亂殺之新津陳敬瑄居新津見上卷大順二年又告令孜通鳯翔書下獄死下遐稼翻建使節度判官馮㳙草表奏之曰開匣出虎孔宣父不責他人當路斬蛇孫叔敖葢非利己論語孔子責冉有季路曰虎兕出於柙是誰之過歟楚孫叔敖為嬰兒出遊而還憂而不食其母問其故泣而對曰今日吾見兩頭蛇恐去死無日矣母曰今蛇安在曰吾聞見兩頭蛇者死吾恐他人復見已埋之也母曰無憂汝不死吾聞之有隂徳者天報以福人聞之皆諭其為仁也専殺不行於閫外先機恐失於彀中彀古候翻㳙宿之孫也馮宿事見二百四十五卷開成元年㳙圭淵翻汴軍攻徐州累月不克自去年十一月攻徐州至是五月矣通事官張濤以書白朱全忠云進軍時日非良故無功全忠以為然敬翔曰今攻城累月所費甚多徐人已困旦夕且下使將士聞此言則懈於攻取矣全忠乃焚其書癸未全忠自將如徐州戊子龎師古拔彭城時溥舉族登鷰子樓自焚死僖宗中和元年時溥據徐州至是而亡張建封之鎮徐也有愛妓愛曰盻盻建封既歿張氏舊第有小樓名燕子盻盻念舊而不嫁居是樓十餘年幽獨悵然出白樂天集重考異曰實錄五月汴州奏拔徐州舊紀四月汴將王師牛存節陷徐州舊傳溥求援于兖州朱瑾出兵救之值大雪糧盡而還汴將王重師牛存節夜乘梯而入漙與妻子登樓自焚而卒景福二年也新紀四月戊子朱全忠陷徐州時漙死之薛居正五代史梁紀丁亥師古下彭門梟漙首以獻唐太祖紀年錄四月澤州李罕之上言懐孟降人報汴將龎師古於今月八日攻陷徐州徐帥時溥舉族皆沒温既下徐方詐請朝廷命帥昭宗乃以兵部尚書孫儲為徐帥既而温以他詞斥去自以其將鎮之四月八日葢河東傳聞之誤今從編遺錄新紀己丑全忠入彭城以宋州刺史張廷範知感化留後奏乞朝廷除文臣為節度使李匡威在鎮州為王鎔完城塹繕甲兵視之如子匡威以鎔年少且樂真定土風為于偽翻下為之同鎮州漢之真定國也樂音洛潛謀奪之李抱真自京師還為之畫䇿隂以恩施悦其將士施式䜴翻王氏在鎮久鎮人愛之不徇匡威匡威忌日鎔就第弔之父母終之日子以為忌日第者李匡威寓第也匡威素服衷甲伏兵刼之鎔趨抱匡威曰鎔為晉人所困幾亡矣晉人謂河東李克用之兵幾居依翻賴公以有今日公欲得四州此固鎔之願也鎮冀深趙四州不若與公共歸府以位讓公則將士莫之拒矣匡威以為然與鎔駢馬駢馬並馬也陳兵入府㑹大風雷雨屋瓦皆震匡威入東偏門此鎮州牙城之東偏門也鎮之親軍閉之既入門而為鎮兵所閉絶其繼至者有屠者墨君和自缺垣躍出拳敺匡威甲士敺烏口翻挾鎔於馬上負之登屋鎮人既得鎔攻匡威殺之并其族黨到考異日實錄殺匡威在五月恐約奏舊紀六月乙夘幽州李匡威謀害王鎔恒州三軍攻匡威殺之舊傳唐太祖紀年錄皆云五月新紀四月丁亥按匡籌奏云四月十九日是月己巳朔十九日丁亥也今從之鎔時年十七體疎瘦為君和所挾頸痛頭偏者累日李匡籌奏鎔殺其兄請舉兵復寃詔不許幽州將劉仁恭將兵戍蔚州過期未代士卒思歸㑹李匡籌立戍卒奉仁恭為帥還攻幽州蔚紆勿翻帥所類翻至居庸闗為府兵所敗府兵幽州節度使府之兵也敗補邁翻仁恭奔河東李克用厚待之為李克用取幽州張本李神福圍廬州甲午楊行密自將詣廬州田頵自宣州引兵㑹之初蔡人張顥以驍勇事秦宗權後從孫儒儒敗歸行密行密厚待之使將兵戍廬州蔡儔叛顥更為之用及圍急顥踰城來降降户江翻行密以𨽻銀槍都使袁稹使疏吏翻稹止忍翻稹以顥反覆白行密請殺之行密恐稹不能容置之親軍為張顥殺楊渥張本稹陳州人也稹止忍翻王彦復王審知攻福州久不下去年二月王潮遣彦復等攻福州范暉求救於威勝節度使董昌僖宗中和三年升浙東觀察為義勝節度光晵三年改為威勝節度昌與陳巖昏姻發温台婺州兵五千救之彦復審知以城堅援兵且至士卒死傷多白王潮欲罷兵更圖後舉潮不許請潮自臨行營潮報曰兵盡添兵將盡添將兵將俱盡吾當自來將即亮翻彦復審知懼親犯矢石急攻之五月城中食盡暉知不能守夜以印授監軍弃城走援兵亦還庚子彦復等入城辛丑暉亡抵㳂海都為將士所殺文徳二年范暉據福州潮入福州自稱留後素服𦵏陳巖以女妻其子延晦厚撫其家妻七細翻汀建二州降嶺海間羣盜二十餘輩皆降潰言羣盜或降或潰也王氏自此遂據有七閩矣降户江翻閏月以武勝防禦使錢鏐為蘇杭觀察使錢鏐以杭并蘇因以命之又以扈蹕都頭曹誠為黔中節度使耀徳都頭李鋋為鎮海軍節度使宣威都頭孫惟晟為荆南節度使耀徳宣威皆神䇿五十四都之數黔渠今翻鋋音蟬六月以捧日都頭陳珮為嶺南東道節度使並同平章事時李茂貞跋扈上以武臣難制欲用諸王代之故誠等四人皆加恩解兵柄令赴鎮後四人不聞至鎮葢各有分據者四人不得而赴也考異曰舊紀三月庚子以陳珮為嶺南東道節度使曹誠為黔中節度使李鋋為鎮海節度使孫惟晟為荆南節度使時朝議以茂貞傲侮王命武臣難制故罷五將之權今從實錄止是四將李匡籌出兵攻王鎔之樂夀武强以報殺匡威之恥秋七月王鎔遣兵救邢州李克用敗之於平山敗補邁翻壬申進撃鎮州鎔懼請以兵糧二十萬助攻邢州克用許之克用治兵于欒城合鎔兵三萬進屯任縣任漢古縣中廢唐之任漢南欒縣地武徳四年置任縣治苑鄉城在邢州東南治直之翻李存信屯琉璃陂琉璃陂在邢州龍岡縣界丁亥楊行密克廬州斬蔡儔左右請發儔父母冢行密曰儔以此得罪吾何為效之蔡儔發行密祖父冢見上年加天雄節度使李茂莊同平章事時以秦州為天雄軍錢鏐發民夫二十萬及十三都軍士築杭州羅城周七十里錢鏐以八都兵起後其衆日盛置十三都今杭州羅城鏐所築也昇州刺史張雄卒庚考異曰新紀八月子盖約奏到之日今從十國紀年馮𢎞鐸代之為刺史李茂貞恃功驕横上表及遺杜讓能書横户孟翻上時掌翻遺唯季翻辭語不遜上怒欲討之茂貞又上表略曰陛下貴為萬乘不能庇元舅之一身元舅謂王瓌事見上卷大順二年尊極九州不能戮復恭之一豎又曰今朝廷但觀彊弱不計是非又曰約衰殘而行法隨盛壯以加恩李茂貞之表辭固慢然當時之政事實亦如此體物錙銖言體物有錙銖之重則待之亦重有錙銖之輕則待之亦輕看人衡纊劉峻廣絶交論曰衡所以揣其輕重纊所以屬其鼻息注云謂操衡揣勢之輕重持纊量氣之粗細又曰軍情易變戎馬難羈唯慮甸服生靈因兹受禍古之王者畿方千里以為甸服未審乘輿播越自此何之乘䋲證翻上益怒决討茂貞命杜讓能専掌其事讓能諫曰陛下初臨大寳國步未夷茂貞近在國門按九域志鳯翔東距長安二百八十里耳臣愚以為未宜與之構怨萬一不克悔之無及上曰王室日卑號令不出國門此乃志士憤痛之秋藥弗瞑眩厥疾弗瘳書説命之辭注云如服藥必瞑眩極其病乃除瞑莫遍翻眩𤣥遍翻瞑眩困極也朕不能甘心為孱懦之主孱鉏山翻愔愔度日愔於禽翻愔愔深静貌坐視陵夷卿但為朕調兵食為干偽翻調徒釣翻朕自委諸王用兵成敗不以責卿讓能曰陛下必欲行之則中外大臣共宜協力以成聖志不當獨以任臣上曰卿位居元輔杜讓能時為首相與朕同休戚無宜避事讓能泣曰臣豈敢避事况陛下所欲行者憲宗之志也顧時有所未可勢有所不能耳但恐他日臣徒受晁錯之誅不能弭七國之禍也晁錯事見漢景帝紀敢不奉詔以死繼之杜讓能固巳知必死矣上乃命讓能留中書計畫調度月餘不歸不歸私第也調徒弔翻崔昭緯隂結邠岐為之耳目讓能朝發一言二鎮夕必知之李茂貞使其黨糾合市人數百千人擁觀軍容使西門君遂馬訴曰岐帥無罪岐帥謂李茂貞鳯翔本岐州帥所類翻不宜致討使百姓塗炭君遂曰此宰相事非吾所及市人又邀崔昭緯鄭延昌肩輿訴之舊制朝臣入朝皆乘馬宋建炎播遷以揚州街路滑始許朝士乘擔子觀此則唐末宰相亦有乗肩輿者矣二相曰兹事主上専委杜太尉吾曹不預知市人因亂投瓦石二相下輿走匿民家僅自免喪堂印及朝服上命捕其唱帥者誅之喪息浪翻朝直遙翻下同帥讀曰率用兵之意益堅京師民或亡匿山谷嚴刑所不能禁八月以嗣覃王嗣周為京西招討使異考曰按順宗子經封郯王嗣周當是其後㑹昌後避武宗諱改郯作覃按武宗諱瀍後改諱炎如考異所云葢避郯字旁從炎字也神䇿大將軍李鐬副之鐬火外翻丙辰楊行密遣田頵將宣州兵二萬攻歙州歙州刺史裴樞城守久不下歙書涉翻時諸將為刺史者多貪暴獨池州團練使陶雅寛厚得民歙人曰得陶雅為刺史請聴命行密即以雅為歙州刺史歙人納之雅盡禮見樞送之還朝樞遵慶之曽孫也裴遵慶見二百二十二卷肅宗上元二年朱全忠命龎師古移兵攻兖州與朱瑾戰屢破之九月丁夘以錢鏐為鎮海節度使升杭州武勝防禦使為鎮海節度使唐本置鎮海軍於潤州今以命錢鏐於杭州至光化元年鏐遂請徙軍於杭州復考異曰今年五月以李鋋為鎮海節度使令赴鎮今除鏐者按是時安仁義已據潤州又孫惟晟除荆南時成汭已據荆南二人安得赴鎮葢但欲罷其軍權其實不至鎮而返耳實錄云仍徙鎮海軍額于杭州按吳越備史是嵗鏐初除鎮海節度使猶領潤州刺史至光化元年始移鎮海軍于杭州實錄誤也李存孝夜犯李存信營虜奉誠軍使孫考老李克用自引兵攻邢州掘塹築壘環之環音宦存孝時出兵突擊塹壘不能成河東牙將袁奉韜密使人謂存孝曰大王惟俟塹成即歸晉陽尚書所憚者獨大王耳李克用時封隴西郡王存孝葢亦檢校尚書諸將非尚書敵也大王若歸咫尺之塹安能沮尚書之鋒銳邪存孝以為然按兵不出旬日塹壘成飛走不能越存孝由是遂窮汴將鄧季筠從克用攻邢州輕騎逃歸鄧季筠被擒見上卷大順元年朱全忠大喜使將親軍將即亮翻乙亥覃王嗣周帥禁軍三萬送鳯翔節度使徐彦若赴鎮軍於興平帥讀曰率五考異曰舊紀覃王率扈駕十四軍進攻岐陽今從實錄李茂貞王行瑜合兵近六萬軍于盩厔以拒之近其靳翻禁軍皆新募市井少年茂貞行瑜所將皆邊兵百戰之餘壬午茂貞等進逼興平禁軍皆望風逃潰茂貞等乘勝進攻三橋京城大震士民奔散市人復守闕請誅首議用兵者復扶又翻崔昭緯心害太尉門下侍郎同平章事杜讓能密遺茂貞書曰用兵非主上意皆出於杜太尉耳遺于季翻甲申茂貞陳於臨皐驛臨皐驛在長安城西表讓能罪請誅之讓能言於上曰臣固先言之矣請以臣為解言歸罪於讓能以解兵也上涕下不自禁禁居吟翻曰與卿訣矣是日貶讓能梧州刺史梧州去京師五千五百里宋白曰漢武帝置蒼梧郡理廣信縣隋置蒼梧郡理蒼梧縣唐為梧州制辭略曰弃卿士之臧謀構藩垣之深釁咨詢之際證執彌堅又流觀軍容使西門君遂于儋州内樞密使李周潼于崖州段詡于驩州乙酉上御安福門斬君遂周潼詡再貶讓能雷州司户遣使謂茂貞曰惑朕舉兵者三人也非讓能之罪以内侍駱全瓘劉景宣為左右軍中尉壬辰以東都留守韋昭度為司徒門下侍郎同平章事御史中丞崔𦙍為户部侍郎同平章事𦙍慎由之子也崔慎由歴事文武宣大中間為相外寛𢎞而内巧險與崔昭緯深相結故得為相季父安潛謂所親曰吾父兄刻苦以立門户終為緇郎所壊壊音怪平考異曰舊傳𦙍初拜章事安潛有此言按安潛去年卒必先時嘗有此言也緇郎𦙍小字也李茂貞勒兵不解請誅杜讓能然後還鎮崔昭緯復從而擠之復扶又翻下同擠牋西翻又子細翻冬十月賜讓能及其弟户部侍郎𢎞徽自盡考異曰續實運錄曰大順二年相國杜讓能孔緯值上京頻嬰離亂朝綱紊墜是時徇意諸道扈駕兵五十四都坊坊皆滿兼近藩連帥要行征討便自綂軍至如岐陽李茂貞先朝封為太子本姓宋洋州牧先祖討昭義劉從諫有功子孫爵賞不絶洎夀王登位後遣禮部侍郎薛廷珪持璽書具禮冊為岐王茂貞先中和年中投判軍容使田令孜作養男姓田名彦賔葢趨其勢也汴州朱温先朝冊東平王至今上又遣薛廷珪為禮儀使延王為冊命使封為梁王且岐王與北司人情方洽宰相甚不和睦累表章云臣今駐斾咸陽未敢入中書問罪杜讓能等請寘極法表奏上不恱遂詔孔杜二相國令往咸陽謝及見岐王戰不能言岐王大怒却令歸中書省過纔到中書上又發遣令祈謝岐王如是往來三度岐王又奏曰二相見臣並不措一言如此曠官有辱聖代請行朝典别選英賢上不樂敕罷知政事不得已除昭緯荆南節度杜讓能除河中節度三日後貶于嶺表出國門三十里並賜自盡時岐王率驍果五千人住咸陽及貶二相乃退此皆誤謬之説今從實錄復下詔布告中外稱讓能舉枉錯直用論語孔子之言謂枉者舉之直者錯而不用也衰亂之朝安有公是非邪錯千故翻愛憎擊于一時鬻獄賣官聚歛踰于巨萬歛力贍翻自是朝廷動息皆稟於邠岐南北司往往依附二鎮以邀恩澤有崔鋋王超者鋋音蟬為二鎮判官凡天子有所可否其不逞者輒訴於鋋超二人則教茂貞行瑜上章論之朝廷少有依違其辭語已不遜制復以茂貞為鳯翔節度使兼山南西道節度使守中書令於是茂貞盡有鳯翔興元洋隴秦等十五州之地鳯翔本一鎮興元山南西道又一鎮洋州武定軍又一鎮秦隴天雄軍又一鎮史言李茂貞兼有四鎮之地以徐彦若為御史大夫戊戍以泉州刺史王潮為福建觀察使舒州刺史倪章弃城走倪章與蔡儔連兵儔已敗故章走楊行密以李神福為舒州刺史邠寧節度使守侍中兼中書令王行瑜求為尚書令韋昭度密奏太宗以尚書令執政遂登大位自是不以授人臣惟郭子儀以大功拜尚書令終身避讓行瑜安可輕議十一月以行瑜為太師賜號尚父仍賜鐵劵十二月朱全忠請徙鹽鐵於汴州以便供軍崔昭緯以為全忠新破徐鄆兵力倍増若更判鹽鐵不可復制復扶又翻乃賜詔開諭之汴將葛從周攻齊州刺史朱威朱瑄朱瑾引兵救之按方鎮表齊州時屬平盧節度以後乾寧三年朱瓊降汴之事觀之則齊州已為兖鄆所并矣考異曰編遺錄云十月乙未今從薛居正五代史梁紀初武安節度使周岳殺閔勗據潭州見二百五十六卷僖宗光啓二年邵州刺史鄧處訥聞而哭之諸將入弔處訥曰吾與公等咸受僕射大恩閔勗檢校尚書右僕射欽化節度使以處訥刺邵州故言受恩路振九國志鄧處訥自唐乾符中從閔勗征蠻于安南勗帥潭署處訥邵州兵馬留後處昌吕翻今周岳無狀殺之吾欲與公等竭一州之力為僕射報仇可乎為于為翻皆曰善於是訓卒厲兵八年乃結朗州刺史雷滿雷滿與周岳有争肉之仇共攻潭州克之斬岳自稱留後鄧處訥甫得潭州而劉建鋒馬殷巳擬其後矣乾寧元年春正月乙丑朔赦天下改元李茂貞入朝大陳兵自衛數日歸鎮以李匡籌為盧龍節度使二月朱全忠自將撃朱瑄軍于魚山魚山在鄆州須昌東阿兩縣之間瑄與朱瑾合兵攻之兖鄆兵大敗死者萬餘人以右散騎常侍鄭綮為禮部侍郎同平章事綮康禮翻云考異曰舊傳光化初為相恐誤北夢瑣言曰綮雖有詩名本無廊廟之望嘗典廬州吳王楊行密為本州步奏官因有遺闕而笞責之然其儒懦清慎𢎞農常重之昭宗時吳王雄據淮海朝廷務行姑息因盛言鄭公之徳由是登庸中外驚駭太原兵至渭北天子震恐渇於攘却相國奏對請於文宣王諡號中加一哲字其不究時病率此類也按明年李克用舉兵至渭北綮巳罷相今從實錄新紀綮好詼諧好呼到翻多為歇後詩譏嘲時事歇後者叙所以為詩而歇後語不發上以為有所藴手注班簿命以為相班簿注在朝者姓名聞者大驚堂吏往告之綮笑曰諸君大誤使天下更無人未至鄭綮吏曰特出聖意綮曰果如是奈人笑何既而賀客至綮搔首言曰歇後鄭五作宰相鄭綮第五為歇後詩時謂之歇後鄭五體時事可知矣累讓不獲乃視事以邵州刺史鄧處訥為武安節度使彰義節度使張鈞薨表其兄鐇為留後時以涇州為彰義節度鐇甫袁翻三月黄州刺史吳討舉州降楊行密黄州時隷鄂岳鄂岳武昌軍也按新書杜洪傳吳討鄂州永興縣民以土團帥起據黄州邢州城中食盡甲申李存孝登城謂李克用曰兒䝉王恩得富貴茍非困于䜛慝安肯捨父子而從仇讎乎願一見王死不恨克用使劉夫人視之夫人引存孝出見克用存孝泥首謝罪曰兒粗立微勞存信逼兒失圖至此粗坐五翻克用叱之曰汝遺朱全忠王鎔書毁我萬端遺唯季翻亦存信教汝乎囚之歸于晉陽車裂於牙門筠考異曰太祖紀年錄先獲汴將鄧安康八軍吏劉藕子潞州所俘供奉官韓歸範皆與存孝連坐同日誅之騎將薛阿檀懼自刺按舊紀克用擒歸範尋遣歸因附表訴寃不聞復往晉陽也薛居正五代史鄧季筠傳後復自邢州逃歸汴紀年錄誤也存孝傳曰武皇出井陘將逼真定存孝面見王鎔陳軍機武皇暴怒誅先獲汴將安康八耳存孝驍勇克用軍中皆莫及常將騎兵為先鋒所向無敵身被重鎧腰弓髀槊獨舞鐵撾陷陳萬人辟易被皮義翻重直龍翻撾陟𤓰翻陳讀曰陣下同辟讀曰闢易如字每以二馬自隨馬稍乏言馬稍疲而乏力也就陳中易之出入如飛克用惜其才意臨刑諸將必為之請為于偽翻下同因而釋之既而諸將疾其能竟無一人言者既死克用為之不視事者旬日私恨諸將而於李存信竟無所譴又有薛阿檀者其勇與存孝相侔諸將疾之常不得志密與存孝通存孝誅恐事泄遂自殺自是克用兵勢浸弱而朱全忠獨盛矣史言克用自翦羽翼故不競干汴克用表馬師素為邢洺節度使朱全忠遣軍將張從晦慰撫夀州從晦陵侮刺史江彦温而與諸將夜飲彦温疑其謀已明日盡殺在席諸將以書謝全忠而自殺軍中推其子從頊知軍州事全忠為之腰斬從晦五月加鎮海節度使錢鏐同平章事劉建鋒馬殷引兵至澧陵澧當作醴醴陵在漢臨湘縣界後漢分為醴陵縣隋廢武徳四年分長沙置醴陵縣屬潭州九域志在州東一百六十里鄧處訥遣邵州指揮使蔣勛鄧繼崇將步騎三千守龍回闗殷先至闗下遣使詣勛勛等以牛酒犒師殷使說勛曰劉驤智勇兼人觀後姚彦章説馬殷曰公與劉龍驤一體之人此必逸龍字説式芮翻術家言當興翼軫間翼軫楚荆州分長沙入軫十六度今將十萬衆精鋭無敵而君以鄉兵數千拒之難矣按新書蔣勛鄧繼崇皆邵州土豪所領之兵皆其土人故謂之鄉兵不如先下之取富貴還鄉里不亦善乎勛等然之謂衆曰東軍許吾屬還劉建鋒等兵從東來故蔣勛等謂之東兵士卒皆懽呼弃旗幟鎧仗遁去建鋒令前鋒衣其甲張其旗趨潭州衣於既翻趨七喻翻潭人以為邵州兵還不為備建鋒徑入府處訥方宴擒斬之戊辰建鋒入潭州自稱留後王建攻彭州城中人相食彭州内外都指揮使趙章出降降户江翻王先成請築龍尾道屬於女牆自城外築墱道陂陀而上屬于城上短垣其道前髙後卑後塌于地若龍之垂尾然故謂之龍尾道屬之欲翻女牆即城上短垣所謂陴也丙子西川兵登城楊晟猶帥衆力戰帥讀曰率刀子都虞侯王茂權斬之文徳元年楊晟得彭州王建攻彭州踰兩朞而後克亦憊矣獲彭州馬步使安師建建欲使為將師建泣謝曰師建誓與楊司徒同生死不忍復戴日月復扶又翻惟速死為惠再三諭之不從乃殺之禮𦵏而祭之更趙章姓名王宗勉王茂權曰宗訓又更王釗名曰宗謹李綰姓名曰王宗綰更工衡翻辛夘中書侍郎同平早事鄭延昌罷為右僕射朱瑄朱瑾求救於河東李克用遣騎將安福順及弟福慶福遷督精騎五百假道於魏度河應之武昌節度使杜洪攻黄州以吳討叛附楊行密也楊行密遣行營都指揮使朱延夀等救之六月甲午以宋州刺史張廷範為武寧節度使從朱全忠之請也徐州先時改感化軍既屬朱全忠復為武寧軍蘄州刺史馮敬章邀擊淮南軍朱延夀攻蘄州不克蘄州武昌巡屬也戊午以翰林學士承㫖禮部尚書李谿同平章事方宣制水部郎中知制誥劉崇魯出班掠麻慟哭强奪取之為掠上召崇魯問其故對言谿姦邪依附楊復恭西門君遂得在翰林無相業恐危社稷谿竟罷為太子少傅谿鄘之孫也李鄘見憲宗紀上師谿為文崔昭緯恐谿為相分已權故使崇魯沮之谿十表自訟醜詆崇魯父符受贓枉法事覺自殺弟崇望與楊復恭深交崇魯庭拜田令孜為朱玫作勸進表為于偽翻乃云臣交結内臣何異抱贓唱賊且故事絁巾慘帶不入禁庭絁巾絹巾也慘淺色絁式支翻臣果不才崇魯自應上章論列上時掌翻下上表同豈於正殿慟哭豈下有宜字或當字文意乃明為國不祥無人臣禮乞正其罪詔停崇魯見任見賢遍翻谿猶上表不已乞行誅竄表數千言詬詈無所不至詬古候翻又許候翻劉崇魯固可罪李谿亦褊矣當是時强藩遙制朝廷視當朝宰相特鬼朴耳李谿急於作相將以何為此其所以有都亭驛之禍也李克用大破吐谷渾殺赫連鐸擒白義誠執考異曰舊紀六月壬辰克用攻陷雲州赫連鐸以薛志勤守雲中按唐太祖紀年錄莊宗列傳薛居正五代史武皇紀皆云大順二年武皇拔雲州鐸奔吐谷渾誤也新紀六月赫連鐸與李克用戰于雲州死之太祖紀年錄十月討李匡籌師次新城邊兵願從者衆赫連鐸白義誠數敗至是窮蹙無歸自縶膝行詣於軍門太祖㣲數其罪命笞而脱之薛史武皇紀吐谷渾傳亦云鐸等來歸命笞而釋之薛志勤傳云王暉據雲州判討平之以志勤為大同防禦使與舊紀異唐末見聞錄六月収雲州處置赫連鐸活擒白義誠進兵幽州界巡檢迴府新紀盖據此今從之秋七月李茂貞遣兵攻閬州拔之楊復恭楊守亮楊守信帥其族黨犯圍走楊復恭等奔閬州見上景福元年帥讀曰率禮部侍郎同平章事鄭綮自以不合衆望累表避位詔以太子少保致仕以御史大夫徐彦若為中書侍郎兼吏部尚書同平章事綿州刺史楊守厚卒其將常再榮舉城降王建楊復恭守亮守信將自商山奔河東至乾元萬嵗通天元年分商州豐陽置安業縣乾元元年更名乾元縣屬商州遇華州兵獲之八月韓建獻于闕下斬于獨栁復恭父子至是夷矣李茂貞獻復恭遺守亮書訴致仕之由遺唯季翻楊復恭致仕見上卷大順二年云承天門乃隋家舊業承天門長安太極宫南門隋文帝使宇文愷所營本名昭陽門唐改曰承天門故復恭云然大姪但積粟訓兵勿貢獻守亮復光養子故呼為姪吾於荆榛中立夀王上本封夀王纔得尊位廢定䇿國老有如此負心門生天子昭義節度使康君立詣晉陽謁李克用己未克用㑹諸將飲博酒酣克用語及李存孝流涕不已君立素與李存信善一言忤㫖克用拔劒斫之囚於馬步司唐末諸鎮皆於馬步司置獄今謂之兵馬司忤五故翻九月庚申朔出之君立已死五考異曰薛居正代史李存孝既死武皇深惜之怒諸將無解愠者君立以一言忤㫖武皇賜酖而殂唐末見聞錄曰八月三十日相公於左街宅夜飲行劒斫損昭義節度使康君立把送馬步司収禁至九月一日放出尋已身薨薛史賜酖恐是文飾其事克用表雲州刺史薛志誠為昭義留後冬十月封皇子祤為棣王禊為䖍王祤兄羽翻禊胡計翻禋為沂王禕為遂王劉仁恭數因葢寓獻䇿於李克用數所角翻下同葢古盍翻願得兵萬人取幽州克用方攻邢州分兵數千欲納仁恭于幽州不克此言是年十一月以前事李匡籌益驕數侵河東之境數所角翻克用怒十一月大舉兵攻匡籌拔武州進圍新州新州領永興􅈨山懐安龍門四縣史失其建置之始其地在媯州西北考異曰唐太祖紀年錄十一月壬辰大軍拔截冦進収楊門九子戊戍下武州甲寅攻新州營于西北隅按十一月己未朔無壬辰戊戍甲寅紀年錄誤今從實錄以涇原留後張鐇為彰義節度使朱全忠遣使至泗州陵慢刺史張諫諫舉州降楊行密泗州本徐州巡屬自此遂為楊行密所有行密遣押牙唐令回持茶萬餘斤如汴宋貿易貿音茂全忠執令回盡取其茶楊汴始有隙為全忠攻行密張本十二月李匡籌遣大將將步騎數萬救新州李克用選精兵逆戰於段莊大破之段莊在新州東南斬首萬餘級生擒將校三百人以練糸斥之紤充夜翻徇于城下是夕新州降辛亥進攻媯州宋白曰媯州東南至幽州二百八十里西南至蔚州二百四十里媯居為翻壬子匡籌復發兵出居庸闗復扶又翻下同克用使精騎當其前以疲之遣步將李存審自他道出其背夾擊之幽州兵大敗殺獲萬計甲寅李匡籌挈其族奔滄州義昌節度使盧彦威利其輜重妓妾遣兵攻之于景城殺之盡俘其衆重直用翻僖宗光啓元年李全忠得幽州三世十年而滅景城漢成平縣唐屬滄州宋廢為鎮屬瀛州樂夀縣九域志樂夀在瀛州南六十里宋白曰幽州東南至滄州五百五十里妓渠綺翻考異曰唐太祖紀年作匡儔今從新舊紀傳實錄存審本姓苻宛丘人克用養以為子薛史苻存審初從李罕之罕之為諸葛爽所逼出保懐州部下分散存審乃歸李克用丙辰克用進軍幽州其大將請降匡籌素暗懦初據軍府兄匡威聞之謂諸將曰兄失弟得不出吾家亦復何恨但惜匡籌才短不能保守得及二年幸矣景福二年匡籌得幽州至是僅及年二加匡國節度使王行約檢校侍中吳討畏杜洪之逼杜洪攻吳討見上五月納印請代于楊行密行密以先鋒指揮使瞿章權知黄州為瞿章為汴兵攻執張本是嵗黄連洞蠻二萬圍汀州黄連洞在汀州寧化縣南今潭飛磜即其地福建觀察使王潮遣其將李承勲將萬人擊之蠻解去承勲追擊之至漿水口破之閩地略定潮遣僚佐巡州縣勸農桑定租税交好鄰道好呼到翻保境息民閩人安之封州刺史劉謙卒子隠居喪于賀江賀水源出賀州富川縣石龍亘州城合桂嶺水謂之賀江土民百餘人謀亂隠一夕盡誅之嶺南節度使劉崇龜召補右都押牙兼賀水鎮使未幾表為封州刺史劉隠始此義勝節度使董昌苛虐詳考下卷浙東乃威勝節度又按新書方鎮表廣明三年升浙東道觀察為義勝軍節度光啓三年改威勝軍威勝為是於常賦之外加歛數倍以充貢獻及中外饋遺歛力贍翻遺唯季翻每旬發一綱金萬兩銀五千鋌越綾萬五千匹他物稱是稱尺證翻適相等也用卒五百人或遇雨雪風水違程則皆死唐制陸行之程馬日七十里步及驢五十里車三十里水行之程舟之重者泝河日三十里江四十里餘水四十五里空舟泝河四十里江五十里餘水六十里㳂流之舟則輕重同制河日一百五十里江一百里餘水七十里轉運徴歛送納皆準程節其遲速其三峽砥柱之類不拘此限若遇風水淺不得行者即於隨近官司申牒驗記聴折半功不及是則為違程董昌葢計日限程以至長安又不許以雨雪風水準折也貢奉為天下最由是朝廷以為忠寵命相繼官至司徒同平章事爵隴西郡王昌建生祠于越州制度悉如禹廟禹廟在越州㑹稽縣東南七里命民間禱賽者賽先代翻先祈福於神其後報祠謂之賽無得之禹廟皆之生祠昌求為越王朝廷未之許昌不恱曰朝廷欲負我矣我累年貢獻無算而惜越王邪有諂之者曰王為越王曷若為越帝於是民間訛言時世將變競相帥填門喧譟請昌為帝帥讀曰率昌大喜遣人謝之曰天時未至時至我自為之其僚佐吳瑤都虞候李暢之等皆勸成之吏民獻謠䜟符瑞者不可勝紀勝音升其始賞之以錢數百緡既而獻者日多稍減至五百三百而已昌曰䜟云兔子上金牀此謂我也我生太嵗在夘明年復在夘復扶又翻二月夘日夘時吾稱帝之秋也為董昌僭號錢鏐舉兵討之張本資治通鑑卷二百五十九
