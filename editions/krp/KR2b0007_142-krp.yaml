front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百四十二宋司馬光撰胡三省音註齊紀八屠維單閼一年東昏矦上諱寶卷字智藏明帝第二子也本名明賢明帝輔政後改焉明帝長子寶義有廢疾故立帝為太子其後蕭衍蕭頴胄以荆雍起兵輔南康王寶融以攻帝廢帝為東昏矦荆雍在西謂帝以昏虐居東故廢為東昏矦永元元年春正月戊寅朔大赦改元太尉陳顯達督平北將軍崔慧景軍四萬擊魏欲復雍州諸郡去年魏克雍州五郡雍於用翻癸未魏遣前將軍元英拒之元英即拓䟦英魏既改姓元氏史因而書之乙酉魏主𤼵鄴去年十二月甲寅魏主自鄴班師今車駕始自鄴𤼵辛卯帝祀南郊戊戌魏主至洛陽過李冲冢冲死見上卷上年魏主令葬冲於洛陽覆舟山近杜預冢今自鄴還過其冢按魏主詔代人遷洛者葬洛餘州從便冲隴西人也以其貴寵亦令葬洛時臥疾望之而泣見留守官語及冲輙流涕李冲與任城王澄等同守留臺魏主還洛見留守官而冲已死故語及輙流涕念之之甚也守式又翻魏主謂任城王澄曰朕離京以来舊俗少變不任音壬離力智翻少詩沼翻下同不讀曰否對曰聖化日新帝曰朕入城見車上婦人猶戴㡌著小襖此代北婦人之服也乗車婦人皆貴臣之家也著陟略翻襖烏浩翻裌衣也何謂日新對曰著者少不著者多帝曰任城此何言也必欲使滿城盡著邪澄與留守官皆免冠謝史言魏主汲汲於用夏變夷甲辰魏大赦魏主之幸鄴也李彪迎拜於鄴南且謝罪彪既得罪歸鄉里故迎魏主於鄴南帝曰朕欲用卿思李僕射而止慰而遣之會御史臺令史龍文觀告太子恂被收之日恂被收見一百四十卷明帝建武三年被皮義翻有手書自理彪不以聞尚書表收彪赴洛陽帝以為彪必不然以牛車散載詣洛陽散悉但翻散載者不加縶縳會赦得免魏太保齊郡靈王簡卒二月辛亥魏以咸陽王禧為太尉魏主連年在外魏主自明帝建武元年南伐至是首尾四年馮后私於宦者高菩薩菩蓬晡翻薩桑葛翻及帝在懸瓠病篤事見上卷上年后益肆意無所憚中常侍雙蒙等為之心腹雙姓蒙名姓譜顓帝後封於雙蒙城其後以為氏彭城公主為宋王劉昶子婦寡居昶丑兩翻后為其母弟北平公馮夙求昏帝許之公主不願后強之后為于偽翻強其兩翻公主密與家僮冐雨詣懸瓠訴於帝且具道后所為帝疑而秘之后聞之始懼隂與母常氏使女巫猒禱猒於葉翻又於琰翻曰帝疾若不起一旦得如文明太后輔少主稱制者文明太后后之姑也其包藏祸心若此豈非姑之教也少詩照翻當賞報不貲貲即移翻貲之為言量也不貲言無量之可比也帝還洛收高菩薩雙䝉等案問具伏帝在含温室夜引后入賜坐東楹去御榻二丈餘命菩薩等陳状陳后滛佚之状既而召彭城王勰北海王詳入坐勰音恊曰昔為汝嫂今是路人但入勿避又曰此嫗欲手刅吾脅嫗威遇翻老婦曰嫗吾以文明太后家女不能廢但虚置宫中有心庶能自死言若有人心必當自取盡也汝等勿謂吾猶有情也二王出賜后辭訣后再拜稽首涕泣稽音啟入居後宫諸嬪御奉之猶如后禮嬪毗賔翻唯命太子不復朝謁而已太子儲君也命不復朝謁絶之不使以母禮事之復扶又翻朝直遥翻初馮熈以文明太后之兄尚恭宗女博陵長公主景穆太子廟號恭宗長知兩翻熈有三女二為皇后一為左昭儀二后廢后及幽后也昭儀早卒瑶光寺之練行尼魏主忍為之廢后非得罪於宗廟也幽后所為彰灼如此乃不能正其罪廢后獨非文明家女由是馮氏貴寵冠羣臣賞賜累巨萬漢書音義曰巨萬萬萬也冠古玩翻公主生二子誕脩熈為太保誕為司徒脩為侍中尚書庶子聿為黄門郎黄門侍郎崔光與聿同直庶子妾御所生以此觀之魏以黄門郎與黄門侍郎為兩官同直同直禁中也謂聿曰君家富貴太盛終必衰敗聿曰我家何所負而君無故詛我詛莊助翻呪也光曰不然物盛必衰此天地之常理若以古事推之不可不慎後歲餘而脩敗脩性浮競誕屢戒之不悛悛丑縁翻乃白於太后及帝而杖之脩由是恨誕求藥使誕左右毒之事覺帝欲誅之誕自引咎懇乞其生帝亦以其父老杖脩百餘黜為平城民及誕熈繼卒太和十九年馮誕卒是年二月也四月馮熈又卒幽后尋廢太和二十年幽后廢聿亦擯棄馮氏遂衰史言外戚罕有能全保其福禄者魏以彭城王勰為司徒勰音協陳顯逹與魏元英戰屢破之攻馬圈城四十日按陳顯逹傳馬圈在南郷界杜佑曰馬圏城去襄陽三百里在今南陽郡界穰縣北杜佑曰後魏馬圏鎮漢涅陽縣地圏渠篆翻城中食盡噉死人肉及樹皮噉徒濫翻又徒覧翻癸酉魏人突圍走斬獲千計顯逹入城將士競取城中絹遂不窮追史言齊師貪鹵掠以縱敵將即亮翻顯逹又遣軍主莊丘黑進擊南鄉㧞之莊丘複姓也蕭子顯曰南鄉城順陽舊治也魏主謂任城王澄曰顯逹侵擾朕不親行無以制之任音王三月庚辰魏主發洛陽命于烈居守守音狩凢留守大守之守皆同以右衛將軍宋弁兼祠部尚書攝七兵事以佐之攝七兵事者攝尚書七兵曹事也杜佑曰魏始置五兵尚書謂中兵外兵别兵都兵騎兵也晉又分中外兵各為左右後魏遂為七兵尚書弁精勤吏治治直吏翻恩遇亞於李冲癸未魏主至梁城魏收志北荆州汝北郡有梁縣汝源縣五代志襄城郡承休縣舊曰汝源置汝北郡唐志汝州臨汝郡本襄城郡治梁縣又有梁縣故城在西南四十五里崔慧景攻魏順陽順陽太守清河張烈固守五代志鄧州順陽縣舊置順陽郡唐武徳六年省順陽入冠軍貞觀元年省冠軍入新城其地在今鄧州菊潭臨湍二縣之間也杜佑曰漢順陽故城在鄧州穰縣西亦後穰縣地甲申魏主遣振威將軍慕容平城將騎五千救之將即亮翻騎奇寄翻自魏主有疾彭城王勰常居中侍醫藥晝夜不離左右離力智翻飲食必先甞而後進蓬首垢面衣不觧帶帝久疾多忿近侍失指動欲誅斬勰承顏伺間多所匡救伺相吏翻間古莧翻下間道同丙戌以勰為使持節都督中外諸軍事使疏吏翻勰辭曰臣侍疾無暇安能治軍願更請一王使摠軍要軍要猶言軍權也左傳曰握兵之要杜預注云威權在己治直之翻臣得專心醫藥帝曰侍疾治軍皆慿於汝吾病如此深慮不濟安六軍保社禝者捨汝而誰何容方更請人以違心寄乎心寄謂推心以託之也丁酉魏主至馬圈命荆州刺史廣陽王嘉斷均口水經曰均水出淅縣北山南流過其縣之東又南當渉都縣邑北南入于沔注云即郡國志筑陽縣之渉都郷均水於此入沔謂之均口斷丁管翻邀齊兵歸路嘉建之子也楚王建見一百二十五卷宋文帝元嘉二十七年陳顯逹引兵渡水西均水之西也據鷹子山築城人情沮恐沮在呂翻與魏戰屢敗魏武衛將軍元嵩免胄䧟陳陳讀曰陣將士隨之齊兵大敗嵩澄之弟也戊戌軍主崔恭祖胡松以烏布幔盛顯逹數人擔之幔莫半翻盛時征翻擔都甘翻負也間道自分磧山出均水口南走磧七迹翻己亥魏收顯逹軍資億計班賜將士追奔至漢水而還還從宣翻又如字下同左軍將軍張千戰死張考異曰魏書作千逹今從齊書士卒死者三萬餘人顯逹之北伐軍入汋均口水經注順陽縣西有石山南臨汋水汋水又南流注于沔水謂之汋口詳考經及注汋水均水實一水也故謂之汋均口汋實若翻廣平馮道根沈約宋志廣平太守江左僑立治襄陽宋為實土以漢朝陽縣地立廣平郡及廣平縣領鄼隂北陽等縣按水經注朝陽在新野西白水又出其西說顯逹曰汋均水迅急易進難退說輸芮翻易以豉翻魏若守隘則首尾俱急不如悉棄船於鄼城陸道歩進鄼縣即漢蕭何所封之邑屬南陽郡晉屬順陽郡江左僑立廣平郡鄼縣屬焉馮道根廣平鄼人也水經沔水自均口東南過鄼縣之西南五代志襄州隂城縣西魏置鄼城郡隘烏懈翻鄼音賛列營相次鼓行而前破之必矣顯逹不從道根以私屬從軍私屬者家之奴客及其親黨非官之所調𤼵者及顯逹夜走軍人不知山路道根每及險要輙停馬指示之衆賴以全詔以道根為汋均口戍副凡邊戍有戍主戍副顯逹素有威名至是大損陳顯逹之敗固是弱不可以敵彊亦天為之也齊師潰於戊戌魏主殂於丙午儻顯逹更能支持數日安知不能轉敗為功邪御史中丞范由山奏免顯逹官顯逹亦自表觧職皆不許更以顯逹為江州刺史癸考異曰齊明帝紀永泰元年七月卯以顯逹為江州本傳顯逹敗於馬圈求降號不許乃除江州又云東昏立顯逹彌不樂京師得此授甚喜按明帝末顯逹方以三公將兵擊魏不容無故除江州今從本𫝊崔慧景亦棄順陽走還庚子魏主疾甚北還至穀塘原謂司徒勰曰後宫乆乖隂徳記曰天子理陽道后冶隂徳鄭注云隂徳謂主隂事隂令也吾死之後可賜自盡葬以后禮庶免馮門之醜又曰吾病益惡殆必不起雖摧破顯逹而天下未平嗣子㓜弱社禝所倚唯在於汝霍子孟諸葛孔明以異姓受顧託漢武帝託昭帝於霍光昭烈帝託後主於諸葛亮事並見前况汝親賢可不勉之勰泣曰布衣之士猶為知己畢命古語有之士為知己者死為于偽翻况臣託靈先帝依陛下之末光乎託靈託體皆兄弟同氣之謂也但臣以至親乆參機要寵靈輝赫海内莫及所以敢受而不辭正恃陛下日月之明恕臣忘退之過耳今復任以元宰復扶又翻摠握機要震主之聲取罪必矣昔周公大聖成王至明猶不免疑而况臣乎如此則陛下愛臣更為未盡始終之美彭城王勰慮禍避權如此猶終不免於高肇之手况咸陽王禧北海王詳等邪帝黙然乆之曰詳思汝言理實難奪乃手詔太子曰汝叔父勰清規懋賞懋美也與白雲俱潔厭榮捨紱以松竹為心吾少與綢繆紱音弗少詩照翻鄭康成曰綢繆猶纒綿也綢直留翻繆莫矦翻未忍暌離百年之後其聽勰辭蟬捨冕遂其冲挹之性以侍中䕶軍將軍北海王詳為司空鎮南將軍王肅為尚書令鎮南大將軍廣陽王嘉為左僕射尚書宋弁為吏部尚書與侍中大尉禧尚書右僕射澄等六人輔政夏四月丙午朔殂于穀塘原年三十三謚孝文皇帝廟號高祖高祖友愛諸弟終始無間間古莧翻甞從容謂咸陽王禧等曰從千容翻我後子孫邂逅不肖不期而會曰邂逅肖似也不似其先曰不肖邂户懈翻逅胡豆翻汝等觀望可輔則輔之不可輔則取之勿為它人有也以禧之驕貪如此孝文以此語之是啟其姦心也景明之禍帝實胎之親任賢能從善如流精勤庶務朝夕不倦常曰人主患不能處心公平推誠于物處昌呂翻能是二者則胡越之人皆可使如兄弟矣用法雖嚴於大臣無所容貸然人有小過常多闊略甞于食中得蟲又左右進羮誤傷帝手皆笑而赦之天地五郊宗廟二分之祭五郊謂迎氣五郊也按鄭康成説古者天子春分朝日秋分夕月故曰二分之祭魏則朝日以朔夕月以朏猶仍古謂之二分之祭未甞不身親其禮毎出廵逰及用兵有司奏脩道路帝輙曰粗脩橋梁通車馬而已勿去草剗令平也粗坐五翻去羌呂翻剗楚限翻在淮南行兵如在境内禁士卒無得踐傷粟稻踐息淺翻或伐民樹以供軍用皆留絹償之宫室非不得已不修衣弊浣濯而服之鞌勒用鐵木而已㓜多力善射能以指彈碎羊骨魏紀云能以指彈辟羊髆骨羊骨唯髆骨頗脆他骨未易彈碎也彈徒丹翻射禽獸無不命中先命其處而後射中之謂之命中射而亦翻及年十五遂不復畋獵復扶又翻下同帝謂内官曰時事不可以不直書人主威福在已無能制之者若史䇿復不書其惡將何所畏忌邪自此以上史言魏孝文徳美彭城王勰與任城王澄謀以陳顯逹去尚未逺恐其覆相掩逼覆反也恐凶問外露陳顯逹知之反兵追掩以相逼乃秘不發䘮徙御卧輿唯二王與左右數人知之勰出入神色無異奉膳進藥可决外奏一如平日數日至宛城宛於元翻夜進卧輿於郡聽事得加棺歛魏書禮志卧輦餙如乾象輦丹漆駕六馬聽他經翻聽受也中庭曰聽事言受事察訟於是也漢晉皆作聽事六朝以後乃始加广作㕔棺古玩翻歛力贍翻還載卧輿内外莫有知者遣中書舍人張儒奉詔徵太子密以凶問告留守于烈烈處分行留舉止無變史言魏孝文之殂執羈絏守社禝者皆能以常處變不動聲色盖其善用人之效也處昌呂翻分扶問翻太子至魯陽魯陽縣漢晉屬南陽郡魏太和十一年置魯陽鎮十八年改為荆州二十二年罷州置魯陽郡唐汝州魯山縣本魯陽縣也遇梓宮乃𤼵䘮丁巳即位帝諱恪孝文皇帝第二子也大赦彭城王勰跪授遺敕數紙東宫官屬多疑勰有異志密防之而勰推誠盡禮卒無間隙推誠謂推誠於東宮官屬也盡禮謂事嗣君盡禮也卒子恤翻間古莧翻咸陽王禧至魯陽留城外以察其變乆之乃入亦疑勰有異志也謂勰曰汝此行不唯勤勞亦實危險勰曰兄年長識高故知有夷險長知兩翻彥和握蛇騎虎不覺艱難勰字彥和蛇螫虎噬握之騎之罕有能免於螫噬者故以為喻禧曰汝恨吾後至耳勰等以高祖遺詔賜馮后死北海王詳使長秋卿白整入授后藥長秋卿皇后宮卿也即漢之大長秋后走呼不肯飲走且呼也呼火故翻曰官豈有此是諸王軰殺我耳整執持彊之乃飲藥而卒彊其兩翻而考異曰元嵩傳曰將遣使者賜馮后死難其人顧任城王澄曰任城不負我嵩亦當不負任城可使嵩也乃引高平侯嵩入内親詔遣之高祖紀曰詔司徒勰徵太子與䘮會魯陽踐祚按馮后傳梓宫至魯陽乃行遺詔賜后死安有高祖遣嵩之事又勰傳高祖崩勰遏秘䘮事遣張儒徵世宗亦無高祖詔勰徵太子事䘮至洛城南咸陽王禧等知后審死相視曰設無遺詔我兄弟亦當决策去之豈可令失行婦人宰制天下殺我軰也去羌呂翻行下孟翻謚曰幽皇后謚法壅遏不通曰幽五月癸亥加撫軍大將軍始安王遥光開府儀同三司丙申魏𦵏孝文帝于長陵長陵在瀍西廟號高祖魏世宗欲以彭城王勰為相勰屢陳遺㫖請遂素懐帝對之悲慟勰懇請不已乃以勰為使持節侍中都督冀定等七州軍事驃騎大將軍開府儀同三司定州刺史使疏吏翻驃匹妙翻騎竒寄翻七州冀定相瀛幽平營也勰猶固辭帝不許乃之官魏任城王澄以王肅羈旅位加已上王肅本江南人而奔魏故以為羇旅肅為尚書令而澄為右僕射故以為位加已上意頗不平會齊人降者嚴叔懋告肅謀逃還江南降户江翻澄輙禁止肅禁止不令入宫省表稱謀叛案騐無實咸陽王禧等奏澄擅禁宰輔免官還第尋出為雍州刺史任城王澄之才畧魏宗室中之巨擘也太和之間朝廷有大議澄每出辭氣加萬乗而軼其上孝文外雖容之内實憚之况咸陽王禧等乎因王肅而斥逐之耳主少國疑之時澄之能全其身者幸也雍於用翻六月戊辰魏追尊皇妣高氏為文昭皇后高氏卒見上卷明帝建武四年配饗高祖增修舊冢號終寧陵據后𫝊陵在長陵東南追賜后父颺爵勃海公謚曰敬颺余章翻以其嫡孫猛襲爵封后兄肇為平原公肇弟顯為澄城公澄城漢馮翊之徴縣左傳之北徴也魏真君七年置澄城郡三人同日受封魏主素未識諸舅始賜衣幘引見見賢遍翻皆惶懼失措數日之間富貴赫奕赫明也奕盛也為高肇以擅權致禍張本秋八月戊申魏用高祖遺詔三夫人以下皆遣還家魏高祖始定内官左右昭儀位視大司馬三夫人位視三公帝自在東宮不好學好呼到翻唯嬉逰無度性重澀少言澀色入聲及即位不與朝士相接朝直遥翻下同專親信宦官及左右御刀應敕等御刀捉御刀在左右者應敕在左右祗應敕命者應於證翻是時揚州刺史始安王遥光尚書令徐孝嗣右僕射江袥袥音石右將軍蕭坦之侍中江祀衛尉劉暄更直内省分日帖敕内省在禁中以别華林省及下省帖敕者於敕後聫紙書行所謂畫敕也更工衡翻雍州刺史蕭衍聞之謂從舅録事參軍范陽張𢎞䇿曰張𢎞䇿范陽方城人衍母張氏𢎞䇿之從父弟雍於用翻從才用翻一國三公猶不堪左傳晉士蒍曰狐裘蒙茸一國三公吾誰適從况六貴同朝勢必相圖亂將作矣避禍圖福無如此州但諸弟在都恐罹世患當更與益州圖之耳衍兄懿時為益州刺史乃密與𢎞䇿脩武偹它人皆不得預謀招聚驍勇以萬數多伐材竹沈之檀溪水經注檀溪水出襄陽縣西栁子山下溪去城里餘北流注于沔即劉僃乗的盧墮處也驍堅堯翻沈直禁翻又持林翻積茅如岡阜大脊曰岡大陵曰阜皆不之用中兵參軍東平呂僧珍覺其意亦私具櫓數百張先是僧珍為羽林監羽林監漢官監羽林兵先悉薦翻徐孝嗣欲引置其府僧珍知孝嗣不能乆固求從衍是時衍兄懿罷益州刺史還仍行郢州事衍使𢎞䇿説懿曰説輸芮翻下又自説同今六貴比肩人自畫敕爭權睚眦理相圖滅圖謀也謀相滅也或曰圖當作屠睚五懈翻眦士懈翻主上自東宮素無令譽媟近左右慓輕忍虐媟私列翻近其靳翻慓匹妙翻急疾也輕區竟翻安肯委政諸公虛坐主諾言必不肯付朝政以聽於六貴但擁虛位有可無否惟主作諾而已嫌忌積乆必大行誅戮始安欲為趙王倫形迹已見趙王倫事見八十四卷晉恵帝永寧元年見賢遍翻然性猜量狹徒為禍階蕭坦之忌克陵人徐孝嗣聽人穿鼻言如牛然聽人穿鼻而受制於人江祏無斷斷丁管翻劉暄闇弱一朝禍𤼵中外土崩吾兄弟幸守外藩宜為身計及今猜防未生當悉召諸弟恐異時㧞足無路矣後卒如衍所料史言朝政不綱則姦雄生心郢州控帶荆湘郢州當荆湘下流二州之所赴集也雍州士馬精彊世治則竭誠本朝治直吏翻朝直遥翻世亂則足以匡濟與時進退此萬全之䇿也若不早圖後悔無及𢎞䇿又自説懿曰以卿兄弟英武天下無敵據郢雍二州為百姓請命廢昏立明易於反掌為于偽翻易以豉翻此桓文之業也勿為豎子所欺取笑身後雍州揣之已熟揣初委翻願善圖之懿不從衍乃迎其弟驃騎外兵參軍偉及西中郎外兵參軍憺至襄陽憺徙濫翻初高宗雖顧命羣公而多寄腹心在江祏兄弟顧命見上卷上年江祏江祀兄弟高宗母景皇后之姪也故寄以腹心二江更直殿内更工衡翻更迭也動止闗之帝稍欲行意徐孝嗣不能奪蕭坦之時有異同而祏執制堅確帝深忿之帝左右會稽茹法珍吳興梅蟲兒等為帝所委任會工外翻茹音如祏常裁折之法珍等切齒徐孝嗣謂祏曰主上稍有異同詎可盡相乖反立異為乖不順指為反祏曰但以見付必無所憂帝失徳寖彰祏議廢帝立江夏王寶𤣥夏户雅翻劉暄嘗為寶𤣥郢州行事執事過刻有人獻馬寶𤣥欲觀之暄曰馬何用觀妃索煮肫肫之春翻鳥藏曰肫又徒渾翻豕也帳下諮暄暄曰旦已煮鵝不煩復此復扶又翻又也寶𤣥恚曰舅殊無渭陽情詩渭陽序曰秦康公之母晉獻公之女文公遭驪姬之難未反而秦姬卒穆公納文公康公時為太子贈送文公於渭之陽念母之不見也我見舅氏如母存焉劉暄明帝劉皇后之弟故寳𤣥呼之為舅今按詩小序渭陽之事乃甥用情於舅後世率以舅不能用情於甥者為無渭陽情誤矣恚於避翻暄由是忌寶𤣥不同祏議更欲立建安王寶寅祏密謀于始安王遥光遥光自以年長欲自取以微㫖動祏祏弟祀亦以少主難保長知兩翻少詩照翻下同勸祏立遥光祏意回惑以問蕭坦之坦之時居母䘮起復為領軍將軍起復者起之於苫塊之中使復其位也謂祏曰明帝立已非次天下至今不服若復為此復扶又翻下可復復能不復生復同恐四方瓦解我期不敢言耳遂還宅行䘮蕭坦之冐于榮勢豈能終䘮者直以廢立大事不欲預其禍託此以引避耳祏祀密謂吏部郎謝朓曰江夏王少脱不堪負荷朓土了翻荷下可翻又如字豈可復行廢立始安年長入纂不乖物望非以此要富貴要讀如邀政是求安國家耳政與正同遥光又遣所親丹楊丞南陽劉渢密致意於朓渢房戎翻欲引以為黨朓不荅頃之遥光以脁兼知衛尉事脁懼以郎兼卿事本無足懼其所懼者以己為遥光所引用將罹其難也即以祏謀告太子右衛率左興盛率所律翻興盛不敢發朓又説劉暄曰始安一旦南面則劉渢劉晏居卿今地但以卿為反覆人耳晏者遥光城局參軍也暄陽驚馳告遥光及祏遥光欲出脁為東陽郡脁常輕祏謝朓以人門輕江祏祏固請除之遥光乃收朓付廷尉與孝嗣祏暄等連名啟朓扇動内外妄貶乗輿竊論宫禁間謗親賢乗繩證翻間古苑翻輕議朝宰朓遂死獄中謝朓以告王敬則超擢而死於遥光之手行險以徼幸一之謂甚其可再乎朝直遥翻暄以遥光若立己失元舅之尊不肯同祏議故祏遲疑乆不决遥光大怒遣左右黄曇慶刺暄於青溪橋曇徒含翻刺七亦翻曇慶見暄部伍多不敢𤼵暄覺之遂𤼵祏謀帝命收祏兄弟時祀直内殿疑有異遣信報祏曰劉暄似有異謀今作何計祏曰政當靜以鎮之俄有詔召祏入見停中書省見賢遍翻初袁文曠以斬王敬則功當封斬敬則見上卷明帝永泰元年祏執不與時崔恭祖以刺仆敬則與文曠爭功祏執不與當為此也帝使文曠取祏取謂殺之也文曠以刀環築其心曰復能奪我封不不讀曰否并弟祀皆死劉暄聞祏等死眠中大驚投出户外問左右收至未良乆意定還坐大悲曰不念江行自痛也暄自知禍將及己帝自是無所忌憚益得自恣日夜與近習於後堂鼓呌戲馬常以五更就寢至晡乃起羣臣節朔朝見朔謂每月朔旦朔旦朝參之外一月之内又自有朝參日分因謂之節晡後方前或際闇遣出晡後造朝帝復不出故際闇而遣退臺閣案奏閲數十日乃報或不知所在宦者以裹魚肉還家並是五省黄案魏晉以來有六曹尚書江左有吏部祠部五兵左民度支五尚書各為一省謂之尚書五省案文案也藏之以為案據尚書用黄札故曰黄案帝常習騎致適致極也適歡適也顧謂左右曰江祏常禁吾乗馬小子若在吾豈能得此因問祏親戚餘誰對曰江祥今在冶帝誅祏兄弟獨祥免死配東冶帝於馬上作敕賜祥死始安王遥光素有異志與其弟荆州刺史遥欣密謀舉兵據東府使遥欣引兵自江陵急下刻期將發而遥欣病卒江祏被誅被皮義翻帝召遥光入殿告以祏罪遥光懼懼禍及也還省省謂中書省也遥光時為中書令即陽狂號哭遂稱疾不復入臺還東府遂稱疾不復入臺城號户高翻先是遥光弟豫州刺史遥昌卒先悉薦翻卒子恤翻其部曲皆歸遥光及遥欣䘮還停東府前渚荆州衆力送者甚盛前渚秦淮渚也東府前臨秦淮帝既誅二江慮遥光不自安欲遷為司徒使還第遷司徒以崇其位望而使還第飬疾召入諭㫖遥光恐見殺乙卯晡時收集二州部曲於東府東門二州部曲自荆州豫州來者召劉渢劉晏等謀舉兵以討劉暄為名夜遣數百人破東冶出囚於尚方取仗仗兵仗也又召驍騎將軍垣歷生驍堅堯翻歷生隨信而至蕭坦之宅在東府城東遥光遣人掩取之坦之露袒踰墻走露者露髻袒者肉袒向臺向臺而走欲入言其事道逢遊邏主顏端遊邏主將兵在臺城外廵邏者也邏郎佐翻執之見坦之露袒挺身走疑其得罪逃竄故執之告以遥光反不信自徃詗問知實詗火逈翻又翾正翻有所候伺謂之詗乃以馬與坦之相隨入臺遥光又掩取尚書左僕射沈文季於其宅欲以為都督會文季已入臺垣歷生説遥光帥城内兵夜攻臺輦荻燒城門荻亭歷翻萑也説輸芮翻帥讀曰率下同曰公但乗轝隨後轝與輿同反掌可克遥光狐疑不敢出天稍曉遥光戎服出聽事命上仗登城行賞賜上時掌翻歷生復勸出軍遥光不肯冀臺中自有變及日出臺軍稍至臺中始聞亂衆情惶惑向曉有詔召徐孝嗣孝嗣入人心乃安左將軍沈約聞變據梁書沈約傳約時為左衛將軍此逸衛字馳入西掖門掖音亦或勸戎服約曰臺中方擾攘見我戎服或者謂同遥光乃朱衣而入丙辰詔曲赦建康中外戒嚴徐孝嗣以下屯衛宫城蕭坦之帥臺軍討遥光孝嗣内自疑懼與沈文季戎服共坐南掖門上欲與之共論世事文季輙引以他辭終不得及蕭坦之屯湘宫寺湘宫寺宋明帝所起左興盛屯東籬門臺城外城六門皆設籬門而已無郛郭東府在臺城東故命興盛屯東籬門以討遥光鎮軍司馬曹虎屯青溪大橋按曹虎傳大橋青溪中橋也衆軍圍東城三面燒司徒府宋元嘉中彭城王義康為司徒徙居東府於東府之側起司徒府遥光遣垣歷生從西門出戰臺軍屢敗殺軍主桑天愛遥光之起兵也問諮議參軍蕭暢暢正色不從戊午暢與撫軍長史沈昭略潜自南門出詣臺自歸衆情大沮東府之衆情也沮在呂翻暢衍之弟昭略文季之兄子也己未垣歷生從南門出戰因棄矟降曹虎虎命斬之矟色角翻降户江翻以考異曰歷生出戰為曹虎所禽謂虎曰卿主上為聖明梅茹為賢相我當死且我今死卿明日亦死遂殺之按歷生若見獲遥光不當殺其子今從齊書遥光大怒於牀上自踊使殺歷生子其晩臺軍以火箭燒東北角樓至夜城潰遥光還小齋帳中著衣帢坐秉燭自照令人反拒齋閤皆重闗著陟略翻帢苦洽翻重直龍翻左右並踰屋散出臺軍主劉國寶等先入遥光聞外兵至滅燭扶匐牀下扶音蒲匐蒲北翻軍人排閤入於闇中牽出斬之臺軍入城焚燒室屋且盡劉渢走還家為人所殺荆州將潘紹聞遥光作亂謀欲應之欲以江陵應之也將即亮翻西中郎司馬夏侯詳時南康王寶融以西中郎將鎮江陵以夏侯詳為司馬夏户雅翻呼紹議事因斬之州府以安州荆州府西中郎府也己巳以徐孝嗣為司空加沈文季鎮軍將軍侍中僕射如故沈文季加鎮軍將軍號本職如故蕭坦之為尚書右僕射丹楊尹右將軍如故帝即位之初坦之為右將軍遥光既平使為右僕射丹楊尹而右將軍軍號如故劉暄為領軍將軍曹虎為散騎常侍右衛將軍散悉亶翻騎奇寄翻皆賞平始安之功也魏南徐州刺史沈陵来降魏高祖置南徐州於宿豫降户江翻陵文季之族子也沈文秀為宋守東陽明帝泰始五年没於魏文秀文季羣從也陵之入魏當在是時時魏徐州刺史京兆王愉年少少詩照翻府事皆决於長史盧淵淵知陵將叛敕諸城潜為之僃敕戒也屢以聞於魏朝魏朝不聽陵遂殺將佐帥宿豫之衆来奔朝直遥翻將即亮翻帥讀曰率濵淮諸戍以有僃得全陵在邉歷年隂結邉州豪傑陵既叛郡縣多捕送陵黨淵皆撫而赦之唯歸罪於陵衆心乃安根連株逮則沿邊豪傑懼罪必相帥南奔故悉赦之以安反側閠月丙子立江陵公寶覽為始安王奉靖王後遥光既誅靖王無後故也始安貞王道生長子鳳卒于宋世明帝建武元年贈始安靖王遥光靖王子也以沈陵為北徐州刺史齊南徐州治京口北徐州治鍾離今沈陵自魏南徐州來降因其位任改曰北徐江祏等既敗帝左右捉刀應敕之徒皆恣横用事横户孟翻時人謂之刀敕蕭坦之剛狠而專嬖倖畏而憎之遥光死二十餘日帝遣延明主帥黄文濟將兵圍坦之宅殺之延明主帥蓋延明殿主帥也狠户懇翻嬖卑義翻又博計翻帥所類翻將即亮翻下同并其子袐書郎賞坦之從兄翼宗為海陵太守沈約志晉安帝分廣陵立海陵郡今泰州即其地從才用翻守式又翻未𤼵受海陵之命而未行也坦之謂文濟曰從兄海陵宅故應無它無它言無它變猶今人言無事也文濟曰海陵宅在何處坦之以告文濟白帝帝仍遣收之檢其家至貧唯有質錢帖數百質錢帖者以物質錢錢主給帖與之以為照騐他日出子本錢收贖還以啟帝原其死繫尚方茹法珍等譛劉暄有異志茹音如帝曰暄是我舅豈應有此直閣新蔡徐世標曰明帝乃武帝同堂明帝高帝兄子於武帝同堂兄弟也恩遇如此猶滅武帝之後恩遇事見一百三十八卷武帝永明十一年滅武帝後見明帝紀舅焉可信邪焉於虔翻何也遂殺之曹虎善於誘納日食荒客常數百人誘音酉食讀曰飤荒客自蠻中及化外來者晩節吝嗇罷雍州有錢五千萬它物稱是雍於用翻稱尺證翻帝疑虎舊將且利其財遂殺之坦之暄虎所新除官坦之虎新除官見上皆未及拜而死初高宗殂以隆昌事戒帝曰作事不可在人後謂欎林王欲殺高宗持疑不𤼵以及禍高宗以是而戒帝自謂密矣而非所以貽謀燕翼子也故帝數與近習謀誅大臣數所角翻皆𤼵於倉猝决意無疑於是大臣人人莫能自保史言帝昏暴果於誅殺上下揺心九月丁未以豫州刺史裴叔業為南兖州刺史征虜長史張冲為豫州刺史壬戌以頻誅大臣大赦丙戌魏主謁長陵欲引白衣左右吳人茹皓同車雖引在左右未命以官故曰白衣左右茹音如皓奮衣將登給事黄門侍郎元匡進諫帝推之使下推吐雷翻皓失色而退匡新城之子也陽平王新城魏高祖之弟益州刺史劉季連聞帝失徳遂自驕恣用刑嚴酷蜀人怨之是月遣兵襲中水不克沈約宋書資江為中水涪江為内水今謂之中江在資州資陽縣西資州漢犍為郡之資中縣地於是蜀人趙續伯等皆起兵作亂季連不能制枝江文忠公徐孝嗣以文士不顯同異言依違取容於昏暴之朝故名位雖重猶得乆存虎賁中郎將許凖為孝嗣陳説事機賁音奔將即亮翻為于偽翻勸行廢立孝嗣持疑乆之謂必無用干戈之理須帝出遊須待也閉城門召百官集議廢之雖有此懐終不能决諸嬖倖亦稍憎之西豐忠憲侯沈文季自託老病不預朝權嬖卑義翻又博計翻朝直遥翻侍中沈昭略謂文季曰叔父行年六十為貟外僕射文季雖為僕射而不預事故昭略謂之貟外僕射欲求自免豈可得乎文季笑而不應冬十月乙未帝召孝嗣文季昭略入華林省文季登車顧曰此行恐徃而不反帝使外監茹法珍賜以藥酒昭略怒罵孝嗣曰廢昏立明古今令典宰相無才致有今日以甌擲其面甌小器也所以盛酒曰使作破面鬼孝嗣飲藥酒至斗餘乃卒卒子恤翻孝嗣子演尚武康公主况尚山隂公主武康公主武帝女山隂公主明帝女皆坐誅昭略弟昭光聞收至家人勸之逃昭光不忍捨其母入執母手悲泣收者殺之昭光兄子曇亮逃已得免聞昭光死嘆曰家門屠滅何以生為絶吭而死曇徒含翻吭户郎翻又户浪翻沈慶之沈文季皆託老疾不預朝權而終不免於死國無道而富貴則進退皆䧟危機也初太尉陳顯逹自以高武舊將將即亮翻下同當高宗之世内懐危懼深自貶損常乗朽弊車道從鹵簿止用羸小者十數人道讀曰導從才用翻羸倫為翻嘗侍宴酒酣啟高宗借枕高宗令與之顯逹撫枕曰臣年衰老富貴已足唯欠枕枕死酣户江翻枕枕上如字下之任翻特就陛下乞之高宗失色曰公醉矣顯逹以年禮告退禮大夫七十而致事時顯逹年已七十矣高宗不許及王敬則反時顯逹將兵拒魏事見上卷高宗永泰元年始安王遥光疑之啟高宗欲追軍還會敬則平乃止及帝即位顯逹彌不樂在建康得江州甚喜樂音洛顯逹自馬圏敗還除江州刺史嘗有疾不令治既而自愈意甚不悦蓋求死不得死以至於反也悲夫治直之翻聞帝屢誅大臣傳云當遣兵襲江州十一月丙辰顯逹舉兵於尋陽令長史庾𢎞逺等與朝貴書數帝罪惡朝直遥翻數所具翻云欲奉建安王為主帝弟寶寅封建安王時為郢州刺史須京塵一靜西迎大駕郢州治夏口在尋陽西乙丑以護軍將軍崔慧景為平南將軍督衆軍擊顯逹後軍將軍胡松驍騎將軍李叔獻帥水軍據梁山驍堅堯翻騎奇寄翻帥讀曰率下同左衛將軍左興盛督前鋒軍屯杜姥宅姥莫補翻十二月癸未以前輔國將軍楊集始為秦州刺史楊集始請降見上卷明帝建武四年陳顯逹發尋陽敗胡松於采石采石山在今太平州當塗縣北八十里山下有采石磯敗補邁翻建康震恐甲申軍于新林左興盛帥諸軍拒之顯逹多置屯火於岸側潜軍夜渡襲宫城乙酉顯逹以數千人登落星岡石頭城西有横壠謂之落星岡新亭諸軍聞之奔還宫城大駭閉門設守守舒救翻顯逹執馬矟從歩兵數百於西州前與臺軍戰再合顯逹大勝手殺數人矟折矟色角翻折而設翻臺軍繼至顯逹不能抗走至西州後據蕭子顯齊書顯逹走至西州後烏榜村騎官趙潭注刺顯逹墜馬斬之顯逹傳云潭注矟刺顯逹落馬蓋盡力注矟而刺之也騎官蓋在馬隊主副之下猶今傔官也騎奇寄翻刺七亦翻諸子皆伏誅長史庾𢎞遠炳之之子也庾炳之柄用於宋元嘉之季斬於朱雀航將刑索帽著之曰子路結纓索山客翻著陟略翻左傳衛矦輙既立其父蒯聵入爭國刼衛卿孔悝與之登臺子路曰太子無勇若燔臺半必舍孔叔太子懼下石乞孟黶以敵子路以戈擊之斷纓子路曰君子死冠不免結纓而死吾不可以不冠而死謂觀者曰吾非賊乃是義兵為諸軍請命耳為于偽翻軍當作君陳公太輕事若用吾言天下將免塗炭𢎞逺子子曜抱父乞代命并殺之帝既誅顯逹益自驕恣漸出遊走又不欲人見之每出先驅斥所過人家唯置空宅所謂屏除也尉司擊鼓蹋圍晉初洛陽置六部尉江左建康亦置六部尉鼓聲所聞聞音問便應奔走不暇衣履犯禁者應手格殺格擊也一月凡二十餘出出輙不言定所東西南北無處不驅常以三四更中更工衡翻鼓聲四出火光照天幡㦸横路士民喧走相隨老小震驚啼號塞路處處禁斷號户高翻塞悉則翻斷音短不知所過言雖奔走而路斷不知何所可過四民廢業樵蘇路斷吉凶失時吉謂冠婚凶謂䘮𦵏皆不得以時而行事乳母寄産乳儒遇翻育也或輿病棄尸不得殯𦵏巷陌懸幔為高鄣置仗人防守謂之屏除幔莫半翻仗人謂執仗之人屏必郢翻亦謂之長圍嘗至沈公城有一婦人臨産不去因剖腹觀其男女又嘗至定林寺定林寺舊基在蔣山應潮井後有沙門老病不能去藏革間命左右射之百箭俱𤼵射七亦翻帝有膂力牽弓至三斛五斗又好擔幢白虎幢高七丈五尺於齒上擔之折齒不倦好呼到翻擔都甘翻幢傅江翻旛也高居號翻自制擔幢校具校具猶言器械也伎衣飾以金玉伎渠綺翻侍衛滿側逞諸變態曾無愧色學乗馬於東冶營兵俞靈韻常著織成袴褶金薄㡌著則略翻褶音習執七寶矟急裝縛袴凌冒雨雪不避阬穽馳騁渴乏輙下馬觧取腰邊蠡器酌水飲之冐莫北翻又如字穽疾正翻騁丑郢翻蠡憐題翻瓠瓢也今謂之馬杓爾雅翼曰蠃古字通於蠡蠃之為量小傳曰以蠡測海言不能極其量也復上馬馳去復扶又翻上時掌翻又選無賴小人善走者為逐馬左右五百人常以自隨或於市側過親幸家環回宛轉周徧城邑或出郊射雉置射雉場二百九十六處奔走徃來略不暇息史言帝之昏狂甚于宋欎林王射而亦翻王肅為魏制官品百司皆如江南之制凡九品品各有二九品毎品各有正從二品歷隋唐至今猶然侍中郭祚兼吏部尚書祚清謹重惜官位毎有銓授雖得其人必徘徊乆之然後下筆曰此人便已貴矣人以是多怨之然所用者無不稱職稱尺證翻資治通鑑卷一百四十二
