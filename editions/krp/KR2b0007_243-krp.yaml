  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷二百四十三宋司馬光撰胡三省音注唐紀五十九起昭陽單閼盡著雍涒灘凡六年穆宗睿聖文惠孝皇帝下長慶三年春正月癸未賜兩軍中尉以下錢二月辛卯賜統軍軍使等綿綵銀器各有差綿當作錦户部侍郎牛僧孺素為上所厚初韓𢎞之子右驍衞將軍公武為其父謀以財結中外為其于偽翻及公武卒𢎞繼薨稺孫紹宗嗣主藏奴與吏訟於御史府藏徂浪翻上憐之盡取𢎞財簿自閱視凡中外主權主權謂中外官之有事權者多納𢎞貨獨朱句細字曰某年月日送户部牛侍郎錢千萬不納句古侯翻上大喜以示左右曰果然吾不繆知人繆靡㓜翻三月壬戌以僧孺為中書侍郎同平章事時僧孺與李德裕皆有入相之望德裕出為浙西觀察使八年不遷至文宗太和三年用裴度薦始徴李德裕於浙西又為李宗閔所排出帥滑以為李逢吉排已引僧孺為相由是牛李之怨愈深吉考異曰舊德裕傳曰初李逢自襄陽入朝乃密賂纎人構成于方獄六月元稹裴度俱罷逢吉代裴度為相既得權位銳意報怨時德裕與僧孺俱有相望逢吉欲引僧孺懼紳與德裕禁中沮之九月出德裕浙西尋引僧孺同平章事繇是交怨愈深蓋德裕以此疑怨逢吉未必皆出逢吉之意也夏四月甲午安南奏陸州獠攻掠州縣武德元年以寜越郡之安海玉山置玉山州貞觀元年州廢屬欽州髙宗上元二年復置陸州東至廉州界三百里丙申賜宣徽院供奉官錢紫衣者百二十緡下至承㫖各有差唐中世以後置宣徽院以宦者主之其大朝賀及聖節上夀則宣徽使宣答徐度却埽編曰宣徽使本唐宦者之官故其所掌皆𤨏細之事本朝更用士人品秩亞二府有南北院南院比北院資望尤優然其職猶多因唐之舊賜羣臣新火及諸司使至崇班内侍供奉諸司工匠兵卒名藉及三班以下遷補假故鞠劾春秋及聖節大宴節度迎授恩命上元張燈四時祠祭契丹朝貢内庭學士赴上督其供帳内外進奉名物教坊伶人歳給衣帶郊御殿朝謁聖容賜酺國忌諸司使下别藉分産諸司工匠休假之類今觀穆宗所賜則宣徽院官員數多矣初翼城人鄭注眇小目下視而巧譎傾謟善揣人意翼城縣屬絳州本漢絳縣地隋改翼城縣因縣古翼城為名揣初委翻以醫遊四方羇貧甚甞以藥術干徐州牙將牙將恱之薦於節度使李愬愬餌其藥頗驗遂有寵署為牙推牙推在節度推官之下浸預軍政妄作威福軍府患之監軍王守澄以衆情白愬請去之去羗呂翻下同愬曰注雖如是然竒才也將軍試與之語時中官多加諸衞將軍謂之内將軍茍無可取去之未晩乃使注往謁守澄守澄初有難色不得已見之坐語未乆守澄大喜延之中堂促膝笑語恨相見之晩明日謂愬曰鄭生誠如公言自是又有寵於守澄權勢益張張知亮翻愬署為廵官列於賓席注既用事恐牙將薦己者泄其本末密以他罪譛之於愬愬殺之及守澄入知樞密挈注以西為立居宅贍給之為于偽翻遂薦於上上亦厚遇之自上有疾去年冬十一月上有疾事見上卷守澄專制國事勢傾中外注日夜出入其家與之謀議語必通夕關通賂遺遺唯季翻人莫能窺其迹始則有微賤巧宦之士或因以求進數年之後逹官車馬滿其門矣為鄭注與李訓誅王守澄及甘露之禍張本工部尚書鄭權家多姬妾祿薄不能贍因注通於守澄以求節鎭己酉以權為嶺南節度使五月壬申以尚書左丞栁公綽為山南東道節度使公綽過鄧縣唐襄州之鄧城縣漢南陽之鄧縣也治古樊城隋改為安養縣天寳元年改為臨漢縣貞元二十一年移縣古鄧城乃改為鄧城縣九域志在州北二十里有二吏一犯贓一舞文衆謂公綽必殺犯贓者公綽判曰贓吏犯法法在姦吏亂法法亡竟誅舞文者人考異曰栁氏叙訓曰公為襄陽節度使有名馬争畵為圖圉人潔其蹄尾被蹴致斃命斬于鞠場賔吏請曰圉人備之不至良馬可惜公曰有良馬之貎含駑馬之性必殺之有齊衰者哭且獻狀曰遷三世十二喪于武昌為津吏所遏不得出公覽狀召軍侯擒之破其十二柩皆實以稻米時歲儉鄰境尤甚人以為神明之政按韓愈與公綽書曰殺所乘馬以祭踶死之士乃在鄂岳時事叙訓舊傳皆誤也察齊衰者乃是閉糶非美事今不取丙子以晉慈二州為保義軍以觀察使李寰為節度使六月己丑以吏部侍郎韓愈為京兆尹六軍不敢犯法私相謂曰是尚欲燒佛骨事見二百四十卷憲宗元和十四年何可犯也秋七月癸亥嶺南奏黄洞蠻寇邕州破左江鎭邕州宣化縣有左江右江二鎭左江出七源州界至合江鎭與右江水合為一水流入横州號鬱水右江源出峩利州界與雲南大槃水通左江道屬太平永平寨右江道屬横山寨各管羈縻州丙寅邕州奏黄洞蠻破欽州千金鎭刺史楊嶼奔石南砦千金鎭當在欽州西南嶼徐與翻砦與寨同音豺夬翻南詔勸利卒國人請立其弟豐祐國考異曰實錄九月辛酉南詔王立佺進其信歲末又云南詔請立䝉勸利之弟豐祐云立佺者蓋誤也今從新傳豐祐勇敢善用其衆始慕中國不與父連名南詔父子連名其先細奴邏生邏盛炎邏盛炎生炎閤炎閤死而立其弟盛邏皮盛邏皮生皮邏閤皮邏閤生閤邏鳳閤邏鳳生鳳迦異鳳迦異生異牟尋異牟尋生尋閤勸尋閤勸生勸龍晟勸利皆連名也為南詔彊盛寇邉張本八月癸巳邕管奏破黄洞蠻丙申上自複道幸興慶宫至通化門樓雍錄開元二十年築夾城通芙蓉園自大明宫夾東羅城複道由通化安興門次經春明門延喜門又可以逹曲江芙蓉園而外人不知也按複道自大明宫至通化門便可入興慶宫若經春明延興延喜門則至芙蓉園矣投絹二百匹施山僧施式䜴翻上之濫賜皆此類不可悉紀癸夘以左僕射裴度為司空山南西道節度使不兼平章事李逢吉惡度惡烏路翻右補闕張又新等附逢吉競流謗毁傷度竟出之又新薦之子也張薦事德宗屢使吐蕃囘鶻九月丙辰加昭義節度使劉悟同平章事李逢吉為相内結知樞密王守澄勢傾朝野仲考異曰李讓夷敬宗實錄曰逢吉用族子言之謀因鄭注與守澄潛結上於東宫且言逢吉實立殿下上深德之又曰張又新李續之皆逢吉藩僚時又新為右補闕續之為度支員外郎劉昫承之為逢吉傳亦言逢吉令仲言賂注求結於守澄仲言辯譎多端守澄見之甚恱自是逢吉有助事無違者其李訓傳則云訓自流所還丁母憂居洛中時逢吉為留守思復為相乃使訓因鄭注結王守澄然則逢吉結守澄乃在文宗時非穆宗時也二傳自相違逢吉結守澄要為不誣然未必因鄭注李讓夷乃李德裕之黨惡逢吉欲重其罪使與李訓鄭注皆有連結之迹故云用訓謀因注以交守澄耳又張又新李續之為逢吉藩僚乃在逢吉再鎭襄陽後於此時未也今不取惟翰林學士李紳每承顧問常排抑之擬狀至内庭紳多所臧否擬狀謂進狀所擬除目也翰林學士院在内庭蓋李逢吉所進擬者穆宗訪其可否於李紳故得言之否音鄙逢吉患之而上待遇方厚不能逺也逺于願翻㑹御史中丞缺逢吉薦紳清直宜居風憲之地上以中丞亦次對官程大昌曰德宗貞元七年詔毎御延英令諸司長官二人奏本司事俄又令常叅官必日引見二人訪以政事謂之廵對則是待制之外又别有廵對也蓋正謂待制者諸司長官也名為廵對者未為長官而在常㕘之數亦得更迭引對者也其曰次對官者即廵對官許亞次待制而俟對者也則次對不得正為待制矣今人作文凡言待制皆以次對名之則恐未審也然稱謂既熟雖唐人亦自不辯開成中勑今後遇入閣日次對官未要隨班出並於東階松木下立待宰臣奏事退令齊至香案前各奏本司公事左右史待次對官奏事訖同出案此所言甞以諸司之長官待制者名為次對官矣若究其制實誤以待制為次對官也余按唐中世以後宰相對延英既退則待制官廵對官皆得引對摠可謂之次對官所謂次對官者謂次宰相之後而得對也非次待制官而入對也唐人本不誤程泰之自誤耳据宋白所紀貞元七年十一月勑則次對官者以常㕘官依次對為稱詳己見前註不疑而可之㑹紳與京兆尹御史大夫韓愈争臺㕘及他職事文移往來辭語不遜故事京兆新除皆詣臺㕘逢吉欲激二人使争以愈兼御史大夫免臺㕘而紳愈果争不遜謂不相遜也逢吉奏二人不協冬十月丙戌以愈為兵部侍郎紳為江西觀察使己丑以中書侍郎同平章事杜元頴同平章事充西川節度使為杜元頴以刻削致寇張本辛夘安南奏黄洞蠻為寇韓愈李紳入謝上各令自叙其事乃深寤壬辰復以愈為吏部侍郎紳為户部侍郎頗考異曰穆宗實錄曰紳性險果交結權倖自以望輕忌朝廷有名之士及居近署封植已類以樹黨援進修之士懼為傷毒疾之常指鈞衡欲逞其私志時宰病之因以人情上論諫官厯獻䟽方有江西之命行有日矣因延英對辭又泣請留侍故有是拜人情憂駭此蓋修穆宗實錄者惡紳故毁之如是今從敬宗實錄四年春正月辛亥朔上始御含元殿朝㑹上即位四年矣是歲元正方御東内正牙人朝㑹初栁泌等既誅見二百四十一卷元和十五年方士稍復因左右以進復扶又翻上餌其金石之藥有處士張臯者上䟽以為神慮澹則血氣和嗜欲勝則疾疹作澹徒覽翻疹丑刃翻藥以攻疾無疾不可餌也昔孫思邈有言孫思邈唐之名醫藥勢有所偏助令人藏氣不平藏徂浪翻藏氣五藏之氣也借使有疾用藥猶須重愼庶人尚爾况於天子先帝信方士妄言餌藥致疾此陛下所詳知也豈得復循其覆轍乎復扶又翻下同今朝野之人紛紜竊議但畏忤㫖莫敢進言臣生長蓬艾長知丈翻麋鹿與遊無所邀求但粗知忠義欲裨萬一耳上甚善其言使求之不獲丁夘嶺南奏黄洞蠻寇欽州殺將吏舊制欽州至京師五千二百五十一里庚午上疾復作壬申大漸命太子監國宦官欲請郭太后臨朝稱制太后曰昔武后稱制㡬危社稷事見武后紀㡬居依翻我家世守忠義非武氏之比也太子雖少少詩照翻但得賢宰相輔之卿輩勿預朝政何患國家不安自古豈有女子為天下主而能致唐虞之理乎取制書手裂之太后兄太常卿釗聞有是議密上牋曰若果徇其請臣請先帥諸子納官爵歸田里帥讀曰率太后泣曰祖考之慶鍾於吾兄是夕上崩于寢殿年三十癸酉以李逢吉攝冢宰丙子敬宗即位于太極東序初穆宗之立神䇿軍士人賜錢五十千事見二百四十一卷元和十五年宰相議以太厚難繼乃下詔稱宿衞之勤誠宜厚賞屬頻年旱歉屬之欲翻御府空虚邉兵尚未給衣霑恤期於均濟神䇿軍士人賜絹十匹錢十千畿内諸鎭又減五千仍出内庫綾二百萬匹付度支充邉軍春衣時人善之李逢吉為相時人之所惡也一事之善則時人善之非是非之公歟度徒洛翻自戊寅至庚辰上賜宦官服色及錦綵金銀甚衆或今日賜綠明日賜緋史言上眤於近習賜予無度初穆宗既留李紳事見上年李逢吉愈忌之紳族子虞頗以文學知名自言不樂仕進樂音洛隠居華陽川華陽川在虢州華陽山南華户化翻及從父耆為左拾遺從才用翻下從子同虞與耆書求薦誤逹於紳紳以書誚之且以語於衆人誚才笑翻語牛倨翻虞深怨之乃詣逢吉悉以紳平日密論逢吉之語告之逢吉益怒使虞與補闕張又新及從子前河陽掌書記仲言等伺求紳短揚之於士大夫間伺相吏翻且言紳潛察士大夫有羣居議論者輒指為朋黨白之於上由是士大夫多忌之及敬宗即位逢吉與其黨快紳失勢又恐上復用之復扶又翻日夜謀議思所以害紳者楚州刺史蘓遇楚州漢射陽縣地晉立山陽郡隋為楚州至京師二千五百一里謂逢吉之黨曰主工初聽政必開延英有次對官惟此可防恐紳因次對言事而上復用之其黨以為然亟白逢吉曰事迫矣若俟聽政悔不可追逢吉乃令王守澄言於上曰陛下所以為儲貳臣備知之皆逢吉之力也如杜元頴李紳輩皆欲立深王深王察後改名悰憲宗之子穆宗之弟也度支員外郎李續之等繼上章言之上時年十六疑未信會逢吉亦有奏言紳不利於上請加貶謫上猶再三覆問然後從之二月癸未貶紳為端州司馬端州隋置取界内端溪為名煬帝初置信安郡武德又為端州天寳改為高安郡乾元復為州舊志至京師四千九百三十五里逢吉仍帥百官表賀帥讀曰率既退百官復詣中書賀復扶又翻下同逢吉方與張又新語門者弗内良乆又新揮汗而出旅揖百官曰端溪之事又新不敢多讓端州謂之端溪衆駭愕辟易憚之辟音闢易音亦右拾遺内供奉吳思獨不賀逢吉怒以思為吐蕃告哀使丙戌貶翰林學士龎嚴為信州刺史蔣防為汀州刺史唐上元元年割饒州之弋陽衢州之玉山建撫二州各三鄉置信州至京師東南三千八百里開元二十六年開福撫二州山洞置汀州至京師六千一百七十三里嚴夀州人與防皆紳所引也給事中于敖素與嚴善封還敕書人為之懼為于偽翻曰于給事為龎蔣直寃犯宰相怒誠所難也及奏下乃言貶之太輕逢吉由是奬之張又新等猶忌紳日上書言貶紳太輕上許為殺之為于偽翻朝臣莫敢言獨翰林侍讀學士韋處厚上䟽太宗選耆儒侍讀以質史籍疑義開元中集賢院置侍讀直學士時翰林有侍讀學士有侍書學士指述紳為逢吉之黨所讒人情歎駭紳蒙先朝奬用借使有罪猶宜容假以成三年無改之孝論語孔子曰三年無改於父之道可謂孝矣况無罪乎於是上稍開寤素考異曰處厚傳曰敬宗即位李逢吉用事惡李紳乃搆成其罪禍將不測處厚乃上䟽云云帝悟其事紳得減死貶端州司馬今從實錄處厚上䟽在紳貶端州後會閱禁中文書有穆宗所封文書一篋𤼵之得裴度杜元頴李紳䟽請立上為太子上乃嗟歎悉焚人所上譖紳書所上時掌翻雖未即召還後有言者不復聽矣己亥尊郭太后為太皇太后乙巳尊上母王妃為皇太后太后越州人也丁未上幸中和殿擊毬自是數遊宴擊毬奏樂數所角翻賞賜宦官樂人不可悉紀三月壬子赦天下諸道常貢之外毋得進奉甲寅上始對宰相於延英殿初牛元翼在襄陽牛元翼出深州鎭襄陽見上卷二年數賂王庭湊以請其家數所角翻庭湊不與聞元翼薨甲子盡殺之上視朝每晏戊辰日絶髙尚未坐百官班於紫宸門外老病者㡬至僵踣僵居良翻踣蒲北翻諫議大夫李渤白宰相曰昨日䟽論坐晩論上坐朝之晩也今晨愈甚請出閤待罪於金吾仗金吾左右仗在宣政殿前既坐班退左拾遺劉栖楚獨留進言曰憲宗及先帝皆長君四方猶多叛亂陛下富於春秋嗣位之初當宵衣求理而嗜寢樂色宵衣未明而衣也理治也樂魚教翻日晏方起梓宫在殯鼓吹日喧吹尺偽翻令聞未彰聞音問下響聞同惡聲遐布臣恐福祚之不長請碎首玉階以謝諫職之曠遂以額叩龍墀見血不已響聞閤外云考異曰實録曰莊周為善無近名為惡無近刑意者既能為近名之善即必忍為近刑之惡栖楚本王承宗小吏果敢有聞逢吉擢而用之蓋取其鷹犬之効耳夫諫諍之道是豈能知之乎即如比干剖心當文王與紂之事也朱雲拆檻恐漢氏之為新室也時危事迫不得不然故忠臣有死諫之義至如上年少嗜寢坐朝稍晩蓋宰臣密勿諫臣封事而可止者也豈在暴揚面數激訐於羽儀之前致使上疑死諫為不難謂細事皆當碎首從此遂不覽章䟽卒有克明之難實栖楚兆之况諫辭皆羣黨所作而使栖楚道之哉賣前直而資後詐殊可歎駭按李讓夷此論豈非惡栖楚而彊毁之邪今所不取李逢吉宣曰劉栖楚休叩頭俟進止程大昌曰奏劄言取進止猶言此劄之或留或却合禀承可否也唐中葉遂以處分為進止而不曉文義者習而不察槩謂有㫖為進止如玉堂宣底所載凡宣㫖皆云有進止者相承之誤也栖楚捧首而起更論宦官事上連揮令出栖楚曰不用臣言請繼以死牛僧孺宣曰所奏知門外俟進止此宰相宣上㫖也言所奏知者謂所奏之事上已知之也栖楚乃出待罪於金吾仗於是宰相賛成其言上命中使就仗并李渤宣慰令歸尋擢栖楚為起居舍人仍賜緋栖楚辭疾不拜歸東都庚午賜内教坊錢萬緡以備行幸武德後置内教坊於禁中武后如意元年改曰雲韶府以中官為使開元二年又置内教坊于蓬萊宫側京都有左右教坊夏四月甲午淮南節度使王播罷鹽鐵轉運使王播兼鹽鐵轉運見上卷二年乙未以布衣姜洽為補闕試大理評事陸洿布衣李虞劉堅為拾遺六典注云隋置大理評事通典云唐置評事十人掌出使推覆後增為十二人新志評事八人從八品下陸洿特試官耳洿後五翻時李逢吉用事所親厚者張又新李仲言李續之李虞劉栖楚姜洽及拾遺張權輿程昔範又有從而附麗之者時人惡逢吉者目之為八關十六子附依也麗著也自張又新至程昔範八人而附麗者又八人皆任要劇故目之為八關十六子關者要也考異曰按宰相之門何嘗無特所親愛之士數䝉引接詢訪得失否臧人物其間忠邪渾殽固亦多矣其踈逺不得志者則從而怨疾之巧立品目以相譏誚此乃古今常態非獨逢吉之門有八關十六子也舊逢吉傳以為有求於逢吉者必先經此八人納賂無不如意亦恐未必然但逢吉之門險詖者為多耳此皆出于李讓夷敬宗實録按栖楚為吏敢與王承宗争事此乃正直之士何得為佞邪之黨哉蓋讓夷德裕之黨而栖楚為逢吉所善故深詆之耳卜者蘇𤣥明與染坊供人張韶善染坊供人供役於染坊者也陸德明曰染如艷翻善而險翻𤣥明謂韶曰我為子卜為于偽翻當升殿坐與我共食今主上晝夜毬獵多不在宫中大事可圖也韶以為然乃與𤣥明謀結染工無賴者百餘人丙申匿兵於紫草車載以入銀臺門本草曰紫草出碭山山谷及楚地今處處有之人家園圃或種蒔其根所以染紫也爾雅謂之藐廣雅謂之茈䓞苗似蘭香節青二月之有花紫白色秋實白三月採根隂乾以下文清思殿徴所入者左銀臺門也在大明宫東靣又北則𤣥化門伺夜作亂伺相吏翻未逹所詣有疑其重載而詰之者載才代翻韶急即殺詰者與其徒易服揮兵大呼趣禁庭上時在清思殿擊毬自左銀臺門西入經太和殿至清思殿清思殿之南則宣徽殿北則珠鏡殿諸宦者見之驚駭急入閉門走白上盜尋斬關而入先是右神䇿中尉梁守謙有寵於上兩軍角伎藝先悉薦翻伎渠綺翻上常佑右軍至是上狼狽欲幸右軍左右曰右軍逺恐遇盗不若幸左軍近唐左神䇿軍右龍武軍左羽林軍皆列屯東内苑直左銀臺門東北角上從之左神䇿中尉河中馬存亮聞上至走出迎捧上足涕泣自負上入軍中遣大將康藝全將騎卒入宫討賊將即亮翻上憂二太后隔絶二太后太皇太后郭氏上母太后王氏也存亮復以五百騎迎二太后至軍復扶又翻張韶升清思殿坐御榻與蘇𤣥明同食曰果如子言𤣥明驚曰事止此邪韶懼而走㑹康藝全與右軍兵馬使尚國忠引兵至合擊之殺韶𤣥明及其黨死者狼藉逮夜始定餘黨猶散匿禁苑中明日悉擒獲之時宫門皆閉上宿於左軍中外不知上所在人情恇駭恇去王翻丁酉上還宫宰相帥百官詣延英門賀來者不過數十人帥讀曰率盗所歴諸門監門宦者三十五人法當死己亥詔並杖之仍不改職任兩中尉及諸宦者右之也壬寅厚賞兩軍立功將士五月乙夘以吏部侍郎李程户部侍郎判度支竇易直並同平章事上問相於李逢吉逢吉列上當時大臣有資望者程為之首列上時掌翻故用之上好治宫室好呼到翻治直之翻欲營别殿制度甚廣李程諫請以所具木石囘奉山陵上即從之六月己夘朔以左神䇿大將軍康藝全為酈坊節度使賞討張韶蘇𤣥明之功也上聞王庭湊屠牛元翼家歎宰輔非才使凶賊縱暴翰林學士韋處厚因上䟽言裴度勲髙中夏聲播外夷若置之巖廊委其參决河北山東必稟朝筭夏户雅翻朝直遥翻管仲曰人離而聽之則愚合而聽之則聖理亂之本非有他術順人則理違人則亂伏承陛下當食歎息恨無蕭曹今有裴度尚不能留此馮唐所以謂漢文得廉頗李牧不能用也事見十五卷漢文帝十四年夫御宰相當委之信之親之禮之於事不効於國無勞則置之散寮散蘇但翻冗散也黜之逺郡如此則在位者不敢不厲將進者不敢茍求臣與逢吉素無私嫌甞為裴度無辜貶官憲宗時韋處厚為考功郎韋貫之罷相處厚坐與之善出刺開州今之所陳上答聖明下逹羣議耳上見度奏狀無平章事以問處厚處厚具言李逢吉排沮之狀上曰何至是邪李程亦勸上加禮於度丙申加度同平章事張韶之亂馬存亮功為多存亮不自矜委權求出秋七月以存亮為淮南監軍使夏綏節度使李祐入為左金吾大將軍夏户雅翻壬申進馬百五十匹上却之甲戌侍御史温造於閤内奏彈祐違敕進奉因入閤而奏彈之也違敕者謂違三月壬子敕也請論如法詔釋之祐謂人曰吾夜半入蔡州城取吳元濟事見二百四十卷憲宗元和十二年未甞心動今日膽落於温御史矣八月丁夘朔安南奏黄蠻入寇黄蠻即黄洞蠻龍州刺史尉遲鋭上言牛心山素稱神異尉紆勿翻牛心山在龍州江油縣西一里道教靈驗記李虎葬龍州之牛心山又牛心山靈異記梁武陵王紀理益州使李龍遷築城於牛心山龍遷既没即𦵏於山側鄉里為立祠武德中改為觀武氏革命鑿斷山脉明皇幸蜀有老人蘇坦奏曰牛心山國之祖墓今日䝉塵之禍乃則天掘鑿所致明皇即令修塡如舊明年誅祿山復宫闕以二記考之則李虎與龍遷即一人也然虎仕西魏未甞仕梁有掘斷處請加補塞塞悉則翻從之役數萬人於絶險之地東川為之疲弊為于偽翻九月丁未波斯李蘇沙獻沉香亭子材左拾遺李漢上言此何異瑶臺瓊室上雖怒亦優容之杜佑曰林邑出沉香土人破斷其木積以歲年朽爛而心節獨在置水中則沉故名沉香諸蕃志沉香所出非一形多異而名亦不一有如犀角者謂之犀角沉如燕口者謂之燕口沉如附子者謂之附子沉如梭者謂之梭沉紋堅而理緻者謂之横陽沉今其材可為亭子則條段又非諸沉比矣漢道明之六世孫也道明淮陽王道𤣥之弟冬十月戊戌翰林學士韋處厚諫上宴遊曰先帝以酒色致疾損夀臣是時不死諫者以陛下年已十五故也今皇子纔一歲臣安敢畏死而不諫乎上感其言賜錦綵百匹銀器四十一月戊午安南奏黄蠻與環王合兵攻䧟陸州殺刺史葛維庚申葬睿聖文惠孝皇帝于光陵光陵在同州奉先縣北十五里堯山廟號穆宗王播以錢十萬緡賂王守澄求復領利權是年四月王播罷鹽鐵轉運使十二月癸未諫議大夫獨孤朗張仲方起居郎桞公權起居舍人宋申錫拾遺李景讓薛廷老請開延英論其奸邪上問前廷争者不在中邪争讀曰諍即日除劉栖楚諫議大夫景讓憕之曾孫李憕天寳末守東都死於安禄山之難憕直陵翻廷老河中人也十二月庚寅加天平節度使烏重𦙍同平章事乙未徐泗觀察使王智興以上生日按唐㑹要上以元和四年六月九日生今王智興於十二月請置戒壇預請之也請於泗州置戒壇度僧尼以資福釋氏之法凡初度僧尼皆請戒壇受戒其未受戒者謂之沙彌無知及避征役者争趨之泗州有大聖塔人敬事之故王智興請於此置戒壇許之自元和以來敕禁此弊智興欲聚貨首請置之於是四方輻湊江淮尤甚智興家貲由此累鉅萬浙西觀察使李德裕上言若不鈐制鈐其廉翻至降誕日方停計兩浙福建當失六十萬丁奏至即日罷之是歲囘鶻崇德可汗卒弟曷薩特勒立敬宗睿武昭愍孝皇帝諱湛穆宗長子也諡法夙夜警惕曰愍寳厯元年春正月辛亥上祀南郊還御丹鳳樓赦天下改元先是鄠令崔𤼵聞外喧囂問之曰五坊人敺百姓先悉薦翻鄠音户囂虚驕翻敺烏口翻𤼵怒命擒以入曵之於庭時已昏黑良乆詰之乃中使也上怒收𤼵繫御史臺是日𤼵與諸囚立金雞下唐制凡國有赦宥刑部先集囚徒於闕下衛尉建金雞置鼓宫城門之右囚徒至則擊之宣制訖乃釋其囚忽有品官數十人𤣥宗天寳十三年内侍省置髙品一千六百九十六人品官白身二千九百三十二人皆羣閹也執梃亂捶𤼵破靣折齒梃徒鼎翻白木棓也捶止橤翻折面設翻絶氣乃去數刻而蘇復有繼來求擊之者復扶又翻臺吏以席蔽之僅免上命復繫𤼵於臺獄臺獄御史臺獄也而釋諸囚中書侍郎同平章事牛僧孺以上荒淫嬖幸用事嬖卑義翻又轉計翻又畏罪不敢言但累表求出乙夘升鄂岳為武昌軍以僧孺同平章事充武昌節度使豫考異曰皇甫松續牛羊日厯曰太牢既交惡黨潛姦謀太牢乃元和中青衫外郎耳穆宗世因承和薦不三二年位兼將相憲宗仙駕至㶚上以從官召知制誥當時宰臣未盡兼職而獨綜集賢史館兩司出鎭未盡佩相印而太牢同平章事出夏口夏口去節十五年由太牢而加節焉太牢早孤母周氏冶蕩無檢鄉里云云兄弟羞赧乃令改醮既與前夫義絶矣及貴請以出母追贈禮云庶氏之母死何為哭於孔氏之廟乎又曰不為伋也妻者是不為白也母而李清心妻配牛㓜簡是夏侯銘所謂魂而有知前夫不納於幽壤殁而可作後夫必訴於𤣥穹使其母為失行無適從之鬼上㒺聖朝下欺先父得曰忠孝智識者乎作周秦行紀呼德宗為沈婆兒謂睿眞皇太后為沈婆此乃無君甚矣此朋黨之論今不取中㫖復以王播兼鹽鐵轉運使復扶又翻諫官屢争之上皆不納牛僧孺過襄陽山南東道節度使栁公綽服櫜鞬候於館舍櫜姑勞翻鞬居言翻將佐諫曰襄陽地髙於夏口鄂州謂之夏口此禮太過公綽曰竒章公甫離台席牛𢎞相隋封竒章公僧孺其裔孫也故唐人以稱之宰相之位取象三台故曰台席離力智翻方鎭重宰相所以尊朝廷也竟行之上遊幸無常眤比羣小眤尼質翻狎也近也比毗至翻黨也視朝月不再三朝直遥翻下同大臣罕得進見見賢遍翻二月壬午浙西觀察使李德裕獻丹扆六箴扆於豈翻一曰宵衣以諷視朝希晩朝直遥翻二曰正服以諷服御乖異三曰罷獻以諷徴求玩好好呼到翻四曰納誨以諷侮棄讜言讜音黨五曰辯邪以諷信任羣小六曰防微以諷輕出遊幸其納誨箴畧曰漢驁流湎舉白浮鍾事見三十一卷漢成帝永始二年成帝諱驁音五到翻魏叡侈汰陵霄作宫事見七十三卷魏明帝青龍三年明帝諱叡忠雖不忤善亦不從忤五故翻以規為瑱是謂塞聰左氏外傳楚靈王虐白公子張驟諫王曰不榖雖不能用吾憗寘之於耳對曰賴君之用也故言不然犀犛兕象其可盡乎其又以規為瑱也韋昭注曰瑱所以塞耳也言四獸之牙角可以為瑱難盡也而又以規諫為之乎瑱他甸翻塞悉則翻下同防微箴曰亂臣猖獗非可遽數𤣥服莫辯漢宣帝時霍氏外孫任宣坐謀反誅宣子章亡在渭城界夜𤣥服入廟居廊間執㦸立廟門待上至欲為逆𤼵覺伏誅觸瑟始仆馬何羅事見二十二卷漢武帝征和四年柏谷微行犲豕塞路覩貎獻餐斯可戒懼事見十七卷漢武帝建元三年上優詔答之上既復繫崔𤼵於獄復扶又翻給事中李渤上言縣令不應曵中人中人不應敺御囚敕㫖所囚繫者謂之御囚其罪一也然縣令所犯在赦前中人所犯在赦後中人横暴横户孟翻一至於此若不早正刑書臣恐四方藩鎭聞之則慢易之心生矣易以豉翻諫議大夫張仲方上言畧曰鴻恩將布於天下而不行御前霈澤徧被於昆蟲而獨遺崔𤼵被皮義翻自餘諫官論奏甚衆上皆不聽戊子李逢吉等從容言於上曰從千容翻崔𤼵輒曵中人誠大不敬律以對捍制使無人臣之禮為大不敬今崔𤼵曵中使故先以此罪坐之然其母故相韋貫之之姊也年垂八十自𤼵下獄積憂成疾下遐稼翻陛下方以孝理天下此所宜矜念上乃愍然曰比諫官但言𤼵寃未甞言其不敬亦不言有老母如卿所言朕何為不赦之此以母子天性感𤼵之易所謂納約自牖者也但逢吉以權數耳比毗至翻即命中使釋其罪送歸家仍慰勞其母勞力到翻母對中使杖𤼵四十三月辛酉遣司門郎中于人文冊囘鶻曷薩特勒為愛登里囉汨没密於合毗伽昭禮可汗囉魯何翻汨越筆翻夏四月癸巳羣臣上尊號曰文武大聖廣孝皇帝赦天下赦文但云左降官已經量移者宜與量移不言未量移者翰林學士韋處厚上言逢吉恐李紳量移故有此處置如此則應近年流貶官因李紳一人皆不得量移也量音良處昌呂翻上即追赦文改之紳由是得移江州長史秋七月甲辰鹽鐵使王播進羡餘絹百萬匹播領鹽鐵誅求嚴急正入不充而羡餘相繼正入謂歲入有正額者羡弋線翻己未詔王播造競渡船二十艘荆楚歲時記屈原以五月五日死於汨羅人傷其死並以舟楫拯之至今競渡是其遺俗自唐以來治競渡船務為輕駛前建龍頭後豎龍尾船之兩旁刻為龍鱗而綵繪之謂之龍舟植標於中流衆船鼔楫競進以争錦標有破舟折楫至於沉溺而不悔者運材於京師造之計用轉運半年之費諫議大夫張仲方等力諫乃減其半諫官言京兆尹崔元畧以諸父事内常侍崔潭峻丁夘元畧遷户部侍郎昭義節度使劉悟之去鄆州也以鄆兵二千自隨為親兵八月庚戌悟暴疾薨子將作監主簿從諫匿其喪据考異曰李絳䟽云悟八月十五日得病計是日便死故置此餘從杜牧書與大將劉武德及親兵謀以悟遺表求知留後司馬賈直言入責從諫曰爾父提十二州地歸朝廷謂殺李師道以鄆青等州歸朝廷也事見二百四十一卷憲宗元和十四年其功非細祗以張汶之故張汶事見上卷穆宗長慶二年汶音問自謂不潔淋頭今人謂屎為不潔竟至羞死爾孺子何敢如此父死不哭何以為人從諫恐悚不能對乃𤼵喪初陳留人武昭罷石州刺史為袁王府長史石州漢離石縣地唐置石州京師東北一千二百九十一里袁王紳順宗子鬱鬱怨執政李逢吉與李程不相恱水部郎中李仍叔程之族人激怒之云程欲與昭官為逢吉所沮昭酒酣對左金吾兵曹茅彚言欲刺逢吉刺七亦翻為人所告九月庚辰詔三司鞫之前河陽掌書記李仲言謂彚曰君言李程與昭謀則生不然必死彚曰寃死甘心誣人自全彚不為也獄成冬十月甲子武昭杖死李仍叔貶道州司馬李仲言流象州茅彚流崖州彚于貴翻上欲幸驪山温湯左僕射李絳諫議大夫張仲方等屢諫不聽拾遺張權輿伏紫宸殿下叩頭諫曰昔周幽王幸驪山為犬戎所殺史記周幽王愛褒姒褒姒不好笑王欲其笑萬方終不笑幽王為𤇺燧有寇至則舉𤇺火諸侯悉至而無寇褒姒乃大笑幽王恱之為數舉𤇺火其後不信諸侯益不至西夷犬戎攻幽王王舉𤇺徴兵兵莫至遂殺幽王驪山下秦始皇葬驪山國亡𤣥宗宫驪山而祿山亂先帝幸驪山享年不長事並見前紀上曰驪山若此之凶邪我宜一徃以驗彼言十一月庚寅幸温湯即日還宫謂左右曰彼叩頭者之言安足信哉史言敬宗荒縱而愎諫丙申立皇子普為晉王朝廷得劉悟遺表議者多言上黨内鎭與河朔異不可許左僕射李絳上䟽以為兵機尚速威斷貴定斷丁亂翻下裁斷同人情未一乃可伐謀劉悟死已數月朝廷尚未處分處昌呂翻分扶問翻中外人意共惜事機今昭義兵衆必不盡與從諫同謀縱使其半叶同尚有其半効順從諫未甞乆典兵馬威惠未加於人又此道素貧言昭義一道素來貧薄不比他道豐富非時必無優賞今朝廷但速除近澤潞一將充昭義節度使令兼程赴鎭從諫未及布置新使已至潞州所謂先人奪人之心也先悉薦翻左傳趙宣子之言使䟽吏翻下同新使既至軍心自有所繫從諫無位何名主張設使謀撓朝命撓奴教翻又奴巧翻其將士必不肯從今朝廷乆無處分處昌呂翻分扶問翻彼軍不曉朝廷之意彼軍謂昭義軍也欲効順則恐忽授從諫欲同惡則恐别更除人猶豫之間若有姦人為之畫䇿虚張賞設錢數軍士覬望尤難指揮為于偽翻賞設猶言賞犒也覬凡利翻伏望速賜裁斷仍先下明敕明敕猶言明詔斷丁亂翻下遐稼翻宣示軍衆奬其從來忠節言澤潞一軍自李抱眞以來盡忠竭節於朝廷賜新使繒五十萬匹使之賞設繒慈陵翻續除劉從諫一刺史從諫既粗有所得必且擇利而行萬無違拒設不從命臣亦以為不假攻討何則臣聞從諫已禁山東三州軍士不許自畜兵刀昭義廵屬邢洛磁三州皆在山東足明羣心殊未得一帳下之事亦在不疑言帳下必有圖從諫以為功者熟計利害决無即授從諫之理時李逢吉王守澄計議已定竟不用絳等謀諫考異曰實錄從以金幣賂當權者舊從諫傳曰李逢吉王守澄受其賂曲為奏請事有無難明今不取十二月辛丑以從諫為昭義留後劉悟煩苛從諫濟以寛厚衆頗附之李絳好直言李逢吉惡之故事僕射上日好呼到翻惡烏路翻上時掌翻宰相送之百官立班中丞列位於廷尚書以下每月當牙牙牙參也元和中伊愼為僕射太常博士韋謙上言舊儀太重削去之去羌呂翻御史中丞王播恃逢吉之勢與絳相遇於塗不之避絳引故事上言僕射國初為正宰相唐初太宗為尚書令羣臣不敢居其位自是不除授以左右僕射為尚書省長官其任為正宰相所謂參議朝政參知機務同平章事雖皆宰相之職然非正宰相也禮數至重儻人才黍位自宜别授賢良若朝命守官豈得有虧法制乞下百官詳定議者多從絳議朝直遥翻下遐稼翻上聽行舊儀甲子以絳有足疾除太子少師分司言事者多稱裴度賢不宜棄之藩鎭上數遣使至興元勞問度數所角翻勞力到翻密示以還期度因求入朝逢吉之黨大懼二年春正月壬辰裴度自興元入朝李逢吉之黨百計毁之先是民間謡云先悉薦翻緋衣小兒坦其腹天上有口被驅逐緋衣裴字天上有口吳字謂度能擒吳元濟其才為可用也又長安城中有横亘六岡如乾象度宅偶居第五岡六岡横亘如乾卦六畫之象裴度平樂里第偶居第五岡程大昌曰宇文愷之營隋都也曰朱雀街南北盡郭有六條髙坡象乾卦六爻故於九二置宫殿以當帝王之居九三立百司以應君子之數九五貴位不欲常人居之故置𤣥都觀及興善寺以鎭其地劉禹錫賦看花詩即此也裴度宅在朱雀街東自北而南則為第四坊名永樂坊畧與𤣥都觀東西相對而其第之比觀基蓋退北兩坊不正相當也唐實錄裴度在興元自請入覲李逢吉之黨有張權輿者排之以為度名應圖䜟宅據乾岡不召而來其意可見蓋權輿之所謂宅據乾岡者即龍首第五坡之餘勢也然度之所居張說第在其西尤與𤣥都觀相近而張嘉貞之第正在坊北何獨指度為占據乾岡也小人挾私欺君皆此類張權輿上言度名應圖䜟宅占岡原不召而來其旨可見傳考異曰舊逢吉曰寳厯初度連上章請入覲逢吉之黨坐不安席如矢攅身乃相與為謀欲沮其來張權輿撰非衣小兒之謡傳於閭巷言度相有天分名應謡䜟而韋處厚於上前解析權輿所撰之言按權輿若撰謡言當更加以惡言不止云天上有口被驅逐觀此蓋民間先有此謡權輿因言度名應圖䜟非撰之也上雖年少少詩照翻悉察其誣謗待度益厚度初至京師朝士塡門度留客飲京兆尹劉栖楚附度耳語侍御史崔咸舉觴罰度曰丞相不應許所由官呫囁耳語京尹任煩劇故唐人謂府縣官為所由官項安世家說曰今坊市公人謂之所由呫叱渉翻囁而渉翻呫囁細語口動而聲不逺聞度笑而飲之栖楚不自安趨出二月辛未以度為司空同平章事度在中書左右忽白失印聞者失色度飲酒自如頃之左右白復於故處得印度不應或問其故度曰此必吏人盗之以印書劵耳急之則投諸水火緩之則復還故處或問當左右白得印之時豈不可就詰其人以得印所自邪答曰晉公處此必有說請自詳度人服其識量上自即位以來欲幸東都宰相及朝臣諫者甚衆上皆不聽决意必行己令度支員外郎盧貞按視修東都宫闕及道中行宫自長安厯華陜至洛沿道皆有行宫如華隂之瓊岳宫金城宫鄭縣之神臺宫陜縣之繡嶺宫澠池之芳桂宫福昌之福昌宫永寜之﨑岫宫蘭峯宫夀安之連昌宫興泰宫是也裴度從容言於上曰國家本設兩都以備廵幸自多難以來兹事遂廢從千容翻難乃旦翻今宫闕營壘百司廨舍率已荒阤阤施是翻廢也陛下儻欲行幸宜命有司歲月間徐加完葺然後可往上曰從來言事者皆云不當往如卿所言不往亦可㑹朱克融王庭湊皆請以兵匠助修東都三月丁亥勅以修東都煩擾罷之史言修東都之役非以羣臣論諫而罷特畏幽鎮之稱兵而罷耳召盧貞還先是朝廷遣中使賜朱克融時服先悉薦翻克融以為踈惡執留勅使又奏當道今歲將士春衣不足乞度支給三十萬端匹又奏欲將兵馬及丁匠五千助修宫闕上患之以問宰相欲遣重臣宣慰仍索敕使索山客翻裴度對曰克融無禮已甚殆將斃矣譬如猛獸自於山林中咆哮跳踉咆蒲交翻嘷也哮虚交翻闞也踉吕張翻又音郎乆當自困必不敢輙離巢穴離力智翻願陛下勿遣宣慰亦勿索敕使旬日之後徐賜詔書云聞中官至彼稍失去就俟還朕自有處分時服有司製造不謹朕甚欲知之已令區處處昌呂翻分扶問翻其將士春衣從來非朝廷徴𤼵皆本道自備朕不愛數十萬匹物但素無此例不可獨與范陽所稱助修宮闕皆是虚語若欲直挫其姦宜云丁匠宜速遣來已令所在排比供擬比毗至翻彼得此詔必蒼黄失圖若且示含容則云修宫闕事在有司不假丁匠逺來如是而已不足勞聖慮也上恱從之立才人郭氏為貴妃妃晉王普之母也横海節度使李全畧薨其子副大使同㨗擅領留後重賂鄰道以求承繼為文宗討李同㨗張本夏四月戊申以昭義留後劉從諫為節度使五月幽州軍亂殺朱克融及其子延齡果如裴度之言軍中立其少子延嗣主軍務六月甲子上御三殿令左右軍教坊内園為擊毬手搏雜戯戯酣有斷臂碎首者夜漏數刻乃罷己夘上幸興福寺唐㑹要興福寺在修德坊本王君廓宅貞觀八年太宗為太穆皇后追福立為𢎞福寺神龍元年改名元和十二年築夾城自雲韶門過芳林門西至修德里以通於興福佛寺觀沙門文溆俗講釋比講說類談空有而俗講者又不能演空有之義徒以恱俗邀布施而已溆象吕翻癸未衡王絢薨絢順宗子音翾縣翻壬辰宣索左藏見在銀十萬兩金七千兩悉貯内藏以便賜與索山客翻貯丁呂翻藏徂浪翻見賢遍翻道士趙歸真說上以神仙僧惟貞齊賢正簡說上以禱祠求福說式芮翻皆出入宫禁上信用其言山人杜景先請徧厯江嶺求訪異人有潤州人周息元自言夀數百歲上遣中使迎之八月乙巳息元至京師潤州至京師二千八百二十一里上館之禁中山亭館古玩翻朱延嗣既得幽州虐用其人都知兵馬使李載義與弟牙内兵馬使載寜共殺延嗣并屠其家三百餘人載義權知留後九月數延嗣之罪以聞數所具翻載義承乾之後也承乾太宗長子以罪廢庚申魏博節度使史憲誠妄奏李同㨗為軍士所逐走歸本道請束身歸朝尋奏同㨗復歸滄州史言史憲誠玩侮朝廷公肆欺㒺壬申以中書侍郎同平章事李程同平章事充河東節度使冬十月乙亥以李載義為盧龍節度使十一月甲申以門下侍郎同平章事李逢吉同平章事充山南東道節度使上遊戲無度狎暱羣小暱尼質翻善擊毬好手搏好呼到翻下同禁軍及諸道争獻力士又以錢萬緡付内園令召募力士晝夜不離側離力智翻又好深夜自捕狐狸性復褊急復扶又翻力士或恃恩不遜輙配流籍没宦官小過動遭捶撻皆怨且懼十二月辛丑上夜獵還宫與宦官劉克明田務澄許文瑞及擊毬軍將蘇佐明王嘉憲石從寛閻惟直等二十八人飲酒上酒酣入室更衣更工衡翻殿上燭怱滅蘇佐明等弑上於室内年十八劉克明等矯稱上旨命翰林學士路隋草遺制以絳王悟權句當軍國事絳王悟憲宗子句古侯翻當下浪翻壬寅宣遺制絳王見宰相百官於紫宸外廡克明等欲易置内侍之執權者於是樞密使王守澄楊承和中尉魏從簡梁守謙定議唐末謂兩樞密兩中尉為四貴以衞兵迎江王涵入宫自十六宅迎入宫也𤼵左右神䇿飛龍兵進討賊黨盡斬之克明赴井出而斬之絳王為亂兵所害時事起蒼猝守澄等以翰林學士韋處厚博通古今一夕處置皆與之共議處昌呂翻守澄等欲號令中外而疑所以為辭處厚曰正名討罪於義何嫌安可依違有所諱避又問江王當如何踐阼處厚曰詰朝當以王教布告中外以己平内難詰去吉翻難乃旦翻然後羣臣三表勸進以太皇太后令冊命即皇帝位當時皆從其言時不暇復問有司復扶又翻凡百儀法皆出於處厚無不叶宜癸夘以裴度攝冡宰百官謁見江王於紫宸外廡見賢遍翻王素服涕泣甲辰見諸軍使於少陽院少陽院以地望準之當在宫城東北隅太子居之亦謂之東宫今按閣本大明宫圗少陽院在浴堂殿東其北又有温室宣徽清思太和珠鏡等殿不正在宫城東北隅也考異曰魏謩文宗實錄見軍使事承見百官下不云别日今從敬宗實錄趙歸真等諸術士及敬宗時佞幸者皆流嶺南或邊地乙巳文宗即位更名昻更工衡翻戊申尊母蕭氏為皇太后王太后為寳厯太后是時郭太后居興慶宫王太后居義安殿蕭太后居大内上性孝謹事三宫如一自此以後凡言上者皆文宗也每得珍異之物先薦郊廟次奉三宫然後進御蕭太后閩人也庚戌以翰林學士韋處厚為中書侍郎同平章事上自為諸王深知兩朝之弊謂穆敬兩朝也朝直遙翻下同及即位勵精求治去奢從儉治直吏翻去羌呂翻詔宫女非有職掌者皆出之出三千餘人五坊鷹犬準元和故事量留校獵外悉放之量音良有司供宫禁年支物並準貞元故事省教坊翰林摠監冗食千二百餘貟摠監苑摠監也停諸司新加衣糧諸司内諸司也衣糧敬宗濫恩所加也御馬坊場及近歲别貯錢榖所占陂田占古贍翻悉歸之有司先宣索組繡彫鏤之物悉罷之鏤郎豆翻敬宗之世每月視朝不過一二上始復舊制每竒日未嘗不視朝竒紀宜翻隻也唐制天子以隻日視朝對宰相羣臣延訪政事乆之方罷待制官舊雖設之未嘗召對至是屢䝉延問其輟朝放朝皆用偶日中外翕然相賀以為太平可冀欲治之主不世出人君初政儻有一二足以新民視聽天下之所望重矣然卒無以副天下之望者魏髙貴鄉公晉懷帝唐德宗文宗是也文宗元聖昭獻孝皇帝上之上本名涵即位更名昂穆宗第三子太和元年春二月乙巳赦天下改元李同㨗擅據滄景朝廷經歲不問去年三月李同㨗擅領横海留後同㨗冀易世之後或加恩貸三月壬戌朔遣掌書記崔從長奉表與其弟同志同巽俱入見見賢遍翻請遵朝㫖上雖虚懷聽納而不能堅决與宰相議事已定尋復中變復扶又翻夏四月丙辰韋處厚於延英極論之因請避位上再三慰勞之勞力到翻忠武節度使王沛薨庚申以太僕卿髙瑀為忠武節度使瑀音禹自大厯以來節度使多出禁軍其禁軍大將資髙者皆以倍稱之息貸錢於富室倍者子錢倍於本錢稱者子本相侔也稱尺證翻以賂中尉動踰億萬然後得之未嘗由執政至鎮則重歛以償所負歛力瞻翻及沛薨裴度韋處厚始奏以瑀代之中外相賀曰自今債帥鮮矣帥所類翻鮮息淺翻少也五月丙子以天平節度使烏重𦙍為横海節度使以前横海節度副使李同㨗為兖海節度使朝廷猶慮河南北節度使搆扇同㨗使拒命乃加魏博史憲誠同平章事丁丑加盧龍李載義平盧康志睦成德王庭湊檢校官鹽鐵使王播自淮南入朝力圖大用所獻銀器以千計綾絹以十萬計六月癸巳以播為左僕射同平章事秋七月癸酉葬睿武昭愍孝皇帝于莊陵莊陵在京兆三原縣西北五里廟號敬宗李同㨗託為將士所留不受詔乙酉武寜節度使王智興奏請將本軍三萬人自備五月糧以討同㨗許之八月庚子削同㨗官爵命烏重𦙍王智興康志睦史憲誠李載義與義成節度使李聽義武節度使張璠各帥本軍討之璠扶元翻帥讀曰率同㨗遣其子弟以珍玩女妓賂河北諸鎮妓渠綺翻戊午李載義執其姪并所賂獻之史憲誠與李全畧為婚姻及同㨗叛密以糧助之裴度不知其所為謂憲誠無貳心憲誠遣親吏至中書請事韋處厚謂曰晉公於上前以百口保爾使主裴度封晉國公節度使為一道之主故對其屬吏稱之為使主使䟽吏翻處厚則不然但仰俟所為自有朝典耳憲誠懼不敢復與同㨗通讀史者以為裴度於是時耄及之矣韋處厚較聰明不惟不知度亦不知處厚矣一推心以待之一明法以示之此正寛嚴相濟所以制御彊藩復扶又翻王庭湊為同㨗求節鉞不獲為于偽翻乃助之為亂出兵境上以撓魏師撓奴教翻又遣使厚賂沙陀酋長朱邪執宜欲與之連兵執宜拒不受酋慈由翻長知丈翻冬十月天平横海節度使烏重𦙍擊同㨗屢破之十一月丙寅重𦙍薨庚辰以保義節度使李寰為横海節度使穆宗長慶三年以晉慈二州為保義軍從王智興之請也十二月庚戌加王智興同平章事二年春三月己夘王智興攻棣州焚其三門自元和之末宦官益横横户孟翻建置天子在其掌握穆宗及上皆宦官所立威權出人主之右人莫敢言上親䇿制舉人賢良方正昌平劉蕡蕡符分翻對䇿及言其禍其畧曰陛下宜先憂者宫闈將變社稷將危天下將傾海内將亂又曰陛下將杜篡弑之漸則居正位而近正人逺刀鋸之賤親骨鯁之直近其靳翻逺于願翻輔相得以專其任相息亮翻庶職得以守其官奈何以䙝近五六人摠天下大政禍稔蕭牆姦生帷幄臣恐曹節侯覽復生於今日曹節侯覽見漢桓帝紀復扶又翻又曰忠賢無腹心之寄閽寺持廢立之權陷先君不得正其終致陛下不得正其始謂宦官弑敬宗而立上也春秋榖梁傳曰定元年春王不言正月定無正也定之無正何也昭公之終非正終也定之始非正始也昭無正終故定無正始又曰威柄陵夷藩臣跋扈或有不逹人臣之節首亂者以安君為名不究春秋之微稱兵者以逐惡為義微為春秋之微指也此二語蕡蓋慮夫强藩首亂稱兵以逐君側惡臣為名者則政刑不由乎天子征伐必自於諸侯昭宗之世岐汴交兵以誅宦官為名卒如劉蕡之言又曰陛下何不塞隂邪之路屏䙝狎之臣塞悉則翻屏必郢翻又卑正翻制侵陵迫脅之心復門户掃除之役戒其所宜戒憂其所宜憂既不能治於前當治於後治直之翻既不能正其始當正其終則可以䖍奉典謨克承丕構矣昔秦之亡也失於彊暴漢之亡也失於微弱彊暴則賊臣畏死而害上謂趙髙也髙亦宦者也微弱則姦臣竊權而震主謂外戚宦官蕡意專指宦官伏見敬宗皇帝不虞亡秦之禍不翦其萌伏惟陛下深軫亡漢之憂以杜其漸蕡蓋謂敬宗以荒暴䘮身又恐上以仁弱不能制宦官也則祖宗之鴻業可紹三五之遐軌可追矣三五謂三皇五帝又曰臣聞昔漢元帝即位之初更制七十餘事其畧見二十八卷漢元帝初元元年二年其心甚誠其稱甚美然而紀綱日紊稱尺證翻紊音汶國祚日衰姦宄日彊黎元日困者以其不能擇賢明而任之失其操柄也引漢元以為戒者蓋以帝之去奢從儉似漢元而優遊不斷亦類漢元也又日陛下誠能揭國權以歸相持兵柄以歸將則心無不達行無不孚矣行下孟翻又曰法宜畫一官宜正名今分外官中官之員立南司北司之局百官赴南牙朝㑹者謂之外官亦謂之南司宦官列局於𤣥武門内兩軍中尉䕶諸營於苑中謂之中官亦謂之北司或犯禁於南則亡命於北或正刑於外則破律於中法出多門人無所措實由兵農勢異而中外法殊也又曰今夏官不知兵籍止於奉朝請朝直遥翻六軍不主兵事止於養勲階兵部古夏官之職六軍工將軍大將軍將軍統軍皆以養勲階軍容合中官之政戎律附内臣之職謂觀軍容使及諸監軍使也首一戴武弁疾文吏如仇讐足一蹈軍門視農夫如草芥謀不足以翦除兇逆而詐足以抑揚威福勇不足以鎮衞社稷而暴足以侵軼里閭羈絏藩臣軼徒結翻又音逸􅀢也絏先列翻干陵宰輔隳裂王度汨亂朝經朝直遥翻張武夫之威上以制君父假天子之命下以御英豪有藏姦觀釁之心無仗節死難之義難乃旦翻豈先王經文緯武之㫖邪又曰臣非不知言𤼵而禍應計行而身戮蓋痛社稷之危哀生人之困豈忍姑息時忌竊陛下一命之寵哉周禮一命受職後世以授初品官為一命閏月丙戌朔史憲誠奏遣其子副大使唐都知兵馬使开志紹將兵二萬五千趣德州討李同㨗开苦堅翻按考異從亓當音渠之翻二音皆姓也趣七喻翻考異曰實錄或作于志沼或作开志沼或作亓志紹舊紀作开志紹新紀傳作亓志沼今從之據考異紹當作沼時憲誠欲助同㨗唐泣諫且請𤼵兵討之憲誠不能違甲午賢良方正裴休李郃李甘杜牧馬植崔璵王式崔慎由等郃曷閣翻璵音余二十二人中第皆除官中竹仲翻考官左散騎常侍馮宿等見劉蕡䇿皆歎服而畏宦官不敢取詔下物論囂然稱屈囂虚驕翻喧也諫官御史欲論奏執政抑之李郃曰劉蕡下第我輩登科能無厚顔乃上䟽以為蕡所對䇿漢魏以來無與為比今有司以蕡指切左右不敢以聞恐忠良道窮綱紀遂絶况臣所對不及蕡逺甚乞回臣所授以旌蕡直不報蕡由是不得仕於朝終於使府御史使府節度使幕府也御史幕僚所帶寄禄官亦謂之憲官牧佑之孫植勛之子杜佑厯德順憲三朝位至公輔馬勛見二百三十卷德宗貞元元年考異曰舊傳勛作曛誤也勛事見德宗實錄式起之孫慎由融之𤣥孫也王起見二百四十一卷穆宗長慶元年崔融以文章顯於武后朝夏六月晉王普薨辛酉諡悼懷太子初蕭太后㓜去鄉里有弟一人上即位命福建觀察使求訪莫知所在有茶綱役人蕭洪凡茶商販茶各以若干為一綱而輸税于官自言有姊流落商人趙縝引之見太后近親吕璋之妻縝指忍翻亦不能辯與之俱見太后上以為得真舅甲子以為太子洗馬為蕭洪詐覺流死張本洗悉薦翻峯州刺史王升朝叛庚辰安南都䕶武陵韓約討斬之舊志峯州至京師一萬一千五百里宋白曰峯州治嘉寜縣漢麓泠縣地武陵漢臨沅縣之地隋置武陵縣唐帶朗州朝直遙翻王庭湊隂以兵及鹽粮助李同㨗上欲討之秋七月甲辰詔中書集百官議其事宰相以下莫敢違衞尉卿殷侑獨以為廷湊雖附凶徒事未甚露宜且含容專討同㨗己巳下詔罪狀廷湊命鄰道各嚴兵守備聽其自新九月丁亥王智興奏拔棣州李寰自晉州引兵赴鎮不戢士卒所過殘暴至則擁兵不進但坐索供饋索山客翻庚寅以寰為夏綏節度使夏户雅翻甲午詔削奪王廷湊官爵命諸軍四面進討加王智興守司徒以前夏綏節度使傅良弼為横海節度使岳王緄薨緄順宗子音古本翻庚戌容管奏安南軍亂逐都䕶韓約冬十月洋王忻薨忻憲宗子魏博敗横海兵於平原遂拔之敗補邁翻十一月癸未朔易定節度使栁公濟奏攻李同㨗堅固寨拔之同㨗築寨於滄州西以抗官兵以堅固為名又破其兵於寨東時河南北諸軍討同㨗乆未成功每有小勝則虚張首虜以邀厚賞朝廷竭力奉之江淮為之耗弊傅良弼至陜而薨陜失冉翻乙酉以左金吾大將軍李祐為横海節度使甲辰禁中昭德寺火天火曰災人火曰火延及宫人所居燒死者數百人十二月丁巳王智興奏兵馬使李君謀將兵濟河破無棣無棣古齊國之北境周封太公賜履所至也漢為陽信縣界有無棣溝通海唐為無棣縣屬滄州九域志在州東南一百七里壬申中書侍郎同平章事韋處厚薨李同㨗軍勢日蹙王庭湊不能救乃遣人説魏博大將亓志紹説式芮翻使殺史憲誠父子取魏博志紹遂作亂引所部兵二萬人還逼魏州丁丑命諫議大夫柏耆宣慰魏博且𤼵義成河陽兵以討志紹戊寅以翰林學士路隋為中書侍郎同平章事辛巳史憲誠奏亓志紹兵屯永濟代宗大厯七年田承嗣分魏州之臨清置永濟縣屬貝州告急求援詔義成節度使李聽帥滄州行營諸軍以討志紹帥讀曰率資治通鑑卷二百四十三
