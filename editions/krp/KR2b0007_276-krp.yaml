front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑巻二百七十六宋司馬光撰胡三省音註後唐紀起彊圉大淵獻七月盡屠維赤奮若凡二年有竒明宗聖德和武欽孝皇帝中之上天成二年秋七月以歸德節度使王晏球為北面副招討使烏震既死以王晏球代之按薛史是年七月甲辰詔曰本朝親王遥領方鎮遂有副大使知節度事傳代已深相沿未改其西川東川今後落副大使只云節度使尋諸鎮皆正授節度使丙寅升夔州為寧江軍以西方鄴為節度使賞破髙季興軍復夔忠萬之功也蜀以夔州為鎮江軍今改為寧江軍癸巳以與髙季興夔忠萬三州為豆盧革韋説之罪元年以三州與季興革説猶為相因以此罪之皆賜死流段凝於遼州温韜於德州劉訓於濮州自唐末以來流貶者皆不至其地遼德濮皆唐境也此三人皆使至流所任圜請致仕居磁州磁墻之翻許之八月己卯朔日有食之冊禮使至長沙楚王殷始建國封楚王殷為國王見上巻是年六月立宫殿置百官皆如天子或微更其名示不敢擬天朝也更工行翻翰林學士曰文苑學士知制誥曰知辭制樞密院曰左右機要司羣下稱之曰殿下令曰教以姚彦章為左丞相許德勲為右丞相李鐸為司徒崔潁為司空拓跋恒為僕射張彦瑶張迎判機要司馬殷所恃以為國者髙郁也建國置官郁不與焉何也豈殷諸子已有忌郁之心歟然管内官屬皆稱攝惟朗桂節度使先除後請命朗武平軍桂靜江軍時皆屬楚恒本姓元避殷父諱改焉九月帝謂安重誨曰從榮左右有矯宣朕㫖令勿接儒生恐弱人志氣者朕以從榮年少臨大藩是年三月從榮鎮鄴都事見上巻少詩照翻故擇名儒使輔導之今姧人所言乃如此欲斬之重誨請嚴戒而已安重誨非儒也故寛言者之罪獨不思矯宣上言國有常刑邪北都留守李彦超請復姓符從之彦超李存審子存審本姓符丙寅以樞密使孔循兼東都留守帝欲東巡使孔循留守洛陽莊宗同光三年復以洛陽為東都壬申契丹來請修好好呼到翻遣使報之冬十月乙酉帝發洛陽將如汴州丁亥至滎陽九域志滎陽縣在鄭州西六十里東至大梁一百四十里民間譌言帝欲自擊吳又云欲制置東方諸侯宣武節度使檢校侍中朱守殷疑懼判官髙密孫晟勸守殷反髙密漢古縣隋亂廢唐武德三年置于義城堡六年移就故夷安城即髙密古縣也屬密州九域志在州東北一百二十里考異曰江南録作孫忌今從王溥周世宗實録晟承正翻守殷遂乗城拒守帝遣宣徽使范延光往諭之延光曰不早擊之則汴城堅矣願得五百騎與俱帝從之延光暮發未明行二百里抵大梁城下與汴人戰汴人大驚戊子帝至京水京水在滎陽之東索水之西遣御營使石敬瑭將親兵倍道繼之自梁以來有侍衞親軍侍衞馬軍侍衞步軍或謂安重誨曰失職在外之人乗賊未破或能為患不如除之重誨以為然奏遣使賜任圜死任圜罷相見上巻是年六月端明殿學士趙鳳哭謂重誨曰任圜義士安肯為逆公濫刑如此何以賛國使者至磁州圜聚其族酣飲然後死神情不撓撓奴教翻己丑帝至大梁四面進攻吏民縋城出降者甚衆縋馳偽翻守殷知事不濟盡殺其族引頸命左右斬之乗城者望見乗輿乗承正翻相帥開門降帥讀曰率下同孫晟奔吳徐知誥客之為孫晟盡節於江南張本戊戌詔免三司逋負近二百萬緡近其靳翻辛丑吳大丞相都督中外諸軍事諸道都統鎮海寧國節度使兼中書令東海王徐温卒初温子行軍司馬忠義節度使同平章事知詢以其兄知誥非徐氏子徐温養知誥為子見二百六十巻唐昭宗乾寧二年數請代之執吳政數所角翻温曰汝曹皆不如也嚴可求及行軍副使徐玠屢勸温以知詢代知誥徐知誥之於嚴可求結之以婚姻而可求之心不為之變徐温之門忠于所事者嚴可求陳彦謙而已温以知誥孝謹不忍也陳夫人曰知誥自我家貧賤時養之陳夫人徐温之妻子畜知誥者也奈何富貴而弃之可求等言之不已温欲帥諸藩鎮入朝勸吳王稱帝帥讀曰率將行有疾乃遣知詢奉表勸進因留代知誥執政知誥草表欲求洪州節度使俟旦上之上時兩翻是夕温凶問至乃止史言徐知誥得吳國之政亦有數存乎其間篡吳之業自此成矣知詢亟歸金陵為知誥知詢不相容張本吳主贈温齊王諡曰忠武山南西道節度使張筠久疾將佐請見不許副使符彦琳等疑其已死恐左右有奸謀請權交符印筠怒收彦琳及判官都指揮使下獄誣以謀反下遐嫁翻詔取彦琳等詣闕按之無狀釋之觀于可洪張筠之事帝之廟號曰明亦有以也徙筠為西都留守莊宗同光三年復以長安為西都癸卯以保義節度使石敬瑭為宣武節度使朱守殷反死以石敬瑭代之兼侍衞親軍馬步都指揮使十一月庚戌吳王即皇帝位追尊孝武王曰武皇帝景王曰景皇帝宣王曰宣皇帝孝武王忠武王行密也景王威王渥也宣王者隆演也安重誨議伐吳安重誨欲乗徐温之死而伐之且問其舉大號之罪帝不從根本不固而伐人之國莊宗覆車可鑒也故不許甲子吳大赦改元乾貞丙子吳主尊太妃王氏曰皇太后以徐知詢為諸道副都統鎮海寧國節度使兼侍中若使之嗣徐温之官職者加徐知誥都督中外諸軍事吳國中外大權實皆歸於徐知誥十二月戊寅朔孟知祥發民丁二十萬修成都城吳主立兄廬江公濛為常山王弟鄱陽公激為平原王激勅列翻兄子南昌公珙為建安王珙居勇翻吳主稱帝封其兄弟及其兄子皆自公陞王初晉陽相者周𤣥豹相息亮翻嘗言帝貴不可言帝即位欲召詣闕趙鳳曰𤣥豹言陛下當為天子今已驗矣無所復詢復扶又翻若置之京師則輕躁狂險之人必輻輳其門爭問吉凶自古術士妄言致人族滅者多矣非所以靖國家也史言趙鳳有識帝乃就除光禄卿致仕厚賜金帛而已中書舍人馬縞縞工老翻請用漢光武故事七廟之外别立親廟見四十一巻漢光武建武三年中書門下奏請如漢孝德孝仁皇例稱皇不稱帝孝德皇見五十巻漢安帝建光元年孝仁皇見五十六巻靈帝建寧元年帝欲兼稱帝羣臣乃引德明𤣥元興聖皇帝例皆立廟京師唐尊臯陶為德明皇帝老子為𤣥元皇帝凉武昭王為興聖皇帝例時詣翻帝令立於應州舊宅自髙祖考妣以下皆追諡曰皇帝皇后墓曰陵五代㑹要帝追尊髙祖聿為孝恭皇帝廟號惠祖陵曰順陵妣崔氏曰昭皇后曽祖教曰孝質皇帝廟號毅祖陵曰衍陵妣張氏曰順皇后祖琰曰孝靖皇帝廟號烈祖陵曰奕陵妣何氏曰穆皇后父霓曰孝成皇帝廟號德祖陵曰慶陵歐史曰髙祖妣劉氏曽祖諱敖父孝成妣劉氏諡懿皇后四陵皆在應州金城縣按帝之先本夷狄既無姓氏其名必當時有司所製也漢主如康州九域志廣州南至康州一百九十里是嵗蔚代緣邊粟斗不過十錢蔚紆勿翻三年春正月丁巳吳主立子璉為江都王璘為江夏王璆為宜春王宣帝子廬陵公玢為南陽王璉力展翻璠離珍翻璆音求玢悲巾翻吳主諡兄隆演曰宣皇帝昭義節度使毛璋所為驕僭時服赭袍赭袍天子所服赭音者縱酒為戲左右有諫者剖其心而視之帝聞之徴為右金吾衞上將軍毛璋在邠州以驕僭徴及在潞州復然謂之不軌可也然一詔徴之則束手入衞葢其人㝠頑驕虐本無它心不知僭擬之為非然亦明宗能容之耳契丹陷平州元年冬盧文進來奔唐得平州至是復為契丹所陷二月丁丑朔日有食之帝將如鄴都時扈駕諸軍家屬甫遷大梁又聞將如鄴都皆不悦詾詾有流言説讀曰悦詾許拱翻帝聞之不果行吳自莊宗滅梁以來使者往來不絶庚辰吳使者至安重誨以為楊溥敢與朝廷抗禮並立為帝是抗禮也遣使窺覘覘丑亷翻又丑艶翻拒而不受自是遂與吳絶張筠至長安去年徙張筠留守西都守兵閉門拒之上意也筠單騎入朝以為左衞上將軍壬辰寧江節度使西方鄴攻拔歸州未幾荆南復取之歸州髙季興巡屬也九域志夔州東至歸州三百三十里幾居豈翻復扶又翻下宜復同樞密使同平章事孔循性狡佞安重誨親信之帝欲為皇子娶重誨女為于偽翻循謂重誨曰公職居近密不宜復與皇子為昏重誨辭之久之或謂重誨曰循善離間人間古莧翻不可置之密地循知之隂遣人結王德妃求納其女德妃請娶循女為從厚婦帝許之王德妃有寵於帝言無不行後進拜淑妃重誨大怒乙未以循同平章事充忠武節度使兼東都留守解其近密之職重誨性强愎愎蒲逼翻秦州節度使華温琪入朝請留闕下帝嘉之當時諸帥皆樂在方鎮得自恣獨華温琪入朝請留故嘉之華户化翻除左驍衞上將軍月别賜錢榖俸給之外别賜錢榖嵗餘帝謂重誨曰温琪舊人宜擇一重鎮處之華温琪仕梁已為節鎮故云然處昌吕翻重誨對以無闕它日帝屢言之重誨愠曰臣累奏無闕惟樞密使可代耳帝曰亦可重誨無以對華温琪之才誠不足以當重鎮安重誨以君臣相得之雅詳明敷奏明宗宜無不從今則上下之言交不能暢其意相厲而已斯不學至此也温琪聞之懼數月不出重誨惡成德節度使同平章事王建立奏建立與王都交結有異志惡烏路翻初帝為代州刺史王建立已為虞侯將後從鎮真定帝自鄴為亂兵所逼舉兵南向建立殺真定監軍帝家屬得全由是愛之及帝即位擢為真定帥安重誨亦帝潛躍之時所親信者也即位自中門使擢樞密使重誨之所以惡建立權寵之間耳又是時王都在中山有異志數以書通建立約為兄弟故重誨言之建立亦奏重誨專權求入朝面言其狀帝召之既至言重誨與宣徽使判三司張延朗結昏相表裏弄威福三月辛亥帝見重誨氣色甚怒謂曰今與卿一鎮自休息以王建立代卿張延朗亦除外官重誨曰臣披荆棘事陛下數十年值陛下龍飛承乏機密承乏者承人之乏也言適時乏人故已得任機密數年間天下幸無事今一旦棄之外鎮臣願聞其罪帝不懌而起此段自孔循以下言重誨與孔循相傾自華温琪以下言其君臣嫌隙之所自來葢重誨挾依乗之舊戀權而不肯退明宗積受浸潤之譖欲逺之而不能至於决裂則不可救矣以語宣徽使朱𢎞昭語牛倨翻𢎞昭曰陛下平日待重誨如左右手奈何以小忿棄之願垂三思朱𢎞昭今日之言知重誨之眷未衰也鳳翔之奏知重誨之權已去也小人之智隨時而反覆可畏也哉帝尋召重誨慰撫之明日建立辭歸鎮帝曰卿比奏欲入分朕憂比毗至翻近也今復去何之復扶又翻下不復同㑹門下侍郎兼刑部尚書同平章事鄭珏請致仕己未以珏為左僕射致仕癸亥以建立為右僕射兼中書侍郎同平章事判三司孟知祥屢與董璋爭鹽利蜀中井鹽東西川巡屬之内皆有之各欲障固以專其利故爭按唐盛時卬嘉眉有井十三劍南西川院領之梓遂綿合昌渝瀘資榮陵簡有井四百六十劍南東川院領之東川鹽利多于西川矣璋誘商旅販東川鹽入西川知祥患之乃於漢州置三場重征之漢州東南與東川接界故列置三場以征鹽商嵗得錢七萬緡商旅不復之東川之往也楚王殷如岳州遣六軍使袁詮詮丑縁翻副使王環監軍馬希瞻將水軍擊荆南髙季興以水軍逆戰至劉郎洑江陵府石首縣沙步有劉郎浦蜀先主納吳女處也洑房六翻洄流曰洑希瞻夜匿戰艦數十艘於港中艦戸黯翻艘疎留翻港古項翻詰旦兩軍合戰希瞻出戰艦横擊之季興大敗俘斬以千數進逼江陵季興請和歸史光憲于楚髙季興執史光憲見上巻上年軍還還從宣翻又如字楚王殷讓環不遂取荆南環曰江陵在中朝及吳蜀之間中朝謂唐也既在中原且天朝也四戰之地也四面受敵謂之四戰之地宜存之以為吾扞蔽宋時趙韓王勸太祖緩取太原意亦如此殷悦環每戰身先士卒先悉薦翻與衆同甘苦常置鍼藥於座右戰罷索傷者於帳前自傅治之鍼諸深翻索山客翻治直之翻士卒𨽻環麾下者相賀曰吾屬得死所矣故所向有功史言為將得士卒之死力者勝楚大舉水軍擊漢圍封州宋白曰封州即漢蒼梧郡之廣信縣也梁置梁信郡隋置封州在豐水之陽漢主以周易筮之遇大有龜為卜䇿為筮以四十九䇿信手分開視其竒耦三變而成爻十有八變而成封於是大赦改元大有命左右街使蘇章將神弩三千戰艦百艘救封州漢都畨禺倣唐上京置左右街使九域志廣州西至封州六百一十里章至賀江沈鐵絙於水沈持林翻絙居登翻兩岸作巨輪挽絙築長堤以隠之伏壯士於堤中章以輕舟逆戰陽不利楚人逐之入堤中挽輪舉絙楚艦不能進退以强弩夾水射之射而亦翻楚兵大敗解圍遁去漢主以章為封州團練使夏四月以鄴都留守從榮為河東節度使北都留守以客省使太原馮贇為副留守贇於倫翻夾馬指揮使新平楊思權為步軍都指揮使以佐之戊寅以宣武節度使石敬瑭為鄴都留守天雄節度使加同平章事以樞密使范延光為成德節度使丙戌以樞密使安重誨兼河南尹以河南尹從厚為宣武節度使仍判六軍諸衞事從厚本以河南尹判六軍諸衞事今易鎮汴州而判六軍諸衞事如故吳右雄武軍使苗璘靜江統軍王彦章將水軍萬人攻楚岳州至君山岳州治巴陵洞庭湖在巴陵西君山在洞庭湖中方六十里楚王殷遣右丞相許德勲將戰艦千艘禦之德勲曰吳人掩吾不備見大軍必懼而走乃潛軍角子湖使王環夜帥戰艦三百絶吳歸路帥讀曰率遲明吳人進軍荆江口遲直二翻荆江口洞庭湖與大江㑹處將㑹荆南兵攻岳州丁亥至道人磯德勲命戰棹都虞侯詹信以輕舟三百出吳軍後德勲以大軍當其前夾擊之吳軍大敗虜璘及彦章以歸初義武節度使兼中書令王都鎮易定十餘年梁均王龍德元年王都得定州至是九年自除刺史以下官租賦皆贍本軍及安重誨用事稍以法制裁之帝亦以都篡父位惡之王都囚其父處直而篡其位見二百七十一巻後梁均王龍德元年惡烏路翻時契丹數犯塞數所角翻朝廷多屯兵於幽易間瓦橋盧臺皆在幽易之間大將往來都隂為之備浸成猜阻都恐朝廷移之它鎮腹心和昭訓勸都為自全之計都乃求昏於盧龍節度使趙德鈞又知成德節度使王建立與安重誨有隙遣使結為兄弟隂與之謀復河北故事欲復如唐河北諸鎮世襲不輸朝廷貢賦不受朝廷徴發建立陽許而密奏之都又以蠟書遺青徐潞益梓五帥離間之是時青帥霍彦威徐帥房知温潞帥毛璋益帥孟知祥梓帥董璋皆倔强難制者也遺唯季翻下金遺同間古莧翻又遣人説北面副招討使歸德節度使王晏球説式芮翻晏球不從乃以金遺晏球帳下使圖之不克遺唯季翻癸巳晏球以都反狀聞詔宣徽使張延朗與北面諸將議討之北面諸將謂招討王晏球及所部戍幽易間諸將及幽州帥趙德鈞也戊戌吳徙常山王濛為臨川王庚子詔削奪王都官爵壬寅以王晏球為北面招討使權知定州行州事以横海節度使安審通為副招討使以鄭州防禦使張䖍釗為都監監古銜翻發諸道兵㑹討定州是日晏球攻定州拔其北闗城權知定州行州事者以未得定州城使王晏球權知行州事於城外以招撫定州之民葢此命未頒晏球之兵已至定州城下矣都以重賂求救於奚酋托諾托諾即圍莊宗者虜酋之桀也酋慈秋翻五月托諾以萬騎突入定州晏球退保曲陽曲陽漢之上曲陽縣隋改為恒陽唐元和十五年更名曲陽避穆宗名也屬定州九域志縣在州西六十里都與托諾就攻之晏球與戰於嘉山下大破之托諾以二千騎奔還定州晏球追至城門因進攻之得其西闗城定州城堅不可攻晏球増修西闗城以為行府置招討使行府及定州行州于西闗城使三州民輸税供軍食而守之三州定祁易也王晏球之攻定州以持久弊之此其先定之計也辛酉以天雄節度副使趙敬怡為樞密使王晏球聞契丹發兵救定州將大軍趣望都趣七喻翻遣張延朗分兵退保新樂九域志望都縣在定州東北六十里新樂縣在州西南五十里延朗遂之真定之往也同光初建北都於鎮州以鎮州為真定府尋廢北都而真定府不廢九域志自新樂縣西南至真定七十里留趙州刺史朱建豐將兵修新樂城契丹已自它道入定州與王都夜襲新樂破之殺建豐乙丑王晏球張延朗㑹於行唐九域志行唐縣在真定府北五十五里丙寅至曲陽自行唐西北至曲陽三十許里王都乗勝悉其衆與契丹五千騎合萬餘人邀晏球等於曲陽丁卯戰于城南晏球集諸將校令之曰王都輕而驕將即亮翻校戸教翻令魯定翻輕牽正翻可一戰擒也今日諸君報國之時也悉去弓矢去羌吕翻以短兵擊之回顧者斬於是騎兵先進奮檛揮劍直衝其陳大破之僵尸蔽野用短兵則將士齊致死直衝其陳則敵不及拒北人所恃者弓矢既入其陳皆不得用而檛劍所及不死則傷是以甚敗檛則𤓰翻僵居良翻陳讀曰陣契丹死者過半過音戈餘衆北走都與托諾得數騎僅免盧龍節度使趙德鈞邀擊契丹北走者殆無子遺孑吉列翻單也言無單孑得遺也吳遣使求和於楚請苗璘王彦章楚王殷歸之使許德勲餞之德勲謂二人曰楚國雖小舊臣宿將猶在願吳朝勿以措懐朝直遥翻必俟衆駒爭皁棧皁才早翻棧土限翻皁馬櫪也棧以竹木藉之然後可圖也時殷多内寵嫡庶無别諸子驕奢故德勲語及之别彼列翻其後馬氏諸子爭國南唐乗而取之卒如許德勲之言然德勲相楚知其將亂不以告戒其主而以語鄰國之人非忠也左傳鄭子太叔謂晉張趯有智然猶在君子之後者正此類也六月辛巳髙季興復請稱藩于吳吳徐温議不受髙季興稱臣見上巻上年五月吳進季興爵秦王帝詔楚王殷討之殷遣許德勲將兵攻荆南以其子希範為監軍次沙頭次沙頭則已逼江陵矣季興從子雲猛指揮使從嗣單騎造楚壁請與希範挑戰决勝副指揮使廖匡齊出與之鬭拉殺之從子才用翻造七到翻挑徒了翻廖力救翻拉盧合翻季興懼明日請和德勲還匡齊贑人也還從宣翻又如字贑縣屬䖍州贑音紺王晏球知定州有備未易急攻易以豉翻朱𢎞昭張䖍釗宣言大將畏怯有詔促令攻城晏球不得已乙未攻之殺傷將士三千人張䖍釗不知鑒定州之事其後急攻鳳翔以致敗國身為亡虜其誤明宗之社稷多矣先是詔發西川兵戍夔州備髙季興也先昔薦翻孟知祥遣左肅邊指揮使毛重威將三千人往頃之知祥奏夔忠萬三州已平請召戍兵還還從宣翻又如字以省饋運孟知祥恐戍兵為唐所留坐自削弱故請召還帝不許知祥隂使人誘之誘音酉重威帥其衆鼓譟逃歸帝命按其罪知祥請而免之史言唐之威令不行於蜀中陜州行軍司馬王宗壽請葬故蜀主王衍王衍死于長安見二百七十四巻元年陜失冉翻秋七月贈衍順正公以諸侯禮葬之王宗壽許州民家子也王建以其同姓録之為子事王衍數直諫衍不聽以至亡國衍死宗壽東遷至澠池聞莊宗遇弑逃入熊耳山至是復出詣京師求衍宗族葬之帝嘉其忠為保義行軍司馬得衍等十八喪葬長安南三趙村北面招討使安審通卒招討之下當有副字東都民有犯私麴者留守孔循族之或請聽民造麴而於秋税畆收五錢己未勅從之按唐初無𣙜酒之法德宗建中三年初𣙜天下酒悉令官釀斛收直三千米雖賤不得减二千委州縣綜領醨薄私釀罪有差京師特免𣙜元和六年京兆府奏𣙜酒錢除出正酒戸外一切隨兩税青苗據貫均率㑹昌六年勅楊州八道置𣙜麴并置官店沽酒代百姓納𣙜酒并充資助軍用有人私沽酒及置私麴者罪止一身至是以孔循過行酷法勅應三京鄴都諸道州府鄉村人户於夏秋田苗上每畆納麴錢五文足陌任百姓造麴醖酒供家其錢隨夏秋徴納並不折色其京都父諸道縣鎮坊界及闗城草市内應逐年賣官麴酒戸便許自造麴醖酒貨賣應諸處麴務仰十分減八分價錢出賣不得更請官本踏造麴音曲壬戌契丹復遣酋長特哩衮將七千騎救定州復扶又翻王晏球逆戰於唐河北惕它力翻水經注滱水出代郡靈丘縣髙氏山東南過中山上曲陽縣又東過唐縣謂之唐河大破之甲子追至易州時久雨水漲契丹為唐所俘斬及陷溺死者不可勝數勝音升戊辰以威武節度使王延鈞為閩王契丹北走道路泥濘濘乃定翻人馬饑疲入幽州境八月壬戌趙德鈞遣牙將武從諫將精騎邀擊之分兵扼險要生擒特哩衮數百人餘衆散投村落村民以白梃擊之梃徒頂翻其得脱歸國者不過數十人自是契丹沮氣不敢輕犯塞沮在吕翻初莊宗徇地河北獲小兒畜之宫中及長畜吁玉翻長知兩翻賜姓名李繼陶帝即位縱遣之王都得之使衣黄袍坐堞間歐史曰帝即位安重誨出繼陶以乞段徊徊亦惡而逐之都使人求得之衣於既翻堞達協翻謂王晏球曰此莊宗皇帝子也已即帝位公受先朝厚恩曽不念乎王晏球即杜晏球莊宗之滅梁也晏球以軍降莊宗賜以姓名而用之王都欲以此動晏球晏球曰公作此小數竟何益吾今教公二策不悉衆决戰則束手出降耳自餘無以求生也王建立以目不知書請罷判三司不許乙未吳大赦吳越王鏐欲立中子傳瓘為嗣中讀曰仲謂諸子曰各言汝功吾擇多者而立之言欲擇功多者立以為嗣傳瓘兄傅璹傳璙傳璟皆推傳瓘璹殊六翻璙力弔翻又力小翻璟于景翻又古永翻乃奏請以兩鎮授傳瓘閏月丁未詔以傳瓘為鎮海鎮東節度使戊申趙德鈞獻契丹俘特哩衮諸將皆請誅之帝曰此曹皆虜中之驍將殺之則虜絶望不若存之以紓邊患紓商居翻緩也乃赦特哩衮酋長五十人置之親衞後唐葢倣盛唐之制朝㑹立仗有親勲翊三衞餘六百人悉斬之為契丹屢求特哩衮張本契丹遣美楞濟蘓等入貢初盧文進來降事見上巻元年契丹以蕃漢都提舉使張希崇代之為盧龍節度使守平州遣親將以三百騎監之監工銜翻希崇本書生為幽州牙將没於契丹歐史曰劉守光使張希崇戍平州契丹陷平州得之性和易契丹將稍親信之易以豉翻將即亮翻因與其部曲謀南歸部曲泣曰歸固寢食所不忘也然虜衆我寡奈何希崇曰吾誘其將殺之誘音酉兵必潰去此去虜帳千餘里比其知而徴兵比必利翻及也吾屬去逺矣衆曰善乃先為穽實以石灰穽才性翻石灰鑿取山石煅之為灰今在處有之明日召虜將飲醉并從者殺之投諸穽中從才用翻其營在城北亟發兵攻之此所發者漢兵也契丹衆皆潰去希崇悉舉其所部二萬餘口來奔詔以為汝州刺史歐史曰以為汝州防禦使吳王太后殂吳主之母王氏也九月辛巳荆南敗楚兵于白田執楚岳州刺史李廷規歸于吳九域志岳州巴陵縣有白田鎮時荆南稱藩干吳敗補賣翻乙未勅以温韜發諸陵段凝反覆令所在賜死去年温韜流德州段凝流遼州己亥以武寧節度使房知温兼荆南行營招討使知荆南行府事分遣中使發諸道兵赴襄陽以討髙季興前年劉訓討荆南不克今復招討之辛丑徙慶州防禦使竇廷琬為金州刺史冬十月廷琬據慶州拒命丙午以横海節度使李從敏兼北面行營副招討使代安審通也從敏帝之從子也從子才用翻戊申詔靜難節度使李敬通發兵討竇廷琬慶州靜難軍巡屬也故使討之難乃旦翻王都據定州守備固伺察嚴伺相吏翻諸將屢有謀翻城應官軍者皆不果帝遣使者促王晏球攻城晏球與使者聯騎巡城騎竒計翻指之曰城髙峻如此借使主人聽外兵登城亦非梯衝所及梯雲梯衝衝車徒多殺精兵無損於賊如此何為不若食三州之租愛民養兵以俟之彼必内潰帝從之用兵之術攻城最難然攻城有二術城有外援則須悉力急攻以求必克城無外援則持久以弊之在我者兵力不損而坐收全勝古之善用兵者皆知此術也十一月有司請為哀帝立廟詔立廟於曹州為于偽翻梁太祖開平二年弑唐哀帝于曹州事見二百六十六巻平盧節度使晉忠武公霍彦威卒忠州刺史王雅取歸州忠州時屬夔州寧江軍西方鄴所部也歸州時屬荆南軍髙季興所部也庚寅皇子從厚納孔循女為妃循因之得之大梁時孔循兼留守東都帝在大梁得之者得往也有職守者不得擅離職守今循因嘉禮得至行在所得之本或作得至按唐都洛陽以大梁為東都孔循職守在東都而曰得之大梁者葢安重誨怒孔循自樞密出為忠武帥兼東都留守時帝在大梁循未得領留守之職今因嫁女得至東都耳以下文促令歸鎮明之可以知矣厚結王德妃之黨乞留安重誨具奏其事力排之禮畢嘉禮畢也促令歸鎮復歸忠武軍所鎮甲午以中書侍郎同平章事王建立同平章事充平盧節度使丙申上問趙鳳帝王賜人鐵劵何也對曰與之立誓令其子孫長享爵禄耳上曰先朝受此賜者止三人薛居正五代史莊宗同光二年正月甲寅帝御中興殿面賜郭崇韜鐵劵二月丁亥賜李嗣源鐵劵三年賜朱友謙姓名李繼麟入屬籍賜鐵劵崇韜繼麟尋皆族滅二人族滅事見二百七十四巻元年朝直遥翻朕得脱如毫釐耳帝為莊宗所猜忌又困於讒事始於二百七十三巻同光三年取鄴都細鎧之時訖于二百七十四巻元年出鄴都在魏縣之日因歎息久之趙鳳曰帝王心存大信固不必刻之金石也十二月甲辰李敬周奏拔慶州族竇廷琬荆南節度使髙季興寢疾命其子行軍司馬忠義節度使同平章事從誨權知軍府事丙辰季興卒天考異曰唐明宗實録成三年十一月壬午房知温奏髙季興卒烈祖實錄亦云乾貞二年十一月季興卒葢傳聞之誤按陶榖季興神道碑及勃海行年記皆云十二月十五日卒今從之吳主以從誨為荆南節度使兼侍中髙從誨字遵聖季興長子也史館修撰張昭逺上言臣竊見先朝時皇弟皇子皆喜俳優喜許計翻入則飾姬妾出則誇僕馬習尚如此何道能賢言何道而能為賢人也諸皇子宜精擇師傅令皇子屈身師事之講禮義之經論安危之理古者人君即位則建太子所以明嫡庶之分塞禍亂之源今卜嗣建儲臣未敢輕議至於恩澤賜與之間昏姻省侍之際嫡庶長幼宜有所分示以等威絶其僥冀分扶問翻塞昔則翻省昔井翻長知兩翻僥堅堯翻帝賞歎其言而不能用自梁開平以來至于天成惟張昭逺一疏能以所學而論時事耳不有儒者其能國乎惜其言之不用也史言賞歎而不能用嗚呼帝之賞歎者亦由時人言張昭逺儒學而賞歎之耳豈知所言深有益於人之國哉閩王延鈞度民二萬為僧由是閩中多僧河東節度使北都留守從榮年少驕狠少詩照翻狠户懇翻不親政務帝遣左右素與從榮善者往與之處使從容諷導之處昌吕翻從千容翻其人私謂從榮曰河南相公恭謹好善親禮端士有老成之風從厚時為河南尹故稱之為河南相公端士正士也好音呼到翻相公齒長長知兩翻言從榮之年長於從厚也宜自策勵勿令聲問出河南之下從榮不悦退告步軍都指揮使楊思權曰朝廷之人皆推從厚而短我我其廢乎思權曰相公手握强兵且有思權在何憂因勸從榮多募部曲繕甲兵隂為自固之備觀從榮之問與楊思權之對其所以求自安者乃所以自危也又謂帝左右曰君每譽弟而抑其兄譽音余我輩豈不能助之邪其人懼以告副留守馮贇贇密奏之帝遣左右諷導從榮是其密受上指最為親切從榮之不悦楊思權之脅持凡此情狀其人當密以奏聞安得以告馮贇而待贇奏之也此其間必有曲折帝召思權詣闕以從榮故亦弗之罪也帝不罪楊思權其後遂為從厚之禍然二子嫌隙已搆雖罪思權亦末如之何矣四年春正月馮贇入為宣徽使謂執政曰從榮剛僻而輕易易以䜴翻宜選重德輔之王都托諾欲突圍走不得出二月癸丑定州都指揮使馬讓能開門納官軍都舉族自焚擒托諾及契丹二千人王晏球自去年四月攻王都至是克之辛亥以王晏球為天平節度使與趙德鈞並加兼侍中賞王晏球以平王都之功也賞趙德鈞以擒特哩衮功也托諾至大梁斬於市樞密使趙敬怡卒甲子帝發大梁丁卯門下侍郎同平章事崔協卒於須水唐初置須水縣貞觀中併入鄭州管城縣九域志鄭州滎陽縣有須水鎮卒音子恤翻庚午帝至洛陽二年冬十月帝如大梁至是還洛陽王晏球在定州城下日以私財饗士自始攻至克城未嘗戮一卒三月辛巳晏球入朝帝美其功晏球謝久煩饋運而已史言王晏球有功而不伐皇子右衞大將軍從璨性剛安重誨用事從璨不為之屈為于偽翻帝東巡即謂如大梁時也以從璨為皇城使從璨與客宴於㑹節園㑹節園在洛陽城中張全義鎮洛嵗久私第在㑹節坊室宇園池為一時巨麗輸之官以為㑹節園酒酣戲登御榻凡御園設御榻遊幸之所御也重誨奏請誅之丙戌賜從璨死横山蠻寇邵州邵州漢為昭陵縣屬長沙國東漢屬長沙零陵二郡又改昭陵為昭陽縣吳立邵陵郡晉武帝改昭陽曰邵陽縣隋廢郡唐置南梁州改為邵州時屬楚境楚王殷命其子武安節度副使判長沙府希聲知政事總録内外諸軍事自是國政先歴希聲乃聞於殷希聲字若訥殷次子也為殺髙郁張本夏四月庚子朔禁鐵錫錢時湖南專用錫錢銅錢一直錫錢百流入中國法不能禁馬殷得湖南鑄錫為錢本用之境内其後遂流入中國五代㑹要同光二年三月勅泉布之弊雜以鉛錫江湖之外盜鑄尤多市肆之間公行無畏因是縱商挾帶舟載往來換易好錢藏貯富室實為蠧弊須有條流宜令京城及諸道于市行使錢内㸃檢雜惡鉛錫並宜禁斷沿江州縣每有舟船到岸嚴加覺察若私載往來並宜收納天成元年十二月敕行使銅錢之内如聞挾帶鐵錢若不嚴加科流轉恐私加鑄造應中外所使銅錢内鐵鑞錢即宜毁棄不得輒更有行使如違其所使錢不計多少並納入官仍科深罪葢鐵錫錢之禁舊矣今又申嚴之而不能禁也丙午楚六軍副使王環敗荆南兵于石首敗補賣翻初令縁邊置場市党項馬不令詣闕先是党項皆詣闕以貢馬為名國家約其直酬之加以館榖賜與嵗費五十餘萬緡有司苦其耗蠧故止之五代㑹要曰自上御極以來党項之衆競赴闕下賣馬常賜食於禁廷醉則連袂歌其土風凡將到馬無駑良並云上進雖約給價直然館給賜賚耗蠧為多雖降敕止之竟不能行党底朗翻壬子以皇子從榮為河南尹判六軍諸衙事從厚為河東節度使北都留守兩易二子之任契丹寇雲州甲寅以端明殿學士兵部侍郎趙鳳為門下侍郎同平章事五月乙酉中書言太常改諡衷帝曰昭宣光烈孝皇帝廟號景宗既稱宗則應入太廟在别廟則不應稱宗哀帝廟在曹州乃去廟號去羌吕翻帝將祀南郊遣客省使李仁矩以詔諭兩川令西川獻錢一百萬緡東川五十萬緡皆辭以軍用不足西川獻五十萬緡東川獻十萬緡仁矩帝在藩鎮時客將也為安重誨所厚恃恩驕慢至梓州東川節度治梓州董璋置宴召之日中不往方擁妓酣飲妓渠綺翻璋怒從卒徒執兵入驛立仁矩於階下而詬之曰公但聞西川斬李客省詬古候翻又許侯翻李客省謂李嚴也斬李嚴見上巻二年謂我獨不能邪仁矩流涕拜請僅而得免既而厚賂仁矩以謝之欲以賂絶其口仁矩還言璋不法未幾幾居啟翻帝復遣通事舍人李彦珣詣東川復扶又翻入境失小禮璋拘其從者從才用翻彦珣奔還還從宣翻又如字髙季興之叛也見上巻二年其子從誨切諫不聽從誨既襲位謂僚佐曰唐近而吳逺非計也乃因楚王殷以謝罪於唐又遺山南東道節度使安元信書遺惟季翻求保奏復修職貢丙申元信以從誨書聞帝許之契丹寇雲州一月之間再寇雲州者契丹主耶律德光漸西徙也六月戊申復以鄴都為魏州莊宗同光元年即位于魏州以魏州為興唐府建東京既遷洛同光三年復唐之舊以洛陽為東都改魏州之東京為鄴都今復以為魏州留守皇城使並停庚申髙從誨自稱前荆南行軍司馬歸州刺史上表求内附秋七月甲申以從誨為荆南節度使兼侍中己丑罷荆南招討使討京南事始上巻二年今以其内附罷兵八月吳武昌節度使兼侍中李簡以疾求還江都揚州治江都縣吳所都也癸丑卒于採石徐知詢簡壻也擅留簡親兵二千人于金陵徐知詢時代父温鎮金陵表薦簡子彦忠代父鎮鄂州武昌節度使治鄂州徐知誥以龍武綂軍柴再用為武昌節度使知詢怒曰劉崇俊兄之親三世為濠州吳初用劉金為濠州刺史金卒子仁規代之仁規卒子崇俊代之彦忠吾妻族獨不得邪初楚王殷用都軍判官髙郁為謀主馬殷初得潭州即用髙郁為謀主國賴以富强如收茶征令民種桑以繒纊充賦之類鄰國皆疾之莊宗入洛殷遣其子希範入貢見二百七十二巻莊宗同光元年莊宗愛其警敏曰比聞馬氏當為髙郁所奪今有子如此郁安能得之此言所以間髙郁也比毗至翻髙季興亦以流言間郁於殷間古莧翻殷不聽乃遣使遺節度副使知政事希聲書遺惟季翻盛稱郁功名願為兄弟使者言於希聲曰髙公常云馬氏政事皆出髙郁此子孫之憂也希聲信之行軍司馬楊昭遂希聲之妻族也謀代郁任日譖之於希聲希聲屢言於殷稱郁奢僭且外交鄰藩請誅之殷曰成吾功業皆郁力也汝勿為此言希聲固請罷其兵柄乃左遷郁行軍司馬郁謂所親曰亟營西山吾將歸老西山即長沙西岸嶽麓諸山也猘子漸大能咋人矣猘征例翻犬强為猘咋鉏陌翻齧也希聲聞之益怒明日矯以殷命殺郁於府舍府舍荆南軍府署舍也牓諭中外誣郁謀叛并誅其族黨至暮殷尚未知是日大霧殷謂左右曰吾昔從孫儒度淮唐昭宗光啟三年馬殷從孫儒度淮事見二百五十七巻每殺不辜多致茲異馬步院豈有寃死者乎時諸鎮皆有馬步司置獄院以鞫囚今大藩亦有兵馬司明日吏以郁死告殷撫膺大慟曰吾老耄政非已出使我勲舊横罹寃酷横戸孟翻既而顧左右曰吾亦何可久處此乎葢是時馬殷尸居而已不復能制其子處昌吕翻九月上與馮道從容語及年榖屢登從千容翻屢龍遇翻四方無事道曰臣常記昔在先皇幕府謂為河東掌書記時也奉使中山歴井陘之險自太原使中山經井陘之道陘音刑臣憂馬蹶執轡甚謹幸而無失逮至平路放轡自逸俄至顛隕凡為天下者亦猶是也上深以為然上又問道今嵗雖豐百姓贍足否道曰農家嵗凶則死於流殍殍被表翻嵗豐則傷於榖賤豐凶皆病者惟農家為然臣記進士聶夷中詩云二月賣新絲五月糶新榖醫得眼下瘡剜却心頭肉語雖鄙俚曲盡田家之情狀謂絲榖未熟農家艱食先稱貸以自給至於賣絲糶榖僅足以償債耳聶尼輒翻糶它弔翻剜烏丸翻農於四人之中最為勤苦士農工商是謂四民唐避太宗諱率謂民為人人主不可不知也上悦命左右録其詩常諷誦之鄜州兵戍東川者歸本道鄜音夫董璋擅留其壯者選羸老歸之羸倫為翻仍收其甲兵癸巳西川右都押牙孟容弟為資州税官坐自盜抵死律監臨自盜贓重者至死抵至也觀察判官馮瑑中門副使王處回為之請瑑柱兖翻為于偽翻孟知祥曰雖吾弟犯法亦不可貸况它人乎吳越王鏐居其國好自大朝廷使者曲意奉之則贈遺豐厚不然則禮遇疎薄好呼到翻遺惟季翻下同嘗遺安重誨書辭禮頗倨薛史曰錢鏐致書安重誨云吳越國王致書干某官執事不叙寒暄重誨怒其無禮帝遣供奉官烏昭遇國考畢曰吳越備史十紀年皆云監門衞上將軍葢借官耳今從實録等諸書韓玫使吳越玫莫杯翻昭遇與玫有隙使還使疏吏翻還從宣翻又如字玫奏昭遇見鏐稱臣拜舞謂鏐為殿下及私以國事告鏐安重誨奏賜昭遇死癸巳制鏐以太師致仕自餘官爵皆削之凡吳越進奏官使者綱吏令所在繫治之治直之翻鏐令子傳瓘等上表訟寃皆不省省悉井翻初朔方節度使韓洙卒梁均王乾化四年韓洙嗣鎮朔方弟澄為留後未幾定逺軍使李匡賔聚黨據保靜鎮作亂幾居豈翻保靜隋之𢎞靜縣也唐神龍元年改曰安靜至德元載改曰保靜縣屬靈州宋白保靜鎮在黄河北岸朔方不安冬十月丁酉韓澄遣使齎絹表乞朝廷命帥帥所類類前磁州刺史康福善胡語上退朝多召入便殿訪以時事福以胡語對安重誨惡之惡其以胡語奏事在左右者莫之曉也惡烏路翻常戒之曰康福汝但妄奏事㑹當斬汝福懼求外補重誨以靈州深入胡境為帥者多遇害戊戌以福為朔方河西節度使唐之盛時河西節度使治凉州與朔方隴西並為縁邊大鎮肅代以後淪陷宣宗大中間收復然隔以吐蕃党項朝廷懸屬而已至于唐末以朔方兼節度河西然亦聲勢不接趙珣聚米圖經靈州西至凉州九百里福見上涕泣辭之上命重誨為福更它鎮為干偽翻更工行翻重誨曰福自刺史無功建節尚復何求復扶又翻且成命已行難以復改上不得已謂福曰重誨不肯非朕意也福辭行上遣將軍牛知柔河中都指揮使衞審􅀈等將兵萬人衞送之審􅀈徐州人也􅀈與都同辛亥割閬果二州置保寧軍壬子以内客省使李仁矩為節度使欲以制兩川也為李仁矩敗没張本按職官分紀五代有内客省使客省使副使各一官通鑑於天成元年三月書客省使李仁矩今書内客省使豈自客省使陞為内客省使邪先是西川常發芻糧饋峽路先悉薦翻孟知祥辭以本道兵自多難以奉它鎮峽路時别為寧江軍故云然詔不許屢督之甲寅知祥奏稱財力乏不奉詔吳諸道副都綂鎮海寧國節度使兼侍中徐知詢自以握兵據上流金陵在廣陵上流意輕徐知誥數與知誥爭權内相猜忌數所角翻知誥患之内樞密使王令謀曰公輔政日久挾天子以令境内誰敢不從知詢年少恩信未洽於人無能為也少詩照翻知詢待諸弟薄諸弟皆怨之徐玠知知詢不可輔反持其短以附知誥徐玠本勸徐温以知詢代知誥者也其事見本巻上年十月吳越王鏐遺知詢金玉鞍勒器皿皆飾以龍鳳知詢不以為嫌乗用之錢鏐以此間徐知詢知詢不之覺其庸昧如此路振九國志以為錢𢎞佐所遺非也知詢典客周廷望説知詢曰公誠能捐寶貨以結朝中勲舊使皆歸心於公則彼誰與處説式芮翻朝直遥翻處昌吕翻彼謂徐知誥也知詢從之使廷望如江都諭意諭音喻廷望與知誥親吏周宗善密輸欵於知誥欵誠也亦以知誥隂謀告知詢周廷望處人兄弟之間而反覆兩端固取死之道也知詢召知誥詣金陵除父温喪知誥稱吳主之命不許周宗謂廷望曰人言侍中有不臣七事徐知詢之代父鎮金陵也加侍中故以稱之宜亟入謝誘之入朝徐知誥之計也廷望還以告知詢十一月知詢入朝知誥留知詢為綂軍領鎮海節度使遣右雄武都指揮使柯厚徴金陵兵還江都姓譜柯姓吳公子柯盧之後又拓拔興諸姓有柯拔氏改為柯氏知誥自是始專吳政史言徐知誥之篡事至此方成知詢責知誥曰先王違世先王謂徐温也兄為人子初不臨喪可乎知誥曰爾挺劍待我挺待鼎翻拔也我何敢往爾為人臣畜乗輿服御物亦可乎畜敕六翻乗繩證翻謂知詢用錢鏐所遺龍鳳飾鞍勒器皿也天子服用之物謂之乗輿物知詢又以廷望所言詰知誥詰去吉翻知誥曰以爾所為告我者亦廷望也遂斬廷望壬辰吳主加尊號曰睿聖文明光孝皇帝大赦改元大和康福行至方渠羌胡出兵邀福福擊走之至青剛峽自方渠槖駞路出青岡峽過旱海至靈州趙珣聚米圖經曰環州洪德寨歸德青剛兩川歸德川在洪德東透入鹽州青剛川在洪德西北本靈州大路自此過美利寨入浦洛河至耀德清邊鎮入靈州自過美利寨後漸入平夏經旱海中難得水泉遇吐蕃野利大蟲二族數千帳皆不覺唐兵至福遣衞審􅀈掩擊大破之殺獲殆盡由是威聲大振遂進至靈州自是朔方始受代十二月吳加徐知誥兼中書令領寧國節度使徐知誥奪知詢寧國節而自領之知誥召徐知詢飲以金鍾酌酒賜之曰願弟壽千嵗知詢疑有毒引它器均之跽獻知誥曰願與兄各享五百嵗跽其几翻䠆跽也知誥變色左右顧不肯受知詢捧酒不退左右莫知所為伶人申漸髙徑前為詼諧語掠二酒合飲之不以禮取之為掠合音閤懐金鍾趨出知誥密遣人以良藥解之己腦潰而卒賜考異曰鄭文寳南唐近事烈祖曲宴便殿引酖􅘑周本本疑而不飲佯醉别引一巵均酒之半跪捧而進曰陛下千萬嵗陛下若不飲此非君臣同心同德之義也臣不敢奉詔上色變無言久之左右皆相顧流汗莫知所從伶倫申漸髙有機智者竊諭其㫖乃乗詼諧盡併兩盞以飲之内杯于懐中亟趍而出上密使親信持良藥詣其私第解之已不及矣漸髙腦潰而卒江表志烈祖曲宴引金鍾賜知詢酒曰願我弟百千長壽知詢疑懼引它器均之曰願與兄各享五百嵗知誥不飲久之樂工申漸髙乗詼諧併而飲之至家腦潰而卒二書皆出文寶而不同乃爾按知誥既即位欲除周本自應多方不須如此云酖知詢近是今從之奉國節度使知建州王延稟稱疾退居里第請以建州授其子繼雄庚子詔以繼雄為建州刺史時王延稟既與王延鈞弑其君延翰兵强權重建州又居福州上流勢陵延鈞故不復稟命于延鈞而專達洛陽安重誨既以李仁矩鎮閬州使與綿州刺史武䖍裕皆將兵赴治赴治者赴治所也䖍裕帝之故吏重誨之外兄也重誨使仁矩詗董璋反狀詗火迥翻又翾正翻仁矩増飾而奏之朝廷又使武信節度使夏魯竒治遂州城隍治直之翻繕甲兵益兵戍之璋大懼時道路傳言又將割綿龍為節鎮孟知祥亦懼分閬遂為節鎮欲以制東川也故董璋懼綿州逼近成都而前州又鄧艾入蜀之道也武䖍裕既刺綿州是亦有分鎮之漸矣重以傳聞故孟知祥亦懼璋素與知祥有隙未嘗通問至是璋遣使詣成都請為其子娶知祥女為于偽翻知祥許之謀併力以拒朝廷為兩川連兵攻陷遂閬張本資治通鑑巻二百七十六
