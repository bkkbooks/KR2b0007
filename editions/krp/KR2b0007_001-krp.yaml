  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑巻一宋司馬光撰胡三省音註周紀一起著雍攝提格盡𤣥黓困敦凡三十五年丙爾雅曰太嵗在甲曰閼逢在乙曰旃䝉在曰柔兆在丁曰彊圉在戊曰著雍在己曰屠維在庚曰上章在辛曰重光在壬曰𤣥黓在癸曰昭陽是為嵗陽在寅曰攝提格在卯曰單閼在辰曰執徐在巳曰大荒落在午曰敦牂在未曰協洽在申曰涒灘在酉曰作噩在戌曰掩茂在亥曰大淵獻在子曰困敦在丑曰赤奮若是為嵗名周紀分註起著雍攝提格起戊寅也盡𤣥黓困敦盡壬子也閼讀如字史記作焉於乾翻著陳如翻雍於容翻黓逸職翻單閼上音丹又特連翻下烏葛翻又於連翻牂作郎翻涒吐䰟翻灘吐丹翻困敦音頓杜預世族譜曰周黄帝之苖裔姬姓后稷之後封于邰及夏衰稷子不窟竄于西戎至十二代孫太王避狄遷岐至孫文王受命武王克商而有天下自武王至平王凡十三世自平王至威烈王又十八世自威烈王至赧王又五世張守節曰因太王居周原國號曰周地理志云右扶風美陽縣岐山西北中水鄉周太王所邑括地志云故周城一名美陽城在雍州武功縣西北二十五里紀理也統理衆事而繫之年月温公繫年用春秋之法因史漢本紀而謂之紀邰湯來翻夏户雅翻窟竹律翻雍於用翻威烈王名午考王之子諡法猛以剛果曰威有功安民曰烈沈約曰諸複諡有諡人無諡法二十三年上距春秋獲麟七十八年距左傳趙襄子惎智伯事七十一年惎毒也音安冀翻初命晉大夫魏斯趙籍韓䖍為諸侯此温公書法所由始也魏之先畢公高後與周同姓其苖裔曰畢萬始封于魏至魏舒始為晉正卿三世至斯趙之先造父後至叔帶始自周適晉至趙夙始封於耿至趙盾始為晉正卿六世至籍韓之先出於周武王至韓武子事晉封於韓原至韓厥為晉正卿六世至䖍三家者世為晉大夫於周則陪臣也周室既衰晉主夏盟以尊王室故命之為伯三卿竊晉之權暴蔑其君剖分其國此王法所必誅也威烈王不惟不能誅之又命之為諸侯是崇奨姧名犯分之臣也通鑑始於此其所以謹名分歟臣光曰臣聞天子之職莫大於禮禮莫大於分分莫大於名分扶問翻下同何謂禮紀綱是也何謂分君臣是也何謂名公侯卿大夫是也夫以四海之廣夫以音扶兆民之衆受制於一人雖有絶倫之力高世之智莫不奔走而服役者豈非以禮為之紀綱哉是故天子統三公統他綜翻三公率諸侯諸侯制卿大夫卿大夫治士庶人治直之翻貴以臨賤賤以承貴上之使下猶心腹之運手足根本之制支葉下之事上猶手足之衞心腹支葉之庇本根然後能上下相保而國家治安治直吏翻故曰天子之職莫大於禮也文王序易以乾坤為首孔子繫之曰天尊地卑乾坤定矣卑高以陳貴賤位矣繫户計翻言君臣之位猶天地之不可易也春秋抑諸侯尊王室王人雖微序於諸侯之上以是見聖人於君臣之際未嘗不惓惓也惓逵貟翻漢劉向傳忠臣畎畝猶不忘君惓惓之義也惓惓猶言勤勤也非有桀紂之暴湯武之仁人歸之天命之君臣之分當守節伏死而已矣是故以微子而代紂則成湯配天矣史記商帝乙生三子長曰微子啓次曰中衍季曰紂紂之母為后帝乙欲立啓為太子太史據法爭之曰有妻之子不可立妾之子乃立紂紂卒以暴虐亡殷國孔𤣥義曰物之大者莫若於天推父比天與之相配行孝之大莫大於此所謂嚴父莫大於配天也又孔氏曰禮記稱萬物本乎天人本乎祖俱為其本可以相配故王者皆以祖配天諡法除殘去虐曰湯然諡法起於周盖殷人先有此號周人遂引以為諡法分扶問翻長知兩翻卒子恤翻以季札而君吳則太伯血食矣吳王夀夢有子四人長曰諸樊次曰餘祭次曰餘昧次曰季札季札賢夀夢欲立之季札讓不可於是立諸樊諸樊卒以授餘祭欲兄弟以次相傳必致國於季札季札終讓而逃之其後諸樊之子光與餘昧之子僚爭國至於夫差吳遂以亡宗廟之祭用牲故曰血食太伯吳立國之君范寗曰太者善大之稱伯者長也周太王之元子故曰太伯陸徳明曰夀夢莫公翻餘祭側介翻餘昧音末然二子寜亡國而不為者誠以禮之大節不可亂也故曰禮莫大於分也夫禮辯貴賤序親疏裁羣物制庶事非名不著非器不形名以命之器以别之夫音扶别彼列翻然後上下粲然有倫此禮之大經也名器既亡則禮安得獨在哉昔仲叔于奚有功於衞辭邑而請繁纓孔子以為不如多與之邑惟名與器不可以假人君之所司也政亡則國家從之左傳衞孫桓子帥師與績齊師戰于新築衞師敗新築人仲叔于奚救孫桓子桓子是以免既而衞人賞之邑辭請曲縣繁纓以朝許之孔子聞之曰不如多與之邑惟名與器不可以假人繁纓馬飾也繁馬鬛上飾纓馬膺前飾晉志註曰纓在馬膺如索帬繁音蒲官翻纓伊盈翻索昔各翻衞君待孔子而為政孔子欲先正名以為名不正則民無所措手足見論語夫繁纓小物也而孔子惜之正名細務也而孔子先之先悉薦翻誠以名器旣亂則上下無以相保故也夫事未有不生於微而成於著聖人之慮逺故能謹其微而治之治直之翻下同衆人之識近故必待其著而後救之治其微則用力寡而功多救其著則竭力而不能及也易曰履霜堅冰至坤初六爻辭象曰履霜堅冰隂始凝也馴致其道至堅冰也書曰一日二日萬幾臯陶謨之辭孔安國註曰幾微也言當戒懼萬事之微幾居依翻謂此類也故曰分莫大於名也分扶問翻嗚呼幽厲失徳周道日衰綱紀散壞下陵上替諸侯專征謂齊桓公晉文公至悼公以及楚荘王吳夫差之類大夫擅政謂晉六卿魯三家齊田氏之類禮之大體什䘮七八矣喪息浪翻然文武之祀猶緜緜相屬者屬聮屬也音之欲翻凡聮屬之屬皆同音蓋以周之子孫尚能守其名分故也何以言之昔晉文公有大功於王室請隧於襄王襄王不許曰王章也未有代徳而有二王亦叔父之所惡也不然叔父有地而隧又何請焉文公於是懼而不敢違太叔帶之難襄王出居于氾晉文公帥師納王殺太叔帶既定襄王于郟王勞之以地辭請隧焉王弗許云云杜預曰闕地通路曰隧此乃王者葬禮也諸侯皆縣柩而下王章者章顯王者異於諸侯古者天子謂同姓諸侯為伯父叔父隧音遂惡烏路翻難乃旦翻氾音汎勞力到翻闕其月翻縣音𤣥柩其久翻是故以周之地則不大於曹滕以周之民則不衆於邾莒曹滕邾莒春秋時小國莒居許翻然歴數百年宗主天下雖以晉楚齊秦之彊不敢加者何哉徒以名分尚存故也至於季氏之於魯田常之於齊白公之於楚智伯之於晉魯大夫季氏自季友以來世執魯國之政季平子逐昭公季康子逐哀公然終身北面不敢簒國田常即陳恒田氏本陳氏温公避國諱改恒曰常陳成子得齊國之政殺闞止弑簡公而亦不敢自立史記世家以陳敬仲完為田敬仲完陳成子恒為田常故通鑑因以為據白公勝殺楚令尹子西司馬子期石乞曰焚庫弑王不然不濟白公曰弑王不祥焚庫無聚智伯當晉之衰専其國政侵伐鄰國於晉大夫為最彊攻晉出公出公道死智伯欲并晉而不敢乃奉哀公驕立之其勢皆足以逐君而自為然而卒不敢者卒子恤翻終也豈其力不足而心不忍哉乃畏姧名犯分而天下共誅之也姧居寒翻亦犯也分扶問翻今晉大夫暴蔑其君剖分晉國史記六國年表定王十六年趙魏韓滅智伯遂三分晉國天子既不能討又寵秩之使列於諸侯是區區之名分復不能守而并棄之也陸徳明經典釋文凡復字其義訓又者並音扶又翻先王之禮於斯盡矣或者以為當是之時周室微弱三晉彊盛三家分晉國時因謂之三晉猶後之三秦三齊也雖欲勿許其可得乎是大不然夫三晉雖彊茍不顧天下之誅而犯義侵禮則不請於天子而自立矣不請於天子而自立則為悖逆之臣夫音扶悖蒲内翻又蒲没翻天下茍有桓文之君必奉禮義而征之今請於天子而天子許之是受天子之命而為諸侯也誰得而討之故三晉之列於諸侯非三晉之壞禮乃天子自壞之也壞音怪人毁之也烏呼君臣之禮旣壞矣此壞其義為成壞之壞讀如字則天下以智力相雄長長知兩翻遂使聖賢之後為諸侯者社稷無不泯絶謂齊宋亡於田氏魯陳越亡於楚鄭亡於韓也泯彌忍翻盡也又彌鄰翻毛晃曰没也滅也生民之類糜滅幾盡説文曰糜糝也取糜爛之義音忙皮翻幾居依翻又渠希翻近也豈不哀哉初智宣子将以瑶為後智果曰不如宵也韋昭曰智宣子晉卿荀躒之子申也瑤宣子之子智伯也謚曰襄子智果智氏之族也宵宣子之庻子也按謚法聖善周聞曰宣智氏溢美也瑶之賢於人者五其不逮者一也韋昭曰不仁也美鬢長大則賢通鑑俗傳寫者多作美鬚非也國語作美鬢今從之射御足力則賢伎藝畢給則賢巧文辯慧則賢韋昭曰給足也巧文巧於文辭也伎渠綺翻彊毅果敢則賢如是而甚不仁夫以其五賢陵人而以不仁行之其誰能待之韋昭曰待猶假也若果立瑶也智宗必滅弗聽智果别族於太史為輔氏此事見國語按左傳哀公二十三年晉荀瑶伐齊始見于傳哀二十三年史記元王五年也荀躒智文子也定十四年智文子猶見于傳智宣子之事傳無所考立瑶之議當在元王五年之前韋昭曰太史掌氏姓周禮春官之屬小史掌定世繫辯昭穆鄭司農注云史官主書故韓宣子聘魯觀書于太史世繫謂帝繫世本之屬是也小史主定之賈公彦疏曰註引太史證之者太史史官之長共其事故也蓋周之制小史定姓氏其書則太史掌之智果欲避智氏之禍故於太史别族宋祁國語補音别彼列翻又如字趙簡子之子長曰伯魯幼曰無恤趙簡子文子之孫鞅也謚法一徳不懈曰簡白虎通曰子孳也孳孳無已也趙岐曰子者男子之通稱也長知兩翻将置後不知所立乃書訓戒之辭於二簡孔頴達曰書者舒也書緯璇璣鈐云書者如也則書者寫其言如其意得展舒也世本曰沮誦蒼頡作書釋文曰書庻也紀庻物也亦言著也著之簡紙求不滅也簡竹策也以授二子曰謹識之識職吏翻記也三年而問之伯魯不能舉其辭求其簡已失之矣問無恤誦其辭甚習習熟也求其簡出諸袖中而奏之毛晃曰奏進上也於是簡子以無恤為賢立以為後簡子使尹鐸為晉陽姓譜尹少昊之子封于尹城子孫因為氏韋昭曰晉陽趙氏邑為治也班志曰晉陽故詩唐國周成王滅唐封弟叔虞龍山在西晉水所出東入汾臣瓚曰所謂唐今河東永安縣是也去晉四百里括地志曰晉陽故城今名晉城在蒲州虞鄉縣西今按水經注晉水出晉陽縣西龍山昔智伯遏晉水以灌晉陽其水分為二流北瀆即智氏故渠也洞過水出沾縣北山西過榆次縣南又西到晉陽縣南榆次縣南水側有鑿臺戰國策所謂智伯死於鑿臺之下即此處也參而考之晉陽故城恐不在蒲州水經注人云叔虞封於唐縣有晉水故改名為晉子夏序詩此晉也而謂之唐是也與班志合瓚説及括地志未知何據請曰以為繭絲乎抑為保障乎簡子曰保障哉繭絲謂浚民之膏澤如抽繭之緒不盡則不止保障謂厚民之生如築堡以自障愈培則愈厚宋祁曰障之亮翻又音章尹鐸損其戸數韋昭曰損其戸則民優而税少簡子謂無恤曰晉國有難而無以尹鐸為少而汝也難乃旦翻患也阨也少音多少之少重之為多輕之為少無以晉陽為逺必以為歸及智宣子卒卒子恤翻智襄子為政謚法有勞定國曰襄為政為晉國之政與韓康子魏桓子宴於藍臺韓康子韓宣子之曾孫荘子之子䖍也魏桓子魏獻子之子曼多之孫駒也謚法温柔恕恭曰康辟上服逺曰桓爾雅四方而高曰臺智伯戲康子而侮段規姓譜段鄭共叔段之後智國聞之諫曰主不備難難必至矣春秋以來大夫之家臣謂大夫曰主難乃旦翻下同智伯曰難将由我我不為難誰敢興之對曰不然夏書有之一人三失怨豈在明不見是圖書五子之歌之辭夏戸雅翻見賢遍翻發見也著也形也夫君子能勤小物故無大患今主一宴而恥人之君相夫音扶段規韓康子之相也相息醤翻下同又弗備曰不敢興難無乃不可乎蜹蟻蜂蠆皆能害人宋祁曰蜹如蜕翻人字林乂劣翻秦人謂蚊為蜹今按蜹小蟲日中羣集人之肌膚而嘬其血蚊之類也蜂細腰而能螫人蠆亦毒蟲長尾音丑邁翻况君相乎弗聽智伯請地於韓康子康子欲弗與段規曰智伯好利而愎不與将伐我不如與之彼狃於得地好呼到翻愎弼力翻狠也狃女九翻驕忲也又相狎也必請於他人他人不與必嚮之以兵然後我得免於患而待事之變矣康子曰善使使者致萬家之邑於智伯毛晃曰邑都邑四井為邑四邑為丘邑方二里丘方四里載師以公邑之田任甸地以家邑之田任稍地註公邑謂六遂餘地家邑大夫之采地此又與四井之邑不同又都國都邑縣也左傳凡邑有先君宗廟之主曰都無曰邑邑曰築都曰城此謂大縣邑也杜預引周禮四縣為都四井為邑恐誤四井之邑方二里豈能容宗廟城郭如論語十室之邑西都賦都都相望邑邑相屬則是四縣四井之都邑也若千室之邑萬家之邑則非井邑矣項安世曰小司徒井牧田野以四井為邑凡三十六家除公田四夫凡三十二家遂大夫㑹為邑者之政以里為邑凡二十五家遂大夫蓋論里井之制二十五家共一里門即六鄉之二十五家為一閭也小司徒蓋論溝洫之制四井為邑共用一溝即匠人所謂井間廣四尺深四尺謂之溝也居則度人之衆寡溝則度水之衆寡此其所以異歟毛項二説皆明周制參而考之戰國之所謂邑非周制矣致送至也智伯悦又求地於魏桓子桓子欲弗與任章曰何故弗與任章魏桓子之相也姓譜黄帝二十五子十二人各以徳為姓第一曰任氏又任為風姓之國實太昊之後主濟祀今濟州任城即其地任市林翻桓子曰無故索地故弗與任章曰無故索地諸大夫必懼索山客翻求也吾與之地智伯必驕彼驕而輕敵此懼而相親以相親之兵待輕敵之人智氏之命必不長矣周書曰将欲敗之必姑輔之将欲取之必姑與之逸書也敗補邁翻主不如與之以驕智伯然後可以擇交而圖智氏矣奈何獨以吾為智氏質乎質脂利翻物相綴當也又質讀如字亦通質謂椹質也質的也椹質受斧質的受矢言智伯怒魏桓子必加兵於魏如椹質之受斧質的之受矢也桓子曰善復與之萬家之邑一復扶又翻智伯又求蔡臯狼之地於趙襄子康曰臯姑勞切狼盧當切春秋蔡地後為趙邑余據春秋之時晉楚爭盟晉不能越鄭而服蔡三家分晉韓得成臯因以并鄭時蔡已為楚所滅鄭之南境亦人于楚就使臯狼為蔡地趙襄子安得而有之漢書地理志西河郡有臯狼縣又有藺縣漢之西河春秋以來皆為晉境而古文藺字與蔡字近或者蔡字其藺字之訛也襄子弗與智伯怒帥韓魏之甲以攻趙氏帥讀曰率襄子将出曰吾何走乎走則豆翻疾趨之也趨七喻翻從者曰長子近且城厚完從才用翻長子縣周史辛伯所封邑班志屬上黨郡陸徳明曰長子之長丁丈翻顔師古曰長讀為短長之長今讀為長幼之長非也崔豹古今注曰城盛也所以盛受民物也淮南子曰鯀作城盛時征翻襄子曰民罷力以完之罷讀曰疲又斃死以守之其誰與我韋昭曰謂誰與我同力也從者曰邯鄲之倉庫實邯鄲即春秋邯志鄲午之邑也班邯鄲縣屬趙國張晏曰邯鄲山在東城下鄲盡也城郭從邑故旁加邑宋白曰邯鄲本衞地後屬晉七國時為趙都趙敬侯自晉陽始都邯鄲余按史記六國年表周安王之十六年趙敬侯之元年烈王之二年趙成侯之元年成侯一十二年魏克邯鄲是年顯王之十六年也二十四年魏歸邯鄲若敬侯已都邯鄲魏克其國都而趙不亡何也至顯王二十二年公子范襲邯鄲不勝而死是年肅侯之三年也意此時趙方都邯鄲蓋肅侯徙都非敬侯也邯音翻寒鄲音丹康多寒襄子曰浚民之膏澤以實之韋昭曰浚煎也讀曰醮宋祁曰浚蘇俊翻醮子召翻余謂浚讀當如宋音浚省疏瀹也淘也深也又因而殺之其誰與我其晉陽乎先主之所屬也古者諸侯之大夫其家之臣子皆稱之曰主死則曰先主考左傳可見已屬陟玉翻尹鐸之所寛也民必和矣乃走晉陽三家以國人闈而灌之城不浸者三版高二尺為一版三版六尺沈竈産鼃民無叛意沈持林翻顔師古漢書音義曰鼃黽也似蝦蟇而長脚其色青史游急就章曰蛙蝦蟇陸佃埤雅曰鼃似蝦蟇而長踦瞋目如怒鼃與蛙同音下媧翻智伯行水據經典釋文凡廵行之行音下孟翻後倣此魏桓子御韓康子驂乘兵車尊者居左執弓矢御者居中有力者居右持矛以備傾側所謂車右是也韓魏畏智氏之彊一為之御一為之右驂與參同參者三也三人同車則曰驂乘四人同車則曰駟乘左傳齊伐晉燭庸之越駟乘杜預注曰四人共乘者殿車乘石證翻智伯曰吾乃今知水可以亡人國也桓子肘康子康子履桓子之跗以汾水可以灌安邑絳水可以灌平陽也跗音夫足趾也班志汾水出汾陽北山汾陽縣屬太原郡安邑縣屬河東郡史記正義曰安邑故城在絳州夏縣東北十五里應劭曰絳水出河東絳縣西南平陽縣亦屬河東郡安邑魏絳始居邑平陽韓武子𤣥孫貞子始居之桓康二子之肘足接蓋各為都邑慮也水經注曰絳水出絳縣西南蓋以故絳為言其水出絳山東西北流而合于澮猶在絳縣界中智伯所謂汾水可以灌安邑或亦有之絳水可以灌平陽未識所由余謂自春秋之季至于元魏歴年滋多郡縣之離合川谷之遷改有不可以一時所睹為據者史記正義曰韓初都平陽今晉州也括地志曰絳水一名白今名沸泉源出絳山飛泉奮湧揚波注縣積壑三十餘丈望之極為奇觀可接引北灌平陽城酈道元父範歴仕三齊少長齊地熟其山川後入闗死於道未嘗至河東也此葢因耳學而致疑括地志成於唐之魏王泰泰者太宗之愛子羅致天下一時名儒以作此書其考據宜詳當取以為據絺疵謂智伯曰韓魏必反矣智伯曰子何以知之絺疵曰以人事知之夫從韓魏之兵以攻趙趙亡難必及韓魏矣夫音扶難乃旦翻今約勝趙而三分其地城不没者三版人馬相食城降有日而二子無喜志有憂色是非反而何明日智伯以絺疵之言告二子二子曰此夫讒人欲為趙氏游説使主疑於二家而懈於攻趙氏也不然夫二家豈不利朝夕分趙氏之田而欲為危難不可成之事乎二子出絺疵入曰主何以臣之言告二子也智伯曰子何以知之對曰臣見其視臣端而趨疾知臣得其情故也智伯不悛絺疵請使於齊夫音扶餘並同難乃旦翻降户江翻下也服也説輸芮翻懈居隘翻怠也危難如字悛丑緣翻改也止也絺抽遲翻姓也康曰絺當作郗姓譜諸書未有從絲者疑借字余按姓譜絺姓周蘇忿生支子封於絺因氏焉為趙之為音于偽翻使疏吏翻疵請出使以避禍也趙襄子使張孟談潜出見二子曰臣聞脣亡則齒寒今智伯帥韓魏以攻趙趙亡則韓魏為之次矣帥讀曰率二子曰我心知其然也恐事未遂而謀泄則禍立至矣張孟談曰謀出二主之口入臣之耳何傷也二子乃潜與張孟談約為之期日而遣之姓譜張氏本自軒轅第五子揮始造弦寔張網羅世掌其職後因氏馬風俗傳云張王李趙黄帝所賜姓也又晉有解張字張侯自此晉國有張氏唐姓氏譜張氏出自姬姓黄帝子少昊青陽氏第五子揮正始制弓矢子孫賜姓張周宣王卿士張仲其後裔事晉為大夫襄子夜使人殺守隄之吏而決水灌智伯軍智伯軍救水而亂韓魏翼而擊之襄子将卒犯其前将即亮翻又音如字将領也卒滅没翻説文吏人給事者衣為卒卒衣有題識其字從衣從十大敗智伯之衆以此敗彼曰敗敗比邁翻遂殺智伯盡滅智氏之族史記六國年表三晉滅智氏在周定王十六年上距獲麟二十七年皇甫謐曰元王十一年癸未三晉滅智伯唯輔果在以别族也臣光曰智伯之亡也才勝徳也夫才與徳異而世俗莫之能辯夫音扶通謂之賢此其所以失人也夫聰察彊毅之謂才正直中和之謂徳才者徳之資也徳者才之帥也夫音扶帥所類翻雲夢之竹天下之勁也書禹貢雲土夢作人孔安國注云雲夢之澤在江南左傳楚王以鄭伯旧江南之夢杜預注云楚之雲夢跨江南北班志雲夢澤在南郡華容縣南祝穆曰據左傳䢵夫人弃子文於夢中言夢而不言雲楚子避吳入于雲中言雲而不言夢則知雲夢二澤也漢陽志雲在江之北夢在江之南人安陸有雲夢澤枝江有雲夢城蓋古之雲夢澤甚廣而後世悉為邑居聚落故地之以雲夢得名者非一處竹箭之産荆楚為良雲夢楚之地也夢如字又莫公翻然而不矯揉不羽括則不能以入堅矯舉夭翻揉如久翻康曰揉曲為矯揉所以撓曲而使之直也羽者箭翎括者箭窟受弦處括音聒通作筈棠谿之金天下之利也左傳楚封吳夫概王於棠谿戰國之時其地屬韓出金甚精利劉昭郡國志汝南郡吳房縣有棠谿亭杜佑通典曰棠谿在今汝州郾城縣界九域志蔡州有冶爐城韓國鑄劒之處然而不鎔範不砥礪則不能以擊彊毛晃曰鎔銷也鑄也説文鑄器法也董仲舒傳猶金在鎔註鎔謂鑄器之模範範法也式也禮運範金合上砥軫氏翻柔石也礪力制翻䃺也是故才徳全盡謂之聖人才徳兼亡謂之愚人徳勝才謂之君子才勝徳謂之小人凡取人之術茍不得聖人君子而與之與其得小人不若得愚人何則君子挾才以為善小人挾才以為惡挾才以為善者善無不至矣挾才以為惡者惡亦無不至矣挾檄頰翻愚者雖欲為不善智不能周力不能勝譬如乳狗摶人人得而制之挾户頰翻朱元晦曰挾者兼有而恃之之稱勝音升乳孺遇翻乳育也乳狗育子之狗也搏伯各翻小人智足以遂其姧勇足以决其暴是虎而翼者也其為害豈不多哉虎而傅翼其為害也愈甚夫徳者人之所嚴嚴敬也而才者人之所愛愛者易親嚴者易疎易以䜴翻是以察者多蔽於才而遺於徳自古昔以來國之亂臣家之敗子才有餘而徳不足以至于顛覆者多矣豈特智伯哉故為國為家者茍能審於才徳之分而知所先後先悉薦翻後戸遘翻又何失人之足患哉三家分智氏之田趙襄子漆智伯之頭以為飲器説文桼木汁可以鬖物下從水象桼如水滴而下也漢書張騫傳匈奴破月氏王以其頭為飲器韋昭註曰飲器椑榼也晉灼曰飲器虎子屬也或曰飲酒之器也師古曰匈奴嘗以月氏王頭與漢使歃血盟然則飲酒之器是也韋云椑榼晉云虎子皆非也椑榼即今之偏榼所以盛酒耳非用飲者也虎子褻器所以溲便者椑音鼙榼克合翻氏音支使疏吏翻歃色甲翻盛時征翻褻息列翻溲疎鳩翻便毘連翻智伯之臣豫讓欲為之報仇豫姓也讓名也戰國之時又有豫且不知其同時否也為音于偽翻下同乃詐為刑人挾匕首入襄子宫中塗厠挾持也劉向曰匕首短劒鹽鐵論曰匕首長尺八寸頭類匕故云匕首匕音比厠初吏翻圊也長直亮翻襄子如厠心動索之獲豫讓索山客翻左右欲殺之襄子曰智伯死無後而此人欲為報仇眞義士也吾謹避之耳乃舍之舍讀曰捨豫讓又漆身為癩吞炭為啞癩落蓋翻惡疾也啞倚下翻瘖也行乞於市神農日中為市致天下之民聚天下之貨交易而退此立市之始也鄭氏周禮注曰市雜聚之處其妻不識也行見其友其友識之為之泣曰以子之才臣事趙孟必得近幸自春秋之時之趙孟其後宣子謂之宣孟趙文子謂襲而呼為趙孟孟長也子乃為所欲為顧不易邪易以䜴翻何乃自苦如此求以報仇不亦難乎豫讓曰旣已委質為臣經典釋文曰質職日翻委質委其體以事君也後漢書註委質屈膝而又求殺之是二心也凡吾所為者極難耳然所以為此者将以愧天下後世之為人臣懷二心者也襄子出豫讓伏於橋下襄子至橋馬驚索之得豫讓遂殺之自智宣子立瑶至豫讓報仇其事皆在威烈王二十三年之前故先以初字發之温公之意蓋以天下莫大於名分觀命三大夫為諸侯之事則知周之所以益微七雄之所以益盛莫重於宗社觀智趙立後之事則知智宣子之所以失趙簡子之所以得君臣之義當守節伏死而已觀豫讓之事則知策名委質者必有霣而無貳其為後世之鑑豈不昭昭也哉襄子為伯魯之不立也有子五人不肯置後封伯魯之子於代代國在夏屋句注北趙襄子滅之班志有代郡代縣為于偽翻夏戸雅翻曰代成君早卒成謚也謚法安民立政曰成立其子浣為趙氏後浣戸管翻襄子卒弟桓子逐浣而自立史記六國表威烈王元年襄子卒二年趙桓子元年卒明年國人立獻侯浣浣索隱作晚卒子恤翻下同一年卒趙氏之人曰桓子立非襄主意乃共殺其子復迎浣而立之是為獻子復扶又翻又音如字獻子即獻侯六國䘮威烈王三年獻侯之元年蓋分晉之後三晉僣侯久矣謚法知質有聖曰獻獻子生籍是為烈侯謚法有功安民曰烈秉徳尊業曰烈魏斯者魏桓子之孫也是為文侯謚法學勤好問曰文慈惠安民曰文韓康子生武子武子生䖍是為景侯謚法克定禍亂曰武布義行剛曰景六國表威烈王二年魏文侯斯元年十八年韓景侯䖍元年蓋其在國僣爵已久不敢以通王室威烈王遂因而命之識者重為周惜通鑑于此序三家之世也魏文侯以卜子夏田子方為師卜以官為氏田本出於陳陳敬仲以陳為田氏徐廣曰始食采地由是改姓田氏索隱曰陳田二聲相近遂為田氏夏戸雅翻每過段干木之廬必式過工禾翻唐人志氏族曰李耳字伯陽一字聃其後有李宗魏封於段為干木大夫是以段為氏也余按通鑑赧王四十二年魏有段干子則段干複姓也書武王式商容閭註云式其閭巷以禮賢記曲禮國君撫式士下之註云升車必正立據式小俛崇敬也師古曰式車前横木古者立乘凡言式車者謂俛首撫式以禮敬人孔頴達曰式謂俯下頭也古者車箱長四尺四寸而三分前一後二横一木下去車牀三尺三寸謂之為式又於式上二尺二寸横一木謂之較較去車牀凡五尺五寸於時立乘若平常則憑較故詩云倚重較兮是也若應為敬則落隱下式而頭得俯俛故記云式視馬尾是也較訖岳翻四方賢士多歸之文侯與羣臣飲酒樂而天雨命駕将適野左右曰今日飲酒樂天又雨君将安之文侯曰吾與虞人期獵雖樂豈可無一㑹期哉乃往身自罷之周禮有山虞澤虞以掌山澤注云虞度也度知山林之大小及其所生身自罷之者身往告之以雨而罷獵也樂音洛韓借師於魏以伐趙文侯曰寡人與趙兄弟也不敢聞命趙借師於魏以伐韓文侯應之亦然二國皆怒而去已而知文侯以講於己也講和也皆朝于魏朝直遥翻魏於是始大於三晉諸侯莫能與之爭使樂羊伐中山克之樂姓也本自有殷微子之後宋戴公四世孫樂吕為大司寇中山春秋之鮮虞也漢為中山郡宋白曰唐定州春秋白狄鮮虞之地隋圖經曰中山城在今唐昌縣東北三十一里中山故城是也杜佑曰城中有山故曰中山以封其子擊文侯問於羣臣曰我何如主皆曰仁君任座曰君得中山不以封君之弟而以封君之子何謂仁君文侯怒任座趨出任座亦習見當時鄰國之事而為是言耳任音壬座一作痤音才戈翻次問翟璜翟姓也音直格翻又音狄姓譜翟為晉所滅子孫以國為氏今人多讀從上音璜戸光翻對曰仁君文侯曰何以知之對曰臣聞君仁則臣直嚮者任座之言直臣是以知之文侯悦使翟璜召任座而反之親下堂迎之以為上客文侯與田子方飲文侯曰鐘聲不比乎比音毗不比言不和也左高此蓋編鐘之懸左高故其聲不和田子方笑文侯曰何笑子方曰臣聞之君明樂官不明樂音今君審於音臣恐其聾於官也明樂官知其才不才明樂音知其和不和五聲合和然後成音詩大序曰聲成文謂之音文侯曰善子擊出遭田子方於道下車伏謁古文考曰黄帝作車引重致逺少昊氏加牛禹時奚仲加馬釋名曰車居也韋昭曰古唯尺遮翻自漢以來始有居音蕭子顯曰三皇氏乘祗車出谷口車之始也祗翹移翻子方不為禮子擊怒謂子方曰富貴者驕人乎貧賤者驕人乎子方曰亦貧賤者驕人耳富貴者安敢驕人國君而驕人則失其國大夫而驕人則失其家失其國者未聞有以國待之者也失其家者未聞有以家待之者也夫士貧賤者言不用行不合則納履而去耳安往而不得貧賤哉子擊乃謝之夫音扶行下孟翻文侯謂李克曰先生嘗有言曰家貧思良妻國亂思良相今所置非成則璜二子何如李氏出自顓頊曾孫臯陶為堯大理以官命族為理氏商紂時裔孫利貞逃難食木子得全改為李氏置言置相也相息亮翻難乃旦翻對曰卑不謀尊疏不謀戚臣在闕門之外不敢當命在闕門之外謂疏逺也文侯曰先生臨事勿讓克曰君弗察故也居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取五者足以定之矣何待克哉文侯曰先生就舍吾之相定矣相息亮翻李克出見翟璜翟璜曰今者聞君召先生而卜相果誰為之克曰魏成翟璜忿然作色曰西河守吳起臣所進也班志魏地其界自高陵以東盡河東河内高陵縣漢屬馮翊其地在河西所謂西河之列者也魏初使吳起守之秦兵不敢東向至惠王時秦使衞鞅擊虜其将公子卭遂獻西河之外於秦吳以國為姓相息亮翻守式又翻君内以鄴為憂臣進西門豹班志鄴縣屬魏郡西門豹為鄴令鑿渠以利民王符潜夫論姓氏篇曰如有東門西郭南宫北郭皆因居以為姓西門蓋亦此類鄴魚怯翻君欲伐中山臣進樂羊中山已拔無使守之臣進先生君之子無傅臣進屈侯鮒傅者傅之以徳義因以為官名傅芳遇翻屈九勿翻姓也余按屈晉地時屬魏鮒蓋魏封屈侯也鮒音符遇翻以耳目之所睹記臣何負於魏成不勝為負李克曰子言克於子之君者豈将比周以求大官哉比毗至翻阿黨為比君問相於克克之對如是李克自叙其答魏文侯之言也所以知君之必相魏成者魏成食祿千鍾孔頴達曰祿者穀也故鄭註司錄云祿也言穀年穀豐然後制祿援神契云祿者錄也白虎通曰上以收錄接下下以名錄謹以事上是也六斛四斗為一鍾什九在外什一在内是以東得卜子夏田子方段干木夏户雅翻此三人者君皆師之子所進五人者君皆臣之子惡得與魏成比也惡讀曰烏何也翟璜逡巡再拜曰璜鄙人也失對願卒為弟子逡七倫翻逡巡却退貌卒子恤翻終也孔頴達曰先生師也謂師為先生者言彼先己而生其徳多厚也自稱為弟子者言己自處如弟子則尊其師如父兄也吳起者衞人仕於魯齊人伐魯魯人欲以為将起取齊女為妻将即亮翻下同取讀曰娶孔頴達曰妻之為言齊也以禮見問得與夫敵體也魯人疑之起殺妻以求将大破齊師或譛之魯侯曰起始事曾參世本曰曾姓出自鄫國陸徳明曰參所金翻一音七南翻母死不奔喪曾參絶之今又殺妻以求為君将起殘忍薄行人也行下孟翻且以魯國區區而有勝敵之名則諸侯圖魯矣起恐得罪聞魏文侯賢乃往歸之文侯問諸李克李克曰起貪而好色好呼到翻然用兵司馬穰苴弗能過也司馬官名穰苴本齊田姓仕齊為是官故以稱之齊景公之賢将也穰如羊翻苴子余翻於是文侯以為将擊秦拔五城起之為将與士卒最下者同衣食卧不設席行不騎乘騎馬為騎乘車為乘言起與士卒同其勞苦行不用車馬也親裹贏糧師古曰贏擔也此言起親裹士卒所齎擔之糧贏恰成翻與士卒分勞苦卒有病疽者起為吮之疽七余翻癰也吮徐兖翻説文嗽也康所角翻卒母聞而哭之人曰子卒也而将軍自吮其疽何哭為母曰非然也往年吳公吮其父疽其父戰不旋踵遂死于敵吳公今又吮其子妾不知其死所矣是以哭之燕湣公薨子僖公立燕自召公奭受封於北燕其地則唐幽州薊縣故城是也自召公至湣公三十二世燕因肩翻湣讀與閔同謚法使民悲傷曰閔小心畏忌曰僖二十四年王崩子安王驕立盜殺楚聲王國人立其子悼王周成王封熊繹於楚姓芈氏居丹陽今枝江縣故丹陽城是也括地志曰歸州秭歸縣丹陽城熊繹之始國其後彊大北封畛於汝南并吳越地方五千里自熊繹至聲王三十世索隱曰聲王名當悼王名疑謚法不生其國曰聲注云生於外家年中早夭曰悼注云年不稱志又云恐懼從處曰悼註云從處言險圯也安王謚法好和不爭曰安元年秦伐魏至陽孤周孝王邑非子於秦徐廣曰今隴西縣秦亭是也括地志曰秦州清水縣本名秦十三州志曰秦亭秦谷是也至襄公取周地穆公覇西戎日以彊大是年秦簡公之十四年也自非子至簡公二十八世陽孤史記作陽狐正義引括地志曰陽狐郭在魏州元城縣東北三十里余按此時西河之外皆為魏境若秦兵至元城則是越魏都安邑而東矣水經注河東垣縣有陽壺城九域志絳州有陽壺城姑識之以廣異聞且俟知者二年魏韓趙伐楚至桑丘水經注澺水自葛陂東南逕新蔡縣故城東而東南流注于汝水又東南逕下桑里左迆為横塘陂史記作乘丘正義地理志乘丘故城在兖州瑕丘縣西北三十五里當從之鄭圍韓陽翟周宣王封其弟友于鄭杜預世族譜曰封於咸林今京兆鄭邑是也幽王無道友徙其人於虢鄶之間遂有其地今河南新鄭是也友謚桓公是年鄭繻公駘之二十三年自桓公至繻公二十二世班志陽翟縣屬潁川郡索隱曰翟音狄温公類篇音萇伯翻繻詢趨翻駘堂來翻韓景侯薨子烈侯取立趙烈侯薨國人立其弟武侯秦簡公薨子惠公立諡法愛民好與曰惠三年王子定奔晉虢山崩壅河徐廣曰虢山在陜裴駰曰𢎞農陜縣故虢國北虢在大陽東虢在滎陽括地志曰虢山在陜州陜縣西臨黄河今臨河有岡阜似是頽山之餘水經注曰陜城西北帶河水湧起方數十丈父老云石虎載銅翁仲至此沉没水所以湧洪河巨瀆宜不為金狄梗流蓋魏文侯時虢山崩壅河所致耳陜失冉翻四年楚圍鄭鄭人殺其相駟子陽鄭穆公之子騑字子駟古者以王父之字為氏子陽其後也相息亮翻騑芳菲翻五年曰有食之杜預曰日行遲一嵗一周天月行速一月一周天一嵗凡十二交㑹然日月動物雖行度有大量不能不小有贏縮故有雖交㑹而不食者或有頻交而食者孔頴達曰日月交㑹謂朔也周天三百六十五度四分度之一日月皆右行於天一晝一夜日行一度月行十三度十九分度之七二十九日日有餘而月行天一周追及於日而與之㑹交㑹而日月同道則食月或在日道表或在日道裏則不食矣又厯家為交食之法大率以一百七十有三日有奇為限然月先在裏則依限而食者多若月在表則依限而食者少杜預見其參差乃云雖行度有大量不能不小有贏縮故有雖交㑹而不食者或有頻交而食者此得之矣蘇氏曰交當朔則日食然亦冇交而不食者交而食陽微而隂乘之也交而不食陽盛而陰不能揜也朱元晦曰此則繫乎人事之感蓋臣子背君父妾婦乘其夫小人陵君子夷狄侵中國所感如是則隂盛陽微而日為之食矣是以聖人於春秋每食必書而詩人亦以為醜也今此書年而不書月與晦朔史失之也釋名曰日月虧曰食稍小侵虧如蟲食草木之葉也亦作蝕三月盜殺韓相俠累俠累與濮陽嚴仲子有惡仲子聞軹人聶政之勇以黄金百溢為政母夀欲因以報仇相息亮翻俠户頰翻累力追翻濮陽春秋之帝丘漢為濮陽縣屬東郡應劭曰濮水南入鉅野水北為陽濮博木翻惡如字不善也康烏故翻非軹春秋原邑晉文公所闈者漢為軹縣屬河内郡音只姓譜曰楚大夫食采於聶因以為氏聶尼輒翻溢夷質翻二十四兩為溢政不受曰老母在政身未敢以許人也及母卒仲子乃使政刺俠累卒子恤翻刺七亦翻又如字俠累方坐府上兵衞甚衆聶政直入上階上時掌翻刺殺俠累因自皮面抉眼自屠出腸韓人暴其尸於市暴歩木翻又如字購問莫能識其姊嫈聞而往哭之曰是軹深井里聶政也史記正義曰深井里在懷州濟源縣南三十里以妾尚在之故重自刑以絶從妾奈何畏歿身之誅終滅賢弟之名遂死於政尸之㫄皮面以刀𠢐而而去其皮懸賞以募告者曰購購古候翻嫈烏莖翻絶從之從讀曰蹤謂自絶其蹤跡又或曰從讀如字謂絶其從坐之罪也六年鄭駟子陽之黨弑繻公繻者謚法所不載史記注繻或作繚繻詢趨翻而立其弟乙白虎通曰弟悌也心順行篤也行下孟翻是為康公宋悼公薨子休公田立武王封微子啓於宋唐宋州之睢陽縣是也自微子二十七世至悼公名購由休亦謚法所不載八年齊伐魯取最武王封太公於齊唐青州之臨淄是也括地志曰天齊水在臨淄東南十五里封禪書曰齊之所以為齊者以天齊是年康公貸之十一年自太公至康公二十九世成王封伯禽於魯唐兖州之曲阜是也是年穆公之十六年自伯禽至穆公凡二十八世鄭負黍叛復歸韓據史記繻公之十六年敗韓於負黍葢以此時取之而今復叛歸韓也劉昭郡國志潁川郡陽城縣有負黍聚古今地名云負黍山在陽城縣西南二十七里或云在西南三十五里九年魏伐鄭晉烈公薨子孝公傾立周成王封弟叔虞於唐括地志曰故唐城在并州晉陽縣北二里堯所築也都城記曰唐叔虞之子燮父徙居晉水㫄今并州理故唐城即燮父初徙之處其城南半入州城中毛詩譜曰燮父以堯墟南有晉水改曰晉侯自唐叔至烈公三十七世烈公名止謚法慈惠愛親曰孝十一年秦伐韓宜陽取六邑班志宜陽縣屬𢎞農郡史記正義曰宜陽縣故城在河南府福昌縣東十四里故韓城是也此邑即周禮四井為邑之邑初田常生襄子盤盤生荘子白白生太公和此序齊田氏之世也田常即左傳陳成子恒也温公避仁廟諱改恒曰常自陳公子完奔齊荘五世至常得政謚法勝敵志強曰是嵗齊田和遷齊康公於海上使食一城以奉其先祀十二年秦晉戰于武城此非魯之武城左傳晉陰飴甥會秦伯盟于王城杜預曰馮翊臨晉縣東有王城今名武鄉括地志故武城一名武平城在華州鄭縣東北十三里齊伐魏取襄陽陽當作陵徐廣曰今之南平陽也余據晉志南平陽縣屬山陽郡班志陳留郡有襄邑縣師古曰圏稱云襄邑宋地木承匡襄陵鄉也宋襄公所葬故曰襄陵秦始皇以承匡卑濕徙縣襄陵因曰襄邑魯敗齊師于平陸班志東平國有東平陸縣戰國時之平陸也史記正義曰平陸兖州縣即古厥國宋白曰鄆州中都縣漢為平陸縣史記魯敗齊師于平陸是也敗補邁翻十三年秦侵晉齊田和㑹魏文侯楚人衞人于濁澤康曰濁水名漢志濁水出齊郡廣縣媯山余謂康説誤矣徐廣史記註曰長社有濁澤水經注曰皇陂水出胡城西北胡城潁陰之狐人亭也皇陂古長社之濁澤也記諸侯相見於郤地曰㑹孔頴達曰諸侯未及期而相見曰遇㑹者謂及期之禮既及期人至所期之地求為諸侯魏文侯為之請於王及諸侯王許之為之之為于偽翻十五年秦伐蜀取南鄭譜記普云蜀之先肇自人皇之際黄帝子昌意娶蜀山氏女生帝俈既立封其支庻于蜀歴虞夏商周周衰先稱王者蠶樷余據武王伐紂庸蜀諸國皆㑹于牧野孔安國曰蜀叟也春秋之時不與中國通班志南鄭縣屬漢中郡唐為梁州治所俈通作嚳音括沃翻魏文侯薨太子擊立王者以嫡長子為太子謂之國儲副君諸侯曰世子周衰率上僭孔頴達曰太者大中之太也上時掌翻長知兩翻是為武侯武侯浮西河而下西河即禹貢之龍門西河中流顧謂吳起曰美哉山河之固此魏國之寶也對曰在徳不在險昔三苖氏左洞庭右彭蠡徳義不修禹滅之武陵長沙零桂之水匪為洞庭周七百里彭蠡澤在漢豫章郡彭澤縣西書有苖弗率汝徂征三苖所居葢今江南西道之地蠡里弟翻夏桀之居左河濟右泰華伊闕在其南羊腸在其北修政不仁湯放之濟水出河東垣縣王屋山南流貫河而南合于滎瀆禹貢所謂導沇水東流為濟溢為滎者也自漢築滎陽石門而濟與河合流而注于海不入滎瀆禹貢所謂導沇水東流為濟入于河桀都安邑葢恃以為險泰華山在京兆華陰縣南水經伊水出南陽縣西荀渠山東北流至河南新城縣又東南過伊闕中大禹所鑿也兩山相對望之若闕左傳女寛守闕塞即其地括地志伊闕山在洛州南十九里班志上黨壺闗縣有羊腸阪此安邑四履所憑山河之固也書曰成湯放桀于南巢濟子禮翻華戸化翻商紂之國左孟門右太行常山在其北大河經其南修政不徳武王殺之水經注孟門在河東北屈縣西即龍門上口也淮南子曰龍門未闢吕梁未鑿河出孟門之上溢而逆流無有丘陵名曰洪水太行山在河内野王縣西北常山在常山郡上曲陽縣西北河水自孟門南抵華陰屈而東流紂都朝歌河經其南北屈之孟門在朝歌西北恐不可言左索隱曰孟門别一山在朝歌東此特左右二字之差而誤耳春秋説題辭河之為言荷也荷精分布懷陰引度也釋名河下也随地下處而通流也書曰武王勝殷殺紂太行之行户剛翻北屈陸求忽翻顔居勿翻由此觀之在徳不在險若君不修徳舟中之人皆敵國也武侯曰善魏置相相田文相息亮翻此田文非齊之田文吳起不悦謂田文曰請與子論功可乎田文曰可起曰将三軍使士卒樂死敵國不敢謀子孰與起文曰不如子将即亮翻樂音洛起曰治百官親萬民實府庫子孰與起文曰不如子治直之翻起曰守西河秦兵不敢東鄉韓趙賓從子孰與起文曰不如子鄉讀曰向賓從猶言賓服也起曰此三者子皆出吾下而位居吾上何也文曰主少國疑大臣未附百姓不信方是之時屬之子乎屬之我乎少詩照翻屬子欲翻起默然良久曰屬之子矣久之魏相公叔尚主而害吳起如淳口天子嫁女於諸侯必使諸侯同姓者主之故謂之公主帝姊妹曰長公主諸王女曰翁主師古曰如説得之天子不親主㛰故謂之公主諸王則自主婚故其女曰翁主翁者父也言父主其婚也亦曰王主言王自主其婚也揚雄方言云周晉秦隴謂父曰翁而臣瓚王楙或云公者比於上爵或云主者婦人尊稱皆失之劉貢父曰予謂公主之稱本出秦舊男為公子女為公主古者大夫妻稱主故以公配之若謂同姓主之故謂之公主則周之事秦不知用也古之嫁女禮當如周使大夫主之何不謂之夫主乎然則謂之王主者猶言王子也謂之公主者緣公而生耳毛晃曰尚崇也高也貴也飾也加也尊也娶公主謂之尚言帝王之女尊而尚之不敢言娶也相息亮翻公叔之僕曰起易去也起為人剛勁自喜易以䜴翻去起吕翻師古曰喜許吏翻子先言於君曰吳起賢人也而君之國小臣恐起之無留心也君盍試延以女起無留心則必辭矣子因與起歸而使公主辱子起見公主之賤子也必辭則子之計中矣中竹仲翻公叔從之吳起果辭公主魏武侯疑之而未信起懼誅遂奔楚楚悼王素聞其賢至則任之為相起明灋審令相息亮翻灋占法字捐不急之官廢公族疏逺者以撫養戰鬭之士要在彊兵破遊説之言從横者捐余專翻弃也除去也漢書音義曰以利合曰從以威力相脅曰横或曰南北曰從從者連南北為一西鄉以擯秦東西曰横横者離山東之交使之西鄉以事秦説式芮翻從即容翻横亦作衡音同於是南平百越韋昭曰越有百邑北却三晉西伐秦諸侯皆患楚之彊而楚之貴戚大臣多怨吳起者秦惠公薨子出公立出非謚也以其失國出死故曰出公趙武侯薨國人復立烈侯之太子章是為敬侯謚法夙夜警戒曰敬韓烈侯薨子文侯立十六年初命齊大夫田和為諸侯田氏自此遂有齊國田和是為太公趙公子朝作亂奔魏與魏襲邯鄲不克邯音寒鄲音丹十七年秦庻長改逆獻公于河西而立之殺出子及其母沈之淵旁後秦制爵一級曰公士二上造三簮裊四不更五大夫六官大夫七公大夫八公乘九五大夫十左庻長十一右庶長十二左更十三中更十四右更十五少上造十六大上造十七駟車庶長十八大庻長十九闗内侯二十徹侯師古曰庻長言衆列之長註又詳見下卷顯王十年前據史記威烈王十一年秦靈公卒子獻公師隰不得立立靈公季父悼子是為簡公出子簡公之孫也今庻長改迎獻公而殺出子正義曰西者秦州西縣秦之舊地時獻公在西縣故迎立之余謂此言河西非西縣也靈公之卒獻公不得立出居河西河西者黄河之西蓋漢凉州之地裊當作褭乃了翻更工衡翻乘繩證翻長知丈翻齊伐魯韓伐鄭取陽城漢陽城縣屬潁川郡是為地中成周於此以土圭測日景伐宋執宋公齊太公薨子桓公午立十九年魏敗趙師于兔臺史記趙世家曰魏敗我兔臺築剛平正義曰兔臺剛平並在河北敗補邁翻二十年日有食之既既盡也二十一年楚悼王薨貴戚大臣作亂攻吳起起走之王尸而伏之之往也往赴王尸而伏其側擊起之徒因射刺起并中王尸射而亦翻刺七亦翻中竹仲翻既葬肅王即位謚法剛徳克就曰肅執心决斷曰肅使令尹盡誅為亂者令尹楚相也坐起夷宗者七十餘家夷殺也夷宗者殺其同宗也二十二年齊伐燕取桑丘魏韓趙伐齊至桑丘此桑丘非二年所書楚之桑丘括地忠曰桑丘故城俗名敬城在易州遂城縣葢燕之南界也二十三年趙襲衞不克成王封康叔於衞居河淇之間故殷墟也至懿公為狄所滅東徙度河文公徙居楚丘遂國於濮陽是年愼公頽之三十五年自康叔至愼公凡三十二世齊康公薨無子田氏遂并齊而有之姜氏至此滅矣是嵗齊桓公亦薨子威王因齊立謚法彊毅訅正曰威訅渠留翻齊桓公田午訅謀也二十四年狄敗魏師于澮漢之中山上黨西河上郡自春秋以來狄皆居之此亦其種也水經澮水出河東絳縣東澮山西過絳縣南又西南過􅫧祁宫南又西南至王橋入汾水括地志澮山在絳州翼城縣東北敗補邁翻澮古外翻魏韓趙伐齊至靈丘史記正義曰靈丘河東蔚州縣余按蔚州之靈丘即漢代郡之靈丘此時齊境安能至代北邪此即孟子謂蚳鼃辭靈丘請士師之地班志曰齊地北有千乘清河以南漢清河郡有靈縣清河北接趙魏之境此為近之蚳音遲鼃烏花翻晉孝公薨子靖公俱酒立謚法柔衆安民曰靖又恭已鮮言曰靖二十五年蜀伐楚取兹方據史記蜀伐楚取兹方楚為扞闗以拒之則兹方之地在扞闗之西劉昭志巴郡魚復縣有扞闗子思言茍變於衞侯曰其才可将五百乘古者兵車一乘甲士三人步卒七十二人五百乘三萬七千五百人國語曰茍本自黄帝之子将即亮翻下同乘繩證翻公曰吾知其可将然變也嘗為吏賦於民而食人二鷄子故弗用也子思曰夫聖人之官人猶匠之用木也夫音扶取其所長棄其所短故把梓連抱而有數尺之朽良工不棄今君處戰國之世處昌吕翻選爪牙之士而以二卵棄干城之将詩赳赳武夫公侯干城毛氏傳曰干扞也音户旦翻鄭氏箋曰干也城也皆所以禦難也干讀如字此不可使聞於鄰國也公再拜曰謹受教矣衞侯言計非是而羣臣和者如出一口和户卧翻子思曰以吾觀衞所謂君不君臣不臣者也君不君臣不臣論語載齊景公之言公丘懿子曰何乃若是公丘複姓謚法温柔賢善曰懿子思曰人主自臧則衆謀不進臧善也事是而臧之猶却衆謀况和非以長惡乎和户卧翻長知丈翻夫不察事之是非而悦人讚已闇莫甚焉不度理之所在而阿諛求容諂莫甚焉度徒洛翻君闇臣諂以居百姓之上民不與也若此不已國無類矣子思言於衞侯曰君之國事将日非矣公曰何故對曰有由然焉君出言自以為是而卿大夫莫敢矯其非卿大夫出言亦自以為是而士庻人莫敢矯其非君臣既自賢矣白虎通曰君羣也羣心之所歸心也臣堅也厲志自堅也而羣下同聲賢之賢之則順而有福矯之則逆而有禍如此則善安從生詩曰具曰予聖誰知烏之雌雄詩正月之辭毛氏傳曰君臣俱自謂聖也鄭氏箋曰時君臣賢愚適同如烏之雌雄相似誰能别異之乎又曰烏之雌雄不可别者以翼右掩左雄左掩右雌陰陽相下之義也抑亦似君之君臣乎魯穆公薨子共公奮立謚法布徳就義曰穆中情見貌曰穆尊賢敬讓曰共既過能改曰共執事堅固曰共共讀曰㳟魯考異曰司馬遷史記六國表周威烈王十九年甲戌穆公元年烈王元年丙午共公元年顯王十七年己巳康公元年二十六年戊寅景公元年赧王元年丁未平公元年二十年丙寅文公元年四十三年己丑頃公元年五十九年乙巳周亡秦荘襄元年壬子楚滅魯按魯世家穆公三十三年卒若元甲戌終乙巳則是三十二年也共公二十二年卒若元丙午終戊辰則是二十三年也康公九年卒景公二十五年卒平公二十二年卒若元丁未終乙丑則是十九年也文公二十三年卒頃公二十四年楚滅魯班固漢書律厯志文公作緡公其在位之年與世家異者惟平公二十年耳本志自魯僖公五年正月辛亥朔旦冬至推之至成公十二年正月庚寅朔旦冬至定公七年正月己巳朔旦冬至元公四年正月戊申朔旦冬至康公四年正月丁亥朔旦冬至緡公二十二年正月丙寅朔旦冬至漢高祖八年十一月乙巳朔旦冬至武帝元朔六年十一月甲申朔旦冬至元帝初元二年十一月癸亥朔旦冬至共間相距皆七十六年此最為得實又與魯世家注皇甫謐所紀歳次皆合今從之六國表差謬難可盡據也余按考異自魯僖公五年至漢元帝初元二年六百餘年間十二月朔旦冬至相距皆七十六年此最為得實又與魯世家注皇甫謐所紀歳次皆合葢謂劉彛叟長厯也且言史記六國表差謬難可盡據又按通鑑目錄編年用劉彝叟長厯漢武帝太初元年初用夏正定厯史記厯書是年書閼逢攝提格目錄書彊圉赤奮若閼逢攝提格甲寅也彊圉赤奮若丁丑也有二十四年之差温公用彝叟厯邵康節皇極經世書亦用彝叟厯康節少自雄其才既學力慕高逺一見李之才遂從而受學廬于共城百源冬不爐夏不扇夜不就席者數年覃思於易經也皇極經世書不能違彜叟厯及其來居於洛而温公亦奉祠以書局在洛相過從稔又夙所敬者也余意其講明之間必嘗及此而决于用彜叟厯讀考異此一段辭意可見韓文侯薨子哀侯立二十六年王崩子烈王喜立魏韓趙共廢晉靖公為家人而分其地唐叔不祀矣烈王名喜安王之子元年日有食之韓滅鄭因徙都之韓本都平陽其地屬漢之河東郡中間徙都陽翟鄭都新鄭其地屬漢之河南郡鄭桓公始封于鄭其地屬漢之京兆後滅虢鄶而國於溱洧之間故曰新鄭左傳鄭荘公所謂吾先君新邑於此是也今韓既滅鄭自陽翟徙都之韓既都鄭故時人亦謂韓王為鄭王考之戰國策韓非子可見趙敬侯薨子成侯種立種章勇翻三年燕敗齊師於林狐敗補邁翻魯伐齊入陽闗徐廣曰陽闗在鉅平班志鉅平縣屬太山郡括地志陽闗故城在兖州博城縣南二十九里其城之西臨汶水汶音問魏伐齊至博陵史記正義曰博陵在濟州西界宋白曰史記齊威王伐晉至博陵徐廣曰東郡之博平漢為縣燕僖公薨子桓公立宋休公薨子辟公立辟亦謚法之所不載衞愼公薨子聲公訓立謚法敏以敬曰愼戴記思慮深逺曰愼四年趙伐衞取都鄙七十三周禮太宰以八則治都鄙注云都之所居曰鄙都鄙卿大夫之采邑葢周之制四縣為都方四十里一千六百井積一萬四千四百夫五都為鄙鄙五百家也此時衞國褊小若都鄙七十三以成周之制率之其地廣矣盡衞之提封未必能及此數也更俟博考魏敗趙師于北藺班志西河郡有藺縣史記正義曰在石州其地於趙為西北故曰北藺藺離進翻五年魏伐楚取魯陽左傳所謂劉累遷於魯縣即魯陽也班志魯陽縣屬南陽郡史記正義曰今汝州魯山縣韓嚴遂弑哀侯國人立其子懿侯初哀侯以韓廆為相而愛嚴遂二人甚相害也嚴遂令人刺韓廆於朝廆走哀侯哀侯抱之人刺韓廆兼及哀侯戰國䇿以聶政刺韓相事及并中哀侯為一事此從史記蜀本注曰按太史公年表及韓世家於韓烈侯三年皆書聶政殺韓相俠累於哀侯六年又皆書嚴遂弑哀侯以刺客傳考之聶政殺俠累事在哀侯時以戰國䇿考之亦然從傳與戰國策則是年表世家於烈侯三年書盗殺俠累誤矣通鑑於烈侯三年載聶政刺俠累事又於哀侯六年韓嚴遂殺其君哀侯是從年表世家所書蓋刺客傳初不言并殺哀侯止戰國䇿言之通鑑豈以此疑之歟故載并刺哀侯不書聶政止曰使人以此求之則通鑑之意不以嚴仲子為嚴遂亦不以俠累為韓廆止從年表世家而不信其傳也余按温公與劉道原書亦疑此事廆户賄翻相息亮翻刺七亦翻朝直遥翻走音奏魏武侯薨不立太子子罃與公中緩爭立國内亂罃於耕翻中讀曰仲六年齊威王來朝是時周室微弱諸侯莫朝而齊獨朝之天下以此益賢威王朝直遥翻趙伐齊至鄄班志濟陰郡有鄄城縣鄄工掾翻魏敗趙師于懷班志河内郡有懐縣魏收地形志懷州武徳郡有懷縣縣管内有懷城敗補邁翻齊威王召即墨大夫語之曰自子之居即墨也毁言日至班志即墨縣屬膠東國括地志即墨故城在萊州膠水縣南六十里宋白曰城臨墨水故曰即墨語牛倨翻下同然吾使人視即墨田野辟辟讀曰闢下同人民給官無事東方以寜是子不事吾左右以求助也封之萬家召阿大夫語之曰自子守阿譽言日至阿即東阿縣班志屬東郡譽音余稱其美也吾使人視阿田野不辟人民貧餒昔日趙攻鄄子不救鄄工掾翻衞取薛陵子不知薛陵春秋薛國之墟也班志薛縣屬魯國而衞國在漢東郡陳留界薛陵屬齊而近於衞故為所取齊後封田嬰於此是子厚幣事吾左右以求譽也是日烹阿大夫及左右嘗譽者於是羣臣聳懼莫敢飾詐務盡其情齊國大治彊於天下譽音余治直吏翻楚肅王薨無子立其弟良夫是為宣王宋辟公薨子剔成立剔他歴翻七年日有食之王崩弟扁立據班書古今人表師古注扁音篇是為顯王魏大夫王錯出奔韓姓譜王氏之所自出非一出太原琅邪者周靈王太子晉之後北海陳留齊王田和之後東海出自姬姓高平京兆魏信陵君之後天水東平新蔡新野山陽中山章武東萊河東者殷王子比干為紂所害子孫以王者之後號曰王氏余謂此皆後世以諸郡著姓言之耳春秋之時自有王姓莫能審其所自出公孫頎謂韓懿侯曰魏亂可取也公孫姓也黄帝公孫氏頎渠希翻懿侯乃與趙成侯合兵伐魏戰于濁澤大破之遂圍魏史記正義曰徐廣以為長社濁澤非也括地志云濁水源出蒲州解縣東北平地爾時魏都安邑韓趙伐魏豈至河南長社邪解縣濁水近於魏都當是也成侯曰殺罃立公中緩割地而退我二國之利也懿侯曰不可殺魏君暴也割地而退貪也不如兩分之魏分為兩不彊於宋衞則我終無魏患矣趙人不聽懿侯不悦以其兵夜去趙成侯亦去罃遂殺公中緩而立中讀曰仲是為惠王太史公曰魏惠王所以身不死國不分者二國之謀不和也若從一家之謀魏必分矣故曰君終無適子其國可破也索隱曰蓋古人之言及俗説故云故曰適讀曰嫡資治通鑑卷一
