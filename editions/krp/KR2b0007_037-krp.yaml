body:
  text: 資治通鑑卷三十七宋司馬光撰胡三省音註漢紀二十九起屠維大荒落盡閼逢閹蔑鹿六年王莽中始建國元年春正月朔去年十二月莽改元以十二月為歲首逋鑑不書不與其改正朔也莽帥公侯卿士奉皇太后璽韍帥讀曰率璽斯氏翻師古曰韍謂璽之組音弗上太皇太后順符命去漢號焉上時掌翻去𦍑呂翻初莽娶故丞相王訢孫宜春侯咸女為妻師古曰王訢為丞相初封宜春矦𫝊爵至孫咸恩澤侯表宜春侯國於汝南立以為皇后生四男宇獲前誅死安頗荒忽師古曰荒音呼廣翻乃以臨為皇太子安為新嘉辟師古曰辟君也謂之辟者取為國君之義辟音壁封宇子六人皆為公千為功隆公夀為功明公吉為功成公宗為功崇公世為功昭公利為功著公大赦天下莽乃策命孺子為定安公封以萬户地方百里立漢祖宗之廟於其國與周後並行其正朔服色此皆空言耳以孝平皇后為定安太后讀策畢莽親執孺子手流涕歔欷師古曰歔音虚欷音許氣翻又音希曰昔周公攝位終得復子明辟今予獨迫皇天威命不得如意哀嘆良乆中傅將孺子下殿北面而稱臣漢諸侯王國有太傅中傅太傅秩二千石中傅則在宫中傅王者耳賢曰前書音義曰中傅宦者也百僚陪位莫不感動又按金匱封拜輔臣哀章所獻金匱圖金䇿書也以太傅左輔王舜為太師封安新公大司徒平晏為太傅就新公少阿羲和劉秀為國師嘉新公廣漢梓潼哀章為國將美新公梓潼縣時屬廣漢郡將即亮翻下同是為四輔位上公太保後丞甄邯為大司馬承新公丕進矦王尋為大司徒章新公歩兵將軍王邑為大司空隆新公是為三公太阿右拂大司空甄豐為更始將軍廣新公京兆王興為衛將軍奉新公輕車將軍孫建為立國將軍成新公京兆王盛為前將軍崇新公是為四將凡十一公王興者故城門令史城門令史事城門校尉掌文書王盛者賣餅釋名餅併也溲麥使合并也蒸餅湯餅之屬隨形而名之莽按符命求得此姓名十餘人兩人容貌應卜相相息亮翻徑從布衣登用以示神焉是日封拜卿大夫侍中尚書官凡數百人諸劉為郡守者皆徙為諫大夫改明光宫為定安館定安太后居之以大鴻臚府為定安公第皆置門衛使者監領臚陵如翻監古䘖翻勑阿乳母不得與嬰語常在四壁中孟康曰令定安公居四壁中不得有所見漢官典職曰省中皆糊粉壁紫素界之畫古烈士釋名曰壁辟也辟禦風寒也至於長大不能名六畜長知兩翻六畜牛馬羊犬豕雞也養之曰畜用之曰牲畜者許救翻後莽以女孫宇子妻之莽長男宇之子則女孫也妻七細翻莽策命羣司各以其職如典誥之文置大司馬司允大司徒司直大司空司若位皆孤卿師古曰允信也若順也余按古之三孤位六卿爵秩同六卿曰孤卿更名大司農曰羲和後更為納言更工衡翻下同大理曰作士太常曰秩宗大鴻臚曰典樂少府曰共工師古曰共音恭水衡都尉曰予虞皆放唐虞建官也與三公司卿分屬三公司卿即司允司直司若置二十七大夫八十一元士分主中都官諸職又更光禄勲等名為六監皆上卿光禄勲曰司中太僕曰太御衛尉曰太衛執金吾曰奮武中尉曰軍正又置大贅官主乗輿服御物後又典兵改郡太守曰大尹都尉曰大尉縣令長曰宰守式又翻長知兩翻長樂宫曰常樂室樂音洛長安曰常安其餘百官宫室郡縣盡易其名不可勝紀勝音升封王氏齊縗之屬為矦齊音咨縗裳而緶其下縗倉囘翻大功為伯小功為子緦麻為男其女皆為任師古曰任充也男服之義男亦任也音壬男以睦女以隆為號焉師古曰睦隆皆其受封邑之號取嘉名也又曰漢氏諸侯或稱王至於四夷亦如之違於古典繆於一統王大一統王者有天下之號也諸侯及四夷稱之非古也繆戾也其定諸侯王之號皆稱公及四夷僭號稱王者皆更為矦於是漢諸侯王三十二人皆降為公王子矦者百八十一人皆降為子其後皆奪爵焉王考異曰諸侯表皆云莽簒位貶為公明年廢王子侯表但云絶或云免皆在今年按明年立國將軍建奏諸劉為諸侯者以户多少就五等之差亦不云奪爵也後漢城陽王祉傳云劉氏矦者皆降為子後奪爵不知奪在㡬年莽又封黄帝少昊顓頊帝嚳堯舜夏商周及臯陶伊尹之後皆為公侯使各奉其祭祀姚恂為初睦侯奉黄帝後梁䕶為修逺伯奉少昊後皇孫功隆公千奉帝嚳後劉歆為祁烈伯奉顓頊後國師劉歆子疊為伊休矦奉堯後媯昌為始睦矦奉虞帝後山遵為褒謀矦奉臯陶後伊𤣥為褒衡子奉伊尹後周後衛公姫黨更封為章平公殷後宋公孔𢎞更封為章昭侯夏後遼西姒豐封為章功侯莽因漢承平之業府庫百官之富百蠻賔服天下晏然莽一朝有之其心意未滿朱滿未饜足也陿小漢家制度欲更為疏闊欲變改制度以從古也陿與狹同更工衡翻乃自謂黄帝虞舜之後至齊王建孫濟北王安失國齊人謂之王家因以為氏故以黄帝為初祖虞帝為始祖追尊陳胡公為陳胡王田敬仲為田敬王濟北王安為濟北愍王以黄帝之後分為有虞氏有虞之後封於陳田敬仲自陳奔齊為田氏田安之後為王家故也濟子禮翻立祖廟五親廟四天下姚媯陳田王五姓皆為宗室世世復無所與復方目翻與讀曰豫下其復同封陳崇田豐為矦以奉胡王敬王後天下牧守皆以前有翟義趙朋等作亂事見上卷居攝元年守式又翻下同領州郡懐忠孝封牧為男守為附城以漢高廟為文祖廟師古曰欲法舜受終于文祖漢氏園寢廟在京師者勿罷祠薦如故諸劉勿解其復復方目翻各終厥身州牧數存問數所角翻勿令有侵寃莽以劉之為字卯金刀也詔正月剛卯金刀之利皆不得行服䖍曰剛卯以正月卯日作佩之長三寸廣一寸四方或用玉或用金或用桃著革帶佩之今有玉在者銘其一而曰正月剛卯金刀莽所鑄之錢也晉灼曰剛卯長一寸廣五分四方當中央從穿作孔以采絲茸其底如冠纓頭蕤刻其上面作两行書文曰正月剛卯既央靈殳四方青赤白黄四色是當帝令祝融以教䕫龍庶疫剛癉莫我敢當其一銘曰疾日嚴卯帝令䕫化順爾固伏化兹靈殳既正既直既觚既方庶疫剛癉莫我敢當師古曰今往往有土中得玉剛卯者案大小及文服說是也莽以劉字上有卯下有金旁有刀故禁剛卯及金刀也余按劉字上本從丣莽以丣字近卯故云爾乃罷錯刀契刀孔頴逹曰古文有刀刀有二種一是契刀一是錯刀契刀直五百錯刀直一千契刀無鏤而錯刀用金鏤之刀形如錢而邊作刀字形也故世猶呼錢為錢刀及五銖錢更作小錢更工衡翻徑六分重一銖文曰小錢直一與前大錢五十者為二品並行欲防民盜鑄乃禁不得挾銅炭夏四月徐鄉矦劉快結黨數千人起兵於其國師古曰快膠東恭王子也而王子矦表作炔從火與此不同疑表誤也快兄殷故漢膠東王時為扶崇公快舉兵攻即墨即墨膠東國都殷膠東康王寄𤣥孫之子也殷閉城門自繫獄吏民距快快敗走至長廣死地理志長廣縣屬琅邪郡莽赦殷益其國滿萬户地方百里莽曰古者一夫田百畒什一而稅孟子曰周人百畒而徹此言周制也則國給民富而頌聲作秦壊聖制廢井田見二卷周顯王十九年壊音怪是以兼并起貪鄙生彊者規田以千數弱者曽無立錐之居又置奴婢之市與牛馬同䦨師古曰闌謂遮闌之若牛馬闌圏也制於民臣顓斷其命繆於天地之性人為貴之義孝經孔子曰天地之性人為貴斷丁亂翻減輕田租三十而稅一常有更賦罷癃咸出師古曰更音工衡翻罷讀曰疲癃音隆晉灼曰雖老病者皆復出口筭而豪民侵陵分田劫假師古曰分田謂貧者無田而取富人田耕種共分其所收也假亦謂貧人賃富人之田也劫者富人劫奪其稅侵欺之也厥名三十稅一實什稅五也故富者犬馬餘菽粟驕而為邪貧者不厭糟糠窮而為姦俱陷于辜刑用不錯師古曰錯置也音千故翻今更名天下田曰王田奴婢曰私屬更工衡翻下同皆不得賣買其男口不盈八而田過一井者分餘田予九族鄰里鄉黨予讀曰與故無田今當受田者如制度敢有非井田聖制無灋惑衆者投諸四裔以禦魑魅師古曰魑山神也魅老物精也魑音螭魅音媚如皇始祖考虞帝故事舜投四凶於四裔以禦魑魅秋遣五威將王竒等十二人五威將分左右前後中帥衣冠車服駕馬各如其方面色數將即亮翻帥所類翻下同班符命四十二篇於天下徳祥五事符命二十五福應十二五威將奉符命齎印綬王矦以下及吏官名更者師古曰更改也外及匈奴西域徼外蠻夷徼古弔翻下同皆即授新室印綬因收故漢印綬大赦天下五威將乘乾文車鄭氏曰畫天文於車也駕坤六馬鄭氏曰坤為牝馬六地數背負鷩鳥之毛服飾甚偉師古曰鷩烏雉屬即鵕䴊也今俗呼云山雞非也鷩音鼈毎一將各置五帥將持節帥持幢帥所類翻幢傳江翻旛也其東出者至𤣥莵樂浪高句驪夫餘莵音塗樂浪音洛琅陸徳明曰句俱付翻又音駒驪力支翻師古曰夫音扶范曄曰武帝滅朝鮮開高句驪為縣使屬𤣥莵其人有五部在遼東之東千里夫餘在𤣥莵北千里東明之後也高句驪朱蒙之後以高為氏南出者隃徼外歴益州改句町王為矦徼外邊徼之外益州武帝所置益州郡也昭帝時姑繒葉榆夷反句町矦亡波擊反者有功立為王隃與踰同徼工釣翻句町音劬挺西出至西域盡改其王為矦北出至匈奴庭授單于印改漢印文去璽言章印符也信也亦因也封物相因付漢官儀曰諸侯王黄金槖駝鈕文曰璽列矦黄金龜鈕文曰章御史大夫金印中二千石銀印龜鈕文曰章千石至四百石皆銅印文曰印為莽以更印綬撓亂四夷張本去𦍑呂翻璽斯氏翻冬靁桐華以統睦矦陳崇為司命主司察上公以下又以說符矦崔發等為中城四關將軍主十二城門及繞霤羊頭肴黽汧隴之固中城將軍主十二城門四闗將軍分主繞霤羊頭肴黽汧隴四處三輔黄圖長安城東出南頭第一門曰霸城門莽改曰仁夀門第二門曰清明門莽曰宣德門東出北頭第一門曰宣平門莽曰春王門南出東頭第一門曰覆盎城門莽曰更清門第二門曰安門莽曰光禮門第三門曰便門莽曰信平門西出南頭第一門曰章城門莽曰萬秋門第二門曰直城門莽曰正道門第三門曰雍門莽曰章儀門北出東頭第一門曰洛門第二門曰厨城門莽曰建子城門第三門曰横門服䖍曰繞霤隘險之道師古曰謂之繞霤者言四面阸塞其道屈曲谿谷之水囘繞而霤也其處即今之商州界七盤十二繞是也霤音力救翻羊頭山名在上黨長子縣肴肴山也黽黽池也皆在陜縣之東也汧扶風汧縣有吳山汧水之阻隴謂隴坻也汧隴相連黽彌充翻汧口堅翻坻丁禮翻皆以五威冠其號冠古玩翻又遣諫大夫五十人分鑄錢於郡國是歳真定常山大雨雹雨于其翻二年春二月赦天下五威將帥七十二人還奏事漢諸侯王為公者悉上璽綬為民上時掌翻無違命者獨故廣陽王嘉以獻符命廣陽王嘉燕王旦之𤣥孫魯王閔以獻神書中山王成都以獻書言莽徳皆封列矦班固論曰昔周封國八百同姓五十有餘所以親親賢賢闗諸盛衰深根固本為不可㧞者也故盛則周召相其治致刑錯相息亮翻治直吏翻錯于故翻衰則五伯扶其弱與共守師古曰伯讀曰霸此五霸謂齊桓宋襄秦穆晉文吳子夫差也天下謂之共主如淳曰雖至微弱猶共以之為主彊大弗之敢傾師古曰言諸侯雖彊大不敢傾滅周也歴載八百餘年數極徳盡降為庻人用天年終謂赧王也秦訕笑三代竊自號為皇帝而子弟為匹夫内無骨肉本根之輔外無尺土藩翼之衛陳吳奮其白梃應劭曰白梃大杖也孟子曰可使制梃以撻秦楚是也師古曰梃音徒鼎翻劉項隨而斃之故曰周過其歴秦不及期國埶然也應劭曰武王克商卜世三十卜年八百今乃三十六世八百六十七年此謂過其歴者也秦以諡法少恐後世相襲自稱始皇帝子曰二世欲以一迄萬今至子而亡此之謂不及期也漢興之初懲戒亡秦孤立之敗於是尊王子弟王于况翻大啓九國自鴈門以東盡遼陽為燕代師古曰遼陽遼水之陽也常山以南大行左轉度河濟漸于海為齊趙師古曰太行山名也左轉亦謂自太行而東也漸入也一曰浸也濟子禮翻漸音子㢘翻亦讀如字榖泗以往奄有龜蒙為梁楚晉灼曰水經云泗水出魯國卞縣臣瓚曰榖在彭城泗之下流為榖水師古曰奄覆也龜䝉二山名東帶江湖薄㑹稽為荆吳文頴曰即今吳也高祖六年為荆國十六年更名吳師古曰荆吳同是一國薄伯各翻㑹工外翻北界淮瀕略廬衡為淮南師古曰瀕水厓也盧衡二山名波漢之陽亘九嶷為長沙鄭氏曰波音陂澤之陂孟康曰亘竟也音古贈翻師古曰波漢之陽者循漢水而往也水北曰陽波音彼皮翻又音彼義翻九嶷山名有九峰在零陵營道嶷音疑諸侯比境周匝三垂外接胡越師古曰比謂相次也三垂謂東北南也比音頻寐翻接連也天子自有三河東郡潁川南陽自江陵以西至巴蜀北自雲中至隴西與京師内史凡十五郡公主列侯頗邑其中師古曰十五郡中又往往有列侯公主之邑而藩國大者夸州兼郡連城數十宫室百官同制京師可謂矯枉過其正矣師古曰夸音跨枉曲也正曲封曰矯言矯秦孤立之敗而大子弟過於彊盛以至失其中也雖然髙祖創業日不暇給孝惠享國又淺高后女主攝位而海内晏如亡狂狡之憂卒折諸吕之難亡古無字通卒子恤翻難乃旦翻下同成太宗之業者亦賴之於諸侯也然諸侯原本以大末流濫以致溢小者淫荒越灋大者暌孤横逆以害身喪國師古曰暌孤乖剌之意暌音工攜翻横户孟翻䘮息浪翻故文帝分齊趙事見十四卷文帝二年又見十六年景帝削吳楚事見十六卷景帝三年武帝下推恩之令而藩國自析事見十八卷武帝元朔二年自此以來齊分為七師古曰謂齊城陽濟北濟南甾川膠西膠東也趙分為六謂趙平原真定中山廣川河間也梁分為五師古曰謂梁濟川濟東山陽濟隂也淮南分為三師古曰謂淮南衡山廬江皇子始立者大國不過十餘城長沙燕代雖有舊名皆亡南北邊矣如淳曰長沙之南更置郡燕代以北更置縁邊郡其所有饒利兵馬器械三國皆失之也亡古無字通下同景遭七國之難抑損諸侯減黜其官師古曰謂改丞相曰相省御史大夫廷尉少府宗正博士損大夫謁者諸官長丞員等也武有衡山淮南之謀事見十九卷武帝元朔五年及元狩三年作左官之律服䖍曰仕於諸侯為左官絶不使得仕於王朝也應劭曰人道尚右今舍天子而仕諸侯故謂之左官也師古曰左官猶言左道也蓋僻左不正應說是也漢時依上古灋朝廷之列以右為尊故謂降秩者為左遷仕諸侯者為左官設附益之灋張晏曰律鄭氏說封諸侯過限曰附益或曰阿媚王侯有重法也師古曰附益者蓋取孔子云求也為之聚歛而附益之之義也皆背正法而厚於私家也諸侯惟得衣食稅租不與政事與讀曰預至於哀平之際皆繼體苗裔親屬踈逺師古曰言非始封之君皆其後裔也故於天子益疎逺矣生於帷牆之中不為士民所尊埶與富室亡異而本朝短祚國統三絶師古曰謂成哀平皆早崩又無繼嗣亡古無字通是故王莽知漢中外殫微師古曰殫盡也音單本末俱弱無所忌憚生其姦心因母后之權假伊周之稱顓作威福廟堂之上不降階序而運天下師古曰序謂東西廂詐謀既成遂據南面之尊分遣五威之吏馳傳天下傳知戀翻班行符命漢諸侯王厥角稽首應劭曰厥者頓也角者額角也稽首首至地也言王莽漸潰威福日乆亦值漢之單弱王矦見莽簒弑莫敢怨望皆厥角稽首至地而上其璽綬也晉灼曰厥猶竪也叩頭則額角竪師古曰應說是也奉上璽韍惟恐在後或乃稱美頌徳以求容媚豈不哀哉國師公劉秀言周有泉府之官收不售與欲得師古曰言賣不售者官収取之無而欲得者官出與之即易所謂理財正辭禁民為非者也易下繫辭曰理財正辭禁民為非曰義莽乃下詔曰周禮有賖貸師古曰周禮泉府之職曰凡賖者祭祀無過旬日䘮紀無過三月凡人之貸者與其有司辨而授之以國服為之息謂以祭祀䘮紀故從官賖買物不過旬日及三月而償之其從官貸物者以共其所屬吏定價而後與之各以其國服之稅而輸息謂若受園㕓之田而貸萬錢者一朞之月出息五百貸音土戴翻樂語有五均鄧展曰樂語樂元語河間獻王所傳道五均事臣瓚曰其文云天子取諸矦之上以立五均則市無二價四民常均彊者不得困弱富者不得要貧則公家有餘恩及小民矣傳記各有筦焉筦古緩翻今開賖貸張五均設諸筦者所以齊衆庻抑并兼也遂於長安及洛陽邯鄲臨菑宛成都立五均司市錢府官司市常以四時仲月定物上中下之賈邯鄲音寒丹宛於元翻師古曰賈讀曰價下同各為其市平民賣五榖布帛絲綿之物不售者均官考檢厥實用其本賈取之物貴過平一錢則以平賈賣與民賤減平者聽民自相與市又民有乏絶欲賖貸者錢府予之予讀曰與毎月百錢收息三錢又以周官稅民凡田不耕為不殖出三夫之稅城郭中宅不樹蓺者為不毛師古曰樹蓺謂種樹果木及菜蔬出三夫之布民浮游無事出夫布一疋其不能出布者宂作縣官衣食之師古曰宂散也音人勇翻衣音於既翻食讀曰飤諸取金銀連錫鳥獸魚鱉於山林水澤孟康曰連錫之别名也李竒曰鉛錫應劭曰連似銅師古曰孟李二說皆非也許慎曰鏈銅屬也一曰丱也鏈抽延翻又陵延翻及畜牧者畜許六翻嬪婦桑蠶織紝紡績補縫師古曰機縷曰紝音人禁翻王匠醫巫卜祝及他方技商販賈人皆各自占所為於其所之技渠綺翻賈音古占之瞻翻下同之往也縣官除其本計其利十分之而以其一為貢敢不自占自占不以實者盡沒入所采取而作縣官一歲羲和魯匡復奏請𣙜酒酤復扶又翻𣙜古岳翻酤音故莽從之又禁民不得挾弩鎧犯者徙西海初莽既班四條於匈奴四條見三十五卷平帝元始二年後䕶烏桓使者告烏桓民毋得復與匈奴皮布稅匈奴遣使者責稅䕶烏桓使者即䕶烏桓校尉范曄曰烏桓自為昌頓所破常臣伏匈奴歲輸牛馬羊皮過時不具輒沒其妻子武帝遣霍去病擊破匈奴左地因徙烏桓於上谷漁陽右北平遼西遼東五郡塞外後置䕶烏桓校尉秩二千石擁節監領之師古曰故時常稅是以求之收烏桓酋豪縛倒懸之酋豪兄弟怒共殺匈奴使酋慈由翻單于聞之發左賢王兵入烏桓攻擊之頗殺人民敺婦女弱小且千人去置左地敺讀曰驅告烏桓曰持馬畜皮布來贖之烏桓持財畜往贖匈奴受留不遣師古曰受其財畜而留人不遣及五威將王駿等六人至匈奴六人一將五帥也重遺單于金帛遺于季翻下同諭曉以受命代漢狀因易單于故印故印文曰匈奴單于璽莽更曰新匈奴單于章師古曰新者莽自係其國號更工衡翻將率既至率讀與帥同所類翻授單于印韍韍音弗詔令上故印綬上時掌翻下同綬音受單于再拜受詔譯前欲解取故印韍譯通中國之語於匈奴者也單于舉掖授之左姑夕矦蘇從旁謂單于曰蘇者姑夕矦之名未見新印文宜且勿與單于止不肯與請使者坐穹廬單于欲前為夀奉酒為使者夀五威將曰故印紱當以時上單于曰諾復舉掖授譯復扶又翻下同蘇復曰未見印文且勿與單于曰印文何由變更更工衡翻遂解故印紱奉上將帥受著新紱著陟略翻不解視印飲食至夜乃罷右帥陳饒謂諸將帥曰曏者姑夕矦疑印文幾令單于不與人幾居希翻如令視印見其變改必求故印此非辭說所能距也既得而復失之辱命莫大焉不如椎破故印以絶禍根將帥猶與莫有應者師古曰與讀曰豫饒燕士果悍師古曰果决也悍勇也悍音胡幹翻又下罕翻即引斧椎壞之壞音怪下同明日單于果遣右骨都矦當白將帥曰漢單于印言璽不言章又無漢字諸王己下乃有漢言章言諸王已下印文有漢字最下文言章字今去璽加新言去璽字為章字又加新字也去𦍑呂翻與臣下無别言無所别異也别彼列翻願得故印將帥示以故印謂曰新室順天制作故印隨將帥所自為破壞單于宜承天命奉新室之制當還白單于知己無可柰何又多得賂遺即遣弟右賢王輿奉馬牛隨將帥入謝因上書求故印將帥還左犂汙王咸所居地見烏桓民多以問咸咸具言狀其言前所以略鳥桓民之狀將帥曰前封四條不得受烏桓降者亟還之降户江翻咸曰請密與單于相聞得語歸之謂得單于遣歸之語然後歸之也單于使咸報曰當從塞内還之邪從塞外還之邪將帥不敢顓决以聞詔報從塞外還之莽悉封五威將為子帥為男獨陳饒以破璽之功封威徳子饒帥也以功為子單于始用夏矦藩求地有拒漢語見三十二卷成帝綏和元年後以求稅烏桓不得因㓂掠其人民釁由是生重以印文改易故怨恨重直用翻乃遣右大且渠蒲呼盧訾等十餘人且子余翻訾子斯翻將兵衆萬騎以䕶送烏桓為名勒兵朔方塞下師古曰陽云䕶送烏桓人實來為㓂朔方太守以聞莽以廣新公甄豐為右伯莽以符命分陜立二伯豐為右伯平晏為左伯當出西域車師後王須置離聞之憚於供給煩費謀亡入匈奴都䕶但欽召置離斬之但姓欽名置離兄輔國侯狐蘭支將置離衆二千餘人亡降匈奴車師國有輔國矦猶相也擊胡矦猶將也將即亮翻降户江翻單于受之遣兵與狐蘭支共入㓂擊車師殺後城長後城即車師後王城也長知兩翻傷都䕶司焉及狐蘭兵復還入匈奴匈奴兵既殺傷漢吏復與狐蘭支兵還入匈奴也時戊巳校尉刁䕶病姓譜刁齊大夫豎刁之後余按豎刁寺人安得有後史記貨殖傳有刁間校户校翻史陳良終帶司馬丞韓𤣥右曲候任商史校尉之史也司馬丞司馬之丞也右曲侯軍分左右部部下有曲曲有候相與謀曰西域諸國頗背叛背蒲妹翻匈奴大侵要死可殺校尉帥人衆降匈奴如淳曰言匈奴來侵㑹當死耳可降匈奴也師古曰要音一遥翻言要之必死也帥讀曰率遂殺䕶及其子男昆弟盡脅略戊巳校尉吏士男女二千餘人入匈奴單于號良帶曰烏賁都尉師古曰賁音奔傳考異曰匈奴傳云烏桓都將軍西域云烏賁都尉今從之冬十一月立國將軍孫建奏九月辛巳陳良終帶自稱廢漢大將軍亡入匈奴廢漢言漢氏已廢滅也孫建之言云爾又今月癸酉不知何一男子遮臣建車前自稱漢氏劉子輿成帝下妻子也師古曰下妻猶言小妻劉氏當復趣空宫師古曰復音扶福翻趣讀曰促收繫男子即常安姓武字仲莽改長安曰常安皆逆天違命大逆無道漢氏宗廟不當在常安城中及諸劉當與漢俱廢陛下至仁乆未定前故安衆矦劉崇等更聚衆謀反劉崇事見上卷居攝元年更反謂崇敗後劉信劉快又起兵師古曰更音工衡翻今狂狡之虜復依託亡漢復扶又翻至犯夷滅連未止者此聖恩不蚤絶其萌芽故也臣請漢氏諸廟在京師者皆罷諸劉為吏者皆待除於家師古曰罷黜其職各使退歸而言在家待遷除莽曰可嘉新公國師以符命為予四輔明徳矦劉龔率禮侯劉嘉等矦考異曰燕王旦傳廣陽王嘉封扶美侯莽傳云率禮劉嘉未知其改封或别一人也余按率禮矦劉嘉安衆矦劉崇之族父也事見上卷居攝元年凡三十二人皆知天命或獻天符或貢昌言或捕告反虜厥功茂焉諸劉與三十二人同宗共祖者勿罷賜姓曰王唯國師公以女配莽子故不賜姓國師公秀女愔配莽之子臨定安公太后自劉氏之廢常稱疾不朝㑹朝直遥翻時年未二十莽敬憚傷哀欲嫁之乃更號曰黄皇室主師古曰莽自謂土徳故云黄皇室主若漢之稱公主余謂室主若言未嫁在室者也更工衡翻下同欲絶之於漢令孫建世子盛飾將醫往問疾后大怒鞭笞其傍侍御因發病不肯起莽遂不復彊也漢孝平王后周天元楊后猶有婦人内夫家外父母家之意然夷考二后本末天元楊后不逮孝平后也復扶又翻彊其兩翻十二月靁莽恃府庫之富欲立威匈奴乃更名匈奴單于曰降奴服于降户江翻下詔遣立國將軍孫建等率十二將分道並出五威將軍苖訢姓譜引風俗通曰楚大夫伯棼之後賁皇奔晉食采於苗因而氏焉訢音欣虎賁將軍王况出五原厭難將軍陳欽震狄將軍王廵出雲中師古曰厭音一渉翻難乃旦翻振武將軍王嘉平狄將軍王萌出代郡相威將軍李棽鎮逺將軍李翁出西河相息亮翻師古曰棽音所林翻誅貉將軍楊俊討濊將軍嚴尤出漁陽貉音陌莫百翻濊音穢奮武將軍王駿定胡將軍王晏出張掖及偏裨以下百八十人募天下囚徒丁男甲卒三十萬人轉輸衣裘兵器糧食自負海江淮至北邊使者馳傳督趣以軍興灋從事言事誅斬也傳知戀翻趣讀曰促先至者屯邊郡須畢具乃同時出窮追匈奴内之丁令師占曰逐之遣入丁零也令音零分其國土人民以為十五立呼韓邪子孫十五人皆為單于莽以錢幣訖不行復下書曰寶貨皆重則小用不給皆輕則僦載煩費復扶又翻下同師古曰僦也一曰貨也音子就翻輕重大小各有差品則用便而民樂樂音洛於是更作金銀龜貝錢布之品名曰寶貨更工衡翻錢貨六品小錢徑六分重一銖名曰小錢直一次七分三銖曰么錢二十次八分五銖曰㓜錢二十次九分七銖曰中錢三十次一寸九銖曰壯錢四十因前大錢五十為六品師古曰么音一遥翻金貨一品黄金一斤直錢萬是為一品銀貨二品朱提銀重八兩為一流直一千五百八十他銀一流直千是為二品師古曰朱音殊提音土支翻龜貨四品元龜岠冉長尺二寸直二千六百一十公龜九寸直五百侯龜七寸以上直三百子龜五寸以上直百是為四品孟康曰冉龜甲縁也岠至也度背兩邊縁尺二寸也元者大也貝貨五品大貝四寸八分以上二枚為一朋直二百一十六壯貝三寸六分以上一朋直五十幺貝二寸四分以上一明直三十小貝寸二分以上一朋直十不盈寸二分漏度不得為朋率枚直錢三是為五品貝紫貝也布貨十品大布次布弟布壯布中布差布厚布㓜布么布小布小布長寸五分重十五銖文曰小布一百自小布以上各相長一分相重一銖文各為其布名直各加一百上至大布長二寸四分重一兩而直千錢矣師古曰市亦錢耳謂之布者言其分布流行也凡寶貨五物六名二十八品鑄作錢布皆用銅殽以連錫百姓潰亂潰漢書作憒其貨不行莽知民愁乃但行小錢直一與大錢五十二品並行龜貝布屬且侵盜鑄錢者不可禁乃重其灋一家鑄錢五家坐之沒入為奴婢吏民出入持錢以副符傳不持者厨傳勿舍關津苛留師古曰舊法行者持符𫝊即不稽留今更令持錢與符相副乃得過也厨行道飲食處𫝊置驛之舍也苛問也傳音張戀翻苛音何公卿皆持以入宫殿門欲以重而行之是時百姓便安漢五銖錢以莽錢大小兩行難知又數變改不信數所角翻皆私以五銖錢市買訛言大錢當罷莫肯挾莽患之復下書諸挾五銖錢言大錢當罷者比非井田制投四裔及坐賣買田宅奴婢鑄錢自諸侯卿大夫至于庻民抵罪者不可勝數勝音升於是農商失業食貨俱廢民人至涕泣於市道莽之謀簒也吏民爭為符命皆得封侯其不為者相戲曰獨無天帝除書乎司命陳崇白莽曰此開姦臣作福之路而亂天命宜絶其原莽亦厭之遂使尚書大夫趙並驗治莽分九卿毎一卿置三大夫尚書大夫蓋屬共工也冶直之翻非五威將帥所班皆下獄下遐稼翻初甄豐劉秀王舜為莽腹心唱導在位褒揚功徳安漢宰衡之號及封莽母兩子兄子事並見上卷皆豐等所共謀而豐舜秀亦受其賜並富貴矣非復欲令莽居攝也復扶又翻下同居攝之萌出於泉陵侯劉慶前煇光謝嚻事見上卷元始五年周申伯邑於謝其後子孫以謝為氏長安令田終術事不見於史莽羽翼己成意欲稱攝豐等承順其意莽輙復封舜秀豐等子孫以報之豐等爵位已盛心意既滿又實畏漢宗室天下豪桀而疏逺欲進者並作符命莽遂據以即真謂哀章等也疏與踈同舜秀内懼而已豐素剛彊莽覺其不說故託符命文徙豐為更始將軍說讀曰恱更工衡翻與賣餅兒王盛同列豐父子黙黙時子尋為侍中兆兆大尹茂徳矦即作符命新室當分陜立二伯以豐為右伯太𫝊平晏為左伯如周召故事師古曰自陜以東周公主之自陜以西召公主之陜即今陜州是其地也伯長也陜音式冉翻召讀曰邵莽即從之拜豐為右伯當述職西出未行尋復作符命言故漢氏平帝后黄皇室主為尋之妻莽以詐立心疑大臣怨謗欲震威以懼下因是發怒曰黄皇室主天下母此何謂也收捕尋尋亡豐自殺尋隨方士入華山華山在華隂縣南華户化翻歲餘捕得辭連國師公秀子隆威矦棻師古曰棻亦分字也音扶云翻棻弟右曹長水校尉伐虜矦泳大司空邑弟左關將軍掌威矦竒莽置左關將軍主函谷及秀門人侍中騎都尉丁隆等牽引公卿黨親列矦以下死者數百人乃流棻于幽州放尋于三危殛隆于羽山師古曰放舜之罰共工等也皆驛車傳致其屍云傳知戀翻是歲莽始興神仙事以方士蘇樂言起八風臺臺成萬金師古曰費直萬金也又種五粱禾於殿中師古曰五色禾也谷永所云耕耘五徳者也晉灼曰翼氏風角五徳東方甲南方丙西方庚北方壬中央戊種五色禾於此地而耕耘也汜勝之曰粱是秫粟先以寶玉漬種煑鶴髓瑇瑁犀玉二十餘物取汁以漬種種章勇翻計粟斛成一金三年遣田禾將軍趙並發戍卒屯田五原北假以助軍糧莽遣中郎將藺苞副校尉戴級將兵萬騎多齎珍寶至雲中塞下招誘呼韓邪諸子欲以次拜為十五單于苞級使譯出塞誘呼左犂汙王咸咸子登助三人至誘音酉至則脅拜咸為孝單于助為順單于皆厚加賞賜傳送助登長安傳張戀翻莽封苞為宣威公拜為虎牙將軍封級為揚威公拜為虎賁將軍單于聞之怒曰先單于受漢宣帝恩不可負也先單于諸呼韓邪單于今天子非宣帝子孫何以得立遣左骨都矦右伊秩訾王呼盧訾及左賢王樂將兵入雲中益夀塞大殺吏民訾子斯翻是後單于歴告左右部都尉即左右大都尉也諸邊王諸王庭近漢邊者入塞㓂盜大輩萬餘中輩數千少者數百殺鴈門朔方太守都尉略吏民畜産不可勝數勝音升縁邊虗耗是時諸將在邊以大衆未集未敢出擊匈奴討濊將軍嚴尤諫曰濊音穢臣聞匈奴為害所從來乆矣未聞上世有必征之者也後世三家周秦漢征之然皆未有得上策者也周得中策漢得下策秦無策焉當周宣王時獫狁内侵至于涇陽地理志安定郡有涇陽縣賢曰涇陽故城在今原州平凉縣南命將征之盡境而還其視戎狄之侵譬猶蟁蝱敺之而已蟁古蚊字蝱音盲敺與驅同故天下稱明是為中䇿漢武帝選將練兵約齎輕糧師古日約少也少齎衣裝深入逺戍雖有克獲之功胡輙報之兵連禍結三十餘年中國罷耗匈奴亦創艾師古曰罷讀曰疲耗損也創音初向翻艾讀曰乂而天下稱武是為下策秦始皇不忍小恥而輕民力築長城之固延袤萬里師古曰袤長也音茂轉輸之行起於負海疆境既完中國内竭以䘮社稷是為無䇿䘮息浪翻今天下遭陽九之厄比年饑饉比毗至翻西北邊尤甚發三十萬衆具三百日糧東援海代師古曰援音爰引也余謂代當作岱岱山也南取江淮然後乃備計其道里一年尚未集合兵先至者聚居暴露師老械弊埶不可用此一難也邊既空虛不能奉軍糧内調郡國不相及屬此二難也師古曰調發也音徒釣翻屬音之欲翻計一人三百日食用糒十八斛糒音備乾飯也非牛力不能勝勝音升牛又自當齎食加二十斛重矣胡地沙鹵多乏水草以往事揆之軍出未滿百日牛必物故且盡餘糧尚多人不能負此三難也胡地秋冬甚寒春夏甚風多齎釜鍑薪炭重不可勝師古曰鍑釜之大口者也音富勝音升食糒飲水以歴四時糒音備師有疾疫之憂是故前世伐胡不過百日非不欲乆埶力不能此四難也輜重自隨則輕銳者少不得疾行虜徐遁逃埶不能及幸而逢虜又累輜重謂幸而逢虜得與之戰又為輜重所累也重直用翻累力瑞翻如遇險阻䘖尾相隨師古曰銜馬銜也尾馬尾也言前後單行不得並驅虜要遮前後危殆不測此五難也要讀曰邀大用民力功不可必立臣伏憂之今既發兵宜縱先至者令臣尤等深入霆擊且以創艾胡虜師古曰請率見到之兵且以擊虜艾音乂莽不聽尤言轉兵榖如故天下騷動咸既受莽孝單于之號馳出塞歸庭具以見脅状白單于單于更以為於栗置支侯匈奴賤官也漢書栗作粟後助病死莽以登代助為順單于吏士屯邊者所在放縱而内郡愁於徴發民棄城郭始流亡為盜賊并州平州尤甚并州部太原上黨上郡西河朔方五原雲中定襄鴈門等郡余按此時未有平州漢末公孫度自號平州牧魏始分幽州置平州平字誤也莽令七公六卿號皆兼稱將軍七公四輔及三公也六卿羲和作士秩宗典樂共工予虞遣著武將軍逯並等鎭名都中郎將繡衣執灋各五十五人分鎭縁邊大郡督大姦猾擅弄兵者皆乘便為姦於外撓亂州郡師古曰撓音火高翻其字從手下同貨賂為市侵漁百姓莽下書切責之曰自今以來敢犯此者輙捕繫以名聞然猶放縱自若北邊自宣帝以來數世不見煙火之警謂匈奴欵塞之後也人民熾盛牛馬布野及莽撓亂匈奴與之搆難難乃旦翻邊民死亡係獲數年之間北邊虛空野有暴骨矣暴步卜翻太師王舜自莽簒位後病悸寖劇死師古曰心動曰悸寖漸也悸音葵季翻莽為太子置師友各四人秩以大夫以故大司徒馬宫等為師凝傅丞阿輔保拂是為四師馬宫為師凝宗伯鳳為傅丞袁聖為阿輔王嘉為保拂也師古曰拂讀曰弼故尚書令唐林等為胥附犇走先後禦侮是為四友唐林為胥附李充為犇走趙襄為先後㢘丹為禦侮走讀曰奏先悉薦翻後胡茂翻又置師友侍中諫議六經祭酒各一人凡九祭酒秩皆上卿師友侍中諫議三祭酒并六經六祭酒為九祭酒遣使者奉璽書印綬安車駟馬迎龔勝即拜為師友祭酒師古曰就家迎之因拜官璽斯氏翻使者與郡太守縣長吏三老官屬行義諸生千人以上入勝里致詔龔勝楚人史逸其所居縣百官表縣令丞尉為長吏師古曰行義謂鄉邑有行義之人諸生學徒也行下孟翻使者欲令勝起迎乆立門外勝稱病篤為牀室中户西南牖下師古曰牖窓也於户之西室之南牖下也東首加朝服拖紳師古曰拖引也卧著朝衣故云加引大帶於體也論語稱孔子疾君視之東首加朝服拖紳故放之也首式又翻拖音吐賀翻使者付璽書奉印綬内安車駟馬進謂勝曰聖朝未嘗忘君制作未定待君為政思聞所欲施行以安海内勝對曰素愚加以年老被病命在朝夕隨使君上道師古曰示若尊敬使者故謂之使君被皮義翻必死道路無益萬分使者要說師古曰要音一遥翻說音式芮翻至以印綬就加勝身勝輙推不受推吐雷翻使者上言方盛夏暑熱勝病少氣少詩沼翻可須秋凉乃發師古曰須待也有詔許之使者五日壹與太守俱問起居為勝兩子及門人高暉等言為于偽翻朝廷虗心待君以茅土之封雖疾病宜移動至傳舍傳知戀翻示有行意必為子孫遺大業大業謂封邑也暉等白使者語勝自知不見聽即謂暉等吾受漢家厚恩無以報今年老矣旦暮入地誼豈以一身事二姓下見故主哉勝因敕以棺歛䘮事勑誡也師古曰棺音工喚翻歛音力贍翻衣周於身棺周於衣勿隨俗動吾冢種柏作祠堂師古曰若𦵏多設器備則恐被掘故云動吾冢也亦不得種柏及作祠堂皆不隨俗貢父曰勝意謂一𦵏之後更不隨俗動冢土種柏作祠堂語畢遂不復開口飲食復扶又翻積十四日死死時七十九矣是時清名之士又有琅琊紀逡齊薛方太原郇越郇相師古曰逡音于旬翻郇音荀又音胡頑翻今郇荀二姓並有之俱稱周武王之後也沛唐林唐尊皆以明經飭行顯名於世師古曰飭謹也行下孟翻紀逡兩唐皆仕莽封矦貴重歴公卿位唐林數上䟽諫正有忠直節唐尊衣敝履空師古曰衣音於既翻著敝衣躡空履也空穿也被虗偽名師古曰被音皮義翻郇相為莽太子四友病死莽太子遣使裞以衣衾師古曰贈䘮衣服曰裞音式芮翻其字從衣其子攀棺不聽曰死父遺言師友之送勿有所受今於皇太子得託友官故不受也京師稱之莽以安車迎薛方方因使者辭謝曰堯舜在上下有巢由巢父許由也今明主方隆唐虞之徳小臣欲守箕山之節張晏曰許由隱於箕山在陽城有許由祠使者以聞莽說其言說讀曰恱不彊致彊其兩翻初隃麋郭欽為南郡太守師古曰隃麋扶風之縣也隃音踰杜陵蔣詡為兖州刺史姓譜周公之子封於蔣後以為氏亦以㢘直為名莽居攝欽詡皆以病免官歸鄉里臥不出户卒於家哀平之際沛國陳咸以律令為尚書中興之後沛方為國此由范史以後來所見書之也陳咸後漢陳寵之曽祖也莽輔政多改漢制咸心非之及何武鮑宣死事見上卷平帝元始三年咸歎曰易稱見幾而作不俟終日易下繫之辭也幾居希翻吾可以逝矣即乞骸骨去職及莽簒位召咸為掌㓂大夫掌㓂大夫當屬作士咸謝病不肯應時三子參欽豐皆在位咸悉令解官歸鄉里閉門不出入猶用漢家祖臘人問其故咸曰我先人豈知王氏臘乎悉收歛其家律令書文壁藏之按三十二卷成帝綏和元年陳咸以淳于長事廢歸故郡以憂死咸沛郡相人也此書沛國陳咸木之後漢書陳寵傳光武始改沛郡為沛國二陳咸雖同居沛各是一人又齊栗融北海禽慶蘇章禽姓也墨子弟子有禽滑釐又有犀首禽息山陽曹竟皆儒生去官不仕於莽班固贊曰春秋列國卿大夫及至漢興將相名臣耽寵以失其世者多矣師古曰言不能去是故清節之士於是為貴然大率多能自治而不能治人治直之翻王貢之材優於龔鮑守死善道勝實蹈焉師古曰論語孔子曰守死善道今龔勝不受莽官蹈斯迹也貞而不諒薛方近之師古曰論語孔子曰君子貞而不諒謂君子之人正其道耳言不必信也薛方引避亂朝詭引巢許為諭近此義近其靳翻郭欽蔣詡好遯不汙絶紀唐矣師古曰欽詡不仕於莽遯逃濁亂不汙其節殊於紀逡及兩唐好呼到翻通鑑書龔勝之死遂及一時人士又書班固之論其為監也不亦昭乎是歲瀕河郡蝗生河决魏郡泛清河以東數郡先是莽恐河决為元城冢墓害莽曽祖賀以下冢墓在魏郡元城先悉薦翻及决東去元城不憂水故遂不堤塞塞悉則翻四年春二月赦天下厭難將軍陳欽震狄將軍王巡上言捕得虜生口驗問言虜犯邊者皆孝單于咸子角所為莽乃㑹諸夷斬咸子登於長安市大司馬甄邯死甄之人翻邯户甘翻莽至明堂下書以洛陽為東都常安為西都邦畿連體各有采任男食邑於畿内曰采女食邑於畿内曰任師古曰采采服也任男服也州從禹貢為九爵從周氏為五禹貢冀兖青徐揚豫荆雍梁凡九州周爵公矦伯子男凡五等諸侯之員千有八百八州州二百一十國并畿内凡千七百七十三國言千八百國舉成數也附城之數亦如之以俟有功諸公一同地方百里曰同有衆萬户其餘以是為差今已受封者公侯以下凡七百九十六人附城千五百五十一人以圖簿未定未授國邑且令受奉都内奉讀曰俸都内積錢之府屬大司農月錢數千諸侯皆困乏至有傭作者莽性躁擾不能無為躁則到翻毎有所興造動欲慕古不度時宜度徒洛翻制度又不定吏縁為姦天下謷謷陷刑者衆師古曰謷謷衆口愁聲音敖莽知民愁怨乃下詔諸食王田皆得賣之勿拘以灋犯私買賣庻人者且一切勿治治直之翻然他政誖亂刑罰深刻賦歛重數猶如故焉誖蒲内翻數所角翻初五威將帥出西南夷改句町王為矦王邯怨怒不附師古曰邯句町王之名也音下甘翻莽諷牂柯大尹周歆詐殺邯牂柯音臧哥傳考異曰西南夷傳作周欽莽作周歆今從之邯弟承起兵殺歆州郡擊之不能服莽又發高句驪兵擊匈奴高句驪不欲行郡彊迫皆亡出塞因犯灋為㓂彊其兩翻遼西大尹田譚追擊之為所殺州郡歸咎於高句驪矦騶嚴尤奏言貉人犯灋不從騶起貉與貊同莫百翻後漢書句驪一名貊耳正有他心宜令州郡且慰安之師古曰假令騶有惡心亦當且慰安今猥被以大罪師古曰猥多也厚也被加也音皮義翻余謂猥積也曲也恐其遂畔夫餘之屬必有和者和胡卧翻匈奴未克夫餘濊貉復起此大憂也後漢書濊與句驪同種言語法俗大抵相類各有部界復扶又翻莽不尉安濊貉遂反詔尤擊之尤誘高句驪矦騶至而斬焉傳首長安騶側尤翻莽大說更名髙句驪為下句驪說讀曰恱更工衡翻下同於是貉人愈犯邊東北與西南夷皆亂東濊貊北匈奴也莽志方盛以為四夷不足吞滅專念稽古之事復下書以此年二月東巡狩具禮儀調度復扶又翻調徒弔翻既而以文母太后體不安且止待後初莽為安漢公時欲諂太皇太后以斬郅支功奏尊元帝廟為髙宗事見上卷元始四年太后晏駕後當以禮配食云及莽改號太后為新室文母絶之於漢不令得體元帝墮壊孝元廟師古曰夫婦一體也墮毁也音火規翻壊音怪更為文母太后起廟獨置孝元廟故殿以為文母篹食堂置捨也留地孟康曰篹音撰晉灼曰篹具也既成名曰長夀宫以太后在故未謂之廟莽置酒長夀宫請太后既至見孝元廟廢徹塗地太后驚泣曰此漢家宗廟皆有神靈與何治而壊之師古曰與讀曰預言此何罪於汝無所干預何為毁壊之壊音怪且使鬼神無知又何用廟為如令有知我乃人之妃妾豈宜辱帝之堂以陳饋食哉釋名吳人謂祭為饋私謂左右曰此人慢神多矣能乆得祐乎祐福也神助也飲酒不樂而罷樂音洛自莽簒位後知太后怨恨求所以媚太后者無不為然愈不說說讀曰恱莽更漢家黒貂著黄貂孟康曰侍中所著貂也莽改漢制服黄更音工衡翻著音陟畧翻又改漢正朔伏臘日太后令其官屬黒貂至漢家正臘日獨與其左右相對飲食五年春二月文母皇太后崩年八十四𦵏渭陵與元帝合而溝絶之如淳曰𦵏於司馬門内作溝絶之新室世世獻祭其廟元帝配食坐於牀下莽為太后服䘮三年為于偽翻烏孫大小昆彌遣使貢獻莽以烏孫國人多親附小昆彌見匈奴諸邊並侵意欲得烏孫心乃遣使者引小昆彌使坐大昆彌使上使疏吏翻下同師友祭酒滿昌劾奏使者曰夷狄以中國有禮誼故詘而服從劾户槩翻詘與屈同大昆彌君也今序臣使於君使之上非所以有夷狄也奉使大不敬莽怒免昌官師友祭酒龔勝不肯就而滿昌為之鳯皇翔于千仭烏鳶彈射不去非虚言也西域諸國以莽積失恩信焉耆先叛焉耆國治員渠城去長安七千三百里殺都䕶但欽西域遂瓦解十一月彗星出二十餘日不見彗祥歲翻旋芮翻又徐醉翻見賢遍翻是歲以挾銅炭者多除其灋匈奴烏珠畱單于死用事大臣右骨都矦須卜當史記正義匈奴須卜氏掌獄訟即王昭君女伊墨居次云之壻也云常欲與中國和親又素與伊栗置支矦咸厚善云於咸為季父也見咸前後為莽所拜故遂立咸為烏累若鞮單于師古曰累音力追翻烏累單于咸立以弟輿為右谷蠡王谷音鹿蠡鹿奚翻烏珠留單于子蘇屠胡本為左賢王後更謂之䕶于烏珠留單于以左賢王數死不祥更易命左賢王為䕶于欲傳以國咸怨烏珠留單于貶已號乃貶䕶于為左屠耆王天鳳元年春正月赦天下莽下詔將以是歲四仲月徧行廵狩之禮太官齎糒乾肉内者行張坐臥乾音干内者令時屬共工續漢志内者令掌布張諸衣物師古曰張坐臥者謂帷帳茵席也所過毋有所給師古曰言自齎食及帷帳以行在路所經過不須供費也俟畢北廵狩之禮即于土中居洛陽之都羣公奏言皇帝至孝新遭文母之䘮顔色未復飲食損少今一歲四廵道路萬里春秋尊非糒乾肉之所能堪糒音備乾音干且無廵狩須闋大服以安聖體師古曰闋盡也音口决翻莽從之要期以天鳳七年廵狩厥明年即土之中遣太傅平晏大司空王邑之洛陽營相宅兆相息亮翻宅居也壇域瑩界皆曰兆圖起宗廟社稷郊兆云三月壬申晦日有食之大赦天下以災異策大司馬逯並就矦氏朝位免官以矦爵就朝位朝直遥翻太傅平晏勿領尚書事以利苖男訢為大司馬如浮曰利苖邑名訢音欣莽即眞尤備大臣抑奪下權朝臣有言其過失者輙㧞擢孔仁趙博費興等以敢擊大臣故見信任洪氏𨽻釋曰余家所收姓氏文字粗備以諸書參攷頗多牴牾不合姓苑云費氏禹後音父位翻李利涉編古命氏云費氏出自魯桓公少子季友受邑於費元和姓纂費氏亦音秘姓林云費氏音蜚夏禹之後余嘗攷之此字有兩姓音讀不同源流亦異其一音蜚嬴姓出於伯益之後史記所載費昌費中楚費無極漢費將軍費直費長房費禕之徒是其後也其一音祕姫姓出於魯季友姓苑所載琅邪費氏是其後也然則姓苑姓林姓纂皆云夏禹之後姓纂又云亦音祕及謂琅琊費氏為直之後皆其差誤而編古命氏以費將軍費禕之徒出於魯季友亦非也師古曰費音扶味翻擇名官而居之國將哀章頗不清莽為選置和叔師古曰特為置此官余謂莽以國將主冬故置和叔之官將即亮翻下同敕曰非但保國將閨門當保親屬在西州者章梓潼人其親屬在西州諸公皆輕賤而章尤甚言十一公皆為莽所輕賤而章尤甚也夏四月隕霜殺草木海瀕尤甚師古曰邊海之地也六月黄霧四塞塞悉則翻秋七月大風㧞樹飛北闕直城門屋瓦直城門長安城西出南頭第二門雨雹殺牛羊雨于具翻莽以周官王制之文置卒正連率大尹職如太守王制三十國為卒卒有正十國為連連有率率所類翻守式又翻又置州牧部監二十五人分長安城旁六鄉置帥各一人分三輔為六尉郡師古曰三輔黄圖云渭城安陵以西北至栒邑義渠十縣屬京尉大夫府居故長安寺髙陵以北十縣屬師尉大夫府居故廷尉府新豐以東至湖十縣屬翊尉大夫府居城東霸陵杜陵東至藍田西至武功都夷十縣屬光尉大夫府居城南茂陵槐里至汧十縣屬扶尉大夫府居城西長陵池陽以北至雲陽祋祤十縣屬烈尉大夫府居城北帥所類翻河内河東𢎞農河南潁川南隊為六隊郡師古曰隊音遂仲馮曰河南當為滎陽莽所分為六遂之一也下文自有河南大尹更為保忠信卿河東兆隊河内後隊𢎞農右隊滎陽祈隊潁川左隊南陽前隊更名河南大尹曰保忠信卿更工衡翻下同益河南屬縣滿三十置六郊州長各一人人主五縣及他官名悉改大郡至分為五合百二十有五郡九州之内縣二千二百有三又倣古六服為惟城惟寧惟翰惟屏惟垣惟藩各以其方為稱公作甸服是為惟城諸在矦服是為惟寜在采任諸侯是為惟翰在賔服是為惟屏在揆文教奮武衛是為惟垣在九州之外是為惟藩屏必郢翻稱尺證翻總為萬國焉其後歲復變更一郡至五易名而還復其故吏民不能紀毎下詔書輙繫其故名云按莽傳詔曰祈隊故滎陽是也匈奴右骨都侯須卜當伊墨居次云勸單于和親遣人之西虎猛制虜塞下漢書作西河虎猛制虜塞下師古曰虎猛縣名制虜塞在其界此逸河字之往也告塞吏云欲見和親矦和親矦者王昭君兄子歙也師古曰歙音翕中部都尉以聞漢邊郡置五部都尉分治屬縣莽遣歙歙弟騎都尉展徳矦颯使匈奴師古曰颯音立賀單于初立賜黄金衣被繒帛紿言侍子登在因購求陳良終帶等單于盡收陳良等二十七人皆械檻付使者遣厨唯姑夕王富等四十人送歙颯莽作焚如之刑燒殺陳良等應劭曰易有焚如死如棄如之言莽依此作刑名也如淳曰焚如死如棄如者謂不孝子也也不畜於父母不容於朋友故燒殺棄之莽依此作刑名縁邊大饑人相食諌大夫如普行邊兵還言軍士乆屯寒苦邊郡無以相贍今單于新和宜因是罷兵校尉韓威進曰以新室之威而吞胡虜無異口中蚤蝨臣願得勇敢之士五千人不齎斗糧飢食虜肉渴飲其血可以横行莽壯其言以威為將軍然采普言徴還諸將在邊者免陳欽等十八人又罷四關鎮都尉諸屯兵莽置四關各有鎮都尉領屯兵單于貪莽賂遺遺于季翻故外不失漢故事然内利㓂掠又使還知子登前死怨恨使䟽吏翻還從宣翻又如字㓂虜從左地入不絶師古曰入為冦而虜掠使者問單于輙曰烏相與匈奴無狀黠民共為㓂入塞譬如中國有盜賊耳黠下入翻咸初立持國威信尚淺盡力禁止不敢有二心莽復發軍屯復扶又翻下同益州蠻夷愁擾盡反復殺益州大尹程隆武帝開滇國為益州郡屬益州莽屬梁州莽遣平蠻將軍馮茂發巴蜀犍為吏士賦歛取足於民以擊之犍居言翻歛力贍翻莽復申下金銀龜貝之貨頗増減其賈直賈讀曰價而罷大小錢改作貨布貨泉二品並行貨布長二寸五分廣一寸首長八分有竒廣八分其圜好徑二分半足枝長八分間廣二分其文右曰貨左曰布重二十五銖直貨泉二十五貨泉徑一寸重五銖文右曰貨左曰泉文直一孔潁達曰案食貨志今世謂之笇錢是也邊猶為貨泉之字大泉即今四文錢也四邊並有文也貨布之形今世難識世人耕地猶有得者古時一箇凖二十五錢也余按古所謂泉布者其藏曰泉其行曰布取名於水泉其流行無不徧無不徧則布之義也王莽以為貨二品非古義考異曰食貨志改作貨布在天鳯元年莽傳在地皇元年盖以大錢盡之年至地皇元年乃絶不行耳非其年始作貨布也又以大錢行乆罷之恐民挾不止乃令民且獨行大錢盡六年毋得復挾大錢矣毎一易錢民用破業而大陷刑資治通鑑卷三十七
