front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百六十一宋司馬光撰胡三省音註梁紀十七著雍執徐一年髙祖武皇帝十七太清二年春正月己亥慕容紹宗以鐵騎五千夹擊侯景承上卷上年紹宗與景相持事故不書東魏景誑其衆曰汝輩家屬已為髙澄所殺衆信之盖前乎此時景以此言誑衆也誑居况翻紹宗遥呼曰呼火故翻汝軰家屬並完若歸官勲如舊歸謂復歸東魏官者各人先所居之官勲勲階也被髮向北斗為誓質北斗為誓以明其言之不欺被皮義翻景士卒不樂南渡樂音洛其将暴顯等各帥所部降於紹宗暴顯去年春為侯景所執将即亮翻帥讀曰率降户江翻景衆大潰争赴渦水渦音戈水為之不流為于偽翻景與腹心數騎自硖石濟淮稍收散卒得步騎八百人騎竒寄翻南過小城人登陴詬之曰跛奴侯景右足偏短故詬為跛奴陴頻彌翻詬苦侯翻跛普我翻欲何為邪景怒破城殺詬者而去晝夜兼行追軍不敢逼行考異曰典略云晝息夜追軍漸逼今從梁書使謂紹宗曰景若就擒公復何用紹宗乃縱之人臣茍有才必養寇以自資東魏之世彭樂慕容紹宗同一轍耳復扶又翻辛丑以尚書僕射謝舉為尚書令守吏部尚書王克為僕射甲辰豫州刺史羊鴉仁以東魏軍漸逼稱糧運不繼棄懸瓠還義陽殷州刺史羊思達亦棄項城走去年使羊鴉仁鎮懸瓠羊思達鎮項城考異曰典畧在六月今從梁帝紀東魏人皆據之上怒責讓鴉仁鴉仁懼啟申後期頓軍淮上不敢歸義陽侯景既敗不知所適時鄱陽王範除南豫州刺史未至去年遣蕭淵明攻彭城以範代鎮夀陽時猶未至馬頭戍主劉神茂素為監州事韋黯所不容監工衘翻聞景至故往候之有意見之為故鄭𤣥曰古者謂候為進孔穎達曰古時謂迎客為進漢時謂迎客為候今按經𫝊迎客為進則進使者而問故之類是也迎客為候則鄭注周禮候人云候候迎賔客之來是也景問曰夀陽去此不逺城池險固欲往投之韋黯其納我乎神茂曰黯雖據城是監州耳王若馳至近郊彼必出迎因而執之可以集事得城之後徐以啟聞朝廷喜王南歸必不責也景執其手曰天教也神茂請帥步騎百人先為鄉導帥讀曰率鄉讀曰嚮壬子景夜至夀陽城下韋黯以為賊也授甲登陴陴頻彌翻景遣其徒告曰河南王戰敗來投此鎮願速開門黯曰既不奉敇不敢聞命景謂神茂曰事不諧矣神茂曰黯懦而寡智可説下也説式芮翻乃遣夀陽徐思玉入見黯曰徐思玉本夀陽人仕於東魏今随侯景北來河南王朝廷所重君所知也今失利來投何得不受黯曰吾之受命惟知守城河南自敗何預吾事思玉曰國家付君以閫外之略今君不肯開城若魏兵來至河南為魏所殺君豈能獨存何顔以見朝廷黯然之思玉出報景大悦曰活我者卿也癸丑黯開門納景景遣其将分守四門詰責黯将斬之将即亮翻下同詰去吉翻既而撫手大笑置酒極歡黯叡之子也合肥之役黯請叡下城避箭其懦闇可知矣然使黯能拒景梁朝亦将敇黯納之朝廷聞景敗未得審問或云景與将士盡沒上下咸以為憂侍中太子詹事何敬容詣東宫太子曰淮北始更有信侯景定得身免不如所𫝊敬容曰得景遂死深為朝廷之福太子失色問其故敬容曰景翻覆叛臣終當亂國太子於𤣥圃自講老荘自蕭齊以來東宫有𤣥圃崑崙之山三級下曰樊桐二曰𤣥圃三曰層城太帝之所居東宫次於帝居故立𤣥圃敬容謂學士吳孜曰梁祕書省有撰史學士昔西晉祖尚𤣥虚使中原淪於胡羯事見晉紀今東宫復爾江南亦将為戎乎何敬容雖不能優游於文義其識則過於梁朝諸臣矣復扶又翻下景復復敕乃復故復同甲寅景遣儀同三司于子悦馳以敗聞併自求貶削優詔不許景復求資給上以景兵新破未忍移易乙夘即以景為南豫州牧本官如故更以鄱陽王範為合州刺史鎮合肥更工衡翻光禄大夫蕭介上表諌曰竊聞侯景以渦陽敗績隻馬歸命渦音戈陛下不悔前禍復敇容納臣聞凶人之性不移天下之惡一也昔吕布殺丁原以事董卓終誅董而為賊事見漢靈獻二帝紀劉牢反王恭以歸晉還背晉以構妖事見晉安帝紀妖於驕翻何者狼子野心終無馴狎之性養虎之喻必見飢噬之禍矣侯景以凶狡之才荷髙歡卵翼之遇左傳楚令尹子西曰勝如卵予翼而長之荷下可翻位忝台司任居方伯然而髙歡墳土未乾乾音干即還反噬逆力不逮乃復逃死闗西宇文不容故復投身於我陛下前者所以不逆細流李斯上秦王書曰江海不擇細流故能就其深正欲比屬國降胡以討匈奴漢邉郡置屬國以處降胡使偵伺匈奴降户江翻冀獲一戰之效耳今既亡師失地直是境上之匹夫陛下愛匹夫而棄與國與國謂東魏若國家猶待其更鳴之晨嵗暮之效臣竊惟侯景必非嵗暮之臣惟思也棄鄉國如脱屣背君親如遺芥背蒲妹翻豈知逺慕聖徳為江淮之純臣乎事迹顯然無可致惑臣朽老疾侵不應干預朝政朝直遥翻但楚囊将死有城郢之忠左傳楚令尹子囊将死遺言子庚必城郢君子謂子囊忠将死不忘衞社稷衞魚臨亡亦有尸諌之節孔子家語曰衞大夫蘧伯玉賢靈公不用彌子瑕不肖反任之史魚驟諫不從将卒命其子曰吾不能進蘧伯玉退彌子瑕是不能正君也生不能正君死無以成禮我死汝置屍牖下於我畢矣其子從之靈公弔焉怪而問之其子以告公曰是寡人之過也命之殯於客位進蘧伯玉退彌子瑕孔子聞之曰古之烈諌者死則己矣未有若史魚死而屍諫忠感其君者也臣忝為宗室遺老敢忘劉向之心劉向事見三十卷漢成帝陽朔二年上歎息其忠然不能用介思話之孫也宋元嘉間蕭思話歴當方任按新唐書宰相世系表介與帝同十三世祖後漢中山相苞己未東魏大将軍澄朝于鄴朝直遥翻下同魏以開府儀同三司趙貴為司空魏皇孫生大赦二月東魏殺其南兖州刺史石長宣討侯景之黨也石長宣書官者表其以南兖州附侯景也不可以春秋書法觀之其餘為景所脅從者皆赦之東魏既得懸瓠項城悉復舊境大将軍澄數遣書移移謂移檄也數所角翻復求通好朝廷未之許澄謂貞陽侯淵明曰先王與梁主和好十有餘年復扶又翻好呼到翻下舊好同聞彼禮佛文云奉為魏主并及先王為于偽翻言為魏主君臣祈福也此乃梁主厚意不謂一朝失信致此紛擾知非梁主本心當是侯景扇動耳宜遣使諮論使疏吏翻下同若梁主不忘舊好吾亦不敢違先王之意諸人並即遣還侯景家屬亦當同遣淵明乃遣省事夏侯僧辯奉啟於上稱勃海王𢎞厚長者若更通好當聴淵明還上得啟流涕此所謂婦人之仁也帝於是堕髙澄數中矣與朝臣議之右衞将軍朱异御史中丞張綰等皆曰静冦息民和實為便司農卿𫝊岐獨曰髙澄何事須和必是設間异羊至翻間古莧翻故命貞陽遣使欲令侯景自疑景意不安必圖禍亂若許通好正堕其計中侯景之反覆何敬容蕭介知之髙澄之姦詐傅岐知之梁朝非果無人也武帝不能决擇而用之耳异等固執宜和上亦厭用兵乃從异言賜淵明書曰知髙大将軍禮汝不薄省啟甚以慰懐當别遣行人重敦鄰睦省悉景翻重直用翻僧辯還過夀陽侯景竊訪知之攝問具服攝問收録其人而問之也乃寫荅淵明之書陳啟於上曰髙氏心懐鴆毒怨盈北土人願天從歡身殞越謂人所祝願天從而殺之子澄嗣惡計滅待時所以昧此一勝者謂渦陽之勝也盖天蕩澄心以盈凶毒耳左傳楚武王将死告其夫人鄧曼曰余心蕩鄧曼曰王禄盡乎盈而蕩天之道也杜預注曰蕩動散也澄茍行合天心行下孟翻又如字腹心無疾又何急急奉璧求和豈不以秦兵扼其喉秦兵謂西魏之兵西魏據有闗西故曰秦兵胡騎迫其背胡騎謂柔然之兵故甘辭厚幣取安大國臣聞一日縱敵數世之患晉先軫之言何惜髙澄一豎以弃億兆之心竊以北魏安彊莫過天監之始鍾離之役匹馬不歸鍾離之戰見一百四十六卷天監六年當其彊也陛下尚伐而取之及其弱也反慮而和之舎已成之功縱垂死之虜使其假命彊梁以遺後世舎讀曰捨遺于季翻非直愚臣扼腕實亦志士痛心昔伍相奔吳楚邦卒滅左傳楚殺伍奢其子奔吳吳王闔閭用之破楚入郢腕烏貫翻相息亮翻卒子恤翻陳平去項劉氏用興見漢髙帝紀臣雖才劣古人心同往事誠知髙澄忌賈在翟惡㑹居秦左傳晉靈公之初賈季奔翟随㑹奔秦秦人用其謀晉人患之六卿相見於諸浮趙宣子曰隨㑹在秦賈季在翟難日至矣将若之何翟與狄同惡烏路翻求盟請和冀除其患若臣死有益萬殞無辭唯恐千載有穢良史觀景此言其氣悖矣景又致書於朱异餉金三百兩异納金而不通其啟史言朱异昧利而不顧患己夘上遣使弔澄景又啟曰臣與髙氏舋隙已深仰慿威靈期雪讐恥今陛下復與髙氏連和使臣何地自處此乃侯景由𠂻之言使疏吏翻舋許覲翻復扶又翻處昌吕翻乞申後戰宣暢皇威上報之曰朕與公大義已定豈有成而相納敗而相弃乎今髙氏有使求和朕亦更思偃武進退之宜國有常制公但清静自居無勞慮也景又啟曰臣今蓄糧聚衆秣馬潜戈指日計期克清趙魏不容軍出無名故願以陛下為主耳觀景此言亦那可忍今陛下弃臣遐外南北復通将恐㣲臣之身不免髙氏之手景言至此辭意迫切獸窮則搏能無及乎復扶又翻下勞復同上又報曰朕為萬乗之主豈可失信於一物想公深得此心不勞復有啟也既㫁來章景又生心矣乗繩證翻景乃詐為鄴中書求以貞陽侯易景上将許之舍人傅岐曰傅岐先兼中書通事舍人累遷太僕司農卿兼舎人如故侯景以窮歸義弃之不祥且百戰之餘寧肯束手就縶謝舉朱异曰景奔敗之将一使之力耳将即亮翻使疏吏翻上從之復書曰貞陽旦至侯景夕返景謂左右曰我固知吴老公薄心腸帝之情態於此畢露而帝不自知也嗚呼王偉説景曰今坐聴亦死言坐而聴梁朝所為亦必至于死説式芮翻舉大事亦死唯王圖之於是始為反計屬城居民悉召募為軍士輒停責市估及田租市估應商旅之物入市者估其直而收税田租計畆所出常租百姓子女悉以配将士景之反謀彰灼如此梁之君臣若㒺聞知其亡宜矣三月癸巳東魏以太尉襄城王旭為大司馬旭吁玉翻開府儀同三司髙岳為太尉辛亥大将軍澄南臨黎陽自虎牢濟河至洛陽魏同軌防長史裴寛與東魏将彭樂等戰為樂所擒澄禮遇甚厚寛得間逃歸将即亮翻間古莧翻澄由太行返晉陽行户剛翻屈獠洞斬李賁賁竄屈獠洞見一百五十九卷中大同元年獠魯皓翻考異曰陳髙祖紀云太清元年盖謂破賁之年今從梁帝紀中按通鑑破賁書于大同元年𫝊首建康賁兄天寳遁入九真收餘兵二萬圍愛州五代志九真郡梁置愛州交州司馬陳霸先帥衆討平之帥讀曰率詔以霸先為西江督䕶髙要太守督七郡諸軍事夏四月甲子東魏吏部令史張永和等偽假人官事覺糾檢首者六萬餘人糾檢官所糾檢而發之者也首自首者也史言䘮亂之際吏因為奸濫胃者不勝其多首手又翻甲戌東魏遣太尉髙岳行臺慕容紹宗大都督劉豐生等将步騎十萬攻魏王思政於潁川王思政守潁川事始上卷上年将即亮翻騎竒寄翻思政命卧皷偃旗若無人者岳恃其衆四面陵城思政選驍勇開門出戰驍堅堯切岳兵敗走岳更築土山晝夜攻之思政随方拒守奪其土山置樓堞以助防守堞徒協翻守式又翻五月魏以丞相泰為太師廣陵王欣為太傅李弼為大宗伯趙貴為大司寇于謹為大司空宇文相魏倣成周之制建官太師泰奉太子巡撫西境登隴至原州歴北長城此盖秦所築長城也東趣五原至蒲州自五原還至蒲州也五代志河東郡後魏置秦州後周改曰蒲州因蒲坂為名也趣七喻翻聞魏主不豫而還還從宣翻又如字及至已愈泰還華州華户化翻上遣建康令謝挺散騎常侍徐陵等聘于東魏按梁官制建康令秩千石散騎常侍秩二千石謝挺不當在徐陵之上盖徐陵将命而使謝挺特輔行耳散悉亶翻騎竒寄翻復修前好愎扶又翻好呼到翻陵摛之子也徐摛見一百五十五卷中大通三年摛丑知翻六月東魏大将軍澄巡北邊秋七月庚寅朔日有食之乙夘東魏大将軍澄朝于鄴朝直遥翻以道士多偽濫始罷南郊道壇魏太武帝崇信冦謙之置南郊道壇八月庚寅澄還晉陽遣尚書辛術帥諸将略江淮之北凡獲二十三州侯景既亂梁明年東魏始盡有淮南之地史究其終言之帥讀曰率将即亮翻侯景自至夀陽徴求無己朝廷未嘗拒絶景請娶於王謝上曰王謝門髙非偶可於朱張以下訪之朱張謂朱异張綰之族也景恚恚於避翻曰㑹将吳兒女配奴又啟求錦萬匹為軍人作袍中領軍朱异議以青布給之又以臺所給仗多不能精啟請東冶鍜工欲更營造鍜丁貫翻景以安北将軍夏侯䕫之子譒為長史譒補過翻徐思玉為司馬譒遂去夏稱侯託為族子夏侯祥為梁朝佐命功臣其子亶䕫皆宣力邊陲並著聲績至譒不克負荷矣上既不用景言與東魏和親是後景表疏稍稍悖慢悖蒲内翻又蒲妹翻又聞徐陵等使魏反謀益甚使疏吏翻元貞知景有異志累啟還朝景求輔貞見上卷上年朝直遥翻景謂曰河北事雖不果江南何慮失之何不小忍貞懼逃歸建康具以事聞上以貞為始興内史亦不問景帝既不問景又不為之備盖耄期倦勤直付之無可柰何臨賀王正徳所至貪暴不法屢得罪於上正徳既奔魏而逃歸上復其本封正徳志行無悛常公行刼掠及随豫章王北侵又委軍而走為有司所奏上詔曰汝往年在蜀昵近小人猶謂少年情志未定更於吳都殺戮無辜刼盜財物及還京師専為逋逃乃至江乗要道湖頭斷路奪人妻妾畧人子女我毎加覆掩冀汝自新了無悛革怨讐逾甚匹馬奔亡志懐反噬汝既來歸又令仗節董戎前驅豈謂汝狼心不改志欲覆敗國計以快汝心今宥汝以逺於是免官削爵徙臨海未至徙所追赦之復以朱异之言封臨賀王為丹陽尹坐所部多刼盜去職出為南兖州在任苛刻人不堪命從是黜廢轉増憤恨由是憤恨隂養死士儲米積貨幸國家有變景知之正徳在北與徐思玉相知謂奔魏時也景遣思玉致牋於正徳曰今天子年尊姦臣亂國以景觀之計日禍敗大王屬當儲貳中被廢黜詳見一百四十九卷普通三年被皮義翻四海業業歸心大王景雖不敏實思自效願王允副蒼生鑒斯誠欵正徳大喜曰侯公之意闇與吾同天授我也報之曰朝廷之事如公所言僕之有心為日久矣今僕為其内公為其外何有不濟機事在速今其時矣鄱陽王範宻啟景謀反時上以邊事専委朱异動静皆闗之异以為必無此理上報範曰景孤危寄命譬如嬰兒仰人乳哺仰牛向翻以此事勢安能反乎範重陳之曰不早剪撲禍及生民重直用翻撲普卜翻上曰朝廷自有處分不須汝深憂也此亦報範之言非面語之也處昌吕翻分扶問翻範復請以合肥之衆討之上不許範非景敵也使上許範而進兵討景肉投餧虎耳復扶又翻下不復同朱异謂範使曰鄱陽王遂不許朝廷有一客自是範啟异不復為通使疏吏翻下同為于偽翻景邀羊鴉仁同反鴉仁執其使以聞羊鴉仁自懸瓠還頓軍淮上异曰景數百叛虜何能為敕以使者付建康獄俄解遣之景益無所憚啟上曰若臣事是實應罹國憲如䝉照察請戮鴉仁典考異曰梁書南史皆云並抑不奏畧朱异拒之云云今從太清紀景又言髙澄狡猾寧可全信陛下納其詭語求與連和臣亦竊所笑也臣寧堪粉骨投命讎門讐門謂髙氏也乞江西一境受臣控督如其不許即帥甲騎臨江上向閩越非唯朝廷自恥亦是三公旰食帥讀日率騎竒寄翻旰古按翻上使朱异宣語荅景使曰譬如貧家畜十客五客尚能得意畜吁玉翻朕惟有一客致有忿言亦朕之失也益加賞賜錦綵錢布信使相望史言帝養成侯景之禍以敗國亡身戊戌景反於夀陽以誅中領軍朱异少府卿徐驎太子右衛率陸驗制局監周石珍為名驎離珍翻李延夀曰制局小司専典兵力雲陛天啟亘設蘭錡羽林精卒重屯廣衞至於元戎啟轍武侯遮迾清道晨行按轡督察往來馳驚輦轂驅投分部親承几案領䕶所攝手總成規蕭子顯曰尚書外司領武官有制局監内器仗兵役亦用寒人被恩倖者率所律翻异等皆以姦佞驕貪蔽主㺯權為時人所疾故景託以興兵驎驗吳郡人石珍丹陽人驎驗迭為少府丞以苛刻為務百賈怨之賈音古异尤與之暱暱尼質翻世人謂之三蠧司農卿傅岐梗直士也嘗謂异曰卿任參國鈞榮寵如此比日所聞比毗至翻鄙穢狼籍若使聖主發悟欲免得乎异曰外間謗黷知之久矣心茍無愧何恤人言岐謂人曰朱彦和将死矣朱异字彦和恃謟以求容肆辯以拒諌聞難而不懼難乃旦翻知惡而不改天奪之鑒其能久乎景西攻馬頭景自渦陽之敗南走馬頭戍主劉神茂迎候之以入夀陽當塗之馬頭也今又自夀陽西攻馬頭則此馬頭在夀陽之西當淮津濟渡之要縛馬頭以登舟又非當塗之馬頭也當塗之馬頭郡在夀陽東考異曰梁書云執太守劉神茂按神茂素附於景無煩攻執今從太清紀典畧遣其将宋子仙東攻木柵木柵在荆山西執戍主曹璆等璆音求又渠幽翻上聞之笑曰是何能為吾折箠笞之此即朱异謂景數百叛虜何能為之説也君驕昏而臣貪昧禍至不懼以自取敗亡折之舌翻敇購斬景者封三千户公除州刺史甲辰詔以合州刺史鄱陽王範為南道都督北徐州刺史封山矦正表為北道都督五代志封山縣屬合浦郡司州刺史栁仲禮為西道都督通直散騎常侍裴之髙為東道都督以侍中開府儀同三司邵陵王綸持節董督衆軍以討景正表宏之子仲禮慶逺之孫之髙邃之兄子也宏上之弟正表正徳兄弟皆其子也栁慶逺裴邃皆天監名臣九月東魏濮陽武公婁昭卒濮博木翻侯景聞臺軍討之問策於王偉偉曰邵陵若至彼衆我寡必為所困不如弃淮南夀陽古淮南郡治所决志東向帥輕騎直掩建康帥讀曰率臨賀反其内大王攻其外天下不足定也兵貴拙速宜即進路景乃留外弟中軍大都督王顯貴守夀陽癸未詐稱遊獵出夀陽人不之覺冬十月庚寅景揚聲趨合肥而實襲譙州此譙州非渦陽之譙州魏收志梁置譙州於新昌城領髙塘臨徐南梁新昌郡其地當在唐廬和二州之間宋白曰梁大同三年割北徐州之新昌南譙州之北譙立為南譙州居桑根山西今滁州城是也助防董紹先開城降之三考異曰太清紀云十年陥譙城下又云十三日以王質巡江遏訪典畧上作庚戍下作庚子按此月戊子朔盖三日庚寅也執刺史豐城侯泰泰範之弟也先為中書舎人先悉薦翻傾財以事時要超授譙州刺史至州徧發民丁使擔腰輿扇繖等物腰輿者人舉之而行其髙纔至腰繖蘇旰翻又蘇早翻盖也不限士庻恥為之者重加杖責多輸財者即縱免之由是人皆思亂及侯景至人無戰心故敗庚子詔遣寧逺将軍王質帥衆三千巡江防遏景攻歴陽太守荘鐵丁未鐵以城降降户江翻因説景曰國家承平嵗久人不習戰聞大王舉兵内外震駭宜乗此際速趨建康説式芮翻趨七喻翻可兵不血刃而成大功若使朝廷徐得為備内外小安遣羸兵千人直據采石羸倫為翻大王雖有精甲百萬不得濟矣景乃留儀同三司田英郭駱守歴陽以鐵為導引兵臨江江上鎮戍相次啟聞上問討景之策於都官尚書羊侃侃請以二千人急據采石令邵陵王襲取夀陽使景進不得前退失巢穴烏合之衆自然瓦解朱异曰景必無度江之志遂寝其議侃曰今兹敗矣戊申以臨賀王正徳為平北将軍都督京師諸軍事屯丹陽郡盧循之寇建康也徐赤特敗於張侯橋循兵大上至丹陽郡則丹陽郡治盖近江渚正徳遣大船數十艘詐稱載荻宻以濟景艘蘇遭翻荻音狄景将濟慮王質為梗使諜視之㑹臨川太守陳昕啟稱采石急須重鎮王質水軍輕弱恐不能濟恐其不能濟國事也諜徒協翻昕許斤翻上以昕為雲旗将軍代質戍采石徴質知丹陽尹事昕慶之之子也陳慶之有入洛之功質去采石而昕猶未下渚諜告景云質已退未下渚者未下秦淮渚也諜徒協翻景使折江東樹枝為驗諜如言而返景大喜曰吾事辦矣己酉自横江濟于采石有馬數百匹兵八千人是夕朝廷始命戒嚴景分兵襲姑孰執淮南太守文成侯寧晉成帝初于姑孰僑立淮南郡五代志丹陽郡當塗縣舊置淮南郡南津校尉江子一帥舟師千餘人欲於下流邀景帥讀曰率其副董桃生家在江北與其徒先潰走子一收餘衆歩還建康子一子四之兄也太子見事急戎服入見上入見賢遍翻禀受方略上曰此自汝事何更問為内外軍事悉以付汝云考異曰太清紀太宗見事急乃入面啟髙祖曰請以軍事並以垂付願不勞聖心南史云帝曰此自汝事何更問為今從典略太子乃停中書省指授軍事物情惶駭莫有應募者朝廷猶不知臨賀王正徳之情命正徳屯朱雀門寧國公大臨屯新亭大府卿韋黯屯六門繕修宫城為受敵之備大臨大器之弟也大臨大器皆太子綱之子己酉景至慈湖建康大駭御街人更相劫掠更工衡翻不復通行復扶又翻赦東西冶尚方錢署及建康繫囚以揚州刺史宣城王大器都督城内諸軍事以羊侃為軍師将軍副之南浦侯推守東府劉禪建興八年立南浦縣屬巴東郡西豐公大春守石頭沈約曰吴立豐縣屬臨川郡晉武帝太康元年更名西豐輕車長史謝禧始興太守元貞守白下韋黯與右衞将軍栁津等分守宫城諸門及朝堂朝直遥翻推秀之子安成王秀上弟也大春大臨之弟津仲禮之父也攝諸寺庫公藏錢聚之徳陽堂以充軍實攝收也諸寺謂十二寺也蔵徂浪翻天監六年改閲武堂為徳陽堂在南闕前庚戍侯景至板橋張舜民曰出秦淮西南行循東岸行小夹中十里過板橋店遣徐思玉來求見上實欲觀城中虚實上召問之思玉詐稱叛景請間陳事上将屏左右屏必郢翻舎人髙善寳曰思玉從賊中來情偽難測安可使獨在殿上朱异侍坐曰徐思玉豈刺客邪思玉出景啟言异等㺯權乞帶甲入朝除君側之惡异甚慚悚朝直遥翻景又請遣了事舎人出相領解了事猶言暁事也領總録也解分判也領解言總錄景所欲言之事而分判是非也凡此皆侯景詭言以怠梁朝君臣使無戰心上遣中書舎人賀季主書郭寳亮随思玉勞景于板橋勞力到翻景北面受敇季曰今者之舉何名景曰欲為帝也王偉進曰朱异等亂政除姦臣耳景既出惡言遂留季獨遣寳亮還宫百姓聞景至競入城公私混亂無復次第復扶又翻羊侃區分防擬皆以宗室間之間古莧翻軍人争入武庫自取器甲所司不能禁所司謂武庫令之屬侃命斬數人方止是時梁興四十七年天監十八普通七大通二中大通六大同十一中大同一至是年太清二年通四十七年境内無事公卿在位及閭里士大夫罕見兵甲賊至猝迫公私駭震宿将已盡後進少年並出在外将即亮翻少詩沼翻軍旅指撝一决於侃侃膽力俱壮太子深仗之仗除兩翻憑仗也辛亥景至朱雀桁南桁户剛翻太子以臨賀王正徳守宣陽門東宫學士新野庾信守朱雀門帥宫中文武三千餘人營桁北太子命信開大桁以挫其鋒正徳曰百姓見開桁必大驚駭可且安物情太子從之俄而景至信帥衆開桁始除一舶帥讀曰率下同舶旁陌翻大舟曰舶見景軍皆著鐵面著陟略翻退隠于門信方食甘蔗甘蔗生於南方状如紫竹圍數寸髙丈餘以刀去皮切食其味甘冷解煩析酲楚辭所謂泰尊柘漿析朝酲司馬相如子虚賦所謂諸柘者也蔗之夜翻有飛箭中門柱信手甘蔗應弦而落遂弃軍走南塘遊軍沈子睦臨賀王正徳之黨也復閉桁度景景至秦淮南岸子睦領遊軍在南塘庾信既走北岸無兵子睦因得閉桁以度景兵中竹仲翻復扶又翻太子使王質将精兵三千援信至領軍府遇賊未陳而走正徳帥衆於張侯橋迎景馬上交揖既入宣陽門望闕而拜歔欷流涕随景度淮景軍皆著青袍正徳軍並著絳袍碧裏陳讀曰陣歔音虚欷許既翻又音希著陟畧翻既與景合悉反其袍景乗勝至闕下城中恟懼恟許拱翻羊侃詐稱得射書云邵陵王西昌侯援兵已至近路邵陵王綸兵時已度江向鍾離西昌侯淵藻時鎮京口衆乃小安西豐公大春弃石頭奔京口劉禧元貞弃白下走津主彭文粲等以石頭城降景降户江翻景遣其儀同三司于子悦守之壬子景列兵繞䑓城旗旛皆黑射啟於城中曰射而亦翻朱异等蔑弄朝權輕作威福朝直遥翻臣為所陥欲加屠戮陛下若誅朱异等臣則斂轡北歸上問太子有是乎對曰然上将誅之太子曰賊以异等為名耳今日殺之無救於急適足貽笑将來俟賊平誅之未晚上乃止景繞城既帀帀作答翻周也百道俱攻鳴鼓吹脣喧聲震地縱火燒大司馬東西華諸門羊侃使鑿門上為竅竅苦弔翻空也穴也下水沃火太子自捧銀鞍往賞戰士直閣将軍朱思帥戰士數人踰城出外灑水久之方滅賊又以長柯斧斫東掖門門将開羊侃鑿扇為孔扇門扇也以槊刺殺二人斫者乃退刺七亦翻景據公車府蕭子顯齊志公車令屬領軍以受天下章奏梁制公車令屬衞尉其署舎在臺城門外故景得據之府者署舎之通稱正徳據左衞府景黨宋子仙據東宫范桃棒據同泰寺棒部項翻景取東宫妓數百分給軍士妓渠綺翻女樂也東宫近城近臺城也景衆登其墻射城内射而亦翻下臨射亦射弓射同至夜景於東宫置酒奏樂太子遣人焚之臺殿及所聚圖書皆盡景又燒乗黄廏士林館太府寺大同中於臺城西立士林館使朱异顧琛孔子祛等逓互講述乗繩證翻癸丑景作木驢數百攻城城上投石碎之景更作尖項木驢石不能破更工衡翻杜佑曰以木為眷長一丈徑一尺五寸下安六脚下濶而上尖髙七尺内可容六人以濕牛皮䝉之人蔽其下舁直抵城下木石鐵火所不能敗用以攻城謂之木驢羊侃使作雉尾炬灌以膏蠟叢擲焚之俄盡杜佑曰鷰尾炬縳葦草為之分為両岐如鷰尾状以油臘灌之加火從城墜下使人騎木驢而燒之侃之作雉尾炬也施鐵鏃以油灌之擲驢上焚之景又作登城樓髙十餘丈欲臨射城中髙居傲翻射而亦翻侃曰車髙塹虚彼來必倒可卧而觀之及車動果倒塹七艶翻景攻既不克士卒死傷多乃築長圍以絶内外又啟求誅朱异等城中亦射賞格出外曰射而亦翻下同有能送景首者授以景位并錢一億萬布絹各萬匹朱异張綰議出兵擊之上問羊侃侃曰不可今出人若少少詩沼翻不足破賊徒挫鋭氣若多則一旦失利門隘橋小必大致失亡异等不從使千餘人出戰鋒未及交退走争橋赴水死者大半侃子鷟為景所獲鷟士角翻執至城下以示侃侃曰我傾宗報主猶恨不足豈計一子幸早殺之數日復持來復扶又翻侃謂鷟曰久以汝為死矣猶在邪引弓射之景以其忠義亦不之殺荘鐵慮景不克託稱迎母與左右數十趣歴陽趣七喻翻先遣書紿田英郭駱曰紿待多翻侯王己為臺軍所殺國家使我歸鎮駱等大懼弃城奔夀陽鐵入城不敢守奉其母奔尋陽十一月戊午朔刑白馬祀蚩尤於太極殿前應劭曰蚩尤亦古天子好五兵故祭之求福祥薛瓉曰蚩尤庶人之貧者非天子也管仲曰割廬山發而出水金從之蚩尤受之以作劍㦸臨賀王正徳即帝位於儀賢堂天監六年改聴訟堂為儀賢堂在南闕前下詔稱普通以來姦邪亂政上久不豫社稷将危河南王景釋位來朝左傳王子朝曰諸侯釋位以間王政朝直遥翻猥用朕躬紹兹寳位可大赦改元正平立其世子見理為皇太子以景為丞相妻以女妻七喻翻并出家之寳貨悉助軍費於是景營於闕前分其兵二千人攻東府南浦侯推拒之三日不克景自往攻之矢石雨下宣城王防閣許伯衆潛引景衆登城宣城王大器太子之長子也許伯衆為其防閣在東府故得為景内應姚思亷梁書作許鬰華時為東府東北樓主辛酉克之殺南浦侯推及城中戰士三千人載其尸聚於杜姥宅遥語城中人曰語牛倨翻若不早降正當如此降户江翻景聲言上已晏駕雖城中亦以為然壬戌太子請上巡城上幸大司馬門城上聞蹕聲皆皷譟流涕衆心粗安粗坐五翻江子一之敗還也謂自采石下流敗還之時上責之子一拜謝曰臣以身許國常恐不得其死今所部皆弃臣去臣以一夫安能擊賊若賊遂能至此臣誓當碎首以贖前罪不死闕前當死闕後乙亥子一啟太子與弟尚書左丞子四東宫主帥子五帥所領百餘人開承明門出戰主帥所類翻五帥讀曰率子一直抵賊營賊伏兵不動未測其情故不動子一呼曰賊輩何不速出久之賊騎出夾攻之子一徑前引槊刺賊從者莫敢繼賊解其肩而死子四子五相謂曰與兄俱出何面獨旋皆免胄赴賊子四中矟洞胷而死呼火故翻刺七亦翻從才用翻中竹仲翻矟與槊同色角翻子五傷脰還至塹一慟而絶江子一兄弟駢肩以死於闕下而不足以衞社稷悲夫古人所以重折衝千里之外者也塹七艶翻景初至建康謂朝夕可拔號令嚴整士卒不敢侵暴及屢攻不克人心離沮景恐援兵四集一旦潰去又食石頭常平諸倉既盡軍中乏食乃縱士卒掠奪民米及金帛子女是後米一升至七八萬錢人相食餓死者什五六乙丑景於城東西起土山驅迫士民不限貴賤亂加敺捶疲羸者因殺以填山號哭動地敺烏口翻捶止蘂翻羸倫為翻號户刀翻民不敢竄匿並出從之旬日間衆至數萬城中亦築土山以應之太子宣城王已下皆親負土執畚鍤畚布衮翻所以盛土鍤側洽翻所以鍪土於山上起芙蓉層樓髙四丈飾以錦罽芙蓉層樓下施㭿拱層層疊出若芙蓉花然罽毳布也織毛為之髙居傲翻罽音居倒翻募敢死士二千人厚衣袍鎧謂之僧騰客衣於既翻下衣錦同分配二山二山謂東土山西土山也晝夜交戰不息㑹大雨城内土山崩賊乗之垂入苦戰不能禁羊侃令多擲火為火城以斷其路斷音短徐於内築城賊不能進景募人奴降者悉免為良降户江翻得朱异奴以為儀同三司异家貲産悉與之奴乗良馬衣錦袍於城下仰詬异曰詬苦候翻汝五十年仕宦方得中領軍我始事侯王已為儀同矣於是三日之中羣奴出就景者以千數景皆厚撫以配軍人人感恩為之致死凡為奴者皆羣不逞也一旦免之為良固己踴躍况又資之以金帛安得不為賊致死乎士大夫承平之時虐用奴婢豈特誤其身誤其家亦以誤國事可不戒哉為于偽翻荆州刺史湘東王繹聞景圍臺城丙寅戒嚴移檄所督湘州刺史河東王譽雍州刺史岳陽王詧雍于用翻江州刺史當陽公大心郢州刺史南平王恪等發兵入援大心大器之弟恪偉之子也南平王偉上弟也朱异遺景書為陳禍福遺于季翻為于偽翻景報書并告城中士民以為梁自近嵗以來權倖用事割剥齊民以供嗜欲如曰不然公等試觀今日國家池苑王公第宅僧尼寺塔及在位庶僚姬姜百室僕從數千不耕不織從才用翻錦衣玉食不奪百姓從何得之景書及此异等其何辭以對僕所以趨赴闕庭指誅權佞非傾社稷今城中指望四方入援吾觀王侯諸將志在全身誰能竭力致死與吾争勝負哉将即亮翻長江天險二曹所歎事見魏文帝紀吾一葦杭之詩國風曰誰謂河廣一葦杭之注杭渡也箋云誰謂河水廣與一葦加之則可以渡之喻狭也日明氣浄自非天人允協何能如是幸各三思自求元吉景又奉啟於東魏主稱臣進取夀春暫欲停憩而蕭衍識此運終自辭寳位臣軍未入其國已投同泰捨身去月二十九日去月謂前此月也届此建康江海未蘓干戈暫止永言故鄉人馬同戀尋當整轡以奉聖顔臣之母弟久謂屠滅近奉明敇始承猶在承猶奉也言奉近敇始知母弟猶在也斯乃陛下寛仁大将軍恩念臣之弱劣知何仰報今輒齎啟迎臣母弟妻兒伏願聖慈特賜裁放景欲卑辭以迎其家髙澄兄弟詎能堕其數中邪己巳湘東王繹遣司馬吳曅天門太守樊文皎等将兵發江陵陳昕為景所擒景與之極飲使昕收集部曲欲用之昕不可景使其儀同三司范桃棒囚之昕因説桃棒説式芮翻使帥所部襲殺王偉宋子仙詣城降桃棒從之潛遣昕夜縋入城帥讀曰率降户江翻下同縋馳偽翻上大喜敇鐫銀劵賜桃棒曰鐫子全翻刻也雕也事定之日封汝河南王即有景衆并給金帛女樂太子恐其詐猶豫不决上怒曰受降常理何忽致疑太子召公卿㑹議朱异傅岐曰桃棒降必非謬桃棒既降賊景必驚乗此擊之可大破也太子曰吾堅城自守以俟外援援兵既至賊豈足平此萬全策也今開門納桃棒桃棒之情何易可知易以豉翻萬一為變悔無所及社稷事重須更詳之异曰殿下若以社稷之急宜納桃棒如其猶豫非异所知太子終不能决桃棒又使昕啟曰今止将所領五百人若至城門皆自脱甲乞朝廷開門賜容事濟之後保擒侯景求考異曰太清紀南史皆云桃棒以甲士二千人來降以景首應購今從典略太子見其懇切愈疑之朱异撫膺曰失此社稷事去矣太子綱固多疑少斷朱异撫膺於此時何其晚也俄而桃棒為部下所告景拉殺之拉盧合翻拉其幹而殺之陳昕不知如期而出景邀得之逼使射書城中曰射而亦翻桃棒且輕将數十人先入将即亮翻景欲𠂻甲随之昕不肯期以必死乃殺之景使蕭見理與儀同三司盧暉略戌東府見理凶險夜與羣盗剽刼於大桁中流矢而死㔄匹妙翻中竹仲翻邵陵王綸行至鍾離聞侯景已度采石綸晝夜兼道旋軍入援濟江中流風起人馬溺者什一二盧循之亂劉裕冐風濟江而風止侯景之亂綸濟江而風起豈天之欲亡梁邪是以善觀人之國者必觀於天人祐助之際也遂帥寧逺将軍西豐公大春沈約志西豐縣屬臨川郡吳立新塗公大成帥讀曰率新塗或作新淦沈約志新淦縣漢屬豫章郡永安侯確安南侯駿是皆以古縣名為侯國吳分烏程餘杭立永安縣晉已改為武康晉武帝分江安立安南縣五代志無之前譙州刺史趙伯超武州刺史蕭㺯璋等武陵郡梁置武州歩騎三萬自京口西上上時掌翻大成大春之弟確綸之子駿懿之孫也景遣軍至江乗拒綸軍趙伯超曰若從黄城大路必與賊遇不如徑指鍾山鍾山即蒋山吳孫權立蒋子文廟於是山又以其祖諱鍾改名蒋山突㨿廣莫門出賊不意賊圍必解矣綸從之夜行失道迂二十餘里迂音于又音紆曲也逺也庚辰旦營于蒋山景見之大駭悉送所掠婦女珍貨於石頭具舟欲走分兵三道攻綸綸與戰破之時山巔寒雪乃引軍下愛敬寺帝事文皇帝獻皇后孝於鍾山造大愛敬寺以資福景陳兵於覆舟山北乙酉綸進軍𤣥武湖側清考異曰太紀云二十九日典略云壬午今從梁帝紀與景對陳不戰陳讀曰陣至暮景更約明日㑹戰綸許之安南侯駿見景軍退以為走即與壮士逐之景旋軍擊之駿敗走趨綸軍趙伯超望見亦引兵走景乗勝追撃之諸軍皆潰綸收餘兵近千人近其靳翻入天保寺景追之縱火燒寺綸奔朱方冊徒春秋朱方之地時為蘭陵武進縣士卒踐氷雪往往堕足景悉收綸輜重重直用翻生擒西豐公大春安前司馬荘丘慧主帥霍俊等而還帝置二百四十號将軍有安前将軍置長史司馬帥所類翻還從宣翻又如字考異曰典略作廣陵令崔俊南史作直閣将軍胡子約廣陵令霍雋今從太清紀丙戍景陳所獲綸軍首虜鎧仗及大春等於城下使言曰邵陵王已為亂兵所殺霍俊獨曰王小失利己全軍還京口城中但堅守援軍尋至賊以刀敺其背敺烏口翻俊辭色彌厲景義而釋之臨賀王正徳殺之是日晚鄱陽王範遣其世子嗣與西豫州刺史裴之髙建安太守趙鳳舉晉安帝分廬江郡立晉熈郡及懐寜縣梁置西豫州隋為同安郡唐為舒州五代志沔陽郡竟陵縣舊有京山縣齊置建安郡但其地在漢陽與舒州勢不相接夀陽義陽之間有建安戍蕭子顯齊志及五代志皆不言于此置郡五代志又云黄州麻城縣梁置建寧軍或者史以建寧為建安與更考各将兵入援軍於蔡洲将即亮翻洲考異曰梁帝紀作張公今從太清紀以待上流諸軍範以之髙督江右援軍事景悉驅南岸居民於水北此謂秦淮水也焚其廬舎大街以西掃地俱盡北徐州刺史封山侯正表鎮鍾離隋志有封山縣屬合浦郡盖梁置也上召之入援正表託以船糧未集不進景以正表為南兖州刺史封南郡王正表乃於歐陽立柵以斷援軍斷音短水經註邗溝水上承歐陽引江入埭六十里至廣陵城以地望攷之此歐陽在今真州界按江淮之間地名歐陽見於史者非一處裴邃移長孫稚欲營歐陽在夀春境上吳喜使蕭道成留軍歐陽在淮隂界帥衆一萬聲言入援實欲襲廣陵宻書誘廣陵令劉詢使燒城為應誘音酉詢以告南兖州刺史南康王㑹理十二月㑹理使詢帥步騎千人夜襲正表大破之帥讀曰率騎竒寄翻下同正表走還鍾離詢收其兵糧歸就㑹理與之入援癸巳侍中都官尚書羊侃卒城中益懼侯景大造攻具陳於闕前大車髙數丈一車二十輪丁酉復進攻城髙居報翻復扶又翻以蝦蟇車運土填塹湘東王繹遣世子方等将歩騎一萬入援建康将即亮翻下同庚子發公安繹又遣竟陵太守王僧辯将舟師萬人出自漢川載糧東下漢水經竟陵郡入江考異曰太清紀云僧辯将精卒二萬今從梁書方等有俊才善騎射毎戰親犯矢石以死節自任為人臣子固當以身許國然存其身者所以存國也两陳相向勝負未分危機交急親犯矢石以帥厲将士可一用之耳豈可以為常哉方等以死節自任以親犯矢石為常此其所以敗死于湘川也若方等者謂之必死之将可也若論臣子大節則全其身以全國家斯得謂之忠孝矣壬寅侯景以火車焚臺城東南樓材官吳景有巧思思相吏翻於城内構地為樓火纔滅新樓即立賊以為神景因火起潜遣人於其下穿城城将崩乃覺之詳觀上下文景因火起作賊因火起則于當時事勢文理為明順盖侯景與吴景殽亂也讀者難以明辨吳景于城内更築迂城迂憂俱翻迃曲也状如却月以擬之兼擲火焚其攻具賊乃退走太子遣洗馬元孟恭将千人自大司馬門出盪孟恭與左右奔降於景己酉景土山稍逼城樓栁津命作地道以取其土外山崩壓賊且盡又於城内作飛橋懸罩二土山景衆見飛橋逈出崩騰而走城内擲雉尾炬焚其東山樓柵蕩盡賊積死於城下死於城下者豈真賊哉侯景驅民以攻城以其黨迫蹙于後攻城之人退則死於賊手進則死于矢石嗚呼積死於城下者得非梁之赤子乎乃棄土山不復脩自焚其攻具復扶又翻材官将軍宋嶷降於景嶷魚力翻降户江翻教之引𤣥武湖水以灌臺城闕前皆為洪流上徴衡州刺史韋粲為散騎常侍吴孫亮太平二年分長沙東部都尉立湘東郡今之衡州按五代志梁置衡州於南海郡含洭縣湘東之衡州隋平陳所置以都督長沙歐陽頠監州事粲放之子也韋放見一百五十一卷大通元年監古銜翻還至廬陵聞侯景亂粲簡閲部下得精兵五千倍道赴援至豫章聞景己出横江粲就内史劉孝儀謀之孝儀曰必如此當有敇豈可輕信人言妄相驚動或恐不然時孝儀置酒粲怒以杯抵地曰賊已度江便逼宫闕水陸俱斷何暇有報假令無敇豈得自安韋粲今日何情飲酒即馳馬出部分将發分扶問翻㑹江州刺史當陽公大心遣使邀粲使疏吏翻粲乃馳往見大心曰上游藩鎮江州去京最近按沈約志江州去京水行一千四百里殿下情計誠宜在前但中流任重當須應接不可闕鎮今宜且張聲勢移鎮湓城張知兩翻遣偏将賜随将即亮翻下在将同於事便足大心然之遣中兵栁昕帥兵二千人随粲粲至南洲外弟司州刺史栁仲禮亦帥步騎萬餘人至横江帥讀曰率粲即送糧仗贍給之并散私金帛以賞其戰士西豫州刺史裴之髙自張公洲遣船度仲禮攷之粲𫝊張公洲盖即蔡洲丙辰夜粲仲禮及宣猛将軍李孝欽李考異曰梁帝紀作遷仕今從太清紀前司州刺史羊鴉仁南陵太守陳文徹五代志宣州南陵縣梁置南陵郡合軍屯新林王遊苑粲議推仲禮為大都督報下流衆軍下流衆軍張公洲之兵也裴之髙自以年位恥居其下議累日不决粲抗言於衆曰今者同赴國難難乃旦翻義在除賊所以推栁司州者正以久捍邉疆先為侯景所憚且士馬精鋭無出其前若論位次栁在粲下語其年齒亦少於粲直以社稷之計不得復論今日形勢貴在将和若人心不同大事去矣裴公朝之舊徳豈應復挟私情以沮大計粲請為諸軍解之語牛倨翻少詩沼翻復扶又翻沮在侣翻為于偽翻乃單舸至之髙營切讓之曰舸古我翻今二宫危逼猾冦滔天臣子當戮力同心豈可自相矛楯韓非子有鬻矛楯者曰吾矛之利物無不陥也又曰吾楯之堅物莫能陷也或問之曰以子之矛陷子之楯可乎鬻者不能對後世矛楯之説祖此豫州必欲立異鋒鏑便有所歸言将攻之髙也之髙垂泣致謝遂推仲禮為大都督宣城内史楊白華遣其子雄将郡兵繼至華讀曰花将即亮翻下同援軍大集衆十餘萬縁淮樹柵景亦於北岸樹柵以應之裴之髙與弟之横以舟師一萬屯張公洲景囚之髙弟姪子孫臨水陳兵連鏁列於陳前以鼎鑊刀鋸随其後謂曰裴公不降今即烹之於陳讀曰陣降户江翻之髙召善射者使射其子再發皆不中使射而亦翻中竹仲翻景帥步騎萬人於後渚挑戰據韋粲𫝊後渚在中興寺前挑徒了翻仲禮欲出擊之韋粲曰日晚我勞未可戰也仲禮乃堅壁不出景亦引退湘東王繹将鋭卒三萬發江陵留其子綏寧侯方諸居守守手又翻沈約志廣州南海郡有綏寧縣宋文帝立諮議參軍劉之迡等三上牋請留荅教不許湘東王繹非有自将入援之志也陽為不許耳迡與遲同又音奴寄翻鄱陽王範遣其将梅伯龍攻王顯貴於夀陽克其羅城攻中城不克而退範益其衆使復攻之復扶又翻東魏大将軍澄患民錢濫惡議不禁民私鑄但懸稱市門稱尺證翻錢不重五銖毋得入市朝議以為年榖不登請俟他年乃止朝直遥翻魏太師泰殺安定國臣王茂而非其罪㤗封安定公故有國臣尚書左丞栁慶諫泰怒曰卿黨罪人亦當坐執慶于前慶辭色不撓撓奴教翻曰慶聞君蔽於事為不明臣知而不争為不忠慶既竭忠不敢愛死但懼公為不明耳泰寤亟使赦茂不及乃賜茂家錢帛曰以旌吾過丙辰晦栁仲禮夜入韋粲營部分衆軍分扶問翻旦日㑹戰諸将各有據守令粲頓青塘粲以青塘當石頭中路粲傳曰青塘迫近淮渚據陳霸先之言青塘即青溪塘也賊必争之頗憚之仲禮曰青塘要地非兄不可若疑兵少當更遣軍相助乃使直閣将軍劉叔𦙍助之為下韋粲敗死張本少詩沼翻資治通鑑卷一百六十一
