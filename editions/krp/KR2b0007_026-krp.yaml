  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷二十六宋司馬光撰胡三省音註漢紀十八起上章涒灘盡𤣥黓閹茂凡三年中宗孝宣皇帝中神爵元年以神爵降集紀元春正月上始行幸甘泉郊泰畤三月行幸河東祠后土上頗修武帝故事謹齋祀之禮以方士言增置神祠時以方士言為隨矦劍寶玉寶璧周康寶鼎立四祠於未央宫中又祠大室山于即墨三户山于下宻祠天封苑火井于鴻門又立歲星辰星太白熒惑南斗祠于長安城旁又祠參山八神于曲城蓬山石社石鼓于臨朐之罘山於腄成山於不夜莱山于黄成山祠日莱山祠月又祠四時于琅邪蚩尤于夀良京師近縣鄠則有勞谷五牀山日月五帝仙人玉女祠雲陽有徑路神祠又立五龍山仙人祠及黄帝天神帝原水凡四祠於膚施聞益州有金馬碧雞之神可醮祭而致後漢志越嶲郡青蛉縣禺同山俗謂有金馬碧雞如淳曰金形似馬碧形似鷄水經注曰禺同山神有金馬碧雞光景儵忽醮即召翻於是遣諫大夫蜀郡王褒使持節而求之使疏吏翻初上聞褒有俊才召見見賢遍翻使為聖主得賢臣頌其辭曰夫賢者國家之器用也所任賢則趨舍省而讀曰趣普博也趨七喻翻舍讀曰捨施式智翻器用利則用力少而就效衆故工人之用鈍器也勞筋苦骨終日矻矻應劭曰矻矻勞極貌如淳曰徤作貌師古曰如說是也矻口骨翻及至巧冶鑄干將干將吳寶劒名闔廬所鑄使離婁督繩公輸削墨張晏曰離婁黄帝時明目者也應劭曰公輸魯般性巧者也師古曰督察視也雖崇臺五層延袤百丈而不溷者工用相得也師古曰溷亂也音胡頓翻庸人之御駑馬亦傷吻敝䇿而不進於行師古曰吻口角也䇿所以撃馬及至駕齧厀驂乗旦孟康曰良馬低頭口至䣛故曰齧䣛張晏曰駕則旦至故曰乗曰乗食證翻王良執靶張晏曰王良郵無恤字伯樂晉灼曰靶音霸謂轡也師古曰參驗左氏傳及國語孟子郵無恤郵良劉無止王良總一人也楚辭云驥躊躇於敝輦遇孫陽而得代王逸云孫陽伯樂姓名也列子云伯樂秦穆公時人考其年代不相當張說云良字伯樂斯失之矣韓哀附輿應劭曰世本韓哀作御師古曰宋衷云韓哀韓哀侯也時已有御此復言作者加其精巧也然則善御者耳非始作也周流八極萬里一息何其遼哉人馬相得也故服絺綌之凉者不苦盛暑之鬱燠襲貂狐之煗者不憂至寒之悽愴師古曰鬱熱氣也燠温也悽愴寒冷也燠於六翻煗乃短翻何則有其具者易其僃賢人君子亦聖王之所以易海内也易以豉翻昔周公躬吐捉之勞故有圉空之隆師古曰一飯三吐食一沐三捉髪以賔賢士故能成太平之化而刑措不用故囹圄空虗也圉音圄同齊桓設庭燎之禮故有匡合之功應劭曰有以九九求見桓公桓公不内其人曰九九小術而君不内之况大于九九者乎于是桓公設庭燎之禮而見之居無幾隰朋自逺而至齊遂以霸師古曰九九計數之書若今筭經也匡謂一匡天下合謂九合諸侯由此觀之君人者勤於求賢而逸於得人人臣亦然昔賢者之未遭遇也圖事揆䇿則君不用其謀陳見悃誠王逸曰悃愊志純一也亦猶實也則上不然其信進仕不得施効斥逐又非其愆是故伊尹勤於鼎爼太公困於鼔刀師古曰勒于鼎爼謂負鼎爼以干湯也鼓刀者謂太公屠牛于朝歌也百里自鬻寗子飯牛師古曰鬻賣也吕氏春秋曰百里奚之未遇時也虞亡而虜縳鬻以五羊之皮公孫枝得而悅之獻諸穆公應劭曰齊桓公夜出迎客寗戚疾擊其牛角髙歌曰南山矸白石爛生不逢堯與舜禪短布單衣適至骭從昏飯牛薄夜半長夜曼曼何時旦桓公乃召與語悅之以為大夫飯扶晚翻離此患也師古曰離遭也及其遇明君遭聖主也運籌合上意諌諍即見聽進退得闗其忠任職得行其術剖符錫壤而光祖考故世必有聖知之君知讀曰智而後有賢明之臣故虎嘯而風冽師古曰冽冽風貌也音列龍興而致雲蟋蟀竢秋唫蜉蝤出以隂孟康曰蜉蝤渠畧也師古曰蟋蟀今之促織也蜉蝤甲蟲也好叢聚而生也朝生而夕死舍人曰南陽以東曰蜉蝤梁宋之間曰渠畧郭璞曰似蛣蜣身狹而長有角黄黒色聚生糞土中朝生暮死猪好噉之陸機疏云蜉蝣有角大如指長三四寸甲下有翅能飛夏月隂雨時地中出竢即俟字蝤音由易曰飛龍在天利見大人師古曰乾卦九五爻辭也言王者居正陽之位賢才見之則利用也詩曰思皇多士生此王國師古曰大雅文王之詩也思語辭也皇美也言美哉衆多賢士生此周王之國也故世平主聖俊艾將自至師古曰艾讀曰乂明明在朝穆穆布列聚精㑹神相得益章師古曰章明也雖伯牙操遞鍾晉灼曰遞音遞送之遞二十四鍾各有節奏擊之不常故曰遞臣瓉曰楚辭云奏伯牙之號鍾號鍾琴名也馬融笛賦曰號鍾髙調伯牙以善鼓琴不聞其能擊鍾也師古曰琴名是也字既作遞則與楚辭不同不得即讀為號當依晉音耳逢門子彎烏號師古曰逢門善射者即逢䝉也應劭曰楚有柘桑烏栖其上枝下著地不得飛欲墮號呼故曰烏號張揖曰黄帝乗龍上天小臣不得上挽持龍􅏋􅏋㧞墮黄帝弓臣下抱弓而號故名弓烏號師古曰應張二說皆有據逢皮江翻猶未足以喻其意也故聖主必待賢臣而𢎞功業俊士亦俟明主以顯其徳上下俱欲驩然交欣千載壹合論說無疑翼乎如鴻毛遇順風沛乎如巨魚縱大壑其得意若此則胡禁不止曷令不行師古曰胡曷皆何也化溢四表横被無窮被皮義翻是以聖主不徧窺望而視已明不殫傾耳而聽已聰師古曰殫盡也太平之責塞師古曰塞滿也塞悉則翻優游之望得休徴自至夀考無疆何必偃仰屈伸若彭祖呴嘘呼吸如僑松如淳曰五帝紀彭祖堯舜時人列仙傳彭祖殷大夫也歴夏至商末號年七百師古曰呴嘘者開口出氣也僑王僑松赤松子皆仙人也呴吁于翻嘘音虚眇然絶俗離世哉師古曰眇然髙逺之意離力智翻是時上頗好神僊故褒對及之好呼到翻下同京兆尹張敞亦上疏諫曰願明主時忘車馬之好斥逺方士之虚語游心帝王之術太平庻幾可興也逺於願翻幾居希翻上由是悉罷尚方待詔此尚方非作器物之尚方尚主也主方藥也司馬相如大人賦詔岐伯使尚方是也初趙廣漢死後為京兆尹者皆不稱職稱尺證翻唯敞能繼其迹其方畧耳目不及廣漢然頗以經術儒雅文之上頗修飾宫室車服盛于昭帝時外戚許史王氏貴寵諌大夫王吉上疏曰陛下躬聖質總萬方惟思世務將興太平詔書每下民欣然若更生臣伏而思之可謂至恩未可謂本務也師古曰言天子如此雖於百姓為至恩然未盡政務之本也欲治之主不世出師古曰言有時遇之不常值治直吏翻公卿幸得遭遇其時言聽諌從然未有建萬世之長䇿舉明主於三代之隆也其務在於期㑹簿書斷獄聽訟而已斷丁亂翻此非太平之基也臣聞民者弱而不可勝愚而不可欺也聖主獨行於深宫得則天下稱誦之失則天下咸言之故宜謹左右審擇所使左右所以正身所使所以宣徳此其本也孔子曰安上治民莫善于禮非空言也師古曰孝經載孔子之言治直之翻王者未制禮之時引先王禮宜于今者而用之臣願陛下承天心發大業與公卿大臣延及儒生述舊禮明王制敺一世之民躋之仁夀之域師古曰以仁撫下則羣生安逸而夀考余謂此以仁夀二字並言仁者不鄙詐夀者不夭折也敺與驅同則俗何以不若成康夀何以不若髙宗師古曰髙宗殷王武丁也享國百年竊見當世趨務不合於道者謹條奏師古曰趨讀曰趣趣嚮也唯陛下財擇焉吉意以為世俗聘妻送女無節則貧人不及故不舉子又漢家列矦尚公主諸矦則國人承翁主晉灼曰娶天子女則曰尚公主國人娶諸矦女則曰承翁主尚承皆卑下之名也使男事女夫屈於婦逆隂陽之位故多女亂古者衣服車馬貴賤有章今上下僣奢人人自制師古曰言無節度是以貪財誅利不畏死亡誅責也求也周之所以能致治刑措而不用者以其禁邪於𡨕㝠絶惡於未萌也師古曰㝠㝠言未有端緒也治直吏翻又言舜湯不用三公九卿之世而舉臯陶伊尹李竒曰不繼世而爵也言臯陶伊尹非三公九卿之世陶音遥不仁者逺師古曰任用賢人放黜讒佞今使俗吏得任子弟張晏曰子弟以父兄任為郎率多驕驁不通古今無益于民宜明選求賢除任子之令外家及故人可厚以財不宜居位去角抵減樂府省尚方明示天下以儉古者工不造琱瑑師古曰瑑者刻鏤為文瑑音篆商不通侈靡非工商之獨賢政教使之然也上以其言為迂濶師古曰迂逺也音于不甚寵異也吉遂謝病歸義渠安國至羌中召先零諸豪三十餘人以尤桀黠者皆斬之師古曰桀堅也言不順從也黠惡也為惡堅也零音憐黠户入翻縱兵擊其種人種章勇翻下同斬首千餘級於是諸降羌及歸義羌矦楊玉等怨怒無所信郷師古曰恐中國汎怒不信其心而納嚮之仲馮曰恐怒且恐且怒也羌未有變而漢吏無故誅殺其人故楊玉等謂漢無所信嚮不信漢不嚮漢也作怨怒者通鑑畧改班書之文成一家言降户江翻遂刼畧小種背畔犯塞攻城邑殺長吏背蒲妹翻安國以騎都尉將騎二千屯備羌至浩亹浩亹縣屬金城郡有浩亹水出西塞外東至允吾入湟水孟康曰浩亹音合門師古曰浩音誥浩水名也亹者水流峽山岸深若門也詩大雅曰鳬鷖在門亦其義也今俗呼此水為閣門河盖疾言之浩為閣耳杜佑曰浩亹縣即今金城郡廣武縣地又曰廣武縣西南有漢浩亹縣故城為虜所擊失亡車重兵器甚衆師古曰重音直用翻安國引還至令居以聞令音零時趙充國年七十餘上老之使丙吉問誰可將者將即亮翻下同充國對曰無踰於老臣者矣上遣問焉曰將軍度羌虜何如師古曰度計也音犬各翻下同當用幾人充國曰百聞不如一見兵難遥度臣願馳至金城昭帝元始六年置金城郡唐蘭鄯廓州地圖上方略師古曰圖其地形并為攻討方畧俱奏上也上時掌翻下同羌戎小夷逆天背畔滅亡不久背蒲妹翻願陛下以屬老臣師古曰屬委也屬音之欲翻勿以為憂上笑曰諾乃大發兵詣金城夏四月遣充國將之以擊西羌將即亮翻六月有星孛于東方孛蒲内翻趙充國至金城須兵滿萬騎欲度河恐為虜所遮即夜遣三校衘枚先度師古曰衘枚者欲其無聲使虜不覺校戸教翻下同度輙營陳立營陳則虜不得而犯諸軍可以相繼而度河陳讀曰陣㑹明畢遂以次盡度虜數十百騎來出入軍傍充國曰吾士馬新倦不可馳逐此皆驍騎難制又恐其為誘兵也驍堅堯翻誘音酉擊虜以殄滅為期小利不足貪令軍勿擊遣騎候四望陿中無虜文穎曰金城有三陿在南六百里師古曰山峭而夾水曰陿四望者陿名也陿音狹夜引兵上至落都服䖍曰落都山名也據水經注破羌縣之西有落都城後漢志浩亹縣有雒都谷劉昫曰唐鄯州治故樂都城召諸校司馬謂曰吾知羌虜不能為兵矣使虜發數千人守杜四望陿中師古曰杜塞也兵豈得入哉充國常以逺斥候為務行必為戰備止必堅營壁尤能持重愛士卒先計而後戰遂西至西部都尉府孟康曰在金城日饗軍士師古曰饗飲之士皆欲為用虜數挑戰數所角翻挑徒了翻充國堅守捕得生口言羌豪相數責曰語汝無反數所具翻語牛倨翻今天子遣趙將軍來年八九十矣善為兵今請欲一鬭而死可得邪言充國持重不戰羌欲一鬭而死不可得也初䍐开豪靡當兒使弟雕庫來告都尉曰先零欲反後數日果反雕庫種人頗在先零中都尉即留雕庫為質金城西部都尉也種章勇翻質音致充國以為無罪乃遣歸告種豪大兵誅有罪者明白自别毋取并滅師古曰言勿相和同并取滅亡别彼列翻天子告諸羌人犯灋者能相捕斬除罪仍以功大小賜錢有差時募能斬大豪有罪者一人賜錢四十萬中豪十五萬下豪二萬女子及老弱千錢又以其所捕妻子財物盡與之充國計欲以威信招降䍐开及刼略者解散虜謀徼其疲劇乃擊之師古曰徼要也音工堯翻時上已發内郡兵屯邊者合六萬人矣酒泉太守辛武賢姓譜夏啟封支子於莘莘辛相近遂為辛氏漢初申蒲為趙魏名將及徙家隴西遂為隴西人余按此叙辛武賢之世然既以莘為辛而又以申牽合之以其聲相近也然周自有太史辛甲奏言郡兵皆屯備南山北邊空虛勢不可久若至秋冬乃進兵此虜在境外之冊今虜朝夕為冦土地寒苦漢馬不耐冬不如以七月上旬齎三十日糧分兵出張掖酒泉合擊䍐开在鮮水上者劉昫曰漢金城郡之金城縣䍐羌所䖏也後漢置西海郡晉乞伏乾歸都於此唐為蘭州五泉縣余據漢書羌豪獻鮮水海地于王莽置西海郡即此山海經云北鮮之山鮮水出焉北流注於徐吾非此鮮水也雖不能盡誅但奪其畜産虜其妻子復引兵還冬復擊之復扶人翻大兵仍出虜必震壊師古曰仍頻也天子下其書充國下遐稼翻下同令議之充國以為一馬自負三十日食為米二斛四斗麥八斛又有衣裝兵器難以追逐虜必商軍進退師古曰商計度也稍引去逐水草入山林隨而深入虜即據前險守後阨以絶糧道必有傷危之憂為夷狄笑千載不可復復報也載子𤣥翻而武賢以為可奪其畜産虜其妻子此殆空言非至計也師古曰殆僅也韻畧云近也先零首為畔逆它種劫略師古曰言被刼畧而反畔非其本心故臣愚冊冊謀也籌也欲捐䍐开闇昧之過隐而勿章先行先零之誅以震動之宜悔過反善因赦其罪選擇良吏知其俗者拊循和輯師古曰拊古撫字輯與集同此全師保勝安邉之冊天子下其書公卿議者咸以為先零兵盛而負䍐开之助師古曰負恃也不先破䍐开則先零未可圖也上乃拜侍中許延壽為彊弩將軍即拜酒泉太守武賢為破羌將軍師古曰即就也就其郡而拜之賜璽書嘉納其冊以書敕讓充國曰今轉輸並起百姓煩擾將軍將萬餘之衆不早及秋共水草之利争其畜食師古曰此畜謂畜産牛羊之屬食謂榖麥之屬也或曰畜食畜之所食即謂草也欲至冬虜皆當畜食師古曰此畜讀曰蓄蓄聚積也多臧匿山中依險阻臧古藏字將軍士寒手足皸瘃師古曰皸坼裂也瘃寒創也皸音軍瘃竹足翻寧有利哉將軍不念中國之費欲以歲數而勝敵師古曰久歴年嵗乃勝小敵也數音所具翻將軍誰不樂此者師古曰言為將軍者皆樂此樂音洛今詔破羌將軍武賢等將兵以七月擊䍐羌將軍其引兵並進勿復有疑復扶又翻充國上書曰陛下前幸賜書欲使人諭䍐以大軍當至漢不誅䍐以解其謀臣故遣开豪雕庫宣天子至徳䍐开之屬皆聞知明詔今先零羌楊玉阻石山木候便為冦師古曰謂阻依山之木石以自保固䍐羌未有所犯乃置先零先擊䍐釋有罪誅無辜師古曰釋置也放也起壹難就兩害誠非陛下本計也臣聞兵灋攻不足者守有餘又曰善戰者致人不致於人師古曰致人者引致而取之致於人為人所引也今䍐羌欲為燉煌酒泉冦燉徒門翻宜飭兵馬練戰士以須其至師古曰須待也坐得致敵之術以逸擊勞取勝之道也今恐二郡兵少不足以守而發之行攻釋致虜之術而從為虜所致之道師古曰釋廢也臣愚以為不便先零羌虜欲為背畔故與䍐开解仇結約然其私心不能無恐漢兵至而䍐开背之也背蒲妹翻臣愚以為其計常欲先赴䍐开之急以堅其約先擊䍐羌先零必助之今虜馬肥糧食方饒擊之恐不能傷害適使先零得施徳於䍐羌師古曰施徳自樹恩徳也堅其約合其黨虜交堅黨合精兵二萬餘人廹脅諸小種附著者稍衆著直畧翻莫須之屬不輕得離也服䖍曰莫須小種羌名也如是虜兵寖多誅之用力數倍臣恐國家憂累累力瑞翻下累重同由十年數不二三歲而已於臣之計先誅先零已則䍐开之屬不煩兵而服矣先零已誅而䍐开不服涉正月擊之得計之理又其時也以今進兵誠不見其利戊申充國上奏上時掌翻秋七月甲寅璽書報從充國計焉充國乃引兵至先零在所虜久屯聚懈弛師古曰弛放也望見大軍棄車重欲度湟水重直用翻道阨陿充國徐行驅之或曰逐利行遲師古曰逐利宜速今行太遅充國曰此窮冦不可廹也緩之則走不顧急之則還致死師古曰謂更廻還盡力而死戰諸校皆曰善虜赴水溺死者數百降及斬首五百餘人降戸江翻虜焉牛羊十萬餘頭車四千餘兩兩音亮兵至䍐地令軍毋燔聚落芻牧田中師古曰不得燔燒人居及於田畝之中刈芻放牧也䍐羌聞之喜曰漢果不擊我矣豪靡忘使人來言願得還復故地服䖍曰靡忘羌帥名也充國以聞未報靡忘來自歸充國賜飲食遣還諭種人䕶軍以下皆争之曰此反虜不可擅遣充國曰諸君但欲便文自營師古曰茍取文墨之便以自營衛非為公家忠計也語未卒為于偽翻卒子恤翻璽書報令靡忘以贖論後䍐竟不煩兵而下上詔破羌彊弩將軍詣屯所以十二月與充國合擊先零時羌降者萬餘人矣充國度其必壞度徒洛翻欲罷騎兵屯田以待其敝作奏未上上時掌翻㑹得進兵璽書充國子中郎將卬懼使客諌充國曰誠令兵出破軍殺將以傾國家將即亮翻將軍守之可也即利與病又何足争一旦不合上意遣繡衣來責將軍師古曰繡衣謂御史將軍之身不能自保何國家之安充國歎曰是何言之不忠也本用吾言羌虜得至是耶師古曰言豫防之可無今日之冦也徃者舉可先行羌者行下孟翻吾舉辛武賢丞相御史復白遣義渠安國竟沮敗羌復扶又翻敗補邁翻金城湟中榖斛八錢吾謂耿中丞服䖍曰耿夀昌也為司農中丞姓譜耿古國名為晉所滅子孫以為氏謂告語也糴三百萬斛榖羌人不敢動矣師古曰言豫儲糧食可以制敵耿中丞請糴百萬斛乃得四十萬斛耳義渠再使使疏吏翻且費其半失此二冊羌人致敢為逆失之毫釐差以千里是既然矣今兵久不决四夷卒有動揺卒讀曰猝下可卒同又卒死同相因而起雖有知者不能善其後知讀曰智羌獨足憂邪師古曰言儻如此則所憂不獨在羌吾固以死守之明主可為忠言遂上屯田奏曰臣所將吏士馬牛食所用糧榖茭槀調度甚廣難久不解調徒弔翻難乃旦翻傜役不息恐生他變為明主憂誠非素定廟勝之冊師古曰廟勝謂謀於廟堂而勝敵也且羌易以計破難用兵碎也易以豉翻故臣愚心以為擊之不便計度臨羌東至浩亹羌虜故田及公田民所未墾可二千頃以上度徒洛翻其閒郵亭多壞敗者臣前部士入山伐林木六萬餘枚在水次臣願罷騎兵留歩兵萬二百八十一人分屯要害處氷解漕下繕郷亭浚溝渠師古曰漕下以水運木而下也繕補也浚深治也治湟陿以西道橋七十所令可至鮮水左右田事出賦人三十畮師古曰田事出謂至春人出營田也賦謂班與之也畮古畆字至四月草生發郡騎及屬國胡騎各千就草為田者遊兵以充入金城郡益積畜省大費今大司農所轉榖至者足支萬人一歲食謹上田處及器用簿上時掌翻上報曰即如將軍之計虜當何時伏誅兵當何時得决孰計其便復奏孰與熟同復扶又翻充國上狀曰臣聞帝王之兵以全取勝是以貴謀而賤戰百戰而百勝非善之善者也故先為不可勝以待敵之可勝師古曰此兵法之辭言先自完堅令敵不能勝我乃可以勝敵也余據此言本之孫子蠻夷習俗雖殊於禮義之國然其欲避害就利愛親戚畏死亡一也今虜亡其美地薦草師古曰薦稠草愁於寄託逺遯骨肉心離人有畔志而明主班師罷兵鄧展曰班還也萬人留田順天時因地利以待可勝之虜雖未即伏辜兵決可朞月而望羌虜瓦解前後降者萬七百餘人及受言去者凡七十軰如淳曰羌胡言欲降受其言遣去者師古曰如說非也謂羌受充國之言歸相告喻者也羌虜即羌賊耳無預於胡此坐支解羌虜之具也臣謹條不出兵留田便宜十二事歩兵九校師古曰一部為一校校户教翻吏士萬人留屯以為武備因田致榖威徳並行一也又因排折羌虜令不得歸肥饒之地貧破其衆以成羌虜相畔之漸二也居民得並田作師古曰並且讀如本字又音歩浪翻仲馮曰並亦俱也不失農業三也軍馬一月之食度支田士一歲罷騎兵以省大費四也度徒洛翻至春省甲士卒循河湟漕榖至臨羌臨羌縣屬金城郡其西北即塞外以示羌虜揚威武傳世折衝之具五也以閒暇時下先所伐材繕治郵亭充入金城六也閒與閑同治直之翻兵出乗危徼幸師古曰言不可必勝徼堅堯翻又一遙翻不出令反畔之虜竄於風寒之地離霜露疾疫瘃墮之患師古曰墮謂困寒瘃而墮指者坐得必勝之道七也無經阻逺追死傷之害八也内不損威武之重外不令虜得乗間之勢九也師古曰間謂軍之間隙者也問古莧翻又亡驚動河南大开小开皆羌種在河西之河南亡古無字通使生它變之憂十也治隍陿中道橋令可至鮮水以制西域伸威千里從枕席上過師十一也鄭氏曰橋成軍行安易若於枕席上過也大費既省繇役豫息以戒不虞十二也繇古傜字通留屯田得十二便出兵失十二利唯明詔采擇上復賜報曰兵决可期月而望者復扶又翻下同期讀曰朞謂今冬邪謂何時也將軍獨不計虜聞兵頗罷且丁壯相聚攻擾田者及道上屯兵復殺略人民將何以止之將軍孰計復奏充國復奏曰臣聞兵以計為本故多筭勝少筭孫子曰多筭勝少筭不勝先零羌精兵今餘不過七八千人失地逺客分散飢凍畔還者不絶臣愚以為虜破壊可日月冀逺在來春故曰兵决可期月而望竊見北邉自燉煌至遼東萬一千五百餘里乗塞列地有吏卒數千人虜數以大衆攻之而不能害燉徒門翻數所角翻今騎兵雖罷虜見屯田之士精兵萬人從今盡三月虜馬羸瘦羸倫為翻必不敢捐其妻子於他種中種章勇翻逺渉河山而來為冦亦不敢將其累重還歸故地師古曰累重謂妻子也累力瑞翻重直用翻是臣之愚計所以度虜且必瓦解其處師古曰各于其處自瓦解度徒洛翻不戰而自破之冊也冊與策同至於虜小冦盗時殺人民其原未可卒禁卒讀曰猝臣聞戰不必勝不茍接刃攻不必取不茍勞衆誠令兵出雖不能滅先零但能令虜絶不為小冦則出兵也即今同是師古曰言俱不能止小冦盗而釋坐勝之道從乗危之勢徃終不見利空内自罷敝罷讀曰疲貶重以自損貶重謂貶中國之威重也非所以示蠻夷也又大兵一出還不可復留言大兵出塞而還人有歸志不可使復留屯以備羌湟中亦未可空如是徭役復更發也復扶又翻下同臣愚以為不便臣竊自惟念奉詔出塞引軍逺擊窮天子之精兵散車甲於山野雖亡尺寸之功亡古無字通下同媮得避嫌之便師古曰媮茍且也而亡後咎餘責此人臣不忠之利非明主社稷之福也充國奏每上輙下公卿議臣上時掌翻下遐嫁翻初是充國計者什三中什五最後什八有詔詰前言不便者皆頓首服詰去吉翻魏相曰臣愚不習兵事利害後將軍數畫軍冊數所角翻下同其言常是臣任其計必可用也師古曰任保也上於是報充國嘉納之亦以破羌彊弩將軍數言當擊於是兩從其計詔兩將軍與中郎將卬出擊彊弩出降四千餘人破羌斬首二千級中郎將卬斬首降者亦二千餘級而充國所降復得五千餘人詔罷兵獨充國留屯田大司農朱邑卒上以其循吏閔惜之詔賜其子黄金百斤以奉其祭祀是歲前將軍龍額侯韓増為大司馬車騎將軍龍頟矦國屬平原郡師古曰今書本雒字或作額而崔浩云有龍頟村作額者非額音洛丁令比三歲鈔盗匈奴令音零比毗至翻鈔楚交翻殺略數千人匈奴遣萬餘騎徃擊之無所得史言匈奴漸衰二年春正月以鳳皇甘露降集京師赦天下夏五月趙充國奏言羌本可五萬人軍凡斬首七千六百級降者三萬一千二百人溺河湟餓死者五六千人定計遺脫與煎鞏黄羝俱亡者不過四千人定計以定數計筭也羌靡忘等自詭必得師古曰詭責也自以為憂責言必能得之請罷屯兵奏可充國振旅而還書班師振旅孔安國注曰兵入曰振旅振整也杜預曰振整也旅衆也言振衆而還也所善浩星賜迎說充國曰鄧展曰浩星姓賜名也孫愐曰漢又有浩星公治榖梁說輸芮翻衆人皆以破羌彊弩出擊多斬首生降虜以破壞然有識者以為虜埶窮困兵雖不出即自服矣將軍即見見賢遍翻宜歸功於二將軍出擊非愚臣所及如此將軍計未失也充國曰吾年老矣爵位已極豈嫌伐一時事以欺明主哉言一時用兵之事當以實敷奏豈可以自矜伐為嫌兵埶國之大事當為後灋老臣不以餘命壹為陛下明言兵之利害卒死誰當復言之者卒以其意對為于偽翻卒子恤翻復扶又翻上然其計罷遣辛武賢歸酒泉太守官充國復為後將軍秋羌若零離留且種兒庫師古曰且音子閭翻共斬先零大豪猶非楊玉首文穎曰猶非人名也師古曰猶非及楊玉二人也及諸豪弟澤陽雕良兒靡忘皆帥煎鞏黄羝之屬四千餘人降帥讀曰率下同考異曰宣紀五月羌斬猶非楊玉降充國傳五月奏罷屯兵秋羌斬猶非楊玉降今從傳漢封若零弟澤二人為帥衆王餘皆為侯為君離留且種二人為矦兒庫為君陽雕為言兵矦良兒為君靡忘為獻牛君初置金城屬國以䖏降羌處昌吕翻詔舉可護羌校尉者護羌校尉之官始見於此范曄曰漢武帝時諸羌與匈奴通攻令居安故圍抱罕遣李息徐自為擊定之始置䕶羌校尉時充國病四府舉辛武賢小弟湯四府丞相御史車騎將軍前將軍府也併後將軍府為五府充國遽起奏湯使酒不可典蠻夷師古曰使酒因酒而使氣若今言惡酒者使如字不如湯兄臨衆時湯已拜受節拜者拜官䕶羌校尉持節䕶諸羌有詔更用臨衆更改也音工衡翻後臨衆病免五府復舉湯湯數醉䣱羌人復扶又翻數所角翻下同師古曰䣱况務翻即酗字也醉怒曰䣱羌人反畔卒如充國之言史終言其事卒子恤翻辛武賢深恨充國以破羌希賞而格不行也上書告中郎卭泄省中語辛武賢在軍中時與卬晏語卬言張安世始不快上上欲誅之卬家將軍以為安世宜全度之由此安世得免武賢恨充國告卬以此罪下吏自殺下遐稼翻司𨽻校尉魏郡盖寛饒百官表司𨽻校尉周官武帝征和四年初置持節從中都官徒千二百人捕巫蠱督大姦猾後罷其兵察三輔三河𢎞農師古曰以掌徒𨽻而廵察故云司𨽻盖音古盍翻齊大夫陳戴食采於蓋其後以為氏至漢初齊有葢公剛直公清數干犯上意時上方用刑灋任中書官武帝游宴後庭用䆠者為中書官宣帝因之遂基恭顯之禍賢曰中書内中之書也寛饒奏封事曰方今聖道浸㣲儒術不行以刑餘為周召師古曰言使奄人當權軸也召讀曰邵以灋律為詩書師古曰言以刑法成教化也又引易傳傳直戀翻言五帝官天下三王家天下家以傳子孫官以傳賢聖書奏上以為寛饒怨謗下其書中二千石下遐稼翻下同時執金吾議據公卿表是歲也南陽太守賢為執金吾以為寛饒㫖意欲求禪大逆不道師古曰言欲使天子傳位于已諫大夫鄭昌愍傷寛饒忠直憂國以言事不當意而為文吏所詆挫師古曰詆毁也挫折也上書訟寛饒曰訟者訟其寃也臣聞山有猛獸藜藿為之不采國有忠臣姦邪為之不起為于偽翻司𨽻校尉寛饒居不求安食不求飽師古曰論語稱孔子曰君子食無求飽居無求安故引之進有憂國之心退有死節之義上無許史之屬下無金張之託應劭曰許伯宣帝皇后父史髙宣帝外家也金金日磾也張張安世也此四家屬託無不聽師古曰此說非也許氏史氏有外屬之恩金氏張氏自託於近侍也屬讀如本字職在司察直道而行多仇少與師古曰仇怨讎也與黨與也上書陳國事有司劾以大辟劾戸槩翻辟毗亦翻臣幸得從大夫之後官以諌為名不敢不言上不聽九月下寛饒吏寛饒引佩刀自剄北闕下剄古鼎翻衆莫不憐之匈奴虛閭權渠單于將十餘萬騎旁塞獵旁歩浪翻欲入邉為冦未至㑹其民題除渠堂亡降漢言狀漢以為言兵鹿奚鹿盧矦此矦不見世表盖無食邑猶前羌陽雕矦言兵矦之類也而遣後將軍趙充國將兵四萬餘騎屯縁邉九郡文潁曰五原朔方之屬也師古曰九郡者五原朔方雲中代郡鴈門定襄北平上谷漁陽也四萬餘騎分屯之而充國總統領之據充國傳書此事於征羌之前通鑑因匈奴内亂書于此以先事備虜月餘單于病歐血因不敢入還去即罷兵乃使題王都犂胡次等入漢請和親未報㑹單于死虛閭權渠單于始立而黜顓渠閼氏事見二十四卷地節二年閼氏音煙支顓渠閼氏即與右賢王屠耆堂私通右賢王㑹龍城而去顓渠閼氏語以單于病甚且勿逺語牛倨翻後數日單于死用事貴人郝宿王刑未央使人召諸王未至師古曰郝音呼各翻顓渠閼氏與其弟左大將且渠都隆竒謀立右賢王為握衍朐鞮單于且子余翻朐音劬鞮丁奚翻握衍朐鞮單于者烏維單于耳孫也應劭曰耳孫𤣥孫之子也言去其髙曽益逺但耳聞之也李斐曰耳孫曾孫也晉灼曰耳孫𤣥孫之曾孫也諸矦王表在八世師古曰耳孫諸說不同據平紀及諸矦王表說梁孝王𤣥孫之子耳孫音仍又匈奴傳說握衍朐鞮單于云烏維單于耳孫以此參之李云曾孫是也然漢書諸處又皆云曾孫非一不應雜兩稱而言據爾雅曾孫之子為玄孫𤣥孫之子為來孫來孫之子為昆孫昆孫之子為仍孫從己之數是為八葉則與晉說相同仍耳聲相近孟一號也但班氏唯存古名而計其葉數則錯也握衍朐鞮單于立凶惡殺刑未央等而任用都隆竒又盡免虛閭權渠子弟近親而自以其子弟代之虚閭權渠單于子稽矦㹪既不得立師古曰㹪音先安翻又音所姦翻杜佑山諌翻亡歸妻父烏禪幕師古曰禪音禪烏禪幕者本康居烏孫間小國數見侵暴數所角翻率其衆數千人降匈奴狐鹿姑單于以其弟子日逐王姊妻之使長其衆居右地師古曰長其衆為之長帥妻七細翻長知兩翻日逐王先賢撣鄭氏曰撣音纒束之纒晉灼曰音田師古曰晉音是也其父左賢王當為單于讓狐鹿姑單于狐鹿姑單于許立之事見二十二卷武帝太始元年國人以故頗言日逐王當為單于日逐王素與握衍朐鞮單于有隙即帥其衆欲降漢帥讀曰率降户江翻下同使人至渠犂與騎都尉鄭吉相聞吉發渠犂龜兹諸國五萬人迎日逐王口萬二千人小王將十二人小王將者以禆小王將兵者也一曰匈奴左右賢王左右谷蠡王左右大將以下凡二十四長為大王將其餘為小王將將即亮翻隨吉至河曲黄河千里一曲此當在金城郡界頗有亡者吉追斬之遂將詣京師將如字領也挾也漢封日逐王為歸徳矦功臣表歸徳矦食邑扵汝南吉既破車師事見上卷地節三年降日逐威震西域遂并護車師以西北道故號都護都䕶之置自吉始焉師古曰並䕶南北二道故謂之都都猶大也總也上封吉為安逺矦功臣矦表安逺矦食於汝南之慎縣邑吉於是中西域而立莫府師古曰中西域者言最處諸國之中逺近均也中音竹仲翻誤考異曰百官表曰西域都䕶加官地節二年初置盖以神爵為地節也西域傳又云神爵三年亦誤治烏壘城去陽闗二千七百餘里烏壘城與渠犂田官相近陽關在敦煌龍勒縣西宋白曰伊州伊吾郡漢伊吾盧地宣帝時鄭吉為西域都䕶治烏壘城即此永平末取此地置宜禾都尉匈奴益弱不敢争西域僮僕都尉由此罷西域諸國故皆役屬匈奴匈奴西邉日逐王置僮僕都尉使領西域常居焉耆危須尉犂間賦税諸國取富給焉匈奴盖以僮僕視西域也今日逐王既降西域諸國咸服於漢故僮僕都尉罷都護督察烏孫康居等三十六國動静有變以聞可安輯安輯之不可者誅伐之漢之號令班西域矣師古曰班布也握衍朐鞮單于更立其從兄薄胥堂為日逐王為薄胥堂立為屠耆單于張本從才用翻烏孫昆彌翁歸靡因長羅矦常惠上書願以漢外孫元貴靡為嗣元貴靡楚王解憂長男也得令復尚漢公主結婚重親復扶又翻下同重直龍翻畔絶匈奴詔下公卿議下遐稼翻下同大鴻臚蕭望之以為烏孫絶域變故難保不可許臚陵如翻上美烏孫新立大功謂本始二年破匈奴也又重絶故業師古曰重難也故業謂先與匈奴婚親也乃以烏孫主解憂弟相夫為公主盛為資送而遣之使常惠送之至燉煌燉音屯未出塞聞翁歸靡死烏孫貴人共從本約立岑娶子泥靡為昆彌號狂王本約見二十四卷本始三年岑娶漢書作岑陬常惠上書願留少主燉煌少詩照翻下同燉徒門翻惠馳至烏孫責讓不立元貴靡為昆彌還迎少主事下公卿望之復以烏孫持兩端難約結復扶又翻今少主以元貴靡不立而還信無負于夷狄中國之福也少主不止繇役將興繇古徭字通天子從之徴還少主考異曰烏孫傳請昏在元康二年望之傳云神爵二年按元康二年望之未為鴻臚盖誤以神爵為元康也三年春三月丙辰髙平憲矦魏相薨恩澤矦表髙平侯食邑于淮陽柘縣諡法博聞多能曰憲夏四月戊辰丙吉為丞相吉上寛大好禮讓好呼到翻不親小事時人以為知大體秋七月甲子大鴻臚蕭望之為御史大夫八月詔曰吏不亷平則治道衰治直吏翻下同今小吏皆勤事而俸禄薄俸扶用翻欲無侵漁百姓難矣如淳曰漁奪也謂奪其利便也晉灼曰許慎云捕魚之字也師古曰漁者若言漁獵也晉說是也其益吏百石已下俸十五如淳曰律百石奉月六百韋昭曰若食一石則益五斗一考異曰宣紀云益吏百石以下俸十五韋昭曰若食石則益五斗荀紀云益吏百石以下俸五十斛盖以十五難曉故改之然詔云以下恐難指五十斛也是嵗東郡太守韓延夀為左馮翊始延夀為潁川太守潁川承趙廣漢搆㑹吏民之後搆㑹吏民事見二十四卷本始三年師古曰搆結也俗多怨讐延夀改更教以禮讓更工衡翻召故老與議定嫁娶䘮祭儀品略依古禮不得過灋百姓遵用其教賣偶車馬下里偽物者棄之市道張晏曰下里地下蒿里偽物也師古曰偶謂土木為之象真車馬之形也偶對也棄其物於市之道上也黄霸代延夀居潁川霸因其迹而大治延夀為吏上禮義好古教化好呼到翻所至必聘其賢士以禮待用廣謀議納諌争表孝弟有行争讀曰諍行下孟翻修治學宫師古曰學宫謂庠序之舍也治直之翻春秋郷射陳鍾皷管弦盛升降揖讓周禮地官郷大夫以郷射之禮五物詢衆庻一曰和二曰容三曰主皮四曰和容五曰興舞及都試講武設斧鉞旌旗習射御之事漢諸郡以八月都試講武事也如淳曰太守都尉令長丞尉㑹都試課殿最也治城郭收賦租先明布告其日以期會為大事吏民敬畏趨郷之師古曰趨讀曰趣郷讀曰嚮趣七喻翻又置正五長師古曰正若今之郷正里正也伍長同伍之中置一人為長也長知兩翻相率以孝弟弟讀曰悌下孝弟同不得舍姦人師古曰舍止也閭里阡陌有非常吏輒聞知姦人不敢入界其始若煩後吏無追捕之苦民無箠楚之憂師古曰箠杖也楚荆木也即今之荆子也箠止蘂翻皆便安之接待下吏恩施甚厚而約誓明施式豉翻或欺負之者延夀痛自刻責豈其負之何以至此師古曰言豈我負之其人何以為此事吏聞者自傷悔其縣尉至自刺死刺七亦翻及門下掾自剄人救不殊掾于絹翻師古曰殊絶也以人救之故身首不相絶也頸古頂翻延夀涕泣遣吏醫治視治直之翻厚復其家復方目翻在東郡三歲令行禁止令之必行禁之必止無違者也斷獄大減斷丁亂翻由是入為馮翊延夀出行縣至髙陵髙陵縣屬左馮翊行下孟翻民有昆弟相與訟田自言延夀大傷之曰幸得備位為郡表率不能宣明教化至令民有骨肉争訟既傷風化重使賢長吏嗇夫三老孝弟受其恥重直用翻賢長吏謂縣令丞也續漢志縣有嗇夫皆主知民善惡為役先後知民貧富為賦多少平其差品三老掌教化凡有孝子順孫貞女義婦讓財救患及學士為民法式者皆扁表其門以興民行賢曰三老孝弟力田三者皆郷官之名三老髙帝置孝弟力田髙后置所以勸導郷里助成風化也咎在馮翊當先退是日移病不聼事因入卧傳舍閉閤思過傳知戀翻下傳相同一縣莫知所為令丞嗇夫三老亦皆自繫待罪於是訟者宗族傳相責讓此兩昆弟深自悔皆自髠肉袒謝願以田相移終死不敢復争師古曰移猶傳也一說兄以讓弟弟又讓兄故云相移復扶又翻郡中歙然莫不傳相敕厲不敢犯歙與翕同許及翻延夀恩信周徧二十四縣馮翊統髙陵櫟陽翟道池陽夏陽衙粟邑谷口蓮勺鄜頻陽臨晉重泉郃陽祋祤武城沈陽徳徴雲陵萬年長陵陽陵雲陽二十四縣莫敢以辭訟自言者推其至誠吏民不忍欺紿師古曰紿誑也音蕩亥翻匈奴單于又殺先賢撣兩弟烏禪幕請之不聽心恚師古曰恚恨也音於避翻其後左奥鞬王死單于自立其小子為奥鞬王留庭留單于庭也奥鞬貴人共立故奥鞬王子為王師古曰與音郁鞬音居言翻與俱東徙單于遣右丞相將萬騎徃擊之失亡數千人不勝資治通鑑卷二十六
