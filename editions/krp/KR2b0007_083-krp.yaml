body:
  text: 資治通鑑卷八十三宋司馬光撰胡三省音註晉紀五起屠維協洽盡上章涒灘凡二年孝惠皇帝上之下元康九年春正月孟觀大破氐衆於中亭水經注扶風美陽縣有中亭水亦謂之中亭川在美陽縣西獲齊萬年太子洗馬陳留江統洗悉薦翻以為戎狄亂華宐早絶其原乃作徙戎論以警朝廷曰夫夷蠻戎狄地在要荒周禮九州之外謂之蕃國謂東夷南蠻西戎北狄也國語曰蠻夷要服戎狄荒服韋昭注曰要者要結好信而服從之荒者言荒忽無常也要一遥翻禹平九土而西戎即叙孔安國曰言荒服之外流沙之内皆就次叙班固曰即叙者言就而叙之其性氣貪婪婪盧含翻凶悍不仁悍矦罕翻又下罕翻四夷之中戎狄為甚弱則畏服彊則侵叛當其彊也以漢高祖困於白登孝文軍於霸上及其弱也以元成之微而單于入朝此其巳然之效也單音禪朝直遥翻是以有道之君牧夷狄也惟以待之有備禦之有常雖稽顙軌贄周禮蕃國世一見各以其所貴寶為贄稽音啟而邉城不弛固守漢元帝時匈奴單于請罷邉塞守備候應以為不可所謂不弛固守也彊暴為寇而兵甲不加逺征周宣王薄伐獫狁至于太原盡境而返比于蟁蝱驅之而已不加逺征也令境内獲安疆埸不侵而已及至周室失統諸矦專征封疆不固利害異心戎狄乗閒得入中國如戎伐魯濟西山戎病燕狄伐衛邢長狄入三國之類閒古莧翻或招誘安撫以為已用如申繒以西戎攻殺周幽王晉遷陸渾之戎於伊川與之掎角以敗秦師于殽楚以蠻軍與晉戰于鄢陵誘音酉自是四夷交侵與中國錯居如徐夷在齊晉魯宋之間鮮虞介燕晉之境赤狄居上黨之地陸渾戎居伊洛之間義渠大荔居秦晉之域戎蠻子居梁霍之地及秦始皇并天下兵威旁達攘胡走越當是時中國無復四夷也事見秦紀漢建武中馬援領隴西太守討叛羗徙其餘種於關中種章勇翻居馮翊河東空地數嵗之後族類蕃息蕃扶元翻既恃其肥彊且苦漢人侵之永初之元羣羗叛亂覆没將守屠破城邑鄧隲敗北侵及河内十年之中夷夏俱敝任尚馬賢僅乃克之事並見漢紀按漢光武建武十一年馬援討羗降之安帝永初元年羗反自建武十一年至永初元年凡七十三年數嵗之後當作數十嵗之後將即亮翻守式又翻隲之日翻夏户雅翻任音壬自此之後餘燼不盡小有際㑹輒復侵叛復扶又翻中世之寇惟此為大魏興之初與蜀分隔疆埸之戎一彼一此武帝徙武都氐於秦川事見六十八卷漢獻帝建安二十三年欲以弱冦彊國扞禦蜀虜此蓋權宐之計非萬世之利也今者當之已受其敝矣夫關中土沃物豐帝王所居周都豐鎬秦都咸陽漢都長安皆關中之地未聞戎狄宐在此土也非我族類其心必異而因其衰敝遷之畿服畿服謂邦畿千里之内士庶翫習侮其輕弱使其怨恨之氣毒於骨髓至於蕃育衆盛蕃扶袁翻則坐生其心以貪悍之性挾憤怒之情候隙乗便輒為横逆横户孟翻而居封域之内無障塞之隔掩不備之人收散野之積積子賜翻聚也故能為禍滋蔓暴害不測此必然之埶已驗之事也當今之宐宐及兵威方盛衆事未罷徙馮翊北地新平安定界内諸羗著先零罕开析支之地徙扶風始平京兆之氐出還隴右著隂平武都之界先零罕开析支之地自湟中西至賜支河首隂平武都舊白馬氐地也著直畧翻零音憐开苦堅翻廩其道路之糧令足自致廩當作稟給也下廩糧同各附本種種章勇翻反其舊土使屬國撫夷就安集之屬國都尉及撫夷䕶軍也戎晉不雜並得其所縱有猾夏之心孔安國曰猾亂也夏華夏也夏户雅翻風塵之警則絶逺中國隔閡山河逺于願翻閡與礙同雖有寇暴所害不廣矣難者曰氐寇新平關中饑疫百姓愁苦咸望寧息而欲使疲悴之衆徙自猜之寇恐埶盡力屈緒業不卒難乃旦翻悴秦醉翻卒子恤翻終也前害未及弭而後變復横出矣復扶又翻答曰子以今者羣氐為尚挾餘資悔惡反善懷我德惠而來柔附乎將埶窮道盡智力俱困懼我兵誅以至於此乎曰無有餘力埶窮道盡故也然則我能制其短長之命而令其進退由已矣夫樂其業者不易事樂音洛安其居者無遷志方其自疑危懼畏怖促遽怖普布翻故可制以兵威使之左右無違也迨其死亡流散離逷未鳩逷他歴翻爾雅曰逷逺也鳩集也與關中之人户皆為讐謂氐羗之反暴掠平民關中之人怨毒之户皆為讐敵故可遐遷逺處令其心不懷土也夫聖賢之謀事也為之於未有治之於未亂治直之翻道不著而平德不顯而成其次則能轉禍為福因敗為功值困必濟遇否能通否皮鄙翻今子遭敝事之終而不圖更制之始更工衡翻愛易轍之勤而遵覆車之軌何哉車覆於前不可遵其轍當易路而行若遵覆車之迹則後車又將覆矣且關中之人百餘萬口率其少多率列恤翻約數也少詩沼翻戎狄居半處之與遷必須口實口實謂糧食也處昌吕翻若有窮乏糝粒不繼者糝桑頷翻以米和羮也故當傾關中之榖以全其生生之計必無擠於溝壑而不為侵掠之害也氐羗窮乏勢必聚而侵掠晉朝欲弭其害故當傾穀以給之擠子西翻又子細翻今我遷之傳食而至謂所過郡縣逓給其食也傳直戀翻附其種族自使相贍而秦地之人得其半榖言關中居人戎狄居半今遷使歸其舊地則秦中百姓將食其所積之穀以約率之正得常居之半穀也種章勇翻下餘種同此為濟行者以廩糧遺居者以積倉遺于季翻寛關中之逼去盜賊之原去羗吕翻除旦夕之損建終年之益若憚蹔舉之小勞蹔與暫同而忘永逸之宏䇿惜日月之煩苦而遺累世之寇敵非所謂能創業垂統謀及子孫者也并州之胡本實匈奴桀惡之寇也建安中使右賢王去卑誘質呼廚泉聽其部落散居六郡謂并州所統六郡也晉書匈奴傳曰匈奴與晉人雜居平陽西河大原新興上黨樂平莫不有焉質呼㕑泉事見六十七卷漢獻帝建安二十一年質音致咸熈之際以一部太彊分為三率率讀曰帥音所類翻泰始之初又増為四於是劉猛内叛連結外虜事見七十九卷武帝泰始七年八年近者郝散之變發於榖逺穀逺縣漢屬上黨郡晉省蓋其地猶存舊縣名也劉昫曰榖逺今沁源縣宋白曰漢榖逺故縣在沁源縣南百五十步孤逺故城是也晉地記云穀逺今名孤逺後代語訛耳郝散事見上卷四年今五部之衆户至數萬人口之盛過於西戎其天性驍勇弓馬便利倍於氐羗驍堅堯翻若有不虞風塵之慮則并州之域可為寒心劉淵之禍江統固逆知之矣正始中母丘儉討句驪事見七十五卷魏邵陵厲公正始七年句如字又音駒驪力知翻徙其餘種於滎陽種章勇翻始徙之時户落百數子孫孳息孶津之翻生也今以千計數世之後必至殷熾熾昌志翻今百姓失職民不得安于耕鑿是失職也猶或亡叛犬馬肥充則有噬齧况於夷狄能不為變但顧其微弱埶力不逮耳顧内顧也夫為邦者憂不在寡而在不安論語孔子曰丘聞有國有家者不患寡而患不均不患貧而患不安以四海之廣士民之富豈須夷虜在内然後取足哉此等皆可申諭發遣還其本域慰彼羈旅懷土之思釋我華夏纖介之憂夏户雅翻惠此中國以綏四方詩大雅民勞之辭德施永世於計為長也朝廷不能用散騎常侍賈謐侍講東宫對太子倨傲成都王頴見而叱之謐怒言於賈后出頴為平北將軍鎮鄴異考曰帝紀云以頴為鎮北大將軍今從本傳徴梁王肜為大將軍録尚書事以河間王顒為鎮西將軍鎮關中肜余中翻顒魚容翻初武帝作石函之制非至親不得鎮關中顒輕財愛士朝廷以為賢故用之顒安平獻王孚之孫太原烈王瓌之子也初襲父爵咸寧三年改封河間為穎顒各據方鎮以阻兵張本夏六月高密文獻王泰薨西考異曰帝紀云隴王本傳云泰為尚書令改封高宻紀誤賈后淫虐日甚私於太醫令程據等晉志太醫令屬宗正又以簏箱載道上年少入宫簏盧谷翻説文竹高篋也少詩照翻復恐其漏泄徃徃殺之復扶又翻賈模恐禍及已甚憂之裴頠與模及張華議廢后更立謝淑妃謝淑妃太子之母也頠魚毁翻更工衡翻廢考異曰模與裴頠王衍謀之衍後悔而正今從頠傳模華皆曰主上自無廢黜之意而吾等專行之儻上心不以為然將若之何且諸王方彊朋黨各異恐一旦禍起身死國危無益社稷頠曰誠如公言然宫中逞其昏虐亂可立待也華曰卿二人於中宫皆親戚言或見信宐數為陳禍福之戒庶無大悖則天下尚未至於亂吾曹得以優游卒嵗而已張華處昏亂之朝位冠羣后而持心如此天殆假手於趙王倫而誅之也數所角翻為于偽翻卒子恤翻悖蒲内翻頠旦夕説其從母廣城君説輸芮翻從才用翻令戒諭賈后以親厚太子賈模亦數為后言禍福后不能用反以模為毁已而疎之模不得志憂憤而卒秋八月以裴頠為尚書僕射頠雖賈后親屬然雅望素隆四海惟恐其不居權位尋詔頠專任門下事晉制侍中與給事黄門侍郎同管門下事頠為侍中專任門下事賈后之意也頠上表固辭以賈模適亡復以臣代之復扶又翻崇外戚之望彰偏私之舉為聖朝累累力瑞翻不聽或謂頠曰君可以言當盡言於中宫言而不從當逺引而去儻二者不立雖有十表難以免矣頠慨然久之竟不能從史言華頠顧戀禄位以殞首亡家帝為人戇騃戅陟降翻愚也騃語駭翻癡也嘗在華林園聞蝦蟆蝦何加翻蟆謨加翻謂左右曰此鳴者為官乎為私乎為于偽翻時天下荒饉百姓餓死帝聞之曰何不食肉糜糜忙皮翻粥也由是權在羣下政出多門埶位之家更相薦託有如互市更工衡翻賈郭恣横横户孟翻貨賂公行南陽魯褒作錢神論以譏之曰錢之為體有乾坤之象親之如兄字曰孔方錢圜函方天圜而地方故曰有乾坤之象孔方亦以錢體言無德而尊無埶而熱排金門入紫闥危可使安死可使活貴可使賤生可使殺是故忿爭非錢不勝幽滯非錢不抜怨讐非錢不解令聞非錢不發聞音問洛中朱衣當塗之士晉制諸王朱衣絳紗襮當塗之士謂當路柄用者愛我家兄皆無己已執我之手抱我終始凡今之人惟錢而已又朝臣務以苛察相高每有疑議羣下各立私意刑法不壹獄訟繁滋裴頠上表曰先王刑賞相稱稱尺證翻輕重無二故下聽有常羣吏安業去元康四年大風廟闕屋瓦有數枚傾落免太常荀㝢事輕責重有違常典五年二月有大風蘭臺主者懲懼前事求索阿棟之間得瓦小邪十五處蘭臺主者御史臺主者也即令史之類阿屋之隈曲棟屋穩也索山客翻遂禁止太常復興刑獄復扶又翻下頌復史復同今年八月陵上荆一枝圍七寸二分者被斫司徒太常奔走道路說文荆楚木也司徒漢丞相之職漢制丞相與太常掌園陵被皮義翻雖知事小而按劾難測劾户槩翻又户得翻搔擾驅馳各競免負負罪負也于今太常禁止未解夫刑書之文有限而舛違之故無方故有臨時議處之制言法有一定之文而罪有故誤情有輕重故制令臨時隨事情議處其罪處昌呂翻誠不能皆得循常也至於此等皆為過當當丁浪翻恐姦吏因縁得為淺深也既而曲議猶不止曲議謂曲法而議自為淺深三公尚書劉頌復上疏曰晉志漢成帝置三公尚書主斷獄光武以三公曹主嵗盡考課州郡事自近世以來法漸多門令甚不一吏不知所守下不知所避姦偽者因以售其情居上者難以檢其下檢校檢束也事同議異獄犴不平犴魚旰翻野獄曰犴夫君臣之分各有所司法欲必奉故令主者守文理有窮塞故使大臣釋滯事有時宐故人主權斷塞悉則翻斷丁亂翻下宏斷同主者守文若釋之執犯蹕之平也事見十四卷漢文帝三年大臣釋滯若公孫宏斷郭解之獄也事見十八卷漢武帝元朔二年人主權斷若漢祖戮丁公之為也事見十一卷漢高祖五年天下萬事自非此類不得出意妄議皆以律令從事然後法信於下人聽不惑吏不容姦可以言政矣表考異曰刑法志叙頌奏續頠之下而云侍中太宰汝南王亮按頠表引元康八年事時亮死已久蓋志誤也乃下詔郎令史復出法駁案者隨事以聞然亦不能革也郎令史尚書郎及尚書蘭臺令史也出法駁案者謂出於法之外而為駁議也駁北角翻頌遷吏部尚書建九班之制欲令百官居職希遷考課能否明其賞罰賈郭用權仕者欲速事竟不行裴頠薦平陽韋忠於張華魏邵陵厲公正始八年分河東郡之汾北為平陽郡華辟之忠辭疾不起人問其故忠曰張茂先華而不實裴逸民慾而無厭張華字茂先裴頠字逸民厭於鹽翻棄典禮而附賊后此豈大丈夫之所為哉逸民每有心託我我常恐其溺於深淵而餘波及我况可褰裳而就之哉溺奴狄翻關内矦敦煌索靖知天下將亂敦徒門翻索蘇各翻指洛陽宫門銅駝歎曰㑹見汝在荆棘中耳銅駝魏明帝景初元年自長安徙之洛陽冬十一月甲子朔日有食之初廣城君郭槐以賈后無子常勸后使慈愛太子賈謐驕縱數無禮於太子數所角翻廣城君恒切責之恒户登翻廣城君欲以韓壽女為太子妃太子亦欲婚韓氏以自固壽妻賈午及后皆不聽而為太子聘王衍少女太子聞衍長女美而后為賈謐聘之為于偽翻少詩照翻長知兩翻心不能平頗以為言及廣城君病臨終執后手令盡心於太子言甚切至又曰趙粲賈午必亂汝家事我死後勿復聽入深記吾言郭槐妬狠而垂没之時所以告戒其女者如此蓋多權數故其智慮能及此耳復扶又翻下同后不從更與粲午謀害太子太子㓜有令名事見上卷武帝太康十年及長不好學長知兩翻好呼報翻下同惟與左右嬉戲賈后復使黄門輩誘之為奢靡威虐誘音酉由是名譽浸減驕慢益彰或廢朝侍而縱遊逸朝直遥翻於宫中為市使人屠酤手揣斤兩揣初委翻輕重不差其母本屠家女也故太子好之古者擇女必求之名門取其幽閒令淑者良有以也好呼到翻東宫月俸錢五十萬俸扶用翻太子常探取二月用之猶不足探叶南翻又他紺翻探取預取也又令西園賣葵菜藍子雞麵等物而收其利葵亦菜也魯相公儀休抜園葵漆室氏女曰晉客馬踐吾葵使吾終嵗不食葵是也藍盧甘翻草可以染青者也本草圖經曰藍實人家蔬圃中作畦種蒔三月四月生苗高三四尺許葉似水蓼花紅白色實亦若蓼子而大黒色五月六月採實麫屑麥為之又好隂陽小數多所拘忌班固曰隂陽家葢出於羲和之官敬順昊天厯象日月星辰敬授人時此其所長也及拘者為之則牽於禁忌泥於小數捨人事而任鬼神洗馬江統上書陳五事一曰雖有微苦宐力疾朝侍苦亦疾也朝直遥翻二曰宐勤見保傅咨詢善道三曰畫室之功可宐減省畫室以五采繪畫室屋也畫與盡同後園刻鏤雜作一皆罷遣鏤郎豆翻四曰西園賣葵藍之屬虧敗國體貶損令聞敗補邁翻聞音問五曰繕牆正瓦不必拘攣小忌攣閭緑翻太子皆不從中舍人杜錫晉志太子中舍人四人咸寧四年置以舍人才學美者為之與中庶子共掌文翰職如黄門侍郎在中庶子下洗馬上恐太子不得安其位每盡忠諫勸太子修德業保令名言辭懇切太子患之置針著錫常所坐氈中著陟畧翻刺之血流刺七亦翻錫預之子也杜預武帝時建平吴之功太子性剛知賈謐恃中宫驕貴不能假借之謐時為侍中至東宫或捨之於後庭遊戲詹事裴權諫曰詹事秦官掌太子家晉初未置詹事宫事無大小皆由二傅咸寧元年置詹事掌宫事二傅不復令官屬謐后所親昵昵尼質翻一旦交構則事危矣不從謐譛太子於后曰太子多畜私財以結小人者為賈氏故也為于偽翻若宫車晏駕彼居大位依楊氏故事誅臣等廢后於金墉如反手耳賈后殺楊駿廢太后天地之所不容也觀其姑姪之間所言若此則其心固不能一息安也不如早圖之更立慈順者可以自安更工衡翻后納其言乃宣揚太子之短布於逺近又詐為有娠娠升人翻孕也内藁物産具取妹夫韓壽子慰祖養之欲以代太子於是朝野咸知賈后有害太子之意中䕶軍趙俊請太子廢后太子不聽左衛率東平劉卞以賈后之謀問張華帝在東宫置衛率初曰中衛率泰始五年分為左右各領一軍愍懷在東宫又加前後二率謂之四率率所律翻華曰不聞卞曰卞自須昌小吏受公成抜以至今日須昌縣屬東平國卞自縣小吏從令入洛歴官至左衛率士感知己是以盡言而公更有疑於卞邪華曰假令有此君欲如何卞曰東宫俊乂如林時江統潘滔王敦等皆為東宫官屬馬融曰才過千人曰俊百人曰乂四率精兵萬人公居阿衡之任若得公命皇太子因朝入録尚書事朝直遥翻下同廢賈后於金墉城兩黄門力耳華曰今天子當陽太子人子也吾又不受阿衡之命華自言事任不可以伊尹自居忽相與行此是無君父而以不孝示天下也况權戚滿朝威柄不一成可必乎賈后常使親黨㣲服聽察於外頗聞卞言乃遷卞為雍州刺史雍於用翻卞知言泄飲藥而死賈后剛悍使閒卞言而張華不以告則華必死于賈后之手意卞言實華泄之也十二月太子長子虨病長知兩翻虨甫斤翻又方翻太子為虨求王爵不許虨疾篤太子為之禱祀求福為于偽翻賈后聞之乃詐稱帝不豫召太子入朝既至后不見置于别室遣婢陳舞以帝命賜太子酒三升使盡飲之太子辭以不能飲三升舞逼之曰不孝邪天賜汝酒而不飲臣子以君父為天故以君父之賜為天賜酒中有惡物邪太子不得已彊飲至盡彊其兩翻遂大醉后使黄門侍郎潘岳作書草潘岳此事自當赤族其後天假手於孫秀耳令小婢承福以紙筆及草因太子醉稱詔使書之文曰陛下宐自了不自了吾當入了之中宫又宐速自了不自了吾當手了之并與謝妃共要刻期兩發勿疑猶豫以致後患茹毛飲血於三辰之下皇天許當掃除患害立道文為王蔣氏為内主願成當以三牲祠北君太子醉迷不覺遂依而寫之謝妃太子母也要約也言并以書與謝妃約刻期内外俱發也茹毛飲血謂盟誓也虨字道文蔣氏虨母蔣保林也内主言將立為后也三牲牛羊豕也北君北帝也按此書不惟無證佐使常人觀之亦知其偽為而不可信晉朝王公卿尚書黄散視而不敢言張華之諫實亦不敢發賈氏之姦姑引古義依違而言之耳裴頠請檢校傳書者賈氏之姦無所逃矣而亦不敢竟其説上下相䝉宐其大亂也其字半不成后補成之以呈帝壬戍帝幸式乾殿召公卿入使黄門令董猛以太子書及青紙詔示之曰遹書如此令賜死徧示諸公王莫有言者諸公王宗室諸王之為公者張華曰此國之大禍自古以來常因廢黜正嫡以致䘮亂䘮息浪翻且國家有天下日淺願陛下詳之裴頠以為宐先檢校傳書者又請比校太子手書不然恐有詐妄賈后乃出太子啟事十餘紙衆人比視亦無敢言非者賈后使董猛矯以長廣公主辭白帝曰長廣公主武帝女下嫁甄德事宐速决而羣臣各不同其不從詔者宐以軍法從事欲以此言脅羣臣也議至日西不决后見華等意堅懼事變乃表免太子為庶人詔許之於是使尚書和郁等持節詣東宫廢太子為庶人太子改服出拜受詔步出承華門承華門東宫門也陸機詩所謂振纓承華是也乗麤犢車東武公澹以兵仗送太子及妃王氏三子虨臧尚同幽于金墉城王衍自表離婚許之妃慟哭而歸清談之禍起於何晏何晏猶與曹爽同禍福若王衍者又不逮何晏矣殺太子母謝淑媛及虨母保林蔣俊保林良娣漢六宫十四等之數魏晉以下為東宫女官品秩師古曰保林言其可安衆如林也永康元年春正月癸亥朔己考異曰帝紀天文志皆有夘日食宋志無之按長厯己夘十七日安得日食赦天下改元西戎校尉司馬閻纘武帝置南蠻校尉於襄陽西戎校尉於長安南夷校尉於寧州各有長史司馬輿棺詣闕上書以為漢戾太子稱兵拒命言者猶曰罪當笞耳事見二十二卷漢武帝征和二年三年今遹受罪之日不敢失道猶為輕於戾太子宐重選師傅重再也重直龍翻先加嚴誨若不悛改弃之未晩也悛丑緑翻書奏不省省悉景翻纘圃之孫也閻圃見六十七卷漢獻帝建安二十年賈后使黄門自首首式救翻下同欲與太子為逆詔以黄門首辭班示公卿遣東武公澹以千兵防衛太子幽于許昌宫令持書御史劉振持節守之持書御史即治書侍御史詔宫臣不得辭送洗馬江統潘滔舍人王敦杜蕤魯瑶等冒禁至伊水拜辭涕泣晉志太子舍人十六人職比散騎中書等侍郎水經注伊水過伊闕中東北至洛陽縣南北入于洛司𨽻校尉滿奮收縛統等送獄其繫河南獄者樂廣悉解遣之樂廣時為河南尹繫洛陽縣獄者猶未釋付郡者河南尹得解遣之繫洛陽獄者尹不得與故未釋都官從事孫琰説賈謐曰所以廢徙太子以其為惡故耳今宫臣冒罪拜辭而加以重辟流聞四方乃更彰太子之德也説輸芮翻下乃説辟黜亦翻聞音問不如釋之謐乃語洛陽令曹攄使釋之攄抽居翻語牛倨翻廣亦不坐敦覽之孫王覽見七十七卷魏高貴鄉公甘露元年攄肇之孫也曹肇見七十四卷魏明帝景初二年太子至許遺王妃書遺于季翻自陳誣枉妃父衍不敢以聞丙子皇孫虨卒非疾也虨考異曰帝紀虨作霖按字道文不當作霖今從傳三月尉氏雨血尉氏縣自漢以來屬陳留郡應劭曰古獄官曰尉氏鄭之别獄也臣瓉曰鄭大夫尉氏之邑故以為邑名師古曰鄭大夫尉氏亦以掌獄之官故為族耳應説是也雨于具翻妖星見南方星見妖而不知其名故但曰妖星妖於驕翻見賢遍翻下同太白書見晉天文志曰太白晝見與日爭明彊國弱小國彊女主昌中台星拆史記天官書曰魁下六星兩兩而比者曰三台三台色齊君臣和不齊君臣乖戾漢天文志曰三台曰泰階上階上星為天子下星為女主中階上星為諸矦三公下星為卿大夫下階上星為士下星為庶人拆者兩星不相比也張華少子韙勸華遜位少詩照翻韙羽委翻華不從曰天道幽逺不如靜以待之華所謂靜以待之者欲何所待也太子既廢衆情憤怒右衛督司馬雅常從督許超皆嘗給事東宫與殿中中郎士猗等右衛督常從督殿中中郎皆屬二衛武帝甚重兵官殿中軍校多選朝廷凊望之士居之司馬雅宗室之疎屬也從才用翻謀廢賈后復太子以張華裴頠安常保位難與行權右軍將軍趙王倫執兵柄性貪冒冒密北翻可假以濟事乃說孫秀曰説輸芮翻中宫凶妬無道與賈謐等共誣廢太子今國無嫡嗣社稷將危大臣將起大事而公名奉事中宫與賈郭親善太子之廢皆云豫知言倫秀豫知廢太子之謀一朝事起禍必相及何不先謀之乎秀許諾言於倫倫納焉遂告通事令史張林通事令史中書令史也中書侍郎本通事郎官名雖改令史猶以通事冠之陸機惠帝起居注曰張林者黒山賊張燕之曽孫及省事張衡等省事亦吏職也賈充為尚書令以目疾表置省事吏四員省事蓋自此始省悉景翻使為内應事將起孫秀言於倫曰太子聰明剛猛若還東宫必不受制於人明公素黨於賈后道路皆知之今雖建大功於太子太子謂公特逼於百姓之望翻覆以免罪耳言百姓望太子復倫等畏逼故背賈氏復太子以求自免罪雖含忍宿忿必不能深德明公若有瑕釁猶不免誅不若遷延緩期遲其事而遷延未發也賈后必害太子然後廢賈后為太子報讐為于偽翻非徒免禍而已乃更可以得志倫然之秀因使人行反間間古莧翻言殿中人欲廢皇后立太子司馬雅許超士猗皆殿中人也賈后數遣宫婢微服於民間聽察數所角翻聞之甚懼倫秀因勸謐等早除太子以絶衆望癸未賈后使太醫令程據和毒藥和户卧翻矯詔使黄門孫慮至許昌毒太子太子自廢黜恐被毒常自煮食於前被皮義翻慮以告劉振振乃徙太子於小坊中絶其食宫人猶竊於牆上過食與之慮逼太子以藥太子不肯服慮以藥杵椎殺之椎傳追翻有司請以庶人禮葬賈后表請以廣陵王禮葬之夏四月辛卯朔日有食之趙王倫孫秀將討賈后告右衛佽飛督閭和晉制右衛有佽飛虎賁二督佽飛荆人赴江斬蛟古勇士也自漢以來以為衛士之號佽日四翻和從之期以癸巳丙夜一籌以鼓聲為應丙夜夜三鼓丙夜一籌三更一㸃也癸巳秀使司馬雅告張華曰趙王欲與公共匡社稷為天下除害為于偽翻使雅以告華拒之雅怒曰刃將在頸猶為是言邪不顧而出華素有籌略雅辭氣之悖如此而無以處之蓋亦知衆怒不可遏而已為賈后用心不敢背之搏手無策待死而已及期倫矯詔勑三部司馬曰晉二衛有前驅由基彊弩三部司馬中宫與賈謐等殺吾太子今使車騎入廢中宫時趙王倫以車騎將軍領右軍將軍汝等皆當從命事畢賜爵關中矦不從者誅三族衆皆從之又矯詔開門夜入陳兵道南御道之南也遣翊軍校尉齊王冏武帝太康元年置翊軍校尉冏居永翻將百人排閤而入華林令駱休為内應華林令華林園令也魏起芳林園後避齊王芳諱改曰華林園有天淵池池中有魏文帝九花叢殿晉志華林令屬大鴻臚姓譜齊太公之後有公子駱子孫以為氏又秦之先有大駱迎帝幸東堂以詔召賈謐於殿前將誅之謐走入西鍾下呼曰阿后救我呼大故翻阿今相傳從安入聲就斬之賈后見齊王冏驚曰卿何為來冏曰有詔收后后曰詔當從我出何詔也后至上閤遥呼帝曰陛下有婦使人廢之亦行自廢矣是時梁王肜亦預其謀后問冏曰起事者誰冏曰梁趙后曰繫狗當繫頸反繫其尾何得不然恨不先誅梁趙也遂廢后為庶人幽之於建始殿收趙粲賈午等付暴室考竟晉志暴室令屬光禄勲詔尚書收捕賈氏親黨召中書監侍中黄門侍郎八座皆夜入殿尚書始疑詔有詐郎師景露版奏請手詔郎尚書郎也師姓景名倫等斬之以徇倫隂與秀謀簒位欲先除朝望朝直遥翻且報宿怨乃執張華裴頠解系解結等於殿前倫秀怨華頠系事見上卷元康六年結系弟也秀亂關中結議秀罪應誅故亦怨之華謂張林曰卿欲害忠臣邪林稱詔詰之曰詰去吉翻卿為宰相太子之廢不能死節何也華曰式乾之議臣諫事具存可覆按也林曰諫而不從何不去位華無以對遂皆斬之仍夷三族解結女適裴氏明日當嫁而禍起裴氏欲認活之女曰家既如此我何以活為亦坐死朝廷由是議革舊制女不從死不從父母家同坐死也甲午倫坐端門宫門正南門曰端門遣尚書和郁持節送賈庶人于金墉楊太后太子遹之廢史皆不書為庶人此獨書賈庶人者正其罪也誅劉振董猛孫慮程據等司徒王戎及内外官坐張裴親黨黜免者甚衆閻纉撫張華尸慟哭曰早語君遜位而不肯今果不免命也語牛倨翻於是趙王倫稱詔赦天下自為使持節都督中外諸軍事相國侍中一依宣文輔魏故事晉志曰丞相相國秦官也晉受魏禪並不置自惠帝之後省置無恒為之者趙王倫梁王肜成都王頴南陽王保王敦王導之徒非復人臣之職也今按宣王懿以丞相輔魏文王昭以相國輔魏皆非人臣之職置府兵萬人以其世子散騎常侍荂領冗從僕射荂枯花翻楊正衡音孚晉志冗從僕射屬先禄勲從才用翻子馥為前將軍封濟陽王濟子禮翻䖍為黄門郎封汝隂王詡為散騎侍郎封霸城矦黄門郎即黄門侍郎散騎侍郎魏初與散騎常侍同置自魏至晉散騎常侍侍郎與侍中黄門侍郎共平尚書奏事皆要官也孫秀等皆封大郡並據兵權文武官封矦者數千人百官總己以聽於倫朱氏曰總己謂總攝已職倫素庸愚復受制于孫秀復扶又翻秀為中書令威權振朝廷天下皆事秀而無求於倫詔追復故太子遹位號使尚書和郁帥東宫官屬迎太子䘮于許昌帥讀曰率追封遹子虨為南陽王封虨弟臧為臨淮王尚為襄陽王有司奏尚書令王衍備位大臣太子被誣志在茍免謂太子遺王妃書自陳誣枉衍不敢以聞也請禁錮終身從之相國倫欲收人望選用海内名德之士以前平陽太守李重滎陽太守荀組為左右長史東平王堪沛國劉謨為左右司馬尚書郎陽平東晳為記室魏文帝黄初二年分魏郡置陽平郡記室主文翰束晳漢太子太傅疎廣之後廣曽孫避難因去疎字之足改姓為束續漢志曰記室主上章表報書記淮南王文學荀崧殿中郎陸機為參軍殿中郎尚書郎也主殿中曹組朂之子朂為晉初佐命之臣崧彧之𤣥孫也荀彧為魏初佐命之官李重知倫有異志辭疾不就倫逼之不已憂憤成疾扶曵受拜數日而卒丁酉以梁王肜為太宰左光禄大夫何劭為司徒右光禄大夫劉寔為司空晉志左右光禄大夫假金章紫綬品秩第二禄賜班位冠幘車服佩玉置吏卒羽林後之金紫光禄大夫蓋魏晉之左右光禄大夫也但魏晉之大夫皆為專官後世則為寄禄官耳杜佑曰魏晉以來左右光禄三大夫皆銀印青綬其重者詔加金章紫綬者則謂之金紫光禄大夫重者既有金紫之號故謂本光禄為銀青光禄大夫太子遹之廢也將立淮南王允為太弟議者不合言有持異議者也㑹趙王倫廢賈后乃以允為驃騎將軍開府儀同三司領中䕶軍己亥相國倫矯詔遣尚書劉宏齎金屑酒賜賈后死于金墉城五月己巳詔立臨海王臧為皇太孫還妃王氏以母之太子之廢也歸王妃于父母家太子官屬即轉為太孫官屬相國倫行太孫太傅己卯謚故太子曰愍懷六月壬寅葬于顯平陵清河康王遐薨中䕶軍淮南王允性沈毅沈持林翻宿衛將士皆畏服之允知相國倫及孫秀有異志隂養死士謀討之倫秀深憚之秋八月轉允為太尉外示優崇實奪其兵權中䕶軍掌兵轉太尉則兵權去矣允稱疾不拜秀遣御史劉機逼允收其官屬以下劾以拒詔大逆不敬劾户槩翻又户得翻允視詔乃秀手書也大怒收御史將斬之御史走免斬其令史二人此蘭臺令史也厲色謂左右曰趙王欲破我家遂帥國兵及帳下七百人直出國兵淮南國兵也帳下中䕶軍帳下也帥讀曰率大呼曰呼火故翻趙王反我將討之從我者左袒於是歸之者甚衆允將赴宫尚書左丞王輿閉掖門宫門端門之左曰左掖門右曰右掖門允不得入遂圍相府時倫以東宫為相府允所將兵皆精銳將即亮翻倫與戰屢敗死者千餘人太子左率陳徽勒東宫兵鼓譟於内以應允左率即左衛率允結陳於承華門前弓弩齊發射倫飛矢雨下陳讀曰陣射而亦翻主書司馬眭袐以身蔽倫續漢志尚書三十六曹郎曹有三主書此主書司馬蓋相國府官屬倫所自署置眭息隨翻姓也箭中其背而死中竹仲翻下同倫官屬皆隱樹而立每樹輒中數百箭自辰至未中書令陳淮前有中書令陳準淮蓋準字之誤也徽之兄也欲應允言於帝曰宐遣白虎幡以解鬬白虎幡以麾軍進戰非以解鬬也陳準蓋以帝庸愚故請以白虎幡麾軍欲倫兵見之以為允之攻倫出於帝命將自潰也否則何以應允乃使司馬督䕶伏𦙍將騎四百持幡從宫中出司馬督䕶亦殿中將校屬二衛侍中汝隂王䖍在門下省隂與𦙍誓曰富貴當與卿共之𦙍乃懷空板出空板不書詔之板本無詔書而别取空板懷之以出也詐言有詔助淮南王允不之覺開陣内之下車受詔𦙍因殺之并殺允子秦王郁漢王廸坐允夷滅者數千人曲赦洛陽不普赦天下而獨赦洛陽故曰曲赦初孫秀嘗為小吏事黄門郎潘岳岳屢撻之孫秀琅邪人潘岳為琅邪内史秀為小吏給岳狡黠自喜岳惡其為人數撻辱之衛尉石崇之甥歐陽建素與相國倫有隙建表倫罪惡見上卷元康六年崇有愛妾曰緑珠緑珠善吹笛太平廣記曰今白州雙角山下有緑珠井昔梁氏之女有容貌石崇使交州以眞珠三斛買之梁氏之居舊井存焉汲飲者必誕美女里閭以美女無益遂以石填之孫秀使求之崇不與及淮南王允敗秀因稱石崇潘岳歐陽建奉允為亂收之隂考異曰崇傳曰崇建潜知其計勸淮南王允齊王冏圖趙王倫若崇果與允同謀允敗崇應惶懼不應被收時方宴于樓上葢倫秀以舊怨誣殺之耳今按石崇傳孫秀索緑珠崇不許秀怒乃勸倫誅崇崇正宴於樓上介士到門崇謂緑珠曰我今為爾得罪緑珠泣曰當效死于君前因自投於樓下而死崇歎曰奴輩利吾財爾收者曰知財為禍何不早散之崇不能答初潘岳母常誚責岳曰汝當知足而乾没不已乎葢戒岳乗時射利不知止也服䖍曰乾没射成敗也如淳曰得利為乾失利為没乾音干一說以水為喻也言其視利而趨雖乾而在陸没而滅頂皆所不顧也及敗岳謝母曰負阿母阿從安入聲遂與崇建皆族誅籍没崇家相國倫收淮南王母弟呉王晏欲殺之光禄大夫傅祗爭之於朝堂朝直遥翻衆皆諫止倫乃貶晏為賓徒縣王賔徒縣前漢屬遼西郡後漢屬遼東屬國都尉晉屬昌黎郡齊王冏以功遷游擊將軍晉志驍騎將軍游擊將軍並漢雜號將軍也魏置為中軍及晉以領䕶左右衛驍騎游擊為六軍冏意不滿有恨色孫秀覺之且憚其在内乃出為平東將軍鎮許昌為冏自許昌起兵討倫張本以光禄大夫陳準為太尉録尚書事未㡬薨孫秀議加相國倫九錫百官莫敢異議吏部尚書劉頌曰昔漢之錫魏魏之錫晉皆一時之用非可通行謂禪代然後有九錫非常典也周勃霍光其功至大皆不聞有九錫之命也謂周勃霍光定䇿以安漢室且不聞有九錫之命所以折倫秀之姦謀也張林積忿不已以頌為張華之黨將殺之孫秀曰殺張裴已傷時望不可復殺頌林乃止復扶又翻下同以頌為光禄大夫晉志光禄大夫與卿同秩中二千石著進賢兩梁冠黒介幘五時朝服佩水蒼玊考異曰三十國春秋云倫黨大怒謀害頌頌懼自殺頌傳云頌為光禄尋病卒今從傳遂下詔加倫九錫復加其子荂撫軍將軍撫軍將軍文帝以授武帝遂以代魏倫以加其世子意趣為何䖍中軍將軍武帝受禪置中軍將軍統宿衛七軍尋罷已而復置詡為侍中又加孫秀侍中輔國將軍相國司馬右率如故右率右衛率也不解此官者欲握東宫兵張林等並居顯要増相府兵為二萬人與宿衛同并所隱匿之兵數踰三萬九月改司徒為丞相以梁王肜為之肜固辭不受倫及諸子皆頑鄙無識秀狡黠貪淫黠下入翻所與共事者皆邪佞之士惟競榮利無逺謀深畧志趣乖異互相憎嫉秀子㑹為射聲校尉形貌短陋如奴僕之下者秀使尚帝女河東公主史言倫秀兵已在頸乃圖非望冬十一月甲子立皇后羊氏赦天下后尚書郎泰山羊𤣥之之女也外祖平南將軍樂安孫旂與孫秀善故秀立之拜𤣥之光禄大夫特進散騎常侍封興晉矦晉志光禄大夫假銀章青綬者品秩第三加特進則品秩與左右光禄大夫同矣晉置興晉郡在唐河州界詔徴益州刺史趙廞為大長秋廞許今翻以成都内史中山耿滕為益州刺史晉諸王國置内史猶漢王國相也武帝大康九年改諸王國相為内史考異曰帝紀作耿勝載記華陽國志作滕今從之廞賈后之姻親也聞徴甚懼懼以賈后親黨連坐且以晉室衰亂隂有據蜀之志乃傾倉廩賑流民以收衆心以李特兄弟材武其黨類皆巴西人與廞同郡李特黨類本巴氐趙廞亦巴西人也厚遇之以為爪牙特等憑恃廞埶專聚衆為盜蜀人患之特等入蜀事始上卷元康八年滕數宻表流民剛剽蜀人愞弱數所角翻剽匹妙翻愞奴亂翻主不能制客必為亂階宐使還本居若留之險地蜀地阻險恐秦雍之禍更移于梁益矣流民本居秦雍雍於用翻廞聞而惡之惡烏路翻州被詔書遣文武千餘人迎滕是時成都治少城益州治太城二城皆秦張儀所築儀既築太城後一年又築少城太城今成都府子城也少城唯西南北三壁東即太城之西墉也少詩照翻廞猶在太城未去滕欲入州功曹陳恂諫曰今州郡搆怨日深州謂益州郡謂成都此言廞滕搆怨也入城必有大禍不如留少城以觀其變檄諸縣合村保以備秦氐李特等本巴氐蜀人以其徙居秦州界因謂之秦氐陳西夷行至陳西夷謂西夷校尉陳總也行至言總來領西夷校尉之職行且至成都也晉置西夷校尉於汶山平越中郎將於廣州南蠻校尉于襄陽南夷校尉于寧州且當待之不然退保犍為西渡江源以防非常江源縣漢屬蜀郡後李雄分立江源郡晉改為多融縣又改為晉原縣唐蜀州之晉原青城唐安三縣皆漢江源縣地犍居言翻滕不從是日帥衆入州帥讀曰率下同廞遣兵逆之戰于西門滕敗死按考異曰華陽國志曰戰于廣漢宣化亭殺傳詔州郡俱治成都不容戰于廣漢又趙廞若已與滕戰不應欲直入州今從載記郡吏皆竄走惟陳恂面縛詣廞請滕死請其屍而𦵏之死讀曰屍廞義而許之廞又遣兵逆西夷校尉陳摠摠至江陽江陽縣漢屬犍為郡劉璋分江陽郡唐瀘州瀘川綿水二縣漢江陽之地也聞廞有異志主簿蜀郡趙模曰今州郡不協必生大變當速行赴之府是兵要助順討逆言西夷府摠蜀兵之要順謂耿滕逆謂趙廞使摠助滕討廞也誰敢動者摠更縁道停留比至南安魚涪津南安縣屬犍為郡有魚涪津唐睂州青神縣漢南安縣地宋白曰榮州應靈縣資官縣嘉州龍川縣皆漢安南縣比音必寐翻涪音浮已遇廞軍模白摠散財募士以拒戰若克州軍則州可得言破廞軍則益州可取罪人斯得矣不克順流而退必無害也言順流而退廞軍埶不能追必無所害摠曰趙益州忿耿矦故殺之與吾無嫌何為如此兵臨其前猶發是言陳摠特庸人耳模曰今州起事必當殺君以立威雖不戰無益也言至垂涕摠不聽衆遂自潰摠逃草中模著摠服格戰著陟畧翻廞兵殺模見其非是更搜求得摠殺之搜尋也宻考異曰帝紀廞又殺犍為太守李汶山太守霍固按華陽國志犍為太守李苾汶山太守楊邠非宻固也載記亦作李苾蓋紀誤廞自稱大都督大將軍益州牧平考異曰晉春秋云建號太元年他書無之今不取署置僚屬改易守令王官被召無敢不徃王官謂晉朝所命者被皮義翻李庠帥妹壻李含天水任回上官晶扶風李攀始平費他帥讀曰率楊正衡曰晶音精武帝泰始二年分扶風置始平郡費扶沸翻他徒河翻氐苻成隗伯等四千騎歸廞廞以庠為威寇將軍沈約志威寇將軍四十號之第七封陽泉亭矦委以心膂使招合六郡壯勇至萬餘人以斷北道六郡即天水畧陽等六郡壯勇流民之壯勇者北道自關中入蜀之道斷丁管翻資治通鑑卷八十三
