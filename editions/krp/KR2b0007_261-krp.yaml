body:
  text: 資治通鑑卷二百六十一宋司馬光撰胡三省音註唐紀七十七起彊圉大荒落盡屠維協洽凡三年昭宗聖穆景文孝皇帝中之上乾寧四年春正月甲申韓建奏防城將張行思等張行思華州防城將也將即亮翻告睦濟韶通彭韓儀陳八王皆嗣王也睦韶韓代宗之後彭肅宗之後陳文宗之後史皆逸其名及其世系謀殺臣刼車駕幸河中建惡諸王典兵惡烏路翻故使行思等告之上大驚召建諭之建稱疾不入令諸王詣建自陳建表稱諸王忽詣臣理所不測事端建言諸王為變事出不測也臣詳酌事體不應與諸王相見又稱諸王當自避嫌疑不可輕為舉措陛下若以友愛含容請依舊制令歸十六宅妙選師傅教以詩書不令典兵預政援開元天實舊制不令諸王出閭且曰乞散彼烏合之兵用光麟趾之化詩序曰闗雎之化行雖衰世之公子皆信厚如麟趾之時建慮上不從引麾下精兵圍行宫以兵脇君表疏連上上時掌翻上不得已是夕詔諸王所領軍士並縱歸田里諸王勒歸十六宅其甲兵並委韓建収掌建又奏陛下選賢任能足清禍亂何必别置殿後四軍四軍即安聖捧宸保寧宣化也置見上卷上年顯有厚薄之恩乖無偏無黨之道書曰無編無黨王道蕩蕩韓建安識書語李巨川教之耳宜其不免於誅也一本厚下更有有字且所聚皆坊市無賴姧猾之徒平居猶思禍變臨難必不為用難乃旦翻而使之張弓挾刅密邇皇輿臣竊寒心乞皆罷詔亦從之於是殿後四軍二萬餘人悉散天子之親軍盡矣捧日都頭李筠石門扈從功第一石門扈從事見上卷二年從才用翻建復奏斬於大雲橋復扶又翻大雲橋在華州大雲寺前武后時令天下諸州各置大雲寺以藏大雲經皆受命之符也建又奏𤣥宗之末永王璘暫出江南遽謀不軌事見肅宗紀至徳元載二載代宗時吐蕃入寇光啓中朱玫亂常皆援立宗支以繫人望謂吐蕃立廣武王承宏朱玫立襄王煴也事各見前紀援于元翻今諸王銜命四方者乞皆召還指言延王戒丕等又奏諸方士出入禁庭眩惑聖聰宜皆禁止無得入宫指言許巖士等詔悉從之建既幽諸王於别第知上意不悦乃奏請立徳王為太子欲以解之丁亥詔立徳王祐為皇太子仍更名裕更工衡翻錄考異曰勤王曰公以儲副之設國之大本上表云云敕宜從允時正月十一日也當四日之間而儲君奉冢祀宗室歸藩邸蓬頭突鬢之士不入于禁門文成五利之徒不陳其左道君父開悟遐邇詠歌人不震驚市無易肆公之力也李巨川著書矯誣善惡乃至於此今從實錄龎師古葛從周併兵攻鄆州朱瑄兵少食盡不復出戰但引水為深壕以自固辛卯師古等營於水西南命為浮梁癸巳潛決濠水丙申浮梁成師古夜以中軍先濟瑄聞之弃城奔中都按九域志中都縣在鄆州東南六十里葛從周逐之野人執瑄及妻子以獻僖宗中和二年朱瑄得鄆州至是而亡次考異曰薛居正五代史梁太祖紀辛卯營于濟水之龎師古令諸將撤木為橋乙未夜師古以中軍先濟朱瑄弃壁夜走葛從周擒瑄并妻男以獻按濟水自王莽時大旱不復能絶河而南自是河南無濟水編遺錄曰五月遣騎於鄆州軍前追從周徑徃洹水董師以代矦言師古留攻鄆梁太祖實錄四年正月復以洹水之師大舉伐鄆十五日辛卯營其西南河外龎師古命諸將撤木為橋以圖宵濟癸巳前軍以心膂百人盜决河口甲午浮橋集水次乙未夜師古中軍先濟聲振壁内朱瑄聞之弃壁走編遺錄四年正月己卯朱瑄兵少糧盡不敢出戰然深溝高壘難越也從周師古乃取清河内小舟採野葛草茅索之以為巨纜乃於其牆南建浮橋丙申功就我師渡橋朱瑄奔遁皆不云濟水師古去年三月已敗鄆兵于馬頰追至西門據故洛亭子為寨乙未夜先濟葢鄆城下清河水疑朱瑄引之以環城固守故師古等為浮橋以濟師河既可决明非自然之水也舊紀癸未龎師古陷鄆州朱瑄與妻榮氏潰圍走瑄至中都為野人所殺榮氏俘於軍新紀丙申全忠陷鄆州實錄二月丙午朔陷鄆州瑄至中都為亂兵所殺妻榮至汴為尼據薛史辛卯營於濟水則癸未鄆未破也新紀云丙申陷鄆實錄二月葢約奏到今從編遺錄新紀己亥罷孫偓鳯翔四面行營節度等使赦李茂貞故罷鳯翔西面行營以副都統李思諫為寧塞節度使按方鎮表光化元年更延州保塞節度為寧塞節度錢鏐使行軍司馬杜稜救婺州安仁義移兵攻睦州不克而還安仁義攻婺州見上卷上年還從宣翻又如字朱全忠入鄆州以龎師古為天平留後代考異曰舊紀梁大祖實錄薛居正五史師古傳皆云師古為鄆州留後編遺錄薛史梁紀皆云友裕按編遺錄三月丙子以友裕為鄆州留後師古為徐州留後葢初以師古守鄆州後以友裕代之而徙師古於徐州也朱瑾留大將康懐貞守兖州與河東將史儼李承嗣掠徐州之境以給軍食九域志兖州南一百一十里即徐州界全忠聞之遣葛從周將兵襲兖州懐貞聞鄆州已失守汴兵奄至遂降二月戊申從周入兖州獲瑾妻子朱瑾還無所歸帥其衆趨沂州刺史尹處賔不納走保海州降户江翻帥讀曰率趨七喻翻九域志兖州三百四十五里東至沂州沂古琅邪也沂州東至海州一百八十里為汴兵所逼與史儼李承嗣擁州民度淮奔楊行密光啓二年朱瑾取兖州至是而敗行密逆之於髙郵表瑾領武寧節度使領遙領也全忠納瑾之妻引兵還張夫人逆於封丘九域志封丘縣在汴州北六十里全忠以得瑾妻告之夫人請見之瑾妻拜夫人答拜且泣曰兖鄆與司空同姓約為兄弟以小故恨望起兵相攻使吾姒辱於此它日汴州失守吾亦如吾姒之今日乎姒詳里翻長婦曰姒又兄弟之妻相呼曰姒互相尊稱之辭也全忠乃送瑾妻於佛寺為尼斬朱瑄于汴橋于是鄆齊曹棣兖沂密徐宿陳許鄭滑濮皆入于全忠鄆齊曹棣天平軍兖沂密泰寧軍徐宿感化軍陳許忠武軍鄭滑濮宣義軍此五鎮之地也惟王師範保淄青一道亦服於全忠李存信在魏州聞兖鄆皆陷引兵還淮南舊善水戰不知騎射及得河東兖鄆兵軍聲大振史儼李承嗣皆河東驍將李克用深惜之遣使間道詣楊行密請之間古莧翻行密許之亦遣使詣克用修好好呼到翻戊午王建遣卭州刺史華洪彭州刺史王宗祐將兵五萬攻東川卭渠容翻華户化翻以戎州刺史王宗謹為鳯翔西面行營先鋒使敗鳯翔將李繼徽等於𤣥武𤣥武漢氐道縣晉改曰𤣥武唐初屬益州時屬梓州宋朝改曰中江在梓州西九十里敗蒲邁翻繼徽本姓楊名崇本茂貞之假子也己未赦天下音考異曰實錄降徳曲赦天下云徳音即非赦既云曲赦即不及天下實錄誤也上饗行廟時駐蹕華州太常禮院請權立行廟以備告饗庚申王建以决雲都知兵馬使王宗侃為應援開峽都指揮使將兵八千趨渝州决勝都知兵馬使王宗阮為開江防送進奉使將兵七千趨瀘州辛酉宗侃取渝州降刺史牟崇厚癸酉宗阮拔瀘州斬刺史馬敬儒峽路始通渝瀘皆東川巡屬王建志在廣地假通峽路進奉以為名耳趨七喻翻鳯翔將李繼昭救梓州留偏將守劔門西川將王宗播撃擒之乙亥門下侍郎同平章事孫偓罷守本官中書侍郎同平章事朱朴罷為袐書監朴既秉政所言皆不效朱朴自詭月餘可致太平見上卷上年外議沸騰太子詹事馬道殷以天文將作監許巖士以毉得幸於上韓建誣二人以罪而殺之且言偓朴與二人交通故罷相馬道殷許巖士在上左右二相因之以白事此必有之詔以楊行密為江南諸道行營都統以討武昌節度使杜洪按新書洪傳洪附朱全忠絶東南貢獻路命楊行密討之者以此張佶克邵州擒蔣勛潭兵攻蔣勛事始上卷三年正月佶巨乙翻三月丙子朱全忠表曹州刺史葛從周為泰寧留後朱友裕為天平留後龎師古為武寧留後朱全忠表以三鎮授三將以樹黨此時葢復改感化為武寧保義節度使王珙攻䕶國節度使王珂珂求援於李克用珙求援於朱全忠宣武將張存敬楊師厚敗河中兵於猗氏南河東將李嗣昭敗陜兵於猗氏又敗之於張店遂解河中之圍敗補邁翻陜失冉翻師厚斤溝人九域志穎州萬夀縣有斤溝鎮萬夀唐汝隂縣之百口鎮也宋朝開寳六年置縣嗣昭克用弟克柔之假子也更名感義軍曰昭武更工衡翻治利州以前静難節度使蘇文建為節度使難乃旦翻夏四月以同州防禦使李繼瑭為匡國節度使匡考異曰實錄賜同州號國軍以防禦使李繼塘為匡國節度使按新方鎮表乾寧二年賜同州號匡國軍王行約已嘗為匡國節度使葢行約死繼瑭但為防禦使今始復舊名耳繼瑭茂貞之養子也以右諫議大夫李洵為兩川宣諭使和解王建及顧彦暉辛亥錢鏐遣顧全武等將兵三千自海道救嘉興己未至城下擊淮南兵大破之淮南圍嘉興始上卷二年杜洪為楊行密所攻求救於朱全忠全忠遣其將聶金掠泗州聶尼輒翻姓也朱友恭攻黄州行密遣右黒雲都指揮使馬珣等救黄州黄州刺史瞿章聞友恭至弃城擁衆南保武昌寨武昌漢古縣唐屬鄂州九域志在州東北一百八十里今置夀昌軍癸亥兩浙將顧全武等破淮南十八營虜淮南將士魏約等三千人淮南將田頵屯驛亭埭埭徒耐翻兩浙兵乘勝逐之甲戌頵自湖州奔還自嘉興退軍取道湖州還宣州兩浙兵追敗之敗補邁翻頵衆死者千餘人韓建惡刑部尚書張禕等數人皆誣奏貶之惡烏路翻禕吁韋翻考異曰實錄貶刑部尚書張禕趙崇蘇循等為衡州司馬韓建惡之誣奏貶焉禕等必不皆為刑部尚書皆貶衡州司馬實錄誤也五月加奉國節度使崔洪同平章事辛巳朱友恭為浮梁於樊港武昌西三里有樊山山下有樊溪注于江謂之樊口朱友恭葢跨江為浮梁抵樊口以攻武昌也進攻武昌寨壬午拔之執瞿章遂取黄州使考異曰薛居正五代史梁紀五月丁丑朱友恭遣上言大破淮冦於􅐥昌収復黄鄂二州新紀壬午全忠陷黄州刺史瞿章死之朱友恭傳云瞿章十國紀年作瞿章吳錄云執刺史瞿章當可据馬珣等皆敗走丙戍王建以節度副使張琳守成都張琳王建之腹心建之攻陳敬瑄也亦使之守卭州自將兵五萬攻東川更華洪姓名曰王宗滌華洪累戰有功王建於是養以為子以収其力用然殺洪之心葢已萌於此時矣華户化翻六月己酉錢鏐如越州受鎮東節鉞李茂貞表王建攻東川連兵累嵗不聴詔命王建豈特攻東川哉李茂貞山南巡屬諸州建取之亦多矣力不能制欲挾天子之令以臨之甲寅貶建南州刺史新志武徳三年開黔南蠻置南州宋白曰南州戰國時為巴國界秦則巴郡之地漢為江州之境唐武徳三年割渝州之東界置南州乙卯以茂貞為西川節度使以覃王嗣周為鳯翔節度使癸亥王建克梓州南寨執其將李繼寧丙寅宣諭使李洵至梓州四月李洵受命而使六月始至己巳見建于張杷砦建指執旗者曰戰士之情不可奪也覃王赴鎮李茂貞不受代李茂貞之狡悍豈肯以鳯翔授人涉險而争蜀邪圍覃王於奉天置寧逺軍於容州以李克用大將葢寓領節度使李克用之平王行瑜也葢寓以功領容管觀察使今升領節度使秋七月加荆南節度使成汭兼侍中韓建移書李茂貞茂貞解奉天之圍覃王歸華州以天雄節度使李繼徽為静難節度使李繼徽自秦州徙邠州邠寧亦為李茂貞有矣難乃旦翻庚戍錢鏐還杭州自越還杭遣顧全武取蘇州乙未拔松江松江在蘇州南四十里淮南立寨以守之戊戌拔無錫無錫漢縣唐屬常州九域志在州東九十一里辛丑拔常熟華亭宋白曰常熟縣後漢至吳為司鹽都尉晉置南沙縣梁置常熟縣今崑山縣東一百三十里常熟故城是也九域志在蘇州北七十五里天寳十載分嘉興置華亭縣屬蘇州在州西南今屬秀州初李克用取幽州見二百五十九卷乾寧元年表劉仁恭為節度使留戌兵及腹心將十人典其機要租賦供軍之外悉輸晉陽及上幸華州克用徴兵於仁恭又遺成徳節度使王鎔義武節度使王郜書遺唯季翻郜音告欲與之共定闗中奉天子還長安仁恭辭以契丹入寇洪遵曰契丹之讀如喫惟新唐書有音今從欺訖翻須兵扞禦請俟虜退然後承命克用屢趣之趣讀日促使者相繼數月兵不出克用移書責之仁恭抵書於地慢罵囚其使者欲殺河東戍將戍將遁逃獲免克用留兵戍幽州見上卷乾寧二年克用大怒八月自將擊仁恭為克用計者先舉河東之甲以勤王事定之後然後移兵臨燕以問罪劉仁恭安所逃其死乎不知出此遽興忿兵其敗宜矣上欲幸奉天親討李茂貞令宰相議之宰相切諫乃止議者率謂昭宗忿不思難然亦可悲矣延王戒丕還自晉陽戒丕使晉陽見上卷上年韓建奏自陛下即位以來與近輔交惡近輔邠岐同華也皆因諸王典兵凶徒樂禍樂音洛致鑾輿不安比者臣奏罷兵權比毗至翻近也實慮不測之變今聞延王覃王尚苞隂計願陛下聖㫁不疑㫁丁亂翻制於未亂周書云制治於未亂建奏引之李巨川之辭也則社稷之福韓建欲殺諸王久矣憚李克用故未敢發延王既還知克用之兵不能至故决請殺之上曰何至於是數日不報建乃與知樞密劉季述矯制發兵圍十六宅諸王被髪或緣垣或升屋呼曰宅家救兒被皮義翻呼火故翻唐末宫中率稱天子曰宅家建擁通沂睦濟韶彭韓陳覃延丹十一王至石隄谷盡殺之石隄谷在華州西歐陽脩集古錄云殽阬君祠今謂之五部神廟其象有石隄西戍樹谷五樓先生東臺御史王剪將軍莫曉其義其碑云石隄樹谷南通商雒又云前世通利吏民興貴有御史大夫將軍牧伯故為立祠以報其功乃知五部之號自漢有之如此則石隄者石隄谷之神五部神之一也唐韓建殺諸王於石隄谷葢此谷也殽阬神祠在華州鄭縣考異曰舊紀是日通覃以下十一王并其侍者皆為建兵所擁至石隄谷無長少皆殺之唐補紀曰六宅諸王准前商量請置殿後都韓建怨怒進狀争論與諸王互説短長上乃縛韓王克良已下十人送韓建府建以棘刺圍於大㕔經宿不與相見軍吏諫遂請諸王歸宫散却殿後都新紀八月韓建殺通王滋沂王湮韶王彭王嗣韓王嗣陳王嗣覃王嗣周嗣延王戒丕嗣丹王允按舊紀韓建奏睦王濟王韶王通王彭王韓王儀王陳王八人新宗室傳初帝遣嗣延王戒丕嗣丹王允徃見李克用又有覃王嗣周則是十一人新紀傳儀作沂按昭宗子禋封沂王不應更封宗室舊紀儀禋恐可据以謀反聞貶禮部尚書孫偓為南州司馬祕書監朱朴先貶夔州司馬再貶郴州司户朴考異曰實錄貶郴州司户薛廷珪鳯閣書詞有朴自祕書監責除蜀王傅分司東都制云苞藏莫顧於朝綱進見不由於相府復云猶希顧問之間來撓澄清之化又貶渠州司馬制云争臣條奏憲府極言指陳負固之謀忿嫉崇姦之計與此稍異今從實錄朴之為相何迎驟遷至右諌議大夫至是亦貶湖州司馬何迎薦朱朴見上卷上年鍾傳欲討吉州刺史襄陽周琲琲帥其衆奔廣陵琲部凂翻又蒲昧翻帥讀曰率王建與顧彦暉五十餘戰九月癸酉朔圍梓州蜀州刺史周徳權言於建曰公與彦暉争東川三年士卒疲於矢石百姓困於輸輓輓音晩東川羣盜多據州縣彦暉懦而無謀欲為偷安之計皆啗以厚利啗徒監翻恃其救援故堅守不下今若遣人諭賊帥以禍福帥所類翻來者賞之以官不服者威之以兵則彼之所恃反為我用矣建從之彦暉勢益孤徳權許州人也丁丑李克用至安塞軍安塞軍在蔚州之東媯州之西新志幽州丁零川西南有安塞軍辛巳攻之幽州將單可及引騎兵至單上演翻姓也又都寒翻亦姓也元魏孝文帝改代北内入諸渇單氏為單氏克用方飲酒前鋒白賊至矣克用醉曰仁恭何在對曰但見可及輩克用瞋目曰瞋昌真翻可及輩何足為敵亟命撃之是日大霧不辨人物幽州將楊師侃伏兵於木𤓰澗據新書木𤓰澗亦在蔚州界河東兵大敗失亡大半史言李克用輕敵又不得天時故敗㑹大風雨震電幽州兵解去史言克用敗而得免者亦天也克用醒而後知敗責大將李存信等曰吾以醉廢事汝曹何不力争邢州之叛莘縣之潰木𤓰澗之敗皆李存信之罪也克用終親任之可謂失刑矣湖州刺史李彦徽欲以州附於楊行密去年楊行密表彦徽知湖州故欲附之其衆不從彦徽奔廣陵都指揮使沈攸以州歸錢鏐錢鏐自此遂有湖州以彰義節度使張璉為鳯翔西北行營招討使以討李茂貞復以王建為西川節度使同平章事加義武節度使王郜同平章事削奪新西川節度使李茂貞官爵復姓名宋文通始以李茂貞之請而討王建既而又以茂貞拒命赦王建而討茂貞朝廷號令朝出而暮改諸侯其孰尊而信之皇威不振自取之也李茂貞賜姓名見二百五十六卷光啓二年朱全忠既得兖鄆甲兵益盛乃大舉擊楊行密遣龎師古以徐宿宋滑之兵七萬壁清口清口即今之清河口將趨揚州趨七喻翻下同葛從周以兖鄆曹濮之兵壁安豐將趨夀州安豐漢六縣故城在縣南後漢置安豐縣至唐屬夀州九域志曰安豐縣在州東南六十餘里葢唐之夀州治夀春縣即六朝夀陽之地五代之末周世宗克夀州徙治下蔡故宋朝安豐在夀州東南全忠自將屯宿州淮南震恐匡國節度使李繼瑭聞朝廷討李茂貞而懼韓建復從而搖之復扶又翻繼瑭奔鳯翔冬十月以建為鎮國匡國兩軍節度使韓建始兼有同華壬子知遂州侯紹帥衆二萬乙卯知合州王仁威帥衆千人戊午鳯翔李繼溥以援兵二千皆降于王建帥讀曰率建攻梓州益急庚申顧彦暉聚其宗族及假子共飲遣王宗弼自歸于建王宗弼為東川兵所擒事見上卷二年酒酣命其假子瑤殺已及同飲者然後自殺僖宗光啓三年顧彦朗得東川傳至弟彦暉至是而滅建入梓州乾寧二年王建始攻東川葢三年而後克之城中兵尚七萬人建命王宗綰分兵徇昌普等州以王宗滌為東川留後劉仁恭奏稱李克用無故稱兵見討本道大破其黨于木𤓰澗請自為統帥以討克用帥所類翻詔不許又遺朱全忠書遺唯季翻全忠奏加仁恭同平章事朝廷從之仁恭又遣使謝克用陳去就不自安之意克用復書略曰今公仗鉞控兵理民立法擢士則欲其報徳選將則望彼酬恩已尚不然人何足信克用言仁恭背已人亦將背之也將即亮翻僕料猜忌出於骨肉嫌忌生於屏帷持干將而不敢授人捧盟盤而何詞著誓甲子立皇子祕為景王祚為輝王祺為祁王加彰義節度使張璉同平章事楊行密與朱瑾將兵三萬拒汴軍於楚州别將張訓自漣水引兵㑹之乾寧二年楊行密始取漣水令張訓守之行密以為前鋒龎師古營於清口或曰營地汙下不可久處不聴汙烏𤓰翻處昌吕翻師古恃衆輕敵居常奕棊朱瑾壅淮上流欲灌之或以告師古師古以為惑衆斬之十一月癸酉瑾與淮南將侯瓉瓉才旱翻將五千騎潛度淮用汴人旗幟自北來趣其中軍趣七喻翻張訓踰柵而入士卒蒼黄拒戰淮水大至汴軍駭亂行密引大軍濟淮與瑾等夾攻之汴軍大敗斬師古及將士首萬餘級餘衆皆潰葛從周營於夀州西北夀州團練使朱延夀擊破之退屯濠州聞師古敗奔還行密瑾延夀乘勝追之及於渒水水經注渒水出廬江潛縣西南霍山東北又東北過六縣東又西北過安豐縣故城西北入于淮類篇渒必至切水名在弋陽按今渒河在來逺鎮西十里來逺鎮即東正陽也東至夀州二百里從周半濟淮南兵擊之殺溺殆盡從周走免遏後都指揮使牛存節弃馬步鬭諸軍稍得濟淮凡四日不食㑹大雪汴卒緣道凍餒死還者不滿千人全忠聞敗亦奔還行密遺全忠書曰龎師古葛從周非敵也公宜自來淮上决戰遺于季翻行密大㑹諸將謂行軍副使李承嗣曰始吾欲先趣夀州趣七喻翻副使云不如先向清口師古敗從周自走今果如所料賞之錢萬緡賞其勝算先定表承嗣領鎮海節度使行密待承嗣及史儼甚厚第舍姬妾咸選其尤者賜之故二人為行密盡力屢立功竟卒於淮南為于偽翻卒于恤翻史言楊行密能用人安仁義亦涉陁也行密待之非不厚而終叛於行密狼子野心固自有難馴養者行密由是遂保據江淮之間全忠不能與之争戊寅立淑妃何氏為皇后后東川人生徳王輝王威武節度使王潮弟審知為觀察副使有過潮猶加捶撻捶止橤翻審知無怨色潮寢疾捨其子延興延虹延豐延休命審知知軍府事十二月丁未潮薨審知以讓其兄泉州刺史審邽審邽以審知有功辭不受審知自稱福建留後表于朝廷壬戌王建自梓州還戊辰至成都是嵗南詔驃信舜化有上皇帝書函及督爽牒中書木夾年號中興朝廷欲以詔書報之王建上言南詔小夷不足辱詔書臣在西南彼必不敢犯塞從之黎雅間有淺蠻曰劉王郝王楊王各有部落黎雅西南大山長谷皆蠻居之所在深逺而三王部落居近漢界故曰淺蠻西川嵗賜繒帛三千匹使覘南詔亦受南詔賂詗成都虛實繒慈陵翻覘丑廉翻又丑艶翻詗古迥翻又翾正翻毎節度使到官三王帥酋長詣府帥讀曰率酋慈由翻長知兩翻節度使自謂威徳所致表于朝廷而三王隂與大將相表裏節度使或失大將心則教諸蠻紛擾先是節度使多文臣先悉薦翻不欲生事故大將常藉此以邀姑息而南詔亦憑之屢為邊患及王建鎮西川絶其舊賜斬都押牙山行章以懲之山行章陳田舊將王建因其與淺蠻表裏而斬之既以威示諸蠻亦除舊務盡卭崍之南不置障候不戍一卒謂卭崍闗以南也蠻亦不敢侵盜其後遣王宗播擊南詔三王漏洩軍事召而斬之史言安邊之術惟洞知近塞蕃落情偽而折其姦則外夷不敢有所侮而動右拾遺張道古上疏稱國家有五危二亂昔漢文帝即位未幾明習國家事幾居豈翻見十三卷漢文帝元年今陛下登極已十年帝文徳元年踐阼至此十年若以即位踰年改元數之則九年而曽不知為君馭臣之道太宗内安中原外開四夷海表之國莫不入臣今先朝封域日蹙幾盡幾居依翻臣雖微賤竊傷陛下朝廷社稷始為姧臣所㺯終為賊臣所有也漢唐之亡誠如張道古之言上怒貶道古施州司户宋白曰施州漢巫縣地吳大帝分巫縣立沙渠縣後周建徳三年於此置施州唐因之舊志施州京師南二千七百九里仍下詔罪狀道古宣示諫官昭宗處艱危之中猶罪言者其亡宜矣道古青州人也張道古見於通鑑者惟此事著其州里葢傷之光化元年是年八月還京方改元春正月兩浙江西武昌淄青各遣使詣闕請以朱全忠為都統討楊行密兩浙錢鏐江西鍾傳武昌杜洪淄青王師範皆憚楊行密之强而黨附朱全忠者也詔不許加平盧節度使王師範同平章事淄青平盧軍以兵部尚書劉崇望同平章事充東川節度使以昭信防禦使馮行襲為昭信節度使方鎮表光化元年置昭信防禦使治金州與此異上下詔罪已息兵復李茂貞姓名官爵應諸道討鳯翔兵皆罷之韓建之志也壬辰河中節度使王珂親迎於晉陽迎魚敬翻李克用遣其將李嗣昭守河中李茂貞韓建皆致書於李克用言大駕出幸累年乞修和好好呼到翻同奬王室兼乞丁匠助修宫室克用許之初王建攻東川顧彦暉求救於李茂貞茂貞命將出兵救之事見上不暇東逼乘輿詐稱改過與韓建共翼戴天子又聞朱全忠營洛陽宫累表迎車駕茂貞韓建懼請修復宫闕奉上歸長安詔以韓建為修宫闕使所考異曰實錄建以行宫卑庳無眺覽之表獻城南别墅建初修南莊起樓觀䟽池沼欲為南内行廢立之事其叔父豐見其跋扈謂建曰汝陳許間一民乘時危亂位至方鎮不能感君父之惠而欲以同華兩州百里之地行廢立覆族在旦莫矣吾不如先自裁免為汝所累由是建稍弭其志及李茂貞表請助營宫苑又聞朱全忠繕治洛陽累表迎駕建懼故急營葺長安率諸道助役而又親程功焉按建若欲廢立何必先營南内今不取諸道皆助錢及工材建使都將蔡敬思督其役既成二月建自徃視之錢鏐請徙鎮海軍於杭州從之鎮海軍木治潤州今徙軍額於杭州復以李茂貞為鳯翔節度使三月己丑以王審知充威武留後朱全忠遣副使萬年韋震入奏事求兼鎮天平朝廷未之許震力争之穆敬以後威令已不振然藩鎮所遣奏事官不敢力争於朝也朝廷不得已以全忠為宣武宣義天平三鎮節度使全忠以震為天平留後以前台州刺史李振為天平節度副使按歐史李振傳振為金吾衛將軍拜台州刺史盜起浙東不果行乃西歸過汴以策于朱全忠全忠留之遂為全忠用振抱真之曽孫也代徳之間李抱真鎮昭義有大功淮南將周本救蘇州兩浙將顧全武擊破之淮南將秦裴以兵三千人拔崑山而戍之崑山漢婁縣地梁分婁縣置信義縣又分信義置崑山縣取縣界崑山為名唐屬蘇州九域志在州東七十里以潭州刺史判湖南軍府事馬殷知武安留後時湖南管内七州賊帥楊師逺據衡州唐世旻據永州蔡結據道州陳彦謙據郴州魯景仁據連州路振九國志唐旻蔡結皆以郡人聚兵據郡陳彦謙桂陽人殺刺史黄岳據郴州魯景仁本從黄巢以病留連州遂據之帥所類翻郴丑林翻殷所得惟潭邵而已為馬殷盡取諸州張本義昌節度使盧彦威性殘虐又不禮於鄰道與盧龍節度使劉仁恭争鹽利仁恭遣其子守文將兵襲滄州彦威弃城挈家奔魏州羅𢎞信不納乃奔汴州光啓元年盧彦威得滄景至是而亡仁恭遂取滄景徳三州以守文為義昌留後仁恭兵勢益盛併幽滄兩鎮之兵故勢益盛自謂得天助有併吞河朔之志為守文請旌節為于偽翻下為吾同朝廷未許㑹中使至范陽仁恭語之曰語牛倨翻旌節吾自有之但欲得長安本色耳何為累章見拒為吾言之其悖慢如此悖蒲内翻又蒲沒翻朱全忠與劉仁恭修好好呼到翻㑹魏博兵擊李克用夏四月丁未全忠至鉅鹿城下敗河東兵萬餘人逐北至青山口五代志邢州龍岡縣隋文帝開皇十六年置青山縣煬帝大業初省入龍岡敗補邁翻以䕶國節度使王珂兼侍中珂丘何翻丁卯朱全忠遣葛從周分兵攻洺州戊辰拔之斬刺史邢善益五月己巳朔赦天下葛從周攻邢州刺史馬師素弃城走辛未磁州刺史袁奉滔自剄全忠以從周為昭義留後守邢洺磁三州而還并汴自此嵗争邢洺磁三州以武定節度使李繼密為山南西道節度使李繼密自洋州徙興元朝廷聞王建已用王宗滌為東川留後乃召劉崇望還為兵部尚書仍以宗滌為留後湖南將姚彦章言於馬殷請取衡永道連郴五州仍薦李瓊為將殷以瓊及秦彦睴為嶺北七州游奕使張圖英李唐副之五州併潭邵為七將兵攻衡州斬楊師逺引兵趣永州趣七喻翻圍之月餘唐世旻走死殷以李唐為永州刺史六月以濠州刺史趙珝為忠武節度使珝犨之弟也珝况羽翻犨昌牛翻秋七月加武貞節度使雷滿同平章事方鎮表光化元年置武貞節度領澧朗溆三州治澧州加鎮南節度使鍾傳兼侍中忠義節度使趙匡凝聞朱全忠有清口之敗忠義軍山南東道清口之敗見去年十一月隂附於楊行密全忠遣宿州刺史尉氏氏叔琮將兵伐之丙申拔唐州擒隨州刺史趙匡璘敗襄州兵於鄧城敗補邁翻八月庚戍改華州為興徳府以車駕駐蹕故也戊午汴將康懐貞襲鄧州克之擒刺史國湘趙匡凝懼遣使請服於朱全忠全忠許之為朱全忠再攻趙匡凝張本己未車駕發華州壬戌至長安甲子赦天下改元改元光化上欲藩鎮相與輯睦以太子賔客張有孚為河東汴州宣慰使賜李克用朱全忠詔又令宰相與之書使之和解克用欲奉詔而恥於先自屈乃致書王鎔使通於全忠全忠不從朱全忠兵力方强故不從九月乙亥加韓建守太傅興徳尹先是上駐蹕華州因以華州為興徳府加王鎔兼中書令羅𢎞信守侍中己丑東川留後王宗滌言於王建以東川封疆五千里文移徃還動踰數月請分遂合瀘渝昌五州别為一鎮建表言之顧全武攻蘇州城中及援兵食皆盡甲申淮南所署蘇州刺史臺濛弃城走金城湯池非粟不守臺濛雖淮南良將奈之何哉援兵亦遁全武克蘇州乾寧三年淮南陷蘇州今果如顧全武之言而復之追敗周本等于望亭九域志常州無錫縣有望亭鎮在蘇州北四十五里又四十五里至無錫敗補邁翻獨秦裴守崑山不下全武帥萬餘人攻之帥讀曰率裴屢出戰使病者被甲執矛壯者彀弓弩全武每為之却見其弓弩之力及逺故為之却彀居侯翻為于偽翻全武檄裴令降降户江翻下同全武嘗為僧裴封函納款全武喜召諸將發函乃佛經一卷全武大慙曰裴不憂死何暇戲予益兵攻城引水灌之城壊食盡裴乃降錢鏐設千人饌以待之饌雛晥翻又雛戀翻乃出乃當作及羸兵不滿百人觀通鑑上文秦裴以三千人取崑山而守之及其降也羸兵不滿百人則其兵死於戰守者殆盡其存者僅三十之一耳鏐怒曰單弱如此何敢久為旅拒旅衆也怙衆而拒捍曰旅拒對曰裴義不負楊公今力屈而降耳非心降也鏐善其言顧全武亦勸鏐宥之鏐從之時人稱全武長者顧全武甚識而度所以能佐錢鏐保據一方長知兩翻魏博節度使羅𢎞信薨薛考異曰居正五代史梁紀𢎞信傳太祖紀年錄皆云𢎞信八月卒按八月昭宗還京𢎞信猶加官舊紀傳九月卒今從之實錄十月約奏到也軍中推其子節度副使紹威知留後汴將朱友恭將兵還自江淮過安州朱友恭克黄州還過安州九域志黄州西至安州三百里或告刺史武瑜潛與淮南通謀取汴軍冬十月己亥友恭攻而殺之李克用遣其將李嗣昭周徳威將步騎二萬出青山將復山東三州山東三州邢洺磁也是年五月葛從周取之壬寅進攻邢州葛從周出戰大破之嗣昭等引兵退入青山從周追之將扼其歸路步兵自潰嗣昭不能制㑹横衝都將李嗣源以所部兵至薛史明宗紀曰羅𢎞信襲破李存信於萃縣帝奮命殿軍而還武皇嘉其功即以所屬五百騎號曰横衝都謂嗣昭曰吾輩亦去則勢不可支矣我試為公擊之為于偽翻嗣昭曰善我請從公後嗣源乃解鞍厲鏃乘髙布陳陳讀曰陣左右指畫邢人莫之測嗣源直前奮擊嗣昭繼之從周乃退徳威馬邑人也馬邑秦漢舊縣名久廢開元五年分朔州善陽縣置馬邑縣於古大同軍城屬朔州癸卯以威武留後王審知為節度使以羅紹威知魏博留後丁巳以東川留後王宗滌為節度使加佑國節度使張全義兼侍中王珙引汴兵寇河中珙居勇翻王珂告急於李克用克用遣李嗣昭救之敗汴兵於胡壁九域志河中府榮河縣有胡壁鎮榮河唐寳鼎縣也宋祥符中更名敗補邁翻汴人走前常州刺史王柷柷之六翻性剛介有時望詔徴之時人以為且入相相息亮翻過陜王柷就徴道過陜州陜夫冉翻王珙延奉甚至請叙子姪之禮拜之柷固辭不受珙怒珙以柷同姓年輩在前行且入相請叙子姪之禮以親結之而柷辭不受珙以柷薄其門地本出寒微而絶之也故怒使送者殺之為考異曰柷給事中并遇害皆無年月今因珙伐河中事附此并其家人悉投諸河掠其資裝以覆舟聞朝廷不敢詰史言唐之威令不行藩鎮暴横王柷罹其虐殺而不敢問詰去吉翻閏月錢鏐以其將曹圭為蘇州制置使遣王球攻婺州十一月甲寅立皇子禎為雅王祥為瓊王以魏博留後羅紹威為節度使衢州刺史陳岌請降于楊行密錢鏐使顧全武討之降户江翻朱全忠以奉國節度使崔洪與楊行密交通淮西淮南鄰道也遣其將張存敬攻之洪懼請以弟都指揮使賢為質質音致託考異日十國紀年洪以將士不受節制遣兄賢質於汴按舊紀十月汴將張存敬以兵襲蔡州刺史崔洪納欵請以弟賢質于汴許之實錄亦云弟賢今從之且言將士頑悍悍下罕翻又侯旰翻不受節制請遣二千人詣麾下從征伐全忠許之為朱全忠遣崔賢徴兵蔡將殺賢刼洪奔淮南張本召存敬還存敬曹州人也十二月昭義節度使薛志勤薨李克用之平王行瑜也見上卷乾寧二年李罕之求邠寧於克用克用曰行瑜恃功邀君故吾與公討而誅之昨破賊之日吾首奏趣蘇文建赴鎮事見同上趣讀曰促今纔達天聴遽復二三復扶又翻下同朝野之論必喧然謂吾輩復如行瑜所為也吾與公情如同體固無所愛俟還鎮當更為公論功賞耳為于偽翻下同罕之不恱而退私於葢寓曰罕之自河陽失守依託大庇葢古盍翻李罕之失河陽見二百五十七卷僖宗文徳元年嵗月已深比來衰老比毗至翻近也倦於軍旅若䝉吾王與太傅哀愍王謂李克用太傳謂葢寓賜一小鎮使數年之間休兵養疾然後歸老閭閻幸矣寓為之言克用不應毎藩鎮缺議不及罕之罕之甚鬱鬱寓恐其有它志亟為之言亟去吏翻頻也數也克用曰吾於罕之豈愛一鎮但罕之鷹也饑則為用飽則背飛祖曹操駕御吕布之意而言之背蒲妹翻及志勤薨旬日無帥罕之擅引澤州兵夜入潞州據之九域志澤州北至潞州一百六十五里帥所類翻以狀白克用曰薛鐵山死薛志勤從克用起代北初名鐵山州民無主慮不逞者為變故罕之專命鎮撫取王裁㫖裁㫖者㫖裁其可否也克用怒遣人讓之罕之遂遣其子請降于朱全忠執河東將馬溉等及沁州刺史傅瑤送汴州克用遣李嗣昭將兵討之自此李克用不能與朱全忠争邢洺磁而争澤潞矣嗣昭先取澤州収罕之家屬送晉陽先取澤州既掩李罕之不備且俘其家史言李嗣昭用兵有方略楊行密遣成及歸兩浙以易魏約等淮南擒成及見上卷乾寧三年兩浙擒魏約見上去年四月楊錢争蘇州臺濛周本秦裴皆淮南名將也為浙人所困終不能守楊行密知錢鏐未易可輕故歸成及以易魏約意在講解也錢鏐許之錢鏐亦自知不如楊行密之强故許之之速韶州刺史曽衮舉兵攻廣州州將王瓌帥戰艦應之帥讀曰率清海行軍司馬劉隠一戰破之韶州將劉潼復據湞浛復扶又翻湞浛當在韶州湞昌縣界或曰劉潼據湞陽浛洭二縣之間湞癡貞翻浛胡南翻隠討斬之二年春正月丁未中書侍郎兼吏部尚書崔𦙍罷守本官以兵部尚書陸扆同平章事崔𦙍陸扆迭為拜罷朱全忠表李罕之為昭義節度使又表權知河陽留後丁㑹武寧留後王敬蕘蕘如招翻彰義留後張珂並為節度使河陽武寧皆附屬朱全忠獨張珂在涇州而為之請節鉞亦所以結之也楊行密與朱瑾將兵數萬攻徐州軍于吕梁朱全忠遣騎將張歸厚救之劉仁恭發幽滄等十二州兵十萬十二州幽涿瀛莫平營薊媯檀滄景徳也幽州巡屬更有蔚新武三州劉仁恭留以備河東不發其兵欲兼河朔攻貝州拔之城中萬餘户盡屠之投尸清水清水即清河之水由是諸城各堅守不下仁恭進攻魏州營于城北魏博節度使羅紹威求救於朱全忠朱全忠遣崔賢還蔡州崔洪以弟賢為質見上年發其兵二千詣大梁二月蔡將崔景思等殺賢刼崔洪悉驅兵民度淮奔楊行密兵民稍稍遁歸安土重遷人情之常也至廣陵者不滿二千人全忠命許州刺史朱友裕守蔡州朱全忠自將救徐州楊行密聞之引兵去汴人追及之於下邳下邳古縣唐屬徐州九域志在徐州東一百八十里殺千餘人全忠行至輝州是年朱全忠表以宋州之碭山虞城單父曹州之成武置輝州即單州之封域也聞淮南兵已退乃還三月朱全忠遣其將李思安張存敬將兵救魏博屯于内黄九域志内黄縣在魏州西南二百一十四里癸卯全忠以中軍軍于滑州劉仁恭謂其子守文曰汝勇十倍於思安當先虜鼠輩後擒紹威耳乃遣守文及其妹壻單可及將精兵五萬擊思安於内黄丁未思安使其將袁象先伏兵於清水之右淇水東過内黄謂之白溝水亦謂之清河水思安逆戰於繁陽繁陽漢古縣唐併省入内黄杜佑曰漢繁陽縣故城在内黄縣西北陽不勝而却守文逐之及内黄之北思安勒兵還戰伏兵發夾擊之幽州兵大敗斬可及殺獲三萬人守文僅以身免可及幽州驍將號單無敵燕軍失之喪氣李克用輕單可及而有木𤓰澗之敗劉仁恭輕李思安而單可及喪元是以用兵者戒於輕敵喪息浪翻思安陳留人也時葛從周自邢州將精騎八百已入魏州戊申仁恭攻上水闗館陶門館陶門魏州城北門由此門出趣館陶縣因以為門名從周與宣義牙將賀徳倫出戰顧門者曰前有大敵不可返顧命􅣃其扉􅣃轄臘翻扉門扇也從周等殊死戰仁恭復大敗復扶又翻下同擒其將薛突厥王鄶郎鄶古外翻明日汴魏乘勝合兵擊仁恭破其八寨仁恭父子燒營而遁汴魏之人長驅追之至臨清擁其衆入永濟渠殺溺不可勝紀勝音升鎮人亦出兵邀擊於東境鎮人王鎔之兵深冀趙之東境自魏至滄五百里間僵尸相枕僵居良翻枕職任翻仁恭自是不振而全忠益横矣幽并之兵勢皆挫故全忠益横横户孟翻徳倫河西胡人也薛史賀徳倫其先河西部落人父懐慶𨽻滑州軍為小校故徳倫少為滑牙將劉仁恭之攻魏州也羅紹威遣使修好於河東好呼到翻且求救壬午李克用遣李嗣昭將兵救之㑹仁恭已為汴兵所敗敗補邁翻紹威復與河東絶自李存信莘縣之敗魏與并絶矣今因求救而通好并兵未至而汴人有功故復與并絶嗣昭引還葛從周乘破幽州之勢自土門攻河東拔承天軍别將氏叔琮自馬嶺入馬嶺在太原府太谷縣東南八十里拔遼州樂平晉分漢沾縣置樂平縣唐屬遼州進軍榆次榆次古縣唐屬太原府李克用遣内牙軍副周徳威擊之叔琮有驍將陳章號陳夜义為前鋒俗言隂府有鬼使日夜叉時人以陳章鷙悍可畏如夜义然因稱之請於叔琮曰河東所恃者周楊五周徳威小字楊五請擒之求一州為賞克用聞之以戒徳威徳威曰彼大言耳戰于洞渦洞渦水出沾縣北山東流南屈過受陽縣故城東西過榆次縣南此据水經注也魏収地形志洞渦水一出木𤓰嶺一出沾嶺一出大廉山一出原過祠下五水合流故曰同過後語轉為洞渦按髙歡建大丞相府于晉陽魏収已策名霸府齊受魏禪以晉陽為别都魏収多從其主徃來晉陽宫宜知地名之的徳威微服徃挑戰挑徒了翻謂其屬曰汝見陳夜义即走章果逐之徳威奮鐵檛擊之墜馬檛側𤓰翻生擒以獻因擊叔琮大破之斬首三千級叔琮弃營走徳威追之出石㑹闗又斬千餘級從周亦引還丁巳朱全忠遣河陽節度使丁㑹攻澤州下之去年十二月河東兵取澤州河考異曰實錄丁巳葛從周復取澤州按編遺錄丁巳橋丁㑹収復澤州實錄云從周誤也唐太祖紀年錄三月周徳威敗氏叔琮於洞渦驛先是逆温令丁㑹將兵助李罕之戍潞州至是葛從周復入潞州以代丁㑹賊復陷我澤州梁實錄薛史梁紀皆云六月方遣從周入潞州紀年錄于此連言後事耳婺州刺史王壇為兩浙所圍去年閏月兩浙兵攻婺州求救於宣歙觀察使田頵按宣歙觀察先是已升寧國軍以田頵為節度使歙書涉翻夏四月頵遣行營都指揮使康儒等救之五月甲午置武信軍於遂州以遂合等五州𨽻之王建之志也李克用遣蕃漢馬步都指揮使李君慶將兵攻李罕之己亥圍潞州朱全忠出屯河陽辛丑遣其將張存敬救之壬寅又遣丁㑹將兵繼之大破河東兵君慶解圍去克用誅君慶及其禆將伊審李𢎞襲以李嗣昭為蕃漢馬步都指揮使代之攻潞州庚戌康儒等敗兩浙兵於龍丘龍丘本漢太末縣貞觀八年更名龍丘即今龍遊縣九域志屬衢州在州東七十五里敗補邁翻擒其將王球王球為主將以攻婺州而見擒於龍丘葢以浙兵逆與宣兵戰也遂取婺州景福元年王壇得婺州至是失之六月乙丑李罕之疾亟亟紀力翻丁卯全忠表罕之為河陽節度使以丁㑹為昭義節度使未幾幾居豈翻又以其將張歸霸守邢州遣葛從周代㑹守潞州異考曰編遺錄六月乙丑李罕之疾甚請歸河陽丁卯上令抽大軍迴以丁㑹權制置綏懐上黨上乃東歸不言遣從周入潞薛居正五代史梁紀六月帝表丁㑹為潞州節度使以李罕之疾亟故也又遣葛從周由固鎮路入于潞州以援丁㑹梁實錄後唐紀皆云代㑹自此至潞州破賀徳倫走不復見㑹名或者李罕之既卒復召㑹守河陽以從周代之不可知也今因㑹鎮潞終言之以西川大將王宗佶為武信節度使王建之請也宗佶本姓甘洪州人也丁丑李罕之薨于懐州李罕之自潞州赴河懐至懐州而卒保義節度使王珙性猜忍雖妻子親近常不自保至是軍亂為麾下所殺僖宗中和初王重盈鎮陜傳子珙至是而亡推都將李璠為留後璠音煩秋七月朱全忠海州戍將陳漢賔請降于楊行密淮海遊奕使張訓以漢賔心未可知與漣水防遏使廬江王綰將兵二千直趣海州遂據其城楊行密自此遂有海州趣七喻翻加荆南節度使成汭兼中書令馬殷遣其將李唐攻道州蔡結聚羣蠻伏兵于隘以擊之大破唐兵唐曰蠻所恃者山林耳若戰平地安能敗我敗補邁翻乃命因風燔林火燭天地羣蠻驚遁遂拔道州擒結斬之朱全忠召葛從周於潞州使賀徳倫守之八月丙寅李嗣昭引兵至潞州城下分兵攻澤州己巳汴將劉玘弃澤州走河東兵進拔天并闗以李孝璋為澤州刺史李孝璋當作李存璋賀徳倫閉城不出李嗣昭日以鐵騎環其城捕芻牧者環音宦附城三十里禾黍皆刈之乙酉徳倫等弃城宵遁趣壺闗賀徳倫之兵既不得出城芻牧城外禾黍又空粮援俱絶宜其遁也九域志壺闗縣在潞州東二十五里趣七喻翻河東將李存審李存審即苻存審伏兵邀擊之殺獲甚衆葛從周以援兵至聞徳倫等已敗乃還九月癸卯以鳯翔節度使李茂貞為鳯翔彰義節度使是年春正月朱全忠表張珂為彰義節度使張氏鎮涇州凡三帥矣今命李茂貞兼領之李克用表汾州刺史孟遷為昭義留後為孟遷以潞州叛李克用張本淄青節度使王師範以沂密内叛當是時未全忠盡有河南一道之地王師範亦附屬焉若沂密内叛將安歸邪又不乞師於全忠而乞師於楊行密此事當考乞師于楊行密冬十月行密遣海州刺史臺濛副使王綰將兵助之拔密州歸于師範將攻沂州先使覘之覘丑廉翻曰城中皆偃旗息鼓綰曰此必有備而救兵近不可擊也諸將曰密已下矣沂何能為綰不能止乃伏兵林中以待之諸將攻沂州不克救兵至引退此救兵果誰兵歟州兵乘之綰發伏擊敗之敗補邁翻十一月陜州都將朱簡殺李璠自稱留後附朱全忠仍請更名友謙預於子姪朱全忠又兼有陜虢更工衡翻加忠義節度使趙匡凝兼中書令馬殷遣其將李瓊攻郴州執陳彦謙斬之進攻連州魯景仁自殺湖南皆平馬殷始盡有湖南之地十二月加魏博節度使羅紹威同平章事資治通鑑卷二百六十一
