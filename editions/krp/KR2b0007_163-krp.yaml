front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百六十三宋司馬光撰胡三省音註梁紀十九上章敦牂一年太宗簡文皇帝上諱綱字世讚小字六通武帝第三子昭明太子母弟也謚法平易不訾曰簡學勤好問曰文大寳元年春正月辛亥朔大赦改元陳霸先發始興至大庾嶺大庾嶺在今南安軍大庾縣西南二十里吳錄南野縣有大庾山自嶺嶠九嶝二里至嶺下平行十里至平亭蔡路養將二萬人軍於南野以拒之南野縣漢屬豫章郡晋屬南康郡劉昫曰唐韶州始興縣漢南野縣地宋白曰䖍州之南康大庾嶺南雄州之始興皆漢南野縣地輿地志今䖍州龍南縣漢南野縣地將即亮翻路養妻姪蘭陵蕭摩訶年十三單騎出戰無敢當者杜僧明馬被傷騎竒寄翻被皮義翻陳霸先救之授以所乗馬僧明上馬復戰上時掌翻復扶又翻衆軍因而乗之路養大敗脱身走霸先進軍南康清考異曰太紀在二月今從陳帝紀湘東王繹承制授霸先明威將軍交州刺史戊辰東魏進太原公高洋位丞相都督中外諸軍錄尚書事大行臺齊郡王庚午邵陵王綸至江夏郢州刺史南康王恪郊迎南康當作南平參考前後及梁書可見夏戶雅翻以州讓之綸不受乃推綸爲假黄鉞都督中外諸軍事承制置百官恪考異曰太清紀云三月倫逼奪州徙恪於郡廨今從梁書典略魏楊忠圍安陸栁仲禮馳歸救之去年仲禮將兵趣襄陽諸將恐仲禮至則安陸難下請急攻之將即亮翻下同忠曰攻守勢殊未可猝㧞若引日勞師表裏受敵非計也南人多習水軍不閑野戰仲禮師在近路吾出其不意以竒兵襲之彼怠我奮一舉可克克仲禮則安陸不攻自㧞諸城可傳檄定也乃選騎二千衘枚夜進敗仲禮於漴頭敗補邁翻杜佑曰漴音崇水所衝曰漴考異曰太清紀作潼頭在去年十二月今從典略獲仲禮及其弟子禮盡俘其衆馬岫以安陸别將王叔孫以竟陵皆降於忠降户江翻於是漢東之地盡入於魏國廣陵人來嶷嶷魚力翻説前廣陵太守祖皓曰董紹先輕而無謀輕率正翻人情不附襲而殺之此壯士之任也今欲紏帥義勇奉戴府君帥讀曰率下同若其克㨗可立桓文之勲必天未悔禍猶足爲梁室忠臣皓曰此僕所願也乃相與紏合勇士得百餘人癸酉襲廣陵斬南兖州刺史董紹先據城馳檄遠近推前太子舍人蕭勔爲刺史勔彌兖翻仍結東魏爲援皓暅之子祖暅見一百四十七卷武帝天監十二年諸本作暅之之子者衍一之字暅古鄧翻勔勃之兄也乙亥景遣郭元建帥衆奄至皓嬰城固守二月魏楊忠乘勝至石頭五代志竟陵郡長壽縣後周置石頭郡欲進逼江陵湘東王繹遣舍人庾恪説忠曰詧來伐叔説式芮翻來伐事見上卷上年而魏助之何以使天下歸心忠遂停湕北湕水之北也湕紀偃翻繹遣舎人王孝祀等送子方略爲質以求和魏人許之繹與忠盟曰魏以石城爲封梁以安陸爲界請同附庸并送質子貿遷有無質音致貿易也遷徙也徙有之無以相貿易貿音茂永敦隣睦忠乃還還從宣翻又如字宕昌王梁彌定宕徒浪翻爲其宗人獠甘所襲彌定奔魏獠甘自立羌酋傍乞鐵忽據渠株川獠魯皓翻酋慈秋翻與渭川民鄭五醜合諸羌以叛魏丞相㤗使大將軍宇文貴凉州刺史史寧討之擒斬鐵忽五醜寧别擊獠甘破之獠甘將百騎奔生羌鞏亷玉生羌逺在塞外不羈屬於魏者騎竒寄翻寧復納彌定於宕昌置岷州於渠株川五代志臨洮郡臨洮縣西魏置溢樂縣并置岷州復扶又翻進擊鞏亷玉斬獠甘虜亷玉送長安矦景遣任約于慶等帥衆二萬攻諸藩諸藩謂梁之宗室分任藩維者任音壬帥讀曰率邵陵王綸欲救河東王譽而兵糧不足乃致書於湘東王繹曰天時地利不及人和用孟子之言况於手足肱支豈可相害今社稷危恥創巨痛深禮記三年問曰創巨者其疾乆痛甚者其愈遲三年者稱情而立文所以爲至痛極也斬衰苴杖居倚廬食粥寢苫枕塊所以爲至痛飾也創音瘡唯應剖心嘗膽泣血枕戈越王句踐卧薪嘗膽求以報吴晋劉琨枕戈待旦志梟逆虜枕之任翻子執親䘮泣血三年孔穎達曰説文哭哀聲也泣無聲出淚也則無聲謂之泣矣連言血者以淚出於目猶血出於體故以淚比血禮記曰子羔執親之䘮泣血三年注曰無聲而血出是也其餘小忿或宜容貰貰貸也若外難未除家禍仍構料今訪古難乃旦翻料音聊未或不亡夫征戰之理唯求克勝至於骨肉之戰愈勝愈酷捷則非功敗則有䘮䘮息浪翻勞兵損義虧失多矣矦景之軍所以未窺江外者荆州治江陵在江北故曰江外良爲藩屏盤固宗鎮彊密爲于偽翻屏必郢翻弟若陷洞庭湘州之地襟帶洞庭故謂湘州爲洞庭不戢兵刃雍州疑迫何以自安必引進魏軍以求形援以綸之昏狂猶能言及於此盖勢有所必至也戢阻立翻雍於用翻弟若不安家國去矣必希觧湘州之圍存社稷之計繹復書陳譽過惡不赦言其過大惡極法所不赦且曰詧引楊忠來相侵逼頗遵談笑用却秦軍魯仲連談笑而却秦軍繹引此以爲大言曲直有在不復自陳復扶又翻臨湘旦平臨湘縣自漢以來屬長沙郡時爲州郡治所隋改臨湘縣曰長沙縣暮便即路即路就路也承上文而言若欲攻襄陽考之下文盖謂討矦景綸得書投之於案慷慨流涕曰天下之事一至於斯湘州若敗吾亡無日矣綸知繹兵東下必将圖已故云然使在京口之時能思及此則何亡國䘮身之有古人所以重居安慮危居寵思畏者也史爲綸北奔張本矦景遣矦子鑒帥舟師八千自帥徒兵一萬徒兵歩兵也帥讀曰率下同攻廣陵三日克之執祖皓縳而射之箭徧體然後車裂以徇城中無少長皆埋之於地馳馬射而殺之射而亦翻少詩照翻長知兩翻考異曰太清紀曰城中數百人典畧曰死者八千人今從南史以子鑒爲南兖州刺史鎮廣陵廣陵之人既殱矣子鑒所鎮者空城耳景還建康丙戍以安陸王大春爲東揚州刺史省吳州景置吳州見上卷上年乙巳以尚書僕射王克爲左僕射庚寅東魏以尚書令髙隆之爲太保宣城内史楊白華進據安吳孫吳立安吳縣屬宣城郡隋省安吳入涇縣矦景遣于子恱帥衆攻之不克東魏行臺辛術將兵入冦圍陽平不克矦景納上女溧陽公主甚愛之溧音栗三月甲申請上禊宴於樂遊苑禊宴因袚禊而開宴禊胡計翻樂遊苑在玄武湖南帳飲三日上還宫景與公主共據御牀南靣並坐羣臣文武列坐侍宴庚申東魏進丞相洋爵爲齊王臨川内史始興王毅等擊莊鐵王毅始興人毅即毅字後人傳寫變立為􅵡耳鄱陽王範遣其將巴西矦瑱救之瑱他甸翻毅等敗死鄱陽世子嗣與任約戰於三章約敗走嗣因徙鎮三章謂之安樂柵去年鄱陽王範西上使世子嗣守安樂柵今移柵三章亦以安樂名柵樂音洛夏四月庚辰朔湘東王繹以上甲矦韶爲長沙王上甲矦韶奔江陵見上卷上年按梁書長沙王懿子淵業嗣封卒子孝儼嗣封又卒子齊嗣封眘懿曽孫也時在建康湘東以韶歸之遂以爲長沙王非禮也丙午矦景請上幸西州上御素輦侍衛四百餘人景浴鐵數千翼衛左右浴鐵者言鐵甲堅滑若以水浴之也上聞絲竹悽然泣下命景起舞景亦請上起舞酒䦨坐散坐徂卧翻上抱景于牀曰我念丞相景曰陛下如不念臣臣何得至此逮夜乃罷時江南連年旱蝗江揚尤甚百姓流亡相與入山谷江湖采草根木葉菱芡而食之菱芰也芡巨險翻説文曰鷄頭也方言曰南楚謂之鷄頭北燕謂之䓈青徐淮泗之間謂之芡所在皆盡死者蔽野富室無食皆鳥面鵠形衣羅綺懐珠玉俯伏牀帷待命聽終千里絶烟衣於既翻烟與煙同人迹罕見白骨成聚如丘隴焉景性殘酷於石頭立大碓碓都内翻有犯法者擣殺之常戒諸將曰破柵平城當浄殺之使天下知吾威名故諸將每戰勝專以焚掠爲事斬刈人如草芥以資戲笑由是百姓雖死終不附之史言矦景將敗又禁人偶語犯者刑及外族男子謂舅家爲外家婦人謂父母之家爲外家外族外家之族爲其將帥者悉稱行臺來降附者悉稱開府其親寄隆重者曰左右廂公勇力兼人者曰庫直都督南史矦景傳作庫真都督誤也魏封皇子儒爲燕王公爲吳王矦景召宋子仙還京口去年宋子仙克東揚州今召還京口邵陵王綸在郢州以聽事爲正陽殿内外齋閤悉加題署其部下陵暴軍府郢州將佐莫不怨之諮議參軍江仲舉南平王恪之謀主也說恪圖綸説式芮翻恪驚曰若我殺邵陵寜靜一鎮荆益兄弟必皆内喜帝既蒙塵綸於兄弟之次當立恪若除綸則人望歸於荆益必當内以爲喜時湘東王繹在荆州武陵王紀在益州海内若平則以大義責我矣且巨逆未梟巨逆謂矦景梟謂梟其首梟堅堯翻骨肉相殘自亡之道也卿且息之仲舉不從部分諸將分扶問翻刻日將𤼵謀泄綸壓殺之恪狼狽徃謝綸曰羣小所作非由兄也兇黨已斃兄勿深憂南平王恪偉之子也於綸為兄王僧辯急攻長沙辛巳克之執河東王譽斬之傳首江陵湘東王繹反其首而葬之反其首於長沙與身俱葬初世子方等之死見上卷上年臨蒸周鐵虎功最多吳立臨蒸縣以縣臨蒸水而名屬衡陽郡晋屬湘東郡酈道元曰臨蒸即故酃縣縣即湘東郡劉昫曰隋改臨蒸為衡陽縣今衡州所治衡陽縣是也衡州志吳分酃縣立臨蒸縣俯臨蒸水其氣如蒸姚思亷陳書曰周鐵虎不知何許人梁世南度事河東王譽為臨蒸令如此則通鑑逸令字譽委遇甚重僧辯得鐵虎命烹之呼曰呼火故翻矦景未滅柰何殺壯士僧辯竒其言而釋之還其麾下繹以僧辯爲左衛將軍加侍中鎮西長史繹自去歲聞髙祖之䘮以長沙未下故匿之壬寅始𤼵䘮刻檀爲髙祖像置於百福殿事之甚謹動靜必咨焉繹以為天子制於賊臣不肯從大寳之號猶稱太清四年丙午繹下令大舉討矦景移檄遠近鄱陽王範至湓城以晋熈為晋州晉安帝分廬江郡立晋熈郡五代志同安郡懐寜縣舊置晋熈郡唐以同安郡為舒州遣其世子嗣為刺史江州郡縣多輙改易改易郡縣守令也尋陽王大心政令所行不出一郡惟尋陽一郡而已大心遣兵擊莊鐵嗣與鐵素善請發兵救之範遣矦瑱帥精甲五千助鐵瑱他甸翻又音鎮帥讀曰率下同由是二鎮互相猜忌無復討賊之志復扶又翻大心使徐嗣徽帥衆二千築壘稽亭以備範據齊書晋安王子懋傳子懋謀舉兵於江州宣城王遣裴叔業襲取湓城子懋先已具船於稽亭渚聞叔業得湓城乃據州自衛則稽亭渚在江州城東也帥讀曰率市糴不通範數萬之衆無所得食多餓死範憤恚疽𤼵於背五月乙卯卒恚於避翻今考異曰典略作己酉從大清紀其衆祕不𤼵䘮奉範弟安南矦恬為主有衆數千人丙辰矦景以元思䖍為東道大行臺鎮錢唐丁巳以矦子鑒為南兖州刺史東魏齊王洋之為開府也洋爲開府見一百五十七卷武帝大同元年勃海髙德政爲管記管記即記室參軍之職由是親昵言無不盡昵尼質翻金紫光祿大夫丹陽徐之才北平太守廣宗宋景業漢晋以來中山有北平縣後魏孝昌中分置北平郡屬定州廣宗縣漢屬鉅鹿郡後屬安平國後魏太和二十一年分置廣宗郡時屬司州皆善圖䜟䜟楚譛翻以為太歲在午當有革因德政以白洋勸之受禪洋以告婁太妃太妃曰汝父如龍兄如虎猶以天位不可妄據終身北面汝獨何人欲行舜禹之事乎洋以告之才之才曰正爲不及父兄爲于僞翻故宜早升尊位耳洋鑄像卜之而成乃使開府儀同三司叚韶問肆州刺史斛律金金來見洋固言不可以宋景業首陳符命請殺之洋與諸貴議於太妃前太妃曰吾兒懦直必無此心髙德政樂禍教之耳樂音洛洋以人心不壹遣髙德政如鄴察公卿之意未還洋擁兵而東至平都城九域志遼州遼山縣有平城鎮宋白曰遼州平城縣本漢湼縣地晋置武鄉縣此地屬焉隋開皇十六年於趙簡子所立平都故城置平城縣召諸勲貴議之莫敢對長史杜弼曰闗西國之勍敵謂宇文氏也勍渠京翻若受魏禪恐彼挾天子自稱義兵而東向此天子謂西魏主王何以待之徐之才曰今與王爭天下者彼亦欲為王所爲縱其屈彊屈其勿翻彊其兩翻不過隨我稱帝耳弼無以應髙德政至鄴諷公卿莫有應者司馬子如逆洋於遼陽遼陽縣自漢末以來屬樂平郡隋開皇十一年改曰遼山縣我宋朝爲遼州治所固言未可洋欲還倉丞李集曰北齊之制太倉及水次諸倉皆有令丞北齊紀作尚食丞李集王來爲何事而今欲還爲于僞翻洋僞使於東門殺之而别令賜絹十匹遂還晋陽自是居常不恱徐之才宋景業等日陳隂陽雜占云宜早受命髙德政亦敦勸不已洋使術士李宻卜之遇大横曰漢文之卦也大横見十三卷漢髙后八年又使宋景業筮之遇乾之鼎乾之初九九五二爻動變而之鼎曰乾君也鼎五月卦也宜以仲夏受禪或曰五月不可入官犯之終於其位隂陽家之説上官忌正月五月九月景業曰王爲天子無復下期復扶又翻豈得不終於其位乎洋大悦乃𤼵晋陽髙德政錄在鄴諸事條進於洋洋令左右陳山提馳驛齎事條并密書與楊愔愔於今翻是月山提至鄴楊愔即召太常卿邢邵議造儀注祕書監魏收草九錫禪讓勸進諸文凡禪代皆奉表三讓百僚三表勸進而後即位故令収預草諸文引魏宗室諸王入北宫留於東齋甲寅東魏進洋位相國總百揆備九錫洋行至前亭前亭在晋陽之東平都城之西所乘馬忽倒意甚惡之至平都城不復肯進惡烏路翻復扶又翻髙德政徐之才苦請曰山提先去恐其漏泄即命司馬子如杜弼馳驛續入觀察物情子如等至鄴衆人以事勢已决無敢異言洋至鄴召夫夫民夫也齎築具集城南髙隆之請曰用此何爲洋作色曰我自有事君何問爲欲族滅邪隆之謝而退於是作圓丘備法物丙辰司空潘樂侍中張亮黄門郎趙彦深等求入啟事東魏孝靜帝在昭陽殿見之亮曰五行遞運有始有終謂五德之運以木代水以火代木以土代火以金代土以水代金也齊王聖德欽明萬方歸仰願陛下遠法堯舜帝歛容曰此事推挹已乆推吐雷翻挹遜也謹當遜避又曰若爾湏作制書中書郎崔劼裴讓之曰劼丘八翻制已作訖使侍中楊愔進之東魏主既署曰居朕何所愔對曰北城别有館宇乃下御坐歩就東廊坐徂卧翻詠范蔚宗後漢書贊曰獻生不辰身播國屯終我四百永作虞賔范曄字蔚宗作後漢書此其贊獻帝之辭也賢注曰辰時也播遷也言獻帝生不逄時身既播遷國又屯難也漢有天下四百年而運終虞賔謂虞以尭子丹朱爲賔書曰虞賔在位蔚紆勿翻屯陟倫翻所司請𤼵所司謂掌禪代事者請𤼵者請出宫居别邸也此實楊愔等使人請之帝曰古人念遺簮弊履朕欲與六宫别可乎髙隆之曰今日天下猶陛下之天下况在六宫帝歩入與妃嬪已下别舉宫皆哭趙國李嬪誦陳思王詩云王其愛玉體俱享黄髮期曹植魏武帝之子封陳王謚曰思殯毗賔翻直長趙道德以車一乘候於東閣直長官名凡殿中諸局各有奉御有直長趙道徳盖尚乘直長也亦髙氏之私人東閣即東閣門長竹兩翻乘繩證翻帝登車道德超上抱之上時掌翻帝叱之曰朕自畏天順人何物奴敢逼人如此道徳猶不下出雲龍門王公百僚拜辭髙隆之灑泣遂入北城居司馬子如南宅司馬子如有宅在太原故謂鄴城之宅爲南宅遣太尉彭城王韶等奉璽綬禪位于齊璽斯氏翻綬音受東魏十六年而亡考異曰北齊書北史髙徳政𫝊云五月六日留咸陽王坦等七日司馬子如等至鄴九日文宣至城南頓案後魏書北史帝紀皆云辛亥王如鄴甲寅加九錫丙辰魏主遜位戊午王即帝位典略辛亥王還鄴以長歴推之此月己酉朔皆不與德政傳曰相應盖辛亥始自晋陽如鄴非到鄴之日也戊午齊王即皇帝位于南郊帝諱洋字子進勃海王髙歡第二子澄之母弟也歡以勃海王贈齊王洋又進爵齊王且髙氏本勃海人勃海故齊地也國遂號曰齊大赦改元天保自魏敬宗以來百官絶祿至是始復給之復扶又翻己未封東魏主為中山王待以不臣之禮追尊齊獻武王為獻武皇帝廟號太祖後改為髙祖文襄王為文襄皇帝廟號世宗辛酉尊王太后婁氏為皇太后乙丑降魏朝封爵有差其宣力霸朝自髙歡起兵以來諸勲貴皆宣力霸朝者也朝直遙翻及西南投化者不在降限謂自闗西及江南來投者文成矦寧起兵於吳有衆萬人己巳進攻吳郡吳郡帯吳縣寧蓋起兵於吳縣界進攻吳郡城也按矦景傳寧起兵於吳西鄉去年陸緝等推寧據吳郡宋子仙擊之敗走今復起兵於西鄉行吳郡事矦子榮逆擊殺之寧範之弟也子榮因縱兵大掠郡境自晋氏渡江三吳最為富庶貢賦商旅皆出其地及矦景之亂掠金帛既盡乃掠人而食之或賣於北境遺民殆盡矣是時唯荆益所部尚完實太尉益州刺史武陵王紀移告征鎮使世子圓照帥兵三萬受湘東王節度帥讀曰率圓照軍至巴水巴郡巴縣有巴水水折三廻如巴字巴郡唐為渝州卯考異曰南史云六月辛酉紀遣圓照東下按六月己朔無辛酉典畧在五月或者五月辛酉歟繹授以信州刺史令屯白帝梁置信州於白帝唐改䕫州未許東下六月辛巳以南郡王大連行揚州事江夏王大欵山陽王大成宜都王大封自信安閒道奔江陵閒古莧翻齊主封宗室髙岳等十人功臣庫狄干等七人皆爲王髙岳及隆之歸彦思宗長弼普子瑗顯國叡孝緒凡十人庫狄干斛律金賀㧞仁韓軌可朱渾道元彭樂潘相樂凡七人癸未封弟浚爲永安王淹爲平陽王浟爲彭城王演爲常山王渙爲上黨王淯爲襄城王湛爲長廣王湝爲任城王浟以周翻淯音育湝戶皆翻湜爲髙陽王濟爲博陵王凝爲新平王潤爲馮翊王洽爲漢陽王鄱陽王範既卒矦瑱往依莊鐵鐵忌之瑱不自安丙戍詐引鐡謀事因殺之自據豫章尋陽王大心遣徐嗣徽夜襲湓城安南矦恬裴之横等擊走之齊主娶趙郡李希宗之女生子殷及紹德又納叚韶之妹及將建中宫高隆之高德政欲結勲貴之援乃言漢婦人不可爲天下母宜更擇美配帝不從丁亥立李氏爲皇后異考曰典畧在五月乙丑今從北齊帝紀以叚氏爲昭儀子殷爲皇太子庚寅以庫狄干爲太宰彭樂爲太尉潘相樂爲司徒司馬子如爲司空辛卯以清河王岳爲司州牧矦景以羊鴉仁爲五兵尚書庚子鴉仁出奔江西將赴江陵至東莞南徐州有東莞郡不在江西意者東莞其東闗之誤歟盗疑其懐金邀殺之異考曰太清紀在十月今從梁帝紀典畧魏人欲令岳陽王詧𤼵哀嗣位詧辭不受丞相㤗使榮權冊命詧爲梁王始建臺置百官詧字理孫武帝之孫昭明太子之第三子陳霸先修﨑頭古城徙居之﨑渠希翻曲岸曰﨑九域志南安軍治大庾縣古南野也有南康古城又有峽頭鎮初燕昭成帝奔髙麗見一百二十三卷宋文帝元嘉十三年麗力知翻使其族人馮業以三百人浮海奔宋因留新㑹晋恭帝元熈二年分南海郡立新㑹郡隋唐爲新㑹縣屬廣州九域志新㑹縣在廣州之西南三百三十里自業至孫融世爲羅州刺史五代志髙凉郡石龍縣舊置羅州我朝爲化州治所融子寶爲髙凉太守髙凉縣漢屬合浦郡獻帝建安二十二年吳分立高凉郡梁置高州髙凉洗氏洗音銑丁度集韻姺國名或作䢾姓氏韻纂又音綿從考異曰典畧作沈氏今隋書世爲蠻酋酋慈秋翻部落十餘萬家有女多籌略善用兵諸洞皆服其信義融聘以爲寶婦融雖累世爲方伯非其土人號令不行洗氏約束本宗使從民禮每與寶參决辭訟首領有犯雖親戚無所縱舍舎讀曰捨由是馮氏始得行其政髙州刺史李遷仕據大臯口五代志髙凉郡梁置髙州遣使召寶使䟽吏翻下同寳欲徃洗氏止之曰刺史無故不應召太守必欲詐君共反耳寳曰何以知之洗氏曰刺史被召援臺被皮義翻乃稱有疾鑄兵聚衆而後召君此必欲質君以發君之兵也質音致願且無徃以觀其變數日遷仕果反遣主帥杜平虜將兵入灨石城魚梁以逼南康帥所類翻魚梁亦地名近灨石灨古暗翻霸先使周文育擊之洗氏謂寳曰平虜驍將也驍堅堯翻將即亮翻下同今入灨石與官軍相拒勢未得還遷仕在州無能爲也君若自徃必有戰鬬宜遣使卑辭厚禮告之曰身未敢出欲遣婦參彼聞之必憙而無備憙與喜同我將千餘人歩擔雜物唱言輸賧擔都甘翻賧吐濫翻得至柵下破之必矣寳從之遷仕果不設備洗氏襲擊大破之遷仕走保寧都吳分漢贛縣立陽都縣晋武太康元年更名寧都五代志南康䖍化縣舊曰寧都文育亦擊走平虜據其城洗氏與霸先㑹于灨石還謂寳曰陳都督非常人也甚得衆心必能平賊君宜厚資之湘東王繹以霸先爲豫州刺史領豫章内史辛丑裴之横攻稽亭徐嗣徽擊走之秋七月辛亥齊立世宗妃元氏爲文襄皇后后東魏孝靜帝女宫曰静徳又封世宗子孝琬爲河間王孝瑜爲河南王乙卯以尚書令封隆之錄尚書事尚書左僕射平陽王淹爲尚書令辛酉梁王詧入朝於魏自此魏益厚詧矣朝直遥翻初東魏遣儀同武威牒雲洛等雲當作云牒云虜複姓柔然阿那瓖之求附於魏也魏遣牒云具仁徃使牒云之爲姓尚矣迎鄱陽世子嗣使鎮皖城劉昫曰懐寧宿松望江太湖等縣皆漢晥縣地蓋此城即皖縣古城也皖戶板翻嗣未及行任約軍至洛等引去嗣遂失援出戰敗死約遂略地至湓城尋陽王大心遣司馬韋質出戰而敗帳下猶有戰士千餘人咸勸大心走保建州後漢汝南郡有苞信縣江左僑置於弋陽界五代志弋陽郡殷城縣舊曰苞信梁置義城郡及建州帳下勸大心走保之者便於入齊也九域志殷城縣併入固始大心不能用戊辰以江州降約先是大心使太子洗馬韋臧鎮建昌降户江翻下同先悉薦翻洗亦同音有甲士五千聞尋陽不守欲帥衆奔江陵帥讀曰率下同未發爲麾下所殺臧粲之子也太清三年青塘之戰韋粲死之于慶略地至豫章矦瑱力屈降之慶送瑱於建康景以瑱同姓待之甚厚留其妻子及弟為質質音致遣瑱隨慶徇蠡南諸郡蠡南謂彭蠡湖以南也以瑱爲湘州刺史十考異曰太清紀在一月今從典畧初巴山人黄灋氍有勇力五代志臨川郡崇仁縣梁置巴山郡劉昫曰吳分臨汝爲新建縣梁置巴山郡氍巨俱翻矦景之亂合徒衆保鄉里太守賀詡下江州自巴山順流赴江州爲下命灋氍監郡事監工衡翻灋氍屯新淦于慶自豫章分兵襲新淦新淦縣漢屬豫章郡五代志屬廬陵郡淦古暗翻灋氍敗之敗補邁翻陳霸先使周文育進軍擊慶灋氍引兵㑹之邵陵王綸聞任約將至使司馬蔣思安將精兵五千襲之約衆潰思安不設備約収兵襲之思安敗走湘東王繹改宜都爲宜州沈約曰劉備分南郡立宜都郡梁以宜都郡置宜州隋并宜都入夷陵郡以王琳爲刺史是月以南郡王大連爲江州刺史魏丞相㤗以齊主稱帝帥諸軍討之帥讀曰率下同以齊王廓鎮隴右徴秦州刺史宇文導爲大將軍都督二十三州諸軍事屯咸陽鎮闗中益州沙門孫天英帥徒數千人夜攻州城武陵王紀與戰斬之邵陵王綸大脩鎧仗將討矦景湘東王繹惡之惡綸由此兵力益彊將不利於己也惡烏路翻八月甲午遣左衛將軍王僧辯信州刺史鮑泉等帥舟師一萬東趣江郢趣七喻翻清考異曰典略云九月戊申朔繹遣僧辯按太紀事在八月末今從梁簡文帝紀聲言拒任約且云迎邵陵王還江陵授以湘州齊王初立勵精爲治治直吏翻趙道徳以事屬黎陽太守清河房超屬之欲翻下請屬同守式又翻超不𤼵書棓殺其使魏収志孝昌中分汲郡置黎陽郡屬司州治黎陽城棓歩頃翻使疏吏翻下同齊主善之命守宰各設棓以誅屬請之使乆之都官中郎宋軌奏曰中郎當作郎中五代志都官郎中掌畿内非爲得失事北齊制也若受使請賕猶致大戮身爲枉灋何以加罪乃罷之司都功曹張老上書請定齊律司都功曹司州之功曹也時都鄴以鄴爲司州治所按北齊主或居晋陽不常居鄴也詔右僕射薛琡等取魏麟趾格更討論損益之麟趾格見一百五十八卷武帝大同七年琡昌六翻齊主簡練六坊之人毎一人必當百人任其臨陳必死魏齊之間六軍宿衛之士分爲六坊任保任也陳讀曰陣然後取之謂之百保鮮卑百保言其勇可保一人當百人也髙氏以鮮卑創業當時號爲徤鬬故衝士皆用鮮卑猶今北人謂勇士爲霸都魯也又簡華人之勇力絶倫者謂之勇士以備邊要邊要邊上要害之地始立九等之户户有上中下三等毎等又分上中下是為九等富者稅其錢貧者役其力九月丁巳魏軍發長安發長安而東伐齊王僧辯軍至鸚鵡鸚鵡洲在江夏江中昔黄祖使禰衡賦鸚鵡賦於此洲因以得名洲之下即黄鵠磯郢州司馬劉龍虎等潜送質於僧辯質音致邵陵王綸聞之遣其子威正矦礩將兵擊之礩職日翻龍虎敗奔于僧辯綸以書責僧辯曰將軍前年殺人之姪謂殺河東王譽也今歲伐人之兄綸於繹兄也以此求榮恐天下不許僧辯送書於湘東王繹繹命進軍辛酉綸集其麾下於西園園在郢城西偏故曰西園又有東園在城東東湖上涕泣言曰我本無佗志在滅賊湘東常謂與之爭帝遂爾見伐今日欲守則交絶糧儲欲戰則取笑千載載子亥翻不容無事受縳當於下流避之麾下壯士爭請出戰綸不從與礩自倉門登舟北出據姚思亷梁書倉門郢城北門帯江阻險僧辯入據郢州繹以南平王恪爲尚書令開府儀同三司世子方諸爲郢州刺史王僧辯爲領軍將軍綸遇鎮東將軍裴之髙於道之髙之子畿掠其軍器綸與左右輕舟奔武昌澗飲寺武昌今壽昌軍是也僧灋馨匿綸於巖宂之下綸長史韋質司馬姜律等聞綸尚在馳徃迎之説七柵流民以求糧仗時流民於北江州結七柵以相保説式芮翻綸出營巴水流民八九千人附之稍收散卒屯于齊昌據魏収志梁武帝置北江州治鹿城闗領義陽齊昌新昌梁安齊興光城郡五代志黄州木蘭縣梁曰梁安郡又有義陽郡後齊置湘州後改曰北江州則齊昌亦當在木蘭縣界唐省木蘭入黄岡縣宋白曰吳置蘄春郡晋惠帝改西陽郡南齊北齊改西陽爲齊昌郡唐爲蘄州遣使請和于齊使疏吏翻齊以綸爲梁王湘東王繹改封皇子大欵爲臨川王大成爲桂陽王大封爲汝南王癸亥魏軍至潼闗庚午齊主如晋陽命太子殷居凉風堂監國據北史齊樂陵王百年傳凉風堂在鄴宫𤣥都苑監工衘翻南郡王中兵參軍張彪等南郡王大連之鎮會稽也以張彪爲中兵參軍起兵於若邪山若邪山在今越州東南四十里攻破浙東諸縣有衆數萬吳郡人陸令公等説太守南海王大臨徃依之説式芮翻大臨曰彪若成功不資我力如其橈敗橈奴教翻杜預曰橈曲也勢屈爲橈以我自解言将歸罪於大臨以自解於矦景不可徃也任約進冦西陽武昌初寜州刺史彭城徐文盛募兵數萬人討矦景湘東王繹以爲秦州刺史五代志江都郡六合縣舊置秦郡後齊置秦州抑梁已置之歟使將兵東下與約遇於武昌繹以廬陵王應爲江州刺史以文盛爲長史行府州事督諸將拒之將即亮翻下同應續之子也廬陵王續卒於武帝太清元年邵陵王綸引齊兵未至移營馬柵距西陽八十里西陽即今黄州黄岡縣古之邾城也任約聞之遣儀同叱羅子通等將鐵騎二百襲之叱羅虜複姓騎竒寄翻綸不爲備䇿馬亡走時湘東王繹亦與齊連和故齊人觀望不助綸定州刺史田祖龍迎綸綸以祖龍爲繹所厚懼爲所執復歸齊昌復扶又翻行至汝南魏所署汝南城主李素綸之故吏也開城納之魏収志郢州有汝南郡治上蔡縣五代志竟陵郡舊置郢州所領有漢東縣舊曰上蔡則汝南城即漢東縣城也又按姚思亷梁書汝南治安陸重城宋白曰晋汝南郡人流寓夏口因僑立汝南郡汝南縣於潼口荆湘記云金水北岸有汝南舊城是也任約遂據西陽武昌十考異曰梁帝紀在一月今從太清紀裴之高帥子弟部曲千餘人至夏首帥讀曰率夏户雅翻湘東王繹召之以爲新興永寜二郡太守新興郡置於江陵縣界永寧郡置於襄陽南漳縣界又以南平王恪爲武州刺史鎮武陵武陵唐爲朗州至我朝改爲鼎州初邵陵王綸以衡陽王獻爲齊州刺史鎮齊昌任約擊擒之送建康殺之十考異曰梁帝紀在一月今從太清紀獻暢之孫也暢武帝之孫乙亥進矦景位相國封二十郡爲漢王加殊禮岳陽王詧還襄陽自朝魏而還也前已書詧梁王矣今復書詧舊爵以義例言之合改正黎州民攻刺史張賁賁弃城走五代志義城郡梁曰黎州唐之利州是也州民引氐酋北益州刺史楊法琛據黎州魏以武興爲東益州氐王楊氏居之梁盖以爲北益州按下卷楊法琛治平興則梁置北益州於平興也酋慈秋翻命王賈二姓詣武陵王紀請法琛爲刺史紀深責之囚法琛質子崇顒崇虎質音致顒魚容翻冬十月丁丑朔法琛遣使附魏使䟽吏翻己卯齊主至晋陽宫晋陽宫齊獻武王所置唐志晋陽宫在北都之西北宫城周二千五百二十步都城左汾右晋潜丘在中長四千三百二十一步廣三千一百二十二歩周萬五千一百五十三歩汾東曰東城廣武王長弼與并州刺史叚韶不恊齊主將如晋陽長弼言於帝曰韶擁彊兵在彼恐不如人意言恐韶爲變豈可徑徃投之帝不聽既至以長弼語告之曰如君忠誠人猶有讒况其餘乎長弼永樂之弟也髙永樂不内髙昻使之䘮元長弼又䜛叚韶髙歡父子爲失刑矣乙酉以特進元韶爲尚書左僕射叚韶爲右僕射乙未矦景自加宇宙大將軍都督六合諸軍事以詔文呈上上驚曰將軍乃有宇宙之號乎立皇子大鈞爲西陽王大威爲武寧王大球爲建安王大昕爲義安王簫子顒齊志寧蠻府所領有義安郡大摯爲綏建王沈約志宋文帝元嘉十三年立綏建郡於漢南海郡四會縣也大圜爲樂梁樂梁史無所考此時諸王所封皆郡名也當在大同中所分二十餘州不知處所之數考異曰太清紀在十一月十四日今從梁帝紀齊東徐州刺史行臺辛術鎮下邳十一月矦景徴租入建康術帥衆度淮斷之帥讀曰率斷音短燒其榖百萬石遂圍陽平景行臺郭元建引兵救之壬戍術略三千餘家還下邳武陵王紀帥諸軍發成都南考異曰史云十一月壬寅按是月壬子朔無壬寅湘東王繹遣使以書止之曰蜀人勇悍易動難安使疏吏翻易弋䜴翻弟可鎮之吾自當滅賊又别紙曰地擬孫劉各安境界情深魯衛書信恒通地挺孫劉欲吳蜀各爲一國也情深魯衛謂兄弟也恒户登翻甲子南平王恪帥文武拜牋推湘東王繹爲相國總百揆繹不許魏丞相㤗自𢎞農爲橋濟河至建州丙寅齊主自將出頓東城即晉陽之東城也將即亮翻㤗聞其軍容嚴盛歎曰髙歡不死矣㑹乆雨自秋及冬魏軍畜産多死乃自蒲阪還於是河南自洛陽河北自平陽已東皆入于齊邊民見魏師無功齊能自立心無反側疆場遂定丁卯徐文盛軍貝磯任約帥水軍逆戰帥讀曰率文盛大破之斬叱羅子通趙威方仍進軍大舉口水經注江水東過邾縣南東逕白虎磯北又東逕貝磯北又東逕黎磯北北岸烽火洲即舉州也北對舉口舉水出龜頭山逕梁定州城南又逕梁司豫州城東又南歴齊安郡西又東南歴赤亭下分爲二水南流注于江矦景遣宋子仙等將兵二萬助約將即亮翻以約守西陽乆不能進自出屯晋熈府考異曰典略七月景軍次濡須使梁仲宣知留事按典略九月景請梁妃主同宴梁帝紀十月乙未景逼太宗幸西州不容七月已在濡須今因南康王㑹理事見之太清紀梁書典畧晋熙皆作皖口今從南史南康王㑹理以建康空虚與太子左衛將軍柳敬禮西鄉矦勸東鄉矦勔勔彌兖翻謀起兵誅王偉安樂矦乂理出奔長蘆今其州六合縣有長蘆鎮及長蘆寺淳熈十二年徙寺於滁口山之東張舜民曰長蘆鎮在滁河西南集衆得千餘人建安矦賁中宿世子子邕知其謀中宿世子中宿矦之世子也沈約曰中宿漢舊縣屬南海郡吳度屬始興郡以告偉偉収㑹理敬禮勸勔及㑹理弟祁陽矦通理俱殺之沈約曰祁陽縣吳立屬零陵郡梁考異曰典畧云十二月癸未建安矦賁等告㑹理按帝紀十月壬寅景害㑹理今從太清紀乂理爲左右所殺錢塘禇冕以㑹理故舊捶掠千計捶止蘂翻掠音亮終無異言㑹理隔壁謂之曰禇郎卿豈不爲我致此爲于僞翻卿雖忍死明我我心實欲殺賊冕竟不服景乃宥之勸昺之子賁正徳之弟子子邕憺之孫也昺音丙憺徒敢翻又徒濫翻帝自即位以來景防衛甚嚴外人莫得進見見賢遍翻唯武林矦諮及僕射王克舍人殷不害並以文弱得出入卧内帝與之講論而已及㑹理死克不害懼禍稍自疎諮獨不離帝離力智翻朝請無絶景惡之使其仇人刁戍刺殺諮於廣莫門外朝直遥翻惡烏路翻刺七亦翻考異曰太清紀在㑹理死前今從南史帝之即位也景與帝登重雲殿據梁紀重雲殿在華林園項安世曰梁華林園重雲殿前置銅儀重直龍翻禮佛爲誓云自今君臣兩無猜貳臣固不負陛下陛下亦不得負臣及㑹理謀泄景疑帝知之故殺諮帝自知不乆指所居殿謂殷不害曰龐涓當死此下景自帥衆討楊白華于宣城白華力屈而降景以其北人楊白華大眼之子魏胡太后私幸之白華懼禍奔梁帥讀曰率華讀曰花降户江翻全之以爲左民尚書誅其兄子彬以報來亮之怨楊白華殺來亮見上卷太清三年十二月丙子朔景封建安矦賁爲竟陵王中宿世子子邕爲隨王仍賜姓矦氏矦景賞其告㑹理之功也辛丑齊主還鄴自晋陽還也邵陵王綸在汝南脩城池集士卒將圖安陸魏安州刺史馬祐以告丞相㤗五代志安陸郡梁置南司州西魏改曰安州今爲徳安府㤗遣楊忠將萬人救安陸將即亮翻武陵王紀遣潼州刺史楊乾運南梁州刺史譙淹合兵二萬討楊法琛元和郡縣志梓潼郡梁置潼州潼音同法琛𤼵兵據劒閣以拒之矦景還建康自晉熙還也初魏敬宗以爾朱榮爲柱國大將軍柱國大將軍魏初官也世祖以加太尉長孫嵩位在丞相上榮敗此官遂廢大綂三年文帝復以丞相㤗爲之復扶又翻其後功參佐命望實俱重者亦居此官凡八人曰安定公宇文㤗廣陵王欣趙郡公李弼隴西公李虎河内公獨孤信南陽公趙貴常山公于謹彭城公矦莫陳崇謂之八柱國㤗始籍民之才力者爲府兵身租庸調一切蠲之唐府兵之法本諸此凡受田之丁歲輸粟謂之租隨鄉所出每丁嵗輸絹綾絁布緜麻非鄉則歲輸銀謂之調用人之力歲二十日閏加二日不役者日爲絹三尺謂之庸調徒弔翻以農隙講閱戰陳馬畜糧備六家供之合為百府毎府一郎将主之将即亮翻分屬二十四軍泰任總百揆督中外諸軍欣以宗室宿望從容禁闥而已陳讀曰陣從千容翻餘六人各督二大将軍凡十二大将軍武平王元賛淮王元育齊王元廓章郡公宇文導平原郡公矦莫陳順髙陽郡公達奚武陽平公李逺范陽公豆盧寧化政公宇文貴博陵公賀蘭祥陳留公楊忠武威公王雄凡十二人皆使持節大将軍毎大将軍各統開府二人開府各領一軍是後功臣位至柱國大将軍開府儀同三司儀同三司者甚衆率為散官無所統御雖有繼掌其事者聞望皆出諸公之下云散悉亶翻聞音問齊主命散騎侍郎宋景業造天保厯行之時齊主命景業叶圖䜟造天保厯景業奏依握誠圖及元命包言齊受禪之期當魏終之紀得乗三十五以為蔀應六百七十六以為章齊主大悦乃施用之資治通鑑卷一百六十三
