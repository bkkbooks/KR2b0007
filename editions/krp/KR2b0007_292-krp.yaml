body:
  text: 資治通鑑卷二百九十二宋司馬光撰胡三省音註後周紀三起閼逢攝提格五月盡柔兆執徐二月凡一年有竒太祖聖神恭肅文武孝皇帝下顯徳元年五月甲戌朔王逵自潭州遷于朗州以周行逢知潭州事以潘叔嗣爲岳州團練使已而潘叔嗣殺王逵而周行逢收田父漁者之功矣丙子帝至晉陽城下帝自上黨趣晉陽七日而至旗幟環城四十里史言周兵之盛幟昌志翻環音宦楊衮疑北漢代州防禦使鄭處謙貳于周召與計事欲圖之處謙知之不徃衮使胡騎數十守其城門處謙殺之因閉門拒衮衮奔歸契丹契丹主怒其無功囚之處謙舉城來降丁丑置靜塞軍於代州以鄭處謙爲節度使創置方鎭以懐撫鄭處謙處昌吕翻契丹數千騎屯忻代之間爲北漢聲援庚辰遣符彦卿等將步騎萬餘擊之彦卿入忻州契丹退保忻口九域志忻州忻容縣有忻口寨在石嶺闗南丁亥置寧化軍於汾州以石沁二州𨽻之代州將桑珪解文遇殺鄭處謙沁七鴆翻解户買翻姓也姓苑自唐叔虞食邑於解晉有解狐解揚誣奏云潜通契丹符彦卿奏請益兵癸巳遣李筠張宋徳將兵三千赴之契丹㳺騎時至忻州城下丙申彦卿與諸將陳以待之陳讀曰陣史彦超將二十騎爲前鋒二十太少恐當作二千遇契丹與戰李筠引兵繼之殺契丹二千人彦超恃勇輕進去大軍浸逺衆寡不敵爲契丹所殺筠僅以身免周兵死傷甚衆彦卿退保忻州尋引兵還晉陽還從宣翻又如字下同府州防禦使折徳扆將州兵來朝將即亮翻辛丑復置永安軍於府州復扶又翻漢乾祐三年罷永安軍見二百八十九卷以徳扆爲節度使時大發兵夫東自懐孟西及蒲陜以攻晉陽不克㑹久雨士卒疲病乃議引還陜失冉翻之考異曰世宗實録徵懐孟蒲陜丁夫數萬攻城旦夕間期於必取㑹大雨軍士勞苦又聞忻口之師不振帝數日憂沮不食遂决還京之意晉陽見閒錄六月旦周師南轅返斾惟數百騎間之以步卒千人長槍赤甲衍趫捷跳梁於城隅晡晚殺行而抽退今從世宗實録初王得中返自契丹北漢主遣王得中求救於契丹見上卷本年三月值周兵圍晉陽留止代州及桑珪殺鄭處謙囚得中送於周軍帝釋之賜以帶馬問虜兵何時當至得中白臣受命送楊衮他無所求或謂得中曰契丹許公發兵公不以實告契丹兵即至公得無危乎得中太息曰吾食劉氏禄有老母在圍中若以實告周人必發兵據險以拒之如此家國兩亡吾獨生何益不若殺身以全家國所得多矣甲辰帝以得中欺罔縊殺之王得中之死知所惡有甚於死者也乙巳帝發晉陽匡國節度使藥元福言於帝曰進軍易退軍難進軍者或乘初至之銳或乘屢勝之勢敵人畏讋自守不敢迎戰故易退軍者士有歸志敵人據險遮其前率衆躡其後輜重老弱皆足爲吾之累故難易以䜴翻帝曰朕一以委卿元福乃勒兵成列而殿殿丁練翻北漢果出兵追躡元福擊走之然軍還怱遽還從宣翻芻糧數十萬在城下悉焚弃之軍中訛言相驚或相剽掠軍須失亡不可勝計剽匹妙翻凡行軍所欲得以爲用者皆謂之軍須勝音升所得北漢州縣周所置刺史等皆弃城走惟代州桑珪既叛北漢又不敢歸周嬰城自守北漢遣兵攻拔之前所謂都府未拔雖得属郡而無益者要其終也乙酉帝至潞州甲子至鄭州以乙巳發晉陽甲子至鄭州考之中間不應以乙酉至潞州恐是乙夘丙寅謁嵩陵嵩陵復土帝適有軍旅之事不獲親之此其謁陵與彞制謁陵其情有不同者庚午至大梁帝違衆議破北漢自是政事無大小皆親决百官受成於上而已河南府推官髙錫上書諫以爲四海之廣萬機之衆雖堯舜不能獨治治直之翻必擇人而任之今陛下一以身親之天下不謂陛下聰明睿智足以兼百官之任皆言陛下褊迫疑忌舉不信羣臣也褊輔典翻不若選能知人公正者以爲宰相能愛民聴訟者以爲守令守式又翻能豐財足食者使掌金穀能原情守法者使掌刑獄陛下但垂拱明堂視其功過而賞罰之天下何憂不治何必降君尊而代臣職屈貴位而親賤事無乃失爲政之本乎帝不從錫河中人也北漢主憂憤成疾悉以國事委其子侍衛都指揮使承鈞河西節度使申師厚不俟詔擅棄鎭入朝太祖廣順元年申師厚鎭河西事見二百九十卷署其子爲留後秋七月癸酉朔責授率府副率唐制東宫十率府皆有副率其後逐以爲冗散之官申師厚以藩府失職牙將而得節棄鎭擅歸雖加責授猶勝故吾丁丑加吳越王錢𢎞俶天下兵馬都元帥癸巳加門下侍郎同平章事范質守司徒以樞宻直學士工部侍郎長山景範爲中書侍郎同平章事判三司長山漢於陵縣地江左僑置廣川縣及武彊縣隋廢郡改武彊曰長山唐屬淄州九域志在州北五十五里景姓也姓苑云齊景公之後余姑以春秋時言之晉宋皆有景公何獨齊哉加樞宻使同平章事鄭仁誨兼侍中乙未以樞密副使魏仁浦爲樞密使范質既爲司徒司徒竇貞固歸洛陽府縣以民視之府縣謂河南府及洛陽縣也課役皆不免貞固訴於留守向訓訓不聴以竇貞固漢之舊臣故也考古驗今今何足怪初帝與北漢主相距於高平命前澤州刺史李彦崇將兵守江猪嶺遏北漢主歸路彦崇聞樊愛能等南遁引兵退北漢主果自其路遁去八月己酉貶彦崇率府副率己巳廢鎭國軍唐末以華州爲鎭國軍初太祖以建雄節度使王晏有拒北漢之功王晏拒北漢事見二百九十卷太祖廣順元年其鄉里在滕縣徙晏爲武寧節度使武寧軍徐州膝縣屬焉九域志滕縣在州北一百九十里晏少時嘗爲羣盜少詩照翻至鎭悉召故黨贈之金帛鞍馬謂曰吾鄉素名多盜昔吾與諸君皆嘗爲之想後來者無能居諸君之右諸君幸爲我語之使勿復爲幸爲于僞翻下請爲同語牛倨翻復扶又翻爲者吾必族之於是一境清肅九月徐州人請爲之立衣錦碑衣於既翻許之冬十月甲辰左羽林大將軍孟漢卿坐納藁税藁禾稈也塲官擾民多取耗餘塲官藁塲之官耗餘者於納藁束正數之外又多取之言以備耗折也賜死有司奏漢卿罪不至死上曰朕知之欲以懲衆耳己酉廢安逺永清軍唐以安州爲安逺軍晉以貝州爲永清軍初宿衛之士累朝相承務求姑息不欲簡閲恐傷人情由是羸老者居多羸倫爲翻但驕蹇不用命實不可用每遇大敵不走即降其所以失國亦多由此如唐閔帝潞王是也帝因高平之戰始知其弊癸亥謂侍臣曰凡兵務精不務多今以農夫百未能養甲士一奈何浚民之膏澤飬此無用之物乎且健懦不分衆何所勸乃命大簡諸軍精銳者升之上軍羸者斥去之去羌吕翻又以驍勇之士多爲藩鎮所蓄詔募天下壯士咸遣詣闕命太祖皇帝選其尤者爲殿前諸班今之班直是也五代㑹要曰時詔募天下豪傑不以草澤爲阻送於闕下躬親閱試選武藝超絶及有身首者分署爲殿前諸班因有散員散指揮使内殿直散都頭鐵騎控鶴之號其騎步諸軍各命將帥選之帥所類翻由是士卒精彊近代無比征伐四方所向皆㨗選練之力也史言周世宗彊兵之效戊辰帝謂侍臣曰諸道盜賊頗多討捕終不能絶葢由累朝分命使臣巡檢致藩侯守令皆不致力宜悉召還專委節鎭州縣責其清肅河自楊劉至于博州百二十里連年東潰分爲二𣲖匯爲大澤𣲖普拜翻匯户罪翻水回合也彌漫數百里又東北壊古堤而出壊音怪古隄前代所築以防河者河屢徙故古隄在平地灌齊棣淄諸州至于海涯漂没民田廬不可勝計流民採菰稗捕魚以給食勝音升菰音孤蔣也稗旁卦翻草似穀者朝廷屢遣使者不能塞塞悉則翻下同十一月戊戌帝遣李穀詣澶鄆齊按視隄塞役徒六萬三十日而畢北漢主疾病命其子承鈞監國疾甚曰病尋殂年六十云考異曰劉恕世宗實錄薛史帝紀僭僞傳皆云顯徳二年十二月劉崇卒大定錄云顯徳二年春旻病死紀年通譜顯徳二年崇之乾祜八年冬崇死顯徳三年承鈞改元天㑹開寳元年承鈞之天㑹十三年死開寳二年繼元改元廣運興國四年繼元之廣運十一年也河東劉氏有國全無記録惟其舊臣中書舍人直翰林院王保衡歸朝後所纂晉陽偽署見聞要録云甲寅年春南伐敗歸夏周師攻圍旻積憂勞成心疾是冬卒鈞即位丁巳年正月日改乾祐十年爲天㑹元年又云鈞丙戌年二十九承位年四十三卒右諫議大夫楊夢申奉敕撰大漢都紇追封定王劉繼顒神道碑云天㑹十二年今皇帝踐阼之初年也十七年繼顒卒末題廣運元年嵗次甲戌九月丙午朔今按周廣順元年辛亥旻即帝位稱乾祐四年顯徳元年甲寅旻之乾祐七年也旻卒釣改元顯徳四年丁巳鈞改乾祐十年爲天㑹元年宋開寳元年戊辰鈞之十二年也鈞卒繼元立開寳七年甲戌繼元改天㑹十八年爲廣運元年據歴是嵗九月丙午朔興國四年己夘繼元之廣運六年也鈞以唐天成元年丙戌生至顯聽元年甲寅嗣位乃二十九嵗矣釣及繼元踰年未改元盖孟蜀後主漢隠帝周世宗之比也諸書皆傳聞相因前後相戾惟晉陽見聞錄劉繼顒碑歳月最可考證故以爲據遣使告哀于契丹契丹遣驃騎大將軍知内侍省事劉承訓冊命承鈞爲帝更名鈞鈞漢主旻次子也更工衡翻北漢孝和帝性孝謹既嗣位勤於爲政愛民禮士境内粗安粗坐五翻毎上表於契丹主稱男契丹主賜之詔謂之兒皇帝馬希萼之帥羣蠻破長沙也事見二百八十九卷漢隠帝乾祐三年帥讀曰率府庫累世之積皆爲溆州蠻酋苻彦通所掠溆音叙酋慈由翻彦通由是富彊稱王於谿洞間王逵既得湖南去年六月王逵殺劉言始盡得湖南故地事見上卷欲遣使撫之募能往者其將王䖍朗請行既至彦通盛侍衛而見之禮貎甚倨䖍朗厲聲責之曰足下自稱苻秦苖裔苻秦之亡苻宏奔晉從諸桓於荆楚其後無聞彦通自以爲苻秦苗裔葢言出於宏之後宜知禮義有以異於羣蠻昔馬氏在湖南足下祖父皆北面事之今王公盡得馬氏之地足下不早徃乞盟致使者先來又不接之以禮異日得無悔乎言大兵若至雖悔無及彦通慙懼起執䖍朗手謝之䖍朗知其可動因説之曰溪洞之地隋唐之世皆爲州縣著在圖籍說式苪翻溪洞之地隋唐列爲郡縣皆屬黔中道今足下上無天子之詔下無使府之命使府謂湖南都府雖自王於山谷之間王于况翻不過蠻夷一酋長耳酋慈秋翻長知兩翻曷若去王號自歸於王公王公必以天子之命授足下節度使與中國侯伯等夷豈不尊榮哉彦通大喜即日去王號去羌吕翻因䖍朗獻銅鼓數枚於王逵谿洞諸蠻鑄銅爲大鼔初成懸於庭中置酒以招同類豪富子女則以金銀爲大釵執以扣鼔竟乃留遺主人名爲銅鼔釵俗好相殺多搆仇怨欲相攻則鳴此鼔至者如雲逵曰䖍朗一言勝數萬兵真國士也承制以彦通爲黔中節度使黔中自唐末至二蜀爲武泰軍節度黔其今翻以䖍朗爲都指揮使預聞府政預聞湖南都府之政逵慮西界鎭遏使錦州刺史劉瑫爲邊患王逵之逐邊鎬也以劉瑫鎭遏羣蠻表爲鎭南節度副使鎭南軍洪州属唐王逵表以其號寵劉瑫耳充西界都招討使是嵗湖南大饑民食草木實武清節度使知潭州事周行逢自彭師暠等擁立馬希萼於衡山自署武清節度使王逵因之以授周行逢開倉以賑之全活甚衆行逢起於㣲賤知民間疾苦勵精爲治嚴而無私治直吏翻辟署僚屬皆取廉介之士約束簡要其自奉甚薄或譏其太儉行逢曰馬氏父子窮奢極靡不恤百姓今子孫乞食於人又足效乎爲行逢跨有潭朗張本世宗睿武孝文皇帝上諱榮本姓柴氏邢州龍岡人柴氏女適太祖是爲聖穆皇后后兄守禮生帝從姑長於太祖家以謹厚見愛太祖遂以爲子顯徳二年春正月庚辰上以漕運自晉漢以來不給斗耗綱吏多以虧欠抵死詔自今每斛給耗一斗定難節度使李彛興李彛興即彛殷也避宋朝宣祖廟諱始改名彛興史以後來所更名書之難乃旦翻以折徳扆亦爲節度使與已並列恥之夏州自唐以來爲縁邊大鎭李氏又世襲節度使府州漢氏方置節鎭折氏父子又晚出故恥與並列塞路不通周使塞悉則翻癸未上謀於宰相對曰夏州邊鎭朝廷向來每加優借府州褊小得失不繫重輕且宜撫諭彛興庻全大體上曰徳扆數年以來盡忠戮力以拒劉氏奈何一旦棄之且夏州惟産羊馬貿易百貨悉仰中國貿音茂仰牛向翻我若絶之彼何能爲乃遣供奉官齊藏珍齎詔書責之風俗通云凡氏之興九事氏於國者齊魯宋衛是也余按左傳衛有大夫齊氏此豈氏於國乎彛興惶恐謝罪戊子蜀置威武軍於鳯州辛夘初令翰林學士兩省官舉令錄除官之日仍署舉者姓名若貪穢敗官並當連坐敗補邁翻契丹自晉漢以來屢冦河北輕騎深入無藩籬之限郊野之民每困殺掠言事者稱深冀之間有胡盧河横亘數百里可浚之以限其奔突胡盧河俗謂之葫盧河即衡漳水在東光縣西三十里是月詔忠武節度使王彦超彰信節度使韓通周改曹州威信軍爲彰信軍避太祖諱也將兵夫浚胡盧河築城於李晏口留兵戍之冀州蓚縣東北有李晏鎭時築城屯軍以爲靜安軍按薛史其軍南距冀州百里北距深州三十里夾胡盧河爲壘將即亮翻帝召徳州刺史張藏英問以備邊之策藏英具陳地形要害請列置戍兵募邊人驍勇者厚其稟給自請將之隨便宜討擊帝皆從之以藏英爲㳂邊巡檢招牧都指揮使藏英到官數月募得千餘人王彦超等行視役者行下孟翻嘗爲契丹所圍藏英引所募兵馳擊大破之自是契丹不敢渉胡盧河河南之民始得休息此河南謂胡盧河之南也二月庚子朔日有食之蜀䕫恭孝王仁毅卒仁毅蜀主之弟也壬戌詔羣臣極言得失其畧曰朕於卿大夫才不能盡知面不能盡識若不采其言而觀其行行下孟翻審其意而察其忠則何以見器略之淺深知任用之當否當丁浪翻若言之不入罪實在予茍求之不言咎將誰執唐主以中書侍郎知尚書省嚴續爲門下侍郎同平章事三月辛未以李晏口爲静安軍帝常憤廣明以來中國日蹙唐僖宗廣明元年黄巢入長安自此之後彊藩割據中國日蹙矣及高平既㨗慨然有削平天下之志㑹秦州民夷有詣大梁獻策請恢復舊疆者以唐全盛版圖言之蜀亦舊疆也以漢晉事言之則契丹入中原重以王景崇之亂階成秦鳯遂入於蜀帝納其言爲取階成秦鳯張本蜀主聞之遣客省使趙季札按視邊備季札素以文武才畧自任使還奏稱雄武節度使韓繼勲蜀置雄武節度於秦州使疏吏翻還從宣翻又如字鳯州刺史王萬迪非將帥才不足以禦大敵蜀主問誰可徃者季札請自行丙申以季札爲雄武監軍使仍以宿衛精兵千人爲之部曲帝以大梁城中迫隘隘烏懈翻夏四月乙夘詔展外城先立標幟幟昌志翻俟今冬農隙興板築東作動則罷之更俟次年以漸成之且令自今葬埋皆出所標七里之外其標内俟縣官分畫街衢倉塲營廨之外廨古隘翻聴民隨便築室丙辰蜀主命知樞密院王昭逺按行北邊城寨及甲兵以備周也行下孟翻上謂宰相曰朕每思致治之方未得其要寢食不忘治直吏翻又自唐晉以來吳蜀幽幷皆阻聲教未能混一吳李氏蜀孟氏幽入於契丹并爲北漢宜命近臣著爲君難爲臣不易論及開邊策各一篇朕將覽焉比部郎中王朴獻策比音毗以爲中國之失吳蜀幽幷皆由失道梁失吳後唐得蜀而復失之晉失幽周失幷今必先觀所以失之之原然後知所以取之之術其始失之也莫不以君暗臣邪兵驕民困姦黨内熾武夫外横横户孟翻因小致大積㣲成著今欲取之莫若反其所爲而已夫進賢退不肖所以收其才也恩隠誠信所以結其心也隠䘏也賞功罰罪所以盡其力也去奢節用所以豐其財也去羌吕翻時使薄斂所以阜其民也時使使之以時歛力贍翻俟羣才既集政事既治財用既充士民既附然後舉而用之功無不成矣彼之人觀我有必取之勢則知其情狀者願爲間諜知其山川者願爲鄉導間古莧翻下伺間同諜達協翻鄉讀曰嚮民心既歸天意必從矣凡攻取之道必先其易者唐與吾接境幾二千里其勢易擾也唐與中國以淮爲境自淮源東至海幾二千里易以䜴翻擾之當以無備之處爲始備東則擾西備西則擾東彼必奔走而救之奔走之間可以知其虚實彊弱然後避實擊虚避彊擊弱未須大舉且以輕兵擾之南人懦怯聞小有警必悉師以救之師數動則民疲而財竭數所角翻不悉師則我可以乘虚取之如此江北諸州將悉爲我有帝之取江北王朴之計也既得江北則用彼之民行我之法江南亦易取也得江南則嶺南巴蜀可傳檄而定時劉氏據嶺南孟氏據巴蜀王朴欲乘勝勢以先聲下之南方既定則燕地必望風内附時契丹跨有燕地燕於賢翻若其不至移兵攻之席卷可平矣卷讀如捲凡兵之動知敵之主此以其時契丹主言之也惟河東必死之冦言北漢據河東與周為世仇也不可以恩信誘誘音酉當以彊兵制之然彼自高平之敗事見上卷上年三月力竭氣沮必未能為邊患宜且以為後圖俟天下既平然後伺間一舉可擒也是後世宗用兵以至宋朝削平諸國皆如王朴之言惟幽燕不可得而取至於宣和則舉國以殉之矣伺相吏翻今士卒精練甲兵有備羣下畏法諸將効力期年之後可以出師期讀曰朞宜自夏秋蓄積實邊矣蓄積於邊上以為用兵之備上欣然納之時羣臣多守常偷安所對少有可取者少詩沼翻惟朴神峻氣勁有謀能㫁㫁丁亂翻凡所規畫皆稱上意稱尺證翻上由是重其器識未幾遷左諌議大夫知開封府事開封在輦轂下事繁職重史言世宗屬任王朴自此而重然朴先事上於濳藩其君臣相得亦有素矣上謀取秦鳯求可將者將即亮翻王溥薦宣徽南院使鎭安節度使向訓五代㑹要漢天福十二年廢陳州鎭安軍周廣順二年復上命訓與鳯翔節度使王景客省使高唐昝居潤偕行高唐縣屬愽州九域志縣在州東北一百七十里昝姓也音子感翻五月戊辰朔景出兵自散闗趣秦州趣七喻翻勑天下寺院非勑額者悉廢之勑額者勑賜寺額如慈恩安國興唐之類禁私度僧尼凡欲出家者必俟祖父母父母伯叔之命惟兩京大名府唐以魏州為鄴都興唐府晉改為廣晉府大名府盖漢所改也京兆府青州聽設戒壇戒壇僧尼受戒之所禁僧俗捨身㫁手足煉指掛燈帶鉗之類幻惑流俗者煉指者束香於指而燃之掛燈者裸體以小鐵鈎徧鈎其膚凡鈎皆掛小燈圏燈盞貯油而燃之俚俗謂之燃肉身燈今人帶布枷以化誘流俗者亦幻惑之餘蔽㫁音短幻户辦翻令兩京及諸州每嵗造僧帳有死亡歸俗皆隨時開落是嵗天下寺院存者二千六百九十四廢者三萬三百三十六見僧四萬二千四百四十四尼一萬八千七百五十六見賢遍翻王景等㧞黄牛八寨黄牛等八寨皆當在秦州界戊寅蜀主以捧聖控鶴都指揮使保寧節度使李廷珪為北路行營都統蜀以秦鳳為北路左衛聖步軍都指揮使高彦儔為招討使武寧節度使吕彦珂副之武寧軍徐州屬周吕彦珂遙領也珂􅉌何翻客省使趙崇韜為都監蜀趙季札至徳陽聞周師入境懼不敢進徳陽縣屬漢州去成都未逺已懼而不敢進上書求解邊任還奏事先遣輜重及妓妾西歸重直用翻妓渠綺翻丁亥單騎馳入成都衆以為奔敗莫不震恐蜀主問以機事皆不能對蜀主怒繫之御史臺庚午斬之於崇禮門趙季札雖誅無救於秦鳳之䘮失是以用人當審之於其初也六月庚子上親録囚於内苑有汝州民馬遇父及弟為吏所寃死屢經覆按不能自伸上臨問始得其實人以為神由是諸長吏無不親察獄訟史言帝明謹於庻獄長知兩翻壬寅西師與蜀李廷珪等戰于威武城東不利威武城前蜀所築也在鳳州東北排陳使濮州刺史胡立等為蜀所擒陳讀曰陣濮博木翻丁未蜀主遣間使如北漢及唐間古莧翻使䟽吏翻欲與之俱出兵以制周北漢主唐主皆許之己酉以彰信節度使韓通充西南行營馬步軍都虞候戊午南漢主殺禎州節度使通王𢎞政禎州漢博羅縣之地梁置梁化郡隋置循州治歸善縣唐因之至南唐改唐之河源縣為龍川縣徙循州治焉以循州舊治歸善縣置禎州宋朝避仁宗諱改曰惠州九域志循州南至惠州三百里於是高祖之諸子盡矣南漢主龑廟號高祖壬戌以樞密院承㫖清河張美為右領軍大將軍權㸃檢三司事清河縣帶貝州權㸃檢三司事未除為正使初帝在澶州美掌州之金榖𨽻三司者帝或私有所求美曲為供副供副者供辦以應副所求澶時連翻太祖聞之怒恐傷帝意但徙美為濮州馬步軍都虞候濮博木翻美治財精敏當時鮮及治直之翻鮮息淺翻故帝以利權授之然思其在澶州所為終不以公忠待之自漢以來能如此者呉主孫權及周世宗而已秋七月丁卯朔以王景兼西南行營都招討使向訓兼行營兵馬都監宰相以景等乆無功饋運不繼固請罷兵帝命太祖皇帝往視之還言秦鳳可取之狀還從宣翻又如字帝從之八月丁未中書侍郎同平章事景範罷判三司尋以父䘮罷政事王景等敗蜀兵敗補邁翻獲將卒三百己未蜀主遣通奏使知樞密院武泰節度使伊審徵如行營慰撫仍督戰帝以縣官久不鑄錢而民間多銷錢為器皿及佛像錢益少九月丙寅朔敇始立監采銅鑄錢自非縣官法物軍器及寺觀鐘磬鈸鐸之類觀古玩翻鈸蒲撥翻聴留外句㫁自餘民間銅器佛像五十日内悉令輸官給其直過期隠匿不輸五觔以上其罪死不及者論刑有差輸舂遇翻時勅有隠藏銅器及埋窖使用者一兩至一觔徙二年一觔至五觔處死若納到熟銅每觔官給錢一百五十生銅每觔一百上謂侍臣曰卿輩勿以毁佛為疑夫佛以善道化人茍志於善斯奉佛矣彼銅像豈所謂佛邪且吾聞佛在利人雖頭目猶捨以布施施式䜴翻若朕身可以濟民亦非所惜也臣光曰若周世宗可謂仁矣不愛其身而愛民若周世宗可謂明矣不以無益廢有益蜀李廷珪遣先鋒都指揮使李進據馬嶺寨又遣竒兵出斜谷屯白澗九域志鳯州梁泉縣有白澗鎭又分兵出鳯州之北唐倉鎭及黄花谷絶周糧道黄花鎭亦在梁泉縣界有黄花川大散水入焉閏月王景遣裨將張建雄將兵二千抵黄花又遣千人趣唐倉扼蜀歸路趣七喻翻蜀染院使王巒將兵出唐倉與建雄戰於黄花蜀兵敗奔唐倉遇周兵又敗虜巒及其將士三千人馬嶺白澗兵皆潰李廷珪高彦儔等退保青泥嶺蜀雄武節度使兼侍中韓繼勲棄秦州奔還成都觀察判官趙玭舉城降斜谷援兵亦潰玭蒲眠翻年考異曰十國紀玭召官屬告之曰周兵無敵今朝廷所遣勇將精兵不死即逃我輩不能去危就安禍且至矣衆皆聴命舉城叛降周斜谷援兵亦潰五代通録官軍之圍鳯州偽秦州節度使高處儔引兵往復援之中塗聞黄花之敗奔秦州玭與城中將校閉門不納處儔遂西奔玭即以城歸國今從實録成階二州皆降蜀人震恐玭澶州人也澶時連翻帝欲以玭為節度使范質固爭以為不可乃以為郢州刺史壬子百官入賀帝舉酒屬王溥曰邊功之成卿擇帥之力也屬之欲翻擇帥事見上四月帥所類翻甲子上與將相食於萬嵗殿因言兩日大寒朕於宫中食珍膳深愧無功於民而坐享天禄既不能躬耕而食惟當親冒矢石為民除害差可自安耳冒莫北翻為于偽翻差之為言稍也乙丑蜀李廷珪上表待罪冬十月壬申伊審徵至成都請罪皆以蹙國䘮帥也蜀主致書於帝請和自稱大蜀皇帝帝怒其抗禮不答蜀主愈恐聚兵糧於劒門白帝為守禦之備守劒門以備北兵之自岐雍來者守白帝以備北兵之泝峽而上者募兵既多用度不足始鑄鐵錢𣙜境内鐵器民甚苦之𣙜古岳翻唐主性和柔好文章而喜人佞已好呼到翻喜許記翻由是諂諛之臣多進用諂諛之臣謂馮延己兄弟魏岑陳覺等政事日亂既克建州破湖南克建州見二百八十四卷晉開運二年破湖南見二百九十卷太祖廣順二年益驕有吞天下之志李守貞慕容彦超之叛皆為之出師遙為聲援援李守貞見二百八十八卷漢隠帝乾祐元年乂援慕容彦超見二百九十卷太祖廣順二年皆為于偽翻又遣使自海道通契丹及北漢約共圖中國值中國多事未暇與之校先是每冬淮水淺涸唐人常發兵戍守謂之把淺先悉薦翻把淺之處自霍􅉌以上西盡光州界壽州監軍吳廷紹以為疆埸無事坐費資糧悉罷之史先叙唐所以蹙國之由埸音亦清淮節度使劉仁贍上表固爭不能得十一月乙未朔帝以李榖為淮南道前軍行營都部署兼知廬壽等行府事以忠武節度使王彦超副之督侍衛馬軍都指揮使韓令坤等十二將以伐唐令坤磁州武安人也磁詳之翻汴水自唐末潰决自埇橋東南悉為汚澤上謀擊唐先命武寧節度使武行徳發民夫因故堤疏導之自埇橋東南抵唐境皆武寧廵屬也埇余拱翻東至泗上議者皆以為難成上曰數年之後必獲其利謂淮南既平藉以通漕將獲其利也丁未上與侍臣論刑賞上曰朕必不因怒刑人因喜賞人先是大梁城中民侵街衢為舍通大車者葢寡先悉薦翻上命悉直而廣之廣者至三十步此言横廣也又遷墳墓於標外立標幟見上四月上曰近廣京城於存没擾動誠多怨謗之語朕自當之他日終為人利世宗志識宏逺不顧人言然仁人不忍為也王景等圍鳯州韓通分兵城固鎭以絶蜀之援兵戊申克鳯州擒蜀威武節度使王環是年正月蜀置威武節度於鳯州及都監趙崇溥等將士五千人崇溥不食而死環真定人也蜀將士多中原人盖後唐遣之戍蜀為孟知祥所留者也乙夘制曲赦秦鳯階成境内所獲蜀將士願留者優其俸賜願去者給資裝而遣之詔曰用慰衆情免違物性其四州之民二税徵科之外凡蜀人所立諸色科徭悉罷之唐人聞周兵將至而懼劉仁贍神氣自若部分守禦無異平日衆情稍安劉仁贍之善守於此已見其方畧分扶問翻唐主以神武統軍劉彦貞為北靣行營都部署將兵二萬趣壽州趣七喻翻奉化節度使同平章事皇甫暉為應援使唐置奉化軍於江州常州團練使姚鳯為應援都監將兵三萬屯定逺舊唐書地理志曰定逺漢曲陽縣地隋置定逺縣唐屬濠州九域志在州南八十里召鎭南節度使宋齊丘還金陵謀國難還從宣翻又如字難乃旦翻以翰林承㫖户部尚書殷崇義為吏部尚書知樞密院李榖等為浮梁自正陽濟淮十二月甲戌榖奏王彦超敗唐兵二千餘人於壽州城下敗補邁翻下同己夘又奏先鋒都指揮使白延遇敗唐兵千餘人於山口鎭此時唐蓋置鎭於六安山口按薛史本紀顯徳四年劉重遇奏殺紫金山潰兵三千人於壽州東山口又疑置鎭於此地未知孰是丙戌樞密使兼侍中韓忠正公鄭仁誨卒上臨其䘮近臣奏稱嵗道非便上曰君臣義重何日時之有往哭盡哀吳越王𢎞俶遣元帥府判官陳彦禧入貢朝廷授𢎞俶天下都元帥故置元帥府判官帝以詔諭𢎞俶使出兵擊唐使出兵常州以擊之則唐有反顧之憂為吳越兵為唐所敗張本三年春正月丙午以王環為右驍衛大將軍賞其不降也以王環堅守鳯州城陷而後就擒也丁酉李榖奏敗唐兵千餘人於上窑窑餘招翻又作窯戊戌發開封府曹滑鄭州之民十餘萬築大梁外城曹滑鄭皆近京之州九域志開封府西至鄭州界一百一十五里北至滑州界一百里東北至曹州界一百四十五里陳許亦近郡而不發者以方征淮南道上供億故也庚子帝下詔親征淮南以宣徽南院使鎭安節度使向訓權東京留守端明殿學士王朴副之彰信節度使韓通權㸃檢侍衛司及在京内外都廵檢命侍衛都指揮使歸徳節度使李重進將兵先赴正陽河陽節度使白重賛將親兵三千屯潁上潁上縣隋置唐屬潁州九域志在州東一百一十七里宋白曰潁上縣漢慎縣也南北畫淮為守闗防莫謹於此隋大業二年於今縣南故鄭城置潁上縣以地枕潁水上游為名壬寅帝發大梁李榖攻壽州久不克唐劉彦貞引兵救之至來逺鎭九域志壽州安豐縣有來逺鎭今按來逺鎭即東正陽西至渒河十里距壽州二百里又以戰艦數百艘趣正陽趣七喻翻下同為攻浮梁之勢李榖畏之召將佐謀曰我軍不能水戰若賊㫁浮梁㫁音短則腹背受敵皆不歸矣不如退守浮梁以待車駕上至圉鎭九域志開封雍丘縣有圉城鎭聞其謀亟遣中使乘驛止之比至比必利翻及也已焚芻糧退保正陽丁未帝至陳州九域志開封府南至陳州三百三十里亟遣李重進引兵趣淮上辛亥李榖奏賊艦中流而進弩礮所不能及艦户黯翻礮與砲同普教翻若浮梁不守則衆心動搖須至退軍今賊艦日進淮水日漲奏水方生故李榖慮淮水日漲若車駕親臨萬一糧道阻絶其危不測願陛下且駐蹕陳潁陳潁二州名俟李重進至臣與之共度賊艦可禦浮梁可完立具奏聞度徒洛翻先為不可勝以待敵之可勝李榖之退未為失計也但若厲兵秣馬春去冬來足使賊中疲弊取之未晩帝覧奏不悦劉彦貞素驕貴無才畧不習兵所歴藩鎭專為貪暴積財巨億以賂權要萬萬為億億億為巨億詩所謂萬億及秭孔頴達所謂大數也由是魏岑等爭譽之譽音余以為治民如龔黄用兵如韓彭龔遂黄覇漢之良吏韓信彭越漢之良將治直之翻故周師至唐主首用之其禆將咸師朗等皆勇而無謀聞李榖退喜引兵直抵正陽旌旗輜重數百里重直用翻劉仁贍及池州刺史張全約固止之仁贍曰公軍未至而敵人先遁是畏公之威聲也安用速戰萬一失利則大事去矣彦貞不從既行仁贍曰果遇必敗乃益兵乘城為備以城中戰兵乘城益守兵李重進度淮逆戰於正陽東大破之淮水西岸謂之西正陽屬潁州潁上縣界東岸謂之東正陽屬夀州下蔡縣界此據九域志地里斬彦貞生擒咸師朗等斬首萬餘級伏尸三十里收軍資器械三十餘萬是時江淮久安民不習戰彦貞既敗唐人大恐張全約収餘衆奔壽州劉仁贍表全約為馬步左廂都指揮使皇甫暉姚鳳退保清流闗梁置南譙州於桑根山之陽在滁州清流縣西南八十里隋始置清流縣唐為滁州治所清流闗在縣西南二十餘里南唐所置也滁州刺史王紹顔委城走壬子帝至永寕鎮九域志黄州麻城縣有永寕鎮此非也麻城在夀州西南數百里帝猶未度淮安得至麻城之永寕邪又考九域志潁州汝隂縣有永寕鎮又東百餘里至正陽此則是也謂侍臣曰聞夀州圍解農民多歸村落今聞大軍至必復入城憐其聚為餓殍復扶又翻殍被表翻宜先遣使存撫各令安業甲寅帝至正陽以李重進代李榖為淮南道行營都招討使以榖判夀州行府事宋敏求曰凡節度州為三品刺史州為五品國初曹翰以觀察使判潁州是以四品臨五品州也同品為知隔品為判自後唯輔臣宣徽使太子太保僕射為判餘並為知州丙辰帝至夀州城下營於淝水之陽淝水自安豐縣界流入夀春縣界經夀春城北入於淮去城二里水北為陽命諸軍圍夀州徙正陽浮梁於下蔡鎮唐潁州有下蔡縣時廢縣為鎮西抵正陽五十五里丁巳徴宋亳陳潁徐宿許蔡等州丁夫數十萬以攻城晝夜不息唐兵萬餘人維舟於淮營於塗山之下塗山在濠州本塗山氏之邑禹㑹諸侯處也今在鍾離縣西九十五里濵淮有漢當塗縣故城南北朝兵爭之際為馬頭郡城淮水逕城北而東流渦水自西北來注於淮謂之渦口南岸正對馬頭城庚申帝命太祖皇帝擊之太祖皇帝遣百餘騎薄其營而偽遁伏兵邀之大敗唐兵於渦口敗補邁翻渦音戈斬其都監何延錫等奪戰艦五十餘艘艘蘇遭翻詔以武平節度使兼中書令王逵為南面行營都統使攻唐之鄂州逵引兵過岳州岳州團練使潘叔嗣厚具燕犒奉事甚謹逵左右求取無厭犒苦到翻厭於鹽翻不滿望者譖叔嗣於逵云其謀叛逵怒形於詞色叔嗣由是懼而不自安為潘叔嗣殺王逵張本唐主聞湖南兵將至命武昌節度使何敬洙徙民入城為固守之計敬洙不從使除地為戰場曰敵至則與軍民俱死於此耳何敬洙為將亦唐之良也因王逵有潘叔嗣之難又以成其名唐主善之二月丙寅下蔡浮梁成上自往視之戊辰廬夀光黄巡檢使司超司姓也左傳鄭有司臣奏敗唐兵三千餘人於盛唐敗補邁翻盛唐本唐初之霍山縣也開元二十七年更名盛唐屬夀州宋朝開寳四年改為六安縣九域志六安縣在夀州南二百一十里擒都監髙弼等獲戰艦四十餘艘上命太祖皇帝倍道襲清流關皇甫暉等陳於山下陳讀曰陣方與前鋒戰太祖皇帝引兵出山後暉等大驚走入滁州宋白曰滁州之地劉宋為新昌郡梁立南譙州於桑根山西今州西南十八里南譙故城是也北齊自南譙徙新昌滁郡今州城是也隋廢州以其地為清流縣唐為州欲斷橋自守斷音短太祖皇帝躍馬麾兵涉水直抵城下暉曰人各為其主為于偽翻願容成列而戰皇甫暉受唐莊宗畜養之恩一旦作亂莊宗以之喪亡棄中國而奔江南委質於唐乃言人各為其主葢兵鋒所迫倉皇失措為是言以欵敵耳太祖皇帝笑而許之太祖自審智勇足以辦皇甫暉故許之暉整衆而出太祖皇帝擁馬頸突陳而入陳讀曰陣大呼曰吾止取皇甫暉它人非吾敵也手劍擊暉中腦生擒之呼火故翻手式又翻中竹仲翻并擒姚鳯遂克滁州後數日宣祖皇帝為馬軍副都指揮使宣祖諱𢎞殷引兵夜半至滁州城下傳呼開門太祖皇帝曰父子雖至親城門王事也不敢奉命史言太祖勇於戰謹於守上遣翰林學士竇儀籍滁州帑藏帑它朗翻藏徂浪翻下同太祖皇帝遣親吏取藏中絹儀曰公初克城時雖傾藏取之無傷也今既籍為官物非有詔書不可得也竇儀有守太祖皇帝由是重儀太祖之識度豈一時將帥所能及哉詔左金吾衛將軍馬崇祚知滁州初永興節度使劉詞遺表薦其幕僚薊人趙普有才可用㑹滁州平范質薦普為滁州軍事判官太祖皇帝與語悦之時獲盜百餘人皆應死普請先訊鞫然後决所活十七八太祖皇帝益竒之太祖重竇儀竒趙普皆在潛躍之時普自此為佐命元功儀乃為普所忌而不至相位太祖皇帝威名日盛每臨陳必以繁纓飾馬鎧仗鮮明或曰如此為敵所識陳讀曰陣繁蒲官翻太祖皇帝曰吾固欲其識之耳唐主遣泗州牙將王知朗齎書抵徐州稱唐皇帝奉書大周皇帝請息兵修好願以兄事帝嵗輸貨財以助軍費好呼到翻輸舂遇翻甲戌徐州以聞九域志泗州西北至徐州七百五十里王知朗不敢詣軍前而扺徐州恐犯兵鋒而死也帝不答以唐主猶敢抗禮欲為兄弟之國也戊寅命前武勝節度使侯章等攻夀州水寨决其壕之西北隅導壕水入于淝太祖皇帝遣使獻皇甫暉等暉傷甚見上卧而言曰臣非不忠於所事但士卒勇怯不同耳臣曏日屢與契丹戰皇甫暉本魏兵唐莊宗使戍瓦橋拒契丹因而作亂其自謂屢與契丹戰葢戍瓦橋時也未嘗見兵精如此因盛稱太祖皇帝之勇上釋之後數日卒帝詗知揚州無備詗古永翻又翾正翻己卯命韓令坤等將兵襲之戒以毋得殘民其李氏陵寢遣人與李氏人共守䕶之唐主兵屢敗懼亡乃遣翰林學士户部侍郎鍾謨工部侍郎文理院學士李徳明奉表稱臣來請平獻御服湯藥及金器千兩銀器五千兩繒錦二千匹繒慈陵翻犒軍牛五百頭酒二千斛壬午至夀州城下謨徳明素辯口上知其欲遊説犒苦到翻説式芮翻下欲説同盛陳甲兵而見之曰爾主自謂唐室苗裔南唐祖唐太宗之子呉王恪宜知禮義異於他國與朕止隔一水謂南唐與周以淮為界未嘗遣一介修好好呼到翻惟泛海通契丹捨華事夷禮義安在自徐温執呉政屢泛海使契丹欲與共圖中國至唐烈祖及今主皆然且汝欲説我令罷兵邪我非六國愚主豈汝口舌所能移邪言六國皆愚主故蘇張得行其遊説使遇英明之君雖辯如蘇張不能移也可歸語汝主語牛倨翻亟來見朕再拜謝過則無事矣不然朕欲觀金陵城借府庫以勞軍勞力到翻汝君臣得無悔乎謨徳明戰栗不敢言呉越王𢎞俶遣兵屯境上以俟周命蘇州營田指揮使陳滿言於丞相呉程曰周師南征唐舉國驚擾常州無備易取也九域志蘇州西北至常州一百八十餘里易以䜴翻㑹唐主有詔撫安江隂吏民江隂縣本晉毗陵之暨陽縣也江左分置蘭陵縣梁敬帝時常置江隂郡及江隂縣隋廢唐置暨州南唐始置江隂軍九域志在常州東北九十里滿告程云周詔書已至程為之言於𢎞俶為于偽翻請亟發兵從其策丞相元徳昭曰唐大國未可輕也若我入唐境而周師不至誰與并力能無危乎請姑俟之程固爭以為時不可失𢎞俶卒從程議卒子恤翻癸未遣程督衢州刺史鮑修讓中直都指揮使羅晟趣常州趣七喻翻程謂將士曰元丞相不欲出師將士怒流言欲擊徳昭呉越將士狃福州之勝謂唐之可乗也兵驕者破豈虚言哉𢎞俶匿徳昭于府中令捕言者歎曰方出師而士卒欲擊丞相不祥甚哉乙酉韓令坤奄至揚州平旦先遣白延遇以數百騎馳入城城中不之覺令坤繼至唐東都營屯使賈崇焚官府民舎棄城南走副留守工部侍郎馮延魯髠髮被僧服匿于佛寺唐以揚州為東都故置留守髠苦昆翻被皮義翻軍士執之令坤慰撫其民使皆安堵庚寅王逵奏拔鄂州長山寨長山在鄂州南界唐立寨以備潭朗執其將陳澤等獻之辛卯太祖皇帝奏唐天長制置使耿謙降唐天寶元年分江都六合髙郵三縣地置千秋縣七載改名天長九域志天長縣在揚州西一百一十里獲芻糧二十餘萬唐主遣園苑使尹延範如泰州梁有宫苑使又有内園栽接使唐置園苑使亦猶是也遷呉讓皇之族于潤州晉天福四年唐烈祖自潤州遷讓皇之族于泰州今以周師攻逼復遷潤州延範以道路艱難恐楊氏為變盡殺其男子六十人還報唐主怒腰斬之韓令坤等攻泰州拔之南唐升海陵鎮為泰州九域志揚州東至泰州一百一十五里刺史方訥奔金陵自泰州南奔泰興縣度江取潤州至金陵唐主遣人以蠟丸求救于契丹壬辰靜安軍使何繼筠獲而獻之去年帝置靜安軍于李晏口以給事中髙防權知泰州癸巳呉越王𢎞俶遣上直都指揮使路彦銖攻宣州羅晟帥戰艦屯江隂唐靜海制置使姚彦洪帥兵民萬人奔呉越帥讀曰率南唐于海陵之東境置靜海都鎮制置院周取其地置靜海軍尋升為通州通州南至大江二十四里絶江而南即呉越之蘇州界潘叔嗣屬將士而告之曰吾事令公至矣屬之欲翻集㑹也王逵兼中書令故稱為令公今乃信䜛疑怒軍還必擊我吾不能坐而待死汝輩能與吾俱西乎衆憤怒請行叔嗣帥之西襲朗州九域志岳州西至朗州五百五十里帥讀曰率逵聞之還軍追之及于武陵城外朗州武陵郡與叔嗣戰逵敗死奉考異曰湖湘故事云王逵詔伐呉有蜜蜂無萬數集逵繖葢周行逢内喜潛與潘叔嗣張文表等謀曰我覩王公妖怪入繖他時忽落别人之手我輩處身何地我等若三人同心共保馬氏舊基同處富貴豈不是男兒哉叔嗣文表聞行逢之言已㑹深意遂乃拜受此語各散歸營廣本逵命行營副使毛立為袁州營統軍使潘叔嗣張文表為前鋒軍次醴陵縣吏請具牛酒犒軍立不許叔嗣文表因士卒之怒縛立送于行逢以兵叛逵逵大懼乗輕舟奔朗州叔嗣追至朗州殺之湖湘故事逵連夜走歸朗州去經數日潘叔嗣始到潭州既聞王逵走歸朗州亦以舟楫倍程而趨至朗州殺之今按世宗實録顯徳三年二月丙寅朗州王逵言領大軍入淮南界庚寅言入鄂州界攻下長山寨癸巳荆南髙保融言進逵自鄂州領兵復歸本道又云潘叔嗣為先鋒行及鄂州叔嗣囘戈襲武陵進逵聞之倍道先入武陵叔嗣攻其城進逵敗走為叔嗣所殺又云三月壬寅進逵差牙將押送淮南將陳澤等葢進逵未敗前奏事三月始逵行在與薛史承襲傳及湖南傳記略同惟湖湘故事及丁璹馬氏行事記載逵攻袁州叔嗣叛之丁璹云逵三月至潭州四月叔嗣叛丁璹云五月五日叔嗣殺逵于朗州皆妄也周行逢據湖南仕進尚門䕃衍屢獻文章不得調退居鄉里教授及張文表叛辟為幕職事敗逃遁㑹赦乃敢出窮困無以自進採摭故事撰湖湘馬氏故事二十卷如京師獻之太宗憫其窮且老授將作監丞衍本小人言辭鄙俚非有意著書故叙事顛倒前後自相違背以無為有不可勝數素怨周行逢尤多誣毁不欲行逢不預叔嗣之謀乃妄造此説凡載行逢罪惡之甚者皆出于衍云璹亦國初人疑其説得于衍書皆不可為據今從十國紀年或勸叔嗣遂據朗州叔嗣曰吾救死耳安敢自尊宜以督府歸潭州太尉時湖湘以朗州為督府潭州太尉謂周行逢也豈不以武安見處乎言行逢必將以潭州處已處昌吕翻乃歸岳州使團練判官李簡潘叔嗣為岳州團練使判官其屬也帥朗州將吏迎武安節度使周行逢帥讀曰率下同衆謂行逢必以潭州授叔嗣謂告也語也行逢曰叔嗣賊殺主帥罪當族所可恕者得武陵而不有以授吾耳若遽用為節度使天下謂我與之同謀何以自明宜且以為行軍司馬俟踰年授以節鉞可也觀此則周行逢本有奉辭討潘叔嗣之心以其迎已故不發耳乃以衡州刺史莫𢎞萬權知潭州帥衆入朗州自稱武平武安留後告于朝廷行逢欲兼有潭朗也以叔嗣為行軍司馬叔嗣怒稱疾不至行逢曰行軍司馬吾嘗為之周行逢為武安行軍司馬見上卷太祖廣順三年權與節度使相埒耳埒龍輟翻等也叔嗣猶不滿望更欲圖我邪或説行逢授叔嗣武安節鉞以誘之説式芮翻誘以九翻令至都府受命此乃机上肉耳行逢從之叔嗣將行其所親止之叔嗣自恃素以兄事行逢相親善行逢叔嗣親善事始見二百九十一卷太祖廣順二年九月遂行不疑行逢遣使迎候道路相望既至自出郊勞勞力到翻相見甚懽叔嗣入謁未至聽事聴讀曰㕔遣人執之立于庭下責之曰汝為小校無大功校户教翻王逵用汝為團練使一旦反殺主帥帥所類翻吾以疇昔之情未忍斬汝以為行軍司馬乃敢違拒吾命而不受乎叔嗣知不免以宗族為請遂斬之資治通鑑卷二百九十二
