body:
  text: 資治通鑑卷一百三十一宋司馬光撰胡三省音註宋紀十三柔兆敦牂二年太宗眀皇帝上之下㤗始二年春正月己丑朔魏大赦改元天安癸巳徴㑹稽太守尋陽王子房為撫軍將軍以巴陵王休若代之去年子房已舉兵應尋陽欲以休若代之㑹工外翻甲午中外戒嚴以司徒建安王休仁都督征討諸軍事車騎將軍江州刺史王𤣥謨副之使王𤣥謨拒尋陽之兵因以為江州不復用休祐休仁軍於南州以沈攸之為尋陽太守將兵屯虎檻虎檻州名在赭圻東北江中蕪湖之西南也守式又翻將即亮翻下同時𤣥謨未𤼵前鋒凡十軍絡繹繼至每夜各立姓號不相禀受攸之謂諸將曰今衆軍姓號不同若有耕夫漁父夜相呵叱呵虎何翻叱昌栗翻便致駭亂取敗之道也請就一軍取號衆咸從之史言沈攸之有將帥之畧所以能立功鄧琬稱説符瑞詐稱受路太后璽書帥將佐上尊號於晉安王子勛璽斯氏翻帥讀曰率上時掌翻勛古勲字乙未子勛即皇帝位於尋陽改元義嘉以安陸王子綏為司徒揚州刺史尋陽王子房臨海王子頊並加開府儀同三司以鄧琬為尚書右僕射張悦為吏部尚書袁顗加尚書左僕射顗魚豈翻其餘將佐及諸州郡除官進爵號各有差丙申以征虜司馬申令孫為徐州刺史令孫坦之子也元嘉孝建之間申坦為將帥置司州於義陽文帝元嘉末置司州於汝南孝武大眀中省廢今復置之領義陽隨陽安陸南汝南四郡水行至建康二千七百里陸行一千七百里以義陽内史龎孟蚪為司州刺史龎皮江翻蚪渠幽翻徐州刺史薛安都冀州刺史清河崔道固皆舉兵應尋陽上徴兵於青州刺史沈文秀文秀遣其將劉彌之等將兵赴建安㑹薛安都遣使邀文秀文秀更令彌之等應安都濟隂太守申闡據睢陵應建康將即亮翻使疏吏翻濟子禮翻睢音雖睢陵縣前漢屬臨淮郡後漢屬下邳郡孝武大眀元年度屬濟隂郡沈約曰濟隂本屬兖州其民流寓徐土因割地為郡境隋并睢陵入夏丘縣唐以夏丘為虹縣屬泗州復漢舊縣名也虹漢書音貢今音絳杜佑曰睢陵縣故城在泗州下邳縣東南安都遣其從子直閣將軍索兒太原太守清河傅靈越等攻之文帝元嘉十年割濟南太山立太原郡唐齊州長清縣宋太原郡地也從才用翻守手又翻闡令孫之弟也安都壻裴祖隆守下邳劉彌之至下邳更以所領應建康襲擊祖隆祖隆兵敗與征北參軍垣崇祖奔彭城崇祖䕶之之從子也垣䕶之為將著功名於元嘉孝建之間彌之族人北海太守懐恭從子善眀皆舉兵以應彌之薛索兒聞之釋睢陵引兵擊彌之彌之戰敗走保北海申令孫進據淮陽晉安帝義熈中土斷立淮陽郡於下邳角城唐泗州治宿豫縣古角城也請降於索兒降户江翻龎孟蚪亦不受命舉兵應尋陽帝召尋陽王長史行㑹稽郡事孔覬為太子詹事以平西司馬庾業代之又遣都水使者孔璪入東慰勞漢官有都水長屬少府晉屬大司農後遂置都水使者掌河津漕渠凡水利事并督治船艦㑹工外翻覬音冀使疏吏翻璪子皓翻勞力到翻璪説覬以建康虗弱不如擁五郡以應袁鄧東揚州所統五郡説輸芮翻覬遂𤼵兵馳檄奉尋陽吳郡太守顧琛吳興太守王曇生琛五林翻曇徒含翻義興太守劉延熈晉陵太守袁標皆據郡應之上又以庾業代延熈爲義興業至長塘湖即與延熈合益州刺史蕭惠開聞晉安王子勛舉兵集將佐謂之曰湘東太祖之昭晉安世祖之穆其於當璧並無不可左傳楚共王無冢適有寵子五人無適立焉乃大有事於羣望而祈曰請神擇於五人使主社稷乃徧以璧見於羣望曰當璧而拜者神所立也既乃密埋璧於太室之庭使五人齋而入拜長康王跨之靈王肘加焉子干子晢皆逺之平王弱抱而入再拜皆厭紐其後卒有楚國昭市招翻但景和雖昏本是世祖之嗣廢帝改元景和不任社稷其次猶多吾荷世祖之眷當推奉九江任音壬荷下可翻自宋以來率謂江州為九江晁氏志曰太湖一湖而曰五湖昭餘祁一澤而曰九澤九江一水而曰九江余按書禹貢曰荆及衡陽惟荆州江漢朝宗于海九江孔殷孔安國注曰江於此州界分為九道甚得地勢之中漢書地理志廬江郡尋陽縣禹貢九江在南皆東合於大江應劭曰江自廬江尋陽分為九尋陽地記曰九江一曰烏江二曰蜯江三曰烏白江四曰嘉靡江五曰畎江六曰源江七曰廩江八曰提江九曰箘江張須元九江圖云一曰三里江二曰五州江三曰嘉靡江四曰烏土江五曰白蚌江六曰白烏江七曰箘江八曰沙提江九曰廪江參差隨水長短或百里或五十里始於鄂陵終於江口㑹於桑落洲太康地記曰九江劉歆以為湖漢九水入彭蠡澤也夏撰曰據此數説皆謂江水至是分為九道獨曽氏謂為不然曽氏謂下文導江過九江至于東陵東迤北㑹為匯説者謂東陵巴陵也盖今巴陵與夷陵相為東西夷陵一曰西陵則巴陵為東陵可知許慎曰迤邪行也今江水過洞庭至巴陵而後東北邪行合於彭蠡即經所謂過九江至于東陵東迤北㑹為匯也由是觀之九江不在潯陽明矣所謂九江者盖今洞庭也考之前志沅水漸水潕水辰水叙水酉水醴水湘水資水皆合洞庭中東入于江所謂九江者豈非此乎宋白曰江州潯陽郡禹貢九江孔殷彭蠡既瀦彭蠡在州南東五十三里九江在州西北二十五里是也然則彭蠡以東為揚州之域九江以西即荆州之域周景式廬山記云柴桑彭蠡之郊古三苗國舊属廬江地又案尋陽記云春秋時為呉之西境楚之東境本在大江之北今蘄州界古蘭城是也秦并天下以此属廬江郡漢属淮南國後漢為豫章廬江二郡之境三國之時此地雖為督䕶要津而未立郡呉但分尋陽𨽻武昌晉初尋陽猶理江北温嶠移於此始置尋陽郡隋為九江郡余按秦并天下置九江郡項羽封黥布為九江王都六漢地理志所謂九江在潯陽縣南沈約宋志尋陽本縣名因水名縣水南注江二漢属廬江吳立蘄春郡尋陽縣属焉此時尋陽之地在江北晉亂立尋陽郡後郡治於柴桑而尋陽之名遂移於江南晉惠帝置江州治豫章成帝移江州治尋陽時人盖因漢志所謂九江在尋陽縣南而尋陽又為江州治所遂謂尋陽為九江若禹貢之九江其地實難考見若必以夷陵為西陵遂以巴陵為禹貢之東陵摭取㑹洞庭之水為九江考之前志㑹洞庭者不止九水而酈道元水經注謂廬江郡有東陵鄉江夏有西陵縣故是言東尚書云江水過九江至于東陵者也西南流水積為湖湖西有青林山又考水經注自沔口以下有湖口水加湖江水武口水烏石水舉水巴水希水蘄水利水皆南流注于江而後至青林水口亦可傳合九水之説但未敢以為是九河之迹至漢已不可悉考而欲彊為九江之説難矣乃遣巴郡太守費欣壽將五千人東下於是湘州行事何慧文廣州刺史袁曇逺梁州刺史柳元怙山陽太守程天祚皆附於子勛元怙元景之從兄也費扶沸翻將即亮翻曇徒含翻從才用翻是嵗四方貢計皆歸尋陽貢謂貢方物計謂上計帳朝廷所保唯丹陽淮南等數郡其間諸縣或應子勛東兵已至永世呉分溧陽為永平縣晉武帝太康元年更名永世縣屬丹陽郡其地盖在今安吉州建康府廣德軍三郡界下云永世令叛義興兵垂至延陵則其地又犬牙入今常州界東兵欲自此進取曲阿宫省危懼上集羣臣以謀成敗蔡興宗曰今普天同叛宜鎮之以靜至信待人叛者親戚布在宫省若繩之以灋則土崩立至宜眀罪不相及之義父子兄弟罪不相及古義也物情既定人有戰心六軍精勇噐甲犀利以待不習之兵其勢相萬耳願陛下勿憂上善之蔡興宗豈特以方嚴自將盖識時審勢者也建武司馬劉順説豫州刺史殷琰使應尋陽説輸芮翻琰以家在建康未許右衛將軍柳光世自省内岀奔彭城過壽陽言建康必不能守琰信之且素無部曲為土豪前右軍參軍杜叔寳等所制不得已而從之琰以叔寳為長史内外軍事皆叔寳專之上謂蔡興宗曰諸處未平殷琰已復同逆復扶又翻頃日人情云何事當濟不不讀曰否興宗曰逆之與順臣無以辨今商旅斷絶米甚豐賤四方雲合而人情更安湘東簒位非其本心尋陽起兵名正言順故曰逆之與順臣無以辨商旅斷絶米甚豐賤者前朝之積也四方雲合人情更安者積苦於狂暴而驟樂寛政也天下嗸嗸新主之資斯言豈不信哉以此卜之清蕩可必但臣之所憂更在事後猶羊公言既平之後方當勞聖慮耳羊祐之言見八十卷晉武帝咸寧四年上曰誠如卿言上知琰附尋陽非本意乃厚撫其家以招之汝南新蔡二郡太守周矜起兵於懸瓠以應建康汝南郡時治懸瓠宋以新蔡郡帖治汝南故周矜領二郡太守自是二郡太守多矣袁覬誘矜司馬汝南常珍竒執矜斬之誘音酉以珍竒代為太守上使宂從僕射垣榮祖還徐州説薛安都諸垣自界陽歸南世在青徐立効為士人所信重故使還説薛安都宂而隴翻從才用翻説輸芮翻下説孝同安都曰今京都無百里地京都謂建康四方皆奉尋陽故言無百里地不論攻圍取勝自可拍手笑殺且我不欲負孝武榮祖曰孝武之行足致餘殃不善之積必有餘殃考武貪淫濟以奢虐人倫道盡故榮祖云然行下孟翻今雖天下雷同雷之𤼵聲物無不隋時而應者故以響應為雷同正是速死無能為也安都不從因留榮祖使為將將即亮翻榮祖崇祖之從父兄也從才用翻兖州刺史殷孝祖之甥司法參軍葛僧韶請徴孝祖入朝據南史司法參軍當作司徒參軍請下當有徴字朝直遥翻上遣之時薛索兒屯據津逕僧韶間行得至間古莧翻説孝祖曰景和凶狂開闢未有朝野危極假命漏刻朝直遥翻下同主上夷兇翦暴更造天地國亂朝危宜立長君更工衡翻長知兩翻而羣迷相煽搆造無端貪利幼弱競懐希望使天道助逆羣凶事申則主幼時艱權柄不一兵難互起豈有自容之地舅少有立功之志難乃旦翻少詩照翻若能控濟義勇還奉朝廷控引也濟謂濟河音子禮翻南史作控濟河義勇文意尤為眀暢非唯匡主静亂乃可以垂名竹帛孝祖具問朝廷消息僧韶隨方訓譬并陳兵甲精彊主上欲委以前驅之任孝祖即日委妻子於瑕丘瑕丘縣故魯瑕邑漢属山陽郡魏晋省宋為兖州治所帥文武二千人隨僧韶還建康帥讀曰率時四方皆附尋陽朝廷唯保丹陽一郡而永世令孔景宣復叛復扶又翻義興兵垂至延陵晉武帝太康二年分曲阿之延陵鄉立延陵縣屬晉陵郡内外憂危咸欲奔散孝祖忽至衆力不少並傖楚壯士江南謂中原人為傖荆州人為楚少詩照翻傖助庚翻人情大安甲辰進孝祖號撫軍將軍假節都督前鋒諸軍事遣向虎檻寵賚甚厚賚來代翻初上遣東平畢衆敬詣兖州募人至彭城薛安都以利害説之説輸芮翻矯上命以衆敬行兖州事衆敬從之殷孝祖使司馬劉文石守瑕丘衆敬引兵擊殺之安都素與孝祖有隙使衆敬盡殺孝祖諸子州境皆附之為畢衆敬以兖州降魏張本唯東平太守申纂據無鹽不從為申纂以城拒魏而死張本無鹽縣自漢晉以來属東平隋廢省其地當在唐鄆州界水經注濟水逕壽張縣須朐城西濟水西有安民亭亭北對安民山東臨濟水水東即無鹽縣界也杜佑曰鄆州治須昌縣也無鹽故城在今縣東東平國故城亦在縣東纂鍾之曽孫也申鍾見九十五卷晉成帝咸和九年丙午上親總兵岀頓中堂辛亥以山陽王休祐為豫州刺史督輔國將軍彭城劉勔勔彌兖翻寧朔將軍廣陵吕安國等諸軍西討殷琰二考異曰宋畧月庚申以休祐都督西討今從宋書巴陵王休若督建威將軍呉興沈懐眀尚書張永輔國將軍蕭道成等諸軍東討孔覬時將士多東方人父兄子弟皆已附覬顗音冀上因送軍普加宣示曰朕方務德簡刑使父子兄弟罪不相及助順向逆者一以所從為斷斷丁亂翻卿等當深逹此懐勿以親戚為慮也衆於是大悦凡叛者親黨在建康者皆使居職如故壬子路太后殂太考異曰宋畧南史皆曰義嘉難作后心幸之延上飲酒置毒以進侍者引上衣上寤起以其巵上壽是日太后崩䘮事如禮宋書無之今不取孔覬遣其將孫曇瓘等軍於晉陵九里其地在晉陵西北九里因以為名將即亮翻曇徒含翻部陳甚盛陳讀曰陣下戰陳同沈懐眀至奔牛所領寡弱乃築壘自固張永至曲阿未知懐眀安否百姓驚擾永退還延陵就巴陵王休若諸將帥咸勸休若退保破岡帥所類翻其日大寒風雪甚猛塘埭决壊壊徒耐翻以土遏水曰埭衆無固心休若宣令敢有言退者斬衆小定乃築壘息甲尋得懐眀書賊定未進軍主劉亮又至兵力轉盛人情乃安亮懐慎之從孫也從才用翻殿中御史呉喜以主書事世祖稍遷河東太守晉成帝咸康三年庾亮鎮荆州以司州僑户立河東郡隋唐之松滋縣即其地也至是請得精兵三百致死於東上假喜建武將軍簡羽林勇士配之議者以喜刀筆主者未嘗為將不可遣將即亮翻下同中書舎人巢尚之曰喜昔隨沈慶之屢經軍旅性既勇决又習戰陳若能任之必有成績諸人紛紜皆是不别才耳别彼列翻乃遣之喜先時數奉使東呉先悉薦翻數所角翻使䟽吏翻性寛厚所至人並懐之百姓聞吳河東來皆望風降散降户江翻故喜所至克捷永世人徐崇之攻孔景宣斬之喜板崇之領縣事喜至國山國山在陽羡縣界晉立義興郡分陽羡置國山縣屬焉隋廢國山入義興縣遇東軍進擊大破之自國山進屯吳城吳城當在義興西南九域志所謂㤗伯城是也劉延熈遣其將楊𤣥等拒戰喜兵力甚弱𤣥等衆盛喜奮擊斬之進逼義興延熈栅斷長橋保郡自守義興今常州之宜興也我朝自太平興國元年避太宗御名改為宜興此長橋盖在荆溪之上今宜興縣南二十歩有荆溪上承百瀆兼受數郡之水劉延熈盖柵斷荆溪之橋以自保輿地志曰今常州宜興縣南三十歩有長橋即周處斬蛟之所喜築壘與之相持庾業於長塘湖口夾岸築城有衆七千人與延熈遥相應接庾業叛建康與延熈合見上沈懷眀張永與晉陵軍相持久不决外監朱幼舉司徒參軍督䕶任農夫驍勇有膽力任音壬驍堅堯翻上以四百人配之使助東討農夫自延陵出長塘庾業築城猶未合農夫馳往攻之力戰大破之庾業弃城走義興走音奏農夫收其船仗進向義興助吳喜二月己未朔喜渡水攻郡城渡荆溪之水也分兵擊諸壘登髙指麾若令四面俱進者義興人大懼諸壘皆潰延熈赴水死遂克義興魏丞相太原王乙渾專制朝權朝直遥翻下同多所誅殺安逺將軍賈秀掌吏曹事渾屢言於秀為其妻求稱公主秀曰公主豈庻姓所宜稱魏制掌吏曹事即掌選曹事吏部尚書之職也凡非國之同姓皆謂之庻姓為于偽翻秀寧取死今日不可取笑後世渾怒罵曰老奴官慳㑹侍中拓䟦丕告渾謀反庚申馮太后收渾誅之秀彛之子賈彞見一百八卷晉孝武太元二十年丕烈帝之𤣥孫也拓䟦翳槐追謚烈皇帝太后臨朝稱制引中書令髙乆中書侍郎高閭及賈秀共參大政沈懐眀張永蕭道成等軍於九里西與東軍相持東軍聞義興敗皆震恐上遣積射將軍濟陽江方興御史王道隆至晉陵視東軍形勢濟子禮翻孔顗將孫曇瓘程扞宗列五城互相連帶扞宗城猶未固王道隆與諸將謀曰扞宗城猶未立可以藉手上副聖㫖下成衆氣辛酉道隆帥所領急攻㧞之帥讀曰率斬扞宗首永等因乗勝進擊曇瓘等壬戌曇瓘等兵敗與袁標俱棄城走遂克晉陵吳喜軍至義鄉晉惠帝永興元年分吳興之長城立義鄉縣属義興郡今湖州古吳興也長興縣古長城也在州西北七十里孔璪屯吳興南亭太守王曇生詣璪計事聞臺軍已近璪大懼墮牀曰懸賞所購唯我而已今不遽走將為人擒遂與曇生奔錢唐孔璪將命于東乃勸孔覬舉兵故懼而走璪子皓翻喜入吳興任農夫引兵向吳郡顧琛棄郡奔㑹稽琛丑林翻㑹工外翻上以四郡既平四郡晉陵義興吳興吳郡也乃留吳喜使統沈懐眀等諸將東擊㑹稽召張永等北擊彭城江方興等南擊尋陽以吏部尚書蔡興宗為左僕射侍中禇淵為吏部尚書丁卯吳喜軍至錢唐孔璪王曇生奔浙東喜遣彊弩將軍任農夫等引兵向黄山浦黄山浦今漁浦是也漁浦東南即後黄山諸暨志長寧鄉在縣東四十五里管五里一曰黄山里在今越州西北四十五里東軍據岸結寨農夫等擊破之喜自栁浦渡取西陵柳浦即今浙江亭東跨浦橋之浦也劉昫唐書曰隋於餘杭縣置杭州又自餘杭徙治錢唐又移州於栁浦今州城是擊斬庾業㑹稽人大懼將士多奔亡孔覬不能制將即亮翻覬音冀戊寅上虞令王晏起兵攻郡覬逃奔嵴山嵴資昔翻據南史覬門生載覬以小船竄于嵴山村車騎從事中郎張綏封府庫以待吳喜騎竒計翻己卯王晏入城殺綏執尋陽王子房於别署張綏盖遷子房於别署故王晏就執之縱兵大掠府庫皆空獲孔璪殺之庚辰嵴山民縳孔覬送晏晏謂之曰此事孔璪所為無預卿事可作首辭首式又翻首辭所以首罪當相為申上為于偽翻上時掌翻覬曰江東處分莫不由身處昌吕翻分扶問翻委罪求活便是君輩行意耳晏乃斬之史言孔覬臨死不改節顧琛王曇生袁摽等詣吳喜歸罪謂歸而首罪也喜皆宥之東軍主凡七十六人一軍之帥謂之軍主臨陳斬十七人其餘皆原宥為吳喜得罪張本陳讀曰陣薛索兒攻申闡久不下使申令孫入睢陵説闡闡出降索兒并令孫殺之古人有言禍莫大於殺已降為申令孫之子殺薛索兒張本説輸芮翻降户江翻下同山陽王休祐在歷陽輔國將軍劉勔進軍小峴勔彌兖翻峴戸典翻殷琰所署南汝隂太守裴季之以合肥來降沈約曰江左置南汝隂郡所治即合肥縣降户江翻鄧琬性鄙闇貪吝既執大權父子賣官鬻爵使婢僕出市道販賣酣歌博弈日夜不休酣户甘翻大自矜遇賔客到門者歷旬不得前内事悉委禇靈嗣等三人羣小横恣競為威福於是士民忿怨内外離心史言尋陽敗亡之由横户孟翻琬遣孫冲之帥龍驤將軍薛常寳陳紹宗焦度等兵一萬為前鋒據赭坼劉昫曰池州南陵縣漢春穀縣地梁置南陵縣治赭坼城唐長安四年移治青陽城帥讀曰率赭音者坼音畿冲之於道與晉安王子勛書曰舟檝已辦糧仗亦整檝與楫同三軍踴躍人爭効命便欲㳂流挂帆直取白下白下在江寧縣界臨江津願速遣陶亮衆軍兼行相接分據新亭南洲則一麾定矣子勛加冲之左衛將軍以陶亮為右衛將軍統郢荆湘梁雍五州兵雍於用翻合二萬人一時俱下陶亮本無幹畧聞建安王休仁自上上時掌翻殷孝祖又至不敢進屯軍鵲洲鵲洲在宣城郡南陵縣左傳之鵲岸也杜預曰鵲岸謂廬江舒縣鵲尾渚審是則鵲頭在宣城界鵲尾在廬江界鵲洲則江中之洲也殷孝祖負其誠節誠節謂委鎮勤王不顧妻子也陵轢諸將陵侵也侮也轢車踐也音狼狄翻臺軍有父子兄弟在南者孝祖悉欲推治南南軍也南謂尋陽在南臺軍泝江南上而攻之治直之翻由是人情乖離莫樂為用樂音洛寧朔將軍沈攸之内撫將士外諧羣帥衆並頼之孝祖毎戰常以鼔葢自隨軍中人相謂殷統軍可謂死將矣撫將即亮翻下同帥所類翻今與賊交鋒而以羽儀自摽顯若善射者十人共射之共射而亦翻欲不斃得乎三月庚寅衆軍水陸並進攻赭圻陶亮等引兵救之孝祖於陳為流矢所中死陳讀曰陣中竹仲翻軍主范濳帥五百人降於亮帥讀曰率下同降户江翻人情震駭並謂沈攸之宜代孝祖為統時建安王休仁屯虎檻遣寧朔將軍江方興龍驤將軍襄陽劉靈遺各將三千人赴赭圻驤思將翻各將即亮翻攸之以為孝祖既死亮等有乗勝之心明日若不更攻則示之以弱方興名位相亞必不為已下攸之方興皆寧朔將軍故言名位相亞亞次也軍政不壹致敗之由也乃帥諸軍主詣方興曰今四方並反國家所保無復百里之地唯有殷孝祖為朝廷所委賴鋒鏑裁交輿尸而反文武䘮氣䘮息浪翻朝野危心事之濟否唯在眀旦一戰戰若不捷大事去矣詰朝之事詰起吉翻杜預曰詰朝明旦諸人或謂吾應統之自卜懦薄幹畧不如卿今輙相推為統但當相與勠力耳方興甚悦許諾攸之既岀諸軍主並尤之攸之曰吾本濟國活家豈計此之升降且我能下彼彼必不能下我豈可自措同異也沈攸之成尋陽之功懾也郢城之敗驕也下户嫁翻孫冲之謂陶亮曰孝祖梟將一戰便死天下事定矣不須復戰便當直取京都亮不從孫冲之狃殷孝祖之死便欲順流長驅輕敵如此使陶亮從其計必與沈攸之等遇亦將以輕敵取敗矣梟堅堯翻將即亮翻復扶又翻辛卯方興帥諸將進戰帥讀曰率下同建安王休仁又遣軍主郭季之歩兵校尉杜幼文屯騎校尉垣恭祖龍驤將軍濟地頓生京兆叚佛榮濟地頓生四字必有誤等三萬人徃㑹戰自寅及午大破之追北至姥山而還今太平州當塗縣西北四十五里有慈姥山又巢湖中有姥山幼文驥之子也元嘉中杜驥任當方面孫冲之於湖白口巢湖口及白水口也築二城軍主竟陵張興世攻㧞之壬辰詔以沈攸之為輔國將軍假節代殷孝祖督前鋒諸軍事陶亮聞湖白二城不守大懼急召孫冲之還鵲尾留薛常寳等守赭圻先於姥山及諸岡分立營寨亦各散還共保濃湖濃湖在鵲尾下先悉薦翻時軍旅大起國用不足募民上錢榖者賜以荒縣荒郡或五品至三品散官有差荒郡荒縣極邉郡縣被兵荒殘者也賜之者以郡守縣令及參佐等職名賜之上時掌翻散悉亶翻軍中食少少詩沼翻建安王休仁撫循將士均其豐儉弔死問傷身自隱䘏隱度也痛也恤憂也愍也故十萬之衆莫有離心鄧琬遣其豫州刺史劉胡帥衆三萬鐵騎二千東屯鵲尾并舊兵凡十餘萬舊兵謂尋陽先所遣陶亮孫冲之等之兵騎竒計翻下同胡宿將勇健多權畧屢有戰功將士畏之將即亮翻下同司徒中兵參軍冠軍蔡那蔡那南陽冠軍人冠古玩翻子弟在襄陽胡每戰懸之城外劉胡自襄陽東下拘蔡那子弟以隨軍為蔡道淵執子勛張本那進戰不顧吳喜既定三呉帥所領五千人并運資實至于赭圻史言建康兵勢益盛薛索兒將馬歩萬餘人自睢陵渡淮進逼青冀二州刺史張永營丙申詔南徐州刺史桂陽王休範統北討諸軍事進據廣陵又詔蕭道成將兵救永戊戌尋陽王子房至建康上宥之貶爵為松滋侯庚子魏以隴西王源賀為太尉上遣寧朔將軍劉懐珍帥龍驤將軍王敬則等歩騎五千助劉勔討壽陽斬廬江太守劉道蔚懐珍善眀之從子也劉善明彌之之從子蔚紆勿翻從才用翻中書舎人戴眀寳啓上遣軍主竟陵黄回募兵擊斬尋陽所署馬頭太守王廣元杜佑曰馬頭城在壽州盛康縣北前奉朝請壽陽鄭黒起兵於淮上以應建康東扞殷琰西拒常珍竒乙巳以黒為司州刺史以鄭黒之東扞西拒觀之則起兵淮上盖在東西正陽之間朝直遥翻従考異曰宋殷琰傳作鄭墨今宋本紀宋畧殷琰將劉順栁倫皇甫道烈龎天生等馬歩八千人東據宛唐宛唐按水經注作死雩云肥水過九江成德縣西北入芍陂又北右合閻潤水水積為陽湖陽湖水自塘西北逕死雩亭宋㤗始初劉順據之以拒劉勔杜佑通典作死虎曰死虎地名在壽州壽春縣東四十餘里龎皮江翻劉勔率衆軍並進去順數里立營勔彌兖翻帥讀曰率下同時琰所遣諸軍並受順節度而以皇甫道烈土豪栁倫臺之所遣順本卑微唯不使統督二軍土豪既不可令臺之所遣者又不可令則置帥果何為也其敗宜矣勔始至塹壘未立塹七艷翻順欲擊之道烈倫不同順不能獨進乃止勔營既立不可復攻因相持守復扶又翻壬子斷新錢并元嘉四銖孝建四銖皆斷不用也斷讀如短專用古錢沈攸之帥諸軍圍赭圻薛常寳等糧盡告劉胡求救胡以囊盛米繫流查及船腹盛時征翻查助加翻水中浮木也船腹船中心也陽覆船順風流下以餉之沈攸之疑其有異遣人取船及流查大得囊米丙辰劉胡帥歩卒一萬夜斫山開道以布囊運米餉赭圻平旦至城下猶隔小塹未能入沈攸之帥諸軍邀之殊死戰胡衆大敗捨糧棄甲縁山走斬獲甚衆胡被創僅得還營被皮義翻常寳等惶懼夏四月辛酉開城突圍走還胡軍攸之㧞赭圻城斬其寧朔將軍沈懐寳等納降數千人陳紹宗單舸奔鵲尾降户江翻舸古我翻建安王休仁自虎檻進屯赭圻劉胡等兵猶盛上欲綏慰人情遣吏部尚書禇淵至虎檻選用將士時以軍功除官者衆板不能供程大昌曰魏晉至梁陳授官有板長一尺二寸厚一寸濶七寸授官之辭在于板上為鵠頭書始用黄紙鄧琬以晉安王子勛之命徴袁顗下尋陽顗悉雍州之衆馳下琬以黄門侍郎劉道憲行荆州事侍中孔道存行雍州事雍於用翻上庸太守栁世隆乘虚襲襄陽不克世隆元景之弟子也散騎侍郎眀僧暠起兵攻沈文秀以應建康明氏自云吳太伯之裔百里奚之子孟明視以明為姓散悉亶翻騎竒計翻暠工老翻壬午以僧暠為青州刺史平原樂安二郡太守王𤣥黙據琅邪武帝平齊置平原郡於梁鄒樂安郡於千乗𤣥黙據琅邪起兵非就郡起兵也劉昫曰平原隋改曰龔丘屬兖州清河廣川二郡太守王𤣥邈據盤陽城武帝置清河郡於盤陽廣川郡於武彊五代志齊郡長山縣舊曰武彊置廣川後併東清河平原二郡入焉改曰東平原郡隋廢郡改武彊曰長山則是平原清河廣川三郡皆置於隋長山縣界盤陽漢般陽縣也屬濟南郡應劭曰在般水之陽按水經注般陽縣西南即梁鄒縣劉昫曰唐淄川淄川縣漢般陽縣地也高陽勃海二郡太守劉乗民據臨濟城文帝置髙陽郡於樂安地孝武置勃海郡於臨淄地臨濟縣屬樂安郡按水經注臨濟縣在梁鄒東北臨濟子禮翻並起兵以應建康𤣥邈𤣥謨之從弟乗民彌之之從子也從才用翻沈文秀遣軍主觧彦士攻北海㧞之殺劉彌之乘民從弟伯宗合帥鄉黨復取北海解户買翻帥讀曰率復扶又翻下而復更復可復假復國復復嬰同因引兵向青州所治東陽城杜佑曰東陽城青州所治益都縣東城是也治直之翻文秀拒之伯宗戰死僧暠𤣥黙𤣥邈乗民合兵攻東陽城每戰輙為文秀所破離而復合如此者十餘卒不能克言不能克東陽城卒子恤翻杜叔寳謂臺軍住歷陽不能遽進及劉勔等至上下震恐劉順等始行唯齎一月糧既與勔相持糧盡叔寳發軍千五百乘載米餉順自將五千精兵送之乘繩證翻將即亮翻吕安國聞之言於劉勔曰劉順精甲八千我衆不能居半相持既乆彊弱勢殊更復推遷則無以自立所賴者彼糧行竭我食有餘耳若使叔寳米至非唯難可復圖我亦不能持久今唯有間道襲其米車間古莧翻出彼不意若能制之當不戰走矣勔以為然以疲弱守營簡精兵千人配安國及龍驤將軍黄囘使從間道出順後於横塘抄之水經注閻潤水上承施水於合肥縣北復逕縣西積為陽湖陽湖水自塘西北逕死雩亭南夾横塘西注宋㤗始初劉順據之以拒劉勔杜叔寳送糧死雩劉勔破之此塘驤思將翻抄楚交翻安國始行齎二日熟食食盡叔寳不至將士欲還安國曰卿等旦已一食今晚米車不容不至若其不至夜去不晩叔寳果至以米車為函箱陳陳讀曰陣叔寳於外為遊軍幢主楊仲懷將五百人居前幢傳江翻安國囘等擊斬之及其士卒皆盡叔寳至囘欲乗勝擊之安國曰彼將自走不假復擊退三十里止宿夜遣騎參侯騎竒寄翻叔寳果棄米車走安國復夜徃燒米車驅牛二千餘頭而還還從宣翻又如字五月丁亥朔夜劉順衆潰走淮西就常珍竒常珍竒據懸瓠在淮水之西走音􅀈於是劉勔鼔行進向壽陽叔寳斂居民及散卒嬰城自守勔與諸軍分營城外山陽王休祐與殷琰書為陳利害為于偽翻上又遣御史王道隆齎詔宥琰罪勔與琰書并以琰兄瑗子邈書與之琰與叔寳等皆有降意降戸江翻下同而衆心不壹復嬰城固守弋陽西山蠻田益之起兵應建康詔以益之為輔國將軍督弋陽蠻事壬辰以輔國將軍沈攸之為雍州刺史雍於用翻丁未以尚書左僕射王景文為中軍將軍庚戌以寧朔將軍劉乗民為冀州刺史沈攸之行南征軍前欲以代袁顗劉乗民在臨濟就以冀州授之甲寅葬昭太后於修寧陵路太后諡曰昭修寧陵在孝武陵東南張永蕭道成等與薛索兒戰大破之索兒退保石梁今揚州六合縣有石梁河江左置石梁郡隋唐之間置石梁縣食盡而潰走向樂平樂平縣前漢曰清屬東郡後漢章帝更名樂平江左以樂平縣民流寓者僑立樂平縣於鍾離郡界為申令孫子孝叔所斬申孝叔報父之仇也薛安都子道智走向合肥詣裴季之降傳靈越走至淮西武衛將軍沛郡王廣之生獲之送詣劉勔勔詰其叛逆詰去吉翻靈越曰九州倡義豈獨在我薛公不能專任智勇委付子姪此其所以敗也人生歸於一死實無面求活勔送詣建康上欲赦之靈越辭終不改乃殺之鄧琬以劉胡與沈攸之等相持久不决乃加袁顗督征討諸軍事六月甲戌顗帥樓船千艘戰士二萬來入鵲尾顗本無將畧性又怯橈顗魚豈翻帥讀曰率艘蘓遭翻將即亮翻橈奴教翻在軍中未嘗戎服語不及戰陳唯賦詩談義而已不復撫接諸將劉胡每論事酬對甚簡陳讀曰陣復扶又翻酬荅也由此大失人情胡常切齒恚恨恚於避翻胡以南運米未至軍士匱乏就顗借襄陽之資顗不許曰都下兩宅未成方應經理兩敵相向勝負之决存亡係焉袁顗乃欲留襄陽之資以經理私宅子勛既敗都下兩宅豈顗有哉又信徃來之言云建康米貴斗至數百以為將不攻自潰擁甲以待之擁甲猶言擁兵也田益之帥蠻衆萬餘人圍義陽宋白曰義陽本漢平氏縣義陽鄉之地魏黄初中分平氏居義陽郡及義陽縣鄧琬使司州刺史龎孟蚪帥精兵五千救之益之不戰潰去安成太守劉襲始安内史王識之王考異曰宋書作職之今從宋畧建安内史趙道生並舉郡來降降户江翻襲道憐之孫也道憐武帝之弟蕭道成世子賾為南康贑令賾士革翻蕭道成為齊公賾始為世子此世字衍贑縣漢屬豫章郡吳屬廬陵郡晋分屬南康郡章貢二水合而為贑音古暗翻鄧琬遣使收繫之使疏吏翻門客蘭陵桓康擔賾妻裴氏及其子長懋子良逃於山中與賾族人蕭欣祖等結客得百餘人攻郡破獄岀賾南康相沈肅之帥將吏追賾賾與戰擒之賾自號寧朔將軍據郡起兵據南康郡也帥讀曰率將即亮翻據考異曰宋鄧琬傳云世子與南康相沈用之等郡起義宋畧亦云沈肅之以郡招起義按賾始自獄中劫岀琬所署南康相不容便與之同今從蕭子顯南齊書記與劉襲等相應琬以中䕶軍殷孚為豫章太守督上流五郡豫章廬陵臨川安成南康五郡皆在南江上流以防襲等衡陽内史王應之起兵應建康襲擊湘州行事何慧文於長沙應之與慧文捨軍身戰斫慧文八創創初良翻慧文斫應之斷足殺之始興人劉嗣祖等據郡起兵應建康廣州刺史袁曇逺遣其將李萬周等討之嗣祖誑萬周云尋陽已平萬周還襲番禺擒曇逺斬之曇徒含翻誑居况翻番禺音潘愚上以萬周行廣州事初武都王楊元和治白水據北史此武都之白水也按五代志武昌建威縣舊立白水郡建威唐省入階州將利縣微弱不能自立棄國奔魏元和從弟僧嗣復自立屯葭蘆從才用翻復扶又翻下開復同費欣壽至巴東費扶沸翻巴東人任叔兒據白帝自號輔國將軍擊欣壽斬之蕭惠開遣欣壽東下見上正月叔兒遂阻守三峽江水自巴東至夷陵其間有廣溪峽巫峽西陵峽謂之三峽一曰三峽西峽歸峽巫峽七百里中兩岸連山畧無缺處隱天蔽日非日中夜分不見日月蕭惠開復遣治中程法度將兵三千岀梁州楊僧嗣帥羣氐斷其道間使以聞帥讀曰率斷丁管翻間古莧翻使疏吏翻秋七月丁酉以僧嗣為北秦州刺史武都王諸軍與袁顗相拒於濃湖久未决龍驤將軍張興世建議曰賊據上流兵彊地勝我雖持之有餘而制之不足若以竒兵數千潛岀其上因險而壁見利而動使其首尾周遑進退疑阻中流既梗糧運自艱此制賊之竒也錢溪江岸最狹新唐書地理志宣州南陵縣有梅根監錢官下云陳慶至錢溪軍於梅根盖今之梅根港是也以有鑄錢監故謂之錢溪去大軍不逺下臨洄洑旋流曰洄伏流曰洑船下必來泊岸又有橫浦可以藏船千人守險萬夫不能過衝要之地莫出於此沈攸之吳喜並贊其䇿㑹龎孟蚪引兵來助殷琰龎孟蚪自義陽來援壽陽劉勔遣使求援甚急勔彌兖翻使疏吏翻建安王休仁欲遣興世救之沈攸之曰孟蚪蟻聚必無能為遣别將馬歩數千足以相制將即亮翻下同興世之行是安危大機必不可輟乃遣叚佛榮將兵救勔而選戰士七千輕舸二百配興世興世帥其衆沂流稍上尋復退歸舸古我翻帥讀曰率上時掌翻復扶又翻如是者累日劉胡聞之笑曰我尚不敢越彼下取揚州揚州謂建康張興世何物人欲輕據我上不為之備一夕四更更工衡翻值便風興世舉帆直前渡湖白過鵲尾胡既覺乃遣其將胡靈秀將兵於東岸翼之而進戊戌夕興世宿景洪浦靈秀亦留興世潜遣其將黄道標帥七十舸徑趣錢溪立營寨趣七喻翻己亥興世引兵進據之靈秀不能禁庚子劉胡自將水歩二十六軍來攻錢溪其考異曰宋畧曰胡進軍鵲頭遣將陳慶以三百舸逼錢溪今從宋書將士欲迎擊之興世禁之曰賊來尚逺氣盛而矢驟驟既易盡言矢易盡易以鼔翻下同盛亦易衰不如待之令將士治城如故俄而胡來轉近船入洄洑興世命壽寂之任農夫率壯士數百擊之衆軍相繼並進胡敗走斬首數百胡收兵而下時興世城寨未固建安王休仁慮袁顗并力更攻錢溪欲分其勢辛丑命沈攸之吳喜等以皮艦進攻濃湖以牛皮冐艦以禦矢石因謂之皮艦艦户闇翻斬獲千數是日劉胡帥歩卒二萬鐡馬一千欲更攻興世未至錢溪數十里袁顗以濃湖之急遽追之錢溪城由此得立胡遣人傳唱錢溪已平衆並懼沈攸之曰不然若錢溪實敗萬人中應有一人逃亡得還者必是彼戰失利唱空聲以惑衆耳勒軍中不得妄動勒約勒也錢溪捷報尋至攸之以錢溪所送胡軍耳鼻示濃湖袁顗駭懼攸之日暮引歸龍驤將軍劉道符攻山陽程天祚請降程天祚附子勛見上正月龎孟蚪進至弋陽劉勔遣吕安國等迎擊於蓼潭漢志六安國有蓼縣晉屬安豐郡水經注决水逕蓼縣故城東灌水㑹焉所謂蓼潭當在此處大破之孟蚪走向義陽王𤣥謨之子曇善起兵據義陽以應建康曇徒含翻孟蚪走死蠻中劉胡遣輔國將軍薛道標襲合肥殺汝隂太守裴季之裴季之以合肥降劉勔見上二月劉勔遣輔國將軍垣閎擊之閎閬之弟垣閬見一百二十九卷孝武帝大明三年道標安都之子也淮西人鄭叔舉起兵擊常珍竒以應鄭黒辛亥以叔舉為北豫州刺史崔道固為土人所攻閉門自守崔道固以歴城應尋陽見上正月上遣使宣慰道固請降降户江翻下同甲寅復以道固為徐州刺史道固本刺冀州復扶又翻下不復足復同八月皇甫道烈等聞龎孟蚪敗並開門岀降死虎師潰皇甫道烈盖奔還壽陽張興世既據錢溪濃湖軍乏食鄧琬大送資糧畏興世不敢進劉胡率輕舸四百由鵲頭内路欲攻錢溪鵲洲在江中江水分流故有内路外路舸古我翻既而謂長史王念叔曰吾少習歩戰未閑水鬭少詩照翻閑亦習也若歩戰恒在數萬人中水戰在一舸之上舸舸各進不復相關恒户登翻復扶又翻正在三十人中此非萬全之計吾不為也乃託瘧疾住鵲頭不進瘧逆約翻疾而寒熱送作為瘧遣龍驤將軍陳慶將三百舸向錢溪戒慶不須戰張興世吾之所悉自當走耳陳慶至錢溪軍於梅根胡遣别將王起將百舸攻興世興世擊起大破之胡率其餘舸馳還謂顗曰興世營寨已立不可猝攻昨日小戰未足為損陳慶已與南陵大雷諸軍共遏其上大軍在此鵲頭諸將又斷其下流斷丁管翻已墮圍中不足復慮顗怒胡不戰謂曰糧運鯁塞當如此何鯁塞言若魚骨之鯁塞咽㗋然塞悉則翻胡曰彼尚得泝流越我而上上時掌翻此運何以不得㳂流越彼而下邪乃遣安北府司馬沈仲玉將千人歩趣南陵迎糧趣七喻翻下同仲玉至南陵載米三十萬斛錢布數十舫竪榜為城舫南妄翻竪臣庾翻立也榜補曩翻木片也規欲突過行至貴口不敢進水經注江水自石城東入為貴口今池州貴池縣之池口即貴口也張舜民曰自銅陵舟六十許里至梅根港又五十許里至貴池口遣間信報胡間古莧翻令遣重軍援接張興世遣壽寂之任農夫等將三千人至貴口擊之仲玉走還顗營悉虜其資實胡衆駭懼胡將張喜來降將即亮翻降户江翻下同鎮東中兵參軍劉亮進兵逼胡營胡不能制袁顗懼曰賊入人肝肺裏何由得活胡隂謀遁去己卯誑顗云欲更帥歩騎二萬誑居况翻帥讀曰率騎竒寄翻上取錢溪兼下大雷餘運令顗悉選馬配之其日胡委顗去徑趣梅根先令薛常寳辦船悉𤼵南陵諸軍燒大雷諸城而走至夜顗方知之大怒罵曰今乃為小子所誤呼取常所乘善馬飛鷰謂其衆曰我當自追之因亦走庚辰建安王休仁勒兵入顗營納降卒十萬遣沈攸之等追顗顗走至鵲頭與戍主薛伯珍并所領數千人偕去欲向尋陽夜止山間殺馬以勞將士勞力到翻將即亮翻顧謂伯珍曰我非不能死且欲一至尋陽謝罪主上然後自刎耳因慷慨叱左右索節無復應者及旦伯珍請屏人言事刎扶粉翻索山客翻復扶又翻屏必郢翻遂斬顗首南史顗走至青林山見殺詣錢溪軍主襄陽俞湛之湛之因斬伯珍并送首以為已功劉胡帥二萬人向尋陽詐晉安王子勛云袁顗已降軍皆散唯已帥所領獨返宜速處分為一戰之資帥讀曰率處昌吕翻分扶問翻當停據湓城誓死不貳乃於江外夜趣沔口江中洲嶼節節有之舟行附南岸者謂之内路附北岸者謂之外路鄧琬聞胡去憂惶無計呼中書舎人禇靈嗣等謀之並不知所岀張悦詐稱疾呼琬計事令左右伏甲帳後戒之若聞索酒便出索山客翻琬既至悦曰卿首倡此謀今事已急計將安出琬曰正當斬晉安王封府庫以謝罪耳悦曰今日寧可賣殿下求活邪因呼酒子洵提刀出斬琬洵悦子也中書舎人潘欣之聞琬死勒兵而至悦使人語之曰語牛倨翻鄧琬謀反今已梟戮梟堅堯翻欣之乃還取琬子並殺之悦因單舸齎琬首馳下詣建安王休仁降舸古我翻降户江翻尋陽亂無主故亂蔡那之子道淵在尋陽被繫作部作部主作噐仗在尋陽城外脱鎻入城執子勛囚之沈攸之諸軍至尋陽斬晉安王子勛傳首建康時年十一晉安舉兵實義舉也鄧琬不足道若袁顗孔覬豈可謂不得其死哉世毋以成敗論之初鄧琬遣臨川内史張淹自鄱陽嶠道入三吳軍於上饒晉太康地志鄱陽郡有上饒縣而晉書無之當是吳立今為信州有路通鄱陽宋白曰信州上饒縣本秦番縣界漢為番陽縣今州古城遺蹟開皇中所廢古上饒也所謂上饒者以其旁下饒州之故也九域志番陽東南至上饒五百四十里聞劉胡敗軍副鄱陽太守費曄斬淹以降淹暢之子也張暢元嘉之季從世祖為徐州長史費父沸翻廢帝之世衣冠懼禍咸欲逺出至是流離外難難乃旦翻百不一存衆乃服蔡興宗之先見先見事見上卷元年九月壬辰以山陽王休祐為荆州刺史癸巳觧嚴大赦庚子司徒休仁至尋陽遣吳喜張興世向荆州沈懐明向郢州劉亮及寧朔將軍南陽張敬兒向雍州雍於用翻孫超之向湘州沈思仁任農夫向豫章平定餘冦劉胡逃至石城此竟陵之石城今郢州長壽縣是也捕得斬之郢州行事張沈變形為沙門潜走追獲殺之沈持林翻荆州行事劉道憲聞濃湖平散兵遣使歸罪使疏吏翻荆州治中宗景等勒兵入城殺道憲執臨海王子頊以降孔道存知尋陽已平遣使請降尋聞栁世隆劉亮當至道存及三子皆自殺孔道存時為雍州行事上以何慧文才兼將吏有將才又有吏才也將即亮翻使吳喜宣㫖赦之慧文曰既䧟逆節手害忠義謂殺王應之也何靣見天下之士遂自殺史言何慧文不肯茍活安陸王子綏臨海王子頊邵陵王子元並賜死劉順及餘黨在荆州者皆伏誅劉順自死虎奔淮西又自淮西奔荆州詔追贈諸死節之臣及封賞有功者各有差己酉魏初立郡學置博士助敎生員從中書令高允相州刺史李訢之請也古者家有塾黨有庠術有序國有學秦雖焚書坑儒齊魯學者未嘗廢業漢文翁守蜀起立學官學者比齊魯武帝令天下郡國皆立學校官則學官之立尚矣此書魏初立郡學置官及生員者盖悲五胡兵爭不暇立學魏起北荒數世之後始及此既悲之猶幸斯文之墜地而復振也相息亮翻訢許斤翻訢崇之子也此别一李崇非頓丘之李崇也上既誅晉安王子勛等待世祖諸子猶如平日司徒休仁還自尋陽言於上曰松滋侯兄弟尚在將來非社稷計宜早為之所冬十月乙卯松滋侯子房永嘉王子仁始安王子真淮南王子孟南平王子産廬陵王子輿子趨子期東平王子嗣子悦並賜死及鎮北諮議參軍路休之司徒從事中郎路茂之二路皆昭太后子姪兖州刺史劉祗中書舎人嚴龍皆坐誅世祖二十八子於此盡矣休仁尚書下省之禍自取之也𨗳上使去其兄子上手滑矣其視諸弟何有哉蕭齊易姓劉氏殱焉骨肉相殘禍至此極有國有家者其鑒于兹祗義欣之子也劉勔圍壽陽垣閎攻合肥俱未下勔患之召諸將㑹議馬隊主王廣之曰得將軍所乗馬判能平合肥判斷也决也幢主皇甫肅怒曰廣之敢奪節下馬可斬勔笑曰觀其意必能立功即推鞌下馬與之幢傳江翻推吐雷翻廣之徃攻合肥三日克之薛道標突圍奔淮西歸常珍竒勔擢廣之為軍主廣之謂肅曰節下若從卿言何以平賊卿不賞才乃至於此肅有學術及勔卒卒子恤翻更依廣之廣之薦於齊世祖為東海太守史竟其事以言王廣之能以㤙易怨沈靈寳自廬江引兵攻晉熈晉安帝分廬江立晉熈郡今舒州即其地也晉熈先附尋陽故攻之晉熈太守閻湛之棄城走徐州刺史薛安都益州刺史蕭惠開梁州刺史栁元怙畧考異曰宋作元哲今從宋書兖州刺史畢衆敬魏考異曰宋畧作畢榛後書云小名㮈今從本傳豫章太守殷孚汝南太守常珍竒並遣使乞降尋陽已平故並乞降使疏吏翻降户江翻上以南方已平欲示威淮北乙亥命鎮軍將軍張永中領軍沈攸之將甲士五萬迎薛安都將甲即亮翻考異曰後魏紀安都與常珍竒降皆在九月而宋本紀宋畧遣張永等北岀皆在十月今從之蔡興宗曰安都歸順此誠非虛正須單使尺書使疏吏翻今以重兵迎之勢必疑懼或能招引北虜為患方深若以叛臣罪重不可不誅則曏之所宥亦已多矣况安都外據大鎮密邇邊陲地險兵彊攻圍難克考之國計尤宜馴養馴松倫翻如其外叛將為朝廷旰食之憂上不從為上愧蔡興宗張本旰苦汗翻謂征北司馬行南徐州事蕭道成曰吾今因此北討卿意以為何如對曰安都狡猾有餘今以兵逼之恐非國之利上曰諸軍猛銳何徃不克卿勿多言蔡興宗蕭道成人地雖殊所見不異盖識時逹變唯智者者能之文武無二道也都聞大兵北上地勢西北高東南下濟泗沂之水皆南流逕彭城而注于淮故謂南兵北向為北上上時掌翻懼遣使乞降於魏常珍竒亦以懸瓠降魏復考異曰宋畧十二月甲寅珍竒以郡叛盖於時宋朝始聞之耳皆請兵自救戊寅立王子昱為太子薛安都以其子為質於魏質音致魏遣鎮東大將軍代人尉元鎮東將軍魏郡孔伯恭等帥騎一萬出東道救彭城鎮西大將軍西河公石都督荆豫南雍州諸軍事張窮竒出西道救懸弧尉紆勿翻帥讀曰率騎竒寄翻雍於用翻魏無南雍州下又書安都都督徐雍五州諸軍事盖一時創置尋省併也西河公石魏之宗室以安都為都督徐雍等五州諸軍事鎮南大將軍徐州刺史河東公常珍竒為平南將軍豫州刺史河内公兖州刺史申纂詐降於魏尉元受之而隂為之偹魏師至無鹽纂閉門拒守為魏攻殺申纂張本薛安都之召魏兵也畢衆敬不與之同遣使來請降是年春畢衆敬叛建康從薛安都及安都降魏乃不與之同耳上以衆敬為兖州刺史衆敬子元賔在建康先坐它罪誅元考異曰後魏書衆敬傳云賔有它罪彧獨不捨之宋畧云榛與安都已誅矣今從之衆敬聞之怒㧞刀斫柱曰吾皓首唯一子不能全安用獨生十一月壬子魏師至瑖丘衆敬請降於魏尉元遣部將先據其城將即亮翻衆敬悔恨數日不食元長驅而進十二月己未軍于秺秺縣漢屬濟隂郡後漢省其地當在唐曹州界孟康曰秺音妬西河公石至上蔡常珍竒帥文武出迎石欲頓軍汝北未即入城懸弧城在汝水南中書博士鄭羲曰今珍竒雖來意未可量量音良不如直入其城奪其管籥管鍵也籥闗牡也據有府庫制其腹心䇿之全者也石遂䇿馬入城因置酒嬉戯羲曰觀珍竒之色甚不平不可不為之備乃嚴兵設備其夕珍竒使人燒府屋欲為變以石有備而止羲谿之曽孫也淮西七郡民多不願屬魏連營南奔淮西七郡汝南新蔡汝陽汝隂陳郡南頓潁川魏遣建安王陸馛宣慰新附民有䧟軍為奴婢者馛悉免之馛蒲撥翻新民乃悦乙丑詔坐依附尋陽削官爵禁錮者皆從原籍隨才銓用劉勔圍壽陽自首春至于末冬内攻外禦戰無不捷以寛厚得將士心將即亮翻尋陽既平上使中書為詔諭殷琰蔡興宗曰天下既定是琰思過之日陛下宜賜手詔數行以相慰引慰者安其心引者引使歸順行户剛翻今直中書為詔彼必疑謂非真非所以速清方難也難乃旦翻方難謂一方之難不從琰得詔謂劉勔詐為之不敢降降户江翻下同杜叔寳閉絶尋陽敗問有傳者即殺之守備益固凡有降者上輒送壽陽城下使與城中人語由是衆情離沮沮在吕翻琰欲請降於魏主簿譙郡夏侯詳説琰曰説輸芮翻下同今日之舉本効忠節若社稷有奉便當歸身朝廷何可北靣左衽乎且今魏軍近在淮次謂西河公石在汝南之軍也官軍未測吾之去就若建使歸欵建使當作遣使欵誠也使疏吏翻必厚相慰納豈止免罪而已琰乃使詳岀見劉勔詳説勔曰今城中士民知困而猶固守者畏將軍之誅皆欲自歸於魏願將軍緩而赦之則莫不相帥而至矣帥讀曰率下同勔許諾使詳至城下呼城中人諭以勔意丙寅琰帥將佐面縛岀降勔悉加慰撫不戮一人入城約勒將士將即亮翻士民貲財秋毫無所失壽陽人大悦魏兵至師水水經注師水源岀大潰山又北逕賢首山西又東逕義陽故城北南北對境圖濟河在今信陽軍羅山縣西北界將救壽陽聞琰已降乃掠義陽數千人而去久之琰復仕至少府而卒復扶又翻卒子恤翻蕭惠開在益州多任刑誅蜀人猜怨聞費欣壽敗没費扶沸翻程法度不得前事並見上六月於是晉原一郡反沈約曰李雄分蜀郡之江原臨卭為漢原郡晉穆帝更名晉原唐為蜀州諸郡皆應之合兵圍成都城中東兵不滿二千惠開悉遣蜀人出獨與東兵拒守東兵惠開隨行部曲也蜀人聞尋陽已平爭欲屠城衆至十餘萬人惠開毎遣兵出戰未嘗不㨗上遣其弟惠基自陸道使成都赦惠開罪惠基至涪蜀人遏留惠基不聽進惠基帥部曲擊之斬其渠帥使疏吏翻涪音浮基帥讀曰率渠帥所類翻然後得前惠開奉㫖歸降城圍得觧上遣惠開宗人寳首自水道慰勞益州寳首欲以平蜀為已功更奬説蜀人使攻惠開勞力到翻奬勸也説式芮翻誘也於是處處蜂起凡諸離散者一時還合與寶首進逼成都衆號二十萬惠開欲擊之將佐皆曰今慰勞使至而拒之使疏吏翻下同何以自眀惠開曰今表啓路絶不戰則何以得通使京師乃遣宋寧太守蕭惠訓等將萬兵與戰大破之生擒寳首囚于成都沈約曰文帝元嘉十年免呉營僑立宋寧郡寄治成都將即亮翻下同遣使言狀上使執送寶首召惠開還建康上問以舉兵狀惠開曰臣唯知逆順不識天命且非臣不亂非臣不平上釋之是歲僑立兖州治淮隂徐州治鍾離青冀二州共一刺史治鬱州兖徐青冀皆降於魏故立僑州鬱州在海中周數百里累石為城高八九尺高居傲翻虚置郡縣荒民無幾幾居豈翻張永沈攸之進兵逼彭城軍于下礚礚丘盖翻分遣羽林監王穆之將卒五千守輜重於武原水經注武原縣在下邳縣西北按武原縣自漢以來屬彭城郡宋志南彭城郡有武原縣而徐州之彭城無之盖自晉氏永嘉之亂其民南徙而故縣丘墟也杜佑曰泗州下邳縣北有漢武原縣故城重直用翻魏尉元至彭城薛安都出迎元遣李璨與安都先入城收其管籥别遣孔伯恭以精甲二千安撫内外然後入受降如受敵尉元得之其夜張永攻南門不克而退元不禮於薛安都安都悔降復謀叛魏降戸江翻復扶又翻元和之不果發和之者諧輯之也或曰和之當作知之安都重賂元等委罪於女婿裴祖隆而殺之元使李珠與安都守彭城自將兵擊張永絶其糧道又破王穆之於武原穆之帥餘衆就永元進攻之帥讀曰率資治通鑑卷一百三十一
