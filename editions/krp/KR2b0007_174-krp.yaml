front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑巻一百七十四宋司馬光撰胡三省音註陳紀八上章困敦一年高宗宣皇帝下之上太建十二年春正月癸巳周天元祠太廟史言周天元既以朝政授其子而猶主祭祀戊戌以左衛將軍任忠為南豫州刺史此時南豫州治宣城任音壬督縁江軍防事乙卯周税入市者人一錢二月丁巳周天元幸露門學釋奠周露門學在露門左右塾古者仲春仲秋皆以上丁釋奠于先聖先師鄭𤣥曰釋奠者設薦饌酌奠而已戊午突厥入貢干周且迎千金公主周許以千金公主妻突厥事始上巻上年厥九勿翻乙丑周天元改制為天制敕為天敕制者大賞罰大除授赦宥慮囚慰勞用之敕者廢置州縣増減官吏除免官爵授六品以上官𤼵兵施行百官奏請戒約臣下皆用之皆宣署申覆而後行壬午尊天元皇太后為天元上皇太后天皇太后為天元聖皇太后二太后天元嫡母阿史那氏所生母李氏也癸未詔楊后與三后皆稱太皇后三后朱后元后陳后也司馬后直稱皇后司馬后正陽宫皇后也行軍總管把公亮天元之從祖兄也天元從祖宇文泰之兄弟也從才用翻其子西陽公温妻尉遲氏蜀公迥之孫尉紆勿翻有美色以宗婦入朝天元飲之酒逼而滛之朝直遥翻飲干禁翻亮聞之懼三月軍還至豫州自淮南還軍豫州治汝南還音旋又音如字密謀襲韋孝寛并其衆韋孝寛征南行軍元帥帥所類翻推諸父為主諸父謂趙王招兄弟鼔行而西亮國官茹寛知其謀諸國公各有國官茹姓也後魏書普六茹後改為茹氏余按太和之時南齊有茹法亮盖南國自有茹氏今茹寛既仕於北國恐出於普六茹氏茹音如先告孝寛孝寛潜設僃亮夜將數百騎襲孝寛營將即亮翻又音如字領也騎竒寄翻不克而走戊子孝寛追斬之温亦坐誅天元即召其妻入宫拜長貴妃長知兩翻辛夘立亮弟永昌公椿為把公周天元如同州増候正前驅式道候為三百六十重候正主候望前驅先驅也式道候在大駕前重直龍翻自應門至於赤岸澤鄭𤣥曰天子五門臯庫雉應路詩云乃立應門應門將將赤岸澤在長安北同州南道里盖適中數十里間幡旗相蔽音樂俱作又令虎賁持鈒馬上稱警蹕賁音奔鈒色立翻㦸也鋋也警戒也戒人以車駕將至也蹕蹕止行人也乙未改同州宫為成天宫庚子還長安還從宣翻又音如字詔天臺侍衛之官皆著五色及紅紫緑衣以雜色為縁名曰品色衣著則略翻縁以絹翻五代志以錦綺繢繡為縁有大事與公服間服之五代志後周之制諸命秩之服曰公服其餘常服曰私衣隋唐以下有朝服有公服朝服曰具服公服曰從省服間古莧翻壬寅詔内外命婦皆執笏後周之制内外命婦各有命服未嘗執笏也其拜宗廟及天臺皆俛伏如男子俛音免天元將立五皇后以問小宗伯狄道辛彦之五代志狄道縣屬金城郡對曰皇后與天子敵體不宜有五太學博士西城何妥曰昔帝嚳四妃虞舜二妃先代之數何常之有博士秦官漢置五經博士即太學博士也晉武帝立國子學置博士一人遂有國子博士太學博士之分西城郡時置金州帝王紀云帝嚳四妃元妃有邰氏女曰姜嫄次妃有娀氏女曰簡狄次妃陳豐氏女曰慶都次妃娵訾氏曰常義列女𫝊云舜二妃堯之二女長曰娥皇次曰女英史言何妥曲學以阿世不可以訓嚳苦沃翻嫄音原娵遵須翻訾子斯翻妥它果翻帝大悦免彦之官甲辰詔曰坤儀比德土數惟五四太皇后外可増置天中太皇后一人於是以陳氏為天中太皇后尉遲妃為天左太皇后陳氏山提之女尉遲氏字文温之妻尉紆勿翻又造下帳五使五皇后各居其一實宗廟祭噐於前自讀祝版而祭之下帳山陵中便房所用此所謂下帳盖周天元以自所居者為上帳五皇后所居者為下帳也祝版所以祝鬼神又以五輅載婦人自帥左右歩從按古制有五輅後周之制皇帝之輅十有二等皇后之車十有二等亦曰輅下至三妃三公三公夫人之輅皆九至上媛婦中大夫孺人其輅五天元雖淫侈無道何至以古之五輅載婦人其實用媛婦以下所乗五輅耳五輅謂𤣥輅夏篆夏縵墨車輚車也帥讀曰率從才用翻又好倒懸雞及碎瓦於車上觀其號呼以為樂好呼到翻號户髙翻樂音洛夏四月癸亥尚書左僕射陸繕卒卒子恤翻己巳周天元祠太廟己夘大雩壬午幸仲山祈雨顔師古曰仲山即今九嵏山之東仲山是也括地志仲山在雍州雲陽縣西十五里甲申還宫令京城士女於衢巷作樂迎候還從宣翻又音如字令力丁翻五月癸巳以尚書右僕射晉安王伯恭為僕射周楊后性柔婉不妬忌四皇后及嬪御等咸愛而仰之嬪内官九嬪也嬪婦也能行婦道者也御侍也進也進御於君者也嬪毗賔翻天元昏暴滋甚喜怒乖度嘗譴后欲加之罪后進止詳閑辭色不撓譴衍戰翻詳審也諦也閑暇也習也撓曲也又動亂也撓女巧翻又女教翻天元大怒遂賜后死逼令引訣漢書多作引决謂引分自裁也訣别也令力丁翻后母獨孤氏獨孤氏信之女也詣閤陳謝叩頭流血然後得免后父大前疑堅位望隆重天元忌之嘗因忿謂后曰必族滅爾家因召堅謂左右曰色動即殺之堅至神色自若乃止内史上大夫鄭譯與堅少同學少詩照翻竒堅相表相息亮翻傾心相結堅既為帝所忌情不自安嘗在永巷永巷宫中長巷私於譯曰身事不敢昌言之故曰私久願出藩公所悉也出藩謂出補外藩悉諳究也願少留意少詩沼翻譯曰以公德望天下歸心欲求多福豈敢忘也鄭譯被寵於天元為如何天元無恙而與楊堅於宫中私言至及于此小人傾覆何可託邪謹即言之天元將遣譯入冦譯請元帥帥所類翻天元曰卿意如何對曰若定江東自非懿戚重臣懿專乆而美也大也無以鎮撫可令隨公行以楊爵稱之且為壽陽摠管以督軍事天元從之己丑以堅為揚州摠管使譯𤼵兵㑹壽陽壽陽屬南則為豫州屬北則為揚州將行㑹堅暴有足疾不果行先無此疾而忽有此疾曰暴暴猝暴也甲午夜天元備法駕幸天興宫乙未不豫而還還音旋又如字小御正博陵劉昉素以狡諂得幸於天元杜佑曰周御正屬天官御正中大夫五命小御正下大夫四命昉分罔翻狡古巧翻猾也與御正中大夫顔之儀並見親信天元召昉之儀入卧内欲屬以後事天元瘖不復能言寢室謂之臥内屬之欲翻瘖於今翻復如字又扶又翻昉見静帝幼冲冲亦幼也周成王率稱冲人冲子以楊堅后父有重名遂與領内史鄭譯鄭譯以内史上大夫領内史御飾大夫栁裘周置御飾大夫掌御飾其御服又置司服掌之内史大夫杜陵韋謩杜陵漢晉皆屬京兆後隋併入京兆大興縣其地在隋唐長安城南謩與謨同御正下士朝那皇甫績朝那縣屬安定郡後周下士二命謀引堅輔政堅固辭不敢當昉曰公若為速為之不為昉自為也堅乃從之稱受詔居中侍疾裘惔之孫也栁惔栁元景之從孫世隆之子世仕江南江陵陷栁氏入闗中遂臣於周惔徒甘翻是日帝殂年二十二殂祚乎翻祕不𤼵䘮昉譯矯詔以堅總知中外兵馬事帝考異曰周紀乙未帝不豫還宫詔堅入侍疾丁未追五王入朝己酉大漸昉譯矯制以堅受遺輔政是日帝崩按堅以變起倉猝故得矯命當國若自乙未至己酉凡十五日事安得不泄今從隋帝紀顔之儀知非帝指拒而不從昉等草詔署訖逼之儀連署之儀厲聲曰主上升遐記曲禮告䘮曰天王登假鄭𤣥曰登上也假己也上己者言若仙去云耳登猶升也假與遐同音霞嗣子冲幼静帝時年八歳阿衡之任商相伊尹輔太甲稱阿衡孔安國𫝊曰阿倚衡平宜在宗英才過人曰英宗英宗室之中其才過人者方今趙王最長以親以德合膺重寄趙王謂趙王招於静帝諸大父行中其年最長長知兩翻膺當也公等備受朝㤙朝直遥翻當思盡忠報國奈何一旦欲以神噐假人老子天下神噐為者敗之執者失之註云大寳之位是天地神明之噐故不可以力為也又曰國之利噐不可以授人之儀有死而已不能誣罔先帝昉等知不可屈乃代之儀署而行之諸衛既受勑並受堅節度周自左右宫伯至左右羽林游擊皆諸衛官也堅恐諸王在外生變以千金公主將適突厥為辭徴趙陳越代滕五王入朝五王就國見上巻上年厥九勿翻朝直遥翻堅索符璽符謂兵符璽謂天子六璽索山客翻璽斯氏翻顔之儀正色曰此天子之物自有主者宰相何故索之索山客翻堅大怒命引出將殺之以其民望出為西邉郡守西邊恐當作西疆五代志臨洮郡合川縣後周置仍立西疆郡仲考異曰北史鄭譯𫝊之儀與宦者謀引大將軍宇文輔政仲已至御坐譯知之遽率開府楊惠及劉昉皇甫績栁裘俱入仲與之儀見譯等愕然逡廵欲出隋文因執之於是矯詔復以譯為内史上大夫明日隋文為丞相拜譯柱國府長史按之儀若爾豈復得全今従之儀𫝊丁未𤼵䘮靜帝入居天臺罷正陽宫置正陽宫見上巻上年大赦停洛陽宫作治洛陽宫見上巻上年二月庚戌尊阿史那太后為太皇太后李太后為太帝太后靜帝祖母也楊后為皇太后朱后為帝太后靜帝嫡母生母也其陳后元后尉遲后並為尼皆不以德選以色進者也尼女夷翻以漢王贊為上柱國右大丞相贊静帝叔父也周人上右相息亮翻尊以虚名實無所綜理以楊堅為假黄鉞左大丞相秦王贄為上柱國百官摠己以聽於左丞相孔子曰君薨百官摠己以聽於冢宰三年朱熹曰各摠攝已職以聽也余謂若此者必有伊周之臣而後可堅初受顧命顧命始於周成王孔安國曰臨終之命曰顧命余謂顧命者言天子登遐若囘顧而有所言也陸德眀曰顧工户翻使䢴國公楊惠邗音寒又古寒翻謂御正下大夫李德林曰朝廷賜令摠文武事經國任重今欲與公共事必不得辭德林曰願以死奉公堅大喜始劉昉鄭譯議以堅為大冢宰譯自攝大司馬昉又求小冢宰後周置小冢宰上大夫也六命按爾雅冢大也鄭玄曰冢大之上也冢宰之上不宜加小字故周官止曰小宰昉分㒺翻冢知隴翻堅私問德林曰欲何以見處處昌吕翻德林曰宜作大丞相假黄鉞都督中外諸軍事不爾無以壓衆心如昉譯之言大冢宰雖六官之長然猶與諸公等夷德林所言則宇文泰所以輔魏者也不爾猶言不如此也相息亮翻壓於甲翻及𤼵䘮即依此行之以正陽宫為丞相府時衆情未壹言周之朝臣未盡歸心於堅堅引司武上士盧賁置左右賁扶分翻將之東宫正陽宫本東宫也百官皆不知所從堅潜令賁部伍仗衛仗衛執仗而宿衛之兵也盧賁以司武上士統之楊堅潜令賁此舉為如何因召公卿謂曰欲求富貴者宜相隨觀堅此言則其夙心可知矣徃徃偶語欲有去就賁嚴兵而至衆莫敢動出崇陽門崇陽門周宫城之東門至東宫門者拒不納賁諭之不去瞋目叱之瞋昌真翻門者遂却堅入賁遂典丞相府宿衛盧賁遂為楊堅私人矣賁辯之弟子也盧辯與蘓綽共定後周官制者也以鄭譯為丞相府長史長知兩翻劉昉為司馬李德林為府屬丞相府有掾有屬二人由是怨德林内史下大夫勃海髙熲按隋書髙熲自六勃海蓨人熲古迥翻眀敏有噐局習兵事多計畧堅欲引之入府引之入丞相府為官屬遣楊惠諭意楊惠堅族子也堅初秉周政欲引時才故率使之諭意堅既受禪封觀王改名雍熲承㫖欣然曰願受驅馳縱令公事不成熲亦不辭滅族乃以為相府司録司録摠録一府之事令力丁翻相息亮翻時漢王贊居禁中毎與静帝同帳而坐劉昉飾美妓進贊妓渠綺翻女樂也贊甚悦之昉因説贊曰大王先帝之弟時望所歸孺子幼冲豈堪大事説輸芮翻孺子謂靜帝今先帝初崩人情尚擾王且歸第待事寧後入為天子此萬全計也贊年少少詩照翻性識庸下以為信然遂從之堅革宣帝苛酷之政更為寛大删略舊律作刑書要制奏而行之躬履節儉中外悦之賈誼曰寒者利裋褐飢者甘糟糠天下之嗷嗷新主之資也古之得天下必先有以得天下之心雖奸雄挾數用術不能外此也更工衡翻堅夜召太史中大夫庾季才太史掌天文厯數周制太史中大夫屬春官五命問曰吾以庸虚庸言身無所能虚言胷中無所有謙辭也受茲顧命天時人事卿以為何如季才曰天道精微難可意察竊以人事卜之符兆已定符籤也證也驗也兆龜坼文也又人事之兆朕也季才縱言不可公豈復得為箕潁之事乎司馬貞曰堯讓天下於許由由遂逃於箕山洗耳于潁水復扶又翻又音如字堅黙然久之曰誠如君言獨孤夫人亦謂堅曰大事已然騎虎之勢必不得下勉之獨孤夫人堅妃也騎虎而下必為所噬堅以相州摠管尉遲迥位望素重恐有異圖相息亮翻尉紆勿翻使迥子魏安公惇奉詔書召之㑹葬魏安郡公五代志武威郡昌松縣有後魏魏安郡注詳見後壬子以上柱國韋孝寛為相州摠管又以小司徒叱列長乂為相州刺史叱列虜複姓出於拓㧞氏西部後為周之戚里先令赴鄴孝寛續進鄴相州摠管治所陳王純時鎮齊州純就國於濟南濟南郡齊州也堅使門正上士崔彭徴之門正掌門闗啓閉之節及出入門者彭以兩騎往止𫝊舍騎竒寄翻𫝊張戀翻遣人召純純至彭請屏左右宻有所道屏必郢翻道言也遂執而鎻之因大言曰陳王有罪詔徴入朝左右不得輙動其從者愕然而去朝直遥翻從才用翻彭楷之孫也崔楷死職見一百五十一巻梁武帝大通元年六月五王皆至長安庚申周復行佛道二教周禁二教見一百七十一巻六年復扶又翻又音如字舊沙門道士精志者簡令入道簡分别也周尉遲迥知丞相堅將不利於帝室謀舉兵討之尉紆勿翻相息亮翻韋孝寛至朝歌五代志汲郡衛縣舊曰朝歌迥遣其大都督賀蘭貴周書賀蘭其先與魏俱起有紇伏者為賀蘭莫何弗因以為氏齎書候韋孝寛齎相稽翻孝寛留貴與語以審之疑其有變遂稱疾徐行又使人至相州求醫藥密以伺之伺相吏翻孝寛兄子藝為魏郡守守式又翻迥遣藝迎孝寛孝寛問迥所為藝黨於迥不以實對魏郡守與相州搃管府同治鄴職事有聨且迥忠于帝室宜其黨于所事守手又翻孝寛怒將斬之藝懼悉以迥謀語孝寛語牛倨翻孝寛擕藝西走毎至亭驛亭郵亭也即置驛之所盡驅其𫝊馬而去𫝊馬即驛馬𫝊張戀翻謂驛司曰驛司掌驛之吏蜀公將至宜速具酒食尉遲迥封蜀公故稱之迥尋遣儀同大將軍梁子康將數百騎追孝寛追者至驛輙逄盛饌康將即亮翻又音如字領也騎竒寄翻饌雛皖翻又雛戀翻食也又無馬遂遲留不進孝寛與藝由是得免史言韋孝寛機數過人堅又令候正破六韓裒詣迥諭㫖破六韓虜三字姓諭譬也告也暁也㫖意向也裒薄矦翻宻與摠管府長史晉昶等書姓苑晉本唐叔虞之後以國為氏長知兩翻昶音敞令為之備迥聞之殺昶及裒集文武士民文武謂摠管府及州郡文武官屬也令力丁翻登城北樓令之曰楊堅藉后父之勢挾幼主以作威福不臣之迹暴於行路令力定翻藉慈夜翻暴歩卜翻顯示也又如字顯露也吾與國舅甥尉遲迥宇文㤗之甥任兼將相先帝處吾於此將即亮翻相息亮翻處昌吕翻本欲寄以安危今欲與卿等糾合義勇糾渠黝翻䋲三合為糾言糾合者義取諸此以匡國庇民何如衆咸從命迥乃自稱大摠管承制置官司稱大摠管者欲以統攝諸州摠管署置官司而隔於權臣未得以聞於天子故曰承制時趙王招入朝留少子在國趙王招國於襄國襄國屬相州摠管府朝直遥翻少詩照翻迥奉以號令甲子堅𤼵闗中兵以韋孝寛為行軍元帥帥所類翻郕公梁士彦樂安公元諧化政公宇文忻濮陽公武川宇文述武鄉公崔𢎞度清河公楊素隴西公李詢等皆為行軍摠管以討迥梁士彦國公郕古國名自元諧以下皆郡公五代志北海郡千乗縣舊置樂安郡地形志夏州有化政郡參考五代志當在夏州巖録縣界東平郡郵城縣舊置濮陽郡述𫝊曰述代郡武川人志馬邑郡善陽縣有代郡上黨郡鄉縣石勒置武鄉郡五代志周改馮翊華隂縣為武鄉郡清河郡武城縣舊置清河郡隴西古郡也後魏領襄武首陽縣樂音洛濮博木翻𢎞度楷之孫詢穆之兄子也李穆時為并州刺史初宣帝使計部中大夫楊尚希撫慰山東後周置計部盖主計㑹之簿書若周官之司書杜佑曰計部屬天官至相州聞宣帝殂殂祚乎翻與尉遲迥𤼵䘮尉紆勿翻尚希出謂左右曰蜀公哭不哀而視不安將有他計吾不去懼及於難難乃旦翻遂夜從㨗徑而遁捷徑者不由正路捷出取徑直而行遲眀遲直利翻待也迥覺追之不及遂歸長安堅遣尚希督宗兵三千人鎮潼闗楊尚希𢎞農人𢎞農華隂諸楊自東漢至後魏為名族魏分東西𢎞農又為兵衝故楊氏有宗兵雍州牧畢刺王賢雍於用翻刺盧逹翻諡法愎狠遂過曰刺又不思忘愛曰刺暴慢無親曰刺楊堅加賢以惡諡耳與五王謀殺堅事洩洩與泄同堅殺賢并其三子掩五王之謀不問堅豈真不問哉山東有變内復相圖姑以安反側耳以秦王贄為大冢宰杞公椿為大司徒庚子以柱國梁睿為益州摠管睿禦之子也梁禦見一百五十六巻梁武帝中大通六年周遣汝南公神慶司衛上士長孫晟汝南古郡名晟丞正翻送千金公主於突厥厥九勿翻晟幼之曽孫也按隋長孫晟𫝊及唐宰相世系表晟長孫稚之五世孫稚字㓜卿生子裕子裕生紹逺紹逺生覧覧生敞敞生熾熾生晟非曽孫也若書稚字幼下亦闕卿字又遣建威矦賀若誼建威縣矦五代志建威縣屬武都郡若人者翻賂佗鉢可汙可從刋入聲汗音寒且説之以求髙紹義説輸芮翻佗鉢偽與紹義獵於南境使誼執之誼敦之弟也賀若敦弼之父也秋七月甲申紹義至長安徙之蜀久之病死於蜀周青州摠管尉遲勤迥之弟子也尉紆勿翻初得迥書表送之尋亦從迥迥所統相衛黎洺貝趙冀瀛滄五代志汲郡東魏置義州後周為衛州黎陽縣後魏黎陽郡後置黎州武安郡後周置洺州清河郡後周置貝州趙郡大陸縣舊曰廣阿置殷州後改趙州信都郡舊置冀州河間郡河間縣舊置瀛州勃海郡饒安縣舊置滄州滅考異曰周書迥𫝊又有毛州按迥後隋高祖始置毛州迥𫝊誤也勤所統青齊膠光莒等州五代志北海郡置青州齊郡舊曰齊州高宻郡舊置膠州東莱郡舊置光州琅邪郡沂水縣舊置南青州後周改為莒州皆從之衆數十萬榮州刺史邵公胄五代志榮陽郡汜水縣古虎牢也後魏置東中府東魏置北豫州後周置榮州邵公胄周宗室也封邵郡公申州刺史李惠五代志義陽郡江左置司州後魏改曰郢州後周改曰申州東楚州刺史費也利進五代志琅邪郡後魏置南徐州梁改為東徐州東魏改東楚州陳改安州後周改泗州豈史家以舊州名書之邪費也虜複姓盖即費也頭種費扶沸翻潼州刺史曹孝逺按五代志後周亦無潼州但云下邳郡夏丘縣梁置潼州後齊改曰睢州尋廢夏丘宿豫相去不逺宿豫舊東楚治所意此時尚有此二州而志逸之也各據本州徐州摠管司録席毗羅據兖州五代志魯郡瑕丘縣舊置兖州姓苑席姓其先姓籍避項羽諱改姓席氏前東平郡守畢義緒據蘭陵五代志蘭陵縣舊曰承置蘭陵郡守式又翻皆應迥懐縣永橋鎮將紇豆陵惠以城降迥五代志懐縣屬河内郡隋大業初廢入安昌縣安昌本州縣紇豆陵虜三字姓魏收官氏志次南諸姓有紇豆陵氏將即亮翻迥使其所署大將軍石遜攻建州建州刺史宇文弁以州降之五代志長平郡舊曰建州降户江翻又遣西道行臺韓長業攻㧞潞州五代志上黨郡後周置潞州執刺史趙威署城人郭子勝為刺史紇豆陵惠襲陷鉅鹿鉅鹿古郡也隋為縣屬襄國郡遂圍恒州五代志恒山郡後周置恒州恒户登翻上大將軍宇文威攻汴州五代志榮陽郡浚儀縣東魏置梁州後周改曰汴州汴皮變翻莒州刺史烏丸尼等帥青齊之衆圍沂州五代志琅邪郡舊置北徐州後周改曰沂州帥讀曰率大將軍檀讓攻㧞曹亳二州五代志濟隂郡後魏置西兖州後周改曰曹州譙郡後魏置南兖州後周改毫州亳旁各翻屯兵梁郡梁郡治睢陽席毗羅衆號八萬軍於蕃城攻陷昌慮下邑五代志彭城郡滕縣舊曰蕃置蕃郡隋改曰滕昌慮漢古縣後魏屬蘭陵郡下邑亦漢古縣五代志屬梁郡漢書蕃音皮慮音廬李惠自申州攻永州㧞之五代志汝南郡城陽縣梁置楚州東魏置西楚州後齊曰永州城陽前漢矦國其地在義陽東北迥遣使招大左輔并州刺史李穆穆鎻其使封上其書使疏吏翻上時掌翻穆子士榮以穆所居天下精兵處并州用武之地士健馬多故曰天下精兵處隂勸穆從迥穆深拒之堅使内史大夫栁裘詣穆為陳利害為于偽翻又使穆子左侍上士渾往布腹心布腹心者陳其至誠非貌言也穆使渾奉尉斗於堅曰願執威柄以尉安天下尉斗今之熨斗毛晃曰火斗熨噐篆文作叞从􅊂从火从又又偏旁手字持火所以申繒也今文作尉俗加火作熨尉紆胄翻又紆勿翻又以十三鐶金帶遺堅十三鐶金帶者天子之服也五代志曰革帯案禮博二寸禮圖曰璫綴於革帶阮諶以為有章印則於革帶佩之東觀記曰楊賜拜太常詔賜自所著革帶故知形制尊卑不别今博三寸半加金鏤䚢螳螂鈎以相鈎帶自大裘至於小朝服皆用之天子以十三鐶金帶為異後周制也鐶户闗翻遺于季翻堅大悦遣渾詣韋孝寛述穆意使述穆意以堅孝寛附己之心穆兄子崇為懐州刺史五代志河内郡舊制懐州初欲應迥後知穆附堅慨然太息曰闔家富貴者數十人值國有難竟不能扶傾繼絶復何面目處天地間乎難乃旦翻復扶又翻處昌吕翻不得已亦附於堅迥子誼為朔州刺史按五代志後齊朔州治桑乾隋併入馬邑郡善陽縣置摠管府穆執送長安又遣兵討郭子勝擒之迥招徐州摠管源雄東郡守于仲文皆不從雄賀之曽孫仲文謹之孫也東郡治白馬源賀本出禿髪氏歸魏改姓源于謹事宇文有大功守手又翻迥遣宇文胄自石濟宇文威自白馬濟河石濟在白馬西二道攻仲文仲文棄郡走還長安迥殺其妻子迥遣檀譲徇地河南丞相堅以仲文為河南道行軍摠管使詣洛陽發兵討讓命楊素討宇文胄丁未周以丞相堅都督中外諸軍事鄖州摠管司馬消難亦舉兵應迥按五代志漢東郡唐城縣本梁之下溠城後魏之㵐西縣也後魏立肆州尋改唐州後周省均欵溳歸四州入如此則鄖州已併省今有鄖州摠管而志逸置摠管府之地此考史之所以難也春秋鄖子之國杜預謂在江夏雲杜縣東南有鄖城章懐太子賢曰雲杜故城在復州沔陽縣西北周盖因古國名置鄖州于沔陽也鄖音云難乃旦翻己酉周以柱國王誼為行軍元帥以討消難帥所類翻廣州刺史于顗仲文之兄也與摠管趙文表不協詐得心疾誘文表手殺之誘音酉因唱言文表與尉遲迥通謀堅以迥未平因勞勉之即拜吳州摠管按隋書于顗𫝊顗時為東廣州刺史五代志江都郡梁置南兖州後齊改為東廣州陳復曰南兖後周改曰吳州東廣州盖因廣陵以名州觀此則此時東廣州刺史與吳州摠管並治廣陵也廣上逸東字顗魚豈翻勞力到翻趙僭王招謀殺堅楊堅亦以趙王招謀殺已而加惡謚邀堅過其第過古禾翻堅齎酒殽就之齎則兮翻招引入寢室招子貟貫及妃弟魯封等皆在左右佩刀而立又藏刅於帷席之間伏壯士於室後堅左右皆不得從唯從祖弟開府太將軍𢎞大將軍元胄坐于户側胄順之孫也元順以伉直得名於孝昌之間從才用翻𢎞胄皆有勇力為堅腹心酒酣招以佩刀刺𤓰連啗堅欲因而刺之酣户甘翻刺七賜翻又七迹翻啗徒敢翻又徒濫翻元胄進曰相府有事不可乆留招訶之曰我與丞相言汝何為者叱之使却胄瞋目憤氣扣刀入衛訶虎何翻瞋昌真翻招賜之酒曰吾豈有不善之意邪卿何猜警如是猜疑也警戒也猜警言疑而加戒慎也邪音耶招偽吐將入後閤胄恐其為變扶令上坐如此再三招偽稱㗋乾吐土故翻嘔也上時掌翻坐徂卧翻下同乾音干命胄就厨取飲胄不動㑹滕王逌後至逌音由堅降階迎之胄耳語曰附耳而語事勢大異可速去堅曰彼無兵馬何能為胄曰兵馬皆彼物彼若先發大事去矣胄不辭死恐死無益堅復入坐復扶又翻又音如字胄聞室後有被甲聲遽請曰相府事殷被皮義翻相息亮翻殷衆也公何得如此因扶堅下牀趨去招將追之胄以身蔽户招不得出堅及門胄自後至招恨不時𤼵彈指出血壬子堅誣招與越野王盛謀反皆殺之野亦惡謚也及其諸子賞賜元胄不可勝計勝音升周室諸王數欲伺隙殺堅數所角翻伺相吏翻堅都督臨涇李圎通常保䕶之按隋書李圓通𫝊作京兆涇陽人涇陽縣固屬京兆若以為臨涇則屬安定圓通少給使堅家由是得免癸丑周主封其弟衍為葉王大建五年六月周皇孫衍生武帝建德二年也大建九年周封皇子衍為道王武帝建德之六年也今静帝又封其弟衍為葉王李延夀又謂静帝本名衍改名闡互有背馳當考葉式渉翻術為郢王周豫荆襄三州蠻反豫州汝南郡荆州南郡襄州襄陽郡此蠻即所謂山蠻自荆襄至于汝漢皆有之攻破郡縣周韋孝寛軍至永橋城諸將請先攻之孝寛曰城小而固若攻而不㧞損我兵威今破其大軍此何能為於是引軍壁於武陟武陟地名按五代志在河内郡修武縣界至隋析置武陟縣將即亮翻尉遲迥遣其子魏安公惇帥衆十萬入武德軍於沁東魏安縣公五代志宕渠郡墊江縣後周為魏安縣又沔陽郡甑山縣梁置梁安郡西魏改曰魏安郡注又見前河内郡安昌縣舊曰州縣置武德郡尉於勿翻惇都昆翻帥讀曰率沁七鴆翻㑹沁水漲孝寛與迥隔水相持不進此與迥兵相持耳孝寛長史李詢宻啓丞相堅云梁士彦宇文忻崔𢎞度並受尉遲迥饟金長知兩翻相息亮翻饟即亮翻饋也軍中慅慅慅采早翻慅慅憂愁不安也人情大異堅深以為憂與内史上大夫鄭譯謀代此三人者後周之制上大夫六命李德林曰公與諸將皆國家貴臣未相服從今正以挾令之威控御之耳將即亮翻挾令謂挾天子以令諸將也前所遣者疑其乖異後所遣者又安知能盡其腹心邪邪音耶又取金之事虚實難眀今一旦代之或懼罪逃逸若加縻縶則自鄖公以下莫不驚疑縻靡為翻縶陟立翻皆謂繫縛也韋孝寛封鄖國公且臨敵易將此燕趙之所以敗也燕惠王信䜛用騎刼代樂毅而敗于田單趙惠文王聽間用趙括代亷頗以敗于白起臨敵易將之禍也將即亮翻燕因肩翻將即亮翻下同如愚所見但遣公一腹心明于智略素為諸將所信服者速至軍所使觀其情偽縱有異意必不敢動動亦能制之矣堅大悟曰公不發此言幾敗大事幾居依翻敗補邁翻乃命少内史崔仲方徃監諸軍為之節度仲方猷之子也以杜佑通典攷之少内史當作小内史崔猷見一百六十二巻梁武帝太清三年仲方有文武才幹與堅少相欵宻故欲用之監工銜翻辭以父在山東又命劉昉鄭譯昉辭以未嘗為將將即亮翻譯辭以母老堅不悦府司録髙熲請行堅喜遣之熲受命亟𤼵亟紀力翻遣人辭母而已自是堅措置軍事皆與李德林謀之時軍書日以百數德林口授數人文意百端不加治㸃治脩改也㸃塗㸃也不加治㸃不加塗改也治直之翻司馬消難以鄖隨温應土順沔儇岳九州及魯山等八鎮来降五代志漢東郡西魏置并州後改曰隨州安陸郡京山縣舊曰新陽梁置新州西魏改曰温州應山縣梁置應州漢東郡土山縣梁置土州順義縣梁置順州沔陽郡後周置復州後改沔州安陸郡吉陽縣後周置澴州孝昌縣西魏置岳州魯山在沔陽郡漢陽縣界臨江齊梁以來為重鎮儇當作澴音户闗翻難乃旦翻遣其子為質以求援質音致八月己未詔以消難為大都督摠督九州八鎮諸軍事司空賜爵隨公庚申詔鎮西將軍樊毅進督沔漢諸軍事沔即漢也南豫州刺史任忠帥衆趣歴陽超武將軍陳慧紀為前軍都督趣南兖州超武將軍梁置與宣猛將軍同班任音壬帥讀曰率趣七喻翻周益州摠管王謙周益州摠管府治成都亦不附丞相堅起巴蜀之兵以攻始州此巴蜀謂漢巴郡蜀郡大界五代志普安郡梁置南梁州後改曰安州西魏改曰始州梁睿至漢川不得進堅以梁睿代王謙謙舉兵故睿不得進漢川即漢中隋避諱改曰漢川堅即以睿為行軍元帥以討謙帥所類翻戊辰詔以司馬消難為大都督水陸諸軍事庚午通直散騎常侍淳于陵克臨江郡五代志歴陽郡烏江縣梁置江都郡後齊改為齊江郡陳改為臨江郡散悉亶翻騎竒寄翻梁世宗使中書舍人柳莊奉書入周丞相堅執莊手曰孤昔開府從役江陵深蒙梁主殊眷今主幼時艱猥䝉顧託梁主奕葉委誠朝廷奕累也奕葉累世也朝直遥翻當相與共保嵗寒孔子曰歳寒然後知松栢之後彫何晏注曰大寒之歳衆木皆死然後知松栢不彫傷平嵗衆木亦有不死者故須歳寒而後别之喻凡人處治世亦自能修整與君子同在濁世然後知君子之不茍容後之言保歳寒者義取諸此時諸將競勸梁主舉兵與尉遲迥連謀以為進可以盡節將即亮翻尉紆勿翻周氏退可以席巻山南漢沔之地在中南太華諸山之南巻讀曰捲梁主疑未决㑹莊至具道堅語且曰昔袁紹劉表王凌諸葛誕皆一時雄傑據要地擁彊兵然功業莫就禍不旋踵者良由魏晋挾天子保京都仗大順以為名故也袁紹事始六十三巻漢獻帝建安四年終六十四巻十年劉表事見六十五巻十二年十三年王凌事見七十五巻魏邵陵厲公嘉平元年終三年諸葛誕事見七十七巻高貴鄉公甘露二年三年今尉遲迥雖曰舊將昏耄已甚將即亮翻耄莫到翻司馬消難王謙常人之下者非有匡合之才匡合用管仲相齊桓公九合諸矦一匡天下事周朝將相多為身計競効節於楊氏朝直遥翻將即亮翻相息亮翻以臣料之迥等終當覆滅隨公必移周祚祚福也禄也位也未若保境息民以觀其變梁主深然之衆議遂止高熲至軍為橋於沁水尉遲惇於上流縱火栰大曰栰小曰桴縛本為栰寘火積薪於上流放之欲順流而下以焚橋栰房越翻熲豫為土狗以禦之盖積土于水中前鋭後廣前高後庳其狀如坐狗分居上流以礙火栰使不得下逼橋邉也考異曰隋書作木栰木狗今從北史惇布陳二十餘里陳讀曰陣下同麾兵少却少詩沼翻欲待孝寛軍半度而擊之孝寛因其却鳴鼔齊進軍既度熲命焚橋以絶士卒反顧之心惇兵大敗單騎走騎竒寄翻孝寛乗勝進追至鄴庚午迥與惇及惇弟西都公祐西都縣公五代志西平郡湟水縣舊曰西都悉將其卒十三萬陳於城南迥别統萬人皆緑巾錦襖號黄龍兵將即亮翻襖烏浩翻袍襖迥弟勤帥衆五萬帥讀曰率自青州赴迥以三千騎先至迥素習軍旅老猶被甲臨陳被皮義翻其麾下皆闗中人為之力戰闗中人不顧父母妻子為迥力戰言其得士心為於偽翻孝寛等軍不利而却鄴中士民觀戰者數萬人行軍摠管宇文忻曰事急矣吾當以詭道破之乃先射觀者李考異曰隋書云高熲與詢先犯勸者今從北史觀者皆走轉相騰藉聲如雷霆人衆而囂故其聲如雷霆射食亦翻下同藉慈夜翻忻乃𫝊呼曰賊敗矣衆復振因其擾而乗之迥軍大敗走保鄴城孝寛縱兵圍之李詢及思安伯代人賀婁子幹先登思安縣伯五代志河池郡河池縣後魏置思安縣魏書官氏志神元皇帝時諸部内入者有賀樓氏盖虜複姓崔𢎞度妹先適迥子為妻及鄴城破迥窘廹升樓窘巨隕翻𢎞度直上龍尾追之築道陂陀以上城其道下附於地若龍垂尾然故曰龍尾上時掌翻迥彎弓將射𢎞度𢎞度脱兜鍪謂迥曰頗相識不鍪莫矦翻不讀曰否今日各圖國事不得顧私以親戚之情謹遏亂兵不許侵辱事勢如此早為身計何所待也迥擲弓於地罵左丞相極口而自殺楊堅時為左右丞相𢎞度顧其弟𢎞升曰汝可取迥頭𢎞升斬之軍士在小城中者孝寛盡阬之以其從迥為之拒戰也勤惇祐東走青州走音奏又音如字未至開府儀同大將軍郭衍追獲之丞相堅以勤初有誠欵以勤初表送迥書也相息亮翻特不之罪李惠先自縛歸罪李惠自申州舉兵應迥既而知迥事不成先自歸堅復其官爵迥末年衰耄記五十始衰謂精力消耗八十九十曰耄注耄惛忘也耄莫報翻復扶又翻又音如字及起兵以小御正崔逹挐為長史逹挐暹之子也崔暹見用於高澄挐奴加翻長知兩翻暹息㢘翻文士無籌略舉措多失凡六十八日而敗于仲文軍至蓼隄去梁郡七里九域志蓼隄梁孝王築至睢陽三百里按此則九域志所謂睢陽非漢舊城之地蓼盧鳥翻或音六非檀讓擁衆數萬仲文以羸師挑戰而偽北羸倫為翻挑徒了翻讓不設備仲文還擊大破之生獲五千餘人斬首七百級還從宣翻又音如字進攻梁郡梁郡治睢陽迥守將劉子寛弃城走將即亮翻下同仲文進擊曹州獲迥所署刺史李仲康檀讓以餘衆屯成武仲文襲擊破之遂㧞成武五代志濟隂郡成武縣時為永昌郡迥將席毗羅衆十萬屯沛縣五代志沛縣屬彭城郡將即亮翻將攻徐州徐州彭城郡沛縣在州西北一百四十里其妻子在金鄉五代志金鄉縣屬曹州濟隂郡仲文遣人詐為毗羅使者使疏吏翻謂金鄉城主徐善淨曰檀讓明日午時至金鄉宣蜀公令賞賜將士金鄉人皆喜仲文簡精兵偽建迥旗幟倍道而進簡分揀也幟昌志翻善淨望見以為檀讓出迎謁仲文執之遂取金鄉諸將多勸屠其城仲文曰此城乃毗羅起兵之所當寛其妻子其兵自歸如即屠之彼望絶矣衆皆稱善於是毗羅恃衆來薄官軍薄廹也仲文設伏擊之毗羅衆大潰爭投洙水死水為之不流洙水詳見辯誤為千偽翻獲檀讓檻送京師京師謂長安斬毗羅𫝊首亦𫝊首於長安韋孝寛分兵討闗東叛者悉平之堅徙相州於安陽毁鄴城及邑居劉昫曰楊堅令韋孝寛討尉遲迥平之焚燒鄴城徙其居人南遷四十五里以安陽城為相州理所仍為鄴縣隋又改為安陽縣漢魏郡城在縣西北七里煬帝於鄴故都大慈寺置鄴縣相息亮翻尉紆勿翻分相州置毛州魏州五代志武陽郡後周置魏州館陶縣置毛州顔師古曰漢武帝時河北決于館陶分為屯氏河屯音大門翻而隨室分析州縣誤以為毛氏河乃置毛州失之甚矣梁主聞迥敗謂栁莊曰若從衆人之言社稷已不守矣丞相堅之初得政也待黄公劉昉沛公鄭譯甚厚黄古國名沛本縣名以漢高祖初為沛公故亦為國昉分㒺翻賞賜不可勝計勝音升委以心膂膂力舉翻字林膂脊骨也人之一身思慮之所以運者心腰背之所以强者膂故以為喻朝野傾屬朝直遥翻屬之欲翻稱為黄沛二人皆恃功驕恣恃其汲引之功也溺於財利不親職務及辭監軍堅始疎之恩禮漸薄監工銜翻高熲自軍所還言自鄴還還音旋又如字寵遇日隆時王謙司馬消難未平難乃旦翻堅憂之忘寢與食而昉逸游縱酒相府事多遺落遺失也落墜也相息亮翻堅乃以高熲代昉為司馬不忍廢譯隂勑官屬不得白事於譯勑戒也譯猶坐聽事聽事丞相府長史聽事也聽讀曰㕔無所闗預要㑹之處為闗又聨絡也預參預也又干也惶懼頓首求解職堅猶以恩禮慰勉之癸酉智武將軍魯廣逹克周之郭黙城梁置五德將軍智武其一也郭黙城當在今蘄黄二州界丙子淳于陵克祐州城祐州城地闕周以漢王贊為太師申公李穆為太傅宋王實為大前疑秦王贄為大右弼燕公于寔為大左輔燕因肩翻寔仲文之父也周王誼帥四摠管至鄖州司馬消難擁其衆以魯山甑山二鎮來降五代志甑山縣後周置屬沔陽郡帥讀曰率鄖音云難乃旦翻甑子孕翻降户江翻初消難遣上開府儀同大將軍叚珣將兵圍順州將即亮翻又如字領也順州刺史周法尚不能拒弃城走消難虜其母弟而南樊毅救消難不及周亳州摠管元景山撃之毅掠居民而去景山與南徐州刺史宇文㢸追之按隋書宇文㢸𫝊㢸時為南司州刺史與元景山共追樊毅又五代志安陸郡吉陽縣梁置義陽郡西魏改為南司州其地近澴順諸州南徐當作南司㢸古弼字與毅戰於漳口此漳非左傳所謂江漢沮漳之漳今安陸西五十里有漳水沈括筆談曰清濁相揉者為漳章文也别有雲夢之漳與溳合流色理如螮蝀數十里方混一日三戰三捷毅退保甑山鎮城邑為消難所據者景山皆復取之鄖州巴蠻多叛按王誼𫝊於時北至商洛南拒江淮東西二千餘里巴蠻多叛是則晉宋以來所謂山蠻也南朝諸史所謂荆雍州蠻者也以其先出於巴種故謂之巴蠻共推渠帥蘭雒州為主以附消難渠大也渠帥者大帥也帥所類翻下氐帥同王誼遣諸將分討之旬月皆平陳紀蕭摩訶攻廣陵陳紀即陳慧紀周吳州摠管于顗擊破之顗魚豈翻沙州氐帥楊永安聚衆應王謙大將軍樂寧公逹奚儒討之按隋書逹奚長儒𫝊沙氐楊永安扇動利興武文沙龍等六州以應謙參考五代志獨不載沙州盖沙氐所居之地就置沙州以授其渠帥也又長儒襲父慶爵樂安公志云北海郡博昌縣舊曰樂安寧當作安儒上逸長字楊素破宇文胄於石濟斬之周以神武公竇毅為大司馬竇毅即前紇豆陵毅齊公于智為大司空九月以小宗伯竟陵公楊惠為大宗伯竟陵縣公五代志沔陽郡竟陵縣舊曰霄城置竟陵郡後周廢郡改縣曰竟陵丁亥周將王延貴帥衆援歴陽任忠擊破之生擒延貴將即亮翻下同帥讀曰率下同任音壬壬辰周廢皇后司馬氏為庶人以司馬后父消難起兵而南叛也庚戍以隨世子勇為洛州摠管東京小冢宰摠統舊齊之地自闗以東河汾以北皆舊齊之地東京小冢宰此洛州所置六府官也壬子以左丞相堅為大丞相罷左右丞相之官冬十月甲寅日有食之周丞相堅殺陳惑王純及其子純周五王之一也故楊堅加之惡謚周梁睿將歩騎二十萬討王謙騎竒寄翻謙分命諸將據險拒守睿奮擊屢破之蜀人大駭謙遣其將逹奚惎高阿那肱乙弗䖍等帥衆十萬攻利州五代志義城郡後魏立益州世號小益州梁曰黎州西魏復曰益州又改曰利州惎渠記翻堰江水以灌之嘉陵江在利州城西城中戰士不過二千摠管昌黎豆盧勣晝夜拒守隋書豆盧勣𫝊勣昌黎徒河人本姓慕容燕北地王精之後也中山敗歸魏北人謂歸義為豆盧因氏焉凡四旬時出竒兵撃惎等破之㑹梁睿至惎等遁去睿自劒閣入進逼成都謙令逹奚惎乙弗䖍城守親帥精兵五萬背城結陳睿擊之謙戰敗將入城惎䖍以城降守手又翻帥讀曰率背蒲昧翻陳讀曰陣降户江翻謙將麾下三十騎走新都新都縣屬蜀郡九域志新都縣在成都北四十五里將即亮翻騎竒寄翻走音奏新都令王寳執之戊寅睿斬謙及高阿那肱劒南平蜀地在劒閣之南故曰劒南十一月甲辰周逹奚儒破楊永安沙州平奚下儒上脫長字丁未周鄖襄公韋孝寛卒謚法辟地有德曰襄又甲胄有勞曰襄卒子恤翻孝寛久在邊境梁武帝中大同元年韋孝寛鎮玉壁宇文與高氏兵爭倚為蕃扞有年數矣屢抗彊敵所經略布置人初莫之解解户買翻暁也見其成事方乃驚服雖在軍中篤意文史敦睦宗族敦厚也所得俸禄俸扶用翻不入私室人以此稱之十二月庚辰河東康簡王叔獻卒謚法温柔好樂曰康一德不懈曰簡癸亥周詔諸改姓者宜悉復舊宇文㤗以諸將補九十九姓見一百六十五巻梁元帝承聖三年上書十二月庚辰此書癸亥自庚辰至癸亥四十四日庚辰必誤按長歴周陳十二月皆壬子朔恐是丙辰甲子周以大丞相堅為相國摠百揆去都督中外大冢宰之號去𦍑吕翻進爵為王以安陸等二十郡為隨國按隋書帝紀時以隋州之崇業鄖州之安陸城陽温州之宜人應州之平靖上眀順州之淮南土州之永川昌州之廣昌安昌申州之義陽淮安息州之新蔡建安豫州之汝南臨潁廣寧初安蔡州之蔡陽郢州之漢東二十郡為隨國贊拜不名備九錫之禮是時九錫之禮一大輅戎輅各一𤣥牡二駟二衮冕之服赤舄副焉三軒懸之樂六佾之舞四朱户以居五納陛以登六虎賁三百人七鈇鉞各一八彤弓一彤矢百盧弓十盧矢千九秬鬯一卣圭瓚副焉堅受王爵十郡而已辛未殺代奰王逹滕聞王逌及其子既殺二王亦皆加以惡謚謚法不醉而怒曰奰色取行違曰聞奰平祕翻壬申以小冢宰元孝規為大司徒是歳周境内有州二百一十一郡五百八資治通鑑巻一百七十四
