front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑巻二百五十四宋司馬光撰胡三省音註唐紀七十起上章困敦十一月盡𤣥黓攝提格四月凡一年有竒僖宗惠聖恭定孝皇帝中之上廣明元年十一月河中都虞矦王重榮作亂剽掠坊市俱空重直龍翻剽匹妙翻宿州刺史劉漢宏怨朝廷賞薄漢宏降見上卷七月賞盜而盜怨其賞薄彼果有以窺朝廷也甲寅以漢宏為浙東觀察使為漢宏為錢鏐所㓕張本詔河東節度使鄭從讜以本道兵授諸葛爽及代州刺史朱玫使南討黄巢玫莫杯翻乙卯以代北都統李琢為河陽節度使代北已定李琢内徙亦以備黄巢也初黄巢將度淮豆盧瑑請以天平節鉞授巢黄巢初求天平節豆盧瑑欲以是中其欲俟其到鎮討之盧攜曰盜賊無厭厭於鹽翻雖與之節不能止其剽掠剽匹妙翻不若急𤼵諸道兵扼泗州汴州節度使為都統賊既前不能入闗必還掠淮浙偷生海渚耳從之既而淮北相繼告急攜稱疾不出録考異曰驚聽曰宰臣豆盧瑑奏縁淮南九驛使至泗州恐髙駢固守城壘不遮截大冦黄巢必若過淮落冦之計又徵兵不及須且誘之請降節旄授鄆州節度使候其至止討亦不難宰臣盧攜言之不可奏以黄巢為國之患乆矣昨與江西節制擁節而行攻劫荆南劫奪其節但徵諸道驍勇把截泗州因此不𤼵内使罷建雙旌乃𤼵使臣諸道而去尋汴州徐州兩道告急到京報黄巢過淮盧攜託疾不出按朝廷未嘗以江西節與巢借使與之安可復奪此驚聽録不足信也京師大恐庚申東都奏黄巢入汝州境辛酉以王重榮權知河中留後以河中節度使同平章事李都為太子少傅以王重榮作亂不能制故召李都以河中授之汝鄭把截制置都指揮使齊克讓奏黄巢自稱天補大將軍轉牒諸軍云各宜守壘勿犯吾鋒吾將入東都即至京邑自欲問罪無預衆人言自欲問罪於朝廷於衆人無預也上召宰相議之豆盧瑑崔沆請𤼵闗内諸鎮及兩神䇿軍守潼闗壬戍日南至上開延英對宰相泣下大盜將至無以禦之君相相對灑泣果何益哉觀軍容使田令孜奏請選左右神䇿軍弓弩手守潼闗臣自為都指揮制置把截使上曰侍衛將士不習征戰恐未足用令孜曰昔安禄山搆逆𤣥宗幸蜀以避之崔沆曰禄山衆纔五萬比之黄巢不足言矣豆盧瑑曰哥舒翰以十五萬衆不能守潼闗事見𤣥宗肅宗紀今黄巢衆六十萬而潼闗又無哥舒之兵若令孜為社稷計三川帥臣皆令孜腹心謂陳敬瑄楊師立牛朂也帥所類翻比於𤣥宗則有備矣上不懌僖宗雖曰童昏此時此意豈不知髙枕京邑之為樂越在草莽之為可憂也哉禍至而後憂之則無及矣古之明主居安而思危所以能常有其安也謂令孜曰卿且為朕𤼵兵守潼闗為于偽翻是日上幸左神䇿軍親閱將士令孜薦左軍馬軍將軍張承範右軍歩軍將軍王師㑹左軍兵馬使趙珂珂丘何翻上召見三人見賢遍翻以承範為兵馬先鋒使兼把截潼闗制置使師㑹為制置闗塞糧料使珂為句當寨柵使句古候翻當丁浪翻令孜為左右神䇿軍内外八鎮及諸道兵馬都指揮制置招討等使飛龍使楊復恭為副使癸亥齊克讓奏黄巢已入東都境臣收軍退保潼闗於闗外置寨將士屢經戰鬭乆乏資儲州縣殘破人煙殆絶東西南北不見王人凍餒交逼兵械刓弊刓吾官翻鈍也各思鄉閭恐一旦潰去乞早遣資糧及援軍上命選兩神䇿弩手得二千八百人令張承範等將以赴之將即亮翻丁卯黄巢陷東都留守劉允章帥百官迎謁巢入城勞問而已帥讀曰率勞力到翻閭里晏然允章迺之曾孫也劉迺見二百三十巻徳宗興元元年允章可謂忝厥祖矣田令孜奏募坊市人數千以補兩軍辛未陜州奏東都已陷壬申以田令孜為汝洛晉綘同華都統將左右軍東討左右神䇿軍陜失冉翻華户化翻是日賊陷虢州九域志虢州東北至陜州八十五里以神䇿將羅元杲為河陽節度使羅元杲亦田令孜之腹心以周岌為忠武節度使周岌既殺薛能遂以忠武節授之岌逆及翻初薛能遣牙將上蔡秦宗權調𤼵至蔡州調徒弔翻自元和末廢彰義軍以蔡州屬忠武軍故得而調𤼵之聞許州亂託云赴難難乃旦翻選募蔡兵遂逐刺史據其城及周岌為節度使即以宗權為蔡州刺史為秦宗權以蔡州稱兵僣號張本乙亥張承範等將神䇿弩手𤼵京師將即亮翻神䇿軍士皆長安富家子賂宦官竄名軍籍厚得禀賜禀給也禀賜猶言給賜也但華衣怒馬怒馬者鞭之以𤼵其怒而疾馳也憑勢使氣未嘗更戰陳更工衡翻陳讀曰陣聞當出征父子聚泣多以金帛雇病坊貧人代行唐置病坊於京城以養病人㑹要開元五年宋璟等奏悲田病坊從長安已來置使專知乞罷之至二十二年京城乞兒有疾病分置諸寺病坊至徳二年兩京市各置普救病坊病坊之置其來乆矣徃徃不能操兵操七刀翻是日上御章信門樓臨遣之孜考異曰新傳曰帝餞令章信門賚遣豐優按令孜雖為招討都統賜節賚物其實不離禁闥是日所遣者承範等耳新傳云餞令孜誤也承範進言聞黄巢擁數十萬之衆鼓行而西齊克讓以飢卒萬人依託闗外復遣臣以二千餘人屯於闗上又未聞為饋餉之計以此拒賊臣竊寒心願陛下趣諸道精兵早為繼援趣讀曰促上曰卿輩第行兵尋至矣丁丑承範等至華州㑹刺史裴䖍餘徙宣歙觀察使軍民皆逃入華山城中索然華户化翻索昔各翻州庫唯塵埃䑕迹頼倉中猶有米千餘斛軍士褁三日糧而行十二月庚辰朔承範等至潼闗搜菁中菁中草茂密處也史炤曰林菁得村民百許使運石汲水為守禦之備與齊克讓軍皆絶糧士卒莫有鬭志是日黄巢前鋒軍抵闗下白旗滿野不見其際克讓與戰賊小却俄而巢至舉軍大呼聲振河華呼火故翻華户化翻華山臨河言黄巢軍聲之盛撼振河山也克讓力戰自午至酉始解士卒飢甚遂諠譟燒營而潰克讓走入闗闗左有谷平日禁人徃來以𣙜征稅𣙜訖岳翻謂之禁阬賊至倉猝官軍忘守之忘巫放翻潰兵自谷而入谷中灌木壽藤茂密如織灌木叢生之木壽藤即今之萬歲藤一夕踐為坦塗承範盡散其輜囊以給士卒輜囊謂輜重囊橐也輜重隨軍之物囊槖私裝也遣使上表告急稱臣離京六日離力智翻甲卒未増一人餽餉未聞影響到闗之日巨冦已來以二千餘人拒六十萬衆外軍飢潰蹋開禁阬蹋與踏翻臣之失守鼎鑊甘心朝廷謀臣愧顔何寄或聞陛下已議西巡謂議幸蜀茍鑾輿一動則上下土崩臣敢以猶生之軀奮冒死之語願與近密及宰臣熟議近密謂兩中尉兩樞密急徵兵以救闗防則髙祖太宗之業庶㡬猶可扶持㡬居依翻使黄巢繼安禄山之亡㣲臣勝哥舒翰之死辛巳賊急攻潼闗承範悉力拒之自寅及申闗上矢盡投石以擊之闗外有天塹賊驅民千餘人入其中掘土填之塹七艶翻掘其月翻填亭年翻須臾即平引兵而度夜縱火焚闗樓俱盡承範分兵八百人使王師㑹守禁阬比至比必利翻賊已入矣壬午旦賊夾攻潼闗闗上兵皆潰師㑹自殺承範變服帥餘衆脫走至野狐泉遇奉天援兵二千繼至承範曰汝來晩矣博野鳯翔軍還至渭橋博野軍即穆宗長慶二年李寰帥以歸京師之兵也見二百四十二巻帥讀曰率見所募新軍衣裘温鮮新軍即田令孜所募坊市人以補兩軍者也怒曰此輩何功而然我曹反凍餒遂掠之更為賊鄉導鄉讀曰嚮以趣長安趣七喻翻賊之攻潼闗也朝廷以前京兆尹蕭廩為東道轉運糧料使廩稱疾請休官貶賀州司户賀州漢蒼梧郡之臨賀縣吳置臨賀郡唐置賀州京師東南四千一百三十里黄巢入華州留其將喬鈐守之鈐其亷翻河中留後王重榮請降於賊降户江翻癸未制以巢為天平節度使甲申以翰林學士承㫖尚書左丞王徽為户部侍郎翰林學士户部侍郎裴澈為工部侍郎並同平章事以盧攜為太子賔客分司田令孜聞黄巢已入闗恐天子責已乃歸罪於攜而貶之薦徽澈為相是夕攜飲藥死澈休之從子也裴休見二百四十九巻宣宗大中六年百官退朝聞亂兵入城布路竄匿布路分路也朝直遥翻令孜帥神䇿兵五百奉帝自金光門出帥讀曰率下同長安城西面三門北來第一門曰開逺門第二門曰金光門第三門曰延平門惟福穆澤壽四王及妃嬪數人從行從才用翻下皆同百官皆莫知之上奔馳晝夜不息從官多不能及車駕既去軍士及坊市民競入府庫盜金帛晡時黄巢前鋒將柴存入長安金吾大將軍張直方帥文武數十人迎巢於覇上巢乘金裝肩輿其徒皆被髪約以紅繒衣錦繡執兵以從甲騎如流輜重塞塗被皮義翻衣於既翻騎竒計翻重直龍翻塞悉則翻千里絡驛不絶民夾道聚觀尚讓厯諭之曰黄王起兵本為百姓為于偽翻非如李氏不愛汝曹汝曹但安居無恐巢館于田令孜第其徒為盜乆不勝富館古玩翻勝音升見貧者徃徃施與之施式豉翻居數日各出大掠焚市肆殺人滿街巢不能禁尤憎官吏得者皆殺之上趣駱谷趣七喻翻鳯翔節度使鄭畋謁上於道次驛考異曰續寳運録戊子帝至駱谷壻水乃下詔與牛朂楊師立陳敬瑄云今月七日已次駱谷壻水驛按此月庚辰朔戊子九日而詔云七日九誤為七也實録辛卯車駕次鳯翔鄭畋候謁於路舊畋傳云候駕於斜谷新紀辛卯次鳯翔丁酉至興元按甲申上離長安辛卯始次鳯翔太緩丁酉已至興元太速又路出駱谷則不過鳯翔及斜谷葢車駕渉鳯翔之境而畋徃見耳非鳯翔與斜谷也實録賊以數萬衆西追車駕而不言追不及又不言為誰所拒而還諸書皆無之人不取請車駕留鳯翔上曰朕不欲密邇巨冦且幸興元徵兵以圖收復卿東扞賊鋒西撫諸蕃糾合鄰道勉建大勲畋曰道路梗澁奏報難通請得便宜從事許之戊子上至壻水九域志洋州興道縣有壻水鎮相傳云仙人唐公昉盡室升天其壻不得偕升遂以名水誕矣詔牛朂楊師立陳敬瑄諭以京城不守且幸興元若賊勢猶盛將幸成都宜豫為備擬庚寅黄巢殺唐宗室在長安者無遺類辛卯巢始入宫壬辰巢即皇帝位于含元殿畵皁繒為衮衣擊戰鼓數百以代金石之樂登丹鳯樓下赦書國號大齊改元金統謂廣明之號去唐下體而著黄家日月以為己符瑞著側畧翻言唐字去丑口而著黄字為廣字合日月為明字也唐官三品以上悉停任四品以下位如故以妻曹氏為皇后考異曰實録巢傳立妻曲氏為皇后今從新傳以尚讓為太尉兼中書令趙璋兼侍中崔璆楊希古並同平章事孟楷葢洪為左右僕射知左右軍事葢古盍翻黄巢自以其軍分左右耳費傳古為樞密使費父沸翻姓也以太常博士皮日休為翰林學士陸游老學菴筆記曰該聞録言皮日休陷黄巢為翰林學士巢敗被誅今唐書取其事按尹師魯作大理寺丞皮子良墓誌稱曽祖日休避廣明之難徙籍㑹稽依錢氏官太常博士贈禮部尚書祖光業為吳越丞相父璨為元帥府判官三世皆以文雄江東據此則日休未嘗陷黄巢為其翰林學士被誅也小說謬妄無所不有師魯文章傳世且剛正有守非欺後世者璆邠之子也崔邠郾之兄也徳宗朝為右補闕嘗論裴延齡有直聲子恐當作孫時罷浙東觀察使在長安巢得而相之璆之在浙東也固與巢信使徃來又為之表奏朝廷諸葛爽以代北行營兵屯櫟陽黄巢將碭山朱温屯東渭橋碭山在漢碭縣界後魏置安陽縣治麻城隋開皇十八年改名碭山唐屬宋州九域志在單州東南九十里碭徒郎翻朱温始此巢使温誘說之說式芮翻爽遂降於巢温少孤貧與兄昱存随母王氏依蕭縣劉崇家崇數笞辱之按五代史温凶悍無頼崇患太祖慵惰不作業數笞責之獨崇母憐之時時自為櫛沐戒家人曰朱三非常人也宜善遇之數所角翻崇母獨憐之戒家人曰朱三非常人也汝曹善遇之朱温第三巢以諸葛爽為河陽節度使爽赴鎮羅元杲𤼵兵拒之士卒皆弃甲迎爽元杲逃奔行在鄭畋還鳯翔召將佐議拒賊皆曰賊勢方熾宜且從容以俟兵集從千容翻從容舒徐不迫之貌言欲以緩圖之乃圖收復畋曰諸君勸畋臣賊乎因悶絶仆地甃傷其面鄭畋以將佐怠於勤王忠憤之氣一時鬱勃至於悶絶而僵仆於地故甃傷其面甃則救翻甓也自午至明旦尚未能言㑹巢使者以赦書至監軍袁敬柔與將佐序立宣示代畋草表署名以謝巢監軍與巢使者宴樂奏將佐以下皆哭使者怪之幕客孫儲曰以相公風痺不能來故悲耳痺必至翻民間聞者無不泣畋聞之曰吾固知人心尚未厭唐賊授首無日矣乃刺指血為表遣所親間道詣行在刺七亦翻下同間古莧翻召將佐諭以逆順皆聽命復刺血與盟復扶又翻然後完城塹繕噐械訓士卒密約鄰道合兵討賊鄰道皆許諾𤼵兵㑹於鳯翔時禁兵分鎮闗中者尚數萬禁兵分鎮闗中即神䇿八鎮兵也聞天子幸蜀無所歸畋使人招之皆徃從畋畋分財以結其心軍勢大振丁酉車駕至興元詔諸道各出全軍收復京師悉所統之軍皆行謂之全軍己亥黄巢下令百官詣趙璋第投名銜者復其官名銜顯官位姓名也豆盧瑑崔沆及左僕射于琮右僕射劉鄴太子少師裴諗御史中丞趙濛刑部侍郎李溥京兆尹李湯扈從不及匿民間巢搜獲皆殺之廣徳公主曰我唐室之女誓與于僕射俱死執賊刃不置賊并殺之𤼵盧攜尸戮之於市將作監鄭綦庫部郎中鄭係義不臣賊舉家自殺唐屢更䘮亂至于廣明舉家殉國猶不乏人恩義有結之素也左金吾大將軍張直方雖臣於巢多納亡命匿公卿於複壁巢殺之初樞密使楊復恭薦處士河間張濬拜太常博士處昌吕翻遷度支員外郎黄巢逼潼闗濬避亂商山上幸興元道中無供頓漢隂令李康以騾負糗糧數百䭾獻之漢隂漢中安陽縣地晉武帝改為安康縣唐至徳二載更名漢隂縣屬金州九域志在州西北一百六十五里䭾徒何翻以驢馬負物為䭾唐逓䭾每䭾一百斤從行軍士始得食上問康卿為縣令何能如是對曰臣不及此乃張濬員外教臣上召濬詣行在拜兵部郎中唐諸司郎中從五品上員外郎從六品上義武節度使王處存聞長安失守號哭累日號户髙翻不俟詔命舉軍入援遣二千人間道詣興元衛車駕黄巢遣使調𤼵河中調徙釣翻前後數百人吏民不勝其苦勝音升王重榮謂衆曰始吾屈節以紓軍府之患屈節謂臣賊也紓商居翻緩也今調財不已又將徵兵吾亡無日矣不如𤼵兵拒之衆皆以為然乃悉驅巢使者殺之巢遣其將朱温自同州弟黄鄴自華州合兵擊河中重榮與戰大破之獲糧仗四十餘船遣使與王處存結盟引兵營於渭北處考異曰舊王存傳曰時李都守河中降賊㑹王重榮斬偽使通使於處存乃同盟誓營於渭北時巢賊僣號天下藩鎮多受其偽命惟鄭畋守鳯翔鄭從讜守太原處存王重榮首倡義舉俄而鄭畋破賊前鋒王鐸自行在至故諸鎮翻然改圖以出勤王之師按鐸中和二年始至於時未也王重榮傳曰初重榮為河中馬歩都虞侯巢賊據長安蒲帥李都不能拒稱臣於賊賊偽授重榮節度副使重榮以賊徵求無已欲拒之都曰吾兵㣲力寡絶之立見其患願以節鉞假公翌日都歸行在重榮知留後事乃斬賊使求援鄰藩北夢𤨏言曰重榮始為牙將黄巢犯闕元戎李都奉偽畏重榮附者多因薦為副使一日忽謂都曰令公助賊陷一邦於不忠而又日加箕歛衆口紛紜倐忽變生何以遏也遽命斬其偽使都無以對因以軍印授重榮而去及都至行在朝廷又以前京兆尹竇潏間道至河中代都重榮迎之潏前為京兆尹有慘酷之名時謂之垜疊及至翌日進軍校于庭謂曰天子命重臣作鎮將遏賊衝安可輕議斥逐令北門出去且為惡者必一兩人而已爾等可言之潏不知軍衆皆重榮之親黨也衆皆不對重榮乃屏肅佩劔厯階而上謂潏曰為惡者非我而誰遂召潏之僕吏控馬及堦請依李都前例乃云速去潏不敢仰視躍馬復由北門而出新傳取之按十一月辛亥朔重榮已作亂掠坊市辛酉以重榮為留後都為太子少傅則都已去河中矣及黄巢犯闕都何嘗奉偽亦未嘗聞以潏代都今不取陳敬瑄聞車駕出幸遣歩騎三千奉迎表請幸成都時從兵浸多興元儲偫不豐偫丈里翻田令孜亦勸上上從之中和元年是年七月方改元春正月車駕𤼵興元加牛朂同平章事陳敬瑄以扈從之人驕縱難制從才用翻有内園小兒先至成都唐時給役於坊廐及内園者皆謂之小兒遊於行宫笑曰人言西川是蠻今日觀之亦不惡敬瑄執而杖殺之新考異曰傳曰敬瑄殺五十人尸諸衢錦里耆舊傳曰有内園小兒三箇連手行遶行宫數内一人笑云云巡者亂打執之敬瑄咄曰今日且欲棒殺汝三五十輩必不令錯按三五十輩者敬瑄語也非實殺五十人也新傳誤由是衆皆肅然敬瑄迎謁於鹿頭關辛未上至綿州東川節度使楊師立謁見東川治梓州北至綿州一百六十八里見賢遍翻壬申以工部侍郎判度支蕭遘同平章事鄭畋約前朔方節度使唐𢎞夫涇原節度使程宗楚同討黄巢巢遣其將王暉齎詔召畋畋斬之遣其子凝績詣行在凝績追及上於漢州自綿州西南至漢州一百九十里丁丑車駕至成都自漢州西南至成都八十五里館於府舍館古玩翻就西川府舍為行宫上遣使趣髙駢討黄巢趣讀曰促道路相望駢終不出兵上至蜀猶冀駢立功詔駢巡内刺史及諸將有功者自監察至常侍聽以墨勑除訖奏聞裴澈自賊中奔詣行在時百官未集乏人草制右拾遺樂朋龜謁田令孜而拜之由是擢為翰林學士張濬先亦拜令孜令孜嘗召宰相及朝貴飲酒朝直遥翻濬耻於衆中拜令孜乃先謁令孜謝酒及賔客畢集令孜言曰令孜與張郎中清濁異流嘗蒙中外中外謂與之相表裏既慮玷辱何憚改更更工衡翻今日於隠處謝酒則又不可濬慙懼無所容二月乙卯朔以太子少師王鐸守司徒兼門下侍郎同平章事丙申加鄭畋同平章事加淮南節度使髙駢東面都統加河東節度使鄭從讜兼侍中依前行營招討使代北監軍陳景思異考曰實録作景斯今從薛居正五代史帥沙陀酋長李友金及薩葛安慶吐谷渾諸部入援京師帥讀曰率酋慈由翻長知兩翻薩桑葛翻至絳州將濟河絳州刺史瞿稹亦沙陀也瞿權俱翻稹止忍翻謂景思曰賊勢方盛未可輕進不若且還代北募兵遂與景思俱還雁門以樞密使楊復光為京西南面行營都監黄巢以朱温為東南面行營都虞侯將兵攻鄧州三月辛亥陷之執刺史趙戒因戍鄧州以扼荆襄九域志鄧州南至襄州一百八十里襄州南至荆州四百五十七里壬子加陳敬瑄同平章事甲寅敬瑄奏遣左黄頭軍使李鋌將兵擊黄巢西川黄頭軍崔安濳所置也事始見上巻乾符六年鋌時廷翻辛酉以鄭畋為京城四面諸軍行營都統賜畋詔凡蕃漢將士赴難有功者難乃旦翻並聽以墨勑除官畋奏以涇原節度使程宗楚為副都統前朔方節度使唐𢎞夫為行軍司馬黄巢遣其將尚讓王播帥衆五萬冦鳯翔王播新書作王璠畋使𢎞夫㐲兵要害自以兵數千多張旗幟踈陳於髙岡陳讀曰陣賊以畋書生輕之鼓行而前無復行伍行伍剛翻伏𤼵賊大敗於龍尾陂新舊書皆作龍尾坡惟舊紀作陂鳯翔府岐山縣唐初治張堡武徳七年移治龍尾城在平陽故城之東北斬首二萬餘級伏尸數十里有書尚書省間為詩以嘲賊者尚讓怒應在省官及門卒悉抉目倒懸之抉於決翻大索城中能為詩者索山客翻盡殺之識字者給賤役凡殺三千餘人瞿稹李友金至代州募兵踰旬得三萬人皆北方雜胡屯於崞西代州崞縣之西也崞音郭獷悍暴横獷古猛翻悍下罕翻又矦幹翻横户孟翻稹與友金不能制友金乃說陳景思曰說式芮翻金雖有衆數萬茍無威信之將以統之終無成功吾兄司徒父子勇畧過人為衆所服驃騎誠奏天子赦其罪召以為帥李國昌以平龎勛功檢校司徒驃騎唐制武散階極品唐自髙力士以來宦官多官至驃騎故以稱景思則代北之人一麾響應狂賊不足平也景思以為然遣使詣行在言之詔如所請友金以五百騎齎詔詣達靼迎之李克用入達靼見上巻廣明元年李克用帥達靼諸部萬人赴之蔚考異曰實録陳景斯齎詔入達靼召李克用軍屯州克用因大掠雁門以北軍鎮薛居正五代史先是景思與李友金𤼵沙陀諸部五千騎南赴京師友金即武皇之族父也中和元年二月友金軍至絳州將度河刺史瞿稹謂景思曰巢賊方盛不如且還代北徐圖利害四月友金旋軍雁門瞿稹至代州半月之間募兵三萬營於崞縣之西其軍皆北邊五部之衆不閑軍法瞿稹李友金不能制友金謂景思云云景思然之促奏行在天子乃以武皇為雁門節度使仍令以本軍討賊李友金𤼵五百騎齎詔召武皇於逹靼武皇即帥逹靼諸部萬人趨雁門按景思請赦國昌父子而克用至者葢國昌已老獨使克用來耳是嵗克用但攻掠太原又陷忻代二州明年十二月始自忻代留後除雁門節度使葢此際止赦其罪復為大同防禦使乃陷忻代自稱留後朝廷再召之始除雁門薛史誤也新表中和二年以河東忻代二州𨽻雁門節度更大同節度為雁門節度治代州此其證也羣臣追從車駕者稍集成都南北司朝者近二百人朝直遥翻近其靳翻諸道及四夷貢獻不絶蜀中府庫充實與京師無異賞賜不乏士卒欣恱黄巢得王徽逼以官徽陽瘖不從月餘逃奔河中遣人間道奉絹表詣行在間古莧翻詔以徽為兵部尚書前夏綏節度使諸葛爽復自河陽奉表自歸去年黄巢入關諸葛爽降之即以為河陽節度使宥州刺史拓跋思恭開元十六年以六胡州殘人置宥州乾元元年理經畧軍後移治長澤縣長澤漢朔方郡三封縣地諱考異曰歐陽修五代史作拓拔思敬意謂薛史避國耳按舊唐書實録皆作思恭實録天復二年九月武定軍節度使李思敬以城降王建思敬本姓拓跋鄜夏節度使思恭保大節度使思孝之弟也思孝致仕以思敬為保大留後遂升節度又徙武定軍新唐書党項傳曰思恭為定難節度使卒弟思諫代為節度思孝為保大節度以老薦弟思敬為保大留後俄為節度然則思恭思敬乃是兩人思敬後附李茂貞或賜國姓故更姓李修合以為一人誤也本党項羌也新書党項以姓别為部落而拓䟦氏最疆糾合夷夏兵㑹鄜延節度使李孝昌於鄜州同盟討賊夏户雅翻鄜音夫奉天鎮使齊克儉遣使詣鄭畋求自效甲子畋傳檄天下藩鎮合兵討賊時天子在蜀詔令不通天下謂朝廷不能復振及得畋檄爭𤼵兵應之賊懼不敢復窺京西復扶又翻夏四月戊寅朔加王鐸兼侍中以拓䟦思恭權知夏綏節度使為拓䟦氏疆盛遂跨㨿西夏張本黄巢以其將王玫為邠寧節度使邠州通塞鎮將朱玫起兵討之玫莫杯翻讓别將李重古為節度使自將兵討巢是時唐𢎞夫屯渭北王重榮屯沙苑王處存屯渭橋拓䟦思恭屯武功鄭畋屯盩厔𢎞夫乗龍尾之捷進薄長安壬午黄巢帥衆東走程宗楚先自延秋門入長安苑城有門西出謂之延秋門𢎞夫繼至處存帥銳卒五千夜入城帥讀曰率下同坊市民喜爭讙呼出迎官軍讙讀曰喧或以瓦礫擊賊礫狼狄翻或拾箭以供官軍宗楚等恐諸將分其功不報鳯翔鄜夏句斷軍士釋兵入第舍掠金帛妓妾妓渠綺翻處存令軍士繫白􅔮為號􅔮詢趨翻繒頭也以約髪謂之頭􅔮坊市少年或竊其號以掠人賊露宿覇上宿無室廬曰露宿詗知官車不整詗翾正翻又火迥翻且諸軍不相繼引兵還襲之自諸門分入大戰長安中宗楚𢎞夫死夫考異曰舊紀傳新傳皆云𢎞敗在二年六月驚聽録唐年補録新紀實録皆在此年四月新紀日尤詳今從之軍士重負不能走是以甚敗死者什八九處存收餘衆還營丁亥巢復入長安怒民之助官軍縱兵屠殺流血成川謂之洗城於是諸軍皆退賊勢愈熾賊所署同州刺史王溥華州刺史喬謙商州刺史宋巖聞巢弃長安皆率衆奔鄧州朱温斬溥謙釋巖使還商州庚寅拓㧞思恭李孝昌與賊戰於王橋不利詔以河中留後王重榮為節度使賊衆上黄巢尊號曰承天應運啓聖睿文宣武皇帝有雙雉集廣陵府舍占者以為野鳥來集城邑將空之兆髙駢惡之惡烏路翻乃移檄四方云將入討黄巢悉𤼵巡内兵八萬舟二千艘旌旗甲兵甚盛五月乙未出屯東塘東塘在今揚州城東即今灣頭至宜陵一帶塘岸也艘蘇遭翻日考異曰妖亂志曰自五月十二日出東塘至九月六歸府九十餘日禳雉雊之變也按五月十二日至九月六日乃是一百六十三日非九十餘日今從舊傳諸將數請行期數所角翻駢託風濤為阻或云時日不利竟不𤼵李克用牒河東稱奉詔將兵五萬討黄巢令具頓逓縁道設酒食以供軍為頓置郵驛為逓鄭從讜閉城以備之克用屯於汾東從讜犒勞犒口到翻勞力到翻給其資糧累日不𤼵克用自至城下大呼呼火故翻求與從讜相見從讜登城謝之癸亥復求𤼵軍賞給復扶又翻從讜以錢千緡米千斛遺之遺唯季翻甲子克用縱沙陀剽掠居民剽匹妙翻城中大駭從讜求救於振武節度使契苾璋契欺訖翻璋引突厥吐谷渾救之破沙陀兩寨克用追戰至晉陽城南璋引兵入城沙陀掠陽曲榆次而戰黄巢之克長安也忠武節度使周岌降之去年十一月授周岌忠武節十二月而黄巢克長安岌嘗夜宴急召監軍楊復光先是以楊復光為忠武監軍屯鄧州扼賊右衝巢既陷長安遣朱温屯鄧州復光遂至許州依周岌故召之夜宴左右曰周公臣賊將不利於内侍不可徃唐内侍省以内侍監為之長内侍為貳故左右以稱復光復光曰事已如此義不圖全即詣之酒酣岌言及本朝朝直遥翻復光泣下良乆曰丈夫所感者恩義耳公自匹夫為公矦奈何捨十八葉天子而臣賊乎自髙祖之僖宗十八世岌亦流涕曰吾不能獨拒賊故貌奉而心圖之今日召公正為此耳為于偽翻因瀝酒為盟史炤曰以酒滴瀝也是夕復光遣其養子守亮殺賊使者於驛時秦宗權據蔡州不從岌命復光将忠武兵三千詣蔡州說宗權同舉兵討巢說式芮翻宗權遣其將王淑將兵三千從復光擊鄧州逗留不進復光斬之併其軍分忠武八千人為八都遣牙將鹿晏𢎞晉暉王建韓建張造李師泰龎從等八人將之而考異曰劉恕十國紀年上云八都下止有王建等八人姓名諸書不可考故也王建始此王建舞陽人韓建長社人晏𢎞暉造師泰皆許州人也復光帥八都與朱温戰敗之帥讀曰率敗補邁翻遂克鄧州逐北至藍橋而還藍橋在藍田關南還從宣翻又如字昭義節度使髙潯㑹王重榮攻華州克之六月戊戍以鄭畋為司空兼門下侍郎同平章事都統如故李克用遇大雨引兵北還陷忻代二州因留居代州末考異曰唐見聞録六月三十日沙陀軍却囘収却忻代州太祖紀年録遇大雨六月二十三日班師雁門薛居正五代史與紀年録同按忻代先屬河東中和二年始割𨽻雁門今從見聞録實録鄭從讜遣教練使論安等軍百井以備之邠寧節度副使朱玫屯興平興平縣在長安西八十五里余靖曰周文丘今之興平黄巢將王播圍興平玫退屯奉天及龍尾陂西州黄頭軍使李鋌將萬人鞏咸將五千人鞏姓也周卿士鞏簡公晉大夫鞏朔屯興平為二寨與黄巢戰屢捷陳敬瑄遣神機營使髙仁厚將二千人益之神機營亦崔安潜置事見上巻乾符六年秋七月丁巳改元赦天下改元中和庚申以翰林學士承㫖兵部侍郎韋昭度同平章事論安自百井擅還鄭從讜不解鞾衫斬之滅其族鞾與靴同見考異曰唐末聞録六月三十日沙陀收却忻代州使司差教練使論安軍使王蟾髙弁囘鶻吐蕃等軍於百井下寨守禦當月内論安等㧞寨却迴到府按當月内即三十日也一日之中不容有爾許事必非也又曰至七月十四日相公排飯大将等於坐上把起論安不脱靴於毬塲内處置族滅其家又差都頭温漢臣将兵依前於百井下寨當月契苾尚書領兵馬却歸振武今從之更遣都頭温漢臣將兵屯百井契苾璋引兵還振武初車駕至成都蜀軍賞錢人三緡田令孜為行在都指揮處置使毎四方貢金帛輙頒賜從駕諸軍無虛月不復及蜀軍復扶又翻蜀軍頗有怨言丙寅令孜宴土客都頭土軍蜀軍客軍從駕諸軍唐之中世以諸軍總帥為都頭至其後也一部之軍謂之一都其部帥呼為都頭以金杯行酒因賜之諸都頭皆拜而受西川黄頭軍使郭琪獨不受起言曰諸將月受俸料豐贍有餘常思難報豈敢無厭俸扶用翻厭於鹽翻顧蜀軍與諸軍同宿衛而賞賚懸殊頗有觖望觖古穴翻怨望恐萬一致變願軍容減諸將之賜以均蜀軍使土客如一則上下幸甚令孜黙然有間曰間如字汝嘗有何功對曰琪生長山東長知兩翻征戍邉鄙嘗與党項十七戰契丹十餘戰契欺訖翻金創滿身創初良翻又嘗征吐谷渾傷脇腸出線縫復戰復扶又翻令孜乃自酌酒於别樽以賜琪琪知其毒不得已再拜飲之歸殺一婢吮其血以解毒吐黒汁數升吮如兖翻吐土故翻遂帥所部作亂帥讀曰率丁卯焚掠坊市令孜奉天子保東城閉門登樓命諸軍擊之琪引兵還營陳敬瑄命都押牙安金山將兵攻之琪夜突圍出奔廣都隋改廣都縣為雙流縣唐龍朔二年復分雙流置廣都縣屬成都府九域志在府西四十五里從兵皆潰從才用翻獨㕔吏一人從息於江岸琪謂㕔吏曰陳公知吾無罪然軍府驚擾不可以莫之安也汝事吾能始終今有以報汝汝齎吾印劒詣陳公曰郭琪走度江我以劒擊之墜水尸隨湍流下矣得其印劒以獻陳公必據汝所言牓懸印劒於市以安衆汝當獲厚賞吾家亦保無恙吾自此適廣陵歸髙公言欲奔揚州歸髙駢也後數日汝可密以語吾家也語牛倨翻遂觧印劒授之而逸㕔吏以獻敬瑄果免琪家上日夕專與宦者同處議天下事待外臣殊踈薄處昌吕翻外臣謂外廷之臣宰相以下百執事皆是也庚午左拾遺孟昭圖上䟽以為治安之代遐邇猶應同心治直吏翻多難之時中外尤當一體難乃旦翻去冬車駕西幸不告南司遂使宰相僕射以下悉為賊所屠謂豆盧瑑崔沆及于琮等也獨北司平善况今朝臣至者皆冒死﨑嶇逺奉君親所宜自茲同休等戚伏見前夕黄頭軍作亂陛下獨與令孜敬瑄及諸内臣閉城登樓並不召王鐸已下及收朝臣入城翌日又不對宰相又不宣慰朝臣翌日明日也臣備位諌官至今未知聖躬安否况踈宂乎宂而隴翻散也儻羣臣不顧君上罪固當誅若陛下不恤羣臣於義安在夫天下者髙祖太宗之天下非北司之天下天子者四海九州之天子非北司之天子北司未必盡可信南司未必盡無用豈天子與宰相了無關渉朝臣皆若路人如此恐收復之期尚勞聖慮尸禄之士得以宴安臣躬被寵榮被皮義翻職在禆益雖遂事不諌而來者可追二語皆本之論語疏入令孜屏不奏屏必郢翻辛未矯詔貶昭圖嘉州司户遣人沈於蟇頥津蟇頥山在眉州眉山東七里山狀如蟇頥因名山臨江津今有孟拾遺祠蟇謨加翻聞者氣塞而莫敢言天子殺諌臣者必亡其國以閹官而專殺諌臣自古以來未之有也此不特害于而國實亦凶于而身是以唐未亡而令孜之身先亡也塞悉則翻鄜延節度使李孝昌權夏州節度使拓䟦思恭屯東渭橋黄巢遣朱温拒之以義武節度使王處存為東南面行營招討使以邠寧節度副使朱玫為節度使八月己丑夜星交流如織或大如杯椀至丁酉乃止武寧節度使支詳按新書方鎮表懿宗咸通十一年復徐州節鎮賜號感化軍自此迄於天復末嘗復武寧舊額以下文以感化留後時溥為節度使證之武寧誤也當作感化遣牙將時溥陳璠將兵五千入關討黄巢璠孚袁翻二人皆詳所奬㧞也溥至東都矯稱詳命召師還與璠合兵屠河隂掠鄭州而東及彭城詳迎勞犒賞甚厚璠音畨勞力到翻溥遣所親說詳曰說式芮翻衆心見迫請公解印以相授詳不能制出居大彭舘溥自知留務璠謂溥曰支僕射有惠於徐人不殺必成後悔溥不許送詳歸朝朝直遥翻璠伏甲於七里亭亭去彭城七里因名并其家屬殺之詔以溥為武寧留後溥表璠為宿州刺史璠到官貪虐溥以都將張友代還殺之楊復光奏升蔡州為奉國軍以秦宗權為防禦使壽州屠者王緒與妹夫劉行全聚衆五百盜據本州月餘復陷光州復扶又翻下同自稱將軍有衆萬餘人秦宗權表為光州刺史固始縣佐王潮世率以縣丞為縣佐唐制諸縣丞簿尉之下有司功佐司倉佐司户佐司兵佐司法佐司士佐皆縣佐也路振九國志王潮少為縣佐史或者傳寫逸史字歟及弟審邽審知皆以材氣知名緒以潮為軍正使典資糧閲士卒信用之王潮兄弟始此為潮廢緒張本髙潯與黄巢將李詳戰于石橋石橋即晉將王鎮惡破秦兵處潯敗奔河中詳乘勝復取華州是年五月髙潯克華州巢以詳為華州刺史以權知夏綏節度使拓䟦思恭為節度使宗正少卿嗣曹王龜年自南詔還驃信上表欵附請悉遵詔㫖龜年使南詔見上巻廣明元年六月上時掌翻李孝昌拓䟦思恭與尚讓朱温戰于東渭橋不利引去史言諸鎮之勤王者皆以師老遷延引退初髙駢與鎮海節度使周寳俱出神䇿軍駢以兄事寳及駢先貴有功浸輕之既而封壤相鄰數爭細故遂有隙淮南與鎮海軍鄰壤止一江為界耳數所角翻駢檄寳入援京師寳治舟師以俟之治直之翻怪其乆不行訪諸幕客或曰髙公幸朝廷多故有并吞江東之志聲云入援其實未必非圖我也宜為備寳未之信使人覘駢殊無北上意覘丑亷翻上時掌翻自淮南而北向勤王為北上㑹駢使人約寳面㑹瓜洲議軍事寶遂以言者為然辭疾不徃且謂使者曰吾非李康髙公復欲作家門功勲以欺朝廷邪髙崇文斬李康事見二百三十七巻憲宗之元和元年駢怒復遣使責寳何敢輕侮大臣復扶又翻寶詬之曰彼此夾江為節度使汝為大臣我豈坊門卒邪詬古侯翻又許侯翻寳自言與駢等夷非有貴賤之異也長安城中百坊坊皆有垣有門門皆有守卒由是遂為深仇駢留東塘百餘日詔屢趣之趣讀曰促駢上表託以寳及浙東觀察使劉漢宏將為後患辛亥復罷兵還府其實無赴難心但欲禳雉集之異耳難乃旦翻禳如羊翻厭除也髙駢召石鏡鎮將董昌至廣陵欲與之俱擊黄巢昌將錢鏐説昌曰說式芮翻觀髙公無討賊心不若以扞禦鄉里為辭而去之昌從之駢聽昌還㑹杭州刺史路審中將之官行至嘉興嘉興漢由拳縣吳改名唐屬蘇州在州西南百四十里昌自石鏡引兵入杭州審中懼而還昌自稱杭州都押牙知州事遣將吏請於周寳寳不能制表為杭州刺史臨海賊杜雄陷台州辛酉立皇子震為建王昭義十將成麟殺髙潯成麟因髙潯石橋敗退而殺之引兵還據潞州天井關戍將孟方立起兵攻麟殺之戍考異曰實録澤潞牙將劉廣據潞州叛天井關將孟方立帥戍卒攻廣殺之自稱留後仍移軍額於邢州初髙潯援京師廣帥師至陽平謀為亂不行還據潞州自稱留後用法嚴酷三軍畏之方立乗虛襲殺焉又曰貶昭義節度使髙潯為端州刺史中和三年實録又曰初孟方立殺髙潯自立薛居正五代史方立傳曰中和二年為澤州天井闗戍將時黄巢犯闗輔州郡易帥有同博奕先是沈詢髙湜相繼為昭義節度怠於軍政及有歸秦劉廣之亂方立見潞帥交代之際乗其無備率戍兵徑入潞州自稱留後新紀八月昭義軍節度使髙潯及黄巢戰於石橋敗績十將成麟殺潯入于潞州九月己巳昭義軍戍將孟方立殺成麟自稱留後方立傳惟以成麟為成鄰餘如新紀按乾符二年實録十月昭義軍亂逐節度使髙湜貶湜象州司户栁玭傳云貶髙要尉三年十一月詔魏博韓簡云劉廣逐帥擅權云云是廣逐湜擅據潞州也薛史孟方立傳亦云沈詢髙湜怠於軍政致有歸秦劉廣之亂是廣亂在前也舊紀九月髙潯牙將劉廣擅還潞州是月潯天井闗戍将孟方立攻廣殺之自稱留後貶潯端州刺史此葢舊紀誤實録因之薛史方立傳曰見潞帥交代之際帥兵入潞州不言何帥交代若不逐帥何能據州事無所因殊為踈畧舊紀恐是誤以髙湜事為髙潯事實録此云殺廣明年又云殺潯自相違新紀傳皆云成麟殺潯方立斬麟月日事實頗詳必有所出今從之方立汧州人也忠武監軍楊復光屯武功永嘉賊朱褒陷温州宋白曰温州永嘉郡漢㑹稽郡之東境後漢永和四年置永寧縣晉明帝立永寧郡尋屬永嘉郡隋平陳廢郡唐武悳六年置東嘉州貞觀元年廢州以縣屬栝州上元二年分栝州之永嘉安固二縣置温州以温嶠嶺為名鳯翔行軍司馬李昌言將本軍屯興平時鳯翔倉庫虛竭犒賞稍薄糧饋不繼昌言知府中兵少因激怒其衆冬十月引軍還襲府城鄭畋登城與士卒言其衆皆下馬羅拜曰相公誠無負我曹畋曰行軍茍能戢兵愛人為國滅賊亦可以順守矣逐帥為逆取討賊以取旌節為順守為于偽翻乃以留務委之即日西赴行在天平節度使南面招討使曹全晸與賊戰死軍中立其兄子存實為留後十一月乙巳孟楷朱温襲鄜夏二軍於富平二軍敗奔歸本道二軍李孝昌拓䟦思恭之軍也鄭畋至鳯州自鳯翔西至鳯州三百九十五里累表辭位詔以畋為太子少傅分司以李昌言為鳯翔節度行營招討使以門下侍郎同平章事裴澈為鄂岳觀察使加鎮海節度使周寳同平章事遂昌賊盧約陷處州吳孫權赤烏二年分太末立平昌縣晉武帝改曰遂昌唐武徳八年併入松陽景雲元年復置遂昌縣屬處州九域志在州西二百四十里按温處二州本晉永嘉一郡之地隋為栝州永嘉郡唐武徳置栝州又分置東嘉州始分為二州東嘉州後為温州栝州改為處州避徳宗名也十二月江西將閔朂戍湖南還過潭州逐觀察使李裕自為留後頊考異曰實録新傳作閔今從程匡袤唐補紀以感化留後時溥為節度使賜夏州號定難軍難乃旦翻初髙駢鎮荆南乾符五年駢鎮荆南補武陵蠻雷滿為牙將領蠻軍從駢至淮南逃歸聚衆千人襲朗州殺刺史崔翥翥章恕翻詔以滿為朗州留後歲中率三四引兵冦荆南入其郛焚掠而去大為荆人之患陬溪人周岳嘗與滿獵爭肉而鬭欲殺滿不果陬溪當在武陵界陬側鳩翻聞滿據朗州亦聚衆襲衡州逐刺史徐顥詔以岳為衡州刺史石門蠻向瓌亦集夷獠數千攻陷澧州殺刺史吕自牧自稱刺史吳分零陽縣置天門郡隋廢為石門縣唐屬澧州九域志在州西九十二里王鐸以髙駢為諸道都統無心討賊自以身為首相𤼵憤請行懇欵流涕至於再三上許之懇欵懇誠也相息亮翻二年春正月辛亥以王鐸兼中書令充諸道行營都都統師考異曰舊紀中和元年七月鐸為都統十二月帥二萬至京畿屯於盩厔舊鐸傳亦在元年唐年補録元年十一月乙巳制以鐸為都統十二月乙亥鐸屯盩厔續寳運録元年八月鐸拜天下都統唐補紀中和元年四月髙駢帥師駐泊東塘自五月出府九月却歸朝廷即以鐸統諸道兵馬收復長安鐸為都統諸書年月不同如此新紀二年正月辛亥王鐸為諸道行營都都統髙駢罷都統據寳録四月答髙駢詔罷都都統當在此年今從實録新紀舊駢傳云僖宗知駢無赴難意乃以鐸為京城四面諸道行營兵馬都統韋昭度領江淮鹽鐵轉運使駢既失兵柄又落利權攘袂大詬累上章自訴語詞不遜按駢罷都統依前為諸道鹽鐵轉運使五月方罷北夢𤨏言曰王鐸初鎮荆南黄巢入冦望風而遁他日將兵潼關黄巢令人傳語云相公儒生且非我敵無汚我鋒刃自取敗亡也後到成都行朝拜諸道都統所以髙駢上表目之為敗軍之將也按鐸自荆南䘮師貶官未嘗将兵潼關皮光業見聞録為都統在此年二月亦誤又舊紀傳新傳鐸正為都都統新紀作都統實録初除及罷時皆為都統中間多云都都統又西門思恭為都都監按此時諸將為都統者甚多疑鐸為都都統是也權知義成節度使俟罷兵復還政府髙駢但領鹽鐵轉運使罷其都統及諸使聽王鐸自辟將佐以太子少師崔安潜為副都統辛未以周岌王重榮為都都統左右司馬諸葛爽及宣武節度使康實為左右先鋒使時溥為催遣綱運租賦防遏使綱運自江淮來者皆由徐州巡内故以溥任此職以右神䇿觀軍容使西門思恭為諸道行營都都監又以王處存李孝昌拓䟦思恭為京城東北西面都統以楊復光為南面行營都監使又以中書舍人鄭昌圖為義成節度行軍司馬給事中鄭畯為判官直𢎞文舘王摶為推官畯祖峻翻摶徒官翻司勲員外郎裴贄為掌書記昌圖從讜之從祖兄弟畯畋之弟摶璵之曽孫王璵以祠禱厯事𤣥肅見前紀贄坦之子也裴坦見二百五十一巻懿宗咸通十年又以陜虢觀察使王重盈為東面都供軍使重盈重榮之兄也陜失冉翻重直龍翻黄巢以朱温為同州刺史令温自取之二月同州刺史米誠奔河中温遂據之為朱温以同州歸國張本己卯以太子少傅分司鄭畋為司空兼門下侍郎同平章事召詣行在軍務一以諮之以王鐸判户部事朱温冦河中王重榮擊敗之敗補邁翻以李昌言為京城西面都統朱玫為河南都統朱玫時鎮邠寕安得出關東統河南諸鎮此河南葢自龍門河東至蒲津一帯大河南岸也涇原節度使胡公素薨軍中請命於都統王鐸承制以大將張鈞為留後李克用冦蔚州蔚紆勿翻三月振武節度使契苾璋奏與天徳大同共討克用詔鄭從讜與相知應接陳敬瑄多遣人厯縣鎮詗事詗翾正翻又火迥翻謂之尋事人所至多所求取有二人過資陽鎮時葢置鎮於資州資陽縣後魏分資中置資陽縣以其地在資水之陽也九域志資陽在資州西北一百二十里獨無所求鎮將謝𢎞讓邀之不至自疑有罪夜亡入羣盜中明旦二人去𢎞讓實無罪也捕盜使楊遷誘𢎞讓出首而執以送使首式又翻下同送使送之節度使府也使䟽吏翻云討擊擒獲以求功敬瑄不之問杖𢎞讓脊二十釘於西城二七日煎油潑之又以膠麻掣其瘡釘丁定翻二七十四日也潑普活翻掣尺列翻備極慘酷見者寃之又有卭州牙官阡能卭渠容翻􅒷考異曰張錦里耆舊傳作千能句延慶錦里耆舊傳作忏能續寳運録作玕能實録新傳作阡能按北夢𤨏言安仁土豪阡能注云姓繤無此葢西南夷之種今從之因公事違期避杖亡命為盜楊遷復誘之復扶又翻能方出首聞𢎞讓之寃大罵楊遷𤼵憤為盜驅掠良民不從者舉家殺之踰月衆至萬人立部伍署職級職級謂牙前將吏自押牙孔目官而下分職各有等級横行卭雅二州間攻陷城邑所過塗地先是蜀中少盜賊先悉薦翻少詩沼翻自是紛紛競起州縣不能制敬瑄遣牙將楊行遷將三千人胡洪畧莫匡時各將二千人以討之以右神䇿將軍齊克儉為左右神䇿内外八鎮兼博野奉天節度使賜鄜坊軍號保大鄜音夫夏四月甲午加陳敬瑄兼侍中赫連鐸李可舉與李克用戰不利初髙駢好神仙好呼到翻有方士吕用之坐妖黨亡命歸駢駢厚待之補以軍職妖於遥翻用之鄱陽茶商之子也鄱陽漢古縣唐帶饒州古縣在今縣東界乆客廣陵熟其人情爐鼎之暇爐鼎所以鍊金石化丹砂為金銀之類頗言公私利病故駢愈竒之稍加信任駢舊將梁纉陳珙馮綬董瑾俞公楚姚歸禮素為駢所厚用之欲專權浸以計去之駢遂奪纉兵族珙家綬瑾公楚歸禮咸見踈用之又引其黨張守一諸葛殷共蠱惑駢守一本滄景村民去羌吕翻張守一葢居滄景二州間以術干駢無所遇窮困甚用之謂曰但與吾同心勿憂不富貴遂薦於駢駢寵待埒於用之埒龍輟翻等也殷始自鄱陽來用之先言於駢曰玉皇以公職事繁重輟左右尊神一人佐公為理公善遇之欲其乆留亦可縻以人間重職明日殷謁見詭辯風生駢以為神補鹽鐵劇職駢嚴潔甥姪輩未嘗得接坐殷病風疽史炤曰疽千余切又子與切痒病一本從疒從旦音多但翻又音旦釋云瘡也搔捫不替手膿血滿爪駢獨與之同席促膝傳杯器而食左右以為言駢曰神仙以此試人耳駢有畜犬搔爬也捫摸也替廢也畜吁玉翻聞其腥穢多來近之近其靳翻駢怪之殷笑曰殷嘗於玉皇前見之道家謂天帝為玉皇大帝别來數百年猶相識駢與鄭畋有隙用之謂駢曰宰相有遣劒客來刺公者刂七亦翻今夕至矣駢大懼問計安出用之曰張先生嘗學斯術可以禦之駢請於守一守一許諾乃使駢衣婦人之服衣於既翻濳於他室而守一代居駢寢榻中夜擲銅器於階令鏗然有聲又密以囊盛彘血鏗丘耕翻盛時征翻彘豕也灑於庭宇如格鬭之狀及旦笑謂駢曰㡬落奴手㡬居希翻駢泣謝曰先生於駢乃更生之惠也厚酬以金寳有蕭勝者賂用之求鹽城監鹽城漢鹽瀆縣地乆無城邑唐武德七年置鹽城縣有監亭一百二十三有監屬楚州九域志縣在州東南二百四十里駢有難色用之曰用之非為勝也為于偽翻近得上仙書云有寳劒在鹽城井中須一靈官徃取之以勝上仙左右之人欲使取劒耳駢乃許之勝至監數月函一銅七首以獻用之見稽首曰稽音啓此北帝所佩得之則百里之内五兵不能犯駢乃飾以珠玉常置坐隅坐徂臥翻用之自謂磻溪真君謂守一乃赤松子殷乃葛將軍勝乃秦穆公之壻也各以其姓傅㑹以為仙磻蒲官翻用之又刻青石為竒字云玉皇授白雲先生髙駢密令左右置道院香按駢得之驚喜用之曰玉皇以公焚修功著將補真官計鸞鶴不日當降此際用之等謫限亦滿必得陪幢節同歸上清耳用之自言與守一殷等本皆神仙以謫降在人間限期既滿當復升天列於仙官又道家之説有太清玉清上清是為三清之境幢簿江翻是後駢於道院庭中刻木鶴時著羽服跨之著陟畧翻日夕齋醮錬金燒丹費以巨萬計用之㣲時依止江陽后土廟貞觀十八年分江都置江陽縣與江都俱在揚州郭下后土廟今揚州城東南隅蕃釐觀是也然揚州古城在蜀岡之上北連雷塘今城周世宗所徙則此時后土廟在揚州城外也宋白曰宋武帝分江都縣置廣陵縣隋初改為江陽縣以處江之正北故曰江陽舉動祈禱及得志白駢崇大其廟極江南工材之選每軍旅大事以少牢禱之少詩照翻用之又言神仙好樓居用漢方士語好呼到翻說駢作迎仙樓說式芮翻費十五萬緡又作延和閣髙八丈髙居傲翻用之每對駢呵叱風雨仰揖空際云有神仙過雲表駢輙隨而拜之然常厚賂駢左右使伺駢動静共為欺罔駢不之寤伺相吏翻左右小有異議者輙為用之陷死不旋踵但濳撫膺鳴指鳴指即彈指也口不敢言駢倚用之如左右手公私大小之事皆決於用之退賢進不肖滛刑濫賞駢之政事於是大壞矣用之知上下怨憤恐有竊𤼵請置巡察使駢即以用之領之募險獪者百餘人縱横閭巷間獪古外翻縱子容翻謂之察子民間呵妻詈子靡不知之用之欲奪人貨財掠人婦女輙誣以叛逆搒掠取服搒音彭掠音亮殺其人而取之所破滅者數百家道路以目將吏士民雖家居皆重足屏氣重直龍翻屏必郢翻用之又欲以兵威脅制諸將請選募諸軍驍勇之士二萬人號左右莫邪都邪讀曰耶駢即以張守一及用之為左右莫邪軍使署置將使如帥府帥所類翻器械精利衣装華潔毎出入導從近千人從才用翻近其靳翻用之侍妾百餘人自奉奢靡用度不足輒留三司綱輸其家三司綱謂户部度支鹽鐵所𤼵綱運輸朝廷者用之猶慮人泄其姧謀乃言於駢曰神仙不難致但恨學者不能絶俗累累良瑞翻故不肻降臨耳駢乃悉去姬妾去羌吕翻謝絶人事賔客將吏皆不得見有不得已見之者皆先令沐浴齋祓祓敷勿翻又方廢翻祓除穢惡也然後見拜起纔畢已復引出由是用之得專行威福無所忌憚境内不復知有駢矣為畢師鐸討用之殺駢張本復扶又翻王鐸將兩川興元之軍屯靈感寺涇原屯京西易定河中屯渭北邠寧鳯翔屯興平保大定難屯渭橋難乃旦翻忠武屯武功官軍四集黄巢勢已蹙號令所行不出同華黄巢将朱温時據同州李詳據華州故號令之行止此二州華户化翻民避亂皆入深山築柵自保農事俱廢長安城中斗米直三十緡賊賣人於官軍以為糧官軍或執山寨之民鬻之人直數百緡以肥瘠論價資治通鑑巻二百五十四
