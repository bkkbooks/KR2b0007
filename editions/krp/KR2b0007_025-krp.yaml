  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷二十五宋司馬光撰胡三省音註漢紀十七起閼逢攝提格盡屠維協洽凡六年中宗孝宣皇帝上之下地節三年春三月詔曰盖聞有功不賞有罪不誅雖唐虞不能化天下今膠東相王成勞來不怠師古曰謂勸勉招懐百姓勞郎到翻來郎代翻流民自占八萬餘口師古曰隠度名數而來附業也占音之贍翻治有異等之效師古曰異于常等治直吏翻其賜成爵闗内矦秩中二千石未及徴用㑹病卒官卒子恤翻後詔使丞相御史問郡國上計長史守丞以政令得失貢父曰郡使守丞國使長史皆一物也故揔言郡國上計長史守丞後漢百官志諸矦王相如太守長史如郡丞又邉郡有丞元有長史長史上計無疑矣上時掌翻或對言前膠東相成偽自増加以䝉顯賞是後俗吏多為虛名云夏四月戊申立子奭為皇太子以丙吉為太傅太中大夫疏廣為少傅疏姓也皇考異曰荀紀立太子在去年四月戊申漢書舊本亦然顔師古據疏廣及丙吉傳並云地節三年立皇太子知在此年者是也封太子外祖父許廣漢為平恩矦平恩矦國屬魏郡宋白曰魏為縣屬廣平郡唐屬洺州有平恩州又封霍光兄孫中郎將雲為冠陽矦恩澤矦表冠陽矦食邑於南陽郡霍顯聞立太子怒恚不食歐血曰恚於避翻歐烏口翻此乃民間時子安得立即后有子反為王邪復教皇后令毒太子皇后數召太子賜食保阿輙先甞之保母阿母也復扶又翻數所角翻后挾毒不得行五月甲申丞相賢以老病乞骸骨賜黄金百斤安車駟馬罷就第丞相致仕自賢始六月壬辰以魏相為丞相辛丑丙吉為御史大夫疏廣為太子太傅廣兄子受為少傅太子外祖父平恩矦許伯以為太子少白使其弟中郎將舜監䕶太子家許伯即許廣漢稱伯者盖尊之也少詩照翻監古銜翻上以問廣廣對曰太子國儲副君師友必於天下英俊不宜獨親外家許氏且太子自有太傅少傅官屬已備今復使舜護太子家示陋師古曰言獨親外家示天下以淺陋復扶又翻非所以廣太子徳于天下也上善其言以語魏相語牛倨翻相免冠謝曰此非臣等所能及廣由是見器重亰師大雨雹大行丞東海蕭望之上䟽言大臣任政一姓專權之所致據望之傳為大行治禮丞上素聞望之名拜為謁者時上博延賢俊民多上書言便宜輒下望之問狀下遐稼翻髙者請丞相御史師古曰望之以其人所言之狀請於丞相御史或以奏聞即見超擢次者中二千石試事滿歲以狀聞師古曰試令行其所言之事或以諸他職事試之劉仲馮曰觀其意共是一條不當中分却煩解說也顔說非也髙者則令丞相御史試事嵗滿各以狀聞誤斷其文爾余謂髙者則請丞相御史試事次者中二千石試事文意固是一貫而分髙次則非誤斷也下者報聞罷其言不可用故報聞而罷歸田里也所白處奏皆可師古曰當主上之意也處昌吕翻冬十月詔曰乃者九月壬申地震朕甚懼焉有能箴朕過失及賢良方正直言極諌之士以匡朕之不逮毋諱有司師古曰箴戒也匡正也李竒曰諱避也雖有司在顯職皆言其過勿避之朕既不徳不能附逺是以邉境屯戍未息今復飭兵重屯久勞百姓師古曰飭整也復扶又翻下同非所以綏天下也其罷車騎將軍右將軍屯兵又詔池籞未御幸者假與貧民蘇林曰折竹以䋲綿連禁禦使人不得徃來律名為籞服䖍曰籞在池水中作室可用棲鳥鳥入中則捕之應劭曰池者陂池也籞者禁苑也臣瓚曰籞者所以養鳥也設為藩落周覆其上令鳥不得出猶苑之畜獸池之畜魚也師古曰蘇應二說是郡國宫觀勿復修治治直之翻下同流民還歸者假公田貸種食師古曰貸音吐戴翻翻種五榖種也音章勇且勿筭事師古曰不出筭賦及給徭役霍氏驕侈縱横横户孟翻太夫人顯廣治第室作乗輿輦加畫繡絪馮黄金塗韋絮薦輪如淳曰絪亦茵馮謂所馮者也以黄金塗飾之師古曰茵褥也以繡為茵馮而黄金塗于輦也晉灼曰御輦以韋縁輪著之以絮師古曰取其行安不揺動也馮與憑同著音張吕翻侍婢以五采絲輓顯游戲第中師古曰輓謂牽引車輦也音晚與監奴馮子都亂師古曰監奴謂奴之監知家務者而禹山亦並繕治第宅走馬馳逐平樂館雲當朝請數稱病私出樂音洛朝直遥翻請才性翻數所角翻下同多從賔客張圍獵黄山苑中使蒼頭奴上朝謁文穎曰朝當用謁不自行而令奴上謁者也師古曰上謁若今參見尊貴而通人也孔穎逹曰漢家僕𨽻謂之蒼頭以蒼巾為飾異于民也上時掌翻莫敢譴者顯及諸女晝夜出入長信宫殿中亡期度師古曰長信宫上官太后所居亡古無字通帝自在民閒聞知霍氏尊盛日久内不能善既躬親朝政御史大夫魏相給事中顯謂禹雲山女曹不務奉大將軍餘業師古曰女音汝曹軰也今大夫給事中他人壹間女能復自救邪間古莧翻復扶又翻下同後兩家奴争道師古曰謂霍氏及御史家霍氏奴入御史府欲躢大夫門御史為叩頭謝乃去躢與蹋同為于偽翻人以謂霍氏師古曰告語也顯等始知憂㑹魏大夫為丞相數燕見言事見賢遍翻下同平恩矦與侍中金安上等徑出入省中時霍山領尚書上令吏民得奏封事不闗尚書羣臣進見獨徃來師古曰謂各各得盡言于上也於是霍氏甚惡之惡烏路翻上頗聞霍氏毒殺許后而未察乃徙光女壻度遼將軍未央衛尉平陵矦范明友為光禄勲功臣矦表平陵矦食邑於南陽郡之武當縣出次壻諸吏中郎將羽林監任勝為安定太守任音壬守式又翻下同數月復出光姊壻給事中光禄大夫張朔為蜀郡太守羣孫壻中郎將王漢為武威太守頃之復徙光長女壻長樂衛尉鄧廣漢為少府戊戍更以張安世為衛將軍兩宫衛尉城門北軍兵屬焉兩宫未央長樂也城門京城十二門屯兵也北軍北軍八校兵也更工衡翻以霍禹為大司馬冠小冠大司馬大將軍冠武弁大冠今貶禹故使冠小冠冠小之冠古玩翻亡印綬亡古無字通罷其屯兵官屬特使禹官名與光俱大司馬者蘇林曰特但也又收范明友度遼將軍印綬但為光禄勲及光中女壻趙平為散騎騎都尉光禄大夫將屯兵又收平騎都尉印綬散騎騎都尉以騎都尉而加散騎官也百官表云散騎中常侍皆加官中常侍得入禁中散騎騎並乗輿車如淳曰自列矦下至郎中皆得有散騎及中常侍加官是時散騎及中常侍各自一官無員也中讀曰仲諸領胡越騎羽林及兩宫衛將屯兵悉易以所親信許史子弟代之初孝武之世徴發煩數百姓貧耗窮民犯灋姦軌不勝數所角翻勝音升又如字於是使張湯趙禹之屬條定法令作見知故縱監臨部主之灋師古曰見知人犯法不舉告為故縱而所監臨部主有罪併連坐之也監古衘翻緩深故之罪孟康曰孝武欲急刑吏深害及故入人罪者皆寛緩之也急縱出之誅師古曰吏釋罪人疑以為縱出則急誅之亦言尚酷其後姦猾巧灋轉相比况禁罔寖密律令煩苛文書盈扵几閣典者不能徧睹是以郡國承用者駮師古曰不曉其指用意不同也或罪同而論異姦吏因縁為市師古曰弄法而受財若市買之交易所欲活則𫝊生議𫝊讀曰附所欲䧟則予死比師古曰比以例相比况也議者咸寃傷之廷尉史鉅鹿路温舒上書曰臣聞齊有無知之禍而桓公以興齊襄公為公子無知所殺雍廪復殺無知齊國大亂桓公自莒入立晉有驪姬之難而文公用伯晉獻公信驪姬之讒殺世子申生逐公子重耳夷吾乃立驪姬之子奚齊卓子皆為里克所殺夷吾入立復為秦所執既而歸之卒而子圉嗣秦納重耳子圉死迎文公遂霸諸矦難乃旦翻伯讀曰霸近世趙王不終諸呂作亂而孝文為太宗事見十三卷繇是觀之禍亂之作將以開聖人也夫繼變亂之後必有異舊之恩此賢聖所以昭天命也徃者昭帝即世無嗣昌邑淫亂乃皇天所以開至聖也臣聞春秋正即位大一統而慎始也春秋之法繼弑君不言即位繼正即位正也陛下初登至尊與天合符宜改前世之失正始受命之統滌煩文除民疾以應天意臣聞秦有十失其一尚存治獄之吏是也治直之翻夫獄者天下之大命也死者不可復生絶者不可復屬復扶又翻師古曰屬連也音之欲翻書曰與其殺不辜寧失不經師古曰虞書大禹謨載咎繇之言辜罪也經常也言人命至重治獄宜慎寧失不常之過不濫殺無罪之人所以崇寛恕也今治獄吏則不然上下相敺敺與驅同以刻為明深者獲公名平者多後患故治獄之吏皆欲人死非憎人也自安之道在人之死是以死人之血流離于市被刑之徒比肩而立被皮義翻大辟之計歳以萬數辟毗亦翻此仁聖之所以傷也太平之未洽凡以此也夫人情安則樂生樂音洛痛則思死棰楚之下何求而不得故囚人不勝痛則飾辭以示之勝音升吏治者利其然則指導以明之治直吏翻上奏畏卻則鍜鍊而周内之上時掌翻晉灼曰精熟周悉致之法中也師古曰郤退也畏為上所郤退郤丘畧翻盖奏當之成師古曰當謂處其罪也雖臯陶聽之猶以為死有餘辜師古曰臯陶作士善聽獄訟故以為喻也陶音遥何則成錬者衆文致之罪明也故俗語曰畫地為獄議不入刻木為吏期不對師古曰畫獄木吏尚不入對况真實乎期猶必也議必不入對此皆疾吏之風悲痛之辭也唯陛下省灋制寛刑罰則太平之風可興於世上善其言十二月詔曰間者吏用法巧文寖深是朕之不徳也夫决獄不當使有罪興邪不辜䝉戮晉灼曰當重而輕使有罪者起邪惡之心也師古曰有罪者更興邪惡無辜者反䧟重刑是决獄不平故也當丁浪翻父子悲恨朕甚傷之今遣廷史與郡鞠獄任輕禄薄如淳曰廷史廷尉史也以囚辭决獄事為鞠謂疑獄也李竒曰鞠窮也獄事窮竟也師古曰李說是也其為置廷尉平秩六百石貟四人其務平之以稱朕意於是每季秋後請讞時為于偽翻稱尺證翻讞語蹇翻又魚戰翻又魚列翻議獄也上常幸宣室齋居而决事如淳曰宣室布政教之室也重用刑故齋戒以决事晉灼曰未央宫中有宣室殿師古曰晉説是也賈誼傳亦云受釐坐宣之室盖其殿在前殿之側也齋則居獄刑號為平矣涿郡太守鄭昌上疏言今明主躬垂明聽雖不置廷平獄將自正若開後嗣不若刪定律令師古曰刪刋也有不便者則刋而除之律令一定愚民知所避姦吏無所弄矣今不正其本而置廷平以理其末政衰聽怠則廷平將召權而為亂首矣孟康曰召求也招致權著已也猶賣弄也師古曰孟說是也昭帝時匈奴使四千騎田車師及五將軍擊匈奴事見上卷本始三年車師田者驚去車師復通于漢匈奴怒召其太子軍宿欲以為質軍宿焉耆外孫不欲質匈奴亡走焉耆車師王更立子烏貴為太子復扶又翻下同質音致走音奏更工衡翻及烏貴立為王與匈奴結婚姻教匈奴遮漢道通烏孫者是歲侍郎㑹稽鄭吉與校尉司馬憙㑹古外翻憙許吏翻將免刑罪人田渠犂積榖罪人免其刑使屯田發城郭諸國兵萬餘人西域諸國有逐水草與匈奴同俗者謂之行國其城居者謂之城郭諸國也與所將田士千五百人共擊車師破之車師王請降降戸江翻匈奴發兵攻車師吉憙引兵北逢之匈奴不敢前吉憙即留一侯與卒二十人留守王吉等引兵歸渠犂年考異曰西域傳云地節二以匈奴傳校之知在三年車師王恐匈奴兵復至而見殺也乃輕騎奔烏孫吉即迎其妻子傳送長安傳知戀翻匈奴更以車師王昆弟兠莫為車師王收其餘民東徙不敢居故地而鄭吉始使吏卒三百人徃田車師地以實之為下元康二年匈奴争車師張本上自初即位數遣使者求外家數所角翻久逺多似類而非是是嵗求得外祖母王媪文頴曰幽州及漢中皆謂老嫗曰媪師古曰媪女老稱也音烏老翻及媪男無故武無故及武皆媪子也上賜無故武爵闗内矦旬日間賞賜以鉅萬計四年春二月賜外祖母號為博平君據外戚傳以博平蠡吾二縣為湯沐邑而地理志博平縣屬東郡封舅無故為平昌矦平昌矦國屬平原郡武為樂昌矦樂昌矦國屬東郡恩澤矦表武封樂昌矦食邑于汝南夏五月山陽濟隂雹如雞子深二尺五寸深式浸翻殺二十餘人飛鳥皆死詔自今子有匿父母妻匿夫孫匿大父母皆勿治立廣川惠王孫文為廣川王本始四年廣川王去以罪自殺今復立文嗣封王霍顯及禹山雲自見日侵削數相對啼泣自怨數所角翻山曰今丞相用事縣官信之盡變易大將軍時灋令發揚大將軍過失又諸儒生多窶人子師古曰窶貧而無禮孔頴逹曰貧無可為禮謂之窶音其羽翻逺客飢寒喜妄說狂言喜許吏翻不避忌諱大將軍常讐之師古曰言嫉之如仇讎也今陛下好與諸儒生語好呼到翻人人自書對事多言我家者甞有上書言我家昆弟驕恣其言疾痛山屛不奏後上書者益黠盡屏必郢翻黠下入翻奏封事輙使中書令出取之不闗尚書益不信人又聞民間讙言霍氏毒殺許皇后師古曰讙衆聲也音許爰翻毒許后事見上巻本始三年寧有是邪顯恐急即具以實告禹山雲禹山雲驚曰如是何不早告禹等縣官離散斥逐諸壻用是故也此大事誅罰不小柰何於是始有邪謀矣雲舅李竟所善張赦見雲家卒卒師古曰卒讀曰猝怱遽之貌也謂竟曰今丞相與平恩矦用事可令太夫人言太后太夫人謂霍顯上官太后霍氏外孫也先誅此兩人移徙陛下在太后耳長安男子張章告之事下廷尉下遐嫁翻執金吾捕張赦等後有詔止勿捕山等愈恐相謂曰此縣官重太后故不竟也師古曰重難也竟窮竟其事也然惡端已見見賢遍翻久之猶發發即族矣不如先也師古曰言先翻遂令諸女各歸報其夫皆曰安所相避師古曰言無處相避當受禍也㑹李竟坐與諸矦王交通辭語及霍氏有詔雲山不宜宿衛免就第山陽太守張敞上封事曰臣聞公子季友有功于魯趙衰有功于晉田完有功于齊皆疇其庸延及子孫終後田氏簒齊趙氏分晉季氏顓魯魯公子季友殺慶父立僖公以安魯國遂世為上卿專魯國之政晉公子重耳出亡趙衰從及其反國伯諸矦衰皆有功遂世為晉卿有軍行至趙鞅遂與智韓魏分晉國田完自陳奔齊桓公禮而用之桓公之伯完與有功其後陳成子得齊國之政至田和遂簒齊而有之故仲尼作春秋迹盛衰譏世卿最甚乃者大將軍决大計安宗廟定天下功亦不細矣夫周公七年耳周公輔成王七年而反政於成王而大將軍二十歲自武帝後元二年至地節二年適二十歲海内之命斷於掌握斷丁亂翻方其隆盛時感動天地侵廹隂陽朝臣宜有明言曰陛下褒寵故大將軍以報功徳足矣間者輔臣顓政貴戚太盛君臣之分不明分扶問翻請罷霍氏三矦皆就第及衛將軍張安世宜賜几杖歸休時存問召見見賢遍翻以列矦為天子師明詔以恩不聽羣臣以義固爭而後許之天下必以陛下為不忘功徳而朝臣為知禮朝直遥翻下同霍氏世世無所患苦今朝廷不聞直聲師古曰言朝臣不進直言以陳其事而令明詔自親其文非䇿之得者也師古曰言失計也今兩矦已出人情不相逺以臣心度之度徒洛翻大司馬及其枝屬必有畏懼之心夫近臣自危非完計也臣敞願於廣朝白發其端直守逺郡師古曰直讀曰值朝直遥翻其路無由唯陛下省察省悉井翻上甚善其計然不召也禹山等家數有妖怪數所角翻妖于驕翻舉家憂愁山曰丞相擅減宗廟羔菟鼃可以此罪也如淳曰髙后時定令輙有擅議宗廟者棄市師古曰羔菟鼃所以供祭也菟吐故翻鼃古蛙字謀令太后為博平君置酒為于偽翻召丞相平恩矦以下使范明友鄧廣漢承太后制引斬之因廢天子而立禹約定未發雲拜為𤣥菟太守菟同都翻太中大夫任宣為代郡太守㑹事發覺秋七月雲山明友自殺顯禹廣漢等捕得禹要斬要古腰字通顯及諸女昆弟皆棄市與霍氏相連坐誅滅者數十家太僕杜延年以霍氏舊人亦坐免官八月己酉皇后霍氏廢處昭臺宮師古曰在上林苑中處昌呂翻乙丑詔封告霍氏反謀者男子張章期門董忠左曹楊惲百官表侍中左右曹皆加官晉灼曰漢儀注諸吏給事中日上朝謁平尚書奏事分為左右曹惲於粉翻侍中金安上史髙皆為列矦章為博成矦忠髙昌矦惲平通矦安上都成矦髙為樂陵矦惲丞相敞子安上車騎將軍日磾弟子髙史良娣兄子也初霍氏奢侈茂陵徐生曰霍氏必亡夫奢則不遜不遜則侮上侮上者逆道也在人之右師古曰右上也衆必害之霍氏秉權日久害之者多矣天下害之而又行以逆道不亡何待乃上疏言霍氏泰盛陛下即愛厚之宜以時抑制無使至亡書三上輙報聞漢制上書不行者輙報聞罷其後霍氏誅滅而告霍氏者皆封人為徐生上書曰臣聞客有過主人者為于偽翻過古禾翻見其竈直突傍有積薪客謂主人更為曲突突竈突囱也更衡翻逺徙其薪不者且有火患主人嘿然不應俄而家果失火鄰里共救之幸而得息於是殺牛置酒謝其鄰人灼爛者在于上行師古曰灼謂被燒炙者也行戸剛翻餘各以功次坐而不録言曲突者人謂主人曰郷使聽客之言不費牛酒終亡火患郷讀曰嚮亡古無字通今論功而請賔曲突徙薪無恩澤燋頭爛額為上客邪主人乃寤而請之今茂陵徐福數上書言霍氏且有變宜防絶之郷使福說得行數所角翻郷讀曰嚮則國無裂土出爵之費臣無逆亂誅滅之敗徃事既已而福獨不䝉其功唯陛下察之貴徙薪曲突之䇿使居焦髪灼爛之右上乃賜福帛十匹後以為郎帝初立謁見髙廟見賢遍翻大將軍光驂乗漢制大駕大將軍驂乗乗䋲證翻下同上内嚴憚之若有芒刺在背後車騎將軍張安世代光驂乗天子從容肆體甚安近焉從千容翻師古曰肆放也展也近其靳翻及光身死而宗族竟誅故俗傳霍氏之禍萌于驂乗師古曰萌謂始生也後十二嵗霍后復徙雲林館復扶又翻下同乃自殺班固賛曰霍光受襁褓之託任漢室之寄匡國家安社稷擁昭立宣雖周公阿衡何以加此師古曰阿衡伊尹官號也阿倚也衡平也言天子所倚羣下取平也然光不學亡術亡古無字闇於大理隂妻邪謀晉灼曰不揚其過也立女為后湛溺盈溢之欲湛讀曰沈以増顛覆之禍死財三年宗族誅夷哀哉臣光曰霍光之輔漢室可謂忠矣然卒不能庇其宗何也卒子恤翻夫威福者人君之器也人臣執之久而不歸鮮不及矣鮮息淺翻昔孝昭之明十四而知上官桀之詐固可以親政矣况孝宣十九即位聰明剛毅知民疾苦而光久專大柄不知避去多置私黨充塞朝廷塞則息翻使人主蓄憤於上吏民積怨於下切齒側目待時而發其得免于身幸矣况子孫以驕侈趣之哉趣讀曰促雖然曏使孝宣專以禄秩賞賜富其子孫使之食大縣奉朝請亦足以報盛徳矣乃復任之以政授之以兵及事叢釁積更加裁奪遂至怨懼以生邪謀豈徒霍氏之自禍哉亦孝宣醖釀以成之也昔鬬椒作亂于楚楚若敖之支庶為閼氏莊王滅其族而赦箴尹克黄以為子文無後何以勸善事見左傳宣四年子文鬭榖於菟也箴尹楚官名克黄子文之孫箴之金翻夫以顯禹雲山之罪雖應夷滅而光之忠勲不可不祀遂使家無噍類噍才肖翻孝宣亦少恩哉九月詔減天下鹽賈賈讀曰價又令郡國歲上繫囚以掠笞若瘐死者上時掌翻蘇林曰瘐病也囚徒病律名為瘐如淳曰律囚以飢寒而死曰瘐師古曰瘐病是也此言囚或以掠笞及飢寒及疾病而死如說非也瘐音庾或作瘉其音亦同或讀作瘐誤據本紀瘐死上有飢寒二字掠音亮所坐縣名爵里漢書本紀作名縣爵里師古曰名者其人名也縣所屬縣也爵其身之官爵也里所居邑里也丞相御史課殿最以聞師古曰凡言殿最者殿後也課居後也最凡要之首也課居先也殿音丁見翻十二月清河王年坐内亂廢遷房陵武帝元光三年立清河王義以嗣代孝王後年義之孫也是歲北海太守廬江朱邑以治行第一入為大司農行下孟翻勃海太守龔遂入為水衡都尉先是勃海左右郡歲饑師古曰左右謂側近相次者先悉薦翻盗賊並起二千石不能禽制上選能治者治直之翻下同丞相御史舉故昌邑郎中令龔遂上拜為勃海太守召見見賢遍翻問何以治勃海息其盗賊對曰海瀕遐逺師古曰瀕涯也音頻又音賔不霑聖化其民困於飢寒而吏不恤故使陛下赤子盗弄陛下之兵於潢池中耳師古曰赤子猶言初生㓜小之意也嬰孩初生體赤故曰赤子積水曰潢音黄今欲使臣勝之邪將安之也師古曰勝謂以威力克而殺之安謂以徳化撫而安之上曰選用賢良固欲安之也遂曰臣聞治亂民猶治亂䋲不可急也唯緩之然後可治治直之翻臣願丞相御史且無拘臣以文灋得一切便宜從事上許焉加賜黄金贈遣乗傳至勃海界傳知戀翻郡聞新太守至發兵以迎遂皆遣還移書敕屬縣悉罷逐捕盗賊吏諸持鉏鉤田器者師古曰鉤鎌也皆為良民吏毋得問持兵者乃為賊遂單車獨行至府盗賊聞遂教令即時解散棄其兵弩而持鉤鉏於是悉平民安土樂業樂音洛遂乃開倉廪假貧民師古曰假謂給與選用良吏尉安牧養焉遂見齊俗奢侈好末技好呼到翻技渠綺翻不田作乃躬率以儉約勸民務農桑各以口率種樹畜養遂令民口種一樹榆百本䪥五十本葱一畦韭家二母彘五雞畜許六翻民有帶持刀劍者使賣劍買牛賣刀買犢曰何為帶牛佩犢勞來循行勞力到翻來力代翻行下孟翻郡中皆有畜積獄訟止息通鑑書龔遂自勃海入為列卿因叙其政績烏孫公主女為龜兹王絳賔夫人絳賔上書言得尚漢外孫願與公主女俱入朝朝直遥翻元康元年春正月龜兹王及其夫人來朝皆賜印綬夫人號稱公主賞賜甚厚初作杜陵徙丞相將軍列矦吏二千石訾百萬者杜陵時以京兆杜縣東原上為初陵更名杜縣曰杜陵訾讀曰貲三月詔以鳳皇集泰山陳留甘露降未央宫赦天下有司復言悼園宜稱尊號曰皇考本始元年諡親曰悼置園邑復扶又翻夏五月立皇考廟冬置建章衛尉未央長樂建章甘泉皆有衛尉各掌其宫門衛屯兵趙廣漢好用世吏子孫新進年少者師古曰言舊吏家子孫而其人後出求進又年少也好呼到翻少詩照翻專厲彊壯蠭氣師古曰蠭與鋒同言鋒銳之氣見事風生無所回避師古曰風生言其速疾不可當也回曲也率多果敢之計莫為持難終以此敗廣漢以私怨論殺男子榮畜初廣漢客私酤酒長安市丞相吏逐去客疑男子蘇賢言之以語廣漢案賢賢父上書訟罪廣漢坐貶秩疑其邑子榮畜教令以它法論殺畜榮姓也周有榮公子孫以為氏人上書言之事下丞相御史按驗下遐嫁翻下同廣漢疑丞相夫人殺侍婢欲以此脅丞相丞相按之愈急廣漢乃將吏卒入丞相府召其夫人跪庭下受辭師古曰受其對辭也收奴婢十餘人去丞相上書自陳事下廷尉治實丞相自以過譴笞傅婢出至外第乃死不如廣漢言帝惡之惡烏路翻下廣漢廷尉獄吏民守闕號泣者數萬人號戸刀翻臣生無益縣官願代趙京兆死使牧養小民漢書本傳臣生之上有或言二字廣漢竟坐要斬要與腰同始考異曰本紀元康二年冬廣漢有罪要斬百官表本三年廣漢為京兆尹六年要斬元康元年守京兆尹彭城太守遺按廣漢傳司直蕭望之劾奏廣漢摧辱大臣望之自司直為平原太守元康元年自平原太守為少府然則廣漢死當在元康元年本紀誤也廣漢傳又云地節三年七月丞相婢自絞死葢婢死已數年而廣漢追發其事也廣漢為京兆尹亷明威制豪彊小民得職師古曰得職各得其常所也百姓追思歌之是歲少府宋疇坐議鳳皇下彭城未至京師不足美貶為泗水太傅傅王泗水綜上選博士諌大夫通政事者補郡國守相以蕭望之為平原太守望之上疏曰陛下哀愍百姓恐徳之不究師古曰究竟也謂周徧于天下悉出諌官以補郡吏朝無争臣則不知過朝直遥翻争讀曰諍所謂憂其末而忘其本者也上廼徴望之入守少府東海太守河東尹翁歸以治郡髙第入為右扶風翁歸為人公亷明察郡中吏民賢不肖及姦邪罪名盡知之縣縣各有記籍自聽其政師古曰言决斷諸縣姦邪之事不委令長也有急名則少緩之吏民小解輙披籍服䖍曰披有罪者籍也師古曰解讀曰懈取人必於秋冬課吏大㑹中及出行縣師古曰於大㑹之中及行縣時則取罪人以警衆行下孟翻下改行以行同不以無事時其有所取也以一警百吏民皆服恐懼改行自新其為扶風選用亷平疾姦吏以為右職職居諸吏之上為右職接待有禮好惡與同之好呼到翻惡烏路翻其負翁歸罰亦必行然温良謙退不以行能驕人故尤得名譽於朝廷初烏孫公主少子萬年有寵於莎車王班書莎車國王治莎車城去長安九千九百五十里莎蘇禾翻莎車王死而無子時萬年在漢莎車國人計欲自託於漢又欲得烏孫心上書請萬年為莎車王漢許之遣使者奚充國送萬年姓譜奚姓夏車正奚仲之後萬年初立暴惡國人不說說讀曰悅下同上令羣臣舉可使西域者前將軍韓增舉上黨馮奉世以衛矦使持節送大宛諸國客至伊循城衛矦衛士矦也伊循城在鄯善國漢於其中置屯田吏士使疏吏翻㑹故莎車王弟呼屠徴與旁國共殺其王萬年及漢使者奚充國自立為王時匈奴又發兵攻車師城不能下而去莎車遣使揚言北道諸國已屬匈奴矣揚言謂宣揚其言於外也於是攻劫南道與歃盟畔漢從鄯善以西皆絶不通歃色甲翻鄯上肩翻都䕶鄭吉校尉司馬憙皆在北道諸國間奉世與其副嚴昌計以為不亟擊之則莎車日彊其埶難制必危西域遂以節諭告諸國王因發其兵南北道合萬五千人進擊莎車攻㧞其城莎車王自殺傳其首詣長安更立它昆弟子為莎車王更工衡翻諸國悉平威振西域奉世乃罷兵以聞帝召見韓増曰賀將軍所舉得其人奉世遂西至大宛大宛聞其斬莎車王敬之異於它使得其名馬象龍而還師古曰言馬形似龍者仲馮曰此馬名曰象龍也宛于元翻還仲宣翻又如字上甚說說讀曰悅議封奉世丞相將軍皆以為可獨少府蕭望之以為奉世奉使有指師古曰本為送諸國客而擅制違命發諸國兵雖有功效不可以為後灋即封奉世開後奉使者利以奉世為比師古曰比必寐翻余謂當音毘寐翻爭逐發兵要功萬里之外師古曰逐競也要一遥翻為國家生事于夷狄漸不可長為于偽翻長知兩翻奉世不宜受封上善望之議以奉世為光禄大夫二年春正月赦天下上欲立皇后時館陶主母華倢伃館陶縣屬魏郡華戸化翻倢伃音接予下同及淮陽憲王母張倢伃楚孝王母衛倢伃皆愛幸淮陽憲王欽楚孝王嚻上欲立張倢伃為后久之懲艾霍氏欲害皇太子艾音乂乃更選後宫無子而謹慎者二月乙丑立長陵王倢伃為皇后令母養太子封其父奉光為卭成矦恩澤矦表卬成矦食邑于濟隂卭渠容翻后無竈希得進見見賢遍翻五月詔曰獄者萬民之命能使生者不怨死者不恨則可謂文吏矣今則不然用法或持巧心析律貳端深淺不平師古曰析分也謂分破律條妄生端緒以出入人罪奏不如實上亦亡由知師古曰上者天子自謂也亡古無字通四方黎民將何仰哉二千石各察官屬勿用此人吏或擅興徭役飾厨傳稱過使客韋昭曰厨謂飲食傳謂傳舍言修飾意氣以稱過使而已師古曰使人及賔客來者稱其意而遣之令過去也傳知戀翻稱音尺證翻過者過度之過也越職踰灋以取名譽譬如踐薄冰以待白日豈不殆哉師古曰殆危也今天下頗被疾疫之災朕甚愍之其令郡國被災甚者被皮義翻毋出今年租賦又曰聞古天子之名難知而易諱也其更諱詢易以䜴翻更工衡翻匈奴大臣皆以為車師地肥美近匈奴近其靳翻使漢得之多田積榖必害人國不可不争由是數遣兵擊車師田者數所角翻鄭吉將渠犁田卒七千餘人救之為匈奴所圍吉上言車師去渠犁千餘里漢兵在渠犁者少埶不能相救願益田卒上與後將軍趙充國等議欲因匈奴衰弱出兵擊其右地使不得復擾西域復扶又翻魏相上書諌曰臣聞之救亂誅暴謂之義兵兵義者王敵加于己不得已而起者謂之應兵兵應者勝争恨小故不忍憤怒者謂之忿兵兵忿者敗利人土地貨寶者謂之貪兵兵貪者破恃國家之大矜民人之衆欲見威於敵者見賢遍翻謂之驕兵兵驕者滅此五者非但人事乃天道也間者匈奴嘗有善意所得漢民輙奉歸之未有犯於邉境雖爭屯田車師不足致意中謂不足介意也今聞諸將軍欲興兵入其地丞相不預中朝之議故言聞諸將軍大將軍車騎將軍前後左右將軍皆中朝官臣愚不知此兵何名者也今邉郡困乏父子共犬羊裘食草莱之實常恐不能自存難以動兵師古曰不可以兵事動之也軍旅之後必有凶年師古曰此引老子道經之語言民以其愁苦之氣傷隂陽之和也出兵雖勝猶有後憂恐災害之變因此以生今郡國守相多不實選師古曰言不得其人風俗尤薄水旱不時按今年子弟殺父兄妻殺夫者凡二百二十二人臣愚以為此非小變也今左右不憂此師古曰左右謂近臣在天子左右者乃欲發兵報纎介之忿於逺夷殆孔子所謂吾恐季孫之憂不在顓㬰而在蕭墻之内也師古曰論語季氏將伐顓臾孔子謂冉有季路曰云云故相引之顓臾魯附庸國蕭牆者屏牆也上從相言止遣長羅矦常惠將張掖酒泉騎徃車師迎鄭吉及其吏士還渠犂召故車師太子軍宿在焉耆者立以為王盡徙車師國民令居渠犂遂以車師故地與匈奴以鄭吉為衛司馬使護鄯善以西南道魏相好觀漢故事及便宜章奏師古曰既觀國家故事又觀前人所奏便宜之章也好呼到翻數條漢興已來國家便宜行事及賢臣賈誼鼂錯董仲舒等所言奏請施行之數所角翻相勑掾史按事郡國及休告從家還至府輙白四方異聞或有逆賊風雨災變郡不上相輙奏言之上時掌翻與御史大夫丙吉同心輔政上皆重之丙吉為人深厚不伐善自曾孫遭遇師古曰遭遇謂升大位也吉絶口不道前恩故朝廷莫能明其功也㑹掖庭宫婢則令民夫上書自陳甞有阿保之功師古曰謂未為宫婢時有舊夫見在俗間者章下掖庭令考問下遐嫁翻則辭引使者丙吉知狀掖庭令將則詣御史府以視吉師古曰視讀曰示吉識謂則曰汝甞坐養皇曽孫不謹督笞汝師古曰督謂視察之汝安得有功獨渭城胡組淮陽郭徴卿有恩耳分别奏組等共養勞苦狀别彼列翻共居用翻養弋亮翻詔吉求組徴卿已死有子孫皆受厚賞詔免則為庻人賜錢十萬上親見問然後知吉有舊恩而終不言上大賢之帝以蕭望之經明持重議論有餘材任宰相師古曰任堪也欲詳試其政事復以為左馮翊宋白曰馬輔也翊佐也義取輔佐京師復扶又翻下同望之從少府出為左遷少府正九卿三輔禄秩視九卿故為左遷恐有不合意即移病師古曰移病謂移書言病一曰以病而移居余謂前說是上聞之使侍中成都矦金安上諭意曰所用皆更治民以考功功臣表及霍光傳皆作都成矦此承望之本傳之誤師古曰更猶經歴也更工衡翻治直之翻君前為平原太守日淺故復試之於三輔非有所聞也望之即起視事師古曰所聞謂聞其短失初掖庭令張賀數為弟車騎將軍安世稱皇曾孫之材美及徴怪師古曰徴證也數所角翻為于偽翻安世輙絶止以為少主在上少詩照翻不宜稱述曾孫及帝即位而賀已死上謂安世曰掖庭令平生稱我將軍止之是也上追思賀恩欲封其冡為恩徳矦師古曰身死追封故曰封冡也置守冡二百家賀有子蚤死子安世小男彭祖師古曰子者言養以為子也彭祖又小與上同席研書指欲封之先賜爵關内矦安世深辭賀封又求損守冡戸數稍減至三十戸上曰吾自為掖庭令非為將軍也為于偽翻安世乃止不敢復言上心忌故昌邑王賀賜山陽太守張敞璽書令謹備盗賊察徃來過客昌邑王廢歸昌邑國除為山陽郡故令太守謹察之毋下所賜書師古曰密令警察不欲宣露也下遐嫁翻敞於是條奏賀居處處昌呂翻著其廢亡之效師古曰著明也曰故昌邑王為人青黒色小目鼻末銳卑少須眉身體長大疾痿行歩不便少詩沼翻師古曰痿風痺疾也音人佳翻臣敞甞與之言欲動觀其意即以惡鳥感之曰昌邑多梟故王應曰然前賀西至長安殊無梟復來東至濟陽乃復聞梟聲梟不孝鳥一名流離詩注少好而長醜爾雅作鶹􅀈草木疏曰梟也大則食其母劉子曰炎州冇鳥曰梟傴伏其子百日而長羽翼既成食母而飛盖稍長從母索食母無以應從是而死漢使東郡送梟五月五日作梟羮以賜百官音堅堯翻又于驕翻乃復扶又翻察故王衣服言語跪起清狂不惠蘇林曰凡狂者隂陽脉盡濁今此人不狂似狂者故言清狂也或曰色理清徐而心不慧曰清狂清狂之狂如今白癡者也韓子曰心不能審得失之地則謂臣敞前言哀王歌舞者張修等十人無子留守哀王園賀父髆謚哀王請罷歸故王聞之曰中人守園疾者當勿治治直之翻相殺傷者當勿灋欲令亟死太守柰何而欲罷之其天資喜由亂亡終不見仁義如此師古曰喜好也由從也喜許吏翻上乃知賀不足忌也三年春三月詔封故昌邑王賀為海昬矦海昬縣屬豫章郡後漢分立建昌縣宋白曰今建昌縣舊海昬縣也宋元嘉二年廢海昏縣移建昌居焉考異曰王子矦表賀以四月壬子封宣紀賀封在丙吉之前按是嵗四月癸亥朔無壬子表誤乙未詔曰朕㣲眇時御史大夫丙吉中郎將史曾史𤣥長樂衛尉許舜侍中光禄大夫許延夀皆與朕有舊恩及故掖庭令張賀輔導朕躬修文學經術恩惠卓異厥功茂焉詩不云乎無徳不報師古曰大雅抑之詩封賀所子弟子侍中中郎將彭祖為陽都矦追賜賀諡曰陽都哀矦吉為博陽矦曾為將陵侯𤣥為平臺矦舜為博望矦延夀為樂成矦地理志城陽國有陽都縣恩澤矦表博陽矦食邑於汝南郡之南頓縣平臺屬常山郡博望屬南陽郡樂成矦食邑於南陽之平氏賀有孤孫霸年七歲拜為散騎中郎將賜爵關内矦散悉亶翻騎竒寄翻故人下至郡邸獄復作師古曰復扶目翻甞有阿保之功者皆受官禄田宅財物各以恩深淺報之吉臨當封病上憂其不起將使人就加印紼而封之及其生存也應劭曰吉時疾不能起欲如君視疾加朝服拖紳就封之也師古曰紼繫印之組也音弗太子太傅夏矦勝曰此未死也臣聞有隂徳者必饗其樂以及子孫樂音洛今吉未獲報而疾甚非其死疾也後病果愈張安世自以父子封矦在位太盛乃辭禄詔都内别藏張氏無名錢以百萬數文穎曰都内主藏官也張晏曰安世以還官官不簿也百官表大司農屬官有都内令丞安世謹慎周宻每定大政已决輙移病出聞有詔令乃驚使吏之丞相府問焉自朝廷大臣莫知其與議也與讀曰豫甞有所薦其人來謝安世大恨以為舉賢逹能豈有私謝邪絶弗復為通師古曰有欲謝者皆不通也一曰告此人而絶之更不與相見也復扶又翻下同為于偽翻予謂絶弗為通者安世敕其閽人之辭也有郎功髙不調師古曰調選也音徒釣翻自言安世安世應曰君之功髙明主所知人臣執事何長短而自言乎絶不許已而郎果遷師古曰安世外陽距之而實令其遷安世自見父子尊顯懐不自安為子延夀求出補吏為于偽翻下同上以為北地太守歲餘上閔安世年老復徴延夀為左曹太僕以太僕而加左曹官也夏四月丙子立皇子欽為淮陽王皇太子年十二通論語孝經太傅疏廣謂少傅受曰吾聞知足不辱知止不殆師古曰此老子之言而廣引之今仕宦至二千石官成名立如此不去懼有後悔即日父子俱移病上䟽乞骸骨上皆許之加賜黄金二十斤皇太子贈以五十斤公卿故人設祖道供張東都門外供居共翻張竹亮翻送者車數百兩兩音亮道路觀者皆曰賢哉二大夫或歎息為之下泣廣受歸郷里廣受東海蘭陵人日令其家賣金共具師古曰日日設之也共讀曰供下同請族人故舊賔客與相娛樂樂音洛下同或勸廣以其金為子孫頗立産業者為于偽翻廣曰吾豈老誖不念子孫哉師古曰誖惑也音布内翻顧自有舊田廬師古曰顧思念也令子孫勤力其中足以共衣食與凡人齊今復増益之以為贏餘但教子孫怠墮耳賢而多財則損其志愚而多財則益其過且夫富者衆之怨也吾既無以教化子孫不欲益其過而生怨又此金者聖主所以惠養老臣也故樂與郷黨宗族共饗其賜以盡吾餘日不亦可乎於是族人悅服潁川太守黄霸使郵亭郷官皆畜雞豚師古曰郵亭書舍謂傳送文書所止處亦如今之驛館矣郷官者郷所治處也沈約曰漢制五家為伍伍長主之二五為什什長主之十什為里里魁主之十里為亭亭長主之十亭為郷有郷佐三老有秩嗇夫游徼各一人郷佐有秩主賦稅三老主教化嗇夫主争訟游徼主姦非畜吁玉翻下同以贍鰥寡窮者然後為條教置父老師帥伍長帥所類翻長知兩翻下同班行之於民閒勸以為善防姦之意及務耕桑節用殖財種樹畜養去浮淫之費去𦍑吕翻下同其治米鹽靡密師古曰米鹽言雜而且細初若煩碎然霸精力能推行之吏民見者語次尋繹師古曰繹謂抽引而出也問它隂伏以相參考聰明識事吏民不知所出師古曰不知其用何術也咸稱神明豪釐不敢有所欺姦人去入它郡盗賊日少霸力行教化而後誅罰師古曰力猶勤也言先以徳教化於下若冇弗從然後用刑罰也後戸遘翻務在成就全安長吏師古曰不欲易代及損傷之也許丞老病聾督郵白欲逐之如淳曰許縣丞據地理志許縣屬潁川郡郡有部督郵分部屬縣霸曰許丞亷吏雖老尚能拜起送迎止頗重聽何傷且善助之毋失賢者意或問其故霸曰數易長吏數所角翻送故迎新之費及姦吏因縁絶簿書盗財物師古曰縁因也因交代之際而弃匿簿書以盗官物也公私費耗甚多皆當出于民所易新吏又未必賢或不如其故徒相益為亂凡治道去其泰甚者耳霸以外寛内明得吏民心戸口歲增治為天下第一治直之翻徴守京兆尹頃之坐灋連貶秩有詔復歸潁川為太守以八百石居太守秩二千石連貶故以八百石居四年春正月詔年八十以上非誣告殺傷人它皆勿坐師古曰誣告人及殺傷人皆如舊法其餘則不論右扶風尹翁歸卒家無餘財秋八月詔曰翁歸亷平郷正郷讀曰嚮治民異等治直之翻其賜翁歸子黄金百斤以奉祭祀上令有司求髙祖功臣子孫失矦者得槐里公乗周廣漢等百三十六人皆賜黄金二十斤復其家令奉祭祀世世勿絶公乗爵第八復方目翻勃考異曰宣紀元康元年五月復髙皇帝功臣絳矦周等百三十六人家子孫四年又賜功臣適後黄金人二十斤按功臣表詔復家者皆云元康四年其數非一不容盡誤盖紀誤耳丙寅富平敬矦張安世薨初扶陽節矦韋賢薨恩澤矦表扶陽矦食邑於沛郡蕭縣諡法好亷自克曰節長子𢎞有罪繫獄𢎞為太常坐宗廟事繫獄家人矯賢令以次子大河都尉𤣥成為後服䖍曰今東平郡也本為濟東國國除為大河郡師古曰矯託也𤣥成深知其非賢雅意即陽為病狂卧便利妄笑語昬亂師古曰便利大小便音毗連翻既葬當襲爵以狂不應召大鴻臚奏狀章下丞相御史案驗下遐嫁翻案事丞相史廼與𤣥成書師古曰即案驗𤣥成事者曰古之辭讓必有文義可觀故能垂榮於後今子獨壞容貌䝉恥辱為狂癡光曜晻而不宣壊音怪晻讀與暗同㣲哉子之所託名也李竒曰名聲名也僕素愚陋過為丞相執事師古曰過猶謬也願少聞風聲不然恐子傷髙而僕為小人也𤣥成友人侍郎章侍郎名章史逸其姓亦上疏言聖王貴以禮讓為國宜優養𤣥成勿枉其志師古曰枉屈也使得自安衡門之下師古曰衡門謂横一木於門上貧者之所居也而丞相御史遂以𤣥成實不病劾奏之劾戸槩翻下同有詔勿劾引拜𤣥成不得已受爵帝髙其節以𤣥成為河南太守車師王烏貴之走烏孫也烏孫留不遣漢遣使責烏孫烏孫送烏貴詣闕初武帝開河西四郡隔絶羗與匈奴相通之路斥逐諸羗不使居湟中地河西武威張掖酒泉敦煌四郡本匈奴昆邪休屠王地武帝開之置郡縣𦍑與匈奴隔逺不復得通湟中湟水左右地也其地肥美故斥逐諸𦍑不使居之水經注金城郡臨𦍑縣西北至塞外有西王母石室僊海鹽池北則湟水所出東流逕湟中城北故小月氏之地也又東逕臨𦍑破羗允街枝陽金城而合于大河及帝即位光禄大夫義渠安國使行諸𦍑戰國時西戎有義渠君為秦所滅子孫以國為姓先零豪言願時度湟水北逐民所不田處畜牧師古曰湟水出金城臨𦍑塞外東入河湟水之北是漢地仲馮口湟北非謂漢地也𦍑意欲稍北遷與匈奴合而為冦安國不知其情故受其詞詳下文可見余謂羌依南山度湟水而北固欲與匈奴合而湟北則漢地所以隔絶羌與匈奴通之路正在此零音憐安國以聞後將軍趙充國劾安國奉使不敬劾戸槩翻是後羌人旁縁前言抵冒度湟水師古曰旁依也抵冐犯突而前也旁音歩浪翻冐音莫北翻郡縣不能禁既而先零與諸羌種豪二百餘人解仇交質盟詛師古曰𦍑人無大君長而諸種豪遞相殺伐故每有仇讎徃來相報今解仇交質者自相親結欲入漢為冦也零音憐種章勇翻詛莊助翻上聞之以問趙充國對曰𦍑人所以易制者易以䜴翻以其種自有豪數相攻擊埶不壹也數所角翻下同徃三十餘歲西𦍑反時亦先解仇合約攻令居與漢相距五六年乃定武帝元鼎五年西羌反攻故安枹罕次年即平至是五十一年師古曰合約共為要契也令音鈴匈奴數誘𦍑人欲與之共擊張掖酒泉地使𦍑居之數所角翻誘音酉間者匈奴困於西方謂本始三年為烏孫所破疑其更遣使至𦍑中與相結臣恐𦍑變未止此且復結聨他種復扶又翻宜及未然為之備師古曰未然者其計未成後月餘𦍑矦狼何果遣使至匈奴藉兵師古曰藉借也據充國傳狼何小月氏種欲擊鄯善燉煌以絶漢道鄯上扇翻燉音屯充國以為狼何埶不能獨造此計疑匈奴使已至羌中先零䍐开乃解仇作約蘇林曰䍐开在金城南師古曰䍐开𦍑之别種也此下言遣开豪雕庫宣天子至徳䍐开之屬皆聞知明詔其下又云河南大开小开則䍐𦍑开𦍑姓族殊矣开音口堅翻而地理志天水有䍐开縣盖以此二種羌來降處之此地因以名縣也而今之𦍑姓有䍐开者總是䍐开之類合而言之因為姓耳變开為井字之訛也零音憐䍐即罕字到秋馬肥變必起矣宜遣使者行邉兵行下孟翻下同豫為備勑視諸𦍑母令解仇師古曰視讀曰示示語之也以發覺其謀於是兩府復白遣義渠安國行視諸𦍑兩府丞相御史府也此視觀也分别善惡别彼列翻是時比年豐稔榖石五錢比毗至翻資治通鑑卷二十五
