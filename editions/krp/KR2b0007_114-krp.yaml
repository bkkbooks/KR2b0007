front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百十四宋司馬光撰胡三省音注晉紀三十六起旃蒙大荒落盡著雍涒灘凡四年安皇帝已義熙元年春正月南陽太守扶風魯宗之起兵襲襄陽桓蔚走江陵蔚紆勿翻己丑劉毅等諸軍至馬頭桓振挾帝出屯江津江津戍在江陵南臨江滸荆州記曰江陵縣東三里有津鄉水經注江陵城南有馬牧城此洲始自枚回下迄于此長七十餘里洲上有奉城江津長所治遣使求割江荆二州奉送天子毅等不許辛卯宗之擊破振將温楷于柞溪水經注柞溪水出江陵縣北葢諸池散流咸所㑹合積以成川東流逕魯宗之壘南又東注船官湖將即亮翻柞才各翻又音作進屯紀南郡國志江陵縣北十餘里有紀南城振留桓謙馮該守江陵引兵與宗之戰大破之劉毅等擊破馮該於豫章口水經注江水過江陵而東得豫章口夏水所通也西北有豫章岡葢因岡而得名其地去江陵城二十里桓謙棄城走毅等入江陵執卞範之等斬之桓振還望見火起知城已陷其衆皆潰振逃于溳川水經注溳水出漢南陽郡蔡陽縣東南大洪山東南流過隨縣西又南過江夏安陸縣西又東南入于夏溳音云乙未詔大處分悉委冠軍將軍劉毅處昌吕翻分扶問翻冠古玩翻戊戌大赦改元惟桓氏不原以桓冲忠于王室特宥其孫𦙍以魯宗之為雍州刺史毛璩為征西將軍都督益梁秦凉寧五州諸軍事璩弟瑾為梁秦二州刺史瑗為寧州刺史雍於用翻璩求於翻瑾渠吝翻瑗于眷翻劉懐肅追斬馮該於石城桓謙桓怡桓蔚桓謐何澹之温楷皆奔秦蔚紆勿翻澹徒覽翻怡𢎞之弟也桓𢎞死見上卷上年燕王熙伐髙句麗句如字又音駒麗力知翻戊申攻遼東城且陷熙命將士毋得先登俟剗平其城朕與皇后乘輦而入剗楚限翻由是城中得嚴備不克而還後齊髙緯之攻晉州亦若是矣還従宣翻又如字秦王興以鳩摩羅什為國師奉之如神親帥羣臣及沙門聴羅什講佛經帥讀曰率下同又命羅什翻譯西域經論三百餘卷古之譯者傳四夷之言今羅什翻夷言為華言故曰譯大營塔寺沙門坐禪者常以千數禪静也寂也傳燈録曰禪有五有凡夫禪有外道禪有小乘禪有大乘禪有最上乘禪禪時連翻公卿以下皆奉佛由是州郡化之事佛者十室而九乞伏乾歸擊吐谷渾大孩大破之俘萬餘口而還大孩走死胡園晉書吐谷渾傳吐谷渾王烏紇堤一名大孩胡園作胡國孩何開翻視羆世子樹洛干帥其餘衆數千家奔莫何川莫何山在西傾山東北西傾亦名嵹臺山帥讀曰率自稱車騎大將軍大單于吐谷渾王騎竒寄翻單音蟬樹洛干輕徭薄賦信賞必罰吐谷渾復興復扶又翻沙漒諸戎皆附之段國曰澆河郡西南一百七十里有黄沙南北一百二十里東西七十里西極大揚川望之若人委糒糠於地不生草木蕩然黄沙周迴數百里洮水出嵹臺山東北逕吐谷渾中自洮嵹南北三百里中地草皆是龍鬚而無樵柴謂之嵹川漒渠良翻西涼公暠自稱大將軍大都督領秦凉二州牧暠古老翻大赦改元建初遣舍人黄始梁興間行奉表詣建康間古莧翻二月丁巳留臺備法駕迎帝於江陵劉毅劉道規留屯夏口夏户雅翻何無忌奉帝東還初毛璩聞桓振陷江陵帥衆三萬順流東下將討之使其弟西夷校尉瑾蜀郡太守瑗出外水璩求於翻瑾渠吝翻瑗于眷翻蜀有内水外水内水涪水也外水即蜀江𤼵源於岷山者參軍巴西譙縦侯暉出涪水蜀人不樂逺征暉至五城水口涪音浮樂音洛水經注涪水自南安郡南流其枝流西逕廣漢五城縣為五城水又西至成都入于江又曰江水東絶緜洛逕五城界至廣都北岸南入于江謂之五城水口斯為北江沈約宋志五城縣屬廣漢郡晉武帝咸寜四年立華陽國志云漢時立倉𤼵五縣人尉部主之晉因立五城縣在五城山按五代志蜀郡𤣥武縣舊曰伍城𤣥武縣唐屬梓州與巴西陽昧謀作亂昩莫葛翻縱為人和謹蜀人愛之暉昩共逼縱為主縱不可走投于水引出以兵逼縱登輿縱又投地叩頭固辭暉縳縱於輿還襲毛瑾於涪城殺之涪音浮推縱為梁秦二州刺史璩至略城據晉書毛璩傳略城去成都四百里聞變奔還成都遣參軍王瓊將兵討之將即亮翻為縱弟明子所敗敗補邁翻死者什八九益州營户李騰開城納縱兵民有流離逃叛分配軍營者為營户殺璩及弟瑗滅其家縱稱成都王以從弟洪為益州刺史以明子為巴州刺史屯白帝於是蜀大亂漢中空虚氐王楊盛遣其兄子平南將軍撫據之癸亥魏主珪還自豺山罷尚書三十六曹魏三十六曹始見於一百九卷隆安元年三月桓振自鄖城襲江陵杜預曰江夏雲杜縣東南有鄖城古鄖子之國鄖音云振先逃于鄖川鄖城葢在鄖川也鄖音云荆州刺史司馬休之戰敗奔襄陽振自稱荆州刺史建威將軍劉懐肅自雲杜引兵馳赴與振戰於沙橋沙橋在江陵城北劉毅遣廣武將軍唐興助之臨陳斬振陳讀曰陣復取江陵復扶又翻下復詣尋復復説同甲午帝至建康乙未百官詣闕請罪詔令復職尚書殷仲文以朝廷音樂未備言於劉裕請治之治直之翻裕曰今日不暇給且性所不解解户買翻曉也下同仲文曰好之自解裕曰正以解則好之故不習耳英雄之言政自度越常流世之嗜音者可以自省矣好呼到翻庚子以琅邪王徳文為大司馬武陵王遵為太保劉裕為侍中車騎將軍都督中外諸軍事徐青二州刺史如故劉毅為左將軍何無忌為右將軍督豫州揚州五郡軍事豫州刺史劉道規為輔國將軍督淮北諸軍事并州刺史魏詠之為征虜將軍呉國内史裕固讓不受加録尚書事又不受屢請歸藩歸藩歸京口也詔百官敦勸帝親幸其第裕惶懼復詣闕陳請乃聴歸藩以魏詠之為荆州刺史代司馬休之初劉毅嘗為劉敬宣寧朔參軍劉敬宣為寜朔將軍毅為參軍時人或以雄傑許之敬宣曰夫非常之才自有調度調徒弔翻豈得便謂此君為人豪邪此君之性外寛而内忌自伐而尚人若一旦遭遇亦當以陵上取禍耳敬宣之論毅其知之固審矣然㡬以此掇禍聖人包周身之防正為是耳毅聞而恨之及敬宣為江州辭以無功不宜授任先於毅等先悉薦翻裕不許毅使人言於裕曰劉敬宣不豫建義猛將勞臣方須叙報將即亮翻如敬宣之比宜令在後若使君不忘平生裕參劉牢之軍事牢之父子雅敬待之故云然止可為貟外常侍耳貟外散騎常侍魏末置聞已授郡實為過優敬宣自北來歸裕以為晉陵太守尋復為江州尤用駭惋惋烏貫翻敬宣愈不自安自表解職乃召還為宣城内史夏四月劉裕旋鎮京口改授都督荆司等十六州諸軍事加領兖州刺史盧循遣使貢獻使疏吏翻時朝廷新定未暇征討壬申以循為廣州刺史徐道覆為始興相循遺劉裕益智粽遺于季翻本草曰益智子生崑崙國今嶺南州郡往往有之顧微交州記曰益智葉如蘘荷莖如竹箭子從心出一枝有十子子肉白滑四破去之蜜煮為粽味辛粽作弄翻角黍也裕報以續命湯循以益智調裕裕以續命報之此雖淺陋亦兵機也循以前琅邪内史王誕為平南長史誕説循曰誕本非戎旅在此無用説輸芮翻王氏江南衣冠稱首故云本非戎旅素為劉鎮軍所厚若得北歸必蒙寄任公私際會仰答厚恩循甚然之劉裕與循書令遣呉隠之還循不從誕復説循曰復扶又翻將軍今留呉公公私非計孫伯符豈不欲留華子魚邪但以一境不容二君耳於是循遣隠之與誕俱還元興元年桓𤣥流王誕於嶺南二年盧循破廣州虜呉隠之誕并沒於循所漢獻帝建安四年華歆以豫章歸孫策策死曹操表召歆孫權遣還許華户化翻初南燕主備徳仕秦為張掖太守事見一百二卷海西公太和五年其兄納與母公孫氏居于張掖備徳之從秦王堅冦淮南也冦淮南見一百五卷孝武帝太元八年留金刀與其母别備徳與燕王垂舉兵於山東張掖太守苻昌收納及備徳諸子皆誅之公孫氏以老獲免納妻段氏方娠未決獄掾呼延平備徳之故吏也掾于絹翻竊以公孫氏及段氏逃于羌中段氏生子超十嵗而公孫氏病臨卒以金刀授超曰汝得東歸當以此刀還汝叔也呼延平又以超母子奔涼及吕隆降秦超隨涼州民徙長安秦徙涼州民事見上卷元興二年平卒段氏為超娶其女為婦超恐為秦人所録為于偽翻録采也收也為所收采則不得歸南燕矣乃陽狂行乞秦人賤之惟東平公紹見而異之言於秦王興曰慕容超姿幹瓌偉瓌公回翻殆非真狂願微加官爵以縻之興召見與語超故為謬對或問而不答興謂紹曰諺云妍皮不褁癡骨徒妄語耳乃罷遣之備徳聞納有遺腹子在秦遣濟隂人呉辯往視之濟子禮翻辯因鄉人宗正謙賣卜在長安以告超宗正以官為氏超不敢告其母妻潛與謙變姓名逃歸南燕行至梁父父音甫鎮南長史悦夀以告兖州刺史慕容法南燕以法為兖州刺史鎮梁父法曰昔漢有卜者詐稱衛太子見二十三卷漢昭帝始元五年今安知非此類也不禮之超由是與法有隙為超立法謀反張本備徳聞超至大喜遣騎三百迎之騎竒寄翻下同超至廣固以金刀獻於備徳備徳慟哭悲不自勝勝音升封超為北海王拜侍中驃騎大將軍司𨽻校尉驃匹妙翻開府妙選時賢為之僚佐備徳無子欲以超為嗣超入則侍奉盡歡出則傾身下士下户嫁翻由是内外譽望翕然歸之五月桂陽太守章武王秀義陽王望子河間王洪生子威徙封章武傳至孫無嗣河間王欽以子範之繼之秀範之子也及益州刺史司馬軌之謀反伏誅秀妻桓振之妹也故自疑而反桓𤣥餘黨桓亮苻宏等擁衆冦亂郡縣者以十數劉毅劉道規檀祗等分兵討滅之荆湘江豫皆平詔以毅為都督淮南等五郡軍事豫州刺史淮南廬江歴陽晉熙安豐凡五郡何無忌為都督江東五郡軍事會稽内史會工外翻北青州刺史劉該反引魏為援隆安五年劉該固嘗降魏矣沈約曰江左青州治廣陵清河陽平二郡太守孫全聚衆應之六月魏豫州刺史索度真大將斛斯蘭斛斯亦虜姓也冦徐州圍彭城劉裕遣其弟南彭城内史道憐東海太守孟龍符將兵救之將即亮翻斬該及全魏兵敗走龍符懐玉之弟也秦隴西公碩徳伐仇池屢破楊盛兵將軍斂俱攻漢中歛羌之種姓俱其名㧞成固徙流民三千餘家於闗中秋七月楊盛請降於秦降户江翻秦以盛為都督益寧二州諸軍事征南大將軍益州牧劉裕遣使求和於秦使疏吏翻且求南鄉等諸郡秦王興許之羣臣咸以為不可興曰天下之善一也劉裕㧞起細微能誅討桓𤣥興復晉室内釐庶政外修封疆吾何惜數郡不以成其美乎遂割南鄉順陽新野舞隂等十二郡歸于晉隆安二年淮漢以北多降于秦此十二郡葢皆在漢北漢建安中割南陽右壤為南鄉郡晉立順陽郡以南鄉為縣盖其後復分立郡也案晉南鄉郡秦漢隂縣及鄼縣之地今為光化軍舞隂縣屬南陽郡未知立郡之始八月燕遼西太守邵顔有罪亡命為盜九月中常侍郭仲討斬之汝水竭汝當作女郭緣生述征記齊桓公冢在齊城南二十里冢東有女水或曰齊桓公女冢在其上故以名水女水導川東北流甚有神焉化隆則水生政薄則津竭地理志葂頭山女水所出東北至臨菑入鉅淀鉅淀即漢鉅定地晉書地理志女水出齊國東安平縣東北南燕主備徳惡之惡烏路翻俄而寢疾北海王超請禱之備徳曰人主之命短長在天非汝水所能制也固請不許戊午備徳引見羣臣于東陽殿見賢遍翻議立超為太子俄而地震百官驚恐備徳亦不自安還宫是夜疾篤瞑不能言段后大呼今召中書作詔立超可乎呼火故翻備徳開目頷之乃立超為皇太子大赦備徳尋卒年七十為十餘棺夜分出四門潛瘞山谷瘞一計翻己未超即皇帝位超字祖明徳兄北海王納之子大赦改元太上尊段后為皇太后以北地王鍾都督中外諸軍録尚書事慕容法為征南大將軍都督徐兖揚南兖四州諸軍事加慕容鎮開府儀同三司以尚書令封孚為大尉麴麴當作鞠仲為司空封嵩為尚書左僕射癸亥虚葬備徳於東陽陵諡曰獻武皇帝廟號世宗超引所親公孫五樓為腹心備徳故大臣北地王鍾段宏等皆不自安求補外職超以鍾為青州牧宏為徐州刺史公孫五樓為武衛將軍領屯騎校尉内參政事封孚諫曰臣聞親不處外羇不處内左傳申無宇諫楚靈王曰親不在外羇不在内處昌吕翻鍾國之宗臣社稷所賴宏外戚懿望百姓具瞻正應參翼百揆不宜逺鎮外方今鍾等出藩五樓内輔臣竊未安超不從鍾宏心皆不平相謂曰黄犬之皮恐終補狐裘也史記騶忌相齊淳于髠謂之曰狐裘雖弊不可補以黄狗之皮騶忌曰謹受令請謹擇君子母雜小人其間五樓聞而恨之魏詠之卒江陵令羅脩謀舉兵襲江陵奉王慧龍為主劉裕以并州刺史劉道規為都督荆寧等六州諸軍事荆州刺史脩不果發奉慧龍奔秦慧龍得免見上卷元興三年乞伏乾歸伐仇池為楊盛所敗敗補邁翻西涼公暠與長史張邈謀徙都酒泉以逼沮渠蒙遜沮子余翻以張體順為建康太守鎮樂涫漢志樂涫縣屬酒泉郡張氏分為建康郡涫音官以宋繇為敦煌護軍與其子敦煌太守讓鎮敦煌遂遷于酒泉李暠遷酒泉欲以逼沮渠蒙遜安知反為蒙遜所逼邪敦徒門翻暠手令戒諸子以為從政者當審慎賞罰勿任愛憎近忠正逺佞諛近其靳翻逺于願翻勿使左右竊弄威福毁譽之來當研覈真偽聴訟折獄必和顔任理慎勿逆詐億必朱子曰逆未至而迎之也詐謂人欺已也億未見而意之也必期必也譽音余輕加聲色務廣咨詢勿自專用吾莅事五年雖未能息民然含垢匿瑕朝為冦讐夕委心膂粗無負於新舊粗坐五翻事任公平坦然無纇纇盧對翻絲節也庇也初不容懐有所損益計近則如不足經逺乃為有餘庶亦無愧前人也十二月燕王熙襲契丹契丹本東胡種其先為匈奴所破保鮮卑山魏青龍中部酋軻比能桀驁為幽州刺史王雄所殺部衆遂微逃潢水之南黄龍之北後自號曰契丹種類繁盛契欺吉翻程大昌曰契丹之契讀如喫二年春正月甲申魏主珪如豺山宫諸州置三刺史郡置三太守縣置三令長刺史令長各之州縣長知兩翻之往也太守雖置而未臨民功臣為州者皆徴還京師以爵歸第益州刺史司馬榮期擊譙明子于白帝破之燕王熙至陘北陘北冷陘山之北也陘音刑畏契丹之衆欲還苻后不聴戊申遂棄輜重重直用翻輕兵襲髙句麗南燕主超猜虐日甚政出權倖盤于遊畋盤樂也言樂于田獵遊逸封孚韓􅒲屢諫不聴丁度曰􅒲竹角翻超嘗臨軒問孚曰朕可方前世何主對曰桀紂超慙怒孚徐步而出不為改容為于偽翻鞠仲謂孚曰與天子言何得如是宜還謝孚曰行年七十惟求死所耳竟不謝超以其時望優容之桓𤣥之亂河間王曇之子國璠叔璠奔南燕河間王顒死無後元帝以彭城王植子融為顒嗣薨又無子帝復尋以彭城王釋子欽為融嗣欽薨曇之嗣曇之薨國鎮嗣國璠盖國鎮兄弟劉裕興復簒意未彰國璠宜如劉敬宣輩南歸可也乃攻擾晉邊者欽孫秀嗣封章武國璠従兄弟也秀以桓振妹婿謀反誅故國璠兄弟不敢南歸耳豈知裕之必簒哉曇徒含翻璠孚袁翻二月甲戌國璠等攻陷弋陽燕軍行三千餘里士馬疲凍死者屬路屬之欲翻攻髙句麗木底城不克而還木底城在南蘇之東唐置木底州句如字又音駒麗力知翻夕陽公雲傷於矢且畏燕王熙之虐遂以疾去官為後燕人弑熙立雲張本三月庚子魏主珪還平城夏四月庚申復如豺山宫復扶又翻甲午還平城柔然社崘侵魏邊崘盧昆翻五月燕主寳之子博陵公䖍上黨公昭皆以嫌疑賜死六月秦隴西公碩徳自上邽入朝秦王興為之大赦為于偽翻及歸送之至雍乃還雍於用翻興事晉公緒及碩徳皆如家人禮車馬服玩先奉二叔而自服其次國家大政皆咨而後行秃髪傉檀伐沮渠蒙遜傉奴沃翻沮子余翻蒙遜嬰城固守傉檀至赤泉而還赤泉在張掖氐池縣北獻馬三千匹羊三萬口于秦秦王興以為忠以傉檀為都督河右諸軍事車騎大將軍凉州刺史鎮姑臧徴王尚還長安凉州人申屠英等遣主簿胡威詣長安請留尚興弗許威見興流涕言曰臣州奉戴王化於兹五年隆安五年九月吕隆降秦至是猶未五朞土宇僻逺威靈不接士民嘗膽抆血共守孤城抆武粉翻又文運翻拭也仰恃陛下聖徳俯杖良牧仁政克自保全以至今日陛下奈何乃以臣等貿馬三千匹羊三萬口貿音茂易也市賣也賤人貴畜畜許又翻毋乃不可若軍國須馬直煩尚書一符臣州三千餘户各輸一馬朝下夕辦何難之有昔漢武傾天下之資力開拓河西以斷匈奴右臂今陛下無故棄五郡之地忠良華族以資暴虜斷丁管翻此五郡謂漢所開武威張掖敦煌酒泉金城豈惟臣州士民墜于塗炭恐方為聖朝旰食之憂旰古案翻興悔之使西平人車普馳止王尚又遣使諭傉檀會傉檀已帥步騎三萬軍于五澗五澗在姑臧南車尺遮翻使疏吏翻帥讀曰率普先以狀告之傉檀遽逼遣王尚尚出自清陽門傉檀入自凉風門清陽當作青陽凉風門姑臧城南門别駕宗敞送尚還長安宗姓也漢有南陽宗資傉檀謂敞曰吾得凉州三千餘家情之所寄惟卿一人奈何捨我去乎敞曰今送舊君所以忠於殿下也傉檀曰吾新牧貴州懐逺安邇之略如何敞曰凉土雖弊形勝之地殿下恵撫其民收其賢俊以建功名其何求不獲因薦本州文武名士十餘人傉檀嘉納之王尚至長安興以為尚書傉檀燕羣臣於宣徳堂仰視嘆曰古人有言作者不居居者不作信矣武威孟禕曰昔張文王始為此堂於今百年十有二主矣張駿卒私諡曰文王張氏自駿至重華耀靈祚𤣥靚天錫凡六主梁熙吕光吕紹吕纂吕隆王尚又六主通十二主禕許韋翻惟履信思順者可以久處處昌吕翻傉檀善之魏主珪規度平城度徒洛翻欲擬鄴洛長安修廣宫室以濟陽太守莫題有巧思恵帝分陳留為濟陽國後因以為郡濟子禮翻思相吏翻召見與之商功題久侍稍怠珪怒賜死題含之孫也此莫題非髙邑公莫題莫含見八十九卷愍帝建興三年於是發八部五百里内男丁築灅南宫魏先有八部大人既得中原建平城為代都分布八部於畿内灅力水翻闕門髙十餘丈髙居傲翻穿溝池廣苑囿規立外城方二十里分置市里三十日罷秋七月魏太尉宜都丁公穆崇薨周公諡法述義不克曰丁八月秃髮傉檀以興城侯文支鎮姑臧自還樂都樂音洛雖受秦爵命然其車服禮儀皆如王者甲辰魏主珪如豺山宫遂之石漠自隂山以北皆大漠有白漠黒漠石漠白黑二漠以其色為名石漠葢其地皆石據北史石漠在漢定襄郡武要縣西北塞外九月度漠北癸巳南還長川水經注長川城在柔𤣥鎮西劉裕聞譙縱反遣龍驤將軍毛修之將兵與司馬榮期文處茂時延祖共討之處昌吕翻修之至宕渠宕渠縣漢屬巴郡劉蜀分屬巴西郡恵帝復分巴西置宕渠郡按五代志果州南充縣舊置宕渠郡合州石鏡縣亦置宕渠郡皆當自白帝上成都之路宕徒浪翻榮期為其參軍楊承祖所殺承祖自稱巴州刺史修之退還白帝秃髮傉檀求好於西凉好呼到翻西凉公暠許之沮渠蒙遜襲酒泉至安珍安珍即漢酒泉郡安彌縣也後人従省書之以彌為弥傳寫之訛又以弥為珍暠戰敗城守蒙遜引還南燕公孫五樓欲擅朝權朝直遙翻譛北地王鍾於南燕主超請誅之南燕主備徳之卒也卒子恤翻慕容法不奔喪超遣使讓之使疏吏翻法懼遂與鍾及段宏謀反超聞之徴鍾鍾稱疾不至超收其黨侍中慕容統等殺之征南司馬卜珍告左僕射封嵩數與法往來疑有姧超收嵩下廷尉太后懼泣告超曰嵩數遣黄門令牟常説吾云帝非太后所生恐依永康故事數所角翻説輸芮翻下遐稼翻燕主寳永康元年逼殺其母段氏事見一百八卷孝武帝太元二十一年我婦人識淺恐帝見殺即以語法法為謀見誤知復何言語牛倨翻復扶又翻超乃車裂嵩西中郎將封融犇魏超遣慕容鎮攻青州慕容昱攻徐州右僕射濟陽王凝及韓範攻兖州南燕青州刺史鎮東萊徐州刺史鎮莒城兖州刺史鎮梁父濟子禮翻昱拔莒城段宏犇魏封融與羣盜襲石塞城殺鎮西大將軍餘鬱國中振恐濟陽王凝謀殺韓範襲廣固範知之勒兵攻凝凝犇梁父範并將其衆攻梁父克之父音甫法出犇魏凝出犇秦慕容鎮克青州鍾殺其妻子為地道以出與髙都公始皆奔秦秦以鍾為始平太守凝為侍中南燕主超好變更舊制朝野多不悦又欲復肉刑増置烹轘之法好呼到翻更工衡翻轘户慣翻車裂也衆議不合而止冬十月封孚卒慕容超之立雖非少主乃國疑而大臣未附之時超不能推心和輯使之阻兵以至于奔亡超誰與立哉雖劉裕之兵未至固知其必滅矣尚書論建義功奏封劉裕豫章郡公劉毅南平郡公何無忌安成郡公自餘封賞有差梁州刺史劉稚反劉毅遣將討禽之將即亮翻庚申魏主珪還平城乙亥以左將軍孔安國為尚書左僕射十一月秃髮傉檀遷于姑臧乞伏乾歸入朝于秦朝直遙翻十二月以何無忌為都督荆江豫三州八郡軍事江州刺史八郡葢荆州之武昌江州之尋陽豫章廬陵臨川鄱陽南康豫州之晉熙是嵗桓石綏與司馬國璠陳襲聚衆胡桃山為冦胡桃山當在歴陽郡界璠孚袁翻劉毅遣司馬劉懐肅討破之石綏石生之弟也三年春正月辛丑朔燕大赦改元建始秦王興以乞伏乾歸寖彊難制留為主客尚書漢成帝置四曹尚書其四曰主客主外國夷狄事以其世子熾磐行西夷校尉監其部衆是後秦政漸衰熾磐日以盛而乾歸亦不可得而留矣熾昌志翻校户教翻監工衡翻二月己酉劉裕詣建康固辭新所除官欲詣廷尉詔從其所守裕乃還丹徒魏主珪立其子修為河間王處文為長樂王處昌吕翻樂音洛連為廣平王黎為京兆王殷仲文素有才望自謂宜當朝政悒悒不得志悒悒憂悒不自安之意仲文黨於桓𤣥以才望希進而不得進故不自安也朝直遙翻出為東陽太守尤不樂樂音洛何無忌素慕其名東陽無忌所統無忌都督浙江東五郡東陽其一也仲文許便道修謁無忌喜欽遲之遲直吏翻待也後企遲同而仲文失志恍惚遂不過府府謂督府何無忌治所也恍呼廣翻惚音忽無忌以為薄已大怒會南燕入冦無忌言於劉裕曰桓𦙍殷仲文乃腹心之疾北虜不足憂也閏月劉裕府將駱氷謀作亂將即亮翻事覺裕斬之因言氷與仲文桓石松曹靖之卞承之劉延祖潛相連結謀立桓𦙍為主皆族誅之燕王熙為其后苻氏起承華殿為于偽翻負土於北門土與穀同價宿軍典軍杜静載棺詣闕極諫熙斬之北燕營州刺史鎮宿軍苻氏嘗季夏思凍魚煎魚為凍今人多能之季夏六月暑盛則不能凍仲冬須生地黄本草曰地黄葉如甘露子花如脂麻花但有細斑㸃北人謂之牛妳子二月八月採根隂乾解諸熱破血通利月水熙下有司切責不得而斬之下遐嫁翻夏四月癸丑苻氏卒熙哭之懣絶久而復蘇懣音悶喪之如父母服斬衰食粥喪息郎翻衰倉回翻命百官於宫内設位而哭使人案檢哭者無淚則罪之羣臣皆含辛以為淚髙陽王妃張氏熙之嫂也髙陽王隆之妃美而有巧思思相吏翻熙欲以為殉乃毁其禭鞾中得弊氈禭音遂送終曰禭鞾許加翻遂賜死右僕射韋璆等皆恐為殉沐浴俟命公卿以下至兵民户率營陵費殫府藏璆渠尤翻藏徂浪翻陵周圍數里熙謂監作者曰善為之朕將繼往觀熙此言死期將至監工銜翻丁酉燕太后段氏去尊號出居外宫去𦍑吕翻段氏熙之慈母也見上卷元興二年氐王楊盛以平北將軍符宣為梁州督護將兵入漢中將即亮翻秦梁州别駕吕瑩等起兵應之吕營盖為秦之梁州别駕以後面秦王興遣南梁州刺史王敏敕譙縦觀之可見刺史王敏攻之瑩等求援於盛盛遣軍臨濜口敏退屯武興水經沔水東逕白馬戍南濜水入焉注云濜水北𤼵武都氐中南逕張魯城東又南過陽平闗西而南入于沔謂之濜口有濜口城郡國縣道記梁州西縣本名白馬城又曰濜口城劉蜀置武興督於漢中沔陽縣隋唐為興州今沔州城古武興城也濜音徐刃翻盛復通於晉孝武太元十九年楊盛来稱藩其所以不與晉通者以桓𤣥之亂也復音扶又翻晉以盛為都督隴右諸軍事征西大將軍開府儀同三司盛因以宣行梁州刺史通鑑以晉紀年則以盛為都督之上不必書晉晉字當作詔字五月壬戌燕尚書郎苻進謀反誅進定之子也孝武太元十一年苻定降燕見一百六卷魏主珪北巡至濡源濡音乃官翻魏常山王遵以罪賜死初魏主珪滅劉衛辰其子勃勃奔秦見一百卷孝武太元十六年秦髙平公沒奕干以女妻之妻音七細翻勃勃魁岸美容儀性辯慧秦王興見而竒之與論軍國大事寵遇踰于勲舊興弟邕諫曰勃勃不可近也近音其靳翻興曰勃勃有濟世之才吾方與之平天下奈何逆忌之乃以為安逺將軍使助沒奕干鎮髙平以三城朔方雜夷魏收地形志偏城郡廣武縣有三城唐延州豐林縣古廣武縣地及衛辰部衆三萬配之使伺魏間隙間音古莧翻邕固争以為不可興曰卿何以知其為人邕曰勃勃奉上慢御衆殘貪猾不仁輕為去就寵之踰分分音扶問翻恐終為邊患興乃止久之竟以勃勃為安北將軍五原公配以三交五部鮮卑及雜虜二萬餘落鎮朔方為勃勃病秦興悔不用邕言張本魏主珪歸所虜秦將唐小方于秦將音即亮翻秦王興請歸賀狄干仍送良馬千匹以贖狄伯支珪許之秦留賀狄干見一百十二卷元興元年狄伯支唐小方被禽亦見是年勃勃聞秦復與魏通而怒復音扶又翻乃謀叛秦楚白公勝所以作亂於楚者其事正如此柔然可汗社崘獻馬八千匹于秦至大城大城縣前漢屬西河郡後漢屬朔方郡魏晉省崘盧昆翻勃勃掠取之悉集其衆三萬餘人偽畋於髙平川因襲殺沒奕干而并其衆勃勃自謂夏后氏之苗裔史記及漢書皆云匈奴夏后氏苗裔淳維之後勃勃匈奴餘種故云然夏户雅翻下同六月自稱大夏天王大單于晉書曰勃勃字屈孑匈奴右賢王去卑之後劉元海之族劉武之曾孫劉衛辰之子劉武即劉虎晉書避唐國諱改虎為武單音蟬大赦改元龍升置百官以其兄右地代為丞相封代公力俟提為大將軍封魏公叱干阿利為御史大夫封梁公弟阿利羅引為司𨽻校尉若門為尚書令叱以鞬為左僕射鞬居言翻乙斗為右僕射賀狄干久在長安常幽閉因習讀經史舉止如儒者及還魏主珪見其言語衣服皆類秦人以為慕而效之怒并其弟歸殺之秦王興以太子泓録尚書事秋七月戊戌朔日有食之汝南王遵之坐事死遵之亮之五世孫也汝南王亮死於楚王瑋之難癸亥燕王熙葬其后苻氏于徽平陵喪車髙大毁北門而出熙被髮徒跣步從二十餘里被皮義翻從才用翻甲子大赦初中衛將軍馮䟦及弟侍御郎素弗皆得罪於熙熙欲殺之䟦亡命山澤熙賦役繁數民不堪命數所角翻䟦素弗與其從弟萬泥謀曰吾輩還首無路還首自歸請罪也首式救翻不若因民之怨共舉大事可以建公侯之業事之不捷死未晚也遂相與乘車使婦人御潛入龍城匿於北部司馬孫護之家及熙出送葬䟦等與左衛將軍張興及苻進餘黨作亂䟦素與慕容雲善乃推雲為主雲以疾辭雲稱疾見上年䟦曰河間淫虐人神共怒此天亡之時也公髙氏名家何能為人養子為養子事見百九卷隆安元年而棄難得之運乎扶之而出䟦弟乳陳等帥衆攻𢎞光門帥讀曰率鼓噪而進禁衛皆散走遂入宫授甲閉門拒守中黄門趙洛生走告于熙熙曰䑕盜何能為朕當還誅之乃置后柩於南苑柩巨救翻收髮貫甲馳還赴難難乃旦翻夜至龍城攻北門不克宿於門外乙丑雲即天王位雲字子雨祖父髙和句麗之支庻慕容寳養以為子大赦改元正始熙退入龍騰苑尚方兵褚頭踰城從熙稱營兵同心效順唯俟軍至熙聞之驚走而出左右莫敢迫熙從溝下潛遁良久左右怪其不還相與尋之唯得衣冠不知所適中領軍慕容拔謂中常侍郭仲曰大事垂捷而帝無故自驚深可怪也然城内企遲遲直利翻待也至必成功不可稽留吾當先往趣城趣七喻翻卿留待帝得帝速來若帝未還吾得如意安撫城中徐迎未晚乃分將壯士二千餘人登北城將士謂熙至皆投仗請降將即亮翻降户江翻既而熙久不至㧞兵無後繼衆心疑懼復下城赴苑復扶又翻下復貳可復同遂皆潰去㧞為城中人所殺丙寅熙微服匿於林中為人所執送於雲雲數而殺之年二十三史言慕容熙淫虐天奪其魄身死國滅載記曰自垂至熙四世凡二十四年而滅數所具翻并其諸子雲復姓髙氏幽州刺史上庸公懿以令支降魏令音鈴又郎定翻支音祁魏以懿為平州牧昌黎王懿評之孫也前燕之亡慕容評之罪也魏主珪自濡源西如參合陂濡乃官翻乃還平城秃髪傉檀復貳於秦傉奴沃翻復扶又翻下同遣使邀乞伏熾磐熾磐斬其使送長安為秦襲傉檀張本使疏吏翻下同熾昌志翻南燕主超母妻猶在秦超遣御史中丞封愷使於秦以請之秦王興曰昔苻氏之敗太樂諸伎悉入于燕長安之陷太樂諸伎入于西燕西燕之亡慕容垂收以歸于中山中山之陷相率奔鄴由是南燕得之伎渠綺翻燕今稱藩送伎或送呉口千人所請乃可得也超與羣臣議之左僕射段暉曰陛下嗣守社稷不宜以私親之故遂降尊號且太樂先代遺音不可與也不如掠呉口與之尚書張華曰侵掠鄰國兵連禍結此既能往彼亦能來非國家之福也陛下慈親在人掌握豈可靳惜虚名不為之降屈乎靳居焮翻為于偽翻中書令韓範嘗與秦王俱為苻氏太子舍人若使之往必得如志超從之乃使韓範聘于秦稱藩奉表慕容凝言於興曰燕王得其母妻不可復臣宜先使送伎興乃謂範曰朕歸燕王家屬必矣然今天時尚熱當俟秋凉八月秦使貟外散騎常侍韋宗聘於燕超與羣臣議見宗之禮張華曰陛下前既奉表今宜北面受詔封逞曰大燕七聖重光自廆皝雋暐至垂徳超凡七主重直龍翻奈何一旦為豎子屈節超曰吾為太后屈願諸君勿復言為于偽翻復扶又翻遂北面受詔毛修之與漢嘉太守馮遷合兵擊楊承祖斬之修之欲進討譙縱益州刺史鮑陋不可修之上表言人之所以重生實有生理可保臣之情地生塗已竭謂其父瑾伯璩舉家為蜀人所滅修之欲致死復讐不復求生路也所以借命朝露者朝露易晞言不久生也庶憑天威誅夷讐逆今屢有可乘之機而陋每違期不赴臣雖効死冦庭而救援理絶將何以濟劉裕乃表襄城太守劉敬宣帥衆五千伐蜀晉氏南渡置襄城郡於江南仍領繁昌等縣孝武罷襄城郡為繁昌縣屬淮南僑郡今太平州繁昌縣即其地繁昌本漢潁川郡屬縣因僑立而是縣之名遂移于江南此襄城葢敬宣以舊郡僑領太守也帥讀曰率以劉道規為征蜀都督魏主珪如豺山宫候官告司空庾岳服飾鮮麗行止風采擬則人君候官見上卷元興三年珪收岳殺之北燕王雲以馮䟦為都督中外諸軍事開府儀同三司録尚書事馮萬泥為尚書令馮素弗為昌黎尹馮𢎞為征東大將軍孫護為尚書左僕射張興為輔國大將軍𢎞䟦之弟也九月譙縱稱藩於秦秃髪傉檀將五萬餘人伐沮渠蒙遜傉奴沃翻將即亮翻沮子余翻蒙遜與戰於均石大破之均石在張掖之東西陜之西蓋西郡界蒙遜進攻西郡太守楊統於日勒降之日勒縣漢屬張掖郡後分置西郡治日勒賢曰日勒故城在今甘州剛丹縣東南冬十月秦河州刺史彭奚念叛降於秃髮傉檀秦以乞伏熾磐行河州刺史熾昌志翻南燕主超使左僕射張華給事中宗正元獻太樂伎一百二十人於秦秦王興乃還超母妻厚其資禮而遣之超親帥六宫迎於馬耳闗伎渠綺翻帥讀曰率據水經濟南臺縣有馬耳山闗盧水出焉魏收地形志泰山郡䑓縣有馬耳山夏王勃勃破鮮卑薛千等三部薛千晉書載記作薛干蜀本作薛干降其衆以萬數降户江翻進攻秦三城已北諸戍斬秦將楊丕姚石生等諸將皆曰陛下欲經營闗中宜先固根本使人心有所憑係髙平山川險固土田饒沃可以定都勃勃曰卿知其一未知其二吾大業草創士衆未多姚興亦一時之雄諸將用命闗中未可圖也我今專固一城彼必并力於我衆非其敵亡可立待不如以驍騎風馳將即亮翻驍堅堯翻騎竒寄翻出其不意救前則擊後救後則擊前使彼疲於犇命我則游食自若不及十年嶺北河東盡為我有待興既死嗣子闇弱徐取長安在吾計中矣於是侵掠嶺北嶺北諸城門不晝啟興乃歎曰吾不用黄兒之言以至于此黄兒興弟邕小字也勃勃求婚於秃髮傉檀傉檀不許十一月勃勃帥騎二萬擊傉檀至于支陽枝陽縣漢屬金城郡晉張寔分屬廣武郡劉昫曰唐蘭州廣武縣漢枝陽縣杜佑曰唐會州會寧縣漢枝陽縣殺傷萬餘人驅掠二萬七千餘口牛馬羊數十萬而還還従宣翻又如字傉檀帥衆追之帥讀曰率焦朗曰勃勃天姿雄健御軍嚴整未可輕也不如從温圍北渡趣萬斛堆温圍水名水經河水北過武威温圍縣東北温圍其即漢之温圍縣歟趣七喻翻阻水結營扼其咽喉咽音烟百戰百勝之術也傉檀將賀連怒曰勃勃敗亡之餘烏合之衆奈何避之示之以弱宜急追之傉檀從之勃勃於陽武下峽鑿凌埋車以塞路凌力證翻氷也又閭承翻鑿氷塞路置兵死地使人自為戰塞悉則翻勒兵逆擊傉檀大破之追奔八十餘里殺傷萬計名臣勇將死者什六七將即亮翻傉檀與數騎犇南山漢書地理志武威郡蒼松縣有南山松陜予謂此南山自羌中連延西平金城之界東出秦雍至于終南皆此山也傉檀所奔枝陽之南山也㡬為追騎所得㡬居希翻騎竒寄翻勃勃積尸而封之號曰髑髏臺髑徒谷翻髏音婁勃勃又敗秦將張佛生于青石原敗補邁翻後漢書西羌傳安定有青石岸安定唐之涇州涇州有青石嶺俘斬五千餘人傉檀懼外冦之逼徙三百里内民皆入姑臧國人駭怨屠各成七兒因之作亂屠直於翻一夕聚衆至數千人殿中都尉張猛大言於衆曰主上陽武之敗蓋恃衆故也責躬悔過何損於明而諸君遽從此小人為不義之事殿中兵今至禍在目前矣衆聞之皆散七兒犇晏然追斬之軍諮祭酒梁裒輔國司馬邊憲等謀反傉檀皆殺之自是之後禿髪氏之勢日以衰矣魏主珪還平城十二月戊子武岡文恭侯王謐薨諡法既過能改曰恭是嵗西凉公暠以前表未報前奉表見上元年暠古老翻復遣沙門法泉間行奉表詣建康復扶又翻間古莧翻四年春正月甲辰以琅邪王徳文領司徒劉毅等不欲劉裕入輔政議以中領軍謝混為揚州刺史王謐薨揚州刺史缺官故議用其人或欲令裕於丹徒領揚州以内事付孟昶昶丑兩翻遣尚書右丞皮沈以二議諮裕皮姓也沈持林翻沈先見裕記室録事參軍劉穆之具道朝議朝直遙翻穆之偽起如厠密疏白裕曰皮沈之言不可從裕既見沈且令出外呼穆之問之穆之曰晉朝失政日久朝直遙翻下同天命已移公興復皇祚勲髙位重今日形勢豈得居謙遂為守藩之將耶將即亮翻劉孟諸公與公俱起布衣共立大義以取富貴事有先後故一時相推非為委體心服宿定臣主之分也分扶問翻力敵勢均終相吞噬後果如穆之之言揚州根本所係不可假人前者以授王謐事出權道見上卷元興三年今若復以他授復扶又翻下而復同便應受制於人一失權柄無由可得將來之危難可熟念今朝議如此宜相酧答必云在我措辭又難唯應云神州治本宰輔崇要治直吏翻此事既大非可懸論便蹔入朝共盡同異公至京邑彼必不敢越公更授餘人明矣裕従之朝廷乃徴裕為侍中車騎將軍開府儀同三司揚州刺史録尚書事徐兖二州刺史如故騎竒寄翻裕表解兖州以諸葛長民為青州刺史鎮丹徒劉道憐為并州刺史戍石頭庚申武陵忠敬王遵薨魏主珪如豺山宫遂至寗川寗川即後漢上谷郡之寗縣也前漢曰寧縣地理志曰于延水出代郡且如縣塞外東至寧入沽水經注曰于延水逕罡城南又東左與寧川水合水出小寧縣西北東南流注于延水又東逕小寗縣故城南地理志寧縣也師古曰且子如翻南燕主超尊其母段氏為皇太后妻呼延氏為皇后超祀南郊有獸如䑕而赤大如馬來至壇側須㬰大風晝晦羽儀帷幄皆毁裂賈公彦曰在旁曰帷四合象宫室曰幄超懼以問太史令成公綏對曰陛下信用姧佞誅戮賢良賦斂繁多事役殷重之所致也斂力贍翻超乃大赦黜公孫五樓等俄而復用之復扶又翻北燕主雲立妻李氏為皇后子彭城為太子三月庚申葬燕王熙及苻后于徽平陵諡熙曰昭文皇帝髙句麗遣使聘北燕且叙宗族雲本髙句麗支屬詳見一百九卷隆安元年使疏吏翻北燕王雲遣侍御史李㧞報之夏四月尚書左僕射孔安國卒甲午以吏部尚書孟昶代之昶丑兩翻北燕大赦五月北燕以尚書令馮萬泥為幽冀二州牧鎮肥如中軍將軍馮乳陳為并州牧鎮白狼前漢右北平郡有白狼縣師古曰有白狼山故以名縣後漢晉省縣魏收地形志曰世祖太平真君八年置建徳郡治白狼城其地屬唐營州栁城縣界撫軍大將軍馮素弗為司𨽻校尉司𨽻校尉務銀提為尚書令譙縱遣使稱藩於秦使疏吏翻又與盧循潛通縦上表請桓謙於秦欲與之共擊劉裕秦王興以問謙謙曰臣之累世著恩荆楚若得因巴蜀之資順流東下士民必翕然響應興曰小水不容巨魚若縦之才力自足辦事亦不假君以為鱗翼宜自求多福遂遣之謙至成都虚懐引士縱疑之置於龍格使人守之龍格蓋即今成都府廣都縣龍爪灘之地謙泣謂諸弟曰姚主之言神矣秦王興以秃髮傉檀外内多難時傉檀軍諮祭酒梁裒輔國司馬邊憲等謀反傉檀悉誅之晉書載記曰傉檀外有陽武之敗内有邊梁之亂難乃旦翻欲因而取之使尚書郎韋宗往覘之覘丑簾翻又丑艷翻傉檀與宗論當世大略縱横無窮縦子容翻宗退歎曰竒才英器不必華夏夏戸雅翻明智敏識不必讀書吾乃今知九州之外五經之表復自有人也傉檀之才辯内足以欺其父兄外足以欺敵人之覘國者而卒以敗亡者輕用兵也揆之於古蓋智伯瑶之流而才識又不及焉復扶又翻歸言於興曰涼州雖弊傉檀權譎過人未可圖也譎古宂翻興曰劉勃勃以烏合之衆猶能破之况我舉天下之兵以加之乎宗曰不然形移勢變返覆萬端蜀本作返復當従之陵人者易敗易以豉翻戒懼者難攻傉檀之所以敗於勃勃者輕之也今我以大軍臨之彼必懼而求全臣竊觀羣臣才略無傉檀之比者雖以天威臨之亦未敢保其必勝也興不聴使其子中軍將軍廣平公弼後軍將軍歛成鎮逺將軍乞伏乾歸帥步騎三萬襲傉檀左僕射齊難帥騎二萬討勃勃帥讀曰率下同吏部尚書尹昭諫曰傉檀恃其險逺故敢違慢不若詔沮渠蒙遜及李暠討之使自相困斃不必煩中國之兵也亦不聴興遺傉檀書曰遺于季翻今遣齊難討勃勃恐其西逸故令弼等於河西邀之傉檀以為然遂不設備弼濟自金城自金城濟河也姜紀言於弼曰今王師聲言討勃勃傉檀猶豫守備未嚴願給輕騎五千騎竒寄翻掩其城門則山澤之民皆為吾有孤城無援可坐克也弼不從進至漠口漠口在昌松郡界謂之昌松漠口魏收地形志昌松郡有漠口縣昌松太守蘇霸閉城拒之弼遣人諭之使降霸曰汝棄信誓而伐與國吾有死而已何降之有降户江翻弼進攻斬之長驅至姑臧傉檀嬰城固守出竒兵擊弼破之弼退據西苑城中人王鍾等謀為内應事洩傉檀欲誅首謀者而赦其餘前軍將軍伊力延侯曰今彊冦在外而姧人竊發於内危孰甚焉不悉阬之何以懲後傉檀從之殺五千餘人命郡縣悉散牛羊于野斂成縦兵鈔掠鈔楚交翻傉檀遣鎮北大將軍俱延鎮軍將軍敬歸等擊之秦兵大敗斬首七千餘級傉檀散牛羊以餌敵而斂成掠之宜其敗也姚弼固壘不出傉檀攻之未克秋七月興遣衛大將軍常山公顯帥騎二萬為諸軍後繼至髙平聞弼敗倍道赴之顯遣善射者孟欽等五人挑戰於凉風門挑徒了翻弦未及發傉檀材官將軍宋益等迎擊斬之顯乃委罪歛成遣使謝傉檀慰撫河外引兵還傉檀遣使者徐宿詣秦謝罪使疏吏翻夏王勃勃聞秦兵且至退保河曲河曲在朔方東北黄河千里一曲齊難以勃勃既逺縱兵野掠勃勃潛師襲之俘斬七千餘人難引兵退走勃勃追至木城禽之虜其將士萬三千人於是嶺北夷夏附於勃勃者以萬數夏户雅翻勃勃皆置守宰以撫之姚弼之敗秃髮未能為秦患也齊難之敗則赫連之患熾矣司馬叔璠自蕃城冦鄒山璠孚袁翻蕃音皮又音反讀曰翻魯郡太守徐邕棄城走車騎長史劉鍾擊却之北燕王雲封慕容歸為遼東公使主燕祀劉敬宣既入峽所謂三峽也遣巴東太守温祚以二千人出外水自帥益州刺史鮑陋輔國將軍文處茂龍驤將軍時延祖由墊江轉戰而前帥讀曰率處昌吕翻驤思將翻此由内水而進也墊音疊譙縱求救于秦秦王興遣平西將軍姚賞南梁州刺史王敏將兵二萬赴之敬宣軍至黄虎去成都五百里黄虎近涪城縱輔國將軍譙道福悉衆拒嶮相持六十餘日敬宣不得進食盡軍中疾疫死者大半乃引軍還還従宣翻又如字敬宣坐免官削封三分之一荆州刺史劉道規以督統降號建威將軍春秋責帥之義也道規時為征蜀都督九月劉裕以敬宣失利請遜位詔降為中軍將軍開府如故劉毅欲以重法繩敬宣裕保護之何無忌謂毅曰奈何以私憾傷至公私憾見上元年毅乃止乞伏熾磐以秦政浸衰且畏秦之攻襲熾昌志翻冬十月招結諸部二萬餘人築城于嵻㟍山而據之下度曰嵻㟍山在西𦍑予據乞伏氏據苑川其地西至枹罕東極隴坻北限赫連南界吐谷渾嵻㟍山當在苑川西南宋朝西境盡秦渭嵻㟍山始在西𦍑中嵻丘岡翻㟍盧當翻十一月秃髪傉檀復稱涼王大赦改元嘉平置百官立夫人折掘氏為王后世子武臺為太子録尚書事武臺本名虎臺唐人作晉書避唐祖諱改虎為武通鑑因之左長史趙鼂右長史郭倖為尚書左右僕射鼂古朝字音直遙翻昌松侯俱延為太尉南燕汝水竭汝當作女河凍皆合而澠水不氷水經注澠水出營城東西北流入時水營城即臨淄城時水通有澠水之名亦謂之時澠水時水東北入淄水淄水又東北合濁水濁水東北流逕廣固城西濁水亦或通名之為澠水昔趙攻廣固望氣者以為澠水帶城非可攻拔若塞五龍口城必當陷指是水也澠神陵翻南燕主超惡之問於李宣對曰澠水無氷良由逼帶京城近日月也惡烏路翻近其靳翻超大悦賜朝服一具朝直遙翻十二月乞伏熾磐攻彭奚念於枹罕為奚念所敗而還枹音膚敗補邁翻還從宣翻又如字是嵗魏主珪殺髙邑公莫題初拓跋窟咄之伐珪也見一百六卷孝武大元十一年題以珪年少少詩沼翻潛以箭遺窟咄曰三嵗犢豈能勝重載邪遺干季翻勝音升載才再翻珪心銜之至是或告題居處倨傲擬則人主者珪使人以箭示題而謂之曰三嵗犢果如何題父子對泣詰朝收斬之處昌吕翻詰去吉翻資治通鑑卷一百十四
