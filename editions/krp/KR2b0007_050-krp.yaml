front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷五十宋司馬光撰胡三省音註漢紀四十二起柔兆執徐盡閼逢困敦凡九年孝安皇帝中元初三年春正月蒼梧鬰林合浦蠻夷反三郡皆屬交州二月遣侍御史任逴督州郡兵討之任音壬賢曰逴音丁角翻又音卓郡國十地震三月辛亥日有食之夏四月京師旱五月武陵蠻反州郡討破之癸酉度遼將軍鄧遵率南單于擊零昌於靈州范書匈奴傳曰自置度遼將軍以來皆權行其事獨遵以皇太后從弟為真將軍此後更無行將軍者志云度遼將軍銀印青綬秩二千石靈州縣屬北地郡賢曰在今慶州馬嶺縣西北零音憐斬首八百餘級越嶲徼外夷舉種内屬嶲音髓徼吉弔翻種章勇翻六月中郎將任尚任音壬遣兵擊破先零羌於丁奚城零音憐秋七月武陵蠻復反復扶又翻州郡討平之九月築馮翊北界候塢五百所以備羌馮翊北界接安定北地冬十一月蒼梧鬰林合浦蠻夷降降户江翻舊制公卿二千石刺史俱不行三年䘮司徒劉愷以為非所以師表百姓宣羙風俗丙戌初聼大臣行三年䘮賢曰文帝遺詔以日易月於後大臣遂以為常至此復遵古制癸夘郡國九地震十二月丁己任尚遣兵擊零昌於北地殺其妻子燒其廬舎斬首七百餘級羌勢自此衰矣四年春二月乙己朔日有食之乙夘赦天下壬戌武庫災任尚遣當闐種羌榆鬼等刺殺杜季貢闐徒賢翻種章勇翻刺七亦翻下同封榆鬼為破羌侯司空袁敞亷勁不阿權貴失鄧氏㫖尚書郎張俊有私書與敞子俊怨家封上之怨於元翻上時掌翻夏四月戊申敞坐䇿免自殺俊等下獄當死下遐稼翻俊上書自訟臨刑太后詔以減死論己巳遼西鮮卑連休等入冦休考異曰范書鮮卑傳上作連下作休連今從上文按遼西郡在雒陽東北三千三百里賢曰遼西郡故城在今平州東陽樂城是郡兵與烏桓大人於秩居等共擊大破之斬首千三百級六月戊辰三郡雨雹雨于具翻尹就坐不能定益州徴扺罪以益州刺史張喬領其軍屯招誘叛羌稍稍降散誘音酉降户江翻秋七月京師及郡國十雨水九月䕶羌校尉任尚復募効功種羌號封刺殺零昌復扶又翻封號封為羗王冬十一月己夘彭城靖王恭薨越嶲人以郡縣賦歛煩數嶲音髓歛力瞻翻數所角翻十二月大牛種封離等反殺遂乆令遂乆縣屬越嶲郡賢曰遂乆故縣在今靡州界考異曰西南夷𫝊云五年叛今從帝紀甲子任尚與騎都尉馬賢共擊先零羌狼莫追至北地相持六十餘日戰於富平河上大破之范書帝紀作富平上河西羌𫝊作河上賢曰富平縣屬北地郡故城在今靈州回樂縣西南余按水經河水東北逕安定郡眴卷縣故城西注曰地理志河水别出為河溝東至富平北入河河水於此有上河之名前漢馮參為上河典農都尉則上河為是宋白曰唐靈州即漢富平縣之地杜佑曰漢富平今靈州廻樂縣應劭曰眗音旬日之旬卷音箘簬之箘斬首五千級狼莫逃去於是西河䖍人種羌萬人詣鄧遵降隴右平狼莫者零昌之謀主零昌既死而狼莫敗逃䖍人羌失援而降故隴右平降户江翻是嵗郡國十三地震五年春三月京師及郡國五旱夏六月髙句驪與濊貊冦𤣥菟句如字又音駒驪力知翻濊音穢貊莫百翻菟同都翻永昌益州蜀郡夷皆叛應封離衆至十餘萬破壊二十餘縣壊音怪殺長吏焚掠百姓骸骨委積千里無人秋八月丙申朔日有食之代郡鮮卑入冦殺長吏云考異曰獨行𫝊元初中鮮卑數百餘騎冦漁陽太守張顯率吏士追出塞遥望虜營煙火急趣之兵馬掾嚴授慮有伏兵苦諫止不聼顯䠞令進授不獲已前戰伏兵發授身被十創沒于陳顯㧞刃追散兵不能制虜射中顯主簿衛福功曹徐咸遽趣之顯遂墮馬福以身擁蔽虜并殺之朝廷愍授等節詔書褒歎厚加賞賜按元初凡六年鮮卑不曽犯漁陽殺長吏惟是入代郡曽殺長吏今疑漁陽本是代郡史之誤也余按張顯事通鑑已書于上卷殤帝延平元年從范書帝紀也發縁邉甲卒黎陽營兵屯上谷以備之冬十月鮮卑冦上谷攻居庸關郡國志居庸縣屬上谷郡新唐志幽州昌平縣西北三十五里有納欵關即居庸故關復發縁邉諸郡黎陽營兵積射士歩騎二萬人復扶又翻屯列衝要鄧遵募上郡全無種羌雕何刺殺狼莫刺七亦翻封雕何為羌侯自羌叛十餘年間永初元年羌叛至是年凡十二年軍旅之費凡用二百四十餘億府帑空竭邊民及内郡死者不可勝數帑它朗翻勝音升并凉二州遂至虚耗及零昌狼莫死零音憐諸羌瓦解三輔益州無復冦警詔封鄧遵為武陽侯邑三千户東郡有東武陽㤗山郡有南武陽鄧隲𫝊又作舞陽遵以太后從弟故爵封優大任尚與遵争功又坐詐增首級受賕枉法贓千萬已上十二月檻車徴尚棄市沒入財物鄧隲子侍中鳯嘗受尚馬隲髠妻及鳯以謝罪隲職日翻是嵗郡國十四地震太后弟悝閶皆卒封悝子廣宗為葉侯閶子忠為西華矦葉縣屬南陽郡西華縣屬汝南郡悝苦回翻閶音昌葉式渉翻六年春二月乙巳京師及郡國四十二地震夏四月沛國勃海大風雨雹雨于具翻五月京師旱六月丙戌平原哀王得薨無子秋七月鮮卑冦馬城塞殺長吏馬城縣屬代郡賢曰搜神記昔秦人築城于武周塞以備胡將成而崩者數矣有馬馳走周旋反覆父老異之因依以築城城乃不崩遂以名焉其故城則今之朔州也余按續漢志搜神記所云乃鴈門郡之馬邑此乃代郡之馬城賢誤度遼將軍鄧遵及中郎將馬續率南單于追擊大破之九月癸巳陳懐王竦薨無子國除竦陳王羡之孫冬十二月戊午朔日有食之既郡國八地震是嵗太后徴和帝弟濟北王夀河間王開子男女年五嵗以上四十餘人濟子禮翻及鄧氏近親子孫三十餘人並為開邸第賢曰蒼頡篇曰邸舎也為于偽翻教學經書躬自監試監工銜翻詔從兄河南尹豹越騎校尉康等曰末世貴戚食禄之家温衣羡飯乘堅驅良賢曰堅謂好車良謂善馬余按此語出史記范蠡𫝊從才用翻而靣牆弗學不識臧否尚書曰不學牆靣言正牆靣而立無所見也否音鄙斯故禍敗之所從來也豫章有芝草生太守劉祗欲上之上時掌翻以問郡人唐檀檀曰方今外戚豪盛君道微弱斯豈嘉瑞乎祇乃止益州刺史張喬遣從事楊竦將兵至楪榆楪榆縣武帝開置屬益州郡有葉榆澤正縣東因名明帝分屬永昌郡楪與葉同擊封離等大破之斬首三萬餘級獲生口千五百人封離等惶怖斬其同謀渠帥詣竦乞降怖普布翻帥所類翻降户江翻下同竦厚加慰納其餘三十六種皆來降附種章勇翻竦因奏長吏姦猾侵犯蠻夷者九十人皆減死論初西域諸國既絶於漢事見上卷永初元年北匈奴復以兵威役屬之役使而臣屬之復扶又翻下同與共為邉冦敦煌太守曹宗患之敦徒門翻乃上遣行長史索班將千餘人屯伊吾以招撫之索姓出敦煌又左𫝊啇人七族有索氏上時掌翻索昔各翻上遣索班奏而遣之也行長史者行長史事未為真也於是車師前王及鄯善王復來降鄯正扇翻初疏勒王安國死無子國人立其舅子遺腹為王遺腹叔父臣磐在月氏月氏納而立之西域𫝊曰元初中安國以舅臣磐冇罪徙於月氏月氏王親愛之遺腹既立月氏遣兵送臣磐還疏勒國人素敬愛臣盤又畏憚月氏即共奪遺腹印綬迎臣磐立以為王氏音支後莎車畔于窴屬疏勒自明帝永平四年莎車屬于窴疏勒遂彊與龜兹于窴為敵國焉永寧元年是年夏四月改元春三月丁酉濟北惠王夀薨濟子禮翻北匈奴率車師後王軍就共殺後部司馬及敦煌長史索班等賢曰司馬即屬戊巳校尉所統也和帝時置戊巳校尉鎮車師後部考異曰班勇𫝊元初六年曹宗遣索班屯伊吾後數月北單于與車師後部共攻沒索班按本紀永寧元年車師後王叛殺部司馬車師𫝊亦曰永寧元年後王軍就及母沙麻反畔殺部司馬及敦煌行事葢班以去年末屯伊吾今春見殺或今春奏事方到也遂擊走其前王畧有北道鄯善逼急求救於曹宗鄯上扇翻宗因此請出兵五千人擊匈奴以報索班之耻因復取西域公卿多以為宜閉玉門關絶西域太后聞軍司馬班勇有父風召詣朝堂問之班固西都賦曰左右廷中朝堂百僚之位朝堂葢在殿庭左右朝直遥翻勇上議曰昔孝武皇帝患匈奴彊盛於是開通西域論者以為奪匈奴府蔵上時掌翻蔵徂浪翻斷其右臂斷丁亂翻光武中興未遑外事故匈奴負彊驅率諸國及至永平再攻敦煌敦徒門翻河西諸郡城門晝閉孝明皇帝深惟廟䇿惟思也賢曰古者謀事必就祖故言廟䇿也余謂古者遣將必於廟先定制勝之䇿故謂之廟䇿乃命虎臣出征西域虎臣謂其父超也故匈奴逺遁邉境得安及至永元莫不内屬㑹閒者羌亂西域復絶復扶又翻北虜遂遣責諸國備其逋租髙其價直嚴以期㑹備償也西域屬漢之後不復以馬畜旃罽輸匈奴及與漢絶匈奴復遣使責其積年所逋逋欠也鄯善車師皆懐憤怨思樂事漢樂音洛其路無從前所以時有叛者皆由牧飬失宜還為其害故也今曹宗徒耻于前負欲報雪匈奴負敗也報雪謂報伊吾之役雪索班之耻也而不尋出兵故事未度當時之宜也度徒洛翻夫要功荒外萬無一成要一遥翻荒外謂在荒服之外若兵連禍結悔無所及况今府藏未充藏徂浪翻師無後繼是示弱於逺夷暴短於海内臣愚以為不可許也舊敦煌郡有營兵三百人今宜復之復置䕶西域副校尉居於敦煌如永元故事校户教翻又宜遣西域長史將五百人屯樓蘭西樓蘭即鄯善當焉耆龜兹徑路南彊鄯善于窴心膽北扞匈奴東近敦煌如此誠便龜兹音丘慈窴徒賢翻尚書復問勇利害云何勇既上議尚書復問使悉陳其利害復扶又翻勇對曰昔永平之末始通西域初遣中郎將居敦煌謂鄭衆也後置副校尉於車師謂耿恭關寵也既為胡虜節度又禁漢人不得有所侵擾故外夷歸心匈奴畏威今鄯善王尤還漢人外孫若匈奴得志則尤還必死賢曰尤還鄯善王名此等雖同鳥獸亦知避害若出屯樓蘭足以招附其心愚以為便此勇所謂利也長樂衛尉鐔顯類篇鐔如心翻姓也賢曰鐔音徒南翻唐韻又音尋廷尉綦母參綦母姓也左𫝊晉有綦母張司𨽻校尉崔據難曰難乃旦翻下同朝廷前所以棄西域者以其無益於中國而費難供也今車師已屬匈奴鄯善不可保信一旦反覆班將能保北虜不為邉害乎賢曰以勇為軍司馬故以將言之將音即亮翻勇對曰今中國置州牧者以禁郡縣姦猾盗賊也若州牧能保盗賊不起者臣亦願以要斬保匈奴之不為邉害也要讀曰腰令通西域則虜埶必弱虜埶弱則為患微矣孰與歸其府蔵續其斷臂哉今置校尉以扞撫西域設長史以招懐諸國若棄而不立則西域望絶望絶之後屈就北虜縁邉之郡將受困害恐河西城門必將復有晝閉之儆矣明帝永平中北匈奴脅諸國共冦河西郡縣城門晝閉復扶又翻下同今不廓開朝廷之徳而拘屯戍之費若此北虜遂熾豈安邉乆長之䇿哉此勇所謂害也熾尺志翻太尉屬毛軫難曰今若置校尉則西域絡繹遣使求索無厭索山客翻厭於鹽翻百官志太尉掾屬二十四人東西曹掾比四百石餘掾比三百石屬比二百石與之則費難供不與則失其心一旦為匈奴所廹當復求救則為役大矣勇對曰今設以西域歸匈奴而使其恩徳大漢不為鈔盗則可矣鈔楚交翻如其不然則因西域租入之饒兵馬之衆以擾動縁邉是為富仇讐之財增暴夷之埶也置校尉者宣威布徳以擊諸國内向之心而疑匈奴覬覦之情覬音冀覦音俞而無費財耗國之慮也且西域之人無他求索其來入者不過稟食而已稟筆錦翻給也食讀曰飤今若拒絶埶歸北屬夷虜言其事埶所歸必至北屬匈奴并力以冦并凉則中國之費不止十億置之誠便於是從勇議復敦煌郡營兵三百人置西域副校尉居敦煌雖復覊縻西域然亦未能出屯謂未能如勇計出屯樓蘭西也然使盡行勇之計亦未必能羈制西域何者武帝通西域未能盡臣屬西域也及宣帝時日逐降呼韓邪内附始盡得西域明帝使班超通西域未能盡臣屬西域也及竇憲破北匈奴超始盡得西域今漢内困于諸羌而北匈奴游魂蒲類安能以五百人成功哉其後匈奴果數與車師共入冦鈔河西大被其害數所角翻鈔楚交翻被皮義翻沈氐羌寇張掖賢曰沈氏羌號也續漢書曰羌在上郡西河者號沈氐夏四月丙寅立皇子保為太子改元赦天下己巳紹封陳敬王子崇為陳王濟北惠王子萇為樂成王濟子禮翻河間孝王子翼為平原王六月䕶羌校尉馬賢將萬人討沈氐羌於張掖破之斬首千八百級獲生口千餘人餘虜悉降降户江翻時當煎等大豪飢五等以賢兵在張掖乃乘虚冦金城賢還軍出塞斬首數千級而還燒當燒何種聞賢軍還復冦張掖殺長吏馬賢於時為徤鬬然觀其往來奔命羌人輒議其後賢不思所以制之之術重以不恤軍事宜其冇射姑山之敗也還從宣翻又如字種章勇翻復扶又翻長知兩翻秋七月乙酉朔日有食之冬十月己巳司空李郃免郃古合翻又曷閤翻癸酉以衛尉廬江陳褒為司空京師及郡國三十三大水十二月永昌徼外撣國王雍曲調遣使者獻樂及幻人西南夷𫝊幻人能變化吐火自支觧易牛馬頭自言我海西人海西即大秦也今按大秦即武帝時犁靬國今謂之拂菻撣音檀范書雍曲調作雍由調徼吉弔翻戊辰司徒劉愷請致仕許之以千石禄歸飬遼西鮮卑大人烏倫其至鞬各以其衆詣度遼將軍鄧遵降烏倫其至鞬二人也鞬居言翻癸酉以太常楊震為司徒是嵗郡國二十三地震太后從弟越騎校尉康以太后乆臨朝政宗門盛滿數上書太后從才用翻上元初六年書從兄康此書從弟徴諸范史當從兄字數所角翻上時掌翻以為宜崇公室自損私權言甚切至太后不從康謝病不朝太后使内侍者問之所使者乃康家先婢先本康家婢後入宫在大后左右自通中大人時宫中耆宿皆稱中大人康聞而詬之賢曰詬罵也音許遘翻又古候翻婢怨恚恚於避翻還白康詐疾而言不遜太后不怒免康官遣歸國康永初中紹封夷安侯絶屬籍初當煎種飢五同種大豪盧怱忍良等千餘户種章勇翻下同别留允街而首施兩端賢曰首施猶首䑕也允音鉛建光元年是年七月改元遼考異曰陳禪𫝊曰北匈奴入遼東追拜禪東大守胡憚其威彊退還數百里禪不加兵但遣吏卒往曉慰之單于隨使還郡禪於學行禮為説道義以感化之單于懐服遺以胡中珍貨而去當在此年矣又按北單于漢朝所不能臣未嘗入朝天子安肯見遼東太守此事可疑今不取余按和帝以來北匈奴益西徙自代郡以東至遼東塞外之地皆鮮卑烏桓居之北單于安能至遼東邪不取當也春䕶羌校尉馬賢召盧怱斬之因放兵擊其種人獲首虜二千餘忍良等皆亡出塞幽州刺史巴郡馮煥𤣥菟太守姚光遼東太守蔡諷等將兵擊髙句驪髙句麗王宫遣子遂成詐降而襲𤣥菟遼東殺傷二千餘人菟同都翻句如字又音駒麗讀曰驪力知翻降户江翻二月皇太后寢疾癸亥赦天下三月癸巳皇太后鄧氏崩未及大斂帝復申前命歛力贍翻復扶又翻下同封鄧隲為上蔡侯位特進封隲事見上卷永初元年丙午葬和熹皇后范曄曰漢世皇后無謚皆因帝謚以為稱雖吕氏專政上官臨制亦無殊號中興明帝始建光烈之稱其後並以徳為配至于賢愚優劣混同一貫故馬竇二后俱稱徳焉其餘皇帝之庶母及蕃王承統以追尊之重特為其號恭懐孝崇之比是也初平中蔡邕始追正和熹之諡其安思順烈以下皆依而加焉賢注云蔡邕集諡議曰漢世母后無諡明帝始建光烈之稱是後轉因帝號加之以徳上下優劣混而為一違禮大行受大名小行受小名之制謚法冇功安民曰熹帝后一體禮亦宜同大行皇大后宜為和熹太后自臨朝以來水旱十載載子亥翻四夷外侵盗賊内起每聞民飢或逹旦不寐躬自減徹謂減膳徹樂之類以救災戹故天下復平嵗還豐穰和熹臨朝之政可謂牝雞之晨唯家之索矣上始親政事尚書陳忠薦隠逸及直道之士潁川杜根平原成翊世之徒上皆納用之忠寵之子也初鄧太后臨朝根為郎中與同時郎上書言帝年長宜親政事長知兩翻太后大怒皆令盛以縑囊於殿上撲殺之盛時征翻撲普卜翻蜀本弼角翻既而載出城外根得蘇太后使人檢視根遂詐死三日目中生蛆蛆子余翻凡蠅所集其遺子之處生為蛆因得逃竄為宜城山中酒家保積十五年宜城縣屬南郡賢曰宜城故城在今襄州率道縣南其地出羙酒廣雅云保使也言為人傭力保任而使也成翊世以郡吏亦坐諌太后不歸政抵罪帝皆徴詣公車拜根侍御史翊世尚書郎為諸鄧得罪張本或問根曰往者遇禍天下同義天下之士以根直諫遇禍同義之也知故不少少詩沼翻何至自苦如此根曰周旋民間非絶跡之處邂逅發露邂逅不期而㑹謂出於意料之外也禍及親知故不為也申屠蟠絶跡梁碭祖根之故智也戊申追尊清河孝王曰孝徳皇皇妣左氏曰孝徳后祖妣宋貴人曰敬隠后尊其所自出也謚法執義行善曰徳綏柔士民曰徳不顯尸國曰隠見羙堅長曰隠初長樂太僕蔡倫受竇后諷㫖誣䧟宋貴人事見四十六卷章帝建初七年樂音洛帝敇使自致廷尉倫飲藥死自致廷尉者使其自詣獄夏四月高句麗復與鮮卑入冦遼東蔡諷追擊於新昌戰歿新昌縣屬遼東郡功曹掾龍瑞兵馬掾公孫酺以身扞諷俱歿於陳范書東夷𫝊作功曹耿耗兵馬掾龍端酺音蒲陳讀曰陣丁巳尊帝嫡母耿姬為甘陵大貴人郡國志清河郡厝縣帝改名甘陵賢曰甘陵孝徳皇之陵也因以為縣在今貝州清河縣東宋白曰貝州清河縣本周甘泉氏之地秦漢為信城縣後漢為厝縣桓帝改為甘陵故城在今縣西北清河王慶陵在今清河郡東南三十里故厝城甲子樂成王萇坐驕滛不法貶為蕪湖侯范書紀𫝊皆作臨湖侯賢曰臨湖縣屬廬江郡己巳令公卿下至郡國守相各舉有道之士一人尚書陳忠以詔書既開諌争争讀曰諍慮言事者必多激切或致不能容乃上疏豫通廣帝意曰臣聞仁君廣山藪之大賢曰左氏𫝊曰川澤納汙山藪藏疾瑾瑜匿瑕國君含垢天之道也納切直之謀忠臣盡謇諤之節不畏逆耳之害易曰王臣蹇蹇晉王豹𫝊作謇史記趙簡子曰衆人之唯唯不如周舍之諤諤家語孔子曰忠言逆耳而利於行也是以高祖舍周昌桀紂之譬周昌嘗燕入奏事髙祖方擁戚姬昌還走帝逐得騎昌項問曰我何如主昌仰曰陛下即桀紂之主上笑自是心憚昌舍讀曰捨孝文喜袁盎人豕之譏事見十三卷文帝二年武帝納東方朔宣室之正事見十八卷武帝元光五年元帝容薛廣徳自刎之切事見二十八卷元帝永光元年刎武粉翻今明詔崇高宗之徳推宋景之誠引咎克躬咨訪羣吏時詔公卿百僚各上封事言事者見杜根成翊世等新䝉表録顯列二臺賢曰謂根為侍御史翊世為尚書郎也余按漢制尚書御史皆曰臺必承風響應争為切直若嘉謀異䇿宜輒納用如其管穴妄有譏刺賢曰管穴言小也史記扁鵲曰若以管窺天以隙視文隙即穴也雖苦口逆耳不得事實且優游寛容以示聖朝無諱之羙若有道之士對問高者宜垂省覽省悉景翻特遷一等以廣直言之路書御御進也書御書進而經覽也有詔拜有道高第士沛國施延為侍中冇道高第舉有道對問為上第也姓譜魯大夫施伯出於魯惠公之子子尾字施父初汝南薛包少有至行父娶後妻而憎包分出之包日夜號泣不能去少詩照翻行下孟翻號户刀翻至被敺扑以敲扑敺之也扑普卜翻不得已廬於舎外旦入洒掃洒所賣翻掃素報翻又並如字父怒又逐之乃廬於里門晨昏不廢不廢定省之禮也積嵗餘父母慙而還之及父母亡弟子求分財異居包不能止乃巾分其財奴婢引其老者曰與我共事久若不能使也若汝也田廬取其荒頓者賢曰頓猶廢也曰吾少時所治意所戀也治直之翻器物取朽敗者曰我素所服食身口所安也弟子數破其産輒復賑給數所角翻復扶又翻帝聞其名令公車特徴特獨也獨徴之當時無與並者至拜侍中包以死自乞有詔賜告歸加禮如毛義毛義事見四十六卷章帝元和元年帝少號聰明故鄧太后立之及長多不徳少詩沼翻長知兩翻稍不可太后意言意不以為可也帝乳母王聖知之太后徴濟北河間王子詣京師濟子禮翻河間王子翼羙容儀太后竒之以為平原懐王後留京師王聖見太后久不歸政慮有廢置常與中黄門李閏江京候伺左右共毁短太后於帝帝每懐忿懼伺相吏翻及太后崩宫人先有受罰者懐怨恚恚於避翻因誣告太后兄弟悝宏閶先從尚書鄧訪取廢帝故事謀立平原王帝聞追怒令有司奏悝等大逆無道遂廢西平侯廣宗葉侯廣徳西華侯忠陽安侯珍都鄉侯甫徳皆為庶人忠閶之子珍悝兄京之子西華陽安二縣皆屬汝南郡悝苦回翻閶音昌葉式渉翻鄧隲以不與謀但免特進遣就國與讀曰豫宗族免官歸故郡鄧氏故南陽人沒入隲等貲財田宅徙鄧訪及家屬於逺郡郡縣廹逼廣宗及忠皆自殺又徙封隲為羅侯羅縣屬長沙郡五月庚辰隲與子鳯並不食而死隲從弟河南尹豹度遼將軍舞陽侯遵將作大匠暢皆自殺從才用翻唯廣徳兄弟以母與閻后同産得留京師復以耿䕫為度遼將軍徴樂安侯鄧康為太僕按范書鄧禹𫝊明帝分禹國為三封其三子季子珍為夷安侯康以珍之子紹封樂安當在夷安郡國志夷安高宻二縣皆屬北海國賢曰夷安故城今高宻縣外城丙申貶平原王翼為都鄉侯遣歸河間翼謝絶賔客閉門自守由是得免初鄧后之立也見四十八卷和帝永元十四年太尉張禹司徒徐防欲與司空陳寵共奏追封后父訓寵以先世無奏請故事争之連日不能奪及訓追加封諡禹防復約寵俱遣子奉禮於虎賁中郎將隲寵不從故寵子忠不得志於鄧氏隲等敗忠為尚書數上疏䧟成其惡寵之所守是也忠之所為非也復扶又翻數所角翻大司農京兆朱寵痛隲無罪遇禍乃肉袒輿櫬櫬初覲翻賢曰襯親身棺上疏曰伏惟和熹皇后聖善之徳為漢文母賢曰詩凱風曰母氏聖善文母文王之母太任也寵言太后有聖善之徳比於文母也兄弟忠孝同心憂國社稷是頼賢曰殤帝崩大后與隲定立安帝故曰是頼功成身退讓國遜位歴世貴戚無與為比當享積善履謙之祐賢曰易曰積善之家必有餘慶又曰鬼神害盈而福謙而横為宫人單辭所䧟兩造不備又無徴左者為單辭横户孟翻利口傾險反亂國家論語曰惡利口之覆邦家者罪無申證獄不訊鞠賢曰申明白也訊問也鞠窮也遂令隲等罹此酷䧟一門七人並不以命賢曰七人謂隲從弟豹遵暢隲子鳯鳯從弟廣宗忠也屍骸流離寃魂不反逆天感人率土䘮氣䘮息浪翻宜收還冢次寵樹遺孤奉承血祀以謝亡靈賢曰血祀謂祭廟殺牲取血以降神也寵知其言切自致廷尉陳忠復劾奏寵詔免官歸田里劾户概翻又户得翻衆庶多為隲稱枉者復扶又翻為于偽翻帝意頗悟乃譴讓州郡賢曰以逼迫廣宗等故也還葬隲等於北芒賢曰北芒山在雒陽城北諸從兄弟皆得歸京師從才用翻帝以耿貴人兄牟平侯寳監羽林左軍車騎羽林分左右監各主左右騎寳監古銜翻封宋楊四子皆為列侯宋氏為卿校侍中大夫謁者郎吏十餘人校户教翻閻皇后兄弟顯景耀並為卿校典禁兵卿校九卿及諸校尉也於是内寵始盛帝以江京嘗迎帝於邸謂延平元年迎帝於清河邸也以為京功封都鄉侯封李閏為雍鄉侯閏京並遷中常侍京兼大長秋與中常侍樊豐黄門令劉安鈎盾令陳達百官志黄門令主省中諸宦者鉤盾令典諸近地苑囿游觀之處皆宦者為之盾食尹翻及王聖聖女伯榮扇動内外競為侈虐伯榮出入宫掖𫝊通姦賂司徒楊震上疏曰臣聞政以得賢為本治以去穢為務治直吏翻去羌吕翻是以唐虞俊乂在官四凶流放見尚書孔安國曰俊乂俊徳能治之士馬融曰千人曰俊百人曰乂天下咸服以致雍熈雍和也熈亦和也方今九徳未事賢曰尚書臯陶謨曰亦行有九徳寛而栗柔而立愿而恭亂而敬擾而毅直而温簡而亷剛而塞彊而義又曰九徳咸事俊乂在官孔安國曰使九徳之人皆用事嬖倖充庭諡曰賤而得愛曰嬖阿母王聖出自賤微得遭千載載子亥翻奉飬聖躬雖有推燥居溼之勤孝經援神契曰母之於子也鞠飬殷勤推燥居溼絶少分甘也推吐雷翻前後賞惠過報勞苦而無厭之心不知紀極外交屬託厭於鹽翻屬之欲翻擾亂天下損辱清朝塵㸃日月朝直遥翻夫女子小人近之喜逺之怨實為難飬論語曰唯女子與小人為難飬也近之則不遜逺之則怨近其靳翻逺于願翻宜速出阿母令居外舎斷絶伯榮莫使往來斷丁管翻令恩徳兩隆上下俱羙奏御帝以示阿母等内倖皆懐忿恚恚於避翻而伯榮驕滛尤甚通於故朝陽侯劉䕶從兄瓌瓌遂以為妻官至侍中得襲䕶爵賢曰䕶泗水王歙之從曾孫朝陽縣屬南郡故城在今鄧州穰縣南今謂之朝城從才用翻瓌古回翻震上疏曰經制父死子繼兄亡弟及以防篡也賢曰公羊𫝊曰劉子單子以王猛入于王城者何西周也其言入何簒亂也冬十月王子猛卒此未踰年之君其稱王子猛卒何不予當也不予當者不予當父死子繼兄亡弟及也伏見詔書封故朝陽侯劉䕶再從兄瓌襲䕶爵為侯從才用翻䕶同産弟威今猶見在見賢遍翻臣聞天子專封封有功諸侯専爵爵有徳今瓌無它功行行下孟翻但以配阿母女一時之間既位侍中又制封侯不稽舊制不合經義行人喧譁百姓不安陛下宜鑒鏡既往順帝之則尚書廣陵翟酺范書列𫝊酺廣漢雒人陵當作漢廣漢郡屬益州翟直格翻酺音蒲上疏曰昔竇鄧之寵傾動四方兼官重紱重直龍翻盈金積貨至使議弄神器賢曰神器謂天位也老子曰天下神器不可為也余謂威福人主之神器此言弄威福耳改更社稷更工衡翻豈不以埶尊威廣以致斯患乎及其破壊頭顙墮地願為孤豚豈可得哉夫致貴無漸失必暴受爵非道殃必疾今外戚寵幸功鈞造化漢元以來未有等比漢元漢初也比頻寐翻陛下誠仁恩周洽以親九族然禄去公室政移私門覆車重尋寧無摧折重直龍翻折而設翻此最安危之極戒社稷之深計也昔文帝愛百金於露臺餙帷帳於皁囊文帝集上書皁囊以為殿帷或有譏其儉者上曰朕為天下守財耳為于偽翻豈得妄用之哉今自初政以來日月未乆費用賞賜已不可算歛天下之財積無功之家帑藏單盡帑它朗翻藏徂浪翻單與殫同民物彫傷卒有不虞卒讀曰猝虞度也不虞謂事變出於虞度之外者也復當重賦復扶又翻百姓怨叛既生危亂可待也願陛下勉求忠貞之臣誅逺佞諂之黨割情欲之歡罷宴私之好逺于願翻好呼到翻心存亡國所以失之鑒觀興王所以得之庶災害可息豐年可招矣書奏皆不省省悉景翻秋七月己夘改元赦天下壬寅太尉馬英薨曰考異𫝊作䇿罷誤今從紀燒當羌忍良等以麻奴兄弟本燒當世嫡燒當豪帥東號和帝永元元年降其子麻奴永初元年叛出塞而校尉馬賢撫恤不至常有怨心遂相結共脅將諸種冦湟中攻金城諸縣八月賢將先零種擊之戰於牧苑不利漢邊郡皆冇牧苑以飬馬此牧苑在金城界將即亮翻零音憐種章勇翻麻奴等又敗武威張掖郡兵於令居敗補邁翻令孟康音連師古音零因脅將先零沈氐諸種四千餘户縁山西走冦武威賢追到鸞鳥鸞鳥縣屬武威郡鳥音雀賢曰鸞鳥故城在今涼州昌松縣北鸞音雚沽丸翻劉昫曰涼州神鳥縣漢鸞鳥縣地嘉麟縣則鸞鳥古城也招引之諸種降者數千降户江翻麻奴南還湟中甲子以前司徒劉愷為太尉初清河相叔孫光坐臧抵罪遂增禁錮二世臧古贓字通賢曰二世謂父子俱禁錮至是居延都尉范邠復犯臧罪朝廷欲依光比帝置居延屬國都尉别領居延一城屬涼州復扶又翻賢曰比類也以邠類光亦錮及其子也比音庇劉愷獨以春秋之義善善及子孫惡惡止其身所以進人於善也公羊𫝊曰曹公孫㑹自鄸出奔宋畔也曷為不言畔為公子喜時之後諱也春秋為賢者諱也何賢乎公子喜時讓國也君子之善善也長惡惡也短惡惡止其身善善及子孫賢者子孫故君子為其諱也如今使臧吏禁錮子孫以輕從重懼及善人非先王詳刑之意也左傳曰刑濫則懼及善人鄭𤣥曰詳審察也陳忠亦以為然有詔太尉議是鮮卑其至䕶冦居庸關九月雲中太守成嚴擊之兵敗居庸關在上谷界葢鮮卑先冦居庸關遂入雲中界也功曹楊穆以身扞嚴與之俱歿鮮卑於是圍烏桓校尉徐常於馬城度遼將軍耿䕫與幽州刺史龐參發廣陽漁陽涿郡甲卒救之三郡皆屬幽州鮮卑解去戊子帝幸衛尉馮石府留飲十餘日丙考異曰袁紀曰十二月申乃還宫今從石𫝊賞賜甚厚拜其子世為黄門侍郎世弟二人皆為郎中石陽邑侯魴之孫也按范書馮魴封陽邑鄉侯魴音房父柱尚顯宗女獲嘉公主石襲公主爵為獲嘉侯獲嘉縣屬河内郡本汲之新中鄉也武帝行幸過此聞獲吕嘉因以名縣能取悦當世故為帝所寵京師及郡國二十七雨水范書帝紀作二十九冬十一月己丑郡國三十五地震鮮卑冦𤣥菟菟同都翻尚書令祋諷等奏以為孝文定約禮之制光武皇帝絶告寧之典祋丁外翻又丁活翻姓也約禮謂以日易月也前書音義曰告寧休謁之名吉曰告凶曰寧貽則萬世誠不可改宜復斷大臣行三年䘮㫁丁管翻下同尚書陳忠上疏曰高祖受命蕭何創制大臣有寧告之科合於致憂之義論語曰人未有自致者也必也親䘮乎建武之初新承大亂凡諸國政多趣簡易趣七喻翻易以䜴翻大臣既不得告寧而羣司營禄念私鮮循三年之䘮鮮息淺翻以報顧復之恩者詩蓼莪云長我育我顧我復我欲報之徳昊天罔極禮義之方實為彫損陛下聼大臣終䘮聖功羙業靡以尚兹孟子曰老吾老以及人之老㓜吾㓜以及人之㓜天下可運於掌賢曰言敬吾老亦敬人之老愛吾㓜亦愛人之幼有敬愛之心則天下歸順之也運掌言易也范氏曰老吾老以老者之禮飬吾之老則謂事親也使天下之老者皆得其飬故曰以及人之老㓜吾㓜以㓜者之禮待吾之㓜謂愛其子也使天下之㓜者皆得其長故曰以及人之㓜天下可運於掌言其易也臣願陛下登高北望以甘陵之思揆度臣子之心則海内咸得其所賢曰甘陵帝父母陵陵在清河故北望也度徒洛翻時宦官不便之竟寢忠奏庚子復斷二千石以上行三年䘮元初三年聼大臣行三年䘮今復㫁之㫁音短袁宏論曰古之帝王所以篤化羙俗率民為善因其自然而不奪其情民猶有不及者而况毁禮止哀滅其天性乎十二月高句驪王宫率馬韓濊貊數千騎圍𤣥菟韓有三種一曰馬韓二曰辰韓三曰弁辰馬韓在西有五十四國句如字又音駒驪力知翻濊音穢貊莫百翻夫餘王遣子尉仇台將二萬餘人與州郡并力討破之夫音扶是嵗宫死子遂成立𤣥菟太守姚光上言欲因其䘮發兵擊之議者皆以為可許陳忠曰宫前桀黠黠下八翻光不能討死而擊之非義也宜遣使弔問因責讓前罪赦不加誅取其後善帝從之延光元年春三月丙午改元赦天下䕶羌校尉馬賢追擊麻奴到湟中破之種衆散遁種章勇翻夏四月京師郡國四十一雨雹雨于具翻河西雹大者如斗幽州刺史馮煥𤣥菟太守姚光數糾發姦惡數所角翻怨者詐作璽書譴責煥光賜以歐刀賢曰歐刀刑人之刀也歐音一口翻余謂古歐冶子善作劒故謂劒為歐刀當音烏侯翻又下遼東都尉龎奮使速行刑下遐稼翻奮即斬光收煥璽考異曰帝紀建光元年四月甲戊龎奮承偽書殺姚光馮緄傳亦云建光元年按帝紀去年十二月高驪圍𤣥菟而高驪𫝊有姚光上言葢光實以延光元年被殺紀𫝊誤以延為建又今年四月無甲戌煥欲自殺其子緄疑詔文有異緄古本翻止煥曰大人在州志欲去惡實無他故必是凶人妄詐規肆姦毒願以事自上去𦍑吕翻上時掌翻甘罪無晚煥從其言上書自訟果詐者所為徴奮抵罪癸巳司空陳褒免五月庚戌宗正彭城劉授為司空己巳封河間孝王子徳為安平王嗣樂成靖王後自是樂成國改曰安平去年樂成王萇以罪廢今以徳紹靖王後諡法柔徳安衆曰靖恭已鮮言曰靖寛樂令終曰靖六月郡國蝗秋七月癸夘京師及郡國十三地震高句驪王遂成還漢生口詣𤣥菟降降户江翻下同其後濊貊率服東垂少事濊音穢少詩沼翻䖍人羌與上郡胡反度遼將軍耿䕫擊破之八月楊陵園寢火景帝陵園寑也九月甲戌郡國二十七地震鮮卑既累殺郡守膽氣轉盛控弦數萬騎冬十月復冦鴈門定襄復扶又翻十一月冦太原燒當羌麻奴飢困將種衆詣漢陽太守耿种降種章勇翻种音冲是嵗京師及郡國二十七雨水帝數遣黄門常侍及中使伯榮往來甘陵數所角翻使疏吏翻尚書僕射陳忠上疏曰今天心未得隔并屢臻賢曰隔并謂水旱不節也尚書曰一極備凶一極無凶并音必姓翻青冀之域滛雨漏河賢曰漏溢也余謂雨乆不止河隄為之决漏也徐岱之濵海水盆溢禹貢海岱及淮為徐州故曰徐岱盆讀與湓同音蒲悶翻兖豫蝗蝝滋生賢曰蝝螽子也音余專翻余按蝝蝗子也董仲舒云然左傳宣十五年冬蝝生劉歆曰蚍蜉子杜預曰螽子以冬生遇寒而死故不成螽爾雅曰蝝蝮蜪蝗也陸機草木疏云螽幽州人謂之舂箕蝗類也曰螽子者猶蝗子也荆楊稻收儉簿并凉二州羌戎叛戾加以百姓不足府帑虛匱帑它朗翻陛下以不得親奉孝徳皇園廟比遣中使致敬甘陵比毗至翻朱軒駢馬相望道路賢曰朱軒車使者所乘也駢並也可謂孝至矣然臣竊聞使者所過威權翕赫震動郡縣王侯二千石至為伯榮獨拜車下為于偽翻下猥為誤為同發民修道繕理亭𫝊𫝊株戀翻多設儲偫偫大理翻具也徴役無度老弱相隨動有萬計賂遺僕從人數百匹謂縑帛也遺于季翻從才用翻頓踣呼嗟踣蒲墨翻僵也斃也莫不叩心河間託叔父之屬清河有陵廟之尊賢曰河間王開安帝叔也清河王延平也陵廟所在故曰尊及剖符大臣皆猥為伯榮屈節車下陛下不問必以為陛下欲其然也伯榮之威重於陛下陛下之柄在於臣妾水災之發必起於此昔韓嫣託副車之乘受馳視之使江都誤為一拜而嫣受歐刀之誅韓嫣有寵於武帝常與帝共卧起江都王入朝從上獵上林中天子車駕䟆通未行先使嫣乘副車從數十百騎馳視獸江都王望見以為天子辟從者伏謁道旁嫣驅不見既過江都王怒為太后泣請得歸國入宿衛比韓嫣太后由此銜嫣遂誅嫣嫣音偃臣願明主嚴天元之尊正乾剛之位賢曰天元猶乾元也不宜復令女使干錯萬機復扶又翻使如字重察左右得無石顯漏泄之姦石顯事見二十九卷元帝建昭二年重直用翻尚書納言得無趙昌譛崇之詐趙昌事見三十四卷哀帝建平四年公卿大臣得無朱博阿傅之援朱博事見三十四卷建平二年外屬近戚得無王鳯害商之謀王鳯事見三十卷成帝河平四年若國政一由帝命王事毎决於已則下不得偪上臣不得干君常雨大水必當霽止四方衆異不能為害書奏不省省悉景翻時三府任輕機事專委尚書而災𤯝變咎輒切免三公賢曰切責也陳忠上疏曰漢興舊事丞相所請靡有不聼今之三公雖當其名而無其實選舉誅賞一由尚書尚書見任重於三公陵遲以來其漸乆矣臣忠心常獨不安近以地震䇿免司空陳褒今者災異復欲切讓三公復扶又翻昔孝成皇帝以妖星守心移咎丞相事見三十三卷綏和二年卒不䝉上天之福卒子恤翻徒乖宋景之誠故知是非之分較然有歸矣分扶問翻又尚書决事多違故典罪法無例詆欺為先文慘言醜有乖章憲宜責求其意割而勿聼上順國典下防威福置方員於規矩審輕重於衡石此言决事當依典法也賢曰衡秤衡也三十斤為鈞四鈞為石誠國家之典萬世之法也汝南太守山陽王龔政崇寛和好才愛士以袁閬為功曹好呼到翻閬音浪引進郡人黄憲陳蕃等憲雖不屈蕃遂就吏就辟而為吏也閬不修異操而致名當時蕃性氣高明龔皆禮之由是羣士莫不歸心憲世貧賤父為牛醫穎川荀淑至慎陽慎陽縣屬汝南郡憲縣人也賢曰在慎水之南因以名縣應劭曰慎水出東北入淮師古曰慎字本作滇音真後誤為慎耳今猶有真邱真陽縣知音不改也闞駰曰永平五年失印更刻遂誤以水為心余按水北為陽賢既云縣在水南而名慎陽何也遇憲於逆旅逆迎也設館舍以迎客故曰逆旅賢曰逆旅客舍時年十四淑竦然異之揖與語移日不能去移日言日移晷也謂憲曰子吾之師表也既而前至袁閬所未及勞問勞力到翻逆曰子國有顔子寧識之乎賢曰顔子顔回也閬汝南汝陽人閬曰見吾叔度耶黄憲字叔度是時同郡戴良才高倨傲而見憲未嘗不正容及歸罔然若有失也其母問曰汝復從牛醫兒來耶復扶又翻下同對曰良不見叔度自以為無不及既覩其人則瞻之在前忽然在後論語顔回慕孔子之言固難得而測矣陳蕃及同郡周舉嘗相謂曰時月之間不見黄生則鄙吝之萌復存乎心矣自朔至晦為一月三月為一時賢曰吝貪也余謂作事可卑賤者謂之鄙作事可羞恨者謂之吝太原郭泰少逰汝南少詩照翻先過袁閬不宿而退進往從憲累日方還或以問泰曰奉高之器譬諸氿濫雖清而易挹賢曰奉高閬字也爾雅側出氿泉正出濫泉氿音軌濫音檻易以䜴翻叔度汪汪若千頃陂澄之不清淆之不濁不可量也賢曰淆混也量音良憲初舉孝亷又辟公府友人勸其仕憲亦不拒之暫到京師即還竟無所就年四十八終范曄論曰黄憲言論風㫖無所𫝊聞然士君子見之者靡不服深逺去玼吝逺于願翻賢曰玼音此説文曰鮮色也據此文當為疵作玼者古字通也將以道周性全無徳而稱乎賢曰道周備性全一無徳而稱言其徳大無能名焉余曾祖穆侯賢曰晉書曰范汪字𤣥平安北將軍汪生寗寗生泰泰生曄以為憲隤然其處順賢曰易繫辭曰夫坤隤然示人簡矣隤柔順貎音大回翻處昌吕翻淵乎其似道賢曰老子曰道冲而用之或不盈淵乎似萬物之宗言深而不可測也淺深莫臻其分分扶問翻清濁未議其方賢曰方所也若及門於孔氏其殆庶乎賢曰易繫辭曰顔氏之子其殆庶幾乎殆近也二年春正月旄牛夷反前漢旄牛縣屬蜀郡後漢屬華陽國志旄牛縣在卬萊山表益州刺史張喬擊破之夏四月戊子爵乳母王聖為野王君北匈奴連與車師入冦河西議者欲復閉玉門陽關以絶其患賢曰玉門陽關二關名也在敦煌西界皆在敦煌龍靭界復扶又翻下同敦煌太守張璫上書曰敦徒門翻臣在京師亦以為西域宜棄今親踐其土地乃知棄西域則河西不能自存謹陳西域三䇿北虜呼衍王常展轉蒲類秦海之間賢曰大秦國在西海西故曰秦海余按蒲類海在唐庭州界盖此時北匈奴雖微弱然東畏鮮卑不敢還故地但結連車師鄯善以擾河西故呼衍一部常為河西患若賢注以大秦海西之國為秦海則約言之耳西海廣逺甘英之不能越北匈奴兵威所未嘗役屬言展轉二海閒特當時上書者張言之耳專制西域共為冦鈔今以酒泉屬國吏士二千餘人集昆侖塞賢曰前書敦煌郡廣至縣有昆侖障宜禾都尉居也廣至故城在今𤓰州常樂縣東注又見四十五卷明帝永平十七年與此稍異先擊呼衍王絶其根本因發鄯善兵五千人脅車師後部此上計也若不能出兵可置軍司馬將士五百人四郡供其犂牛榖食出據栁中此中計也四郡武威酒泉張掖敦煌賢曰栁中今西州縣余按西域𫝊栁中在後部金蒲城之北去交河城八十里杜佑曰唐平髙昌以田地城為栁中縣鄯上扇翻如又不能則宜棄交河城收鄯善等悉使入塞此下計也朝廷下其議鄯上扇翻下遐稼翻陳忠上疏曰西域内附日乆區區東望扣關者數矣此其不樂匈奴慕漢之效也數所角翻樂音洛今北虜已破車師埶必南攻鄯善弃而不救則諸國從矣言從北匈奴也若然則虜財賄益增膽埶益殖賢曰殖生也威臨南羌即湟中及南山諸羌與之交通如此河西四郡危矣河西既危不可不救則百倍之役興不訾之費發矣毛晃曰訾之為言量也不訾謂無量可比也訾子斯翻議者但念西域絶逺䘏之煩費不見孝武苦心勤勞之意也方今敦煌孤危逺來告急復不輔助内無以慰勞吏民勞力到翻外無以威示百蠻蹙國減土非良計也臣以為敦煌宜置校尉按舊增四郡屯兵以西撫諸國帝納之如是復以班勇為西域長史賢曰西域都䕶之長史也余按班超未為都䕶亦為將兵長史敦徒門翻復扶又翻下同將兵五百人出屯栁中秋七月丹陽山崩丹陽郡屬揚州九月郡國五雨水冬十月辛未太尉劉愷罷甲戌以司徒楊震為太尉光禄勲東萊劉熹為司徒大鴻臚耿寳自候震候見也薦中常侍李閏兄於震曰李常侍國家所重欲令公辟其兄寳唯𫝊上意耳賢曰言非己本心𫝊在上之意震曰如朝廷欲令三府辟召故宜有尚書敇寳大恨而去執金吾閻顯亦薦所親於震震又不從司空劉授聞之即辟此二人由是震益見怨時詔遣使者大為王聖修第中常侍樊豐及侍中周廣謝惲等更相扇動傾揺朝廷為于偽翻惲於粉翻更工衡翻震上疏曰臣伏念方今災害滋甚百姓空虚三邊震擾三邊東西北也帑藏匱乏帑它朗翻臧狙浪翻殆非社稷安寧之時詔書為阿母興起第舎合兩為一連里竟街賢曰合兩坊而為一宅里即坊也雕修繕飾窮極巧伎伎渠綺翻攻山採石轉相迫促為費巨億周廣謝惲兄弟與國無肺府枝葉之屬府與腑同依倚近倖姦佞之人與之分威共權屬託州郡屬之欲翻傾動大臣宰司辟召承望㫖意招來海内貪汙之人受其貨賂至有臧錮棄世之徒賢曰有贓賄禁錮之人余謂棄世者見棄於世也復得顯用白黒渾淆清濁同源天下讙譁為朝結譏渾户本翻讙許元翻為于偽翻朝直遥翻臣聞師言上之所取師言衆言也財盡則怨力盡則叛怨叛之人不可復使惟陛下度之復扶又翻度徒洛翻上不聼鮮卑其至鞬自將萬餘騎攻南匈奴於曼栢薁鞬日逐王戰死殺千餘人鞬居言翻薁於六翻十二月戊辰京師及郡國三地震陳忠薦汝南周燮南陽馮良學行深純行下孟翻隠居不仕名重於世帝以𤣥纁羔幣聘之𤣥黒色纁淺絳色周官考工記曰三入為纁爾雅三染謂之纁孔穎逹曰束帛十端也端則二丈十端六𤣥四纁五兩三𤣥二纁纁是地色𤣥是天色賢曰禮卿執羔董仲舒春秋繁露曰凡贄卿用羔羔有角而不用執之不鳴殺之不嘷類死義者羔飲其母必跪類知禮者故以為贄纁許云翻燮宗族更勸之曰夫修徳立行所以為國更工衡翻行下孟翻為于偽翻君獨何為守東岡之陂乎燮居汝南安城有先人草廬結于岡畔下有陂田常肆勤以自給燮曰夫修道者度其時而動動而不時焉得亨乎賢曰亨通也書曰慮善而動動惟厥時度徒洛翻焉於䖍翻與良皆自載至近縣稱病而還三年春正月班勇至樓蘭以鄯善歸附特加三綬三綬疑當作王綬綬音受而龜兹王白英猶自疑未下龜兹音邱慈勇開以恩信白英乃率姑墨温宿自縛詣勇因發其兵歩騎萬餘人到車師前王庭擊走匈奴伊蠡王於伊和谷蠡音黎収得前部五千餘人於是前部始復開通復扶又翻還屯田栁中二月丙子車駕東廵辛夘幸泰山三月戊戌幸魯還幸東平至東郡歴魏郡河内而還還從宣翻又如字初樊豐周廣謝惲等見楊震連諌不從無所顧忌遂詐作詔書調發司農錢榖大匠見徒材木調徒弔翻見賢遍翻各起冢舍園池廬觀役費無數觀古玩翻震復上疏曰臣備台輔不能調和隂陽去年十二月四日京師地動其日戊辰三者皆土位在中官賢曰戊干辰支皆土也并地動故言三者考異曰震𫝊作十一月四日按下文其日戊辰十一月丙申朔戊辰乃十二月四日也此中臣近官持權用事之象也臣伏惟陛下以邊境未寧躬自菲薄宫殿垣屋傾倚枝拄而已賢曰倚邪也拄音竹柱翻而親近倖臣未崇斷金賢曰易繫辭曰二人同心其利㫁金言邪佞之人不與上同心近其靳翻㫁丁亂翻王肅丁管翻驕溢踰法多請徒士盛修第舎賣弄威福道路讙譁地動之變殆為此發讙許元翻為于偽翻下同又冬無宿雪春節未雨百僚焦心而繕修不止誠致旱之徴也惟陛下奮乾剛之徳棄驕奢之臣以承皇天之戒震前後所言轉切帝既不平之而樊豐等皆側目憤怨以其名儒未敢加害㑹河間男子趙騰上書指陳得失帝發怒遂收考詔獄結以罔上不道結者結定其罪震上疏救之曰臣聞殷周哲王小人怨詈則還自敬徳賢曰尚書無逸之辭還反也敬徳加謹以増修其徳也今趙騰所坐激訐謗語為罪與手刃犯法有差乞為虧除全騰之命虧減也訐居楬翻以誘芻蕘輿人之言賢曰輿衆也詩曰詢于芻蕘左氏𫝊曰聼輿人之謀也誘音酉帝不聼騰竟伏尸都市及帝東廵樊豐等因乗輿在外競修第宅乘繩證翻太尉部掾高舒召大匠令史考校之漢公府諸曹掾各有分部賢曰史謂府史也余按漢諸官府各有令史得豐等所詐下詔書具奏須行還上之須待也待車駕行還上言其事下遐稼翻上時掌翻豐等惶怖怖普布翻㑹太史言星變逆行遂共譛震云自趙騰死後深用怨懟賢曰懟怨怒也音直類翻且鄧氏故吏有恚恨之心賢曰震初鄧隲辟之故曰故吏恚於避翻下同壬戌車駕還京師便時太學賢曰且於太學待吉時而後入也故曰便時前書便時上林延夀門杜佑曰便時取日時之便夜遣使者䇿收震太尉印綬震於是柴門絶賔客柴塞其門也豐等復惡之復扶又翻惡烏路翻下同令大鴻臚耿寳奏震大臣不服罪懐恚望有詔遣歸本郡震𢎞農華隂人震行至城西几陽亭雒陽城西也乃慷慨謂其諸子門人曰賢曰慷慨悲歎余謂慷慨不得意而見於辭色也死者士之常分分扶問翻吾䝉恩居上司疾姦臣狡猾而不能誅惡嬖女傾亂而不能禁嬖卑義翻又必計翻何靣目復見日月復扶又翻下同身死之日以雜木為捾布單被裁足蓋形勿歸冡次勿設祭祀因飲酖而卒𢎞農太守移良風俗通曰齊公子雍食邑於移其後氏焉承樊豐等㫖遣吏於陜縣留停震䘮露棺道側讁震諸子代郵行書説文曰郵境上行書舎也廣雅曰郵驛也此言使震諸子代驛吏𫝊行文書也陜失冉翻道路皆為隕涕為于偽翻太僕征羌侯來歴曰征羌侯國屬汝南郡光武以歴曾祖歙有平羌隴之功改汝南當鄉縣為征羌國以封之賢曰征羌故城在今豫州郾城縣東南耿寳託元舅之親榮寵過厚不念報國恩而傾側姦臣傷害忠良其天禍亦將至矣歴歙之曾孫也歙許及翻夏四月乙丑車駕入宫戊辰以光禄勲馮石為太尉南單于檀死弟㧞立為烏稽侯尸逐鞮單于鞮于奚翻時鮮卑數冦邊數所角翻下同度遼將軍耿䕫與温禹犢王呼尤徽將新降者連年出塞擊之還使屯列衝要衝要者當敵之衝邊之要地也賢曰還令新降者屯列衝要降户江翻耿䕫徴發煩劇新降者皆怨恨大人阿族等遂反阿族者新降一部之大人也脅呼尤徽欲與俱去呼尤徽曰我老矣受漢家恩寧死不能相隨衆欲殺之有救者得免阿族等遂將其衆亡去中郎將馬翼與胡騎追擊破之斬獲殆盡賢曰殆近也欲死盡所餘無幾日南徼外蠻夷内屬徼吉弔翻六月鮮卑冦𤣥菟庚午閬中山崩閬中縣屬巴郡賢曰臨閬中水因以為名今隆州縣宋白曰閬水紆曲經其三面縣居其中取以名之秋七月辛巳以大鴻臚耿寳為大將軍王聖江京樊豐等譛太子乳母王男厨監邴吉等殺之厨監主飲食家屬徙比景太子思男吉數為歎息為于偽翻京豐懼有後害乃與閻后妄造虚無搆讒太子及東宫官屬帝怒召公卿以下議廢太子耿寳等承㫖皆以為當廢太僕來歴與太常桓焉廷尉犍為張皓議曰犍居言翻經説年未滿十五過惡不在其身且男吉之謀太子容有不知宜選忠良保傅輔以禮義廢置事重此誠聖恩所宜宿留賢曰宿留猶停留也音秀溜帝不從焉郁之子也郁桓榮之子張皓退復上書曰昔賊臣江充造構讒逆傾覆戾園孝武乆乃覺寤雖追前失悔之何及事見二十三卷武帝征和二年三年今皇太子方十嵗未習保傅之教可遽責乎書奏不省省悉景翻九月丁酉廢皇太子保為濟隂王居於徳陽殿西鍾下漢官儀曰崇𤣥門徳陽殿也按帝紀徳陽殿在北宫掖庭中蔡質漢儀曰正月旦天子幸徳陽殿臨軒公卿將大夫百官各陪朝賀蠻貊胡羌朝貢畢見屬郡計吏皆覲宗室諸劉雜㑹又曰徳陽殿周旋容萬人陛高二丈皆文石作壇激沼水于殿下天子正旦節㑹朝百僚於此殿濟子禮翻來歴乃要結光禄勲祋諷宗正劉瑋將作大匠薛皓侍中閭邱宏閭邱複姓左𫝊齊有閭邱嬰陳光趙代施延太中大夫九江朱倀等十餘人要一遥翻祋丁外翻又丁活翻倀丑羊翻俱詣鴻都門證太子無過帝與左右患之左石近習也乃使中常侍奉詔脅羣臣曰父子一體天性自然孟子曰父子之道天性也以義割恩為天下也為于偽翻歴諷等不識大典而與羣小共為讙譁外見忠直見賢遍翻而内希後福飾邪違義豈事君之禮朝廷廣開言路故且一切假貸若懐迷不反當顯明刑書諫者莫不失色薛皓先頓首曰固宜如明詔歴怫然賢曰字林怫欝也音扶勿翻余謂怫然憤欝之見於色者廷詰皓曰屬通諫何言而今復背之賢曰屬近也通猶共也近者共諫何乃相背也屬之欲翻復扶又翻背蒲妹翻大臣乘朝車處國事固得輾轉若此乎賢曰輾轉不定也詩曰輾轉反側處昌吕翻輾音展乃各稍自引起歴獨守闕連日不肯去帝大怒尚書令陳忠與諸尚書遂共劾奏歴等帝乃免歴兄弟官削國租削其征羌國租也劾户槩翻又户得翻黜歴母武安公主不得㑹見武安公主顯宗女也武安縣屬魏郡見賢遍翻隴西郡始還狄道永初五年隴西徙襄武燒當羌豪麻奴死弟犀苦立庚申晦日有食之冬十月上行幸長安十一月乙丑還雒陽是嵗京師及諸郡國二十三地震三十六大水雨雹雨于具翻資治通鑑卷五十
