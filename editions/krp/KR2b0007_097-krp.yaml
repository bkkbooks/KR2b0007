body:
  text: 資治通鑑卷九十七宋司馬光撰胡三省音注晉紀十九起𤣥黓攝提格盡彊圉協洽凡六年顯宗成皇帝下咸康八年春正月己未朔日有食之作考異曰天文志乙未今從帝紀及長厯乙丑大赦豫州刺史庾懌以酒餉江州刺史王允之允之覺其毒飲犬飲於禁翻犬斃密奏之帝曰大舅已亂天下謂庾亮也小舅復欲爾邪復扶又翻二月懌飲鴆而卒卒子恤翻三月初以武悼后配食武帝廟楊皇后惠帝永康元年幽廢而死今乃得配食武帝庾翼在武昌數有妖怪數所角翻妖於驕翻欲移鎮樂鄉征虜長史王述與庾氷牋曰樂鄉去武昌千有餘里數萬之衆一旦移徙興立城壁公私勞擾又江州當泝流數千里供給軍府力役増倍且武昌實江東鎮戍之中非但扞禦上流而已緩急赴告駿奔不難書武成曰駿奔走駿音峻注云駿大也言皆奔走也若移樂鄉逺在西陲一朝江渚有虞不相接救方岳重將將即亮翻固當居要害之地為内外形埶使闚𨵦之心不知所向昔秦忌亡胡之讖卒為劉項之資秦盧生奏錄圖書曰亡秦者胡也于是始皇使䝉恬北伐胡不知立子胡亥以兆亂卒子恤翻周惡檿弧之謡而成褒姒之亂國語曰宣王之時有童謡曰檿弧箕服實亡周國宣王聞之有夫婦鬻是器者使執而戮之府之小妾生子而非王子也懼而弃之此人也収以奔褒褒人有獄而以女入于幽王王嬖是女而生伯服是為褒姒欲廢太子宜臼而立伯服卒以成申侯西戎之亂惡烏路翻檿於琰翻是以逹人君子直道而行禳避之道皆所不取正當擇人事之勝理思社稷之長計耳朝議亦以為然朝直遥翻翼乃止夏五月乙卯帝不豫豫順也不豫言有疾而氣體不能順適也六月庚寅疾篤或詐為尚書符敕宮門無得内宰相衆皆失色庾氷曰此必詐也推問果然推考也究也帝二子丕奕皆在襁褓襁居兩翻褓音保庾氷自以兄弟秉權日久恐易世之後親屬愈疎為它人所閒閒古莧翻每說帝以國有彊敵强敵謂漢趙也說輸芮翻宜立長君長知兩翻請以母弟琅邪王岳為嗣帝許之中書令何充曰父子相傳先王舊典易之者鮮不致亂鮮息淺翻故武王不授聖弟聖弟謂周公非不愛也今琅邪踐阼將如孺子何氷不聴下詔以岳為嗣并以奕繼琅邪哀王元帝以子裒奉琅邪恭王後薨諡曰孝子哀王安國立未踰年薨元帝復以皇子煥嗣封其日薨復以皇子昱為琅邪王咸和之初昱徙封㑹稽以岳為琅邪王今岳入繼大宗故以奕繼哀王後壬辰氷充及武陵王晞㑹稽王昱尚書令諸葛恢並受顧命㑹工外翻癸巳帝崩年二十二帝幼冲嗣位不親庶政及長頗有勤儉之徳長知兩翻甲午琅邪王即皇帝位大赦己亥封成帝子丕為琅邪王奕為東海王康帝亮隂不言委政於庾氷何充秋七月丙辰葬成帝于興平陵帝徒行送喪至閶闔門乃升素輿至陵所既葬帝臨軒庾氷何充侍坐坐徂臥翻帝曰朕嗣鴻業二君之力也充曰陛下龍飛臣氷之力也若如臣議不覩升平之世帝有慙色己未以充為驃騎將軍驃匹妙翻都督徐州揚州之晉陵諸軍事領徐州刺史鎮京口晉永嘉大亂徐州淮北流民相率過淮亦有過江居晉陵郡界者咸和四年司徒郗鑒又徙流民之在淮南者於晉陵諸縣其徙過江南及留在江北者並立僑郡以司牧之徐州實郡在江北者實有廣陵堂邑鍾離三郡而揚州之境以晉陵郡屬徐州所謂都督徐州揚州之晉陵諸軍事者此也晉陵郡呉之毘陵郡也呉分呉郡無錫以西為毘陵郡晉東海王越世子名毘而東海國故食毘陵永嘉五年改為晉陵避諸庾也冬十月燕王皝遷都龍城慕容廆先居徒河之青山後徙棘城今自棘城徙都龍城杜佑曰營州栁城郡古孤竹國也春秋為山戎肥子二國地漢徒河之青山在郡城東百九十里棘城即顓頊之虛在郡城東南百七十里慕容皝以栁城之北龍山之南福徳之地遂遷都龍城號新宮為和龍宮栁城縣有白狼山白狼水又有僕扶犂縣故城在東南其龍山即慕容皝祭龍所也有饒樂水漢徒河縣城赦其境内建威將軍翰言於皝曰宇文彊盛日久屢為國患今逸豆歸簒竊得國逸豆歸逐乙得歸見九十五卷咸和八年羣情不附加之性識庸闇將帥非才將即亮翻帥所類翻國無防衛軍無部伍臣久在其國悉其地形雖逺附彊羯彊羯謂趙也羯居謁翻聲埶不接無益救援今若擊之百舉百克然高句麗去國密邇常有闚𨵦之志句如字又音駒麗力知翻闚缺規翻門中視也𨵦從門旁竇中視也音俞韻釋闚𨵦私視也彼知宇文既亡禍將及已必乘虚深入掩吾不備若少留兵則不足以守多留兵則不足以行此心腹之患也宜先除之觀其埶力一舉可克宇文自守之虜必不能逺來争利既取高句麗還取宇文如返手耳返當作反下同二國既平利盡東海國富兵彊無返顧之憂然後中原可圖也皝曰善將擊高句麗高句麗有二道其北道平闊南道險狹北道從北置而進南道從南陜入木底城衆欲從北道翰曰虜以常情料之必謂大軍從北道當重北而輕南王宜帥銳兵從南道擊之出其不意丸都不足取也高句麗王居丸都帥讀曰率下同别遣偏師從北道縱有蹉跌蹉倉何翻跌徒結翻蹉跌失足而踣也其腹心已潰四支無能為也皝從之十一月皝自將勁兵四萬出南道將即亮翻下同以慕容翰慕容霸為前鋒别遣長史王㝢等將兵萬五千出北道以伐高句麗高句麗王釗果遣弟武帥精兵五萬拒北道自帥羸兵以備南道羸倫為翻慕容翰等先至與釗合戰皝以大衆繼之左常侍鮮于亮曰臣以俘虜䝉王國士之恩事見上卷咸康四年不可以不報今日臣死日也獨與數騎先犯高句麗陳所嚮摧陷高句麗陳動騎奇寄翻下同陳讀曰陣大衆因而乘之高句麗兵大敗左長史韓壽斬高句麗將阿佛和度加高句麗置官有相加大加小加諸軍乘勝追之遂入丸都釗單騎走輕車將軍慕輿埿追獲其母周氏及妻而還會王㝢等戰於北道皆敗没由是皝不復窮追復扶又翻下同遣使招釗釗不出皝將還韓壽曰高句麗之地不可戍守今其主亡民散潜伏山谷大軍既去必復鳩聚鳩亦聚也収其餘燼火餘曰燼猶能復然猶足為患請載其父尸囚其生母而歸俟其束身自歸然後返之撫以恩信䇿之上也皝從之發釗父乙弗利墓載其尸収其府庫累世之寳虜男女五萬餘口燒其宮室毁丸都城而還還從宣翻又如字十二月壬子立妃禇氏為皇后徴豫章太守褚裒為侍中尚書裒自以后父不願居中任事裒薄侯翻苦求外出乃除建威將軍江州刺史鎮半洲趙王虎作臺觀四十餘所於鄴觀古玩翻又營洛陽長安二宮作者四十餘萬人又欲自鄴起閣道至襄國敕河南四州治南伐之備河南四州洛豫徐兖也治直之翻并朔秦雍嚴西討之資晉地理志曰石勒平朔方置朔州西討欲攻河西也雍於用翻青冀幽州為東征之計東征欲伐燕也皆三五發卒三丁發二五丁發三也諸州軍造甲者五十餘萬人船夫十七萬人為水所没虎狼所食者三分居一加之公侯牧宰競營私利百姓失業愁困貝丘人李𢎞貝丘縣自漢以來屬清河郡北齊併入清河縣因衆心之怨自言姓名應䜟連結黨與署置百寮事發誅之連坐者數千家虎畋獵無度晨出夜歸又多微行躬察作役侍中京兆韋謏諫曰謏蘇了翻陛下忽天下之重輕行斤斧之間猝有狂夫之變雖有智勇將安所施又興役無時廢民耘獲穫戸郭翻吁嗟盈路殆非仁聖之所忍為也虎賜謏榖帛而興繕滋繁游察自若秦公韜有寵於虎太子宣惡之惡烏路翻右僕射張離領五兵尚書曹魏置五兵尚書沈約志五兵尚書領中兵外兵騎兵别兵都兵故謂之五兵欲求媚於宣說之曰說輸芮翻今諸侯吏兵過限宜漸裁省以壯本根宣使離為奏秦燕義陽樂平四公秦公韜燕公斌義陽公鑒樂平公苞聴置吏一百九十七人帳下兵二百人自是以下三分置一餘兵五萬悉配東宮配𨽻也於是諸公咸怨嫌釁益深矣青州上言濟南平陵城北石虎一夕移於城東南漢濟南郡有東平陵縣晉省後復置為平陵縣唐為齊州全節縣濟子禮翻有狼狐千餘迹隨之迹皆成蹊虎喜曰石虎者朕也自西北徙而東南者天意欲使朕平蕩江南也其敕諸州兵明年悉集朕當親董六師以奉天命羣臣皆賀上皇徳頌者一百七人上時掌翻制征士五人出車一乘牛二頭米十五斛絹十匹調不辦者斬乘繩證翻調徒釣翻民至鬻子以供軍須行軍所須以為用故曰軍須猶不能給自經於道樹者相望人之自經必於溝瀆隱蔽之地死亡計迫自經于道旁之樹蓋甚不獲已也相望言其多也按目錄書是年代王還雲中康皇帝諱岳字世同成帝母弟也咸和元年封呉王二年徙封琅邪王諡法温柔好樂曰康建元元年春二月高句麗王釗遣其弟稱臣入朝於燕朝直遥翻貢珍異以千數燕王皝乃還其父尸猶留其母為質質音致宇文逸豆歸遣其相莫淺渾將兵擊燕諸將争欲擊之相息亮翻將即亮翻燕王皝不許莫淺渾以為皝畏之酣飲縱獵不復設備酣戸甘翻復扶又翻皝使慕容翰出擊之莫淺渾大敗僅以身免盡俘其衆庾翼為人忼慨忼慨同音口黨翻喜功名喜許記翻琅邪内史桓温彛之子也桓彛死于蘇峻之難尚南康公主公主明帝女豪爽有風槩言其有風力氣槩翼與之友善相期以寧濟海内翼嘗薦温於成帝曰桓温有英雄之才願陛下勿以常人遇之常壻畜之畜呼玉翻又許竹翻宜委以方召之任方叔邵虎周宣王用之以中興必有𢎞濟艱難之勲時杜乂殷浩並才名冠世冠古玩翻翼獨弗之重也曰此輩宜束之高閣俟天下太平然後徐議其任耳浩累辭徴辟屛居墓所屏必郢翻幾將十年幾居希翻時人擬之管葛管仲諸葛孔明也江夏相謝尚長山令王濛漢獻帝初平二年分烏傷立長山縣屬㑹稽郡呉分屬東陽郡隋改長山為金華縣今屬婺州常伺其出處伺相吏翻處昌呂翻下同以卜江左興亡嘗相與省之省悉井翻知浩有確然之志確然者守志堅固不移也既返相謂曰深源不起當如蒼生何殷浩字深源尚鯤之子也翼請浩為司馬詔除侍中安西軍司軍司即軍司馬浩不應翼遺浩書曰王夷甫立名非真雖云談道實長華競遺于季翻長知兩翻明徳君子遇㑹處際言遇風雲之㑹處功名之際也寧可然乎浩猶不起殷羡為長沙相相息亮翻在郡貪殘庾氷與翼書屬之屬之欲翻翼報曰殷君驕豪亦似由有佳兒佳兒謂浩也弟故小令物情容之翼氷弟也大較江東之政以嫗喣豪彊常為民蠧嫗於具翻喣許具翻鄭𤣥曰體曰嫗氣曰喣時有行法輙施之寒劣寒者衰冷無氣燄也劣者卑弱在人下也如徃年偷石頭倉米一百萬斛皆是豪將輩而直殺倉督監以塞責倉督監筦倉之官將即亮翻塞悉則翻山遐為餘姚長為官出豪彊所藏二千戸餘姚縣屬㑹稽郡長知兩翻為于偽翻而衆共驅之令遐不得安席雖皆前宰之惛謬前宰指王導惛音昏庾翼察舉小才耳當江東草創之時非王導之𢎞致逺識不能濟也謂之惛謬談何容易江東事去實此之由兄弟不幸横陷此中横戸孟翻自不能㧞足於風塵之外當共明目而治之治直之翻荆州所統二十餘郡太康地志荆州統郡二十有二惠帝至元帝又立隨新野竟陵新興南河等郡唯長沙最惡惡而不黜與殺督監復何異邪復扶又翻遐簡之子也永嘉中山簡鎮襄陽翼以滅胡取蜀為己任遣使東約燕王皝西約張駿刻期大舉朝議多以為難使疏吏翻朝直遥翻唯庾氷意與之同而桓温譙王無忌皆賛成之無忌承之子也譙王承死於王敦之難承當作氶音拯秋七月趙汝南太守戴開帥數千人詣翼降帥讀曰率降戸江翻丁巳下詔議經畧中原翼欲悉所部之衆北伐表桓宣為都督司雍梁三州荆州之四郡諸軍事梁州刺史荆州四郡南陽新野襄陽南鄉也雍於用翻前趣丹水丹水縣前漢屬𢎞農郡後漢屬南陽郡晉屬順陽郡賢曰丹水故城在今鄧州内鄉縣西南臨丹水趣七喻翻桓温為前鋒小督假節帥衆入臨淮淮考異曰帝紀温入臨下云庾翼為征討大都督遷鎮襄陽按翼傳翼先表移鎮安陸至夏口上表云九月十九日發武昌二十四日達夏口始請徙鎮襄陽始詔加都督征討諸軍事故知不在此月並發所統六州奴及車牛驢馬百姓嗟怨六州江荆司雍梁益也代王什翼犍復求婚於燕犍居言翻復扶又翻燕王皝使納馬千匹為禮什翼犍不與又倨慢無子壻禮八月皝遣世子儁帥前軍師評等擊代帥讀曰率下同使考異曰後魏序紀八月慕容元真遣請薦女無用兵事今從燕書什翼犍帥衆避去燕人無所見而還還從宣翻又如字漢主壽卒年四十四諡曰昭文廟號中宗太子勢即位大赦勢字子仁壽之長子也趙太子宣擊鮮卑斛榖提大破之斬首三萬級宇文逸豆歸執叚遼弟蘭送於趙翟遼之敗其弟蘭奔宇文部逸豆歸今執以送趙并獻駿馬萬匹趙王虎命蘭帥所從鮮卑五千人屯令支令音鈴又郎定翻支音祁庾翼欲移鎮襄陽恐朝廷不許乃奏云移鎮安陸安陸縣自漢以來屬江夏郡唐為安州治所帝及朝士皆遣使譬止翼翼遂違詔北行至夏口復上表請鎮襄陽朝直遥翻使疏吏翻夏戸雅翻復扶又翻上時掌翻翼時有衆四萬詔加翼都督征討諸軍事先是車騎將軍揚州刺史庾氷屢求出外先悉薦翻辛巳以氷都督荆江寧益梁交廣七州豫州之四郡諸軍事豫州四郡宣城歴陽廬江安豐也領江州刺史假節鎮武昌以為翼繼援徴徐州刺史何充為都督揚豫徐州之琅邪諸軍事永嘉之亂琅邪國人隨元帝過江者千餘戸太興三年立懷徳縣丹陽雖有琅邪相而無其地是年桓温為内史鎮江乘之蒲洲金城上求割丹陽之江乘縣境立郡所謂徐州之琅邪此也領揚州刺史錄尚書事輔政以琅邪内史桓温為都督青徐兖三州諸軍事徐州刺史褚裒為衛將軍領中書令冬十一月己巳大赦二年春正月趙王虎享羣臣於太武殿有白雁百餘集馬道之南馬道者築道可以馳馬徃來虎命射之皆不獲射而亦翻時諸州兵集者百餘萬太史令趙攬密言於虎曰白雁集庭宮室將空之象不宜南行虎信之乃臨宣武觀大閲而罷石虎倣洛都之制築宣武觀於鄴觀古玩翻漢主勢改元太和尊母閻氏為皇太后立妻李氏為皇后燕王皝與左司馬高詡謀伐宇文逸豆歸詡曰宇文彊盛今不取必為國患伐之必克然不利於將將即亮翻出而告人曰吾徃必不返然忠臣不避也於是皝自將伐逸豆歸將即亮翻下同以慕容翰為前鋒將軍劉佩副之分命慕容軍慕容恪慕容霸及折衝將軍慕輿根將兵三道並進高詡將發不見其妻使人語以家事而行語牛倨翻逸豆歸遣南羅大涉夜干將精兵逆戰南羅城名大城大也慕容既克宇文改南羅城為威徳城考異曰慕容皝載記作涉弈干今從燕書皝遣人馳謂慕容翰曰涉夜干勇冠三軍冠古玩翻宜小避之翰曰逸豆歸掃其國内精兵以屬涉夜干屬之欲翻涉夜干素有勇名一國所賴也今我克之其國不攻自潰矣且吾孰知涉夜干之為人孰與熟同雖有虚名實易與耳不宜避之以挫吾兵氣遂進戰翰自出衝陳易以䜴翻陳讀曰陣涉夜干出應之慕容霸從傍邀擊遂斬涉夜干宇文士卒見涉夜干死不戰而潰燕軍乘勝逐之遂克其都城宇文國都遼西紫䝉川逸豆歸走死漠北宇文氏由是散亡皝悉収其畜産資貨徙其部衆五千餘落於昌黎闢地千餘里更命涉夜干所居城曰威徳城使弟彪戍之而還高詡劉佩皆中流矢卒還音旋中竹仲翻卒子恤翻詡善天文皝嘗謂曰卿有佳書而不見與何以為忠藎詡曰臣聞人君執要人臣執職執要者逸執職者勞是以后稷播種堯不預焉占候天文晨夜甚苦非至尊之所宜親殿下將焉用之焉於䖍翻皝黙然初逸豆歸事趙甚謹貢獻屬路屬之欲翻及燕人伐逸豆歸趙王虎使右將軍白勝并州刺史王霸自甘松出救之甘松在濡源之東突門嶺之西比至比必寐翻宇文氏已亡因攻威徳城不克而還慕容彪追擊破之慕容翰之與宇文氏戰也為流矢所中臥病積時不出後漸差差楚懈翻疾瘳也於其家試騁馬或告翰稱病而私習騎乘疑欲為變燕王皝雖藉翰勇畧然中心終忌之乃賜翰死翰曰吾負罪出奔既而復還翰出奔見九十五卷成帝咸和八年還見上卷咸康六年復扶又翻今日死已晚矣然羯賊跨據中原吾不自量量音良欲為國家蕩壹區夏為于偽翻夏戸雅翻此志不遂没有遺恨命矣夫飲藥而卒年考異曰三十國春秋云永和二九月殺翰燕書翰傳翰嘗臨陳為流矢所中病臥嵗時不出入後漸差試馬按自討宇文後翰未嘗預攻戰自建元二年正月至永和二年九月已踰年矣三十國春秋恐誤今從載記翰傳代王什翼犍遣其大人長孫秩迎婦於燕拓䟦鄰之統國也以次兄為㧞㧞氏厥後孝文帝用夏變夷改為長孫氏史以華言書其後所改姓夏四月凉州將張瓘敗趙將王擢于三交城三交城在朔方之西宋白曰三交土堠在綏州東北七十五里將即亮翻敗補邁翻初趙領軍王朗言於趙王虎曰盛冬雪寒而皇太子使人伐宮材引於漳水役者數萬吁嗟滿道陛下宜因出游罷之虎從之太子宣怒㑹熒惑守房天文志房四星為明堂天子布政之宮也亦四輔也下第一星上將也次次將也次次相也上星上相也熒惑守房心王者惡之熒惑天子理也故曰雖有明天子必謹視熒惑所在宣使太史令趙攬言於虎曰房為天王今熒惑守之其殃不細宜以貴臣王姓者當之虎曰誰可者攬曰無貴於王領軍虎意惜朗使攬更言其次攬無以對因曰其次唯中書監王波耳虎乃下詔追罪波前議楛矢事見上卷成帝咸康六年腰斬之及其四子投尸漳水既而愍其無罪追贈司空封其孫為侯趙平北將軍尹農攻燕凡城不克而還漢太史令韓皓上言熒惑守心乃宗廟不修之譴以七曜所經周天三百六十五度四分度之一考之房六度太心三度太五星入之乆而不去謂之守時趙太史以為熒惑守房漢太史以為熒惑守心是則躔度之難知也漢主勢命羣臣議之相國董皎侍中王嘏以為景武創業獻文承基至親不逺無宜疎絶乃更命祀成始祖太宗皆謂之漢李特諡景武皇帝廟號始祖雄諡武皇帝廟號太宗驤諡獻皇帝壽諡文皇帝特驤兄弟也雄壽從兄弟也故曰至親不逺李壽改立宗廟見上卷成帝咸康四年征西將軍庾翼使梁州刺史桓宣擊趙將李羆於丹水為羆所敗敗補邁翻翼貶宣為建威將軍宣慙憤成疾秋八月庚辰卒翼以長子方之為義城太守沈約曰義成郡晉孝武立治襄陽五代志曰襄陽郡榖城縣舊曰義城置義城郡又按晉書桓宣傳陶侃使宣鎮襄陽以其淮南部曲立義成郡則此郡立於咸和中明矣城當作成代領宣衆又以司馬應誕為襄陽太守參軍司馬勲為梁州刺史戍西城西城縣時屬魏興郡中書令褚裒固辭樞要閏月丁巳以裒為左將軍都督兖州徐州之琅邪諸軍事兖州刺史鎮金城金城在江乘之蒲洲琅邪僑郡亦以為治所帝疾篤庾氷庾翼欲立㑹稽王昱為嗣㑹工外翻中書監何充建議立皇子聃聃他含翻帝從之九月丙申立聃為皇太子戊戍帝崩于式乾殿年二十三建康宮殿皆用洛都舊名己亥何充以遺㫖奉太子即位大赦由是氷翼深恨充尊皇后褚氏為皇太后時穆帝方二嵗太后臨朝稱制朝直遥翻下同何充加中書監錄尚書事充自陳既録尚書不宜復監中書中書監之監古陷翻監中書之監古銜翻復扶又翻下同許之復加侍中充以左將軍褚裒太后之父宜綜朝政上疏薦裒參錄尚書乃以裒為侍中衛將軍錄尚書事持節督刺史如故裒蒲侯翻裒以近戚懼獲譏嫌上疏固請居藩改授都督徐兖青三州揚州之二郡諸軍事衛將軍徐兖二州刺史鎮京口揚州之二郡晉陵義興也尚書奏裒見太后在公庭則如臣禮私覿則嚴父朱熹曰私覿以私禮見也嚴尊也從之冬十月乙丑葬康帝于崇平陵江州刺史庾氷有疾太后徴氷輔政氷辭十一月庚辰卒庾翼以家國情事言以兄弟之情則當赴氷之喪以國事則當治兵以國収復留子方之為建武將軍戍襄陽方之年少少詩照翻以參軍毛穆之為建武司馬以輔之穆之寳之子也毛寳豫有平蘇峻之功邾城之陷寳死焉翼還鎮夏口夏戸雅翻詔翼復督江州又領豫州刺史翼辭豫州復欲移鎮樂鄉詔不許翼仍繕修軍器大佃積榖以圖後舉佃亭年翻趙王虎作河橋於靈昌津采石為中濟滑臺故鄭之廩延也城下有延津又西為靈昌津石勒攻劉曜途出於此以河氷泮為神靈之助號是處為靈昌津大河深廣必下石為中濟兩岸繫巨絙以維船然後可以立橋如河陽橋蒲津橋之中潬是也采石採取石也濟如宇石下輙隨流河流漂急故石下輙隨流而去用功五千餘萬而橋不成虎怒斬匠而罷孝宗穆皇帝上之上諱聃宇彭子康帝子也諡法中情見貎曰穆永和元年春正月甲戌朔皇太后設白紗帷於太極殿抱帝臨軒趙義陽公鑒鎮闗中役煩賦重文武有長髮者輙㧞為冠纓纓冠系也餘以給宮人長史取髪白趙王虎虎徴鑒還鄴以樂平公苞代鎮長安發雍洛秦并州十六萬人石虎分司州之河南𢎞農滎陽兖州之陳留東燕置洛州雍於用翻治長安未央宮治直之翻虎好獵晚嵗體重不能跨馬乃造獵車千乘好呼到翻乘繩證翻刻期校獵自靈昌津南至滎陽東極陽都為獵場陽都縣前漢屬城陽國後漢晉屬琅邪國賢曰陽都故城在今沂州沂水縣南又曰在承縣南使御史監察監工銜翻其中禽獸有犯者辠至大辟辟毘亦翻民有美女佳牛馬御史求之不得皆誣以犯獸論死者百餘人發諸州二十六萬人修洛陽宮發百姓牛二萬頭配朔州牧官趙置牧官于朔方増置女官二十四等東宮十二等公侯七十餘國皆九等大發民女三萬餘人料為三等以配之太子諸公私令采發者又將萬人郡縣務求美色多强奪人妻殺其夫及夫自殺者三千餘人至鄴虎臨軒簡第以使者為能封侯者十二人荆楚揚徐之民流叛畧盡荆楚以國言揚徐以州言趙之壤地南陽汝南則故荆楚之地也壽陽則揚州之地也彭城下邳東海琅邪東筦則徐州之地也一曰荆楚揚徐之民先被掠及流入北界者今流叛畧盡守令坐不能綏懐下獄誅者五十餘人下遐嫁翻金紫光禄大夫逯明金紫光禄大夫即光禄大夫加金章紫綬者自此遂以為官稱逯盧谷翻因侍切諫因侍見而切諫也虎大怒使龍騰拉殺之盧募驍勇拜為龍騰中郎拉落合翻燕王皝以牛假貧民使佃苑中佃亭年翻稅其什之八自有牛者稅其七記室參軍封裕上書諫以為古者什一而稅天下之中正也降及魏晉仁政衰薄假官田官牛者不過稅其什六自有牛者中分之猶不取其七八也自永嘉以來海内蕩析武宣王綏之以徳慕容廆諡武宣王華夷之民萬里輻湊襁負而歸之者若赤子之歸父母是以户口十倍於舊無田者什有三四及殿下繼統南摧彊趙東兼高句麗北取宇文民歸慕容廆事見八十八卷愍帝建興元年皝破趙事見上卷成帝咸康四年破高麗見上卷咸康八年取宇文見上康帝建元二年拓地三千里増民十萬户是宜悉罷苑囿以賦新民無牛者官賜之牛不當更収重稅也且以殿下之民用殿下之牛牛非殿下之有將何在哉如此則戎旗南指之日民誰不簞食壺漿以迎王師用孟子語食祥吏翻石虎誰與處矣處昌呂翻下同川瀆溝渠有廢塞者塞悉則翻下同皆應通利旱則灌溉潦則疏泄一夫不耕或受之飢况游食數萬何以得家給人足乎今官司猥多虚費廩禄茍才不周用皆宜澄汰以用水為諭澄之使清而汏去其沙泥也工商末利宜立常員學生三年無成徒塞英儁之路皆當歸之於農塞悉則翻殿下聖徳寛明博察芻蕘文王詢于芻蕘刈中曰芻采薪曰蕘蕘如招翻參軍王憲大夫劉明並以言事忤㫖主者處以大辟主者謂其時主斷憲明之獄者忤五故翻處昌呂翻辟毘亦翻殿下雖恕其死猶免官禁錮夫求諌諍而罪直言是猶適越而北行必不獲其所志矣右長史宋該等阿媚苟容輕劾諫士劾戸槩翻又户得翻已無骨鯁骨鯁以喻剛彊正直者毛晃曰鯁魚骨又骨不下咽為鯁以其謇諤難受如魚骨之咈咽也嫉人有之掩蔽耳目不忠之甚者也皝乃下令稱覽封記室之諫孤實懼焉國以民為本民以穀為命可悉罷苑囿以給民之無田者實貧者官與之牛力有餘願得官牛者並依魏晉舊法溝瀆各有益者令以時修治治直之翻今戎事方興勲伐既多王功曰勲積功曰伐官未可減俟中原平壹徐更議之工商學生皆當裁擇夫人臣關言于人主至難也關白也王褒聖主得賢臣頌曰進退得關其忠雖有狂妄當擇其善者而從之王憲劉明雖罪應廢黜亦由孤之無大量也可悉復本官仍居諫司封生蹇蹇深得王臣之體易曰王臣蹇蹇匪躬之故其賜錢五萬宣示内外有欲陳孤過者不拘貴賤勿有所諱皝雅好文學好呼到翻常親臨庠序講授考校學徒至千餘人頗有妄濫者故封裕及之詔徴衛將軍褚裒欲以為揚州刺史錄尚書事吏部尚書劉遐長史王胡之說裒曰說輸芮翻㑹稽王令徳雅望國之周公也足下宜以大政授之裒乃固辭歸藩壬戍以㑹稽王昱為撫軍大將軍錄尚書六條事劉聰以其子粲為丞相領大將軍錄尚書事劉延年錄尚書六條事錄六條事在錄尚書事之下是必魏晉之間先有是官聰承而置之也注又見前㑹工外翻昱清虛寡欲尤善𤣥言常以劉惔王濛及潁川韓伯為談客惔徒甘翻又辟郗超為撫軍掾謝萬為從事中郎超鑒之孫也郗鑒南渡初名臣掾以絹翻少卓犖不羈少詩照翻犖呂角翻卓犖不羈卓高也犖有力也言其氣韻甚高且有才力譬之馬駒逸羣不可得而羈縶也父愔簡黙冲退而嗇於財積錢至數千萬愔於今翻嘗開庫任超所取超散施親故一日都盡史言郗超才具足以用世晉朝不能用惜其為桓温用也施式䜴翻萬安之弟也清曠秀邁亦有時名燕有黒龍白龍見于龍山龍山在龍城之東見賢徧翻交首遊戲解角而去燕王皝親祀以太牢赦其境内命所居新宮曰和龍都亭肅侯庾翼疽發于背諡法剛克為伐曰肅執心决斷曰肅疽千余翻表子爰之行輔國將軍荆州刺史委以後任司馬義陽朱燾為南蠻校尉以千人守巴陵秋七月庚子卒翼部將于瓚等作亂于姓也左傳宋有于犨瓚藏旱翻殺冠軍將軍曹據冠古玩翻朱燾與安西長史江虨虨逋聞翻建武司馬毛穆之庾翼以子方之為建武將軍守襄陽以穆之為司馬穆之即虎生也穆之字憲祖小字虎生名犯王靖后諱故改行宇後又以桓温母諱憲乃更稱小字按晉書后妃傳哀靖王皇后諱穆之將軍袁真共誅之虨統之子也八月豫州刺史路永叛奔趙趙王虎使永屯壽春路永蘇峻降將也庾翼既卒朝議皆以諸庾世在西藩人情所安宜依翼所請以庾爰之代其任何充曰荆楚國之西門戸口百萬北帶彊胡西鄰勁蜀地勢險阻周旋萬里得人則中原可定失人則社稷可憂陸抗所謂存則呉存亡則呉亡者也陸抗垂没之疏見八十卷武帝泰始十年豈可以白面少年當之哉少詩照翻桓温英畧過人有文武器幹西夏之任無出温者夏戸雅翻議者又曰庾爰之肻避温乎如令阻兵恥懼不淺言不能制爰之將為國恥又有可懼者葢以王敦蘇峻待爰之也充曰温足以制之諸君勿憂丹陽尹劉惔每奇温才然知其有不臣之志謂㑹稽王昱曰温不可使居形勝之地其位號常宜抑之勸昱自鎮上流以已為軍司昱不聴又請自行亦不聴劉惔談客耳其言桓温無不中葢深知温之才者設使昱鎮上流惔為司馬未足以敵燕秦揚子曰非茍知之亦允蹈之非知之難行之為難也惔徒甘翻庚辰以徐州刺史桓温為安西將軍持節都督荆司雍益梁寧六州諸軍事領䕶南蠻校尉荆州刺史為桓温專制晉朝張本雍於用翻爰之果不敢争又以劉惔監沔中諸軍事領義成太守監工銜翻代庾方之徙方之爰之于豫章桓温嘗乘雪欲獵先過劉惔惔見其裝束甚嚴謂之曰老賊欲持此何為温笑曰我不為此卿安得坐談乎温以此語答惔盡之矣温亦知惔之悉其才故發是言漢主勢之弟大將軍廣以勢無子求為太弟勢不許馬當解思明諫曰陛下兄弟不多若復有所廢復扶又翻將益孤危固請許之勢疑其與廣有謀収當思明斬之夷其三族儲君不可求使馬當解思明為國計固當從容言之使其主自悟安可固以為請也相從而就死宜矣解戸買翻遣太保李奕襲廣於涪城貶廣為臨卭侯廣自殺思明被収歎曰國之不亡以我數人在也涪音浮卭渠容翻被皮義翻今其殆矣言笑自若而死思明有智畧敢諌諍馬當素得人心及其死士民無不哀之冬十月燕王皝使慕容恪攻高句麗㧞南蘇南蘇城在南陜之東唐平高麗置南蘇州置戍而還還從宣翻又如字十二月張駿伐焉耆降之降戸江翻是嵗駿分武威等十一郡為凉州駿分武威武興西平張掖酒泉建康西郡湟河晉興須武安故合十一郡為凉州以世子重華為刺史分興晉等八郡為河州駿分興晉金城武始南安永晉大夏武成漢中八郡為河州以寧戎校尉張瓘為刺史分燉煌等三郡及西域都䕶三營為沙州晉志惟載敦煌晉昌二郡西域都䕶張茂以校尉玉門大䕶軍三郡三營為沙州而一郡不見于史葢缺文也燉徒門翻以西胡校尉楊宣為刺史駿自稱大都督大將軍假凉王督攝三州始置祭酒郎中大夫舍人謁者等官官號皆倣天朝朝直遥翻下同而微變其名車服旌旗擬於王者趙王虎以冠軍將軍姚弋仲為持節十郡六夷大都督冠軍大將軍冠古玩翻弋仲清儉鯁直不治威儀言無畏避虎之簒弋仲正色責之可以見其言無畏避矣治直之翻下同虎甚重之朝之大議毎與參决公卿皆憚而下之朝直遥翻下遐嫁翻武城左尉虎寵姬之弟也東武城縣屬清河郡唐屬貝州弋仲營于廣川清河之灄頭嘗入弋仲營侵擾其部衆弋仲執而數之曰爾為禁尉禁尉者言尉職所以禁止姦非也數所具翻迫脅小民我為大臣目所親見不可縱也命左右斬之尉叩頭流血左右固諫乃止燕王皝以為古者諸侯即位各稱元年于是始不用晉年號自稱十二年燕自是不復禀命于晉矣趙王虎使征東將軍鄧恒將兵數萬屯樂安治攻具為取燕之計恒戸登翻燕王皝以慕容霸為平狄將軍平狄將軍始于漢光武以命龎萌戍徒河恒畏之不敢犯二年春正月丙寅大赦己卯都鄉文穆公何充卒充有器局臨朝正色以社稷為己任所選用皆以功效不私親舊初夫餘居于鹿山夫餘在𤣥莬北千餘里鹿山葢直其地杜佑曰夫餘國有印丈曰濊王之印國有故城名濊城葢本濊貊之地其國在長城之北去𤣥莬千里南與高麗東與挹婁西與鮮卑接為百濟所侵東夷有三韓國一曰馬韓二曰辰韓三曰弁韓馬韓有五十四國百濟其一也後漸强大兼諸小國其國本與句麗俱在遼東之東千餘里隋書曰百濟出自東明其後有仇台者始立其國漸以强盛初以百家濟海因號百濟杜佑曰百濟南接新羅北距高麗千餘里西限大海處小海之南部落衰散西徙近燕而不設備近其靳翻燕王皝遣世子儁帥慕容軍慕容恪慕輿根三將軍萬七千騎襲夫餘帥讀曰率儁居中指授軍事皆以任恪遂㧞夫餘虜其王𤣥及部落五萬餘口而還皝以𤣥為鎮軍將軍妻以女妻子細翻二月癸丑以左光禄大夫蔡謨領司徒與會稽王昱同輔政褚裒薦前光禄大夫顧和前司徒左長史殷浩三月丙子以和為尚書令浩為建武將軍揚州刺史和有母喪固辭不起謂所親曰古人有釋衰絰從王事者衰倉回翻以其才足幹時故也如和者正足以虧孝道傷風俗耳識者美之浩亦固辭㑹稽王昱與浩書曰屬當厄運屬之欲翻危弊理極足下沈識淹長沈持林翻足以經濟若復深存挹退復扶又翻茍遂本懐吾恐天下之事於此去矣足下去就即時之廢興則家國不異言國興則家亦與之俱興國廢則家亦與之俱廢也足下宜深思之浩乃就職夏四月己酉朔日有食之五月丙戌西平忠成公張駿薨官屬上世子重華為使持節大都督太尉䕶羌校尉凉州牧西平公假凉王上時掌翻赦其境内尊嫡母嚴氏為太王太后母馬氏為王太后趙中黄門嚴生惡尚書朱軌惡烏路翻㑹久雨生譖軌不修道路又謗訕朝政朝直遥翻下同趙王虎囚之蒲洪諫曰陛下既有襄國鄴宮又修長安洛陽宮殿將以何用作獵車千乘環數千里以養禽獸環音宦奪人妻女十餘萬口以實後宮事並見上年聖帝明王之所為固若是乎今又以道路不修欲殺尚書陛下徳政不修天降淫雨七旬乃霽霽方二日雖有鬼兵百萬亦未能去道路之塗潦去羌呂翻而况人乎政刑如此其如四海何其如後代何言天下後世必將貶議其失也願止作徒罷苑囿出宮女赦朱軌以副衆望虎雖不悅亦不之罪為之罷長安洛陽作役為于偽翻而竟誅朱軌又立私論朝政之法聴吏告其君奴告其主公卿以下朝覲以目相顧不敢復相過從談語復扶又翻過古未翻經過也石虎之法雖周厲王之監謗秦始皇之禁耦語不如是之甚也趙將軍王擢擊張重華襲武街執䕶軍曹權胡宣張駿置五屯䕶軍武街其一也在隴西水經注曰狄道縣西南有武街城晉志惠帝分隴西立狄道郡又立武街縣屬焉徙七千餘户于雍州雍於用翻凉州刺史麻秋趙使麻秋攻凉州故授以刺史將軍孫伏都攻金城太守張冲請降凉州震恐重華悉發境内兵使征南將軍裴恒將之以禦趙恒壁於廣武張寔分金城之令居枝陽二縣又立永登縣合三縣立廣武郡水經注廣武城在枝陽縣西五代志武威郡允吾縣後魏置曰廣武劉昫曰唐蘭州廣武縣漢枝陽縣地恒户登翻久而不戰凉州司馬張耽言於重華曰國之存亡在兵兵之勝敗在將今議者舉將多推宿舊將息亮翻夫韓信之舉非舊徳也舉韓信事見九卷漢高帝元年葢明主之舉舉無常人才之所堪則授以大事今彊冦在境諸將不進人情危懼主簿謝艾兼資文武可用以禦趙重華召艾問以方畧艾願請兵七千人必破趙以報重華拜艾中堅將軍給步騎五千使擊秋艾引兵出振武夜有二梟鳴于牙中艾曰六博得梟者勝爾雅翼博之采有梟博兼行惡道故以梟為采今梟鳴牙中克敵之兆也進與趙戰大破之斬首五千級重華封艾為福禄伯福禄縣自漢以來屬酒泉郡宋白曰肅州福禄縣周隋為樂涫縣武徳改為福禄取漢舊名也麻秋之克金城也縣令敦煌車濟不降伏劒而死縣令謂金城縣令也敦徒門翻秋又攻大夏大夏縣漢屬隴西郡張軌分屬晉興郡後又分置大夏郡水經注大夏縣故城在枹罕縣西南北臨洮水劉昫曰河州大夏縣漢古縣也取縣西大夏水以名之䕶軍梁式執太守宋晏以城應秋秋遣晏以書誘致宛戍都尉敦煌宋矩誘音酉敦徒門翻矩曰為人臣功既不成唯有死節耳先殺妻子而後自刎刎扶粉翻秋曰皆義士也収而葬之冬漢太保李奕自晉壽舉兵反蜀人多從之衆至數萬漢主勢登城拒戰時奕兵進逼成都奕單騎突門門者射而殺之騎奇寄翻射而亦翻其衆皆潰勢大赦境内改元嘉寧勢驕淫不恤國事多居禁中罕接公卿疎忌舊臣信任左右讒諂並進刑罰苛濫由是中外離心蜀土先無魯皓翻西南夷名北史曰葢南蠻之别種卭笮川洞之間散居山谷種類甚多畧無氏族之别又無名字所生男女唯以長幼次第呼之其丈夫稱阿謩阿叚婦人阿夷阿等之類皆語之次第稱謂也至是始從山出自巴西至犍為梓潼犍居言翻布滿山谷十餘萬落不可禁制大為民患加以饑饉四境之内遂至蕭條安西將軍桓温將伐漢將佐皆以為不可江夏相袁喬勸之曰夫經畧大事固非常情所及智者了於胷中不必待衆言皆合也今為天下之患者胡蜀二冦而已蜀雖險固比胡為弱將欲除之宜先其易者易以䜴翻李勢無道臣民不附且恃其險逺不修戰備宜以精卒萬人輕齎疾趨比其覺之比必寐翻我已出其險要已出其險要謂已踰險而出平地也可一戰擒也蜀地富饒戸口繁庶諸葛武侯用之抗衡中夏諸葛亮謚忠武侯夏戸雅翻若得而有之國家之大利也論者恐大軍既西胡必闚覦此似是而非胡聞我萬里逺征以為内有重備必不敢動縱有侵軼軼直結翻又音逸杜預曰軼突也縁江諸軍足以拒守必無憂也温從之喬瓌之子也袁瓌見九十五卷成帝咸康三年瓌工回翻十一月辛未温帥益州刺史周撫南郡太守譙王無忌伐漢帥讀曰率下同拜表即行委安西長史范汪以留事加撫都督梁州之四郡諸軍事梁州四郡涪陵巴東巴西巴郡也使袁喬帥二千人為前鋒朝廷以蜀道險逺温衆少而深入少詩沼翻皆以為憂惟劉惔以為必克或問其故惔曰以博知之温善博者也不必得則不為但恐克蜀之後温終專制朝廷耳三年春二月桓温軍至青衣青衣縣漢屬蜀郡後漢順帝陽嘉二年更名漢嘉蜀立為漢嘉郡劉昫曰眉州青神縣臨青衣江西魏置青衣縣青衣水出盧山徼外東北流至武陽而合于江杜佑曰嘉州故夜郎國漢武開置犍為郡治龍游縣漢之青衣道也在大江青衣二水之㑹漢主勢大發兵遣叔父右衛將軍福從兄鎮南將軍權前將軍昝堅等將之自山陽趣合水山陽之地葢在岷江之北峨眉山之陽水經注江水東南過犍為武陽縣青衣水沬水從西南來合注之所謂合水當是此地從才用翻昝子感翻將即亮翻趣七喻翻諸將欲設伏於江南以待晉兵昝堅不從引兵自江北鴛鴦碕渡向犍為碕渠宜翻曲岸也犍為唐嘉州犍為縣即其地在州東南三月温至彭模彭模即漢犍為郡武陽縣之彭亡聚也岑彭死處水經注江水自武陽東至彭亡聚謂之平模水亦曰外水平模去成都二百里在今眉州彭山縣議者欲分為兩軍異道俱進以分漢兵之埶袁喬曰今懸軍深入萬里之外勝則大功可立不勝則噍類無遺噍才肖翻當合執齊力以取一戰之捷若分兩軍則衆心不一萬一偏敗偏敗謂兩道並進或一軍為蜀所敗大事去矣不如全軍而進棄去釡甑齎三日糧以示無還心勝可必也温從之留參軍孫盛周楚將羸兵守輜重將即亮翻下同重直用翻温自將步卒直指成都楚撫之子也李福進攻彭模孫盛等奮擊走之温進遇李權三戰三捷漢兵散走歸成都鎮軍將軍李位都迎詣温降降戸江翻下同昝堅至犍為犍居言翻乃知與温異道還自沙頭津濟比至比必寐翻温已軍於成都之十里陌堅衆自潰勢悉衆出戰于成都之笮橋水經注萬里橋西上曰夷橋亦曰笮橋笮疾各翻温前鋒不利叅軍龔䕶戰死矢及温馬首衆懼欲退而鼓吏誤鳴進鼓雷鼔以進衆曰進鼔袁喬㧞劒督士卒力戰遂大破之温乘勝長驅至成都縱火燒其城門漢人惶懼無復鬬志復扶又翻勢夜開東門走至葭萌葭音家使散騎常侍王幼送降文於温散悉亶翻騎奇寄翻自稱畧陽李勢叩頭死罪李氏其先自巴西遷畧陽尋輿櫬面縳詣軍門温解縳焚櫬送勢及宗室十餘人於建康櫬初覲翻引漢司空譙獻之等以為參佐舉賢旌善蜀人悅之日南太守夏侯覽貪縱侵刻胡商又科調船材夏戸雅翻調徒弔翻云欲有所討由是諸國恚憤恚於避翻林邑王文攻陷日南將士死者五六千將即亮翻殺覽以尸祭天檄交州刺史朱蕃請以郡北横山為界今邕州南界有横山其山横截江河我朝置横山寨及買馬場按劉昫舊唐志漢武帝開百越於交趾郡南三千里置日南郡治于朱吾林邑即漢日南郡之象林縣在郡南界四百里後漢時中原喪亂象林縣人區連殺縣令自稱林邑王遂為林邑國邕州渡海乃至交趾交趾三千里乃至日南此横山自在日南郡北界非今邕州之横山文既去蕃使督䕶劉雄戍日南漢故尚書僕射王誓鎮東將軍鄧定平南將軍王潤將軍隗文等皆舉兵反隗五猥翻衆各萬餘桓温自擊定使袁喬擊文皆破之温命益州刺史周撫鎮彭模斬王誓王潤温留成都三十日振旅還江陵傳曰入而振旅杜預注振整也旅衆也李勢至建康封歸義侯夏四月丁巳鄧定隗文等入據成都征虜將軍楊謙棄涪城退保徳陽涪音浮趙凉州刺史麻秋攻枹罕晉昌太守郎坦以城大難守惠帝分敦煌酒泉為晉昌郡枹罕縣前漢屬金城郡後漢屬隴西郡張軌分屬晉興郡水經注晉昌川在湟中浩亹縣西南劉朐曰晉昌郡漢寘安縣地唐為晉昌縣𤓰州治所枹音膚欲棄外城武成太守張悛曰武成郡亦張氏置悛丑縁翻又七倫翻棄外城則動衆心大事去矣寧戎校尉張璩從悛言固守大城寧戎校尉亦張氏所置郎坦張悛葢以各郡太守從張璩守枹罕璩求於翻秋帥衆八萬圍壍數重帥讀曰率下同重直龍翻壍七艶翻雲梯地突百道皆進地突者為地道突出於城中城中禦之秋衆死傷數萬趙王虎復遣其將劉渾等帥步騎二萬㑹之復扶又翻將即亮翻下除將軍外並同郎坦恨言不用教軍士李嘉潜引趙兵千餘人登城璩督諸將力戰殺二百餘人趙兵乃退璩燒其攻具秋退保大夏夏戸雅翻虎以中書監石寧為征西將軍帥并司州兵二萬餘人為秋等後繼張重華將宋秦等帥戸二萬降于趙降戸江翻重華以謝艾為使持節軍師將軍使疏吏翻帥步騎三萬進軍臨河艾乘軺車戴白幍軺音遥幍古洽翻鳴鼓而行秋望見怒曰艾年少書生冠服如此輕我也命黑矟龍驤三千人馳擊之矟音朔驤思將翻艾左右大擾或勸艾宜乘馬艾不從下車踞胡床胡床葢今交椅之類孔穎達曰今之交牀制本自虜來隋以䜟有胡改名交牀指麾處分處昌呂翻分扶問翻趙人以為有伏兵懼不敢進别將張瑁自閒道引兵截趙軍後瑁莫報翻閒古莧翻趙軍退艾乘勢進擊大破之斬其將杜勲汲魚獲首虜萬三千級秋單馬奔大夏五月秋與石寧復帥衆十二萬進屯河南復扶又翻劉寧王擢畧地晉興廣武武街張軌分西平界置晉興郡至于曲栁曲栁地名在洪池嶺北張重華使將軍牛旋拒之退守枹罕姑臧大震重華欲親出拒之謝艾固諫索遐曰索昔各翻君者一國之鎮不可輕動乃以艾為使持節都督征討諸軍事行衛將軍遐為軍正將軍古有軍正黄帝法曰正無屬將軍將軍有罪以聞葢軍中執法者也張氏遂以為將軍之號帥步騎二萬拒之别將楊康敗劉寧于沙阜敗補邁翻寧退屯金城六月辛酉大赦秋七月林邑復䧟日南復扶又翻下同殺督䕶劉雄隗文鄧定等立故國師范長生之子賁為帝而奉之李雄以范長生為國師以妖異惑衆蜀人多歸之妖於驕翻趙王虎復遣征西將軍孫伏都將軍劉渾帥步騎二萬㑹麻秋軍長驅濟河擊張重華遂城長最長最地名在金城河北重考異曰晉春秋作上最今從華傳謝艾建牙誓衆有風吹旌旗東南指索遐曰風為號令今旌旗指敵天所贊也風雲氣候雜占曰風不旁勃旌旗暈暈隨風而揚舉或向敵終日軍行有功勝候也艾軍于神鳥王擢與艾前鋒戰敗走還河南八月戊午艾進擊秋大破之秋遁歸金城虎聞之歎曰吾以偏師定九州今以九州之力困於枹罕彼有人焉未可圖也艾還討叛虜斯骨真等萬餘落皆破平之趙王虎據十州之地幽并冀司豫兖青徐雍秦十州聚斂金帛歛力贍翻及外國所獻珍異府庫財物不可勝紀勝音升猶自以為不足悉發前代陵墓取其金寶沙門呉進言於虎曰袁宏漢記曰沙門漢言息也葢息欲以歸於無為也胡運將衰晉當復興宜苦役晉人以厭其氣厭一兼翻厭勝也虎使尚書張羣發近郡男女十六萬人車十萬乘運土築華林苑及長牆于鄴北廣袤數十里乘繩證翻華如字袤音茂申鍾石璞趙攬等上疏陳天文錯亂百姓彫弊虎大怒曰使苑牆朝成吾夕没無恨矣促張羣使然燭夜作暴風大雨死者數萬人郡國前後送蒼麟十六白鹿七虎命司虞張曷柱調之以駕芝葢晉職官志太僕之屬有典虞都尉趙之司虞即是官也張曷柱人姓名芝葢者葢為瑞芝之形大朝會列於殿庭朝直遥翻九月命太子宣出祈福于山川因行遊獵宣乘大輅羽葆華葢建天子旌旗十有六軍戎卒十八萬出自金明門水經注鄴城有七門南曰鳯陽門中曰中陽門次曰廣陽門東曰建春門北曰廣徳門次曰廏門西曰西明門葢即金明門也虎從其後宮升陵霄觀望之觀古玩翻笑曰我家父子如此自非天崩地陷當復何愁但抱子弄孫日為樂耳復扶又翻樂音洛宣所舍輙列人為長圍四面各百里驅禽獸至暮皆集其所使文武皆跪立重行圍守重直龍翻行戸剛翻炬火如晝命勁騎百餘馳射其中宣與姬妾乘輦臨觀獸盡而止或獸有迸逸迸比孟翻當圍守者有爵則奪馬步驅一日無爵則鞭之一百士卒飢凍死者萬有餘人所過三州十五郡資儲皆無孑遺以下韜所出徴之宣所過三州葢司兖豫也虎復命韜繼出自并州至于秦雍亦如之復扶又翻雍於用翻宣怒其與已鈞敵愈嫉之宦者趙生得幸于宣無寵於韜微勸宣除之於是始有殺韜之謀矣趙麻秋又襲張重華將張瑁敗之據載記瑁時屯河陝敗補邁翻斬首三千餘級枹罕䕶軍李逵帥衆七千降于趙自河以南氐羌皆附於趙趙强凉弱凉戰雖數勝人心隨强弱而為向背况復有張瑁之敗乎帥讀曰率降戸江翻冬十月乙丑遣侍御史俞歸至凉州授張重華侍中大都督督隴右闗中諸軍事大將軍凉州刺史西平公歸至姑臧重華欲稱凉王未肻受詔使所親沈猛私謂歸曰主公奕世為晉忠臣奕世累葉也今曽不如鮮卑何也朝廷封慕容皝為燕王而主公纔為大將軍何以褒勸忠賢乎明臺宜移河右共勸州主為凉王歸為侍御史以將命故謂之明臺移謂移文人臣出使茍利社稷專之可也使疏吏翻歸曰吾子失言古者列國之大夫率相謂曰吾子儀禮注曰子者男子之美稱言吾子相親之辭昔三代之王也爵之貴者莫若上公三代封建列爵五等曰公侯伯子男上公九命作伯及周之衰呉楚始僭號稱王而諸侯不之非葢以蠻夷畜之也借使齊魯稱王諸侯豈不四面攻之乎漢高祖封韓彭為王尋皆誅滅葢權時之宜非厚之也聖上以貴公忠賢故爵以上公任以方伯寵榮極矣豈鮮卑夷狄所可比哉且吾聞之功有大小賞有重輕今貴公始繼世而為王言重華始繼父位未有功于晉而求為王也若帥河右之衆帥讀曰率東平胡羯修復陵廟迎天子返洛陽將何以加之乎重華乃止武都氐王楊初遣使來稱藩詔以初為使持節征南將軍雍州刺史仇池公使疏吏翻雍於用翻十二月振威䕶軍蕭敬文殺征虜將軍楊謙攻涪城陷之自稱益州牧遂取巴西通于漢中振威䕶軍晉官也蕭敬文以晉新并蜀又有范賁之亂故亦乘之而反涪音浮資治通鑑卷九十七
