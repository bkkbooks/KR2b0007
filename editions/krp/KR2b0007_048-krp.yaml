body:
  text: 資治通鑑巻四十八宋司馬光撰胡三省音註漢紀四十起𤣥黓執徐盡旃䝉大荒落凡十四年孝和皇帝下永元四年春正月遣大將軍左校尉耿䕫授於除鞬印綬校户教翻鞬九言翻使中郎將任尚持節衞䕶屯伊吾如南單于故事任音壬初廬江周榮辟袁安府安舉奏竇景事見上卷元年及争立北單于事見上卷上年皆榮所具草竇氏客太尉掾徐齮深惡之掾俞絹翻齮魚倚翻惡烏路翻脅榮曰子為袁公腹心之謀排奏竇氏竇氏悍士刺客滿城中謹備之矣悍下罕翻又矦旰翻榮曰榮江淮孤生得備宰士賢曰榮辟司徒府故稱宰士縱為竇氏所害誠所甘心因敇妻子敕戒也若卒遇飛禍卒讀曰猝賢曰飛禍言倉卒而死也余謂飛禍者言刺客竊發不可得而備若鳥之飛集也無得殯斂斂力贍翻冀以區區腐身覺悟朝廷三月癸丑司徒袁安薨閏月丁丑以太常丁鴻為司徒夏四月丙辰竇憲還至京師還從宣翻又如字六月戊戍朔日有食之丁鴻上疏曰昔諸吕擅權統嗣幾移事見高后紀幾居希翻哀平之末廟不血食事見王莽紀鴻引此事以指言外戚之禍故雖有周公之親而無其德不得行其埶也賢曰言親賢兼重方可執政今大將軍雖欲敕身自約不敢僣差然而天下逺近皆惶怖承㫖怖普布翻刺史二千石初除謁辭求通待報初除而謁之官則辭求通者求通名也待報者得謁與不得謁得辭與不得辭皆待報也雖奉符璽受臺敕符璽所以為信初除者詣尚書臺受敕璽斯氏翻不敢便去久者至數十日背王室背蒲妹翻向私門此乃上威損下權盛也人道悖於下效騐見於天雖有隱謀神照其情垂象見戒以告人君悖蒲内翻見賢遍翻禁微則易易以䜴翻救末則難人莫不忽於㣲細以致其大恩不忍誨義不忍割去事之徴未然之明鏡也言禍伏於隱㣲人多忽之及發見之後昭昭而不可掩是為未然之明鏡夫天不可以不剛不剛則三光不明王不可以不彊不彊則宰牧從横從子用翻又子容翻横戸孟翻又如字宜因大變改政匡失以塞天意塞悉則翻丙辰郡國十三地震旱蝗竇氏父子兄弟並為卿校卿九卿校諸校尉校戸教翻充滿朝廷穰矦鄧疊疊弟歩兵校尉磊及母元憲女壻射聲校尉郭舉舉父長樂少府璜共相交結賢曰太后居長樂宫故有少府秩二千石樂音洛元舉並出入禁中舉得幸太后遂共圖為殺害謀弑逆也帝隂知其謀是時憲兄弟專權帝與内外臣僚莫由親接所與居者閹宦而已閹宦周禮謂之奄鄭𤣥注曰奄精氣蔽藏者今謂之宦人閹衣廉翻又衣檢翻帝以朝臣上下莫不附憲獨中常侍鉤盾令鄭衆謹敏有心幾百官志鉤盾令秩六百石宦者為之典諸近池苑囿遊觀之處屬少府幾事也心幾謂心事也今人謂人胷中有城府者為有心事朝直遥翻盾食尹翻幾居希翻不事豪黨遂與衆定議誅憲以憲在外謂出屯凉州時也慮其為亂忍而未發會憲與鄧疊皆還京師還從宣翻又如字時清河王慶恩遇尤渥渥厚漬也常入省宿止省禁中也帝將發其謀欲得外戚傳賢曰前書外戚傳傳直戀翻懼左右不敢使令慶私從千乗王求千乗王伉帝長兄也乗繩證翻夜獨内之又令慶傳語鄭衆求索故事賢曰謂文帝誅薄昭武帝誅竇嬰故事索山客翻庚申帝幸北宫詔執金吾五校尉勒兵屯衞南北宫執金吾掌宫外戒司非常北軍五校尉主五營士故令勒兵屯衞閉城門收捕郭璜郭舉鄧疊鄧磊皆下獄死下遐稼翻遣謁者僕射收憲大將軍印綬更封為冠軍矦憲先已封冠軍矦不受今復封以矦就國更居孟翻與篤景瓌皆就國瓌古回翻帝以太后故不欲名誅憲言不欲正名誅之為選嚴能相督察之為于偽翻憲篤景到國皆廹令自殺初河南尹張酺數以正法繩治竇景酺薄乎翻酺先為魏郡太守郡人鄭據奏竇景罪景遣掾夏猛私謝酺使罪據子酺收猛繫獄及入為河南尹景家人擊傷市卒吏捕得之景怒遣緹騎矦海毆傷市丞酺部吏楊章窮究正海罪徙朔方數所角翻治直之翻及竇氏敗酺上疏曰方憲等寵貴羣臣阿附唯恐不及皆言憲受顧命之託懐伊吕之忠至乃復比鄧夫人於文母賢曰案鄧夫人即穰矦鄧疊母元張酺論憲兼及其黨稱鄧夫人猶如前書霍光妻稱霍顯祁大伯母號祁夫人之類復扶又翻今嚴威既行皆言當死不顧其前後考折厥衷折之舌翻衷竹仲翻臣伏見夏陽矦瓌每存忠善前與臣言常有盡節之心檢敇賔客未嘗犯法臣聞王政骨肉之刑有三宥之義禮記公族有罪獄成有司讞于公曰某之罪在大辟公曰宥之有司又曰在大辟公又曰宥之有司又曰在大辟公又曰宥之及三宥不對走出致刑于甸人公又使人追之曰必宥之有司對曰無及也反命於公公素服如其倫之喪過厚不過薄今議者欲為瓌選嚴能相為于偽翻相息亮翻矦國相也恐其廹切必不完免宜裁加貸宥以崇厚德帝感其言由是瓌獨得全竇氏宗族賔客以憲為官者皆免歸故郡初班固奴嘗醉罵洛陽令种兢姓譜种本仲氏避難改焉兢因逮考竇氏賔客收捕固死獄中固嘗著漢書尚未就詔固女弟曹壽妻昭踵而成之昭即曹大家也華嶠論曰固之序事不激詭不抑抗賢曰激揚也詭毁也抑退也抗進也余謂激詭抑抗皆指史家作意以為文之病華戸化翻贍而不穢詳而有體使讀之者亹亹而不厭爾雅曰亹亹猶勉勉也音無匪翻信哉其能成名也固譏司馬遷是非頗謬於聖人賢曰言遷所是非與聖人乖謬即崇黄老而薄六經輕仁義而賤守節是也然其論議常排死節謂言龔勝竟夭天年之類否正直謂言王陵汲黯之戅之類而不叙殺身成仁之為美謂不立忠義傳則輕仁義賤守節甚矣初竇憲納妻天下郡國皆有禮慶漢中郡亦當遣吏漢中郡在洛陽西千九百九十里戸曹李郃郡有戸曹主民戸祠祀農桑郃曷閤翻諫曰竇將軍椒房之親不修德禮而專權驕恣危亡之禍可翹足而待翹舉也願明府一心王室勿與交通太守固遣之郃不能止請求自行許之郃遂所在遲留以觀其變行至扶風潘岳闗中記曰三輔舊治長安城中長吏各居其縣治民東都之後扶風出治槐里馮翊出治高陵而憲就國凡交通者皆坐免官漢中太守獨不與焉與讀曰預帝賜清河王慶奴婢輿馬錢帛珍寳充牣其第慶或時不安帝朝夕問訊進膳藥所以垂意甚備慶亦小心恭孝自以廢黜尤畏事慎法故能保其寵祿焉帝除袁安子賞為郎任隗子屯為歩兵校尉以安隗守正不附竇氏也任音壬隗五罪翻鄭衆遷大長秋百官志大長秋秩二千石承秦將行景帝更為大長秋或用士人中興常用宦者職掌奉宣中宫命凡給賜宗親及宗親當謁見者闗通之中宫出則從張晏曰皇后卿師古曰秋者收成之時長者恒久之義故以為皇后官名帝策勲班賞衆每辭多受少帝由是賢之常與之議論政事宦官用權自此始矣秋七月己丑太尉宋由以竇氏黨策免自殺八月辛亥司空任隗薨癸丑以大司農尹睦為太尉太傅鄧彪以老病上還樞機職上時掌翻尚書樞機之職鄧彪錄尚書事詔許焉以睦代彪錄尚書事冬十月以宗正劉方為司空武陵零陵灃中蠻叛䕶羗校尉鄧訓卒吏民羗胡旦夕臨者日數千人臨力鴆翻哭也羗胡或以刀自割又刺殺其犬馬牛羊刺七逆翻又七四翻曰鄧使君已死我曹亦俱死耳前烏桓吏士皆犇走道路賢曰訓前任烏桓校尉時吏士也至空城郭吏執不聽以狀白校尉徐傿傿葢為烏桓校尉傿於建翻傿歎息曰此為義也乃釋之遂家家為訓立祠為于偽翻下同每有疾病輒請禱求福蜀郡太守聶尚代訓為䕶羗校尉欲以恩懐諸羗乃遣譯使招呼迷唐使還居大小榆谷迷唐去大小榆谷事見上卷章和二年鄧訓驅逐迷唐而聶尚招呼之欲以反鄧訓之政也聶昵輒翻使疏吏翻迷唐既還遣祖母卑鈌詣尚卑鈌葢迷吾之母尚自送至塞下為設祖道令譯田汜等五人䕶送至廬落迷唐遂反與諸種共生屠裂汜等以血盟詛種章勇翻汜詳里翻詛莊助翻復寇金城塞復扶又翻尚坐免五年春正月乙亥宗祀明堂登靈臺赦天下戊子千乗貞王伉薨諡法臣諡直道不撓曰貞事君無猜曰貞清白守節曰貞固節幹事曰貞伉音抗辛卯封皇弟萬歲為廣宗王廣宗縣屬鉅鹿郡賢曰今貝州宗城縣隋煬帝諱廣故改為宗城甲寅太傅鄧彪薨戊午隴西地震夏四月壬子紹封阜陵殤王兄魴為阜陵王諡法未家短折曰殤阜陵殤王冲質王延之子元年嗣封三年薨無嗣今以魴紹封魴符方翻九月辛酉廣宗殤王萬歲薨無子國除初竇憲既立於除鞬為北單于欲輔歸北庭事見上卷三年鞬居言翻會憲誅而止於除鞬自畔還北詔遣將兵長史王輔以千餘騎與任尚共追討斬之破滅其衆耿䕫之破北匈奴也事見上巻三年鮮卑因此轉徙據其地拓跋氏自北荒南徙葢此時也匈奴餘種留者尚有十餘萬落種章勇翻皆自號鮮卑鮮卑由此漸盛冬十月辛未太尉尹睦薨十一月乙丑太僕張酺為太尉酺與尚書張敏等奏射聲校尉曹褒擅制漢禮破亂聖術宜加刑誅書凡五奏帝知酺守學不通言守其家學也雖寑其奏而漢禮遂不行褒制禮事見上巻章帝章和元年是歲武陵郡兵破叛蠻降之降戸江翻梁王暢與從官卞忌祠祭求福姓譜卞本自有周曹叔振鐸之後曹之支子封於卞遂以建族余按魯有下莊子楚有卞和忌等諂媚云神言王當為天子暢與相應答為有司所奏請徴詣詔獄帝不許但削成武單父二縣成武單父二縣本屬山陽後屬濟隂章帝以益梁國賢曰成武今曹州縣單父今宋州縣單音善暢慙懼上疏深自刻責曰臣天性狂愚不知防禁自陷死罪分伏顯誅分扶問翻陛下聖德枉法曲平賢曰曲平曲法申恩平處其罪横赦貸臣為臣受汙横胡孟翻汙惡也天下以赦暢為納汙是為暢受汙為于偽翻臣知大貸不可再得自誓束身約妻子不敢復出入失繩墨不敢復有所横費横戸孟翻復扶又翻租入有餘乞裁食睢陽榖熟虞䝉寧陵五縣還餘所食四縣四縣下邑尉氏薄郾也睢音雖臣暢小妻三十七人凡非正室者皆小妻也其無子者願還本家自選擇謹敕奴婢二百人其餘所受虎賁官騎及諸工技鼓吹倉頭奴婢兵弩廐馬皆上還本署虎賁士屬虎賁中郎將官騎騶騎也漢官儀曰騶騎王家名官騎與廐馬皆屬太僕工技屬尚方鼓吹屬黄門倉頭奴婢屬永巷御府奚官等令兵弩屬考工令各有本署也賁音奔技渠綺翻吹昌瑞翻上時掌翻臣暢以骨肉近親亂聖化汙清流汙烏故翻既得生活誠無心面目以凶惡復居大宫食大國張官屬藏什物賢曰古者師行二五為什食器之類必共之故曰什物食具今人通謂生生之具為什物復扶又翻願陛下加恩開許上優詔不聽䕶羗校尉貫友貫姓也漢初有趙相貫高遣譯使構離諸羗誘以財貨由是解散使疏吏翻誘音酉乃遣兵出塞攻迷唐於大小榆谷獲首虜八百餘人收麥數萬斛遂夹逄留大河築城塢此大河即黄河河水至此有逄留之名在二榆谷北作大航造河橋欲度兵擊迷唐酈道元水經注曰於河狭作橋航户剛翻迷唐率部落逺徙依賜支河曲西羗傳賜支者禹貢所謂析支者也羗居河闗之西南濵於賜支至於河首緜地千里司馬彪曰西羗自析支以西濵河首在右居也河水屈而東北流逕於析支之地是為河曲矣應劭曰禹貢析支屬雍州在河闗之西東去河闗千餘里羗人所居謂之河曲羗單于屯屠何死單于宣弟安國立安國初為左賢王無稱譽及為單于單于適之子右谷蠡王師子以次轉為左賢王谷音鹿蠡盧奚翻師子素勇黠多知黠下入翻知古智字通前單于宣及屯屠何皆愛其氣決數遣將兵出塞數所角翻下同掩擊北庭還受賞賜天子亦加殊異由是國中盡敬師子而不附安國安國欲殺之諸新降胡初在塞外數為師子所驅掠在塞外謂先屬北部時降戸江翻多怨之安國委計降者與同謀議師子覺其謀乃别居五原界每龍庭會議匈奴龍庭本在塞外是時南單于居塞内亦謂所居為龍庭師子輒稱病不徃度遼將軍皇甫稜知之亦擁䕶不遣單于懐憤益甚六年春正月皇甫稜免以執金吾朱徽行度遼將軍時單于與中郎將杜崇不相平乃上書告崇崇諷西河太守令斷單于章中郎將使匈奴中郎將也斷音短單于居西河美稷故諷令太守斷其章使不上聞單于無由自聞崇因與朱徽上言南單于安國疎逺故胡親近新降逺于願翻近其靳翻降戸江翻欲殺左賢王師子及左臺且渠劉利等又右部降者謀共廹脅安國起兵背畔且子余翻背蒲妹翻請西河上郡安定為之儆備帝下公卿議下遐稼翻皆以為蠻夷反覆雖難測知然大兵聚會必未敢動揺今宜遣有方略使者之單于庭之徃也使疏吏翻與杜崇朱徽及西河太守并力觀其動静如無他變可令崇等就安國會其左右大臣責其部衆横暴為邊害者共平罪誅相與平處其罪當誅者則誅之横戸孟翻若不從命令為權時方略事畢之後裁行賞賜賢曰裁量賜物不多與也亦足以威示百蠻於是徽崇遂發兵造其庭造七到翻安國夜聞漢軍至大驚棄帳而去帳單于所居即謂之穹廬又謂之廬帳因舉兵欲誅師子師子先知乃悉將廬落入曼柏城曼柏縣屬五原郡安國追到城下門閉不得入朱徽遣吏譬和之安國不聽城既不下乃引兵屯五原崇徽因發諸郡騎追赴之急衆皆大恐安國舅骨都矦喜為等慮并被誅乃格殺安國被皮義翻去考異曰帝紀在年誤今從南匈奴傳立師子為亭獨尸逐矦鞮單于鞮丁奚翻己卯司徒丁鴻薨二月丁未以司空劉方為司徒太常張奮為司空夏五月城陽懐王淑薨無子國除秋七月京師旱西域都䕶班超發龜兹鄯善等八國兵合七萬餘人龜兹音丘慈鄯上扇翻討焉耆到其城下誘焉耆王廣尉犂王汎等於陳睦故城斬之傳首京師誘音酉汎考異曰袁紀作沉今從超傳因縱兵鈔掠鈔楚交翻斬首五千餘級獲生口萬五千人更立焉耆左矦元孟為焉耆王焉耆國有左右將左右矦更工衡翻超留焉耆半歲慰撫之於是西域五十餘國悉納質内屬至於海濱西海之濱也所謂條支大秦䝉竒兠勒諸國也質音致四萬里外皆重譯貢獻重直龍翻班超所以成西域之功者以匈奴衰困力不能及西域也南單于師子立降胡五六百人夜襲師子降戸江翻安集掾王恬將衞䕶士與戰破之使匈奴中郎將置掾隨事為貟安集掾以安集匈奴為稱也光武在河北亦置安集掾以天下未定使之安集斯民也建武二十六年使匈奴中郎將置安集掾史將弛刑五十人持兵弩隨單于所處參辭訟察動静掾俞絹翻於是降胡遂相驚動十五部二十餘萬人皆反脅立前單于屯屠何子薁鞮日逐王逢矦為單于鞮當作鞬賢曰前鞮鞬兩字通今不改亦可薁於六翻鞬九言翻遂殺略吏民燔燒郵亭廬帳將車重向朔方欲度幕北郵音尤重直用翻九月癸丑以光祿勲鄧鴻行車騎將軍事與越騎校尉馮柱行度遼將軍朱徽將左右羽林北軍五校士及郡國迹射緣邊兵賢曰漢有迹射士言尋迹而射也烏桓校尉任尚將烏桓鮮卑合四萬人討之時南單于及中郎將杜崇屯牧師城漢邊郡有牧師菀以飬馬此牧師菀城也當在西河郡美稷縣界逢矦將萬餘騎攻圍之冬十一月鄧鴻等至美稷逄矦乃觧圍去向滿夷谷南單于遣子將萬騎及杜崇所領四千騎與鄧鴻等追擊逢矦於大城塞大城縣故屬西河郡郡國志屬朔方郡斬首四千餘級任尚率鮮卑烏桓要擊逢矦於滿夷谷要一遥翻復大破之復扶又翻下同前後凡斬萬七千餘級逢矦遂率衆出塞漢兵不能追而還還從宣翻又如字以大司農陳寵為廷尉寵性仁矜數議疑獄數所角翻每附經典務從寛恕刻敝之風於此少衰少詩沼翻帝以尚書令江夏黄香為東郡太守香辭以典郡從政才非所宜乞留備宂官宂而隴翻散也賜以督責小職任之宫臺煩事宫謂宫中臺謂尚書臺也尚書出納王命故云宫臺煩事帝乃復留香為尚書令増秩二千石按百官志尚書令秩千石今特增秩二千石以香在尚書日久又辭不拜郡故復留為尚書令而祿以郡守祿甚見親重香亦祗勤物務憂公如家七年春正月鄧鴻等軍還馮柱將虎牙營留屯五原鴻坐逗留失利下獄死後帝知朱徽杜崇失胡和又禁其上書以致胡反皆徴下獄死下遐稼翻夏四月辛亥朔日有食之秋七月乙巳易陽地裂余按地理志及郡國志易陽縣屬趙國應劭曰易水出涿郡故安師古及賢皆曰縣在易水之陽此皆承應劭之誤也易水在燕南界漢屬河間郡界此時趙國僅有唐邢洺二州之地安得有屬縣逺在易水之陽邪五代史志洺州臨洺縣舊曰易陽後齊廢入襄國縣後周改為易陽縣别置襄國縣隋間皇六年改易陽縣為邯鄲縣十年改邯鄲縣為臨洺而别置邯鄲縣由是觀之漢易陽縣當在邯鄲襄國二縣之間九月癸卯京師地震樂成王黨坐賊殺人削東光鄡二縣東光縣本屬勃海郡鄡縣本屬鉅鹿郡章帝以益樂成國鄡音羌堯翻舊禁宫人出嫁不得適諸國有故掖庭技人哀置嫁男子章初黨召入宫與通初欲上書告之黨賂哀置姊昭殺初八年春二月立貴人隂氏為皇后后識之曾孫也夏四月樂成靖王黨薨子哀王崇立尋薨無子國除五月河内陳留蝗南匈奴右温禺犢王烏居戰畔出塞賢曰温禺犢王名烏居戰秋七月度遼將軍龎奮越騎校尉馮柱追擊破之徙其餘衆及諸降胡二萬餘人於安定北地安定郡在雒陽西千七百里北地郡在雒陽西千一百里車師後部王涿鞮反擊前王尉畢大獲其妻子尉畢大西域傳作尉卑大時戊巳校尉索頵欲廢後部王涿鞮涿鞮忿前王尉卑大賣已因反撃尉卑大鞮丁奚翻九月京師蝗冬十月乙丑北海王威以非敬王子又坐誹謗自殺十二月辛亥陳敬王羨薨丁巳南宫宣室殿火䕶羗校尉貫友卒以漢陽太守史充代之充至遂發湟中羗胡出塞擊迷唐迷唐迎敗充兵敗補邁翻殺數百人充坐徴以代郡太守吳祉代之九年春三月庚辰隴西地震癸巳濟南安王康薨諡法好和不争曰安寛裕和平曰安濟子禮翻西域長史玉林擊車師後王斬之後王涿鞮夏四月丁卯封樂成王黨子廵為樂成王五月封皇后父屯騎校尉隂綱為吳房矦郡國志吳房縣屬汝南郡有棠谿亭左傳房國楚靈王所滅又楚昭王封吳王夫概于棠谿地道記有吳城吳房蓋合吳城房國以名縣也以特進就第六月旱蝗秋八月鮮卑寇肥如遼東太守祭參坐沮敗下獄死賢曰肥如縣屬遼西郡前書音義曰肥子奔燕封於此今平州也按祭彤𫝊參守遼東鮮卑入郡界參坐沮敗下獄死蓋寇遼西之肥如遂入遼東郡界也沮在吕翻閏月辛巳皇太后竇氏崩初梁貴人既死事見四十六卷章帝建初八年宫省事秘莫有知帝為梁氏出者舞隂公主子梁扈遣從兄襢奏記三府扈梁松子也帝母梁貴人少失母為伯母舞隂公主所飬從才用翻賢曰襢古禪字以為漢家舊典崇貴母氏而梁貴人親育聖躬不蒙尊號求得申議賢曰求申理而議之也太尉張酺言狀帝感慟良久曰毛晃曰良頗也良久頗久也或曰良久少久也一曰良畧也聲輕故轉畧為良慟徒弄翻大哭也哀過也於君意若何酺請追上尊號存錄諸舅錄采也收拾也帝從之會貴人姊南陽樊調妻嫕嫕音於計翻嫕考異曰袁紀皆作慿今從皇后紀梁竦𫝊上書自訟曰妾父竦寃死牢獄骸骨不掩母氏年踰七十及弟棠等逺在絶域不知死生願乞收竦朽骨使母弟得歸本郡帝引見嫕乃知貴人枉殁之狀三公上奏請依光武黜吕太后故事事見四十五巻光武中元元年按此事乃光武之失而可引之為故典乎貶竇太后尊號不宜合葬先帝百官亦多上言者帝手詔曰竇氏雖不遵法度而太后常自減損朕奉事十年自嗣位至是十年深惟大義惟思也禮臣子無貶尊上之文恩不忍離義不忍虧案前世上官太后亦無降黜謂上官桀父子誅不累及上官后也事見二十二巻昭帝元鳯元年其勿復議復扶又翻丙申葬章德皇后燒唐羗迷唐率衆八千人寇隴西脅塞内諸種羗合歩騎三萬人擊破隴西兵殺大夏長大夏縣屬隴西郡宋白曰今大夏縣屬河州夏戸雅翻種章勇翻長知兩翻詔遣行征西將軍劉尚越騎校尉趙世副之以趙世副劉尚也考異曰西羗𫝊作趙代今從帝紀及余謂唐太宗諱世民賢注范史偶檢㸃此遂改世為代耳將漢兵羗胡共三萬人討之尚屯狄道世屯枹罕狄道枹罕二縣皆屬隴西郡宋白曰狄道縣屬蘭州枹罕縣河州治所枹音膚尚遣司馬寇盱監諸郡兵四面並會監古銜翻迷唐懼棄老弱犇入臨洮南犇入臨洮南山也尚等追至高山大破之斬虜千餘人迷唐引去漢兵死傷亦多不能復追復扶又翻乃還九月庚申司徒劉方策免自殺甲子追尊梁貴人為皇太后諡曰恭懐追復喪制冬十月乙酉改葬梁太后及其姊大貴人於西陵西陵蓋以其地在敬陵之西故稱西陵猶薄太后陵在霸陵南因謂之南陵也賢曰初后葬有闕故改葬擢樊調為羽林左監追封諡皇太后父竦為褒親愍矦諡法在國逢難曰愍遣使迎其喪葬於恭懐皇后陵旁徴還竦妻子封子棠為樂平矦樂平矦國屬東郡故清縣也章帝更名棠弟雍為乗氏矦乗氏矦國屬濟隂郡春秋之乗丘也乗繩證翻雍弟翟為單父矦單父音善甫位皆特進賞賜以巨萬計寵遇光於當世梁氏自此盛矣清河王慶始敢求上母宋貴人冢宋貴人冢在雒陽城北樊濯聚上時掌翻帝許之詔太官四時給祭具慶垂涕曰生雖不獲供飬供俱用翻飬羊尚翻終當奉祭祀私願足矣欲求作祠堂恐有自同恭懐梁后之嫌遂不敢言常泣向左右以為没齒之恨齒年也後上言外祖母王年老乞詣雒陽療疾於是詔宋氏悉歸京師宋氏歸故郡事見四十六巻章帝建初七年除慶舅衍俊蓋暹等皆為郎十一月癸卯以光祿勲河南吕蓋為司徒十二月丙寅司空張奮罷壬申以太僕韓稜為司空西域都䕶定逺矦班超遣掾甘英使大秦條支東觀記曰以漢中郡南鄭縣之西鄉千户封超為定逺矦賢曰定逺故城在今洋州西鄉縣南西域傳曰自皮山西南經烏秅渉懸度歴罽賔六十餘日行至烏弋山離國復西南馬行百餘日至條支條支臨西海海水曲環其南及東北三面路絶唯西北隅通陸道大秦國西漢之犂靬也在西海西其人民長大平正有類中國故謂之大秦今拂菻國是也掾俞絹翻使疏吏翻窮西海皆前世所不至莫不備其風土傳其珍怪焉及安息西界自條支轉北而東馬行六十餘日至安息臨大海欲度船人謂英曰海水廣大徃来者逢善風善風謂順風也三月乃得度若遇遲風亦有二歲者故入海人皆齎三歲糧海中善使人思土戀慕數有死亡者數所角翻英乃止十年夏五月京師大水秋七月己巳司空韓稜薨八月丙子以太常太山巢堪為司空冬十月五州雨水行征西將軍劉尚越騎校尉趙世坐畏懦徴下獄免謁者王信領尚營屯枹罕謁者耿譚領世營屯白石白石縣本屬金城郡時屬隴西郡水經注白石川水南逕白石城西而注灕水水又逕白石縣故城南闞駰曰白石縣在狄道縣西北二百八十五里賢曰白石山在今蘭州或曰河州鳯林縣本漢白石縣張駿改為永固唐為烏州後廢州置安昌縣後又更名鳯林杜佑曰直道縣有白石山譚乃設購賞諸種頗来内附迷唐恐乃請降信譚遂受降罷兵十二月迷唐等帥種人詣闕貢獻帥讀曰率種章勇翻戊寅梁節王暢薨初居巢矦劉般薨居巢縣屬廬江郡般建初三年薨子愷當嗣稱父遺意讓其弟憲遁逃久之有司奏絶愷國肅宗美其義特優假之愷猶不出積十餘歲有司復奏之復扶又翻侍中賈逵上書曰孔子稱能以禮讓為國乎何有見論語有司不原樂善之心樂音洛而繩以循常之法懼非長克讓之風成含𢎞之化也長知兩翻帝納之下詔曰王法崇善成人之美其聽憲嗣爵遭事之宜後不得以為比乃徴愷拜為郎南單于師子死單于長之子檀立為萬氏尸逐鞮單于十一年夏四月丙寅赦天下帝因朝會召見諸儒朝直遥翻見賢遍翻使中大夫魯丕與侍中賈逵尚書令黄香等相難數事難乃旦翻以經疑相難也下同帝善丕説罷朝特賜衣冠丕因上疏曰臣聞説經者傳先師之言非從已出不得相讓相讓則道不明若規矩權衡之不可枉也賢曰規圎也矩方也權秤錘衡秤衡也難者必明其據説者務立其義漢儒專門名家各守師説故發難者必明其師之説以為據答難者亦必務立大義以申其師之説浮華無用之言不陳於前故精思不勞而道術愈章章明也思相吏翻法異者各令自説師法博觀其義無令芻蕘以言得罪自比於芻蕘謙也蕘如招翻幽逺獨有遺失也十二年夏四月戊辰秭歸山崩賢曰秭歸縣屬南郡古之䕫國今歸州也袁山松曰屈原此縣人既被流放忽然蹔歸其姊亦来因名其地為秭歸秭亦姊也音蔣兕翻秋七月辛亥朔日有食之九月戊午太尉張酺免丙寅以大司農張禹為太尉燒當羗豪迷唐既入朝其餘種人不滿二千飢窘不立不能自立也種章勇翻下同入居金城帝令迷唐將其種人還大小榆谷迷唐以漢作河橋即五年貫友所作之橋兵来無常故地不可復居復扶又翻下同辭以種人飢餓不肯逺出䕶羗校尉吳祉等多賜迷唐金帛令糴榖市畜畜許又翻促使出塞種人更懐猜驚是歲迷唐復叛脅將湟中諸胡寇鈔而去鈔楚交翻王信耿譚吳祉皆坐徴十三年秋八月己亥北宫盛饌門閣火盛饌門閣御㕑門閣也晉書天文志曰紫宫垣西南角外二星内二星曰内㕑主六宫之内飲食后妃夫人與太子宴飲東北維外六星曰天㕑主盛饌皇居則象於天極故北宫有盛饌門閣迷唐復還賜支河曲將兵向塞䕶羗校尉周鮪與金城太守矦霸金城郡在洛陽西二千八百里鮪于軌翻及諸郡兵屬國羗胡合三萬人至允川水經注曰允川去賜支河曲數十里在大小榆谷之西矦霸擊破迷唐種人瓦觧降者六千餘口種章勇翻降戸江翻分徙漢陽安定隴西迷唐遂弱逺踰賜支河首依發羗居發羗羗之别種或曰唐之吐蕃即其後也久之病死其子来降戸不滿數十荆州雨水冬十一月丙辰詔曰幽并凉州戸口率少幽州部涿郡廣陽代郡上谷漁陽右北平遼西遼東𤣥菟樂浪等郡并州部上黨太原上郡西河五原雲中定襄鴈門朔方等郡幽州大郡戸猶十萬餘唯𤣥菟戸一千五百二十四并州大郡三萬餘小郡不滿二千凉州大郡不滿三萬燉煌七百四十八而已少詩沼翻邊役衆劇束脩良吏進仕路狭束脩謂束髪自脩者也撫接夷狄以人為本其令縁邊郡口十萬以上歲舉孝廉一人不滿十萬二歲舉一人五萬以下三歲舉一人鮮卑寇右北平右北平郡在雒陽北二千三百里遂入漁陽漁陽太守擊破之戊辰司徒吕蓋以老病致仕巫蠻許聖以郡收税不均怨恨遂反賢曰巫縣屬南郡故城在今䕫州巫山縣辛卯寇南郡十四年春安定降羗燒何種反燒當與燒何各是一種種章勇翻下同郡兵擊滅之時西海及大小榆谷左右無復羗寇水經河水自東河曲逕西海郡南又東逕允川而歴大小榆谷北復扶又翻隃麋相曹鳯上言隃麋矦國屬右扶風隃音踰麋音睂賢曰隃麋故城在今隴州汧陽縣東南自建武以来西羗犯法者常從燒當種起所以然者以其居大小榆谷土地肥美有西海魚鹽之利西海有允谷鹽池阻大河以為固又近塞諸種易以為非易以䜴翻難以攻伐故能彊大常雄諸種恃其拳勇詩云無拳無勇毛萇注云拳力也招誘羗胡今者衰困黨援壊沮誘音酉沮在吕翻亡逃棲竄逺依發羗臣愚以為宜及此時建復西海郡縣建立也立䇿復置郡縣也置西海郡見三十六卷平帝元始四年規固二榆規圖也謀也廣設屯田隔塞羗胡交闗之路塞悉則翻遏絶狂狡窺欲之源又殖榖富邊省委輸之役委於偽翻輸春遇翻國家可以無西方之憂上從之繕修故西海郡徙金城西部都尉以戍之孟康曰金城西部都尉府在金城縣拜鳯為金城西部都尉屯龍耆賢曰龍耆即龍支也今鄯州縣宋白曰鄯州龍支縣本漢允吾縣也取縣西龍支堆為名後增廣屯田列屯夹河合三十四部其功垂立會永初中諸羗叛乃罷三月戊辰臨辟雍饗射赦天下夏四月遣使者督荆州兵萬餘人分道討巫蠻許聖等大破之聖等乞降悉徙置江夏晉宋之荆州蠻分居沔中西陽者即巫蠻之餘種也降戸江翻隂皇后多妬忌寵遇浸衰數懐恚恨數所角翻恚衣避翻后外祖母鄧朱出入宫掖有言后與朱共挟巫蠱道者賢曰巫師為蠱故曰巫蠱左傳注曰蠱惑也帝使中常侍張慎與尚書陳褒案之劾以大逆無道劾戸槩翻又戸得翻朱二子奉毅后弟輔皆考死獄中六月辛卯后坐廢遷于桐宫以憂死父特進綱自殺后弟軼敞及朱家屬徙日南比景日南郡秦象郡也武帝更名在雒陽南萬三千四百里比景縣屬焉如淳曰日中於頭上景在已下故名之師古曰日南言其在日之南所謂開北户以向日者軼音逸秋七月壬子常山殤王側薨無子立其兄防子矦章為常山王防子縣屬常山國三州大水班超久在絶域超始出西域見四十五巻明帝永平十六年年老思土上書乞歸曰臣不敢望到酒泉郡但願生入玉門闗酒泉郡在雒陽西四千七百里賢曰玉門闗屬燉煌郡今沙州也去長安三千六百里闗在燉煌縣西北酒泉郡今肅州也去長安二千八百五十里謹遣子勇隨安息獻物入塞及臣生在令勇日見中土朝廷久之未報超妹曹大家超妹昭嫁扶風曹夀博學髙才有節行法度帝數召入宫令皇后諸貴人師事焉號曰大家家今人相傳讀曰姑又據皇后紀冲帝母虞貴人梁冀秉政抑而不加爵號但稱大家而已則大家者宫中相尊之稱也上書曰蠻夷之性悖逆侮老悖蒲内翻又蒲沒翻而超旦暮入地久不見代恐開姦宄之原生逆亂之心而卿大夫咸懐一切莫肯逺慮如有卒暴卒讀曰猝下同超之氣力不能從心便為上損國家累世之功下棄忠臣竭力之用誠可痛也故超萬里歸誠自陳苦急延頸踰望賢曰踰遥也高祖踰謂黥布曰何苦而反余按前書當作隃讀曰遥傳寫誤作踰三年於今未䝉省錄省悉景翻妾竊聞古者十五受兵六十還之賢曰周禮鄉大夫職曰國中七尺以及六十有五皆征之征謂賦税從征役也韓詩外傳曰二十行役六十免役與周禮國中同即知一與周禮七尺同禮國中六十免役野即六十有五晚於國中五年國中七尺從役野六尺即是野又早於國中五年七尺謂二十六尺即十五也此言十五受兵據野外為言六十還之據國中為説也亦有休息不任職也任音壬故妾敢觸死為超求哀匄超餘年為于偽翻賢曰匄乞也一得生還復見闕庭使國家無勞逺之慮西域無倉卒之憂超得長䝉文王葬骨之恩新序曰周文王作靈臺掘地得死人之骨王曰更葬之吏曰此無主矣文王曰有天下者天下之主也有一國者一國之主也寡人固其主又安求之主遂更葬之天下皆曰文王賢矣澤及朽骨而况於人乎子方哀老之惠賢曰田子方魏文矦之師也見君之老馬棄之曰少盡其力老而棄之非仁也於是收而飬之帝感其言乃徴超還八月超至雒陽拜為射聲校尉九月卒十考異曰本傳稱超十二年上疏四年至雒陽而妹昭上書曰延頸踰望三年於今注引東觀記曰安息遣使獻大雀師子超遣子勇隨入塞按帝紀十三年安息國入貢袁紀載超書亦在十三年今并置其書於此袁紀又云超到數月薨今從本傳超之被徴被皮義翻以戊巳校尉任尚代為都䕶尚謂超曰君矦在外國三十餘年而小人猥承君後任重慮淺宜有以誨之超曰年老失智君數當大位數所角翻豈班超所能及哉必不得已願進愚言塞外吏士本非孝子順孫皆以罪過徙補邊屯而蠻夷懐鳥獸之心難飬易敗易以䜴翻今君性嚴急水清無大魚察政不得下和家語孔子曰水至清則無魚人至察則無徒宜蕩佚簡易易以豉翻寛小過總大綱而已超去尚私謂所親曰我以班君當有竒策今所言平平耳尚後竟失邊和如超所言為任尚徴還漢失西域張本初太傅鄧禹嘗謂人曰吾將百萬之衆未嘗妄殺一人後世必有興者其子䕶羗校尉訓有女曰綏性孝友好書傳好呼到翻傳柱戀翻常晝脩婦業暮誦經典家人號曰諸生叔父陔曰嘗聞活千人者子孫有封兄訓為謁者使修石臼河歲活數千人陔柯開翻石臼河事見四十六卷章帝建初三年天道可信家必䝉福綏後選入宫為貴人恭肅小心動有法度承事隂后接撫同列常克己以下之謂克去有己之私不欲上人也下遐稼翻雖宫人𨽻役皆加恩借既有以恩之又假借以辭色帝深嘉焉嘗有疾帝特令其母兄弟入親醫藥不限以日數貴人辭曰宫禁至重而使外舍久在内省外舍猶言外家内省猶言内禁也上令陛下有私幸之譏私幸謂私於所幸者下使賤妾獲不知足之謗上下交損謂交有所損誠不願也帝曰人皆以數入為榮數所角翻下同貴人反以為憂邪每有讌會諸姬競自脩飾貴人獨尚質素其衣有與隂后同色者即時觧易若並時進見見賢遍翻下同則不敢正坐離立賢曰離並也禮記曰離坐離立行則僂身自卑僂力主翻俯也帝每有所問常逡廵後對不敢先后言先悉薦翻隂后短小舉指時失儀左右掩口而笑貴人獨愴然不樂為之隱諱若己之失樂音洛為于偽翻帝知貴人勞心曲體歎曰脩德之勞乃如是乎後隂后寵衰貴人每當御見御進也見賢遍翻輒辭以疾時帝數失皇子貴人憂繼嗣不廣數選進才人以博帝意西漢宫中爵號有美人良人若才人蓋東都所置也博廣也隂后見貴人德稱日盛稱尺證翻深疾之疾與嫉同妬也帝嘗寢病危甚隂后密言我得意不令鄧氏復有遺類復扶又翻貴人聞之流涕言曰我竭誠盡心以事皇后竟不為所祐今我當從死從才用翻上以報帝之恩中以解宗族之禍下不令隂氏有人豕之譏人豕即人彘事見十二巻惠帝元年即欲飲藥宫人趙玉者固禁止之因詐言屬有使来屬之欲翻㑹也使疏吏翻上疾已愈貴人乃止明日上果瘳瘳丑留翻及隂后之廢貴人請救不能得帝欲以貴人為皇后貴人愈稱疾篤深自閉絶冬十月辛卯詔立貴人鄧氏為皇后后辭讓不得已然後即位郡國貢獻悉令禁絶漢郡國貢獻進御之外别上皇后宫歲時但供紙墨而已毛晃曰楮籍不知所始後漢蔡倫以魚網木皮為紙俗以為紙始於倫非也案前書外戚傳已有赫蹏紙矣墨膠煤以為之帝每欲官爵鄧氏后輒哀請謙讓故兄騭終帝世不過虎賁中郎將騭職日翻賢曰東觀記騭音陟丁酉司空巢堪罷十一月癸卯以大司農沛國徐防為司空防上疏以為漢立博士十有四家漢官儀曰光武中興恢𢎞稽古易有施孟梁丘賀京房書有歐陽和伯夏矦勝建詩有申公轅固韓嬰春秋有嚴彭祖顔安樂禮有戴德戴聖凡十四博士設甲乙之科前書博士弟子歲課甲科四十人為郎中乙科二十人為太子舍人丙科四十人為文學掌故以勉勸學者伏見太學試博士弟子皆以意説不修家法賢曰諸經為業各自名家私相容隱開生姦路每有策試策編簡也䇿試即射策也漢書音義曰作簡䇿難問列置案上在試者意投射取而答之謂之射䇿輒興諍訟諍讀與爭同論議紛錯互相是非孔子稱述而不作見論語賢曰祖述先聖之言不自制作又曰吾猶及史之闕文亦見論語賢曰古者史官於書所有不知則闕以待能者孔子言吾少時猶及見古史官之闕文今則無之疾時多穿鑿也今不依章句妄生穿鑿以遵師為非義意説為得理意説者創意而為之説輕侮道術浸以成俗誠非詔書實選本意改薄從忠三代常道賢曰太史公曰夏之政忠忠之敝小人以野故殷人承之以敬敬之敝小人以鬼故周人承之以文文之敝小人以僿故救僿莫若以忠三王之道若循環周而復始僿音西志翻史記僿作薄專精務本儒學所先先悉薦翻臣以為博士及甲乙策試宜從其家章句開五十難以試之難乃旦翻觧釋多者為上第引文明者為高説若不依先師義有相伐賢曰伐謂相攻伐也皆正以為非上從之是歲初封大長秋鄭衆為鄛鄉矦賞誅竇憲功也宦官封矦自此始賢曰説文曰南陽郡棘陽縣有鄛鄉鄛音上交翻十五年夏四月甲子晦日有食之時帝遵肅宗故事兄弟皆留京師有司以日食隂盛奏遣諸王就國詔曰甲子之異責由一人諸王幼稺早離顧復詩小雅蓼莪之篇曰父兮生我母兮鞠我顧我復我出入腹我鄭氏箋曰顧旋視也復反覆也離力智翻弱冠相育冠古玩翻常有蓼莪凱風之哀詩小雅曰蓼蓼者莪匪莪伊蒿哀哀父母生我劬勞又國風曰凱風自南吹彼棘心棘心夭夭母氏劬勞蓼力竹翻選懦之恩知非國典且復宿留賢曰選懦慈戀不決之意也懦音人兖翻復扶又翻宿音秀畱音澑秋九月壬午車駕南廵清河濟北河間三王並從濟子禮翻從才用翻四州雨水冬十月戊申帝幸章陵戊午進幸雲夢賢曰雲夢今安州縣也即在雲夢澤中時太尉張禹留守守手又翻聞車駕當幸江陵以為不宜冒險逺遊驛馬上諫上時掌翻詔報曰祠謁既訖謂幸章陵祠謁四親陵廟當南禮大江會得君奏臨漢回輿而旋十一月甲申還宫嶺南舊貢生龍眼荔枝十里一置五里一候賢曰交州記曰龍眼樹高五六丈似荔支而小廣州記曰子似荔支而圎七月熟荔支樹高五六丈大如桂樹實如雞子甘而多汁似安石榴有甜醋者至日禺中翕然俱赤即可食置謂驛也候即􅕤也立之道旁荔立計翻晝夜傳送傳直戀翻臨武長汝南唐羗賢曰臨武縣屬桂陽郡今郴州縣嶺南入獻道經臨武長知兩翻上書曰臣聞上不以滋味為德下不以貢膳為功伏見交阯七郡交阯州部南海蒼梧鬱林合浦交阯九真日南七郡獻生龍眼等鳥驚風發言其疾也南州土地炎熱惡蟲猛獸不絶於路至於觸犯死亡之害死者不可復生来者猶可救也復扶又翻下同此二物升殿未必延年益壽帝下詔曰逺國珍羞本以薦奉宗廟宗廟之薦各以其土之所有而致之貴逺物也茍有傷害豈愛民之本其敇太官勿復受獻是歲初令郡國以日北至按薄刑時有司奏以為夏至則微隂起靡草死可以決小事遂令以日北至按薄刑賢曰禮記月令曰孟夏之月靡草死麥秋至斷薄刑決小罪按五月一隂爻生可以言微隂今月令云孟夏乃是純陽之月此言夏至者與月令不同余按安帝永初元年魯恭言自永元十五年按薄刑改用孟夏則夏至乃謂夏之初至范史以日北至書之其誤後人甚矣十六年秋七月旱辛酉司徒魯恭免庚午以光祿勲張酺為司徒八月己酉酺薨冬十月辛卯以司空徐防為司徒大鴻臚陳寵為司空臚陵如翻十一月己丑帝行幸􅚆氏登百岯山􅚆氏縣屬河南尹賢曰即柏岯山也在洛州􅚆氏縣南爾雅云山一成曰岯􅚆工矦翻岯平睂翻北匈奴遣使稱臣貢獻願和親修呼韓邪故約帝以其舊禮不備未許而厚加賞賜不答其使元興元年春高句驪王宫入遼東塞寇畧六縣句驪至宫浸強數犯邊句如字又音駒驪力知翻夏四月庚午赦天下改元秋九月遼東太守耿䕫擊高句驪破之冬十二月辛未帝崩于章德前殿年二十七初帝失皇子前後十數後生者輒隱袐飬於民間羣臣無知者及帝崩鄧皇后乃收皇子於民間長子勝有痼疾痼音固痼疾堅久之疾也長知兩翻少子隆生始百餘日少詩照翻迎立以為皇太子是夜即皇帝位廢長立幼卒以不終為羣臣疑勝疾非痼周章有異謀張本尊皇后曰皇太后太后臨朝朝直遥翻是時新遭大憂法禁未設宫中亡大珠一箧箧詰恊翻竹笥也太后念欲考問必有不辜考問則下之獄辭所連及必有無辜而被逮者乃親閲宫人觀察顔色即時首服首式救翻又和帝幸人吉成御者共枉吉成以巫蠱事下掖庭考訊辭證明白幸人常見幸於和帝者也御者即侍者辭謂告者之辭證謂證佐也下遐稼翻太后以吉成先帝左右待之有恩平日尚無惡言今反若此不合人情謂婦人之情有寵則上僣而生譛愬吉成在先帝之時后待之以恩尚未嘗挟寵而有惡言加於后今帝已晏駕太后臨朝不應反為巫蠱更自呼見實覈果御者所為實覈者審考其實也莫不歎服以為聖明北匈奴重遣使詣敦煌貢獻重直用翻敦音屯辭以國貧未能備禮願請大使當遣子入侍賢曰天子降大使至其國即遣子隨大使入侍太后亦不答其使加賜而已雒陽令廣漢王渙居身平正能以明察發擿姦伏擿他狄翻外行猛政内懐慈仁凡所平斷斷下亂翻人莫不悦服京師以為有神是歲卒官卒于官也卒子恤翻百姓市道莫不咨嗟流涕渙䘮西歸道經𢎞農民庶皆設槃案於路以祭渙也槃以盛祭物案以陳槃今野人之祭猶然吏問其故咸言平常持米到雒為吏卒所鈔賢曰鈔掠也余謂此言鈔者非至如盜賊之鈔掠特不以道而侵取之故曰鈔音楚交翻恒亡其半恒戸登翻自王君在事在事謂在官當事也不見侵枉故来報恩雒陽民為立祠作詩每祭輒弦歌而薦之以所作詩被之弦歌也為于偽翻太后詔曰夫忠良之吏國家之所以為治也治直之翻求之甚勤得之至寡今以渙子石為郎中以勸勞勤資治通鑑巻四十八
