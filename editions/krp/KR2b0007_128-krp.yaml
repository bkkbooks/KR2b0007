front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百二十八宋司馬光撰胡三省音註宋紀十起閼逢敦牂盡著雍閹茂凡五年世祖孝武皇帝上諱駿字休龍小字道民文帝第三子也孝建元年春正月己亥朔上祀南郊改元大赦上既平元兇之亂依故事即位踰年而後改元孝建者葢欲以孝建平禍亂安宗廟之功甲辰以尚書令何尚之為左光禄大夫䕶軍將軍以左衛將軍顔竣為吏部尚書領驍騎將軍竣七倫翻驍堅堯翻騎竒寄翻壬戌更鑄孝建四銖錢更工衡翻乙丑魏以侍中伊馛為司空馛蒲撥翻丙子立皇子子業為太子初江州刺史臧質自謂人才足為一世英雄太子劭之亂質潛有異圖以荆州刺史南郡王義宣庸闇易制易以豉翻欲外相推奉因而覆之質於義宣為内兄臧質武敬皇后之姪年長於義宣故為内兄既至江陵質初起兵與魯爽同詣江陵事見上卷上年即稱名拜義宣義宣驚愕問故質曰事中宜然謂國家多事之中宜相推奉也時義宣已奉帝為主故其計不行及至新亭去年五月朔質至新亭又拜江夏王義恭夏戶雅翻曰天下屯危禮異常日屯陟倫翻劭既誅義宣與質功皆第一由是驕恣事多專行凡所求欲無不必從必上之從已義宣在荆州十年文帝元嘉二十年義宣鎮荆州財富兵彊朝廷所下制度意有不同一不遵承史歴言義宣質驕横之由下遐稼翻質自建康之江州舫千餘乗部伍前後百餘里舫甫妄翻乗繩證翻帝方自攬威權而質以少主遇之少詩沼翻政刑慶賞一不咨禀擅用湓口鉤圻米湓口米荆湘郢三州之運所積也鉤圻米南江之運所積也水經注灨水自南昌歴郴丘城下又歴鉤圻邸閣下而後至彭澤圻音畿臺符屢加檢詰漸致猜懼檢詰謂檢校米斛而詰問擅用之由也詰去吉翻帝淫義宣諸女義宣由是恨怒質乃遣宻信說義宣宻信宻吏也説輸芮翻下說誘同以為負不賞之功挾震主之威自古能全者有幾今萬物係心於公聲迹已著見幾不作將為它人所先幾居希翻先悉薦翻若命徐遺寳魯爽驅西北精兵來屯江上徐遺寳刺兖州直建康北魯爽刺南豫直建康西魯爽素奉義宣徐遺寳由義宣府參軍起故欲命之同逆質帥九江樓船為公前驅帥讀曰率已為得天下之半公以八州之衆徐進而臨之義宣都督荆雍梁益湘交廣寧八州雖韓白更生不能為建康計矣韓白謂韓信白起且少主失徳聞于道路聞音問同沈栁諸將亦我之故人沈慶之與質同以武幹事文帝質為雍州栁元景其部曲將也將即亮翻下同誰肯為少主盡力者為于偽翻下為公同夫不可留者年也不可失者時也質常恐溘先朝露溘苦荅翻又苦合翻溘奄也朝露言其易晞溘先朝露言奄然而死在朝露未晞之先先悉荐翻不得展其旅力毛萇曰旅衆也考孔安國書注亦然為公掃除於時悔之何及義宣腹心將佐諮議參軍蔡超司馬竺超民等咸有富貴之望蔡超等以江州將佐從帝起義以得富貴故懐非望欲倚質威名以成其業共勸義宣從其計質女為義宣子採之婦義宣謂質無復異同復扶又翻遂許之超民䕫之子也景平元嘉間竺䕫守東陽有功臧敦時為黄門侍郎帝使敦至義宣所道經尋陽質更令敦説誘義宣誘音酉義宣意遂定豫州刺史魯爽有勇力義宣素與之相結義宣宻使人報爽及兖州刺史徐遺寳期以今秋同舉兵使者至壽陽爽方飲醉失義宣指即日舉兵午考異曰宋本紀二月庚爽臧質南郡王義宣徐遺寳舉兵反義宣傳云其年正月便反宋畧云二月義宣等反按爽之反帝猶遣質收魯𢎞則非同日反明矣又按長厯是月戊辰朔然則庚午三日也義宣傳起兵在二月二十六日但不知爽反在正月與二月耳爽弟瑜在建康聞之逃叛爽使其衆戴黄標戴黄以為標識竊造法服登壇自號建平元年疑長史韋處穆中兵參軍楊元駒治中庾騰之不與已同皆殺之處昌吕翻徐遺寳亦勒兵向彭城二月義宣聞爽已反狼狽舉兵魯瑜弟𢎞為質府佐帝敕質收之質即執臺使舉兵使䟽吏翻義宣與質皆上表言為左右所讒疾欲誅君側之惡義宣進爽號征北將軍爽於是送所造輿服詣江陵使征北府戸曹板義宣等晉宋之制藩方權宜授官者謂之板授文曰丞相劉今補天子名義宣車騎臧今補丞相名質平西朱今補車騎名修之先是臧質進號車騎將軍鎮尋陽朱修之進號平西將軍鎮襄陽進義宣丞相辭不受皆板到奉行義宣駭愕爽所送法物並留竟陵不聽進質加魯𢎞輔國將軍下戍大雷義宣遣諮議參軍劉諶之將萬人就𢎞諶氏壬翻將即亮翻召司州刺史魯秀欲使為諶之後繼秀至江陵見義宣出拊膺曰吾兄誤我乃與癡人作賊今年敗矣義宣兼荆江兖豫四州之力威震逺近帝欲奉乗輿法物迎之乗繩證翻竟陵王誕固執不可曰奈何持此座與人乃止竟陵王誕時為揚州刺史己卯以領軍將軍栁元景為撫軍將軍辛卯以左衛將軍王𤣥謨為豫州刺史欲以代魯爽命元景統𤣥謨等諸將以討義宣癸巳進據梁山洲時梁山江中有洲𤣥謨等舟師據之於兩㟁築偃月壘水陸待之義宣自稱都督中外諸軍事命僚佐悉稱名甲午魏主詣道壇受圖籙冦謙之之遺教也丙申以安北司馬夏侯祖歡為兖州刺史代徐遣寳三月己亥内外戒嚴畧考異曰宋宋本紀皆作癸亥下有辛丑按長厯是月戊戌朔癸亥二十六日辛丑乃四日也當作己亥辛丑以徐州刺史蕭思話為江州刺史欲以代臧質栁元景為雍州刺史欲以代朱修之雍於用翻癸卯以太子左衛率龎秀之為徐州刺史欲以代蕭思話義宣移檄州郡加進位號使同發兵雍州刺史朱修之偽許之而遣使陳誠於帝遣使䟽吏翻下同益州刺史劉秀之斬義宣使者遣中兵參軍韋崧將萬人襲江陵將即亮翻下使將同戊申義宣帥衆十萬𤼵江津舳艫數百里帥讀曰率舳音逐艫音盧以子慆為輔國將軍與左司馬竺超民留鎮江陵慆土刀翻檄朱修之使𤼵兵萬人繼進修之不從義宣知修之貳於己乃以魯秀為雍州刺史使將萬餘人擊之王𤣥謨聞秀不來魯秀善戰故王𤣥謨憚之喜曰臧質易與耳易以豉翻冀州刺史垣䕶之妻徐遺寳之姊也遺寳邀䕶之同反䕶之不從發兵擊之遺寳遣兵襲徐州長史明𦙍於彭城不克蕭思話已離彭城長史明𦙍守之𦙍與夏侯祖歡垣䕶之共擊遺寳於湖陸宋兖州治湖陸遺寳棄衆焚城奔魯爽義宣至尋陽以質為前鋒而進爽亦引兵直趣歴陽趣七喻翻與質水陸俱下殿中將軍沈靈賜將百舸破質前軍於南陵擒軍主徐慶安等舸古我翻質至梁山夾陳兩岸與官軍相拒陳讀曰陣夏四月戊辰以後將軍劉義綦為湘州刺史甲申以朱修之為荆州刺史義宣為荆湘二州刺史而反故二州皆命代以朱修之效順使制其後故命以荆州上遣左軍將軍薛安都龍驤將軍南陽宗越等戍歴陽驤思將翻與魯爽前鋒楊胡興等戰斬之異考曰安都傳作胡與今從宗越傳爽不能進留軍大峴使魯瑜屯小峴小峴在合肥之東大峴又在小峴之東峴戸典翻上復遣鎮軍將軍沈慶之濟江督諸將討爽復扶又翻爽食少引兵稍退自留斷後少詩沼翻斷音短斷後古之所謂殿也慶之使薛安都帥輕騎追之帥讀曰率騎竒寄翻丙戌及爽於小峴爽將戰飲酒過醉安都望見爽即躍馬大呼直徃刺之呼火故翻刺七亦翻應手而倒左右范雙斬其首爽衆奔散瑜亦為部下所殺遂進攻壽陽克之爽為南豫州刺史鎮壽陽徐遺寳奔東海東海人殺之李延壽論曰凶人之濟其身非世亂莫由焉魯爽以亂世之情而行之於平日平日謂安平無事之日其取敗也宜哉考異曰此語本出沈約宋書吳喜黄回傳賛而延壽取之以爽施用失所故絀其名南郡王義宣至鵲頭慶之送爽首示之并與書曰僕荷任一方而舋生所統去年慶之鎮盱眙今使之專征葢兼督兖豫荷下可翻舋許覲翻近聊帥輕師指徃翦撲輕師言非重兵撲普卜翻軍鋒裁及賊爽授首公情契異常言義宣與爽相結情契異于常人或欲相見及其可識指送相呈爽累世將家魯爽父軌軌父宗之三世將家驍猛善戰號萬人敵驍堅堯翻義宣與質聞其死皆駭懼栁元景軍于采石王𤣥謨以臧質衆盛遣使來求益兵使䟽吏翻上使元景進屯姑孰愚考異曰垣䕶之傳作南州葢南州即姑孰也按宋白續通典曰桓𤣥居南州以在國南故曰南州載之宜州之下晉書云桓𤣥於南州起齋號曰盤龍齋劉毅小字盤龍𤣥既敗毅以豫州刺史出鎮姑孰正居是齋桓𤣥既誅司馬元顯出鎮姑孰起盤龍齋葢是時也晉書正指姑孰為南州宋白誤矣太傅義恭與義宣書曰徃時仲堪假兵靈寳尋害其族孝伯推誠牢之旋踵而敗假兵推誠事並見一百一十卷晉安帝隆安二年桓𤣥殺殷仲堪見一百一十一卷三年桓𤣥字靈寳王恭字孝伯臧質少無美行弟所具悉質少輕薄無檢為文帝所嫌少詩沼翻行下孟翻今藉西楚之彊力圖濟其私凶謀若果果勝也克也决也恐非復池中物也復扶又翻義宣由此疑之五月甲辰義宣至蕪湖質進計曰今以萬人取南州則梁山中絶栁元景屯南州為梁山後鎮若取之則梁山之路中絶萬人綴梁山則𤣥謨必不敢動下官中流鼓棹直趣石頭此上䇿也沈慶之薛安都等在江西栁元景王𤣥謨等與義宣相持若質計得行建康殆矣趣七喻翻義宣將從之劉諶之宻言于義宣曰質求前驅此志難測不如盡鋭攻梁山事克然後長驅此萬安之計也義宣乃止冗從僕射胡子反等守梁山西壘㑹西南風急質遣其將尹周之攻西壘因西南風急而攻西壘東壘之兵難以逆風赴救冗而隴翻從才用翻將即亮翻子反方度東岸就𤣥謨計事聞之馳歸偏將劉季之帥水軍殊死戰帥讀曰率求救於𤣥謨𤣥謨不遣大司馬參軍崔勲之固爭乃遣勲之與積弩將軍垣詢之救之比至城已陷勲之詢之皆戰死比必寐翻及也考異曰義宣傳曰五月十九日西南風猛宋畧曰己亥質遣尹周之攻梁山西壘陷之按長厯是月丁酉朔三日己亥八日甲辰十八日甲寅宋畧於己亥上有甲辰下有甲寅然則决非十九日與己亥或者是己酉與辛亥也今宋書日闕疑詢之䕶之之弟也子反等奔還東岸質又遣其將龎法起將數千兵趨南浦欲自後掩𤣥謨龎皮江翻趨七喻翻時𤣥謨使其將鄭琨武念戍南浦其地則令之大信港也俗謂之扁擔河游擊將軍垣䕶之引水軍與戰破之此以上皆梁山交戰事朱修之斷馬鞍山道水經注檀溪水出襄陽西栁子山下東為鴨湖湖在馬鞍山東北按馬鞍山今謂之望楚山晉劉𢎞所改名也髙處有三磴斷丁管翻據險自守魯秀攻之不克屢為修之所敗敗補邁翻乃還江陵修之引兵躡之或勸修之急追修之曰魯秀驍將也獸窮則攫不可迫也兵法有云知彼知已百戰不殆朱修之此戰近之驍堅堯翻將即亮翻王𤣥謨使垣䕶之告急於栁元景曰西城不守唯餘東城萬人賊軍數倍彊弱不敵欲退還姑孰就節下協力當之更議進取元景不許曰賊勢方盛不可先退吾當卷甲赴之䕶之曰賊謂南州有三萬人而將軍麾下裁十分之一若徃造賊壘造士到翻則虛實露矣王豫州必不可來不如分兵援之元景曰善乃留羸弱自守悉遣精兵助𤣥謨多張旗幟羸倫為翻幟昌志翻梁山望之如數萬人皆以為建康兵悉至衆心乃安質自請攻東城諮議參軍顔樂之説義宣曰質若復克東城樂音洛説輸芮翻復扶又翻則大功盡歸之矣宜遣麾下自行義宣乃遣劉諶之與質俱進甲寅義宣至梁山頓兵西岸義宣自鵲頭至梁山西岸質與劉諶之進攻東城𤣥謨督諸軍大戰薛安都帥突騎先衝其陳之東南䧟之帥讀曰率騎竒寄翻陳讀曰陣斬諶之首劉季之宗越又䧟其西北質等兵大敗垣䕶之燒江中舟艦烟熖覆水艦戸黯翻覆敷又翻下覆頭同延及西岸營壘殆盡諸軍乗勢攻之義宣兵亦潰義宣單舸迸走閉戸而泣舸古我翻迸北孟翻戸艦戸也荆州人随之者猶百餘舸質欲見義宣計事而義宣已去質不知所為亦走其衆皆降散降戸江翻己未解嚴癸亥以吳興太守劉延孫為尚書右僕射守手又翻六月丙寅魏主如隂山臧質至尋陽焚燒府舍載妓妾西走使嬖人何文敬領餘兵居前至西陽西陽太守魯方平紿文敬曰妓渠綺翻嬖卑義翻又博計翻紿蕩亥翻詔書唯捕元惡餘無所問不如逃之文敬棄衆亡去質先以妹夫羊冲為武昌郡晉起居注武帝太康元年改江夏為武昌郡又按晉志吳主權以東鄂置武昌郡今夀昌軍是也質徃投之冲已為郡丞胡庇之所殺質無所歸乃逃于南湖南湖今在壽昌軍武昌縣東八里掇蓮實噉之掇丁括翻噉徒濫翻又徒覧翻追兵至以荷覆頭自沈於水出其鼻沈持林翻戊辰軍主鄭俱兒望見射之中心射而亦翻中竹仲翻兵刃亂至腸胃縈水草斬首送建康子孫皆棄市并誅其黨樂安太守任薈之任音壬薈烏外翻臨川内史劉懐之鄱陽太守杜仲儒仲儒驥之兄子也杜驥元嘉中刺青州功臣栁元景等封賞各有差丞相義宣走至江夏聞巴陵有軍巴陵之軍葢韋崧之兵也或曰湘州刺史劉遵考之兵也夏戸雅翻囘向江陵衆散且盡與左右十許人徒歩脚痛不能前僦民露車自載僦即就翻賃也縁道求食至江陵郭外遣人報竺超民超民具羽儀兵衆迎之時荆州帶甲尚萬餘人左右翟靈寳誡義宣使撫慰將佐翟萇伯翻將即亮翻以臧質違指授之宜用致失利今治兵繕甲更為後圖治直之翻昔漢髙百敗終成大業而義宣㤀靈寳之言誤云項羽千敗衆咸掩口掩口而笑也魯秀竺超民等猶欲收餘兵更圖一决而義宣惽沮無復神守入内不復出沮在吕翻復扶又翻下夜復冋左右腹心稍稍離叛魯秀北走襄考異曰宋畧云秀自陽敗退將及江陵聞敗北走今從宋書義宣不能自立欲從秀去乃攜息慆息子也及所愛妾五人著男子服相随著陟畧翻城内擾亂白刃交横義宣懼墜馬遂歩進竺超民送至城外更以馬與之歸而守城守手又翻義宣求秀不得左右盡棄之夜復還南郡空廨南郡太守廨舍葢在江陵城外廨古隘翻旦日超民收送刺姧自漢以來公府有刺姧掾義宣止獄戸坐地歎曰臧質老奴誤我五妾尋被遣出義宣號泣語獄吏曰常日非苦今日分别始是苦被皮義翻號戸髙翻語牛倨翻别如字分别猶分離也魯秀衆散不能去還向江陵城上人射之射而亦翻秀赴水死就取其首詔右僕射劉孝孫使荆江二州旌别枉直使䟽吏翻别彼列翻就行誅賞且分割二州之地議更置新州由是遂分荆湘江豫之地置郢州初晉氏南遷以揚州為京畿穀帛所資皆出焉以荆江為重鎮甲兵所聚盡在焉常使大將居之將即亮翻三州戸口居江南之半上惡其彊大故欲分之惡烏路翻下同癸未分揚州浙東五郡置東揚州治㑹稽五郡㑹稽東陽永嘉臨海新安會工外翻分荆湘江豫州之八郡置郢州治江夏分荆州之江夏竟陵随武陵天門湘州巴陵江州武昌豫州西陽凡八郡永初郡國志及何承天志江夏太守本治安陸自此之後徙治夏口今鄂州治江夏縣即其地夏户雅翻下夏口同罷南蠻校尉遷其營於建康晉武帝置䕶南蠻校尉於襄陽江左初省尋又置於江陵水經注南蠻校尉府在方城自油口以東屯營相接悉是南蠻府屯兵校戸教翻太傅義恭議使郢州治巴陵尚書令何尚之曰夏口在荆江之中正對沔口通接雍梁寔為津要自夏口入沔泝流而上至襄陽又泝流而上至漢中故云通接雍梁雍於用翻由來舊鎮根基不易夏口自吳以來為重鎮既有見城見賢遍翻浦大容舫於事為便守江之備船艦為急故以浦大容舫為便舫甫妄翻上從之既而荆揚因此虚耗尚之請復合二州復扶人翻上不許戊子省録尚書事上惡宗室彊盛不欲權在臣下太傅義恭知其指故請省之上使王公八座與荆州刺史朱修之書晉志曰五曹尚書一僕射二令為八座宋葢二僕射一令令丞相義宣自為計書未達庚寅修之入江陵殺義宣并誅其子十六人及同黨竺超民從事中郎蔡超諮議參軍顔樂之等超民兄弟應從誅何尚之上言賊既遁走一夫可擒若超民反覆昧利即當取之非唯免愆亦可要不義之賞而超民曽無此意微足觀過知仁何尚之此言為竺超民兄弟道地耳要一遥翻且為官保全城府謹守庫藏為于偽翻藏徂浪翻端坐待縛今戮及兄弟則與其餘逆黨無異於事為重上乃原之秋七月丙申朔日有食之庚子魏皇子𢎞生辛丑大赦改元興光丙辰大赦八月甲戌魏趙王深卒乙亥魏主還平城是年夏書魏主如隂山冬十一月戊戍魏主如中山遂如信都十二月丙子還幸靈丘靈丘縣自漢以來屬代郡唐為蔚州至温泉宫庚辰還平城二年春正月魏車騎大將軍樂平王㧞有辠賜死騎竒寄翻鎮北大將軍南兖州刺史沈慶之請老二月丙寅以為左光禄大夫開府儀同三司慶之固譲表䟽數十上又面自陳乃至稽顙泣涕上時掌翻稽音啟上不能奪聽以始興公就第厚加給奉頃之上復欲用慶之復扶又翻下同使何尚之徃起之尚之累陳上意慶之笑曰沈公不效何公徃而復返尚之不能固志見一百二十六卷文帝元嘉二十八年尚之慙而止辛巳以尚書右僕射劉延孫為南兖州刺史夏五月戊戌以湘州刺史劉遵考為尚書右僕射六月壬戌魏改元太安甲子大赦甲申魏主還平城史亦不書所如之地秋七月癸巳立皇弟休祐為山陽王休茂為海陵王休業為鄱陽王丙辰魏主如河西雍州刺史武昌王渾朱修之已赴江陵栁元景又留建康以渾刺雍州雍於用翻與左右作檄文自號楚王改元永光備置百官以為戱笑長史王翼之封呈其手迹八月庚申廢渾為庶人徙始安郡上遣貟外散騎侍郎東海戴明寳詰責渾散悉亶翻騎竒寄翻詰去吉翻因逼令自殺時年十七丁亥魏主還平城詔祀郊廟初設備樂從前殿中曹郎荀萬秋之議也晉氏南渡草創二郊無樂宗廟雖有登歌亦無二舞及破苻堅得樂工始有金石之樂文帝元嘉二十二年南郊始設登歌此所謂備樂非能備雅樂魏晉以來世俗之樂耳順帝昇明二年王僧䖍所謂朝廷禮樂多違舊典葢指此類上欲削弱王侯冬十月己未江夏王義恭竟陵王誕奏裁王侯車服噐用樂舞制度凡九事上因諷有司奏増廣為二十四條聽事不得南面坐施帳并幡蕃國官正冬不得徒跣登國殿及夾侍國師傳令及油㦸公主妃傳令不得朱服輿不得重掆鄣扇不得雉尾槊毦不得孔雀白氅夾轂隊不得絳襖平乗但馬不得過二匹胡伎不得綵衣舞妓正冬著袿衣不得莊面蔽花正冬㑹不得劍舞杯柈舞長蹻伎䞬舒丸劍博山伎縁大橦伎五案伎自非正冬㑹奏舞曲不得舞諸妃主不得著緄帶信幡非臺省官悉用絳郡縣内史相及封内官長於其封君既非在三罷官則不復追敬不合稱臣止宜上下官敬而已諸鎮常行車前後不得過六隊白直夾轂不在其限刀不得過銀銅飾諸王女封縣主諸王子孫襲封王之妃及封侯者夫人行並不得鹵簿諸王子繼體為王婚葬吉凶悉依諸國公侯之禮不得同皇弟皇子車輿非軺車不得油幢平乗船皆平兩頭作露平形不得擬象龍舟悉不得朱油帳錯不得作五花及竪筍形聽事不得南向坐劍不得為鹿盧形晉灼曰古長劍首以玉作井鹿盧形内史相及封内官長止稱下官不得稱臣罷官則不復追敬長知兩翻復扶又翻詔可庚午魏以遼西王常英為太宰壬午以太傅義恭領揚州刺史竟陵王誕為司空領南徐州刺史建平王宏為尚書令是嵗以故氐王楊保宗子元和為征虜將軍楊頭為輔國將軍頭文徳之從祖兄也元和雖楊氏正統從才用翻楊保宗氐王楊𤣥之子故元和為楊氏正統朝廷以其年幼才弱未正位號部落無定主頭先戍葭蘆母妻子弟並為魏所執文帝元嘉二十年魏克仇池楊文徳敗走頭母妻子弟為魏所執當在是年二十七年始使頭戍葭蘆而頭為宋堅守無貳心為于偽翻雍州刺史王𤣥謨上言雍於用翻上時掌翻請以頭為假節西秦州刺史用安輯其衆俟數年之後元和稍長使嗣故業若元和才用不稱長知兩翻稱尺證翻便應歸頭頭能藩扞漢川使無虜患彼四千戶荒州殆不足惜若葭蘆不守漢川亦無立理上不從三年春正月庚寅立皇弟休範為順陽王休若為巴陵王戊戌立皇子子尚為西陽王壬子納右衛將軍何瑀女為太子妃瑀澄之曽孫也甲寅大赦乙卯魏立貴人馮氏為皇后后遼西郡公朗之女也馮朗降魏見一百二十二卷文帝元嘉九年朗為秦雍二州刺史雍於用翻坐事誅后由是没入宫為馮后專魏政張本二月丁巳魏主立子𢎞為皇太子先使其母李貴人條記所付託兄弟然後依故事賜死甲子以廣州刺史宗慤為豫州刺史故事府州部内論事皆籖前直叙所論之事置典籖以主之宋世諸皇子為方鎮者多幼時主皆以親近左右領典籖近其靳翻典籖之權稍重至是雖長王臨藩長知兩翻素族出鎮典籖皆出納教命執其樞要刺史不得專其職任及慤為豫州臨安吳喜為典籖吳分餘杭為臨水縣晉武帝太康元年更名臨安屬吳興郡慤刑政所施喜毎多違執慤大怒曰宗慤年將六十為國竭命為于偽翻正得一州如斗大正一作止不能復與典籖共臨之喜稽顙流血乃止復扶又翻稽音啟丁零數千家匿井陘山中為盜陘音刑魏選部尚書陸真初學記漢成帝置列曹尚書四人其一曰常侍曹光武改常侍曹曰吏部主選舉靈帝改吏部為選部後魏初有殿中樂部駕部南部北部五尚書選部尚書葢此時方置與州郡合兵討滅之閏月戊午以尚書左僕射劉遵考為丹陽尹癸酉鄱陽哀王休業卒太傅義恭以南兖州刺史西陽王子尚有寵將避之乃辭揚州秋七月解義恭揚州丙子以子尚為揚州刺史時熒惑守南斗上廢西州舊館使子尚移治東城以厭之厭於葉翻又於琰翻斗楊州分故厭之揚州别駕從事沈懐文曰天道示變宜應之以徳今雖空西州恐無益也不從懐文懐逺之兄也八月魏平西將軍漁陽公尉眷擊伊吾克其城大獲而還李寳以伊吾敦煌降魏寳既入朝伊吾復叛故擊之尉紆勿翻還從宣翻又如字九月壬戌以丹陽尹劉遵考為尚書右僕射冬十月甲申魏主還平城亦不書所如之地丙午太傅義恭進位太宰領司徒十一月魏以尚書西平王源賀為冀州刺史更賜爵隴西王更工衡翻賀上言今北虜遊魂南冦負險疆埸之間猶須防戍埸音亦臣愚以為自非大逆赤手殺人其坐贓盗及過誤應入死者皆可原宥讁使守邉則是已斷之體受更生之恩徭役之家蒙休息之恵魏髙宗從之久之謂羣臣曰吾用賀言一嵗所活不少少詩沼翻増戍兵亦多卿等人人如賀朕何憂哉㑹武邑人石華告賀謀反武邑縣前漢屬信都後漢屬安平晉武帝分立武邑郡至隋唐為武邑武彊衡水三縣地有司以聞帝曰賀竭誠事國朕為卿等保之為于偽翻無此明矣命精加訊騐華果引誣自引服誣告之罪帝誅之因謂左右曰以賀忠誠猶不免誣謗不及賀者可無慎哉十二月濮陽太守姜龍駒新平太守楊自倫棄郡奔魏按沈約志濮陽新平皆屬兖州而不載治所葢僑郡也新平郡又明帝㤗始七年立當考又按五代志鄄城縣舊置濮陽郡濮博木翻上欲移青冀二州倂鎮歴城議者多不同青冀二州刺史垣䕶之曰青州北有河濟濟子禮翻又多陂澤非虜所向毎來冦掠必由歴城二州并鎮此經逺之略也北又近河歸順者易近其靳翻易以豉翻近息民患逺申主威安邉之上計也由是遂定青州本治東陽冀州治歴城今并為一鎮元嘉中官鑄四銖錢輪郭形制與五銖同用費無利言鑄一錢之費適當一錢之用無羸利也故民不盜鑄及上即位又鑄孝建四銖形式薄小輪郭不成錢外圎為輪内方為郭於是盜鑄者衆雜以鉛錫翦鑿古錢錢轉薄小守宰不能禁坐死免者相繼盜鑄益甚物價踴貴朝廷患之去嵗春詔錢薄小無輪郭者悉不得行民間喧擾是嵗始興郡公沈慶之建議以為宜聽民鑄錢郡縣置錢署樂鑄之家皆居署内樂音洛平其凖式去其雜偽去羌吕翻去春所禁新品一時施用今鑄悉依此格萬稅三千嚴檢盜鑄檢柬也勘察也丹陽尹顔竣駁之竣七倫翻駁多角翻以為五銖輕重定於漢世漢武帝元狩五年行五銖錢魏晉以降莫之能改誠以物貨既均改之偽生故也今云去春所禁一時施用若巨細摠行而不從公鑄利已既深情偽無極私鑄翦鑿盡不可禁財貨未贍大錢已竭數嵗之間悉為塵土矣今新禁初行品式未一須㬰自止不足以垂聖慮唯府藏空匱實為重憂藏徂浪翻下同今縱行細錢官無益賦之理百姓雖贍贍昌豔翻無解官乏唯簡費去華去羌吕翻專在節儉求贍之道莫此為貴耳議者又以為銅轉難得欲鑄二銖錢竣曰議者以為官藏空虛宜更改鑄天下銅少宜減錢式以救交弊官藏空虛無錢以贍用而天下銅少又無以鑄錢是交弊也議者縁此欲改鑄小錢以救之少詩沼翻賑國舒民賑富也又舉救也舒緩也寛也賑津忍翻愚以為不然今鑄二銖恣行新細於官無解於乏而民間姦巧大興天下之貨將糜碎至盡空嚴立禁而利深難絶不一二年其弊不可復救言不待一二年而弊甚也復扶又翻民懲大錢之改兼畏近日新禁市井之間必生紛擾逺利未聞切患猥及富商得志貧民困窘此皆甚不可者也乃止窘渠隕翻魏定州刺史髙陽許宗之求取不節深澤民馬超謗毁宗之深澤縣前漢屬涿郡後漢屬安平晉以來屬博陵郡後魏博陵郡屬定州唐以博陵郡為定州後分定州置祁州深澤縣屬焉宗之毆殺超毆烏口翻擊也恐其家人告狀上超詆訕朝政上時掌翻魏髙宗曰此必妄也魏字衍朕為天下主何惡於超而有此言惡烏路翻必宗之懼罪誣超案驗果然斬宗之於都南金紫光禄大夫顔延之卒延之子竣貴重凡所資供供居用翻延之一無所受布衣茅屋蕭然如故常乗羸牛笨車笨部本翻竹裏也一曰不精也逢竣鹵簿即屏住道側導從之次第曰鹵簿屛必郢翻常語竣曰吾平生不憙見要人語牛倨翻憙許記翻今不幸見汝竣起宅延之謂曰善為之無令後人笑汝拙也延之嘗早詣竣見賓客盈門竣尚未起延之怒曰汝出糞土之中升雲霞之上遽驕傲如此其能久乎物忌盛滿顔竣之禍其父知之矣竣丁父憂丁當也郭璞曰值也裁踰月起為右將軍丹陽尹如故竣固辭表十上上時掌翻上不許遣中書舍人戴明寳抱竣登車載之郡舍之徃也郡舍丹陽尹廨也賜以布衣一襲絮以綵綸遣主衣就衣諸體主衣主御衣服唐尚衣奉御之職也就衣於既翻大明元年春正月辛亥朔改元大赦壬戌魏主畋於崞山崞山在雁門郡崞縣崞古博翻戊辰還平城魏以漁陽王尉眷為太尉録尚書事尉紆勿翻二月魏人寇兖州向無鹽敗東平太守南陽劉胡無鹽縣自漢以來屬東平郡敗補邁翻詔遣太子左衛率薛安都將騎兵東陽太守沈法系將水軍向彭城以禦之率所律翻將即亮翻騎竒寄翻並受徐州刺史申坦節度比至比必利翻及也魏兵已去先是羣盗聚任城荆榛中累世為患謂之任榛先悉薦翻任音壬任城縣前漢屬東平郡後漢分為任城國後遂為郡宋省郡為任城縣屬髙平郡申坦請回軍討之上許之任榛聞之皆逃散時天旱人馬渴乏無功而還還從宣翻又如字安都法系坐白衣領職坦當誅羣臣為請莫能得為于偽翻沈慶之抱坦哭於市曰汝無辠而死我哭汝於市行當就汝矣有司以聞上乃免之三月庚申魏主畋於松山己巳還平城魏主立其弟新成為陽平王上自即吉之後三年之䘮既除而即吉奢淫自恣多所興造丹陽尹顔竣以藩朝舊臣上為藩王時竣為僚佐是藩朝舊臣也晉宋之間郡曰郡朝府曰府朝藩王曰藩朝宋武帝為宋王齊髙帝為齊王時曰霸朝朝直遥翻下同數懇切諌爭數所角翻爭則迸翻無所回避上浸不恱竣自謂才足幹時恩舊莫比當居中永執朝政而所陳多不納疑上欲踈之乃求外出以占上意夏六月丁亥詔以竣為東揚州刺史竣始大懼為帝殺竣張本癸卯魏主如隂山雍州所統多僑郡縣雍於用翻下同刺史王𤣥謨上言僑郡縣無有境土新舊錯亂租課不時請皆土斷斷丁亂翻秋七月辛未詔并雍州三郡十六縣為一郡郡縣流民不願屬籍屬土著之籍也訛言𤣥謨欲反時栁元景宗彊羣從多為雍部二千石栁元景河東解人南徙僑居于雍部羣從羣從兄弟從才用翻乗聲皆欲討𤣥謨𤣥謨令内外晏然以解衆惑馳使啓上具陳本末使䟽吏翻上知其虚遣主書吳喜撫慰之主書後漢尚書令史之職漢尚書曹有主書令史二十一人江左以來中書省有主書且報曰七十老公反欲何求君臣之際足以相保聊復為笑伸卿眉頭耳復扶又翻𤣥謨性嚴未嘗妄笑故上以此戱之八月己亥魏主還平城甲辰徙司空南徐州刺史竟陵王誕為南兖州刺史以太子詹事劉延孫為南徐州刺史初髙祖遺詔以京口要地去建康宻邇自非宗室近親不得居之延孫之先雖與髙祖同源而髙祖屬彭城延孫屬莒縣南史延孫傳作吕縣吕縣屬彭城郡而莒縣屬東莞郡詳而考之吕縣為是彭城吕二縣並屬彭城郡延孫與帝室同源同郡特異縣耳從來不序昭穆昭讀如字上既命延孫鎮京口仍詔與延孫合族使諸王皆序長幼長知兩翻上閨門無禮不擇親疎尊卑流聞民間無所不至誕寛而有禮又誅太子劭丞相義宣皆有大功誕起兵討劭見上卷文帝元嘉三十年勸止上迎義宣事見上人心竊向之誕多聚才力之士蓄精甲利兵上由是畏而忌之不欲誕居中使出鎮京口猶嫌其逼更徙之廣陵南兖州時治廣陵以延孫腹心之臣使鎮京口以防之為帝討誕張本魏主將東廵冬十月詔太宰常英起行宫於遼西黄山魏收地形志遼西郡肥如縣有黄山十二月丁亥更以順陽王休範為桂陽王休範孝建三年封順陽王更工衡翻二年春正月丙午朔魏設酒禁釀酤飲者皆斬之釀者酤者飲者皆斬吉凶之㑹聽開禁有程日魏主以士民多因酒致鬪及議國政故禁之増置内外候官伺察諸曹及州鎮魏自道武帝以來有候官今増其員伺相吏翻或微服雜亂於府寺間以求百官過失有司窮治訊掠取服治直之翻百官贓滿二丈者皆斬又増律七十九章乙卯魏主如廣寗温泉宫遂廵平州魏平州之地止遼西北平二郡庚午至黄山宫二月丙子登碣石山觀滄海戊寅南如信都畋於廣川廣川縣前漢屬廣川國後漢屬清河郡晉屬勃海郡魏收地形志屬長樂郡長樂即信都也五代志曰北齊廢廣川入棗彊劉昫曰隋於舊縣東八十里置新縣尋改為長河縣屬徳州乙酉以金紫光禄大夫禇湛之為尚書左僕射丙戌建平宣簡王宏以疾解尚書令三月丁未卒丙辰魏髙宗還平城起太華殿酈道元曰魏太和十六年破太華安昌諸殿造太極殿東西堂及朝堂是時給事中郭善明性傾巧説帝大起宫室説輸芮翻中書侍郎髙允諌曰太祖始建都邑其所營立必因農隙况建國已久永安前殿足以朝㑹朝直遥翻西堂温室足以宴息紫樓足以臨望縱有修廣亦宜馴致易曰馴致其道向秀曰馴從也程願曰馴謂習習而漸至於盛馴似遵翻不可倉猝今計所當役凡二萬人老弱供餉又當倍之期半年可畢一夫不耕或受之飢况四萬人之勞費可勝道乎勝音升此陛下所宜留心也帝納之允好切諌朝廷事有不便允輙求見帝常屏左右以待之好呼到翻屏必郢翻屏左右者欲其言無不盡或自朝至暮或連日不出羣臣莫知其所言語或痛切帝所不忍聞命左右扶出然終善遇之時有上事為激訐者帝省之上時掌翻訐居謁翻省悉景翻謂羣臣曰君父一也父有過子何不作書於衆中諌之而於私室屏處諌者屏蔽也屏處隠蔽之處屏必郢翻豈非不欲其父之惡彰於外邪至於事君何獨不然君有得失不能面陳而上表顯諌欲以彰君之短明己之直此豈忠臣所為乎如髙允者乃忠臣也朕有過未嘗不面言至有朕所不堪聞者允皆無所避朕知其過而天下不知可不謂忠乎允所與同徵者游雅等徵允等見一百二十二卷文帝元嘉八年皆至大官封侯部下吏至刺史二千石者亦數十百人部下吏謂中書之吏嘗事允在部下者而允為郎二十七年不徙官魏世祖神䴥四年允徵拜中書博士領著作郎至是年二十五年耳帝謂羣臣曰汝等雖執弓刀在朕左右徒立耳言徒能侍立而不能規諫未嘗有一言規正唯伺朕喜悦之際伺相吏翻祈官乞爵今皆無功而至王公允執筆佐我國家數十年為益不小不過為郎汝等不自愧乎乃拜允中書令上云二十七年不徙官意允拜中書令不在是年時魏百官無禄允常使諸子樵采以自給司徒陸麗言於帝曰髙允雖蒙寵待而家貧妻子不立立成也置也建也謂不能建置家業也帝曰公何不先言今見朕用之乃言其貧乎即日至允第惟草屋數間布被緼袍孔安國曰緼枲著也謂雜用枲麻以著袍禮記曰緼為袍鄭康成注曰緼舊絮也又亂麻緼於粉翻厨中鹽菜而已帝歎息賜帛五百匹粟千斛拜長子悦為長樂太守樂音洛守手又翻允固辭不許帝重允常呼為令公而不名游雅常曰前史稱卓子康劉文饒之為人卓茂字子康劉寛字文饒𥚹心者或不之信𥚹補典翻余與髙子游處四十年處昌吕翻未嘗見其喜愠之色愠於問翻乃知古人為不誣耳髙子内文明而外柔順其言呐呐不能出口呐如悦翻又奴劣翻呐呐言緩也昔崔司徒嘗謂余云髙生豐才博學一代佳士所乏者矯矯風節耳余亦以為然及司徒得辠起於纎微詔指臨責司徒聲嘶股栗殆不能言嘶先齊翻聲破曰嘶宗欽已下伏地流汗皆無人色髙子獨敷陳事理申釋是非辭義清辯音韵髙亮人主為之動容聽者無不神聳事見一百二十五卷文帝元嘉二十七年為于偽翻此非所謂矯矯者乎宗愛方用事威振四海嘗召百官於都坐魏有都坐大官魏之都坐猶唐之朝堂也或曰都坐尚書都坐即唐之政事堂坐徂卧翻王公已下皆趨庭望拜髙子獨升階長揖由此觀之汲長孺可以卧見衛青何抗禮之有言以髙允之揖宗愛觀之則汲黯可以卧見衛青與之抗禮未為過也汲黯字長孺抗禮事見十九卷漢武帝元朔五年此非所謂風節者乎夫人固未易知易以䜴翻吾既失之於心崔又漏之於外𤼵之於言則是漏之於外此乃管仲所以致慟於鮑叔也管仲曰生我者父母知我者鮑子也致慟葢感其知已之深乙丑魏東平成王陸俟卒夏四月甲申立皇子子綏為安陸王帝不欲權在臣下六月戊寅分吏部尚書置二人吏部尚書掌銓選以其權重江左謂之大尚書言其位任與諸曹殊絶也今置二人以分其權以都官尚書謝莊度支尚書吳郡顧覬之為之漢置六曹尚書中都官曹主水火盗賊事魏晉省宋復置隋改都官為刑部尚書改度支為民部尚書唐避太宗諱改民部為戸部度徒洛翻覬音冀下同又省五兵尚書曹魏置五兵尚書隋改曰兵部尚書初晉世散騎常侍選望甚重上之所遴簡為選時之所瞻屬為望散悉亶翻騎竒寄翻與侍中不異其後職任閒散散悉但翻用人漸輕上欲重其選乃用當時名士臨海太守孔覬司徒長史王彧為之彧於六翻侍中蔡興宗謂人曰選曹要重常侍閒淡改之以名而不以實雖主意欲為輕重人心豈可變邪既而常侍之選復卑選部之貴不異言選部貴重與前時無以異也選部須絹翻復扶又翻覬琳之之孫孔琳之事桓𤣥不務迎合諫其廢錢用榖帛復肉刑彧謐之兄孫興宗廓之子也王謐識武帝於龍潛蔡廓以方直著于宋初裴子野論曰官人之難先王言之尚矣書臯陶曰在知人禹曰惟帝其難之知人則哲能官人周禮始於學校校戸敎翻論之州里告諸六事而後貢于王庭六事周之六卿也其在漢家州郡積其功能五府舉為掾屬掾以絹翻三公參其得失尚書奏之天子一人之身所閲者衆閲更歴也故能官得其才鮮有敗事鮮息淺翻魏晉易是所失𢎞多𢎞大也夫厚貌深衷險如谿壑擇言觀行猶懼弗周况今萬品千群俄折乎一面行下孟翻下戒行同折之列翻斷也一面一覿面之頃也庻僚百位專斷於一司一司謂選部斷丁亂翻于是囂風遂行不可抑止囂風謂喧競之風干進務得兼加諂凟易大傳曰君子上交不諂下交不凟無復㢘恥之風謹厚之操官邪國敗左傳曰國家之敗由官邪也復扶又翻不可紀綱假使龍作納言尚書古之納言也舜居南面而治致平章不可必也堯典曰平章百姓孔注曰百姓百官平和章明不可必言不可必致也治直吏翻况後之官人者哉孝武雖分曹為兩謂吏部置兩尚書不能反之於周漢朝三暮四其庸愈乎莊子曰狙公賦芧曰朝三而暮四衆狙皆怒曰然則朝四而暮三衆狙皆喜名實未虧而喜怒為用丙申魏主畋于松山庚午如河西南彭城民髙闍晉氏南渡僑立南彭城郡於晉陵界闍視遽翻沙門曇標以妖妄相扇曇徒含翻妖於遥翻與殿中將軍苗允等謀作亂立闍為帝事覺甲辰皆伏誅死者數十人於是下詔沙汰諸沙門設諸科禁嚴其誅坐自非戒行精苦並使還俗行下孟翻而諸尼多出入宫掖此制竟不能行中書令王僧達幼聰警能文而跌蕩不拘跌徒結翻蕩徒浪翻不拘言其不拘常檢也帝初踐阼擢為僕射居顔劉之右顔竣劉延孫帝之腹心也自負才地地謂門地謂當時莫及一二年間即望宰相既而遷䕶軍怏怏不得志怏於兩翻累啓求出上不悦由是稍稍下遷五嵗七徙七徙官也再被彈削僧逹既恥且怨所上表奏辭㫖抑揚又好非議朝政上時掌翻好呼到翻朝直遙翻上已積憤怒路太后兄子嘗詣僧達趨升其榻僧達令舁棄之路太后兄慶之嘗為王氏門下騶故僧達麾其子舁音余又羊茹翻對舉也孔光屈身於董賢以保其禄位人以為諂王僧達抗意於路瓊之以殺其身人以為躁逺小人不惡而嚴君子葢必有道也太后大怒固邀上令必殺僧達㑹髙闍反上因誣僧達與闍通謀八月丙戌收付廷尉賜死沈約論曰夫君子小人類物之通稱蹈道則為君子違之則為小人稱尺證翻是以太公起屠釣為周師傅説去板築為殷相太公屠牛于朝歌釣于渭濱周文王迎以為師傅説築于傅巖之野殷髙宗求以為相説於恱翻相息亮翻明敭幽仄書曰明明揚側陋敭與揚同唯才是與逮于二漢兹道未革胡廣累世農夫致位公相黄憲牛醫之子名重京師非若晩代分為二途也魏武始立九品葢以論人才優劣詳見八十一卷晉武帝太康五年非謂世族髙卑而都正俗士随時俯仰憑藉世資用相陵駕都正謂諸州中正也因此相沿遂為成法周漢之道以智役愚魏晉以來以貴役賤士庻之科較然有辨矣裴子野論曰古者徳義可尊無擇負販茍非其人何取世族名公子孫還齊布衣之伍士庶雖分本無華素之隔華榮也輝也故榮貴之族謂之華宗其子弟謂之華胄素白也質也故白屋謂之素門寒士謂之素士自晉以來其流稍改草澤之士猶顯清途降及季年專限閥閱史記明其等曰閥積其功曰閱又門在左曰閥在右曰閲閥音伐自是三公之子傲九棘之家周禮朝士掌外朝之法左九棘孤卿大夫位焉右九棘公侯伯子男位焉後世直謂九棘為九卿黄散之孫蔑令長之室散悉亶翻長知兩翻轉相驕矜互爭銖兩唯論門戸不問賢能以謝靈運王僧達之才華輕躁使其生自寒宗猶將覆折折而設翻重以怙其庇廕召禍宜哉重直用翻九月乙巳魏主還平城自河西還丙寅魏大赦冬十月甲戌魏主北廵欲伐柔然至隂山㑹雨雪魏主欲還太尉尉眷曰今動大衆以威北狄去都不逺而車駕遽還虜必疑我有内難尉尉下紆勿翻難乃旦翻將士雖寒不可不進魏主從之辛卯軍于車崘山車崘山北史作車輪山魏收地形志秀容郡敷城縣有車輪泉神積射將軍殷孝祖築兩城於清水之東文帝元嘉九年置積射彊弩等將軍沈約曰晉太康十年置魏鎮西將軍封敕文攻之清口戍主振威將軍傅乾愛拒破之孝祖羡之曽孫也殷羡殷浩之父上遣虎賁主龎孟蚪救清口虎賁主主虎賁士賁音奔考異曰宋顔師伯傳云魏遣清水公捨賁敕文寇清口世祖遣孟蚪及殷孝祖赴討魏本紀孝祖修兩城於清水東詔封敕文擊之今從之青冀二州刺史顔師伯遣中兵參軍茍思達助之敗魏兵於沙溝按此清口非清水入淮之口乃濟水與汶水合之口水經濟水東北過夀張縣西安民亭南汶水從東北來注之注云戴延之所謂清口也濟水又北過須昌穀城臨邑盧縣又東北與中川水合注云中川水與賓溪水合而北流逕盧縣故城東又北流入濟俗謂之沙溝水敗補邁翻師伯竣之族兄也上遣司空叅軍卜天生將兵㑹傅乾愛及中兵參軍江方興共擊魏兵屢破之江方興葢司空中兵參軍將即亮翻下同斬魏將窟瓌公等數人窟苦骨翻瓌姑回翻十一月魏征西將軍皮豹子等將三萬騎助封敕文寇青州顔師伯禦之輔國將軍焦度刺豹子墜馬獲其鎧矟具裝手殺數十人度本南安氐也刺七亦翻鎧苦亥翻矟邑角翻魏主自將騎十萬車十五萬兩擊柔然度大漠旌旗千里柔然處羅可汗逺遁其别部烏朱駕頹等帥數千落降于魏騎竒寄翻兩音亮可從刋入聲汗音寒帥讀曰率降戸江翻魏主刻石紀功而還還從宣翻初上在江州山隂戴法興戴明寳蔡閑為典籖及即位皆以為南臺侍御史兼中書通事舍人御史臺謂之南臺晉初置中書舍人通事各一人江左令舍人通事謂之通事舍人掌呈奏案又掌詔命是嵗三典籖並以初舉兵預宻謀賜爵縣男閑已卒追賜之時上親覽朝政朝直遥翻不任大臣而腹心耳目不得無所委寄法興頗知古今素見親待魯郡巢尚之人士之末渉獵文史為上所知亦以為中書通事舍人凡選授誅賞大處分處昌吕翻分扶問翻下定分同上皆與法興尚之參懐宋齊之間凡參决機務率皆謂之參懐内外雜事多委明寳三人權重當時而法興明寳大納貨賄凡所薦達言無不行天下輻凑門外成市家産並累千金吏部尚書顧覬之獨不降意於法興等蔡興宗與覬之善嫌其風節太峻覬之曰辛毗有言孫劉不過使吾不為三公耳魏明帝時劉放孫資制斷時政大臣莫不交好而辛毗不與徃來毗子敞諌曰劉孫用事衆皆影附大人宜少降意不然必有謗言毗正色曰吾之立身自有本末就與孫劉不平不過不為三公大丈夫欲為公而毁其髙節邪覬音冀覬之常以為人禀命有定分分扶問翻非智力可移唯應恭已守道而闇者不達妄意僥倖僥堅堯翻徒虧雅道無闗得䘮䘮息浪翻乃以其意命弟子原著定命論以釋之原南史作愿資治通鑑卷一百二十八
