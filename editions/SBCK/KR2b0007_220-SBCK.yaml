body:
  text: 臣司馬光奉敕編集唐紀三十六雍閹茂凡一年有奇起強圉作噩九月盡著肅宗文明武德大聖大宣孝皇帝中之下至德二載九月丁丑希德以輕騎至城下挑戰千里帥百騎開門突出欲擒之㑹救至千里收騎退還橋壊墜塹中反為希德所擒仰謂從騎曰吾不幸至此天也歸語諸將善為守備寜失帥不可失城希徳攻城竟不克送千里於洛陽安慶緒以為特進囚之客省郭子儀以回紇兵精勸上益徴其兵以擊賊懐仁可汗遣其子葉䕶及將軍帝徳等將精兵四千餘人來至鳯翔上引見葉䕶宴勞賜賚惟其所欲丁亥元帥廣平王俶將朔方等軍及回紇西域之衆十五萬號二十萬發鳯翔俶見葉䕶約為兄弟葉䕶大喜謂俶為兄回紇至扶風郭子儀留宴三日葉䕶曰國家有急逺來相助何以食為宴畢即行日給其軍羊二百口牛二十頭米四十斛庚子諸軍俱發壬寅至長安城西陳於香積寺北灃水之東李嗣業為前軍郭子儀為中軍王思禮為後軍賊衆十萬陳於其北李歸仁出挑戰官軍逐之逼於其陳賊軍齊進官軍却為賊所乗軍中驚亂賊争趣輜重李嗣業曰今日不以身餌賊軍無孑遺矣乃肉􅃝執長刀立於陳前大呼奮擊當其刀者人馬俱碎殺數十人陳乃稍定於是嗣業帥前軍各執長刀如牆而進身先士卒所向摧靡都知兵馬使王難得救其禆將賊射之中眉皮垂鄣目難得自㧞箭掣去其皮血流被面前戰不巳賊伏精騎於陳東欲襲官軍之後偵者知之朔方左廂兵馬使僕固懐恩引回紇就擊之翦滅殆盡賊由是氣索李嗣業又與回紇出賊陳後與大軍交擊自午及酉斬首六萬級填溝塹死者甚衆賊遂大潰餘衆走入城迨夜囂聲不止僕固懐恩言於廣平王俶曰賊弃城走矣請以二百騎追之􅅞取安守忠李歸仁等俶曰將軍戰亦疲矣且休息俟明旦圗之懐恩曰歸仁守忠賊之驍將驟勝而敗此天賜我也柰何縱之使復得衆還為我患悔之無及戰尚神速何明旦也俶固止之使還營懐恩固請往而復反一夕四五起遲明諜至守忠歸仁與張通儒田乾真等皆巳遁矣癸卯大軍入西京初上欲速得京師與回紇約曰克城之日土地士庻歸唐金帛子女皆歸回訖至是葉䕶欲如約廣平王俶拜於葉䕶馬前曰今始得西京若遽俘掠則東京之人皆為賊固守不可復取矣願至東京乃如約葉䕶驚躍下馬荅拜跪捧王足曰當為殿下徑往東京即與僕固懐恩引回紇西域之兵自城南過營於滻水之東百姓軍士胡虜見俶拜者皆泣曰廣平王真華夷之主上聞之喜曰朕不及也俶整衆入城百姓老幼夾道歡呼悲泣俶留長安鎮撫三日引大軍東出以太子少傅虢王巨為西京留守甲辰㨗書至鳯翔百寮入賀上涕泗交頥即日遣中使啖庭瑶入蜀奏上皇命左僕射裴冕入京師告郊廟及宣慰百姓上以駿馬召李泌於長安旣至上曰朕巳表請上皇東歸朕當還東宫復修人子之職泌曰表可追乎上曰已逺矣泌曰上皇不來矣上驚問故泌曰理勢自然上曰為之柰何泌曰今請更為羣臣賀表言自馬嵬請留靈武勸進及今成功聖上思戀晨昏請速還京以就孝養之意則可矣上即使泌草表上讀之泣曰朕始以至誠願歸萬機今聞先生之言乃寤其失立命中使奉表入蜀因就泌飲酒同榻而寢而李輔國請取契鑰付泌泌請使輔國掌之上許之泌曰臣今報徳足矣復為閑人何樂如之上曰朕與先生累年同憂患今方相同娯樂柰何遽欲去乎泌曰臣有五不可留願陛下聽臣去免臣於死上曰何謂也對曰臣遇陛下太早陛下任臣太重寵臣太深臣功太髙迹太奇此其所以不可留也上曰且眠矣異日議之對曰陛下今就臣榻卧猶不得請況異日香桉之前乎陛下不聽臣去是殺臣也上曰不意卿疑朕如此豈有如朕而辦殺卿邪是直以朕為句踐也對曰陛下不辦殺臣故臣求歸若其既辦臣安得復言且殺臣者非陛下也乃五不可也陛下曏日待臣如此臣於事猶有不敢言者況天下既安臣敢言乎上良久曰卿以朕不從卿北伐之謀乎對曰非也所不敢言者乃建寜耳上曰建寜朕之愛子性英果艱難時有功朕豈不知之但因此為小人所教欲害其兄圗繼嗣朕以社稷大計不得已而除之卿不細知其故邪對曰若有此心廣平當怨之廣平每與臣言其寃輒流涕嗚咽臣今必辭陛下去始敢言之耳上曰渠甞夜捫廣平意欲加害對曰此皆出䜛人之口豈有建寜之孝友聦明肯為此乎且陛下昔欲用建寜為元帥臣請用廣平建寜若有此心當深憾於臣而以臣為忠益相親善陛下以此可察其心矣上乃泣下曰先生言是也既往不咎朕不欲聞之泌曰臣所以言之者非咎既往乃欲陛下慎將來耳昔天后有四子長曰太子弘天后方圗稱制惡其聦明酖殺之立次子雍王賢賢内憂懼作黄臺􅀲辭冀以感悟天后天后不聽賢卒死於黔中其辭曰種􅀲黄臺下􅀲熟子離離一摘使􅀲好再摘使􅀲稀三摘猶為可四摘抱蔓歸今陛下已一摘矣慎無再摘上愕然曰安有是哉卿錄是辭朕當書紳對曰陛下但識之於心何必形於外也是時廣平王有大功良娣忌之潜搆流言故泌言及之泌復固請歸山上曰俟將發此議之郭子儀引蕃漢兵追賊至潼闗斬首五千級克華陰弘農二郡闗東獻俘百餘人敕皆斬之監察御史李勉言於上曰今元惡未除為賊所汚者半天下聞陛下龍興咸思洗心以承聖化今悉誅之是驅之使從賊也上遽使赦之冬十月丁未啖庭瑶至蜀壬子興平軍奏破賊於武闗克上洛郡吐蕃陷西平尹子奇久圍睢陽城中食盡議弃城東走張廵許逺謀以為睢陽江淮之保障若弃之去賊必乗勝長驅是無江淮也且我衆饑羸走必不達古者戰國諸侯尚相救恤況密邇羣帥乎不如堅守以待之茶􅁓既盡遂食馬馬盡羅雀掘䑕雀䑕又盡廵出愛妾殺以食士逺亦殺其奴然後括城中婦人食之旣盡繼以男子老弱人知必死莫有叛者所餘纔四百人癸丑賊登城將士病不能戰廵西向再拜曰臣力竭矣不能全城生既無以報陛下死當為厲鬼以殺賊城遂陷廵逺俱􅀍執尹子竒問廵曰聞君每戰眥裂齒碎何也廵曰吾志吞逆賊但力不能耳子竒以刀抉其口視之所餘纔三四子竒義其所為欲活之其徒曰彼守節者也終不為吾用且得士心存之將為後患乃并南霽雲雷萬春等三十六人皆斬之巡且死顔色不亂揚揚如常生致許逺於洛陽廵􅀄守睢陽時卒僅萬人城中居人亦且數萬巡一見問姓名其後無不識者前後大小戰凡四百餘殺賊卒十二萬人廵行兵不依古法教戰陳令本將各以其意教之人或問其故廵曰今與胡虜戰雲合鳥散變態不恒數步之間勢有同異臨機應猝在於呼吸之間而動詢大將事不相及非知兵之變者也故吾使兵識將意將識士情投之而往如手之使指兵將相習人自為戰不亦可乎自興兵器械甲仗皆取之於敵未甞自修每戰將士或退散廵立於戰所謂將士曰我不離此汝為我還决之將士莫敢不還死戰卒破敵又推誠待人無所疑隐臨敵應變出奇無窮號令明賞罰信與衆共甘苦寒暑故下争致死力張鎬聞睢陽圍急倍道亟進檄浙東浙西淮南北海諸節度及譙郡太守閭丘曉使共救之曉素傲很不受鎬命比鎬至睢陽城巳陷三日鎬召曉杖殺之張通儒等收餘衆走保陜安慶緒悉發洛陽兵使其御史大夫嚴莊將之就通儒以拒官軍并舊兵步騎猶十五萬己未廣平王俶至曲沃回紇葉䕶使其將軍鼻施吐撥裴羅等引軍旁南山搜伏因駐軍嶺北郭子儀等與賊遇於新店賊依山而陳子儀等初與之戰不利賊逐之下山回紇自南山襲其背於黃埃中發十餘矢賊驚顧曰回紇至矣遂潰官軍與回紇夾擊之賊大敗僵尸蔽野嚴莊張通儒等弃陜東走廣平王俶郭子儀入陜城僕固懐恩等分道追之嚴莊先入洛陽告安慶緒庚申夜慶緒帥其黨自苑門出走河北殺所獲唐將哥舒翰程千里等三十餘人而去許逺死於偃師壬戌廣平王俶入東京回紇意猶未厭俶患之父老請率羅錦萬匹以賂回紇回紇乃止成都使還上皇誥曰當與我劒南一道自奉不復來矣上憂懼不知所為數日後使者至言上皇初得上請歸東宫表彷徨不能食欲不歸及羣臣表至乃大喜命食作樂下誥定行日上召李泌告之曰皆卿力也泌求歸山不已上固留之不能得乃聽歸衡山敕郡縣為之築室於山中給三品料癸亥上發鳯翔遣太子太師韋見素入蜀奉迎上皇乙丑郭子儀遣左兵馬使張用濟右武鋒使渾釋之將兵取河陽及河内嚴莊來降陳留人殺尹子奇舉郡降田承嗣圍来瑱於頴川亦遣使来降郭子儀應之緩承嗣復叛與武令珣皆走河北制以瑱為淮南節度使丙寅上至望賢宫得東京㨗奏丁卯上入西京百姓出國門奉迎二十里不絶舞躍呼萬歲有泣者上入居大明宫御史中丞崔器令百官受賊官爵者皆脫巾徒跣立於含元殿前􅅮膺頓首請罪環之以兵使百官臨視之太廟為賊所焚上素服向廟哭三日是日上皇發蜀郡安慶緒走保鄴郡改鄴郡為安成府改元天成從騎不過三百步卒不過千人諸將阿史那承慶等散投常山趙郡范陽旬日間蔡希徳自上黨田承嗣自頴川武令珣自南陽各帥所部兵歸之又召募河北諸郡人衆至六萬軍聲復振廣平王俶之入東京也百官受安禄山父子官者陳希烈等三百餘人皆素服悲泣請罪俶以上㫖釋之尋勒赴西京己巳崔器令詣朝堂請罪如西京百官之儀然後收繫大理京兆獄其府縣所由祗承人等受賊驅使追捕者皆繫之初汲郡甄濟有操行隐居青巖山安禄山為采訪使奏掌書記濟察禄山有異志詐得風疾舁歸家禄山反使蔡希徳引行刑者二人封刀召之濟引首待刀希徳以實病白禄山後安慶緒亦使人強舁至東京月餘㑹廣平王俶平東京濟起詣軍門上謁俶遣詣京師上命館之於三司令受賊官爵者列拜以媿其心以濟為祕書郎國子司業蘇源明稱病不受禄山官上擢為考功郎中知制誥壬申上御丹鳯樓下制士庻受賊官禄為賊用者令三司條件聞奏其因戰被虜或所居密近因與賊往来者皆聽自首除罪其子女為賊所汚者勿問癸酉回紇葉䕶自東京還上命百官迎之於長樂驛上與宴於宣政殿葉䕶奏以軍中馬少請留其兵於沙苑自歸取馬還為陛下掃除范陽餘孽上賜而遣之十一月廣平王俶郭子儀來自東京上勞子儀曰吾之家國由卿再造張鎬帥魯炅來瑱呉王祗李嗣業李奐五節度徇河南河東郡縣皆下之惟能元皓據北海高秀巖據大同未下己丑以回紇葉䕶為司空忠義王歲遺回紇絹二萬匹使就朔方軍受之以嚴莊為司農卿上之在彭原也更以栗為九廟主庚寅朝享於長樂殿丙申上皇至鳯翔從兵六百餘人上皇命悉以甲兵輸郡庫上發精騎三千奉迎十二月丙午上皇至咸陽上備法駕迎於望賢宫上皇在宫南樓上釋黄袍著紫袍望樓下馬趨進拜舞於樓下上皇降樓撫上而泣上捧上皇足嗚咽不自勝上皇索黄袍自為上著之上伏地頓首固辭上皇曰天數人心皆歸於汝使朕得保養餘齒汝之孝也上不得已受之父老在仗外歡呼且拜上令開仗縱千餘人入謁上皇曰臣等今日復賭二聖相見死無恨矣上皇不肯居正殿曰此天子之位也上固請自扶上皇登殿尚食進食上品嘗而薦之丁未將發行宫上親為上皇習馬而進之上皇上馬上親執鞚行數步上皇止之上乗馬前引不敢當馳道上皇謂左右曰吾為天子五十年未為貴今為天子父乃貴耳左右皆呼萬􅀊上皇自開逺門入大明宫御含元殿慰撫百官乃詣長樂殿謝九廟主慟哭久之即日幸興慶宫遂居之上累表請避位還東宫上皇不許辛亥以禮部尚書李峴兵部侍郎吕諲為詳理使與御史大夫崔器共按陳希烈等獄峴以殿中侍御史李栖筠為詳理判官栖筠多務平恕故人皆怨諲器之刻深而峴獨得羙譽戊午上御丹鳯樓赦天下惟與安祿山同反及李林甫王鉷楊國忠子孫不在免例立廣平王俶為楚王加郭子儀司徒李光弼司空自餘蜀郡靈武扈從立功之臣皆進階賜爵加食邑有差李憕盧奕顔杲卿袁履謙許逺張廵張介然蔣清龎堅等皆加追贈官其子孫戰亡之家給復二載郡縣來載租庸三分蠲一近所改郡名官名一依故事以蜀郡為南京鳯翔為西京西京為中京以張良娣為淑妃立皇子南陽王係為趙王新城王僅為彭王頴川王僴為兖王東陽王侹為涇王僙為㐮王倕為杞王偲為召王佋為興王侗為定王議者或罪張廵以守睢陽不去與其食人曷若全人其友人李翰為之作傳表上之以為廵以寡擊衆以弱制彊保江淮以待陛下之師師至而廵死廵之功大矣而議者或罪廵以食人愚廵以守死善遏惡揚錄瑕弃用臣竊痛之廵所以固守者以待諸軍之救救不至而食盡食旣盡而及人乖其素志設使廵守城之初已有食人之計損數百之衆以全天下臣猶曰功過相掩況非其素志乎今廵死大難不覩休明唯其令名是其榮祿若不時紀錄恐逺而不傳使廵生死不遇誠可悲焉臣敢撰傳一卷獻上乞編列史官衆議由是始息是後赦令無不及李憕等而程千里獨以生執賊庭不沾褒贈甲子上皇御宣政殿以傳國寶授上上始涕泣而受之安慶緒之北走也其大將北平王李歸仁及精兵曵落河同羅六州胡數萬人皆潰歸范陽所過俘掠人物無遺史思明厚為之備且遣使逆招之范陽境曵落河六州胡皆降同羅不從思明縦兵擊之同羅大敗悉奪其所掠餘衆走歸其國慶緒忌思明之彊遣阿史那承慶安守忠往徴兵因密圗之判官耿仁智說思明曰大夫崇重人莫敢言仁智願一言而死思明曰何也仁智曰大夫所以盡力於安氏者廹於㐫威耳今唐室中興天子仁聖大夫誠帥所部歸之此轉禍為福之計也禆將烏承玭亦說思明曰今唐室再造慶緒葉上露耳大夫柰何與之俱亡若歸欵朝廷以自湔洗易於反掌耳思明以為然承慶守忠以五千勁騎自隨至范陽思明悉衆數萬迎之相距一里所使人謂承慶等曰相公及王逺至將士不勝其喜然邊兵怯懦懼相公之衆不敢進願弛弓以安之承慶等從之思明引承慶等入内㕔樂飲别遣人收其甲兵諸郡兵皆給糧縱遣之願留者厚賜分􅀠諸營明日囚承慶等遣其將竇子昂奉表以所部十三郡及兵八萬來降并帥其河東節度使高秀巖亦以所部来降乙丑子昂至京師上大喜以思明為歸義王范陽節度使子七人皆除顯官遣内侍李思敬與烏承恩往宣慰使將所部兵討慶緒先是慶緒以張忠志為常山太守思明召忠志還范陽以其將薛蕚攝􅁪州剌史開井陘路招趙郡太守陸濟降之命其子朝義將兵五千人攝冀州刺史以其將令狐彰為愽州刺史烏承恩所至宣布詔㫖滄瀛安深徳棣等州皆降雖相州未下河北率為唐有矣上皇加上尊號曰光天文武大聖孝感皇帝郭子儀還東都經營河北崔器吕諲上言諸陷賊官背國從偽準律皆應處死上欲從之李峴以為賊陷兩京天子南廵人自逃生此屬皆陛下親戚或勲舊子孫今一槩以叛法處死恐乖仁恕之道且河北未平羣臣陷賊者尚多若寛之足開自新之路若盡誅之是堅其附賊之心也書曰殱厥渠魁脅從㒺理諲器守文不達大體惟陛下圗之争之累日上從峴議以六等定罪重者刑之於市次賜自盡次重杖一百次三等流貶壬申斬逹奚珣等十八人於城西南獨栁樹下陳希烈等七人賜自盡於大理寺應受杖者於京兆府門上欲免張均張垍死上皇曰均垍事賊皆任權要均仍為賊毀吾家事罪不可赦上叩頭再拜曰臣非張說父子無有今日臣不能活均垍使死者有知何面目見說於九泉因俯伏流涕上皇命左右扶上起曰張垍為汝長流嶺表張均必不可活汝更勿救上泣而從命安禄山所署河南尹張萬頃獨以在賊中能保庇百姓不坐頃之有自賊中來降者言唐羣臣從安慶緒在鄴者聞廣平王赦陳希烈等皆自悼恨失身賊庭及聞希烈等誅乃止上甚悔之臣光曰為人臣者策名委質有死無貳希烈等或貴為卿相或親連肺腑於承平之日無一言以規人主之失救社稷之危迎合取容以竊冨貴及四海横潰乗輿播越偷生茍免顧戀妻子媚賊稱臣為之陳力此乃屠酤之所羞犬馬之不如儻更全其首領復其官爵是謟䛕之臣無往而不得計也彼顔杲卿張廵之徒世治則擯斥外方沈抑下僚世亂則委弃孤城韲粉宼手何為善者之不幸而為惡者之幸朝廷待忠義之薄而保姦邪之厚邪至於微賤之臣廵徼之􅀠謀議不預號令不及朝聞親征之詔夕失警蹕之所乃復責其不能扈從不亦難哉六等議刑斯亦可矣又何悔焉故妃韋氏既廢為尼居禁中是歲卒置左右神武軍取元從子弟充其制皆如四軍揔謂之北牙六軍又擇善騎射者千人為殿前射生手分左右廂號曰英武軍升河中防禦使為節度領蒲綘等七州分劔南為東西川節度東川領梓遂等十二州又置荆灃節度領荆灃等五州䕫峽節度領䕫峽等五州更安西曰鎮西乾元元年春正月戊寅上皇御宣政殿授冊加上尊號上固辭大聖之號上皇不許上尊上皇曰太上至道聖皇天帝先是官軍旣克京城宗廟之器及府庫資財多散在民間遣使檢括頗有煩擾乙酉敕盡停之乃命京兆尹李峴安撫坊市二月癸卯朔以殿中監李輔國兼太僕卿輔國依附張淑妃判元帥府行軍司馬勢傾朝野安慶緒所署北海節度使能元皓舉所部來降以為鴻臚卿充河北招討使丁未上御明鳯門赦天下改元盡免百姓今載租庸復以載為年庚午以安東副大都䕶王玄志為營州刺史充平盧節度使三月甲戍徙楚王俶為成王戊寅立張淑妃為皇后鎮西北庭行營節度使李嗣業屯河内癸巳北庭兵馬使王惟良謀作亂嗣業與禆將荔非元禮討誅之安慶緒之北走也其平原太守王􅌔清河太守宇文寛皆殺其使者來降慶緒使其將蔡希徳安太清攻㧞之生擒以歸冎於鄴市凡有謀歸者皆誅及種族乃至部曲州縣官屬連坐死者甚衆又與其羣臣歃血盟於鄴南而人心益離慶緒聞李嗣業在河内夏四月與蔡希徳崔乾祐將步騎二萬涉沁水攻之不勝而還癸卯以太子少師虢王巨為河南尹充東京留守辛卯新主入太廟甲寅上享太廟遂祀昊天上帝乙卯御明鳯門赦天下五月壬午制停采訪使改黜陟使為觀察使張鎬性簡澹不事中要聞史思明請降上言思明凶險因亂竊位力彊則衆附勢奪則人離彼雖人面心如野獸難以徳懐願勿假以威權又言滑州防禦使許叔冀狡猾多詐臨難必變請徴入宿衛時上以寵納思明㑹中使自范陽及白馬來皆言思明叔冀忠懇可信上以鎬為不切事機戊子罷為荆州防禦使以禮部尚書崔光逺為河南節度使張后生興王佋纔數歲欲以為嗣上疑未决從容謂考功郎中知制誥李揆曰成王長且有功朕欲立為太子卿意何如揆再拜賀曰此社稷之福臣不勝大慶上喜曰朕意决矣庚寅立成王俶為皇太子揆道玄之玄孫也乙未以崔圓為太子少師李麟為少傅皆罷政事上頗好鬼神太常少卿王璵專依鬼神以求媚每議禮儀多雜以巫祝俚俗上恱之以璵為中書侍郎同平章事贈故常山太守顔杲卿太子太保謚曰忠節以其子威明為太僕丞杲卿之死也楊國忠用張通幽之譛竟無褒贈上在鳯翔顔真卿為御史大夫泣訴於上上乃出通幽為普安太守具奏其狀於上皇上皇杖殺通幽杲卿子泉明為王承業所留因寓居夀陽為史思明所虜裹以牛革送於范陽㑹安慶緒初立有赦得免思明降乃得歸求其父尸於東京得之遂并袁履謙尸棺歛以歸杲卿姊妹女及泉明之子皆流落河北真卿時為蒲州刺史使泉明往求之泉明號泣求訪哀感路人久乃得之泉明詣親故乞索隨所得多少贖之先姑姊妹而後其子姑女為賊所掠泉明有錢二百緡欲贖己女閔其姑愁悴先贖姑女比更得錢求其女已失所在遇羣從姊妹及父時將吏袁履謙等妻子流落者皆與之歸凡五十餘家三百餘口均减資糧一如親戚至蒲州真卿悉加贍給久之隨其所適而資送之袁履謙妻疑履謙衣衾儉薄發棺視之與杲卿無異乃始慙服六月己酉立太一壇於南郊之東從王璵之請也上甞不豫卜云山川為祟璵請遣中使與女巫乗驛分禱天下名山大川巫恃勢所過煩擾州縣干求受贓黄州有巫盛年羙色從無賴少年數十為蠧尤甚至黃州宿於驛舎刺史左震晨至驛門扃鏁不可啟震怒破鏁而入曵巫於階下斬之所從少年悉斃之籍其贓數十萬具以狀聞且請以其贓代貧民租遣中使還京師上無以罪也以開府儀同三司李嗣業為懐州剌史充鎮西北庭行營節度使山人韓頴改造新曆丁巳初行頴曆戊午敕兩京陷賊官三司推䆒未畢者皆釋之巳貶降者續處分太子少師房琯旣失職頗怏怏多稱疾不朝而賔客朝夕盈門其黨為之揚言於朝云琯有文武才宜大用上聞而惡之下制數琯罪貶􅃎州刺史前祭酒劉秩貶閬州刺史京兆尹嚴武貶巴州刺史皆琯黨也初史思明以列將事平盧軍使烏知義知義善待之知義子承恩為信都太守以郡降思明思明思舊恩而全之及安慶緒敗承恩說思明降唐李光弼以思明終當叛亂而承恩為思明所親信陰使圗之又勸上以承恩為范陽節度副使賜阿史那承慶鐵劵令共圗思明上從之承恩多以私財募部曲又數衣婦人服詣諸將營說誘之諸將以白思明思明疑未察會承恩入京師上使内侍李思敬與之俱至范陽宣慰承恩旣宣㫖思明留承恩館於府中帷其床伏二人於牀下承恩少子在范陽思明使省其父夜中承恩密謂其子曰吾受命除此逆胡當以吾為節度使二人於牀下大呼而出思明乃執承恩索其装囊得鐵劵及光弼牒牒云承慶事成則付鐡劵不然不可付也又得簿書數百􅁓皆先從思明反者將士名思明責之曰我何負於汝而為此承恩謝曰死罪此皆李光弼之謀也思明乃集將佐吏民西向大哭曰臣以十三萬衆降朝廷何負陛下而欲殺臣遂榜殺承恩父子連坐死者二百餘人承恩弟承玼走免思明囚思敬表上其狀上遣中使慰諭思明曰此非朝廷與光弼之意皆承恩所為殺之甚善會三司議陷賊官罪狀至范陽思明謂諸將曰陳希烈輩皆朝廷大臣上皇自弃之幸蜀今猶不免於死況吾屬本從安禄山反乎諸將請思明表求誅光弼思明從之命判官耿仁智與其僚張不矜為表云陛下不為臣誅光弼臣當自引兵就太原誅之不矜草表以示思明及將入函仁智悉削去之寫表者以白思明思明命執二人斬之仁智事思明久思明憐欲活之復召入謂曰我任使汝垂三十年今日非我負汝仁智大呼曰人生會有一死得盡忠義死之善者也今從大夫反不過延歲月豈若速死之愈乎思明怒亂捶之腦流于地烏承玼奔太原李光弼表為昌化郡王充石嶺軍使秋七月丙戌初鑄當十大錢文曰乾元重寶從御史中丞第五琦之謀也丁亥冊命回紇可汗曰英武威逺毗伽闕可汗以上幼女寧國公主妻之以殿中監漢中王瑀為冊禮使右司郎中李巽副之命左僕射裴冕送公主至境上戊子又以司勲貟外郎鮮于叔明為瑀副叔明仲通之弟也甲子上送寜國公主至咸陽公主辭訣曰國家事重死且無恨上流涕而還瑀等至回紇牙帳可汗衣赭􅂁胡㡌坐帳中榻上儀衛甚盛引瑀等立於帳外瑀不拜而立可汗曰我與天可汗兩國之君君臣有禮何得不拜瑀與叔明對曰曏者唐與諸國為昬皆以宗室女為公主今天子以可汗有功自以所生女妻可汗恩禮至重可汗奈何以子壻傲婦翁坐榻上受冊命邪可汗改容起受冊命明日立公主為可敦舉國皆喜乙未郭子儀入朝八月壬寅以青登等五州節度使許叔冀為滑濮等六州節度使庚戍李光弼入朝丙辰以郭子儀為中書令光弼為侍中丁巳子儀詣行營回紇遣其臣骨啜特勒及帝徳將驍騎三千助討安慶緒上命朔方左武鋒使僕固懐恩領之九月庚午朔以右羽林大將軍趙泚為蒲同虢三州節度使丙子招討党項使王仲昇斬党項酋長拓㧞戎徳傳首安慶緒之初至鄴也雖枝黨離析猶據七郡六十餘城甲兵資糧豐備慶緒不親政事專以繕臺沼樓船酣飲為事其大臣高尚張通儒等争權不叶無復綱紀蔡希徳有才略部兵精銳而性剛好直言通儒譖而殺之麾下數千人皆逃散諸將怨怒不為用以崔乾祐為天下兵馬使揔中外兵乾祐愎戾好殺士卒不附庚寅命朔方郭子儀淮西魯炅興平李奐滑濮許叔冀鎮西北庭李嗣業鄭蔡季廣琛河南崔光逺七節度使及平盧兵馬使董秦將步騎二十萬討慶緒又命河東李光弼闗内澤潞王思禮二節度使將所部兵助之上以子儀光弼皆元勲難相統屬故不置元帥但以宦官開府儀同三司魚朝恩為觀軍容宣慰處置使觀軍容之名自此始癸巳廣州奏大食波斯圍州城刺史韋利見踰城走二國兵掠倉庫焚廬舍浮海而去冬十月甲辰冊太子更名曰豫自中興以來羣下無復賜物至是始有新鑄大錢百官六軍霑賚有差郭子儀引兵自杏園濟河東至獲嘉破安太清斬首四千級捕虜五百人太清走保衛州子儀進圍之丙午遣使告㨗魯炅自陽武濟季廣琛崔光逺自酸棗濟與李嗣業兵皆㑹子儀於衛州慶緒悉舉鄴中之衆七萬救衛州分三軍以崔乾祐將上軍田承嗣將下軍慶緒自將中軍子儀使善射者三千人伏于壘垣之内令曰我退賊必逐我汝乃登壘鼔譟而射之既而與慶緒戰偽退賊逐之至壘下伏兵起射之矢如雨注賊還走子儀復引兵逐之慶緒大敗獲其弟慶和殺之遂㧞衛州慶緒走子儀等追之至鄴許叔冀董秦王思禮及河東兵馬使薛兼訓皆引兵繼至慶緒收餘衆拒戰於愁思岡又敗前後斬首三萬級捕虜千人慶緒乃入城固守子儀等圍之李光弼引兵繼至慶緒窘急遣薛嵩求救於史思明且請以位讓之思明發范陽兵十三萬欲救鄴觀望未敢進先遣李歸仁將步騎一萬軍于􅇭陽遥為慶緒聲勢甲寅上皇幸華清宫十一月丁丑還京師崔光逺㧞魏州丙戍以前兵部侍郎蕭華為魏州防禦使㑹史思明分軍為三一出邢洺一出冀貝一自洹水趣魏州郭子儀奏以崔光逺代華十二月癸卯敇以光逺領魏州刺史甲辰置浙江西道節度使領蘇潤等十州以昇州刺史韋黃裳為之庚戌置浙江東道節度使領越睦等八州以户部尚書李峘為之兼淮南節度使己未羣臣請上尊號曰乾元大聖光天文武孝感皇帝許之史思明乗崔光逺初至引兵天下光逺使將軍李處崟拒之賊勢盛處崟連戰不利還趣城賊追至城下揚言曰處崟召我來何為不出光逺信之腰斬處崟處崟驍將衆所恃也既死衆無鬬志光逺脫身走還汴州丁卯思明陷魏州所殺三萬人平盧節度使王玄志薨上遣中使往撫慰將士且就察軍中所欲立者授以旌節高麗人李懐玉為禆將殺玄志之子推矦希逸為平盧軍使希逸之母懐玉姑也故懐玉立之朝廷因以希逸為節度副使節度使由軍士廢立自此始臣光曰夫民生有欲無主則亂是故聖人制禮以治之自天子諸矦至於卿大夫士庻人尊卑有分大小有倫若綱條之相維臂指之相使是以民服事其上而下無覬覦其在周易上天下澤履象曰君子以辨上下定民志此之謂也凡人君所以能有其臣民者以八柄存乎己也茍或捨之則彼此之勢均何以使其下哉肅宗遭唐中衰幸而復國是宜正上下之禮以綱紀四方而偷取一時之安不思永久之患彼命將帥統藩維國之大事也乃委一介之使徇行伍之情無問賢不肖惟其所欲與者則授之自是之後積習為常君臣循守以為得策謂之姑息乃至偏禆士卒殺逐主帥亦不治其罪因以其位任授之然則爵禄廢置殺生予奪皆不出於上而出於下亂之生也庸有極乎且夫有國家者賞善而誅惡故為善者勸為惡者懲彼為人下而殺逐其上惡孰大焉乃使之擁旄秉鉞師長一方是賞之也賞以勸惡惡其何所不至乎書云逺乃猷詩云猷之未逺是用大諫孔子曰人無逺慮必有近憂為天下之政而專事姑息其憂患可勝校乎由是為下者常眄眄焉伺其上茍得閒則攻而族之為上者常惴惴焉畏其下茍得閒則掩而屠之争務先發以逞其志非有相保養為俱利久存之計也如是而求天下之安其可得乎迹其厲階肇於此矣盖古者治軍必本於禮故晉文公城濮之戰見其師少長有禮知其可用今唐治軍而不顧禮使士卒得以陵偏禆偏禆得以陵將帥則將帥之陵天子自然之勢也由是禍亂繼起兵革不息民墜塗炭無所控訴凡二百餘年然後宋受命太祖始制軍法使以階級相承小有違犯咸伏斧質是以上下有叙令行禁止四征不庭無思不服宇内乂安兆民允殖以迄于今皆由治軍以禮故也豈非詒謀之逺哉是歲置振武節度使領鎮北大都䕶府麟勝二州又置陜虢華及豫許汝二節度使安南經略使為節度使領交陸等十一州吐蕃陷河源軍資治通鑑卷第二百二十
