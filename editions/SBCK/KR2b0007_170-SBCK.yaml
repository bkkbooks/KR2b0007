front:
  text: 資治通鑑卷第一百七十臣司馬光奉
  hash: sha256:6fb430ccade15c2e202d5a16b2b2e6d595d4451b39fe0855815d7e7eeecaba2a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0007_SBCK_170-1a}
body:
  text: 勑編集陳紀四重光單閼凢五年起強圉大淵獻盡臨海王光大元年春正月癸酉朔日有食之尚書左僕射􅀽樞卒乙亥大赦攺元辛邜帝祀􅀯郊壬辰齊上皇還鄴己亥周主耕籍田二月壬寅朔齊主加元服大赦􅀄髙祖爲梁州用劉師知爲中書舎人師知渉學工文練習儀體歴丗祖朝雖位宦不遷而委任甚重與楊州剌史安成王頊尚書僕射到仲舉同受遺詔輔政師知仲舉􅁪居禁中參决衆事頊與左右三百人入居尚書省師知見頊地望􅁠􅀔為朝野所屬心忌之與尚書左丞王暹等謀出頊於外衆猶豫未敢先發東宫通事舎人殷不佞素以名節自任又受委東宫乃馳詣相府矯敕謂頊曰今四方無事王可還東府經理州務頊將出中記室毛喜馳入見頊曰陳有天下日淺國禍繼臻中外危懼太后􅀷惟至計令王入省共康庶績今日之言必非太后之意宗社之重願王三思湏更聞奏無使姦人得肆其謀今出外即受制於人譬如曹爽願作冨家翁其可得邪頊遣喜與領軍將軍吳明徹籌之明徹曰嗣君諒闇萬機多闕殿下親實周邵當輔安社稷願留中勿疑頊乃稱疾召劉師知留之與語使毛喜先入言於太后太后曰今伯宗㓜弱政事並委二郎此非我意喜又言於帝帝曰此自師知等所為朕不知也喜出以報頊頊因囚師知自入見太后及帝極陳師知之罪仍自草敕請畫以師知付廷尉其夜於獄中賜死以到仲舉為金紫光禄大夫王暹殷不佞並付治不佞不害之弟也少有孝行頊雅重之故獨得不死免官而已王暹伏誅自是國政盡歸於頊右衛將軍㑹稽韓子髙鎮領軍府在建康諸將中士馬最盛與仲舉通謀事未發毛喜請簡人馬配子髙并賜鐡炭使脩器甲頊驚曰子髙謀反方欲収執何為更如是邪喜曰山陵始畢邊㓂尚多而子髙受委前朝名為杖順􅀂収之恐不時受首或能為人患宜推心安誘使不自疑伺間圗之一壯士之力耳頊􅀷然之仲舉旣廢歸私第心不自安子郁尚丗祖妹信義長公主除􅀯康内史未之官子髙亦自危求出為衡廣諸鎮郁毎乗小輿蒙婦人衣與子髙謀㑹前上虞令陸昉及子髙軍主告其謀反頊在尚書省因召文武在位議立皇太子平旦仲舉子髙入省皆執之并郁送廷尉下詔於獄賜死餘黨一無所問辛亥􅀯豫州剌史余孝頃坐謀反誅癸丑以東楊州剌史始興王伯茂為中衛大將軍開府儀同三司伯茂帝之母弟也劉師知韓子髙之謀伯茂皆預之司徒頊恐扇動中外故以為中衛專使之居禁中與帝游處三月甲午以尚書右僕射沈欽為侍中左僕射夏四月癸丑齊遣散􅀐常侍司馬㓜之來聘湘州剌史華皎聞韓子髙死内不自安繕甲聚徒撫循所部啓求廣州以卜朝廷之意司徒頊偽許之而詔書未出皎遣使潜引周兵又自歸於梁以其子玄響為質五月癸巳頊以丹陽尹吳明徹為湘州剌史甲午齊以東平王儼為尚書令司徒頊遣吳明徹帥舟師三萬趣郢州丙申遣征南大將軍淳于量帥舟師五萬繼之又遣冠武將軍楊文通從安成歩道出茶陵巴山太守黄法慧從宜陽出澧陵共襲華皎并與江州剌史章昭逹郢州剌史程靈洗合謀進討六月壬寅以司空徐度為車􅀐將軍緫督建康諸軍歩道趣湘州辛亥周主尊其母叱奴氏為皇太后己未齊封皇弟仁機為西河王仁約為樂浪王仁儉為潁川王仁雅為安樂王仁直為丹陽王謙為東海王華皎使者至長安梁王亦上書言狀且乞師周人議出師應之司㑹崔猷曰前􅀊東征死傷過半比雖循撫瘡痍未復今陳氏保境息民共敦鄰好豈可利其土地納其叛臣違盟約之信興無名之師乎晋公護不從閠六月戊寅遣㐮州緫管衛公直督柱國陸通大將軍田弘􅁠景宣元定等將兵助之辛巳齊左丞相咸陽武王斛律金卒年八十金長子光為大將軍次子羡及孫武都並開府儀同三司出鎭方岳其餘子孫封侯貴顯者衆甚門中一皇后二太子妃三公主事齊三丗貴寵無比自肅宗以來禮敬尤重毎朝見常聽乗歩挽車至階或以羊車迎之然金不以爲喜甞謂光曰我雖不讀書聞古來外戚鮮有能保其族者女􅀂有寵爲諸貴所嫉無寵爲天子所憎我家直以􅈴勞致冨貴何必藉女寵也壬午齊以東平王儼録尚書事以左僕射趙彦􅀷爲尚書令婁定逺爲左僕射中書監徐之才爲右僕射定逺昭之子也秋七月戍申立皇子至澤爲太子八月齊以任城王湝爲太師馮翊王􅃳爲大司馬叚韶爲左丞相賀拔仁爲右丞相侯莫陳相為太宰婁叡為太􅀓斛律光為太保韓祖念為大將軍趙郡王叡為太尉東平王儼為司徒儼有寵於上皇及胡后時兼京畿大都督領軍大將軍領御史中丞魏朝故事中丞出與皇太子分路王公皆遥駐車去牛頓軛於地以待其過其或遲違則前驅以赤棒棒之自遷鄴以後此儀廢絶上皇欲尊寵儼命一遵舊制儼􅀄從北宫出將上中丞凢京畿歩􅀐領軍官屬中丞威儀司徒鹵簿莫不畢從上皇與胡后張幕於華林園東門外而􅀚之遣中使驟馬趣仗不得入自言奉敕赤棒應聲碎其鞍馬驚人墜上皇大􅀏以為善更敕駐車勞問良乆􅀚者傾鄴城儼􅁪在宫中坐含光殿視事諸父皆拜之上皇或時如并州儼􅁪居守毎送行或半路或至􅀳陽乃還器玩服飾皆與齊主同所須悉官給嘗於南宫見新氷早李還怒曰尊兄已有我何竟無自是齊主或先得新竒屬官及工人必􅀗罪儼性剛决甞言於上皇曰尊兄懦何能帥左右上皇毎稱其才有廢立意胡后亦􅂆之旣而中止華皎遣使誘章昭逹昭逹執送建康又誘程靈洗靈洗斬之皎以武州居其心腹遣使誘都督陸子隆子隆不從遣兵攻之不克巴州剌史戴僧朔等並􅀠於皎長沙太守曹慶等本􅀠皎下遂為之用司徒頊恐上流守宰皆附之乃曲赦湘巴二州九月乙巳悉誅皎家屬梁以皎為司空遣其柱國王操將兵二萬㑹之周􅁠景宣將水軍元定將陸軍衛公直緫之與皎俱下淳于量軍夏口直軍魯山使元定以歩􅀐數千圍郢州皎軍于白螺與吳明徹等相持徐度楊天通由嶺路襲湘州盡􅀗其所留軍士家屬皎自巴陵與周梁水軍順流乗風而下軍􅀔甚盛戰于沌口量明徹募軍中小艦多賞金銀令先出當西軍大艦受其拍西軍諸艦發拍皆盡然後量等以大艦拍之西軍艦皆碎没于中流西軍又以艦載薪因風縱火俄而風轉自焚西軍大敗皎與戴僧朔單舸走過巴陵不敢登岸徑奔江陵衛公直亦奔江陵元定孤軍進退無路斫竹開徑且戰且引欲趣巴陵巴陵巳為徐度等所據度等遣使偽與結盟許縱之還國定信之解仗就度度執之盡俘其衆并擒梁大將軍李廣定憤恚而卒皎黨曹慶等四十餘人並伏誅唯以岳陽太守章昭裕昭逹之弟杜陽太守曹宣髙祖舊臣衡陽内史汝隂任忠嘗有宻啓皆宥之吳明徹乗勝攻梁河東拔之周衛公直歸罪於梁柱國殷亮梁主知非其罪然不敢違遂誅之周與陳旣交惡周沔州剌史裴寛白㐮州緫管請益戍兵并遷城於羊蹄山以避水緫管兵未至程靈洗舟師奄至下城㑹大雨水􅁀漲靈洗引大艦臨城發拍撃樓堞皆碎矢石晝夜攻之三十餘日陳人登城寛猶帥衆執短兵拒戰又二日乃擒之丁巳齊上皇如晋陽山東水飢僵尸滿道冬十月甲申帝享太廟十一月戊戍朔日有食之丙午齊大赦癸丑周許穆公宇文貴自突厥還卒于張掖齊上皇還鄴十二月周晋公護母卒詔起令視事齊祕書監祖珽與黄門侍郎劉逖友善珽欲求宰相乃䟽趙彦􅀷元文遥和士開罪狀令逖奏之逖不敢通彦􅀷等聞之先詣上皇自陳上皇大怒執珽詰之珽因陳文遥士開彦􅀷等朋黨弄􅁠賣官鬻獄事上皇曰爾乃誹謗我珽曰臣不敢誹謗陛下取人女上皇曰我以其飢饉収養之耳珽曰何不開倉振給乃買入後宫乎上皇益怒以刀鐶築其口鞭杖亂下將撲殺之珽呼曰陛下勿殺臣臣為陛下合金丹遂得少寛珽曰陛下有一范増不能用上皇又怒曰爾自比范増以我爲項羽邪珽曰項羽布衣帥烏合之衆五年而成霸業陛下藉父兄之資纔得至此臣以爲項羽未易可輕上皇愈怒令以土塞其口珽且吐且言乃鞭二百配甲坊尋徙光州敕令牢掌别駕張奉福曰牢者地牢也乃置地牢中桎梏不離身夜以蕪菁子爲燭眼爲所熏由是失明齊七兵尚書畢義雲爲治酷忍非人理所及於家尤甚夜爲盗所殺遺其刀驗之其子善昭所佩刀也有司執善昭誅之二年春正月己亥安成王頊進位太􅀓領司徒加殊禮辛丑周主祀南郊癸亥齊主使兼散􅀐常侍鄭大護來聘湘東忠肅公徐度卒二月丁卯周主如武功突厥木杆可汗貮於周更許齊人以昏留陳公純等數年不返㑹大雷風壊其穹廬旬日不止木杆懼以為天譴即備禮送其女於周純等奉之以歸三月癸卯至長安周主行親迎之禮甲辰周大赦乙巳齊以東平王儼為大將軍南陽王綽為司徒開府儀同三司徐顯秀為司空廣陵王孝珩為尚書令戊午周燕文公于謹卒謹勲髙位重而事上益恭毎朝㕘所從不過二三􅀐朝廷有大事多與謹謀之謹盡忠􅀘益於功臣中特􅀍親信禮遇隆重始終無間教訓諸子務存静退而子孫蕃衍率皆顯逹吳明徹乗勝進攻江陵引水􅈅之梁主出頓紀南以避之周緫管田弘從梁主副緫管髙琳與梁僕射王操守江陵三城晝夜拒戰十旬梁將馬武吉徹擊明徹敗之明徹退保公安梁主乃得還夏四月辛巳周以逹奚武為太􅀓尉遟逈為太保齊公憲為大司馬齊上皇如晋陽齊尚書左僕射徐之才善醫上皇有疾之才療之旣愈中書監和士開欲得次遷乃出之才為兖州剌史五月癸夘以尚書右僕射胡長仁為左僕射士開為右僕射長仁太上皇后之兄也庚戍周主享太廟庚申如醴泉宫壬戍齊上皇還鄴秋七月壬寅周隋桓公楊忠卒子堅襲爵堅為開府儀同三司小宫伯晋公護欲引以為腹心堅以白忠忠曰两姑之間難為婦汝其勿徃堅乃辭之丙午帝享太廟戊午周主還長安壬戍封皇弟伯智為永陽王伯謀為桂陽王八月齊請和于周周遣軍司馬陸程等聘于齊九月丙申齊使侍中斛斯文畧報之冬十月癸亥周主享太廟庚午帝享太廟辛巳齊以廣寧王孝珩録尚書事左僕射胡長仁為尚書令右僕射和士開為左僕射中書監唐邕為右僕射十一月壬辰朔日有食之齊遣兼散􅀐常侍李諧來聘甲辰周主如􅄮陽周遣開府儀同三司崔彦等聘于齊始興王伯茂以安成王頊專政意甚不平屢肆惡言甲寅以太皇太后令誣帝云與劉師知華皎等通謀且曰文皇知子之鑒事等帝堯傳弟之懐又符太伯今可還申􅇮志崇立賢君遂廢帝為臨海王以安成王入纂又下令黜伯茂為温麻侯寘諸别館安成王使盗邀之於道殺之車中齊上皇疾作驛追徐之才未至辛未疾亟以後事屬和士開握其手曰勿負我也遂殂於士開之手明日之才至復遣還州士開祕䘮三日不發黄門侍郎馮子琮問其故士開曰神武文㐮之䘮皆祕不發今至尊年少恐王公有貳心者意欲盡追集於凉風堂然後與公議之士開素忌太尉録尚書事趙郡王叡及領軍婁定逺子琮恐其矯遺詔出叡於外奪定逺禁兵乃􅀃之曰大行先已傳位於今上群臣冨貴者皆至尊父子之恩但令在内貴臣一無攺易王公必無異志丗異事殊豈得與霸朝相比且公不出宫門已數日升遐之事行路皆傳乆而不舉恐有他變士開乃發䘮丙子大赦戊寅尊太上皇后為皇太后侍中尚書左僕射元文遥以馮子琮胡太后之妹夫恐其賛太后干預朝政與趙郡王叡和士開謀出子琮為鄭州剌史丗祖驕奢滛泆役繁賦重吏民苦之甲申詔所在百工細作悉罷之鄴下晋陽中山宫人官口之老病者悉簡放諸家縁坐在流所者聽還周梁州􅁪稜獠叛緫管長史􅀯鄭趙文表討之諸將欲四靣進攻文表曰四靣攻之獠無生路必盡死以拒我未易可克今吾示以威恩為惡者誅之從善者撫之善惡旣分破之易矣遂以此意遍令軍中時有從軍熟獠多與􅁪稜親識即以實報之􅁪稜猶豫未决文表軍已至其境獠中先有二路一平一險有獠帥數人來請為郷導文表曰此路寛平不湏為導卿但先行好尉諭子弟使來降也乃遣之文表謂諸將曰獠帥謂吾從寛路而進必設伏以邀我當更出其不意乃引兵自狹路入乗髙而望果有伏兵獠旣失計爭帥衆來降文表皆慰撫之仍徴其租税無敢違者周人以文表為蓬州剌史高宗宣皇帝上之上太建元年春正月辛卯朔周主以齊丗祖之䘮罷朝㑹遣司㑹李綸弔􅐠且㑹葬甲午安成王即皇帝位攺元大赦復太皇太后為皇太后皇太后為文皇后立妃桞氏為皇后丗子叔寳為太子封皇子叔陵為始興王奉昭烈王祀乙未上謁太廟丁酉以尚書僕射沈欽為左僕射度攴尚書王勱為右僕射勱份之孫也辛丑上祀􅀯郊壬寅封皇子叔英為豫章王叔堅為長沙王戊午上享太廟齊愽陵文簡王濟丗祖之母弟也為定州剌史語人曰次叙當至我矣齊主聞之隂使人就州殺之葬贈如禮二月乙亥上耕籍田甲申齊葬武成帝于永平陵廟號丗祖己丑齊徙東平王儼為琅邪王齊遣侍中叱列長义聘于周齊以司空徐顯秀爲太尉并省尚書令婁定逺爲司空􅀄侍中尚書右僕射和士開爲丗祖所親狎出入卧内無復期度遂得幸於胡后及丗祖殂齊主以士開受顧託􅀷委任之威􅁠益盛與婁定逺及録尚書事趙彦􅀷侍中尚書左僕射元文遥開府儀同三司唐邕領軍綦連猛髙阿那肱度攴尚書胡長粲俱用事時號八貴太尉趙郡王叡大司馬馮翊王潤安德王延宗與婁定逺元文遥皆言於齊主請出士開爲外任㑹胡太后觴朝貴於前殿叡面陳士開罪失云士開先帝弄臣城狐社䑕受納貨賂穢亂宫掖臣等義無杜口冒死陳之太后曰先帝在時王等何不言今日欲欺孤寡邪且飲酒勿多言叡等詞色愈厲儀同三司安吐根曰臣本啇胡得在諸貴行末旣受厚恩豈敢惜死不出士開朝野不定太后曰異日論之王等且散叡等或投冠於地或拂衣而起明日叡等復詣雲龍門令文遥入奏之三返太后不聽左丞相段韶使胡長粲傳太后言曰梓宫在殯事太怱怱欲王等更思之叡等遂皆拜謝長粲復命太后曰成妹母子家者兄之力也厚賜叡等罷之太后及齊主召問士開對曰先帝於群臣之中待臣最厚陛下諒闇始爾大臣皆有覬覦今􅀂出臣正是翦陛下羽翼宜謂叡等云文遥與臣俱受先帝任用豈可一去一留並可用為州且出納如舊待過山陵然後遣之叡等謂臣眞出心必喜之帝及太后然之告叡等如其言乃以士開為兖州剌史文遥為西兖州剌史葬畢叡等促士開就路太后欲留士開過百日叡不許數日之内太后數以為言有中人知太后密㫖者謂叡曰太后意旣如此殿下何宜苦違叡曰吾受委不輕今嗣主㓜冲豈可使邪臣在側不守之以死何面戴天遂更見太后苦言之太后令酌酒賜叡叡正色曰今論國家大事非為巵酒言訖遽出士開載美女珠簾詣婁定逺謝曰諸貴欲殺士開䝉王力特全其命用為方伯今當奉别謹上二女子一珠簾定逺喜謂士開曰欲還入不士開曰在内乆不自安今得出實遂本志不願更入但乞王保護長為大州剌史足矣定逺信之送至門士開曰今當逺出願得一辭覲二宫定逺許之士開由是得見太后及帝進􅀃曰先帝一旦登遐臣媿不能自死􅀚朝貴意􅀔欲以陛下為乾明臣出之後必有大變臣何面目見先帝於地下因慟哭帝太后皆泣問計安出士開曰臣已得入復何所慮正須數行詔書耳於是詔出定逺為青州剌史責趙郡王叡以不臣之罪旦日叡將復入諌妻子咸止之叡曰社稷事重吾寕死事先皇不忍見朝廷顛沛至殿門又有人謂曰殿下勿入恐有變叡曰吾上不負天死亦無恨入見太后太后復以為言叡執之彌固出至永巷遇兵執送華林園雀離佛院令劉桃枝拉殺之叡乆典朝政清正自守朝野􅁈惜之復以士開為侍中尚書左僕射定逺歸士開所遺加以餘珍賂之三月齊主如晋陽夏四月甲子以并州尚書省為大基聖寺晋祠為大崇皇寺乙丑齊主還鄴齊主年少多嬖寵武衛將軍髙阿那肱素以謟佞為丗祖及和士開所厚丗祖多令在東宫侍齊主由是有寵累遷并省尚書令封淮隂王丗祖簡都督二十人使侍衛東宫昌􅀺韓長鸞預焉齊主獨親愛長鸞長鸞名鳯以字行累遷侍中領軍緫知内省機宻宫婢陸令萱者其夫漢陽駱超坐謀叛誅令萱配掖庭子提婆亦没為奴齊主之在襁褓令萱保養之令萱巧黠善取媚有寵於胡太后宫掖之中獨擅威福封為郡君和士開髙阿那肱皆為之養子齊主以令萱為女侍中令萱引提婆入侍齊主朝夕戱狎累遷至開府儀同三司武衛大將軍宫人穆舎利者斛律后之從婢也有寵於齊主令萱欲附之乃為之養母薦為弘德夫人因令提婆冐姓穆氏然和士開用事最乆諸幸臣皆依附之以固其寵齊主思祖珽就流囚中除海州剌史珽乃遺陸媪弟儀同三司悉逹書曰趙彦􅀷心腹隂沉欲行伊霍事儀同姊弟豈得平安何不早用智士邪和士開亦以珽有膽畧欲引為謀主乃棄舊怨虚心待之與陸媪言於帝曰㐮宣昭三帝之子皆不得立今至尊獨在帝位者祖孝徴之力也人有功不可不報孝徴心行雖薄竒畧出人緩急可使且其人已盲必無反心請呼取問以籌䇿齊主從之召入爲祕書監加開府儀同三司士開譛尚書令隴東王胡長仁驕恣出爲齊州剌史長仁怨憤謀遣剌客殺士開事覺士開與珽謀之珽引漢文帝誅薄昭故事遂遣使就州賜死五月庚戍周主如醴泉宫丁巳以吏部尚書徐陵爲左僕射秋七月辛邜皇太子納妃沈氏吏部尚書君理之女也辛亥周主還長安八月庚辰盗殺周孔城防主以其地入齊九月辛邜周遣齊公憲與柱國李穆將兵趣宜陽築崇德等五城歐陽紇在廣州十餘年威惠著於百越自華皎之叛帝心疑之徴爲左衛將軍紇恐懼其部下多􅂆之反遂舉兵攻衡州剌史錢道戢帝遣中書侍郎徐儉持節諭㫖紇􅀄見儉盛仗衛言辭不恭儉曰吕嘉之事誠當已逺將軍獨不見周廸陳寳應乎轉禍為福未為晚也紇黙然不應置儉於孤園寺累旬不得還紇嘗出見儉儉謂之曰將軍業已舉事儉湏還報天子儉之性命雖在將軍將軍成敗不在於儉幸不見留紇乃遣儉還儉陵之子也冬十月辛未詔車􅀐將軍章昭逹討紇壬午上享太廟十一月辛亥周鄫文公長孫儉卒辛丑齊以斛律光為太􅀓馮翊王潤為太保琅邪王儼為大司馬十二月庚午以蘭陵王長恭為尚書令庚辰以中書監魏収為左僕射周齊公憲等圍齊宜陽絶其糧道自華皎之亂與周人絶至是周遣御正大夫杜杲來聘請復修舊好上許之遣使如周二年春正月乙酉朔齊攺元武平齊東安王婁叡卒丙午上享太廟戊申齊使兼散􅀐常侍裴讞之來聘齊太􅀓斛律光將歩􅀐三萬救宜陽屢破周軍築統􅀜豐化二城以通宜陽糧道而還周軍追之光縱擊又破之􅀗其開府儀同三司宇文英梁景興二月己巳齊以斛律光為右丞相并州剌史又以任城王湝為太帥賀拔仁録尚書事歐陽紇召陽春太守馮僕至南海誘與同反僕遣使告其母洗夫人夫人曰我為忠貞今經两丗不能惜汝負國遂發兵拒境帥諸酋長迎章昭逹昭逹倍道兼行至始興紇聞昭逹奄至恇擾不知所為出頓洭口多聚沙石盛以竹籠置于水柵之外用遏舟艦昭逹居上流裝艦造拍令軍人衘刀潜行水中以斫籠篾皆解因縱大艦隨流突之紇衆大敗生擒紇送之癸未斬於建康市紇之反也士人流寓在嶺南者皆惶駭前著作佐郎蕭引獨恬然曰管㓜安􅀽曜卿亦但安坐耳君子直已以行義何憂懼乎紇平上徴為金部侍郎引允之弟也馮僕以其母功封信都侯遷石龍太守遣使者持節冊命洗氏為石龍大夫人賜繡幰油絡駟馬安車一乗給鼓吹一部并麾幢旌節其鹵簿一如剌史之儀三月丙申皇太后章氏殂戊戌齊安定武王賀拔仁卒丁未大赦夏四月甲寅周以柱國宇文盛為大宗伯周主如醴泉宫辛酉齊以開府儀同三司徐之才為尚書左僕射戊寅葬武宣皇后於萬安陵閏月戊申上謁太廟五月壬午齊遣使來弔六月乙酉齊以廣寧王孝珩為司空甲辰齊穆夫人生子􅁪齊主時未有男為之大赦陸令萱欲􅁪為太子恐斛律后恨怒乃白齊主使斛律后母飬之己丑齊以開府儀同三司唐邕為尚書右僕射秋七月癸丑齊立肅宗子彦基為城陽王彦忠為梁郡王甲寅以尚書令蘭陵王長恭為録尚書事中領軍和士開為尚書令賜爵淮陽王士開威􅁠日盛朝士不知廉耻者或為之假子與冨啇大賈同在伯仲之列嘗有一人士參士開疾值醫云王傷寒極重佗藥無効應服黄龍湯士開有難色人士曰此物甚易服王不須疑請為王先嘗之一舉而盡士開感其意為之強服遂得愈乙邜周主還長安癸酉齊以華山王凝為太􅀓司空章昭逹攻梁梁主與周緫管陸騰拒之周人於峽口􅀯岸築安蜀城横引大索於江上編葦為橋以度軍糧昭逹命軍士為長㦸施於樓船上仰割其索索斷糧絶因縱兵攻安蜀城下之梁主告急于周㐮州緫管衛公直直遣大將軍李遷哲將兵救之遷哲以其所部守江陵外城自帥􅀐兵出南門使歩出北門首尾邀擊陳兵陳兵多死夜陳兵竊於城西以梯登城登者已數百人遷哲與陸騰力戰拒之乃退昭逹又决龍川寧朔隄引水􅈅江陵騰出戰於西堤昭逹兵不利乃引還八月辛邜齊主如晋陽九月乙巳齊立皇子􅁪為太子冬十月辛巳朔日有食之齊以廣寕王孝珩為司徒上洛王思宗為司空復以梁永嘉王莊為開府儀同三司梁王許以興復竟不果及齊亡莊憤邑卒於鄴乙酉上享太廟己丑齊復威宗謚曰文宣皇帝廟號顯祖丁酉周鄭􅁊公逹奚武卒十二月丁亥齊主還鄴周大將軍鄭恪將兵平越嶲置西寧州周齊争宜陽乆不決勲州剌史韋孝寛謂其下曰宜陽一城之地不足損益兩國争之勞師彌年彼豈無智謀之士􅀂棄崤東來圗汾北我必失地今宜速於華谷及長秋築城以杜其意脫其先我圗之寔難乃畫地形且陳其狀晋公護謂使者曰韋公子孫雖多數不滿百汾北築城遣誰守之事遂不行齊斛律光果出晋州道於汾北築華谷龍門二城光至汾東與孝寛相見光曰宜陽小城乆勞爭戰今旣舎彼欲於汾北取償幸勿怪也孝寛曰宜陽彼之要衝汾北我之所棄我棄彼取其償安在君輔翼㓜主位望隆重不撫循百姓而極武窮兵苟貪尋常之地塗炭疲弊之民切爲君不取也光進圍定陽築南汾城以逼之周人釋宜陽之圍以救汾北晋公護問計於齊公憲憲曰兄宜暫出同州以為聲􅀔憲請以精兵居前隨機攻取護從之三年春正月癸丑以尚書右僕射徐陵為左僕射丁巳齊使兼散􅀐常侍劉環儁來聘辛酉上祀南郊辛未祀北郊齊斛律光築十三城於西境馬上以鞭指畫而成拓地五百里而未嘗伐功又與周韋孝寛戰於汾北破之齊公憲督諸將東拒齊師二月辛巳上祀明堂丁酉耕籍田壬寅齊以蘭陵王長恭為太尉趙彦􅀷為司空和士開録尚書事徐之才為尚書令唐邕為左僕射吏部尚書馮子琮為右僕射仍攝選子琮素謟附士開至是自以太后親屬且典選頗擅引用人不復啓禀由是與士開有隙三月丁丑大赦周齊公憲自龍門度河斛律光退保華谷憲攻拔其新築五城齊太宰叚韶蘭陵王長恭將兵禦周師攻柏谷城拔之而還夏四月戊寅朔日有食之壬午齊以琅邪王儼為太保壬辰齊遣使來聘周陳公純等取齊宜陽等九城齊斛律光將歩􅀐五萬赴之五月癸亥周使納言鄭詡來聘周晋公護使中外府參軍郭榮城於姚㐮城南定陽城西齊叚韶引兵襲周師破之六月韶圍定陽城周汾州剌史楊敷固守不下韶急攻之屠其外城時韶卧病謂蘭陵王長恭曰此城三面重澗皆無走路唯慮東南一道耳賊必從此出宜簡精兵專守之此必成擒長恭乃令壯士千餘人伏於東南澗口城中粮盡齊公憲緫兵救之憚韶不敢進敷帥見兵突圍夜走伏兵擊擒之盡俘其衆乙巳齊取周汾州及姚㐮城唯郭榮所築城獨存敷愔之族子也敷子素少多才藝有大志不拘小節以其父守節䧟齊未䝉贈謚上表申理周主不許至於再三帝大怒命左右斬之素大言曰臣事無道天子死其分也帝壯其言贈敷大將軍謚曰忠壯以素為儀同三司漸見禮遇帝命素為詔書下筆立成詞義兼羙帝曰勉之勿憂不冨貴素曰但恐冨貴來逼臣臣無心圗冨貴也齊斛律光與周師戰於宜陽城下取周建安等四戍捕虜千餘人而還軍未至鄴齊主敕使散兵光以軍士多有功者未得慰勞乃宻通表請遣使宣㫖軍仍且進齊朝發使遲留軍還將至紫陌光乃駐營待使帝聞光軍已逼心甚惡之亟令舎人召光入見然後宣勞散兵齊琅邪王儼以和士開穆提婆等專横奢縱意甚不平二人相謂曰琅邪王眼光弈弈數歩射人向者暫對不覺汗出吾軰見天子奏事尚不然由是忌之乃出儼居北宫五日一朝不得無時見太后儼之除太保也餘官悉解猶帯中丞及京畿士開等以北城有武庫欲移儼於外然後奪其兵􅁠治書侍御史王子宜與儼所親開府儀同三司髙舎洛中常侍劉辟彊􅀃儼曰殿下􅀍䟽正由士開間搆何可出北宫入民間也儼謂侍中馮子琮曰士開罪重兒欲殺之何如子琮心欲廢帝而立儼因􅂆成之儼令子宜表彈士開罪請付禁推子琮雜佗文書奏之齊主不審省而可之儼誑領軍庫狄伏連曰奉敕令領軍収士開伏連以告子琮且請覆奏子琮曰琅邪受敕何必更奏伏連信之發京畿軍士伏於神虎門外并戒門者不聽士開入秋七月庚午旦士開依常早參伏連前執士開手曰今有一大好事王子宜授以一函云有敕令王向臺因遣軍士護送儼遣都督馮永洛就臺斬之儼本意唯殺士開其黨因逼儼曰事旣然不可中止儼遂帥京畿軍士三千餘人屯千秋門帝使劉桃枝將禁兵八十人召儼桃枝遥拜儼命反􅅞將斬之禁兵散走帝又使馮子琮召儼儼辭曰士開昔來寔合萬死謀廢至尊剃家家髪為尼臣為是矯詔誅之尊兄􅀂欲殺臣不敢逃罪􅀂赦臣願遣姊姊來迎臣即入見姊姊謂陸令萱也儼欲誘出殺之令萱執刀在帝後聞之戰栗帝又使韓長鸞召儼儼將入劉辟彊牽衣諌曰􅀂不斬穆提婆母子殿下無由得入廣寕王孝珩安德王延宗自西來曰何不入辟彊曰兵少延宗顧衆而言曰孝昭帝殺楊遵彦止八十人今有數千何謂少帝泣啓太后曰有縁復見家家無縁永别乃急召斛律光儼亦召之光聞儼殺士開撫掌大􅀏曰龍子所為固自不似凢人入見帝於永巷帝帥􅀫衛者歩􅀐四百授甲將出戰光曰小兒輩弄兵與交手即亂鄙諺云奴見大家心死至尊宜自至千秋門琅邪必不敢動帝從之光歩道使人走出曰大家來儼徒駭散帝駐馬橋上遥呼之儼猶立不進光就謂曰天子弟殺一夫何所苦執其手強引以前請於帝曰琅邪王年少腸肥腦滿輕為舉措稍長自不復然願寛其罪帝拔儼所帯刀鐶亂築辮頭良乆乃釋之収庫狄伏連髙舎洛王子宜劉辟彊都督翟顯貴於後園攴解􅁀之都街帝欲盡殺儼府文武職吏光曰此皆勲貴子弟誅之恐人心不安趙彦深亦曰春秋責帥於是罪之各有差太后責問儼儼曰馮子琮教兒太后怒遣使就内省以弓絃絞殺子琮使内參以庫車載尸歸其家自是太后常置儼於宫中毎食必自嘗之八月己亥齊主如晋陽九月辛亥齊以任城王湝為太宰馮翊王潤為太師己未齊平原忠武王叚韶卒韶有謀畧得將士死力出緫軍旅入參幃幄功髙望重而雅性温慎得宰相體事後母孝閨門雍肅齊勲貴之家無能及者齊祖珽􅀃陸令萱出趙彦深為兖州剌史齊主以珽為侍中陸令萱􅀃帝曰人稱琅邪王聦明雄勇當今無敵􅀚其相表殆非人臣自專殺以來常懐恐懼宜早為之計幸臣何洪珍等亦請殺之帝未决以食轝宻迎珽問之珽稱周公誅管叔季友酖慶父帝乃攜儼之晋陽使右衛大將軍趙元侃誘儼執之元侃曰臣昔事先帝見先帝愛王今寧就死不忍行此帝出元侃為豫州剌史庚午帝啓太后曰明旦欲與仁威早出獵夜四鼓帝召儼儼疑之陸令萱曰兄呼兒何為不去儼出至永巷劉桃枝反接其手儼呼曰乞見家家尊兄桃枝以䄂塞其口反袍蒙頭負出至大明宮鼻血滿靣拉殺之時年十四裹之以席埋於室内帝使啓太后太后臨哭十餘聲即擁入殿遺腹四男皆幽死冬十月罷京畿府入領軍壬午周冀公通卒甲申上享太廟乙未周遣右武伯谷㑹琨等聘於齊齊胡太后岀入不節與沙門統曇獻通諸僧至有戱呼曇獻為太上皇者齊主聞太后不謹而未之信後朝太后見二尼恱而召之乃男子也於是曇獻事亦發皆伏誅己亥帝自晋陽奉太后還鄴至紫陌遇大風舎人魏僧伽習風角奏言即時當有􅁀逆事帝詐云鄴中有變彎弓纒弰馳入􅀯城遣䆠者鄧長顒幽太后於北宫仍敕内外諸親皆不得與胡太后相見太后或為帝設食帝亦不敢嘗庚戍齊遣侍中赫連子恱聘于周十一月丁巳周主如散􅀜丙寅齊以徐州行臺廣陵王孝珩録尚書事庚午又以為司徒癸酉以斛律光為左丞相十二月己丑周主還長安壬辰邵陵公章昭逹卒是歳梁華皎將如周過㐮陽􅀃衛公直曰梁主旣失江􅀯諸郡民少國貧朝廷興亡繼絶理宜資贍望借數州以資梁國直然之遣使言狀周主詔以基平鄀三州與之資治通鑑卷第一百七十
