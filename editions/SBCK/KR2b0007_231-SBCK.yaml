body:
  text: 臣司馬光奉勑編集唐紀四十七赤奮若七月凡一年有竒起閼逢困敦五月盡旃􅀩德宗神武聖文皇帝六興元元年五月鹽鐵判官萬年王紹以江淮繒帛來至上命先給將士然後御衫韓滉欲遣使獻綾羅四十擔詣行在幕僚何士幹請行滉喜曰君能相爲行請今日過江士幹許諾歸别家則家之薪米儲㣥巳羅門庭矣登舟則資裝器用巳充舟中矣下至厠籌滉皆手筆紀列無不周備每擔夫與白金一版使置腰間又運米百艘以餉李晟自負囊米置舟中將佐爭舉之須臾而畢艘置五弩手以爲防援有冦則叩舷相警五百弩已彀矣比逹渭橋盗不敢近時闗中兵荒米斗直錢五百及滉米至減五之四滉爲人彊力嚴毅自奉儉素夫人常衣絹裙破然後易吐蕃既破韓旻等大掠而去朱泚使田希鑒厚以金帛賂之吐蕃受之韓遊瓌以聞渾瑊又奏尚結賛屢遣人約刻日共取長安既而不至聞其衆今春大疫近已引兵去上以李晟渾瑊兵少欲倚吐蕃以復京城聞其去甚憂之以問陸贄贄以爲吐蕃貪狡有害無益得其引去實可欣賀乃上奏其略曰吐蕃遷延􅀚望翻覆多端深入郊畿隂受賊使致令羣帥進退憂虞欲捨之獨前則慮其懷怨乗躡欲待之合勢則苦其失信稽延戎若未歸冦終不滅又曰將帥意陛下不見信任且患蕃戎之奪其功士卒恐陛下不恤舊勞而畏蕃戎之專其利賊黨懼蕃戎之勝不死則悉遺人禽百姓畏蕃戎之來有財必盡爲所掠是以順於王化者其心不得不怠䧟於冦境者其勢不得不堅又曰今懷光别保蒲絳吐蕃逺避封疆形勢既分腹背無患瑊晟諸帥才力得伸又曰但願陛下愼於撫接勤於砥礪中興大業旬月可期不宜尚眷眷於犬羊之羣以失將士之情也上復使謂贄曰卿言吐蕃形勢甚善然瑊晟諸軍當議規畫令其進取朕欲遣使宣慰卿宜審細條䟽以聞贄以爲賢君選將委任責成故能有功况今秦梁千里兵勢無常遥爲規畫未必合宜彼違命則失君威從命則害軍事進退羈礙難以成功不若假以便宜之權待以殊常之賞則將帥感恱智勇得伸乃上奏其略曰鋒鏑交於原野而决策於九重之中機㑹變於斯須而定計於千里之外用捨相礙否臧皆凶上有掣肘之譏下無死綏之志又曰傳聞與指實不同懸筭與臨事有異又曰設使其中或有肆情干命者陛下能於此時戮其違詔之罪乎是則違命者既不果行罰從命者又未必合宜徒費空言秖勞睿慮匪唯無益其損實多又曰君上之權特異臣下惟不自用乃能用人癸酉涇王侹薨徐海沂宻觀察使髙承宗卒甲戌使其子明應知軍事乙亥李抱真王武俊距貝州三十里而軍朱淊聞兩軍將至急召馬寔寔晝夜兼行赴之或謂滔曰武俊善野戰不可當其鋒宜徙營稍前逼之使廻紇絶其糧道我坐食德棣之餫依營而陳利則進攻否則入保待其飢疲然後可制也滔疑未決㑹馬寔軍至淊命明日出戰寔言軍士冒暑困憊請休息數日乃戰常侍楊布將軍蔡雄引回紇逹干見淊逹干曰回紇在國與鄰國戰常以五百􅀐破鄰國數千騎如掃葉耳今受大王金帛牛酒前後無筭思爲大王立效此其時矣明日願大王駐馬髙丘觀回紇爲大王翦武俊之騎使匹馬不返布雄曰大王英略蓋世舉燕薊全軍將掃河南清闗中今見小敵冘豫不擊失逺近之望將何以成霸業乎逹干請戰是也滔喜遂决意出戰丙子旦武俊遣其兵馬使趙琳將五百騎伏於桑林抱真列方陳於後武俊引騎兵居前自當回紇回紇縱兵衝之武俊命其騎控馬避之回紇突出其後將還武俊乃縱兵擊之趙琳自林中出横擊之回紇敗走武俊急追之滔騎兵亦走自踐其歩陳歩騎皆東奔滔不能制遂走趣其營抱真武俊合兵追擊之時滔引三萬人出戰死者萬餘人逃潰者亦萬餘人滔纔與數千人入營堅守㑹日暮昏霧兩軍不能進抱真軍其營之西北武俊軍其東北滔夜焚營引兵出南門趣德州遁去委弃所掠資貨山積兩軍以霧不能追也滔殺楊布蔡雄而歸幽州心既内慙又恐范陽留守劉怦因敗圖己怦悉發留守兵夾道二十里具儀仗迎之入府相對悲喜時人多之初張孝忠以易州歸國詔以孝忠爲義武節度使以易定滄三州隷之滄州刺史李固烈李惟岳之妻兄也請歸恒州孝忠遣押牙安喜程華交其州事固烈悉取軍府綾縑珍貨數十車將行軍士大譟曰刺史掃府庫之實以行將士於後飢寒柰何遂殺固烈屠其家程華聞亂自竇逃出亂兵求得之請知州事華不得已從之孝忠聞之即版華攝滄州刺史華素寛厚推心以待將士將士安之㑹朱滔王武俊叛更遣人招華華皆不從時孝忠在定州自滄如定必過瀛州瀛􅀠朱滔道路阻澀滄州錄事參軍李宇說華表陳利害請别爲一軍華從之遣宇奉表詣行在上即以華爲滄州刺史橫海軍副大使知節度事賜名日華令日華歲供義武租錢十二萬緡王武俊又使人說誘之時軍中乏馬日華紿使者曰王大夫必欲相屬當以二百騎相助武俊給之日華悉留其馬遣其士歸武俊怒而方與馬燧等相拒不能攻取日華由是獲全及武俊歸國日華乃遣人謝過償其馬價且賂之武俊喜復與交好庚寅李晟大陳兵諭以收復京城先是姚令言等屢遣諜人覘晟進軍之期皆爲邏騎所獲晟引示以所陳兵謂曰歸語諸賊努力固守勿不忠於賊也皆飲之酒給錢而縱之遂引兵至通化門外耀武而還賊不敢出晟召諸將問兵所從入皆請先取外城據坊市然後北攻宫闕晟曰坊市狹隘賊若伏兵格鬬居人驚亂非官軍之利也今賊重兵皆聚苑中不若自苑北攻之潰其腹心賊必奔亡如此則宫闕不殘坊市無擾策之上者也諸將皆曰善乃牒渾瑊及鎮國節度使駱元光商州節度使尚可孤刻期集於城下壬辰尚可孤敗泚將仇敬忠於藍田西斬之乙未李晟移軍於光㤗門外米倉村丙申晟方自臨築壘泚驍將張庭芝李希倩引兵大至晟謂諸將曰始吾憂賊濳匿不出今來送死此天贊我不可失也命副元帥兵馬使吳詵等縱兵擊之時華州營在北兵少賊併力攻之晟命牙前將李演等帥精兵救之演等力戰賊敗走演等追之乗勝入光泰門再戰又破之㑹夜晟斂兵還賊餘衆走入白華門夜聞慟哭希倩希烈之弟也丁酉晟復出兵諸將請待西師至夾攻之晟曰賊數敗已破膽不乗勝取之使其成備非計也賊又出戰官軍屢㨗駱元光敗泚衆於滻西戊戌晟陳兵於光泰門外使李演及牙前兵馬使王佖將騎兵牙前將史萬頃將歩兵直抵苑牆神䴥村晟先使人夜開苑牆二百餘歩比演等至賊已樹栅塞之自栅中刺射官軍官軍不得進晟怒叱諸將曰縱賊如此吾先斬公輩矣萬頃懼帥衆先進拔栅而入佖演引騎兵繼之賊衆大潰諸軍分道並入姚令言等猶力戰晟命决勝軍使唐良臣等歩騎蹙之且戰且前凡十餘合賊不能支至白華門有賊數千騎出官軍之背晟帥百餘騎回禦之左右呼曰相公來賊皆驚潰先是泚遣張光晟將兵五千屯九曲去東渭橋十餘里光晟宻輸􅅃於晟及泚敗光晟勸泚出亡泚乃與姚令言帥餘衆西走猶近萬人光晟送泚出城還降於晟晟遣兵馬使田子奇以騎兵追泚晟屯含元殿前舍於右金吾仗令諸軍曰晟賴將士之力克清宫禁長安士庶久䧟賊庭若小有震驚非弔民伐罪之意晟與公等室家相見非晚五日内無得通家信命京兆尹李齊運等安慰居人晟大將髙明曜取賊妓尚可孤軍士擅取賊馬晟皆斬之軍中股栗公私按堵秋毫無犯逺坊有經宿乃知官軍入城者是日渾瑊戴休顔韓遊瓌亦克咸陽敗賊三千餘衆聞泚西走分兵邀之己亥晟使京西兵馬使孟渉屯白華門尚可孤屯望仙門駱元光屯章敬寺晟以牙前三千人屯安國寺以鎮京城斬泚黨李希倩敬釭彭偃等八人於市王武俊既破朱滔還恒州表讓幽州盧龍節度使上許之六月癸卯李晟遣掌書記吳人于公異作露布上行在曰臣已肅清宫禁祗謁寢園鍾簴不移廟貌如故上泣下曰天生李晟以爲社稷非爲朕也晟在渭橋熒惑守歲久之乃退賓佐皆賀曰熒惑退舍皇家之福也宜速進兵晟曰天子野次臣下知死敵而已天象髙逺誰得知之既克長安乃謂之曰曏非相拒也吾聞五星贏縮無常萬一復來守歲吾軍不戰自潰矣皆謝曰非所及也朱泚將奔吐蕃其衆隨道散亡比至涇州纔百餘騎田希鑒閉城拒之泚謂之曰汝之節吾所授也柰何臨危相負使焚其門希鑒取節投火中曰還汝節泚衆皆哭涇卒遂殺姚令言詣希鑒降泚獨與范陽親兵及宗族賓客北趣驛馬闗寧州刺史夏矦英拒之至彭原西城屯其將梁庭芬射泚墜阬中韓旻等斬之詣涇州降源休李子平奔鳳翔李楚琳斬之皆傳首行在上命陸贄草詔賜渾瑊使訪求奉天所失裹頭内人贄上奏以爲今巨盜始平疲瘵之民瘡痍之卒尚未循拊而首訪婦人非所以副惟新之望也謀始盡善克終巳稀始而不謀終則何有所賜瑊詔未敢承㫖上遂不降詔竟遣中使求之乙巳詔吏部侍郎班宏充宣慰使勞問將士撫諭蒸黎丙午李晟斬文武官受朱泚寵任者崔宣洪經綸等十餘人又表守節不屈者劉廼蔣沇等已酉以李晟爲司徒中書令駱元光尚可孤各遷官有差以檢校御史中丞田希鑒爲涇原節度使詔改梁州爲興元府甲寅以渾瑊爲侍中韓遊瓌戴休顔各遷官有差朱泚之敗也李忠臣奔樊川擒獲丙辰斬之上問陸贄今至鳳翔有迎駕諸軍形勢甚盛欲因此遣人代李楚琳何如贄上奏以爲如此則事同脅執以言乎除亂則不武以言乎務理則不誠用是時廵後將安入議者或謂之權臣竊未諭其理夫權之爲義取類權衡今輦路所經首行脅奪易一帥而虧萬乗之義得一方而結四海之疑乃是重其所輕而輕其所重謂之權也不亦反乎以反道爲權以任數爲智君上行之必失衆臣下用之必䧟身歴代之所以多䘮亂而長姦邪由此誤也不如俟奠枕京邑徴授一官彼喜於恩宥將奔走不暇安敢輒有旅拒復勞誅鉏哉戊午車駕發漢中李晟綜理長安以備百司自請至鳳翔迎扈上不許内常侍尹元貞奉使同華輒詣河中招諭李懷光晟奏元貞矯制擅赦元惡請理其罪秋七月丙子車駕至鳳翔斬喬琳蔣鎮張光晟等李晟以光晟雖臣賊而滅賊亦頗有力欲全之上不許副元帥判官髙郢數勸李懷光歸􅅃懷光遣其子璀詣行在謝罪請束身歸朝庚辰詔遣給事中孔巢父齎先除懷光太子太保敕詣河中宣慰朔方將士悉復官爵如故壬午車駕至長安渾瑊韓遊瓌戴休顔以其衆扈從李晟駱元光尚可孤以其衆奉迎歩騎十餘萬旌旗數十里晟謁見上於三橋先賀平賊後謝収復之晩伏路左請罪上駐馬慰撫爲之掩涕命左右扶上馬至宫毎閒日輙宴勲臣賞賜豐渥李晟爲之首渾瑊次之諸將相又次之曹王臯遣其將伊愼王鍔圍安州李希烈遣其甥劉戒虛將歩騎八千救之臯遣别將李伯濳逆擊之於應山斬首千餘級生擒戒虛徇於城下安州遂降以伊慎爲安州刺史又擊希烈將康叔夜於厲鄉走之丁亥孔巢父至河中李懷光素服待罪巢父不之止懷光左右多胡人皆歎曰太尉無官矣巢父又宣言於衆曰軍中誰可代太尉領軍事者於是懷光左右發怒諠譟宣詔未畢衆殺巢父及中使啖守盈懷光亦不之止復治兵爲拒守之備辛卯赦天下初肅宗在靈武上爲奉節王學文於李泌代宗之世泌居蓬萊書院上爲太子亦與之遊及上在興元泌爲杭州刺史上急詔徵之與睦州刺史杜亞俱詣行在乙未以泌爲左散騎常侍亞爲刑部侍郎命泌日直西省以􅀱對朝野皆屬目附之上問泌河中宻邇京城朔方兵素稱精鋭如逹奚小俊等皆萬人敵朕晝夕憂之奈何對曰天下事甚有可憂者若惟河中不足憂也夫料敵者料將不料兵今懷光將也小俊之徒乃兵耳何足爲意懷光既解奉天之圍視朱泚垂亡之虜不能取乃與之連和使李晟得取以爲功今陛下已還宫闕懷光不束身歸罪乃虐殺使臣䑕伏河中如夢魘之人耳但恐不日爲帳下所梟使諸將無以藉手也初上發吐蕃以討朱泚許成功以伊西北庭之地與之及泚誅吐蕃來求地上欲召兩鎮節度使郭昕李元忠還朝以其地與之李泌曰安西北庭人性驍悍控制西域五十七國及十姓突厥又分吐蕃之勢使不得併兵東侵柰何拱手與之且兩鎮之人勢孤地逺盡忠竭力爲國家固守近二十年誠可哀憐一旦弃之以與戎狄彼其心必深怨中國它日從吐蕃入冦如報私讎矣况日者吐蕃觀望不進隂持兩端大掠武功受賂而去何功之有衆議亦以爲然上遂不與李希烈聞李希倩伏誅忿怒八月壬寅遣中使至蔡州殺顔眞卿中使曰有敕真卿再拜中使曰今賜卿死真卿曰老臣無狀罪當死不知使者㡬日􅀤長安使者曰自大梁來非長安也真卿曰然則賊耳何謂敕邪遂縊殺之李晟以涇州倚邊屢害軍帥常為亂根奏請往理不用命者力田積粟以攘吐蕃癸卯以晟兼鳳翔隴右節度等使及四鎮北庭涇原行營副元帥進爵西平王時李楚琳入朝晟請與俱至鳳翔斬之以懲逆亂上以新復京師務安反仄不許先是上命渾瑊駱元光討李懷光軍于同州懷光遣其將徐庭光以精卒六千軍于長春宫以拒之瑊等數爲所敗不能進時度支用度不給議者多請赦懷光上不許李懷光遣其妹壻要廷珍守晉州牙將毛朝􅤬守隰州鄭抗守慈州馬燧皆遣人説下之上乃加渾瑊河中絳州節度使充河中同華陜虢行營副元帥加馬燧奉誠軍晉慈隰節度使充管内諸軍行營副元帥與鎭國節度使駱元光鄜坊節度使唐朝臣合兵討懷光初王武俊急攻康日知於趙州馬燧奏請詔武俊與李抱眞同擊朱滔以深趙􅀠武俊改日知爲晉慈隰節度使上從之日知未至而三州降燧故上使燧兼領之燧表讓三州於日知且言因降而授恐後有功者踵以爲常上嘉而許之燧遣使迎日知既至籍府庫而歸之甲辰以鳳翔節度使李楚琳為左金吾大將軍丙子加渾瑊朔方行營元帥李晟至鳳翔治殺張鎰之罪斬禆將王斌等十餘人朱滔爲王武俊所攻殆不能軍上表待罪癸未馬燧將歩騎三萬攻絳州度支以李懷光所部將士數萬與懷光同反不給冬衣上曰朔方軍累代忠義今爲懷光所制耳將士何罪冬十月巳亥詔朔方及諸軍在懷光所者冬衣及賞錢皆當别貯俟道路稍通即時給之李勉累表乞自貶辛丑罷勉都統節度使其檢校司徒同平章事如故丙辰李懷光將閻晏宼同州官軍敗于沙苑詔徴邠州之軍韓遊瓌將甲士六千赴之乙丑馬燧拔絳州分兵取聞喜萬泉虞郷永樂猗氏初魚朝恩既誅代宗不復使宦官典兵上即位悉以禁兵委白志貞志貞得罪上復以宦官竇文場代之從幸山南兩軍漸集上還長安頗忌宿將握兵多者稍稍罷之戊辰以文場監神策軍左廂兵馬使王希遷監右廂兵馬使始令宦官分典禁旅閏月丙子以涇原節度使田希鑒爲衛尉卿李晟初至鳳翔希鑒遣使參􅀱晟謂使者曰涇州逼近吐蕃萬一入冦州兵能獨禦之乎欲遣兵防援又未知田尚書意使者歸以告希鑒希鑒果請援兵晟遣腹心將彭令英等戍涇州晟尋託廵邉詣涇州希鑒出迎晟與之並轡而入道舊結歡希鑒妻李氏以叔父事晟晟謂之田郎晟命具三日食曰廵撫畢即還鳳翔希鑒不復疑晟置宴希鑒與將佐俱詣晟營晟伏甲於外廡既食而飲彭令英引涇州諸將下堂晟曰我與汝曹久别各宜自言姓名於是得爲亂者石奇等三十餘人讓之曰汝曹屢爲逆亂殘害忠良固天地所不容悉引出斬之希鑒尚在座晟顧之曰田郎亦不得無過以親知之故當使身首得完希鑒曰唯遂引出縊殺之并其子蕚晟入其營諭以誅希鑒之意衆股栗無敢動者李希烈遣其將翟崇暉悉衆圍陳州久之不克李澄知大梁兵少不能制滑州遂焚希烈所授旌節誓衆歸國甲午以澄爲汴滑節度使宋亳節度使劉洽遣馬歩都虞􅇋劉昌與隴右幽州行營節度使曲環等將兵三萬救陳州十一月癸卯敗翟崇暉於州西斬首三萬五千級擒崇暉以獻乗勝進攻汴州李希烈懼奔歸蔡州李澄引兵趣汴州至城北恇怯不敢進劉洽兵至城東戊午李希烈守將田懷珍開門納之明日澄入舍於浚儀兩軍之士日有忿鬩㑹希烈鄭州守將孫液降於澄澄引兵屯鄭州詔以都統司馬寳鼎薛珏爲汴州刺史李勉至長安素服待罪議者多以勉失守大梁不應尚爲相李泌言於上曰李勉公忠雅正而用兵非其所長及大梁不守將士弃妻子而從之者殆二萬人足以見其得衆心矣且劉洽出勉麾下勉至睢陽悉舉其衆以授之卒平大梁亦勉之功也上乃命勉復其位議者又言韓滉聞鑾輿在外聚兵修石頭城隂蓄異志上疑之以問李泌對曰滉公忠清儉自車駕在外滉貢獻不絶且鎮撫江東十五州盜賊不起皆滉之力也所以修石頭城者滉見中原版蕩謂陛下將有永嘉之行爲迎扈之備耳此乃人臣忠篤之慮柰何更以爲罪乎滉性剛嚴不附權貴故多謗毁願陛下察之臣敢保其無它上曰外議洶洶章奏如麻卿弗聞乎對曰臣固聞之其子臯為考功員外郎今不敢歸省其親正以謗語沸騰故也上曰其子猶懼如此卿柰何保之對曰滉之用心臣知之至熟願上章明其無它乞宣示中書使朝衆皆知之上曰朕方欲用卿人亦何易可保愼勿違衆恐并為卿累也泌退遂上章請以百口保滉它日上謂泌曰卿竟上章已為卿留中雖知卿與滉親舊豈得不自愛其身乎對曰臣豈肯於私親舊以負陛下顧滉實無異心臣之上章以為朝廷非為身也上曰如何其爲朝廷對曰今天下旱蝗闗中米斗千錢倉廩耗竭而江東豐稔願陛下早下臣章以解朝衆之惑面諭韓臯使之歸覲令滉感激無自疑之心速運糧儲豈非為朝廷邪上曰善朕深諭之矣即下泌章令韓臯謁告歸覲面賜緋衣諭以卿父比有謗言朕今知其所以釋然不復信矣因言闗中乏糧歸語卿父宜速致之臯至潤州滉感悦流涕即日自臨水濱發米百萬斛聽臯留五日即還朝臯别其母啼聲聞於外滉怒召出撻之自送至江上冒風濤而遣之既而陳少逰聞滉貢米亦貢二十萬斛上謂李泌曰韓滉乃能化陳少逰亦貢米矣對曰豈惟少逰諸道將爭入貢矣吏部尚書同平章事蕭復奉使自江淮還與李勉盧翰劉從一俱見上勉等退復獨留言於上曰陳少遊任兼將相首敗臣節韋臯幕府下僚獨建忠義請以臯代少逰鎮淮南使善惡著明上然之尋遣中使馬欽緒揖劉從一附耳語而去諸相還閤從一詣復曰欽緒宣㫖令從一與公議朝來所言事即奏行之勿令李盧知敢問何事也復曰唐虞黜陟岳牧僉諧爵人於朝與士共之使李盧不堪為相則罷之既在相位朝廷政事安得不與之同議而獨隠此一事乎此最當今之大弊朝來主上亦有斯言復已面陳其不可不謂聖意尚爾復不惜與公奏行之但恐浸以成俗未敢以告竟不以事語從一從一奏之上愈不悅復乃上表辭位乙丑罷為左庶子劉洽克汴州得李希烈起居注云某月日陳少遊上表歸順少逰聞之慙懼發疾十二月乙亥薨贈太尉􅉠祭如常儀淮南大將王韶欲自為留後令將士推已知軍事且欲大掠韓滉遣使謂之曰汝敢爲亂吾即日全軍度江誅汝矣韶等懼而止上聞之喜謂李泌曰滉不惟安江東又能安淮南真大臣之器卿可謂知人庚辰加滉平章事江淮轉運使滉運江淮粟帛入貢府無虚月朝廷賴之使者勞問相繼恩遇始深矣是歳蝗徧逺近草木無遺惟不食稻大饑道殣相望貞元元年春正月丁酉朔赦天下改元癸丑贈顔真卿司徒謚曰文忠新州司馬盧􅂎遇赦移吉州長史謂人曰吾必再入未幾上果用爲饒州刺史給事中袁髙應草制執以白盧翰劉從一曰盧􅂎作相致鑾輿播遷海内瘡痍柰何遽遷大郡願相公執奏翰等不從更命它舍人草制乙卯制出髙執之不下且奏杞極惡窮凶百辟疾之若讎六軍思食其肉何可復用上不聽補闕陳京趙需等上䟽曰杞三年擅權百揆失敘天地神祗所知華夏蠻夷同弃儻加巨姦之寵必失萬姓之心丁巳袁髙復於正牙論奏上曰􅂎巳再更赦高曰赦者止原其罪不可爲刺史陳京等亦争之不巳曰􅂎之執政百官常如兵在其頸今復用之則姦黨皆唾掌而起土大怒左右辟易諌者稍引却京顧曰趙需等勿退此國大事當以死争之上怒稍解戊午上謂宰相與􅂎小州刺史可乎李勉曰陛下欲與之雖大州亦可其如天下失望何壬戌以杞為灃州别駕使謂袁髙曰朕徐思卿言誠為至當又謂李泌曰朕已可袁髙所奏泌曰累日外人竊議比陛下於桓靈今承德音乃堯舜之不逮也上悦杞竟卒於灃州高恕己之孫也三月李希烈陷鄧州戊午以汴滑節度使李澄為鄭滑節度使以代宗女嘉誠公主妻田緒李懷光都虞􅇋吕鳴岳宻通􅅃於馬燧事泄懷光殺之屠其家事連幕僚髙郢李鄘懷光集將士而責之郢鄘抗言逆順無所慙隱懷光囚之鄘邕之姪孫也馬燧軍于寳鼎敗懷光兵於陶城斬首萬餘級分兵㑹渾瑊逼河中夏四月丁丑以曹王臯為荆南節度李希烈將李思登以隨州降之壬午馬燧渾瑊破李懷光兵於長春宫南遂掘塹圍宫城懷光諸將相繼來降詔以燧瑊為招撫使五月丙申劉洽更名􅀇佐韓遊瓌請兵於渾瑊共取朝邑李懷光將閻晏欲爭之士卒指邠軍曰彼非吾父兄則吾子弟柰何以白刄相向乎語甚􅅝晏遽引兵去懷光知衆心不從乃詐稱欲歸國聚貨財飾車馬云俟路通入貢由是得復踰旬月六月辛巳以劉􅀇佐兼汴州刺史辛卯以金吾大將軍韋臯為西川節度使朱滔病死將士奉前涿州刺史劉怦知軍事時連年旱蝗度支資糧匱竭言事者多請赦李懷光李晟上言赦懷光有五不可河中距長安纔三百里同州當其衝多兵則朱為示信少兵則不足隄防忽驚東偏何以制之一也今赦懷光必以晉絳慈隰還之渾瑊既無所詣康日知又應遷移土宇不安何以奬勵二也陛下連兵一年討除小醜兵力未窮遽赦其反逆之罪今西有吐蕃北有回紇南有淮西皆觀我彊弱不謂陛下施德澤愛黎元乃謂兵屈於人而自罷耳必競起窺覦之心三也懷光既赦則朔方將士皆應叙勲行賞今府庫方虛賞不滿望是愈激之使叛四也既解河中罷諸道兵賞典不舉怨言必起五也今河中斗米五百芻藁且盡牆壁之間餓殍甚衆且其軍中大將殺戮略盡陛下但敇諸道圍守旬時彼必有内潰之變何必養腹心之疾為它日之悔哉又請發兵二萬自備資糧獨討懷光秋七月甲午朔馬燧自行營入朝奏稱懷光凶逆尤甚赦之無以令天下願更得一月糧必為陛下平之上許之陜虢都知兵馬使達奚抱暉鴆殺節度使張勸代揔軍務邀求旌節且隂召李懷光將達奚小俊為援上謂李泌曰若蒲陜連衡則猝不可制且抱暉據陜則水陸之運皆絶矣不得不煩卿一往辛丑以泌為陜虢都防禦水陸運使上欲以神策軍送泌之官問須幾何人對曰陜城三面懸絶攻之未可以歳月下也臣請以單騎入之上曰單騎如何可入對曰陜城之人不貫逆命此特抱暉為惡耳若以大兵臨之彼閉壁定矣臣今單騎抵其近郊彼舉大兵則非敵若遣小校來殺臣未必不更為臣用也且今河東全軍屯安邑馬燧入朝願敕燧與臣同辭偕行使陜人欲加害於臣則畏河東移軍討之此亦一勢也上曰雖然朕方大用卿寜失陜州不可失卿當更使它人往耳對曰它人必不能入今事變之初衆心未定故可出其不意奪其姦謀它人猶豫遷延彼既成謀則不得前矣上許之泌見陜州進奏官及將吏在長安者語之曰主上以陜虢饑故不授泌節而領運使欲令督江淮米以賑之耳陜州行營在夏縣若抱暉可用當使將之有功則賜旌節矣抱暉覘者馳告之抱暉稍自安泌具以語白上曰欲使其士卒思米抱暉思節必不害臣矣上曰善戊申泌與馬燧俱辭行庚戌加泌陜虢觀察使泌出潼闗鄜坊節度使唐朝臣以歩騎三千布於闗外曰奉宻詔送公至陜泌曰辭日奉進止以便宜從事此一人不可相躡而來來則吾不得入陜矣唐臣以受詔不敢去泌寫宣以却之因疾驅而前抱暉不使將佐出迎惟偵者相繼泌宿曲沃將佐不俟抱暉之命來迎泌笑曰吾事濟矣去城十五里抱暉亦出謁泌稱其攝事保完城隍之功曰軍中煩言不足介意公等職事皆按堵如故抱暉出而喜泌既入城視事賔佐有請屏人白事者泌曰易帥之際軍中煩言乃其常理泌到自妥貼矣不願聞也由是反仄者皆自安泌但索簿書治糧儲明日召抱暉至宅語之曰吾非愛汝而不誅恐自今有危疑之地朝廷所命將帥皆不能入故匄汝餘生汝為我齎版幣祭前使愼無入闗自擇安處濳來取家保無它也泌之辭行也上籍陜將預於亂者七十五人授泌使誅之泌既遣抱暉日中宣慰使至泌奏已遣抱暉餘不足問上復遣中使詣陜必使誅之泌不得已械兵馬使林滔等五人送京師懇請赦之詔謫戍天德嵗餘竟殺之而抱暉遂亡命不知所之達奚小俊引兵至境聞泌已入陜而還壬子以劉怦為幽州盧龍節度使大旱灞滻將竭長安井皆無水度支奏中外經費纔支七旬資治通鑑卷第二百三十一
