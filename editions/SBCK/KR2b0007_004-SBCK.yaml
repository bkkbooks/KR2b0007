front:
  text: 資治通鑑巻第四
  hash: sha256:f6ddb0cb27f26ebfe3e8df3ceab0a2026d2441e8c051314bebf34206c6a43d59
body:
  text: 臣司馬光奉勑編集周紀四困敦凡二十五年起閼逢困敦盡著雍赧王中十八年楚懷王亡歸秦人覺之遮楚道懷王從間道走趙趙主父在代趙人不敢受懷王將走魏秦人追及之以歸魯平公薨子緡王賈立十九年楚懷王發病薨於秦秦人歸其喪楚人皆憐之如悲親戚諸侯由是不直秦齊韓魏趙宋同擊秦至鹽氏而還秦與韓武遂與魏封陵以和趙主父行新地遂出代西遇樓煩王子西河而致其兵魏襄王薨子昭王立韓襄王薨子釐王咎立二十年秦尉錯伐魏襄城趙主父與齊燕共滅中山遷其王於膚施歸行賞大赦置酒酺五日趙主父封其長子章於代號曰安陽君安陽君素侈心不服其弟主父使田不禮相之李兌謂肥義曰公子章彊壯而志驕黨衆而欲大田不禮忍殺而驕二人相得必有隂謀夫小人有欲輕慮淺謀徒見其利不顧其害難必不久矣子任重而勢大亂之所始而禍之所集也子奚不稱疾毋出而傳政於公子成毋為禍梯不亦可乎肥義曰昔者主父以王屬義也曰毋變而度毋易而慮堅守一以殁而丗義再拜受命而籍之今畏不禮之難而忘吾籍變孰大焉諺曰死者復生生者不愧吾欲全吾言安得全吾身乎子則有賜而忠我矣雖然吾言已在前矣終不敢失李兌曰諾子勉之矣吾見子已今年耳涕泣而出李兌數見公子成以備田不禮肥義謂信期曰公子章與田不禮聲善而實惡内得主而外為暴矯令以擅一旦之命不難為也今吾憂之夜而忘寐飢而忘食盗出入不可不備自今以來有召王者必見吾面我將以身先之無故而後王可入也信期曰善主父使惠文王朝羣臣而自從旁窺之見其長子傫然也反北面為臣詘於其弟心憐之於是乃欲分趙而王公子章於代計未决而輟主父及王游沙丘異宫公子章田不禮以其徒作亂詐以主父令召王肥義先入殺之高信即與王戰公子成與李兌自國至乃起四邑之兵入距難殺公子章及田不禮滅其黨公子成為相號安平君李兌為司㓂是時惠文王少成兌專政公子章之敗也往走主父主父開之成兌因圍主父宫公子章死成兌謀曰以章故圍主父即解兵吾屬夷矣乃遂圍之令宫中人後出者夷宫中人悉出主父欲出不得又不得食探雀鷇而食之三月餘餓死沙丘宫王父定死乃發喪赴諸矦主父初以長子章為太子後得吳娃愛之為不出者數歲生子何乃廢太子章而立之吳娃死愛弛憐故太子欲兩王之猶豫未決故亂起秦樓緩免相魏冉代之二十一年秦敗魏師于解二十二年韓公孫喜魏人伐秦穰矦薦左更白起於秦王以代向壽將兵敗魏師韓師於伊闕斬首二十四萬級虜公孫喜拔五城秦王以白起為國尉秦王遺楚王書曰楚倍秦秦且率諸矦伐楚願王之飭士卒得一樂戰楚王患之乃復與秦和親二十三年楚襄王迎婦于秦臣光曰甚哉秦之無道也殺其父而刼其子楚之不競也忍其父而婚其讎烏呼楚之君誠得其道臣誠得其人秦雖彊烏得陵之哉善乎荀卿論之曰夫道善用之則百里之地可以獨立不善用之則楚六千里而為讎人役故人主不務得道而廣有其勢是其所以危也秦魏冉謝病免以客卿燭壽為丞相二十四年秦伐韓拔宛秦燭壽免魏冉復為丞相封於穰與陶謂之穰矦又封公子市於宛公子悝於鄧二十五年魏入河東地四百里韓入武遂地二百里于秦魏芒卯始以詐見重二十六年秦大良造白起客卿錯伐魏至軹取城大小六十一二十七年冬十月秦王稱西帝遣使立齊王為東帝欲約與共伐趙蘇代自燕來齊王曰秦使魏冉致帝子以為何如對曰願王受之而勿稱也秦稱之天下安之王乃稱之無後也秦稱之天下惡之王因勿稱以收天下此大資也且伐趙孰與伐桀宋利今王不如釋帝以收天下之望發兵以伐桀宋宋舉則楚趙梁衛皆懼矣是我以名尊秦而令天下憎之所謂以卑為尊也齊王從之稱帝二日而復歸之十二月呂禮自齊入秦秦王亦去帝復稱王秦攻趙拔杜陽二十八年秦攻魏拔新垣曲陽二十九年秦司馬錯擊魏河内魏獻安邑以和秦出其人歸之魏秦敗韓師于夏山宋有雀生􆇸於城之陬史占之曰吉小而生巨必霸天下宋康王喜起兵滅滕伐薛東敗齊取五城南敗楚取地三百里西敗魏軍與齊魏為敵國乃愈自信其霸欲霸之亟成故射天笞地斬社稷而焚滅之以示威服鬼神為長夜之飲於室中室中人呼萬歲則堂上之人應之堂下之人又應之門外之人又應之以至於國中無敢不呼萬歲者天下之人謂之桀宋齊湣王起兵伐之民散城不守宋王奔魏死於温三十年秦王㑹楚王于宛㑹趙王于中陽秦蒙武擊齊拔九城齊湣王既滅宋而驕乃南侵楚西侵三晉欲并二周為天子狐咺正議斮之檀衢陳舉直言殺之東閭燕昭王日夜撫循其人益以富實乃與樂毅謀伐齊樂毅曰齊霸國之餘業也地大人衆未易獨攻也王必欲伐之莫如約趙及楚魏於是使樂毅約趙别使使者連楚魏且令趙嚪秦以伐齊之利諸矦害齊王之驕暴皆爭合謀與燕伐齊三十一年燕王悉起兵以樂毅為上將軍秦尉斯離帥師與三晉之師㑹之趙王以相國印授樂毅樂毅并將秦魏韓趙之兵以伐齊齊湣王悉國中之衆以拒之戰于濟西齊師大敗樂毅還秦韓之師分魏師以略宋地部趙師以收河閒身率燕師長驅逐北劇辛曰齊大而燕小頼諸矦之助以破其軍宜及時攻取其邊城以自益此長乆之利也今過而不攻以深入為名無損於齊無益於燕而結深怨後必悔之樂毅曰齊王伐功矜能謀不逮下廢黜賢良信任謟諛政令戾虐百姓怨懟今軍皆破亡若因而乗之其民必叛禍亂内作則齊可圖也若不遂乗之待彼悔前之非攺過恤下而撫其民則難慮也遂進軍深入齊人果大亂失度湣王出走樂毅入臨淄取寶物祭器輸之於燕燕王親至濟上勞軍行賞饗士封樂毅為昌國君遂使留徇齊城之未下者齊王出亡之衛衛君辟宮舎之稱臣而共具齊王不遜衛人侵之齊王去奔鄒魯有驕色鄒魯弗内遂走莒楚使淖齒將兵救齊因為齊相淖齒欲與燕分齊地乃執湣王而數之曰千乗博昌之閒方數百里􅀨血沾衣王知之乎曰知之嬴博之閒地坼及泉王知之乎曰知之有人當闕而哭者求之不得去則聞其聲王知之乎曰知之淖齒曰天􅀨血沾衣者天以告也地坼及泉者地以告也有人當闕而哭者人以告也天地人皆告矣而王不知誡焉何得無誅遂弑王於鼔里荀子論之曰國者天下之利勢也得道以持之則大安也大榮也積美之源也不得道以持之則大危也大累也有之不如無之及其綦也索為匹夫不可得也齊湣宋獻是也故用國者義立而王信立而霸權謀立而亡挈國以呼禮義而無以害之行一不義殺一無罪而得天下仁者不為也櫟然扶持心國且若是其固也之所與為之者之人則舉義士也之所以為布陳於國家刑灋者則舉義灋也主之所極然帥羣臣而首嚮之者則舉義志也如是則下仰上以義矣是綦定也綦定而國定國定而天下定故曰以國濟義一日而白湯武是也是所謂義立而王也德雖未至也義雖未濟也然而天下之理略奏矣刑賞已諾信乎天下矣臣下曉然皆知其可要也政令已陳雖覩利敗不欺其民約結已定雖覩利敗不欺其與如是則兵勁城固敵國畏之國一綦明與國信之雖在僻陋之國威動天下五伯是也是所謂信立而覇也挈國以呼功利不務張其義齊其信唯利之求内則不憚詐其民而求小利焉外則不憚詐其與而求大利焉内不修正其所以有然常欲人之有如是則臣下百姓莫不以詐心待其上矣上詐其下下詐其上則是上下析也如是則敵國輕之與國疑之權謀日行而國不免危削綦之而亡齊湣薛公是也故用彊齊非以修禮義也非以本政敎也非以一天下也綿綿常以結引馳外為務故彊南足以破楚西足以詘秦北足以敗燕中足以舉宋及以燕趙起而攻之若振槁然而身死國亡為天下大戮後丗言惡則必稽焉是無他故焉唯其不由禮義而由權謀也三者明主之所謹擇也仁人之所務白也善擇者制人不善擇者人制之樂毅聞畫邑人王蠋賢令軍中環畫邑三十里無入使人請蠋蠋謝不往燕人曰不來吾且屠畫邑蠋曰忠臣不事二君烈女不更二夫齊王不用吾諌故退而耕於野國破君亡吾不能存而又欲劫之以兵吾與其不義而生不若死遂經其頸於樹枝自奮絶脰而死燕師乗勝長驅齊城皆望風奔潰樂毅修整燕軍禁止侵掠求齊之逸民顯而禮之寛其賦斂除其暴令修其舊政齊民喜悅乃遣左軍渡膠東東萊前軍循太山以東至海略琅邪右軍循河濟屯阿鄄以連魏師後軍旁北海以撫千乗以中軍據臨淄而鎭齊都祀桓公管仲於郊表賢者之閭封王蠋之墓齊人食邑於燕者二十餘君有爵位於薊者百有餘人六月之閒下齊七十餘城皆為郡縣秦王魏王韓王㑹于京師三十二年秦趙㑹于穰秦拔魏安城兵至大梁而還齊淖齒之亂湣王子灋章變名姓為莒太史敫家傭太史敫女竒灋章狀貌以為非常人憐而常竊衣食之因與私通王孫賈從湣王失王之處其母曰汝朝出而晩來則吾􅀝門而望汝暮出而不還則吾􅀝閭而望汝今事王王走汝不知其處汝尚何歸焉王孫賈乃入市中呼曰淖齒亂齊國殺湣王欲與我誅之者袒右市人從者四百人與攻淖齒殺之於是齊亡臣相與求湣王子欲立之灋章懼其誅己乆之乃敢自言遂立以為齊王保莒城以拒燕布告國中曰王已立在莒矣趙王得楚和氏璧秦昭王欲之請易以十五城趙王欲勿與畏秦彊欲與之恐見欺以問藺相如對曰秦以城求璧而王不許曲在我矣我與之璧而秦不與我城則曲在秦均之二䇿寧許以負秦臣願奉璧而往使秦城不入臣請完璧而歸之趙王遣之相如至秦秦王無意償趙城相如乃以詐紿秦王復取璧遣從者懷之間行歸趙而以身待命於秦秦王以為賢而弗誅禮而歸之趙王以相如為上大夫衛嗣君薨子懐君立嗣君好察微隱縣令有發褥而席弊者嗣君聞之乃賜之席令大驚以君為神又使人過􅀜市賂之以金既而召關市問有客過與汝金汝回遣之􅀜市大恐又愛泄姬重如耳而恐其因愛重以壅已也乃貴薄疑以敵如耳尊魏妃以偶泄姬曰以是相參也荀子論之曰成矦嗣君聚斂計數之君也未及取民也子産取民者也未及為政也管仲為政者也未及修禮也故修禮者王為政者彊取民者安聚斂者亡三十三年秦伐趙拔兩城三十四年秦伐趙拔石城秦穰矦復為丞相楚欲與齊韓共伐秦因欲圖周王使東周武公謂楚令尹昭子曰周不可圖也昭子曰乃圖周則無之雖然何不可圖武公曰西周之地絶長補短不過百里名為天下共主裂其地不足以肥國得其衆不足以勁兵雖然攻之者名為弑君然而猶有欲攻之者見祭器在焉故也夫虎肉臊而兵利身人猶攻之若使澤中之麋蒙虎之皮人之攻之也必萬倍矣裂楚之地足以肥國詘楚之名足以尊主今子欲誅殘天下之共主居三代之傳器器南則兵至矣於是楚計輟不行三十五年秦白起敗趙軍斬首二萬取代光狼城又使司馬錯發隴西兵因蜀攻楚黔中拔之楚獻漢北及上庸地三十六年秦白起伐楚取鄢鄧西陵秦王使使者告趙王願為好㑹於河外澠池趙王欲毋行廉頗藺相如計曰王不行示趙弱且怯也趙王遂行相如從廉頗送至境與王訣曰王行度道里㑹遇之禮畢還不過三十日三十日不還則請立太子以絶秦望王許之㑹于澠池王與趙王飲酒酣秦王請趙王鼔瑟趙王鼔之藺相如復請秦王擊缶秦王不肯相如曰五歩之内臣請得以頸血濺大王矣左右欲刃相如相如張目叱之左右皆靡王不懌為一擊缶罷酒秦終不能有加於趙趙人亦盛為之備秦不敢動趙王歸國以藺相如為上卿位在廉頗之右廉頗曰我為趙將有攻城野戰之功藺相如素賤人徒以口舌而位居我上吾羞不忍為之下宣言曰我見相如必辱之相如聞之不肯與㑹每朝常稱病不欲争列出而望見輙引車避匿其舎人皆以為耻相如曰子視廉將軍孰與秦王曰不若相如曰夫以秦王之威而相如廷叱之辱其羣臣相如雖駑獨畏廉將軍哉顧吾念之彊秦之所以不敢加兵於趙者徒以吾兩人在也今兩虎共鬭其勢不俱生吾所以為此者先國家之急而後私讎也廉頗聞之肉袒負荆至門謝罪遂為刎頸之交初燕人攻安平臨淄市掾田單在安平使其宗人皆以鐵籠傅車轊及城潰人爭門而出皆以軸折車敗為燕所禽獨田單宗人以鐵籠得免遂犇即墨是時齊地皆屬燕獨莒即墨未下樂毅乃并右軍前軍以圍莒左軍後軍圍即墨即墨大夫出戰而死即墨人曰安平之戰田單宗人以鐵籠得全是多智習兵因共立以為將以拒燕樂毅圍二邑朞年不尅乃令解圍各去城九里而為壘令曰城中民出者勿獲困者賑之使即舊業以鎭新民三年而猶未下或讒之於燕昭王曰樂毅智謀過人伐齊呼吸之閒尅七十餘城今不下者兩城耳非其力不能拔所以三年不攻者欲乆仗兵威以服齊人南面而王耳今齊人已服所以未發者以其妻子在燕故也且齊多美女又將忘其妻子願王圖之昭王於是置酒大會引言者而讓之曰先王舉國以禮賢者非貪土地以遺子孫也遭所傳德薄不能堪命國人不順齊為無道乗孤國之亂以害先王寡人統位痛之入骨故廣延羣臣外招賔客以求報讎其有成功者尚欲與之同共燕國今樂君親為寡人破齊夷其宗廟報塞先仇齊國固樂君所有非燕之所得也樂君若能有齊與燕並為列國結歡同好以抗諸矦之難燕國之福寡人之願也汝何敢言若此乃斬之賜樂毅妻以后服賜其子以公子之服輅車乗馬後屬百兩遣國相奉而致之樂毅立樂毅為齊王樂毅惶恐不受拜書以死自誓由是齊人服其義諸矦畏其信莫敢復有謀者頃之昭王薨惠王立惠王自為太子時甞不快於樂毅田單聞之乃縱反閒於燕宣言曰齊王已死城之不拔者二耳樂毅與燕新王有隙畏誅而不敢歸以伐齊為名實欲連兵南面王齊齊人未附故且緩攻即墨以待其事齊人所懼唯恐他將之來即墨殘矣燕王固已疑樂毅得齊反間乃使􅀐劫代將而召樂毅樂毅知王不善代之遂犇趙燕將士由是憤惋不和田單令城中人食必祭其先祖於庭飛鳥皆翔舞而下城中燕人怪之田單因宣言曰當有神師下敎我有一卒曰臣可以為師乎因反走田單起引還坐東鄉師事之卒曰臣欺君田單曰子勿言也因師之毎出約束必稱神師乃宣言曰吾唯懼燕軍之劓所得齊卒置之前行即墨敗矣燕人聞之如其言城中見降者盡劓皆怒堅守唯恐見得單又縱反間言吾懼燕人掘吾城外冢墓可為寒心燕軍盡掘冢墓燒死人齊人從城上望見皆涕泣其欲出戰怒自十倍田單知士卒之可用乃身操版鍤與士卒分功妻妾編於行伍之間盡散飲食饗士令甲卒皆伏使老弱女子乘城遣使約降於燕燕軍皆呼萬歲田單又收民金得千鎰令即墨富豪遺燕將曰即降願無虜掠吾族家燕將大喜許之燕軍益懈田單乃收城中得牛千餘為綘繒衣畫以五采龍文束兵刃於其角而灌脂束葦於尾燒其端鑿城數十穴夜縱牛壯士五千人隨其後牛尾熱怒而犇燕軍燕軍大驚視牛皆龍文所觸盡死傷而城中鼔譟從之老弱皆擊銅器為聲聲動天地燕軍大駭敗走齊人殺􅀐劫追亡逐北所過城邑皆叛燕復為齊田單兵日益多乗勝燕日敗亡走至河上而齊七十餘城皆復焉乃迎襄王於莒入臨淄封田單為安平君齊王以太史敫之女為后生太子建太史敫曰女不取媒因自嫁非吾種也汙吾丗終身不見君王后君王后亦不以不見故失人子之禮趙王封樂毅於觀津尊寵之以警動於燕齊燕惠王乃使人讓樂毅且謝之曰將軍過聽以與寡人有隙遂􅂢燕歸趙將軍自為計則可矣而亦何以報先王之所以遇將軍之意乎樂毅報書曰昔伍子胥􅀃聽於闔閭而吳逺迹至郢夫差弗是也賜之鴟夷而浮之江吳王不寤先論之可以立功故沈子胥而不悔子胥不蚤見主之不同量是以至於入江而不化夫免身立功以明先王之迹臣之上計也離毀辱之誹謗墮先王之名臣之所大恐也臨不測之罪以幸為利義之所不敢出也臣聞古之君子交絶不出惡聲忠臣去國不潔其名臣雖不佞數奉教於君子矣唯君王之留意焉於是燕王復以樂毅子閒為昌國君而樂毅往來復通燕卒於趙號曰望諸君田單相齊過淄水有老人渉淄而寒出水不能行田單解其裘而衣之襄王惡之曰田單之施於人將欲以取我國乎不早圖恐後之變也左右顧無人巖下有貫珠者襄王呼而問之曰汝聞吾言乎對曰聞之王曰汝以為何如對曰王不如因以為己善王嘉單之善下令曰寡人憂民之饑也單收而食之寡人憂民之寒也單解裘而衣之寡人憂勞百姓而單亦憂之稱寡人之意單有是善而王嘉之單之善亦王之善也王曰善乃賜單牛酒後數日貫珠者復見王曰王朝日宜召田單而揖之於庭口勞之乃布令求百姓之飢寒者收榖之乃使人聽於閭里聞大夫之相與語者曰田單之愛人嗟乃王之教也田單任貂勃於王王有所幸臣九人欲傷安平君相與語於王曰燕之伐齊之時楚王使將軍將萬人而佐齊今國已定而社稷已安矣何不使使者謝於楚王王曰左右孰可九人之屬曰貂勃可貂勃使楚楚王受而觴之數月不反九人之屬相與語於王曰夫一人之身而牽留萬乗者豈不以據勢也哉且安平君之與王也君臣無異而上下無别且其志欲為不善内撫百姓外懷戎翟禮天下之賢士其志欲有為也願王之察之異日王曰召相單而來田單免冠徒跣肉袒而進退而請死罪五日而王曰子無罪於寡人子為子之臣禮吾為吾之王禮而已矣貂勃從楚來王賜之酒酒酣王曰召相單而來貂勃避席稽首曰王上者孰與周文王王曰吾不若也貂勃曰然臣固知王不若也下者孰與齊􅁊公王曰吾不若也貂勃曰然臣固知王不若也然則周文王得呂尚以為太公齊􅁊公得管夷吾以為仲父今王得安平君而獨曰單安得此亡國之言乎且自天地之闢民人之始為人臣之功者誰有厚於安平君者哉王不能守王之社稷燕人興師而襲齊王走而之城陽之山中安平君以惴惴即墨三里之城五里之郭敝卒七千人禽其司馬而反千里之齊安平君之功也當是之時舍城陽而自王天下莫之能止然而計之於道歸之於義以為不可故棧道木閣而迎王與后於城陽山中王乃得反子臨百姓今國已定民已安矣王乃曰單嬰兒之計不為此也王亟殺此九子者以謝安平君不然國其危矣乃殺九子而逐其家益封安平君以夜邑萬戸田單將攻狄往見魯仲連魯仲連曰將軍攻狄不能下也田單曰臣以即墨破亡餘卒破萬乗之燕復齊之墟今攻狄而不下何也上車弗謝而去遂攻狄三月不克齊小兒謡曰大冠若箕脩劒拄頥攻狄不能下壘枯骨成丘田單乃懼問魯仲連曰先生謂單不能下狄請問其􅀃魯仲連曰將軍之在即墨坐則織蕢立則仗鍤為士卒倡曰無可往矣宗廟亡矣今日尚矣歸於何黨矣當此之時將軍有死之心士卒無生之氣聞君言莫不揮泣奮臂而欲戰此所以破燕也當今將軍東有夜邑之奉西有淄上之娛黄金横帶而騁乎淄澠之閒有生之樂無死之心所以不勝也田單曰單之有心先生志之矣明日乃厲氣循城立於矢石之所援枹鼔之狄人乃下初齊湣王既滅宋欲去孟甞君孟甞君犇魏魏昭王以為相與諸矦共伐破齊湣王死襄王復國而孟甞君中立為諸侯無所屬襄王新立畏孟甞君與之連和孟嘗君卒諸子争立而齊魏共滅薛孟甞君絶嗣三十七年秦大良造白起伐楚抜郢燒夷陵楚襄王兵散遂不復戰東北徙都於陳秦以郢置南郡封白起為武安君三十八年秦武安君定巫黔中初置黔中郡魏昭王薨子安釐王立三十九年秦武安君伐魏拔兩城楚王收東地兵得十餘萬復西取江南十五邑魏安釐王封其弟无忌為信陵君四十年秦相國穰矦伐魏韓暴鳶救魏穰矦大破之斬首四萬暴鳶走開封魏納八城以和穰矦復伐魏走芒卯入北宅遂圍大梁魏人割温以和四十一年魏復與齊合從秦穰矦伐魏抜四城斬首四萬魯緡公薨子頃公讎立四十二年趙人魏人伐韓華陽韓人告急于秦秦王弗救韓相國謂陳筮曰事急矣願公雖病為一宿之行陳筮如秦見穰矦穰矦曰事急乎故使公來陳筮曰未急也穰矦怒曰何也陳筮曰彼韓急則將變而他從以未急故復來耳穰矦曰請發兵矣乃與武安君及客卿胡陽救韓八日而至敗魏軍於華陽之下走芒卯虜三將斬首十三萬武安君又與趙將賈偃戰沈其卒二萬人於河魏叚干子請割南陽予秦以和蘇代謂魏王曰欲璽者叚干子也欲地者秦也今王使欲地者制璽欲璽者制地魏地盡矣夫以地事秦猶抱薪救火薪不盡火不滅王曰是則然也雖然事始已行不可更矣對曰夫博之所以貴梟者便則食不便則止今何王之用智不如用梟也魏王不聽卒以南陽為和寔脩武韓釐王薨子􅁊惠王立韓魏既服於秦秦王將使武安君與韓魏伐楚未行而楚使者黄歇至聞之畏秦乘勝一舉而滅楚也乃上書曰臣聞物至則反冬夏是也致至則危累棊是也今大國之地徧天下有其二垂此從生民已來萬乗之地未甞有也先王三丗不忘接地於齊以絶從親之要今王使盛橋守事於韓盛橋以其地入秦是王不用甲不信威而得百里之地王可謂能矣王又舉甲而攻魏杜大梁之門舉河内拔燕酸棗虚桃入邢魏之兵雲翔而不敢捄王之功亦多矣王休甲息衆二年而後復之又并蒲􅄛首垣以臨仁平丘黄濟陽嬰城而魏氏服王又割濮磨之北注齊秦之要絶楚趙之脊天下五合六聚而不敢捄王之威亦單矣王若能保功守威絀攻取之心而肥仁義之地使無後患三王不足四五伯不足六也王若負人徒之衆仗兵革之彊乗毀魏之威而欲以力臣天下之主臣恐其有後患也詩曰靡不有初鮮克有終易曰狐渉水濡其尾此言始之易終之難也昔吳之信越也從而伐齊既勝齊人於艾陵還為越王禽於三江之浦智氏之信韓魏也從而伐趙攻晉陽城勝有日矣韓魏叛之殺智伯瑶於鑿臺之下今王妬楚之不毀而忘毀楚之彊韓魏也臣為王慮而不取也夫楚國援也鄰國敵也今王信韓魏之善王此正吳之信越也臣恐韓魏卑辭除患而實欲欺大國也何則王無重丗之德於韓魏而有累丗之怨焉夫韓魏父子兄弟接踵而死於秦者將十丗矣故韓魏之不亡秦社稷之憂也今王資之與攻楚不亦過乎且攻楚將惡出兵王將借路於仇讎之韓魏乎兵出之日而王憂其不反也王若不借路於仇讎之韓魏必攻隨水右壤此皆廣川大水山林谿谷不食之地㫒王有毀楚之名而無得地之實也且王攻楚之日四國必悉起兵以應王秦楚之兵構而不離魏氏將出而攻留方與銍湖陵碭蕭相故宋必盡齊人南面攻楚泗上必舉此皆平原四逹膏腴之地如此則天下之國莫彊於齊魏矣臣為王慮莫若善楚秦楚合而為一以臨韓韓必斂手而朝王施以東山之險帶以曲河之利韓必為關内之矦若是而王以十萬戍鄭梁氏寒心許鄢陵嬰城而上蔡召陵不往來也如此而魏亦關内矦矣王壹善楚而關内兩萬乗之主注地於齊齊右壤可拱手而取也王之地一經兩海要約天下是燕趙無齊楚齊楚無燕趙也然後危動燕趙直搖齊楚此四國者不待痛而服矣王從之止武安君而謝韓魏使黄歇歸約親於楚資治通鑑巻第四
