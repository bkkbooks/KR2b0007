front:
  text: 資治通鑑卷第二百一十八
  hash: sha256:a4168b1f8688825b3b3e9c2a2b14b7a4d6ab273311ae43187ed7b5da87c57e2e
body:
  text: 臣司馬光奉勑編集唐紀三十四至九月不滿一年起柔兆涒灘五月肅宗文明武德大聖大宣孝皇帝上之下至德元載五月丁巳炅衆潰走保南陽賊就圍之太常卿張垍薦夷陵太守虢王巨有勇略上徵吳王祇為太僕卿以巨為陳留譙郡太守河南節度使兼統嶺南節度使何履光黔中節度使趙國珍南陽節度使魯炅國珍本䍧柯夷也戊辰巨引兵自藍田出趣南陽賊聞之解圍走令狐潮復引兵攻雍丘潮與張巡有舊於城下相勞苦如平生潮因説巡曰天下事去矣足下堅守危城欲誰爲乎巡曰足下平生以忠義自許今日之舉忠義何在潮慙而退郭子儀李光弼還常山史思明收散卒數萬踵其後子儀選驍騎更挑戰三日至行唐賊疲乃退子儀乗之又敗之於沙河蔡希德至洛陽安禄山復使將步騎二萬人北就思明又使牛廷玠發范陽等郡兵萬餘人助思明合五萬餘人而同羅曳落河居五分之一子儀至恒陽思明隨至子儀深溝高壘以待之賊來則守去則追之晝則耀兵夜斫其營賊不得休息數日子儀光弼議曰賊倦矣可以出戰壬午戰于嘉山大破之斬首四萬級捕虜千餘人思明墜馬露髻跣足步走至暮杖折槍歸營奔于博陵光弼就圍之軍聲大振於是河北十餘郡皆殺賊守將而降漁陽路再絶賊往來者皆輕騎竊過多為官軍所獲將士家在漁陽者無不揺心禄山大懼召高尚嚴莊詬之曰汝數年教我反以為萬全今守潼關數月不能進北路巳絶諸軍四合吾所有者止汴鄭數州而已萬全何在汝自今勿來見我尚莊懼數日不敢見田乾真自關下來為尚莊説禄山曰自古帝王經營大業皆有勝敗豈能一舉而成今四方軍壘雖多皆新募烏合之衆未更行陳豈能敵我薊北勁鋭之兵何足深憂尚莊皆佐命元勲陛下一旦絶之使諸將聞之誰不内懼若上下離心臣竊為陛下危之禄山喜曰阿浩汝能豁我心事即召尚莊置酒酣宴自為之歌以侑酒待之如初阿浩乾真小字也禄山議弃洛陽走歸范陽計未決是時天下以楊國忠驕縱召亂莫不切齒又禄山起兵以誅國忠為名王思禮密説哥舒翰使抗表請誅國忠翰不應思禮又請以三十騎劫取以來至潼關殺之翰曰如此乃翰反非禄山也或説國忠今朝廷重兵盡在翰手翰若援旗西指於公豈不危哉國忠大懼乃奏潼關大軍雖盛而後無繼萬一失利京師可憂請選監牧小兒三千於苑中訓練上許之使劒南軍將李福德等領之又募萬人屯灞上令所親杜乾運將之名為禦賊實僃翰也翰聞之亦恐為國忠所圖乃表請灞上軍􅀠潼闗六月癸未召杜乾運詣闗因事斬之國忠益懼㑹有告崔乾祐在陜兵不滿四千皆羸弱無僃上遣使趣哥舒翰進兵復陜洛翰奏曰禄山乆習用兵今始為逆豈肯無僃是必羸師以誘我若往正墮其計中且賊逺來利在速戰官軍據險以扼之利在堅守况賊殘虐失衆兵勢日蹙將有内變因而乗之可不戰擒也要在成功何必務速今諸道徵兵尚多未集請且待之郭子儀李光弼亦上言請引兵北取范陽覆其巢穴質賊黨妻子以招之賊必内潰潼闗大軍唯應固守以弊之不可輕出國忠疑翰謀已言於上以賊方無僃而翰逗留將失機㑹上以為然續遣中使趣之項背相望翰不得已撫膺慟哭丙戍引兵出闗己丑遇崔乾祐之軍於靈寶西原乾祐據險以待之南薄山北阻河隘道七十里庚寅官軍與乾祐㑹戰乾祐伏兵於險翰與田良丘浮舟中流以觀軍勢見乾祐兵少趣諸軍使進王思禮等將精兵五萬居前龐忠等將餘兵十萬繼之翰以兵三萬登河北阜望之鳴鼓以助其勢乾祐所出兵不過萬人什什伍伍散如列星或踈㦯密或前或却官軍望而笑之乾祐嚴精兵陳於其後兵旣交賊偃旗如欲遁者官軍懈不為僃須􅁷伏兵􅀤賊乗高下木石撃殺士卒甚衆道隘士卒如束槍槊不得用翰以氊車駕馬為前驅欲以衝賊日過中東風暴急乾祐以草車數十乗塞氊車之前縱火焚之煙焰所被官軍不能開目妄自相殺謂賊在煙中聚弓弩而射之日暮矢盡乃知無賊乾祐遣同羅精騎自南山過出官軍之後擊之官軍首尾駭亂不知所僃於是大敗或弃甲竄匿山谷或相擠排入河溺死囂聲振天地賊乗勝蹙之後軍見前軍敗皆自潰河北軍望之亦潰瞬息間两岸皆空翰獨與麾下百餘騎走自首陽山西度河入闗闗外先為三塹皆廣二丈深丈人馬墜其中須􅁷而滿餘衆踐之以度士卒得入闗者纔八千餘人辛卯乾祐進攻潼闗克之翰至闗西驛揭牓收散卒欲復守潼闗蕃將火拔歸仁等以百餘騎圍驛入謂翰曰賊至矣請公上馬翰上馬出驛歸仁帥衆叩頭曰公以二十萬衆一戰弃之何面目復見天子且公不見髙仙芝封常清乎請公東行翰不可欲下馬歸仁以毛縻其足於馬腹及諸將不從者皆執之以東㑹賊將田乾真巳至遂降之俱送洛陽安禄山問翰曰汝常輕我今定何如翰伏地對曰臣肉眼不識聖人今天下未平李光弼在常山李祗在東平魯炅在南陽陛下留臣使以尺書招之不日皆下矣禄山大喜以翰為司空同平章事謂火拔歸仁曰汝叛主不忠不義執而斬之翰以書招諸將皆復書責之禄山知無效乃囚諸苑中潼􅀜既敗於是河東華陰馮翊上洛防禦使皆弃郡走所在守兵皆散是日翰麾下來告急上不時召見但遣李福德等將監牧兵赴潼關及暮平安火不至上始懼壬辰召宰相謀之楊國忠自以身領劒南聞安禄山反即令副使崔圓陰具儲偫以僃有急投之至是首唱幸蜀之䇿上然之癸巳國忠集百官於朝堂惶懅流涕問以䇿略皆唯唯不對國忠曰人告禄山反狀已十年上不之信今日之事非宰相之過仗下士民驚擾奔走不知所之市里蕭條國忠使韓虢入宫勸上入蜀甲午百官朝者什無一二上御勤政樓下制云欲親征聞者皆莫之信以京兆尹魏方進為御史大夫兼置頓使京兆少尹靈昌崔光逺為京兆尹充西京留守將軍邊令誠掌宫闈管鑰託以劒南節度大使潁王璬將赴鎮令本道設儲偫是日上移仗北内既夕命龍武大將軍陳玄禮整比六軍厚賜錢帛選閑廐馬九百餘匹外人皆莫之知乙未黎明上獨與貴妃姊妹皇子妃主皇孫楊國忠韋見素魏方進陳玄禮及親近宦官宫人出延秋門妃主皇孫之在外者皆委之而去上過左藏楊國忠請焚之曰無為賊守上愀然曰賊來不得必更斂於百姓不如與之無重困吾赤子是日百官猶有入朝者至宫門猶聞漏聲三衛立仗儼然門既啓則宫人亂出中外擾攘不知上所之於是王公士民四出逃竄山谷細民爭入宫禁及王公第舍盜取金寶或乗驢上殿又焚左藏大盈庫崔光逺邊令誠帥人救火又募人攝府縣官分守之殺十餘人乃稍定光遠遣其子東見祿山令誠亦以管籥獻之上過便橋楊國忠使人焚橋上曰士庻各避賊求生柰何絶其路留内侍監高力士使撲滅乃來上遣宦者王洛卿前行告諭郡縣置頓食時至咸陽望賢宫洛卿與縣令俱逃中使徵召吏民莫有應者日向中上猶未食楊國忠自市胡餅以獻於是民爭獻糲飯雜以麥豆皇孫輩爭以手匊食之須􅁷而盡猶未能飽上皆酬其直慰勞之衆皆哭上亦掩泣有老父郭從謹進言曰禄山包藏禍心固非一日亦有詣闕告其謀者陛下往往誅之使得逞其姦逆致陛下播越是以先王務延訪忠良以廣聦明蓋為此也臣猶記宋璟為相數進直言天下頼以安平自頃以來在廷之臣以言為諱惟阿諛取容是以闕門之外陛下皆不得而知草野之臣必知有今日乆矣但九重嚴邃區區之心無路上達事不至此臣何由得睹陛下之面而訴之乎上曰此朕之不明悔無所及慰諭而遣之俄而尚食舉御膳而至上命先賜從官然後食之命軍士散詣村落求食期未時皆集而行夜將半乃至金城縣令亦逃縣民皆脱身走飲食器皿具在士卒得以自給時從者多逃内侍監袁思藝亦亡去驛中無燈人相枕藉而寢貴賤無以復辨王思禮自潼關至始知哥舒翰被擒以思禮為河西隴右節度使即令赴鎮収合散卒以俟東討丙申至馬嵬驛將士飢疲皆憤怒陳玄禮以禍由楊國忠欲誅之因東宫宦者李輔國以告太子太子未決㑹吐蕃使者二十餘人遮國忠馬訴以無食國忠未及對軍士呼曰國忠與胡虜謀反或射之中鞍國忠走至西門内軍士追殺之屠割支體以槍揭其首於驛門外并殺其子户部侍郎暄及韓國秦國夫人御史大夫魏方進曰汝曹何敢害宰相衆又殺之韋見素聞亂而出為亂兵所檛腦血流地衆曰勿傷韋相公救之得免軍士圍驛上聞諠譁問外何事左右以國忠反對上杖屨出驛門慰勞軍士令收隊軍士不應上使高力士問之玄禮對曰國忠謀反貴妃不宜供奉願陛下割恩正法上曰朕當自處之入門倚杖傾首而立乆之京兆司錄韋諤前言曰今衆怒難犯安危在晷刻願陛下速决因叩頭流血上曰貴妃常居深宫安知國忠反謀高力士曰貴妃誠無罪然將士已殺國忠而貴妃在陛下左右豈敢自安願陛下審思之將士安則陛下安矣上乃命力士引貴妃於佛堂縊殺之輿尸寘驛庭召玄禮等入視之玄禮等乃免胄釋甲頓首謝罪上慰勞之令曉諭軍士玄禮等皆呼萬嵗再拜而出於是始整部伍為行計諤見素之子也國忠妻裴柔與其㓜子晞及虢國夫人夫人子裴徽皆走至陳倉縣令薛景仙帥吏士追捕誅之丁酉上將􅀤馬嵬朝臣惟韋見素一人乃以韋諤為御史中丞充置頓使將士皆曰國忠謀反其將吏皆在蜀不可往或請之河隴或請之靈武㦯請之太原或言還京師上意在入蜀慮違衆心竟不言所向韋諤曰還京當有禦賊之僃今兵少未易東向不如且至扶風徐圖去就上詢于衆衆以為然乃從之及行父老皆遮道請留曰宫闕陛下家居陵寢陛下墳墓今捨此欲何之上為之按轡乆之乃命太子於後宣慰父老父老因曰至尊既不肯留某等願帥子弟從殿下東破賊取長安若殿下與至尊皆入蜀使中原百姓誰為之主須􅁷衆至數千人太子不可曰至尊遠冒險阻吾豈忍朝夕離左右且吾尚未面辭當還白至尊更禀進止涕泣䟦馬欲西建寜王倓與李輔國執鞚諫曰逆胡犯闕四海分崩不因人情何以興復今殿下從至尊入蜀若賊兵燒絶棧道則中原之地拱手授賊矣人情既離不可復合雖欲復至此其可得乎不如收西北守邊之兵召郭李於河北與之併力東討逆賊克復二京削平四海使社稷危而復安宗廟毁而更存掃除宫禁以迎至尊豈非孝之大者乎何必區區温凊為兒女之戀乎廣平王俶亦勸太子留父老共擁太子馬不得行太子乃使俶馳白上上揔轡待太子乆不至使人偵之還白狀上曰天也乃命分後軍二千人及飛龍廐馬從太子且諭將士曰太子仁孝可奉宗廟汝曹善輔佐之又諭太子曰汝勉之勿以吾為念西北諸胡吾撫之素厚汝必得其用太子南向號泣而巳又使送東宫内人於太子且宣旨欲傳位太子不受俶倓皆太子之子也己亥上至岐山或言賊前鋒且至上遽過宿扶風郡士卒濳懐去就往往流言不遜陳玄禮不能制上患之㑹成都貢春綵十餘萬匹至扶風上命悉陳之於庭召將士入臨軒諭之曰朕比來衰耄託任失人致逆胡亂常須遠避其鋒知卿等皆蒼猝從朕不得别父母妻子苃涉至此勞苦至矣朕甚愧之蜀路阻長郡縣褊小人馬衆多或不能供今聽卿等各還家朕獨與子孫中官前行入蜀不足自達今日與卿等訣别可共分此綵以僃資糧若歸見父母及長安父老為朕致意各好自愛也因泣下沾襟衆皆哭曰臣等死生從陛下不敢有貳上良乆曰去留聽卿自是流言始息太子既留未知所適廣平王俶曰日漸晏此不可駐衆欲何之皆莫對建寜王倓曰殿下昔嘗為朔方節度大使將吏嵗時致啓倓略識其姓名今河西隴右之衆皆敗降賊父兄子弟多在賊中或生異圖朔方道近士馬全盛裴冕衣冠名族必無貳心賊入長安方虜掠未暇徇地乗此速往就之徐圖大舉此上䇿也衆皆曰善至渭濵遇潼關敗卒誤與之戰死傷甚衆己乃收餘卒擇渭水淺處乗馬涉度無馬者涕泣而返太子自奉天北上比至新平通夜馳三百餘里士卒器械失亡過半所存之衆不過數百新平太守薛羽弃郡走太子斬之是日至安定太守徐瑴亦走又斬之庚子以劒南節度留後崔圓為劒南節度等副大使辛丑上􅀤扶風宿陳倉太子至烏氏彭原太守李遵出迎獻衣及糗糧至彭原募士得數百人是日至平涼閲監牧馬得數萬匹又募士得五百餘人軍勢稍振壬寅上至散關分扈從將士為六軍使頴王璬先行詣劒南夀王瑁等分將六軍以次之丙午上至河池郡崔圓奉表迎車駕具陳蜀土豐稔甲兵全盛上大悦即日以圓為中書侍郎同平章事蜀郡長史如故以隴西公瑀為漢中王梁州都督山南西道采訪防禦使瑀璡之弟也王思禮至平涼聞河西諸胡亂還詣行在初河西諸胡部落聞其都䕶皆從哥舒翰没於潼闗故爭自立相攻擊而都䕶實從翰在北岸不死又不與火拔歸仁俱降賊上乃以河西兵馬使周泌為河西節度使隴右兵馬使彭元耀為隴右節度使與都䕶思結進明等俱之鎮招其部落以思禮為行在都知兵馬使戊申扶風民康景龍等自相帥擊賊所署宣慰使薛揔斬首二百餘級庚戍陳倉令薛景仙殺賊守將克扶風而守之安祿山不意上遽西幸遣使止崔乾祐兵留潼闗凡十日乃遣孫孝哲將兵入長安以張通儒為西京留守崔光逺為京兆尹使安忠順將兵屯苑中以鎮關中孝哲為禄山所寵任尤用事常與嚴莊爭權禄山使監關中諸將通儒等皆受制於孝哲孝哲豪侈果於殺戮賊黨畏之禄山命搜捕百官宦者宫女等每獲數百人輒以兵衛送洛陽王矦將相扈從車駕家留長安者誅及嬰孩陳希烈以晩節失恩怨上與張均張垍等皆降於賊禄山以希烈垍為相自餘朝士皆授以官於是賊勢大熾西脅汧隴南侵江漢北割河東之半然賊將皆麤猛無遠略既克長安自以為得志日夜縱酒專以聲色寶賄為事無復西出之意故上得安行入蜀太子北行亦無追迫之患李光弼圍博陵未下聞潼闗不守解圍而南史思明踵其後光弼撃却之與郭子儀皆引兵入井陘留常山太守王俌將景城河閒團練兵守常山平盧節度使劉正臣將襲范陽未至史思明引兵逆擊之正臣大敗弃妻子走士卒死者七千餘人初真卿聞河北節度使李光弼出井陘即斂軍還平原以待光弼之命聞郭李西入井陘真卿始復區處河北軍事太子至平涼數日朔方留後杜鴻漸六城水陸運使魏少遊節度判官崔漪支度判官盧簡金鹽池判官李涵相與謀曰平凉散地非屯兵之所靈武兵食完富若迎太子至此北收諸城兵西􅀤河隴勁騎南向以定中原此萬世一時也乃使涵奉牋於太子且籍朔方士馬甲兵穀帛軍須之數以獻之涵至平涼太子大悦㑹河西司馬裴冕入為御史中丞至平涼見太子亦勸太子之朔方太子從之鴻漸暹之族子涵道之曾孫也鴻漸漪使少遊居後葺次舎庀資儲自迎太子於平涼北境説太子曰朔方天下勁兵處也今吐蕃請和回紇内附四方郡縣大抵堅守拒賊以俟興復殿下今理兵靈武按轡長驅移檄四方収攬忠義則逆賊不足屠也少遊盛治宫室帷帳皆倣禁中飲膳僃水陸秋七月辛酉太子至靈武悉命撤之甲子上至普安憲部侍郎房琯來謁見上之􅀤長安也群臣多不知至咸陽謂高力士曰朝臣誰當來誰不來對曰張均張垍父子受陛下恩最深且連戚里是必先來時論皆謂房琯宜為相而陛下不用又禄山甞薦之恐或不來上曰事未可知及琯至上問均兄弟對曰臣帥與偕來逗遛不進觀其意似有所蓄而不能言也上顧力士曰朕固知之矣即日以琯為文部侍郎同平章事初張垍尚寜親公主聽於禁中置宅寵渥無比陳希烈求解政務上幸垍宅問可為相者垍未對上曰無若愛壻垍降階拜舞既而不用故垍懷怏怏上亦覺之是時均垍兄弟及姚崇之子尚書右丞奕蕭嵩之子兵部侍郎華韋安石之子禮部侍郎陟太常少卿斌皆以才望至大官上甞曰吾命相當徧舉故相子弟耳既而皆不用裴冕杜鴻漸等上太子牋請遵馬嵬之命即皇帝位太子不許冕等言曰將士皆關中人日夜思歸所以﨑嶇從殿下逺涉沙塞者冀尺寸之功若一朝離散不可復集願殿下勉狥衆心為社稷計牋五上太子乃許之是日肅宗即位於靈武城南樓群臣舞蹈上流涕歔欷尊玄宗曰上皇天帝赦天下改元以杜鴻漸崔漪並知中書舎人事裴冕為中書侍郎同平章事改關内采訪使為節度使徙治安化以前蒲闗防禦使吕崇賁為之以陳倉令薛景仙為扶風太守兼防禦使隴右節度使郭英乂為天水太守兼防禦使時塞上精兵皆選入討賊惟餘老弱守邊文武官不滿三十人披草萊立朝廷制度草創武人驕慢大將管崇嗣在朝堂背闕而坐言笑自若監察御史李勉奏彈之繫於有司上特原之歎曰吾有李勉朝廷始尊勉元懿之曾孫也旬日間歸附者漸衆張良娣性巧慧能得上意從上來朔方時從兵單寡良娣每寢常居上前上曰禦冦非婦人所能良娣曰蒼猝之際妾以身當之殿下可從後逸去至靈武産子三日起縫戰士衣上止之對曰此非妾自養之時上以是益憐之丁卯上皇制以太子亨充天下兵馬元帥領朔方河東河北平盧節度都使南取長安洛陽以御史中丞裴冕兼左庶子隴西郡司馬劉秩試守右庶子永王璘充山南東道嶺南黔中江南西道節度都使以少府監竇紹為之傅長沙太守李峴為都副大使盛王琦充廣陵大都督領江南東路及淮南河南等路節度都使以前江陵都督府長史劉彚為之傅廣陵郡長史李成式為都副大使豐王珙充武威都督仍領河西隴右安西北庭等路節度都使以隴西太守濟陰鄧景山為之傅充都副大使應須士馬甲仗糧賜等並於當路自供其諸路本節度使虢王巨等並依前充使其署置官屬及本路郡縣官並任自簡擇署訖聞奏時􅄾珙皆不出閤惟璘赴鎮置山南東道節度領襄陽等九郡升五府經略使為嶺南節度領南海等二十二郡升五溪經略使為黔中節度領黔中等諸郡分江南為東西二道東道領餘杭西道領豫章等諸郡先是四方聞潼闗失守莫知上所之及是制下始知乗輿所在彚秩之弟也安禄山使孫孝哲殺霍國長公主及王妃駙馬等於崇仁坊刳其心以祭安慶宗凡楊國忠高力士之黨及禄山素所惡者皆殺之凡八十三人或以鐵棓揭其腦蓋流血滿街己巳又殺皇孫及郡縣主二十餘人庚午上皇至巴西太守崔渙迎謁上皇與語悦之房琯復薦之即日拜門下侍郎同平章事以韋見素為左相渙玄暐之孫也初京兆李泌幼以才敏著聞玄宗使與忠王遊忠王為太子泌已長上書言事玄宗欲官之不可使與太子為布衣交太子常謂之先生楊國忠惡之奏徙蘄春後得歸隠居潁陽上自馬嵬北行遣使召之謁見於靈武上大喜出則聯轡寢則對榻如為太子時事無大小皆咨之言無不從至於進退將相亦與之議上欲以泌為右相泌固辭曰陛下待以賔友則貴於宰相矣何必屈其志上乃止同羅突厥從安祿山反者屯長安苑中甲戍其酋長阿史那從禮帥五千騎竊廄馬二千匹逃歸朔方謀邀結諸胡盜據邊地上遣使宣慰之降者甚衆賊遣兵冦扶風薛景仙擊却之安禄山遣其將高嵩以敕書繒綵誘河隴將士大震闗使郭英乂擒斬之同羅突厥之逃歸也長安大擾官吏竄匿獄囚自出京兆尹崔光逺以為賊且遁矣遣吏卒守孫孝哲宅孝哲以狀白禄山光逺乃與長安令蘇震帥府縣官十餘人來奔己卯至靈武上以光逺為御史大夫兼京兆尹使之渭北招集吏民以震為中丞震瓌之孫也禄山以田乾真為京兆尹侍御史吕諲右拾遺楊綰奉天令安平崔器相繼詣靈武以諲器為御史中丞綰為起居舎人知制誥上命河西節度副使李嗣業將兵五千赴行在嗣業與節度使梁宰謀且緩師以觀變綏德府折衝叚秀實讓嗣業曰豈有君父告急而臣子晏然不赴者乎特進常自謂大丈夫今日視之乃兒女子耳嗣業大慙即白宰如數發兵以秀實自副將之詣行在上又徵兵於安西行軍司馬李栖筠􅀤精兵七千人勵以忠義而遣之敕改扶風為鳳翔郡庚辰上皇至成都從官及六軍至者千三百人而巳令狐潮圍張廵於雍丘相守四十餘日朝廷聲問不通潮聞玄宗已幸蜀復以書招巡有大將六人官皆開府特進白巡以兵勢不敵且上存亡不可知不如降賊巡陽許諾明日堂上設天子畫像帥將士朝之人人皆泣巡引六將於前責以大義斬之士心益勸城中矢盡巡縳藁為人千餘被以黑衣夜縋城下潮兵爭射之乆乃知其藁人得矢數十萬其後復夜縋人賊笑不設僃乃以死士五百斫潮營潮軍大亂焚壘而遁追奔十餘里潮慙益兵圍之巡使郎將雷萬春於城上與潮相聞語未絶賊弩射之面中六矢而不動潮疑其木人使諜問之乃大驚遥謂巡曰向見雷將軍方知足下軍令矣然其如天道何巡謂之曰君未識人倫焉知天道未幾出戰擒賊將十四人斬首百餘級賊乃夜遁收兵入陳留不敢復出頃之賊步騎七千餘衆屯白沙渦巡夜襲撃大破之還至桃陵遇賊救兵四百餘人悉擒之分别其衆媯檀及胡兵悉斬之滎陽陳留脅從兵皆散令歸業旬日閒民去賊來歸者萬餘戸河北諸郡猶為唐守常山太守王俌欲降賊諸將怒因擊毬縱馬踐殺之時信都太守烏承恩麾下有朔方兵三千人諸將遣使者宗仙運帥父老詣信都迎承恩鎮常山承恩辭以無詔命仙運說承恩曰常山地控燕薊路通河洛有井陘之險足以扼其咽喉頃屬車駕南遷李大夫收軍退守晉陽王太守權統後軍欲舉城降賊衆心不從身首異處大將軍兵精氣肅遠近莫敵若以家國為念移據常山與大夫首尾相應則洪勲盛烈孰與為比若疑而不行又不設僃常山旣陷信都豈能獨全承恩不從仙運又曰將軍不納鄙夫之言必懼兵少故也今人不聊生咸思報國競相結聚屯據鄉村若懸賞招之不旬日十萬可致與朔方甲士三千餘人相參用之足成王事若捨要害以授人居四通而自安譬如倒持劒㦸取敗之道也承恩竟疑不決承恩承玼之族兄也是月史思明蔡希德將兵萬人南攻九門旬日九門偽降伏甲於城上思明登城伏兵攻之思明墜城鹿角傷其左脅夜奔博陵顔真卿以蠟丸達表於靈武以真卿為工部尚書兼御史大夫依前河北招討采訪處置使并致赦書亦以蠟丸達之真卿頒下河北諸郡又遣人頒於河南江淮由是諸道始知上即位於靈武徇國之心益堅矣郭子儀等將兵五萬自河北至靈武靈武軍威始盛人有興復之望矣八月壬午朔以子儀為武部尚書靈武長史以李光弼為户部尚書北都留守並同平章事餘如故光弼以景城河閒兵五千赴太原先是河東節度使王承業軍政不修朝廷遣侍御史崔衆交其兵尋遣中使誅之衆侮易承業光弼素不平至是敕交兵於光弼衆見光弼不為禮又不時交兵光弼怒收斬之軍中股栗回紇可汗吐蕃贊普相繼遣使請助國討賊宴賜而遣之癸未上皇下制赦天下北海太守賀蘭進明遣録事參軍第五􅄾入蜀奏事􅄾言於上皇以為今方用兵財賦為急財賦所産江淮居多乞假臣一職可使軍無乏用上皇悦即以􅄾為監察御史江淮租庸使史思明再攻九門辛卯克之所殺數千人引兵東圍藁城李庭望將蕃漢二萬餘人東襲寜陵襄邑夜去雍丘城三十里置營張巡帥短兵三千掩擊大破之殺獲太半庭望收軍夜遁癸巳靈武使者至蜀上皇喜曰吾兒應天順人吾復何憂丁酉制自今改制敕為誥表䟽稱太上皇四海軍國事皆先取皇帝進止仍奏朕知俟克復上京朕不復預事己亥上皇臨軒命韋見素房琯崔渙奉傳國寶玉冊詣靈武傳位辛丑史思明陷藁城初上皇每酺宴先設太常雅樂坐部立部繼以鼔吹胡樂教坊府縣散樂雜戯又以山車陸船載樂往來又出宫人舞霓裳羽衣又教舞馬百匹銜盃上夀又引犀象入􅂣或拜或舞安禄山見而悦之旣克長安命搜捕樂工運載樂器舞衣驅舞馬犀象皆詣洛陽臣光曰聖人以道德為麗仁義為樂故雖茅茨土階惡衣菲食不恥其陋惟恐奉養之過以勞民費財明皇恃其承平不思後患殫耳目之玩窮聲技之巧自謂帝王富貴皆不我如欲使前莫能及後無以踰非徒娛己亦以誇人豈知大盜在旁巳有窺窬之心卒致鑾輿播越生民塗炭乃知人君崇華靡以示人適足為大盜之招也祿山宴其羣臣於凝碧池盛奏衆樂梨園弟子往往歔欷泣下賊皆露刃睨之樂工雷海清不勝悲憤擲樂器於地西向慟哭禄山怒縛於試馬殿前支解之禄山聞嚮日百姓乗亂多盜庫物旣得長安命大索三日并其私財盡掠之又令府縣推按銖兩之物無不窮治連引搜捕支蔓無窮民閒騷然益思唐室自上離馬嵬北行民閒相傳太子北收兵來取長安長安民日夜望之或時相驚曰太子大軍至矣則皆走市里為空賊望見北方塵起輒驚欲走京畿豪傑往往殺賊官吏遥應官軍誅而復起相繼不絶賊不能制其始自京畿鄜坊至于岐隴皆附之至是西門之外率為敵壘賊兵力所及者南不出武關北不過雲陽西不過武功江淮奏請貢獻之蜀之靈武者皆自襄陽取上津路抵扶風道路無壅皆薛景仙之功也九月壬子史思明圍趙郡丙辰㧞之又圍常山旬日城陷殺數千人建寜王倓性英果有才略從上自馬嵬北行兵衆寡弱屢逢冦盜倓自選驍勇居上前後血戰以衛上上或過時求食倓悲泣不自勝軍中皆屬目向之上欲以倓為天下兵馬元帥使統諸將東征李泌曰建寜誠元帥才然廣平兄也若建寜功成豈可使廣平為吳太伯乎上曰廣平􅃁嗣也何必以元帥為重泌曰廣平未正位東宫今天下艱難衆心所屬在於元帥若建寜大功既成陛下雖欲不以為儲副同立功者其肯已乎太宗上皇即其事也上乃以廣平王俶為天下兵馬元帥諸將皆以屬焉倓聞之謝泌曰此固倓之心也上與泌出行軍軍士指之竊言曰衣黄者聖人也衣白者山人也上聞之以告泌曰艱難之際不敢相屈以官且衣紫袍以絶羣疑泌不得巳受之服之入謝上笑曰旣服此豈可無名稱出懷中敕以泌為侍謀軍國元帥府行軍長史泌固辭上曰朕非敢相臣以濟艱難耳俟賊平任行高志泌乃受之置元帥府於禁中俶入則泌在府泌入俶亦如之泌又言於上曰諸將畏憚天威在陛下前敷陳軍事或不能盡所懷萬一小差為害甚大乞先令與臣及廣平熟議臣與廣平從容奏聞可者行之不可者巳之上許之時軍旅務繁四方奏報自昬至曉無虚刻上悉使送府泌先開視有急切者及烽火重封隔門通進餘則待明禁門鑰契悉委俶與泌掌之阿史那從禮説誘九姓府六胡州諸胡數萬衆聚於經略軍北將冦朔方上命郭子儀詣天德軍􅀤兵討之左武鋒使僕固懷恩之子玢别將兵與虜戰兵敗降之旣而復逃歸懷恩叱而斬之將士股栗無不一當百遂破同羅上雖用朔方之衆欲借兵於外夷以張軍勢以􅃎王守禮之子承宷為敦煌王與僕固懷恩使于回紇以請兵又發拔汗那兵且使轉諭城郭諸國許以厚賞使從安西兵入援李泌勸上且幸彭原俟西北兵將至進幸扶風以應之於時庸調亦集可以贍軍上從之戊辰發靈武内侍邊令誠復自賊中逃歸上斬之丙子上至順化韋見素等至自成都奉上寶冊上不肯受曰比以中原未靖權揔百官豈敢乗危遽為傳襲羣臣固請上不許寘寶冊於别殿朝夕事之如定省之禮上以韋見素本附楊國忠意薄之素聞房琯名虚心待之琯見上言時事辭情慷慨上為之改容由是軍國事多謀於琯琯亦以天下為己任知無不為專決於胷臆諸相拱手避之上皇賜張良娣七寶鞍李泌言於上曰今四海分崩當以儉約示人良娣不宜乗此請撤其珠玉付庫吏以俟有戰功者賞之良娣自閤中言曰鄰里之舊何至如是上曰先生為社稷計也遽命撤之建寜王倓泣於廊下聲聞於上上驚召問之對曰臣比憂禍亂未巳今陛下從諫如流不日當見陛下迎上皇還長安是以喜極而悲耳良娣由是惡泌及倓上甞從容與泌語及李林甫欲敕諸將克長安發其􅃁焚骨􅀭灰泌曰陛下方定天下柰何讎死者彼枯骨何知徒示聖德之不弘耳且方今從賊者皆陛下之讎也若聞此舉恐阻其自新之心上不悦曰此賊昔日百方危朕當是時朕不保朝夕朕之全特天幸耳林甫亦惡卿但未及害卿而死耳柰何矜之對曰臣豈不知所以言者上皇有天下向五十年太平娛樂一朝失意逺處巴蜀南方地惡上皇春秋高聞陛下此敕意必以為用韋妃之故内慙不懌萬一感憤成疾是陛下以天下之大不能安君親言未畢上流涕被面降階仰天拜曰朕不及此是天使先生言之也遂抱泌頸泣不已它夕上又謂泌曰良娣祖母昭成太后之妹也上皇所念朕欲使正位中宫以慰上皇心何如對曰陛下在靈武以群臣望尺寸之功故踐大位非私己也至於家事宜待上皇之命不過晚嵗月之閒耳上從之南詔乗亂陷越嶲㑹同軍據清溪關尋傳驃國皆降之資治通鑑卷第二百一十八
