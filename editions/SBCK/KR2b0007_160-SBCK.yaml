front:
  text: 繹爲荆州刺史有微過續代之以状聞自此二王不通書問繹聞其死入閤而躍屧爲之破
  hash: sha256:3c021b22ca8ae57098a8ae66efd9bcecf2f90f094eac62227badb2cf06d86df7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0007_SBCK_159-13b}
body:
  text: 丙午東魏勃海獻武王歡卒歡性深宻終日儼然人不能測機權之際變化􅀂神制馭軍旅法令嚴肅聽斷明察不可欺犯擢人受任在於得才苟其所堪無問厮養有虚聲無實者皆不任用雅尚儉素刀劒鞍勒無金玉之飾少能劇飲自當大任不過三爵知人好士全護勲舊毎􅀗敵國盡節之臣多不之罪由是文武樂爲之用丗子澄祕不發喪唯行臺左丞陳元康知之矦景自念巳與髙氏有隙内不自安辛亥據河南叛歸于魏潁州刺史司馬丗雲以城應之景誘執豫州刺史髙元成襄州刺史李密廣州刺史懐朔暴􅂋等遣軍士二百人載仗暮入西兖州欲襲取之刺史邢子才覺之掩捕盡獲之因散檄東方諸州各爲之備由是景不能取諸􅀅皆以為景之叛由崔暹澄不得巳欲殺暹以謝景陳元康諌曰今雖四海未清綱紀已定􅀂以數􅀅在外苟恱其心枉殺無辜虧廢刑典豈直上負天神何以下安黎庶晁錯前事願公愼之澄乃止遣司空韓軌督諸軍討景辛酉上祀南郊大赦甲子祀明堂二月魏詔自今應宫刑者直没官勿刑魏以開府儀同三司若干惠爲司空矦景爲太􅀓河南大行臺上谷公庚辰景又遣其行臺郎中丁和來上表言臣與髙澄有隙請舉函谷以東瑕丘以西豫廣潁荆襄兖南兖濟東豫洛陽北荆北􅀭等十三州内附惟青徐數州僅須折簡且黄河以南皆臣所職易同反掌􅀂齊宋一平徐事燕趙上召羣臣廷議尚書僕射謝舉等皆曰頃嵗與魏通和邊境無事今納其叛臣竊謂非冝上曰雖然得景則塞北可清機㑹難得豈冝膠柱是歳正月乙夘上夢中原牧守皆以地來降舉朝稱􅂟旦見中書舎人朱异告之旦曰吾爲人少夢􅀂有夢必實异曰此乃宇内混壹之兆也及丁和至稱景定計以正月乙卯上愈神之然意猶未決甞獨言我國家如金甌無一傷鈌今忽受景地詎是事冝脱致紛紜悔之何及朱异揣知上意對曰聖明御宇南北歸仰正以事無機㑹未逹其心今矦景分魏土之半以來自非天誘其􅂨人賛其謀何以至此􅀂拒而不内恐絶後來之望此誠易見願陛下無疑上乃定議納景􅩐午以景爲大將軍封河南王都督河南北諸軍事大行臺承制如鄧禹故事平西諮議參軍周弘正善占􅀱前此謂人曰國家數年後當有兵起及聞納景曰亂階在此矣丁亥上耕藉田三月庚子上幸同泰寺捨身如大通故事甲辰遣司州刺史羊鴉仁督兖州刺史􅁊和仁州刺史湛海珍等將兵三萬趣懸瓠運糧食應接矦景魏大赦東魏髙澄慮諸州有變乃自出廵撫留叚韶守􅀳陽委以軍事以丞相功曹趙彦􅀷爲大行臺都官郎中使陳元康豫作丞相歡條敎數十紙付韶及彦􅀷在後以次行之臨發握彦􅀷手泣曰以母弟相託幸明此心夏四月壬申澄入朝于鄴東魏主與之宴澄起舞識者知其不終丙子羣臣奉贖丁亥上還宫大赦攺元如大通故事甲午東魏遣兼散􅀐常侍李系來聘系繪之弟也五月丁酉朔東魏大赦戊戌東魏以襄城王旭爲太尉髙澄遣武衛將軍元柱等將數萬衆晝夜兼行以襲矦景遇景於潁川北柱等大敗景以羊鴉仁等軍猶未至乃退保潁川甲辰東魏以開府儀同三司庫狄干爲太師録尚書事孫騰爲太傅汾州刺史賀拔仁爲太保司徒髙隆之録尚書事司空韓軌爲司徒青州刺史尉景爲大司馬領軍將軍可朱渾道元爲司空僕射髙洋爲尚書令領中書監徐州刺史慕容紹宗爲尚書左僕射髙陽王斌爲右僕射戊午尉景卒韓軌等圍矦景於潁川景懼割東荆北兖州魯陽長社四城賂魏以求救尚書左僕射于謹曰景少習兵姦詐難測不如厚其爵位以觀其變未可遣兵也荆州刺史王思政以爲􅀂不因機進取後悔無及即以荆州歩􅀐萬餘從魯陽􅀜向陽翟丞相泰聞之加景大將軍兼尚書令遣太尉李弼儀同三司趙貴將兵一萬赴潁川景恐上責之遣中兵參軍柳昕奉啓於上以爲王旅未接死亡交急遂求援􅀜中自救目前臣旣不安於髙氏豈見容於宇文但螫手解腕事不得巳本圖爲國願不賜咎臣􅀗其力不容即棄今以四州之地爲餌敵之資巳令宇文遣人入守自豫州以東齊海以西悉臣控壓見有之地盡歸聖朝懸瓠項城徐州南兖事須迎納願陛下速敇境上各置重兵與臣影響不使差互上報之曰大夫出境尚有所專况始創竒謀將建大業理須適事而行隨方以應卿誠心有本何假詞費魏以開府儀同三司獨孤信爲大司馬六月戊辰以鄱陽王範爲征北將軍揔督漢北征討諸軍事撃穰城東魏韓軌等圍潁川聞魏李弼趙貴等將至已巳引兵還鄴矦景欲因㑹執弼與貴奪其軍貴疑之不往貴欲誘景入營而執之弼止之羊鴉仁遣長史鄧鴻將兵至汝水弼引兵還長安王思政入據潁川景陽稱略地引軍出屯懸瓠景復乞兵於魏丞相泰使同軌防主韋法保及都督賀蘭願德等將兵助之大行臺左丞藍田王恱言於泰曰矦景之於髙􅂬始敦郷黨之情終定君臣之契任居上將位重台司今􅂬始死景遽外叛蓋所圖甚大終不爲人下故也且彼旣能背德於髙氏豈肯盡節於朝廷今益之以􅀔援之以兵竊恐朝廷貽笑將來也泰乃召景入朝景隂謀叛魏事計未成厚撫韋法保等冀爲已用外示親密無猜閒毎往來諸軍閒侍從至少魏軍中名將皆身自造詣同軌防長史裴寛謂法保曰矦景狡詐必不肯入􅀜欲託欵於公恐未可信􅀂伏兵斬之此亦一時之功也如其不爾即應􅀷爲之防不得信其誑誘自貽後悔法保􅀷然之不敢圖景但自爲備而巳尋辭還所鎮王思政亦覺其詐密召賀蘭願德等還分布諸軍據景七州十二鎮景果辭不入朝遺丞相泰書曰吾恥與髙澄鴈行安能比肩大弟泰乃遣行臺郎中趙士憲悉召前後所遣諸軍援景者景遂决意來降魏將任約以所部千餘人降於景泰以所授景使持節太􅀓大將軍兼尚書令河南大行臺都督河南諸軍事回授王思政思政並讓不受頻使敦諭唯受都督河南諸軍事髙澄將如晋陽以弟洋爲京畿大都督留守於鄴使黄門侍郎髙德政佐之德政顥之子也丁丑澄還􅀳陽始發喪秋七月魏長樂武烈公􅀂干惠卒丁酉東魏主爲丞相􅂬舉哀服緦縗凶禮依漢霍光故事贈相國齊王備九錫殊禮戊戍以髙澄爲使持節大丞相都督中外諸軍録尚書事大行臺勃海王澄啓辭爵位壬寅詔太原公洋攝理軍國遣中使敦諭澄庚申羊鴉仁入懸瓠城甲子詔更以懸瓠爲豫州壽春爲南豫州合肥爲合州以鴉仁爲司豫二州刺史鎮懸瓠西陽太守羊思逹爲殷州刺史鎮項城八月乙丑下詔大舉伐東魏遣南豫州刺史貞陽矦淵明南兖州刺史南康王㑹理分督諸將淵明懿之子㑹理績之子也始上欲以鄱陽王範爲元帥朱异取急在外聞之遽入曰鄱陽雄豪盖丗得人死力然所至殘􅁀非弔民之材且陛下昔登北顧亭以望謂江右有反氣骨肉爲戎首今日之事尤冝詳擇上黙然曰㑹理何如對曰陛下得之矣㑹理懦而無謀所乗襻輿施版屋冠以牛皮上聞不恱貞陽矦淵明時鎮壽陽屢請行上許之㑹理自以皇孫復爲都督自淵明已下殆不對接淵明與諸將密告朱异追㑹理還遂以淵明爲都督辛未髙澄入朝于鄴固辭大丞相詔爲大將軍如故餘如前命甲申虚葬齊獻武王於漳水之西潜鑿成安鼔山石窟佛頂之旁爲穴納其柩而塞之殺其羣匠及齊之亡也一匠之子知之發石取金而逃戊子武州刺史蕭弄璋攻東魏磧泉吕梁二戍拔之或告東魏大將軍澄云矦景有北歸之志㑹景將蔡道遵北歸言景頗知悔過景母及妻子皆在鄴澄乃以書諭之語以闔門無恙􅀂還許以豫州刺史終其身還其寵妻愛子所部文武更不追攝景使王偉復書曰今巳引二􅀖揚旌北討熊豹齊奮克復中原幸自取之何勞恩賜昔王陵附漢母在不歸太上囚楚乞羮自􅀂矧伊妻子而可介意脱謂誅之有益欲止不能殺之無損徒復阬戮家累在君何關僕也戊子詔以景錄行臺尚書事東魏静帝羙容儀旅力過人能挾石師子踰宫牆射無不中好文學從容沈雅時人以爲有孝文風烈大將軍澄􅀷忌之始獻武王自病逐君之醜事静帝禮甚恭事無大小必以聞可否聽㫖毎侍宴俯伏上壽帝設法㑹乗輦行香歡執香爐歩從鞠躬屏氣承望顔色故其下奉帝莫敢不恭及澄當國倨慢頓甚使中書黄門郎崔季舒察帝動静大小皆令季舒知之澄與季舒書曰癡人比復何似癡􅀔小差未宜用心檢校帝甞獵于鄴東馳逐如飛監衞都督烏那羅受工從伐後呼曰天子勿走馬大將軍嗔澄甞侍飲酒舉大觴屬帝曰臣澄勸陛下酒帝不勝忿曰自古無不亡之國朕亦何用此生爲澄怒曰朕朕狗脚朕使崔季舒敺帝三拳奮衣而出明日澄使季舒入勞帝帝亦謝焉賜季舒絹百匹帝不堪憂辱詠謝靈運詩曰韓亡子房奮秦帝魯連恥本自江海人忠義動君子常侍侍講潁川荀濟知帝意乃與祠部郎中元瑾長秋卿劉思逸華山王大器淮南王宣洪濟北王徽等謀誅澄大器鷙之子也帝謬爲敇問濟曰欲以何日開講乃詐於宫中作土山開地道向北城至千秋門門者覺地下響以告澄澄勒兵入宫見帝不拜而坐曰陛下何意反臣父子功存社稷何負陛下邪此必左右妃嬪輩所爲欲殺胡夫人及李嬪帝正色曰自古唯聞臣反君不聞君反臣王自欲反何乃責我我殺王則社稷安不殺則滅亡無日我身且不暇惜況於妃嬪必欲弑逆緩速在王澄乃下牀叩頭大啼謝罪於是酣飲夜乆乃出居三日幽帝於含章堂壬辰烹濟等於市初濟少居江東愽學能文與上有布衣之舊知上有大志然負氣不服常謂人曰㑹於盾􅈹上磨墨檄之上甚不平及即位或薦之於上上曰人雖有才亂俗好反不可用也濟上書諌上崇信佛法爲塔寺奢費上大怒欲集朝衆斬之朱异密告之濟逃奔東魏澄爲中書監欲用濟爲侍讀獻武王曰我愛濟欲全之故不用濟濟入宫必敗澄固請乃許之及敗侍中楊遵彦謂之曰衰暮何苦復爾濟曰壯氣在耳因下辨曰自傷年紀摧頹功名不立故欲挾天子誅權臣澄欲宥其死親問之曰荀公何意反濟曰奉詔誅髙澄何謂反有司以濟老病鹿車載詣東市并焚之澄疑諮議温子昇知瑾等謀方使之作獻武王碑旣成餓於􅀳陽獄食弊􅃭而死棄尸路隅没其家口太尉長史宋遊道收葬之澄謂遊道曰吾近書與京師諸貴論及朝士以卿僻於朋黨將爲一病今乃知卿眞是重故舊尚節義之人天下人代卿怖者是不知吾心也九月辛丑澄還􅀳陽上命蕭淵明堰泗水於寒山以灌彭城俟得彭城乃進軍與矦景掎角癸卯淵明軍于寒山去彭城十八里斷流立堰侍中羊侃監作堰再旬而成東魏徐州刺史太原王則嬰城固守侃勸淵明乗水攻彭城不從諸將與淵明議軍事淵明不能對但云臨時制冝冬十一月魏丞相泰從魏主狩于􅄮陽東魏大將軍澄使大都督髙岳救彭城欲以金門郡公潘樂爲副陳元康曰樂緩於機變不如慕容紹宗且先王之命也公但推赤心於斯人景不足憂也時紹宗在外澄欲召見之恐其驚叛元康曰紹宗知元康特蒙顧待新使人來餉金元康欲安其意受之而厚荅其書保無異也乙酉以紹宗爲東南道行臺與岳樂偕行􅀄景聞韓軌來曰噉猪腸兒何能爲聞髙岳來曰兵精人凡諸將無不爲所輕者及聞紹宗來叩鞍有懼色曰誰教鮮卑兒解遣紹宗來􅀂然髙王定未死邪澄以廷尉卿杜弼爲軍司攝行臺左丞臨發問以政事之要可爲戒者使録一二條弼請口陳之曰天下大務莫過賞罰賞一人使天下之人喜罰一人使天下之人懼苟二事不失自然盡美澄大恱曰言雖不多於理甚要紹宗帥衆十萬據槖駝峴羊侃勸貞陽矦淵明乗其逺來擊之不從旦日又勸出戰亦不從侃乃帥所領出屯堰上丙午紹宗至城下引步􅀐萬人攻潼州刺史郭鳯營矢下如雨淵明醉不能起命諸將救之皆不敢出北兖州刺史胡貴孫謂譙州刺史趙伯超曰吾屬將兵而來本欲何爲今遇敵而不戰乎伯超不能對貴孫獨帥麾下與東魏戰斬首二百級伯超擁衆數千不敢救謂其下曰虜盛如此與戰必敗不如全軍早歸可以免罪皆曰善遂遁還􅀄矦景常戒梁人曰逐北勿過二里紹宗將戰以梁人輕悍恐其衆不能支一一引將卒謂之曰我當陽退誤吴兒使前爾擊其背東魏兵實敗走梁人不用景言乗勝􅀷入魏將卒以紹宗之言爲信爭共掩擊之梁兵大敗貞陽矦淵明及胡貴孫趙伯超等皆爲東魏所虜失亡士卒數萬人羊侃結陳徐還上方晝寢宦者張僧􅅌白朱异啓事上駭之遽起升輿至文德殿閤异曰寒山失律上聞之怳然將墜牀僧􅅌扶而就坐乃歎曰吾得無復爲􅀳家乎郭鳯退保潼州慕容紹宗進圍之十二月甲子朔鳯弃城走東魏使軍司杜弼作檄移梁朝曰皇家垂統光配彼天唯彼吴越獨阻聲敎元首懐止戈之心上宰薄兵車之命遂解縶南冠喻以好睦雖嘉謀長筭爰自我始罷戰息民彼􅀗其利矦景豎子自生猜貳逺託關隴依慿姦僞逆主定君臣之分僞相結兄弟之親豈曰無恩終成難養俄而易慮親㝷干戈釁􅁀惡盈側首無託以金陵逋逃之藪江南流寓之地甘辭卑禮進孰圖身詭言浮説抑可知矣而僞朝大小幸災忘義主荒於上臣蔽於下連結姦惡斷絶鄰好徴兵保境縱盜侵國蓋物無定方事無定􅀔或乗利而受害或因得而更失是以吳侵齊境遂得句踐之師趙納韓地終有長平之役矧乃鞭撻疲民侵軼徐部築壘擁川舎舟徼利是以援枹秉麾之將拔拒投石之士含怒作色如赴私讎彼連營擁衆依山傍水舉螳蜋之斧被蛣蜣之甲當窮轍以待輪坐積薪而􅀱燎及鋒刃暫交埃塵且接巳亡㦸弃戈土崩瓦解掬指舟中衿甲鼓下同宗異姓縲紲相望曲直旣殊彊弱不等獲一人而失一國見黄雀而忘􅀷穽智者所不爲仁者所不向誠旣往之難逮猶將來之可追矦景以鄙俚之夫遭風雲之㑹位班三事邑啓萬家揣身量分久當止足而周章向背離披不巳夫豈徒然意亦可見彼乃授之以利器誨之以慢藏使其􅀔得容姦時堪乗便今見南風不競天亡有徴老賊姦謀將復作矣然推堅彊者難爲功摧枯朽者易爲力計其雖非孫吳猛將燕趙精兵猶是乆涉行陳曽習軍旅豈同剽輕之師不比危脆之衆拒此則作氣不足攻彼則爲􅀔有餘終恐尾大於身踵麤於股倔彊不掉狼戾難馴呼之則反速而舋小不徴則叛遲而禍大㑹應遥望廷尉不肯爲臣自據淮南亦欲稱帝但恐楚國亡猨禍延林木城門失火殃及池魚横使江淮士子荆揚人物死亡矢石之下夭折霧露之中彼梁主操行無聞輕險有素射雀論功蕩舟稱力年旣老矣耄又及之政散民流禮崩樂壊加以用舎乖方廢立失所矯情動俗飾智驚愚毒螫滿懐妄敦戒業躁競盈胷謬治清淨災異降於上怨讟興於下人人厭苦家家思亂履霜有漸堅冰且至傳險躁之風俗任輕薄之子孫朋黨路開兵􅁠在外必将禍生骨肉舋起腹心彊弩衝城長戈指闕徒􅊥雀鷇無救府藏之虚空請熊蹯詎延晷刻之命外崩中潰今實其時鷸蚌相持我乗其敝方使駿􅀐追風精甲輝日四七並列百萬爲羣以轉石之形爲破竹之􅀔當使鍾山渡江青蓋入洛荆􅁄生於建業之宫麋鹿遊於姑蘓之館但恐革車之所轥轢劎􅀐之所蹂踐􅂎梓於焉傾折竹箭以此摧殘􅀂吳之王孫蜀之公子歸欵軍門委命下吏當即授客卿之秩特加驃􅀐之號凡百君子勉求多福其後梁室禍敗皆如弼言矦景圍譙城不下退攻城父抜之壬申遣其行臺左丞王偉等詣建康説上曰鄴中文武合謀召臣共討髙澄事泄澄幽元善見於金墉殺諸元六十餘人河北物情俱念其主請立元氏一人以從人望如此則陛下有繼絶之名臣景有立功之效河之南北爲聖朝之邾莒國之男女爲大梁之臣妾上以爲然乙亥下詔以太子舎人元貞爲咸陽王資以兵力使還北主魏須度江許即位儀衞以乗輿之副給之貞樹之子也蕭淵明至鄴東魏主升閶闔門受俘讓而釋之送於􅀳陽大將軍澄待之甚厚慕容紹宗引軍擊矦景輜重數千兩馬數千匹士卒四万人退保渦陽紹宗士卒十万旗甲耀日鳴鼔長驅而進景使謂之曰公等爲欲送客爲欲定雌雄邪紹宗曰欲與公决勝􅀒遂順風布陳景閉壘俟風止乃出紹宗曰矦景多詭計好乗人背使備之果如其言景命戰士皆被短甲執短刀入東魏陳但低視斫人脛馬足東魏兵遂敗紹宗墜馬儀同三司劉豐被傷顯州刺史張遵業爲景所擒紹宗豐生俱奔譙城禆將斛律光張恃顯尤之紹宗曰吾戰多矣未見如景之難者也君軰試犯之光等􅀍甲將出紹宗戒之曰勿度渦水二人軍於水北光輕􅀐射之景臨渦水謂光曰爾求勲而來我懼死而去我汝之父友何爲射我汝豈自解不度水南慕容紹宗教汝也光無以應景使其徒田遷射光馬洞胷光易馬隱樹又中之退入於軍景擒恃顯旣而捨之光走入譙城紹宗曰今定何如而尤我也光金之子也開府儀同三司叚韶夹渦而軍潛於上風縱火景帥􅀐入水出而却走草濕火不復然魏岐州久經喪亂刺史鄭穆􅀄到有户三千穆撫循安集數年之間至四萬餘户考績爲諸州之最丞相泰擢穆爲京兆尹矦景與東魏慕容紹宗相持數月景食盡司馬世雲降於紹宗資治通鑑卷第一百六十梁武帝
