front:
  text: 資治通鑑卷第一百五十五
  hash: sha256:aa770813aeea513399db08881515216a1696657da5c18e24dfaffe3a0b987b69
body:
  text: 臣司馬光奉勑編集梁紀十一玄黓困敦凡二年起重光大淵獻盡髙祖武皇帝十一中大通三年春正月辛巳上祀南郊大赦魏尚書右僕射鄭先護聞洛陽不守士衆逃散遂來奔丙申以先護爲征北大將軍二月辛丑上祀明堂魏自敬宗被囚宫室空近百日爾朱世隆鎭洛陽商旅流通盜賊不作世隆兄弟密議以長廣王踈逺又無人望欲更立近親儀同三司廣陵王㳟羽之子也好學有志度正光中領給事黃門侍郎以元义擅權託瘖病居龍華佛寺無所交通永安末有白敬宗言王陽瘖將有異志㳟懼逃於上洛山洛州刺史執送之繫治乆之以無狀獲免􅀜西大行臺郎中薛孝通􅀃爾朱天光曰廣陵王髙祖猶子夙有令望沈晦不言多歷年所若奉以爲主必天人允叶天光與丗隆等謀之疑其實瘖使爾朱彦伯潛往敦諭且脅之㳟乃曰天何言哉世隆等大喜孝通聦之子也己巳長廣王至邙山南丗隆等爲之作禪文使泰山太守遼西竇瑗執鞭獨入啓長廣王曰天人之望皆在廣陵願行堯舜之事遂署禪文廣陵王奉表三讓然後即位大赦改元普泰黃門侍郎邢子才爲赦文叙敬宗枉殺太原王榮之狀節閔帝曰永安手翦彊臣非爲失德直以天未厭亂故逢成濟之禍耳因顧左右取筆自作赦文直言門下朕以寡德運屬樂推思與億兆同兹大慶肆眚之科一依常式帝閉口八年至是乃言中外欣然以爲明主望至太平庚午詔以三皇稱皇五帝稱帝三代稱王蓋遞爲沖挹自秦以來競稱皇帝予今但稱帝亦已襃矣加爾朱丗隆儀同三司贈爾朱榮相國􅀳王加九錫丗隆使百官議榮配饗司直劉季明曰若配丗宗於時無功若配孝明親害其母若配莊帝爲臣不終以此論之無所可配丗隆怒曰汝應死季明曰下官旣爲議首依禮而言不合聖心翦戮唯命丗隆亦不之罪以榮配髙祖廟廷又爲榮立廟於首陽山因周公舊廟而爲之以爲榮功可比周公廟成尋爲火所焚爾朱兆以不預廢立之謀大怒欲攻丗隆丗隆使爾朱彦伯往諭之乃止初敬宗使安東將軍史仵龍平北將軍陽文義各領兵三千守太行嶺侍中源子㳟鎭河内及爾朱兆南向仵龍文義帥衆先降由是子㳟之軍望風亦潰兆遂乗勝直入洛陽至是爾朱丗隆論仵龍文義之功各封千戸矦魏主曰仵龍文義於王有功於國無勲竟不許爾朱仲逺鎭滑臺表用其下都督爲西兖州刺史先用後表詔荅曰已能近補何勞逺聞爾朱天光之滅万俟醜奴也始獲波斯所獻師子送洛陽及節閔帝即位詔曰禽獸囚之則違其性命送歸本國使者以波斯道逺不可逹於路殺之而返有司劾違㫖帝曰豈可以獸而罪人遂赦之魏鎭逺將軍清河崔祖螭等聚青州七郡之衆圍東陽旬日之間衆十餘萬刺史東萊王貴平帥城民固守使太傅諮議參軍崔光伯出城慰勞其兄光韶曰城民陵縱日乆衆怒甚盛非慰諭所能解家弟往必不全貴平彊之旣出外人射殺之幽安營并四州行臺劉靈助自謂方術可以動人又推筭知爾朱氏將衰乃起兵自稱燕王開府儀同三司大行臺聲言爲敬宗復讎且妄述圖䜟云劉氏當王由是幽瀛滄兾之民多從之從之者夜舉火爲號不舉火者諸村共屠之引兵南至愽陵之安國城爾朱兆遣監軍孫白鷂至兾州託言調發民馬欲俟髙乾兄弟送馬而收之乾等知之與前河内太守封隆之等合謀潛部勒壯士襲據信都殺白鷂執刺史元嶷乾等欲推其父翼行州事翼曰和集郷里我不如封皮乃奉隆之行州事爲敬宗舉哀將士皆縞素升壇誓衆移檄州郡共討爾朱氏仍受劉靈助節度隆之磨奴之族孫也殷州刺史爾朱羽生將五千人襲信都髙敖曹不暇擐甲將十餘􅀐馳擊之乾在城中繩下五百人追救未及敖曹已交兵羽生敗走敖曹馬矟絶丗左右無不一當百時人比之項籍髙歡屯胡􅀜大王山六旬乃引兵東出聲言討信都信都人皆懼髙乾曰吾聞髙晉州雄略蓋丗其志不居人下且爾朱無道弑君虐民正是英雄立功之㑹今日之來必有深謀吾當輕馬迎之密參意㫖諸君勿懼也乃將十餘􅀐與封隆之子子繪潛謁歡於􅇭口􅀃歡曰爾朱酷逆痛結人神凡曰有知莫不思奮明公威徳素著天下傾心若兵以義立則屈彊之徒不足爲明公敵矣鄙州雖小戸口不減十萬榖秸之稅足濟軍資願公熟思其計乾辭氣慷􅁣歡大恱與之同帳􅃦初河南太守趙郡李顯甫喜豪俠集諸李數千家於殷州西山方五六十里居之顯甫卒子元忠繼之家素冨多出貸求利元忠悉焚契免責郷人甚敬之時盜賊蠭起清河有五百人西戍還經趙郡以路梗共投元忠元忠遣奴爲導曰若逢賊但道李元忠遣如言賊皆舎避及葛榮起元忠帥宗黨作壘以自保坐大槲樹下前後斬違命者凡三百人賊至元忠輙擊却之葛榮曰我自中山至此連爲趙李所破何以能成大事乃悉衆攻圍執元忠以隨軍賊平就拜南趙郡太守好酒無政績及爾朱兆弑敬宗元忠弃官歸謀舉兵討之㑹髙歡東出元忠乗露車載素筝濁酒以奉迎歡聞其酒客未即見之元忠下車獨坐酌酒擘脯食之謂門者曰本言公招延儁傑今聞國士到門不吐哺輟洗其人可知還吾刺勿通也門者以告歡遽見之引入觴再行元忠車上取箏鼔之長歌慷􅁣歌闋謂􅂬曰天下形勢可見明公猶事爾朱邪􅂬曰富貴皆因彼所致安敢不盡節元忠曰非英雄也髙乾邕兄弟來未時乾己見歡歡紿之曰從叔輩麤何肯來元忠曰雖麤並解事􅂬曰趙郡醉矣使人扶出元忠不肯起孫騰進曰此君天遣來不可違也歡乃復留與語元忠慷􅁣流涕歡亦悲不自勝元忠因進䇿曰殷州小無糧仗不足以濟大事若向兾州髙乾邕兄弟必爲明公主人殷州便以賜委兾殷旣合滄瀛幽定自然弭服唯劉誕黠胡或當乖拒然非明公之敵􅂬急握元忠手而謝焉􅂬至山東約勒士卒絲毫之物不聽侵犯每過麥地􅂬輙歩牽馬逺近聞之皆稱髙儀同將兵整肅益歸心焉􅂬求糧於相州刺史劉誕誕不與有車營租米􅂬掠取之進至信都封隆之髙乾等開門納之髙敖曹時在外略地聞之以乾爲婦人遺以布裠􅂬使世子澄以子孫禮見之敖曹乃與俱來癸酉魏封長廣王曄爲東海王以青州刺史魯郡王肅爲太師淮陽王欣爲太傅爾朱丗隆爲太保長孫稚爲太尉趙郡王諶爲司空徐州刺史爾朱仲逺雍州刺史爾朱天光並爲大將軍并州刺史爾朱兆爲天柱大將軍賜髙􅂬爵勃海王徴使入朝長孫稚固辭太尉乃以爲驃􅀐大將軍開府儀同三司爾朱兆辭天柱曰此叔父所終之官我何敢受固辭不拜尋加都督十州諸軍事丗襲并州刺史髙􅂬辭不就徴爾朱仲逺徙鎭大梁復加兖州刺史爾朱丗隆之初爲僕射也畏爾朱榮之威嚴深自刻厲留心几案應接賔客有開敏之名及榮死無所顧憚爲尚書令家居視事坐符臺省事無大小不先白世隆有司不敢行使尚書郎宋遊道邢昕在其聽事東西别坐受納辭訟稱命施行公爲貪滛生殺自恣又欲收軍士之意汎加階級皆爲將軍無復員限自是勳賞之官大致猥濫人不復貴是時天光專制􅀜右兆奄有并汾仲逺擅命徐兖世隆居中用事競爲貪暴而仲逺尤甚所部冨室大族多誣以謀反籍没其婦女財物入私家投其男子於河如是者不可勝數自榮陽已東租稅悉入其軍不送洛陽東南州郡自牧守以下至士民畏仲逺如犲狼由是四方之人皆惡爾朱氏而憚其彊莫敢違也己丑魏以涇州刺史賀㧞岳爲岐州刺史渭州刺史矦莫陳恱爲秦州刺史並加儀同三司魏使大都督矦淵驃􅀐大將軍代人叱列延慶討劉靈助至固城淵畏其衆欲引兵西入據関拒險以待其變延慶曰靈助庸人假妖術以惑衆大兵一臨彼皆恃其符厭豈肯戮力致死與吾爭勝􅀒哉不如出營城外詐言西歸靈助聞之必自寛縱然後潜軍擊之往則成擒矣淵從之出頓城西聲云欲還丙申簡精􅀐一千夜􅀤直抵靈助壘靈助戰敗斬之傳首洛陽初靈助起兵自占勝􅀒曰三月之末我必入定州爾朱氏不乆當滅及靈助首函入定州果以是月之末夏四月乙巳昭明太子統卒太子自加元服上即使省録朝政百司進事塡委於前太子辨析詐謬秋毫必暏但令改正不加案劾平斷灋獄多所全宥寛和容衆喜愠不形於色好讀書屬文引接才俊賞愛無倦出宫二十餘年不畜聲樂毎霖雨積雪遣左右周行閭巷視貧者賑之天性孝謹在東宫雖燕居坐起􅁪西向或􅀫被召當入危坐達旦及寢疾恐貽帝憂敕參問輙自力手書及卒朝野惋愕建康男女奔走宫門號泣滿路癸丑魏以髙歡爲大都督東道大行臺兾州刺史又以安定王爾朱智虎爲肆州刺史魏爾朱天光出夏州遣將討􅀫勤明逹癸亥擒明逹送洛陽斬之丙寅魏以侍中驃􅀐大將軍爾朱彦伯爲司徒魏詔有司不得復稱僞梁五月丙子魏荆州城民斬趙脩延復推李琰之行州事魏爾朱仲逺使都督魏僧勗等討崔祖螭於東陽斬之初昭明太子葬其母丁貴嬪遣人求墓地之吉者或賂宦者喻三副求賣地云若得錢三百萬以百萬與之三副密啓上言太子所得地不如今地於上爲吉上年老多忌即命市之葬畢有道士云此地不利長子若厭之或可申延乃爲蠟鵝及諸物埋於墓側長子位宫監鮑邈之魏雅初皆有寵於太子邈之晩見踈於雅乃密啟上云雅爲太子厭禱上遣檢掘果得鵝物大驚將窮其事徐勉固諫而止但誅道士由是太子終身慙憤不能自明及卒上徴其長子南徐州刺史華容公歡至建康欲立以爲嗣銜其前事猶豫乆之卒不立庚寅遣還鎭臣光曰君子之於正道不可少頃離也不可跬步失也以昭明太子之仁孝武帝之慈愛一染嫌疑之迹身以憂死罪及後昆求吉得凶不可湔滌可不戒哉是以詭誕之士竒邪之術君子逺之丙申立太子母弟晉安王綱爲皇太子朝野多以爲不順司議侍郎周弘正甞爲晉安王主簿乃奏記曰謙讓道廢多歷年所伏惟明大王殿下天挺將聖四海歸仁是以皇上發徳音以大王爲儲副意者願聞殿下􅎨目夷上仁之義執子臧大賢之節逃玉輿而弗乗弃萬乗如脫屣庶改澆競之俗以大呉國之風古有其人今聞其語能行之者非殿下而誰使無爲之化復生於遂古讓王之道不墜於來葉豈不盛歟王不能從弘正捨之兄子也太子以侍讀東海徐摛爲家令兼管記尋帶領直摛文體輕麗春坊盡學之時人謂之宫體上聞之怒召摛欲加誚責及見應對明敏辭義可觀意更釋然因問經史及釋教摛商較從橫應對如響上甚加歎異寵遇曰隆領軍朱异不恱謂所親曰徐叟出入兩宫漸來見逼我須早爲之所遂承間白上曰摛年老又愛泉石意在一郡自飬上謂摛眞欲之乃召摛謂曰新安大好山水遂出爲新安太守六月癸丑立華容公歡爲豫章王其弟枝江公譽爲河東王曲阿公詧爲岳陽王上以人言不息故封歡兄弟以大郡用慰其心乆之鮑邈之坐誘略人罪不至死太子綱追思眧明之􅁈揮淚誅之魏髙􅂬將起兵討爾朱氏鎭南大將軍斛律金軍主善無庫狄干與歡妻弟婁昭妻之姊夫段榮皆勸成之歡乃詐爲書稱爾朱兆將以六鎭人配契胡爲部曲衆皆憂懼又爲并州符徴兵討歩落稽發萬人將遣之孫騰與都督尉景爲請留五日如此者再歡親送之郊雪涕執别衆皆號慟聲震原野歡乃諭之曰與爾俱爲失鄕客義同一家不意在上徴發乃爾今直西向已當死後軍期又當死配國人又當死柰何衆曰唯有反耳歡曰反乃急計然當推一人爲主誰可者衆共推歡歡曰爾鄕里難制不見葛榮乎雖有百萬之衆曾無灋度終自敗滅今以吾爲主當與前異毋得陵漢人犯軍令生死任吾則可不然不能爲天下笑衆皆頓顙曰死生唯命歡乃椎牛饗士庚申起兵於信都亦未敢顯言叛爾朱氏也㑹李元忠舉兵逼殷州歡令髙乾帥衆救之乾輕􅀐入見刺史爾朱羽生與指畫軍計羽生與乾俱出因擒斬之持羽生首謁歡歡撫膺曰今日反決矣乃以元忠爲殷州刺史鎭廣阿歡於是抗表罪狀爾朱氏爾朱世隆匿之不通魏楊播及弟椿津皆有名徳播剛毅椿津謙恭家丗孝友緦服同㸑男女百口人無閒言椿津皆至三公一門七郡太守三十二州刺史敬宗之誅爾朱榮也播子侃預其謀城陽王徽李彧皆其姻戚也爾朱兆入洛侃逃歸華隂爾朱天光使侃婦父韋義逺招之與盟許貰其罪􅋲曰彼雖食言死者不過一人猶兾全百口乃出應之天光殺之時椿致仕與其子昱在華隂椿弟兾州刺史順司空津順子東雍州刺史辨正平太守仲宣皆在洛秋七月爾朱丗隆誣奏楊氏謀反請收治之魏主不許世隆苦請帝不得已命有司檢案以聞壬申夜丗隆遣兵圍津第天光亦遣兵掩椿家於華隂東西之族無少長皆殺之籍没其家丗隆奏云楊氏實反與收兵相拒皆已格殺帝惋悵乆之不言而已朝野聞之無不痛憤津子逸爲光州刺史爾朱仲逺遣使就殺之唯津子愔於被收時適出在外逃匿獲免往見髙歡於信都泣訴家禍因爲言討爾朱氏之策歡甚重之即署行臺郎中乙亥上臨軒策拜太子大赦丙戌魏司徒爾朱彦伯以旱遜位戊子以彦伯爲侍中開府儀同三司彦伯於兄弟中差無過惡爾朱丗隆固讓太保魏主特置儀同三師之官位次上公之下庚寅以丗隆爲之斛斯椿譛朱瑞於丗隆丗隆殺之庚寅詔凡宗戚有服屬者並可賜沐食郷亭矦隨逺近爲差壬辰以吏部尚書何敬容爲尚書右僕射敬容昌㝢之子也魏爾朱仲逺度律等聞髙􅂬起兵恃其彊不以爲慮獨爾朱丗隆憂之爾朱兆將歩􅀐二萬出井陘趣殷州李元忠弃城奔信都八月丙午爾朱仲逺度律將兵討髙􅂬九月己卯魏以仲逺爲太宰庚辰以爾朱天光爲大司馬癸巳魏主追尊父廣陵惠王爲先帝母王氏爲先太妃封弟永業爲髙密王子恕爲勃海王冬十月己酉上幸同泰寺升灋座講􅄺槃經七日而罷樂山矦正則先有罪徙􅊊林招誘亡命欲攻番禺廣州刺史元景仲討斬之正則正徳之弟也孫騰􅀃髙􅂬曰今朝廷隔絶號令無所禀不􅁠有所立則衆將泹散􅂬疑之騰再三固請乃立勃海太守元朗爲帝朗融之子也壬寅朗即位於信都城西改元中興以􅂬爲侍中丞相都督中外諸軍事大將軍録尚書事大行臺髙乾爲侍中司空髙敖曹爲驃􅀐大將軍儀同三司兾州刺史孫騰爲尚書左僕射河北行臺魏蘭根爲右僕射己酉爾朱仲逺度律與驃􅀐大將軍斛斯椿車􅀐大將軍儀同三司賀拔勝車􅀐大將軍賈􅂋智軍於陽平􅂋智名智以字行􅂋度之弟也爾朱兆出井陘軍于廣阿衆號十萬髙􅂬縱反間云丗隆兄弟謀殺兆復云兆與􅂬同謀殺仲逺等由是迭相猜貳徘徊不進仲逺等屡使斛斯椿賀拔勝往諭兆兆帥輕􅀐三百來就仲逺同坐幕下意色不平手舞馬鞭長嘯凝望疑仲逺等有變遂趨出馳還仲逺遣椿勝等追曉􅀃之兆執椿勝還營仲逺度律大懼引兵南遁兆數勝罪將斬之曰爾殺衛可􅀌罪一也天柱薨爾不與丗隆等俱來而東征仲逺罪二也我欲殺爾乆矣今復何言勝曰可􅀌爲國巨患勝父子誅之其功不小反以爲罪乎天柱被戮以君誅臣勝寧負王不負朝廷今日之事生死在王但冦賊密邇骨肉構􅂩自古及今未有如是而不亡者勝不憚死恐王失䇿兆乃捨之髙歡將與兆戰而畏其衆彊以問親信都督段韶韶曰所謂衆者得衆人之死所謂彊者得天下之心爾朱氏上弑天子中屠公卿下暴百姓王以順討逆如湯沃雪何衆彊之有歡曰雖然吾以小敵大恐無天命不能濟也韶曰韶聞小能敵大小道大滛皇天無親唯德是輔爾朱氏外亂天下内失英雄心智者不爲謀勇者不爲􅃲人心已去天意安有不從者哉韶榮之子也辛亥歡大破兆於廣阿俘其甲卒五千餘人十一月乙未上幸同泰寺講般若經七日而罷庚辰魏髙􅂬引兵攻鄴相州刺史劉誕嬰城固守是􅀊魏南兖州城民王乞得劫刺史劉世明舉州來降丗明芳之族子也上以侍中元樹爲鎭北將軍都督北討諸軍事鎭譙城以丗明爲征西大將軍郢州刺史加儀同三司丗明不受固請北歸上許之丗明至洛陽奉送所持節歸郷里不仕而卒四年春正月丙寅以南平王偉爲大司馬元灋僧爲大尉􅀽昂爲司空立西豐矦正德爲臨賀王正德自結於朱异上旣封昭明諸子异言正德失職故王之以太子右衛率薛灋護爲司州牧衛送魏王恱入洛庚午立太子綱之長子大器爲宣城王魏髙歡攻鄴爲地道施柱而焚之城陷入地壬午拔鄴擒劉誕以楊愔爲行臺右丞時軍國多事文檄教令皆出於愔及開府諮議參軍崔㥄㥄逞之五丗孫也二月以太尉元灋僧爲東魏王欲遣還北兖州刺史羊􅋲爲軍司馬與灋僧偕行楊州刺史邵陵王綸遣人就市賖買錦綵絲布數百匹市人皆閉邸店不出少府丞何智通依事啟聞綸被責還弟乃遣防閤戴子髙等以槊刺智通於都巷刃出於背智通識子髙取其血以指畫車壁爲邵陵字乃絶由是事覺庚戌綸坐免爲庶人鎻之於第經三旬乃脫鎻頃之復封爵辛亥魏安定王追謚敬宗曰武懷皇帝甲子以髙歡爲丞相柱國大將軍太師三月丙寅以髙澄爲驃􅀐大將軍丁丑安定王帥百官入居於鄴爾朱兆與爾朱丗隆等互相猜阻丗隆卑辭厚禮諭兆欲使之赴洛唯其所欲又請節閔帝納兆女爲后兆乃恱并與天光度律更立誓約復相親睦斛斯椿隂謂賀拔勝曰天下皆怨毒爾朱而吾等爲之用亡無日矣不如圖之勝曰天光與兆各據一方欲盡去之甚難去之不盡必爲後患柰何椿曰此易致耳乃􅀃丗隆追天光等赴洛共討髙歡丗隆屢徴天光天光不至使椿自往邀之曰髙歡作亂非王不能定豈可坐視宗族夷滅邪天光不得已將東出問䇿於雍州刺史賀拔岳岳曰王家跨據三方士馬殷盛髙歡烏合之衆豈能爲敵但能同心戮力往無不捷若骨肉相疑則圖存之不暇安能制人如下官所見莫若且鎭􅀜中以固根本分遣銳師與衆軍合􅀔進可以克敵退可以自全天光不從閏月壬寅天光自長安兆自晉陽度律自洛陽仲逺自東郡皆㑹於鄴衆號二十萬夾洹水而軍節閔帝以長孫稚爲大行臺揔督之髙歡令吏部尚書封隆之守鄴癸丑出頓紫陌大都督髙敖曹將郷里部曲王桃湯等三千人以從歡曰髙都督所將皆漢兵恐不足集事欲割鮮卑兵千餘人相雜用之何如敖曹曰敖曹所將練習已乆前後格􅃲不減鮮卑今若雜之情不相洽勝則爭功退則推罪不煩更配也庚申爾朱兆帥輕􅀐三千夜襲鄴城叩西門不克而退壬戌歡將戰馬不滿二千步兵不滿三萬衆寡不敵乃於韓陵爲圎陳連繫牛驢以塞歸道於是將士皆有死志兆望見歡遥責歡以叛已歡曰本所以勠力者共輔帝室今天子何在兆曰永安柱害天柱我報讎耳歡曰我昔親聞天柱計汝在戸前立豈得言不反邪且以君殺臣何報之有今日義絶矣遂戰歡將中軍髙敖曹將左軍歡從父弟岳將右軍歡戰不利兆等乗之岳以五百􅀐衝其前别將斛律敦收散卒躡其後敖曹以千􅀐自栗園出橫擊之兆等大敗賀拔勝與徐州刺史杜德於陳降歡兆對慕容紹宗撫膺曰不用公言以至於此欲輕􅀐西走紹宗反旗鳴角收散卒成軍而去兆還晉陽仲逺奔東郡爾朱彦伯聞度律等敗欲自將兵守河橋世隆不從度律天光將之洛陽大都督斛斯椿謂都督賈顯度賈顯智曰今不先執爾朱氏吾屬死無類矣乃夜於桑下盟約倍道先還丗隆使其外兵參軍陽叔淵單􅀐馳赴北中簡閱敗衆以次内之椿至不得入城乃詭􅀃叔淵曰天光部下皆是西人聞欲大掠洛邑遷都長安宜先内我以爲之備叔淵信之夏四月甲子朔椿等入據河橋盡殺爾朱氏之黨度律天光欲攻之㑹大雨晝夜不止士馬疲頓弓矢不可施遂西走至灅波津爲人所擒送於椿所椿使行臺長孫稚詣洛陽奏狀别遣賈顯智張歡帥􅀐掩襲丗隆執之彦伯時在禁直長孫稚於神虎門啓陳髙歡義功旣振請誅爾朱氏節閔帝使舎人郭崇報彦伯彦伯狼狽走出爲人所執與丗隆俱斬於閶闔門外送其首并度律天光於髙歡節閔帝使中書舎人盧辯勞歡於鄴歡使之見安定王辯抗辭不從􅂬不能奪乃捨之辯同之兄子也辛未驃􅀐大將軍行濟州事矦景降於安定王以景爲尚書僕射南道大行臺濟州刺史爾朱仲逺來奔仲逺帳下都督喬寕張子期自滑臺詣􅂬降歡責之曰汝事仲逺擅其榮利盟契百重許同生死前仲逺自徐州爲逆汝爲戎首今仲逺南走汝復叛之事天子則不忠事仲逺則無信犬馬尚識飼之者汝曽犬馬之不如遂斬之爾朱天光之東下也留其弟顯壽鎭長安召秦州刺史矦莫陳恱欲與之俱東賀拔岳知天光必敗欲留恱共圗顯壽以應髙歡計未有所出字文泰謂岳曰今天光尚近恱未必有貳心若以此告之恐其驚懼然恱雖爲主將不能制物若先􅀃其衆必人有留心恱進失爾朱之期退恐人情變動乗此􅀃恱事無不遂岳大喜即令泰入恱軍􅀃之恱遂與岳共襲長安泰帥輕􅀐爲前驅顯壽弃城走追至華隂擒之歡以岳爲􅀜西大行臺岳以泰爲行臺左丞領府司馬事无巨細皆委之爾朱丗隆之拒髙􅂬也使齊州行臺尚書房謨募兵趣四瀆又使其弟青州刺史弼趣亂城揚聲北渡爲掎角之􅀔及韓陵旣敗弼還東陽聞丗隆等死欲來奔數與左右割臂爲盟帳下都督馮紹隆素爲弼所信待􅀃弼曰今方同契闊宜更割心前之血以盟衆弼從之大集部下披胷令紹隆割之紹隆因推刃殺之傳首洛陽丙子安東將軍辛永以建州降於安定王辛巳安定王至邙山髙歡以安定王踈逺使僕射魏蘭根慰諭洛邑且觀節閔帝之爲人欲復奉之蘭根以帝神采髙明恐於後難制與髙乾兄弟及黃門侍郎崔㥄共勸歡廢之歡集百官問所宜立莫有應者太僕代人綦母儁盛稱節閔帝賢明宜主社稷歡欣然是之㥄作色曰若言賢明自可待我髙王徐登大位廣陵旣爲逆胡所立何得猶爲天子若從儁言王師何名義舉歡遂幽節閔帝於崇訓佛寺歡入洛陽斛斯椿謂賀拔勝曰今天下事在吾與君耳若不先制人將爲人所制髙歡初至圖之不難勝曰彼有功於時害之不祥比數夜與歡同宿具序往昔之懷兼荷兄恩意甚多何苦憚之椿乃止歡以汝南王恱髙祖之子召欲立之聞其狂暴無常乃止時諸王多逃匿尚書左僕射平陽王脩懷之子也匿於田舍歡欲立之使斛斯椿求之椿見脩所親貟外散􅀐侍郎太原王思政問王所在思政曰須知問意椿曰欲立爲天子思政乃言之椿從思政見脩脩色變謂思政曰得無賣我邪曰不也曰敢保之乎曰變態百端何可保也椿馳報歡歡遣四百􅀐迎脩入氊帳陳誠泣下霑襟脩譲以寡德歡再拜脩亦拜歡出備服御進湯沐逹夜嚴警昧爽文武執鞭以朝使斛斯椿奉勸進表椿入帷門罄折延首而不敢前脩令思政取表視之曰便不得不稱朕矣乃爲安定王作詔䇿而禪位焉戊子孝武帝即位於東郭之外用代都舊制以黑氊䝉七人歡居其一帝於氊上西向拜天畢入御太極殿羣臣朝賀升閶闔門大赦改元太昌以髙歡爲大丞相天柱大將軍太師丗襲定州刺史庚寅加髙澄侍中開府儀同三司初歡起兵信都爾朱丗隆知司馬子如與歡有舊自侍中驃􅀐大將軍出爲南岐州刺史歡入洛召子如爲大行臺尚書朝夕左右參知軍國廣州刺史廣寧韓賢素爲歡所善歡入洛凡爾朱氏所除官爵例皆削奪唯賢如故以前御史中尉樊子鵠兼尚書左僕射爲東南道大行臺與徐州刺史杜德追爾朱仲逺仲逺已出境遂攻元樹於譙丞相歡徴賀拔岳爲冀州刺史岳畏歡欲單馬入朝行臺右丞薛孝通􅀃岳曰髙王以數千鮮卑破爾朱百萬之衆誠亦難敵然諸將或素居其上或與之等夷雖屈首從之􅀔非獲已今或在京師或據州鎭髙王除之則失人望留之則爲腹心之疾且吐萬人雖復敗走猶在并州髙王方内撫羣雄外抗勍敵安能去其巢穴與公争􅀜中之地乎今􅀜中豪俊皆屬心於公願效其智力公以華山爲城黃河爲塹進可以兼山東退可以封函谷柰何欲束手受制於人乎言未卒岳執孝通手曰君言是也乃遜辭爲啟而不就徴壬辰丞相歡還鄴送爾朱度律天光於洛陽斬之五月丙申魏主酖節閔帝於門下外省詔百司㑹䘮葬用殊禮以沛郡王欣爲太師趙郡王諶爲太保南陽王寳炬爲太尉長孫稚爲太傅寶炬愉之子也丞相􅂬固辭天柱大將軍戊戌許之己酉清河王亶爲司徒侍中河南髙隆之本徐氏養子丞相歡命以爲弟恃歡􅀔驕狎公卿南陽王寶炬敺之曰鎭兵何敢爾魏主以歡故六月丁卯黜寶炬爲驃􅀐大將軍歸第魏主避廣平武穆王之諱改謚武懷皇帝曰孝莊皇帝廟號敬宗秋七月庚子魏復以南陽王寶炬爲太尉壬寅魏丞相歡引兵入􅇭口大都督庫狄干入井陘擊爾朱兆庚戌魏主使驃􅀐大將軍儀同三司髙隆之帥歩􅀐十萬㑹丞相歡於太原因以隆之爲丞相軍司歡軍於武鄕爾朱兆大掠晉陽北走秀容并州平歡以晉陽四塞乃建大丞相府而居之魏夏州遷民郭遷據青州反刺史元嶷弃城走詔行臺矦景等討之拔其城遷來奔魏東南道大行臺樊子鵠圍元樹於譙城分兵攻取蒙縣等五城以絶援兵之路樹請帥衆南歸以地還魏子鵠等許之與之誓約樹衆半出子鵠擊之擒樹及譙州刺史朱文開以歸羊􅋲行至官竹聞樹敗而還九月樹至洛陽乆之復欲南奔魏人殺之乙巳以司空􅀽昂領尚書令冬十一月丁酉日南至魏主祀圜丘甲辰魏殺安定王朗東海王曄己酉以汝南王恱爲侍中大司馬魏葬靈太后胡氏上聞魏室已定十二月庚辰復以太尉元灋僧爲郢州刺史魏主以汝南王恱屬近地尊丁亥殺之魏大赦改元永興以與太宗同號復改永熙魏主納丞相歡女爲后命太常卿李元忠納幣於晉陽歡與之宴論及舊事元忠曰昔日建義轟轟大樂比來寂寥無人問歡撫掌笑曰此人逼我起兵元忠戲曰若不與侍中當更求建義處歡曰建義不慮無止畏如此老翁不可遇耳元忠曰止爲此翁難遇所以不去因捋歡須大笑歡悉其雅意深重之爾朱兆旣至秀容分守險隘出入寇抄魏丞相歡揚聲討之師出復止者數四兆意怠歡揣其歳首當宴㑹遣都督竇泰以精􅀐馳之一日一夜行三百里歡以大軍繼之資治通鑑卷第一百五十五
