seq: 163
front:
  text: 高洋位丞相都督中外諸軍録尚書事大行臺齊郡王
  hash: sha256:0c8c09b118b8c7e61d9499682c05f05a98bed045c016347396e5e6c760b3cb88
body:
  text: 庚午邵陵王綸至江夏郢州刺史南平王恪郊迎以州讓之綸不受乃推綸爲假黄􅃏都督中外諸軍事承制置百官魏楊忠圍安陸柳仲禮馳歸救之諸將恐仲禮至則安陸難下請急攻之忠曰攻守勢殊未可猝拔􅀂引日勞師表裏受敵非計也南人多習水軍不閑野戰仲禮師在近路吾出其不意以竒兵襲之彼怠我奮一舉可克克仲禮則安陸不攻自拔諸城可傳檄定也乃選􅀐二千衘枚夜進敗仲禮於漴頭獲仲禮及其弟子禮盡俘其衆馬岫以安陸别將王叔孫以竟陵皆降於忠於是漢東之地盡入于魏廣陵人來嶷説前廣陵太守祖皓曰董紹先輕而無謀人情不附襲而殺之此壯士之任耳今欲紏帥義勇奉戴府君􅀂其克捷可立􅁊文之勲必天未悔禍猶足爲梁室忠臣皓曰此僕所願也乃相與紏合勇士得百餘人癸酉襲廣陵斬南兖州刺史董紹先據城馳檄逺近推前太子舎人蕭勔爲刺史仍結東魏爲援皓暅之之子勔勃之兄也乙亥景遣郭元建帥衆奄至皓嬰城固守二月魏楊忠乗勝至石城欲進逼江陵湘東王繹遣舎人庾恪説忠曰詧來伐叔而魏助之何以使天下歸心忠遂停湕北繹遣舎人王孝祀等送子方略爲質以求和魏人許之繹與忠盟曰魏以石城爲封梁以安陸爲界請同附庸并送質子貿遷有無永敦鄰睦忠乃還宕昌王梁彌定爲其宗人獠甘所襲彌定奔魏獠甘自立羌酋傍乞鐵怱據渠株川與渭州民鄭五醜合諸羌以叛魏丞相泰使大將軍宇文貴涼州刺史史寧討之擒斬鐵怱五醜寧别擊獠甘破之獠甘將百騎奔生羌鞏亷玉寧復納彌定於宕昌置岷州於渠株川進擊鞏廉玉斬獠甘虜廉玉送長安矦景遣任約于慶等帥衆二萬攻諸藩邵陵王綸欲救河東王譽而兵糧不足乃致書於湘東王繹曰天時地利不及人和况乎手足肱支豈可相害今社稷危恥創巨痛􅀷唯應剖心甞膽泣血枕戈其餘小忿或宜容貰􅀂外難未除家禍仍構料今訪古未或不亡夫征戰之理唯求克勝至於骨肉之戰愈勝愈酷捷則非功敗則有䘮勞兵損義虧失多矣矦景之軍所以未窺江外者良爲藩屏盤固宗鎮彊密弟􅀂䧟洞庭不戢兵刃雍川疑迫何以自安必引進魏軍以求形援弟􅀂不安家國去矣必希解湘州之圍存社稷之計繹復書陳譽過惡不赦且曰詧引楊忠來相侵逼頗遵談笑用却秦軍曲直有在不復自陳臨湘旦平暮便即路綸得書投之於案慷􅁣流涕曰天下之事一至於斯湘州􅀂敗吾亡無日矣矦景遣矦子鑒帥舟師八千自帥徒兵一萬攻廣陵三日克之執祖皓􅅞而射之箭徧體然後車裂以徇城中無少長皆埋之於地馳馬射而殺之以子鑒爲南兖州刺史鎭廣陵景還建康丙戍以安陸王大春爲東楊州刺史省吳州乙巳以尚書僕射王克爲左僕射庚寅東魏以尚書令髙隆之爲太保宣城内史楊白華進據安吳矦景遣于子恱等帥衆攻之不克東魏行臺辛術將兵入宼圍陽平不克矦景納上女溧陽公主甚愛之三月甲申景請上禊宴於樂遊苑帳飲三日上還宫景與公主共據御牀南面並坐羣臣文武列坐侍宴庚申東魏進丞相洋爵爲齊王臨川内史始興王毅等擊莊鐵鄱陽王範遣其將巴西矦瑱救之毅等敗死鄱陽丗子嗣與任約戰於三章約敗走嗣因徙鎭三章謂之安樂柵夏四月庚辰朔湘東王繹以上甲矦韶爲長沙王丙午矦景請上幸西州上御素輦侍衞四百餘人景浴鐵數千翼衛左右上聞絲竹悽然泣下命景起舞景亦請上起舞酒䦨坐散上抱景于牀曰我念丞相景曰陛下如不念臣臣何得至此逮夜乃罷時江南連年旱蝗江楊尤甚百姓流亡相與入山谷江湖采草根木葉菱芡而食之所在皆盡死者蔽野富室無食皆鳥面鵠形衣羅綺懷金玉俯伏牀帷待命聽終千里絶烟人迹罕見白骨成聚如丘隴焉景性殘酷於石頭立大碓有犯法者擣殺之常戒諸將曰破柵平城當浄殺之使天下知吾威名故諸將每戰勝專以焚掠爲事斬刈人如草芥以資戲笑由是百姓雖死終不附之又禁人偶語犯者刑及外族爲其將帥者悉稱行臺來降附者悉稱開府其親􅀉隆重者曰左右廂公勇力兼人者曰庫直都督魏封皇子儒爲燕王公爲吳王矦景召宋子仙還京口邵陵王綸在郢州以聽事爲正陽殿内外齋閤悉加題署其部下陵􅁀軍府郢州將佐莫不怨之諮議參軍江仲舉南平王恪之謀主也說恪圖綸恪驚曰􅀂我殺邵陵寜靜一鎭荆益兄弟必皆内喜海内􅀂平則以大義責我矣且巨逆未梟骨肉相殘自亡之道也卿且息之仲舉不從部分諸將刻日將發謀泄綸壓殺之恪狼狽往謝綸曰羣小所作非由兄也兇黨已斃兄勿􅀷憂王僧辯急攻長沙辛巳克之執河東王譽斬之傳首江陵湘東王繹反其首而葬之􅀄丗子方等之死臨蒸周鐵虎功最多譽委遇甚重僧辯得鐵虎命烹之呼曰矦景未滅柰何殺壯士僧辯竒其言而釋之還其麾下繹以僧辯爲左衞將軍加侍中鎭西長史繹自去􅀊聞髙祖之䘮以長沙未下故匿之壬寅始發䘮刻檀爲髙祖像置於百福殿事之甚謹動静必咨焉繹以爲天子制於賊臣不肯從大寶之號猶稱太清四年丙午繹下令大舉討矦景移檄逺近鄱陽王範至湓城以􅀳熈爲􅀳州遣其丗子嗣爲刺史江州郡縣多輒攺易尋陽王大心政令所行不出一郡大心遣兵擊莊鐵嗣與鐵素善請發兵救之範遣矦瑱帥精甲五千助鐵由是二鎭互相猜忌無復討賊之志大心使徐嗣徽帥衆二千築壘稽亭以備範市糴不通範數萬之衆無所得食多餓死範憤恚疽發於背五月乙卯卒其衆祕不發喪奉範弟安南矦恬爲主有衆數千人丙辰矦景以元思䖍爲東道大行臺鎭錢塘丁巳以矦子鑒爲南兖州刺史東魏齊王洋之爲開府也勃海髙德政爲管記由是親昵言無不盡金紫光禄大夫丹楊徐之才北平太守廣宗宋景業皆善圖䜟以爲太嵗在午當有革命因德政以白洋勸之受禪洋以告婁太妃太妃曰汝父如龍兄如虎猶以天位不可妄據終身北靣汝獨何人欲行舜禹之事乎洋以告之才之才曰正爲不及父兄故宜早升尊位耳洋鑄像卜之而成乃使開府儀同三司叚韶問肆州刺史斛律金金來見洋固言不可以宋景業首陳符命請殺之洋與諸貴議於太妃前太妃曰吾兒懦直必無此心髙德政樂禍教之耳洋以人心不壹使髙德政如鄴察公卿之意未還洋擁兵而東至平都城召諸勲貴議之莫敢對長史杜弼曰關西國之勍敵􅀂受魏禪恐彼挾天子自稱義兵而東向王何以待之徐之才曰今與王爭天下者彼亦欲爲王所爲縱其屈彊不過隨我稱帝耳弼無以應髙德政至鄴諷公卿莫有應者司馬子如逆洋於遼陽固言未可洋欲還倉丞李集曰王來爲何事而今欲還洋僞使於東門殺之而别令賜絹十匹遂還􅀳陽自是居常不恱徐之才宋景業等日陳隂陽雜占云宜早受命髙德政亦敦勸不巳洋使術士李密卜之遇大横曰漢文之卦也又使宋景業筮之遇乾之鼎曰乾君也鼎五月卦也宜以仲夏受禪或曰五月不可入官犯之終於其位景業曰王爲天子無復下期豈得不終於其位乎洋大悦乃發􅀳陽髙德政録在鄴諸事條進於洋洋令左右陳山提馳驛齎事條并密書與楊愔是月山提至鄴楊愔即召太常卿邢劭等議撰儀注祕書監魏收草九錫禪讓勸進諸文引魏宗室諸王入北宫留於東齋甲寅東魏進洋位相國揔百揆備九錫洋行至前亭所乗馬忽倒意甚惡之至平都城不復肯進髙德政徐之才苦請曰山提先去恐其漏泄即命司馬子如杜弼馳驛續入觀察物情子如等至鄴衆人以事􅀔巳决無敢異言洋至鄴召夫齎築具集城南髙隆之請曰用此何爲洋作色曰我自有事君何問爲欲族滅邪隆之謝而退於是作圓丘備法物丙辰司空潘樂侍中張亮黄門郎趙彦􅀷等求入啓事東魏孝静帝在昭陽殿見之亮曰五行遞運有始有終齊王聖德欽明萬方歸仰願陛下逺法堯舜帝歛容曰此事推挹巳乆謹當遜避又曰􅀂爾湏作制書中書郎崔劼裴讓之曰制巳作訖使侍中楊愔進之東魏主旣署曰居朕何所愔對曰北城别有館宇乃下御坐歩就東廊詠范蔚宗後漢書賛曰獻生不辰身播國屯終我四百永作虞賔所司請發帝曰古人念遺簮弊履朕欲與六宫别可乎髙隆之曰今日天下猶陛下之天下況在六宫帝歩入與妃嬪巳下别舉宫皆哭趙國李嬪誦陳思王詩云王其愛玉體俱享黄髮期直長趙道德以故犢車一乗候於東閤帝登車道德超上抱之帝叱之曰朕自畏天順人何物奴敢逼人如此道德猶不下出雲龍門王公百僚拜辭髙隆之灑泣遂入北城居司馬子如南宅遣太尉彭城王韶等奉璽綬禪位于齊戊午齊王即皇帝位于南郊大赦攺元天保自魏敬宗以來百官絶禄至是始復給之己未封東魏主爲中山王待以不臣之禮追尊齊獻武王爲獻武皇帝廟號太祖後攺爲髙祖文襄王爲文襄皇帝廟號丗宗辛酉尊王太后婁氏爲皇太后乙丑降魏朝封爵有差其宣力霸朝及西南投化者不在降限文成矦寧起兵於吳有衆萬人己巳進攻吳郡行吳郡事矦子榮逆擊殺之寧範之弟也子榮因縱兵大掠郡境自􅀳氏渡江三吳最爲富庻貢賦啇旅皆出其地及矦景之亂掠金帛旣盡乃掠人而食之或賣於北境遺民殆盡矣是時唯荆益所部尚完實太尉益州刺史武陵王紀移告征鎭使丗子圓照帥兵三萬受湘東王節度圓照軍至巴水繹授以信州刺史令屯白帝未許東下六月辛巳以南郡王大連行楊州事江夏王大款山陽王大成宜都王大封自信安間道奔江陵齊王封宗室髙岳等十人功臣庫狄干等七人皆爲王癸未封弟浚爲永安王淹爲平陽王浟爲彭城王演爲常山王渙爲上黨王淯爲襄城王湛爲長廣王湝爲任城王湜爲髙陽王濟爲愽陵王凝爲新平王潤爲馮翊王洽爲漢陽王鄱陽王範旣卒矦瑱往依莊鐵鐵忌之瑱不自安丙戍詐引鐡謀事因殺之自據豫章尋陽王大心遣徐嗣徽夜襲湓城安南矦恬裴之横等擊走之齊主娶趙郡李希宗之女生子殷及紹德又納叚韶之妹及將建中宫高隆之高德政欲結勲貴之援乃言漢婦人不可爲天下母宜更擇美配帝不從丁亥立李氏爲皇后以叚氏爲昭儀子殷爲皇太子庚寅以庫狄干爲太宰彭樂爲太尉潘相樂爲司徒司馬子如爲司空辛卯以清河王岳爲司州牧矦景以羊鴉仁爲五兵尚書庚子鴉仁出奔江西將赴江陵至東莞盗疑其懐金邀殺之魏人欲令岳陽王詧發哀嗣位詧辭不受丞相泰使榮權冊命詧爲梁王始建臺置百官陳霸先修﨑頭古城徙居之初燕昭成帝奔髙麗使其族人馮業以三百人浮海奔宋因留新㑹自業至孫融丗爲羅州刺史融子寶爲髙涼太守髙涼洗氏丗為蠻酋部落十餘萬家有女多籌略善用兵諸洞皆服其信義融聘以爲寶婦融雖累丗爲方伯非其土人號令不行洗氏約束本宗使從民禮每與寶參決辭訟首領有犯雖親戚無所縱舎由是馮氏始得行其政髙州刺史李遷仕據大臯口遣使召寶寶欲往洗氏止之曰剌史無故不應召太守必欲詐君共反耳寶曰何以知之洗氏曰剌史􅀍召援臺乃稱有疾鑄兵聚衆而後召君此必欲質君以發君之兵也願且無往以觀其變數日遷仕果反遣主帥杜平虜將兵入灨石城魚梁以逼南康陳霸先使周文育擊之洗氏謂寶曰平虜驍將也今入灨石與官軍相拒􅀔未得還遷仕在州無能爲也君􅀂自往必有戰鬬宜遣使卑辭厚禮告之曰身未敢出欲遣婦參彼聞之必憙而無備我將千餘人歩擔雜物唱言輸賧得至柵下破之必矣寶從之遷仕果不設備洗氏襲擊大破之遷仕走保寧都文育亦擊走平虜據其城洗氏與霸先㑹於灨石還謂寶曰陳都督非常人也甚得衆心必能平賊君宜厚資之湘東王繹以霸先爲豫州刺史領豫章内史辛丑裴之横攻稽亭徐嗣徽擊走之秋七月辛亥齊立丗宗妃元氏爲文襄皇后宫曰靜德又封丗宗子孝琬爲河間王孝瑜爲河南王乙卯以尚書令封隆之録尚書事尚書左僕射平陽王淹爲尚書令辛酉梁王詧入朝于魏初東魏遣儀同武威牒雲洛等迎鄱陽丗子嗣使鎭皖城嗣未及行任約軍至洛等引去嗣遂失援出戰敗死約遂略地至湓城尋陽王大心遣司馬韋質出戰而敗帳下猶有戰士千餘人咸勸大心走保建州大心不能用戊辰以江州降約先是大心使前太子洗馬韋臧鎭建昌有甲士五千聞尋陽不守欲帥衆奔江陵未發爲麾下所殺臧粲之子也于慶略地至豫章矦瑱力屈降之慶送瑱於建康景以瑱同姓待之甚厚留其妻子及弟爲質遣瑱隨慶徇蠡南諸郡以瑱爲湘州刺史初巴山人黄灋􅉤有勇力矦景之亂合徒衆保鄉里太守賀詡下江州命灋􅉤監郡事灋􅉤屯新淦于慶自豫章分兵襲新淦灋􅉤敗之陳霸先使周文育進軍擊慶灋􅉤引兵㑹之邵陵王綸聞任約將至使司馬蔣思安將精兵五千襲之約衆潰思安不設備約收兵襲之思安敗走湘東王繹攺宜都爲宜州以王琳爲剌史是月以南郡王大連爲江州剌史魏丞相泰以齊主稱帝帥諸軍討之以齊王廓鎭隴右徴秦州剌史宇文導爲大將軍都督二十三州諸軍事屯咸陽鎭關中益州沙門孫天英帥徒數千人夜攻州城武陵王紀與戰斬之邵陵王綸大脩鎧仗將討矦景湘東王繹惡之八月甲午遣左衞將軍王僧辯信州剌史鮑泉等帥舟師一萬東趣江郢聲言拒任約且云迎邵陵王還江陵授以湘州齊主初立勵精爲治趙道德以事屬黎陽太守清河房超超不發書棓殺其使齊主善之命守宰各設棓以誅屬請之使乆之都官中郎宋軌奏曰􅀂受使請賕猶致大戮身爲枉灋何以加罪乃罷之司都功曹張老上書請定齊律詔右僕射薛琡等取魏麟趾格更討論損益之齊主簡練六坊之人毎一人必當百人任其臨陳必死然後取之謂之百保鮮卑又簡華人之勇力絶倫者謂之勇士以備邊要始立九等之户富者稅其錢貧者役其力九月丁巳魏軍發長安王僧辯軍至鸚鵡洲郢州司馬劉龍虎等潜送質於僧辯邵陵王綸聞之遣其子威正矦礩將兵擊之龍虎敗奔于僧辯綸以書責僧辯曰將軍前年殺人之姪今􅀊伐人之兄以此求榮恐天下不許僧辯送書于湘東王繹繹命進軍辛酉綸集其麾下於西園涕泣言曰我本無佗志在滅賊湘東常謂與之爭帝遂爾見伐今日欲守則交絶糧儲欲戰則取笑千載不容無事受縛當於下流避之麾下壯士爭請出戰綸不從與礩自倉門登舟北出僧辯入據郢州繹以南平王恪爲尚書令開府儀同三司丗子方諸爲郢州刺史王僧辯爲領軍將軍綸遇鎭東將軍裴之髙於道之髙之子畿掠其軍器綸與左右輕舟奔武昌澗飲寺僧灋馨匿綸於巖穴之下綸長史韋質司馬姜律等聞綸尚存馳往迎之説七柵流民以求糧仗綸出營巴水流民八九千人附之稍收散卒屯于齊昌遣使請降于齊齊以綸爲梁王湘東王繹攺封皇子大款爲臨川王大成爲桂陽王大封爲汝南王癸亥魏軍至潼關庚午齊主如􅀳陽命太子殷居涼風堂監國南郡王中兵參軍張彪等起兵於􅀂邪山攻破浙東諸縣有衆數萬吳郡人陸令公等説太守南海王大臨往依之大臨曰彪􅀂成功不資我力如其橈敗以我自解不可往也任約進宼西陽武昌􅀄寜州剌史彭城徐文盛募兵數萬人討矦景湘東王繹以爲秦州剌史使將兵東下與約遇於武昌繹以廬陵王應爲江州剌史以文盛爲長史行府州事督諸將拒之應續之子也邵陵王綸引齊兵未至移營馬柵距西陽八十里任約聞之遣儀同叱羅通子等將鐵􅀐二百襲之綸不爲備䇿馬亡走時湘東王繹亦與齊連和故齊人觀望不助綸定州剌史田祖龍迎綸綸以祖龍爲繹所厚懼爲所執復歸齊昌行至汝南魏所署汝南城主李素綸之故吏也開城納之任約遂據西陽武昌裴之高帥子弟部曲千餘人至夏首湘東王繹召之以爲新興永寜二郡太守又以南平王恪爲武州剌史鎭武陵初邵陵王綸以衡陽王獻爲齊州剌史鎭齊昌任約擊擒之送建康殺之獻暢之孫也乙亥進矦景位相國封二十郡爲漢王加殊禮岳陽王詧還襄陽黎州民攻剌史張賁賁棄城走州民引氏酋北益州剌史楊法琛據黎州命王賈二姓詣武陵王紀請法琛爲剌史紀􅀷責之囚法琛質子崇顒崇虎冬十月丁丑朔法琛遣使附魏己卯齊主至􅀳陽宫廣武王長弼與并州剌史叚韶不恊齊主將如􅀳陽長弼言於帝曰韶擁彊兵在彼恐不知人意豈可徑往投之帝不聽旣至以長弼語告之曰如君忠誠人猶有讒況其餘乎長弼永樂之弟也乙酉以特進元韶爲尚書左僕射叚韶爲右僕射乙未矦景自加宇宙大將軍都督六合諸軍事以詔文呈上上驚曰將軍乃有宇宙之號乎立皇子大鈞爲西陽王大威爲武寧王大球爲建安王大昕爲義安王大摯爲綏建王大圜爲樂梁王齊東徐州刺史行臺辛術鎭下邳十一月矦景徴租入建康術帥衆度淮斷之燒其榖百萬石遂圍陽平景行臺郭元建引兵救之壬戍術略三千餘家還下邳武陵王紀帥諸軍發成都湘東王繹遣使以書止之曰蜀人勇悍易動難安弟可鎭之吾自當滅賊又别紙云地擬孫劉各安境界情􅀷魯衞書信􅁪通甲子南平王恪帥文武拜牋推湘東王繹爲相國揔百揆繹不許魏丞相泰自弘農爲橋濟河至建州丙寅齊主自將出頓東城泰聞其軍容嚴盛歎曰髙歡不死矣㑹乆雨自秋及冬魏軍畜産多死乃自蒲坂還於是河南自洛陽河北自平陽巳東皆入於齊丁卯徐文盛軍貝磯任約帥水軍逆戰文盛大破之斬叱羅子通趙威方仍進軍大舉口矦景遣宋子仙等將兵二萬助約以約守西陽乆不能進自出屯􅀳熈南康王㑹理以建康空虚與太子左衞將軍柳敬禮西郷矦勸東郷矦勔謀起兵誅王偉安樂矦乂理出奔長蘆集衆得千餘人建安矦賁中宿丗子子邕知其謀以告偉偉収㑹理敬禮勸勔及㑹理弟祁陽矦通理俱殺之乂理爲左右所殺錢塘禇冕以㑹理故舊捶掠千計終無異言㑹理隔壁謂之曰禇郎卿豈不爲我致此卿雖忍死明我我心實欲殺賊冕竟不服景乃宥之勸昺之子賁正德之弟子子邕憺之孫也帝自即位以來景防衞甚嚴外人莫得進見唯武林矦諮及僕射王克舎人殷不害並以文弱得出入卧内帝與之講論而巳及㑹理死克不害懼禍稍自踈諮獨不離帝朝請無絶景惡之使其仇人刁戍刺殺諮於廣莫門外帝之即位也景與帝登重雲殿禮佛爲誓云自今君臣兩無猜貳臣固不􅀒陛下陛下亦不得􅀒臣及㑹理謀泄景疑帝知之故殺諮帝自知不乆指所居殿謂殷不害曰龐涓當死此下景自帥衆討楊白華于宣城白華力屈而降景以其北人全之以爲左民尚書誅其兄子彬以報來亮之怨十二月丙子朔景封建安矦賁爲竟陵王中宿丗子子邕爲隨王仍賜姓矦氏􅊨辛丑齊主還鄴􅊨邵陵王綸在汝南脩城池集士卒將圖安陸魏安州刺史馬祐以告丞相泰泰遣楊忠將萬人救安陸武陵王紀遣潼州刺史楊乾運南梁州刺史譙淹合兵二萬討楊法琛法琛􅀤兵據劒閣以拒之矦景還建康初魏敬宗以尔朱榮爲柱國大將軍位在丞相上榮敗此官遂廢大統三年文帝復以丞相泰爲之其後功參佐命望實俱重者亦居此官凢八人曰安定公宇文泰廣陵王欣趙郡公李弼隴西公李虎河内公獨孤信南陽公趙貴常山公于謹彭城公矦莫陳崇謂之八柱國泰始籍民之才力者爲府兵身租庸調一切蠲之以農隙講閲戰陳馬畜糧備六家供之合爲百府每府一郎將主之分屬二十四軍泰任揔百揆督中外諸軍欣以宗室宿望從容禁闥而巳餘六人各督二大將軍凡十二大將軍毎大將軍各統開府二人開府各領一軍是後功臣位至柱國大將軍開府儀同三司儀同三司者甚衆率爲散官無所統御雖有繼掌其事者聞望皆出諸公之下云齊主命散􅀐侍郎宋景業造天保曆行之資治通鑑卷第一百六十三
