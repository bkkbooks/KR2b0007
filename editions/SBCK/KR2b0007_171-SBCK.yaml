front:
  text: 資治通鑑卷第一百七十一
  hash: sha256:2b051e6d54069690411db2d56bed48fbb1f21a238ff80eac17046cac46ae1ddf
body:
  text: 臣司馬光奉勑編集陳紀五逄敦牂凡三年起玄黓執徐盡册髙宗宣皇帝上之下太建四年春正月丙午以尚書僕射徐陵爲左僕射中書監王勵爲右僕射己巳齊主祀南郊庚午上享太廟辛未齊主贈琅邪王儼爲楚恭哀帝以慰太后心又以儼妃李氏爲楚帝后二月癸酉周遣大將軍昌城公深聘於突厥司賔李除小賔部賀遂禮聘於齊深護之子也己卯齊以衛菩薩爲太尉辛巳以并省吏部尚書髙元海爲尚書左僕射乙酉封皇子叔卿爲建安王庚寅齊以尚書左僕射唐邕爲尚書令侍中祖珽爲左僕射􅀄胡太后既幽於北宫珽欲以陸令萱爲太后爲令萱言魏保太后故事且謂人曰陸雖婦人然實雄傑自女媧以來未之有也令萱亦謂珽爲國師國寳由是得僕射三月癸卯朔日有食之初周太祖爲魏相立左右十二軍揔屬相府太祖殂皆受晉公護處分凡所徴發非護書不行護第屯兵侍衛盛於宫闕諸子僚屬皆貪殘恣橫士民患之周主深自晦匿無所􅀜預人不測其淺深護問稍伯大夫庾季才曰比日天道何如季才對曰荷恩深厚敢不盡言頃上台有變公宐歸政天子請老私門此則享期頥之壽受旦奭之美子孫常爲藩屏不然非復所知護沈吟乆之曰吾本志如此但辭未獲免耳公旣王官可依朝例無煩别參寡人也自是踈之衛公直帝之母弟也深昵於護及沌口之敗坐免官由是怨護勸帝誅之冀得其位帝乃宻與直及右宫伯中大夫宇文神舉内史下大夫太原王軌右侍上士宇文孝伯謀之神舉顯和之子孝伯安化公深之子也帝每於禁中見護常行家人禮太后賜護坐帝立侍於旁丙辰護自同州還長安帝御文安殿見之因引護入含仁殿謁太后且謂之曰太后春秋髙頗好飲酒雖屢諫未蒙垂納兄今入朝願更啓請因出懐中酒誥授之曰以此諌太后護旣入如帝所戒讀酒誥未畢帝以玉珽自後擊之護踣於地帝令宦者何泉以御刀斫之泉惶懼斫不能傷衛公直匿於戸内躍出斬之時神舉等皆在外更無知者帝召宫伯長孫覽等告以護巳誅令收護子柱國譚公㑹大將軍莒公至崇業公静正平公乾嘉及其弟乾基乾光乾蔚乾祖乾威并柱國北地矦龍恩龍恩弟大將軍萬壽大將軍劉勇中外府司錄尹公正袁傑膳部下大夫李安等於殿中殺之覽稚之孫也􅀄護旣殺趙貴等諸將多不自安侯龍恩爲護所親其從弟開府儀同三司植謂龍恩曰主上春秋旣富安危繋於數公若多所誅戮以自立威權豈唯社稷有累􅆑之危恐吾宗亦緣此而敗兄安得知而不言龍恩不能從植又承閒言於護曰公以骨肉之親當社稷之寄願推誠王室擬迹伊周則率土幸甚護曰我誓以身報國卿豈謂吾有佗志邪又聞其先與龍恩言隂忌之植以憂卒及護敗龍恩兄弟皆死髙祖以植爲忠特免其子孫大司馬兼小􅃁宰雍州牧齊公憲素爲護所親任賞罰之際皆得參預權勢頗盛護欲有所陳多令憲聞奏其間或有可不憲慮主相嫌􅂩每曲而暢之帝亦察其心及護死召憲入憲免冠拜謝帝慰勉之使詣護第收兵符及諸文籍衛公直素忌憲固請誅之帝不許護丗子訓爲蒲州刺史是夜帝遣柱國越公盛乗傳徴訓至同州賜死昌城公深使突厥未還遣開府儀同三司宇文德齎璽書就殺之護長史代郡叱羅恊司録弘農馮遷及所親任者皆除名丁巳大赦改元以宇文孝伯爲車騎大將軍與王軌並加開府儀同三司初孝伯與帝同日生太祖愛之養於第中幼與帝同學及即位欲引致左右託言欲與孝伯講習舊經故護弗之疑也以爲右侍上士出入卧内預聞機務孝伯爲人沈正忠諒朝政得失外間細事無不使帝聞之帝閲護書記有假託符命妄造異謀者皆坐誅唯得庾季才書兩紙盛言緯􅃸災祥宐返政歸權帝賜季才粟三百石帛二百段遷太中大夫癸亥以尉遲迥爲太師於國竇熾爲太傅李穆爲太保齊公憲爲大冢宰衛公直爲大司徒陸通爲大司馬柱國辛威爲大司寇趙公招爲大司空時帝始親覽朝政頗事威刑雖骨肉無所寛借齊公憲雖遷冢宰實奪之權又謂憲侍讀裴文舉曰昔魏末不綱太祖輔政及周室受命晉公復執大權積習生常愚者謂灋應如是豈有年三十天子而可爲人所制乎詩云夙夜匪懈以事一人一人謂天子耳卿雖陪侍齊公不得遽同爲臣欲死於所事宐輔以正道勸以義方輯睦我君臣恊和我兄弟勿令自致嫌疑文舉咸以白憲憲指心撫几曰吾之夙心公寧不知但當盡忠竭節耳知復何言衛公直性浮詭貪狠意望大冢宰旣不得殊怏怏更請爲大司馬欲據兵權帝揣知其意曰汝兄弟長幼有序豈可返居下列由是用爲大司徒夏四月周遣工部成公建小禮部辛彦之聘於齊庚寅周追尊略陽公爲孝閔皇帝癸巳周立皇子魯公贇爲太子大赦五月癸卯王勵卒齊尚書右僕射祖珽勢傾朝野左丞相咸陽王斛律光惡之遥見輒罵曰多事乞索小人欲行何計又甞謂諸將曰邊境消息兵馬處分趙令􅁪與吾輩參論盲人掌機密以來全不與吾輩語正恐誤國家事耳光甞在朝堂垂簾坐珽不知乗馬過其前光怒曰小人乃敢爾後珽在内省言聲髙慢光適過聞之又怒珽覺之私賂光從奴問之奴曰自公用事相王每夜抱􅂰歎曰盲人入國必破矣穆提婆求娶光庶女不許齊主賜提婆晉陽田光言於朝曰此田神武帝以來常種禾飼馬數千匹以擬冦敵今賜提婆無乃闕軍務也由是祖穆皆怨之斛律后無寵珽因而閒之光弟羡爲都督幽州刺史行臺尚書令亦善治兵士馬精彊鄣􅇋嚴整突厥畏之謂之南可汗光長子武都爲開府儀同三司梁兖二州刺史光雖貴極人臣性節儉不好聲色罕接賔客杜絶饋餉不貪權勢毎朝廷㑹議常獨後言言􅂺合理或有表䟽令人執筆口占之務從省實行兵倣其父金之灋營舎未定終不入幕或竟日不坐身不脱介胄常爲士卒先士卒有罪唯大杖撾背未甞妄殺衆皆争爲之死自結髪從軍未甞敗北深爲鄰敵所憚周勲州刺史韋孝寛密爲謡言曰百升飛上天明月照長安又曰髙山不推自崩槲木不扶自舉令諜人傳之於鄴鄴中小兒歌之於路珽因續之曰盲老公背受大斧饒舌老母不得語使其妻兄鄭道蓋奏之帝以問珽珽與陸令萱皆曰實聞有之珽因解之曰百升者斛也盲老公謂臣也與國同憂饒舌老母似謂女侍中陸氏也且斛律累丗大將明月聲震􅀜西豐樂威行突厥女爲皇后男尚公主謡言甚可畏也帝以問韓長鸞長鸞以爲不可事遂寢珽又見帝請閒唯何洪珍在側帝曰前得公啓即欲施行長鸞以爲無此理珽未對洪珍進曰若本無意則可既有此意而不决行萬一泄露如何帝曰洪珍言是也然猶未决㑹丞相府佐封士讓密啓云光前西討還敕令散兵光引兵逼帝城將行不軌事不果而止家藏弩甲奴僮千數每遣使往豐樂武都所隂謀往來若不早圖恐事不可測帝遂信之謂何洪珍曰人心亦大靈我前疑其欲反果然帝性怯恐即有變令洪珍馳召祖珽告之欲召光恐其不從命珽請遣使賜以駿馬語云明日將遊東山王可乗此同行光必入謝因而執之帝如其言六月戊辰光入至凉風堂劉桃枝自後撲之不仆顧曰桃枝常爲如此事我不負國家桃枝與三力士以弓弦􅇢其頸拉而殺之血流於地剗之迹終不㓕於是下詔稱其謀反并殺其子開府儀同三司丗雄儀同三司􅁪伽祖珽使二千石郎邢祖信簿録光家珽於都省問所得物祖信曰得弓十五宴射箭百刀七賜矟二珽厲聲曰更得何物曰得􅀥杖二十束擬奴僕與人鬬者不問曲直即杖之一百珽大慙乃下聲曰朝廷已加重刑郎中何宐爲雪及出人尤其抗直祖信慨然曰賢宰相尚死我何惜餘生齊主遣使就州斬解律武都又遣中領軍賀拔伏恩乗驛捕斛律羨仍以洛州行臺僕射中山獨孤永業代羨與大將軍鮮于桃枝發定州騎卒續進伏恩等至幽州門者白使人􅂨甲馬有汗宐閉城門羡曰敕使豈可疑拒出見之伏恩執而殺之初羨常以盛滿爲懼表解所職不許臨刑歎曰富貴如此女爲皇后公主滿家常使三百兵何得不敗及其五子伏護丗逹丗遷丗辨丗酋皆死周主聞光死爲之大赦祖珽與侍中髙元海共執齊政元海妻陸令萱之甥也元海數以令萱宻語告珽珽求爲領軍齊主許之元海密言於帝曰孝徴漢人兩目又盲豈可爲領軍因言珽與廣寧王孝珩交結由是中止珽求見自辨且言臣與元海素嫌必元海譛臣帝弱顔不能諱以實告之珽因言元海與司農卿尹子華等結爲朋黨又以元海所泄宻語告令萱令萱怒出元海為鄭州刺史子華等皆被黜珽自是專主機衡揔知騎兵外兵事内外親戚皆得顯位帝常令中要人扶侍出入直至永巷每同御榻論决政事委任之重羣臣莫比秋七月遣使如周八月庚午齊廢皇后斛律氏爲庶人以任城王湝爲右丞相馮翊王潤爲太尉蘭陵王長恭爲大司徒廣寧王孝珩爲大將軍安德王延宗爲大司徒齊使領軍封輔相聘于周辛未周使司城中大夫杜杲來聘上謂之曰若以合從圖齊宐以樊鄧見與對曰合從圖齊豈弊邑之利必湏城鎭宐待得之於齊先索漢南使臣不敢聞命初齊胡太后自愧失徳欲求悅於齊主乃飾其兄長仁之女置宫中令帝見之帝果悦納爲昭儀又斛律后廢陸令萱欲立穆夫人太后欲立胡昭儀力不能遂乃卑辭厚禮以求令萱結爲姊妺令萱亦以胡昭儀寵幸方隆不得已與祖珽白帝立之戊子立皇后胡氏己丑齊以北平王仁堅爲尚書令特進許季良爲左僕射彭城王寳德爲右僕射癸巳齊主如晉陽九月庚子朔日有食之辛亥大赦冬十月庚午周詔江陵所虜充官口者悉免爲民辛未周遣小匠師楊􅎰等來聘周綏德公陸通卒乙酉上享太廟齊陸令萱欲立穆昭儀爲皇后每私謂齊主曰豈有男爲皇太子而身爲婢妾者乎胡后有寵於帝不可離閒令萱乃使人行厭蠱之術旬朔之間胡后精神恍惚言笑無􅁪帝漸畏而惡之令萱一旦忽以皇后服御衣被穆昭儀又别造寳帳爰及枕席器玩莫非珍竒坐昭儀於帳中謂帝曰有一聖女出將大家看之及見昭儀令萱乃曰如此人不作皇后遣何物人作帝納其言甲午立穆氏爲右皇后以胡氏爲左皇后十一月庚戌周主行如羌橋集長安以東諸軍都督以上頒賜有差乙卯還宫以趙公招爲大司馬壬申周主如斜谷集長安以西諸軍都督以上頒賜有差丙戌還宫庚寅周主遊道㑹􅁐以上善殿壯麗焚之十二月辛巳周主祀南郊齊胡后之立非陸令萱意令萱一旦於太后前作色而言曰何物親姪作如此語太后問其故令萱曰不可道因問之乃曰語大家云太后行多非灋不可以訓太后大怒呼后出立剃其髮送還家辛丑廢胡后爲庶人然齊主猶思之毎致物以通意自是令萱與其子侍中穆提婆勢傾内外賣官鬻獄聚歛無厭每一賜與動傾府藏令萱則自太后以下皆受其指麾提婆則唐邕之徒皆重迹屏氣殺生與奪唯意所欲乙巳周以柱國田弘爲大司空乙卯周主享太廟是歳突厥木杆可汗卒復捨其子大邏便而立其弟是爲佗鉢可汗佗鉢以攝圖爲尓伏可汗統其東靣又以其弟褥但可汗之子爲歩離可汗居西面周人與之和親歳給繒絮錦綵十萬段突厥在長安者衣錦食肉常以千数齊人亦畏其爲冦爭厚賂之佗鉢益驕謂其下曰但使我在南兩兒常孝何憂於貧阿史那后無寵於周主神武公竇毅尚襄陽公主生女尚㓜密言於帝曰今齊陳鼎峙突厥方彊願舅抑情慰撫以生民爲念帝深納之五年春正月癸酉以吏部尚書沈君理爲右僕射戊寅齊以并省尚書令髙阿那肱録尚書事揔知外兵及内省機宻與侍中城陽王穆提婆領軍大將軍昌黎王韓長鸞共處衡軸號曰三貴蠹國害民日月滋甚長鸞弟萬歳子寳行寳信並開府儀同三司萬歳仍兼侍中寳行寳信皆尚公主每羣臣旦參帝常先引長鸞顧訪出後方引奏事官若不視事内省有急事皆附長鸞奏聞軍國要密無不經手尤疾士人朝夕宴私唯事􅉲訴常帯刀走馬未甞安行瞋目張拳有噉人之勢朝士咨事莫敢仰視動致呵叱毎罵云漢狗大不可耐唯須殺之庚辰齊遣崔象來聘辛巳上祀南郊甲午享太廟二月辛丑祀明堂乙巳齊立右皇后穆氏爲皇后穆后母名輕霄本穆氏之婢也面有黥字后旣以陸令萱爲母穆提婆爲外家號令萱曰太姬太姬者齊皇后母號也視一品班在長公主上由是不復問輕霄輕霄自療面欲求見后太姬使禁掌之竟不得見齊主頗好文學丙午祖珽奏置文林館多引文學之士以充之謂之待詔以中書侍郎愽陵李徳林黃門侍郎琅邪顔之推同判館事又命共撰修文殿御覽甲寅周太子贇廵省西土乙卯齊以北平王堅録尚書事丁巳齊主如晉陽壬戍周遣司㑹矦莫陳凱等聘於齊庚辰齊主還鄴三月己卯周太子於岐州獲二白鹿以獻周主詔曰在徳不在瑞帝謀伐齊公卿各有異同唯鎮前将軍吴明徹决䇿請行帝謂公卿曰朕意已决卿可共舉元帥衆議以中權將軍淳于量位重共署推之尚書左僕射徐陵獨曰吴明徹家在淮左悉彼風俗將略人才當今亦無過者都官尚書河東裴忌曰臣同徐僕射陵應聲曰非但明徹良將裴忌即良副也壬午分命衆軍以明徹都督征討諸軍事忌監軍事統衆十萬伐齊明徹出秦郡都督黄灋􅉤出歴陽夏四月己亥周主享太廟癸卯前巴州刺史魯廣逹與齊師戰於大峴破之戊申齊以蘭陵王長恭爲太保南陽王綽爲大司馬安德王延宗爲太尉武興王普爲司徒開府儀同三司宐陽王趙彦深爲司空齊人於秦郡置秦州州前江浦通涂水齊人以大木爲柵於水中辛亥吳明徹遣豫章内史程文季將驍勇㧞其柵克之文季靈洗之子也齊人議禦陳師開府儀同三司王紘曰官軍比屢失利人情騷動若復出頓江淮恐北狄西冦乗弊而來則丗事去矣莫若薄賦省徭息民養士使朝廷恊睦遐邇歸心天下皆當肅清豈直陳氏而已不從遣軍救歷陽庚申黃灋􅉤擊破之又遣開府儀同三司尉破胡長孫洪略救秦州趙彦深私問計於祕書監源文宗曰吳賊侏張遂至於此弟往爲秦涇刺史悉江淮閒情事今何術以禦之文宗曰朝廷精兵必不肯多付諸將數千已下適足爲吳人之餌尉破胡人品王之所知敗績之事匪朝伊夕國家待遇淮南失之同於蒿箭如文宗計者不過專委王琳招募淮南三四萬人風俗相通能得死力兼令舊將將兵屯於淮北足以固守且琳之於頊必不肯北面事之明矣竊謂此計之上者若不推赤心於琳更遣餘人掣肘復成速禍彌不可爲彦深歎曰弟此䇿誠足制勝千里但口舌爭之十日已不見從時事至此安可盡言因相顧流涕文宗名彪以字行子恭之子也文宗子師爲左外兵郎中攝祠部甞白髙阿那肱龍見當雩阿那肱驚曰何處龍見其色如何師曰龍星初見禮當雩祭非眞龍也阿那肱怒曰漢兒多事强知星宿遂不祭師出竊歎曰禮旣廢矣齊能乆乎齊師選長大有膂力者爲前隊號蒼頭犀角大力其鋒甚鋭又有西域胡善射弦無虛發衆軍尤憚之辛酉戰于吕梁將戰吳明徹謂巴山太守蕭摩訶曰􅀂殪此胡則彼軍奪氣君才不减􅀜羽矣摩訶曰願示其狀當爲公取之明徹乃召降人有識胡者使指示之自酌酒以飲摩訶摩訶飲畢馳馬衝齊軍胡挺身出陳前十餘歩彀弓未發摩訶遥擲銑鋧正中其額應手而仆齊軍大力十餘人出戰摩訶又斬之於是齊軍大敗尉破胡走長孫洪略戰死破胡之出師也齊人使侍中王琳與之俱琳謂破胡曰吳兵甚鋭宐以長䇿制之愼勿輕鬬破胡不從而敗琳單騎僅免還至彭城齊人即使之赴壽陽召募以拒陳師復以盧濳爲楊州道行臺尚書甲子南譙太守徐槾克石梁城五月己巳瓦梁城降癸酉陽平郡降甲戍徐槾克廬江城歷陽窘蹙乞降黃灋􅉤緩之則又拒守灋􅉤怒帥卒急攻丙子克之盡殺戍卒進軍合肥合肥望旗請降灋􅉤禁侵掠撫勞戍卒與之盟而縱之丁丑周以柱國矦莫陳瓊爲大宗伯榮陽公司馬消難爲大司寇江陵揔管陸騰爲大司空瓊崇之弟也己卯齊北高唐郡降辛巳詔南豫州刺史黃灋􅉤徙鎮歷陽乙酉南齊昌太守黃詠克齊昌外城丙戍廬陵内史任忠軍于東􅀜克其東西二城進克蘄城戊子又克譙郡城秦州城降癸巳􅀲歩胡墅二城降帝以秦郡吳明徹之郷里詔具太牢令拜祠上冢文武羽儀甚盛鄉人榮之齊自和士開用事以來政體隳紊及祖珽執政頗收舉才望内外稱羙珽復欲増損政務沙汰人物官號服章並依故事又欲黜諸閹豎及羣小輩爲致治之方陸令萱穆提婆議頗同異珽乃諷御史中丞麗伯律令劾主書王子冲納賂知其事連提婆欲使􅂍罪相及望因此并坐及令萱猶恐齊主溺於近習欲引后黨爲援乃請以胡后兄君瑜爲侍中中領軍又徴君瑜兄梁州刺史君璧欲以爲御史中丞令萱聞而懐怒百方排毁出君瑜爲金紫光禄大夫解中領軍君璧還鎭梁州胡后之廢頗亦由此釋王子沖不問珽日以益踈諸宦者更共􅉲之帝以問陸令萱令萱憫嘿不對三問乃下牀拜曰老婢應死老婢始聞和士開言孝徴多才博學意謂善人故舉之比來觀之大是姦臣人寔難知老婢應死帝令韓長鸞檢案長鸞素惡珽得其詐出敇受賜等十餘事帝以甞與之重誓故不殺解珽侍中僕射出爲北徐州刺史珽求見帝長鸞不許遣人推岀栢閤珽坐不肯行長鸞令牽曵而出癸巳齊以領軍穆提婆爲尚書左僕射侍中中書監段孝言爲右僕射孝言韶之弟也初祖珽執政引孝言爲助除吏部尚書孝言凡所進擢非賄則舊求仕者或於廣㑹􅂰行跪伏公自陳請孝言氣色􅀭􅀭以爲己任隨事酬許將作丞崔成忽於衆中抗言曰尚書天下尚書豈獨段家尚書也孝言無辭以應唯厲色遣下而已旣而與韓長鸞等共構祖珽逐而代之齊蘭陵武王長恭貌羙而勇以邙山之捷威名大盛武士歌之爲蘭陵王入陳曲齊主忌之及代段韶督諸軍攻定陽頗務聚歛其所親尉相願問之曰王受朝寄何得如此長恭未應相願曰豈非以邙山之捷欲自穢乎長恭曰然相願曰朝廷若忌王即當用此爲罪無乃避禍而更速之乎長恭涕泣前􅂰問計相願曰王前旣有功今復告捷聲威太重宐屬疾在家勿預時事長恭然其言未能退及江淮用兵恐復爲將歎曰我去年靣腫今何不發自是有疾不療齊主遣使酖殺之六月庚子郢州刺史李綜克灄口城乙巳任忠克合州外城庚戍淮陽沐陽郡並弃城走壬子周皇孫衍生齊主遊南苑從官賜死者六十人以髙阿那肱爲司徒癸丑程文季攻齊涇州拔之乙卯宣毅司馬湛佗克新蔡城丙辰齊使開府儀同三司王紘聘於周癸亥黃灋􅉤克合州吳明徹進攻仁州甲子克之治明堂秋七月戊辰齊遣尚書左丞陸騫將兵二萬救齊昌出自巴蘄遇西陽太守汝南周炅炅留羸弱設疑兵以當之身帥精鋭由閒道邀其後大破之己巳征北大將軍吳明徹軍至峽口克其北岸城南岸守者弃城走周炅克巴州淮北絳城及穀陽士民並殺其戍主以城降齊巴陵王王琳與揚州刺史王貴顯保壽陽外郭吳明徹以琳􅀄入衆心未固丙戍乗夜攻之城潰齊兵退據相國城及金城八月乙未山陽城降壬寅盱眙城降壬子戎昭將軍徐敬辯克海安城青州東海城降戊午平固矦敬㤗等克晉州九月甲子陽平城降壬申高陽太守沈善慶克馬頭城甲戍齊安城降丙子左衛將軍樊毅克廣陵楚子城壬午周太子贇納妃楊氏妃大將軍隨公堅之女也太子好昵近小人左宫正宇文孝伯言於周王曰皇太子四海所屬而德聲未聞臣忝宮官實當其責且春秋尚少志業未成請妙選正人爲其師友調護聖質猶望日就月將如或不然悔無及矣帝歛容曰卿丗載鯁直竭誠所事觀卿此言有家風矣孝伯拜謝曰非言之難受之難也帝曰正人豈復過卿於是以尉遲運爲右宫正運迥之弟子也帝甞問萬年縣丞南陽樂運曰卿言太子何如人對曰中人帝顧謂齊公憲曰百官佞我皆稱太子聦明睿智唯運所言忠直耳因問運中人之狀對曰如齊􅁊公是也管仲相之則霸豎貂輔之則亂可與爲善可與爲惡帝曰我知之矣乃妙選宫官以輔之仍擢運爲京兆丞太子聞之意甚不悦癸未沈君理卒壬辰晦前鄱陽内史魯天念克黃城冬十月甲午郭黙城降己亥以特進領國子祭酒周弘正爲尚書右僕射齊國子祭酒張雕以經授齊主爲侍讀帝甚重之雕與寵胡何洪珍相結穆提婆韓長鸞等惡之洪珍薦雕爲侍中加開府儀同三司奏度支事大爲帝所委信常呼愽士雕自以出於微賤致位大臣欲立効以報恩論議抑揚無所回避省宫掖不急之費禁約左右驕縱之臣數譏切寵要獻替帷幄帝亦深倚仗之雕遂以澄清爲己任意氣甚髙貴倖皆側目隂謀陷之尚書左丞封孝琰隆之之弟子也與侍中崔季舒皆為祖珽所厚孝琰嘗謂珽曰公是衣冠宰相異於餘人近習聞之大以為恨㑹齊主將如晉陽季舒與張雕議以為壽陽被圍大軍出拒之信使往往還須禀節度且道路小人或相驚恐以為大駕向并州畏避南冦若不啓諫恐人情駭動遂與從駕文官連名進諌時貴臣趙彦深唐邕段孝言等意有異同季舒與争未决長鸞遽言於帝曰諸漢官連名揔署聲云諌幸并州其實未必不反宜加誅戮辛丑齊主悉召已署名者集含章殿斬季舒雕孝琰及散騎常侍劉逖黄門侍郎裴澤郭遵於殿庭家屬皆徙北邊歸女配奚宫幼男下􅅙室沒入貲産癸卯遂如晉陽吴明徹攻壽陽堰肥水以灌城城中多病腫泄死者什六七齊行臺右僕射琅邪皮景和等救壽陽以尉破胡新敗怯懦不敢前屯於淮口敕使屢促之然始度淮衆數十萬去壽陽三十里頓軍不進諸將皆懼曰堅城未㧞大援在近將若之何明徹曰兵貴神速而彼結營不進自挫其鋒吾知其不敢戰明矣乙巳躬擐甲胄四靣疾攻一鼓㧞之生擒王琳王貴顯盧濳及扶風王可朱渾孝􅁉尚書左丞李騊駼送建康景和北遁盡收其駝馬輜重琳體貌閑雅喜怒不形於色彊記内敏軍府佐吏千數皆能識其姓名刑罰不濫輕財愛士得將卒心雖失地流寓在鄴齊人皆重其忠義及被擒故麾下將卒多在明徹軍中見者皆歔欷不能仰視争為之請命及致資給明徹恐其為變遣使追斬之於壽陽東二十里哭者聲如雷有一叟以酒脯來祭哭盡哀收其血而去田夫野老知與不知聞者莫不流涕齊穆提婆韓長鸞聞壽陽陷握槊不輟曰本是彼物從其取去齊主聞之頗以為憂提婆等曰假使國家盡失黄河以南猶可作一􅀛兹國更可憐人生如寄唯當行樂何用愁為左右嬖臣因共賛和之帝即大喜酣飲鼓舞仍使於黎陽臨河築城戍丁未齊遣兵萬人至潁口樊毅擊走之辛亥遣兵援蒼陵又破之齊主以皮景和全軍而還賞之除尚書令丙辰詔以壽陽復為豫州以黄城為司州以明徹為都督豫合等六州諸軍事車騎大將軍豫州刺史遣謁者蕭淳風就壽陽􅁽命於城南設壇士卒二十萬陳旗鼓戈甲明徹登壇拜受成禮而退將卒榮之上置酒舉杯屬徐陵曰賞卿知人陵避席曰定䇿聖衷非臣力也以黄灋􅉤為征西大將軍合州刺史戊午湛陀克齊昌城十一月甲戍淮隂城降庚辰威虜將軍劉桃枝克朐山城辛巳樊毅克濟隂城己丑魯廣逹攻濟南徐州克之以廣逹為北徐州刺史鎭其地齊北徐州民多起兵以應陳逼其州城祖珽命不閉城門禁人不得出衢路城中寂然反者不測其故疑人走城空不設僃珽忽令鼓譟震天反者皆驚走既而復結陳向城珽令錄事參軍王君植將兵拒之自乗馬臨陳左右射反者先聞其盲謂其必不能出忽見之大驚穆提婆欲令城䧟不遣援兵珽且戰且守十餘日反者竟散走詔懸王琳首於建康市故吏梁驃騎倉曹參軍朱瑒致書徐陵求其首曰竊以典午將滅徐廣為晉家遺老當塗已謝馬孚稱魏室忠臣梁故建寧公琳當離亂之辰揔方伯之任天厭梁徳尚思匡繼徒藴包胥之志終遘萇弘之眚至使身没九泉頭行千里伏惟聖恩博厚明詔爰發赦王經之哭許田横之葬不使壽春城下唯傳報葛之人滄洲島上獨有悲田之客陵為之啓上十二月壬辰朔并熊曇朗等首皆還其親屬瑒瘞琳於八公山側義故㑹葬者數千人瑒閒道奔齊别議迎葬尋有壽陽人茅智勝等五人密送其柩於鄴齊贈琳開府儀同三司録尚書事謚曰忠武王給輼輬車以葬之癸巳周主集羣臣及沙門道士帝自升高坐辨三教先後以儒爲先道爲次釋爲後乙未譙城降乙巳立皇子叔明爲宐都王叔獻爲河東王壬午任忠克霍州詔徴安州刺史周炅入朝初梁定州刺史田龍升以城降詔仍舊任及炅入朝龍升以江北六州七鎭叛入于齊齊遣歷陽王景安將兵應之詔以炅爲江北道大都督揔衆軍以討龍升斬之景安退走盡復江北之地是嵗突厥求昏于齊六年春正月壬戌朔周齊公憲等七人進爵為王己巳周主享太廟乙亥耕籍田壬子上享太廟甲申廣陵金城降二月壬午朔日有食之乙未齊主還鄴丁酉周紀國公賢等六人進爵為王辛亥上耕籍田齊朔州行臺南安王思好本高氏養子驍勇得邉鎮人心齊主使嬖臣斫骨光弁至州光弁不禮於思好思好怒遂反云欲入除君側之惡進軍至陽曲自號大丞相武衛將軍趙海在晉陽掌兵蒼猝不暇奏矯詔發兵拒之帝聞變使尚書令唐邕等馳之晉陽辛丑帝勒兵繼進未至思好軍敗投水死其麾下二千人劉桃枝圍之且殺且招終不降以至於盡先是有人告思好謀反韓長鸞女適思好子奏言是人誣告貴臣不殺無以息後乃斬之思好既誅告者弟伏訴闕下求贈官長鸞不為通丁未齊主還鄴甲寅以唐邕為録尚書事乙卯周主如雲陽宫丙辰周大赦庚申周叱奴太后有疾三月辛酉周主還長安癸酉太后殂帝居倚廬朝夕進一溢米羣臣表請累旬乃止命太子揔􅁵庶政衛王直譛齊王憲於帝曰憲飲酒食肉無異平日帝曰吾與齊王異生俱非正嫡特以吾故同􅃝括髪汝當愧之何論得失汝親太后之子特承慈愛但當自勉無論它人夏四月乙卯齊遣侍中薛孤康買弔於周且㑹葬初齊世祖為胡后造珠裙袴所費不可勝計為火所焚至是齊主復為穆后營之使商胡齎錦綵三萬與弔使偕往市珠周人不與齊主竟自造之及穆后愛衰其侍婢馮小憐大幸拜為淑妃與齊主坐則同席出則並馬誓同生死五月庚申周葬文宣皇后於永固陵周主跣行至陵所辛酉詔曰三年之䘮逹於天子但軍國務重須自聽朝衰麻之節苫廬之禮率遵前典以申罔極百僚宐依遺令既葬而除公卿固請依權制帝不許卒申三年之制五服之内亦令依禮庚午齊大赦齊人恐陳師渡淮使皮景和屯西兖州以僃之丙子周禁佛道二教經像悉毁罷沙門道士並令還俗并禁諸淫祀非祀典所載者盡除之六月壬辰周弘正卒壬子周更鑄五行大布錢一當十與布泉並行戊午周立通道觀以壹聖賢之教秋七月庚申周主如雲陽以右宫正尉遲運兼司武與薛公長孫覽輔太子守長安初帝取衛王直第為東宫使直自擇所居直厯觀府署無如意者末取廢陟屺寺欲居之齊王憲謂直曰弟子孫多此無乃􅄶小直曰一身尚不自容何論子孫直甞從帝校獵而亂行帝對衆撻之直積怨憤因帝在外遂作亂乙酉帥其黨襲肅章門長孫覽懼奔詣帝所尉遲運偶在門中直兵奄至手自闔門直黨與運争門斫傷運指僅而得閉直不得入縱火焚門運恐火盡直黨得進取宮中材木及牀榻以益火膏油灌之火轉熾乆之直不得進乃退運帥留守兵因其退而擊之直大敗帥百餘騎奔荆州戊子帝還長安八月辛卯擒直廢為庶人囚於别宫尋殺之以尉遲運為大將軍賜賚甚厚丙申周主復如雲陽癸丑齊主如晉陽甲辰齊以高勱為尚書右僕射九月庚申周主如同州冬十月丙申周遣御正弘農楊尚希禮部盧愷來聘愷柔之子也甲寅周主如蒲州丙辰如同州十一月甲戍還長安十二月戊戍以吏部尚書王瑒為右僕射度支尚書孔奐為吏部尚書瑒冲之子也時新復淮泗攻戰降附功賞紛紜奐識鑒精敏不受請託事無凝滯人皆悦服湘州刺史始興王叔陵屢諷有司求為三公奐曰衮章之職本以徳舉未必皇枝因以白帝帝曰始興那忽望公且朕兒為公須在鄱陽王後奐曰臣之所見亦如聖旨齊定州刺史南陽王綽喜為殘虐嘗出行見婦人抱兒奪以飼狗婦人號哭綽怒以兒血塗婦人縱狗使食之常云我學文宣伯之為人齊主聞之鎻詣行在至而宥之問在州何事最樂對曰多聚蠍於噐置狙其中觀之極樂帝即命夜索蠍一斗比曉得三二升置浴斛使人祼卧斛中號叫宛轉帝與綽臨觀喜噱不已因讓綽曰如此樂事何不早馳驛奏聞由是大有寵拜大將軍朝夕同戱韓長鸞疾之是歳出為齊州刺史將發使人誣告其反奏云此犯國灋不可赦帝不忍明
