seq: 53
front:
  text: 㑹目梁冀曰此跋扈將軍也冀聞深惡之閏月甲申冀使左右置毒於煑餅而進之帝苦煩甚使促召太尉李固固入前問帝得患所由帝尚能言曰食煑餅今腹中悶得水尚可活時冀亦在側曰恐吐不可飲水語未絶而崩固伏尸號哭推舉侍醫冀慮其事泄大惡之將議立嗣固與司徒胡廣司空趙戒先與冀書曰天下不幸頻年之閒國祚三絶今當立帝天下重器誠知太后垂心將軍勞慮詳擇其人務存聖明然愚情眷眷竊獨有懐逺尋先世廢立舊儀近見國家踐祚前事未嘗不詢訪公卿廣求羣議令上應天心下合衆望傳曰以天下與人易爲天下得人難昔昌邑之立昬亂日滋霍光憂愧發憤悔之折骨自非愽陸忠勇延年奮發大漢之祀幾將傾矣至憂至重可不熟慮悠悠萬事唯此為大國之興衰在此一舉冀得書乃召三公中二千石列矦大議所立固廣戒及大鴻臚杜喬皆以為清河王蒜明徳著聞又屬最尊親宜立為嗣朝臣莫不歸心而中常侍曹騰嘗謁蒜蒜不為禮宦者由此惡之初平原王翼旣貶歸河閒其父請分蠡吾縣以侯之順帝許之翼卒子志嗣梁太后欲以女弟妻志徴到夏門亭㑹帝崩梁冀欲立志衆論旣異憤憤不得意而未有以相奪曹騰等聞之夜往說冀曰將軍累世有椒房之親東攝萬機賔客縱横多有過差清河王嚴明若果立則將軍受禍不乆矣不如立蠡吾矦富貴可長保也冀然其言明日重㑹公卿冀意氣凶凶言辭激切自胡廣趙戒以下莫不懾憚皆曰惟大將軍令獨李固杜喬堅守本議冀厲聲曰罷㑹固猶望衆心可立復以書勸冀冀愈激怒丁亥冀説太后先策免固戊子以司徒胡廣為太尉司空趙戒為司徒與大將軍冀參録尚書事太僕袁湯為司空湯安之孫也庚寅使大將軍冀持節以王青葢車迎蠡吾矦志入南宫其日即皇帝位時年十五太后猶臨朝政秋七月乙卯葬孝質皇帝於靜陵
  hash: sha256:46706f624a2fa1aa369665f5ff3d9b8fed196c7bcc5afb27db28fc4678bcf332
body:
  text: 大將軍掾朱穆奏記勸戒梁冀曰明年丁亥之歳刑徳合於乾位易經龍戰之㑹陽道將勝隂道將負願將軍專心公朝割除私欲廣求賢能斥逺佞惡為皇帝置師傅得小心忠篤敦禮之士將軍與之俱入參勸講授師賢灋古此猶倚南山坐平原也誰能傾之議郎大夫之位本以式序儒術髙行之士今多非其人九卿之中亦有乖其任者惟將軍察焉又薦种暠欒巴等冀不能用穆暉之孫也九月戊戌追尊河閒孝王為孝穆皇夫人趙氏曰孝穆后廟曰清廟陵曰樂成陵蠡吾先矦曰孝崇皇廟曰烈廟陵曰愽陵皆置令丞使司徒持節奉策書璽綬祠以太牢冬十月甲午尊帝母匽氏為愽園貴人滕撫性方直不交權勢為宦官所惡論討賊功當封太尉胡廣承㫖奏黜之卒於家孝桓皇帝上之上建和元年春正月辛亥朔日有食之戊午赦天下三月龍見譙夏四月庚寅京師地震立阜陵王代兄勃遒亭矦便為阜陵王六月太尉胡廣罷光禄勲杜喬為太尉自李固之廢内外喪氣羣臣側足而立唯喬正色無所回橈由是朝野皆倚望焉秋七月渤海孝王鴻薨無子太后立帝弟蠡吾矦悝為渤海王以奉鴻祀詔以定策功益封梁冀萬三千户封冀弟不疑為潁陽矦䝉為西平矦冀子㣧為襄邑矦胡廣為安樂矦趙戒為厨亭矦袁湯為安國矦又封中常侍劉廣等皆為列矦杜喬諫曰古之明君皆以用賢賞罰為務失國之主其朝豈無貞幹之臣典誥之篇哉患得賢不用其謀韜書不施其敎聞善不信其義聽讒不審其理也陛下自藩臣即位天人屬心不急忠賢之禮而先左右之封梁氏一門宦者微孽並帶無功之紱裂勞臣之土其為乖濫胡可勝言夫有功不賞為善失其望姦回不詰為惡肆其凶故陳資斧而人靡畏班爵位而物無勸茍遂斯道豈伊傷政為亂而已喪身亡國可不愼哉書奏不省八月乙未立皇后梁氏梁冀欲以厚禮迎之杜喬據執舊典不聽冀屬喬舉汜宫為尚書喬以宫為臧罪不用由是日忤於冀九月丁卯京師地震喬以災異策免冬十月以司徒趙戒為太尉司空􅀽湯為司徒前大尉胡廣為司空宦者唐衡左悺等共譖杜喬於帝曰陛下前當即位喬與李固抗議以為不堪奉漢宗祀帝亦怨之十一月清河劉文與南郡妖賊劉鮪交通妄言清河王當統天下欲共立蒜事覺文等遂劫清河相謝暠曰當立王為天子以暠為公暠罵之文刺殺暠於是捕文鮪誅之有司劾奏蒜坐貶爵為尉氏矦徙桂陽自殺梁冀因誣李固杜喬云與文鮪等交通請逮按罪太后素知喬忠不許冀遂收固下獄門生渤海王調貫械上書證固之枉河内趙承等數十人亦要鈇鑕詣闕通訴太后詔赦之及出獄京師市里皆稱萬歳冀聞之大驚畏固名徳終為己害乃更據奏前事大將軍長史吳祐傷固之枉與冀爭之冀怒不從從事中郎馬融主為冀作章表融時在坐祐謂融曰李公之罪成於卿手李公若誅卿何面目視天下人冀怒起入室祐亦徑去固遂死於獄中臨命與胡廣趙戒書曰固受國厚恩是以竭其股肱不顧死亡志欲扶持王室比隆文宣何圖一朝梁氏迷謬公等曲從以吉為凶成事為敗乎漢家衰微從此始矣公等受主厚禄顛而不扶傾覆大事後之良史豈有所私固身已矣於義得矣夫復何言廣戒得書悲慙皆長歎流涕而已冀使人脅杜喬曰早從宜妻子可得全喬不肯明日冀遣騎至其門不聞哭者遂白太后收繫之亦死獄中冀暴固喬尸於城北四衢令有敢臨者加其罪固弟子汝南郭亮尚未冠左提章􅃏右秉鈇鑕詣闕上書乞收固尸不報與南陽董班俱往臨哭守喪不去夏門亭長呵之曰卿曹何等腐生公犯詔書欲干試有司乎亮曰義之所動豈知性命何為以死相懼邪太后聞之皆赦不誅杜喬故掾陳留楊匡號泣星行到雒陽著故赤幘託為夏門亭吏守䕶尸喪積十二日都官從事執之以聞太后赦之匡因詣闕上書并乞李杜二公骸骨使得歸葬太后許之匡送喬喪還家葬訖行服遂與郭亮董班皆隠匿終身不仕梁冀出吳祐為河間相祐自免歸卒於家冀以劉鮪之亂思朱穆之言於是請种暠為從事中郎薦欒巴為議郎舉穆髙第為侍御史是歳南單于兜樓儲死伊陵尸逐就單于車兒立二年春正月甲子帝加元服庚午赦天下三月戊辰帝從皇太后幸大將軍冀府白馬羌寇廣漢屬國殺長吏益州刺史率板楯蠻討破之夏四月丙子封帝弟顧為平原王奉孝崇皇祀尊孝崇皇夫人馬氏爲孝崇園貴人五月癸丑北宫掖廷中徳陽殿及左掖門火車駕移幸南宫六月改清河為甘陵立安平孝王得子經矦理為甘陵王奉孝徳皇祀秋七月京師大水三年夏四月丁卯晦日有食之秋八月乙丑有星孛于天市京師大水九月己卯地震庚寅地又震郡國五山崩冬十月太尉趙戒免以司徒袁湯為太尉大司農河内張歆為司徒是嵗前朗陵矦相荀淑卒淑少愽學有髙行當世名賢李固李膺等皆師宗之在朗陵涖事明治稱為神君有子八人儉緄靖燾汪爽肅專並有名稱時人謂之八龍所居里舊名西豪潁隂令渤海苑康以為昔髙陽氏有才子八人更名其里曰髙陽里膺性􅂤亢無所交接唯以淑為師以同郡陳寔為友荀爽嘗就謁膺因為其御旣還喜曰今日乃得御李君矣其見慕如此陳寔出於單微為郡西門亭長同郡鍾皓以篤行稱前後九辟公府年輩逺在寔前引與為友皓為郡功曹辟司徒府臨辭太守問誰可代卿者皓曰明府欲必得其人西門亭長陳寔可寔聞之曰鍾君似不察人不知何獨識我太守遂以寔為功曹時中常侍山陽矦覽託太守髙倫用吏倫教署為文學掾寔知非其人懐檄請見言曰此人不宜用而矦常侍不可違寔乞從外署不足以塵明徳倫從之於是鄉論怪其非舉寔終無所言倫後被徴為尚書郡中士大夫送至綸氏倫謂衆人曰吾前為矦常侍用吏陳君宻持教還而於外白署比聞議者以此少之此咎由故人畏憚強禦陳君可謂善則稱君過則稱己者也寔固自引愆聞者方歎息由是天下服其徳後為太丘長修徳清靜百姓以安鄰縣民歸附者寔輒訓導譬解發遣各令還本司官行部吏慮民有訟者白欲禁之寔曰訟以求直禁之理將何申其勿有所拘司官聞而歎息曰陳君所言若是豈有寃於人乎亦竟無訟者以沛相賦斂違灋解印綬去吏民追思之鍾皓素與荀淑齊名李膺常歎曰荀君清識難尚鍾君至徳可師皓兄子瑾母膺之姑也瑾好學慕古有退讓風與膺同年俱有聲名膺祖太尉脩常言瑾似我家性邦有道不廢邦無道免於刑戮復以膺妹妻之膺謂瑾曰孟子以為人無是非之心非人也弟於是何太無皁白邪瑾嘗以膺言白皓皓曰元禮祖父在位諸宗並盛故得然乎昔國武子好招人過以致怨惡今豈其時邪必欲保身全家爾道為貴和平元年春正月甲子赦天下改元乙丑太后詔歸政於帝始罷稱制二月甲寅太后梁氏崩三月車駕徙幸北宫甲午葬順烈皇后増封大將軍冀萬户并前合三萬户封冀妻孫壽為襄城君兼食陽翟租嵗入五千萬加賜赤紱比長公主壽善為妖態以蠱惑冀冀甚寵憚之冀愛監奴秦宫官至太倉令得出入壽所威權大震刺史二千石皆謁辭之冀與壽對街為宅殫極土木互相誇競金玉珍怪充積藏室又廣開園圃採土築山十里九阪深林絶㵎有若自然奇禽馴獸飛走其間冀壽共乘輦車遊觀第内多從倡伎酣謳竟路或連日繼夜以騁娛恣客到門不得通皆請謝門者門者累千金又多拓林苑周徧近縣起兔苑於河南城西經亘數十里移檄所在調發生兔刻其毛以為識人有犯者罪至死刑嘗有西域賈胡不知禁忌誤殺一兔轉相告言坐死者十餘人又起别第於城西以納姦亡或取良人悉為奴婢至數千口名曰自賣人冀用壽言多斥奪諸梁在位者外以示謙讓而實崇孫氏孫氏宗親冒名為侍中卿校郡守長吏者十餘人皆貪饕凶淫各遣私客籍屬縣富人被以它罪閉獄掠拷使出錢自贖貲物少者至於死徙扶風人士孫奮居富而性吝冀以馬乘遺之從貸錢五千萬奮以三千萬與之冀大怒乃告郡縣認奮母為其守藏婢云盜白珠十斛紫金千斤以叛遂收考奮兄弟死於獄中悉沒貲財億七千餘萬冀又遣客周流四方逺至塞外廣求異物而使人復乘埶横暴妻略婦女􅇌擊吏卒所在怨毒侍御史朱穆自以冀故吏奏記諫曰明將軍地有申伯之尊位為羣公之首一日行善天下歸仁終朝為惡四海傾覆頃者官民俱匱加以水蟲為害京師諸官費用増多詔書發調或至十倍各言官無見財皆當出民搒掠割剝彊令充足公賦旣重私斂又深牧守長吏多非徳選貪聚無猒遇民如虜或絶命於箠楚之下或自賊於迫切之求又掠奪百姓皆託之尊府遂令將軍結怨天下吏民酸毒道路歎嗟昔永和之末綱紀少㢮頗失人望四五嵗耳而財空户散下有離心馬勉之徒乘敝而起荆楊之閒幾成大患幸賴順烈皇后初政清靜内外同力僅乃討定今百姓戚戚困於永和内非仁愛之心可得容忍外非守國之計所宜乆安也夫將相大臣均體元首共輿而馳同舟而濟輿傾舟覆患實共之豈可以去明即昧履危自安主孤時困而莫之䘏乎宜時易宰守非其人者減省第宅園池之費拒絶郡國諸所奉送内以自明外解人惑使挾姦之吏無所依託司察之臣得盡耳目憲度既張逺邇清壹則將軍身尊事顯徳燿無窮矣冀不納冀雖專朝縱横而猶交結左右宦官任其子弟賔客以為州郡要職欲以自固恩寵穆又奏記極諫冀終不悟報書云如此僕亦無一可邪然素重穆亦不甚罪也冀遣書詣樂安太守陳蕃有所請託不得通使者詐稱他客求謁蕃蕃怒笞殺之坐左轉脩武令時皇子有疾下郡縣市珍藥而冀遣客齎書詣京兆并貨牛黄京兆尹南陽延篤發書收客曰大將軍椒房外家而皇子有疾必應陳進醫方豈當使客千里求利乎遂殺之冀慙而不得言有司承㫖求其事篤以病免夏五月庚辰尊博園匽貴人曰孝崇后宫曰永樂置太僕少府以下皆如長樂宫故事分鉅鹿九縣為后湯沐邑秋七月梓潼山崩元嘉元年春正月朔羣臣朝賀大將軍冀帶劍入省尚書蜀郡張陵呵叱令出敇羽林虎賁奪劔冀跪謝陵不應即劾奏冀請廷尉論罪有詔以一嵗俸贖百僚肅然河南尹不疑嘗舉陵孝㢘乃謂陵曰昔舉君適所以自罰也陵曰明府不以陵不肖誤見擢序今申公憲以報私恩不疑有愧色癸酉赦天下改元梁不疑好經書喜待士梁冀疾之轉不疑為光禄勲以其子􅏷為河南尹􅏷年十六容貌甚陋不勝冠帶道路見者莫不蚩笑不疑自恥兄弟有隙遂讓位歸第與弟䝉閉門自守冀不欲令與賔客交通隂使人變服至門記徃來者南郡太守馬融江夏太守田明初除過謁不疑冀諷有司奏融在郡貪濁及以它事陷明皆髠笞徙朔方融自刺不殊明遂死於路夏四月己丑上微行幸河南尹梁㣧府舍是日大風拔樹晝昏尚書楊秉上疏曰臣聞天不言語以災異譴告王者至尊出入有常警蹕而行靜室而止自非郊廟之事則鑾旗不駕故諸矦入諸臣之家春秋尚列其誡况於以先王灋服而私出槃游降亂尊卑等威無序侍衛守空宫璽紱委女妾設有非常之變任章之謀上負先帝下悔靡及帝不納秉震之子也京師旱任城梁國饑民相食司徒張歆罷以光祿勲吳雄為司徒北匈奴呼衍王冦伊吾敗伊吾司馬毛愷攻伊吾屯城詔敦煌太守馬達將兵救之至蒲類海呼衍王引去秋七月武陵蠻反冬十月司空胡廣致仕十一月辛巳京師地震詔百官舉獨行之士涿郡舉崔寔詣公車稱病不對策退而論世事名曰政論其辭曰凡天下所以不治者常由人主承平日乆俗漸敝而不悟政寖衰而不改習亂安危怢不自覩或荒耽耆欲不恤萬機或耳蔽箴誨厭偽忽真或猶豫歧路莫適所從或見信之佐括囊守祿或疎逺之臣言以賤廢是以王綱縱㢮於上智士鬱伊於下悲夫自漢興以來三百五十餘嵗矣政令垢翫上下怠懈百姓囂然咸復思中興之救矣且濟時拯世之術在於補䘺决壊枝拄邪傾隨形裁割要措斯世於安寧之域而已故聖人執權遭時定制步驟之差各有云設不彊人以不能背急切而慕所聞也蓋孔子對葉公以來逺哀公以臨人景公以節禮非其不同所急異務也俗人拘文牽古不達權制奇偉所聞􅂤忽所見烏可與論國家之大事哉故言事者雖合聖聽輒見掎奪何者其頑士闇於時權安習所見不知樂成况可慮始茍云率由舊章而已其達者或矜名妒能恥策非已舞筆奮辭以破其義寡不勝衆遂見擯弃雖稷契復存猶將困焉斯賢智之論所以常憤鬱而不伸者也凡為天下者自非上徳嚴之則治寛之則亂何以明其然也近孝宣皇帝明於君人之道審於為政之理故嚴刑峻灋破姦軌之膽海内清肅天下宻如筭計見效優於孝文及元帝即位多行寛政卒以墮損威權始奪遂為漢室基禍之主政道得失於斯可監昔孔子作春秋褒齊桓懿晉文歎管仲之功夫豈不美文武之道哉誠達權救敝之理也故聖人能與世推移而俗士苦不知變以為結繩之約可復治亂秦之緒干戚之舞足以解平城之圍夫熊經鳥伸雖延歷之術非傷寒之理呼吸吐納雖度紀之道非續骨之膏葢為國之灋有似治身平則致養疾則攻焉夫刑罰者治亂之藥石也徳教者興平之粱肉也夫以徳教除殘是以粱肉養疾也以刑罰治平是以藥石供養也方今承百王之敝值戹運之㑹自數世以來政多恩貸馭委其轡馬駘其衘四牡横犇皇路險傾方將拑勒鞬輈以救之豈暇鳴和鑾請節奏哉昔文帝雖除肉刑當斬右趾者弃市笞者往往至死是文帝以嚴致平非以寛致平也寔瑗之子也山陽仲長統嘗見其書歎曰凡為人主宜寫一通置之坐側臣光曰漢家之灋已嚴矣而崔寔猶病其寛何哉葢衰世之君率多柔懦凡愚之佐唯知姑息是以權幸之臣有罪不坐豪猾之民犯灋不誅仁恩所施止於目前姦宄得志紀綱不立故崔寔之論以矯一時之枉非百世之通義也孔子曰政寛則民慢慢則紏之以猛猛則民殘殘則施之以寛寛以濟猛猛以濟寛政是以和斯不易之常道矣閏月庚午任城節王崇薨無子國絶以太常黄瓊為司空帝欲褒崇梁冀使中朝二千石以上㑹議其禮特進胡廣太常羊溥司隷校尉祝恬太中大夫邊韶等咸稱冀之勲徳宜比周公錫之山川土田附庸黄瓊獨曰冀前以親迎之勞増邑萬三千户又其子􅏷亦加封賞今諸矦以户邑為制不以里數為限冀可比鄧禹合食四縣朝廷從之於是有司奏冀入朝不趨劒履上殿謁讚不名禮儀比蕭何悉以定陶陽成餘户増封為四縣比鄧禹賞賜金錢奴婢綵帛車馬衣服甲第比霍光以殊元勲每朝㑹與三公絶席十日一入平尚書事宣布天下為萬世灋冀猶以所奏禮薄意不恱二年春正月西域長史王敬為于窴所殺初西域長史趙評在于窴病癰死評子迎喪道經拘彌拘彌王成國與于窴王建素有隙謂評子曰于窴王令胡醫持毒藥著創中故致死耳評子信之還以告敦煌太守馬達㑹敬代為長史馬達令敬隠覈于窴事敬先過拘彌成國復説云于窴國人欲以我為王今可因此罪誅建于窴必服矣敬貪立功名前到于窴設供且請建而隂圖之或以敬謀告建建不信曰我無罪王長史何為欲殺我旦日建從官屬數十人詣敬坐定建起行酒敬叱左右執之吏士並無殺建意官屬悉得突走時成國主簿秦牧隨敬在㑹持刀出曰大事已定何為復疑即前斬建于窴矦將輸僰等遂㑹兵攻敬敬持建頭上樓宣告曰天子使我誅建耳輸僰不聽上樓斬敬懸首於市輸僰自立為王國人殺之而立建子安國馬達聞王敬死欲將諸郡兵出塞擊于窴帝不聽徴達還而以宋亮代為敦煌太守亮到開募于窴令自斬輸僰時輸僰死已經月乃斷死人頭送敦煌而不言其狀亮後知其詐而竟不能討也丙辰京師地震夏四月甲辰孝崇皇后匽氏崩以帝弟平原王石為喪主斂送制度比恭懐皇后五月辛卯葬于博陵秋七月庚辰日有食之冬十月乙亥京師地震十一月司空黄瓊免十二月以特進趙戒為司空永興元年春三月丁亥帝幸鴻池夏四月丙申赦天下改元丁酉濟南悼王廣薨無子國除秋七月郡國三十二蝗河水溢百姓饑窮流宂者數十萬户冀州尤甚詔以侍御史朱穆為冀州刺史冀部令長聞穆濟河解印綬去者四十餘人及到奏劾諸郡貪汚者有至自殺或死獄中宦者趙忠喪父歸葬安平僭為玉匣穆下郡案驗吏畏其嚴遂發墓剖棺陳尸出之帝聞大怒徵穆詣廷尉輸作左校太學書生潁川劉陶等數千人詣闕上書訟穆曰伏見弛刑徒朱穆處公憂國拜州之日志清姦惡誠以常侍貴寵父子兄弟布在州郡競為虎狼噬食小民故穆張理天綱補綴漏目羅取殘禍以塞天意由是内官咸共恚疾謗讟煩興讒隙仍作極其刑讁輸作左校天下有識皆以穆同勤禹稷而被共鯀之戾若死者有知則唐帝怒於崇山重華忿於蒼墓矣當今中官近習竊持國柄手握王爵口含天憲運賞則使餓隸富於季孫呼噏則令伊顏化為桀跖而穆獨亢然不顧身害非惡榮而好辱惡生而好死也徒感王綱之不攝懼天網之乆失故竭心懐憂為上深計臣願黥首繫趾代穆校作帝覽其奏乃赦之冬十月太尉袁湯免以太常胡廣為太尉司徒吳雄司空趙戒免以太僕黄瓊為司徒光祿勲房植為司空武陵蠻詹山等反武陵太守汝南應奉招降之車師後部王阿羅多與戊部􅇋嚴皓不相得忿戾而反攻圍屯田殺傷吏士後部矦炭遮領餘民畔阿羅多詣漢吏降阿羅多迫急從百餘騎亡入北匈奴敦蝗太守宋亮上立後故王軍就質子卑君為王後阿羅多復從匈奴中還與卑君爭國頗收其國人戊校尉閻詳慮其招引北虜將亂西域乃開信告示許復為王阿羅多乃詣詳降於是更立阿羅多為王將卑君還敦煌以後部人三百帳與之二年春正月甲午赦天下二月辛丑復聽刺史二千石行三年喪癸卯京師地震夏蝗東海朐山崩乙卯封乳母馬惠子初為列矦秋九月丁卯朔日有食之太尉胡廣免以司徒黄瓊為太尉閏月以光禄勲尹頌為司徒冬十一月甲辰帝校獵上林苑遂至函谷關泰山琅邪賊公孫舉東郭竇等反殺長吏永壽元年春正月戊申赦天下改元二月司隷冀州饑人相食太學生劉陶上疏陳事曰夫天之與帝帝之與民猶頭之與足相須而行也陛下目不視鳴條之事耳不聞檀車之聲天災不有痛於肌膚震食不即損於聖體故蔑三光之謬輕上天之怒伏念髙祖之起始自布衣合散扶傷克成帝業勤亦至矣流福遺祚至於陛下陛下既不能増明烈考之軌而忽髙祖之勤妄假利器委授國柄使羣醜刑􅀠芟刈小民虎豹窟於麑􅂣豺狼乳於春囿貨殖者為窮寃之魂貧餒者作饑寒之鬼死者悲於窀穸生者戚於朝野是愚臣所為咨嗟長懐歎息者也且秦之將亡正諫者誅䛕進者賞嘉言結於忠舌國命出於讒口擅閻樂於咸陽授趙髙以車府權去已而不知威離身而不顧古今一揆成敗同埶願陛下逺覽強秦之傾近察哀平之變得失昭然禍福可見臣又聞危非仁不扶亂非智不救竊見故冀州刺史南陽朱穆前烏桓校尉臣同郡李膺皆履正清平貞髙絶俗斯實中興之良佐國家之柱臣也宜還本朝挾輔王室臣敢吐不時之義於諱言之朝猶冰霜見日必至消滅臣始悲天下之可悲今天下亦悲臣之愚惑也書奏不省夏南陽大水司空房植免以太常韓縯為司空巴郡益州郡山崩秋南匈奴左薁鞬臺耆且渠伯徳等反寇美稷東羌復舉種應之安定屬國都尉敦煌張奐初到職壁中唯有二百許人聞之即勒兵而出軍吏以為力不敵叩頭爭止之奐不聽遂進屯長城收集兵士遣將王衛招誘東羌因據􅀛兹縣使南匈奴不得交通東羌諸豪遂相率與奐共擊薁鞬等破之伯徳惶恐將其衆降郡界以寧羌豪遺奐馬二十匹金鐻八枚奐於諸羌前以酒酹地曰使馬如羊不以入廏使金如粟不以入懐悉以還之前此八都尉率好財貨為羌所患苦及奐正身潔已無不恱服威化大行二年春三月蜀郡屬國夷反初鮮卑檀石槐勇健有智略部落畏服乃施灋禁平曲直無敢犯者遂推以為大人檀石槐立庭於彈汙山歠仇水上去髙柳北三百餘里兵馬甚盛東西部大人皆歸焉因南抄縁邊北拒丁零東卻夫餘西擊烏孫盡據匈奴故地東西萬四千餘里秋七月檀石槐寇雲中以故烏桓校尉李膺為度遼將軍膺到邊羌胡皆望風畏服先所掠男女悉詣塞下送還之公孫舉東郭竇等聚衆至三萬人寇青兖徐三州破壊郡縣連年討之不能克尚書選能治劇者以司徒掾潁川韓韶為嬴長賊聞其賢相戒不入嬴境餘縣流民萬餘户入縣界韶開倉賑之主者爭謂不可韶曰長活溝壑之人而以此伏罪含笑入地矣太守素知韶名徳竟無所坐韶與同郡荀淑鍾皓陳寔皆嘗為縣長所至以徳政稱時人謂之潁川四長初鮮卑寇遼東屬國都尉武威段熲率所領馳赴之既而恐賊驚去乃使驛騎詐齎璽書召熲熲於道偽退潛於還路設伏虜以為信然乃入追熲熲因大縱兵悉斬獲之坐詐為璽書當伏重刑以有功論司寇刑竟拜議郎至是詔以東方盜賊昌熾令公卿選將帥有文武材者司徒尹頌薦熲拜中郎將擊舉竇等大破斬之獲首萬餘級餘黨降散封熲為列矦冬十二月京師地震封􅆝不疑子馬為潁隂矦梁􅏷子桃為城父矦卷終
