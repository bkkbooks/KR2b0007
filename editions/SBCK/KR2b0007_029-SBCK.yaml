front:
  text: 四年春二月赦天下三月上行幸雍祠五畤夏六月甲戌孝宣園東闕災戊寅晦日有食之上於是召諸前言日變在周堪張猛者責問皆稽首謝因下詔稱堪之美徵詣行在所拜爲光禄大夫秩中二千石領尚書事猛復爲太中大夫給事中中書令石顯筦尚書尚書五人皆其黨也堪希得見常因顯白事事決顯口㑹堪疾瘖不能言而卒顯誣譖猛令自殺於公車初貢禹奏言孝惠孝景廟皆親盡宜毀及郡國廟不應古禮宜正定天子是其議秋七月戊子罷昭靈后武哀王昭哀后衛思后戾太子戾后園皆不奉祠裁置吏卒守焉冬十月乙丑罷祖宗廟在郡國者諸陵分屬三輔以渭城壽陵亭部原上為初陵詔勿置縣邑及徙郡國民五年春正月上行幸甘泉郊泰畤三月幸河東祠后土
  hash: sha256:801f9be82054b188df6e42bfdc8ceeba1187570f3795dc8542ce43d79315cf6b
body:
  text: 秋潁川水流殺人民冬上幸長楊射熊館大獵十二月乙酉毀太上皇孝惠皇帝寝廟園用韋玄成等之議也上好儒術文辭頗改宣帝之政言事者多進見人人自以為得上意又傅昭儀及子濟陽王康愛幸逾於皇后太子太子少傅匡衡上䟽曰臣聞治亂安危之機在乎審所用心蓋受命之王務在創業垂統􅀓之無窮繼體之君心存於承宣先生之德而襃大其功昔者成王之嗣位思述文武之道以養其心休烈盛美皆歸之二后而不敢専其名是以上天歆享鬼神祐焉陛下聖德天覆子愛海内然隂陽未和姦邪未禁者殆論議者未丕揚先帝之盛功爭言制度不可用也務變更之所更或不可行而復復之是以羣下更相是非吏民無所信臣竊恨國家釋樂成之業而虚為此紛紛也願陛下詳覽統業之事留神於遵制揚功以定羣下之心大雅曰無念爾祖聿脩厥德蓋至德之本也傳曰審好惡理情性而王道畢矣治性之道必審已之所有餘而強其所不足蓋聦明䟽通者戒於太察寡聞少見者戒於壅蔽勇猛剛彊者戒於太暴仁愛温良者戒於無斷湛靜安舒者戒於後時廣心浩大者戒於遺忘必審已之所當戒而齊之以義然後中和之化應而巧偽之徒不敢比周而望進唯陛下戒之所以崇聖德也臣又聞室家之道脩則天下之理得故詩始國風禮本冠㛰始乎國風原情性而明人倫也本乎冠㛰正基兆而防未然也故聖王必慎妃后之際别適長之位禮之於内也卑不踰尊新不先故所以統人情而理陰氣也其尊適而卑庶也適子冠乎阼禮之用醴衆子不得與列所以貴正體而明嫌疑也非虚加其禮文而已乃中心與之殊異故禮探其情而見之外也聖人動靜游燕所親物得其序則海内自脩百姓從化如當親者䟽當尊者卑則佞巧之姦因時而動以亂國家故聖人慎防其端禁於未然不以私恩害公義傳曰正家而天下定矣初武帝既塞宣房後河復北決於館陶分為屯氏河東北入海廣深與大河等故因其自然不隄塞也是嵗河決清河靈鳴犢口而屯氏河絶建昭元年春正月戊辰隕石于梁三月上行幸雍祠五畤冬河閒王元坐賊殺不辜廢遷房陵罷孝文太后寝祠園上幸虎圈鬬獸後宫皆坐熊逸出圈攀檻欲上殿左右貴人傅倢伃等皆驚走馮倢伃直前當熊而立左右格殺熊上問人情驚懼何故前當熊倢伃對曰猛獸得人而止妾恐熊至御坐故以身當之帝嗟嘆倍敬重焉􅀓偼伃慙由是與馮倢伃有隙馮倢伃左将軍奉世之女也二年春正月上行幸甘泉郊㤗畤三月行幸河東祠后土夏四月赦天下六月立皇子興為信都王東郡京房學易於梁人焦延壽延壽常曰得我道以亡身者京生也其説長於災變分六十卦更直日用事以風雨寒温為􅀱各有占驗房用之尤精以孝廉為郎上䟽屢言災異有驗天子説之數召見問房對曰古帝王以功舉賢則萬化成瑞應著末世以毀譽取人故功業廢而致災異宜令百官各試其功災異可息詔使房作其事房奏考功課吏灋上令公卿朝臣與房㑹議温室皆以房言煩碎令上下相司不可許上意鄉之時部刺史奏事京師上召見諸刺史令房曉以課事刺史復以為不可行唯御史大夫鄭弘光禄大夫周堪初言不可後善之是時中書令石顯顓權顯友人五鹿充宗為尚書令二人用事房甞宴見問上曰幽厲之君何以危所任者何人也上曰君不明而所任者巧佞房曰知其巧佞而用之邪将以為賢也上曰賢之房曰然則今何以知其不賢也上曰以其時亂而君危知之房曰若是任賢必治任不肖必亂必然之道也幽厲何不覺寤而更求賢曷為卒任不肖以至於是上曰臨亂之君各賢其臣令皆覺寤天下安得危亡之君房曰齊桓公秦二世亦甞聞此君而非笑之然則任豎刁趙高政治日亂盗賊滿山何不以幽厲卜之而覺寤乎上曰唯有道者能以往知來耳房因免冠頓首曰春秋紀二百四十二年災異以示萬世之君今陛下即位已來日月失明星辰逆行山崩泉涌地震石隕夏霜冬靁春凋秋榮隕霜不殺水旱螟蟲民人饑疫盗賊不禁刑人滿市春秋所記災異盡備陛下視今為治邪亂邪上曰亦極亂耳尚何道房曰今所任用者誰與上曰然幸其愈於彼又以為不在此人也房曰夫前世之君亦皆然矣臣恐後之視今猶今之視前也上良乆乃曰今為亂者誰哉房曰明主宜自知之上曰不知也如知何故用之房曰上最所信任與圖事帷幄之中進退天下之士者是矣房指謂石顯上亦知之謂房曰已諭房罷出後上亦不能退顯也臣光曰人君之德不明則臣下雖欲竭忠何自而入乎􅀚京房之所以曉孝元可謂明白切至矣而終不能寤悲夫詩曰匪面命之言提其耳匪手􅂝之言示之事又曰誨爾諄諄聽我藐藐孝元之謂矣上令房上弟子曉知考功課吏事者欲試用之房上中郎任良姚平願以為刺史試考功灋臣得通籍殿中為奏事以防壅塞石顯五鹿充宗皆疾房欲逺之建言宜試以房為郡守帝於是以房為魏郡太守得以考功灋治郡房自請嵗竟乗傳奏事天子許焉房自知數以論議為大臣所非與石顯等有隙不欲逺離左右乃上封事曰臣出之後恐為用事所蔽身死而功不成故願嵗盡乗傳奏事蒙哀見許乃辛巳蒙氣復乗卦太陽侵色此上大夫覆陽而上意疑也巳卯庚辰之間必有欲隔絶臣令不得乗傳奏事者房未發上令陽平矦王鳳承制詔房止無乗傳奏事房意愈恐秋房去至新豐因郵上封事曰臣前以六月中言遯卦不效灋曰道人始去寒涌水為災至其七月涌水出臣弟子姚平謂臣曰房可謂知道未可謂信道也房言災異未甞不中涌水巳出道人當逐死尚復何言臣曰陛下至仁於臣尤厚雖言而死臣猶言也平又曰房可謂小忠未可謂大忠也昔秦時趙高用事有正先者非刺高而死高威自此成故秦之亂正先趣之今臣得出守郡自詭効功恐未効而死惟陛下毋使臣塞涌水之異當正先之死為姚平所笑房至陕復上封事曰臣前白願出任良試考功臣得居内議者知如此於身不利臣不可蔽故云使弟子不若試師臣為刺史又當奏事故復云為刺史恐太守不與同心不若以為太守此其所以隔絶臣也陛下不違其言而遂聽之此乃蒙氣所以不解太陽無色者也臣去稍逺太陽侵色益甚唯陛下毋難還臣而易逆天意邪説雖安于人天氣必變故人可欺天不可欺也願陛下察焉房去月餘竟徵下獄初淮陽憲王舅張博傾巧無行多從王求金錢欲為王求入朝博從京房學以女妻房房每朝見退輒為博道其語博因記房所説密語令房為王作求朝奏草皆持東與王以為信驗石顯知之告房與張博通謀非謗政治歸惡天子詿誤諸矦王皆下獄棄市妻子徙邊鄭弘坐與房善免為庶人御史中丞陳咸數毀石顯乆之坐與槐里令朱雲善漏泄省中語石顯微伺知之與雲皆下獄髠為城旦石顯威權日盛公卿以下畏顯重足一迹顯與中書僕射牢梁少府五鹿充宗結為黨友諸附倚者皆得寵位民歌之曰牢邪石邪五鹿客邪印何纍纍綬若若邪顯内自知擅權専柄在掌握恐天子一旦納用左右耳目以閒巳乃時歸誠取一信以為驗顯甞使至諸官有所徵發顯先自白恐後漏盡宫門閉請使詔吏開門上許之顯故投夜還稱詔開門入後果有上書告顯顓命矯詔開宫門天子聞之笑以其書示顯顯因泣曰陛下過私小臣屬任以事羣下無不嫉妬欲䧟害臣者事類如此非一唯獨明主知之愚臣微賤誠不能以一軀稱快萬衆任天下之怨臣願歸樞機職受後宫掃除之役死無所恨唯陛下哀憐財幸以此全活小臣天子以為然而憐之數勞勉顯加厚賞賜賞賜及賂遺訾一萬萬初顯聞衆人匈匈言巳殺前将軍蕭望之恐天下學士訕巳以諫大夫貢禹明經箸節乃使人致意深自結納因薦禹天子歴位九卿禮事之甚備議者於是或稱顯以為不妬譛望之矣顯之設變詐以自解免取信人主者皆此類也荀悦曰夫佞臣之惑君主也甚矣故孔子曰逺佞人非但不用而巳乃逺而絶之隔塞其源戒之極也孔子曰政者正也夫要道之本正巳而巳矣平直真實者正之主也故德必核其真然後授其位能必核其真然後授其事功必核其真然後授其賞罪必核其真然後授其刑行必核其真然後貴之言必核其真然後信之物必核其真然後用之事必核其真然後脩之故衆正積於上萬事實於下先王之道如斯而巳矣八月癸亥以光禄勲匡衡為御史大夫閏月丁酉太皇太后上官氏崩冬十一月齊楚地震大雨雪樹折屋壞三年夏六月甲辰扶陽共矦韋玄成薨秋七月匡衡為丞相戊辰衛尉李延壽為御史大夫冬使西域都䕶騎都尉北地甘延壽副校尉山陽陳湯共誅斬匈奴郅支單于於康居始郅支單于自以大國威名尊重又乗勝驕不為康居王禮怒殺康居王女及貴人人民數百或支解投都賴水中發民作城日作五百人二嵗乃巳又遣使責闔蘇大宛諸國嵗遺不敢不予漢遣使三輩至康居求谷吉等死郅支困辱使者不肯奉詔而因都䕶上書言居困戹願歸計彊漢遣子入侍其驕嫚如此湯為人沈勇有大慮多䇿謀喜竒功與延壽謀曰夷狄畏服大種其天性也西域本屬匈奴今郅支單于威名逺聞侵陵烏孫大宛常為康居畫計欲降服之如得此二國數年之閒城郭諸國危矣且其人剽悍好戰伐數取勝乆畜之必為西域患雖所在絶逺蠻夷無金城彊弩之守如發屯田吏士􅇌從烏孫衆兵直指其城下彼亡則無所之守則不足自保千載之功可一朝而成也延壽亦以為然欲奏請之湯曰國家與公卿議大䇿非凡所見事必不從延壽猶與不聽㑹其乆病湯獨矯制發城郭諸國兵車師戊巳校尉屯田吏士延壽聞之驚起欲止焉湯怒按劒叱延壽曰大衆巳集㑹豎子欲沮衆邪延壽遂從之部勒行陳漢兵胡兵合四萬餘人延壽湯上䟽自劾奏矯制陳言兵狀即日引軍分行别為六校其三校從南道踰葱領徑大宛其三校都䕶自将發温宿國從北道入赤谷過烏孫渉康居界至闐池西而康居副王抱闐將數千騎寇赤谷城東殺略大昆彌千餘人􅇌畜産甚多從後與漢軍相及頗寇盗後重湯縱胡兵擊之殺四百六十人得其所略民四百七十人還付大昆彌其馬牛羊以給軍食又捕得抱闐貴人伊奴毒入康居東界令軍不得爲寇閒呼其貴人屠墨見之諭以威信與飲盟遣去徑引行未至單于城可六十里止營復捕得康居貴人貝色子男開牟以爲導貝色子即屠墨母之弟皆怨單于由是具知郅支情明日引行未至城三十里止營單于遣使問漢兵何以來應曰單于上書言居困阸願歸計彊漢身入朝見天子哀閔單于棄大國屈意康居故使都䕶将軍來迎單于妻子恐左右驚動故未敢至城下使數往來相荅報延壽湯因讓之我為單于逺來而至今無名王大人見将軍受事者何單于忽大計失客主之禮也兵來道逺人畜罷極食度且盡恐無以自還願單于與大臣審計䇿明日前至郅支城都賴水上離城三里止營傅陳望見單于城上立五采幡幟數百人被甲乗城又出百餘騎往來馳城下歩兵百餘人夾門魚鱗陳講習用兵城上人更招漢軍曰鬬來百餘騎馳赴營營皆張弩持滿指之騎引却頗遣吏士射城門騎歩兵騎歩兵皆入延壽湯令軍聞鼓音皆薄城下四面圍城各有所守穿􅢾塞門户鹵楯為前㦸弩為後仰射城樓上人樓上人下走土城外有重木城從木城中射頗殺傷外人外人發薪燒木城夜數百騎欲出外迎射殺之初單于聞漢兵至欲去疑康居怨巳為漢内應又聞烏孫諸國兵皆發自以無所之郅支巳出復還曰不如堅守漢兵逺來不能乆攻單于乃被甲在樓上諸閼氏夫人數十皆以弓射外人外人射中單于鼻諸夫人頗死單于乃下夜過半木城穿中人郤入土城乗城呼時康居兵萬餘騎分為十餘處四面環城亦與相應和夜數犇營不利輒郤平明四面火起吏士喜大呼乗之鉦鼓聲動地康居兵引郤漢兵四面推鹵楯並入土城中單于男女百餘人走入大内漢兵縱火吏士爭入單于被創死軍􅀱假丞杜勲斬單于首得漢使節二及谷吉等所齎帛書諸鹵獲以畀得者凡斬閼氏太子名王以下千五百一十八級生虜百四十五人降虜千餘人賦予城郭諸國所發十五王四年春正月郅支首至京師延壽湯上䟽曰臣聞天下之大義當混為一昔有唐虞今有彊漢匈奴呼韓邪單于巳稱北藩唯郅支單于叛逆未伏其辜大夏之西以爲彊漢不能臣也郅支單于慘毒行於民大惡通於天臣延壽臣湯将義兵行天誅賴陛下神靈陰陽並應天氣精明䧟陳克敵斬郅支首及名王以下宜縣頭稾街蠻夷邸閒以示萬里明犯彊漢者雖逺必誅丞相匡衡等以為方春掩骼埋胔之時宜勿縣詔縣十日乃埋之仍告祠郊廟赦天下羣臣上壽置酒六月甲申中山哀王竟薨哀王者帝之少弟與太子游學相長大及薨太子前弔上望見太子感念哀王悲不能自止太子旣至前不哀上大恨曰安有人不慈仁而可奉宗廟為民父母者乎是時駙馬都尉侍中史丹護太子家上以責謂丹丹免冠謝曰臣誠見陛下哀痛中山王至以感損向者太子當進見臣竊戒屬毋涕泣感傷陛下罪乃在臣當死上以為然意乃解藍田地震山崩壅霸水安陵岸崩壅涇水涇水逆流五年春三月赦天下夏六月庚申復戻園壬申晦日有食之秋七月庚子復太上皇寑廟園原廟昭靈后武哀王昭哀后衛思后園時上寑疾乆不平以為祖宗譴怒故盡復之唯郡國廟遂廢云是嵗徙濟陽王康為山陽王匈奴呼韓邪單于聞郅支旣誅且喜且懼上書願入朝見竟寧元年春正月匈奴呼韓邪單于來朝自言願壻漢氏以自親帝以後宫良家子王嬙字昭君賜單于單于驩喜上書願保塞上谷以西至敦煌傳之無窮請罷邊備塞吏卒以休天子人民天子下有司議議者皆以為便郎中矦應習邊事以為不可許上問狀應曰周秦以來匈奴暴桀冦侵邊境漢興尤被其害臣聞北邊塞至遼東外有陰山東西千餘里草木茂盛多禽獸本冒頓單于依阻其中治作弓矢來出為冦是其苑囿也至孝武世出師征伐斥奪此地攘之於幕北建塞徼起亭隧築外城設屯戍以守之然後邊境得用少安幕北地平少草木多大沙匈奴來寇少所蔽隠從塞以南徑深山谷徃來差難邊長老言匈奴失陰山之後過之未嘗不哭也如罷備塞戍卒示夷狄之大利不可一也今聖德廣被天覆匈奴匈奴得蒙全活之恩稽首來臣夫夷狄之情困則卑順彊則驕逆天性然也前巳罷外城省亭隧令裁足以􅀱望通㷭火而已古者安不忘危不可復罷二也中國有禮義之敎刑罰之誅愚民猶尚犯禁又況單于能必其衆不犯約哉三也自中國尚建􅀜梁以制諸矦所以絶臣下之覬欲也設塞徼置屯戍非獨爲匈奴而已亦爲諸屬國降民本故匈奴之人恐其思舊逃亡四也近西羌保塞與漢人交通吏民貪利侵盜其畜産妻子以此怨恨起而背畔今罷乗塞則生嫚易分爭之漸五也往者從軍多没不還者子孫貧困一旦亡出從其親戚六也又邊人奴婢愁苦欲亡者多曰聞匈奴中樂無柰􅇋望急何然時有亡出塞者亡也盗賊桀黠羣輩犯法如其窘急亡走北出則不可制八也起塞以來百有餘年非皆以土垣也或因山巖石木谿谷水門稍稍平之卒徒築治功費乆逺不可勝計臣恐議者不深慮其終始欲以壹切省繇戍十年之外百嵗之内卒有它變障塞破壞亭隧滅絶當更發屯繕治累世之功不可卒復九也如罷戍卒省􅀱望單于自以保塞守禦必深德漢請求無巳小失其意則不可測開夷狄之隙虧中國之固十也非所以永持至安威制百蠻之長䇿也對奏天子有詔勿議罷邊塞事使車騎将軍嘉口諭單于曰單于上書願罷北塞吏士屯戍子孫世世保塞單于鄉慕禮義所以為民計者甚厚此長乆之䇿也朕甚嘉之中國四方皆有關梁障塞非獨以備塞外也亦以防中國姦邪放縱出為冦害故明灋度以專衆心也敬諭單于之意朕無疑焉為單于怪其不罷故使嘉曉單于單于謝曰愚不知大計天子幸使大臣告語甚厚初左伊秩訾為呼韓邪畫計歸漢竟以安定其後或讒伊秩訾自伐其功常鞅鞅呼韓邪疑之伊秩訾懼誅將其衆千餘人降漢漢以為關内矦食邑三百户令佩其王印綬及呼韓邪來朝與伊秩訾相見謝曰王為我計甚厚令匈奴至今安寧王之力也德豈可忘我失王意使王去不復顧留皆我過也今欲白天子請王歸庭伊秩訾曰單于賴天命自歸於漢得以安寧單于神靈天子之祐也我安得力旣已降漢又復歸匈奴是兩心也願為單于侍使於漢不敢聽命單于固請不能得而歸單于號王昭君為寧胡閼氏生一男伊屠智牙師為右日逐王皇太子冠二月御史大夫李延夀卒初石顯見馮奉世父子為公卿著名女又為昭儀在内顯心欲附之薦言昭儀兄謁者逡脩敕宜侍帷幄天子召見欲以為侍中逡請閒言事上聞逡言顯顓權大怒罷逡歸郎官及御史大夫缺在位多舉逡兄大鴻臚野王上使尚書選第中二千石而野王行能第一上以問顯顯曰九卿無出野王者然野王親昭儀兄臣恐後世必以陛下度越衆賢私後宫親以為三公上曰善吾不見是因謂羣臣曰吾用野王為三公後世必謂我私後宫親屬以野王為比三月丙寅詔曰剛彊堅固確然亡欲大鴻臚野王是也心辨善辭可使四方少府五鹿充宗是也廉㓗節儉太子少傅張譚是也其以少傅為御史大夫河南太守九江召信臣為少府信臣先為南陽太守後遷河南治行常第一視民如子好為民興利躬􅂆耕稼開通溝瀆户口増倍吏民親愛號曰召父癸未復孝惠皇帝寑廟園孝文太后孝昭太后寑園初中書令石顯甞欲以姊妻甘延壽延壽不取及破郅支還丞相御史亦惡其矯制皆不與延壽等陳湯素貪所鹵獲財物入塞多不灋司􅀠校尉移書道上繫吏士按驗之湯上䟽言臣與吏士共誅郅支單于幸得禽滅萬里振旅宜有使者迎勞道路今司􅀠反逆􅀵繫按驗是為郅支報讎也上立出吏士令縣道具酒食以過軍旣至論功石顯匡衡以為延壽湯擅興師矯制幸得不誅如復加爵土則後奉使者爭欲乗危徼幸生事於蠻夷為國招難帝内嘉延壽湯功而重違衡顯之議乆之不決故宗正劉向上䟽曰郅支單于囚殺使者吏士以百數事暴揚外國傷威毀重羣臣皆閔焉陛下赫然欲誅之意未甞有忘西域都䕶延壽副校尉湯承聖指倚神靈緫百蠻之君攬城郭之兵出百死入絶域遂蹈康居屠三重城搴歙矦之旗斬郅支之首縣旌萬里之外揚威昆山之西埽谷吉之恥立昭明之功萬夷慴伏莫不懼震呼韓邪單于見郅支已誅且喜且懼鄉風馳義稽首來賔願守北藩累世稱臣立千載之功建萬世之安羣臣之勲莫大焉昔周大夫方叔吉甫為宣王誅獫狁而百蠻從其詩曰嘽嘽焞焞如霆如雷顯允方叔征伐獫狁蠻荆來威易曰有嘉折首獲匪其醜言美誅首惡之人而諸不順者皆來從也今延壽湯所誅震雖易之折首詩之雷霆不能及也論大功者不録小過舉大美者不疵細瑕司馬灋曰軍賞不踰月欲民速得為善之利也蓋急武功重用人也吉甫之歸周厚賜之其詩曰吉甫宴喜旣多受祉來歸自鎬我行永乆千里之鎬猶以為逺況萬里之外其勤至矣延壽湯既未獲受祉之報反屈捐命之功乆挫於刀筆之前非所以勸有功厲戎士也昔齊桓前有尊周之功後有滅項之罪君子以功覆過而為之諱貳師將軍李廣利捐五萬之師靡億萬之費經四年之勞而僅獲駿馬三十匹雖斬宛王毋寡之首猶不足以復費其私罪惡甚多孝武以為萬里征伐不録其過遂封拜兩矦三卿二千石百有餘人今康居之國彊於大宛郅支之號重於宛王殺使者罪甚於留馬而延壽湯不煩漢士不費斗糧比於貳師功德百之且常惠隨欲擊之烏孫鄭吉迎自來之日逐猶皆裂土受爵故言威武勤勞則大於方叔吉甫列功覆過則優於齊桓貳師近事之功則高於安遠長羅而大功未著小惡數布臣竊痛之宜以時解縣通籍除過勿治尊寵爵位以勸有功於是天子下詔赦延壽湯罪勿治令公卿議封焉議者以爲宜如軍灋捕斬單于令匡衡石顯以爲郅支本亡逃失國竊號絶域非眞單于帝取安逺矦鄭吉故事封千户衡顯復爭夏四月戊辰封延壽爲義成矦賜湯爵關内矦食邑各三百户加賜黄金百斤拜延壽爲長水校尉湯爲射聲校尉於是杜欽上䟽追訟馮奉世前破莎車功上以先帝時事不復録欽故御史大夫延年子也荀悦論曰成其功義足封追録前事可也春秋之義毀泉臺則惡之舎中軍則善之各由其宜也夫矯制之事先王之所慎也不得巳而行之若矯大而功小者罪之可也矯小而功大者賞之可也功過相敵如斯而巳可也權其輕重而為之制宜焉初太子少好經書寛博謹慎其後幸酒樂燕樂上不以為能而山陽王康有材蓺母傅昭儀又愛幸上以故常有意欲以山陽王為嗣上晚年多疾不親政事留好音樂或置鼙鼓殿下天子自臨軒檻上隤銅丸以擿鼓聲中嚴鼓之節後宫及左右習知音者莫能為而山陽王亦能之上數稱其材史丹進曰凡所謂材者敏而好學温故知新皇太子是也若乃器人於絲竹鼓鼙之閒則是陳惠李微高於匡衡可相國也於是上嘿然而咲及上寑疾傅昭儀山陽王康常在左右而皇后太子希得進見上疾稍侵意忽忽不平數問尚書以景帝時立膠東王故事是時太子長舅陽平矦王鳳為衛尉侍中與皇后太子皆憂不知所出史丹以親密臣得侍視疾􅀱上間獨寑時丹直入卧内頓首伏青蒲上涕泣言曰皇太子以適長立積十餘年名號繫於百姓天下莫不歸心臣子見山陽王雅素愛幸今者道路流言為國生意以為太子有動揺之議審若此公卿以下必以死爭不奉詔臣願先賜死以示羣臣天子素仁不忍見丹涕泣言又切至意大感寤喟然太息曰吾日困劣而太子兩王幼少意中戀戀亦何不念乎然無有此議且皇后謹慎先帝又愛太子吾豈可違指駙馬都尉安所受此語丹即却頓首曰愚臣妄聞罪當死上因納謂丹曰吾病寖加恐不能自還善輔道太子毋違我意丹嘘唏而起太子由是遂定為嗣而右將軍光禄大夫王商中書令石顯亦擁佑太子頗有力焉夏五月壬辰帝崩于未央宫班彪賛曰臣外祖兄弟為元帝侍中語臣曰元帝多材蓺善史書鼔琴瑟吹洞簫自度曲被歌聲分刌節度窮極㓜􅆌少而好儒及即位徵用儒生委之以政貢薛韋匡迭為宰相而上牽制文義優游不斷孝宣之業衰焉然寛弘盡下出於恭儉號令温雅有古之風烈匡衡奏言前以上體不平故復諸所罷祠卒不䝉福案衞思后戾太子戾后園親未盡孝恵孝景廟親盡宜毁及太上皇孝文孝昭太后昭靈后昭哀后武哀王祠請悉罷勿奉奏可六月己未太子即皇帝位謁髙廟尊皇太后曰太皇太后皇后曰皇太后以元舅侍中衞尉陽平侯王鳳為大司馬大將軍領尚書事秋七月丙戌葬孝元皇帝于渭陵大赦天下丞相衡上䟽曰陛下秉至孝哀傷思慕不絶於心未有游虞弋射之宴誠隆於慎終追逺無窮已也竊願陛下雖聖性得之猶復加聖心焉詩云焭焭在疚言成王喪畢思慕意氣未能平也蓋所以就文武之業崇大化之本也臣又聞之師曰妃匹之際生民之始萬福之原㛰姻之禮正然後品物遂而天命全孔子論詩以關雎為始此綱紀之首王敎之端也自上世巳來三代興廢未有不由此者也願陛下詳覽得失盛衰之效以定大基采有德戒聲色近嚴敬逺技能臣聞六經者聖人所以統天地之心著善惡之歸明吉凶之分通人道之正使不悖於其本性者也及論語孝經聖人言行之要宜究其意臣又聞聖王之自為動静周旋奉天承親臨朝享臣物有節文以章人倫蓋欽翼祗栗事天之容也温恭敬遜承親之禮也正躬嚴恪臨衆之儀也嘉恵和説饗下之顔也舉錯動作物遵其儀故形為仁義動為灋則今正月初幸路寑臨朝賀置酒以饗萬方􅀓曰君子慎始願陛下留神動静之節使羣下得望盛徳休光以立基楨天下幸甚上敬納其言通鑑卷第二十九
