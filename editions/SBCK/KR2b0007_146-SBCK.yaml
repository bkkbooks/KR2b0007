front:
  text: 學生往會稽雲門山從何胤受業命胤選門徒中經明行修者具以名聞分遣博士祭酒巡州郡立學初譙國夏矦道遷以輔國将軍從裴叔業鎮夀陽為南譙太守與叔業有隙單騎奔魏魏以道遷為驍騎将軍從王肅鎮夀陽使道遷守合肥肅卒道遷棄戍來奔從梁秦二州刺史莊丘黑鎮南鄭以道遷為長史領漢中太守黑卒詔以都官尚書王珍國為刺史未至道遷隂與軍主考城江忱之等謀降魏先是魏仇池鎮將楊靈珍叛魏來奔朝廷以為征虜将軍假武都王助戍漢中有部曲六百餘人道遷憚之上遣左右吴公之等使南鄭道遷遂殺使者發兵擊靈珍父子斬之并使者首送於魏白馬戍主尹天寶聞之引兵擊道遷敗其將龐樹遂圍南鄭道遷求救於氐王楊紹先楊集起楊集義皆不應集義弟集朗獨引兵救道遷擊天寶殺之魏以道遷為平南将軍豫州刺史豐縣矦又以尚書邢巒為鎮西將軍都督征梁漢諸軍事將兵赴之道遷受平南辭豫州且求公爵魏主不許辛亥上祀南郊大赦乙丑魏以驃騎大将軍髙陽王雍為司空加尚書令廣陽王嘉儀同三司二月丙子魏以宕昌世子梁彌博為宕昌王上謀伐魏壬午遣衛尉卿楊公則将宿衛兵塞洛口壬辰交州刺史李凱據州反長史李畟討平之
  hash: sha256:686e28d41ae1538b7f9151d0947538a07d55c3a787cec408b601c0a2af4752e7
body:
  text: 魏邢巒至漢中擊諸城戍所向摧破晉夀太守王景胤據石亭巒遣統軍李義珍擊走之魏以巒為梁秦二州刺史巴西太守龐景民據郡不下郡民嚴􅀇思聚衆自稱巴州刺史附於魏攻景民斬之楊集起集義聞魏克漢中而懼閠月帥羣氐叛魏斷漢中糧道巒屢遣軍擊破之夏四月丁巳以行宕昌王梁彌愽為河凉二州刺史宕昌王冠軍将軍孔陵等将兵二萬戍深阬魯方達戍南安任僧襃等戍石同以拒魏邢巒遣統軍王足将兵擊之所至皆捷遂入劒閣陵等退保梓潼足又進擊破之梁州十四郡地東西七百里南北千里皆入于魏初益州刺史當陽矦鄧元起以母老乞歸詔徵為右衛将軍以西昌矦淵藻代之淵藻懿之子也夏矦道遷之叛也尹天寶馳使報元起及魏冦晉夀王景胤等並遣告急衆勸元起急救之元起曰朝廷萬里軍不猝至若冦賊侵淫方須撲討董督之任非我而誰何事怱怱救之詔假元起都督征討諸軍事救漢中而晉夀已陷蕭淵藻將至元起營還裝糧儲器械取之無遺淵藻入城恨之又求其良馬元起曰年少郎子何用馬為淵藻恚因醉殺之元起麾下圍城哭且問故淵藻曰天子有詔衆乃散遂誣以反上疑焉元起故吏廣漢羅研詣闕訟之上曰果如我所量也使讓淵藻曰元起為汝報讎汝為讎報讎忠孝之道如何乃貶淵藻號為冠軍將軍贈元起征西将軍諡曰忠矦李延夀論曰元起勤乃胥附功惟闢土勞之不圖禍機先陷冠軍之貶於罰已輕梁之政刑於斯為失私戚之端自斯而啓年之不永不亦宜乎益州民焦僧䕶聚衆數萬作亂蕭淵藻年未弱冠集僚佐議自擊之或陳不可淵藻大怒斬于階側乃乗平肩輿廵行賊壘賊弓亂射矢下如雨從者舉楯禦矢淵藻命去之由是人心大安擊僧䕶等皆平之六月庚戌初立孔子廟豫州刺史王超宗将兵圍魏小峴丁夘魏揚州刺史薛真度遣兼統軍李叔仁等擊之超宗兵大敗冠軍将軍王景胤李畎輔國将軍魯方達等與魏王足戰屢敗秋七月足進逼涪城八月壬寅魏中山王英冦雍州一庚戌秦梁二州刺史魯方達與魏王足統軍紀洪雅盧祖遷戰敗方達等十五将皆死壬子王景胤等又與祖遷戰敗景胤等二十四将皆死楊公則至洛口與魏豫州長史石榮戰斬之甲寅将軍姜慶真與魏戰於羊石不利公則退屯馬頭雍州蠻沔東太守田青喜叛降魏魏有芝生於太極殿之西序魏主以示侍中崔光光上表以為此莊子所謂氣蒸成菌者也柔脆之物生於墟落穢濕之地不當生於殿堂髙華之處今忽有之厥狀扶疎誠足異也夫野木生朝野鳥入廟古人皆以為敗亡之象故太戊中宗懼災修徳殷道以昌所謂家利而怪先國興而妖豫者也今西南二方兵革未息郊甸之内大旱踰時民勞物悴莫此之甚承天育民者所宜矜恤伏願陛下側躬聳意惟新聖道節夜飲之樂養方富之年則魏祚可以永隆皇夀等於山岳矣於是魏主好宴樂故光言及之九月己巳楊公則等與魏揚州刺史元嵩戰公則敗績冬十月丙午上大舉伐魏以揚州刺史臨川王宏都督北討諸軍事尚書右僕射栁惔為副王公以下各上國租及田穀以助軍宏軍于洛口楊集起集義立楊紹先為帝自皆稱王十一月戊辰朔魏遣光禄大夫楊椿將兵討之魏王足圍涪城蜀人震恐益州城戍降魏者什二三民自上名籍者五萬餘戸邢巒表於魏主請乗勝取蜀以為建康成都相去萬里陸行既絶惟資水路水軍西上非周年不達益州外無軍援一可圖也頃經劉季連反鄧元起攻圍資儲空竭吏民無復固守之志二可圖也蕭淵藻裠屐少年未洽治務宿昔名将多見囚戮今之所任皆左右少年三可圖也蜀之所恃唯在劒閣今既克南安已奪其險據彼竟内三分已一自南安向涪方􅁤無礙前軍累敗後衆喪魄四可圖也淵藻是蕭衍骨肉至親必無死理若克涪城淵藻安肯城中坐而受困必将望風逃去若其出鬭庸蜀士卒駑怯弓矢寡弱五可圖也臣内省文吏不習軍旅賴将士竭力頻有薄捷既克重阻民心懐服瞻望涪益旦夕可屠正以兵少糧匱未宜前出今若不取後圖便難况益州殷實户口十萬比夀春義陽其利三倍朝廷若欲進取時不可失若欲保境寧民則臣居此無事乞歸侍養魏主詔以平蜀之舉當更聴後敕冦難未夷何得以養親為辭巒又表稱昔鄧艾鍾會帥十八萬衆傾中國資儲僅能平蜀所以然者鬭實力也况臣才非古人何宜以二萬之衆而希平蜀所以敢者正以據得要險士民慕義此往則易彼來則難任力而行理有可克今王足已逼涪城脱得涪則益州乃成擒之物但得之有早晩耳且梓潼已附民户數萬朝廷豈可不守又劒閣天險得而棄之良可惜矣臣誠知戰伐危事未易可為自軍度劒閣以來鬢髮中白日夜戰懼何可爲心所以勉强者既得此地而自退不守恐負陛下之爵禄故也且臣之意筭正欲先取涪城以漸而進若得涪城則中分益州之地斷水陸之衝彼外無援軍孤城自守何能復持久哉臣今欲使軍軍相次聲勢連接先為萬全之計然後圖功得之則大利不得則自全又巴西南鄭相距千四百里去州迢遰􅁪多擾動昔在南之日以其統綰勢難曽立巴州鎮静夷獠梁州藉利因而表罷彼土民望嚴蒲何楊非唯一族雖率居山谷而豪右甚多文學風流亦為不少但以去州既逺不獲仕進至於州綱無由厠迹是以鬱怏多生異圖比道遷建義之始嚴玄思自號巴州刺史克城以來仍使行事巴西廣袤千里戸餘四萬若於彼立州鎮攝華獠則大帖民情從墊江已還不勞征伐自為國有魏主不從先是魏主以王足行益州刺史上遣天門太守張齊将兵救益州未至魏主更以梁州軍司泰山羊祉為益州刺史王足聞之不悦輒引兵還遂不能定蜀久之足自魏來奔邢巒在梁州接豪右以禮撫小民以惠州人悦之巒之克巴西也使軍主李仲遷守之仲遷溺於酒色費散兵儲公事諮承無能見者巒忿之切齒仲遷懼謀叛城人斬其首以城來降十二月庚申魏遣驃騎大将軍源懐討武興氐邢巒等並受節度司徒尚書令謝朏以母憂去職是嵗大穰米斛三十錢五年春正月丁夘朔魏于后生子昌大赦楊集義圍魏関城邢巒使建武将軍傅豎眼討之集義逆戰豎眼擊破之乗勝逐北壬申克武興執楊紹先送洛陽楊集起楊集義亡走遂滅其國以為武興鎮又改為東益州乙亥以前司徒謝朏為中書監司徒冀州刺史桓和擊魏南青州不克魏秦州屠各王法智聚衆二千推秦州主簿吕茍兒為主改元建明置百官攻逼州郡涇州民陳瞻亦聚衆稱王改元聖明己夘楊集起兄弟相帥降魏甲申封皇子綱為晉安王二月丙辰魏主詔王公以下直言忠諫治書侍御史陽固上表以為當今之務宜親宗室勤庶政貴農桑賤工賈絶談虛窮微之論簡桑門無用之費以救飢寒之苦時魏主委任髙肇疎薄宗室好桑門之法不親政事故固言及之戊午魏遣右衛将軍元麗都督諸軍討吕茍兒麗小新成之子也乙丑徐州刺史歴陽昌義之與魏平南將軍陳伯之戰於梁城義之敗績將軍蕭昞將兵擊魏徐州圍淮陽三月丙寅朔日有食之己夘魏荆州刺史趙怡平南将軍奚康生救淮陽魏咸陽王禧之子翼遇赦求􅁙其父屢泣請於魏主魏主不許癸未翼與其弟昌曄來奔上以翼為咸陽王翼以曄嫡母李妃之子也請以爵讓之上不許輔國将軍劉思效敗魏青州刺史元繫於膠水臨川王宏使記室吴興丘遲為書遺陳伯之曰尋君去就之際非有它故直以不能内審諸已外受流言沈迷猖蹷以至於此主上屈法申恩吞舟是漏將軍松栢不翦親戚安居髙臺未傾愛妾尚在而将軍魚游於沸鼎之中鷰巢於飛幕之上不亦惑乎想早勵良圖自求多福庚寅伯之自夀陽梁城擁衆八千來降魏人殺其子虎牙詔復以伯之為西豫州刺史未之任復以為通直散騎常侍久之卒於家初魏御史中尉甄琛表稱周禮山林川澤有虞衡之官為之厲禁蓋取之以時不使戕賊而已故雖置有司實為民守之也夫一家之長必惠養子孫天下之君必惠養兆民未有為人父母而吝其醯醢富有羣生而㩁其一物者也今縣官鄣䕶河東鹽池而收其利是専奉口腹而不及四體也蓋天子冨有四海何患於貧乞㢮鹽禁與民共之録尚書事􅎰尚書邢巒奏以為琛之所陳坐談則理髙行之則事闕切惟古之善治民者必汚隆随時豐儉稱事役養消息以成其性命若任其自生随其飲啄乃是芻狗萬物何以君為是故聖人歛山澤之貨以寛田疇之賦收関市之税以助什一之儲取此與彼皆非為身所謂資天地之産惠天地之民也今鹽池之禁為日已久積而散之以濟軍國非専為供太官之膳羞給後宫之服玩既利不在己則彼我一也然自禁鹽以來有司多慢出納之間或不如法是使細民嗟怨負販輕議此乃用之者無方非作之者有失也一旦罷之恐乖本㫖一行一改法若奕棊參論理要宜如舊式魏主卒從琛議夏四月乙未罷鹽池禁庚戌魏以中山王英為征南将軍都督揚徐二州諸軍事帥衆十餘萬以拒梁軍指授諸節度所至以便宜從事江州刺史王茂將兵數萬侵魏荆州誘魏邊民及諸蠻更立宛州遣其所署宛州刺史雷豹狼等襲取魏河南城魏遣平南将軍楊大眼都督諸軍擊茂辛酉茂戰敗失亡二千餘人大眼進攻河南城茂逃還大眼追至漢水攻拔五城魏征虜將軍宇文福冦司州俘千餘口而去五月辛未太子右衛率張惠紹等侵魏徐州拔宿預執城主馬成龍乙亥北徐州刺史昌義之拔梁城豫州刺史韋叡遣長史王超等攻小峴未拔叡行圍柵魏出數百人陳於門外叡欲擊之諸将皆曰向者輕來未有戰備徐還授甲乃可進耳叡曰不然魏城中二千餘人足以固守今無故出人於外必其驍勇者也茍能挫之其城自拔衆猶遲疑叡指其節曰朝廷授此非以為飾韋叡法不可犯也遂進擊之士皆殊死戰魏兵敗走因急攻之中宿而拔遂至合肥先是右軍司馬胡略等攻合肥久未下叡按山川夜帥衆堰肥水頃之堰成水通舟艦繼至魏築東西小城夾合肥叡先攻二城魏將楊靈胤帥衆五萬奄至衆懼不敵請奏益兵叡笑曰賊至城下方求益兵将何所及且吾求益兵彼亦益兵兵貴用奇豈在衆也遂擊靈胤破之叡使軍主王懐静築城於岸以守堰魏攻拔之城中千餘人皆沒魏人乗勝至堤下兵勢甚盛諸將欲退還漅湖或欲保三义叡怒曰寧有此邪命取繖扇麾幢樹之堤下示無動志魏人來鑿堤叡親與之争魏兵却因築壘於堤以自固叡起鬬艦髙與合肥城等四靣臨之城中人皆哭守將杜元倫登城督戰中弩死辛巳城潰俘斬萬餘級獲牛馬以萬數叡體素羸未嘗跨馬每戰常乗板輿督厲將士勇氣無敵晝接賔旅夜半起筭軍書張燈逹署撫循其衆常如不及故投募之士争歸之所至頓舍館宇藩牆皆應準繩諸軍進至東陵有詔班師去魏城既近諸将恐其追躡叡悉遣輜重居前身乗小輿殿後魏人服叡威名望之不敢逼全軍而還於是遷豫州治合肥壬午魏遣尚書元遥南拒梁兵癸未魏遣征西將軍于勁節度秦隴諸軍丁亥廬江太守聞喜裴邃克魏羊石城庚寅又克霍丘城六月庚子青冀二州刺史􅁊和克朐山城乙巳魏安西將軍元麗擊王法智破之斬首六千級張惠紹與假徐州刺史宋黑水陸俱進趣彭城圍髙塚戍魏武衛將軍奚康生將兵救之丁未惠紹兵不利黑戰死太子統生五嵗能遍誦五經庚戌始自禁中出居東宫丁巳魏以度支尚書邢巒都督東討諸軍事魏驃騎大将軍馮翊惠公源懐卒懐性寛簡不喜煩碎常曰為貴人當舉綱維何必事事詳細譬如為屋但外望髙顯楹棟平正基壁完牢足矣斧斤不平斵削不密非屋之病也秋七月丙寅桓和擊魏兖州拔固城吕茍兒率衆十餘萬屯孤山圍逼秦州元麗進擊大破之行秦州事李韶掩擊孤山獲其父母妻子庚辰茍兒帥其徒詣麗降兼太僕卿楊椿别討陳瞻瞻據險拒守諸將或請伏兵山蹊斷其出入待糧盡而攻之或欲斬木焚山然後進討椿曰皆非計也自官軍之至所向輒克賊所以深竄正避死耳今約勒諸軍勿更侵掠賊必謂我見險不前待其無備然後奮擊可一舉平也乃止屯不進賊果出抄掠椿復以馬畜餌之不加討逐久之隂簡精卒銜枚夜襲之斬瞻􅀓首秦涇二州皆平戊子徐州刺史王伯敖與魏中山王英戰於隂陵伯敖兵敗失亡五千餘人己丑魏發定冀瀛相并肆六州十萬人以益南行之兵上遣将軍角念将兵一萬屯䝉山招納兖州之民降者甚衆是時将軍蕭及屯固城桓和屯孤山魏邢巒遣統軍樊魯攻和别将元恒攻及統軍畢祖朽攻念壬寅魯大破和於孤山恒拔固城祖朽擊念走之己酉魏詔平南将軍安樂王詮督後發諸軍赴淮南詮長樂之子也将軍藍懐恭與魏邢巒戰于睢口懐恭敗績巒進圍宿預懐恭復於清南築城巒與平南将軍楊大眼合攻之九月癸酉拔之斬懐恭殺獲萬計張惠紹棄宿預蕭昞棄淮陽遁還臨川王宏以帝弟将兵器械精新軍容甚盛北人以為百數十年所未之有軍次洛口前軍克梁城諸将欲乗勝深入宏性懦怯部分乖方魏詔邢巒引兵度淮與中山王英合攻梁城宏聞之懼召諸将議旋師吕僧珍曰知難而退不亦善乎宏曰我亦以為然栁惔曰自我大衆所臨何城不服何謂難乎裴邃曰是行也固敵是求何難之避馬仙琕曰王安得亡國之言天子掃境内以屬王有前死一尺無却生一寸昌義之怒須髮盡磔曰吕僧珍可斬也豈有百萬之師出未逢敵望風遽退何靣目得見聖主乎朱僧勇胡辛生拔劒而退曰欲退自退下官當前向取死議者罷出僧珍謝諸将曰殿下昨來風動意不在軍深恐大致沮喪故欲全師而返耳宏不敢遽違羣議停軍不前魏人知其不武遺以巾幗且歌之曰不畏蕭娘與吕姥但畏合肥有韋虎虎謂韋叡也僧珍歎曰使始興吳平為帥而佐之豈有為敵人所侮如是乎欲遣裴邃分軍取夀陽大衆停洛口宏固執不聴令軍中曰人馬有前行者斬於是将士人懐憤怒魏奚康生馳遣楊大眼謂中山王英曰梁人自克梁城已後久不進軍其勢可見必畏我也王若進據洛水彼自奔敗英曰蕭臨川雖騃其下有良将韋裴之屬未可輕也宜且觀形勢勿與交鋒張惠紹號令嚴明所至獨克軍于下邳下邳人多欲降者惠紹諭之曰我若得城諸卿皆是國人若不能克徒使諸卿失鄉里非朝廷弔民之意也今且安堵復業勿妄自辛苦降人咸悦己丑夜洛口暴風雨軍中驚臨川王宏與數騎逃去将士求宏不得皆散歸棄甲投戈填滿水陸捐棄病者及羸老死者近五萬人宏乗小船濟江夜至白石壘叩城門求入臨汝矦淵猷登城謂曰百萬之師一朝鳥散國之存亡未可知也恐姦人乗間為變城不可夜開宏無以對乃縋食饋之淵猷淵藻之弟時昌義之軍梁城聞洛口敗與張惠紹皆引兵退魏主詔中山王英乗勝平蕩東南逐北至馬頭攻拔之城中糧儲魏悉遷之歸北議者咸曰魏運米北歸當不復南向上曰不然此必欲進兵為詐計耳乃命修鍾離城敕昌義之為戰守之備冬十月英進圍鍾離魏主詔邢巒引兵會之巒上表以為南軍雖野戰非敵而城守有餘今盡鋭攻鍾離得之則所利無幾不得則虧損甚大且介在淮外借使束手歸順猶恐無糧難守况殺士卒以攻之乎又征南士卒從戎二時疲弊死傷不問可知雖有乗勝之資懼無可用之力若臣愚見謂宜修復舊戍撫循諸州以俟後舉江東之舋不患其無詔曰濟淮掎角事如前敕何容猶爾盤桓方有此請可速進軍巒又表以為今中山進軍鍾離實所未解若為得失之計不顧萬全直襲廣陵出其不備或未可知若正欲以八十日糧取鍾離城者臣未之前聞也彼堅城自守不與人戰城塹水深非可填塞空坐至春士卒自弊若遣臣赴彼從何致糧夏來之兵不齎冬服脱遇冰雪何方取濟臣寧荷怯懦不進之責不受敗損空行之罪鍾離天險朝貴所具若有内應則所不知如其無也必無克狀若信臣言願賜臣停若謂臣憚行求還臣所領兵乞盡付中山任其處分臣止以單騎隨之東西臣屢更為将頗知可否臣既謂難何容强遣乃召巒還更命鎮東将軍蕭寶寅與英同圍鍾離侍中盧昶素惡巒與侍中領右衛将軍元暉共譖之使御史中尉崔亮彈巒在漢中掠人為奴婢巒以漢中所得美女賂暉暉言於魏主曰巒新有大功不當以赦前小事案之魏主以為然遂不問暉與盧昶皆有寵於魏主而貪縱時人謂之餓虎将軍飢鷹侍中暉尋遷吏部尚書用官皆有定價大郡二千匹次郡下郡遞減其半餘官各有等差選者謂之市曹丁酉梁兵圍義陽者夜遁魏郢州刺史婁悦追擊破之柔然庫者可汗卒子伏圖立號佗汗可汗改元始平戊申佗汗遣使者紇奚勿六跋如魏請和魏主不報其使謂勿六跋曰蠕蠕逺祖社崘乃魏之叛臣往者包容蹔聴通使今蠕蠕衰微不及疇昔大魏之徳方隆周漢正以江南未平少寛北略通和之事未容相許若修藩禮欵誠昭著者當不爾孤也魏京兆王愉廣平王懐國臣多驕縱公行屬請魏主詔中尉崔亮窮治之坐死者三十餘人其不死者悉除名為民惟廣平右常侍楊昱文學崔楷以忠諫獲免昱椿之子也十一月乙丑大赦詔右衛将軍曹景宗都督諸軍二十萬救鍾離上敕景宗頓道人洲俟衆軍齊集俱進景宗固啓求先據邵陽洲尾上不許景宗欲專其功違詔而進值暴風猝起頗有溺者復還守先頓上聞之曰景宗不進蓋天意也若孤軍獨往城不時立必致狼狽今破賊必矣初漢歸義矦勢之末羣獠始出北自漢中南至邛笮布滿山谷勢既亡蜀民多東徙山谷空地皆為獠所據其近郡縣與華民雜居者頗輸租賦逺在深山者郡縣不能制梁益二州嵗伐獠以自潤公私利之及邢巒為梁州獠近者皆安堵樂業逺者不敢為冦巒既罷去魏以羊祉為梁州刺史傅豎眼為益州刺史祉性酷虐不得物情獠王趙清荆引梁兵入州境為冦祉遣兵擊破之豎眼施恩布信大得獠和十二月癸夘都亭靖矦謝朏卒魏人議樂久不决六年春正月公孫崇請委衛軍将軍尚書右僕射髙肇監其事魏主知肇不學詔太常卿劉芳佐之魏中山王英與平東将軍楊大眼等衆數十萬攻鍾離鍾離城北阻淮水魏人於邵陽洲兩岸為橋樹柵數百步跨淮通道英據南岸攻城大眼據北岸立城以通糧運城中衆纔三千人昌義之督帥将士随方抗禦魏人以車載土填塹使其衆負土随之嚴騎蹙其後人有未及回者因以土迮之俄而塹滿衝車所撞城土輒頽義之用泥補之衝車雖入而不能壊魏人晝夜苦攻分畨相代墜而復升莫有退者一日戰數十合前後殺傷萬計魏人死者與城平二月魏主召英使還英表稱臣志殄逋冦而月初已來霖雨不止若三月晴霽城必可克願少賜寛假魏王復賜詔曰彼土蒸濕無宜久淹勢雖必取乃将軍之深計兵久力殆亦朝廷之所憂也英猶表稱必克魏主遣步兵校尉范紹詣英議攻取形勢紹見鍾離城堅勸英引還英不從上命豫州刺史韋叡将兵救鍾離受曹景宗節度叡自合肥取直道由隂陵大澤行值澗谷輒飛橋以濟師人畏魏兵盛多勸叡緩行叡曰鍾離今鑿穴而處負户而汲車馳卒奔猶恐其後而况緩乎魏人已墮吾腹中卿曹勿憂也旬日至邵陽上豫敕曹景宗曰韋叡卿之鄉望宜善敬之景宗見叡禮甚謹上聞之曰二将和師必濟矣景宗與叡進頓邵陽洲叡於景宗營前二十里夜掘長塹樹鹿角截洲為城去魏城百餘步南梁太守馮道根能走馬步地計馬足以賦功比曉而營立魏中山王英大驚以杖擊地曰是何神也景宗等器甲精新軍容甚盛魏人望之奪氣景宗慮城中危懼募軍士言文達等潛行水底齎敕入城城中始知有外援勇氣百倍楊大眼勇冠軍中将萬餘騎來戰所向皆靡叡結車為陳大眼聚騎圍之叡以彊弩二千一時俱發洞甲穿中殺傷甚衆矢貫大眼右臂大眼退走明旦英自帥衆來戰叡乗素木輿執白角如意以麾軍一日數合英乃退魏師復夜來攻城飛矢雨集叡子黯請下城以避箭叡不許軍中驚叡於城上厲聲呵之乃定牧人過淮北伐芻藁者皆為楊大眼所略曹景宗募勇敢士千餘人於大眼城南數里築壘大眼來攻景宗擊却之壘成使别将趙草守之有抄掠者皆為草所獲是後始得縱芻牧上命景宗等豫裝髙艦使與魏橋等為火攻之計令景宗與叡各攻一橋叡攻其南景宗攻其北三月淮水暴漲六七尺叡使馮道根與廬江太守裴邃秦郡太守李文釗等乗鬬艦競發擊魏洲上軍盡殪别以小船載草灌之以膏從而焚其橋風怒火盛烟塵晦冥敢死之士拔柵斫橋水又漂疾倏忽之間橋柵俱盡道根等皆身自搏戰軍人奮勇呼聲動天地無不一當百魏軍大潰英見橋絶脱身棄城走大眼亦燒營去諸壘相次土崩悉棄其器甲争投水死者十餘萬斬首亦如之叡遣報昌義之義之悲喜不暇荅語但叫曰更生更生諸軍逐北至濊水上英單騎入梁城縁淮百餘里尸相枕藉生擒五萬人收其資糧器械山積牛馬驢騾不可勝計義之徳景宗及叡請二人共會設錢二十萬官賭之景宗擲得雉叡徐擲得盧遽取一子反之曰異事遂作塞景宗與羣帥争先告捷叡獨居後世尤以此賢之詔增景宗叡爵邑義之等受賞各有差夏四月己酉以江州刺史王茂為尚書右僕射安成王秀為江州刺史秀将發主者求堅船以為齋舫秀曰吾豈愛財而不愛士乎乃以堅者給參佐下者載齋物既而遭風齋舫遂破丁巳以臨川王宏為驃騎将軍開府儀同三司建安王偉為揚州刺史右光禄大夫沈約為尚書左僕射左僕射王瑩為中軍将軍六月丙午馮翊等七郡叛降魏秋七月丁亥以尚書右僕射王茂為中軍将軍八月戊子大赦魏有司奏中山王英經筭失圖齊王蕭寶寅等守橋不固皆處以極法己亥詔英寶寅免死除名為民楊大眼徙營州為兵以中䕶軍李崇為征南将軍揚州刺史崇多事産業征南長史狄道辛琛屢諫不從遂相糾舉詔並不問崇因置酒謂琛曰長史後必為刺史但不知得上佐何如人耳琛曰若萬一叨沗得一方正長史朝夕聞過是所願也崇有慙色九月己亥魏以司空髙陽王雍為太尉尚書令廣陽王嘉為司空甲子魏開斜谷舊道冬十月壬寅以五兵尚書徐勉為吏部尚書勉精力過人雖文案填積坐客充滿應對如流手不停筆又該綜百氏皆為避諱嘗與門人夜集客虞暠求詹事五官勉正色曰今夕止可談風月不可及公事時人咸服其無私閏月乙丑以臨川王宏為司徒行太子太傅尚書左僕射沈約為尚書令行太子少傅吏部尚書袁昂為右僕射丁夘魏皇后于氏殂是時髙貴嬪有寵而妬髙肇勢傾中外后暴疾而殂人皆歸咎髙氏宫禁事祕莫能詳也甲申以光禄大夫夏矦詳為尚書左僕射乙酉魏􅁙順皇后于永泰陵十二月丙辰豐城景公夏矦詳卒乙丑魏淮陽鎮都軍主常邕和以城來降資治通鑑卷第一百四十六
