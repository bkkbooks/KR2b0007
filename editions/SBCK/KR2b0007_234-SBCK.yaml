body:
  text: 臣司馬光奉勑編集唐紀五十荗五月凡二年有竒閹起􅀇黓涒灘盡閼逢徳宗神武聖文皇帝九貞元八年春二月壬寅執夢衝數其罪而斬之雲南之路始通三月丁丑山南東道節度使曹成王臯薨宣武節度使劉􅀇佐有威略每李納使至􅀇佐厚結之故常得其隂事先爲之備納憚之其母雖貴日織絹一匹謂􅀇佐曰汝本寒㣲天子冨貴汝至此必以死報之故􅀇佐始終不失臣節庚午􅀇佐薨山南東道節度判官李實知留後事性刻薄裁損軍士衣食鼓角將楊清潭帥衆作亂夜焚掠城中獨不犯曹王臯家實踰城走免明旦都將徐誠縋城而入號令禁遏然後止收清潭等六人斬之實歸京師以爲司農少卿實元慶之玄孫也丙子以荆南節度使樊澤爲山南東道節度使初竇參爲度支轉運使班宏副之參許宏俟一歳以使職歸之歳餘參無歸意宏怒司農少卿張滂宏所薦也參欲使滂分主江淮鹽鐵宏不可滂知之亦怨宏及參爲上所疎乃譲度支使於宏又不欲利權專歸於宏乃薦滂於上以宏判度支以滂爲户部侍郎鹽鐵轉運使仍􅀠於宏以悦之竇參隂狡而愎恃權而貪每遷除多與族子給事中申議之申招權受賂時人謂之喜鵲上頗聞之謂參曰申必爲卿累宜出之以息物議參再三保其無它申亦不悛左金吾大將軍虢王則之巨之子也與申善左諫議大夫知制誥吴通玄與陸贄不叶竇申恐贄進用隂與通玄則之作謗書以傾䞇上皆察知其狀夏四月丁亥貶則之昭州司馬通玄泉州司馬申道州司馬尋賜通玄死劉玄佐之䘮將佐匿之稱疾請代上亦爲之隱遣使即軍中問以陜虢觀察使吳湊爲代可乎監軍孟介行軍司馬盧瑗皆以爲便然後除之湊行至汜水玄佐之柩將發軍中請備儀仗瑗不許又令留器用以俟新使將士怒玄佐之婿及親兵皆被甲擁玄佐之子士寧釋衰絰登重榻自爲留後執城將曹金岸浚儀令李邁曰爾皆請吳湊者遂另之盧瑗逃免士寧以財賞將士劫孟介以請於朝上以問宰相竇參曰今汴人指李納以邀制命不許將合於納庚寅以士寧爲宣武節度使士寧疑宋州刺史翟良佐不附己託言廵撫至宋州以都知兵馬使劉逸準代之逸準正臣之子也乙未貶中書侍郎同平章事竇參爲郴州别駕再貶竇申錦州司户以尚書左丞趙憬兵部侍郎陸贄並為中書侍郎同平章事憬仁本之曽孫也張滂請鹽鐵舊簿於斑宏宏不與滂與宏共擇巡院官莫有合者闕官甚多滂言於上曰如此職事必廢臣罪無所逃丙午上命宏滂分掌天下財賦如大曆故事壬子吐蕃冦靈州䧟水口支渠敗營田詔河東振武救之遣神策六軍二千戍定遠懷遠城吐蕃乃退陸贄請令臺省長官各舉其屬著其名於詔書異日考其殿最并以升黜舉者五月戊辰詔行贄議未幾或言於上曰諸司所舉皆有情故或受貨賂不得實才上密諭贄自今除改卿宜自擇勿任諸司贄上奏其略曰國朝五品以上制敕命之蓋宰相商議奏可者也六品以下則㫖授蓋吏部銓材署職詔㫖畫聞而不可否者也開元中起居遺補御史等官猶並列於選曹其後倖臣專朝捨僉議而重己權廢公舉而行私惠是使周行庶品茍不出時宰之意則莫致也又曰宣行以來纔舉十數議其資望既不愧於班行考其行能又未聞於闕敗而議者遽以騰口上煩聖聰道之難行亦可知矣請使所言之人指陳其状某人受賄某舉有情付之有司覈其虛實謬舉者必行其罰誣善者亦反其辜何必貸其姦贓不加辨詰私其公議不出主名使無辜見疑有罪獲縱枉直同貫人何頼焉又宰相不過數人豈能徧諳多士若令悉命羣官理須展轉詢訪是則變公舉爲私薦易明揚以闇投情故必多爲弊益甚所以承前命官罕不涉謗雖則秉鈞不一或自行情亦由私訪所親轉爲所賣其弊非遠聖鑒明知又曰今之宰相則徃日臺省長官今之臺省長官乃將來之宰相但是職名暫異固非行舉頓殊豈有爲長官之時則不能舉一二屬吏居宰臣之位則可擇千百具僚物議悠悠其惑斯甚蓋尊者領其要卑者任其詳是以人主擇輔臣輔臣擇庶長庶長擇佐僚將務得人無易於此夫求才貴廣考課貴精往者則天欲收人心進用不次非但人得薦士亦得自舉其才然而課責既嚴進退皆速是以當代謂知人之明累朝賴多士之用又曰則天舉用之法傷易而得人陛下愼簡之規太精而失士上竟追前詔不行癸酉平盧節度使李納薨軍中推其子師古知留後六月吐蕃千餘騎㓂涇州掠田軍千餘人而去嶺南節度使奏近日海舶珍異多就安南市易欲遣判官就安南收市乞命中使一人與俱上欲從之陸贄上言以爲遠國商販惟利是求緩之斯來擾之則去廣州素爲衆舶所湊今忽改就安南若非侵刻過深則必招􅂝失所曽不内訟更蕩上心况嶺南安南莫非王土中使外使悉是王臣豈必信嶺南而絕安南重中使以輕外使所奏望寢不行秋七月甲寅朔户部尚書判度支班宏薨陸贄請以前湖南觀察使李巽權判度支上許之既而復欲用司農少卿裴延齡贄上言以爲今之度支準平萬貨刻吝則生患寛假則容姦延齡誕妄小人用之交駭物聽尸禄之責固冝及於微臣知人之明亦恐傷於聖鑒上不從己未以延齡判度支事河南北江淮荆襄陳許等四十餘州大水溺死者二萬餘人陸贄請遣使賑撫上曰聞所損殊少即議優恤恐生姦欺贄上奏其略曰流俗之弊多徇諂諛揣所悦意則侈其言度所惡聞則小其事制備失所􅁪病於斯又曰所費者財用所收者人心茍不失人何憂乏用上許爲遣使而曰淮西貢賦既闕不必遣使贄復上奏以爲陛下息師含垢宥彼渠魁惟兹下人所宜矜恤昔秦晉讎敵穆公猶救其饑况帝王懷柔萬邦唯徳與義寧人負我無我負人八月遣中書舍人京兆奚陟等宣撫諸道水災以前青州刺史李師古爲平盧節度使韋臯攻吐蕃維州獲其大將論贊熱陸䞇上言以邊儲不贍由措置失當蓄歛乖宜其略曰所謂措置失當者戍卒不􅀠於守臣守臣不揔於元帥至有一城之将一旅之兵各降中使監臨皆承别詔委任分鎭亘千里之地莫相率從縁邊列十萬之師不設謀主每有冦至方從中覆比䝉徴發救援冦已獲勝罷歸吐蕃之比中國衆寡不敵工拙不侔然而彼攻有餘我守不足蓋彼之號令由將而我之節制在朝彼之兵衆合并而我之部分離析故也所謂蓄斂乖宜者陛下頃設就軍和糴之法以省運制與人加倍之價以勸農此令初行人皆悦慕而有司競爲茍且專事纎嗇歲稔則不時斂藏艱食則抑使收糴遂使豪家貪吏反操利權賤取於人以俟公私之乏又有勢要近親羈遊之士委賤糴於軍城取高價於京邑又多支絺紵充直窮邊寒不可衣鬻無所售上既無信於下下亦以偽應之度支物估轉高軍城穀價轉貴度支以茍售滯貨爲功利軍城以所得加價為羨餘雖設巡院轉成囊槖至有空申簿帳偽指囷倉計其數則億萬有餘考其實則百十不足又曰舊制以闗中用度之多歲運東方租米至有斗錢運斗米之言習聞見而不達時宜者則曰國之大事不計費損雖知勞煩不可廢也習近利而不防遠患者則曰每至秋成之時但令畿内和糴既易集事又足勸農臣以兩家之論互有長短將制國用須權重輕食不足而財有餘則弛於積財而務實倉廪食有餘而財不足則緩於積食而嗇用貨泉近歲闗輔屢豐公儲委積足給數年今夏江淮水潦米貴加倍人多流庸闗輔以榖賤傷農宜加價以糴而無錢江淮以穀貴人困宜減價以糶而無米而又運彼所乏益此所餘斯所謂習見聞而不達時宜者也今江淮斗米直百五十錢運至東渭橋僦直又約二百米糙且陳尤爲京邑所賤據市司月估斗糶三十七錢耗其九而存其一餒彼人而傷此農制事若斯可謂深失矣頃者每年自江湖淮浙運米百一十萬斛至河隂留四十萬斛貯河隂倉至陜州又留三十萬斛貯太原倉餘四十萬斛輸東渭橋今河隂太原倉見米猶有三百二十餘萬斛京兆諸縣斗米不過直錢七十請令來年江淮止運三十萬斛至河隂河隂陜州以次運至東渭橋其江淮所停運米八十萬斛委轉運使每斗取八十錢於水災州縣糶之以救貧乏計得錢六十四萬緡减僦直六十九萬緡請令戸部先以二十萬緡付京兆令糴米以補渭橋倉之缺數斗用百錢以利農人以一百二萬六千緡付邊鎭使糴十萬人一年之糧餘十萬四千緡以充來年和糴之價其江淮米錢僦直並委轉運使折市綾絹絁綿以輸上都償先貸户部錢九月詔西北邊貴糴以實倉儲邊備浸充冬十一月壬子朔日有食之吐蕃雲南日益相猜每雲南兵至境上吐蕃輙亦發兵聲言相應實爲之備辛酉韋臯復遺雲南王書欲與共襲吐蕃驅之雲嶺之外悉平吐蕃城堡獨與雲南築大城於境上置戍相保永同一家右庻子姜公輔乆不遷官詣陸䞇求遷贄密語之曰聞竇相屢奏擬上不允有怒公之言公輔懼請爲道士上問其故公輔不敢泄贄語以聞參言爲對上怒參歸怨於君己巳貶公輔爲吉州别駕又遣中使責參庚午山南西道節度使嚴震奏敗吐蕃於芳州及黑水堡初李納以棣州蛤有鹽利城而據之又戍徳州之南三􅆜城以通田緒之路及李師古襲位王武俊以其年少輕之是月引兵屯徳棣將取蛤及三汊城師古遣趙鎬将兵拒之上遣使諭止之武俊乃還初劉怦薨劉濟在莫州其母弟澭在父側以父命召濟而以軍府授之濟以澭爲瀛州刺史許它日代己旣而濟用其子爲副大使澭怨之擅通表朝廷遣兵千人防秋濟怒發兵擊澭破之左神策大将軍柏良器募才勇之士以易販鬻者監軍竇文􅂣惡之㑹良器妻族飲醉寓宿宫舍十二月丙戍良器坐左遷右領軍自是䆠官始専軍政九年春正月癸卯初稅茶凡州縣産茶及茶山外要路皆估其直什稅一從鹽鐵使張滂之請也滂奏去歲水災减稅用度不足請稅茶以足之自明年以往稅茶之錢令所在别貯俟有水旱以代民田稅自是歲收茶稅錢四十萬緡未嘗以救水旱也滂又奏姦人銷錢爲銅器以求贏請悉禁銅器銅山聽人開采無得私賣二月甲寅以義武留後張昇雲爲節度使初鹽州既䧟塞外無復保障吐蕃常阻絕靈武侵擾鄜坊辛酉詔發兵三萬五千人城鹽州又詔涇原山南劒南各發兵深入吐蕃以分其勢城之二旬而畢命鹽州節度使杜彦光戍之朔方都虞􅇋楊朝晟戍木波堡由是靈武銀夏河西獲安上使人諭陸贄以要重之事勿對趙憬陳論當密封手䟽以聞又苖粲父晉卿往年攝政嘗有不臣之言諸子皆與古帝王同名今不欲明行斥逐兄弟宜各除外官勿使近屯兵之地又卿清愼太過諸道饋遺一皆拒絕恐事情不通如鞭靴之類受亦無傷贄上奏其略曰昨臣所奏惟趙憬得聞陛下巳至勞神委曲防護是於心膂之内尚有形迹之拘職同事殊鮮克以濟恐爽無私之徳且傷不吝之明又曰爵人必於朝刑人必於市惟恐衆之不覩事之不彰君上行之無愧心兆庶聽之無疑議受賞安之無怍色當刑居之無怨言此聖王所以宣明典章與天下公共者也凡是􅉲訴之事多非信實之言利於中傷懼於公辨或云歲月巳乆不可究尋或云事體有妨須爲隠忍或云惡迹未露宜假它事爲名或云但棄其人何必明言責辱詞皆近於情理意實苞於矯誣傷善售姦莫斯為甚若晉卿父子實有大罪則當公議典憲若被誣枉豈令隂受播遷夫聽訟辨讒必求情辨跡情見跡著辭服理窮然後加刑罰焉是以下無寃人上無謬聽又曰監臨受賄盈尺有刑至於士吏之微尚當嚴禁矧居風化之首反可通行賄道一開展轉滋甚鞭鞾不已必及金玉目見可欲何能自窒于心已與交私何能中絕其意是以涓流不止谿壑成災矣又曰若有所受有所却則遇却者疑乎見拒而不通矣若俱辭而不受則咸知不受者乃其常理復何嫌阻之有乎初竇參惡左司郎中李巽出爲常州刺史及參貶郴州巽爲湖南觀察使汴州節度使劉士寧遺參絹五十匹巽奏參交結藩鎭上大怒欲殺參陸贄以爲參罪不至死上乃止既而復遣中使謂贄曰參交結中外其意難測社稷事重卿速進文書處分贄上言參朝廷大臣誅之不可無名昔劉晏之死罪不明白至使衆議爲之憤邑叛臣得以爲辭參貪縱之罪天下共知至於濳懷異圖事跡曖昧若不推鞠遽加重辟駭動不細竇參於臣無分陛下所知豈欲營救其人蓋惜典刑不濫三月更貶參驩州司馬男女皆配流上又命理其親黨贄奏罪有首從法有重輕參既䝉宥親黨亦應末減況參得罪之初私黨並已連坐人心乆定請更不問從之上又欲籍其家貲贄曰在法反逆者盡沒其財贜汚者止徴所犯皆須結正施刑然後收藉今罪法未詳陛下已存惠貸若簿錄其家恐以財傷義時宦官左右恨參尤深謗毁不已參未至驩州竟賜死於路竇申杖殺貨財奴婢悉傳送京師海州團練使張昇璘昇雲之弟李納之壻也以父大祥歸于定州嘗於公座罵王武俊武俊奏之夏四月丁丑詔削其官遣中使杖而囚之定州富庶武俊常欲之因是遣兵襲取義豐掠安喜無極萬餘口徙之徳棣昇雲閉城自守屢遣使謝之乃止上命李師古毁三􅆜城師古奉詔然常招聚亡命有得罪於朝廷者皆厚撫而用之五月甲辰以中書侍郎趙憬爲門下侍郎同平章事義成節度使賈耽爲右僕射右丞盧邁守本官並同平章事邁翰之族子也憬疑陸贄恃恩欲専大政排己置之門下多稱疾不豫事由是與贄有隙陸贄上奏論備邊六失以爲措置乖方課責虧度財匱於兵衆力分於将多怨生於不均機失於遥制闗東戍卒不習土風身苦邊荒心畏戎虜國家資奉若驕子姑息如倩人屈指計歸張頥待哺或利王師之敗乘擾攘而東潰或㧞棄城鎭搖遠近之心豈惟無益實亦有損復有犯刑讁徙者旣是無良之類且加懷土之情思亂幸災又甚戍卒可謂措置乖方矣自頃權移於下病失於朝将之號令既鮮克行之於軍國之典常又不能施之於将務相遵養茍度歲時欲賞一有功翻慮無功者反仄欲罰一有罪復慮同惡者憂虞罪以隠忍而不彰功以嫌疑而不賞姑息之道乃至於斯故使忘身效節者獲誚於等夷率衆先登者取怨於士卒僨軍蹙國者不懐於愧畏緩救失期者自以爲智能此義士所以痛心勇夫所以解體可謂課責虧度矣虜毎入冦将帥遞相推倚無敢誰何虛張賊勢上聞則曰兵少不敵朝廷莫之省察唯務徴發益師無禆備禦之功重增供億之幣閭井日秏徴求日繁以編戸傾家破産之資兼有司􅅦鹽税酒之利揔其所入半以事邊可謂財匱於兵衆矣吐蕃舉國勝兵之徒纔當中國十數大郡而已動則中國懼其衆而不敢抗静則中國憚其强而不敢侵厥理何哉良以中國之節制多門蕃醜之統帥專一故也夫統帥專一則人心不分號令不貳進退可齊疾徐如意機會靡愆氣勢自壮斯乃以少爲衆以弱爲强者也開元天寳之間控禦西北兩蕃唯朔方河西隴右三節度中興以來未遑外討抗兩蕃者亦朔方涇原隴右河東四節度而已自頃分朔方之地建牙擁節者凡三使焉其餘鎮軍數且四十皆承特詔委寄各降中貴監臨人得抗衡莫相稟屬每俟邊書告急方令計會用兵旣无軍法下臨唯以客禮相待夫兵以氣勢爲用者也氣聚則盛散則消勢合則威析則弱今之邊備勢弱氣消可謂力分於将多矣理戎之要在於練覈優劣之科以爲衣食等級之制使能者企及否者息心雖有薄厚之殊而無觖望之釁今窮邊之地長鎭之兵皆百戰傷夷之餘終年勤苦之劇然衣糧所給唯止當身例爲妻子所分常有凍餒之色而闗東戍卒怯於應敵懈於服勞衣糧所頒厚踰數等又有素非禁旅本是邊軍将校詭爲媚詞因請遥􅀠神䇿不離舊所唯改虚名其於廪賜之饒遂有三倍之益夫事業未異而給養有殊茍未忘懐孰能無愠可謂怨生於不均矣凡欲選任将帥必先考察行能可者遣之不可者退之疑者不使使者不疑故將在軍君命有所不受自頃邊軍去就裁斷多出宸􅂨選置戎臣先求易制多其部以分其力輕其任以弱其心遂令爽於軍情亦聽命乖於事宜亦聽命戎虜馳突迅如風飈馹書上聞旬月方報守土者以兵寡不敢抗敵分鎭者以无詔不肯出師賊既縱掠退歸此乃陳功告㨗其敗䘮則減百而為一其捃獲則張百而成千將帥既幸於揔制在朝不憂罪累陛下又以爲大權由己不究事情可謂機失於遥制矣臣愚謂宜罷諸道将士防秋之制令本道但供衣糧募戍卒願留及蕃漢子弟以給之又多開屯田官爲收糴冦至則人自爲戰時至則家自力農與夫倐來忽往者豈可同等而論哉又宜擇文武能臣爲隴右朔方河東三元帥分統縁邊諸節度使有非要者隨所便近而併之然後減姦濫虛浮之費以豐財定衣糧等級之制以和衆􅀪委任之道以宣其用懸賞罰之典以考其成如是則戎狄威懐疆場寧謐矣上雖不能盡從心甚重之韋臯遣大将董勔等将兵出西山破吐蕃之衆拔堡柵五十餘丙午門下侍郎同平章事董晉罷爲禮部尚書雲南王異牟尋遣使者三軰一出戎州一出黔州一出安南各齎生金丹砂詣韋臯金以示堅丹砂以示赤心三分臯所與書爲信皆達成都異牟尋上表請棄吐蕃歸唐并遺臯帛書自稱唐故雲南王孫吐蕃賛普義弟日東王臯遣其使者詣長安井上表賀上賜異牟尋詔書令臯遣使慰撫之賈耽陸贄趙憬盧邁爲相百官白事更讓不言秋七月奏請依至徳故事宰相迭秉筆以處政事旬日一易詔從之其後日一易之劒南西山諸􅆧女王湯立志哥隣王董卧庭白狗王羅陀怱弱水王董辟和南水王薛莫庭悉董王湯悉賛清遠王蘇唐磨咄霸王董邈蓬及逋祖王先皆役屬吐蕃至是各帥衆内附韋臯處之於維保覇州給以耕牛種糧立志陀怱辟和入朝皆拜官厚賜而遣之癸卯户部侍郎裴延齡奏自判度支以來檢責諸州欠負錢八百餘萬緡收諸州抽貫錢三百萬緡呈様物三十餘萬緡請别置欠負耗賸季庫以掌之柒練物别置月庫以掌之詔從之欠負皆貧人無可償徒存其數者抽貫錢給用旋盡呈様染練皆左藏正物延齡徙置别庫虛張名數以惑上上信之以爲能富國而寵之於實無所增也虛費吏人簿書而已京城西汚濕地生蘆葦數􅅿延齡奏稱長安咸陽有陂澤數百頃可牧廐馬上使有司閱視無之亦不罪也左補闕權徳輿上奏以爲延齡取常賦支用未盡者充羡餘以爲己功縣官先所市物再給其直用充别貯邊軍自今春以來並不支糧陛下必以延齡孤貞獨立時人醜正流言何不遣信臣覆視究其本末明行賞罰今群情衆口喧於朝市豈京城士庶皆為朋黨邪陛下亦宜稍回聖慮而察之上不從八月庚戍太尉中書令西平忠武王李晟薨冬十月甲子韋臯遣其節度巡官崔佐時齎詔書詣雲南并自爲帛書答之十一月乙酉上祀圓丘赦天下劉士寧既爲宣武節度使諸将多不服士寧滛亂殘忍出畋輙數日不返軍中苦之都知兵馬使李萬榮得衆心士寧疑之奪其兵權令攝汴州事十二月乙卯士寧帥衆二萬畋于外野萬榮晨入使府召所留親兵千餘人詐之曰敕徴大夫入朝以吾掌留務汝軰人賜錢三十緡衆皆拜又諭外營兵皆聽命乃分兵閉城使馳白士寧曰敕徴大夫宜速即路少或遷延當傳首以獻士寧知衆不為用以五百騎逃歸京師比至東都所餘僕妾而已至京師敕歸第行䘮禁其出入淮西節度使吳少誠聞變發兵屯郾城遣使問故且請戰萬榮以言戲之少誠慙而退上聞萬榮逐士寧使問陸贄贄上奏以爲今軍州已定宜且選朝臣宣勞徐察事情冀免差失其略曰今士寧見逐雖是衆情萬榮揔軍且非朝㫖此安危強弱之機也願陛下審之愼之上復使謂贄若更淹遲恐於事非便今譏除一親王充節度使且令萬榮知留後其制即從内出䞇復上奏其略曰臣雖服戎角力諒匪克堪而經武伐謀或有所見夫制置之安危由勢付授之濟否由才勢如器焉唯在所置置之夷地則平才如負焉唯在所授授踰其力則踣萬榮今所陳奏頗涉張皇但露徼求之情殊無退讓之禮據兹鄙躁殊異純良又聞本是滑人偏厚當州将士與之相得纔止三千諸營之兵已甚懷怨據此頗僻亦非将材若得志驕盈不悖則敗悖則犯上敗則僨軍又曰苟邀則不順苟允則不誠君臣之閒勢必嫌阻與其圖之於滋蔓不若絕之於萌芽又曰爲國之道以義訓人将教事君先令順長又曰方鎮之臣事多専制欲加之罪誰則無辭若使傾奪之徒便得代居其任利之所在人各有心此源濳滋禍必難救非獨長亂之道亦闗謀逆之端又曰昨逐士寧起於倉卒諸郡守将固非連謀一城師人亦未協志各計度於成敗之勢迴遑於逆順之名安肯捐軀與之同惡又曰陛下但選文武羣臣一人命爲節度仍降優詔慰勞彼軍奨萬榮以撫定之功别加寵任褒将士以輯睦之義厚賜資装揆其大情理必寧息萬榮縱欲䟦扈勢何能爲又曰儻後事有愆素臣請受敗撓之罪上不從壬戍以通王諶爲宣武節度大使以萬榮爲留後丁卯納故駙馬都尉郭曖女爲廣陵王淳妃淳太子之長子妃母即昇平公主也十年春正月劒南西山羌蠻二萬餘户來降詔加韋臯押近界羌蠻及西山八國使崔佐時至雲南所都羊苴咩城吐蕃使者數百人先在其國雲南王異牟尋尚不欲吐蕃知之令佐時衣牂柯服而入佐時不可曰我大唐使者豈得衣小夷之服異牟尋不得已夜迎之佐時大宣詔書異牟尋恐懼顧左右失色業已歸唐乃歔欷流涕俯伏受詔鄭回密見佐時敎之故佐時盡得其情因勸異牟尋悉斬吐蕃使者去吐蕃所立之號獻其金印復南詔舊名異牟尋皆從之仍刻金契以獻異牟尋帥其子尋夢湊等與佐時盟於㸃蒼山神祠先是吐蕃與囘鶻爭北庭大戰死傷頗衆徴兵萬人於雲南異牟尋辭以國小請發三千人吐蕃少之益至五千乃許之異牟尋遣五千人前行自将數萬人踵其後晝夜兼行襲擊吐蕃戰於神川大破之取鐵橋等十六城虜其五王降其衆十餘萬戊戍遣使來獻㨗瀛州刺史劉澭爲兄濟所逼請西扞隴坻遂将部兵千五百人男女萬餘口詣京師號令嚴整在道無一人敢取人雞犬者上嘉之二月丙午以爲秦州刺史隴右經略軍使理普潤軍中不撃柝不設音樂士卒病者澭親視之死者哭之乙丑義成節度使李融薨丁卯以華州刺史李復爲義成節度使復齊物之子也復辟河南尉洛陽盧坦爲判官監軍薛盈珍數侵軍政坦每據理以拒之盈珍常曰盧侍御所言公我固不違也横海節度使程懐直入朝厚賜遣歸夏四月庚午宣武軍亂留後李萬榮討平之先是宣武親兵三百人素驕横萬榮惡之遣詣京西防秋親兵怨之大将韓惟清張彦琳誘親兵作亂攻萬榮萬榮擊破之親兵掠而潰多奔宋州宋州刺史劉逸準厚撫之惟清奔鄭州彦琳奔東都萬榮悉誅亂者妻子數千人有軍士數人呼於市曰今夕兵大至城當破萬榮收斬之奏稱劉士寧所爲五月庚子徙士寧於郴州欽州蠻酋黄少卿反圍州城邕管經略使孫公器奏請發嶺南兵救之上不許遣中使諭解之陸贄上言郊禮赦下已近半年而竄謫者尚未霑恩乃爲三状擬進上使謂之曰故事左降官準赦量移不過三五百里今所擬稍似超越又多近兵馬及當路州縣事恐非便贄復上言以爲王者待人以誠有責怒而無猜嫌有懲沮而無怨忌斥遠以儆其不恪甄恕以勉其自新不儆則浸及威刑不勉而復加黜削雖屢進退俱非愛憎行法乃暫使左遷念材而漸加進敘又知復用誰不增脩何憂乎亂常何患乎蓄憾如或以其貶黜便謂姦凶恒處防閑之中長從擯弃之例則是悔過者無由自補蘊才者終不見伸凡人之情窮則思變含悽貪亂或起於兹今若所移不過三五百里則有疆域不離於本道風土反惡於舊州徒有徙家之勞是增移配之擾又當今郡府多有軍兵所在封疆少無舘驛示人疑慮體又非弘乞更賜裁審上性猜忌不委任臣下官無大小必自選而用之宰相進擬少所稱可及羣臣一有譴責往往終身不復收用好以辯給取人不得敦實之士艱於進用羣材滯淹䞇上奏諌其略曰夫登進以懋庸黜退以懲過二者迭用理如循環進而有過則示懲懲而改脩則復進既不廢法亦無棄人雖纎芥必懲而用才不匱故能使黜退者克勵以求復登進者警飭以恪居上無滯疑下無蓄怨又曰明王不以辭盡人不以意選士如或好善而不擇所用恱言而不驗所行進退隨愛憎之情離合繫異同之趣是由捨繩墨而意裁曲直棄權衡而手揣重輕雖甚精微不能無謬又曰中人以上迭有所長茍區别得宜付授當器各適其性各宣其能及乎合以成功亦與全才無異但在明鑒大度御之有道而已又曰以一言稱愜爲能而不核虛實以一事違忤爲咎而不考忠邪其稱愜則付任逾涯不思其所不及其違忤則罪責過當不恕其所不能是以職司之内無成功君臣之際無定分上不聽贄又奏請均節財賦凡六條其一論兩税之弊其略曰舊制賦役之法曰租調庸丁男一人受田百􅅿歲輸粟二石謂之租每户各隨土宜出絹若綾若絁共二丈綿三兩不蠶之士輸布二丈五尺麻三斤謂之調每丁歲役則收其庸日準絹三尺謂之庸天下爲家法制均一雖欲轉徙莫容其姦故人無揺心而事有定制及羯胡亂華兆庶雲擾版圖墮於避地賦法壊於奉軍建中之初再造百度執事者知弊之宜革而所作兼失其原知簡之可從而所操不得其要凡欲拯其弊須窮致弊之由時弊則但理其時法弊則全革其法所爲必當其悔乃亡兵興以來供億無度此乃時弊非法弊也而遽更租調庸法分遣使者搜擿郡邑校驗簿書每州取大曆中一年科率最多者以爲兩税定額夫財之所生必因人力故先王之制賦入必以丁夫爲本不以務穡增其税不以輟稼減其租則播種多不以殖産厚其征不以流寓免其調則地著固不以飭勵重其役不以窳怠蠲其庸則功力勤如是故人安其居盡其力矣兩税之立惟以資産爲宗不以丁身爲本曾不寤資産之中有蔵於襟懐囊篋物雖貴而人莫能窺有積於場圃囷倉直雖輕而衆以爲富流通蕃息之貨數雖寡而計日收贏有廬舍器用之資價雖高而終歲無利如此之比其流實繁一槩計估筭緡宜其失平長偽由是務輕資而樂轉徙者恒脱於徭税敦本業而樹居産者每困於徴求此乃誘之爲姦驅之避役力用不得不弛賦入不得不闕復以創制之首不務齊平供應有煩簡之殊牧守有能否之異所在徭賦輕重相懸所遣使臣意見各異計奏一定有加無除又大曆中供軍進奉之類旣收入兩税今於兩税之外復又並存望稍行均减以救彫殘其二請兩税以布帛爲額不計錢數其略曰凡國之賦税必量人之力任土之宜故所入者唯布麻繒纊與百糓而已先王懼物之貴賤失平而人之交易難凖又定泉布之法以節輕重之宜歛散弛張必由於是蓋御財之大柄爲國之利權守之在官不以任下然則糓帛者人之所爲也錢貨者官之所爲也是以國朝著令租出榖庸出絹調出繒纊布曷常有禁人鑄錢而以錢為賦者哉今之兩税獨異舊章但估資産爲差便以錢榖定税臨時折徴雜物每歳色目頗殊唯計求得之利宜靡論供辦之難易所徴非所業所業非所徴遂或増價以買其所無減價以賣其所有一増一減耗損已多望勘㑹諸州初納兩税年絹布定估比類當今時價加賤減貴酌取其中揔計合税之錢折為布帛之數又曰夫地力之生物有大限取之有度用之有節則常足取之無度用之無節則常不足生物之豐敗由天用物之多少由人是以聖王立程量入為出雖遇災難下無困窮理化既衰則乃反是量出為入不恤所無桀用天下而不足湯用七十里而有餘是乃用之盈虚在節與不節耳其三論長吏以増户加税闢田爲課績其略曰長人者罕能推忠恕易地之情體至公徇國之意迭行小惠競誘姦甿以傾奪鄰境爲智能以招萃逋逃爲理化捨彼適此者既爲新收而有復倐往忽来者又以復業而見優唯懐土安居首末不遷者則使之日重斂之日加是令地著之人恒代惰遊賦役則何異驅之轉徙教之澆訛此由牧宰不克􅀪通各私所部之過也又曰立法齊人乆無不弊理之者若不知維御損益之宜則巧偽萌生恒因沮勸而滋矣請申命有司詳定考績若當管之内人益阜殷所定税額有餘任其據户口均减以减數多少爲考課等差其當管稅物通比毎户十分减三者爲上課減二者次焉減一者又次焉如或人多流亡加税見户比校殿罰法亦如之其四論税限迫促其畧曰建官立國所以養人也賦人取財所以資國也明君不厚其所資而害其所養故必先人事而借其暇力先家給而斂其餘財又曰蠶事方興已輸縑税農功未艾遽斂榖租上司之繩責既嚴下吏之威暴愈促有者急賣而秏其半直無者求假而費其倍酬望更詳定徴税期限其五請以税茶錢置義倉以備水旱其畧曰古稱九年六年之蓄者率土臣庶通爲之計耳固非獨豐公庾不及編甿也近者有司奏請稅茶歳約得五十萬貫元敕令貯户部用救百姓凶饑今以蓄糧適副前㫖其六論兼并之家私斂重於公稅其略曰今京畿之内毎田一􅅿官稅五升而私家收租殆有􅅿至一石者是二十倍於官稅也降及中等租猶半之夫土地王者之所有耕稼農夫之所爲而兼并之徒居然受利又曰望凡所占田約爲條限裁減租價務利貧人法貴必行慎在深刻裕其制以便俗嚴其令以懲違微損有餘稍優不足損不失富優可賑窮此乃古者安富恤窮之善經不可捨也資治通鑑卷第二百三十四
