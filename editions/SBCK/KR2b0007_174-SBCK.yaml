front:
  text: 資治通鑑巻第一百七十四
  hash: sha256:555caf1c32aac8ad5efdc72b7f24b16ba2c1d821defbc2d7ee25aebc4b6caa2d
body:
  text: 臣司馬光奉勑編集陳紀八敦一年上章困高宗宣皇帝下之上太建十二年春正月癸巳周天元祠太廟戊戌以左衛將軍任忠為南豫州刺史督縁江軍防事乙卯周税入市者人一錢二月丁巳周天元幸露門學釋奠戊午突厥入貢于周且迎千金公主乙丑周天元改制為天制敕為天敕壬午尊天元皇太后為天元上皇太后天皇太后為天元聖皇太后癸未詔楊后與三后皆稱太皇后司馬后直稱皇后行軍揔管􅂎公亮天元之從祖兄也其子西陽公温妻尉遲氏蜀公迥之孫有美色以宗婦入朝天元飲之酒逼而淫之亮聞之懼三月軍還至豫州密謀襲韋孝寛并其衆推諸父為主鼔行而西亮國官茹寛知其謀先告孝寛孝寛潜設備亮夜將數百騎襲孝寛營不克而走戊子孝寛追斬之温亦坐誅天元即召其妻入宫拜長貴妃辛夘立亮弟永昌公椿為􅂎公周天元如同州増候正前驅式道為三百六十重自應門至於赤岸澤數十里間幡旗相蔽音樂俱作又令虎賁持鈒馬上稱警蹕乙未改同州宫為成天宫庚子還長安詔天臺侍衛之官皆著五色及紅紫緑衣以雜色為縁名曰品色衣有大事與公服間服之壬寅詔内外命婦皆執笏其拜宗廟及天臺皆俛伏如男子天元將立五皇后以問小宗伯狄道辛彦之對曰皇后與天子敵體不宜有五大學博士西城何妥曰昔帝嚳四妃虞舜二妃先代之數何常之有帝大悦免彦之官甲辰詔曰坤儀比德土數惟五四太皇后外可増置天中太皇后一人於是以陳氏為天中太皇后尉遲妃為天左太皇后又造下帳五使五后各居其一實宗廟祭器於前自讀祝版而祭之又以五輅載婦人自帥左右歩從又好倒懸雞及碎瓦於車上觀其號呼以為樂夏四月癸亥尚書左僕射陸繕卒己巳周天元祠太廟己夘大雩壬午幸仲山祈雨甲申還宫令京城士女於衢巷作樂迎候五月癸巳以尚書右僕射晉安王伯恭爲僕射周楊后性柔婉不妬忌四皇后及嬪御等咸愛而仰之天元昏暴滋甚喜怒乖度嘗譴后欲加之罪后進止詳閑辭色不撓天元大怒遂賜后死逼令引訣后母獨孤氏詣閤陳謝叩頭流血然後得免后父前大疑堅位望隆重天元忌之甞因忿謂后曰必族滅爾家因召堅謂左右曰色動即殺之堅至神色自若乃止内史上大夫鄭譯與堅少同學竒堅相表傾心相結堅既爲帝所忌情不自安嘗在永巷私於譯曰久願出藩公所悉也願少留意譯曰以公德望天下歸心欲求多福豈敢忘也謹即言之天元將遣譯入寇譯請元帥天元曰卿意如何對曰若定江東自非懿戚重臣無以鎭撫可令隨公行且為壽陽揔管以督軍事天元從之己丑以堅為揚州揔管使譯發兵㑹壽陽將行㑹堅􅁀有足疾不果行甲午夜天元備法駕幸天興宫乙未不豫而還小御正傅陵劉昉素以狡諂得幸於天元與御正中大夫顔之儀並見親信天元召昉之儀入卧内欲屬以後事天元瘖不復能言昉見静帝㓜沖以楊堅后父有重名遂與領内史鄭譯御飾大夫栁裘内史大夫杜陵韋謩御正下士朝那皇甫績謀引堅輔政堅固辭不敢當昉曰公若為速為之不為昉自為也堅乃從之稱受詔居中侍疾裘惔之孫也是日帝殂祕不􅀤䘮昉譯矯詔以堅揔知中外兵馬事顔之儀知非帝旨拒而不從昉等草詔署訖逼之儀連署之儀厲聲曰主上升遐嗣子沖㓜阿衡之任宜在宗英方今趙王最長以親以德合膺重寄公等備受朝恩當思盡忠報國柰何一旦欲以神器假人之儀有死而已不能誣罔先帝昉等知不可屈乃代之儀署而行之諸衛既受敕並受堅節度堅恐諸王在外生變以千金公主將適突厥為辭徴趙陳越代滕五王入朝堅索符璽顔之儀正色曰此天子之物自有主者宰相何故索之堅大怒命引出將殺之以其民望出為西邉郡守丁未發喪靜帝入居天臺罷正陽宫大赦停洛陽宫作庚戌尊阿史那太后為太皇太后李太后為太帝太后楊后為皇大后朱后為帝太后其陳后元后尉遲后並為尼以漢王贊為上柱國右大丞相尊以虚名實無所綜理以楊堅為假黄􅃏左大丞相秦王贄為上柱國百官揔己以聽於左丞相堅初受顧命使䢴國公楊惠謂御正下大夫李德林曰朝廷賜令揔文武事經國任重今欲與公共事必不得辭德林曰願以死奉公堅大喜始劉昉鄭譯議以堅為大冢宰譯自攝大司馬昉又求小冢宰堅私問德林曰欲何以見處德林曰宜作大丞相假黄􅃏都督中外諸軍事不爾無以壓衆心及發喪即依此行之以正陽宫為丞相府時衆情未壹堅引司武上士盧賁置左右將之東宫百官皆不知所從堅潜令賁部伍仗衛因召公卿謂曰欲求冨貴者宜相隨往往偶語欲有去就賁嚴兵而至衆莫敢動出崇陽門至東宫門者拒不納賁諭之不去瞋目叱之門者遂却堅入賁遂典丞相府宿衛賁辯之弟子也以鄭譯為丞相府長史劉昉為司馬李德林為府屬二人由是怨德林内史下大夫勃海髙熲眀敏有器局習兵事多計略堅欲引之入府遣楊惠諭意熲承㫖欣然曰願受驅馳縱令公事不成熲亦不辭滅族乃以為相府司録時漢王贊居禁中毎與静帝同帳而坐劉昉飾美妓進贊贊甚悦之昉因説贊曰大王先帝之弟時望所歸孺子幼冲豈堪大事今先帝初崩羣情尚擾王且歸第待事寧後入為天子此萬全計也贊年少性識庸下以為信然遂從之堅革宣帝苛酷之政更為寛大删略舊律作刑書要制奏而行之躬履節儉中外悦之堅夜召太史中大夫庾季才問曰吾以庸虚受茲顧命天時人事卿以為何如季才曰天道精微難可意察竊以人事卜之符兆已定季才縱言不可公豈復得為箕潁之事乎堅黙然久之曰誠如君言獨孤夫人亦謂堅曰大事已然騎虎之勢必不得下勉之堅以相州揔管尉遲迥位望素重恐有異圖使迥子魏安公惇奉詔書召之㑹葬壬子以上柱國韋孝寛為相州揔管又以小司徒叱列長义為相州刺史先令赴鄴孝寛續進陳王純時鎭齊州堅使門正上士崔彭徴之彭以兩騎往止傳舍遣人召純純至彭請屏左右宻有所道遂執而鎖之因大言曰陳王有罪詔徴入朝左右不得輒動其從者愕然而去彭楷之孫也六月五王皆至長安庚申周復行佛道二教舊沙門道士精志者簡令入道周尉遲迥知丞相堅將不利於帝室謀舉兵討之韋孝寛至朝歌迥遣其大都督賀蘭貴齎書候韋孝寛孝寛留貴與語以審之疑其有變遂稱疾徐行又使人至相州求醫藥密以伺之孝寛兄子藝為魏郡守迥遣藝迎孝寛孝寛問迥所為藝黨於迥不以實對孝寛怒將斬之藝懼悉以迥謀語孝寛孝寛攜藝西走毎至亭驛盡驅傳馬而去謂驛司曰蜀公將至宜速具酒食迥尋遣儀同大將軍梁子康將數百騎追孝寛追者至驛輒逄盛饌又無馬遂遲留不進孝寛與藝由是得免堅又令候正破六韓裒詣迥諭㫖宻與揔管府長史晉昶等書令為之備迥聞之殺昶及裒集文武士民登城北樓令之曰楊堅藉后父之勢挾幼主以作威福不臣之迹􅁀於行路吾與國舅甥任兼將相先帝處吾於此本欲寄以安危今欲與卿等糾合義勇以匡國庇民何如衆咸從命迥乃自稱大揔管承制置官司時趙王招入朝留少子在國迥奉以號令甲子堅􅀤闗中兵以韋孝寛爲行軍元帥郕公梁士彦樂安公元諧化政公宇文忻濮陽公武川宇文述武鄉公崔弘度清河公楊素隴西公李詢等皆爲行軍揔管以討迥弘度楷之孫詢穆之兄子也初宣帝使計部中大夫楊尚希撫慰山東至相州聞宣帝殂與尉遲迥􅀤䘮尚希出謂左右曰蜀公哭不哀而視不安將有佗計吾不去懼及於難遂夜從捷徑而遁遲眀迥覺追之不及遂歸長安堅遣尚希督宗兵三千人鎭潼闗雍州牧畢刺王賢與五王謀殺堅事􅂥堅殺賢并其三子掩五王之謀不問以秦王贄爲大家宰􅂎公椿爲大司徒庚子以柱國梁睿爲益州揔管睿禦之子也周遣汝南公神慶司衛上士長孫晟送千金公主於突厥晟幼之曽孫也又遣建威矦賀若誼賂佗鉢可汗且説之以求髙紹義佗鉢偽與紹義獵於南境使誼執之誼敦之弟也秋七月甲申紹義至長安徙之蜀久之病死於蜀周青州揔管尉遲勤迥之弟子也初得迥書表送之尋亦從迥迥所統相衛黎洺貝趙冀瀛滄勒所統青齊膠光莒等州皆從之衆數十萬榮州刺史邵公胄申州刺史李惠東楚州刺史費也利進潼州刺史曹孝逺各據本州徐州揔管司録席毗羅據兖州前東平郡守畢義緒據蘭陵皆應迥懐縣永橋鎮將紇豆陵惠以城降迥迥使其所署大將軍石遜攻建州建州刺史宇文弁以州降之又遣西道行臺韓長業攻拔潞州執刺史趙威署城人郭子勝為刺史紇豆陵惠襲陷鉅鹿遂圍􅁪州上大將軍宇文威攻卞州莒州刺史烏丸尼等帥青齊之衆圍沂州大將軍檀讓攻拔曹亳二州屯兵梁郡席毗羅衆號八萬軍於蕃城攻陷昌慮下邑李惠自申州攻永州拔之迥遣使招大左輔并州刺史李穆穆鎻其使封上其書穆子士榮以穆所居天下精兵處隂勸穆從迥穆深拒之堅使内史大夫栁裘詣穆為陳利害又使穆子左侍上士渾往布腹心穆使渾奉尉斗於堅曰願執威柄以尉安天下又以十三鐶金帶遺堅十三鐶金帶者天子之服也堅大悦遣渾詣韋孝寛述穆意穆兄子崇為懐州刺史初欲應迥後知穆附堅慨然太息曰闔家冨貴者數十人值國有難竟不能扶傾繼絶復何靣目處天地間乎不得已亦附於堅迥子誼為朔州刺史穆執送長安又遣兵討郭子勝擒之迥招徐州揔管源雄東郡守于仲文皆不從雄賀之曽孫仲文謹之孫也迥遣宇文胄自石濟宇文威自白馬濟河二道攻仲文仲文弃郡走還長安迥殺其妻子迥遣檀譲徇地河南丞相堅以仲文為河南道行軍揔管使詣洛陽發兵討讓命楊素討宇文胄丁未周以丞相堅都督中外諸軍事鄖州揔管司馬消難亦舉兵應迥己酉周以柱國王誼為行軍元帥以討消難廣州刺史于顗仲文之兄也與揔管趙文表不恊詐得心疾誘文表手殺之因唱言文表與尉遲迥通謀堅以迥未平因勞勉之即拜吳州揔管趙僭王招謀殺堅邀堅過其第堅齎酒殽就之招引入寢室招子貟貫及妃弟魯封等皆在左右佩刀而立又藏刃於帷席之閒伏壯士於室後堅左右皆不得從唯從祖弟開府儀同大將軍弘大將軍元胄坐於户側胄順之孫也弘胄皆有勇力爲堅腹心酒酣招以佩刀刺􅀲連啗堅欲因而刺之元胄進曰相府有事不可乆留招訶之曰我與丞相言汝何爲者叱之使却胄瞋目憤氣扣刀入衛招賜之酒曰吾豈有不善之意邪卿何猜警如是招偽吐將入後閤胄恐其爲變扶令上坐如此再三招稱喉乾命胄就厨取飲胄不動㑹滕王逌後至堅降階迎之胄耳語曰事勢大異可速去堅曰彼無兵馬何能為胄曰兵馬皆彼物彼若先發大事去矣胄不辭死恐死無益堅復入坐胄聞室後有被甲聲遽請曰相府事殷公何得如此因扶堅下牀趨去招將追之胄以身蔽户招不得出堅及門胄自後至招恨不時􅀤彈指出血壬子堅誣招與越野王盛謀反皆殺之及其諸子賞賜元胄不可勝計周室諸王數欲伺隙殺堅都督臨涇李圎通常保䕶之由是得免癸丑周主封其弟衍為葉王術為郢王周豫荆襄三州蠻反攻破郡縣周韋孝寛軍至永橋城諸將請先攻之孝寛曰城小而固若攻而不拔損我兵威今破其大軍此何能爲於是引軍壁於武陟尉遲迥遣其子魏安公惇帥衆十萬入武德軍於沁東㑹沁水漲孝寛與迥隔水相持不進孝寛長史李詢宻啓丞相堅云梁士彦宇文忻崔弘度並受尉遲迥饟金軍中慅慅人情大異堅深以爲憂與内史上大夫鄭譯謀代此三人者李德林曰公與諸將皆國家貴臣未相服從今正以挾令之威控御之耳前所遣者疑其乖異後所遣者安知其能盡腹心邪又取金之事虚實難眀今一旦代之或懼罪逃逸若加縻縶則自鄖公以下莫不驚疑且臨敵易將此燕趙之所以敗也如愚所見但遣公一腹心明於智略素爲諸將所信服者速至軍所使觀其情偽縱有異意必不敢動動亦能制之矣堅大悟曰公不發此言幾敗大事乃命少内史崔仲方往監諸軍為之節度仲方猷之子也辭以父在山東又命劉昉鄭譯昉辭以未嘗為將譯辭以母老堅不悦府司録髙熲請行堅喜遣之熲受命亟􅀤遣人辭母而已自是堅措置軍事皆與李德林謀之時軍書日以百數德林口授數人文意百端不加治㸃司馬消難以鄖隨温應土順沔儇岳九州及魯山等八鎮來降遣其子永為質以求援八月己未詔以消難為大都督揔督九州八鎮諸軍事司空賜爵隨公庚申詔鎮西將軍樊毅進督沔漢諸軍事南豫州刺史任忠帥衆趣歴陽超武將軍陳慧紀爲前軍都督趣南兖州周益州揔管王謙亦不附丞相堅起西蜀之兵以攻始州梁睿至漢川不得進堅即以睿爲行軍元帥以討謙戊辰詔以司馬消難爲大都督水陸諸軍事庚午通直散騎常侍淳于陵克臨江郡梁世宗使中書舍人柳莊奉書入周丞相堅執莊手曰孤昔以開府從役江陵深蒙梁主殊眷今主幼時艱猥䝉顧託梁主弈葉委誠朝廷當相與共保嵗寒時諸將競勸梁主舉兵與尉遲迥連謀以爲進可以盡節周氏退可以席巻山南梁主疑未決㑹莊至具道堅語且曰昔袁紹劉表王凌諸葛誕皆一時雄傑據要地擁彊兵然功業莫就禍不旋踵者良由魏晋挾天子保京都仗大順以為名故也今尉遲迥雖曰舊將昏耄已甚司馬消難王謙常人之下者非有匡合之才周朝將相多為身計競効節於楊氏以臣料之迥等終當覆滅隨公必移周祚未若保境息民以􅀚其變梁主深然之衆議遂止高熲至軍為橋於沁水尉遲惇於上流縱火栰熲豫為土狗以禦之惇布陳二十餘里麾兵少却欲待孝寛軍半度而擊之孝寛因其却鳴鼔齊進軍既度熲命焚橋以絶士卒反顧之心惇兵大敗單騎走孝寛乗勝進追至鄴庚午迥與惇及惇弟西都公祐悉將其卒十三萬陳於城南迥别統萬人皆緑巾錦襖號曰黄龍兵迥弟勤帥衆五萬自青州赴迥以三千騎先至迥素習軍旅老猶被甲臨陳其麾下兵皆闗中人為之力戰孝寛等軍不利而却鄴中士民􅀚戰者數萬人行軍揔管宇文忻曰事急矣吾當以詭道破之乃先射觀者觀者皆走轉相騰籍聲如雷霆忻乃傳呼曰賊敗矣衆復振因其擾而乗之迥軍大敗走保鄴城孝寛縱兵圍之李詢及思安伯代人賀婁子幹先登崔弘度妹先適迥子為妻及鄴城破迥窘廹升樓弘度直上龍尾追之迥彎弓將射弘度弘度脱兜鍪謂迥曰頗相識不今日各圖國事不得顧私以親戚之情謹遏亂兵不許侵辱事勢如此早為身計何所待也迥擲弓於地罵左丞相極口而自殺弘度顧其弟弘升曰汝可取迥頭弘升斬之軍士在小城中者孝寛盡阬之勤惇祐東走青州未至開府儀同大將軍郭衍追獲之丞相堅以勤初有誠欵特不之罪李惠先自􅅞歸罪堅復其官爵迥末年衰耄及起兵以小御正崔逹拏為長史逹拏暹之子也文士無籌略舉措多失凡六十八日而敗于仲文軍至蓼隄去梁郡七里檀讓擁衆數萬仲文以羸師挑戰而偽北讓不設備仲文還擊大破之生獲五千餘人斬首七百級進攻梁郡迥守將劉子寛弃城走仲文進擊曹州獲迥所署刺史李仲康檀讓以餘衆屯成武仲文襲擊破之遂㧞成武迥將席毗羅衆十萬屯沛縣將攻徐州其妻子在金鄉仲文遣人詐爲毗羅使者謂金鄉城主徐善淨曰檀讓明日午時至金鄉宣蜀公令賞賜將士金鄉人皆喜仲文簡精兵偽建迥旗幟倍道而進善淨望見以為檀讓出迎謁仲文執之遂取金鄉諸將多勸屠其城仲文曰此城乃毗羅起兵之所當寛其妻子其兵自歸如即屠之彼望絶矣衆皆稱善於是毗羅恃衆來薄官軍仲文設伏擊之毗羅軍大潰爭投洙水死水為之不流獲檀讓檻送京師斬毗羅傳首韋孝寛分兵討闗東叛者悉平之堅徙相州於安陽毁鄴城及邑居分相州置毛州魏州梁主聞迥敗謂栁莊曰若從衆人之言社稷已不守矣丞相堅之初得政也待黄公劉昉沛公鄭譯甚厚賞賜不可勝計委以心膂言無不從朝野傾屬稱為黄沛二人皆恃功驕恣溺於財利不親職務及辭監軍堅始踈之恩禮漸薄高熲自軍所還寵遇日隆時王謙司馬消難未平堅憂之忘寢與食而昉逸遊縱酒相府事多遺落堅乃以高熲代昉為司馬不忍廢譯隂敕官屬不得白事於譯譯猶坐聽事無所闗預惶懼頓首求解職堅猶以恩禮慰勉之􅊨癸酉智武將軍魯廣逹克周之郭黙城丙子淳于陵克祐州城周以漢王贊為太師申公李穆為太􅀓宋王實為大前疑秦王贄為大右弼燕公于寔為大左輔寔仲文之父也乙卯周大赦周王誼帥四揔管至鄖州司馬消難擁其衆以魯山甑山二鎮來奔初消難遣上開府儀同大將軍叚珣將兵圍順州順州刺史周法尚不能拒弃城走消難虜其母弟而南樊毅救消難不及周亳州摠管元景山撃之毅掠居民而去景山與南徐州刺史宇文㢸追之與毅戰於漳口一日三戰三捷毅退保甑山鎮城邑為消難所據者景山皆復取之鄖州巴蠻多叛共推渠帥蘭雒州為主以附消難王誼遣諸將分討之旬月皆平陳紀蕭摩訶等攻廣陵周吳州揔管于顗擊破之沙州氐帥楊永安聚衆應王謙大將軍樂寧公逹奚儒討之楊素破宇文胄於石濟斬之周以神武公竇毅為大司馬齊公于智為大司空九月以小宗伯竟陵公楊惠為大宗伯丁亥周將王延貴帥衆援歴陽任忠擊破之生檎延貴壬辰周廢皇后司馬氏為庶人庚戍以隨世子勇為洛州揔管東京小冡宰揔統舊齊之地壬子以左丞相堅為大丞相罷左右丞相之官冬十月甲寅日有食之周丞相堅殺陳惑王純及其子周梁睿將歩騎二十萬討王謙謙分命諸將據險拒守睿奮擊屢破之蜀人大駭謙遣其將逹奚惎高阿那肱乙弗䖍等帥衆十萬攻利州堰江水以灌之城中戰士不過二千揔管昌黎豆盧勣晝夜拒守凡四旬時出竒兵撃惎等破之㑹梁睿至惎等遁去睿自劒閣入進逼成都謙令逹奚惎乙弗䖍城守親帥精兵五萬背城結陳睿擊之謙戰敗將入城惎䖍以城降謙將麾下三十騎走新都新都令王寳執之戊寅睿斬謙及高阿那肱劒南平十一月甲辰周逹奚儒破楊永安沙州平丁未周鄖襄公韋孝寛卒孝寛久在邊境屢抗彊敵所經略布置人初莫之解見其成事方乃驚服雖在軍中篤意文史敦睦宗族所得俸禄不及私室人以此稱之十二月庚辰河東康簡王叔獻卒癸亥周詔諸改姓者宜悉復舊甲子周以大丞相堅爲相國揔百揆去都督中外大冢宰之號進爵爲王以安陸等二十郡爲隋國贊拜不名備九錫之禮堅受王爵十郡而已辛巳殺代奰王逹滕聞王逌及其子壬申以小冢宰元孝規爲大司徒是歳周境内有州二百一十一郡五百八資治通鑑巻第一百七十四
