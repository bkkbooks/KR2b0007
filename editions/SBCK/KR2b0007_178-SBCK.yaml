front:
  text: 資治通鑑卷第一百七十八
  hash: sha256:360b8452d2eda2726010350fa739189a0e7ca5af5531594bab354d6fef9ac5b9
body:
  text: 臣司馬光奉勑編集隋紀二維協洽凡八年起􅀇黓困敦盡屠髙祖文皇帝上之下開皇十二年春二月己巳以蜀王秀為内史令兼右領軍大將軍國子博士何妥與尚書右僕射邳公蘇威爭議事積不相能威子䕫為太子通事舍人少敏辯有盛名士大夫多附之及議樂䕫與妥各有所持詔百僚署其所同百僚以威故同䕫者什八九妥恚曰吾席間函丈四十餘年反為昨暮兒之所屈邪遂奏威與禮部尚書盧愷吏部侍郎薛道衡尚書右丞王􅀪考功侍郎李同和等共為朋黨省中呼􅀪為世子同和為叔言二人如威之子弟也復言威以曲道任其從父弟徹肅罔冒為官等數事上命蜀王秀上柱國虞慶則等雜案之事頗有狀上大怒秋七月乙巳威坐免官爵以開府儀同三司就第盧愷除名知名之士坐威得罪者百餘人初周室以來選無清濁及愷攝吏部與薛道衡等甄别士流故涉朋黨之謗以至得罪未幾上曰蘇威徳行者但為人所誤耳命之通籍威好立條章每歳責民間五品不遜或荅者乃云管内無五品之家其不相應領類多如此又為餘糧簿欲使有無相贍民部侍郎朗茂以為煩迂不急皆奏罷之茂基之子也嘗為衛國令有民張元預兄弟不睦丞尉請加嚴刑茂曰元預兄弟本相憎疾又坐得罪彌益其忿非化民之意也乃徐諭之以義元預等各感悔頓首請罪遂相親睦稱為友悌己巳上享太廟壬申晦日有食之帝以天下用律者多踳駁罪同論異八月甲戌制諸州死罪不得即決悉移大理案覆事盡然後上省奏裁冬十月壬午上享太廟十一月辛亥祀南郊己未新義公韓擒虎卒十二月乙酉以内史令楊素為尚書右僕射與髙熲専掌朝政素性疎辯髙下在心朝臣之内頗推髙熲敬牛􅀪厚接薛道衡視蘇威蔑如也自餘朝貴多被陵轢其才藝風調優於熲至於推誠體國處物平當有宰相識度不如熲逺矣右領軍大將軍賀若弼自謂功名出朝臣之右每以宰相自許既而楊素為僕射弼仍為將軍甚不平形於言色由是坐免官怨望愈甚久之上下弼獄謂之曰我以髙熲楊素為宰相汝每昌言曰此二人惟堪啗飯耳是何意也弼曰熲臣之故人素臣之舅子臣並知其為人誠有此語公卿奏弼怨望罪當死上曰臣下守法不移公可自求活理弼曰臣恃至尊威靈將八千兵度江擒陳叔寶竊以此望活上曰此巳格外重賞何用追論弼曰臣已蒙格外重賞今還格外望活既而上低回者數日惜其功特令除名歳餘復其爵位上亦忌之不復任使然每宴賜遇之甚厚有司上言府藏皆滿無所容積於廊廡帝曰朕既薄賦於民又大經賜用何得爾也對曰入者常多於出略計每年賜用至數百萬段曾無減損於是更闢左藏院以受之詔曰寜積於人無藏府庫河北河東今年田租三分減一兵減半功調全免時天下户口歳增京輔及三河地少而人衆衣食不給帝乃發使四出均天下之田其狹鄉每丁纔至二十畆老少又少焉十三年春正月壬子上祀感生帝壬戌行幸岐州二月丙午詔營仁夀宫於岐州之北使楊素監之素奏前萊州刺史宇文愷撿校將作大匠記室封德彛爲土木監於是夷山堙谷以立宫殿崇臺累榭宛轉相屬役使嚴急丁夫多死疲頓顛仆者推填阬坎覆以土石因而築為平地死者以萬數丁亥上至自岐州己夘立皇孫􅌔為豫章王􅌔廣之子也丁酉制私家不得藏緯候圖讖秋七月戊辰晦日有食之是歳上命禮部尚書牛􅀪等議明堂制度宇文愷獻明堂木様上命有司規度安業里地將立之而諸儒異議久之不決乃罷之上之滅陳也以陳叔寶屏風賜突厥大義公主公主以其宗國之覆心常不平書屏風為詩叙陳亡以自寄上聞而惡之禮賜漸薄彭公劉昶先尚周公主流人楊欽亡入突厥詐言昶欲與其妻作亂攻隋遣欽來宻告大義公主發兵擾邊都藍可汗信之乃不修職貢頗為邊患上遣車騎將軍長孫晟使於突厥微觀察之公主見晟言辭不遜又遣所私胡人安遂迦與楊欽計議扇惑都藍晟至京師具以狀聞上遣晟往索欽都藍不與曰檢校客内無此色人晟乃賂其逹官知欽所在夜掩獲之以示都藍因發公主私事國人大以為恥都藍執安遂迦等并以付晟上大喜加授開府儀同三司仍遣入突厥廢公主内史侍郎裴矩請説都藍使殺公主時處羅矦之子染干號突利可汗居北方遣使求婚上使裴矩謂之曰當殺大義公主乃許婚突利復譖之於都藍都藍因發怒殺公主更表請婚朝議將許之長孫晟曰臣觀雍虞閭反覆無信直以與玷厥有隙所以欲依倚國家雖與為婚終當叛去今若得尚公主承藉威靈玷厥染干必受其徴發彊而更反後恐難圖且染干者處羅矦之子素有誠款於今兩代前乞通婚不如許之招令南徙兵少力弱易可撫馴使敵雍虞閭以為邊捍上曰善復遣晟慰諭染干許尚公主牛􅀪使協律郎范陽祖孝孫等參定雅樂從陳陽山太守毛爽受京房律法布管飛灰順月皆驗又每律生五音十二律為六十音因而六之為三百六十音分直一歳之日以配七音而旋相為宫之法由是著名􅀪等乃奏請復用旋宫法上猶記何妥之言注􅀪奏下不聽作旋宫但用黃鍾一宫於是􅀪等復為奏附順上意其前代金石並銷毁之以息異議􅀪等又作武舞以象隋之功徳郊廟饗用一調迎氣用五調舊工稍盡其餘聲律皆不復通十四年春三月樂成夏四月乙丑詔行新樂且曰民間音樂流僻日久弃其舊體競造繁聲冝加禁約務存其本萬寶常聽太常所奏樂􅊄然泣曰樂聲淫厲而哀天下不久將盡時四海全盛聞者皆謂不然大業之末其言卒驗寶常貧而無子久之竟餓死且死悉取其書燒之曰用此何為先是臺省府寺及諸州皆置公廨錢收息取給工部尚書扶風蘇孝慈以為官司出舉興生煩擾百姓敗損風俗請皆禁止給地以營農上從之六月丁夘始詔公卿以下皆給職田毋得治生與民爭利秋七月乙未以邳公蘇威爲納言初張賓曆既行廣平劉孝孫及冀州秀才劉焯並言其失賔方有寵於上劉暉附會之共短孝孫等斥罷之後賓卒孝孫爲掖縣丞委官入京上其事詔留直太史累年不調乃抱其書使弟子輿櫬來詣闕下伏而慟哭執法拘而奏之帝異焉以問國子祭酒何妥妥言其善乃遣與賔曆比校短長直太史勃海張胄􅀇與孝孫共短賔曆異論鋒起久之不定上令參問日食事楊素等奏太史凡奏日食二十有五率皆無驗胄􅀇所刻前後妙中孝孫所刻驗亦過半於是上引孝孫胄􅀇等親自勞徠孝孫請先斬劉暉乃可定曆帝不懌又罷之孝孫尋卒關中大旱民飢上遣左右視民食得豆屑雜糠以獻上流涕以視羣臣深自咎責為之不御酒肉者殆將一朞八月辛未上帥民就食於洛陽敕斥候不得輒有驅逼男女參厠於仗衛之間遇扶老攜㓜者輒引馬避之慰勉而去至艱險之處見負擔者令左右扶助之冬閏十月甲寅詔以齊梁陳宗祀廢絶命髙仁英蕭琮陳叔寶以時修祭所須器物有司給之陳叔寶從帝登邙山侍飲賦詩曰日月光天徳山河壯帝居太平無以報願上東封書并表請封禪帝優詔荅之它日復侍宴及出帝目之曰此敗豈不由酒以作詩之功何如思安時事當賀若弼度京口彼人宻啓告急叔寶飲酒遂不之省髙熲至日猶見啓在牀下未開封此誠可笑蓋天亡之也昔苻氏征伐所得國皆榮貴其主茍欲求名不知違天命與之官乃違天也齊州刺史盧賁坐民飢閉民糶除名帝後復欲授以一州賁對詔失旨又有怨言帝大怒遂不用皇太子為言此輩並有佐命功雖性行輕險誠不可弃帝曰我抑屈之全其命也㣲劉昉鄭譯盧賁栁裘皇甫績等則我不至此然此等皆反覆子也當周宣帝時以無頼得幸及帝大漸顔之儀等請以趙王輔政此輩行詐顧命於我我將為政又欲亂之故謀大逆譯為巫蠱如賁之例皆不滿志任之則不遜置之則怨望自為難信非我弃之衆人見此謂我薄於功臣斯不然矣賁遂廢卒於家晉王廣帥百官抗表固請封禪帝令牛􅀪等創定儀注既成帝視之曰茲事體大朕何徳以堪之但當東巡因致祭㤗山耳十二月乙未車駕東巡上好機祥小數上儀同三司蕭吉上書曰甲寅乙夘天地之合也今茲甲寅之年以辛酉朔冬至來年乙夘以甲子夏至冬至陽始郊天之日即至尊本命夏至隂始祀地之辰即皇后本命至尊徳並乾之覆育皇后仁同地之載養所以二儀元氣並會本辰上大悦賜物五百段吉懿之孫也員外散騎侍郎王劭言上有龍顔戴干之表指示羣臣上悦拜著作郎劭前後上表言上受命符瑞甚衆又採民閒歌謡引圖書讖緯捃摭佛經回易文字曲加誣飾撰皇隋靈感志三十卷奏之上令宣示天下劭集諸州朝集使盥手焚香閉目而讀之曲折其聲有如歌詠經涉旬朔徧而後罷上益喜前後賞賜優洽十五年春正月壬戌車駕頓齊州庚午爲壇於㤗山柴燎祀天以嵗旱謝愆咎禮如南郊又親祀青帝壇赦天下二月丙辰收天下兵器敢私造者坐之關中縁邊不在其例三月己未至自東巡仁夀宫成丁亥上幸仁夀宫時天暑役夫死者相次於道楊素悉焚除之上聞之不悦及至見制度壯麗大怒曰楊素殫民力爲離宫為吾結怨天下素聞之惶恐慮獲譴以告封徳彛曰公勿憂俟皇后至必有恩詔明日上果召素入對獨孤后勞之曰公知吾夫婦老無以自娛盛飾此宫豈非忠孝賜錢百萬錦絹三千段素負貴恃才多所陵侮唯賞重徳彞每引之與論宰相職務終日忘倦因撫其牀曰封郎必當據吾此座屢薦於帝帝擢為内史舍人夏四月己丑朔赦天下六月戊子詔鑿底柱庚寅相州刺史豆盧通貢綾文布命焚之於朝堂秋七月納言蘇威坐從祠太山不敬免俄而復位上謂羣臣曰世人言蘇威詐清家累金玉此妄言也然其性狠戾不切世要求名太甚從已則悦違之必怒此其大病耳戊寅上至自仁夀宫冬十月戊子以吏部尚書韋世康為荆州摠管世康洸之弟也和静謙恕在吏部十餘年時稱廉平常有止足之志謂子弟曰禄豈須多防滿則退年不待暮有疾便辭固懇乞骸骨帝不許使鎮荆州時天下唯有四揔管并揚益荆以晉秦蜀三主及世康為之當丗以為榮十一月辛酉上幸温湯十二月戊子敕盜邊糧一升已上皆斬仍籍没其家己丑詔文武官以四考受代汴州刺史令狐熙來朝考績為天下之最賜帛三百匹頒告天下熙整之子也十六年春正月丁亥以皇孫裕為平原王筠為安成王嶷為安平王恪為襄城王該為髙陽王韶為建安王煚為潁川王皆勇之子也夏六月甲午初制工商不得仕進秋八月丙戌詔決死罪者三奏然後行刑冬十月己丑上幸長春宫十一月壬子還長安党項寇會州詔發隴西兵討降之帝以光化公主妻吐谷渾可汗世伏世伏上表請稱公主為天后上不許十七年春二月癸未太平公史萬歳擊南寜羌平之初梁睿之克王謙也西南夷獠莫不歸附唯南寜州酋帥㸑震恃逺不服睿上疏以為南寜州漢世䍧柯之地户口殷衆金寶冨饒梁南寜州刺史徐文盛為湘東王徴赴荆州屬東夏尚阻未遑逺略土民㸑瓚遂竊據一方國家遥授刺史其子震相承至今而震臣禮多虧貢賦不入乞因平蜀之衆略定南寜帝以天下􅀄定未之許其後南寜夷㸑翫來降拜昆州刺史既而復叛乃以左領軍將軍史萬歳為行軍揔管帥衆擊之入自蜻蛉川至于南中夷人前後屯據要害萬歳皆擊破之過諸葛亮紀功碑度西洱河入渠濫川行千餘里破其三十餘部虜獲男女二萬餘口諸夷大懼遣使請降獻明珠徑寸於是勒石頌羙隋徳萬歳請將㸑翫入朝詔許之㸑翫隂有貳心不欲詣闕賂萬歳以金寶萬歳於是捨翫而還庚寅上幸仁夀宫桂州俚帥李光仕作亂帝遣上柱國王世積與前桂州揔管周法尚討之法尚發嶺南兵世積發嶺北兵俱會尹州世績所部遇瘴不能進頓于衡州法尚獨討之光仕戰敗帥勁兵走保白石洞法尚大獲家口其黨有來降者輒以妻子還之居旬日降者數千人光仕衆潰而走追斬之帝又遣貟外散騎侍郎何稠募兵討光仕稠諭降其黨莫崇等承制署首領為州縣官稠妥之兄子也上以嶺南夷越數反以汴州刺史令狐熙為桂州揔管十七州諸軍事許以便宜從事刺史以下官得承制補授熙至部大􅀪恩信其溪洞渠帥更相謂曰前時揔管皆以兵威相脅今者乃以手敎相諭我輩其可違乎於是相帥歸附先是州縣生梗長吏多不得之官寄政於揔管府熙悉遣之為建城邑開設學校華夷感化焉俚帥寗猛力者在陳世已據南海隋因而撫之拜安州刺史猛力恃險驕倨未嘗參謁熙諭以恩信猛力感之詣府請謁不敢為非熙奏改安州為欽州帝以所在屬官不敬憚其上事難克舉三月壬辰詔諸司論屬官罪有律輕情重者聽於律外斟酌決杖於是上下相驅迭相捶楚以殘暴為幹能以守法為懦弱帝以盜賊繁多命盜一錢以上皆弃市或三人共盜一􅀲事發即死於是行旅皆晏起早宿天下懔懔有數人劫執事而謂之曰吾豈求財者邪但為枉人來耳而爲我奏至尊自古以來體國立法未有盜一錢而死也而不為我以聞吾更來而屬無類矣帝聞之為停此法帝嘗乗怒欲以六月杖殺人大理少卿河東趙綽固爭曰季夏之月天地成長庶類不可以此時誅殺帝報曰六月雖曰生長此時必有雷霆我則天而行有何不可遂殺之大理掌固來曠上言大理官司太寛帝以曠爲忠直遣每旦於五品行中參見曠又告少卿趙綽濫免徒囚帝使信臣推驗初無阿曲帝怒命斬之綽固争以爲曠不合死帝拂衣入閤綽矯言臣更不理曠自有佗事未及奏聞帝命引入閤綽再拜請曰臣有死罪三臣爲大理少卿不能制馭掌固使曠觸挂天刑一也囚不合死而臣不能死爭二也臣本無佗事而妄言求入三也帝解顔會獨孤后在坐命賜綽二金盃酒并盃賜之曠因免死徙廣州蕭摩訶子丗略在江南作亂摩訶當從坐上曰世略年未二十亦何能爲以其名將之子爲人所逼耳因赦摩訶綽固諌不可上不能奪欲綽去而赦之因命綽退食綽曰臣奏獄未決不敢退上曰大理其爲朕特捨摩訶也因命左右釋之刑部侍郎辛亶嘗衣緋禈俗云利官上以爲厭蠱將斬之綽曰法不當死臣不敢奉詔上怒甚曰卿惜辛亶而不自惜也命引綽斬之綽曰陛下寜殺臣不可殺辛亶至朝堂解衣當斬上使人謂綽曰竟何如對曰執法一心不敢惜死上拂衣而入良久乃釋之明日謝綽勞勉之賜物三百叚時上禁行惡錢有二人在市以惡錢易好者武􅀱執以聞上令悉斬之綽進諫曰此人所坐當杖殺之非法上曰不關卿事綽曰陛下不以臣愚暗置在法司欲妄殺人豈得不關臣事上曰撼大木不動者當退對曰臣望感天心何論動木上復曰啜羮者熱則置之天子之威欲相挫邪綽拜而益前訶之不肯退上遂入治書侍御史栁彧復上奏切諫上乃止上以綽有誠直之心每引入閤中或遇上與皇后同榻即呼綽坐評論得失前後賞賜萬計與大理卿薛胄同時俱名平恕然胄斷獄以情而綽守法俱為稱職胄端之子也帝晩節用法益峻御史於元日不劾武官衣劒之不齊者帝曰爾為御史縱捨自由命殺之諫議大夫毛思祖諫又殺之將作寺丞以課麥􆁔遲晚武庫令以署庭荒蕪左右出使或受牧宰馬鞭鸚鵡帝察知並親臨斬之帝既喜怒不恒不復依凖科律信任楊素素復任情不平與鴻臚少卿陳延有隙嘗經蕃客館庭中有馬屎又衆僕於氊上樗蒲以白帝帝大怒主客令及樗蒲者皆杖殺之棰陳延幾死帝遣親衛大都督長安屈突通往隴西檢覆羣牧得隱匿馬二萬餘匹帝大怒將斬太僕卿慕容悉逹及諸監官千五百人通諫曰人命至重陛下奈何以畜産之故殺千有餘人臣敢以死請帝瞋目叱之通又頓首曰臣一身分死就陛下匄千餘人命帝感寤曰朕之不明以至於此賴有卿忠言耳於是悉逹等皆減死論擢通為左武􅀱將軍上柱國彭公劉昶與帝有舊帝甚親之其子居士任俠不遵法度數有罪上以昶故每原之居士轉驕恣取公卿子弟雄健者輒將至家以車輪括其頸而棒之殆死能不屈者稱為壯士釋而與交黨與三百人􅇌擊路人多所侵奪至於公卿妃主莫敢與校或告居士謀為不軌上怒斬之公卿子弟坐居士除名者甚衆楊素牛􅀪等復薦張胄􅀇曆術上令楊素與術數人立議六十一事皆舊法久難通者令劉暉與胄􅀇等辨析之暉杜口一無所荅胄􅀇通者五十四上乃拜胄􅀇員外散騎侍郎兼太史令賜物千段令參定新術至是胄􅀇曆成夏四月戊寅詔頒新曆前造曆者劉暉等四人並除名秋七月桂州人李世賢反上議討之諸將數人請行上不許顧右武􅀱大將軍虞慶則曰位居宰相爵乃上公國家有賊遂無行意何也慶則拜謝恐懼乃以慶則為桂州道行軍揔管討平之秦王俊幼仁恕喜佛敎嘗請為沙門不許及為并州揔管漸好奢侈違越制度盛治宫室俊好内其妃崔氏􅀪度之妺也性妬於􅀲中進毒由是得疾徴還京師上以其奢縱丁亥免俊官以王就第崔妃以毒王廢絶賜死於家左武衛將軍劉昇諫曰秦王非有佗過但費官物營廨舍而已臣謂可容上曰法不可違楊素復諫曰秦王之過不應至此願陛下詳之上曰我是五兒之父非兆民之父若如公意何不别制天子兒律以周公之爲人尚誅管蔡我誠不及周公逺矣安能虧法乎卒不許戊戌突厥突利可汗來逆女上舍之太常敎習六禮妻以宗女安義公主上欲離間都藍故特厚其禮遣太常卿牛􅀪納言蘇威民部尚書斛律孝卿相繼為使突利本居北方既尚主長孫晟説其帥衆南徙居度斤舊鎮錫賚優厚都藍怒曰我大可汗也反不如染干於是朝貢遂絶亟來抄掠邊鄙突利伺知動静輒遣奏聞由是邊鄙每先有備九月甲申上至自仁夀宫何稠之自嶺南還也甯猛力請隨稠入朝稠見其疾篤遣還欽州與之約曰八九月間可詣京師相見使還奏狀上意不懌冬十月猛力病卒上謂稠曰汝前不將猛力來今竟死矣稠曰猛力與臣約假令身死當遣子入侍越人性直其子必來猛力臨終果誡其子長真曰我與大使約不可失信汝􅁙我畢即宜登路長真嗣為刺史如言入朝上大悦曰何稠著信蠻夷乃至於此魯公虞慶則之討李世賢也以婦弟趙什住為隨府長史什住通於慶則愛妾恐事泄乃宣言慶則不欲此行上聞之禮賜甚薄慶則還至潭州臨桂嶺觀眺山川形勢曰此誠險固加以足糧若守得其人攻不可㧞使什住馳詣京師奏事觀上顔色什住因告慶則謀反下有司案驗十二月壬子慶則坐死拜什住為柱國髙麗王湯聞陳亡大懼治兵積榖為拒守之策是歳上賜湯璽書責以雖稱藩附誠節未盡且曰彼之一方雖地狹人少今若黜王不可虚置終須更選官屬就彼安撫王若洒心易行率由憲章即是朕之良臣何勞别遣才彦王謂遼水之廣何如長江髙麗之人多少陳國朕若不存含育責王前愆命一將軍何待多力殷勤曉示許王自新耳湯得書惶恐將奉表陳謝會病卒子元嗣立上使使拜元爲上開府儀同三司襲爵遼東公元奉表謝恩因請封王上許之吐谷渾大亂國人殺丗伏立其弟伏允爲主遣使陳廢立之事并謝專命之罪且請依俗尚主上從之自是朝貢歳至十八年春二月甲辰上幸仁夀宫髙麗王元帥靺鞨之衆萬餘寇遼西營州揔管韋冲擊走之上聞而大怒乙巳以漢王諒王世積並為行軍元帥將水陸三十萬伐髙麗以尚書左僕射髙熲為漢王長史周羅􅙖為水軍揔管延州刺史獨孤陁有婢曰徐阿尼事猫鬼能使之殺人云每殺人則死家財物潛移於畜猫鬼家會獨孤后及楊素妻鄭氏俱有疾醫皆曰猫鬼疾也上以陁后之異母弟陁妻楊素異母妹由是意陁所為令髙熲等雜治之具得其實上怒令以犢車載陁夫妻將賜死於家獨孤后三日不食為之請命曰陁若蠹政害民者妾不敢言今坐爲妾身敢請其命陁弟司勳侍郎整詣闕求哀於是免陁死除名為民以其妻楊氏為尼先是有人訟其母為猫鬼所殺者上以為妖妄怒而遣之至是詔誅被訟行猫鬼家夏四月辛亥詔畜猫鬼蠱毒厭魅野道之家並投於四裔六月丙寅下詔黜髙麗王元官爵漢王諒軍出臨渝關值水潦餽運不繼軍中乏食復遇疾疫周羅􅙖自東萊泛海趣平壤城亦遭風船多飄沒秋九月己丑師還死者什八九髙麗王元亦惶懼遣使謝罪上表稱遼東糞土臣元上於是罷兵待之如初百濟王昌遣使奉表請為軍導帝下詔諭以髙麗服罪朕已赦之不可致伐厚其使而遣之髙麗頗知其事以兵侵掠其境辛夘上至自仁夀宫冬十一月癸未上祀南郊十二月自京師至仁夀宫置行宫十有二所南寜夷爨翫復反蜀王秀奏史萬歳受賂縱賊致生邊患上責萬歳萬歳詆讕上怒命斬之髙熲及左衛大將軍元旻等固請曰萬歳雄略過人將士樂為致力雖古名將未能過也上意少解於是除名為民十九年春正月癸酉赦天下二月甲寅上幸仁夀宫突厥突利可汗因長孫晟奏言都藍可汗作攻具欲攻大同城詔以漢王諒為元帥尚書左僕射髙熲出朔州道右僕射楊素出靈州道上柱國燕榮岀幽州道以擊都藍皆取漢王節度然漢王竟不臨戎都藍聞之與逹頭可汗結盟合兵掩襲突利大戰長城下突利大敗都藍盡殺其兄弟子姪遂度河入蔚州突利部落散亡夜與長孫晟以五騎南走比旦行百餘里收得數百騎突利與其下謀曰今兵敗入朝一降人耳大隋天子豈禮我乎玷厥雖來本無寃隙若往投之必相存濟晟知之宻遣使者入伏逺鎮令速舉烽突利見四烽俱發以問晟晟紿之曰城髙地逈必遥見賊來我國家法若賊少舉二烽來多舉三烽大逼舉四烽彼見賊多而又近耳突利大懼謂其衆曰追兵已逼且可投城既入鎮晟留其逹官執室領其衆自將突利馳驛入朝夏四月丁酉突利至長安帝大喜以晟為左勲衛驃騎將軍持節護突厥上令突利與都藍使者因頭特勒相辨詰突利辭直上乃厚待之都藍弟都速六弃其妻子與突利歸朝上嘉之使突利多遺之珍寶以慰其心髙熲使上柱國趙仲卿將兵三千為前鋒至族蠡山與突厥遇交戰七日大破之追奔至乞伏泊復破之虜千餘口雜畜萬計突厥復大舉而至仲卿為方陳四靣拒戰凡五日會髙熲大兵至合擊之突厥敗走追度白道踰秦山七百餘里而還楊素軍與逹頭遇先是諸將與突厥戰慮其騎兵奔突皆以戎車步騎相參設鹿角為方陳騎在其内素曰此乃自固之道未足以取勝也於是悉除舊法令諸軍為騎陳逹頭聞之大喜曰天賜我也下馬仰天而拜帥騎兵十餘萬直前上儀同三司周羅睺曰賊陳未整請擊之先帥精騎逆戰素以大兵繼之突厥大敗逹頭被重創而遁殺傷不可勝計其衆號哭而去六月丁酉以豫章王暕為内史令宜陽公王世積為涼州揔管其親信安定皇甫孝諧有罪吏捕之亡抵世積世積不納孝諧配防桂州因上變稱世積嘗令道人相其貴不道人荅曰公當為國主又將之涼州其所親謂世積曰河西天下精兵處可圖大事世積曰涼州土曠人希非用武之國世積坐誅拜孝諧上大將軍獨孤后性妬忌後宫莫敢進御尉遲迥女孫有美色先没宫中上於仁夀宫見而悦之因得幸后伺上聽朝隂殺之上由是大怒單騎從苑中出不由徑路入山谷間二十餘里髙熲楊素等追及上扣馬苦諫上太息曰吾貴爲天子不得自由髙熲曰陛下豈以一婦人而輕天下上意少解駐馬良久中夜方還宫后俟上於閤内及至后流涕拜謝熲素等和解之因置酒極歡先是后以髙熲父之家客甚見親禮至是聞熲謂已為一婦人遂銜之時太子勇失愛於上潛有廢立之志從容謂熲曰有神告晉王妃言王必有天下若之何熲長跪曰長幼有序其可廢乎上黙然而止獨孤后知熲不可奪隂欲去之會上令選東宫衛士以入上臺熲奏稱若盡取彊者恐東宫宿衛太劣上作色曰我有時出入宿衛須得勇毅太子毓徳春宫左右何須壯士此極弊法如我意者恒於交畨之日分向東宫上下團伍不别豈非佳事我熟見前代公不須仍踵舊風熲子表仁娶太子女故上以此言防之熲夫人卒獨孤后言於上曰髙僕射老矣而喪夫人陛下何能不為之娶上以后言告熲熲流涕謝曰臣今已老退朝唯齋居讀佛經而已雖陛下垂哀之深至於納室非臣所願上乃止既而熲愛妾生男上聞之極喜后甚不悦上問其故后曰陛下尚復信髙熲邪始陛下欲為熲娶熲心存愛妾靣欺陛下今其詐已見安得信之上由是疎熲伐遼之役熲固諫不從及師無功后言於上曰熲初不欲行陛下强遣之妾固知其無功矣又上以漢王年少專委軍事於熲熲以任寄隆重每懷至公無自疑之意諒所言多不用諒甚銜之及還泣言於后曰兒幸免髙熲所殺上聞之彌不平及擊突厥出白道進圖入磧遣使請兵近臣緣此言熲欲反上未有所荅熲已破突厥而還及王世積誅推覈之際有宫禁中事云於熲處得之上大驚有司又奏熲及左右衛大將軍元旻元胄並與世積交通受其名馬之贈旻胄坐免官上柱國賀若弼吳州揔管宇文㢸刑部尚書薛胄民部尚書斛律孝卿兵部尚書栁述等明熲無罪上愈怒皆以屬吏自是朝臣莫敢言者秋八月癸夘熲坐免上柱國左僕射以齊公就第未幾上幸秦王俊第召熲侍宴熲歔欷悲不自勝獨􅀌后亦對之泣上謂熲曰朕不負公公自負也因謂侍臣曰我於髙熲勝於兒子雖或不見常似目前自其解落瞑然忘之如本無髙熲人臣不可以身要君自云第一也頃之熲國令上熲隂事稱其子表仁謂熲曰司馬仲逹初託疾不朝遂有天下公今遇此焉知非福於是上大怒囚熲於内史省而鞫之憲司復奏沙門真覺嘗謂熲云明年國有大喪尼令暉復云十七十八年皇帝有大厄十九年不可過上聞而益怒顧謂羣臣曰帝王豈可力求孔子以大聖之才猶不得天下熲與子言自比晉帝此何心乎有司請斬之上曰去年殺虞慶則今茲斬王世積如更誅熲天下其謂我何於是除名為民熲初為僕射其母戒之曰汝富貴已極但有一斫頭耳爾其慎之熲由是常恐禍變至是熲歡然無恨色先是國子祭酒元善言於上曰楊素麤疎蘇威怯懦元胄元旻正似鴨耳可以付社稷者唯獨髙熲上初然之及熲得罪上深責之善憂懼而卒九月乙丑以太常卿牛􅀪為吏部尚書􅀪選舉先徳行而後文才務在審慎雖致停緩其所進用並多稱職吏部侍郎髙孝基鑒賞機晤清慎絶倫然爽俊有餘迹似輕薄時宰多以此疑之唯􅀪深識其真推心任委隋之選舉得人於斯為最時論彌服􅀪識度之逺冬十月甲午以突厥突利可汗為意利珍豆啓民可汗華言意智健也突厥歸啓民者男女萬餘口上命長孫晟將五萬人於朔州築大利城以處之時安義公主已卒復使晟持節送宗女義成公主以妻之晟奏染干部落歸者益衆雖在長城之内猶被雍虞閭抄掠不得寜居請徙五原以河為固於夏勝两州之間東西至河南北四百里掘為横塹令處其内使得任情畜牧上從之又令上柱國趙仲卿屯兵二萬為啓民防逹頭代州揔管韓洪等將步騎一萬鎮恒安逹頭騎十萬來冦韓洪軍大敗仲卿自樂寜鎮邀擊斬首虜千餘級帝遣越公楊素出靈州行軍揔管韓僧夀出慶州太平公史萬歳出燕州大將軍武威姚辯出河州以擊都藍師未出塞十二月乙未都藍為部下所殺逹頭自立為步迦可汗其國大亂長孫晟言於上曰今官軍臨境戰數有功虜内自攜離其主被殺乘此招撫可以盡降請遣染干部下分道招慰上從之降者甚衆資治通鑑卷第一百七十八
