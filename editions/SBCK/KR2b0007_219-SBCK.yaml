body:
  text: 臣司馬光奉敕編集唐紀三十五圍作噩閏月不滿一年起柔兆涒灘十月盡強肅宗文明武德大聖大宣孝皇帝中之上至德元載冬十月辛巳朔日有食之既上發順化癸未至彭原初李林甫為相諫官言事皆先白宰相退則又以所言白之御史言事須大夫同署至是敕盡革其弊開諫諍之塗又令宰相分直政事筆承㫖旬日而更懲林甫及楊國忠之專權故也第五琦見上於彭原請以江淮租庸市輕貨泝江漢而上至洋川令漢中王瑀陸運至扶風以助軍上從之尋加琦山南等五道度支使琦作􅅦鹽法用以饒房琯喜賔客好談論多引拔知名之士而輕鄙庸俗人多怨之北海太守賀蘭進明詣行在上命琯以為南海太守兼御史大夫充嶺南節度使琯以為攝御史大夫進明入謝上怪之進明因言與琯有隙且曰晉用王衍為三公祖尚浮虚致中原板蕩今房琯專為迃闊大言以立虚名所引用皆浮華之黨真王衍之比也陛下用為宰相恐非社稷之福且琯在南朝佐上皇使陛下與諸王分領諸道節制仍置陛下於沙塞空虚之地又布私黨於諸道使統大權其意以為上皇一子得天下則己不失富貴此豈忠臣所為乎上由是踈之房琯上䟽請自將兵復兩京上許之加持節招討西京兼防禦蒲潼兩關兵馬節度等使琯請自選參佐以御史中丞鄧景山為副戸部侍郎李揖為行軍司馬給事中劉秩為參謀既行又令兵部尚書王思禮副之琯悉以戎務委李揖劉秩二人皆書生不閑軍旅琯謂人曰賊曳落河雖多安能敵我劉秩琯分為三軍使禆將楊希文將南軍自冝夀入劉貴哲將中軍自武功入李光進將北軍自奉天入光進光弼之弟也以賀蘭進明為河南節度使潁王璬之至成都也崔圓迎謁拜於馬首璬不之止圓恨之璬視事兩月吏民安之圓奏罷璬使歸内宅以武部侍郎李峘為劒南節度使代之峘峴之兄也上皇尋命璬與陳王珪詣上宣慰至是見上於彭原延王玢從上皇入蜀追車駕不及上皇怒欲誅之漢中王瑀救之乃命玢亦詣上所甲申令狐潮王福德復將步騎萬餘攻雍丘張巡出擊大破之斬首數千級賊遁去房琯以中軍北軍為前鋒庚子至便橋辛丑二軍遇賊將安守忠於咸陽之陳濤斜琯效古法用車戰以牛車二千乗馬步夾之賊順風鼓譟牛皆震駭賊縱火焚之人畜大亂官軍死傷者四萬餘人存者數千而己癸卯琯自以南軍戰又敗楊希文劉貴哲皆降於賊上聞琯敗大怒李泌為之營救上乃宥之待琯如初以薛景仙為關内節度副使敦煌王承寀至回紇牙帳回紇可汗以女妻之遣其貴臣與承宷及僕固懷恩皆來見上於彭原上厚禮其使者而歸之賜回紇女號毗伽公主尹子奇圍河閒四十餘日不下史思明引兵㑹之顔真卿遣其將和琳將萬二千人救河閒思明逆擊擒之遂陷河閒執李奐送洛陽殺之又陷景城太守李暐赴湛水死思明使兩騎齎尺書以招樂安即時舉郡降又使其將康没野波將先鋒攻平原兵未至顔真卿知力不敵壬寅弃郡度河南走思明即以平原兵攻清河愽平皆陷之思明引兵圍烏承恩於信都承恩以城降親導思明入城交兵馬倉庫馬三千匹兵五萬人思明送承恩詣洛陽禄山復其官爵饒陽禆將束鹿張興力舉千鈞性復明辯賊攻饒陽彌年不能下及諸郡皆陷思明并力圍之外救俱絶太守李系窘迫赴火死城遂陷思明擒興立於馬前謂曰將軍真壯士能與我共富貴乎興曰興唐之忠臣固無降理今數刻之人耳願一言而死思明曰試言之興曰主上待祿山恩如父子羣臣莫及不知報德乃興兵指闕塗炭生人大丈夫不能翦除凶逆乃北面為之臣乎僕有短策足下能聽之乎足下所以從賊求富貴耳譬如鷰巢于幕豈能乆安何如乗閒取賊轉禍為福長享富貴不亦美乎思明怒命張於木上鋸殺之詈不絶口以至於死賊每破一城城中人衣服財賄婦人皆為所掠男子壯者使之負擔羸病老幼皆以刀槊戲殺之禄山初以卒三千人授思明使定河北至是河北皆下之郡置防兵三千雜以胡兵鎮之思明還愽陵尹子奇將五千騎度河略北海欲南取江淮㑹回紇可汗遣其臣葛邏支將兵入援先以二千騎奄至范陽城下子奇聞之遽引兵歸十一月戊午回紇至帶汗谷與郭子儀軍合辛酉與同羅及叛胡戰於榆林河北大破之斬首三萬捕虜一萬河曲皆平子儀還軍洛交上命崔渙宣慰江南兼知選舉令狐潮帥衆萬餘營雍丘城北張巡邀擊大破之賊遂走永王璘幼失母為上所鞠養常抱之以眠從上皇入蜀上皇命諸子分揔天下節制諫議大夫高適諫以為不可上皇不聽璘領四道節度都使鎮江陵時江淮租賦山積於江陵璘召募勇士數萬人日費巨萬璘生長深宫不更人事子襄城王瑒有勇力好兵有薛鏐等為之謀主以為今天下大亂惟南方完冨璘握四道兵封疆數千里宜據金陵保有江表如東晉故事上聞之敕璘歸覲于蜀璘不從江陵長史李峴辭疾赴行在上召高適與之謀適陳江東利害且言璘必敗之狀十二月置淮南節度使領廣陵等十二郡以適為之置淮南西道節度使領汝南等五郡以來瑱為之使與江東節度使韋陟共圖璘安禄山遣兵攻潁川城中兵少無蓄積太守薛愿長史龐堅悉力拒守繞城百里廬舎林木皆盡朞年救兵不至禄山使阿史那承慶益兵攻之晝夜死鬭十五日城陷執愿堅送洛陽祿山縛於洛濵木上凍殺之上問李泌今敵彊如此何時可定對曰臣觀賊所獲子女金帛皆輸之范陽此豈有雄據四海之志邪今獨虜將或為之用中國之人惟高尚等數人自餘皆脅從耳以臣料之不過二年天下無冦矣上曰何故對曰賊之驍將不過史思明安守忠田乾真張忠志阿史那承慶等數人而巳今若令李光弼自太原出井陘郭子儀自馮翊入河東則思明忠志不敢離范陽常山守忠乾真不敢離長安是以兩軍縶其四將也從禄山者獨承慶耳願敕子儀勿取華陰使兩京之道常通陛下以所徴之兵軍於扶風與子儀光弼互出擊之彼救首則擊其尾救尾則擊其首使賊往來數千里疲於奔命我常以逸待勞賊至則避其鋒去則乗其弊不攻城不遏路來春復命建寜為范陽節度大使並塞北出與光弼南北掎角以取范陽覆其巢穴賊退則無所歸留則不獲安然後大軍四合而攻之必成擒矣上悦時張良娣與李輔國相表裏皆惡泌建寜王倓謂泌曰先生舉倓於上得展臣子之效無以報德請為先生除害泌曰何也倓以良娣為言泌曰此非人子所言願王姑置之勿以為先倓不從甲辰永王璘擅引舟師東巡㳂江而下軍容甚盛然猶未露割據之謀吳郡太守兼江南東路采訪使李希言平牒璘詰其擅引兵東下之意璘怒分兵遣其將渾惟明襲希言於吳郡季廣琛襲廣陵長史淮南采訪使李成式於廣陵璘進至當塗希言遣其將元景曜及丹徒太守閻敬之將兵拒之李成式亦遣其將李承慶拒之璘擊斬敬之以徇景曜承慶皆降於璘江淮大震高適與來瑱韋陟㑹於安陸結盟誓衆以討之于闐王勝聞安禄山反命其弟曜攝國事自將兵五千入援上嘉之拜特進兼殿中監令狐潮李庭望攻雍丘數月不下乃置杞州築城於雍丘之北以絶其糧援賊常數萬人而張巡衆纔千餘每戰輙克河南節度使虢王巨屯彭城假巡先鋒使是月魯東平濟陰陷于賊賊將楊朝宗帥馬步二萬将襲寜陵斷巡後巡遂拔雍丘東守寜陵以待之始與睢陽太守許遠相見是日楊朝宗至寜陵城西北巡遠與戰晝夜數十合大破之斬首萬餘級流尸塞汴而下賊收兵夜遁敕以巡為河南節度副使巡以將士有功遣使詣虢王巨請空名告身及賜物巨唯與折衝果毅告身三十通不與賜物巡移書責巨巨竟不應是嵗置北海節度使領北海等四郡上黨節度使領上黨等三郡興平節度使領上洛等四郡吐蕃陷威戎神威定戎宣威制勝金天天成等軍石堡城百谷城雕窠城初林邑王范真龍為其臣摩訶漫多伽獨所殺盡滅范氏國人立其王頭黎之女為王女不能治國更立頭黎之姑子諸葛地謂之環王妻以女王二載春正月上皇下誥以憲部尚書李麟同平章事揔行百司命崔圎奉誥赴彭原麟懿祖之後也安禄山自起兵以來目漸昬至是不復睹物又病疽性益躁暴左右使令小不如意動加箠撻或時殺之既稱帝深居禁中大將希得見其靣皆因嚴莊白事莊雖貴用事亦不免箠撻閹豎李猪兒被撻尤多左右人不自保禄山嬖妾段氏生子慶恩欲以代慶緒為後慶緒常懼死不知所出莊謂慶緒曰事有不得巳者時不可失慶緒曰兄有所為敢不敬從又謂猪兒曰汝前後受撻寜有數乎不行大事死無日矣猪兒亦許諾莊與慶緒夜持兵立帳外猪兒執刀直入帳中斫祿山腹左右懼不敢動禄山捫枕旁刀不獲撼帳竿曰必家賊也膓巳流血數斗遂死掘牀下深數尺以氈裹其尸埋之誡宫中不得泄乙卯旦莊宣言於外云禄山疾亟立晉王慶緒為太子尋即帝位尊禄山為太上皇然後􅀤䘮慶緒性昬懦言辭無序莊恐衆不服不令見人慶緒日縱酒為樂兄事莊以為御史大夫馮翊王事無大小皆取决焉厚加諸將官爵以恱其心上從容謂李泌曰廣平為元帥踰年今欲命建寜專征又恐勢分立廣平為太子何如對曰臣固甞言之矣戎事交切須即區處至於家事當俟上皇不然後代何以辨陛下靈武即位之意邪此必有人欲令臣與廣平有隙耳臣請以語廣平廣平亦必未敢當泌出以告廣平王俶俶曰此先生深知其心欲曲成其美也乃入固辭曰陛下猶未奉晨昬臣何心敢當儲副願俟上皇還宫臣之幸也上賞慰之李輔國本飛龍小兒粗閑書計給事太子宫上委信之輔國外恭謹寡言而内狡險見張良娣有寵陰附會之與相表裏建寜王倓數於上前詆訐二人罪惡二人譖之於上曰倓恨不得為元帥謀害廣平王上怒賜倓死於是廣平王俶及李泌皆内懼俶謀去輔國及良娣泌曰不可王不見建寜之禍乎俶曰竊為先生憂之泌曰泌與主上有約矣俟平京師則去還山庶免於患俶曰先生去則俶益危矣泌曰王但盡人子之孝良娣婦人王委曲順之亦何能為上謂泌曰今郭子儀李光弼巳為宰相若克兩京平四海則無官以賞之奈何對曰古者官以任能爵以酬功漢魏以來雖以郡縣治民然有功則錫以茅土傳之子孫至于周隋皆然唐初未得關東故封爵皆設虚名其食實封者給繒布而巳貞觀中太宗欲復古制大臣議論不同而止由是賞功者多以官夫以官賞功有二害非才則廢事權重則難制是以功臣居大官者皆不為子孫之逺圖務乗一時之權以邀利無所不為曏使禄山有百里之國則亦惜之以傳子孫不反矣爲今之計俟天下旣平莫若䟽爵土以賞功臣則雖大國不過二三百里可比今之小郡豈難制哉於人臣乃萬世之利也上曰善上聞安西北庭及拔汗那大食諸國兵至凉鄯甲子幸保定丙寅劒南兵賈秀等五千人謀反將軍席元慶臨卭太守柳奕討誅之河西兵馬使蓋庭倫與武威九姓商胡安門物等殺節度使周泌聚衆六萬武威大城之中小城有七胡據其五二城堅守支度判官崔稱與中使劉日新以二城兵攻之旬有七日平之史思明自愽陵蔡希德自太行高秀巗自大同牛廷介自范陽引兵共十萬冦太原李光弼麾下精兵皆赴朔方餘團練烏合之衆不滿萬人思明以爲太原指掌可取既得之當遂長驅取朔方河隴太原諸將皆懼議修城以待之光弼曰太原城周四十里賊垂至而興役是未見敵先自困也乃帥士卒及民於城外鑿壕以自固作墼數十萬衆莫知所用及賊攻城於外光弼用之增壘於内壞輙補之思明使人取攻具於山東以胡兵三千衛送之至廣陽别將慕容溢張奉璋邀擊盡殺之思明圍太原月餘不下乃選驍鋭為遊兵戒之曰我攻其北則汝濳趣其南攻東則趣西有隙則乗之而光弼軍令嚴整雖冦所不至警邏未甞少懈賊不得入光弼購募軍中苟有小技皆取之隨能使之人盡其用得安邊軍錢工三善穿地道賊於城下仰而侮詈光弼遣人從地道中曳其足而入臨城斬之自是賊行皆視地賊為梯衝土山以攻城光弼為地道以迎之近城輙䧟賊初逼城急光弼作大礮飛巨石一􅀤輙斃二十餘人賊死者什二三乃退營於數十步外圍守益固光弼遣人詐與賊約刻日出降賊喜不為備光弼使穿地道周賊營中搘之以木至期光弼勒兵在城上遣禆將將數千人出如降狀賊皆屬目俄而營中地陷死者千餘人賊衆驚亂官軍鼓譟乗之俘斬萬計會安禄山死慶緒使思明歸守范陽留蔡希德等圍太原慶緒以尹子竒為汴州剌史河南節度使甲戍子竒以歸檀及同羅奚兵十三萬趣睢陽許逺告急于張巡巡自寜陵引兵入睢陽巡有兵三千人與逺兵合六千八百人賊悉衆逼城巡督勵將士晝夜苦戰或一日至二十合凡十六日擒賊將六十餘人殺士卒二萬餘衆氣自倍逺謂巡曰逺懦不習兵公智勇兼濟逺請為公守請公為逺戰自是之後逺但調軍糧修戰具居中應接而巳戰鬭籌畫一出於巡賊遂夜遁郭子儀以河東居兩京之閒扼賊要衝得河東則兩京可圖時賊將崔乾祐祐守河東丁丑子儀濳遣人入河東與唐官陷賊者謀俟官軍至為内應初平盧節度使劉正臣自范陽敗歸安東都䕶王玄志鴆殺之祿山以其黨徐歸道為平盧節度使􅀇志復與平盧將侯希逸襲殺之又遣兵馬使董秦將兵以葦茷度海與大將田神功擊平原樂安下之防河招討使李銑承制以秦爲平原太守二月戊子上至鳳翔郭子儀自洛交引兵趣河東分兵取馮翊己丑夜河東司戸韓旻等飜河東城迎官軍殺賊近千人崔乾祐踰城得免􅀤城北兵攻城且拒官軍子儀擊破之乾祐走子儀追擊之斬首四千級捕虜五千人乾祐至安邑安邑人開門納之半入閉門擊之盡殪乾祐未入自白逕嶺亡去遂平河東上至鳳翔旬日隴右河西安西西域之兵皆會江淮庸調亦至洋川漢中上自散關通表成都信使駱驛長安人聞車駕至從賊中自拔而來者日夜不絶西師憩息旣定李泌請遣安西及西域之衆如前策並塞東北自歸檀南取范陽上曰今大衆巳集庸調亦至當乗兵鋒擣其腹心而更引兵東北數千里先取范陽不亦迃乎對曰今以此衆直取兩京必得之然賊必再彊我必又困非乆安之䇿上曰何也對曰今所恃者皆西北守塞及諸胡之兵性耐寒而畏暑若乗其新至之銳攻祿山已老之師其勢必克兩京春氣已深賊收其餘衆遁歸巢穴闗東地熱官軍必困而思歸不可留也賊休兵秣馬伺官軍之去必復南來然則征戰之勢未有涯也不若先用之於寒鄉除其巢穴則賊無所歸根本永絶矣上曰朕切於晨昬之戀不能待此决矣闗内節度使王思禮軍武功兵馬使郭英乂軍東原王難得軍西原丁酉安守忠等冦武功郭英乂戰不利矢貫其頥而走王難得望之不救亦走思禮退軍扶風賊遊兵至大和闗去鳳翔五十里鳳翔大駭戒嚴李光弼將敢死士出擊蔡希德大破之斬首七萬餘級希德遁去安慶緒以史思明為范陽節度使兼領恒陽軍事封媯川王以牛廷介領安陽軍事張忠志為常山太守兼團練使鎮井陘口餘各令歸舊任募兵以禦官軍先是安禄山得兩京珍貨悉輸范陽思明擁彊兵據富資益驕横浸不用慶緒之命慶緒不能制戊戍永王璘敗死其黨薛鏐等皆伏誅時李成式與河北招討判官李銑合兵討璘銑兵數千軍于楊子成式使判官裴茂將兵三千軍于􅀲步廣張旗幟列于江津璘與其子瑒登城望之始有懼色季廣琛召諸將謂曰吾屬從王至此天命未集人謀已隳不如及兵鋒未交早圖去就不然死於鋒鏑永為逆臣矣諸將皆然之於是廣琛以麾下奔廣陵渾惟明奔江寜馮季康奔白沙璘憂懼不知所出其夕江北之軍多列炬火光照水中一皆為兩璘軍又以火應之璘以為官軍巳濟江遽挈家屬與麾下濳遁及明不見濟者乃復入城收兵具舟楫而去成式將趙侃等濟江至新豐璘使瑒及其將高仙􅄾將兵擊之侃等逆戰射瑒中肩璘兵遂潰璘與仙􅄾收餘衆南奔鄱陽收庫物甲兵欲南奔嶺表江西采訪使皇甫侁遣兵追討擒之濳殺之於傳舍瑒亦死於亂兵侁使人送璘家屬還蜀上曰侁既生得吾弟何不送之於蜀而擅殺之邪遂廢侁不用庚子郭子儀遣其子旴及兵馬使李韶光大將軍王祚濟河擊潼闗破之斬首五百級安慶緒遣兵救潼闗郭旴等大敗死者萬餘人李韶光王祚戰死僕固懷恩抱馬首浮度渭水退保河東三月辛酉以左相韋見素為左僕射中書侍郎同平章事裴冕為右僕射並罷政事初楊國忠惡憲部尚書苗晉卿安祿山之反也請出晉卿為陜郡太守兼陜弘農防禦使晉卿固辭老病上皇不悦使之致仕及長安失守晉卿濳竄山谷上至鳳翔手敕徴之為左相軍國大務悉咨之上皇思張九齡之先見為之流涕遣中使至曲江祭之厚恤其家尹子竒復引大兵攻睢陽張廵謂將士曰吾受國恩所守正死耳但念諸君捐軀命膏草野而賞不酬勲以此痛心耳將士皆激勵請􅁬巡遂椎牛大饗士卒盡軍出戰賊望見兵少笑之巡執旗帥諸將直衝賊陳賊乃大潰斬將三十餘人殺士卒三千餘人逐之數十里明日賊又合軍至城下廵出戰晝夜數十合屢摧其鋒而賊攻圍不輟􅊨辛未安守忠將騎二萬冦河東郭子儀擊走之斬首八千級捕虜五千人夏四月顏真卿自荆襄北詣鳳翔上以為憲部尚書􅊨上以郭子儀為司空天下兵馬副元帥使將兵赴鳳翔庚寅李歸仁以鐡騎五千邀之於三原北子儀使其將僕固懐恩王仲昇渾釋之李若幽等伏兵擊之於白渠留運橋殺傷略盡歸仁游水而逸若幽神通之玄孫也子儀與王思禮軍合於西渭橋進屯潏西安守忠李歸仁軍於京城西清渠相守七日官軍不進五月癸丑守忠偽遁子儀悉師逐之賊以驍騎九千為長蛇陳官軍擊之首尾為兩翼夾擊官軍官軍大潰判官韓液監軍孫知古皆為賊所擒軍資器械盡弃之子儀退保武功中外戒嚴是時府庫無蓄積朝廷專以官爵賞功諸將出征皆給空名告身自開府特進列卿大將軍下至中郎郎將聽臨事注名其後又聽以信牒授人官爵有至異姓王者諸軍但以職任相統攝不復計官爵高下及清渠之敗復以官爵収散卒由是官爵輕而貨重大將軍告身一通纔易一醉凡應募入軍者一切衣金紫至有朝士僮僕衣金紫稱大官而執賤役者名器之濫至是而極焉房琯性高簡時國家多難而琯多稱病不朝謁不以職事為意日與庻子劉秩諫議大夫李揖高談釋老或聽門客董庭蘭鼓琴庭蘭以是大招權利御史奏庭蘭贓賄丁巳罷琯為太子少師以諌議大夫張鎬為中書侍郎同平章事上常使僧數百人為道場於内晨夜誦佛鎬諌曰帝王當修德以弭亂安人未聞飯僧可致太平也上然之庚申上皇追冊上母楊妃爲元獻皇后山南東道節度使魯炅守南陽賊將武令珣田承嗣相繼攻之城中食盡一䑕直錢數百餓死者相枕籍上遣宦官將軍曹日昇往宣慰圍急不得入日昇請單騎入致命襄陽太守魏仲犀不許㑹顔真卿自河北至曰曹將軍不顧萬死以致帝命何爲沮之借使不達不過亡一使者達則一城之心固矣日昇與十騎偕往賊畏其鋭不敢逼城中自謂望絶及見日昇大喜日昇復爲之至襄陽取糧以千人運糧而入賊不能遏炅在圍中凡周嵗晝夜苦戰力竭不能支壬戍夜開城帥餘兵數千突圍而出奔襄陽承嗣追之轉戰二日不能克而還時賊欲南侵江漢賴炅扼其衝要南夏得全司空郭子儀詣闕請自貶甲子以子儀為左僕射尹子奇益兵圍睢陽益急張巡於城中夜鳴鼓嚴隊若將出擊者賊聞之達旦儆備旣明巡乃寢兵絶鼓賊以飛樓瞰城中無所見遂解甲休息巡與將軍南霽雲郎將雷萬春等十餘將各將五十騎開門突出直衝賊營至子奇麾下營中大亂斬賊將五十餘人殺士卒五千餘人巡欲射子竒而不識乃剡蒿為矢中者喜謂巡矢盡走白子竒乃得其狀使霽雲射之喪其左目幾獲之子竒乃收軍退還六月癸未田乾真圍安邑㑹陜郡賊將楊務欽宻謀歸國河東太守馬承光以兵應之務欽殺城中諸將不同己者飜城來降乾真解安邑遁去將軍王去榮以私怨殺本縣令當死上以其善用礮壬辰敇免死以白衣於陜郡效力中書舍人賈至不即行下上表以為去榮無狀殺本縣之君易曰臣弑其君子弑其父非一朝一夕之故其所由來者漸矣若縱去榮可謂生漸矣議者謂陜郡初復非其人不可守然則它無去榮者何以亦能堅守乎陛下若以礮石一能即免殊死今諸軍技藝絶倫者其徒寔繁必恃其能所在犯上復何以止之若止捨去榮而誅其餘者則是法令不一而誘人觸罪也今惜一去榮之材而不殺必殺十如去榮之材者不亦其傷益多乎夫去榮逆亂之人也焉有逆於此而順於彼亂於富平而治於陜郡悖於縣君而不悖於大君歟伏惟明主全其逺者大者則禍亂不日而定矣上下其事令百官議之太子太師韋見素等議以為法者天地大典帝王猶不敢擅殺而小人得擅殺是臣下之權過於人主也去榮既殺人不死則軍中凡有技能者亦自謂無憂所在暴横為郡縣者不亦難乎陛下為天下主愛無親踈得一去榮而失萬姓何利之有於律殺本縣令列於十惡而陛下寛之王法不行人倫道屈臣等奉詔不知所從夫國以法理軍以法勝有恩無威慈母不能使其子陛下厚養戰士而每戰少利豈非無法邪今陜郡雖要不急於法也有法則海内無憂不克况陜郡乎無法則陜郡亦不可守得之何益而去榮末技陜郡不以之存亡王法有無國家乃為之輕重此臣等所以區區願陛下守貞觀之法上竟捨之至曾之子也南充土豪何滔作亂執本郡防禦使楊齊魯劒南節度使盧元裕􅀤兵討平之秋七月河南節度使賀蘭進明克高宻琅邪殺賊二萬餘人戊申夜蜀郡兵郭千仞等反六軍兵馬使陳玄禮劒南節度使李峘討誅之壬子尹子竒復徴兵數萬攻睢陽先是許逺於城中積糧至六萬石虢王巨以其半給濮陽濟陰二郡遠固爭之不能得既而濟陰得糧遂以城叛而睢陽城至是食盡將士人廩米日一合雜以茶紙樹皮為食而賊糧運通兵敗復徴睢陽將士死不加益諸軍饋救不至士卒消耗至一千六百人皆飢病不堪鬭遂為賊所圍張巡乃修守具以拒之賊為雲梯勢如半虹置精卒二百於其上推之臨城欲令騰入巡預於城潜鑿三穴候梯將至於一穴中出大木末置鐵鉤鉤之使不得退一穴中出一木拄之使不得進一穴中出一木木末置鐵籠盛火焚之其梯中折梯上卒盡燒死賊又以鉤車鉤城上棚閣鉤之所及莫不崩䧟巡以大木末置連鏁鏁末置大鐶搨其鉤頭以革車拔之入城截其鉤頭而縱車令去賊又造木驢攻城巡鎔金汁灌之應投銷鑠賊又於城西北隅以土囊積柴為磴道欲登城巡不與爭利每夜潜以松明乾蒿投之於中積十餘日賊不之覺因出軍大戰使人順風持火焚之賊不能救經二十餘日火方滅巡之所為皆應機立辦賊伏其智不敢復攻遂於城外穿三重壕立木柵以守巡巡亦於其内作壕以拒之丁巳賊將安武臣攻陜郡楊務欽戰死賊遂屠陜崔渙在江南選補冒濫者衆八月甲申罷渙為餘杭太守江東采訪防禦使以張鎬兼河南節度采訪等使代賀蘭進明靈昌太守許叔冀為賊所圍救兵不至拔衆奔彭城睢陽士卒死傷之餘纔六百人張巡許遠分城而守之巡守東北遠守西南與士卒同食茶紙不復下城賊士攻城者巡以逆順説之往往弃賊來降為巡死戰前後二百餘人是時許叔冀在譙郡尚衡在彭城賀蘭進明在臨淮皆擁兵不救城中日蹙巡乃令南霽雲將三十騎犯圍而出告急於臨淮霽雲出城賊衆數萬遮之霽雲直衝其衆左右馳射賊衆披靡止亡兩騎既至臨淮見進明進明曰今日睢陽不知存亡兵去何益霽雲曰睢陽若䧟霽雲請以死謝大夫且睢陽既拔即及臨淮譬如皮毛相依安得不救進明愛霽雲勇壯不聽其語强留之具食與樂延霽雲坐霽雲慷慨泣且語曰霽雲來時睢陽之人不食月餘矣霽雲雖欲獨食且不下咽大夫坐擁彊兵觀睢陽䧟没曾無分災救患之意豈忠臣義士之所為乎因齧落一指以示進明曰霽雲既不能達主將之意請留一指以示信歸報座中往往為泣下霽雲察進明終無出師意遂去至寜陵與城使亷坦同將步騎三千人閠月戊申夜冒圍且戰且行至城下大戰壊賊營死傷之外僅得千人入城城中將吏知無救皆慟哭賊知援絶圍之益急初房琯為相惡賀蘭進明以為河南節度使以許叔冀為進明都知兵馬使俱兼御史大夫叔冀自恃麾下精鋭且官與進明等不受其節制故進明不敢分兵非惟疾巡遠功名亦懼為叔冀所襲也戊辰上勞饗諸將遣攻長安謂郭子儀曰事之濟否在此行也對曰此行不捷臣必死之辛未御史大夫崔光逺破賊於駱谷光逺行軍司馬王伯倫判官李椿將二千人攻中渭橋殺賊守橋者千人乗勝至苑門賊有先屯武功者聞之奔歸遇於苑北合戰殺伯倫擒椿送洛陽然自是賊不復屯武功矣賊屢攻上黨常為節度使程千里所敗蔡希德復引兵圍上黨資治通鑑卷第二百一十九
