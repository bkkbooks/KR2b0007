body:
  text: 公孫卿言僊人好樓居於是上令長安作蜚廉桂觀甘泉作益壽延壽觀使卿持節設具而􅇋神人又作通天莖臺置祠具其下更置甘泉前殿益廣諸宫室初全燕之丗嘗略屬眞番朝鮮爲置吏築障塞秦滅燕屬遼東外徼漢興爲其逺難守復修遼東故塞至浿水爲界屬燕燕王盧綰反入匈奴燕人衞滿亡命聚黨千餘人椎髻蠻夷服而東走出塞渡浿水居秦故空地上下障稍役屬眞番朝鮮蠻夷及燕亡命者王之都王險㑹孝惠髙后時天下初定遼東太守即約滿爲外臣保塞外蠻夷無使盜邊諸蠻夷君欲入見天子勿得禁止以故滿得以兵威財物侵降其旁小邑眞番臨屯皆來服屬方數千里傳子至孫右渠所誘漢亡人滋多又未嘗入見辰國欲上書見天子又雍閼不通是嵗漢使涉何誘諭右渠終不肯奉詔何去至界上臨浿水使御刺殺送何者朝鮮裨王長即渡馳入塞遂歸報天子曰殺朝鮮將上爲其名美即不詰拜何爲遼東東部都尉朝鮮怨何發兵襲攻殺何六月甘泉房中産芝九莖上爲之赦天下上以旱爲憂公孫卿曰黃帝時封則天旱乾封三年上乃下詔曰天旱意乾封乎秋作明堂於汶上上募天下死罪爲兵遣樓船將軍楊僕從齊浮渤海左將軍荀彘出遼東以討朝鮮初上使王然于以越破及誅南夷兵威風喻滇王入朝滇王者其衆數萬人其旁東北有勞深靡莫皆同姓相杖未肯聽勞深靡莫數侵犯使者吏卒於是上遣將軍郭昌中郎將衞廣發巴蜀兵擊滅勞深靡莫以兵臨滇滇王舉國降請置吏入朝於是以爲益州郡賜滇王王印復長其民是時漢滅兩越平西南夷置初郡十七且以其故俗治母賦稅南陽漢中以往郡各以地比給初郡吏卒奉食幣物傳車馬􅀍具而初郡時時小反殺吏漢發南方吏卒往誅之閒嵗萬餘人費皆仰給大農大農以均輸調鹽鐵助賦故能贍之然兵所過縣爲以訾給毋乏而巳不敢言擅賦法矣是嵗以御史中丞南陽杜周爲廷尉周外寛内深次骨其治大放張湯湯時詔獄益多二千石繫者新故相因不減百餘人廷尉一嵗至千餘章章大者連逮證案數百小者數十人逺者數千近者數百里㑹獄廷尉及中都官詔獄逮至六七萬人吏所增加十萬餘人三年冬十二月雷雨雹大如馬頭上遣將軍趙破奴擊車師破奴與輕􅀐七百餘先至虜樓蘭王遂破車師因舉兵威以困烏孫大宛之屬春正月甲申封破奴爲浞野矦王恢佐破奴擊樓蘭封恢爲浩矦於是酒泉列亭障至玉門矣初作角抵戲魚龍曼延之屬漢兵入朝鮮境朝鮮王右渠發兵距險樓船將軍將齊兵七千人先至王險右渠城守窺知樓船軍少即出城擊樓船樓船軍敗散遁山中十餘日稍求退散卒復聚左將軍擊朝鮮浿水西軍未能破天子爲兩將未有利乃使衞山因兵威往諭右渠右渠見使者頓首謝願降恐兩將詐殺臣今見信節請復降遣太子入謝獻馬五千匹及饋軍粮人衆萬餘持兵方渡浿水使者及左將軍疑其爲變謂太子巳服降宜令人母持兵太子亦疑使者左將軍詐殺之遂不渡浿水復引歸山還報天子天子誅山左將軍破浿水上軍乃前至城下圍其西北樓船亦往㑹居城南右渠遂堅守城數月未能下左將軍所將燕代卒多勁悍樓船將齊卒巳嘗敗亡困辱卒皆恐將心慙其圍右渠常持和節左將軍急擊之朝鮮大臣乃隂間使人私約降樓船往來言尚未肯㳏左將軍數與樓船期戰樓船欲就其約不㑹左將軍亦使人求閒隙降下朝鮮朝鮮不肯心附樓船以故兩將不相能左將軍心意樓船前有失軍罪今與朝鮮私善而又不降疑其有反計未敢發天子以兩將圍城乖異兵乆不㳏使濟南太守公孫遂徃正之有便宜得以從事遂至左將軍曰朝鮮當下乆矣不下者樓船數期不㑹具以素所意告曰今如此不取恐爲大害遂亦以爲然乃以節召樓船將軍入左將軍營計事即命左將軍麾下執樓船將軍并其軍以報天子天子誅遂左將軍巳并兩軍即急擊朝鮮朝鮮相路人相韓隂尼谿相參將軍王峽相與謀曰始欲降樓船樓船今執獨左將軍并將戰益急恐不能與戰王又不肯降隂唊路人皆亡降漢路人道死夏尼谿參使人殺朝鮮王右渠來降王險城未下故右渠之大臣成巳又反復攻吏左將軍使右渠子長降相路人之子最告諭其民誅成巳以故遂定朝鮮為樂浪臨屯􅀇莵眞番四郡封參爲澅清矦隂爲萩苴矦唊爲平州矦長爲幾矦最以父死頗有功爲􅄺陽矦左將軍徴至坐爭功相嫉乖計棄市樓船將軍亦坐兵至列口當待左將軍擅先縱失亡多當誅贖爲庶人班固曰􅀇菟樂浪本箕子所封昔箕子居朝鮮教其民以禮義田􅁞織作爲民設禁八條相殺以當時償殺相傷以穀償相盜者男没入爲其家奴女爲婢欲自贖者人五十萬雖免爲民俗猶羞之嫁娶無所售是以其民終不相盗無門户之閉婦人貞信不淫辟其田野飲食以籩豆都邑頗放效吏往往以柸器食郡初取吏於遼東吏見民無閉臧及賈人往者夜則爲盗俗稍益薄今於犯禁􅎊多至六十餘條可貴哉仁賢之化也然東夷天性柔順異於三方之外故孔子悼道不行設浮桴於海欲居九夷有以也夫秋七月膠西于王端薨武都氐反分徙酒泉四年冬十月上行幸雍祠五畤通回中道遂北出蕭􅀜歷獨鹿鳴澤自代而還幸河東春三月祠后土赦汾隂夏陽中都死罪以下夏大旱匈奴自衞霍度幕以来希復爲宼逺徙北方休養士馬習射獵數使使於漢好辭甘言求請和親漢使北地人王烏等窺匈奴烏從其俗去節入穹廬單于愛之佯許甘言爲遣其太子入漢爲質漢使楊信於匈奴信不肯從其俗單于曰故約漢嘗遣翁主給繒絮食物有品以和親而匈奴亦不擾邊今乃欲反古令吾太子爲質無幾矣信旣歸漢又使王烏徃而單于復讇以甘言欲多得漢財物紿謂王烏曰吾欲入漢見天子面相約爲兄弟王烏歸報漢漢爲單于築邸于長安匈奴曰非得漢貴人使吾不與誠語匈奴使其貴人至漢病漢予藥欲愈之不幸而死漢使路充國佩二千石印綬往使因送其喪厚葬直數千金曰此漢貴人也單于以爲漢殺吾貴使者乃留路充國不歸諸所言者單于特空紿王烏殊無意入漢及遣太子於是匈奴數使竒兵侵犯漢邊乃拜郭昌爲拔胡將軍及浞野矦屯朔方以東僃胡五年冬上南巡狩至于盛唐望祀虞舜于九疑登􅈞天柱山自尋陽浮江親射蛟江中獲之舳艫千里薄樅陽而出遂北至琅邪並海所過禮祠其名山大川春三月還至太山增封甲子始祀上帝於明堂配以髙祖因朝諸矦王列矦受郡國計夏四月赦天下所幸縣母出令年租賦還幸甘泉郊泰畤長平烈矦衞靑薨起􅃁象廬山上旣攘郤胡越開地斥境乃置交阯朔方之州及冀幽并兖徐靑楊荆豫益涼等州凡十三部皆置刺史焉上以名臣文武欲盡乃下詔曰蓋有非常之功必待非常之人故馬或犇踶而致千里士或有負俗之累而立功名夫泛駕之馬跅㢮之士亦在御之而巳其令州郡察吏民有茂材異等可爲將相及使絶國者六年冬上行幸回中春作首山宫三月行幸河東祠后土赦汾隂殊死以下漢旣通西南夷開五郡欲地接以前通大夏嵗遣使十餘輩出此􅀄郡皆閉昆明爲所殺奪幣物於是天子赦京師亡命令從軍遣拔胡將軍郭昌將以擊之斬首數十萬後復遣使竟不得通秋大旱蝗烏孫使者見漢廣大歸報其國其國乃益重漢匈奴聞烏孫與漢通怒欲擊之又其旁大宛月氏之屬皆事漢烏孫於是恐使使願得尚漢公主爲昆弟天子與羣臣議許之烏孫以千匹馬聘漢女漢以江都王建女細君爲公主往妻烏孫贈送甚盛烏孫王昆莫以爲右夫人匈奴亦遣女妻昆莫以爲左夫人公主自治宮室居嵗時一再與昆莫會置酒飲食昆莫年老言語不通公主悲愁思歸天子聞而憐之閒嵗遣使者以帷帳錦繡給遺焉昆莫曰我老欲使其孫岑娶尚公主公主不聽上書言狀天子報曰從其國俗欲與烏孫共滅胡岑娶遂妻公主昆莫死岑娶代立爲昆彌是時漢使西踰葱嶺抵安息安息發使以大鳥卵及黎軒善􅅭人獻于漢及諸小國驩濳大益車師扜罙蘇䪥之屬皆隨漢使獻見天子天子大恱西國使更來更去天子每巡狩海上悉從外國客大都多人則過之散財帛以賞賜厚具以饒給之以覽示漢冨厚焉大角抵出竒戲諸怪物多聚觀者行賞賜酒池肉林令外國客徧觀名倉庫府藏之積見漢之廣大傾駭之大宛左右多蒲萄可以爲酒多苜蓿天馬􅄝之漢使采其實以來天子種之於離宫别觀旁極望然西域以近匈奴常畏匈奴使待之過於漢使焉是嵗匈奴烏維單于死子烏師廬立年少號兒單于自此之後單于益西北徙左方兵直雲中右方直酒泉燉煌郡太􅀄元年冬十月上行幸泰山十一月甲子朔旦冬至祠上帝于明堂東至海上考入海及方士求神者莫驗然益遣冀遇之乙酉栢梁臺災十二月甲午朔上親禪髙里祠后土臨勃海將以望祀蓬萊之屬冀至殊廷焉春上還以柏梁災故朝諸矦受計于甘泉甘泉作諸矦邸越人勇之曰越俗有火災復起屋必以大用勝服之於是作建章宫度爲千門萬户其東則鳯闕髙二十餘丈其西則唐中數十里虎圈其北治大池漸臺髙二十餘丈命曰太液池中有蓬萊方丈瀛州壷梁象海中神山􅀛魚之屬其南有玉堂璧門大鳥之屬立神明臺井幹樓度五十丈輦道相屬焉太中大夫公孫卿壷遂太史令司馬遷等言歷紀壞廢宜改正朔上詔兒寛與博士賜等共議以爲宜用夏正夏五月詔卿遂遷等共造漢太􅀄歷以正月爲嵗首色上黃數用五定官名協音律定宗廟百官之儀以爲典常垂之後丗云匈奴兒單于好殺伐國人不安又有天災畜多死左大都尉使人閒告漢曰我欲殺單于降漢漢逺即兵來迎我我即發上乃遣因杅將軍公孫敖築塞外受降城以應之秋八月上行幸安定漢使入西域者言宛有善馬在貳師城匿不肯與漢使天子使壯士車令等持千金及金馬以請之宛王與其羣臣謀曰漢去我逺而鹽水中數敗出其北有胡宼出其南乏水草又且往往而絶邑乏食者多漢使數百人爲輩來而常乏食死者過半是安能致大軍乎無柰我何貳師馬宛寶馬也遂不肯予漢使漢使怒妄言椎金馬而去宛貴人怒曰漢使至輕我遣漢使去令其東邊郁成王遮攻殺漢使取其財物於是天子大怒諸嘗使宛姚定漢等言宛兵弱誠以漢兵不過三千人彊弩射之可盡虜矣天子嘗使浞野矦以七百􅀐虜樓蘭王以定漢等言爲然而欲矦寵􅁎李氏乃拜李夫人兄廣利爲貳師將軍發屬國六千􅀐及郡國惡少年數萬人以往伐宛期至貳師城取善馬故號貳師將軍趙始成爲軍正故浩矦王恢使導軍而李哆爲校尉制軍事臣光曰武帝欲矦寵􅁎李氏而使廣利將兵伐宛其意以爲非有功不矦不欲負髙帝之約也夫軍旅大事國之安危民之死生繫焉苟爲不擇賢愚而授之欲徼幸咫尺之功藉以爲名而私其所愛不􅀂無功而矦之爲愈也然則武帝有見於封國無見於置將謂之能守先帝之約臣曰過矣中尉王温舒坐爲姦利罪當族自殺時兩弟及兩婚家亦各自坐佗罪而族光禄勲徐自爲曰悲夫古有三族而王温舒罪至同時而五族乎􅀜東蝗大起飛西至燉煌二年春正月戊申牧丘恬矦石慶薨閏月丁丑以太僕公孫賀爲丞相封葛繹矦時朝廷多事督責大臣自公孫弘後丞相比坐事死石慶雖以謹得終然數被譴賀引拜爲丞相不受印綬頓首涕泣不肯起上乃起去賀不得巳拜出曰我從是殆矣三月上行幸河東祠后土夏五月籍吏民馬補車􅀐馬秋蝗貳師將軍之西也旣過鹽水當道小國各城守不肯給食攻之不能下下者得食不下者數日則去比至郁成士至者不過數千皆飢罷攻郁成郁成大破之所殺傷甚衆貳師將軍與李哆趙始成等計至郁成尚不能舉況至其王都乎引兵而還至燉煌士不過什一二使使上書言道逺多乏食且士卒不患戰而患飢人少不足以拔宛願且罷兵益發而復往天子聞之大怒使使遮玉門曰軍有敢入者輒斬之貳師恐因留燉煌上猶以受降城去匈奴逺遣浚稽將軍趙破奴將二萬餘􅀐出朔方西北二千餘里期至浚稽山而還浞野矦旣至期左大都尉欲發而覺單于誅之發左方兵擊浞野矦浞野矦行捕首虜得數千人還未至受降城四百里匈奴兵八萬􅀐圍之浞野矦夜自出求水匈奴閒捕生得浞野矦因急擊其軍軍吏畏亡將而誅莫相勸歸者軍遂没於匈奴兒單于大喜因遣竒兵攻受降城不能下乃宼入邊而去冬十二月兒寛卒三年春正月膠東太守延廣爲御史大夫上東巡海上考神僊之屬皆無驗令祠官禮東泰山夏四月還脩封泰山禪石閭匈奴兒單于死子年少匈奴立其季父右賢王呴犁湖爲單于上遣光禄勲徐自爲出五原塞數百里逺者千餘里築城障列亭西北至廬朐而使游擊將軍韓說長平矦衞伉屯其旁使彊弩都尉路博德築居延澤上秋匈奴大入定襄雲中殺略數千人敗數二千石而去行破壞光禄所築城列亭障又使右賢王入酒泉張掖略數千人㑹軍正任文擊救盡復失所得而去是嵗睢陽矦張昌坐爲太常乏祠國除初髙祖封功臣爲列矦百四十有三人時兵革之餘大城名都民人散亡户口可得而數裁什二三大矦不過萬家小者五六百户其封爵之誓曰使黃河如帶泰山􅀂厲國以永存爰及苗裔申以丹書之信重以白馬之盟及髙后時盡差第列矦位次藏諸宗廟副在有司逮文景四五丗間流民旣歸户口亦息列矦大者至三四萬户小國自倍富厚如之子孫驕逸多抵法禁隕身失國至是見矦纔四人罔亦少宻焉漢旣亡浞野之兵公卿議者皆願罷宛軍專力攻胡天子業出兵誅宛宛小國而不能下則大夏之屬漸輕漢而宛善馬絶不來烏孫輪臺易苦漢使爲外國􅀏乃案言伐宛尤不便者鄧光等赦囚徙發惡少年及邊􅀐嵗餘而出燉煌者六萬人負私從者不與牛十萬馬三萬匹驢橐佗以萬數齎糧兵弩甚設天下騷動轉相奉伐宛五十餘校尉宛城中無井汲城外流水於是遣水工徙其城下水空以穴其城益發戍甲卒十八萬酒泉張掖北置居延休屠屯兵以衞酒泉而發天下吏有罪者亡命者及贅壻賈人故有市籍父母大父母有市籍者凡七科適爲兵及載糒給貳師轉車人徒相連屬而拜習馬者二人爲執驅馬校尉僃破宛擇取其善馬云於是貳師後復行兵多所至小國莫不迎出食給軍至輪臺輪臺不下攻數日屠之自此而西平行至宛城兵到者三萬宛兵迎擊漢兵漢兵射敗之宛兵走入保其城貳師欲攻郁成城恐留行而令宛益生詐乃先至宛決其水原移之則宛固巳憂困圍其城攻之四十餘日宛貴人謀曰王母寡匿善馬殺漢使今殺王而出善馬漢兵宜解即不解乃力戰而死未晩也宛貴人皆以爲然共殺王其外城壞虜宛貴人勇將煎靡宛大恐走入城中持王母寡頭遣人使貳師約曰漢無攻我我盡出善馬恣所取而給漢軍食即不聽我我盡殺善馬康居之救又且至至我居内康居居外與漢軍戰孰計之何從是時康居􅇋視漢兵尚盛不敢進貳師聞宛城中新得漢人知穿井而其内食尚多計以爲來誅首惡者母寡母寡頭巳至如此不許則堅守而康居􅇋漢兵罷來救宛破漢軍必矣乃許宛之約宛乃出其馬令漢自擇之而多出食食漢軍漢軍取其善馬數十匹中馬以下牝牡三千餘匹而立宛貴人之故時遇漢善者名昧蔡爲宛王與盟而罷兵􅀄貳師起燉煌西分爲數軍從南北道校尉王申生將千餘人别至郁成郁成王擊滅之數人脫亡走貳師貳師令搜粟都尉上官桀徃攻破郁成郁成王亡走康居桀追至康居康居聞漢巳破宛出郁成王與桀桀令四􅀐士縛守詣貳師上邽􅀐士趙弟恐失郁成王抜劔擊斬其首追及貳師四年春貳師將軍來至京師貳師所過小國聞宛破皆使其子弟從入貢獻見天子因爲質焉軍還入馬千餘匹後行軍非乏食戰死不甚多而將吏貪不愛卒侵牟之以此物故者衆天子爲萬里而伐不録其過乃下詔封李廣利爲海西矦封趙弟爲新畤矦以上官桀爲少府軍官吏爲九卿者三人諸矦相郡守二千石百餘人千石以下千餘人奮行者官過其望以謫過行皆黜其勞士卒賜直四萬錢匈奴聞貳師征大宛欲遮之貳師兵盛不敢當即遣􅀐因樓蘭􅇋漢使後過者欲絶勿通時漢軍正任文將兵玉門􅀜捕得生口知狀以聞上詔文便道引兵捕樓蘭王將詣闕簿責王對曰小國在大國閒不兩屬無以自安願徙國入居漢地上直其言遣歸國亦因使􅇋司匈奴匈奴自是不甚親信樓蘭自大宛破後西域震懼漢使入西域者益得職於是自燉煌西至鹽澤往往起亭而輪臺渠犂皆有田卒數百人置使者校尉領護以給使外國者後嵗餘宛貴人以爲昧蔡善䛕使我國遇屠乃相與殺昧蔡立母寡昆弟蟬封爲宛王而遣其子入質於漢漢因使使賂賜以鎭撫之蟬封與漢約嵗獻天馬二匹秋起明光宫冬上行幸回中匈奴呴犂湖單于死匈奴立其弟左大都尉且鞮矦爲單于天子欲因伐宛之威遂困胡乃下詔曰髙皇帝遺朕平城之憂髙后時單于書絶悖逆昔齊襄公復九丗之讎春秋大之且鞮矦單于􅀄立恐漢襲之乃曰我兒子安敢望漢天子漢天子我丈人行也因盡歸漢使之不降者路充國等使使來獻天漢元年春正月上行幸甘泉郊泰畤三月行幸河東祠后土上嘉匈奴單于之義遣中郎將蘇武送匈奴使留在漢者因厚賂單于荅其善意武與副中郎將張勝及假吏常惠等俱旣至匈奴置幣遺單于單于益驕非漢所望也㑹緱王與長水虞常等及衞律所將降者隂相與謀劫單于母閼氏歸漢衞律者父故長水胡人律善協律都尉李延年延年薦言律使於匈奴使還聞延年家收遂亡降匈奴單于愛之與謀國事立爲丁靈王虞常在漢時素與副張勝相知私􅇋勝曰聞漢天子甚怨衞律常能爲漢伏弩射殺之吾母弟在漢幸蒙其賞賜張勝許之以貨物與常後月餘單于出獵獨閼氏子弟在虞常等七十餘人欲發其一人夜亡告之單于子弟發兵與戰􅚆王等皆死虞常生得單于使衞律治其事張勝聞之恐前語發以狀語武武曰事如此此必及我見犯乃死重負國欲自殺勝惠共止之虞常果引張勝單于怒召諸貴人議欲殺漢使者左伊秩訾曰即謀單于何以復加宜皆降之單于使衞律召武受辭武是嵗濟南太守王卿爲御史大夫二年春上行幸東海還幸回中夏五月遣貳師將軍廣利以三萬􅀐出酒泉擊右賢王於天山得胡首虜萬餘級而還匈奴大圍貳師將軍漢軍乏食數日死傷者多假司馬隴西趙充國與壯士百餘人潰圍䧟陳貳師引兵隨之遂得解漢兵物故什六七充國身被二十餘創貳師奏狀詔徴充國詣行在所帝親見視其創嗟歎之拜爲中郎漢復使因杅將軍敖出西河與彊弩都尉路博德㑹涿涂山無所得初李廣有孫陵爲侍中善􅀐射愛人下士帝以爲有廣之風拜􅀐都尉使將丹陽楚人五千人教射酒泉張掖以僃胡及貳師擊匈奴上詔陵欲使爲貳師將輜重陵叩頭自請曰臣所將屯邊者皆荆楚勇士竒材劒客也力扼虎射命中願得自當一隊到蘭干山南以分單于兵母令專鄉貳師軍上曰將惡相屬邪吾發軍多無􅀐予女陵對無所事􅀐臣願以少擊衆歩兵五千人涉單于庭上壯而許之因詔路博德將兵半道迎陵軍博德亦羞爲陵後距奏言方秋匈奴馬肥未可與戰願留陵至春俱出上怒疑陵悔不欲出而教博德上書乃詔博德引兵擊匈奴於西河詔陵以九月發出遮虜障至東浚稽山南龍勒水上俳佪觀虜即亡所見還抵受降城休士陵於是將其步卒五千人出居延北行三十日至浚稽山止營舉圖所過山川謂惠等屈節辱命雖生何面目以歸漢引佩刀自刺衞律驚自抱持武馳召醫鑿地爲坎置煴火覆武其上蹈其背以出血武氣絶半日復息惠等哭輿歸營單于壯其節朝夕遣人􅇋問武而收繫張勝武益愈單于使使曉武欲降之會論虞常欲因此時降武劒斬虞常巳律曰漢使張勝謀殺單于近臣當死單于募降者赦罪舉劒欲擊之勝請降律謂武曰副有罪當相坐武曰本無謀又非親屬何謂相坐復舉劒擬之武不動律曰蘇君律前負漢歸匈奴幸䝉大恩賜號稱王擁衆數萬馬畜彌山富貴如此蘇君今日降明日復然空以身膏草野誰復知之武不應律曰君因我降與君爲兄弟今不聽吾計後雖欲復見我尚可得乎武罵律曰汝爲人臣子不顧恩義畔主背親爲降虜於蠻夷何以汝爲見且單于信汝使決人死生不平心持正反欲􅃲兩主觀禍敗南越殺漢使者屠爲九郡宛王殺漢使者頭縣北闕朝鮮殺漢使者即時誅滅獨匈奴未耳􅀂知我不降明欲令兩國相攻匈奴之禍從我始矣律知武終不可脅白單于單于愈益欲降之乃幽武置太窖中絶不飲食天雨雪武卧齧雪與旃毛并咽之數日不死匈奴以爲神乃徙武北海上無人處使牧羝曰羝乳乃得歸别其官屬常惠等各置他所天雨白氂夏大旱五月赦天下發謫戍屯五原浞野矦趙破奴自匈奴亡歸地形使麾下􅀐陳步樂還以聞步樂召見道陵將率得士死力上甚悅拜步樂爲郎陵至浚稽山與單于相值􅀐可三萬圍陵軍軍居兩山閒以大車爲營陵引士出營外爲陳前行持㦸盾後行持弓弩虜見漢軍少直前就營陵摶戰攻之千弩俱發應􅁌而倒虜還走上山漢軍追擊殺數千人單于大驚召左右地兵八萬餘􅀐攻陵陵且戰且引南行數日抵山谷中連戰士卒中矢傷三創者載輦兩創者將車一創者持兵戰復斬首三千餘級引兵東南循故龍城道行四五日抵大澤葭葦中虜從上風縱火陵亦令軍中縱火以自救南行至山下單于在南山上使其子將􅀐擊陵陵軍步􅃲樹木閒復殺數千人因發連弩射單于單于下走是日捕得虜言單于曰此漢精兵擊之不能下日夜引吾南近塞得無有伏兵乎諸當户君長皆言單于自將數萬􅀐擊漢數千人不能滅後無以復使邊臣令漢益輕匈奴復力戰山谷閒尚四五十里得平地不能破乃還是時陵軍益急匈奴􅀐多戰一日數十合復傷殺虜二千餘人虜不利欲去㑹陵軍􅇋管敢爲校尉所辱亡降匈奴具言陵軍無後救射矢且盡獨將軍麾下及校尉成安矦韓延年各八百人爲前行以黄與白爲幟當使精􅀐射之即破矣單于得敢大喜使􅀐並攻漢軍疾呼曰李陵韓延年趣降遂遮道急攻陵陵居谷中虜在山上四面射矢如雨下漢軍南行未至鞮汗山一日五十萬矢皆盡即棄車去士尚三千餘人徒斬車輻而持之軍吏持尺刀抵山入陿谷單于遮其後乘隅下壘石士卒多死不得行昬後陵便衣獨步出營止左右母隨我丈夫一取單于耳良乆陵還大息曰兵敗死矣於是盡斬旌旗及珍寶埋地中陵歎曰復得數十矢足以脫矣今無兵復戰天明坐受縳矣各鳥獸散猶有得脫歸報天子者令軍士人持二升糒一片冰期至遮虜障者相待夜半時擊鼓起士鼓不鳴陵與韓延年俱上馬壯士從者十餘人虜􅀐數千追之韓延年戰死陵曰無面目報陛下遂降軍人分散脫至塞者四百餘人陵敗處去塞百餘里邊塞以聞上欲陵死戰後聞陵降上怒甚責問陳步樂步樂自殺羣臣皆罪陵上以問太史令司馬遷遷盛言陵事親孝與士信常奮不顧身以狥國家之急其素所畜積也有國士之風今舉事一不幸全軀保妻子之臣隨而媒糵其短誠可痛也且陵提步卒不滿五千深蹂戎馬之地抑數萬之師虜救死扶傷不暇悉舉引弓之民共攻圍之轉􅃲千里矢盡道窮士張空弮冒白刃北首爭死敵得人之死力雖古名將不過也身雖䧟敗然其所摧敗亦足暴於天下彼之不死宜欲得當以報漢也上以遷爲誣罔欲沮貳師爲陵游􅀃下遷腐刑乆之上悔陵無救曰陵當發出塞乃詔彊弩都尉令迎軍坐預詔之得令老將生姦詐乃遣使勞賜陵餘軍得脫者上以法制御下好尊用酷吏而郡國二千石爲治者大抵多酷暴吏民益輕犯法東方盜賊滋起大羣至數千人攻城邑取庫兵釋死罪􅅞辱郡太守都尉殺二千石小羣以百數掠鹵鄉里者不可勝數道路不通上始使御史中丞丞相長史督之弗能禁乃使光禄大夫范昆及故九卿張德等衣繡衣持節虎符發兵以興擊斬首大部或至萬餘級及以法誅通行飲食當連坐者諸郡甚者數千人數嵗乃頗得其渠率散卒失亡復聚黨阻山川者往往而羣居無可柰何於是作沈命法曰羣盜起不發覺發覺而捕弗滿品者二千石以下至小吏主者皆死其後小吏畏誅雖有盜不敢發恐不能得坐課累府府亦使其不言故盜賊寖多上下相爲匿以文辭避灋焉是時暴勝之爲直指使者所誅殺二千石以下尤多威振州郡至勃海聞郡人雋不疑賢請與相見不疑容貌尊嚴衣冠甚偉勝之躧履起迎登堂坐定不疑據地曰竊伏海瀕聞暴公子舊矣今乃承顔接辭凡爲吏太剛則折太柔則廢威行施之以恩然後樹功揚名永終天禄勝之深納其戒及還表薦不疑上召拜不疑爲青州刺史濟南王賀亦爲繡衣御史逐捕魏郡羣盗多所縱捨以奉使不稱免歎曰吾聞活千人子孫有封吾所活者萬餘人後丗其興乎是嵗以匈奴降者介和王成娩爲開陵矦將樓蘭國兵擊車師匈奴遣右賢王將數萬􅀐救之漢兵不利引去資治通鑑卷第二十一
