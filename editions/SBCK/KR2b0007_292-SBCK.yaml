body:
  text: 臣司馬光奉勑編集後周紀三兆執徐二月凡一年有竒起閼逢攝提格五月盡柔太祖聖神恭肅文武孝皇帝下顯徳元年五月甲戍朔王逵自潭州遷于朗州以周行逢知潭州事以潘叔嗣爲岳州團練使丙子帝至晉陽城下旗幟環城四十里楊衮疑北漢代州防禦使鄭處謙貳于周召與計事欲圖之處謙知之不往衮使胡􅀐數十守其城門處謙殺之因閉門拒衮衮奔歸契丹契丹主怒其無功囚之處謙舉城來降丁丑置靜塞軍於代州以鄭處謙爲節度使契丹數千􅀐屯忻代之間爲北漢之援庚辰遣符彦卿等將歩􅀐萬餘擊之彦卿入忻州契丹退保忻口丁亥置寧化軍於汾州以石沁二州􅀠之代州將桑珪解文遇殺鄭處謙誣奏云濳通契丹符彦卿奏請益兵癸巳遣李筠張永徳將兵三千赴之契丹游􅀐時至忻州城下丙申彦卿與諸將陳以待之史彦超將二十􅀐爲前鋒遇契丹與戰李筠引兵繼之殺契丹二千人彦超恃勇輕進去大軍浸逺衆寡不敵爲契丹所殺筠僅以身免周兵死傷甚衆彦卿退保忻州尋引兵還晉陽府州防禦使折徳扆將州兵來朝辛丑復置永安軍於府州以徳扆爲節度使時大發兵夫東自懐孟西及蒲陜以攻晉陽不克㑹乆雨士卒疲病乃史彦超死乃議引還初王得中返自契丹值周兵圍晉陽留止代州及桑珪殺鄭處謙囚得中送于周軍帝釋之賜以帶馬問虜兵何時當至得中曰臣受命送楊衮它無所求或謂得中曰契丹許公發兵公不以實告契丹兵即至公得無危乎得中太息曰吾食劉氏禄有老母在圍中若以實告周人必發兵據險以拒之如此家國兩亡吾獨生何益不若殺身以全家國所得多矣甲辰帝以得中欺罔縊殺之乙巳帝發晉陽匡國節度使藥元福言於帝曰進軍易退軍難帝曰朕一以委卿元福乃勒兵成列而殿北漢果出兵追躡元福擊走之然軍還怱遽芻糧數十萬在城下者悉焚弃之軍中訛言相驚或相剽掠軍須失亡不可勝計所得北漢州縣周所置刺史等皆弃城走惟代州桑珪既叛北漢又不敢歸周嬰城自守北漢遣兵攻拔之乙酉帝至潞州甲子至鄭州丙寅謁嵩陵庚午至大梁帝違衆議破北漢自是政事無大小皆親決百官受成於上而已河南府推官髙錫上書諌以爲四海之廣萬機之衆雖堯舜不能獨治必擇人而任之今陛下一以身親之天下不謂陛下聦明睿智足以兼百官之任皆言陛下褊迫疑忌舉不信羣臣也不若選能知人公正者以爲宰相能愛民聴訟者以爲守令能豐財足食者使掌金穀能原情守法者使掌刑獄陛下但垂拱明堂視其功過而賞罰之天下何憂不治何必降君尊而代臣職屈貴位而親賤事無乃失爲政之本乎帝不從錫河中人也北漢主憂憤成疾悉以國事委其子侍衛都指揮使承鈞河西節度使申師厚不俟詔擅弃鎭入朝署其子爲留後秋七月癸酉朔責授率府副率丁丑加吳越王錢􅀪俶天下兵馬都元帥癸巳加門下侍郎同平章事范質守司徒以樞宻直學士工部侍郎長山景範爲中書侍郎同平章事判三司加樞宻使同平章事鄭仁誨兼侍中乙未以樞密副使魏仁浦爲樞密使范質既爲司徒司徒竇貞固歸洛陽府縣以民視之課役皆不免貞固訴於留守向訓訓不聽初帝與北漢主相距於高平命前澤州刺史李彦崇將兵守江猪嶺遏北漢主歸路彦崇聞樊愛能等南遁引兵退北漢主果自其路遁去八月己酉貶彦崇率府副率己巳廢鎭國軍初太祖以建雄節度使王晏有拒北漢之功其鄉里在滕縣徙晏爲武寧節度使晏少時甞爲羣盜至鎭悉召故黨贈之金帛鞍馬謂曰吾鄉素名多盜昔吾與諸君皆甞爲之想後來者無能居諸君之右諸君幸爲我語之使勿復爲爲者吾必族之於是一境清肅九月徐州人請爲之立衣錦碑許之冬十月甲辰左羽林大將軍孟漢卿坐納藁稅場官擾民多取耗餘賜死有司奏漢卿罪不至死上曰朕知之欲以懲衆耳己酉廢安逺永清軍初宿衛之士累朝相承務求姑息不欲簡閲恐傷人情由是羸老者居多但驕蹇不用命實不可用每遇大敵不走即降其所以失國亦多由此帝因高平之戰始知其弊癸亥謂侍臣曰凡兵務精不務多今以農夫百未能養甲士一奈何浚民之膏澤飬此無用之物乎且健懦不分衆何所勸乃命大簡諸軍精銳者升之上軍羸者斥去之又以驍勇之士多爲諸蕃鎭所蓄詔募天下壯士咸遣詣闕命太祖皇帝選其尤者爲殿前諸班其􅀐歩諸軍各命將帥選之由是士卒精彊近代無比征伐四方所向皆捷選練之力也戊辰帝謂侍臣曰諸道盜賊頗多討捕終不能絶蓋由累朝分命使臣巡檢致藩侯守令皆不致力宜悉召還專委節鎭州縣責其清肅河自楊劉至于博州百二十里連年東潰分爲二􅂀匯爲大澤彌漫數百里又東北壊古堤而出灌齊棣淄諸州至于海涯漂没民田廬不可勝計流民采菰稗捕魚以給食朝廷屢遣使者不能塞十一月戊戍帝遣李穀詣澶鄆齊按視隄塞役徒六萬三十日而畢北漢主疾病命其子承鈞監國尋殂遣使告哀于契丹契丹遣驃􅀐大將軍知内侍省事劉承訓冊命承鈞爲帝更名鈞北漢孝和帝性孝謹既嗣位勤於爲政愛民禮士境内粗安毎上表於契丹主稱男契丹主賜之詔謂之兒皇帝馬希萼之帥羣蠻破長沙也府庫累丗之積皆爲溆州蠻酋符彦通所掠彦通由是富彊稱王於谿洞間王逵既得湖南欲遣使撫之募能往者其將王䖍朗請行既至彦通盛侍衛而見之禮貎甚倨䖍朗厲聲責之曰足下自稱苻秦苖裔冝知禮義有以異於羣蠻昔馬氏在湖南足下祖父皆北靣事之今王公盡得馬氏之地足下不早往乞盟致使者先來又不接之以禮異日得無悔乎彦通慙懼起執䖍朗手謝之䖍朗知其可動因說之曰溪洞之地隋唐之丗皆爲州縣著在圖籍今足下上無天子之詔下無使府之命雖自王於山谷之間不過蠻夷一酋長耳曷若去王號自歸於王公王公必以天子之命授足下節度使與中國侯伯等夷豈不尊榮哉彦通大喜即日去王號因䖍朗獻銅鼓數枚於王逵逵曰䖍朗一言勝數萬兵眞國士也承制以彦通爲黔中節度使以䖍朗爲都指揮使預聞府政虔朗桂州人也逵慮西界鎭遏使錦州刺史劉瑫爲邊患表爲鎭南節度副使充西界都招討使是歳湖南大饑民食草木實武清節度使知潭州事周行逢開倉以賑之全活甚衆行逢起於微賤知民間疾苦勵精爲治嚴而無私辟署僚屬皆取廉介之士約束簡要吏民便之其自奉甚薄或譏其太儉行逢曰馬氏父子窮奢極靡不恤百姓今子孫乞食於人又足効乎丗宗睿武孝文皇帝上顯徳二年春正月庚辰上以漕運自晉漢以來不給斗耗綱吏多以虧欠抵死詔自今每斛給耗一斗定難節度使李彛興以折徳扆亦爲節度使與已並列耻之塞路不通周使癸未上謀於宰相對曰夏州邊鎭朝廷向來每加優借府州褊小得失不繫重輕且冝撫諭彛興庻全大體上曰徳扆數年以來盡忠戮力以拒劉氏柰何一旦弃之且夏州惟産羊馬貿易百貨悉仰中國我若絶之彼何能爲乃遣供奉官齊藏珍齎詔書責之彛興惶恐謝罪戊子蜀置威武軍於鳯州辛卯初令翰林學士兩省官舉令錄除官之日仍署舉者姓名若貪穢敗官並當連坐契丹自晉漢以來屢宼河北輕􅀐深入無藩籬之限郊野之民每困殺掠言事者稱深冀之間有胡盧河横亘數百里可浚之以限其奔突是月詔忠武節度使王彦超彰信節度使韓通將兵夫浚胡盧河築城於李晏口留兵戍之帝召徳州刺史張藏英問以備邊之策藏英具陳地形要害請列置戍兵募邊人驍勇者厚其稟給自請將之隨便宜討擊帝皆從之以藏英爲􅆓邊巡檢招牧都指揮使藏英到官數月募得千餘人王彦超等行視役者甞爲契丹所圍藏英引所募兵馳擊大破之自是契丹不敢渉胡盧河河􅀯之民始得休息二月庚子朔日有食之蜀䕫恭孝王仁毅卒壬戌詔羣臣極言得失其略曰朕於卿大夫才不能盡知面不能盡識若不采其言而觀其行審其意而察其忠則何以見器略之淺深知任用之當否若言之不入罪實在予茍求之不言咎將誰執唐主以中書侍郎知尚書省嚴續爲門下侍郎同平章事三月辛未以李晏口爲静安軍帝常憤廣明以來中國日蹙及高平既㨗慨然有削平天下之志㑹秦州民夷有詣大梁獻策請恢復舊疆者帝納其言蜀主聞之遣客省使趙季札按視邊備季札素以文武才略自任使還奏稱雄武節度使韓繼勲鳯州刺史王萬迪非將帥才不足以禦大敵蜀主問誰可往者季札自請行丙申以季札爲雄武監軍使仍以宿衛精兵千人爲之部曲帝以大梁城中迫隘夏四月乙卯詔展外城先立標幟俟今冬農隙興板築東作動則罷之更俟次年以漸成之且令自今葬埋皆出所標七里之外其標内俟縣官分畫街衢倉場營廨之外聽民隨便築室丙辰蜀主命知樞密院王昭逺按行北邊城寨及甲兵上謂宰相曰朕每思致治之方未得其要寢食不忘又自唐晉以來吳蜀幽并皆阻聲教未能混壹冝命近臣著爲君難爲臣不易論及開邊策各一篇朕將覽焉比部郎中王朴獻策以爲中國之失吳蜀幽并皆由失道今必先觀所以失之之原然後知所以取之之術其始失之也莫不以君暗臣邪兵驕民困姦黨内熾武夫外横因小致大積微成著今欲取之莫若反其所爲而巳夫進賢退不肖所以收其才也恩隠誠信所以結其心也賞功罰罪所以盡其力也去奢節用所以豐其財也時使薄斂所以阜其民也俟羣才旣集政事既治財用既充士民既附然後舉而用之功無不成矣彼之人觀我有必取之勢則知其情狀者願爲間諜知其山川者願爲郷導民心既歸天意必從矣凡攻取之道必先其易者唐與吾接境幾二千里其勢易擾也擾之當以無備之處爲始備東則擾西備西則擾東彼必奔走而救之奔走之間可以知其虚實彊弱然後避實擊虚避彊擊弱未須大舉且以輕兵擾之􅀯人懦怯聞小有警必悉師以救之師數動則民疲而財竭不悉師則我可以乗虚取之如此江北諸州將悉爲我有既得江北則用彼之民行我之法江􅀯亦易取也得江􅀯則嶺􅀯巴蜀可傳檄而定􅀯方既定則燕地必望風内附若其不至移兵攻之席卷可平矣惟河東必死之宼不可以恩信誘必當以彊兵制之然彼自高平之敗力竭氣沮必未能為邊患宜且以為後圖俟天下既平然後伺間一舉可擒也今士卒精練甲兵有備羣下畏法諸將効力期年之後可以出師宜自夏秋蓄積實邊矣上欣然納之時羣臣多守常偷安所對少有可取者惟朴神峻氣勁有謀能㫁凡所規畫皆稱上意上由是重其器識未幾遷左諌議大夫知開封府事上謀取秦鳯求可將者王溥薦宣徽南院使鎭安節度使向訓上命訓與鳯翔節度使王景客省使高唐昝居潤偕行五月戊辰朔景出兵自散關􅃐秦州敕天下寺院非勑額者悉廢之禁私度僧尼凡欲出家者必俟祖父母父母伯叔父之命惟兩京大名府京兆府青州聽設戒壇禁僧俗捨身㫁手足煉指挂燈帶鉗之類幻惑流俗者令兩京及諸州每歳造僧帳有死亡歸俗皆隨時開落是歳天下寺院存者二千六百九十四廢者三萬三百三十六見僧四萬二千四百四十四尼一萬八千七百五十六王景㧞黄牛等八寨戊寅蜀主以捧聖控鶴都指揮使保寧節度使李廷珪為北路行營都統左衛聖歩軍都指揮使高彦儔為招討使武寧節度使吕彦珂副之客省使趙崇韜為都監蜀趙季札至徳陽聞周師入境懼不敢進上書求解邊任還奏事先遣輜重及妓妾西歸丁亥單􅀐馳入成都衆以為奔敗莫不震恐蜀主問以機事皆不能對蜀主怒繫之御史臺甲午斬之於崇禮門六月庚子上親録囚於内苑有汝州民馬遇父及弟為吏所􅁈死屢經覆按不能自伸上臨問始得其實人以為神由是諸長吏無不親察獄訟壬寅西師與蜀李廷珪等戰于威武城東不利排陳使濮州刺史胡立等爲蜀所擒丁未蜀主遣間使如北漢及唐欲與之俱出兵以制周北漢主唐主皆許之己酉以彰信節度使韓通充西􅀯行營馬步軍都虞􅀱戊午􅀯漢主殺禎州節度使通王􅀪政於是高祖之諸子盡矣壬戌以樞密院承旨清河張美爲右領軍大將軍權㸃檢三司事初帝在澶州美掌州之金榖􅀠三司者帝或私有所求美曲爲供副太祖聞之怒恐傷帝意但徙美爲濮州馬歩都虞􅀱美治財精敏當時鮮及故帝以利權授之帝征伐四方用度不乏美之力也然思其在澶州所爲終不以公忠待之秋七月丁卯朔以王景兼西􅀯行營都招討使向訓兼行營兵馬都監宰相以景等乆無功饋運不繼固請罷兵帝命太祖皇帝往視之還言秦鳳可取之狀帝從之八月丁未中書侍郎同平章事景範罷判三司尋以父喪罷政事王景等敗蜀兵獲將卒三百己未蜀主遣通奏使知樞密院武泰節度使伊審徵如行營慰撫仍督戰帝以縣官乆不鑄錢而民閒多銷錢為器皿及佛像錢益少九月丙寅朔敇始立監采銅鑄錢自非縣官法物軍器及寺觀鍾磬鈸鐸之類聽留外自餘民閒銅器佛像五十日内悉令輸官給其直過期隠匿不輸五斤以上其罪死不及者論刑有差上謂侍臣曰卿軰勿以毁佛為疑夫佛以善道化人茍志於善斯奉佛矣彼銅像豈所謂佛邪且吾聞佛志在利人雖頭目猶捨以布施若朕身可以濟民亦非所惜也臣光曰若周丗宗可謂仁矣不愛其身而愛民若周丗宗可謂明矣不以無益廢有益蜀李廷珪遣先鋒都指揮使李進據馬嶺寨又遣竒兵出斜谷屯白澗又分兵出鳯州之北唐倉鎭及黄花谷絶周糧道閏月王景遣裨將張建雄將兵二千抵黄花又遣兵千人趣唐倉扼蜀歸路蜀染院使王巒將兵出唐倉與建雄戰於黄花蜀兵敗奔唐倉遇周兵又敗虜巒及其將士三千人馬嶺白澗兵皆潰李廷珪高彦儔等退保青泥嶺蜀雄武節度使兼侍中韓繼勲弃秦州奔還成都觀察判官趙玭舉城降斜谷援兵亦潰成階二州皆降蜀人振恐玭澶州人也帝欲以玭為節度使范質固爭以為不可乃以為郢州刺史壬子百官入賀帝舉酒屬王溥曰邊功之成卿擇帥之力也甲子上與將相食於萬歳殿因言兩日大寒朕於宫中食珍膳深愧無功於民而坐享天禄既不能躬耕而食惟當親冒矢石為民除害差可自安耳乙丑蜀李廷珪上表待罪冬十月壬申伊審徵至成都請罪皆釋之蜀主致書於帝請和自稱大蜀皇帝帝怒其抗禮不荅蜀主愈恐聚兵糧於劒門白帝為守禦之備募兵既多用度不足始鑄鐵錢􅅦境内鐵器民甚苦之唐主性和柔好文華而喜人順已由是諂諛之臣多進用政事日亂既克建州破湖􅀯益驕有吞天下之志李守貞慕容彦超之叛皆爲之出師遙爲聲援又遣使自海道通契丹及北漢約共圖中國值中國多事未暇與之校先是每冬淮水淺涸唐人常發兵戍守謂之把淺壽州監軍吳廷紹以爲疆埸無事坐費資糧悉罷之清淮節度使劉仁贍上表固爭不能得十一月乙未朔帝以李榖爲淮􅀯道前軍行營都部署兼知廬壽等行府事以忠武節度使王彦超副之督侍衛馬軍都指揮使韓令坤等十二將以伐唐令坤磁州武安人也汴水自唐末潰决自埇橋東􅀯悉爲汚澤上謀擊唐先命武寧節度使武行徳發民夫因故堤䟽導之東至泗上議者皆以為難成上曰數年之後必獲其利丁未上與侍臣論刑賞上曰朕必不因怒刑人因喜賞人先是大梁城中民侵街衢為舍通大車者葢寡上悉命直而廣之廣者至三十歩又遷墳墓於標外上曰近廣京城於存殁擾動誠多然怨謗之語朕自當之它日終為人利王景等圍鳯州韓通分兵城固鎭以絶蜀之援兵戊申克鳯州擒蜀威武節度使王環及都監趙崇溥等將士五千人崇溥不食而死環真定人也乙卯制曲赦秦鳯階成境内所獲蜀將士願留者優其俸賜願去者給資裝而遣之詔曰用慰衆情免違物性其四州之民二稅徵科之外凡蜀人所立諸色科徭悉罷之唐人聞周兵將至而懼劉仁贍神氣自若部分守禦無異平日衆情稍安唐主以神武統軍劉彦貞為北面行營都部署將兵二萬􅃐壽州奉化節度使同平章事皇甫暉為應援使常州團練使姚鳯為應援都監將兵三萬屯定逺召鎭南節度使宋齊丘還金陵謀國難以翰林承旨户部尚書殷崇義為吏部尚書知樞密院李榖等為浮梁自正陽濟淮十二月甲戍榖奏王彦超敗唐兵二千餘人於壽州城下己卯又奏先鋒都指揮使白延遇敗唐兵千餘人於山口鎭丙戌樞密使兼侍中韓忠正公鄭仁誨卒上臨其喪近臣奏稱歳道非便上曰君臣義重何日時之有往哭盡哀吳越王􅀪俶遣元帥府判官陳彦禧入貢帝以詔諭􅀪俶使出兵擊唐三年春正月丙午以王環為右驍衛大將軍賞其不降也丁酉李榖奏敗唐兵千餘人於上窑戊戌發開封府曹滑鄭州之民十餘萬築大梁外城庚子帝下詔親征淮南以宣徽南院使鎭安節度使向訓權東京留守端明殿學士王朴副之彰信節度使韓通權㸃檢侍衛司及在京内外都廵檢命侍衛都指揮使歸徳節度使李重進將兵先赴正陽河陽節度使白重賛將親兵三千屯潁上壬寅帝發大梁李榖攻壽州乆不克唐劉彦貞引兵救之至來逺鎭距壽州二百里又以戰艦數百艘􅃐正陽為攻浮梁之勢李榖畏之召將佐謀曰我軍不能水戰若賊㫁浮梁則腹背受敵皆不歸矣不如退守浮梁以待車駕上至圉鎭聞其謀亟遣中使乗驛止之比至已焚芻糧退保正陽丁未帝至陳州亟遣李重進引兵􅃐淮上辛亥李榖奏賊艦中流而進弩礮所不能及若浮梁不守則衆心動搖須至退軍今賊艦日進淮水日漲若車駕親臨萬一糧道阻絶其危不測願陛下且駐蹕陳潁俟李重進至臣與之共度賊艦可禦浮梁可完立具奏聞但若厲兵秣馬春去冬來足使賊中疲弊取之未晩帝覽奏不悅劉彦貞素驕貴無才略不習兵所歴藩鎭專為貪暴積財巨億以賂權要由是魏岑等爭譽之以為治民如龔黄用兵如韓彭故周師至唐主首用之其禆將咸師朗等皆勇而無謀聞李榖退喜引兵直抵正陽旌旗輜重數百里劉仁贍及池州刺史張全約固止之仁贍曰公軍未至而敵人先遁是畏公之威聲也安用速戰萬一失利則大事去矣彦貞不從既行仁贍曰果遇必敗乃益兵乗城為備李重進度淮逆戰於正陽東大破之斬彦貞生擒咸師朗等斬首萬餘級伏尸三十里收軍資器械三十餘萬是時江淮乆安民不習戰彦貞既敗唐人大恐張全約收餘衆奔壽州劉仁贍表全約為馬步左廂都指揮使皇甫暉姚鳳退保清流􅀜滁州刺史王紹顔委城走壬子帝至永寕鎭謂侍臣曰聞壽州圍解農民多歸村落今聞大軍至必復入城憐其聚為餓殍宜先遣使存撫各令安業甲寅帝至正陽以李重進代李榖為淮南道行營都招討使以榖判夀州行府事丙辰帝至夀州城下營於淝水之陽命諸軍圍壽州徙正陽浮梁於下蔡鎭丁巳徴宋亳陳潁徐宿許蔡等州丁夫數十萬以攻城晝夜不息唐兵萬餘人維舟於淮營於塗山之下庚申帝命太祖皇帝擊之太祖皇帝遣百餘􅀐薄其營而偽遁伏兵邀之大敗唐兵於渦口斬其都監何延錫等奪戰艦五十餘艘詔以武平節度使兼中書令王逵為南面行營都統使攻唐之鄂州逵引兵過岳州岳州團練使潘叔嗣厚具燕犒奉事甚謹逵左右求取無厭不滿望者譖叔嗣於逵云其謀叛逵怒形於詞色叔嗣由是懼不自安唐主聞湖南兵將至命武昌節度使何敬洙徙民入城為固守之計敬洙不從使除地為戰場曰敵至則與兵民俱死於此耳唐主善之二月丙寅下蔡浮梁成上自往視之戊辰廬夀光黄巡檢使元城司超奏敗唐兵三千餘人於盛唐擒都監髙弼等獲戰艦四十餘艘上命太祖皇帝倍道襲清流關皇甫暉等陳於山下方與前鋒戰太祖皇帝引兵出山後暉等大驚走入滁州欲斷橋自守太祖皇帝躍馬麾兵渉水直抵城下暉曰人各爲其主願容成列而戰太祖皇帝笑而許之暉整衆而出太祖皇帝擁馬頸突陳而入大呼曰吾止取皇甫暉它人非吾敵也手劒擊暉中腦生擒之并擒姚鳯遂克滁州後數日宣祖皇帝爲馬軍副都指揮使引兵夜半至滁州城下傳呼開門太祖皇帝曰父子雖至親城門王事也不敢奉命明旦乃得入上遣翰林學士竇儀籍滁州帑藏太祖皇帝遣親吏取藏中絹儀曰公初克城時雖傾藏取之無傷也今既籍爲官物非有詔書不可得也太祖皇帝由是重儀詔左金吾衛將䮝崇祚知滁州初永興節度使劉詞遺表薦其幕僚薊人趙普有才可用㑹滁州平范質薦普為滁州軍事判官太祖皇帝與語悅之時獲盜百餘人皆應死普請先訊鞫然後決所活什七八太祖皇帝益竒之太祖皇帝威名日盛每臨陳必以繁纓飾馬鎧仗鮮明或曰如此為敵所識太祖皇帝曰吾固欲其識之耳唐主遣泗州牙將王知朗齎書抵徐州稱唐皇帝奉書大周皇帝請息兵修好願以兄事帝歳輸貨財以助軍費甲戍徐州以聞帝不荅戊寅命前武勝節度使侯章等攻夀州水寨决其壕之西北隅導壕水入于淝太祖皇帝遣使獻皇甫暉等暉傷甚見上卧而言曰臣非不忠於所事但士卒勇怯不同耳臣曏日屢與契丹戰未甞見兵精如此因盛稱太祖皇帝之勇上釋之後數日卒帝詗知揚州無備己卯命韓令坤等將兵襲之戒以毋得殘民其李氏陵寢遣人與李氏人共守䕶之唐主兵屢敗懼亡乃遣翰林學士户部侍郎鍾謨工部侍郎文理院學士李徳明奉表稱臣來請平獻御服茶藥及金器千兩銀器五千兩繒錦二千匹犒軍牛五百頭酒二千斛壬午至夀州城下謨德明素辯口上知其欲遊􅀃盛陳甲兵而見之曰爾主自謂唐室苗裔宜知禮義異於它國與朕止隔一水未嘗遣一介修好惟泛海通契丹捨華事夷禮義安在且汝欲說我令罷兵邪我非六國愚主豈汝口舌所能移邪可歸語汝主亟來見朕再拜謝過則無事矣不然朕欲往觀金陵城借府庫以勞軍汝君臣得無悔乎謨徳明戰栗不敢言呉越王􅀪俶遣兵屯境上以俟周命蘇州營田指揮使陳滿言於丞相呉程曰周師南征唐舉國驚擾常州無備易取也㑹唐主有詔撫安江隂吏民滿告程云周詔書已至程為之言於􅀪俶請亟發兵從其策丞相元徳昭曰唐大國未可輕也若我入唐境而周師不至誰與并力能無危乎請姑俟之程固爭以為時不可失􅀪俶卒從程議癸未遣程督衢州刺史鮑修讓中直都指揮使羅晟􅃐常州程謂將士曰元丞相不欲出師將士怒流言欲擊徳昭弘俶匿徳昭於府中令捕言者歎曰方出師而士卒欲擊丞相不祥甚哉乙酉韓令坤奄至楊州平旦先遣白延遇以數百􅀐馳入城城中不之覺令坤繼至唐東都營屯使賈崇焚官府民舎弃城南走副留守工部侍郎馮延魯髠髮被僧服匿於佛寺軍士執之令坤慰撫其民使皆安堵庚寅王逵奏抜鄂州長山寨執其將陳澤等獻之辛卯太祖皇帝奏唐天長制置使耿謙降獲芻糧二十餘萬唐主遣園苑使尹延範如泰州遷呉讓皇之族于􅃳州延範以道路艱難恐楊氏為變盡殺其男子六十人還報唐主怒􅆎斬之韓令坤攻唐泰州拔之刺史方訥奔金陵唐主遣人以蠟丸求救於契丹壬辰靜安軍使何繼筠獲而獻之以給事中髙防權知泰州癸巳呉越王􅀪俶遣上直都指揮使路彦銖攻宣州羅晟帥戰艦屯江隂唐靜海制置使姚彦洪帥兵民萬人奔呉越潘叔嗣屬將士而告之曰吾事令公至矣今乃信䜛疑怒軍還必擊我吾不能坐而待死汝軰能與我俱西乎衆憤怒請行叔嗣帥之西襲朗州逵聞之還軍追之及於武陵城外與叔嗣戰逵敗死或勸叔嗣遂據朗州叔嗣曰吾救死耳安敢自尊宜以督府歸潭州太尉豈不以武安見處乎乃歸岳州使團練判官李簡帥朗州將吏迎武安節度使周行逢衆謂行逢必以潭州授叔嗣行逢曰叔嗣賊殺主帥罪當族所可恕者得武陵而不有以授吾耳若遽用為節度使天下謂我與之同謀何以自明宜且以為行軍司馬俟踰年授以節鉞可也乃以衡州刺史莫􅀪萬權知潭州帥衆入朗州自稱武平武安留後告于朝廷以叔嗣為行軍司馬叔嗣怒稱疾不至行逢曰行軍司馬吾甞為之權與節度使相埒耳叔嗣猶不滿望更欲圖我邪或􅀃行逢授叔嗣武安節􅃏以誘之令至都府受命此乃机上肉耳行逢從之叔嗣將行其所親止之叔嗣自恃素以兄事行逢相親善遂行不疑行逢遣使迎􅃸道路相望既至自出郊勞相見甚懽叔嗣入謁未至聽事遣人執之立於庭下責之曰汝為小校無大功王逵用汝為團練使一旦反殺主帥吾以疇昔之情未忍斬汝以為行軍司馬乃敢違拒吾命而不受乎叔嗣知不免以宗族為請遂斬之資治通鑑卷第二百九十二
