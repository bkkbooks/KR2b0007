canonical_identifier: bkk:krp/KR2b0007/SBCK/v1/juan/95
seq: 95
front:
  text: 取天下也羣臣皆頓首稱萬嵗勒雖不學好使諸生讀書而聴之時以其意論古今得失聞者莫不悦服嘗使人讀漢書聞酈食其勸立六國後驚曰此法當失何以遂得天下及聞留侯諌乃曰賴有此耳郭敬之退戍樊城也晉人復取襄陽夏四月敬復攻㧞之留戍而歸
  hash: sha256:2a86270c17d3b807e32b47984bf75cfc27c225707e4ac379dc68481381f118a9
body:
  text: 趙右僕射程遐言於趙主勒曰中山王勇悍權畧羣臣莫及觀其志自陛下之外視之蔑如加以殘賊安忍久為將帥威振内外其諸子年長皆典兵權陛下在自當無它恐非少主之臣也宜早除之以便大計勒曰今天下未安大雅冲幼宜得彊輔中山王骨肉至親有佐命之功方當委以伊霍之任何至如卿所言卿正恐不得擅帝舅之權耳吾亦當參卿顧命勿過憂也遐泣曰臣所慮者公家陛下乃以私計拒之忠言何自而入乎中山王雖為皇太后所養非陛下天屬雖有微功陛下酬其父子恩榮亦足矣而其志願無極豈將來有益者乎若不除之臣見宗廟不血食矣勒不聴遐退告徐光光曰中山王常切齒於吾二人恐非但危國亦將為家禍也它日光承閒言於勒曰今國家無事而陛下神色若有不怡何也勒曰呉蜀未平吾恐後世不以吾為受命之王也光曰魏承漢運劉備雖興於蜀漢豈得為不亡乎孫權在呉猶今之李氏也陛下苞括二都平蕩八州帝王之統不在陛下復當在誰且陛下不憂腹心之疾而更憂四支乎中山王藉陛下威畧所向輙克而天下皆言其英武亞於陛下且其資性不仁見利忘義父子並據權位􅀔傾王室而耿耿常有不滿之心近於東宮侍宴有輕皇太子之色臣恐陛下萬年之後不可復制也勒黙然始命太子省可尚書奏事且以中常侍嚴震參綜可否惟征伐斷斬大事乃呈之於是嚴震之權過于主相中山王虎之門可設雀羅矣虎愈怏怏不悅秋趙郭敬南掠江西太尉侃遣其子平西參軍斌及南中郎將桓宣乘虚攻樊城悉俘其衆敬旋救樊宣與戰于湼水破之皆得其所掠侃兄子臻及竟陵太守李陽攻新野㧞之敬懼遁去宣陽遂㧞襄陽侃使宣鎮襄陽宣招懐初附簡刑罰畧威儀勸課農桑或載鉏耒於軺軒親帥民芸穫在襄陽十餘年趙人再攻之宣以寡弱拒守趙人不能勝時人以為亞於祖逖周訪成大將軍壽㓂寧州以其征東將軍費黑為前鋒出廣漢鎮南將軍任回出越嶲以分寧州之兵冬十月壽黒至朱提朱提太守董炳城守寧州刺史尹奉遣建寧太守霍彪引兵助之壽欲逆拒彪黒曰城中食少宜縱彪入城共消其榖何為拒之壽從之城久不下壽欲急攻之黑曰南中險阻難服當以日月制之待其智勇俱困然後取之溷牢之物何足汲汲也壽不從攻果不利乃悉以軍事任黒十一月壬子朔進太尉侃為大將軍劒履上殿入朝不趨賛拜不名侃固辭不受十二月庚戌帝遷于新宮是嵗凉州僚屬勸張駿稱凉王領秦凉二州牧置公卿百官如魏武晉文故事駿曰此非人臣所宜言也敢言此者罪不赦然境内皆稱之為王駿立次子重華為世子八年春正月成大將軍壽㧞朱提董炳霍彪皆降壽威震南中丙子趙主勒遣使來修好詔焚其幣三月寧州刺史尹奉降于成成盡有南中之地大赦以大將軍壽領寧州夏五月甲寅遼東武宣公慕容廆卒六月世子皝以平北將軍行平州刺史督攝部内赦繫囚以長史裴開為軍諮祭酒郎中令高詡為􅀇菟太守皝以帶方太守王誕為左長史誕以遼東太守陽騖為才而讓之皝從之以誕為右長史趙主勒寢疾中山王虎入侍禁中矯詔羣臣親戚皆不得入疾之増損外無知者又矯詔召秦王宏彭城王堪還襄國勒疾小瘳見宏驚曰吾使王處藩鎮正備今日有召王者邪將自來邪有召者當按誅之虎懼曰秦王思慕暫還耳今遣之仍留不遣數日復問之虎曰受詔即遣今已半道矣廣阿有蝗虎密使其子冀州刺史邃帥騎三千遊于蝗所秋七月勒疾篤遺命曰大雅兄弟宜善相保司馬氏汝曹之前車也中山王宜深思周霍勿為將來口實戊辰勒卒中山王虎劫太子􅀪使臨軒収右光祿大夫程遐中書令徐光下廷尉召邃使將兵入宿衛文武皆奔散􅀪大懼自陳劣弱讓位於虎虎曰君終太子立禮之常也􅀪涕泣固讓虎怒曰若不堪重任天下自有大義何足豫論􅀪乃即位大赦殺程遐徐光夜以勒喪潛瘞山谷莫知其處己卯備儀衛虛葬于高平陵謚曰明帝廟號高祖趙將石聰及譙郡太守彭彪各遣使來降聰本晉人冒姓石氏朝廷遣督䕶喬球將兵救之未至聰等為虎所誅慕容皝遣長史勃海王濟等來告喪八月趙主􅀪以中山王虎為丞相魏王大單于加九錫以魏郡等十三郡為國總攝百揆虎赦其境内立妻鄭氏爲魏王后子􅃉爲魏太子加使持節侍中都督中外諸軍事大將軍錄尚書事次子宣為使持節車騎大將軍冀州刺史封河閒王韜為前鋒將軍司􅀠校尉封樂安王遵封齊王鑒封代王苞封樂平王徙平原王斌為章武王勒文武舊臣皆補散任虎之府寮親黨悉署臺省要職以鎮軍將軍䕫安領左僕射尚書郭殷為右僕射更命太子宮曰崇訓宮太后劉氏以下皆徙居之選勒宫人及車馬服玩之美者皆入丞相府宇文乞得歸為其東部大人逸豆歸所逐走死于外慕容皝引兵討之軍于廣安逸豆歸懼而請和遂築榆隂安晉二城而還成建寧䍧柯二郡來降李壽復擊取之趙劉太后謂彭城王堪曰先帝甫晏駕丞相遽相陵藉如此帝祚之亡殆不復久王將若之何堪曰先帝舊臣皆被踈斥軍旅不復由人宮省之内無可為者臣請奔兖州挾南陽王恢為盟主據廩丘宣太后詔於牧守征鎮使各舉兵以誅暴逆庶幾猶有濟也劉氏曰事急矣當速為之九月堪微服輕騎襲兖州不克南奔譙城丞相虎遣其將郭太追之獲堪于城父送襄國炙而殺之徴南陽王恢還襄國劉氏謀泄虎廢而殺之尊􅀪母程氏為皇太后堪本田氏子數有功趙主勒養以為子劉氏有膽畧勒每與之參决軍事佐勒建功業有呂后之風而不妬忌更過之趙河東王生鎮闗中石朗鎮洛陽冬十月生朗皆舉兵以討丞相虎生自稱秦州刺史遣使來降氐帥蒲洪自稱雍州刺史西附張駿虎留太子邃守襄國將步騎七萬攻朗於金墉金墉潰獲朗刖而斬之進向長安以梁王挺為前鋒大都督生遣將軍郭權帥鮮卑涉璝衆二萬為前鋒以拒之生將大軍繼發軍于蒲阪權與挺戰于潼闗大破之挺及丞相左長史劉隗皆死虎還奔澠池枕尸三百餘里鮮卑潛與虎通謀反擊生生不知挺已死懼單騎奔長安權収餘衆退屯渭汭生遂棄長安匿於雞頭山將軍蔣英據長安拒守虎進兵擊英斬之生麾下斬生以降權奔隴右虎分命諸將屯汧隴遣將軍麻秋討蒲洪洪帥戸二萬降於虎虎迎拜洪光烈將軍䕶氐校尉洪至長安說虎徙闗中豪桀及氐羌以實東方曰諸氐皆洪家部曲洪帥以從誰敢違者虎從之徙秦雍民及氐羌十餘萬戸于闗東以洪為龍驤將軍流民都督使居枋頭以羌帥姚弋仲為奮武將軍西羌大都督使帥其衆數萬徙居清河之灄頭虎還襄國大赦趙主􅀪命虎建魏臺一如魏武王輔漢故事慕容皝初嗣位用灋嚴峻國人多不自安主簿皇甫真切諫不聴皝庶兄建武將軍翰母弟征虜將軍仁有勇畧屢立戰功得士心季弟昭有才藝皆有寵於廆皝忌之翰歎曰吾受事於先公不敢不盡力幸賴先公之靈所嚮有功此乃天賛吾國非人力也而人謂吾之所辦以為雄才難制吾豈可坐而待禍邪乃與其子出奔叚氏叚遼素聞其才冀収其用甚愛重之仁自平郭來奔喪謂昭曰吾等素驕多無禮於嗣君嗣君剛嚴無罪猶可畏况有罪乎昭曰吾輩皆體正嫡於國有分兄素得士心我在内未為所疑伺其閒隙除之不難兄趣舉兵以來我為内應事成之日與我遼東男子舉事不克則死不能效建威偷生異域也仁曰善遂還平郭閏月仁舉兵而西或以仁昭之謀告皝皝未之信遣使按驗仁兵已至黄水知事露殺使者還據平郭皝賜昭死遣軍祭酒封奕慰撫遼東以高詡為廣武將軍將兵五千與庶弟建武將軍幼稚廣威將軍軍寧逺將軍汗司馬遼東佟壽共討仁與仁戰於汶城北皝兵大敗幼稚軍皆為仁所獲壽嘗為仁司馬遂降於仁前大農孫機等舉遼東城以應仁封奕不得入與汗俱還東夷校尉封抽䕶軍平原乙逸遼東相太原韓矯皆棄城走於是仁盡有遼東之地叚遼及鮮卑諸部皆與仁遥相應援皝追思皇甫眞之言以眞為平州别駕十二月郭權據上邽遣使來降京兆新平扶風馮翊北地皆應之初張駿欲假道於成以通表建康成主雄不許駿乃遣治中從事張淳稱藩於成以假道雄偽許之將使盜覆諸東峽蜀人橋賛密以告淳淳謂雄曰寡君使小臣行無迹之地萬里通誠於建康者以陛下嘉尚忠義能成人之美故也若欲殺臣者當斬之都市宣示衆目曰凉州不忘舊徳通使琅邪主聖臣明發覺殺之如此則義聲逺播天下畏威今使盜殺之江中威刑不顯何足以示天下乎雄大驚曰安有此邪司􅀠校尉景騫言於雄曰張淳壯士請留之雄曰壯士安肯留且試以卿意觀之騫謂淳曰卿體豐大天熱可且遣下吏小住須凉淳曰寡君以皇輿播越梓宮未返生民塗炭莫之振救故遣淳通誠上都所論事重非下吏所能傳使下吏可了則淳亦不來矣雖火山湯海猶將赴之豈寒暑之足憚哉雄謂淳曰貴主英名蓋世土險兵彊何不亦稱帝自娯一方淳曰寡君祖考以來世篤忠貞以讐恥未雪枕戈待旦何自娯之有雄甚慙曰我之祖考本亦晉臣遭天下大亂與六郡之民避難此州為衆所推遂有今日琅邪若能中興大晉於中國者亦當帥衆輔之厚為淳禮而遣之淳卒致命於建康長安之失守也敦煌計吏耿訪自漢中入江東屢上書請遣大使慰撫凉州朝廷以訪守持書御史拜張駿鎮西大將軍選隴西賈陵等十二人配之訪至梁州道不通以詔書付賈陵詐為賈客以達之是嵗陵始至凉州駿遣部曲督王豐等報謝九年春正月趙改元延熈詔以郭權為鎮西將軍雍州刺史仇池王楊難敵卒子毅立自稱龍驤將軍左賢王下辨公以叔父堅頭之子盤為冠軍將軍右賢王河池公遣使來稱藩二月丁卯詔遣耿訪王豐齎印綬授張駿大將軍都督陜西雍秦凉州諸軍事自是每嵗使者不絶慕容仁以司馬翟揩領東夷校尉前平州别駕龎鑒領遼東相叚遼遣兵襲徒河不克復遣其弟蘭與慕容翰共攻栁城栁城都尉石琮城大慕輿埿并力拒守蘭等不克而退遼怒切責蘭等必令㧞之休息二旬復益兵來攻士皆重袍䝉楯作飛梯四面俱進晝夜不息琮埿拒守彌固殺傷千餘人卒不能㧞慕容皝遣慕容汗及司馬封奕等共救之皝戒汗曰賊氣銳勿與争鋒汗性驍果以千餘騎為前鋒直進封奕止之汗不從與蘭遇於牛尾谷汗兵大敗死者太半奕整陳力戰故得不没蘭欲乘勝窮追慕容翰恐遂滅其國止之曰夫為將當務慎重審已量敵非萬全不可動今雖挫其偏師未能屈其大勢皝多權詐好為潛伏若悉國中之衆自將以拒我我縣軍深入衆寡不敵此危道也且受命之日正求此捷若違命貪進萬一取敗功名俱喪何以返面蘭曰此已成擒無有餘理卿正慮遂滅卿國耳今千年在東若進而得志吾將迎之以為國嗣終不負卿使宗廟不祀也千年者慕容仁小字也翰曰吾投身相依無復還理國之存亡於我何有但欲為大國之計且相為惜功名耳乃命所部欲獨還蘭不得已而從之三月成主雄分寧州置交州以霍彪為寧州刺史㸑深為交州刺史趙丞相虎遣其將郭敖及章武王斌帥步騎四萬西擊郭權軍于華隂夏四月上邽豪族殺權以降虎徙秦州三萬餘戸于青并二州長安人陳良夫奔黑羌與北羌王薄句大等侵擾北地馮翊章武王斌樂安王韜合擊破之句大奔馬蘭山郭敖乘勝逐北為羌所敗死者什七八斌等収軍還三城虎遣使誅郭敖秦王宏有怨言虎幽之慕容仁自稱平州刺史遼東公長沙桓公陶侃晚年深以滿盈自懼不預朝權屢欲告老歸國佐吏等苦留之六月侃疾篤上表遜位遣左長史殷羨奉送所假節麾幢曲蓋侍中貂蟬太尉章荆江雍梁交廣益寧八州刺史印傳棨㦸軍資器仗牛馬舟船皆有定簿封印倉庫侃自加管鑰以後事付右司馬王愆期加督䕶統領文武甲寅輿車出臨津就船將歸長沙顧謂愆期曰老子婆娑正坐諸君乙卯薨於樊谿侃在軍四十一年明毅善斷識察纎密人不能欺自南陵迄于白帝數千里中路不拾遺及薨尚書梅陶與親人曹識書曰陶公機神明鑒似魏武忠順勤勞似孔明陸抗諸人不能及也謝安每言陶公雖用法而恒得法外意安鯤之從子也成主雄生瘍於頭身素多金創及病舊㾗皆膿潰諸子皆惡而逺之獨太子班晝夜侍側不脱衣冠親為吮膿雄召大將軍建寧王壽受遺詔輔政丁卯雄卒太子班即位以建寧王壽錄尚書事政事皆委於壽及司徒何㸃尚書令王􅉞班居中行喪禮一無所預辛未加平西將軍庾亮征西將軍假節都督江荆豫益梁雍六州諸軍事領江豫荆三州刺史鎮武昌亮辟殷浩為記室參軍浩羡之子也與豫章太守褚裒丹楊丞杜乂皆以識度清逺善談老易擅名江東而浩尤為風流所宗裒䂮之孫乂錫之子也桓彛嘗謂裒曰季野有皮裏春秋言其外無臧否而内有褒貶也謝安曰裒雖不言而四時之氣亦備矣秋八月王濟還遼東詔遣侍御史王齊祭遼東公廆又遣謁者徐孟䇿拜慕容皝鎮軍大將軍平州刺史大單于遼東公持節都督承制封拜一如廆故事船下馬石津皆為慕容仁所留九月戊寅衛將軍江陵穆公陸曄卒成主雄之子車騎將軍越屯江陽奔喪至成都以太子班非雄所生意不服與其弟安東將軍期謀作亂班弟玝勸班遣越還江陽以期為梁州刺史鎮葭萌班以未葬不忍遣推心待之無所疑間遣玝出屯於涪冬十月癸亥朔越因班夜哭弑之於殯宮并殺班兄領軍將軍都矯太后任氏令罪狀班而廢之初期母冉氏賤任氏母養之期多才藝有令名及班死衆欲立越越奉期而立之甲子期即皇帝位謚班曰戾太子以越為相國封建寧王加大將軍壽大都督徙封漢王皆錄尚書事以兄霸為中領軍鎮南大將軍弟保為鎮西大將軍汶山太守從兄始為征東大將軍代越鎮江陽丙寅葬雄於安都陵謚曰武皇帝廟號太宗始欲與壽共攻期壽不敢發始怒反譖壽於期請殺之期欲藉壽以討李玝故不許遣壽將兵向涪壽先遣使告玝以去就利害開其去路玝遂來奔詔以玝為巴郡太守期以壽為梁州刺史屯涪趙主􅀪自齎璽綬詣魏宮請禪位於丞相虎虎曰帝王大業天下自當有議何為自論此邪􅀪流涕還宮謂太后程氏曰先帝種真無復遺矣於是尚書奏魏臺請依唐虞禪讓故事虎曰􅀪愚暗居喪無禮不可以君萬國便當廢之何禪讓也十一月虎遣郭殷持節入宮廢􅀪為海陽王􅀪安步就車容色自若謂羣臣曰庸昧不堪纂承大統夫復何言羣臣莫不流涕宮人慟哭羣臣詣魏臺勸進虎曰皇帝者盛徳之號非所敢當且可稱居攝趙天王幽􅀪及太后程氏秦王宏南陽王恢于崇訓宮尋皆殺之西羌大都督姚弋仲稱疾不賀虎累召之乃至正色謂虎曰弋仲常謂大王命世英雄奈何把臂受託而返奪之邪虎曰吾豈樂此哉顧海陽年少恐不能了家事故代之耳心雖不平然察其誠實亦不之罪虎以䕫安為侍中太尉守尚書令郭殷為司空韓晞為尚書左僕射魏郡申鍾爲侍中郎闓為光祿大夫王波為中書令文武封拜各有差虎行如信都復還襄國慕容皝討遼東甲申至襄平遼東人王岌密信請降師進入城翟楷龎鑒單騎走居就新昌等縣皆降皝欲悉阬遼東民高詡諌曰遼東之叛實非本圖直畏仁凶威不得不從今元惡猶存始克此城遽加夷滅則未下之城無歸善之路矣皝乃止分徙遼東大姓於棘城以杜羣為遼東相安輯遺民十二月趙徐州從事蘭陵朱縱斬刺史郭祥以彭城來降趙將王朗攻之縱奔淮南慕容仁遣兵襲新昌督䕶新興王㝢擊走之遂徙新昌入襄平咸康元年春正月庚午朔帝加元服大赦改元成趙皆大赦成改元玉恒趙改元建武成主期立皇后閻氏以衛將軍尹奉為右丞相驃騎將軍尚書令玉􅉞為司徒趙王虎命太子邃省可尚書奏事唯祀郊廟選牧守征伐刑殺乃親之虎好治宮室鸛雀臺崩殺典匠少府任汪復使脩之倍於其舊邃保母劉芝封宜城君闗預朝權受納賄賂求仕進者多出其門慕容皝置左右司馬以司馬韓矯軍祭酒封弈為之司徒導以羸疾不堪朝㑹三月乙酉帝幸其府與羣臣宴于内室拜導并拜其妻曹氏侍中孔坦密表切諫以為帝初加元服動宜顧禮帝從之坦又以帝委政於導從容言曰陛下春秋已長聖敬日躋宜博納朝臣諮諏善道導聞而惡之出坦為廷尉坦不得意以疾去職丹楊尹􅁊景爲人謟巧導親愛之㑹熒惑守南斗經旬導謂領軍將軍陶回曰斗揚州之分吾當遜位以厭天譴回曰公以明徳作輔而與桓景造膝使熒惑何以退舍導深愧之導辟太原王濛為掾王述為中兵屬述昶之曽孫也濛不脩小亷而以清約見稱與沛國劉惔齊名友善惔常稱濛性至通而自然有節濛曰劉君知我勝我自知當時稱風流者以惔濛為首述性沈静每坐客辨論蠭起而述處之恬如也年三十尚未知名人謂之癡導以門地辟之既見唯問在東米價述張目不荅導曰王掾不癡人何言癡也嘗見導每發言一坐莫不賛美述正色曰人非堯舜何得每事盡善導改容謝之趙王虎南遊臨江而還有游騎十餘至歴陽歴陽太守袁耽表上之不言騎多少朝廷震懼司徒導請出討之夏四月加導大司馬假黄鉞都督征討諸軍事癸丑帝觀兵廣莫門分命諸將救歴陽及戍慈湖牛渚蕪湖司空郗鑒使廣陵相陳光將兵入衛京師俄聞趙騎至少又已去戊午解嚴王導解大司馬袁耽坐輕妄免官趙征虜將軍石遇攻桓宣於襄陽不克大旱㑹稽餘姚米斗五百秋七月慕容皝立子儁為世子九月趙王虎遷都于鄴大赦初趙主勒以天笁僧佛圖澄豫言成敗數有驗敬事之及虎即位奉之尤謹衣以綾錦乘以彫輦朝㑹之日太子諸公扶翼上殿主者唱大和尚衆坐皆起使司空李農旦夕問起居太子諸公五日一朝國人化之率多事佛澄之所在無敢向其方面涕唾者争造寺廟削髪出家虎以其真偽雜糅或避賦役為姦宄乃下詔問中書曰佛國家所奉里閭小人無爵秩者應事佛不著作郎王度等議曰王者祭祀典禮具存佛外國之神非天子諸華所應祠奉漢氏初傳其道唯聴西域人立寺都邑以奉之漢人皆不得出家魏世亦然今宜禁公卿以下毋得詣寺燒香禮拜其趙人為沙門者皆返初服虎詔曰朕生自邊鄙忝君諸夏至於饗祀應從本俗其夷趙百姓樂事佛者特聴之趙章武王斌帥精騎二萬并秦雍二州兵以討薄句大平之成太子班之舅羅演與漢王相天水上官澹謀殺成主期立班子事覺期殺演澹及班母羅氏期自以得志輕諸舊臣信任尚書令景騫尚書姚華田褒中常侍許涪等刑賞大政皆决於數人希復闗公卿褒無它才嘗勸成主雄立期為太子故有寵由是紀綱隳紊雄業始衰冬十月乙未朔日有食之慕容仁遣王齊等南還齊等自海道趣棘城齊遇風不至十二月徐孟等至棘城慕容皝始受朝命叚氏宇文氏各遣使詣慕容仁館于平郭城外皝帳下督張英將百餘騎閒道潜行掩擊之斬宇文氏使十餘人生擒叚氏使以歸是嵗明帝母建安君荀氏卒荀氏在禁中尊重同於太后詔贈豫章郡君代王翳槐以賀蘭藹頭不恭將召而戮之諸部皆叛代王紇那自宇文部入諸部復奉之翳槐奔鄴趙人厚遇之初張軌及二子寔茂雖保據河右而軍旅之事無嵗無之及張駿嗣位境内漸平駿勤脩庶政揔御文武咸得其用民富兵彊逺近稱之以為賢君駿遣將楊宣伐􅀛兹鄯善於是西域諸國焉耆于寘之屬皆詣姑臧朝貢駿於姑臧南作五殿官屬皆稱臣駿有兼秦雍之志遣參軍麴䕶上䟽以為勒雄既死虎期繼逆兆庶離主漸冉經世先老消落後生不識慕戀之心日逺日忘乞敕司空鑒征西亮等汎舟江沔首尾齊舉二年春正月辛巳彗星見于奎婁慕容皝將討慕容仁司馬高詡曰仁叛棄君親民神共怒前此海未嘗凍自仁反以來連年凍者三矣且仁專備陸道天其或者欲使吾乘海冰以襲之也皝從之羣僚皆言涉冰危事不若從陸道皝曰吾計已决敢沮者斬壬午皝帥其弟軍師將軍評等自昌黎東踐冰而進凡三百餘里至歴林口捨輜重輕兵趣平郭去城七里候騎以告仁仁狼狽出戰張英之俘二使也仁恨不窮追及皝至仁以為皝復遣偏師輕出冦抄不知皝自來謂左右曰今兹當不使其匹馬得返矣乙未仁悉衆陳於城之西北慕容軍帥所部降於皝仁衆沮動皝從而縱擊大破之仁走其帳下皆叛遂擒之皝先為斬其帳下之叛者然後賜仁死丁衡游毅孫機等皆仁所信用也皝執而斬之王冰自殺慕容幼慕容稚佟壽郭充翟楷龎鑒皆東走幼中道而還皝兵追及楷鑒斬之壽充奔高麗自餘吏民為仁所詿誤者皝皆赦之封高詡為汝陽侯二月尚書僕射王彬卒辛亥帝臨軒遣使備六禮逆故當陽侯杜乂女陵陽為皇后大赦羣臣畢賀夏六月叚遼遣中軍將軍李詠襲慕容皝詠趣武興都尉張萌擊擒之遼别遣叚蘭將步騎數萬屯栁城西回水宇文逸豆歸攻安晉以為蘭聲援皝帥步騎五萬向栁城蘭不戰而遁皝引兵北趣安晉逸豆歸棄輜重走皝遣司馬封弈帥輕騎追擊大破之皝謂諸將曰二虜恥無功必將復至宜於栁城左右設伏以待之乃遣封弈帥騎數千伏於馬兠山三月叚遼果將數千騎來冦抄弈縱擊大破之斬其將榮伯保前廷尉孔坦卒坦疾篤庾冰省之流涕坦慨然曰大丈夫將終不問以濟國安民之術乃為兒女子相泣邪冰深謝之九月慕容皝遣長史劉斌兼郎中令遼東陽景送徐孟等還建康冬十月廣州刺史鄧岳遣督䕶王隨等擊夜郎興古皆克之加岳督寧州成主期以從子尚書僕射武陵公載有儁才忌之誣以謀反殺之十一月詔建威將軍司馬勲將兵安集漢中成漢王壽擊敗之壽遂置漢中守宰戍南鄭而還索頭郁鞠帥衆三萬降於趙趙拜郁鞠等十三人為親趙王散其部衆於冀青等六州趙王虎作太武殿於襄國作東西宮於鄴十二月皆成太武殿基高二丈八尺縱六十五步廣七十五步甃以文石下穿伏室置衛士五百人以漆灌瓦金璫銀楹珠􅄕玉壁窮極工巧殿上施白玉􅇃流蘇帳為金蓮華以冠帳頂又作九殿于顯陽殿後選士民之女以實之服珠玉被綺縠者萬餘人教宮人占星氣馬步射置女太史及雜伎工巧皆與外同以女騎千人為鹵簿皆著紫綸巾熟錦袴金銀鏤帶五文織成鞾執羽儀鳴鼓吹遊宴以自隨於是趙大旱金一斤直粟二斗百姓嗷然而虎用兵不息百役並興使牙門將張彌徙洛陽鍾虡九龍翁仲銅駝飛亷於鄴載以四輪纒􅡞車轍廣四尺深二尺一鍾没於河募浮没三百人入河繫以竹絙用牛百頭鹿櫨引之乃出造萬斛之舟以濟之既至鄴虎大悅為之赦二嵗刑賚百官穀帛賜民爵一級又用尚方令解飛之言於鄴南投石於河以作飛橋功費數千萬億橋竟不成役夫飢甚乃止使令長帥民入山澤采橡及魚以佐食復為權豪所奪民無所得初日南夷帥范稚有奴曰范文甞隨商賈往來中國後至林邑教林邑王范逸作城郭宮室器械逸愛信之使為將文遂譖逸諸子或徙或逃是嵗逸卒文詐迎逸子於它國置毒於椰酒而殺之文自立為王於是出兵攻大岐界小岐界式僕徐狼屈都乾魯扶單等國皆滅之有衆四五萬遣使奉表入貢趙左校令成公叚作庭燎於杠末高十餘丈上盤置燎下盤置人趙王虎試而悅之三年春正月庚辰趙太保䕫安等文武五百餘人入上尊號庭燎油灌下盤死者二十餘人趙王虎惡之腰斬成公叚辛巳虎依殷周之制稱大趙天王即位于南郊大赦立其后鄭氏為天王皇后太子邃為天王皇太子諸子為王者皆降為郡公宗室為王者降為縣侯百官封署各有差國子祭酒袁􅉞太常馮懐以江左寖安請興學校帝從之辛卯立太學徴集生徒而士大夫習尚老莊儒術終不振瓌渙之曽孫也三月慕容皝於乙連城東築好城以逼乙連留折衝將軍蘭勃守之夏四月叚遼以車數千兩輸乙連粟蘭勃擊而取之六月遼又遣其從弟楊威將軍屈雲將精騎夜襲皝子遵於興國城遵擊破之初北平陽裕事叚疾陸眷及遼五世皆見尊禮遼數與皝相攻裕諌曰親仁善鄰國之寳也況慕容氏與我世㛰迭為甥舅皝有才徳而我與之構怨戰無虛月百姓彫弊利不補害臣恐社稷之憂將由此始願兩追前失通好如初以安國息民遼不從出裕為北平相趙太子邃素驍勇趙王虎愛之常謂羣臣曰司馬氏父子兄弟自相殘滅故使朕得至此如朕有殺阿鐵理否既而邃驕淫殘忍好糚飾美姬斬其首洗血置盤上與賓客傳觀之又烹其肉共食之河閒公宣樂安公韜皆有寵於虎邃疾之如讎虎荒耽酒色喜怒無常使邃省可尚書事每有所闗白虎恚曰此小事何足白也時或不聞又恚曰何以不白誚責笞棰月至再三邃私謂中庶子李顔等曰官家難稱吾欲行冒頓之事卿從我乎顔等伏不敢對秋七月邃稱疾不視事潜帥宮臣文武五百餘騎飲於李顔别舍因謂顔等曰我欲至冀州殺河閒公有不從者斬行數里騎皆逃散顔叩頭固諫䆳亦昏醉而歸其母鄭氏聞之私遣中人誚讓䆳䆳怒殺之佛圖澄謂虎曰陛下不宜數徃東宮虎將視䆳疾思澄言而還既而瞋目大言曰我為天下主父子不相信乎乃命所親信女尚書徃察之䆳呼前與語因抽劒擊之虎怒収李顔等詰問顔具言其狀殺顔等三十餘人幽䆳于東宮既而赦之引見太武東堂䆳朝而不謝俄頃即出虎使謂之曰太子應朝中宮豈可遽去䆳徑出不顧虎大怒廢䆳為庶人其夜殺䆳及其妃張氏并男女二十六人同埋於一棺誅其宮臣支黨二百餘人廢鄭后為東海太妃立其子宣為天王皇太子宣母杜昭儀為天王皇后安定侯子光自稱佛太子云從大秦國來當王小秦國聚衆數千人於杜南山自稱大黄帝改元龍興石廣討斬之九月鎮軍左長史封弈等勸慕容皝稱燕王皝從之於是備置羣司以封弈為國相韓壽為司馬裴開為奉常陽騖為司􅀠王㝢為太僕李洪為大理杜羣為納言令宋該劉睦石琮為常伯皇甫真陽協為冗騎常侍宋晃平熈張􅇦為將軍封裕為記室監洪臻之孫晃奭之子也冬十月丁卯皝即燕王位大赦十一月甲寅追尊武宣公曰武宣王夫人叚氏曰武宣后立夫人叚氏為王后世子儁為王太子如魏武晉文輔政故事叚遼數侵趙邊燕王皝遣揚烈將軍宋回稱藩於趙乞師以討遼自請盡帥國中之衆以㑹之并以其弟寧逺將軍汗為質趙王虎大悅厚加慰荅辭其質遣還密期以明年是嵗趙將李穆納拓䟦翳槐于大甯其故部落多歸之代王紇那奔燕國人復奉翳槐爲代王翳槐城盛樂而居之仇池氐王楊毅族兄初襲殺毅并有其衆自立為仇池公稱臣於趙資治通鑑卷第九十五
