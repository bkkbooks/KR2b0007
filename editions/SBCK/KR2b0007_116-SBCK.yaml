front:
  text: 西秦西秦王乾歸遣使送所掠守宰謝罪請降興遣鴻臚拜乾歸都督隴西嶺北匈奴雜胡諸軍事征西大將軍河州牧單于河南王太子熾磐爲鎮西將軍左賢王平昌公興命羣臣搜舉賢才右僕射梁喜曰臣累受詔而未得其人可謂丗之乏才興曰自古帝王之興未甞取相於昔人待將於將來隨時任才皆能致治卿自識㧞不明豈得逺誣四海乎羣臣咸恱
  hash: sha256:37cfeafe19cb3980722f1838aecc0b35054dff9f942eaf10972d7ae4b6d612d4
body:
  text: 秦姚詳屯杏城爲夏王勃勃所逼南奔大蘇勃勃遣平東將軍鹿弈干追斬之盡俘其衆勃勃南攻安定破尚書楊佛嵩于青石北原降其衆四萬五千進攻東鄉下之徙三千餘戸于貳城秦鎮北參軍王買徳奔夏夏王勃勃問以滅秦之策買徳曰秦徳雖衰藩鎮猶固願且蓄力以待之勃勃以買德爲軍師中郎將秦王興遣衛大將軍常山公顯迎姚詳弗及遂屯杏城劉藩帥孟懐玉等諸將追盧循至嶺表二月壬午懐玉克始興斬徐道覆河南王乾歸徙鮮卑僕渾部三千餘戸于度堅城以子敕勃爲秦興太守以鎮之焦㓪猶據姑臧沮渠蒙遜攻抜其城執㓪而宥之以其弟挐爲秦州刺史鎮姑臧遂伐南凉圍樂都三旬不克南凉王傉檀以子安周爲質乃還吐谷渾樹洛干伐南凉敗南凉太子虎臺南凉王傉檀欲復伐沮渠蒙遜邯川護軍孟愷諌曰蒙遜新并姑臧凶􅀔方盛不可攻也傉檀不從五道俱進至畨禾苕藋掠五千餘戸而還將軍屈右曰今既獲利宐倍道旋師早度險阨蒙遜善用兵若輕軍猝至大敵外逼徙戸內叛此危道也衞尉伊力延曰彼步我􅀐􅀔不相及今倍道而歸則示弱且捐棄資財非計也俄而昏霧風雨蒙遜兵大至傉檀敗走蒙遜進圍樂都傉檀嬰城固守以子染干爲質以請和蒙遜乃還三月劉􅁉始受太尉中書監以劉穆之爲太尉司馬陳郡殷景仁爲行參軍􅁉問穆之曰孟昶參佐誰堪入我府者穆之舉前建威中兵參軍謝晦晦安兄據之曾孫也􅁉即命爲參軍􅁉甞訊囚其旦刑獄參軍有疾以晦代之於車中一覽訊牒催促便下相府多事獄繫殷積晦隨問酬辨曾無違謬􅁉由是竒之即日署刑獄賊曹晦美風姿善言笑􅀶贍多通􅁉深加賞愛盧循行收兵至番禺遂圍之孫處拒守二十餘日沈田子言於劉藩曰番禺城雖險固本賊之巢穴今循圍之或有内變且孫季髙衆力寡弱不能持乆若使賊還據廣州凶􅀔復振矣夏四月田子引兵救番禺擊循破之所殺萬餘人循走田子與處共追之又破循於蒼梧鬱林寜浦㑹處病不能進循奔交州􅀄九真太守李遜作亂交州刺史交趾杜瑗討斬之瑗卒朝廷以其子慧度爲交州刺史詔書未至循襲破合浦徑向交州慧度帥州府文武拒循於石碕破之循餘衆猶三千人李遜餘黨李脱等結集俚獠五千餘人以應循庚子循晨至龍編南津慧度悉散家財以賞軍士與循合戰擲雉尾炬焚其艦以步兵夾岸射之循衆艦俱然兵衆大潰循知不免先鴆妻子召妓妾問曰誰能従我死者多云雀鼠貪生就死實難或云官尚當死某豈願生乃悉殺諸辭死者因自投于水慧度取其尸斬之并其父子及李脱等函七首送建康􅀄劉毅在京口貧困與知識射於東堂􅁃恱爲司徒右長史後至奪其射堂衆人皆避之毅獨不去恱厨饌甚盛不以及毅毅從恱求子鵝炙恱怒不與毅由是銜之至是毅求兼督江州詔許之因奏稱江州内地以治民爲職不當置軍府彫耗民力宐罷軍府移鎮豫章而尋陽接蠻可即州府千兵以助郡戍於是解恱都督將軍官以刺史鎮豫章毅以親將趙恢領千兵守尋陽恱府文武三千悉入毅府符攝嚴峻恱忿懼至豫章疽發背卒河南王乾歸徙羌句豈等部衆五千餘戸于疊蘭城以兄子阿柴爲興國大守以鎮之五月復以子木弈于爲武威太守鎮嵻㟍城丁卯魏主嗣謁金陵山陽矦奚斤居守昌黎王慕容伯兒謀反己巳奚斤并其黨收斬之秋七月燕王跋以太子永領大單于置四輔柔然可汗斛律遣使獻馬三千匹於跋求娶跋女樂浪公主跋命羣臣議之遼西公素弗曰前丗皆以宗女妻六夷宐許以妃嬪之女樂浪公主不宐下降非類跋曰朕方崇信殊俗柰何欺之乃以樂浪公主妻之跋勤於政事勸課農桑省徭役薄賦歛每遣守宰必親引見問爲政之要以觀其能燕人恱之河南王乾歸遣平昌公熾磐及中軍將軍審䖍伐南涼審䖍乾歸之子也八月熾磐兵濟河南涼王傉檀遣太子虎臺逆戰於嶺南南涼兵敗虜牛馬十餘萬而還沮渠􅂪遜帥輕􅀐襲西涼西涼公暠曰兵有不戰而敗敵者挫其鋭也􅂪遜新與吾盟而遽來襲我我閉門不與戰待其鋭氣竭而擊之蔑不克矣頃之􅂪遜糧盡而歸暠遣丗子歆帥􅀐七千邀擊之􅀩遜大敗獲其將沮渠百年河南王乾歸攻秦略陽太守姚龍於栢陽堡克之冬十一月進攻南平太守王憬於水洛城又克之徙民三千餘戸於譚郊遣乞伏審䖍帥衆二萬城譚郊十二月西羌彭利髮襲據枹罕自稱大將軍河州牧乾歸討之不克是歳并州刺史劉道憐爲北徐州刺史移鎮彭城八年春正月河南王乾歸復討彭利髮至奴葵谷利髮棄衆南走乾歸遣振威將軍乞伏公府追至清水斬之收羌尸一萬三千以乞伏審䖍爲河州刺史鎮枹罕而還正月丙子以吴興太守孔靖爲尚書右僕射河南王乾歸徙都譚郊命平昌公熾磐鎮􅁐川乾歸擊吐谷渾阿若干於赤水降之夏四月劉道規以疾求歸許之道規在荆州累年秋毫無犯及歸府庫帷幕儼然若舊隨身甲士二人遷席於舟中道規刑之於市以後將軍豫州刺史劉毅爲衛將軍都督荆寧秦雍四州諸軍事荆州刺史毅謂左衛將軍劉敬宣曰吾忝西任欲屈卿爲長史南蠻豈有見輔意乎敬宣懼以告太尉裕􅁉笑曰但令老兄平安必無過慮毅性剛愎自謂建義之功與􅁉相埒深自矝伐雖權事推􅁉而心不服及居方岳常怏怏不得志􅁉每柔而順之毅驕縱滋甚甞云恨不遇劉項與之爭中原及敗於桑落知物情去已彌復憤激􅁉素不學而毅頗涉文雅故朝士有清望者多歸之與尚書僕射謝混丹陽尹郗僧施深相慿結僧施超之從子也毅既據上流隂有圖􅁉之志求兼督交廣二州􅁉許之毅又奏以郗僧施爲南蠻校尉後軍司馬毛脩之爲南郡太守􅁉亦許之以劉穆之代僧施爲丹楊尹毅表求至京口辭墓􅁉往㑹之於倪塘寧逺將軍胡藩言於􅁉曰公謂劉衞軍終能爲公下乎􅁉黙然乆之曰卿謂何如藩曰連百萬之衆攻必取戰必克毅固以此服公至於涉獵傳記一談一詠自許以爲雄豪以是搢紳白面之士輻湊歸之恐終不爲公下不如因㑹取之􅁉曰吾與毅俱有克復之功其過未彰不可自相圖也乞伏熾磐攻南涼三河太守吴隂于白土克之以乞伏出累代之六月乞伏公府弑河南王乾歸并殺其諸子十餘人走保大夏平昌公熾磐遣其弟廣武將軍智達揚武將軍木弈干帥􅀐三千討之以其弟曇逹爲鎮京將軍鎮譚郊驍􅀐將軍婁機鎮􅁐川熾磐帥文武及民二萬餘戸遷于枹罕秦人多勸秦王興乗亂取熾磐興曰伐人喪非禮也夏王勃勃欲攻熾磐軍師中郎將王買德諌曰熾磐吾之與國今遭喪亂吾不能恤又恃衆力而伐之匹夫且猶恥爲況萬乗乎勃勃乃止閏月庚子南郡烈武公劉道規卒秋七月己巳朔魏主嗣東廵置四廂大將十二小將以山陽矦斤元城矦屈行左右丞相庚寅嗣至濡源廵西北諸部落乞伏智逹等擊破乞伏公府於大夏公府奔疊蘭城就其弟阿柴智逹等攻㧞之斬阿柴父子五人公府奔嵻􅯲南山追獲之并其四子轘之於譚郊八月乞伏熾磐自稱大將軍河南王大赦攺元永康葬乾歸於枹罕謚曰武元王廟號髙祖皇后王氏崩庚戌魏王嗣還平城九月河南王熾磐以尚書令武始翟勍爲相國侍中太子詹事趙景爲御史大夫罷尚書令僕尚書六卿侍中等官癸酉葬僖皇后于休平陵劉毅至江陵多變易守宰輒割豫州文武江州兵力萬餘人以自隨㑹毅疾篤郗僧施等恐毅死其黨危乃勸毅請從弟兖州刺史藩以自副太尉􅁉僞許之藩自廣陵入朝已卯􅁉以詔書罪狀毅云與藩及謝混共謀不􅁤收藩及混賜死􅀄混與劉毅款昵混從兄澹常以爲憂漸與之踈謂弟璞及從子瞻曰益壽此性終當破家澹安之孫也庚辰詔大赦以前㑹稽内史司馬休之爲都督荆雍梁泰寜益六州諸軍事荆州刺史北徐州刺史劉道憐􅁉兖青二州刺史鎮京口使豫州刺史諸葛長民監太尉留府事􅁉疑長民難獨任乃加劉穆之建武將軍置佐吏配給資力以防之壬午􅁉帥諸軍發建康參軍王鎮惡請給百舸爲前驅丙申至姑孰以鎮惡爲振武將軍與龍驤將軍蒯恩將百舸前發􅁉戒之曰若賊可擊擊之不可者燒其舡艦留屯水際以待我於是鎮惡晝夜兼行揚聲言劉兖州上冬十月己未鎮惡至豫章口去江陵城二十里捨舡步上蒯恩軍居前鎮惡次之舸留一二人對舸岸上立六七旗旗下置鼔語所留人計我將至城便鼔嚴令若後有大軍狀又分遣人燒江津舡艦鎮惡徑前襲城語前軍士有問者但云劉兖州至津戍及民閒皆晏然不疑未至城五六里逢毅要將朱顯之欲出江津問劉兖州何在軍士曰在後顯之至軍後不見藩而見軍人擔彭排戰具望江津舡艦巳􅀍燒鼔嚴之聲甚盛知非藩上便躍馬馳去吿毅行令閉諸城門鎮惡亦馳進門未及下􅀜軍人因得入城衞軍長史謝純入參承毅出聞兵至左右欲引車歸純叱之曰我人吏也逃將安之馳還入府純安兄據之孫也鎮惡與城内兵􅃲且攻其金城自食時至中晡城内人敗散鎮惡穴其金城而入遣人以詔及赦文并􅁉手書示毅毅皆燒不視與司馬毛脩之等督士卒力戰城内人猶未信􅁉自來軍士從毅自東來者與臺軍多中表親戚且鬬且語知裕自來人情離駭逮夜聽事前兵皆散斬毅勇將趙蔡毅左右兵猶閉東西閤拒戰鎮惡慮闇中自相傷犯乃引軍出圍金城開其南面毅慮南有伏兵夜半帥左右三百許人開北門突出毛脩之謂謝純曰君但隨僕去純不從爲人所殺毅夜投牛牧佛寺􅀄􅁊蔚之敗也走投牛牧寺僧昌昌保藏之毅殺昌至是寺僧拒之曰昔亡師容􅁊蔚爲劉衞軍所殺今實不敢容異人毅嘆曰爲灋自弊一至於此遂縊而死明日居人以告乃斬首於市并子姪皆伏誅毅兄模奔襄陽魯宗之斬送之􅀄毅季父鎮之閑居京口不應辟召常謂毅及藩曰汝輩才器足以得志但恐不乆耳我不就爾求財位亦不同爾受罪累每見毅藩導從到門輒詬之毅甚敬畏未至宅數百步悉屏儀衞與白衣數人俱進及毅死太尉􅁉奏徴鎮之爲散􅀐常侍光禄大夫固辭不至仇池公楊盛叛秦侵擾祁山秦王興遣建威將軍趙琨爲前鋒立節將軍姚伯壽繼之前將軍姚恢出鷲峽秦州刺史姚嵩出羊頭峽右衛將軍胡翼度出汧城以討盛興自雍赴之與諸將㑹于隴口天水太守王松忽言於嵩曰先帝神略無方徐洛生以英武佐命再入仇池無功而還非楊氏智勇能全也直地􅀔險固耳今以趙琨之衆使君之威準之先朝實未見成功使君具悉形便何不表聞嵩不從盛帥衆與琨相持伯壽畏懦不進琨衆寡不敵爲盛所敗興斬伯壽而還興以楊佛嵩爲雍州刺史帥嶺北見兵以擊夏行數日興謂羣臣曰佛嵩每見敵勇不自制吾常節其兵不過五千人今所將既多遇敵必敗行巳逺追之無及將若之何佛嵩與夏王勃勃戰果敗爲勃勃所執絶亢而死秦立昭儀齊氏爲后沮渠蒙遜遷于姑臧十一月己卯太尉􅁉至江陵殺郗僧施􅀄毛脩之雖爲劉毅僚佐素自結於􅁉故􅁉特宥之賜王鎮惡爵漢壽子􅁉問毅府諮議參軍申永曰今日何施而可永曰除其宿釁倍其惠澤貫叙門次顯擢才能如此而巳􅁉納之下書寛租省調節役原刑禮辟名士荆人恱之諸葛長民驕縱貪侈所爲多不灋爲百姓患常懼太尉􅁉桉之及劉毅􅀍誅長民謂所親曰昔年醢彭越今年殺韓信禍其至矣乃屏人問劉穆之曰悠悠之言皆云太尉與我不平何以至此穆之曰公泝流逺征以老母稚子委節下若一豪不盡豈容如此邪長民意乃小安長民弟輔國大將軍黎民説長民曰劉氏之亡亦諸葛氏之懼也宐因􅁉未還而圖之長民猶豫未發既而歎曰貧賤常思富貴富貴必履危機今日欲爲丹徒布衣豈可得邪因遺冀州刺史劉敬宣書曰盤龍狼戾專恣自取夷滅異端將盡丗路方夷富貴之事相與共之敬宣報曰下官自義熈以來忝三州七郡常懼福過災生思避盈居損富貴之㫖非所敢當且使以書呈􅁉􅁉曰阿壽故爲不負我也劉穆之憂長民爲變屏人問太尉行參軍東海何承天曰公今行濟否承天曰荆州不憂不時判别有一慮耳公昔年自左里還入石頭甚脱爾今還宐加重慎穆之曰非君不聞此言􅁉在江陵輔國將軍王誕白􅁉求先下􅁉曰諸葛長民似有自疑心卿詎宐便去誕曰長民知我蒙公垂盻今輕身單下必當以爲無虞乃可以少安其意耳裕笑曰卿勇過賁育矣乃聽先還沮渠蒙遜即河西王位大赦攺元玄始置官僚如涼王光爲三河王故事太尉􅁉謀伐蜀擇元帥而難其人以西陽太守朱齡石既有武幹又練吏職欲用之衆皆以爲齡石資名尚輕難當重任􅁉不從十二月以齡石爲益州刺史帥寜朔將軍臧熹河閒太守蒯恩下邳太守劉鍾等伐蜀分大軍之半二萬人以配之熹􅁉之妻弟位居齡石之右亦􅀠焉􅁉與齡石密謀進取曰劉敬宣往年出黄虎無功而退賊謂我今應從外水往而料我當出其不意猶從内水來也如此必以重兵守涪城以僃内道若向黄虎正墯其計今以大衆自外水取成都疑兵出内水此制敵之竒也而慮此聲先馳賊審虚實别有凾書封付齡石署凾邉曰至白帝乃開諸軍雖進未知處分所由毛脩之固請行􅁉恐脩之至蜀必多所誅殺土人與毛氏有嫌亦當以死自固不許分荆州十郡置湘州加太尉􅁉太傅楊州牧丁巳魏主嗣北巡至長城而還九年春二月庚戌魏主嗣如髙柳川甲寅還宫太尉􅁉自江陵東還駱驛遣輜重兼行而下前刻至日毎淹留不進諸葛長民與公卿頻日奉候於新亭輙差其期乙丑晦􅁉輕舟徑進潜入東府三月丙寅朔旦長民聞之驚趨至門􅁉伏壯士丁旿於幔中引長民却人閑語凡平生所不盡者皆及之長民甚恱丁旿自幔後出於座拉殺之輿尸付廷尉收其弟黎民黎民素驍勇格􅃲而死并殺其季弟大司馬參軍幼民從弟寧朔將軍秀之庚午秦王興遣使至魏修好太尉􅁉上表曰大司馬温以民無定本傷治爲深庚戌土斷以一其業于時財阜國豐實由於此自茲迄今漸用頽㢮請申前制於是依界土斷唯徐兖青三州居晉陵者不在斷例諸流寓郡縣多所併省戊寅加􅁉豫州刺史􅁉固讓太􅀓州牧林邑范胡逹寇九真杜慧度擊斬之河南王熾磐遣鎮東將軍曇逹平東將軍王松壽將兵東擊休官權小郎吕破胡於白石川大破之虜其男女萬餘口進據白石城顯親休官權小成吕奴迦等二萬餘戸據白阬不服曇逹攻斬之隴右休官悉降秦太尉索稜以隴西降熾磐熾磐以稜爲太傅夏王勃勃大赦攺元鳯翔以叱干阿利領將作大匠發嶺北夷夏十萬人築都城於朔方水北黒水之南勃勃曰朕方統一天下君臨萬􅀖宐名新城曰統萬阿利性巧而殘忍蒸土築城錐入一寸即殺作者而并築之勃勃以爲忠委任之凡造兵器成呈之工人必有死者射甲不入則斬弓人入則斬甲匠又鑄銅爲一大鼔飛廉翁仲銅駝龍虎之屬飾以黄金列於宫殿之前凡殺工匠數千由是器物皆精利勃勃自謂其祖從母姓爲劉非禮也古人氏族無常乃攺姓赫連氏言帝王係天爲子其徽赫與天連也其非正統者皆以鐡伐爲氏言其剛鋭如鐡皆堪伐人也夏四月乙卯魏主嗣西巡命鄭兵將奚斤鴻飛將軍尉古眞都將閭大肥等擊越勤部於跋那山大肥柔然人也河南王熾磐遣安北將軍烏地延冠軍將軍翟紹擊吐谷渾别統句旁于泣勤川大破之河西王􅂪遜立子政徳爲丗子加鎮衛大將軍録尚書事南涼王傉檀伐河西王􅂪遜􅂪遜敗之於若厚塢又敗之於若涼因進圍樂都二旬不克南涼湟河太守文支以郡降于􅂪遜􅂪遜以文支爲廣武太守􅂪遜復伐南涼傉檀以太尉俱延爲質乃還􅂪遜西如苕藋遣冠軍將軍伏恩將􅀐一萬襲卑和烏啼二部大破之俘二千餘落而還􅂪遜寢于新臺閹人王懐祖擊􅂪遜傷足其妻孟氏禽斬之􅂪遜母車氏卒五月乙亥魏主嗣如雲中舊宫丙子大赦西河胡張外等聚衆爲盜乙卯嗣遣㑹稽公長樂劉絜等屯西河招討之六月嗣如五原朱齡石等至白帝發函書曰衆軍悉從外水取成都臧熹從中水取廣漢老弱乗髙艦十餘從内水向黄虎於是諸軍倍道兼行譙縱果命譙道福將重兵鎮倍城以僃内水齡石至平模去成都二百里縱遣秦州刺史矦暉尚書僕射譙詵帥衆萬餘屯平模夾岸築城以拒之齡石謂劉鍾曰今天時盛熱而賊嚴兵固險攻之未必可拔祇増疲困且欲養鋭息兵以伺其隙何如鍾曰不然前揚聲言大衆向内水譙道福不敢捨涪城今重軍猝至出其不意矦暉之徒巳破膽矣賊阻兵守險者是其懼不敢戰也因其兇懼盡銳攻之其􅀔必克克平模之後自可鼓行而進成都必不能守矣若緩兵相守彼將知人虚實涪軍忽來并力拒我人情既安良將又集此求戰不獲軍食無資二萬餘人悉爲蜀子虜矣齡石從之諸將以水北城地險兵多欲先攻其南城齡石曰今屠南城不足以破北若盡鋭以拔北城則南城不麾自散矣秋七月齡石帥諸軍急攻北城克之斬矦暉譙詵引兵迴趣南城南城自潰齡石捨舡步進譙縱大將譙撫之屯牛脾譙小苟塞打鼻臧熹擊撫之斬之小苟聞之亦潰於是縱諸營屯望風相次奔潰戊辰縱棄成都出走尚書令馬耽封府庫以待晉師壬申齡石入成都誅縱同祖之親餘皆按堵使復其業縱出成都先辭墓其女曰走必不免秖取辱焉等死死於先人之墓可也縱不從譙道福聞平模不守自涪引兵入赴縱往投之道福見縱怒曰大丈夫有如此功業而棄之將安歸乎人誰不死何怯之甚也因投縱以劔中其馬鞍縱乃去自縊死巴西人王志斬其首以送齡石道福謂其衆曰蜀之存亡實係於我不在譙王今我在猶足一戰衆皆許諾道福盡散金帛以賜衆衆受之而走道福逃於獠中巴民杜瑾執送之斬于軍門齡石徙馬耽於越嶲耽謂其徒曰朱矦不送我京師欲滅口也吾必不免乃盥洗而卧引繩而死須􅁷齡石使至戮其尸詔以齡石進監梁秦州六郡諸軍事賜爵豐城縣矦魏奚斤等破越勤於跋郍山西徙二萬餘家於大甯河西胡曹龍等擁部衆二萬人來入蒲子張外降之推龍爲大單于丙戌魏主嗣如定襄大洛城河南王熾磐擊吐谷渾支旁于長柳川虜旁及其民五千餘戸而還八月癸卯魏主嗣還平城曹龍請降于魏執送張外斬之丁丑魏主嗣如犲山宫癸未還九月再命太尉􅁉爲太􅀓楊州牧固辭河南王熾磐擊吐谷渾别統掘逵於渴渾川大破之虜男女二萬三千冬十月掘逵帥其餘衆降于熾磐吐京胡與離石胡出以眷叛魏魏主嗣命元城矦屈督㑹稽公劉絜永安矦魏勤以討之丁巳出以眷引夏兵邀擊絜禽之以獻於夏勤戰死嗣以屈亡二將欲誅之既而赦之使攝并州刺史屈到州縱酒廢事嗣積其前後罪惡檻車徴還斬之十一月魏主嗣遣使請昏於秦秦王興許之是歳以敦煌索邈爲梁州刺史苻宣乃還仇池􅀄邈寓居漢川與别駕姜顯有隙凡十五年而邈鎮漢川顯乃肉􅃝迎􅀱邈無愠色待之彌厚退而謂人曰我昔寓此失志多年若讎姜顯懼者不少但服之自佳何必逞志扵是闔境聞之皆恱十年春正月辛酉魏大赦攺元神瑞辛巳魏主嗣如繁畤二月戊戌還平城夏王勃勃侵魏河東蒲子庚戌魏主嗣如豺山宫魏并州刺史婁伏連襲殺夏所置吐京護軍及其守兵司馬休之在江陵頗得江漢民心子譙王文思在建康性凶暴好通輕俠太尉􅁉惡之三月有司奏文思擅捶殺國吏詔誅其黨而宥文思休之上䟽謝罪請解所任不許􅁉執文思送休之令自訓厲意欲休之殺之休之但表廢文思并與􅁉書陳謝􅁉由是不恱以江州刺史孟懐玉兼督豫州六郡以僃之夏五月辛酉魏主嗣還平城秦後將軍歛成討叛羌爲羌所敗懼罪出奔夏秦王興有疾妖賊李弘與氐仇常反於貳城興輿疾往討之斬常執弘而還秦左將軍姚文宗有寵於太子泓廣平公弼惡之誣文宗有怨言秦王興怒賜文宗死於是羣臣畏弼側目弼言於興無不從者以所親天水尹冲爲給事黄門侍郎唐盛爲治書侍御史興左右掌機要者皆其黨也右僕射梁喜侍中任謙京兆尹尹昭承間言於興曰父子之際人所難言然君臣之義不薄於父子故臣等不得黙然廣平公弼潜有奪嫡之志陛下寵之太過假其威權傾險無賴之徒輻湊附之道路皆言陛下將有廢立之計信有之乎興曰豈有此邪喜等曰苟無之則陛下愛弼適所以禍之願去其左右損其威權如此非特安弼乃所以安宗廟社稷興不應大司農竇温司徒左長史王弼皆密䟽勸興立弼爲太子興雖不從亦不責也興疾篤弼潜聚衆數千人謀作亂姚􅁉遣使以弼逆狀吿諸兄在藩鎮者於是姚懿治兵於蒲阪鎮東將軍豫州牧洸治兵於洛陽平西將軍諶治兵於雍皆欲赴長安討弼㑹興疾瘳見羣臣征虜將軍劉羗泣以告興梁喜尹昭請誅弼且曰苟陛下不忍殺弼亦當奪其權任興不得巳免弼尚書令使以將軍公還第懿等各罷兵懿洸諶與姚宣皆入朝使􅁉入白興求見興曰汝等正欲論弼事耳吾巳知之􅁉曰弼苟有可論陛下所宐垂聽若懿等言非是便當寘之刑辟柰何逆拒之於是引見懿等於諮議堂宣流涕極言興曰吾自處之非汝曹所憂撫軍東曹屬姜虬上䟽曰廣平公弼釁成逆著道路皆知之昔文王之化刑于寡妻今聖朝之亂起自愛子雖欲含忍掩蔽而逆黨扇惑不巳弼之亂心何由可革宐斥散凶徒以絶禍端興以虬表示梁喜曰天下人皆以吾兒爲口實將何以處之喜曰信如虬言陛下早宐裁決興黙然唾契汗乙弗等部皆叛南涼南涼王傉檀欲討之邯川護軍孟愷諫曰今連年饑饉南逼熾磐北逼蒙遜百姓不安逺征雖克必有後患不如與熾磐結盟通糴慰撫雜部足食繕兵俟時而動傉檀不從謂太子虎臺曰蒙遜近去不能猝來旦夕所慮唯在熾磐然熾磐兵少易禦汝謹守樂都吾不過一月必還矣乃帥􅀐七千襲乙弗大破之獲馬牛羊四十餘萬河南王熾磐聞之欲襲樂都羣臣咸以爲不可太府王簿佳襲曰傉檀不顧近患而貪逺利我今伐之絶其西路使不得還救則虎臺獨守窮城可坐禽也此天亡之時必不可失熾磐從之帥步􅀐二萬襲樂都虎臺慿城拒守熾磐四面攻之南涼撫軍從事中􅀰尉肅言於虎臺曰外城廣大難守殿下不若聚國人守内城肅等帥晉人拒戰於外雖有不捷猶足自存虎臺曰熾磐小賊旦夕當走卿何過慮之深虎臺疑晉人有異心悉召豪望有謀勇者閉之於内孟愷泣曰熾磐乗虚内侮國家危於累卵愷等進欲報恩退顧妻子人思效死而殿下乃疑之如是邪虎臺曰吾豈不知君之忠篤懼餘人脱生慮表以君等安之耳一夕城潰熾磐入樂都遣平逺將軍捷䖍帥􅀐五千追傉檀以鎮南將軍謙屯爲都督河右諸軍事涼州刺史鎮樂都秃髪赴單爲西平太守鎮西平以趙恢爲廣武太守鎮廣武曜武將軍王基爲晉興太守鎮浩亹徙虎臺及其文武百姓萬餘戸于枹罕赴單烏孤之子也河間人禇匡言於燕王跋曰陛下龍飛遼碣舊􅀖族黨傾首朝陽以日爲歳請往迎之跋曰道路數千里復隔異國如何可致匡曰章武臨海舟楫可通出於遼西臨渝不爲難也跋許之以匡爲游擊將軍中書侍郎厚資遣之匡與跋從兄買從弟睹自長樂帥五千餘戸歸于和龍契丹庫莫奚皆降於燕跋署其大人爲歸善王跋弟丕避亂在髙句麗跋召之以爲左僕射封常山公柔然可汗斛律將嫁女於燕斛律兄子步鹿真謂斛律曰幼女逺嫁憂思請以大臣樹黎等女爲媵斛律不許步鹿真出謂樹黎等曰斛律欲以汝女爲媵逺適他國樹黎恐與步鹿真謀使勇士夜伏於斛律穹廬之後伺其出而執之與女皆送於燕立步鹿真爲可汗而相之􅀄社崘之徙髙車也髙車人叱洛矦爲之鄉導以併諸部社崘徳之以爲大人步鹿真與社崘之子社拔共至叱洛矦家滛其少妻妻告步鹿真曰叱洛矦欲奉大檀爲主大檀者社崘季父僕渾之子也領别部鎮西境素得衆心步鹿真歸而發兵圍叱洛矦叱洛矦自殺遂引兵襲大檀大檀逆擊破之執步鹿真及社拔殺之自立爲可汗號牟汗紇升蓋可汗斛律至和龍燕王跋賜斛律爵上谷矦館之遼東待以客禮納其女爲昭儀斛律上書請還其國跋曰今棄國萬里又無內應若以重兵相送則饋運難繼兵少則不足成功如何可還斛律固請曰不煩重兵願給三百􅀐送至敇勒國人必欣然來迎跋乃遣單于前輔萬陵帥􅀐三百送之陵憚逺役至黒山殺斛律而還大檀亦遣使獻馬三千疋羊萬口于燕六月泰山太守劉研等帥流民七千餘家河西胡酋劉遮等帥部落萬餘家皆降於魏戊申魏主嗣如豺山宫丁亥還平城樂都之潰也南涼安西將軍樊尼自西平奔告南涼王傉檀傉檀謂其衆曰今妻子皆爲熾磐所虜退無所歸卿等能與吾藉乙弗之資取契汗以贖妻子乎乃引兵西衆多逃還傉檀遣鎮北將軍叚苟追之苟亦不還於是將士皆散唯樊尼與中軍將軍紇勃後軍將軍洛肱散􅀐侍郎隂利鹿不去傉檀曰蒙遜熾磐昔皆委質於吾今而歸之不亦鄙乎四海之廣無所容身何其痛也與其聚而同死不若分而或全樊尼吾長兄之子宗部所􅀉吾衆在北者戸垂一萬蒙遜方招懐士民存亡繼絶汝其從之紇勃洛肱亦與尼俱行吾年老矣所適不容寧見妻子而死遂歸于熾磐唯隂利鹿隨之傉檀謂利鹿曰吾親屬皆散卿何獨留利鹿曰臣老母在家非不思歸然委質爲臣忠孝之道難以兩全臣不才不能爲陛下泣血求救於鄰國敢離左右乎傉檀歎曰知人固未易大臣親戚皆棄我去今日忠義終始不虧者唯卿一人而巳傉檀諸城皆降於熾磐獨尉賢政屯浩亹固守不下熾磐遣人謂之曰樂都巳潰卿妻子皆在吾所獨守一城將何爲也賢政曰受涼王厚恩爲國藩屏雖知樂都巳䧟妻子爲禽先歸獲賞後順受誅然不知主上存亡未敢歸命妻子小事豈足動心若貪一時之利忘委付之重者大王亦安用之熾磐乃遣虎臺以手書諭之賢政曰汝爲儲副不能盡節面縳於人棄父忘君墮萬丗之業賢政義士豈效汝乎聞傉檀至左南乃降熾磐聞傉檀至遣使郊迎待以上賔之禮秋七月熾磐以傉檀爲驃􅀐大將軍賜爵左南公南涼文武依才銓叙歳餘熾磐使人鴆傉檀左右請解之傉檀曰吾病豈宐療邪遂死謚曰景王虎臺亦爲熾磐所殺傉檀子保周賀俱延子覆龍利鹿孤孫副周烏孤孫承鉢皆奔河西王􅂪遜乆之又奔魏魏以保周爲張掖王覆龍爲酒泉公賀西平公副周永平公承鉢昌松公魏主嗣愛賀之才謂曰卿之先與朕同源賜姓源氏八月戊子魏主嗣遣馬邑矦陋孫使於秦辛丑遣謁者于什門使於燕恱力延使於柔然于什門至和龍不肯入見曰大魏皇帝有詔湏馮王出受然後敢入燕王跋使人牽逼令入什門見跋不拜跋使人按其項什門曰馮王拜受詔吾自以賔主致敬何苦見逼邪跋怒留什門不遣什門數衆辱之左右請殺之跋曰彼各爲其主耳乃幽執什門欲降之什門終不降乆之衣冠弊壊略盡蟣虱流溢跋遺之衣冠什門皆不受魏主嗣以􅀶士王諒爲平南參軍使以平南將軍相州刺史尉太眞書與太尉􅁉相聞太眞古眞之弟也九月丁巳朔日有食之冬十月河南王熾磐復稱秦王置百官燕主跋與夏連和夏王勃勃遣御史中丞烏洛孤如燕蒞盟十一月壬午魏主嗣遣使者巡行諸州校閱守宰資財非家所齎者悉簿爲贓西秦王熾磐立妃禿髮氏爲后十二月丙戌朔柔然可汗大檀侵魏丙申魏主嗣北擊之大檀走遣奚斤等追之遇大雪士卒凍死及墯指者什二三河内人司馬順宰自稱晉王魏人討之不克燕遼西公素弗卒燕王跋比葬七臨之是歳司馬國璠兄弟聚衆數百潜渡淮夜入廣陵城青州刺史檀祇領廣陵相國璠兵直上聽事祇驚出將禦之􅀍射傷而入謂左右曰賊乗闇得入欲掩我不僃但擊五鼔彼懼曉必走矣左右如其言國璠兵果走追殺百餘人魏愽士祭酒崔浩爲魏主嗣講易及洪範嗣因問浩天文術數浩占決多驗由是有寵凡軍國密謀皆預之夏王勃勃立夫人梁氏爲王后子璝爲太子封子延爲陽平公昌爲太原公倫爲酒泉公定爲平原公滿爲河南公安爲中山公資治通鑑卷第一百一十六
