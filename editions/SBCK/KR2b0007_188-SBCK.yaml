body:
  text: 臣司馬光奉勑編集唐紀四大荒落二月凡一年有竒起屠維單閼十一月盡重光髙祖神堯大聖孝皇帝中之上武德二年十一月己卯劉武周冦浩州秦王世民引兵自龍門乘冰堅度河屯栢壁與宋金剛相持時河東州縣俘掠之餘未有倉廪人情恇擾聚入城堡徴斂無所得軍中乏食世民發教諭民民聞世民為帥而來莫不歸附自近及逺至者日多然後漸收其糧軍食以充乃休兵秣馬唯令偏禆乘間抄掠大軍堅壁不戰由是賊勢日衰世民嘗自帥輕騎覘敵騎皆四散世民獨與一甲士登丘而寢俄而賊兵四合初不之覺㑹有蛇逐䑕觸甲士之面甲士驚寤遽白世民俱上馬馳百餘步爲賊所及世民以大羽箭射殪其驍將賊騎乃退李世勣欲歸唐恐禍及其父謀於郭孝恪孝恪曰吾新事竇氏動則見疑宜先立效以取信然後可圖也世勣從之襲王世充獲嘉破之多所俘獲以獻建徳建徳由是親之初漳南人劉黒闥少驍勇狡獪與竇建徳善後爲羣盜轉事郝孝徳李密王世充世充以爲騎將每見世充所爲竊笑之世充使黑闥守新鄉李世勣擊虜之獻於建徳建徳署爲將軍賜爵漢東公常使將竒兵東西掩襲或濳入敵境覘視虚實黑闥往往乘間奮擊克獲而還十二月庚申上獵于華山于筠説永安王孝基急攻吕崇茂獨孤懷恩請先成攻具然後進孝基從之崇茂求救於宋金剛金剛遣其將善陽尉遲敬徳尋相將兵奄至夏縣孝基表裏受敵軍遂大敗孝基懷恩筠唐儉及行軍揔管劉世讓皆為所虜敬徳名恭以字行上徴裴寂入朝責其敗軍下吏既而釋之寵待彌厚尉遲敬徳尋相將還澮州秦王世民遣兵部尚書殷開山揔管秦叔寶等邀之於美良川大破之斬首二千餘級頃之敬徳相濳引精騎援王行本於蒲反世民自將步騎三千從間道夜趨安邑邀擊大破之敬德相僅以身免悉俘其衆復歸栢壁諸將咸請與宋金剛戰世民曰金剛懸軍深入精兵猛將咸聚於是武周據太原倚金剛為扞蔽金剛軍無蓄積以虜掠為資利在速戰我閉營養銳以挫其鋒分兵汾隰衝其心腹彼糧盡計窮自當遁走當待此機未宜速戰永安壯王孝基謀逃歸劉武周殺之李世勣復遣人說竇建徳曰曹戴二州户口完實孟海公竊有其地與鄭人外合内離若以大軍臨之指期可取既得海公以臨徐兖河南可不戰而定也建徳以為然欲自將徇河南先遣其行臺曹旦等將兵五萬濟河世勣引兵三千會之三年春正月將軍秦武通攻王行本於蒲反行本出戰而敗糧盡援絶欲突圍走無隨之者戊寅開門出降辛巳上幸蒲州斬行本秦王世民輕騎謁上於蒲州宋金剛圍絳州癸巳上還長安李世勣謀俟竇建徳至河南掩襲其營殺之冀得其父并建徳土地以歸唐會建徳妻産久之不至曹旦建徳之妻兄也在河南多所侵擾諸賊羈屬者皆怨之賊帥魏郡李文相號李商胡聚衆五千餘人據孟津中潬母霍氏亦善騎射自稱霍揔管世勣結商胡為昆弟入拜商胡之母母泣謂世勣曰竇氏無道如何事之世勣曰母無憂不過一月當殺之相與歸唐耳世勣辭去母謂商胡曰東海公許我共圖此賊事久變生何必待其來不如速决是夜商胡召曹旦偏禆二十三人飲之酒盡殺之旦别將高雅賢阮君明尚在河北未濟商胡以巨舟四艘濟河北之兵三百人至中流悉殺之有獸醫游水得免至南岸告曹旦旦嚴警為僃商胡既舉事始遣人告李世勣世勣與曹旦連營郭孝恪勸世勣襲旦世勣未决聞旦已有僃遂與孝恪帥數十騎來奔商胡復引精兵二千北襲阮君明破之高雅賢收衆去商胡追之不及而還建徳羣臣請誅李蓋建徳曰世勣唐臣為我所虜不忘本朝乃忠臣也其父何罪遂赦之甲午世勣孝恪至長安曹旦遂取濟州復還洺州二月庚子上幸華陰劉武周遣兵冦潞州䧟長子壺關潞州刺史郭子武不能禦上以將軍河東王行敏助之行敏與子武不叶或言子武將叛行敏斬子武以徇乙巳武周復遣兵冦潞州行敏擊破之壬子開州蠻酋冉肇則䧟通州甲寅遣將軍桑顯和等攻吕崇茂於夏縣初工部尚書獨孤懷恩攻蒲反久不下失亡多上數以敕書誚讓之懷恩由是怨望上嘗戲謂懷恩曰姑之子皆已為天子次應至舅之子乎懷恩亦頗以此自負或時扼腕曰我家豈女獨貴乎遂與麾下元君寶謀反會懷恩君寶與唐儉皆没於尉遲敬徳君寶謂儉曰獨孤尚書近謀大事若能早决豈有此辱哉及秦王世民敗敬徳於美良川懷恩逃歸上復使之將兵攻蒲反君寶又謂儉曰獨孤尚書遂抜難得還復在蒲反可謂王者不死儉恐懷恩遂成其謀乃說尉遲敬徳請使劉世讓還與唐連和敬徳從之遂以懷恩反狀聞時王行本已降懷恩入據其城上方濟河幸懷恩營已登舟矣世讓適至上大驚曰吾得免豈非天也乃使召懷恩懷恩未知事露輕舟來至即執以屬吏分捕黨與甲寅誅懷恩及其黨竇建德攻李商胡殺之建德洺州勸課農桑境内無盜商旅野宿突厥處羅可汗迎楊政道立為隋王中國士民在北者處羅悉以配之有衆萬人置百官皆依隋制居于定襄三月乙丑劉武周遣其將張萬歲冦浩州李仲文擊走之俘斬數千人改納言為侍中内史令為中書令給事郎為給事中甲戍以内史侍郎封徳彞為中書令王世充將帥州縣來降者時月相繼世充乃峻其法一人亡叛舉家無少長就戮父子兄弟夫婦許相告而免之又使五家為保有舉家亡者四鄰不覺皆坐誅殺人益多而亡者益甚至於樵采之人出入皆有限數公私愁窘人不􅂓生又以宫城為大獄意所忌者并其家屬收擊宫中諸將出討亦質其家屬於宫中禁止者常不減萬口餒死者日有數十世充又以臺省官為司鄭管原伊殷梁湊嵩谷懷徳等十二州營田使丞郎得為此行者喜若登仙甲申行軍副揔管張綸敗劉武周於浩州俘斬千餘人西河公張綸真鄉公李仲文引兵臨石州劉季真懼而詐降乙酉以季真為石州揔管賜姓李氏封彭山郡王蠻酋冉肇則冦信州趙郡公孝㳟與戰不利李靖將兵八百襲擊斬之俘五千餘人己丑復開通二州孝恭又擊蕭銑東平王闍提斬之夏四月丙申上祠華山壬寅還長安置益州道行臺以益利㑹鄜涇遂六揔管􅀠焉劉武周數攻浩州為李仲文所敗宋金剛軍中食盡丁未金剛北走秦王世民追之羅士信圍慈澗王世充使太子􅀇應拒之士信刺􅀇應墜馬人救之得免壬子以顯州道行臺楊士林為行臺尚書令甲寅加秦王世民益州道行臺尚書令秦王世民追及尋相於吕州大破之乗勝逐北一晝夜行二百餘里戰數十合至高壁嶺揔管劉􅀪基執轡諫曰大王破賊逐北至此功亦足矣深入不已不愛身乎且士卒飢疲宜留壁於此俟兵糧畢集然後復進未晩也世民曰金剛計窮而走衆心離沮功難成而易敗機難得而易失必乘此勢取之若更淹留使之計立僃成不可復攻矣吾竭忠徇國豈顧身乎遂䇿馬而進將士不敢復言饑追及金剛於雀䑕谷一日八戰皆破之俘斬數萬人夜宿於雀䑕谷西原世民不食二日不解甲三日矣軍中止有一羊世民與將士分而食之丙辰陜州揔管于筠自金剛所逃來世民引兵趣介休金剛尚有衆二萬戊午出西門背城布陳向北七里世民遣揔管李世勣等與戰小却爲賊所乘世民帥精騎撃之出其陳後金剛大敗斬首三千級金剛輕騎走世民追之數十里至張難堡浩州行軍揔管樊伯通張徳政據堡自守世民免胄示之堡中喜譟且泣左右告以王不食獻濁酒脫粟飯尉遲敬徳収餘衆守介休世民遣任城王道宗宇文士及往諭之敬徳與尋相舉介州及永安降世民得敬徳甚喜以爲右一府統軍使將其舊衆八千與諸營相參屈突通慮其變驟以爲言世民不聽劉武周聞金剛敗大懼弃并州走突厥金剛収其餘衆欲復戰衆莫肯從亦與百餘騎走突厥世民至晉陽武周所署僕射楊伏念以城降唐儉封府庫以待世民武周所得州縣皆入于唐未幾金剛謀走上谷突厥追獲腰斬之嵐州揔管劉六兒從宋金剛在介休秦王世民擒斬之其兄季真弃石州奔劉武周將馬邑高滿政滿政殺之武周之南冦也其内史令苑君璋諫曰唐主舉一州之衆直取長安所向無敵此乃天授非人力也晉陽以南道路險隘縣軍深入無繼於後若進戰不利何以自還不如北連突厥南結唐朝南面稱孤足為長䇿武周不聽留君璋守朔州及敗泣謂君璋曰不用君言以至於此乆之武周謀亡歸馬邑事泄突厥殺之突厥又以君璋為大行臺統其餘衆仍令郁射設督兵助鎮庚申懷州揔管黄君漢擊王世充太子􅀇應於西濟州大破之熊州行軍揔管史萬寶邀之於九曲又破之辛酉王世充䧟鄧州上聞并州平大恱壬戌宴羣臣賜繒帛使自入御府盡力取之復唐儉官爵仍以為并州道安撫大使所籍獨孤懷恩田宅資財悉以賜之世民留李仲文鎮并州劉武周數遣兵入冦仲文輒擊破之下城堡百餘所詔仲文檢校并州揔管五月竇建徳遣高士興擊李藝於幽州不克退軍籠火城藝襲擊大破之斬首五千級建徳大將軍王伏寶勇略冠軍中諸將疾之言其謀反建徳殺之伏寶曰大王柰何聽䜛言自斬左右手乎初尉遲敬徳將兵助吕崇茂守夏縣上濳遣使赦崇茂罪拜夏州刺史使圖敬德事泄敬徳殺之敬徳去崇茂餘黨復據夏縣拒守秦王世民引軍自晉州還攻夏縣壬午屠之辛卯秦王世民至長安是月突厥遣阿史那掲多獻馬千匹於王世充且求婚世充以宗女妻之并與之互市六月壬辰詔以和州揔管東南道行臺尚書令楚王杜伏威為使持節揔管江淮以南諸軍事揚州刺史東南道行臺尚書令淮南安撫使進封吳王賜姓李氏以輔公祐為行臺左僕射封舒國公丙午立皇子元景為趙王元昌為魯王元亨為酆王顯州行臺尚書令楚公楊士林雖受唐官爵而北結王世充南通蕭銑詔廬江王瑗與安撫使李􅀪敏討之兵未行長史田瓉為士林所忌甲寅瓉殺士林降於世充世充以瓉為顯州揔管秦王世民之討劉武周也突厥處羅可汗遣其弟步利設帥二千騎助唐武周既敗是月處羅至晉陽揔管李仲文不能制又留倫特勒使將數百人云助仲文鎮守自石嶺以北皆留兵戍之而去上議擊世充世充聞之選諸州鎮驍勇皆集洛陽置四鎮將軍募人分守四城秋七月壬戌詔秦王世民督諸軍擊世充陜東道行臺屈突通二子在洛陽上謂通曰今欲使卿東征如卿二兒何通曰臣昔為俘囚分當就死陛下釋縛加以恩禮當是之時臣心口相誓期以更生餘年為陛下盡節但恐不獲死所耳今得僃先驅二兒何足顧乎上歎曰徇義之士一至此乎癸亥突厥遣使濳詣王世充潞州揔管李襲譽邀擊敗之虜牛羊萬計驃騎將軍可朱渾定逺告并州揔管李仲文與突厥通謀欲俟洛陽兵交引胡騎直入長安甲戌命皇太子鎮蒲反以備之又遣禮部尚書唐儉安撫并州蹔廢并州揔管府徴仲文入朝壬午秦王世民至新安王世充遣魏王􅀪烈鎮襄陽荆王行本鎮虎牢宋王㤗鎮懷州齊王世惲檢校南城楚王世偉守寶城太子􅀇應守東城漢王􅀇恕守含嘉城魯王道徇守曜儀城世充自將戰兵左輔大將軍楊公卿帥左龍驤二十八府騎兵右游擊大將軍郭善才帥内軍二十八府步兵左游擊大將軍跋野綱帥外軍二十八府步兵揔三萬人以備唐􅀪烈行本世偉之子泰世充之兄子也梁師都引突厥稽胡兵入冦行軍揔管段徳操擊破之斬首千餘級羅士信將前鋒圍慈澗王世充自將兵三萬救之己丑秦王世民將輕騎前覘世充猝與之遇衆寡不敵道路險阨為世充所圍世民左右馳射皆應弦而斃獲其左建威將軍燕琪世充乃退世民還營埃塵覆面軍不復識欲拒之世民免胄自言乃得入旦日帥歩􅀐五萬進軍慈澗世充拔慈澗之戍歸于洛陽世民遣行軍緫管史萬寳自宜陽南據龍門將軍劉德威自太行東圍河内上谷公王君廓自洛口斷其餉道懷州揔管黃君漢自隂河攻廻洛城大軍屯于北邙連營以逼之世充洧州長史繁水張公謹與刺史崔樞以州城來降八月丁酉南寧西㸑蠻遣使入貢初隋末蠻酋爨翫反誅諸子没為官奴弃其地帝即位以翫子􅀪達為昆州刺史令持其父尸歸葬益州刺史段綸因遣使招諭其部落皆來降己亥竇建徳共州縣令唐綱殺刺史以州來降鄧州土豪執王世充所署刺史來降癸卯梁師都石堡留守張舉帥千餘人來降甲辰黄君漢遣校尉張夜义以舟師襲廻洛城克之獲其將達奚善定斷河陽南橋而還降其堡聚二十餘世充使大子􅀇應帥楊公卿等攻㢠洛不克乃築月城於其西留兵戍之世充陳於青城宫秦王世民亦置陳當之世充隔水謂世民曰隋室傾覆唐帝關中鄭帝河南世充未嘗西侵王忽舉兵東來何也世民使宇文士及應之曰四海咸仰皇風唯公獨阻聲教為此而來世充曰相與息兵講好不亦善乎又應之曰奉詔取東都不令講好也至暮各引兵還上遣使與竇建徳連和建徳遣同安長公主隨使者俱還乙卯劉徳威襲懷州入其外郭下其堡聚九月庚午梁師都將劉旻以華池來降以為林州揔管癸酉王世充顯州揔管田瓚以所部二十五州來降自是襄陽聲問與世充絶史萬寶進軍甘泉宫丁丑秦王世民遣右武衛將軍王君廓攻轘轅拔之王世充遣其將魏隱等撃君廓君廓偽遁設伏大破之遂東徇地至管城而還先是王世充將郭士衡許羅漢掠唐境君廓以䇿擊却之詔勞之曰卿以十三人破賊一萬自古以少制衆未之有也世充尉州刺史時徳叡帥所部杞夏陳隨許潁尉七州來降秦王世民以便宜命州縣官並依世充所署無所變易改尉州為南汴州於是河南州縣相繼來降劉武周降將尋相等多叛去諸將疑尉遲敬徳囚之軍中行臺左僕射屈突通尚書殷開山言於世民曰敬徳驍勇絶倫今既囚之心必怨望留之恐為後患不如遂殺之世民曰不然敬徳若叛豈在尋相之後邪遽命釋之引入卧内賜之金曰丈夫意氣相期勿以小嫌介意吾終不信讒言以害忠良公宜體之必欲去者以此金相資表一時共事之情也辛巳世民以五百騎行戰地登魏宣武陵王世充帥步騎萬餘猝至圍之單雄信引槊直趨世民敬徳躍馬大呼横刺雄信墜馬世充兵稍却敬徳翼世民出圍世民敬徳更帥騎兵還戰出入世充陳往返無所礙屈突通引大兵繼至世充兵大敗僅以身免擒其冠軍大將軍陳智略斬首千餘級獲排矟兵六千世民謂敬德曰公何相報之速也賜敬徳金銀一篋自是寵遇日隆敬徳善避矟每單騎入敵陳中敵叢矟刺之終莫能傷又能奪敵矟返刺之齊王元吉以善馬矟自負聞敬徳之能請各去刃相與校勝負敬徳曰敬徳謹當去之王勿去也既而元吉刺之終不能中秦王世民問敬徳曰避矟與奪槊孰難敬徳曰奪矟難乃命敬徳奪元吉矟元吉操矟躍馬志在刺之敬徳須臾三奪其矟元吉雖面相歎異内甚恥之叛胡䧟嵐州初王世充以邴元眞爲滑州行臺僕射濮州刺史杜才幹李密故將也恨元眞叛密詐以其衆降之元眞恃其官勢自往招慰才幹出迎延入就坐執而數之曰汝本庸才魏公置汝元僚不建毫髪之功乃構滔天之禍今來送死是汝之分遂斬之遣人齎其首至黎陽祭密墓壬午以濮州來降突厥莫賀咄設寇涼州揔管楊恭仁擊之爲所敗掠男女數千人而去丙戌以田瓉為顯州揔管賜爵蔡國公冬十月甲午王世充大將軍張鎮周來降甲辰行軍揔管羅士信襲王世充硤石堡拔之士信又圍千金堡堡中人罵之士信夜遣百餘人抱嬰兒數十至堡下使兒啼呼詐云從東都來歸羅揔管既而相謂曰此千金堡也吾屬誤矣即去堡中以為士信已去來者洛陽亡人出兵追之士信伏兵於道伺其門開突入屠之竇建徳之圍幽州也李藝告急于高開道開道帥二千騎救之建徳兵引去開道因藝遣使來降戊申以開道為蔚州揔管賜姓李氏封北平郡王開道有矢鏃在頰召醫出之醫曰鏃深不可岀開道怒斬之别召一醫曰岀之恐痛又斬之更召一醫醫曰可出乃鑿骨置楔其間骨裂寸餘竟出其鏃開道奏妓進膳不輟竇建徳帥衆二十萬復攻幽州建徳兵已攀堞薛萬均薛萬徹帥敢死士百人從地道出其背掩擊之建徳兵潰走斬首千餘級李藝兵乘勝薄其營建徳陳於營中填塹而出奮擊大破之建徳逐北至其城下攻之不克而還李密之敗也楊慶歸洛陽復姓楊氏及王世充稱帝慶復姓郭氏世充以為管州揔管妻以兄女秦王世民逼洛陽慶濳遣人請降世民遣揔管李世勣將兵往據其城慶欲與其妻偕來妻曰主上使妾侍巾櫛者欲結君之心也今君既辜付託徇利求全妾將如君何若至長安則君家一婢耳君何用為願送至洛陽君之惠也慶不許慶出妻謂侍者曰若唐遂勝鄭則吾家必滅鄭若勝唐則吾夫必死人生至此何用生為遂自殺庚戌慶來降復姓楊氏拜上柱國郇國公時世充太子􅀇應鎮虎牢軍于榮汴之間聞之引兵趣管城李世勣擊却之使郭孝恪為書説榮州刺史魏陸陸密請降􅀇應遣大將軍張志就陸徴兵丙辰陸擒志等四將舉州來降陽城令王雄帥諸堡來降秦王世民使李世勣引兵應之以雄為嵩州刺史嵩南之路始通魏陸使張志詐為􅀇應書停其東道之兵令其將張慈寶且還汴州又密告汴州刺史王要漢使圖慈寶要漢斬慈寶以降􅀇應聞諸州皆叛大懼奔還洛陽詔以要漢為汴州揔管賜爵郳國公王􅀪烈據襄陽上令金州揔管府司馬涇陽李大亮安撫樊鄧以圖之十一月庚申大亮攻樊城鎮拔之斬其將國大安下其城柵十四蕭銑性褊狹多猜忌諸將恃功恣横好專誅殺銑患之乃宣言罷兵營農實欲奪諸將之權大司馬董景珍弟為將軍怨望謀作亂事泄伏誅景珍時鎮長沙銑下詔赦之召還江陵景珍懼甲子以長沙來降詔峽州刺史許紹出兵應之雲州揔管郭子和先與突厥梁師都相連結既而襲師都寧朔城克之又詗得突厥舋隙遣使以聞為突厥候騎所獲處羅可汗大怒囚其弟子升子和自以孤危請帥其民南徙詔以延州故城處之張舉劉旻之降也梁師都大懼遣其尚書陸季覽說突厥處羅可汗曰比者中原喪亂分為數國勢均力弱故皆北面歸附突厥今定楊可汗既亡天下將悉為唐有師都不辭灰滅亦恐次及可汗不若及其未定南取中原如魏道武所為師都請為鄉導處羅從之謀使莫賀咄設入自原州泥步設與師都入自延州處羅入自并州突利可汗與奚霫契丹靺鞨入自幽州會竇建徳之師自滏口西入㑹于晉絳莫賀咄者處羅之弟咄苾也突利者始畢之子什鉢苾也處羅又欲取并州以居楊政道其羣臣多諫處羅曰我父失國賴隋得立此恩不可忘將出師而卒義成公主以其子奥射設醜弱廢之更立莫賀咄設號頡利可汗乙酉頡利遣使告處羅之喪上禮之如始畢之喪戊子安撫大使李大亮取王世充沮華二州是月竇建徳濟河擊孟海公初王世充侵建徳黎陽建徳襲破殷州以報之自是二國交惡信使不通及唐兵逼洛陽世充遣使求救於建徳建徳中書侍郎劉彬説建徳曰天下大亂唐得關西鄭得河南夏得河北共成鼎足之勢今唐舉兵臨鄭自秋涉冬唐兵日增鄭地日蹙唐彊鄭弱埶必不支鄭亡則夏不能獨立矣不如解仇除忿發兵救之夏擊其外鄭攻其内破唐必矣唐師既退徐觀其變若鄭可取則取之併二國之兵乘唐師之老天下可取也建徳從之遣使詣世充許以赴援又遣其禮部侍郎李大師等詣唐請罷洛陽之兵秦王世民留之不荅十二月辛卯王世充許亳等十一州皆請降壬辰燕郡王李藝又擊竇建徳軍於籠火城破之辛丑王世充隨州揔管徐毅舉州降癸卯峽州刺史許紹攻蕭銑荆門鎮拔之紹所部與梁鄭鄰接二境得紹士卒皆殺之紹得二境士卒皆資給遣之敵人愧感不復侵掠境内以安蕭銑遣其齊王張繡攻長沙董景珍謂繡曰前年醢彭越往年殺韓信卿不見之乎何為相攻繡不應進兵圍之景珍欲潰圍走為麾下所殺銑以繡為尚書令繡恃功驕横銑又殺之由是功臣諸將皆有離心兵勢益弱王世充遣其兄子代王琬長孫安世詣竇建徳報聘且乞師突厥倫特勒在并州大爲民患并州揔管劉世讓設策擒之上聞之甚喜張道源從竇建徳在河南密遣人詣長安請出兵攻洺州以震山東丙午詔世讓爲行軍揔管使將兵出土門趣洺州己酉􅀲州刺史賀拔行威執驃騎將軍達奚暠舉兵反是歲李子通度江攻沈法興取京口法興遣其僕射蔣元超拒之戰於庱亭元超敗死法興弃毗陵奔吳郡於是丹陽毗陵等郡皆降於子通子通以法興府掾李百藥爲内史侍郎國子祭酒杜伏威遣行臺左僕射輔公祏將卒數千攻子通以將軍闞稜王雄誕爲之副公祏度江攻丹楊克之進屯溧水子通帥衆數萬拒之公祏簡精甲千人執長刀為前鋒又使千人踵其後曰有退者即斬之自帥餘衆復居其後子通為方陳而前公祏前鋒千人殊死戰公祏復張左右翼以擊之子通敗走公祏逐之反為所敗還閉壁不出王雄誕曰子通無壁壘又狃於初勝乘其無備擊之可破也公祏不從雄誕以其私屬數百人夜出擊之因風縱火子通大敗降其卒數千人子通食盡弃江都保京口江西之地盡入於伏威伏威徙居丹楊子通復東走太湖收合亡散得二萬人襲沈法興於吳郡大破之法興帥左右數百人弃城走吳郡賊帥聞人遂安遣其將葉孝辯迎之法興中塗而悔欲殺孝辯更向㑹稽孝辯覺之法興窘廹赴江溺死子通軍勢復振帥其羣臣徙都餘杭盡收法興之地北自太湖南至嶺東包會稽西距宣城皆有之廣新二州賊帥高法澄沈寶徹殺隋官據州附於林士􅀪漢陽太守馮盎擊破之既而寶徹兄子智臣復聚兵於新州盎引兵擊之戰始合盎免胄大呼曰爾識我乎賊多弃仗肉􅃝而拜遂潰擒寶徹智臣等嶺外遂定竇建徳行臺尚書令恒山胡大恩請降四年春正月癸酉以大恩為代州揔管封定襄郡王賜姓李氏代州石嶺之北自劉武周之亂冦盜充斥大恩徙鎮鴈門討擊悉平之稽胡酋帥劉仚成部落數萬為邊冦辛巳詔太子建成統諸軍討之王世充梁州揔管程嘉㑹以所部來降杜伏威遣其將陳正通徐紹宗帥精兵二千來㑹秦王世民擊王世充甲申攻梁克之丙戌黔州刺史田世康攻蕭銑五州四鎮皆克之秦王世民選精銳千餘騎皆皂衣􅀇甲分為左右隊使秦叔寶程知節尉遲敬徳翟長孫分將之每戰世民親被􅀇甲帥之為前鋒乘機進擊所向無不摧破敵人畏之行臺僕射屈突通贊皇公竇軌將兵按行營屯猝與王世充遇戰不利秦王世民帥􅀇甲救之世充大敗獲其騎將葛彦璋俘斬六千餘人世充遁歸李靖説趙郡王孝恭以取蕭銑十䇿孝恭上之二月辛卯改信州為䕫州以孝恭為揔管使大造舟艦習水戰以孝恭未更軍旅以靖為行軍揔管兼孝恭長史委以軍事靖說孝恭悉召巴蜀酋長子弟量才授任置之左右外示引擢實以為質王世充太子􅀇應將兵數千人自虎牢運糧入洛陽秦王世民遣將軍李君羡邀擊大破之􅀇應僅以身免世民使宇文士及奏請進圍東都上謂士及曰歸語爾王今取洛陽止欲息兵克城之日乘輿法物圖籍器械非私家所須者委汝收之其餘子女玉帛並以分賜將士辛丑世民移軍青城宫壁壘未立王世充帥衆二萬自方諸門出慿故馬坊垣塹臨榖水以拒唐兵諸將皆懼世民以精騎陳於北邙魏宣武陵以望之謂左右曰賊勢窘矣悉衆而出徼幸一戰今日破之後不敢復出矣命屈突通帥步卒五千度水擊之戒通曰兵交則縱煙煙作世民引騎南下身先士卒與通合勢力戰世民欲知世充陳厚薄與精騎數十衝之直出其背衆皆披靡殺傷甚衆既而限以長堤與諸騎相失將軍丘行恭獨從世民世充數騎追及之世民馬中流矢而斃行恭回騎射追者發無不中追者不敢前乃下馬以授世民行恭於馬前步執長刀距躍大呼斬數人突陳而出得入大軍世充亦帥衆殊死戰散而復合者數四自辰至午世充兵始退世民縱兵乘之直抵城下俘斬七千人遂圍之驃騎將軍段志􅀇與世充兵力戰深入馬倒為世充兵所擒兩騎夾持其髻將渡洛水志􅀇踴身而奮二人俱墜馬志􅀇馳歸追者數百騎不敢逼初驃騎將軍王懷文為唐軍斥􅇋為世充所獲世充欲慰悦之引置左右壬寅世充出右掖門臨洛水為陳懷文忽引槊刺世充世充衷甲槊折不能入左右猝出不意皆愕眙不知所為懷文走趣唐軍至寫口追獲殺之世充歸解去衷甲袒示羣臣曰懷文以槊刺我卒不能傷豈非天所命乎先是御史大夫鄭頲不樂仕世充多稱疾不預事至是謂世充曰臣聞佛有金剛不壞身陛下真是也臣實多幸得生佛世願弃官削髪為沙門服勤精進以資陛下之神武世充曰國之大臣聲望素重一旦入道將駭物聽俟兵革休息當從公志頲固請不許退謂其妻曰吾束髪從官志慕名節不幸遭遇亂世流離至此側身猜忌之朝累足危亡之地智力淺薄無以自全人生㑹當有死早晩何殊姑從吾所好死亦無憾遂削髪被僧服世充聞之大怒曰爾以我為必敗欲茍免邪不誅之何以制衆遂斬頲於市頲言笑自若觀者壯之詔贈王懷文上柱國朔州刺史并州安撫使唐儉密奏真鄉公李仲文與妖僧志覺有謀反語又娶陶氏之女以應桃李之謡諂事可汗甚得其意可汗許立為南面可汗及在并州贓賄狼藉上命裴寂陳叔達蕭瑀雜鞠之乙巳仲文伏誅庚戌王泰弃河陽走其將趙夐等以城來降别將單雄信裴孝達與揔管王君廓相持於洛口秦王世民帥步騎五千援之至轘轅雄信等遁去君廓追敗之壬子延州揔管段徳操擊劉仚成破之斬首千餘級乙卯王世充懷州刺史陸善宗以城降秦王世民圍洛陽宫城城中守禦甚嚴大礮飛石重五十斤擲二百步八弓弩箭如車輻鏃如巨斧射五百步世民四面攻之晝夜不息旬餘不克城中欲飜城者凡十三軰皆不果發而死唐將士皆疲弊思歸揔管劉􅀪基等請班師世民曰今大舉而來當一勞永逸東方諸州已望風欵服唯洛陽孤城勢不能乆功在垂成柰何弃之而去乃下令軍中曰洛陽未破師必不還敢言班師者斬衆乃不敢復言上聞之亦密敕世民使還世民表稱洛陽必可克又遣參謀軍事封徳彞入朝面論形勢徳彞言於上曰世充得地雖多率皆羈屬號令所行唯洛陽一城而已智盡力窮克在朝夕今若旋師賊勢復振更相連結後必難圖上乃從之世民遺世充書諭以禍福世充不報戊午王世充鄭州司兵沈恱遣使詣左武􅇋大將軍李世勣請降左衛將軍王君廓夜引兵襲虎牢恱為内應遂拔之獲其荆王行本及長史戴胄恱君理之孫也竇建徳克周橋虜孟海公資治通鑑卷第一百八十八
