body:
  text: 建武司馬劉順説豫州刺史殷琰使應尋陽琰以家在建康未許右衛將軍柳光世自省内岀奔彭城過壽陽言建康必不能守琰信之且素無部曲爲土豪前右軍參軍杜叔寳等所制不得已而從之琰以叔寳爲長史内外軍事皆叔寳專之上謂蔡興宗曰諸處未平殷琰已復同逆頃日人情云何事當濟不興宗曰逆之與順臣無以辨今商旅斷絶米甚豐賤四方雲合而人情更安以此卜之清蕩可必但臣之所憂更在事後猶羊公言既平之後方當勞聖慮耳上曰誠如卿言上知琰附尋陽非本意乃更厚撫其家以招之汝南新蔡二郡太守周矜起兵於懸瓠以應建康袁覬誘矜司馬汝南常珍竒執矜斬之以珍竒代為太守上使宂從僕射垣榮祖還徐州説薛安都安都曰今京都無百里地不論攻圍取勝自可拍手笑殺且我不欲負孝武榮祖曰孝武之行足致餘殃今雖天下雷同正是速死無能為也安都不從因留榮祖使為將榮祖崇祖之從父兄也兖州刺史殷孝祖之甥司法參軍潁川葛僧韶請殷孝祖入朝上遣之時薛索兒屯據津逕僧韶閒行得至説孝祖曰景和凶狂開闢未有朝野危極假命漏刻主上夷山翦􅁀更造天地國亂朝危宜立長君而羣迷相煽構造無端貪利幼弱競懐希望使天道助逆羣凶事申則主幼時艱權柄不一兵難互起豈有自容之地舅少有立功之志若能控濟義勇還奉朝廷非唯匡主静亂乃可以垂名竹帛孝祖具問朝廷消息僧韶隨方訓譬并陳兵甲精彊主上欲委以前驅之任孝祖即日委妻子於瑕丘帥文武二千人隨僧韶還建康時四方皆附尋陽朝廷唯保丹楊一郡而永世令孔景宣復叛義興兵垂至延陵内外憂危咸欲奔散孝祖忽至衆力不少並傖楚壯士人情大安甲辰進孝祖號撫軍將軍假節督前鋒諸軍事遣向虎檻寵賚甚厚初上遣東平畢衆敬詣兖州募人至彭城薛安都以利害説之矯上命以衆敬行兖州事衆敬從之殷孝祖使司馬劉文石守瑕丘衆敬引兵擊殺之安都素與孝祖有隙使衆敬殺孝祖諸子州境皆附之唯東平太守申纂據無鹽不從纂鍾之曽孫也丙午上親揔兵岀頓中堂辛亥以山陽王休祐為豫州刺史督輔國將軍彭城劉勔寧朔將軍廣陵吕安國等諸軍西討殷琰巴陵王休若督建威將軍呉興沈懐眀尚書張永輔國將軍蕭道成等諸軍東討孔覬時將士多東方人父兄子弟皆已附覬上因送軍普加宣示曰朕方務德簡刑使父子兄弟罪不相及助順向逆者一以所從為斷卿等當深逹此懐勿以親戚為慮也衆於是大悦凡叛者親黨在建康者皆使居職如故壬子路太后殂孔覬遣其將孫曇瓘等軍於晉陵九里部陳甚盛沈懐眀至奔牛所領寡弱乃築壘自固張永至曲阿未知懐眀安否百姓驚擾永退還延陵就巴陵王休若諸將帥咸勸休若退保破岡其日大寒風雪甚猛塘埭决壊衆無固心休若宣令敢有言退者斬衆小定乃築壘息甲尋得懐眀書賊定未進軍主劉亮又至兵力轉盛人情乃安亮懐慎之從孫也殿中御史呉喜以主書事世祖稍遷至河東太守至是請得精兵三百致死於東上假喜建武將軍簡羽林勇士配之議者以喜刀筆主者未嘗為將不可遣中書舎人巢尚之曰喜昔隨沈慶之屢經軍旅性既勇决又習戰陳若能任之必有成績諸人紛紜皆是不别才耳乃遣之喜先時數奉使東呉性寛厚所至人並懐之百姓聞吳河東來皆望風降散故喜所至克捷永世人徐崇之攻孔景宣斬之喜板崇之領縣事喜至國山遇東軍進擊大破之自國山進屯吳城劉延熈遣其將楊􅀇等拒戰喜兵力甚弱􅀇等衆盛喜奮擊斬之進逼義興延熈栅斷長橋保郡自守喜築壘與之相持庾業於長塘湖口夾岸築城有衆七千人與延熈遥相應接沈懷眀張永與晉陵軍相持久不决外監朱幼舉司徒參軍督䕶任農夫驍果有膽力上以四百人配之使助東討農夫自延陵出長塘庾業築城猶未合農夫馳往攻之力戰大破之庾業弃城走義興農夫收其船仗進向義興助吳喜二月己未朔喜渡水攻郡城分兵擊諸壘登髙指麾若令四面俱進者義興人大懼諸壘皆潰延熈赴水死遂克義興魏丞相太原王乙渾專制朝權多所誅殺安逺將賈秀掌吏曹事渾屢言於秀為其妻求稱公主秀曰公主豈庻姓所宜稱秀寧取死今日不可取笑後世渾怒罵曰老奴官慳㑹侍中拓䟦丕告渾謀反庚申馮太后收渾誅之秀彛之子丕烈帝之􅀇孫也太后臨朝稱制引中書令髙乆中書侍郎漁陽高閭及賈秀共參大政沈懐眀張永蕭道成等軍於九里西與東軍相持東軍聞義興敗皆震恐上遣積射將軍濟陽江方興御史王道隆至晉陵視東軍形勢孔顗將孫曇瓘程扞宗等列五城互相連帶扞宗城猶未固王道隆與諸將謀曰扞宗城猶未立可以藉手上副聖㫖下成衆氣辛酉道隆帥所領急攻㧞之斬扞宗首永等因乗勝進擊曇瓘等壬戌曇瓘等兵敗與袁標俱弃城走遂克晉陵吳喜軍至義鄉孔璪屯吳興南亭太守王曇生詣璪計事聞臺軍已近璪大懼墮牀曰懸賞所購唯我而已今不遽走將為人擒遂與曇生奔錢唐喜入吳興任農夫引兵向吳郡顧琛弃郡奔㑹稽上以四郡既平乃留吳喜使統沈懐眀等諸將東擊㑹稽召張永等北擊彭城江方興等南擊尋陽以吏部尚書蔡興宗爲左僕射侍中禇淵爲吏部尚書丁卯吳喜至錢唐孔璪王曇生奔浙東喜遣彊弩將軍任農夫等引兵向黄山浦東軍據岸結寨農夫等擊破之喜自栁浦渡取西陵擊斬庾業㑹稽人大懼將士多奔亡孔覬不能制戊寅上虞令王晏起兵攻郡覬逃奔嵴山車騎從事中郎張綏封府庫以待吳喜己卯王晏入城殺綏執尋陽王子房於别署縱兵大掠府庫皆空獲孔璪殺之庚辰嵴山民縳孔覬送晏晏謂之曰此事孔璪所爲無預卿事可作首辭當相為申上覬曰江東處分莫不由身委罪求活便是君輩行意耳晏乃斬之顧琛王曇生袁標等詣吳喜歸罪喜皆宥之東軍主凡七十六人於陳斬十七人其餘皆原宥薛索兒攻申闡久不下使申令孫入睢陵説闡闡出降索兒并令孫殺之山陽王休祐在歷陽輔將軍劉勔進軍小峴殷琰所署南汝隂太守裴季以合肥來降鄧琬性鄙闇貪吝既執大權父子賣官鬻爵使婢僕出市道販賣酣歌博弈日夜不休大自矜遇賔客到門歷旬不得前内事悉委禇靈嗣等三人羣小横恣競為威福於是士民忿怨内外離心琬遣孫冲之帥龍驤將軍薛常寳陳紹宗焦度等兵一萬為前鋒據赭坼冲之於道與晉安王子勛書曰舟檝已辦器械亦整三軍踊躍人爭効命便欲㳂流挂帆直取白下願速遣陶亮衆軍兼行相接分據新亭南洲則一麾定矣子勛加冲之左衛軍以陶亮為右衛將軍統郢荆湘梁雍五州兵合二萬人一時俱下陶亮本無幹畧聞建安王休仁自上殷孝祖又至不敢進屯軍鵲洲殷孝祖負其誠節陵轢諸將臺軍有父子兄弟在南者孝祖悉欲推治由是人情乖離莫樂為用寧朔將軍沈攸之内撫將士外諧羣帥衆並頼之孝祖毎戰常以鼔蓋自隨軍中人相謂殷統軍可謂死將矣今與賊交鋒而以羽儀自標顯若善射者十人共射之欲不弊得乎三月庚寅衆軍水陸並進攻赭圻陶亮等引兵救之孝祖於陳為流矢所中死軍主范濳帥五百人降於亮人情震駭並謂沈攸之宜代孝祖為統時建安王休仁屯虎檻遣寧朔將軍江方興龍驤將軍襄陽劉靈遣各將三千人赴赭圻攸之以為孝祖既死亮等有乗勝之心明日若不更攻則示之以弱方興名位相亞必不為已下軍政不壹致敗之由也乃帥諸軍主詣方興曰今四方並反國家所保無復百里之地唯有殷孝祖為朝廷所委賴鋒鏑裁交輿尸而反文武䘮氣朝野危心事之濟否唯在眀旦一戰戰若不捷則大事去矣詰朝之事諸人或謂吾應統之自卜懦薄幹畧不如卿今輙相推為統但當相與勠力耳方興甚悦許諾攸之既岀諸軍主並尤之攸之曰吾本以濟國活家豈計此之升降且我能下彼彼必不能下我共濟艱難豈可自措同異也孫冲之謂陶亮曰孝祖梟將一戰便死天下事定矣不須復戰便當直取京都亮不從辛卯方興帥諸將進戰建安王休仁又遣軍主郭季之歩兵校尉杜幼文屯騎校尉垣恭祖龍驤將軍濟地頓生京兆叚佛榮等三萬人徃㑹戰自寅及午大破之追奔至姥山而還幼文驥之子也孫冲之於湖白口築二城軍主竟陵張興世攻㧞之壬辰詔以沈攸之為輔國將軍假節代殷孝祖督前鋒諸軍事陶亮聞湖白二城不守大懼急召孫冲之還鵲尾留薛常寳等守赭圻先於姥山及諸岡分立營寨亦各散還共保濃湖時軍旅大起國用不足募民上錢榖者賜荒縣荒郡或五品至三品散官有差軍中食少建安王休仁撫循將士均其豐儉弔死問傷身親隱恤故十萬之衆莫有離心鄧琬遣其豫州刺史劉胡帥衆三萬鐵騎二千東屯鵲尾并舊兵凡十餘萬胡宿將勇健多權畧屢有戰功將士畏之司徒中兵參軍冠軍蔡那子弟在襄陽胡每戰懸之城外那進戰不顧吳喜既定三呉帥所領五千人并運資實至于赭圻薛索兒將馬歩萬餘人自睢陵渡淮進逼青冀二州刺史張永營丙申詔南徐州刺史桂陽王休範統北討諸軍事進據廣陵又詔蕭道成將兵救永戊戌尋陽王子房至建康上宥之貶爵為松滋侯庚子魏以隴西王源賀為太尉上遣寧朔將軍劉懐珍帥龍驤將軍王敬則等歩騎五千助劉勔討壽陽斬廬江太守劉道蔚懐珍善眀之從子也中書舎人戴眀寳啓上遣軍主竟陵黄回募兵擊斬尋陽所署馬頭太守王廣元前奉朝請壽陽鄭黒起兵於淮上以應建康東扞殷琰西拒常珍竒乙巳以黒為司州刺史殷琰將劉順栁倫皇甫道烈龎天生等馬歩八千人東據宛唐劉勔率衆軍並進去順數里立營時琰所遣諸軍並受順節度而以皇甫道烈土豪栁倫臺之所遣順本卑微唯不使統督二軍勔始至塹壘未立順欲擊之道烈倫不同順不能獨進乃止勔營既立不可復攻因相持守壬子斷新錢專用古錢沈攸之帥諸軍圍赭圻薛常寳等糧盡告劉胡求救胡以囊盛米繫流查及船腹陽覆船順風流下以餉之沈攸之疑其有異遣人取船及流查大得囊米丙辰劉胡帥歩卒一萬夜斫山開道以布囊運米餉赭圻平旦至城下猶隔小塹未能入沈攸之帥諸軍邀之殊死戰胡衆大敗捨糧弃甲縁山走斬獲甚衆胡被瘡僅得還營常寳等惶懼夏四月辛酉開城突圍走還胡軍攸之㧞赭圻城斬其寧朔將軍沈懐寳等納降數千人陳紹宗單舸奔鵲尾建安王休仁自虎檻進屯赭圻劉胡等兵猶盛上欲綏慰人情遣吏部尚書禇淵至虎檻選用將士時以軍功除官者衆板不能供始用黄紙鄧琬以晉安王子勛之命徴袁顗下尋陽顗悉雍州之衆馳下琬以黄門侍郎劉道憲行荆州事侍中孔道存行雍州事上庸太守栁世隆乘虚襲襄陽不克世隆元景之弟子也散騎侍郎眀僧暠起兵攻沈文秀以應建康壬午以僧暠為青州刺史平原樂安二郡太守王􅀇黙據琅邪清河廣川二郡太守王􅀇邈據盤陽城高陽勃海二郡太守劉乗民據臨濟城並起兵以應建康􅀇邈􅀇謨之從弟乗民彌之之從子也沈文秀遣軍主觧彦士攻北海㧞之殺劉彌之乘民從弟伯宗合帥鄉黨復取北海因引兵向青州所治東陽城文秀拒之伯宗戰死僧暠􅀇黙􅀇邈乗民合兵攻東陽城每戰輙為文秀所破離而復合如此者十餘卒不能克杜叔寳謂臺軍住歷陽不能遽進及劉勔等至上下震恐劉順等始行唯齎一月糧既與勔乆相持糧盡叔寳發車千五百乘載米餉順自將五千精兵送之吕安國聞之言於劉勔曰劉順精甲八千而我衆不能居半相持既乆彊弱勢殊更復推遷則無以自立所賴者彼糧行竭我食有餘耳若使叔寳米至非唯難可復圖我亦不能持久今唯有間道襲其米車出彼不意若能制之將不戰走矣勔以為然以疲弱守營簡精兵千人配安國及龍驤將軍黄囘使從間道出順後於横塘抄之安國始行齎二日熟食食盡叔寳不至將士欲還安國曰卿等旦已一食今晚米車不容不至若其不至夜去不晩叔寳果至以米車為函箱陳叔寳於外為遊軍幢主楊仲懷將五百人居前安國囘等擊斬之及其士卒皆盡叔寳至囘欲乗勝擊之安國曰彼將自走不假復擊退三十里止宿夜遣騎參候叔寳果弃米車走安國復夜徃燒米車驅牛二千餘頭而還五月丁亥朔夜劉順衆潰順走淮西就常珍竒於是劉勔鼔行進向壽陽叔寳斂居民及散卒嬰城自守勔與諸軍分營城外山陽王休祐與殷琰書為陳利害上又遣御史王道隆齎詔宥琰罪勔與琰書并以琰兄瑗子邈書與之琰與叔寳等皆有降意而衆心不壹復嬰城固守弋陽西山蠻田益之起兵應建康詔以益之為輔國將軍督弋陽四山事壬辰以輔國將軍沈攸之為雍州刺史丁未以尚書左僕射王景文為中軍將軍庚戌以寧朔將軍劉乗民為冀州刺史甲寅葬昭太后於脩寧陵張永蕭道成等與薛索兒戰大破之索兒退保石梁食盡而潰走向樂平為申令孫子孝叔所斬薛安都子道智走向合肥詣裴季降傳靈越走至淮西武衛將軍沛郡王廣之生獲之送詣勔勔詰其叛逆靈越曰九州倡義豈獨在我薛公不能專任智勇委付子姪此其所以敗也人生歸於一死實無面求活勔送詣建康上欲赦之靈越辭終不改乃殺之鄧琬以劉胡與沈攸之等相持久不决乃加袁顗督征討諸軍事六月甲戌顗帥樓船千艘戰士二萬來入鵲尾顗本無將畧性又怯橈在軍中未嘗戎服語不及戰陳唯賦詩談義而已不復撫接諸將劉胡每論事酬對甚簡由此大失人情胡常切齒恚恨胡以南運米未至軍士匱乏就顗借襄陽之資顗不許曰都下兩宅未成方應經理又信徃來之言云建康米貴斗至數百以為將不攻自潰擁甲以待之田益之帥蠻衆萬餘人圍義陽鄧琬使司州刺史龎孟虯帥精兵五千救之益之不戰潰去安成太守劉襲始安内史王識之建安内史趙道生並舉郡來降襲道憐之孫也蕭道成世子賾為南康贑令鄧琬遣使收繫之門客蘭陵桓康擔賾妻裴氏及其子長懋子良逃於山中與賾族人蕭欣祖等結客得百餘人攻郡破獄岀賾南康相沈肅之帥將吏追賾賾與戰擒之賾自號寧朔將軍據郡起兵與劉襲等相應琬以中䕶軍殷孚為豫章太守督上流五郡以防襲等衡陽内史王應之起兵應建康襲擊襄州行事何慧文於長沙應之與慧文捨軍身戰斫慧文八創慧文斫應之斷足殺之始興人劉嗣祖等據郡起兵應建康廣州刺史袁曇逺遣其將李萬周等討之嗣祖誑萬周云尋陽已平萬周還襲番禺擒曇逺斬之上以萬周行廣州事初武都王楊元和治白水微弱不能自立棄國奔魏元和從弟僧嗣復自立屯葭蘆費欣壽至巴東巴東人任叔兒據白帝自號輔國將軍擊欣壽斬之叔兒遂阻守三峽蕭惠開復遣治中程法度將兵三千岀梁州楊僧嗣帥羣氐斷其道間使以聞秋七月丁酉以僧嗣為北秦州刺史武都王諸軍與袁顗相拒於濃湖久未决龍驤將軍張興世建議曰賊據上流兵彊地勝我雖持之有餘而制之不足若以竒兵數千潛岀其上因險而壁見利而動使其首尾周遑進退疑阻中流既梗糧運自艱此制賊之竒也錢溪江岸最狹去大軍不逺下臨洄洑船下必來泊岸又有橫浦可以藏船千人守險萬人不能過衝要之地莫出於此沈攸之吳喜並贊其䇿㑹龎孟虯引兵來助殷琰劉勔遣使求援甚急建安王休仁欲遣興世救之沈攸之曰孟虯蟻聚必無能為遣别將馬歩數千足以相制興世之行是安危大機必不可輟乃遣叚佛榮將兵救勔而選戰士七千輕舸二百配興世興世帥其衆沂流稍上尋復退歸如是者累日劉胡聞之笑曰我尚不敢越彼下取楊州張興世何物人欲輕據我上不為之備一夕四更值便風興世舉帆直前度湖白過鵲尾胡既覺乃遣其將胡靈秀將兵於東岸翼之而進戊戌夕興世宿景洪浦靈秀亦留興世􅇓遣其將黄道標帥七十舸徑趣錢溪立營寨己亥興世引兵進據之靈秀不能禁庚子劉胡自將水歩二十六軍來攻錢溪將士欲迎擊之興世禁之曰賊來尚逺氣盛而矢驟驟既易盡盛亦易衰不如待之令將士治城如故俄而胡來轉近船入洄洑興世命壽寂之任農夫帥壯士數百擊之衆軍相繼並進胡敗走斬首數百胡收兵而下時興世城寨未固建安王休仁慮袁顗并力更攻錢溪欲分其勢辛丑命沈攸之吳喜等以皮艦進攻濃湖斬獲千數是日劉胡帥歩卒二萬鐡馬一千欲更攻興世未至錢溪數十里袁顗以濃湖之急遽追之錢溪城由此得立胡遣人傳唱錢溪已平衆並懼沈攸之曰不然若錢溪實敗萬人中應有一人逃亡得還者必是彼戰失利唱空聲以惑衆耳勒軍中不得妄動錢溪捷報尋至攸之以錢溪所送胡軍耳鼻示濃湖袁顗駭懼攸之日暮引歸龍驤將軍劉道符攻山陽程天祚請降龎孟虯進至弋陽劉勔遣吕安國等迎擊於蓼潭大破之孟虯走向義陽王􅀇謨之子曇善起兵據義陽以應建康孟虯走死蠻中劉胡遣輔國將軍薛道標襲合肥殺汝隂太守裴季劉勔遣輔國將軍垣閎擊之閎閬之弟道標安都之子也淮西人鄭叔舉起兵擊常珍竒以應鄭黒辛亥以叔舉為北豫州刺史崔道固為土人所攻閉門自守上遣使宣慰道固請降甲寅復以道固為徐州刺史八月皇甫道烈等聞龐孟虯敗並開門岀降張興世既據錢溪濃湖軍乏食鄧琬大送資糧畏興世不敢進劉胡帥輕舸四百由鵲頭内路欲攻錢溪既而謂長史王念叔曰吾少習歩戰未閑水鬭若歩戰􅁪在數萬人中水戰在一舸之上舸舸各進不復相關正在三十人中此非萬全之計吾不為也乃託瘧疾住鵲頭不進遣龍驤將軍陳慶將三百舸向錢溪戒慶不須戰張興世吾之所悉自當走耳陳慶至錢溪軍於梅根胡遣别將王起將百舸攻興世興世擊起大破之胡帥其餘舸馳還謂顗曰興世營寨已立不可猝攻昨日小戰未足為損陳慶已與南陵大雷諸軍共遏其上大軍在此鵲頭諸將又斷其下流已墮圍中不足復慮顗怒胡不戰謂曰糧運鯁塞當如此何胡曰彼尚得泝流越我而上此運何以不得㳂流越彼而下邪乃遣安北府司馬沈仲玉將千人歩趣南陵迎糧仲玉至南陵載米三十萬斛錢布數十舫豎榜為城規欲突過行至貴口不敢進遣聞信報胡令遣重軍援接張興世遣壽寂之任農夫等將三千人至貴口擊之仲玉走還顗營悉虜其資實胡衆駭懼胡將張喜來降鎮東中兵參軍劉亮進兵逼胡營胡不能制袁顗懼曰賊入人肝脾裏何由得活胡隂謀遁去己卯誑顗云欲更帥歩騎二萬上取錢溪兼下大雷餘運令顗悉選馬配之其日胡委顗去徑趣梅根先令薛常寳辦船悉􅀤南陵諸軍燒大雷諸城而走至夜顗方知之大怒罵曰今年為少子所誤呼取常所乘善馬飛鷰謂其衆曰我當自出追之因亦走庚辰建安王休仁勒兵入顗營納降卒十萬遣沈攸之等追顗顗走至鵲頭與戍主薛伯珍并所領數千人偕去欲向尋陽夜止山間殺馬以勞將士顧謂伯珍曰我非不能死且欲一至尋陽謝罪主上然後自刎耳因慷慨叱左右索節無復應者及旦伯珍請屏人言事遂斬顗首詣錢溪馬軍主襄陽俞湛之湛之因斬伯珍并送首以為已功劉胡帥二萬人向尋陽詐晉安王子勛云袁顗已降軍皆散唯已帥所領獨返宜速處分為一戰之資當停據湓城誓死不貳乃於江外夜趣沔口鄧琬聞胡去憂惶無計呼中書舎人禇靈嗣等謀之並不知所岀張悦詐稱疾呼琬計事令左右伏甲帳後戒之若聞索酒便出琬既至悦曰卿首唱此謀今事已急計將安出琬曰正當斬晉安王封府庫以謝罪耳悦曰今日寧可賣殿下求活邪因呼酒子洵提刀出斬琬中書舎人潘欣之聞琬死勒兵而至悦使人語之曰鄧琬謀反今已梟戮欣之乃還取琬子並殺之悦因單舸齎琬首馳下詣建安王休仁降尋陽亂蔡那之子道淵在尋陽被繫作部脱鎻入城執子勛囚之沈攸之等諸軍至尋陽斬晉安王子勛傳首建康時年十一初鄧琬遣臨川内史張淹自鄱陽嶠道入三吳軍于上饒聞劉胡敗軍副鄱陽太守費曄斬淹以降淹暢之子也廢帝之世衣冠懼禍咸欲逺出至是流離外難百不一存衆乃服蔡興宗之先見九月壬辰以山陽王休祐為荆州刺史癸巳觧嚴大赦庚子司徒休仁至尋陽遣吳喜張興世向荆州沈懐明向郢州劉亮及寧朔將軍南陽張敬兒向雍州孫超之向湘州沈思仁任農夫向豫章平定餘冦劉胡逃至石城捕得斬之郢州行事張沈變形為沙門􅇓走追獲殺之荆州行事劉道憲聞濃湖平散兵遣使歸罪荆州治中宗景等勒兵入城殺道憲執臨海王子頊以降孔道存知尋陽已平遣使請降尋聞栁世隆劉亮當至衆悉逃潰道存及三子皆自殺上以何慧文才兼將吏使吳喜宣㫖赦之慧文曰既䧟逆節手害忠義何靣見天下之士遂自殺安陸王子綏臨海王子頊邵陵王子元並賜死劉順及餘黨在荆州者皆伏誅詔追贈諸死節之臣及封賞有功者各有差己酉魏初立郡學置博士助敎生員從中書令高允相州刺史李訢之請也訢崇之子也上既誅晉安王子勛等待世祖諸子猶如平日司徒休仁還自尋陽言於上曰松滋侯兄弟尚在將來非社稷計宜早為之所冬十月乙卯松滋侯子房永嘉王子仁始安王子真淮南王子孟南平王子産廬陵王子輿子趨子期東平王子嗣子悦並賜死及鎮北諮議參軍路休之司徒從事中郎路茂之兖州刺史劉祗中書舎人嚴龍皆坐誅世祖二十八子於此盡矣祗義欣之子也劉勔圍壽陽垣閎攻合肥俱未下勔患之召諸將㑹議馬隊主王廣之曰得將軍所乗馬判能平合肥幢主皇甫肅怒曰廣之敢奪節下馬可斬勔笑曰觀其意必能立功即推鞌下馬與之廣之徃攻合肥三日克之薛道標突圍奔淮西歸常珍竒勔擢廣之為軍主廣之謂肅曰節下若從卿言何以平賊卿不賞才乃至於此肅有學術及勔卒更依廣之廣之薦於齊世祖為東海太守沈靈寳自廬江引兵攻晉熈晉熈太守閻湛之棄城走徐州刺史薛安都益州刺史蕭惠開梁州刺史栁元怙兖州刺史畢衆敬豫章太守殷孚汝南太守常珍竒並遣使乞降上以南方已平欲示威淮北乙亥命鎮軍將軍張永中領軍沈攸之將甲士五萬迎薛安都蔡興宗曰安都歸順此誠非虛正須單使尺書今以重兵迎之勢必疑懼或能招引北虜為患方深若以叛臣罪重不可不誅則曏之所宥亦已多矣况安都外據大鎮密邇邊陲地險兵彊攻圍難克考之國計尤宜馴養如其外叛將為朝廷旰食之憂上不從謂征北司馬行南徐州事蕭道成曰吾今因此北討卿意以為何如對曰安都狡猾有餘今以兵逼之恐非國之利上曰諸軍猛銳何徃不克卿勿多言安都聞大兵北上懼遣使乞降於魏常珍竒亦以懸瓠降魏皆請兵自救戊寅立皇子昱為太子薛安都以其子為質於魏魏遣鎮東大將軍代人尉元鎮東將軍魏郡孔伯恭等帥騎一萬出東道救彭城鎮西大將軍西河公石都督荆豫南雍州諸軍事張窮竒出西道救懸弧以安都為都督徐雍等五州諸軍事鎮南大將軍徐州刺史河東公常珍竒為平南將軍豫州刺史河内公兖州刺史申纂詐降於魏尉元受之而隂為之僃魏師至無鹽纂閉門拒守薛安都之召魏兵也畢衆敬不與之同遣使來請降上以衆敬為兖州刺史衆敬子元賔在建康先坐它罪誅衆敬聞之怒㧞刀斫柱曰吾皓首唯一子不能全安用獨生十一月壬子魏師至瑖丘衆敬請降於魏尉元遣部將先據其城衆敬悔恨數日不食元長驅而進十二月己未軍于秅西河公石至上蔡常珍竒帥文武出迎石欲頓軍汝北未即入城中書博士鄭羲曰今珍竒雖來意未可量不如直入其城奪其管籥據有府庫制其腹心䇿之全者也石遂䇿馬入城因置酒嬉戯羲曰觀珍竒之色甚不平不可不為之僃乃嚴兵設備其夕珍竒使人燒府屋欲為變以石有僃而止羲豁之曽孫也淮西七郡民多不願屬魏連營南奔魏遣建安王陸馛宣慰新附民有䧟軍為奴婢者馛悉免之新民乃恱乙丑詔坐依附尋陽削官爵禁錮者皆從原蕩隨才銓用劉勔圍壽陽自首春至于末冬内攻外禦戰無不捷以寛厚得將士心尋陽既平上使中書為詔諭殷琰蔡興宗曰天下既定是琰思過之日陛下宜賜手詔數行以相慰引今直中書為詔彼必疑謂非真非所以速清方難也不從琰得詔謂劉勔詐為之不敢降杜叔寳閉絶尋陽敗問有傳者即殺之守備益固凡有降者上輒送壽陽城下使與城中人語由是衆情離沮琰欲請降於魏主簿譙郡夏侯詳説琰曰今日之舉本効忠節若社稷有奉便當歸身朝廷何可北靣左衽乎且今魏軍近在淮次官軍未測吾之去就若建使歸欵必厚相慰納豈止免罪而已琰乃使詳岀見劉勔詳説勔曰今城中士民知困而猶固守者畏將軍之誅皆欲自歸於魏願將軍緩而赦之則莫不相帥而至矣勔許諾使詳至城下呼城中人諭以勔意丙寅琰帥將佐面縛岀降勔悉加慰撫不戮一人入城約勒將士士民貲財秋毫無所失壽陽人大悦魏兵至師水將救壽陽聞琰已降乃掠義陽數千人而去久之琰復仕至少府而卒蕭惠開在益州多任刑誅蜀人猜怨聞費欣壽敗没程法度不得前於是晉原一郡反諸郡皆應之合兵圍成都城中東兵不滿二千惠開悉遣蜀人出獨與東兵拒守蜀人聞尋陽已平爭欲屠城衆至十餘萬人惠開毎遣兵出戰未嘗不㨗上遣其弟惠基自陸道使成都赦惠開罪惠基至涪蜀人遏留惠基不聽進惠基帥部曲擊之斬其渠帥然後得前惠開奉㫖歸降城圍得觧上遣惠開宗人寳首自水道慰勞益州寳首欲以平蜀為已功更奬説蜀人使攻惠開於是處處蜂起凡諸離散者一時還合與寶首進逼成都衆號二十萬惠開欲擊之將佐皆曰今慰勞使至而拒之何以自眀惠開曰今表啓路絶不戰則何以得通使京師乃遣宋寧太守蕭惠訓等將萬兵與戰大破之生擒寳首囚於成都遣使言狀上使執送寶首召惠開還建康旣至上問以舉兵狀惠開曰臣唯知逆順不識天命且非臣不亂非臣不平上釋之是歲僑立兖州治淮隂徐州治鍾離青冀二州共一刺史治鬱洲鬱洲在海中周數百里累石為城高八九尺虚置郡縣荒民無幾張永沈攸之進兵逼彭城軍于下礚分遣羽林監王穆之將卒五千守輜重於武原魏尉元至彭城薛安都出迎元遣李璨與安都先入城收其管籥别遣孔伯恭以精甲二千安撫内外然後入其夜張永攻南門不克而退元不禮於薛安都安都悔降復謀叛魏元知之不果發安都重賂元等委罪於女婿裴祖隆而殺之元使李珠與安都守彭城自將兵擊張永絶其糧道又破王穆之於武原穆之帥餘衆就永元進攻之資治通鑑卷第一百三十一
