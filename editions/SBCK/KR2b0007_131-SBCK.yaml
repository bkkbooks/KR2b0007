seq: 131
front:
  text: 曰今衆軍姓號不同若有耕夫漁父夜相呵叱便致駭亂取敗之道也請就一軍取號衆咸從之鄧琬稱説符瑞詐稱受路太后璽書帥將佐上尊號於晉安王子勛乙未子勛即皇帝位於尋陽改元義嘉以安陸王子綏為司徒揚州刺史尋陽王子房臨海王子頊並加開府儀同三司以鄧琬為尚書右僕射張悦為吏部尚書袁顗加尚書左僕射自餘將佐及諸州郡除官進爵號各有差丙申以征虜司馬申令孫為徐州刺史令孫坦之子也置司州於義陽以義陽内史龎孟虯為司州刺史徐州刺史薛安都冀州刺史清河崔道固皆舉兵應尋陽上徴兵於青州刺史沈文秀文秀遣其將平原劉彌之等將兵赴建安㑹薛安都遣使邀文秀文秀更令彌之等應安都濟隂太守申闡據睢陵應建康安都遣其從子直閣將軍索兒太原太守清河傅靈越等攻之闡令孫之弟也安都壻裴祖隆守下邳劉彌之至下邳更以所領應建康襲擊祖隆祖隆兵敗與征北參軍垣崇祖奔彭城崇祖䕶之之從子也彌之族人北海太守懐恭從子善眀皆舉兵以應彌之薛索兒聞之釋睢陵引兵擊彌之彌之戰敗走保北海申令孫進據淮陽請降於索兒龎孟虯亦不受命舉兵應尋陽帝召尋陽王長史行㑹稽郡事孔覬為太子詹事以平西司馬庾業代之又遣都水使者孔璪入東慰勞璪説覬以建康虗弱不如擁五郡以應袁鄧覬遂􅀤兵馳檄奉尋陽吳郡太守顧琛吳興太守王曇生義興太守劉延熈晉陵太守袁標皆據郡應之上又以庾業代延熈爲義興業至長塘湖即與延熈合益州刺史蕭惠開聞晉安王子勛舉兵集將佐謂之曰湘東太祖之昭晉安世祖之穆其於當璧並無不可但景和雖昏本是世祖之嗣不任社稷其次猶多吾荷世祖之眷當推奉九江乃遣巴郡太守費欣壽將五千人東下於是湘州行事何慧文廣州刺史袁曇逺梁州刺史柳元怙山陽太守程天祚皆附於子勛元怙元景之從兄也是嵗四方貢計皆歸尋陽朝廷所保唯丹楊淮南等數郡其間諸縣或應子勛東兵已至永世宫省危懼上集羣臣以謀成敗蔡興宗曰今普天同叛人有異志宜鎮之以靜至信待人叛者親戚布在宫省若繩之以灋則土崩立至宜眀罪不相及之義物情既定人有戰心六軍精勇噐甲犀利以待不習之兵其勢相萬耳願陛下勿憂上善之
