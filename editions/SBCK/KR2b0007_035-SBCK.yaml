front:
  text: 臨獸圈猛獸驚出貴人前當之元帝嘉美其義賜錢五萬掖庭見親有加賞賜屬其人勿衆謝示平惡偏重失人心賞賜節約是時外戚貲千萬者少耳故少府水衡見錢多也雖遭初元永光凶年饑饉加有西羌之變外奉師旅内振貧民終無傾危之憂以府臧内充實也孝成皇帝時諫臣多言燕出之害及女寵專愛耽於酒色損徳傷年其言甚切然終不怨怒也寵臣淳于長張放史育育數貶退家貲不滿千萬放斥逐就國長榜死於獄不以私愛害公義故雖多内譏朝廷安平傳業陛下陛下在國之時好詩書上儉節徵來所過道上稱誦徳美此天下所以囘心也初即位易帷帳去錦繡乗輿席縁綈繒而已共皇寑廟比當作憂閔元元惟用度不足以義割恩輒且止息今始作治而駙馬都尉董賢亦起官寺上林中又為賢治大第開門鄉北闕引王渠灌園池使者䕶作賞賜吏卒甚於治宗廟賢母病長安厨給祠具道中過者皆飲食為賢治器器成奏御乃行或物好特賜其工自貢獻宗廟三宮猶不至此賢家有賓㛰及見親諸官並共賜及倉頭奴婢人十萬錢使者䕶視發取市物百賈震動道路讙譁羣臣惶惑詔書罷苑而以賜賢二千餘頃均田之制從此墯壊奢僣放縱變亂隂陽災異衆多百姓訛言持籌相驚天惑其意不能自止陛下素仁智愼事今而有此大譏孔子曰危而不持顛而不扶則將安用彼相矣臣嘉幸得備位竊内悲傷不能通愚忠之信身死有益於國不敢自惜唯陛下愼己之所獨鄉察衆人之所共疑往者寵臣鄧通韓嫣驕貴失度逸豫無厭小人不勝情欲卒陷罪辜亂國亡軀不終其禄所謂愛之適足以害之者也宜深覽前世以節賢寵全安其命上由是於嘉浸不説前涼州刺史杜鄴以方正對策曰臣聞陽尊隂卑天之道也是以男雖賤各為其家陽女雖貴猶為其國隂故禮明三從之義雖有文母之徳必繫於子昔鄭伯隨姜氏之欲終有叔叚簒國之禍周襄王内迫惠冶之難而遭居鄭之危漢興呂太后權私親屬幾危社稷竊見陛下約儉正身欲與天下更始然嘉瑞未應而日食地震案春秋災異以指象爲言語日食明陽爲隂所臨坤以灋地爲土爲母以安静爲徳震不隂之效也占象甚明臣敢不直言其事昔曾子問從令之義孔子曰是何言與善閔子騫守禮不茍從親所行無非理者故無可間也今諸外家昆弟無賢不肖並侍帷幄布在列位或典兵衛或將軍屯寵意并於一家積貴之埶世所希見所希聞也至乃並置大司馬將軍之官皇甫雖盛三􅁊雖隆魯爲作三軍無以甚此當拜之日晻然日食不在前後臨事而發者明陛下謙遜無專承指非一所言輒聽所欲輒隨有罪惡者不坐辜罰無功能者畢受官爵流漸積畏過在於是欲令昭昭以覺聖朝昔詩人所刺春秋所譏指象如此殆不在它由後視前忿邑非之逮身所行不自鏡見則以為可計之過者願陛下加致精誠思承始初事稽諸古以厭下心則黎庶羣生無不説喜上帝百神收還威怒禎祥福禄何嫌不報上又徵孔光詣公車問以日食事拜為光禄大夫秩中二千石給事中位次丞相初王莽既就國杜門自守其中子獲殺奴莽切責獲令自殺在國三歲吏民上書寃訟莽者百數至是賢良周䕶宋崇等對䇿復深訟莽功徳上於是徵莽及平阿侯仁還京師侍太后
