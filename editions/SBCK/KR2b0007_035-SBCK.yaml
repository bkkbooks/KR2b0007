body:
  text: 董賢因日食之變以沮傅晏息夫躬之䇿辛亥上收晏印綬罷就第􅊨丁巳皇太太后傅氏崩合􅁙渭陵稱孝元傅皇后丞相御史奏息夫躬孫寵等辠過上乃免躬寵官遣就國又罷侍中諸曹黄門郎數十人鮑宣上書曰陛下父事天母事地子養黎民即位已來父虧眀母震動子訛言相驚恐今日食於三始誠可畏懼小民正朔日尚恐毁敗器物何況於日虧乎陛下􅀷内自責避正殿舉直言求過失罷退外親及旁仄素餐之人徵拜孔光為光禄大夫發覺孫寵息夫躬過惡免官遣就國衆庶歙然莫不説喜天人同心人心説則天意解矣乃二月丙戌白虹干日連隂不雨此天下憂結未解民有怨望未塞者也侍中駙馬都尉董賢本無葭莩之親但以令色諛言自進賞賜無度竭盡府臧并合三第尚以為小復壊㬥室賢父子坐使天子使者將作治第行夜吏卒皆得賞賜上冡有㑹輒太官為供海内貢獻當養一君今反盡之賢家豈天意與民意邪天不可乆負厚之如此反所以害之也誠欲哀賢宜為謝過天地解讎海内免遣就國收乗輿器物還之縣官如此可以父子終其性命不者海内之所仇未有得乆安者也孫寵息夫躬不宜居國可皆免以視天下復徵何武師丹彭宣傅喜曠然使民易視以應天心建立大政興太平之端上感大異納宣言徵何武彭宣拜鮑宣為司􅀠上託傅太后遺詔令太皇太后下丞相御史益封董賢二千戸賜孔鄉侯汝昌侯陽新侯國王嘉封還詔書因奏封事諫曰臣聞爵禄土地天之有也書云天命有徳五服五章哉王者代天爵人尤宜愼之裂地而封不得其宜則衆庶不服感動隂陽其害疾自深今聖體乆不平此臣嘉所内懼也高安侯賢佞幸之臣陛下傾爵位以貴之單貨財以富之損至尊以寵之主威已黜府臧已竭唯恐不足財皆民力所爲孝文皇帝欲起露臺重百金之費克己不作今賢散公賦以施私惠一家至受千金往古以來貴臣未嘗有此流聞四方皆同怨之里諺曰千人所指無病而死臣常爲之寒心今太皇太后以永信太后遺詔詔丞相御史益賢戸賜三侯國臣嘉竊惑山崩地動日食於三朝皆隂侵陽之戒也前賢已再封晏商再易邑業縁私横求恩已過厚求索自恣不知厭足甚傷尊尊之義不可以示天下為害痛矣臣驕侵罔隂陽失節氣感相動害及身體陛下寑疾乆不平繼嗣未立宜思正萬事順天人之心以求福祐柰何輕身肆意不念高祖之勤苦垂立制度欲傳之於無窮哉臣謹封上詔書不敢露見非愛死而不自灋恐天下聞之故不敢自劾初廷尉梁相治東平王雲獄時冬月未盡二旬而相心疑雲寃獄有飾辭奏欲傳之長安更下公卿覆治尚書令鞫譚僕射宗伯鳯以為可許天子以為相等皆見上體不平外内顧望操持兩心幸雲踰冬無討賊疾惡主讎之意免相等皆為庶人後數月大赦嘉薦相等皆有材行聖王有計功除過臣竊為朝廷惜此三人書奏上不能平後二十餘日嘉封還益董賢户事上乃發怒召嘉詣尚書責問以相等前坐不忠罪惡著聞君時輒已自劾今又稱譽云為朝廷惜之何也嘉免冠謝罪事下將軍中朝者光禄大夫孔光等劾嘉迷國罔上不道請謁者召嘉詣廷尉詔獄議郎龔等以為嘉言事前後相違宜奪爵土免為庶人永信少府猛等以為嘉罪名雖應灋大臣括髮闗械裸躬就笞非所以重國褒宗廟也上不聽三月詔假謁者節召丞相詣廷尉詔獄使者既到府掾史涕泣共和藥進嘉嘉不肯服主簿曰將相不對理陳寃相踵以為故事君矦宜引決使者危坐府門上主簿復前進藥嘉引藥柸以擊地謂官屬曰丞相幸得僃位三公奉職負國當伏刑都市以示萬衆丞相豈兒女子邪何謂咀藥而死嘉遂裝出見使者再拜受詔乗吏小車去蓋不冠隨使者詣廷尉廷尉收嘉丞相新甫矦印綬縛嘉載致都船詔獄上聞嘉生自詣吏大怒使將軍以下與五二千石雜治吏詰問嘉嘉對曰案事者思得實竊見相等前治東平王獄不以雲爲不當死欲􅀜公卿示重愼誠不見其外内顧望阿附爲雲驗復幸得䝉大赦相等皆良善吏臣竊爲國惜賢不私此三人獄吏曰苟如此則君何以爲罪猶當有以負國不空入獄矣吏稍侵辱嘉嘉喟然仰天歎曰幸得充備宰相不能進賢退不肖以是負國死有餘責吏問賢不肖主名嘉曰賢故丞相孔光故大司空何武不能進惡高安侯董賢父子佞邪亂朝而不能退罪當死死無所恨嘉繫獄二十餘日不食歐血而死已而上覽其對思嘉言會御史大夫賈延免夏五月乙卯以孔光為御史大夫秋七月丙午以光為丞相復故國博山侯又以汜鄉侯何武為御史大夫上乃知孔光前免非其罪以過近臣毁短光者曰傅嘉前為侍中毁譛仁賢誣愬大臣令俊艾者乆失其位其免嘉為庶人歸故郡八月何武徙為前將軍辛卯光禄大夫彭宣為御史大夫司􅀠鮑宣坐摧辱宰相拒閉使者無人臣禮減死髠鉗大司馬丁明素重王嘉以其死而憐之九月乙卯册免明使就第冬十一月壬午以故定陶太傅光禄大夫韋賞為大司馬車騎將軍己丑賞卒十二月庚子以侍中駙馬都尉董賢為大司馬衛將軍册曰建爾于公以為漢輔往悉爾心匡正庶事允執其中是時賢年二十二雖為三公常給事中領尚書百官因賢奏事以父衛尉恭不宜在卿位徙為光禄大夫秩中二千石弟寛信代賢為駙馬都尉董氏親屬皆侍中諸曹奉朝請寵在丁傅之右矣初丞相孔光為御史大夫賢父恭為御史事光及賢為大司馬與光並為三公上故令賢私過光光雅恭謹知上欲尊寵賢及聞賢當來也光警戒衣冠出門待望見賢車乃却入賢至中門光入閤既下車乃出拜謁送迎甚謹不敢以賓客鈞敵之禮上聞之喜立拜光兩兄子為諫大夫常侍賢由是權與人主侔矣是時成帝外家王氏衰廢唯平阿侯譚子去疾為侍中弟閎為中常侍閎妻父中郎將蕭咸前將軍望之子也賢父恭慕之欲為子寛信求咸女為婦使閎言之咸惶恐不致當私謂閎曰董公為大司馬册文言允執其中此乃堯禪舜之文非三公故事長者見者莫不心懼此豈家人子所能堪邪閎性有知略聞咸言心亦悟乃還報恭深達咸自謙薄之意恭歎曰我家何用負天下而為人所畏如是意不説後上置酒麒麟殿賢父子親屬宴飲侍中中常侍皆在側上有酒所從容視賢笑曰吾欲灋堯禪舜何如王閎進曰天下乃高皇帝天下非陛下之有也陛下承宗廟當傳子孫於亡窮統業至重天子亡戲言上黙然不説左右皆恐於是遣閎出歸郎署乆之太皇太后為閎謝復召閎還閎遂上書諫曰臣聞王者立三公灋三光居之者當得賢人易曰鼎折足覆公餗喻三公非其人也昔孝文皇帝幸鄧通不過中大夫武皇帝幸韓嫣賞賜而已皆不在大位今大司馬衛將軍董賢無功於漢朝又無肺腑之連復無名迹高行以矯世昇擢數年列備鼎足典衛禁兵無功封爵父子兄弟横蒙拔擢賞賜空竭帑藏萬民諠譁偶言道路誠不當天心也昔褒神蚖變化為人實生褒姒亂周國恐陛下有過失之譏賢有小人不知進退之禍非所以垂灋後世也上雖不從閎言多其年少志彊亦不罪也二年春正月匈奴單于及烏孫大昆彌伊秩靡皆來朝漢以為榮是時西域凡五十國自譯長至將相侯王皆佩漢印綬凡三百七十六人而康居大月氏安息罽賓烏弋之屬皆以絶逺不在數中其來貢獻則相與報不督録緫領也自黄龍以來單于每入朝其賞賜錦繡繒絮輒加厚於前以慰接之單于宴見羣臣在前單于恠董賢年少以問譯上令譯報曰大司馬年少以大賢居位單于乃起拜賀漢得賢臣是時上以大歲厭勝所在舍單于上林苑蒲陶宮告之以加敬於單于單于知之不悦夏四月壬辰晦日有食之五月甲子正三公官分職大司馬衛將軍董賢爲大司馬丞相孔光爲大司徒御史大夫彭宣爲大司空封長平矦六月戊午帝崩于未央宮帝睹孝成之世禄去王室及即位屢誅大臣欲彊主威以則武宣然而寵信讒諂憎疾忠直漢業由是遂衰太皇太后聞帝崩即日駕之未央宮收取璽綬太后召大司馬賢引見東箱問以喪事調度賢内憂不能對免冠謝太后曰新都矦莽前以大司馬奉送先帝大行曉習故事吾令莽佐君賢頓首幸甚太后遣使者馳召莽詔尚書諸發兵符節百官奏事中黄門期門兵皆屬莽莽以太后指使尚書劾賢帝病不親醫藥禁止賢不得入宮殿司馬中賢不知所為詣闕免冠徒跣謝己未莽使謁者以太后詔即闕下册賢曰賢年少未更事理為大司馬不合衆心其收大司馬印綬罷歸第即日賢與妻皆自殺家惶恐夜􅁙莽疑其詐死有司奏請發賢棺至獄診視因埋獄中太皇太后詔公卿舉可大司馬者莽故大司馬辭位避丁傅衆庶稱以為賢又太皇太后近親自大司徒孔光以下舉朝皆舉莽獨前將軍何武左將軍公孫禄二人相與謀以為往時惠昭之世外戚呂霍上官持權幾危社稷今孝成孝哀比世無嗣方當選立近親幼主不宜令外戚大臣持權親䟽相錯為國計便於是武舉公孫禄可大司馬而禄亦舉武庚申太皇太后自用莽為大司馬領尚書事太皇太后與莽議立嗣安陽侯王舜莽之從弟其人修飭太皇太后所信愛也莽白以舜為車騎將軍秋七月遣舜與大鴻臚左咸使持節迎中山王箕子以為嗣莽又白太皇太后詔有司以皇太后前與女弟昭儀專寵錮寑殘滅繼嗣貶為孝成皇后徙居北宮又以定陶共王太后與孔鄉侯晏同心合謀背恩忘本專恣不軌徙孝哀皇后退就桂宮傅氏丁氏皆免官爵歸故郡傅晏將妻子徙合浦獨下詔褒揚傳喜曰高武侯喜姿性端慤論議忠直雖與故定陶太后有屬終不順指從邪介然守節以故斥逐就國傳不云乎歲寒然後知松柏之後凋也其還喜長安位特進奉朝請喜雖外見褒賞孤立憂懼後復遣就國以夀終莽又貶傅太后號為定陶共王母丁太后號曰丁姬莽又奏董賢父子驕恣奢􅆫請收没入財物縣官諸以賢為官者皆免父恭弟寛信與家屬徙合浦母别歸故郡鉅鹿長安中小民驩譁鄉其第哭幾獲盜之縣官斥賣董氏財凡四十三萬萬賢所厚吏沛朱詡自劾去大司馬府買棺衣收賢屍􅁙之莽聞之以它辠擊殺詡莽以大司徒孔光名儒相三主太后所敬天下信之於是盛尊事光引光女壻甄邯為侍中奉車都尉諸素所不説者莽皆傅致其罪為請奏草令邯持與光以太后指風光光素畏愼不敢不上之莽白太后輒可其奏於是劾奏何武公孫禄互相稱舉皆免官武就國又奏董宏子高昌侯武父為佞邪奪爵又奏南郡太守毋將隆前為冀州牧治中山馮太后獄寃陷無辜闗内侯張由誣告骨肉中太僕史立泰山太守丁􅀇陷人入大辟河内太守趙昌譛害鄭崇幸逢赦令皆不宜處位在中土免為庶人徙合浦中山之獄本立􅀇自典考之但與隆連名奏事莽少時慕與隆交隆不甚附故因事擠之紅陽矦立太后親弟雖不居位莽以諸父内敬憚之畏立從容言太后令已不得肆意復令光奏立罪惡前知定陵侯淳于長犯大逆罪多受其賂為言誤朝後白以官婢楊寄私子為皇子衆言曰呂氏少帝復出紛紛為天下所疑難以示來世成襁褓之功請遣立就國太后不聽莽曰今漢家衰比世無嗣太后獨代幼主統政誠可畏懼力用公正先天下尚恐不從今以私恩逆大臣議如此羣下傾邪亂從此起宜可且遣就國安後復徵召之太后不得已遣立就國莽之所以脅持上下皆此類也於是附順莽者拔擢忤恨者誅滅以王舜王邑為腹心甄豐甄邯主擊㫁平晏領機事劉秀典文章孫建為爪牙豐子尋秀子棻涿郡崔發南陽陳崇皆以材能幸於莽莽色厲而言方欲有所為微見風采黨與承其指意而顯奏之莽稽首涕泣固推讓上以惑太后下用示信於衆庶焉八月莽復白太皇太后廢孝成皇后孝哀皇后為庶人就其園是日皆自殺大司空彭宣以王莽專權乃上書言三公鼎足承君一足不任則覆亂美實臣資性淺薄年齒老眊數伏疾病昬亂遺忘願上大司空長平侯印綬乞骸骨歸鄉里竢寘溝壑莽白太后䇿免宣使就國莽恨宣求退故不賜黄金安車駟馬宣居國數年薨班固贊曰薛廣徳保縣車之榮平當逡巡有恥彭宣見險而止異乎茍患失之者矣戊午右將軍王崇為大司空光禄勲東海馬宮為右將軍左曹中郎將甄豐為光禄勲九月辛酉中山王即皇帝位大赦天下平帝年九歲太皇太后臨朝大司馬莽秉政百官總已以聽於莽莽權日盛孔光憂懼不知所出上書乞骸骨莽白太后帝幼少宜置師傅徙光為帝太傅位四輔給事中領宿衛供養行内署門戸省服御食物以馬宮為大司徒甄豐為右將軍冬十月壬寅葬孝哀皇帝於義陵孝平皇帝上元始元年春正月王莽風益州令塞外蠻夷自稱越裳氏重譯獻白雉一黑雉二莽白太后下詔以白雉薦宗廟於是羣臣盛陳莽功徳致周成白雉之瑞周公及身在而託號於周莽宜賜號曰安漢公益戸疇爵邑太后詔尚書具其事莽上書言臣與孔光王舜甄豐甄邯共定䇿今願獨條光等功賞寑置臣莽勿隨輩列甄邯白太后下詔曰無偏無黨王道蕩蕩君有安宗廟之功不可以骨肉故蔽隠不揚君其勿辭莽復上書固讓數四稱疾不起左右白太后宜勿奪莽意但條孔光等莽乃肯起二月丙辰太后下詔以太傅博山侯光為太師車騎將軍安陽侯舜為太保皆益封萬戸左將軍光禄勲豐為少傅封廣陽侯皆授四輔之職侍中奉車都尉邯封承陽侯四人既受賞莽尚未起羣臣復上言莽雖克讓朝所宜章以時加賞明重元功無使百僚元元失望太后乃下詔以大司馬新都侯莽為太傅幹四輔之事號曰安漢公益封二萬八千戸於是莽為惶恐不得已而起受太傅安漢公號讓還益封事云願須百姓家給然後加賞羣臣復爭太后詔曰公自期百姓家給是以聽之其令公俸賜皆倍故百姓家給人足大司徒大司空以聞莽復讓不受而建言褒賞宗室羣臣立故東平王雲太子開明為王又以故東平思王孫成都為中山王奉孝王後封宣帝耳孫信等三十六人皆為列侯太僕王惲等二十五人皆賜爵闗内侯又令諸侯王公列侯闗内侯無子而有孫若同産子者皆得以為嗣宗室屬未盡而以罪絶者復其屬天下令比二千石以上年老致仕者參分故禄以一與之終其身下及庶民鰥寡恩澤之政無所不施莽既媚説吏民又欲專㫁知太后老猒政乃風公卿奏言往者吏以功次遷至二千石及州部所舉茂材異等吏率多不稱宜皆見安漢公又太后春秋高不宜親省小事令太后下詔曰自今以來唯封爵乃以聞他事安漢公四輔平決州牧二千石及茂材吏初除奏事者輒引入至近署對安漢公考故官問新職以知其稱否於是莽人人延問密致恩意厚加贈送其不合指顯奏免之權與人主侔矣置羲和官秩二千石夏五月丁巳朔日有食之大赦天下公卿以下舉敦厚能直言者各一人王莽恐帝外家衛氏奪其權白太后前哀帝立背恩義自貴外家丁傅橈亂國家幾危社稷今帝以幼年復奉大宗為成帝後宜明一統之義以戒前事為後代灋六月遣甄豐奉璽綬即拜帝毋衛姬為中山孝王后賜帝舅衛寶寶弟􅀇爵閞内侯賜帝女弟三人號曰君皆留中山不得至京師扶風功曹申屠剛以直言對䇿曰臣聞成王幼少周公攝政聽言下賢均權布寵動順天地舉措不失然近則召公不説逺則四國流言今聖主始免襁褓即位以來至親分離外戚杜隔恩不得通且漢家之制雖任英賢猶援姻戚親䟽相錯杜塞間隙誠所以安宗廟重社稷也宜亟遣使者徵中山太后置之别宮令時朝見又召馮衛二族裁與冗職使得執㦸親奉宿衛以抑患禍之端上安社稷下全保傅莽令太后下詔曰剛所言僻經妄説違背大義罷歸田里丙午封魯頃公之八世孫公子寛為褒魯侯奉周公祀封褒成君孔霸曾孫均為褒成侯奉孔子祀詔天下女徒已論歸家出雇山錢月三百復貞婦鄉一人大司農部丞十三人人部一州勸農桑秋九月赦天下徒二年春黄支國獻犀牛黄支在南海中去京師三萬里王莽欲燿威徳故厚遺其王令遣使貢獻越嶲郡上黄龍游江中太師光大司徒宮等咸稱莽功徳比周公宜告祠宗廟大司農孫寶曰周公上聖召公大賢尚猶有不相説著於經典兩不相損今風雨未時百姓不足每有一事羣臣同聲得無非其美者時大臣皆失色甄邯即時承制罷議者㑹寶遣吏迎母母道病留弟家獨遣妻子司直陳崇劾奏寶事下三公即訊寶對曰年七十誖眊恩衰共養營妻子如章寶坐免終於家帝更名衎三月癸酉大司空王崇謝病免以避王莽夏四月丁酉左將軍甄豐為大司空右將軍孫建為左將軍光禄勲甄邯為右將軍立代孝王􅀇孫之子如意為廣宗王江都易王孫盱台侯宮為廣川王廣川惠王曾孫倫為廣徳王紹封漢興以來大功臣之後周共等皆為列侯及闗内侯凡百一十七人郡國大旱蝗青州尤甚民流亡王莽白太后宜衣繒練頗損膳以示天下莽因上書願出錢百萬獻田三十頃付大司農助給貧民於是公卿皆慕效焉凡獻田宅者二百三十人以口賦貧民又起五里於長安城中宅二百區以居貧民莽帥羣臣奏太后言幸賴陛下徳澤間者風雨時甘露降神芝生蓂莢朱草嘉禾休徵同時並至願陛下遵帝王之常服復太官之灋膳使臣子各得盡驩心備共養莽又令太后下詔不許每有水旱莽輒素食左右以白太后太后遣使者詔莽曰聞公菜食憂民深矣今秋幸孰公以時食肉愛身為國六月隕石于鉅鹿二光禄大夫楚國龔勝太中大夫琅邪邴漢以王莽專政皆乞骸骨莽令太后策詔之曰朕愍以官職之事煩大夫大夫其脩身守道以終高年皆加優禮而遣之梅福知王莽必簒漢祚一朝棄妻子去不知所之其後人有見福於㑹稽者變姓名為呉市門卒云秋九月戊申晦日有食之赦天下徒遣執金吾􅇋陳茂諭説江湖賊成重等二百餘人皆自出送家在所收事重徙雲陽賜公田宅王莽欲悦太后以威徳至盛異於前乃風單于令遣王昭君女須卜居次云入侍太后所以賞賜之甚厚車師後王國有新道通玉門闗往來差近戊巳校尉徐普欲開之車師後王姑句以當道供給使者心不便也普欲分明其界然後奏之召姑句使證之不肯繫之其妻股紫陬謂姑句曰前車師前王為都䕶司馬所殺今乆繫必死不如降匈奴即馳突出高昌壁入匈奴又去胡來王唐兠與赤水羌數相冦不勝告急都䕶都䕶但欽不以時救助唐兠困急怨欽東守玉門闗玉門闗不内即將妻子人民千餘人亡降匈奴單于受置左谷蠡地遣使上書言狀曰臣謹已受詔遣中郎將韓隆等使匈奴責讓單于單于叩頭謝罪執二虜還付使者詔使中郎將王萌待於西域惡都奴界上單于遣使送因請其罪使者以聞莽不聽詔㑹西域諸國王陳軍斬姑句唐兠以示之乃造設四條中國人亡入匈奴者烏孫亡降匈奴者西域諸國佩中國印綬降匈奴者烏􅁊降匈奴者皆不得受遣中郎將王駿王昌副校尉甄阜王尋使匈奴班四條與單于雜函封付單于令奉行因收故宣帝所為約束封函還時莽奏令中國不得有二名因使使者以風單于宜上書慕化為一名漢必加厚賞單于從之上書言幸得備藩臣竊樂太平聖制臣故名囊知牙斯今謹更名曰知莽大説白太后遣使者答諭厚賞賜焉莽欲以女配帝為皇后以固其權奏言皇帝即位三年長秋宮未建掖廷媵未充乃者國家之難本從無嗣配取不正請考論五經定取后禮正十二女之義以廣繼嗣博采二王後及周公孔子世列侯在長安者適子女事下有司上衆女名王氏女多在選中者莽恐其與己女爭即上言身無徳子材下不宜與衆女並采太后以為至誠乃下詔曰王氏女朕之外家其勿采庶民諸生郎吏以上守闕上書者日千餘人公卿大夫或詣廷中或伏省戸下咸言安漢公盛勲堂堂若此今當立后獨奈何廢公女天下安所歸命願得公女為天下母莽遣長史以下分部曉止公卿及諸生而上書者愈甚太后不得已聽公卿采莽女莽復自白宜博選衆女公卿爭曰不宜采諸女以貳正統莽乃白願見女資治通鑑卷第三十五
