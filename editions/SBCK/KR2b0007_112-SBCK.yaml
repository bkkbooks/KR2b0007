body:
  text: 乞伏乾歸至苑川以邊芮為長史王松壽為司馬公卿将帥皆降為僚佐偏禆北凉王業憚沮渠蒙遜勇略欲逺之蒙遜亦深自晦匿業以門下侍郎馬權代蒙遜為張掖太守權素豪雋為業所親重常輕侮蒙遜蒙遜譛之於業曰天下不足慮惟當憂馬權耳業遂殺權蒙遜謂沮渠男成曰叚公無鑒㫁之才非撥亂之主曏所憚者惟索嗣馬權今皆巳死蒙遜欲除之以奉兄何如男成曰業本孤客為吾家所立恃吾兄弟猶魚之有水夫人親信我而圗之不祥蒙遜乃求為西安太守業喜其出外許之蒙遜與男成約同祭蘭門山而陰使司馬許咸告業曰男成欲以取假日為亂若求祭蘭門山臣言驗矣至期果然業收男成賜死男成曰䝉遜先與臣謀反臣以兄弟之故隱而不言今以臣在恐部衆不從故約臣祭山而返誣臣其意欲王之殺臣也乞詐言臣死暴臣罪惡蒙遜必反臣然後奉王命而討之無不克矣業不聽殺之蒙遜泣告衆曰男成忠於叚王而叚王無故枉殺之諸君能為報仇乎且始者共立叚王欲以安衆耳今州土紛亂非叚王所能濟也男成素得衆心衆皆憤泣爭奮比至氐池衆逾一萬鎮軍將軍臧莫孩帥所部降之羌胡多起兵應蒙遜者蒙遜進壁侯塢業先疑右將軍田昂囚之至是召昂謝而赦之使與武衛將軍梁中庸共討蒙遜别將王豐孫言於業曰西平諸田世有反者昂貌恭而心險不可信也業曰吾疑之久矣但非昂無可以討􅀩遜者昂至矦塢帥􅀐五百降於􅀩遜業軍遂潰中庸亦詣蒙遜降五月蒙遜至張掖田昂兄子承愛斬闗内之業左右皆散蒙遜至業謂蒙遜曰孤孑然一已為君家所推願匄餘命使得東還與妻子相見䝉遜斬之業儒素長者無他權略威禁不行羣下擅命尤信卜筮巫覡故至於敗沮渠男成之弟富占将軍俱傫帥户五百降于河西王利鹿孤傫石子之子也孫恩陷滬瀆殺呉國内史袁崧死者四千人凉王隆多殺豪望以立威名内外嚻然人不自保魏安人焦朗遣使説秦隴西公碩徳曰吕氏自武皇棄世兄弟相攻政綱不立競為威虐百姓饑饉死者過半今乗其簒奪之際取之易於返掌不可失也碩徳言於秦王興帥步騎六萬伐凉乞伏乾歸帥騎七千從之六月甲戌孫恩浮海奄至丹徒戰士十餘萬樓舡千餘艘建康震駭乙亥内外戒嚴百官入居省内冠軍將軍髙素等守石頭輔國將軍劉襲柵斷淮口丹陽尹司馬恢之戍南岸冠軍將軍桓謙等備白石左衛將軍王嘏等屯中堂徴豫州刺史譙王尚之入衛京師劉牢之自山陰引兵邀擊恩未至而恩已過乃使劉裕自海鹽入援裕兵不滿千人倍道兼行與恩俱至丹徒裕衆既少加以涉逺疲勞而丹徒守軍莫有鬭志恩帥衆鼓譟登蒜山居民皆荷擔而立裕帥所領奔擊大破之投崖赴水死者甚衆恩狼狽僅得還船然恩猶恃其衆尋復整兵徑向京師後將軍元顯帥兵拒戰頻不利㑹稽王道子無佗謀略唯日禱蔣侯廟恩來漸近百姓忷懼譙王尚之帥精鋭馳至徑屯積弩堂恩樓船髙大泝風不得疾行數日乃至白石恩本以諸軍分散欲掩不備既而知尚之在建康復聞劉牢之已還至新洲不敢進而去浮海北走郁洲恩别將攻陷廣陵殺三千人寧朔將軍髙雅之擊恩於郁洲為恩所執桓􅀇厲兵訓卒常伺朝廷之隙聞孫恩逼京師建牙聚衆上䟽請討之元顯大懼㑹恩退元顯以詔書止之􅀇乃戒嚴梁中庸等共推沮渠䝉遜為大都督大將軍凉州牧張掖公赦其境内改元永安蒙遜署從兄伏奴為張掖太守和平侯弟挐為建忠將軍都谷侯田昂為西郡太守臧莫孩為輔國將軍房晷梁中庸為左右長史張騭謝正禮為左右司馬擢任賢才文武咸悦河西王利鹿孤命羣臣極言得失西曹從事史暠曰陛下命將出征往無不捷然不以綏寧為先唯以徙民為務民安土重遷故多離叛此所以斬將拔城而地不加廣也利鹿孤善之秋七月魏兖州刺史長孫肥将步騎二萬南徇許昌東至彭城将軍劉該降之秦隴西公碩德自金城濟河直趣廣武河西王利鹿孤攝廣武守軍以避之秦軍至姑臧凉王隆遣輔國大将軍超龍驤将軍邈等逆戰碩徳大破之生禽邈俘斬萬計隆嬰城固守巴西公佗帥東苑之衆二萬五千降於秦西凉公暠河西王利鹿孤沮渠蒙遜各遣使奉表入貢於秦初凉将姜紀降於河西王利鹿孤廣武公傉檀與論兵略甚愛重之坐則連席出則同車每談論以夜繼晝利鹿孤謂傉檀曰姜紀信有美才然視候非常必不久留於此不如殺之紀若入秦必為人患傉檀曰臣以布衣之交待紀紀必不相負也八月紀将數十騎奔秦軍説碩徳曰吕隆孤城無援明公以大軍臨之其勢必請降然彼徒文降而已未肯遂服也請給紀步騎三千與王松怱因焦朗華純之衆伺其釁隙隆不足取也不然今秃髪在南兵彊國富若兼姑臧而據之威埶益盛沮渠蒙遜李暠不能抗也必将歸之如此則為國家之大敵矣碩徳乃表紀為武威太守配兵二千屯據晏然秦王興聞楊桓之賢而徵之利鹿孤不敢留詔以劉裕為下邳太守討孫恩於郁洲累戰大破之恩由是衰弱復縁海南走裕亦隨而邀擊之燕王盛懲其父寶以懦弱失國務峻威刑又自矜聦察多所猜忌羣臣有纎介之嫌皆先事誅之由是宗親勲舊人不自保丁亥左将軍慕容國與殿上将軍秦輿段讃謀帥禁兵襲盛事發死者五百餘人壬辰夜前将軍段璣與秦輿之子興段讃之子泰潜於禁中鼓譟大呼盛聞變帥左右出戰賊衆逃潰璣被創匿廂屋間俄有一賊從闇中擊盛盛被傷輦升前殿申約禁衞事定而卒中壘将軍慕容拔冗從僕射郭仲白太后丁氏以為國家多難冝立長君時衆望在盛弟司徒尚書令平原公元而河間公熙素得幸於丁氏丁氏乃廢太子定密迎熙入宫明旦羣臣入朝始知有變因上表勸進於熈熈以讓元元不敢當癸巳熈即天王位捕獲叚璣等皆夷三族甲午大赦丙申平原公元以嫌賜死閏月辛酉葬盛於興平陵謚曰昭武皇帝廟號中宗丁氏送葬未還中領軍慕容提步軍校尉張佛等謀立故太子定事覺伏誅定亦賜死丙寅大赦改元光始秦隴西公碩徳圍姑臧累月東方之人在城中者多謀外叛魏益多復誘扇之欲殺涼王隆及安定公超事發坐死者三百餘家碩徳撫納夷夏分置守宰節食聚粟為持久之計凉之羣臣請與秦連和隆不許安定公超曰今資儲内竭上下嗷嗷雖使張陳復生亦無以為策陛下當思權變屈伸何愛尺書單使為卑辭以退敵敵去之後修德政以息民若卜世未窮何憂舊業之不復若天命去矣亦可以保全宗族不然坐守困窮終将何如隆乃從之九月遣使請降於秦碩徳表隆為鎮西大将軍凉州刺史建康公隆遣子弟及文武舊臣慕容筑楊頴等五十餘家入質于長安碩徳軍令嚴整秋毫不犯祭先賢禮名士西土悦之沮渠蒙遜所部酒泉凉寧二郡叛降於西凉又聞吕隆降秦大懼遣其弟建忠將軍挐牧府長史張潜見碩徳於姑臧請帥其衆東遷碩徳喜拜潜張掖太守挐建康太守潜勸蒙遜東遷挐私謂蒙遜曰姑臧未拔吕氏猶存碩徳糧盡將還不能久也何為自棄土宇受制於人乎臧莫孩亦以為然蒙遜遣子奚念為質於河西王利鹿孤利鹿孤不受曰奚念年少可遣挐也冬十月蒙遜復遣使上疏於利鹿孤曰臣前遣奚念具披誠􅅃而聖㫖未昭復徴弟挐臣竊以為茍有誠信則子不為輕若其不信則弟不為重今冦難未夷不獲奉詔願陛下亮之利鹿孤怒遣張松侯俱延興城侯文支將騎一萬襲蒙遜至萬歲臨松執蒙遜從弟鄯善茍子虜其民六千餘户蒙遜從叔孔遮入朝于利鹿孤許以挐爲質利鹿􅀌乃歸其所掠召俱延等還文支利鹿孤之弟也南燕主備徳宴羣臣於延賢堂酒酣謂羣臣曰朕可方自古何等主青州刺史鞠仲曰陛下中興聖主少康光武之儔備徳顧左右賜仲帛千匹仲以所賜多辭之備徳曰卿知調朕朕不知調卿邪卿所對非實故朕亦以虛言賞卿耳韓範進曰天子無戲言今日之論君臣俱失備徳大悦賜範絹五十疋備徳母及兄納皆在長安備徳遣平原人杜弘往訪之弘曰臣至長安若不奉太后動止當西如張掖以死為効臣父雄年踰六十乞本縣之祿以申烏鳥之情中書令張華曰杜弘未行而求禄要君之罪大矣備徳曰􅀪為君迎母為父求禄忠孝備矣何罪之有以雄為平原令弘至張掖為盗所殺十一月劉裕追孫恩至滬瀆海鹽又破之俘斬以萬數恩遂自浹口逺􅇡入海十二月辛亥魏主珪遣常山王遵定陵公和䟦帥衆五萬襲沒弈干於髙平乙卯魏虎威将軍宿沓干伐燕攻令支乙丑燕中領軍宇文拔救之壬午宿沓干拔令支而戍之吕超攻姜紀不克遂攻焦朗朗遣其弟子嵩為質於河西王利鹿孤以請迎利鹿孤遣車騎将軍傉檀赴之比至超已退朗閉門拒之傉檀怒将攻之鎮北将軍俱延諫曰安土重遷人之常情朗孤城無食今年不降後年自服何必多殺士卒以攻之若其下捷彼必去從佗國棄州境士民以資鄰敵非計也不如以善言諭之傉檀乃與朗連和遂曜兵姑臧壁于胡阬傉檀知吕超必來斫營畜火以待之超夜遣中壘将軍王集帥精兵二千斫傉檀營傉檀徐嚴不起集入壘中内外皆舉火光照如晝縱兵擊之斬集及甲首三百餘級吕隆懼偽與傉檀通好請於苑内結盟傉檀遣俱延入盟俱延疑其有伏毁苑牆而入超伏兵擊之俱延失馬步走淩江將軍郭祖力戰拒之俱延乃得免傉檀怒攻其昌松太守孟禕於顯美隆遣廣武將軍荀安國寧逺將軍石可帥騎五百救之安國等憚傉檀之彊遁還桓玄表其兄偉為江州刺史鎮夏口司馬刀暢為輔國將軍督八郡軍事鎮襄陽遣其將皇甫敷馮該戍湓口移沮漳蠻二千户于江南立武寧郡更招集流民立綏安郡詔徴廣州刺史刁逵豫章太守郭昶之玄皆留不遣玄自謂有晉國三分之二數使人上已符瑞欲以惑衆又致牋於㑹稽王道子曰賊造近郊以風不得進以雨不致火食盡故去耳非力屈也昔國寳死後王恭不乗此威入統朝政足見其心非侮於明公也而謂之不忠今之貴要腹心有時流清望者誰乎豈可云無佳勝直是不能信之耳爾來一朝一夕遂成今日之禍在朝君子皆畏禍不言玄沗任在逺是以披冩事實元顯見之大懼張法順謂元顯曰桓玄承藉世資素有豪氣既并殷揚專有荆楚第下之所控引止三呉耳孫恩為亂東土塗地公私困竭玄必乗此縱其姦􅇯竊用憂之元顯曰為之奈何法順曰玄始得荆州人情未附方務綏撫未暇佗圖若乗此際使劉牢之為前鋒而第下以大軍繼進玄可取也元顯以為然㑹武昌太守􅁃楷以玄與朝廷構怨恐事不成禍及於己密使人自結於元顯云玄大失人情衆不為用若朝廷遣軍已當為内應元顯大喜遣張法順至京口謀於劉牢之牢之以為難法順還謂元顯曰觀牢之言色必貳於我不如召入殺之不爾敗人大事元顯不從於是大治水軍徴兵裝艦以謀討玄元興元年春正月庚午朔下詔罪狀桓玄以尚書令元顯為驃騎大將軍征討大都督都督十八州諸軍事加黄􅃏又以鎮北將軍劉牢之爲前鋒都督前將軍譙王尚之為後部因大赦改元内外戒嚴加會稽王道子太傅元顯欲盡誅諸桓中䕶軍桓脩驃騎長史王誕之甥也誕有寵於元顯因陳脩等與玄志趣不同元顯乃止誕導之曾孫也張法順言於元顯曰桓謙兄弟每為上流耳目冝斬之以杜姦謀且事之濟不繫在前軍而牢之反覆萬一有變則禍敗立至可令牢之殺謙兄弟以示無貳心若不受命當逆為其所元顯曰今非牢之無以敵玄且始事而誅大將人情不安再三不可又以􅁊氏世爲荆土所附􅁊沖特有遺惠而謙沖之子也乃自驃騎司馬除都督荆益寧梁四州諸軍事荆州刺史欲以結西人之心丁丑燕慕容拔攻魏令支戍克之宿沓干走執魏遼西太守那頡燕以拔爲幽州刺史鎮令支以中堅將軍遼西陽豪爲本郡太守丁亥以章武公淵爲尚書令博陵公䖍爲尚書左僕射尚書王騰爲右僕射戊子魏材官將軍和突攻黜弗素古延等諸部破之初魏主珪遣北部大人賀狄干獻馬千匹求昏於秦秦王興聞珪已立慕容后止狄干而絶其昏沒弈干黜弗素古延皆秦之屬國也而魏攻之由是秦魏有隙庚寅珪大閲士馬命并州諸郡積穀於平陽之乾壁以備秦柔然社崙方睦於秦遣將救黜弗素古延辛卯和突逆擊大破之社崙帥其部落逺遁漠北奪高車之地而居之斛律部帥倍侯利擊社崙大為所敗倍侯利奔魏社崙於是西北擊匈奴遺種日拔也鷄大破之遂吞併諸部士馬繁盛雄於北方其地西至焉耆東接朝鮮南臨大漠旁側小國皆羈屬焉自號豆代可汗始立約束以千人為軍軍有將百人為幢幢有帥攻戰先登者賜以虜獲畏懦者以石擊其首而殺之秃髪傉檀克顯美執孟禕而責之以其不早降禕曰禕受呂氏厚恩分符守土若明公大軍甫至望旗歸附恐獲罪於執事矣傉檀釋而禮之徙二千餘户而歸以褘為左司馬褘辭曰吕氏將亡聖朝必取河右人無愚智皆知之但褘為人守城不能全復忝顯任於心竊所未安若蒙明公之惠使得就戮姑臧死且不朽傉檀義而歸之東土遭孫恩之亂因以饑饉漕運不繼桓玄禁㫁江路商旅俱絶公私匱乏以粰橡給士卒玄謂朝廷方多憂虞必未暇討已可以蓄力觀釁及大軍將發從兄太傅長史石生宻以書報之玄大驚欲完聚保江陵長史卞範之曰明公英威振於逺近元顯口尚乳臭劉牢之大失物情若兵臨近畿示以禍福土崩之勢可翹足而待何有延敵入境自取窮蹙者乎玄從之留桓偉守江陵抗表傳檄罪狀元顯舉兵東下檄至元顯大懼二月丙午帝餞元顯于西池元顯下船而不發癸丑魏常山王遵等至髙平沒弈干棄其部衆帥數千騎與劉勃勃奔秦州魏軍追至瓦亭不及而還盡獲其府庫蓄積馬四萬餘匹雜畜九萬餘口徙其民於代都餘種分迸平陽太守貳塵復侵秦河東長安大震闗中諸城晝閉秦人簡兵訓卒以謀伐魏秦王興立子泓為太子大赦泓孝友寛和喜文學善談詠而懦弱多病興欲以為嗣而狐疑不决久乃立之姑臧大饑米斗直錢五千人相食餓死者十餘萬口城門晝閉樵采路絶民請出城為胡虜奴婢者日有數百吕隆惡其沮動衆心盡阬之積尸盈路沮渠䝉遜引兵攻姑臧隆遣使求救於河西王利鹿孤利鹿孤遣廣武公傉檀帥騎一萬救之未至隆擊破䝉遜軍䝉遜請與隆盟留穀萬餘斛遺之而還傉檀至昌松聞䝉遜已退乃徙凉澤段冢民五百餘户而還中散騎常侍張融言於利鹿孤曰焦朗兄弟據魏安潜通姚氏數爲反覆今不取後必爲朝廷憂利鹿孤遣傉檀討之朗面縛出降傉檀送于西平徙其民于樂都桓玄發江陵慮事不捷常爲西還之計及過尋陽不見官軍意甚喜將士之氣亦振􅁃楷謀泄玄囚之丁巳詔遣齊王柔之以騶虞幡宣告荆江二州使罷兵玄前鋒殺之柔之宗之子也丁卯玄至姑孰使其將馮該等攻歷陽襄城太守司馬休之嬰城固守玄軍斷洞浦焚豫州舟艦豫州刺史譙王尚之帥步卒九千陣於浦上遣武都太守楊秋屯横江秋降于玄軍尚之衆潰逃干涂中玄捕獲之司馬休之出戰而敗棄城走劉牢之素惡驃騎大將軍元顯恐桓玄既滅元顯益驕恣又恐己功名愈盛不為元顯所容且自恃材武擁彊兵欲假玄以除執政復伺玄之隙而自取之故不肯討玄元顯日夜昏酣以牢之為前鋒牢之驟詣門不得見及帝出餞元顯遇之公坐而巳牢之軍溧洲參軍劉裕請擊玄牢之不許玄使牢之族舅何穆說牢之曰自古戴震主之威挾不賞之功而能自全者誰邪越之文種秦之白起漢之韓信皆事明主為之盡力功成之日猶不免誅夷况為凶愚者之用乎君如今日戰勝則傾宗戰敗則覆族欲以此安歸乎不若翻然改圗則可以長保富貴矣古人射鉤斬袪猶不害為輔佐况玄與君無宿昔之怨乎時譙王尚之已敗人情愈恐牢之頗納穆言與玄交通東海中尉東海何無忌牢之之甥也與劉裕極諫不聽其子驃騎從事中郎敬宣諌曰今國家衰危天下之重在大人與玄玄藉父叔之資據有全楚割晉國三分之二一朝縱之使陵朝廷玄威望旣成恐難圖也董卓之變将在今矣牢之怒曰吾豈不知今日取玄如反覆手耳伹平玄之後令我奈驃騎何三月乙巳朔牢之遣敬宣詣玄請降玄陰欲誅牢之乃與敬宣宴飲陳名書畫共觀之以安悅其意敬宣不之覺玄佐吏莫不相視而笑􅀇板敬宣為諮議參軍元顯將􅀤聞玄已至新亭棄船退屯國子學辛未陳於宣陽門外軍中相驚言玄已至南桁元顯引兵欲還宫玄遣人拔刀隨後大呼曰放仗軍人皆崩潰元顯乗馬走入東府唯張法順一騎隨之元顯問計於道子道子但對之涕泣玄遣太傅從事中郎毛泰收元顯送新亭􅅞於舫前而數之元顯曰為王誕張法順所誤耳壬申復隆安年號帝遣侍中勞玄於安樂渚玄入京師稱詔解嚴以玄揔百揆都督中外諸軍事丞相録尚書事楊州牧領徐荆江三州刺史假黄鉞玄以桓偉為荆州刺史桓謙為尚書左僕射桓脩為徐兖二州刺史桓石生為江州刺史卞範之為丹陽尹初玄之舉兵侍中王謐奉詔詣玄玄親禮之及玄輔政以謐為中書令謐導之孫也新安太守殷仲文覬之弟也玄姊為仲文妻仲文聞玄克京師棄郡投玄玄以為諮議參軍劉邁往見玄玄曰汝不畏死而敢來邪邁曰射鉤斬袪并邁為三玄悦以為參軍癸酉有司奏會稽王道子酣縱不孝當棄市詔徙安成郡斬元顯及東海王彦璋譙王尚之􅁃楷張法順毛泰等於建康市桓脩為王誕固請得流嶺南玄以劉牢之為㑹稽内史牢之曰始爾便奪我兵禍其至矣劉敬宣請歸諭牢之使受命玄遣之敬宣勸牢之襲玄牢之猶豫不决移屯班瀆私告劉裕曰今當北就高雅之於廣陵舉兵以匡社稷卿能從我去乎裕曰將軍以勁卒數萬望風降服彼新得志威震天下朝野人情皆已去矣廣陵豈可得至邪裕當反服還京口耳何無忌謂裕曰我将何之裕曰吾觀鎮北必不免卿可隨我還京口桓玄若守臣節當與卿事之不然當與卿圗之於是牢之大集僚佐議據江北以討玄參軍劉襲曰事之不可者莫大於反将軍往年反王兖州近日反司馬郎君今復反桓公一人三反何以自立語畢趨出佐吏多散走牢之懼使敬宣之京口迎家失期不至牢之以為事已泄為玄所殺乃帥部曲北走至新洲縊而死敬宣至不暇哭即渡江奔廣陵将吏共殯斂牢之以其喪歸丹徒玄令斲棺斬首暴尸於市大赦改元大亨桓玄讓丞相荆江徐三州改授太尉都督中外諸軍事楊州牧領豫州刺史揔百揆以琅邪王徳文為太宰司馬休之劉敬宣髙雅之俱奔洛陽各以子弟為質於秦以求救秦王興與之符信使於闗東募兵得數千人復還屯彭城間孫恩冦臨海臨海太守辛景擊破之恩所虜三呉男女死亡殆盡恩恐為官軍所獲乃赴海死其黨及妓妾從死者以百數謂之水仙餘衆數千人復推恩妹夫盧循為主循諶之曾孫也神采清秀雅有材藝少時沙門惠逺嘗謂之曰君雖體渉風素而志存不軌如何太尉玄欲撫安東土乃以循為永嘉太守循雖受命而冦暴不已甲戌燕大赦河西王秃髪利鹿孤寢疾遺令以國事授弟傉檀初秃髪思復鞬愛重傉檀謂諸子曰傉檀器識非汝曹所及也故諸兄不以傳子而傳於弟利鹿孤在位垂拱而已軍國大事皆委於傉檀利鹿孤卒傉檀襲位更稱凉王改元弘昌遷于樂都諡利鹿孤曰康王夏四月太尉玄出屯姑孰辭録尚書事詔許之而大政皆就諮焉小事則决於尚書令桓謙及卞範之自隆安以來中外之人厭於禍亂及玄初至黜姦佞擢儁賢京師欣然冀得少安旣而玄奢豪縱逸政令無常朋黨互起陵侮朝廷裁損乗輿供奉之具帝幾不免飢寒由是衆心失望二呉大饑户口減半會稽減什三四臨海永嘉殆盡富室皆衣羅紈懷金王閉門相守餓死乞伏熾磐自西平逃歸苑川南凉王傉檀歸其妻子乞伏乾歸使熾磐入朝于秦秦主興以熾磐爲興晉太守五月盧循自臨海入東陽太尉玄遣撫軍中兵參軍劉裕将兵擊之循敗走永嘉高句麗攻宿軍燕平州刺史慕容歸棄城走秦主興大發諸軍遣義陽公平尚書右僕射狄伯支等将步騎四萬伐魏興自将大軍繼之以尚書令姚晃輔太子泓守長安沒弈干權鎮上邽廣陵公欽權鎮洛陽平攻魏乾壁六十餘日拔之秋七月魏主珪遣毗陵王順及豫州刺史長孫肥將六萬騎爲前鋒自將大軍繼發以擊之八月太尉玄諷朝廷以玄平元顯功封豫章公平殷楊功封桂陽公并本封南郡如故玄以豫章封其子昇桂陽封其兄子俊魏主珪至永安秦義陽公平遣驍將帥精騎二百覘魏軍長孫肥逆擊盡擒之平退走珪追之乙巳及於柴壁平嬰城固守魏軍圍之秦王興將兵四萬七千救之將據天渡運糧以餽平魏􅀶士李先曰兵法高者為敵所棲深者為敵所囚今秦皆犯之冝及興未至遣竒兵先據天渡柴壁可不戰而取也珪命增築重圍内以防平之出外以拒興之入廣武将軍安同曰汾東有蒙阬東西三百餘里蹊徑不通興來必從汾西直臨柴壁如此虜聲勢相接重圍雖固不能制也不如為浮梁渡汾西築圍以拒之虜至無所施其智力矣珪從之興至蒲阪憚魏之彊乆乃進兵甲子珪帥步騎三萬逆擊興於蒙阬之南斬首千餘級興退走四十餘里平亦不敢出珪乃分兵四據險要使秦兵不得近柴壁興屯汾西憑壑為壘束柏材從汾上流縱之欲以毁浮梁魏人皆鉤取以為薪蒸冬十月平糧竭矢盡夜悉衆突西南圍求出興列兵汾西舉烽鼓譟為應興欲平力戰突免平望興攻圍引接但叫呼相和莫敢逼圍平不得出計窮乃帥麾下赴水死諸將多從平赴水珪使善游者鉤捕之無得免者執狄伯支及越騎校尉唐小方等四十餘人餘衆二萬餘人皆歛手就禽興坐視其窮力不能救舉軍慟哭聲震山谷數遣使求和於魏珪不許乗勝進攻蒲阪秦晉公緒固守不戰㑹柔然謀伐魏珪聞之戊申引兵還或告太史令鼂崇及弟黃門侍郎懿潜召秦兵珪至晉陽賜崇懿死秦徙河西豪右萬餘户于長安太尉玄殺呉興太守髙素將軍笁謙之及謙之從兄朗之劉襲并襲弟季武皆劉牢之北府舊将也襲兄冀州刺史軌邀司馬休之劉敬宣高雅之等共據山陽欲起兵攻玄不克而走将軍袁䖍之劉壽高長慶郭恭等皆往從之将奔魏至陳留南分為二輩軌休之敬宣奔南燕䖍之壽長慶恭奔秦魏主珪初聞休之等當來大喜後怪其不至令兖州求訪獲其從者問其故皆曰魏朝威聲逺被是以休之等咸欲歸附旣而聞崔逞被殺故奔二國珪深悔之自是士人有過頗見優容南凉王傉檀攻吕隆於姑臧燕王熈納故中山尹符謨二女長曰娀娥為貴人幼曰訓英為貴嬪貴嬪尤有寵丁太后怨恚與兄子尚書信謀廢熈立章武公淵事覺熈逼丁太后令自殺葬以后禮諡曰獻幽皇后十一月戊辰殺淵及信辛未熙畋于北原石城令高和與尚方兵於後作亂殺司􅀠校尉張顯入掠宫殿取庫兵脅營署閉門乗城熈馳還城上人皆投仗開門盡誅反者唯和走免甲戌大赦魏以􅁃岳為司空十二月辛亥魏主珪還雲中柔然可汗社崙聞珪伐秦自參合陂侵魏至豺山及善無北澤魏常山王遵以萬騎追之不及而還太尉玄使御史杜林防衛㑹稽文孝王道子至安成林承玄㫖酖道子殺之沮渠蒙遜所署西郡太守梁中庸叛奔西凉蒙遜聞之笑曰吾待中庸恩如骨肉而中庸不我信但自負耳孤豈在此一人邪乃盡歸其孥西凉公暠問中庸曰我何如索嗣中庸曰未可量也暠曰嗣才度若敵我者我何能於千里之外以長繩絞其頸邪中庸曰智有短長命有成敗殿下之與索嗣得失之理臣實未之能詳若以身死為負計行為勝則公孫瓉豈賢於劉虞邪暠黙然袁䖍之等至長安秦王興問曰桓玄才略何如其父卒能成功乎䖍之曰玄乗晉室衰亂盜據宰衡猜忌安忍刑賞不公以臣觀之不如其父逺矣玄今已執大柄其􅀔必將簒逆正可為它人驅除耳興善之以䖍之為廣州刺史是嵗秦王興立昭儀張氏為皇后封子懿弼洸宣諶愔璞質逵裕國兒皆為公遣使拜秃髮傉檀為車騎將軍廣武公沮渠蒙遜為西鎮將軍沙州刺史西海侯李暠為安西將軍髙昌侯秦鎮逺將軍趙曜帥衆二萬西屯金城建節將軍王松怱帥騎助吕隆守姑臧松怱至魏安傉檀弟文真擊而虜之傉檀大怒送松怱還長安深自陳謝資治通鑑卷第一百一十二
