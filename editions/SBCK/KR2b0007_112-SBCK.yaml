front:
  text: 之良䇿也且虚名無實徒足為世之質的將安用之利鹿孤曰安國之言是也乃更稱河西王以廣武公傉檀為都督中外諸軍事凉州牧録尚書事二月丙子孫恩出浹口攻句章不能拔劉牢之撃之恩復走入海秦王興使乞伏乾歸還鎮苑川盡以其故部衆配之凉王纂嗜酒好獵太常楊頴諌曰陛下應天受命當以道守之今疆宇日蹙﨑嶇二嶺之間陛下不兢兢夕愓以恢弘先業而沈湎遊畋不以國家爲事臣竊危之纂遜辭謝之然猶不悛番禾太守吕超擅擊鮮卑思盤思盤遣其弟乞珍訴於纂纂命超及思盤皆入朝超懼至姑臧深自結於殿中監杜尚纂見超責之曰卿恃兄弟桓桓乃敢欺吾要當斬卿天下乃定超頓首謝纂本以恐愒超實無意殺之因引超思盤及羣臣同宴於内殿超兄中領軍隆數勸纂酒纂醉乗步輓車將超等游禁中至琨華堂東閤車不得過纂親將竇川駱騰倚劒於壁推車過閤超取劒擊纂纂下車禽超超刺纂洞胷川騰與超格戰超殺之纂后楊氏命禁兵討超杜尚止之皆捨仗不戰將軍魏益多入取纂首楊氏曰人已死如土石無所復知何忍復殘其形骸乎益多罵之遂取纂首以徇曰纂違先帝之命殺太子而自立荒淫暴虐畨禾太守超順人心而除之以安宗廟凡我士庶同兹休慶纂叔父已西公佗弟隴西公緯皆在北城或説緯曰超為逆亂公以介弟之親仗大義而討之姜紀焦辨在南城楊桓田誠在東苑皆吾黨也何患不濟緯嚴兵欲與佗共撃超佗妻梁氏止之曰緯超俱兄弟之子何為舎超助緯自為禍首乎佗乃謂緯曰超舉事已成據武庫擁精兵圖之甚難且吾老矣無能為也超弟邈有寵於緯説緯曰纂賊殺兄弟隆超順人心而討之正欲尊立明公耳方今明公先帝之長子當主社稷人無異望夫復何疑緯信之乃與隆超結盟單馬入城超執而殺之讓位於隆隆有難色超曰今如乗龍上天豈可中下隆遂即天王位大赦改元神鼎尊母衞氏為太后妻楊氏為后以超為都督中外諸軍事輔國大將軍録尚書事封安定公諡纂曰靈帝纂后楊氏將出宫超恐其挾珍寶命索之楊氏曰爾兄弟不義手刃相屠我旦夕死人安用寳為超又問玉璽所在楊氏曰已毁之矣后有美色超將納之謂其父右僕射桓曰后若自殺禍及卿宗桓以告楊氏楊氏曰大人賣女與氐以圖富貴一之謂甚其可再乎遂自殺諡曰穆后桓奔河西王利鹿孤利鹿孤以為左司馬三月孫恩北趣海鹽劉裕隨而拒之築城於海鹽故治恩日來攻城裕屢擊破之斬其將姚盛城中兵少不敵裕夜偃旗匿衆明晨開門使羸疾數人登城賊遙問劉裕所在曰夜已走矣賊信之爭入城裕奮擊大破之恩知城不可拔乃進向滬瀆裕復棄城追之海鹽令鮑陋遣子嗣之帥呉兵一千請為前驅裕曰賊兵甚精呉人不習戰若前驅失利必敗我軍可在後為聲􅀔嗣之不從裕乃多伏旗鼓前驅既交諸伏皆出裕舉旗鳴皷賊以為四面有軍乃退嗣之追之戰沒裕且戰且退所領死傷且盡至向戰處令左右脱取死人衣以示閑暇賊疑之不敢逼裕大呼更戰賊懼而退裕乃引歸河西王利鹿孤伐凉與凉王隆戰大破之徙二千餘户而歸夏四月辛卯魏人罷鄴行臺以所統六郡置相州以􅁃岳為刺史
