front:
  text: 資治通鑑卷第二百三十六
  hash: sha256:a437685edffaedded78b0895f78ef15477da40d83290460b7a82d5fad68ea5cd
body:
  text: 臣司馬光奉勑編集唐紀五十二旃蒙作噩凡五年起重光大荒落盡德宗神武聖文皇帝十一貞元十七年春正月甲寅韓全義至長安竇文􅂣為掩其敗迹上禮遇甚厚全義稱足疾不任朝謁遣司馬崔放入對放為全義引咎謝無功上曰全義為招討使能招來少誠其功大矣何必殺人然後為功邪閏月甲戌歸夏州韋士宗既入黔州妄殺將吏人心大擾士宗懼三月脱身亡走夏四月辛亥以右諫議大夫裴佶爲黔州觀察使五月壬戌朔日有食之朔方邠寧慶節度使楊朝晟防秋于寧州乙酉薨初渾瑊遣兵馬使李朝寀將兵戍定平瑊薨朝寀請以其衆􅀠神䇿軍詔許之楊朝晟疾亟召僚佐謂曰朝晟必不起朔方命帥多自本軍雖徇衆情殊非國體寧州刺史劉南金練習軍旅宜使攝行軍且知軍事比朝廷擇帥必無虞矣又以手書授監軍劉英倩英倩以聞軍士私議曰朝廷命帥吾納之即命劉君吾事之若命帥於它軍彼必以其麾下來吾屬被斥矣必拒之己丑上遣中使往察軍情軍中多與南金辛夘上復遣髙品薛盈珍齎詔詣寧州六月甲午盈珍至軍宣詔曰朝寀所將本朔方軍今將并之以壯軍勢威戎狄以李朝宷為使南金副之軍中以為何如諸將皆奉詔丙申都虞􅇋史經言於衆曰李公命收弓刀而送甲胄二千軍士皆曰李公欲内麾下二千為腹心吾輩妻子其可保乎夜造劉南金欲奉以為帥南金曰節度使固我所欲然非天子之命則不可軍中豈無它將乎衆曰弓刀皆為官所收惟軍事府尚有甲兵欲因以集事南金曰諸君不願朝寀為帥宜以情告敕使若操甲兵乃拒詔也命閉門不内軍士去詣兵馬使髙固固逃匿搜得之固曰諸君能用吾命則可衆曰惟命固曰毋殺人毋掠金帛衆曰諾乃共詣監軍請奏之衆曰劉君既得朝㫖為副帥必撓吾事詐稱監軍命召計事至而殺之戊戌制以李朝寀為邠寧節度使是日寧州告變者至上追還制書復遣薛盈珍往詗軍情壬寅至軍軍中以髙固為請盈珍即以上㫖命固知軍事或傳戊戌制書至邠州邠軍惑不知所從姦人乗之且為變留後孟子周悉内精甲於府廷日饗士卒内以悦衆心外以威姦黨邠軍無變子周之謀也李錡既執天下利權以貢獻固主恩以饋遺結權貴恃此驕縱無所忌憚盗取縣官財所部官屬無罪受戮者相繼浙西布衣崔善貞詣闕上封事言宫市進奉及鹽鐵之􅁦因言錡不法事上覽之不悦命械送錡錡聞其將至先鑿阬於道旁己亥善貞至并鎻械内阬中生瘞之逺近聞之不寒而慄錡復欲為自全計増廣兵衆選有材力善射者謂之挽彊胡奚雜類謂之蕃落給賜十倍它卒轉運判官盧坦屢諫不悛與幕僚李約等皆去之約勉之子也己酉以髙固為邠寧節度使固宿將以寛厚得衆節度使忌之置於散地同列多輕侮之及起為帥一無所報復由是軍中遂安丁巳成德節度使王武俊薨秋七月戊寅吐蕃冦鹽州辛巳以成德節度副使王士真為節度使己丑吐蕃陷麟州殺刺史郭鋒夷其城郭掠居人及党項部落而去鋒曜之子也僧延素為虜所得虜將有徐舍人者謂延素曰我英公之五代孫也武后時吾髙祖建義不成子孫流播異域雖代居禄位典兵然思本之心不忘顧宗族大無由自抜耳今聽汝歸遂縱之上遣使敕韋臯出兵深入吐蕃以分其勢紓北邊患臯遣將將兵二萬分出九道攻吐蕃維保松州及棲雞老翁城河東節度使鄭儋暴薨不及命後事軍中喧譁將有它變中夜十餘騎執兵召掌書記令狐楚至軍門諸將環之使草遺表楚在白刃之中操筆立成楚德棻之族也八月戊午以河東行軍司馬嚴綬為節度使九月韋臯奏大破吐蕃於雅州左神䇿中尉竇文􅂣致仕以副使楊志亷代之韋臯屢破吐蕃轉戰千里凡抜城七軍鎮五焚堡百五十斬首萬餘級捕虜六千降户三千遂圍維州及昆明城冬十月庚子加臯檢校司徒兼中書令賜爵南康王南詔王異牟尋虜獲尤多上遣中使慰撫之戊午鹽州刺史杜彦先弃城奔慶州十八年春正月驃王摩羅思那遣其子悉利移入貢驃國在南詔西南六千八百里聞南詔内附而慕之因南詔入見仍獻其樂吐蕃遣其大相兼東鄙五道節度使論莽熱將兵十萬解維州之圍西川兵據險設伏以待之吐蕃至出千人挑戰虜悉衆追之伏發虜衆大敗擒論莽熱士卒死者太半維州昆明竟不下引兵還乙亥臯遣使獻論莽熱上赦之浙東觀察使裴肅既以進奉得進判官齊揔代掌後務刻剥以求媚又過之三月癸酉詔擢揔為衢州刺史給事中長安許孟容封還詔書曰衢州無它虞齊揔無殊績忽此超奬深駭羣情若揔必有可録願明書勞課然後超資改官以解衆疑詔遂留中己亥上召孟容慰奬之秋七月辛未嘉王府諮議髙􅀪本正牙奏事自理逋債乙亥詔公卿庶僚自今勿令正牙奏事如有陳奏宜延英門請對議者以為正牙奏事自武德以來未之或改所以逹羣情講政事􅀪本無知黜之可也不當因人而廢事淮南節度使杜佑累表求代冬十月丁亥以刑部尚書王鍔為淮南副節度使兼行軍司馬己酉鄜坊節度使王栖曜薨中軍將何朝宗謀作亂夜縱火都虞候裴玢濳匿不救火旦擒朝宗斬之以同州刺史劉公濟為鄜坊節度使以玢為行軍司馬十九年春二月丁亥名安黄軍曰奉義己亥安南牙將王季元逐其觀察使裴泰泰奔朱鳶明日左兵馬使趙匀斬季元及其黨迎泰而復之甲辰杜佑入朝三月壬子朔以佑檢校司空同平章事以王鍔為淮南節度使鴻臚卿王權請遷獻懿二祖於德明興聖廟毎禘祫正太祖東向之位從之乙亥以司農卿李實兼京兆尹實為政暴戾上愛信之實恃恩驕傲許人薦引不次拜官及誣譖斥逐皆如期而效士大夫畏之側目夏四月涇原節度使劉昌奏請徙原州治平凉從之乙亥吐蕃遣其臣論頰熱入貢六月辛夘以右神䇿中尉副使孫榮義為中尉與楊志亷皆驕縱招權依附者衆宦官之勢益盛壬辰遣右龍武大將軍薛伾使于吐蕃陳許節度使上官涚薨其壻田偁欲脅其子使襲軍政牙將王沛亦涚之壻也知其謀以告監軍范日用討擒之乙未以陳許行軍司馬劉昌裔為節度使沛許州人也自正月不雨至于秋七月己未中書侍郎同平章事齊抗以疾罷為太子賔客初翰林待詔王伾善書山隂王叔文善碁俱出入東宫娯侍太子伾杭州人也叔文譎詭多計自言讀書知治道乘閒常為太子言民閒疾苦太子嘗與諸侍讀及叔文等論及宫市事太子曰寡人方欲極言之衆皆稱贊獨叔文無言既退太子自留叔文謂曰向者君獨無言豈有意邪叔文曰叔文蒙幸太子有所見敢不以聞太子職當視膳問安不宜言外事陛下在位乆如疑太子收人心何以自解太子大驚因泣曰非先生寡人無以知此遂大愛幸與王伾相依附叔文因為太子言某可為相某可為將幸異日用之宻結翰林學士韋執誼及當時朝士有名而求速進者陸淳吕温李景儉韓曄韓㤗陳諌栁宗元劉禹錫等定為死友而凌凖程异等又因其黨以進日與遊處蹤跡詭祕莫有知其端者藩鎮或隂進資幣與之相結淳吴人嘗爲左司郎中温渭之子時為左拾遺景儉瑀之孫進士及第曄滉之族子諫嘗為侍御史宗元禹錫時為監察御史左補闕張正一上書得召見正一與吏部員外郎王仲舒主客員外郎劉伯芻等相親善叔文之黨疑正一言已隂事令韋執誼反譖正一等於上云其朋黨遊宴無度九月甲寅正一等皆坐逺貶人莫知其由伯芻迺之子也鹽夏節度判官崔文先權知鹽州為政苛刻冬閏十月庚戌部將李庭俊作亂殺而臠食之左神䇿兵馬使李興幹戍鹽州殺庭俊以聞丁巳門下侍郎同平章事崔損薨十一月戊寅朔以李興幹為鹽州刺史得專奏事自是鹽州不􅀠夏州十二月庚申以太常卿髙郢為中書侍郎吏部侍郎鄭珣瑜為門下侍郎並同平章事珣瑜餘慶之從父兄弟也建中初敕京城諸使及府縣繫囚每季終委御史廵桉有寃濫者以聞近嵗北軍移牒而已監察御史崔薳遇下嚴察下吏欲陷之引以入右神䇿軍軍使以下駭懼具奏其狀上怒杖薳四十流崖州京兆尹嗣道王實務徵求以給進奉言於上曰今嵗雖旱而禾苖甚美由是租税皆不免人窮至壊屋賣瓦木麥苖以輸官優人成輔端為謡嘲之實奏輔端誹謗朝政杖殺之監察御史韓愈上疏以京畿百姓窮困應今年税錢及草粟等徵未得者請俟來年蠶麥愈坐貶陽山令二十年春正月丙戌天德軍都防禦團練使豐州刺史李景畧卒初景畧嘗宴僚佐行酒者誤以醯進判官京兆任迪簡以景畧性嚴恐行酒者獲罪强飲之歸而嘔血軍士聞之泣下及景畧卒軍士皆曰判官仁者欲奉以為帥監軍抱置别室軍士發扃取之監軍以聞詔以代景畧吐蕃贊普死其弟嗣立夏四月丙寅名陳許軍曰忠武左金吾大將軍李昇雲將禁兵鎮咸陽疾病其子政諲與虞侯上官望等謀效山東藩鎮使將士奏攝父事六月壬子昇雲卒甲寅詔追削昇雲官爵籍沒其家昭義節度使李長榮薨上遣中使以手詔授本軍大將但軍士所附者即授之時大將來希皓為衆所服中使將以手詔付之希皓言於衆曰此軍取人合是希皓但作節度使不得若朝廷以一束草來希皓亦必敬事中使言面奉進止只令此軍取大將校與節鉞朝廷不别除人希皓固辭兵馬使盧從史其位居四潛與監軍相結起出伍曰若來大夫不肯受詔從史請且勾當此軍監軍曰盧中丞若如此此亦固合聖㫖中使因探懐取詔以授之從史捧詔再拜舞蹈希皓亟廻揮同列北面稱賀軍士畢集更無一言秋八月己未詔以從史為節度使九月太子始得風疾不能言順宗至德􅀪道大聖大安孝皇帝永貞元年春正月辛未朔諸王親戚入賀德宗太子獨以疾不能來德宗涕泣悲歎由是得疾日益甚凡二十餘日中外不通莫知兩宫安否癸巳德宗崩蒼猝召翰林學士鄭絪衛次公等至金鑾殿草遺詔宦官或曰禁中議所立尚未定衆莫敢對次公遽言曰太子雖有疾地居冡嫡中外屬心必不得已猶應立廣陵王不然必大亂絪等從而和之議始定次公河東人也太子知人情憂疑紫衣麻鞋力疾出九仙門召見諸軍使京師粗安甲午宣遺詔於宣政殿太子縗服見百官丙申即皇帝位於太極殿衛士尚疑之企足引領而望之曰真太子也乃喜而泣時順宗失音不能决事常居深宫施􅄕帷獨宦官李忠言昭容牛氏侍左右百官奏事自帷中可其奏自德宗大漸王伾先入稱詔召王叔文坐翰林中使决事伾以叔文意入言於忠言稱詔行下外初無知者以杜佑攝冡宰二月癸夘上始朝百官於紫宸門己酉加義武節度使張茂昭同平章事辛亥以吏部郎中韋執誼爲尚書左丞同平章事王叔文欲專國政首引執誼爲相已用事於中與相唱和壬子李師古發兵屯西境以脅滑州時告哀使未至諸道義成牙將有自長安還得遺詔者節度使李元素以師古鄰道欲示無外遣使宻以遺詔示之師古欲乗國喪侵噬鄰境乃集將士謂曰聖上萬福而元素忽傳遺詔是反也宜擊之遂杖元素使者發兵屯曹州且告假道於汴宣武節度使韓􅀪使謂曰汝能越吾界而為盗邪有以相待毋為空言元素告急􅀪使謂曰吾在此公安無恐或告曰翦棘夷道兵且至矣請備之􅀪曰兵來不除道也不為之應師古詐窮變索且聞上即位乃罷兵元素表請自貶朝廷兩慰解之元素泌之族弟也呉少誠以牛皮鞵材遺師古師古以鹽資少誠潛過宣武界事覺􅀪皆留輸之庫曰此於法不得以私相餽師古等皆憚之辛酉詔數京兆尹道王實殘暴掊歛之罪貶通州長史市井讙呼皆䄂瓦礫遮道伺之實由閒道獲免壬戌以殿中丞王伾為左散騎常侍依前翰林待詔蘇州司功王叔文為起居舍人翰林學士伾寢陋呉語上所䙝狎而叔文頗任事自許微知文義好言事上以故稍敬之不得如伾出入無阻叔文入至翰林而伾入至柿林院見李忠言牛昭容計事大抵叔文依伾伾依忠言忠言依牛昭容轉相交結毎事先下翰林使叔文可否然後宣于中書韋執誼承而行之外黨則韓泰栁宗元劉禹錫等主采聼外事謀議唱和日夜汲汲如狂互相推奬曰伊曰周曰管曰葛僩然自得謂天下無人榮辱進退生於造次惟其所欲不拘程式士大夫畏之道路以目素與往還者相次拔擢至一日除數人其黨或言曰某可為某官不過一二日輙己得之於是叔文及其黨十餘家之門晝夜車馬如市客候見叔文伾者至宿其坊中餅肆酒壚下一人得千錢乃容之伾尤闒茸專以納賄為事作大匱貯金帛夫婦寢其上甲子上御丹鳯門赦天下諸色逋負一切蠲免常貢之外悉罷進奉貞元之末政事為人患者如宫市五坊小兒之類悉罷之先是五坊小兒張捕鳥雀於閭里者皆為暴横以取人錢物至有張羅網於門不許人出入者或張井上使不得汲者近之輙曰汝驚供奉鳥雀即痛毆之出錢物求謝乃去或相聚飲食於酒食之肆醉飽而去賣者或不知就索其直多被毆詈或時留虵一囊為質曰此虵所以致鳥雀而捕之者今留付汝幸善飼之勿令飢渇賣者媿謝求哀乃携挈而去上在東宫皆知其􅁦故即位首禁之乙丑罷鹽鐵使月進錢先是鹽鐵月進羡餘而經入益少至是罷之三月辛未以王伾爲翰林學士德宗之末十年無赦羣臣以微過譴逐者皆不復叙用至是始得量移壬申追忠州别駕陸贄郴州别駕鄭餘慶杭州刺史韓臯道州刺史陽城赴京師贄之秉政也貶駕部員外郎李吉甫爲明州長史既而徙忠州刺史贄昆弟門人咸以爲憂而吉甫至忻然以宰相禮事之贄初猶慙懼後遂爲深交吉甫栖筠之子韋臯在成都屢上表請以贄自代贄與陽城皆未聞追詔而卒丙戌加杜佑度支及諸道鹽鐵轉運使以浙西觀察使李錡爲鎮海節度使解其鹽鐵轉運使錡雖失利權而得節旄故反謀亦未發戊子名徐州軍曰武寧以張愔為節度使加彰義節度使呉少誠同平章事以王叔文為度支鹽鐵轉運副使先是叔文與其黨謀得國賦在手則可以結諸用事人取軍士心以固其權又懼驟使重權人心不服藉杜佑雅有㑹計之名位重而務自全易可制故先令佑主其名而自除為副以専之叔文雖判兩使不以簿書為意日夜與其黨屏人竊語人莫測其所為以御史中丞武元衡為左庶子德宗之末叔文之黨多為御史元衡薄其為人待之莽鹵元衡為山陵儀仗使劉禹錫求為判官不許叔文以元衡在風憲欲使附已使其黨誘以權利元衡不從由是左遷元衡平一之孫也侍御史竇羣奏屯田員外郎劉禹錫挾邪亂政不宜在朝又嘗謁叔文揖之曰事固有不可知者叔文曰何謂也羣曰去嵗李實怙恩挾貴氣蓋一時公當此時逡廵路旁乃江南一吏耳今公一旦復據其地安知路旁無如公者乎其黨欲逐之韋執誼以羣素有彊直名止之上疾久不愈時扶御殿羣臣瞻望而已莫有親奏對者中外危懼思早立太子而王叔文之黨欲專大權惡聞之宦官俱文珍劉光􅄾薛盈珍等皆先朝任使舊人疾叔文忠言等朋黨專恣乃啓上召翰林學士鄭絪衛次公李程王涯入金鑾殿草立太子制時牛昭容輩以廣陵王淳英睿惡之絪不復請書紙為立嫡以長字呈上上頷之癸巳立淳為太子更名純程神符五世孫也賈躭以王叔文黨用事心惡之稱疾不出屢乞骸骨丁酉諸宰相㑹食中書故事丞相方食百寮無敢謁見者叔文至中書欲與執誼計事令直省通之直省以舊事告叔文怒叱直省直省懼入白執誼執誼逡廵慙􅎼竟起迎叔文就其閤語良久杜佑髙郢鄭珣瑜皆停筯以待有報者云叔文索飯韋相公已與之同食閤中矣佑郢心知不可畏叔文執誼莫敢出言珣瑜獨歎曰吾豈可復居此位顧左右取馬徑歸遂不起二相皆天下重望相次歸卧叔文執誼等益無所顧忌逺近大懼夏四月壬寅立皇弟諤為欽王誠為珍王子經為郯王緯為均王縱為漵王紓為莒王綢為宻王總為郇王約為邵王結為宋王緗為集王絿為冀王綺為和王絢為衡王纁為㑹王綰為福王紘為撫王緄為岳王紳為袁王綸為桂王繟為翼王乙巳上御宣政殿冊太子百官暏太子儀表退皆相賀至有感泣者中外大喜而王叔文獨有憂色口不敢言但吟杜甫題諸葛亮祠堂詩曰出師未㨗身先死長使英雄淚滿襟聞者哂之先是太常卿杜黄裳為裴延齡所惡留滯臺閣十年不遷及其壻韋執誼為相始遷太常卿黄裳勸執誼帥羣臣請太子監國執誼驚曰丈人甫得一官奈何啓口議禁中事黄裳勃然曰黄裳受恩三朝豈得以一官相買乎拂衣起出戊申以給事中陸淳為太子侍讀仍更名質韋執誼自以專權恐太子不悦故以質為侍讀使潛伺太子意且解之及質發言太子怒曰陛下令先生為寡人講經義耳何為預它事質惶懼而出􅊨五月辛未以右金吾大將軍范希朝為左右神䇿京西諸城鎮行營節度使甲戌以度支郎中韓泰為其行軍司馬王叔文自知為内外所憎疾欲奪取宦官兵權以自固藉希朝老將使主其名而實以泰專其事人情不測其所為益疑懼􅊨辛夘以王叔文為户部侍郎依前充度支鹽鐵轉運副使俱文珍等惡其專權削去翰林之職叔文見制書大驚謂人曰叔文日時至此商量公事若不得此院職事則無因而至矣王伾即為䟽請不從再疏乃許三五日一入翰林去學士名叔文始懼六月己亥貶宣歙廵官羊士諤為汀州寧化尉士諤以公事至長安遇叔文用事公言其非叔文聞之怒欲下詔斬之執誼不可則令杖殺之執誼又以為不可遂貶焉由是叔文始大惡執誼往來二人門下者皆懼先時劉闢以劒南支度副使將韋臯之意于叔文求都領劒南三川謂叔文曰太尉使闢致微誠於公若與某三川當以死相助若不與亦當有以相酬叔文怒亦將斬之執誼固執不可闢尚遊長安未去聞貶士諤遂逃歸執誼初為叔文所引用深附之既得位欲掩其迹且廹於公議故時時為異同輙使人謝叔文曰非敢負約乃欲曲成兄事耳叔文詬怒不之信遂成仇怨癸丑韋臯上表以為陛下哀毁成疾重勞萬機故久而未安請權令皇太子親監庶政俟皇躬痊愈復歸春宫臣位兼將相今之所陳乃其職分又上太子牋以為聖上逺法髙宗亮隂不言委政臣下而所付非人王叔文王伾李忠言之徒輙當重任賞罰縱情墮紀紊綱散府庫之積以賂權門樹置心腹徧於貴位潛結左右憂在蕭牆竊恐傾太宗盛業危殿下家邦願殿下即日奏聞斥逐羣小使政出人主則四方獲安臯自恃重臣逺處西蜀度王叔文不能動揺遂極言其姦俄而荆南節度使裴均河東節度使嚴綬牋表繼至意與臯同中外皆倚以爲援而邪黨震懼均光庭之曽孫也王叔文既以范希朝韓泰主京西神䇿軍諸宦者尚未寤㑹邊上諸將各以狀辭中尉且言方屬希朝宦者始寤兵柄爲叔文等所奪乃大怒曰從其謀吾屬必死其手宻令其使歸告諸將曰無以兵屬人希朝至奉天諸將無至者韓泰馳歸白之叔文計無所出唯曰奈何奈何無幾其母病甚丙辰叔文盛具酒饌與諸學士及李忠言俱文珍劉光琦等飲於翰林叔文言曰叔文母病以身任國事之故不得親醫藥今將求假歸侍叔文比竭心力不避危難皆爲朝廷之恩一旦去歸百謗交至誰肯見察以一言相助乎文珍隨其語輙折之叔文不能對但引滿相勸酒數行而罷丁巳叔文以母喪去位秋七月丙子加李師古檢校侍中王叔文既有母喪韋執誼益不用其語叔文怒與其黨日夜謀起復必先斬執誼而盡誅不附己者聞者忷懼自叔文歸第王伾失據日詣宦官及杜佑請起叔文為相且揔北軍既不獲則請以為威逺軍使平章事又不得其黨皆憂悸不自保是日伾坐翰林中疏三上不報知事不濟行且卧至夜忽呌曰伾中風矣明日遂輿歸不出己丑以倉部郎中判度支案陳諫為河中少尹伾叔文之黨至是始去癸巳横海軍節度使程懐信薨以其子副使執㳟為留後乙未制以積疹未復其軍國政事權令皇太子純勾當時内外共疾王叔文黨與專恣上亦惡之俱文珍等屢啓上請令太子監國上固厭倦萬機遂許之又以太常卿杜黄裳為門下侍郎左金吾大將軍袁滋為中書侍郎並同平章事俱文珍等以其舊臣故引用之又以鄭珣瑜為吏部尚書髙郢為刑部尚書並罷政事太子見百官於東朝堂百官拜賀太子涕泣不荅拜八月庚子制令太子即皇帝位朕稱太上皇制敕稱誥辛丑太上皇徙居興慶宫誥改元永貞立良娣王氏為太上皇后后憲宗之母也壬寅貶王伾開州司馬王叔文渝州司户伾尋病死貶所明年賜叔文死乙巳憲宗即位於宣政殿丙午昇平公主獻女口五十上曰上皇不受獻朕何敢違遂却之庚戌荆南獻毛􅀛二上曰朕所寳惟賢嘉禾神芝皆虛羙耳所以春秋不書祥瑞自今凡有嘉瑞但凖令申有司勿復以聞及珍禽竒獸皆毋得獻癸丑西川節度使南康忠武王韋臯薨臯在蜀二十一年重加賦斂豐貢獻以結主恩厚給賜以撫士卒士卒㛰嫁死喪皆供其資費以是得久安其位而士卒樂為之用服南詔摧吐蕃幕僚嵗久官崇者則為刺史已復還幕府終不使還朝恐泄其所為故也府庫既實時寛其民三年一復租賦蜀人服其智謀而畏其威至今畫像以為土神家家祀之支度副使劉闢自為留後朗州武陵龍陽江漲流萬餘家壬午奉義節度使伊慎入朝辛夘夏綏節度使韓全義入朝全義敗於溵水而還不朝覲而去上在藩邸聞其事而惡之全義懼乃請入朝劉闢使諸將表求節鉞朝廷不許己未以袁滋為劒南東西川山南西道安撫大使度支奏裴延齡所置别庫皆減正庫之物别貯之請併歸正庫從之辛酉遣度支鹽鐵轉運副使潘孟陽宣慰江淮行視租賦􅅦税利害因察官吏否臧百姓疾苦癸亥以尚書左丞鄭餘慶同平章事九月戊辰禮儀使奏曽太皇太后沈氏嵗月滋深迎訪理絶桉晉庾蔚之議尋求三年之外俟中壽而服之伏請以大行皇帝啓攅宫日皇帝帥百官舉哀即以其日為忌從之壬申監修國史韋執誼奏始令史官撰日曆己夘貶神䇿行軍司馬韓泰為撫州刺史司封郎中韓曄為池州刺史禮部員外郎栁宗元為邵州刺史屯田員外郎劉禹錫為連州刺史冬十月丁酉右僕射同平章事賈耽薨戊戌以中書侍郎同平章事袁滋同平章事充西川節度使徵劉闢為給事中舒王誼薨太常議曽大皇太后諡曰睿真皇后山人羅令則自長安如普潤矯稱太上皇誥徵兵於秦州刺史劉澭且説澭以廢立澭執送長安并其黨杖殺之己酉􅁙神武孝文皇帝于崇陵廟號德宗十一月己巳祔睿真皇后德宗皇帝主于太廟禮儀使杜黄裳等議以為國家法周制太祖猶后稷髙祖猶文王太宗猶武王皆不遷髙宗在三昭三穆之外請遷主于西夾室從之壬申貶中書侍郎同平章事韋執誼為崖州司馬執誼以嘗與王叔文異同且杜黄裳壻故獨後貶然叔文敗執誼亦自失形勢知禍且至雖尚為相常不自得奄奄無氣聞人行聲輙惶悸失色以至於貶戊寅以韓全義為太子少保致仕劉闢不受徵阻兵自守袁滋畏其彊不敢進上怒貶滋為吉州刺史復以右庶子武元衡為御史中丞朝議謂王叔文之黨或自員外郎出為刺史貶之太輕己夘再貶韓泰為䖍州司馬韓曄為饒州司馬栁宗元為永州司馬劉禹錫為朗州司馬又貶河中少尹陳諫為台州司馬和州刺史凌凖為連州司馬岳州刺史程异為郴州司馬回鶻懐信可汗卒遣鴻臚少卿孫杲臨弔冊其嗣為騰里野合俱録毗伽可汗十二月甲辰加山南東道節度使于頔同平章事以奉義節度使伊慎為右僕射己酉以給事中劉闢為西川節度副使知節度事上以初嗣位力未能討故也右諫議大夫韋丹上疏以為今釋闢不誅則朝廷可以指臂而使者惟兩京耳此外誰不為叛上善其言壬子以丹為東川節度使丹津之五世孫也辛酉百官請上上皇尊號曰應乾聖壽太上皇上尊號曰文武大聖孝德皇帝上許上上皇尊號而自辭不受壬戌以翰林學士鄭絪為中書侍郎同平章事以刑部郎中杜兼為蘇州刺史兼辭行上書稱李錡且反必奏族臣上然之留為吏部郎中資治通鑑卷第二百三十六
