front:
  text: 資治通鑑卷第二百二十八
  hash: sha256:dfdb8631172edb23805fcaf512f0406d5799e68ffeaf91f9b7745131bcacb316
body:
  text: 臣司馬光奉勑編集唐紀四十四盡十月不滿一年起昭陽大淵獻正月徳宗神武聖文皇帝三建中四年春正月丁亥隴右節度使張鎰與吐蕃尚結贊盟于清水庚寅李希烈遣其將李克誠襲陷汝州執别駕李元平元平本湖南判官薄有才藝性疎傲敢大言好論兵闗播竒之薦於上以為將相之器以汝州距許州最近擢元平為汝州别駕知州事元平至州即募工徒治城希烈隂使壯士往應募執役入數百人元平不之覺希烈遣克誠將數百騎突至城下應募者應之於内縳元平馳去元平爲人􅆌小無須見希烈恐懼便液汚地希烈罵之曰肓宰相以汝當我何相輕也以判官周晃爲汝州刺史又遣别將董待名等四出抄掠取尉氏圍鄭州官軍數爲所敗邏騎西至彭婆東都士民震駭竄匿山谷留守鄭叔則入保西苑上問計於盧􅂎對曰希烈年少驍將恃功驕慢將佐莫敢諫止誠得儒雅重臣奉宣聖澤爲陳逆順禍福希烈必革心悔過可不勞軍旅而服顔眞卿三朝舊臣忠直剛决名重海内人所信服眞其人也上以爲然甲午命眞卿詣許州宣慰希烈詔下舉朝失色眞卿乘驛至東都鄭叔則曰往必不免宜少留須後命眞卿曰君命也將焉避之遂行李勉表言失一元老為國家羞請留之又使人邀眞卿於道不及眞卿與其子書但敕以奉家廟撫諸孤而已至許州欲宣詔㫖希烈使其養子千餘人環繞慢罵㧞刃擬之為將剸啗之勢眞卿足不移色不變希烈遽以身蔽之麾衆令退館眞卿而禮之希烈欲遣眞卿還㑹李元平在座眞卿責之元平慙而起以密啓白希烈希烈意遂變留眞卿不遣朱滔王武俊田悦李納各遣使詣希烈上表稱臣勸進使者拜舞於希烈前説希烈曰朝廷誅滅功臣失信天下都統英武自天功烈蓋世已為朝廷所猜忌將有韓白之禍願亟稱尊號使四海臣民知有所歸希烈召顔眞卿示之曰今四王遣使見推不謀而同太師觀此事勢豈吾獨為朝廷所忌無所自容邪眞卿曰此乃四㐫何謂四王相公不自保功業為唐忠臣乃與亂臣賊子相從求與之同覆滅邪希烈不悦扶眞卿出它日又與四使同宴四使曰久聞太師重望今都統將稱大號而太師適至是天以宰相賜都統也眞卿叱之曰何謂宰相汝知有罵安禄山而死者顔杲卿乎乃吾兄也吾年八十知守節而死耳豈受汝曹誘脅乎四使不敢復言希烈乃使甲士十人守眞卿於館舍掘坎於庭云欲阬之眞卿怡然見希烈曰死生已定何必多端亟以一劒相與豈不快公心事邪希烈乃謝之戊戌以左龍武大將軍哥舒曜為東都汝州節度使將鳯翔邠寧涇原奉天好畤行營兵萬餘人討希烈又詔諸道共討之曜行至郟城遇希烈前鋒將陳利貞擊破之希烈勢小沮曜翰之子也希烈使其將封有麟據鄧州南路遂絶貢獻商旅皆不通壬寅詔治上津山路置郵驛二月戊申朔命鴻臚卿崔漢衡送區頰贊還吐蕃丙寅以河陽三城懷衛州為河陽軍丁卯哥舒曜克汝州擒周晃三月戊寅江西節度使曹王臯敗李希烈將韓霜露於黄梅斬之辛卯㧞黄州時希烈兵栅蔡山險不可攻臯聲言西取蘄州引舟師泝江而上希烈之將引兵循江隨戰去蔡山三百餘里臯乃復放舟順流而下急攻蔡山㧞之希烈兵還救之不及而敗臯遂進㧞蘄州表伊慎為蘄州刺史王鍔為江州刺史淮寧都虞候周曾鎮遏兵馬使王玢押牙姚憺韋清密輸􅅃於李勉李希烈遣曾與十將康秀琳將兵三萬攻哥舒曜至襄城曾等宻謀還軍襲希烈奉顔眞卿為節度使使玢憺清為内應希烈知之遣别將李克誠將騾軍三千人襲曾等殺之并殺玢憺及其黨甲午詔贈曾等官始韋清與曾等約事泄不相引故獨得免清恐終及禍説希烈請詣朱滔乞師希烈遣之行至襄邑逃奔劉洽希烈聞周曾等有變閉壁數日其黨冦尉氏鄭州者聞之亦遁歸希烈乃上表歸咎於周曾等引兵還蔡州外示悔過從順實待朱滔等之援也置顔眞卿於龍興寺丁酉荆南節度使張伯儀與淮寧兵戰於安州官軍大敗伯儀僅以身免亡其所持節希烈使人以其節及俘馘示顔眞卿眞卿號慟投地絶而復蘇自是不復與人言夏四月上以神䇿軍使白志貞為京城召募使募禁兵以討李希烈志貞請諸嘗為節度觀察都團練使者不問存没並勒其子弟帥奴馬自備資裝從軍授以五品官貧者甚苦之人心始搖上命宰相尚書與吐蕃區頰贊盟於豐邑里區頰贊以清水之盟疆埸未定不果盟己未命崔漢衡入吐蕃决於贊普庚申加永平宣武河陽都統李勉淮西招討使東都汝州節度使哥舒曜為之副以荆南節度使張伯儀為淮西應援招討使山南東道節度使賈耽江西節度使曹王臯為之副上督哥舒曜進兵曜至潁橋遇大雨還保襄城李希烈遣其將李光輝攻襄城曜擊却之五月乙酉潁王璬薨乙未以宣武節度使劉洽兼淄青招討使李晟謀取涿莫二州以絶幽魏往來之路與張孝忠之子升雲圍朱滔所署易州刺史鄭景濟於清苑累月不下滔以其司武尚書馬寔為留守將歩騎萬餘守魏營自將歩騎萬五千救清苑李晟軍大敗退保易州滔還軍瀛州張升雲奔滿城㑹晟病甚引軍還保定州王武俊以滔既破李晟留屯瀛州未還魏橋遣其給事中宋端趣之端見滔言頗不遜滔怒使謂武俊曰滔以熱疾蹔未南還大王二兄遽有云云滔以救魏博之故叛君弃兄如脱屣耳二兄必相疑惟二兄所為端還報武俊自辨於馬寔寔以狀白滔言趙王知宋端無禮於大王深加責讓實無它志武俊亦遣承令官鄭和隨寔使者見滔謝之滔乃悦相待如初然武俊以是益恨滔矣六月李抱眞使參謀賈林詣武俊壁詐降武俊見之林曰林來奉詔非降也武俊色動問其故林曰天子知大夫宿著誠效及登壇之日撫膺顧左右曰我本徇忠義天子不察諸將亦嘗共表大夫之志天子語使者曰朕前事誠誤悔之無及朋友失意尚可謝况朕為四海之主乎武俊曰僕胡人也為將尚知愛百姓况天子豈專以殺人為事乎今山東連兵暴骨如莽就使克㨗與誰守之僕不憚歸國但已與諸鎮結盟胡人性直不欲使曲在己天子誠能下詔赦諸鎮之罪僕當首唱從化諸鎮有不從者請奉辭伐之如此則上不負天子下不負同列不過五旬河朔定矣使林還報抱眞隂相約結庚戌初行税間架除陌錢法時河東澤潞河陽朔方四軍屯魏縣神䇿永平宣武淮南浙西荆南江泗沔鄂湖南黔中劒南嶺南諸軍環淮寧之境舊制諸道軍出境則仰給度支上優恤士卒毎出境加給酒肉本道糧仍給其家一人兼三人之給故將士利之各出軍纔逾境而止月費錢百三十餘萬緍常賦不能供判度支趙贊乃奏行二法所謂税間架者毎屋兩架為間上屋税錢二千中税千下税五百吏執筆握筭入人室廬計其數或有宅屋多而無它資者出錢動數百緍敢匿一間杖六十賞告者錢五十緍所謂除陌錢者公私給與及賣買毎緍官留五十錢給它物及相貿易者約錢為率敢隱錢百杖六十罰錢二千賞告者錢十緡其賞錢皆出坐事之家於是愁怨之聲盈於逺近丁卯徙彬王逾為丹王鄜王遘為簡王庚午答蕃判官監察御史于頔與吐蕃使者論刺没藏至自青海言疆埸已定請遣區頰贊歸國秋七月甲申以禮部尚書李揆為入蕃㑹盟使壬辰詔諸將相與區頰贊盟於城西李揆有才望盧􅂎惡之故使之入吐蕃揆言於上曰臣不憚逺行恐死於道路不能逹詔命上為之惻然謂杞曰揆無乃太老對曰使逺夷非諳練朝廷故事者不可且揆行則自今年少於揆者不敢辭逺使矣八月丁未李希烈將兵三萬圍哥舒曜於襄城詔李勉及神䇿將劉徳信將兵救之乙卯希烈將曹季昌以隨州降尋復為其將康叔夜所殺初上在東宫聞監察御史嘉興陸贄名即位召為翰林學士數問以得失時兩河用兵久不决賦役日滋贄以兵窮民困恐别生内變乃上奏其略曰克敵之要在乎將得其人馭將之方在乎操得其柄將非其人者兵雖衆不足恃操失其柄者將雖材不為用又曰將不能使兵國不能馭將非止費財翫冦之弊亦有不戢自焚之災又曰今兩河淮西為叛亂之帥者獨四五凶人而已尚恐其中或傍遭詿誤内蓄危疑蒼黄失圖勢不得止況其餘衆蓋並脅從茍知全生豈願為惡又曰無紓目前之虞或興意外之患人者邦之本也財者人之心也其心傷則其本傷其本傷則枝榦顛瘁矣又曰人揺不寧事變難測是以兵貴拙速不尚巧遟若不靖於本而務救於末則救之所為乃禍之所起也又論闗中形勢以為王者蓄威以昭徳偏廢則危居重以馭輕倒持則悖王畿者四方之本也太宗列置府兵分􅀠禁衛大凢諸府八百餘所而在闗中者殆五百焉舉天下不敵闗中之半則居重馭輕之意明矣承平漸久武備浸㣲雖府衛具存而卒乘罕習故禄山竊倒持之柄乘外重之資一舉滔天兩京不守尚賴西邊有兵諸牧有馬毎州有糧故肅宗得以中興乾元之後繼有外虞悉師東討邊備既弛禁戒亦空吐蕃乘虛深入為冦故先皇帝莫與為禦避之東遊是皆失居重馭輕之權忘深根固柢之慮内冦則崤函失險外侵則汧渭為戎于斯之時雖有四方之師寧救一朝之患陛下追想及此豈不為之寒心哉今朔方太原之衆逺在山東神䇿六軍之兵繼出闗外儻有賊臣啗冦􅃛虜覷邊伺隙乘虛㣲犯亭障此愚臣所竊憂也未審陛下其何以禦之側聞伐叛之初議者多易其事僉謂有征無戰役不逾時計兵未甚多度費未甚廣於事為無擾於人為不勞曾不料兵連禍拏變故難測日引月長漸乖始圖往嵗為天下所患咸謂除之則可致升平者李正已李寶臣梁崇義田悦是也往嵗謂國家所信咸謂任之則可除禍亂者朱滔李希烈是也既而正巳死李納繼之寶臣死惟岳繼之崇義卒希烈叛惟岳戮朱滔攜然則往嵗之所患者四去其三矣而患竟不衰往嵗之所信者今則自叛矣而餘又難保是知立國之安危在勢任事之濟否在人勢茍安則異類同心也勢茍危則舟中敵國也陛下豈可不追鑒往事惟新令圖修偏廢之柄以靖人復倒持之權以固國而乃孜孜汲汲極思勞神徇無已之求望難必之效乎今闗輔之間徴􅀤已甚宫苑之内備衛不全萬一將帥之中又如朱滔希烈或負固邊壘誘致豺狼或竊發郊畿驚犯城闕此亦愚臣所竊為憂者也未審陛下復何以備之陛下儻過聽愚計所遣神䇿六軍李晟等及節將子弟悉可追還明敕涇隴邠寧但令嚴備封守仍云更不徵􅀤使知各保安居又降徳音罷京城及畿縣間架等雜税則冀已輸者弭怨見處者獲寧人心不揺邦本自固上不能用壬戌以汴西運使崔縱兼魏州四節度都糧料使縱渙之子也九月丙戌神䇿將劉徳信宣武將唐漢臣與淮寧將李克誠戰敗於滬澗時李勉遣漢臣將兵萬人救襄城上遣徳信帥諸將家應募者三千人助之勉奏李希烈精兵皆在襄城許州空虛若襲許州則襄城圍自解遣二將趣許州未至數十里上遣中使責其違詔二將狼狽而返無復斥候克誠伏兵邀之殺傷太半漢臣奔大梁徳信奔汝州希烈遊兵剽掠至伊闕勉復遣其將李堅帥四千人助守東都希烈以兵絶其後堅軍不得還汴軍由是不振襄城益危上以諸軍討淮寧者不相統壹庚子以舒王謨為荆襄等道行營都元帥更名誼以户部尚書蕭復為長史右庶子孔巢父為左司馬諫議大夫樊澤為右司馬自餘將佐皆選中外之望未行㑹涇師作亂而止復嵩之孫巢父孔子三十七世孫也上􅀤涇原等諸道兵救襄城冬十月丙午涇原節度使姚令言將兵五千至京師軍士冐雨寒甚多攜子弟而來冀得厚賜遣其家既至一無所賜丁未􅀤至滻水詔京兆尹王翃犒師惟糲食菜餤衆怒蹴而覆之因揚言曰吾輩將死於敵而食且不飽安能以㣲命拒白刃邪聞瓊林大盈二庫金帛盈溢不如相與取之乃擐甲張旗鼓譟還趣京城令言入辭尚在禁中聞之馳至長樂阪遇之軍士射令言令言抱馬鬛突入亂兵呼曰諸君失計東征立功何患不富貴乃為族滅之計乎軍士不聽以兵擁令言而西上遽命賜帛人二匹衆益怒射中使又命中使宣慰賊已至通化門外中使出門賊殺之又命出金帛二十車賜之賊已入城喧聲浩浩不復可遏百姓狼狽駭走賊大呼告之曰汝曹勿恐不奪汝商貨僦質矣不税汝間架陌錢矣上遣普王誼翰林學士姜公輔出慰諭之賊已陳於丹鳯門外小民聚觀者以萬計初神䇿軍使白志貞掌召募禁兵東征死亡者志貞皆隱不以聞但受市井富兒賂而補之名在軍籍受給賜而身居市廛為販鬻司農卿叚秀實上言禁兵不精其數全少卒有患難將何待之不聽至是上召禁兵以禦賊竟無一人至者賊已斬闗而入上乃與王貴妃韋淑妃太子諸王唐安公主自苑北門出王貴妃以傳國寶繫衣中以從後宫諸王公主不及從者什七八初魚朝恩既誅宦官不復典兵有竇文塲霍仙鳴者嘗事上於東宫至是帥宦官左右僅百人以從使普王誼前驅太子執兵以殿司農卿郭曙以部曲數十人獵苑中聞蹕謁道左遂以其衆從曙曖之弟也右龍武軍使令狐建方教射於軍中聞之帥麾下四百人從乃使建居後為殿姜公輔叩馬言曰朱泚嘗為涇帥坐弟滔之故廢處京師心嘗怏怏臣甞謂陛下既不能推心待之則不如殺之毋貽後患今亂兵若奉以為主則難制矣請召使從行上倉猝不暇用其言曰無及矣遂行夜至咸陽飯數匕而過時事出非意羣臣皆不知乘輿所之盧􅂎闗播踰中書垣而出白志貞王翃及御史大夫于頎中丞劉從一戸部侍郎趙贊翰林學士陸贄吴通㣲等追及上於咸陽頎頔之從父兄弟從一齊賢之從孫也賊入宫登含元殿大呼曰天子已出宜人自求富遂讙噪爭入府庫運金帛極力而止小民因之亦入宫盜庫物岀而復入通夕不巳其不能入者剽奪於路諸坊居民各相帥自守姚令言與亂兵謀曰今衆無主不能持久朱太尉閑居私第請相與奉之衆許諾乃遣數百􅀐迎朱泚於晉昌里第夜半泚按轡列炬傳呼入宫居含元殿設警嚴自稱權知六軍戊申旦泚徙居白華殿出牓於外稱涇原將士久處邊陲不閑朝禮輒入宫闕致驚乘輿西出廵幸太尉巳權臨六軍應神䇿等軍士及文武百官凡有禄食者悉詣行在不能往者即詣本司若出三日檢勘彼此無名者皆斬於是百官出見泚或勸迎乘輿泚不悅百官稍稍遁去源休以使回紇還賞薄怨朝廷入見泚屏人宻語移時為泚陳成敗引符命勸之僭逆泚喜然猶未決􅀫衛諸軍舉白幡降者列於闕前甚衆泚夜於苑門出兵旦自通化門入絡驛不絶張弓露刃欲以威衆上思桑道茂之言自咸陽幸奉天縣僚聞車駕猝至欲逃匿山谷主簿蘇弁止之弁良嗣之兄孫也文武之臣稍稍繼至己酉左金吾大將軍渾瑊至奉天瑊素有威望衆心恃之稍安庚戌源休勸朱泚禁十城門毋得出朝士朝士往往易服為傭僕濳出休又為泚説誘文武之士使之附泚檢校司空同平章事李忠臣久失兵柄太僕卿張光晟自負其才皆鬱鬱不得志泚悉起而用之工部侍郎蔣鎭出亡墜馬傷足為泚所得先是休以才能光晟以節義鎭以清素都官員外郎彭偃以文學太常卿敬釭以勇略皆為時人所重至是皆為泚用鳯翔涇原將張廷芝叚誠諫將數千人救襄城未出潼􅀜聞朱泚據長安殺其大將隴右兵馬使戴蘭潰歸於泚泚於是自謂衆心所歸反謀遂定以源休為京兆尹判度支李忠臣為皇城使百司供億六軍宿衛咸擬乘輿辛亥以渾瑊為京畿渭北節度使行在都虞候白志貞為都知兵馬使令􅀌建為中軍鼓角使以神䇿都虞候侯仲莊為左衛將軍兼奉天防城使朱泚以司農卿叚秀實久失兵柄意其必怏怏遣數十騎召之秀實閉門拒之騎士踰垣入劫之以兵秀實自度不免乃謂子弟曰國家有患吾於何避之當以死徇社稷汝曹宜人自求生乃往見泚泚喜曰叚公來吾事濟矣延坐問計秀實説之曰公本以忠義著聞天下今涇軍以犒賜不豐遽有披猖使乘輿播越夫犒賜不豐有司之過也天子安得知之公宜以此開諭將士示以禍福奉迎乘輿復歸宫闕此莫大之功也泚黙然不悦然以秀實與己皆為朝廷所廢遂推心委之左驍衛將軍劉海賔涇原都虞􅃸何明禮孔目官岐靈岳皆秀實素所厚也秀實宻與之謀誅泚迎乘輿上初至奉天詔徵近道兵入援有上言朱泚為亂兵所立且來攻城宜早修守備盧􅂎切齒言曰朱泚忠貞羣臣莫及柰何言其從亂傷大臣心臣請以百口保其不反上亦以為然又聞羣臣勸泚奉迎乃詔諸道援兵至者皆營於三十里外姜公輔諫曰今宿衛單寡防慮不可不深若泚竭忠奉迎何憚於兵多如其不然有備無患上乃悉召援兵入城盧􅂎及白志貞言於上曰臣觀朱泚心迹必不至為逆願擇大臣入京城宣慰以察之上以問從臣皆畏憚莫敢行金吾將軍吴溆獨請行上悦溆退而告人曰食其禄而違其難何以為臣吾幸託胏附非不知往必死但舉朝無蹈難之臣使聖情慊慊耳遂奉詔詣泚泚反謀已決雖陽為受命館溆於客省尋殺之溆湊之兄也泚遣涇原兵馬使韓旻將鋭兵三千聲言迎大駕實襲奉天時奉天守備單弱叚秀實謂岐靈岳曰事急矣使靈岳詐為姚令言符令旻且還當與大軍俱􅀤竊令言印未至秀實倒用司農印印符募善走者追之旻至駱驛得符而還秀實謂同謀曰旻來吾屬無類矣我當直􅅮泚殺之不克則死終不能為之臣也乃令劉海賔何明禮隂結軍中之士欲使應之於外旻兵至泚令言大驚岐靈岳獨承其罪而死不以及秀實等是日泚召李忠臣源休姚令言及秀實等議稱帝事秀實勃然起奪休象笏前唾泚面大罵曰狂賊吾恨不斬汝萬叚豈從汝反邪因以笏擊泚泚舉手扞之纔中其額濺血灑地泚與秀實相􅅮恟恟左右猝愕不知所為海賔不敢進乘亂而逸忠臣前助泚泚得匍匐脱走秀實知事不成謂泚黨曰我不同汝反何不殺我衆爭前殺之泚一手承血一手止其衆曰義士也勿殺秀實巳死泚哭之甚哀以三品禮葬之海賔縗服而逃後二日捕得殺之亦不引何明禮明禮從泚攻奉天復謀殺泚亦死上聞秀實死恨委用不至涕泗久之壬子以少府監李昌巙為京畿渭南節度使鳯翔節度使同平章事張鎰性儒緩好修飾邊幅不習軍事聞上在奉天欲迎大駕具服用貨財獻于行在後營將李楚琳為人剽悍軍中畏之嘗事朱泚為泚所厚行軍司馬齊映與同幕齊抗言於鎰曰不去楚琳必為亂首鎰命楚琳出屯隴州楚琳託事不時發鎰方以迎駕為憂謂楚琳已去矣楚琳夜與其黨作亂鎰縋城而走賊追及殺之判官王沼等皆死映自水竇出抗為傭保負荷而逃皆免始上以奉天迫隘欲幸鳯翔户部尚書蕭復聞之遽請見曰陛下大誤鳯翔將卒皆朱泚故部曲其中必有與之同惡者臣尚憂張鎰不能久豈得以鑾輿蹈不測之淵乎上曰吾行計已决試為卿留一日明日聞鳯翔亂乃止齊映齊抗皆詣奉天以映為御史中丞抗為侍御史楚琳自為節度使降于朱泚隴州刺史郝通奔于楚琳商州團練兵殺其刺史謝良輔朱泚自白華殿入宣政殿自稱大秦皇帝改元應天癸丑泚以姚令言為侍中􅀜内元帥李忠臣為司空兼侍中源休為中書侍郎同平章事判度支蔣鎭為吏部侍郎樊系為禮部侍郎彭偃為中書舍人自餘張光晟等各拜官有差立弟滔為皇大弟姚令言與源休共掌朝政凡泚之謀畫遷除軍旅資糧皆禀於休休勸泚誅翦宗室在京城者以絶人望殺郡王王子王孫凡七十七人尋又以蔣鎮為門下侍郎李子平為諫議大夫並同平章事鎮憂懼毎懷刀欲自殺又欲亡竄然性怯竟不果源休勸泚誅朝士之竄匿者以脅其餘鎭力救之賴以全者甚衆樊系為泚譔册文既成仰藥而死大理卿膠水蔣沇詣行在為賊所得逼以官沇絶食稱病濳竄得免哥舒曜食盡弃襄城奔洛陽李希烈陷襄城右龍武將軍李觀將衛兵千餘人從上於奉天上委之召募數日得五千餘人列之通衢旗鼓嚴整城人為之增氣姚令言之東出也以兵馬使京兆馮河清為涇原留後判官河中姚况知涇州事河清况聞上幸奉天集將士大哭激以忠義􅀤甲兵器械百餘車通夕輸行在城中方苦無甲兵得之士氣大振詔以河清為四鎮北庭行營涇原節度使況為行軍司馬上至奉天數日右僕射同平章事崔寧始至上喜甚撫勞有加寧退謂所親曰主上聦明英武從善如流但為盧􅂎所惑以至於此因澘然出涕􅂎聞之與王翃謀陷之翃言於上曰臣與寧俱出京城寧數下馬便液久之不至有顧望意㑹朱泚下詔以左丞柳渾同平章事寧為中書令渾襄陽人也時亡在山谷翃使盩厔尉康湛詐為寧遺朱泚書獻之􅂎因譖寧與朱泚結盟約為内應故獨後至乙卯上遣中使引寧就幕下云宣宻㫖二力士自後縊殺之中外皆稱其寃上聞之乃赦其家朱泚遣使遺朱滔書稱三秦之地指日克平大河之北委卿除殄當與卿㑹于洛陽滔得書西向舞蹈宣示軍府移牒諸道以自誇大上遣中使告難於魏縣行營諸將相與慟哭李懷光帥衆赴長安馬燧李芁各引兵歸鎮李抱眞退屯臨洺丁巳以户部尚書蕭復為吏部尚書吏部郎中劉從一為刑部侍郎翰林學士姜公輔為諫議大夫並同平章事朱泚自將逼奉天軍勢甚盛以姚令言為元帥張光晟副之以李忠臣為京兆尹皇城留守仇敬忠為同華等州節度使拓東王以扞􅀜東之師李日月為西道先鋒經略使邠寧留後韓遊瓌慶州刺史論惟明監軍翟文秀受詔將兵三千拒泚於便橋與泚遇於醴泉遊瓌欲還趣奉天文秀曰我向奉天賊亦隨至是引賊以迫天子也不若留壁於此賊必不敢越我向奉天若不顧而過則與奉天夾攻之遊瓌曰賊彊我弱若賊分軍以綴我直趣奉天奉天兵亦弱何夾攻之有我今急趣奉天所以衛天子也且吾士卒飢寒而賊多財彼以利誘吾卒吾不能禁也遂引兵入奉天泚亦隨至官軍出戰不利泚兵爭門欲入渾瑊與遊瓌血戰竟日門内有草車數乘瑊使虞􅃸高固帥甲士以長刀斫賊皆一當百曳車塞門縱火焚之衆軍乘火擊賊賊乃退㑹夜泚營於城東三里擊柝張火布滿原野使西明寺僧法堅造攻具毁佛寺以為梯衝韓遊瓌曰寺材皆乾薪但具火以待之固侃之玄孫也泚自是日來攻城瑊遊瓌等晝夜力戰幽州兵救襄城者聞泚反突入潼􅀜歸泚於奉天普潤戍卒亦歸之有衆數萬上與陸贄語及亂故深自克責贄曰致今日之患皆羣臣之罪也上曰此亦天命非由人事䞇退上䟽以為陛下志壹區宇四征不庭兇渠稽誅逆將繼亂兵連禍結行及三年徵師日滋賦歛日重内自京邑外洎邊陲行者有鋒刃之憂居者有誅求之困是以叛亂繼起怨讟並興非常之虞億兆同慮唯陛下穆然凝􅃉獨不得聞至使兇卒鼓行白晝犯闕豈不以乘我間隙因人攜離哉陛下有股肱之臣有耳目之任有諫諍之列有備衛之司見危不能竭其誠臨難不能效其死臣所謂致今日之患羣臣之罪者豈徒言歟聖㫖又以國家興衰皆有天命臣聞天所視聽皆因於人故祖伊責紂之辭曰我生不有命在天武王數紂之罪曰乃曰吾有命罔懲其侮此又捨人事而推天命必不可之理也易曰視履考祥又曰吉凶者失得之象此乃天命由人其義明矣然則聖哲之意六經㑹通皆謂禍福由人不言盛衰有命蓋人事理而天命降亂者未之有也人事亂而天命降康者亦未之有也自頃征討頗頻刑網稍宻物力竭耗人心驚疑如居風濤洶洶靡定上自朝列下逹蒸黎日夕族黨聚謀咸憂必有變故旋屬涇原叛卒果如衆庶所虞京師之人動逾億計固非悉知筭術皆曉占書則明致冦之由未必盡闗天命臣聞理或生亂亂或資理有以無難而失守有因多難而興邦今生亂失守之事則既往不可復追矣其資理興邦之業在陛下克勵而謹脩之何憂乎亂人何畏乎厄運勤勵不息足致升平豈止盪滌祓氛旋復宫闕而已田悦説王武俊使與馬寔共擊李抱眞於臨洺抱眞復遣賈武説武俊曰臨洺兵精而有備未易輕也今戰勝得地則利歸魏􅀶不勝則恒冀大傷易定滄趙皆大夫之故地也不如先取之武俊乃辭悦與馬寔北歸壬戌悦送武俊於館陶執手泣别下至將士贈遺甚厚先是武俊召回紇兵使絶李懷光等糧道懷光等已西去而回紇逹干將回紇千人雜虜二千人適至幽州北境朱滔因説之欲與俱詣河南取東都應接朱泚許以河南子女金帛賂之滔娶回紇女為側室回紇謂之朱郎且利其俘掠許之賈林復説武俊曰自古國家有患未必不因之更興况主上九葉天子聰明英武天下誰肯捨之共事朱泚乎滔自為盟主以來輕蔑同列河朔古無冀國冀乃大夫之封域也今滔稱冀王又西倚其兄北引回紇其志欲盡吞河朔而王之大夫雖欲為之臣不可得矣且大夫雄勇善戰非滔之比又本以忠義手誅叛臣當時宰相處置失宜為滔所誑誘故蹉跌至此不若與昭義併力取滔其勢必獲滔既亡則泚自破矣此不世之功轉禍為福之道也今諸道輻湊攻泚不日當平天下已定大夫乃悔而歸國則已晩矣時武俊已與滔有隙因攘袂作色曰二百年天子吾不能臣豈能臣此田舍兒乎遂密與抱眞及馬燧相結約為兄弟然猶外事滔禮甚謹與田悦各遣使見滔於河間賀朱泚稱尊號且請馬寔之兵共攻康日知於趙州汝鄭應援使劉徳信將子弟軍在汝州聞難引兵入援與泚衆戰於見子陵破之以東渭橋有轉輸積粟癸亥進屯東渭橋朱泚夜攻奉天東西南三面甲子渾瑊力戰却之左龍武大將軍吕希倩戰死乙丑泚復攻城將軍高重㨗與泚將李日月戰於梁山之隅破之乘勝逐北身先七卒賊伏兵擒之其麾下十餘人奮不顧死追奪之賊不能拒乃斬其首弃其身而去麾下收之入城上親撫而哭之盡哀結蒲為首而葬之贈司空朱泚見其首亦哭之曰忠臣也束蒲為身而葬之李日月泚之驍將也戰死於奉天城下泚歸其尸於長安厚葬之其母竟不哭罵曰奚奴國家何負於汝而反死巳晩矣及泚敗賊黨皆族誅獨日月之母不坐己巳加渾瑊京畿渭南北金商節度使壬申王武俊與馬寔至趙州城下􅀄朱泚鎮鳯翔遣其將牛雲光將幽州兵五百人戍隴州以隴右營田判官韋臯領隴右留後及郝通奔鳯翔牛雲光詐疾欲俟臯至伏兵執之以應泚事泄帥其衆奔泚至汧陽遇泚遣中使蘇王齎詔書加臯中丞玉説雲光曰韋臯書生也君不如與我俱之隴州臯幸而受命乃吾人也不受命君以兵誅之如取孤㹠耳雲光從之臯從城上問雲光曰曏者不告而行今而復來何也雲光曰曏者未知公心今公有新命故復來願託腹心臯乃先納蘇玉受其詔書謂雲光曰大使茍無異心請悉納甲兵使城中無疑衆乃可入雲光以臯書生易之乃悉以甲兵輸之而入明日臯宴玉雲光及其卒於郡舍伏甲誅之築壇盟將士曰李楚琳賊虐本使既不事上安能恤下宜相與討之遣兄平弇詣奉天復遣使求援於吐蕃資治通鑑卷第二百二十八
