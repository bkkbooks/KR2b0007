body:
  text: 六月丁未以大常尹勤爲司空郡國三十七雨水己未太后詔減太官導官尚方内署諸服御珍膳靡麗難成之物自非供陵廟稻􅆝米不得導擇朝夕一肉飯而已舊太官湯官經用嵗且二萬萬自是裁數千萬及郡國所貢皆減其過半悉斥賣上林鷹犬離宫别館儲峙米糒薪炭悉令省之丁卯詔免遣掖庭宮人及宗室沒入者皆為庶民秋七月庚寅敕司􅀠校尉部刺史曰間者郡國或有水災妨害秋稼朝廷惟咎憂惶悼懼而郡國欲獲豐穰虚飾之譽遂覆蔽災害多張墾田不揣流亡競增戶口掩匿盗賊令姦惡無懲署用非次選舉乖宜貪苛慘毒延及平民刺史垂頭塞耳阿私下比不畏于天不愧于人假貸之恩不可數恃自今以後將紏其罰二千石長吏其各實覈所傷害為除田租芻槀八月辛卯帝崩癸丑殯于崇德前殿太后與兄車騎將軍隲虎賁中郎將悝等定䇿禁中其夜使騭持節以王青蓋車迎清河王子祜齋于殿中皇太后御崇徳殿百官皆吉服陪位引拜祜為長安矦乃下詔以祜為孝和皇帝嗣又作䇿命有司讀䇿畢太尉奉上璽綬即皇帝位太后猶臨朝詔告司􅀠校尉河南尹南陽太守曰毎覽前代外戚賓客濁亂奉公為民患苦咎在執灋怠懈不輙行其罰故也今車騎將軍騭等雖懐敬順之志而宗門廣大姻戚不少賔客姦猾多干禁憲其明加檢敕勿相容䕶自是親屬犯罪無所假貸九月六州大水丙寅葬孝殤皇帝于康陵以連遭大憂百姓苦役方中祕藏及諸工作事事減約十分居一乙亥隕石于陳留詔以北地梁慬為西域副校尉慬行至河西㑹西域諸國反攻都護任尚於䟽勒尚上書求救詔慬將河西四郡羌胡五千騎馳赴之慬未至而尚已得解詔徴尚還以騎都尉叚禧為都護西域長史趙博為騎都尉禧博守它乾城城小梁慬以為不可固乃譎􅀃􅀛兹王白霸欲入共保其城白霸許之吏民固諌白霸不聽慬旣入遣將急迎叚禧趙博合軍八九千人􅀛兹吏民並叛其王而與温宿姑墨數萬兵反共圍城慬等出戰大破之連兵數月胡衆敗走乘勝追撃凡斬首萬餘級獲生口數千人􅀛兹乃定冬十月四州大水雨雹清河孝王慶病篤上書求葬樊濯宋貴人􅃁旁十二月甲子王薨乙酉罷魚龍曼延戯尚書郎南陽樊凖以儒風寖衰上䟽曰臣聞人君不可以不學光武皇帝受命中興東西誅戰不遑啓處然猶投戈講蓺息馬論道孝明皇帝庶政萬機無不簡心而垂情古典游意經蓺每饗射禮畢正坐自講諸儒並聽四方欣欣又多徴名儒布在廊廟每讌㑹則論難衎衎共求政化期門羽林介胄之士悉通孝經化自聖躬流及蠻荒是以議者每稱盛時咸言永平今學者益少逺方尤甚博士倚席不講儒者競論浮麗忘謇謇之忠習諓諓之辭臣愚以為宜下明詔愽求幽隠寵進儒雅以俟聖上講習之期太后深納其言詔公卿中二千石各舉隠士大儒務取髙行以勸後進妙簡博士必得其人漢孝安皇帝上永初元年春正月癸酉朔赦天下蜀郡徼外羌内屬二月丁卯分清河國封帝弟常保為廣川王庚午司徒梁鮪薨三月癸酉日有食之己卯永昌徼外僬僥種夷陸類等舉種内附甲申葬清河孝王於廣丘司空宗正護䘮事儀比東海恭王自和帝之䘮鄧騭兄弟常居禁中騭不欲乆在内連求還第太后許之夏四月封太傅張禹太尉徐防司空尹勤車騎將軍鄧騭城門校尉鄧悝虎賁中郎將鄧弘黄門郎鄧閶皆為列矦食邑各萬户騭以定策功增三千户騭及諸弟辭讓不獲遂逃避使者閒關詣闕上䟽自陳至於五六乃許之五月甲戌以長樂衞尉魯恭為司徒恭上言舊制立秋乃行薄刑自永元十五年以來改用孟夏而刺史太守因以盛夏徴召農民拘對考驗連滯無已上逆時氣下傷農業案月令孟夏斷薄刑者謂其輕罪已正不欲令乆繫故時斷之也臣愚以為今孟夏之制可從此令其决獄案考皆以立秋為斷又奏孝章皇帝欲助三正之微定律著令斷獄皆以冬至之前小吏不與國同心者率入十一月得死罪賊不問曲直便即格殺雖有疑罪不復讞正可令大辟之科盡冬月乃斷朝廷皆從之丁丑詔封北海王睦孫夀光矦普為北海王九眞徼外夜郎蠻夷舉土内屬西域都護叚禧等雖保龜兹而道路隔塞檄書不通公卿議者以為西域阻逺數有背叛吏士屯田其費無巳六月壬戌罷西域都䕶遣騎都尉王弘發關中兵迎禧及梁慬趙博伊吾盧栁中屯田吏士而還初燒當羌豪東號之子麻奴隨父來降居于安定時諸降羌布在郡縣皆為吏民豪右所徭役積以愁怨及王弘西迎叚禧發金城隴西漢陽羌數百千騎與俱郡縣廹促發遣羣羌懼逺屯不還行到酒泉多有散叛諸郡各發兵邀遮或覆其廬落於是勒姐當煎大豪東岸等愈驚遂同時犇潰麻奴兄弟因此與種人俱西出塞先零别種滇零與鍾􅆧諸種大為冦掠斷隴道時羌歸附既乆無復器甲或持竹竿木枝以代戈矛或負板案以為楯或執銅鏡以象兵郡縣畏懦不能制丁卯赦除諸羌相連結謀叛逆者罪秋九月庚午太尉徐防以災異寇賊策免三公以災異免自防始辛未司空尹勤以水雨漂流䇿免仲長統昌言曰光武皇帝愠數丗之失權忿彊臣之竊命矯枉過直政不任下雖置三公事歸臺閣自此以來三公之職僃貟而已然政有不治猶加譴責而權移外戚之家寵被近習之竪親其黨類用其私人内充京師外布列郡顛倒賢愚貿易選舉疲駑守境貪殘牧民撓擾百姓忿怒四夷招致乖叛亂離斯瘼怨氣並作隂陽失和三光虧缺怪異數至蟲螟食稼水旱為災此皆戚宦之臣所致然也反以䇿讓三公至于死免乃足為叫呼蒼天號咷泣血者矣又中世之選三公也務於清慤謹慎循常習故者是以婦女之檢柙鄉曲之常人耳惡足以居斯位邪埶既如彼選又如此而欲望三公勲立於國家績加於生民不亦逺乎昔文帝之於鄧通可謂至愛而猶展申徒嘉之志夫見任如此則何患於左右小臣哉至如近世外戚宦豎請託不行意氣不滿立能陷人於不測之禍惡可得彈正者哉曩者任之重而責之輕今者任之輕而責之重光武奪三公之重至今而加甚不假后黨以權數世而不行蓋親䟽之埶異也今人主誠専委三公分任責成而在位病民舉用失賢百姓不安爭訟不息天地多變人物多妖然後可以分此罪矣壬午詔太僕少府減黄門鼔吹以補羽林士廐馬非乗輿常所御者皆減半食諸所造作非供宗廟園陵之用皆且止庚寅以太傅張禹為太尉太常周章為司空大長秋鄭衆中常侍蔡倫等皆秉勢豫政周章數進直言太后不能用初太后以平原王勝有痼疾而貪殤帝孩抱養爲已子故立焉及殤帝崩羣臣以勝疾非痼意咸歸之大后以前不立勝恐後為怨乃迎帝而立之周章以衆心不附宻謀閉宫門誅鄧騭兄弟及鄭衆蔡倫劫尚書廢太后於南宫封帝為逺國王而立平原王事覺冬十一月丁亥章自殺戊子敕司􅀠校尉冀并二州刺史民訛言相驚棄􅂢舊居老弱相􅂝窮困道路其各敇所部長吏躬親曉喻若欲歸本郡在所為封長檄不欲勿彊十二月乙卯以潁川太守張敏為司空詔車騎將軍鄧騭征西校尉任尚將五營及諸郡兵五萬人屯漢陽以僃羌是嵗郡國十八地震四十一大水二十八大風雨雹鮮卑大人燕荔陽詣闕朝賀太后賜燕荔陽王印綬赤車參駕令止烏桓校尉所居寗城下通胡市因築南北兩部質館鮮卑邑落百二十部各遣入質二年春正月鄧騭至漢陽諸郡兵未至鍾羌數千人擊敗騭軍於冀西殺千餘人梁慬還至敦煌逆詔慬留為諸軍援慬至張掖破諸羌萬餘人其能脱者十二三進至姑臧羌大豪三百餘人詣慬降並慰譬遣還故地御史中丞樊凖以郡國連年水旱民多飢困上䟽請令太官尚方考功上林池籞諸官實減無事之物五府調省中都官吏京師作者又被災之郡百姓凋殘恐非賑給所能勝贍雖有其名終無其實可依征和元年故事遣使持節慰安尤困乏者徙置荆揚孰郡今雖有西屯之役冝先東州之急太后從之悉以公田賦與貧民即擢準與議郎吕倉並守光禄大夫二月乙丑遣凖使冀州倉使兖州稟貸流民咸得蘇息夏旱五月丙寅皇太后幸洛陽寺及若盧獄録囚徒洛陽有囚實不殺人而被考自誣羸困輿見畏吏不敢言將去舉頭若欲自訴太后察視覺之即呼還問狀具得枉實即時收洛陽令下獄抵罪行未還宮澍雨大降六月京師及郡國四十大水大風雨雹秋七月太白入北斗閏月辛丑廣川王常保薨無子國除癸未蜀郡徼外羌舉土内屬冬鄧騭使任尚及從事中郎河内司馬鈞率諸郡兵與滇零等數萬人戰於平襄尚軍大敗死者八千餘人羌衆遂大盛朝廷不能制湟中諸縣粟石萬錢百姓死亡不可勝數而轉運難劇故左校令河南龐參先坐灋輸作若盧使其子俊上書曰方今西州流民擾動而徴發不絶水潦不休地力不復重之以大軍疲之以逺戍農功消於轉運資財竭於徴發田疇不得墾闢禾稼不得收入搏手困窮無望來秋百姓力屈不復堪命臣愚以為萬里運糧逺就羌戎不若緫兵養衆以待其疲車騎將軍騭宜且振旅留征西校尉任尚使督涼州士民轉居三輔休傜役以助其時止煩賦以益其財令男得耕種女得織絍然後畜精鋭乘懈沮出其不意攻其不僃則邊民之仇報犇北之耻雪矣書奏㑹樊準上䟽薦參太后即擢參於徒中召拜謁者使西督三輔諸軍屯十一月辛酉詔鄧騭還師留任尚屯漢陽為諸軍節度遣使迎拜騭為大將軍旣至使大鴻臚親迎中常侍郊勞王主以下􅇋望於道寵靈顯赫光震都鄙滇零自稱天子於北地招集武都參狼上郡西河諸雜種羌斷隴道寇鈔三輔南入益州殺漢中太守董炳梁慬受詔當屯金城聞羌寇三輔即引兵赴擊轉戰武功美陽閒連破走之羌稍退散十二月廣漢塞外參狼羌降是嵗郡國十二地震三年春正月庚子皇帝加元服赦天下遣騎都尉任仁督諸郡屯兵救三輔仁戰數不利當煎勒姐羌攻沒破羌縣鍾羌攻沒臨洮縣執隴西南部都尉三月京師大饑民相食壬辰公卿詣闕謝詔務思變復以助不逮壬寅司徒魯恭罷恭再在公位選辟髙第至列卿郡守者數十人而門下􅂄舊或不蒙薦舉至有怨望者恭聞之曰學之不講是吾憂也諸生不有鄉舉者乎終無所言亦不借之議論學者受業必窮核問難道成然後謝遣之學者曰魯公謝與議論不可虛得夏四月丙寅以大鴻臚九江夏勤為司徒三公以國用不足奏令吏民入錢榖得為關内矦虎賁羽林郎五官大夫官府吏緹騎營士各有差甲申清河愍王虎威薨無子五月丙申封樂安王寵子延平為清河王奉孝王後六月漁陽烏􅁊與右北平胡千餘冦代郡上谷漢人韓琮隨匃奴南單于入朝既還説南單于云關東水潦人民飢餓死盡可擊也單于信其言遂反秋七月海賊張伯路等冦濵海九郡殺二千石令長遣侍御史巴郡龐雄督州郡兵擊之伯路等乞降尋復屯聚九月鴈門烏􅁊率衆王無何允與鮮卑大人丘倫等及南匈奴骨都矦合七千騎冦五原與大守戰於髙渠谷漢兵大敗南單于圍中郎將耿种於美稷冬十一月以大司農陳國何熈行車騎將軍事中郎將龎雄為副將五營及邊郡兵二萬餘人又詔遼東太守耿䕫率鮮卑及諸郡兵共擊之以梁慬行度遼將軍事雄䕫擊南匈奴奥鞬日逐王破之十二月辛酉郡國九地震乙亥有星孛于天苑是嵗京師及郡國四十一雨水幷凉二州大飢人相食太后以隂陽不和軍旅數興詔嵗終饗遣衛士勿設戲作樂減逐疫侲子之半四年春正月元㑹徹樂不陳充庭車鄧騭在位頗能推進賢士薦何熈李郃等列於朝廷又辟􅀪農楊震巴郡陳禪等置之幕府天下稱之震孤貧好學明歐陽尚書通達博覽諸儒為之語曰關西孔子楊伯起教授二十餘年不荅州郡禮命衆人謂之晚暮而震志愈篤騭聞而辟之時震年已五十餘累遷荆州刺史東萊太守當之郡道經昌邑故所舉荆州茂才王宻為昌邑令夜懐金十斤以遺震震曰故人知君君不知故人何也宻曰暮夜無知者震曰天知地知我知子知何謂無知者宻愧而出後轉􅃰郡太守性公廉子孫常􅂼食歩行故舊或欲令為開産業震不肯曰使後世稱為清白吏子孫以此遺之不亦厚乎張伯路復攻郡縣殺吏黨衆浸盛詔遣御史中丞王宗持節發幽冀諸郡兵合數萬人徴宛陵令扶風灋雄為青州刺史與宗并力討之南單于圍耿种數月梁慬耿䕫撃斬其别將於屬國故城單于自將迎戰慬等復破之單于遂引還虎澤丙午詔減百官及州郡縣奉各有差二月南匈奴冦常山滇零遣兵冦襃中漢中太守鄭勤移屯襃中任尚軍乆出無功民廢農桑乃詔尚將吏兵還屯長安罷遣南陽潁川汝南吏士乙丑初置京兆虎牙都尉於長安扶風都尉於雍如西京三輔都尉故事謁者龎參説鄧騭徙邊郡不能自存者入居三輔騭然之欲棄涼州并力北邊乃㑹公卿集議騭曰譬若衣敗壞一以相􅀘猶有所完若不如此將兩無所保公卿皆以爲然郎中陳國虞詡言於太尉張禹曰若大將軍之䇿不可者三先帝開拓土宇劬勞後定而今憚小費舉而棄之此不可一也涼州既棄即以三輔為塞則園陵單外此不可二也喭曰闗西出將闗東出相烈士武臣多出涼州土風壯猛便習兵事今羌胡所以不敢入據三輔為心腹之害者以涼州在後故也涼州士民所以推鋒執鋭䝉矢石於行陳父死於前子戰於後無反顧之心者為臣屬於漢故也今推而捐之割而棄之民庶安土重還必引領而怨曰中國棄我於夷狄雖赴義從善之人不能無恨如卒然起謀因天下之飢敝乘海内之虚弱豪雄相聚量材立帥驅氐羌以為前鋒席卷而東雖賁育為卒太公為將猶恐不足當禦如此則函谷以西園陵舊京非復漢有此不可三也議者喻以補衣猶有所完詡恐其疽食侵淫而無限極也禹曰吾意不及此㣲子之言幾敗國事詡因説禹收羅涼土雄桀引其牧守子弟於朝令諸府各辟數人外以勸厲荅其功勤内以拘致防其邪計禹善其言更集四府皆從詡議於是辟西州豪桀為掾屬拜牧守長吏子弟為郎以安慰之鄧騭由是惡詡欲以吏灋中傷之㑹朝歌賊寗季等數千人攻殺長吏屯聚連年州郡不能禁乃以詡為朝歌長故舊皆弔之詡笑曰事不避難臣之職也不遇槃根錯節無以别利器此乃吾立功之秋也始到謁河内太守馬稜稜曰君儒者當謀謨廟堂乃在朝歌甚為君憂之詡曰此賊犬羊相聚以求温飽耳願明府不以為憂稜曰何以言之詡曰朝歌者韓魏之郊背太行臨黄河去敖倉不過百里而青冀之民流亡萬數賊不知開倉招衆刼庫兵守成臯斷天下右臂此不足憂也今其衆新盛難與爭鋒兵不猒權願寛假轡䇿勿令有所拘閡而已及到官設三科以募求壯士自掾史以下各舉所知其攻劫者為上傷人偷盜者次之不事家業者為下收得百餘人詡為饗㑹悉貰其罪使入賊中誘令刼掠乃伏兵以待之遂殺賊數百人又濳遣貧人能縫者傭作賊衣以采線縫其􅅂有出市里者吏輒禽之賊由是駭散咸稱神明縣境皆平三月何熈軍到五原曼栢􅁀疾不能進遣龎雄與梁慬耿种將歩騎萬六千人攻虎澤連營稍前單于見諸軍並進大恐怖顧讓韓琮曰汝言漢人死盡今是何等人也乃遣使乞降許之單于脫帽徒跣對龐雄等拜陳道死罪於是赦之遇待如初乃還所鈔漢民男女及羌所略轉賣入匈奴中者合萬餘人㑹熈卒即拜梁慬度遼將軍龎雄還爲大鴻臚先零羌復攻襃中鄭勤欲擊之主簿叚崇諌以爲虜乘勝鋒不可當宜堅守待之勤不從出戰大敗死者三千餘人段崇及門下史王宗原展以身扞刃與勤俱死徙金城郡居襄武戊子杜陵園火癸巳郡國九地震夏四月六州蝗丁丑赦天下王宗灋雄與張伯路連戰破走之㑹赦到賊以軍未解甲不敢歸降王宗召刺史太守共議皆以爲當遂擊之灋雄曰不然兵凶器戰危事勇不可恃勝不可必賊若乘船浮海深入逺島攻之未易也及有赦令可且罷兵以慰誘其心埶必解散然後圖之可不戰而定也宗善其言即罷兵賊聞大喜乃還所略人而東萊郡兵獨未解甲賊復驚恐遁走遼東止海島上秋七月乙酉三郡大水騎都尉任仁與羌戰累敗而兵士放縱檻車徴詣廷尉死護羌校尉段禧卒復以前校尉矦霸代之移居張掖九月甲申益州郡地震皇太后母新野君病太后幸其第連日宿止三公上表固爭乃還宫冬十月甲戌新野君薨使司空護䘮事儀比東海恭王鄧騭等乞身行服太后欲不許以問曹大家大家上䟽曰妾聞謙讓之風德莫大焉今四舅深執忠孝引身自退而以方垂未静拒而不許如後有豪毛加於今日誠恐推讓之名不可再得太后乃許之及服除詔騭復還輔朝政更授前封騭等叩頭固讓乃止於是並奉朝請位次三公下特進矦上其有大議乃詣朝堂與公卿參謀太后詔隂后家屬皆歸故郡還其資財五百餘萬五年春正月庚辰朔日有食之丙戌郡國十地震己丑太尉張禹免甲申以光禄勲潁川李脩為太尉先零羌冦河東至河内百姓相驚多南犇度河使北軍中􅇋朱寵將五營士屯孟津詔魏郡趙國常山中山繕作塢􅇋六百一十六所羌旣轉盛而縁邊二千石令長多内郡人並無守戰意皆爭上徙郡縣以避宼難三月詔隴西徙襄武安定徙美陽北地徙池陽上郡徙衙百姓戀土不樂去舊遂乃刈其禾稼發徹室屋夷營壁破積聚時連旱蝗饑荒而驅䠞劫掠流離分散隨道死亡或棄捐老弱或為人僕妾䘮其太半復以任尚為侍御史擊羌於上黨羊頭山破之乃罷孟津屯夫餘王冦樂浪髙句驪王宫與濊貊冦􅀇莬夏閏四月丁酉赦凉州河西四郡海郡張伯路復冦東萊青州刺史灋雄擊破之賊逃還遼東遼東人李乆等共斬之於是州界清静秋九月漢陽人杜􅄾及弟季貢同郡王信等與羌通謀聚衆據上邽城冬十二月漢陽太守趙博遣客杜習刺殺琦封習討姦矦杜季貢王信等將其衆據樗泉營是嵗九州蝗郡國八雨水六年春正月甲寅詔曰凡供薦新味多非其節或鬱養彊孰或穿掘萌牙味無所至而夭折生長豈所以順時育物乎傳曰非其時不食自今當奉祠陵廟及給御者皆須時乃上凡所省二十三種三月十州蝗夏四月乙丑司空張敏罷己卯以太常劉愷為司空詔建武元功二十八將皆紹封五月旱丙寅詔令中二千石下至黄綬一切復秩六月壬辰豫章貟谿原山崩辛巳赦天下侍御史唐喜討漢陽賊王信破斬之杜季貢亡從滇零是嵗滇零死子零昌立年尚少同種狼莫為其計策以季貢為將軍别居丁奚城七年春二月丙午郡國十八地震夏四月乙未平原懷王勝薨無子太后立樂安夷王寵子得爲平原王丙申晦日有食之秋護羌校尉矦霸騎都尉馬賢擊先零别部牢羌於安定獲首虜千人蝗元初元年春正月甲子改元二月乙卯日南地坼長百餘里三月癸亥日有食之詔遣兵屯河内通谷衝要三十六所皆作塢璧設鳴鼔以僃羌冦夏四月丁酉赦天下京師及郡國五旱蝗五月先零羌冦雍城秋七月蜀郡夷冦􅁞陵殺縣令九月乙丑太尉李脩罷羌豪號多與諸種鈔掠武都漢中巴郡板楯蠻救之漢中五官􅁺程信率郡兵與蠻共擊破之號多走還斷隴道與零昌合矦霸馬賢與戰於枹罕破之辛未以大司農山陽司馬苞為太尉冬十月戊子朔日有食之涼州刺史皮楊擊羌於狄道大敗死者八百餘人是嵗郡國十五地震二年春護羌校尉龐參以恩信招誘諸羌號多等率衆降參遣詣闕賜號多矦印遣之參始還治令居通河西道零昌分兵冦益州遣中郎將尹就討之夏四月丙午立貴人滎陽閻氏為皇后后性妬忌後宫李氏生皇子保后鴆殺李氏五月京師旱河南及郡國十九蝗六月丙戌大尉司馬苞薨秋七月辛巳以太僕泰山馬英為太尉八月遼東鮮卑圍無慮九月又攻夫犂營殺縣令壬午晦日有食之尹就擊羌黨吕叔都等蜀人陳省羅横應募刺殺叔都皆封矦賜錢詔屯騎校尉班雄屯三輔雄超之子也以左馮翊司馬鈞行征西將軍督關中諸郡兵八千餘人龎參將羌胡兵七千餘人與鈞分道並擊零昌參兵至勇士東為杜季貢所敗引退鈞等獨進攻㧞丁奚城杜季貢率衆偽逃鈞令右扶風仲光等收羌禾稼光等違鈞節度散兵深入羌乃設伏要擊之鈞在城中怒而不救冬十月乙未光等兵敗並沒死者三千餘人鈞乃遁還龎參既失期稱病引還皆坐徴下獄鈞自殺時度遼將軍梁慬亦坐事抵罪校書郎中扶風馬融上書稱參慬智能宜宥過責效詔赦參等以馬賢代參領護羌校尉復以任尚為中郎將代班雄屯三輔懷令虞詡説尚曰兵灋弱不攻彊走不逐飛自然之埶也今虜皆馬騎日行數百里來如風雨去如絶弦以歩追之埶不相及所以雖屯兵二十餘萬曠日而無功也為使君計莫如罷諸郡兵各令出錢數千二十人共市一馬以萬騎之衆逐數千之虜追尾掩截其道自窮便民利事大功立矣尚即上言用其計遣輕騎擊杜季貢於丁奚城破之太后聞虞詡有將帥之略以為武都太守羌衆數千遮詡於陳倉崤谷詡即停軍不進而宣言上書請兵須到當發羌聞之乃分鈔傍縣詡因其兵散日夜進道兼行百餘里令吏士各作兩竈日增倍之羌不敢逼或問曰孫臏減竈而君增之兵灋日行不過三十里以戒不虞而今日且二百里何也詡曰虜衆多吾兵少徐行則易為所及速進則彼所不測虜見吾竈日增必謂郡兵来迎衆多行速必憚追我孫臏見弱吾今示彊埶有不同故也既到郡兵不滿三千而羌衆萬餘攻圍赤亭數十日詡乃令軍中彊弩勿發而濳發小弩羌以為矢力弱不能至并兵急攻詡於是使二十彊弩共射一人發無不中羌大震退詡因出城奮擊多所傷殺明日悉陳其兵衆令從東郭門出北郭門入貿易衣服回轉數周羌不知其數更相恐動詡計賊當退乃濳遣五百餘人於淺水設伏􅇋其走路虜果大犇因掩擊大破之斬獲甚衆賊由是敗散詡乃占相地埶築營壁百八十所招還流亡假賑貧民開通水運詡始到郡􅂖石千鹽石八千見户萬三千視事三年米石八十鹽石四百民増至四萬餘户人足家給一郡遂安十一月庚申郡國十地震十二月武陵澧中蠻反州郡討平之己酉司徒夏勤罷庚戌以司空劉愷為司徒光禄勲袁敞為司空敞安之子也前虎賁中郎將鄧􅀪卒􅀪性儉素治歐陽尚書授帝禁中有司奏贈􅀪驃騎將軍位特進封西平矦太后追弘雅意不加贈位衣服但賜錢千萬布萬匹兄騭等復辭不受詔封弘子廣徳為西平矦將葬有司復奏發五營輕車騎士禮儀如霍光故事太后皆不聽但白蓋雙騎門生輓送後以帝師之重分西平之都鄉封廣德弟甫德為都鄉矦資治通鑑卷第四十九
