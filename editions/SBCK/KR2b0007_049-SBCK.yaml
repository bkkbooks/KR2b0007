front:
  text: 特加慶以殊禮慶子祜年十三太后以帝㓜弱逺慮不虞留祜與嫡母耿􅁎居清河邸耿姬況之曾孫也祜母犍爲左姬也夏四月鮮卑寇漁陽漁陽太守張顯率數百人出塞追之兵馬掾嚴授諫曰前道險阻賊執難量宜且結營先令輕騎偵視之顯意甚鋭怒欲斬之遂進兵遇虜伏發士卒悉走唯授力戰身被十創手殺數人而死主簿衛福功曹徐咸皆自投赴顯俱殁於陳丙寅以虎賁中郎將鄧隲爲車騎將軍儀同三司騭弟黄門侍郎悝爲虎賁中郎將弘閶皆侍中司空陳寵薨五月辛卯赦天下壬辰河東垣山崩
  hash: sha256:fd56e048d6e621dd1fba5fc88af7b2542e2777f5e7c3844fceff45a7e5218193
