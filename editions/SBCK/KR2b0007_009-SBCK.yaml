seq: 9
front:
  text: 難而七廟墮身死人手爲天下笑者何也仁誼不施而攻守之勢異也
  hash: sha256:d93b5d7956f21f2b7a9f50eb8cf17efc4560a7c3cde2ed44d3c4a1152d60336d
body:
  text: 沛公西入咸陽諸將皆争走金帛財物之府分之蕭何獨先入收秦丞相府圖籍藏之以此沛公得具知天下阨塞户口多少彊弱之處沛公見秦宫室帷帳狗馬重寳婦女以千數意欲留居之樊噲諫曰沛公欲有天下耶將爲冨家翁􅁘凡此奢麗之物皆秦所以亡也沛公何用焉願急還霸上無留宫中沛公不聽張良曰秦爲無道故沛公得至此夫爲天下除殘賊冝縞素爲資今始入秦即安其樂此所謂助桀爲虐且忠言逆耳利於行毒藥苦口利於病願沛公聽樊噲言沛公乃還軍霸上十一月沛公悉召諸縣父老豪桀謂曰父老苦秦苛法久矣吾與諸侯約先入關者王之吾當王關中與父老約法三章耳殺人者死傷人及盜抵罪餘悉除去秦法諸吏民皆案堵如故凡吾所以來為父老除害非有所侵暴無恐且吾所以還軍霸上待諸侯至而定約束耳乃使人與秦吏行縣鄉邑告諭之秦民大喜争持牛羊酒食獻饗軍士沛公又讓不受曰倉粟多非乏不欲費民民又益喜唯恐沛公不為秦王項羽既定河北率諸侯兵欲西入關先是諸侯吏卒繇使屯戍過秦中者秦中吏卒遇之多無狀及章邯以秦軍降諸侯諸侯吏卒乗勝多奴虜使之輕折辱秦吏卒秦吏卒多怨竊言曰章將軍等詐吾屬降諸侯今能入關破秦大善即不能諸侯虜吾屬而東秦又盡誅吾父母妻子柰何諸將微聞其計以告項羽項羽召黥布蒲將軍計曰秦吏卒尚衆其心不服至關不聽事必危不如撃殺之而獨與章邯長史欣都尉翳入秦於是楚軍夜擊阬秦卒二十餘萬人新安城南或說沛公曰秦冨十倍天下地形彊聞項羽號章邯為雍王王闗中今則來沛公恐不得有此可急使兵守函谷闗無内諸侯軍稍徴闗中兵以自益距之沛公然其計従之已而項羽至闗關門閉聞沛公已定關中大怒使黥布等攻破函谷關十二月項羽進至戲沛公左司馬曹無傷使人言項羽曰沛公欲王關中令子嬰為相珍寳盡有之欲以求封項羽大怒饗士卒期旦日擊沛公軍當是時項羽兵四十萬號百萬在新豐鴻門沛公兵十萬號二十萬在霸上范増說項羽曰沛公居山東時貪財好色今入關財物無所取婦女無所幸此其志不在小吾令人望其氣皆為龍虎成五采此天子氣也急擊勿失楚左尹項伯者項羽季父也素善張良乃夜馳之沛公軍私見張良具告以事欲呼與俱去曰毋俱死也張良曰臣為韓王送沛公沛公今有急亡去不義不可不語良乃入具告沛公沛公大驚良曰料公士卒足以當項羽乎沛公黙然曰固不如也且為之柰何張良曰請往謂項伯言沛公之不敢叛也沛公曰君安與項伯有故張良曰秦時與臣游嘗殺人臣活之今事有急故幸來告良沛公曰孰與君少長良曰長於臣沛公曰君為我呼入吾得兄事之張良出固要項伯項伯即入見沛公沛公奉巵酒為夀約為婚姻曰吾入闗秋毫不敢有所近籍吏民封府庫而待將軍所以遣將守闗者備他盜之出入與非常也日夜望將軍至豈敢反乎願伯具言臣之不敢倍徳也項伯許諾謂沛公曰旦日不可不蚤自來謝沛公曰諾於是項伯復夜去至軍中具以沛公言報項羽因言曰沛公不先破關中公豈敢入乎今人有大功而擊之不義也不如因善遇之項羽許諾沛公旦日從百餘騎來見項羽鴻門謝曰臣與將軍勠力而攻秦將軍戰河北臣戰河南不自意能先入關破秦得復見將軍於此今者有小人之言令將軍與臣有隙項羽曰此沛公左司馬曹無傷言之不然籍何以生此項羽因留沛公與飲范増數目項羽舉所佩玉玦以示之者三項羽黙然不應范増起出召項莊謂曰君王為人不忍若入前為夀夀畢以劒舞因擊沛公於坐殺之不者若屬皆且為所虜莊則入為夀夀畢曰軍中無以為樂請以劒舞項羽曰諾項莊拔劒起舞項伯亦拔劒起舞常以身翼蔽沛公莊不得擊於是張良至軍門見樊噲噲曰今日之事何如良曰今項莊拔劒舞其意常在沛公也噲曰此廹矣臣請入與之同命噲即帶劒擁盾入軍門衛士欲止不内樊噲側其盾以撞衛士仆地遂入披帷立瞋目視項羽頭髮上指目眦盡裂項羽按劒而跽曰客何為者張良曰沛公之叅乗樊噲也項羽曰壯士賜之巵酒則與斗巵酒噲拜謝起立而飲之項羽曰賜之彘肩則與一生彘肩樊噲覆其盾於地加彘肩其上拔劒切而啗之項羽曰壯士能復飲乎樊噲曰臣死且不避巵酒安足辭夫秦有虎狼之心殺人如不能舉刑人如恐不勝天下皆叛之懐王與諸將約曰先破秦入咸陽者王之今沛公先破秦入咸陽毫毛不敢有所近還軍霸上以待將軍勞苦而功髙如此未有封爵之賞而聽細人之說欲誅有功之人此亡秦之續耳竊為將軍不取也項羽未有以應曰坐樊噲従良坐坐湏􅁷沛公起如厠因招樊噲出沛公曰今者出未辭也為之柰何樊噲曰如今人方為刀爼我方為魚肉何辭為於是遂去鴻門去霸上四十里沛公則置車騎脫身獨騎樊噲夏侯嬰靳彊紀信等四人持劒盾步走從驪山下道芷陽間行趣霸上留張良使謝項羽以白璧獻羽玉斗與亞父沛公謂良曰從此道至吾軍不過二十里耳度我至軍中公乃入沛公已去間至軍中張良入謝曰沛公不勝桮杓不能辭謹使臣良奉白璧一􅀟再拜獻將軍足下玉斗一雙再拜奉亞父足下項羽曰沛公安在良曰聞将軍有意督過之脫身獨去已至軍矣項羽則受璧置之坐上亞父受玉斗置之地抜劒撞而破之曰唉豎子不足與謀奪將軍天下者必沛公也吾屬今為之虜矣沛公至軍立誅殺曹無傷居數日項羽引兵西屠咸陽殺秦降王子嬰燒秦宫室火三月不滅收其貨寳婦女而東秦民大失望韓生說羽曰關中阻山帶河四塞之地地肥饒可都以霸項羽見秦宫室皆已燒殘破又心思東歸曰冨貴不歸故鄉如衣繡夜行誰知之者韓生退曰人言楚人沐猴而冠耳果然項羽聞之烹韓生項羽使人致命懐王懐王曰如約項羽怒曰懐王者吾家所立耳非有功伐何以得専主約天下初發難時假立諸侯後以伐秦然身被堅執銳首事暴露於野三年滅秦定天下者皆將相諸君與籍之力也懐王雖無功固當分其地而王之諸將皆曰善春正月羽陽尊懐王為義帝曰古之帝者地方千里必居上游乃徙義帝於江南都郴二月羽分天下王諸將羽自立為西楚霸王王梁楚地九郡都彭城羽與范増疑沛公而業已講解又惡負約乃隂謀曰巴蜀道險秦之遷人皆居之乃曰巴蜀亦關中地也故立沛公為漢王王巴蜀漢中都南鄭而三分關中王秦降將以距塞漢路章邯為雍王王咸陽以西都廢丘長史欣者故為櫟陽獄􅁺嘗有徳於項梁都尉董翳者本勸章邯降楚故立欣為塞王王咸陽以東至河都櫟陽立翳為翟王王上郡都髙奴項羽欲自取梁地乃徙魏王豹為西魏王王河東都平陽瑕丘申陽者張耳嬖臣也先下河南郡迎楚河上故立申陽為河南王都洛陽韓王成因故都都陽翟趙將司馬卬定河内數有功故立卬為殷王王河内都朝歌徙趙王歇為代王趙相張耳素賢又從入關故立耳為常山王王趙地治襄國當陽君黥布為楚將常冠軍故立布為九江王都六番君吴芮率百越佐諸侯又從入關故立芮為衡山王都邾義帝柱國共敖將軍擊南郡功多因立敖為臨江王都江陵徙燕王韓廣為遼東王都無終燕將臧荼從楚救趙因從入關故立荼為燕王都薊徙齊王田市為膠東王都即墨齊將田都從楚救趙因從入關故立都為齊王都臨菑項羽方渡河救趙田安下濟北數城引其兵降項羽故立安為濟北王都慱陽田榮數負項梁又不肯從將兵從楚擊秦以故不封成安君陳餘棄將印去不從入關亦不封客多說項羽曰張耳陳餘一體有功於趙今耳為王餘不可以不封羽不得已聞其在南皮因環封之三縣番君將梅鋗功多封十萬户侯漢王怒欲攻項羽周勃灌嬰樊噲皆勸之蕭何諫曰雖王漢中之惡不猶愈於死乎漢王曰何為乃死也何曰今衆弗如百戰百敗不死何為夫能詘於一人之下而信於萬乗之上者湯武是也臣願大王王漢中養其民以致賢人收用巴蜀還定三秦天下可圖也漢王曰善乃遂就國以何為丞相漢王賜張良金百鎰珠二斗良具以獻項伯漢王亦因令良厚遺項伯使盡請漢中地項王許之夏四月諸侯罷戲下兵各就國項王使卒三萬人從漢王之國楚與諸侯之慕從者數萬人從杜南入蝕中張良送至襃中漢王遣良歸韓良因說漢王燒絶所過棧道以僃諸侯盗兵且示項羽無東意田榮聞項羽徙齊王市於膠東而以田都為齊王大怒五月榮發兵距擊田都都亡走楚榮留齊王市不令之膠東市畏項羽竊亡之國榮怒六月追擊殺市於即墨自立為齊王是時彭越在鉅野有衆萬餘人無所屬榮與越將軍印使擊濟北秋七月越擊殺濟北王安榮遂并王三齊之地又使越擊楚項王命蕭公角將兵擊越越大破楚軍張耳之國陳餘益怒曰張耳與餘功等也今張耳王餘獨侯此項羽不平乃隂使張同夏説說齊王榮曰項羽為天下宰不平盡王諸將善地徙故王於醜地今趙王乃北居代餘以為不可聞大王起兵不聽不義願大王資餘兵擊常山復趙王請以趙為扞蔽齊王許之遣兵從陳餘項王以張良從漢王韓王成又無功故不遣之國與俱至彭城廢以為穰侯已又殺之初淮隂人韓信家貧無行不得推擇為吏又不能治生商賈常從人寄食飲人多厭之信釣於城下有漂母見信飢飯信信喜謂漂母曰吾必有以重報母母怒曰大丈夫不能自食吾哀王孫而進食豈望報乎淮隂屠中少年有侮信者曰若雖長大好帶刀劒中情怯耳因衆辱之曰信能死刺我不能死出我袴下於是信孰視之俛出袴下蒲伏一市人皆笑信以為怯及項梁渡淮信杖劒從之居麾下無所知名項梁敗又屬項羽羽以為郎中數以䇿干羽羽不用漢王之入蜀信亡楚歸漢未知名為連敖坐當斬其輩十三人皆已斬次至信信乃仰視適見滕公曰上不欲就天下乎何為斬壯士滕公竒其言壯其貌釋而不斬與語大説之言於王王拜以為治粟都尉亦未之竒也信數與蕭何語何竒之漢王至南鄭諸將及士卒皆歌謳思東歸多道亡者信度何等已數言王王不我用即亡去何聞信亡不及以聞自追之人有言王曰丞相何亡王大怒如失左右手居一二日何來謁王王且怒且喜罵何曰若亡何也何曰臣不敢亡也臣追亡者耳王曰若所追者誰何曰韓信也王復罵曰諸將亡者以十數公無所追追信詐也何曰諸將易得耳至如信者國士無􅀟王必欲長王漢中無所事信必欲爭天下非信無可與計事者顧王䇿安所决耳王曰吾亦欲東耳安能欝欝久居此乎何曰計必欲東能用信信即留不能用信終亡耳王曰吾為公以為將何曰雖為將信不留王曰以為大將何曰幸甚於是王欲召信拜之何曰王素慢無禮今拜大將如呼小兒此乃信所以去也王必欲拜之擇良日齋戒設壇場具禮乃可耳王許之諸將皆喜人人各自以為得大將至拜大將乃韓信也一軍皆驚信拜禮畢上坐王曰丞相數言將軍將軍何以教寡人計䇿信辭謝因問王曰今東鄉爭權天下豈非項王邪漢王曰然曰大王自料勇悍仁彊孰與項王漢王黙然良久曰不如也信再拜賀曰惟信亦以為大王不如也然臣嘗事之請言項王之為人也項王喑噁叱咤千人皆廢然不能任屬賢將此特匹夫之勇耳項王見人恭敬慈愛言語嘔嘔人有疾病涕泣分食飲至使人有功當封爵者印刓敝忍不能予此所謂婦人之仁也項王雖覇天下而臣諸侯不居關中而都彭城背義帝之約而以親愛王諸侯不平逐其故王而王其將相又遷逐義帝置江南所過無不殘滅百姓不親附特劫於威彊耳名雖為霸實失天下心故其彊易弱今大王誠能反其道任天下武勇何所不誅以天下城邑封功臣何所不服以義兵從思東歸之士何所不散且三秦王為秦將將秦子弟數嵗矣所殺亡不可勝計又欺其衆降諸侯至新安項王詐坑秦降卒二十餘萬唯獨邯欣翳得脫秦父兄怨此三人痛入骨髓今楚彊以威王此三人秦民莫愛也大王之入武闗秋毫無所害除秦苛法與秦民約法三章秦民無不欲得大王王秦者於諸侯之約大王當王關中民咸知之大王失職入漢中秦民無不恨者今大王舉而東三秦可􅀓檄而定也於是漢王大喜自以為得信晩遂聽信計部署諸將所擊留蕭何収巴蜀租給軍糧食八月漢王引兵從故道出襲雍雍王章邯迎擊漢陳倉雍兵敗還走止戰好畤又敗走廢丘漢王遂定雍地東至咸陽引兵圍雍王於廢丘而遣諸將畧地塞王欣翟王翳皆降以其地為渭南河上上郡令將軍薛歐王吸出武關因王陵兵以迎太公吕后項王聞之發兵距之陽夏不得前王陵者沛人也先聚黨數千人居南陽至是始以兵屬漢項王取陵母置軍中陵使至則東鄉坐陵母欲以招陵陵毋私送使者泣曰願為老妾語陵善事漢王漢王長者終得天下毋以老妾故持二心妾以死送使者遂伏劒而死項王怒亨陵母項王以故吴令鄭昌為韓王以距漢張良遺項王書曰漢王失職欲得關中如約即止不敢東又以齊梁反書遺項王曰齊欲與趙并滅楚項王以此故無西意而北擊齊燕王廣不肯之遼東臧荼擊殺之并其地是嵗以内史沛周苛為御史大夫項王使趣義帝行其羣臣左右稍稍叛之二年冬十月項王密使九江衡山臨江王擊義帝役之江中陳餘悉三縣兵與齊兵共襲常山常山王張耳敗走漢滿漢王於廢丘漢王厚遇之陳餘迎趙王於代復為趙王趙王徳陳餘立以為代王陳餘為趙王弱國初定不之國留傅趙王而使夏說以相國守代張良自韓間行歸漢漢王以為成信侯良多病未嘗特將常為畫䇿臣時時從漢王漢王如陜鎮撫關外父老河南王申陽降置河南郡漢王以韓襄王孫信為韓太尉將兵畧韓地信急擊韓王昌於陽城昌降十一月立信為韓王常將韓兵從漢王漢王還都櫟陽諸將抜隴西春正月項王北至城陽齊王榮將兵㑹戰敗走平原平原民殺之項王復立田假為齊王遂北至北海燒夷城郭室屋坑田榮降卒係虜其老弱婦女所過多所殘滅齊民相聚叛之漢將抜北地虜雍王弟平三月漢王自臨晉渡河魏王豹降將兵從下河内虜殷王卬置河内郡初陽武人陳平家貧好讀書里中社平為宰分肉食甚均父老曰善陳孺子之為宰平曰嗟乎使平得宰天下亦如是肉矣及諸侯叛秦平事魏王咎於臨濟為太僕說魏王不聽人或讒之平亡去後事項羽賜爵為卿殷王反楚項羽使平擊降之還拜為都尉賜金二十鎰居無何漢王攻下殷項王怒將誅定殷將吏平懼乃封其金與印使使歸項王而挺身間行杖劒亡渡河歸漢王於脩武因魏無知求見漢王漢王召入賜食遣罷就舍平曰臣為事來所言不可以過今日於是漢王與語而說之問曰子之居楚何官曰為都尉使為叅乗興護軍諸是日即拜平為都尉將盡讙曰大王一日得楚之亡卒未知其髙下而即與同載反使監護長者漢王聞之愈益幸平漢王南渡平隂津至洛陽新城三老董公遮說王曰臣聞順徳者昌逆徳者亡兵出無名事故不成故曰明其為賊敵乃可服項羽為無道放殺其主天下之賊也夫仁不以勇義不以力大王冝率三軍之衆為之素服以告諸侯而伐之則四海之内莫不仰徳此三王之舉也於是漢王為義帝發喪袒而大哭哀臨三日發使告諸侯曰天下共立義帝北面事之今項羽放殺義帝江南大逆無道寡人悉發關中兵收三河士南浮江漢以下願從諸侯王擊楚之殺義帝者使者至趙陳餘曰漢殺張耳乃從於是漢王求人類張耳者斬之持其頭遺陳餘餘乃遣兵助漢田榮弟横収散卒得數萬人起城陽夏四月立榮子廣為齊王以拒楚項王因留連戰未能下雖聞漢東既擊齊欲遂破之而後擊漢漢王以故得率諸侯兵凡五十六萬人伐楚到外黄彭越將其兵三萬餘人歸漢漢王曰彭將軍収魏地得十餘城欲急立魏後今西魏王豹真魏後乃拜彭越為魏相國擅將其兵畧定梁地漢王遂入彭城收其貨寳美人日置酒髙㑹項王聞之令諸將擊齊而自以精兵三萬人南從魯出胡陵至蕭晨擊漢軍而東至彭城日中大破漢軍漢軍皆走相隨入榖泗水死者十餘萬人漢卒皆南走山楚又追擊至靈壁東睢水上漢軍却為楚所擠卒十餘萬人皆入睢水水為之不流圍漢王三匝㑹大風從西北起折木發屋揚沙石窈􅁳晝晦逢迎楚軍大亂壞散而漢王乃得與數十騎遁去欲過沛收家室而楚亦使人之沛取漢王家家皆亡不與漢王相見漢王道逢孝恵魯元公主載以行楚騎追之漢王急推墮二子車下滕公為太僕常下收載之如是者三日今雖急不可以驅柰何棄之故徐行漢王怒欲斬之者十餘􅅬公卒保䕶脫二子審食其從太公吕后間行求漢王不相遇反遇楚軍楚軍與歸項王常置軍中為質是時吕后兄周吕侯為漢將兵居下邑漢王間往從之稍稍収其士卒諸侯皆背漢復與楚塞王欣翟王翳亡降楚田横進攻田假假走楚楚殺之横遂復定三齊之地漢王問群臣曰吾欲􅂢關以東等棄之誰可與共功者張良曰九江王布楚梟將與項王有隙彭越與齊反梁地此兩人可急使而漢王之將獨韓信可屬大事當一面即欲􅂢之捐之此三人則楚可破也初項王擊齊徴兵九江九江王布稱病不往遣將將軍數千人行漢之破楚彭城布又稱病不佐楚楚王由此怨布數使使者誚譲召布布愈恐不敢往項王方北憂齊趙西患漢所與者獨九江王又多布材欲親用之以故未之擊漢王自下邑徙軍碭遂至虞謂左右曰如彼等者無足與計天下事謁者隨何進曰不審陛下所謂漢王曰孰能為我使九江令之發兵倍楚留項王數月我之取天下可以百全隨何曰臣請使之漢王使與二十人俱五月漢王至滎陽諸敗軍皆㑹蕭何亦發關中老弱未傅者悉詣滎陽漢軍復大振楚起於彭城常乗勝逐北與漢戰滎陽南京索間楚騎來衆漢王擇軍中可為騎將者皆推故秦騎士重泉人李必駱甲漢王欲拜之必甲曰臣故秦民恐軍不信願得大王左右善騎者傅之乃拜灌嬰為中大夫令李必駱甲為左右校尉將騎兵擊楚騎於滎陽東大破之楚以故不能過滎陽而西漢王軍滎陽築甬道屬之河以取敖倉粟周勃灌嬰等言於漢王曰陳平雖美如冠玉其中未必有也臣聞平居家時盜其嫂事魏不客亡歸楚不中又亡歸漢今日大王尊官之令䕶軍臣聞平受諸將金金多者得善處金少者得惡處平反覆亂臣也願王察之漢王疑之召讓魏無知無知曰臣所言者能也陛下所問者行也今有尾生孝已之行而無益勝負之數陛下何暇用之乎楚漢相距臣進竒謀之士顧其計誠足以利國家不耳盜嫂受金又何足疑乎漢王召讓平曰先生事魏不中事楚而去今又從吾游信者故多心乎平曰臣事魏王魏王不能用臣說故去事項王項王不能信人其所任愛非諸項即妻之昆弟雖有竒士不能用聞漢王能用人故歸大王臣躶身來不受金無以為資誠臣計畫有可采乎願大王用之使無可用者金具在請封輸官得其骸骨漢王乃謝厚賜拜為䕶軍中尉盡護諸將諸將乃不敢復言魏王豹謁歸視親疾至則絶河津反為楚六月漢王還櫟陽壬午立子盈為太子赦罪人漢兵引水灌廢丘廢丘降章邯自殺盡定雍地以為中地北地隴西郡關中大饑米斛萬錢人相食令民就食蜀漢初秦之亡也豪桀爭取金玉宣曲任氏獨窖倉粟及楚漢相距滎陽民不得耕種而豪桀金玉盡歸任氏任氏以此起冨者數世秋八月漢王如滎陽命蕭何守關中侍太子為法令約束立宗廟社稷宫室縣邑事有不及奏決者輒以便冝施行上來以聞計關中户口轉漕調兵以給軍未嘗乏絶漢王使酈食其往說魏王豹且召之豹不聽曰漢王慢而侮人罵詈諸侯羣臣如罵奴耳吾不忍復見也於是漢王以韓信為左丞相與灌嬰曹參俱擊魏漢王問食其魏大將誰也對曰栢直王曰是口尚乳臭安能當韓信騎將誰也曰馮敬曰是秦將馮無擇子也雖賢不能當灌嬰步卒將誰也曰項佗曰不能當曹參吾無患矣韓信亦問酈生魏得無用周叔為大將乎酈生曰栢直也信曰豎子耳遂進兵魏王盛兵蒲坂以塞臨晉信乃益為疑兵陳船欲渡臨晋而伏兵從夏陽以木罌渡軍襲安邑魏王豹驚引兵迎信九月信擊虜豹傳詣滎陽悉定魏地置河東上黨太原郡漢之敗於彭城而西也陳餘亦覺張耳不死即皆漢韓信既定魏使人請兵三萬人願以北舉燕趙東擊齊南絶楚糧道漢王許之乃遣張耳與俱引兵東北擊趙代後九月信破代兵禽夏說於閼與信之下魏破代漢輒使人收其精兵詣滎陽以距楚資治通鑑卷第九
