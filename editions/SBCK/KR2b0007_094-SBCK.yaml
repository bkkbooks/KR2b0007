body:
  text: 蘇峻腹心路永匡術賈寧聞祖約敗恐事不濟勸峻盡誅司徒導等諸大臣更樹腹心峻雅敬導不許永等更貳於峻導使參軍袁耽潜誘永使歸順九月戊申導携二子與永皆奔白石耽渙之曽孫也陶侃温嶠等與蘇峻久相持不决峻分遣諸將東西攻掠所嚮多捷人情恟懼朝士之奔西軍者皆曰峻狡黠有膽决其徒驍勇所向無敵若天討有罪則峻終滅亡止以人事言之未易除也温嶠怒曰諸君怯懦乃更譽賊及累戰不勝嶠亦憚之嶠軍食盡貸於陶侃侃怒曰使君前云不憂無良將及兵食惟欲得老僕為主耳今數戰皆北良將安在荆州接胡蜀二虜當備不虞若復無食僕便欲西歸更思良筭徐來殄賊不為晚也嶠曰凡師克在和古之善教也光武之濟昆陽曹公之㧞官渡以寡敵衆杖義故也峻約小豎凶逆滔天何憂不滅峻驟勝而驕自謂無前今挑之戰可一鼔而擒也奈何捨垂立之功設進退之計乎且天子幽逼社稷危殆乃四海臣子肝腦塗地之日嶠等與公並受國恩事若克濟則臣主同祚如其不捷當灰身以謝先帝耳今之事勢義無旋踵譬如騎虎安可中下哉公若違衆獨返人心必沮沮衆敗事義旗將迴指於公矣毛寳言於嶠曰下官能留陶公乃往說侃曰公本應鎮蕪湖為南北勢援前既已下勢不可還且軍政有進無退非直整齊三軍示衆必死而巳亦謂退無所據終至滅亡徃者杜弢非不彊盛公竟滅之何至於峻獨不可破邪賊亦畏死非皆勇健公可試與寳兵使上岸斷賊資糧若寳不立効然後公去人心不恨矣侃然之加寶督䕶而遣之竟陵太守李陽說侃曰今大事若不濟公雖有粟安得而食諸侃乃分米五萬石以餉嶠軍毛寳燒峻句容湖孰積聚峻軍乏食侃遂留不去張健韓晃等急攻大業壘中乏水人飲糞汁郭黙懼潜突圍出外留兵守之郗鑒在京口軍士聞之皆失色參軍曹納曰大業京口之扞蔽也一旦不守則賊兵徑至不可當也請還廣陵以俟後舉鑒大㑹僚佐責納曰吾受先帝顧託之重正復捐軀九泉不足報塞今彊㓂在近衆心危逼君腹心之佐而生長異端當何以帥先義衆鎮壹三軍邪將斬之久乃得釋陶侃將救大業長史殷羨曰吾兵不習步戰救大業而不捷則大事去矣不如急攻石頭則大業自解侃從之羨融之兄也庚午侃督水軍向石頭庾亮温嶠趙􅅌帥步兵萬人從白石南上欲挑戰峻將八千人逆戰遣其子碩及其將匡孝分兵先薄趙􅅌軍敗之峻方勞其將士乘醉望見􅅌走曰孝能破賊我更不如邪因舍其衆與數騎北下突陳不得入將囘趨白木陂馬躓侃部將彭世李千等投之以矛峻墜馬斬首臠割之焚其骨三軍皆稱萬嵗餘衆大潰峻司馬任讓等共立峻弟逸為主閉城自守温嶠乃立行臺布告逺近凡故吏二千石以下皆令赴臺於是至者雲集韓晃聞峻死引兵趣石頭管商􅀪徽攻庱亭壘督䕶李閎輕車長史滕含擊破之含脩之孫也商走詣庾亮降餘衆皆歸張健冬十一月後趙王勒欲自將救洛陽僚佐程遐等固諫曰劉曜懸軍千里勢不支久大王不宐親動動無萬全勒大怒按劒叱遐等出乃赦徐光召而謂之曰劉曜乘一戰之勝圍守洛陽庸人之情皆謂其鋒不可當曜帶甲十萬攻一城而百日不克師老卒怠以我初銳擊之可一戰而擒也若洛陽不守曜必送死冀州自河已北席卷而來吾事去矣程遐等不欲吾行卿以爲何如對曰劉曜乘高候之勢不能進臨襄國更守金墉此其無能爲可知也以大王威畧臨之彼必望旗奔敗平定天下在今一舉不可失也勒笑曰光言是也乃使内外戒嚴有諫者斬命石堪石聰及豫州刺史桃豹等各統見衆㑹滎陽中山公虎進據石門勒自統步騎四萬趣金墉濟自大堨勒謂徐光曰曜盛兵成臯闗上䇿也阻洛水其次也坐守洛陽此成擒耳十二月乙亥後趙諸軍集于成臯步卒六萬騎二萬七千勒見趙無守兵大喜舉手指天復加額曰天也卷甲銜枚詭道兼行出于鞏訾之閒趙主曜專與嬖臣飲博不撫士卒左右或諫曜怒以為妖言斬之聞勒已濟河始議増滎陽戍杜黄馬闗俄而洛水候者與後趙前鋒交戰擒羯送之曜問大胡自來邪其衆幾何羯曰王自來軍勢甚盛曜色變使攝金墉之圍陳于洛西衆十餘萬南北十餘里勒望見益喜謂左右曰可以賀我矣勒帥步騎四萬入洛陽城己卯中山公虎引步卒三萬自城北而西攻趙中軍石堪石聰等各以精騎八千自城西而北擊趙前鋒大戰于西陽門勒躬貫甲胄出自閶闔門夾擊之曜少而嗜酒末年尤甚將戰飲酒數斗常乘赤馬無故跼頓乃乘小馬比出復飲酒斗餘至西陽門揮陳就平石堪因而乘之趙兵大潰曜昏醉退走馬陷石渠墜于氷上被瘡十餘通中者三為堪所執勒遂大破趙兵斬首五萬餘級下令曰所欲擒者一人耳今已獲之其敕將士抑鋒止銳縱其歸命之路曜見勒曰石王頗憶重門之盟否勒使徐光謂之曰今日之事天使其然復云何邪乙酉勒班師使征東將軍石邃將兵衛送曜邃虎之子也曜瘡甚載以馬輿使醫李永與同載己亥至襄國舍曜於永豐小城給其妓妾嚴兵圍守遣劉岳劉震等從男女盛服以見之曜曰吾謂卿等久為灰土石王仁厚乃全宥至今邪我殺石佗愧之多矣今日之禍自其分耳留宴終日而去勒使曜與其太子熈書諭令速降曜但敕熈與諸大臣匡維社稷勿以吾易意也勒見而惡之久之乃殺曜是嵗成漢獻王驤卒其子征東將軍壽以喪還成都成主雄以李玝為征北將軍梁州刺史代壽屯晉壽四年春正月光禄大夫陸曄及弟尚書左僕射玩說匡術以苑城附于西軍百官皆赴之推曄督宮城軍事陶侃命毛寳守南城鄧岳守西城右衛將軍劉超侍中鍾雅與建康令管斾等謀奉帝出赴西軍事泄蘇逸使其將平原任讓將兵入宮収超雅帝抱持悲泣曰還我侍中右衛讓奪而殺之初讓少無行太常華恒爲本州大中正黜其品及讓爲蘇峻將乘勢多所誅殺見恒輙恭敬不敢縱暴及鍾劉之死蘇逸欲并殺恒讓盡心救衛恒乃得免冠軍將軍趙􅅌遣部將甘苗擊祖約于歴陽戊辰約夜帥左右數百人奔後趙其將牽騰帥衆出降蘇逸蘇碩韓晃并力攻臺城焚太極東堂及祕閣毛寳登城射殺數十人晃謂寳曰君名勇果何不出鬬寳曰君名徤將何不入鬬晃笑而退趙太子熈聞趙主曜被擒大懼與南陽王􅅌謀西保秦州尚書胡勲曰今雖喪君境土尚完將士不叛且當并力拒之力不能拒走未晚也􅅌怒以爲沮衆斬之遂帥百官奔上邽諸征鎮亦皆棄所守從之闗中大亂將軍蔣英辛恕擁衆數十萬據長安遣使降于後趙後趙遣石生帥洛陽之衆赴之二月丙戌諸軍攻石頭建威長史滕含擊蘇逸大破之蘇碩帥驍勇數百渡淮而戰温嶠擊斬之韓晃等懼以其衆就張徤於曲阿門隘不得出更相蹈藉死者萬數西軍獲蘇逸斬之滕含部將曹據抱帝奔温嶠船羣臣見帝頓首號泣請罪殺西陽王羕并其二子播充孫崧及彭城王雄陶侃與任讓有舊為請其死帝曰是殺吾侍中右衛者不可赦也乃殺之司徒導入石頭令取故節陶侃笑曰蘇武節似不如是導有慙色丁亥大赦張徤疑􅀪徽等貳於已皆殺之帥舟師自延陵將入呉興乙未􅀭烈將軍王允之與戰大破之獲男女萬餘口健復與韓晃馬雄等輕軍西趨故鄣郗鑒遣參軍李閎追之及於平陵山皆斬之是時宮闕灰燼以建平園為宮温嶠欲遷都豫章三呉之豪請都㑹稽二論紛紜未决司徒導曰孫仲謀劉􅀇徳俱言建康王者之宅古之帝王不必以豐儉移都茍務本節用何憂彫弊若農事不修則樂土為墟矣且北㓂游魂伺我之隙一旦示弱竄於蠻越求之望實懼非良計今特宜鎮之以静羣情自安由是不復徙都以禇翜為丹楊尹時兵火之後民物彫殘翜収集散亡京邑遂安壬寅以湘州并荆州三月壬子論平蘇峻功以陶􅋲爲侍中太尉封長沙郡公加都督交廣寧州諸軍事郗鑒為侍中司空南昌縣公温嶠為驃騎將軍開府儀同三司加散騎常侍始安郡公陸曄進爵江陵公自餘賜爵侯伯子男者甚衆卞壼及二子眕盱桓彛劉超鍾雅羊曼陶瞻皆加贈謚路永匡術賈寧皆蘇峻之黨也峻未敗永等去峻歸朝廷王導欲賞以官爵温嶠曰永等皆峻之腹心首為亂階罪莫大焉晚雖改悟未足以贖前罪得全首領為幸多矣豈可復褒寵之哉導乃止陶侃以江陵偏逺移鎮巴陵朝議欲留温嶠輔政嶠以王導先帝所任固辭還藩又以京邑荒殘資用不給乃留資蓄具器用而後旋于武昌帝之出石頭也庾亮見帝稽顙哽咽詔亮與大臣俱升御座明日亮復泥首謝罪乞骸骨欲闔門投竄山海帝遣尚書侍中手詔慰喻曰此社稷之難非舅之責也亮上䟽自陳祖約蘇峻縱肆凶逆罪由臣發寸斬屠戮不足以謝七廟之靈塞四海之責朝廷復何理齒臣於人次臣亦何顔自次於人理願陛下雖垂寛宥全其首領猶宐棄之任其自存自没則天下粗知勸戒之綱矣優詔不許亮又欲遁逃山海自暨陽東出詔有司錄奪舟船亮乃求外鎮自效出為都督豫州􅀭州之江西宣城諸軍事豫州刺史領宣城内史鎮蕪湖陶侃温嶠之討蘇峻也移檄征鎮使各引兵入援湘州刺史益陽矦卞敦擁兵不赴又不給軍糧遣督䕶將數百人隨大軍而已朝野莫不怪歎及峻平陶侃奏敦阻軍顧望不赴國難請檻車収付廷尉王導以喪亂之後宜加寛宥轉敦安南將軍廣州刺史病不赴徴為光禄大夫領少府敦憂愧而卒追贈本官加散騎常侍謚曰敬臣光曰庾亮以外戚輔政首發禍機國破君危竄身茍免卞敦位列方鎮兵糧俱足朝廷顛覆坐觀勝負人臣之罪孰大於此既不能明正典刑又以寵禄報之晉室無政亦可知矣任是責者豈非王導乎徙高密王紘為彭城王紘雄之弟也􅊨夏四月乙未始安忠武公温嶠卒葬於豫章朝廷欲為之造大墓於元明二帝陵之北太尉侃上表曰嶠忠誠著於聖世勲義感於人神使亡而有知豈樂今日勞費之事願陛下慈恩停其移􅁙詔從之以平南軍司劉􅅌為江州刺史陶侃郗鑒皆言􅅌非方伯才司徒導不從或謂導子悅曰今大難之後紀綱弛頓自江陵至于建康三千餘里流民萬計布在江州江州國之南藩要害之地而􅅌以忲侈之性卧而對之不有外變必有内患矣悦曰此温平南之意也秋八月趙南陽王胤帥衆數萬自上邽趣長安隴東武都安定新平北地扶風始平諸郡戎夏皆起兵應之􅅌軍于仲橋石生嬰城自守後趙中山公虎帥騎二萬救之九月虎大破趙兵於義渠􅅌奔還上邽虎乘勝追擊枕尸千里上邽潰虎執趙太子熈南陽王􅅌及其將王公卿校以下三千餘人皆殺之徙其臺省文武闗東流民秦雍大族九千餘人于襄國又阬五郡屠各五千餘人于洛陽進攻集木且羌于河西克之俘獲數萬秦隴悉平氐王蒲洪羌酋姚弋仲俱降于虎虎表洪監六夷軍事弋仲為六夷左都督徙氐羌十五萬落于司冀州初隴西鮮卑乞伏述延居于苑川侵并鄰部士馬彊盛及趙亡述延懼遷于麥田述延卒子傉大寒立傉大寒卒子司繁立江州刺史劉􅅌矜豪日甚專務商販殖財百萬縱酒耽樂不恤政事冬十二月詔徴後將軍郭黙為右軍將軍黙樂為邊將不願宿衛以情愬於􅅌􅅌曰此非小人之所及也黙將赴召求資於􅅌􅅌不與黙由是怨􅅌􅅌長史張滿等素輕黙或倮露見之黙常切齒臘日􅅌餉黙豚酒黙對信投之水中㑹有司奏今朝廷空竭百官無祿惟資江州運漕而􅅌商旅繼路以私廢公請免􅅌官書下􅅌不即歸罪方自申理僑人蓋肫掠人女爲妻張滿使還其家肫不從而謂郭黙曰劉江州不受免密有異圖與張滿等日夜計議惟忌郭侯一人欲先除之黙以爲然帥其徒候旦門開襲胤胤將吏欲拒黙黙呵之曰我被詔有所討動者誅三族遂入至内寢牽􅅌下斬之出取􅅌僚佐張滿等誣以大逆悉斬之傳􅅌首于京師詐作詔書宣示内外掠胤女及諸妾并金寳還船初云下都既而停􅅌故府招引譙國内史桓宣宣固守不從是嵗賀蘭部及諸大人共立拓㧞翳槐為代王代王紇那奔宇文部翳槐遣其弟什翼犍質於趙以請和河南王吐延雄勇多猜忌羌酋姜聰刺之吐延不抽劒召其將紇扢埿使輔其子葉延保于白蘭抽劒而死葉延孝而好學以為禮公孫之子得以王父字為氏乃自號其國曰吐谷渾五年春正月劉􅅌首至建康司徒導以郭黙驍勇難制己亥大赦梟􅅌首於大航以黙為江州刺史太尉侃聞之投袂起曰此必詐也即將兵討之黙遣使送妓妾及絹并冩中詔呈侃參佐多諫曰黙不被詔豈敢為此若欲進軍宜待詔報侃厲色曰國家年幼詔令不出胷懐劉􅅌為朝廷所禮雖方任非才何緣猥加極刑郭黙恃勇所在貪暴以大難新除禁綱寛簡欲因際㑹騁其從横耳發使上表言狀且與導書曰郭黙殺方州即用為方州害宰相便為宰相乎導乃収􅅌首答侃書曰黙據上流之勢加有船艦成資故苞含隱忍使有其地朝廷得以潛嚴俟足下軍到風發相赴豈非遵養時晦以定大事者邪侃笑曰是乃遵養時賊也豫州刺史庾亮亦請討黙詔加亮征討都督帥步騎二萬徃與侃㑹西陽太守鄧岳武昌太守劉詡皆疑桓宣與黙同豫州西曹王隨曰宣尚不附祖約豈肻同郭黙邪岳詡遣隨詣宣觀之隨說宣曰明府心雖不爾無以自明惟有以賢子付隨耳宣乃遣其子戎與隨俱迎陶侃侃辟戎為掾上宣為武昌太守二月後趙羣臣請後趙王勒即皇帝位勒乃稱大趙天王行皇帝事立妃劉氏為王后世子􅀪為太子以其子宏為驃騎大將軍都督中外諸軍事大單于封秦王斌為左衛將軍封太原王恢為輔國將軍封南陽王以中山公虎為太尉尚書令進爵為王虎子邃為冀州刺史封齊王宣為左將軍挺為侍中封梁王又封石生為河東王石堪為彭城王以左長史郭敖為尚書左僕射右長史程遐為右僕射領吏部尚書左司馬䕫安右司馬郭殷從事中郎李鳯前中郎令裴憲皆為尚書參軍事徐光為中書令領祕書監自餘文武封拜各有差中山王虎怒私謂齊王邃曰主上自都襄國以來端拱仰成以吾身當矢石二十餘年南擒劉岳北走索頭東平齊魯西定秦雍克十有三州成大趙之業者我也大單于當以授我今乃以與黄吻婢兒念之令人氣塞不能寢食待主上晏駕之後不足復留種也程遐言於勒曰天下粗定當顯明逆順故漢高祖赦季布斬丁公大王自起兵以來見忠於其君者輒褒之背叛不臣者輒誅之此天下所以歸盛徳也今祖約猶存臣竊惑之安西將軍姚弋仲亦以為言勒乃収約并其親屬中外百餘人悉誅之妻妾兒女分賜諸胡初祖逖有胡奴曰王安逖甚愛之在雍丘謂安曰石勒是汝種類吾亦無在爾一人厚資送而遣之安以勇幹仕趙為左衛將軍及約之誅安歎曰豈可使祖士稚無後乎乃徃就市觀刑逖庶子道重始十嵗安竊取以歸匿之變服爲沙門及石氏亡道重復歸江南郭黙欲南據豫章㑹太尉侃兵至黙出戰不利入城固守聚米為壘以示有餘侃築土山臨之三月庾亮兵至湓口諸軍大集夏五月乙卯黙將宋侯縳黙父子出降侃斬黙于軍門傳首建康同黨死者四十人詔以侃都督江州領刺史以鄧岳督交廣諸軍事領廣州刺史侃還巴陵因移鎮武昌庾亮還蕪湖辭爵賞不受趙將劉徴帥衆數千浮海抄東南諸縣殺南沙都尉許儒張駿因前趙之亡復収河南地至于狄道置五屯䕶軍與趙分境六月趙遣鴻臚孟毅拜駿征西大將軍凉州牧加九錫駿恥為之臣不受留毅不遣初丁零翟斌世居康居後徙中國至是入朝於趙趙以斌為句町王趙羣臣固請正尊號秋九月趙王勒即皇帝位大赦改元建平文武封進各有差立其妻劉氏為皇后太子􅀪為皇太子􅀪好屬文親敬儒素勒謂徐光曰大雅愔愔殊不似將家子光曰漢祖以馬上取天下孝文以􅀇黙守之聖人之後必有勝殘去殺者天之道也勒甚悅光因說曰皇太子仁孝温恭中山王雄暴多詐陛下一旦不諱臣恐社稷非太子所有也宜漸奪中山王權使太子早參朝政勒心然之而未能從趙荆州監軍郭敬㓂襄陽南中郎將周撫監沔北軍事屯襄陽趙主勒以驛書敕敬退屯樊城使之偃藏旗幟寂若無人曰彼若使人觀察則告之曰汝宜自愛堅守後七八日大騎將至相䇿不復得走矣敬使人浴馬于津周而復始晝夜不絶偵者還以告周撫撫以為趙兵大至懼奔武昌敬入襄陽中州流民悉降于趙魏該弟遐帥其部衆自石城降敬敬毁襄陽遷其民于沔北城樊城以戍之趙以敬為荆州刺史周撫坐免官休屠王羌叛趙趙河東王生擊破之羌奔凉州西平公駿懼遣孟毅還使其長史馬詵稱臣入貢於趙更造新宮甲辰徙樂成王欽為河閒王封彭城王紘子浚為高密王冬十月成大將軍壽督征南將軍費黑等攻巴東建平㧞之巴東太守楊謙監軍毌丘奥退保宜都六年春正月趙劉徴復㓂婁縣掠武進郗鑒擊却之三月壬戌朔日有食之夏趙主勒如鄴將營新宮廷尉上黨續咸苦諫勒怒欲斬之中書令徐光曰咸言不可用亦當容之奈何一旦以直言斬列卿乎勒歎曰為人君不得自專如是乎匹夫家貲滿百匹猶欲市宅况富有四海乎此宮終當營之且敕停作以成吾直臣之氣因賜咸絹百匹稻百斛又詔公卿以下嵗舉賢良方正仍令舉人得更相薦引以廣求賢之路起明堂辟雍靈臺于襄國城西秋七月成大將軍壽攻隂平武都楊難敵降之九月趙主勒復營鄴宮以洛陽為南都置行臺冬蒸祭太廟詔歸胙於司徒導且命無下拜導辭疾不敢當初帝即位冲幼每見導必拜與導手詔則云惶恐言中書作詔則曰敬問有司議元㑹日帝應敬導不博士郭熈杜援議以為禮無拜臣之文謂宜除敬侍中馮懐議以為天子臨辟雍拜三老况先帝師傅謂宜盡敬侍中荀奕議以為三朝之首宜明君臣之體則不應敬若他日小㑹自可盡禮詔從之奕組之子也慕容廆遣使與太尉陶侃牋勸以興兵北伐共清中原僚屬宋該等共議以廆立功一隅位卑任重等差無别不足以鎮華夷宜表請進廆官爵參軍韓恒駮曰夫立功者患信義不著不患名位不高桓文有匡復之功不先求禮命以令諸侯宜繕甲兵除羣㐫功成之後九錫自至比於邀君以求寵不亦榮乎廆不悅出恒為新昌令於是東夷校尉封抽等䟽上侃府請封廆為燕王行大將軍事侃復書曰夫功成進爵古之成制也車騎雖未能為官摧勒然忠義竭誠今騰牋上聴可不遲速當在天臺也資治通鑑卷第九十四
