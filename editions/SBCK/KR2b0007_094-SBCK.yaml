front:
  text: 小丹楊來迷失道夜行無復部分亮聞乃悔之朝士以京邑危逼多遣家人入東避難左衛將軍劉超獨遷妻孥入居宮内詔以卞壼都督大桁東諸軍事與侍中鍾雅帥郭黙趙􅅌等軍及峻戰于西陵壼等大敗死傷以千數丙辰峻攻青溪柵卞壼帥諸軍拒擊不能禁峻因風縱火燒臺省及諸營寺署一時蕩盡壼背癕新愈創猶未合力疾帥左右苦戰而死二子眕盱隨父後亦赴敵而死其母撫尸哭曰父為忠臣子為孝子夫何恨乎丹楊尹羊曼勒兵守雲龍門與黄門侍郎周導廬江太守陶瞻皆戰死庾亮帥衆將陳于宐陽門内未及成列士衆皆弃甲走亮與弟懌條翼及郭黙趙􅅌俱奔尋陽將行顧謂鍾雅曰後事深以相委雅曰棟折榱崩誰之咎也亮曰今日之事不容復言亮乘小船亂兵相剝掠亮左右射賊誤中柂工應􅁌而倒船上咸失色欲散亮不動徐曰此手何可使著賊衆乃安峻兵入臺城司徒導謂侍中禇翜曰至尊當御正殿君可啓令速出翜即入上閤躬自抱帝登太極前殿導及光禄大夫陸曄荀崧尚書張闓共登御床擁衛帝以劉超為右衛將軍使與鍾雅禇翜侍立左右太常孔愉朝服守宗廟時百官奔散殿省蕭然峻兵既入叱禇翜令下翜正立不動呵之曰蘇冠軍來覲至尊軍人豈得侵逼由是峻兵不敢上殿突入後宮宮人及太后左右侍人皆見掠奪峻兵驅役百官光祿勲王彬等皆被捶撻令負檐登蔣山裸剝士女皆以壊席苫草自鄣無草者坐地以土自覆哀號之聲震動内外初姑孰既陷尚書左丞孔坦謂人曰觀峻之勢必破臺城自非戰士不須戎服及臺城陷戎服者多死白衣者無佗時官有布二十萬匹金銀五千斤錢億萬絹數萬匹佗物稱是峻盡費之太官惟有燒餘米數石以供御膳或謂鍾雅曰君性亮直必不容於㓂讐盍早為之計雅曰國亂不能匡君危不能濟各遁逃以求免何以為臣丁巳峻稱詔大赦惟庾亮兄弟不在原例以王導有徳望猶使以本官居已之右祖約為侍中太尉尚書令峻自為驃騎將軍録尚書事許柳為丹楊尹馬雄為左衛將軍祖渙為驍騎將軍弋陽王羕詣峻稱述峻功峻復以羕為西陽王太宰録尚書事峻遣兵攻呉國内史庾氷氷不能禦弃郡奔㑹稽至浙江峻購之甚急呉鈴下卒引氷入船以蘧蒢覆之吟嘯鼓枻沂流而去每逢邏所輒以杖叩船曰何處覔庾氷庾氷正在此人以為醉不疑之氷僅免峻以侍中蔡謨為呉國内史温嶠聞建康不守號慟人有候之者悲哭相對庾亮至尋陽宣太后詔以嶠為驃騎將軍開府儀同三司又加徐州刺史郗鑒司空嶠曰今日當以滅賊為急未有功而先拜官將何以示天下遂不受嶠素重亮亮雖奔敗嶠愈推奉之分兵給亮後趙大赦改元太和三月丙子庾太后以憂崩蘇峻南屯于湖夏四月後趙將石堪攻宛南陽太守王國降之遂進攻祖約軍于淮上約將陳光起兵攻約約左右閻委貌類約光謂為約而擒之約踰垣獲免光奔後趙壬申葬明穆皇后于武平陵庾亮温嶠將起兵討蘇峻而道路斷絶不知建康聲聞㑹南陽范汪至尋陽言峻政令不壹貪暴縱横滅亡已兆雖彊易弱朝廷有倒懸之急宐時進討嶠深納之亮辟汪參䕶軍事亮嶠互相推為盟主嶠從弟充曰陶征西位重兵彊宐共推之嶠乃遣督䕶王愆期詣荆州邀陶侃與之同赴國難侃猶以不豫顧命為恨答曰吾疆􅂣外將不敢越局嶠屢說不能囘乃順侃意遣使謂之曰仁公且守僕當先下使者去已二日平南叅軍滎陽毛寳别使還聞之說嶠曰凡舉大事當與天下共之師克在和不宐異同假令可疑猶當外示不覺况自為攜貳邪宐急追信改書言必應俱進若不及前信當更遣使嶠意悟即追使者改書侃果許之遣督䕶龔登帥兵詣嶠嶠有衆七千於是列上尚書陳祖約蘇峻罪狀移告征鎮灑泣登舟陶侃復追龔登還嶠遺侃書曰大軍有進而無退可増而不可減近已移檄逺近言於盟府刻後月半大舉諸郡軍並在路次惟須仁公軍至便齊進耳仁公今召軍還疑惑逺近成敗之由將在於此僕才輕任重實憑仁公篤愛逺禀成規至於首啓戎行不敢有辭僕與仁公如首尾相衛脣齒相依也恐或者不達髙㫖將謂仁公緩於討賊此聲難追僕與仁公並受方嶽之任安危休慼理既同之且自頃之顧綢繆徃來情深義重一旦有急亦望仁公悉衆見救况社稷之難乎今日之憂豈惟僕一州文武莫不翹企假令此州不守約峻樹置官長於此荆楚西逼彊胡東接逆賊因之以饑饉將來之危乃當甚於此州之今日也仁公進當為大晉之忠臣參桓文之功退當以慈父之情雪愛子之痛今約峻凶逆無道痛感天地人心齊壹咸皆切齒今之進討若以石投卵耳茍復召兵還是為敗於幾成也願深察所陳王愆期謂侃曰蘇峻豺狼也如得遂志四海雖廣公寧有容足之地乎侃深感悟即戎服登舟瞻喪至不臨晝夜兼道而進郗鑒在廣陵城孤糧少逼近胡㓂人無固志得詔書即流涕誓衆入赴國難將士争奮遣將軍夏侯長等閒行謂温嶠曰或聞賊欲挾天子東入㑹稽當先立營壘屯據要害既防其越逸又斷賊糧運然後清野堅壁以待賊賊攻城不㧞野無所掠東道既斷糧運自絶必自潰矣嶠深以為然五月陶侃帥衆至尋陽議者咸謂侃欲誅庾亮以謝天下亮甚懼用温嶠計詣侃拜謝侃驚止之曰庾元規乃拜陶士行邪亮引咎自責風止可觀侃不覺釋然曰君侯脩石頭以擬老子今日反見求邪即與之談宴終日遂與亮嶠同趣建康戎卒四萬旌旗七百餘里鉦鼓之聲震於逺近蘇峻聞西方兵起用叅軍賈寧計自姑孰還據石頭分兵以拒侃等乙未峻逼遷帝於石頭司徒導固争不從帝哀泣升車宮中慟哭時天大雨道路泥濘劉超鍾雅步侍左右峻給馬不肯乘而悲哀慷慨峻聞而惡之然未敢殺也以其親信許方等補司馬督殿中監外託宿衛内實防禦超等峻以倉屋為帝宮日來帝前肆醜言劉超鍾雅與右光禄大夫荀崧金紫光禄大夫華恒尚書荀邃侍中丁潭侍從不離帝側時饑饉米貴峻問遺超一無所受繾綣朝夕臣節愈恭雖居幽厄之中超猶啓帝授孝經論語峻使左光禄大夫陸曄守留臺逼迫居民盡聚之後苑使匡術守苑城尚書左丞孔坦奔陶侃侃以為長史初蘇峻遣尚書張闓權督東軍司徒導密令以太后詔諭三呉吏士使起義兵救天子㑹稽内史王舒以庾氷行奮武將軍使將兵一萬西渡浙江於是呉興太守虞潭呉國内史蔡謨前義興太守顧衆等皆舉兵應之潭母孫氏謂潭曰汝當捨生取義勿以吾老為累盡遣其家僮從軍鬻其環珮以為軍資謨以庾氷當還舊任即去郡以讓氷蘇峻聞東方兵起遣其將管商張健􅀪徽等拒之虞潭等與戰互有勝負未能得前陶侃温嶠軍于茄子浦嶠以南兵習水蘇峻兵便步令將士有上岸者死㑹峻送米萬斛饋祖約約遣司馬桓撫等迎之毛寳帥千人為嶠前鋒告其衆曰兵灋軍令有所不從豈可視賊可擊不上岸擊之邪乃擅徃襲撫悉獲其米斬獲萬計約由是飢乏嶠表寳為廬江太守陶侃表王舒監浙東軍事虞潭監浙西軍事郗鑒都督揚州八郡諸軍事令舒潭皆受鑒節度鑒帥衆渡江與侃等會于茄子浦雍州刺史魏該亦以兵㑹之丙辰侃等舟師直指石頭至于蔡洲侃屯查浦嶠屯沙門浦峻登烽火樓望見士衆之盛有懼色謂左右曰吾本知温嶠能得衆也庾亮遣督䕶王彰擊峻黨張矅反為所敗亮送節傳以謝侃侃答曰古人三敗君侯始二當今事急不宐數爾亮司馬陳郡殷融詣侃謝曰將軍為此非融等所裁王彰至曰彰自為之將軍不知也侃曰昔殷融為君子王彰為小人今王彰為君子殷融為小人宣城内史桓彛聞京城不守慷慨流涕進屯涇縣時州郡多遣使降蘇峻禆惠復勸彛宐且與通使以紓交至之禍彛曰吾受國厚恩義在致死焉能忍恥與逆臣通問如其不濟此則命也彛遣將軍俞縱守蘭石峻遣其將韓晃攻之縱將敗左右勸縱退軍縱曰吾受桓侯厚恩當以死報吾之不可負桓侯猶桓侯之不負國也遂力戰而死晃進軍攻彛六月城陷執彛殺之諸軍初至石頭即欲决戰陶侃曰賊衆方盛難與争鋒當以嵗月智計破之既而屢戰無功監軍部將李根請築白石壘侃從之夜築壘至曉而成聞峻軍嚴聲諸將咸懼其來攻孔坦曰不然若峻攻壘必須東北風急令我水軍不得徃救今天清静賊必不來所以嚴者必遣軍出江乘掠京口以東矣已而果然侃使庾亮以二千人守白石峻帥步騎萬餘四面攻之不克王舒虞潭等數與峻兵戰不利孔坦曰本不須召郗公遂使東門無限今宐遣還雖晩猶勝不也侃乃令鑒與後將軍郭黙還據京口立大業曲阿庱亭三壘以分峻之兵勢使郭黙守大業壬辰魏該卒祖約遣祖渙桓撫襲湓口陶侃聞之將自擊之毛寳曰義軍恃公公不可動寳請討之侃從之渙撫過皖因攻譙國内史桓宣寶往救之為渙撫所敗箭貫寳髀徹鞍寳使人蹋鞍㧞箭血流滿鞾還擊渙撫破走之宣乃得出歸于温嶠寶進攻祖約軍于東闗㧞合肥戍㑹嶠召之復歸石頭祖約諸將隂與後趙通謀許為内應後趙將石聰石堪引兵濟淮攻壽春秋七月約衆潰奔歴陽聰等虜壽春二萬餘戸而歸後趙中山公虎帥衆四萬自軹闗西入擊趙河東應之者五十餘縣遂進攻蒲阪趙主曜遣河閒王述發氐羌之衆屯秦州以備張駿楊難敵自將中外精銳水陸諸軍以救蒲阪自衛闗北濟虎懼引退曜追之八月及於高候與虎戰大破之斬石瞻枕尸二百餘里収其資仗億計虎奔朝歌曜濟自大陽攻石生于金墉決千金堨以灌之分遣諸將攻汲郡河内後趙滎陽太守尹矩野王太守張進等皆降之襄國大震張駿治兵欲乘虛襲長安理曹郎中索詢諌曰劉曜雖東征其子􅅌守長安未易輕也借使小有所獲彼若釋東方之圖還與我校禍難之期未可量也駿乃止
