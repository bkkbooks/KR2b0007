body:
  text: 十二月己卯立皇子子建爲湘東王􅀄太祖以􅀯方錢少更欲鑄錢建元末奉朝請孔顗上言以爲食貨相通理勢自然李悝云糴甚貴傷民甚賤傷農甚賤甚貴其傷一也三吴國之􅀜奥比嵗時􅀍水潦而糴不貴是天下錢少非穀賤此不可不察也鑄錢之弊在輕重屢變重錢患難用而難用爲累輕輕錢弊盜鑄而盜鑄爲禍深民所以盜鑄嚴法不能禁者由上鑄錢惜銅愛工也惜銅愛工者意謂錢爲無用之器以通交易務欲令質輕而數多使省工而易成不詳慮其爲患也夫民之趨利如水走下今開其利端從以重刑是導其爲非而䧟之於死豈爲政歟漢興鑄輕錢民巧僞者多至元狩中始懲其弊乃鑄五銖錢周郭其上下令不可磨取鋊而民計其費不能相償私鑄益少此不惜銅不愛工之效也王者不患無銅乏工每令民不能競則盜鑄絶矣宋文帝鑄四銖至景和錢益輕雖有周郭而鎔冶不精於是盗鑄紛紜而起不可復禁此惜銅愛工之驗也凡鑄錢與其不衷寜重無輕自漢鑄五銖至宋文帝歷五百餘年制度丗有廢興而不變五銖者明其輕重可法得貨之宜故也案今錢文率皆五銖異錢時有耳自文帝鑄四銖又不禁民翦鑿爲禍既博鍾弊于今豈不悲哉晉氏不鑄錢後經冦戎水火耗散沈鑠所失嵗多譬猶磨礱砥礪不見其損有時而盡天下錢何得不竭錢竭則士農工商皆喪其業民何以自存愚以爲宜如舊制大興鎔鑄錢重五銖一依漢法若官鑄者巳若布於民便嚴断剪鑿輕小破缺無周郭者悉不得行官錢細小者稱合銖兩銷以爲大利貧良之民塞姦巧之路錢貨既均逺近若一百姓樂菐市道無爭衣食滋殖矣太祖然之使諸州郡大市銅炭㑹晏駕事寢是嵗益州行事劉悛上言蒙山下有嚴道銅山舊鑄錢處可以經略上從之遣使入蜀鑄錢頃之以功費多而止自太祖治黄籍至上謫巧者戍縁淮各十年百姓怨望乃下詔自宋昇明以前皆聽復汪其有謫役邊疆各許還本此後有犯嚴加翦治長沙威王晃卒吏部尚書王晏陳疾自解上欲以西昌矦鸞代晏領選手敕問之晏啓曰鸞清幹有餘然不諳百氏恐不可居此職上乃止以百濟王牟大爲鎮東大將軍百濟王髙車阿伏至羅及窮竒遣使如魏請爲天子討除蠕蠕魏主賜以繡袴褶及雜綵百匹九年春正月辛丑上祀南郊丁卯魏主始聽政於皇信東室詔太廟四時之祭薦宣皇帝起麪餅鴨􅌜孝皇后筍鴨􅆑高皇帝肉膾葅羮昭皇后茗粣炙魚皆所􅄝也上夢太祖謂已宋氏諸帝常在太廟從我求食可别爲吾致祠乃命豫章王妃􅁃氏四時祠二帝二后於清溪故宅牲牢服章皆用家人禮臣光曰昔屈到􅄝芰屈建去之以爲不可以私欲干國之典況子爲天子而以庶人之禮祭其父違禮甚矣衞成公欲祀相寗武子猶非之而況降祀祖考於私室使庶婦尸之乎初魏主召吐谷渾王伏連籌入朝伏連籌辭疾不至輒修洮陽泥和二城置戍兵焉二月乙亥魏枹罕鎮將長孫百年請擊二戍魏主許之散􅀐常侍裴昭明散􅀐侍郎謝竣如魏弔欲以朝服行事魏主客曰弔有常禮何得以朱衣入凶庭昭明等曰受命本朝不敢輒易往返數四昭明等固執不可魏主命尚書李沖選學識之士與之言沖奏遣著作郎上谷成淹昭明等曰魏朝不聽使者朝服出何典禮淹曰吉凶不相厭羔裘玄冠不以弔此童稚所知也昔季孫如晉求遭喪之禮以行今卿自江􅀯逺來弔魏方問出何典禮行人得失何其逺哉昭明曰二國之禮應相準望齊髙皇帝之喪魏遣李彪來弔初不素服齊朝亦不以爲疑何至今日獨見要逼淹曰齊不能行亮隂之禮踰月即吉彪奉使之日齊之君臣鳴玉􅄹庭貂璫曜目彪不得主人之命敢獨以素服厠其間乎皇帝仁孝侔於有虞執親之喪居廬食粥豈得以此方彼乎昭明曰三王不同禮孰能知其得失淹曰然則虞舜髙宗皆非邪昭明竣相顧而笑曰非孝者無親何可當也乃曰使人之來唯齎袴褶此既戎服不可以弔唯主人裁其弔服然違本朝之命返必􅀗罪淹曰使彼有君子卿將命得宜且有厚賞若無君子卿出而光國得罪何傷自當有良史書之乃以衣幍給昭明等使服以致命己丑引昭明等入見文武皆哭盡哀魏主嘉淹之敏遷侍郎賜絹百匹昭明駰之子也始興簡王鑑卒三月甲辰魏主謁永固陵夏四月癸亥朔設薦於太和廟魏主始進􅂼食追感哀哭終日不飯侍中馮誕等諫經宿乃飯甲子罷朝夕哭乙丑復謁永固陵魏自正月不雨至于癸酉有司請祈百神帝曰成湯遭旱以至誠致雨固不在曲禱山川今普天喪恃幽顯同哀何宜四氣未周遽行祀事唯當責躬以待天譴甲戌魏貟外散􅀐常侍李彪等來聘爲之置燕設樂彪辭樂且曰主上孝思罔極興墜正失去三月丗不遷平文之功少於昭成而廟號太祖道武之功高於平文而廟號烈祖於義未允朕今奉尊烈祖爲太祖以丗祖顯祖爲土祧餘皆以次而遷八月壬辰又詔議養老及禋于六宗之禮先是魏常以正月吉日於朝廷設幕中置松栢樹設五帝座而祠之又有探䇿之祭帝皆以爲非禮罷之戊戌移道壇於桑乾之隂攺曰崇虚寺乙巳帝引見羣臣問以禘祫王鄭之義是非安在尚書游明根等從鄭中書監高閭等從王詔圜丘宗廟皆有禘名從鄭禘祫并爲一祭從王著之於令戊午又詔國家饗祀諸神凡一千二百餘處今欲減省羣祀務從􅂤約又詔明堂太廟配祭配享於斯備矣白登崞山雞鳴山廟唯遣有司行事馮宣王廟在長安宜敇雍州以時供祭又詔先有水火之神四十餘名及城北星神今圜丘之下既祭風伯雨師司中司命明堂祭門戸井竈中霤四十神悉可罷之甲寅詔曰近論朝日夕月皆欲以二分之日於東西郊行禮然月有餘閠行無常準若一依分日或值月於東而行禮於西序情即理不可施行昔祕書監薛謂等以爲朝日以朔夕月以朏卿等意謂朔朏二分何者爲是尚書游明根等請用朔朏從之丙辰魏有司上言求卜祥日詔曰筮日求吉既乖敬事之志又違永慕之心今直用晦日九月丁丑夜帝宿于廟帥羣臣哭巳帝易服縞冠革帶黒屨侍臣易服黒介幘白絹單衣革帶烏履遂哭盡乙夜戊子晦帝易祭服縞冠素紕白布深衣麻繩履侍臣去幘易幍既祭出廟帝立哭乆之乃還冬十月魏明堂太廟成庚寅魏主謁永固陵毀瘠猶甚司空穆亮諫曰陛下祥練巳闋號慕如始王者爲天地所子爲萬民父母未有子過哀而父母不戚父母憂而子獨恱豫者也今和氣不應風旱爲災願陛下襲輕服御常膳鑾輿時動咸秩百神庶使天人交慶詔曰孝悌之至無所不通今飄風旱氣皆誠慕未濃幽顯無感也所言過哀之咎諒爲未􅂨十一月己未朔魏主禫於太和廟衮冕以祭既而服黒介幘素紗深衣拜陵而還癸亥冬至魏主祀圜丘遂祀明堂還至太和廟乃入甲子臨太華殿服通天冠絳紗袍以饗羣臣樂縣而不作丁卯服衮冕辭太和廟帥百官奉神主遷于新廟乙亥魏大定官品戊戌考諸牧守魏假通直散騎李彪等來聘魏舊制羣臣季冬朝賀服袴褶行事謂之小嵗丙戌詔罷之十二月壬辰魏遷社於内城之西魏以安定王休爲太􅀓齊郡王簡爲太保髙麗王璉卒壽百餘嵗魏主爲之制素委貌布深衣舉哀於東郊遣謁者僕射李安上策贈太􅀓謚曰康孫雲嗣立乙酉魏主始迎春於東郊自是四時迎氣皆親之初魏丗祖克統萬及姑臧􅀗雅樂器服工人並存之其後累朝無留意者樂工浸盡音制多亡髙祖始命有司訪民閒曉音律者議定雅樂當時無能知者然金石羽旄之飾稍壯麗於往時矣辛亥詔簡置樂官使脩其職又命中書監高閭參定初晉張斐杜預共注律三十卷自泰始以來用之律文簡約或一章之中兩家所處生殺頓異臨時斟酌吏得爲姦上留心法令詔獄官詳正舊注七年尚書刪定郎王植集定二注表奏之詔公卿八座參議考正竟陵王子良揔其事衆議異同不能壹者制旨平決是歳書成廷尉山隂孔稚珪上表以爲律文雖定苟用失其平則法書徒明於袠裏寃魂猶結於獄中竊尋古之名流多有法學今之士子莫肯爲業縱有習者丗議所輕將恐此書永淪走吏之手矣今若置律助教依五經例國子生有欲讀者策試高第即加擢用以補内外之官庶幾士流有所􅂆慕詔從其請事竟不行初林邑王范陽邁丗相承襲夷人范當根純攻奪其國遣使獻金簟等物詔以當根純爲都督縁海諸軍事林邑王魏冀州刺史咸陽王禧入朝有司奏冀州民三千人稱禧清明有惠政請丗胙冀州魏主詔曰利建雖古未必今宜經野由君理非下情以禧爲司州牧都督司豫等六州諸軍事初魏文明太后寵任宦者略陽苻承祖官至侍中知都曹事賜以不死之詔太后殂承祖坐贓應死魏主原之削職禁錮於家仍除悖義將軍封佞濁子月餘而卒承祖方用事親姻爭趨附以求利其從母楊氏爲姚氏婦獨否常謂承祖之母曰姊雖有一時之榮不若妹有無憂之樂姊與之衣服多不受彊與之則曰我夫家丗貧美衣服使人不安不得巳或受而埋之與之奴婢則曰我家無食不能飼也常著弊衣自執勞苦承祖遣車迎之不肯起彊使人抱置車上則大哭曰爾欲殺我由是苻氏内外號爲癡姨及承祖敗有司執其二姨至殿廷其一姨伏法帝見姚氏姨貧弊特赦之李惠之誅也思皇后之昆弟皆死惠從弟鳳爲安樂王長樂主簿長樂坐不􅁤誅鳳亦坐死鳳子安祖等四人逃匿􅀗免遇赦乃出既而魏主訪舅氏存者得安祖等皆封矦加將軍既而引見謂曰卿之先丗再􅀗罪於時王者設官以待賢才由外戚而舉者季丗之法也卿等既無異能且可還家自今外戚無能者視此後又例降爵爲伯去其軍號時人皆以爲帝待馮氏太厚待李氏太薄太常髙閭嘗以爲言帝不聽及丗宗尊寵外家乃以安祖弟興祖爲中山太守追贈李惠開府儀同三司中山公謚曰莊十年春正月戊午朔魏主朝饗羣臣於太華殿懸而不樂己未魏主宗祀顯祖於明堂以配上帝遂登靈臺以􅀚雲物降居青陽左个布政事自是每朔依以爲常散􅀐常侍􅁃蓽等聘於魏魏主使侍郎成淹引蓽等於館南瞻望行禮辛酉魏始以太祖配􅀯郊魏主命羣臣議行次中書監髙閭議以爲帝王莫不以中原爲正統不以丗數爲與奪善惡爲是非故桀紂至虐不廢夏商之歷厲惠至昏無害周晉之録晉承魏爲金趙承晉爲水燕承趙爲木秦承燕爲火秦之既亡魏乃稱制玄朔且魏之得姓出於軒轅臣愚以爲宜爲土德祕書丞李彪著作郎崔光等議以爲神元與晉武往來通好至于􅁊穆志輔晉室是則司馬祚終於郟鄏而拓跋受命於雲代昔秦并天下漢猶比之共工卒繼周爲火德況劉石苻氏地􅄶丗促魏承其弊豈可捨晉而爲土邪司空穆亮等皆請從彪等議壬戌詔承晉爲水德祖申臘辰甲子魏罷租課魏宗室及功臣子孫封王者衆乙丑詔自非烈祖之胄餘王皆降爲公公降爲矦而品如舊蠻王􅁊誕亦降爲公唯上黨王長孫􅀚以其祖有大功特不降丹楊王劉昶封齊郡公加號宋王魏舊制四時祭廟皆用中節丙子始詔用孟月擇日而祭以竟陵王子良領尚書令魏主毀太華殿爲太極殿二月戊子徙居永樂宫以尚書李沖領將作大匠與司空穆亮共營之辛卯魏罷寒食饗甲午魏主始朝日于東郊自是朝日夕月皆親之丁酉詔祀堯於平陽舜於廣寗禹於安邑周公於洛陽皆令牧守執事其宣尼之廟祀於中書省丁未攺謚宣尼曰文聖尼父帝親行拜祭魏舊制每歳祀天於西郊魏主與公卿從二千餘􅀐戎服遶壇謂之蹹壇明日復戎服登壇致祀巳又遶壇謂之遶天三月癸酉詔盡省之辛巳魏以髙麗王雲爲督遼海諸軍事遼東公髙句麗王詔雲遣其丗子入朝雲辭以疾遣其從叔升干隨使者詣平城夏四月丁亥朔魏班新律令大赦辛丑豫章文獻王嶷卒贈假黄􅃏都督中外諸軍事丞相喪禮皆如漢東平獻王故事嶷性仁謹廉儉不以財賄爲事齋庫失火燒荆州還資評直三千餘萬主局各杖數十而巳疾篤遺令諸子曰才有優劣位有通塞運有貧冨此自然之理無足以相陵侮也上哀痛特甚乆之語及嶷猶歔欷流涕嶷卒之日第庫無見錢上敇月給嶷第錢百萬終上之丗乃省五月己巳以竟陵王子良爲楊州刺史魏文明太后之喪使人告於吐谷渾吐谷渾王伏連籌拜命不㳟羣臣請討之魏主不許又請還其貢物帝曰貢物乃人臣之禮今而不受是棄絶之彼雖欲自新其路無由矣因命歸洮陽泥和之俘秋七月庚申吐谷渾遣其丗子賀虜頭入朝于魏詔以伏連籌爲都督西垂諸軍事西海公吐谷渾王遣兼貟外散􅀐常侍張禮使於吐谷渾伏連籌謂禮曰曩者宕昌常自稱名而見謂爲大王今忽稱僕又拘執使人欲使偏師往問何如禮曰君與宕昌皆爲魏藩比輙興兵攻之殊違臣節離京師之日宰輔有言以爲君能自知其過則藩業可保若其不悛禍難將至矣伏連籌黙然甲戌魏遣兼貟外散􅀐常侍廣平宋弁等來聘及還魏主問弁江南何如弁曰蕭氏父子無大功於天下既以逆取不能順守政令苛碎賦役繁重朝無股肱之臣野有愁怨之民其得没身幸矣非貽厥孫謀之道也八月乙未魏以懐朔鎮將陽平王頥鎮北大將軍陸叡皆爲都督督十二將步􅀐十萬分爲三道以擊柔然中道出黒山東道趣士盧河西道趣矦延河軍過大磧大破柔然而還初柔然伏名敦可汗與其叔父那蓋分道擊高車阿伏至羅伏名敦屢敗那蓋屢勝國人以那蓋爲得天助乃殺伏名敦而立那蓋號候其伏代庫者可汗攺元太安魏司徒尉元大鴻臚卿游明根累表請老魏主許之引見賜元􅀇冠素衣明根委貌青紗單衣及􅀍服雜物等而遣之魏主親養三老五更於明堂己酉詔以元爲三老明根爲五更帝再拜三老親􅃝割牲執爵而饋肅拜五更且乞言焉元明根勸以孝友化民又養國老庶老於階下禮畢各賜元明根以步挽車及衣服禄三老以上公五更以元卿九月甲寅魏主序昭穆於明堂祀文明太后於玄室辛未魏主以文明太后再朞哭於永固陵左終日不輟聲凡二日不食甲戌辭陵還永樂宫武興氐王楊集始寇漢中至白馬梁州刺史隂智伯遣軍主􅁊盧奴隂沖昌等擊破之俘斬數千人集始走還武興請降于魏辛巳入朝于魏魏以集始爲南秦州刺史漢中郡矦武興王冬十月甲午上殷祭太廟庚戌魏以安定王休爲大司馬特進馮誕爲司徒誕熈之子也魏太極殿成十二月司徒參軍蕭琛范雲聘於魏魏主甚重齊人親與談論顧謂羣臣曰江􅀯多好臣侍臣李元凱對曰江􅀯多好臣歳一易主江北無好臣百年一易主魏主甚慙上使太子家令沈約撰宋書疑立􅀽粲傳審之於上上曰􅀽粲自是宋室忠臣約又多載宋丗祖太宗諸鄙瀆事上曰孝武事迹不容頓爾我昔經事明帝卿可思諱惡之義於是多所刪除是歳林邑王范陽邁之孫諸農帥種人攻范當根純復得其國詔以諸農爲都督縁海諸軍事林邑王魏南陽公鄭羲與李沖昏姻冲引爲中書令出爲西兖州刺史在州貪鄙文明太后爲魏主納其女爲嬪徵爲祕書監及卒尚書奏謚曰宣詔曰蓋棺定謚激揚清濁故何曾雖孝良史載其繆醜賈充有勞直士謂之荒公羲雖宿有文業而治闕廉清尚書何乃情遺至公愆違明典依謚法愽聞多見曰文不勤成名曰靈可贈以本官加謚文靈資治通鑑卷一百三十七
