front:
  text: 史􅃡鸞之弟也􅃡留心獄訟得劫皆赦遣許以自新再犯乃加誅民畏而愛之癸卯大赦丙午魏主如方山丙辰遂如靈泉池八月丙寅朔還宫河南王度易矦卒乙酉以其丗子伏連籌爲秦河二州刺史遣振武將軍丘冠先拜授且弔之伏連籌逼冠先使拜冠先不從伏連籌推冠先墜崖而死上厚賜其子雄敕以喪委絶域不可復尋仕進無嫌荆州刺史巴東王子響有勇力善􅀐射好武事自選帶仗左右六十人皆有膽幹至鎮數於內齋以牛酒犒之又私作錦􅂁絳襖欲以餉蠻交易器仗長史髙平劉寅司馬安定席恭穆等連名密啓上敕精檢子響聞臺使至不見敇召寅恭穆及諮議參軍江悆典籖吴脩之魏景淵等詰之寅等祕而不言脩之曰既巳降敇政應方便荅塞景淵曰應先檢校子響大怒執寅等八人於後堂殺之具以啓聞上欲赦江悆聞皆巳死怒壬辰以隨王子隆爲荆州刺史上欲遣淮南太守戴僧靜將兵討子響僧靜靣啓曰巴東王年少長史執之大急忿不思難故耳天子兒過誤殺人有何大罪官忽遣軍西上人情惶懼無所不至僧靜不敢奉敇上不荅而心善之乃遣衞尉胡諧之游擊將軍尹略中書舍人茹法亮帥齋仗數百人詣江陵檢捕羣小敇之曰子響若束手自歸可全其命以平南內史張欣泰爲諧之副欣泰謂諧之曰今叚之行勝既無名負成竒恥彼凶狡相聚所以爲其用者或利賞逼威無由自潰若頓軍夏口宣示禍福可不戰而擒也諧之不從欣泰興丗之子也諧之等至江津築城燕尾洲子響白服登城頻遣使與相聞曰天下豈有兒反身不作賊直是麤踈今便單舸還闕受殺人之罪何築城見捉邪尹略獨荅曰誰將汝反父人共語子響唯灑泣乃殺牛具酒饌餉臺軍略棄之江流子響呼茹法亮法亮疑畏不肯往又求見傳詔法亮亦不遣且執録其使子響怒遣所養勇士收集府州兵二千人從靈溪西渡子響自與百餘人操万鈞弩宿江隄上明日府州兵與臺軍戰子響於隄上發弩射之臺軍大敗尹略死諧之等單艇逃去上又遣丹楊尹蕭順之將兵繼至子響即日將白衣左右三十人乗舴艋􅆓流赴建康太子長懋素忌子響順之之發建康也太子密諭順之使早爲之所勿令得還子響見順之欲自申明順之不許於射堂縊殺之子響臨死啓上曰臣罪踰山海分甘斧􅃏敇遣諧之等至竟無宣㫖便建旗入津對城南岸築城守臣累遣書信呼法亮乞白服相見法亮終不肯羣小懼怖遂致攻戰此臣之罪也臣此月二十五日束身投軍希還天闕停宅一月臣自取盡可使齊代無殺子之譏臣免逆父之謗既不遂心今便命盡臨啓哽塞知復何陳有司奏絶子響屬籍削爵土易姓蛸氏諸所連坐别下考論乆之上遊華林園見一猨透擲悲鳴問左右曰猿子前日墜崖死上思子響因嗚咽流涕茹法亮頗爲上所責怒蕭順之慙懼發疾而卒豫章王嶷表請收葬子響不許貶爲魚復矦子響之亂方鎮皆啓子響爲逆兖州刺史􅁊榮祖曰此非所宜言正應云劉寅等孤負恩奬逼迫巴東使至於此上省之以榮祖爲知言臺軍焚燒江陵府舎官曹文書一時蕩盡上以大司馬記室􅀯陽樂藹屢爲本州僚佐引見問以西事藹應對詳敏上恱用爲荆州治中敕付以脩復府州事藹繕脩􅅟舎數百區頃之咸畢而役不及民荆部稱之九月癸丑魏太皇太后馮氏殂髙祖勺飲不入口者五日哀毀過禮中部曹華隂楊椿諫曰陛下荷祖宗之業臨万國之重豈可同匹夫之節以取僵仆羣下惶灼莫知所言且聖人之禮毀不滅性縱陛下欲自賢於万代其若宗廟何帝感其言爲之一進粥於是諸王公等皆詣闕上表請時定兆域及依漢魏故事并太皇太后終制既葬公除詔曰自遭禍罰慌惚如昨奉侍梓宫猶希髣髴山陵遷厝所未忍聞冬十月王公復上表固請詔曰山陵可依典􅁽衰服之宜情所未忍帝欲親至陵所戊辰詔諸常從之具悉可停之其武衞之官防侍如法癸酉葬文明太皇太后于永固陵甲戌帝謁陵王公固請公除詔曰比當别叙在心己卯又謁陵庚辰帝出至思賢門右與羣臣相慰勞太尉丕等進言曰臣等以老朽之年歷奉累聖國家舊事頗所知聞伏惟逺祖有大諱之日唯侍送梓宫者凶服左右盡皆從吉四祖三宗因而無攺陛下以至孝之性哀毁過禮伏聞所御三食不滿半溢晝夜不釋絰帶臣等叩心絶氣坐不安席願少抑至慕之情奉行先朝舊典帝曰哀毁常事豈足􅀜言朝夕食粥粗可支任諸公何足憂怖祖宗情專武略未脩文教朕今仰禀聖訓庶習古道論時比事又與先丗不同太尉等國老政之所􅀉於典記舊式或所未悉旦可知朕大意其餘古今喪禮朕且以所懐别問尚書游明根髙閭等公可聽之帝因謂明根等曰聖人制卒哭之禮授服之變皆奪情以漸今則旬日之閒言及即吉特成傷理對曰臣等伏尋金􅁽遺旨踰月而葬葬而即吉故於下葬之初奏練除之事帝曰朕惟中代所以不遂三年之喪蓋由君上違丗繼主初立君德未流臣義不洽故身襲衮冕行即位之禮朕誠不德在位過紀足令億兆知有君矣於此之日而不遂哀慕之心使情禮俱失深可痛恨髙閭曰杜預晉之碩學論自古天子無有行三年之喪者以爲漢文之制闇與古合雖叔丗所行事可承踵是以臣等慺慺干請帝曰竊尋金􅁽之㫖所以奪臣子之心令早即吉者慮廢絶政事故也羣公所請其志亦然朕今仰奉􅁽令俯順羣心不敢闇黙不言以荒庶政唯欲衰麻廢吉禮朔望盡哀誠情在可許故專欲行之如杜預之論於孺慕之君諒闇之主蓋亦誣矣祕書丞李彪曰漢明德馬后保養章帝母子之道無可間然及后之崩葬不淹旬尋巳從吉然漢章不受譏明徳不損名願陛下遵金􅁽遺令割哀從議帝曰朕所以眷戀衰絰不從所議者實情不能忍豈徒苟免嗤嫌而巳哉今奉終儉素一巳仰遵遺􅁽但痛慕之心事繫於予庶聖靈不奪至願耳髙閭曰陛下既不除服於上臣等獨除服於下則爲臣之道不足又親御衰麻復聽朝政吉凶事雜臣竊爲疑帝曰先后撫念羣下卿等哀慕猶不忍除柰何令朕獨忍之於至親乎朕今逼於遺􅁽唯望至朞雖不盡禮藴結差申羣臣各以親踈貴賤逺近爲除服之差庶幾稍近於古易行於今高閭曰昔王孫祼葬士安去棺其子皆從而不違今親奉遺令而有所不從臣等所以頻煩干奏李彪曰三年不攺其父之道可謂大孝今不遵􅁽令恐涉攺道之嫌帝曰王孫士安皆誨子以儉及其遵也豈異今日攺父之道殆與此殊縱有所涉甘受後代之譏未忍今日之請羣臣又言春秋烝甞事難廢闕帝曰自先朝以來􅁪有司行事朕賴蒙慈訓常親致敬今昊天降罸人神喪恃想宗廟之靈亦輟歆祀脫行饗薦恐乖􅑡㫖羣臣又言古者葬而即吉不必終禮此乃二漢所以經綸治道魏晉所以綱理庶政也帝曰既葬即吉蓋季俗多亂􅁠宜救丗耳二漢之盛魏晉之興豈由簡略喪禮遺忘仁孝哉平日之時公卿每稱當今四海晏然禮樂日新可以參美唐虞比盛夏商及至今日即欲苦奪朕志使不踰於魏晉如此之意未解所由李彪曰今雖治化清晏然江􅀯有未賔之吴漠北有不臣之虜是以臣等猶懐不虞之慮帝曰魯公帶絰從戎晉矦墨衰敗敵固聖賢所許如有不虞雖越紼無嫌而況衰麻乎豈可於晏安之辰豫念軍旅之事以廢喪紀哉古人亦有稱王者除衰而諒闇終喪者若不許朕衰服則當除衰拱黙委政􅃁宰二事之中唯公卿所擇游明根曰淵黙不言則大政將曠仰順聖心請從衰服太尉丕曰臣與尉元歷事五帝魏家故事尤諱之後三月必迎神於西禳惡於北具行吉禮自皇始以來未之或攺帝曰若能以道事神不迎自至苟失仁義雖迎不來此乃平日所不當行況吾喪乎朕在不言之地不應如此喋喋但公卿執奪朕情遂成往復追用悲絶遂號慟羣官亦􅂘而辭出初太后忌帝英敏恐不利於己欲廢之盛寒閉於空室絶其食三日召咸陽王禧將立之太尉東陽王丕尚書右僕射穆泰尚書李沖固諫乃止帝初無憾意唯深德丕等泰崇之玄孫也又有宦者譖帝於太后太后杖帝數十帝黙然受之不自申理及太后殂亦不復追問甲申魏主謁永固陵辛卯詔曰羣官以萬機事重屢求聽政但哀慕纒綿未堪自力近侍先掌機衡者皆謀猷所􅀉且可委之如有疑事當時與論決交州刺史清河房法乗專好讀書常屬疾不治事由是長史伏登之得擅權攺易將吏不令法乗知録事房季文白之法乗大怒繫登之於獄十餘日登之厚賂法乗妺夫崔景叔得出因將部曲襲州執法乗謂之曰使君既有疾不宜煩勞囚之别室法乗無事復就登之求書讀之登之曰使君靜處猶恐動疾豈可看書遂不與乃啓法乗心疾動不任視事十一月乙卯以登之爲交州刺史法乗還至嶺而卒
