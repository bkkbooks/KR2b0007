body:
  text: 臣司馬光奉勑編集唐紀八十一兆攝提格凡二年有竒起閼逢困敦五月盡柔昭宗聖穆景文孝皇帝下之天祐元年五月丙寅加河陽節度使張漢瑜同平章事帝宴朱全忠及百官於崇勲殿既罷復召全忠宴於内殿全忠疑不入帝曰全忠不欲來可令敬翔來全忠擿翔使去曰翔亦醉矣辛未全忠東還乙亥至大梁忠義節度使趙匡凝遣水軍上峽攻王建䕫州知渝州王宗阮等擊敗之萬州刺史張武作鐵絙絶江中流立柵於兩端謂之鏁峽六月李茂貞王建李繼徽傳檄合兵以討朱全忠全忠以鎮國節度使朱友裕爲行營都綂將步騎數萬擊之命保大節度使劉鄩弃鄜州引兵屯同州癸丑全忠引兵自大梁西討茂貞等秋七月甲子過東都入見壬申至河中西川諸將勸王建乗李茂貞之衰攻取鳯翔建以問節度判官馮涓涓曰兵者凶器殘民耗財不可窮也今梁晉虎爭勢不兩立若併而爲一舉兵向蜀雖諸葛亮復生不能敵矣鳯翔蜀之藩蔽不若與之和親結爲㛰姻無事則務農訓兵保固疆埸有事則覘其機事觀舋而動可以萬全建曰善茂貞雖庸才然有强悍之名逺近畏之與全忠力爭則不足自守則有餘使為吾藩蔽所利多矣乃與茂貞修好丙子茂貞遣判官趙鍠如西川為其姪天雄節度使繼崇求昏建以女妻之茂貞數求貨及甲兵於建建皆與之王建賦斂重人莫敢言馮涓因建生日獻頌先美功徳後言生民之苦建愧謝曰如君忠諫功業何憂賜之金帛自是賦歛稍損初朱全忠自鳯翔迎車駕還見徳王裕眉目疎秀且年齒已壯惡之私謂崔􅅌曰徳王嘗奸帝位豈可復留公何不言之􅅌言於帝帝問全忠全忠曰陛下父子之間臣安敢竊議此崔􅅌賣臣耳帝自離長安日憂不測與皇后終日沈飲或相對涕泣全忠使樞密使蔣􅀇暉伺察帝動靜皆知之帝從容謂􅀇暉曰徳王朕之愛子全忠何故堅欲殺之因泣下齧中指血流􅀇暉具以語全忠全忠愈不自安時李茂貞楊崇本李克用劉仁恭王建楊行密趙匡凝移檄往來皆以興復為辭全忠方引兵西討以帝有英氣恐變生於中欲立㓜君易謀禪代乃遣判官李振至洛陽與􅀇暉及左龍武綂軍朱友恭右龍武綂軍氏叔琮等圖之八月壬寅帝在椒殿􅀇暉選龍武牙官史太等百人夜叩宫門言軍前有急奏欲面見帝夫人裴貞一開門見兵曰急奏何以兵為史太殺之􅀇暉問至尊安在昭儀李漸榮臨軒呼曰寧殺我曹勿傷大家帝方醉遽起單衣繞柱走史太追而弑之漸榮以身蔽帝太亦殺之又欲殺何后后求哀於􅀇暉乃釋之癸卯蔣􅀇暉矯詔稱李漸榮裴貞一弑逆宜立輝王祚為皇太子更名柷監軍國事又矯皇后令太子於柩前即位宫中恐懼不敢出聲哭丙午昭宣帝即位時年十三李克用復以張承業為監軍淮南將李神福攻鄂州未下㑹疾病還廣陵楊行密以舒州團練使泌陽劉存代為招討使神福尋卒宣州觀察使臺濛卒楊行密以其子牙内諸軍使渥為宣州觀察使右牙都指揮使徐温謂渥曰王寢疾而嫡嗣出藩此必姦臣之謀佗日相召非温使者及王令書慎無亟來渥泣謝而行九月己巳尊皇后為皇太后朱全忠引兵北屯永壽南至駱谷鳯翔邠寧兵竟不出辛未東還冬十月辛卯朔日有食之朱全忠聞朱友恭等弑昭宗陽驚號哭自投於地曰奴輩負我令我受惡名於萬代癸巳至東都伏梓宫慟哭流涕又見帝自陳非已志請討賊先是䕶駕軍士有掠米於市者甲午全忠奏朱友恭氏叔琮不戢士卒侵擾市肆友恭貶崖州司户復姓名李彦威叔琮貶白州司户尋皆賜自盡彦威臨刑大呼曰賣我以塞天下之謗如鬼神何行事如此望有後乎丙申天平節度使張全義來朝丁酉復以全忠為宣武䕶國宣義天平節度使以全義為河南尹兼忠武節度使判六軍諸衛事乙巳全忠辭赴鎮庚戌至大梁鎮國節度使朱友裕薨於棃園光州叛楊行密降朱全忠行密遣兵圍之與鄂州皆告急於全忠十一月戊辰全忠自將兵五萬自潁州濟淮軍于霍丘分兵救鄂州淮南兵釋光州之圍還廣陵按兵不出戰全忠分命諸將大掠淮南以困之錢鏐潜遣衢州羅城使葉讓殺刺史陳璋事泄十二月璋斬讓而叛降于楊行密初馬殷弟賨性沈勇事孫儒為百勝指揮使儒死事楊行密屢有功遷黒雲指揮使行密嘗從容問其兄弟乃知為殷之弟大驚曰吾常怪汝器度瓌偉果非常人當遣汝歸賨泣辭曰賨淮西殘兵大王不殺而寵任之湖南地近常得兄聲問賨事大王久不願歸也行密固遣之是歲賨歸長沙行密親餞之郊賨至長沙殷表賨為節度副使它日殷議入貢天子賨曰楊王地廣兵彊與吾鄰接不若與之結好大可以為緩急之援小可通商旅之利殷作色曰楊王不事天子一旦朝廷致討罪將及吾汝置此論勿為吾禍初清海節度使徐彦若遺表薦副使劉隱權留後朝廷以兵部尚書崔逺為清海節度使逺至江陵聞嶺南多盜且畏隱不受代不敢前朝廷召逺還隱遣使以重賂結朱全忠乃奏以隱為清海節度使昭宣光烈孝皇帝天祐二年春正月朱全忠遣諸將進兵逼壽州潤州團練使安仁義勇決得士心故淮南將王茂章攻之踰年不克楊行密使謂之曰汝之功吾不忘也能束身自歸當以汝為行軍副使但不掌兵耳仁義不從茂章為地道入城遂克之仁義舉族登樓衆不敢逼先是攻城諸將見仁義輒罵之惟李徳誠不然至是仁義召徳誠登樓謂曰汝有禮吾今以為汝功且以愛妾贈之乃擲弓於地徳誠掖之而下并其子斬於廣陵市兩浙兵圍陳詢于睦州楊行密遣西南招討使陶雅將兵救之軍中夜驚士卒多踰壘亡去左右及禆將韓球奔告之雅安臥不應須臾自定亡者皆還錢鏐遣其從弟鎰及指揮使顧全武王球禦之為雅所敗虜鎰及球以歸庚午朱全忠命李振知青州事代王師範全忠圍壽州州人閉壁不出全忠乃自霍丘引歸二月辛卯至大梁李振至青州王師範舉族西遷至濮陽素服乗驢而進至大梁全忠客之表李振為青州留後戊戌以安南節度使同平章事朱全昱為太師致仕全昱全忠之兄也戇樸無能先領安南全忠自請罷之是日社全忠使蔣􅀇暉邀昭宗諸子徳王裕棣王祤䖍王禊沂王禋遂王禕景王祕祁王琪雅王􅐃瓊王祥置酒九曲池酒酣悉縊殺之投尸池中朱全忠遣其將曹延祚將兵與杜洪共守鄂州庚子淮南將劉存攻拔之執洪延祚及汴兵千餘人送廣陵悉誅之行密以存為鄂岳觀察使已酉葬聖穆景文孝皇帝於和陵廟號昭宗三月庚午以王師範為河陽節度使戊寅以門下侍郎同平章事獨孤損同平章事充靜海節度使以禮部侍郎河間張文蔚同平章事甲申以門下侍郎同平章事裴樞為左僕射崔逺為右僕射並罷政事初栁璨及第不四年為宰相性傾巧輕佻時天子左右皆朱全忠腹心璨曲意事之同列裴樞崔逺獨孤損皆朝廷宿望意輕之璨以為憾和王傅張廷範本優人有寵於全忠奏以為太常卿樞曰廷範勲臣幸有方鎮何籍樂卿恐非元帥之㫖持之不下全忠聞之謂賔佐曰吾常以裴十四器識真純不入浮薄之黨觀此議論本態露矣璨因此并逺損譖於全忠故三人皆罷以吏部侍郎楊涉同平章事渉收之孫也為人和厚恭謹聞當為相與家人相泣謂其子凝式曰此吾家之不幸也必為汝累加清海節度使劉隱同平章事壬辰河東都押牙蓋寓卒遺書勸李克用省營繕薄賦歛求賢俊夏四月庚子有彗星出西北淮南將陶雅㑹衢睦兵攻婺州錢鏐遣其弟鏢將兵救之五月禮院奏皇帝登位應祀南郊敕用十月甲午行之乙丑彗星長竟天栁璨恃朱全忠之勢恣為威福會有星變占者曰君臣俱災宜誅殺以應之璨因疏其素所不快者於全忠曰此曹皆聚徒横議怨望腹非宜以之塞災異李振亦言於全忠曰朝廷所以不理良由衣冠浮薄之徒紊亂綱紀且王欲圖大事此曹皆朝廷之難制者也不若盡去之全忠以為然癸酉貶獨孤損為棣州刺史裴樞為登州刺史崔逺為萊州刺史乙亥貶吏部尚書陸扆為濮州司户工部尚書王溥為淄州司户庚辰貶太子太保致仕趙崇為曹州司户兵部侍郎王賛為濰州司户自餘或門胄髙華或科第自進居三省臺閣以名檢自處聲迹稍著者皆指以為浮薄貶逐無虛日搢紳為之一空辛巳再貶裴樞為瀧州司户獨孤損為瓊州司户崔逺為白州司户甲申忠義節度使趙匡凝遣使修好於王建六月戊子朔敕裴樞獨孤損崔逺陸扆王溥趙崇王賛等並所在賜自盡時全忠聚樞等及朝士貶官者三十餘人於白馬驛一夕盡殺之投尸于河初李振屢舉進士竟不中第故深疾搢紳之士言於全忠曰此輩常自謂清流宜投之黄河使為濁流全忠笑而從之振毎自汴至洛朝臣必有竄逐者時人謂之鴟梟見朝士皆頥指氣使旁若無人全忠嘗與僚佐及遊客坐於大栁之下全忠獨言曰此木宜為車轂衆莫應有遊客數人起應曰宜為車轂全忠勃然厲聲曰書生輩好順口玩人皆此類也車轂須用夾榆栁木豈可為之顧左右曰尚何待左右數十人捽言宜為車轂者悉撲殺之己丑司空致仕裴贄貶青州司户尋賜死栁璨餘怒所注猶不啻十數張文蔚力解之乃止時士大夫避亂多不入朝壬辰敕所在州縣督遣無得稽留前司勲員外郎李延古徳裕之孫也去官居平泉莊詔下未至戊申責授衞尉寺主簿秋七月癸亥太子賔客致仕栁遜貶曹州司馬庚午夜天雄牙將李公佺與牙軍謀亂羅紹威覺之公佺焚府舍剽掠奔滄州八月王建遣前山南西道節度使王宗賀等將兵擊昭信節度使馮行襲於金州朱全忠以趙匡凝東與楊行密交通西與王建結昏乙未遣武寧節度使楊師厚將兵撃之己亥全忠以大軍繼之處州刺史盧約使其弟佶攻䧟温州張惠奔福州錢鏐遣方永珍救婺州初禮部員外郎知制誥司空圖弃官居虞鄉王官谷昭宗屢徵之不起栁璨以詔書徴之圖懼詣洛陽入見陽為衰野墜笏失儀璨乃復下詔略曰既養髙以傲代類移山以釣名又曰匪夷匪惠難居公正之朝可放還山圖臨淮人也楊師厚攻下唐鄧復郢隨均房七州朱全忠軍于漢北九月辛酉命師厚作浮梁於隂谷口癸亥引兵度漢甲子趙匡凝將兵二萬陳于漢濱師厚與戰大破之遂傅其城下是夕匡凝焚府城帥其族及麾下士㳂漢奔廣陵乙丑師厚入襄陽丙寅全忠繼至匡凝至廣陵楊行密戲之曰君在鎮歲以金帛輸朱全忠今敗乃歸我乎匡凝曰諸矦事天子歲輸貢賦乃其職也豈輸賊乎今日歸公正以不從賊故耳行密厚遇之丙寅封皇弟禔為潁王祐為蔡王丁夘荆南節度使趙匡明帥衆二萬弃城奔成都戊辰朱全忠以楊師厚為山南東道留後引兵擊江陵至樂鄉荆南牙將王建武遣使迎降全忠以都將賀瓌為荆南留後全忠尋表師厚為山南東道節度使王宗賀等攻馮行襲所向皆捷丙子行襲弃金州奔均州其將全師朗以城降王建更師朗姓名曰王宗朗補金州觀察使割渠巴開三州以􅀠之乙酉詔更用十一月癸酉親郊淮南將陶雅陳璋拔婺州執刺史沈夏以歸楊行密以雅為江南都招討使歙婺衢睦觀察使以璋為衢婺副招討使璋攻暨陽兩浙將方習敗之習進攻婺州濠州團練使劉金卒楊行密以金子仁規知濠州楊行密長子宣州觀察使渥素無令譽軍府輕之行密寢疾命節度判官周隱召渥隱性憃直對曰宣州司徒輕易信䜛喜擊毬飲酒非保家之主餘子皆㓜未能駕馭諸將廬州刺史劉威從王起細㣲必不負王不若使之權領軍府俟諸子長以授之行密不應左右牙指揮使徐温張顥言於行密曰王平生出萬死冒矢石為子孫立基業安可使它人有之行密曰吾死瞑目矣隱舒州人也它日將佐問疾行密目留幕僚嚴可求衆出可求曰王若不諱如軍府何行密曰吾命周隱召渥今忍死待之可求與徐温詣隱隱未出見牒猶在案上可求即與温取牒遣使者如宣州召之可求同州人也行密以潤州團練使王茂章為宣州觀察使冬十月丙戌朔以朱全忠為諸道兵馬元帥别開幕府是日全忠部署將士將歸大梁忽變計欲乗勝擊淮南敬翔諫曰今出師未踰月平兩大鎮闢地數千里逺近聞之莫不震懾此威望可惜不若且歸息兵俟舋而動不聴改昭信軍為戎昭軍仍割均州􅀠之辛夘朱全忠發襄州壬辰至棗陽遇大雨自申州抵光州道險狹塗潦人馬疲乏士卒尚未冬服多逃亡全忠使人謂光州刺史柴再用曰下我以汝為蔡州刺史不下且屠城再用嚴設守備戎服登城見全忠拜伏甚恭曰光州城小兵弱不足以辱王之威怒王茍先下壽州敢不從命全忠留其城東旬日而去起居郎蘇楷禮部尚書循之子也素無才行乾寧中登進士第昭宗覆試黜之仍永不聴入科場甲午楷帥同列上言諡號美惡臣子不得而私先帝諡號多溢美乞更詳議事下太常丁酉張廷範奏改諡恭靈莊愍孝皇帝廟號襄宗詔從之楊渥至廣陵辛丑楊行密承制以渥為淮南留後戊申朱全忠發光州迷失道百餘里又遇雨比及壽州壽人堅壁清野以待之全忠欲圍之無林木可為柵乃退屯正陽癸丑更名成徳軍曰武順十一月丙辰朱全忠度淮而北柴再用抄其後軍斬首三千級獲輜重萬計全忠悔之躁忿尤甚丁卯至大梁先是全忠急於傳禪密使蔣􅀇暉等謀之􅀇暉與栁璨等議以魏晉以來皆先封大國加九錫殊禮然後受禪當次第行之乃先除全忠諸道元帥以示有漸仍以刑部尚書裴迪為送宫告使全忠大怒宣徽副使王殷趙殷衡疾􅀇暉權寵欲得其處因譛之於全忠曰􅀇暉璨等欲延唐祚故逗遛其事以須變􅀇暉聞之懼自至壽春具言其狀全忠曰汝曹巧述閑事以沮我借使我不受九錫豈不能作天子邪􅀇暉曰唐祚巳盡天命歸王愚智皆知之􅀇暉與栁璨等非敢有背徳但以今兹晉燕岐蜀皆吾勍敵王遽受禪彼心未服不可不曲盡義理然後取之欲為王創萬代之業耳全忠叱曰奴果反矣􅀇暉惶遽辭歸與璨議行九錫時天子將郊祀百官既習儀裴迪自大梁還言全忠怒曰栁璨蔣􅀇暉等欲延唐祚乃郊天也璨等懼庚午敕改用來年正月上辛殷衡本姓孔名循為全忠家乳母養子故冒姓趙後漸貴復其姓名壬申趙匡明至成都王建以客禮遇之昭宗之䘮朝廷遣告哀使司馬卿宣諭王建至是始入蜀境西川掌書記韋莊為建謀使武定節度使王宗綰諭卿曰蜀之將士世受唐恩去歲聞乗輿東遷凡上二十表皆不報尋有亡卒自汴來聞先帝已罹朱全忠弑逆蜀之將士方日夕枕戈思為先帝報仇不知今兹使來以何事宣諭舍人宜自圖進退卿乃還庚辰吳武忠王楊行密薨將佐共請宣諭使李儼承制授楊渥淮南節度使東南諸道行營都綂兼侍中􅀪農郡王栁璨蔣􅀇暉等議加朱全忠九錫朝士多竊懐憤邑禮部尚書蘇循獨揚言曰梁王功業顯大曆數有歸朝廷速宜揖讓朝士無敢違者辛巳以全忠為相國揔百揆以宣武宣義天平䕶國天雄武順佑國河陽義武昭義保義戎昭武定泰寧平盧忠武匡國鎮國武寧忠義荆南等二十一道為魏國進封魏王仍加九錫全忠怒其稽緩讓不受十二月戊子命樞密使蔣􅀇暉齎手詔詣全忠諭指癸巳􅀇暉自大梁還言全忠怒不解甲午栁璨奏稱人望歸梁王陛下釋重負今其時也即日遣璨詣大梁逹傳禪之意全忠拒之初璨陷害朝士過多全忠亦惡之璨與蔣􅀇暉張廷範朝夕宴聚深相結為全忠謀禪代事何太后泣遣宫人阿秋阿䖍達意􅀇暉語以它日傳禪之後求子母生全王殷趙殷衡譛􅀇暉云與栁璨張廷範於積善宫夜宴對太后焚香為誓期興復唐祚全忠信之乙未收􅀇暉及豐徳庫使應頊御㕑使朱建武繫河南獄以王殷權知樞密趙殷衡權判宣徽院事全忠三表辭魏王九錫之命丁酉詔許之更以為天下兵馬元帥然全忠已修大梁府舍為宫闕矣是日斬蔣􅀇暉杖殺應頊朱建武庚子省樞密使及宣徽南院使獨置宣徽使一員以王殷為之趙殷衡為副使辛丑敕罷宫人宣傳詔命及參隨視朝追削蔣􅀇暉為凶逆百姓令河南掲尸於都門外聚衆焚之􅀇暉既死王殷趙殷衡又誣􅀇暉私侍何太后令阿秋阿䖍通導往來己酉全忠密令殷殷衡害太后于積善宫敕追廢太后為庶人阿秋阿䖍皆於殿前撲殺庚戌以皇太后喪廢朝三日辛亥敕以宫禁内亂罷來年正月上辛謁郊廟禮癸丑守司空兼門下侍郎同平章事栁璨貶登州刺史太常卿張廷範貶萊州司户甲寅斬璨於上東門外車裂廷範於都市璨臨刑呼曰負國賊栁璨死其宜矣西川將王宗朗不能守金州焚其城邑奔成都戎昭節度使馮行襲復取金州奏請金州荒殘乞徙理均州從之更以行襲領武安軍陳詢不能守睦州奔于廣陵淮南招討使陶雅入據其城楊渥之去宣州也欲取其幄幕及親兵以行觀察使王茂章不與渥怒既襲位遣馬步都指揮使李簡等將兵襲之湖南兵寇淮南淮南牙内指揮使楊彪擊却之三年春正月壬戌靈武節度使韓遜奏吐蕃七千餘騎營於宗髙谷將擊嗢未及取涼州李簡兵奄至宣州王茂章度不能守帥衆奔兩浙親兵上蔡刁彦能辭以母老不從行登城諭衆曰王府命我招諭汝曹大兵行至矣衆由是定陶雅畏茂章斷其歸路引兵還歙州錢鏐復取睦州鏐以茂章為鎮東節度副使更名景仁乙丑加靜海節度使曲承裕同平章事初田承嗣鎮魏博選募六州驍勇之士五千人為牙軍厚其給賜以自衞為腹心自是父子相繼親黨膠固歲乆益驕横小不如意輒族舊帥而易之自史憲誠以來皆立於其手天雄節度使羅紹威心惡之力不能制朱全忠之圍鳯翔也紹威遣軍將楊利言密以情告全忠欲借其兵以誅之全忠以事方急未暇如其請隂許之及李公佺作亂紹威益懼復遣牙將臧延範趣全忠全忠乃發河南諸鎮兵七萬遣其將李思安將之㑹魏鎮兵屯深州樂城聲言擊滄州討其納李公佺也㑹全忠女適紹威子廷規者卒全忠遣客將馬嗣勲實甲兵於槖中選長直兵千人為擔夫帥之入魏詐云㑹葬全忠自以大軍繼其後云赴行營牙軍皆不之疑庚午紹威潜遣人入庫斷弓􅁌甲襻是夕紹威帥其奴客數百與嗣勲合擊牙軍牙軍欲戰而弓甲皆不可用遂闔營殪之凡八千家嬰孺無遺詰旦全忠引兵入城辛未以權知寧逺留後寵巨昭嶺南西道留後葉廣略並為節度使庚辰錢鏐如睦州西川將王宗阮攻歸州獲其將韓從實陳璋聞陶雅歸歙自婺州退保衢州兩浙將方永珍等取婺州進攻衢州楊渥遣先鋒指揮使陳知新攻湖南三月乙丑知新拔岳州逐刺史許徳勲渥以知新為岳州刺史戊寅以朱全忠為鹽鐵度支户部三司都制置使三司之名始于此全忠辭不受夏四月癸未朔日有食之羅紹威既誅牙軍魏之諸軍皆懼紹威雖數撫諭之而猜怨益甚朱全忠營於魏州城東數旬將北廵行營㑹天雄牙將史仁遇作亂聚衆數萬據髙唐自稱留後天雄廵内州縣多應之全忠移軍入城遣使召行營兵還攻髙唐至歴亭魏兵在行營者作亂與仁遇相應元帥府左司馬李周彞右司馬符道昭擊之所殺殆半進攻髙唐克之城中兵民無少長皆死擒史仁遇鋸殺之先是仁遇求救於河東及滄州李克用遣其將李嗣昭將三千騎攻邢州以救之時邢州兵纔二百團練使牛存節守之嗣昭攻七日不克全忠遣右長直都將張筠將數千騎助存節守城筠伏兵於馬嶺擊嗣昭敗之嗣昭遁去義昌節度使劉守文遣兵萬人攻具州又攻冀州拔蓨縣進攻阜城時鎮州大將王釗攻魏州叛將李重霸於宗城全忠遣歸救冀州滄州兵去丙午重霸弃城走汴將胡規追斬之鎮南節度使鍾傳以養子延規為江州刺史傳薨軍中立其子匡時為留後延規恨不得立遣使降淮南五月丁巳朱全忠如洺州遂廵北邊視戎備還入于魏丙子廢戎昭軍并均房􅀠忠義軍以武定節度使馮行襲為匡國節度使楊渥以昇州刺史秦裴為西南行營都招討使將兵擊鍾匡時於江西六月甲申復以忠義軍為山南東道朱全忠以長安鄰於邠岐數有戰爭奏徙佑國節度使韓建於淄青以淄青節度使長社王重師為佑國節度使秋七月朱全忠克相州時魏之亂兵散據貝博澶相衞州及魏之諸縣全忠分命諸將攻討至是悉平之引兵南還全忠留魏半歲羅紹威供億所殺牛羊豕近七十萬資糧稱是所賂遺又近百萬比去蓄積為之一空紹威雖去其逼而魏兵自是衰弱紹威悔之謂人曰合六州四十三縣鐵不能為此錯也壬申全忠至大梁秦裴至洪州軍于蓼洲諸將請阻水立寨裴不從鍾匡時果遣其將劉楚據之諸將以咎裴裴曰匡時驍將獨楚一人耳若帥衆守城不可猝拔吾故以要害誘致之耳未幾裴破寨執楚遂圍洪州饒州刺史唐寳請降八月乙酉李茂貞遣其子侃為質於西川王建以侃知彭州朱全忠以幽滄相首尾為魏患欲先取滄州甲辰引兵發大梁兩浙圍衢州衢州刺史陳璋告急於淮南楊渥遣左廂馬步都虞􅃸周本將兵迎璋本至衢州浙人解圍陳於城下璋帥衆歸于本兩浙兵取衢州吕師造曰浙人近我而不動輕我也請擊之本曰吾受命迎陳使君今至矣何為復戰彼必有以待我也遂引兵還本為之殿浙人躡之本中道設伏大破之九月辛亥朔朱全忠自白馬度河丁卯至滄州軍於長蘆滄人不出羅紹威饋運自魏至長蘆五百里不絶於路又建元帥府舍於魏所過驛亭供酒饌幄幕什器上下數十萬人無一不備秦裴拔洪州虜鍾匡時等五千人以歸楊渥自兼鎮南節度使以裴為洪州制置使靜難節度使楊崇本以鳯翔保塞彰義保義之兵攻夏州匡國節度使劉知俊邀擊坊州之兵斬首三千餘級擒坊州刺史劉彦暉劉仁恭救滄州戰屢敗乃下令境内男子十五以上七十以下悉自備兵糧詣行營軍發之後有一人在閭里刑無赦或諫曰今老弱悉行婦人不能轉餉此令必行濫刑者衆矣乃命勝執兵者盡行文其面曰定霸都士人則文其腕或臂曰一心事主於是境内士民穉孺之外身無不文者得兵十萬軍于瓦橋時汴軍築壘圍滄州鳥䑕不能通仁恭畏其彊不敢戰城中食盡丸土而食或互相掠啖朱全忠使人説劉守文曰援兵勢不相及何不早降守文登城應之曰僕於幽州父子也梁王方以大義服天下若子叛父而來將安用之全忠愧其辭直為之緩攻冬十月丙戌王建始立行臺於蜀建東向舞蹈號慟稱自大駕東遷制命不通請權立行臺用李晟鄭畋故事承制封拜仍以牓帖告諭所部藩鎮州縣劉仁恭求救於河東前後百餘輩李克用恨仁恭返覆竟未之許其子存朂諫曰今天下之勢歸朱温者什七八雖彊大如魏博鎮定莫不附之自河以北能為温患者獨我與幽滄耳今幽滄為温所困我不與之併力拒之非我之利也夫為天下者不顧小怨且彼嘗困我而我救其急以徳懐之乃一舉而名實附也此乃吾復振之時不可失也克用以為然與將佐謀召幽州兵與攻潞州曰於彼則可以解圍於我則可以拓境乃許仁恭和召其兵仁恭遣都指揮使李溥將兵三萬詣晉陽克用遣其將周徳威李嗣昭將兵與之共攻潞州夏州告急於朱全忠戊戌全忠遣劉知俊及其將康懐英救之楊崇本將六鎮之兵五萬軍于美原知俊等擊之崇本大敗歸于邠州武貞節度使雷彦恭屢寇荆南留後賀瓌閉城自守朱全忠以為怯以潁州防禦使髙季昌代之又遣駕前指揮使倪可福將兵五千戍荆南以備吴蜀朗兵引去十一月劉知俊康懐貞乗勝攻鄜延等五州下之加知俊同平章事以懐貞為保義節度使西軍自是不振湖州刺史髙彦卒子澧代之十二月乙酉錢鏐表薦行軍司馬王景仁詔以景仁領寧國節度使朱全忠分步騎數萬遣行軍司馬李周彞將之自河陽救潞州閏月乙丑廢鎮國軍興徳府復為華州􅀠匡國節度割金商州􅀠佑國軍初昭宗凶訃至潞州昭義節度使丁㑹帥將士縞素流涕久之及李嗣昭攻潞州㑹舉軍降於河東李克用以嗣昭為昭義留後㑹見克用泣曰㑹非力不能守也梁王陵虐唐室㑹雖受其舉拔之恩誠不忍其所為故來歸命耳克用厚待之位於諸將之上己巳朱全忠命諸軍治攻具將攻滄州壬申聞潞州不守甲戌引兵還先是調河南北芻糧水陸輸軍前諸營山積全忠將還命悉焚之煙炎數里在舟中者鑿而沈之劉守文使遺全忠書曰王以百姓之故赦僕之罪解圍而去王之惠也城中數萬口不食數月矣與其焚之為煙沈之為泥願乞其所餘以救之全忠為之留數囷以遺之滄人賴以濟河東兵進攻澤州不克而退吉州刺史彭玕遣使請降於湖南玕本赤石洞蠻酋鍾傳用為吉州刺史資治通鑑卷第二百六十五
