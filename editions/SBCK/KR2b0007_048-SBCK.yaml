front:
  text: 心因敇妻子若卒遇飛禍無得殯斂冀以區區腐身覺悟朝廷三月癸丑司徒袁安薨
  hash: sha256:55aacac61819d96164d0c1484b2931822203680737b051d930993898a27324ce
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0007_SBCK_048-1a}
body:
  text: 閏月丁丑以太常丁鴻為司徒夏四月丙辰竇憲還至京師六月戊戍朔日有食之丁鴻上疏曰昔諸吕握權統嗣幾移哀平之末廟不血食故雖有周公之親而無其德不得行其埶也今大將軍雖欲敕身自約不敢僣差然而天下逺近皆惶怖承㫖刺史二千石初除謁辭求通待報雖奉符璽受臺敕不敢便去久者至數十日背王室向私門此乃上威損下權盛也人道悖於下效驗見於天雖有隱謀神照其情垂象見戒以告人君禁微則易救末者難人莫不忽於㣲細以致其大恩不忍誨義不忍割去事之後未然之明鏡也夫天不可以不剛不剛則三光不明王不可以不彊不彊則宰牧從横宜因大變改政匡失以塞天意丙辰郡國十三地震旱蝗竇氏父子兄弟並爲卿校充滿朝廷穰矦鄧疊疊弟歩兵校尉磊及母元憲女壻射聲校尉郭舉舉父長樂少府璜共相交結元舉並出入禁中舉得幸太后遂共圖爲殺害帝隂知其謀是時憲兄弟專權帝與内外臣僚莫由親接所與居者閹宦而已帝以朝臣上下莫不附憲獨中常侍鈎盾令鄭衆謹敏有心幾不事豪黨遂與衆定議誅憲以憲在外慮其爲亂忍而未發會憲與鄧疊皆還京師時清河王慶恩遇尤渥常入省宿止帝將發其謀欲得外戚傳懼左右不敢使令慶私從千乗王求夜獨内之又令慶傳語鄭衆求索故事庚申帝幸北宫詔執金吾五校尉勒兵屯衞南北宫閉城門收捕郭璜郭舉鄧疊鄧磊皆下獄死遣謁者僕射收憲大將軍印綬更封為冠軍矦與篤景􅅛皆就國帝以太后故不欲名誅憲為選嚴能相督察之憲篤景到國皆廹令自殺初河南尹張酺數以正灋繩治竇景及竇氏敗酺上疏曰方憲等寵貴羣臣阿附唯恐不及皆言憲受顧命之託懐伊吕之忠至乃復比鄧夫人於文母今嚴威既行皆言當死不顧其前後考折厥􅂨臣伏見夏陽矦瓌每存忠善前與臣言常有盡節之心檢敇賔客未嘗犯灋臣聞王政骨肉之刑有三宥之義過厚不過薄今議者欲為􅅛選嚴能相恐其廹切必不完免冝裁加貸宥以崇厚德帝感其言由是􅅛獨得全竇氏宗族賔客以憲為官者皆免歸故郡初班固奴嘗醉罵洛陽令种兢兢因逮考竇氏賔客收捕固死獄中固嘗著漢書尚未就詔固女弟曹壽妻昭踵而成之華嶠論曰固之序事不激詭不抑抗贍而不穢詳而有體使讀之者亹亹而不厭信哉其能成名也固譏司馬遷是非頗謬於聖人然其論議常排死節否正直而不叙殺身成仁之為美則輕仁義賤守節甚矣初竇憲納妻天下郡國皆有禮慶漢中郡亦當遣吏戸曹李郃諫曰竇將軍椒房之親不修德禮而專權驕恣危亡之禍可翹足而待願明府一心王室勿與交通太守固遣之郃不能止請求自行許之郃遂所在遲留以觀其變行至扶風而憲就國凡交通者皆坐免官漢中太守獨不與焉帝賜清河王慶奴婢輿馬錢帛珍寳充牣其第慶或時不安帝朝夕問訊進膳藥所以垂意甚備慶亦小心恭孝自以廢黜尤畏事慎灋故能保其寵祿焉帝除袁安子賞為郎任隗子屯為歩兵校尉鄭衆遷大長秋帝策勲班賞衆每辭多受少帝由是賢之常與之議論政事宦官用權自此始矣秋七月己丑太尉宋由以竇氏黨策免自殺八月辛亥司空任隗薨癸丑以大司農尹睦為太尉太傅鄧彪以老病上還樞機職詔許焉以睦代彪錄尚書事冬十月己亥以宗正劉方為司空武陵零陵灃中蠻叛䕶羌校尉鄧訓卒吏民羌胡旦夕臨者日數千人羌胡或以刀自割又刺殺其犬馬牛羊曰鄧使君已死我曹亦俱死耳前烏桓吏士皆犇走道路至空城郭吏執不聽以狀白校尉徐傿傿歎息曰此為義也乃釋之遂家家為訓立祠每有疾病輒請禱求福蜀郡太守聶尚代訓為䕶羌校尉欲以恩懐諸羌乃遣譯使招呼迷唐使還居大小榆谷迷唐既還遣祖母卑鈌詣尚尚自送至塞下為設祖道令譯田汜等五人䕶送至廬落迷唐遂反與諸種共生屠裂汜等以血盟詛復冦金城塞尚坐免五年春正月乙亥宗祀明堂登靈臺赦天下戊子千乗貞王伉薨辛卯封皇弟萬歲為廣宗王甲寅太傅鄧彪薨戊午隴西地震夏四月壬子紹封阜陵殤王兄魴為阜陵王九月辛酉廣宗殤王萬歲薨無子國除初竇憲既立於除鞬為此單于欲輔歸北庭會憲誅而止於除鞬自畔還北詔遣將兵長史王輔以千餘騎與任尚共追討斬之破滅其衆耿䕫之破北匈奴也鮮卑因此轉徙據其地匈奴餘種留者尚有十餘萬落皆自號鮮卑鮮卑由此漸盛冬十月辛未太尉尹睦薨十一月乙丑太僕張酺為太尉酺與尚書張敏等奏射聲校尉曹襃擅制漢禮破亂聖術宜加刑誅書凡五奏帝知酺守學不通雖寑其奏而漢禮遂不行是歲武陵郡兵破叛蠻降之梁王暢與從官卞忌祠祭求福忌等諂媚云神言王當為天子暢與相應荅為有司所奏請徴詣詔獄帝不許但削成武單父二縣暢慙懼上疏深自刻責曰臣天性狂愚不知防禁自陷死罪分伏顯誅陛下聖德枉灋曲平横貸赦臣為臣受汙臣知大貸不可再得自誓束身約妻子不敢復出入失繩墨不敢復有所横費租入有餘乞裁食睢陽榖孰虞蒙寧陵五縣還餘所食四縣臣暢小妻三十七人其無子者願還本家自選擇謹敕奴婢二百人其餘所受虎賁官騎及諸工技鼓吹倉頭奴婢兵弩廐馬皆上還本署臣暢以骨肉近親亂聖化汙清流既得生活誠無心面目以凶惡復居大宫食大國張官屬藏什物願陛下加恩開許上優詔不聽䕶羗校尉貫友遣譯使構離諸羌誘以財貨由是解散乃遣兵出塞攻迷唐於大小榆谷獲首虜八百餘人收麥數萬斛遂夾逄留大河築城塢作大航造河橋欲度兵擊迷唐迷唐率部落逺徙依賜支河曲單于屯屠何死單于宣弟安國立安國初為左賢王無稱譽及為單于單于適之子右谷蠡王師子以次轉為左賢王師子素勇黠多知前單于宣及屯屠何皆愛其氣決數遣將兵出塞掩擊北庭還受賞賜天子亦加殊異由是國中盡敬師子而不附安國安國欲殺之諸新降胡初在塞外數為師子所驅掠多怨之安國因是委計降者與同謀議師子覺其謀乃别居五原界每龍庭會議師子輒稱病不往度遼將軍皇甫稜知之亦擁䕶不遣單于懐憤益甚六年春正月皇甫稜免以執金吾朱徽行度遼將軍時單于與中郎將杜崇不相平乃上書告崇崇諷西河太守令斷單于章單于無由自聞崇因與朱徽上言南單于安國疎逺故胡親近新降欲殺左賢王師子及左臺且渠劉利等又右部降者謀共廹脅安國起兵背畔請西河上郡安定為之儆備帝下公卿議皆以為蠻夷反覆雖難測知然大兵聚會必未敢動揺今宜遣有方略使者之單于庭與杜崇朱徽及西河太守并力觀其動静如無它變可令崇等就安國會其左右大臣責其部衆横暴為邊害者共平罪誅若不從命令為權時方略事畢之後裁行賞賜亦足以威示百蠻帝從之於是徽崇遂發兵造其庭安國夜聞漢軍至大驚弃帳而去因舉兵欲誅師子師子先知乃悉將廬落入曼栢城安國追到城下門閉不得入朱徽遣吏曉譬和之安國不聽城既不下乃引兵屯五原崇徽因發諸郡騎追赴之急衆皆大恐安國舅骨都矦喜為等慮并被誅乃格殺安國立師子為亭獨尸逐矦鞮單于己卯司徒丁鴻薨二月丁未以司空劉方為司徒太常張奮為司空夏五月城陽懐王淑薨無子國除秋七月京師旱西域都䕶班超發龜兹鄯善等八國兵合七萬餘人討焉耆到其城下誘焉耆王廣尉犁王汎等於陳睦故城斬之傳首京師因縱兵鈔掠斬首五千餘級獲生口萬五千人更立焉耆左矦元孟為焉耆王超留焉耆半歲慰撫之於是西域五十餘國悉納質内屬至于海濱四萬里外皆重譯貢獻南單于師子立降胡五六百人夜襲師子安集掾王恬將衞䕶士與戰破之於是降胡遂相驚動十五部二十餘萬人皆反脅立前單于屯屠何子薁鞮日逐王逢矦為單于遂殺略吏民燔燒郵亭廬帳將車重向朔方欲度幕北九月癸丑以光祿勲鄧鴻行車騎將軍事與越騎校尉馮柱行度遼將軍朱徽將左右羽林北軍五校士及郡國迹射緣邊兵烏桓校尉任尚將烏桓鮮卑合四萬人討之時南單于及中郎將杜崇屯牧師城逢矦將萬餘騎攻圍之冬十一月鄧鴻等至美稷逢矦乃解圍去向滿夷谷南單于遣子將萬騎及杜崇所領四千騎與鄧鴻等追擊逢矦於大城塞斬首四千餘級任尚率鮮卑烏􅁊要擊逢矦於滿夷谷復大破之前後凡斬萬七千餘級逢矦遂率衆出塞漢兵不能追而還以大司農陳寵爲廷尉寵性仁矜數議疑獄每附經典務從寛恕刻敝之風於此少衰帝以尚書令江夏黄香為東郡太守香辭以典郡從政才非所宜乞留備冗官賜以督責小職任之宫臺煩事帝乃復留香為尚書令増秩二千石甚見親重香亦祗勤物務憂公如家七年春正月鄧鴻等軍還馮柱將虎牙營留屯五原鴻坐逗留失利下獄死後帝知朱徽杜崇失胡和又禁其上書以致胡反皆徴下獄死夏四月辛亥朔日有食之秋七月乙巳易陽地裂九月癸卯京師地震樂成王黨坐賊殺人削東光鄡二縣八年春二月立貴人隂氏為皇后后識之曾孫也夏四月癸亥樂成靖王黨薨子哀王崇立尋薨無子國除五月河内陳留蝗南匈奴右温禺犢王烏居戰畔出塞秋七月度遼將軍龎奮越騎校尉馮柱追擊破之徙其餘衆及諸降胡二萬餘人於安定北地車師後部王涿鞮反擊前王尉畢大獲其妻子九月京師蝗冬十月乙丑北海王威以非敬王子又坐誹謗自殺十二月辛亥陳敬王羨薨丁巳南宫宣室殿火䕶羗校尉貫友卒以漢陽太守史充代充至遂發湟中羗胡出塞擊迷唐迷唐迎敗充兵殺數百人充坐徴以代郡太守吴祉代之九年春三月庚辰隴西地震癸巳濟南安王康薨西域長史王林擊車師後王斬之夏四月丁卯封樂成王黨子廵為樂成王五月封皇后父屯騎校尉隂綱為吴防矦以特進就第六月旱蝗秋八月鮮卑寇肥如遼東太守祭參坐沮敗下獄死閏月辛巳皇太后竇氏崩初梁貴人既死官省事秘莫有知帝為梁氏出者舞隂公主子梁扈遣從兄䄠奏記三府以為漢家舊典崇貴母氏而梁貴人親育聖躬不蒙尊號求得申議太尉張酺言狀帝感慟良久曰於君意若何酺請追上尊號存錄諸舅帝從之會貴人姊南陽樊調妻嫕上書自訟曰妾父竦􅁈死牢獄骸骨不掩母氏年踰七十及弟棠等逺在絶域不知死生願乞收竦朽骨使母弟得歸本郡帝引見嫕乃知貴人枉殁之狀三公上奏請依光武黜吕太后故事貶竇太后尊號不宜合葬先帝百官亦多上言者帝手詔曰竇氏雖不遵灋度而太后常自減損朕奉事十年深惟大義禮臣子無貶尊上之文恩不忍離義不忍虧案前世上宫太后亦無降黜其勿復議丙申葬章德皇后燒當羌迷唐率衆八千人寇隴西脅塞内諸種羗合歩騎三萬人擊破隴西兵殺大夏長詔遣行征西將軍劉尚越騎校尉趙世副之將漢兵羗胡共三萬人討之尚屯狄道世屯枹罕尚遣司馬寇盱監諸郡兵四面並會迷唐懼棄老弱犇入臨洮􅀯尚等追至高山大破之斬虜千餘人迷唐引去漢兵死傷亦多不能復追乃還九月庚申司徒劉方策免自殺甲子追尊梁貴人為皇太后謚曰恭懐追服喪制冬十月乙酉改葬梁太后及其姊大貴人于西陵擢樊調為羽林左監遣封諡皇太后父竦為襃親愍矦遣使迎其喪葬於恭懐皇后陵傍徴還竦妻子封子棠為樂平矦棠弟雍為乗氏矦雍弟翟為單父矦位皆特進賞賜以巨萬計寵遇光於當世梁氏自此盛矣清河王慶始敢求上母宋貴人冢帝許之詔太官四時給祭具慶垂涕曰生雖不獲供養終得奉祭祀私願足矣欲求作祠堂恐有自同恭懐梁后之嫌遂不敢言常泣向左右以為没齒之恨後上言外祖母王年老乞詣雒陽療疾於是詔宋氏悉歸京師除慶舅衍俊蓋暹等皆爲郎十一月癸卯以光祿勲河南吕蓋為司徒十二月丙寅司空張奮罷壬申以太僕韓稜為司空西域都䕶定逺矦班超遣掾甘英使大秦條支窮西海皆前世所不至莫不備其風土傳其珍恠焉及安息西界臨大海欲度船人謂英曰海水廣大往來者逢善風三月乃得度若遇遲風亦有二歲者故入海人皆齎三歲糧海中善使人思土戀慕數有死亡者英乃止十年夏五月京師大水秋七月己巳司空韓稜薨八月丙子以太常太山巢堪為司空冬十月五州􅀨水行征西將軍劉尚越騎校尉趙世坐畏懦徴下獄免謁者王信領尚營屯枹罕謁者耿譚領世營屯白石譚乃設購賞諸種頗來内附迷唐恐乃請降信譚遂受降罷兵十二月迷唐等率種人詣闕貢獻戊寅梁節王暢薨初居巢矦劉般薨子愷當嗣稱父遺意讓其弟憲遁逃久之有司奏請絶愷國肅宗美其義特優假之愷猶不出積十餘歲有司復奏之侍中賈逵上書曰孔子稱能以禮讓為國乎何有有司不原樂善之心而繩以循常之灋懼非長克讓之風成含􅀪之化也帝納之下詔曰王灋崇善成人之美其聽憲嗣爵遭事之宜後不得以為比乃徴愷拜為郎南單于師子死單于長之子檀立為萬氏尸逐鞮單于十一年夏四月丙寅赦天下帝因朝會召見諸儒使中大夫魯丕與侍中賈逵尚書令黄香等相難數事帝善丕説罷朝特賜衣冠丕因上疏曰臣聞説經者傳先師之言非從已出不得相讓相讓則道不明若規矩權衡之不可枉也難者必明其據説者務立其義浮華無用之言不陳於前故精思不勞而道術愈章灋異者各令自説師灋博觀其義無令芻蕘以言得罪幽逺獨有遺夫也十二年夏四月戊辰秭歸山崩秋七月辛亥朔日有食之九月戊午太尉張酺免丙寅以大司農張禹為太尉燒當羌豪迷唐既入朝其餘種人不滿二千飢窘不立入居金城帝令迷唐將其種人還大小榆谷迷唐以漢作河橋兵來無常故地不可復居辭以種人飢餓不肯逺出䕶羌校尉吳祉等多賜迷唐金帛令糴榖市畜促使出塞種人更懐猜驚是歲迷唐復叛脅將湟中諸胡寇鈔而去王信耿譚吳祉皆坐徴十三年秋八月己亥北宫盛饌門閣火迷唐復還賜支河曲將兵向塞䕶羌校尉周鮪與金城太守矦霸及諸郡兵屬國羌胡合三萬人岀塞至允川矦霸擊破迷唐種人瓦解降者六千餘口分徙漢陽安定隴西迷唐遂弱逺踰賜支河首依發羌居久之病死其子來降戸不滿數十荆州雨水冬十一月丙辰詔曰幽并凉州戸口率少邊役衆劇束脩良吏進仕路狹撫接夷狄以人爲本其令縁邊郡口十萬以上歲舉孝廉一人不滿十萬二歲舉一人五萬以下三歲舉一人鮮卑寇右北平遂入漁陽漁陽太守擊破之戊辰司徒吕蓋以老病致仕巫蠻許聖以郡收税不均怨恨遂反辛卯寇南郡十四年春安定降羌燒何種反郡兵擊滅之時西海及大小榆谷左右無復羌寇隃麋相曹鳯上言自建武以來西羌犯灋者常從燒當種起所以然者以其居大小榆谷土地肥美有西海魚鹽之利阻大河以爲固又近塞内諸種易以爲非難以攻伐故能彊大常雄諸種恃其權勇招誘羌胡今者衰困黨援壞沮亡逃棲竄遠依發羌臣愚以為宜及此時建復西海郡縣規固二榆廣設屯田隔塞羌胡交闗之路遏絶狂狡窺欲之源又殖榖富邊省委輸之役國家可以無西方之憂上從之繕脩故西海郡徙金城西部都尉以戍之拜鳯為金城西部都尉屯龍􅂄後增廣屯田列屯夾河合三十四部其功垂立會永初中諸羌叛乃罷三月戊辰臨辟雍饗射赦天下夏四月遣使者督荆州兵萬餘人分道討巫蠻許聖等大破之聖等乞降悉徙置江夏隂皇后多妬忌寵遇浸衰數懐恚恨后外祖母鄧朱出入宫掖有言后與朱共挾巫蠱道者帝使中常侍張慎與尚書陳褒案之劾以大逆無道朱二子奉毅后弟輔皆考死獄中六月辛卯后坐廢遷于桐宫以憂死父特進綱自殺后弟軼敞及朱家屬徙日南比景秋七月壬子常山殤王側薨無子立其兄防子矦章為常山王三州大水班超久在絶域年老思土上書乞歸曰臣不敢望到酒泉郡但願生入玉門闗謹遣子勇隨安息獻物入塞及臣生在令勇日見中土朝廷久之未報超妹曹大家上書曰蠻夷之性悖逆侮老而超旦暮入地久不見代恐開姦宄之源生逆亂之心而卿大夫咸懐一切莫肯逺慮如有卒暴超之氣力不能從心便為上損國家累世之功下棄忠臣竭力之用誠可痛也故超萬里歸誠自陳苦急延頸踰望三年於今未䝉省錄妾竊聞古者十五受兵六十還之亦有休息不任職也故妾敢觸死為超求哀匄超餘年一得生還復見闕庭使國家無勞逺之慮西域無倉卒之憂超得長䝉文王葬骨之恩子方哀老之惠帝感其言乃徴超還八月超至洛陽拜為射聲校尉九月卒超之被徴以戊巳校尉任尚代為都䕶尚謂超曰君矦在外國三十餘年而小人猥承君後任重慮淺宜有以誨之超曰年老失智君數當大位豈班超所能及哉必不得已願進愚言塞外吏士本非孝子順孫皆以罪過徙補邊屯而蠻夷懐鳥獸之心難養易敗今君性嚴急水清無大魚察政不得下和宜蕩佚簡易寛小過緫大綱而已超去後尚私謂所親曰我以班君當有竒策今所言平平耳尚後竟失邊和如超所言初太傅鄧禹嘗謂人曰吾將百萬之衆未嘗妄殺一人後世必有興者其子䕶羌校尉訓有女曰綏性孝友好書傳常晝脩婦業暮誦經典家人號曰諸生叔父陔曰嘗聞活千人者子孫有封兄訓爲謁者使修石臼河歲活數千人天道可信家必䝉福綏後選入宫爲貴人恭肅小心動有灋度承事隂后接撫同列常克已以下之雖宫人􅀠役皆加恩借帝深嘉焉嘗有疾帝特令其母兄弟入親醫藥不限以日數貴人辭曰宫禁至重而使外舍久在内省上令陛下有私幸之譏下使賤妾獲不知足之謗上下交損誠不願也帝曰人皆以數入為榮貴人反以為憂邪每有讌會諸姬競自脩飾貴人獨尚質素其衣有與隂后同色者即時解易若並時進見則不敢正坐離立行則僂身自卑帝每有所問常逡廵後對不敢先后言隂后短小舉止時失儀左右掩口而笑貴人獨愴然不樂為之隱諱若己之失帝知貴人勞心曲體歎曰脩德之勞乃如是乎後隂后寵衰貴人每當御見輒辭以疾時帝數失皇子貴人憂繼嗣不廣數選進才人以博帝意隂后見貴人德稱日盛深疾之帝嘗寑病危甚隂后密言我得意不令鄧氏復有遺類貴人聞之流涕言曰我竭誠盡心以事皇后竟不為所祐今我當從死上以報帝之恩中以解宗族之禍下不令隂氏有人豕之譏即欲飲藥宫人趙玉者固禁之因詐言屬有使來上疾已愈貴人乃止明日上果瘳及隂后之廢貴人請救不能得帝欲以貴人為皇后貴人愈稱疾篤深自閉絶冬十月辛卯詔立貴人鄧氏為皇后后辭讓不得已然後即位郡國貢獻悉令禁絶歲時但供􅁓墨而已帝每欲官爵鄧氏后輒哀請謙讓故兄騭終帝世不過虎賁中郎將丁酉司空巢堪罷十一月癸卯以大司農沛國徐防為司空防上疏以為漢立博士十有四家設甲乙之科以勉勸學者伏見太學試博士弟子皆以意説不修家灋私相容隱開生姦路每有策試輒興諍訟論議紛錯互相是非孔子稱述而不作又曰吾猶及史之闕文今不依章句妄生穿鑿以遵師爲非義意説爲得理輕侮道術寑以成俗誠非詔書實選本意改薄從忠三代常道專精務本儒學所先臣以爲博士及甲乙策試宜從其家章句開五十難以試之解釋多者爲上第引文明者爲高説若不依先師義有相伐皆正以為非上從之是歲初封大長秋鄭衆為鄛鄉矦十五年夏四月甲子晦日有食之時帝遵肅宗故事兄弟皆留京師有司以日食隂盛奏遣諸王就國詔曰甲子之異責由一人諸王幼稚早離顧復弱冠相育常有蓼莪凱風之哀選儒之恩知非國典且復宿留秋九月壬午車駕南廵清河濟北河間三王並從四州雨水冬十月戊申帝幸章陵戊午進幸雲夢時太尉張禹留守聞車駕當幸江陵以為不宜冒險逺遊驛馬上諫詔報曰祠謁既訖當􅀯禮大江會得君奏臨漢回輿而旋十一月甲申還宫嶺南舊獻生龍眼荔支十里一置五里一􅇋晝夜傳送臨武長汝南唐羌上書曰臣聞上不以滋味為德下不以貢膳為功伏見交趾七郡獻生龍眼等鳥驚風發􅀯州土地炎熱惡蟲猛獸不絶於路至於觸犯死亡之害死者不可復生來者猶可救也此二物升殿未必延年益壽帝下詔曰逺國珍羞本以薦奉宗廟茍有傷害豈愛民之本其敇太官勿復受獻是歲初令郡國以日北至按薄刑十六年秋七月旱辛酉司徒魯恭免庚午以光祿勲張酺為司徒八月己酉酺薨􅊨冬十月辛卯以司空徐防為司徒大鴻臚陳寵為司空十一月己丑帝行幸􅚆氏登百岯山北匈奴遣使稱臣貢獻願和親修呼韓邪故約帝以其舊禮不備未許而厚加賞賜不荅其使元興元年春高句驪王宫入遼東塞寇略六縣夏四月庚午赦天下改元􅊨秋九月遼東太守耿䕫擊高句驪破之冬十二月辛未帝崩于章德前殿初帝失皇子前後十數後生者輒隱秘養於民間羣臣無知者及帝崩鄧皇后乃收皇子於民間長子勝有痼疾少子隆生始百餘日迎立以為皇太子是夜即皇帝位尊皇后曰皇太后太后臨朝是時新遭大憂灋禁未設宫中亡大珠一箧太后念欲考問必有不辜乃親閲宫人觀察顔色即時首服又和帝幸人吉成御者共枉吉成以巫蠱事下掖庭考訊辭證明白太后以吉成先帝左右待之有恩平日尚無惡言今反若此不合人情更自呼見實覈果御者所為莫不歎服以為聖明北匈奴重遣使詣敦煌貢獻辭以國貧未能備禮願請大使當遣子入侍太后亦不荅其使加賜而已雒陽令廣漢王渙居身平正能以明察發擿姦伏外行猛政内懷慈仁凡所平斷人莫不悦服京師以為有神是歲卒官百姓市道莫不咨嗟流涕渙䘮西歸道經􅀪農民庶皆設槃桉於路吏問其故咸言平常持米到雒為吏卒所鈔恒亡其半自王君在事不見侵枉故來報恩雒陽民為立祠作詩每祭輒􅁌歌而薦之太后詔曰夫忠良之吏國家所以為治也求之甚勤得之至寡今以渙子石為郎中以勸勞勤資治通鑑巻第四十八
