front:
  text: 資治通鑑卷第二百一十三
  hash: sha256:bd766bd237883b62bd9583ca77410f2910894352965422d09000a6a2b014d312
body:
  text: 司馬光奉勑編集唐紀二十九昭陽作噩凢八年起柔兆攝提格盡玄宗至道大聖大明孝皇帝中之上開元十四年春正月癸未更立契丹松漠王李邵固爲廣化王奚饒樂王李魯蘇爲奉誠王以上從甥陳氏爲東華公主妻邵固以成安公主之女韋氏爲東光公主妻魯蘇張􅀃奏今之五禮貞觀顯慶兩曽修纂前後頗有不同其中或未折􅂨望與學士等討論古今删改施行制從之邕州封陵獠梁大海等據賔横州反二月己酉遣内侍楊思勗發兵討之上召河南尹崔隱甫欲用之中書令張􅀃薄其無文奏擬金吾大將軍前殿中監崔日知素與説善説薦爲御史大夫上不從丙辰以日知爲左羽林大將軍丁巳以隱甫爲御史大夫隱甫由是與説有隙說有才智而好賄百官白事有不合者好面折之至於叱罵惡御史中丞宇文融之爲人且患其權重融所建白多抑之中書舍人張九齡言於説曰宇文融承恩用事辯給多權數不可不僃説曰鼠輩何能爲夏四月壬子隱甫融及御史中丞李林甫共奏彈説引術士占星徇私僣侈受納賄賂敇源乾曜及刑部尚書韋抗大理少卿明珪與隱甫等同於御史臺鞫之林甫叔良之曾孫抗安石之從父兄子也丁巳以户部侍郎李元紘爲中書侍郎同平章事元紘以清儉著故上用爲相源乾曜等鞫張説事頗有狀上使髙力士視説力士還奏說蓬首垢面席藁食以瓦器惶懼待罪上意憐之力士因言説有功於國上以爲然庚申但罷説中書令餘如故丁卯太子太􅀓岐王範薨贈謚惠文太子上爲之撤膳累旬百官上表固請然後復常丁亥太原尹張孝嵩奏有李子嶠者自稱皇子云生於潞州母曰趙妃上命杖殺之辛丑於定􅁪莫易滄五州置軍以僃突厥上欲以武惠妃爲皇后或上言武氏乃不戴天之讎豈可以爲國母人間盛言張說欲取立后之功更圖入相之計且太子非惠妃所生惠妃復自有子若登宸極太子必危上乃止然宫中禮秩一如皇后五月癸卯戸部奏今歳戸七百六萬九千五百六十五口四千一百四十一萬九千七百一十二秋七月河南北大水溺死者以千計八月丙午朔魏州言河溢九月己丑以安西副大都護磧西節度使杜暹同平章事自王孝傑克復四鎮復於􅀛兹置安西都護府以唐兵三萬戍之百姓苦其役爲都護者惟田揚名郭元振張嵩及暹皆有善政爲人所稱冬十月庚申上幸汝州廣成湯己酉還宫十二月丁巳上幸壽安獵於方秀川壬戌還宫楊思勗討反獠生擒梁大海等三千餘人斬首二萬級而還是嵗黑水靺鞨遣使入見上以其國爲黑水州仍爲置長史以鎮之渤海靺鞨王武藝曰黑水入唐道由我境往者請吐屯於突厥先告我與我偕行今不告我而請吏於唐是必與唐合謀欲腹背攻我也遣其母弟門藝與其舅任雅將兵擊黑水門藝嘗爲質子於唐諫曰黑水請吏於唐而我以其故擊之是叛唐也唐大國也昔髙麗全盛之時彊兵三十餘萬不遵唐命掃地無遺況我兵不及髙麗什之一二一旦與唐爲怨此亡國之勢也武藝不從彊遣之門藝至境上復以書力諫武藝怒遣其從兄大壹夏代之將兵召欲殺之門藝弃衆間道來奔制以爲左驍衛將軍武藝遣使上表罪狀門藝請殺之上密遣門藝詣安西留其使者别遣報云巳流門藝於嶺南武藝知之上表稱大國當示人以信豈得爲此欺誑固請殺門藝上以鴻臚少卿李道􅃉源復不能督察官屬致有漏泄皆坐左遷暫遣門藝詣嶺南以報之臣光曰王者所以服四夷威信而已門藝以忠獲罪自歸天子天子當察其枉直賞門藝而罰武藝爲政之體也縱不能討猶當正以門藝之無罪告之今明皇威不能服武藝恩不能庇門藝顧效小人爲欺誑之語以取困於小國乃罪鴻臚之漏泄不亦可羞哉杜暹爲安西都護突􅀐施金河公主遣牙官以馬千匹詣安西互市使者宣公主教暹怒曰阿史那女何得宣教於我杖其使者留不遣馬經雪死盡突􅀐施可汗蘇禄大怒發兵宼四鎭㑹暹入朝趙頥貞代爲安西都護嬰城自守四鎮人畜儲積皆爲蘇禄所掠安西僅存旣而蘇禄聞暹入相稍引退尋遣使入貢十五年春正月辛丑涼州都督王君㚟破吐蕃於靑海之西初吐蕃自恃其彊致書用敵國禮辭指悖慢上意常怒之返自東封張說言於上曰吐蕃無禮誠宜誅夷但連兵十餘年甘涼河鄯不勝其弊雖師屢㨗所得不償所亡聞其悔過求和願聽其􅅃服以紓邊人上曰俟吾與王君㚟議之説退謂源乾曜曰君㚟勇而無謀常思僥幸若二國和親何以爲功吾言必不用矣及君㚟入朝果請深入討之去冬吐蕃大將悉諾邏宼大斗谷進攻甘州焚掠而去君㚟度其兵疲勒兵躡其後㑹大雪虜凍死者甚衆自積石軍西歸君㚟先遣人間道入虜境燒道旁草悉諾邏至大非川欲休士馬而野草皆盡馬死過半君㚟與秦州都督張景順追之及於青海之西乗氷而度悉諾邏已去破其後軍獲其輜重羊馬萬計而還君㚟以功遷左羽林大將軍拜其父壽爲少府監致仕上由是益事邊功初洛陽人劉宗器上言請塞汜水舊汴口更於熒澤引河入汴擢宗器爲左衛率府胄曹至是新渠塡塞不通貶宗器爲循州安懷戍主命將作大匠范安及發河南懷鄭汴滑衛三萬人䟽舊渠旬日而畢御史大夫崔隱甫中丞宇文融恐右丞相張説復用數奏毁之各爲朋黨上惡之二月乙巳制説致仕隱甫免官侍母融出爲魏州刺史乙夘制諸州逃户先經勸農使括定桉比後復有逃來者隨到準白丁例輸當年租庸有征役者先差夏五月癸酉上悉以諸子慶王潭等領州牧刺史都督節度大使大都護經略使實不出外初太宗愛晉王不使出閤豫王亦以武后少子不出閤及自皇嗣爲相王始出閤中宗之世譙王以失愛謫居外州温王年十七猶居禁中上即位附苑城爲十王宅以居皇子宦官押之就夾城參起居自是不復出閤雖開府置官屬及領藩鎮惟侍讀時入授書自餘王府官屬但嵗時通名起居其藩鎮官屬亦不通名及諸孫浸多又置百孫院太子亦不居東宫常在乗輿所幸之别院上命妃嬪以下宫中育蠶欲使之知女功丁酉夏至賜貴近絲人一綟秋七月戊寅冀州河溢己卯禮部尚書許文憲公蘇頲薨九月丙子吐蕃大將悉諾邏㳟禄及燭龍莽布支攻䧟瓜州執刺史田元獻及河西節度使王君㚟之父進攻玉門軍縱所虜僧伽歸涼州謂君㚟曰將軍常以忠勇許國何不一戰君㚟登城西望而泣竟不敢出兵莽布支别攻常樂縣縣令賈師順帥衆拒守及瓜州陷悉諾邏悉兵㑹攻之旬餘日吐蕃力盡不能克使人説降之不從吐蕃曰明府旣不降宜斂城中財相贈吾當退師順請脱士卒衣悉諾邏知無財乃引去毁瓜州城師順遽開門収器械修守僃虜果復遣精􅀐還視城中知有備乃去師順岐州人也初突厥黙啜之彊也迫奪鐵勒之地故回紇契苾思結渾四部度磧徙居甘涼之間以避之王君㚟微時往來四部爲其所輕及爲河西節度使以法繩之四部恥怨密遣使詣東都自訴君㚟遽發驛奏四部難制濳有叛計上遣中使往察之諸部竟不得直於是瀚海大都督回紇承宗流瀼州渾大徳流吉州賀蘭都督契苾承明流藤州盧山都督思結歸國流瓊州以回紇伏帝難爲瀚海大都督己夘貶右散騎常侍李令問爲撫州别駕坐其子與承宗交游故也丙戌突厥毗伽可汗遣其大臣梅禄啜入貢吐蕃之宼瓜州也遺毗伽書欲與之俱入宼毗伽并獻其書上嘉之聽於西受降城爲互市每歳齎縑帛數十萬匹就市戎馬以助軍旅且爲監牧之種由是國馬益壯焉閏月庚子吐蕃贊普與突騎施蘇禄圍安西城安西副大都護趙頥貞擊破之回紇承宗族子瀚海司馬䕶輸糾合黨衆爲承宗報仇㑹吐蕃遣使間道詣突厥王君㚟帥精騎邀之於肅州還至甘州南鞏筆驛䕶輸伏兵突起奪君㚟旌節先殺其判官宋貞剖其心曰始謀者汝也君㚟帥左右數十人力戰自朝至晡左右盡死䕶輸殺君㚟載其尸奔吐蕃凉州兵追及之䕶輸弃尸而走庚申車駕發東都冬己卯至西京辛巳以左金吾衛大將軍信安王禕爲朔方節度等副大使禕恪之孫也以朔方節度使蕭嵩爲河西節度等副大使時王君㚟新敗河隴震駭嵩引刑部貟外郎裴寛爲判官與君㚟判官牛仙客俱掌軍政人心浸安寛漼之從弟也仙客本鶉觚小吏以才幹軍功累遷至河西節度判官爲君㚟腹心嵩又奏以建康軍使河北張守珪爲􅀲州刺史帥餘衆築故城板榦裁立吐蕃猝至城中相顧失色莫有鬬志守珪曰彼衆我寡又瘡痍之餘不可以矢刃相持當以竒計取勝乃於城上置酒作樂虜疑其有僃不敢攻而退守珪縱兵擊之虜敗走守珪乃修復城市收合流散皆復舊業朝廷嘉其功以􅀲州爲都督府以守珪爲都督悉諾邏威名甚盛蕭嵩縱反閒於吐蕃云與中國通謀贊普召而誅之吐蕃由是少衰十二月戊寅制以吐蕃爲邊患令隴右道及諸軍團兵五萬六千人河西道及諸軍團兵四萬人又徵􅀜中兵萬人集臨洮朔方兵二萬人集㑹州防秋至冬􅀄無宼而罷伺虜入宼互出兵腹背擊之乙亥上幸驪山温泉丙戌還宫十六年春正月壬寅安西副大都護趙頥貞敗吐蕃于曲子城甲寅以魏州刺史宇文融爲户部侍郎兼魏州刺史充河北道宣撫使乙卯春瀧等州獠陳行範廣州獠馮璘何遊魯反䧟四十餘城行範稱帝遊魯稱定國大將軍璘稱南越王欲據嶺表命内侍楊思勗發桂州及嶺北近道兵討之丙寅以魏州刺史宇文融檢校汴州刺史充河南北溝渠堤堰決九河使融請用禹貢九河故道開稻田并回易陸運錢官收其利興役不息事多不就二月壬申以尚書右丞相致仕張説兼集賢院學士説雖罷政事專文史之任朝廷每有大事上常遣中使訪之壬辰改彍騎爲左右羽林軍飛􅀐秋七月吐蕃大將悉末朗宼􅀲州都督張守珪擊走之乙巳河西節度使蕭嵩隴右節度使張忠亮大破吐蕃於渴波谷忠亮追之拔其大莫門城擒獲甚衆焚其駱駝橋而還八月乙巳特進張説上開元大􅄛曆行之辛夘右金吾將軍杜賔客破吐蕃于祁連城下時吐蕃復入宼蕭嵩遣賔客將彊弩四千擊之戰自辰至暮吐蕃大潰獲其大將一人虜散走投山哭聲四合冬十月己卯上幸驪山温泉己丑還宫十一月癸巳以河西節度副大使蕭嵩爲兵部尚書同平章事十二月丙寅敕長征兵無有還期人情難堪宜分五畨歳遣一畨還家洗沐五年酬勲五轉是嵗制户籍三嵗一定分爲九等楊思勗討陳行範至瀧州破之擒何遊魯馮璘行範逃於雲際盤遼二洞思勗追捕竟生擒斬之凡斬首六萬思勗爲人嚴偏禆白事者不敢仰視故用兵所向有功然性忍酷所得俘虜或生剥面皮或以刀􅙃髪際掣去頭皮蠻夷憚之十七年春二月丁卯嶲州都督張守素破西南蠻拔昆明及鹽城殺獲萬人三月􅀲州都督張守珪沙州刺史賈思順擊吐蕃大同軍大破之甲寅朔方節度使信安王禕攻吐蕃石堡城拔之初吐蕃陷石堡城留兵據之侵擾河右上命禕與河西隴右同議攻取諸將咸以爲石堡據險而道逺攻之不克將無以自還且宜桉兵觀舋禕不聽引兵深入急攻拔之仍分兵據守要害令虜不得前自是河隴諸軍遊弈拓境千餘里上聞大悦更命石堡城曰振武軍丙辰國子祭酒楊瑒上言以爲省司奏限天下明經進士及第每年不過百人竊見流外出身每歳二千餘人而明經進士不能居其什一則是服勤道業之士不如胥史之得仕也臣恐儒風浸墜亷恥日衰若以出身人太多則應諸色裁損不應獨抑明經進士也又奏主司帖試明經不務求述作本指專取難知問以孤經絶句或年月日請自今並帖平文上甚然之夏四月庚午禘于太廟唐初祫則序昭穆禘則各祀於其室至是太常少卿韋縚等奏如此禘與常饗不異請禘祫皆序昭穆從之縚安石之兄子也五月壬辰復置十道及京都兩畿桉察使初張說張嘉貞李元紘杜暹相繼爲相用事源乾曜以清謹自守常讓事於説等唯諾署名而已元紘暹議事多異同遂有隙更相奏列上不恱六月甲戌貶黄門侍郎同平章事杜暹荆州長史中書侍郎同平章事李元紘曹州刺史罷乾曜兼侍中止爲左丞相以户部侍郎宇文融爲黄門侍郎兵部侍郎裴光庭爲中書侍郎並同平章事蕭嵩兼中書令遥領河西開府王毛仲與龍武將軍葛福順爲昬毛仲爲上所信任言無不從故北門諸將多附之進退唯其指使吏部侍郎齊澣乗間言於上曰福順典禁兵不宜與毛仲爲昬毛仲小人寵過則生姦不早爲之恐成後患上恱曰知卿忠誠朕徐思其宜澣曰君不密則失臣願陛下密之㑹大理丞麻察坐事左遷興州别駕澣素與察善出城餞之因道禁中諫語察性輕險遽奏之上怒召澣責之曰卿疑朕不密而以語麻察詎爲密邪且察素無行卿豈不知邪澣頓首謝秋七月丁巳下制澣察交構將相離間君臣澣可髙州良徳丞察可潯州皇化尉八月癸亥上以生日宴百官於花萼樓下左丞相乾曜右丞相説帥百官上表請以每嵗八月五日爲千秋節布於天下咸令宴樂尋又移社就千秋節庚辰工部尚書張嘉貞薨嘉貞不營家産有勸其市田宅者嘉貞曰吾貴爲將相何憂寒餒若其獲罪雖有田宅亦無所用比見朝士廣占良田身没之日適足爲無頼子弟酒色之資吾不取也聞者是之辛巳敕以人間多盗鑄錢始禁私賣銅鉛錫及以銅爲器皿其采銅鉛錫者官爲市取宇文融性精敏應對辯給以治財賦得幸於上始廣置諸使競爲聚斂由是百官浸失其職而上心益侈百姓皆怨苦之爲人踈躁多言好自矜伐在相位謂人曰使吾居此數月則海内無事矣信安王禕以軍功有寵於上融疾之禕入朝融使御史李寅彈之泄於所親禕聞之先以白上明日寅奏果入上怒九月壬子融坐貶汝州刺史凡爲相百日而罷是後言財利以取貴仕者皆祖於融冬十月戊午朔日有食之不盡如鉤宇文融既得罪國用不足上復思之謂裴光庭等曰卿等皆言融之惡朕既黜之矣今國用不足將若之何卿等何以佐朕光庭等懼不能對㑹有飛状告融贓賄事又貶平樂尉至嶺外歳餘司農少卿蔣岑奏融在汴州隱沒官錢鉅萬計制窮治其事融坐流巖州道卒十一月辛卯上行謁橋定獻昭乾五陵戊申還宫赦天下百姓今年地税悉蠲其半十二月辛酉上幸新豐温泉壬申還宫十八年春正月辛卯以裴光庭爲侍中二月癸酉初令百官於春月旬休選勝行樂自宰相至員外郎凡十二筵各賜錢五千緡上或御花萼樓邀其歸騎留飲迭使起舞盡歡而去三月丁酉復給京官職田夏四月丁卯築西京外郭九旬而畢乙丑以裴光庭兼吏部尚書先是選司注官惟視其人之能否或不次超遷或老於下位有出身二十餘年不得禄者又州縣亦無等級或自大入小或初近後逺皆無定制光庭始奏用循資格各以罷官若干選而集官髙者選少卑者選多無問能否選滿則注限年躡級毋得踰越非負譴者皆有升無降其庸愚沈滯者皆喜謂之聖書而才俊之士無不怨歎宋璟爭之不能得光庭又令流外行署亦過門下省審五月吐蕃遣使致書於境上求和初契丹王李邵固遣可突干入貢同平章事李元紘不禮焉左丞相張説謂人曰奚契丹必叛可突干狡而狠專其國政乆矣人心附之今失其心必不來矣己酉可突干弑邵固帥其國人并脅奚衆叛降突厥奚王李魯蘇及其妻韋氏邵固妻陳氏皆來奔制幽州長史趙含章討之又命中書舍人裴寛給事中薛􅋲等於􅀜内河東河南北分道募勇士六月丙子以單于大都䕶忠王浚領河北道行軍元帥以御史大夫李朝隱京兆尹裴伷先副之帥十八揔管以討奚契丹命浚與百官相見於光順門張説退謂學士孫逖韋述曰吾嘗觀太宗畫像雅類忠王此社稷之福也可突干冦平盧先鋒使張掖爲承玼破之於捺禄山壬午洛水溢溺東都千餘家秋九月丁巳以忠王浚兼河東道元帥然竟不行吐蕃兵數敗而懼乃求和親忠王犮皇甫惟明因奏事從容言和親之利上曰贊普嘗遺吾書悖慢此何可捨對曰贊普當開元之初年尚㓜稺安能爲此書殆邊將詐爲之欲以激怒陛下耳夫邊境有事則將吏得以因緣盗匿官物妄述功狀以取勲爵此皆姦臣之利非國家之福也兵連不解日費千金河西隴右由兹困敝陛下誠命一使往視公主因與贊普面相約結使之稽顙稱臣永息邊患豈非御夷狄之長策乎上恱命惟明與内侍張元方使于吐蕃贊普大喜悉出貞觀以來所得敕書以示惟明冬十月遣其大臣論名悉獵隨惟明入貢表稱甥世尚公主義同一家中間張􅀇表等先興兵冦鈔遂使二境交惡甥深識尊卑安敢失禮正爲邊將交構致獲罪於舅屢遣使者入朝皆爲邊將所遏今䝉逺降使臣來視公主甥不勝喜荷儻使復修舊好死無所恨自是吐蕃復􅅃附庚寅上幸鳯泉湯癸卯還京師甲寅䕶密王羅真檀入朝留宿衛十一月丁卯上幸驪山温泉丁丑還宫是歳天下奏死罪止二十四人突騎施遣使入貢上宴之於丹鳯樓突厥使者豫焉二使爭長突厥曰突騎施小國本突厥之臣不可居我上突騎施曰今日之宴爲我設也我不可以居其下上乃命設東西幕突厥在東突騎施在西開府儀同三司内外閑廐監牧都使霍國公王毛仲恃寵驕恣日甚上每優容之毛仲與左領軍大將軍葛福順左監門將軍唐地文左武衛將軍李守徳右威衛將軍王景耀髙廣濟親善福順等倚其勢多爲不灋毛仲求兵部尚書不得怏怏形於辭色上由是不恱是時上頗寵任宦官往往爲三品將軍門施棨㦸奉使過諸州官吏奉之惟恐不及所得賂遺少者不减千緡由是京城第舍郊畿田園參半皆宦官矣楊思勗髙力士尤貴幸思勗屢將兵征討力士常居中侍衛而毛仲視宦官貴近者若無人甚卑品者小忤意輒詈辱如僮僕力士等皆害其寵而未敢言㑹毛仲妻産子三日上命力士賜之酒饌金帛甚厚且授其兒五品官力士還上問毛仲喜乎對曰毛仲抱其繦中兒示臣曰此兒豈不堪作三品邪上大怒曰昔誅韋氏此賊心持兩端朕不欲言之今日乃敢以赤子怨我力士因言北門奴官太盛相與一心不早除之必生大患上恐其黨驚懼爲變十九年春正月壬戌下制但述毛仲不忠怨望貶瀼州别駕福順地文守徳景耀廣濟皆貶逺州别駕毛仲四子皆貶逺州參軍連坐者數十人毛仲行至永州追賜死自是宦官勢益盛髙力士尤爲上所寵信嘗曰力士上直吾寢則安故力士多留禁中稀至外第四方表奏皆先呈力士然後奏御事小者力士即决之勢傾内外金吾大將軍程伯獻少府監馮紹正與力士約爲兄弟力士母麥氏卒伯獻等被髪受弔擗踊哭泣過於已親力士娶瀛州吕􅀇晤女爲妻擢􅀇晤爲少卿子弟皆王􅀓吕氏卒朝野爭致祭自第至墓車馬不絶然力士小心㳟恪故上終親任之辛未遣鴻臚卿崔琳使于吐蕃琳神慶之子也吐蕃使者稱公主求毛詩春秋禮記正字于休烈上䟽以爲東平王漢之懿親求史記諸子漢猶不與况吐蕃國之冦讎今資之以書使知用兵權略愈生變詐非中國之利也事下中書門下議之裴光庭等奏吐蕃聾昧頑嚚久叛新服因其有請賜以詩書庶使之漸陶聲教化流無外休烈徒知書有權略變詐之語不知忠信禮義皆從書出也上曰善遂與之休烈志寧之􅀇孫也丙子上躬耕於興慶宫側盡三百歩三月突厥左賢王闕特勒卒賜書弔之丙申初令兩京諸州各置太公廟以張良配饗選古名將以備十哲以二八月上戊致祭如孔子禮臣光曰經緯天地之謂文戡定禍亂之謂武自古不兼斯二者而稱聖人未之有也故黄帝堯舜禹湯文武伊尹周公莫不有征伐之功孔子雖不試猶能兵萊夷却費人曰吾戰則克豈孔子專文而太公專武乎孔子所以祀於學者禮有先聖先師故也自生民以來未有如孔子者豈太公得與之抗衡哉古者有發則命大司徒教士以車甲臝股肱决射御受成獻馘莫不在學所以然者欲其先禮義而後勇力也君子有勇而無義爲亂小人有勇而無義爲盗若專訓之以勇力而不使之知禮義奚所不爲矣自孫吴以降皆以勇力相勝狙詐相髙豈足以數於聖賢之門而謂之武哉乃復誣引以偶十哲之目爲後世學者之師使太公有神必羞與之同食矣五月壬戌初立五嶽真君祠秋九月辛未吐蕃遣其相論尚它硉入見請於赤嶺爲互市許之冬十月丙申上幸東都或告嶲州都督解人張審素贓汚制遣監察御史楊汪按之揔管董元禮將兵七百圍汪殺告者謂汪曰善奏審素則生不然則死㑹救兵至擊斬之汪奏審素謀反十二月癸未審素坐斬籍沒其家浚苑中洛水六旬而罷二十年春正月乙卯以朔方節度副大使信安王禕爲河東河北行軍副大揔管將兵擊奚契丹壬申以户部侍郎裴耀卿爲副揔管二月癸酉朔日有食之上思右驍衛將軍安金藏忠烈三月賜爵代國公仍於東西嶽立碑以銘其功金藏竟以夀終信安王禕帥裴耀卿及幽州節度使趙含章分道擊奚契丹含章與虜遇虜望風遁去平盧先鋒將烏承玼言於含章曰二虜劇賊也前日遁去非畏我乃誘我也宜按兵以觀其變含章不從與虜戰於白山果大敗承玼别引兵出其右擊虜破之己巳禕等大破奚契丹俘斬甚衆可突干帥麾下逺遁餘黨潜竄山谷奚酋李詩􅃈髙帥五千餘帳來降禕引兵還賜李詩爵歸義王充歸義州都督徙其部落置幽州境内夏四月乙亥宴百官於上陽東洲醉者賜以衾褥肩輿以歸相屬于路六月丁丑加信安王禕開府儀同三司上命裴耀卿齎絹二十萬匹分賜立功奚官耀卿謂其徒曰戎狄貪婪今齎重貨深入其境不可不僃乃命先期而往分道並進一日給之俱畢突厥室韋果發兵邀隘道欲掠之比至耀卿已還趙含章坐贓巨萬杖於朝堂流瀼州道死秋七月蕭嵩奏自祠后土以來屢獲豐年宜因還京賽祠上從之敕裴光庭蕭嵩分押左右廂兵八月辛未朔日有食之初上命張說與諸學士刋定五禮說薨蕭嵩繼之起居舍人王仲丘請依明慶禮祈榖大雩明堂皆祀昊天上帝嵩又請依上元敕父在爲母齊衰三年皆從之以髙祖配圓丘方丘太宗配雩祀及神州地祇睿宗配明堂九月乙巳新禮成上之號曰開元禮勃海靺鞨王武藝遣其將張文休帥海賊宼登州殺刺史韋俊上命右領軍將軍葛福順發兵討之壬子河西節度使牛仙客加六階初蕭嵩在河西委軍政於仙客仙客廉勤善於其職嵩屢薦之竟代嵩爲節度使冬十月壬午上發東都辛卯幸潞州辛丑至北都十一月庚申祀后土於汾隂赦天下十二月辛未還西京是嵗以幽州節度使兼河北采訪處置使増領衛相洛貝冀魏深趙􅁪定邢徳博棣營鄚十六州及安東都䕶府天下户七百八十六萬一千二百三十六口四千五百四十三萬一千二百六十五二十一年春正月乙巳祔肅明皇后于太廟毁儀坤廟丁巳上幸驪山温泉上遣大門藝詣幽州發兵以討勃海王武藝庚申命太僕員外卿金思蘭使于新羅發兵擊其南鄙㑹大雪丈餘山路阻隘士卒死者過半無功而還武藝怨門藝不已密遣客刺門藝於天津橋南不死上命河南搜捕賊黨盡殺之二月丁酉金城公主請立碑於赤嶺以分唐與吐蕃之境許之三月乙巳侍中裴光庭薨太常博士孫琬議光庭用循資格失勸奬之道請謚曰克其子稹訟之上賜謚忠獻上問蕭嵩可以代光庭者嵩與右散騎常侍王丘善將薦之丘聞之固讓於右丞韓休嵩言休於上甲寅以休爲黄門侍郎同平章事休爲人峭直不干榮利及爲相甚允時望始嵩以休恬和謂其易制故引之及與共事休守正不阿嵩漸惡之宋璟歎曰不意韓休乃能如是上或宫中宴樂及後苑遊獵小有過差輒謂左右曰韓休知否言終諫疏已至上嘗臨鏡黙然不樂左右曰韓休爲相陛下殊瘦於舊何不逐之上歎曰吾貌雖瘦天下必肥蕭嵩奏事常順指既退吾寢不安韓休常力爭既退吾寢乃安吾用韓休爲社稷耳非爲身也有供奉侏儒名黄㼐性警黠上常馮之以行謂之肉几寵賜甚厚一日晩入上恠之對曰臣曏入宫道逢捕盗官與臣爭道臣掀之墜馬故晩因下階叩頭上曰但使外無章奏汝亦無憂有頃京兆奏其狀上即叱出付有司杖殺之閏月癸酉幽州道副緫管郭英傑與契丹戰于都山敗死時節度使薛楚玉遣英傑將精騎一萬及降奚擊契丹屯於榆關之外可突干引突厥之衆來合戰奚持兩端散走保險唐兵不利英傑戰死餘衆六千餘人猶力戰不已虜以英傑首示之竟不降盡爲虜所殺楚王訥之弟也夏六月癸亥制自今選人有才業操行委吏部臨時擢用流外奏甲不復引過門下雖有此制而有司以循資格便於己猶踵行之是時官自三師以下一萬七千六百八十六員吏自佐史以上五萬七千四百一十六員而入仕之塗甚多不可勝紀秋七月乙丑朔日有食之九月壬午立皇子沔爲信王泚爲義王漼爲陳王澄爲豐王潓爲􅁪王漎爲梁王滔爲汴王關中乆雨榖貴上將幸東都召京兆尹裴耀卿謀之對曰關中帝業所興當百代不易但以地狹榖少故乗輿時幸東都以寛之臣聞貞觀永徽之際禄廪不多歳漕關東一二十萬石足以周贍乗輿得以安居今用度浸廣運數倍於前猶不能給故使陛下數冒寒暑以恤西人今若使司農租米悉輸東都自都轉漕稍實􅀜中茍􅀜中有數年之儲則不憂水旱矣且吴人不習河漕所在停留日月既久遂生隱盗臣請於河口置倉使吳船至彼即輸米而去官自雇載分入河洛又於三門東西各置一倉至者貯納水險則止水通則下或開山路車運而過則無復留滯省費鉅萬矣河渭之濵皆有漢隋舊倉葺之非難也上深然其言冬十月庚戌上幸驪山温泉己未還宫戊子左丞相宋璟致仕歸東都韓休數與蕭嵩爭論於上前面折嵩短上頗不恱嵩因乞骸骨上曰朕未厭卿卿何爲遽去對曰臣䝉厚恩待罪宰相富貴巳極及陛下未厭臣故臣得從容引去君巳厭臣臣首領且不保安能自遂因泣下上爲之動容曰卿且歸朕徐思之丁巳嵩罷爲左丞相休罷爲工部尚書以京兆尹裴耀卿爲黄門侍郎前中書侍郎張九齡時居母喪起復中書侍郎並同平章事是歳分天下爲京畿都畿􅀜内河南河東河北隴右山南東道山南西道劒南淮南江南東道江南西道黔中嶺南凡十五道各置采訪使以六條檢察非灋兩畿以中丞領之餘皆擇賢刺史領之非官有遷免則使無廢更惟變革舊章乃須報可自餘聽便宜從事先行後聞太府卿楊崇禮政道之子也在太府二十餘年前後爲太府者莫能及時承平日久財貨山積嘗經楊卿者無不精美毎歲句駮省便出錢數百萬緡是歳以户部尚書致仕年九十餘矣上問宰相崇禮諸子誰能繼其父者對曰崇禮三子慎餘慎矜慎名皆亷勤有才而慎矜為優上乃擢慎矜自汝陽令爲監察御史知太府出納慎名攝監察御史知含嘉倉出給亦皆稱職上甚恱之慎矜奏諸州所輸布帛有漬汚穿破者皆下本州徵折估錢轉市輕貨徵調始繁矣資治通鑑卷第二百一十三
