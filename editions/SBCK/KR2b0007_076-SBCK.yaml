seq: 76
front:
  text: 各燒屯走朝議欲貶黜諸将大将軍師曰我不聽公休以至於此此我過也諸将何罪悉宥之師弟安東将軍昭時為監軍唯削昭爵而已以諸葛誕為鎮南将軍都督豫州母丘儉為鎮東将軍都督揚州是嵗雍州刺史陳泰求敕并州并力討胡師從之未集而鴈門新興二郡胡以逺役遂驚反師又謝朝士曰此我過也非陳雍州之責是以人皆愧悅
  hash: sha256:4f91e11b1a54a941c11f3a7589dcb238155dc035f6eb5eb1032df0e03e980aaf
body:
  text: 習鑿齒論曰司馬大将軍引二敗以為己過過消而業隆可謂智矣若乃諱敗推過歸咎萬物常執其功而隱其喪上下離心賢愚解體謬之甚矣君人者茍統斯理而以御國行失而名揚兵挫而戰勝雖百敗可也况於再乎光禄大夫張緝言於師曰恪雖克㨗見誅不乆師曰何故緝曰威震其主功蓋一國求不死得乎二月吳軍還自東興進封太傅恪陽都侯加荆揚州牧督中外諸軍事恪遂有輕敵之心復欲出軍諸大臣以為數出罷勞同辭諫恪恪不聽中散大夫蔣延固爭恪命扶出因著論以諭衆曰凡敵國欲相吞即仇讎欲相除也有讎而長之禍不在已則在後人不可不為逺慮也昔秦伹得關西耳尚以并吞六國今以魏比古之秦土地數倍以吳與蜀比古六國不能半也然今所以能敵之者但以操時兵衆於今適盡而後生者未悉長大正是賊衰少未盛之時加司馬懿先誅王淩續自隕斃其子㓜弱而專彼大任雖有智計之士未得施用當今伐之是其厄會聖人急於趨時誠謂今日若順衆人之情懐偷安之計以為長江之險可以傳世不論魏之終始而以今日遂輕其後此吾所以長歎息者也今聞衆人或以百姓尚貧欲務閑息此不知慮其大危而愛其小勤者也昔漢祖幸已自有三秦之地何不閉關守險以自娛樂空出攻楚身被創痍介胄生蟣蝨將士厭困苦豈甘鋒刃而忘安寧哉慮於長久不得兩存者耳每覧荆邯説公孫述以進取之圖近見家叔父表陳與賊爭競之計未嘗不喟然歎息也夙夜反側所慮如此故聊䟽愚言以逹二三君子之末若一朝隕没志畫不立貴令來世知我所憂可思於後耳衆人雖皆心以為不可然莫敢復難丹陽太守聶友素與恪善以書諌恪曰大行皇帝本有遏東關之計計未施行今公輔賛大業成先帝之志宼遠自送将士慿頼威徳出身用命一旦有非常之功豈非宗廟神靈社稷之福邪宜且案兵飬鋭觀釁而動今乘此勢欲復大出天時未可而茍任盛意私心以為不安恪題論後為書答友曰足下雖有自然之理然未見大數熟省此論可以開悟矣滕􅅌謂恪曰君受伊霍之託入安本朝出摧彊敵名聲振於海内天下莫不震動萬姓之心冀得䝉君而息今猥以勞役之後興師出征民疲力屈遠主有備若攻城不克野略無獲是䘮前勞而招後責也不如案甲息師觀隙而動且兵者大事事以衆濟衆茍不悦君獨安之恪曰諸云不可皆不見計筭懐居茍安者也而子復以為然吾何望乎夫以曹芳闇劣而政在私門彼之民臣固有離心今吾因國家之資藉戰勝之威則何徃而不克哉三月恪大發州郡二十萬衆復入宼以滕􅅌為都下督掌統留事夏四月大赦漢姜維自以練西方風俗兼負其才武欲誘諸羗胡以為羽翼謂自隴以西可斷而有每欲興軍大舉費禕常裁制不從與其兵不過萬人曰吾等不如丞相亦已遠矣丞相猶不能定中夏况吾等乎不如且保國治民謹守社稷如其功業以俟能者無為希冀徼倖决成敗於一舉若不如志悔之無及及禕死維得行其志乃将數萬人出石營圍狄道吳諸葛恪入冦淮南驅畧民人諸將或謂恪曰今引軍深入彊埸之民必相率遠遁恐兵勞而功少不如止圍新城新城困救必至至而圖之乃可大獲恪從其計五月還軍圍新城詔太尉司馬孚督諸軍二十萬徃赴之大将軍師問於虞松曰今東西有事二方皆急而諸将意沮若之何松曰昔周亞夫堅壁昌邑而吳楚自敗事有似弱而彊不可下察也今恪悉其鋭衆足以肆暴而坐守新城欲以致一戰耳若攻城不拔請戰不可師老衆疲勢将自走諸将之不徑進乃公之利也姜維有重兵而縣軍應恪投食我麥非深根之宼也且謂我并力於東西方必虛是以徑進今若使關中諸軍倍道急赴出其不意殆将走矣師曰善乃使郭淮陳泰悉關中之衆解狄道之圍敕毌丘儉等案兵自守以新城委吳陳泰進至洛門姜維糧盡退還揚州牙門将涿郡張特守新城吳人攻之連月城中兵合三千人疾病戰死者過半而恪起土山急攻城将䧟不可䕶特乃謂吳人曰今我無心復戰也然魏灋被攻過百日而救不至者雖降家不坐自受敵以來已九十餘日矣此城中本有四千餘人戰死者已過半城雖䧟尚有半人不欲降我當還爲相語條别善惡明日早送名且以我印綬去爲信乃投其印綬與之吳人聽其辭而不取印綬特乃投夜徹諸屋材栅補其缺為二重明日謂吳人曰我但有鬬死耳呉人大怒進攻之不能拔㑹大暑吳士卒疲勞飲水泄下流腫病者大半死傷塗地諸營吏日白病者多恪以為詐欲斬之自是莫敢言恪内惟失計而恥城不下忿形於色将軍朱異以軍事迕恪恪立奪其兵斥還建業都尉蔡林數陳軍計恪不能用䇿馬來犇諸将伺知吳兵已疲乃進救兵秋七月恪引軍去士卒傷病流曵道路或頓仆坑壑或見略獲存亡哀痛大小嗟呼而恪晏然自若出住江渚一月圖起田於潯陽詔召相銜徐乃旋師由是衆庶失望怨讟興矣汝南太守鄧艾言於司馬師曰孫權已没大臣未附吳名宗大族皆有部曲阻兵仗埶足以違命諸葛恪新秉國政而内無其主不念撫恤上下以立根基競於外事虐用其民悉國之衆頓於堅城死者萬數載禍而歸此恪獲罪之日也昔子胥吳起商鞅樂毅皆見任時君主没猶敗况恪才非四賢而不慮大患其亡可待也八月吳軍還建業諸葛恪陳兵導從歸入府舘即召中書令孫嘿厲聲謂曰卿等何敢數妄作詔嘿惶懼辭出因病還家恪征行之後曹所奏署令長職司一罷更選愈治威嚴多所罪責當進見者無不竦息又改易宿衛用其親近復敕兵嚴欲向青徐孫峻因民之多怨衆之所嫌􅌟恪於呉主云欲爲變冬十月孫峻與呉主謀置酒請恪恪將入之夜精爽擾動通夕不寐又家數有妖怪恪疑之旦日駐車宫門峻已伏兵於帷中恐恪不時入事泄乃自出見恪曰使君若尊體不安自可須後峻當具白主上欲以嘗知恪意恪曰當自力入散騎常侍張約朱恩等宻書與恪曰今日張設非常疑有他故恪以書示滕􅅌􅅌勸恪還恪曰兒軰何能為正恐因酒食中人耳恪入劒履上殿進謝還坐設酒恪疑未飲孫峻曰使君病未善平有常服藥酒可取之恪意乃安别飲所齎酒數行呉主還内峻起如厠解長衣著短服出曰有詔収諸葛恪恪驚起㧞劒未得而峻刀交下張約從旁斫峻裁傷左手峻應手斫約斷右臂武衛之士皆趨上殿峻曰所取者恪也今已死悉令復刃乃除地更飲恪二子竦建聞難載其母欲來犇峻使人追殺之以葦席褁恪尸篾束腰投之石子岡又遣無難督施寛就将軍施績孫壹軍殺恪弟奮威将軍融於公安及其三子恪外甥都鄉侯張震常侍朱恩皆夷三族臨淮臧均表乞収葬恪曰震雷電激不崇一朝大風衝發希有極日然猶繼以雲雨因以潤物是則天地之威不可經日浹辰帝王之怒不宜訖情盡意臣以狂愚不知忌諱敢冒破滅之罪以邀風雨之㑹伏念故太􅀓諸葛恪罪積惡盈自致夷滅父子三首梟市積日觀者數萬詈聲成風國之大刑無所不震長老孩㓜無不畢見人情之於品物樂極則哀生見恪貴盛世莫與貳身處台輔中閒歴年今之誅夷無異禽獸觀訖情反能不憯然且已死之人與土壤同域鑿掘斫刺無所復加願聖朝稽則乾坤怒不極旬使其鄉邑若故吏民収以士伍之服惠以三寸之棺昔項籍受殯葬之施韓信獲収歛之恩斯則漢高發神明之譽也惟陛下敦三皇之仁垂哀矝之心使國澤加於辜戮之骸復受不已之恩於以揚聲遐方沮勸天下豈不大哉昔欒布矯命彭越臣竊恨之不先請主上而專名以肆情其得不誅實為幸耳今臣不敢章宣愚情以露天恩謹伏手書冒昧陳聞乞聖明哀察於是吳主及孫峻聽恪故吏斂葬初恪少有盛名大帝深器重之而恪父瑾常以為戚曰非保家之主也父友奮威将軍張承亦以為恪必敗諸葛氏陸遜嘗謂恪曰在我前者吾必奉之同升在我下者則扶接之今觀君氣陵其上意蔑乎下非安德之基也漢侍中諸葛瞻亮之子也恪再攻淮南越嶲太守張嶷與瞻書曰東主初崩帝實㓜弱太傅受寄託之重亦何容易親有周公之才猶有管蔡流言之變霍光受任亦有燕蓋上官逆亂之謀頼成昭之明以免斯難耳昔每聞東主殺生賞罰不任下人又今以埀没之命卒召太􅀓屬以後事誠實可慮加吳楚剽急乃昔所記而太傅離少主履敵庭恐非良計長筭也雖云東家綱紀肅然上下輯睦百有一失非明者之慮也取古則今今則古也自非郎君進忠言於太傅誰復有盡言者邪旋軍廣農務行德惠數年之中東西竝舉實為不晩願深採察恪果以此敗吳羣臣共議上奏推孫峻為太尉滕胤為司徒有媚峻者言曰萬機宐在公族若承嗣為亞公聲名素重衆心所附不可量也乃表峻為丞相大将軍督中外諸軍事又不置御史大夫由是士人失望滕胤女為恪子竦妻胤以此辭位孫峻曰鯀禹罪不相及滕矦何為峻與胤雖内不沾洽而外相苞容進胤爵髙宻矦共事如前齊王奮聞諸葛恪誅下住蕪湖欲至建業觀變􅀓相謝慈等諫奮殺之坐廢為庶人徙章安南陽王和妃張氏諸葛恪之甥也先是恪有徙都之意使治武昌宫民間或言恪欲迎和立之及恪被誅丞相峻因此奪和璽綬徙新都又遣使者賜死初和妾何氏生子皓諸姬子德謙俊和将死與張妃别妃曰吉凶當相隨終不獨生亦自殺何姬曰若皆從死誰當字孤遂撫育皓及其三弟皆頼以獲全高貴鄉公上正元元年春二月殺中書令李豐初豐年十七八已有清名海内翕然稱之其父太僕恢不願其然敕使閉門斷客曹爽專政司馬懿稱􅍚不出豐為尚書僕射依違二公閒故不與爽同誅豐子韜以選尚齊長公主司馬師秉政以豐為中書令是時太常夏侯􅀇有天下重名以曹爽親故不得在埶任居常怏怏張緝以后父去郡家居亦不得意豐皆與之親善師雖擢用豐豐私心常在􅀇豐在中書二歲帝數獨召豐與語不知所説師知其議已請豐相見以詰豐豐不以實告師怒以刀鐶築殺之送尸付廷尉遂収豐子韜及夏侯􅀇張緝等皆下廷尉鍾毓案治云豐與黄門監蘇鑠永寧署令樂敦宂從僕射劉賢等謀曰拜貴人日諸營兵皆屯門陛下臨軒因此同奉陛下将羣僚人兵就誅大将軍陛下儻不從人便當刼将去耳又云謀以􅀇為大将軍緝為驃騎將軍􅀇輯皆知其謀庚戍誅韜􅀇緝鑠敦賢皆夷三族夏侯霸之入蜀也邀􅀇欲與之俱􅀇不從及司馬懿薨中領軍高陽許允謂􅀇曰無復憂矣􅀇歎曰士宗卿何不見事乎此人猶能以通家年少遇我子元子上不吾容也及下獄􅀇不肯下辭鍾毓自臨治之􅀇正色責毓曰吾當何罪卿為令史責人也卿便為吾作毓以􅀇名士節高不可屈而獄當竟夜為作辭令與事相附流涕以示􅀇􅀇視頷之而已及就東市顔色不變舉動自若李豐弟翼為兖州刺史司馬師遣使収之翼妻荀氏謂翼曰中書事發可及詔書未至赴吳何為坐取死亡左右可共同赴水火者為誰翼思未答妻曰君在大州不知可與同生死者雖去亦不免翼曰二兒小吾不去今但從坐身死耳二兒必免乃止死初李恢與尚書僕射社畿及東安太守郭智善智子沖有内實而無外觀州里弗稱也冲嘗與李豐俱見畿既退畿歎曰孝懿無子非徒無子殆将無家君謀為不死也其子足繼其業時人皆以畿為誤及豐死冲為代郡太守卒繼父業正始中夏侯􅀇何晏鄧颺俱有盛名欲交尚書郎􅀓嘏嘏不受嘏友人荀粲怪而問之嘏曰太初志大其量能合虚聲而無實才何平叔言遠而情近好辯而無誠所謂利口覆邦國之人也鄧􅀇茂有為而無終外要名利内無關鑰貴同惡異多言而妬前多言多釁妬前無親以吾觀此三人者皆将敗家遠之猶恐禍及况昵之乎嘏又與李豐不善謂同志曰豐飾偽而多疑矜小智而昧於權利若任機事其死必矣辛亥大赦三月廢皇后張氏夏四月立皇后王氏奉車都尉䕫之女也狄道長李簡宻書請降於漢六月姜維冦隴西中領軍許允素與李豐夏侯􅀇善秋允爲鎮北将軍假節都督河北諸軍事帝以允當出詔會羣臣帝特引允以自近允當與帝别涕泣歔欷允未發有司奏允前放散官物収付廷尉徙樂浪未至道死吳孫峻驕矜滛暴國人側目司馬桓慮謀殺峻立太子登之子吳侯英不克皆死帝以李豐之死意殊不平安東将軍司馬昭鎭許昌詔召之使擊姜維九月昭領兵入見帝幸平樂觀以臨軍過左右勸帝因昭辭殺之勒兵以退大将軍已書詔於前帝懼不敢發昭引兵入城大将軍師乃謀廢帝甲戍師以皇太后令召羣臣會議以帝荒滛無度䙝近倡優不可以承天緒羣臣皆莫敢違乃奏収帝璽綬歸藩于齊使郭芝入白太后太后方與帝對坐芝謂帝曰大将軍欲廢陛下立彭城王據帝乃起去太后不悦芝曰太后有子不能教今大将軍意已成又勒兵于外以備非常但當順㫖将復何言太后曰我欲見大将軍口有所説芝曰何可見邪但當速取璽綬太后意折乃遣傍侍御取璽綬著坐側芝出報師師甚喜又遣使者授帝齊王印綬使出就西宫帝與太后垂涕而别遂乘王車從太極殿南出羣臣送者數十人司馬孚悲不自勝餘多流涕師又使使者請璽綬於太后太后曰彭城王我之季叔也今來立我當何之且明皇帝當永絕嗣乎高貴鄉公文皇帝之長孫明皇帝之弟子於禮小宗有後大宗之義其詳議之丁丑師更召羣臣以太后令示之乃定迎高貴鄉公髦於元城髦者東海定王霖之子也時年十四使太常王肅持節迎之師又使請璽綬太后曰我見高貴鄉公小時識之我自欲以璽綬手授之冬十月己丑高貴鄉公至􅀇武舘羣臣奏請舎前殿公以先帝舊處避止西廂羣臣又請以灋駕迎公不聽庚寅公入于洛陽羣臣迎拜西掖門南公下輿答拜儐者請曰儀不拜公曰吾人臣也遂答拜至止車門下輿左右曰舊乘輿入公曰吾被皇太后徴未知所為遂歩至太極東堂見太后其日即皇帝位於太極前殿百僚陪位者皆欣欣焉大赦改元為齊王築宫于河内漢姜維自狄道進拔河閒臨洮將軍徐質與戰殺其盪宼將軍張嶷漢兵乃還初揚州刺史文欽驍果絕人曹爽以鄉里故愛之欽恃爽埶多所陵傲及爽誅欽已内懼又好增虜級以邀功賞司馬師常抑之由是怨望鎭東将軍毌丘儉素與夏矦􅀇李豐善􅀇等死儉亦不自安乃以計厚待欽儉子治書侍御史甸謂儉曰大人居方嶽重任國家傾覆而晏然自守将受四海之責矣儉然之二年春正月儉欽矯太后詔起兵於壽春移檄州郡以討司馬師乃表言相國懿忠正有大勲於社稷宐宥及後世請廢師以侯就第以弟昭代之太尉孚忠孝小心䕶軍望忠公親事皆宐親寵授以要任望孚之子也儉又遣使邀鎭南将軍諸葛誕誕斬其使儉欽将五六萬衆渡淮西至項儉堅守使欽在外為游兵司馬師問計於河南尹王肅肅曰昔關羽虜于禁於漢濵有北向爭天下之志後孫權襲取其将士家屬羽士衆一旦瓦解今淮南将士父母妻子皆在州内但急往禦衛使不得前必有關羽土崩之勢矣時師新割目瘤創甚或以為大将軍不宐自行不如遣太尉孚拒之唯王肅與尚書􅀓嘏中書侍郎鍾㑹勸師自行師疑未决嘏曰淮楚兵勁而儉等負力遠鬭其鋒未易當也若諸将戰有利鈍大勢一失則公事敗矣師蹶然起曰我請輿疾而東戊午師率中外諸軍以討儉欽以弟昭兼中領軍留鎭洛陽召三方兵會于陳許師問計於光禄勲鄭袤袤曰毌丘儉好謀而不逹事情文欽勇而無筭今大軍出其不意江淮之卒鋭而不能固宐深溝高壘以挫其氣此亞夫之長䇿也師稱善師以荆州刺史王基為行監軍假節綂許昌軍基言於師曰淮南之逆非吏民思亂也儉等誑誘迫脅畏目下之戮是以尚屯聚耳若大兵一臨必土崩瓦解儉欽之首不終朝而致於軍門矣師從之以基為前軍既而復敕基停駐基以為儉等舉軍足以深入而乆不進者是其詐偽巳露衆心疑沮也今不張示威形以副民望而停軍高壘有似畏懦非用兵之埶也若儉欽虜畧民人以自益又州郡兵家為賊所得者更懐離心儉等所迫脅者自顧罪重不敢復還此為錯兵無用之地而成姦宄之源吳冦因之則淮南非國家之有譙沛汝豫危而不安此計之大失也軍宐速進據南頓南頓有大邸閣計足軍人四十日糧保堅城因積榖先人有奪人之心此平賊之要也基屢請乃聼進據㶏水閏月甲申師次于㶏橋儉将史招李續相次來降王基復言於師曰兵聞拙速未覩巧之乆也方今外有彊冦内有叛臣若不時决則事之深淺未可測也議者多言将軍持重将軍持重是也停軍不進非也持重非不行之謂也進而不可犯耳今保壁壘以積實資虜而遠運軍糧甚非計也師猶未許基曰将在軍君令有所不受彼得亦利我得亦利是謂爭地南頓是也遂輙進據南頓儉等從項亦欲往爭發十餘里聞基先到乃復還保項癸未征西将軍郭淮卒以雍州刺史陳泰代之吳丞相峻率驃騎将軍吕據左将軍㑹稽留賛襲壽春司馬師命諸軍皆深壁髙壘以待東軍之集諸将請進軍攻項師曰諸軍知其一未知其二淮南将士本無反志儉欽説誘與之舉事謂遠近必應而事起之日淮北不從史招李續前後瓦解内乖外叛自知必敗困獸思鬬速戰更合其志雖云必克傷人亦多且儉等欺誑将士詭變萬端小與持乆詐情自露此不戰而克之術也乃遣諸葛誕督豫州諸軍自安風向壽春征東将軍胡遵督青徐諸軍出譙宋之閒絕其歸路師屯汝陽毌丘儉文欽進不得鬬退恐壽春見襲計窮不知所為淮南将士家皆在北衆心沮散降者相屬惟淮南新附農民為之用儉之初起遣健歩齎書至兖州兖州刺史鄧艾斬之将兵萬餘人兼道前進先趨樂嘉城作浮橋以待師儉使文欽将兵襲之師自汝陽潛兵就艾於樂嘉欽猝見大軍驚愕未知所為欽子鴦年十八勇力絕人謂欽曰及其未定擊之可破也於是分為二隊夜夾攻軍鴦率壯士先至鼔譟軍中震擾師驚駭所病目突出恐衆知之囓被皆破欽失期不應㑹明鴦見兵盛乃引還師謂諸将曰賊走矣可追之諸将曰欽父子驍猛未有所屈何苦而走師曰夫一鼓作氣再而衰鴦鼓譟失應其埶已屈不走何待欽将引而東鴦曰不先折其埶不得去也乃與驍騎十餘摧鋒䧟陳所向皆披靡遂引去師使左長史司馬班率驍騎八千翼而追之鴦以疋馬入數千騎中輙殺傷百餘人乃出如此者六七追騎莫敢逼殿中人尹大目小為曹氏家奴常在天子左右師将與俱行大目知師一目已出啟云文欽本是明公腹心但為人所誤耳又天子鄕里素與大目相信乞為公追解語之令還與公復好師許之大目單身乘大馬被鎧胄追欽遥相與語大目心實欲為曹氏謬言君侯何苦不可復忍數日中也欲使欽解其㫖欽殊不悟乃更厲聲罵大目曰汝先帝家人不念報恩而反與司馬師作逆不顧上天天不祐汝張弓傅矢欲射大目大目涕泣曰世事敗矣善自努力是日毌丘儉聞欽退恐懼夜走衆遂大潰欽還至項以孤軍無繼不能自立欲還壽春壽春已潰遂犇吳吳孫峻至東興聞儉等敗壬寅進至槖臯文欽父子詣軍降毌丘儉走北至愼縣左右人兵稍棄儉去儉蔵水邊草中甲辰安風津民張屬就殺儉傳首京師封屬為侯諸葛誕至壽春壽春城中十餘萬口懼誅或流迸山澤或散走入吳詔以誕為鎭東大将軍儀同三司都督揚州諸軍事夷毌丘儉三族儉黨七百餘人繫獄侍御史杜友治之惟誅首事者十人餘皆奏免之儉孫女適劉氏當死以孕繫廷尉司􅀠主簿程咸議曰女適人者若已産育則成他家之母於防則不足懲姧亂之源於情則傷孝子之恩男不遇罪於他族而女獨嬰戮於二門非所以哀矝女弱均灋制之大分也臣以為在室之女可從父母之刑既醮之婦使從夫家之戮朝廷從之仍著於律令舞陽忠武侯司馬師疾篤還許昌留中郎将參軍事賈充監諸軍事充逵之子也䘙將軍昭自洛陽往省師師令昭揔統諸軍辛亥師卒于許昌中書侍郎鍾會從師典知密事中詔敕尚書傅嘏以東南新定權留衛将軍昭屯許昌為内外之援令嘏率諸軍還會與嘏謀使嘏表上輙與昭俱發還到洛水南屯住二月丁巳詔以司馬昭為大将軍録尚書事會由是常有自矝之色嘏戒之曰子志大其量而勲業難為也可不愼哉吳孫峻聞諸葛誕已據壽春乃引兵還以文欽為都䕶鎭北大将軍幽州牧三月立皇后卞氏大赦后武宣皇后弟秉之曾孫女也秋七月吳将軍孫儀張怡林恂謀殺孫峻不克死者數十人全公主譖朱公主於峻曰與儀同謀峻遂殺朱公主峻使衛尉馮朝城廣陵功費甚衆舉朝莫敢言唯滕􅅌諫止之峻不從功卒不成漢姜維復議出軍征西大将軍張翼廷爭以為國小民勞不宐黷武維不聽率車騎将軍夏侯霸及翼同進八月維将數萬人至枹䍐趨狄道征西将軍陳泰敕雍州刺史王經進屯狄道須泰軍到東西合埶乃進泰軍陳倉經所統諸軍於故關與漢人戰不利經輒渡洮水泰以經不堅據狄道必有他變率諸軍以繼之經已與維戰於洮西大敗以萬餘人還保狄道城餘皆犇散死者萬計張翼謂維曰可以止矣不宜復進進或毁此大功為蛇畫足維大怒遂進圍狄道辛未詔長水校尉鄧艾行安西将軍與陳泰并力拒維戊辰復以太尉孚爲後繼泰進軍隴西諸將皆曰王經新敗蜀衆大盛将軍以烏合之卒繼敗軍之後當乘勝之鋒殆必不可古人有言蝮蛇螫手壮士解腕孫子曰兵有所不擊地有所不守蓋小有所失而大有所全故也不如據險自保觀釁待敝然後進救此計之得者也泰曰姜維提輕兵深入正欲與我爭鋒原野求一戰之利王經當高壁深壘挫其鋭氣今乃與戰使賊得計經既破走維若以戰克之威進兵東向據櫟陽積榖之實放兵收降招納羌胡東爭關隴傳檄四郡此我之所惡也而乃以乘勝之兵挫峻城之下鋭氣之卒屈力致命攻守埶殊客主不同兵書云脩櫓轒輼三月乃成拒堙三月而後已誠非輕軍遠入之利也今維孤軍遠僑糧榖不繼是我速進破賊之時所謂疾雷不及掩耳自然之埶也洮水帶其表維等在其内今乘高據埶臨其項領不戰必走宼不可縱圍不可乆君等何言如是遂進軍度高城嶺濳行夜至狄道東南高山上多舉烽火鳴鼓角狄道城中将士見救至皆憤踊維不意救兵卒至縁山急來攻之泰與交戰維退泰引兵揚言欲向其還路維懼九月甲辰維遁走城中将士乃得出王經歎曰糧不至旬向非救兵速至舉城屠裂覆䘮一州矣泰慰勞将士前後遣還更差軍守并治城壘還屯上邽泰每以一方有事輙以虚聲擾動天下故希簡上事驛書不過六百里大将軍昭曰陳征西沈勇能斷荷方伯之重救将䧟之城而不求益兵又希簡上事必能辦賊者也都督大将不當爾邪姜維退駐鍾提初吳大帝不立太廟以武烈嘗為長沙太守立廟於臨湘使太守奉祠而已冬十二月始作太廟於建業尊大帝為太祖資治通鑑卷第七十六
