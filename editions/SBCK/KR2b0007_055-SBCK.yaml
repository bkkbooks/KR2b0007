seq: 55
front:
  text: 穉為飲食容問國家之事穉不答更問稼穡之事穉乃答之容還以語諸人或曰孔子云可與言而不與言失人然則孺子其失人乎太原郭泰曰不然孺子之為人清潔髙亷飢不可得食寒不可得衣而為季偉飲酒食肉此為已知季偉之賢故也所以不答國事者是其智可及其愚不可及也泰愽學善談論初游雒陽時人莫識陳留苻融一見嗟異因以介於河南尹李膺膺與相見曰吾見士多矣未有如郭林宗者也其聦識通朗髙雅密愽今之華夏鮮見其儔遂與為友於是名震京師後歸鄉里衣冠諸儒送至河上車數千兩膺唯與泰同舟而濟衆賔望之以為神仙焉泰性明知人好奬訓士類周遊郡國茅容年四十餘耕於野與等輩避雨樹下衆皆夷踞相對容獨危坐愈恭泰見而異之因請寓宿旦日容殺雞為饌泰謂為已設容分半食母餘半庋置自以草蔬與客同飯泰曰卿賢哉逺矣郭林宗猶減三牲之具以供賔旅而卿如此乃我友也起對之揖勸令從學卒為盛德鉅鹿孟敏客居太原荷甑墯地不顧而去泰見而問其意對曰甑已破矣視之何益泰以為有分决與之言知其徳性因勸令遊學遂知名當世陳留申屠蟠家貧傭為􅃮工鄢陵庾乘少給事縣廷為門士泰見而竒之其後皆為名士自餘或出於屠沽卒伍因泰奬進成名者甚衆陳國童子魏昭請於泰曰經師易遇人師難遭願在左右供給灑掃泰許之泰嘗不佳命昭作粥粥成進泰泰呵之曰為長者作粥不加意敬使不可食以杯擲地昭更為粥重進泰復呵之如此者三昭姿容無變泰乃曰吾始見子之面而今而後知卿心耳遂友而善之陳留左原為郡學生犯灋見斥泰遇諸路為設酒肴以慰之謂曰昔顔涿聚梁甫之巨盜段干木晉國之大駔卒為齊之忠臣魏之名賢蘧瑗顔囘尚不能無過况其餘乎慎勿恚恨責躬而已原納其言而去或有譏泰不絶惡人者泰曰人而不仁疾之已甚亂也原後忽更懷忿結客欲報諸生其日泰在學原愧負前言因遂罷去後事露衆人咸謝服焉或問范滂日郭林宗何如人滂曰隱不違親貞不絶俗天子不得臣諸侯不得友吾不知其它泰嘗舉有道不就同郡宋冲素服其德以為自漢元以來未見其匹嘗勸之仕泰曰吾夜觀乾象晝察人事天之所廢不可支也吾將優游卒歲而已然猶周旋京師誨誘不息徐穉以書戒之曰夫大木將顛非一繩所維何為栖栖不遑寧處泰感寤曰謹拜斯言以為師表濟隂黄允以雋才知名泰見而謂曰卿髙才絶人足成偉器年過四十名聲著矣然至於此際當深自匡持不然將失之矣後司徒袁隗欲為從女求姻見允歎曰得壻如是足矣允聞而黜遣其妻妻請大㑹宗親為别因於衆中攘袂數允隱慝十五事而去允以此廢於時初允與漢中晉文經並恃其才智曜名逺近徵辟不就託言療病京師不通賔客公卿大夫遣門生旦暮問疾郎吏雜坐其門猶不得見三公所辟召者輙以詢訪之隨所臧否以為與奪符融謂李膺曰二子行業無聞以豪桀自置遂使公卿問疾王臣坐門融恐其小道破義空譽違實特宜察焉膺然之二人自是名論漸衰賔徒稍省旬日之閒慙歎逃去後並以罪廢棄陳留仇香至行純嘿鄉黨無知者年四十為蒲亭長民有陳元獨與母居母詣香告元不孝香驚曰吾近日過元舍廬落整頓耕耘以時此非惡人當是教化未至耳母守寡養孤苦身投老祭何以一旦之忿棄厯年之勤乎且母養人遺孤不能成濟若死者有知百歲之後當何以見亡者母涕泣而起香乃親到元家為陳人倫孝行譬以禍福之言元感悟卒為孝子考城令河内王奐署香主簿謂之曰聞在蒲亭陳元不罸而化之得無少鷹鸇之志邪香曰以為鷹鸇不若鸞鳯故不為也奐曰枳棘之林非鸞鳯所集百里非大賢之路乃以一月奉資香使入太學郭泰符融齎刺謁之因留宿明旦泰起下牀拜之曰君泰之師非泰之友也香學畢歸鄉里雖在宴居必正衣服妻子事之若嚴君妻子有過免冠自責妻子庭謝思過香冠妻子乃敢升堂終不見其喜怒聲色之異不應徵辟卒於家三月癸亥隕石于鄠
