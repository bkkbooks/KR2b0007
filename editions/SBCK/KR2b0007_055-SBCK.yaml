body:
  text: 夏五月己丑京師雨雹荆州刺史度尚募諸蠻夷擊艾縣賊大破之降者數萬人桂陽宿賊卜陽潘鴻等逃入深山尚窮追數百里破其三屯多獲珍寶陽鴻黨衆猶盛尚欲擊之而士卒驕富莫有鬭志尚計緩之則不戰逼之必逃亡乃宣言卜陽潘鴻作賊十年習於攻守今兵寡少未易可進當須諸郡所發悉至乃并力攻之申令軍中恣聴射獵兵士喜恱大小皆出尚乃密使所親客潛焚其營珍積皆盡獵者來還莫不泣涕尚人人慰勞深自咎責因曰卜陽等財寳足富數世諸卿但不并力耳所亡少少何足介意衆咸憤踴尚敇令秣馬蓐食明旦徑赴賊屯陽鴻等自以深固不復設備吏士乘鋭遂破平之尚出兵三年羣冦悉定封右鄉矦冬十月壬寅帝南巡庚申幸章陵戊辰幸雲夢臨漢水還幸新野時公卿貴戚車騎萬計徵求費役不可勝極䕶駕從事桂陽胡騰上言天子無外乘輿所幸即為京師臣請以荆州刺史比司􅀠校尉臣自同都官從事帝從之自是肅然莫敢妄干擾郡縣帝在南陽左右並通姦利詔書多除人為郎太尉楊秉上疏曰太微積星名為郎位入奉宿衛出牧百姓宜割不忍之恩以斷求欲之路於是詔除乃止䕶羌校尉段熲擊當煎羌破之十二月辛丑車駕還宮中常侍汝陽矦唐衡武原矦徐璜皆卒初侍中冦榮恂之曾孫也性矜潔少所與以此為權寵所疾榮從兄子尚帝妺益陽長公主帝又納其從孫女於後宮左右益忌之遂共陷以罪與宗族免歸故郡吏承望風㫖持之浸急榮恐不免詣闕自訟未至刺史張敬追劾榮以擅去邊有詔捕之榮逃竄數年㑹赦不得除積窮困乃自亡命中上書曰陛下統天理物作民父母自生齒以上咸蒙德澤而臣兄弟獨以無辜為專權之臣所見批扺青蠅之人所共構㑹令陛下忽慈母之仁發投杼之怒殘諂之吏張設機網並驅爭先若赴仇敵罸及死沒髠剔墳墓欲使嚴朝必加濫罰是以不敢觸突天威而自竄山林以俟陛下發神聖之聴啟獨覩之明救可濟之人援没溺之命不意滯怒不為春夏息淹恚不為歲時怠遂馳使郵驛布告逺近嚴文尅剝痛於霜雪逐臣者窮人途追臣者極車軌雖楚購伍員漢求季布無以過也臣遇罰以來三赦再贖無驗之罪足以蠲除而陛下疾臣愈深有司咎臣甫力止則見埽滅行則為亡虜茍生則為窮人極死則為寃鬼天廣而無以自覆地厚而無以自載蹈陸土而有沈淪之憂逺巖墻而有鎮壓之患如臣犯元惡大憝足以陳原野備刀鋸陛下當班布臣之所坐以解衆論之疑臣思入國門坐於肺石之上使三槐九棘平臣之罪而閶闔九重陷穽步設舉趾觸罘罝動行絓羅網無緣至萬乘之前永無見信之期悲夫久生亦復何聊葢忠臣殺身以解君怒孝子殞命以寧親怨故大舜不避塗廩浚井之難申生不辭姬氏讒邪之謗臣敢忘斯義不自斃以解明朝之忿哉乞以身塞責願陛下匄兄弟死命使臣一門頗有遺類以崇陛下寛饒之惠先死陳情臨章泣血帝省章愈怒遂誅榮冦氏由是衰廢八年春正月帝遣中常侍左悺之苦縣祠老子勃海王悝素行險僻多僭傲不灋北軍中候陳留史弼上封事曰臣聞帝王之於親戚愛雖隆必示之以威體雖貴必禁之以度如是和睦之道興骨肉之恩遂矣竊聞勃海王悝外聚剽輕不逞之徒内荒酒樂出入無常所與羣居皆家之棄子朝之斥臣必有羊勝伍被之變州司不敢彈糾傅相不能匡輔陛下隆於友于不忍遏絶恐遂滋蔓為害彌大乞露臣奏宣示百僚平處其灋灋决罪定乃下不忍之詔臣下固執然後少有所許如是則聖朝無傷親之譏勃海有享國之慶不然懼大獄將興矣上不聽悝果謀為不道有司請廢之詔貶為癭陶王食一縣丙申晦日有食之詔公卿校尉舉賢良方正千秋萬歲殿火中常侍矦覽兄參為益州刺史殘暴貪婪累臧億計太尉楊秉奏檻車徵參參於道自殺閱其車重三百餘兩皆金銀錦帛秉因奏曰臣案舊典宦官本在給使省闥司昏守夜而今猥受過寵執政操權附㑹者因公襃舉違忤者求事中傷居灋王公富擬國家飲食極肴膳僕妾盈紈素中常侍矦覽弟參貪殘无惡自取禍滅覽顧知釁重必有自疑之意臣愚以為不宜復見親近昔懿公刑邴􅧬之父奪閻職之妻而使二人參乘卒有竹中之難覽宜急屏斥投畀有虎若斯之人非恩所宥請免官送歸本郡書奏尚書召對秉掾屬詰之曰設官分職各有司存三公統外御史察内今越奏近官經典漢制何所依據其開公具對秉使對曰春秋傳曰除君之惡唯力是視鄧通懈慢申屠嘉召通詰責文帝從而請之漢世故事三公之職無所不統尚書不能詰帝不得已竟免覽官司􅀠校尉韓縯因奏左悺罪惡及其兄太僕南鄉矦稱請託州郡聚斂為姦賔客放縱侵犯吏民悺稱皆自殺縯又奏中常侍具瑗兄沛相恭臧罪徵詣廷尉瑗詣獄謝上還東武侯印綬詔貶為都鄉侯超及璜衡襲封者並降為鄉侯子弟分封者悉奪爵土劉普等貶為闗内矦尹勲等亦皆奪爵帝多内寵宫女至五六千人及驅役從使復兼倍於此而鄧后恃尊驕忌與帝所幸郭貴人更相譖訴癸亥廢皇后鄧氏送暴室以憂死河南尹鄧萬世虎賁中郎將鄧會皆下獄誅護羌校尉叚熲擊䍐姐羌破之三月辛巳赦天下宛陵大姓羊元羣罷北海郡臧汙狼藉郡舍溷軒有竒巧亦載之以歸河南尹李膺表按其罪元羣行賂宦官膺竟反坐單超弟遷為山陽太守以罪繫獄廷尉馮緄考致其死中官相黨共飛章誣緄以罪中常侍蘇康管霸固天下良田美業州郡不敢詰大司農劉祐移書所在依科品沒入之帝大怒與膺緄俱輸作左校夏四月甲寅安陵園寑火丁巳詔壞郡國諸淫祀特留雒陽王渙密縣卓茂二祠五月丙戌太尉楊秉薨秉為人清白寡欲嘗稱我有三不惑酒色財也秉既没所舉賢良廣陵劉瑜乃至京師上書言中官不當比肩裂土競立􅅌嗣繼體傳爵又嬖女充積冗食空宫傷生費國又第舍增多窮極竒巧掘山攻石促以嚴刑州郡官府各自考事姦情賕賂皆爲吏餌民愁鬱結起入賊黨官輙興兵誅討其罪貧困之民或有賣其首級以要酬賞父兄相代殘身妻孥相視分裂又陛下好微行近習之家私幸宦者之舍賔客市買熏灼道路因此暴縱無所不容惟陛下開廣諫道博觀前古逺佞邪之人放鄭衛之聲則政致和平德感祥風矣詔特召瑜問災咎之徵執政者欲令瑜依違其辭乃更策以它事瑜復悉心對八千餘言有切於前拜為議郎荆州兵朱蓋等叛與桂陽賊胡蘭等復攻桂陽太守任􅅌棄城走賊衆遂至數萬轉攻零陵太守下邳陳球固守拒之零陵下溼編木為城郡中惶恐掾史白球遣家避難球怒曰太守分國虎符受任一邦豈顧妻孥而沮國威乎復言者斬乃􅁌大木為弓羽矛為矢引機發之多所殺傷賊激流灌城球輒於内因地埶反决水淹賊相拒十餘日不能下時度尚徵還京師詔以尚為中郎將率步騎二萬餘人救球發諸郡兵并埶討擊大破之斬蘭等首三千餘級復以尚為荆州刺史蒼梧太守張叙為賊所執及任􅅌皆徵棄市胡蘭餘黨南走蒼梧交趾刺史張磐擊破之賊復還入荆州界度尚懼為已負乃偽上言蒼梧賊入荆州界於是徵磐下廷尉辭狀未正會赦見原磐不肯出獄方更牢持械節獄吏謂磐曰天恩曠然而君不出可乎磐曰磐備位方伯為尚所枉受罪牢獄夫事有虛實灋有是非磐實不辜赦無所除如忍以茍免永受侵辱之恥生為惡吏死為敝鬼乞傳尚詣廷尉面對曲直足明真偽尚不徵者磐埋骨牢檻終不虛出望塵受枉廷尉以其狀上詔書徵尚到廷尉辭窮受罪以先有功得原閏月甲午南宫朔平署火段熲擊破西羌進兵窮追展轉山谷間自春及秋無日不戰虜遂敗散凡斬首二萬三千級獲生口數萬人降者萬餘落封熲都鄉矦秋七月以太中大夫陳蕃為太尉蕃讓於太常胡廣議郎王暢㢮刑徒李膺帝不許暢龔之子也嘗為南陽太守疾其多貴戚豪族下車奮厲威猛大姓有犯或使吏發屋伐樹堙井夷竈功曹張敞奏記諫曰文翁召父卓茂之徒皆以温厚為政流聞後世發屋伐樹將為嚴烈雖欲懲惡難以聞逺郡為舊都矦甸之國園廟出於章陵三后生自新野自中興以來功臣將相繼世而隆愚以為懇懇用刑不如行恩孳孳求姦未若禮賢舜舉臯陶不仁者逺化人在德不在用刑暢深納其言更崇寛政教化大行八月戊辰初令郡國有田者􅅿斂税錢九月丁未京師地震冬十月司空周景免以太常劉茂為司空茂愷之子也郎中竇武融之􅀇孫也有女為貴人采女田聖有寵於帝帝將立之為后司􅀠校尉應奉上書曰母后之重興廢所因漢立飛燕􅅌嗣泯絶宜思闗雎之所求逺五禁之所忌太尉陳蕃亦以田氏卑微竇族良家爭之甚固帝不得已辛巳立竇貴人為皇后拜武為特進城門校尉封槐里侯十一月壬子黄門北寺火陳蕃數言李膺馮緄劉祐之枉請加原宥升之爵任言及反覆誠辭懇切以至流涕帝不聽應奉上疏曰夫忠賢武將國之心膂竊見左校弛刑徒馮緄劉祐李膺等誅舉邪臣肆之以灋陛下既不聽察而猥受譖訴遂令忠臣同愆元惡自春迄冬不蒙降恕遐邇觀聽為之歎息夫立政之要記功忘失是以武帝捨安國於徒中宣帝徵張敞於亡命緄前討蠻荆均吉甫之功祐數臨督司有不吐茹之節膺著威幽并遺愛度遼今三垂蠢動王旅未振乞原膺等以備不虞書奏乃悉免其刑久之李膺復拜司􅀠校尉時小黄門張讓弟朔為野王令貪殘無道畏膺威嚴逃還京師匿於兄家合柱中膺知其狀率吏卒破柱取朔付雒陽獄受辭畢即殺之讓訴寃於帝帝召膺詰以不先請便加誅之意對曰昔仲尼為魯司寇七日而誅少正卯今臣到官已積一旬私懼以稽留為愆不意獲速疾之罪誠自知釁責死不旋踵特乞留五日尅殄元惡退就鼎鑊始生之願也帝無復言顧謂讓曰此汝弟之罪司􅀠何愆乃遣出自此諸黄門常侍皆鞠躬屛氣休沐不敢出宫省帝怪問其故並叩頭泣曰畏李校尉時朝廷日亂綱紀頽弛而膺獨持風裁以聲名自髙士有被其容接者名為登龍門云徵東海相劉寛爲尚書令寛﨑之子也歴典三郡温仁多恕雖在倉卒未嘗疾言遽色吏民有過但用蒲鞭罰之示辱而已終不加苦每見父老慰以農里之言少年勉以孝悌之訓人皆悦而化之九年春正月辛卯朔日有食之詔公卿郡國舉至孝太常趙典所舉荀爽對策曰昔者聖人建天地之中而謂之禮衆禮之中昏禮為首陽性純而能施隂體順而能化以禮濟樂節宣其氣故能豐子孫之祥致老夀之福及三代之季淫而無節陽竭於上隂隔於下故周公之戒曰時亦罔或克壽傳曰􅎒趾適屨孰云其愚何與斯人追欲喪軀誠可痛也臣竊聞後宫采女五六千人從官侍使復在其外空賦不辜之民以供無用之女百姓窮困於外隂陽隔塞于内故感動和氣災異屢臻臣愚以為諸未幸御者一皆遣出使成妃合此誠國家之大福也詔拜郎中司􅀠豫州饑死者什四五至有滅户者詔徵張奐為大司農復以皇甫規代為度遼將軍規自以連在大位欲求退避數上病不見聽㑹友人喪至規越界迎之因令客密告并州刺史胡芳言規擅逺軍營當急舉奏芳曰威明欲避第仕塗故激發我耳吾當為朝廷愛才何能申此子計邪遂無所問夏四月濟隂東郡濟北平原河水清司徒許栩免五月以太常胡廣為司徒庚午上親祠老子於濯龍宫以文罽為壇飾淳金釦器設華葢之坐用郊天樂鮮卑聞張奐去招結南匈奴及烏桓同叛六月南匈奴烏桓鮮卑數道入塞冦掠縁邊九郡秋七月鮮卑復入塞誘引東羌與共盟詛於是上郡沈氐安定先零諸種共冦武威張掖縁邊大被其毒詔復以張奐為䕶匈奴中郎將以九卿秩督幽并涼三州及度遼烏桓二營兼察刺史二千石能否初帝為蠡吾矦受學於甘陵周福及即位擢福為尚書時同郡河南尹房植有名當朝鄉人為之謡曰天下規矩房伯武因師獲印周仲進二家賔客互相譏揣遂各樹朋徒漸成尤隙由是甘陵有南北部黨人之議自此始矣汝南太守宗資以范滂為功曹南陽太守成瑨以岑晊為功曹皆委心聽任使之褒善糾違肅清朝府滂尤剛勁疾惡如讎滂甥李頌素無行中常侍唐衡以屬資資用為吏滂寑而不召資遷怒捶書佐朱零零仰曰范滂清裁今日寧受笞而死滂不可違資乃止郡中中人以下莫不怨之於是二郡為謡曰汝南太守范孟博南陽宗資主畫諾南陽太守岑公孝􅀪農成瑨但坐嘯太學諸生三萬餘人郭泰及潁川賈彪為其冠與李膺陳蕃王暢更相褒重學中語曰天下模楷李元禮不畏强禦陳仲舉天下俊秀王叔茂於是中外承風競以臧否相尚自公卿以下莫不畏其貶議屣履到門宛有富賈張汎者與後宫有親又善雕鏤玩好之物頗以賂遺中官以此得顯位用埶縱横岑晊與賊曹史張牧勸成瑨收捕汎等既而遇赦瑨竟誅之并收其宗族賔客殺二百餘人後乃奏聞小黄門晉陽趙津貪横放恣為一縣巨患太原太守平原劉瓆使郡吏王允討捕亦於赦後殺之於是中常侍侯覽使張汎妻上書訟寃宦官因縁譛訴瑨瓆帝大怒徵瑨瓆皆下獄有司承㫖奏瑨瓆罪當棄市山陽太守翟超以郡人張儉為東都督郵侯覽家在防東殘暴百姓覽喪母還家大起塋冡儉舉奏覽罪而覽伺候遮􅎒章竟不上儉遂破覽冢宅藉没資財具奏其狀復不得御徐璜兄子宣爲下邳令􅁀虐尤甚嘗求故汝南太守李暠女不能得遂將吏卒至暠家載其女歸戲射殺之東海相汝南黄浮聞之收宣家屬無少長悉考之掾史以下固爭浮曰徐宣國賊今日殺之明日坐死足以瞑目矣即案宣罪棄市暴其尸於是宦官訴寃於帝帝大怒超浮並坐髠鉗輸作右校太尉陳蕃司空劉茂共諫請瑨瓆超浮等罪帝不悦有司劾奏之茂不敢復言蕃乃獨上疏曰今冦賊在外四支之疾内政不理心腹之患臣寢不能寐食不能飽實憂左右日親忠言日疎内患漸積外難方深陛下超從列侯繼承天位小家畜産百萬之資子孫尚恥愧失其先業况乃産兼天下受之先帝而欲懈怠以自輕忽乎誠不愛已不當念先帝得之勤苦邪前梁氏五侯毒徧海内天啟聖意收而戮之天下之議冀當小平明鑑未逺覆車如昨而近習之權復相扇結小黄門趙津大猾張汎等肆行貪虐姦媚左右前太原太守劉瓆南陽太守成瑨糾而戮之雖言赦後不當誅殺原其誠心在乎去惡至於陛下有何悁悁而小人道長營惑聖聽遂使天威為之發怒必加刑讁已為過甚况乃重罸令伏歐刀乎又前山陽太守翟超東海相黄浮奉公不橈疾惡如讎超没侯覽財物浮誅徐宣之罪並蒙刑坐不逢赦恕覽之從横没財已幸宣犯釁過死有餘辜昔丞相申屠嘉召責鄧通雒陽令董宣折辱公主而文帝從而請之光武加以重賞未聞二臣有專命之誅而今左右羣豎惡傷黨類妄相交構致此刑譴聞臣是言當復嗁訴陛下深宜割塞近習與政之源引納尚書朝省之士簡練清髙斥黜佞邪如是天和於上地洽於下休禎符瑞豈逺乎哉帝不納宦官由此疾蕃彌甚選舉奏議輒以中詔譴郤長史巳下多至抵罪猶以蕃名臣不敢加害平原襄楷詣闕上疏曰臣聞皇天不言以文象設教臣竊見太微天廷五帝之坐而金火罰星􅀭光其中於占天子凶又俱入房心灋無繼嗣前年冬大寒殺鳥獸害魚鼈城傍竹柏之葉有傷枯者臣聞於師曰柏傷竹枯不出二年天子當之今自春夏以來連有霜雹及大雨靁電臣作威作福刑罰急刻之所感也太原太守劉瓆南陽太守成瑨志除姦邪其所誅翦皆合人望而陛下受閹豎之譖乃逺加考逮三公上書乞哀瓆等不見採察而嚴被譴讓憂國之任將遂杜口矣臣聞殺無罪誅賢者禍及三世自陛下即位以來頻行誅罸梁寇孫鄧並見族滅其從坐者又非其數李雲上書明主所不當諱杜衆乞死諒以感悟聖朝曽無赦宥而并被殘戮天下之人咸知其寃漢興以來未有拒諫誅賢用刑太深如今者也昔文王一妻誕致十子今宫女數千未聞慶育宜脩德省刑以廣螽斯之祚案春秋以來及古帝王未有河清臣以為河者諸侯位也清者屬陽濁者屬隂河當濁而反清者隂欲為陽諸侯欲為帝也京房易傳曰河水清天下平今天垂異地吐妖人癘疫三者並時而有河清猶春秋麟不當見而見孔子書之以為異也願賜清間極盡所言書奏不省十餘日復上書曰臣聞殷紂好色妲已是出葉公好龍真龍游廷今黄門常侍天刑之人陛下愛待兼倍常寵係嗣未兆豈不為此又聞宫中立黄老浮屠之祠此道清虛貴尚無為好生惡殺省慾去奢今陛下耆欲不去殺罸過理既乖其道豈獲其祚哉浮屠不三宿桑下不欲久生恩愛精之至也其守一如此乃能成道今陛下淫女􅃩婦極天下之麗甘肥飲美單天下之味奈何欲如黄老乎書上即召入詔尚書問狀楷言古者本無宦臣武帝末數游後宫始置之耳尚書承㫖奏楷不正辭理而違背經蓻假借星宿造合私意誣上罔事請下司􅀠正楷罪灋收送雒陽獄帝以楷言雖激切然皆天文恒象之數故不誅猶司寇論刑自永平以來臣民雖有習浮屠術者而天子未之好至帝始篤好之常躬自禱祠由是其灋浸盛故楷言及之符節令汝南蔡衍議郎劉瑜表救成瑨劉瓆言甚切厲亦坐免官瑨瓆竟死獄中瑨瓆素剛直有經術知名當時故天下惜之岑晊張牧逃竄獲免晊之亡也親友競匿之賈彪獨閉門不納時人望之彪曰傳言相時而動無累後人公孝以要君致釁自遺其咎至已不能奮戈相待反可容隱之乎於是咸服其裁正彪嘗為新息長小民困貧多不養子彪嚴為其制與殺人同罪城南有盜刼害人者北有婦人殺子者彪出案驗掾吏欲引南彪怒曰賊寇害人此則常理母子相殘逆天違道遂驅車北行案致其罪城南賊聞之亦面縛自首數年閒人養子者以千數曰此賈父所生也皆名之為賈河内張成善風角推占當赦教子殺人司􅀠李膺督促收捕既而逢宥獲免膺愈懷憤疾竟案殺之成素以方􅇊交通宦官帝亦頗訊其占宦官教成弟子牢脩上書告膺等養太學游士交結諸郡生徒更相驅馳共為部黨誹訕朝廷疑亂風俗於是天子震怒班下郡國逮捕黨人布告天下使同忿疾案經三府太尉陳蕃卻之曰今所案者皆海内人譽憂國忠公之臣此等猶將十世宥也豈有罪名不章而致收掠者乎不肯平署帝愈怒遂下膺等於黄門北寺獄其辭所連及太僕潁川杜密御史中丞陳翔及陳寔范滂之徒二百餘人或逃遁不獲皆懸金䐟募使者四出相望陳寔曰吾不就獄衆無所恃乃自往請囚范滂至獄獄吏謂曰凡坐繫者皆祭臯陶滂曰臯陶古之直臣知滂無罪將理之於帝如其有罪祭之何益衆人由此亦止陳蕃復上書極諫帝諱其言切託以蕃辟召非其人策免之時黨人獄所染逮者皆天下名賢度遼將軍皇甫規自以西州豪桀恥不得與乃自上言臣前薦故大司農張奐是附黨也又臣昔論輸左校時太學生張鳯等上書訟臣是為黨人所附也臣宜坐之朝廷知而不問杜密素與李膺名行相次時人謂之李杜故同時被繫密嘗為北海相行春到髙密見鄭􅀇為鄉嗇夫知其異器即召署郡職遂遣就學卒成大儒後密去官還家每謁守令多所陳託同郡劉勝亦自蜀郡告歸鄉里閉門掃軌無所干及太守王昱謂密曰劉季陵清髙士公卿多舉之者密知昱以激已對曰劉勝位為大夫見禮上賔而知善不薦聞惡無言隱情惜已自同寒蟬此罪人也今志義力行之賢而密達之違道失節之士而密糾之使明府賞刑得中令問休􅀭不亦萬分之一乎昱慙服待之彌厚九月以光祿勲周景為太尉司空劉茂免冬十二月以光祿勲汝南宣酆爲司空以越騎校尉竇武為城門校尉武在位多辟名士清身疾惡禮賂不通妻子衣食裁充足而已得兩宫賞賜悉散與太學諸生及匄施貧民由是衆譽歸之匈奴烏桓聞張奐至皆相率還降凡二十萬口奐但誅其首惡餘皆慰納之唯鮮卑出塞去朝廷患檀石槐不能制遣使持印綬封為王欲與和親檀石槐不肯受而冦抄滋甚自分其地為三部從右北平以東至遼東接夫餘濊貊二十餘邑為東部從右北平以西至上谷十餘邑為中部從上谷以西至敦煌烏孫二十餘邑為西部各置大人領之資治通鑑卷第五十五
