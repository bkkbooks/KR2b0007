front:
  text: 資治通鑑卷第二百三十五
  hash: sha256:abb2bc930924dd4064042a0cca64d028096eda47b0ea8e500ace44ba8ec51be1
body:
  text: 臣司馬光奉勅編集唐紀五十一章執徐凡六年有奇起閼逢閹茂六月盡上徳宗神武聖文皇帝十貞元十年六月壬寅朔昭義節度使李抱真薨其子殿中侍御史緘與抱真從甥元仲經謀祕不􅀤䘮詐為抱真表求以職事授緘又詐為其父書遣禆將陳榮詣王武俊假貨財武俊怒曰吾與乃公厚善欲同奬王室耳豈與汝同惡邪聞乃公已亡乃敢不俟朝命而自立又敢告我況有求也使榮歸寄聲質責緘昭義步軍都虞􅀱王延貴汝州梁人也素以義勇聞上知抱真已薨遣中使第五守進往觀變且以軍事委王延貴守進至上黨緘稱抱真有疾不能見三日緘乃嚴兵詣守進守進謂之曰朝廷已知相公捐館令王延貴權知軍事侍御宜􅀤喪行服緘愕然出謂諸將曰朝廷不許緘掌事諸君意如何莫對緘懼乃歸􅀤喪以使印及管鑰授監軍守進召延貴宣口詔令視事趣緘赴東都元仲經出走延貴悉歸罪於仲經捕斬之詔以延貴權知昭義軍事雲南王異牟尋遣其弟湊羅棟獻地圖土貢及吐蕃所給金印請復號南詔癸丑以祠部郎中袁滋爲冊南詔使賜銀窠金印文曰貞元冊南詔印滋至其國異牟尋北靣跪受冊印稽首再拜因與使者宴出􅀇宗所賜銀平脱馬頭盤二以示滋又指老笛工歌女曰皇帝所賜龜兹樂惟二人在耳滋曰南詔當深思祖考子子孫孫盡忠於唐異牟尋拜曰敢不謹承使者之命賜義武節度使張昇雲名茂昭御史中丞穆贊按度支吏贓罪裴延齡欲出之贊不從延齡􅉲之貶饒州别駕朝士畏延齡側目贊寧之子也韋臯奏破吐蕃於峨和城秋七月壬申朔以王延貴為昭義留後賜名䖍休昭義行軍司馬攝洺州刺史元誼聞䖍休為留後意不平表請以磁邢洺别為一鎮昭義精兵多在山東誼厚賚以悅之上屢遣中使諭之不從臨洺守將夏侯仲宣以城歸䖍休䖍休遣磁州刺史馬正卿督禆將石定蕃等將兵五千擊洺州定蕃帥其衆二千叛歸誼正卿退還詔以誼為饒州刺史誼不行䖍休自將兵攻之引洺水以灌城黄少卿陷欽横潯貴等州攻孫公器於邕州九月王䖍休破元誼兵進拔雞澤裴延齡奏稱官吏太多自今缺員請且勿補收其俸以實府庫上欲修神龍寺須五十尺松不可得延齡曰臣近見同州一谷木數千株皆可八十尺上曰開元天寶間求美材於近畿猶不可得今安得有之對曰天生珍材固待聖君乃出開元天寶何從得之延齡奏左藏庫司多有失落近因檢閲使置薄書乃於糞土之中得銀十三萬兩其匹段雜貨百萬有餘此皆已弃之物即是羨餘悉應移入雜庫以供别勅支用太府少卿韋少華不伏抗表稱此皆每月申奏見在之物請加推驗執政請令三司詳覆上不許亦不罪少華延齡每奏對恣為詭譎皆衆所不敢言亦未嘗聞者延齡處之不疑上亦頗知其誕妄但以其好詆毁人冀聞外事故親厚之羣臣畏延齡有寵莫敢言惟鹽鐵轉運使張滂京兆尹李充司農卿李銛以職事相闗時證其妄而陸䞇獨以身當之日陳其不可用十一月壬申䞇上書極陳延齡姧詐數其罪惡其畧曰延齡以聚斂為長䇿以詭妄為嘉謀以掊克斂怨為匪躬以靖譛服讒為盡節揔典籍之所惡以為智術冒聖哲之所戒以為行能可謂堯代之共工魯邦之少夘也跡其姦蠧日長月滋隂祕者固未盡彰敗露者猶難悉數又曰陛下若意其負謗則誠宜亟為辨明陛下若知其無良又安可曲加容掩又曰陛下姑欲保持曾無詰問延齡謂能蔽惑不復懼思移東就西便為課績取此適彼遂號羨餘愚弄朝廷有同兒戲又曰矯詭之能誣罔之辭遇事輒行應口便􅀤靡日不有靡時不為又難以備陳也又曰昔趙高指鹿為馬臣謂鹿之與馬物類猶同豈若延齡掩有為無指無為有又曰延齡凶妄流布寰區上自公卿近臣下逮輿臺賤品諠諠談議億萬為徒能以上言其人有幾臣以卑鄙任當台衡情激于衷雖欲罷而不能自黙也書奏上不悦待延齡益厚十二月王䖍休乗冰合度壕急攻洺州元誼出兵擊之䖍休不勝而返日暮冰解士卒死者太半中書侍郎同平章事陸䞇以上知待之厚事有不可常力爭之所親或規其太鋭䞇曰吾上不負天子下不負所學它無所恤裴延齡日短䞇於上趙憬之入相也䞇實引之既而有憾於贄密以䞇所譏彈延齡事告延齡故延齡益得以為計上由是信延齡而不直贄贄與憬約至上前極論延齡姦邪上怒形於色憬黙而無言壬戌贄罷為太子賓客初勃海文王欽茂卒子宏臨早死族弟元義立元義猜虐國人殺之立宏臨之子華璵是為成王改元中興華璵卒復立欽茂少子嵩鄰是為康王改元正歴十一年春二月乙巳冊拜嵩鄰為忽汗州都督勃海王陸贄既罷相裴延齡因􅉲京兆尹李充衛尉卿張滂前司農卿李銛黨於䞇會旱延齡奏言贄等失勢怨望言於衆曰天下旱百姓且流亡度支多欠諸軍芻糧軍中人馬無所食其事奈何以動搖衆心其意非止欲中傷臣而已後數日上獵苑中適有神䇿軍士訴云度支不給馬芻上意延齡言為信遽還宫夏四月壬戌貶䞇為忠州别駕充為涪州長史滂為汀州長史銛為邵州長史初陽城自處士徵為諌議大夫拜官不辭未至京師人皆想望風采曰城必諌諍死職下及至諸諌官紛紛言事細碎天子益厭苦之而城方與二弟及客日夜痛飲人莫能窺其際皆以為虚得名耳前進士河南韓愈作爭臣論以譏之城亦不以屑意有欲造城而問者城揣知其意輒强與酒客或時先醉仆席上城或時先醉卧客懐中不能聽客語及陸䞇等坐貶上怒未解中外惴恐以為罪且不測無敢救者城聞而起曰不可令天子信用姦臣殺無罪人即帥拾遺王仲舒歸登右補闕熊執易崔邠等守延英門上䟽論延齡姦佞贄等無罪上大怒欲加城等罪太子為之營救上意乃解令宰相諭遣之於是金吾將軍張萬福聞諌官伏閣諌趨往至延英門大言賀曰朝廷有直臣天下必太平矣遂遍拜城與仲舒等已而連呼太平萬嵗太平萬嵗萬福武人年八十餘自此名重天下登崇敬之子也時朝夕相延齡陽城曰脱以延齡為相城當取白麻壊之慟哭於廷有李繁者泌之子也城盡疏延齡過惡欲宻論之以繁故人子使之繕寫繁徑以告延齡延齡先詣上一一自解疏入上以為妄不之省丙寅幽州奏破奚王啜利等六萬餘衆回鶻奉誠可汗卒無子國人立其相骨咄祿為可汗骨咄祿本姓􅎤跌氏辯慧有勇略自天親時典兵馬用事大臣諸酋長皆畏服之既為可汗冒姓藥羅葛氏遣使來告喪自天親可汗以上子孫幼穉者皆内之闕庭五月丁丑以宣武留後李萬榮昭義左司馬領留後王䖍休皆為節度使甲申河東節度使李自良薨戊子監軍王定遠奏請以行軍司馬李說為留後説神通之五世孫也庚寅遣秘書監張薦冊拜回鶻可汗骨咄祿為騰里邏羽錄没宻施合胡祿毗伽懐信可汗癸巳以李説為河東留後知府事説深徳王定遠請鑄監軍印從之監軍有印自定遠始秋七月丙寅朔陽城改國子司業坐言裴延齡故也王定遠自恃有功於李說專河東軍政易置諸將説不能盡從由是有隙定遠以私怒拉殺大將彭令茵埋馬矢中將士皆憤怒説奏其狀定遠聞之直詣説拔刀刺之説走免定逺召諸將以箱貯敕及告身二十餘通示之曰有敕令説詣京師以行軍司馬李景略為留後諸君皆遷官衆皆拜大將馬良輔竊視箱中皆定遠告身及所受敕也乃麾衆曰敕告皆偽不可受也定遠走登乾陽樓呼其麾下莫應踰城而墜為枯枿所傷而死八月辛亥司徒兼侍中北平莊武王馬燧薨閏月戊辰元誼以洺州詐降王䖍休遣裨將將二千人入城誼皆殺之九月丁巳加韋臯雲南安撫使横海節度使程懐直不恤士卒獵於野數日不歸懐直從父兄懐信為兵馬使因衆心之怨閉門拒之懐直奔歸京師冬十月丁丑以懐信為横海留後南詔攻吐蕃昆明城取之又虜施順二蠻王十二年春正月庚子元誼石定蕃等帥洺州兵五千人及其家人萬餘口奔魏州上釋不問命田緒安撫之乙丑以渾瑊王武俊並兼中書令己巳加嚴震田緒劉濟韋臯並同平章事天下節度觀察使悉加檢校官以悦其意三月甲午韋臯奏降西南蠻高萬唐等二萬餘口乙巳以閑廄宫苑使李齊運為禮部尚書户部侍郎裴延齡為户部尚書使職如故齊運無才能學術専以柔佞得幸於上每宰相對罷則齊運次進決其議或病卧家上欲有所除授往往遣中使就問之丙辰韶王暹薨魏博節度使田緒尚嘉城公主有庶子三人季安最幼公主子之以為副大使夏四月庚午緒暴薨左右匿之使季安領軍事年十五乙亥􅀤喪推季安為留後庚辰上生日故事命沙門道士講論於麟徳殿至是始命以儒士參之四門博士韋渠牟嘲談辯給上悦之旬日遷右補闕始有寵五月丙申邠寧節度使張獻甫暴薨監軍楊明義請都虞候楊朝晟權知留後丙辰以朝晟為邠寧節度使六月乙丑以監句當左神䇿竇文場監句當右神䇿霍仙鳴皆為護軍中尉監左神威軍使張尚進監右神威軍使焦希望皆為中䕶軍初上置六統軍視六尚書以處節度使罷鎮者相承用麻紙寫制至是文􅂣諷宰相比統軍降麻翰林學士鄭絪奏言故事惟封王命相用白麻今以命中尉不識陛下特以寵文􅂣邪遂為著令也上乃謂文􅂣曰武徳貞觀時中人不過員外將軍同正耳衣緋者無幾自輔國以來墮壊制度朕今用爾不謂無私若復以麻制宣告天下必謂爾脅我為之矣文􅂣叩頭謝遂焚其麻命并統軍自今皆中書降敕明日上謂絪曰宰相不能違拒中人朕得卿言方寤耳是時竇霍勢傾中外藩鎮將帥多出神䇿軍臺省清要亦有出其門者矣宣武節度使李萬榮病風昏不知事霍仙鳴薦宣武押牙劉沐可委軍政辛巳以沐為行軍司馬宣歙觀察使劉贊卒初上以奉天窘乏故還宫以來尤專意聚歛藩鎮多以進奉市恩皆云稅外方圓亦云用度羨餘其實或割留常賦或増歛百姓或減刻吏祿或販鬻蔬果往往私自入所進纔什一二李兼在江西有月進韋臯在西川有日進其後常州刺史濟源裴肅以進奉還浙東觀察使刺史進奉自肅始及劉贊卒判官嚴綬掌留務竭府庫以進奉徵為刑部員外郎幕僚進奉自綬始綬蜀人也李萬榮疾病其子迺為兵馬使甲申廼集諸將責李湛伊婁説張丕以不憂軍事斥之外縣上遣中使第五守進至汴州宣慰始畢軍士十餘人呼曰兵馬使勤勞無賞劉沐何人為行軍司馬沐懼陽中風舁出軍士又呼曰倉官劉叔何給納有姦殺而食之又欲斫守進迺止之迺又殺伊婁説張丕都虞􅇋匡城鄧惟恭與萬榮鄉里相善萬榮常委以腹心迺亦倚之至是惟恭與監軍俱文珍謀執迺送京師秋七月乙未以東都留守董晉同平章事兼宣武節度使以萬榮為太子少保貶迺䖍州司馬丙申萬榮薨鄧惟恭既執李迺遂權軍事自謂當代萬榮不遣人迎董晉晉既受詔即與傔從十餘人赴鎮不用兵衛至鄭州迎者不至鄭州人為晉懼或勸晉且留觀變有自汴州出者言於晉曰不可入晉不對遂行惟恭以晉來之速不及謀晉去城十餘里惟恭乃帥諸將出迎晉命惟恭勿下馬氣色甚和惟恭差自安既入仍委惟恭以軍政初劉􅀇佐増汴州兵至十萬遇之厚李萬榮鄧惟恭每加厚焉士卒驕不能禦乃置腹心之士幕於公庭廡下挾弓執劒以備之時勞賜酒肉晉至之明日悉罷之戊戌韓王迥薨壬子詔以宣武將士鄧惟恭等有執送李迺功各遷官賜錢其為迺所脅邀逼制使者皆勿問八月乙未朔日有食之己巳以田季安為魏博節度使丙子以汝州刺史陸長源為宣武行軍司馬朝議以董晉柔仁多可恐不能集事故以長源佐之長源性剛刻多更張舊事晉初皆許之案成則命且罷由是軍中得安丙戌門下侍郎同平章事趙憬薨初上不欲生代節度使常自擇行軍司馬以為儲帥李景略為河東行軍司馬李説忌之回鶻梅錄入貢過太原説與之宴梅錄爭坐次説不能遏景略叱之梅錄識其聲趨前拜之曰非豐州李端公邪又拜遂就下坐座中皆屬目於景略説益不平乃厚賂中尉竇文􅂣使去之㑹有傳回鶻將入寇者上憂之以豐州當虜衝擇可守者文場因薦景略九月甲午以景略為豐州都防禦使窮邊氣寒土瘠民貧景略以勤儉帥衆二嵗之後儲備完實雄於北邊盧邁得風疾庚子賈耽私忌宰相絶班上遣中使召主書承旨丙午户部尚書判度支裴延齡卒中外相賀上獨悼惜之壬子吐蕃寇慶州冬十月甲戌以諌議大夫崔損給事中趙宗儒並同平章事損􅀇暐之弟孫也嘗為裴延齡所薦故用之十一月乙未以右補闕韋渠牟為左諌議大夫上自陸贄貶官尤不任宰相自御史刺史縣令以上皆自選用中書行文書而已然深居禁中所取信者裴延齡李齊運户部郎中王紹司農卿李實翰林學士韋執誼及渠牟皆權傾宰相趨附盈門紹謹密無損益實狡險掊克執誼以文章與上唱和年二十餘自右拾遺召入翰林渠牟形神恌躁尤為上所親狎上每對執政漏不過三刻渠牟奏事率至六刻語笑欵狎往往聞外所薦引咸不次遷擢率皆庸鄙之士宣武都虞候鄧惟恭内不自安潜結將士二百餘人謀作亂事覺董晉悉捕斬其黨械惟恭送京師己未詔免死汀州安置十三年春正月壬寅吐蕃遣使請和親上以吐蕃數負約不許上以方渠合道木波皆吐蕃要路欲城之使問邠寧節度使楊朝晟須幾何兵對曰邠寧兵足以城之不煩它道上復使問之曰曏城鹽州用兵七萬僅能集事今三城尤逼虜境兵當倍之事更相反何也對曰城鹽州之衆虜皆知之今􅀤本鎮兵不旬日至塞下出其不意而城之虜謂吾衆亦不減七萬其衆未集不敢輕來犯我不過三旬吾城已畢留兵戍之虜雖至無能為也城旁草盡不能久留虜退則運芻糧以實之此萬全之䇿也若大集諸道兵踰月始至虜亦集衆而來與我爭戰勝負未可知何暇築城哉上從之二月朝晟分軍為三各築一城軍吏曰方渠無井不可屯軍判官孟子周曰方渠承平之時居人成市無井何以聚人乎命浚眢井果得甘泉三月三城成夏四月庚申楊朝晟軍還至馬嶺吐蕃始出兵追之相拒數日而去朝晟遂城馬嶺而還開地三百里皆如其素庚午義成節度使李復薨庚辰以陜虢觀察使姚南仲為義成節度使監軍薛盈珍方大會聞之言曰姚大夫書生豈將才也判官盧坦私謂人曰姚大夫外雖柔中甚剛監軍侵之必不受軍府之禍自此始矣吾恐為所留遂自它道潛去南仲果以牒請之不遇得免既而盈珍與南仲有隙幕府多以罪貶有死者吐蕃贊普乞立贊卒子足之煎立六月壬午韋臯奏吐蕃入寇嶲州刺史曹高仕破之於臺登城下光祿少卿同正張茂宗茂昭之弟也許尚義章公主未成昏茂宗母卒遺表請終嘉禮上許之秋八月癸酉起復茂宗左衛將軍同正左拾遺義興蔣乂上疏諌以為兵革之急古有墨衰從事者未聞駙馬起復尚主也上遣中使諭之不止乃特召對於延英謂曰人閒多借吉成昬者卿何執此之堅對曰昬姻喪紀人之大倫吉凶不可凟也委巷之家不知禮教其女孤貧無恃或有借吉從人未聞男子借吉娶婦者也大常博士韋彤裴堪復上䟽諌上不悦命趣下嫁之期辛巳成昬九月己丑中書侍郎同平章事盧邁以病罷為太子賓客冬十月淮西節度使呉少誠擅開刀溝入汝上遣中使諭止之不從命兵部郎中盧羣往詰之少誠曰開此水大利於人羣曰君令臣行雖利人臣敢專乎公承天子之令而不從何以使下吏從公之令乎少誠遽為之罷役十二月徐州節度使張建封入朝先是宫中市外閒物令官吏主之隨給其直比嵗以宦者為使謂之宫市抑買人物稍不如本估其後不復行文書置白望數百人於兩市及要閙坊曲閲人所賣物但稱宫市則歛手付與真偽不復可辨無敢問所從來及論價之高下者率用直百錢物買人直數千物多以紅紫染故衣敗繒尺寸裂而給之仍索進奉門户及脚價錢人將物詣市至有空手而歸者名為宫市其實奪之商賈有良貨皆深匿之每敕使出雖沽漿賣餅者皆撤業閉門嘗有農夫以驢負柴宦者稱宫市取之與絹數尺又就索門户仍邀驢送柴至内農夫啼泣以所得絹與之不肯受曰須得爾驢農夫曰我有父母妻子待此然後食今以柴與汝不取直而歸汝尚不肯我有死而已遂敺宦者街吏擒以聞詔黜宦者賜農夫絹十匹然宫市亦不為之改諌官御史數奏䟽諌不聽建封入朝具奏之上頗嘉納以問户部侍郎判度支蘇弁弁希宦者意對曰京師游手萬家無土著生業仰宫市取給上信之故凡言宫市者皆不聽十四年春二月乙亥名申光蔡軍曰彰義夏閏五月庚申以神䇿行營節度使韓全義為夏綏銀宥節度使全義時屯長武城詔帥其衆赴鎮士卒以夏州磧鹵又盛夏不樂徙居辛酉軍亂殺大將王栖巖等全義踰城走都虞候高崇文誅首亂者衆然後定崇文幽州人也丙子以崇文為長武城都知兵馬使不降敕令中使口宣授之秋七月壬申給事中同平章事趙宗儒罷為右庶子以工部侍郎鄭餘慶為中書侍郎同平章事八月初置左右神䇿統軍時禁軍戍邊者稟賜優厚諸將多請遙隸神䇿軍稱行營皆統於中尉其軍遂至十五萬人京兆尹吴湊屢言宫市之弊請委之府縣䆠者言湊屢奏宫市皆右金吾都知趙洽田秀嵓之謀也丙午洽秀嵓坐流天徳軍九月丙申以陜虢觀察使于頔為山南東道節度使丁夘􅂎王倕薨彰義節度使呉少誠遣兵掠壽州霍山殺鎮遏使謝詳侵地二十餘里置兵鎮守太學生薛約師事司業陽城坐言事徙連州城送之郊外上以城黨罪人己巳左遷城道州刺史城治民如治家州之賦税不登觀察使數加誚讓城自署其考曰撫字心勞徵科政拙考下下觀察使遣判官督其賦至州城先自囚於獄判官大驚馳入謁城於獄曰使君何罪某奉命來候安否耳留一二日未去城不復歸館門外有故門扇横地城晝夜坐卧其上判官不自安辭去其後又遣他判官往按之他判官載妻子行中道逸去冬十月丁酉通王諶薨庚子夏州節度使韓全義奏破吐蕃於鹽州西北明州鎮將栗鍠殺刺史盧雲誘山越作亂攻䧟浙東州縣十五年春正月甲寅雅王逸薨二月丁丑宣武節度使董晉薨乙酉以其行軍司馬陸長源為節度使長源性刻急恃才傲物判官孟叔度輕佻􅁋縱好慢侮將士軍中皆惡之董晉薨長源知留後􅀭言曰將士弛慢日久當以法齊之耳衆皆懼或勸之發財以勞軍長源曰我豈效河北賊以錢買健兒求節􅃏邪故事主帥薨給軍士布以制服長源命給其直叔度高鹽直下布直人不過得鹽三二斤軍中怨怒長源亦不為之備是日軍士作亂殺長源叔度臠食之立盡監軍俱文珍以宋州刺史劉逸準久為宣武大將得衆心密書召之逸準引兵徑入汴州亂衆乃定以常州刺史李錡為浙西觀察使諸道鹽鐵轉運使錡國貞之子也閑廄宫苑使李齊運受其賂數十萬薦之於上故用之錡刻剝以事進奉上由是悦之庚辰浙東觀察使裴肅擒栗鍠於台州送京師斬之己丑以劉逸準為宣武節度使賜名全諒三月甲寅呉少誠遣兵襲唐州殺監軍邵國朝鎮遏使張嘉瑜掠百姓千餘人而去戊午昭義節度使王䖍休薨戊辰以河陽懐州節度使李元淳為昭義節度使夏四月癸未以安州剌史伊慎爲安黃等州節度使癸巳山南西道節度使嚴震薨南詔異牟尋遣使與韋臯約共擊吐蕃臯以兵糧未集請俟它年山南西道都虞候嚴礪謟事嚴震震病使知留後遺表薦之秋七月乙巳以礪為山南西道節度使八月丙申陳許節度使曲環薨乙未呉少誠遣兵掠臨潁陳州刺史上官涚知陳許留後遣大將王令忠將兵三千救之皆為少誠所虜丙午以涚為陳許節度使少誠遂圍許州涚欲弃城走營田副使劉昌裔止之曰城中兵足以辦賊但閉城勿與戰不過數日賊氣自衰吾以全制其弊蔑不克矣少誠晝夜急攻昌裔募勇士千人鑿城出擊少誠大破之城由是全昌裔兖州人也少誠又寇西華陳許大將孟元陽拒却之陳許都知兵馬使安國寧與上官涚不叶謀翻城應少誠劉昌裔以計斬之召其麾下人給二縑伏兵要巷見持縑者悉斬之無得脱者庚辰宣武節度使劉全諒薨軍中思劉􅀇佐之恩推其甥都知兵馬使匡城韓􅀪為留後􅀪將兵識其材鄙勇怯指顧必堪其事丙辰詔削奪呉少誠官爵令諸道進兵討之辛酉以韓􅀪為宣武節度使先是少誠遣使與劉全諒約共攻陳許以陳州歸宣武使者數輩猶在館􅀪悉驅出斬之選卒三千會諸軍擊少誠於許下少誠由是失勢冬十月乙丑邕王謜薨太子之子也上愛而子之及薨諡曰文敬太子山南東道節度使于頔安黄節度使伊慎知壽州事王宗與上官涗韓􅀪進擊呉少誠屢破之十一月壬子于頔奏拔呉房朗山十二月辛未中書令咸寧王渾瑊薨于河中瑊性謙謹雖位窮將相無自矜大之色毎貢物必躬自閲視受賜如在上前由是為上所親愛上還自興元雖一州一鎮有兵者皆務姑息瑊每奏事不過輒私喜曰上不疑我故能以功名終六州党項自永泰以來居于石州永安鎮將阿史那思暕侵漁不已党項部落悉逃奔河西諸軍討呉少誠者既無統帥每出兵人自規利進退不壹乙未諸軍自潰於小溵水委弃器械資糧皆為少誠所有於是始議置招討使吐蕃衆五萬分擊南詔及嶲州異牟尋與韋臯各􅀤兵禦之吐蕃無功而還十六年春正月乙巳恒冀易定陳許河陽四軍與呉少誠戰皆不利而退夏綏節度使韓全義本出神䇿軍中尉竇文􅂣愛厚之薦於上使統諸軍討呉少誠二月乙酉以全義為蔡州四靣行營招討使十七道兵皆受全義節度宣武軍自劉􅀇佐薨凡五作亂士卒益驕縱輕其主帥韓􅀪視事數月皆知其主名有郎將劉鍔常為唱首三月􅀪陳兵牙門召鍔及其黨三百人數之以數預於亂自以為功悉斬之血流丹道自是至􅀪入朝二十一年士卒無一人敢讙呼於城郭者義成監軍薛盈珍為上所寵信欲奪節度使姚南仲軍政南仲不從由是有隙盈珍􅉲其幕僚馬揔貶泉州别駕福建觀察使栁冕謀害揔以媚盈珍以幕僚寶鼎薛戎攝泉州事使按致揔罪戎為辨證其無辜冕怒召戎囚之使守卒恣為侵辱如此累月徐誘之使誣揔戎終不從揔由是獲免冕芳之子也盈珍屢毁南仲於上上疑之盈珍乃遣小吏程務盈乘驛誣奏南仲罪牙將曹文洽亦奏事長安知之晨夜兼行追及務盈於長樂驛與之同宿中夜殺之沉盈珍表於厠中自作表雪南仲之寃且首專殺之罪亦作狀白南仲遂自殺明旦門不啟驛吏排之入得表狀於文洽尸旁上聞而異之徵盈珍入朝南仲恐盈珍讒之益深亦請入朝夏四月丙子南仲至京師待罪於金吾詔釋之召見上問盈珍擾卿邪對曰盈珍不擾臣但亂陛下法耳且天下如盈珍輩何可勝數雖使羊杜復生亦不能行愷悌之政成攻取之功也上黙然竟不罪盈珍乃使掌機密盈珍又言於上曰南仲惡政皆幕僚馬少微贊之也詔貶少微江南官遣中使送之推墜江中而死黔中觀察使韋士宗政令苛刻丁亥牙將􅀓近等逐之出奔施州新羅王敬則卒庚寅冊命其嫡孫俊邕為新羅王韓全義素無勇畧專以巧佞貨賂結宦官得為大帥每議軍事宦官為監軍者數十人坐帳中爭論紛然莫能決而罷天漸暑士卒久屯沮洳之地多病疫全義不存撫人有離心五月庚戌與呉少誠將呉秀呉少陽等戰于溵南廣利原鋒鏑未交諸軍大潰秀等乗之全義退保五樓少陽滄州清池人也山南東道節度使于頔因討呉少誠大募戰士繕甲厲兵聚斂貨財恣行誅殺有據漢南之志專以慢上陵下為事上方姑息藩鎮知其所為無如之何頔誣鄧州刺史元洪贓罪朝廷不得已流洪端州遣中使護送至􅀥陽頔遣兵劫取歸襄州中使奔歸頔表洪責太重上復以洪為吉州長史乃遣之又怒判官薛正倫奏貶峽州長史比敕下頔怒已解復奏留為判官上一一從之徐泗濠節度使張建封鎮彭城十餘年軍府稱治病篤累表請除代人辛亥以蘇州刺史韋夏卿為徐泗濠行軍司馬敕下建封已薨夏卿執誼之從祖兄也徐州判官鄭通誠知留後恐軍士為變會浙西兵過彭城通誠欲引入城為援軍士怒壬子數千人斧庫門出甲兵擐執之圍牙城刼建封子前虢州叅軍愔令知軍府事殺通誠及大將段伯熊等數人械繫監軍上聞之以吏部員外郎李鄘為徐州宣慰使鄘直抵其軍召將士宣朝旨諭以禍福脱監軍械使復其位凶黨不敢犯愔上表稱兵馬留後鄘以非朝命不受使削去然後受之以歸靈州破吐蕃於烏蘭橋丙寅韋士宗復入黔中湖南觀察使河中吕渭奏􅀤永州刺史陽履􅂍賄履表稱所斂物皆備進奉上召詣長安丁丑命三司使鞫之詰其物費用所歸履對曰己市馬進之矣又詰馬主為誰馬齒幾何對曰馬主東西南北之人今不知所之按禮齒路馬有誅故不知其齒所對率􅀋此上悅其進奉之言釋之但免官而已丙戌加淄青節度使李師古同平章事徐州亂兵為張愔表求旄節朝廷不許加淮南節度使杜佑同平章事兼徐泗濠節度使使討之佑大具舟艦遣牙將孟準為前鋒濟淮而敗佑不敢進泗州刺史張伾出兵攻埇橋大敗而還朝廷不得已除愔徐州團練使以伾為泗州留後濠州刺史杜兼為濠州留後仍加佑兼濠泗觀察使兼正倫五世孫也性狡險彊忍建封之疾亟也兼隂圖代之自濠州疾驅至府幕僚李藩與同列入問建封疾出見之泣曰僕射疾危如此公宜在州防遏今弃州此來欲何為也宜速去不然當奏之兼錯愕出不意遂徑歸建封薨藩歸楊州兼誣奏藩於建封之薨搖動軍情上大怒宻詔杜佑使殺之佑素重藩懐詔旬日不忍􅀤因引藩論佛經曰佛言果報有諸藩曰有之佑曰審如此君宜遇事無恐因出詔示藩藩神色不變曰此真報也佑曰君慎勿出口吾已宻論用百口保君矣上猶疑之召藩詣長安望見藩儀度安雅乃曰此豈為惡者邪即除祕書􅀰新羅王俊邕卒國人立其子重熙秋七月吴少誠進擊韓全義於五樓諸軍復大敗全義夜遁保溵水縣城盧龍節度使劉濟弟源為􅃰州刺史不受濟命濟引兵擊擒之九月癸卯義成節度使盧羣薨甲戌以尚書左丞李元素代之賈耽曰凡就軍中除節度使必有愛憎向背喜懼者相半故衆心多不安自今願陛下只自朝廷除人庶無它變上以為然中書侍郎同平章事鄭餘慶與户部侍郎判度支于䪹素善䪹所奏事餘慶多􅂆上從之上以為朋比庚戌貶餘慶郴州司馬䪹泉州司户䪹頔之兄也癸丑吴少誠進逼溵水數里置營韓全義復帥諸軍退保陳州宣武河陽兵私歸本道獨陳許將孟元陽神䇿將蘇光榮帥所部留軍溵水全義以詐誘昭義將夏侯仲宣義成將時昂河陽將權文變河中將郭湘等斬之欲以威衆全義至陳州刺史劉昌裔登城謂之曰天子命公討蔡州今乃來此昌裔不敢納請舍于城外既而昌裔齎牛酒入全義營犒師全義驚喜心服之己未孟元陽等與少誠戰殺二千餘人庚申以太常卿齊抗為中書舍人同平章事癸亥以張愔為徐州留後冬十月呉少誠引兵還蔡州先是韋臯聞諸軍討少誠無功上言請以渾瑊賈耽為元帥統諸軍若重煩元老則臣請以精鋭萬人下巴峽出荆楚以翦凶逆不然因其請罪而赦之罷兩河諸軍以休息公私亦䇿之次也若少誠一旦罪盈惡稔為麾下所殺則又當以其爵位授之是除一少誠生一少誠為患無窮矣賈耽言於上曰賊意蓋亦望恩貸恐須開其生路上然之會少誠致書幣於監官軍者求昭洗監軍奏之戊子詔赦少誠及彰義將士復其官爵己丑河東節度使李說薨甲午以其行軍司馬鄭儋為節度使上擇可以代儋者以刑部員外郎嚴綬嘗以幕僚進奉記其名即用為河東行軍司馬吐蕃數為韋臯所敗是嵗其曩貢臘城等九節度嬰籠官馬定徳帥其部落來降定徳有智略吐蕃諸將行兵皆稟其謀䇿常乘驛計事至是以兵數不利恐獲罪遂來奔資治通鑑卷第二百三十五
