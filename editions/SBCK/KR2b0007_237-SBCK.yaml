front:
  text: 資治通鑑卷第二百三十七
  hash: sha256:3f9095a18e84ce6ea7eac3d3c703fc22164062b4384e78a4f1d041d59e72dd6a
body:
  text: 臣司馬光奉勑編集唐紀五十三奮若六月凡三年有竒起柔兆閹茂盡屠維赤憲宗昭文章武大聖至神孝皇帝上之上元和元年春正月丙寅朔上帥羣臣詣興慶宫上上皇尊號丁夘赦天下改元辛未以鄂岳觀察使韓臯為奉義節度使癸酉以奉義留後伊宥為安州刺史兼安州留後宥慎之子也壬午加成德節度使王士真同平章事甲申上皇崩于興慶宫劉闢既得旌節志益驕求兼領三川上不許闢遂發兵圍東川節度使李康於梓州欲以同幕盧文若爲東川節度使推官莆田林藴力諌闢舉兵闢怒械繫於獄引出將斬之隂戒行刑者使不殺但數礪刃於其頸欲使屈服而赦之藴叱之曰豎子當斬即斬我頸豈汝砥石邪闢顧左右曰真忠烈之士也乃黜為唐昌尉上欲討闢而重於用兵公卿議者亦以為蜀險固難取杜黄裳獨曰闢狂戇書生取之如拾芥耳臣知神䇿軍使髙崇文勇略可用願陛下專以軍事委之勿置監軍闢必可擒上從之翰林學士李吉甫亦勸上討蜀上由是器之戊子命左神策行營節度使髙崇文將歩騎五千為前軍神䇿京西行營兵馬使李元弈將歩騎二千爲次軍與山南西道節度使嚴礪同討闢時宿將名位素重者甚衆皆自謂當征蜀之選及詔用崇文皆大驚上與杜黄裳論及藩鎮黄裳曰德宗自經憂患務為姑息不生除節帥有物故者先遣中使察軍情所與則授之中使或私受大將賂歸而譽之即降旄鉞未嘗有出朝廷之意者陛下必欲振舉綱紀宜稍以法度裁制藩鎮然後天下可得而理也上深以為然於是始用兵討蜀以至威行兩河皆黄裳啓之也髙崇文屯長武城練卒五千常如冦至夘時受詔辰時即行器械糗糧一無所闕甲午崇文出斜谷李元奕出駱谷同趣梓州崇文軍至興元軍士有食於逆旅折人􅍰筯者崇文斬之以徇劉闢䧟梓州執李康二月嚴礪㧞劒州斬其刺史文德昭奚王誨落可入朝丁酉誨落可為饒樂郡王遣歸癸丑加魏博節度使田季安同平章事戊午上與宰相論自古帝王或勤勞庻政或端拱無為互有得失何為而可杜黄裳對曰王者上承天地宗廟下撫百姓四夷夙夜憂勤固不可自暇自逸然上下有分紀綱有叙茍慎選天下賢才而委任之有功則賞有罪則刑選用以公賞刑以信則誰不盡力何求不獲哉明主勞於求人而逸於任人此虞舜所以能無為而治者也至於簿書獄市煩細之事各有司存非人主所宜親也昔秦始皇以衡石程書魏明帝自按行尚書事隋文帝衛士傳飱皆無補於當時取譏於後來其耳目形神非不勤且勞也所務非其道也夫人主患不推誠人臣患不竭忠茍上疑其下下欺其上將以求理不亦難乎上深然其言三月丙寅以神䇿京西行營節度使范希朝為右金吾大將軍髙崇文引兵自閬州趣梓州劉闢將邢泚引兵遁去崇文入屯梓州闢歸李康於崇文以求自雪崇文以康敗軍失守斬之丙子嚴礪奏克梓州丁丑制削奪劉闢官爵初韓全義入朝以其甥楊惠琳知夏綏留後杜黄裳以全義出征無功驕蹇不遜直令致仕以右驍衛將軍李演為夏綏節度使惠琳勒兵拒之表稱將士逼臣為節度使河東節度使嚴綬表請討之詔河東天德軍合擊惠琳綬遣牙將阿跌光進及弟光顔將兵赴之光進本出河曲歩落稽兄弟事河東軍皆以勇敢聞辛巳夏州兵馬使張承金斬惠琳傳首京師東川節度使韋丹至漢中表言髙崇文客軍逺鬬無所資若與梓州綴其士心必能有功夏四月丁酉以崇文為東川節度副使知節度事潘孟陽所至專事遊宴從僕三百人多納賄賂上聞之甲辰以孟陽為大理卿罷其度支鹽鐵轉運副使丙午䇿試制舉之士於是校書郎元稹監察御史獨孤郁校書郎下邽白居易前進士蕭俛沈傳師出焉郁及之子俛華之孫傳師既濟之子也杜佑請解財賦之職仍舉兵部侍郎度支使鹽鐵轉運副使李巽自代丁未加佑司徒罷其鹽鐵轉運使以巽為度支鹽鐵轉運使自劉晏之後居財賦之職者莫能繼之巽掌使一年征課所入類晏之多明年過之又一年加一百八十萬緍戊申加隴右經畧使秦州刺史劉澭保義軍節度使辛酉以元稹為右拾遺獨􅀌郁爲左拾遺白居易為盩厔尉集賢校理蕭俛為右拾遺沈傳師為校書郎稹上疏論諫職以為昔太宗以王珪魏徵為諫官宴遊寢食未嘗不在左右又命三品以上入議大政必遣諫官一人隨之以參得失故天下大理今之諫官大不得豫召見次不得參時政排行就列朝謁而已近年以來正牙不奏事庶官罷廵對諫官能舉職者獨誥命有不便則上封事耳君臣之際諷諭於未形籌畫於至宻尚不能回至尊之盛意况於既行之誥令已命之除授而欲以咫尺之書收絲綸之詔誠亦難矣願陛下時於延英召對使盡所懐豈可寘於其位而屏棄疎賤之哉頃之復上疏以為理亂之始必有萌象開直言廣視聽理之萌也甘謟䛕蔽近習亂之象也自古人主即位之初必有敢言之士人主茍受而賞之則君子樂行其道競爲忠讜小人亦貪得其利不為回邪矣如是則上下之志通幽逺之情逹欲無理得乎茍拒而罪之則君子卷懐括囊以保其身小人阿意迎合以竊其位矣如是則十歩之事皆可欺也欲無亂得乎昔太宗初即政孫伏伽以小事諫太宗喜厚賞之故當是時言事者惟患不深切未嘗以觸忌諱為憂也太宗豈好逆意而惡從欲哉誠以順適之快小而危亡之禍大故也陛下踐阼今已周嵗未聞有受伏伽之賞者臣等備位諫列曠日彌年不得召見毎就列位屏氣鞠躬不敢仰視又安暇議得失獻可否哉供奉官尚爾况疎逺之臣乎此蓋羣下因循之罪也因條奏請次對百官復正牙奏事禁非時貢獻等十事稹又以貞元中王伾王叔文以伎術得幸東宫永貞之際幾亂天下上書勸上早擇修正之士使輔導諸子以為太宗自為藩王與文學清修之士十八人居後代太子諸王雖有僚屬日益疎賤至於師傅之官非眊聵廢疾不任事者則休戎罷帥不知書者為之其友諭贊議之徒尤為宂散之甚搢紳皆恥由之就使時得僻老儒生越月踰時僅獲一見又何暇傅之德義納之法度哉夫以匹士愛其子猶知求明哲之師而教之况萬乗之嗣繫四海之命乎上頗嘉納其言時召見之壬戌邵王約薨五月丙子以横海留後程執㳟為節度使庚辰尚書左丞同平章事鄭餘慶罷為太子賔客辛夘尊太上皇后為皇太后劉闢城鹿頭闗連八柵屯兵萬餘人以拒髙崇文六月丁酉崇文擊敗之闢置柵於闗東萬勝堆戊戌崇文遣驍將范陽髙霞寓攻奪之下瞰闗城凡八戰皆㨗加盧龍節度使劉濟兼侍中己亥加平盧節度使李師古兼侍中庚子髙崇文破劉闢於德陽癸夘又破之於漢州嚴礪遣其將嚴秦破闢衆萬餘人於綿州石碑谷初李師古有異母弟曰師道常疎斥在外不免貧窶師古私謂所親曰吾非不友於師道也吾年十五擁節旄自恨不知稼穡之艱難况師道復減吾數嵗吾欲使之知衣食之所自來且以州縣之務付之計諸公必不察也及師古疾篤師道時知宻州事好畫及觱篥師古謂判官髙沭李公度曰迨吾之未亂也欲有問於子我死子欲奉誰為帥乎二人相顧未對師古曰豈非師道乎人情誰肯薄骨肉而厚它人顧置帥不善則非徒敗軍政也且覆吾族師道為公侯子孫不務訓兵理人專習小人賤事以為已能果堪為帥乎幸諸公審圖之閏月壬戌朔師古薨沐公度祕不發喪濳逆師道于宻州奉以為節度副使秋七月癸丑髙崇文破劉闢之衆萬人於􅀇武甲午詔凡西川繼援之兵悉取崇文處分壬寅􅁙至德大聖大安孝皇帝于豐陵廟號順宗八月壬戌以妃郭氏為貴妃丁夘立皇子寧為鄧王寛為澧王宥為遂王察為深王寰為洋王寮為絳王審為建王李師道緫軍務久之朝命未至師道謀於將佐或請出兵掠四境髙沐固止之請輸兩税申官吏行鹽法遣使相繼奉表詣京師杜黄裳請乗其未定而分之上以劉闢未平己巳以師道為平盧留後知鄆州事堂後主書滑渙久在中書與知樞宻劉光􅄾相結宰相議事有與光􅄾異者令渙逹意常得所欲杜佑鄭絪等皆低意善視之鄭餘慶與諸相議事渙從旁指陳是非餘慶怒叱之未幾罷相四方賂遺無虛日中書舍人李吉甫言其専恣請去之上命宰相闔中書四門搜掩盡得姦狀九月辛丑貶渙雷州司户尋賜死籍沒家財凡數千萬壬寅髙崇文又敗劉闢之衆於鹿頭闗嚴秦敗劉闢之衆於神泉河東將阿跌光顔將兵㑹髙崇文於行營愆期一日懼誅欲深入自贖軍于鹿頭之西斷其糧道城中憂懼於是闢綿江柵將李文悦鹿頭守將仇良輔皆以城降於崇文獲闢壻蘇彊士卒降者萬計崇文遂長驅直指成都所向崩潰軍不留行辛亥克成都劉闢盧文若帥數十騎西奔吐蕃崇文使髙霞寓等追之及於羊灌田闢赴江不死擒之文若先殺妻子乃繫石自沈崇文入成都屯於通衢休息士卒市肆不驚珍寳山積秋豪不犯檻劉闢送京師斬闢大將邢泚館驛廵官沈􅄛餘無所問軍府事無巨細命一遵韋南康故事從容指撝一境皆平初韋臯以西山運糧使崔從知卭州事劉闢反從以書諫闢闢發兵攻之從嬰城固守闢敗乃得免從融之曽孫也韋臯參佐房式韋乾度獨孤宻符載郗士羙叚文昌等素服麻屨銜土請罪崇文皆釋而禮之草表薦式等厚贐而遣之目叚文昌曰君必為將相未敢奉薦載廬山人式琯之從子文昌志􅀇之􅀇孫也闢有二妾皆殊色監軍請獻之崇文曰天子命我討平凶豎當以撫百姓為先遽獻婦人以求媚豈天子之意邪崇文義不為此乃以配將吏之無妻者杜黄裳建議征蜀及指受髙崇文方畧皆懸合事宜崇文素憚劉澭黄裳使謂之曰若無功當以劉澭相代故能得其死力及蜀平宰相入賀上目黄裳曰卿之功也辛巳詔徵少室山人李渤為左拾遺渤辭疾不至然朝政有得失渤輙附奏陳論冬十月甲子易定節度使張茂昭入朝制割資簡陵榮昌瀘六州􅀠東川房式等未至京師皆除省寺官丙寅以髙崇文為西川節度使戊辰以嚴礪為東川節度使庚午以將作監栁晟為山南西道節度使晟至漢中府兵討劉闢還未至城詔復遣戍梓州軍士怨怒脅監軍謀作亂晟聞之疾驅入城慰勞之既而問曰汝曹何以得成功對曰誅反者劉闢耳晟曰闢以不受詔命故汝曹得以立功豈可復使它人誅汝以為功邪衆皆拜謝請詣戍所如詔書軍府由是獲安壬午以平盧留後李師道為節度使戊子劉闢至長安并族黨誅之武寧節度使張愔有疾上表請代十一月戊申徵愔為工部尚書以東都留守王紹代之復以濠泗二州􅀠武寧軍徐人喜得二州故不為亂丙辰以内常侍吐突承璀為左神䇿中尉承璀事上於東宫以幹敏得幸是歳回鶻入貢始以摩尼偕來於中國置寺處之其法日晏乃食食葷而不食湩酪回鶻信奉之可汗或與議國事二年春正月辛卯上祀圎丘赦天下上以杜佑髙年重德禮重之常呼司徒而不名佑以老疾請致仕詔令佑毎月入朝不過再三因至中書議大政它日聼歸樊川門下侍郎同平章事杜黄裳有經濟大略而不修小節故不得乆在相位乙巳以黄裳同平章事充河中晉絳慈隰節度使己酉以户部侍郎武元衡為門下侍郎翰林學士李吉甫為中書侍郎並同平章事吉甫聞之感泣謂中書舍人裴垍曰吉甫流落江淮踰十五年一旦䝉恩至此思所以報德惟在進賢而朝廷後進罕所接識君有精鑒願悉為我言之垍取筆疏三十餘人數月之間選用畧盡當時翕然稱吉甫為得人二月癸酉邕州奏破黄賊獲其酋長黄承慶夏四月甲子以右金吾大將軍范希朝為朔方靈鹽節度使以右神䇿鹽州定逺兵􅀠焉以革舊􅁦任邊將也秋八月劉濟王士真張茂昭爭私隙迭相表請加罪戊寅以給事中房式為幽州成德義武宣慰使和解之九月乙酉宻王綢薨夏蜀既平藩鎮惕息多求入朝鎮海節度使李錡亦不自安求入朝上許之遣中使至京口慰撫且勞其將士錡雖署判官王澹為留後實無行意屢遷行期澹與敕使數勸諭之錡不悦上表稱疾請至嵗暮入朝上以問宰相武元衡曰陛下初即政錡求朝得朝求止得止可否在錡將何以令四海上以為然下詔徵之錡詐窮遂謀反王澹既掌留務於軍府頗有制置錡益不平宻諭親兵使殺之㑹頒冬服錡嚴兵坐幄中澹與敕使入謁有軍士數百譟於庭曰王澹何人擅主軍務曵下臠食之大將趙琦出慰止又臠食之注刃於敕使之頸詬詈將殺之錡陽驚起救之冬十月己未詔徵錡為左僕射以御史大夫李元素為鎮海節度使庚申錡表言軍變殺留後大將先是錡選腹心五人為所部五州鎮將姚志安處蘇州李深處常州趙惟忠處湖州丘自昌處杭州髙肅處睦州各有兵數千伺察刺史動靜至是錡各使殺其刺史遣牙將庾伯良將兵三千治石頭城常州刺史顔防用客李雲計矯制稱招討副使斬李深傳檄蘇杭湖睦請同進討湖州刺史辛祕潛募鄉閭子弟數百夜襲趙惟忠營斬之蘇州刺史李素為姚志安所敗生致於錡具桎梏釘於船舷未及京口㑹錡敗得免乙丑制削李錡官爵及屬籍以淮南節度使王鍔統諸道兵為招討處置使徵宣武義寧武昌兵并淮南宣歙兵俱出宣州江西兵出信州浙東兵出杭州以討之髙崇文在蜀朞年一旦謂監軍曰崇文河朔一卒幸有功致位至此西川乃宰相回翔之地崇文叨居日久豈敢自安屢上表稱蜀中安逸無所陳力願效死邊陲上擇可以代崇文者而難其人丁夘以門下侍郎同平章事武元衡同平章事充西川節度使李錡以宣州富饒欲先取之遣兵馬使張子良李奉仙田少卿將兵三千襲之三人知錡必敗與牙將裴行立同謀討之行立錡之甥也故悉知錡之宻謀三將營於城外將發召士卒諭之曰僕射反逆官軍四集常湖二將繼死其勢已蹙今乃欲使吾輩逺取宣城吾輩何為隨之族滅豈若弃逆效順轉禍為福乎衆悦許諾即夜還趨城行立舉火鼓譟應之於内引兵趨牙門錡聞子良等舉兵怒聞行立應之撫膺曰吾何望矣跣走匿樓下親將李鈞引挽彊三百趨山亭欲戰行立伏兵邀斬之錡舉家皆哭左右執錡裹之以幕縋於城下械送京師挽彊蕃落爭自殺尸相枕藉癸酉本軍以聞乙亥羣臣賀於紫宸殿上愀然曰朕之不德致宇内數有干紀者朕之愧也何賀之為宰相議誅錡大功以上親兵部郎中蔣乂曰錡大功親皆淮安靖王之後也淮安有佐命之功陪陵享廟豈可以末孫為惡而累之乎又欲誅其兄弟乂曰錡兄弟故都統國貞之子也國貞死王事豈可使之不祀乎宰相以為然辛巳錡從父弟宋州刺史銛等皆貶官流放十一月甲申朔錡至長安上御興安門面詰之對曰臣初不反張子良等教臣耳上曰卿為元帥子良等謀反何不斬之然後入朝錡無以對乃并其子師回腰斬之有司請毁錡祖考塜廟中丞盧坦上言李錡父子受誅罪已塞矣昔漢誅霍禹不罪霍光先朝誅房遺愛不及房􅀇齡康誥曰父子兄弟罪不相及况以錡為不善而罪及五代祖乎乃不毁有司籍錡家財輸京師翰林學士裴垍李絳上言以為李錡僭侈割剥六州之人以富其家或枉殺其身而取其財陛下閔百姓無告故討而誅之今輦金帛以輸上京恐逺近失望願以逆人資財賜浙西百姓代今年租賦上嘉歎久之即從其言昭義節度使盧從史内與王士真劉濟潛通而外獻䇿請圖山東擅引兵東出上召令還上黨從史託言就食邢洺不時奉詔久之乃還它日上召李絳對於浴堂語之曰事有極異者朕比不欲言之朕與鄭絪議敕從史歸上黨續徵入朝絪乃泄之於從史使稱上黨乏糧就食山東為人臣負朕乃爾將何以處之對曰審如此滅族有餘矣然絪從史必不自言陛下誰從得之上曰吉甫宻奏絳曰臣竊聞搢紳之論稱絪為佳士恐必不然或者同列欲專朝政疾寵忌前願陛下更熟察之勿使人謂陛下信讒也上良久曰誠然絪必不至此非卿言朕幾誤處分上又嘗從容問絳曰諫官多謗訕朝政皆無事實朕欲謫其尤者一二人以儆其餘何如對曰此殆非陛下之意必有邪臣欲壅蔽陛下之聦明也人臣死生繫人主喜怒敢發口諫者有幾就有諌者皆晝度夜思朝刪暮減比得上逹什無二三故人主孜孜求諌猶懼不至况罪之乎如此杜天下之口非社稷之福也上善其言而止羣臣請上尊號曰睿聖文武皇帝丙申許之盩厔尉集賢校理白居易作樂府及詩百餘篇規諷時事流聞禁中上見而悦之召入翰林為學士十二月丙辰上謂宰相曰太宗以神聖之資羣臣進諌者猶往復數四况朕寡昧自今事有違冝卿當十論無但一二而已丙寅以髙崇文同平章事充邠寧節度使京西諸軍都統山南東道節度使于頔憚上英威為子季友求尚主上以皇女普寧公主妻之翰林學士李絳諫曰頔虜族季友庶孽不足以辱帝女宜更擇髙門美才上曰此非卿所知己夘公主適季友恩禮甚盛頔出望外大喜頃之上使人諷之入朝謝恩頔遂奉詔是嵗李吉甫撰元和國計簿上之緫計天下方鎮四十八州府二百九十五縣千四百五十三其鳯翔鄜坊邠寧振武涇原銀夏靈鹽河東易定魏博鎮兾范陽滄景淮西淄青等十五道七十一州不申户口外毎嵗賦税倚辦止於浙江東西宣歙淮南江西鄂岳福建湖南八道四十九州一百四十四萬户比天寳税户四分減三天下兵仰給縣官者八十三萬餘人比天寳三分増一大率二户資一兵其水旱所傷非時調發不在此數三年春正月癸巳羣臣上尊號曰睿聖文武皇帝赦天下自今長吏詣闕無得進奉知樞宻劉光􅄾奏分遣中使齎赦詣諸道意欲分其饋遺翰林學士裴垍李絳奏敇使所至煩擾不若但附急遞上從之光􅄾稱舊例上曰例是則從之茍為非是奈何不改臨涇鎮將郝玼以臨涇地險要水草美吐蕃將入冦必屯其地言於涇原節度使叚祐奏而城之自是涇原獲安二月戊寅咸安大長公主薨于回鶻三月回鶻騰里可汗卒癸巳郇王緫薨辛亥御史中丞盧坦奏彈前山南西道節度使栁晟前浙東觀察使閻濟美違赦進奉上召坦襃慰之曰朕已釋其罪不可失信坦曰赦令宣布海内陛下之大信也晟等不畏陛下法奈何存小信棄大信乎上乃命歸所進於有司夏四月上䇿試賢良方正直言極諫舉人伊闕尉牛僧孺陸渾尉皇甫湜前進士李宗閔皆指陳時政之失無所避户部侍郎楊於陵吏部員外郎韋貫之為考䇿官貫之署為上第上亦嘉之乙丑詔中書優與處分李吉甫惡其言直泣訴於上且言翰林學士裴垍王涯覆䇿湜涯之甥也涯不先言垍無所異同上不得已罷垍涯學士垍為户部侍郎涯為都官員外郎貫之為果州刺史後數日貫之再貶巴州刺史涯貶虢州司馬乙亥以楊於陵為嶺南節度使亦坐考䇿無異同也僧孺等久之不調各從辟於藩府僧孺􅀪之七世孫宗閔元懿之􅀇孫貫之福嗣之六世孫湜睦州新安人也丁丑罷五月朔宣政殿朝賀以荆南節度使裴均為右僕射均素附宦官得貴顯為僕射自矜大嘗入朝踰位而立中丞盧坦揖而退之均不從坦曰昔姚南仲為僕射位在此均曰南仲何人坦曰是守正不交權倖者坦尋改右庶子五月翰林學士左拾遺白居易上疏以為牛僧孺等直言時事恩奬登科而更遭斥逐並出為闗外官楊於陵等以考䇿敢收直言裴垍等以覆䇿不退直言皆坐譴謫盧坦以數舉職事黜庶子此數人皆今之人望天下視其進退以卜時之否臧者也一旦無罪悉疎棄之上下杜口衆心恟恟陛下亦知之乎且陛下既下詔徵之直言索之極諫僧孺等所對如此縱未能推而行之又何忍罪而斥之乎昔德宗初即位亦徵直言極諫之士䇿問天旱穆質對云兩漢故事三公當免卜式著議􅀪羊可烹德宗深嘉之自畿尉擢為左補闕今僧孺等所言未過於穆質而遽斥之臣恐非嗣祖宗之道也質寧之子也丙午冊回鶻新可汗為愛登里囉汨宻施合毗伽保義可汗西原蠻酋長黄少卿請降六月癸亥以為歸順州刺史沙陀勁勇冠諸胡吐蕃置之甘州毎戰以為前鋒回鶻攻吐蕃取涼州吐蕃疑沙陀貳於回鶻欲遷之河外沙陀懼酋長朱邪盡忠與其子執宜謀復自歸於唐遂帥部落三萬循烏德犍山而東行三日吐蕃追兵大至自洮水轉戰至石門凡數百合盡忠死士衆死者太半執宜帥其餘衆猶近萬人騎三千詣靈州降靈鹽節度使范希朝聞之自帥衆迎於塞上置之鹽州為市牛羊廣其畜牧善撫之詔置隂山府以執宜為兵馬使未幾盡忠弟葛勒阿波又帥衆七百詣希朝降詔以為隂山府都督自是靈鹽毎有征討用之所向皆㨗靈鹽軍益彊秋七月辛巳朔日有食之以右庶子盧坦為宣歙觀察使蘇彊之誅也兄􅀪在晉州幕府自免歸人莫敢辟坦奏􅀪有才行不可以其弟故廢之請辟為判官上曰曏使蘇彊不死果有才行猶可用也况其兄乎坦到官值旱饑榖價日増或請抑其價坦曰宣歙土狹榖少所仰四方之來者若價賤則商船不復來益困矣既而米斗二百商旅輻湊民頼以生九月庚寅以于頔為司空同平章事如故加右僕射裴均同平章事為山南東道節度使淮南節度使王鍔入朝鍔家巨富厚進奉及賂宦官求平章事翰林學士白居易上言以為宰相人臣極位非清望大功不應授昨除裴均外議已紛然今又除鍔則如鍔之輩皆生兾望若盡與之則典章太壊又不感恩不與則厚薄有殊或生怨望倖門一啓無可如何且鍔在鎮五年百計誅求貨財既足自入進奉若除宰相四方藩鎮皆謂鍔以進奉得之競為割剥則百姓何以堪之事遂寢壬辰加宣武節度使韓弘同平章事丙申以户部侍郎裴垍為中書侍郎同平章事上雖以李吉甫故罷垍學士然寵信彌厚故未幾復擢為相初德宗不任宰相天下細務皆自决之由是裴延齡輩得用事上在藩邸心固非之及即位選擢宰相推心委之嘗謂垍等曰以太宗玄宗之明猶藉輔佐以成其理况如朕不及先聖萬倍者乎垍亦竭誠輔佐上嘗問垍爲理之要何先對曰先正其心舊制民輸税有三一曰上供二曰送使三曰留州建中初定兩税時貨重錢輕是後貨輕錢重民所出已倍其初其留州送使者所在又降省估就實估以重歛於民及垍為相奏天下留州送使物請一切用省估其觀察使先税所理之州以自給不足然後許税於所屬之州由是江淮之民稍蘇息先是執政多惡諫官言時政得失垍獨賞之垍器局峻整人不敢干以私嘗有故人自逺詣之垍資給優厚從容欵狎其人乗閒求京兆判司垍曰公才不稱此官不敢以故人之私傷朝廷至公它日有盲宰相憐公者不妨得之垍則必不可戊戌以中書侍郎同平章事李吉甫同平章事充淮南節度使河中晉絳節度使邠宣公杜黄裳薨冬十二月庚戌置行原州於臨涇以鎮將郝玼為刺史南詔異牟尋卒子尋閤勸立四年春正月戊子簡王遘薨渤海康王嵩璘卒子元瑜立改元永德南方旱饑庚寅命左司郎中鄭敬等為江淮二浙荆湖襄鄂等道宣慰使賑恤之將行上戒之曰朕宫中用帛一匹皆籍其數惟賙救百姓則不計費卿輩宜識此意勿效潘孟陽飲酒遊山而已給事中李藩在門下制敕有不可者即於黄紙後批之吏請更連素紙藩曰如此乃狀也何名批敕裴垍薦藩有宰相器上以門下侍郎同平章事鄭絪循黙取容二月丁夘罷絪為太子賔客擢藩為門下侍郎同平章事藩知無不言上甚重之河東節度使嚴綬在鎮九年軍政補署一出監軍李輔光綬拱手而已裴垍具奏其狀請以李鄘代之三月乙酉以綬為左僕射以鳯翔節度使李鄘為河東節度使成德節度使王士真薨其子副大使承宗自為留後河北三鎮相承各置副大使以嫡長為之父沒則代領軍務上以久旱欲降徳音翰林學士李絳白居易上言以為欲令實惠及人無如減其租税又言宫人驅使之餘其數猶廣事宜省費物貴徇情又請禁諸道横斂以充進奉又言嶺南黔中福建風俗多掠良人賣為奴婢乞嚴禁止閏月己酉制降天下繫囚蠲租税出宫人絶進奉禁掠賣皆如二臣之請己未雨絳表賀曰乃知憂先於事故能無憂事至而憂無救於事初王叔文之黨既貶有詔雖遇赦無得量移吏部尚書鹽鐵轉運使李巽奏郴州司馬程异吏才明辨請以為􅀭子留後上許之巽精於督察吏人居千里之外戰栗如在巽前异句檢簿籍又精於巽卒獲其用魏徵􅀇孫稠貧甚以故第質錢於人平盧節度使李師道請以私財贖出之上命白居易草詔居易奏言事闗激勸宜出朝廷師道何人敢掠斯美望敕有司以官錢贖還後嗣上從之出内庫錢二千緡贖賜魏稠仍禁質賣王承宗叔父士則以承宗擅自立恐禍及宗與幕客劉栖楚俱自歸京師詔以士則為神䇿大將軍翰林學士李絳等奏曰陛下嗣膺大寳四年于兹而儲闈未立典冊不行是開窺覦之端乖重慎之義非所以承宗廟重社稷也伏望抑撝謙之小節行至公之大典丁夘制立長子鄧王寧為皇太子寧紀美人之子也辛未靈鹽節度使范希朝奏以太原防秋兵六百人衣糧給沙陁許之夏四月山南東道節度使裴均恃有中人之助於德音後首進銀器千五百餘兩翰林學士李絳白居易等上言均欲以此嘗陛下願却之上遽命出銀器付度支既而有㫖諭進奏院自今諸道進奉無得申御史臺有訪問者輙以名聞白居易復以為言上不聽上欲革河北諸鎮世襲之􅁦乗王士真死欲自朝廷除人不從則興師討之裴垍曰李納䟦扈不㳟王武俊有功於國陛下前許師道今奪承宗沮勸違理彼必不服由是議久不决上以問諸學士李絳等對曰河北不遵聲教誰不憤歎然今日取之或恐未能成德軍自武俊以來父子相承四十餘年人情貫習不以為非况承宗已緫軍務一旦易之恐未即奉詔又范陽魏博易定淄青以地相傳與成德同體彼聞成德除人必内不自安隂相黨助雖茂昭有請亦恐非誠所以然者今國家除人代承宗彼鄰道勸成進退有利若所除之人得入彼則自以為功若詔令有所不行彼因潛相交結在於國體豈可遽休須應興師四面攻討彼將帥則加官爵士卒則給衣糧按兵玩冦坐觀勝負而勞費之病咸歸國家矣今江淮水公私困竭軍旅之事殆未可輕議也左軍中尉吐突承璀欲希上意奪裴垍權自請將兵討之上疑未決宗正少卿李拭奏稱承宗不可不討承璀親近信臣宜委以禁兵使統諸軍誰敢不服上以拭狀示諸學士曰此姦臣也知朕欲將承璀故上此奏卿曹記之自今勿令得進用昭義節度使盧從史遭父喪朝廷久未起復從史懼因承璀説上請發本軍討承宗壬辰起復從史左金吾大將軍餘如故初平凉之盟副元帥判官路泌㑹盟判官鄭叔矩皆沒於吐蕃其後吐蕃請和泌子隨三詣闕號泣上表乞從其請德宗以吐蕃多詐不許至是吐蕃復請和隨又五上表詣執政泣請裴垍李藩亦言於上請許其和上從之五月命祠部郎中徐復使吐蕃六月以靈鹽節度使范希朝為河東節度使朝議以沙陁在靈武廹近吐蕃慮其反覆又部落衆多恐長榖價乃命悉從希朝詣河東希朝選其驍騎千二百號沙陁軍置使以領之而處其餘衆于定襄州於是朱邪執宜始保神武川之黄花堆左軍中尉吐突承璀領功德使盛脩安國寺奏立聖德碑髙大一準華嶽碑先構碑樓請敇學士撰文且言臣已具錢萬緡欲酬之上命李絳為之絳上言堯舜禹湯未嘗立碑自言聖德惟秦始皇於廵遊所過刻石髙自稱述未審陛下欲何所法且叙修寺之美不過壯麗觀遊豈所以光益聖德上覽奏承璀適在旁上命曵倒碑樓承璀言碑樓甚大不可曳請徐毀撤兾得延引乘閒再論上厲聲曰多用牛曵之承璀乃不敢言凡用百牛曵之乃倒資治通鑑卷第二百三十七
