front:
  text: 兵五千負糧五千直從襃中出循秦嶺而東當子午而北不過十日可到長安楙聞延奄至必弃城逃走長安中惟御史京兆太守耳橫門邸閣與散民之榖足周食也比東方相合聚尚二十許日而公從斜谷來亦足以達如此則一舉而咸陽以西可定矣亮以為此危計不如安從坦道可以平取隴右十全必克而無虞故不用延計亮揚聲由斜谷道取郿使鎮東將軍趙雲揚武將軍鄧芝為疑兵據箕谷帝遣曹真都督闗右諸軍軍郿亮身率大軍攻祁山戎陳整齊號令明肅始魏以漢昭烈旣死數嵗寂然無聞是以略無僃豫而卒聞亮出朝野恐懼於是天水南安安定皆叛應亮闗中響震朝臣未知計所出帝曰亮阻山為固今者自來正合兵書致人之術破亮必也乃勒兵馬步騎五萬遣右將軍張郃督之西拒亮丁未帝行如長安初越嶲太守馬謖才器過人好論軍計諸葛亮深加器異漢昭烈臨終謂亮曰馬謖言過其實不可大用君其察之亮猶謂不然以謖為參軍毎引見談論自晝達夜及出軍祁山亮不用舊將魏延吳懿等為先鋒而以謖督諸軍在前與張郃戰于街亭謖違亮節度舉措煩擾舍水上山不下據城張郃絶其汲道擊大破之士卒離散亮進無所據乃拔西縣千餘家還漢中收謖下獄殺之亮自臨祭為之流涕撫其遺孤恩若平生蔣琬謂亮曰昔楚殺得臣文公喜可知也天下未定而戮智計之士豈不惜乎亮流涕曰孫武所以能制勝於天下者用灋明也是以揚干亂灋魏絳戮其僕四海分裂兵交方始若復廢灋何用討賊邪謖之未敗也裨將軍巴西王平連規諫謖謖不能用及敗衆盡星散惟平所領千人鳴鼓自守張郃疑其有伏兵不往偪也於是平徐徐收合諸營遺迸率將士而還亮旣誅馬謖及將軍李盛奪將軍黄襲等兵平特見崇顯加拜參軍統五部兼當營事進位討冦將軍封亭侯亮上䟽請自貶三等漢主以亮為右將軍行丞相事是時趙雲鄧芝兵亦敗於箕谷雲斂衆固守故不大傷雲亦坐貶為鎮軍將軍亮問鄧芝曰街亭軍退兵將不復相録箕谷軍退兵將初不相失何故芝曰趙雲身自斷後軍資什物略無所棄兵將無縁相失雲有軍資餘絹亮使分賜將士雲曰軍事無利何為有賜其物請悉入赤㟁庫須十月為冬賜亮大善之或勸亮更發兵者亮曰大軍在祁山箕谷皆多於賊而不破賊乃為賊所破此病不在兵少也在一人耳今欲減兵省將明罰思過校變通之道於將來若不能然者雖兵多何益自今已後諸有忠慮於國但勤攻吾之闕則事可定賊可死功可蹻足而待矣於是考微勞甄壯烈引咎責躬布所失於境内厲兵講武以為後圖戎士簡練民忘其敗矣亮之出祁山也天水參軍姜維詣亮降亮美維膽智辟為倉曹掾使典軍事曹真討安定等三郡皆平真以諸葛亮懲於祁山後必出從陳倉乃使將軍郝昭等守陳倉治其城夏四月丁酉帝還洛陽帝以燕國徐邈為凉州刺史邈務農積榖立學明訓進善黜惡與羌胡從事不問小過若犯大罪先告部帥使知應死者乃斬以徇由是服其威信州界肅清五月大旱吳王使鄱陽太守周魴密求山中舊族名帥為北方所聞知者令譎挑揚州牧曹休魴曰民帥小醜不足杖任事或漏泄不能致休乞遣親人齎牋以誘休言被譴懼誅欲以郡降北求兵應接吳王許之時頻有郎官詣魴詰問諸事魴因詣郡門下下髪謝休聞之率步騎十萬向皖以應魴帝又使司馬懿向江陵賈逵向東闗三道俱進秋八月吳王至皖以陸遜為大都督假黃鉞親執鞭以見之以朱􅁊全琮為左右督各督三萬人以擊休休知見欺而恃其衆欲遂與吳戰朱􅁊言於吳王曰休本以親戚見任非智勇名將也今戰必敗敗必走走當由夾石挂車此兩道皆險阨若以萬兵柴路則彼衆可盡而休可生虜臣請將所部以斷之若䝉天威得以休自效便可乗勝長驅進取夀春割有淮南以規許洛此萬世一時不可失也權以問陸遜遜以為不可乃止尚書蔣濟上䟽曰休深入虜地與權精兵對而朱然等在上流乗休後臣未見其利也前將軍滿寵上䟽曰曹休雖明果而希用兵今所從道背湖旁江易進難退此兵之絓地也若入無彊口冝深為之僃寵表未報休與陸遜戰於石亭遜自為中部令朱􅁊全琮為左右翼三道俱進衝休伏兵因驅走之追亡逐北徑至夾石斬獲萬餘牛馬騾驢車乗萬兩軍資器械略盡初休表求深入以應周魴帝命賈逵引兵東與休今逵曰賊無東闗之僃必并軍於皖休深入與賊戰必敗乃部署諸將水陸並進行二百里獲吳人言休戰敗吳遣兵斷夾石諸將不知所出或欲待後軍逵曰休兵敗於外路絶於内進不能戰退不得還安危之機不及終日賊以軍無後繼故至此今疾進出其不意此所謂先人以奪其心也賊見吾兵必走若待後軍賊已斷險兵雖多何益乃兼道進軍多設旗鼓為疑兵吴人望見逵軍驚走休乃得還逵據夾石以兵糧給休休軍乃振初逵與休不善及休敗賴逵以免九月乙酉立皇子穆為繁陽王長平壯侯曹休上書謝罪帝以宗室不問休慙憤疽發於背庚子卒帝以滿寵都督揚州以代之護烏􅁊校尉田豫擊鮮卑鬱築鞬鬱築鞬妻父軻比能救之以三萬騎圍豫於馬城上谷太守閻志柔之弟也素為鮮卑所信往解諭之乃解圍去冬十一月蘭陵成侯王朗卒漢諸葛亮聞曹休敗魏兵東下闗中虚弱欲出兵擊魏羣臣多以為疑亮上言於漢主曰先帝深慮以漢賊不两立王業不偏安故託臣以討賊以先帝之明量臣之才固當知臣伐賊才弱敵彊然不伐賊王業亦亡惟坐而待亡孰與伐之是故託臣而弗疑也臣受命之日寢不安席食不甘味思惟北征宜先入南故五月渡瀘深入不毛臣非不自惜也顧王業不可徧全於蜀都故冒危難以奉先帝之遺意也而議者謂為非計今賊適疲於西又務於東兵灋乗勞此進趨之時也謹陳其事如左髙帝明並日月謀臣淵深然渉險被創危然後安今陛下未及髙帝謀臣不如良平而欲以長計取勝坐定天下此臣之未解一也劉繇王朗各據州郡論安言計動引聖人羣疑满腹衆難塞胷今嵗不戰明年不征使孫䇿坐大遂并江東此臣之未解二也曹操智計殊絶於人其用兵也髣髴孫吳然困於南陽險於烏巢危於祁連偪於黎陽幾敗伯山殆死潼闗然後偽定一時耳况臣才弱而欲以不危而定之此臣之未解三也曹操五攻昌霸不下四越巢湖不成任用李服而李服圖之委夏侯而夏侯敗亡先帝毎稱操為能猶有此失况臣駑下何能必勝此臣之未解四也自臣到漢中中間朞年耳然喪趙雲陽羣馬王閻芝丁立白夀劉郃鄧銅等及曲長屯將七十餘人突將無前賨叟青羌散騎武騎一千餘人皆數十年之内所糾合四方之精銳非一州之所有若復數年則損三分之二當何以圖敵此臣之未解五也今民窮兵疲而事不可息事不可息則住與行勞費正等而不及虛圖之欲以一州之地與賊支久此臣之未解六也夫難平者事也昔先帝敗軍於楚當此時曹操拊手謂天下已定然後先帝東連吳越西取巴蜀舉兵北征夏侯授首此操之失計而漢事將成也然後吳更違盟闗羽毁敗秭歸蹉跌曹丕稱帝凡事如是難可逆見臣鞠躬盡力死而後已至於成敗利鈍非臣之明所能逆覩也十二月亮引兵出散闗圍陳倉陳倉己有僃亮不能克亮使郝昭鄉人靳詳於城外遥說昭昭於樓上應之曰魏家科灋卿所練也我之為人卿所知也我受國恩多而門户重卿無可言者但有必死耳卿還謝諸葛便可攻也詳以昭語告亮亮又使詳重說昭言人兵不敵無為空自破滅昭謂詳曰前言已定矣我識卿耳箭不識也詳乃去亮自以有衆數萬而昭兵纔千餘人又度東救未能便到乃進兵攻昭起雲梯衝車以臨城昭於是以火箭逆射其梯梯然梯上人皆燒死昭又以繩連石磨壓其衝車衝車折亮乃更為井闌百尺以射城中以土丸填壍欲直攀城昭又於内築重牆亮又為地突欲踊出於城裏昭又於城内穿地橫截之晝夜相攻拒二十餘日曹真遣將軍費耀等救之帝召張郃于方城使擊亮帝自幸河南城置酒送郃問郃曰遟將軍到亮得無已得陳倉乎郃知亮深入無榖屈指計曰比臣到亮已走矣郃晨夜進道未至亮糧盡引去將軍王雙追之亮擊斬􅀟詔賜郝昭爵闗内侯
