body:
  text: 初公孫康卒子晃淵等皆㓜官屬立其弟恭恭劣弱不能治國淵既長脅奪恭位上書言狀侍中劉曄曰公孫氏漢時所用遂世官相承水則由海陸則阻山外連胡夷絶逺難制而世權日久今若不誅後必生患若懐貳阻兵然後致誅於事為難不如因其新立有黨有仇先其不意以兵臨之開設賞募可不勞師而定也帝不從拜淵揚烈將軍遼東太守吳王以揚州牧吕範為大司馬印綬未下而卒初孫䇿使範典財計時吳王年少私從有求範必闗白不敢専許當時以此見望呉王守陽羨長有所私用䇿或料覆功曹周谷輙為傅著簿書使無譴問王臨時恱之及後統事以範忠誠厚見信任以谷能欺更簿書不用也三年春漢諸葛亮遣其將陳戒攻武都隂平二郡雍州刺史郭淮引兵救之亮自出至建威淮退亮遂抜二郡以歸漢主復䇿拜亮為丞相夏四月丙申呉王即皇帝位大赦改元黃龍百官畢㑹吳主歸功於周瑜綏逺將軍張昭舉笏欲襃賛功德未及言吳主曰如張公之計今已乞食矣昭大慙伏地流汗吳主追尊父堅為武烈皇帝兄䇿為長沙􅁊王立子登為皇太子封長沙􅁊王子紹為吳侯以諸葛恪為太子左輔張休為右弼顧譚為輔正陳表為翼正都尉而謝景范慎羊衜等皆為賔客於是東宫號為多士太子使侍中胡綜作賔友目曰英才卓越超踰倫匹則諸葛恪精識時機達幽究微則顧譚凝辯宏達言能釋結則謝景究學甄微游夏同科則范慎羊衜私駮綜曰元遜才而䟽子嘿精而很叔發辯而浮孝敬深而陿衜卒以此言為恪等所惡其後四人皆敗如衜所言吳主使以並尊二帝之議往告于漢漢人以為交之無益而名體弗順冝顯明正義絶其盟好丞相亮曰權有僣逆之心久矣國家所以略其釁情者求掎角之援也今若加顯絶讎我必深更當移兵東戍與之角力須并其土乃議中原彼賢才尚多將相輯穆未可一朝定也頓兵相守坐而須老使北賊得計非筭之上者昔孝文卑辭匈奴先帝優與吳盟皆應權通變深思逺益非若匹夫之忿者也今議者咸以權利在鼎足不能并力且志望已滿無上岸之情推此皆似是而非也何者其智力不侔故限江自保權之不能越江猶魏賊之不能渡漢非力有餘而利不取也若大軍致討彼髙當分裂其地以為後規下當略民廣境示武於内非端坐者也若就其不動而睦於我我之北伐無東顧憂河南之衆不得盡西此之為利亦已深矣權僭逆之罪未宜明也乃遣衛尉陳震使於吳賀稱尊號吳主與漢人盟約中分天下以豫青徐幽屬吳兖冀并凉屬漢其司州之土以凾谷闗為界張昭以老病上還官位及所統領更拜輔吳將軍班亞三司改封婁侯食邑萬户昭毎朝見辭氣壯厲義形於色曽以直言逆㫖中不進見後漢使來稱漢德美而羣臣莫能屈吳主歎曰使張公在坐彼不折則廢安復自誇乎明日遣中使勞問因請見昭昭避席謝呉主跪止之昭坐定仰曰昔太后􅁊王不以老臣屬陛下而以陛下屬老臣是以思盡臣節以報厚恩而意慮淺短違逆盛㫖然臣愚心所以事國志在忠益畢命而已若乃變心易慮以偷榮取容此臣所不能也吳主辭謝焉元城哀王禮卒六月癸卯繁陽王穆卒戊申追尊髙祖大長秋曰髙皇帝夫人吳氏曰髙皇后秋七月詔曰禮王后無嗣擇建支子以繼大宗則當纂正統而奉公義何得復顧私親哉漢宣繼昭帝後加悼考以皇號哀帝以外藩援立而董宏等稱引亡秦惑誤時朝既尊恭皇立廟京都又寵藩妾使比長信叙昭穆於前殿並四位於東宫僭差無度人神弗祐而非罪師丹忠正之諫用致丁傅焚如之禍自是之後相踵行之昔魯文逆祀罪由夏父宋國非度譏在華元其令公卿有司深以前世行事為戒後嗣萬一有由諸侯入奉大統則當明為人後之義敢為佞邪導諛時君妄建非正之號以干正統謂考為皇稱妣為后則股肱大臣誅之無赦其書之金䇿藏之宗廟著于令典九月吳主遷都建業皆因故府不復増改留太子登及尚書九官於武昌使上大將軍陸遜輔太子并掌荆州及豫章三郡事董督軍國南陽劉廙嘗著先刑後禮論同郡謝景稱之於遜遜呵景曰禮之長於刑乆矣廙以細辯而詭先聖之教君今侍東宫宜遵仁義以彰德音若彼之談不須講也太子與西陵都督步騭書求見啟誨騭於是條于時事業在荆州界者及諸僚吏行能以報之因上䟽奬勸曰臣聞人君不親小事使百官有司各任其職故舜命九賢則無所用心不下廟堂而天下治也故賢人所在折衝萬里信國家之利器崇替之所由也願明太子重以經意則天下幸甚張紘還吳迎家道病卒臨困授子靖留牋曰自古有國有家者咸欲脩德政以比隆盛世至於其治多不馨香非無忠臣賢佐也由主不勝其情弗能用耳夫人情憚難而趨易好同而惡異與治道相反傳曰從善如登從惡如崩言善之難也人君承弈世之基據自然之埶操八柄之威甘易同之歡無假取於人而忠臣挾難進之術吐逆耳之言其不合也不亦宜乎離則有釁巧辯縁閒􅅭於小忠戀於恩愛賢愚雜錯黜陟失敘其所由來情亂之也故明君寤之求賢如飢渇受諫而不厭抑情損欲以義割恩則上無偏謬之授下無希冀之望矣吳主省書為之流涕冬十月改平望觀曰聽訟觀帝常言獄者天下之性命也毎斷大獄常詣觀臨聽之初魏文侯師李悝著灋經六篇商君受之以相秦蕭何定漢律益為九篇後稍増至六十篇又有令三百餘篇决事比九百六卷世有増損錯糅無常後人各為章句馬鄭諸儒十有餘家以至於魏所當用者合二萬六千二百七十二條七百七十三萬餘言覽者益難帝乃詔但用鄭氏章句尚書衛覬奏曰刑灋者國家之所貴重而私議之所輕賤獄吏者百姓之所縣命而選用者之所卑下王政之敝未必不由此也請置律博士帝從之又詔司空陳羣散騎常侍劉邵等刪約漢灋制新律十八篇州郡令四十五篇尚書官令軍中令合百八十餘篇於正律九篇為増於旁章科令為省矣十一月洛陽廟成迎髙太武文四神主于鄴十二月雍丘王植徙封東阿漢丞相亮徙府營於南山下原上築漢城於沔陽築樂城於成固四年春吳主使將軍衛温諸葛直將甲士萬人浮海求夷洲亶洲欲俘其民以益衆陸遜全琮皆諫以為􅁊王創基兵不一旅今江東見衆自足圖事不當逺涉不毛萬里襲人風波難測又民易水土必致疾疫欲益更損欲利反害且其民猶禽獸得之不足濟事無之不足虧衆吳主不聽尚書琅邪諸葛誕中書郎南陽鄧颺等相與結為黨友更相題表以散騎常侍夏侯􅀇等四人為四聦誕軰八人為八達􅀇尚之子也中書監劉放子熈中書令孫資子密吏部尚書衛臻子烈三人咸不及比以父居勢位容之為三豫行司徒事董昭上䟽曰凡有天下者莫不貴尚敦樸忠信之士深疾虚偽不真之人者以其毁教亂治敗俗傷化也近魏諷伏誅建安之末曹偉斬戮黃初之始伏惟前後聖詔深疾浮僞欲以被散邪黨常用切齒而執灋之吏皆畏其權勢莫能糾擿毁壊風俗侵欲滋甚竊見當今年少不復以學問為本専更以交游為業國士不以孝悌清脩為首乃以趨埶游利為先合黨連群互相襃歎以毁訾為罰戮用黨譽為爵賞􅼴己者則歎之盈􅹆不􅼴者則為作瑕釁至乃相謂今世何憂不度邪但求人道不勤羅之不博耳人何患其不知已但當吞之以藥而柔調耳又聞或有使奴客名作在職家人冒之出入往來禁奥交通書䟽有所探問凡此諸事皆灋之所不取刑之所不赦雖諷偉之罪無以加也帝善其言二月壬午詔曰世之質文隨教而變兵亂以來經學廢絶後生進趣不由典謨豈訓導未洽將進用者不以德顯乎其郎吏學通一經才任牧民博士課試擢其髙第者亟用其浮華不務道本者罷退之於是免誕颺等官夏四月定陵成侯鍾繇卒六月戊子太皇太后卞氏殂秋七月葬武宣皇后大司馬曹真以漢人數入寇請由斜谷伐之諸將數道並進可以大克帝從之詔大將軍司馬懿泝漢水由西城入與眞㑹漢中諸將或由子午谷或由武威入司空陳羣諫曰太祖昔到陽平攻張魯多收豆麥以益軍糧魯未下而食猶乏今既無所因且斜谷阻險難以進退轉運必見鈔截多留兵守要則損戰士不可不熟慮也帝從羣議眞復表從子午道羣又陳其不便并言軍事用度之計詔以羣議下眞眞據之遂行八月辛巳帝行東巡乙未如許昌漢丞相亮聞魏兵至次於成固赤坂以待之召李嚴使將二萬人赴漢中表嚴子豐為江州都督督軍典嚴後事會天大雨三十餘日棧道斷絶太尉華歆上䟽曰陛下以聖德當成康之隆願先留心於治道以征伐為後事為國者以民為基民以衣食為本使中國無飢寒之患百姓無離上之心則二賊之釁可坐而待也帝報曰賊慿恃山川二祖勞於前世猶不克平朕豈敢自多謂必滅之哉諸將以為不一探取無由自敝是以觀兵以闚其釁若天時未至周武還師乃前事之鑒朕敬不忘所戒少府楊阜上䟽曰昔武王白魚入舟君臣變色動得吉瑞猶尚憂懼況有災異而不戰竦者哉今吳蜀未平而天屢降變諸軍始進便有天雨之患稽閡山險已積日矣轉運之勞擔負之苦所費已多若有不繼必違本圖傳曰見可而進知難而退軍之善政也徒使六軍困於山谷之閒進無所略退又不得非王兵之道也散騎常侍王肅上䟽曰前志有之千里饋糧士有飢色樵蘇後爨師不宿飽此謂平塗之行軍者也又況於深入阻險鑿路而前則其為勞必相百也今又加之以霖雨山坂峻滑衆迫而不展糧逺而難繼實行軍者之大忌也聞曹真發已踰月而行裁半谷治道功夫戰士悉作是賊偏得以逸待勞乃兵家之所憚也言之前代則武王伐紂出闗而復還論之近事則武文征權臨江而不濟豈非所謂順天知時通於權變者哉兆民知上聖以水雨艱劇之故休而息之後日有釁乗而用之則所謂恱以犯難民忘其死者矣肅朗之子也九月詔曹眞等班師冬十月乙卯帝還洛陽時左僕射徐宣揔統留事帝還主者奏呈文書帝曰吾省與僕射省何異竟不視十二月辛未改葬文昭皇后于朝陽陵吳主揚聲欲至合肥征東將軍滿寵表召兖豫諸軍皆集吳尋退還詔罷其兵寵以為今賊大舉而還非本意也此必欲偽退以罷吾兵而倒還乗虛掩不僃也表不罷兵後十餘日吳果更來到合肥城不克而還漢丞相亮以蔣琬為長史亮數外出琬常足食兵以相供給亮毎言公琰託志忠雅當與吾共賛王業者也青州人隱蕃逃犇入吳上書於吳主曰臣聞紂為無道微子先出髙祖寛明陳平先入臣年二十二委棄封域歸命有道頼䝉天靈得自全致臣至止有日而主者同之降人未見精别使臣微言妙㫖不得上達於邑三歎曷惟其已謹詣闕拜章乞䝉引見吳主即召入蕃進謝荅問及陳時務甚有辭觀侍中右領軍胡綜侍坐吳主問何如綜對曰蕃上書大語有似東方朔巧捷詭辯有似禰衡而才皆不及吳主又問可堪何官綜對曰未可以治民且試都輦小職吳主以蕃盛語刑獄用為廷尉監左將軍朱據廷尉郝普數稱蕃有王佐之才普尤與之親善常怨歎其屈於是蕃門車馬雲集賔客盈堂自衛將軍全琮等皆傾心接待惟羊衜及宣詔郎豫章楊迪拒絶不與通潘濬子翥亦與蕃周旋饋餉之濬聞大怒䟽責翥曰吾受國厚恩志報以命爾輩在都當念恭順親賢慕善何故與降虜交以糧餉之在逺聞此心震面熱惆悵累旬䟽到急就往使受杖一百促責所餉當時人咸怪之頃之蕃謀作亂於吳事覺亡走捕得伏誅吳主切責郝普普惶懼自殺朱據禁止歴時乃解武陵五谿蠻夷叛吳吳主以南土清定召交州刺史吕岱還屯長沙漚口資治通鑑巻第七十一
