body:
  text: 勑編集周紀五赧王下四十三年楚以左徒黄歇侍太子完為質于秦秦置南陽郡秦魏楚共伐燕燕惠王薨子武成王立四十四年趙藺相如伐齊至平邑趙田部吏趙奢收租稅平原君家不肯出趙奢以灋治之殺平原君用事者九人平原君怒將殺之趙奢曰君於趙為貴公子今縱君家而不奉公則灋削灋削則國弱國弱則諸侯加兵是無趙也君安得有此富乎以君之貴奉公如灋則上下平上下平則國彊國彊則趙固而君爲貴戚豈輕於天下邪平原君以爲賢言之於王王使治國賦國賦大平民冨而府庫實四十五年秦伐趙圍閼與趙王召㢘頗樂乘而問之曰可救否皆曰道遠險陿難救問趙奢趙奢對曰道遠險陿譬猶兩䑕鬬於穴中將勇者勝王乃令趙奢將兵救之去邯鄲三十里而止令軍中曰有以軍事諫者死秦師軍武安西鼓譟勒兵武安屋瓦盡振趙軍中候有一人言急救武安趙奢立斬之堅壁留二十八日不行復益增壘秦間入趙軍趙奢善食而遣之閒以報秦將秦將大喜曰夫去國三十里而軍不行乃增壘閼與非趙地也趙奢既已遣閒巻甲而趨一日一夜而至去閼與五十里而軍軍壘成秦師聞之悉甲而往趙軍士許歴請以軍事諫趙奢進之許歷曰秦人不意趙至此其來氣盛將軍必厚集其陳以待之不然必敗趙奢曰請受教許歷請刑趙奢曰胥後令邯鄲許歷復請諫曰先據北山上者勝後至者敗趙奢許諾即發萬人趨之秦師後至争山不得上趙奢縱兵擊秦師秦師大敗解閼與而還趙王封奢為馬服君與廉藺同位以許歷為國尉穰侯言客卿竈於秦王使伐齊取剛壽以廣其陶邑初魏人范睢從中大夫須賈使於齊齊襄王聞其辯口私賜之金及牛酒須賈以為睢以國隂事告齊也歸而告其相魏齊魏齊怒笞擊范睢折脅摺齒睢佯死巻以簀置厠中使客醉者更溺之以懲後令無妄言者范睢謂守者曰能出我我必有厚謝守者乃請棄簀中死人魏齊醉曰可矣范睢得出魏齊悔復召求之魏人鄭安平遂操范睢亡匿更名姓曰張禄秦謁者王稽使於魏范睢夜見王稽稽濳載與俱歸薦之於王王見之於離宮睢佯為不知永巷而入其中王來而宦者怒逐之曰王至范睢謬曰秦安得王秦獨有太后穰侯耳王微聞其言乃屏左右跽而請曰先生何以幸教寡人對曰唯唯如是者三王曰先生卒不幸教寡人邪范睢曰非敢然也臣覊旅之臣也交疎於王而所願陳者皆匡君之事處人骨肉之閒願效愚忠而未知王之心也此所以王三問而不敢對者也臣知今日言之於前明日伏誅於後然臣不敢避也且死者人之所必不免也茍可以少有補於秦而死此臣之所大願也獨恐臣死之後天下杜口裹足莫肯鄉秦耳王跽曰先生是何言也今者寡人得見先生是天以寡人溷先生而存先王之宗廟也事無大小上及太后下至大臣願先生悉以教寡人無疑寡人也范睢拜王亦拜范睢曰以秦國之大士卒之勇以治諸侯譬若走韓盧而搏蹇兔也而閉關十五年不敢窺兵於山東者是穰侯為秦謀不忠而大王之計亦有所失也王跽曰寡人願聞失計然左右多竊聽者范睢未敢言内先言外事以觀王之俯仰因進曰夫穰侯越韓魏而攻齊剛壽非計也齊湣王南攻楚破軍殺將再辟地千里而齊尺寸之地無得焉者豈不欲得地哉形􅀔不能有也諸侯見齊之罷敝起兵而伐齊大破之齊幾於亡以其伐楚而肥韓魏也今王不如遠交而近攻得寸則王之寸也得尺亦王之尺也今夫韓魏中國之處而天下之樞也王若欲霸必親中國以為天下樞以威楚趙楚彊則附趙趙彊則附楚楚趙皆附齊必懼矣齊附則韓魏因可虜也王曰善乃以范睢為客卿與謀兵事四十六年秦中更胡傷攻趙閼與不㧞四十七年秦王用范睢之謀使五大夫綰伐魏㧞懷四十八年秦悼太子質於魏而卒四十九年秦㧞魏邢丘范睢日益親用事因承間説王曰臣居山東時聞齊之有孟嘗君不聞有王聞秦有太后穰侯不聞有王夫擅國之謂王能利害之謂王制殺生之謂王今太后擅行不顧穰侯出使不報華陽涇陽等擊斷無諱高陵進􅅲不請四貴僃而國不危者未之有也為此四貴者下乃所謂無王也穰侯使者操王之重決制於諸侯剖符於天下征敵伐國莫敢不聽戰勝攻取則利歸於陶戰敗則結怨於百姓而禍歸於社稷臣又聞之木實繁者披其枝披其枝者傷其心大其都者危其國尊其臣者卑其主淖齒管齊射王股擢王筋懸之於廟梁宿昔而死李兊管趙囚主父於沙丘百日而餓死今臣觀四貴之用事此亦淖齒李兊之類也且夫三代之所以亡國者君專授政於臣縱酒弋獵其所授者妬賢疾能御下蔽上以成其私不為主計而主不覺悟故失其國今自有秩以上至諸大吏下及王左右無非相國之人者見王獨立於朝臣竊為王恐萬世之後有秦國者非王子孫也王以為然於是廢太后逐穰侯高陵華陽涇陽君於關外以范睢為丞相封為應侯魏王使須賈聘於秦應侯敝衣間歩而往見之須賈驚曰范叔固無恙乎留坐飲食取一綈袍贈之遂為須賈御而至相府曰我為君先入通於相君須賈怪其乆不出問於門下門下曰無范叔鄉者吾相張君也須賈知見欺乃膝行入謝罪應侯坐責讓之且曰爾所以得不死者以綈􅂁戀戀尚有故人之意耳乃大供具請諸侯賔客坐須賈於堂下置莝豆於前而馬食之使歸告魏王曰速斬魏齊頭來不然且屠大梁須賈還以告魏齊魏齊犇趙匿於平原君家趙惠文王薨子孝成王丹立以平原君為相五十年秦宣太后薨九月穰侯出之陶臣光曰穰侯援立昭王除其災害薦白起為將南取鄢郢東屬地於齊使天下諸侯稽首而事秦秦益彊大者穰侯之功也雖其專恣驕貪足以賈禍亦未至盡如范睢之言若睢者亦非能為秦忠謀直欲得穰侯之處故搤其吭而奪之耳遂使秦王絶母子之義失舅甥之恩要之睢眞傾危之士哉秦王以子安國君為太子秦伐趙取三城趙王新立太后用事求救於齊齊人曰必以長安君為質太后不可齊師不出大臣彊諫太后明謂左右曰復言長安君為質者老婦必唾其面左師觸龍願見太后太后盛氣而胥之入左師公徐趨而坐自謝曰老臣病足不得見乆矣竊自恕而恐太后體之有所苦也故願望見太后太后曰老婦恃輦而行曰食得毋衰乎曰恃粥耳太后不和之色稍解左師公曰老臣賤息舒祺最少不肖而臣衰竊憐愛之願得補黑衣之缺以衛王宮昧死以聞太后曰諾年幾何矣對曰十五歲矣雖少願及未填溝壑而託之太后曰丈夫亦愛少子乎對曰甚於婦人太后笑曰婦人異甚對曰老臣竊以為媪之愛燕后賢於長安君太后曰君過矣不若長安君之甚左師公曰父母愛其子則為之計深遠媪之送燕后也持其踵而泣念其遠也亦哀之矣已行非不思也祭祀則祝之曰必勿使反豈非為之計長乆為子孫相繼為王也哉太后曰然左師公曰今三世以前至於趙王之子孫為侯者其繼有在者乎曰無有曰此其近者禍及其身遠者及其子孫豈人主之子侯則不善哉位尊而無功奉厚而無勞而挾重器多也今媪尊長安君之位而封之以膏腴之地多與之重器而不及今令有功於國一旦山陵崩長安君何以自託於趙哉太后曰諾恣君之所使之於是為長安君約車百乗質於齊齊師乃出秦師退齊安平君田單將趙師以伐燕取中陽又伐韓取注人齊襄王薨子建立建年少國事皆決於君王后五十一年秦武安君伐韓拔九城斬首五萬田單為趙相五十二年秦武安君伐􅙽取南陽攻太行道絶之楚頃襄王疾病黄歇言於應侯曰今楚王疾恐不起秦不如歸其太子太子得立其事秦必重而德相國無窮是親與國而得儲萬乘也不歸則咸陽布衣耳楚更立君必不事秦是失與國而絶萬乗之和非計也應侯以告王王曰令太子之傅先往問疾反而後圖之黄歇與太子謀曰秦之留太子欲以求利也今太子力未能有以利秦也而陽文君子二人在中王若卒大命太子不在陽文君子必立為後太子不得奉宗廟矣不如亡秦與使者俱出臣請止以死當之太子因變服為楚使者御以出關而黄歇守舍常為太子謝病度太子已遠乃自言於王曰楚太子已歸出遠矣歇願賜死王怒欲聽之應侯曰歇為人臣出身以徇其主太子立必用歇不如無罪而歸之以親楚王從之黄歇至楚三月秋楚頃襄王薨考烈王即位以黄歇為相封以淮北地號曰春申君五十三年楚人納州于秦以平武安君伐韓㧞野王上黨路絶上黨守馮亭與其民謀曰鄭道已絶秦兵日進韓不能應不如以上黨歸趙趙受我秦必攻之趙被秦兵必親韓韓趙為一則可以當秦矣乃遣使者告於趙曰韓不能守上黨入之秦其吏民皆安為趙不樂為秦有城市邑十七願再拜獻之大王趙王以告平陽君豹對曰聖人甚禍無故之利王曰人樂吾德何謂無故對曰秦蠶食韓地中絶不令相通固自以為坐而受上黨也韓氏所以不入於秦者欲嫁其禍於趙也秦服其勞而趙受其利雖彊大不能得之於弱小弱小固能得之於彊大乎豈得謂之非無故哉不如勿受王以告平原君平原君請受之王乃使平原君往受地以萬戸都三封其太守為華陽君以千戸都三封其縣令為矦吏民皆益爵三級馮亭垂涕不見使者曰吾不忍賣主地而食之也五十五年秦左庶長王齕攻上黨㧞之上黨民走趙趙廉頗軍於長平以按據上黨民王齕因伐趙趙軍戰數不勝亡一禆將四尉趙王與樓昌虞卿謀樓昌請發重使為媾虞卿曰今制媾者在秦秦必欲破王之軍矣雖往請媾秦將不聽不如發使以重寳附楚魏楚魏受之則秦疑天下之合從媾乃可成也王不聽使鄭朱媾於秦秦受之王謂虞卿曰秦内鄭朱矣對曰王必不得媾而軍破矣何則天下之賀戰勝者皆在秦矣夫鄭朱貴人也秦王應矦必顯重之以示天下天下見王之媾於秦必不救王秦知天下之不救王則媾不可得成矣既而秦果顯鄭朱而不與趙媾秦數敗趙兵廉頗堅壁不出趙王以頗失亡多而更怯不戰怒數讓之應侯又使人行千金於趙為反間曰秦之所畏獨畏馬服君之子趙括為將耳廉頗易與且降矣趙王遂以趙括代頗將藺相如曰王以名使括若膠柱鼓瑟耳括徒能讀其父書傳不知合變也王不聽初趙括自少時學兵灋以天下莫能當嘗與其父奢言兵事奢不能難然不謂善括母問其故奢曰兵死地也而括易言之使趙不將括則己若必將之破趙軍者必括也及括將行其母上書言括不可使王曰何以對曰始妾事其父時為將身所奉飯而進食者以十數所友者以百數王及宗室所賞賜者盡以與軍吏士大夫受命之日不問家事今括一旦為將東鄉而朝軍吏無敢仰視之者王所賜金帛歸藏於家而日視便利田宅可買者買之王以為如其父父子異心願王勿遣王曰母置之吾已決矣母因曰即如有不稱妾請無隨坐趙王許之秦王聞括己為趙將乃隂使武安君為上將軍而王齕為禆將令軍中有敢泄武安君將者斬趙括至軍悉更約束易置軍吏出兵擊秦師武安君佯敗而走張二竒兵以劫之趙括乗勝追造秦壁壁堅拒不得入竒兵二萬五千人絶趙軍之後又五千騎絶趙壁間趙軍分而為二糧道絶武安君出輕兵擊之趙戰不利因築壁堅守以待救至秦王聞趙食道絶自如河内發民年十五以上悉詣長平遮絶趙救兵及糧食齊人楚人救趙趙人乏食請粟于齊齊王弗許周子曰夫趙之於齊楚扞蔽也猶齒之有脣也脣亡則齒寒今日亡趙明日患及齊楚矣救趙之務宜若奉漏甕沃焦釡然且救趙高義也却秦師顯名也義救亡國威却彊秦不務為此而愛粟為國計者過矣齊王弗聽九月趙軍食絶四十六日皆内隂相殺食急來攻秦壘欲出為四隊四五復之不能出趙括自出鋭卒搏戰秦人射殺之趙師大敗卒四十萬人皆降武安君曰秦已㧞上黨上黨民不樂為秦而歸趙趙卒反覆非盡殺之恐為亂乃挾詐而盡坑殺之遺其小者二百四十人歸趙前後斬首虜四十五萬人趙人大震五十六年十月武安君分軍為三王齕攻趙武安皮牢㧞之司馬梗北定太原盡有上黨地韓魏恐使蘇代厚幣説應侯曰武安君即圍邯鄲乎曰然蘇代曰趙亡則秦王王矣武安君為三公君能為之下乎雖無欲為之下固不得已矣秦嘗攻韓圍邢丘困上黨上黨之民皆反為趙天下不樂為秦民之日乆矣今亡趙北地入燕東地入齊南地入韓魏則君之所得民無幾何人矣不如因而割之無以為武安君功也應侯言於秦王曰秦兵勞請許韓趙之割地以和且休士卒王聽之割韓垣雍趙六城以和正月皆罷兵武安君由是與應侯有隙趙王將使趙郝約事於秦割六縣虞卿謂趙王曰秦之攻王也倦而歸乎王以其力尚能進愛王而弗攻乎王曰秦不遺餘力矣必以倦而歸也虞卿曰秦以其力攻其所不能取倦而歸王又以其力之所不能取以送之是助秦自攻也來年秦攻王王無救矣趙王計未定樓緩至趙趙王與之計之樓緩曰虞卿得其一不得其二秦趙􅌟難而天下皆説何也曰吾且因彊而乘弱矣今趙不如亟割地為和以疑天下慰秦之心不然天下將因秦之怒乗趙之敝􅀲分之趙且亡何秦之圖乎虞卿聞之復見曰危哉樓子之計是愈疑天下而何慰秦之心哉獨不言其示天下弱乎且臣言勿與者非固勿與而已也秦索六城於王而王以六城賂齊齊秦之深讎也其聽王不待辭之畢也則是王失之於齊而取償於秦而示天下有能為也王以此發聲兵未窺於境臣見秦之重賂至趙而反媾於王也從秦為媾韓魏聞之必盡重王是王一舉而結三國之親而與秦易道也趙王曰善使虞卿東見齊王與之謀秦虞卿未返秦使者已在趙矣樓緩聞之亡去趙王封虞卿以一城秦之始伐趙也魏王問於諸大夫皆以為秦伐趙於魏便孔斌曰何謂也曰勝趙則吾因而服焉不勝趙則可承敝而擊之子順曰不然秦自孝公巳來戰未嘗屈今又屬其良將何敝之承大夫曰縱其勝趙於我何損鄰之羞國之福也子順曰秦貪暴之國也勝趙必復他求吾恐於時魏受其師也先人有言鷰雀處屋子母相哺呴呴焉相樂也自以為安矣竈突炎上棟宇將焚鷰雀顔不變不知禍之將及己也今子不悟趙破患將及己可以人而同於鷰雀乎子順者孔子六世孫也初魏王聞子順賢遣使者奉黄金束帛聘以為相子順謂使者曰若王能信用吾道吾道固為治世也雖􅂼食飲水吾猶為之若徒欲制服吾身委以重禄吾猶一夫耳魏王奚少於一夫使者固請子順乃之魏魏王郊迎以為相子順改嬖寵之官以事賢才奪無任之禄以賜有功諸喪職秩者咸不恱乃造謗言文咨以告子順子順曰民之不可與慮始乆矣古之善為政者其初不能無謗子産相鄭三年而後謗止吾先君之相魯三月而後謗止今吾為政日新雖不能及賢庸知謗乎文咨曰未識先君之謗何也子順曰先君相魯人誦曰麛裘而芾投之無戾芾而麛裘投之無郵及三月政化既成民又誦曰裘衣章甫實獲我所章甫裘衣惠我無私文咨喜曰乃今知先生不異乎聖賢矣子順相魏凡九月陳大計輒不用乃喟然曰言不見用是吾言之不當也言不當於主居人之官食人之禄是尸利素餐吾罪深矣退而以病致仕人謂子順曰王不用子子其行乎荅曰行將何之山東之國將并於秦秦為不義義所不入遂寑於家新垣固請子順曰賢者所在必興化致治今子相魏未聞異政而即自退意者志不得乎何去之速也子順曰以無異政所以自退也且死病無良醫今秦有吞食天下之心以義事之固不獲安救亡不暇何化之興昔伊摯在夏呂望在商而二國不治豈伊呂之不欲哉勢不可也當今山東之國敝而不振三晉割地以求安二周折而入秦燕齊楚已屈服矣以此觀之不出二十年天下其盡為秦乎秦王欲為應矦必報其仇聞魏齊在平原君所乃為好言誘平原君至秦而執之遣使謂趙王曰不得齊首吾不出王弟於關魏齊窮抵虞卿虞卿棄相印與魏齊偕亡至魏欲因信陵君以走楚信陵君意難見之魏齊怒自殺趙王卒取其首以與秦秦乃歸平原君九月五大夫王陵將兵復伐趙武安君病不任行五十七年正月王陵攻邯鄲少利益發卒佐陵陵亡五校武安君病愈王欲使代之武安君曰邯鄲實未易攻也且諸侯之救日至彼諸侯怨秦之日乆矣秦雖勝於長平士卒死者過半國内空遠絶河山而爭人國都趙應其内諸侯攻其外破秦軍必矣王自命不行乃使應侯請之武安君終辭疾不肯行乃以王齕代王陵趙王使平原君求救於楚平原君約其門下食客文武僃具者二十人與之俱得十九人餘無可取者毛遂自薦於平原君平原君曰夫賢士之處世也譬若錐之處囊中其末立見今先生處勝之門下三年於此矣左右未有所稱誦勝未有所聞是先生無所有也先生不能先生留毛遂曰臣乃今日請處囊中耳使遂蚤得處囊中乃頴脫而出非特其末見而已平原君乃與之俱十九人相與目笑之平原君至楚與楚王言合從之利害日出而言之日中不决毛遂按劒歴階而上謂平原君曰從之利害兩言而決耳今日出而言日中不決何也楚王怒叱曰胡不下吾乃與而君言汝何為者也毛遂按劒而前曰王之所以叱遂者以楚國之衆也今十歩之内王不得恃楚國之衆也王之命懸於遂手吾君在前叱者何也且遂聞湯以七十里之地王天下文王以百里之壤而臣諸侯豈其士卒衆多哉誠能據其勢而奮其威也今楚地方五千里持㦸百萬此霸王之資也以楚之彊天下弗能當白起小豎子耳率數萬之衆興師以與楚戰一戰而舉鄢郢再戰而燒夷陵三戰而辱王之先人此百世之怨而趙之所羞而王弗知惡焉合從者為楚非為趙也吾君在前叱者何也楚王曰唯唯誠若先生之言謹奉社稷以從毛遂曰從定乎楚王曰定矣毛遂謂楚王之左右曰取雞狗馬之血來毛遂奉銅盤而跪進之楚王曰王當歃血以定從次者吾君次者遂遂定從於殿上毛遂左手持盤血而右手招十九人曰公相與歃此血於堂下公等録録所謂因人成事者也平原君已定從而歸至於趙曰勝不敢復相天下士矣遂以毛遂為上客於是楚王使春申君將兵救趙魏王亦使將軍晉鄙將兵十萬救趙秦王使謂魏王曰吾攻趙旦暮且下諸侯敢救之者吾已㧞趙必移兵先撃之魏王恐遣人止晉鄙留兵壁鄴名為救趙實挾兩端又使將軍新垣衍間入邯鄲因平原君説趙王欲共尊秦為帝以却其兵齊人魯仲連在邯鄲聞之往見新垣衍曰彼秦者棄禮義而上首功之國也彼即肆然而為帝於天下則連有蹈東海而死耳不願為之民也且梁未賭秦稱帝之害故耳吾將使秦王烹醢梁王新垣衍怏然不恱曰先生惡能使秦王烹醢梁王魯仲連曰固也吾將言之昔者九侯鄂侯文王紂之三公也九侯有子而好獻之於紂紂以為惡醢九侯鄂侯爭之彊辨之疾故脯鄂侯文王聞之喟然而歎故拘之牖里之庫百日欲令之死今秦萬乗之國也梁亦萬乗之國也俱據萬乗之國各有稱王之名奈何睹其一戰而勝欲從而帝之卒就脯醢之地乎且秦無己而帝則將行其天子之禮以號令於天下則且變易諸侯之大臣彼將奪其所不肖而與其所賢奪其所憎而與其所愛彼又將使其子女讒妾為諸侯妃姬處梁之宮梁王安得晏然而已乎而將軍又何以得故寵乎新垣衍起再拜曰吾乃今知先生天下之士也吾請出不敢復言帝秦矣燕武成王薨子孝王立初魏公子无忌仁而下士致食客三千人魏有隱士曰矦嬴年七十家貧為大梁夷門監者公子置酒大㑹賔客坐定公子從車騎虚左自迎矦生矦生攝敝衣冠直上載公子上坐不讓公子執轡愈恭矦生又謂公子曰臣有客在市屠中願枉車騎過之公子引車入市矦生下見其客朱亥睥睨故乆立與其客語微察公子公子色愈和乃謝客就車至公子家公子引矦生坐上坐徧贊賔客賔客皆驚及秦圍趙趙平原君之夫人公子无忌之姊也平原君使者冠蓋相屬於魏讓公子曰勝所以自附於㛰姻者以公子之高義能急人之困也今邯鄲旦暮降秦而魏救不至縱公子輕勝棄之獨不憐公子姊邪公子患之數請魏王敕晉鄙令救趙及賔客辯士游説萬端王終不聽公子乃屬賔客約車騎百餘乗欲赴闘以死於趙過夷門見矦生矦生曰公子勉之矣老臣不能從公子去行數里心不快復還見矦生矦生笑曰臣固知公子之還也今公子無佗端而欲赴秦軍譬如以肉投餒虎何功之有公子再拜問計矦嬴屛人曰吾聞晉鄙兵符在王卧内而如姬最幸力能竊之嘗聞公子為如姬報其父仇如姬欲為公子死無所辭公子誠一開口則得虎符奪晉鄙之兵北救趙西却秦此五伯之功也公子如其言果得兵符公子行矦生曰將在外君令有所不受有如晉鄙合符而不授兵復請之則事危矣臣客朱亥其人力士可與俱晉鄙若聽大善不聽可使擊之於是公子請朱亥與俱至鄴晉鄙合符疑之舉手視公子曰吾擁十萬之衆屯於境上國今重任今單車來代之何如哉朱亥䄂四十斤鐵椎椎殺晉鄙公子遂勒兵下令軍中曰父子俱在軍中者父歸兄弟俱在軍中者兄歸獨子無兄弟者歸養得選兵八萬人將之而進王齕乆圍邯鄲不㧞諸侯來救戰數不利武安君聞之曰王不聽吾計今何如矣王聞之怒彊起武安君武安君稱病篤不肯起五十八年十月免武安君為士伍遷之隂宻十二月益發卒軍汾城旁武安君病未行諸矦攻王齕齕數却使者日至王乃使人遣武安君不得留咸陽中武安君出咸陽西門十里至杜郵王與應侯羣臣謀曰白起之遷意尚怏怏有餘言王乃使使者賜之劒武安君遂自殺秦人憐之鄉邑皆祭祀焉魏公子无忌大破秦師於邯鄲下王齕解邯鄲圍走鄭安平為趙所困將二萬人降趙應矦由是得罪公子无忌既存趙遂不敢歸魏與賔客留居趙使將將其軍還魏趙王與平原君計以五城封公子趙王掃除自迎執主人之禮引公子就西階公子側行辭讓從東階上自言辠過以負於魏無功於趙趙王與公子飲至暮口不忍獻五城以公子退讓也趙王以鄗為公子湯沐邑魏亦復以信陵奉公子公子聞趙有處士毛公隱於博徒薛公隱於賣漿家欲見之兩人不肯見公子乃閒歩從之游平原君聞而非之公子曰吾聞平原君之賢故背魏而救趙今平原君所與遊徒豪舉耳不求士也以无忌從此兩人遊尚恐其不我欲也平原君乃以為羞乎為裝欲去平原君免冠謝乃止平原君欲封魯連使者三返終不肯受又以千金為魯連壽魯連笑曰所貴於天下之士者為人排患釋難解紛亂而無取也即有取者是商賈之事也而連不忍為也遂辭平原君而去終身不復見秦太子之妃曰華陽夫人無子夏姫生子異人異人質於趙秦數伐趙趙人不禮之異人以庶孽孫質於諸侯車乗進用不饒居處困不得意陽翟大賈呂不韋適邯鄲見之曰此竒貨可居乃往見異人説曰吾能大子之門異人笑曰且自大君之門不韋曰子不知也吾門待子門而大異人心知所謂乃引與坐深語不韋曰秦王老矣太子愛華陽夫人夫人無子子之兄弟二十餘人子傒有承國之業士倉又輔之子居中不甚見幸乆質諸侯太子即位子不得爭為嗣矣異人曰然則奈何不韋曰能立適嗣者獨華陽夫人耳不韋雖貧請以千金為子西遊立子為嗣異人曰必如君䇿請得分秦國與君共之吕不韋乃以五百金與異人令結賔客復以五百金買竒物玩好自奉而西見華陽夫人之姊而以竒物獻於夫人因譽子異人之賢賔客徧天下常日夜泣思太子及夫人曰異人也以夫人為天夫人大喜不韋因使其姊説夫人曰夫以色事人者色衰則愛弛今夫人愛而無子不以繁華時蚤自結於諸子中賢孝者舉以為適即色衰愛弛雖欲開一言尚可得乎今子異人賢而自知中子不得為適夫人誠以此時㧞之是子異人無國而有國夫人無子而有子也則終身有寵於秦矣夫人以為然承間言於太子曰子異人絶賢來往者皆稱譽之因泣曰妾不幸無子願得子異人立以為嗣以託妾身太子許之與夫人刻玉符約以為嗣因厚餽遺異人而請呂不韋傅之異人名譽盛於諸侯呂不韋娶邯鄲姬絶美者與居知其有娠異人從不韋飲見而請之不韋佯怒既而獻之孕期年而生子政異人遂以為夫人邯鄲之圍趙人欲殺之異人與吕不韋行金六百斤予守者脫亡赴秦軍遂得歸異人楚服而見華陽夫人夫人曰吾楚人也當自子之因更其名曰楚五十九年秦將軍摎伐韓取陽城負黍斬首四萬伐趙取二十餘縣斬首虜九萬赧王恐倍秦與諸侯約從將天下鋭師出伊闕攻秦令無得通陽城秦王使將軍摎攻西周赧王入秦頓首受罪盡獻其邑三十六口三萬秦受其獻歸赧王於周是歲赧王崩資治通鑑卷第五
