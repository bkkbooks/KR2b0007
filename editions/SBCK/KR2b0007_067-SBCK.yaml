seq: 67
front:
  text: 不可卒拔不如擊長離諸羌長離諸羌多在遂軍必歸救其家若捨羌獨守則􅀌救長離則官兵得與野戰必可虜也淵乃留督將守輜重自將輕兵到長離攻燒羌屯遂果救長離諸將見遂兵衆欲結營作塹乃與戰淵曰我轉􅃲千里今復作營塹則士衆罷敝不可復用賊雖衆易與耳乃鼔之大破遂軍進圍興國氐王千萬犇馬超餘衆悉降轉擊髙平屠各皆破之三月詔魏公操位在諸矦王上改授金璽赤紱逺游冠
  hash: sha256:95ae433cdabf409466264178781b15032ac7650694c43d3013776db7225a920e
body:
  text: 夏四月旱五月雨水初魏公操遣廬江太守朱光屯晥大開稻田吕蒙言於孫權曰晥田肥美若一收孰彼衆必增宜早除之閏月權親攻晥城諸將欲作土山添攻具吕蒙曰治攻具及土山必歷日乃成城僃旣脩外救必至不可圖也且吾乗雨水以入若留經日水必向盡還道艱難蒙竊危之今觀此城不能甚固以三軍銳氣四面並攻不移時可拔及水以歸全勝之道也權從之蒙薦甘寜爲升城督寜手持練身縁城爲士卒先蒙以精銳繼之手執枹鼓士卒皆騰踊侵晨進攻食時破之獲朱光及男女數萬口旣而張遼至夾石聞城已拔乃退權拜吕蒙爲廬江太守還屯尋陽諸葛亮留關羽守荆州與張飛趙雲將兵泝流克巴東至江州破巴郡太守嚴顔生􅀗之飛呵顔曰大軍旣至何以不降而敢拒戰顔曰卿等無狀侵奪我州我州但有斷頭將軍無降將軍也飛怒令左右牽去斫頭顔容止不變曰斫頭便斫頭何爲怒邪飛壯而釋之引爲賔客分遣趙雲從外水定江陽犍爲飛定巴西德陽劉僃圍雒城且一年龐統爲流矢所中卒灋正牋與劉璋爲陳形勢彊弱且曰左將軍從舉兵以來舊心依依實無薄意愚以爲可圖變化以保尊門璋不答雒城潰僃進圍成都諸葛亮張飛趙雲引兵來㑹馬超知張魯不足與計事又魯將楊昂等數害其能超内懷於邑僃使建寜督郵李恢往􅀃之超遂從武都逃入氐中宻書請降於僃僃使人止超而潛以兵資之超到令引軍屯城北城中震怖僃圍城數十日使從事中郎涿郡簡雍入􅀃劉璋時城中尚有精兵三萬人榖帛支一年吏民咸欲死戰璋言父子在州二十餘年無恩德以加百姓百姓攻戰三年肌膏草野者以璋故也何心能安遂開城與簡雍同輿出降羣下莫不流涕僃遷璋于公安盡歸其財物佩振威將軍印綬僃入成都置酒大饗士卒取蜀城中金銀分賜將士還其榖帛僃領益州牧以軍師中郎將諸葛亮爲軍師將軍益州太守南郡董和爲掌軍中郎將並署左將軍府事偏將軍馬超爲平西將軍軍議校尉灋正爲蜀郡太守揚武將軍禆將軍􅀯陽黃忠爲討虜將軍從事中郎糜笁爲安漢將軍簡雍爲昭德將軍北海孫乾爲秉忠將軍廣漢長黃權爲偏將軍汝􅀯許靖爲左將軍長史龐羲爲司馬李嚴爲犍爲太守費觀爲巴郡太守山陽伊籍爲從事中郎零陵劉巴爲西曹􅁺廣漢彭羕爲益州治中從事初董和在郡清儉公直爲民夷所愛信蜀中推爲循吏故僃舉而用之僃之自新野犇江南也荆楚羣士從之如雲而劉巴獨北詣魏公操操辟爲􅁺遣招納長沙零陵桂陽㑹僃略有三郡巴事不成欲由交州道還京師時諸葛亮在臨蒸以書招之巴不從僃深以爲恨巴遂自交阯入蜀依劉璋及璋迎僃巴諌曰僃雄人也入必爲害旣入巴復諌曰若使僃討張魯是放虎於山林也璋不聽巴閉門稱疾僃攻成都令軍中曰有害巴者誅及三族及得巴甚喜是時益州郡縣皆望風景附獨黃權閉城堅守須璋稽服乃降於是董和黃權李嚴等本璋之所授用也吴懿費觀等璋之㛰親也彭羕璋之所擯弃也劉巴宿昔之所忌恨也僃皆處之顯任盡其器能有志之士無不競勸益州之民是以大和初劉璋以許靖爲蜀郡太守成都將潰靖謀踰城降僃僃以此薄靖不用也灋正曰天下有獲虚譽而無其實者許靖是也然今主公始創大業天下之人不可户􅀃宜加敬重以慰逺近之望僃乃禮而用之成都之圍也僃與士衆約若事定府庫百物􅀌無預焉及拔成都士衆皆捨干戈赴諸藏競取寳物軍用不足僃甚憂之劉巴曰此易耳但當鑄直百錢平諸物價令吏爲官市僃從之數月之閒府庫充實時議者欲以成都名田宅分賜諸將趙雲曰霍去病以匈奴未滅無用家爲今國賊非但匈奴未可求安也須天下都定各反桑梓歸耕本土乃其宜耳益州人民初罹兵革田宅皆可歸還令安居復業然可後役調得其歡心不宜奪之以私所愛也僃從之僃之襲劉璋也留中郎將南郡霍峻守葭萌城張魯遣楊昂誘峻求共守城峻曰小人頭可得城不可得昂乃退後璋將扶禁向存等帥萬餘人由閬水上攻圍峻且一年峻城中兵􅂊數百人伺其怠􅂩選精銳出擊大破之斬存僃旣定蜀乃分廣漢爲梓潼郡以峻爲梓潼太守灋正外統都畿内爲謀主一飱之德睚眦之怨無不報復擅殺毁傷己者數人或謂諸葛亮曰灋正太縱橫將軍宜啟主公抑其威福亮曰主公之在公安也北畏曹操之彊東憚孫權之逼近則懼孫夫人生變於肘腋灋孝直爲之輔翼令翻然翱翔不可復制如何禁止孝直使不得少行其意邪諸葛亮佐僃治蜀頗尚嚴峻人多怨歎者灋正謂亮曰昔高祖入􅀜約灋三章秦民知德今君假借威力跨據一州初有其國未垂惠撫且客主之義宜相降下願緩刑弛禁以慰其望亮曰君知其一未知其二秦以無道政苛民怨匹夫大呼天下土崩高祖因之可以􅀪濟劉璋暗弱自焉已來有累丗之恩文灋覊縻互相承奉德政不舉威刑不肅蜀土人士專權自恣君臣之道漸以陵替寵之以位位極則賤順之以恩恩竭則慢所以致敝實由於此吾今威之以灋灋行則知恩限之以爵爵加則知榮榮恩並濟上下有節爲治之要於斯而著矣劉僃以零陵蔣琬爲廣都長僃甞因游觀奄至廣都見琬衆事不治時又沈醉僃大怒將加罪戮諸葛亮請曰蔣琬社稷之器非百里之才也其爲政以安民爲本不以脩飾爲先願主公重加察之僃雅敬亮乃不加罪倉卒但免官而已秋七月魏公操擊孫權留少子臨葘矦植守鄴操爲諸子髙選官屬以邢顒爲植家丞顒防閑以禮無所屈橈由是不合庶子劉楨美文辭植親愛之楨以書諫植曰君矦採庶子之春華忘家丞之秋實爲上招謗其罪不小愚實懼焉魏尚書令荀攸卒攸深密有智防自從魏公操攻討常謀謨帷幄時人及子弟莫知其所言操甞稱荀文若之進善不進不休荀公逹之去惡不去不止又稱二荀令之論人乆而益信吾􅃿丗不忘初枹罕宋建因涼州亂自號河首平漢王改元置百官三十餘年冬十月魏公操使夏矦淵自興國討建圍枹罕拔之斬建淵别遣張郃等渡河入小湟中河西諸羌皆降隴右平帝自都許以來守位而已左右侍衞莫非曹氏之人者議郎趙彦甞爲帝陳言時策魏公操惡而殺之操後以事入見殿中帝不任其懼因曰君若能相輔則厚不爾幸垂恩相捨操失色俛仰求出舊儀三公領兵朝見令虎賁執刃挾之操出顧左右汗流浹背自後不復朝請董承女爲貴人操誅承求貴人殺之帝以貴人有􅗖累爲請不能得伏皇后由是懷懼乃與父完書言曹操殘逼之狀令宻圖之完不敢發至是事乃泄操大怒十一月使御史大夫郗慮持節策收皇后璽綬以尚書令華歆爲副勒兵入宫收后后閉户藏壁中歆壞户發壁就牽后出時帝在外殿引慮於坐后被髮徒跣行泣過訣曰不能復相活邪帝曰我亦不知命在何時顧謂慮曰郗公天下寧有是邪遂將后下􅁀室以幽死所生二皇子皆酖殺之兄弟及宗族死者百餘人十二月魏公操至孟津操以尚書郎髙柔爲理曹椽舊灋軍征士亡考竟其妻子而亡者猶不息操欲更重其刑并及父母兄弟柔啓曰士卒亡軍誠在可疾然竊聞其中時有悔者愚謂乃宜貸其妻子一可使誘其還心正如前科固已絶其意望而猥復重之柔恐自今在軍之士見一人亡逃誅將及己亦且相隨而走不可復得殺也此重刑非所以止亡乃所以益走耳操曰善即止不殺二十年春正月甲子立貴人曹氏爲皇后魏公操之女也三月魏公操自將擊張魯將自武都入氐氐人塞道遣張郃朱靈等攻破之夏四月操自陳倉出散􅀜至河池氐王竇茂衆萬餘人恃險不服五月攻屠之西平金城諸將麴演蔣石等共斬送韓遂首初劉僃在荆州周瑜甘寧等數勸孫權取蜀權遣使謂僃曰劉璋不武不能自守若使曹操得蜀則荆州危矣今欲先攻取璋次取張魯一統􅀯方雖有十操無所憂也僃報曰益州民富地險劉璋雖弱足以自守今􅁀師於蜀漢轉運於萬里欲使戰克攻取舉不失利此孫吴所難也議者見曹操失利於赤壁謂其力屈無復逺念今操三分天下已有其二將欲飲馬於滄海觀兵於吳㑹何肯守此坐須老乎而同盟無故自相攻伐借樞於操使敵承其隙非長計也且備與璋託為宗室冀憑英靈以匡漢朝今璋得罪於左右僃獨悚懼非所敢聞願加寛貸權不聽遣孫瑜率水軍住夏口僃不聽軍過謂瑜曰汝欲取蜀吾當被髮入山不失信於天下也使􅀜羽屯江陵張飛屯秭歸諸葛亮據南郡僃自住孱陵權不得巳召瑜還及僃西攻劉璋權曰猾虜乃敢挾詐如此僃留􅀜羽守江陵魯肅與羽鄰界羽數生疑貳肅常以歡好撫之及僃巳得益州權令中司馬諸葛瑾從僃求荆州諸郡僃不許曰吾方圖凉州凉州定乃盡以荆州相與耳權曰此假而不反乃欲以虚辭引歳也遂置長沙零陵桂陽三郡長吏􅀜羽盡逐之權大怒遣吕蒙督兵二萬以取三郡蒙移書長沙桂陽皆望風歸服惟零陵太守郝普城守不降劉僃聞之自蜀親至公安遣􅀜羽爭三郡孫權進住陸口爲諸軍節度使魯肅將萬人屯益陽以拒羽飛書召吕䝉使捨零陵急還助肅䝉得書祕之夜召諸將授以方略晨當攻零陵顧謂郝普故人􅀯陽鄧玄之曰郝子太聞丗間有忠義事亦欲爲之而不知時也今左將軍在漢中爲夏矦淵所圍􅀜羽在􅀯郡至尊身自臨之彼方首尾倒縣救死不給豈有餘力復營此哉今吾計力度慮而以攻此曾不移日而城必破城破之後身死何益於事而令百歲老母戴白受誅豈不痛哉度此家不得外問謂援可恃故至於此耳君可見之爲陳禍福玄之見普具宣蒙意普懼而出降蒙迎執其手與俱下􅂳語畢出書示之因拊手大笑普見書知僃在公安而羽在益陽慙恨入地蒙留孫河委以後事即日引軍赴益陽魯肅欲與關羽會語諸將疑恐有變議不可往肅曰今日之事宜相開譬劉僃􅀒國是非未決羽亦何敢重欲干命乃邀羽相見各駐兵馬百歩上但諸將軍單刀俱㑹肅因責數羽以不返三郡羽曰烏林之􅃥左將軍身在行閒戮力破敵豈得徒勞無一塊土而足下來欲收地邪肅曰不然始與豫州覲於長阪豫州之衆不當一校計窮慮極志埶摧弱圖欲逺竄望不及此主上矜愍豫州之身無有處所不愛土地士民之力使有所庇􅄻以濟其患而豫州私獨飾情愆德墮好今已藉手於西州矣又欲翦并荆州之土斯蓋凡夫所不忍行而況整領人物之主乎羽無以荅㑹聞魏公操將攻漢中劉僃懼失益州使使求和於權權令諸葛瑾報命更尋盟好遂分荆州以湘水爲界長沙江夏桂陽以東屬權南郡零陵武陵以西屬僃諸葛瑾每奉使至蜀與其弟亮但公㑹相見退無私面秋七月魏公操至陽平張魯欲舉漢中降其弟衞不肯率衆數萬人拒􅀜堅守橫山築城十餘里初操承凉州從事及武都降人之辭􅀃張魯易攻陽平城下南北山相逺不可守也信以爲然及往臨履不如所聞乃歎曰他人商度少如人意攻陽平山上諸屯山峻難登旣不時拔士卒傷夷者多軍食且盡操意沮便欲拔軍截山而還遣大將軍夏矦惇將軍許褚呼山上兵還㑹前軍夜迷惑誤入張衛别營營中大驚退散侍中辛毗主簿劉曄等在兵後語惇禇言官兵已據得賊要屯賊已散走猶不信之悙前自見乃還白操進兵攻衞衞等夜遁張魯聞陽平已䧟欲降閻圃曰今以迫往功必輕不如依杜濩赴朴胡與相拒然後委質功必多乃犇南山入巴中左右欲悉燒寶貨倉庫魯曰本欲歸命國家而意未得逹今之走避銳鋒非有惡意寶貨倉庫國家之有遂封藏而去操入􅀯鄭甚嘉之又以魯本有善意遣人慰喻之丞相主簿司馬懿言於操曰劉僃以詐力虜劉璋蜀人未附而逺爭江陵此機不可失也今克漢中益州震動進兵臨之勢必瓦解聖人不能違時亦不可失時也操曰人苦無足旣得隴復望蜀邪劉曄曰劉僃人傑也有度而遲得蜀日淺蜀人未恃也今破漢中蜀人震恐其勢自傾以公之神明因其傾而壓之無不克也若小緩之諸葛亮明於治國而爲相關羽張飛勇冠三軍而爲將蜀民旣定據險守要則不可犯矣今不取必爲後憂操不從居七日蜀降者􅀃蜀中一日數十驚守將雖斬之而不能安也操問曄曰今尚可擊不曄曰今已小定未可擊也乃還以夏矦淵爲都護將軍督張郃徐晃等守漢中以丞相長史杜襲爲駙馬都尉留督漢中事襲綏懷開導百姓自樂出徙洛鄴者八萬餘口八月孫權率衆十萬圍合肥時張遼李典樂進將七千餘人屯合肥魏公操之征張魯也爲教與合肥護軍薛悌署函邊曰賊至乃發及權至發教教曰若孫權至者張李將軍出戰樂將軍守護軍勿得與戰諸將以衆寡不敵疑之張遼曰公逺征在外比救至彼破我必矣是以教指及其未合逆擊之折其盛勢以安衆心然後可守也進等莫對遼怒曰成敗之機在此一戰諸君若疑遼將獨决之李典素與遼不睦􅁣然曰此國家大事顧君計何如耳吾可以私憾而忘公義乎請從君而出於是遼夜募敢從之士得八百人椎牛犒饗明旦遼被甲持㦸先登䧟陣殺數十人斬二大將大呼自名衝壘入至權麾下權大驚不知所爲走登髙􅃁以長㦸自守遼叱權下戰權不敢動望見遼所將衆少乃聚圍遼數重遼急擊圍開將麾下數十人得出餘衆號呼曰將軍棄我乎遼復還突圍拔出餘衆權人馬皆披靡無敢當者自旦戰至日中呉人奪氣乃還脩守僃衆心遂安權守合肥十餘日城不可拔徹軍還兵皆就路權與諸將在逍遥津北張遼覘望知之即將歩􅀐奄至甘寜與吕􅀩等力戰扞敵凌統率親近扶權出圍復還與遼戰左右盡死身亦被創度權已免乃還權乗駿馬上津橋橋􅀯已徹丈餘無版親近監谷利在馬後使權持鞍緩控利於後著鞭以助馬勢遂得超度賀齊率三千人在津􅀯迎權權由是得免權入大船宴飲賀齊下席涕泣曰至尊人主常當持重今日之事幾致禍敗羣下震怖若無天地願以此爲終身之誡權自前收其淚曰大慙謹已刻心非但書紳也九月巴賨夷帥朴胡杜濩任約各舉其衆來附於是分巴郡以胡爲巴東太守濩爲巴西太守約爲巴郡太守皆封列矦冬十月始置名號矦以賞軍功十一月張魯將家屬出降魏公操逆拜魯鎭􅀯將軍待以客禮封閬中矦邑萬戸封魯五子及閻圃等皆爲列矦習鑿齒論曰閻圃諫魯勿王而曹公追封之將來之人孰不思順塞其本源而末流自止其此之謂與若乃不明於此而重焦爛之功豐爵厚賞止於死戰之士則民利於有亂俗競於殺伐阻兵杖力干戈不戢矣曹公之此封可謂知賞罰之本矣程銀矦選龐悳皆隨魯降魏公操復銀選官爵拜惪立義將軍張魯之走巴中也黃權言於劉僃曰若失漢中則三巴不振此爲割蜀之股臂也僃乃以權爲護軍率諸將迎魯魯已降權遂擊朴胡杜濩任約破之魏公操使張郃督諸軍徇三巴欲徙其民於漢中進軍宕渠劉僃使巴西太守張飛與郃相拒五十餘日飛襲擊郃大破之郃走還􅀯鄭僃亦還成都操徙出故韓遂馬超等兵五千餘人使平難將軍殷署等督領以扶風太守趙儼爲􅀜中護軍操使儼發千二百兵助漢中守禦殷署督送之行者不樂儼護送至斜谷口還未至營署軍叛亂儼自隨歩􅀐百五十人皆叛者親黨也聞之各驚被甲持兵不復自安儼徐諭以成敗慰勵懇切皆慷􅁣曰死生當隨護軍不敢有二前到諸營各召料簡諸姦結叛者八百餘人散在原野儼下令惟取其造謀魁率治之餘一不問郡縣所收送皆放遣乃即相率還降儼密白冝遣將詣大營請舊兵鎭守􅀜中魏公操遣將軍劉柱將二千人往當須到乃發遣俄而事露諸營大駭不可安諭儼遂宣言當差留新兵之温厚者千人鎭守􅀜中其餘悉遣東便見主者内諸營兵名籍立差别之留者意定與儼同心其當去者亦不敢動儼一日盡遣上道因使所留千人分布羅落之東兵尋至乃復脅諭并徙千人令相及共東凡所全致二萬餘口二十一年春二月魏公操還鄴夏五月進魏公操爵爲王初中尉崔琰薦鉅鹿楊訓於操操禮辟之及操進爵訓發表稱頌功德或笑訓希世浮僞謂琰爲失所舉琰從訓取表草視之與訓書曰省表事佳耳時乎時乎㑹當有變時琰本意譏論者好譴呵而不尋情理也時有與琰􅀫不平者白琰傲世怨謗意㫖不遜操怒收琰付獄髠爲徒􅀠前白琰者復白之云琰爲徒對賔客虬須直視若有所瞋遂賜琰死尚書僕射毛玠傷琰無辜心不恱人復白玠怨謗操收玠付獄侍中􅁊階和洽皆爲之陳理操不聽階求案實其事王曰言事者白玠不但謗吾也乃復爲崔琰觖望此􅂢君臣恩義妄爲死友怨歎殆不可忍也洽曰如言事者言玠罪過深重非天地所覆載臣非敢曲理玠以枉大倫也以玠歷年荷寵剛直忠公爲衆所憚不宜有此然人情難保要冝考覈兩驗其實今聖恩不忍致之于理更使曲直之分不明操曰所以不考欲兩全玠及言事者耳洽對曰玠信有謗主之言當肆之市朝若玠無此言言事者加誣大臣以誤主聽不加檢覈臣竊不安操卒不窮治玠遂免黜終於家是時西曹􅁺沛國丁儀用事玠之獲罪儀有力焉羣下畏之側目尚書僕射何夔及東曹屬東莞徐弈獨不事儀儀譛弈出爲魏郡太守賴􅁊階左右之得免尚書傅選謂何夔曰儀已害毛玠子冝少下之夔曰爲不義適足害其身焉能害人且懷姦佞之心立於明朝其得久乎崔琰從弟林嘗與陳羣共論冀州人士稱琰爲首羣以智不存身貶之林曰大丈夫爲有邂逅耳即如卿諸人良足貴乎五月己亥朔日有食之代郡烏􅁊三大人皆稱單于恃力驕恣太守不能治魏王操以丞相倉曹屬裴潜爲太守欲授以精兵潜曰單于自知放横日乆今多將兵往必懼而拒境少將則不見憚宜以計謀圖之遂單車之郡單于驚喜潜撫以恩威單于讋服初􅀯匈奴乆居塞内與編户大同而不輸貢賦議者恐其戸口滋蔓浸難禁制宜豫爲之防秋七月南單于呼厨泉入朝于魏魏王操因留之於鄴使右賢王去卑監其國單于歳給綿絹錢榖如列矦子孫傳襲其號分其衆爲五部各立其貴人爲帥選漢人爲司馬以監督之八月魏以大理鍾繇爲相國冬十月魏王操治兵擊孫權十一月至譙資治通鑑卷第六十七
