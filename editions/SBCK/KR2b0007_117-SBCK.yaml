body:
  text: 青冀二州刺史劉敬宣參軍司馬道賜宗室之疏屬也聞太尉裕攻司馬休之道賜與同府辟閭道秀左右小將王猛子謀殺敬宣據廣固以應休之乙夘敬宣召道秀屏人語左右悉出户猛子逡巡在後取敬宣備身刀殺敬宣文武佐吏即時討道賜等皆斬之己夘魏主嗣北巡西秦王熾磐子元基自長安逃歸熾磐以為尚書左僕射五月丁亥魏主嗣如大甯趙倫之沈林子破魯軌於石城司馬休之魯宗之救之不及遂與軌犇襄陽宗之參軍李應之閉門不納甲午休之宗之軌及譙王文思新蔡王道賜梁州刺史馬敬南陽太守魯範俱犇秦宗之素得士民心爭為之衛送出境王鎮惡等追之盡境而還初休之等求救於秦魏秦征虜將軍姚成王及司馬國璠引兵至南陽魏長孫嵩至河東聞休之等敗皆引還休之至長安秦王興以為楊州刺史使侵擾襄陽侍御史唐盛言於興曰據符䜟之文司馬氏當復得河洛今使休之擅兵於外猶縱魚於淵也不如以高爵厚禮留之京師興曰昔文王卒免羑里高祖不斃鴻門茍天命所在誰能違之脱如符䜟之言留之適足為害遂遣之詔加太尉裕太傅揚州牧劒履上殿入朝不趨贊拜不名以兖青二州刺史劉道憐為都督荆湘益秦寜梁雍七州諸軍事驃騎將軍荆州刺史道憐貪鄙無才能裕以中軍長史晉陵太守謝方明為驃騎長史南郡相命道憐府中衆事皆諮決於方明方明冲之子也益州刺史朱齡石遣使詣河西王蒙遜諭以朝廷威徳蒙遜遣舎人黃迅詣齡石且上表言伏聞車騎將軍裕欲清中原願為右翼驅除戎虜夏王勃勃遣御史中丞烏洛孤與蒙遜結盟蒙遜遣其弟湟河太守漢平莅盟于夏西秦王熾磐帥衆三萬襲湟河沮渠漢平拒之遣司馬隗仁夜出擊熾磐破之熾磐將引去漢平長史焦昶將軍段景潜召熾磐熾磐復攻之昶景因説漢平出降仁勒壯士百餘據南門樓三日不下力屈為熾磐所禽熾磐欲斬之散騎常侍武威段暉諫曰仁臨難不畏死忠臣也宐宥之以厲事君乃囚之熾磐以左衛將軍匹達為湟河太守擊乙弗窟乾降其三千餘戸而歸以尚書右僕射出連䖍為都督嶺北諸軍事涼州刺史以涼州刺史謙屯為鎮軍大將軍河州牧隗仁在西秦五年段暉又為之請熾磐免之使還姑臧戊午魏主嗣行如濡源遂至上谷涿鹿廣甯秋七月癸未還平城西秦王熾磐以秦州刺史曇達為尚書令光禄勲王松夀為秦州刺史辛亥晦日有食之八月甲子太尉裕還建康固辭太傅州牧其餘受命以豫章公世子義符為兖州刺史丁未謝裕卒以劉穆之為左僕射九月己亥大赦魏比歳霜旱雲代之民多饑死太史令王亮蘇坦言於魏主嗣曰案䜟書魏當都鄴可得豐樂嗣以問羣臣博士祭酒崔浩特進京兆周澹曰遷都於鄴可以救今年之饑非久長之計也山東之人以國家居廣漢之地謂其民畜無涯號曰牛毛之衆今留兵守舊都分家南徙不能滿諸州之地參居郡縣情見事露恐四方皆有輕侮之心且百姓不便水土疾疫死傷者必多又舊都守兵既少屈丐柔然將有窺窬之心舉國而來雲中平城必危朝廷隔恒代千里之險難以赴救此則聲實俱損也今居北方假令山東有變我輕騎南下布濩林薄之間孰能知其多少百姓望塵懾服此國家所以威制諸夏也來春草生湩酪將出兼以菜菓得及秋熟則事濟矣嗣曰今倉廩空竭既無以待來秋若來秋又饑將若之何對曰宐簡饑貧之戸使就􅂖山東若來秋復饑當更圗之但方今不可遷都耳嗣恱曰唯二人與朕意同乃簡國人尤貧者詣山東三州就食遣左部尚書代人周幾帥衆鎮魯口以安集之嗣躬耕藉田且命有司勸課農桑明年大熟民遂富安夏赫連建將兵擊秦執平涼太守姚周都遂入新平廣平公弼與戰於龍尾堡禽之秦王興藥動廣平公弼稱疾不朝聚兵於第興聞之怒收弼黨唐盛孫􅀇等殺之太子􅇦請曰臣不肖不能緝諧兄弟使至於此皆臣之罪也若臣死而國家安願賜臣死若陛下不忍殺臣乞退就藩興惻然憫之召姚讚梁喜尹昭斂曼嵬與之謀囚弼將殺之窮治黨與􅇦流涕固請乃并其黨赦之􅇦待弼如初無忿恨之色魏太史奏熒惑在匏􅀲中忽亡不知所在於灋當入危亡之國先為童謠妖言然後行其禍罰魏主嗣召名儒十餘人使與太史議熒惑所詣崔浩對曰按春秋左氏傳神降于莘以其至之日推知其物庚午之夕辛未之朝天有隂雲熒惑之亡當在二日庚之與午皆主於秦辛為西夷今姚興據長安熒惑必入秦矣衆皆怒曰天上失星人間安知所詣浩笑而不應後八十餘日熒惑出東井留守句已久之乃去秦大旱昆明池竭童謠訛言國人不安間一歳而秦亡衆乃服浩之精妙冬十月壬子秦王興使散騎常侍姚敞等送其女西平公主于魏魏主嗣以后禮納之鑄金人不成乃以為夫人而寵遇甚厚辛酉魏主嗣如沮洳城癸亥還平城十一月丁亥復如豺山宫庚子還西秦王熾磐遣襄武矦曇達等將騎一萬擊南羌彌姐康薄于赤水降之以王孟保為略陽太守鎮赤水燕尚書令孫護之弟伯仁為昌黎尹與其弟叱支乙拔皆有才勇從燕王跋起兵有功求開府不得有怨言跋皆殺之進䕶開府儀同三司録尚書事以慰其心䕶怏怏不恱跋酖殺之遼東太守務銀提自以有功出為邊郡怨望謀外叛跋亦殺之林邑冦交州州將擊敗之十二年春正月甲申魏主嗣如豺山宫戊子還平城加太尉裕兖州刺史都督南秦州凡都督二十二州以世子義符為豫州刺史秦王興使魯宗之將兵宼襄陽未至而卒其子軌引兵入宼雍州刺史趙倫之擊敗之西秦王熾磐攻秦洮陽公彭利和於漒川沮渠蒙遜攻石泉以救之熾磐至沓中引還二月熾磐遣襄武矦曇達救石泉蒙遜亦引去蒙遜遂與熾磐結和親秦王興如華隂使太子􅇦監國入居西宫興疾篤還長安黄門侍郎尹冲謀因􅇦出迎而殺之興至􅇦將出迎宫臣諫曰主上疾篤姦臣在側殿下今出進不得見主上退有不測之禍􅇦曰臣子聞君父疾篤而端居不出何以自安對曰全身以安社稷孝之大者也􅇦乃止尚書姚沙彌謂尹冲曰太子不出迎宐奉乗輿幸廣平公第宿衛將士聞乗輿所在自當來集太子誰與守乎且吾屬以廣平公之故已陷名逆節將何所自容今奉乗輿以舉事乃杖大順不惟救廣平之禍吾屬前罪亦盡雪矣冲以興死生未可知欲隨興入宫作亂不用沙彌之言興入宫命太子􅇦録尚書事東平公紹及右衛將軍胡翼度典兵禁中防制内外遣殿中上將軍斂曼嵬收弼第中甲仗内之武庫興疾轉篤其妹南安長公主問疾不應幼子耕兒出吿其兄南陽公愔曰上已崩矣宐速決計愔即與尹冲帥甲士攻端門斂曼嵬胡翼度等勒兵閉門拒戰愔等遣壯士登門縁屋而入及于馬道􅇦侍疾在諮議堂太子右衛率姚和都帥東宫兵入屯馬道南愔等不得進遂燒端門興力疾臨前殿賜弼死禁兵見興喜躍爭進赴賊賊衆驚擾和都以東宫兵自後擊之愔等大敗愔逃于驪山其黨建康公吕隆犇雍尹冲及弟􅇦來犇興引東平公紹及姚讚梁喜􅐫昭斂曼嵬入内寢受遺詔輔政明日興卒􅇦祕不發喪捕南陽公愔及吕隆大將軍尹元等皆誅之乃發喪即皇帝位大赦改元永和􅇦命齊公恢殺安定太守吕超恢猶豫久之乃殺之􅇦疑恢有貳心恢由是懼隂聚兵謀作亂􅇦葬興于偶陵諡曰文􅁊皇帝廟號髙祖初興徙李閏羌三千戸於安定興卒羌酋党容叛􅇦遣撫軍將軍姚讚討降之徙其酋豪于長安餘遣還李閏北地太守毛雍據趙氏塢以叛東平公紹討禽之時姚宣鎮李閏參軍韋宗聞毛雍叛説宣曰主上新立威徳未著國家之難未可量也殿下不可不為深慮邢望險要宐徙據之此霸王之資也宣従之帥户三萬八千棄李閏南保邢望諸羌據李閏以叛東平公紹進討破之宣詣紹歸罪紹殺之二月加太尉裕中外大都督裕戒嚴將伐秦詔加裕領司豫二州刺史以其世子義符為徐兖二州刺史琅邪王徳文請啓行戎路脩敬山陵詔許之夏四月壬子魏大赦改元泰常西秦襄武矦曇達等擊秦秦州刺史姚艾於上邽破之徙其民五千餘戸於枹罕五月癸巳加太尉裕領北雍州刺史六月丁巳魏主嗣北巡并州胡數萬落叛秦入于平陽推匈奴曹􅀪為大單于攻立義將軍姚成都于匈奴堡征東將軍姚懿自蒲阪討之執􅀪送長安徙其豪右萬五千落于雍州氐王楊盛攻秦祁山拔之進逼秦州秦後將軍姚平救之盛引兵退平與上邽守將姚嵩追之夏王勃勃帥騎四萬襲上邽未至嵩與盛戰於竹嶺敗死勃勃攻上邽二旬克之殺秦州刺史姚軍都及將士五千餘人因毁其城進攻隂宻又殺秦將姚良子及將士萬餘人以其子昌為雍州刺史鎮隂宻征北將軍姚恢棄安定犇還長安安定人胡儼等帥戸五萬據城降於夏勃勃使鎮東將軍羊茍兒將鮮卑五千鎮安定進攻秦鎮西將軍姚諶于雍城諶委鎮犇長安勃勃據雍進掠郿城秦東平公紹及征虜將軍尹昭等將步騎五萬擊之勃勃退趨安定胡儼閉門拒之殺羊茍兒及所將鮮卑復以安定降秦紹進擊勃勃於馬鞍阪破之追至朝那不及而還勃勃歸杏城楊盛復遣兄子倦擊秦至陳倉秦斂曼嵬擊却之夏王勃勃復遣兄子提南侵泄陽秦車騎將軍姚裕等擊却之涼司馬索承明上書勸涼公暠伐河西王蒙遜暠引見謂之曰蒙遜為百姓患孤豈忘之顧勢力未能除耳卿有必禽之䇿當為孤陳之直唱大言使孤東討此與言石虎小豎宐肆諸市朝者何異承明慙懼而退秋七月魏主嗣大獵於牛川臨殷繁水而還戊戌至平城八月丙午大赦寕州獻琥珀枕於太尉裕裕以琥珀治金創得之大喜命碎擣分賜北征將士裕以世子義符為中軍將軍監太尉留府事劉穆之為左僕射領監軍中軍二府軍司入居東府揔攝内外以太尉左司馬東海徐羨之為穆之之副左將軍朱齡石守衛殿省徐州刺史劉懐慎守衛京師揚州别駕從事史張裕任留州事懐慎懐敬之弟也劉穆之内揔朝政外供軍旅決㫁如流事無擁滯賓客輻湊求訴百端内外諮稟盈堦滿室目覽辭訟手答牋書耳行聽受口並酬應不相參涉悉皆贍舉又喜賓客言談賞笑彌日無倦裁有閑暇手自冩書尋覽校定性奢豪食必方丈旦輒為十人饌未嘗獨餐嘗白􅁉曰穆之家本貧賤贍生多闕自叨忝以來雖每存約損而朝夕所須微為過豐自此外一毫不以負公中軍諮議參軍張邵言於裕曰人生危脆必當逺慮穆之若邂逅不幸誰可代之尊業如此茍有不諱處分云何裕曰此自委穆之及卿耳丁巳裕發建康遣龍驤將軍王鎮惡冠軍將軍檀道濟將步軍自淮淝向許洛新野太守朱超石寧朔將軍胡藩趨陽城振武將軍沈田子建威將軍傅􅀪之趨武關建武將軍沈林子彭城内史劉遵考將水軍出石門自汴入河以冀州刺史王仲徳督前鋒諸軍開鉅野入河遵考裕之族弟也劉穆之謂王鎮惡曰公今委卿以伐秦之任卿其勉之鎮惡曰吾不克關中誓不復濟江裕既行青州刺史檀祇自廣陵輒帥衆至涂中掩討亡命劉穆之恐祇為變議欲遣軍時檀韶為江州刺史張邵曰今韶據中流道濟為軍首若有相疑之跡則太府立危不如逆遣慰勞以觀其意必無患也穆之乃止初魏主嗣使公孫表討白亞栗斯曰必先與秦洛陽戍將相聞使備河南岸然後擊之表未至胡人廢白亞栗斯更立劉虎為率善王表以胡人内自攜貳勢必敗散遂不吿秦將而擊之大為虎所敗士卒死傷甚衆嗣謀於羣臣曰胡叛踰年討之不克其衆繁多為患日深今盛秋不可復發兵妨民農務將若之何白馬矦崔宏曰胡衆雖多無徤將御之終不能成大患表等諸軍不為不足但灋令不整處分失宐以致敗耳得大將素有威望者將數百騎往攝表軍無不克矣相州刺史叔孫建前在并州為胡魏所畏服諸將莫及可遣也嗣從之以建為中領軍督表等討虎九月戊午大破之斬首萬餘級虎及司馬順宰皆死俘其衆十萬餘口太尉裕至彭城加領徐州刺史以太原王􅀇謨為從事史初王廞之敗也沙門曇永匿其幼子華使提衣襆自隨津邏疑之曇永呵華曰奴子何不速行棰之數十由是得免遇赦還呉以其父存亡不測布衣蔬食絶交逰不仕十餘年裕聞華賢欲用之乃發廞喪使華制服服闋辟為徐州主簿王鎮惡檀道濟入秦境所向皆捷秦將王苟生以漆丘降鎮惡徐州刺史姚掌以項城降道濟諸屯守皆望風􅅃附惟新蔡太守董遵不下道濟攻拔其城執遵殺之進克許昌獲秦潁川太守姚垣及大將楊業沈林子自汴入河襄邑人董神虎聚衆千餘人來降太尉裕板為參軍林子與神虎共攻倉垣克之秦兖州刺史韋華降神虎擅還襄邑林子殺之秦東平公紹言於秦主􅇦曰晉兵已過許昌安定孤逺難以救衛宐遷其鎭戸内實京畿可得精兵十萬雖晉夏交侵猶不亡國不然晉攻豫州夏攻安定將若之何事機已至宐在速決左僕射梁喜曰齊公恢有威名為嶺北所憚鎮人已與勃勃深仇理應守死無貳勃勃終不能越安定逺宼京畿若無安定虜馬必至於郿今闗中兵足以拒晉無為豫自損削也􅇦從之吏部郎懿横宻言於􅇦曰恢於廣平之難有忠勲於陛下自陛下龍飛紹統未有殊賞以答其意今外則致之死地内則不豫朝權安定人自以孤危逼寇思南遷者十室而九若恢擁精兵數萬鼓行而向京師得不為社稷之累乎宐徴還朝廷以慰其心􅇦曰恢若懐不逞之心徴之適所以速禍耳又不從王仲徳水軍入河將逼滑臺魏兖州刺史尉建畏懦帥衆棄城北渡河仲徳入滑臺宣言曰晉本欲以布帛七萬匹假道於魏不謂魏之守將棄城遽去魏主嗣聞之遣叔孫建公孫表自河内向枋頭因引兵濟河斬尉建於城下投尸于河呼仲徳軍人問以侵寇之狀仲徳使司馬笁和之對曰劉太尉使王征虜自河入洛清掃山陵非敢為寇於魏也魏之守將自棄滑臺去王征虜借空城以息兵行當西引於晉魏之好無廢也何必揚旗鳴鼓以曜威乎嗣使建以問太尉裕裕遜辭謝之曰洛陽晉之舊都而羌據之晉欲修復山陵久矣諸􅁊宗族司馬休之國璠兄弟魯宗之父子皆晉之蠧也而羌收之以為晉患今晉將伐之欲假道於魏非敢為不利也魏河内鎮將于栗磾有勇名築壘於河上以備侵軼裕以書與之題曰黑矟公麾下栗磾好操黑矟以自標故裕以此目之魏因拜栗磾為黑矟將軍冬十月壬戌魏主嗣如豺山宫初燕將庫傉官斌降魏既而復叛歸燕魏主嗣遣驍騎將軍延普渡濡水擊斌斬之遂攻燕幽州刺史庫傉官昌征北將軍庫傉官提皆斬之秦陽城滎陽二城皆降晉兵進至成臯秦征南將軍陳留公洸鎮洛陽遣使求救於長安秦主􅇦遣越騎校尉閻生帥騎三千救之武衛將軍姚益男將步卒一萬助守洛陽又遣并州牧姚懿南屯陜津為之聲援寧朔將軍趙􅀇言於洸曰今晉宼益深人情駭動衆寡不敵若出戰不捷則大事去矣宐攝諸戍之兵固守金墉以待西師之救金墉不下晉必不敢越我而西是我不戰而坐收其弊也司馬姚禹隂與檀道濟通主簿閻恢楊䖍皆禹之黨也共嫉􅀇言於洸曰殿下以英武之略受任方面今嬰城示弱得無為朝廷所責乎洸以為然乃遣趙􅀇將兵千餘南守栢谷塢廣武將軍石無諱東戍鞏城􅀇泣謂洸曰􅀇受三帝重恩所守正有死耳但明公不用忠臣之言為姦人所誤後必悔之既而成臯虎牢皆來降檀道濟等長驅而進無諱至石關犇還龍驤司馬滎陽毛徳祖與􅀇戰於栢谷􅀇兵敗被十餘創據地大呼􅀇司馬蹇鑒冒刃抱􅀇而泣􅀇曰吾創已重君宐速去鑒曰將軍不濟鑒去安之與之皆死姚禹踰城犇道濟甲子道濟進逼洛陽丙寅洸出降道濟獲秦人四千餘人議者欲盡阬之以為京觀道濟曰伐罪弔民正在今日皆釋而遣之於是夷夏感恱歸之者甚衆閻生姚益男未至聞洛陽已没不敢進己丑詔遣兼司空髙宻王恢之脩謁五陵置守衛太尉裕以冠軍將軍毛脩之為河南河内二郡太守行司州事戍洛陽西秦王熾磐使秦州刺史王松夀鎮馬頭以逼秦之上邽十一月甲戌魏主嗣還平城太尉裕遣左長史王􅀪還建康諷朝廷求九錫時劉穆之掌留任而㫖從北來穆之由是愧懼發病􅀪珣之子也十二月壬申詔以裕為相國揔百揆揚州牧封十郡為宋公備九錫之禮位在諸矦王上領征西將軍司豫北徐雍四州刺史如故裕辭不受西秦王熾磐遣使詣太尉裕求擊秦以自効裕拜熾磐平西將軍河南公秦姚懿司馬孫暢説懿使襲長安誅東平公紹廢秦主􅇦而代之懿以為然乃散穀以賜河北夷夏欲樹私恩左常侍張敞侍郎左雅諫曰殿下以母弟居方面安危休戚與國同之今呉寇内侵四州傾没西虜擾邊秦涼覆敗朝廷之危有如累卯穀者國之本也而殿下無故散之虛損國儲將若之何懿怒笞殺之􅇦聞之召東平公紹宻與之謀紹曰懿性識鄙淺從物推移造此謀者必孫暢也但馳使徴暢遣撫軍將軍讚據陜城臣向潼關為諸軍節度若暢奉詔而至臣當遣懿帥河東見兵共禦晉帥若不受詔命便當聲其罪而討之􅇦曰叔父之言社稷之計也乃遣姚讃及冠軍將軍司馬國璠建義將軍虵􅀇屯陜津武衛將軍姚驢屯潼闗懿遂舉兵稱帝傳檄州郡欲運匈奴堡穀以給鎮人寧東將軍姚成都拒之懿卑辭誘之送佩刀為誓成都不従懿遣驍騎將軍王國帥甲士數百攻成都成都擊禽之遣使讓懿曰明公以至親當重任國危不能救而更圖非望三祖之靈其肯佑明公乎成都將糾合義兵往見明公於河上耳於是傳檄諸城諭以逆順徴兵調食以討懿懿亦發諸城兵莫有應者惟臨晉數千戸應懿成都引兵濟河擊臨晉叛者破之鎮人安定郭純等起兵圍懿東平公紹入蒲阪執懿誅孫暢等是歳魏衛將軍安城孝元王叔孫俊卒魏主嗣甚惜之謂其妻桓氏曰生同其榮能沒同其戚乎􅁊氏乃縊而祔焉丁零翟猛雀驅略吏民入白􅔠山為亂魏内都大官河内張蒲與冀州刺史長孫道生討之道生嵩之從子也道生欲進兵擊猛雀蒲曰吏民非樂為亂為猛雀所迫脅耳今不分别并擊之雖欲返善其道無由必同心協力據險以拒官軍未易猝平也不如先遣使諭之以不與猛雀同謀者皆不坐則必喜而離散矣道生從之降者數千家使復舊業猛雀與其黨百餘人出走蒲等追斬猛雀首左部尚書周㡬窮討餘黨悉誅之資治通鑑卷第一百一十七
