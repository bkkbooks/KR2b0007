front:
  text: 司馬張裕南平太守檀範之聞之皆逃歸建康裕邵之兄也雍州刺史魯宗之自疑不爲太尉裕所容與其子竟陵太守軌起兵應休之二月休之上表罪狀裕勒兵拒之裕宻書招休之府録事參軍南陽韓延之延之復書曰承親帥戎馬逺履西畿闔境士庶莫不惶駭辱疏知以譙王前事良增歎息司馬平西體國忠貞款懐待物以公有匡復之勲家國䝉賴推徳委誠毎事詢仰譙王往以微事見劾猶自表遜位况以大過而當嘿然邪前已表奏廢之所不盡者命耳推寄相與正當如此而遽興兵甲所謂欲加之罪其無辭乎劉裕足下海内之人誰不見足下此心而復欲欺誑國士來示云處懷期物自有由來今伐人之君啗人以利真可謂處懐期物自有由來者乎劉藩死於閶闔之門諸葛斃於左右之手甘言詫方伯襲之以輕兵遂使席上靡款懐之士閫外無自信諸矦以是為得筭良可恥也貴府將佐及朝廷賢徳寄命過日吾誠鄙劣嘗聞道於君子以平西之至徳寧可無授命之臣乎必未能自投虎口北迹郗僧施之徒明矣假令天長喪亂九流渾濁當與臧洪逰於地下不復多言裕視書歎息以示將佐曰事人當如此矣延之以裕父名翹字顯宗乃更其字曰顯宗名其子曰翹以示不臣劉氏琅邪太守劉朗帥二千餘家降魏庚子河西胡劉雲等帥數萬戸降魏太尉裕使參軍檀道濟朱超石將步騎出襄陽超石齡石之弟也江夏太守劉䖍之將兵屯三連立橋聚糧以待道濟等積日不至魯軌襲擊䖍之殺之裕使其壻振威將軍東海徐逵之統參軍蒯恩王允之沈淵子為前鋒出江夏口逵之等與魯軌戰於破冡兵敗逵之允之淵子皆死獨蒯恩勒兵不動軌乘勝力攻之不能克乃退淵子林子之兄也裕軍於馬頭聞逵之死怒甚三月壬午帥諸將濟江魯軌司馬文思將休之兵四萬臨峭岸置陳軍士無能登者裕自被甲欲登諸將諫不從怒愈甚太尉主簿謝晦前抱持裕裕抽劒指晦曰我斬卿晦曰天下可無晦不可無公建武將軍胡藩領逰兵在江津􅁉呼藩使登藩有疑色裕命左右録來欲斬之藩顧曰正欲擊賊不得奉教乃以刀頭穿岸劣容足指騰之而上隨之者稍多既登岸直前力戰休之兵不能當稍引却裕兵因而乘之休之兵大潰遂克江陵休之宗之俱北走軌留石城裕命閬中矦下邳趙倫之太尉參軍沈林子攻之遣武陵内史王鎮惡以舟師追休之等有羣盜數百夜襲冶亭京師震駭劉鍾討平之秦廣平公弼譛姚宣於秦王興宣司馬權丕至長安興責以不能輔導將誅之丕懼誣宣罪惡以求自免興怒遣使就杏城收宣下獄命弼將三萬人鎮秦州尹昭曰廣平公與皇太子不平今握彊兵於外陛下一旦不諱社稷必危小不忍亂大謀陛下之謂也興不從夏王勃勃攻秦杏城拔之執守將姚逵阬士卒二萬人秦王興如北地遣廣平公弼及輔國將軍斂曼嵬向新平興還長安河西王蒙遜攻西秦廣武郡拔之西秦王熾盤遣將軍乞伏魋尼寅邀蒙遜於浩亹蒙遜擊斬之又遣將軍折斐等帥騎一萬據勒姐嶺蒙遜擊禽之河西饑胡相聚於上黨推胡人白亞栗斯為單于改元建平以司馬順宰為謀主寇魏河内夏四月魏主嗣命公孫表等五將討之
