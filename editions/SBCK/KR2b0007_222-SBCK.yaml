body:
  text: 臣司馬光奉敕編集唐紀三十八單閼六月凡二年有奇起重光赤奮􅀂盡昭陽肅宗文明武徳大聖大宣孝皇帝下之下上元二年春正月癸卯史思明改元應天張景超引兵攻杭州敗李藏用將李彊於石夷門孫待封自武康南出將㑹景超攻杭州温晁據險擊敗之待封脫身奔烏程李可封以常州降丁未田神功使特進楊惠元等將千五百人西擊王暅辛亥夜神功先遣特進范知新等將四千人自白沙濟西趣下蜀鄧景山等將千人自海陵濟東趣常州神功與邢延恩將三千人軍於􅀲州壬子濟江展將步騎萬餘陳於蒜山神功以舟載兵趣金山㑹大風五舟飄抵金山下展屠其二舟沈其三舟神功不得度還軍􅀲州而范知新等兵已至下蜀展擊之不勝弟殷勸展引兵逃入海可延歲月展曰若事不濟何用多殺人父子乎死早晩等耳遂更帥衆力戰將軍賈隐林射展中目而仆遂斬之劉殷許嶧等皆死隠林滑州人也楊惠元等擊破王暅於淮南暅引兵東走至常熟迺降孫待封詣李藏用降張景超聚兵至七千餘人聞展死悉以兵授張灋雷使攻杭州景超逃入海灋雷至杭州李藏用擊破之餘黨皆平平盧軍大掠十餘日安史之亂亂兵不及江淮至是其民始罹荼毒矣荆南節度使吕諲奏請以江南之潭岳郴邵永道連黔中之涪州皆􅀠荆南從之二月奴刺党項寇寳鷄燒大散闗南侵鳯州殺刺史蕭􅞥大掠而西鳯翔節度使李鼎追擊破之戊辰新羅王金嶷入朝因請宿衛或言洛中將士皆燕人久戍思歸上下離心急擊之可破也陜州觀軍容使魚朝恩以為信然屢言於上上敕李光弼等進取東京光弼奏稱賊鋒尚銳未可輕進朔方節度使僕固懐恩勇而愎麾下皆蕃漢勁卒恃功多不灋郭子儀寛厚曲容之每用兵臨敵倚以集事李光弼性嚴一裁之以灋無所假貸懷恩憚光弼而心惡之乃附朝恩言東都可取由是中使相繼督光弼使出師光弼不得已使鄭陳節度使李抱玉守河陽與懐恩將兵㑹朝恩及神策節度使衛伯玉攻洛陽戊寅陳於邙山光弼命依險而陳懐恩陳於平原光弼曰依險則可以進可以退若平原戰而不利則盡矣思明不可忽也命移於險懐恩復止之史思明乗其陳未定進兵薄之官軍大敗死者數千人軍資器械盡弃之光弼懐恩度河走保聞喜朝恩伯玉奔還陜抱玉亦弃河陽走河陽懐州皆沒於賊朝廷聞之大懼益兵屯陜李揆與吕諲同為相不相恱諲在荆南以善政聞揆恐其復入相奏言置軍湖南非便又隂使人如荆湖求諲過失諲上疏訟揆罪癸未貶揆袁州長史以河中節度使蕭華為中書侍郎同平章事史思明猜忍好殺羣下小不如意動至族誅人不自保朝義其長子也常從思明將兵頗謙謹愛士卒將士多附之無寵於思明思明愛少子朝清使守范陽常欲殺朝義立朝清為太子左右頗泄其謀思明既破李光弼欲乗勝西入闗使朝義將兵為前鋒自北道襲陜城思明自南道將大軍繼之三月甲午朝義兵至礓子嶺衛伯玉逆擊破之朝義數進兵皆為陜兵所敗思明退屯永寜以朝義為怯曰終不足成吾事欲按軍灋斬朝義及諸將戊戌命朝義築三隅城欲貯軍糧期一日畢朝義築畢未泥思明至詬怒之令左右立馬監泥斯須而畢思明又曰俟克陜州終斬此賊朝義憂懼不知所為思明在鹿橋驛令腹心曹將軍將兵宿衛朝義宿於逆旅其部將駱恱蔡文景說朝義曰恱等與王死無日矣自古有廢立請召曹將軍謀之朝義俛首不應恱等曰王茍不許恱等今歸李氏王亦不全矣朝義泣曰諸君善為之勿驚聖人恱等乃令許叔冀之子季常召曹將軍至則以其謀告之曹將軍知諸將盡怨恐禍及己不敢違是夕恱等以朝義部兵三百被甲詣驛宿衛兵怪之畏曹將軍不敢動恱等引兵入至思明寢所值思明如厠問左右未及對已殺數人左右指示之思明聞有變踰垣至廐中自僃馬乗之恱傔人周子俊射之中臂墜馬遂擒之思明問亂者為誰恱曰奉懐王命思明曰我朝來語失宜其及此然殺我太早何不待我克長安今事不成矣恱等送思明於栁泉驛囚之還報朝義曰事成矣朝義曰不驚聖人乎恱曰無時周摯許叔冀將後軍在福昌恱等使許季常往告之摯驚倒於地朝義引軍還摯叔冀來迎恱等勸朝義執摯殺之軍至栁泉恱等恐衆心未壹遂縊殺思明以氊裹其尸槖駝負歸洛陽朝義即帝位改元顯聖密使人至范陽敇散騎常侍張通儒等殺朝清及朝清母辛氏并不附己者數十人其黨自相攻擊戰城中數月死者數千人范陽乃定朝義以其將栁城李懐仙為范陽尹燕京留守時洛陽四面數百里州縣皆為丘墟而朝義所部節度使皆安禄山舊將與思明等夷朝義召之多不至略相羈縻而已不能得其用李光弼上表固求自貶制以開府儀同三司侍中領河中節度使術士長塞鎮將朱融與左武衛將軍竇如玢等謀奉嗣岐王珍作亂金吾將軍邢濟告之夏四月乙卯朔廢珍為庶人溱州安置其黨皆伏誅珍業之子也丙辰左散騎常侍張鎬貶辰州司户鎬嘗買珍宅故也己未以吏部侍郎裴遵慶為黄門侍郎同平章事乙亥青密節度使尚衡破史朝義兵斬首五千餘級丁丑兖鄆節度使能元皓破朝義兵壬午梓州刺史叚子璋反子璋驍勇從上皇在蜀有功東川節度使李奐奏替之子璋舉兵襲奐於綿州道過遂州刺史虢王巨蒼黄修屬郡禮迎之子璋殺之李奐戰敗奔成都子璋自稱梁王改元黄龍以綿州為龍安府置百官又陷劒州五月己丑李光弼自河中入朝初李輔國與張后同謀遷上皇於西内是日端午山人李唐見上上方抱幼女謂唐曰朕念之卿勿怪也對曰太上皇思見陛下計亦如陛下之念公主也上􅊄然泣下然畏張后尚不敢詣西内癸巳党項冦寳鷄初史思明以其博州刺史令狐彰為滑鄭汴節度使將數千兵戍滑臺彰密因中使楊萬定通表請降徙屯杏園度思明疑之遣其將薛岌圍之彰與岌戰大破之因随萬定入朝甲午以彰為滑衛等六州節度使戊戌平盧節度使侯希逸擊史朝義范陽兵破之乙未西川節度使崔光逺與東川節度使李奐共攻綿州庚子㧞之斬叚子璋復以李光弼為河南副元帥太尉兼侍中都統河南淮南東西山南東荆南江南西浙江東西八道行營節度出鎮臨淮六月甲寅青密節度使能元皓敗史朝義將李元遇江淮都統李峘畏失守之罪歸咎於浙西節度使侯令儀丙子令儀坐除名長流康州加田神功開府儀同三司徙徐州刺史徴李峘鄧景山還京師戊寅党項冦好畤秋七月癸未朔日有食之既大星皆見以試少府監李藏用為浙西節度副使八月癸丑朔加開府儀同三司李輔國兵部尚書乙未輔國赴上宰相朝臣皆送之御厨具饌太常設樂輔國驕縱日甚求為宰相上曰以卿之功何官不可為其如朝望未允何輔國乃諷僕射裴冕等使薦已上密謂蕭華曰輔國求為宰相若公卿表來不得不與華出問冕曰初無此事吾臂可斷宰相不可得華入言之上大恱輔國銜之己巳李光弼赴河南行營辛巳以殿中監李若幽為朔方鎮西北庭興平陳鄭等節度行營及河中節度使鎮絳州賜名國貞九月甲申天成地平節上於三殿置道場以宫人為佛菩薩北門武士為金剛神王召大臣膜拜圍繞壬寅制去尊號但稱皇帝去年號但稱元年以建子月為歲首月皆以所建為數因赦天下停京兆河南太原鳯翔四京及江陵南都之號自今每除五品以上清望京官及郎官御史刺史令舉一人自代觀其所舉以行殿最江淮大饑人相食冬十月江淮都統崔圎署李藏用為楚州刺史㑹支度租庸使以劉展之亂諸州用倉庫物無準奏請徴驗時倉猝募兵物多散亡徴之不足諸將往往賣産以償之藏用恐其及已嘗與人言頗有悔恨其牙將高幹挾故怨使人詣廣陵告藏用反先以兵襲之藏用走幹追斬之崔圎遂簿責藏用將吏以驗之將吏畏皆附成其狀獨孫待封堅言不反圎命引出斬之或謂曰子何不從衆以求生待封曰吾始從劉大夫奉詔書來赴鎮人謂吾反李公起兵滅劉大夫今又以李公為反如此誰則非反者庸有極乎吾寜就死不能誣人以非罪遂斬之建子月壬午朔上受朝賀如正旦儀或告鴻臚卿康謙與史朝義通事連司農卿嚴莊俱下獄京兆尹劉晏遣吏防守莊家上尋敕出莊引見莊怨晏因言晏與臣言常道禁中語矜功怨上丁亥貶晏通州刺史莊難江尉謙伏誅戊子御史中丞元載為户部侍郎充句當度支鑄錢鹽鐡兼江淮轉運等使載初為度支郎中敏悟善奏對上愛其才委以江淮漕運數月遂代劉晏專掌財利戊戌冬至己亥上朝上皇於寜西内神策節度使衛伯玉攻史朝義㧞永寜破澠池福昌長水等縣己酉上朝獻太清宫庚戌享太廟元獻廟建丑月辛亥朔祀圓丘太一壇平盧節度使侯希逸與范陽相攻連年救援既絶又為奚所侵乃悉舉其軍二萬餘人襲李懐仙破之因引兵而南寳應元年建寅月甲申追尊靖徳太子琮為奉天皇帝妃竇氏為㳟應皇后丁酉葬于齊陵甲辰吐蕃遣使請和李光弼㧞許州擒史朝義所署潁川太守李春朝義將史参救之丙午戰于城下又破之戊申平盧節度使侯希逸於青州北度河而㑹田神功能元皓於兖州租庸使元載以江淮雖經兵荒其民比諸道猶有貲産乃按籍舉八年租調之違負及逋逃者計其大數而徴之擇豪吏為縣令而督之不問負之有無貲之髙下察民有粟帛者發徒圍之籍其所有而中分之甚者什取八九謂之白著有不服者嚴刑以威之民有蓄榖十斛者則重足以待命或相聚山澤為羣盗州縣不能制建卯月辛亥朔赦天下復以京兆為上都河南為東都鳯翔為西都江陵為南都太原為北都奴刺冦成固初王思禮為河東節度使資儲豐􅄛贍軍之外積米百萬斛奏請輸五十萬斛於京師思禮薨管崇嗣代之為政寛弛信任左右數月間耗散殆盡惟陳腐米萬餘斛在上聞之以鄧景山代之景山至則鉤校所出入將士輩多有隠沒皆懼有禆將抵罪當死諸將請之不許其弟請代兄死亦不許請入一馬以贖罪乃許之諸將怒曰我輩曽不及一馬乎遂作亂癸丑殺景山上以景山撫御失所以致亂不復推䆒亂者遣使慰諭以安之諸將請以都知兵馬使代州刺史辛雲京為節度使己未以雲京爲北都留守河東節度使雲京奏張光晟為代州刺史絳州素無儲蓄民間饑不可賦斂將士糧賜不充朔方等諸道行營都統李國貞屢以狀聞朝廷未報軍中咨怨突將王元振將作亂矯令於衆曰來日修都統宅各具畚鍤待命于門士卒皆怒曰朔方健兒豈修宅夫邪乙丑元振帥其徒作亂燒牙城門國貞逃于獄元振執之置卒食於前曰食此而役其力可乎國貞曰修宅則無之軍食則屢奏而未報諸君所知也衆欲退元振曰今日之事何必更問都統不死則我輩死矣遂㧞刃殺之鎮西北庭行營兵屯於翼城亦殺節度使茘非元禮推禆將白孝徳為節度使朝廷因而授之戊辰淮西節度使王仲昇與史朝義將謝欽譲戰于申州城下為賊所虜淮西震駭㑹侯希逸田神功能元皓攻汴州朝義召欽譲兵救之絳州諸軍剽掠不已朝廷憂其與太原亂軍合從連賊非新進諸將所能鎮服辛未以郭子儀為汾陽王知朔方河中北庭潞澤節度行營兼興平定國等軍副元帥發京師絹四萬匹布五萬端米六萬石以給絳軍建辰月庚寅子儀將行時上不豫羣臣莫得進見子儀請曰老臣受命將死於外不見陛下目不瞑矣上召入卧内謂曰河東之事一以委卿史朝義遣兵圍李抱玉於澤州子儀發定國軍救之乃去上召山南東道節度使來瑱赴京師瑱樂在㐮陽其將士亦愛之乃諷所部將吏上表留之行及鄧州復令還鎮荆南節度使吕諲淮西節度使王仲昇及中使往來者言瑱曲收衆心恐久難制上乃割商金均房别置觀察使令瑱止領六州㑹謝欽譲圍王仲昇於申州數月瑱怨之按兵不救仲昇竟敗沒行軍司馬裴茙謀奪瑱位密表瑱倔彊難制請以兵襲取之上以為然癸巳以瑱為淮西河南十六州節度使外示寵任實欲圗之密敇以茙代瑱為襄鄧等州防禦使甲午奴刺冦梁州觀察使李勉弃城走以邠州刺史河西臧希讓為山南西道節度使丙申党項寇奉天李輔國以求宰相不得怨蕭華庚午以户部侍郎元載為京兆尹載詣輔國固辭輔國識其意壬寅以司農卿陶銳為京兆尹輔國言蕭華專權請罷其相上不許輔國固請不已乃從之仍引元載代華戊申華罷為禮部尚書以載同平章事領度支轉運使如故建巳月庚戌朔澤州刺史李抱玉破史朝義兵於城下壬子楚州刺史崔侁表稱有尼真如恍惚登天見上帝賜以寳玉十三枚云中國有災以此鎮之羣臣表賀甲寅上皇崩于神龍殿年七十八乙卯遷坐於太極殿上以寢疾發哀於内殿羣臣發哀於太極殿蕃官􅋇靣割耳者四百餘人丙辰命苖晉卿攝冢宰上自仲春寢疾聞上皇登遐哀慕疾轉劇乃命太子監國甲子制改元復以建寅為正月月數皆如其舊赦天下初張后與李輔國相表裏專權用事晚年更有隙内射生使三原程元振黨於輔國上疾篤后召太子謂曰李輔國久典禁兵制敇皆從之出擅逼遷聖皇其罪甚大所忌者吾與太子今主上彌留輔國陰與程元振謀作亂不可不誅太子泣曰陛下疾甚危二人皆陛下勲舊之臣一旦不告而誅之必致震驚恐不能堪也后曰然則太子姑歸吾更徐思之太子出后召越王係謂曰太子仁弱不能誅賊臣汝能之乎對曰能係乃命内謁者監叚恒俊選宦官有勇力者二百餘人授甲於長生殿後乙丑后以上命召太子元振知其謀密告輔國伏兵於陵霄門以俟之太子至以難告太子曰必無是事主上疾亟召我我豈可畏死而不赴乎元振曰社稷事大太子必不可入乃以兵送太子於飛龍廐且以甲卒守之是夜輔國元振勒兵三殿收捕越王係叚恒俊及知内侍省事朱光輝等百餘人繫之以太子之命遷后於别殿時上在長生殿使者逼后下殿并左右數十人幽於後宫宦官宫人皆驚駭逃散丁卯上崩輔國等殺后并係及兖王僴是日輔國始引太子素服於九仙門與宰相相見叙上皇晏駕拜哭始行監國之令戊辰發大行皇帝䘮於兩儀殿宣遺詔己巳代宗即位高力士遇赦還至朗州聞上皇崩號慟嘔血而卒甲戌以皇子奉節王适為天下兵馬元帥李輔國恃功益横明謂上曰大家但居禁中外事聽老奴處分上内不能平以其方握禁兵外尊禮之乙亥號輔國為尚父而不名事無大小皆咨之羣臣出入皆先詣輔國亦晏然處之以内飛龍廄副使程元振為左監門衛將軍知内侍省事朱光輝及内常侍啖庭瑶山人李唐等二十餘人皆流黔中初李國貞治軍嚴朔方將士不樂皆思郭子儀故王元振因之作亂子儀至軍元振自以為功子儀曰汝臨賊境輒害主將若賊乗其釁無絳州矣吾為宰相豈受一卒之私邪五月庚辰收元振及其同謀四十人皆殺之辛雲京聞之亦推按殺鄧景山者數十人誅之由是河東諸鎮率皆奉灋壬午以李輔國為司空兼中書令党項冦同官華原甲申以平盧節度使侯希逸為平盧青淄等六州節度使由是青州節度有平盧之號乙酉徙奉節王适為魯王庚寅追尊上母呉妃為皇太后壬辰貶禮部尚書蕭華為峽州司馬元載希李輔國意以罪誣之也敇乾元大小錢皆一當一民始安之史朝義自圍宋州數月城中食盡將陷刺史李岑不知所為遂城果毅開封劉昌曰倉中猶有麴數千斤請屑食之不過二十日李太尉必救我城東南隅最危昌請守之李光弼至臨淮諸將以朝義兵尚彊請南保楊州光弼曰朝廷倚我以為安危我復退縮朝廷何望且吾出其不意賊安知吾之衆寡遂徑趣徐州使兖鄆節度使田神功進擊朝義大破之先是田神功既克劉展留連楊州未還太子賔客尚衡與左羽林大將軍殷仲卿相攻於兖鄆聞光弼至憚其威名神功遽還河南衡仲卿相繼入朝光弼在徐州惟軍旅之事自决之自餘衆務悉委判官張傪傪吏事精敏區處如流諸將白事光弼多令與傪議之諸將事傪如光弼由是軍中肅然東夏以寜先是田神功起偏禆為節度使留前使判官劉位等於幕府神功皆平受其拜及見光弼與傪抗禮乃大驚徧拜位等曰神功出於行伍不知禮儀諸君亦胡為不言成神功之過乎丁酉赦天下立皇子益昌王邈為鄭王延為慶王迥為韓王來瑱聞徙淮西大懼上言淮西無糧請俟收麥而行又諷將吏留己上欲姑息無事壬寅復以瑱為山南東道節度使飛龍副使程元振謀奪李輔國權密言於上請稍加裁制六月己未解輔國行軍司馬及兵部尚書餘如故以元振代判元帥行軍司馬仍遷輔國出居外第於是道路相賀輔國始懼上表遜位辛酉罷輔國兼中書令進爵博陸王輔國入謝憤咽而言曰老奴事郎君不了請歸地下事先帝上猶慰諭而遣之壬戌以兵部侍郎嚴武為西川節度使襄鄧防禦使裴茙屯榖城既得密敇即帥麾下二千人㳂漢趣㐮陽己巳陳於榖水北瑱以兵逆之問其所以來對曰尚書不受朝命故來若受代謹當釋兵瑱曰吾己䝉恩復留鎮此何受代之有因取敇及告身示之茙驚惑瑱與副使薛南陽縦兵夾擊大破之追擒茙於申口送京師賜死乙亥以通州刺史劉晏為户部侍郎兼京兆尹充度支轉運鹽鐡鑄錢等使秋七月壬辰以郭子儀都知朔方河東北庭潞儀澤沁陳鄭等節度行營及興平等軍副元帥癸巳劒南兵馬使徐知道反以兵守要害拒嚴武武不得進八月桂州刺史邢濟討西原賊帥吳功曹等平之己未徐知道為其將李忠勇所殺劒南悉平乙丑山南東道節度使來瑱入朝謝罪上優待之己巳郭子儀自河東入朝時程元振用事忌子儀功高任重數􅉲之於上子儀不自安表請解副元帥節度使上慰撫之子儀遂留京師台州賊帥袁晁攻陷浙東諸州改元寳勝民疲於賦斂者多歸之李光弼遣兵擊晁於衢州破之乙亥徙魯王适為雍王九月庚辰以來瑱為兵部尚書同平章事知山南東道節度使乙未加程元振驃騎大將軍兼内侍監左僕射裴冕為山陵使議事有與程元振相違者丙申貶冕施州刺史上遣中使劉清潭使於回紇修舊好且徴兵討史朝義清潭至其庭回紇登里可汗已為朝義所誘云唐室繼有大䘮今中原無主可汗宜速來共收其府庫可汗信之清潭致敇書曰先帝雖弃天下今上繼統乃昔日廣平王與葉䕶共收兩京者也回統業已起兵至三城見州縣皆為丘墟有輕唐之志乃困辱清潭清潭遣使言狀且曰回紇舉國十萬衆至矣京師大駭上遣殿中監藥子昻往勞之於忻州南初毗伽闕可汗為登里求昬肅宗以僕固懐恩女妻之為登里可敦可汗請與懐恩相見懐恩時在汾州上令往見之懐恩為可汗言唐家恩信不可負可汗恱遣使上表請助國討朝義可汗欲自蒲闗入由沙苑出潼闗東向藥子昻說之曰􅀜中數遭兵荒州縣蕭條無以供擬恐可汗失望賊兵盡在洛陽請自土門略邢洺懐衛而南得其資財以充軍裝可汗不從又請自太行南下據河陰扼賊咽㗋亦不從又請自陜州大陽津度河食太原倉粟與諸道俱進乃從之袁晁陷信州冬十月袁晁陷温州明州以雍王适為天下兵馬元帥辛酉辭行以兼御史中丞藥子昂魏琚為左右廂兵馬使以中書舎人韋少華為判官給事中李進為行軍司馬㑹諸道節度使及回紇于陜州進討史朝義上欲以郭子儀為适副程元振魚朝恩等沮之而止加朔方節度使僕固懐恩同平章事兼絳州刺史領諸軍節度行營以副适上在東宫以李輔國專横心甚不平及嗣位以輔國有殺張后之功不欲顯誅之壬戌夜盗入其第竊輔國之首及一臂而去敇有司捕盗遣中使存問其家為刻木首葬之仍贈太傅丙寅上命僕固懐恩與母妻俱詣行營雍王适至陜州回紇可汗屯於河北适與僚屬從數十騎往見之可汗責适不拜舞藥子昻對以禮不當然回紇將車鼻曰唐天子與可汗約為兄弟可汗於雍王叔父也何得不拜舞子昂曰雍王天子長子今為元帥安有中國儲君向外國可汗拜舞乎且兩宫在殯不應舞蹈力争久之車鼻遂引子昂魏琚韋少華李進各鞭一百以适年少未諳事遣歸營琚少華一夕而死戊辰諸軍發陜州僕固懐恩與回紇左殺為前鋒陜西節度使郭英乂神策觀軍容使魚朝恩為殿自澠池入潞澤節度使李抱玉自河陽入河南等道副元帥李光弼自陳留入雍王留陜州辛未懐恩等軍于同軌史朝義聞官軍將至謀於諸將阿史那承慶曰唐若獨與漢兵來宜悉衆與戰若與回紇俱來其鋒不可當宜退守河陽以避之朝義不從壬申官軍至洛陽北郊分兵取懐州癸酉㧞之乙亥官軍陳于横水賊衆數萬立栅自固懐恩陳于西原以當之遣驍騎及回紇並南山出栅東北表裏合擊大破之朝義悉其精兵十萬救之陳於昭覺寺官軍驟擊之殺傷甚衆而賊陳不動魚朝恩遣射生五百人力戰賊雖多死者陳亦如初鎮西節度使馬璘曰事急矣遂單騎奮擊奪賊兩牌突入萬衆中賊左右披靡大軍乘之而入賊衆大敗轉戰於石榴園老君廟賊又敗人馬相蹂踐填尚書谷斬首六萬級捕虜二萬人朝義將輕騎數百東走懐恩進克東京及河陽城獲其中書令許叔冀王伷等承制釋之懐恩留回紇可汗營於河陽使其子右廂兵馬使瑒及朔方兵馬使髙輔成帥步騎萬餘乗勝逐朝義至鄭州再戰皆㨗朝義至汴州其陳留節度使張獻誠閉門拒之朝義奔濮州獻城開門出降回紇入東京肆行殺掠死者萬計火累旬不滅朔方神策軍亦以東京鄭汴汝州皆為賊境所過虜掠三月乃已比屋蕩盡士民皆衣紙回紇悉置所掠寳貨於河陽留其將安恪守之十一月丁丑露布至京師朝義自濮州北度河懐恩進攻滑州㧞之追敗朝義於衞州朝義睢陽節度使田承嗣等將兵四萬餘人與朝義合復來拒戰僕固瑒擊破之長驅至昌樂東朝義帥魏州兵來戰又敗走於是鄴郡節度使薛嵩以相衛洺邢四州降于陳鄭澤潞節度使李抱玉恒陽節度使張忠志以恒趙深定易五州降于河東節度使辛雲京嵩楚玉之子也抱玉等已進軍入其營按其部伍嵩等皆受代居無何僕固懐恩皆令復位由是抱玉雲京疑懐恩有貳心各表言之朝廷密為之備懐恩亦上疏自理上慰勉之辛巳制東京及河南北受偽官者一切不問己丑以户部侍郎劉晏兼河南道水陸轉運都使丁酉以張忠志為成徳軍節度使統恒趙深定易五州賜姓李名寳臣初辛雲京引兵將出井陘常山禆將王武俊說寳臣曰今河東兵精銳出境逺􅀜不可敵也且吾以寡當衆以曲遇直戰則必離守則必潰公其圗之寳臣乃撤守備舉五州來降及復為節度使以武俊之策為善擢為先鋒兵馬使武俊本契丹也初名沒諾干郭子儀以僕固懐恩有平河朔功請以副元帥讓之己亥以懐恩為河北副元帥加左僕射兼中書令單于鎮北大都䕶朔方節度使史朝義走至貝州與其大將薛忠義等兩節度合僕固瑒追之至臨清朝義自衡水引兵三萬還攻之瑒設伏擊走之回紇又至官軍益振遂逐之大戰于下博東南賊大敗積尸擁流而下朝義奔莫州懐恩都知兵馬使薛兼訓兵馬使郝庭玉與田神功辛雲京㑹於下博進圍朝義於莫州青淄節度使侯希逸繼至十二月庚申初以太祖配天地代宗睿文孝武皇帝上之上廣德元年春正月己卯追諡吳太后曰章敬皇后癸未以國子祭酒劉晏為吏部尚書同平章事度支等使如故初來瑱在襄陽程元振有所請託不從及為相元振譛瑱言涉不順王仲昇在賊中以屈服得全賊平得歸與元振善奏瑱與賊合謀致仲昇陷賊壬寅瑱坐削官爵流播州賜死於路由是藩鎮皆切齒於元振史朝義屢出戰皆敗田承嗣說朝義令親往幽州發兵還救莫州承嗣自請留守莫州朝義從之選精騎五千自北門犯圍而出朝義既去承嗣即以城降送朝義母妻子於官軍於是僕固瑒侯希逸薛兼訓等帥衆三萬追之及於歸義與戰朝義敗走時朝義范陽節度使李懐仙已因中使駱奉仙請降遣兵馬使李抱忠將兵三千鎮范陽縣朝義至范陽不得入官軍將至朝義遣人諭抱忠以大軍留莫州輕騎來發兵救援之意因責以君臣之義抱忠對曰天不祚燕唐室復興今既歸唐矣豈可更為反覆獨不愧三軍邪大丈夫恥以詭計相圗願早擇去就以謀自全且田承嗣必已叛矣不然官軍何以得至此朝義大懼曰吾朝來未食獨不能以一餐相餉乎抱忠乃令人設食於城東於是范陽人在朝義麾下者並拜辭而去朝義涕泣而已獨與胡騎數百既食而去東奔廣陽廣陽不受欲北入奚契丹至温泉柵李懐仙遣兵追及之朝義窮蹙縊於林中懐仙取其首以獻僕固懐恩與諸軍皆還甲辰朝義首至京師閏月己酉夜有回紇十五人犯含光門突入鴻臚寺門司不敢遏癸亥以史朝義降將薛嵩為相衛邢洺貝磁六州節度使田承嗣為魏􅀶徳滄瀛五州都防禦使李懐仙仍故地為幽州盧龍節度使時河北諸州皆巳降嵩等迎僕固懐恩拜於馬首乞行間自效懐恩亦恐賊平寵衰故奏留嵩等及李寳臣分帥河北自為黨援朝廷亦厭苦兵革苟冀無事因而授之回紇登里可汗歸國其部衆所過抄掠廪給小不如意輒殺人無所忌憚陳鄭澤潞節度使李抱玉欲遣官屬置頓人人辭憚趙城尉馬燧獨請行比回紇將至燧先遣人賂其渠帥約毋暴掠帥遺之旗曰有犯令者君自戮之燧取死囚為左右小有違令立斬之回紇相顧失色涉其境者皆拱手遵約束抱玉奇之燧因說抱玉曰燧與回紇言頗得其情僕固懐恩恃功驕蹇其子瑒好勇而輕今内樹四帥外交回紇必有窺河東澤潞之志宜深備之抱玉然之初長安人梁崇義以羽林射生從來瑱鎮㐮陽累遷右兵馬使崇義有勇力能卷鐵舒鉤沈毅寡言得衆心瑱之入朝也命諸將分戍諸州瑱死戍者皆奔歸㐮陽行軍司馬龐充將兵二千赴河南至汝州聞瑱死引兵還襲襄州左兵馬使李昭拒之充奔房州崇義自鄧州引戍兵歸與昭及副使薛南陽相譲為長久之不决衆皆曰兵非梁卿主之不可遂推崇義為帥崇義尋殺昭及南陽以其狀聞上不能討三月甲辰以崇義為襄州刺史山南東道節度留後崇義奏改葬瑱為之立祠不居瑱㕔事及正堂辛酉葬至道大聖大明孝皇帝于泰陵廟號􅀇宗庚午􅁙文明武徳大聖大宣孝皇帝于喬陵廟號肅宗夏四月庚辰李光弼奏擒袁晁浙東皆平時晁聚衆近二十萬轉攻州縣光弼使部將張伯儀將兵討平之伯儀魏州人也郭子儀數上言吐蕃党項不可忽宜早為之備辛丑遣兼御史大夫李之芳等使于吐蕃為虜所留二年乃得歸羣臣三上表請立太子五月癸卯詔許俟秋成議之丁卯制分河北諸州以幽莫媯檀平薊為幽州管恒定趙深易為成徳軍管相貝邢洺為相州管魏博徳為魏州管滄棣冀瀛為青淄管懐衛河陽為澤潞管六月癸酉禮部侍郎華隂楊綰上疏以為古之選士必取行實近世專尚文辭自隋煬帝始置進士科猶試策而已至高宗時考功貟外郎劉思立始奏進士加雜文明經加帖從此積弊轉而成俗朝之公卿以此待士家之長老以此訓子其明經則誦帖括以求僥倖又舉人皆令投牒自應如此欲其返淳朴崇亷譲何可得也請令縣令察孝亷取行著鄉閭學知經術薦之於州刺史考試升之於省任各占一經朝廷擇儒學之士問經義二十條對策三道上第即注官中第得出身下第罷歸又道舉亦非理國所資望與明經進士並停上命諸司通議給事中李栖筠左丞賈至京兆尹嚴武並與綰同至議以為今試學者以帖字為精通考文者以聲病為是非風流頹弊誠當釐改然自東晉以來人多僑寓士居鄉土百無一二請兼廣學校保桑梓者鄉里舉焉在流寓者庠序推焉敕禮部具條目以聞綰又請置五經秀才科庚寅以魏博都防禦使田承嗣為節度使承嗣舉管内户口壯者皆籍為兵惟使老弱耕稼數年間有衆十萬又選其驍健者萬人自衛謂之牙兵同華節度使李懐讓為程元振所譛恐懼自殺資治通鑑卷第二百二十二
