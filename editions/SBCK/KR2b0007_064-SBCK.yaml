front:
  text: 資治通鑑巻第六十四
  hash: sha256:196cf7122db3e6496df2ae183c855b730ed42a306f945ccad53f254c2419cc93
body:
  text: 臣司馬光奉勑編集漢紀五十六旃䝉作噩凡五年起重光大荒落盡孝獻皇帝已建安六年春三月丁夘朔日有食之曹操就榖於安民以袁紹新破欲以其閒擊劉表荀彧曰紹既新敗其衆離心宜乘其困遂定之而欲逺師江漢若紹收其餘燼承虛以出人後則公事去矣操乃止夏四月操揚兵河上擊袁紹倉亭軍破之秋九月操還許操自擊劉備於汝南備奔劉表龔都等皆散表聞備至自出郊迎以上賓禮待之益其兵使屯新野備在荆州數年嘗於表坐起至厠慨然流涕表怪問備備曰平常身不離鞍髀肉皆消今不復騎髀裏肉生日月如流老將至矣而功業不建是以悲耳曹操遣夏侯淵張遼圍昌豨於東海數月糧盡議引軍還遼謂淵曰數日已來每行諸圍豨輒屬目視遼又其射矢更稀此必豨計猶豫故不力戰遼欲挑與語儻可誘也乃使謂豨曰公有命使遼傳之豨果下與遼語遼為説操神武方以徳懐四方先附者受大賞豨乃許降遼遂單身上三公山入豨家拜妻子豨歡喜隨遼詣操操遣豨還趙韙圍劉璋於成都東州人恐見誅滅相與力戰韙遂敗退追至江州殺之龎羲懼遣吏程祁宣㫖於其父漢昌令畿索賨兵畿曰郡合部曲本不為亂縱有讒諛要在盡誠若遂懐異志不敢聞命羲更使祁説之畿曰我受牧恩當為盡節汝為郡吏自宜效力不義之事有死不為羲怒使人謂畿曰不從太守禍將及家畿曰樂羊食子非無父子之恩大義然也今雖羮祁以賜畿畿啜之矣羲乃厚謝於璋璋擢畿為江陽太守朝廷聞益州亂以五官中郎將牛亶為益州刺史徵璋為卿不至張魯以鬼道教民使病者自首其過為之請禱實無益於治病然小人昏愚競共事之犯灋者三原然後乃行刑不置長吏皆以祭酒為治民夷便樂之流移寄在其地者不敢不奉其道後遂襲取巴郡朝廷力不能征遂就寵魯為鎮民中郎將領漢寧太守通貢獻而已民有地中得玉印者羣下欲尊魯為漢寧王功曹巴西閻圃諫曰漢川之民戸出十萬財富土沃四面險固上匡天子則為桓文次及竇融不失富貴今承制署置勢足斬斷不煩於王願且不稱勿為禍先魯從之七年春正月曹操軍譙遂至浚儀治睢陽渠遣使以大牢祀橋􅀇進軍官渡袁紹自軍敗慙憤發病嘔血夏五月薨初紹有三子譚熈尚紹後妻劉氏愛尚數稱於紹紹欲以為後而未顯言之乃以譚繼兄後出為青州刺史沮授諫曰世稱萬人逐兎一人獲之貪者悉止分定故也譚長子當為嗣而斥使居外禍其始此矣紹曰吾欲令諸子各據一州以視其能於是以中子熙為幽州刺史外甥髙幹為并州刺史逄紀審配素為譚所疾辛評郭圖皆附於譚而與配紀有隙及紹薨衆以譚長欲立之配等恐譚立而評等為害遂矯紹遺命奉尚為嗣譚至不得立自稱車騎將軍屯黎陽尚少與之兵而使逢紀隨之譚求益兵審配等又議不與譚怒殺逢紀秋九月曹操渡河攻譚譚告急於尚尚留審配守鄴自將助譚與操相拒連戰譚尚數敗退而固守尚遣所置河東太守郭援與髙幹匈奴南單于共攻河東發使與闗中諸將馬騰等連兵騰等隂許之援所經城邑皆下河東郡吏賈逵守絳援攻之急城將潰父老與援約不害逵乃降援許之援欲使逵為將以兵刼之逵不動左右引逵使叩頭逵叱之曰安有國家長吏為賊叩頭援怒將斬之或伏其上以救之絳吏民聞將殺逵皆乗城呼曰負約殺我賢君寧俱死耳乃囚於壺闗著土窖中蓋以車輪逵謂守者曰此間無健兒邪而使義士死此中乎有祝公道者適聞其言乃夜往盜引出逵折械遣去不語其姓名曹操使司􅀠校尉鍾繇圍南單于於平陽未拔而援至繇使新豐令馮翊張既説馬騰為言利害騰疑未决􅀓幹説騰曰古人有言順道者昌逆徳者亡曹公奉天子誅暴亂灋明政治上下用命可謂順道矣袁氏恃其彊大背棄王命驅胡虜以陵中國可謂逆徳矣今将軍既事有道不盡其力隂懐兩端欲以坐觀成敗吾恐成敗既定奉辭責罪將軍先為誅首矣於是騰懼幹因曰智者轉禍為福今曹公與袁氏相持而髙幹郭援合攻河東曹公雖有萬全之計不能禁河東之不危也將軍誠能引兵討援内外擊之其勢必舉是將軍一舉斷袁氏之臂解一方之急曹公必重徳將軍將軍功名無與比矣騰乃遣子超將兵萬餘人與繇㑹初諸將以郭援衆盛欲釋平陽去鍾繇曰袁氏方彊援之來闗中隂與之通所以未悉叛者顧吾威名故耳若棄而去示之以弱所在之民誰非宼讎縱吾欲歸其得至乎此為未戰先自敗也且援剛愎好勝必易吾軍若渡汾為營及其未濟擊之可大克也援至果徑前渡汾衆止之不從濟水未半繇擊大破之戰罷衆人皆言援死而不得其首援繇之甥也晚後馬超校尉南安龎徳於鞬中出一頭繇見之而哭徳謝繇繇曰援雖我甥乃國賊也卿何謝之有南單于遂降劉表使劉備北侵至葉曹操遣夏侯惇于禁等拒之備一旦燒屯去惇等追之禆將軍鉅鹿李典曰賊無故退疑必有伏南道窄狹草木深不可追也惇等不聽使典留守而追之果入伏裏兵大敗典往救之備乃退曹操下書責孫權任子權召羣僚㑹議張昭秦松等猶豫不决權引周瑜詣吳夫人前定議瑜曰昔楚國初封不滿百里之地繼嗣賢能廣土開境遂據荆揚至於南海􅀓業延祚九百餘年今將軍承父兄餘資兼六郡之衆兵精糧多將士用命鑄山為銅煮海為鹽境内富饒人不思亂有何偪迫而欲送質質一入不得不與曹氏相首尾與相首尾則命召不得不往如此便見制於人也極不過一侯印僕從十餘人車數乗馬數匹豈與南面稱孤同哉不如勿遣徐觀其變若曹氏能率義以正天下將軍事之未晚若圖為暴亂彼自亡之不暇焉能害人吳夫人曰公瑾議是也公瑾與伯符同年小一月耳我視之如子也汝其兄事之遂不送質八月春二月曹操攻黎陽與袁譚袁尚戰於城下譚尚敗走還鄴夏四月操追至鄴收其麥諸將欲乗勝遂攻之郭嘉曰袁紹愛此二子莫適立也今權力相侔各有黨與急之則相保緩之則爭心生不如南向荆州以待其變變成而後擊之可一舉定也操曰善五月操還許留其將賈信屯黎陽譚謂尚曰我鎧甲不精故前爲曹操所敗今操軍退人懐歸志及其未濟出兵掩之可令大潰此策不可失也尚疑之既不益兵又不易甲譚大怒郭圖辛評因謂譚曰使先公出將軍爲兄後者皆審配之謀也譚遂引兵攻尚戰於門外譚敗引兵還南皮别駕北海王脩率吏民自青州徃救譚譚欲更還攻尚脩曰兄弟者左右手也譬人將鬭而斷其右手曰我必勝其可乎夫棄兄弟而不親天下其誰親之彼讒人離閒骨肉以求一朝之利願塞耳勿聽也若斬佞臣數人復相親睦以御四方可横行於天下譚不從譚將劉詢起兵漯隂以叛譚諸城皆應之譚歎曰今舉州皆叛豈孤之不徳邪王脩曰東萊太守管統雖在海表此人不反必來後十餘日統果棄其妻子來赴譚妻子為賊所殺譚更以統為樂安太守秋八月操擊劉表軍于西平袁尚自將攻袁譚大破之譚犇平原嬰城固守尚圍之急譚遣辛評弟毗詣曹操請救劉表以書諫譚曰君子違難不適讐國交絶不出惡聲况忘先人之讐棄親戚之好而為萬世之戒遺同盟之恥哉若冀州有不弟之傲仁君當降志辱身以濟事為務事定之後使天下平其曲直不亦為高義邪又與尚書曰金木水火以剛柔相濟然後克得其和能為民用今青州天性峭急迷於曲直仁君度數􅀪廣綽然有餘當以大包小以優容劣先除曹操以卒先公之恨事定之後乃議曲直之計不亦善乎若迷而不反則胡夷將有譏誚之言况我同盟復能勠力為君之役哉此韓盧東郭自困於前而遺田父之獲者也譚尚皆不從辛毗至西平見曹操致譚意羣下多以為劉表彊宜先平之譚尚不足憂也荀攸曰天下方有事而劉表坐保江漢之閒其無四方之志可知矣袁氏據四州之地帶甲數十萬紹以寬厚得衆心使二子和睦以守其成業則天下之難未息也今兄弟遘惡其勢不兩全若有所并則力專力專則難圖也及其亂而取之天下定矣此時不可失也操從之後數日操更欲先平荆州使譚尚自相敝辛毗望操色知有變以語郭嘉嘉白操操謂毗曰譚必可信尚必可克不毗對曰明公無問信與詐也直當論其勢耳袁氏本兄弟相伐非謂他人能閒其閒乃謂天下可定於己也今一旦求救於明公此可知也顯甫見顯思困而不能取此力竭也兵革敗於外謀臣誅於内兄弟讒鬩國分為二連年戰伐介胄生蟣蝨加以旱蝗饑饉並臻天災應於上人事困於下民無愚智皆知土崩瓦解此乃天亡尚之時也今往攻鄴尚不還救即不能自守還救即譚踵其後以明公之威應困窮之敵擊疲敝之寇無異迅風之振秋葉矣天以尚與明公明公不取而伐荆州荆州豐樂國未有釁仲虺有言取亂侮亡方今二袁不務逺略而内相圖可謂亂矣居者無食行者無糧可謂亡矣朝不謀夕民命靡繼而不綏之欲待他年他年或登又自知亡而改脩厥徳失所以用兵之要矣今因其請救而撫之利莫大焉且四方之寇莫大於河北河北平則六軍盛而天下震矣操曰善乃許譚平冬十月操至黎陽尚聞操渡河乃釋平原還鄴尚將吕曠高翔畔歸曹操譚復隂刻將軍印以假曠翔操知譚詐乃為子整娉譚女以安之而引軍還孫權西伐黄祖破其舟軍惟城未克而山寇復動權還過豫章使征虜中郎將吕範平鄱陽㑹稽盪寇中郎將程普討樂安建昌都尉太史慈領海昏以别部司馬黄蓋韓當周泰吕䝉等守劇縣令長討山越悉平之建安漢興南平民作亂聚衆各萬餘人權使南部都尉㑹稽賀齊進討皆平之復立縣邑料出兵萬人拜齊平東校尉九年春正月曹操濟河遏淇水入白溝以通糧道二月袁尚復攻袁譚於平原留其將審配蘇由守鄴曹操進軍至洹水蘇由欲為内應謀泄出犇操操進至鄴為土山地道以攻之尚武安長尹楷屯毛城以通上黨糧道夏四月操留曹洪攻鄴自將擊楷破之而還又擊尚將沮鵠於邯鄲拔之易陽令韓範涉長梁岐皆舉縣降徐晃言於操曰二袁未破諸城未下者傾耳而聴宜旌賞二縣以示諸城操從之範岐皆賜爵闗内侯黑山賊帥張燕遣使求助操拜平北將軍五月操毁土山地道鑿壍圍城周回四十里初令淺示若可越配望見笑之不出爭利操一夜濬之廣深二丈引漳水以灌之城中餓死者過半秋七月尚將兵萬餘人還救鄴未到欲令審配知外動止先使主簿鉅鹿李孚入城孚斫問事杖繫著馬邊自著平上幘將三􅀐投暮詣鄴下自稱都督歷北圍循表而東步步呵責守圍將士隨輕重行其罰遂歷操營前至南圍當章門復責怒守圍者收􅅞之因開其圍馳到城下呼城上人城上人以繩引孚得入配等見孚悲喜鼓譟稱萬歳守圍者以狀聞操笑曰此非徒得入也方且復出孚知外圍益急不可復冒乃請配悉出城中老弱以省榖夜簡别數千人皆使持白幡從三門並出降孚復將三騎作降人服隨輩夜出突圍得去尚兵既至諸將皆以為此歸師人自為戰不如避之操曰尚從大道來當避之若循西山來者此成禽耳尚果循西山來東至陽平亭去鄴十七里臨滏水為營夜舉火以示城中城中亦舉火相應配出兵城北欲與尚對决圍操逆擊之敗還尚亦破走依曲漳為營操遂圍之未合尚懼遣使求降操不聴圍之益急尚夜遁保祁山操復進圍之尚將馬延張顗等臨陳降衆大潰尚犇中山盡收其輜重得尚印綬節鉞及衣物以示城中城中崩沮審配令士卒曰堅守死戰操軍疲矣幽州方至何憂無主操出行圍配伏弩射之幾中配兄子榮為東門校尉八月戊寅榮夜開門内操兵配拒戰城中操兵生獲之辛評家繫鄴獄辛毗馳往欲解之已悉為配所殺操兵􅅞配詣帳下毗逆以馬鞭擊其頭罵之曰奴汝今日真死矣配顧曰狗輩正由汝曹破我冀州恨不得殺汝也且汝今日能殺生我邪有頃操引見謂配曰曩日孤之行圍何弩之多也配曰猶恨其少操曰卿忠於袁氏亦自不得不爾意欲活之配意氣壯烈終無橈辭而辛毗等號哭不已遂斬之冀州人張子謙先降素與配不善笑謂配曰正南卿竟何如我配厲聲曰汝為降虜審配為忠臣雖死豈羨汝生邪臨行刑叱持兵者令北向曰我君在北也操乃臨祀紹墓哭之流涕慰勞紹妻還其家人寳物賜雜繒絮稟食之初袁紹與操共起兵紹問操曰若事不輯則方面何所可據操曰足下意以為何如紹曰吾南據河北阻燕代兼戎狄之衆南向以爭天下庶可以濟乎操曰吾任天下之智力以道御之無所不可九月詔以操領冀州牧操讓還兖州初袁尚遣從事安平牽招至上黨督軍糧未還尚走中山招説髙幹以并州迎尚并力觀變幹不從招乃東詣曹操操復以為冀州從事又辟崔琰為别駕操謂琰曰昨案戸籍可得三十萬衆故為大州也琰對曰今九州幅裂二袁兄弟親尋干戈冀方蒸庶暴骨原野未聞王師存問風俗救其塗炭而校計甲兵唯此為先斯豈鄙州士女所望於明公哉操改容謝之許攸恃功驕嫚嘗於衆坐呼操小字曰某甲卿非我不得冀州也操笑曰汝言是也然内不樂後竟殺之冬十月有星孛于東井高幹以并州降操復以幹為并州刺史曹操之圍鄴也袁譚復背之略取甘陵安平勃海河間攻袁尚於中山尚敗走故安從袁熙譚悉收其衆還屯龍湊操與譚書責以負約與之絶婚女還然後進討十二月操軍其門譚拔平原走保南皮臨清河而屯操入平原略定諸縣曹操表公孫度為武威將軍封永寧鄉侯度曰我王遼東何永寕也藏印綬於武庫是歳度卒子康嗣位以永寧鄉侯封其弟恭操以牽招嘗為袁氏領烏桓遣詣栁城撫慰烏桓值峭王嚴五千騎欲助袁譚又公孫康遣使韓忠假峭王單于卭綬峭王大會羣長忠亦在坐峭王問招昔袁公言受天子之命假我為單于今曹公復言當更白天子假我真單于遼東復持印綬來如此誰當為正招答曰昔袁公承制得有所拜假中閒違錯天子命曹公代之言當白天子更假眞單于是也遼東下郡何得擅稱拜假也忠曰我遼東在滄海之東擁兵百餘萬又有扶餘濊貊之用當今之埶彊者爲右曹操何得獨爲是也招呵忠曰曹公允恭明哲翼戴天子伐叛柔服寧靜四海汝君臣頑嚚今恃險逺背違王命欲擅拜假侮弄神器方當屠戮何敢慢易咎毁大人便捉忠頭頓築拔刀欲斬之峭王驚怖徒跣抱招以救請忠左右失色招乃還坐爲峭王等説成敗之效禍福所歸皆下席跪伏敬受敕教便辭遼東之使罷所嚴騎丹陽大都督媯覽郡丞戴員殺太守孫翊將軍孫河屯京城馳赴宛陵覽員復殺之遣人迎揚州刺史劉馥令住歷陽以丹陽應之覽入居軍府中欲逼取翊妻徐氏徐氏紿之曰乞須晦日設祭除服然後聴命覽許之徐氏潛使所親語翊親近舊將孫髙傅嬰等與共圖覽髙嬰涕泣許諾宻呼翊時侍養者二十餘人與盟誓合謀到晦日設祭徐氏哭泣盡哀畢乃除服薰香沐浴言笑懽悦大小悽愴怪其如此覽宻覘無復疑意徐氏呼髙嬰置户内使人召覽入徐氏出户拜覽適得一拜徐大呼二君可起髙嬰俱出共殺覽餘人即就外殺員徐氏乃還縗絰奉覽員首以祭翊墓舉軍震駭孫權聞亂從椒丘還至丹陽悉族誅覽員餘黨擢髙嬰為牙門其餘賞賜有差河子韶年十七收河餘衆屯京城權引軍歸吳夜至京城下營試攻驚之兵皆乗城傳檄僃警讙聲動地頗射外人權使曉喻乃止明日見韶拜承烈校尉統河部曲十年春正月曹操攻南皮袁譚出戰士卒多死操欲緩之議郎曹純曰今縣師深入難以持久若進不能克退必喪威乃自執桴皷以率攻者遂克之譚出走追斬之李孚自稱冀州主簿求見操曰今城中彊弱相陵人心擾亂以為宜令新降為内所識信者宣傳明教操即使孚往入城告諭吏民使各安故業不得相侵城中乃安操於是斬郭圖等及其妻子袁譚使王脩運糧於樂安聞譚急將所領兵往赴之至髙宻聞譚死下馬號哭曰無君焉歸遂詣曹操乞收􅁙譚尸操許之復使脩還樂安督軍糧譚所部諸城皆服唯樂安太守管統不下操命脩取統首脩以統亡國忠臣解其􅅞使詣操操悦而赦之辟脩為司空掾郭嘉説操多辟青冀幽并名士以為掾屬使人心歸附操從之官渡之戰袁紹使陳琳為檄書數操罪惡連及家世極其醜詆及袁氏敗琳歸操操曰卿昔為本初移書但可罪狀孤身何乃上及父祖邪琳謝罪操釋之使與陳留阮瑀俱管記室先是漁陽王松據涿郡郡人劉放説松以地歸操操辟放參司空軍事袁熙為其將焦觸張南所攻與尚俱犇遼西烏桓觸自號幽州刺史驅率諸郡太守令長背袁向曹陳兵數萬殺白馬而盟令曰敢違者斬衆莫敢仰視各以次歃别駕代郡韓珩曰吾受袁公父子厚恩今其破亡智不能救勇不能死於義闕矣若乃北面曹氏所不能為也一坐為珩失色觸曰夫舉大事當立大義事之濟否不待一人可卒珩志以厲事君乃捨之觸等遂降曹操皆封為列侯夏四月黑山賊帥張燕率其衆十餘萬降封安國亭侯故安趙犢霍奴等殺幽州刺史及涿郡太守三郡烏桓攻鮮于輔於獷平秋八月操討犢等斬之乃渡潞水救獷平烏桓走出塞冬十月髙幹聞操討烏桓復以并州叛執上黨太守舉兵守壺闗口操遣其將樂進李典擊之河内張晟衆萬餘人寇崤澠閒􅀪農張琰起兵以應之河東太守王邑被徵郡掾衛固及中郎將范先等詣司􅀠校尉鍾繇請留之繇不許固等外以請邑為名而内實與髙幹通謀曹操謂荀彧曰闗西諸將外服内貳張晟寇亂殽澠南通劉表固等因之將為深害當今河東天下之要地也君為我舉賢才以鎮之彧曰西平太守京兆杜畿勇足以當難智足以應變操乃以畿為河東太守鍾繇促王邑交符邑佩印綬徑從河北諸許自歸衛固等使兵數千人絶陜津杜畿至數月不得渡操遣夏侯惇討固等未至畿曰河東有三萬户非皆欲為亂也今兵迫之急欲為善者無主必懼而聽於固固等埶專必以死戰討之不勝為難未已討之而勝是殘一郡之民也且固等未顯絶王命外以請故君為名必不害新君吾單車直往出其不意固為人多計而無斷必偽受吾吾得居郡一月以計縻之足矣遂詭道從郖津度范先欲殺畿以威衆且觀畿去就於門下斬殺主簿以下三十餘人畿舉動自若於是固曰殺之無損徒有惡名且制之在我遂奉之畿謂固先曰衛范河東之望也吾仰成而已然君臣有定義成敗同之大事當共平議以固為都督行丞事領功曹將校吏兵三千餘人皆范先督之固等喜雖陽事畿不以為意固欲大發兵畿患之説固曰今大發兵衆情必擾不如徐以貲募兵固以為然從之得兵甚少畿又喻固等曰人情顧家諸將掾史可分遣休息急緩召之不難固等惡逆衆心又從之於是善人在外隂為已援惡人分散各還其家㑹白騎攻東垣髙幹入濩澤畿知諸縣附已乃出單將數十騎赴堅壁而守之吏民多舉城助畿者比數十日得四千餘人固等與髙幹張晟共攻畿不下略諸縣無所得曹操使議郎張既西徵闗中諸將馬騰等皆引兵㑹擊晟等破之斬固琰等首其餘黨與皆赦之於是杜畿治河東務崇寬惠民有辭訟畿為陳義理遣歸諦思之父老皆自相責怒不敢訟勸耕桑課畜牧百姓家家豐實然後興學校舉孝弟修戎事講武備河東遂安畿在河東十六年常為天下最祕書監侍中荀悦作申鑒五篇奏之悦爽之兄子也時政在曹氏天子恭己悦志在獻替而謀無所用故作是書其大畧曰為政之術先屏四患乃崇五政偽亂俗私壊灋放越軌奢敗制四者不除則政末由行矣是謂四患興農桑以養其生審好惡以正其俗宣文教以章其化立武備以秉其威明賞罰以統其灋是謂五政人不畏死不可懼以罪人不樂生不可勸以善故在上者先豐民財以定其志是謂養生善惡要乎功罪毁譽効於凖驗聽言責事舉名察實無或詐偽以蕩衆心故俗無姦怪民無淫風是謂正俗榮辱者賞罰之精華也故禮教榮辱以加君子化其情也桎梏鞭撲以加小人化其形也若教化之廢推中人而墜於小人之域教化之行引中人而納於君子之塗是謂章化在上者必有武備以戒不虞安居則寄之内政有事則用之軍旅是謂秉威賞罰政之柄也人主不妄賞非愛其財也賞妄行則善不勸矣不妄罰非矜其人也罰妄行則惡不懲矣賞不勸謂之止善罰不懲謂之縱惡在上者能不止下為善不縱下為惡則國灋立矣是謂統灋四患既蠲五政又立行之以誠守之以固簡而不怠踈而不失垂拱揖讓而海内平矣資治通鑑巻第六十四
