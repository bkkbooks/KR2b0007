front:
  text: 易帝不從夏四月沮渠無諱將萬餘家弃敦煌西就沮渠安周未至鄯善王比龍畏之將其衆犇且末其世子降於安周無諱遂據鄯善其士卒經流沙渴死者太半李寳自伊吾帥衆二千入據敦煌繕脩城府安集故民沮渠牧犍之亡也涼州人闞爽據髙昌自稱太守唐契爲柔然所逼擁衆西趨髙昌欲奪其地柔然遣其將阿􅀂追擊之契敗死契弟和收餘衆犇車師前部王伊洛時沮渠安周屯横截城和攻抜之又拔髙寧白力二城遣使請降於魏甲戍上以疾愈大赦五月裴方明等至漢中與劉眞道分兵攻武興下辯白水皆取之楊難當遣建節將軍符弘祖守蘭臯使其子撫軍大將軍和將重兵爲後繼方明與弘祖戰於濁水大破之斬弘祖和退走追至赤亭又破之難當犇上邽獲難當兄子建節將軍保熾難當以其子虎爲益州刺史守隂平聞難當走引兵還至下辯方明使其子肅之邀擊之擒虎送建康斬之仇池平以輔國司馬胡崇之爲北秦州刺史鎭其地立楊保熾爲楊玄後使守仇池魏人遣中山王辰迎楊難當詣平城秋七月以劉眞道爲雍州刺史裴方明爲梁南秦二州刺史方明辭不拜丙寅魏主使安西將軍古弼督隴右諸軍及殿中虎賁與武都王楊保宗自祁山南入征西將軍漁陽皮豹子與琅邪王司馬楚之督􅀜中諸軍自散􅀜西入俱㑹仇池又使譙王司馬文思督洛豫諸軍南趨襄陽征南將軍刁雍東趨廣陵移書徐州稱爲楊難當報仇
