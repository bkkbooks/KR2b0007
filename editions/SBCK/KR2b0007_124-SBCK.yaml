body:
  text: 甲戍晦日有食之唐契之攻闞爽也爽遣使詐降於沮渠無諱欲與之共擊契八月無諱將其衆趨髙昌比至契巳死爽閉門拒之九月無諱將衛興奴夜襲髙昌屠其城爽犇柔然無諱據髙昌遣其常侍汜儁奉表詣建康詔以無諱爲都督涼河沙三州諸軍事征西大將軍涼州刺史河西王冬十月已卯魏立皇子伏羅爲晉王翰爲秦王譚爲燕王建爲楚王余爲吴王甲申柔然遣使詣建康十二月辛巳魏襄城孝王盧魯元卒丙申詔魯郡修孔子廟及學舎蠲墓側五戸課役以供灑掃李寳遣其弟懐達子承奉表詣平城魏人以寳爲都督西垂諸軍事鎭西大將軍開府儀同三司沙州牧敦煌公四品以下聽承制假授雍州刺史晉安襄矦劉道産卒道産善爲政民安其業小大豐贍由是民間有襄陽樂歌山蠻前後不可制者皆出縁沔爲村落戸口殷盛及卒蠻追送至沔口未幾羣蠻大動征西司馬朱脩之討之不利詔建威將軍沈慶之代之殺虜萬餘人魏主使尚書李順差次羣臣賜以爵位順受賄品第不平是歳涼州人徐桀告之魏主怒且以順保庇沮渠氏面欺誤國賜順死二十年春正月魏皮豹子等進擊樂郷將軍王奐之等敗没魏軍進至下辯將軍强玄明等敗死二月胡崇之與魏戰於濁水崇之爲魏所擒餘衆走還漢中將軍姜道祖兵敗降魏魏遂取仇池楊保熾走丙午魏主如􅁪山之陽三月庚申還宫壬戍烏洛矦國遣使如魏􅀄魏之居北荒也鑿石爲廟在烏洛矦西北以祀其先髙七十尺深九十歩及烏洛矦使者至魏言石廟具在魏主遣中書侍郎李敞詣石廟致祭刻祝文於壁而還去平城四千餘里魏河間公齊與武都王楊保宗對鎮雒谷保宗弟文德説保宗令閉險自固以叛魏或以告齊夏四月齊誘執保宗送平城殺之前鎭東司符逹征西從事中郎任朏等遂舉兵立楊文德爲主據白崖分兵取諸戍進圍仇池自號征西將軍秦河梁三州牧仇池公甲午立皇子誕爲廣陵王丁酉魏大赦己亥魏主如隂山五月魏古弼􅀤上邽髙平岍城諸軍擊楊文德文德退走皮豹子督􅀜中諸軍至下辯聞仇池解圍欲還弼遣人謂豹子曰宋人恥敗必將復來軍還之後再舉爲難不如練兵蓄力以待之不出秋冬宋師必至以逸待勞無不克矣豹子從之魏以豹子爲仇池鎭將楊文德遣使來求援秋七月癸丑詔以文德爲都督北秦雍二州諸軍事征西大將軍北秦州刺史武都王文德屯葭蘆城以任朏爲左司馬武都隂平氐多歸之甲子前雍州刺史劉眞道梁南秦二州刺史裴方明坐破仇池減匿金寳及善馬下獄死九月辛巳魏主如漠南甲辰捨輜重以輕􅀐襲柔然分軍爲四道樂安王範建寧王崇各統十五將出東道樂平王丕督十五將出西道魏主出中道中山王辰督十五將爲後繼魏主至鹿渾谷遇敕連可汗太子晃言於魏主曰賊不意大軍猝至宐掩其不僃速進擊之尚書令劉絜固諌以爲賊營中塵盛其衆必多出至平地恐爲所圍不如須諸軍大集然後擊之晃曰塵之盛者由軍士驚怖擾亂故也何得營上而有此塵乎魏主疑之不急擊柔然遁去追至石水不及而還旣而獲柔然􅇋􅀐曰柔然不覺魏軍至上下惶駭引衆北走經六七日知無追者始乃徐行魏主􅀷恨之自是軍國大事皆與太子謀之司馬楚之别將兵督軍糧鎭北將軍封沓亡降柔然説柔然令擊楚之以絶軍食俄而軍中有告失驢耳者諸將莫曉其故楚之曰此必賊遣姦人入營覘伺割驢耳以爲信耳賊至不乆宐急爲之僃乃伐柳爲城以水灌之令凍城立而柔然至冰堅滑不可攻乃散走十一月將軍姜道盛與楊文德合衆二萬攻魏濁水戍魏皮豹子河間公齊救之道盛敗死甲子魏主還至朔方下詔令皇太子副理萬機緫統百揆且曰諸功臣勤勞日乆皆當以爵歸第隨時朝請饗宴朕前論道陳謨而巳不宐復煩以劇職更舉賢俊以僃百官十二月辛卯魏主還平城二十一年春正月己亥帝耕藉田大赦壬寅魏太子始揔百揆命侍中中書監穆夀司徒崔浩侍中張􅀺古弼輔太子決庶政上書者皆稱臣儀與表同古弼爲人忠愼質直嘗以上谷􅁐囿太廣乞減太半以賜貧民入見魏主欲奏其事帝方與給事中劉樹圍碁志不在弼弼侍坐良乆不獲陳聞忽起捽樹頭掣下牀搏其耳敺其背曰朝廷不治實爾之罪帝失容捨碁曰不聽奏事朕之過也樹何罪置之弼具以狀聞帝皆可其奏弼曰爲人臣無禮至此其罪大矣出詣公車免􅃣徒跣請罪帝召入謂曰吾聞築社之役蹇蹷而築之端冕而事之神降之福然則卿有何罪其冠履就職苟有可以利社稷便百姓者竭力爲之勿顧慮也太子課民稼穡使無牛者借人牛以耕種而爲之芸田以償之凡耕種二十二畒而芸七畒大略以是爲率使民各標姓名於田首以知其勤惰禁飲酒遊戲者於是墾田大増戊申魏主詔王公以下至庶人有私養沙門巫覡於家者皆遣詣官曹過二月十五日不出沙門巫覡死主人門誅庚戍又詔王公卿大夫之子皆詣太學其百工商賈之子當各習父兄之業母得私立學校違者師死主人門誅二月辛未魏中山王辰内都坐大官薛辨尚書奚眷等八將坐擊柔然後期斬於都南􅀄魏尚書令劉絜乆典機要恃寵自專魏主心惡之及將襲柔然絜諫曰蠕蠕遷徙無常前者出師勞而無功不如廣農積穀以待其來崔浩固勸魏主行魏主從之絜恥其言不用欲敗魏師魏主與諸將期㑹鹿渾谷絜矯詔易其期帝至鹿渾谷欲擊柔然絜諌止之使待諸將帝留鹿渾谷六日諸將不至柔然遂逺遁追之不及軍還經漠中糧盡士卒多死絜隂使人驚魏軍勸帝委軍輕還帝不從絜以軍出無功請治崔浩之罪帝曰諸將失期遇賊不擊浩何罪也浩以絜矯詔事白帝帝至五原收絜囚之帝之北行也絜私謂所親曰􅀂車駕不返吾當立樂平王絜聞尚書右丞張嵩家有圖䜟問曰劉氏應王繼國家後吾有姓名否嵩曰有姓無名帝聞之命有司窮治索嵩家得䜟書事連南康公狄鄰絜嵩鄰皆夷三族死者百餘人絜在勢要好作威福諸將破敵所得財物皆與絜分之旣死籍其家財巨萬帝毎言之則切齒癸酉樂平戾王丕以憂卒􅀄魏主築白臺髙二百餘尺丕夢登其上四顧不見人命術士董道秀筮之道秀曰大吉丕黙有喜色及丕卒道秀亦坐弃市髙允聞之曰夫筮者皆當依附爻象勸以忠孝王之問道秀也道秀宐曰窮髙爲亢易曰亢龍有悔又曰髙而無民皆不祥也王不可以不戒如此則王安於上身全於下矣道秀反之宐其死也庚辰魏主幸廬己丑江夏王義恭進位太尉領司徒庚寅以侍中領右衛將軍沈演之爲中領軍左衛將軍范曄爲太子詹事辛卯立皇子宏爲建平王三月甲辰魏主還宫癸丑魏主遣司空長孫道生鎭統萬夏四月乙亥魏侍中太宰陽平王杜超爲帳下所殺六月魏北部民殺立義將軍衡陽公莫孤帥五千餘落北走遣兵追擊之至漠南殺其渠帥餘徙冀相定三州爲營戸吐谷渾王慕利延兄子緯世與魏使者謀降魏慕利延殺之是月緯世弟叱力延等八人犇魏魏以叱力延爲歸義王沮渠無諱卒弟安周代立魏入中國以來雖頗用古禮祀天地宗廟百神而猶循其舊俗所祀胡神甚衆崔浩請存合於祀典者五十七所其餘􅃨重及小神悉罷之魏主從之􅊨秋七月癸卯魏東雍州刺史沮渠秉謀反伏誅八月乙丑魏主畋于河西尚書令古弼留守詔以肥馬給獵􅀐弼悉以弱者給之帝大怒曰筆頭奴敢裁量朕朕還臺先斬此奴弼頭鋭故帝常以筆目之弼官屬惶怖恐并坐誅弼曰吾爲人臣不使人主盤于遊畋其罪小不僃不虞乏軍國之用其罪大今蠕蠕方彊南宼未滅吾以肥馬供軍弱馬供獵爲國逺慮雖死何傷且吾自爲之非諸君之憂也帝聞之歎曰有臣如此國之寳也賜衣一襲馬二匹鹿十頭它日魏主復畋於山北獲麋鹿數千頭詔尚書發牛車五百乗以運之詔使巳去魏主謂左右曰筆公必不與我汝輩不如自以馬運之遂還行百餘里得弼表曰今秋穀懸黄麻菽布野豬鹿竊食鳥鴈侵費風雨所耗朝夕三倍乞賜矜緩使得收載帝曰果如吾言筆公可謂社稷之臣矣魏主使貟外散􅀐常侍髙濟來聘戊辰以荆州刺史衡陽王義季爲征北大將軍開府儀同三司南兖州刺史以南譙王義宣爲荆州刺史􅀄帝以義宣不才故不用㑹稽公主屢以爲言帝不得已用之先賜中詔敕之曰師護以在西乆比表求還今欲聽許以汝代之師護雖無殊績絜巳節用通懐期物不恣羣下聲著西土爲士庶所安論者乃未議遷之今之回換更爲汝與師護年時一輩欲各試其能汝往脫有一事減之者旣於西夏交有巨礙遷代之譏必歸責於吾矣此事亦易勉耳無爲使人復生評論也義宣至鎭勤自課厲事亦脩理庚辰㑹稽長公主卒吐谷渾叱力延等請師於魏以討吐谷渾王慕利延魏主使晉王伏羅督諸軍擊之九月甲辰以沮渠安周爲都督涼河沙三州諸軍事涼州刺史河西王丁未魏主如漠南將襲柔然柔然敕連可汗逺遁乃止敕連㝷卒子吐賀眞立號處羅可汗魏晉王伏羅至樂都引兵從間道襲吐谷渾至大母橋吐谷渾王慕利延大驚逃犇白蘭慕利延兄子拾寅犇河西魏軍斬首五千餘級慕利延從弟伏念等帥萬三千落降於魏冬十月巳卯以左軍將軍徐瓊爲兖州刺史大將軍參軍申恬爲翼州刺史徙兖州鎭須昌冀州鎭歷下恬謨之弟也十二月丙戌魏主還平城是歳沙州牧李竇入朝于魏魏人留之以爲外都大官太子率更令何承天撰元嘉新曆表上之以月食之衝知日所在又以中星檢之知堯時冬至日在須女十度今在斗十七度又測景校二至差三日有餘知今之南至日應在斗十三四度於是更立新灋冬至徙上三日五時日之所在移舊四度又月有遲疾前歷合朔月食不在朔望今皆以盈縮定其小餘以正朔望之日詔付外詳之太史令錢樂之等奏皆如承天所上唯月有頻三大頻二小比舊灋殊爲乖異謂宐仍舊詔可二十二年春正月辛卯朔始行新曆􅀄漢京房以十二律中吕上生黃鍾不滿九寸更演爲六十律錢樂之復演爲三百六十律日當一管何承天立議以爲上下相生三分損益其一蓋古人簡易之灋猶如古曆周天三百六十五度四分度之一也而京房不悟謬爲六十乃更設新率林鍾長六寸一釐則從中吕還得黃鍾十二旋宫聲韻無失壬辰以武陵王駿爲雍州刺史帝欲經略􅀜河故以駿鎭襄陽魏主使散􅀐常侍宋愔來聘二月魏主如上黨西至吐京討徙叛胡岀配郡縣甲戍立皇子禕爲東海王昶爲義陽王三月庚申魏主還宫魏詔諸疑獄皆付中書以經義量決夏四月庚戌魏主遣征西大將軍髙涼王那等擊吐谷渾王慕利延於白蘭秦州刺史代人封敕文安逺將軍乙烏頭擊慕利延兄子什歸於枹罕河西之亡也鄯善又以其地與魏鄰大懼曰通其使人知我國虚實取亡必速乃閉斷道使者往來輙鈔劫之由是西域不通者數年魏主使散􅀐常侍萬度歸􅀤涼州以西兵擊鄯善六月壬辰魏主北廵帝謀伐魏罷南豫州入豫州辛亥以南豫州刺史南平王鑠爲豫州刺史秋七月己未以尚書僕射孟顗爲左僕射中護軍何尚之爲右僕射武陵王駿將之鎭時縁沔諸蠻猶爲㓂水陸梗礙駿分軍遣撫軍中兵參軍沈慶之掩擊大破之駿至鎭蠻斷驛道欲攻随郡隨郡太守河東柳元景募得六七百人邀擊大破之遂平諸蠻獲七萬餘口㳙山蠻最彊沈慶之討平之獲三萬餘口徙萬餘口於建康吐谷渾什歸聞魏軍將至弃城夜遁八月丁亥封敕文入枹罕分徙其民千家還上邽留乙烏頭守枹罕萬度歸至敦煌留輜重以輕􅀐五千度流沙襲鄯善壬辰鄯善王眞逹面􅅞出降度歸留軍屯守與眞逹詣平城西域復通魏主如隂山之北􅀤諸州兵三分之一各於其州戒嚴以須後命徙諸種雜民五千餘家於北邊令就北畜牧以餌柔然壬寅魏髙涼王那軍至寧頭城吐谷渾王慕利延擁其部落西度流沙吐谷渾慕璝之子􅀍囊逆戰那擊破之􅀍囊遁走中山公杜豐帥精􅀐追之度三危至雪山生擒􅀍囊及吐谷渾什歸乞伏熾磐之子成龍皆送平城慕利遂西入于闐殺其王據其地死者數萬人九月癸酉上餞衡陽王義季于武帳岡上將行敕諸子且勿食至㑹所設饌日旰不至有飢色上乃謂曰汝曹少長豐佚不見百姓艱難今使汝曹識有飢苦知以節儉御物耳裴子野論曰善乎太祖之訓也夫侈興於有餘儉生於不足欲其隱約莫􅀂貧賤習其險艱利以任使逹其情僞易以躬臨太祖􅀂能率此訓也難其志操卑其禮秩教成德立然後授以政事則無怠無荒可播之於九服矣髙祖思固本枝崇樹襁褓後世遵守迭據方岳及乎泰始之􅀄升明之季絶咽於衾衽者動數十人國之存亡旣不是繫早肆民上非善誨也魏民間訛言滅魏者吴盧水胡蓋吳聚衆反於杏城諸種胡爭應之有衆十餘萬遣其黨趙綰來上表自歸冬十月戊子長安鎭副將拓䟦紇帥衆討吴紇敗死吴衆愈盛民皆渡渭犇南山魏主􅀤髙平敕勒􅀐赴長安命將軍叔孫抜領攝并秦雍三州兵屯渭北十一月魏􅀤冀州民造浮橋於碻磝津蓋吴遣别部帥白廣平西掠新平安定諸胡皆聚衆應之又分兵東掠臨晉巴東將軍章直擊破之溺死於河者三萬餘人吴又遣兵西掠至長安將軍叔孫抜與戰於渭北大破之斬首三萬餘級河東蜀薛永宗聚衆以應吴襲擊聞喜聞喜縣無兵仗令憂惶無計縣人裴駿帥厲郷豪擊之永宗引去魏主命薛謹之子抜紏合宗郷壁於河際以斷二宼往來之路庚午魏主使殿中尚書拓跋處直等將二萬􅀐討薛永宗殿中尚書乙抜將三萬􅀐討蓋吴西平公宼提將萬􅀐討白廣平吴自號天台王署置百官辛未魏主還宫魏選六州驍􅀐二萬使永昌王仁髙涼王那分將之爲二道掠淮泗以北徙青徐之民以實河北癸未魏主西廵􅀄魯國孔熈先博學文史兼通數術有縱橫才志爲貟外散􅀐侍郎不爲時所知憤憤不得志父黙之爲廣州刺史以贓獲罪大將軍彭城王義康爲救解得免及義康遷豫章熈先密懐報効且以爲天文圖䜟帝必以非道晏駕由骨肉相殘江州應出天子以范曄志意不滿欲引與同謀而熈先素不爲曄所重太子中舍人謝綜曄之甥也熈先傾身事之綜引熈先與曄相識熈先家饒於財數與曄博故爲拙行以物輸之曄旣利其財又愛其文藝由是情好􅅃洽熈先乃從容説曄曰大將軍英㫁聦敏人神攸屬失職南垂天下憤怨小人受先君遺命以死報大將軍之德頃人情騷動天文舛錯此所謂時運之至不可推移者也􅀂順天人之心結英豪之士表裏相應􅀤於肘腋然後誅除異我崇奉明聖號令天下誰敢不從小人請以七尺之軀三寸之舌立功立事而歸諸君子丈人以爲何如曄甚愕然熈先曰昔毛玠竭節於魏武張温畢議於孫權彼二人者皆國之俊乂豈言行玷缺然後至於禍辱哉皆以廉直勁正不得乆容丈人之於本朝不􅀷於二主人間雅譽過於兩臣䜛夫側目爲日乆矣比肩競逐庸可遂乎近者殷鐡一言而劉班碎首彼豈父兄之讎百世之怨乎所爭不過榮名勢利先後之間耳及其末也唯恐陷之不深發之不早戮及百口猶曰未厭是可爲寒心悼懼豈書籍逺事也哉今建大勲奉賢哲圖難於易以安易危享厚利收鴻名一旦包舉而有之豈可弃置而不取哉曄猶疑未決熈先曰又有過於此者愚則未敢道耳曄曰何謂也熈先曰丈人弈葉清通而不得連姻帝室人以犬豕相遇而丈人曾不恥之欲爲之死不亦惑乎曄門無内行故熈先以此激之曄黙然不應反意乃決曄與沈演之並爲帝所知曄先至必待演之俱入演之先至甞獨􅀍引曄以此爲怨曄累經義康府佐中間獲罪於義康謝綜及父述皆爲義康所厚綜弟約娶義康女綜爲義康記室參軍自豫章還申義康意於曄求解晚隙復敦往好大將軍府史仲承祖有寵於義康聞熈先有謀密相結納丹楊尹徐湛之素爲義康所愛承祖因此結事湛之告以密計道人灋略尼灋静皆感義康舊恩並與熈先往來灋静妹夫許曜領隊在臺許爲内應灋静之豫章熈先付以牋書陳説圖䜟於是密相署置及素所不善者並入死目熈先又使弟休先作檄文稱賊臣趙伯符肆兵犯蹕禍流儲宰湛之曄等投命奮戈即日斬伯符首及其黨與今遣護軍將軍臧質奉璽綬迎彭城王正位辰極熈先以爲舉大事宐須以義康之㫖諭衆曄又詐作義康與湛之書令誅君側之惡宣示同黨帝之燕武帳岡也曄等謀以其日作亂許曜侍帝扣刀目曄曄不敢仰視俄而座散徐湛之恐事不濟密以其謀白帝帝使湛之具探取本末得其檄書選署姓名上之帝乃命有司收掩窮治其夜呼曄置客省先於外收綜及熈先兄弟皆款服帝遣使詰問曄曄猶隱拒熈先聞之􅀏曰凡處分符檄書䟽皆范所造云何於今方作如此抵蹋邪帝以曄墨迹示之乃具陳本末明日仗士送付廷尉熈先望風吐款辭氣不橈上竒其才遣人慰勉之曰以卿之才而滯於集書省理應有異志此乃我負卿也又責前吏部尚書何尚之曰使孔熈先年將三十作散􅀐郎那不作賊熈先於獄中上書謝恩且陳圖䜟深戒上以骨肉之禍曰願且勿遺弃存之中書􅀂囚死之後或可追録庶九泉之下少塞舋責曄在獄爲詩曰雖無嵇生琴庶同夏矦色曄本意謂入獄即死而上窮治其獄遂經二旬曄更有生望獄吏戲之曰外傳詹事或當長繫曄聞之驚喜綜熈先笑之曰詹事疇昔攘袂瞋目躍馬顧盻自以爲一世之雄今擾攘紛紜畏死乃爾設令賜以性命人臣圖主何顔可以生存十二月乙未曄綜熈先及其子弟黨與皆伏誅曄母至市涕泣責曄以手擊曄頸曄色不怍妺及妓妾來别曄悲涕流漣綜曰舅殊不及夏矦色曄收淚而止謝約不豫逆謀見兄綜與熈先遊常諌之曰此人輕事好竒不近於道果鋭無檢未可與狎綜不從而敗綜母以子弟自蹈逆亂獨不出視曄語綜曰姊今不來勝人多矣收籍曄家樂器服玩並皆珍麗妓妾不勝珠翠母居止單陋唯有一厨盛樵薪弟子冬無􅀍叔父單布衣裴子野論曰夫有逸羣之才必思沖天之據蓋俗之量則憤常均之下其能守之以道將之以禮殆爲鮮乎劉弘仁范蔚宗皆忸志而貪權矜才以徇逆累葉風素一朝而隕嚮之所謂智能翻爲亡身之具矣徐湛之所陳多不盡爲曄等辭所連引上赦不問臧質熹之子也先爲徐兖二州刺史與曄厚善曄敗以爲義興太守有司奏削彭城王義康爵收付廷尉治罪丁酉詔免義康及其男女皆爲庶人絶屬籍徙付安成郡以寧朔將軍沈邵爲安成相領兵防守邵璞之兄也義康在安成讀書見淮南厲王長事廢書歎曰自古有此我乃不知得罪爲宐也庚戍以前豫州刺史趙伯符爲護軍將軍伯符孝穆皇后之弟子也初江左二郊無樂宗廟雖有登歌亦無二舞是歳南郊始設登歌魏安南平南府移書兖州以南國僑置諸州多濫北境名號又欲遊獵具區兖州荅移曰必􅀂因土立州則彼立徐楊豈有其地復知欲遊獵具區觀化南國開館飾邸則有司存呼韓入漢厥儀未泯饋餼之秩毎存豐厚二十三年春正月庚申尚書左僕射孟顗罷戊辰魏主軍至東雍州臨薛永宗壘崔浩曰永宗未知陛下自來衆心縱弛今北風迅疾宐急擊之魏主從之庚午圍其壘永宗出戰大敗與家人皆赴汾水死其族人安都先據弘農棄城來犇辛未魏主南如汾隂濟河至洛水橋聞蓋吳在長安北帝以渭北地無穀草欲渡渭南循渭而西以問崔浩對曰夫擊蛇者先擊其首首破則尾不能掉今蓋吳營去此六十里輕􅀐趨之一日可到到則破之必矣破吳南向長安亦不過一日一日之乏未至有傷􅀂從南道則吳徐入北山猝未可平帝不從自渭南向長安庚辰至戲水吴衆聞之悉散入北地山軍無所獲帝悔之二月丙戍帝至長安丙申如􅉦厔歷陳倉還如雍城所過誅民夷與蓋吴通謀者乙抜等諸軍大破蓋吳於杏城吳復遣使上表求援詔以吳爲都督􅀜隴諸軍事雍州刺史北地公使雍梁二州􅀤兵屯境上爲吴聲援遣使賜吴印一百二十一紐使吴随宐假授􅀄林邑王范陽邁雖遣使入貢而宼盜不絶所貢亦薄陋帝遣交州刺史檀和之討之南陽宗慤家世儒素慤獨好武事常言願乗長風破萬里浪及和之伐林邑慤自奮請從軍詔以慤爲振武將軍和之遣慤爲前鋒陽邁聞軍出遣使上表請還所掠日􅀯民輸金一萬斤銀十萬斤帝詔和之􅀂陽邁果有􅅃誠亦許其歸順和之至朱梧戍遣府戸曹參軍姜仲基等詣陽邁陽邁執之和之乃進軍圍林邑將范扶龍於區粟城陽邁遣其將范毗沙逹救之宗慤潜兵迎擊毗沙逹破之魏主與崔浩皆信重㓂謙之奉其道浩素不喜佛灋每言於魏主以爲佛灋虚誕爲世費害宐悉除之及魏主討蓋吴至長安入佛寺沙門飲從官酒從官入其室見大有兵器出以白帝帝怒曰此非沙門所用必與蓋吴通謀欲爲亂耳命有司案誅闔寺沙門閱其財産大得釀具及州郡牧守富人所􅀉藏物以萬計又爲窟室以匿婦女浩因說帝悉誅天下沙門毀諸經像帝從之宼謙之與浩固爭浩不從先盡誅長安沙門焚毀經像并敕留臺下四方令一用長安灋詔曰昔後漢荒君信惑邪僞以亂天常自古九州之中未甞有此夸誕大言不本人情叔季之世莫不眩焉由是攻敎不行禮義大壊九服之内鞠爲丘墟朕承天緒欲除僞定眞復羲農之治其一切盪除滅其蹤跡自今巳後敢有事胡神及造形像泥人銅人者門誅有非常之人然後能行非常之事非朕孰能去此歷代之僞物有司宣告征鎭諸軍刺史諸有浮圖形像及胡經皆擊破焚燒沙門無少長悉阮之太子晁素好佛灋屢諌不聽乃緩宣詔書使逺近豫聞之得各爲計沙門多亡匿獲免或牧藏經像唯塔廟在魏境者無復孑遺魏主徙長安工巧二千家於平城還至洛水分軍誅李閏叛羌太原顔白鹿私入魏境爲魏人所得將殺之詐云青州刺史杜驥使其歸誠魏人送白鹿詣平城魏主喜曰我外家也使崔浩作書與驥且命永昌王仁髙涼王那將兵迎驥攻冀州刺史申恬於歷城杜驥遣其府司馬夏矦祖歡等將兵救歷城魏人遂宼兖青冀三州至清東而還殺掠甚衆北邊騷動帝以魏宼爲憂咨訪羣臣御史中丞何承天上表以爲凡僃匈奴之策不過二科武夫盡征伐之謀儒生講和親之約今􅀂欲追蹤衛霍自非大田淮泗内實青徐使民有贏儲野有積穀然後發精卒十萬一舉蕩夷則不足爲也􅀂但欲遣軍追討報其侵􅁀則彼必輕􅀐犇走不肯㑹戰徒興巨費不損於彼報復之役將遂無巳斯策之最末者也安邊固守於計爲長臣竊以曹孫之霸才均智敵江淮之間不居各數百里何者斥􅇋之郊非耕牧之地故堅壁清野以􅇋其來整甲繕兵以乗其弊保民全境不出此塗要而歸之其策有四一曰移逺就近今靑兖舊民及冀州新附在界首者三萬餘家可悉徙置大峴之南以實内地二曰多築城邑以居新徙之家假其經用春夏佃牧秋冬入保㓂至之時一城千家堪戰之士不下二千其餘羸弱猶能登陴鼔譟足抗羣虜三萬矣三曰纂偶車牛以載糧械計千家之資不下五百耦牛爲車五百兩參合鉤連以衛其衆設使城不可固平行趨險賊所不能干有急徴􅀤信􅀫可聚四曰計丁課仗凡戰士二千隨其便能各自有仗素所服習銘刻由己還保輸之於庫出行請以自新弓簳利鐡民不得者官以漸充之數年之内軍用粗僃矣近郡之師逺屯清濟功費旣重嗟怨亦􅀷以臣料之未􅀂即用彼衆之易也今因民所利導而帥之兵彊而敵不戒國冨而民不勞比於優復隊伍坐食糧廩者不可同年而校矣魏金城邊固天水梁㑹與秦益雜民萬餘戸據上邽東城反攻逼西城秦益二州刺史封敕文拒却之氐羌萬餘人休官屠各二萬餘人皆起兵應固㑹敕文擊固斬之餘衆推㑹爲主與敕文相攻夏四月甲申魏主至長安丁未大赦仇池人李洪聚衆自言應王梁㑹求敕於氐王楊文德文德曰兩雄不並立􅀂須我者宐先殺洪㑹誘洪斬之送首於文德五月癸亥魏主遣安豐公閭根帥􅀐赴上邽未至㑹弃東城走敕文先掘重塹於外嚴兵守之格􅃲從夜至旦敕文曰賊知無生路致死於我多殺傷士卒未易克也乃以白虎幡宣告會衆降者赦之㑹衆遂潰分兵追討悉平之略陽人王元逹聚衆屯松多川敕文又討平之蓋吴牧兵屯杏城自號秦地王聲勢復振魏主遣永昌王仁髙涼王那督北道諸軍討之檀和之等抜區粟斬范扶龍乗勝入象浦林邑王陽邁傾國來戰以具裝􅀍象前後無際宗慤曰吾聞外國有師子威服百獸乃製其形與象相拒象果驚走林邑兵大敗和之遂克林邑陽邁父子挺身走所獲未名之寳不可勝計宗慤一無所取還家之日衣櫛蕭然六月癸未朔日有食之甲申魏􅀤冀相定三州兵二萬人屯長安南山諸谷以僃蓋吴竄逸丙戍又􅀤司幽定冀四州十萬人築畿上塞圍起上谷西至河廣縱千里帝築北隄立玄武湖築景陽山於華林園秋七月辛未以散􅀐常侍杜坦爲青州刺史坦驥之兄也􅀄杜預之子耽避晉亂居河西仕張氏前秦克涼州子孫始還􅀜中髙祖滅後秦坦兄弟從髙祖過江時江東王謝諸族方盛北人晚渡者朝廷悉以傖荒遇之雖復人才可施皆不得踐清塗上甞與坦論金日磾曰恨今無復此輩人坦曰日磾假生今丗養馬不暇豈辦見知上變色曰卿何量朝廷之薄也坦曰請以臣言之臣本中華髙族晉氏喪亂播遷涼土世業相承不殞其舊直以南度不早便以荒傖賜隔日磾胡人身爲牧圉乃超登内侍齒列名賢聖朝雖復抜才臣恐未必能也上嘿然八月魏髙涼王那等破蓋吴獲其二叔諸將欲送詣平城長安鎭將陸俟曰長安險固風俗豪忮平時猶不可忽況承荒亂之餘乎今不斬吴則長安之變未巳也吴一身潜竄非其親信誰能獲之􅀂停十萬之衆以追一人又非長策不如私許吴叔免其妻子使自追吴擒之必矣諸將咸曰今賊黨衆巳散唯吴一身何所能至俟曰諸君不見毒蛇乎不㫁其首猶能爲害吴天性凶狡今􅀂得脫必自稱王者不死以惑愚民爲患愈大諸將曰公言是也但得賊不殺而更遣之􅀂遂往不返將何以任其罪俟曰此罪我爲諸君任之髙涼王那亦以俟計爲然遂赦二叔與刻期而遣之及期吴叔不至諸將皆咎俟俟曰彼伺之未得其便耳必不􅀒也後數日吴叔果以吴首來傳詣平城永昌王仁等討吳餘黨白廣平路􅃚羅等悉平之以陸俟爲内都大官㑹安定盧水胡劉超等聚衆萬餘人反魏主以俟威恩著於􅀜中復加俟都督秦雍二州諸軍事鎭長安謂俟曰􅀜中奉化日淺恩信未洽吏民數爲逆亂今朕以重兵授卿則超等必同心恊力據險拒守未易攻也􅀂兵少則不能制賊卿當自以方略取之俟乃單馬之鎭超等聞之大喜以俟爲無能爲也俟旣至諭以成敗誘納超女與爲姻戚以招之超自恃其衆猶無降意俟乃帥其帳下親往見超超使人逆謂俟曰從者過三百人當以弓馬相待不及三百人當以酒食相供俟乃將二百􅀐詣超超設僃甚嚴俟縱酒盡醉而還頃之俟復選敢死士五百人出獵因詣超營約曰發機當以醉爲限旣飲俟陽醉上馬大呼手斬超首士卒應聲縱擊殺傷千數遂平之魏主徴俟還爲外都大官是歳吐谷渾復還舊土資治通鑑卷第一百二十四
