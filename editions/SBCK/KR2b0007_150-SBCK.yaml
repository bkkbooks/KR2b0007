front:
  text: 我賀拔破胡也賊不敢逼勝見彧於雲中説之曰懐朔被圍旦夕淪陷大王今頓兵不進懐朔若陷則武川亦危賊之鋭氣百倍雖有良平不能為大王計矣彧許為出師勝還復突圍而入鈞復遣勝出覘武川武川已陷勝馳還懐朔亦潰勝父子俱為可孤所虜五月臨淮王彧與破六韓拔陵戰於五原兵敗彧坐削除官爵安北将軍隴西李叔仁又敗於白道賊勢日盛魏主引丞相令僕尚書侍中黄門於顯陽殿問之曰今冦連恒朔逼近金陵計将安出吏部尚書元脩義請遣重臣督軍鎮􅁪朔以捍冦帝曰去嵗阿那瓌叛亂遣李崇北征崇上表求改鎮為州朕以舊章難革不從其請尋崇此表開鎮户非冀之心致有今日之患但既往難追聊復略論耳然崇貴戚重望器識英敏意欲還遣崇行何如僕射蕭寳寅等皆曰如此實合羣望崇曰臣以六鎮遐僻密邇冦戎欲以慰悦彼心豈敢導之為亂臣罪當就死陛下赦之今更遣臣北行正是報恩改過之秋但臣年七十加之疲病不堪軍旅願更擇賢材帝不許修義天賜之子也
