body:
  text: 臣光曰李崇之表乃所以銷禍於未萌制勝於無形魏肅宗既不能用及亂生之日曾無愧謝之言乃更以為崇罪彼不明之君烏可與謀哉詩云聴言則對誦言如醉匪用其良覆俾我悖其是之謂矣壬申加崇使持節開府儀同三司北討大都督命撫軍将軍崔暹鎮軍将軍廣安王深皆受崇節度深嘉之子也六月以豫州刺史裴邃督征討諸軍事以伐魏魏自破六韓拔陵之反二夏豳凉冦盜蜂起秦州刺史李彦政刑殘虐在下皆怨是月城内薛珍等聚黨突入州門擒彦殺之推其黨莫折大提為帥大提自稱秦王魏遣雍州刺史元志討之初南秦州豪右楊松柏兄弟數為冦盜刺史愽陵崔遊誘之使降引為主簿接以辭色使説下羣氏旣而因宴㑹盡收斬之由是所部莫不猜懼遊聞李彦死自知不安欲逃去未果城民張長命韓祖香孫掩等攻遊殺之以城應大提大提遣其黨卜胡襲髙平克之殺鎮将赫連略行臺髙元榮大提尋卒子念生自稱天子置百官改元天建丁酉魏大赦秋七月甲寅魏遣吏部尚書元修義兼尚書僕射為西道行臺帥諸将討莫折念生崔暹違李崇節度與破六韓拔陵戰于白道大敗單騎走還拔陵并力攻崇崇力戰不能禦引還雲中與之相持廣陽王深上言先朝都平城以北邊為重盛簡親賢擁麾作鎮配以髙門子弟以死防遏非唯不廢仕宦乃更獨得復除當時人物忻慕為之太和中僕射李冲用事凉州土人悉免厮役帝鄉舊門仍防邊戍自非得罪當世莫肯與之為伍本鎮驅使但為虞候白直一生推遷不過軍主然其同族留京師者得上品通官在鎮者即為清途所隔或多逃逸乃峻邊兵之格鎭人不聽浮遊在外於是少年不得從師長者不得遊官獨為匪人言之流涕自定鼎伊洛邊任益輕唯底滯凡才乃出為鎮将轉相模習專事聚歛或諸方姦吏犯罪配邊為之指蹤政以賄立邊人無不切齒及阿那瓌背恩縱掠􅀤奔命追之十五萬衆度沙漠不日而還邊人見此援師遂自意輕中國尚書令臣崇求改鎮為州抑亦先覺朝廷未許而髙闕戍主御下失和拔陵殺之遂相帥為亂攻城掠地所過夷滅王師屢北賊黨日盛此段之舉指望銷平而崔暹隻輪不返臣崇與臣逡巡復路相與還次雲中将士之情莫不解體今日所慮非止西北将恐諸鎮尋亦如此天下之事何易可量書奏不省詔徵崔暹繫廷尉暹以女岐田園賂元义卒得不坐丁丑莫折念生遣其都督楊伯年等攻仇鳩河池二戍東益州刺史魏子建遣将軍伊祥等擊破之斬首千餘級東益州本氐王楊紹先之國将佐皆以城民勁勇二秦反者皆其族類請先收其器械子建曰城民數經行陳撫之足以為用急之則腹背為患乃悉召城民慰諭之既而漸分其父兄子弟外戍諸郡内外相顧卒無叛者子建蘭根之族兄也魏凉州幢帥于菩提等執刺史宋頴據州反八月庚寅徐州刺史成景雋拔魏童城魏員外散騎侍郎李苗上書曰凡食少兵精利於速戰糧多卒衆事宜持久今隴賊猖狂非有素蓄雖據兩城本無徳義其勢在於疾攻日有降納遲則人情離沮坐待崩潰夫飈至風舉逆者求萬一之功髙壁深壘王師有全制之策但天下久泰人不曉兵奔利不相待逃難不相顧将無灋令士非教習不思長久之計各有輕敵之心如令隴東不守汧軍敗散則兩秦遂彊三輔危弱國之右臂於斯廢矣宜勒大将堅壁勿戰别命偏裨帥精兵數千出麥積崖以襲其後則汧岐之下羣妖自散魏以苗為統軍與别将淳于誕俱出梁益􅀠魏子建未至莫折念生遣其弟髙陽王天生将兵下隴甲午都督元志與戰於隴口志兵敗弃衆東保岐州東西部敕勒皆叛魏附於破六韓拔陵魏主始思李崇及廣陽王深之言丙申下詔諸州鎮軍貫非有罪配􅀠者皆免為民改鎮為州以懐朔鎮為朔州更命朔州曰雲州遣兼黄門侍郎酈道元為大使撫慰六鎮時六鎮已盡叛道元不果行先是代人遷洛者多為選部所抑不得仕進及六鎮叛元义乃用代來寒人為傳詔以慰悦之廷尉評代人山偉奏記稱义徳美义擢偉為尚書二千石郎秀容人乞伏莫于聚衆攻郡殺太守丁酉南秀容牧子萬于乞真反殺太僕卿陸延秀容酋長爾朱榮討平之榮羽健之玄孫也其祖代勤嘗出獵部民射虎誤中其髀代勤拔箭不復推問所部莫不感悦官至肆州刺史賜爵梁郡公年九十餘而卒子新興立新興時畜牧尤蕃息牛羊駝馬色别為羣彌漫川谷不可勝數魏每出師新興輒獻馬及資糧以助軍髙祖嘉之新興老請傳爵於子榮魏朝許之榮神機明决御衆嚴整時四方兵起榮隂有大志散其畜牧資財招合驍勇結納豪桀於是矦景司馬子如賈顯度及五原段榮太安竇泰皆徃依之顯度顯智之兄也戊戌莫折念生遣都督竇雙攻魏盤頭郡東益州刺史魏子建遣将軍竇念祖擊破之九月戊申成景儁拔魏睢陵戊午北兖州刺史趙景悦圍荆山裴邃帥騎三千襲夀陽壬戌夜斬闗而入克其外郭魏揚州刺史長孫稚禦之一日九戰後軍蔡秀成失道不至邃引兵還别将擊魏淮陽魏使行臺酈道元都督河間王琛救夀陽安樂王鑒救淮陽鑒詮之子也魏西道行臺元脩義得風疾不能治軍壬申魏以尚書左僕射齊王蕭寶寅為西道行臺大都督帥諸将討莫折念生宋頴密求救於吐谷渾王伏連籌伏連籌自将救凉州于菩提弃城走追斬之城民趙天安等復推宋頴為刺史河間王琛軍至西硤石解渦陽圍復荆山戍青冀二州刺史王神念與戰為琛所敗冬十月戊寅裴邃元樹攻魏建陵城克之辛巳拔曲木掃虜将軍彭寶孫拔琅邪魏營州城民劉安定就徳興執刺史李仲遵據城反城民王惡兒斬安定以降徳興東走自稱燕王胡琛遣其将宿勤明達冦豳夏北華三州壬午魏遣都督北海王顥帥諸将討之顥詳之子也甲申彭寶孫拔檀丘辛夘裴邃拔狄城丙申又拔甓城進屯黎漿壬寅魏東海太守韋敬欣以司吾城降定逺将軍曹世宗拔曲陽甲辰又拔秦墟魏守将多弃城走魏使黄門侍郎盧同持節詣營州慰勞就徳興降而復反詔以同為幽州刺史兼尚書行臺同屢為徳興所敗而還魏朔方胡反圍夏州刺史源子雍城中食盡煑馬皮而食之衆無貳心子雍欲自出求糧留其子延伯守統萬将佐皆曰今四方離叛糧盡援絶不若父子俱去子雍泣曰吾世荷國恩當畢命此城但無食可守故欲往東州爲諸君營數月之食若幸而得之保全必矣乃帥羸弱詣東夏州運糧延伯與将佐哭而送之子雍行數日胡帥曹阿各拔邀擊擒之子雍潛遣人齎書敕城中努力固守闔城憂懼延伯諭之曰吾父吉凶不可知方寸焦爛但奉命守城所為者重不敢以私害公諸君幸得此心於是衆感其義莫不奮勵子雍雖被擒胡人常以民禮事之子雍為陳禍福􅂆阿各拔降會阿各拔卒其弟桑生竟帥其衆隨子雍降子雍見行臺北海王顥具陳諸賊可滅之狀顥給子雍兵令其先驅時東夏州闔境皆反所在屯結子雍轉鬬而前九旬之中凡數十戰遂平東夏州徵税粟以饋統萬二夏由是獲全子雍懐之子也魏廣陽王深上言今六鎮盡叛髙車二部亦與之同以此疲兵擊之必無勝理不若選練精兵守恒州諸要更為後圖遂與李崇引兵還平城崇謂諸将曰雲中者白道之衝賊之咽㗋若此地不全則并肆危矣當留一人鎮之誰可者衆舉費穆崇乃請穆為朔州刺史賀㧞度㧞父子及武川宇文肱糾合鄉里豪傑共襲衛可孤殺之度拔尋與鐵勒戰死肱逸豆歸之􅀇孫也李崇引國子博士祖􅉷為長史廣陽王深奏瑩詐増首級盜沒軍資􅉷坐除名崇亦免官削爵徵還深專揔軍政莫折天生進攻魏岐州十一月戊申陷之執都督元志及刺史裴芬之送莫折念生殺之念生又使卜胡等宼涇州敗光禄大夫薛巒於平凉東巒安都之孫也丙辰彭寶孫拔魏東莞壬戌裴邃攻夀陽之安城丙寅馬頭安城皆降髙平人攻殺卜胡共迎胡琛魏以黄門侍郎楊昱兼侍中持節監北海王顥軍以救豳州豳州圍解蜀賊張映龍姜神達攻雍州雍州刺史元修義請援一日一夜書移九通都督李叔仁遲疑不赴昱曰長安闗中基本若長安不守大軍自然瓦散留此何益遂與叔仁進擊之斬神達餘黨散走十二月戊寅魏荆山降壬辰魏以京兆王繼為太師大将軍都督西道諸軍以討莫折念生乙巳武勇将軍李國興攻魏平靜闗辛丑信威長史楊乾攻武陽闗壬寅攻峴闗皆克之國興進圍郢州魏郢州刺史裴詢與蠻酋西郢州刺史田朴特相表裏以拒之圍城近百日魏援軍至國興引還詢駿之孫也魏汾州諸胡反以章武王融為大都督将兵討之魏魏子建招諭南秦諸氐稍稍降附遂復六郡十二戍斬賊帥韓祖香魏以子建兼尚書為行臺刺史如故梁巴二益工秦諸州皆受節度莫折念生遣兵攻凉州城民趙天安復執刺史以應之是嵗侍中太子詹事周捨坐事免散騎常侍錢唐朱异代掌機密軍旅謀議方鎮改易朝儀詔敕皆典之异好文義多藝能精力敏贍上以是任之六年春正月丙午雍州刺史晉安王綱遣安北長史柳渾破魏南鄉郡司馬董當門破魏晉城庚戌又破馬圈彫陽二城辛亥上祀南郊大赦魏徐州刺史元灋僧素附元义見义驕恣恐禍及己遂謀反魏遣中書舍人張文伯至彭城灋僧謂曰吾欲與汝去危就安能從我乎文伯曰我寧死見文陵松柏安能去忠義而從叛逆乎灋僧殺之庚申灋僧殺行臺髙諒稱帝改元天啓立諸子為王魏􅀤兵擊之灋僧乃遣其子景仲來降安東長史元顯和麗之子也舉兵與灋僧戰灋僧擒之執其手命使共坐顯和不肯曰與翁皆出皇家一朝以地外叛獨不畏良史乎灋僧猶欲慰諭之顯和曰我寧死為忠鬼不能生為叛臣乃殺之上使散騎常侍朱异使於灋僧以宣城太守元略為大都督與将軍義興陳慶之胡龍牙成景雋等将兵應接莫折天生軍於黑水兵勢甚盛魏以岐州刺史崔延伯為征西将軍西道都督帥衆五萬討之延伯與行臺蕭寶寅軍于馬嵬延伯素驍勇寶寅趣之使戰延伯曰明晨為公參賊勇怯乃選精兵數千西度黑水整陳進向天生營寶寅軍於水東遥為繼援延伯直抵天生營下揚威脅之徐引兵還天生見延伯衆少開營爭逐之其衆多於延伯十倍蹙延伯於水次寶寅望之失色延伯自為後殿不與之戰使其衆先渡部伍嚴整天生兵不敢擊須􅁷渡畢延伯徐渡天生之衆亦引還寶寅喜曰崔君之勇闗張不如延伯曰此賊非老奴敵也明公但安坐觀老奴破之癸亥延伯勒兵出寶寅與軍繼其後天生悉衆逆戰延伯身先士卒陷其前鋒将士盡鋭競進大破之俘斬十餘萬追奔至小隴岐雍及隴東皆平将士稽留採掠天生遂塞隴道由是諸軍不能進寶寅破宛川俘其民以為奴婢以美女十人賞岐州刺史魏蘭根蘭根辭曰此縣介於彊冦不能自立故附從以救死官軍之至宜矜而撫之柰何助賊為虐翦以為賤役乎悉求其父兄而歸之乙巳裴邃拔魏新蔡郡詔侍中領軍将軍西昌矦淵藻将衆前驅南兖州刺史豫章王綜與諸将繼進癸酉裴邃拔鄭城汝頴之間所在響應魏河間王琛等憚邃威名軍於城父累月不進魏朝遣廷尉少卿崔孝芬持節齎齋庫刀以趣之孝芬挺之子也琛至夀陽欲出兵决戰長孫稚以為久雨未可出琛不聴引兵五萬出城擊邃邃為四甄以待之使直閤将軍李祖憐先挑戰而偽退稚琛悉衆追之四甄競􅀤魏師大敗斬首萬餘級琛走入城稚勒兵而殿遂閉門自固不敢復出魏安樂王鑒将兵討元灋僧擊元略於彭城南略大敗與數十騎走入城鑒不設備灋僧出擊大破之鑒單騎奔歸将軍王希聃拔魏南陽平執太守薛曇尚曇尚虎子之子也甲戌以灋僧為司空封始安郡公魏以安豐王延明為東道行臺臨淮王彧為都督以擊彭城魏以京兆王繼為太尉二月乙未趙景悦拔魏龍亢初魏劉騰既卒胡太后及魏主左右防衛微緩元义亦自寛時出遊於外留連不返其所親諫义不納太后察知之去秋太后對帝謂羣臣曰今隔絶我母子不聴往來復何用我為我當出家修道於嵩山閑居寺耳因欲自下髮帝及羣臣叩頭泣涕殷勤苦請太后聲色愈厲帝乃宿於嘉福殿積數日遂與太后密謀黜义然帝深匿形迹太后有忿恚欲得往來顯陽之言皆以告义又對义流涕叙太后欲出家􅁨怖之心日有數四义殊不以為疑乃􅂆帝從太后所欲於是太后數御顯陽殿二宫無復禁礙义舉元灋僧為徐州灋僧反太后數以為言义深愧悔丞相髙陽王雍雖位居义上而深畏憚之會太后與帝遊洛水雍邀二宫幸其第日晏帝與太后至雍内室從者皆不得入遂相與定圖义之計於是太后謂之曰元郎若忠於朝廷無反心何故不去領軍以餘官輔政义甚懼免冠求解領軍乃以义為驃騎大将軍開府儀同三司尚書令侍中領左右戊戌魏大赦壬辰莫折念生遣都督楊鮓等攻仇池郡行臺魏子建擊破之三月己酉上幸白下城履行六軍頓所乙丑命豫章王綜權頓彭城揔督衆軍并攝徐州府事已巳以元灋僧之子景隆為衡州刺史景仲為廣州刺史上召灋僧及元略還建康灋僧驅彭城吏民萬餘人南渡灋僧至建康上寵待甚厚元略惡其為人與之言未嘗笑魏詔京兆王繼班師北凉州刺史錫休儒等自魏興侵魏梁州攻直城魏梁州刺史傅豎眼遣其子敬紹擊之休儒等敗還柔然王阿那瓌為魏討破六韓拔陵魏遣牒云具仁齎雜物勞賜之阿那瓌勒衆十萬自武川西向沃野屢破拔陵兵夏四月魏主復遣中書舍人馮儁勞賜阿那瓌阿那瓌部落浸彊自稱敕連頭兵豆伐可汗魏元义雖解兵􅁠猶揔任内外殊不自意有廢黜之理胡太后意猶豫未决侍中穆紹勸太后速去之紹亮之子也潘嬪有寵於魏主宦官張景嵩説之云义欲害嬪嬪泣訴於帝曰义非獨欲害妾又将不利於陛下帝信之因义出宿解义侍中明旦义将入宫門者不納辛夘太后復臨朝攝政下詔追削劉騰官爵除义名為民清河國郎中令韓子熙上書為清河王懌訟寃乞誅元义等曰昔趙髙柄秦令闗東鼎沸今元义專魏使四方雲擾開逆之端起於宋維成禍之末良由劉騰宜梟首洿宫斬骸沈族以明其罪太后命發劉騰之墓露散其骨籍沒家貲盡殺其養子以子熙為中書舍人子熙麒麟之孫也初宋維父弁常曰維性踈險必敗吾家李崇郭祚游肇亦曰伯緒凶疎終傾宋氏若得殺身幸矣維阿附元义超遷至洛州刺史至是除名㝷賜死义之解領軍也太后以义黨與尚彊未可猝制乃以矦剛代义為領軍以安其意尋出剛為冀州刺史加儀同三司未至州黜為征虜将軍卒於家太后欲殺賈粲以义黨多恐驚動内外乃出粲為濟州刺史尋追殺之籍沒其家唯义以妹夫未忍行誅先是給事黄門侍郎元順以剛直忤义意出為齊州刺史太后徵還為侍中侍坐於太后义妻在太后側順指之曰陛下柰何以一妹之故不正元义之罪使天下不得伸其寃憤太后嘿然順澄之子也它日太后從容謂侍臣曰劉騰元义昔邀朕求鐵劵冀得不死朕賴不與韓子熙曰事闗生殺豈繫鐵劵且陛下昔雖不與何解今日不殺太后憮然未幾有告义及弟􅀲謀誘六鎮降戸反於定州又招魯陽諸蠻侵擾伊闕欲為内應得其手書太后猶未忍殺之羣臣固執不已魏主亦以為言太后乃從之賜义及弟爪死於家猶贈义驃騎大将軍儀同三司尚書令江陽王繼廢於家病卒前幽州刺史盧同坐义黨除名太后頗事糚飾數出遊幸元順面諫曰禮婦人夫沒自稱未亡人首去珠玉衣不文采陛下母臨天下年垂不惑脩飾過甚何以儀刑後世太后慙而還宫召順責之曰千里相徵豈欲衆中見辱邪順曰陛下不畏天下之笑而恥臣之一言乎順與穆紹同直順因醉入其寢所紹擁被而起正色讓順曰身二十年侍中與卿先君亟連職事縱卿方進用何宜相排突也遂謝事還家詔諭久之乃起初鄭羲之兄孫儼為司徒胡國珍行參軍私得幸於太后人未之知蕭寶寅西討以儼為開府屬太后再攝政儼請奉使還朝太后留之拜諫議大夫中書舍人領嘗食典御晝夜禁中每休沐太后常遣宦者隨之儼見其妻唯得言家事而已中書舍人樂安徐紇粗有文學先以諂事趙修坐徙枹罕後還復除中書舍人又諂事清河王懌懌死出為鴈門太守還洛復諂事元义义敗太后以紇為懌所厚復召為中書舍人紇又諂事鄭儼儼以紇有智數仗為謀主紇以儼有内寵傾身承接共相表裏勢傾内外號為徐鄭儼累遷至中書令車騎将軍紇累遷至給事黄門侍郎仍領舍人揔攝中書門下之事軍國詔令莫不由之紇有機辯彊力終日治事略無休息不以為勞時有急詔令數吏執筆或行或卧人别占之造次俱成不失事理然無經國大體專好小數見人矯為恭謹逺近輻湊附之給事黄門侍郎袁飜李神軌皆領中書舍人為太后所信任時人云神軌亦得幸於太后衆莫能明也神軌求㛰於散騎常侍盧義僖義僖不許黄門侍郎王誦謂義僖曰昔人不以一女易衆男卿豈易之邪義僖曰所以不從正為此耳從之恐禍大而速誦乃堅握義僖手曰我聞有命不敢以告人女遂適他族臨婚之夕太后遣中使宣敕停之内外惶怖義僖夷然自若神軌崇之子義僖度世之孫也胡琛據髙平遣其大将萬俟醜奴宿勤明達等冦魏涇州将軍盧祖遷伊甕生討之不克蕭寶寅崔延伯既破莫折天生引兵會祖遷等於安定甲卒十二萬鐵馬八千軍威甚盛醜奴軍於安定西北七里時以輕騎挑戰大兵未交􅂺委走延伯恃其勇且新有功遂唱議為先驅擊之别造大盾内為鎻柱使壯士負以趨謂之排城置輜重於中戰士在外自安定北縁原北上将戰有賊數百騎詐持文書云是降簿且乞緩師寶寅延伯未及閲視宿勤明達引兵自東北至降賊自西競下覆背擊之延伯上馬奮擊逐北徑抵其營賊皆輕騎延伯軍雜步卒戰乆疲乏賊乗間得入排城延伯遂大敗死傷近二萬人寶寅收衆退保安定延伯自恥其敗乃繕甲兵募驍勇復自安定西進去賊七里結營壬辰不告寶寅獨出襲賊大破之俄頃平其數柵賊見軍士採掠散亂復還擊之魏兵大敗延伯中流矢卒士卒死者萬餘人時大冦未平復失驍将朝野為之憂恐於是賊勢愈盛而羣臣自外來者太后問之皆言賊弱以求恱媚由是将帥求益兵者往往不與五月夷陵烈矦裴邃卒邃沈深有思略為政寛明将吏愛而憚之壬子以中䕶軍夏矦亶督夀陽諸軍事馳驛代邃益州刺史臨汝矦淵猷遣其将樊文熾蕭世澄等将兵圍魏益州長史和安於小劒魏益州刺史邴蚪遣統軍河南胡小虎崔珍寶将兵救之文熾襲破其柵皆擒之使小虎於城下説和安令早降小虎遥謂安曰我柵失備為賊所擒觀其兵力殊不足言努力堅守魏行臺傅梁州援兵已至語未終軍士以刀敺殺之西南道軍司淳于誕引兵救小劒文熾置柵於龍鬚山上以防歸路戊辰誕密募壯士夜登山燒其柵梁軍望見歸路絶皆恟懼誕乗而擊之文熾大敗僅以身免虜世澄等将吏十一人斬獲萬計魏子建以世澄購胡小虎之尸得而葬之魏魏昌武康伯李崇卒初帝納齊東昏矦寵姬吳叔媛七月而生豫章王綜宫中多疑之及淑媛寵衰怨望密謂綜曰汝七月生兒安得比諸皇子然汝太子次第幸保富貴勿泄也與綜相抱而泣綜由是自疑晝則談謔如常夜則於静室閉戸披髮席藁私於别室祭齊氏七廟又微服至曲阿拜齊太宗陵聞俗説割血瀝骨滲則為父子遂潛發東昏矦冢并自殺一男試之皆驗由是常懐異志專伺時變綜有勇力能手制奔馬輕財好士唯留附身故衣餘皆分施恒致罄乏屢上便宜求為邊任上未之許常於内齋布沙於地終日跣行足下生胝日能行三百里王矦妃主及外人皆知其志而上性嚴重人莫敢言又使通問於蕭寶寅謂之叔父為南兖州刺史不見賔客辭訟隔簾聴之出則垂帷於輿惡人識其面及在彭城魏安豐王延明臨淮王彧将兵二萬逼彭城勝負久未決上慮綜敗沒敕綜引軍還綜恐南歸不復得至北邊乃密遣人送降欵於彧魏人皆不之信彧募人入綜軍驗其虛實無敢行者殿中侍御史濟隂鹿悆為彧監軍請行曰若綜有誠心與之盟約如其詐也何惜一夫時兩敵相對内外嚴固悆單騎間出徑趣彭城為綜軍所執問其來狀悆曰臨淮王使我來欲有交易耳時元略已南還綜聞之謂成景儁等曰我常疑元略規欲反城将驗其虚實故遣左右為略使入魏軍中呼彼一人今其人果來可遣人詐為略有疾在深室呼至戸外令人傳言謝之綜又遣腹心安定梁話迎悆密以意狀語之悆薄暮入城先引見胡龍牙龍牙曰元中山甚欲相見故遣呼卿又曰安豐臨淮将少弱卒規復此城容可得乎悆曰彭城魏之東鄙勢在必争得否在天非人所測龍牙曰當如卿言又引見成景儁景儁與坐謂曰卿不為刺客邪悆曰今者奉使欲返命本朝相刺之事更卜後圖景儁為設飲食乃引至一所詐令一人自室中出為元略致意曰我昔有以南向且遣相呼欲聞鄉事晚來疾作不獲相見悆曰早奉音㫖冒險祇赴不得瞻見内懐反側遂辭退諸将競問魏士馬多少悆盛陳有勁兵數十萬諸将相謂曰此華辭耳悆曰崇朝可驗何華之有乃遣悆還景儁送之於戯馬臺北望城壍謂曰險固如此豈魏所能取悆曰攻守在人何論險固悆還於路復與梁話申固盟約六月庚辰綜與梁話及淮隂苗文寵夜出步投彧軍及旦齋内諸閤猶閉不開衆莫知所以唯見城外魏軍呼曰汝豫章王昨夜已來在我軍中汝尚何為城中求王不獲軍遂大潰魏人入彭城乗勝追擊梁兵復取諸城至宿預而還将佐士卒死沒者什七八唯陳慶之帥所部得還上聞之驚駭有司奏削綜爵土絶屬籍更其子直姓悖氏未旬日詔復屬籍封直為永新矦西豐矦正徳自魏還志行無悛多聚亡命夜剽掠殺人於道以輕車将軍從綜北伐弃軍輒還上積其前後罪惡免官削爵徙臨海未至追赦之綜至洛陽見魏主還就館為齊東昏矦舉哀服斬衰三年太后以下並就館弔之賞賜禮遇甚厚拜司空封髙平郡公丹楊王更名賛以苗文寵梁話皆為光禄大夫封鹿悆為定陶縣子除員外散騎常侍綜長史濟陽江革司馬范陽祖暅之皆為魏所虜安豐王延明聞其才名厚遇之革稱足疾不拜延明使暅之作欹器漏刻銘革唾罵暅之曰卿荷國厚恩乃為虜立銘孤負朝廷延明聞之令革作大小寺碑祭彭祖文革辭不為延明将箠之革厲色曰江革行年六十今日得死為幸誓不為人執筆延明知不可屈乃止日給脱粟三升僅全其生而已上密召夏矦亶還使休兵合肥俟淮堰成復進癸未魏大赦改元孝昌破六韓拔陵圍魏廣陽王深於五原軍主賀拔勝募二百人開東門出戰斬首百餘級賊稍退深拔軍向明州勝常為殿雲州刺史費穆招撫離散四面拒敵時北境州鎮皆沒唯雲中一城獨存乆之道路阻絶援軍不至糧仗俱盡穆弃城南奔爾朱榮於秀容既而詣闕請罪詔原之長流參軍于謹言於廣陽王深曰今冦盜蠭起未易專用武力勝也謹請奉大王之威命諭以禍福庶幾稍可離也深許之謹兼通諸國語乃單騎詣叛胡營見其酋長開示恩信於是西部鐵勒酋長乜列河等将三萬餘户南詣深降深欲引兵至折敷嶺迎之謹曰破六韓拔陵兵勢甚盛聞乜列河等來降必引兵邀之若先據險要未易敵也不若以乜列河餌之而伏兵以待之必可破也深從之拔陵果引兵邀擊乜列河盡俘其衆伏兵􅀤拔陵大敗復得乜列河之衆而還柔然頭兵可汗大破破六韓拔陵斬其将孔雀等拔陵避柔然南徙渡河将軍李叔仁以拔陵稍偪求援於廣陽王深深帥衆赴之賊前後降附者二十萬人深與行臺元纂表乞於恒州北别立郡縣安置降户隨宜賑賫息其亂心魏朝不從詔黄門侍郎楊置分處之於冀定瀛三州就食深謂纂曰此軰復為乞活矣秋七月壬戌大赦八月魏柔􅀇鎮民杜洛周聚衆反於上谷改元真王攻沒郡縣髙歡蔡儁尉景及段榮安定彭樂皆從之洛周圍魏燕州刺史博陵崔秉九月丙辰魏以幽州刺史常景兼尚書為行臺與幽州都督元譚討之景爽之孫也自盧龍塞至軍都闗皆置兵守險譚屯居庸闗冬十月吐谷渾遣兵擊趙天安天安降凉州復為魏平西将軍髙徽奉使嚈噠還至枹罕會河州刺史元祚卒前刺史梁釗之子景進引莫折念生兵圍其城長史元永等推徽行州事勒兵固守景進亦自行州事徽請兵於吐谷渾吐谷渾救之景進敗走徽湖之孫也魏方有事西北二荆西郢羣蠻皆反㫁三鵶路殺都督冦掠北至襄城汝水有冉氏向氏田氏種落最盛其餘大者萬家小者千室各稱王矦屯據險要道路不通十二月壬午魏主下詔曰朕将親御六師掃蕩逋穢今先討荆蠻疆理南服時羣蠻引梁将曹義宗等圍魏荆州魏都督崔暹将兵數萬救之至魯陽不敢進魏更以臨淮王彧為征南大将軍将兵討魯陽蠻司空長史辛雄為行臺左丞東趣葉城别遣征虜将軍裴衍恒農太守京兆王羆将兵一萬自武闗出通三鵶路以救荆州衍等未至彧軍已屯汝上州郡被蠻冦者争來請救彧以處分道别不欲應之辛雄曰今裴衍未至王士衆已集蠻左唐突撓亂近畿王秉麾閫外見可而進何論别道彧恐後有得失之責邀雄符下雄以羣蠻聞魏主将自出心必震動可乗勢破也遂符彧軍令速赴擊羣蠻聞之果散走魏主欲自出討賊中書令袁飜諫而止辛雄自軍中上疏曰凡人所以臨陳忘身觸白刃而不憚者一求榮名二貪重賞三畏刑罰四避禍難非此數者雖聖王不能使其臣慈父不能厲其子矣明主深知其情故賞必行罰必信使親疎貴賤勇怯賢愚聞鍾鼓之聲見旌旗之列莫不奮激競赴敵場豈懕久生而樂速死哉利害懸於前欲罷不能耳自秦隴逆節蠻左亂常己歴數年凡在戎役數十萬人扞禦三方敗多勝少跡其所由皆不明賞罰之故也陛下雖降明詔賞不移時然将士之勲歴稔不决亡軍之卒晏然在家是使節士無所勸慕庸人無所畏懾進而擊賊死交而賞賖退而逃散身全而無罪此其所以望敵奔沮不肯盡力者也陛下誠能號令必信賞罰必行則軍威必張盜賊必息矣疏奏不省曹義宗等取魏順陽馬圈與裴衍等戰於淅陽義宗等敗退衍等復取順陽進圍馬圈洛州刺史董紹以馬圈城堅衍等糧少上書言其必敗未幾義宗擊衍等破之復取順陽魏以王羆為荆州刺史邵陵王綸攝南徐州事在州喜怒不恒肆行非灋遨遊市里問賣䱇者曰刺史何如對言躁虐綸怒令吞䱇而死百姓惶駭道路以目嘗逢喪車奪孝子服而著之匍匐號呌籖帥懼罪密以聞上始嚴責綸不能改於是遣代綸悖慢逾甚乃取一老公短瘦類上者加以衮冕置之髙坐朝以為君自陳無罪使就坐剥褫捶之於庭又作新棺貯司馬崔會意以轜車挽歌為送葬之灋使嫗乗車悲號會意不能堪輕騎還都以聞上恐其奔逸以禁兵取之将於獄賜盡太子統流涕固諌得免戊子免綸官削爵土魏山胡劉蠡升反自稱天子置百官初敕勒酋長斛律金事懐朔鎮将楊鈞為軍主行兵用匈奴灋望塵知馬步多少嗅地知軍逺近及破六韓拔陵反金擁衆歸之拔陵署金為王既而知拔陵終無所成乃詣雲州降仍稍引其衆南出黄􅀲堆為杜洛周所破脱身歸爾朱榮榮以為别将資治通鑑卷第一百五十
