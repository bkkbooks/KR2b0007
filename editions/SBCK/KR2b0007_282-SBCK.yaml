body:
  text: 千户臣司馬光奉勑編集後晉紀三光赤奮若凡三年起屠維大淵獻盡重髙祖聖文章武明德孝皇帝中天福四年春正月辛亥以澶州防禦使太原張從恩為樞密副使朔方節度使張希崇卒羌胡冦鈔無復畏憚甲寅以義成節度使馮暉為朔方節度使党項酋長拓跋彦超最為彊大暉至彦超入賀暉厚遇之因為於城中治第豐其服玩留之不遣封内遂安唐羣臣江王知證等累表請唐主復姓李立唐宗廟乙丑唐主許之羣臣又請上尊號唐主曰尊號虚美且非古遂不受其後子孫皆踵其法不受尊號又不以外戚輔政宦者不得預事皆它國所不及也二月乙亥改太祖廟號曰義祖己卯唐主為李氏考妣發哀與皇后斬衰居廬如初䘮禮朝夕臨凡五十四日江王知證饒王知諤請亦服斬衰不許李建勲之妻廣德長公主假衰絰入哭盡哀如父母之䘮辛巳詔國事委齊王璟詳決惟軍旅以聞庚寅唐主更名昇詔百官議二祚合享禮辛卯宋齊丘等議以義祖居七室之東唐主命居髙祖於西室太宗次之義祖又次之皆為不祧之主羣臣言義祖諸侯不宜與髙祖太宗同享請於太廟正殿後别建廟祀之帝曰吾自幼託身義祖曏非義祖有功於吳朕安能啓此中興之業羣臣乃不敢言唐主欲祖吳王恪或曰恪誅死不若祖鄭王元懿唐主命有司考二王苖裔以吳王孫褘有功褘子峴為宰相遂祖吳王云自峴五世至父榮其名率皆有司所撰唐主又以歴十九帝三百年疑十世太少有司曰三十年為世陛下生於文德巳五十年矣遂從之盧損至福州閩主稱疾不見命弟繼恭主之遣其禮部員外郎鄭元弼奉繼恭表隨損入貢閩主不禮於損有士人林省鄒私謂損曰吾主不事其君不愛其親不恤其民不敬其神不睦其鄰不禮其賓其能久乎余將僧服而北逃㑹當相見上國耳三月庚戌唐主追尊吳王恪為定宗孝静皇帝自曾祖以下皆追尊廟號及謚己未詔歸德節度使劉知逺忠武節度使杜重威並加同平章事知逺自以有佐命功重威起外戚無大功恥與之同制制下數日杜門四表辭不受帝怒謂趙瑩曰重威朕之妹夫知逺雖有功何得堅拒制命可落軍權令歸私第瑩拜請曰陛下昔在晉陽兵不過五千為唐兵十餘萬所攻危於朝露非知逺心如金石豈能成大業奈何以小過弃之竊恐此語外聞非所以彰人君之大度也帝意乃解命端明殿學士和凝詣知逺第諭㫖知逺惶恐起受命靈州戍將王彦忠據懷逺城叛上遣供奉官齊延祚往招諭之彦忠降延祚殺之上怒曰朕踐阼以來未嘗失信於人彦忠已輸仗出迎延祚何得擅殺之除延祚名重杖配流議者猶以為延祚不應免死辛酉冊回鶻可汗仁美為奉化可汗夏四月唐江王徐知證等請亦姓李不許辛巳唐主祀南郊癸未大赦梁太祖以來軍國大政天子多與崇政樞密使議之宰相受成命行制敕講典故治文事而巳帝懲唐明宗之世安重誨專横故即位之初但命桑維翰兼樞密使及劉處讓為樞密使奏對多不稱㫖㑹處讓遭母䘮甲申廢樞密院以印付中書院事皆委宰相分判以副使張從恩為宣徽使直學士倉部郎中司徒詡工部郎中顔衎並罷守本官然勲臣近習不知大體習於故事毎欲復之帝以唐之大臣除名在两京者皆貧悴復以李専美為賛善大夫丙戌以韓昭􅅌為兵部尚書馬􅅌孫為太子賓客房暠為右驍衛大將軍並致仕閩主忌其叔父前建州刺史延武戸部尚書延望才名巫者林興與延武有怨託鬼神語云延武延望將為變閩主不復詰使興帥壯士就第殺之并其五子閩主用陳守元言作三清殿於禁中以黃金數千斤鑄寶皇大帝天尊老君像晝夜作樂焚香禱祀求神丹政無大小皆林興傳寶皇命決之戊申加楚王希範天策上將軍賜印聽開府置官屬辛亥唐徙吉王景遂為夀王立夀陽公景達為宣城王乙卯唐鎮海節度使兼中書令梁懷王徐知諤卒唐人遷讓皇之族於泰州號永寧宫防衛甚嚴康化節度使兼中書令楊珙稱疾罷歸永寧宫乙丑以平盧節度使兼中書令楊璉為康化節度使璉固辭請終䘮從之唐主將立齊王璟為太子固辭乃以為諸道兵馬大元帥判六軍諸衛守太尉録尚書事昇楊二州牧閩判六軍諸衛建王繼嚴得士心閩主忌之六月罷其兵柄更名繼􅁉以弟繼鏞判六軍去諸衛字林興詐覺流泉州望氣者言宫中有災乙未閩主徙居長春宫秋七月庚子朔日有食之成德節度使安重榮出於行伍性粗率恃勇驕暴每謂人曰今世天子兵彊馬壯則為之耳府廨有幡竿髙數十尺嘗挾弓矢謂左右曰我能中竿上龍首者必有天命一發中之以是益自負帝之遣重榮代祕瓊也戒之曰瓊不受代當别除汝一鎮勿以力取恐爲患滋深重榮由是以帝爲怯謂人曰祕瓊匹夫耳天子尚畏之況我以將相之重士馬之衆乎毎所奏請多踰分爲執政所可否意憤憤不快乃聚亡命市戰馬有飛揚之志帝知之義武節度使皇甫遇與重榮姻家甲辰徙遇爲昭義節度使乙巳閩北宫火焚宫殿殆盡戊申薛融等上所定編敇行之丙辰敕先令天下公私鑄錢今私錢多用鈆錫小弱缺薄宜皆禁之專令官司自鑄西京留守楊光逺疏中書侍郎同平章事桑維翰遷除不公及營邸肆於两都與民爭利帝不得巳閠月壬申出維翰爲彰徳節度使兼侍中初義武節度使王處直子威避王都之難亡在契丹至是義武缺帥契丹主遣使來言請使威襲父土地如我朝之法帝辭以中國之法必自刺史團練防禦序遷乃至節度使請遣威至此漸加進用契丹主怒復遣使來言曰爾自節度使爲天子亦有階級邪帝恐其滋蔓不巳厚賂契丹且請以處直兄孫彰德節度使廷􅅌爲義武節度使以厭其意契丹怒稍解初閩惠宗以太祖元從爲拱宸控鶴都及康宗立更募壯士二千人爲腹心號宸衛都祿賜皆厚於二都或言二都怨望將作亂閩主欲分􅀠漳泉二州二都益怒閩主好爲長夜之飲强羣臣酒醉則令左右伺其過失從弟繼隆醉失禮斬之屢以猜怒誅宗室叔父左僕射同平章事延羲陽爲狂愚以避禍閩主賜以道士服置武夷山中尋復召還幽於私第閩主數侮拱宸控鶴軍使永泰朱文進光山連重遇二人怨之㑹北宫火求賊不獲閩主命重遇將内外營兵掃除餘燼日役萬人士卒甚苦之又疑重遇知縱火之謀欲誅之内學士陳郯私吿重遇辛巳夜重遇入直帥二都兵焚長春宫以攻閩主使人迎延羲於瓦礫中呼萬歲復召外營兵共攻閩主獨宸衛都拒戰閩主乃與李后如宸衛都比明亂兵焚宸衛都宸衛都戰敗餘衆千餘人奉閩主及李后出北闗至梧桐嶺衆稍逃散延羲使兄子前汀州刺史繼業將兵追之及於村舎閩主素善射引弓殺數人俄而追兵雲集閩主知不免投弓謂繼業曰卿臣節安在繼業曰君無君徳臣安有臣節新君叔父也舊君昆弟也孰親孰疎閩主不復言繼業與之俱還至陁莊飲以酒醉而縊之并李后及諸子王繼恭皆死宸衛餘衆奔吳越延羲自稱威武節度使閩國王更名曦改元永隆赦繫囚頒賚中外以宸衛弑閩主赴於鄰國諡閩主曰聖神英睿文明廣武應道大弘孝皇帝廟號康宗遣啇人間道奉表稱藩于晉然其在國置百官皆如天子之制以太子太傅致仕李真爲司空兼中書侍郎同平章事連重遇之攻康宗也陳守元在宫中易服將逃兵人殺之重遇執蔡守䝉數以賣官之罪而斬之閩王曦既立遣使誅林興於泉州河決亳州八月辛丑以馮道守司徒兼侍中壬寅詔中書知印止委上相由是事無巨細悉委於道帝嘗訪以軍謀對曰征伐大事在聖心獨斷臣書生惟知謹守歷代成規而巳帝以爲然道嘗稱疾求退帝使鄭王重貴詣第省之曰來日不出朕當親往道乃出視事當時寵遇群臣無與爲比己酉以吳越王元瓘爲天下兵馬元帥黔南巡内溪州刺史彭士愁引蔣錦州蠻萬餘人㓂辰澧州焚掠鎮戍遣使乞師于蜀蜀主以道逺不許九月辛未楚王希範命左靜江指揮使劉勍決勝指揮使廖匡齊帥衡山兵五千討之癸未以唐許王從益爲郇國公奉唐祀從益尚幼李后養從益於宫中奉王淑妃如事毋冬十月庚戌閩康宗所遣使者鄭元弼至大梁康宗遺執政書曰閩國一從興運久歴年華見北辰之帝座頻移致東海之風帆多阻又求用敵國禮致書徃來帝怒其不遜壬子詔却其貢物及福建諸州綱運並令元弼及進奏官林恩部送速歸兵部貟外郎李知損上言王昶僭慢冝執留使者籍没其貨乃下元弼恩獄吳越恭穆夫人馬氏卒夫人雄武節度使綽之女也初武肅王鏐禁中外畜聲妓文穆王元瓘年三十餘無子夫人為之請於鏐鏐喜曰吾家祭祀汝實主之乃聽元瓘納妾鹿氏生弘僔弘倧許氏生弘佐吳氏生弘俶衆妾生弘偡弘億弘儀弘偓弘仰弘信夫人撫視慈愛如一常置銀鹿於帳前坐諸兒於上而弄之十一月戊子契丹遣其臣遥折來使遂如吳越楚王希範始開天策府置護軍都尉領軍司馬等官以諸弟及將校為之又以幕僚拓拔恒李弘臯廖匡圖徐仲雅等十八人為學士劉勍等進攻溪州彭士愁兵敗棄州走保山寨石崖四絶勍為梯棧上圍之廖匡齊戰死楚王希範遣弔其母其母不哭謂使者曰廖氏三百口受王温飽之賜舉族効死未足以報况一子乎願王無以為念王以其母為賢厚恤其家十二月丙戌禁剙造佛寺閩王作新宫徙居之是歳漢門下侍郎同平章事趙光裔言於漢主曰自馬后崩未嘗通使於楚親鄰舊好不可忘也因薦諫議大夫李紓可以將命漢主從之楚亦遣使報聘光裔相漢二十餘年府庫完實邊境無虞及卒漢主復以其子翰林學士承㫖尚書左丞損為門下侍郎同平章事五年春正月帝引見閩使鄭元弼等元弼曰王昶蠻夷之君不知禮義陛下得其善言不足喜惡言不足怒臣將命無狀願伏鈇鑕以贖昶罪帝憐之辛未詔釋元弼等楚劉勍等因大風以火箭焚彭士愁寨而攻之士愁帥麾下逃入奬錦深山乙未遣其子師暠帥諸酋長納溪錦奬三州印請降於楚二月庚戌北都留守同平章事安彦威入朝上曰吾所重者信與義昔契丹以義救我我今以信報之聞其徴求不巳公能屈節奉之深稱朕意對曰陛下以蒼生之故猶卑辭厚幣以事之臣何屈節之有上悦劉勍引兵還長沙楚王希範徙溪州於便地表彭士愁爲溪州刺史以劉勍爲錦州刺史自是羣蠻服於楚希範自謂伏波之後以銅五千斤鑄柱髙丈二尺入地六尺銘誓狀於上立之溪州唐康化節度使兼中書令楊璉謁平陵還一夕大醉卒於舟中唐主追封謚曰弘農靖王閩王曦旣立驕淫苛虐猜忌宗族多尋舊怨其弟建州刺史延政數以書諌之曦怒復書罵之遣親吏業翹監建州軍教練使杜漢崇監南鎮軍二人爭捃延政隂事告於曦由是兄弟積相猜恨一日翹與延政議事不叶翹訶之曰公反邪延政怒欲斬翹翹奔南鎮延政發兵就攻之敗其戍兵翹漢崇奔福州西鄙戍兵皆潰二月曦遣統軍使潘師逵吳行真將兵四萬撃延政師逵軍於建州城西行真軍於城南皆阻水置營焚城外廬舍延政求救於吳越壬戌吴越王元瓘遣寧國節度使同平章事仰仁詮内都監使薛萬忠將兵四萬救之丞相林鼎諌不聽三月戊辰師逵分兵三千遣都軍使蔡弘裔將之出戰延政遣其將林漢徹等敗之於茶山斬首千餘級安彦威王建立皆請致仕不許辛未以歸德節度使侍衛馬歩都指揮使同平章事劉知逺為鄴都留守徙彦威為歸德節度使加兼侍中癸酉徙建立為昭義節度使進爵韓王以建立遼州人割遼沁二州􅀠昭義徙建雄節度使李德珫為北都留守山南東道節度使同平章事安從進恃其險固隂蓄異謀擅邀取湖南貢物招納亡命増廣甲卒元隨都押牙王令謙押牙潘知麟諌皆殺之及王建立徙潞州帝使問之曰朕虚青州以待卿卿有意則降制從進對曰若移青州置漢南臣即赴鎮帝亦不之責丁丑王延政募敢死士千餘人夜渉水濳入潘師逵壘因風縱火城上鼓譟以應之戰棹都頭建安陳誨殺師逵其衆皆潰戊寅引兵欲攻吳行真寨建人未渉水行真及將士弃營走死者萬人延政乘勝取永平順昌二城自是建州之兵始盛夏四月蜀太保兼門下侍郎同平章事趙季良請與門下侍郎同平章事毋昭裔中書侍郎同平章事張業分判三司癸卯蜀主命季良判戸部昭裔判鹽鐵業判度攴庚戌以前橫海節度使馬全節為安逺節度使甲子吳越孝獻世子弘僔卒吳越仰仁詮等兵至建州王延政以福州兵巳敗去奉牛酒犒之請班師仁詮等不從營于城之西北延政懼復遣使乞師於閩王閩王以泉州刺史王繼業為行營都統將兵二萬救之且移書責吳越遣輕兵絶吳越糧道㑹久雨吳越軍食盡五月延政遣兵出擊大破之俘斬以萬計癸未仁詮等夜遁胡漢筠旣違詔命不詣闕又聞賈仁沼二子欲訴諸朝及除馬全節鎭安州代李金全漢筠紿金全曰進奏吏遣人倍道來言朝廷俟公受代即按賈仁沼死狀以為必有異圖金全大懼漢筠因説金全拒命自歸於唐金全從之丙戌帝聞金全叛命馬全節以汴洛汝鄭單宋陳蔡曹濮申唐之兵討之以保大節度使安審暉為之副審暉審琦之兄也李金全遣推官張緯奉表請降於唐唐主遣鄂州屯營使李承􅁉段處恭將兵三千逆之唐主遣客省使尚全恭如閩和閩王曦及王延政六月延政遣牙將及女奴持誓書及香爐至福州與曦盟于宣陵然兄弟相猜恨猶如故􅊨癸卯唐李承裕等引兵至安州是夕李金全將麾下數百人詣唐軍妓妾資財皆為承裕所奪承􅁉入據安州甲辰馬全節自應山進軍大化鎭與承􅁉戰于城南大破之承􅁉掠安州南走全節入安州丙午安審暉追敗唐兵於黃花谷段處恭戰死丁未審暉又敗唐兵於雲夢澤中虜承􅁉及其衆唐將張建崇據雲夢橋拒戰審暉乃還馬全節斬承􅁉及其衆千五百人于城下送監軍杜光業等五百七人于大梁上曰此曹何罪皆賜馬及器服而歸之初盧文進之奔吳也唐主命祖全恩將兵逆之戒無入安州城陳于城外俟文進出殿之以歸無得剽掠及李承裕逆李金全戒之如全恩承􅁉貪剽掠與晉兵戰而敗失亡四千人唐主惋恨累日自以戒敇之不熟也杜光業等至唐唐主以其違命而敗不受復送於淮北遺帝書曰邊校貪功乘便據壘又曰軍法朝章彼此不可帝復遣之歸使者將自桐墟濟淮唐主遣戰艦拒之乃還帝悉授唐諸將官以其士卒為顯義都命舊將劉康領之臣光曰違命者將也士卒從將之令者也又何罪乎受而戮其將以謝敵弔士卒而撫之斯可矣何必棄民以資敵國乎唐主使宦者祭廬山還勞之曰卿此行甚精㓗宦者曰臣自奉詔䟽食至今唐主曰卿某處市魚為羮某日市肉為胾何為􅂼食官者慙服倉吏歳終獻羨餘萬石唐主曰出納有數苟非掊民刻軍安得羨餘邪秋七月閩王曦城福州西郭以備建人又度民為僧民避重賦多為僧凡度萬一千人乙丑帝賜鄭元弼等帛遣歸李金全之叛也安州馬歩副都指揮使桑千威和指揮使王萬金成彦温不從而死馬歩都指揮使龎守榮誚其愚以徇金全之意己巳詔贈賈仁沼及桑千等官遣使誅守榮於安州李金全至金陵唐主待之甚薄丁巳唐主立齊王璟為太子兼大元帥錄尚書事太子太師致仕范延光請歸河陽私第帝許之延光重載而行西京留守楊光逺兼領河陽利其貨且慮爲子孫之患奏延光叛臣不家汴洛而就外藩恐其逃逸入敵國宜早除之帝不許光逺請敇延光居西京從之光逺使其子承貴以甲士圍其第逼令自殺延光曰天子在上賜我鐡劵許以不死爾父子何得如此己未承貴以白刃驅延光上馬至浮梁擠于河光逺奏云自赴水死帝知其故憚光逺之彊不敢詰爲延光輟朝贈太師唐齊王璟固辭太子九月乙丑唐主許之詔中外致牋如太子禮丁卯以翰林學士承㫖戸部侍郎和凝爲中書侍郎同平章事己巳鄴都留守劉知逺入朝辛未李崧奏諸州倉糧於計帳之外所餘頗多上曰法外税民罪同枉法倉吏特貸其死各痛懲之翰林學士李澣輕薄多酒失上惡之丙子罷翰林學士併其職於中書舍人澣濤之弟也楊光逺入朝帝欲徙之它鎮謂光逺曰圍魏之役卿左右皆有功尚未之賞今當各除一州以榮之因以其將校數人為刺史甲申徙光逺為平盧節度使進爵東平王冬十月丁酉加吳越王元瓘天下兵馬都元帥尚書令壬寅唐大赦詔中外奏章無得言睿聖犯者以不敬論術士孫智永以四星聚斗分野有災勸唐主廵東都乙巳唐主命齊王璟監國光政副使太僕少卿陳覺以私憾奏泰州刺史禇仁規貪殘丙午罷仁規為扈駕都部署覺始用事庚戍唐主發金陵甲寅至江都閩王曦因啇人奉表自理十一月甲申以曦為威武節度使兼中書令封閩國王唐主欲遂居江都以水凍漕運不給乃還十二月丙申至金陵唐右僕射兼門下侍郎同平章事張延翰卒是歳漢門下侍郎同平章事趙損卒以寧逺節度使南昌王定保為中書侍郎同平章事不踰年亦卒初帝割鴈門之北以賂契丹由是吐谷渾皆屬契丹苦其貪虐思歸中國成徳節度使安重榮復誘之於是吐谷渾帥部落千餘帳自五臺來奔契丹大怒遣使讓帝以招納叛人六年春正月丙寅帝遣供奉官張澄將兵二千索吐谷渾在并鎭忻代四州山谷者逐之使還故土王延政城建州周二十里請於閩王曦欲以建州為威武軍自為節度使曦以威武軍福州也乃以建州為鎭安軍以延政為節度使封富沙王延政改鎭安曰鎭武而稱之二月壬辰作浮梁於德勝口彰義節度使張彦澤欲殺其子掌書記張式素為彦澤所厚諌止之彦澤怒射之左右素惡式從而䜛之式懼謝病去彦澤遣兵追之式至邠州静難節度使李周以聞帝以彦澤故流式啇州彦澤遣行軍司馬鄭元昭詣闕求之且曰彦澤不得張式恐致不測帝不得巳與之癸巳式至涇州彦澤命決口剖心斷其四支涼州軍亂留後李文謙閉門自焚死蜀自建國以來節度使多領禁兵或以它職留成都委僚佐知留務專事聚歛政事不治民無所訴蜀主知其􅁦丙辰加衛聖馬歩都指揮使武德節度使兼中書令趙廷隠樞密使武信節度使同平章事王處回捧聖控鶴都指揮使保寕節度使同平章事張公鐸檢校官並罷其節度使三月甲戌以翰林學士承㫖李昊知武德軍散騎常侍劉英圖知保寧軍諌議大夫崔鑾知武信軍給事中謝從志知武泰軍將作監張讚知寧江軍夏四月閩王曦以其子亞澄同平章事判六軍諸衛曦疑其弟汀州刺史延喜與延政通謀遣將軍許仁欽以兵三千如汀州執延喜以歸唐主以陳覺及萬年常夢錫為宣徽副使辛巳北京留守李德珫遣牙校以吐谷渾酋長白承福等入朝唐主遣通事舎人歐陽遇求假道以通契丹帝不許自黄巢犯長安以來天下血戰數十年然後諸國各有分土兵革稍息及唐主即位江淮比年豐稔兵食有餘羣臣爭言陛下中興今北方多難宜出兵恢復舊疆唐主曰吾少長軍旅見兵之為民害深矣不忍復言使彼民安則吾民亦安矣又何求焉漢主遣使如唐謀共取楚分其地唐主不許山南東道節度使安從進謀反遣使奉表詣蜀請出師金啇以為聲援丁亥使者至成都蜀主與羣臣謀之皆曰金啇險逺少出師則不足制敵多則漕輓不繼蜀主乃辭之又求援於荆南髙從誨遺從進書諭以禍福從進怒反誣奏從誨荆南行軍司馬王保義勸從誨具奏其狀且請發兵助朝廷討之從誨從之成德節度使安重榮耻臣契丹見契丹使者必箕踞慢罵使過其境或潜遣人殺之契丹以讓帝帝為之遜謝六月戊午重榮執契丹使拽刺遣輕騎掠幽州南境軍於博野上表稱吐谷渾兩突厥渾契苾沙陁各帥部衆歸附党項等亦遣使納契丹吿身職牒言為虜所陵暴又言自二月以來令各具精甲壯馬將以上秋南冦恐天命不佑與之俱滅願自備十萬衆與晉共擊契丹又朔州節度副使趙崇巳逐契丹節度使劉山求歸命朝廷臣相繼以聞陛下屢救臣承奉契丹勿自起舋端其如天道人心難以違拒機不可失時不再來諸節度使没於虜庭者皆延頸企踵以待王師良可哀閔願早決計表數千言大抵斥帝父事契丹竭中國以媚無厭之虜又以此意為書遺朝貴及移藩鎭云巳勒兵必與契丹決戰帝以重榮方握彊兵不能制甚患之時鄴都留守侍衛馬歩都指揮使劉知逺在大梁泰寧節度使桑維翰知重榮巳蓄姦謀又慮朝廷重違其意密上疏曰陛下免於晉陽之難而有天下皆契丹之功也不可負之今重榮恃勇輕敵吐渾假手報仇皆非國家之利不可聽也臣竊觀契丹數年以來士馬精彊吞噬四鄰戰必勝攻必取割中國之土地収中國之器械其君智勇過人其臣上下輯睦牛馬蕃息國無天災此未可與為敵也且中國新敗士氣彫沮以當契丹乘勝之威其勢相去甚逺又和親旣絶則當發兵守塞兵少則不足以待冦兵多則饋運無以繼之我出則彼歸我歸則彼至臣恐禁衛之士疲於奔命鎮定之地無復遺民今天下粗安瘡痍未復府庫虚竭蒸民困􅁦靜而守之猶懼不濟其可妄動乎契丹與國家恩義非輕信誓甚著彼無間隙而自啓舋端就使克之後患愈重萬一不克大事去矣議者以嵗輸繒帛謂之耗蠧有所卑遜謂之屈辱殊不知兵連而不休禍結而不解財力將匱耗蠧孰甚焉用兵則武吏功臣過求姑息邊藩逺郡得以驕矜下陵上替屈辱孰大焉臣願陛下訓農習戰養兵息民俟國無内憂民有餘力然後觀舋而動則動必有成矣又鄴都富盛國家藩屛今主帥赴闕軍府無人臣竊思慢藏誨盜之言勇夫重閉之義乞陛下略加廵幸以杜姦謀帝謂使者曰朕比日以來煩懣不決今見卿奏如醉醒矣卿勿以為憂閩王曦聞王延政以書招泉州刺史王繼業召繼業還賜死於郊外殺其子於泉州初繼業為汀州刺史司徒兼門下侍郎同平章事楊沂豐為士曹參軍與之親善或告沂豐與繼業通謀沂豐方侍宴即収下獄明日斬之夷其族沂豐渉之從弟也時年八十餘國人哀之自是宗族勲舊相繼被誅人不自保諫議大夫黃峻舁櫬詣朝堂極諌曦曰老物狂發矣貶漳州司戸曦淫侈無度資用不給謀於國計使南安陳匡範匡範請日進萬金曦悦加匡範禮部侍郎匡範增筭啇賈數倍曦宴羣臣舉酒屬匡範曰明珠美玉求之可得如匡範人中之寳不可得也未幾啇賈之筭不能足日進貸諸省務錢以足之恐事覺憂悸而卒曦祭贈甚厚諸省務以匡範貸帖聞曦大怒斵棺斷其尸棄水中以連江人黃紹頗代為國計使紹頗請令欲仕者自非䕃補皆聽輸錢即授之以資望髙下及州縣戸口多寡定其直自百緡至千緡從之唐主自以專權取吴尤忌宰相權重以右僕射兼中書侍郎同平章事李建勲執政歳久欲罷之㑹建勲上疏言事意其留中旣而唐主下有司施行建勲自知事挾愛憎密取所奏改之秋七月戊辰罷建勲歸私第帝憂安重榮跋扈己巳以劉知逺為北京留守河東節度使復以遼沁􅀠河東以北京留守李德珫為鄴都留守知逺微時為晉陽李氏贅壻嘗牧馬犯僧田僧執而笞之知逺至晉陽首召其僧命之坐慰諭贈遺衆心大悦吳越府署火宫室府庫幾盡吴越王元瓘驚懼發狂疾唐人爭勸唐主乗􅁦取之唐主曰奈何利人之災遣使唁之且賙其乏閩王曦自稱大閩皇領威武節度使與王延政治兵相攻互有勝負福建之閒暴骨如莾鎮武節度判官晉江潘承祐屢請息兵脩好延政不從閩主使者至延政大陳甲卒以示之對使者語甚悖慢承祐長跪切諌延政怒顧左右曰判官之肉可食乎承祐不顧聲色愈厲閩主曦悪泉州刺史王繼嚴得衆心罷歸酖殺之八月戊子朔以開封尹鄭王重貴為東京留守馮道李崧屢薦天平節度使兼侍衛親軍馬歩副都指揮使同平章事杜重威之能以為都指揮使充隨駕御營使代劉知逺知逺由是恨二相重威所至黷貨民多逃亡嘗出過市謂左右曰人言我驅盡百姓何市人之多也壬辰帝發大梁己亥至鄴都壬寅大赦帝以詔諭安重榮曰爾身為大臣家有老母忿不思難弃君與親吾因契丹得天下爾因吾致富貴吾不敢忘德爾乃忘之何邪今吾以天下臣之爾欲以一鎮抗之不亦難乎宜審思之無取後悔重榮得詔愈驕聞山南東道節度使安從進有異志隂遣使與之通謀吳越文穆王元瓘寢疾察内都監章德安忠厚能断大事欲屬以後事語之曰弘佐尚少當擇宗人長者立之德安曰弘佐雖少羣下伏其英敏願王勿以為念王曰汝善輔之吾無憂矣德安處州人也辛亥元瓘卒初内牙指揮使戴惲為元瓘所親任悉以軍事委之元瓘養子弘侑乳母惲妻之親也或吿惲謀立弘侑德安祕不發䘮與諸將謀伏甲士於幕下壬子惲入府執而殺之廢弘侑為庶人復姓孫幽之明州是日將吏以元瓘遺命承制以鎮海鎮東節度副大使弘佐為節度使時年十四九月庚申弘佐即王位命丞相曹仲達攝政軍中言賜與不均舉仗不受諸將不能制仲達親諭之皆釋仗而拜弘佐温恭好書禮士躬勤政務發擿姦伏人不能欺民有獻嘉禾者弘佐問倉吏今蓄積幾何對曰十年王曰然則軍食足矣可以寛吾民乃命復其境内税三年辛酉滑州言河決帝以安重榮殺契丹使者恐其犯塞乙亥遣安國節度使楊彦珣使于契丹彦珣至其帳契丹主責以使者死狀彦珣曰譬如人家有惡子父母所不能制將如之何契丹主怒乃解閩主曦以其子瑯邪王亞澄為威武節度使兼中書令改號長樂王劉知逺遣親將郭威以詔旨説吐谷渾酋長白承福令去安重榮歸朝廷許以節鉞威還謂知逺曰虜惟利是嗜安鐵胡止以袍袴賂之今欲其來莫若重賂乃可致耳知逺從之且使謂承福曰朝廷巳割爾曹􅀠契丹爾曹當自安部落今乃南來助安重榮為逆重榮已為天下所弃朝夕敗亡爾曹宜早從化勿俟臨之以兵南北無歸悔無及矣承福懼冬十月帥其衆歸于知逺知逺處之太原東山及嵐石之間表承福領大同節度使収其精騎以􅀠麾下始安重榮移檄諸道云與吐谷渾達靼契苾同起兵旣而承福降知逺達靼契苾亦莫之赴重榮勢大沮閩主曦即皇帝位王延政自稱兵馬元帥閩同平章事李敏卒帝之發大梁也和凝請曰車駕已行安從進若反何以備之帝曰卿意如何凝請密留空名宣敇十數通付留守鄭王聞變則書諸將名遣撃之帝從之十一月從進舉兵攻鄧州唐州刺史武廷翰以聞鄭王遣宣徽南院使張從恩武德使焦繼勲䕶聖都指揮使郭金海作坊使陳思讓將大梁兵就申州刺史李建崇兵於葉縣以討之金海本突厥思讓幽州人也丁丑以西京留守髙行周為南面軍前都部署前同州節度使宋彦筠副之張從恩監焉又以郭金海為先鋒使陳思讓監焉彦筠滑州人也庚辰以鄴都留守李德珫權東京留守召鄭王重貴如鄴都安從進攻鄧州威勝節度使安審暉據牙城拒之從進不能克而退癸未從進至花山遇張從恩兵不意其至之速合戰大敗從恩獲其子牙内都指揮使弘義從進以數十騎奔還襄州嬰城自守唐主性節儉常躡蒲屨􅏕頮用鐵盎暑則寢於青葛帷左右使令惟老醜宫人服飾粗略死國事者雖士卒皆給祿三年分遣使者按行民田以肥瘠定其稅民間稱其平允自是江淮調兵興役及它賦歛皆以税錢為率至今用之唐主勤於聽政以夜繼晝還自江都不復宴樂頗傷躁急内侍王紹顔上書以為今春以來羣臣獲罪者衆中外疑懼唐主手詔釋其所以然令紹顔告諭中外十二月丙戌朔徙鄭王重貴為齊王充鄴都留守以李德珫為東都留守丁亥以髙行周知襄州行府事詔荆南湖南共討襄州髙從誨遣都指揮使李端將水軍數千至南津楚王希範遣天策都軍使張少敵將戰艦百五十艘入漢江助行周仍各運糧以饋之少敵佶之子也安重榮聞安從進舉兵反謀遂決大集境内飢民衆至數萬南向鄴都聲言入朝初重榮與深州人趙彦之俱為散指揮使相得歡甚重榮鎮成德彦之自闗西歸之重榮待遇甚厚使彦之招募黨衆然心實忌之及舉兵止用為排陳使彦之恨之帝聞重榮反壬辰遣䕶聖等馬步三十九指揮擊之以天平節度使杜重威為招討使安國節度使馬全節副之前永清節度使王周為馬歩都虞候安從進遣其弟從貴將兵逆均州刺史蔡行遇焦繼勲邀擊敗之獲從貴斷其足而歸之戊戌杜重威與安重榮遇於宗城西南重榮為偃月陳官軍再擊之不動重威懼欲退指揮使宛丘王重􅅌曰兵家忌退鎮之精兵盡在中軍請公分銳士撃其左右翼重􅅌為公以契丹直衝其中軍彼必狼狽重威從之鎮人陳稍却趙彦之卷旗䇿馬來降彦之以銀飾鎧胄及鞍勒官軍殺而分之重榮聞彦之叛大懼退匿於輜重中官軍從而乗之鎮人大潰斬首萬五千級重榮收餘衆走保宗城官軍進攻夜分拔之重榮以十餘騎走還鎮州嬰城自守㑹天寒鎮人戰及凍死者二萬餘人契丹聞重榮反乃聽楊彦詢還庚子兾州刺史張建武等取趙州漢主寢疾有胡僧謂漢主名龔不利漢主自造龑字名之義取飛龍在天讀若儼庚戌制以錢弘佐為鎮海鎮東節度使兼中書令吳越國王資治通鑑卷第二百八十二
