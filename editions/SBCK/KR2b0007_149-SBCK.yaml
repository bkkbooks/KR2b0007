seq: 149
front:
  text: 父子晏然不以為意二月庚午羽林虎賁近千人相帥至尚書省詬罵求仲瑀兄左民郎中始均不獲以瓦石擊省門上下懾懼莫敢禁討遂持火掠道中薪蒿以杖石為兵器直造其第曵彞堂下捶辱極意唱呼動地焚其第舍始均踰垣走復還拜賊請其父命賊就􅇌擊生投之火中仲瑀重傷走免彞僅有餘息再宿而死逺近震駭胡太后收掩羽林虎賁凶彊者八人斬之其餘不復窮治乙亥大赦以安之因令武官得依資入選識者知魏之将亂矣時官員既少應選者多吏部尚書李韶銓注不行大致怨嗟更以殿中尚書崔亮為吏部尚書亮奏為格制不問士之賢愚專以停解月日為斷沈滯者皆稱其能亮甥司空諮議劉景安與亮書曰殷周以鄉塾貢士兩漢由州郡薦才魏晉因循又置中正雖未盡美應什收六七而朝廷貢才止求其文不取其理察孝㢘唯論章句不及治道立中正不考才行空辯氏姓取士之途不愽沙汰之理未精舅屬當銓衡宐須改張易調如何反為停年格以限之天下士子誰復脩厲名行哉亮復書曰汝所言乃有深致吾昨為此格有由而然古今不同時宐須異昔子産鑄刑書以救弊叔向譏之以正灋何異汝以古禮難權宐哉洛陽令代人薛琡上書言黎元之命繫於長吏若以選曹唯取年勞不簡賢否義均行鴈次若貫魚執簿呼名一吏足矣數人而用何謂銓衡書奏不報後因請見復奏乞令王公貴臣薦賢以補郡縣詔公卿議之事亦寢其後甄琛等繼亮為吏部尚書利其便己踵而行之魏之選舉失人自亮始也初燕燕郡太守髙湖奔魏其子謐為侍御史坐灋徙懐朔鎮世居北邊遂習鮮卑之事謐孫歡沈深有大志家貧執役在平城富人婁氏女見而奇之遂嫁焉始有馬得給鎮為函使至洛陽見張彞之死還家傾貲以結客或問其故歡曰宿衛相帥焚大臣之第朝廷懼其亂而不問為政如此事可知矣財物豈可常守邪歡與懐朔省事雲中司馬子如秀容劉貴中山賈顯智户曹史咸陽孫騰外兵史懐朔矦景獄掾善無尉景廣寧蔡儁特相友善並以任俠雄於鄉里夏四月丁巳大赦
  hash: sha256:4375ffb7127678004edccf85a4a78ded7ed33ebbb496fcb497ef4713dd44f127
body:
  text: 五月戊戌魏以任城王澄為司徒京兆王繼為司空魏累世彊盛東夷西域貢獻不絶又立互市以致南貨至是府庫盈溢胡太后嘗幸絹藏命王公嬪主從行者百餘人各自負絹稱力取之少者不減百餘匹尚書令儀同三司李崇章武王融負絹過重顛仆於地崇傷腰融損足太后奪其絹使空出時人笑之融太洛之子也侍中崔光止取兩匹太后怪其少對曰臣兩手唯堪兩匹衆皆愧之時宗室外戚權倖之臣競為豪侈髙陽王雍富貴冠一國宫室園圃侔於禁苑僮僕六千妓女五百出則儀衛塞道路歸則歌吹連日夜一食直錢數萬李崇富埒於雍而性儉嗇嘗謂人曰髙陽一食敵我千日河間王琛每欲與雍争富駿馬十餘匹皆以銀為槽䆫户之上玉鳳銜鈴金龍吐斾嘗會諸王宴飲酒器有水精鋒馬腦椀赤玉巵制作精巧皆中國所無又陳女樂名馬及諸奇寶復引諸王歴觀府庫金錢繒布不可勝計顧謂章武王融曰不恨我不見石崇恨石崇不見我融素以富自負歸而惋歎卧疾三日京兆王繼聞而省之謂曰卿之貨財計不減於彼何為愧羨乃爾融曰始謂富於我者獨髙陽耳不意復有河間繼曰卿似袁術在淮南不知世間復有劉備耳融乃笑而起太后好佛營建諸寺無復窮已令諸州各建五級浮圖民力疲弊諸王貴人宦官羽林各建寺於洛陽相髙以壯麗太后數設齋會施僧物動以萬計賞賜左右無節所費不貲而未嘗施惠及民府庫漸虚乃減削百官禄力任城王澄上表以為蕭衍常蓄窺覦之志宐及國家彊盛将士旅力早圖混壹之功比年以來公私貧困宐節省浮費以周急務太后雖不能用常優禮之魏自永平以來營明堂辟雍役者多不過千人有司復借以修寺及供它役十餘年竟不能成起部郎源子恭上書以為廢經國之務資不急之費宜徹減諸役早圖就功使祖宗有嚴配之期蒼生覩禮樂之富詔從之然亦不能成也魏人陳仲儒請依京房立準以調八音有司詰仲儒京房律準今雖有其器曉之者鮮仲儒所受何師出何典籍仲儒對言性頗愛琴又嘗讀司馬彪續漢書見京房準術成數昞然遂竭愚思鑽研甚久頗有所得夫準者本以代律取其分數調校樂器竊尋調聲之體宫商宐濁徵羽用清若依公孫崇止以十二律聲而云還相為宫清濁悉足唯黄鍾管最長故以黄鍾為宫則徃徃相順若均之八音猶須錯采衆音配成其美若以應鍾為宫㽔賔為徵則徵濁而宫清雖有其韻不成音曲若以中吕為宫則十二律中全無所取今依京房書中吕為宫乃以去滅為商執始為徵然後方韻而崇乃以中吕為宫猶用林鍾為徵何由可諧但音聲精微史傳簡略舊志準十三􅃶隠間九尺不言須柱以不又一寸之内有萬九千六百八十三分微細難明仲儒私曾考驗準當施柱但前却柱中以約準分則相生之韻已自應合其中􅃶粗細須與琴宫相類施軫以調聲令與黄鍾相合中􅃶下依數畫六十律清濁之節其餘十二􅃶須施柱如筝即於中􅃶案盡一周之聲度著十二􅃶上然後依相生之灋以次運行取十二律之商徵商徵既定又依琴五調調聲之灋以均樂器然後錯采衆聲以文飾之若事有乖此聲則不和且燧人不師資而習火延夀不束脩以變律故云知之者欲教而無從心達者體知而無師茍有一毫所得皆􅀜心抱豈必要經師受然後為奇哉尚書蕭寶寅奏仲儒學不師受輕欲制作不合依許事遂寢魏中尉東平王匡以論議數為任城王澄所奪憤恚復治其故棺欲奏攻澄澄因奏匡罪狀三十餘條廷尉處以死刑秋八月己未詔免死削除官爵以車騎将軍矦剛代領中尉三公郎中辛雄奏理匡以為歴奉三朝骨鯁之迹朝野具知故髙祖賜名曰匡先帝已容之於前陛下亦宐寛之於後若終貶黜恐杜忠臣之口未幾復除匡平州刺史雄琛之族孫也九月庚寅胡太后遊嵩髙癸巳還宫太后從容謂兼中書舍人楊昱曰親姻在外不稱人心卿有聞慎勿諱隠昱奏揚州刺史李崇五車載貨􅁪州刺史楊鈞造銀食器餉領軍元义太后召义夫妻泣而責之义由是怨昱昱叔父舒妻武昌王和之妹也和即义之從祖舒卒元氏頻請别居昱父椿泣責不聴元氏恨之會瀛州民劉宣明謀反事覺逃亡义使和及元氏誣告昱藏匿宣明且云昱父定州刺史椿叔父華州刺史津並送甲仗三百具謀為不逞义復構成之遣御仗五百人夜圍昱宅收之一無所獲太后問其狀昱具對為元氏所怨太后解昱縛處和及元氏死刑既而义營救之和直免官元氏竟不坐冬十二月癸丑魏任城文宣王澄卒庚申魏大赦是嵗髙句麗王雲卒世子安立魏以郎選不精大加沙汰唯朱元旭辛雄羊深源子㳟及范陽祖瑩等八人以才用見留餘皆罷遣深祉之子也普通元年春正月乙亥朔改元大赦丙子日有食之己夘以臨川王宏為太尉揚州刺史金紫光禄大夫王份為尚書左僕射份奐之弟也左軍将軍豫寧威伯馮道根卒是日上春祠二廟既出宫有司以聞上問中書舍人朱异曰吉凶同日今可行乎對曰昔衛獻公聞栁莊死不釋祭服而往道根雖未為社稷之臣亦有勞王室臨之禮也上即幸其宅哭之甚慟髙句麗世子安遣使入貢二月癸丑以安為寧東将軍髙句麗王遣使者江灋盛授安衣冠劒佩魏光州兵就海中執之送洛陽魏太傅侍中清河文獻王懌美風儀胡太后逼而幸之然素有才能輔政多所匡益好文學禮敬士人時望甚重侍中領軍将軍元义在門下兼揔禁兵恃寵驕恣志欲無極懌每裁之以灋义由是怨之衛将軍儀同三司劉騰權傾内外吏部希騰意奏用騰弟為郡人資乖越懌抑而不奏騰亦怨之龍驤府長史宋維弁之子也懌薦為通直郎浮薄無行义許維以富貴使告司染都尉韓文殊父子謀作亂立懌懌坐禁止案驗無反狀得釋維當反坐义言於太后曰今誅維後有真反者人莫敢告乃黜維為昌平郡守义恐懌終為己害乃與劉騰密謀使主食中黄門胡定自列云懌貨定使毒魏主若已得為帝許定以富貴帝時年十一信之秋七月丙子太后在嘉福殿未御前殿义奉帝御顯陽殿騰閉永巷門太后不得出懌入遇义於含章殿後义厲聲不聽懌入懌曰汝欲反邪义曰义不反正欲縛反者耳命宗士及直齋執懌衣袂将入含章東省使人防守之騰稱詔集公卿議論懌大逆衆咸畏义無敢異者唯僕射新泰文貞公游肇抗言以為不可終不下署义騰持公卿議入奏俄而得可夜中殺懌於是詐為太后詔自稱有疾還政於帝幽太后於北宮宣光殿宫門晝夜長閉内外斷絶騰自執管鑰帝亦不得省見裁聴傳食而巳太后服膳俱廢不免飢寒乃歎曰養虎得噬我之謂矣又使中常侍酒泉賈粲侍帝書密令防察動止义遂與太師髙陽王雍等同輔政帝謂义為姨父义與騰表裏擅權义為外禦騰為内防常直禁省共裁刑賞政無巨細决於二人威振内外百僚重跡朝野聞懌死無不喪氣胡夷為之􅋇面者數百人游肇憤邑而卒己夘江淮海並溢辛夘魏主加元服大赦改元正光魏相州刺史中山文莊王熙英之子也與弟給事黄門侍郎略司徒祭酒纂皆為清河王懌所厚聞懌死起兵於鄴上表欲誅元义劉騰纂亡奔鄴後十日長史栁元章等帥城人鼓譟而入殺其左右執熙纂并諸子置於髙樓八月甲寅元义遣尚書左丞盧同就斬熙於鄴街并其子弟熙好文學有風義名士多與之遊将死與故知書曰吾與弟並䝉皇太后知遇兄據大州弟則入侍殷勤言色恩同慈母今皇太后見廢北宫太傅清河王横受屠酷主上幼年獨在前殿君親如此無以自安故帥兵民欲建大義於天下但智力淺短旋見囚執上慙朝廷下愧相知本以名義干心不得不爾流膓碎首復何言哉凡百君子各敬爾儀為國為身善勗名節聞者憐之熙首至洛陽親故莫敢視前驍騎将軍刁整獨收其尸而藏之整雍之孫也盧同希义意窮治熙黨與鎖濟隂内史楊昱赴鄴考訊百日乃得還任义以同為黄門侍郎元略亡抵故人河内司馬始賔始賔與略縛荻筏夜渡孟津詣屯留栗灋光家轉依西河太守刁雙匿之經年時購略甚急略懼求送出境雙曰會有一死所難遇者為知己死耳願不以為慮略固求南奔雙乃使從子昌送略渡江遂來奔上封略為中山王雙雍之族孫也义誣刁整送略并其子弟收繫之御史王基等力為辯雪乃得免甲子侍中車騎将軍永昌嚴矦韋叡卒時上方崇釋氏士民無不從風而靡獨叡自以位居大臣不欲與俗俯仰所行略如平日九月戊戌魏以髙陽王雍為丞相揔攝内外與元义同决庶務初柔然佗汗可汗納伏名敦之妻􅀱吕陵氏生伏跋可汗及阿那瓌等六子伏跋旣立忽亡其幼子祖惠求募不能得有巫地萬言祖惠今在天上我能呼之乃於大澤中施帳幄祀天神祖惠忽在帳中自云恒在天上伏跋大喜號地萬為聖女納為可賀敦地萬既挾左道復有姿色伏跋敬而愛之信用其言干亂國政如是積嵗祖惠浸長語其母曰我常在地萬家未嘗上天上天者地萬教我也其母具以狀告伏跋伏跋曰地萬能前知未然勿為讒也既而地萬懼譛祖惠於伏跋而殺之侯吕陵氏遣其大臣具列等絞殺地萬伏跋怒欲誅具列等會阿至羅入冦伏跋擊之軍敗而還侯吕陵氏與大臣共殺伏跋立其弟阿那瓌為可汗阿那瓌立十日其族兄示􅀤帥衆數萬擊之阿那瓌戰敗與其弟乙居伐輕騎奔魏示發殺侯吕陵氏及阿那瓌二弟魏清河王懌死汝南王悦了無恨元义之意以桑落酒􅀱之盡其私佞义大喜冬十月乙夘以悦爲侍中太尉悦就懌子亶求懌服玩不時稱㫖杖亶百下幾死柔然可汗阿那瓌将至魏魏主使司空京兆王繼侍中崔光等相次迎之賜勞甚厚魏主引見阿那瓌於顯陽殿因置宴置阿那瓌位於親王之下宴将罷阿那瓌執啟立於座後詔引至御座前阿那瓌再拜言曰臣以家難輕來詣闕本國臣民皆已逃散陛下恩隆天地乞兵送還本國誅剪叛逆收集亡散臣當統帥遺民奉事陛下言不能盡别有啟陳仍以啟授中書舍人常景以聞景爽之孫也十一月己亥魏立阿那瓌爲朔方公蠕蠕王賜以衣服軺車禄恤儀衛一如親王時魏方彊盛於洛水橋南御道東作四館道西立四里有自江南來降者處之金陵館三年之後賜宅於歸正里自北夷降者處燕然館賜宅於歸徳里自東夷降者處扶桑館賜宅於慕化里自西夷降者處崦嵫館賜宅於慕義里及阿那瓌入朝以燕然館處之阿那瓌屢求返國朝議異同不决阿那瓌以金百斤賂元义遂聴北歸十二月壬子魏敕懐朔都督簡鋭騎二千䕶送阿那瓌達境首觀機招納若彼迎􅇋宐賜繒帛車馬禮餞而返如不容受聴還闕庭其行裝資遣付尚書量給辛酉魏以京兆王繼為司徒魏遣使者劉善明來騁始復通好二年春正月辛巳上祀南郊置孤獨園於建康以收養窮民戊子大赦魏南秦州氐反魏􅀤近郡兵萬五千人使懐朔鎮将楊鈞将之送柔然可汗阿那瓌返國尚書右丞張普惠上疏以為蠕蠕久為邊患今兹天降喪亂荼毒其心蓋欲使之知有道之可樂革面稽首以奉大魏也陛下宐安民恭己以悦服其心阿那瓌束身歸命撫之可也乃更先自勞擾興師郊甸之内投諸荒裔之外救累世之勍敵資天亡之醜虜臣愚未見其可也此乃邊将貪竊一時之功不思兵為凶器王者不得已而用之况今旱暵方甚聖慈降膳乃以萬五千人使楊鈞為将而欲定蠕蠕干時而動其可濟乎脱有顛覆之變楊鈞之肉其足食乎宰輔專好小名不圖安危大計此微臣所以寒心者也且阿那瓌之不還負何信義臣賤不及議文書所過不敢不陳弗聽阿那瓌辭於西堂詔賜以軍器衣被雜采糧畜事事優厚命侍中崔光等勞遣於外郭阿那瓌之南奔也其從父兄婆羅門帥衆數萬入討示發破之示發奔地豆干地豆干殺之國人推婆羅門為彌偶可社句可汗楊鈞表稱柔然已立君長恐未肯以殺兄之人郊迎其弟輕往虛返徒損國威自非廣加兵衆無以送其入北二月魏人使舊嘗奉使柔然者牒云具仁往諭婆羅門使迎阿那瓌辛丑上祀明堂庚戌魏使假撫軍将軍邴虯討南秦氐魏元义劉騰之幽胡太后也右衛将軍奚康生預其謀义以康生爲撫軍大将軍河南尹仍使之領左右康生子難當娶侍中左衛将軍矦剛女剛子义之妹夫也义以康生通姻深相委託三人率多俱宿禁中時或迭出以難當爲千牛備身康生性麤武言氣髙下义稍憚之見于顔色康生亦微懼不安甲午魏主朝太后于西林園文武侍坐酒酣迭舞康生乃爲力士儛及折旋之際每顧視太后舉手蹈足瞋目頷首爲執殺之勢太后解其意而不敢言日暮太后欲􅂝帝宿宣光殿矦剛曰至尊己朝訖嬪御在南何必留宿康生曰至尊陛下之兒隨陛下将東西更復訪誰羣臣莫敢應太后自起援帝臂下堂而去康生大呼唱萬嵗帝前入閤左右競相排閤不得閉康生奪難當千牛刀斫直後元思輔乃得定帝既升宣光殿左右侍臣俱立西階下康生乗酒勢将出處分為义所執鎖於門下光禄勲賈粲紿太后曰侍官懐恐不安陛下宐親安慰太后信之適下殿粲即扶帝出東序前御顯陽殿還閉太后於宣光殿至晩义不出令侍中黄門僕射尚書等十餘人就康生所訊其事處康生斬刑難當絞刑义與剛並在内矯詔决之康生如奏難當恕死從流難當哭辭父康生慷慨不悲曰我不反死汝何哭也時已昏闇有司驅康生赴市斬之尚食典御奚混與康生同執刀入内亦坐絞難當以矦剛壻得留百餘日竟流安州久之义使行臺盧同就殺之以劉騰為司空八坐九卿常旦造騰宅參其顔色然後赴省府亦有歷日不能見者公私屬請唯視貨多少舟車之利山澤之饒所在搉固刻剥六鎮交通互市嵗入利息以巨萬萬計逼奪鄰舍以廣其居逺近苦之京兆王繼自以父子權位太盛固請以司徒讓車騎大将軍儀同三司崔光夏四月庚子以繼為太保侍中如故繼固辭不許壬寅以崔光為司徒侍中祭酒著作如故魏牒云具仁至柔然波羅門殊驕慢無遜避心責具仁禮敬具仁不屈婆羅門乃遣大臣丘升頭等将兵二千隨具仁迎阿那瓌五月具仁還鎮具道其狀阿那瓌懼不敢進上表請還洛陽辛巳魏南荆州刺史􅁊叔興據所部來降六月丁夘義州刺史文僧明邊城太守田守徳擁所部降魏皆蠻酋也魏以僧明為西豫州刺史守徳為義州刺史癸夘琬琰殿火延燒後宫三千間秋七月丁酉以大匠卿裴邃為信武将軍假督衆軍討義州破魏義州刺史封夀於檀公峴遂圍其城夀請降復取義州魏以尚書左丞張普惠為行臺将兵救之不及以裴邃為豫州刺史鎮合肥邃欲襲夀陽隂結夀陽民李􅀲花等爲内應邃巳勒兵爲期日恐魏覺之先移魏楊州云魏始於馬頭置戍如聞復欲修白􅎄故城若爾便稍相侵逼此亦湏營歐陽設交境之備今板卒已集唯聴信還揚州刺史長孫稚謀於僚佐皆曰此無修白捺之意宐以實報之録事參軍楊侃曰白捺小城本非形勝邃好狡數今集兵遣移恐有它意稚大寤曰録事可亟作移報之侃報移曰彼之纂兵想别有意何為妄􅌟白􅎄佗人有心予忖度之勿謂秦無人也邃得移以為魏人已覺即散其兵􅀲花等以失期遂相告發伏誅者十餘家稚觀之子侃播之子也初髙車王彌俄突死其衆悉歸嚈噠後數年嚈噠遣彌俄突弟伊匐帥餘衆還國伊匐擊柔然可汗婆羅門大破之婆羅門帥十部落詣凉州請降於魏柔然餘衆數萬相帥迎阿那瓌阿那瓌啓稱本國大亂姓姓别居迭相抄掠當今北人鵠望待拯乞依前恩賜給精兵一萬送臣磧北撫定荒民詔付中書門下博議凉州刺史袁翻以為自國家都洛以來蠕蠕髙車迭相吞噬始則蠕蠕授首既而髙車被擒今髙車自奮於衰微之中克雪讎恥誠由種類繁多終不能相滅自二虜交鬬邊境無塵數十年矣此中國之利也今蠕蠕兩主相繼歸誠雖戎狄禽獸終無純固之節然存亡繼絶帝王本務若弃而不受則虧我大徳若納而撫養則損我資儲或全徙内地則非直其情不願亦恐終為後患劉石是也且蠕蠕尚存則髙車猶有内顧之憂未暇窺窬上國若其全滅則髙車跋扈之勢豈易可知今蠕蠕雖亂而部落猶衆處處棊布以望舊主髙車雖彊未能盡服也愚謂蠕蠕二主並宜存之居阿那瓌於東處婆羅門於西分其降民各有攸屬阿那瓌所居非所經見不敢臆度婆羅門請修西海故城以處之西海在酒泉之北去髙車所居金山千餘里實北虜徃來之衝要土地沃衍大宜耕稼宜遣一良将配以兵仗監䕶婆羅門因令屯田以省轉輸之勞其北則臨大磧野獸所聚使蠕蠕射獵彼此相資足以自固外以輔蠕蠕之微弱内亦防髙車之畔换此安邊保塞之長計也若婆羅門能收離聚散復興其國者漸令北轉徙度流沙則是我之外藩髙車勍敵西北之虞可以無慮如其姦回返覆不過為逋逃之冦於我何損哉朝議是之九月柔然可汗俟匿伐詣懐朔鎮請兵且迎阿那壞之兄也阿那壞俟匿伐冬十月録尚書事髙陽王雍等奏懐朔鎮北吐若奚泉原野平沃請置阿那瓌於吐􅀂奚泉婆羅門於故西海郡令各帥部落收集離散阿那瓌所居既在境外宜少優遣婆羅門不得比之其婆羅門未降以前蠕蠕歸化者宐悉令州鎮部送懐朔鎮以付阿那瓌詔從之十一月癸丑魏侍中車騎大将軍矦剛加儀同三司魏以東益南秦氐皆反庚辰以秦州刺史河間王琛為行臺以討之琛恃劉騰之勢貪暴無所畏忌大為氐所敗中尉彈奏會赦除名尋復王爵魏以安西将軍元洪超兼尚書行臺詣敦煌安置柔然婆羅門三年春正月庚子以尚書令袁昂爲中書監吳郡太守王暕爲尚書左僕射辛亥魏主耕籍田魏宋雲與惠生自洛陽西行四千里至赤嶺乃出魏境又西行再朞至乾羅國而還二月達洛陽得佛經一百七十部髙車王伊匐遣使入貢于魏夏四月庚辰魏以伊匐爲鎮西将軍西海郡公髙車王久之伊匐與柔然戰敗其弟越居殺伊匐自立五月壬辰朔日有食之既癸巳大赦冬十一月甲午領軍将軍始興忠武王憺卒乙巳魏主祀圜丘初魏世宗以􅀇始曆浸踈命更造新曆至是著作郎崔光表取盪冦将軍張龍祥等九家所上曆􅇋驗得失合為一曆以壬子為元應魏之水徳命曰正光曆丙午初行正光曆大赦十二月乙酉魏以車騎大将軍尚書右僕射元欽為儀同三司太保京兆王繼為太傅司徒崔光為太保初太子統之未生也上養臨川王宏之子正徳為子正徳少麤險上即位正徳意望東宫及太子統生正徳還本賜爵西豐矦正徳怏怏不滿意常蓄異謀是嵗正徳自黄門侍郎為輕車将軍頃之亡奔魏自稱廢太子避禍而來魏尚書左僕射蕭寶寅上表曰豈有伯為天子父作揚州弃彼密親逺投它國不如殺之由是魏人待之甚薄正徳乃殺一小兒稱為己子逺營􅁙地魏人不疑明年復自魏逃歸上泣而誨之復其封爵柔然阿那瓌求粟為種魏與之萬石婆羅門帥部落叛魏亡歸嚈噠魏以平西府長史代人費穆兼尚書右丞西北道行臺将兵討之柔然遁去穆謂諸将曰戎狄之性見敵即走乗虚復出若不使之破膽終恐疲於奔命乃簡練精騎伏於山谷以步兵之羸者為外營柔然果至奮擊大破之婆羅門為凉州軍所擒送洛陽四年春正月辛卯上祀南郊大赦丙午祀明堂二月乙亥耕籍田柔然大飢阿那􅉞帥其衆入魏境表求賑給己亥魏以尚書左丞元孚為行臺尚書持節撫諭柔然孚譚之孫也将行表陳便宜以為蠕蠕久來彊大昔在代京常為重備今天祚大魏使彼自亂亡稽首請服朝廷鳩其散亡禮送令返宜因此時善思逺策昔漢宣之世呼韓􅅃塞漢遣董忠韓昌領邊郡士馬送出朔方因留衛助又光武時亦使中郎将段彬置安集掾史隨單于所在參察動静今宜略依舊事借其閑地聴其田牧粗置官屬示相慰撫嚴戒邊兵因令防察使親不至矯詐疎不容反叛最䇿之得者也魏人不從柔然俟匿伐入朝于魏三月魏司空劉騰卒宦官為騰義息重服者四十餘人衰絰送葬者以百數朝貴送􅁙者塞路滿野夏四月魏元孚持白虎幡勞阿那瓌於柔􅀇懐荒二鎮之間阿那瓌衆號三十萬隂有異志遂拘留孚載以輼車每集其衆坐孚東廂稱為行臺甚加禮敬引兵而南所過剽掠至平城乃聴孚還有司奏孚辱命抵罪甲申魏遣尚書令李崇左僕射元纂帥騎十萬擊柔然阿那瓌聞之驅良民二千公私馬牛羊數十萬北遁崇追之三千餘里不及而還纂使鎧曹參軍于謹帥騎二千追柔然至郁對原前後十七戰屢破之謹忠之從曾孫也性深沈有識量涉獵經史少時屏居閭里不求仕進或勸之仕謹曰州郡之職昔人所鄙台鼎之位湏待時來纂聞其名而辟之後帥輕騎出塞覘􅀱屬鐵勒數千騎奄至謹以衆寡不敵退必不免乃散其衆騎使匿叢薄之間又遣人升山指麾若部分軍衆者鐵勒望見雖疑有伏兵自恃其衆進軍逼謹謹以常乗駿馬一紫一騧鐵勒所識乃使二人各乗一馬突陣而出鐵勒以為謹也争逐之謹帥餘軍擊其追騎鐵勒遂走謹因得入塞李崇長史鉅鹿魏蘭根説崇曰昔縁邊初置諸鎮地廣人稀或徵􅀤中原彊宗子弟或國之胏腑寄以爪牙中年以來有司號為府户役同厮養官婚班齒致失清流而本來族類各居榮顯顧瞻彼此理當憤怨宜改鎮立州分置郡縣凡是府户悉免為民入仕次叙一準其舊文武兼用威恩並施此計若行國家庶无北顧之慮矣崇為之奏聞事寢不報初元义既幽胡太后常入直於魏主所居殿側曲盡佞媚帝由是寵信之义出入禁中恒令勇士持兵以自先後時出休於千秋門外施木欄楯使腹心防守以備竊發士民求見者遥對之而已其始執政之時矯情自飾以謙勤接物時事得失頗以闗懐既得志遂自驕愎嗜酒好色貪吝寶賄與奪任情紀綱壊亂父京兆王繼尤貪縱與其妻子各受賂遺請屬有司莫敢違者乃至郡縣小吏亦不得公選牧守令長率皆貪汙之人由是百姓困窮人人思亂武衛将軍于景忠之弟也謀廢义义黜為懐荒鎮将及柔然入冦鎮民請糧景不肯給鎮民不勝忿遂反執景殺之未幾沃野鎮民破六韓拔陵聚衆反殺鎮将改元真王諸鎮華夷之民往往響應拔陵引兵南侵遣别帥衛可孤圍武川鎮又攻懐朔鎮尖山賀拔度拔及其三子允勝岳皆有材勇懐朔鎮将楊鈞擢度拔為統軍三子為軍主以拒之魏景明之初世宗命宦者白整為髙祖及文昭髙后鑿二佛龕於龍門山皆髙百尺永平中劉騰復為世宗鑿一龕至是二十四年凡用十八萬二千餘工而未成秋七月辛亥魏詔見在朝官依令七十合解者可給本官半禄以終其身九月魏詔侍中太尉汝南王悦入居門下與丞相髙陽王雍參决尚書奏事冬十月庚午以中書監中衛将軍袁昂為尚書令即本號開府儀同三司魏平恩文宣公崔光疾篤魏主親撫視之拜其子勵為齊州剌史爲之撤樂罷遊眺丁酉光卒帝臨哭之慟為減常膳光寛和樂善終日怡怡未嘗忿恚于忠元义用事以光舊徳皆尊敬之事多資决而不能救裴郭清河之死時人比之張禹胡廣光且死薦都官尚書賈思伯為侍講帝從思伯受春秋思伯雖貴傾身下士或問思伯曰公何以能不驕思伯曰衰至便驕何常之有當世以為雅談十一月癸未朔日有食之甲辰尚書左僕射王暕卒梁初唯楊荆郢江湘梁益七州用錢交廣用金銀餘州雜以穀帛交易上乃鑄五銖錢肉好周郭皆備别鑄無肉郭者謂之女錢民間私用女錢交易禁之不能止乃議盡罷銅錢十二月戊午始鑄鐵錢魏以汝南王悦為太保資治通鑑卷第一百四十九梁武帝
