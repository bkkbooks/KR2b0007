body:
  text: 秋七月馮駿拔江州獲田戎帝戒吳漢曰成都十餘萬衆不可輕也但堅據廣都待其來攻勿與爭鋒若不敢來公轉營迫之須其力疲乃可擊也漢乗利遂自將歩騎二萬進逼成都去城十餘里阻江北營作浮橋使副將武威將軍劉尚將萬餘人屯於江南為營相去二十餘里帝聞之大驚讓漢曰比敕公千條萬端何意臨事勃亂旣輕敵深入又與尚别營事有緩急不復相及賊若岀兵綴公以大衆攻尚尚破公即敗矣幸無它者急引兵還廣都詔書未到九月述果使其大司徒謝豐執金吾袁吉將衆十許萬分為二十餘營出攻漢使别將將萬餘人劫劉尚令不得相救漢與大戰一日兵敗走入壁豐因圍之漢乃召諸將厲之曰吾與諸君踰越險阻轉戰千里遂深入敵地至其城下而今與劉尚二處受圍埶旣不接其禍難量欲濳師就尚於江南并兵禦之若能同心一力人自為戰大功可立如其不然敗必無餘成敗之機在此一舉諸將皆曰諾於是饗士秣馬閉營三日不出乃多樹幡旗使煙火不絶夜銜枚引兵與劉尚合軍豐等不覺明日乃分兵拒水北自將攻江南漢悉兵迎戰自旦至晡遂大破之斬豐吉於是引還廣都留劉尚拒述具以狀上而深自譴責帝報曰公還廣都甚得其宜述必不敢略尚而擊公也若先攻尚公從廣都五十里悉歩騎赴之適當值其危困破之必矣自是漢與述戰於廣都成都之間八戰八克遂軍于其郭中臧宮㧞緜竹破涪城斬公孫恢復攻拔繁郫與呉漢㑹於成都李通欲避權埶乞骸骨積二嵗帝乃聽上大司空印綬以特進奉朝請後有司奏封皇子帝感通首創大謀即日封通少子雄為召陵矦公孫述困急謂延岑曰事當奈何岑曰男兒當死中求生可坐窮乎財物易聚耳不宜有愛述乃悉散金帛募敢死士五千餘人以配岑岑於市橋偽建旗幟鳴鼓挑戰而濳遣竒兵出吳漢軍後襲擊破漢漢墯水緣馬尾得岀漢軍餘七日糧隂具船欲遁去蜀郡太守南陽張堪聞之馳往見漢説述必敗不宜退師之䇿漢從之乃示弱以挑敵冬十一月臧宮軍咸陽門戊寅述自將數萬人攻漢使延岑拒宮大戰岑三合三勝自旦及日中軍士不得食並疲漢因使䕶軍髙午唐邯將鋭卒數萬擊之述兵大亂髙午犇陳刺述洞胷墯馬左右輿入城述以兵屬延岑其夜死明旦延岑以城降辛巳呉漢夷述妻子盡滅公孫氏并族延岑遂放兵大掠焚述宫室帝聞之怒以譴漢又讓劉尚曰城降三日吏民從服孩兒老母口以萬數一旦放兵縱火聞之可為酸鼻尚宗室子孫嘗更吏職何忍行此仰視天俯視地觀放麑啜羹二者孰仁良失斬將弔民之義也初述徴廣漢李業為愽士業固稱疾不起述羞不能致使大鴻臚尹融奉詔命以劫業若起則受公矦之位不起賜以毒酒融譬㫖曰方今天下分崩孰知是非而以區區之身試於不測之淵乎朝廷貪慕名徳曠官缺位于今七年四時珍御不以忘君宜上奉知己下為子孫身名俱全不亦優乎業乃歎曰古人危邦不入亂邦不居為此故也君子見危授命何乃誘以髙位重餌哉融曰宜呼室家計之業曰丈夫斷之於心乆矣何妻子之為遂飲毒而死述恥有殺賢之名遣使弔祠􅉠贈百匹業子翬逃辭不受述又聘巴郡譙􅀇􅀇不詣亦遣使者以毒藥劫之太守自詣􅀇廬勸之行􅀇曰保志全髙死亦奚恨遂受毒藥􅀇子瑛泣血叩頭於太守願奉家錢千萬以贖父死太守為請述許之述又徴蜀郡王皓王嘉恐其不至先繫其妻子使者謂嘉曰速裝妻子可全對曰犬馬猶識主况於人乎王皓先自刎以首付使者述怒遂誅皓家屬王嘉聞而歎曰後之哉乃對使者伏劒而死犍為費貽不肯仕述漆身為癩陽狂以避之同郡任永馮信皆託青盲以辭徴命帝旣平蜀詔贈常少為太常張隆為光祿勲譙􅀇已卒祠以中牢敕所在還其家錢而表李業之閭徴費貽任永馮信㑹永信病卒獨貽仕至合浦太守上以述將程烏李育有才幹皆擢用之於是西土咸恱莫不歸心焉初王莽以廣漢文齊為益州太守齊訓農治兵降集群夷甚得其和公孫述時齊固守拒險述拘其妻子許以封矦齊不降聞上即位間道遣使自聞蜀平徴為鎮逺將軍封成義矦十二月辛夘揚武將軍馬成行大司空事是嵗參狼羌與諸種㓂武都隴西太守馬援擊破之降者萬餘人於是隴右清静援務開恩信寛以待下任吏以職但緫大體而賔客故人日滿其門諸曹時白外事援輙曰此丞掾之任何足相煩頗哀老子使得遨遊若大姓侵小民黠吏不從令此乃太守事耳傍縣嘗有報讎者吏民驚言羌反百姓犇入城狄道長詣門請閉城發兵援時與賔客飲大笑曰虜何敢復犯我曉狄道長歸守寺舎良怖急者可牀下伏後稍定郡中服之詔邊吏力不足戰則守追虜料敵不拘以逗留法山桑節矦王常牟平烈矦耿况東光成矦耿純皆薨况疾病乗輿數自臨幸復以弇弟廣舉並為中郎將弇兄弟六人皆垂青紫省侍醫藥當世以為榮盧芳與匈奴烏桓連兵數㓂邊帝遣驃騎大將軍杜茂等將兵鎮守北邊治飛狐道築亭障修烽燧凡與匈奴烏桓大小數十百戰終不能克上詔竇融與五郡太守入朝融等奉詔而行官屬賔客相隨駕乗千餘兩馬牛羊被野旣至詣城門上印綬詔遣使者還矦印綬引見賞賜恩寵傾動京師尋拜融冀州牧又以梁統為太中大夫姑臧長孔奮為武都郡丞姑臧在河西最為富饒天下未定士多不脩檢操居縣者不盈數月輒致豐積奮在職四年力行清潔為衆人所笑以為身處脂膏不能自潤及從融入朝諸守令財貨連轂彌竟川澤唯奮無資單車就路帝以是賞之帝以睢陽令任延為武威太守帝親見戒之曰善事上官無失名譽延對曰臣聞忠臣不和和臣不忠履正奉公臣子之節上下雷同非陛下之福善事上官臣不敢奉詔帝歎息曰卿言是也十三年春正月庚申大司徒矦霸薨戊子詔曰郡國獻異味其令太官勿復受遠方口實所以薦宗廟自如舊制時異國有獻名馬者日行千里又進寳劒價直百金詔以劒賜騎士馬駕鼔車上雅不喜聽音樂手不持珠玉嘗出獵車駕夜還上東門候汝南郅惲拒關不開上令從者見面於門間惲曰火明遼逺遂不受詔上乃回從東中門入明日惲上書諫曰昔文王不敢槃于游田以萬民惟正之供而陛下逺獵山林夜以繼晝其如社稷宗廟何書奏賜惲布百匹貶東中門候為參封尉二月遣捕虜將軍馬武屯虖沱河以備匈奴盧芳攻雲中乆不下其將隨昱留守九原欲脅芳來降芳知之與十餘騎亡入匈奴其衆盡歸隨昱昱乃詣闕降詔拜昱五原太守封鐫胡矦朱祐奏古者人臣受封不加王爵丙辰詔長沙王興眞定王得河間王邵中山王茂皆降爵為矦丁巳以趙王良為趙公太原王章爲齊公魯王興爲魯公是時宗室及絶國封矦者凡一百三十七人富平矦張純安世之四世孫也歷王莽世以敦謹守約保全前封建武初先來詣闕爲矦如故於是有司奏列矦非宗室不宜復國上曰張純宿衛十有餘年其勿廢更封武始矦食富平之半庚午以紹嘉公孔安爲宋公承休公􅁎常爲衛公三月辛未以沛郡太守韓歆爲大司徒丙子行大司空馬成復爲揚武將軍呉漢自蜀振旅而還至宛詔過家上冢賜榖二萬斛夏四月至京師於是大饗將士功臣増邑更封凡三百六十五人其外戚恩澤封者四十五人定封鄧禹爲髙宻矦食四縣李通爲固始矦賈復爲膠東矦食六縣餘各有差已歿者益封其子孫或更封支庶帝在兵間乆厭武事且知天下疲耗思樂息肩自隴蜀平後非警急未嘗復言軍旅皇太子嘗問攻戰之事帝曰昔衛靈公問陳孔子不對此非爾所及鄧禹賈復知帝偃干戈修文徳不欲功臣擁衆京師乃去甲兵敦儒學帝亦思念欲完功臣爵土不令以吏職為過遂罷左右將軍官耿弇等亦上大將軍將軍印綬皆以列矦就第加位特進奉朝請鄧禹内行淳備有子十三人各使守一蓺修整閨門教養子孫皆可以為後世灋資用國邑不修産利賈復為人剛毅方直多大節旣還私第闔門養威重朱祜等薦復宜為宰相帝方以吏事責三公故功臣並不用是時列矦唯髙宻固始膠東三矦與公卿參議國家大事恩遇甚厚帝雖制御功臣而毎能回容宥其小失逺方貢珍甘必先徧賜諸矦而太官無餘故皆保其福禄無誅譴者益州傳送公孫述瞽師郊廟樂器葆車輿輦於是灋物始備時兵革旣息天下少事文書調役務從簡寡至乃十存一焉甲寅以冀州牧竇融為大司空融自以非舊臣一旦入朝在功臣之右每召㑹進見容貌辭氣卑恭已甚帝以此愈親厚之融小心乆不自安數辭爵位上䟽曰臣融有子朝夕教導以經蓺不令觀天文見䜟記誠欲令恭肅畏事恂恂守道不願其有才能何况乃當􅀓以連城廣土享故諸矦王國哉因復請間求見帝不許後朝罷逡廵席後帝知欲有讓遂使左右傳出它日㑹見迎詔融曰日者知公欲讓職還土故命公暑熱且自便今相見宜論它事勿得復言融不敢重陳請五月匈奴㓂河東十四年夏卭榖王任貴遣使上三年計即授越嶲太守秋㑹稽大疫莎車王賢鄯善王安皆遣使奉獻西域苦匈奴重歛皆願屬漢復置都䕶上以中國新定不許太中大夫梁統上䟽曰臣竊見元帝初元五年輕殊死刑三十四事哀帝建平元年輕殊死刑八十一事其四十二事手殺人者减死一等自是之後著為常準故人輕犯灋吏易殺人臣聞立君之道仁義為主仁者愛人義者正理愛人以除殘為務正理以去亂為心刑罰在衷無取於輕高帝受命約令定律誠得其宜文帝唯除省肉刑相坐之灋自餘皆率由舊章至哀平繼體即位日淺聽斷尚寡丞相王嘉輕為穿鑿虧除先帝舊約成律數年之間百有餘事或不便於理或不厭民心謹表其尤害於體者傅奏於左願陛下宣詔有司詳擇其善定不易之典事下公卿光禄勲杜林奏曰大漢初興蠲除苛政海内歡欣及至其後漸以滋章果桃菜茹之饋集以成贓小事無妨於義以為大戮至於灋不能禁令不能止上下相遁為敝彌深臣愚以為宜如舊制不合翻移統復上言曰臣之所奏非曰嚴刑經曰爰制百姓于刑之衷衷之為言不輕不重之謂也自髙祖至于孝宣海内稱治至初元建平而盜賊浸多皆刑罰不衷愚人易犯之所致也由此觀之則刑輕之作反生大患惠加姦軌而害及良善也事寢不報十五年春正月辛丑大司徒韓歆免歆好直言無隠諱帝每不能容歆於上前證嵗將饑凶指天畫地言甚剛切故坐免歸田里帝猶不釋復遣使宣詔責之歆及子嬰皆自殺歆素有重名死非其罪衆多不猒帝乃追賜錢榖以成禮葬之臣光曰昔髙宗命説曰若藥弗瞑􅅭厥疾弗瘳夫切直之言非人臣之利乃國家之福也是以人君夙夜求之唯懼弗得聞惜乎以光武之世而韓歆用直諫死豈不為仁明之累哉丁未有星孛於昴以汝南太守歐陽歙為大司徒匈奴㓂鈔日盛州郡不能禁二月遣吳漢率馬成馬武等北擊匈奴徙鴈門代郡上谷吏民六萬餘口置居庸常山關以東以避胡㓂匈奴左部遂復轉居塞内朝廷患之増緣邊兵部數千人夏四月丁巳封皇子輔為右翊公英為楚公陽為東海公康為濟南公蒼為東平公延為淮陽公荆為山陽公衡為臨淮公焉為左翊公京為琅邪公癸丑追謚兄縯爲齊武公兄仲爲魯哀公帝感縯功業不就撫育二子章興恩愛甚篤以其少貴欲令親吏事使章試守平隂令興􅚆氏令其後章遷梁郡太守興遷􅀪農太守帝以天下墾田多不以實自占又户口年紀互有増減乃詔下州郡檢覈於是刺史太守多為詐巧茍以度田為名聚民田中并度廬屋里落民遮道啼呼或優饒豪右侵刻羸弱時諸郡各遣使奏事帝見陳留吏牘上有書視之云潁川􅀪農可問河南南陽不可問帝詰吏由趣吏不肯服抵言於長夀街上得之帝怒時東海公陽年十二在幄後言曰吏受郡敕當欲以墾田相方耳帝曰即如此何故言河南南陽不可問對曰河南帝城多近臣南陽帝鄉多近親田宅踰制不可為凖帝令虎賁將詰問吏吏乃實首服如東海公對上由是益竒愛陽遣謁者考實二千石長吏阿枉不平者冬十一月甲戌大司徒歙坐前為汝南太守度田不實贓罪千餘萬下獄歙世授尚書八世為博士諸生守闕為歙求哀者千餘人至有自髠剔者平原禮震年十七求代歙死帝竟不赦歙死獄中十二月庚午以關内矦戴渉為大司徒盧芳自匈奴復入居髙栁是嵗驃騎大將軍杜茂坐使軍吏殺人免使揚武將軍馬成代茂繕治障塞十里一候以備匈奴使騎都尉張堪領杜茂營擊破匈奴於髙栁拜堪漁陽太守堪視事八年匈奴不敢犯塞勸民耕稼以致殷富百姓歌曰桑無附枝麥穗兩歧張君為政樂不可支安平矦蓋延薨交阯麊泠縣雒將女子徴側甚雄勇交阯太守蘇定以灋䋲之徴側忿怨十六年春二月徴側與其妹徴貳反九眞日南合浦蠻俚皆應之凡略六十五城自立為王都麊泠交阯刺史及諸太守僅得自守三月辛丑晦日有食之秋九月河南尹張伋及諸郡守十餘人皆坐度田不實下獄死後上從容謂虎賁中郎將馬援曰吾甚恨前殺守相多也對曰死得其罪何多之有但死者旣往不可復生也上大笑郡國羣盜處處並起郡縣追討到則解散去復屯結青徐幽冀四州尤甚冬十月遣使者下郡國聽羣盜自相糾擿五人共斬一人者除其罪吏雖逗留回避故縱者皆勿問聽以禽討爲效其牧守令長坐界内有盜賊而不收捕者又以畏愞捐城委守者皆不以為負但取獲賊多少為殿最唯蔽匿者乃罪之於是更相追捕賊並解散徙其魁帥於它郡賦田受稟使安生業自是牛馬放牧不收邑門不閉盧芳與閔堪使使請降帝立芳為代王堪為代相賜繒二萬匹因使和集匈奴芳上䟽謝自陳思望闕庭詔報芳朝明年正月初匈奴聞漢購求芳貪得財帛故遣芳還降旣而芳以自歸為功不稱匈奴所遣單于復恥言其計故賞遂不行由是大恨入㓂尤深馬援奏宜如舊鑄五銖錢上從之天下賴其便盧芳入朝南及昌平有詔止令更朝明嵗十七年春正月趙孝公良薨初懐縣大姓李子春二孫殺人懐令趙憙窮治其姦二孫自殺收繫子春京師貴戚為請者數十憙終不聽及良病上臨視之問所欲言良曰素與李子春厚今犯罪懐令趙憙欲殺之願乞其命帝曰吏奉灋律不可枉也更道它所欲良無復言旣薨上追思良乃貰出子春遷憙為平原太守二月乙未晦日有食之夏四月乙夘上行幸章陵五月乙卯還宫六月癸巳臨淮懐公衡薨妖賊李廣攻沒皖城遣虎賁中郎將馬援驃騎將軍段志討之秋九月破皖城斬李廣郭后寵衰數懐怨懟上怒之冬十月辛巳廢皇后郭氏立貴人隂氏為皇后詔曰異常之事非國休福不得上夀稱慶郅惲言於帝曰臣聞夫婦之好父不能得之於子况臣能得之於君乎是臣所不敢言雖然願陛下念其可否之計無令天下有議社稷而已帝曰惲善恕已量主知我必不有所左右而輕天下也帝進郭后子右翊公輔爲中山王以常山郡益中山國郭后爲中山太后其餘九國公皆爲王甲申帝幸章陵脩園廟祠舊宅觀田廬置酒作樂賞賜時宗室諸母因酣恱相與語曰文叔少時謹信與人不款曲唯直柔耳今乃能如此帝聞之大笑曰吾治天下亦欲以柔道行之十二月還自章陵是嵗莎車王賢復遣使奉獻請都護帝賜賢西域都護印綬及車旗黄金錦繡敦煌太守裴遵上言夷狄不可假以大權又令諸國失望詔書收還都䕶印綬更賜賢以漢大將軍印綬其使不肯易遵迫奪之賢由是始恨而猶詐稱大都䕶移書諸國諸國悉服屬焉匈奴鮮卑赤山烏桓數連兵入塞殺略吏民詔拜襄賁令祭肜為遼東太守肜有勇力虜每犯塞常為士卒鋒數破走之肜遵之從弟也徴側等㓂亂連年詔長沙合浦交阯具車船修道橋通障谿儲糧榖拜馬援為伏波將軍以扶樂矦劉隆為副南擊交阯十八年二月蜀郡守將史歆反攻太守張穆穆踰城走宕渠楊偉等起兵以應歆帝遣吳漢等將萬餘人討之甲寅上行幸長安三月幸蒲坂祠后土馬援縁海而進隨山刋道千餘里至浪泊上與徴側等戰大破之追至禁谿賊遂散走夏四月甲戌車駕還宫戊申上行幸河内戊子還宫五月旱盧芳自昌平還内自疑懼遂復反與閔堪相攻連月匈奴遣數百騎迎芳出塞芳留匈奴中十餘年病死吳漢發廣漢巴蜀三郡兵圍成都百餘日秋七月拔之斬史歆等漢乃乗桴㳂江下巴郡楊偉等惶恐解散漢誅其渠帥徙其黨與數百家於南郡長沙而還冬十月庚辰上幸宜城還祠章陵十二月還宫是嵗罷州牧置刺史五官中郎將張純與太僕朱浮奏議禮為人子事大宗降其私親當除今親廟四以先帝四廟代之大司徒渉等奏立元成哀平四廟上自以昭穆次第當為元帝後十九年春正月庚子追尊宣帝曰中宗始祠昭帝元帝於太廟成帝哀帝平帝於長安舂陵節矦以下於章陵其長安章陵皆太守令長侍祠馬援斬徴側徴貳妖賊單臣傅鎮等相聚入原武城自稱將軍詔太中太夫臧宫將兵圍之數攻不下士卒死傷帝召公卿諸矦王問方略皆曰宜重其購賞東海王陽獨曰妖巫相劫埶無乆立其中必有悔欲亡者但外圍急不得走耳宜小挺緩令得逃亡逃亡則一亭長足以禽矣帝然之即敕宫徹圍緩賊賊衆分散夏四月拔原武斬臣鎮等馬援進擊徴側餘黨都陽等至居風降之嶠南悉平援與越人申明舊制以約束之自後駱越奉行馬將軍故事閏月戊申進趙齊魯三公爵皆為王郭后旣廢太子彊意不自安郅惲説太子曰乆處疑位上違孝道下近危殆不如辭位以奉養母氏太子從之數因左右及諸王陳其懇誠願備藩國上不忍遲回者數嵗六月戊申詔曰春秋之義立子以貴東海王陽皇后之子宜承大綂皇太子彊崇執謙􅅲願備藩國父子之情重乆違之其以彊為東海王立陽為皇太子改名莊袁宏論曰夫建太子所以重宗綂一民心也非有大惡於天下不可移也世祖中興漢業宜遵正道以為後灋今太子之徳未虧於外內寵旣多嫡子遷位可謂失矣然東海歸藩謙恭之心彌亮明帝承統友于之情愈篤雖長幼易位興廢不同父子兄弟至性無間夫以三代之道處之亦何以過乎帝以太子舅隂識守執金吾隂興為衛尉皆輔導太子識性忠厚入雖極言正議及與賔客語未嘗及國事帝敬重之常指識以敕戒貴戚激厲左右焉興雖禮賢好施而門無遊俠與同郡張宗上谷鮮于裒不相好知其有用猶稱所長而達之友人張汜杜禽與興厚善以為華而少實但私之以財終不為言是以世稱其忠上以沛國桓榮為議郎使授太子經車駕幸太學㑹諸博士論難於前榮辨明經義每以禮讓相厭不以辭長勝人儒者莫之及特加賞賜又詔諸生雅歌擊磬盡日乃罷帝使左中郎將汝南鍾興授皇太子及宗室諸矦春秋賜興爵關内矦興辭以無功帝曰生教訓太子及諸王矦非大功邪興曰臣師少府丁恭於是復封恭而興遂固辭不受陳留董宣為雒陽令湖陽公主蒼頭白日殺人因匿主家吏不能得及主出行以奴驂乗宣於夏門亭候之駐車叩馬以刀畫地大言數主之失叱奴下車因格殺之主即還宫訴帝帝大怒召宣欲箠殺之宣叩頭曰願乞一言而死帝曰欲何言宣曰陛下聖徳中興而縱奴殺人將何以治天下乎臣不須箠請得自殺即以頭擊楹流血被面帝令小黄門持之使宣叩頭謝主宣不從彊使頓之宣兩手據地終不肯俯主曰文叔為白衣時藏亡匿死吏不敢至門今為天子威不能行一令乎帝笑曰天子不與白衣同因敕彊項令出賜錢三十萬宣悉以班諸吏由是能摶擊豪彊京師莫不震慓九月壬申上行幸南陽進幸汝南南頓縣舎置酒㑹賜吏民復南頓田租一嵗父老前叩頭言皇考居此日乆陛下識知寺舎毎來輒加厚恩願賜復十年帝曰天下重器常恐不任日復一日安敢逺期十嵗乎吏民又言陛下實惜之何言謙也帝大笑復増一嵗進幸淮陽梁沛西南夷棟蠶反殺長吏詔武威將軍劉尚討之路由越嶲卭榖王任貴恐尚旣定南邊威灋必行已不得自放縱即聚兵起營多釀毒酒欲先勞軍因襲擊尚尚知其謀即分兵先據卭都遂掩任貴誅之二十年春二月戊子車駕還宫夏四月庚辰大司徒戴渉坐入故太倉令奚渉罪下獄死帝以三公連職䇿免大司空竇融廣平忠矦吳漢病篤車駕親臨問所欲言對曰臣愚無所知識唯願陛下慎無赦而已五月辛亥漢薨詔送葬如大將軍霍光故事漢性彊力每從征伐帝未安常側足而立諸將見戰陳不利或多惶懼失其常度漢意氣自若方整厲器械激揚吏士帝時遣人觀大司馬何為還言方脩戰攻之具乃歎曰吴公差彊人意隠若一敵國矣毎當出師朝受詔夕則引道初無辦嚴之日及在朝廷斤斤謹質形於體貌漢嘗出征妻子在後買田業漢還讓之曰軍師在外吏士不足何多買田宅乎遂盡以分與昆弟外家故能任職以功名終匈奴㓂上黨天水遂至扶風帝苦風眩疾甚以隂興領侍中受顧命於雲臺廣室㑹疾瘳召見興欲以代吳漢爲大司馬興叩頭流涕固讓曰臣不敢惜身誠虧損聖徳不可茍冒至誠發中感動左右帝遂聽之太子太傅張湛自郭后之廢稱疾不朝帝彊起之欲以爲司徒湛固辭疾篤不能復任朝事遂罷之六月庚寅以廣漢太守河内蔡茂爲大司徒太僕朱浮爲大司空壬辰以左中郎將劉隆為驃騎將軍行大司馬事乙未徙中山王輔為沛王以郭况為大鴻臚帝數幸其第賞賜金帛豐盛莫比京師號况家為金穴秋九月馬援自交阯還平陵孟冀迎勞之援曰方今匈奴烏桓尚擾北邊欲自請擊之男兒要當死於邉野以馬革裹尸還葬耳何能卧牀上在兒女子手中邪冀曰諒為烈士當如是矣冬十月甲午上行幸魯東海楚沛國十二月匈奴㓂天水扶風上黨壬寅車駕還宫馬援自請擊匈奴帝許之使出屯襄國詔百官祖道援謂黄門郎梁松竇固曰凡人富貴當使可復賤也如卿等欲不可復賤居髙堅自持勉思鄙言松綂之子固友之子也劉尚進兵與棟蠶等連戰皆破之二十一年春正月追至不韋斬棟蠶帥西南諸夷悉平烏桓與匈奴鮮卑連兵為㓂代郡以東尤被烏桓之害其居止近塞朝發穹廬暮至城郭五郡民庶家受其辜至於郡縣損壞百姓流亡邊陲蕭條無復人迹秋八月帝遣馬援與謁者分築堡塞稍興立郡縣或空置太守令長招還人民烏桓居上谷塞外白山者最為彊富援將三千騎擊之無功而還鮮卑萬餘騎㓂遼東太守祭肜率數千人迎擊之自被甲陷陳虜大犇投水死者過半遂窮追出塞虜急皆弃兵裸身散走是後鮮卑震怖畏肜不敢復闚塞冬匈奴㓂上谷中山莎車王賢浸以驕横欲兼并西域數攻諸國重求賦税諸國愁懼車師前王鄯善焉耆等十八國俱遣子入侍獻其珍寳及得見皆流涕稽首願得都䕶帝以中國初定北邊未服皆還其侍子厚賞賜之諸國聞都䕶不出而侍子皆還大憂恐乃與敦煌太守檄願留侍子以示莎車言侍子見留都䕶尋出冀且息其兵裴遵以狀聞帝許之二十二年春閏正月丙戌上幸長安二月己巳還雒陽夏五月乙未晦日有食之秋九月戊辰地震冬十月壬子大司空朱浮免癸丑以光禄勲杜林為大司空初陳留劉昆爲江陵令縣有火災昆向火叩頭火尋滅後為􅀪農太守虎皆負子度河帝聞而異之徴昆代林為光禄勲帝問昆曰前在江陵反風滅火後守􅀪農虎北渡河行何徳政而致是事對曰偶然耳左右皆笑帝歎曰此乃長者之言也顧命書諸䇿是嵗青州蝗匈奴單于輿死子左賢王烏達鞮矦立復死弟左賢王蒲奴立匈奴中連年旱蝗赤地數千里人畜饑疫死耗太半單于畏漢乗其敝乃遣使詣漁陽求和親帝遣中郎將李茂報命烏桓乗匈奴之弱擊破之匈奴北徙數千里幕南地空詔罷諸邊郡亭候吏卒以幣帛招降烏桓西域諸國侍子乆留敦煌皆愁思亡歸莎車王賢知都䕶不至擊破鄯善攻殺􅀛兹王鄯善王安上書願復遣子入侍更請都䕶都䕶不出誠廹於匈奴帝報曰今使者大兵未能得出如諸國力不從心東西南北自在也於是鄯善車師復附匈奴班固論曰孝武之世圗制匈奴患其兼從西國結黨南羌乃表河曲列四郡開玉門通西域以斷匈奴右臂隔絶南羌月氏單于失援由是逺遁而幕南無王庭遭值文景􅀇黙養民五世財力有餘士馬彊盛故能睹犀布瑇瑁則建珠厓七郡感蒟醬竹杖則開牂柯越嶲聞天馬蒲萄則通大宛安息自是殊方異物四面而至於是開苑囿廣宫室盛帷帳美服玩設酒池肉林以饗四夷之客作魚龍角抵之戲以觀視之及賂遺贈送萬里相奉師旅之費不可勝計至於用度不足乃􅅦酒酤筦鹽鐵鑄白金造皮幣筭至車船租及六畜民力屈財用竭因之以凶年㓂盜並起道路不通直指之使始出衣繡杖斧斷斬於郡國然後勝之是以末年遂棄輪臺之地而下哀痛之詔豈非仁聖之所悔哉且通西域近有龍堆逺則葱嶺身熱頭痛懸度之阨淮南杜欽揚雄之論皆以為此天地所以界别區域絶外内也西域諸國各有君長兵衆分弱無所綂一雖屬匈奴不相親附匈奴能得其馬畜旃罽而不能綂率與之進退與漢隔絶道里又逺得之不為益棄之不為損盛徳在我無取於彼故自建武以來西域思漢威徳咸樂内屬數遣使置質于漢願請都䕶聖上逺覽古今因時之宜辭而未許雖大禹之序西戎周公之讓白雉太宗之卻走馬義兼之矣資治通鑑卷第四十三
