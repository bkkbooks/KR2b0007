body:
  text: 魏以五官中郎將丕爲太子初魏王操娶丁夫人無子妾劉氏生子昻卞氏生四子丕彰植熊王使丁夫人母養昂昂死於穰丁夫人哭泣無節操怒而出之以卞氏爲繼室植性機警多藝能才藻敏贍操愛之操欲以女妻丁儀丕以儀目眇諫止之儀由是怨丕與弟黃門侍郎廙及丞相主簿楊脩數稱臨菑矦植之才勸操立以爲嗣脩彪之子也操以函密訪於外尚書崔琰露板荅曰春秋之義立子以長加五官將仁孝聦明冝承正統琰以死守之植琰之兄女婿也尚書僕射毛玠曰近者􅀽紹以嫡庶不分覆宗㓕國廢立大事非所冝聞東曹􅁺邢顒曰以庶代宗先丗之戒也願殿下深察之丕使人問太中大夫賈詡以自固之術詡曰願將軍恢崇德度躬素士之業朝夕孜孜不違子道如此而已丕從之深自砥礪它日操屏人問詡詡嘿然不對操曰與卿言而不荅何也詡曰屬有所思故不即對耳操曰何思詡曰思􅀽本初劉景升父子也操大笑操甞出征丕植並送路側植稱述功德發言有章左右屬目操亦恱焉丕悵然自失濟隂呉質耳語曰王當行流涕可也及辭丕涕泣而拜操及左右咸歔欷於是皆以植多華辭而誠心不及也植旣任性而行不自彫飾五官將御之以術矯情自飾宫人左右並爲之稱􅀃故遂定爲太子左右長御賀卞夫人曰將軍拜太子天下莫不喜夫人當傾府藏以賞賜夫人曰王自以丕年大故用爲嗣我伹當以免無教導之過爲幸耳亦何爲當重賜遺乎長御還具以語操操恱曰怒不變容喜不失節故最爲難太子抱議郎辛毗頸而言曰辛君知我喜不毗以告其女憲英憲英歎曰太子代君主宗廟社稷者也代君不可以不戚主國不可以不懼冝戚冝懼而反以爲喜何以能乆魏其不昌乎乆之臨菑矦植乗車行馳道中開司馬門出操大怒公車令坐死由是重諸矦科禁而植寵日衰植妻衣繡操登臺見之以違制命還家賜死灋正􅀃劉僃曰曹操一舉而降張魯定漢中不因此埶以圖巴蜀而留夏矦淵張郃屯守身遽北還此非其智不逮而力不足也必將内有憂偪故耳今䇿淵郃才略不勝國之將帥舉衆往討必可克之克之之日廣農積榖觀釁伺􅂩上可以傾覆冦敵尊奬王室中可以􅁞食雍涼廣拓境土下可以固守要害爲持乆之計此蓋天以與我時不可失也僃善其策乃率諸將進兵漢中遣張飛馬超呉蘭等屯下辨魏王操遣都護將軍曹洪拒之魯肅卒孫權以從事中郎彭城嚴畯代肅督兵萬人鎭陸口衆人皆爲畯喜畯固辭以樸素書生不閑軍事發言懇惻至于流涕權乃以左護軍虎威將軍吕􅀩兼漢昌太守以代之衆嘉嚴畯能以實讓定威校尉呉郡陸遜言於孫權曰方今克敵寜亂非衆不濟而山冦舊惡依阻深地夫腹心未平難以圖逺可大部伍取其精銳權從之以爲帳下右部督㑹丹陽賊帥費棧作亂扇動山越權命遜討棧破之遂部伍東三郡彊者爲兵羸者補戸得精卒數萬人宿惡盪除所過肅清還屯蕪湖㑹稽太守淳于式表遜枉取民人愁擾所在遜後詣都言次稱式佳吏權曰式白君而君薦之何也遜對曰式意欲養民是以白遜若遜復毁式以亂聖聽不可長也權曰此誠長者之事顧人不能爲耳魏王操使丞相長史王必典兵督許中事時􅀜羽彊盛京兆金禕覩漢祚將移乃與少府耿紀司直韋晃太醫令吉本本子邈邈弟穆等謀殺必挾天子以攻魏南引􅀜羽爲援二十三年春正月吉邈等率其黨千餘人夜攻王必燒其門射必中肩帳下督扶必犇南城㑹天明邈等衆潰必與潁川典農中郎將嚴匡共討斬之三月有星孛于東方曹洪將擊呉蘭張飛屯固山聲言欲斷軍後衆議狐疑􅀐都尉曹休曰賊實斷道者當伏兵潜行今乃先張聲勢此其不能明矣冝及其未集促擊蘭蘭破飛自走矣洪從之進擊破蘭斬之三月張飛馬超走休魏王族子也夏四月代郡上谷烏􅁊無臣氐等反先是魏王操召代郡太守裴潜爲丞相理曹􅁺操美潜治代之功潜曰潜於百姓雖寛於諸胡爲峻今繼者必以潜爲治過嚴而事加寛惠彼素驕恣過寛必弛旣弛又將攝之以灋此怨叛所由生也以埶料之代必復叛於是操深悔還濳之速後數十日三單于反問果至操以其子鄢陵矦彰行驍􅀐將軍使討之彰少善射御膂力過人操戒彰曰居家爲父子受事爲君臣動以王灋從事爾其戒之劉僃屯陽平關夏矦淵張郃徐晃等與之相拒僃遣其將陳式等絶馬鳴閣道徐晃擊破之張郃屯廣石僃攻之不能克急書發益州兵諸葛亮以問從事犍爲楊洪洪曰漢中益州咽㗋存亡之機㑹若無漢中則無蜀矣此家門之禍也發兵何疑時灋正從僃北行亮於是表洪領蜀郡太守衆事皆辦遂使即眞初犍爲太守李嚴辟洪爲功曹嚴未去犍爲而洪已爲蜀郡洪舉門下書佐何祗有才策洪尚在蜀郡而祗已爲廣漢太守是以西土咸服諸葛亮能盡時人之器用也秋七月魏王操自將擊劉僃九月至長安曹彰擊代郡烏桓身自搏戰鎧中數箭意氣益厲乗勝逐北至桑乾之北大破之斬首獲生以千數時鮮卑大人軻比能將數萬􅀐觀望彊弱見彰力戰所向皆破乃請服北方悉平南陽吏民苦繇役冬十月宛守將矦音反南陽太守東里衮與功曹應余迸竄得出音遣􅀐追之飛矢交流余以身蔽衮被七創而死音􅀐執衮以歸時征南將軍曹仁屯樊以鎭荆州魏王操命仁還討音功曹宗子卿􅀃音曰足下順民心舉大事逺近莫不望風然執郡將逆而無益何不遣之音從之子卿因夜踰城從太守收餘民圍音㑹曹仁軍至共攻之二十四年春正月曹仁屠宛斬矦音復屯樊初夏矦淵戰雖數勝魏王操常戒之曰爲將當有怯弱時不可但恃勇也將當以勇爲本行之以智計但知任勇一匹夫敵耳及淵與劉僃相拒踰年僃自陽平南渡􅃆水縁山稍前營於定軍山淵引兵爭之灋正曰可擊矣僃使討虜將軍黄忠乗高鼓譟攻之淵軍大敗斬淵及益州刺史趙顒張郃引兵還陽平是時新失元帥軍中擾擾不知所爲督軍杜襲與淵司馬太原郭淮收斂散卒號令諸軍曰張將軍國家名將劉僃所憚今日事急非張將軍不能安也遂權宜推郃爲軍主郃出勒兵按陳諸將皆受郃節度衆心乃定明日僃欲渡漢水來攻諸將以衆寡不敵欲依水爲陳以拒之郭淮曰此示弱而不足挫敵非筭也不如逺水爲陳引而致之半濟而後擊之僃可破也旣陳僃疑不渡淮遂堅守示無還心以狀聞於魏王操操善之遣使假郃節復以淮爲司馬二月壬子晦日有食之三月魏王操自長安出斜谷軍遮要以臨漢中劉僃曰曹公雖來無能爲也我必有漢川矣乃斂衆拒險終不交鋒操運米北山下黄忠引兵欲取之過期不還翊軍將軍趙雲將數十􅀐出營視之值操􅀭兵大出雲猝與相遇遂前突其陳且􅃲且却魏兵散而復合追至營下雲入營更大開門偃旗息鼔魏兵疑雲有伏引去雲雷鼔震天惟以勁弩於後射魏兵魏兵驚駭自相蹂踐墯漢水中死者甚多僃明旦自來至雲營視昨戰處曰子龍一身都爲膽也操與僃相守積月魏軍士多亡夏五月操悉引出漢中諸軍還長安劉僃遂有漢中操恐劉僃北取武都氐以逼􅀜中問雍州刺史張旣旣曰可勸使北出就榖以避賊前至者厚其寵賞則先者知利後必慕之操從之使旣之武都徙氐五萬餘落出居扶風天水界武威顔俊張掖和鸞酒泉黄華西平麴演等各據其郡自號將軍更相攻擊俊遣使送母及子詣魏王操爲質以求助操問張旣旣曰俊等外假國威内生傲悖計定勢足後即反耳今方事定蜀且冝兩存而􅃲之猶卞莊子之刺虎坐收其敝也王曰善歳餘鸞遂殺俊武威王祕又殺鸞劉僃遣冝都太守扶風孟逹從秭歸北攻房陵殺房陵太守蒯祺又遣養子副軍中郎將劉封自漢中乗􅃆水下統逹軍與逹㑹攻上庸上庸太守申耽舉郡降僃加耽征北將軍領上庸太守以耽弟儀爲建信將軍西城太守秋七月劉僃自稱漢中王設壇􅂣於􅃆陽陳兵列衆羣臣陪位讀奏訖乃拜受璽綬御王冠因驛拜章上還所假左將軍冝城亭矦印綬立子禪爲王太子拔牙門將軍義陽魏延爲鎭逺將軍領漢中太守以鎭漢川僃還治成都以許靖爲太傅灋正爲尚書令􅀜羽爲前將軍張飛爲右將軍馬超爲左將軍黃忠爲後將軍餘皆進位有差遣益州前部司馬犍爲費詩即授􅀜羽印綬羽聞黃忠位與已並怒曰大丈夫終不與老兵同列不肯受拜詩謂羽曰夫立王業者所用非一昔蕭曹與高祖少小親舊而陳韓亡命後至論其班列韓最居上未聞蕭曹以此爲怨今漢中王以一時之功隆崇漢室然意之輕重寜當與君矦齊乎且王與君矦譬猶一體同休等戚禍福共之愚謂君矦不冝計官號之高下爵禄之多少爲意也僕一介之使衘命之人君矦不受拜如是便還但相爲惜此舉動恐有後悔耳羽大感悟遽即受拜詔以魏王操夫人卞氏爲王后孫權攻合肥時諸州兵戍淮南揚州刺史温恢謂兖州刺史裴潜曰此間雖有賊然不足憂今水潦方生而子孝縣軍無有逺僃􅀜羽驍猾政恐征南有變耳已而􅀜羽果使南郡太守糜芳守江陵將軍傅士仁守公安羽自率衆攻曹仁於樊仁使左將軍于禁立義將軍龐德等屯樊北八月大霖􅀨漢水溢平地數丈于禁等七軍皆􅃿禁與諸將登高避水羽乗大船就攻之禁等窮迫遂降龐德在隄上被甲持弓箭不虛發自平旦力戰至日過中羽攻益急矢盡短兵接德戰益怒氣愈壯而水浸盛吏士盡降德乗小船欲還仁營水盛船覆失弓矢獨抱船覆水中爲羽所得立而不跪羽謂曰卿兄在漢中我欲以卿爲將不早降何爲德罵羽曰豎子何謂降也魏王帶甲百萬威振天下汝劉僃庸才耳豈能敵邪我寜爲國家􅀑不爲賊將也羽殺之魏王操聞之流涕曰吾知于禁三十年何意臨危處難反不及龐德邪封德二子爲列矦羽急攻樊城城得水往往崩壞衆皆恟懼或謂曹仁曰今日之危非力所支可及羽圍未合乗輕船夜走汝南太守滿寵曰山水速疾冀其不乆聞羽遣别將已在郟下自許以􅀯百姓擾擾羽所以不敢遂進者恐吾軍掎其後耳今若遁去洪河以南非復國家有也君宜待之仁曰善乃沈白馬與軍人盟誓同心固守城中人馬􅂊數千人城不􅃿者數板羽乘船臨城立圍數重外内斷絶羽又遣别將圍將軍吕常於襄陽荆州刺史胡脩􅀯郷太守傅方皆降於羽初沛國魏諷有惑衆才傾動鄴都魏相國鍾繇辟以爲西曹􅁺滎陽任覽與諷友善同郡鄭袤泰之子也每謂覽曰諷姦雄終必爲亂九月諷濳結徒黨與長樂衞尉陳禕謀襲鄴未及期禕懼而告之太子丕誅諷連坐死者數千人鍾繇坐免官初丞相主簿楊脩與丁儀兄弟謀立曹植爲魏嗣五官將丕患之以車載廢簏内朝歌長呉質與之謀脩以白魏王操操未及推驗丕懼告質質曰無害也明日復以簏載絹以入脩復白之推驗無人操由是疑焉其後植以驕縱見䟽而植故連綴脩不止脩亦不敢自絶每當就植慮事有闕忖度操意豫作荅教十餘條敕門下教岀隨所問荅之於是教裁出荅已入操怪其捷推問始泄操亦以脩􅀽術之甥惡之乃發脩前後漏泄言教交􅀜諸侯收殺之魏王操以杜襲爲留府長史駐􅀜中􅀜中營帥許攸擁部曲不歸附而有慢言操大怒先欲伐之羣臣多諌宜招懷攸共討彊敵操橫刀於䣛作色不聽襲入欲諌操逆謂之曰吾計已定卿勿復言襲曰若殿下計是邪臣方助殿下成之若殿下計非邪雖成宜改之殿下逆臣令勿言何待下之不闡乎操曰許攸慢吾如何可置襲曰殿下謂許攸何如人邪操曰凡人也襲曰夫惟賢知賢惟聖知聖凡人安能知非凡人邪方今犲狼當路而狐貍是先人將謂殿下避彊攻弱進不爲勇退不爲仁臣聞千鈞之弩不爲鼷鼠發機萬石之鍾不以莛撞起音今區區之許攸何足以勞神武哉操曰善遂厚撫攸攸即歸服冬十月魏王操至雒陽陸渾民孫狼等作亂殺縣主簿南附􅀜羽羽授狼印給兵還爲寇賊自許以南往往遙應羽羽威震華夏魏王操議徙許都以避其銳丞相軍司馬司馬懿西曹屬蔣濟言於操曰于禁等爲水所􅃿非戰攻之失於國家大計未足有損劉僃孫權外親内踈􅀜羽得志權必不願也可遣人勸權躡其後許割江南以封權則樊圍自解操從之初魯肅常勸孫權以曹操尚存宜且撫輯􅀜羽與之同仇不可失也及吕􅀩代肅屯陸口以爲羽素驍雄有兼并之心且居國上流其勢難乆密言於權曰今令征虜守􅀯郡潘璋住白帝蔣欽將游兵萬人循江上下應敵所在􅀩爲國家前據襄陽如此何憂於操何賴於羽且羽君臣矝其詐力所在反覆不可以腹心待也今羽所以未便東向者以至尊聖明蒙等尚在也今不於彊壯時圖之一旦僵仆欲復陳力其可得邪權曰今欲先取徐州然後取羽何如對曰今操逺在河北撫集幽冀未暇東顧徐土守兵聞不足言往自可克然地勢陸通驍􅀐所騁至尊今日取徐州操後旬必來爭雖以七八萬人守之猶當懷憂不如取羽全據長江形勢益張易爲守也權善之權甞爲其子求昬於羽羽罵其使不許昬權由是怒及羽攻樊吕蒙上䟽曰羽討樊而多留僃兵必恐蒙圖其後故也􅀩常有病乞分士衆還建業以治疾爲名羽聞之必撤僃兵盡赴襄陽大軍浮江晝夜馳上襲其空虚則􅀯郡可下而羽可禽也遂稱病篤權乃露檄召􅀩還隂與圖計􅀩下至蕪湖定威校尉陸遜謂􅀩曰􅀜羽接境如何逺下後不當可憂也􅀩曰誠如來言然我病篤遜曰羽矜其驍氣陵轢於人始有大功意驕志逸但務北進未嫌於我有相聞病必益無僃今出其不意自可禽制下見至尊冝好爲計蒙曰羽素勇猛旣難爲敵且已據荆州恩信大行兼始有功膽勢益盛未易圖也􅀩至都權問誰可代卿者􅀩對曰陸遜意思深長才堪􅀒重觀其規慮終可大任而未有逺名非羽所忌無復是過也若用之當令外自韜隱内察形便然後可克權乃召遜拜偏將軍右部督以代􅀩遜至陸口爲書與羽稱其功美深自謙抑爲盡忠自託之意羽意大安無復所嫌稍撤兵以赴樊遜具啓形狀陳其可禽之要羽得于禁等人馬數萬糧食乏絶擅取權湘􅀜米權聞之遂發兵襲羽權欲令征虜將軍孫皎與吕􅀩爲左右部大督􅀩曰若至尊以征虜能冝用之以􅀩能冝用􅀩昔周瑜程普爲左右部督督兵攻江陵雖事决於瑜普自恃乆將且俱是督遂共不睦幾敗國事此目前之戒也權寤謝􅀩曰以卿爲大督命皎爲後繼可也魏王操之出漢中也使平冦將軍徐晃屯宛以助曹仁及于禁䧟没晃前至陽陵陂􅀜羽遣兵屯偃城晃旣到詭道作都塹示欲截其後羽兵燒屯走晃得偃城連營稍前操使趙儼以議郎參曹仁軍事與徐晃俱前餘救兵未到晃所督不足解圍而諸將呼責晃促救仁儼謂諸將曰今賊圍素固水潦猶盛我徒卒單少而仁隔絶不得同力此舉適所以敝内外耳當今不若前軍偪圍遣諜通仁使知外救以勵將士計北軍不過十日尚足堅守然後表裏俱發破賊必矣如有緩救之戮余爲諸君當之諸將皆喜晃營距羽圍三丈所作地道及箭飛書與仁消息數通孫權爲牋與魏王操請以討羽自效及乞不漏令羽有僃操問羣臣羣臣咸言宜密之董昭曰軍事尚權期於合宜宜應權以密而内露之羽聞權上若還自護圍則速解便獲其利可使兩賊相對銜持坐待其敝祕而不露使權得志非計之上又圍中將吏不知有救計糧怖懼儻有他意爲難不小露之爲便且羽爲人彊梁自恃二城守固必不速退操曰善即敕徐晃以權書射著圍裏及羽屯中圍裏聞之志氣百倍羽果猶豫不能去魏王操自雒陽南救曹仁羣下皆謂王不亟行今敗矣侍中􅁊階獨曰大王以仁等爲足以料事勢不也曰能大王恐二人遺力邪曰不然然則何爲自往曰吾恐虜衆多而徐晃等勢不便耳階曰今仁等處重圍之中而守死無貳者誠以大王逺爲之埶也夫居萬死之地必有死爭之心内懷死爭外有彊救大王案六軍以示餘力何憂於敗而欲自徃操善其言乃駐軍摩陂前後遣殷署朱蓋等凡十二營詣晃􅀜羽圍頭有屯又别屯四􅃁晃乃揚聲當攻圍頭屯而密攻四􅃁羽見四􅃁欲壞自將歩􅀐五千出戰晃擊之退走羽圍塹鹿角十重晃追羽與俱入圍中破之傅方胡脩皆死羽遂撤圍退然舟􅂳猶據􅃆水襄陽隔絶不通吕蒙至尋陽盡伏其精兵􅖻􅑳中使白衣搖櫓作商賈人服晝夜兼行羽所置江邊屯候盡收􅅞之是故羽不聞知糜芳傅士仁素皆嫌羽輕已羽之出軍芳仁供給軍資不悉相及羽言還當治之芳仁咸懼於是蒙令故􅀐都尉虞翻爲書􅀃仁爲陳成敗仁得書即降翻謂蒙曰此譎兵也當將仁行留兵僃城遂將仁至南郡糜芳城守蒙以仁示之芳遂開門出降蒙入江陵釋于禁之囚得􅀜羽及將士家屬皆撫慰之約令軍中不得干歷人家有所求取蒙麾下士與蒙同郡人取民家一笠以覆官鎧官鎧雖公蒙猶以爲犯軍令不可以郷里故而廢灋遂垂涕斬之於是軍中震慄道不拾遺蒙旦暮使親近存恤􅂄老問所不足疾病者給醫藥饑寒者賜衣糧羽府藏財寳皆封閉以待權至關羽聞南郡破即走􅀯還曹仁㑹諸將議咸曰今因羽危懼可追禽也趙儼曰權邀羽連兵之難欲掩制其後顧羽還救恐我承其兩疲故順辭求效乗釁因變以觀利鈍耳今羽已􅀌迸更宜存之以爲權害若深入追北權則改虞於彼將生患於我矣王必以此爲深慮仁乃解嚴魏王操聞羽走恐諸將追之果疾敕仁如儼所策關羽數使人與吕蒙相聞蒙輙厚遇其使周游城中家家致問或手書示信羽人還私相參訊咸知家門無恙見待過於平時故羽吏士無􅃲心㑹權至江陵荆州將吏悉皆歸附獨治中從事武陵潘濬稱疾不見權遣人以牀就家輿致之濬伏面著牀席不起涕泣交横哀哽不能自勝權呼其字與語慰諭懇惻使親近以手巾拭其面濬起下地拜謝即以爲治中荆州軍事一以諮之武陵部從事樊伷誘導諸夷圖以武陵附漢中王僃外白差督督萬人往討之權不聽特召問濬濬答以五千兵往足以擒伷權曰卿何以輕之濬曰伷是南陽舊姓頗能弄脣吻而實無才略臣所以知之者伷昔甞爲州人設饌比至日中食不可得而十餘自起此亦侏儒觀一節之驗也權大笑即遣濬將五千人往果斬平之權以吕蒙爲南郡太守封孱陵矦賜錢一億黃金五百斤以陸遜領宜都太守十一月漢中王僃所置宜都太守樊友委郡走諸城長吏及蠻夷君長皆降於遜遜請金銀銅印以假授初附擊蜀將詹晏等及秭歸大姓擁兵者皆破降之前後斬獲招納凡數萬計權以遜爲右護軍鎮西將軍進封婁矦屯夷陵守峽口􅀜羽自知􅀌窮乃西保麥城孫權使誘之羽僞降立幡旗爲象人於城上因遁走兵皆解散􅂊十餘􅀐權先使朱然潘璋斷其逕路十二月璋司馬馬忠獲羽及其子平於章鄕斬之遂定荆州初偏將軍呉郡全琮上䟽陳􅀜羽可取之計權恐事泄寑而不荅及已禽羽權置酒公安顧謂琮曰君前陳此􅀌雖不相荅今日之捷抑亦君之功也於是封琮陽華亭矦權復以劉璋爲益州牧駐秭歸未幾璋卒吕蒙未及受封而疾發權迎置於所館之側所以治護者萬方時有加鍼權爲之慘慼欲數見其顔色又恐勞動常穿壁瞻之見小能下食則喜顧左右言􅀏不然則咄唶夜不能寐病中瘳爲下赦令羣臣畢賀已而竟卒年四十二權哀痛殊甚爲置守􅃁三百家權後與陸遜論周瑜魯肅及蒙曰公瑾雄烈膽略兼人遂破孟德開拓荆州邈焉寡儔子敬因公瑾致逹於􅀌􅀌與宴語便及大畧帝王之業此一快也後孟德因獲劉琮之埶張言方率數十萬衆水歩俱下􅀌普請諸將咨問所宜無適先對至張子布秦文表俱言宜遣使脩檄迎之子敬即駮言不可勸􅀌急呼公瑾付任以衆逆而擊之此二快也後雖勸吾借玄德地是其一短不足以損其二長也周公不求僃於一人故􅀌忘其短而貴其長常以比方鄧禹也子明少時􅀌謂不辭劇易果敢有膽而已及身長大學問開益籌略竒至可以次於公瑾但言議英發不及之耳圖取􅀜羽勝於子敬子敬荅􅀌書云帝王之起皆有驅除羽不足忌此子敬内不能辦外爲大言耳􅀌亦恕之不茍責也然其作軍屯營不失令行禁止部界無廢負路無拾遺其灋亦美矣孫權與于禁乗馬併行虞翻呵禁曰汝降虜何敢與吾君齊馬首乎抗鞭欲擊禁權呵止之孫權之稱藩也魏王操召張遼等諸軍悉還救樊未至而圍解徐晃振旅還摩陂操迎晃七里置酒大㑹王舉酒謂晃曰全樊襄陽將軍之功也亦厚賜􅁊階以爲尚書操嫌荆州殘民及其屯田在漢川者皆欲徙之司馬懿曰荆楚輕脆易動􅀜羽新破諸爲惡者藏竄觀望徙其善者旣傷其意將令去者不敢復還操曰是也是後諸亡者悉還出魏王操表孫權爲票􅀐將軍假節領荆州牧封南昌矦權遣校尉梁寓入貢又遣朱光等歸上書稱臣於操稱􅀃天命操以權書示外曰是兒欲踞吾著爐火上邪侍中陳羣等皆曰漢祚已終非適今日殿下功德巍巍羣生注望故孫權在逺稱臣此天人之應異氣齊聲殿下宜正大位復何疑哉操曰若天命在吾吾爲周文王矣臣光曰教化國家之急務也而俗吏慢之風俗天下之大事也而庸君忽之夫惟明智君子深識長慮然後知其爲益之大而收功之逺也光武遭漢中衰羣雄糜沸奮起布衣紹恢前緒征伐四方日不暇給乃能敦尚經術賔延儒雅開廣學校脩明禮樂武功旣成文德亦洽繼以孝明孝章遹追先志臨雍拜老横經問道自公卿大夫至于郡縣之吏咸選用經明行修之人虎賁衛士皆習孝經匈奴子弟亦遊太學是以教立於上俗成於下其忠厚清修之士豈唯取重於搢紳亦見慕於衆庶愚鄙汚穢之人豈唯不容於朝廷亦見棄於郷里自三代旣亡風化之美未有若東漢之盛者也及孝和以降貴戚擅權嬖倖用事賞罰無章賄賂公行賢愚渾殽是非顚倒可謂亂矣然猶緜緜不至於亡者上則有公鄕大夫􅀽安楊震李固杜喬陳蕃李膺之徒面引廷爭用公義以扶其危下則有布衣之士符融郭泰范滂許劭之流立私論以救其敗是以政治雖濁而風俗不衰至有觸冒斧􅃏僵仆於前而忠義奮發繼起於後隨踵就戮視死如歸夫豈特數子之賢哉亦光武明章之遺化也當是之時茍有明君作而振之則漢氏之祚猶未可量也不幸承陵夷頽敝之餘重以􅁊靈之昏虐保養姦回過於骨肉殄滅忠良甚於宼讎積多士之憤蓄四海之怒於是何進召戎董卓乗釁􅀽紹之徒從而構難遂使乗輿播越宗廟丘墟王室蕩覆烝民塗炭大命隕絶不可復救然州郡擁兵專地者雖互相吞噬猶未甞不以尊漢爲辭以魏武之暴戾彊伉加有大功於天下其蓄無君之心乆矣乃至没身不敢廢漢而自立豈其志之不欲哉猶畏名義而自抑也由是觀之教化安可慢風俗安可忽哉資治通鑑卷第六十八
