front:
  text: 督曹仁張遼等二十六軍屯居巢權令都尉徐詳詣操請降操報使脩好誓重結㛰權留平虜將軍周泰督濡須朱然徐盛等皆在所部以泰寒門不服權㑹諸將大爲酣樂命泰解衣權手自指其創痕問以所起泰輙記昔戰􅃲處以對畢使復服權把其臂流涕曰幼平卿爲􅀌兄弟戰如熊虎不惜軀命被創數十膚如刻畫􅀌亦何心不待卿以骨肉之恩委卿以兵馬之重乎坐罷住駕使泰以兵馬道從嗚鼓角作鼔吹而出於是盛等乃服夏四月詔魏王操設天子旌旗出入稱警蹕六月魏以軍師華歆爲御史大夫冬十月命魏王操冕十有二旒乗金根車駕六馬設五時副車
  hash: sha256:07393d407ac38872515ee0ba9789b457c3b03379a346ad4fa668f35fa170651e
