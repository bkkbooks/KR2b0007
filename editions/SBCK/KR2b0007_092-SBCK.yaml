seq: 92
front:
  text: 將作亂謂鯤曰劉隗姦邪將危社稷吾欲除君側之惡何如鯤曰隗誠始禍然城狐社䑕敦怒曰君庸才豈達大體出為豫章太守又留不遣戊辰敦舉兵於武昌上䟽罪狀劉隗稱隗佞邪讒賊威福自由妄興事役勞擾士民賦役煩重怨聲盈路臣備位宰輔不可坐視成敗輒進軍致討隗首朝懸諸軍夕退昔太甲顛覆厥度幸納伊尹之忠殷道復昌願陛下深垂三思則四海乂安社稷永固矣沈充亦起兵於吳興以應敦敦以充為大都督督䕶東吴諸軍事敦至蕪湖又上表罪狀刁協帝大怒乙亥詔曰王敦憑恃寵靈敢肆狂逆方朕太甲欲見幽囚是可忍也孰不可忍今親帥六軍以誅大逆有殺敦者封五千戸矦敦兄光禄勲含乗輕舟逃歸于敦太子中庶子温嶠謂僕射周顗曰大將軍此舉似有所在當無濫邪顗曰不然人主自非堯舜何能無失人臣安可舉兵以脅之舉動如此豈得云非亂乎處仲狼抗無上其意寜有限邪敦初起兵遣使告梁州刺史甘卓約與之俱下卓許之及敦升舟而卓不赴使參軍孫雙詣武昌諫止敦敦驚曰甘矦前與吾語云何而更有異正當慮吾危朝廷耳吾今但除姦凶若事濟當以甘矦作公雙還報卓意狐疑或說卓且偽許敦待敦至都而討之卓曰昔陳敏之亂吾先從而後圖之論者謂吾懼逼而思變心常愧之今若復爾何以自明卓使人以敦㫖告順陽太守魏該該曰我所以起兵拒胡賊者正欲忠於王室耳今王公舉兵向天子非吾所宜與也遂絶之敦遣參軍􅁊羆說譙王氶請承為軍司氶歎曰吾其死矣地荒民寡勢孤援絶將何以濟然得死忠義夫復何求氶檄長沙虞悝為長史㑹悝遭母喪氶往弔之曰吾欲討王敦而兵少糧乏且新到恩信未洽卿兄弟湘中之豪俊王室方危金革之事古人所不辭將何以教之悝曰大王不以悝兄弟猥劣親屈臨之敢不致死然鄙州荒弊難以進討宜且收衆固守傳檄四方敦勢必分分而圖之庶幾可捷也氶乃囚􅁊羆以悝為長史以其弟望為司馬督䕶諸軍與零陵太守尹奉建昌太守長沙王循衡陽太守淮陵劉翼舂陵令長沙易雄同舉兵討敦雄移檄逺近列敦罪惡於是一州之内皆應氶惟湘東太守鄭澹不從氶使虞望討斬之以徇四境澹敦姊夫也氶遣主簿鄧騫至襄陽說甘卓曰劉大連雖驕蹇失衆心非有害於天下大將軍以其私憾稱兵向闕此忠臣義士竭節之時也公受任方伯奉辭伐罪乃􅁊文之功也卓曰􅁊文則非吾所能然志在徇國當共詳思之參軍李梁說卓曰昔隗嚻䟦扈竇融保河西以奉光武卒受其福今將軍有重望於天下但當案兵坐以待之使大將軍事㨗當委將軍以方面不捷朝廷必以將軍代之何憂不富貴而釋此廟勝决存亡於一戰邪騫謂梁曰光武當創業之初故隗竇可以文服從容顧望今將軍之於本朝非竇融之比也襄陽之於太府非河西之固也使大將軍克劉隗還武昌增石城之戍絶荆湘之粟將軍欲安歸乎勢在人手而曰我處廟勝未之聞也且為人臣國家有難坐視不救於義安乎卓尚疑之騫曰今既不為義舉又不承大將軍檄此必至之禍愚智所見也且議者之所難以彼彊而我弱也今大將軍兵不過萬餘其留者不能五千而將軍見衆既倍之矣以將軍之威名帥此府之精銳杖節鳴鼓以順討逆豈王含所能禦哉遡流之衆勢不自救將軍之舉武昌若摧枯拉朽尚何顧慮邪武昌既定據其軍實鎮撫二州以恩意招懷士卒使還者如歸此吕䝉所以克關羽也今釋必勝之䇿安坐以待危亡不可以言智矣敦恐卓於後為變又遣參軍丹楊樂道融往邀之必欲與之俱東道融雖事敦而忿其悖逆乃說卓曰主上親臨萬機自用譙王為湘州非專任劉隗也而王氏擅權日久卒見分政便謂失職背恩肆逆舉兵向闕國家遇君至厚今與之同豈不違負大義生為逆臣死為愚鬼永為宗黨之恥不亦惜乎為君之計莫若偽許應命而馳襲武昌大將軍士衆聞之必不戰自潰大勲可就矣卓雅不欲從敦聞道融之言遂决曰吾本意也乃與巴東監軍栁純南平太守夏矦承宜都太守譚該等露檄數敦逆狀帥所統致討遣參軍司馬讃孫雙奉表詣臺羅英至廣州約陶侃同進戴淵在江西先得卓書表上之臺内皆稱萬嵗陶侃得卓信即遣參軍髙寶帥兵北下武昌城中傳卓軍至人皆奔散敦遣從母弟南蠻校尉魏乂將軍李􅁪帥甲卒二萬攻長沙長沙城池不完資儲又闕人情震恐或說譙王氶南投陶侃或退據零桂氶曰吾之起兵志欲死於忠義豈可貪生苟免為奔敗之將乎事之不濟令百姓知吾心耳乃嬰城固守未幾虞望戰死甘卓欲留鄧騫為參軍騫不可卓乃遣參軍虞冲與騫偕至長沙遺譙王氶書勸之固守當以兵出沔口斷敦歸路則湘圍自解氶復書稱江左中興草創始爾豈圖惡逆萌自寵臣吾以宗室受任志在隕命而至止尚淺凡百茫然足下能卷甲電赴猶有所及若其狐疑則求我於枯魚之肆矣卓不能從二月甲午封皇子昱為琅邪王後趙王勒立子弘為世子遣中山公虎將精卒四萬擊徐龕龕堅守不戰虎築長圍守之
