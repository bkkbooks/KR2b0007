body:
  text: 趙王曜自將擊楊難敵難敵逆戰不勝退保仇池仇池諸氐羌及故晉王保將楊韜隴西太守梁勛皆降於曜曜遷隴西萬餘戸於長安進攻仇池㑹軍中大疫曜亦得疾將引兵還恐難敵躡其後乃遣光國中郎將王獷說難敵諭以禍福難敵遣使稱藩曜以難敵為假黄鉞都督益寜南秦凉梁巴六州隴上西域諸軍事上大將軍益寜南秦三州牧武都王秦州刺史陳安求朝於曜曜辭以疾安怒以為曜已卒大掠而歸曜疾甚乗馬輿而還使其將呼延寔監輜重於後安邀擊獲之謂寔曰劉曜已死子尚誰佐吾當與子共定大業寔叱之曰汝受人寵禄而叛之自視智能何如主上吾見汝不日梟首於上邽市何謂大業宜速殺我安怒殺之以寔長史魯慿為參軍安遣其弟集帥騎三萬追曜衛將軍呼延瑜逆擊斬之安乃還上邽遣將襲汧城㧞之隴上氐􅆧皆附於安有衆十餘萬自稱大都督假黄鉞大將軍雍凉秦梁四州牧凉王以趙募為相國魯慿對安大哭曰吾不忍見陳安之死也安怒命斬之慿曰死自吾分懸吾頭於上邽市觀趙之斬陳安也遂殺之曜聞之慟哭曰賢人民之望也陳安於求賢之秋而多殺賢者吾知其無所為也休屠王石武以桑城降趙趙以武為秦州刺史封酒泉王帝徴戴淵劉隗入衛建康隗至百官迎于道隗岸幘大言意氣自若及入見與刁協勸帝盡誅王氏帝不許隗始有懼色司空導帥其從弟中領軍邃左衛將軍廙侍中侃彬及諸宗族二十餘人每旦詣臺待罪周顗將入導呼之曰伯仁以百口累卿顗直入不顧既見帝言導忠誠申救甚至帝納其言顗喜飲酒至醉而出導猶在門又呼之顗不與言顧左右曰今年殺諸賊奴取金印如斗大繫肘後既出又上表明導無罪言甚切至導不之知甚恨之帝命還導朝服召見之導稽首曰逆臣賊子何代無之不意今者近出臣族帝跣而執其手曰茂弘方寄卿以百里之命是何言邪三月以導為前鋒大都督加戴淵驃騎將軍詔曰導以大義滅親可以吾為安東時節假之以周顗為尚書左僕射王邃為右僕射帝遣王廙往諭止敦敦不從而留之廙更為敦用征虜將軍周札素矜險好利帝以為右將軍都督石頭諸軍事敦將至帝使劉隗軍金城札守石頭帝親被甲徇師於郊外以甘卓為鎮南大將軍侍中都督荆梁二州諸軍事陶侃領江州刺史使各帥所統以躡敦後敦至石頭欲攻劉隗杜弘言於敦曰劉隗死士衆多未易可克不如攻石頭周札少恩兵不為用攻之必敗札敗則隗自走矣敦從之以􅀪為前鋒攻石頭札果開門納􅀪敦據石頭歎曰吾不復得為盛德事矣謝鯤曰何為其然也但使自今已往日忘日去耳帝命刁協劉隗戴淵帥衆攻石頭王導周顗郭逸虞潭等三道出戰恊等兵皆大敗太子紹聞之欲自帥將士決戰升車將出中庶子温嶠執鞚諌曰殿下國之儲副奈何以身輕天下抽劒斬鞅乃止敦擁兵不朝放士卒劫掠宫省奔散惟安東將軍劉超案兵直衞及侍中二人侍帝側帝脫戎衣著朝服顧而言曰欲得我處當早言何至害民如此又遣使謂敦曰公若不忘本朝於此息兵則天下尚可共安如其不然朕當歸琅邪以避賢路刁協劉隗既敗俱入宫見帝於太極東除帝執協隗手流涕嗚咽勸令避禍協曰臣當守死不敢有貳帝曰今事逼矣安可不行乃令給協隗人馬使自為計協老不堪騎乗素無恩紀募從者皆委之行至江乗為人所殺送首於敦隗奔後趙官至太子太傅而卒帝令公卿百官詣石頭見敦敦謂戴淵曰前日之戰有餘力乎淵曰豈敢有餘但力不足耳敦曰吾今此舉天下以為何如淵曰見形者謂之逆體誠者謂之忠敦笑曰卿可謂能言又謂周顗曰伯仁卿負我顗曰公戎車犯順下官親帥六軍不能其事使王旅奔敗以此負公辛未大赦以敦為丞相都督中外諸軍録尚書事江州牧封武昌郡公並讓不受初西都覆没四方皆勸進於帝敦欲專國政忌帝年長難制欲更議所立王導不從及敦克建康謂導曰不用吾言幾至覆族敦以太子有勇略為朝野所嚮欲誣以不孝而廢之大㑹百官問温嶠曰皇太子以何德稱聲色俱厲嶠曰鉤深致逺蓋非淺局所量以禮觀之可謂孝矣衆皆以為信然敦謀遂沮帝召周顗於廣室謂之曰近日大事二宫無恙諸人平安大將軍固副所望邪顗曰二宫自如明詔臣等尚未可知䕶軍長史郝嘏等勸顗避敦顗曰吾備位大臣朝廷喪敗寜可復草間求活外投胡越邪敦參軍吕猗嘗為臺郎性姦謟戴淵為尚書惡之猗說敦曰周顗戴淵皆有髙名足以惑衆近者之言曾無怍色公不除之恐必有再舉之憂敦素忌二人之才心頗然之從容問王導曰周戴南北之望當登三司無疑也導不答又曰若不三司止應令僕邪又不答敦曰若不爾正當誅爾又不答丙子敦遣部將陳郡鄧岳収顗及淵先是敦謂謝鯤曰吾當以周伯仁為尚書令戴若思為僕射是日又問鯤近來人情何如鯤曰明公之舉雖欲大存社稷然悠悠之言實未逹髙義若果能舉用周戴則羣情帖然矣敦怒曰君麤踈邪二子不相當吾已収之矣鯤愕然自失參軍王嶠曰濟濟多士文王以寜奈何戮諸名士敦大怒欲斬嶠衆莫敢言鯤曰明公舉大事不戮一人嶠以獻替忤㫖便以釁鼓不亦過乎敦乃釋之黜為領軍長史嶠渾之族孫也顗被收路經太廟大言曰賊臣王敦傾覆社稷枉殺忠臣神祇有靈當速殺之收人以㦸傷其口血流至踵容止自若觀者皆為流涕并戴淵殺之於石頭南門之外帝使侍中王彬勞敦彬素與顗善先往哭顗然後見敦敦怪其容慘問之彬曰向哭伯仁情不能已敦怒曰伯仁自致刑戮且凡人遇汝汝何哀而哭之彬曰伯仁長者兄之親友在朝雖無謇愕亦非阿黨而赦後加之極刑所以傷惋也因勃然數敦曰兄抗旌犯順殺戮忠良圖為不軌禍及門戸矣辭氣慷慨聲淚俱下敦大怒厲聲曰爾狂悖乃至此以吾爲不能殺汝邪時王導在坐爲之懼勸彬起謝彬曰脚痛不能拜且此復何謝敦曰脚痛孰若頸痛彬殊無懼容竟不肯拜王導後料檢中書故事乃見顗救已之表執之流涕曰吾雖不殺伯仁伯仁由我而死幽㝠之中負此良友沈充抜吳國殺内史張茂初王敦聞甘卓起兵大懼卓兄子卬爲敦參軍敦使卬歸說卓曰君此自是臣節不相責也吾家計急不得不爾想便旋軍襄陽當更結好卓雖慕忠義性多疑少决軍于豬口欲待諸方同出軍稽留累旬不前敦既得建康乃遣臺使以騶虞幡駐卓軍卓聞周顗戴淵死流涕謂卭曰吾之所憂正爲今日且使聖上元吉太子無恙吾臨敦上流亦未敢遽危社稷適吾徑據武昌敦勢逼必劫天子以絶四海之望不如還襄陽更思後圖即命旋軍都尉秦康與樂道融說卓曰今分兵斷彭澤使敦上下不得相赴其衆自然離散可一戰擒也將軍起義兵而中止竊為將軍不取且將軍之下士卒各求其利欲求西還亦恐不可得也卓不從道融晝夜泣諫卓不聽道融憂憤而卒卓性本寛和忽更彊塞徑還襄陽意氣騷擾舉動失常識者知其將死矣王敦以西陽王羕為太宰加王導尚書令王廙為荆州刺史改易百官及諸軍鎮轉徙黜免者以百數或朝行暮改惟意所欲敦將還武昌謝鯤言於敦曰公至都以來稱疾不朝是以雖建勲而人心實有未逹今若朝天子使君臣釋然則物情皆恱服矣敦曰君能保無變乎對曰鯤近日入覲主上側席遲得見公宫省穆然必無虞也公若入朝鯤請侍從敦勃然曰正復殺君等數百人亦復何損於時竟不朝而去夏四月敦還武昌初宜都内史天門周級聞譙王承起兵使其兄子該潜詣長沙申􅅃於承魏乂等攻湘州急承遣該及從事邵陵周﨑間出求救皆為邏者所得又使﨑語城中稱大將軍已克建康甘卓還襄陽外援理絕﨑偽許之既至城下大呼曰援兵尋至努力堅守乂殺之乂考該至死竟不言其故周級由是獲免乂等攻戰日逼敦又送所得臺中人書䟽令乂射以示承城中知朝廷不守莫不悵惋相持且百日劉翼戰死士卒死傷相枕癸巳乂㧞長沙氶等皆被執乂將殺虞悝子弟對之號泣悝曰人生㑹當有死今闔門為忠義之鬼亦復何恨乂以檻車載氶及易雄送武昌佐吏皆奔散惟主簿桓雄西曹書佐韓階從事武延毁服為僮從氶不離左右乂見桓雄姿貌舉止非凡人憚而殺之韓階武延執志愈固荆州刺史王廙承敦㫖殺氶於道中階延送氶喪至都葬之而去易雄至武昌意氣忼慨曽無懼容敦遣人以檄示雄而數之雄曰此實有之惜雄位微力弱不能救國難耳今日之死固所願也敦憚其辭正釋之遣就舍衆人皆賀之雄笑曰吾安得生既而敦遣人潛殺之魏乂求鄧騫甚急鄉人皆爲之懼騫笑曰此欲用我耳彼新得州多殺忠良故求我以厭人望也乃往詣乂乂喜曰君古之解揚也以爲别駕詔以陶侃領湘州刺史王敦上侃復還廣州加散騎常侍甲午前趙羊后卒謚曰獻文甘卓家人皆勸卓備王敦卓不從悉散兵佃作聞諌輒怒襄陽太守周慮密承敦意詐言湖中多魚勸卓遣左右悉出捕魚五月乙亥慮引兵襲卓於寢室殺之傳首於敦并殺其諸子敦以從事中郎周撫督沔北諸軍事代卓鎮沔中撫訪之子也敦既得志暴慢滋甚四方貢獻多入其府將相岳牧皆出其門以沈充錢鳳爲謀主唯二人之言是從所譖無不死者以諸葛瑶鄧岳周撫李􅁪謝雍為爪牙充等並凶險驕恣大起營府侵人田宅剽掠市道識者咸知其將敗焉秋七月後趙中山公虎㧞泰山執徐龕送襄國後趙王勒盛之以囊於百尺樓上撲殺之命王伏都等妻子刳而食之阬其降卒三千人兖州刺史郄鑒在鄒山三年有衆數萬戰爭不息百姓饑饉掘野䑕蟄鷰而食之為後趙所逼退屯合肥尚書右僕射紀瞻以鑒雅望清德宜從容臺閣上䟽請徴之乃徴拜尚書徐兖間諸塢多降於後趙後趙置守宰以撫之王敦自領寜益二州都督冬十月己丑荆州刺史武陵康矦王廙卒王敦以下邳内史王邃都督青徐幽平四州諸軍事鎮淮隂衛將軍王含都督沔南諸軍事領荆州刺史武昌太守丹楊王諒為交州刺史使諒收交州刺史脩湛新昌太守梁碩殺之諒誘湛斬之碩舉兵圍諒於龍編祖逖既卒後趙屢冦河南㧞襄城城父圍譙豫州刺史祖約不能禦退屯夀春後趙遂取陳留梁鄭之間復騷然矣十一月以臨潁元公荀組為太尉辛酉薨罷司徒并丞相府王敦以司徒官屬為留府帝憂憤成疾閏月己丑崩司空王導受遺詔輔政帝恭儉有餘而明斷不足故大業未復而禍亂内興庚寅太子即皇帝位大赦尊所生母荀氏為建安君十二月趙主曜葬其父母於粟邑大赦陵下周二里上髙百尺計用六萬夫作之百日乃成役者夜作繼以脂燭民甚苦之游子逺諫不聽後趙濮陽景矦張賔卒後趙王勒哭之慟曰天不欲成吾事邪何奪吾右矦之早也程遐代為右長史遐世子弘之舅也勒每與遐議有所不合輒歎曰右矦捨我去乃令我與此輩共事豈非酷乎因流涕彌日張茂使將軍韓璞帥衆取隴西南安之地置秦州慕容廆遣其世子皝襲叚末柸入令支掠其居民千餘家而還肅宗明皇帝上大寜元年春正月成李驤仕回冦臺登將軍司馬玫戰死越嶲太守李釗漢嘉太守王載皆以郡降于成二月庚戍葬元帝于建平陵三月戊寅朔改元饒安東光安陵三縣災燒七千餘家死者萬五千人後趙冦彭城下邳徐州刺史卞敦與征北將軍王邃退保盱眙敦壼之從父兄也王敦謀簒位諷朝廷徴已帝手詔徴之夏四月加敦黄鉞班劒奏事不名入朝不趨劒履上殿敦移鎮姑孰屯于湖以司空導為司徒敦自領揚州牧敦欲為逆王彬諌之甚苦敦變色目左右將收之彬正色曰君昔嵗殺兄今又殺弟邪敦乃止以彬爲豫章太守後趙王勒遣使結好於慕容廆廆執送建康成李驤等進攻寜州刺史褒中壯公王遜使將軍姚嶽等拒之戰於螗蜋成兵大敗嶽追至瀘水成兵爭濟溺死者千餘人嶽以道逺不敢濟而還遜以嶽不窮追大怒鞭之怒甚冠裂而卒遜在州十四年威行殊俗州人立其子堅行州府事詔除堅寜州刺史廣州刺史陶侃遣兵救交州未至梁碩抜龍編奪刺史王諒節諒不與碩斷其右臂諒曰死且不避斷臂何為踰旬而卒六月壬子立妃庾氏為皇后以后兄中領軍亮為中書監梁碩據交州凶暴失衆心陶侃遣參軍髙寶攻碩斬之詔以侃領交州刺史進號征南大將軍開府儀同三司未幾吏部郎阮放求為交州刺史許之放行至寜浦遇髙寶為寶設饌伏兵殺之寶兵擊放放走得免至州少時病卒放咸之族子也陳安圍趙征西將軍劉貢于南安休屠王石武自桑城引兵趣上邽以救之與貢合擊安大破之安收餘騎八千走保隴城秋七月趙主曜自將圍隴城别遣兵圍上邽安頻出戰輒敗右軍將軍劉幹攻平襄克之隴上諸縣悉降安留其將楊伯支姜冲兒守隴城自帥精騎突圍出奔陜中曜遣將軍平先等追之安左揮七尺大刀右運丈八虵矛近則刀矛俱發輒殪五六人逺則左右馳射而走先亦勇捷如飛與安摶戰三交遂奪其虵矛㑹日暮雨甚安棄馬與左右匿於山中趙兵索之不知所在明日安遣其將石容覘趙兵趙輔威將軍呼延青人獲之拷問安所在容卒不肯言青人殺之雨霽青人尋其迹獲安於澗曲斬之安善撫將士與同甘苦及死隴上人思之為作壯士之歌楊伯支斬姜沖兒以隴城降别將宋亭斬趙募以上邽降曜徙秦州大姓楊姜諸族二千餘戸于長安氐羗皆送任請降以赤亭羗酋姚弋仲為平西將軍封平襄公帝畏王敦之逼欲以郗鑒為外援拜鑒兖州刺史都督揚州江西諸軍事鎮合肥王敦忌之表鑒為尚書令八月詔徴鑒還道經姑孰敦與之論西朝人士曰樂彦輔短才耳考其實豈勝滿武秋邪鑒曰彦輔道韻平淡愍懷之廢柔而能正武秋失節之士安得擬之敦曰當是時危機交急鑒曰丈夫當死生以之敦惡其言不復相見久留不遣敦黨皆勸敦殺之敦不從鑒還臺遂與帝謀討敦後趙中山公虎帥歩騎四萬擊安東將軍曹嶷青州郡縣多降之遂圍廣固嶷出降送襄國殺之阬其衆二萬虎欲盡殺嶷衆青州刺史劉徴曰今留徴使牧民也無民焉牧徴將歸耳虎乃留男女七百口配徴使鎮廣固趙主曜自隴上西擊凉州遣其將劉咸攻韓璞於冀城呼延晏攻寜羗䕶軍隂鑒於桑壁曜自將戎卒二十八萬軍于河上列營百餘里金鼓之聲動地河水爲沸張茂臨河諸戍皆望風奔潰曜揚聲欲百道俱濟直抵姑臧涼州大震參軍馬岌勸茂親出拒戰長史汜褘怒請斬之岌曰汜公糟粕書生刺舉小才不思家國大計明公父子欲爲朝廷誅劉曜有年矣今曜自至逺近之情共觀明公此舉當立信勇之驗以副秦隴之望力雖不敵勢不可以不出茂曰善乃出屯石頭茂謂參軍陳珍曰劉曜舉三秦之衆乘勝席卷而來將若之何珍曰曜兵雖多精卒至少大抵皆氐􅆧烏合之衆恩信未洽且有山東之虞安能捨其腹心之疾曠日持久與我爭河西之地邪若二旬不退珍請得弊卒數千為明公擒之茂喜使珍將兵救韓璞趙諸將爭欲濟河趙主曜曰吾軍勢雖盛然畏威而來者三分有二中軍疲困其實難用今但案甲勿動以吾威聲震之若岀中旬張茂之表不至者吾為負卿矣茂尋遣使稱藩獻馬牛羊珍寶不可勝紀曜拜茂侍中都督凉南北秦梁益巴漢隴右西域雜夷匈奴諸軍事太師涼州牧封凉王加九錫楊難敵聞陳安死大懼與弟堅頭南奔漢中趙鎮西將軍劉厚追撃之大獲而還趙主曜以大鴻臚田崧為鎮南大將軍益州刺史鎮仇池難敵送任請降於成成安北將軍李稚受難敵賂不送難敵於成都趙兵退即遣還武都難敵遂據險不服稚自悔失計亟請討之雄遣稚兄侍中中領軍琀與稚出白水征東將軍李夀及琀弟玝出隂平以撃難敵羣臣諌不聽難敵遣兵拒之夀玝不得進而琀稚長驅至下辨難敵遣兵斷其歸路四面攻之琀稚深入無繼皆為難敵所殺死者數千人琀蕩之長子有才望雄欲以為嗣聞其死不食者數日初趙主曜長子儉次子􅅌􅅌年十嵗長七尺五寸漢主聦竒之謂曜曰此兒神氣非義真之比也當以為嗣曜曰藩國之嗣能守祭祀足矣不敢亂長㓜之序聦曰卿之勲徳當世受専征之任非它臣之比也吾當更以一國封義真乃封儉為臨海王立胤為世子既長多力善射驍捷如風靳凖之亂没於黒匿郁鞠部陳安既敗胤自言於郁鞠郁鞠大驚禮而歸之曜悲喜謂羣臣曰義光雖已為太子然冲㓜儒謹恐不堪今之多難義孫故世子也材器過人且涉歷艱難吾欲法周文王漢光武以固社稷而安義光何如太傅呼延晏等皆曰陛下為國家無窮之計豈惟臣等頼之實宗廟四海之慶左光禄大夫卜泰太子太保韓廣進曰陛下以廢立為是不應更問羣臣若以為疑固樂聞異同之言臣竊以為廢太子非也昔文王定嗣於未立之前則可也光武以母失恩而廢其子豈足為聖朝之法曏以東海為嗣未必不如明帝也胤文武才略誠髙絶於世然太子孝友仁慈亦足為承平賢主况東宫者民神所繫豈可輕動陛下誠欲如是臣等有死而已不敢奉詔曜黙然􅅌進曰父之於子當愛之如一今黜熈而立臣臣何敢自安陛下茍以臣為頗堪驅䇿豈不能輔熈以承聖業乎必若以臣代熈臣請効死於此不敢聞命因歔欷流涕曜亦以熈羊后所生不忍廢也乃追謚前妃卜氏為元悼皇后泰即胤之舅也曜嘉其公忠以為上光禄大夫儀同三司領太子太傅封胤為永安王拜侍中衛大將軍都督二宫禁衞諸軍事開府儀同三司録尚書事命熈於胤盡家人之禮張茂大城姑臧脩靈鈞臺别駕吳紹諌曰明公所以脩城築臺者蓋懲既往之患耳愚以為茍恩未洽於人心雖處層臺亦無所益適足以疑羣下忠信之志失士民繫託之望示怯弱之形啓鄰敵之謀將何以佐天子霸諸矦乎願亟罷兹役以息勞費茂曰亡兄一旦失身於物豈無忠臣義士欲盡節者哉顧禍生不意雖有智勇無所施耳王公設險勇夫重閉古之道也今國家未靖不可以太平之理責人於屯邅之世也卒為之王敦從子允之方緫角敦愛其聦警常以自隨敦常夜飲允之辭醉先卧敦與錢鳳謀為逆允之悉聞其言即於卧處大吐衣面並污鳳出敦果照視見允之卧於吐中不復疑之㑹其父舒拜廷尉允之求歸省父悉以敦鳳之謀白舒舒與王導俱啓帝隂為之備敦欲彊其宗族陵弱帝室冬十一月徙王含為征東將軍都督揚州江西諸軍事王舒為荆州刺史監荆州沔南諸軍事王彬為江州刺史後趙王勒以參軍樊坦為章武内史勒見其衣冠弊壞問之坦率然對曰頃為羯賊所掠資財蕩盡勒笑曰羯賊乃爾無道邪今當相償坦大懼叩頭泣謝勒賜車馬衣服裝錢三百萬而遣之是嵗越嶲斯叟攻成將任回成主雄遣征南將軍費黒討之㑹稽内史周札一門五矦宗族強盛吳士莫與為比王敦忌之敦有疾錢鳳勸敦早除周氏敦然之周嵩以兄顗之死心常憤憤敦無子養王含子應為嗣嵩甞於衆中言應不宜統兵敦惡之嵩與札兄子筵皆為敦從事中郎㑹道士李脫以妖術惑衆士民頗信事之資治通鑑卷第九十二
