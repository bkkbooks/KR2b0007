front:
  text: 資治通鑑卷第一百七十九
  hash: sha256:761fe4a18bdca8f05aac19ec368bbff305daceb54773b61fc2b8bf33e4c8cbf3
body:
  text: 臣司馬光奉勑編集隋紀三陽大淵獻凡四年起上章涒灘盡昭髙祖文皇帝中開皇二十年春二月熙州人李英林反三月辛卯以楊州揔管司馬河内張衡爲行軍揔管帥歩騎五萬討平之賀􅀂弼復坐事下獄上數之曰公有三太猛嫉妬心太猛自是非人心太猛無上心太猛既而釋之佗日上謂侍臣曰弼將伐陳謂髙熲曰陳叔寶可平也不作髙鳥盡良弓藏邪熲云必不然及平陳遽索内史又索僕射我語熲曰功臣正宜授勲官不可預朝政弼後語熲皇太子於已出口入耳無所不盡公終久何必不得弼力何脉脉邪意圖鎭廣陵又圖荆州皆作亂之地意終不改也夏四月壬戌突厥逹頭可汗犯塞詔命晉王廣楊素出靈武道漢王諒史萬歳出馬邑道以擊之長孫晟帥降人爲秦州行軍揔管受晉王節度晟以突厥飲泉易可行毒因取諸藥毒水上流突厥人畜飲之多死於是大驚曰天雨惡水其亡我乎因夜遁晟追之斬首千餘級史萬歳出塞至大斤山與虜相遇逹頭遣使問隋將爲誰候􅀐報史萬歳也突厥復問得非敦煌戍卒乎候騎曰是也逹頭懼而引去萬歳馳追百餘里縱擊大破之斬數千級逐北入磧數百里虜逺遁而還詔遣長孫晟復還大利城安撫新附逹頭復遣其弟子俟利伐從磧東攻啓民上又發兵助啓民守要路俟利伐退走入磧啓民上表陳謝曰大隋聖人可汗憐養百姓如天無不覆地無不載染干如枯木更葉枯骨更肉千丗萬丗常爲大隋典羊馬也帝又遣趙仲卿爲啓民築金河定襄二城秦孝王俊久疾未能起遣使奉表陳謝上謂其使者曰我戮力創茲大業作訓垂範庶臣下守之汝爲吾子而欲敗之不知何以責汝俊慙怖疾遂篤乃復拜俊上柱國六月丁丑俊薨上哭之數聲而已俊所爲侈麗之物悉命焚之王府僚佐請立碑上曰欲求名一卷史書足矣何用碑爲􅀂子孫不能保家徒與人作鎮石耳俊子浩崔妃所生也庶子曰湛羣臣希旨奏稱漢之栗姬子榮郭后子彊皆隨母廢今秦王二子母皆有罪不合承嗣上從之以秦國官爲喪主􅀄上使太子勇參決軍國政事時有損益上皆納之勇性寛厚率意任情無矯飾之行上性節儉勇嘗文飾蜀鎧上見而不恱戒之曰自古帝王未有好奢侈而能久長者汝爲儲后當以儉約爲先乃能奉承宗廟吾昔日衣服各留一物時復觀之以自警戒恐汝以今日皇太子之心忘昔時之事故賜汝以我舊所帶刀子一枚并葅醬一合汝昔作上士時常所食也􅀂存記前事應知我心後遇冬至百官皆詣勇勇張樂受賀上知之問朝臣曰近聞至日内外百官相帥朝東宫此何禮也太常少卿辛亶對曰於東宫乃賀也不得言朝上曰賀者正可三數十人隨情各去何乃有司徴召一時普集太子法服設樂以待之可乎因下詔曰禮有等差君臣不雜皇太子雖居上嗣義兼臣子而諸方岳牧正冬朝賀任土作貢别上東宫事非典則宜悉停斷自是恩寵始衰漸生猜阻勇多内寵昭訓雲氏尤幸其妃元氏無寵遇心疾二日而薨獨􅀌后意有佗故甚責望勇自是雲昭訓専内政生長寜王儼平原王􅁉安成王筠髙良娣生安平王嶷襄城王恪王良媛生髙陽王該建安王韶成姬生潁川王煚後宫生孝實孝範后彌不平頗遣人伺察求勇過惡晉王廣知之彌自矯飾唯與蕭妃居處後庭有子皆不育后由是數稱廣賢大臣用事者廣皆傾心與交上及后每遣左右至廣所無貴賤廣必與蕭妃迎門接引爲設羙饌申以厚禮婢僕往來者無不稱其仁孝上與后甞幸其第廣悉屏匿羙姬於别室唯留老醜者衣以縵綵給事左右屏帳改用縑素故絶樂器之絃不令拂去塵埃上見之以爲不好聲色還宫以語侍臣意甚喜侍臣皆稱慶由是愛之特異諸子上宻令善相者來和徧視諸子對曰晉王眉上雙骨隆起貴不可言上又問上儀同三司韋鼎我諸兒誰得嗣位對曰至尊皇后所最愛者當與之非臣敢預知也上笑曰卿不肯顯言邪晉王廣羙姿儀性敏慧沈深嚴重好學善屬文敬接朝士禮極卑屈由是聲名籍甚冠於諸王廣爲楊州揔管入朝將還鎮入宫辭后伏地流涕后亦泫然泣下廣曰臣性識愚下常守平生昆弟之意不知何罪失愛東宫􅁪蓄盛怒欲加屠陷每恐讒譛生於投杼鴆毒遇於杯勺是用勤憂積念懼履危亡后忿然曰睍地伐漸不可耐我爲之娶元氏女竟不以夫婦禮待之専寵阿雲使有如許豚犬前新婦遇毒而夭我亦不能窮治何故復於汝發如此意我在尚爾我死後當魚肉汝乎每思東宫竟無正嫡至尊千秋萬歳之後遣汝等兄弟向阿雲兒前再拜問訊此是幾許苦痛邪廣又拜嗚咽不能止后亦悲不自勝自是后決意欲廢勇立廣矣廣與安州揔管宇文述素善欲述近已奏爲夀州刺史廣尤親任揔管司馬張衡衡爲廣畫奪宗之策廣問計於述述曰皇太子失愛已久令德不聞於天下大王仁孝著稱才能蓋丗數經將領頻有大功主上之與内宫咸所鍾愛四海之望實歸大王然廢立者國家大事處人父子骨肉之間誠未易謀也然能移主上意者唯揚素耳素所與謀者唯其弟約述雅知約請朝京師與約相見共圖之廣大恱多齎金寶資述入關約時爲大理少卿素凡有所爲皆先籌於約而行之述請約盛陳噐玩與之酣暢因而共愽每陽不勝所齎金寶盡輸之約所得既多稍以謝述述因曰此晉王之賜令述與公爲歡樂耳約大驚曰何爲爾述因通廣意說之曰夫守正履道固人臣之常致反經合義亦逹者之令圖自古賢人君子莫不與時消息以避禍患公之兄弟功名蓋丗當塗用事有年矣朝臣爲足下家所屈辱者可勝數哉又儲后以所欲不行每切齒於執政公雖自結於人主而欲危公者固亦多矣主上一旦弃羣臣公亦何以取庇今皇太子失愛於皇后主上素有廢黜之心此公所知也今􅀂請立晉王在賢兄之口耳誠能因此時建大功王必永銘骨髓斯則去累夘之危成太山之安也約然之因以白素素聞之大喜撫掌曰吾之智思殊不及此頼汝起予約知其計行復謂素曰今皇后之言上無不用冝因機會早自結託則長保榮祿傳祚子孫兄若遲疑一旦有變令太子用事恐禍至無日矣素從之後數日素入侍宴微稱晉王孝悌恭儉有類至尊用此揣后意后泣曰公言是也吾兒大孝愛每聞至尊及我遣内使到必迎於境首言及違離未嘗不泣又其新婦亦大可憐我使婢去常與之同寢共食豈若晛地伐與阿雲對坐終日酣宴昵近小人疑阻骨肉我所以益憐阿􅐣者常恐其潛殺之素既知后意因盛言太子不才后遂遺素金使賛上廢立勇頗知其謀憂懼計無所出使新豐人王輔賢造諸猒勝又於後園作庶人村室屋卑陋勇時於中寢息布衣草褥兾以當之上知勇不自安在仁夀宫使楊素觀勇所爲素至東宫偃息未入勇束帶待之素故久不進以激怒勇勇銜之形於言色素還言勇怨望恐有佗變願深防察上聞素譖毁甚疑之后又遣人伺覘東宫纎介事皆聞奏因加誣飾以成其罪上遂踈忌勇廼於玄武門逹至徳門量置候人以伺動静皆隨事奏聞又東宫宿衛之人侍官以上名籍悉令屬諸衛府有勇健者咸屏去之出左衛率蘇孝慈爲淅州刺史勇愈不恱太史令袁充言於上曰臣觀天文皇太子當廢上曰玄象久見羣臣不敢言耳充君正之子也􅀳王廣又令督王府軍事姑臧段逹私賂東宫幸臣姬威令伺太子動靜密告楊素於是内外諠謗過失日聞段逹因脅姬威曰東宫過失主上皆知之矣已奉宻詔定當廢立君能告之則大富貴威許諾即上書告之秋九月壬子上至自仁夀宫翌日御大興殿謂侍臣曰我新還京師應開懷歡樂不知何意飜邑然愁苦吏部尚書牛􅀪對曰臣等不稱職故至尊憂勞上既數聞譖毁疑朝臣悉知之故於衆中發問兾聞太子之過􅀪對既失旨上因作色謂東宫官屬曰仁夀宫此去不逺而令我每還京師嚴備仗衞如入敵國我爲下痢不解衣臥昨夜欲近厠故在後房恐有警急還移就前殿豈非爾輩欲壞我家國邪於是執太子左庶子唐令則等數人付所司訊鞠命楊素陳東宫事狀以告近臣素乃顯言之曰臣奉敕向京令皇太子檢校劉居士餘黨太子奉詔作色奮厲骨肉飛騰語臣云居士黨盡伏法遣我何處窮討爾作右僕射委寄不輕自檢校之何關我事又云昔大事不遂我先被誅今作天子竟乃令我不如諸弟一事以上不得自遂因長歎回視云我大覺身妨上曰此兒不堪承嗣久矣皇后􅁪勸我廢之我以布衣時所生地復居長望其漸改隱忍至今勇甞指皇后侍兒謂人曰是皆我物此言幾許異事其婦初亡我深疑其遇毒甞責之勇即懟曰會殺元孝矩此欲害我而遷怒耳長寜初生朕與皇后共抱養之自懷彼此連遣來索且雲定興女在外私合而生想此由來何必是其體胤昔晉太子取屠家女其兒即好屠割今儻非類便亂宗祏我雖德慙堯舜終不以萬姓付不肖子我􅁪畏其加害如防大敵今欲廢之以安天下左衞大將軍五原公元旻諫曰廢立大事詔旨􅀂行後悔無及讒言罔極惟陛下察之上不應命姬威悉陳太子罪惡威對曰太子由來與臣語唯意在驕奢且云􅀂有諫者正當斬之下不殺百許人自然永息營起臺殿四時不輟前蘇孝慈解左衞率太子奮髯揚肘曰大丈夫會當有一日終不忘之決當快意又宫内所湏尚書多執法不與輒怒曰僕射以下吾會戮一二人使知慢我之禍每云至尊惡我多側庶髙緯陳叔寳豈孽子乎嘗令師姥卜吉凶語臣云至尊忌在十八年此期促矣上泫然曰誰非父母生乃至於此朕近覽齊書見髙歡縦其兒子不勝忿憤安可效尤邪於是禁勇及諸子部分收其黨與楊素舞文巧詆鍜錬以成其獄居數日有司承素意奏元旻常曲事於勇情存附託在仁夀宫勇使所親裴􅀪以書與旻題云勿令人見上曰朕在仁夀宫有纖介事東宫必知疾於驛馬怪之甚久豈非此徒邪遣武士執旻於仗右衞大將軍元胄時當下直不去因奏曰臣向不下直者爲防元旻耳上以旻及裴弘付獄先是勇見老枯槐問此堪何用或對曰古槐尤冝取火時衞士皆佩火燧勇命工造數千枚欲以分賜左右至是獲於庫又藥藏􅈰貯艾數斛索得之大以爲怪以問姬威威曰太子此意别有所在至尊在仁夀宫太子常飼馬千匹云徑往守城門自然餓死素以威言詰勇勇不服曰竊聞公家馬數萬匹勇忝備太子馬千匹乃是反乎素又發東宫服翫似加琱飾者悉陳之於庭以示文武羣官爲太子之罪上及皇后迭遣使責問勇勇不服冬十月乙丑上使人召勇勇見使者驚曰得無殺我邪上戎服陳兵御武德殿集百官立於東面諸親立於西靣引勇及諸子列於殿庭命内史侍郎薛道衡宣詔廢勇及其男女爲王公王者並爲庶人勇再拜言曰臣當伏尸都市爲將來鑒戒幸蒙哀憐得全性命言畢泣下流襟既而舞蹈而去左右莫不閔黙長寜王儼上表乞宿衞辭情哀切上覽之閔然楊素進曰伏願聖心同於螫手不冝復留意己巳詔元旻唐令則及太子家令鄒文騰左衞率司馬夏侯福典膳監元淹前吏部侍郎蕭子寶前主璽下士何竦並處斬妻妾子孫皆沒官車􅀐將軍榆林閻毗東郡公崔君綽㳺􅀐尉沈福寶瀛州術士章仇太翼特免死各杖一百身及妻子資財田宅皆沒官副將作大匠髙龍义率更令晉文建通直散􅀐侍郎元衡皆處盡於是集羣官于廣陽門外宣詔戮之乃移勇於内史省給五品料食賜楊素物三千段元胄楊約並千段賞鞫勇之功也文林郎楊孝政上書諫曰皇太子爲小人所誤宜加訓誨不宜廢黜上怒撻其胷初雲昭訓父定興出入東宫無節數進其竒服異器以求恱媚左庶子裴政屢諌勇不聽政謂定興曰公所爲不合法度又元妃暴薨道路籍籍此於太子非令名也公宜自引退不然將及禍定興以告勇勇益踈政由是出爲襄州揔管唐令則爲勇所昵狎每令以􅃶歌教内人右庶子劉行本責之曰庶子當輔太子以正道何有取媚於房帷之閒哉令則甚慙而不能改時沛國劉臻平原明克讓魏郡陸爽並以文學爲勇所親行本怒其不能調護每謂三人曰卿等正解讀書耳夏侯福甞於閤内與勇戲福大笑聲聞於外行本聞之待其出數之曰殿下寛容賜汝顔色汝何物小人敢爲䙝慢因付執法者治之數日勇爲福致請乃釋之勇嘗得良馬欲令行本乘而觀之行本正色曰至尊置臣於庶子欲令輔導殿下非爲殿下作弄臣也勇慙而止及勇敗二人已卒上歎曰向使裴政劉行本在勇不至此勇嘗宴宫臣唐令則自彈琵琶歌娬媚娘洗馬李綱起白勇曰令則身爲宫卿職當調護乃於廣座自比倡優進淫聲穢視聽事􅀂上聞令則罪在不測豈不爲殿下之累邪臣請速治其罪勇曰我欲爲樂耳君勿多事綱遂趨出及勇廢上召東宫官屬切責之皆惶懼無敢對者綱獨曰廢立大事今文武大臣皆知其不可而莫肯發言臣何敢畏死不一爲陛下别白言之乎太子性本中人可與爲善可與爲惡曏使陛下擇正人輔之足以嗣守鴻基今乃以唐令則爲左庶子鄒文騰為家令二人唯知以絃歌鷹犬娛恱太子安得不至於是邪此乃陛下之過非太子之罪也因伏地流涕嗚咽上慘然良久曰李綱責我非爲無理然徒知其一未知其二我擇汝爲宫臣而勇不親任雖更得正人何益哉對曰臣之所以不被親任者良由姦臣在側故也陛下但斬令則文騰更選賢才以輔太子安知臣之終見踈弃也自古國家廢立􅃁嫡鮮不傾危願陛下深留聖思無貽後悔上不恱罷朝左右皆爲之股栗會尚書右丞鈌有司請人上指綱曰此佳右丞也即用之太平公史萬歳還自大斤山楊素害其功言於上曰突厥本降􅀄不爲宼來塞上畜牧耳遂寢之萬歳數抗表陳狀上未之悟上廢太子方窮東宫黨與上問萬歳所在萬歳實在朝堂楊素曰萬歳謁東宫矣以激怒上上謂爲信然令召萬歳時所將士在朝堂稱寃者數百人萬歳謂之曰吾今日爲汝極言於上事當決矣既見上言將士有功爲朝廷所抑詞氣憤厲上大怒令左右㩧殺之既而追之不及因下詔陳其罪狀天下共寃惜之十一月戊子立晉王廣爲皇太子天下地震太子請降章服宫官不稱臣十二月戊午詔從之以宇文述為左衞率始太子之謀奪宗也洪州揔管郭􅄛預焉由是徴􅄛爲左監門率帝囚故太子勇於東宫付太子廣掌之勇自以廢非其罪頻請見上申寃而廣遏之不得聞勇於是升樹大呌聲聞帝所兾得引見楊素因言勇情志昏亂爲癲􅀑所著不可復收帝以爲然卒不得見􅀄帝之克陳也天下皆以爲將太平監察御史房彦謙私謂所親曰主上忌刻而苛酷太子卑弱諸王擅權天下雖安方憂危亂其子玄齡亦宻言於彦謙曰主上本無功德以詐取天下諸子皆驕奢不仁必自相誅夷今雖承平其亡可翹足待彦謙法夀之玄孫也玄齡與杜果之兄孫如晦皆預選吏部侍郎髙孝基名知人見玄齡歎曰僕閱人多矣未見如此郎者異日必爲偉器恨不見其大成耳見如晦謂曰君有應變之才必任棟梁之重俱以子孫託之帝晩年深信佛道􅀑神辛巳始詔有盗毁佛及天尊嶽鎮海瀆神像者以不道論沙門毁佛像道士毁天尊像者以惡逆論是歳徴同州刺史蔡王智積入朝智積帝之弟子也性脩謹門無私謁自奉簡素帝甚憐之智積有五男止教讀論語孝經不令交通賔客或問其故智積曰卿非知我者其意恐諸子有才能以致禍也齊州行參軍章武王伽送流囚李參等七十餘人詣京師行至滎陽哀其辛苦悉呼謂曰卿輩自犯國刑身嬰縲紲固其職也重勞援卒豈不媿心哉參等辭謝伽乃悉脫其枷鎻停援卒與約曰某日當至京師如致前却吾當爲汝受死遂捨之而去流人感恱如期而至一無離叛上聞而驚異召見與語稱善久之於是悉召流人令􅂝負妻子俱入賜宴於殿庭而赦之因下詔曰凡在有生含靈禀性咸知善惡並識是非若臨以至誠明加勸導則俗必從化人皆遷善往以海内亂離德敎廢絶吏無慈愛之心民懷姦詐之意朕思遵聖法以德化民而伽深識朕意誠心宣導參等感悟自赴憲司明是率土之人非爲難教􅀂使官盡王伽之儔民皆李參之輩刑厝不用其何逺哉乃擢伽爲雍令太史令袁充表稱隋興已後晝日漸長開皇元年冬至之景長一丈二尺七寸二分自爾漸短至十七年短於舊三寸七分日去極近則景短而日長去極逺則景長而日短行内道則去極近行外道則去極逺謹按元命包云日月出内道琁璣得其常京房别對曰太平日行上道升平行次道霸代行下道伏惟大隋啓運上感乾元景短日長振古希有上臨朝謂百官曰景長之慶天之祐也今太子新立當須改元宜取日長之意以爲年號是後百工作役並加程課以日長故也丁匠苦之仁夀元年春正月乙酉朔赦天下改元以尚書右僕射楊素爲左僕射納言蘇威爲右僕射丁酉徙河南王昭爲晉王突厥步迦可汗犯塞敗代州揔管韓洪於􅁪安以晉王昭為内史令二月乙卯朔日有食之夏五月己丑突厥男女九萬口來降六月乙卯遣十六使廵省風俗乙丑詔以天下學校生徒多而不精唯簡留國子學生七十人太學四門及州縣學並廢前殿内將軍河間劉炫上表切諌不聽秋七月戊戌改國子為太學初帝受周禪恐民心未服故多稱符瑞以耀之其偽造而獻者不可勝計冬十一月己丑有事于南郊如封禪禮板文備述前後符瑞以報謝云山獠作亂以衛尉少卿洛陽衞文昇爲資州刺史鎮撫之文昇名玄以字行􅀄到官獠方攻大牢鎮文昇單騎造其營謂曰我是刺史衘天子詔安養汝等勿驚懼也羣獠莫敢動於是說以利害渠帥感恱解兵而去前後歸附者十餘萬口帝大恱賜縑二千匹壬辰以文昇爲遂州揔管潮成等五州獠反髙州酋長馮盎馳詣京師請討之帝敕楊素與盎論賊形勢素歎曰不意蠻夷中有如是人即遣盎發江嶺兵擊之事平除盎漢陽太守詔以楊素爲雲州行軍元帥長孫晟爲受降使者挾啓民可汗北擊步迦二年春三月己亥上幸仁夀宫突厥思力俟斤等南度河掠啓民男女六千口雜畜二十餘萬而去楊素帥諸軍追擊轉戰六十餘里大破之突厥北走素復進追夜及之恐其越逸令其􅀐稍後親引兩􅀐并降突厥二人與虜並行虜不之覺􅃸其頓舍未定趣後騎掩擊大破之悉得人畜以歸啓民自是突厥逺遁磧南無復寇抄素以功進子玄感柱國賜玄縱爵淮南公兵部尚書栁述慶之孫也尚蘭陵公主怙寵使氣自楊素之屬皆下之帝問符璽直長萬年韋雲起外間有不便事可言之述時侍側雲起奏曰柳述驕豪未嘗經事兵機要重非其所堪徒以主壻遂居要職臣恐物議以陛下爲官不擇賢專私所愛斯亦不便之大者帝甚然其言顧謂述曰雲起之言汝藥石也可師友之秋七月丙戌詔内外官各舉所知柳述舉雲起除通事舍人益州揔管蜀王秀容貌瓌偉有膽氣好武藝帝每謂獨􅀌后曰秀必以惡終我在當無慮至兄弟必反矣大將軍劉噲之討西㸑也帝令上開府儀同三司楊武通將兵繼進秀以嬖人萬智光爲武通行軍司馬帝以秀任非其人譴責之因謂羣臣曰壞我法者子孫也譬如猛虎物不能害反爲毛間蟲所損食耳遂分秀所統自長史元巖卒後秀漸奢僭造渾天儀多捕山獠充宦者車馬被服擬於乗輿及太子勇以讒廢晉王廣爲太子秀意甚不平太子恐秀終爲後患隂令楊素求其罪而譖之上遂徴秀秀猶豫欲謝病不行揔管司馬源師諫秀作色曰此自我家事何預卿也師垂涕對曰師忝參府幕敢不盡心聖上有敕追王以淹時月今乃遷延未去百姓不識王心儻生異議内外疑駭發雷霆之詔降一介之使王何以自明願王熟計之朝廷恐秀生變戊子以原州揔管獨孤楷為益州揔管馳傳代之楷至秀猶未肯行楷諷諭久之乃就路楷察秀有悔色因勒兵爲備秀行四十餘里將還襲楷覘知有備乃止八月甲子皇后獨孤氏崩太子對上及宫人哀慟絶氣􅀂不勝喪者其處私室飲食言笑如平常又每朝令進二溢米而私令外取肥肉脯鮓置竹筩中以蠟閉口衣襆裹而納之著作郎王劭上言佛說人應生天上及生無量夀國之時天佛放大光明以香花妓樂來迎伏惟大行皇后福善禎符備諸祕記皆云是妙善菩薩臣謹案八月二十二日仁夀宫内再雨金銀花二十三日大寳殿後夜有神光二十四日卯時永安宫北有自然種種音樂震滿虚空至夜五更奄然如寐遂即升遐與經文所說事皆符驗上覽之悲喜九月丙戌上至自仁夀宫冬十月癸丑以工部尚書楊逹爲納言逹雄之弟也閏月甲申詔楊素蘇威與吏部尚書牛弘等脩定五禮上令上儀同三司蕭吉爲皇后擇葬地得吉處云卜年二千卜丗二百上曰吉凶由人不在於地髙緯葬父豈不卜乎俄而國亡正如我家墓田若云不吉朕不當爲天子若云不凶我弟不當戰沒然竟從吉言吉退告族人蕭平仲曰皇太子遣宇文左率深謝余云公前稱我當爲太子竟有其驗終不忘也今卜山陵務令我早立我立之後當以富貴相報吾語之曰後四載太子御天下若太子得政隋其亡乎吾前紿云卜年二千者三十字也卜丗二百者取丗二傳也汝其識之壬寅葬獻皇后於太陵詔以楊素經營葬事勤求吉地論素此心事極誠孝豈與夫平戎定寇比其功業可别封一子義康公邑萬户并賜田三十頃絹萬段米萬石金珠綾錦稱是蜀王秀至長安上見之不與語明日使使切讓之秀謝罪太子諸王流涕庭謝上曰頃者秦王糜費財物我以父道訓之今秀蠧害生民當以君道繩之於是付執法者開府儀同三司慶整諫曰庶人勇既廢秦王已薨陛下見子無多何至如是蜀王性甚耿介今􅀍重責恐不自全上大怒欲斷其舌因謂羣臣曰當斬秀於市以謝百姓乃令楊素等推治之太子隂作偶人縛手釘心枷鎻杻械書上及漢王姓名仍云請西岳慈父聖母神兵收楊堅楊諒神魂如此形狀勿令散蕩密埋之華山下楊素發之又云秀妄述圖䜟稱京師妖異造蜀地徴祥并作檄文云指期問罪置秀集中俱以聞奏上曰天下寜有是邪十二月癸巳廢秀爲庶人幽之内侍省不聽與妻子相見唯給獠婢二人驅使連坐者百餘人秀上表摧謝且曰伏願慈恩賜垂矜愍殘息未盡之間希與􅀲子相見請賜一穴令骸骨有所􅀲子其愛子也上因下詔數其十罪且曰我今不知楊堅楊諒是汝何親後乃聽與其子同處􅀄楊素嘗以少譴敕送南臺命治書侍御史栁彧治之素恃貴坐彧牀彧從外來見之於階下端笏整容謂素曰奉敕治公之罪素遽下彧據案而坐立素於庭辨詰事狀素由是銜之蜀王秀嘗從彧求李文慱所撰治道集彧與之秀遺彧奴婢十口及秀得罪素奏彧以内臣交通諸侯除名爲民配戍懷逺鎮帝使司農卿趙仲卿往益州窮案秀事秀之賔客經過之處仲卿必深文致法州縣長吏坐者太半上以爲能賞賜甚厚久之貝州長史裴肅遣使上書稱髙熲以天挺良才元勲佐命爲衆所疾以至廢弃願陛下錄其大功忘其小過又二庶人得罪已久寜無革心願陛下弘君父之慈顧天性之義各封小國觀其所爲􅀂能遷善漸更增益如或不悛貶削非晩今者自新之路永絶愧悔之心莫見豈不哀哉書奏上謂楊素曰裴肅憂我家事此亦至誠也於是徴肅入朝太子聞之謂左庶子張衡曰使勇自新欲何爲也衡曰觀肅之意欲令如吳太伯漢東海王耳肅至上面諭以勇不可復收之意而罷遣之肅俠之子也楊素弟約及從父文思文紀族父忌並爲尚書列卿諸子無汗馬之勞位至柱國刺史廣營資産自京師及諸方都會處邸店碾磑便利田宅不可勝數家僮數千後庭妓妾曵綺羅者以千數第宅華侈制擬宫禁親故吏布列清顯既廢一太子及一王威權愈盛朝臣有違忤者或至誅夷有附會及親戚雖無才用必加進擢朝廷靡然莫不畏附敢與素抗而不撓者獨柳彧及尚書右丞李綱大理卿梁毗而已始毗爲西寜州刺史凡十一年蠻夷酋長皆以金多者爲豪儁遞相攻奪略無寜歳毗患之後因諸酋長相帥以金遺毗毗置金坐側對之慟哭而謂之曰此物飢不可食寒不可衣汝等以此相滅不可勝數今將此來欲殺我邪一無所納於是蠻夷感悟遂不相攻擊上聞而善之徴爲大理卿處法平允毗見楊素専權恐爲國患乃上封事曰臣聞臣無有作威作福其害于而家凶于而國竊見左僕射越國公素幸遇愈重權勢日隆搢紳之徒屬其視聽忤意者嚴霜夏零阿旨者膏雨冬澍榮枯由其脣吻廢興􅃸其指麾所私皆非忠讜所進咸是親戚子弟布列兼州連縣天下無事容息異圖四海有虞必爲禍始夫姦臣擅命有漸而來王莽資之於積年􅁊玄基之於易丗而卒殄漢祀終傾晉祚陛下􅀂以素爲阿衡臣恐其心未必伊尹也伏願揆鑒古今量為處置俾洪基永固率土幸甚書奏上大怒收毗繫獄親詰之毗極言素擅寵弄權將領之處殺戮無道又太子及蜀王罪廢之日百僚無不震悚唯素揚眉奮肘喜見容色利國家有事以爲身幸上無以屈乃釋之其後上亦寖踈忌素乃下敕曰僕射國之宰輔不可躬親細務但三五日一向省評論大事外示優崇實奪之權也素由是終仁夀之末不復通判省事出楊約爲伊州刺史素既被踈吏部尚書栁述益用事攝兵部尚書參掌機密素由是惡之太子問於賀􅀂弼曰楊素韓擒虎史萬歳皆稱良將其優劣何如弼曰楊素猛將非謀將韓擒虎鬬將非領將史萬歳􅀐將非大將太子曰然則大將誰也弼拜曰唯殿下所擇弼意自許也交州俚帥李佛子作亂據越王故城遣其兄子大權據龍編城其别帥李普鼎據烏延城楊素薦􅀲州剌史長安劉方有將帥之略詔以方爲交州道行軍揔管統二十七營而進方軍令嚴肅有犯必斬然仁愛士卒有疾病者親臨撫養士卒亦以此懷之至都隆嶺遇賊擊破之進軍臨佛子營先諭以禍福佛子懼請降送之長安三年秋八月壬申賜幽州揔管燕榮死榮性嚴酷鞭撻左右動至千數甞見道次叢荆以爲堪作杖命取之輒以試人人或自陳無罪榮曰後有罪當免汝既而有犯將杖之人曰前日被杖使君許以有罪宥之榮曰無罪尚爾况有罪邪杖之自􅀂觀州長史元弘嗣遷幽州長史懼爲榮所辱固辭上敕榮曰弘嗣杖十已上罪皆須奏聞榮忿曰豎子何敢玩我於是遣弘嗣監納倉粟颺得一糠一粃􅂺罰之每笞雖不滿十然一日之中或至三數如是歴年怨隙日􅌟榮遂收弘嗣付獄禁絶其糧弘嗣抽衣絮雜水咽之其妻詣闕稱􅁈上遣使案驗奏榮暴虐贓穢狼籍徴還賜死元弘嗣代榮爲政酷又甚之九月壬戌置常平官是歳龍門王通詣闕獻太平十二策上不能用罷歸通遂敎授於河汾之間弟子自逺至者甚衆累徴不起楊素甚重之勸之仕通曰通有先人之弊廬足以庇風雨薄田足以具􅊡粥讀書談道足以自樂願明公正身以治天下使時和年豐通也受賜多矣不願仕也或譖通於素曰彼實慢公公何敬焉素以問通通曰使公可慢則僕得矣不可慢則僕失矣得失在僕公何預焉素待之如􅀄弟子賈瓊問息謗通曰無辯問止怨曰不爭通嘗稱無赦之國其刑必平重歛之國其財必貧又曰聞謗而怒者讒之囮也見譽而喜者佞之媒也絶囮去媒讒佞逺矣大業末卒於家門人諡曰文中子突厥步迦可汗所部大亂鐵勒僕骨等十餘部皆叛步迦降於啓民步迦衆潰西奔吐谷渾長孫晟送啓民置磧口啓民於是盡有歩迦之衆資治通鑑卷第一百七十九
