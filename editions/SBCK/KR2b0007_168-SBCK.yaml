body:
  text: 臣司馬光奉勑編纂陳紀二黓敦牂凢三年起昭章執徐盡􅀇丗祖文皇帝上天嘉元年春正月癸丑朔大赦攺元齊大赦攺元乾明辛酉上祀􅀯郊齊髙陽王湜以滑稽便辟有寵於顯祖常在左右執杖以撻諸王太皇太后􅀷衘之及顯祖殂湜有罪太皇太后杖之百餘癸亥卒辛未上祀北郊齊主自晋陽還至鄴二月乙未髙州剌史紀機自軍所逃還宣城據郡應王琳涇令賀當遷討平之王琳至柵口侯瑱督諸軍出屯蕪湖相持百餘日東􅀜春水稍長舟艦得通琳引合肥漅湖之衆舳艫相次而下軍􅀔甚盛瑱進軍虎檻洲琳亦出船列于江西隔洲而泊明日合戰琳軍少却退保西岸及夕東北風大起吹其舟艦並壊没于沙中浪大不得還浦及旦風靜琳入浦治船瑱等亦引軍退入蕪湖周人聞琳東下遣都督荆㐮等五十二州諸軍事荆州剌史史寕將兵數萬乗虚襲郢州孫瑒嬰城自守琳聞之恐其衆潰乃帥舟師東下去蕪湖十里而泊擊柝聞於陳軍齊儀同三司劉伯球將兵萬餘人助琳水戰行臺慕容恃德之子子㑹將鐵􅀐二千屯蕪湖西岸爲之聲􅀔丙申瑱令軍中晨炊蓐食以待之時西􅀯風急琳自謂得天助引兵直趣建康瑱等徐出蕪湖躡其後西􅀯風翻為瑱用琳擲火炬以燒陳船皆反燒其船瑱發拍以擊琳艦又以牛皮冒蒙衝小船以觸其艦并鎔鐵灑之琳軍大敗軍士溺死者什二三餘皆棄船登岸走為陳軍所殺殆盡齊歩􅀐在西岸者自相蹂踐並䧟於蘆荻泥淖中􅀐皆棄馬脫走得免者什二三擒劉伯球慕容子㑹斬獲萬計盡收梁齊軍資器械琳乗舴艋冒陳走至湓城欲收合離散衆無附者乃與妻妾左右十餘人奔齊先是琳使侍中􅀽泌御史中丞劉仲威侍衛永嘉王莊及敗左右皆散泌以輕舟送莊逹于齊境拜辭而還遂來降仲威奉莊奔齊泌昻之子也樊猛及其兄毅帥部曲來降齊葬文宣皇帝于武寜陵廟號髙祖後改曰顯祖戌戊詔衣冠士族將帥戰兵䧟在王琳黨中者皆赦之隨材銓叙己亥齊以常山王演為太師録尚書事以長廣王湛為大司馬并省録尚書事左僕射平秦王歸彦為司空趙郡王叡為尚書左僕射詔諸元良口配没入官及賜人者並縱遣乙巳以太尉侯瑱都督湘巴等五州諸軍事鎮湓城齊顯祖之䘮常山王演居禁中護䘮事婁太后欲立之而不果太子即位乃就朝列以天子諒隂詔演居東館欲奏之事皆先咨决楊愔等以演與長廣王湛位地親逼恐不利於嗣主心忌之居頃之演岀歸第自是詔敕多不􅀜預或謂演曰鷙鳥離巢必有探􅆑之患今日王何宜屢出中山太守陽休之詣演演不見休之謂王友王晞曰昔周公朝讀百篇書夕見七十士猶恐不足録王何所嫌疑乃爾拒絶賔客先是顯祖之丗群臣人不自保及濟􅀯王立演謂王晞曰一人垂拱吾曹亦保優閑因言朝廷寛仁真守文良主晞曰先帝時東宫委一胡人􅀓之今春秋尚冨驟覧萬機殿下宜朝夕先後親承音旨而使他姓出納詔命大􅁠必有所歸殿下雖欲守藩其可得邪借令得遂冲退自審家祚得保靈長乎演黙然乆之曰何以處我晞曰周公抱成王攝政七年然後復子明辟惟殿下慮之演曰我何敢自比周公晞曰殿下今日地望欲不為周公得邪演不應顯祖常使胡人康虎兒保護太子故晞言及之齊主將發晋陽時議謂常山王必當留守根本之地執政欲使常山王從帝之鄴留長廣王鎮晋陽旣而又疑之乃敕二王俱從至鄴外朝聞之莫不駭愕又敕以王晞為并州長史演旣行晞出郊送之演恐有覘察命晞還城執晞手曰努力自慎因躍馬而出平秦王歸彦緫知禁衛楊愔宣敕留從駕五千兵於西中隂備非常至鄴數日歸彦乃知之由是怨愔領軍大將軍可朱渾天和道元之子也尚帝姑東平公主每曰􅀂不誅二王少主無自安之理燕子獻謀處太皇太后於北宫使歸政皇太后又自天保八年已來爵賞多濫楊愔欲加澄汰乃先自表解開府及開封王諸叨竊恩榮者皆從黜免由是嬖寵失職之徒盡歸心二叔平秦王歸彦􅀄與楊燕同心旣而中變盡以踈忌之迹告二王侍中宋欽道弁之孫也顯祖使在東宫教太子以吏事欽道面奏帝稱二叔威􅁠旣重宜速去之帝不許曰可與令公共詳其事愔等議出二王為剌史以帝慈仁恐不可所奏乃通啓皇太后具述安危宫人李昌儀即髙仲宻之妻也李太后以其同姓甚相昵愛以啓示之昌儀宻啓太皇太后愔等又議不可令二王俱出乃奏以長廣王湛鎮晋陽以常山王演録尚書事二王旣拜職乙巳於尚書省大㑹百僚愔等將赴之散􅀐常侍兼中書侍郎鄭頥止之曰事未可量不宜輕脫愔曰吾等至誠體國豈常山拜職有不赴之理長廣王湛旦伏家僮數十人於録尚書後室仍與席上勲貴賀拔仁斛律金等數人相知約曰行酒至愔等我各􅂆雙盃彼必致辭我一曰執酒二曰執酒三曰何不執爾輩即執之及宴如之愔大言曰諸王反逆欲殺忠良邪尊天子削諸侯赤心奉國何罪之有常山王演欲緩之湛曰不可於是拳杖亂敺愔及天和欽道皆頭面血流各十人持之燕子獻多力頭又少髪狼狽排衆走出門斛律光逐而擒之子獻歎曰丈夫為計遟遂至於此使太子太保薛孤延等執頥於尚藥局頥曰不用智者言至此豈非命也二王與平秦王歸彦賀拔仁斛律金擁愔等唐突入雲龍門見都督叱利騷招之不進使􅀐殺之開府儀同三司成休寜抽刀呵演演使歸彦諭之休寜厲聲不從歸彦乆為領軍素為軍士所服皆弛仗休寜方歎息而罷演入至昭陽殿湛及歸彦在朱華門外帝與太皇太后並出太皇太后坐殿上皇太后及帝側立演以塼叩頭進言曰臣與陛下骨肉至親楊遵彦等欲獨擅朝􅁠威福自已自王公已下皆重足屏氣共相脣齒以成亂階􅀂不早圗必為宗社之害臣與湛為國事重賀拔仁斛律金惜獻武皇帝之業共執遵彦等入宫未敢刑戮專輙之罪誠當萬死時庭中及兩廡衛士二千餘人皆􅀍甲待詔武衛娥永樂武力絶倫素為顯祖所厚叩刀仰視帝不睨之帝素吃訥倉猝不知所言太皇太后令􅁍仗不退又厲聲曰奴輩即今頭落乃退永樂内刀而泣太皇太后因問楊郎何在賀拔仁曰一眼已出太皇太后愴然曰楊郎何所能為留使豈不佳邪乃譲帝曰此等懐逆欲殺我二子次將及我爾何為縱之帝猶不能言太皇太后怒且悲曰豈可使我母子受漢老嫗斟酌太后拜謝太皇太后又為太后誓言演無異志但欲去逼而已演叩頭不止太后謂帝何不安慰爾叔帝乃曰天子亦不敢為叔惜况此漢輩但匄兒命兒自下殿去此屬任叔父處分遂皆斬之長廣王湛以鄭頥昔嘗讒已先拔其舌截其手而殺之演令平秦王歸彦引侍衛之士向華林園以京畿軍士入守門閤斬娥永樂於園太皇太后臨愔䘮哭曰楊郎忠而􅀗罪以御金為之一眼親内之曰以表我意演亦悔殺之於是下詔罪狀愔等且曰罪止一身家屬不問頃之復簿録五家王晞固諫乃各没一房孩㓜盡死兄弟皆除名以中書令趙彦􅀷代楊愔緫機務鴻臚少卿陽休之私謂人曰將渉千里殺騏驎而䇿蹇驢可悲之甚也戊申演為大丞相都督中外諸軍録尚書事湛為太􅀓京畿大都督叚韶為大將軍平陽王淹為太尉平秦王歸彦為司徒彭城王浟為尚書令江陵之䧟也長城丗子昌及中書侍郎頊皆没於長安髙祖即位屢請之於周周人許而不遣髙祖殂周人乃遣昌還以王琳之難居于安陸琳敗昌發安陸將濟江致書於上辭甚不遜上不懌召侯安都從容謂曰太子將至湏别求一藩為歸老之地安都曰自古豈有􅀍代天子臣愚不敢奉詔因請自迎昌於是群臣上表請加昌爵命庚戌以昌為驃􅀐將軍湘州牧封衡陽王齊大丞相演如晋陽旣至謂王晞曰不用卿言幾至傾覆今君側雖清終當何以處我晞曰殿下徃時位地猶可以名教出處今日事􅀔遂􅀜天時非復人理所及演奏趙郡王叡為左長史王晞為司馬三月甲寅詔軍國之政皆申晋陽禀大丞相規筭周軍􅀄至郢州助防張丗貴舉外城以應之所失軍民三千餘口周人起土山長梯晝夜攻之因風縱火燒其内城􅀯面五十餘樓孫瑒兵不滿千人身自撫循行酒賦食士卒皆為之死戰周人不能克乃授瑒柱國郢州刺史封萬户郡公瑒偽許以緩之而潜修戰守之備一朝而具乃復拒守旣而周人聞王琳敗陳兵將至乃解圍去瑒集將佐謂之曰吾與王公同奬梁室勤亦至矣今時事如此豈非天乎遂遣使奉表舉中流之地來降王琳之東下也帝徵􅀯川兵江州刺史周廸髙州刺史黄法􅉤帥舟師將赴之熊曇㓪據城列艦塞其中路廸等與周敷共圍之琳敗曇㓪部衆離心廸攻拔其城虜男女萬餘口曇㓪走入村中村民斬之丁巳傳首建康盡㓕其族齊軍先守魯山戊午棄城走詔􅀯豫州刺史程靈洗守之甲寅置武州沅州以右衛將軍吳明徹為武州刺史以孫瑒為湘州刺史瑒懐不自安固請入朝徵為中領軍未拜除吳郡太守壬申齊封丗宗之子孝珩為廣寜王長恭為蘭陵王甲戌衡陽獻王昌入境詔主書舎人縁道迎候丙子濟江中流隕之使以溺告侯安都以功進爵清逺公􅀄齊祖遣滎陽毛喜從安成王頊詣江陵梁丗祖以喜為侍郎没於長安與昌俱還因進和親之䇿上乃使侍中周弘正通好於周夏四月丁亥立皇子伯信為衡陽王奉獻王祀周丗宗明敏有識量晋公護憚之使膳部中大夫李安寘毒於糖䭔而進之帝頗覺之庚子大漸口授遺詔五百餘言且曰朕子年㓜未堪當國魯公朕之介弟寛仁大度海内共聞能弘我周家必此子也辛丑殂魯公㓜有器質特為丗宗所親愛朝廷大事多與之參議性􅀷沉有逺識非因顧問終不輙言丗宗每歎曰夫人不言言必有中壬寅魯公即皇帝位大赦五月壬子齊以開府儀同三司劉洪徽為尚書右僕射侯安都父文捍爲始興内史卒官上迎其母還建康母固求停郷里乙卯為置東衡州以安都從弟曉為剌史安都子袐纔九􅀊上以為始興内史並令在郷侍養六月壬辰詔葬梁元帝於江寜車旗禮章悉用梁典齊人収永安上黨二王遺骨葬之敕上黨王妃李氏還第馮文洛尚以故意脩飾詣之妃盛列左右立文洛於階下數之曰遭難流離以至大辱志操寡薄不能自盡幸蒙恩詔得反藩闈汝何物奴猶欲見侮杖之一百血流灑地秋七月丙辰封皇子伯山爲鄱陽王齊丞相演以王晞儒緩恐不允武將之意每夜載入晝則不與語嘗進晞宻室謂曰比王侯諸貴每見敦廹言我違天不祥恐當或有變起吾欲以法繩之何如晞曰朝廷比者踈逺親戚殿下倉猝所行非復人臣之事芒刺在背上下相疑何由可乆殿下雖欲謙退粃糠神器實恐違上玄之意墜先帝之基演曰卿何敢發此言湏致卿於法晞曰天時人事皆無異謀是以敢冒犯斧􅃏抑亦神明所賛耳演曰拯難匡時方俟聖哲吾何敢私議幸勿多言丞相從事中郎陸杳將出使握晞手使之􅂆進晞以杳言告演演曰若内外咸有此意趙彦􅀷朝夕左右何故􅀄無一言晞乃以事隙宻問彦深彦􅀷曰我比亦驚此聲論每欲陳聞則口噤心悸弟旣發端吾亦當昧死一披肝膽因共􅂆演演遂言於太皇太后趙道德曰相王不効周公輔成王而欲骨肉相奪不畏後丗謂之簒邪太皇太后曰道德之言是也未幾演又啓云天下人心未定恐奄忽變生湏早定名位太皇太后乃從之八月壬午太皇太后下令廢齊主為濟􅀯王出居别宫以常山王演入纂大統且戒之曰勿令濟􅀯有佗也肅宗即皇帝位於晋陽大赦攺元皇建太皇太后還稱皇太后皇太后稱文宣皇后宫曰昭信乙酉詔紹封功臣禮賜耆老延訪直言褒賞死事追贈名德帝謂王晞曰卿何為自同外客畧不可見自今假非局司但有所懐隨宜作一牒俟少隙即徑進也因囗勅與尚書陽休之鴻臚卿崔劼等三人每日職務罷並入東廊共舉録歴代禮樂職官及田市徵稅或不便於時而相承施用或自古為利而於今廢墜或道德髙儁乆在沉淪或巧言眩俗妖邪害政者悉令詳思以漸條奏朝晡給御食畢景聽還帝識度沈敏少居臺閣明習吏事即位尤自勤勵大革顯祖之弊時人服其明而譏其細嘗問舎人裴澤在外議論得失澤率爾對曰陛下聦明至公自可逺侔古昔而有識之士咸言傷細帝王之度頗爲未弘帝笑曰誠如卿言朕􅀄臨萬機慮不周悉故致爾耳此事安可乆行恐後又嫌踈漏澤由是􅀍寵遇庫狄顯安侍坐帝曰顯安我姑之子令序家人禮除君臣之敬可言我之不逮顯安曰陛下多妄言帝曰何故對曰陛下昔見文宣以馬鞭撻人常以為非今自行之非妄言邪帝握其手謝之又使直言對曰陛下太細天子乃更似吏帝曰朕甚知之然無法日乆將整之以至無爲耳又問王晞晞曰顯安言是也顯安干之子也群臣進言帝皆從容受納性至孝太后不豫帝行不能正履容色貶悴衣不解帶殆將四旬太后疾小增即􅃦伏閤外食飲藥物皆手親之太后嘗心痛不自堪帝立侍帷前以爪搯掌代痛血流出䄂友愛諸弟無君臣之隔戊子以長廣王湛為右丞相平陽王淹為太􅀓彭城王浟為大司馬周軍司馬賀􅀂敦帥衆一萬奄至武陵武州刺史吳明徹不能拒引軍還巴陵江陵之䧟也巴湘之地盡入於周周使梁人守之太尉侯瑱等將兵逼湘州賀􅀂敦將歩􅀐救之乗勝􅀷入軍于湘川九月乙卯周將獨孤盛將水軍與敦俱進辛酉遣儀同三司徐度將兵㑹侯瑱于巴丘㑹秋水汎溢盛敦糧援斷絶分軍抄掠以供資費敦恐瑱知其糧少乃於營内多爲土聚覆之以米召旁村人陽有訪問隨即遣之瑱聞之良以為實敦又増脩營壘造廬舎爲乆留之計湘羅之間遂廢農業瑱等無如之何先是􅁟人亟乗輕船載米粟雞鴨以餉瑱軍敦患之乃僞爲土人裝船伏甲士於中瑱軍人望見謂餉船之至逆來爭取敦甲士出而擒之又敦軍數有叛人乗馬投瑱者敦乃别取一馬牽以趣船令船中逆以鞭鞭之如是者再三馬畏船不上然後伏兵於江岸使人乗畏船馬以招瑱軍詐云􅄬附瑱遣兵迎接競來牽馬馬旣畏船不上伏兵發盡殺之此後實有饋餉及亡降者瑱猶謂之詐並拒擊之冬十月癸巳瑱襲破獨孤盛於楊葉洲盛収兵登岸築城自保丁酉詔司空侯安都帥衆㑹瑱􅀯討十一月辛亥齊主立妃元氏爲皇后丗子百年為太子百年時纔五嵗齊主徵前開府長史盧叔虎為中庶子叔虎柔之從叔也帝問時務於叔虎叔虎請伐周曰我彊彼弱我冨彼貧其􅀔相懸然干戈不息未能并吞者此失於不用彊冨也輕兵野戰勝負難必是胡􅀐之法非萬全之術也宜立重鎮於平陽與彼蒲州相對􅀷溝髙壘運糧積甲彼閉􅀜不出則稍􅅙食其河東之地日使窮蹙􅀂彼出兵非十萬以上不足為我敵所損糧食咸出􅀜中我軍士年别一代榖食豐饒彼來求戰我則不應彼􅀂退去我乗其弊自長安以西民䟽城逺敵兵來徃實自艱難與我相持農業且廢不過三年彼自破矣帝􅀷善之齊主自將擊庫莫奚至天池庫莫奚出長城北遁齊主分兵追擊􅀗牛羊七萬而還十二月乙未詔自今孟春訖于夏首大辟事已款者宜且申停己亥周巴陵城主尉遟憲降遣巴州刺史侯安鼎守之庚子獨孤盛將餘衆自楊葉洲潜遁丙午齊主還晋陽齊主斬人於前問王晞曰是人應死不晞曰應死但恨死不得其地耳臣聞刑人於市與衆棄之殿廷非行戮之所帝攺容謝曰自今當爲王公攺之帝欲以晞爲侍郎苦辭不受或􅂆晞勿自踈晞曰我少年以來閱要人多矣得志少時鮮不顛覆且吾性實踈緩不堪時務人主恩私何由可保萬一披猖求退無地非不好作要官但思之爛熟耳􅀄齊顯祖之末榖糴踊貴濟􅀯王即位尚書左丞蘇珍芝建議修石鼈等屯自是淮􅀯軍防足食肅宗即位平州刺史嵇曄建議開督亢陂置屯田嵗収稻粟數十萬石北境周贍又於河内置懐義等屯以給河􅀯之費自是稍止轉輸之勞二年春正月戊申周攺元保定以大􅃁宰護爲都督中外諸軍事令五府緫於天官事無巨細皆先斷後聞庚戌大赦周主祀圜丘辛亥齊主祀圜丘壬子禘於太廟周主祀方丘甲寅祀感生帝於􅀯郊乙夘􅀕太社齊主使王琳出合肥召募傖楚更啚進取合州刺史裴景徽琳兄珉之壻也請以私屬爲郷道齊主使琳與行臺左丞盧潜將兵赴之琳沉吟不决景徽恐事泄挺身奔齊齊主以琳為驃􅀐大將軍開府儀同三司楊州刺史鎮壽陽巳巳周主享太廟班太祖所述六官之法辛未周湘州城主殷亮降湘州平侯瑱與賀􅀂敦相持日乆瑱不能制乃借船送敦等度江敦慮其詐不許報云湘州我地為爾侵逼必湏我歸可去我百里之外瑱留船江岸引兵去之敦乃自拔北歸軍士病死者什五六武陵天門􅀯平義陽河東宜都郡悉平晋公護以敦失地無功除名為民二月甲午周主朝日於東郊周人以小司徒韋孝寛甞立勲於玉壁乃置勲州於玉璧以孝寛爲刺史孝寛有恩信善用間諜或齊人受孝寛金貨遥通書䟽故齊之動靜周人皆先知之有主帥許盆以所戍城降齊孝寛遣諜取之俄斬首而還離石以􅀯生胡數為抄掠而居於齊境不可誅討孝寛欲築城於險要以制之乃發河西役徒十萬甲士百人遣開府儀同三司姚岳監築之岳以兵少懼不敢前孝寛曰計此城十日可畢城距晋州四百餘里吾一日創手二日敵境始知設使晋州徵兵三日方集謀議之間自稽三日計其軍行二日不到我之隍防足得辦矣乃令築之齊人果至境上疑有大軍停留不進其夜孝寛使汾水以􅀯傍介山稷山諸村縱火齊人以爲軍營収兵自固岳卒城而還三月乙卯太尉零陵壯肅公侯瑱卒丙寅周攺八丁兵爲十二丁兵率歲一月役夏四月丙子朔日有食之周以少􅀓尉遟綱爲大司空丙午周封愍帝子康爲紀國公皇子贇爲魯國公贇李后之子也六月乙酉周主使御正殷不害來聘秋七月周更鑄錢文曰布泉一當五與五銖並行己酉周追封皇伯父顥爲邵國公以晋公護之子㑹爲嗣顥弟連爲杞國公以章公武導之子亮爲嗣連弟洛生爲莒國公以護之子至爲嗣追封太祖之子武邑公震爲宋公以丗宗之子實爲嗣齊主之誅楊燕也許以長廣王湛爲太弟旣而立太子百年湛心不平帝在晋陽湛居守於鄴散􅀐常侍髙元海髙祖之從孫也留典機宻帝以領軍代人庫狄伏連爲幽州刺史以斛律光之弟羡為領軍以分湛􅁠湛留伏連不聽羨視事先是濟􅀯閔悼王常在鄴望氣者以鄴中有天子氣平秦王歸彦恐濟􅀯王復立為己不利􅂆帝除之帝乃使歸彦至鄴徵濟􅀯王如晋陽湛内不自安問計於髙元海元海曰皇太后萬福至尊孝友異常殿下不湏異慮湛曰此豈我推誠之意邪元海乞還省一夜思之湛即留元海於後堂元海逹旦不眠唯遶􅇃徐歩夜漏未盡湛遽出曰神筭如何元海曰有三䇿恐不堪用耳請殿下如梁孝王故事從數􅀐入晋陽先見太后求哀後見主上請去兵􅁠以死為限不干朝政必保泰山之安此上䇿也不然當具表云威􅁠太盛恐取謗衆口請青齊二州刺史沈靖自居必不招物議此中䇿也更問下䇿曰發言即恐族誅固逼之元海曰濟􅀯丗嫡主上假太后令而奪之今集文武示以徴濟􅀯之敕執斛律豐樂斬髙歸彦尊立濟􅀯號令天下以順討逆此萬丗一時也湛大恱然性怯狐疑未能用使術士鄭道謙等卜之皆曰不利舉事静則吉有林慮令潘子密曉占􅀱潜謂湛曰宫車當晏駕殿下爲天下主湛拘之於内以􅀱之又令巫覡卜之多云不湏舉兵自有大慶湛乃奉詔令數百􅀐送濟􅀯王至晋陽九月帝使人酖之濟􅀯王不從乃扼殺之帝尋亦悔之冬十月甲戌朔日有食之丙子齊以彭城王浟爲太保長樂王尉粲爲太尉齊肅宗出畋有􅇠驚馬墜地絶肋婁太后視疾問濟􅀯所在者三齊主不對太后怒曰殺之邪不用吾言死其宜矣遂去不顧十一月甲辰詔以嗣子冲眇可遣尚書右僕射趙郡王叡諭旨徴長廣王湛統兹大寳又與湛書曰百年無罪女可以樂處置之勿效前人也是日殂於晋陽宫臨終言恨不見太后山陵顔之推論曰孝昭天性至孝而不知忌諱乃至於此良由不學之所爲也趙郡王叡先使黄門侍郎王松年馳至鄴宣肅宗遺命湛猶疑其詐使所親先詣殯所發而視之使者復命湛喜馳赴晋陽使河􅀯王孝瑜先入宫攺易禁衛癸丑丗祖即皇帝位於􅀯宫大赦攺元大寜周人許歸安成王頊使司㑹上士京兆杜杲來聘上恱即遣使報之并賂以黔中地及魯山郡齊以彭城王浟爲太師録尚書事平秦王歸彦爲太􅀓尉粲爲大保平陽王淹爲太宰愽陵王濟爲太尉叚韶爲大司馬豐州刺史婁叡爲司空趙郡王叡爲尚書令任城王湝爲尚書左僕射并州刺史斛律光爲右僕射婁叡韶之兄子也立太子百年爲樂陵王丁巳周主畋于岐陽十二月壬午還長安太子中庶子餘姚虞荔御史中丞孔奐以國用不足奏立煑海鹽賦及􅅦酤之科詔從之􅀄髙祖以帝女豐安公主妻留異之子貞臣徵異為􅀯徐州刺史異遷延不就帝即位復以異爲縉州刺史領東海太守異屢遣其長史王澌入朝澌每言朝廷虚弱異信之雖外示臣節􅁪懐兩端與王琳自鄱陽信安嶺潜通使徃來琳敗上遣左衛將軍沈恪代異實以兵襲之異出軍下淮以拒恪恪與戰而敗退還錢塘異復上表遜謝時衆軍方事湘郢乃降詔書慰諭且羈縻之異知朝廷終將討已乃以兵戍下淮及建德以備江路丙午詔司空􅀯徐州刺史侯安都討之三年春正月乙亥齊主至鄴辛巳祀􅀯郊壬午享太廟丙戌立妃胡氏為皇后子緯為皇太子后魏兖州刺史安定胡延之之女也戊子大赦己亥以馮翊王潤爲尚書左僕射周涼景公賀蘭祥卒壬寅周人鑿河渠於蒲州龍首渠於同州丁未周以安成王頊爲柱國大將軍遣杜果送之􅀯歸辛亥上祀􅀯郊以胡公配天二月辛酉祀北郊閏月丁未齊以太宰平陽王淹爲青州刺史太􅀓平秦王歸彦爲太宰兾州刺史歸彦爲肅宗所厚恃􅀔驕盈陵侮貴戚丗祖即位侍中開府儀同三司髙元海御史中丞畢義雲黄門郎髙乾和數言其短且云歸彦威􅁠震主必爲禍亂帝亦㝷其反覆之跡漸忌之伺歸彦還家召魏収於帝前作詔草除歸彦兾州使乾和繕寫晝日仍敕門司不聽歸彦輙入宫時歸彦緃酒爲樂經􅀫不知至明欲參至門知之大驚而退及通名謝敕令早發别賜錢帛等物甚厚又敕督將悉送至清陽宫拜辭而退莫敢與語唯趙郡王叡與之乆語時無聞者帝之為長廣王也清都和士開以善握槊弹琵琶有寵辟為開府行參軍及即位累遷給事黄門侍郎髙元海畢義雲髙乾和皆疾之將言其事士開乃奏元海等交結朋黨欲擅威福乾和由是􅀍踈義雲納賂於士開得為兗州剌史帝徴江州剌史周迪出鎮湓城又徵其子入朝迪趑且顧望並不至其餘􅀯江酋帥私署令長多不受召朝廷未暇致討但羈縻之豫章太守周敷獨先入朝進號安西將軍給鼔吹一部賜以女妓金帛令還豫章廸以敷素出已下􅀷不平之乃隂與留異相結遣其弟方興將兵襲敷敷與戰破之又遣其兄子伏甲船中詐爲賈人欲襲湓城未發事覺尋陽太守監江州事晋陵華皎遣兵逆擊之盡􅀗其􅂳仗上以閩州刺史陳寳應之父爲光禄大夫子女皆受封爵命宗正編入屬籍而寳應以留異女爲妻隂與異合虞荔弟􅀉流寓閩中荔思之成疾上為荔徴之寳應留不遣􅀉甞從容諷以逆順寳應輙引它語以亂之寳應嘗使人讀漢書卧而聽之至蒯通􅀃韓信曰相君之背貴不可言蹶然起坐曰可謂智士􅀉曰通一􅀃殺三士何足稱智豈􅀂班彪王命識所歸乎寄知寳應不可諌恐禍及已乃着居士服居東山寺陽稱足疾寳應使人燒其屋􅀉安卧不動親近將扶之出􅀉曰吾命有所懸避將安徃縱火者自救之乙夘齊以任城王湝爲司徒齊揚州刺史行臺王琳數欲􅀯侵尚書盧潜以爲時事未可上遣移書壽陽欲與齊和親潜以其書奏齊朝仍上啓且請息兵齊主許之遣散􅀐常侍崔瞻來聘且歸􅀯康愍王曇朗之䘮琳由是與潜有隙更相表列齊主徴琳赴鄴以潜爲揚州刺史領行臺尚書瞻㥄之子也梁末䘮亂鐵錢不行民間私用鵝眼錢甲子攺鑄五銖錢一當鵝眼之十後梁主安於儉素不好酒色雖多猜忌而撫將士有恩以封疆􅄶隘邑居殘毁干戈日用鬱鬱不得志疽發背而殂葬平陵謚曰宣皇帝廟號中宗太子巋即皇帝位改元天保尊龔太后爲太皇太后王后爲皇太后母曹貴嬪爲皇太妃三月丙子安成王頊至建康詔以爲中書監中衛將軍上謂杜杲曰家弟今蒙禮遣實周朝之惠然魯山不返亦恐未能及此杲對曰安成長安一布衣耳而陳之介弟也其價豈止一城而已哉本朝敦睦九族恕已及物上遵太祖遺旨下思繼好之義是以遣之􅀯歸今乃云以尋常之土易骨肉之親非使臣之所敢聞也上甚慙曰前言戯之耳待杲之禮有加焉頊妃柳氏及子叔寳猶在穣城上復遣毛喜如周請之周人皆歸之丁丑以安右將軍吳明徹爲江州刺史督髙州刺史黄法􅉤豫章太守周敷共討周迪甲申大赦留異始謂臺軍必自錢塘上旣而侯安都歩由諸暨出永康異大驚奔桃枝嶺於巖口竪柵以拒之安都爲流矢所中血流至踝乗轝指麾容止不變因其山􅀔迮而爲堰㑹潦水漲滿安都引􅂳入堰起樓艦與異城等發拍碎其樓堞異與其子忠臣脫身奔晋安依陳寳應安都虜其妻及餘子盡収鎧仗而還異黨向文政據新安上以貞毅將軍程文季為新安太守帥精甲三百徑徃攻之文政戰敗遂降文季靈洗之子也夏四月辛丑齊武明婁太后殂齊主不攺服緋袍如故未幾登三臺置酒作樂宫女進白袍帝投諸臺下散􅀐常侍和士開請止樂帝怒撾之乙巳帝遣使來聘齊青州上言河水清齊主遣使􅀕之攺元河清先是周之群臣受封爵者皆未給租賦癸亥始詔柱國等貴臣邑户聽􅀉食佗縣五月庚午周大赦己丑齊以右僕射斛律光爲尚書令壬辰周以柱國楊忠爲大司空六月己亥以柱國蜀國公尉遟迥爲大司馬秋七月己丑納太子妃王氏金紫光禄大夫周之女也齊平秦王歸彦至兾州内不自安欲待齊主如晋陽乗虛入鄴其郎中令吕思禮告之詔大司馬叚韶司空婁叡討之歸彦於􅀯境置私驛聞大軍將至即閉城拒守長史宇文仲鸞等不從皆殺之歸彦自稱大丞相有衆四萬齊主以都官尚書封子繪兾州人祖父丗爲本州刺史得人心使乗傳至信都廵城諭以禍福吏民降者相繼城中動靜大小皆知之歸彦登城大呼云孝昭皇帝􅀄崩六軍百萬悉在臣手投身向鄴奉迎陛下當時不反今日豈反邪正恨髙元海畢義雲髙乾和誑惑聖上疾忌忠良但爲殺此三人即臨城自刎旣而城破單􅀐北走至交津獲之鎻送鄴乙巳載以露車㗸木靣􅅞劉桃枝臨之以刄擊鼓隨之并其子孫十五人皆棄市命封子繪行兾州事齊主知歸彦前譛清河王岳以歸彦家良賤百口賜岳家贈岳太師丁酉以段韶爲太􅀓婁叡爲司徒平陽王淹爲太宰斛律光爲司空趙郡王叡爲尚書令河間王孝琬爲左僕射癸亥齊主如晋陽上遣使聘齊九月戊辰朔日有食之以侍中都官尚書到仲舉爲尚書右僕射丹陽尹仲舉漑之弟子也吳明徹至臨川攻周廸不能克丁亥詔安成王頊代之冬十月戊戌詔以軍旅費廣百姓空虚凢供乗輿飲食衣服及宫中調度悉從减削至於百司宜亦思省約十一月丁邜周以趙國公招為益州緫管丁丑齊遣兼散􅀐常侍封孝琰來聘十二月丙辰齊主還鄴齊主逼通昭信李后曰􅀂不從我我殺爾兒后懼從之旣而有娠太原王紹德至閤不得見愠曰兒豈不知邪姊腹大故不見兒后大慙由是生女不舉帝横刀詬曰殺我女我何得不殺爾兒對后以刀環築殺紹德后大哭帝愈怒裸后亂撾之后號天不已帝命盛以絹囊流血淋漉投諸渠水良乆乃蘇犢車載送妙勝為尼資治通鑑卷第一百六十八
