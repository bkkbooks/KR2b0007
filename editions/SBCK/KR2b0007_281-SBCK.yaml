body:
  text: 臣司馬光奉勑編集後晉紀二雍閹茂凡二年起強圉作噩盡著髙祖聖文章武明德孝皇帝上之下天福二年春正月乙卯日有食之詔以前北面招收指揮使安重榮為成德節度使以祕瓊為齊州防禦使遣引進使王景崇諭瓊以利害重榮與契丹將趙思温偕如鎮州瓊不敢拒命丙辰重榮奏巳視事景崇邢州人也契丹以幽州為南京李崧吕琦逃匿於伊闕民間帝以始鎮河東崧有力焉德之亦不責琦乙丑以琦為祕書監丙寅以崧為兵部侍郎判戸部初天雄節度使兼中書令范延光微時有術士張生語之云必為將相延光旣貴信重之延光嘗夢蛇自臍入腹以問張生張生曰蛇者龍也帝王之兆延光由是有非望之志唐潞王素與延光善及趙德鈞敗延光自遼州引兵還魏州雖奉表請降内不自安以書潜結祕瓊欲與之為亂瓊受其書不報延光恨之瓊將之齊過魏境延光欲滅口且利其貨遣兵邀之於夏津殺之丁卯延光奏稱夏津捕盜兵誤殺瓊帝不問戊寅以李崧為中書侍郎同平章事充樞密使桑維翰兼樞密使時晉新得天下藩鎮多未服從或雖服從反仄不安兵火之餘府庫殫竭民間困窮而契丹徴求無厭維翰勸帝推誠弃怨以撫藩鎮卑辭厚禮以奉契丹訓卒繕兵以修武備務農桑以實倉廪通啇賈以豐貨財數年之間中國稍安吳太子璉納齊王知誥女為妃知誥始建太廟社稷改金陵為江寧府牙城曰宫城㕔堂曰殿以左右司馬宋齊丘徐玠為左右丞相馬歩判官周宗内樞判官黟人周廷玉為内樞使自餘百官皆如吳朝之制置騎兵八軍歩兵九軍二月吳主以盧文進為宣武節度使兼侍中戊子吳主使冝陽王璪如西都冊命齊王王受冊赦境内冊王妃曰王后吳越王元瓘之弟順化節度使同平章事元珦獲罪於元瓘廢為庶人契丹主自上黨歸過雲州大同節度使沙彦珣出迎契丹主留之不使還鎮節度判官吳巒在城中謂其衆曰吾屬禮義之俗安可臣於夷狄乎衆推巒領州事閉城不受契丹之命契丹攻之不克應州馬軍都指揮使金城郭崇威亦恥臣契丹挺身南歸契丹主過新州命威塞節度使翟璋斂犒軍錢十萬緡初契丹主阿保機強盛室韋奚霫皆役屬焉奚王去諸苦契丹貪虐帥其衆西徙嬀州依劉仁恭父子號西奚去諸卒子掃剌立唐莊宗滅劉守光賜掃刺姓李名紹威紹威娶契丹逐不魯之姊逐不魯獲罪於契丹奔紹威紹威納之契丹怒攻之不克紹威卒子拽刺立及契丹主德光自上黨北還拽刺迎降時逐不魯亦卒契丹主曰汝誠無罪掃刺逐不魯負我皆命發其骨磑而颺之諸奚畏契丹之虐多逃叛契丹主勞翟璋曰當為汝除代令汝南歸己亥璋表乞徴詣闕旣而契丹遣璋將兵討叛奚攻雲州有功留不遣璋鬱鬱而卒張礪自契丹逃歸為追騎所獲契丹主責之曰何故捨我去對曰臣華人飲食衣服皆不與此同生不如死願早就戮契丹主顧通事髙彦英曰吾常戒汝善遇此人何故使之失所而亡去若失之安可復得邪笞彦英而謝礪礪事契丹主甚忠直遇事輒言無所隠避契丹主甚重之初吳越王鏐少子元㺷數有軍功鏐賜之兵仗及吳越王元瓘立元㺷為土客馬歩軍都指揮使静江節度使兼中書令恃恩驕横増置兵仗至數千國人多附之元瓘忌之使人諷元㺷請輸兵仗出判温州元㺷不從銅官廟吏告元㺷遣親信禱神求主吳越江山又為蠟丸從水竇出入與兄元珦謀議三月戊午元瓘遣使者召元㺷宴宫中旣至左右稱元㺷有刃墜於懷䄂即格殺之并殺元珦元瓘欲按諸將吏與元珦元㺷交通者其子仁俊諌曰昔光武克王郎曹公破袁紹皆焚其書疏以安反側今冝効之元瓘從之或得唐潞王膂及髀骨獻之庚申詔以王禮􅁙於徽陵南帝遣使詣蜀告即位且叙姻好蜀主復書用敵國禮范延光聚卒繕兵悉召巡内刺史集魏州將作亂㑹帝謀徙都大梁桑維翰曰大梁北控燕趙南通江淮水陸都㑹資用冨饒今延光反形巳露大梁距魏不過十驛彼若有變大軍尋至所謂疾雷不及掩耳也丙寅下詔託以洛陽漕運有闕東巡汴州吳徐知誥立子景通為王太子固辭不受追尊考忠武王温曰太祖武王妣明德大妃李氏曰王太后壬申更名誥庚辰帝發洛陽留前朔方節度使張從賓為東都巡檢使漢主以疾愈大赦交州將皎公羨殺安南節度使楊廷藝而代之夏四月丙戌帝至汴州丁亥大赦吳越王元瓘復建國如同光故事丙申赦境内立其子弘僔為世子以曹仲達沈崧皮光業為丞相鎮海節度判官林鼎掌教令丁酉加宣武節度使楊光逺兼侍中閩主作紫微宫飾以水晶土木之盛倍於寳皇宫又遣使散詣諸州伺人隠慝五月吳徐誥用宋齊丘䇿欲結契丹以取中國遣使以美女珍玩泛海修好契丹主亦遣使報之丙辰敕權署汴州牙城曰大寧宫壬申進范延光爵臨清郡王以安其意追尊四代考妣為帝后己卯詔太社所藏唐室罪人首聽親舊収􅁙初右武衛上將軍婁繼英嘗事梁均王為内諸司使至是請其首而􅁙之六月吳諸道副都統徐景遷卒范延光素以軍府之政委元隨左都押牙孫鋭鋭恃恩専橫符奏有不如意者對延光手裂之㑹延光病經旬鋭密召澶州刺史馮暉與之合謀逼延光反延光亦思張生之言遂從之甲午六宅使張言奉使魏州還言延光反狀義成節度使符彦饒奏延光遣兵度河焚草市詔侍衛馬軍都指揮使昭信節度使白奉進將千五百騎屯白馬津以備之奉進雲州人也丁酉以東都巡檢使張從賓為魏府西南面都部署戊戌遣侍衞都軍使楊光逺將步騎一萬屯滑州己亥遣護聖都指揮使杜重威將兵屯衛州重威朔州人也尚帝妹樂平長公主范延光以馮暉為都部署孫鋭為兵馬都監將歩騎二萬循河西抵黎陽口辛丑楊光逺奏引兵踰胡梁渡以翰林學士禮部侍郎和凝為端明殿學士凝署其門不通賔客前耀州團練推官襄邑張誼致書于凝以為切近之職為天子耳目冝知四方利病奈何拒絶賓客雖安身為便如負國何凝奇之薦於桑維翰未幾除左拾遺誼上言北狄有援立之功宜外敦信好内謹邊備不可自逸以啓戎心帝深然之契丹攻雲州半嵗不能下吳巒遣使間道奉表求救帝為之致書契丹主請之契丹主乃命翟璋解圍去帝召巒歸以為武寧節度副使丁未以侍衛使楊光逺為魏府四面都部署張從賓為副部署兼諸軍都虞候昭義節度使髙行周將本軍屯相州為魏府西面都部署軍士郭威舊􅀠劉知逺當從楊光逺北征白知逺乞留人問其故威曰楊公有姦詐之才無英雄之氣得我何用能用我者其劉公乎詔張從賓發河南兵數千人擊范延光延光使人誘從賓從賓遂與之同反殺皇子河陽節度使重信使上將軍張繼祚知河陽留後繼祚全義之子也從賓又引兵入洛陽殺皇子權東都留守重又以東都副留守都巡檢使張延播知河南府事從賔取内庫錢帛以賞部兵留守判官李遐不與兵衆殺之從賓引兵東扼汜水闗將逼汴州詔奉國都指揮使矦益帥禁兵五千㑹杜重威討張從賓又詔宣徽使劉處讓自黎陽分兵討之時羽檄縱横從官在大梁者無不恟懼獨桑維翰從容指畫軍事神色自若接對賓客不改常度衆心差安方士言於閩主云有白龍夜見螺峯閩主作白龍寺時百役繁興用度不足閩主謂吏部侍郎判三司候官蔡守蒙曰聞有司除官皆受賂有諸對曰浮言無足信也閩主曰朕知之久矣今以委卿擇賢而受不肖及罔冒者勿拒第令納賂籍而獻之守蒙素亷以為不可閩主怒守蒙懼而從之自是除官但以貨多寡為差閩主又以空名堂牒使醫工陳究賣官於外専務聚斂無有盈厭又詔民有隠年者杖背隠口者死逃亡者族果菜雞豚皆重征之秋七月張從賓攻汜水殺巡檢使宋廷浩帝戎服嚴輕騎將奔晉陽以避之桑維翰叩頭苦諌曰賊鋒雖盛勢不能久請少待之不可輕動帝乃止范延光遣使以蠟丸招誘失職者右武衛上將軍婁繼英右衞大將軍尹暉在大梁温韜之子延濬延沼延衮居許州皆應之延光令延濬兄弟取許州聚徒巳及千人繼英暉事泄皆出走壬子敕以延光姦謀誣汙忠良自今獲延光諜人賞獲者殺諜人禁蠟書勿以聞暉將奔吳為人所殺繼英奔許州依温氏忠武節度使萇從簡盛為之備延濬等不得發欲殺繼英以自明延沼止之遂同奔張從賓繼英知其謀勸從賓執三温皆斬之白奉進在滑州軍士有夜掠者捕之獲五人其三􅀠奉進其二􅀠符彦饒奉進皆斬之彦饒以其不先白巳甚怒明日奉進從數騎詣彦饒謝彦饒曰軍中各有部分奈何取滑州軍士并斬之殊無客主之義乎奉進曰軍士犯法何有彼我僕巳引咎謝公而公怒不解豈非欲與延光同反邪拂衣而起彦饒不留帳下甲士大譟擒奉進殺之從騎走出大呼於外諸軍爭擐甲操兵諠譟不可禁止奉國左廂都指揮使馬萬惶惑不知所為帥歩兵欲從亂遇右廂都指揮使盧順密帥部兵出營厲聲謂萬曰符公擅殺白公必與魏城通謀此去行宫纔二百里吾輩及軍士家屬皆在大梁奈何不思報國乃欲助亂自求族滅乎今日當共擒符公送天子立大功軍士從命者賞違命者誅勿復疑也萬部兵尚有呼躍者順密殺數人衆莫敢動萬不得已從之與奉國都虞候方太等共攻牙城執彦饒令太部送大梁甲寅敕斬彦饒於班荆館其兄弟皆不問楊光逺自白臯引兵趣滑州士卒聞滑州亂欲推光逺為主光逺曰天子豈汝輩販弄之物晉陽之降出於窮迫今若改圖真反賊也其下乃不敢言時魏孟滑三鎮繼叛人情大震帝問計於劉知逺對曰帝者之興自有天命陛下昔在晉陽粮不攴五日俄成大業今天下巳定内有勁兵北結彊虜䑕輩何能為乎願陛下撫將相以恩臣請戢士卒以威恩威兼著京邑自安本根深固則枝葉不傷矣知逺乃嚴設科禁宿衛諸軍無敢犯者有軍士盜紙錢一幞主者擒之左右請釋之知逺曰吾誅其情不計其直竟殺之由是衆皆畏服乙卯以楊光逺為魏府行營都招討使兼知行府事以昭義節度使髙行周為河南尹東京留守以杜重威為昭義節度使充侍衛馬軍都指揮使以矦益為河陽節度使帝以滑州奏事皆馬萬為首擢萬為義成節度使丙辰以盧順密為果州團練使方太為趙州刺史旣而知皆順密之功也更以順密為昭義留後馮暉孫銳引兵至六明鎮光逺引之度河半度而擊之暉鋭衆大敗多溺死斬首三千級暉鋭走還魏杜重威矦益引兵至汜水遇張從賓衆萬餘人與戰俘斬殆盡遂克汜水從賓走乘馬度河溺死獲其黨張延播繼祚婁繼英送大梁斬之滅其族史館修撰李濤上言張全義有再造洛邑之功乞免其族乃止誅繼祚妻子濤回之族曽孫也詔東都留守司百官悉赴行在楊光逺奏知博州張暉舉城降安州威和指揮使王暉聞范延光作亂殺安逺節度使周瓌自領軍府欲俟延光勝則附之敗則度江奔吳帝遣右領軍上將軍李金全將千騎如安州巡檢許赦王暉以為唐州刺史范延光知事不濟歸罪於孫鋭而族之遣使奉表待罪戊寅楊光逺以聞帝不許吳同平章事王令謀如金陵勸徐誥受禪誥讓不受山南東道節度使安從進恐王暉奔吳遣行軍司馬張朏將兵㑹復州兵於要路邀之暉大掠安州將奔吳部將胡進殺之八月癸巳以狀聞李金全至安州將士之預於亂者數百人金全説諭悉遣詣闕旣而聞指揮使武彦和等數十人挾賄甚多伏兵于野執而斬之彦和且死呼曰王暉首惡天子猶赦之我輩脅從何罪乎帝雖知金全之情掩而不問吳歴陽公濛知吳將亡甲午殺守衛軍使王宏宏子勒兵攻濛濛射殺之以德勝節度使周本吳之勲舊引二騎詣廬州欲依之本聞濛至將見之其子弘祚固諌本怒曰我家郎君來何為不使我見弘祚合扉不聽本出使人執濛于外送江都徐誥遣使稱詔殺濛於采石追廢為悖逆庶人絶屬籍侍衛軍使郭悰殺濛妻子於和州誥歸罪於悰貶池州乙巳赦張從賓符彦饒王暉之黨未伏誅者皆不問梁唐以來士民奉使及俘掠在契丹者悉遣使贖還其家吳司徒門下侍郎同平章事内樞使忠武節度使王令謀老病無齒或勸之致仕令謀曰齊王大事未畢吾何敢自安疾亟力勸徐誥受禪是月吳主下詔禪位于齊李德誠等復詣金陵帥百官勸進宋齊丘不署表九月癸丑令謀卒甲寅以李金全為安逺節度使婁繼英未及􅁙梁均王而誅死詔梁故臣右衛上將軍安崇阮與王故妃郭氏􅁙之丙寅吳主命江夏王璘奉璽綬于齊冬十月甲申齊王誥即皇帝位于金陵大赦改元昇元國號唐追尊太祖武王曰武皇帝乙酉遣右丞相玠奉冊詣吳主稱受禪老臣誥謹拜稽首上皇帝尊號曰髙尚思玄弘古讓皇宫室乗輿服御皆如故宗廟正朔徽章服色悉從吳制丁亥立徐知證為江王徐知諤為饒王以吳太子璉領平盧節度使兼中書令封弘農公唐主宴羣臣於天泉閣李德誠曰陛下應天順人惟宋齊丘不樂因出齊丘止德誠勸進書唐主執書不視曰子嵩三十年舊交必不相負齊丘頓首謝己丑唐主表讓皇改東都宫殿名皆取於仙經讓皇常服羽衣習辟糓術辛卯吳宗室建安王珙等十二人皆降爵為公而加官増邑丙申以吳同平章事張延翰及門下侍郎張居詠中書侍郎李建勲並同平章事讓皇以唐主上表致書辭之唐主表謝而不改丁酉加宋齊丘大司徒齊丘雖為左丞相不預政事心愠懟聞制詞云布衣之交抗聲曰臣為布衣時陛下為刺史今日為天子可不用老臣矣還家請罪唐主手詔謝之亦不改命久之齊丘不知所出乃更上書請遷讓皇於它州及斥逺吳太子璉絶其昬唐主不從乙巳立王后宋氏為皇后戊申以諸道都統判元帥府事景通為諸道副元帥判六軍諸衛事太尉尚書令吳王閩主命其弟威武節度使繼恭上表告嗣位于晉且請置邸于都下十一月乙卯唐吳王景通更名璟唐主賜楊璉妃號永興公主妃聞人呼公主則流涕而辭戊午唐主立其子景遂為吉王景達為夀陽公以景遂為侍中東都留守江都尹帥留司百官赴東都戊辰詔加吳越王元瓘天下兵馬副元帥進封吳越國王安逺節度使李金全以親吏胡漢筠為中門使軍府事一以委之漢筠貪猾殘忍聚歛無厭帝聞之以亷吏賈仁沼代之且召漢筠欲授以它職庶保全功臣漢筠大懼始勸金全以異謀乙亥金全表漢筠病未任行金全故人龐令圖屢諌曰仁沼忠義之士以代漢筠所益多矣漢筠夜遣壯士踰垣滅令圖之族又毒仁沼舌爛而卒漢筠與推官張緯相結以諂惑金全金全愛之彌篤十二月戊申蜀大赦改明年元曰明德詔加馬希範江南諸道都統制置武平静江等軍事是嵗契丹改元㑹同國號大遼公卿庶官皆倣中國參用中國人以趙延壽為樞密使尋兼政事令三年春正月己酉日有食之唐德勝節度使兼中書令西平恭烈王周本以不能存吳愧恨而卒丙寅唐以侍中吉王景遂參判尚書都省蜀主以武信節度使同平章事張業為左僕射兼中書侍郎同平章事樞密使武泰節度使王處回兼武信節度使同平章事二月庚辰左散騎常侍張允上駮赦論以為帝王遇天災多肆赦謂之修德借有二人坐獄遇赦則曲者幸免直者銜寃寃氣升聞乃所以致災非所以弭災也詔襃之帝樂聞讜言詔百官各上封事命吏部尚書梁文矩等十人置詳定院以考之無取者留中可者行之數月應詔者無十人乙未復降御札趣之三月丁丑敕禁民作銅器初唐世天下鑄錢有三十六冶䘮亂以來皆廢絶錢日益耗民多銷錢為銅器故禁之中書舍人李詳上疏以為十年以來赦令屢降諸道職掌皆許推恩而藩方薦論動踰數百乃至藏典書吏優伶奴僕初命則至銀青階被服皆紫袍象笏名器僣濫貴賤不分請自今諸道主兵將校之外節度州聽奏朱記大將以上十人它州止聽奏都押牙都虞候孔目官自餘但委本道量遷職名而巳從之夏四月甲申唐宋齊丘自陳丞相不應不豫政事唐主荅以省署未備吳讓皇固辭舊宫屢請徙居李德誠等亦亟以為言五月戊午唐主改潤州牙城為丹楊宫以李建勲為迎奉讓皇使楊光逺自恃擁重兵頗干預朝政屢有抗奏帝常曲意從之庚申以其子承祚為左威衛將軍尚帝女長安公主次子承信亦拜美官寵冠當時壬戌唐主以左宣威副統軍王輿為鎮海留後客省使公孫圭為監軍使親吏馬思讓為丹楊宫使徙讓皇居丹楊宫宋齊丘復自陳為左右所間唐主大怒齊丘歸第白衣待罪或曰齊丘舊臣不宜以小過弃之唐主曰齊丘有才不識大體乃命吳王璟持手詔召之六月壬午或獻毒酒方於唐主唐主曰犯吾法者自有常刑安用此為羣臣争請改府寺州縣名有吳及陽者留守判官楊嗣請更姓羊徐玠曰陛下自應天順人事非逆取而諂邪之人専事改更咸非急務不可從也唐主然之河南留守髙行周奏修洛陽宫丙戌左諫議大夫薛融諌曰今宫室雖經焚毁猶侈於帝尭之茅茨所費雖寡猶多於漢文之露臺况魏城未下公私困窘誠非陛下修宫館之日請俟海内平寧營之未晚上納其言仍賜詔襃之己丑金部郎中張鑄奏竊見鄉村浮戸非不勤稼穡非不樂安居但以種木未盈十年墾田未及三頃似成生業巳為縣司収供徭役責之重賦威以嚴刑故不免捐功捨業更思他適乞自今民墾田及五頃以上三年外乃聽縣司徭役從之秋七月中書奏朝代雖殊條制無異請委官取明宗及清泰時敕詳定可久行者編次之己酉詔左諌議大夫薛融等詳定辛酉敕作受命寳以受天明命惟德允昌為文八月帝上尊號於契丹主及太后戊寅以馮道為太后冊禮使左僕射劉煦為契丹主冊禮使備鹵簿儀仗車輅詣契丹行禮契丹主大悦帝事契丹甚謹奉表稱臣謂契丹主為父皇帝毎契丹使至帝於别殿拜受詔敕歳輸金帛三十萬之外吉凶慶弔歳時贈遺玩好珍異相繼於道乃至應天太后元帥太子偉王南北二王韓延徽趙延壽等諸大臣皆有賂遺小不如意輒來責讓帝常卑辭謝之晉使者至契丹契丹驕倨多不遜語使者還以聞朝野咸以為恥而帝事之曾無倦意以是終帝之世與契丹無隙然所輸金帛不過數縣租賦往往託以民困不能滿數其後契丹主屢止帝上表稱臣但令為書稱兒皇帝如家人禮初契丹主旣得幽州命曰南京以唐降將趙思温為留守思温子延照在晉帝以為祁州刺史思温密令延照言虜情終變請以幽州内附帝不許契丹遣使詣唐宋齊丘勸唐主厚賄之俟至淮北濳遣人殺之欲以間晉壬午楊光逺奏前澶州刺史馮暉自廣晉城中出戰因來降言范延光食盡窮困己丑以暉為義成節度使楊光逺攻廣晉嵗餘不下帝以師老民疲遣内内職朱憲入城諭范延光許移大藩曰若降而殺汝白日在上吾無以享國延光謂節度副使李式曰主上重信云不死則不死矣乃撤守備然猶遷延未決宣徽南院使劉處讓復入諭之延光意乃決九月乙巳朔楊光逺送延光二子守圖守英詣大梁己酉延光遣牙將奉表待罪壬子詔書至廣晉延光帥其衆素服於牙門使者宣詔釋之朱憲汴州人也契丹遣使如洛陽取趙延壽妻唐燕國長公主以歸壬戌唐太府卿趙可封請唐主復姓李立唐宗廟庚午楊光逺表乞入朝命劉處讓權知天雄軍府事己巳制以范延光為天平節度使仍賜鐵劵應廣晉城中將吏軍民今日以前罪皆釋不問其張從賓符彦饒餘黨及自官軍逃叛入城者亦釋之延光腹心將佐李式孫漢威薛霸皆除防禦團練使刺史牙兵皆升為侍衛親軍初河陽行軍司馬李彦珣邢州人也父母在鄉里未嘗供饋後與張從賓同反從賔敗奔廣晉范延光以為歩軍都監使登城拒守楊光逺訪獲其母置城下以招之彦珣引弓射殺其母延光旣降帝以彦珣為坊州刺史近臣言彦珣殺母殺母惡逆不可赦帝曰赦令巳行不可改也乃遣之官臣光曰治國者固不可無信然彦珣之惡三靈所不容晉髙祖赦其叛君之愆治其殺母之罪何損於信哉辛未以楊光逺為天雄節度使冬十月戊寅契丹遣使奉寶冊加帝尊號曰英武明義皇帝帝以大梁舟車所㑹便於漕運丙辰建東京於汴州復以汴州為開封府以東都為西京以西都為晉昌軍節度帝遣兵部尚書王權使契丹謝尊號權自以累世將相恥之謂人曰吾老矣安能向穹廬屈膝乃辭以老疾帝怒戊子權坐停官初郭崇韜旣死宰相罕有兼樞密使者帝即位桑維翰李崧兼之宣徽使劉處讓及宦官皆不悦楊光逺圍廣晉處讓數以軍事銜命往來光逺奏請多踰分帝常依違維翰獨以法裁折之光逺對處讓有不平語處讓曰是皆執政之意光逺由是怨執政范延光降光逺密表論執政過失帝知其故而不得巳加維翰兵部尚書崧工部尚書皆罷其樞密使以處讓為樞密使太常奏今建東京而宗廟社稷皆在西京請遷置大梁敕㫖且仍舊戊戌大赦楊延藝故將吳權自愛州舉兵攻皎公羨於交公州羨遣使以賂求救於漢漢主欲乘其亂而取之以其子萬王弘操為靜海節度使徙封交王將兵救公羨漢主自將屯于海門為之聲援漢主問策於崇文使蕭益益曰今霖雨積旬海道險逺吳權桀黠未可輕也大軍當持重多用鄉導然後可進不聽命弘操帥戰艦自白藤江趣交州權巳殺公羨據交州引兵逆戰先於海口多植大杙鋭其首冒之以鐵遣輕舟乗潮挑戰而偽遁弘操逐之須臾潮落漢艦皆礙鐵杙不得返漢兵大敗士卒覆溺者大半弘操死漢主慟哭収餘衆而還先是著作佐郎矦融勸漢主弭兵息民至是以兵不振追咎融剖棺暴其尸益倣之孫也楚順賢夫人彭氏卒彭夫人貌陋而治家有法楚王希範憚之旣卒希範始縱聲色為長夜之飲内外無别有啇人妻美希範殺其夫而奪之妻誓不辱自經死河決鄆州十一月范延光自鄆州入朝丙午以閩王昶為閩國王以左散騎常侍盧損為冊禮使賜昶赭袍戊申以威武節度使王繼恭為臨海郡王閩主聞之遣進奏官林恩白執政以旣襲帝號辭冊命及使者閩諌議大夫黄諷以閩主淫暴與妻子辭訣入諌閩主欲杖之諷曰臣若迷國不忠死亦無怨直諌被杖臣不受也閩主怒黜為民帝患天雄節度使楊光逺跋扈難制桑維翰請分天雄之衆加光逺太尉西京留守兼河陽節度使光逺由是怨望宻以賂自訴於契丹養部曲千餘人常蓄異志辛亥建鄴都於廣晉府置彰德軍於相州以澶衞􅀠之置永清軍於具州以博兾􅀠之澶州舊治頓丘帝慮契丹為後世之患遣前淄州刺史汲人劉繼勲徙澶州城跨德勝津并頓丘徙焉以河南尹髙行周為廣晉尹鄴都留守貝州防禦使王廷􅅌為彰德節度使右神武統軍王周為永清節度使廷􅅌處存之孫周鄴都人也范延光屢請致仕甲寅詔以太子太師致仕居于大梁每預宴㑹與羣臣無異延光之反也相州刺史掖人王景拒境不從戊午以景為耀州團練使癸亥敇聽公私自鑄銅錢無得雜以鈆鐵每十錢重一两以天福元寶為文仍令鹽鐵頒下模範惟禁私作銅器立右金吾衛上將軍重貴為鄭王充開封尹庚辰敕先許公私鑄錢慮銅難得聽輕重從便但勿令缺漏辛丑吳讓皇卒唐主廢朝二十七日追諡曰睿皇帝是嵗唐主徙吳王璟為齊王鳯翔節度使李從曮厚文士而薄武人愛農民而嚴士卒由是將士怨之㑹發兵戍西邉旣出郊作亂突門入城剽掠於市從曮發帳下兵撃之亂兵敗東走欲自訴於朝廷至華州
