body:
  text: 勑編集秦紀二黓執徐凡十九年起閼逢閹茂盡􅀇始皇帝下二十年荆軻至咸陽因王寵臣䝉嘉卑辭以求見王大喜朝服設九賔而見之荆軻奉圖而進於王圖窮而匕首見因把王袖而揕之未至身王驚起袖絶荆軻逐王王環柱而走群臣皆愕卒起不意盡失其度而秦法羣臣侍殿上者不得操尺寸之兵左右以手共搏之且曰王負劒負劒王遂拔以擊荆軻斷其左股荆軻廢乃引匕首擿王中銅柱自知事不就罵曰事所以不成者以欲生劫之必得約契以報太子也遂體解荆軻以徇王於是大怒益發兵詣趙就王翦以伐燕與燕師代師戰於易水之西大破之二十一年冬十月王翦拔薊燕王及太子率其精兵東保遼東李信急追之代王嘉遺燕王書令殺太子丹以獻丹匿衍水中燕王使使斬丹欲以獻王王復進兵攻之王賁伐楚取十餘城王問於將軍李信曰吾欲取荆於將軍度用幾何人而足李信曰不過用二十萬王以問王翦王翦曰非六十萬人不可王曰王將軍老矣何怯也遂使李信䝉恬將二十萬人伐楚王翦因謝病歸頻陽二十二年王賁伐魏引河溝以灌大梁三月城壞魏王假降殺之遂滅魏王使人謂安陵君曰寡人欲以五百里地易安陵安陵君曰大王加惠以大易小甚幸雖然臣受地於魏之先王願終守之弗敢易王義而許之李信攻平輿䝉恬攻寑大破楚軍信又攻鄢郢破之於是引兵而西與䝉恬會城父楚人因隨之三日三夜不頓舍大敗李信入兩壁殺七都尉李信犇還王聞之大怒自至頻陽謝王翦曰寡人不用將軍謀李信果辱秦軍將軍雖病獨忍棄寡人乎王翦謝病不能將王曰已矣勿復言王翦曰必不得已用臣非六十萬人不可王曰為聽將軍計耳於是將王翦將六十萬人伐楚王送至霸上王翦請美田宅甚衆王曰將軍行矣何憂貧乎王翦曰為大王將有功終不得封侯故及大王之嚮臣以請田宅為子孫業耳王大笑王翦既行至關使使還請善田者五輩或曰將軍之乞貸亦已甚矣王翦曰不然王怛中而不信人今空國中之甲士而専委於我我不多請田宅為子孫業以自堅顧令王坐而疑我矣二十三年王翦取陳以南至平輿楚人聞王翦益軍而來乃悉國中兵以禦之王翦堅壁不與戰楚人數挑戰終不出王翦日休士洗沐而善飲食撫循之親與士卒同食久之王翦使人問軍中戲乎對曰方投石超距王翦曰可用矣楚既不得戰乃引而東王翦追之令壯士擊大破楚師至蘄南殺其將軍項燕楚師遂敗走王翦因乗勝畧定城邑二十四年王翦䝉武虜楚王負芻以其地置楚郡二十五年大興兵使王賁攻遼東虜燕王喜臣光曰燕丹不勝一朝之忿以犯虎狼之秦輕慮淺謀挑怨速禍使召公之廟不祀忽諸罪孰大焉而論者或謂之賢豈不過哉夫為國家者任官以才立政以禮懷民以仁交鄰以信是以官得其人政得其節百姓懷其德四鄰親其義夫如是則國家安如磐石熾如焱火觸之者碎犯之者焦雖有彊暴之國尚何足畏哉丹釋此不為顧以萬乗之國决匹夫之怒逞盜賊之謀功隳身僇社稷為墟不亦悲哉夫其膝行蒲伏非恭也復言重諾非信也糜金散玉非惠也刎首決腹非勇也要之謀不逺而動不義其楚白公勝之流乎荆軻懷其豢養之私不顧七族欲以尺八匕首彊燕而弱秦不亦愚乎故揚子論之以要離為蛛蝥之靡聶政為壯士之靡荆軻為刺客之靡皆不可謂之義又曰荆軻君子盜諸善哉王賁攻代虜代王嘉王翦悉定荆江南地降百越之君置會稽郡五月天下大酺初齊君王后賢事秦謹與諸侯信齊亦東邊海上秦日夜攻三晉燕楚五國各自救以故齊王建立四十餘年不受兵及君王后且死戒王建曰群臣之可用者某王曰請書之君王后曰善王取筆牘受言君王后曰老婦已忘矣君王后死后勝相齊多受秦間金賔客入秦秦又多與金客皆為反間勸王朝秦不脩攻戰之備不助五國攻秦秦以故得滅五國齊王將入朝雍門司馬前曰所為立王者為社稷􅁘為王􅁘王曰為社稷司馬曰為社稷立王王何以去社稷而入秦齊王還車而反即墨大夫聞之見齊王曰齊地方四千里帶甲數百萬夫三晉大夫皆不便秦而在阿甄之間者百數王收而與之百萬人之衆使收三晉之故地即臨晉之闗可以入矣鄢郢大夫不欲為秦而在城南下者百數王收而與之百萬之師使收楚故地即武關可以入矣如此則齊威可立秦國可亡豈特保其國家而已哉齊王不聽二十六年王賁自燕南攻齊猝入臨淄民莫敢格者秦使人誘齊王約封以五百里之地齊王遂降秦遷之共處之松栢之間餓而死齊人怨王建不早與諸侯合從聽姦人賔客以亡其國歌之曰松耶栢耶住建共者客耶疾建用客之不詳也臣光曰從衡之説雖反覆百端然大要合從者六國之利也昔先王建萬國親諸侯使之朝聘以相交饗宴以相樂㑹盟以相結者無他欲其同心戮力以保國家也曏使六國能以信義相親則秦雖強暴安得而亡之哉夫三晉者齊楚之藩蔽齊楚者三晉之根柢形勢相資表裏相依故以三晉而攻齊楚自絶其根柢也以齊楚而攻三晉自撤其藩蔽也安有撤其藩蔽以媚盜曰盜將愛我而不攻豈不悖哉王初并天下自以為德兼三皇功過五帝乃更號曰皇帝命為制令為詔自稱曰朕追尊莊襄王為太上皇制曰死而以行為謚則是子議父臣議君也甚無謂自今以來除謚法朕為始皇帝後世以計數二世三世至于萬世傳之無窮初齊威宣之時鄒衍論著終始五德之運及始皇并天下齊人奏之始皇采用其説以為周得火德秦代周從所不勝為水德始改年朝賀皆自十月朔衣服旌旄節旗皆尚黑數以六為紀丞相綰等言燕齊荆地逺不為置王無以鎮之請立諸子始皇下其議廷尉斯曰周文武所封子弟同姓甚衆然後屬䟽逺相攻擊如􅄷讎周天子弗能禁止今海内頼陛下神靈一統皆為郡縣諸子功臣以公賦税重賞賜之甚足易制天下無異意則安寧之術也置諸侯不便始皇曰天下共苦戰鬬不休以有侯王頼宗廟天下初定又復立國是樹兵也而求其寧息豈不難哉廷尉議是分天下為三十六郡郡置守尉監收天下兵聚咸陽銷以為鐘鐻金人十二重各千石置宫廷中一法度衡石丈尺徙天下豪傑於咸陽十二萬户諸廟及章臺上林皆在渭南毎破諸侯寫放其宫室作之咸陽北阪上南臨渭自雍門以東至涇渭殿屋復道周閣相屬所得諸矦美人鍾鼓以充入之二十七年始皇巡隴西北地至雞頭山過回中焉作信宫渭南已更命曰極廟自極廟道通驪山作甘泉前殿築甬道自咸陽屬之治馳道於天下二十八年始皇東行郡縣上鄒嶧山立石頌功業於是召集魯儒生七十人至泰山下議封禅諸儒或曰古者封禪為蒲車惡傷山之土石草木埽地而祭席因葅稭議各乖異始皇以其難施用由此絀儒生而遂除車道上自太山陽至顛立石頌德從隂道下禅於梁父其禮頗采太祝之祀雍上帝所用而封藏皆祕之世不得而記也於是始皇遂東游海上行禮祠名山大川及八神始皇南登琅邪大樂之留三月作琅邪臺立石頌德明得意初燕人宋毋忌羡門子髙之徒稱有僊道形解銷化之術燕齊迂怪之士皆爭傳習之自齊威王宣王燕昭王皆信其言使人入海求蓬萊方丈瀛洲云此三神山在勃海中去人不逺患且至則風引舡去嘗有至者諸僊人及不死之藥皆在焉及始皇至海上諸方士齊人徐市等爭上書言之請得齊戒與童男女求之於是遣徐市發童男女數千人入海求之舡交海中皆以風解曰未能至望見之焉始皇還過彭城齊戒禱祠欲出周鼎泗水使千人沒水求之弗得乃西南渡淮水之衡山南郡浮江至湘山祠逢大風幾不能渡上問博士曰湘君何神對曰聞之堯女舜之妻􅁙此始皇大怒使刑徒三千人皆伐湘山樹赭其山遂自南郡由武闗歸初韓人張良其父祖以上五世相韓及韓亡良散千金之産欲為韓報仇二十九年始皇東游至陽武博浪沙中張良令力士操鐵椎狙擊始皇誤中副車始皇驚求弗得令天下大索十日始皇遂登之罘刻石旋之琅邪道上黨入三十一年使黔首自實田三十二年始皇之碣石使燕人盧生求羨門刻碣石門壞城郭决通堤坊始皇巡北邊從上郡入盧生使入海還因奏錄圖書曰亡秦者胡也始皇乃遣將軍䝉恬發兵三十萬人北伐匈奴三十三年發諸嘗逋亡人贅壻賈人為兵畧取南越陸梁地置桂林南海象郡以讁徙民五十萬人戍五嶺與越雜處蒙恬斥逐匈奴收河南地為四十四縣築長城因地形用制險塞起臨洮至遼東延袤萬餘里於是渡河據陽山逶迤而北􅁀師於外十餘年䝉恬常居上郡統治之威振匈奴三十四年謫治獄吏不直及覆獄故失者築長城及處南越地丞相李斯上書曰異時諸侯並爭厚招游學今天下已定法令出一百姓當家則力農工士則學習法令今諸生不師今而學古以非當世惑亂黔首相與非法教人聞令下則各以其學議之入則心非出則巷議誇主以為名異趣以為髙率羣下以造謗如此弗禁則主勢降乎上黨與成乎下禁之便臣請史官非秦記皆燒之非博士官所職天下有藏詩書百家語者皆詣守尉雜燒之有敢偶語詩書棄市以古非今者族吏見知不舉與同罪令下三十日不燒黔為城旦所不去者醫藥卜筮種樹之書若欲有學法令以吏為師制曰可魏人陳餘謂孔鮒曰秦將减先王之籍而子為書籍之主其危哉子魚曰吾為無用之學知吾者惟友秦非吾友吾何危哉吾將藏之以待其求求至無患矣三十五年使蒙恬除直道道九原抵雲陽塹山堙谷千八百里數年不就始皇以為咸陽人多先王之宫庭小乃營作朝宫渭南上林苑中先作前殿阿房東西五百步南北五十丈上可以坐萬人下可以建五丈旗周馳為閣道自殿下直抵南山表南山之顛以為闕為複道自阿房渡渭屬之咸陽以象天極閣道絶漢抵營室也隠宫徒刑者七十餘萬人乃分作阿房宫或作驪山發北山石椁冩蜀荆地材皆至關中計宫三百闗外四百餘於是立石東海上朐界中以為秦東門因徙三萬家驪邑五萬家雲陽皆復不事十歲盧生説始皇曰方中人主時為微行以辟惡鬼惡鬼辟真人至願上所居宫毋令人知然後不死之藥殆可得也始皇曰吾慕真人自謂真人不稱朕乃令咸陽之旁二百里内宫觀二百七十複道甬道相連帷帳鍾皷美人充之各案署不移徙所行幸有言其處者罪死始皇幸梁山宫從山上見丞相車騎衆弗善也中人或告丞相丞相後損車騎始皇怒曰此中人泄吾語案問莫服捕時在旁者盡殺之自是後莫知行之所在羣臣受决事者悉於咸陽宫侯生盧生相與譏議始皇因亡去始皇聞之大怒曰盧生等吾尊賜之甚厚今乃誹謗我諸生在咸陽者吾使人廉問或為妖言以亂黔首於是使御史悉案問諸生諸生傳相告引乃自除犯禁者四百六十餘人皆阬之咸陽使天下知之以懲後益發謫徙邊始皇長子扶蘇諫曰諸生皆誦法孔子今上皆重法繩之臣恐天下不安始皇怒使扶蘇北監䝉恬軍於上郡三十六年有隕石于東郡或刻其石曰始皇死而地分始皇使御史逐問莫服盡取石旁居人誅之燔其石遷河北榆中三萬家賜爵一級三十七年冬十月癸丑始皇出游左丞相斯從右丞相去疾守始皇二十餘子少子胡亥最愛請從上許之十一月行至雲夢望祀虞舜於九疑山浮江下觀籍柯渡海渚過丹陽至錢唐臨浙江水波惡乃西百二十里從陿中渡上會稽祭大禹望于南海立石頌德還過呉從江乗渡並海上北至琅邪之罘見巨魚射殺之遂並海西至平原津而病始皇惡言死羣臣莫敢言死事病益甚乃令中軍府令行符璽事趙髙為書賜扶蘇曰與䘮會咸陽而葬書已封在趙髙所未付使者秋七月丙寅始皇崩於沙丘平臺丞相斯為上崩在外恐諸公子及天下有變乃祕之不發䘮棺載輼涼車中故幸宦者驂乗所至上食百官奏事如故宦者輙從車中可其奏事獨胡亥趙髙及幸宦者五六人知之初始皇尊寵蒙氏信任之䝉恬任在外將䝉毅常居中參謀議名為忠信故雖諸將相莫敢與之争趙髙者生而隠宫始皇聞其彊力通於獄法舉以為中車府令使教胡亥决獄胡亥幸之趙髙有罪始皇使蒙毅治之毅當髙法應死始皇以髙敏於事赦之復其官趙髙既雅得幸於胡亥又怨䝉氏乃説胡亥請詐以始皇命誅扶蘇而立胡亥為太子胡亥然其計趙髙曰不與丞相謀恐事不能成乃見丞相斯曰上賜長子書及符璽皆在胡亥所定太子在君侯與髙之口耳事將何如斯曰安得亡國之言此非人臣所當議也髙曰君侯材能謀慮功髙無怨長子信之此五者皆孰與䝉恬斯曰不及也髙曰然則長子即位必用䝉恬為丞相君侯終不懷通侯之印歸鄉里明矣胡亥慈仁篤厚可以為嗣願君審計而定之丞相斯以為然乃相與謀詐為受始皇詔立胡亥為太子更為書賜扶蘇數以不能闢地立功士卒多耗反數上書直言誹謗日夜怨望不得罷歸為太子將軍恬不矯正知其謀皆賜死以兵屬禆將王離扶蘇發書泣入内舍欲自殺䝉恬曰陛下居外未立太子使臣將三十萬衆守邊公子為監此天下重任也今一使者來即自殺安知其非詐復請而後死未暮也使者數趣之扶蘇謂䝉恬曰父賜子死尚安復請即自殺䝉恬不肯死使者以屬吏繫諸陽周更置李斯舍人為護軍還報胡亥巳聞扶蘇死即欲釋䝉恬會䝉毅為始皇出禱山川還至趙髙言於胡亥曰先帝欲舉賢立太子久矣而毅諫以為不可不若誅之乃繫諸代遂從井陘抵九原會暑輼車臭乃詔從官令車載一石鮑魚以亂之從直道至咸陽發䘮太子胡亥襲位九月葬始皇於驪山下錮三泉竒器珍怪徙藏滿之令匠作機弩有穿近者輙射之以水銀為百川江河大海機相灌輸上具天文下具地理後宫無子者皆令從死葬既已下或言工匠為機藏皆知之藏重即泄大事盡閉之墓中二世欲誅䝉恬兄弟二世兄子子嬰諫曰趙王遷殺李牧而用顔聚齊王建殺其故世忠臣而用后勝卒皆亡國䝉氏秦之大臣謀士也而陛下欲一旦棄去之誅殺忠臣而立無節行之人是内使羣臣不相信而外使鬬士之意離也二世弗聽遂殺䝉毅及内史恬恬曰自吾先人及至子孫積功信於秦三世矣今臣將兵三十餘萬身雖囚繫其勢足以倍畔然自知必死而守義者不敢辱先人之教以不忘先帝也乃吞藥自殺揚子法言曰或問䝉恬忠而被誅忠奚可為也曰塹山堙谷起臨洮擊遼水力不足而屍有餘忠不足相也臣光曰秦始皇方毒天下而䝉恬為之使恬不仁不知矣然恬明於為人臣之義雖無辠見誅能守死不貳斯亦足稱也二世皇帝上元年冬十月戊寅大赦春二世東行郡縣李斯從到碣石並海南至會稽而盡刻始皇所立刻石旁著大臣從者名以章先帝成功盛德而還夏四月二世至咸陽謂趙髙曰夫人生居世間也譬猶騁六驥過決隙也吾旣已臨天下矣欲悉耳目之所好窮心志之所樂以終吾年壽可乎髙曰此賢主之所能行而昏亂主之所禁也雖然有所未可臣請言之夫沙丘之謀諸公子及大臣皆疑焉而諸公子盡帝兄大臣又先帝之所置也今陛下初立此其屬意怏怏皆不服恐為變臣戰戰栗栗唯恐不終陛下安得為此樂乎二世曰為之柰何趙髙曰陛下嚴法而刻刑令有罪者相坐誅滅大臣及宗室然後收舉遺民貧者富之賤者貴之盡除去先帝之故臣更置陛下之所親信者此則隂德歸陛下害除而姦謀塞羣臣莫不被潤澤䝉厚德陛下則髙枕肆志寵樂矣計莫出於此二世然之乃更為法律務益刻深大臣諸公子有罪輙下髙令鞠治之於是公子十二人僇死咸陽市十公主矺死於杜財物入於縣官相連逮者不可勝數公子將閭昆弟三人囚於内宫議其罪獨後二世使使令將閭曰公子不臣罪當死吏致法焉將閭曰闕廷之禮吾未嘗敢不從賔賛也廊廟之位吾未嘗敢失節也受命應對吾未嘗敢失辭也何謂不臣願聞罪而死使者曰臣不得與謀奉書從事將閭乃仰天大呼天者三曰吾無罪昆弟三人皆流涕拔劒自殺宗室振恐公子髙欲犇恐收族乃上書曰先帝無恙時臣入則賜食出則乗輿御府之衣臣得賜之中廐之寶馬臣得賜之臣當從死而不能為人子不孝為人臣不忠不孝不忠者無名以立於世臣請從死願葬驪山之足唯上幸哀憐之書上二世大説召趙髙而示之曰此可謂急乎趙髙曰人臣當憂死而不暇何變之得謀二世可其書賜錢十萬以葬復作阿房宫盡徵材士五萬人為屯衛咸陽令教射狗馬禽獸當食者多度不足下調郡縣轉輸菽粟芻槀皆令自齎糧食咸陽三百里内不得食其榖秋七月陽城人陳勝陽夏人呉廣起兵於蘄是時􅀤閭左戍漁陽九百人屯大澤鄉陳勝呉廣皆為屯長會天大雨道不通度已失期失期法皆斬陳勝呉廣因天下之愁怨乃殺將尉召令徒屬曰公等皆失期當斬假令毋斬而戍死者固什六七且壯士不死則已死則舉大名耳王侯將相寧有種乎衆皆從之乃詐稱公子扶蘇項燕為壇而盟稱大楚陳勝自立為將軍呉廣為都尉攻大澤鄉拔之收而攻蘄蘄下乃令符離人葛嬰將兵徇蘄以東攻銍酇苦柘譙皆下之行收兵比至陳車六七百乗騎千餘卒數萬人攻陳陳守尉皆不在獨守丞與戰譙門中不勝守丞死陳勝乃入據陳初大梁人張耳陳餘相與為刎頸交秦滅魏聞二人魏之名士重賞購求之張耳陳餘乃變名姓俱之陳為里監門以自食里吏嘗以過笞陳餘陳餘欲起張耳躡之使受笞吏去張耳乃引陳餘之桑下數之曰始吾與公言何如今見小辱而欲死一吏乎陳餘謝之陳涉旣入陳張耳陳餘詣門上謁陳涉素聞其賢大喜陳中豪傑父老請立涉為楚王涉以問張耳陳餘耳餘對曰秦為無道㓕人社稷暴虐百姓將軍出萬死之計為天下除殘也今始至陳而王之示天下私願將軍毋王急引兵而西遣人立六國後自為樹黨為秦益敵敵多則力分與衆則兵彊如此野無交兵縣無守城誅暴秦據咸陽以令諸侯諸侯亡而得立以德服之如此則帝業成矣今獨王陳恐天下懈也陳涉不聽遂自立為王號張楚當是時諸郡縣苦秦法爭殺長吏以應涉謁者使從東方來以反者聞二世怒下之吏後使者至上問之對曰羣盜䑕竊狗偷郡守尉方逐捕今盡得不足憂也上恱陳王以呉叔為假王監諸將以西擊滎陽張耳陳餘復説陳王請奇兵北畧趙地於是陳王以故所善陳人武臣為將軍邵騷為護軍以張耳陳餘為左右校尉予卒三千人徇趙陳王又令汝隂人鄧宗徇九江郡當此時楚兵數千人為聚者不可勝數葛嬰至東城立襄彊為楚王聞陳王已立因殺襄彊還報陳王誅殺葛嬰陳王令魏人周市北徇魏地以上蔡人房君蔡賜為上柱國陳王聞周文陳之賢人也習兵乃與之將軍印使西擊秦武臣等從白馬度河至諸縣説其豪傑豪傑皆應之乃行收兵得數萬人號武臣為武信君下趙十餘城餘皆城守乃引兵東北擊范陽范陽蒯徹説武信君曰足下必將戰勝而后畧地攻得然后下城臣竊以為過矣誠聽臣之計可不攻而降城不戰而畧地􅀓檄而千里定可乎武信君曰何謂也徹曰范陽令徐公畏死而貪欲先天下降君若以為秦所置吏誅殺如前十城則邊地之城皆為金城湯池不可攻也君若齎臣侯印以授范陽令使乗朱輪華轂驅馳燕趙之郊即燕趙城可毋戰而降矣武信君曰善以車百乗騎二百侯印迎徐公燕趙聞之不戰以城下者三十餘城陳王旣遣周章以秦政之亂有輕秦之意不復設僃愽士孔鮒諫曰臣聞兵法不恃敵之不我攻恃吾不可攻今王恃敵而不自恃若跌而不振悔之無及也陳王曰寡人之軍先生無累焉周文行收兵至闗車千乗卒數十萬至戲軍焉二世乃大驚與羣臣謀曰柰何少府章邯曰盗已至衆彊今發近縣不及矣驪山徒多請赦之授兵以擊之二世乃大赦天下使章邯免驪山徒人奴産子悉發以擊楚軍大敗之周文走張耳陳餘至邯鄲聞周章却又聞諸將為陳王徇地還者多以讒毁得罪誅乃説武信君令自王八月武信君自立為趙王以陳餘為大將軍張耳為右丞相邵騷為左丞相使人報陳王陳王大怒欲盡族武信君等家而發兵擊趙相國房君諫曰秦未亡而誅武信君等家此生一秦也不如因而賀之使急引兵西擊秦陳王然之從其計徙繫武信君等家宫中封張耳子敖為成都君使使者賀趙令趣發兵西入闗張耳陳餘説趙王曰王王趙非楚意特以計賀王楚已㓕秦必加兵於趙願王毋西兵北徇燕代南收河内以自廣趙南據大河北有燕代楚雖勝秦必不敢制趙不勝秦必重趙趙乗秦楚之敝可以得志於天下趙王以為然因不西兵而使韓廣畧燕李良畧常山張黶畧上黨九月沛人劉邦起兵於沛下相人項梁起兵於呉狄人田儋起兵於齊劉邦字季為人隆準龍顔左股有七十二黑子愛人喜施意豁如也常有大度不事家人生産作業初為泗上亭長單父人吕公好相人見季狀貌竒之以女妻之旣而季以亭長為縣送徒驪山徒多道亡自度比至皆亡之到豐西澤中亭止飲夜乃解縱所送徒曰公等皆去吾亦從此逝矣徒中壯士願從者十餘人劉季被酒夜徑澤中有大蛇當徑季拔劒斬蛇有老嫗哭曰吾子白帝子也化為蛇當道今赤帝子殺之因忽不見劉季亡匿於芒碭山澤巖石之間數有竒怪沛中子弟聞之多欲附者及陳涉起沛令欲以沛應之掾主吏蕭何曹參曰君為秦吏今欲背之率沛子弟恐不聽願君召諸亡在外者可得數百人因劫衆衆不敢不聽乃令樊噲召劉季劉季之衆已數十百人矣沛令後悔恐其有變乃閉城城守欲誅蕭曹蕭曹恐踰城保劉季劉季乃書帛射城上遺沛父老為陳利害父老乃率子弟共殺沛令開門迎劉季立以為沛公蕭曹等為收沛子弟得二三千人以應諸侯項梁者楚將項燕子也嘗殺人與兄子籍避仇呉中呉中賢士大夫皆出其下籍少時學書不成去學劒又不成項梁怒之籍曰書足以記名姓而已劒一人敵不足學學萬人敵於是項梁乃教籍兵法籍大喜畧知其意又不肯竟學籍長八尺餘力能扛鼎才器過人會稽守殷通聞陳涉起欲發兵以應涉使項梁及桓楚將是時桓楚亡在澤中梁曰桓楚亡人莫知其處獨籍知之耳梁乃出誡籍持劒居外梁復入與守坐曰請召籍使受命召桓楚守曰諾梁召籍入湏􅁷梁眴籍曰可行矣於是籍遂拔劒斬守頭項梁持守頭佩其印綬門下大驚擾亂籍所擊殺數十百人一府中皆慴伏莫敢起梁乃召故所知豪吏諭以所為起大事遂舉呉中兵使人收下縣得精兵八千人梁為會稽守籍為禆將徇下縣籍是時年二十四田儋者故齊王族也儋從弟榮榮弟横皆豪健宗彊能得人周市徇地至狄狄城守田儋詳為􅅞其奴從少年之廷欲謁殺奴見狄令因擊殺令而召豪吏子弟曰諸侯皆反秦自立齊古之建國也儋田氏當王遂自立為齊王發兵以擊周市周市軍還去田儋率兵東略定齊地韓廣將兵北徇燕燕地豪傑欲共立廣為燕王廣曰廣母在趙不可燕人曰趙方西憂秦南憂楚其力不能禁我且以楚之彊不敢害趙王將相之家趙獨安敢害將軍家乎韓廣乃自立為燕王居數月趙奉燕王母家屬歸之趙王與張耳陳餘北畧地燕界趙王間出為燕軍所得燕囚之欲求割地使者徃請燕輙殺之有厮養卒走燕壁見燕將曰君知張耳陳餘何欲曰欲得其王耳趙養卒笑曰君未知此兩人所欲也夫武臣張耳陳餘杖馬箠下趙數十城此亦各欲南面而王豈欲為卿相終已邪顧其勢初定未敢參分而王且以少長先立武臣為王以持趙心今趙地已服此兩人亦欲分趙而王時未可耳今君乃囚趙王此兩人名為求趙王實欲燕殺之此兩人分趙自立夫以一趙尚易燕况以两賢王左提右挈而責殺王之罪㓕燕易矣燕將乃歸趙王養卒為御而歸周市自狄還至魏地欲立故魏公子寗陵君咎為王咎在陳不得之魏魏地已定諸矦皆欲立周市為魏王市曰天下昏亂忠臣乃見今天下共畔秦其義必立魏王後乃可諸侯固請立市市終辭不受迎魏咎於陳五反陳王乃遣之立咎為魏王市為魏相是歲二世廢衛君角為庶人衛絶祀資治通鑑卷第七
