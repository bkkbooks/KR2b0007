body:
  text: 臣司馬光奉勑編集唐紀三十二昭陽大荒落凡六年有竒起强圉大淵獻十二月盡􅀇宗至道大聖大明孝皇帝下之上天寶六載十二月己巳上以仙芝為安西四鎭節度使徴靈詧入朝靈詧大懼仙芝見靈詧趨走如故靈詧益懼副都䕶京兆程千里押牙畢思琛及行官王滔等皆平日構仙芝於靈詧者也仙芝面責千里思琛曰公面雖男子心如婦人何也又捽滔等欲笞之既而皆釋之謂曰吾素所恨於汝者欲不言恐汝懷憂今既言之則無事矣軍中乃安初仙芝為都知兵馬使猗氏人封常清少孤貧細瘦纇目一足偏短求為仙芝傔不納常清日􅀱仙芝出入不離其門凡數十日仙芝不得已留之㑹達奚部叛走夫蒙靈詧使仙芝追之斬獲略盡常清私作捷書以示仙芝皆仙芝心所欲言者由是一府奇之仙芝為節度使即署常清判官仙芝出征常為留後仙芝乳母子鄭德詮為郎將仙芝遇之如兄弟使典家事威行軍中常清常出德詮走馬自後突之而過常清至使院使召德詮每過一門輒闔之既至常清離席謂曰常清本出寒微郎將所知今日中丞命為留後郎將何得於衆中相陵突因叱之曰郎將須蹔死以肅軍政遂杖之六十面仆地曳出仙芝妻及乳母於門外號哭救之不及因以狀白仙芝仙芝覽之驚曰巳死邪及見常清遂不復言常清亦不之謝軍中畏之惕息自唐興以來邊帥皆用忠厚名臣不乆任不遥領不兼統功名著者往往入為宰相其四夷之將雖才略如阿史那社爾契苾何力猶不專大將之任皆以大臣為使以制之及開元中天子有吞四夷之志為邊將者十餘年不易始乆任矣皇子則慶忠諸王宰相則蕭嵩牛仙客始遥領矣蓋嘉運王忠嗣專制數道始兼統矣李林甫欲杜邊帥入相之路以胡人不知書乃奏言文臣為將怯當矢石不若用寒俊胡人胡人則勇決習戰寒族則孤立無黨陛下誠以恩洽其心彼必能為朝廷盡死上悦其言始用安祿山至是諸道節度使盡用胡人精兵咸戍北邊天下之勢偏重卒使禄山傾覆天下皆出於林甫專寵固位之謀也七載夏四月辛丑左監門大將軍知内侍省事高力士加驃騎大將軍力士承恩嵗乆中外畏之太子亦呼之為兄諸王公呼之為翁駙馬輩直謂之爺自李林甫安祿山輩皆因之以取將相其家富厚不貲於西京作寶夀寺寺鍾成力士作齋以慶之舉朝畢集擊鐘一杵施錢百緡有求媚者至二十杵少者不減十杵然性和謹少過善觀時俯仰不敢驕横故天子終親任之士大夫亦不疾惡也五月壬午羣臣上尊號曰開元天寶聖文神武應道皇帝赦天下免百姓來載租庸擇後魏子孫一人為三恪六月庚子賜安祿山鐵劵度支郎中兼侍御史楊釗善窺上意所愛惡而迎之以聚斂驟遷歲中領十五餘使甲辰遷給事中兼御史中丞專判度支事恩幸日隆蘇冕論曰設官分職各有司存政有恒而易守事歸本而難失經逺之理捨此奚據洎姦臣廣言利以邀恩多立使以示寵刻下民以厚斂張虚數以獻狀上心蕩而益奢人望怨而成禍使天子有司守其位而無其事受厚祿而虚其用宇文融首唱其端楊慎矜王鉷繼遵其軌楊國忠終成其亂仲尼云寜有盜臣而無聚斂之臣誠哉是言前車既覆後轍未改求達化本不亦難乎冬十月庚戌上幸華清宫十一月癸未以貴妃姊適崔氏者為韓國夫人適裴氏者為虢國夫人適栁氏者為秦國夫人三人皆有才色上呼之為姨出入宫掖並承恩澤勢傾天下每命婦入見玉真公主等皆讓不敢就位三姊與銛錡五家凡有請託府縣承迎峻於制敕四方賂遺輻湊其門惟恐居後朝夕如市十宅諸王及百孫院昏嫁皆先以錢千緡賂韓虢使請無不如志上所賜與及四方獻遺五家如一競開第舍極其壯麗一堂之費動踰千萬既成見它人有勝己者輒毁而改為虢國尤為豪蕩一旦帥工徒突入韋嗣立宅即撤去舊屋自為新第但授韋氏以隙地十畝而已中堂既成召工圬墁約錢二百萬復求賞技虢國以絳羅五百段賞之嗤而不顧曰請取螻蟻蜥蜴記其數置堂中茍失一物不敢受直十二月戊戌或言􅀇元皇帝降於朝元閣制改㑹昌縣曰昭應廢新豐入昭應辛酉上還宫哥舒翰築神威軍於青海上吐蕃至翰擊破之又築城於青海中龍駒島謂之應龍城吐蕃屏迹不敢近青海是嵗雲南王歸義卒子閤羅鳳嗣以其子鳳迦異為陽􅀲州刺史八載春二月戊申引百官觀左藏賜帛有差是時州縣殷富倉庫積粟帛動以萬計楊釗奏請所在糶變為輕貨及徴丁租地税皆變布帛輸京師屢奏帑藏充牣古今罕儔故上帥羣臣觀之賜釗紫衣金魚以賞之上以國用豐衍故視金帛如糞壤賞賜貴寵之家無有限極三月朔方節度等使張齊丘於中受降城西北五百餘里木刺山築横塞軍以振逺軍使鄭人郭子儀為横塞軍使夏四月咸寜太守趙奉璋告李林甫罪二十餘條狀未達林甫知之諷御史逮捕以為妖言杖殺之先是折衝府皆有木契銅魚朝廷徵發下敕書契魚都督郡府參驗皆合然後遣之自募置彍騎府兵日益墮壞死及逃亡者有司不復㸃補其六䭾馬牛器械糗糧耗散略盡府兵入宿衛者謂之侍官言其為天子侍衛也其後本衛多以假人役使如奴􅀠長安人羞之至以相詬病其戍邊者又多為邊將若使利其死而沒其財由是應為府兵者皆逃匿至是無兵可交五月癸酉李林甫奏停折衝府上下魚書是後府兵徒有官吏而已其折衝果毅又歴年不遷士大夫亦恥為之其彍騎之法天寶已後稍亦變廢應募者皆市井負販無賴子弟未嘗習兵時承平日久議者多謂中國兵可銷於是民間挾兵器者有禁子弟為武官父兄擯不齒猛將精兵皆聚於西北邊中國無武備矣太白山人李渾等上言見神人言金星洞有玉板石記聖主福夀之符命御史中丞王鉷入仙遊谷求而獲之上以符瑞相繼皆祖宗休烈六月戊申上聖祖號曰大道􅀇元皇帝上高祖諡曰神堯大聖皇帝太宗諡曰文武大聖皇帝高宗諡曰天皇大聖皇帝中宗諡曰孝和大聖皇帝睿宗諡曰􅀇眞大聖皇帝竇太后以下皆加諡曰順聖皇后辛亥刑部尚書京兆尹蕭炅坐贓左遷汝陰太守上命隴右節度使哥舒翰帥寵右河西及突厥阿布思兵益以朔方河東兵凡六萬三千攻吐蕃石堡城其城三靣險絶惟一徑可上吐蕃但以數百人守之多貯糧食積檑木及石唐兵前後屢攻之不能克翰進攻數日不㧞召裨將高秀巖張守瑜欲斬之二人請三日期可克如期拔之獲吐蕃鐵刅悉諾羅等四百人唐士卒死者數萬果如王忠嗣之言頃之翰又遣兵於赤嶺西開屯田以謫卒二千戌龍駒島冬冰合吐蕃大集戌者盡没閏月乙丑以石堡城為神武軍又於劒南西山索磨川置保寜都護府丙寅上謁太清宫丁卯羣臣上尊號曰開元天地大寶聖文神武應道皇帝赦天下禘祫自今於太清宫聖祖前設位序正秋七月冊突騎施移撥為十姓可汗八月乙亥護蜜王羅眞檀入朝請留宿衛許之拜左武衛將軍冬十月乙丑上幸華清宫十一月乙未吐火羅葉䕶失里怛伽羅遣使表稱朅師王親附吐蕃困苦小勃律鎭軍阻其糧道臣思破凶徒望發安西兵以來歳正月至小勃律六月至大勃律上許之九載春正月己亥上還宫羣臣屢表請封西嶽許之二月楊貴妃復忤㫖送歸私第戸部郎中吉温因宦官言於上曰婦人識慮不逺違忤聖心陛下何愛宫中一席之地不使之就死豈忍辱之於外舍邪上亦悔之遣中使賜以御膳妃對使者涕泣曰妾罪當死陛下幸不殺而歸之今當永離掖庭金玉珍玩皆陛下所賜不足為獻惟髪者父母所與敢以薦誠乃翦髪一繚而獻之上遽使高力士召還寵待益深時諸貴戚競以進食相尚上命宦官姚思藝為檢校進食使水陸珍羞數千盤一盤費中人十家之産中書舍人竇華嘗退朝值公主進食列於中衢傳呼桉轡出其間宫苑小兒數百奮梃於前華僅以身免安西節度使高仙芝破朅師虜其王勃特没三月庚子立勃特没之兄素迦為朅師王上命御史大夫王鉷鑿華山路設壇􅂣於其上是春闗中旱辛亥嶽祠災制罷封西嶽夏四月己巳御史中丞宋渾坐贓巨萬流潮陽初吉温因李林甫得進及兵部侍郎兼御史中丞楊釗恩遇浸深温遂去林甫而附之為釗畫代林甫執政之策蕭炅及渾皆林甫所厚也求得其罪使釗奏而逐之以翦其心腹林甫不能救也五月乙卯賜安祿山爵東平郡王唐將帥封王自此始秋七月乙亥置廣文館於國子監以教諸生習進士者八月丁巳以安祿山兼河北道采訪處置使朔方節度使張齊丘給糧失宜軍士怒敺其判官兵馬使郭子儀以身捍齊丘乃得免癸亥齊丘左遷濟陰太守以河西節度使安思順權知朔方節度事辛卯處士崔昌上言國家宜承周漢以土代火周隋皆閏位不當以其子孫為二王後事下公卿集議集賢院學士衛包上言集議之夜四星聚於尾天意昭然上乃命求殷周漢後為三恪廢韓介􅈶公以昌為左賛善大夫包為虞部貟外郎冬十月庚申上幸華清宫太白山人王􅀇翼上言見􅀇元皇帝言寶仙洞有妙寶眞符命刑部尚書張均等往求得之時上尊道教慕長生故所在爭言符瑞羣臣表賀無虚月李林甫等皆請捨宅為觀以祝聖夀上恱安祿山屢誘奚契丹為設㑹飲以莨菪酒醉而阬之動數千人函其酋長之首以獻前後數四至是請入朝上命有司先為起第於昭應祿山至戲水楊釗兄弟姊妹皆往迎之冠蓋蔽野上自幸望春宫以待之辛未祿山獻奚俘八千人上命考課之日書上上考前此聽禄山於上谷鑄錢五壚祿山乃獻錢様千緡楊釗張易之之甥也奏乞昭雪易之兄弟庚辰制引易之兄弟迎中宗於房陵之功復其官爵仍賜一子官釗以圖䜟有金刀請更名上賜名國忠十二月乙亥上還宫闗西遊奕使王難得擊吐蕃克五橋拔樹敦城以難得為白水軍使安西四鎮節度使高仙芝偽與石國約和引兵襲之虜其王及部衆以歸悉殺其老弱仙芝性貪掠得瑟瑟十餘斛黄金五六槖駝其餘口馬雜貨稱是皆入其家楊國忠德鮮于仲通薦為劒南節度使仲通性􅄶急失蠻夷心故事南詔常與妻子俱謁都督過雲南雲南太守張䖍陀皆私之又多所徴求南詔王閤羅鳳不應䖍陀遣人詈辱之仍密奏其罪閤羅鳳忿怨是嵗發兵反攻陷雲南殺䖍陀取夷州三十二十載春正月壬辰上朝獻太清宫癸巳朝享太廟甲子合祀天地於南郊赦天下免天下今載地稅丁酉命李林甫遥領朔方節度使以戸部侍郎李暐知留後事庚子楊氏五宅夜遊與廣平公主從者爭西市門楊氏奴揮鞭及公主衣公主墜馬駙馬程昌裔下扶之亦被數鞭公主泣訴於上上爲之杖殺楊氏奴明日免昌裔官不聽朝謁上命有司爲安祿山起第於親仁坊敕令但窮壯麗不限財力既成具幄弈器皿充牣其中有帖白檀牀二皆長丈濶六尺銀平脱屏風帳一方一丈八尺於厨廐之物皆飾以金銀金飯甖二銀淘盆二皆受五斗織銀絲筐及笟篱各一它物稱是雖禁中服御之物殆不及也上每令中使爲祿山護役築第及造儲偫賜物常戒之曰胡眼大勿令笑我祿山入新第置酒乞降墨敕請宰相至第是日上欲於樓下擊毬遽為罷戲命宰相赴之日遣諸楊與之選勝遊宴侑以梨園教坊樂上每食一物稍美或後苑校獵獲鮮禽輒遣中使走馬賜之絡繹於路甲辰禄山生日上及貴妃賜衣服寶器酒饌甚厚後三日召禄山入禁中貴妃以錦繡為大襁褓裹禄山使宫人以綵輿舁之上聞後宫喧笑問其故左右以貴妃三日洗禄兒對上自往觀之喜賜貴妃洗兒金銀錢復厚賜禄山盡歡而罷自是禄山出入宫掖不禁或與貴妃對食或通宵不出頗有醜聲聞於外上亦不疑也安西節度使高仙芝入朝獻所擒突騎施可汗吐蕃酋長石國王朅師王加仙芝開府儀同三司尋以仙芝為河西節度使代安思順思順諷羣胡割耳剺面請留已制復留思順於河西安祿山求兼河東節度二月丙辰以河東節度使韓休珉為左羽林將軍以祿山代之戸部郎中吉温見祿山有寵又附之約為兄弟説祿山曰李右丞相雖以時事親三兄必不肯以兄為相温雖䝉驅使終不得超擢兄若薦温於上温即奏兄堪大任共排林甫出之為相必矣祿山悦其言數稱温才於上上亦忘曩日之言㑹祿山領河東因奏温為節度副使知留後以大理司直張通儒為留後判官河東事悉以委之是時楊國忠為御史中丞方承恩用事祿山登降殿階國忠常扶掖之祿山與王鉷俱為大夫鉷權任亞於李林甫祿山見林甫禮貌頗倨林甫陽以它事召王大夫鉷至趨拜甚謹祿山不覺自失容貌益恭林甫與祿山語每揣知其情先言之祿山驚服祿山於公卿皆慢侮之獨憚林甫每見雖盛冬常汗沾衣林甫乃引與坐於中書㕔撫以温言自解披袍以覆之祿山忻荷言無不盡謂林甫為十郎既歸范陽劉駱谷每自長安來必問十郎何言得美言則喜或但云語安大夫須好檢校輒反手據牀曰噫嘻我死矣禄山既兼領三鎭賞刑已出日益驕恣自以曩時不拜太子見上春秋高頗内懼又見武備墮弛有輕中國之心孔目官嚴莊掌書記高尚因為之解圖讖勸之作亂祿山養同羅奚契丹降者八千餘人謂之曳落河曳落河者胡言壯士也及家僮百餘人皆驍勇善戰一可當百又畜戰馬數萬匹多聚兵仗分遣商胡詣諸道販鬻嵗輸珍貨數百萬私作緋紫袍魚袋以百萬計以高尚嚴莊張通儒及將軍孫孝哲爲腹心史思明安守忠李歸仁蔡希德牛廷玠向潤容李庭望崔乾祐尹子奇何千年武令珣能元皓田承嗣田乾真阿史那承慶爲爪牙尚雍奴人本名不危頗有辭學薄遊河朔貧困不得志常歎曰高不危當舉大事而死豈能齧草根求活邪祿山引置幕府出入卧内尚典牋奏莊治簿書通儒萬嵗之子孝哲契丹也承嗣世爲盧龍小校祿山以爲前鋒兵馬使治軍嚴整嘗大雪祿山桉行諸營至承嗣營寂若無人入閲士卒無一人不在者祿山以是重之夏四月壬午劒南節度使鮮于仲通討南詔蠻大敗於瀘南時仲通將兵八萬分二道出戎雟州至曲州靖州南詔王閤羅鳳遣使謝罪請還所俘掠城雲南而去且曰今吐蕃大兵壓境若不許我我將歸命吐蕃雲南非唐有也仲通不許囚其使進軍至西洱河與閤羅鳳戰軍大敗士卒死者六萬人仲通僅以身免楊國忠掩其敗狀仍敘其戰功閤羅鳳斂戰尸築為京觀遂北臣於吐蕃蠻語謂弟為鍾吐蕃命閤羅鳳為贊普鍾號曰東帝給以金印閤羅鳳刻碑於國門言己不得已而叛唐且曰我世世事唐受其封賞後世容復歸唐當指碑以示唐使者知吾之叛非本心也制大募兩京及河南北兵以擊南詔人聞雲南多瘴癘未戰士卒死者什八九莫肻應募楊國忠遣御史分道捕人連枷送詣軍所舊制百姓有勲者免征役時調兵既多國忠奏先取高勲於是行者愁怨父母妻子送之所在哭聲振野高仙芝之虜石國王也石國王子逃詣諸胡具告仙芝欺誘貪暴之狀諸胡皆怒濳引大食欲共攻四鎭仙芝聞之將蕃漢三萬衆撃大食深入七百餘里至恒羅斯城與大食遇相持五日葛羅祿部衆叛與大食夾攻唐軍仙芝大敗士卒死亡略盡所餘纔數千人右威衛將軍李嗣業勸仙芝宵遁道路阻隘㧞汗那部衆在前人畜塞路嗣業前驅奮大梃擊之人馬俱斃仙芝乃得過將士相失别將汧陽段秀實聞嗣業之聲詬曰避敵先奔無勇也全已棄衆不仁也幸而得達獨無愧乎嗣業執其手謝之留拒追兵收散卒得俱免還至安西言於仙芝以秀實兼都知兵馬使為己判官八月丙辰武庫火燒兵器三十七萬安祿山將三道兵六萬以討契丹以奚騎二千為鄉導過平盧千餘里至土䕶眞水遇雨祿山引兵晝夜兼行三百餘里至契丹牙帳契丹大駭時乆雨弓弩筋膠皆弛大將何思德言於祿山曰吾兵雖多逺來疲弊實不可用不如按甲息兵以臨之不過三日虜必降祿山怒欲斬之思德請前驅效死思德貌類祿山虜爭擊殺之以為已得祿山勇氣增倍奚復叛與契丹合夾擊唐兵殺傷殆盡射祿山中鞍折冠簮失屨獨與麾下二十騎走㑹夜追騎解得入師州歸罪於左賢王哥解河東兵馬使魚承仙而斬之平盧兵馬使史思明懼逃入山谷近二旬收散卒得七百人平盧守将史定方將精兵二千救祿山契丹引去祿山乃得免至平盧麾下皆亡不知所出史思明出見祿山祿山喜起執其手曰吾得汝復何憂思明退謂人曰曏使早出已與哥解并斬矣契丹圍師州祿山使思明擊却之冬十月壬子上幸華清宫楊國忠使鮮于仲通表請已遥領劒南十一月丙午以國忠領劒南節度使十一載春正月丁亥上還宫二月庚午命有司出粟帛及庫錢數十萬緡於兩市易惡錢先是江淮多惡錢貴戚大商往往以良錢一易惡錢王載入長安市井不勝其弊故李林甫奏請禁之官爲易取期一月不輸官者罪之於是商賈囂然不以為便衆共遮楊國忠馬自言國忠為之言於上乃更命非鉛錫所鑄及穿穴者皆聽用之如故三月安禄山發蕃漢歩騎二十萬擊契丹欲以雪去秋之恥初突厥阿布思來降上厚禮之賜姓名李獻忠累遷朔方節度副使賜爵奉信王獻忠有才略不為安禄山下禄山恨之至是奏請獻忠帥同羅數萬騎與俱擊契丹獻忠恐為祿山所害白留後張暐請奏留不行暐不許獻忠乃帥所部大掠倉庫叛歸漠北祿山遂頓兵不進乙巳改吏部為文部兵部為武部刑部為憲部戸部侍郎兼御史大夫京兆尹王鉷權寵日盛領二十餘使宅旁為使院文案盈積吏求署一字累日不得前中使賜賚不絶於門雖李林甫亦畏避之林甫子岫為將作監鉷子凖為衛尉少卿俱供奉禁中凖陵侮岫岫常下之然鉷事林甫謹林甫雖忌其寵不忍害也凖嘗帥其徒過駙馬都尉王繇繇望塵拜伏凖挾彈命中於繇冠折其玉簮以為戲笑既而繇延凖置酒繇所尚永穆公主上之愛女也為凖親執刀匕凖去或謂繇曰䑕雖挾其父勢君乃使公主為之具食有如上聞無乃非宜繇曰上雖怒無害至於七郎死生所繫不敢不爾鉷弟戸部郎中銲凶險不法召術士任海川問我有王者之相否海川懼亡匿鉷恐事泄捕得託以它事杖殺之王府司馬韋㑹定安公主之子王繇之同産也話之私庭鉷又使長安尉賈季鄰收㑹繫獄縊殺之繇不敢言銲所善邢縡與龍武萬騎謀殺龍武將軍以其兵作辭殺李林甫陳希烈楊國忠前期二日有告之者夏四月乙酉上臨朝以告狀面授鉷使捕之鉷意銲在縡所先遣人召之日晏乃命賈季鄰等捕縡縡居金城坊季鄰等至門縡帥其黨數十人持弓刀格鬭突出鉷與楊國忠引兵繼至縡黨曰勿傷大夫人國忠之傔密謂國忠曰賊有號不可戰也縡鬭且走至皇城西南隅㑹高力士引飛龍禁軍四百至擊斬縡捕其黨皆擒之國忠以狀白上曰鉷必預謀上以鉷任遇深不應同逆李林甫亦爲之辨解上乃命特原銲不問然意欲鉷表請罪之使國忠諷之鉷不忍上怒㑹陳希烈極言鉷大逆當誅戊子敕希烈與國忠鞫之仍以國忠兼京兆尹於是任海川韋㑹等事皆發獄具鉷賜自盡銲杖死於朝堂鉷子凖偁流嶺南尋殺之有司籍其第舍數日不能徧鉷賓佐莫敢窺其門獨采訪判官裴冕收其尸葬之初李林甫以陳希烈易制引爲相政事常隨林甫左右晩節遂與林甫為敵林甫懼㑹李獻忠叛林甫乃請解朔方節制且薦河西節度使安思順自代庚子以思順為朔方節度使五月戊申慶王琮薨贈靖德太子丙辰京兆尹楊國忠加御史大夫京畿闗内採訪等使凡王鉷所綰使務悉歸國忠初李林甫以國忠微才且貴妃之族故善遇之國忠與王鉷俱為中丞鉷用林甫薦為大夫故國忠不恱遂深探邢縡獄令引林甫交私鉷兄弟及阿布思事狀陳希烈哥舒翰從而證之上由是疎林甫國忠貴震天下始與林甫為仇敵矣六月甲子楊國忠奏吐蕃兵六十萬救南詔劒南兵擊破之於雲南克故隰州等三城捕虜六千三百以道遠簡壯者千餘人及酋長降者獻之秋八月乙丑上復幸左藏賜羣臣帛癸巳楊國忠奏有鳳皇見左藏屋出納判官魏仲犀言鳳集庫西通訓門九月阿布思入寇圍永清柵柵使張元軌拒却之冬十月戊寅上幸華清宫己亥改通訓門曰鳳集門魏仲犀遷殿中侍御史楊國忠屬吏率以鳳皇優得調南詔數寇邊蜀人請楊國忠赴鎮左僕射兼右相李林甫奏遣之國忠將行泣辭上言必為林甫所害貴妃亦為之請上謂國忠曰卿蹔到蜀區處軍事朕屈指待卿還當入相林甫時已有疾憂懣不知所為巫言一見上可小愈上欲就視之左右固諌上乃命林甫出庭中上登降聖閣遥望以紅巾招之林甫不能拜使人代拜國忠比至蜀上遣中使召還至昭應謁林甫拜於牀下林甫流涕謂曰林甫死矣公必為相以後事累公國忠謝不敢當汗流覆面十一月丁卯林甫薨上晩年自恃承平以為天下無復可憂遂深居禁中專以聲色自娛悉委政事於林甫林甫媚事左右迎合上意以固其寵杜絶言路掩蔽聦明以成其姦妬賢疾能排抑勝己以保其位屢起大獄誅逐貴臣以張其勢自皇太子以下畏之側足凡在相位十九年養成天下之亂而上不之寤也庚申以楊國忠為右相兼文部尚書其判使並如故國忠為人彊辯而輕躁無威儀既為相以天下為己任裁決機務果敢不疑居朝廷攘袂扼腕公卿以下頥指氣使莫不震慴自侍御史至為相凡領四十餘使臺省官有才行時名不為己用者皆出之或勸陜郡進士張彖謁國忠曰見之富貴立可圖彖曰君輩倚楊右相如泰山吾以為冰山耳若皎日既出君輩得無失所恃乎遂隠居嵩山國忠以司勲貟外郎崔圎為劒南留後徴魏郡太守吉温為御史中丞充京畿闗内採訪等使温詣范陽辭安祿山祿山令其子慶緒送至境為温控馬出驛數十步温至長安凡朝廷動靜輒報祿山信宿而達十二月楊國忠欲收人望建議文部選人無問賢不肖選深者留之依資據闕注官滯淹者翕然稱之國忠凡所施置皆曲徇時人所欲故頗得衆譽甲申以平盧兵馬使史思明兼北平太守充盧龍軍使丁亥上還宫丁酉以安西行軍司馬封常清為安西四鎭節度使哥舒翰素與安祿山安思順不協上常和解之使為兄弟是冬三人俱入朝上使高力士宴之於城東祿山謂翰曰我父胡母突厥公父突厥母胡族類頗同何得不相親翰曰古人云狐向窟嘷不祥為其忘本故也兄苟見親翰敢不盡心祿山以為譏其胡也大怒罵翰曰突厥敢爾翰欲應之力士目翰翰乃止陽醉而散自是為怨愈深棣王琰有二孺人爭寵其一使巫書符置琰履中以求媚琰與監院宦者有隙宦者知之宻奏琰祝詛上上使人掩其履而獲之大怒琰頓首謝臣實不知有符上使鞫之果孺人所為上猶疑琰知之囚於鷹狗坊絶朝請憂憤而薨故事兵吏部尚書知政事者選事悉委侍郎以下三注三唱仍過門下省審自春及夏其事乃畢及楊國忠以宰相領文部尚書欲自示精敏乃遣令史先於私第宻定名闕十二載春正月壬戌國忠召左相陳希烈及給事中諸司長官皆集尚書都堂唱注選人一日而畢曰今左相給事中俱在座已過門下矣其閒資格差繆甚衆無敢言者於是門下不復過官侍郎但掌試判而已侍郎韋見素張倚趨走門庭與主事無異見素湊之子也京兆尹鮮于仲通諷選人請為國忠刻頌立於省門制仲通撰其辭上為改定數字仲通以金填之楊國忠使人説安祿山誣李林甫與阿布思謀反祿山使阿布思部落降者詣闕誣告林甫與阿布思約為父子上信之下吏桉問林甫壻諫議大夫楊齊宣懼為所累附國忠意證成之時林甫尚未葬二月癸未制削林甫官爵子孫有官者除名流嶺南及黔中給隨身衣及糧食自餘貲産並没官近親及黨與坐貶者五十餘人剖林甫棺抉取舎珠禠金紫更以小棺如庶人禮葬之己亥賜陳希烈爵許國公楊國忠爵魏國公賞其成林甫之獄也夏五月己酉復以魏周隋後為三恪楊國忠欲攻李林甫之短也衛包以助邪貶夜郎尉崔昌貶烏雷尉阿布思為囘紇所破安祿山誘其部落而降之由是祿山精兵天下莫及壬辰以左武衛大將軍何復光將嶺南五府兵擊南詔安祿山以李林甫狡猾踰已故畏服之及楊國忠為相禄山視之蔑如也由是有隙國忠屢言祿山有反狀上不聽隴右節度使哥舒翰擊吐蕃拔洪濟大漠門等城悉收九曲部落初高麗人王思禮與翰俱為押牙事王忠嗣翰為節度使思禮為兵馬使兼河源軍使翰擊九曲思禮後期翰將斬之既而復召釋之思禮徐曰斬則遂斬復召何為楊國忠欲厚結翰與共排安祿山奏以翰兼河西節度使秋八月戊戌賜翰爵西平郡王翰表侍御史裴冕為河西行軍司馬是時中國盛彊自安逺門西盡唐境凡萬二千里閭閻相望桑麻翳野天下稱富庶者無如隴右翰毎遣使入奏常乗白槖駝日馳五百里九月甲辰以突騎施黑姓可汗登里伊羅蜜施為突騎施可汗北庭都䕶程千里追阿布思至磧西以書諭葛邏禄使相應阿布思窮迫歸葛邏禄葛邏禄葉䕶執之并其妻子麾下數千人送之甲寅加葛邏禄葉䕶頓毗伽開府儀同三司賜爵金山王冬十月戊寅上幸華清宫楊國忠與虢國夫人居第相鄰晝夜往來無復期度或並轡走馬入朝不施鄣幕道路為之掩目三夫人將從車駕幸華清宫㑹於國忠第車馬僕從充溢數坊錦繡珠玉鮮華奪目國忠謂客曰吾本寒家一旦縁椒房至此未知稅駕之所然念終不能致令名不若且極樂耳楊氏五家隊各為一色衣以相别五家合隊粲若雲錦國忠仍以劒南旌節引於其前國忠子暄舉明經學業荒陋不及格禮部侍郎逹奚珣畏國忠權勢遣其子昭應尉撫先白之撫伺國忠入朝上馬趨至馬下國忠意其子必中選有喜色撫曰大人白相公郎君所試不中程式然亦未敢落也國忠怒曰我子何患不富貴乃令䑕輩相賣策馬不顧而去撫惶遽書白其父曰彼恃挾貴勢令人慘嗟安可復與論曲直遂置暄上第及暄為戸部侍郎珣始自禮部遷吏部暄與所親言猶歎已之淹囘珣之迅疾國忠既居要地中外餉遺輻湊積縑至三千萬匹上在華清宫欲夜出遊龍武大將軍陳􅀇禮諫曰宫外即曠野安可不備不虞陛下必欲夜遊請歸城闕上為之引還是嵗安西節度使封常清擊大勃律至菩薩勞城前鋒屢捷常清乘勝逐之斥􅀱府果毅段秀實諌曰虜兵羸而屢北誘我也請搜左右山林常清從之果獲伏兵遂大破之受降而還中書舍人宋昱知選事前進士廣平劉迺以選法未善上書於昱以為禹稷臯陶同居舜朝猶曰載采有九德考績以九載近代主司察言於一幅之判觀行於一揖之間何古今遲速不侔之甚哉借使周公孔子今處銓廷考其辭華則不及徐庾觀其利口則不若嗇夫何暇論聖賢之事業乎資治通鑑卷第二百一十六
