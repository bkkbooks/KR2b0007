seq: 36
front:
  text: 告宗廟有司奏故事聘皇后黄金二萬斤為錢二萬萬莽深辭讓受六千三百萬而以其四千三百萬分予十一媵家及九族貧者夏安漢公奏車服制度吏民養生送終嫁娶奴婢田宅器械之品立官稷及郡國縣邑鄉聚皆置學官
  hash: sha256:18804b2468bb11fe8df372b8cdb3c0347e03fbbbc10fd783c16bc20c6188feee
body:
  text: 大司徒司直陳崇使張敞孫竦草奏盛稱安漢公功徳以為宜恢公國令如周公建立公子令如伯禽所賜之品亦皆如之諸子之封皆如六子太后以示羣公羣公方議其事會呂寛事起初莽長子宇非莽隔絶衛氏恐乆後受禍即私與衛寶通書教衛后上書謝恩因陳丁傅舊惡冀得至京師莽白太皇太后詔有司褒賞中山孝王后益湯沐邑七千戸衛后日夜啼泣思見帝面而但益戸邑宇復教令上書求至京師莽不聽宇與師呉章及婦兄呂寛議其故章以爲莽不可諫而好鬼神可為變恠以驚懼之章因推類説令歸政衛氏宇即使寛夜持血灑莽第門吏發覺之莽執宇送獄飲藥死宇妻焉懐子繫獄須産子已殺之甄邯等白太后下詔曰公居周公之位輔成王之主而行管蔡之誅不以親親害尊尊朕甚嘉之莽盡滅衛氏支屬唯衛后在呉章要斬磔尸東市門初章為當世名儒教授尤盛弟子千餘人莽以為惡人黨皆當禁錮不得仕宦門人盡更名他師平陵云敞時為大司徒掾自劾呉章弟子收抱章尸歸棺斂葬之京師稱焉莽於是因呂寛之獄遂窮治黨與連引素所惡者悉誅之元帝女弟敬武長公主素附丁傅及莽專政復非議莽紅陽侯王立莽之尊屬平阿侯王仁素剛直莽皆以太皇太后詔遣使者迫守令自殺莽白太后主暴病薨太后欲臨其喪莽固爭而止甄豐遣使者乗傳案治衛氏黨與郡國豪桀及漢忠直臣不附莽者皆誣以罪灋而殺之何武鮑宣及王商子樂昌侯安辛慶忌三子䕶羌校尉通函谷都尉遵水衡都尉茂南郡太守辛伯等皆坐死凡死者數百人海内震焉北海逢萌謂友人曰三綱絶矣不去禍將及人即解冠挂東都城門歸將家屬浮海客於遼東莽召明禮少府宗伯鳯入説為人後之誼白令公卿將軍侍中朝臣並聽欲以内厲天子而外塞百姓之議先是秺侯金日磾子賞都成侯金安上子常皆以無子國絶莽以日磾曾孫當及安上孫京兆尹欽紹其封欽謂當宜為其父祖立廟而使大夫主賞祭甄邯時在旁廷叱欽因劾奏欽誣祖不孝大不敬下獄自殺邯以綱紀國體亡所阿私忠孝尤著益封千戸更封安上曾孫湯為都成侯湯受封日不敢還歸家以明為人後之誼是歲尚書令潁川鍾元為大理潁川太守陵陽嚴詡本以孝行為官謂掾史為師友有過輒閉閤自責終不大言郡中亂王莽遣使徵詡官屬數百人為設祖道詡據地哭掾史曰明府吉徵不宜若此詡曰吾哀潁川士身豈有憂哉我以柔弱徵必選剛猛代代到將有僵仆者故相弔耳詡至拜為美俗使者徙隴西太守平陵何並為潁川太守並到郡捕鍾元弟威及陽翟輕俠趙季李欵皆殺之郡中震栗四年春正月郊祀高祖以配天宗祀孝文以配上帝改殷紹嘉公曰宋公周承休公曰鄭公詔婦女非身犯灋及男子年八十以上七歲已下家非坐不道詔所名捕它皆無得繫其當驗者即驗問定著令二月丁未遣大司徒宮大司空豐等奉乗輿灋駕迎皇后於安漢公第授皇后璽紱入未央宫大赦天下遣太僕王惲等八人各置副假節分行天下覽觀風俗夏太保舜等及吏民上書者八千餘人咸請如陳崇言加賞於安漢公章下有司有司請益封公以新息召陵二縣及黄郵聚新野田采伊尹周公稱號加公為宰衡位上公三公言事稱敢言之賜公太夫人號曰功顯君封公子男二人安為褒新侯臨為賞都侯加后聘三千七百萬合為一萬萬以明大禮太后臨前殿親封拜安漢公拜前二子拜後如周公故事莽稽首辭讓出奏封事願獨受毋號還安臨印韍及號位戸邑事下太師光等皆曰賞未足以直功謙約退讓公之常節終不可聽忠臣之節亦宜自屈而伸主上之義宜遣大司徒大司空持節承制詔公亟入視事詔尚書勿復受公之讓奏奏可莽乃起視事止減召陵黄郵新野之田而已莽復以所益納徵錢千萬遺太后左右奉共養者莽雖專權然所以誑耀媚事太后下至旁側長御方故萬端賂遺以千萬數白尊太后姊妹號皆為君食湯沐邑以故左右日夜共譽莽莽又知太后婦人厭居深宮中莽欲虞樂以市其權乃令太后四時車駕巡狩四郊存見孤寡貞婦所至屬縣輒施恩惠賜民錢帛牛酒歲以為常太后旁弄兒病在外舍莽自親􅇋之其欲得太后意如此太保舜奏言天下聞公不受千乗之土辭萬金之幣莫不鄉化蜀郡男子路建等輟訟慙怍而退雖文王卻虞芮何以加宜報告天下奏可於是孔光愈恐固稱疾辭位太后詔太師母朝十日一入省中置几杖賜餐十七物然後歸官屬按職如故莽奏起明堂辟雍靈臺爲學者築舍萬區制度甚盛立樂經益博士員經各五人徵天下通一蓺教授十一人以上及有逸禮古書天文圖䜟鍾律月令兵灋史篇文字通知其意者皆詣公車網羅天下異能之士至者前後千數皆令記説廷中將令正乖謬壹異説云又徵能治河者以百數其大略異者長水校尉平陵關並言河決率常於平原東郡左右其地形下而土䟽惡聞禹治河時本空此地以爲水猥盛則放溢少稍自索雖時易處猶不能離此上古難識近察秦漢以來河決曹衛之域其南北不過百八十里可空此地勿以爲官亭民室而已御史臨淮韓牧以爲可略於禹貢九河處穿之縱不能爲九但爲四五宜有益大司空掾王横言河入勃海地高於韓牧所欲穿處往者天嘗連雨東北風海水溢西南出􅎊數百里九河之地已爲海所漸矣禹之行河水本隨西山下東北去周譜云定王五年河徙則今所行非禹之所穿也又秦攻魏決河灌其都決處遂大不可復補宜卻徙完平處更開空使縁西山足乗高地而東北入海乃無水災司空掾沛國􅁊譚典其議爲甄豐言凡此數者必有一是宜詳考驗皆可䂊見計定然後舉事費不過數億萬亦可以事諸浮食無産業民空居與行役同當衣食衣食縣官而為之作乃兩便可以上繼禹功下除民疾時莽但崇空語無施行者羣臣奏言昔周公攝政七年制度乃定今安漢公輔政四年營作二旬大功畢成宜升宰衡位在諸侯王上詔曰可仍令議九錫之灋莽奏尊孝宣廟為中宗孝元廟為高宗又奏毁孝宣皇考廟勿脩罷南陵雲陵為縣奏可莽自以北化匈奴東致海外南懐黄支唯西方未有加乃遣中郎將平憲等多持金幣誘塞外羌使獻地願内屬憲等奏言羌豪良願等種可萬二千人願為内臣獻鮮水海允谷鹽池平地美草皆予漢民自居險阻處為藩蔽問良願降意對曰太皇太后聖明安漢公至仁天下太平五穀成孰或禾長丈餘或一粟三米或不種自生或繭不蠶自成甘露從天下醴泉自地出鳯皇來儀神爵降集從四歲以來羌人無所疾苦故思樂内屬宜以時處業置屬國領䕶事下莽莽復奏今已有東海南海北海郡請受良願等所獻地為西海郡分天下為十二州應古制奏可冬置西海郡又增灋五十條犯者徙之西海徙者以千萬數民始怨矣梁王立坐與衛氏交通廢徙南鄭自殺分京師置前煇光後丞烈二郡更公卿大夫八十一元士官名位次及十二州名分界郡國所屬罷置改易天下多事吏不能紀矣五年春正月祫祭明堂諸侯王二十八人列侯百二十人宗室子九百餘人徵助祭禮畢皆益戸賜爵及金帛增秩補吏各有差安漢公又奏復長安南北郊三十餘年間天地之祠凡五徙焉詔曰宗室子自漢元至今十有餘萬人其令郡國各置宗師以紏之致教訓焉夏四月乙未博山簡烈侯孔光薨贈賜葬送甚盛車萬餘兩以馬宮為太師吏民以莽不受新野田而上書者前後四十八萬七千五百七十二人及諸侯王公列侯宗室見者皆叩頭言宜亟加賞於安漢公於是莽上書言諸臣民所上章下議者願皆寑勿上使臣莽得盡力畢制禮作樂事事成願賜骸骨歸家避賢者路甄邯等白太后詔曰公毎見輒流涕叩頭言願不受賞賞即加不敢當位方制作未定事須公而決故且聽公制作畢成羣公以聞究于前議其九錫禮儀亟奏五月策命安漢公莽以九錫莽稽首再拜受緑韍衮冕衣裳瑒琫瑒珌句履鸞路乗馬龍旂九旒皮弁素積戎路乗馬彤弓矢盧弓矢左建朱鉞右建金戚甲胄一具秬鬯二卣圭瓚二九命青玉珪二朱戸納陛署宗官祝官卜官史官虎賁三百人王惲等八人使行風俗還言天下風俗齊同詐為郡國造歌謡頌功徳凡三萬言閠月丁酉詔以羲和劉秀等四人使治明堂辟雍令漢與文王靈臺周公作洛同符太僕王惲等八人使行風俗宣明徳化萬國齊同皆封為列侯時廣平相班穉獨不上嘉瑞及歌謡琅邪太守公孫閎言災害於公府甄豐遣屬馳至兩郡諷吏民而劾閎空造不祥穉絶嘉應嫉害聖政皆不道穉班偼伃弟也太后曰不宣徳美宣與言災者異罰且班穉後宮賢家我所哀也閎獨下獄誅穉懼上書陳恩謝罪願歸相印入補延陵園郎太后許焉莽又奏為市無二賈官無獄訟邑無盜賊野無饑民道不拾遺男女異路之制犯者象刑莽復奏言共王母丁姬前不臣妾冡高與元帝山齊懷帝太后皇太太后璽綬以葬請發共王母及丁姬冢取其璽綬徙共王母歸定陶葬共王冢次太后以為既己之事不須復發莽固爭之太后詔因故棺改葬之莽奏共王母及丁姬棺皆名梓宮珠玉之衣非藩妾服請更以木棺代去珠玉衣葬丁姬媵妾之次奏可公卿在位皆阿莽指入錢帛遣子弟及諸生四夷凡十餘萬人操持作具助將作掘平共王母丁姬故冢二旬間皆平莽又周棘其處以為世戒云又隳壞共皇廟諸造議者泠褒叚猶等皆徙合浦徵師丹詣公車賜爵關内侯食故邑數月更封丹為義陽侯月餘薨初哀帝時馬宮為光禄勲與丞相御史雜議傅太后謚曰孝元傅皇后及莽追誅前議者宮為莽所厚獨不及宮内慙懼上書言臣前議定陶共王母謚希指雷同詭經僻説以惑誤主上為臣不忠幸蒙洒心自新誠無顔復望闕廷無心復居官府無宜復食國邑願上太師大司徒扶徳侯印綬避賢者路秋八月壬午莽以太后詔賜宮策曰四輔之職為國維綱三公之任鼎足承君不有鮮明固守無以居位君言至誠不敢文過朕甚多之不奪君之爵邑其上太師大司徒印綬使者以侯就第莽以皇后有子孫瑞通子午道從杜陵直絶南山徑漢中泉陵侯劉慶上書言周成王幼少稱孺子周公居攝今帝冨於春秋宜令安漢公行天子事如周公羣臣皆曰宜如慶言時帝春秋益壯以衛后故怨不悦冬十二月莽因臘日上椒酒置毒酒中帝有疾莽作策請命於泰畤願以身代藏策金縢置于前殿敕諸公勿敢言丙午帝崩于未央宮大赦天下莽令天下吏六百石以上皆服喪三年奏尊孝成廟曰統宗孝平廟曰元宗斂孝平加元服葬康陵班固贊曰孝平之世政自莽出襃善顯功以自尊盛觀其文辭方外百蠻無思不服休徵嘉應頌聲並作至乎變異見於上民怨於下莽亦不能文也以長樂少府平晏爲大司徒太后與羣臣議立嗣時元帝世絶而宣帝曾孫有見王五人列矦四十八人莽惡其長大曰兄弟不得相爲後乃悉徵宣帝玄孫選立之是月前煇光謝囂奏武功長孟通浚井得白石上圓下方有丹書著石文曰告安漢公莽爲皇帝符命之起自此始矣莽使羣公以白太后太后曰此誣罔天下不可施行太保舜謂太后事已如此無可奈何沮之力不能止又莽非敢有它但欲稱攝以重其權填服天下耳太后心不以為可然力不能制乃聽許舜等即共令太后下詔曰孝平皇帝短命而崩已使有司徵孝宣皇帝􅀇孫二十三人差度宜者以嗣孝平皇帝之後􅀇孫年在襁褓不得至徳君子孰能安之安漢公莽輔政三世與周公異世同符今前煇光囂武功長通上言丹石之符朕深思厥意云為皇帝者乃攝行皇帝之事也其令安漢公居攝踐祚如周公故事具禮儀奏於是羣臣奏言太后聖徳昭然深見天意詔令安漢公居攝臣請安漢公踐祚服天子韍冕背斧依于戸牖之閒南面朝羣臣聽政事車服出入警蹕民臣稱臣妾皆如天子之制郊祀天地宗祀明堂共祀宗廟享祭羣神贊曰假皇帝民臣謂之攝皇帝自稱曰予平決朝事常以皇帝之詔稱制以奉順皇天之心輔翼漢室保安孝平皇帝之幼嗣遂寄託之義隆治平之化其朝見太皇太后帝皇后皆復臣節自施政教於其宮家國采如諸侯禮儀故事太后詔曰可王莽上居攝元年春正月王莽祀上帝於南郊又行迎春大射養老之禮三月己丑立宣帝􅀇孫嬰為皇太子號曰孺子嬰廣戚侯顯之子也年二歲託以爲卜相最吉立之尊皇后曰皇太后以王舜為太傅左輔甄豐為太阿右拂甄邯為太保後承又置四少秩皆二千石四月安衆侯劉崇與相張紹謀曰安漢公莽必危劉氏天下非之莫敢先舉此乃宗室之恥也吾帥宗族為先海内必和紹等從者百餘人遂進攻宛不得入而敗紹從弟竦與崇族父嘉詣闕自歸莽赦弗罪竦因為嘉作奏稱莽徳美罪狀劉崇願為宗室倡始父子兄弟負籠荷鍤馳之南陽豬崇宮室令如古制及崇社宜如亳社以賜諸侯用永監戒於是莽大説封嘉為率禮侯嘉子七人皆賜爵闗内侯後又封竦為淑徳侯長安為之語曰欲求封過張伯松力戰鬭不如巧為奏自後謀反者皆汙池云羣臣復白劉崇等謀逆者以莽權輕也宜尊重以填海内五月甲辰太后詔莽朝見太后稱假皇帝冬十月丙辰朔日有食之十二月羣臣奏請以安漢公廬為攝省府為攝殿第為攝宮奏可是歲西羌龎怙傅幡等怨莽奪其地反攻西海太守程永永犇走莽誅永遣䕶羌校尉竇況擊之二年春竇況等擊破西􅆧五月更造貨錯刀一直五千契刀一直五百大錢一直五十與五銖錢並行民多盜鑄者禁列侯以下不得挾黄金輸御府受直然卒不與直東郡太守翟義方進之子也與姊子上蔡陳豐謀曰新都侯攝天子位號令天下故擇宗室幼稚者以為孺子依託周公輔成王之義且以觀望必代漢家其漸可見方今宗室衰弱外無彊蕃天下傾首服從莫能亢扞國難吾幸得備宰相子身守大郡父子受漢厚恩義當為國討賊以安社稷欲舉兵西誅不當攝者選宗室子孫輔而立之設令時命不成死國埋名猶可以不慙於先帝今欲發之汝肯從我乎豐年十八勇壯許諾義遂與東郡都尉劉宇嚴鄉侯劉信信弟武平侯劉璜結謀以九月都試日斬觀令因勒其車騎材官士募郡中勇敢部署將帥信子匡時為東平王乃并東平兵立信為天子義自號大司馬柱天大將軍移檄郡國言莽鴆殺孝平皇帝攝天子位欲絶漢室今天子已立共行天罰郡國皆震比至山陽衆十餘萬莽聞之惶懼不能食太皇太后謂左右曰人心不相逺也我雖婦人亦知莽必以此自危莽乃拜其黨親輕車將軍成武侯孫建為奮武將軍光禄勲成都侯王邑為虎牙將軍明義侯王駿為彊弩將軍春王城門校尉王況為震威將軍宗伯忠孝侯劉宏為奮衝將軍中少府建威侯王昌為中堅將軍中郎將震羌侯竇況為奮威將軍凡七人自擇除闗西人為校尉軍吏將闗東甲卒發奔命以擊義焉復以太僕武讓為積弩將軍屯函谷闗將作大匠蒙鄉侯逯並為横壄將軍屯武闗羲和紅休侯劉秀為揚武將軍屯宛三輔聞翟義起自茂陵以西至汧二十三縣盜賊並發槐里男子趙朋霍鴻等自稱將軍攻燒官寺殺右輔都尉及斄令相與謀曰諸將精兵悉東京師空可攻長安衆稍多至十餘萬火見未央宮前殿莽復拜衛尉王級為虎賁將軍大鴻臚望鄉侯閻遷為折衝將軍西擊朋等以常鄉侯王惲為車騎將軍屯平樂館騎都尉王晏為建威將軍屯城北城門校尉趙恢為城門將軍皆勒兵自備以太保後承承陽侯甄邯為大將軍受鉞高廟領天下兵左杖節右把鉞屯城外王舜甄豐晝夜循行殿中莽日抱孺子禱郊廟會羣臣而稱曰昔成王幼周公攝政而管蔡挾禄父以畔今翟義亦挾劉信而作亂自古大聖猶懼此況臣莽之斗筲羣臣皆曰不遭此變不章聖徳冬十月甲子莽依周書作大誥曰粤其聞日宗室之儁有四百人民獻儀九萬天予敬以終於此謀繼嗣圖功遣大夫􅁊譚等班行諭告天下以當反位孺子之意諸將東至陳留菑與翟義會戰破之斬劉璜首莽大喜復下詔先封車騎都尉孫賢等五十五人皆爲列矦即軍中拜授因大赦天下於是吏士精鋭遂攻圍義於圉城十二月大破之義與劉信棄軍亡至固始界中捕得義尸磔陳都市卒不得信初始元年春地震大赦天下王邑等還京師西與王級等合擊趙明霍鴻二月明等殄滅諸縣悉平還師振旅莽乃置酒白虎殿勞饗將帥詔陳崇治校軍功第其高下依周制爵五等以封功臣爲矦伯子男凡三百九十五人曰皆以奮怒東指西擊羌寇蠻盜反虜逆賊不得旋踵應時殄滅天下咸服之功封云其當賜爵闗内侯者更名曰附城又數百人莽發翟義父方進及先祖冢在汝南者燒其棺柩夷滅三族誅及種嗣至皆同坑以棘五毒并葬之又取義及趙明霍鴻黨衆之尸聚之通路之旁濮陽無鹽圉槐里盩厔凡五所建表木於其上書曰反虜逆賊䲔鯢義等既敗莽於是自謂威徳日盛大􅀗天人之助遂謀即眞之事矣羣臣復奏進攝皇帝子安臨爵為公封兄子光為衍功侯是時莽還歸新都國羣臣復白以封莽孫宗為新都侯九月莽母功顯君死莽自以居攝踐阼奉漢大宗之後為功顯君緦縗弁而加麻環絰如天子弔諸侯服凡壹弔再會而令新都侯宗為主服喪三年云司威陳崇奏莽兄子衍功侯光私報執金吾竇況令殺人況為收繫致其灋莽大怒切責光光母曰汝自視孰與長孫中孫長孫中孫者宇及獲之字也遂母子自殺及況皆死初莽以事母養嫂撫兄子為名及後悖虐復以示公義焉令光子嘉嗣爵為侯是歲廣饒侯劉京言齊郡新井車騎將軍千人扈雲言巴郡石牛太保屬臧鴻言扶風雍石莽皆迎受十一月甲子莽奏太后曰陛下遇漢十二世三七之阸承天威命詔臣莽居攝廣饒侯劉京上書言七月中齊郡臨淄縣昌興亭長辛當一暮數夢曰吾天公使也天公使我告亭長曰攝皇帝當為眞即不信我此亭中當有新井亭長晨起視亭中誠有新井入地且百尺十一月壬子直建冬至巴郡石牛戊午雍石文皆到于未央宮之前殿臣與太保安陽侯舜等視天風起塵㝠風止得銅符帛圖於石前文曰天告帝符獻者封侯騎都尉崔發等視説孔子曰畏天命畏大人畏聖人之言臣莽敢不承用臣請共事神祇宗廟奏言太皇太后孝平皇后皆稱假皇帝其號令天下天下奏言事毋言攝以居攝三年為始初元年漏刻以百二十為度用應天命臣莽夙夜養育隆就孺子令與周之成王比徳宣明太皇太后威徳於萬方期於冨而教之孺子加元服復子明辟如周公故事奏可衆庶知其奉符命指意羣臣博議别奏以示即眞之漸矣期門郎張充等六人謀共刧莽立楚王發覺誅死梓潼人哀章學問長安素無行好為大言見莽居攝即作銅匱為兩檢署其一曰天帝行璽金匱圖其一署曰赤帝璽某傳予黄帝金策書某者高皇帝名也書言王莽為眞天子皇太后如天命圖書皆書莽大臣八人又取令名王興王盛章因自竄姓名凡十一人皆署官爵為輔佐章聞齊井石牛事下即日昏時衣黄衣持匱至高廟以付僕射僕射以聞戊辰莽至高廟拜受金匱神禪御王冠謁太后還坐未央宮前殿下書曰予以不徳託于皇初祖考黄帝之後皇始祖考虞帝之苗裔而太皇太后之末屬皇天上帝隆顯大佑成命統序符契圖文金匱策書神明詔告屬予以天下兆民赤帝漢氏高皇帝之靈承天命傳國金策之書予甚祇畏敢不欽受以戊辰直定御王冠即眞天子位定有天下之號曰新其改正朔易服色變犧牲殊徽幟異器制以十二月朔癸酉為始建國元年正月之朔以雞鳴為時服色配徳上黄犧牲應正用白使節之旄幡皆純黄其署曰新使五威節以承皇天上帝威命也莽將即眞先奉諸符瑞以白太后太后大驚是時以孺子未立璽臧長樂宮及莽即位請璽太后不肯授莽莽使安陽侯舜諭指舜素謹敕太后雅愛信之舜既見太后太后知其爲莽求璽怒罵之曰而屬父子宗族蒙漢家力冨貴累世既無以報受人孤寄乗便利時奪取其國不復顧恩義人如此者狗豬不食其餘天下豈有而兄弟邪且若自以金匱符命爲新皇帝變更正朔服制亦當自更作璽傳之萬世何用此亡國不祥璽爲而欲求之我漢家老寡婦旦暮且死欲與此璽俱􅁙終不可得太后因涕泣而言旁側長御以下皆垂涕舜亦悲不能自止良乆乃仰謂太后臣等已無可言者莽必欲得傳國璽太后寧能終不與邪太后聞舜語切恐莽欲脅之乃出漢傳國璽投之地以授舜曰我老已死知而兄弟今族滅也舜既得傳國璽奏之莽大説乃爲太后置酒未央宮漸臺大縱衆樂莽又欲改太后漢家舊號易其璽綬恐不見聽而莽踈屬王諫欲諂莽上書言皇天廢去漢而命立新室太皇太后不宜稱尊號當隨漢廢以奉天命莽以其書白太后太后曰此言是也莽因曰此誖徳之臣也罪當誅於是冠軍張永獻符命銅璧文言太皇太后當為新室文母太皇太后莽乃下詔從之於是鴆殺王諫而封張永為貢符子班彪贊曰三代以來王公失世稀不以女寵及王莽之興由孝元后歴漢四世為天下母饗國六十餘載羣弟世權更持國柄五將十侯卒成新都位號已移於天下而元后卷卷猶握一璽不欲以授莽婦人之仁悲矣資治通鑑卷第三十六
