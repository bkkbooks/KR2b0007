body:
  text: 夏四月己未臨淮康公荀顗卒吳左夫人王氏卒吳主哀念數月不出葬送甚盛時何氏以太后故宗族驕横吳主舅子何都貌類吳主民閒訛言吳主已死立者何都也會稽又訛言章安侯奮當為天子奮母仲姬墓在豫章豫章太守張俊為之掃除臨海太守奚熈與㑹稽太守郭誕書非議國政誕但白熈書不白妖言吳主怒収誕繫獄誕懼功曹邵疇曰疇在明府何憂遂詣吏自列曰疇厠身本郡位極朝右以噂􅊱之語本非事實疾其醜聲不忍聞見欲含垢藏疾不彰之翰墨鎮躁歸静使之自息故誕屈其所是黙以見從此之為愆實由於疇不敢逃死歸罪有司因自殺吳主乃免誕死送付建安作船遣其舅三郡督何植収奚熈熈發兵自守其部曲殺熈送首建業又車裂張俊皆夷三族并誅章安侯奮及其五子秋七月丙寅皇后楊氏殂初帝以太子不慧恐不堪為嗣甞密以訪后后曰立子以長不以賢豈可動也鎮軍大将軍胡奮女為貴嬪有寵於帝后疾篤恐帝立貴嬪為后致太子不安枕帝膝泣曰叔父駿女芷有徳色願陛下以備六宫帝流涕許之以前太常山濤為吏部尚書濤典選十餘年每一官缺輒擇才資可為者啓擬數人得詔㫖有所向然後顯奏之帝之所用或非舉首衆情不察以濤輕重任意言之於帝帝益親愛之濤甄拔人物各為題目而奏之時稱山公啓事濤薦嵇紹於帝請以為祕書郎帝發詔徴之紹以父康得罪屏居私門欲辭不就濤謂之曰為君思之久矣天地四時猶有消息況於人乎紹乃應命帝以為祕書丞初東闗之敗文帝問僚屬曰近日之事誰任其咎安東司馬王儀脩之子也對曰責在元帥文帝怒曰司馬欲委罪孤邪引出斬之儀子裒痛父非命隱居敎授三徴七辟皆不就未嘗西向而坐廬于墓側旦夕攀柏悲號涕淚著樹樹為之枯讀詩至哀哀父母生我劬勞未嘗不三復流涕門人為之廢蓼莪家貧計口而田度身而蠶人或饋之不受助之不聽諸生密為刈麥裒輒棄之遂不仕而終臣光曰昔舜誅鯀而禹事舜不敢廢至公也嵇康王儀死皆不以其罪二子不仕晉室可也嵇紹茍無蕩隂之忠殆不免於君子之譏乎吴大司馬陸抗疾病上䟽曰西陵建平國之蕃表既處上流受敵二境若敵汎舟順流星犇電邁非可恃援他部以救倒縣也此乃社稷安危之機非徒封疆侵陵小害也臣父遜昔在西垂上言西陵國之西門雖云易守亦復易失若有不守非但失一郡荆州非吳有也如其有虞當傾國爭之臣前乞屯精兵三萬而主者循常未肯差赴自歩闡以後益更損耗今臣所統千里外禦彊對内懷百蠻而上下見兵財有數萬羸敝日久難以待變臣愚以為諸王㓜沖無用兵馬以妨要務又黄門宦官開立占募兵民避役逋逃入占乞特詔簡閲一切料出以補疆埸受敵常處使臣所部足滿八萬省息衆務并力僃禦庶幾無虞若其不然深可憂也臣死之後乞以西方爲屬及卒吳主使其子晏景􅀇機雲分将其兵機雲皆善屬文名重於世初周魴之子處膂力絶人不修細行鄉里患之處嘗問父老曰今時和歳豐而人不樂何邪父老歎曰三害不除何樂之有處曰何謂也父老曰南山白額虎長橋蛟并子爲三矣處曰若所患止此吾能除之乃入山求虎射殺之因投水􅅮殺蛟遂從機雲受學篤志讀書砥節礪行比及朞年州府交辟八月戊申葬元皇后于峻陽陵帝及羣臣除䘮即吉博士陳逵議以爲今時所行漢帝權制太子無有國事自宐終服尚書杜預以爲古者天子諸侯三年之䘮始同齊斬既葬除服諒闇以居心䘮終制故周公不言高宗服䘮三年而云諒闇此服心䘮之文也叔向不譏景王除䘮而譏其宴樂已早明既葬應除而違諒闇之節也君子之於禮存諸内而已禮非玉帛之謂䘮豈衰麻之謂乎太子出則撫軍守則監國不為無事宜卒哭除衰麻而以諒闇終三年帝從之臣光曰規矩主於方圓然庸工無規矩則方圓不可得而制也衰麻主於哀戚然庸人無衰麻則哀戚不可得而勉也素冠之詩正為是矣杜預巧飾經傳以附人情辯則辯矣臣謂不若陳逵之言質略而敦實也九月癸亥以大将軍陳騫為太尉杜預以孟津渡險請建河橋於富平津議者以為殷周所都歴聖賢而不作者必不可立故也預固請爲之及橋成帝從百寮臨㑹舉觴屬預曰非君此橋不立對曰非陛下之明臣亦無所施其巧是歳邵陵厲公曹芳卒初芳之廢遷金墉也太宰中郎陳留范粲素服拜送哀動左右遂稱疾不出陽狂不言寝所乗車足不履地子孫有婚宦大事輒密諮焉合者則色無變不合則眠寝不安妻子以此知其㫖子喬等三人並棄學業絶人事侍疾家庭足不出邑里及帝即位詔以二千石禄養病加賜帛百匹喬以父疾篤辭不敢受粲不言凡三十六年年八十四終於所寝之車吳比三年大疫咸寧元年春正月戊午朔大赦改元吳掘地得銀尺上有刻文吳主大赦改元天冊吳中書令賀邵中風不能言去職數月吳主疑其詐收付酒藏掠考千數卒無一言乃燒鋸斷其頭徙其家屬於臨海又誅樓􅀇子孫夏六月鮮卑拓㧞力㣲復遣其子沙漠汗入貢将還幽州刺史衛瓘表請留之又密以金賂其諸部大人離間之秋七月甲申晦日有食之冬十二月丁亥追尊宣帝廟曰高祖景帝曰世宗文帝曰太祖大疫洛陽死者以萬數二年春令狐豐卒弟宏繼立楊欣討斬之帝得疾甚劇及愈羣臣上夀詔曰每念疫氣死亡者為之愴然豈以一身之休息忘百姓之艱難邪諸上禮者皆絶之初齊王攸有寵於文帝每見攸輒撫牀呼其小字曰此桃符座也幾爲太子者數矣臨終爲帝叙漢淮南王魏陳思王事而泣執攸手以授帝太后臨終亦流涕謂帝曰桃符性急而汝爲兄不慈我若不起必恐汝不能相容以是屬汝勿忘我言及帝疾甚朝野皆屬意於攸攸妃賈充之長女也河南尹夏侯和謂充曰卿二婿親踈等耳立人當立徳充不答攸素惡荀勗及左衛将軍馮紞傾謟朂乃使紞説帝曰陛下前日疾若不愈齊王爲公卿百姓所歸太子雖欲高讓其得免乎宜遣還藩以安社稷帝隂納之乃徙和爲光禄勲奪充兵權而位遇無替吳施但之亂或譖京下督孫楷於吳主曰楷不時赴討懷兩端吳主數詰讓之徴爲宫下鎮驃騎将軍楷自疑懼夏六月将妻子來犇拜車騎将軍封丹陽侯秋七月吳人或言於吳主曰臨平湖自漢末薉塞長老言此湖塞天下亂此湖開天下平近無故忽更開通此天下當太平青蓋入洛之祥也吳主以問奉禁都尉歷陽陳訓對曰臣止能望氣不能逹湖之開塞退而告其友曰青蓋入洛者将有銜璧之事非吉祥也或獻小石刻皇帝字云得於湖邊吳主大赦改元天璽湘東太守張詠不出筭緍吳主就在所斬之徇首諸郡㑹稽太守車浚公清有政績值郡旱饑表求振貸吳主以為收私恩遣使梟首尚書熊睦微有所諫吳主以刀環撞殺之身無完肌八月己亥以何曾為太傅陳騫為大司馬賈充為太尉齊王攸為司空吳歴陽山有七穿駢羅穿中黄赤俗謂之石印云石印封發天下當太平歷陽長上言石印發吳主遣使者以太牢祠之使者作高梯登其上以朱書石曰楚九州渚吳九州都揚州士作天子四世治太平始還以聞吳主大喜封其山神為王大赦改明年元曰天紀冬十月以汝隂王駿為征西大将軍羊祜為征南大将軍皆開府辟召儀同三司祜上䟽請伐吳曰先帝西平巴蜀南和吳㑹庶幾海内得以休息而吳復背信使邉事更興夫期運雖天所授而功業必因人而成不一大舉掃滅則兵役無時得息也蜀平之時天下皆謂吳當并亡自是以來十有三年矣夫謀之雖多決之欲獨凡以險阻得全者謂其埶均力敵耳若輕重不齊强弱異埶雖有險阻不可保也蜀之為國非不險也皆云一夫荷㦸千人莫當及進兵之日曾無藩籬之限乗勝席卷徑至成都漢中諸城皆鳥栖而不敢出非無戰心誠力不足以相抗也及劉禪請降諸營堡索然俱散今江淮之險不如劒閣孫皓之暴過於劉禪吳人之困甚於巴蜀而大晉兵力盛於往時不於此際平壹四海而更阻兵相守使天下困於征戍經歴盛衰不可長久也今若引梁益之兵水陸俱下荆楚之衆進臨江陵平南豫州直指夏口徐揚青兖並㑹秣陵以一隅之吴當天下之衆埶分形散所僃皆急巴漢竒兵出其空虚一處傾壞則上下震蕩雖有智者不能為吳謀矣吳緣江為國東西數千里所敵者大無有寧息孫皓恣情任意與下多忌将疑於朝士困於野無有保世之計一定之心平常之日猶懷去就兵臨之際必有應者終不能齊力致死已可知也其俗急速不能持久弓弩㦸楯不如中國唯有水戰是其所便一入其境則長江非復所保還趣城池去長入短非吾敵也官軍縣進人有致死之志吳人内顧各有離散之心如此軍不踰時克可必矣帝深納之而朝議方以秦涼為憂祜復表曰吳平則胡自定但當速濟大功耳議者多有不同賈充荀朂馮紞尤以伐吳為不可祜歎曰天下不如意事十常居七八天與不取豈非更事者恨於後時哉唯度支尚書杜預中書令張華與帝意合贊成其計丁夘立皇后楊氏大赦后元皇后之從妹也美而有婦徳帝初聘后后叔父珧上表曰自古一門二后未有能全其宗者乞藏此表於宗廟異日如臣之言得以免禍帝許之十二月以后父鎮軍将軍駿為車騎将軍封臨晉侯尚書禇䂮郭奕皆表駿小器不可任社稷之重帝不從駿驕傲自得胡奮謂駿曰卿恃女更益豪邪歴觀前世與天家婚未有不滅門者但早晩事耳駿曰卿女不在天家乎奮曰我女與卿女作婢耳何能為損益乎三年春正月丙子朔日有食之􅊨立皇子裕為始平王庚寅裕卒三月平虜䕶軍文鴦督凉秦雍州諸軍討樹機能破之諸胡二十萬口來降夏五月吳将邵顗夏祥帥衆七千餘人來降秋七月中山王睦坐招誘逋亡貶為丹水縣侯有星孛于紫宫衛将軍楊珧等建議以為古者封建諸侯所以藩衛王室今諸王公皆在京師非扞城之義又異姓諸将居邉宐參以親戚帝乃詔諸王各以戸邑多少為三等大國置三軍五千人次國二軍三千人小國一軍一千一百人諸王為都督者各徙其國使相近八月癸亥徙扶風王亮為汝南王出為鎮南大将軍都督豫州諸軍事琅邪王倫為趙王督鄴城守事勃海王輔為太原王監并州諸軍事以東莞王伷在徐州徙封琅邪王汝陰王駿在闗中徙封扶風王又徙太原王顒為河閒王汝南王東為南陽王輔孚之子顒孚之孫也其無官者皆遣就國諸王公戀京師皆涕泣而去又封皇子瑋為始平王允為濮陽王該為新都王遐為清河王其異姓之臣有大功者皆封郡公郡矦封賈充為魯郡公追封王沈為博陵郡公徙封鉅平矦羊祜為南城郡矦祜固辭不受祜每拜官爵常多避讓至心素著故特見申於分列之外祜歷事二世職典樞要凡謀議損益皆焚其草世莫得聞所進逹之人皆不知所由常曰拜官公朝謝恩私門吾所不敢也兖豫徐青荆益梁七州大水冬十二月吳夏口督孫慎入江夏汝南略千餘家而去詔遣侍臣詰羊祜不追討之意并欲移荆州祜曰江夏去襄陽八百里比知賊問賊已去經日歩軍安能追之勞師以免責非臣志也昔魏武帝置都督類皆與州相近以兵埶好合惡離故也疆埸之間一彼一此慎守而已若輙徙州賊出無常亦未知州之所宐據也是歳大司馬陳騫自揚州入朝以高平公罷吳主以㑹稽張俶多所譖白甚見寵任累遷司直中郎将封侯其父爲山隂縣卒知俶不良上表曰若用俶爲司直有罪乞不從坐吳主許之俶表置彈曲二十人専糾司不灋於是吏民各以愛憎互相告訐獄犴盈溢上下囂然俶大爲姦利驕奢暴横事發父子皆車裂衛瓘遣拓跋沙漠汗歸國自沙漠汗入質力微可汗諸子在側者多有寵及沙漠汗歸諸部大人共譖而殺之既而力微疾篤烏􅁊王庫賢親近用事受衛瓘賂欲擾動諸部乃礪斧於庭謂諸大人曰可汗恨汝曹讒殺太子欲盡收汝曹長子殺之諸大人懼皆散走力㣲以憂卒時年一百四子悉禄立其國遂衰初幽并二州皆與鮮卑接東有務􅁊西有力㣲多為邊患衛瓘密以計閒之務􅁊降而力微死朝廷嘉瓘功封其弟為亭侯四年春正月庚午朔日有食之司馬督東平馬隆上言凉州刺史楊欣失羌戎之和必敗夏六月欣與樹機能之黨若羅㧞能等戰于武威敗死􅀪訓皇后羊氏殂羊祜以病求入朝既至帝命乘輦入殿不拜而坐祜面陳伐吳之計帝善之以祜病不宐數入更遣張華就問籌䇿祜曰孫皓暴虐已甚於今可不戰而克若皓不幸而没吳人更立令主雖有百萬之衆長江未可窺也将為後患矣華深然之祜曰成吾志者子也帝欲使祜卧䕶諸将祜曰取吳不必臣行但既平之後當勞聖慮耳功名之際臣不敢居若事了當有所付授願審擇其人也秋七月己丑葬景獻皇后于峻平陵司冀兖豫荆揚州大水螟傷稼詔問主者何以佐百姓度支尚書杜預上䟽以為今者水災東南尤劇宐敕兖豫等諸州留漢氏舊陂繕以蓄水外餘皆決瀝令饑者盡得魚菜螺蜯之饒此目下日給之益也水去之後塡淤之田􅅿收數鐘此又明年之益也典牧種牛有四萬五千餘頭不供耕駕至有老不穿􅈹者可分以給民使及春耕榖登之後責其租税此又數年以後之益也帝從之民頼其利預在尚書七年損益庶政不可勝數時人謂之杜武庫言其無所不有也九月以何曾為太宰辛巳以侍中尚書令李􅅌為司徒吳主忌勝已者侍中中書令張尚紘之孫也為人辯㨗談論毎出其表吳主積以致恨後問孤飲酒可以方誰尚曰陛下有百觚之量吳主曰尚知孔丘不王而以孤方之因發怒收尚公卿已下百餘人詣宫叩頭請尚罪得減死送建安作船尋就殺之冬十月徴征北大将軍衛瓘為尚書令是時朝野咸知太子昬愚不堪為嗣瓘每欲陳啓而未敢發㑹侍宴陵雲臺瓘陽醉跪帝牀前曰臣欲有所啓帝曰公所言何邪瓘欲言而止者三因以手撫牀曰此座可惜帝意悟因謬曰公眞大醉邪瓘於此不復有言帝悉召東宮官屬為設宴㑹而密封尚書疑事令太子決之賈妃大懼倩外人代對多引古義給使張泓曰太子不學陛下所知而荅詔多引古義必責作草主更益譴負不如直以意對妃大喜謂泓曰便為我好荅富貴與汝共之泓即具草令太子自寫帝省之甚恱先以示瓘瓘大踧踖衆人乃知瓘嘗有言也賈充密遣人語妃云衛瓘老奴幾破汝家吳人大佃皖城欲謀入宼都督揚州諸軍事王渾遣揚州刺史應綽攻破之斬首五千級焚其積榖百八十餘萬斛踐稻苗四千餘頃毁船六百餘艘十一月辛巳太醫司馬程據獻雉頭裘帝焚之於殿前甲申敕内外敢有獻竒技異服者罪之羊祜疾篤舉杜預自代辛卯以預為鎮南大将軍都督荆州諸軍事祜卒帝哭之甚哀是日大寒涕涙霑須鬢皆為冰祜遺令不得以南城侯印入柩帝曰祜固讓歴年身没讓存今聽復本封以彰高美南州民聞祜卒為之罷市巷哭聲相接吳守邊將士亦為之泣祜好遊峴山襄陽人建碑立廟於其地歳時祭祀望其碑者無不流涕因謂之墯淚碑杜預至鎮簡精鋭襲吳西陵督張政大破之政吳之名将也恥以無􅍯取敗不以實告吳主預欲間之乃表還其所獲吳主果召政還遣武昌監留憲代之十二月丁未朗陵公何曾卒曾厚自奉養過於人主司􅀠校尉東萊劉毅數劾奏曾侈汰無度帝以其重臣不問及卒博士新興秦秀議曰曾驕奢過度名被九域宰相大臣人之表儀若生極其情死又無貶王公貴人復何畏哉謹按諡灋名與實爽曰繆怙亂肆行曰醜宐諡繆醜公帝䇿諡曰孝前司􅀠校尉􅀓􅀇卒􅀇性峻急每有奏劾或值日暮捧白簡整簮帶竦踊不寐坐而待旦由是貴游震懾臺閣生風􅀇與尚書左丞愽陵崔洪善洪亦清厲骨鯁好面折人過而退無後言人以是重之鮮卑樹機能久為邊患僕射李憙請發兵討之朝議皆以為出兵重事虜不足憂五年春正月樹機能攻䧟凉州帝甚悔之臨朝而歎曰誰能為我討此虜者司馬督馬隆進曰陛下能任臣臣能平之帝曰必能平賊何為不任顧方略何如耳隆曰臣願募勇士三千人無問所從來帥之以西虜不足平也帝許之乙丑以隆為討虜䕶軍武威太守公卿皆曰見兵已多不宐横設賞募隆小将妄言不足信也帝不聽隆募能引弓四鈞挽弩九石者取之立摽簡試自旦至日中得三千五百人隆曰足矣又請自至武庫選仗武庫令與隆忿爭御史中丞劾奏隆隆曰臣當畢命戰場武庫令乃給以魏時朽仗非陛下所以使臣之意也帝命惟隆所取仍給三年軍資而遣之初南單于呼厨泉以兄於扶羅子豹為左賢王及魏武帝分匈奴為五部以豹為左部帥豹子淵㓜而雋異師事上黨崔游慱習經史嘗謂同門生上黨朱紀鴈門范隆曰吾常恥隨陸無武絳灌無文隨陸遇高帝而不能建封侯之業絳灌遇文帝而不能興庠序之敎豈不惜哉於是兼學武事及長猿臂善射膂力過人姿貌魁偉為任子在洛陽王渾及子濟皆重之屢薦於帝帝召與語恱之濟曰淵有文武長才陛下任以東南之事吳不足平也孔恂楊珧曰非我族類其心必異淵才器誠少比然不可重任也及凉州覆没帝問将於李憙對曰陛下誠能發匈奴五部之衆假劉淵一将軍之號使将之而西樹機能之首可指日而梟也孔恂曰淵果梟樹機能則涼州之患方更深耳帝乃止東萊王彌家世二千石彌有學術勇略善騎射青州人謂之飛豹然喜任俠處士陳留董養見而謂之曰君好亂樂禍若天下有事不作士大夫矣淵與彌友善謂彌曰王李以鄉曲見知每相稱薦適足為吾患耳因歔欷流涕齊王攸聞之言於帝曰陛下不除劉淵臣恐并州不得久安王渾曰大晉方以信懷殊俗柰何以無形之疑殺人侍子乎何徳度之不􅀪也帝曰渾言是也㑹豹卒以淵代為左部帥夏四月大赦除部曲督以下質任吳桂林太守脩允卒其部曲應分給諸将督將郭馬何典王族等累世舊軍不樂離别㑹吳主料實廣州戸口馬等因民心不安聚衆攻殺廣州督虞授馬自號都督交廣二州諸軍事使典攻蒼梧族攻始興秋八月吳以軍師張悌為丞相牛渚都督何植為司徒執金吾滕脩為司空未拜更以脩為廣州牧帥萬人從東道討郭馬馬殺南海太守劉略逐廣州刺史徐旗吳主又遣徐陵督陶濬将七千人從西道與交州牧陶璜共擊馬吳有鬼目菜生工人黄耉家有買菜生工人吳平家東觀案圖書名鬼目曰芝草買菜曰平慮草吳主以耉為侍芝郎平為平慮郎皆銀即青綬吳主每宴羣臣咸令沈醉又置黄門郎十人為司過宴罷之後各奏其闕失迕視謬言罔有不舉大者即加刑戮小者記録為罪或剥人面或鑿人眼由是上下離心莫為盡力益州刺史王濬上䟽曰孫皓荒淫凶逆宐速征伐若一旦皓死更立賢主則强敵也臣作船七年日有朽敗臣年七十死亡無日三者一乖則難圖也誠願陛下無失事機帝於是決意伐吳㑹安東将軍王渾表孫皓欲北上邊戍皆戒嚴朝廷乃更議明年出師王濬參軍何攀奉使在洛上䟽稱皓必不敢出宐因戒嚴掩取甚易杜預上表曰自閏月以來賊但敕嚴下無兵上以理埶推之賊之窮計力不兩完必保夏口以東以延視息無緣多兵西上空其國都而陛下過聽便用委棄大計縱敵患生誠可惜也嚮使舉而有敗勿舉可也今事為之制務從完牢若或有成則開太平之基不成不過費損日月之間何惜而不一試之若當須後年天時人事不得如常臣恐其更難也今有萬安之舉無傾敗之慮臣心實了不敢以曖昧之見自取後累惟陛下察之旬月未報預復上表曰羊祜不先愽謀於朝臣而密與陛下共施此計故益令朝臣多異同之議凡事當以利害相校今此舉之利十有八九而其害一二止於無功耳必使朝臣言破敗之形亦不可得直是計不出已功不在身各恥其前言之失而固守之也自頃朝廷事無大小異意鋒起雖人心不同亦由恃恩不慮後患故輕相異同也自秋已來討賊之形頗露今若中止孫皓或怖而生計徙都武昌更完脩江南諸城逺其居民城不可攻野無所掠則明年之計或無所及矣帝方與張華圍碁預表適至華推枰歛手曰陛下聖武國富兵彊吳主淫虐誅殺賢能當今討之可不勞而定願勿以為疑帝乃許之以華為度支尚書量計運漕賈充荀朂馮紞固爭之帝大怒充免冠謝罪僕射山濤退而告人曰自非聖人外寧必有内憂今釋吳為外懼豈非筭乎冬十一月大舉伐吳遣鎮軍将軍琅邪王伷出涂中安東将軍王渾出江西建威将軍王戎出武昌平南将軍胡奮出夏口鎮南大将軍杜預出江陵龍驤将軍王濬巴東監軍魯國唐彬下巴蜀東西凡二十餘萬命賈充為使持節假黄鉞大都督以冠軍将軍楊濟副之充固陳伐吳不利且自言衰老不堪元帥之任詔曰君若不行吾便自出充不得已乃受節􅃏将中軍南屯襄陽為諸軍節度馬隆西度温水樹機能等以衆數萬據險拒之隆以山路陿隘乃作扁箱車為木屋施於車上轉戰而前行千餘里殺傷甚衆自隆之西音問斷絶朝廷憂之或謂已没後隆使夜到帝撫掌歡笑詰朝召羣臣謂曰若從諸卿言無涼州矣乃詔假隆節拜宣威将軍隆至武威鮮卑大人猝䟦韓且萬能等帥萬餘落來降十二月隆與樹機能大戰斬之涼州遂平詔問朝臣以政之損益司徒左長史傅咸上書以為公私不足由設官太多舊都督有四今并監軍乃盈於十禹分九州今之刺史幾向一倍户口比漢十分之一而置郡縣更多虛立軍府動有百數而無益㝛衛五等諸侯坐置官屬諸所廪給皆出百姓此其所以困乏者也當今之急在於并官息役上下務農而已咸􅀇之子也時又議省州郡縣半吏以赴農功中書監荀朂以為省吏不如省官省官不如省事省事不如清心昔蕭曹相漢載其清静民以寧壹所謂清心也抑浮説簡文案略細苛宥小失有好變常以徼利者必行其誅所謂省事也以九寺併尚書蘭臺付三府所謂省官也若直作大例凡天下之吏皆減其半恐文武衆官郡國職業劇易不同不可以一槩施之若有曠闕皆須更復或激而滋繁亦不可不重也資治通鑑卷第八十一
