front:
  text: 同朋類故莫肯理之臣竊以為艾本屯田掌犢人寵位已極功名已成七十老公復何所求正以劉禪初降逺郡未附矯令承制權安社稷鍾㑹有悖逆之心畏艾威名因其疑似構成其事艾被詔書即遣彊兵束身就縛不敢顧望誠自知奉見先帝必無當死之理也會受誅之後艾官屬将吏愚戇相聚自共追艾破壞檻車解其囚執艾在困地狼狽失據未嘗與腹心之人有平素之謀獨受腹背之誅豈不哀哉陛下龍興闡􅀪大度謂可聽艾歸葬舊墓還其田宅以平蜀之功繼封其後使艾闔棺定謚死無所恨則天下狥名之士思立功之臣必投湯火樂為陛下死矣帝善其言而未能從會帝問給事中樊建以諸葛亮之治蜀曰吾獨不得如亮者而臣之乎建稽首曰陛下知鄧艾之冤而不能直雖得亮得無如馮唐之言乎帝笑曰卿言起我意乃以艾孫朗為郎中吳人多言祥瑞者吳主以問侍中韋昭昭曰此家人筐篋中物耳昭領左國史呉主欲為其父作紀昭曰文皇不登帝位當為傳不當為紀吳主不恱漸見責怒昭憂懼自陳衰老求去侍史二官不聽時有疾病醫藥監䕶持之益急吳主飲羣臣酒不問能否率以七升為限至昭獨以茶代之後更見偪强又酒後常使侍臣嘲弄公卿發摘私短以為歡時有愆失輒見收縛至於誅戮昭以為外相毁傷内長尤恨使羣臣不睦不為佳事故但難問經義而已吳主以為不奉詔命意不忠盡積前後嫌忿遂收昭付獄昭因獄吏上辭獻所著書冀以此求免而吳主怪其書垢故更被詰責遂誅昭徙其家於零陵五月以何曾領司徒六月乙未東海王祗卒秋七月丁酉朔日有食之詔選公卿以下女僃六宫有蔽匿者以不敬論采擇未畢權禁天下嫁娶帝使楊后擇之后惟取潔白長大而捨其美者帝愛卞氏女欲留之后曰卞氏三世后族不可屈以卑位帝怒乃自擇之中選者以絳紗繫臂公卿之女為三夫人九嬪二千石将校女補良人以下九月吳主悉封其子弟為十一王王給三千兵大赦是歳鄭冲以夀光公罷吳主愛姬遣人至市奪民物司市中郎将陳聲素有寵於吳主繩之以灋姬愬於吳主吳主怒假他事燒鋸斷聲頭投其身於四望之下十年春正月乙未日有食之閏月癸酉夀光成公鄭沖卒丁亥詔曰近世以來多由内寵以登后妃亂尊卑之序自今不得以妾媵為正嫡分幽州置平州三月癸亥日有食之詔又取良家及小将吏女五千餘人入宫選之母子號哭於宫中聲聞於外
