body:
  text: 臣司馬光奉勑編集後梁紀六黓敦牂凡三年有竒起屠維單閼十月盡􅀇均王下貞明五年冬十月出濛為楚州團練使晉王如魏州發徒數萬廣德勝北城日與梁人爭大小百餘戰互有勝負左射軍使石敬瑭與梁人戰于河壖梁人擊敬瑭斷其馬甲横衝兵馬使劉知逺以所乘馬授之自乘斷甲者徐行為殿梁人疑有伏不敢迫俱得免敬瑭以是親愛之敬瑭知逺其先皆沙陀人敬瑭李嗣源之壻也劉鄩圍張萬進於兖州經年城中危窘晉王方與梁人戰河上力不能救萬進遣親將劉處讓乞師於晉晉王未之許處讓於軍門截耳曰茍不得請生不如死晉王義之將爲出兵㑹鄩已屠兖州族萬進乃止以處讓爲行臺左驍衛將軍處讓滄州人也十一月吳武寧節度使張崇冦安州丁丑以劉鄩爲泰寧節度使同平章事辛卯王瓚引兵至戚城與李嗣源戰不利梁築壘貯糧於潘張距楊村五十里十二月晉王自將騎兵自河南岸西上邀其餉者俘獲而還梁人伏兵於要路晉兵大敗晉王以數騎走梁數百騎圍之李紹榮識其旗單騎奮擊救之僅免戊戌晉王復與王瓚戰於河南瓉先勝獲晉將石君立等旣而大敗乘小舟度河走保北城失亡萬計帝聞石君立勇欲將之繫於獄而厚餉之使人誘之君立曰我晉之敗將而為用於梁雖竭誠効死誰則信之人各有君何忍反為仇讎用哉帝猶惜之盡殺所獲晋將獨置君立晋王乘勝遂拔濮陽帝召王瓉還以天平節度使戴思逺代為北面招討使屯河上以拒晉人己酉蜀雄武節度使兼中書令王宗朗有罪削奪官爵復其姓名曰全師朗命武定節度使兼中書令桑􅀪志討之吳禁民私畜兵器盜賊益繁御史臺主簿京兆盧樞上言今四方分爭宜教民戰且善人畏法禁而姦民弄干戈是欲偃武而反招盜也宜團結民兵使之習戰自衛鄉里從之六年春正月戊辰蜀桑􅀪志克金州執全師朗獻于成都蜀主釋之吳張崇攻安州不克而還崇在廬州貪暴不法廬江民訟縣令受賕徐知誥遣侍御史知雜事楊廷式往按之欲以威崇廷式曰雜端推事其體至重職業不可不行知誥曰何如廷式曰械繫張崇使吏如昇州簿責都統知誥曰所按者縣令耳何至於是廷式曰縣令微官張崇使之取民財轉獻都統耳豈可捨大而詰小乎知誥謝之曰固知小事不足相煩以是益重之廷式泉州人也晉王自得魏州以李建及為魏博内外牙都將將銀槍効節都建及為人忠壯所得賞賜悉分士卒與同甘苦故能得其死力所向立功同列疾之宦者韋令圖監建及軍譛於晉王曰建及以私財驟施此其志不小不可使將牙兵王疑之建及知之自恃無它行之自若三月王罷建及軍職以為代州刺史漢楊洞潜請立學校開貢舉設銓選漢主巖從之夏四月乙亥以尚書左丞李琪為中書侍郎同平章事琪珽之弟也性疎俊挾趙巖張漢傑之勢頗通賄賂蕭頃與琪同為相頃謹密而隂伺琪短久之有以攝官求仕者琪輒改攝為守頃奏之帝大怒欲流琪逺方趙張左右之止罷為太子少保河中節度使兾王友謙以兵襲取同州逐忠武節度使程全暉全暉奔大梁友謙以其子令德為忠武留後表求節鉞帝怒不許旣而懼友謙怨望己酉以友謙兼忠武節度使制下友謙已求節鉞於晉王晉王以墨制除令德忠武節度使吳宣王重厚恭恪徐温父子專政王未嘗有不平之意形於言色温以是安之及建國稱制尤非所樂多沈飲鮮食遂成寢疾五月温自金陵入朝議當為嗣者或希温意言曰蜀先主謂武侯嗣子不才君宜自取温正色曰吾果有意取之當在誅張顥之初豈至今日邪使楊氏無男有女亦當立之敢妄言者斬乃以王命迎丹楊公溥監國徙溥兄濛為舒州團練使己丑宣王殂六月戊申溥即吳王位尊母王氏曰太妃丁巳蜀以司徒兼門下侍郎同平章事周庠同平章事充永平節度使帝以泰寜節度使劉鄩為河東道招討使帥感化節度使尹皓靜勝節度使温昭圖莊宅使段凝攻同州閏月庚申朔蜀主作高祖原廟于萬里橋帥后妃百官用䙝味作鼓吹祭之華陽尉張士喬上疏諫以為非禮蜀主怒欲誅之太后以為不可乃削官流黎州士喬感憤赴水死劉鄩等圍同州朱友謙求救于晉秋七月晉王遣李存審李嗣昭李建及慈州刺史李存質將兵救之乙卯蜀主下詔北巡以禮部尚書兼成都尹長安韓昭為文思殿大學士位在翰林承㫖上昭無文學以便佞得幸出入宫禁就蜀主乞通渠巴集數州刺史賣之以營居第蜀主許之識者知蜀之將亡八月戊辰蜀主發成都被金甲冠珠帽執弓矢而行旌旗兵甲亘百餘里雒令段融上言不宜逺離都邑當委大臣征討不從九月次安逺城李存審等至河中即日濟河梁人素輕河中兵每戰必窮追不置存審選精甲二百雜河中兵直壓劉鄩壘鄩出千騎逐之知晉人已至大驚自是不敢輕出晉人軍于朝邑河中事梁久將士皆持兩端諸軍大集芻粟踊貴友謙諸子説友謙且歸􅅃於梁以退其師友謙曰昔晉王親赴吾急秉燭夜戰今方與梁相拒又命將星行分我資糧豈可負邪晉人分兵攻華州壞其外城李存審等按兵累旬乃進逼劉鄩營鄩等悉衆出戰大敗收餘衆退保羅文寨又旬餘存審謂李嗣昭曰獸窮則搏不如開其走路然後擊之乃遣人牧馬於沙苑鄩等宵遁追擊至渭水又破之殺獲甚衆存審等移檄告諭關右引兵略地至下邽謁唐帝陵哭之而還河中兵進攻崇州靜勝節度使温昭圖甚懼帝使供奉官竇維説之曰公所有者華原美原兩縣耳雖名節度使實一鎮將比之雄藩豈可同日語也公有意欲之乎昭圖曰然維曰當為公圖之即教昭圖表求移鎮帝以汝州防禦使華温琪權知靜勝留後冬十月辛酉蜀主如武定軍數日復還安逺十一月戊子朔蜀主以兼侍中王宗儔為山南節度使西北面都招討行營安撫使天雄節度使同平章事王宗昱永寧軍使王宗晏左神勇軍使王宗信為三招討以副之將兵伐岐出故關壁於咸宜入良原丁酉王宗儔攻隴州岐王自將萬五千人屯汧陽癸卯蜀將陳彦威出散關敗岐兵于箭筈嶺蜀兵食盡引還宗昱屯秦州宗儔屯上邽宗晏宗信屯威武城庚戌蜀主發安逺城十二月庚申至利州閬州團練使林思諤來朝請幸所治從之癸亥泛江而下龍舟畵舸輝映江渚州縣供辦民始愁怨壬申至閬州州民何康女色美將嫁蜀主取之賜其夫家帛百匹夫一慟而卒癸未至梓州趙王鎔自恃累世鎮成德得趙人心生長富貴雍容自逸治府第園沼極一時之盛多事嬉遊不親政事事皆仰成於僚佐深居府第權移左右行軍司馬李藹宦者李􅀪規用事於中外宦者石希䝉尤以諂諛得幸初劉仁恭使牙將張文禮從其子守文鎮滄州守文詣幽州省其父文禮於後據城作亂滄人討之奔鎮州文禮好誇誕自言知兵趙王鎔竒之養以為子更名德明悉以軍事委之德明將行營兵從晉王鎔欲寄以腹心使都指揮使符習代還以為防城使鎔晚年好事佛及求仙專講佛經受符籙廣齋醮合煉仙丹盛飾館宇於西山每往遊之登山臨水數月方歸將佐士卒陪從者常不下萬人往來供頓軍民皆苦之是月自西山還宿鶻營莊石希蒙勸王復之它所李􅀪規言於王曰晉王夾河血戰櫛風沐雨親冒矢石而王專以供軍之資奉不急之費且時方艱難人心難測王久虚府第逺出遊從萬一有姦人為變閉關相距將若之何王將歸希䝉密言於王曰􅀪規妄生猜間出不遜語以刼脅王專欲誇大於外長威福耳王遂留信宿無歸志􅀪規乃教内牙都將蘇漢衡帥親軍擐甲拔刃詣帳前白王曰士卒暴露已久願從王歸􅀪規因進言曰石希䝉勸王遊從不已且聞欲隂謀為逆請誅之以謝衆王不聽牙兵遂大譟斬希䝉首抵於前王怒且懼亟歸府是夕遣其長子副大使昭祚與王德明將兵圍􅀪規及李藹之第族誅之連坐者數十家又殺蘇漢衡收其黨與窮治反狀親軍大恐吳金陵城成陳彦謙上費用之籍徐温曰吾旣任公不復㑹計悉焚之初閩王審知承制加其從子泉州刺史延彬領平盧節度使延彬治泉州十七年吏民安之㑹得白鹿及紫芝僧浩源以為王者之符延彬由是驕縱密遣使浮海入貢求為泉州節度使事覺審知誅浩源及其黨黜延彬歸私第漢主巖遣使通好于蜀吳越王鏐遣使為其子傳琇求昬于楚楚王殷許之龍德元年春正月甲午蜀主還成都初蜀主之為太子高祖為聘兵部尚書高知言女為妃無寵及韋妃入宫尤見疎薄至是遣還家知言驚仆不食而卒韋妃者徐耕之孫也有姝色蜀主適徐氏見而悦之太后因納於後宫蜀主不欲娶於母族託云韋昭度之孫初為婕妤累加元妃蜀主常列錦步障擊毬其中往往逺適而外人不知􅅡諸香晝夜不絶久而厭之更􅅡皁莢以亂其氣結繒為山及宫殿樓觀於其上或為風雨所敗則更以新者易之或樂飲繒山涉旬不下前穿渠通禁中或乘船夜歸令宫女秉蠟炬千餘居前船却立照之水面如晝或酣飲禁中鼓吹沸騰以至達旦以是為常甲辰徙靜勝節度使温昭圖為匡國節度使鎮許昌昭圖素事趙巖故得名藩蜀主吳主屢以書勸晉王稱帝晉王以書示僚佐曰昔王太師亦甞遺先王書勸以唐室已亡宜自帝一方先王語余云昔天子幸石門吾發兵誅賊臣當是之時威振天下吾若挾天子據關中自作九錫禪文誰能禁我顧吾家世忠孝立功帝室誓死不為耳汝它日當務以復唐社稷為心慎勿效此曹所為言猶在耳此議非所敢聞也因泣旣而將佐及藩鎮勸進不已乃令有司市王造法物黄巢之破長安也魏州僧傳真之師得傳國寶藏之四十年至是傳真以為常玉將鬻之或識之曰傳國寶也傳真乃詣行臺獻之將佐皆奉觴稱賀張承業在晉陽聞之詣魏州諌曰吾王世世忠於唐室救其患難所以老奴三十餘年為王捃拾財賦召補兵馬誓滅逆賊復本朝宗社耳今河北甫定朱氏尚存而王遽即大位殊非從來征伐之意天下其誰不解體乎王何不先滅朱氏復列聖之深讎然後求唐後而立之南取吳西取蜀汛掃宇内合為一家當是之時雖使高祖太宗復生誰敢居王上者讓之愈久則得之愈堅矣老奴之志無它但以受先王大恩欲為王立萬年之基耳王曰此非余所願奈羣下意何承業知不可止慟哭曰諸侯血戰本為唐家今王自取之誤老奴矣即歸晉陽邑邑成疾不復起二月吳改元順義趙王旣殺李􅀪規李藹委政於其子昭祚昭祚性驕愎旣得大權曏時附􅀪規者皆族之􅀪規部兵五百人欲逃聚泣偶語未知所之㑹諸軍有給賜趙王忿親軍之殺石希䝉獨不時與衆益懼王德明素蓄異志因其懼而激之曰王命我盡阬爾曹吾念爾曹無罪併命欲從王命則不忍不然又獲罪於王奈何衆皆感泣是夕親軍有宿於潭城西門者相與飲酒而謀之酒酣其中驍健者曰吾曹識王太保意今夕富貴決矣即踰城入趙王方焚香受籙二人斷其首而出因焚府第軍校張友順帥衆詣德明第請為留後德明復姓名曰張文禮盡滅王氏之族獨置昭祚之妻普寧公主以自託於梁三月吳人歸吳越王鏐從弟龍武統軍鎰于錢唐鏐亦歸吳將李濤于廣陵徐温以濤為右雄武統軍鏐以鎰為鎮海節度副使張文禮遣使告亂于晉王且奉牋勸進因求節鉞晉王方置酒作樂聞之投盃悲泣欲討之僚佐以為文禮罪誠大然吾方與梁爭不可更立敵於肘腋宜且從其請以安之王不得已夏四月遣節度判官盧質承制授文禮成德留後陳州刺史惠王友能反舉兵趣大梁詔陜州留後霍彦威宣義節度使王彦章控鶴指揮使張漢傑將兵討之友能至陳留兵敗走還陳州諸軍圍之五月丙戌朔改元初劉鄩與朱友謙為昏鄩之受詔討友謙也至陜州先遣使移書諭以禍福待之月餘友謙不從然後進兵尹皓段凝素忌鄩因譛之於帝曰鄩逗遛養冦俾俟援兵帝信之鄩旣敗歸以疾請解兵柄詔聽於西都就醫密令留守張宗奭酖之丁亥卒六月乙卯朔日有食之秋七月惠王友能降庚子詔赦其死降封房陵侯晉王旣許藩鎮之請求唐舊臣欲以備百官朱友謙遣前禮部尚書蘇循詣行臺循至魏州入牙城望府廨即拜謂之拜殿見王呼萬嵗舞蹈泣而稱臣翌日又獻大筆三十枚謂之畫日筆王大喜即命循以本官為河東節度副使張承業深惡之張文禮雖受晉命内不自安復遣間使因盧文進求援於契丹又遣間使來告曰王氏為亂兵所屠公主無恙今臣已北召契丹乞朝廷發精甲萬人相助自德棣度河則晉人遁逃不暇矣帝疑未決敬翔曰陛下不乘此舋以復河北則晉人不可復破矣宜徇其請不可失也趙張輩皆曰今彊冦近在河上盡吾兵力以拒之猶懼不支何暇分萬人以救張文禮乎且文禮坐持兩端欲以自固於我何利焉帝乃止晉人屢於塞上及河津獲文禮蠟丸絹書晉王皆遣使歸之文禮慙懼文禮忌趙故將多所誅滅符習將趙兵萬人從晉王在德勝文禮請召歸以它將代之且以習子䝉為都督府參軍遣人齎錢帛勞行營將士以悅之習見晉王泣涕請留晉王曰吾與趙王同盟討賊義猶骨肉不意一旦禍生肘腋吾誠痛之汝茍不忘舊君能為之復讎乎吾以兵糧助汝習與部將三千餘人舉身投地慟哭曰故使授習等劒使之攘除冦敵自聞變故以來寃憤無訴欲引劒自剄顧無益於死者今大王念故使輔佐之勤許之復寃習等不敢煩霸府之兵願以所部徑前搏取凶豎以報王氏累世之恩死不恨矣八月庚申晉王以習為成德留後又命天平節度使閻寶相州刺史史建瑭將兵助之自邢洺而北文禮先病腹疽甲子晉兵拔趙州刺史王鋋降晉王復以為刺史文禮聞之驚懼而卒其子處瑾祕不發䘮與其黨韓正時謀悉力拒晉九月晉兵渡滹沱圍鎮州決漕渠以灌之獲其深州刺史張友順壬辰史建瑭中流矢卒晉王欲自分兵攻鎮州北面招討使戴思逺聞之謀悉楊村之衆襲德勝北城晉王得梁降者知之冬十月己未晉王命李嗣源伏兵於戚城李存審屯德勝先以騎兵誘之偽示羸怯梁兵競進晉王嚴中軍以待之梁兵至晉王以鐵騎三千奮擊梁兵大敗思逺走趣楊村士卒為晉兵所殺傷及自相蹈藉墜河陷冰失亡二萬餘人晉王以李嗣源為蕃漢内外馬步副揔管同平章事初義武節度使兼中書令王處直未有子妖人李應之得小兒劉雲郎於陘邑以遺處直曰是兒有貴相使養為子名之曰都及壯便佞多詐處直愛之置新軍使典之處直有孽子郁無寵奔晉晉王克用以女妻之累遷至新州團練使餘子皆幼處直以都為節度副大使欲以為嗣及晉王存勗討張文禮處直以平日鎮定相為脣齒恐鎮亡而定孤固諫以為方禦梁㓂且宜赦文禮晉王荅以文禮弑君義不可赦又潜引梁兵恐於易定亦不利處直患之以新州地鄰契丹乃潜遣人語郁使賂契丹召令犯塞務以解鎮州之圍其將佐多諫不聽郁素疾都冒繼其宗乃邀處直求為嗣處直許之軍府之人皆不欲召契丹都亦慮郁奪其處乃隂與書吏和昭訓謀刧處直㑹處直與張文禮使者宴於城東暮歸都以新軍數百伏於府第大譟刧之曰將士不欲以城召契丹請令公歸西第乃并其妻妾幽之西第盡殺處直子孫在中山及將佐之為處直腹心者都自為留後具以狀白晉王晉王因以都代處直吳徐温勸吳王祀南郊或曰禮樂未備且唐祀南郊其費巨萬今未能辦也温曰安有王者而不事天乎吾聞事天貴誠多費何為唐每郊祀啟南門灌其樞用脂百斛此乃季世奢泰之弊又安足法乎甲子吳王祀南郊配以太祖乙丑大赦加徐知誥同平章事領江州觀察使尋以江州為奉化軍以知誥領節度使徐温聞壽州團練使崔太初苛察失民心欲徵之徐知誥曰壽州邊隅大鎮徵之恐為變不若使其入朝因留之温怒曰一崔太初不能制如它人何徵為右雄武大將軍十一月晉王使李存審李嗣源守德勝自將兵攻鎮州張處瑾遣其弟處琪幕僚齊儉謝罪請服晉王不許盡鋭攻之旬日不克處瑾使韓正時將千騎突圍出趣定州欲求救於王處直晉兵追至行唐斬之契丹主旣許盧文進出兵王郁又説之曰鎮州美女如雲金帛如山天皇王速往則皆己物也不然為晉王所有矣契丹主以為然悉發所有之衆而南述律后諫曰吾有西樓羊馬之富其樂不可勝窮也何必勞師逺出以乘危徼利乎吾聞晉王用兵天下莫敵脱有危敗悔之何及契丹主不聽十二月辛未攻幽州李紹宏嬰城自守契丹長驅而南圍涿州旬日拔之擒刺史李嗣弼進寇定州王都告急于晉晉王自鎮州將親軍五千救之遣神武都指揮使王思同將兵戍狼山之南以拒之高季昌遣都指揮使倪可福以卒萬人修江陵外郭季昌行視責功程之慢杖之季昌女為可福子知進婦季昌謂其女曰歸語汝舅吾欲威衆辦事耳以白金數百兩遺之是嵗漢以尚書左丞倪曙同平章事辰溆州蠻侵楚楚寧逺節度副使姚彦章討平之二年春正月壬午朔王都省王處直於西第處直奮拳敺其胷曰逆賊我何負於汝旣無兵刃將噬其鼻都掣袂獲免未幾處直憂憤而卒甲午晉王至新城南􅇋騎白契丹前鋒宿新樂涉沙河而南將士皆失色士卒有亡去者主將斬之不能止諸將皆曰虜傾國而來吾衆寡不敵又聞梁冦内侵宜且還師魏州以救根本或請釋鎮州之圍西入井陘避之晉王猶豫未決中門使郭崇韜曰契丹為王郁所誘本利貨財而來非能救鎮州之急難也王新破梁兵威振夷夏契丹聞王至心沮氣索茍挫其前鋒遁走必矣李嗣昭自潞州至亦曰今彊敵在前吾有進無退不可輕動以搖人心晉王曰帝王之興自有天命契丹其如我何吾以數萬之衆平定山東今遇此小虜而避之何面目以臨四海乃自帥鐵騎五千先進至新城北半出桑林契丹萬餘騎見之驚走晉王分軍為二逐之行數十里獲契丹主之子時沙河橋狹冰薄契丹陷溺死者甚衆是夕晉王宿新樂契丹主車帳在定州城下敗兵至契丹舉衆退保望都晉王至定州王都迎謁於馬前宴於府第請以愛女妻王子繼岌戊戌晉王引兵趣望都契丹逆戰晉王以親軍千騎先進遇奚酋秃餧五千騎為其所圍晉王力戰出入數四自午至申不解李嗣昭聞之引三百騎横擊之虜退王乃得出因縱兵奮撃契丹大敗逐北至易州㑹大雪彌旬平地數尺契丹人馬無食死者相屬於道契丹主舉手指天謂盧文進曰天未令我至此乃北歸晉王引兵躡之隨其行止見其野宿之所布藁於地回環方正皆如編翦雖去無一枝亂者歎曰虜用法嚴乃能如是中國所不及也晉王至幽州使二百騎躡契丹之後曰虜出境即還騎恃勇追擊之悉為所擒惟兩騎自它道走免契丹主責王郁縶之以歸自是不聽其謀晉代州刺史李嗣肱將兵定媯儒武等州授山北都團練使晉王之北攻鎮州也李存審謂李嗣源曰梁人聞我在南兵少不攻德勝必襲魏州吾二人聚於此何為不若分軍備之遂分軍屯澶州戴思逺果悉楊村之衆趣魏州嗣源引兵先之軍於狄公祠下遣人告魏州使為之備思逺至魏店嗣源遣其將石萬全將騎兵挑戰思逺知有備乃西度洹水拔成安大掠而還又將兵五萬攻德勝北城重塹複壘斷其出入晝夜急攻之李存審悉力拒守晉王聞德勝勢危二月自幽州赴之五日至魏州思逺聞之燒營遁還楊村蜀主好為微行酒肆倡家靡所不到惡人識之乃下令士民皆著大裁帽晉天平節度使兼侍中閻寶築壘以圍鎮州決呼沱水環之内外斷絶城中食盡丙午遣五百餘人出求食寶縱其出欲伏兵取之其人遂攻長圍寶輕之不為備俄數千人繼至諸軍未集鎮人遂壞長圍而出縱火攻寶營寶不能拒退保趙州鎮人悉毁晉之營壘取其芻粟數日不盡晉王聞之以昭義節度使兼中書令李嗣昭為北面招討使以代寶夏四月蜀軍使王承綱女將嫁蜀主取之入宫承綱請之蜀主怒流於茂州女聞父得罪自殺甲戌張處瑾遣兵千人迎糧於九門李嗣昭設伏於故營邀擊之殺獲殆盡餘五人匿於牆墟閒嗣昭環馬而射之鎮兵發矢中其腦嗣昭箙中矢盡拔矢於腦以射之一發而殪㑹日暮還營創流血不止是夕卒晉王聞之不御酒肉者累日嗣昭遺命悉以澤潞兵授節度判官任圜使督諸軍攻鎮州號令如一鎮人不知嗣昭之死圜三原人也晉王以天雄馬歩都指揮使振武節度使李存進為北面招討使命嗣昭諸子護䘮歸葬晉陽其子繼能不受命帥父牙兵數千自行營擁䘮歸潞州晉王遣母弟存渥馳騎追諭之兄弟俱忿欲殺存渥存渥逃歸嗣昭七子繼儔繼韜繼達繼忠繼能繼襲繼逺繼儔為澤州刺史當襲爵素懦弱繼韜凶狡囚繼儔於别室詐令士卒刧已為留後繼韜陽讓以事白晉王晉王以用兵方殷不得已改昭義軍曰安義以繼韜為留後閻寶慙憤疽發於背甲戌卒漢主巖用術者言遊梅口鎮避災其地近閩之西鄙閩將王延美將兵襲之未至數十里偵者告之巖遁逃僅免五月乙酉晉李存進至鎮州營于東垣渡夾呼沱水為壘晉衛州刺史李存儒本姓楊名婆兒以俳優得幸於晉王頗有膂力晉王賜姓名以為刺史專事掊歛防城卒皆徵月課縱歸八月莊宅使段凝與步軍都指揮使張朗引兵夜度河襲之詰旦登城執存儒遂克衛州戴思逺又與凝攻陷淇門共城新鄉於是澶州之西相州之南皆為梁有晉人失軍儲三之一梁軍復振帝以張朗為衛州刺史朗徐州人也九月戊寅朔張處瑾使其弟處球乘李存進無備將兵七千人奄至東垣渡時晉之騎兵亦向鎮州城不兩不相遇鎮兵及存進營門存進狼狽引十餘人鬬于橋上鎮兵退晉騎兵斷其後夾擊之鎮兵殆盡存進亦戰沒晉王以蕃漢馬步揔管李存審為北面招討使鎮州食竭力盡處瑾遣使詣行臺請降未報存審兵至城下丙午夜城中將李再豐為内應密投縋以納晉兵比明畢登執處瑾兄弟家人及其黨高濛李翥齊儉送行臺趙人皆請而食之磔張文禮尸於市趙王故侍者得趙王遺骸於灰燼中晉王命祭而葬之以趙將符習為成德節度使烏震為趙州刺史趙仁貞為深州刺史李再豐為兾州刺史震信都人也符習不敢當成德辭曰故使無後而未葬習當斬衰以葬之俟禮畢聽命旣葬即詣行臺趙人請晉王兼領成德節度使從之晉王割相衛二州置義寧軍以習為節度使習辭曰魏博霸府不可分也願得河南一鎮習自取之乃以為天平節度使東南面招討使加李存審兼侍中十一月戊寅晉特進河東監軍使張承業卒曹太夫人詣其第為之行服如子姪之禮晉王聞其喪不食者累日命河東留守判官何瓉代知河東軍府事十二月晉王以魏博觀察判官晉陽張憲兼鎮兾觀察判官權鎮州軍府事魏州税多逋負晉王以讓司錄濟隂趙季艮季艮曰殿下何時當平河南王怒曰汝職在督税職之不脩何敢預我軍事季良對曰殿下方謀攻取而不愛百姓一旦百姓離心恐河北亦非殿下之有况河南乎王悦謝之自是重之每預謀議是嵗契丹改元天賛大封王躬乂性殘忍海軍統帥王建殺之自立復稱高麗王以開州為東京平壤為西京建儉約寛厚國人安之資治通鑑卷第二百七十一
