front:
  text: 爲亂階雖逺何益請死於此恥復屢遷竟未及往魏師之􅀲歩人情忷懼上慮不逞之人復奉義康爲亂太子劭及武陵王駿尚書左僕射何尚之屢啓宜早爲之所上乃遣中書舍人嚴龍齎藥賜義康死義康不肯服曰佛教不許自殺願隨宜處分使者以􅀍揜殺之江夏王義恭以碻磝不可守召王玄謨還歴城魏人追擊敗之遂取碻磝初上聞魏將入宼命廣陵太守劉懐之逆燒城府船乗盡帥其民渡江山陽太守蕭僧珍悉歛其民入城臺送糧仗詣盱眙及滑臺者以路不通皆留山陽蓄陂水令滿須魏人至決以灌之魏人過山陽不敢留因攻盱眙魏主就臧質求酒質封溲便與之魏主怒築長圍一夕而合運東山土石以填塹作浮橋於君山絶水陸道魏主遺質書曰吾今所遣鬬兵盡非我國人城東北是丁零與胡南是氐羌設使丁零死正可減常山趙郡賊胡死減并州賊氐羌死減􅀜中賊卿􅀂殺之無所不利質復書曰省示具悉姦懐爾自恃四足屢犯邉境王玄謨退於東申坦散於西爾知其所以然邪爾獨不聞童謡之言乎葢卯年未至故以二軍開飲江之路耳冥期使然非復人事寡人受命相滅期之白登師行未逺爾自送死豈容復令爾生全饗有桑乾哉爾有幸得爲亂兵所殺不幸則生相鎻縛載以一驢直送都市耳我本圖全􅀂天地無靈力屈於爾韲之粉之屠之裂之猶未足以謝本朝爾智識及衆力豈能勝苻堅邪今春雨已降兵方四集爾但安意攻城勿遽走糧食乏者可見語當出廩相貽得所送劔刀欲令我揮之爾身邪魏主大怒作鐡牀於其上施鐡鑱曰破城得質當坐之此上質又與魏衆書曰爾語虜中諸士庶佛狸所與書相待如此爾等正朔之民何爲自取縻滅豈可不知轉禍爲福邪并寫臺格以與之云斬佛狸首封萬戸矦賜布絹各萬匹魏人以鉤車鉤城樓城内繫以彄絙數百人唱呼引之車不能退既夜縋桶懸卒出截其鉤獲之明日又以衝車攻城城土堅密毎至頽落不過數升魏人乃肉薄登城分畨相代墜而復升莫有退者殺傷萬計尸與城平凡攻之三旬不拔㑹魏軍中多疾疫或告以建康遣水軍自海入淮又敕彭城斷其歸路二月丙辰朔魏主燒攻具退走盱眙人欲追之沈璞曰今兵不多雖可固守不可出戰但整舟楫示􅀂欲北渡者以速其走計不須實行也臧質以璞城主使之上露板璞固辭歸功於質上聞益嘉之魏師過彭城江夏王義恭震懼不敢擊或告虜驅南口萬餘夕應宿安王陂去城數十里今追之可悉得諸將皆請行義恭禁不許明日驛使至上敕義恭悉力急追魏師已逺義恭乃遣鎮軍司馬檀和之向蕭城魏人先已聞之盡殺所驅者而去程天祚逃歸魏人凡破南兖徐兖豫青冀六州殺掠不可勝計丁壯者即加斬截嬰兒貫於槊上槃舞以爲戯所過郡縣赤地無餘春鷰歸巢於林木魏之士馬死傷亦過半國人皆尤之上毎命將出師常授以成律交戰日時亦待中詔是以將帥趑趄莫敢自決又江南白丁輕進易退此其所以敗也自是邑里蕭條元嘉之政衰矣癸酉詔賑恤郡縣民遭宼者蠲其稅調甲戌降太尉義恭爲驃騎將軍開府儀同三司戊寅魏主濟河辛巳降鎮軍將軍武陵王駿爲北中郎將壬午上如􅀲歩是日解嚴初魏中書學生盧度丗玄之子也坐崔浩事亡命匿髙陽鄭羆家吏囚羆子掠治之羆戒其子曰君子殺身成仁雖死不可言其子奉父命吏以火􅅡其體終不言而死及魏主臨江上遣殿上將軍黄延年使於魏魏主問曰盧度丗亡命已應至彼延年曰都下不聞有度丗也魏主乃赦度丗及其族逃亡籍没者度丗自出魏主以爲中書侍郎度丗爲其弟娶鄭羆妹以報德三月乙酉帝還宫己亥魏主還平城飲至告廟以降民五萬餘家分置近畿初魏主過彭城遣人語城中曰食盡且去須麥熟更來及期江夏王義恭議欲芟麥翦苗移民堡聚鎮軍録事參軍王孝孫曰虜不能復來既自可保如其更至此議亦不可立百姓閉在内城飢饉日久方春之月野採自資一入保聚餓死立至民知必死何可制邪虜􅀂必來芟麥無晚四坐黙然莫之敢對長史張暢曰孝孫之議實有可尋鎮軍府典籖董元嗣侍武陵王駿之側進曰王録事議不可奪别駕王子夏曰此論誠然暢斂板白駿曰下官欲命孝孫彈子夏駿曰王别駕有何事邪暢曰芟麥移民可謂大議一方安危事係於此子夏親爲州端曽無同異及聞元嗣之言則懽笑酬荅阿意左右何以事君子夏元嗣皆大慙義恭之議遂寢初魯宗之奔魏其子軌爲魏荆州刺史襄陽公鎮長社常思南歸以昔殺劉康祖及徐湛之之父故不敢來軌卒子爽襲父官爵爽少有武幹與弟秀皆有寵於魏主秀爲中書郎既而兄弟各有罪魏主詰責之爽秀懼誅從魏主自􅀲歩還至湖陸請曰奴與南有仇毎兵來常恐禍及墳墓乞共迎䘮還葬平城魏主許之爽至長社殺魏戍兵數百人帥部曲及願從者千餘家奔汝南夏四月爽遣秀詣夀陽奉書於南平王鑠以請降上聞之大喜以爽爲司州刺史鎮義陽秀爲潁川太守餘弟姪並授官爵賞賜甚厚魏人毁其墳墓徐湛之以爲廟筭逺圖特所奬納不敢苟申私怨乞屏居田里不許
