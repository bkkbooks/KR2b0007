body:
  text: 青州民司馬順則自稱􅀳室近屬聚衆號齊王梁鄒戍主崔勲之詣州五月乙酉順則乗虚襲據梁鄒城又有沙門自稱司馬百年亦聚衆號安定王以應之壬寅魏大赦己巳以江夏王義恭領南兖州刺史徙鎮盱眙増督十二州諸軍事戊申以尚書左僕射何尚之爲尚書令太子詹事徐湛之爲僕射護軍將軍尚之以湛之國戚任遇隆重毎事推之詔湛之與尚之並受辭訴尚之雖爲令而朝事悉歸湛之六月壬戌魏改元正平魏主命太子少傅游雅中書侍郎胡方回等更定律令多所増損凡三百九十一條魏太子晃監國頗信任左右又營園田收其利髙允諌曰天地無私故能覆載王者無私故能容養今殿下國之儲貳萬方所則而營立私田畜養雞犬乃至酤販市㕓與民爭利謗聲流布不可追掩夫天下者殿下之天下富有四海何求而無乃與販夫販婦競此尺寸之利乎昔虢之將亡神賜之土田漢靈帝私立府藏皆有顛覆之禍前鑒􅀂此甚可畏也武王愛周邵齊畢所以王天下殷紂愛飛廉惡來所以䘮其國今東宫儁乂不少頃來侍御左右者恐非在朝之選願殿下斥去佞邪親近忠良所在田園分給貧下販賣之物以時收散如此則休聲日至謗議可除矣不聽太子爲政精察而中常侍宗愛性險暴多不法太子惡之給事中仇尼道盛侍郎任平城有寵於太子頗用事皆與愛不恊愛恐爲道盛等所糾遂構告其罪魏主怒斬道盛等於都街東宫官屬多坐死帝怒甚戊辰太子以憂卒壬申葬金陵諡曰景穆帝徐知太子無罪甚悔之秋七月丁亥魏主如隂山青冀二州刺史蕭斌遣振武將軍劉武之等擊司馬順則司馬百年皆斬之癸亥梁鄒平蕭斌王玄謨皆坐退敗免官上問沈慶之曰斌欲斬玄謨而卿止之何也對曰諸將奔退莫不懼罪自歸而死將至逃散故止之九月癸巳魏主還平城冬十月庚申復如隂山上遣使至魏魏遣殿中將軍郎法祐來修好己巳魏上黨靖王長孫道生卒十二月丁丑魏主封景穆太子之子濬爲髙陽王既而以皇孫丗嫡不當爲藩王乃止時濬生四年聦達過人魏主愛之常置左右徙秦王翰爲東平王燕王譚爲臨淮王楚王建爲廣陽王吳王余爲南安王帝使沈慶之徙彭城流民數千家於􅀲歩征北參軍程天祚徙江西流民數千家於姑孰帝以吏部郎王僧綽爲侍中僧綽曇首之子也幼有大成之度衆皆以國器許之好學有思理練悉朝典尚帝女東陽獻公主在吏部諳悉人物舉拔咸得其分及爲侍中年二十九沈深有局度不以才能髙人帝頗以後事爲念以其年少欲大相付託朝政大小皆與參焉帝之始親政事也委任王華王曇首殷景仁謝弘微劉湛次則范曄沈演之庾炳之最後江湛徐湛之何瑀之及僧綽凡十二人唐和入朝于魏魏主厚禮之二十九年春正月魏所得宋民五千餘家在中山者謀叛州軍討誅之冀州刺史張掖王沮渠萬年坐與叛者通謀賜死魏丗祖追悼景穆太子不已中常侍宗愛懼誅二月甲寅弑帝尚書左僕射蘭延侍中和疋薛提等祕不發䘮延疋以皇孫濬沖幼欲立長君徴秦王翰置之秘室提以濬嫡皇孫不可廢議久不決宗愛知之自以得罪於景穆太子而素惡秦王翰善南安王余乃宻迎余自中宫便門入禁中矯稱赫連皇后令召延等延等以愛素賤不以爲疑皆隨入愛先使宦者三十人持兵伏於禁中延等入以次收縛斬之殺秦王翰於永巷而立余大赦改元承平尊皇后爲皇太后以愛爲大司馬大將軍太師都督中外諸軍事領中祕書封馮翊王庚午立皇子休仁爲建安王三月辛卯魏葬太武皇帝于金陵廟號丗祖上聞魏丗祖殂更謀北伐魯爽等復勸之上訪於羣臣太子中庶子何偃以爲淮泗數州瘡痍未復不宜輕動上不從偃尚之之子也夏五月丙申詔曰虐虜窮凶著於自昔未勞資斧已伏天誅拯溺蕩穢今其㑹也可符驃􅀐司空二府各部分所統東西應接歸義建績者隨勞酬奬於是遣撫軍將軍蕭思話督冀州刺史張永等向碻磝魯爽魯秀程天祚將荆州甲士四萬出許洛雍州刺史臧質帥所領趣潼闗永茂度之子也沈慶之固諌北伐上以其異議不使行靑州剌史劉興祖上言以爲河南阻飢野無所掠脫諸城固守非旬月可抜稽留大衆轉輸方勞應機乗􅀔事存急􅄩今偽帥始死兼逼暑時國内猜擾不暇逺逊愚謂宜長驅中山據其闗要冀州以北民人尚豐兼麥已向熟因資爲易向義之徒必應響赴􅀂中州震動黄河以南自當消潰臣請發青冀七千兵遣將領之直入其心腹􅀂前驅克勝張永及河南衆軍宜一時濟河使聲實兼舉並建司牧撫柔初附西拒太行北塞軍都因事指麾隨宜加授畏威欣寵人百其懐􅀂能成功清壹可待􅀂不克捷不爲大傷並催促裝束伏聽敇旨上意止存河南亦不從上又使貟外散􅀐侍郎琅邪徐爰隨軍向碻磝衘中旨授諸將方略臨時宣示尚書令何尚之以老請致仕退居方山議者咸謂尚之不能固志既而詔書敦諭數四六月戊申朔尚之復起視事御史中丞袁淑録自古隠士有迹無名者爲真隱傳以嗤之秋七月張永等至碻磝引兵圍之壬辰徙汝隂王渾爲武昌王淮陽王彧爲湘東王初潘淑妃生始興王濬元皇后性妬以淑妃有寵於上恚恨而殂淑妃專揔内政由是太子劭深惡淑妃及濬濬懼爲將來之禍乃曲意事劭劭更與之善吳興巫嚴道育自言能辟穀服食役使􅀑物因東陽公主婢王鸚鵡出入主家道育謂主曰神將有符賜主主夜卧見流光􅀂螢飛入書笥開視得二青珠由是主與劭濬皆信惑之劭濬並多過失數爲上所詰責使道育祈請欲令過不上聞道育曰我已爲上天陳請必不泄露劭等敬事之號曰天師其後遂與道育鸚鵡及東陽主奴陳天與黃門陳慶國共爲巫蠱琢玉爲上形像埋於含章殿前劭補天與爲隊主東陽主卒鸚鵡應出嫁劭濬慮語泄濬府佐吳興沈懐逺素爲濬所厚以鸚鵡嫁之爲妾上聞天與領隊以讓劭曰汝所用隊主副並是奴邪劭懼以書告濬濬復書曰彼人􅀂所爲不已正可促其餘命或是大慶之漸耳劭濬相與往來書疏常謂上爲彼人或曰其人謂江夏王義恭爲佞人鸚鵡先與天與私通既適懐逺恐事泄白劭使密殺之陳慶國懼曰巫蠱事唯我與天與宣傳往來今天與死我其危哉乃具以其事白上上大驚即遣收鸚鵡封籍其家得劭濬書數百􅁓皆呪詛巫蠱之言又得所埋玉人命有司窮治其事道育亡命捕之不獲先是濬自揚州刺史出鎮京口及廬陵王紹以疾解揚州意謂巳必復得之既而上用南譙王義宣濬殊不樂乃求鎮江陵上許之濬入朝遣還京口爲行留處分至京口數日而巫蠱事􅀤上惋歎彌日謂潘淑妃曰太子圖富貴更是一理虎頭復如此非復思慮所及汝母子豈可一日無我邪遣中使切責劭濬劭濬惶懼無辭唯陳謝而已上雖怒甚猶未忍罪也諸軍攻碻磝治三攻道張永等當東道濟南太守申坦等當西道揚武司馬崔訓當道攻之累旬不拔八月辛亥夜魏人自地道潜出燒崔訓營及攻具癸丑夜又燒東圍及攻具尋復毁崔訓攻道張永夜撤圍退軍不告諸將士卒驚擾魏人乗之死傷塗地蕭思話自往増兵力攻旬餘不拔是時青徐不稔軍食乏丁卯思話命諸軍皆退屯歴城斬崔訓繫張永申坦於獄魯爽至長社魏戍主秃髠幡棄城走臧質頓兵近郊不以時􅀤獨遣冠軍司馬柳元景帥後軍行參軍薛安都等向潼關元景等進據洪闗梁州刺史劉秀之遣司馬馬汪與左軍中兵參軍蕭道成將兵向長安道成承之之子也魏冠軍將軍封禮自浢津南渡赴弘農九月司空髙平公兒烏干屯潼􅀜平南將軍黎公遼屯河内吐谷渾王慕利延卒樹洛干之子拾寅立始居伏羅川遣使來請命于魏丁亥以拾寅爲安西將軍西秦河沙三州刺史河南王魏以拾寅爲鎮西大將軍沙州刺史西平王庚寅魯爽與魏豫州刺史拓跋僕蘭戰于大索破之進攻虎牢聞碻磝敗退與栁元景皆引兵還蕭道成馬汪等聞魏救兵將至還趣仇池己丑詔解蕭思話徐州更領冀州刺史鎮歴城上以諸將屢出無功不可專責張永等賜思話詔曰虜既乗利方向盛冬若脫敢送死兄弟父子自共當之耳言及憎憤可以示張永申坦又與江夏王義恭書曰早知諸將軰如此恨不以白刃驅之今者悔何所及義恭尋奏免思話官從之魏南安隱王余自以違次而立厚賜羣下欲以收衆心旬月之閒府藏虚竭又好酣飲及聲樂畋獵不恤政事宗愛爲宰相録三省揔宿衞坐召公卿專恣日甚余患之謀奪其權愛憤怒冬十月丙午朔余夜祭東廟愛使小黃門賈周等就弑余而祕之唯羽林郎中代人劉尼知之尼勸愛立皇孫濬愛驚曰君大癡人皇孫􅀂立豈忘正平時事乎尼曰􅀂爾今當立誰愛曰待還宫當擇諸王賢者立之尼恐愛爲變密以狀告殿中尚書源賀賀時與尼俱典兵宿衞乃與南部尚書陸麗謀曰宗愛既立南安還復殺之今又不立皇孫將不利於社稷遂與麗定謀共立皇孫麗俟之子也戊申賀與尚書長孫渴侯嚴兵守衞宫禁使尼麗迎皇孫於苑中麗抱皇孫於馬上入平城賀渴矦開門納之尼馳還東廟大呼曰宗愛弑南安王大逆不道皇孫已登大位有詔宿衞之士皆還宫衆咸呼萬嵗遂執宗愛賈周等勒兵而入奉皇孫即皇帝位登永安殿大赦改元興安殺愛周皆具五刑夷三族西陽五水羣蠻反自淮汝至于江沔咸被其患詔太尉中兵叅軍沈慶之督江豫荆雍四州兵討之魏以驃􅀐大將軍拓跋壽樂爲太宰都督中外諸軍録尚書事長孫渴矦爲尚書令加儀同三司十一月壽樂渴矦坐爭權並賜死癸未魏廣陽簡王建臨淮宣王譚皆卒甲申魏主母閭氏卒魏南安王余之立也以古弼爲司徒張黎爲大尉及髙宗立弼黎議不合旨黜爲外都大官坐有怨言且家人告其爲巫蠱皆被誅壬寅廬陵昭王紹卒魏追尊景穆太子爲景穆皇帝皇妣閭氏爲恭皇后尊乳母常氏爲保太后隴西屠各王景文叛魏署置王矦魏統萬鎮將南陽王惠壽外都大官于洛抜督四州之衆討平之徙其黨三千餘家於趙魏十二月戊申魏葬恭皇后于金陵魏丗祖晩年佛禁稍弛民閒往往有私習者及髙宗即位羣臣多請復之乙卯詔州郡縣衆居之所各聽建佛圖一區民欲爲沙門者聽出家大州五十人小州四十人於是曏所毁佛圖率皆修復魏主親爲沙門師賢等五人下髪以師賢爲道人統丁巳魏以樂陵王周忸爲太尉南部尚書陸麗爲司徒鎮西將軍杜元寳爲司空麗以迎立之功受心膂之􅀉朝臣無出其右者賜爵平原王麗辭曰陛下國之正統當承基緒效順奉迎臣子常職不敢慆天之功以千大賞再三不受魏主不許麗曰臣父奉事先朝忠勤著效今年逼桑榆願以臣爵授之帝曰朕爲天下主豈不能使卿父子爲二王邪戊午進其父建業公俟爵爲東平王又命麗妻爲妃復其子孫麗力辭不受帝益嘉之以東安公劉尼爲尚書僕射西平公源賀爲征北將軍並進爵爲王帝班賜羣臣謂源賀曰卿任意取之賀辭曰南北未賔府庫不可虛也固與之乃取戎馬一匹髙宗之立也髙允預其謀陸麗等皆受重賞而不及允允終身不言甲子周忸坐事賜死時魏法深峻源賀奏謀反之家男子十三以下本不預謀者宜免死没官從之江夏王義恭還朝辛未以義恭爲大將軍南徐州刺史録尚書如故初魏入中原用景初曆丗祖克沮渠氏得趙􅜫玄始曆時人以為宻是嵗始行之資治通鑑卷第一百二十六
