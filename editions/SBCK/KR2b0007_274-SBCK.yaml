front:
  text: 資治通鑑卷第二百七十四
  hash: sha256:2cf36a2001637fa7f73a370a3a88d3105faa312cf3087f6f2f8f33ad80fbb3c1
body:
  text: 臣司馬光奉勑編集後唐紀三兆閹茂三月不滿一年起旃䝉作噩十一月盡莊宗光聖神閔孝皇帝下同光三年十一月丙申蜀主至成都百官及後宫迎于七里亭蜀主入妃嬪中作回鶻隊入宫丁酉出見羣臣於文明殿泣下霑襟君臣相視竟無一言以救國患戊戌李紹琛至利州修桔栢浮梁昭武節度使林思諤先弃城奔閬州遣使請降甲辰魏王繼岌至劒州蜀武信節度使兼中書令王宗壽以遂合渝瀘昌五州降王宗弼至成都登大􅀇門嚴兵自衞蜀主及太后自往勞之宗弼驕慢無復臣禮乙巳劫遷蜀主及太后後宫諸王于西宫收其璽綬使親吏於義興門邀取内庫金帛悉歸其家其子承㳙杖劒入宫取蜀主寵姬數人以歸丙午宗弼自稱權西川兵馬留後李紹琛進至綿州倉庫民居已為蜀兵所燔又斷綿江浮梁水深無舟楫可渡紹琛謂李嚴曰吾懸軍深入利在速戰乗蜀人破膽之時但得百騎過鹿頭闗彼且迎降不暇若俟修繕橋梁必留數日或教王􅄛堅閉近闗折吾兵勢儻延旬浹則勝負未可知矣乃與嚴乗馬浮渡江從兵得濟者僅千人溺死者亦千餘人遂入鹿頭闗丁未進據漢州居三日後軍始至王宗弼遣使以幣馬牛酒勞軍且以蜀主書遺李嚴曰公來吾即降或謂嚴公首建伐蜀之策蜀人怨公深入骨髓不可往嚴不從欣然馳入成都撫諭吏民告以大軍繼至蜀君臣後宫皆慟哭蜀主引嚴見太后以母妻為託宗弼猶乗城為守備嚴悉命撤去樓櫓己酉魏王繼岌至綿州蜀主命翰林學士李昊草降表又命中書侍郎同平章事王鍇草降書遣兵部侍郎歐陽彬奉之以迎繼岌及郭崇韜王宗弼稱蜀君臣久欲歸命而内樞密使宋光嗣景潤澄宣徽使李周輅歐陽晃熒惑蜀主皆斬之函首送繼岌又責文思殿大學士禮部尚書成都尹韓昭佞諛梟于金馬坊門内外馬步都指揮使兼中書令徐延瓊果州團練使潘在迎嘉州刺史顧在珣及諸貴戚皆惶恐傾其家金帛妓妾以賂宗弼僅得免死凡素所不快者宗弼皆殺之辛亥繼岌至德陽宗弼遣使奉牋稱已遷蜀主於西第安撫軍城以俟王師又使其子承班以蜀主後宫及珍玩賂繼岌及郭崇韜求西川節度使繼岌曰此皆我家物奚以獻為留其物而遣之李紹琛留漢州八日以俟都綂甲寅繼岌至漢州王宗弼迎謁乙卯至成都丙辰李嚴引蜀主及百官儀衞出降於升遷橋蜀主白衣銜璧牽羊草繩縈首百官衰絰徒跣輿櫬號哭俟命繼岌受璧崇韜解縛焚櫬承制釋罪君臣東北向拜謝丁巳大軍入成都崇韜禁軍士侵掠市不改肆自出師至克蜀凡七十日得節度十州六十四縣二百四十九兵三萬鎧仗錢糧金銀繒錦共以千萬計髙季興聞蜀亡方食失匕箸曰是老夫之過也梁震曰不足憂也唐主得蜀益驕亡無日矣安知其不為吾福楚王殷聞蜀亡上表稱臣已營衡麓之間為莵裘之地願上印綬以保餘齡上優詔慰諭之平蜀之功李紹琛為多位在董璋上而璋素與郭崇韜善崇韜數召璋與議軍事紹琛心不平謂璋曰吾有平蜀之功公等樸樕相從反呫囁於郭公之門謀相傾害吾為都將獨不能以軍法斬公邪璋訴于崇韜十二月崇韜表璋為東川節度使解其軍職紹琛愈怒曰吾冒白刃陵險阻定兩川璋乃坐有之邪乃見崇韜言東川重地任尚書有文武才宜表為帥崇韜怒曰紹琛反邪何敢違吾節度紹琛懼而退初帝遣宦者李從襲等從魏王繼岌伐蜀繼岌雖為都綂軍中制置補署一出郭崇韜崇韜終日決事將吏賔客趨走盈庭而都統府惟大將晨謁外牙門索然從襲等固恥之及破蜀蜀之貴臣大將爭以寶貨妓樂遺崇韜及其子廷誨魏王所得不過匹馬束帛唾壼麈柄而巳從襲等益不平王宗弼之自為西川留後也賂崇韜求為節度使崇韜陽許之既而久未得乃帥蜀人列狀見繼岌請留崇韜鎮蜀從襲等因謂繼岌曰郭公父子專横今又使蜀人請已爲帥其志難測王不可不為之備繼岌謂崇韜曰主上倚侍中如山嶽不可離廟堂豈肯弃元臣於蠻夷之域乎且此非余之所敢知也請諸人詣闕自陳由是繼岌與崇韜互相疑㑹宋光葆自梓州來訢王宗弼誣殺宋光嗣等又崇韜徴犒軍錢數萬緡於宗弼宗弼靳之士卒怨怒夜縱火諠譟崇韜欲誅宗弼以自明己巳白繼岌收宗弼及王宗勲王宗渥皆數其不忠之罪族誅之籍没其家蜀人爭食宗弼之肉辛未閩忠懿王審知卒子延翰自稱威武留後汀州民陳本聚衆三萬圍汀州延翰遣右軍都監柳邕等將兵二萬討之癸酉王承休王宗汭至成都魏王繼岌詰之曰居大鎮擁彊兵何以不拒戰對曰畏大王神武曰然則何不降對曰王師不入境曰所俱入羌者幾人對曰萬二千人曰今歸者幾人對曰二千人曰可以償萬人之死矣皆斬之并其子丙子以知北都留守事孟知祥為西川節度使同平章事促召赴洛陽帝議選北都留守樞密承㫖段徊等惡鄴都留守張憲不欲其在朝廷皆曰北都非張憲不可憲雖有宰相器今國家新得中原宰相在天子目前事有得失可以改更比之北都獨繫一方安危不為重也乃徙憲為太原尹知北都留守事以戸部尚書王正言為興唐尹知鄴都留守事正言昬耄帝以武德使史彦瓊為鄴都監軍彦瓊本伶人也有寵於帝魏博等六州軍旅金榖之政皆决於彦瓊威福自恣陵忽將佐自正言以下皆諂事之初帝得魏州銀槍効節都近八千人以為親軍皆勇悍無敵夾河之戰實賴其用屢立殊功常許以滅梁之日大加賞賚既而河南平雖賞賚非一而士卒恃功驕恣無厭更成怨望是嵗大饑民多流亡租賦不充道路塗潦漕輦艱澀東都倉廩空竭無以給軍士租庸使孔謙日於上東門外望諸州漕運至者隨以給之軍士乏食有雇妻鬻子者老弱采蔬於野百十為羣往往餒死流言怨嗟而帝遊畋不息己卯獵於白沙皇后皇子後宫畢從庚辰宿伊闗辛巳宿潭泊壬午宿龕澗癸未還宫時大雪吏卒有僵仆於道路者伊汝間飢尤甚衞兵所過責其供餉不得則壊其什器撤其室廬以為薪甚於寇盜縣吏皆竄匿山谷有白龍見於漢宫漢主改元白龍更名曰龔長和驃信鄭旻遣其布燮鄭昭淳求昬于漢漢主以女増城公主妻之長和即唐之南詔也成德節度使李嗣源入朝閏月己丑朔孟知祥至洛陽帝寵待甚厚帝以軍儲不足謀於羣臣豆盧革以下皆莫知為計吏部尚書李琪上疏以為古者量入以為出計農而發兵故雖有水旱之災而無匱乏之憂近代税農以養兵未有農富給而兵不足農捐瘠而兵豐飽者也今縱未能蠲省租税茍除折納紐配之法農亦可以小休矣帝即敕有司如琪所言然竟不能行丁酉詔蜀朝所署官四品以上降授有差五品以下才地無取者悉縱歸田里其先降及有功者委崇韜隨事奬任又賜王􅄛詔畧曰固當裂土而封必不薄人於險三辰在上一言不欺庚子彰武保大節度使兼中書令髙萬興卒以其子保大留後允韜為彰武留後帝以軍儲不充欲如汴州諫官上言不如節險以足用自古無就食天子今楊氏未滅不宜示以虛實乃止辛亥立皇弟存美為邕王存霸為永王存禮為薛王存渥為申王存乂為睦王存確為通王存紀為雅王郭崇韜素疾宦官嘗密謂魏王繼岌曰大王它日得天下騬馬亦不可乗况任宦官宜盡去之專用士人吕知柔竊聽聞之由是宦官皆切齒時成都雖下而蜀中盜賊羣起布滿山林崇韜恐大軍既去更為後患命任圜張筠分道招討以是淹留未還帝遣宦者向延嗣促之崇韜不出郊迎及見禮節又倨延嗣怒李從襲謂延嗣曰魏王太子也主上萬福而郭公專權如是郭廷誨擁徒出入日與軍中驍將蜀土豪傑狎飲指天畫地近聞白其父請表已為蜀帥又言蜀地富饒大人宜善自為謀今諸軍將校皆郭氏之黨王寄身於虎狼之口一朝有變吾屬不知委骨何地矣因相向垂涕延嗣歸具以語劉后后泣訴於帝請早救繼岌之死前此帝聞蜀人請崇韜為帥已不平至是聞延嗣之言不能無疑帝閲蜀府庫之籍曰人言蜀中珍貨無筭何如是之微也延嗣曰臣聞蜀破其珍貨皆入於崇韜父子崇韜有金萬兩銀四十萬兩錢百萬緡名馬千匹它物稱是廷誨所取復在其外故縣官所得不多耳帝遂怒形於色及孟知祥將行帝語之曰聞郭崇韜有異志卿到為朕誅之知祥曰崇韜國之勲舊不宜有此俟臣至蜀察之茍無佗志則遣還帝許之壬子知祥發洛陽帝尋復遣衣甲庫使馬彦珪馳詣成都觀崇韜去就如奉詔班師則已若有遷延跋扈之狀則與繼岌圖之彦珪見皇后説之曰臣見向延嗣言蜀中事勢憂在朝夕今主上當斷不斷夫成敗之機間不容髪安能緩急稟命於三千里外乎皇后復言於帝帝曰傳聞之言未知虛實豈可遽爾果決皇后不得請退自爲教與繼岌令殺崇韜知祥行至石壕彦珪夜叩門宣詔促知祥赴鎮知祥竊歎曰亂將作矣乃晝夜兼行初楚王殷既得湖南不征商旅由是四方商旅輻湊湖南地多鈆鐵殷用軍都判官髙郁策鑄鉛鐵爲錢商旅出境無所用之皆易它貨而去故能以境内所餘之物易天下百貨國以富饒湖南民不事桑蠶郁命民輸税者皆以帛代錢未幾民間機杼大盛吳越王鏐遣使者沈瑫致書以受玉冊封吳越國王告於吳吳人以其國名與已同不受書遣瑫還仍戒境上無得通吳越使者及商旅明宗聖德和武欽孝皇帝上之上天成元年春正月庚申魏王繼岌遣李繼曮李嚴部送王􅄛及其宗族百官數千人詣洛陽河中節度使尚書令李繼麟自恃與帝故舊且有功帝待之厚苦諸伶官求匄無厭遂拒不與大軍之征蜀也繼麟閲兵遣其子令德將之以從景進與宦官譛之曰繼麟聞大軍起以為討已故驚懼閲兵自衞又曰崇韜所以敢倔強於蜀者與河中隂謀内外相應故也繼麟聞之懼欲身入朝以自明其所親止之繼麟曰郭侍中功髙於我今事勢將危吾得見主上面陳至誠則讒人獲罪矣癸亥繼麟入朝魏王繼岌將發成都令任圜權知留事以俟孟知祥諸軍部署已定是日馬彦珪至以皇后教示繼岌繼岌曰大軍垂發彼無舋端安可為此負心事公輩勿復言且主上無敕獨以皇后教殺招討使可乎李從襲等泣曰既有此迹萬一崇韜聞之中塗為變益不可救矣相與巧陳利害繼岌不得已從之甲子旦從襲以繼岌之命召崇韜計事繼岌登樓避之崇韜方升階繼岌從者李環撾碎其首并殺其子廷誨廷信外人猶未之知都綂推官饒陽李崧謂繼岌曰今行軍三千里外初無敕㫖擅殺大將大王奈何行此危事獨不能忍之至洛陽邪繼岌曰公言是也悔之無及崧乃召書吏數人登樓去梯矯為勑書用蠟印宣之軍中粗定崇韜左右皆竄匿獨掌書記滏陽張礪詣魏王府慟哭久之繼岌命任圜代崇韜揔軍政魏王通謁李廷安獻蜀樂工二百餘人有嚴旭者王􅄛用為蓬州刺史帝問曰汝何以得刺史對曰以歌帝使歌而善之許復故任戊辰孟知祥至成都時新殺郭崇韜人情未安知祥慰撫吏民犒賜將卒去留帖然閩人破陳本斬之契丹主擊女真及勃海恐唐乗虛襲之戊寅遣梅老鞋里來修好馬彦珪還洛陽乃下詔暴郭崇韜之罪并殺其子廷説廷讓廷議於是朝野駭惋羣議紛然帝使宦官潛察之保大節度使睦王存乂崇韜之壻也宦官欲盡去崇韜之黨言存乂對諸將攘臂垂泣爲崇韜稱寃言辭怨望庚辰幽存乂於第尋殺之景進言河中人有告變言李繼麟與郭崇韜謀反崇韜死又與存乂連謀宦官因共勸帝速除之帝乃徙繼麟爲義成節度使是夜遣蕃漢馬步使朱守殷以兵圍其第驅繼麟出徽安門外殺之復其姓名曰朱友謙友謙二子令德爲武信節度使令錫爲忠武節度使詔魏王繼岌誅令德於遂州鄭州刺史王思同誅令錫於許州河陽節度使李紹竒誅其家人於河中紹竒至其家友謙妻張氏帥家人二百餘口見紹竒曰朱氏宗族當死願無濫及平人乃别其婢僕百人以其族百口就刑張氏又取鐵劵以示紹竒曰此皇帝去年所賜也我婦人不識書不知其何等語也紹竒亦為之慙友謙舊將史武等七人時為刺史皆坐族誅時洛中諸軍飢窘妄為謡言伶官采之以聞於帝故郭崇韜朱友謙皆及於禍成德節度使兼中書令李嗣源亦為謡言所屬帝遣朱守殷察之守殷私謂嗣源曰令公勲業振主宜自圖歸藩以逺禍嗣源曰吾心不負天地禍福之來無所可避皆委之於命耳時伶宦用事勲舊人不自保嗣源危殆者數四頼宣徽使李紹宏左右營䕶以是得全魏王繼岌留馬步都指揮使陳留李仁罕馬軍都指揮使東光潘仁嗣左廂都指揮使趙廷隠右廂都指揮使浚儀張業牙内指揮使文水武漳驍鋭指揮使平恩李延厚戍成都甲申繼岌發成都命李紹琛帥萬二千人為後軍行止常差中軍一舍二月己丑朔以宣徽南院使李紹宏為樞密使魏博指揮使楊仁晸將所部兵戍瓦橋踰年代歸至貝州以鄴都空虛恐兵至為變敕留屯貝州時天下莫知郭崇韜之罪民間訛言云崇韜殺繼岌自王於蜀故族其家朱友謙子建徽為澶州刺史帝密敕鄴都監軍史彦瓊殺之門者白留守王正言曰史武德夜半馳馬出城不言何往又訛言云皇后以繼岌之死歸咎於帝已弑帝矣故急召彦瓊計事人情愈駭楊仁晸部兵皇甫暉與其徒夜博不勝因人情不安遂作亂刼仁晸曰主上所以有天下者吾魏軍力也魏軍甲不去體馬不解鞍者十餘年今天下已定天子不念舊勞更加猜忌逺戍踰年方喜代歸去家咫尺不使相見今聞皇后弑逆京師已亂將士願與公俱歸仍表聞朝廷若天子萬福興兵致討以吾魏博兵力足以拒之安知不更為富貴之資乎仁晸不從暉殺之又劫小校不從又殺之效節指揮使趙在禮聞亂衣不及帶踰垣而走暉追及曳其足而下之示以二首在禮懼而從之亂兵遂奉以為帥焚掠貝州暉魏州人在禮涿州人也詰旦暉等擁在禮南趣臨清永濟館陶所過剽掠壬辰晩有自貝州來告軍亂將犯鄴都者都巡檢使孫鐸等亟詣史彦瓊請授甲乗城為備彦瓊疑鐸等有異志曰告者云今日賊至臨清計程須六日晩方至為備未晩孫鐸曰賊既作亂必乗吾未備晝夜倍道安肯計程而行請僕射帥衆乗城鐸募勁兵千人伏於王莽河逆擊之賊既勢挫必當離散然後可撲討也必俟其至城下萬一有姦人為内應則事危矣彦瓊曰但嚴兵守城何必逆戰是夜賊前鋒攻北門弓弩亂發時彦瓊將部兵宿北門樓聞賊呼聲即時驚潰彦瓊單騎奔洛陽癸巳賊入鄴都孫鐸等拒戰不勝亡去趙在禮據宫城署皇甫暉及軍校趙進為馬步都指揮使縱兵大掠進定州人也王正言方據按召吏草奏無至者正言怒其家人曰賊已入城殺掠於市吏皆逃散公尚誰呼正言驚曰吾初不知也又索馬不能得乃帥僚佐步出府門謁在禮再拜請罪在禮亦拜曰士卒思歸耳尚書重德勿自卑屈慰諭遣之衆推在禮為魏愽留後具奏其狀北京留守張憲家在鄴都在禮厚撫之遣使以書誘憲憲不發封斬其使以聞甲午以景進為銀青光禄大夫檢校右散騎常侍兼御史大夫上柱國丙申史彦瓊至洛陽帝問可為大將者於樞密使李紹宏紹宏復請用李紹欽帝許之令條上方畧紹欽所請偏禆皆梁舊將已所善者帝疑之而止皇后曰此小事不足煩大將紹榮可辦也帝乃命歸德節度使李紹榮將騎三千詣鄴都招撫亦徴諸道兵備其不服郭崇韜之死也李紹琛謂董璋曰公復欲呫囁誰門乎璋懼謝罪魏王繼岌軍還至武連遇敕使諭以朱友謙已伏誅令董璋將兵之遂州誅朱令德時紹琛將後軍在魏城聞之以帝不委已殺令德而委璋大驚俄而璋過紹琛軍不謁紹琛怒乗酒謂諸將曰國家南取大梁西定巴蜀皆郭公之謀而吾之戰功也至於去逆效順與國家犄角以破梁則朱公也今朱郭皆無罪族滅歸朝之後行及我矣寃哉天乎奈何紹琛所將多河中兵河中將焦武等號哭於軍門曰西平王何罪闔門屠膾我若歸則與史武等同誅决不復東矣是日魏王繼岌至泥溪紹琛至劒州遣人白繼岌云河中將士號哭不止欲為亂丁酉紹琛自劒州擁兵西還自稱西川節度三川制置等使移檄成都稱奉詔代孟知祥招諭蜀人三日間衆至五萬戊戌李繼曮至鳳翔監軍使柴重厚不以符印與之促令詣闕己亥魏王繼岌至利州李紹琛遣人斷桔柏津繼岌聞之以任圜為副招討使將步騎七千與都指揮使梁漢顒監軍李延安追討之庚子邢州左右步直兵趙太等四百人據城自稱安國留後詔東北面招討副使李紹真討之辛丑任圜先令别將何建崇擊劒門闗下之李紹榮至鄴都攻其南門遣人以敕招諭之趙在禮以羊酒犒師拜於城上曰將士思家擅歸相公誠善為敷奏得免於死敢不自新遂以敕徧諭軍士史彦瓊㦸手大罵曰羣死賊城破萬段皇甫暉謂衆曰觀史武德之言上不赦我矣因聚譟掠敕書手壊之守陴拒戰紹榮攻之不利以狀聞帝怒曰克城之日勿遺噍類大發諸軍討之壬寅紹榮退屯澶州甲辰夜從馬直軍士王温等五人殺軍使謀作亂擒斬之從馬直指揮使郭從謙本優人也優名郭門髙帝與梁相拒於得勝募勇士挑戰從謙應募俘斬而還由是益有寵帝選諸軍驍勇者爲親軍分置四指揮號從馬直從謙自軍使積功至指揮使郭崇韜方用事從謙以叔父事之睦王存乂以從謙爲假子及崇韜存乂得罪從謙數以私財饗從馬直諸校對之流涕言崇韜之寃及王温作亂帝戲之曰汝既負我附崇韜存乂又教王温反欲何為也從謙益懼既退隂謂諸校曰主上以王温之故俟鄴都平定盡阬若曹家之所有宜盡市酒肉勿為久計也由是親軍皆不自安乙巳王衍至長安有詔止之先是帝諸弟雖領節度使皆留京師但食其俸戊申始命䕶國節度使永王存霸赴河中丁未李紹榮以諸道兵再攻鄴都庚戌禆將楊重霸帥衆數百登城後無繼者重霸等皆死賊知不赦堅守無降意朝廷患之日發中使促魏王繼岌東還繼岌以中軍精兵皆從任圜討李紹琛留利州待之未得還李紹榮討趙在禮久無功趙太據邢州未下滄州軍亂小校王景戡討定之因自為留後河朔州縣告亂者相繼帝欲自征鄴都宰相樞密使皆言京師根本車駕不可輕動帝曰諸將無可使者皆曰李嗣源最為勲舊帝心忌嗣源曰吾惜嗣源欲留宿衞皆曰它人無可者忠武節度使張全義亦言河朔多事久則患深宜令揔管進討若倚紹榮軰未見成功之期李紹宏亦屢言之帝以内外所薦乆乃許之甲寅命嗣源將親軍討鄴都延州言綏銀軍亂剽州城董璋將兵二萬屯綿州㑹任圜討李紹琛帝遣中使崔延琛至成都遇紹琛軍紿之曰吾奉詔召孟郎公若緩兵自當得蜀既至成都勸孟知祥為戰守備知祥浚壕樹柵遣馬步都指揮使李仁罕將四萬人驍鋭指揮使李延厚將二千人討紹琛延厚集其衆詢之曰有少壯勇鋭欲立功求富貴者東衰疾畏懦厭行陳者西得選兵七百人以行是日任圜軍追及紹琛於漢州紹琛出兵逆戰招討掌書記張礪請伏精兵於後以羸兵誘之圜從之使董璋以東川羸兵先戰而却紹琛輕圜書生又見其兵羸極力追之伏兵發大破之斬首數千級自是紹琛入漢州閉城不出三月丁巳朔李紹真奏克邢州擒趙太等庚申紹真引兵至鄴都營於城西北以太等徇於鄴都城下而殺之辛酉以威武節度副使王廷翰為威武節度使壬戌李嗣源至鄴都營於城西南甲子嗣源下令軍中詰旦攻城是夜從馬直軍士張破敗作亂帥衆大譟殺都將焚營舍詰旦亂兵逼中軍嗣源帥親軍拒戰不能敵亂兵益熾嗣源叱而問之曰爾曹欲何為對曰將士從主上十年百戰以得天下今主上弃恩任威貝州戌卒思歸主上不赦云克城之後當盡阬魏􅀶之軍近從馬直數卒諠競遽欲盡誅其衆我輩初無叛心但畏死耳今衆議欲與城中合勢撃退諸道之軍請主上帝河南令公帝河北為軍民之主嗣源泣諭之不從嗣源曰爾不用吾言任爾所為我自歸京師亂兵拔白刃環之曰此輩虎狼也不識尊卑令公去欲何之因擁嗣源及李紹真等入城城中不受外兵皇甫暉逆撃張破敗斬之外兵皆潰趙在禮帥諸校迎拜嗣源泣謝曰將士輩負令公敢不惟命是聽嗣源詭説在禮曰凡舉大事須藉兵力今外兵流散無所歸我為公出收之在禮乃聽嗣源紹真俱出城宿魏縣散兵稍有至者漢州無城塹樹木為柵乙丑任圜進攻其柵縱火焚之李紹琛引兵出戰於金鴈橋兵敗與十餘騎奔綿竹追擒之孟知祥自至漢州犒軍與任圜董璋置酒髙㑹引李紹琛檻車至座中知祥自酌大巵飲之謂曰公已擁節旄又有平蜀之功何患不富貴而求入此檻車邪紹琛曰郭侍中佐命功第一兵不血刃取兩川一旦無罪族誅如紹琛輩安保首領以此不敢歸朝耳魏王繼岌既獲紹琛乃引兵倍道而東孟知祥獲陜虢都指揮使汝隂李肇河中都指揮使千乗侯􅀪實以肇為牙内馬步都指揮使􅀪實副之蜀中羣盜猶未息知祥擇亷吏使治州縣蠲除横賦安集流散下寛大之令與民更始遣左廂都指揮使趙廷隠右廂都指揮使張業將兵分討羣盜悉誅之李嗣源之為亂兵所逼也李紹榮有衆萬人營於城南嗣源遣牙將張䖍釗髙行周等七人相繼召之欲與共誅亂者紹榮疑嗣源之詐留使者閉壁不應及嗣源入鄴都遂引兵去嗣源在魏縣衆不滿百又無兵仗李紹真所將鎮兵五千聞嗣源得出相帥歸之由是嗣源兵稍振嗣源泣謂諸將曰吾明日當歸藩上章待罪聽主上所裁李紹真及中門使安重誨曰此策非宜公為元帥不幸為凶人所劫李紹榮不戰而退歸朝必以公藉口公若歸藩則為據地邀君適足以實讒慝之言耳不若星行詣闕面見天子庶可自明嗣源曰善丁卯自魏縣南趣相州遇馬坊使康福得馬數千匹始能成軍福蔚州人也平盧節度使符習將本軍攻鄴都聞李嗣源軍潰引兵歸至淄州監軍使楊希望遣兵逆擊之習懼復引兵而西青州指揮使王公儼攻希望殺之因據其城時近侍為諸道監軍者皆恃恩與節度使爭權及鄴都軍變所在多殺之安義監軍楊繼源謀殺節度使孔勍勍先誘而殺之武寧監軍以李紹真從李嗣源謀殺其元從據城拒之權知留後淳于晏帥諸將先殺之晏登州人也戊辰以軍食不足敕河南尹豫借夏秋税民不聊生忠武節度使尚書令齊王張全義聞李嗣源入鄴都憂懼不食辛未卒於洛陽租庸使以倉儲不足頗朘刻軍糧軍士流言益甚宰相懼帥百官上表言今租庸已竭内庫有餘諸軍室家不能相保儻不賑救懼有離心俟過凶年其財復集上即欲從之劉后曰吾夫婦君臨萬國雖藉武功亦由天命命既在天人如我何宰相又於便殿論之后屬耳於屏風後湏臾出䊋具及三銀盆皇幼子三人於外曰人言宫中蓄積多四方貢獻隨以給賜所餘止此耳請鬻以贍軍宰相惶懼而退李紹榮自鄴都退保衞州奏李嗣源已叛與賊合嗣源遣使上章自理一日數輩嗣源長子從審為金槍指揮使帝謂從審曰吾深知爾父忠厚爾往諭朕意勿使自疑從審至衞州紹榮囚欲殺之從審曰公等既不亮吾父吾亦不能至父所請復還宿衞乃釋之帝憐從審賜名繼璟待之如子是後嗣源所奏皆為紹榮所遏不得通嗣源由是疑懼石敬瑭曰夫事成於果决而敗於猶豫安有上將與叛卒入賊城而它日得保無恙乎大梁天下之要㑹也願假三百騎先往取之若幸而得之公宜引大軍亟進如此始可自全突騎都指揮使康義誠曰主上無道軍民怨怒公從衆則生守節必死嗣源乃令安重誨移檄㑹兵義誠代北胡人也時齊州防禦使李紹䖍泰寧節度使李紹欽貝州刺史李紹英屯瓦橋北京右廂馬軍都指揮使安審通屯奉化軍嗣源皆遣使召之紹英瑕丘人本姓房名知温審通金全之姪也嗣源家在真定虞􅀱將王建立先殺其監軍由是獲全建立遼州人也李從珂自横水將所部兵由盂縣趣鎮州與王建立軍合倍道從嗣源嗣源以李紹榮在衞州謀自白臯濟河分三百騎使石敬瑭將之前驅李從珂為殿於是軍勢大盛嗣源從子從璋自鎮州引軍而南過邢州邢人奉為留後癸酉詔懐逺指揮使白從暉將騎兵扼河陽橋帝乃出金帛給賜諸軍樞密宣徽使及供奉内使景進等皆獻金帛以助給賜軍士負物而詬曰吾妻子已殍死得此何為甲戌李紹榮自衞州至洛陽帝如鷂店勞之紹榮曰鄴都亂兵已遣其黨翟建白據博州欲濟河襲鄆汴願陛下幸闗東招撫之帝從之景進等言於帝曰魏王未至康延孝初平西南猶未安王􅄛族黨不少聞車駕東征恐其為變不若除之帝乃遣中使向延嗣齎敕往誅之敕曰王􅄛一行並從殺戮已印畫樞密使張居翰覆視就殿柱揩去行字改為家字由是蜀百官及􅄛僕役獲免者千餘人延嗣至長安盡殺􅄛宗族於秦川驛􅄛母徐氏且死呼曰吾兒以一國迎降不免族誅信義俱弃吾知汝行亦受禍矣乙亥帝發洛陽丁丑次汜水戊寅遣李紹榮將騎兵循河而東李嗣源親黨從帝者多亡去或勸李繼璟宜早自脱繼璟終無行意帝屢遣繼璟詣嗣源繼璟固辭願死於帝前以明赤誠帝聞嗣源在黎陽强遣繼璟渡河召之道遇李紹榮紹榮殺之吳越王鏐有疾如衣錦軍命鎮海鎮東節度使留後傳瓘監國吳徐温遣使來問疾左右勸鏐勿見鏐曰温隂狡此名問疾實使之覘我也强出見之温果聚兵欲襲吳越聞鏐疾瘳而止鏐尋還錢塘吳以左僕射同平章事徐知誥為侍中右僕射嚴可求兼門下侍郎同平章事庚辰帝發汜水辛巳李嗣源至白臯遇山東上供絹數船取以賞軍安重誨從者爭舟行營馬步使陶玘斬以徇由是軍中肅然玘許州人也嗣源濟河至滑州遣人招符習習與嗣源㑹於胙城安審通亦引兵來㑹知汴州孔循遣使奉表西迎帝亦遣使北輸密􅅃於嗣源曰先至者得之先是帝遣騎將滿城西方鄴守汴州石敬瑭使禆將李瓊以勁兵突入封丘門敬瑭踵其後自西門入遂據其城西方鄴請降敬瑭使人趣嗣源壬午嗣源入大梁是日帝至滎澤東命龍驤指揮使姚彦温將三千騎為前軍曰汝曹汴人也吾入汝境不欲使它軍前驅恐擾汝室家厚賜而遣之彦温即以其衆叛歸嗣源謂嗣源曰京師危迫主上為元行欽所惑事勢已離不可復事矣嗣源曰汝自不忠何言之悖也即奪其兵指揮使潘環守王村寨有芻粟數萬帝遣騎視之環亦奔大梁帝至萬勝鎮聞嗣源已據大梁諸軍離叛神色沮喪登髙歎曰吾不濟矣即命旋師是夜復至汜水帝之出闗也扈從兵二萬五千及還已失萬餘人乃留秦州都指揮使張唐以步騎三千守闗癸未帝還過罌子谷道狹每遇衞士執兵仗者輒以善言撫之曰適報魏王又進西川金銀五十萬到京當盡給爾曹對曰陛下賜已晩矣人亦不感聖恩帝流涕而已又索袍帶賜從官内庫使張容哥稱頒給已盡衞士叱容哥曰致吾君失社稷皆此閹豎輩也抽刀逐之或救之獲免容哥謂同類曰皇后吝財致此今乃歸咎於吾輩事若不測吾輩萬段吾不忍待也因赴河死甲申帝至石橋西置酒悲涕謂李紹榮等諸將曰卿輩事吾以來急難富貴靡不同之今致吾至此皆無一策以相救乎諸將百餘人皆截髪置地誓以死報因相與號泣是日晩入洛城李嗣源命石敬瑭將前軍趣汜水收撫散兵嗣源繼之李紹䖍李紹英引兵來㑹丙戌宰相樞密使共奏魏王西軍將至車駕宜且控汜水收撫散兵以俟之帝從之自出上東門閲騎兵戒以詰旦東行資治通鑑卷第二百七十四
