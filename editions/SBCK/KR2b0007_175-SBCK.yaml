body:
  text: 丁丑隋以晉王廣為并州摠管三月戊子以上開府儀同三司賀若弼為呉州摠管鎭廣陵和州刺史河南韓擒虎為廬州摠管鎭廬江隋主有并吞江南之志問將帥於高熲熲薦弼與擒虎故置於南邊使潜為經略戊戌以太子少保蘇威兼納言度支尚書初蘇綽在西魏以國用不足爲征税法頗重既而歎曰今所為者正如張弓非平世法也後之君子誰能弛之威聞其言每以為己任至是奏減賦役務從輕簡隋主悉從之漸見親重與高熲參掌朝政帝嘗怒一人將殺之威入閤進諫帝不納將自出斬之威當帝前不去帝避之而出威又遮止帝拂衣而入良乆乃召威謝曰公能若是吾無憂矣賜馬二匹錢十餘萬尋復兼大理卿京兆尹御史大夫本官悉如故治書侍御史安定梁毗以威兼領五職安繁戀劇無舉賢自代之心抗表劾威帝曰蘇威朝夕孜孜志存逺大何遽迫之因謂朝臣曰蘇威不値我無以措其言我不得蘇威何以行其道楊素才辯無雙至於斟酌古今助我宣化非威之匹也威若逢亂世南山四皓豈易屈哉威嘗言於帝曰臣先人每戒臣云唯讀孝經一卷足以立身治國何用多為帝深然之高熲深避權勢上表遜位讓於蘇威帝欲成其美聽解僕射數日帝曰蘇威高蹈前朝熲能推舉吾聞進賢受上賞寧可使之去官命熲復位熲威同心協賛政刑大小帝無不與之謀議然後行之故革命數年天下稱平太子左庶子盧賁以熲威執政心甚不平時柱國劉昉亦被踈忌賁因諷昉及上柱國元諧李詢華州刺史張賓等謀黜熲威五人相與輔政又以􅀳王廣有寵於帝私謂太子曰賁欲數謁殿下恐為上所譴願察區區之心謀泄帝窮治其事昉等委罪於賓賁公卿奏三人當死帝以故舊不忍誅並除名為民庚子隋詔前代品爵悉依舊不降丁未梁主遣其弟太宰巖入賀于隋夏四月辛巳隋大赦戊戌悉放太常散樂為民仍禁雜戲散騎常侍韋鼎兼通直散騎常侍王瑳聘于周辛丑至長安隋已受禪隋主致之介國隋主召汾州刺史韋冲為兼散騎常侍時發稽胡築長城汾州胡千餘人在塗亡叛帝召冲問計對曰夷狄之性易為反覆皆由牧宰不稱之所致臣請以理綏靜可不勞兵而定帝然之命冲綏懐叛者月餘皆至並起長城之役冲夐之子也五月戊午隋封邘公雄為廣平王永康公􅀪為河間王雄高祖之族子也隋主潜害周靜帝而為之舉哀葬于恭陵以其族人洛為嗣六月癸未隋詔郊廟冕服必依禮經其朝㑹之服旗幟犧牲皆尚赤戎服以黄在外常服通用雜色秋七月乙卯隋主始服黄百僚畢賀於是百官常服同於庶人皆着黄袍隋主朝服亦如之唯以十三環帶為異八月壬午隋廢東京官吐谷渾寇凉州隋主遣行軍元帥樂安公元諧等步騎數萬擊之諧擊破吐谷渾於豐利山又敗其太子可博汗於青海俘斬萬計吐谷渾震駭其王矦三十人各帥所部來降吐谷渾可汗夸呂帥親兵逺遁隋主以其高寧王移兹裒為河南王使統降衆以元諧為寧州刺史留行軍摠管賀婁子幹鎭凉州九月庚午將軍周羅睺攻隋故墅拔之蕭摩訶攻江北隋奉車都尉于宣敏奉使巴蜀還奏稱蜀土沃饒人物殷阜周徳之衰遂成戎首宜樹建藩屏封殖子孫隋主善之辛未以越王秀為益州揔管改封蜀王宣敏謹之孫也壬申隋以上柱國長孫覽元景山並為行軍元帥發兵入寇命尚書左僕射高熲節度諸軍初周齊所鑄錢凡四等及民間私錢名品甚衆輕重不等隋主患之更鑄五銖錢背面好肉皆有周郭每一千重四斤二兩悉禁古錢及私錢置樣於闗不如樣者没官銷毁之自是錢幣始壹民間便之隋鄭譯以上柱國歸第賞賜豐厚譯自以被疎隂呼道士醮章祈福為婢所告以為巫蠱譯又與母别居為憲司所劾由是除名隋主下詔曰譯若留之於世在人為不道之臣戮之於朝入地為不孝之鬼有累幽顯無所置之宜賜以孝經令其熟讀仍遣與母共居初周法比於齊律煩而不要隋主命高熲鄭譯及上柱國楊素率更令裴政等更加修定政練習典故達於從政乃采魏晉舊律下至齊梁㳂革重輕取其折衷時同修者十餘人凡有疑滯皆取決於政於是去前世梟轘及鞭法自非謀叛以上無收族之罪始制死刑二絞斬流刑三自二千里至三千里徒刑五自一年至三年杖刑五自六十至百笞刑五自十至五十又制議請減贖官當之科以優士大夫除前世訊囚酷法考掠不得過二百枷杖大小咸有程式民有枉屈縣不為理者聽以次經郡及州省若仍不為理聽詣闕伸訴冬十月戊子始行新律詔曰夫絞以致斃斬則殊形除惡之體於斯已極梟首轘身義無所取不益懲肅之理徒表安忍之懐鞭之為用殘剥膚體徹骨侵肌酷均臠切雖云遠古之式事乖仁者之刑梟轘及鞭並令去之貴礪帶之書不當徒罸廣軒冕之䕃旁及諸親流役六年改為五載刑徒三歲變從三祀其餘以輕代重化死為生條目甚多備於簡策雜格嚴科並宜除削自是法制遂定後世多遵用之隋主嘗怒一郎於殿前笞之諫議大夫劉行本進曰此人素清其過又小願少寛之帝不顧行本於是正當帝前曰陛下不以臣不肖置臣左右臣言若是陛下安得不聽若非當致之於理豈得輕臣而不顧也因置笏於地而退帝斂容謝之遂原所笞者行本璠之兄子也獨孤皇后家世貴盛而能謙恭雅好讀書言事多與隋主意合帝甚寵憚之宮中稱為二聖帝每臨朝后輒與帝方輦而進至閤乃止使宦官伺帝政有所失隨則匡諫􅀱帝退朝同反燕寢有司奏稱周禮百官之妻命於王后請依古制后曰婦人預政或從此為漸不可開其源也大都督崔長仁后之中外兄弟也犯法當斬帝以后故欲免其罪后曰國家之事焉可顧私長仁竟坐死后性儉約帝嘗合止利藥須胡粉一兩宮内不用求之竟不得又欲賜柱國劉嵩妻織成衣領宮内亦無之然帝懲周氏之失不以權任假借外戚后兄弟不過將軍刺史帝外家呂氏濟南人素微賤齊亡以來帝求訪不知所在及即位始求得舅子呂永吉追贈外祖雙周為太尉封齊郡公以永吉襲爵永吉從父道貴性尤頑騃言詞鄙陋帝厚加供給而不許接對朝士拜上儀同三司出為濟南太守後郡廢終於家壬辰隋主如岐州岐州刺史安定梁彦光有惠政隋主下詔褒美賜粟帛及御傘以厲天下之吏乆之徙相州刺史岐俗質厚彦光以靜鎭之奏課連為天下最及居相部如岐州法鄴自齊亡衣冠士人多遷入闗唯工商樂户移實州郭風俗險詖好興謡訟目彦光為著帽􅄳帝聞之免彦光官歲餘拜趙州刺史彦光自請復為相州帝許之豪猾聞彦光再來皆嗤之彦光至發擿姦伏有若神明豪猾潛竄闔境大治於是招致名儒每鄉立學親臨策試褒勤黜怠及舉秀才祖道於郊以財物資之於是風化大變吏民感悦無復訟者時又有相州刺史陳留樊叔略有異政帝以璽書褒美班示天下徵拜司農新豐令房恭懿政為三輔之最帝賜以粟帛雍州諸縣令朝謁帝見恭懿必呼至榻前訪以治民之術累遷徳州司馬帝謂諸州朝集使曰房恭懿志存體國愛養我民此乃上天宗廟之所祐朕若置而不賞上天宗廟必當責我卿等宜師範之因擢為海州刺史由是州縣吏多稱職百姓富庶十一月丁卯隋遣兼散騎侍郎鄭撝來聘十二月庚子隋主還長安復鄭譯官爵廣州刺史馬靖得嶺表人心兵甲精練數有戰功朝廷疑之遣吏部侍郎蕭引觀靖舉措諷令送質外託收督賧物引至畨禺靖即遣子弟入質是歲隋主詔境内之民任聽出家仍令計口出錢營造經像於是時俗從風而靡民間佛書多於六經數十百倍突厥佗鉢可汗病且卒謂其子菴邏曰吾兄不立其子委位於我我死汝當避大邏便及卒國人將立大邏便以其母賤衆不服菴邏實貴突厥素重之攝圖最後至謂國人曰若立菴邏者我當帥兄弟事之若立大邏便我必守境利刃長矛以相待攝圖長且雄勇國人莫敢拒竟立菴邏為嗣大邏便不得立心不服菴邏每遣人詈辱之菴邏不能制因以國讓攝圖國中相與議曰四可汗子攝圖最賢共迎立之號沙鉢略可汗居都斤山菴邏降居獨洛水稱第二可汗大邏便乃謂沙鉢略曰我與爾俱可汗子各承父後爾今極尊我獨無位何也沙鉢略患之以為阿波可汗還領所部又沙鉢略從父玷厥居西面號達頭可汗諸可汗各統部衆分居四面沙鉢略勇而得衆北方皆畏附之隋主既立待突厥禮薄突厥大怨千金公主傷其宗祀覆没日夜言於沙鉢略請為周室復讎沙鉢略謂其臣曰我周之親也今隋公自立而不能制復何面目見可賀敦乎乃與故齊營州刺史高寶寧合兵為寇隋主患之敕縁邊修保障峻長城命上柱國武威隂夀鎭幽州京兆尹虞慶則鎭并州屯兵數萬以備之初奉車都尉長孫晟送千金公主入突厥突厥可汗愛其善射留之竟歲命諸子弟貴人與之親友冀得其射法沙鉢略弟處羅矦號突利設尢得衆心為沙鉢略所忌密託心腹隂與晟盟晟與之遊獵因察山川形勢部衆彊弱靡不知之及突厥入寇晟上書曰今諸夏雖安戎虜尚梗興師致討未是其時弃於度外又相侵擾故宜密運籌策漸以攘之玷厥之於攝圖兵彊而位下外名相屬内隙已彰鼓動其情必將自戰又處羅矦者攝圖之弟姦多勢弱曲取衆心國人愛之因為攝圖所忌其心殊不自安迹示彌縫實懐疑懼又阿波首鼠介在其間頗畏攝圖受其牽率唯彊是與未有定心今宜逺交而近攻離彊而合弱通使玷厥説合阿波則攝圖廻兵自防右地又引處羅遣連奚霫則攝圖分衆還備左方首尾猜嫌腹心離阻十數年後乗舋討之必可一舉而空其國矣帝省表大悦因召與語晟復口陳形勢手畫山川寫其虛實皆如指掌帝深嗟異皆納用之遣太僕元暉出伊吾道詣達頭賜以狼頭纛達頭使來引居沙鉢略使上以晟為車騎將軍出黄龍道齎幣賜奚霫契丹遣為鄉導得至處羅侯所深布心腹誘之内附反間既行果相猜貳始興王叔陵太子之次弟也與太子異母母曰彭貴人叔陵為江州刺史性苛刻狡險新安王伯固以善諧謔有寵於上及太子叔陵疾之隂求其過失欲中之以法叔陵入為揚州刺史事務多闗涉省閤執事承意順㫖即諷上進用之微致違忤必抵以大罪重者至殊死伯固憚之乃謟求其意叔陵好發古冡伯固好射雉常相從郊野大相欵狎因密圖不軌伯固為侍中每得密語必告叔陵十四年春正月己酉上不豫太子與始興王叔陵長沙王叔堅並入侍疾叔陵隂有異志命典藥吏曰切藥刀甚鈍可礪之甲寅上殂蒼猝之際叔陵命左右於外取劒左右弗悟取朝服木劒以進叔陵怒叔堅在側聞之疑有變伺其所為乙卯小歛太子哀哭俯伏叔陵抽剉藥刀斫太子中項太子悶絶于地母柳皇后走來救之又斫后數下乳媪呉氏自後掣其肘太子乃得起叔陵持太子衣太子自奮得免叔堅手搤叔陵奪去其刀仍牽就柱以其褶袖縛之時呉媪已扶太子避賊叔堅求太子所在欲受生殺之命叔陵多力奮袖得脱突走出雲龍門馳車還東府召左右斷青溪道赦東城囚以充戰士散金帛賞賜又遣人往新林追其所部兵仍自被甲著白布㡌登城西門招募百姓又召諸王將帥莫有至者唯新安王伯固單馬赴之助叔陵指揮叔陵兵可千人欲據城自守時衆軍並縁江防守臺内空虛叔堅白柳后使太子舍人河内司馬申以太子命召右衛將軍蕭摩訶入見受敕帥馬步數百趣東府屯城西門叔陵惶恐遣記室韋諒送其鼓吹與摩訶謂之曰事捷必以公為台輔摩訶紿報之曰須王心膂節將自來方敢從命叔陵遣其所親戴温譚騏驎詣摩訶摩訶執以送臺斬其首徇東城叔陵自知不濟入内沈其妃張氏及寵妾七人于井帥步騎數百自小航度欲趣新林乗舟奔隋行至白楊路為臺軍所邀伯固見兵至旋避入巷叔陵馳騎拔刃追之伯固復還叔陵部下多弃甲潰去摩訶馬容陳智深迎刺叔陵僵仆陳仲華就斬其首伯固為亂兵所殺自寅至已乃定叔陵諸子並賜死伯固諸子宥為庶人韋諒及前衡陽内史彭暠諮議參軍兼記室鄭信典籖俞公喜並伏誅暠叔陵舅也信諒有寵於叔陵常參謀議諒粲之子也丁巳太子即皇帝位大赦辛酉隋置河北道行臺於并州以晉王廣為尚書令置西南道行臺於益州以蜀王秀為尚書令隋主懲周氏孤弱而亡故使二子分蒞方面以二王年少盛選貞良有才望者為之僚佐以靈州刺史王韶為并省右僕射鴻臚卿趙郡李雄為兵部尚書左武衛將軍朔方李徹摠晉王府軍事兵部尚書元巖為益州摠管府長史王韶李雄元巖俱有骨鯁名李徹前朝舊將故用之初李雄家世以學業自通雄獨習騎射其兄子旦讓之曰非士大夫之素業也雄曰自古聖賢文武不備而能成其功業者鮮矣雄雖不敏頗觀前志但不守章句耳既文且武兄何病焉及將如并省帝謂雄曰吾兒更事未多以卿兼文武才吾無北顧之憂矣二王欲為奢侈非法韶巖輒不奉教或自鎖或排閤切諫二王甚憚之每事諮而後行不敢違法度帝聞而賞之又以秦王俊爲河南道行臺尚書令洛州刺史領闗東兵癸亥以長沙王叔堅爲驃騎將軍開府儀同三司揚州刺史蕭摩訶爲車騎將軍南徐州刺史封綏逺公始興王叔陵家金帛累巨萬悉以賜之以司馬申爲中書通事舍人乙丑尊皇后為皇太后時帝病創卧承香殿不能聽政太后居栢梁殿百司衆務皆決於太后帝創愈乃歸政焉丁卯封皇弟叔重為始興王奉昭烈王祀隋元景山出漢口遣上開府儀同三司鄧孝儒將卒四千攻甑山鎭將軍陸綸以舟師救之為孝儒所敗溳口甑山沌陽守將皆弃城走戊辰遣使請和於隋歸其胡墅己巳立妃沈氏為皇后辛未立皇弟叔儼為尋陽王叔愼為岳陽王叔達為義陽王叔能為巴山王叔虞為武昌王隋高熲奏禮不伐喪二月己丑隋主詔熲等班師三月己巳以尚書左僕射晉安王伯恭為湘州刺史永陽王伯智為尚書僕射夏四月庚寅隋大將軍韓僧夀破突厥於雞頭山上柱國李充破突厥於河北山丙申立皇子永康公胤為太子胤孫姬之子也沈后養以為子五月己未高寶寧引突厥寇隋平州突厥悉發五可汗控弦之士四十萬入長城壬戌隋任穆公于翼卒甲子隋更命傳國璽曰受命璽六月甲申隋遣使來弔乙酉隋上柱國李光敗突厥於馬邑突厥又寇蘭州凉州摠管賀婁子幹敗之於可洛峐隋主嫌長安城制度狹小又宮内多妖異納言蘇威勸帝遷都帝以初受命難之夜與威及高熲共議明旦通直散騎庾季才奏曰臣仰觀玄象俯察圖記必有遷都之事且漢營此城將八百歲水皆鹹鹵不甚宜人願陛下協天人之心為遷徙之計帝愕然謂熲威曰是何神也太師李穆亦上表請遷都帝省表曰天道聰明已有徵應太師人望復抗此請無不可矣丙申詔高熲等創造新都於龍首山以太子左庶子宇文愷有巧思領營新都副監愷忻之弟也秋七月辛未大赦九月丙午設無㝵大㑹於太極殿捨身及乗輿御服大赦丙午以長沙王叔堅為司空將軍刺史如故冬十月癸酉隋太子勇屯兵咸陽以備突厥十二月丙子隋命新都曰大興城乙酉隋遣沁源公虞慶則屯􅀪化以備突厥行軍摠管達奚長儒將兵二千與突厥沙鉢略可汗遇於周槃沙鉢略有衆十餘萬軍中大懼長儒神色慷慨且戰且行為虜所衝突散而復聚四面抗拒轉鬬三日晝夜凡十四戰五兵咸盡士卒以拳敺之手皆骨見殺傷萬計虜氣稍奪於是解去長儒身被五瘡通中者二其戰士死傷者什八九詔以長儒為上柱國餘勲回授一子時柱國馮昱屯乙弗泊蘭州摠管叱列長义守臨洮上柱國李崇屯幽州皆為突厥所敗於是突厥縱兵自木硤石門兩道入寇武威天水安定金城上郡弘化延安六畜咸盡沙鉢略更欲南入達頭不從引兵而去長孫晟又説沙鉢略之子染干詐告沙鉢略曰鐵勒等反欲襲其牙沙鉢略懼㢠兵出塞隋主旣立待遇􅆝主恩禮彌厚行歳納􅆝主女為晉王妃又欲以其子瑒尚蘭陵公主由是罷江陵摠管梁主始得專制其國長城公上至徳元年春正月庚子隋將入新都大赦壬寅大赦改元初上病創不能視事政無大小皆決於長沙王叔堅權傾朝廷叔堅頗驕縱上由是忌之都官尚書山隂孔範中書舍人施文慶皆惡叔堅而有寵於上日夕求其短構之於上上乃即叔堅驃騎將軍本號用三司之儀出為江州刺史以祠部尚書江揔為吏部尚書癸卯立皇子深為始安王二月己巳朔日有食之癸酉遣兼散騎常侍賀徹等聘于隋突厥寇隋北邊癸巳葬孝宣皇帝于顯寧陵廟號高宗右衛將軍兼中書通事舍人司馬申既掌機密頗作威福多所譛毁能􅀱人主顔色有忤已者必以微言譛之附已者因機進之是以朝廷内外皆從風而靡上欲用侍中吏部尚書毛喜為僕射申惡喜彊直言於上曰喜臣之妻兄高宗時稱陛下有酒徳請逐去宮臣陛下寧忘之邪上乃止上創愈置酒於後殿以自慶引吏部尚書江揔以下展樂賦詩既醉而命毛喜于時山陵初畢喜見之不懌欲諫則上已醉喜升階陽為心疾仆于階下移出省中上醒謂江揔曰我悔召毛喜彼實無疾但欲阻我歡宴非我所為耳乃與司馬申謀曰此人負氣吾欲乞鄱陽兄弟聽其報讎可乎對曰彼終不爲官用願如聖旨中書通事舍人北地傅縡爭之曰不然若許報讎欲置先皇何地上曰當乞一小郡勿令見人事耳乃以喜為永嘉内史三月丙辰隋遷于新都初令民二十一成丁減役者每歲十二畨為二十日役減調絹一匹為二丈周末􅅦酒坊鹽池鹽井至是皆罷之祕書監牛􅀪上表以典籍屢經喪亂率多散逸周氏聚書僅盈萬卷平齊所得除其重雜裁益五千興集之期屬膺聖世為國之本莫此為先豈可使之流落私家不歸王府必須勒之以天威引之以微利則異典必臻觀閣斯積隋主從之丁巳詔購求遺書於天下每獻書一卷賚縑一匹夏四月庚午吐谷渾寇隋臨洮洮州刺史皮子信岀戰敗死汶州揔管梁逺擊走之又寇廓州州兵擊走之壬申隋以尚書右僕射趙煚兼内史令突厥數爲隋寇隋主下詔曰往者周齊抗衡分割諸夏突厥之虜俱通二國周人東慮恐齊好之深齊氏西虞懼周交之厚謂虜意輕重國遂安危蓋並有大敵之憂思減一邊之防也朕以為厚歛兆庶多惠犲狼未嘗感恩資而爲賊節之以禮不爲虛費省徭薄賦國用有餘因入賊之物加賜將士息道路之民務爲耕織清邊制勝成策在心凶醜愚闇未知深㫖將大定之日比戰國之時乗昔丗之驕結今時之恨近者盡其巢窟俱犯北邊蓋上天所忿驅就齊斧諸將今行義兼含育有降者納有違者死使其不敢南望永服威刑何用侍子之朝寧勞渭橋之拜於是命衛王爽等為行軍元帥分八道出塞擊之爽督摠管李充等四將出朔州道己卯與沙鉢略可汗遇於白道李充言於爽曰突厥狃於驟勝必輕我而無備以精兵襲之可破也諸將多以為疑唯長史李徹賛成之遂與充帥精騎五千掩擊突厥大破之沙鉢弃所服金甲潜草中而遁其軍中無食粉骨為糧加以疾疫死者甚衆幽州摠管隂夀帥歩騎數萬出盧龍塞擊高寶寧寶寧求救於突厥突厥方禦隋師不能救庚辰寶寧弃城奔磧北和龍諸縣悉平夀設重賞以購寶寧又遣人離其腹心寶寧奔契丹為其麾下所殺己丑郢州城主張子譏遣使請降於隋隋主以和好不納辛夘隋主遣兼散騎常侍薛舒兼通直散騎常侍王劭來聘劭松年之子也癸巳隋主大雩甲子突厥遣使入見于隋隋改度支尚書為民部都官尚書為刑部命左僕射判吏禮兵三部事右僕射判民刑工三部事廢光禄衛尉鴻臚寺及都水臺五月癸卯隋行軍摠管李晃破突厥於摩那度口乙巳梁太子琮入朝于隋賀遷都辛酉隋主祀方澤隋秦州摠管竇榮定帥九摠管步騎三萬出凉州與突厥阿波可汗相拒於高越原阿波屢敗榮定熾之兄子也前上大將軍京兆史萬歲坐事配敦煌為戌卒詣榮定軍門請自効榮定素聞其名見而大悦壬戌將戰榮定遣人謂突厥曰士卒何罪而殺之但當各遣一壯士決勝負耳突厥許諾因遣一騎挑戰榮定遣萬歲出應之萬歲馳斬其首而還突厥大驚不敢復戰遂請盟引軍而去長孫晟時在榮定軍中為偏將使謂阿波曰攝圖每來戰皆大勝阿波纔入遽即奔敗此乃突厥之恥也且攝圖之與阿波兵勢本敵今攝圖日勝為衆所崇阿波不利為國生辱攝圖必當以罪歸阿波成其宿計滅北牙矣願自量度能禦之乎阿波使至晟又謂之曰今達頭與隋連和而攝圖不能制可汗何不依附天子連結達頭相合為彊此萬全計也豈若喪兵負罪歸就攝圖受其戮辱邪阿波然之遣使随晟入朝沙鉢略素忌阿波驍悍自白道敗歸又聞阿波貳於隋因先歸襲擊北牙大破之殺阿波之母阿波還無所歸西奔達頭達頭大怒遣阿波帥兵而東其部落歸之者將十萬騎遂與沙鉢略相攻屢破之復得故地兵埶益彊貪汗可汗素睦於阿波沙鉢略奪其衆而廢之貪汗亡奔達頭沙鉢略從弟地勤察别統部落與沙鉢略有隙復以衆叛歸阿波連兵不已各遣使詣長安請和求援隋主皆不許六月庚辰隋行軍摠管梁逺破吐谷渾於爾汗山突厥寇幽州隋幽州摠管廣宗壯公李崇帥步騎三千拒之轉戰十餘日師人多死遂保砂城突厥圍之城荒頽不可守禦曉夕力戰又無所食每夜出掠虜營得六畜以繼軍糧突厥畏之厚為其備毎夜中結陳以待之崇軍苦飢出輒遇敵死亡略盡及明奔還城者尚百許人然多傷重不堪更戰突厥意欲降之遣使謂崇曰若來降者封為特勒崇知不免令其士卒曰崇喪師徒罪當萬死今日効命以謝國家汝俟吾死且可降賊便散走努力還鄉若見至尊道崇此意乃挺刃突陳復殺二人突厥亂射殺之秋七月辛丑以豫州刺史代人周揺為幽州摠管命李崇子敏襲爵敏娶樂平公主之女娥英詔假一品羽儀禮如尚帝女既而將侍宴公主謂敏曰我以四海與至尊唯一壻當為汝求柱國若餘官汝愼勿謝及進見帝授以儀同及開府皆不謝帝曰公主有大功於我我何得於其壻而惜官乎今授汝柱國敏乃拜而蹈舞八月丁卯朔日有食之長沙王叔堅未之江州復留為司空實奪之權壬午隋遣尚書左僕射高熲出寧州道内史監虞慶則出原州道以擊突厥九月癸丑隋大赦冬十月甲戌隋廢河南道行臺省以秦王俊為秦州摠管隴右諸州盡􅀠焉丁酉立皇弟叔平為湘東王叔敖為臨賀王叔宣為陽山王叔穆為西陽王戊戌侍中建昌矦徐陵卒癸丑立皇弟叔儉為安南王叔澄為南郡王叔興為沅陵王叔韶為岳山王叔純為新興王十一月遣散騎常侍周墳通直散騎常侍袁彦聘于隋帝聞隋主狀貎異人使彦畫像而歸帝見大駭曰吾不欲見此人亟命屏之隋既班律令蘇威屢欲更易事條内史令李徳林曰修律令時公何不言今始頒行且宜專守自非大為民害不可數更河南道行臺兵部尚書楊尚希曰竊見當今郡縣倍多於古或地無百里數縣並置或戸不滿千二郡分領具僚已衆資費日多吏卒増倍租調歲減民少官多十羊九牧今存要去閑併小為大國家則不虧粟帛選舉則易得賢良蘇威亦請廢郡帝從之甲午悉罷諸郡為州十二月乙卯隋遣兼散騎常侍曹令則通直散騎常侍魏澹來聘澹收之族也丙辰司空長沙王叔堅免叔堅旣失恩心不自安乃為厭媚醮日月以求福或上書告其事帝召叔堅囚于西省將殺之令近侍宣敕數之叔堅對曰臣之本心非有佗故但欲求親媚耳臣既犯天憲罪當萬死臣死之日必見叔陵願宣明詔責之於九泉之下帝乃赦之免官而已隋以上柱國竇榮定為右武衛大將軍榮定妻隋主姊安成公主也隋主欲以榮定為三公辭曰衛霍梁鄧若少自貶損不至覆宗帝乃止帝以李穆功大詔曰法備小人不防君子太師申公自今雖有罪但非謀逆縱有百死終不推問禮部尚書牛􅀪請立明堂帝以時事草創不許帝覽刑部奏斷獄數猶至萬以為律尚嚴密故人多陷罪又敕蘇威牛􅀪等更定新律除死罪八十一條流罪一百五十四條徒杖等千餘條唯定留五百條凡十二巻自是刑網簡要疎而不失仍置律博士弟子員隋主以長安倉廩尚虛是歲詔西自蒲陜東至衛汴水次十三州募丁運米又於衛州置黎陽倉陜州置常平倉華州置廣通倉轉相灌輸漕闗東及汾晉之粟以給長安時刺史多任武將類不稱職治書侍御史柳彧上表曰昔漢光武與二十八將披荆棘定天下及功成之後無所任職伏見詔書以上柱國和千子為􅂎州刺史千子前任趙州百姓歌之曰老禾不早殺餘種穢良田千子弓馬武用是其所長治民蒞職非其所解如謂優老尚年自可厚賜金帛若令刺舉所損殊大帝善之千子竟免彧見上勤於聽受百僚奏請多有煩碎上疏諫曰臣聞自古聖帝莫過唐虞不為叢脞是謂欽明舜任五臣堯咨四岳垂拱無為天下以治所謂勞於求賢逸於任使比見陛下留心治道無憚疲勞亦由羣官懼罪不能自決取判天㫖聞奏過多乃至營造細小之事出給輕微之物一日之内酬荅百司至乃日旰忘食夜分未寢動以文簿憂勞聖躬伏願察臣至言少減煩務若經國大事非臣下裁斷者伏願詳決自餘細務責成所司則聖體盡無疆之夀臣下蒙覆育之賜上覽而嘉之因曰柳彧直士國之寶也彧以近世風俗每正月十五日然燈遊戲奏請禁之曰竊見京邑爰及外州每以正月望夜充街塞陌聚戲朋遊鳴鼓聒天燎炬照地竭貲破産競此一時盡室并孥無問貴賤男女混雜輜素不分穢行因此而生盜賊由斯而起因循弊風曾無先覺無益於化實損於民請頒天下並即禁斷詔從之資治通鑑卷第一百七十五
