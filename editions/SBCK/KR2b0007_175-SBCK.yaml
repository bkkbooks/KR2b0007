front:
  text: 詔遜居别宮甲子命兼太傅􅂎公椿奉册大宗伯趙煚奉皇帝璽紱禪位于隋隋王冠逺遊冠受册璽改服紗㡌黄袍入御臨光殿服衮冕如元㑹之儀大赦改元開皇命有司奏册祀于南郊遣少冡宰元孝矩代太子勇鎭洛陽孝矩名矩以字行天賜之孫也女爲太子妃少内史崔仲方勸隋主除周六官依漢魏之舊從之置三師三公及尚書門下内史祕書内侍五省御史都水二臺太常等十一寺左右衛等十二府以分司統職又置上柱國至都督十一等勲官以酬勤勞特進至朝散大夫七等散官以加文武官之有徳聲者改侍中爲納言以相國司馬高熲爲尚書左僕射兼納言相國司録京兆虞慶則為内史監兼吏部尚書相國内郎李徳林為内史令乙丑追尊皇考為武元皇帝廟號太祖皇妣呂氏為元明皇后丙寅修廟社立王后獨孤氏為皇后王太子勇為皇太子丁卯以大將軍趙煚為尚書右僕射己巳封周靜帝為介公周氏諸王皆降爵為公初劉鄭矯詔以隋主輔政楊后雖不預謀然以嗣主幼冲恐權在佗族聞之甚喜後知其父有異圖意頗不平形於言色及禪位憤惋逾甚隋主内甚愧之改封樂平公主乆之欲奪其志公主誓不許乃止隋主與周載下大夫北平榮建緒有舊隋主將受禪建緒為息州刺史將之官隋主謂曰且躊踷當共取富貴建緒正色曰明公此旨非僕所聞及即位來朝帝謂之曰卿亦悔不建緒稽首曰臣位非徐廣情類楊彪帝笑曰朕雖不曉書語亦知卿此言不遜上柱國竇毅之女聞隋受禪自投堂下撫膺太息曰恨我不為男子救舅氏之患毅及襄陽公主掩其口曰汝勿妄言滅吾族毅由是竒之及長以適唐公李淵淵昞之子也虞慶則勸隋主盡滅宇文氏髙熲楊惠亦依違從之李徳林固爭以為不可隋主作色曰君書生不足與議此於是周太祖孫譙公乾惲冀公絢閔帝子紀公湜明帝子酆公貞宋公實高祖子漢公賛秦公贄曹公允道公充蔡公兑荆公元宣帝子萊公衍郢公術皆死徳林由是品位不進乙亥上耕藉田隋主封其弟邵公慧為滕王安公爽為衛王子鴈門公廣為晉王俊為秦王秀為越王諒為漢王隋主賜李穆詔曰公既舊徳且又父黨敬惠來㫖義無有違即以今月十三日恭膺天命俄而穆入朝帝以穆為太師賛拜不名子孫雖在襁褓悉拜儀同一門執象笏者百餘人貴盛無比又以上柱國竇熾為太傅幽州摠管于翼為太尉李穆上表乞骸骨詔曰呂尚以期頥佐周張蒼以華皓相漢高才命世不拘􅁪禮仍以穆年耆敕蠲朝集有大事就第詢訪美陽公蘇威綽之子也少有令名周晉公䕶强以女妻之威見護專權恐禍及已屏居山寺以諷讀為娯周高祖聞其賢除車騎大將軍儀同三司又除稍伯下大夫皆辭疾不拜宣帝就除開府儀同大將軍隋主為丞相高熲薦之隋主召見與語大悦居月餘聞將受禪遁歸田里熲請追之隋主曰此不欲預吾事耳置之及受禪徵拜太子少保追封其父為邳公以威襲爵
