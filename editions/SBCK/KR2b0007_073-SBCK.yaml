front:
  text: 其勞劇自謂年宦先琬才能踰之於是怨憤形于聲色歎咤之音發於五内時人畏其言語不節莫敢從也惟後軍師費禕往慰省之儀對禕恨望前後云云又語禕曰往者丞相亡沒之際吾若舉軍以就魏氏處世寧當落度如此邪令人追悔不可復及禕宻表其言漢主廢儀爲民徙漢嘉郡儀至徙所復上書誹謗辭指激切遂下郡收儀儀自殺三月庚寅葬文德皇后
