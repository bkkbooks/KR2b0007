body:
  text: 夏四月漢主以蔣琬爲大將軍録尚書事後軍師費禕代琬爲尚書令帝好土功既作許昌宫又治洛陽宫起昭陽太極殿築總章觀髙十餘丈力役不已農桑失業司空陳羣上疏曰昔禹承唐虞之盛猶卑宫室而惡衣服况今喪亂之後人民至少比漢文景之時不過一大郡加邊境有事將士勞苦若有水旱之患國家之深憂也昔劉備自成都至白水多作傳舍興費人役太祖知其疲民也今中國勞力亦吳蜀之所願此安危之機也惟陛下慮之帝荅曰王業宫室亦宜並立滅賊之後但當罷守禦耳豈可復興役邪是固君之職蕭何之大略也羣曰昔漢祖唯與項羽争天下羽已滅宫室燒焚是以蕭何建武庫太倉皆是要急然髙祖猶非其壯麗今二虜未平誠不宜與古同也夫人之所欲莫不有辭况乃天王莫之敢違前欲壊武庫謂不可不壊也後欲置之謂不可不置也若必作之固非臣下辭言所屈若少留神卓然回意亦非臣下之所及也漢明帝欲起德陽殿鍾離意諫即用其言後乃復作之殿成謂羣臣曰鍾離尚書在不得成此殿也夫王者豈憚一人蓋為百姓也今臣曽不能少凝聖聽不及意逺矣帝乃為之少有減省帝耽于内寵婦官秩石擬百官之數自貴人以下至掖庭灑掃者凡數千人選女子知書可付信者六人以為女尚書使典省外奏事處當畫可廷尉髙柔上疏曰昔漢文惜十家之資不營小臺之娛去病慮匈奴之害不遑治第之事况今所損者非惟百金之費所憂者非徒北伙之患乎可粗成見所營立以充朝宴之儀訖罷作者使得就農二方平定復可徐興周禮天子后妃以下百二十人嬪嬙之儀既已盛矣竊聞後庭之數或復過之聖嗣不昌殆能由此臣愚以為可妙簡淑媛以備内官之數其餘盡遣還家且以育精養神専靜為寳如此則螽斯之徵可庶而致矣帝報曰卿輒昌言佗復以聞是時獵法嚴峻殺禁地鹿者身死財産沒官有能覺告者厚加賞賜柔復上疏曰中間以來百姓供給衆役親田者既減加頃復有獵禁羣鹿犯暴殘食生苖處處為害所傷不訾民雖障防力不能禦至如滎陽左右周數百里嵗略不收方今天下生財者甚少而麋鹿之損者甚多卒有兵戎之役凶年之災將無以待之惟陛下寛放民間使得捕鹿遂除其禁則衆庶永濟莫不恱豫矣帝又欲平北芒令於其上作臺觀望見孟津衛尉辛毗諫曰天地之性髙髙下下今而反之既非其理加以損費人功民不堪役且若九河盈溢洪水為害而丘陵皆夷將何以禦之帝乃止少府楊阜上疏曰陛下奉武皇帝開拓之大業守文皇帝克終之元緒誠宜思齊往古聖賢之善治總觀季世放蕩之惡政曩使桓靈不廢髙祖之灋度文景之恭儉太祖雖有神武於何所施而陛下何由處斯尊哉今吳蜀未定軍旅在外諸所繕治惟陛下務從約節帝優詔荅之阜復上疏曰堯尚茅茨而萬國安其居禹卑宫室而天下樂其業及至殷周或堂崇三尺度以九筵耳桀作璇室象廊紂為傾宫鹿臺以喪其社稷楚靈以築章華而身受禍秦始皇作阿房二世而滅夫不度萬民之力以從耳目之欲未有不亡者也陛下當以堯舜禹湯文武為灋則夏桀殷紂楚靈秦皇為深誡而乃自暇自逸惟宫臺是飾必有顛覆危亡之禍矣君作元首臣為股肱存亡一體得失同之臣雖駑怯敢忘爭臣之義言不切至不足以感寤陛下陛下不察臣言恐皇祖烈考之祚墜于地使臣身死有􅀘萬一則死之日猶生之年也謹叩棺沐浴伏俟重誅奏御帝感其忠言手筆詔荅帝嘗著帽被縹綾半袖阜問帝曰此於禮何法服也帝黙然不答自是不法服不以見阜阜又上疏欲省宫人諸不見幸者乃召御府吏問後宫人數吏守舊令對曰禁宻不得宣露阜怒杖吏一百數之曰國家不與九卿為宻反與小吏為宻乎帝愈嚴憚之散騎常侍蔣濟上疏曰昔句踐養胎以待用昭王恤病以雪仇故能以弱燕服彊齊羸越滅勁吳今二敵彊盛當身不除百世之責也以陛下聖明神武之略舍其緩者専心討賊臣以為無難矣中書侍郎東萊王基上疏曰臣聞古人以水喻民曰水所以載舟亦所以覆舟顔淵曰東野子之御馬力盡矣而求進不已殆將敗矣今事役勞苦男女離曠願陛下深察東野之敝留意舟水之喻息犇駟於未盡節力役於未困昔漢有天下至孝文時唯有同姓諸侯而賈誼憂之曰置火積薪之下而寑其上因謂之安今冦賊未殄猛將擁兵檢之則無以應敵乆之則難以遺後當盛明之世不務以除患若子孫不競社稷之憂也使賈誼復起必深切於曩時矣帝皆不聽殿中監督役擅收蘭臺令史右僕射衛臻奏案之詔曰殿舍不成吾所留心卿推之何也臻曰古制侵官之灋非惡其勤事也誠以所益者小所墮者大也臣每察校事類皆如此若又縱之懼羣司將遂越職以至陵夷矣尚書涿郡孫禮固請罷役帝詔曰欽納讜言促遣民作監作者復奏留一月有所成訖禮徑至作所不復重奏稱詔罷民帝竒其意而不責帝雖不能盡用羣臣直諫之言然皆優容之秋七月洛陽崇華殿災帝問侍中領太史令泰山髙堂隆曰此何咎也於禮寧有祈禳之義乎對曰易傳曰上不儉下不節孽火燒其室又曰君髙其臺天火為災此人君務飾宫室不知百姓空竭故天應之以旱火從髙殿起也詔問隆吾聞漢武之時柏梁災而大起宫殿以厭之其義云何對曰夷越之巫所為非聖賢之明訓也五行志曰柏梁災其後有江充巫蠱事如志之言越巫建章無所厭也今宜罷散民役宫室之制務從約節清埽所災之處不敢於此有所立作則萐莆嘉禾必生此地若乃疲民之力竭民之財非所以致符瑞而懐逺人也八月庚午立皇子芳為齊王詢為秦王帝無子養二王為子宫省事祕莫有知其所由來者或云芳任城王楷之子也丁巳帝還洛陽詔復立崇華殿更名曰九龍通引榖水過九龍殿前為玉井綺欄蟾蜍含受神龍吐出使博士扶風馬鈞作司南車水轉百戲陵霄闕始構有鵲巢其上帝以問髙堂隆對曰詩曰惟鵲有巢惟鳩居之今興宫室起陵霄闕而鵲巢之此宫未成身不得居之象也大意若曰宫室未成將有他姓制御之斯乃上天之戒也夫天道無親惟與善人太戊武丁覩災竦懼故天降之福今若休罷百役増崇德政則三王可四五帝可六豈惟商宗轉禍為福而已哉帝為之動容帝性嚴急其督脩宫室有稽限者帝親召問言猶在口身首已分散騎常侍領祕書監王肅上疏曰今宫室未就見作者三四萬人九龍可以安聖體其内足以列六宫惟泰極已前功夫尚大願陛下取常食禀之士非急要者之用選其丁壯擇留萬人使一朞而更之咸知息代有日則莫不恱以即事勞而不怨矣計一嵗有三百六十萬夫亦不為小當一嵗成者聽且三年分遣其餘使皆即農無窮之計也夫信之於民國家大寳也前車駕當幸洛陽發民為營有司命以營成而罷既成又利其功力不以時遣有司徒營目前之利不顧經國之體臣愚以為自今已後儻復使民宜明其令使必如期以次有事寧復更發無或失信凡陛下臨時之所行刑皆有罪之吏宜死之人也然衆庶不知謂為倉卒故願陛下下之於吏而􅁀其罪鈞其死也無使汙于宫掖而為逺近所疑且人命至重難生易殺氣絶而不續者也是以聖賢重之昔漢文帝欲殺犯蹕者廷尉張釋之曰方其時上使誅之則已今下廷尉廷尉天下之平不可傾也臣以為大失其義非忠臣所宜陳也廷尉者天子之吏也猶不可以失平而天子之身反可以惑謬乎斯重於為己而輕於為君不忠之甚者不可不察中山恭王衮疾病令官屬曰男子不死於婦人之手亟以時成東堂堂成輿疾往居之又令世子曰汝幼為人君知樂不知苦必將以驕奢為失者也兄弟有不良之行當造䣛諫之諫之不從流涕喻之喻之不改乃白其母猶不改當以奏聞并辭國土與其守寵罹禍不若貧賤全身也此亦謂大罪惡耳其微過細故當掩覆之冬十月己酉衮卒十一月丁酉帝行如許昌是嵗幽州刺史王雄使勇士韓龍刺殺鮮卑軻比能自是種落離散互相侵伐彊者逺遁弱者請服邊陲遂安張掖柳谷口水溢涌寳石負圖狀象靈􅀛立于川西有石馬七及鳳皇麒麟白虎犧牛璜玦八卦列宿孛彗之象又有文曰大討曹詔書班天下以為嘉瑞任令于綽連齎以問鉅鹿張臶臶宻謂綽曰夫神以知來不追已往祥兆先見而後廢興從之今漢已乆亡魏已得之何所追興祥兆乎此石當今之變異而將來之符瑞也帝使人以馬易珠璣翡翠玳瑁於吳吳主曰此皆孤所不用而可以得馬孤何愛焉皆以與之四年春吳人鑄大錢一當五百三月吳張昭卒年八十一昭容貎矜嚴有威風吳主以下舉邦憚之夏四月漢主至湔登觀阪觀汶水之流旬日而還武都氐王符健請降於漢其弟不從將四百户來降五月乙夘樂平定侯董昭卒冬十月己夘帝還洛陽宫甲申有星孛于大辰又孛于東方髙堂隆上疏曰凡帝王徙都立邑皆先定天地社稷之位敬恭以奉之將營宫室則宗廟為先廏庫為次居室為後今圜丘方澤南北郊明堂社稷神位未定宗廟之制又未如禮而崇飾居室士民失業外人咸云宫人之用與軍國之費略齊民不堪命皆有怨怒書曰天聰明自我民聰明天明畏自我民明威言天之賞罰隨民言順民心也夫采椽卑宫唐虞大禹之所以垂皇風也玉臺瓊室夏癸商辛之所以犯昊天也今宫室過盛天彗章灼斯乃慈父懇切之訓當崇孝子祇聳之禮不宜有忽以重天怒隆數切諫帝頗不恱侍中盧毓進曰臣聞君明則臣直古之聖王惟恐不聞其過此乃臣等所以不及隆也帝乃解毓植之子也十二月癸巳潁隂靖侯陳羣卒羣前後數陳得失每上封事輒削其草時人及其子弟莫能知也論者或譏羣居位拱黙正始中詔撰羣臣上書以為名臣奏議朝士乃見羣諫事皆歎息焉袁子論曰或云少府楊阜豈非忠臣哉見人主之非則勃然觸之與人言未嘗不道答曰夫仁者愛人施之君謂之忠施於親謂之孝今為人臣見人主失道直詆其非而播揚其惡可謂直士未為忠臣也故司空陳羣則不然談論終日未嘗言人主之非書數十上外人不知君子謂羣於是乎長者矣乙未帝行如許昌詔公卿舉才德兼備者各一人司馬懿以兖州刺史太原王昶應選昶為人謹厚名其兄子曰黙曰沈名其子曰渾曰深為書戒之曰吾以四者為名欲使汝曹顧名思義不敢違越也夫物速成則疾亡晚就則善終朝華之草夕而零落松柏之茂隆寒不衰是以君子戒於闕黨也夫能屈以為伸讓以為得弱以為彊鮮不遂矣夫毁譽者愛惡之原而禍福之機也孔子曰吾之於人誰毁誰譽以聖人之德猶尚如此况庸庸之徒而輕毁譽哉人或毁已當退而求之於身若已有可毁之行則彼言當矣若已無可毁之行則彼言妄矣當則無怨於彼妄則無害於身又何反報焉諺曰救寒莫如重裘止謗莫如自脩斯言信矣景初元年春正月壬辰山茌縣言黃龍見髙堂隆以為魏得土德故其瑞黃龍見宜改正朔易服色以神明其政變民耳目帝從其議三月下詔改元以是月為孟夏四月服色尚黃犧牲用白從地正也更命太和厯曰景初厯五月己巳帝還洛陽己丑大赦六月戊申京都地震己亥以尚書令陳矯為司徒左僕射衛臻為司空有司奏以武皇帝為魏太祖文皇帝為魏髙祖帝為魏烈祖三祖之廟萬世不毁孫盛論曰夫諡以表行廟以存容未有當年而逆制祖宗未終而豫自尊顯魏之羣司於是乎失正矣秋七月丁卯東鄉貞矦陳矯卒公孫淵數對國中賔客出惡言帝欲討之以荆州刺史河東母丘儉為幽州刺史儉上疏曰陛下即位以來未有可書吳蜀恃險未可卒平聊可以此方無用之士克定遼東光禄大夫衛臻曰儉所陳皆戰國細術非王者之事也吳頻嵗稱兵冦亂邊境而猶按甲養士未果致討者誠以百姓疲勞故也淵生長海表相承三世外撫戎夷内脩戰射而儉欲以偏軍長驅朝至夕卷知其妄矣帝不聽使儉率諸軍及鮮卑烏桓屯遼東南界璽書徵淵淵遂發兵反逆儉於遼隧㑹天雨十餘日遼水大漲儉與戰不利引軍還右北平淵因自立為燕王改元紹漢置百官遣使假鮮卑單于璽封拜邊民誘呼鮮卑以侵擾北方漢張后殂九月冀兖徐豫大水西平郭夫人有寵於帝毛后愛弛帝游後園曲宴極樂郭夫人請延皇后帝弗許因禁左右使不得宣后知之明日謂帝曰昨日游宴北園樂乎帝以左右泄之所殺十餘人庚辰賜后死然猶加諡曰悼癸丑葬愍陵遷其弟曽為散騎常侍冬十月帝用髙堂隆之議營洛陽南委粟山為圓丘詔曰昔漢氏之初承秦滅學之後採摭殘缺以備郊祀四百餘年廢無禘禮曹氏世系出自有虞今祀皇皇帝天於圓丘以始祖虞舜配祭皇皇后地於方丘以舜妃伊氏配祀皇天之神於南郊以武帝配祭皇地之祇於北郊以武宣皇后配廬江主簿吕習宻使人請兵於吳欲開門為内應吳主使衛將軍全琮督前將軍朱桓等赴之既至事露吳軍還諸葛恪至丹陽移書四部屬城長吏令各保其疆界明立部伍其從化平民悉令屯居乃内諸將羅兵幽阻但繕藩籬不與交鋒候其榖稼將熟輒縱兵芟刈使無遺種舊榖既盡新榖不收平民屯居略無所入於是山民饑窮漸出降首恪乃復敕下曰山民去惡從化皆當撫慰徙出外縣不得嫌疑有所拘執曰陽長胡伉得降民周遺遺舊惡民困迫暫岀伉縛送言府恪以伉違教遂斬以狥民聞伉坐執人被戮知官惟欲出之而已於是老幼相􅂝而出嵗期人數皆如本規恪自領萬人餘分給諸將吳主嘉其功拜恪威北將軍封都鄉侯徙屯廬江晥口是嵗徙長安鍾簴槖佗銅人承露盤於洛陽盤折聲聞數十里銅人重不可致留于霸城大發銅鑄銅人二號曰翁仲列坐於司馬門外又鑄黄龍鳳皇各一龍髙四丈鳳髙三丈餘置内殿前起土山於芳林園西北陬使公卿羣僚皆負土樹松竹雜木善草於其上捕山禽雜獸致其中司徒軍議掾董尋上疏諫曰臣聞古之直士盡言於國不避死亡故周昌比髙祖於桀紂劉輔譬趙后於人婢天生忠直雖白刃沸湯往而不顧者誠為時主愛惜天下也建安以來野戰死亡或門殫户盡雖有存者遺孤老弱若今宫室狹小當廣大之猶宜隨時不妨農務况乃作無益之物黃龍鳳皇九龍承露盤此皆聖明之所不興也其功三倍於殿舍陛下既尊羣臣顯以冠冕被以文繡載以華輿所以異於小人而使穿方舉土面目垢黒沾體塗足衣冠了鳥毁國之光以崇無益甚非謂也孔子曰君使臣以禮臣事君以忠無忠無禮國何以立臣知言出必死而臣自比於牛之一毛生既無益死亦何損秉筆流涕心與世辭臣有八子臣死之後累陛下矣將奏沐浴以待命帝曰董尋不畏死邪王者奏收尋有詔勿問髙堂隆上疏曰今之小人好說秦漢之奢靡以蕩聖心求取亡國不度之器勞役費損以傷德政非所以興禮樂之和保神明之休也帝不聽隆又上書曰昔洪水滔天二十二載堯舜君臣􅀯面而已今無若時之急而使公卿大夫並與厮徒共供事役聞之四夷非嘉聲也垂之竹帛非令名也今吳蜀二賊非徒白地小虜聚邑之冦乃潛號稱帝欲與中國爭衡今若有人來告權禪並脩德政輕省租賦動咨耆賢事遵禮度陛下聞之豈不惕然惡其如此以為難卒討滅而為國憂乎若使告者曰彼二賊並為無道崇侈無度役其士民重其賦斂下不堪命吁嗟日甚陛下聞之豈不幸彼疲敝而取之不難乎茍如此則可易心而度事義之數亦不逺矣亡國之主自謂不亡然後至於亡賢聖之君自謂亡然後至於不亡今天下彫敝民無儋石之儲國無終年之畜外有彊敵六軍暴邊内興土功州郡騷動若有冦警則臣懼版築之士不能投命虜庭矣又將吏奉禄稍見折減方之於昔五分居一諸受休者又絶稟賜不應輸者今皆出半此為官入兼多於舊其所出與參少於昔而度支經用更每不足牛肉小賦前後相繼反而椎之凡此諸費必有所在且夫禄賜穀帛人主所以恵養吏民而為之司命者也若今有廢是奪其命矣既得之而又失之此生怨之府也帝覽之謂中書監令曰觀隆此奏使朕懼哉尚書衛覬上疏曰今議者多好恱耳其言政治則比陛下於堯舜其言征伐則比二虜於貍䑕臣以為不然四海之内分而為三羣士陳力各為其主是與六國分治無以為異也當今千里無煙遺民困苦陛下不善留意將遂凋敝難可復振武皇帝之時後宫食不過一肉衣不用錦繡茵蓐不縁飾器物無丹漆用能平定天下遺福子孫此皆陛下之所覽也當今之務宜君臣上下計校府庫量入為出猶恐不及而工役不輟侈靡日崇帑藏日竭昔漢武信神仙之道謂當得雲表之露以餐玉屑故立仙掌以承髙露陛下通明每所非笑漢武有求於露而猶尚見非陛下無求於露而空設之不益於好而糜費功夫誠皆聖慮所宜裁制也時有詔録奪士女前已嫁為吏民妻者還以配士聽以生口自贖又簡選其有姿首者内之掖庭太子舍人沛國張茂上書諫曰陛下天之子也百姓吏民亦陛下子也今奪彼以與此亦無以異於奪兄之妻妻弟也於父母之恩偏矣又詔書聽得以生口年紀顔色與妻相當者自代故富者則傾家盡産貧者舉假貸貰貴買生口以贖其妻縣官以配士為名而實内之掖庭其醜惡乃出與士得婦者未必喜而失妻者必有憂或窮或愁皆不得志夫君有天下而不得萬姓之懽心者鮮不危殆且軍師在外數十萬人一日之費非徒千金舉天下之賦以奉此役猶將不給况復有宮庭非員無録之女椒房母后之家賞賜橫與内外交引其費半軍昔漢武帝掘地為海封土為山賴是時天下為一莫敢與爭者耳自衰亂以來四五十載馬不捨鞍士不釋甲彊冦在疆圖危魏室陛下不戰戰業業念崇節約而乃奢靡是務中尚方作玩弄之物後園建承露之盤斯誠快耳目之觀然亦足以騁冦讎之心矣惜乎舍堯舜之節儉而為漢武帝之侈事臣竊為陛下不取也帝不聽髙堂隆疾篤口占上疏曰曽子有言曰人之將死其言也善臣寢疾有増無損常恐奄忽忠􅅃不昭臣之丹誠願陛下少垂省覽臣觀三代之有天下聖賢相承歴數百載尺土莫非其有一民莫非其臣然癸辛之徒縱心極欲皇天震怒宗國為墟紂梟白旗桀放鳴條天子之尊湯武有之豈伊異人皆明王之胄也黃初之際天兆其戒異類之鳥育長燕巢口爪胷赤此魏室之大異也宜防鷹揚之臣於蕭牆之内可選諸王使君國典兵往往棊跱鎮撫皇畿翼亮帝室夫皇天無親惟德是輔民詠德政則延期過厯下有怨歎則輟録授能由此觀之天下乃天下之天下非獨陛下之天下也帝手詔深慰勞之未幾而卒陳夀評曰髙堂隆學業脩明志存匡君因變陳戒發於懇誠忠矣哉及至必改正朔俾魏祖虞所謂意過其通者與帝深疾浮華之士詔吏部尚書盧毓曰選舉莫取有名名如畫地作餅不可啖也毓對曰名不足以致異人而可以得常士常士畏教慕善然後有名非所當疾也愚臣既不足以識異人又主者正以循名案常為職但當有以驗其後耳古者敷奏以言明試以功今考績之灋廢而以毁譽相進退故真偽渾雜虚實相䝉帝納其言詔散騎常侍劉邵作考課灋邵作都官考課灋七十二條又作說略一篇詔下百官議司􅀠校尉崔林曰案周官考課其文備矣自康王以下遂以陵夷此即考課之灋存乎其人也及漢之季其失豈在乎佐吏之職不宻哉方今軍旅或猥或卒増減無常固難一矣且萬目不張舉其綱衆毛不整振其領臯陶仕虞伊尹臣殷不仁者逺若大臣能任其職式是百辟則孰敢不肅烏在考課哉黃門侍郎杜恕曰明試以功三考黜陟誠帝王之盛制也然歴六代而考績之灋不著闗七聖而課試之文不垂臣誠以為其灋可粗依其詳難備舉故也語曰世有亂人而無亂灋若使灋可専任則唐虞可不須稷契之佐殷周無貴伊吕之輔矣今奏考功者陳周漢之云為綴京房之本㫖可謂明考課之要矣於以崇揖讓之風興濟濟之治臣以為未盡善也其欲使州郡考士必由四科皆有事效然後察舉試辟公府為親民長吏轉以功次補郡守者或就増秩賜爵此最考課之急務也臣以為便當顯其身用其言使具為課州郡之灋灋具施行立必信之賞施必行之罰至於公卿及内職大臣亦當俱以其職考課之古之三公坐而論道内職大臣納言補闕無善不紀無過不舉且天下至大萬機至衆誠非一明所能徧照故君為元首臣作股肱明其一體相須而成也是以古人稱廊廟之材非一木之枝帝王之業非一士之略由是言之焉有大臣守職辦課可以致雍熈者哉誠使容身保位無放退之辜而盡節在公抱見疑之􅀔公義不脩而私議成俗雖仲尼為課猶不能盡一才又况於世俗之人乎司空掾北地傅嘏曰夫建官均職清理民物所以立本也循名考實紏勵成規所以治末也本綱未舉而造制末程國略不崇而考課是先懼不足以料賢愚之分精幽明之理也議久之不决事竟不行臣光曰為治之要莫先於用人而知人之道聖賢所難也是故求之於毁譽則愛憎競進而善惡渾殽考之於功狀則巧詐橫生而眞僞相冒要之其本在於至公至明而已矣為人上者至公至明則羣下之能否焯然形於目中無所復逃矣茍為不公不明則考課之灋適足以為曲私欺罔之資也何以言之公明者心也功狀者迹也己之心不能治而以考人之迹不亦難乎為人上者誠能不以親疎貴賤異其心喜怒好惡亂其志欲知治經之士則視其記覽博洽講論精通斯為善治經矣欲知治獄之士則視其曲盡情偽無所寃抑斯為善治獄矣欲知治財之士則視其倉庫盈實百姓富給斯為善治財矣欲知治兵之士則視其戰勝攻取敵人畏服斯為善治兵矣至於百官莫不皆然雖詢謀於人而决之在已雖考求於迹而察之在心研覈其實而斟酌其宜至精至微不可以口述不可以書傳也安得豫為之灋而悉委有司哉或者親貴雖不能而任職疎賤雖賢才而見遺所喜所好者敗官而不去所怒所惡者有功而不録詢謀於人則毁譽相半而不能决考求其迹則文具實亡而不能察雖復為之善灋繁其條目謹其簿書安能得其真哉或曰人君之治大者天下小者一國内外之官以千萬數考察黜陟安得不委有司而獨任其事哉曰非謂其然也凡為人上者不特人君而已太守居一郡之上刺史居一州之上九卿居屬官之上三公居百執事之上皆用此道以考察黜陟在下之人為人君者亦用此道以考察黜陟公卿剌史太守奚煩勞之有哉或曰考績之灋唐虞所為京房劉邵述而脩之耳烏可廢哉曰唐虞之官其居位也久其受任也專其立灋也寛其責成也逺是故鯀之治水九載績用弗成然後治其罪禹之治水九州攸同四隩既宅然後賞其功非若京房劉邵之灋校其米鹽之課責其旦夕之效也事固有名同而實異者不可不察也考績非可行於唐虞而不可行於漢魏由京房劉邵不得其本而犇趨其末故也初右僕射衛臻典選舉中䕶軍蔣濟遺臻書曰漢祖遇亡虜為上將周武拔漁父為太師布衣厮養可登王公何必守文試而後用臻曰不然子欲同牧野於成康喻斷蛇於文景好不經之舉開拔竒之津將使天下馳騁而起矣盧毓論人及選舉皆先性行而後言才黃門郎馮翊李豐嘗以問毓毓曰才所以為善也故大才成大善小才成小善今稱之有才而不能為善是才不中器也豐服其言資治通鑑卷第七十三
