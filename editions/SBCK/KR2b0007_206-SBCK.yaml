front:
  text: 資治通鑑卷第二百六
  hash: sha256:41e457ad2dab96ddccdfb44da7a68a6538f4e085ea6e2bc57ad31b439152ca6b
body:
  text: 臣司馬光奉勑編集唐紀二十二敦六月凡三年有竒起强圉作噩盡上章困則天順聖皇后中之下神功元年正月己亥朔太后享通天宫突厥黙啜寇靈州以許欽明自隨欽明至城下大呼求美醤粱米及墨意欲城中選良將引精兵夜襲虜營而城中無諭其意者箕州刺史劉思禮學相人於術士張憬藏憬藏謂思禮當歴箕州位至太師思禮念太師人臣極貴非佐命無以致之乃與洛州録事參軍綦連耀謀反隂結朝士託相術許人富貴俟其意悦因説以綦連耀有天命公必因之以得富貴鳯閣舍人王勮兼天官侍郎事用思禮爲箕州刺史明堂尉河南吉頊聞其謀以告合宫尉來俊臣使上變告之太后使河内王武懿宗推之懿宗令思禮廣引朝士許免其死凡小忤意者皆引之於是思禮引鳯閣侍郎同平章事李元素夏官侍郎同平章事孫元亨知天官侍郎事石抱忠劉竒給事中周譒及王勮兄涇州刺史勔弟監察御史助等凡三十六家皆海内名士窮楚毒以成其獄壬戌皆族誅之親舊連坐流竄者千餘人初懿宗寛思禮於外使誣引諸人諸人旣誅然後收思禮思禮始悔之懿宗自天授以來太后數使之鞫獄喜誣䧟人時人以為周來之亞來俊臣欲擅其功復羅告吉頊頊上變得召見僅免俊臣由是􅃨用而頊亦以此得進俊臣黨人羅告司刑府史樊惎謀反誅之惎子訟寃於朝堂無敢理者乃援刀自刳其腹秋官侍郎上邽劉如璿見之竊嘆而泣俊臣奏如璿黨惡逆下獄處以絞刑制流瀼州尚乘奉御張易之行成之族孫也年少美姿容善音律太平公主薦易之弟昌宗入侍禁中昌宗復薦易之兄弟皆得幸於太后常傅朱粉衣錦繡昌宗累遷散騎常侍易之為司衛少卿拜其母韋氏臧氏為太夫人賞賜不可勝紀仍勅鳯閣侍郎李逈秀為臧氏私夫逈秀大亮之族孫也武承嗣三思懿宗宗楚客晋卿皆􅀱易之門庭爭執鞭轡謂易之為五郎昌宗為六郎癸亥突厥黙啜寇勝州平狄軍副使安道買擊破之甲子以原州司馬婁師徳守鳯閣侍郎同平章事春三月戊申清邊道揔管王孝傑蘇宏暉等將兵十七萬與孫萬榮戰于東硤石谷唐兵大敗孝傑死之孝傑遇契丹帥精兵為前鋒力戰契丹引退孝傑追之行背懸崕契丹回兵薄之宏暉先遁孝傑墜崖死將士死亡殆盡管記洛陽張説馳奏其事太后贈孝傑官爵遣使斬宏暉以徇使者未至宏暉以立功得免武攸宜軍漁陽聞孝傑等敗沒軍中震恐不敢進契丹乘勝寇幽州攻䧟城邑剽掠吏民攸宜遣將撃之不克閻知㣲田歸道同使突厥冊黙啜為可汗知㣲中道遇黙啜使者輙與之緋袍銀帯且上言虜使至都宜大為供張歸道上言突厥背誕積年方今悔過宜待聖恩寛宥今知㣲擅與之袍帶使朝廷無以復加宜令反初服以俟朝恩又小虜使臣不足大為供張太后然之知㣲見黙啜舞蹈吮其靴鼻歸道長揖不拜黙啜囚歸道將殺之歸道辭色不撓責其無厭為陳禍福阿波逹干元珍曰大國使者不可殺也黙啜怒稍解但拘留不遣初咸亨中突厥有降者皆處之豐勝靈夏朔代六州至是黙啜求六州降户及單于都䕶府之地并榖種繒帛農器鐡太后不許黙啜怒言辭悖慢姚璹楊再思以契丹未平請依黙啜所求給之麟䑓少監知鳯閣侍郎賛皇李嶠曰戎狄貪而無信此所謂借寇兵資盗糧也不如治兵以備之璹再思固請與之乃悉驅六州降戸數千帳以與黙啜并給榖種四萬斛雜綵五萬叚農器三千事鐡數萬斤并許其昬黙啜由是益彊田歸道始得還與閻知㣲爭論於太后前歸道以為黙啜必負約不可恃和親宜為之備知㣲以為和親必可保夏四月鑄九鼎成徙置通天宫豫州鼎髙丈八尺受千八百石餘州髙丈四尺受千二百石各圗山川物産於其上共用銅五十六萬七百餘斤太后欲以黄金千兩塗之姚璹曰九鼎神器貴於天質自然且臣觀其五采煥炳相雜不待金色以為炫燿太后從之自􅀇武門曵入令宰相諸王帥南北牙宿衛兵十餘萬人并仗内大牛白象共曵之前益州長史王及善已致仕㑹契丹作亂山東不安起為滑州刺史太后召見問以朝廷得失及善陳治亂之要十餘條太后曰外州末事此為根本卿不可出癸酉留為内史癸未以右金吾衛大將軍武懿宗為神兵道行軍大揔管與右豹韜衛將軍何迦宻將兵擊契丹五月癸夘又以婁師徳為清邊道副大揔管右武威衛將軍沙吒忠義為前軍揔管將兵一十萬撃契丹先是有朱前疑者上書云臣夢陛下夀滿八百即拜拾遺又自言夢陛下髪白再􅀇齒落更生遷駕部郎中出使還上書云聞嵩山呼萬嵗賜以緋筭袋時未五品於緑衫上佩之㑹發兵討契丹敕京官出馬一匹供軍酬以五品前疑買馬輸之屢抗表求進階太后惡其貪鄙六月乙丑敕還其馬斥歸田里右司郎中馮翊喬知之有羙妾曰碧玉知之為之不昬武承嗣借以敎諸􅁎遂留不還知之作緑珠怨詩以寄之碧玉赴井死承嗣得詩於裙帶大怒諷酷吏羅告族之司僕少卿來俊臣倚勢貪淫士民妻妾有羙者百方取之或使人羅告其罪矯稱敕以取其妻前後羅織誅人不可勝計自宰相以下籍其姓名而取之自言才比石勒監察御史李昭徳素惡俊臣又嘗庭辱秋官侍郎皇甫文備二人共誣昭徳謀反下獄俊臣欲羅告武氏諸王及太平公主又欲誣皇嗣及廬陵王與南北牙同反冀因此盗國權河東人衛遂忠告之諸武及太平公主恐懼共發其罪繋獄有司處以極刑太后欲赦之奏上三日不出王及善曰俊臣凶狡貪暴國之元惡不去之必動揺朝廷太后遊苑中吉頊執轡太后問以外事對曰外人唯怪來俊臣奏不下太后曰俊臣有功於國朕方思之頊曰于安逺告虺貞反既而果反今止為成州司馬俊臣聚結不逞誣􅌟良善􅂍賄如山寃魂塞路國之賊也何足惜哉太后乃下其奏丁卯昭徳俊臣同弃市時人無不痛眧徳而快俊臣仇家爭噉俊臣之肉斯須而盡抉眼剝面披腹出心騰蹋成泥太后知天下惡之乃下制數其罪惡且曰宜加赤族之誅以雪蒼生之憤可凖法籍沒其家士民皆相賀於路曰自今眠者背始帖席矣俊臣以告綦連耀功賞奴婢十人俊臣閱司農婢無可者以西突厥可汗斛瑟羅家有細婢善歌舞欲得以為賞口乃使人誣告斛瑟羅反諸酋長詣闕割耳􅋇面訟寃者數千人㑹俊臣誅乃得免俊臣方用事選司受其屬請不次除官者每銓數百人俊臣敗侍郎皆自首太后責之對曰臣負陛下死罪臣亂國家法罪止一身違俊臣語立見滅族太后乃赦之上林令侯敏素謟事俊臣其妻董氏諫之曰俊臣國賊指日將敗君宜遠之敏從之俊臣怒出為武龍令敏欲不徃妻曰速去勿留俊臣敗其黨皆流嶺南敏獨得免太后徴于安遠為尚食奉御擢吉頊為右肅政中丞以檢校夏官侍郎宗楚客同平章事武懿宗軍至趙州聞契丹將駱務整數千騎將至冀州懿宗懼欲南遁或曰虜無輜重以抄掠為資若桉兵拒守􅀔必離散從而撃之可有大功懿宗不從退據相州委弃軍資器仗甚衆契丹遂屠趙州甲午孫萬榮為奴所殺萬榮之破王孝傑也於栁城西北四百里依險築城留其老弱婦女所獲器仗資財使妹夫乙寃羽守之引精兵寇幽州恐突厥黙啜襲其後遣五人至黒沙語黙啜曰我已破王孝傑百萬之衆唐人破膽請與可汗乘勝共取幽州三人先至黙啜喜賜以緋袍二人後至黙啜怒其稽緩將殺之二人曰請一言而死黙啜問其故二人以契丹之情告黙啜乃殺前三人而賜二人緋使為郷導發兵取契丹新城殺所獲凉州都督許欽明以祭天圍新城三日克之盡俘以歸使乙寃羽馳報萬榮時萬榮方與唐兵相持軍中聞之忷懼奚人叛萬榮神兵道揔管楊􅀇基撃其前奚兵擊其後獲其將何阿小萬榮軍大潰帥輕騎數千東走前軍揔管張九節遣兵邀之於道萬榮窮蹙與其奴逃至潞水東息於林下嘆曰今欲歸唐罪已大歸突厥亦死歸新羅亦死將安之乎奴斬其首以降梟之四方館門其餘衆及奚霫皆降於突厥戊子特進武承嗣春官尚書武三思並同鳯閣鸞䑓三品辛卯制以契丹初平命河内王武懿宗婁師徳及魏州刺史狄仁傑分道安撫河北懿宗所至殘酷民有為契丹所脅從復來歸者懿宗皆以為反生刳取其膽先是何阿小嗜殺人河北人為之語曰唯此兩何殺人最多秋七月丁酉昆明内附置竇州武承嗣武三思並罷政事庚午武攸宜自幽州凱旋武懿宗奏河北百姓從賊者請盡族之左拾遺王求禮庭折之曰此屬素無武備力不勝賊茍從之以求生豈有叛國之心懿宗擁彊兵數十萬望風退走賊徒滋蔓又欲移罪於草野詿誤之人為臣不忠請先斬懿宗以謝河北懿宗不能對司刑卿杜景儉亦奏此皆脅從之人請悉原之太后從之八月丙戌納言姚璹坐事左遷益州長史以太子宫尹豆盧欽望為文昌右相鳯閣鸞臺三品九月壬辰大享通天宫赦天下改元庚戌婁師徳守納言甲寅太后謂侍臣曰頃者周興來俊臣按獄多連引朝臣云其謀反國有常法朕安敢違中間疑其不實使近臣就獄引問得其手狀皆自承服朕不以為疑自興俊臣死不復聞有反者然則前死者不有寃邪夏官侍郎姚元崇對曰自垂拱以來坐謀反死者率皆興等羅織自以為功陛下使近臣問之近臣亦不自保何敢動揺所問者若有翻覆懼遭惨毒不若速死頼天啓聖心興等伏誅臣以百口為陛下保自今内外之臣無復反者若㣲有實狀臣請受知而不告之罪太后悦曰曏時宰相皆順成其事䧟朕為淫刑之主聞卿所言深合朕心賜元崇錢千緡時人多為魏元忠訟寃者太后復召為肅政中丞元忠前後坐棄市流竄者四嘗侍宴太后問曰卿徃者數負謗何也對曰臣猶鹿耳羅織之徒欲得臣肉為羹臣安所避之冬閏十月甲寅以幽州都督狄仁傑為鸞䑓侍郎司刑卿杜景儉為鳯閣侍郎並同平章事仁傑上疏以為天生四夷皆在先王封畧之外故東距滄海西阻流沙北横大漠南阻五嶺此天所以限夷狄而隔中外也自典籍所紀聲教所及三代不能至者國家盡兼之矣詩人矜薄伐於太原羙化行於江漢則三代之遠裔皆國家之域中也若乃用武荒外邀功絶域竭府庫之實以爭不毛之地得其人不足增賦獲其土不可耕織茍求冠帶遠夷之稱不務固本安人之術此秦皇漢武之所行非五帝三王之事業也始皇窮兵極武務求廣地死者如麻致天下潰叛漢武征伐四夷百姓困窮盗賊蜂起末年悔悟息兵罷役故能為天所祐近者國家頻嵗出師所費滋廣西戍四鎮東戍安東調發日加百姓虚弊今闗東飢饉蜀漢逃亡江淮已南徴求不息人不復業相率為盗本根一揺憂患不淺其所以然者皆以爭蠻貊不毛之地乖子養蒼生之道也昔漢元納賈捐之之謀而罷朱崖郡宣帝用魏相之策而弃車師之田豈不欲慕尚虚名蓋憚勞人力也近貞觀年中克平九姓立李思摩為可汗使統諸部者蓋以夷狄叛則伐之降則撫之得推亡固存之義無遠戍勞人之役此近日之令典經邊之故事也竊謂宜立阿史那斛瑟羅為可汗委之四鎮繼髙氏絶國使守安東省軍費於遠方并甲兵於塞上使夷狄無侵侮之患則可矣何必窮其窟穴與螻蟻校長短哉但當敕邊兵謹守備遠斥􅀱聚資糧待其自致然後撃之以逸待勞則戰士力倍以主禦客則我得其便堅壁清野則寇無所得自然賊深入則有顛躓之慮淺入必無虜獲之益如此數年可使二虜不撃而服矣事雖不行識者是之鳯閣舍人李嶠知天官選事始置員外官數千人先是曆官以是月為正月以臘月為閏太后欲正月甲子朔冬至乃下制以為去晦仍見月有爽天經可以今月為閏月來月為正月聖曆元年正月甲子朔冬至太后享通天宫赦天下改元夏官侍郎宗楚客罷政事春二月乙未文昌右相同鳯閣鸞臺三品豆盧欽望罷為太子賓客武承嗣三思營求為太子數使人説太后曰自古天子未有以異姓為嗣者太后意未决狄仁傑毎從容言於太后曰文皇帝櫛風沐雨親冒鋒鏑以定天下傳之子孫大帝以二子託陛下陛下今乃欲移之它族無乃非天意乎且姑姪之與母子孰親陛下立子則千秋萬􅀊後配食太廟承繼無窮立姪則未聞姪為天子而祔姑於廟者也太后曰此朕家事卿勿預知仁傑曰王者以四海為家四海之内孰非臣妾何者不為陛下家事君為元首臣為股肱義同一體況臣備位宰相豈得不預知乎又􅂆太后召還廬陵王王方慶王及善亦􅂆之太后意稍寤它日又謂仁傑曰朕夢大鸚鵡兩翼皆折何也對曰武者陛下之姓兩翼二子也陛下起二子則兩翼振矣太后由是無立承嗣三思之意孫萬榮之圍幽州也移檄朝廷曰何不歸我廬陵王吉頊與張易之昌宗皆為控鶴監供奉易之兄弟親狎之頊從容説二人曰公兄弟貴寵如此非以徳業取之也天下側目切齒多矣不有大功於天下將何以自全竊為公憂之二人懼涕泣問計頊曰天下士庶未忘唐徳咸復思廬陵王主上春秋髙大業湏有所付武氏諸王非所屬意公何不從容勸主上立廬陵王以繋蒼生之望如此豈徒免禍亦可以長保富貴矣二人以為然承間屢為太后言之太后知謀出於頊乃召問之頊復為太后具陳利害太后意乃定三月己巳託言廬陵王有疾遣職方員外郎瑕丘徐彦伯召廬陵王及其妃諸子詣行在療疾戊子廬陵王至神都夏四月庚寅朔太后祀太廟辛丑以婁師徳充隴右諸軍大使仍檢校營田事六月甲午命淮陽王武延秀入突厥納黙啜女為妃豹韜衛大將軍閻知㣲攝春官尚書右武衛郎將楊齊莊攝司賓卿齎金帛巨億以送之延秀承嗣之子也鳯閣舍人襄陽張柬之諫曰自古未有中國親王娶夷狄女者由是忤㫖出為合州刺史秋七月鳯閣侍郎同平章事杜景儉罷為秋官尚書八月戊子武延秀至黒沙南庭突厥黙啜謂閻知㣲等曰我欲以女嫁李氏安用武氏兒邪此豈天子之子乎我突厥世受李氏恩聞李氏盡滅唯兩兒在我今將兵輔立之乃拘延秀於别所以知㣲為南面可汗言欲使之主唐民也遂發兵襲静難平狄清夷等軍静難軍使慕容􅀇崱以兵五千降之虜􅀔大振進寇媯檀等州前從閻知㣲入突厥者黙啜皆賜之五品三品之服太后悉奪之黙啜移書數朝廷曰與我蒸榖種種之不生一也金銀器皆行濫非真物二也我與使者緋紫皆奪之三也繒帛皆踈惡四也我可汗女當嫁天子兒武氏小姓門戸不敵罔冒為昏五也我為此起兵欲取河北耳監察御史裴懐古從閻知㣲入突厥黙啜欲官之不受囚將殺之逃歸抵晉陽形容羸瘁突騎譟聚以為間諜欲取其首以求功有果毅嘗為人所枉懐古按直之大呼曰裴御史也救之得全至都引見遷祠部員外郎時諸州聞突厥入寇方秋爭發民修城衛州刺史太平敬暉謂僚屬曰吾聞金湯非粟不守柰何捨収穫而事城郭乎悉罷之使歸田百姓大悦甲午鸞臺侍郎同平章事王方慶罷為麟䑓監太子太保魏宣王武承嗣恨不得為太子意怏怏戊戌病薨庚子以春官尚書武三思檢校内史狄仁傑兼納言太后命宰相各舉尚書郎一人仁傑舉其子司府丞光嗣拜地官員外郎已而稱職太后喜曰卿足繼祁奚矣通事舍人河南元行冲博學多通仁傑重之行冲數規諫仁傑且曰凡為家者必有儲蓄脯醢以適口參术以攻疾僕竊計明公之門珍味多矣行冲請備藥物之末仁傑笑曰吾藥籠中物何可一日無也行冲名澹以字行以司屬卿武重規為天兵中道大揔管右武衛將軍沙吒忠義為天兵西道揔管幽州都督下邽張仁愿為天兵東道揔管將兵三十萬以討突厥黙啜又以左羽林衛大將軍閻敬容為天兵西道後軍揔管將兵十五萬為後援癸丑黙啜寇飛狐乙夘陷定州殺刺史孫彦髙及吏民數千人九月甲子以夏官尚書武攸寧同鳯閣鸞䑓三品改突厥黙啜為斬啜黙啜使閻知㣲招諭趙州知㣲與虜連手蹋萬嵗樂於城下將軍陳令英在城上謂曰尚書位任非輕乃為虜蹋歌獨無慙乎知㣲㣲吟曰不得已萬嵗樂戊辰黙啜圍趙州長史唐般若翻城應之刺史髙叡與妻秦氏仰藥詐死虜輿之詣黙啜黙啜以金師子帶紫袍示之曰降則拜官不降則死叡顧其妻妻曰酬報國恩正在今日遂俱閉目不言經再宿虜知不可屈乃殺之虜退唐般若族誅贈叡冬官尚書謚曰節叡熲之孫也皇嗣固請遜位於廬陵王太后許之壬申立廬陵王哲為皇太子復名顯赦天下甲戌命太子為河北道元帥以討突厥先是募人月餘不滿千人及聞太子為帥應募者雲集未幾數盈五萬戊寅以狄仁傑為河北道行軍副元帥右丞宋玄爽為長史右䑓中丞崔獻為司馬左䑓中丞吉頊為監軍使時太子不行命仁傑知元帥事太后親送之藍田令薛訥仁貴之子也太后擢為左威衛將軍安東道經略將行言於太后曰太子雖立外議猶疑未定茍此命不易醜虜不足平也太后深然之王及善請太子赴外朝以慰人心從之以天官侍郎蘇味道為鳯閣侍郎同平章事味道前後在相位數嵗依阿取容嘗謂人曰處事不宜明白但摸稜持兩端可矣時人謂之蘇摸稜癸未突厥黙啜盡殺所掠趙定等州男女萬餘人自五回道去所過殺掠不可勝紀沙吒忠義等但引兵躡之不敢逼狄仁傑將兵十萬追之無所及黙啜還漠北擁兵四十萬據地萬里西北諸夷皆附之甚有輕中國之心冬十月制都下屯兵命河内王武懿宗九江王武攸歸領之癸卯以狄仁傑為河北道安撫大使時河北人為突厥所驅逼者虜退懼誅往往亡匿仁傑上䟽以為朝廷議者皆罪契丹突厥所脅從之人言其迹雖不同心則無别誠以山東近縁軍機調發傷重家道悉破或至逃亡重以官典侵漁因事而起枷杖之下痛切肌膚事迫情危不循禮義愁苦之地不樂其生有利則歸且圖賖死此乃君子之媿辱小人之常行也又諸城入偽或待天兵將士求功皆云攻得臣憂濫賞亦恐非辜以經與賊同是為惡地至有汚辱妻子劫掠貨財兵士信知不仁簪笏未能以免乃是賊平之後為惡更深且賊務招􅂝秋毫不犯今之歸正即是平人翻􅀍破傷豈不悲痛夫人猶水也壅之則為泉疏之則為川通塞隨流豈有常性今負罪之伍必不在家露宿草行潜竄山渭赦之則出不赦則狂山東羣盗縁兹聚結臣以邊塵蹔起不足為憂中土不安此為大事罪之則衆情恐懼恕之則反側自安伏願曲赦河北諸州一無所問制從之仁傑於是撫慰百姓得突厥所驅掠者悉遞還本貫散糧運以賑貧乏修郵驛以濟旋師恐諸將及使者妄求供頓乃自食疏糲禁其下無得侵擾百姓犯者必斬河北遂安以夏官侍郎姚元崇祕書少監李嶠並同平章事突厥黙啜離趙州乃縱閻知㣲使還太后命磔於天津橋南使百官共射之既乃冎其肉剉其骨夷其三族疏親有先未相識而同死者襃公叚瓉志􅀇之子也先沒於突厥突厥在趙州瓉邀楊齊莊與之俱逃齊莊畏怯不敢發瓉先歸太后賞之齊莊尋至敕河内王武懿宗鞫之懿宗以為齊莊意懐猶豫遂與閻知㣲同誅既射之如蝟氣殜殜未死乃决其腹割心投於地猶趌趌然躍不止擢田歸道為夏官侍郎甚見親委蜀州每嵗遣兵五百人戍姚州路險遠死亡者多蜀州刺史張柬之上言以為姚州本哀牢之國荒外絶域山髙水深國家開以為州未嘗得其鹽布之税甲兵之用而空竭府庫驅率平人受役蠻夷肝腦塗地臣竊為國家惜之請廢姚州以􅀠嶲州嵗時朝覲同之蕃國瀘南諸鎮亦皆廢省於瀘北置闗百姓非奉使無得交通往來疏奏不納二年正月丁夘朔告朔於通天宫壬戌以皇嗣為相王領太子右衛率甲子置控鶴監丞主簿等官率皆嬖寵之人頗用才能文學之士以參之以司衛卿張易之為控鶴監銀青光禄大夫張昌宗左䑓中丞吉頊殿中監田歸道夏官侍郎李逈秀鳯閣舍人薛稷正諫大夫臨汾貟半千皆為控鶴監内供奉稷元超之從子也半千以古無此官且所聚多輕薄之士上疏請罷之由是忤㫖左遷水部郎中臘月戊子以左䑓中丞吉頊為天官侍郎右䑓中丞魏元忠為鳯閣侍郎並同平章事文昌左丞宗楚客與弟司農卿晉卿坐􅂍賄滿萬餘緡及第舍過度楚客貶播州司馬晉卿流峯州太平公主觀其第歎曰見其居處吾輩乃虚生耳辛亥賜太子姓武氏赦天下太后生重眉成八字百官皆賀河南北置武騎團以備突厥春一月庚申夏官尚書同鳯閣鸞䑓三品武攸寧罷為冬官尚書二月己丑太后幸嵩山過緱氏謁升仙太子廟壬辰太后不豫遣給事中欒城閻朝隠禱少室山朝隠自為犧牲沐浴伏爼上請代太后命太后疾小愈厚賞之丁酉自緱氏還初吐蕃賛普器弩悉弄尚㓜論欽陵兄弟用事皆有勇略諸胡畏之欽陵居中秉政諸弟握兵分據方面賛婆常居東邊為中國患者三十餘年器弩悉弄浸長隂與大臣論巖謀誅之㑹欽陵出外賛普詐云出畋集兵執欽陵親黨二千餘人殺之遣使召欽陵兄弟欽陵等舉兵不受命賛普將兵討之欽陵兵潰自殺夏四月賛婆帥所部千餘人來降太后命右武衛鎧曹參軍郭元振與河源軍大使不䝉令卿將騎迎之以賛婆為特進歸徳王欽陵子弓仁以所統吐谷渾七千帳來降拜左玉鈐衛將軍酒泉郡公壬辰以魏元忠檢校并州長史充天兵軍大揔管以備突厥婁師徳為天兵軍副大揔管仍充隴右諸軍大使專掌懐撫吐蕃降者太后春秋髙慮身後太子與諸武不相容壬寅命太子相王太平公主與武攸暨等為誓文告天地於明堂銘之鐡劵藏于史館秋七月命建安王武攸宜留守西京代㑹稽王武攸望丙辰吐谷渾部落一千四百帳内附八月癸巳突騎施烏質勒遣其子遮弩入見遣侍御史元城解琬安撫烏質勒及十姓部落制州縣長吏非奏有敕㫖毋得擅立碑内史王及善雖無學術然清正難奪有大臣之節張易之兄弟毎侍内宴無復人臣禮及善屢奏以為不可太后不悦謂及善曰卿既髙年不宜更侍遊宴但檢校閤中可也及善因稱病謁假月餘太后不問及善歎曰豈有中書令而天子可一日不見乎事可知矣乃上疏乞骸骨太后不許庚子以及善為文昌左相太子宫尹豆盧欽望為文昌右相仍並同鳯閣鸞臺三品鸞臺侍郎同平章事楊再思罷為左臺大夫丁未相王兼檢校安北大都護以天官侍郎陸元方為鸞臺侍郎同平章事納言隴右諸軍大使婁師徳薨師徳在河隴前後四十餘年㳟勤不怠民夷安之性沈厚寛恕狄仁傑之入相也師徳實薦之而仁傑不知意頗輕師徳數擠之於外太后覺之嘗問仁傑曰師徳賢乎對曰為將能謹守邊陲賢則臣不知又曰師徳知人乎對曰臣嘗同僚未聞其知人也太后曰朕之知卿乃師徳所薦也亦可謂知人矣仁傑既出歎曰婁公盛徳我為其所包容久矣吾不得窺其際也是時羅織紛紜師徳乆為將相獨能以功名終人以是重之戊申以武三思為内史九月乙亥太后幸福昌戊寅還神都庚子邢貞公王及善薨河溢漂濟源百姓廬舍千餘家冬十月丁亥論賛婆至都太后寵待賞賜甚厚以為右衛大將軍使將其衆守洪源谷太子相王諸子復出閤太后自稱制以來多以武氏諸王及駙馬都尉為成均祭酒博士助敎亦多非儒士又因郊丘明堂拜洛封嵩取􅀪文國子生為齋郎因得選補由是學生不復習業二十年間學校殆廢而曏時酷吏所誣䧟者其親友流離未獲原宥鳯閣舍人韋嗣立上疏以為時俗浸輕儒學先王之道弛廢不講宜令王公以下子弟皆入國學不聽以它岐仕進又自楊豫以來制獄漸繁酷吏乗間專欲殺人以求進頼陛下聖明周丘王來相繼誅殛朝野慶泰若再覩陽和至如仁傑元忠往遭按鞫亦皆自誣非陛下明察則以為葅醢矣今陛下升而用之皆為良輔何乃前非而後是哉誠由枉陷與甄明耳臣恐曏之負寃得罪者甚衆亦皆如是伏望陛下􅀪天地之仁廣雷雨之施自垂拱以來罪無輕重一皆昭洗死者追復官爵生者聽還鄉里如此則天下皆知昔之枉濫非陛下之意皆獄吏之辜幽明歡欣感通和氣太后不能從嗣立承慶之異母弟也母王氏遇承慶甚酷毎杖承慶嗣立必解衣請代母不許輙私自杖母乃為之漸寛承慶為鳯閣舍人以疾去職嗣立時為萊蕪令太后召謂曰卿父嘗言臣有兩兒堪事陛下卿兄弟在官誠如父言朕今以卿代兄更不用它人即日拜鳯閣舍人是嵗突厥黙啜立其弟咄悉匐為左廂察骨篤禄子黙矩為右廂察各主兵二萬餘人其子匐俱為小可汗位在兩察上主處木昆等十姓兵四萬餘人又號為拓西可汗久視元年正月戊寅内史武三思罷為特進太子少保天官侍郎平章事吉頊貶安固尉太后以頊有幹略故委以腹心頊與武懿宗爭趙州之功於太后前頊魁岸辯口懿宗短小傴僂頊視懿宗聲氣陵厲太后由是不悦曰頊在朕前猶卑我諸武况異時詎可倚邪它日頊奏事方援古引今太后怒曰卿所言朕飫聞之無多言太宗有馬名師子騘肥逸無能調馭者朕為宫女侍側言於太宗曰妾能制之然湏三物一鐡鞭二鐡檛三匕首鐡鞭撃之不服則以檛檛其首又不服則以􅍰首斷其喉太宗壯朕之志今日卿豈足汚朕􅍰首邪頊惶懼流汗拜伏求生乃止諸武怨其附太子共發其弟冒官事由是坐貶辭日得召見涕泣言曰臣今遠離闕庭永無再見之期願陳一言太后命之坐問之頊曰合水土為泥有爭乎太后曰無之又曰分半為佛半為天尊有爭乎曰有爭矣頊頓首曰宗室外戚各當其分則天下安今太子已立而外戚猶為王此陛下驅之使它日必爭兩不得安也太后曰朕亦知之然業已如是不可如何臘月辛巳立故太孫重潤為邵王其弟重茂為北海王太后問鸞臺侍郎同平章事陸元方以外事對曰臣備位宰相有大事不敢不以聞人間細事不足煩聖聽由是忤㫖庚寅罷為司禮卿元方為人清謹再為宰相太后每有遷除多訪之元方密封以進未嘗漏露臨終悉取奏藳焚之曰吾於人多隂徳子孫其未衰乎以西突厥竭忠事主可汗斛瑟羅為平西軍大揔管鎮碎葉丁酉以狄仁傑為内史庚子以文昌左丞韋巨源為納言乙巳太后幸嵩山春一月丁卯幸汝州之温湯戊寅遷神都作三陽宫於告成之石淙二月乙未同鳯閣鸞臺三品豆盧欽望罷為太子賓客三月以吐谷渾青海王宣超為烏地也抜勤忠可汗夏四月戊申太后幸三陽宫避暑有胡僧邀車駕觀葬舍利太后許之狄仁傑跪於馬前曰佛者戎狄之神不足以屈天下之主彼胡僧詭譎直欲邀致萬乗以惑遠近之人耳山路險狹不容侍衛非萬乗所宜臨也太后中道而還曰以成吾直臣之氣五月己酉朔日有食之太后使洪州僧胡超合長生藥三年而成所費巨萬太后服之疾小瘳癸丑赦天下改元久視去天冊金輪大聖之號六月改控鶴為奉宸府以張易之為奉宸令太后毎内殿曲宴輙引諸武易之及弟秘書監昌宗飲博嘲謔太后欲掩其迹乃命易之昌宗與文學之士李嶠等修三敎珠英於内殿武三思奏昌宗乃王子晉後身太后命昌宗衣羽衣吹笙乘木鶴於庭中文士皆賦詩以羙之太后又多選羙少年為奉宸内供奉右補闕朱敬則諫曰陛下内寵有易之昌宗足矣近聞右監門衛長史侯祥等明自媒衒醜慢不恥求為奉宸内供奉無禮無儀溢于朝聽臣職在諫諍不敢不奏太后勞之曰非卿直言朕不知此賜綵百叚易之昌宗競以豪侈相勝弟昌儀為洛陽令請屬無不從嘗早朝有選人姓薛以金五十兩并狀邀其馬而賂之昌儀受金至朝堂以狀授天官侍郎張錫數日錫失其狀以問昌儀昌儀罵曰不了事人我亦不記但姓薛者即與之錫懼退索在銓姓薛者六十餘人悉留注官錫文瓘之兄子也初契丹將李楷固善用䌈索及騎射舞槊毎陷陳如鶻入烏羣所向披靡黄麞之戰張􅀇遇麻仁節皆為所䌈又有駱務整者亦為契丹將屢敗唐兵及孫萬榮死二人來降有司責其後至奏請族之狄仁傑曰楷固等並驍勇絶倫能盡力於所事必能盡力於我若撫之以徳皆為我用矣奏請赦之所親皆止之仁傑曰茍利於國豈為身謀太后用其言赦之又請與之官太后以楷固為左玉鈐衛將軍務整為右武威衛將軍使將兵擊契丹餘黨悉平之資治通鑑卷第二百六
