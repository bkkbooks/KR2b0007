body:
  text: 漢主病篤命丞相亮輔太子以尚書令李嚴為副漢主謂亮曰君才十倍曹丕必能安國終定大事若嗣子可輔輔之如其不才君可自取亮涕泣曰臣敢不竭股肱之力効忠貞之節繼之以死漢主又為詔敕太子曰人五十不稱夭吾年已六十有餘何所復恨但以卿兄弟為念耳勉之勉之勿以惡小而為之勿以善小而不為惟賢惟德可以服人汝父德薄不足効也汝與丞相從事事之如父夏四月癸巳漢主殂於永安謚曰昭烈丞相亮奉喪還成都以李嚴為中都䕶留鎮永安五月太子禪即位時年十七尊皇后曰皇太后大赦改元建興封丞相亮為武鄉侯領益州牧政事無巨細咸決於亮亮乃約官職脩灋制發教與羣下曰夫參署者集衆思廣忠益也若逺小嫌難相違覆曠闕損矣違覆而得中猶棄敝蹻而獲珠玉然人心苦不能盡惟徐元直處兹不惑又董㓜宰參署七年事有不至至于十反來相啟告苟能慕元直之十一㓜宰之勤渠有忠於國則亮可以少過矣又曰昔初交州平屢聞得失後交元直勤見啟誨前參事於幼宰毎言則盡後從事於偉度數有諫止雖資性鄙暗不能悉納然與此四子終始好合亦足以明其不疑於直言也偉度者亮主簿義陽胡濟也亮嘗自校簿書主簿楊顒直入諫曰為治有體上下不可相侵請為明公以作家譬之今有人使奴執耕稼婢典炊爨鷄主司晨犬主吠盗牛負重載馬渉逺路私業無曠所求皆足雍容髙枕飲食而已忽一旦盡欲以身親其役不復付任勞其體力為此碎務形疲神困終無一成豈其智之不如奴婢鷄狗哉失為家主之灋也是故古人稱坐而論道謂之王公作而行之謂之士大夫故丙吉不問橫道死人而憂牛喘陳平不肯知錢榖之數云自有主者彼誠達於位分之體也今明公為治乃躬自校簿書流汗終日不亦勞乎亮謝之及顒卒亮垂泣三日六月甲戍任城威王彰卒甲申魏夀肅侯賈詡卒大水吳賀齊襲蘄春虜太守晉宗以歸初益州郡耆帥雍闓殺太守正昻因士爕以求附於吳又執太守成都張裔以與吳吳以闓為永昌太守永昌功曹吕凱府丞王伉率吏士閉境拒守闓不能進使郡人孟獲誘扇諸夷諸夷皆從之牂柯太守朱襃越嶲夷王髙定皆叛應闓諸葛亮以新遭大喪皆撫而不討務農殖榖閉闗息民民安食足而後用之秋八月丁卯以廷尉鍾繇為太尉治書執灋髙柔代為廷尉是時三公無事又希與朝政柔上䟽曰公輔之臣皆國之棟梁民所具瞻而置之三事不使知政遂各偃息養髙鮮有進納誠非朝廷崇用大臣之義大臣獻可替否之謂也古者刑政有疑輙議於槐棘之下自今之後朝有疑議及刑獄大事宜數以咨訪三公三公朝朔望之日又可特延入講論得失博盡事情庶有補起天聽光益大化帝嘉納焉辛未帝校獵于滎陽遂東巡九月甲辰如許昌漢尚書義陽鄧芝言於諸葛亮曰今主上㓜弱初即尊位宜遣大使重申吳好亮曰吾思之久矣未得其人耳今日始得之芝問其人為誰亮曰即使君也乃遣芝以中郎將脩好於吳冬十月芝至吳時吳王猶未與魏絶狐疑不時見芝芝乃自表請見曰臣今來亦欲為吳非但為蜀也吳王見之曰孤誠願與蜀和親然恐蜀主㓜弱國小埶偪為魏所乗不自保全耳芝對曰吳蜀二國四州之地大王命世之英諸葛亮亦一時之傑也蜀有重險之固吳有三江之阻合此二長共為脣齒進可并兼天下退可鼎足而立此理之自然也大王今若委質於魏魏必上望大王之入朝下求太子之內侍若不從命則奉辭伐叛蜀亦順流見可而進如此江南之地非復大王之有也吳王黙然良久曰君言是也遂絶魏専與漢連和是嵗漢主立妃張氏為皇后五年春二月帝自許昌還洛陽初平以來學道廢墜夏四月初立太學置博士依漢制設五經課試之灋吳王使輔義中郎將吳郡張温聘于漢自是吳蜀信使不絶時事所宜吳主常令陸遜語諸葛亮又刻印置遜所王毎與漢主及諸葛亮書常過示遜輕重可否有所不安便令改定以印封之漢復遣鄧芝聘于吳吳王謂之曰若天下太平二主分治不亦樂乎芝對曰天無二日土無二王如并魏之後大王未深識天命君各茂其德臣各盡其忠將提枹鼓則戰爭方始耳吳王大笑曰君之誠􅅃乃當爾邪秋七月帝東巡如許昌帝欲大興軍伐吳侍中辛毗諫曰方今天下新定土廣民稀而欲用之臣誠未見其利也先帝屢起銳師臨江而旋今六軍不増於故而復循之此未易也今日之計莫若養民屯田十年然後用之則役不再舉矣帝曰如卿意更當以虜遺子孫邪對曰昔周文王以紂遺武王惟知時也帝不從留尚書僕射司馬懿鎮許昌八月為水軍親御龍舟循蔡潁浮淮如夀春九月至廣陵吳安東將軍徐盛建計植木衣葦為疑城假樓自石頭至于江乗聮緜相接數百里一夕而成又大浮舟艦於江時江水盛長帝臨望歎曰魏雖有武騎千羣無所用之未可圖也帝御龍舟㑹暴風漂蕩幾至覆沒帝問羣臣權當自來否咸曰陛下親征權恐怖必舉國而應又不敢以大衆委之臣下必當自來劉曄曰彼謂陛下欲以萬乗之重牽已而超越江湖者在於别將必勒兵待事未有進退也大駕停住積日吳王不至帝乃旋師是時曹休表得降賊辭孫權已在濡須口中領軍衛臻曰權恃長江未敢亢衡此必畏怖偽辭耳考核降者果守將所作也吳張温少以俊才有盛名顧雍以為當今無輩諸葛亮亦重之温薦引同郡曁豔為選部尚書豔好為清議彈射百僚覈奏三署率皆貶髙就下降損數等其守故者十未能一其居位貪鄙志節汙卑者皆以為軍吏置營府以處之多揚人闇昧之失以顯其謫同郡陸遜遜弟瑁及侍御史朱據皆諫止之瑁與豔書曰夫聖人嘉善矜愚忘過記功以成美化加今王業始建將一大統此乃漢髙棄瑕録用之時也若令善惡異流貴汝潁月旦之評誠可以厲俗明教然恐未易行也宜逺模仲尼之汎愛近則郭泰之容濟庶有益於大道也據謂豔曰天下未定舉清厲濁足以沮勸若一時貶黜懼有後咎豔皆不聽於是怨憤盈路爭言豔及選曹郎徐彪専用私情憎愛不由公理豔彪皆坐自殺温素與豔彪同意亦坐斥還本郡以給厮吏卒於家始温方盛用事餘姚虞俊歎曰張恵恕才多智少華而不實怨之所聚有覆家之禍吾見其兆矣無幾何而敗冬十月帝還許昌十一月戊申晦日有食之鮮卑軻比能誘步度根兄扶羅韓殺之步度根由是怨軻比能更相攻擊步度根部衆稍弱將其衆萬餘落保太原鴈門是歳詣闕貢獻而軻比能衆遂彊盛出擊東部大人素利䕶烏丸校尉田豫乗虚掎其後軻比能使别帥􅃈奴拒豫豫擊破之軻比能由是􅂝貳數為邊寇幽并苦之六年春二月詔以陳羣為鎮軍大將軍隨車駕董督衆軍録行尚書事司馬懿為撫軍大將軍留許昌督後臺文書三月帝行如召陵通討虜渠乙巳還許昌并州刺史梁習討軻比能大破之漢諸葛亮率衆討雍闓等參軍馬謖送之數十里亮曰雖共謀之歷年今可更恵良規謖曰南中恃其險逺不服久矣雖今日破之明日復反耳今公方傾國北伐以事彊賊彼知官埶内虚其叛亦速若殄盡遺類以除後患既非仁者之情且又不可倉卒也夫用兵之道攻心為上攻城為下心戰為上兵戰為下願公服其心而已亮納其言謖良之弟也辛未帝以舟師復征吳羣臣大議宫正鮑勛諫曰王師屢征而未有所克者蓋以吳蜀脣齒相依慿阻山水有難拔之埶故也往年龍舟飄蕩隔在南岸聖躬蹈危臣下破膽此時宗廟幾至傾覆為百世之戒今又勞兵襲逺日費千金中國虚耗令黠虜玩威臣竊以為不可帝怒左遷勛為治書執灋勛信之子也夏五月戊申帝如譙吳丞相北海孫劭卒初吳當置丞相衆議歸張昭吳王曰方今多事職大者責重非所以優之也及邵卒百僚復舉昭吳王曰孤豈為子布有愛乎領丞相事煩而此公性剛所言不從怨咎將興非所以益之也六月以太常顧雍為丞相平尚書事雍為人寡言舉動時當吳王嘗歎曰顧君不言言必有中至飲宴歡樂之際左右恐有酒失而雍必見之是以不敢肆情吳王亦曰顧公在坐使人不樂其見憚如此初領尚書令封陽遂鄉侯拜侯還寺而家人不知後聞乃驚及為相其所選用文武將吏各隨能所任心無適莫時訪逮民間及政職所宜輙密以聞若見納用則歸之於上不用終不宣泄吳王以此重之然於公朝有所陳及辭色雖順而所執者正軍國得失自非面見口未嘗言王常令中書郎詣雍有所咨訪若合雍意事可施行即與相反覆究而論之爲設酒食如不合意雍即正色改容黙然不言無所施設郎退告王王曰顧公歡恱是事合宜也其不言者是事未平也孤當重思之江邊諸將各欲立功自效多陳便宜有所掩襲王以訪雍雍曰臣聞兵灋戒於小利此等所陳欲邀功名而爲其身非爲國也陛下宜禁制茍不足以曜威損敵所不宜聽也王從之利成郡兵蔡方等反殺太守徐質推郡人唐咨爲主詔屯騎校尉任福等討平之咨自海道亡入吳吳人以爲將軍秋七月立皇子鑒爲東武陽王漢諸葛亮至南中所在戰捷亮由越嶲入斬雍闓及髙定使庲降督益州李恢由益州入門下督巴西馬忠由牂柯入擊破諸縣復與亮合孟獲收闓餘衆以拒亮獲素為夷漢所服亮募生致之旣得使觀於營陳之間問曰此軍何如獲曰向者不知虚實故敗今䝉賜觀營陳若秪如此即定易勝耳亮笑縱使更戰七縱七禽而亮猶遣獲獲止不去曰公天威也南人不復反矣亮遂至滇地益州永昌牂柯越嶲四郡皆平亮即其渠率而用之或以諫亮亮曰若留外人則當留兵兵留則無所食一不易也加夷新傷破父兄死喪留外人而無兵者必成禍患二不易也又夷累有廢殺之罪自嫌釁重若留外人終不相信三不易也今吾欲使不留兵不運糧而綱紀粗定夷漢粗安故耳亮於是悉收其俊傑孟獲等以為官屬出其金銀丹漆耕牛戰馬以給軍國之用自是終亮之世夷不復反八月帝以舟師自譙循渦入淮尚書蔣濟表言水道難通帝不從冬十月如廣陵故城臨江觀兵戎卒十餘萬旌旗數百里有渡江之志吳人嚴兵固守時天寒氷舟不得入江帝見波濤洶涌歎曰嗟乎固天所以限南北也遂歸孫韶遣將髙夀等率敢死之士五百人於徑路夜要帝帝大驚夀等獲副車羽蓋以還於是戰船數千皆滯不得行議者欲就留兵屯田蔣濟以為東近湖北臨淮若水盛時賊易為寇不可安屯帝從之車駕即發還到精湖水稍盡盡留船付濟船連延在數百里中濟更鑿地作四五道蹴船令聚豫作土豚遏斷湖水皆引後船一時開遏入淮中乃得還十一月東武陽王鑒薨十二月吳番陽賊彭綺攻沒郡縣衆數萬人七年春正月壬子帝還洛陽謂蔣濟曰事不可不曉吾前決謂分半燒船於山陽湖中卿於後致之略與吾俱至譙又每得所陳實入吾意自今討賊計畫善思論之漢丞相亮欲出軍漢中前將軍李嚴當知後事移屯江州留䕶軍陳到駐永安而統屬於嚴吳陸遜以所在少榖表令諸將増廣農畒吳主報曰甚善令孤父子親受田車中八牛以為四耦雖未及古人亦欲與衆均等其勞也帝之為太子也郭夫人弟有罪魏郡西部都尉鮑勛治之太子請不能得由是恨勛及即位勛數直諫帝益忿之帝伐吳還屯陳留界勛為治書執灋太守孫邕見出過勛時營壘未成但立摽埓邕邪行不從正道軍營令史劉曜欲推之勛以塹壘未成解止不舉帝聞之詔曰勛指鹿作馬収付廷尉廷尉灋議正刑五嵗三官駮依律罰金二斤帝大怒曰勛無活分而汝等欲縱之収三官已下付刺姦當令十䑕同穴鍾繇華歆陳羣辛毗髙柔衛臻等並表勛父信有功於太祖求請勛罪帝不許髙柔固執不從詔命帝怒甚召柔詣臺遣使者承指至廷尉誅勛勛死乃遣柔還寺票騎將軍都陽侯曹洪家富而性吝嗇帝在東宫嘗從洪貸絹百匹不稱意恨之遂以舍客犯灋下獄當死羣臣並救莫能得卞太后責怒帝曰梁沛之間非子廉無有今日又謂郭后曰令曹洪今日死吾明日敕帝廢后矣於是郭后泣涕屢請乃得免宫削爵土初郭后無子帝使母養平原王叡以叡母甄夫人被誅故未建為嗣叡事后甚謹后亦愛之帝與叡獵見子母鹿帝親射殺其母命叡射其子叡泣曰陛下已殺其母臣不忍復殺其子帝即放弓矢為之惻然夏五月帝疾篤乃立叡為太子丙辰召中軍大將軍曹真鎮軍大將軍陳羣撫軍大將軍司馬懿並受遺詔輔政丁巳帝殂􅊨陳夀評曰文帝天資文藻下筆成章博聞彊識才藝兼該若加之曠大之度勵以公平之誠邁志存道克廣德心則古之賢主何逺之有哉太子即皇帝位尊皇太后曰太皇太后皇后曰皇太后初明帝在東宫不交朝臣不問政事惟潜思書籍即位之後羣下想聞風采居數日獨見侍中劉曄語盡日衆人側聽曄旣出問何如曰秦始皇漢孝武之儔才具微不及耳帝初蒞政陳羣上䟽曰夫臣下雷同是非相蔽國之大患也若不和睦則有讎黨有讎黨則毁譽無端毁譽無端則真偽失實此皆不可不深察也癸未追謚甄夫人曰文昭皇后壬辰立皇弟蕤為陽平王六月戊寅葬文帝于首陽陵吳王聞魏有大喪秋八月自將攻江夏郡太守文聘堅守朝議欲發兵救之帝曰權習水戰所以敢下船陸攻者冀掩不僃也今已與聘相拒夫攻守埶倍終不敢久也先是朝廷遣治書侍御史荀禹慰勞邊方禹到江是發所經縣兵及所從步騎千人乗山舉火吳王遁走辛巳立皇子囧為清河王吳左將軍諸葛瑾等冦襄陽司馬懿擊破之斬其部將張霸曹真又破其别將於尋陽吳丹陽吳㑹山民復為冦攻沒屬縣吳王分三郡險地為東安郡以綏南將軍全琮領太守琮至明賞罰招誘降附數年得萬餘人吳王召琮還牛渚罷東安郡冬十月清河王冏卒吳陸遜陳便宜勸吳王以施德緩刑寛賦息調又云忠讜之言不能極陳求容小臣數以利聞王報曰書載予違汝弼而云不敢極陳何得爲忠讜哉於是令有司盡寫科條使郎中禇逢齎以就遜及諸葛瑾意所不安令損益之十二月以鍾繇爲太傅曹休爲大司馬都督揚州如故曹真爲大將軍華歆爲太尉王朗爲司徒陳羣爲司空司馬懿爲票騎大將軍歆讓位於管寧帝不許徵寧爲光禄大夫敕青州給安車吏從以禮發遣寧復不至是嵗吳交趾太守士爕卒吳王以爕子徽爲安逺將軍領九真太守以校尉陳時代爕交州刺史吕岱以交趾絶逺表分海􅀯三郡爲交州以將軍戴良爲刺史海東四郡爲廣州岱自爲刺史遣良與時􅀯入而徽自署交趾太守發宗兵拒良良留合浦交趾􅁊鄰爕舉吏也叩頭諫徽使迎良徽怒笞殺鄰鄰兄治合宗兵擊不克吕岱上䟽請討徽督兵三千人晨夜浮海而往或謂岱曰徽藉累世之恩為一州所附未易輕也岱曰今徽雖懷逆計未虞吾之卒至若我潛軍輕舉掩其無僃破之必也稽留不速使得生心嬰城固守七郡百蠻雲合響應雖有智者誰能圖之遂行過合浦與良俱進岱以爕弟子輔為師友從事遣往說徽徽率其兄弟六人出降岱皆斬之孫盛論曰夫柔逺能邇莫善於信吕岱師友士輔使通信誓徽兄弟肉袒推心委命岱因滅之以要功利君子是以知吕氏之祚不延者也徽大將甘醴及􅁊治率吏民共攻岱岱奮擊破之於是除廣州復為交州如故岱進討九真斬獲以萬數又遣從事􅀯宣威命曁徼外扶􅀯林邑堂明諸王各遣使入貢於吳烈祖明皇帝上之上太和元年春吴解煩督胡綜番陽太守周魴擊彭綺生獲之初綺自言舉義兵為魏討吳議者以為因此伐吳必有所克帝以問中書令太原孫資資曰番陽宗人前後數有舉義者衆弱謀淺旋輙乖散昔文皇帝嘗宻論賊形埶言洞浦殺萬人得船千數數日間船人復㑹江陵被圍歷月權裁以千數百兵住東門而其土地無崩解者是其灋禁上下相維之明驗也以此推綺懼未能為權腹心大疾也至是綺果敗亡二月立文昭皇后寢園於鄴王朗往視園陵見百姓多貧困而帝方營脩宫室朗上䟽諫曰昔大禹欲拯天下之大患故先卑其宫室儉其衣食句踐欲廣其禦兒之疆亦約其身以及家儉其家以施國漢之文景欲恢􅀪祖業故割意於百金之臺昭儉於弋綈之服霍去病中才之將猶以匈奴未滅不治第宅明䘏逺者略近事外者簡內也今建始之前足用列朝㑹崇華之後足用序內官華林天淵足用展游宴若且先成象魏脩城池其餘一切湏豊年專以勤耕農為務習戎僃為事則民充兵彊而寇戎賔服矣三月蜀丞相亮率諸軍北駐漢中使長史張裔參軍蔣琬統留府事臨發上䟽曰先帝創業未半而中道崩殂今天下三分益州疲敝此誠危急存亡之秋也然侍衛之臣不懈於內忠志之士忘身於外者蓋追先帝之殊遇欲報之於陛下也誠宜開張聖聽以光先帝遺德恢􅀪志士之氣不宜妄自菲薄引喻失義以塞忠諫之路也宫中府中俱為一體陟罰臧否不宜異同若有作姦犯科及為忠善者宜付有司論其刑賞以昭陛下平明之理不宜偏私使内外異灋也侍中侍郎郭攸之費禕董允等此皆良實志慮忠純是以先帝簡拔以遺陛下愚以為宫中之事事無大小悉以咨之然後施行必能裨補闕漏有所廣益將軍向寵性行淑均曉暢軍事試用於昔日先帝稱之曰能是以衆議舉寵為督愚以為營中之事悉以咨之必能使行陳和睦優劣得所親賢臣逺小人此先漢所以興隆也親小人逺賢臣此後漢所以傾頽也先帝在時毎與臣論此事未嘗不歎息痛恨於栢靈也侍中尚書長史參軍此悉端良死節之臣願陛下親之信之則漢室之隆可計日而待也臣本布衣躬耕南陽茍全性命於亂世不求聞達於諸矦先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中諮臣以當世之事由是感激遂許先帝以驅馳後值傾覆受任於敗軍之際奉命於危難之間爾來二十有一年矣先帝知臣謹慎故臨崩寄臣以大事也受命以來夙夜憂歎恐託付不效以傷先帝之明故五月渡瀘深入不毛今南方已定兵甲已足當奬率三軍北定中原庶竭駑鈍攘除姦凶興復漢室還于舊都此臣所以報先帝而忠陛下之職分也至於斟酌損益進盡忠言則攸之禕允之任也願陛下託臣以討賊興復之效不效則治臣之罪以告先帝之靈責攸之禕允等之慢以彰其咎陛下亦宜自謀以諮諏善道察納雅言深追先帝遺詔臣不勝受恩感激今當逺離臨表涕零不知所言遂行屯于沔北陽平石馬亮辟廣漢太守姚伷為掾伷並進文武之士亮稱之曰忠益者莫大於進人進人者各務其所尚今姚掾並存剛柔以廣文武之用可謂博雅矣願諸掾各希此事以屬其望帝聞諸葛亮在漢中欲大發兵就攻之以問散騎常侍孫資資曰昔武皇帝征南鄭取張魯陽平之役危而後濟又自往拔出夏侯淵軍數言南鄭直為天獄中斜谷道為五百里石穴耳言其深險喜出淵軍之辭也又武皇帝聖於用兵察蜀賊棲於山巖視吳虜竄於江湖皆橈而避之不責將士之力不爭一朝之忿誠所謂見勝而戰知難而退也今若進軍就南鄭討亮道既險阻計用精兵及轉運鎮守南方四州遏禦水賊凡用十五六萬人必當復更有所發興天下騷動費力廣大此誠陛下所宜深慮夫守戰之力力役參倍但以今日見兵分命大將據諸要險威足以震懾彊冦鎮靜疆埸將士虎睡百姓無事數年之間中國日盛吳蜀二虜必自罷敝帝乃止初文帝罷五銖錢使以榖帛為用人閒巧偽漸多競濕榖以要利薄絹以為市雖處以嚴刑不能禁也司馬芝等舉朝大議以為用錢非徒豐國亦所以省刑今不若更鑄五銖為便夏四月乙亥復行五銖錢甲申初營宗廟於洛陽六月以司馬懿都督荆豫州諸軍事率所領鎮宛冬十二月立貴嬪河内毛氏為皇后初帝為平原王納河内虞氏為妃及即位虞氏不得立為后太皇卞太后慰勉焉虞氏曰曹氏自好立賤未有能以義舉者也然后職内事君聽外政其道相由而成茍不能以善始未有能令終者也殆必由此亡國喪祀矣虞氏遂絀還鄴宫初太祖世祖皆議復肉刑以軍事不果及帝即位太傅鍾繇上言宜如孝景之令其當棄市欲斬右趾者許之其黥劓左趾宫刑者自如孝文易以髠笞可以嵗生三千人詔公卿已下議司徒朗以為肉刑不用已來歷年數百今復行之恐所減之文未彰於萬民之目而肉刑之問已宣於宼讎之耳非所以來逺人也今可桉繇所欲輕之死罪使減死髠刑嫌其輕者可倍其居作之嵗數内有以生易死不訾之恩外無以刖易􅎂駭耳之聲議者百餘人與朗同者多帝以吳蜀未平且寑是嵗吳昭武將軍韓當卒其子綜淫亂不軌懼得罪閏月將其家屬部曲來犇初孟達既為文帝所寵又與􅁊階夏侯尚親善及文帝殂階尚皆卒達心不自安諸葛亮聞而誘之達數與通書隂許歸蜀達與魏興太守申儀有隙儀密表告之達聞之惶懼欲舉兵叛司馬懿以書慰解之達猶豫未决懿乃潛軍進討諸將言達與吳漢交通宜觀望而後動懿曰達無信義此其相疑之時也當及其未定促决之乃倍道兼行八日到其城下吳漢各遣偏將向西城安橋木䦨塞以救達懿分諸將以距之初達與亮書曰宛去洛八百里去吾一千二百里聞吾舉事當表上天子比相反覆一月間也則吾城已固諸軍足辦吾所在深險司馬公必不自來諸將來吾無患矣及兵到逹又告亮曰吾舉事八日而兵至城下何其神速也資治通鑑巻七十
