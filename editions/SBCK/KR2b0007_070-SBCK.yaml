front:
  text: 行師孰與􅁊邪兵灋所以稱客倍而主人半者謂俱在平原無城隍之守又謂士卒勇怯齊等故耳今仁既非智勇加其士卒甚怯又千里步渉人馬罷困桓與諸君共據髙城南臨大江北背山陵以逸待勞為主制客此百戰百勝之埶雖曹丕自來尚不足憂況仁等邪􅁊乃偃旗鼔外示虚弱以誘致仁仁遣其子泰攻濡須城分遣將軍常雕王􅀟等乗油船别襲中洲中洲者桓部曲妻子所在也蔣濟曰賊據西岸列船上流而兵入洲中是為自內地獄危亡之道也仁不從自將萬人留橐皐為泰等後援􅁊遣别將擊彫等而身自拒泰泰燒營退桓遂斬常彫生虜王雙臨陳殺溺死者千餘人初吕䝉病篤吳王問曰卿如不起誰可代者䝉對曰朱然膽守有餘愚以為可任朱然者九眞太守朱治姊子也本姓施氏治養以為子時為昭武將軍䝉卒吳王假然節鎮江陵及曹眞等圍江陵破孫盛吳王遣諸葛瑾等將兵往解圍夏矦尚擊却之江陵中外斷絶城中兵多腫病堪戰者裁五千人眞等起土山鑿地道立樓櫓臨城弓矢雨注將士皆失色然晏如無恐意方厲吏士伺間隙攻破魏兩屯魏兵圍然凡六月江陵令姚泰領兵僃城北門見外兵盛城中人少榖食且盡懼不濟謀為內應然覺而殺之時江水淺陿夏侯尚欲乗船將步騎入渚中安屯作浮橋南北往來議者多以為城必可拔董昭上䟽曰武皇帝智勇過人而用兵畏敵不敢輕之若此也夫兵好進惡退常然之數平地無險猶尚艱難就當深入還道宜利兵有進退不可如意今屯渚中至深也浮橋而濟至危也一道而行至陿也三者兵家所忌而今行之賊頻攻橋誤有漏失渚中精銳非魏之有將轉化為吳矣臣私慼之忘寢與食而議者怡然不以為憂豈不惑哉加江水向長一旦暴増何以防禦就不破賊尚當自完奈何乗危不以為懼惟陛下察之帝即詔尚等促出吳人兩頭並前魏兵一道引去不時得泄僅而獲濟吳將潘璋已作荻筏欲以燒浮橋㑹尚退而止後旬日江水大漲帝謂董昭曰君論此事何其審也㑹天大疫帝悉召諸軍還三月丙申車駕還洛陽初帝問賈詡曰吾欲伐不從命以一天下吳蜀何先對曰攻取者先兵權建本者尚德化陛下應期受禪撫臨率土若綏之以文德而俟其變則平之不難矣吳蜀雖蕞爾小國依山阻水劉僃有雄才諸葛亮善治國孫權識虚實陸遜見兵埶據險守要汎舟江湖皆難卒謀也用兵之道先勝後戰量敵論將故舉無遺䇿臣竊料羣臣無僃權對雖以天威臨之未見萬全之埶也昔舜舞干戚而有苗服臣以為當今宜先文後武帝不納軍竟無功丁未陳忠侯曹仁卒初黃元為諸葛亮所不善聞漢主疾病懼有後患故舉郡反燒臨卭城時亮東行省疾成都單虚元益無所憚益州治中從事楊洪啓太子遣將軍陳曶鄭綽討元衆議以為元若不能圍成都當由越嶲據南中洪曰元素性凶暴無他恩信何能辦此不過乗水東下冀主上平安面縛歸死如其有異犇吳求活耳但敕曶綽於南安峽口邀遮即便得矣元軍敗果順江東下曶綽生獲斬之
