body:
  text: 臣司馬光奉勑編集晉紀二十章閹茂凡二年起著雍涒灘盡上孝宗穆皇帝上之下永和四年夏四月林邑寇九真殺士民付八九趙秦公韜有寵於趙王虎欲立之以太子宣長猶豫未決宣甞忤㫖虎怒曰悔不立韜也韜由是益驕造堂於太尉府號曰宣光殿梁長九丈宣見而大怒斬匠截梁而去韜怒増之至十丈宣聞之謂所幸楊柸牟成趙生曰凶豎傲愎敢爾汝能殺之吾入西宫當盡以韜之國邑分封汝等韜死主上必臨䘮吾因行大事蔑不濟矣柸等許諾秋八月韜夜與僚屬宴於東明觀因宿於佛精舎宣使楊柸等縁獼猴梯而入殺韜置其刀箭而去旦日宣奏之虎哀驚氣絶乆之方蘇將出臨其䘮司空李農諫曰害秦公者未知何人賊在京師鑾輿不宜輕出虎乃止嚴兵發哀於太武殿宣往臨韜䘮不哭直言呵呵使舉衾觀尸大笑而去收大將軍記室參軍鄭靖尹武等將委之以罪虎疑宣殺韜欲召之恐其不入乃詐言其母杜后哀過危惙宣不謂見疑入朝中宫因留之建興人史科知其謀告之虎使収楊柸牟成皆亡去獲趙生詰之具服虎悲怒彌甚囚宣於席庫以鐵環穿其頷而鏁之取殺韜刀箭䑛其血哀號震動宫殿佛圖澄曰宣韜皆陛下之子今為韜殺宣是重禍也陛下􅀂加慈恕福祚猶長􅀂必誅之宣當為彗星下掃鄴宫虎不從積柴於鄴北樹標其上標末置鹿盧穿之以䋲倚梯柴積送宣其下使韜所幸宦者郝稚劉霸㧞其髪抽其舌牽之登梯郝稚以繩貫其頷鹿盧絞上劉霸斷其手足斫眼潰膓如韜之傷四面縱火煙炎際天虎從昭儀巳下數千人登中臺以觀之火滅取灰分置諸門交道中殺其妻子九人宣小子纔數歲虎素愛之抱之而泣欲赦之其大臣不聽就抱中取而殺之兒挽虎衣大呌至於絶帶虎因此發病又廢其后杜氏為庻人誅其四率巳下三百人宦者五十人皆車裂節解棄之漳水洿其東宫以養猪牛東宫衛士十餘萬人皆謫戍涼州先是散􅀐常侍趙攬言於虎曰宫中將有變宜備之及宣殺韜虎疑其知而不告亦誅之朝廷論平蜀之功欲以豫章郡封桓温尚書左丞荀㽔曰温􅀂復平河洛將何以賞之乃加温征西大將軍開府儀同三司封臨賀郡公加譙王無忌前將軍袁喬龍驤將軍封湘西伯㽔崧之子也温旣滅蜀威名大振朝廷憚之㑹稽王昱以揚州刺史殷浩有盛名朝野推服乃引為心膂與參綜朝權欲以抗温由是與温濅相疑貳浩以征北長史荀羨前江州刺史王羲之夙有令名擢羡為呉國内史羲之為䕶軍將軍以為羽翼羡㽔之弟羲之導之從子也羲之以為内外恊和然後國家可安勸浩及羡不宜與温􅌟隙浩不從燕王皝有疾召丗子儁屬之曰今中原未平方資賢傑以經丗務恪智勇兼濟才堪任重汝其委之以成吾志又曰陽士秋士行髙㓗忠幹貞固可託大事汝善待之九月丙申薨趙王虎議立太子太尉張舉曰燕公斌有武略彭城公遵有文德惟陛下所擇虎曰卿言正起吾意戎昭將軍張豺曰燕公母賤又甞有過彭城公母前以太子事廢今立之臣恐不能無㣲恨陛下宜審思之初虎之㧞上邽也張豺獲前趙主曜㓜女安定公主有殊色納於虎虎嬖之生齊公丗豺以虎老病欲立丗爲嗣冀劉氏為太后已得輔政乃說虎曰陛下再立太子其母皆出於倡賤故禍亂相尋今宜擇母貴子孝者立之虎曰卿勿言吾知太子處矣虎再與羣臣議於東堂虎曰吾欲以純灰三斛自滌其膓何為專生惡子年踰二十輙欲殺父今世方十歲比其二十吾已老矣乃與張舉李農定議令公卿上書請立世為太子大司農曹莫不肯署名虎使張豺問其故莫頓首曰天下重器不宜立少故不敢署虎曰莫忠臣也然未達朕意張舉李農知朕意矣可令諭之遂立世為太子以劉昭儀為后冬十一月甲辰葬燕文明王世子儁即位赦境内遣使詣建康告䘮以弟交為左賢王左長史陽騖為郎中令十二月以左光禄大夫領司徒録尚書事蔡謨為侍中司徒謨上䟽固讓謂所親曰我若為司徒將為後代所哂義不敢拜也五年春正月辛未朔大赦趙王虎即皇帝位大赦改元太寜諸子皆進爵為王故東宫髙力等萬餘人謫戍凉州行逹雍城旣不在赦例又敕雍州刺史張茂送之茂皆奪其馬使歩推鹿車致糧戍所髙力督定陽梁犢因衆心之怨謀作亂東歸衆聞之皆踊抃大呼犢乃自稱晉征東大將軍帥衆攻㧞下辨安西將軍劉寜自安定擊之為犢所敗髙力皆多力善射一當十餘人雖無兵甲掠民斧施一丈柯攻戰若神所向崩潰戍卒皆隨之攻陷郡縣殺長吏二千石長驅而東比至長安衆巳十萬樂平王苞盡銳拒之一戰而敗犢遂東出潼闗進趣洛陽趙主虎以李農為大都督行大將軍事統衛軍將軍張賀度等步騎十萬討之戰于新安農等大敗戰于洛陽又敗退壁成臯犢遂東掠滎陽陳留諸郡虎大懼以燕王斌為大都督督中外諸軍事統冠軍大將軍姚弋仲車騎將軍蒲洪等討之弋仲將其衆八千餘人至鄴求見虎虎病未之見引入領軍省賜以巳所御食弋仲怒不食曰主上召我來擊賊當面見授方略我豈為食來邪且主上不見我我何以知其存亡邪虎力疾見之弋仲讓虎曰兒死愁邪何為而病兒㓜時不擇善人教之使至於為逆旣為逆而誅之又何愁焉且汝乆病所立兒㓜汝若不愈天下必亂當先憂此勿憂賊也犢等窮困思歸相聚為盗所過殘暴何所能至老羌為汝一舉了之弋仲性狷直人無貴賤皆汝之虎亦不之責於坐授使持節侍中征西大將軍賜以鎧馬弋仲曰汝㸔老羌堪破賊否乃被鎧跨馬于庭中因䇿馬南馳不辭而出遂與斌等擊犢於滎陽大破之斬犢首而還討其餘黨盡滅之虎命弋仲劒履上殿入朝不趨進封平西郡公蒲洪為侍中車騎大將軍開府儀同三司都督雍秦州諸軍事雍州刺史進封略陽郡公始平人爲朂聚兵自稱將軍趙樂平王苞討滅之誅三千餘家夏四月益州刺史周撫龍驤將軍朱燾擊范賁斬之益州平詔遣謁者陳沈如燕拜慕容儁為使持節侍中大都督督河北諸軍事幽平二州牧大將軍大單于燕王桓温遣督䕶滕畯帥交廣之兵擊林邑王文於盧容為文所敗退屯九眞乙夘趙王虎病甚以彭城王遵為大將軍鎮闗右燕王斌為丞相録尚書事張豺為鎮衛大將軍領軍將軍吏部尚書並受遺詔輔政劉后惡斌輔政恐不利於太子與張豺謀去之斌時在襄國遣使詐謂斌曰主上疾巳漸愈王須獵者可小停也斌素好獵嗜酒遂留獵且縱酒劉氏與豺因矯詔稱斌無忠孝之心免官歸第使豺弟雄帥龍騰五百人守之乙丑遵自幽州至鄴敕朝堂受拜配禁兵三萬遣之遵涕泣而去是日虎疾小廖問遵至未左右對曰去巳乆矣虎曰恨不見之虎臨西閤龍騰中郎二百餘人列拜於前虎問何求皆曰聖體不安宜令燕王入宿衛典兵馬或言乞為皇太子虎曰燕王不在内邪召以來左右言王酒病不能入虎曰促持輦迎之當付璽綬亦竟無行者尋惛眩而入張豺使張雄矯詔殺斌戊辰劉氏復矯詔以豺為太保都督中外諸軍錄尚書事如霍光故事侍中徐統歎曰亂將作矣吾無為預之仰藥而死己巳虎卒太子世即位尊劉氏為皇太后劉氏臨朝稱制以張豺為丞相豺辭不受請以彭城王遵義陽王鑒為左右丞相以慰其心劉氏從之豺與太尉張舉謀誅司空李農舉素與農善密告之農奔廣宗帥乞活數萬家保上白劉氏使張舉統宿衛諸軍圍之豺以張離為鎮軍大將軍監中外諸軍事以為已副彭城王遵至河内聞䘮姚弋仲蒲洪劉寜及征虜將軍石閔武衛將軍王鸞等討梁犢還遇遵於李城共說遵曰殿下長且賢先帝亦有意以殿下為嗣正以末年惛惑為張豺所誤今女主臨朝姦臣用事上白相持未下京師宿衛空虛殿下若聲張豺之罪鼓行而討之其誰不開門倒戈而迎殿下者遵從之五月遵自李城舉兵還趣鄴洛州刺史劉國帥洛陽之衆往㑹之檄至鄴張豺大懼馳召上白之軍丙戌遵軍于蕩陰戎卒九萬石閔為前鋒豺將岀拒之􅂄舊羯士皆曰彭城王來奔䘮吾當出迎之不能為張豺守城也踰城而出豺斬之不能止張離亦帥龍騰二千斬闗迎遵劉氏懼召張豺入對之悲哭曰先帝梓宫未殯而禍難至此今嗣子冲㓜託之將軍將軍將若之何欲加遵重位能弭之乎豺惶怖不知所出但云唯唯乃下詔以遵為丞相領大司馬大都督督中外諸軍錄尚書事加黄鉞九錫己丑遵至安陽亭張豺懼而出迎遵命執之􅁃寅遵擐甲曜兵入自鳳陽門升太武前殿擗踊盡哀退如東閤斬張豺于平樂市夷其三族假劉氏令曰嗣子㓜沖先帝私恩所授皇業至重非所克堪其以遵嗣位於是遵即位大赦罷上白之圍辛卯封世為譙王廢劉氏為太妃尋皆殺之李農來歸罪使復其位尊母鄭氏為皇太后立妃張氏為皇后故燕王斌子衍為皇太子以義陽王鑒為侍中太傅沛王沖為太保樂平王苞為大司馬汝陰王琨為大將軍武興公閔為都督中外諸軍事輔國大將軍甲午鄴中暴風㧞樹震雷雨雹大如盂升太武暉華殿災及諸門觀閣蕩然無餘乗輿服御燒者太半金石皆盡火月餘乃滅時沛王冲鎮薊聞遵殺世自立謂其僚佐曰世受先帝之命遵輙廢而殺之罪莫大焉其敕内外戒嚴孤將親討之於是留寜北將軍沭堅戍幽州帥衆五萬自薊南下傳檄燕趙所在雲集比至常山衆十餘萬軍于苑鄉遇遵赦書冲曰皆吾弟也死者不可復追何為復相殘乎吾將歸矣其將陳暹曰彭城簒弑自尊為罪大矣王雖北斾臣將南轅俟平京師擒彭城然後奉迎大駕冲乃復進遵馳遣王擢以書喻冲冲弗聽遵使武興公閔及李農等帥精卒十萬討之戰于平棘冲兵大敗獲冲于元氏賜死阬其士卒三萬餘人武興公閔言於遵曰蒲洪人傑也今以洪鎮闗中臣恐秦雍之地非復國家之有此雖先帝臨終之命然陛下踐祚自宜改圖遵從之罷洪都督餘如前制洪怒歸枋頭遣使來降燕平狄將軍慕容霸上書於燕王儁曰石虎窮凶極􅁀天之所棄餘燼僅存自相魚肉今中國倒懸企望仁恤若大軍一振勢必投戈北平太守孫興亦表言石氏大亂宜以時進取中原儁以新遭大䘮弗許霸馳詣龍城言於儁曰難得而易失者時也萬一石氏衰而復興或有英雄據其成資豈惟失此大利亦恐更為後患儁曰鄴中雖亂鄧恒據安樂兵彊糧足今若伐趙東道不可由也當由盧龍盧龍山徑險狹虜乗髙斷要首尾為患將若之何霸曰恒雖欲為石氏拒守其將士顧家人懐歸志若大軍臨之自然瓦解臣請為殿下前驅東出徒何潛趣令支出其不意彼聞之勢必震駭上不過閉門自守下不免棄城逃潰何暇禦我哉然則殿下可以安步而前無復留難矣儁猶豫未決以問五材將軍封弈對曰用兵之道敵彊則用智敵弱則用勢是故以大呑小猶狼之食豚也以治易亂猶日之消雪也大王自上世以來積德累仁兵彊士練石虎極其殘􅁀死未瞑目子孫爭國上下乖亂中國之民墜於塗炭延頸企踵以待振㧞大王若揚兵南邁先取薊城次指鄴都宣燿威德懐撫遺民彼孰不扶老提㓜以迎大王凶黨將望旗冰碎安能爲害乎從事中郎黄泓曰今太白經天歲集畢北天下易主陰國受命此必然之驗也宜速出師以承天意折衝將軍慕輿根曰中國之民困於石氏之亂咸思易主以救湯火之急此千載一時不可失也自武宣王以來招賢養民務農訓兵正俟今日今時至不取更復顧慮豈天意未欲使海内平定邪將大王不欲取天下也儁笑而從之以慕容恪為輔國將軍慕容評為輔弼將軍左長史陽騖為輔義將軍謂之三輔慕容霸爲前鋒都督建鋒將軍選精兵二十餘萬講武戒嚴為進取之計六月葬趙王虎于顯原陵謚曰武帝廟號太祖桓温聞趙亂出屯安陸遣諸將經營北方趙揚州刺史王浹舉壽春降西中郎將陳逵進據壽春征北大將軍褚裒上表請伐趙即日戒嚴直指泗口朝議以裒事任貴重不宜􅀷入宜先遣偏師裒奏言前巳遣前鋒督䕶王頥之等徑造彭城後遣督䕶麋嶷進據下邳今宜速發以成聲勢秋七月加裒征討大都督督徐兖青揚豫五州諸軍事裒帥衆三萬徑赴彭城北方士民降附者日以千計朝野皆以為中原指期可復光祿大夫蔡謨獨謂所親曰胡滅誠為大慶然恐更貽朝廷之憂其人曰何謂也謨曰夫能順天乗時濟羣生於艱難者非上聖與英雄不能為也自餘則莫若度德量力觀今日之事殆非時賢所及必將經營分表疲民以逞旣而材略踈短不能副心財殫力竭智勇俱困安得不憂及朝廷乎魯郡民五百餘家相與起兵附晉求援於褚裒裒遣部將王龕李邁將銳卒三千迎之趙南討大都督李農帥騎二萬與龕等戰於代陂龕等大敗皆没於趙八月裒退屯廣陵陳逵聞之焚壽春積聚毀城遁還裒上䟽乞自貶詔不許命裒還鎮京口解征討都督時河北大亂遺民二十餘萬口渡河欲來歸附會裒巳還威勢不接皆不能自㧞死亡略盡趙樂平王苞謀帥闗右之衆攻鄴左長史石光司馬曹曜等固諫苞怒殺光等百餘人苞性貪而無謀雍州豪傑知其無成並遣使告晉梁州刺史司馬勲帥衆赴之楊初襲趙西城破之九月涼州官屬共上張重華為丞相涼王雍秦涼三州牧重華屢以錢帛賜左右寵臣又喜博奕頗廢政事從事索振諫曰先王夙夜勤儉以實府庫正以讎恥未雪志平海内故也殿下嗣位之初彊寇侵逼頼重餌之故得戰士死力僅保社稷今蓄積巳虛而寇讎尚在豈可輕有耗散以與無功之人乎昔漢光武躬親萬機章奏詣闕報不終日故能隆中興之業今章奏停滯動經時月下情不得上通沈􅁈困於囹圄殆非明主之事也重華謝之司馬勲出駱谷破趙長城戍壁于懸鉤去長安二百里使治中劉煥攻長安斬京兆太守劉秀離又㧞賀城三輔豪傑多殺守令以應勲凡三十餘壁衆五萬人趙樂平王苞乃輟攻鄴之謀使其將麻秋姚國等將兵拒勲趙主遵遣車騎將軍王朗帥精騎二萬以討勲爲名因刼苞送鄴勲兵少畏朗不敢進冬十月釋懸鉤拔宛城殺趙南陽太守袁景復還梁州初趙主遵之發李城也謂武興公閔曰努力事成以爾為太子旣而立太子衍閔恃功欲專朝政遵不聽閔素驍勇屢立戰功夷夏宿將皆憚之旣為都督揔内外兵權乃撫循殿中將士皆奏為殿中貟外將軍爵闗外矦遵弗之疑而更題名善惡以挫抑之衆咸怨怒中書令孟凖左衞將軍王鸞勸遵稍奪閔兵權閔益恨望凖等咸勸誅之十一月遵召義陽王鑒樂平王苞汝陰王琨淮南王昭等入議於鄭太后前曰閔不臣之迹漸著今欲誅之如何鑒等皆曰宜然鄭氏曰李城還兵無棘奴豈有今日小驕縱之何可遽殺鑒出遣宦者楊環馳以告閔閔遂劫李農及右衞將軍王基密謀廢遵使將軍蘇彦周成帥甲士三千人執遵於南臺遵方與婦人彈碁問成曰反者誰也成曰義陽王鑒當立遵曰我尚如是鑒能幾時遂殺之於琨華殿并殺鄭太后張后太子衍孟準王鸞及上光祿張斐鑒即位大赦以武興公閔為大將軍封武德王司空李農為大司馬並錄尚書事郎闓為司空秦州刺史劉羣為尚書左僕射侍中盧諶為中書監秦雍流民相帥西歸路由枋頭共推蒲洪為主衆至十餘萬洪子健在鄴斬關出奔枋頭鑒懼洪之逼欲以計遣之乃以洪爲都督􅀜中諸軍事征西大將軍雍州牧領秦州刺史洪㑹官屬議應受與不主簿程朴請且與趙連和如列國分境而治洪怒曰吾不堪為天子邪而云列國乎引朴斬之都鄉元穆矦禇裒還至京口聞哭聲甚多以問左右對曰皆代陂死者之家也裒慙憤發疾十二月己酉卒以吳國内史荀羡為使持節監徐兖二州揚州之晉陵諸軍事徐州刺史時年二十八中興方伯未有如羡之少者趙主鑒使樂平王苞中書令李松殿中將軍張才夜攻石閔李農於琨華殿不克禁中擾亂鑒懼偽若不知者夜斬松才於西中華門并殺苞新興王祗虎之子也時鎮襄國與姚弋仲蒲洪等連兵移檄中外欲共誅閔農閔農以汝陰王琨為大都督與張舉及侍中呼延盛帥步騎七萬分討祗等中領軍石成侍中石啓前河東太守石暉謀誅閔農閔農皆殺之龍驤將軍孫伏都劉銖等結羯士三千伏於胡土亦欲誅閔農鑒在中臺伏都帥三十餘人將升臺挾鑒以攻之鑒見伏都毀閣道臨問其故㐲都曰李農等反巳在東掖門臣欲帥衛士以討之謹先啓知鑒曰卿是功臣好為官陳力朕從臺上觀卿勿慮無報也於是伏都銖帥衆攻閔農不克屯於鳳陽門閔農帥衆數千毀金明門而入鑒懼閔之殺已馳招閔農開門内之謂曰孫伏都反卿宜速討之閔農攻斬伏都等自鳳陽至琨華横尸相枕流血成渠宣令内外六夷敢稱兵仗者斬胡人或斬􅀜或踰城而出者不可勝數閔使尚書王簡少府王鬱帥衆數千守鑒於御龍觀懸食以給之下令城中曰近日孫劉搆逆支黨伏誅良善一無預也今日已後與官同心者留不同者各任所之敕城門不復相禁於是趙人百里内悉入城胡羯去者填門閔知胡之不為巳用班令内外趙人斬一胡首送鳯陽門者文官進位三等武官悉拜牙門一日之中斬首數萬閔親帥趙人以誅胡羯無貴賤男女少長皆斬之死者二十餘萬尸諸城外悉為野犬豺狼所食其屯戍四方者閔皆以書命趙人為將帥者誅之或髙鼻多湏濫死者半燕王儁遣使至涼州約張重華共擊趙髙句麗王釗送前東夷䕶軍宋晃于燕燕王儁赦之更名曰活拜為中尉六年春正月趙大將軍閔欲滅去石氏之迹託以䜟文有繼趙李更國號曰衛易姓李氏大赦改元青龍太宰趙庻太尉張舉中軍將軍張春光禄大夫石岳撫軍石寜武衛將軍張季及公矦卿校龍騰等萬餘人出奔襄國汝陰王琨奔冀州撫軍將軍張沈據滏口張賀度據石瀆建義將軍叚勤據黎陽寜南將軍楊羣據桑壁劉國據陽城叚龕據陳留姚弋仲據灄頭蒲洪據枋頭衆各數萬皆不附於閔勤末柸之子龕蘭之子也王朗麻秋自長安赴洛陽秋承閔書誅朗部胡千餘人朗奔襄國秋帥衆歸鄴蒲洪使其子龍驤將軍雄迎擊獲之以為軍師將軍汝陰王琨及張舉王朗帥衆七萬伐鄴大將軍閔帥騎千餘與戰於城北閔操兩刃矛馳騎擊之所向摧陷斬首三千級琨等大敗而去閔與李農帥騎三萬討張賀度于石瀆閏月衛主鑒密遣宦者齎書召張沈等使乗虛襲鄴宦者以告閔農閔農馳還廢鑒殺之并殺趙主虎三十八孫盡滅石氏姚弋仲子曜武將軍益武衛將軍若帥禁兵數千斬關奔灄頭弋仲帥衆討閔軍于混橋司徒申鐘等上尊號於閔閔以讓李農農固辭閔曰吾屬故晉人也今晉室猶存請與諸君分割州郡各稱牧守公矦奉表迎晉天子還都洛陽何如尚書胡睦進曰陛下聖德應天宜登大位晉氏衰㣲遠竄江表豈能揔馭英雄混壹四海乎閔曰胡尚書之言可謂識機知命矣乃即皇帝位大赦改元永興國號大魏朝廷聞中原大亂復謀進取己丑以楊州刺史殷浩爲中軍將軍假節都督楊豫徐兖青五州諸軍事以蒲洪爲氐王使持節征北大將軍都督河北諸軍事冀州刺史廣川郡公蒲健爲假節右將軍監河北征討前鋒諸軍事襄國公姚弋仲蒲洪各有據􅀜右之志弋仲遣其子襄帥衆五萬擊洪洪迎擊破之斬獲三萬餘級洪自稱大都督大將軍大單于三秦王改姓苻氏以南安雷弱兒爲輔國將軍安定梁楞爲前將軍領左長史馮翊魚遵爲後將軍領右長史京兆叚陵爲左將軍領左司馬王墮爲右將軍領右司馬天水趙俱隴西牛夷北地辛牢皆爲從事中郎玄酋毛貴爲單于輔相二月燕王儁使慕容霸將兵二萬自東道出徒河慕輿于自西道出蠮螉塞儁自中道出盧龍塞以伐趙以慕容恪鮮子亮為前驅命慕輿埿槎山通道留世子曄守龍城以内史劉斌為大司農與典書令皇甫真留統後事霸軍至三陘趙征東將軍鄧恒惶怖焚倉庫棄安樂遁去與幽州刺史王午共保薊徒河南部都尉孫泳急入安樂撲滅餘火籍其榖帛霸収安樂北平兵糧與儁㑹臨渠三月燕兵至無終王午留其將王佗以數千人守薊與鄧恒走保魯口乙巳儁㧞薊執王佗斬之儁欲悉阬其士卒千餘人慕容霸諫曰趙為暴虐王興師伐之將以拯民於塗炭而撫有中州也今始得薊而阬其士卒恐不可以為王師之先聲也乃釋之儁入都于薊中州士女降者相繼燕兵至范陽范陽太守李産欲為石氏拒燕衆莫為用乃帥入城令長出降儁復以産為太守産子積為幽州别駕棄其家從王午在魯口鄧恒謂午曰績鄉里在北父已降燕今雖在此恐終難相保徒為人累不如去之午曰此何言也夫以當今䘮亂而績乃能立義捐家情節之重雖古烈士無以過乃欲以猜嫌害之燕趙之士聞之謂我直相聚為賊了無意識衆情一散不可復集此為坐自屠潰也恒乃止午猶慮諸將不與巳同心或致非意乃遣績歸績始辭午往見燕王儁儁讓之曰卿不識天命棄父邀名今日乃始來邪對曰臣眷戀舊主志存微節官身所在何事非君殿下方以義取天下臣未謂得見之晩也儁恱善待之儁以第宜為代郡城郎孫泳為廣寗太守悉置幽州郡縣守宰甲子儁使中部俟􅁵慕輿句督薊中留事自將擊鄧恒於魯口軍至清梁恒將鹿勃早將數千人夜襲燕營半巳得人先犯前鋒都督慕容霸突入幕下霸起奮擊手殺十餘人早不能進由是燕軍得嚴儁謂慕輿根曰賊鋒甚銳宜且避之根正色曰我衆彼寡力不相敵故乗夜来戰冀萬一獲利今求賊得賊正當擊之復何所疑王但安卧臣等自為王破之儁不能自安内史李洪從儁出營外屯髙冢上根帥左右精勇數百人從中牙直前擊早李洪徐整騎隊還助之早乃退走衆軍追擊四十餘里早僅以身免所從士卒死亡略盡雋引兵還薊魏主閔復姓冉氏尊母王氏為皇太后立妻董氏為皇后子智為皇太子㣧明裕皆為王以李農為太宰領太尉録尚書事封齊王其子皆封縣公遣使者持節赦諸軍屯皆不從麻秋說苻洪曰冉閔石祗方相持中原之亂未可平也不如先取􅀜中基業巳固然後東爭天下誰能敵之洪深然之旣而秋因宴鴆洪欲并其衆世子健收秋斬之洪謂健曰吾所以未入􅀜者以為中州可定今不幸為豎子所困中州非汝兄弟所能辦我死汝急入􅀜言終而卒健代統其衆乃去大都督大將軍三秦王之號稱晉官爵遣其叔父安來告䘮且請朝命趙新興王祗即皇帝位于襄國改元永寜以汝隂王琨為相國六夷據州郡擁兵者皆應之祗以姚弋仲為右丞相親趙王待以殊禮弋仲子襄雄勇多才略士民愛之請弋仲以為嗣弋仲以襄非長子不許請者日以千數弋仲乃使之將兵祗以襄為驃騎將軍豫州刺史新昌公又以苻健為都督河南諸軍事鎮南大將軍開府儀同三司兖州牧略陽郡公夏四月趙主祗遣汝陰王琨將兵十萬伐魏魏主閔殺李農及其三子并尚書令王謨侍中王衍中常侍嚴震趙昇閔遣使臨江告晉曰逆胡亂中原今已誅之能共討者可遣軍來也朝廷不應五月廬江太守袁真攻魏合肥克之虜其居民而還六月趙汝陰王琨進據邯鄲鎮南將軍劉國自繁陽㑹之魏衛將軍王泰擊琨大破之死者萬餘人劉國還繁陽初叚蘭卒於令支叚龕代領其衆因石氏之亂擁部落南徙秋七月龕引兵東據廣固自稱齊王八月代郡人趙榼帥三百餘家叛燕歸趙并州刺史張平燕王雋徙廣寗上谷二郡民於徐無代郡民於凡城王朗之去長安也朗司馬京兆杜洪據長安自稱晉征北將軍雍州剌史以馮翊張琚為司馬􅀜西夷夏皆應之苻健欲取之恐洪知之乃受趙官爵以趙俱為河内太守戊温牛夷為綏集將軍戍懐治宫室於枋頭課民種麥示無西意有知而不種者健殺之以徇旣而自稱晉征西大將軍都督關中諸軍事雍州刺史以武威賈玄碩為左長史略陽梁安為右長史叚純為左司馬辛牢為右司馬京兆王魚安定程肱胡文等為軍諮祭酒悉衆而西以魚遵為前鋒行至盟津為浮梁以濟遣弟輔國將軍雄帥衆五千自潼關入兄子揚武將軍菁帥衆七千自軹􅀜入臨别執菁手曰若事不捷汝死河北我死河南不復相見旣濟焚橋自帥大衆隨雄而進杜洪聞之與健書侮嫚之以張琚弟先為征虜將軍帥衆萬三千逆戰于潼􅀜之北先兵大敗走還長安洪悉召􅀜中之衆以拒健洪弟郁勸洪迎健洪不從郁帥所部降於健健遣苻雄徇渭北氐酋毛受屯髙陵徐磋屯好畤􅆧酋白犢屯黄白衆各數萬皆斬洪使遣子降於健苻菁魚遵所過城邑無不降附洪懼固守長安張賀度叚勤劉國靳豚㑹于昌城將攻鄴魏主閔自將擊之戰于蒼亭賀度等大敗死者二萬八千人追斬靳豚于陰安盡俘其衆而歸閔戎卒三十餘萬旌旗鉦鼓緜亘百餘里雖石氏之盛無以過也故晉散騎常侍隴西辛謐有髙名歴劉石之世徵辟皆不就閔僃禮徵為太常謐遺閔書以爲物極則反致至則危君王功巳成矣宜因茲大㨗歸身晉朝必有由夷之廉享松喬之壽矣因不食而卒九月燕王儁南徇冀州取章武河間􅀄勃海賈堅少尚氣節仕趙為殿中督趙亡堅棄魏主閔還鄉里擁部曲數千家燕慕容評徇勃海遣使招之堅終不降評與戰擒之儁以評為章武太守封裕為河間太守儁與慕容恪皆愛賈堅之材堅時年六十餘恪聞其善射置牛百步上以試之堅曰少之時能令不中今老矣往往中之乃射再發一矢拂脊一矢磨腹皆附膚落毛上下如一觀者咸服其妙儁以堅為樂陵太守治髙城苻菁與張先戰於渭北擒之三輔郡縣堡壁皆降冬十月苻健長驅至長安杜洪張琚奔司竹燕王儁還薊留諸將守之儁還龍城謁陵廟十一月魏主閔帥步騎十萬攻襄國署其子太原王胤為大單于驃騎大將軍以降胡一千配之為麾下光禄大夫韋謏諫曰胡羯皆我之仇敵今來歸附茍全性命耳萬一為變悔之何及請誅屏降胡去單于之號以防㣲杜漸閔方欲撫納羣胡大怒誅謏及其子伯陽甲午苻健入長安以民心思晉乃遣參軍杜山伯詣建康獻捷并修好於桓温於是秦雍夷夏皆附之趙涼州刺史石寜獨據上邽不下十二月苻雄擊斬之蔡謨除司徒三年不就職詔書屢下太后遣使諭意謨終不受於是帝臨軒遣侍中紀據黄門郎丁纂徵謨謨陳疾篤使主簿謝攸陳讓自旦至申使者十餘返而謨不至時帝方八嵗甚倦問左右曰所召人何以至今不來臨軒何時當竟太后以君臣俱疲乃詔必不來者冝罷朝中軍將軍殷浩奏免吏部尚書江虨官㑹稽王昱今曹曰蔡公傲違上命無人臣之禮若人主卑屈於上大義不行於下亦不知復所以為政矣公卿乃奏謨悖慢傲上罪同不臣請送廷尉以正刑書謨懼帥子弟素服詣闕稽顙自到廷尉待罪殷浩欲加謨大辟㑹徐州刺史荀羡入朝浩以問羡羡曰蔡公今日事危明日必有桓文之舉浩乃止下詔免謨為庻人資治通鑑卷第九十八
