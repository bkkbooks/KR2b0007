body:
  text: 臣司馬光奉勑編集唐紀四十三黓閹茂凡一年有竒起重光作噩六月盡玄徳宗神武聖文皇帝二建中二年六月庚寅以浙江東西觀察使蘇州刺史韓滉為潤州刺史浙江東西節度使名其軍曰鎭海張著至襄陽梁崇義益懼陳兵而見之藺杲得詔不敢􅀤馳見崇義請命崇義對著號泣竟不受詔著復命癸巳進李希烈爵南平郡王加漢南漢北兵馬招討使督諸道兵討之楊炎諫曰希烈為董秦養子親任無比卒逐秦而奪其位為人狼戾無親無功猶屈強不法使平崇義何以制之上不聽炎固爭之上益不平荆南牙門將吴少誠以取梁崇義之䇿干李希烈希烈以少誠為前鋒少誠幽州潞人也時内自闗中西暨蜀漢南盡江淮閩越北至太原所在出兵而李正已遣兵扼徐州甬橋渦口梁崇義阻兵襄陽運路皆絶人心震恐江淮進奉船千餘艘泊渦口不敢進上以和州刺史張萬福為濠州刺史萬福馳至渦口立馬岸上􅀤進奉船淄青將士停岸睥睨不敢動辛丑汾陽忠武王郭子儀薨子儀為上將擁彊兵程元振魚朝恩讒謗百端詔書一紙徵之無不即日就道由是讒謗不行嘗遣使至田承嗣所承嗣西望拜之曰此膝不屈於人若干年矣李靈曜據汴州作亂公私物過汴者皆留之惟子儀物不敢近遣兵衛送出境校中書令考凡二十四月入俸錢二萬緡私産不在焉府庫珍貨山積家人三千人八子七壻皆為朝廷顯官諸孫數十人毎問安不能盡辨頷之而已僕固懷恩李懷光渾瑊輩皆出麾下雖貴為王公常頥指役使趨走於前家人亦以僕􅀠視之天下以其身為安危者殆三十年功葢天下而主不疑位極人臣而衆不疾窮奢極欲而人不非之年八十五而終其將佐至大官為名臣者甚衆壬子以懷鄭河陽節度副使李艽為河陽懷州節度使割東畿五縣􅀠焉北庭安西自吐蕃陷河隴隔絶不通伊西北庭節度使李元忠四鎭留後郭昕帥將士閉境拒守數遣使奉表皆不達聲問絶者十餘年至是遣使間道歷諸胡自回紇中來上嘉之秋七月戊午朔加元忠北庭大都護賜爵寧塞郡王以昕為安西大都護四鎭節度使賜爵武威郡王將士皆遷七資元忠姓名朝廷所賜也本姓曹名令忠昕子儀弟也李希烈以乆雨未進軍上怪之盧􅂎宻言於上曰希烈遷延以楊炎故也陛下何愛炎一日之名而墮大功不若暫免炎相以悦之事平復用無傷也上以為然庚申以炎為左僕射罷政事以前永平節度使張鎰為中書侍郎同平章事鎰齊丘之子也以朔方節度使崔寧為右僕射丙子贈故伊州刺史袁光庭工部尚書光庭天寶末為伊州刺史吐蕃陷河隴光庭堅守累年吐蕃百方誘之不下糧竭兵盡城且陷光庭先殺妻子然後自焚郭昕使至朝廷始知之故贈官辛巳以邠寧節度使李懷光兼朔方節度使癸未河東節度使馬燧昭義節度使李抱眞神䇿先鋒都知兵馬使李晟大破田悦於臨洺時悦攻臨洺累月不㧞城中食且盡府庫竭士卒多死傷張伾飾其愛女使出拜將士曰諸君守戰甚苦伾家無它物請鬻此女為將士一日之費衆皆哭曰願盡死力不敢言賞李抱眞告急於朝詔馬燧將歩騎二萬與抱眞討悦又遣李晟將神䇿兵與之俱又詔幽州留後朱滔討惟岳燧等軍未出險先遣使持書諭悅為好語悅謂燧畏之不設備又與抱眞合兵八萬東下壺闗軍于邯鄲擊悅支軍破之悅方急攻臨洺分李惟岳兵五千助楊朝光明日燧等進攻朝光柵悦將萬餘人救之燧命大將李自良等禦之於􅀟岡令之曰悅得過必斬爾自良等力戰悅軍却燧推火車焚朝光柵斬朝光獲首虜五千餘級居五日燧等進軍至臨洺悅悉衆力戰凡百餘合悅兵大敗斬首萬餘級悅引兵夜遁邢州圍亦解時平盧節度使李正已巳薨子納秘之擅領軍務悅求救於納及李惟岳納遣大將衛俊將兵萬人惟岳遣兵三千人救之悅收合散卒得二萬餘人軍于洹水淄青軍其東成徳軍其西首尾相應馬燧帥諸軍進屯鄴奏求河陽兵自助詔河陽節度使李芁將兵㑹之八月李納始􅀤䘮奏請襲父位上不許梁崇義􅀤兵至江陵至四望大敗而歸乃收兵襄鄧李希烈引軍循漢而上與諸道兵㑹崇義遣其將翟暉杜少誠逆戰於蠻水希烈大破之追至踈口又破之二將請降希烈使將其衆先入襄陽慰諭軍民崇義閉城拒守守者開門爭出不可禁崇義與妻赴井死傳首京師范陽節度使朱滔將討李惟岳軍于莫州張孝忠將精兵八千守易州滔遣判官蔡雄説孝忠曰惟岳乳臭兒敢拒朝命今昭義河東軍巳破田悦淮寧李僕射克襄陽計河南諸軍朝夕北向恒魏之亡可佇立而須也使君誠能首舉易州以歸朝廷則破惟岳之功自使君始此轉禍為福之䇿也孝忠然之遣牙官程華詣滔遣録事參軍董稹奉表詣闕滔又上表薦之上悦九月辛酉以孝忠為成徳節度使命惟岳護䘮歸朝惟岳不從孝忠徳滔為子茂和娶滔女深相結壬戌加李希烈同平章事初李希烈請討梁崇義上對朝士亟稱其忠黜陟使李承自淮西還言於上曰希烈必立㣲功但恐有功之後偃蹇不臣更煩朝廷用兵耳上不以為然希烈既得襄陽遂據之為已有上乃思承言時承為河中尹甲子以承為山南東道節度使上欲以禁兵送上承請單騎赴鎭至襄陽希烈寘之外館迫脅萬方承誓死不屈希烈乃大掠闔境所有而去承治之朞年軍府稍完希烈留牙將於襄州守其所掠財由是數有使者往來承亦遣其腹心臧叔雅往來許蔡厚結希烈腹心周曾等與之隂圖希烈初蕭嵩家廟臨曲江􅀇宗以娱遊之地非神靈所宅命徙之楊炎為相惡京兆尹嚴郢左遷大理卿盧􅂎欲陷炎引郢為御史大夫先是炎將營家廟有宅在東都慿河南尹趙惠伯賣之惠伯買以為官廨郢按之以為有羨利􅂎召大理正田晉議法晉以為律監臨官市賈有羨利以乞取論當奪官􅂎怒貶晉衡州司馬更召它吏議法以為監主自盜罪當絞炎廟正直蕭嵩廟地􅂎因譛炎云兹地有王氣故􅀇宗令嵩徙之炎有異志故於其地建廟冬十月乙未炎自左僕射貶崖州司馬遣中使護送未至崖州百里縊殺之惠伯自河中尹貶費州多田尉尋亦殺之辛丑册太子妃蕭氏癸卯祫太廟先是太祖既正東向之位獻懿二祖皆藏西夾室不饗至是復奉獻祖東向而饗之徐州刺史李洧正已之從父兄也李納冦宋州彭城令太原白季庚説洧舉州歸國洧從之遣攝廵官崔程奉表詣闕且使口奏并白宰相以徐州不能獨抗納乞領徐海沂三州觀察使况海沂二州今皆為納有洧與刺史王渉馬萬通素有約茍得朝廷詔書必能成功程自外來以為宰相一也先白張鎰鎰以告盧􅂎􅂎怒其不先白己不從其請戊申加洧御史大夫充招諭使十一月戊午以永樂公主適檢校比部郎中田華上不欲違先志故也蜀王傀更名遂辛酉宣武節度使劉洽神䇿都知兵馬使曲環滑州刺史襄平李澄朔方大將唐朝臣大破淄青魏博之兵於徐州先是李納遣其將王温㑹魏博將信都崇慶共攻徐州李洧遣牙官温人王智興詣闕告急智興善走不五日而至上為之􅀤朔方兵五千人以朝臣將之與洽環澄共救之時朔方軍資裝不至旗服弊惡宣武人嗤之曰乞子能破賊乎朝臣以其言激怒士卒且曰都統有令先破賊營者營中物悉與之士皆憤怒爭􅁬崇慶温攻彭城二旬不能下請益兵於納納遣其將石隱金將萬人助之與劉洽等相拒於七里溝日向暮洽引軍稍却朔方馬軍使楊朝晟言於唐朝臣曰公以歩兵負山而陳以待兩軍我以騎兵伏於山曲賊見懸軍勢孤必搏之我以伏兵絶其􅆎必敗之朝臣從之崇慶等果將騎二千踰橋而西追擊官軍伏兵發横擊之崇慶等兵中斷狼狽而返阻橋以拒官軍其兵有爭橋不得渉水而度者朝晟指之曰彼可渉吾何為不渉遂渉水擊據橋者皆走崇慶等兵大潰洽等乘之斬首八千級溺死過半朔方軍士盡得其輜重旗服鮮華乃謂宣武人曰乞子之功孰與宋多宣武人皆慙官軍乘勝逐北至徐州城下魏博淄青軍解圍走江淮漕運始通己巳詔削李惟岳官爵募所部降者赦而賞之甲申淮南節度使陳少遊遣兵擊海州其刺史王渉以州降十二月李納密州刺史馬萬通乞降丁酉以為密州刺史崔漢衡至吐蕃賛普以敕書稱貢獻及賜全以臣禮見處又雲州之西當以賀蘭山為境邀漢衡更請之丁未漢衡遣判官與吐蕃使者入奏上為之改敕書境土皆如其請加馬燧魏博招討使三年春正月河陽節度使李芁引兵逼衛州田悦守將任履虛詐降既而復叛馬燧等諸軍屯于漳濵田悦遣其將王光進築月城以守長橋諸軍不得度燧以鐵鎖連車數百乗實以土囊塞其下流水淺諸軍渉度時軍中乏糧悦等深壁不戰燧命諸軍持十日糧進屯倉口與悦夾洹水而軍李抱眞李芁問曰糧少而深入何也燧曰糧少則利速戰今三鎭連兵不戰欲以老我師我若分軍擊其左右悦必救之則我腹背受敵戰必不利故進軍逼悦所謂攻其所必救也彼茍出戰必為諸君破之乃為三橋逾洹水日徃挑戰悦不出燧令諸軍夜半起食濳師循洹水直趨魏州令曰賊至則止為陳留百騎擊皷鳴角於營中仍抱薪持火俟諸軍畢􅀤則止鼓角匿其旁伺悦軍畢度焚其橋軍行十里所悦聞之帥淄青成徳歩騎四萬踰橋掩其後乘風縱火鼓譟而進燧按兵不動先除其前草莽百歩為戰􅂣結陳以待之募勇士五千餘人為前列悦軍至火止氣衰燧縱兵擊之悦軍大敗神䇿昭義河陽軍小却見河東軍㨗還鬭又破之追奔至三橋已焚悦軍亂赴水溺死不可勝紀斬首二萬餘級捕虜三千餘人尸相枕藉三十餘里悦收餘兵千餘人走魏州馬燧與李抱眞不協頓兵平邑浮啚遷延不進悦夜至南郭大將李長春閉闗不内以俟官軍乆之天且明長春乃開門納之悦殺長春嬰城拒守城中士卒不滿數千死者親戚號哭滿街悦憂懼乃持佩刀乘馬立府門外悉集軍民流涕言曰悦不肖䝉淄青成徳二丈人保薦嗣守伯父業今二丈人即丗其子不得承襲悦不敢忘二丈人大恩不量其力輒拒朝命䘮敗至此使士大夫肝腦塗地皆悦之罪也悦有老母不能自殺願諸公以此刀斷悦首提出城降馬僕射自取富貴無為與悦俱死也因從馬上自投地將士爭前抱持悦曰尚書舉兵徇義非私己也一勝一負兵家之常某輩累丗受恩何忍聞此願奉尚書一戰不勝則以死繼之悦曰諸公不以悦䘮敗而弃之悦雖死敢忘厚意於地下乃與諸將各斷髮約為兄弟誓同生死悉出府庫所有及歛富民之財得百餘萬以賞士卒衆心始定復召貝州刺史邢曹俊使之整部伍繕守備軍勢復振李納軍於濮陽為河南軍所逼奔還濮州徴援兵於魏州田悦遣軍使符璘將三百騎送之璘父令竒謂璘曰吾老矣歷觀安史輩叛亂者今皆安在田氏能乆乎汝因此弃逆從順是汝揚父名於後丗也齧臂而别璘遂與其副李瑶帥衆降於馬燧悦收族其家令竒慢罵而死瑶父再春以博州降悦從兄昂以洺州降王光進以長橋降悦入城旬餘日馬燧等諸軍始至城下攻之不克丙寅李惟岳遣兵與孟祐守束鹿朱滔張孝忠攻㧞之進圍深州惟岳憂懼掌書記邵眞復説惟岳密為表先遣弟惟簡入朝然後誅諸將之不從命者身自入朝使妻父冀州刺史鄭詵權知節度事以待朝命惟簡既行孟祐知其謀密遣告田悦悦大怒使衙官扈岌往見惟岳讓之曰尚書舉兵正為大夫求旌節耳非為己也今大夫乃信邵眞之言遣弟奉表悉以反逆之罪歸尚書自求雪身尚書何負於大夫而至此邪若相為斬邵眞則相待如初不然當與大夫絶矣判官畢華言於惟岳曰田尚書以大夫之故陷身重圍大夫一旦負之不義甚矣且魏博淄青兵彊食富足抗天下事未可知奈何遽為二三之計乎惟岳素怯不能守前計乃引邵眞對扈岌斬之􅀤成徳兵萬人與孟祐俱圍束鹿丙寅朱滔張孝忠與戰於束鹿城下惟岳大敗燒營而遁兵馬使王武俊為左右所構惟岳疑之惜其才未忍除也束鹿之戰使武俊為前鋒私自謀曰我破朱滔則惟岳軍勢大振歸殺我必矣故戰不甚力而敗朱滔欲乘勝攻恒州張孝忠引兵西北軍于義豐滔大驚孝忠將佐皆怪之孝忠曰恒州宿將尚多未易可輕迫之則并力死鬭緩之則自相圖諸君苐觀之吾軍義豐坐待惟岳之殄滅耳且朱司徒言大而識淺可與共始難與共終也於是滔亦屯束鹿不敢進惟岳將康日知以趙州歸國惟岳益疑王武俊武俊甚懼或謂惟岳曰先相公委腹心於武俊使之輔佐大夫又有骨肉之親武俊勇冠三軍今危難之際復加猜阻若無武俊欲使誰為大夫却敵乎惟岳以為然乃使歩軍使衛常寧與武俊共擊趙州又使王士眞將兵宿府中以自衛癸未蜀王遂更名遡淮南節度使陳少遊㧞海宻二州李納復攻陷之王武俊既出恒州謂衛常寧曰武俊今幸出虎口不復歸矣當北歸張尚書常寧曰大夫暗弱信任左右觀其勢終為朱滔所滅今天子有詔得大夫首者以其官爵與之中丞素為衆所服與其出亡曷若倒戈以取大夫轉禍為福如反掌耳事茍不㨗歸張尚書未晚也武俊深以為然㑹惟岳使要藉謝遵至趙州城下武俊引遵同謀取惟岳遵還密告王士眞閏月甲辰武俊常寧自趙州引兵還襲惟岳遵與士眞矯惟岳命啓城門納之黎明武俊帥數百騎突入府門士眞應之於内殺十餘人武俊令曰大夫叛逆將士歸順敢違拒者族衆莫敢動遂執惟岳收鄭詵畢華王它奴等皆殺之武俊以惟岳舊使之子欲生送之長安常寧曰彼見天子將復以叛逆之謀歸咎於中丞乃縊殺之傳首京師深州刺史楊榮國惟岳姊夫也降於朱滔滔使復其位復榷天下酒惟西京不榷二月戊午李惟岳所署定州刺史楊政義降時河北略定惟魏州未下河南諸軍攻李納於濮州納勢日蹙朝廷謂天下不日可平甲子以張孝忠為易定滄三州節度使王武俊為恒兾都團練觀察使康日知為深趙都團練觀察使以徳林二州􅀠朱滔令還鎭滔固請深州不許由是怨望留屯深州王武俊素輕張孝忠自以手誅李惟岳功在康日知上而孝忠為節度使已與康日知俱為都團練使又失趙定二州亦不悦又詔以糧三千石給朱滔馬五百匹給馬燧武俊以為朝廷不欲使故人為節度使魏博既下必取恒兾故先分其糧馬以弱之疑未肯奉詔田悦聞之遣判官王侑許士則閒道至深州説朱滔曰司徒奉詔討李惟岳旬朔之間㧞束鹿下深州惟岳勢䠞故王大夫因司徒勝勢得以梟惟岳之首此皆司徒之功也又天子明下詔書令司徒得惟岳城邑皆􅀠本鎭今乃割深州以與日知是自弃其信也且今上志欲掃清河朔不使蕃鎭承襲將悉以文臣代武臣魏亡則燕趙為之次矣若魏存則燕趙無患然則司徒果有意矜魏博之危而救之非徒得存亡繼絶之義亦子孫萬丗之利也又許以貝州賂滔滔素有異志聞之大喜即遣王侑歸報魏州使將士知有外援各自堅又遣判官王郅與許士則俱詣恒州説王武俊曰大夫出萬死之計誅逆首拔亂根康日知不出趙州豈得與大夫同日論功而朝廷襃賞略同誰不為大夫憤邑者今又聞有詔支糧馬與鄰道朝廷之意蓋以大夫善戰無敵恐為後患先欲貧弱軍府俟平魏之日使馬僕射北首朱司徒南向共相滅耳朱司徒亦不敢自保使郅等效愚計欲與大夫共救田尚書而存之大夫自留糧馬以供軍朱司徒不欲以深州與康日知願以與大夫請早定刺史以守之三鎭連兵若耳目手足之相救則它日永無患矣武俊亦喜許諾即遣判官王巨源使於滔且令知深州事相與刻日舉兵南向滔又遣人説張孝忠孝忠不從宣武節度使劉洽攻李納於濮州克其外城納於城上涕泣求自新李勉又遣人説之癸卯納遣其判官房説以其母弟經及子成務入見㑹中使宋鳯朝稱納勢窮蹙不可捨上乃囚説等於禁中納遂歸鄆州復與田悦等合朝廷以納勢未衰三月乙未始以徐州刺史李洧兼徐海沂都團練觀察使海沂已為納所據洧竟無所得李納之初反也其所署徳州刺史李西華備守甚嚴都虞候李士眞密毁西華於納納召西華還府以士眞代之士眞又以詐召棣州刺史李長卿長卿過徳州士眞劫之與同歸國夏四月戊午以士眞長卿為二州刺史士眞求援於朱滔滔已有異志遣大將李濟時將三千人聲言助士眞守徳州且召士眞詣深州議軍事至則留之使濟時領州事庚申吐蕃歸曏所俘掠兵民八百人上遣中使􅀤盧龍恒兾易定兵萬人詣魏州討田悦王武俊不受詔執使者送朱滔滔言於衆曰將士有功者吾奏求官勲皆不遂今欲與諸君敕裝共趨魏州擊破馬燧以取温飽何如皆不應三問乃曰幽州之人自安史之反從而南者無一人得還今其遺人痛入骨髓况太尉司徒皆受國寵榮將士亦各䝉官勲誠且願保目前不敢復有僥兾滔黙然而罷乃誅大將數十人厚撫循其士卒康日知聞其謀以告馬燧燧以聞上以魏州未下王武俊復叛力未能制滔壬戌賜滔爵通義郡王冀以安之滔反謀益甚分兵營於趙州以逼康日知以深州授王巨源武俊以其子士眞為恒兾深三州留後將兵圍趙州涿州刺史劉怦與滔同縣人其母滔之姑也滔使知幽州留後聞滔欲救田悦以書諫之曰今昌平故里朝廷改為太尉鄉司徒里此亦丈夫不朽之名也但以忠順自持則事無不濟竊思近日務大樂戰不顧成敗而家滅身屠者安史是也怦忝密親黙而無告是負重知惟司徒圖之無貽後悔滔雖不用其言亦嘉其盡忠卒無疑貳滔將起兵恐張孝忠為後患復遣牙官蔡雄往説之孝忠曰昔者司徒􅀤幽州遣人語孝忠曰李惟岳負恩為逆謂孝忠歸國即為忠臣孝忠性直用司徒之教今既為忠臣矣不復助逆也且孝忠與武俊皆出夷落深知其心最喜飜覆司徒勿忘鄙言它日必相念矣雄復欲以巧辭説之孝忠怒欲執送京師雄懼逃歸滔乃使劉怦將兵屯要害以備之孝忠完城礪兵獨居彊宼之閒莫之能屈滔將歩􅀐二萬五千􅀤深州至束鹿詰旦將行吹角未畢士卒忽大亂諠譟曰天子令司徒歸幽州奈何違敕南救田悦滔大懼走入驛後堂避匿蔡雄與兵馬使宗頊等矯謂士卒曰汝輩勿喧聽司徒傳令衆稍止雄又曰司徒將􅀤范陽恩㫖令得李惟岳州縣即有之司徒以幽州少絲纊故與汝曹竭力血戰以取深州冀得其絲纊以寛汝曹賦率不意國家無信復以深州與康日知又朝廷以汝曹有功賜絹人十匹至魏州西境盡為馬僕射所奪司徒但處范陽富貴足矣今兹南行乃為汝曹非自為也汝曹不欲南行任自歸北何用諠悖乖失軍禮衆聞言不知所為乃曰敕使何得不為軍士守護賞物遂入敕使院擘裂殺之又呼曰雖知司徒此行為士卒終不如且奉詔歸鎭雄曰然則汝曹各還部伍詰朝復往深州休息數日相與歸鎭耳衆然後定滔即引軍還深州密令諸將訪察唱率為亂者得二百餘人悉斬之餘衆股栗乃復舉兵而南衆莫敢前却進取寧晉留屯以待王武俊武俊將歩騎萬五千取元氏東趣寧晉武俊之始誅李惟岳也遣判官孟華入見上問以河朔利害華性忠直有才略應對慷慨上悦以為恒冀團練副使㑹武俊與朱滔有異謀上遽遣華歸諭㫖華至武俊已出師華諫曰聖意於大夫甚厚茍盡忠義何患官爵之不崇土地之不廣不日天子必移康中丞於它鎭深趙終為大夫之有何苦遽自同於逆亂乎異日無成悔之何及華曏在李寶臣幕府以直道已為同列所忌至是為副使同列尤疾之言於武俊曰華以軍中隂事奏天子請為内應故得超遷是將覆大夫之軍大夫宜備之武俊以其舊人不忍殺奪職使歸私第田悦恃援兵將至遣其將康愔將萬餘人出城西與馬燧等戰於御河上大敗而還時兩河用兵月費百餘萬緡府庫不支數月太常博士韋都賔陳京建議以為貨利所聚皆在富商請括富商錢出萬緡者借其餘以供軍計天下不過借一二千商則數年之用足矣上從之甲子詔借商人錢令度支條上判度支杜佑大索長安中商賈所有貨意其不實輒加搒捶人不勝苦有縊死者長安囂然如被冦盗計所得纔八十餘萬緡又括僦櫃質錢凡蓄積錢帛粟麥者皆借四分之一封其櫃窖百姓為之罷市相帥遮宰相馬自訴以千萬數盧􅂎始慰諭之勢不可遏乃疾驅自他道歸計并借商所得纔二百萬緡人已竭矣京叔明之五丗孫也甲戌以昭義節度副使磁州刺史盧玄卿為洛州刺史兼魏博招討副使初李抱眞為澤潞節度使馬燧領河陽三城抱眞欲殺懷州刺史楊鉥鉥奔燧燧納之且奏其無罪抱眞怒及同討田悦數以事相恨望二人怨隙遂深不復相見由是諸軍逗橈乆無成功上數遣中使和解之及王武俊逼趙州抱眞分麾下二千人戍邢州燧大怒曰餘賊未除宜相與戮力乃分兵自守其地我寧得獨戰邪欲引兵歸李晟説燧曰李尚書以邢趙連壤分兵守之誠未有害今公遽自引去衆謂公何燧悦乃單騎造抱眞壘相與釋憾結歡㑹洺州刺史田昻請入朝燧奏以洺州􅀠抱眞請玄卿為刺史兼充招討之副李晟軍先􅀠抱眞又請兼􅀠燧以示恊和上皆從之盧龍節度行軍司馬蔡廷玉惡判官鄭雲逵言於朱泚奏貶莫州參軍雲逵妻朱滔之女也滔復奏為掌書記雲逵深構廷玉於滔廷玉又與檢校大理少卿朱體㣲言於泚曰滔在幽鎭事多專擅其性非長者不可以兵權付之滔知之大怒數與泚書請殺二人者泚不從由是兄弟頗有隙及滔拒命上欲歸罪於廷玉等以悦滔甲子貶廷玉柳州司户體㣲萬州南浦尉宣武節度使劉洽攻李納之濮陽降其守將高彦昭朱滔遣人以蠟書置髻中遺朱泚欲與同反馬燧獲之并使者送長安泚不之知上驛召泚於鳯翔至以蠟書并使者示之泚惶恐頓首請罪上曰相去千里初不同謀非卿之罪也因留之長安私第賜名園腴田錦綵金銀甚厚以安其意其幽州盧龍節度太尉中書令並如故上以幽州兵在鳯翔思得重臣代之盧􅂎忌張鎰忠直為上所重欲出之於外已得專揔朝政乃對曰朱泚名位素崇鳯翔將校班秩已高非宰相信臣無以鎭撫臣請自行上俛首未言􅂎又曰陛下必以臣貌寢不為三軍所伏固惟陛下神筭上乃顧鎰曰才兼文武望重内外無以易卿鎰知為􅂎所排而無辭以免因再拜受命戊寅以鎰兼鳯翔尹隴右節度等使初盧􅂎與御史大夫嚴郢共構楊炎趙惠伯之獄炎死􅂎復忌郢㑹蔡廷玉等貶官殿中侍御史鄭詹誤遞文符至昭應送之廷玉等行已至藍田召還而東廷玉等以為執已送朱滔至靈寶西赴河死上聞之駭異盧􅂎因奏朱泚必疑以為詔㫖請遣三司使案詹又言御史所為必禀大夫請并郢案之獄未具壬午􅂎奏杖殺詹於京兆府貶郢費州刺史卒於貶所上初即位崔祐甫為相務崇寛大故當時政聲藹然以為有貞觀之風及盧􅂎為相知上性多忌因以疑似離間羣臣始勸上以嚴刻御下中外失望淮􅀯節度使陳少遊奏本道税錢毎千請增二百五月丙戌詔增它道税錢皆如淮􅀯又鹽毎斗價皆增百錢朱滔王武俊自寧晉􅀯救魏州辛卯詔朔方節度使李懷光將朔方及神䇿歩騎萬五千人東討田悦且拒滔等滔行至宗城掌書記鄭雲逵參謀田景仙弃滔來降丁酉加河東節度使馬燧同平章事辛亥置義武軍節度於定州以易定滄三州􅀠之張光晟之殺突董也上欲遂絶回紇召册可汗使源休還太原乆之乃復遣休送突董及翳密施大小梅録等四䘮還其國可汗遣其宰相頡子思迦等迎之頡子思迦坐大帳立休等於帳前雪中詰以殺突董之狀欲殺者數四供待甚薄留五十餘日乃得歸可汗使人謂之曰國人皆欲殺汝以償怨我意則不然汝國巳殺突董等我又殺汝如以血洗血汚益甚耳今吾以水洗血不亦善乎唐負我馬直絹百八十萬匹當速歸之遣其散支將軍康赤心隨休入見休竟不得見可汗而還己卯至長安詔以帛十萬匹金銀十萬兩償其馬直休有口辨盧􅂎恐其見上得幸乘其未至先除光禄卿朱滔王武俊軍至魏州田悦具牛酒出迎魏人懽呼動地滔營於愜山是日李懷光軍亦至馬燧等盛軍容迎之滔以為襲己遽出陳懷光勇而無謀欲乘其營壘未就擊之燧請且休將士觀舋而動懷光曰彼營壘既立將為後患此時不可失也遂擊滔於愜山之西殺歩卒千餘人滔軍崩沮懷光按轡觀之有喜色士卒爭入滔營取寶貨王武俊引二千騎横衝懷光軍軍分為二滔引兵繼之官軍大敗蹙入永濟渠溺死者不可勝數人相蹈籍其積如山水為之不流馬燧等各收軍保壘是夕滔等堰永濟渠入王莽故河絶官軍糧道及歸路明日水深三尺餘馬燧懼遣使卑辭謝滔求與諸節度歸本道奏天子請以河北事委五郎處之滔欲許之王武俊以為不可滔不從秋七月燧與諸軍渉水而西退保魏縣以拒滔滔乃謝武俊武俊由是恨滔後數日滔等亦引兵營魏縣東南與官軍隔水相拒李納求援於滔等滔遣魏博兵馬使信都承慶將兵助之納攻宋州不克遣兵馬使李克信李欽遥戍濮陽南華以拒劉洽甲辰以淮寧節度使李希烈兼平盧淄青兖鄆登萊齊州節度使討李納又以河東節度使馬燧兼魏博澶相節度使加朔方邠寧節度使李懷光同平章事神䇿行營招討使李晟請以所將兵北解趙州之圍與張孝忠合勢圖范陽上許之晟自魏州引兵北趨趙州王士眞解圍去晟留趙州三日與孝忠合兵北略恒州演州司馬李孟秋舉兵反自稱安南節度使安南都護輔良交討斬之八月丁未置汴東西水陸運兩税鹽鐵使二人度支緫其大要而已辛酉以涇原留後姚令言為節度使盧􅂎惡太子太師顔眞卿欲出之於外眞卿謂􅂎曰先中丞傳首至平原眞卿以舌䑛面血今相公忍不相容乎􅂎矍然起拜然恨之益甚九月癸卯殿中少監崔漢衡自吐蕃歸賛普遣其臣區頰賛隨漢衡入見冬十月辛亥以湖南觀察使曹王臯為江南西道節度使臯至洪州悉集將佐簡閲其才得牙將伊慎王鍔等擢為大將引荆襄判官許孟容置幕府愼兖州人孟容長安人也愼甞從李希烈討梁崇義希烈愛其才欲留之愼逃歸希烈聞臯用愼恐為己患遺愼七屬甲詐為復書墜之境上上聞之遣中使即軍中斬愼臯為之論雪未報㑹江賊三千餘衆入冦臯遣愼擊賊自贖愼擊破之斬首數百級而還由是得免盧􅂎秉政知上必更立相恐其分己權乘間薦吏部侍郎闗播儒厚可以鎭風俗丙辰以播為中書侍郎同平章事政事皆决於􅂎播但斂祍無所可否上嘗從容與宰相論事播意有所不可起立欲言􅂎目之而止還至中書􅂎謂播曰以足下端慤少言故相引至此曏者奈何􅀤口欲言邪播自是不復敢言戊辰遣都官員外郎河中樊澤使于吐蕃告以結盟之期丙子肅王詳薨十一月己卯朔加淮南節度使陳少遊同平章事田悦徳朱滔之救與王武俊議奉滔為主稱臣事之滔不可曰愜山之捷皆大夫二兄之力滔何敢獨居尊位於是幽州判官李子千恒冀判官鄭濡等共議請與鄆州李大夫為四國俱稱王而不改年號如昔諸侯奉周家正朔築壇同盟有不如約者衆共伐之不然豈得常為叛臣茫然無主用兵既無名有功無官爵為賞使將吏何所依歸乎滔等皆以為然滔乃自稱冀王田悦稱魏王王武俊稱趙王仍請李納稱齊王是日滔等築壇於軍中告天而受之滔為盟主稱孤武俊悦納稱寡人所居堂曰殿處分曰令羣下上書曰牋妻曰妃長子曰丗子各以其所治州為府置留守兼元帥以軍政委之又置東西曹視門下中書省左右内史視侍中中書令餘官皆倣天朝而易其名武俊以孟華為司禮尚書華竟不受嘔血死以兵馬使衛常寧為内史監委以軍事常寧謀殺武俊武俊􅆎斬之武俊遣其將張終葵冦趙州康日知擊斬之李希烈帥所部兵三萬徙鎭許州遣所親詣李納與謀共襲汴州遣使告李勉云巳兼領淄青欲假道之官勉為之治橋具饌以待之而嚴為之備希烈竟不至又宻與朱滔等交通納亦數遣遊兵度汴以迎希烈由是東南轉輸者皆不敢由汴渠自蔡水而上十二月丁丑李希烈自稱天下都元帥太尉建興王時朱滔等與官軍相拒累月官軍有度支饋糧諸道益兵而滔與王武俊孤軍深入專仰給於田悦客主日益困弊聞李希烈軍勢甚盛頗怨望乃相與謀遣使詣許州勸希烈稱帝希烈由是自稱天下都元帥司天少監徐承嗣請更造建中正元曆從之資治通鑑卷第二百二十七
