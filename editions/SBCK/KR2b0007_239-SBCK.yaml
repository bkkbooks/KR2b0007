body:
  text: 臣司馬光奉勑編集唐紀五十五兆涒灘凡四年有竒起玄黓執徐十月盡柔憲宗昭文章武大聖至神孝皇帝中之上元和七年冬十月乙未魏博監軍以狀聞上亟召宰相謂李絳曰卿揣魏博若符契李吉甫請遣中使宣慰以觀其變李絳曰不可今田興奉其土地兵衆坐待詔命不乗此際推心撫納結以大恩必待敕使至彼持將士表來爲請節鉞然後與之則是恩出於下非出於上將士爲重朝廷爲輕其感戴之心亦非今日之比也機㑹一失悔之無及吉甫素與樞宻使梁守謙相結守謙亦爲之言於上曰故事皆遣中使宣勞今此鎭獨無恐更不諭上竟遣中使張忠順如魏博宣慰欲俟其還而議之癸夘李絳復上言朝廷恩威得失在此一舉時機可惜柰何弃之利害甚明願聖心勿疑計忠順之行甫應過陜乞明旦即降白麻除興節度使猶可及也上欲且除留後絳曰興㳟順如此自非恩出不次則無以使之感激殊常上從之甲辰以興爲魏博節度使忠順未還制命已至魏州興感恩流涕士衆無不鼓舞庚戌更名皇子寛曰惲察曰悰寰曰忻寮曰悟審曰恪李絳又言魏博五十餘年不霑皇化一旦舉六州之地來歸刳河朔之腹心傾叛亂之巢穴不有重賞過其所望則無以慰士卒之心使四鄰􅂆慕請發内庫錢百五十萬緍以賜之左右宦官以爲所與太多後有此比將何以給之上以語絳絳曰田興不貪專地之利不顧四鄰之患歸命聖朝陛下柰何愛小費而遺大計不以収一道人心錢用盡更來機事一失不可復追借使國家發十五萬兵以取六州期年而克之其費豈止百五十萬緍而已乎上悦曰朕所以惡衣菲食蓄聚貨財正爲欲平定四方不然徒貯之府庫何爲十一月辛酉遣知制誥裴度至魏博宣慰以錢百五十萬緍賞軍士六州百姓給復一年軍士受賜歡聲如雷成德兖鄆使者數輩見之相顧失色歎曰倔强者果何益乎度爲興陳君臣上下之義興聽之終夕不倦待度禮極厚請度徧至所部州縣宣布朝命奏乞除節度副使於朝廷詔以户部郎中河東胡証爲之興又奏所部缺官九十員請有司注擬行朝廷法令輸賦税田承嗣以來室屋僭侈者皆避不居鄆蔡恒遣遊客間説百方興終不聽季師道使人謂宣武節度使韓弘曰我世與田氏約相保援今興非其族又首變兩河事亦公之所惡也我將與成德合軍討之弘曰我不知利害知奉詔行事耳若兵北度河我則以兵東取曹州師道懼不敢動田興既葬田季安送田懐諫于京師辛巳以懐諫爲右監門衛將軍李絳奏振武天德左右良田可萬頃請擇能吏開置營田可以省費足食上從之絳命度支使盧坦經度用度四年之間開田四千八百頃収榖四千餘萬斛歳省度支錢二十餘萬緍邊防頼之上嘗於延英謂宰相曰卿輩當爲朕惜官勿用之私親故李吉甫權德輿皆謝不敢李絳曰崔祐甫有言非親非故不諳其才諳者尚不與官不諳者何敢復與但問其才器與官相稱否耳若避親故之嫌使聖朝虧多士之美此乃偷安之臣非至公之道也苟所用非其人則朝廷自有典刑誰敢逃之上曰誠如卿言是歳吐蕃宼涇州及西門之外驅掠人畜而去上患之李絳上言京西京北皆有神䇿鎭兵始置之欲以備禦吐蕃使與節度使掎角相應也今則鮮衣美食坐耗縣官每有宼至節度使邀與俱進則云申取中尉處分比其得報虜去逺矣縱有果鋭之將聞命奔赴節度使無刑戮以相制之相視如平交左右前却莫肯用命何所益乎請據所在之地士馬及衣糧器械皆割􅀠當道節度使使號令齊壹如臂之使指則軍威大振虜不敢入宼矣上曰朕不知舊事如此當亟行之既而神䇿軍驕恣日久不樂􅀠節度使竟爲宦者所沮而止八年春正月癸亥以博州刺史田融爲相州刺史融興之兄興㓜孤融長養而教之興嘗於軍中角射一軍莫及融退而抶之曰爾不自晦禍將及矣故興能自全於猜暴之時勃海定王元瑜卒弟言義權知國務庚午以言義爲勃海王李吉甫李絳數爭論於上前禮部尚書同平章事權德輿居中無所可否上鄙之辛未德輿罷守本官辛夘賜魏博節度使田興名弘正司空同平章事于頔久留長安鬱鬱不得志有梁正言者自言與樞宻使梁守謙同宗能爲人屬請頔使其子太常丞敏重賂正言求出鎭久之正言詐漸露敏索其賂不得誘其奴支解之弃溷中事覺頔帥其子殿中少監季友等素服詣建福門請罪門者不内退負南牆而立遣人上表閤門以無印引不受日暮方歸明日復至丁酉頔左授恩王傅仍絶朝謁敏流雷州季友等皆貶官僮奴死者數人敏至秦嶺而死事連僧鍳虛鑒虛自貞元以來以財交權倖受方鎭賂遺厚自奉養吏不敢詰至是權倖爭爲之言上欲釋之中丞薛存誠不可上遣中使詣臺宣㫖曰朕欲面詰此僧非釋之也存誠對曰陛下必欲面釋此僧請先殺臣然後取之不然臣期不奉詔上嘉而從之三月丙辰杖殺鍳虛沒其所有之財甲子徵前西川節度使同平章事武元衡入知政事夏六月大水上以爲隂盈之象辛丑出宫人二百車秋七月辛酉振武節度使李光進請脩受降城兼理河防時受降城爲河所毁李吉甫請徙其徒於天德故城李絳及户部侍郎盧坦以爲受降城張仁愿所築當磧口據虜要衝美水草守邊之利地今避河患退二三里可矣柰何捨萬代永安之䇿徇一時省費之便乎况天德故城僻處确瘠去河絶逺烽候警急不相應接虜忽唐突勢無由知是無故而蹙國二百里也及城使周懐義奏利害與絳坦同上卒用吉甫䇿以受降城騎士􅀠天德軍李絳言於上曰邊兵徒有其數而無其實虛費衣糧將帥但縁私役使聚其貨財以結權倖而已未嘗訓練以備不虞此不可不於無事之時豫留聖意也時受降城兵籍舊四百人及天德軍交兵止有五十人器械止有一弓自餘稱是故絳言及之上驚曰邊兵乃如是其虛邪卿曹當加按閲㑹絳罷相而止乙巳廢天威軍以其衆􅀠神䇿軍丁未辰溆州賊張伯靖請降九月辛亥以伯靖爲歸州司馬委荆南軍前驅使初吐蕃欲作烏蘭橋先貯材於河側朔方常潛遣人投之於河終不能成虜知朔方靈鹽節度使王佖貪先厚賂之然後併力成橋仍築月城守之自是朔方禦冦不暇冬十月回鶻發兵度磧南自栁谷西擊吐蕃壬寅振武天德軍奏回鶻數千騎至鸊鵜泉邊軍戒嚴振武節度使李進賢不恤士卒判官嚴澈綬之子也以刻覈得幸於進賢進賢使牙將楊遵憲將五百騎趣東受降城以備回鶻所給資裝多虛估至鳴沙遵憲屋處而士卒暴露衆發怒夜聚薪環其屋而焚之卷甲而還庚寅夜焚門攻進賢進賢踰城走軍士屠其家并殺嚴澈進賢奔靜邊軍羣臣累表請立德妃郭氏爲皇后上以妃門宗彊盛恐正位之後後宫莫得進託以歳時禁忌竟不許丁酉振武監軍駱朝寛奏亂兵已定請給將士衣上怒以夏綏節度使張煦為振武節度使將夏州兵二千赴鎮仍命河東節度使王鍔以兵二千納之聽以便宜從事駱朝寛歸罪於其將蘇若方而殺之發鄭滑魏博卒鑿黎陽古河十四里以紓滑州水患上問宰相人言外間朋黨大盛何也李絳對曰自古人君所甚惡者莫若人臣為朋黨故小人譖君子者必曰朋黨何則朋黨言之則可惡尋之則無跡故也東漢之末凡天下賢人君子宦官皆謂之黨人而禁錮之遂以亡國此皆羣小欲害善人之言願陛下深察之夫君子固與君子合豈可必使之與小人合然後謂之非黨邪九年春正月甲戌王鍔遣兵五千㑹張煦於善羊柵乙亥煦入單于都護府誅亂者蘇國珍等二百五十三人二月丁丑貶李進賢爲通州刺史甲午駱朝寛坐縱亂者杖之八十奪色配役定陵李絳屢以足疾辭位癸夘罷爲禮部尚書初上欲相絳先出吐突承璀爲淮南監軍至是上召還承璀先罷絳相甲辰承璀至京師復以爲弓箭庫使左神䇿中尉李吉甫奏國家舊置六胡州於靈鹽之境開元中廢之更置宥州以領降户天寳中宥州寄理於經略軍寳應以來因循遂廢今請復之以備回鶻撫党項上從之夏五月庚申復置宥州理經略軍取鄜城神䇿屯兵九千以實之先是回鶻屢請昏朝廷以公主出降其費甚廣故未之許禮部尚書李絳上言以爲回鶻凶彊不可無備淮西窮蹙事要經營今江淮大縣歳所入賦有二十萬緡者足以備降主之費陛下何愛一縣之賦不以羈縻勁虜回鶻若得許昏必喜而無猜然後可以修城塹蓄甲兵邊備既完得專意淮西功必萬全今既未降公主而虛弱西城磧路無備更脩天德以疑虜心萬一北邊有驚則淮西遺醜復延歳月之命矣儻虜騎南牧國家非歩兵三萬騎五千則不足以抗禦借使一歳而勝之其費豈特降主之比哉上不聽乙丑桂王綸薨六月壬寅以河中節度使張弘靖爲刑部尚書同平章事弘靖延賞之子也翰林學士獨孤郁權德輿之壻也上歎郁之才美曰德輿得壻郁我反不及邪先是尚主皆取貴戚及勲臣之家上始命宰相選公卿大夫子弟文雅可居清貫者諸家多不願惟杜佑孫司議郎悰不辭秋七月戊辰以悰爲殿中少監駙馬都尉尚歧陽公主公主上長女郭妃所生也八月癸巳成昏公主有賢行杜氏大族尊行不趐數十人公主卑委怡順一同家人禮度二十餘年人未嘗以絲髪閒指爲貴驕始至則與悰謀曰上所賜奴婢卒不肯窮屈奏請納之悉自市寒賤可制指者自是閨門落然不聞人聲閏月丙辰彰義節度使呉少陽薨少陽在蔡州隂聚亡命牧養馬騾時抄掠壽州茶山以實其軍其子攝蔡州刺史元濟匿䘮以病聞自領軍務上自平蜀即欲取淮西淮南節度使李吉甫上言少陽軍中上下􅂝離請徙理壽州以經營之㑹朝廷方討王承宗未暇也及吉甫入相田弘正以魏博歸附吉甫以爲汝州扞蔽東都河陽宿兵本以制魏博今弘正歸順則河陽爲内鎭不應屯重兵以示猜阻辛酉以河陽節度使烏重㣧爲汝州刺史充河陽懐汝節度使徙理汝州己巳弘正檢校右僕射賜其軍錢二十萬緡弘正曰吾未若移河陽軍之爲喜也九月庚辰以洺州刺史李光顔爲陳州刺史充忠武軍都知兵馬使以泗州刺史令狐通爲壽州防禦使通彰之子也丙戌以山南東道節度使袁滋爲荆南節度使以荆南節度使嚴綬爲山南東道節度使呉少陽判官蘇兆楊元卿大將侯惟清皆勸少陽入朝元濟惡之殺兆囚惟清元卿先奏事在長安具以淮西虛實及取元濟之䇿告李吉甫請討之時元濟猶匿喪元卿勸吉甫凡蔡使入奏者所在止之少陽死近四十日不爲輟朝但易環蔡諸鎭將帥益兵爲備元濟殺元卿妻及四男以圬射堋淮西宿將董重質呉少誠之壻也元濟以爲謀主戊戌加河東節度使王鍔同平章事李吉甫言於上曰淮西非如河北四無黨援國家常宿數十萬兵以備之勞費不可支也失今不取後難圖矣上將討之張弘靖請先爲少陽輟朝贈官遣使弔贈待其有不順之迹然後加兵上從之遣工部員外郎李君何弔祭元濟不迎敕使發兵四出屠舞陽焚葉掠魯山襄城􅀜東震駭君何不得入而還冬十月丙午中書侍郎同平章事趙公李吉甫薨壬戌以忠武節度副使李光顔爲節度使甲子以嚴綬爲申光蔡招撫使督諸道兵招討呉元濟乙丑命内常侍知省事崔潭峻監其軍戊辰以尚書左丞吕元膺爲東都留守党項宼振武十二月戊辰以尚書右丞韋貫之同平章事十年春正月乙酉加韓弘守司徒弘鎭宣武十餘年不入朝頗以兵力自負朝廷亦不以忠純待之王鍔加同平章事弘恥班在其下與武元衡書頗露不平之意朝廷方倚其形勢以制呉元濟故遷官使居鍔上以寵慰之呉元濟縱兵侵掠及於東畿己亥制削元濟官爵命宣武等十六道進軍討之嚴綬擊淮西兵小勝不設備淮西兵夜還襲之二月甲辰綬敗于磁丘却五十餘里馳入唐州而守之壽州團練使令狐通爲淮西兵所敗走保州城境上諸柵盡爲淮西所屠癸丑以左金吾大將軍李文通代之貶通昭州司户詔鄂岳觀察使栁公綽以兵五千授安州刺史李聽使討呉元濟公綽曰朝廷以吾書生不知兵邪即奏請自行許之公綽至安州李聽屬櫜鞬迎之公綽以鄂岳都知兵馬使先鋒行營兵馬都虞候二牒授之選卒六千以屬聽戒其部校曰行營之事一决都將聽感恩畏威如出麾下公綽號令整肅區處軍事諸將無不服士卒在行營者其家疾病死䘮厚給之妻滛泆者沈之於江士卒皆喜曰中丞爲我治家我何得不前死故每戰皆㨗公綽所乗馬踶殺圉人公綽命殺馬以祭之或曰圉人自不備耳此良馬可惜公綽曰材良性駑何足惜也竟殺之河東將劉輔殺豐州刺史燕重旰王鍔誅之及其黨王叔文之黨坐謫官者凡十年不量移執政有憐其才欲漸進之者悉召至京師諫官爭言其不可上與武元衡亦惡之三月乙酉皆以爲逺州刺史官雖進而地益逺永州司馬栁宗元爲栁州刺史朗州司馬劉禹錫爲播州刺史宗元曰播州非人所居而夢得親在堂萬無母子俱往理欲請於朝願以栁易播㑹中丞裴度亦爲禹錫言曰禹錫誠有罪然母老與其子爲死别良可傷上曰爲人子尤當自謹勿貽親憂此則禹錫重可責也度曰陛下方侍太后恐禹錫在所宜矜上良久乃曰朕所言以責爲人子者耳然不欲傷其親心退謂左右曰裴度愛我終切明日禹錫改連州刺史宗元善爲文嘗作梓人傳以爲梓人不執斧斤刀鋸之技專以尋引規矩繩墨度羣木之材視棟宇之制相髙深圓方短長之宜指麾衆工各趨其事不勝任者退之大夏既成則獨名其功受禄三倍亦猶相天下者立綱紀整法度擇天下之士使稱其職居天下之人使安其業能者進之不能者退之萬國既理而談者獨稱伊􅀓周召其百執事之勤勞不得紀焉或者不知體要衒能矜名親小勞侵衆官听听於府庭而遺其大者逺者是不知相道者也又作種樹郭槖駝傳曰槖駝之所種無不生且茂者或問之對曰槖駝非能使木壽且孳也凡木之性其根欲舒其土欲故既植之勿動勿慮去不復顧其蒔也若子其置也若弃則其天全而性得矣它植者則不然根拳而土易愛之太恩憂之太勤旦視而暮撫已去而復顧甚者􅀲其膚以驗其生枯揺其本以觀其踈宻而木之性日以離矣雖曰愛之其實害之雖曰憂之其實讎之故不我若也爲政亦然吾居鄉見長人者好煩其令若甚憐焉而卒以禍之旦暮吏來聚民而令之促其耕穫督其蠶織吾小人輟饔飱以勞吏之不暇又何以蕃吾生而安吾性邪凡病且怠職此故也此其文之有理者也庚子李光顔奏破淮西兵於臨潁田弘正遣其子布將兵三千助嚴綬討呉元濟甲辰李光顔又奏破淮西兵於南頓呉元濟遣使求救於􅁪鄆王承宗李師道數上表請赦元濟上不從是時發諸道兵討元濟而不及淄青師道使大將將二千人趣壽春聲言助官軍討元濟實欲爲元濟之援也師道素養刺客姧人數十人厚資給之其徒説師道曰用兵所急莫先糧儲今河隂院積江淮租賦請潛往焚之募東都惡少年數百劫都市焚宫闕則朝廷未暇討蔡先自救腹心此亦救蔡一竒也師道從之自是所在盗賊竊發辛亥暮盗數十人攻河隂轉運院殺傷十餘人燒錢帛三十餘萬緡匹榖二萬餘斛於是人情恇懼羣臣多請罷兵上不許諸軍討淮西久未有功五月上遣中丞裴度詣行營宣慰察用兵形勢度還言淮西必可取之狀且曰觀諸將惟李光顔勇而知義必能立功上悦考功郎中知制誥韓愈上言以爲淮西三小州殘弊困劇之餘而當天下之全力其破敗可立而待然所未可知者在陛下斷與不斷耳因條陳用兵利害以爲今諸道發兵各二三千人勢力單弱羇旅異鄉與賊不相諳委望風懾懼將帥以其客兵待之既薄使之又苦或分割隊伍兵將相失心孤意怯難以有功又其本軍各須資遣道路遼逺勞費倍多聞陳許安唐汝壽等州與賊連接處村落百姓悉有兵器習於戰鬭識賊深淺比來未有處分猶願自備衣糧保護鄉里若令召募立可成軍賊平之後易使歸農乞悉罷諸道軍募土人以代之又言蔡州士卒皆國家百姓若勢力窮不能爲惡者不須過有殺戮丙申李光顔奏敗淮西兵於時曲淮西兵晨壓其壘而陳光顔不得出乃自毁其柵之左右出騎以擊之光顔自將數騎衝其陳出入數四賊皆識之矢集其身如蝟毛其子攬轡止之光顔舉刃叱去於是人爭致死淮西兵大潰殺數千人上以裴度爲知人上自李吉甫薨悉以用兵事委武元衡李師道所養客説師道曰天子所以鋭意誅蔡者元衡賛之也請宻往刺之元衡死則它相不敢主其謀爭勸天子罷兵矣師道以爲然即資給遣之王承宗遣牙將尹少卿奏事爲呉元濟遊説少卿至中書辭指不遜元衡叱出之承宗又上書詆毁元衡六月癸夘天未明元衡入朝出所居靖安坊東門有賊自暗中突出射之從者皆散走賊執元衡馬行十餘歩而殺之取其顱骨而去又入通化坊擊裴度傷其首墜溝中度氊㡌厚得不死傔人王義自後抱賊大呼賊斷義臂而去京城大駭於是詔宰相出入加金吾騎士張弦露刃以衛之所過坊門呵索甚嚴朝士未曉不敢出門上或御殿久之朝班猶未齊賊遺紙於金吾及府縣曰毋急捕我我先殺汝故捕賊者不敢甚急兵部侍郎許孟容見上言自古未有宰相横尸路隅而盗不獲者此朝廷之辱也因涕泣又詣中書揮涕言請奏起裴中丞爲相大索賊黨窮其姦源戊申詔中外所在搜捕獲賊者賞錢萬緍官五品敢庇匿者舉族誅之於是京城大索公卿家有複壁重橑者皆索之成德軍進奏院有恒州卒張晏等數人行止無狀衆多疑之庚戌神䇿將軍王士則等告王承宗遣晏等殺元衡吏捕得晏等八人命京兆尹裴武監察御史陳中師鞫之癸亥詔以王承宗前後三表出示百寮議其罪裴度病瘡卧二旬詔以衛兵宿其第中使問訊不絶或請罷度官以安恒鄆之心上怒曰若罷度官是姧謀得成朝廷無復綱紀吾用度一人足破二賊甲子上召度入對乙丑以度爲中書侍郎同平章事度上言淮西腹心之疾不得不除且朝廷業已討之兩河藩鎭䟦扈者將視此爲髙下不可中止上以爲然悉以用兵事委度討賊愈急初德宗多猜忌朝士有相過從者金吾皆伺察以聞宰相不敢私第見客度奏今宼盗未平宰相宜招延四方賢才與參謀議始請於私第見客許之陳中師按張晏等具服殺武元衡張弘靖疑其不實屢言於上上不聽戊辰斬晏等五人殺其黨十四人李師道客竟潛匿亡去秋七月庚午朔靈武節度使李光進薨光進與弟光顔友善光顔先娶其母委以家事母卒光進後娶光顔使其妻奉管籥籍財物歸于其姒光進反之曰新婦逮事先姑先姑命主家事不可易也因相持而泣甲戌詔數王承宗罪惡絶其朝貢曰冀其翻然改過束身自歸攻討之期更俟後命八月己亥朔日有食之李師道置留後院於東都本道人雜沓往來吏不敢詰時淮西兵犯東畿防禦兵悉屯伊闕師道潛内兵於院中至數十百人謀焚宫闕縱兵殺掠已烹牛饗士明日將發其小卒詣留守吕元膺告變元膺亟追伊闕兵圍之賊衆突出防禦兵踵其後不敢廹賊出長夏門望山而遁是時都城震駭留守兵寡弱元膺坐皇城門指使部分意氣自若都人頼以安東都西南接鄧虢皆髙山深林民不耕種專以射獵爲生人皆趫勇謂之山棚元膺設重購以捕賊數日有山棚鬻鹿賊遇而奪之山棚走召其儕類且引官軍共圍之谷中盡獲之按驗得其魁乃中岳寺僧圓淨故嘗爲史思明將勇悍過人爲師道謀多買田於伊闕陸渾之閒以舍山棚而衣食之有訾嘉珍門察者潛部分以屬圓淨圓淨以師道錢千萬陽爲治佛光寺結黨定謀約令嘉珍等竊發城中圓淨舉火於山中集二縣山棚入城助之圓淨時年八十餘捕者既得之奮鎚擊其脛不能折圓淨罵曰䑕子折人脛且不能敢稱健兒乃自置其脛教使折之臨刑歎曰誤我事不得使洛城流血黨與死者凡數千人留守防禦將二人及驛卒八人皆受其職名爲之耳目元膺鞫訾嘉珍門察始知殺武元衡者乃師道也元膺宻以聞以檻車送二人詣京師上業已討王承宗不復窮治元膺上言近日藩鎭䟦扈不臣有可容貸者至於師道謀屠都城燒宫闕悖逆尤甚不可不誅上以爲然而方討呉元濟絶王承宗故未暇治師道也乙丑李光顔敗於時曲初上以嚴綬在河東所遣禆將多立功故使鎭襄陽且督諸軍討呉元濟綬無它材能到軍之日傾府庫賚士卒累年之積一朝而盡又厚賂宦官以結聲援擁八州之衆萬餘人屯境上閉壁經年無尺寸功裴度屢言其軍無政九月癸酉以韓弘爲淮西諸軍都統弘樂於自擅欲倚賊以自重不願淮西速平李光顔在諸將中戰最力弘欲結其歡心舉大梁城索得一美婦人教之歌舞絲竹飾以珠玉金翠直數百萬錢遣使遺之使者先致書光顔乃大饗將士使者進妓容色絶世一座盡驚光顔謂使者曰相公愍光顔覉旅賜以美妓荷德誠深然戰士數萬皆弃家逺來冒犯白刃光顔何忍獨以聲色自娯悦乎因流涕座者皆泣即於席上厚以繒帛贈使者并妓返之曰爲光顔多謝相公光顔以身許國誓不與逆賊同戴日月死無貳矣冬十月庚子始分山南東道爲兩節度以户部侍郎李遜爲襄復郢均房節度使以右羽林大將軍髙霞寓爲唐隨鄧節度使朝議以唐與蔡接故使霞寓專事攻戰而遜調五州之賦以餉之辛丑刑部侍郎權德輿奏自開元二十五年修格式律令事類後至今長行敕近刪定爲三十卷請施行從之上雖絶王承宗朝貢未有詔討之魏博節度使田弘正屯兵於其境承宗屢敗之弘正忿表請擊之上不許表十上乃聽至貝州丙午弘正軍于貝州庚戌東都奏盗焚栢崖倉十一月壽州刺史李文通奏敗淮西兵壬申韓弘請命衆軍合攻淮西從之李光顔烏重㣧敗淮西兵於小溵水拔其城乙亥以嚴綬爲太子少保盗焚㐮州佛寺軍儲盡徙京城積草於四郊以僃火丁丑李文通敗淮西兵於固始戊寅盗焚獻陵寢宫永巷詔發振武兵二千㑹義武軍以討王承宗己丑吐蕃欵隴州塞請互市許之􅀄呉少陽聞信州人呉武陵名邀以爲賔友武陵不答及元濟反武陵以書諭之曰足下勿謂部曲不我欺人情與足下一也足下反天子人亦欲反足下易地而論則其情可知矣丁酉武寧節度使李愿奏敗李師道之衆時師道數遣兵攻徐州敗蕭沛數縣愿悉以歩騎委都押牙温人王智興擊破之十二月甲辰智興又破師道之衆斬首二千餘級逐北至平隂而還愿晟之子也東都防禦使吕元膺請募山棚以衛宫城從之乙丑河東節度使王鍔薨王承宗縱兵四掠幽滄定三鎭皆苦之爭上表請討承宗上欲許之中書侍郎同平章事張弘靖以爲兩役並興恐國力所不支請併力平淮西乃征恒冀上不爲之止弘靖乃求罷十一年春正月己巳以弘靖同平章事充河東節度使乙亥幽州節度使劉緫奏敗成德兵㧞武强斬首千餘級庚辰翰林學士中書舍人錢徽駕部郎中知制誥蕭俛各解職守本官時羣臣請罷兵者衆上患之故黜徽俛以警其餘徽呉人也癸未制削王承宗官爵命河東幽州義武横海魏􅀶昭義六道進討韋貫之屢請先取呉元濟後討承宗曰陛下不見建中之事乎始於討魏及齊而蔡燕趙皆應之卒致朱泚之亂由德宗不能忍數年之憤邑欲太平之功速成故也上不聽甲申盗斷建陵門㦸四十七枝二月西川奏吐蕃賛普卒新賛普可黎可足立乙巳以中書舍人李逢吉爲門下侍郎同平章事逢吉玄道之曾孫也乙卯昭義節度使郗士美奏破成德兵斬首千餘級南詔勸龍晟􅁋虐不道上下怨疾弄棟節度王嵯巔弑之立其弟勸利勸利德嵯巔賜姓䝉氏謂之大容容蠻言兄也己未劉緫破成德兵斬首千餘級荆南節度使袁滋父祖墓在朗山請入朝欲勸上罷兵行至鄧州聞蕭俛錢徽貶官及見上更以必克勸之僅得還鎭辛酉魏􅀶奏敗成德兵㧞其固城乙丑又奏㧞其鵶城三月庚午太后崩辛未敕以國哀諸司公事權取中書門下處分不置攝冡宰壽州團練使李文通奏敗淮西兵於固始㧞􅌯山己夘唐鄧節度使髙霞寓奏敗淮西兵於朗山斬首千餘級焚二柵幽州節度使劉總圍樂壽夏四月庚子李光顔烏重㣧奏敗淮西兵於陵雲柵斬首三千級辛亥司農卿皇甫鏄以兼中承權判度支鏄始以聚歛得幸乙夘劉總奏破成德兵於深州斬首二千五百級乙丑義武節度使渾鎬奏破成德兵於九門殺千餘人鎬瑊之子也宥州軍亂逐刺史駱怡夏州節度使田進討平之五月壬申李光顔烏重㣧奏敗淮西兵於陵雲柵斬首二千餘級六月甲辰髙霞寓大敗於鐵城僅以身免時諸將討淮西者勝則虛張殺獲敗則匿之至是大敗不可掩始上聞中外駭愕宰相入見將勸上罷兵上曰勝負兵家之常今但當論用兵方略察將帥之不勝任者易之兵食不足者助之耳豈得以一將失利遽議罷兵邪於是獨用裴度之言它人言罷兵者亦稍息矣己酉霞寓退保唐州上責髙霞寓之敗霞寓稱李遜應接不至秋七月丁丑貶霞寓爲歸州刺史遜亦左遷恩王􅀓以河南尹鄭權爲山南東道節度使以荆南節度使袁滋爲彰義節度申光蔡唐隨鄧觀察使以唐州爲理所壬午宣武軍奏破郾城之衆二萬殺二千餘人捕虜千餘人田弘正奏破成德兵於南宫殺二千餘人中書侍郎同平章事韋貫之性髙簡好甄别流品又數請罷用兵左補闕張宿毁之於上云其朋黨八月壬寅貫之罷爲吏部侍郎諸軍討王承宗者互相觀望獨昭義節度使郗士美引精兵壓其境己未士美奏大破承宗之衆於柏鄉殺千餘人降者亦如之爲三壘以環柏鄉庚申葬莊憲皇后于豐陵九月乙亥右拾遺獨孤朗坐請罷兵貶興元府㑹曹朗及之子也饒州大水漂失四千七百户丙子以韋貫之爲湖南觀察使猶坐前事也辛巳以吏部侍郎韋顗考功員外郎韋處厚等皆爲逺州刺史張宿䜛之以爲貫之之黨也顗見素之孫處厚夐之九世孫也乙酉李光顔烏重㣧奏㧞呉元濟陵雲柵丁亥光顔又奏㧞石越二柵壽州奏敗殷城之衆㧞六柵冬十一月壬戌朔容管奏黄洞蠻為冦乙丑邕管奏擊黄洞蠻却之復賔蠻等州丙寅加幽州節度使劉緫同平章事李師道聞拔陵雲柵而懼詐請輸􅅃上以力未能討加師道檢校司空王鍔家二奴告鍔子稷改父遺表匿所獻家財上命鞫於内仗遣中使詣東都檢括鍔家財裴度諌曰王鍔既􅃿其所獻之財已爲不少今又因奴告檢括其家臣恐諸將帥聞之各以身後爲憂上遽止使者己巳以二奴付京兆杖殺之庚子以給事中柳公綽爲京兆尹公綽􅀄赴府有神䇿小將躍馬横衝前導公綽駐馬杖殺之明日入對延英上色甚怒詰其專殺之狀對曰陛下不以臣無似使待罪京兆京兆爲輦轂師表今視事之􅀄而小將敢爾唐突此乃輕陛下詔命非獨慢臣也臣知杖無禮之人不知其爲神䇿軍將也上曰何不奏對曰臣職當杖之不當奏上曰誰當奏者對曰本軍當奏若死於街衢金吾街使當奏在坊内左右廵使當奏上無以罪之退謂左右曰汝曹須作意此人朕亦畏之討淮西諸軍近九萬上怒諸將久無功辛巳命知樞宻梁守謙宣慰因留監其軍授以空名告身五百通及金帛以勸死士庚寅先加李光顔等檢校官而詔書切責示以無功必罰辛夘李文通奏敗淮西兵於固始斬首千餘級十二月壬寅程執恭奏敗成德兵於長河斬首千餘級義武節度使渾鎬與王承宗戰屢勝遂引全師壓其境距恒州三十里而軍承宗懼潛遣兵入鎬境焚掠城邑人心始内顧而揺㑹中使督其戰鎬引兵進薄恒州與承宗戰大敗奔還定州丙午詔以易州刺史陳楚爲義武節度使軍中聞之掠鎬及家人衣至於倮露陳楚馳入定州鎭遏亂者歛軍中衣以歸鎬以兵衛送還朝楚定州人張茂昭之甥也丁未以翰林學士王涯爲中書侍郎同平章事袁滋至唐州去斥候止其兵不使犯呉元濟境元濟圍其新興柵滋卑辭以請之元濟由是不復以滋爲意朝廷知之甲寅以太子詹事李愬爲唐隋鄧節度使愬聽之兄也初置淮潁水運使楊子院米自淮隂泝淮入潁至項城入溵輸于郾城以饋討淮西諸軍省汴運之費七萬餘緍己未容管奏黄洞蠻屠巖州資治通鑑卷第二百三十九
