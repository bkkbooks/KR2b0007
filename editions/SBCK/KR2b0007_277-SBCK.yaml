body:
  text: 臣司馬光奉勑編集後唐紀六執徐六月凡二年有竒起上章攝提格盡􅀇黓明宗聖德和武欽孝皇帝中之下長興元年春正月董璋遣兵築七寨於劒門辛巳孟知祥遣趙季良如梓州修好鴻臚少卿郭在徽奏請鑄當五千三千一千大錢朝廷以其指虛爲實無識妄言左遷衞尉少卿同正吳徙平原王澈爲德化王二月乙未朔趙季良還成都謂孟知祥曰董公貪殘好勝志大謀短終爲西川之患都指揮使李仁罕張業欲置宴召知祥先二日有尼告二將謀以宴日害知祥知祥詰之無狀丁酉推始言者軍校都延昌王行本􅆎斬之戊戌就宴盡去左右獨詣仁罕第仁罕叩頭流涕曰老兵惟盡死以報德由是諸將皆親附而服之壬子孟知祥董璋同上表言兩川聞朝廷於閬中建節綿遂益兵無不憂恐上以詔書慰諭之乙卯上祀圓丘大赦改元鳳翔節度使兼中書令李從曮入朝陪祀三月壬申制徙從曮為宣武節度使癸酉吳主立江都王璉為太子丙子以宣徽使朱􅀪昭為鳳翔節度使康福奏克保靜鎮斬李匡賔復以安義為昭義軍帝將立曹淑妃為后淑妃謂王德妃曰吾素病中煩倦於接對妹代我為之德妃曰中宫敵偶至尊誰敢干之庚寅立淑妃為皇后德妃事后恭謹后亦怜之初王德妃因安重誨得進常德之帝性儉約及在位久宫中用度稍侈重誨每規諫妃取外庫錦造地衣重誨切諌引劉后為戒妃由是怨之髙從誨遣使奉表詣吳告以墳墓在中國恐為唐所討吳兵援之不及謝絶之吳遣兵擊之不克董璋恐綿州刺史武䖍􅁉窺其所為夏四月甲午朔表兼行軍司馬囚之府廷宣武節度使符習自恃宿將論議多抗安重誨重誨求其過失奏之丁酉詔習以太子太師致仕戊戌加孟知祥兼中書令夏魯竒同平章事初帝在真定李從珂與安重誨飲酒爭言從珂毆重誨重誨走免既醒悔謝重誨終銜之至是重誨用事自皇子從榮從厚皆敬事不暇時從珂為河中節度使同平章事重誨屢短之於帝帝不聽重誨乃矯以帝命諭河東牙内指揮使楊彦温使逐之是日從珂出城閲馬彦温勒兵閉門拒之從珂使人扣門詰之曰吾待汝厚何為如是對曰彦温非敢負恩受樞密院宣耳請公入朝從珂止于虞鄉遣使以狀聞使者至壬寅帝問重誨曰彦温安得此言對曰此姦人妄言耳宜速討之帝疑之欲誘致彦温訊其事除彦温絳州刺史重誨固請發兵擊之乃命西都留守索自通步軍都指揮使藥彦稠將兵討之帝令彦稠必生致彦温吾欲面訊之召從珂詣洛陽從珂知為重誨所構馳入自明加安重誨兼中書令李從珂至洛陽上責之使歸第絶朝請辛亥索自通等拔河中斬楊彦温癸丑傳首來獻上怒藥彦稠不生致深責之安重誨諷馮道趙鳳奏從珂失守宜加罪上曰吾兒為姦黨所傾未明曲直公輩何為發此言意不欲置之人間邪此皆非公輩意也二人惶恐而退它日趙鳳又言之上不應明日重誨自言之上曰朕昔為小校家貧賴此小兒拾馬糞自贍以至今日為天子曽不能庇之邪卿欲如何處之於卿為便重誨曰陛下父子之間臣何敢言惟陛下裁之上曰使閑居私第亦可矣何用復言丙辰以索自通為河中節度使自通至鎮承重誨指籍軍府甲仗數上之以為從珂私造賴王德妃居中保䕶從珂由是得免士大夫不敢與從珂往來惟禮部郎中史館修撰吕琦居相近時往見之從珂每有奏請皆咨琦而後行戊午帝加尊號曰聖明神武文德恭孝皇帝安重誨言昭義節度使王建立過魏州有揺衆之語五月丙寅制以太􅀓致仕董璋閲集民兵皆剪髪黥面復於劒門北置永定闗布列烽火孟知祥累表請割雲安等十三鹽監􅀠西川以鹽直贍寧江屯兵辛卯許之六月癸巳朔日有食之辛亥敕防禦團練使刺史行軍司馬節度副使自今皆自朝廷除之諸道無得奏薦董璋遣兵掠遂閬鎮戍秋七月戊辰兩川以朝廷繼遣兵屯遂閬復有論奏自是東北商旅少敢入蜀八月乙未捧聖軍使李行德十將張儉引告密人邊彦温告安重誨發兵云欲自討淮南又引占相者問命帝以問侍衞都指揮使安從進藥彦稠二人曰此姦人欲離間陛下勲舊耳重誨事陛下三十年幸而富貴何苦謀反臣等請以宗族保之帝乃斬彦温召重誨慰撫之君臣相泣以前忠武節度使張延朗行工部尚書充三司使三司使之名自此始吳徐知誥以海州都指揮使王傳拯有威名得士心值團練使陳宣罷歸知誥許以傳拯代之既而復遣宣還海州徴傳拯還江都傳拯怒以為宣毁之己亥帥麾下入辭宣因斬宣焚掠城郭帥其衆五千來奔知誥曰是吾過也免其妻子漣水制置使王巖將兵入海州以巖為威衞大將軍知海州傳拯綰之子也其季父輿為光州刺史傳拯遣間使持書至光州輿執之以聞因求罷歸知誥以輿為控鶴都虞􅀱時政在徐氏典兵宿衞者尤難其人知誥以輿重厚慎密故用之壬寅趙鳳奏切聞近有姦人誣陷大臣揺國柱石行之未盡帝乃收李行德張儉皆族之立皇子從榮為秦王丙辰立從厚為宋王董璋之子光業為宫苑使在洛陽璋與書曰朝廷割吾支郡為節鎮屯兵三千是殺我必矣汝見樞要為吾言如朝廷更發一騎入斜谷吾必反與汝訣矣光業以書示樞密承㫖李䖍徽未幾朝廷又遣别將荀咸乂將兵戍閬州光業謂䖍徽曰此兵未至吾父必反吾不敢自愛恐煩朝廷調發願止此兵吾父保無它䖍徽以告安重誨重誨不從璋聞之遂反利閬遂三鎮以聞且言已聚兵將攻三鎮重誨曰臣久知其如此陛下含容不討耳帝曰我不負人人負我則討之九月癸亥西川進奏官蘇愿白孟知祥云朝廷欲大發兵討兩川知祥謀於副使趙季良季良請以東川先取遂閬然後併兵守劒門則大軍雖來吾無内顧之憂矣知祥從之遣使約董璋同舉兵璋移檄利閬遂三鎮數其離間朝廷引兵擊閬州庚午知祥以都指揮使李仁罕為行營都部署漢州刺史趙廷隠副之簡州刺史張業為先鋒指揮使將兵三萬攻遂州别將牙内都指揮使矦􅀪實先登指揮使孟思恭將兵四千㑹璋攻閬州安重誨久專大權中外惡之者衆王德妃及武德使孟漢瓊浸用事數短重誨於上重誨内憂懼表解機務上曰朕無間於卿誣罔者朕既誅之矣卿何為爾甲戌重誨復面奏曰臣以寒賤致位至此忽為人誣以反非陛下至明臣無種矣由臣才薄任重恐終不能鎮浮言願賜一鎮以全餘生上不許重誨求之不已上怒曰聽卿去朕不患無人前成德節度使范延光勸上留重誨且曰重誨去誰能代之上曰卿豈不可延光曰臣受驅策日淺且才不逮重誨何敢當此上遣孟漢瓊詣中書議重誨事馮道曰諸公果愛安令宜解其樞務為便趙鳳曰公失言乃奏大臣不可輕動東川兵至閬州諸將皆曰董璋久蓄反謀以金帛㗖其士卒鋭氣不可當宜深溝髙壘以挫之不過旬日大軍至賊自走矣李仁矩曰蜀兵懦弱安能當我精卒遂出戰兵未交而潰歸董璋晝夜攻之庚辰城陷殺仁矩滅其族初璋為梁將指揮使姚洪嘗􅀠麾下至是將兵千人戍閬州璋密以書誘之洪投諸厠城陷璋執洪而讓之曰吾自行間奬拔汝今日何相負洪曰老賊汝昔為李氏奴掃馬糞得臠炙感恩無窮今天子用汝為節度使何負於汝而反邪汝猶負天子吾受汝何恩而云相負哉汝奴材固無恥吾義士豈忍為汝所為乎吾寧為天子死不能與人奴並生璋怒然鑊於前令壯士十人刲其肉自啗之洪至死罵不絶聲帝置洪二子於近衞厚給其家甲申以范延光為樞密使安重誨如故丙戌下制削董璋官爵興兵討之丁亥以孟知祥兼西南面供饋使以天雄節度石敬瑭為東川行營都招討使以夏魯竒為之副璋使孟思恭分兵攻集州思恭輕進敗歸璋怒遣還成都知祥免其官戊子以石敬塘權知東川事庚寅以右武衞上將軍王思同為西都留守兼行營馬步都虞􅀱為伐蜀前鋒漢主遣其將梁克貞李守鄘攻交州拔之執靜海節度使曲承美以歸以其將李進守交州冬十月癸巳李仁罕圍遂州夏魯竒嬰城固守孟知祥命都押牙髙敬柔帥資州義軍二萬人築長城環之魯竒遣馬軍都指揮使康文通出戰文通聞閬州陷遂以其衆降於仁罕戊戌董璋引兵趣利州遇􅀨糧運不繼還閬州知祥聞之驚曰比破閬中正欲徑取利州其帥不武必望風遁去吾獲其倉廩據漫天之險北軍終不能西救武信今董公僻處閬州逺棄劒閣非計也欲遣兵三千助守劒門璋固辭曰此巳有備錢鏐因朝廷冊閩王使者裴羽還附表引咎其子傳瓘及將佐屢為鏐上表自訴癸卯敕聽兩浙綱使自便以宣徽北院使馮贇為左衞上將軍北都留守丁未族誅董光業楚王殷寢疾遣使詣闕請傳位於其子希聲朝廷疑殷已死辛亥以希聲為起復武安節度使兼侍中孟知祥以故蜀鎮江節度使張武為峽路行營招收討伐使將水軍趣夔州以左飛棹指揮使袁彦超副之癸丑東川兵陷徴合巴蓬果五州丙辰吳左僕射同平章事嚴可求卒徐知誥以其長子大將軍景通為兵部尚書參政事知誥將出鎭金陵故也漢將梁克貞入占城取其寶貨以歸十一月戊辰張武至渝州刺史張環降之遂取瀘州遣先鋒將朱偓分兵趣黔涪己巳楚王殷卒遺命諸子兄弟相繼寘劒於祠堂曰違吾命者戮之諸將議遣兵守四境然後發喪兵部侍郎黄損曰吾喪君有君何備之有宜遣使詣鄰道告終稱嗣而已石敬瑭入散闗州刺史王􅀪贄瀘州刺史馮暉與前鋒馬步都虞􅀱王思同步軍都指揮使趙在禮引兵出人頭山後過劒門之南還襲劒門壬申克之殺東川兵三千人獲都指揮使齊彦温據而守之暉魏州人也甲戌􅀪贄等破劒州而大軍不繼乃焚其廬舍取其資糧還保劒門乙亥詔削孟知祥官爵己卯董璋遣使至成都告急知祥聞劒門失守大懼曰董公果誤我庚辰遣牙内都指揮使李肈將兵五千赴之戒之曰爾倍道兼行先據劒州北軍無能為也又遣使詣遂州令趙廷隠將萬人㑹屯劒州又遣故蜀永平節度使李筠將兵四千趣龍州守要害時天寒士卒恐懼觀望不進廷隠流涕諭之曰今北軍勢盛汝曹不力戰却敵則妻子皆為人有矣衆心乃奮董璋自閬州將兩川兵屯木馬寨先是西川牙内指揮使太谷龎福誠昭信指揮使謝鍠屯來蘇村聞劒門失守相謂曰使北軍更得劒州則二蜀勢危矣遽引部兵千餘人間道趣劒州始至官軍萬餘人自北山大下㑹日暮二人謀曰衆寡不敵逮明則吾屬無遺矣福誠夜引兵數百升北山大譟於官軍營後鍠帥餘衆操短兵自其前急擊之官軍大驚空營遁去復保劒門十餘日不出孟知祥聞之喜曰吾始謂􅀪贄等克劒門徑據劒州堅守其城或引兵直趣梓州董公必棄閬州奔還我軍失援亦須解遂州之圍如此則内外受敵兩川震動勢可憂危今廼焚毁劒州運糧東歸劒門頓兵不進吾事濟矣官軍分道趣文州將襲龍州為西川定逺指揮使潘福超義勝都頭太原沙延祚所敗甲申張武卒於渝州知祥命袁彦超代將其兵朱偓將至涪州武泰節度使楊漢賔棄黔南奔忠州偓追至豐都還取涪州知祥以成都支使崔善權武泰留後董璋遣前陵州刺史王暉將兵三千㑹李肈等分屯劒州南山丙戌馬希聲襲位稱遺命去建國之制復藩鎮之舊契丹東丹王突欲自以失職帥部曲四十人越海自登州來奔十二月壬辰石敬瑭至劒門乙未進屯劒州北山趙廷隠陳于牙城後山李肈王暉陳于河橋敬瑭引步兵進擊廷隠廷隠擇善射者五百人伏敬瑭歸路按甲待之矛稍欲相及乃揚旗鼓譟擊之北軍退走顛墜下山俘斬百餘人敬瑭又使騎兵衝河橋李肈以彊弩射之騎兵不能進薄暮敬瑭引去廷隠引兵躡之與伏兵合擊敗之敬瑭還屯劒門癸卯夔州奏復取開州庚戌以武安節度使馬希聲為武安靜江節度使加兼中書令石敬瑭征蜀未有功使者自軍前來多言道險狹進兵甚難闗右之人疲於轉餉往往竄匿山谷聚為盜賊上憂之壬子謂近臣曰誰能辦吾事者吾當自行耳安重誨曰臣職忝機密軍威不振臣之罪也臣請自往督戰上許之重誨即拜辭癸丑遂行日馳數百里西方藩鎮聞之無不惶駭錢帛芻糧晝夜輦運赴利州人畜斃踣於山谷者不可勝紀時上已踈重誨石敬瑭本不欲西征及重誨離上側乃敢累表奏論以為蜀不可伐上頗然之西川兵先戍夔州者千五百人上悉縱歸二年春正月壬戌孟知祥奉表謝庚午李仁罕陷遂州夏魯竒自殺癸酉石敬瑭復引兵至劒州屯于北山孟知祥梟夏魯竒首以示之魯竒二子從敬瑭在軍中泣請往取其首葬之敬瑭曰知祥長者必葬而父豈不愈於身首異處乎既而知祥果收葬之敬瑭與趙廷隠戰不利復還劒門丙戌加髙從誨兼中書令東川歸合州于武信軍初鳳翔節度使朱弘昭諂事安重誨連得大鎮重誨過鳳翔弘昭迎拜馬首館於府舍延入寢室妻子羅拜奉進酒食禮甚謹重誨為弘昭泣言讒人交構幾不免頼主上明察得保宗族重誨既去􅀪昭即奏重誨怨望有惡言不可令至行營恐奪石敬瑭兵柄又遺敬瑭書言重誨舉措孟浪若至軍前恐將士疑駭不戰自潰宜逆止之敬瑭大懼即上言重誨至恐人情有變宜急徴還宣徽使孟漢瓊自西方還亦言重誨過惡有詔召重誨還二月己丑朔石敬瑭以遂閬既陷糧運不繼燒營北歸軍前以告孟知祥知祥匿其書謂趙季良曰北軍漸進奈何季良曰不過綿州必遁知祥問其故曰我逸彼勞彼懸軍千里糧盡能無遁乎知祥大笑以書示之安重誨至三泉得詔亟歸過鳳翔朱􅀪昭不内重誨懼馳騎而東兩川兵追石敬瑭至利州壬辰昭武節度使李彦琦弃城走甲午兩川兵入利州孟知祥以趙廷隠為昭武留後廷隠遣使密言於知祥曰董璋多詐可與同憂可與同樂佗日必為公患因其至劒州勞軍請圖之并兩川之衆可以得志於天下知祥不許璋入廷隠營留宿而去廷隠歎曰不從吾謀禍難未巳庚子孟知祥以武信留後李仁罕為峽路行營招討使使將水軍東略地辛丑以樞密使兼中書令安重誨為䕶國節度使趙鳳言於上曰重誨陛下家臣其心終不叛主但以不能周防為人所讒陛下不察其心重誨死無日矣上以為朋黨不悦乙巳趙廷隠李肈自劒州引還留兵五千戍利州丙午董璋亦還東川留兵三千戍果閬丁巳李仁罕陷忠州吳徐知誥欲以中書侍郎内樞使宋齊丘為相齊丘自以資望素淺欲以退讓為髙謁歸洪州葬父因入九華山止于應天寺啔求隠居吳主下詔徴之知誥亦以書招之皆不至知誥遣其子景通自入山敦諭齊丘始還朝除右僕射致仕更命應天寺曰徴賢寺三月己未朔李仁罕陷萬州庚申陷雲安監辛酉賜契丹東丹王突欲姓東丹名慕華以為懐化節度使瑞慎等州觀察使其部曲及先所俘契丹將􅅥隱等皆賜姓名􅅥隱姓狄名懐惠李仁罕至夔州寧江節度使安崇阮棄鎮與楊漢賔自均房逃歸壬戌仁罕陷夔州帝既解安重誨樞務乃召李從珂泣謂曰如重誨意汝安得復見吾丙寅以從珂為左衞大將軍壬申横海節度使同平章事孔循卒乙酉復以錢鏐為天下兵馬都元帥尚父吳越國王遣監門上將軍張籛往諭㫖以曏日致仕安重誨矯制也丁亥以太常卿李愚為中書侍郎同平章事夏四月辛卯以王德妃為淑妃閩奉國節度使兼中書令王延稟聞閩王延鈞有疾以次子繼昇知建州留後帥建州刺史繼雄將水軍襲福州癸卯延稟攻西門繼雄攻東門延鈞遣樓船指揮使王仁達將水軍拒之仁達伏甲舟中偽立白幟請降繼雄喜屏左右登仁達舟慰撫之仁達斬繼雄梟首於西門延稟方縱火攻城見之慟哭仁達因縱兵擊之衆潰左右以斛舁延稟而走甲辰追擒之延鈞見之曰果煩老兄再下延稟慙不能對延鈞囚于别室遣使者如建州招撫其黨其黨殺使者奉繼昇及弟繼倫奔吳越仁達延鈞從子也以宣徽北院使趙延壽為樞密使己酉天雄節度使同平章事石敬瑭兼六軍諸衞副使辛亥以朱􅀪昭為宣徽南院使五月閩王延鈞斬王延稟於市復其姓名曰周彦琛遣其弟都教練使延政如建州撫慰吏民丁卯罷畆税麴錢城中官造麴減舊半價鄉村聽百姓自造民甚便之己卯以孟漢瓊知内侍省事充宣徽北院使漢瓊本趙王鎔奴也時范延光趙延壽雖為樞密使懲安重誨以剛愎得罪每於政事不敢可否獨漢瓊與王淑妃居中用事人皆憚之先是宫中須索稍踰常度重誨輒執奏由是非分之求殆絶至是漢瓊直以中宫之命取府庫物不復闗由樞密院及三司亦無文書所取不可勝紀辛巳以相州刺史孟鵠為左驍衞大將軍充三司使昭武留後趙廷隠自成都赴利州踰月請兵進取興元及秦鳳孟知祥以兵疲民困不許䕶國節度使兼中書令安重誨内不自安表請致仕閏月庚寅制以太子太師致仕是日其子崇賛崇緒逃奔河中壬辰以保義節度使李從璋為䕶國節度使甲午遣步軍指揮使藥彦稠將兵趣河中安崇賛等至河中重誨驚曰汝安得來既而曰吾知之矣此非渠意為人所使耳吾以死徇國夫復何言乃執二子表送詣闕明日有中使至見重誨慟哭久之重誨問其故中使曰人言令公有異志朝廷已遣藥彦稠將兵至矣重誨曰吾受國恩死不足報敢有異志更煩國家發兵貽主上之憂罪益重矣崇賛等至陜有詔繫獄皇城使翟光鄴素惡重誨帝遣詣河中察之曰重誨果有異志則誅之光鄴至河中李從璋以甲士圍其第自入見重誨拜于庭下重誨驚降階荅拜從璋奮檛擊其首妻張氏驚救亦檛殺之奏至己亥下詔以重誨離間孟知祥董璋錢鏐為重誨罪又誣其欲自擊淮南以圖兵柄遣元隨竊二子歸本道并二子誅之丙午帝遣西川進奏官蘇愿東川軍將劉澄各還本道諭以安重誨專命興兵致討今巳伏辜六月乙丑復以李從珂同平章事充西都留守丙子命諸道均民田税閩王延鈞好神仙之術道士陳守元巫者徐彦林興盛韜共誘之作寶皇宫極土木之盛以守元為宫主秋九月己亥更賜東丹慕華姓名曰李賛華吳鎮南節度使同平章事徐知諫卒以諸道副都綂鎮海節度使守中書令徐知詢代之賜爵東海郡王徐知誥之召知詢入朝也知諫豫其謀知詢遇其喪於塗撫棺泣曰弟用心如此我亦無憾然何面見先王於地下乎辛丑加樞密使范延光同平章事辛亥敕解縱五坊鷹隼内外無得更進馮道曰陛下可謂仁及鳥獸上曰不然朕昔嘗從武皇獵時秋稼方熟有獸逸入田中遣騎取之比及得獸餘稼無幾以是思之獵有損無益故不為耳冬十月丁卯洋州指揮使李進唐攻通州拔之壬午以王延政為建州刺史十一月甲申朔日有食之癸巳蘇愿至成都孟知祥聞甥妷在朝廷者皆無恙遣使告董璋欲與之俱上表謝罪璋怒曰孟公親戚皆完固宜歸附璋已族滅尚何謝為詔書皆在蘇愿腹中劉澄安得豫聞璋豈不知邪由是復為怨敵乙未李仁罕自夔州引兵還成都吳中書令徐知誥表稱輔政嵗久請歸老金陵乃以知誥為鎮海寧國節度使鎮金陵餘官如故緫録朝政如徐温故事以其子兵部尚書㕘政事景通為司徒同平章事知中外左右諸軍事留江都輔政以内樞使同平章事王令謀為左僕射兼門下侍郎以宋齊丘為右僕射兼中書侍郎並同平章事兼内樞使以佐景通賜德勝節度使張崇爵清河王崇在廬州貪暴州人苦之屢嘗入朝厚以貨結權要由是常得還鎮為廬州患者二十餘年十二月甲寅朔初聽百姓自鑄農器并雜鐵器每田二畒夏秋輸農具三錢武安靜江節度使馬希聲聞梁太祖嗜食鷄慕之既襲位日殺五十雞為膳居喪無戚容庚申葬武穆王于衡陽將發引頓食雞􅌜數盤前吏部侍郎潘起譏之曰昔阮籍居喪食蒸豚何代無賢癸亥徐知誥至金陵昭武留後趙廷隠白孟知祥以利州城塹已完頃在劒州與牙内都指揮使李肈同功願以昭武讓肈知祥襃諭不許廷隠三讓癸酉知祥召廷隠還成都以肇代之閩陳守元等稱寶皇之命謂閩王延鈞曰苟能避位受道當為天子六十年延鈞信之丙子命其子節度副使繼鵬權軍府事延鈞避位受籙道名􅀇錫愛州將楊廷藝養假子三千人圖復交州漢交州守將李進知之受其賂不以聞是嵗廷藝舉兵圍交州漢主遣承㫖程寶將兵救之未至城陷進逃歸漢主殺之寶圍交州廷藝出戰寶敗死三年春正月樞密使范延光言自靈州至邠州方渠鎮使臣及外國入貢者多為党項所掠請發兵擊之己丑遣靜難節度使藥彦稠前朔方節度使康福將步騎七千討党項乙未孟知祥妻福慶長公主卒孟知祥以朝廷恩意優厚而董璋塞綿州路不聽遣使入謝與節度副使趙季良等謀欲發使自峽江上表掌書記李昊曰公不與東川謀而獨遣使則異日負約之責在我矣乃復遣使語之璋不從二月趙季良與諸將議遣昭武都監太原髙彦儔將兵攻取壁州以絶山南兵轉入山後諸州者孟知祥謀於僚佐李昊曰朝廷遣蘇愿等西歸未嘗報謝今遣兵侵軼公若不顧墳墓甥妷則不若傳檄舉兵直取梁洋安用壁州乎知祥乃止季良由是惡昊辛未初令國子監校定九經雕印賣之藥彦稠等奏破党項十九族俘二千七百人賜髙從誨爵渤海王吳徐知誥作禮賢院於府舍聚圖書延士大夫與孫晟及海陵陳覺談議時事孟知祥三遣使説董璋以主上加禮於两川苟不奉表謝罪恐復致討璋不從三月辛丑遣李昊詣梓州極論利害璋見昊詬怒不許昊還言於知祥曰璋不通謀議且有窺西川之志公宜備之甲辰閩王延鈞復位吳越武肅王錢鏐疾謂將吏曰吾疾必不起諸兒皆愚懦誰可為帥者衆泣曰兩鎮令公仁孝有功孰不愛戴鏐乃悉出印鑰授傳瓘曰將吏推爾宜善守之又曰子孫善事中國勿以易姓廢事大之禮庚戌卒年八十一傳瓘與兄弟同幄行喪内牙指揮使陸仁章曰令公嗣先王霸業將吏旦暮趨謁當與諸公子異處乃命主者更設一幄扶傳瓘居之告將吏曰自今惟謁令公禁諸公子從者無得妄入晝夜警衞未嘗休息鏐末年左右皆附傳瓘獨仁章數以事犯之至是傳瓘勞之仁章曰先王在位仁章不知事令公今日盡節猶事先王也傳瓘嘉歎久之傳瓘既襲位更名元瓘兄弟名傳者皆更為元以遺命去國儀用藩鎮法除民田荒絶者租税命處州刺史曹仲達權知政事置擇能院掌選舉殿最以浙西營田副使沈崧領之内牙指揮使富陽劉仁􅂎及陸仁章久用事仁章性剛仁􅂎好毁短人皆為衆所惡一日諸將共詣府門請誅之元瓘使從子仁俊諭之曰二將事先王久吾方圖其功汝曹乃欲逞私憾而殺之可乎吾為汝王汝當稟吾命不然吾當歸臨安以避賢路衆懼而退乃以仁章為衢州刺史仁􅂎為湖州刺史中外有上書告訐者元瓘皆置不問由是將吏輯睦初契丹舍利萴刺與􅅥隱皆為趙徳鈞所擒契丹屢遣使請之上謀於羣臣德鈞等皆曰契丹所以數年不犯邊數求和者以此輩在南故也縱之則邊患復生上以問兾州刺史楊檀對曰萴刺契丹之驍將曏助王都謀危社稷幸而擒之陛下免其死為賜已多契丹失之如喪手足彼在朝廷數年知中國虛實若得歸為患必深彼纔出塞則南向發矢矣恐悔之無及上乃止檀沙陀人也上欲授李賛華以河南藩鎮羣臣皆以為不可上曰吾與其父約為昆弟故賛華歸我吾老矣後世繼體之君雖欲招之其可致乎夏四月癸亥以賛華為義成節度使為選朝士為僚屬輔之賛華但優遊自奉不豫政事上嘉之雖時有不法亦不問以莊宗後宫夏氏妻之賛華好飲人血姬妾多刺臂以吮之婢僕小過或抉目或刀刲火灼夏氏不忍其殘奏離昬為尼乙丑加宋王從厚兼中書令東川節度使董璋㑹諸將謀襲成都皆曰必克前陵州刺史王暉曰劒南萬里成都為大時方盛夏師出無名必無成功璋不從孟知祥聞之遣馬軍都指揮使潘仁嗣將三千人詣漢州詗之璋入境破白楊林鎮執戍將武􅀪禮聲勢甚盛知祥憂之趙季良曰璋為人勇而無恩士卒不附城守則難克野戰則成擒矣今不守巢穴公之利也璋用兵精鋭皆在前鋒公宜以羸兵誘之以勁兵待之始雖小衂後必大捷璋素有威名今舉兵暴至人心危懼公當自出禦之以彊衆心趙廷隠以季良言為然曰璋輕而無謀舉兵必敗當為公擒之辛巳以廷隠為行營馬步軍都部署將三萬人拒之五月壬午朔廷隠入辭董璋檄書至又有遺季良廷隠及李肈書誣之云季良廷隠與己通謀召己令來知祥以書授廷隠廷隠不視投之於地曰不過為反間欲令公殺副使與廷隠耳再拜而行知祥曰事必濟矣肈素不知書視之曰璋教我反耳囚其使者然亦擁衆為自全計璋兵至漢州潘仁嗣與戰于赤水大敗為璋所擒璋遂克漢州癸未知祥留趙季良髙敬柔守成都自將兵八千趣漢州至彌牟鎮趙廷隠陳於鎮北甲申遲明廷隠陳於雞蹤橋義勝定逺都知兵馬使張公鐸陳於其後俄而璋望西川兵盛退陳於武矦廟下璋帳下驍卒大譟曰日中曝我輩何為何不速戰璋乃上馬前鋒始交東川右廂馬步都指揮使張守進降於知祥言璋兵盡此無復後繼當急擊之知祥登髙冢督戰左明義指揮使毛重威左衝山指揮使李瑭守雞蹤橋皆為東川兵所殺趙廷隠三戰不利牙内都指揮副使矦弘實兵亦却知祥懼以馬箠指後陳張公鐸帥衆大呼而進東川兵大敗死者數千人擒東川中都指揮使元璝牙内副指揮使董光演等八十餘人璋拊膺曰親兵皆盡吾何依乎與數騎遁去餘衆七千人降復得潘仁嗣知祥引兵追璋至五侯津東川馬步都指揮使元瓌降西川兵入漢州府第求璋不得士卒爭璋軍資故璋走得免趙廷隠追至赤水又降其卒三千人是夕知祥宿雒縣命李昊草牓諭東川吏民及草書勞問璋且言將如梓州詢負約之由請見伐之罪乙酉知祥㑹廷隠于赤水遂西還命廷隠將兵攻梓州璋至梓州肩輿而入王暉迎問曰太尉全軍出征今還者無十人何也璋涕泣不能對至府第方食暉與璋從子牙内都虞侯延浩帥兵三百大譟而入璋引妻子登城子光嗣自殺璋至北門樓呼指揮使潘稠使討亂兵稠引十卒登城斬璋首及取光嗣首以授王暉暉舉城迎降趙廷隠入梓州封府庫以待知祥李肈聞璋敗始斬其使以聞丙戌知祥入成都丁亥復將兵八千如梓州至新都趙廷隠獻董璋首己丑發􅀇武趙廷隠帥東川將吏來迎康福奏党項鈔盜者已伏誅餘皆降附壬辰孟知祥有疾癸巳疾甚中門副使王處回侍左右庖人進食必空器而出以安衆心李仁罕自遂州來趙廷隠迎于板橋仁罕不稱東川之功侵侮廷隠廷隠大怒乙未知祥疾瘳丁酉入梓州戊戌犒賞將士既罷知祥謂李仁罕趙廷隠曰二將誰當鎮此仁罕曰令公再與蜀州亦行耳廷隠不對知祥愕然退命李昊草牒俟二將有所推則命一人為留後昊曰昔梁祖莊宗皆兼領四鎮今二將不讓惟公自領之為便耳公宜亟還府更與趙僕射議之己亥契丹使者迭羅卿辭歸國上曰朕志在安邊不可不少副其求乃遣萴骨舍利與之俱歸契丹以不得萴刺自是數寇雲州及振武孟知祥命李仁罕歸遂州留趙廷隠東川巡檢以李昊行梓州軍府事昊曰二虎方爭僕不敢受命願從公還乃以都押牙王彦銖為東川監押癸卯知祥至成都趙廷隠尋亦引兵西還知祥謂李昊曰吾得東川為患益深昊請其故知祥曰自吾發梓州得仁罕七狀皆云公宜自領東川不然諸將不服廷隠言本不敢當東川因仁罕不讓遂有爭心耳君為我曉廷隠復以閬州為保寧軍益以果蓬渠開四州往鎮之吾自領東川以絶仁罕之望廷隠猶不平請與仁罕􅃲勝者為東川昊深解之乃受命六月以廷隠為保寧留後戊午趙季良帥將吏請知祥兼鎮東川許之季良等又請知祥稱王權行制書賞功臣不許董璋之起兵攻知祥也山南西道節度使王思同以聞范延光言於上曰若兩川併於一賊撫衆守險則取之益難宜及其交爭早圖之上命思同以興元之兵密規進取未幾聞璋敗死延光曰知祥雖據全蜀然士卒皆東方人知祥恐其思歸為變亦欲倚朝廷之重以威其衆陛下不屈意撫之彼則無從自新上曰知祥吾故人為人離間至此何屈意之有乃遣供奉官李存壞賜知祥詔曰董璋狐狼自貽族滅卿丘園親戚皆保安全所宜成家世之美名守君臣之大節存瓌克寧之子知祥之甥也閩王延鈞謂陳守元曰為我問寶皇既為六十年天子後當何如明日守元入白昨夕奏章得寶皇㫖當為大羅仙主徐彦等亦曰北廟崇順王嘗見寶皇其言與守元同延鈞益自負始謀稱帝表朝廷云錢鏐卒請以臣為吳越王馬殷卒請以臣為尚書令朝廷不報自是職貢遂絶資治通鑑卷第二百七十七
