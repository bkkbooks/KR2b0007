front:
  text: 楊俊卒子世立二月燕人尊可足渾后爲皇大后以太原王恪爲太宰專録朝政上庸王評爲太傅陽騖爲太保慕輿根爲太師參輔朝政根性木强自恃先朝勲舊心不服恪舉動倨傲時太后可足渾氏頗預外事根欲爲亂乃言於恪曰今主上㓜冲母后干政殿下宐防意外之變思有以自全且定天下者殿下之功也兄亡弟及古今成灋俟畢山陵宐廢主上爲王殿下自踐尊位以爲大燕無窮之福恪曰公醉邪何言之悖也吾與公受先帝遺詔云何而遽有此議根愧謝而退恪以告呉王垂垂勸恪誅之恪曰今新遭大喪二鄰觀釁而宰輔自相誅夷恐乖遠近之望且可忍之祕書監皇甫真言於恪曰根本庸豎過䝉先帝厚恩引參顧命而小人無識自國哀已來驕狠日甚將成禍亂明公今日居周公之地當爲社稷深謀早爲之所恪不聽根又言於可足渾氏及燕主暐曰太宰太傅將謀不軌臣請帥禁兵以誅之可足渾氏將從之暐曰二公國之親賢先帝選之託以孤嫠必不肯爾安知非太師欲爲亂也乃止根又思戀東土言於可足渾氏及暐曰今天下蕭條外㓂非一國大憂深不如還東恪聞之乃與太傅評謀宻奏根罪狀使右衞將軍􅀓顔就内省誅根并其妻子黨與大赦是時新遭大喪誅夷狼籍内外恟懼太宰恪舉止如常人不見其有憂色每出入一人步從或說以宐自嚴備恪曰人情方懼當安重以鎮之柰何復自驚擾衆將何仰由是人心稍定恪雖綜大任而朝廷之禮兢兢嚴謹每事必與司徒評議之未嘗專决虛心待士諮詢善道量才授任人不踰位官屬朝臣或有過失不顯其狀隨宐他叙不令失倫唯以此爲貶時人以爲大愧莫敢犯者或有小過自相責曰尔復欲望宰公遷官邪朝廷初聞燕主儁卒皆以爲中原可圖桓温曰慕容恪尚在憂方大耳三月己卯葬燕主儁于龍陵謚曰景昭皇帝廟號烈祖所徵郡國兵以燕朝多難互相驚動往往擅自散歸自鄴以南道路斷塞太宰恪以呉王垂爲使持節征南將軍都督河南諸軍事兖州牧荆州刺史鎮梁國之蠡臺孫希爲并州刺史傅顔爲護軍將軍帥騎二萬觀兵河南臨淮而還境内乃安希泳之弟也匈奴劉衞辰遣使降秦請田内地春來秋返秦王堅許之夏四月雲中護軍賈雍遣司馬徐贇帥騎襲之大獲而還堅怒曰朕方以恩信懐戎狄而汝貪小利以敗之何也黜雍以白衣領職遣使還其所獲慰撫之衞辰於是入居塞内貢獻相尋夏六月代王什翼犍妃慕容氏卒秋七月劉衞辰如代會葬因求㛰什翼犍以女妻之
