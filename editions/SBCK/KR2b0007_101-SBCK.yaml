body:
  text: 八月辛丑朔日有食之既謝安少有重名前後徵辟皆不就寓居會稽以山水文籍自娱雖爲布衣時人皆以公輔期之士大夫至相謂曰安石不出當如蒼生何安每遊東山常以妓女自隨司徒昱聞之曰安石既與人同樂必不得不與人同憂召之必至安妻劉惔之妹也見家門貴盛而安獨静退謂曰丈夫不如此也安掩鼻曰恐不免耳及弟萬廢黜安始有仕進之志時已年四十餘征西大將軍桓温請爲司馬安乃赴召温大喜深禮重之冬十月烏桓獨孤部鮮卑没弈于各帥衆數萬降秦秦王堅處之塞南陽平公融諫曰戎狄人面獸心不知仁義其稽顙内附實貪地利非懷德也不敢犯邊實憚兵威非感恩也今處之塞内與民雜居彼窺郡縣虚實必爲邊患不如徙之塞外以防未然堅從之十一月封桓温爲南郡公温弟沖爲豐城縣公子濟爲臨賀縣公燕太宰恪欲以李績爲右僕射燕主暐不許恪屢以爲請暐曰萬機之事皆委之叔父伯陽一人暐請獨裁出爲章武太守以憂卒五年春正月戊戌大赦劉衞辰掠秦邊民五十餘口爲奴婢以獻於秦秦王堅責之使歸所掠衞辰由是叛秦專附於代東安簡伯郗曇卒二月以東陽太守范汪都督徐兖青冀幽五州諸軍事兼徐兖二州刺史平陽人舉郡降燕燕以建威將軍段剛爲太守遣督護韓苞將兵共守平陽方士丁進有寵於燕主儁欲求媚於太宰恪說恪令殺太傅評恪大怒奏収斬之高昌卒燕河内太守吕護并其衆遣使來降拜護冀州刺史護欲引晉兵以襲鄴三月燕太宰恪將兵五萬冠軍將軍皇甫真將兵萬人共討之燕兵至野王護嬰城自守護軍將軍傅顔請急攻之以省大費恪曰老賊經變多矣觀其守備未易猝攻頃攻黎陽多殺精銳卒不能㧞自取困辱護内無蓄積外無救援我深溝高壘坐而守之休兵養士離閒其黨於我不勞而賊勢日蹙不過十旬取之必矣何爲多殺士卒以求旦夕之功乎乃築長圍守之夏四月桓温以其弟黄門郎豁督沔中七郡諸軍事兼新野義城二郡太守將兵取許昌破燕將慕容塵涼驃騎大將軍宋混疾甚張玄靚及其祖母馬氏往省之曰將軍萬一不幸寡婦孤兒將何所託欲以林宗繼將軍可乎混曰臣子林宗幼弱不堪大任殿下儻未棄臣門臣弟澄政事愈於臣但恐其儒緩機事不稱耳殿下䇿勵而使之可也混戒澄及諸子曰吾家受國大恩當以死報無恃勢位以驕人又見朝臣皆戒之以忠貞及卒行路爲之揮涕玄靚以澄爲領軍將軍輔政五月丁巳帝崩無嗣皇太后令曰琅邪王丕中興正統義望情地莫與爲比其以王奉大統於是百官備灋駕迎于琅邪第庚申卽皇帝位大赦壬戌改封東海王弈爲琅邪王秋七月戊午葬穆帝于永平陵廟號孝宗燕人圍野王數月吕護遣其將張興出戰􅀓顔擊斬之城中日蹙皇甫真戒部將曰護勢窮犇突必擇虛隙而投之吾所部士卒多羸器甲不精宐深爲之備乃多課櫓楯親察行夜者護食盡果夜悉精銳趨真所部突圍不得出太宰恪引兵擊之護衆死傷殆盡棄妻子犇滎陽恪存撫降民給其廩食徙士人將帥於鄴自餘各隨所樂以護參軍廣平梁琛爲中書著作郎九月戊申立妃王氏爲皇后后濛之女也穆帝何皇后稱穆皇后居永安宫涼右司馬張邕惡宋澄專政起兵攻澄殺之并滅其族張玄靚以邕爲中護軍叔父天錫爲中領軍同輔政張平襲燕平陽殺段剛韓苞又攻鴈門殺太守單南旣而爲秦所攻平復謝罪於燕以求救燕人以平反覆弗救也平遂爲秦所滅乙亥秦大赦徐兖二州刺史范汪素爲桓温所惡温將北伐命汪帥衆出梁國冬十月坐失期免爲庶人遂廢卒於家子􅇞好儒學性質直常謂王弼何晏之罪深於桀紂或以爲貶之太過􅇞曰王何蔑棄典文幽沈仁義游辭浮說波蕩後生使搢紳之徒翻然改轍以至禮壞樂崩中原傾覆遺風餘俗至今爲患桀紂縱暴一時適足以喪身覆國爲後世戒豈能廻百姓之視聽哉故吾以爲一世之禍輕歴代之患重自喪之惡小迷衆之罪大也吕護復叛犇燕燕人赦之以爲廣州刺史涼張邕驕矜􅁋縱樹黨專權多所刑殺國人患之張天錫所親敦煌劉肅謂天錫曰國家事欲未静天錫曰何謂也肅曰今護軍出入有似長寧天錫驚曰我固疑之未敢出口計將安出肅曰正當速除之耳天錫曰安得其人肅曰肅卽其人也肅時年未二十天錫曰汝年少更求其助肅曰趙白駒與肅二人足矣十一月天錫與邕俱入朝肅與白駒從天錫值邕於門下肅斫之不中白駒繼之又不克二人與天錫俱入宫中邕得逸走帥甲士三百餘人攻宫門天錫登屋大呼曰張邕凶逆無道旣滅宋氏又欲傾覆我家汝將士世爲涼臣何忍以兵相向邪今所取者止張邕耳它無所問於是邕兵悉散走邕自刎死盡滅其族黨玄靚以天錫爲使持節冠軍大將軍都督中外諸軍事輔政十二月始改建興四十九年奉升平年號詔以玄靚爲大都督督隴右諸軍事涼州刺史護羌校尉西平公燕大赦秦王堅命牧伯守宰各舉孝悌廉直文學政事察其所舉得人者賞之非其人者罪之由是人莫敢妄舉而請託不行士皆自勵雖宗室外戚無才能者皆棄不用當是之時内外之官率皆稱職田疇修闢倉庫充實盜賊屏息是嵗歸義矦李勢卒哀皇帝隆和元年春正月壬子大赦改元甲寅减田租畒収二升燕豫州刺史孫興請攻洛陽曰晉將陳祐弊卒千餘介守孤城不足取也燕人從其言遣寧南將軍吕護屯河隂二月辛未以呉國内史庾希爲北中郎將徐兖二州刺史鎮下邳龍驤將軍袁真爲西中郎將監護豫司并冀四州諸軍事豫州刺史鎮汝南並假節希冰之子也丙子拜帝母周貴人爲皇太妃儀服擬於太后燕吕護攻洛陽三月乙酉河南太守戴施犇宛陳祐告急五月丁巳桓温遣庾希及竟陵太守鄧遐帥舟師三千人助祐守洛陽遐嶽之子也温上䟽請遷都洛陽自永嘉之亂播流江表者請一切北徙以實河南朝廷畏温不敢爲異而北土蕭條人情疑懼雖並知不可莫敢先諫散騎常侍領著作郎孫綽上䟽曰昔中宗龍飛非惟信順恊於天人實賴萬里長江畫而守之耳今自喪亂已來六十餘年河洛丘墟函夏蕭條士民播流江表已經數世存者老子長孫亡者丘隴成行雖北風之思感其素心目前之哀實爲交切若遷都旋軫之日中興五陵即復緬成遐域泰山之安既難以理保烝烝之思豈不纒於聖心哉温今此舉誠欲大覽始終爲國遠圖而百姓震駭同懷危懼豈不以反舊之樂賖而趨死之憂促哉何者植根江外數十年矣一朝頓欲㧞之驅踧於空荒之地提挈萬里踰險浮深離墳墓棄生業田宅不可復售舟車無從而得捨安樂之國適習亂之鄉將頓仆道塗飄溺江川僅有達者此仁者所宐哀矜國家所宐深慮也臣之愚計以爲且宐遣將帥有威名資實者先鎭洛陽掃平梁許清壹河南運漕之路旣通開墾之積已豐豺狼遠竄中夏小康然後可徐議遷徙耳柰何捨百勝之長理舉天下而一擲哉綽楚之孫也少慕高尚嘗著遂初賦以見志温見綽表不悅曰致意興公何不尋君遂初賦而知人家國事邪時朝廷憂懼將遣侍中止温楊州刺史王述曰温欲以虛聲威朝廷耳非事實也但從之自無所至乃詔温曰在昔喪亂忽涉五紀戎狄肆暴繼襲凶跡眷言西顧慨歎盈懷知欲躬帥三軍蕩滌氛穢廓清中畿光復舊京非夫外身徇國孰能若此諸所處分委之高筭但河洛丘墟所營者廣經始之勤致勞懷也事果不行温又議移洛陽鍾虡述曰永嘉不競暫都江左方當蕩平區宇旋軫舊京若其不爾宐改遷園陵不應先事鍾虡温乃止朝廷以交廣遼遠改授温都督并司冀三州温表辭不受秦王堅親臨太學考第諸生經義與博士講論自是每月一至焉六月甲戌燕征東參軍劉㧞刺殺征東將軍冀州刺史范陽王友於信都秋七月吕護退守小平津中流矢而卒燕將段崇収軍北渡屯于野王鄧遐進屯新城八月西中郎將袁真進屯汝南運米五萬斛以饋洛陽冬十一月代王什翼犍納女於燕燕人亦以女妻之十二月戊午朔日有食之􅁃希自下邳退屯山陽袁真自汝南退屯壽陽興寧元年春二月己亥大赦改元三月壬寅皇太妃周氏薨于琅邪第癸卯帝就第治喪詔司徒會稽王昱揔内外衆務帝欲爲太妃服三年僕射江虨啓於禮應服緦麻又欲降服朞虨曰厭屈私情所以上嚴祖考乃服緦麻夏四月燕寧東將軍慕容忠攻滎陽太守劉遠遠犇魯陽五月加征西大將軍桓温侍中大司馬都督中外諸軍録尚書事假黃鉞温以撫軍司馬王坦之爲長史坦之述之子也又以征西掾郗超爲參軍王珣爲主簿每事必與二人謀之府中爲之語曰髯參軍短主簿能令公喜能令公怒温氣槩高邁罕有所推與超言常自謂不能測傾身待之超亦深自結納珣導之孫也與謝􅀇皆爲温掾温俱重之曰謝掾年四十必擁旄杖節王掾當作黑頭公皆未易才也玄奕之子也以西中郎將袁真都督司冀并三州諸軍事北中郎將庾希都督青州諸軍事癸卯燕人拔宻城劉遠犇江陵秋八月有星孛于角亢張玄靚祖母馬氏卒尊庶母郭氏爲太妃郭氏以張天錫專政與大臣張欽等謀誅之事泄欽等皆死􅀇靚懼以位讓天錫天錫不受右將軍劉肅等勸天錫自立閏月天錫使肅等夜帥兵入宫弑􅀇靚宣言暴卒謚曰沖公天錫自稱使持節大都督大將軍涼州牧西平公時年十八尊母劉美人曰太妃遣司馬綸騫奉章詣建康請命并送御史俞歸東還癸亥大赦冬十月燕鎮南將軍慕容塵攻陳留太守袁披于長平汝南太守朱斌乗虛襲許昌克之代王什翼犍擊高車大破之俘獲萬餘口馬牛羊百餘萬頭以征虜將軍桓沖爲江州刺史十一月姚襄故將張駿殺江州督護趙毗帥其徒北叛沖討斬之二年春正月丙辰燕大赦二月燕大􅀓評龍驤將軍李洪略地河南三月庚戌朔大閱户口令所在土斷嚴其灋禁謂之庚戌制帝信方士言斷榖餌藥以求長生侍中高崧諫曰此非萬乗所宐爲陛下兹事實日月之食不聽辛未帝以藥發不能親萬機禇太后復臨朝攝政夏四月甲辰燕李洪攻許昌汝南敗晉兵於懸瓠潁川太守李福戰死汝南太守朱斌犇壽春陳郡太守朱輔退保彭城大司馬温遣西中郎將袁眞等禦之温帥舟師屯合肥燕人遂拔許昌汝南陳郡徙萬餘户于幽冀二州遣鎮南將軍慕容塵屯許昌五月戊辰以揚州刺吏王述爲尚書令加大司馬温揚州牧録尚書事壬申使侍中召温入參朝政温辭不至王述毎受職不爲虛讓其所辭必於不受及爲尚書令子坦之白述故事當讓述曰汝謂我不堪邪坦之曰非也但克讓自美事耳述曰旣謂堪之何爲復讓人言汝勝我定不及也六月秦王堅遣大鴻臚拜張天錫爲大將軍涼州牧西平公秋七月丁卯詔復徴大司馬温入朝八月温至赭圻詔尚書車灌止之温遂城赭圻居之固讓内録遥領揚州牧秦汝南公騰謀反伏誅騰秦主生之弟也是時生弟晉公柳等猶有五人王猛言於堅曰不去五公終必爲患堅不從燕侍中慕輿龍詣龍城徙宗廟及所留百官皆詣鄴燕太宰恪將取洛陽先遣人招納土民遠近諸塢皆歸之乃使司馬悅希軍于盟津豫州刺史孫興軍于成皐初沈充之子勁以其父死於逆亂志欲立功以雪舊恥年三十餘以刑家不得仕呉興太守王胡之爲司州刺史上䟽稱勁才行請解禁錮參其府事朝廷許之會胡之以病不行及燕人逼洛陽冠軍將軍陳祐守之衆不過二千勁自表求配祐効力詔以勁補冠軍長史令自募壯士得千餘人以行勁屢以少擊燕衆摧破之而洛陽糧盡援絶祐自度不能守乃以救許昌爲名九月留勁以五百人守洛陽祐帥衆而東勁喜曰吾志欲致命今得之矣祐聞許昌已没遂犇新城燕悅希引兵略河南諸城盡取之秦王堅命公國各置三卿并餘官皆聽自采辟獨爲置郎中令富商趙掇等車服僣侈諸公競引以爲卿黃門侍郎安定程憲言於堅請治之堅乃下詔稱本欲使諸公延選英儒乃更猥濫如是宐令有司推檢辟召非其人者悉降爵爲矦自今國官皆委之銓衡自非命士已上不得乗車馬去京師百里内工商皂􅀠不得服金銀錦繡犯者棄市於是平陽平昌九江陳留安樂五公皆降爵爲矦三年春正月庚申皇后王氏崩劉衞辰復叛代代王什翼犍東渡河擊走之什翼犍性寛厚郎中令許謙盜絹二匹什翼犍知而匿之謂左長史燕鳯曰吾不忍視謙之面郷愼勿泄若謙慙而自殺是吾以財殺士也嘗討西部叛者流矢中目旣而獲射者羣臣欲臠割之什翼犍曰彼各爲其主鬬耳何罪遂釋之大司馬温移鎮姑孰二月乙未以其弟右將軍豁監荆州揚州之義城雍州之京兆諸軍事領荆州刺史加江州刺史桓沖監江州及荆豫八郡諸軍事並假節司徒昱聞陳祐棄洛陽會大司馬温于洌洲共議征討丙申帝崩于西堂事遂寢帝無嗣丁酉皇太后詔以琅邪王奕承大統百官奉迎于琅邪第是日卽皇帝位大赦秦大赦改建元燕大宰恪呉王垂共攻洛陽恪謂諸將曰卿等常患吾不攻今洛陽城高而兵弱易克也勿更畏懦而怠惰遂攻之三月克之執揚武將軍沈勁勁神氣自若恪將宥之中軍將軍慕輿䖍曰勁雖奇士觀其志度終不爲人用今赦之必爲後患遂殺之恪略地至崤澠關中大震秦王堅自將屯陝城以僃之燕人以左中郎將慕容筑爲洛州刺史鎮金墉呉王垂爲都督荆揚洛徐兖豫雍益凉秦十州諸軍事征南大將軍荆州牧配兵一萬鎮魯陽太宰恪還鄴謂僚屬曰吾前平廣固不能濟辟閭蔚今定洛陽使沈勁爲戮雖皆非本情然身爲元帥實有愧於四海朝廷嘉勁之忠贈東陽太守臣光曰沈勁可謂能爲子矣恥父之惡致死以滌之變凶逆之族爲忠義之門易曰幹父之蠱用譽蔡仲之命曰爾尚蓋前人之愆惟忠惟孝其是之謂乎太宰恪爲將不事威嚴專用恩信撫士卒務綜大要不爲苛令使人人得便安平時營中寛縱似若可犯然警備嚴宻敵至莫能近者故未嘗負敗壬申葬哀帝及静皇后于安平陵夏四月壬午燕太尉武平匡公封弈卒以司空陽騖爲大尉侍中光禄大夫皇甫真爲司空領中書監騖歴事四朝年耆望重自太宰恪以下皆拜之而騖謙恭謹厚過於少時戒束子孫雖朱紫羅列無敢違犯其灋度者六月戊子益州刺史建城襄公周撫卒撫在益州三十餘年甚有威惠詔以其子犍爲太守楚代之秋七月己酉徙會稽王昱復爲琅邪王壬子立妃庾氏爲皇后后冰之女也甲申立琅邪王昱子昌明爲會稽王昱固讓猶自稱會稽王匈奴右賢王曹轂左賢王劉衞辰皆叛秦轂帥衆二萬宼杏城秦王堅自將討之使衞大將軍李威左僕射王猛輔太子宏留守長安八月堅擊轂破之斬轂弟活轂請降徙其豪傑六千餘户于長安建節將軍鄧羌討衞辰擒之於木根山九月堅如朔方廵撫諸胡冬十月征北將軍淮南公幼帥杏城之衆乗虛襲長安李威擊斬之鮮卑秃髪推斤卒年一百一十子思復鞬代統其衆椎斤樹機能從弟務丸之孫也梁州刺史司馬勲爲政酷暴治中别駕及州之豪右言語忤意卽於坐梟斬之或親射殺之常有據蜀之志憚周撫不敢發及撫卒勲遂舉兵反别駕雍端西戎司馬隗粹切諫勲皆殺之自號梁益二州牧成都王十一月勲引兵入劔閣攻涪西夷校尉母丘暐棄城走乙卯圍益州刺史周楚于成都大司馬温表鷹揚將軍江夏相義陽朱序爲征討都護以救之秦王堅還長安以李威守太尉加侍中以曹轂爲鴈門公劉衞辰爲夏陽公各使統其部落十二月戊戌以尚書王彪之爲僕射海西公上太和元年春三月荆州刺史桓豁使督護桓羆攻南鄭討司馬勲燕太宰大司馬恪太傅司徒評稽首歸政上章綬請歸第燕主暐不許夏五月戊寅皇后庾氏崩朱序周楚擊司馬勲破之擒勲及其黨送大司馬温温皆斬之傳首建康代王什翼犍遣左長史燕鳯入貢于秦秋七月癸酉葬孝皇后于敬平陵秦輔國將軍王猛前將軍楊安楊武將軍姚萇等帥衆二萬宼荆州攻南鄉郡荆州刺史桓豁救之八月軍于新野秦兵掠安陽民萬餘户而還九月甲午曲赦梁益二州冬十月加司徒昱丞相録尚書事入朝不趨讃拜不名劔履上殿張天錫遣使至秦境上告絶於秦燕撫軍將軍下邳王厲宼兖州拔魯高平數郡置守宰而還初隴西李儼以郡降秦旣而復通於張天錫十二月羌斂岐以略陽四千家叛秦稱臣於儼儼於是拜置牧守與秦涼絶南陽督護趙億據宛城降燕太守桓澹走保新野燕人遣南中郎將趙盤自魯陽戌宛徐兖二州剌史􅁃希以后族故兄弟貴顯大司馬温忌之二年春正月􅁃希坐不能救魯高平免官二月燕撫軍將軍下邳王厲鎮北將軍宐都王桓襲敕勒秦輔國將軍王猛隴西太守姜衡南安太守南安邵羌揚武將軍姚萇等帥衆萬七千討斂岐三月張天錫使前將軍楊遹向金城征東將軍常據向左南游擊將軍張統向白土天錫自將三萬人屯倉松以討李儼斂岐部落先屬姚弋仲聞姚萇至皆降王猛遂克略陽斂岐犇白馬秦王堅以萇爲隴東太守夏四月燕慕容塵宼竟陵太守羅崇擊破之張天錫攻李儼太夏武始二郡下之常據敗儼兵于葵谷天錫進屯左南儼懼退守枹罕遣其兄子純謝罪於秦且請救秦王堅使前將軍楊安建威將軍王撫帥騎二萬會王猛以救儼猛遣邵羌追斂岐王撫守矦和姜衡守白石猛與楊安救抱罕天錫遣􅀭遹逆戰于抱罕東猛大破之俘斬萬七千級與天錫相持於城下邵羌禽斂岐於白馬送之猛遺天錫書曰吾受詔救儼不令與涼州戰今當深壁高壘以聽後詔曠日持久恐二家俱弊非良筭也若將軍退舍吾執儼而東將軍徙民西旋不亦可乎天錫謂諸將曰猛書如此吾本來伐叛不來與秦戰遂引兵歸李儼猶未納秦師王猛白服乗輿從者數十人請與儼相見儼開門延之未及爲僃將士繼入遂執儼以立忠將軍彭越爲平西將軍涼州刺史鎮抱罕張天錫之西歸也李儼將賀肫􅀃儼曰以明公神武將士驍悍柰何束手於人王猛孤軍遠來士卒疲弊且以我請救必不設備若乗其怠而擊之可以得志儼曰求救於人以免難難旣免而擊之天下其謂我何不若固守以老之彼將自退猛責儼以不卽出迎儼以賀肫之謀告猛斬肫以儼歸至長安堅以儼爲光禄勲賜爵歸安矦燕太原桓王恪言於燕主暐曰呉王垂將相之才十倍於臣先帝以長幼之次故臣得先之臣死之後願陛下舉國以聽呉王五月壬辰恪疾病暐親視之問以後事恪曰臣聞報恩莫大於薦賢賢者雖在板築猶可爲相況至親乎呉王文武兼資管蕭之亞陛下若任以大政國家可安不然秦晉必有窺窬之計言終而卒秦王堅聞恪卒隂有圖燕之計欲覘其可否命匈奴曹轂發使如燕朝貢以西戎主簿馮翊郭辯爲之副燕司空皇甫真兄腆及從子奮覆皆仕秦腆爲散騎常侍辯至燕歴造公卿謂真曰僕本秦人家爲秦所誅故寄命曹王貴兄常侍及奮覆兄弟竝相知有素真怒曰臣無境外之交此言何以及我君似姧人得無因縁假託乎白暐請窮治之太傅評不許辯還爲堅言燕朝政無綱紀實可圖也鑒機識變唯皇甫真耳堅曰以六州之衆豈得不使有智士一人哉曹轂尋卒秦分其部落爲二使其二子分統之號東西曹荆州刺史桓豁竟陵太守羅崇攻宛拔之趙億走趙盤退歸魯陽豁追擊盤於雉城擒之留兵戍宛而還秋七月燕下邳王厲等破敕勒獲馬牛數萬頭初厲兵過代地犯其穄田代王什翼犍怒燕平北將軍武强公埿以幽州兵戍雲中八月什翼犍攻雲中埿棄城走振威將軍慕輿賀辛戰没九月以會稽内史郗愔爲都督徐兖青幽楊州之晉陵諸軍事徐兖二州刺史鎮京口秦淮南公幼之反也征東大將軍并州牧晉公栁征西大將軍秦州刺史趙公雙皆與之通謀秦王堅以雙母弟至親柳健之愛子隱而不問栁雙復與鎮東將軍洛州刺史魏公廋安西將軍雍州刺史燕公武謀作亂鎮東主簿南安姚眺諫曰明公以周邵之親受方面之任國家有難當竭力除之況自爲難乎廋不聽堅聞之徵柳等詣長安冬十月栁據蒲坂雙據上封廋據陝城武據安定皆舉兵反堅遣使諭之曰吾待卿等恩亦至矣何苦而反今止不徵卿宐罷兵各定其位一切如故各齧梨以爲信皆不從代王什翼犍擊劉衞辰河冰未合什翼犍命以葦絙約流澌俄而冰合然猶未堅乃散葦於其上冰草相結有如浮梁代兵乗之以渡衞辰不意兵猝至與宗族西走什翼犍収其部落什六七而還衞辰犇秦秦王堅送衞辰還朔方遣兵戍之十二月甲子燕太尉建寧敬公陽騖卒以司空皇甫真爲侍中太尉光禄大夫李洪爲司空三年春正月秦王堅遣後將軍楊成世左將軍毛嵩分討上邽安定輔國將軍王猛建節將軍鄧羗攻蒲坂前將軍楊安廣武將軍張蚝攻陝城堅命蒲陝之軍皆距城三十里堅壁勿戰俟秦雍已平然後并力取之初燕太宰恪有疾以燕主暐㓜弱政不在已太傅評多猜忌恐大司馬之任不當其人謂暐兄樂安王臧曰今南有遺晉西有彊秦二國常蓄進取之志顧我未有隙耳夫國之興衰繫於輔相大司馬緫統六軍不可任非其人我死之後以親踈言之當在汝及沖汝曹雖才識明敏然年少未堪多難呉王天資英傑智略超世汝曹若能推大司馬以授之必能混壹四海況外宼不足憚也慎無冐利而忘害不以國家爲意也又以語太傅評及恪卒評不能用其言二月以車騎將軍中山王沖爲大司馬沖暐之弟也以荆州刺史呉王垂爲侍中車騎大將軍儀同三司秦魏公廋以陝城降燕請兵應接秦人大懼盛兵守華隂燕魏尹范陽王德上䟽以爲先帝應天受命志平六合陛下纂統當繼而成之今苻氏骨肉乖離國分爲五投誠請援前後相尋是天以秦賜燕也天與不取反受其殃呉越之事足以觀矣宐命皇甫真引并冀之衆徑趨蒲阪呉王垂引許洛之兵馳解廋圍太傅揔京師虎旅爲二軍後繼傳檄三輔示以禍福明立購賞彼必望風響應渾壹之期於此乎在矣時燕人多請救陝因圖關中者太傅評曰秦大國也今雖有難未易可圖朝廷雖明未如先帝吾等智略又非太宰之比但能閉關保境足矣平秦非吾事也魏公廋遺呉王垂及皇甫真牋曰苻堅王猛皆人傑也謀爲燕患久矣今不乗機取之恐異日燕之君臣將有甬東之悔矣垂謂真曰方今爲人患者必在於秦主上富於春秋觀太傅識度豈能敵苻堅王猛乎真曰然吾雖知之如言不用何三月丁巳朔日有食之癸亥大赦秦揚成世爲趙公雙將苟興所敗毛嵩亦爲燕公武所敗犇還秦王堅復遣武衞將軍王鑒寧朔將軍吕光將軍馮翊郭將翟傉等帥衆三萬討之夏四月雙武乗勝至于榆眉以苟興爲前鋒王鑒欲速戰吕光曰興新得志氣勢方銳宐持重以待之彼糧盡必退退而擊之蔑不濟矣二旬而興退光曰興可擊矣遂追之興敗因擊雙武大破之斬獲萬五千級武棄安定與雙皆犇上邽鑒等進攻之晉公栁數出挑戰王猛不應栁以猛爲畏之五月留其世子良守蒲坂帥衆二萬西趨長安去蒲坂百餘里鄧羌帥精騎七千夜襲敗之柳引軍還猛邀擊之盡俘其衆栁與數百騎入城猛羌進攻之秋七月王鑒等拔上邽斬雙武宥其妻子以左衞將軍苻雅爲秦州刺史八月以長樂公丕爲雍州刺史九月王猛等拔蒲坂斬晉公栁及其妻子猛屯蒲坂遣鄧羌與王鑒等會攻陝城燕王公貴戚多占民爲䕃户國之户口少於私家倉庫空竭用度不足尚書左僕射廣信公悅綰曰今三方鼎峙各有吞并之心而國家政灋不立豪貴恣横至使民戸殫盡委輸無入吏斷常俸戰士絶廩官貸粟帛以自贍給旣不可聞於隣敵且非所以爲治宐一切罷斷諸䕃户盡還郡縣燕主暐從之使綰專治其事紏擿姦伏無敢蔽匿出戸二十餘萬舉朝怨怒綰先有疾自力釐校戸籍疾遂亟冬十一月卒十二月秦王猛等拔陝城獲魏公廋送長安秦王堅問其所以反對曰臣本無反心但以弟兄屢謀逆亂臣懼并死故謀反耳堅泣曰汝素長者固知非汝心也且高祖不可以無後乃賜廋死原其七子以長子襲魏公餘子皆封縣公以嗣越厲王及諸弟之無後者苟太后曰瘦與雙俱反雙獨不得置後何也堅曰天下者高祖之天下高祖之子不可以無後至於仲羣不顧太后謀危宗廟天下之法不可私也以范陽公抑爲征東大將軍并州刺史鎮蒲坂鄧羌爲建武將軍洛州刺史鎮陝城擢姚眺爲汲郡太守加大司馬温殊禮位在諸矦王上是歳以仇池公楊世爲秦州刺史世弟統爲武都太守世亦稱臣於秦秦以世爲南秦州刺史資治通鑑卷第一百一
