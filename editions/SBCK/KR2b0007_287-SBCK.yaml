body:
  text: 臣司馬光奉勑編集後漢紀二雍涒灘二月不滿一年起强圉恊洽五月盡著髙祖睿文聖武昭肅孝皇帝中天福十二年五月乙酉朔永康王兀欲召延壽及張礪和凝李崧馮道於所館飲酒兀欲妻素以兄事延壽兀欲從容謂延壽曰妺自上國來寧欲見之乎延壽欣然與之俱入良久兀欲出謂礪等曰燕王謀反適巳鎖之矣又曰先帝在汴時遺我一籌許我知南朝軍國近者臨崩别無遺詔而燕王擅自知南朝軍國豈理邪下令延壽親黨皆釋不問間一日兀欲至待賢館受蕃漢官謁賀笑謂張礪等曰燕王果於此禮上吾以鐡􅀐圍之諸公亦不免矣後數日集蕃漢之臣於府署宣契丹主遺制其略曰永康王大聖皇帝之嫡孫人皇王之長子太后鍾愛羣情允歸可於中京即皇帝位於是始舉哀成服旣而易吉服見羣臣不復行䘮歌吹之聲不絶於內辛巳以絳州防禦使王晏爲建雄節度使帝集羣臣庭議進取諸將咸請出師井陘攻取鎭魏先定河北則河南拱手自服帝欲自石㑹趨上黨郭威曰虜主雖死黨衆猶盛各據堅城我出河北兵少路迂傍無應援若羣虜合勢共擊我軍進則遮前退則邀後粮餉路絶此危道也上黨山路險澁粟少民殘無以供億亦不可由近者陜􅀳二鎭相繼􅍁附引兵從之萬無一失不出两旬洛汴定矣帝曰卿言是也蘇逢吉等曰史弘肈大軍已屯上黨羣虜繼遁不若出天井抵孟津為便司天奏太歳在午不利南行宜由晉綘抵陜帝從之辛卯詔以十二日發北京告諭諸道甲午以太原尹崇爲北京留守以趙州刺史李存瓌爲副留守河東幕僚眞定李驤爲少尹牙將太原蔚進爲馬步指揮使以佐之存瓌唐莊宗之從弟也是日劉晞弃洛陽奔大梁武安節度副使天策府都尉領鎭南節度使馬希廣楚文昭王希範之母弟也性謹順希範愛之使判內外諸司事壬辰夜希範卒將佐議所立都指揮使張少敵都押牙􅀽友㳟以武平節度使知永州事希蕚於希範諸弟爲最長請立之長直都指揮使劉彦瑫天策府學士李弘皐鄧懿文小門使楊滌皆欲立希廣張少敵曰永州齒長而性剛必不爲都尉之下眀矣必立都尉當思長策以制永州使帖然不動則可不然社稷危矣彦瑫等不從天策府學士拓跋恒曰三十五郎雖判軍府之政然三十郎居長請遣使以禮讓之不然必起爭端彦瑫等皆曰今日軍政在手天與不取使它人得之異日吾輩安所自容乎希廣懦弱不能自決乙未彦瑫等稱希範遺命共立之張少敵退而歎曰禍其始此乎與拓跋恒皆稱疾不出丙申帝發太原自隂地􅀜出􅀳絳丁酉史弘肇奏克澤州始弘肇攻澤州刺史翟令竒固守不下帝以弘肇兵少欲召還蘇逢吉楊邠曰今陜􅀳河陽皆已向化崔廷勲耿崇美朝夕遁去若召弘肇還則河南人心動搖虜勢復壯矣帝未決使人諭指於弘肇曰兵弘肇已及此勢如破竹可進不可退與逢吉等議合帝乃從之弘肇遣部將李萬超􅀃令竒令竒乃降弘肇以萬超權知澤州崔廷勲耿崇美奚王拽刺合兵逼河陽張遇帥衆數千救之戰於南阪敗死武行德出戰亦敗閉城自守拽刺欲攻之廷勲曰今北軍已去得此何用且殺一夫猶可惜況一城乎聞弘肇已得澤州乃釋河陽還保懷州弘肇將至廷勲等擁衆北遁過衞州大掠而去契丹在河南者相繼北去􅀪肇引兵與武行德合弘肇爲人沈毅寡言御衆嚴整將校小不從命立撾殺之士卒所過犯民田及繫馬於樹者皆斬之軍中惕息莫敢犯令故所向必克帝自􅀳陽安行入洛及汴兵不血刃皆弘肇之力也帝由是􅀝愛之辛丑帝至霍邑遣使諭河中節度使趙匡賛仍以契丹囚其父延壽告之滋德宫有宫人五十餘人蕭翰欲取之宦者張環不與翰破鎖奪宫人執環燒鐡灼之腹爛而死初翰聞帝擁兵而南欲北歸恐中國無主必大亂已不得從容而去時唐明宗子許王從益與王淑妃在洛陽翰遣髙謨翰迎之矯稱契丹主命以從益知南朝軍國事召已赴恒州淑妃從益匿於徽陵下宫不得已而出至大梁翰立以爲帝帥諸酋長拜之又以禮部尚書王松御史中丞趙逺爲宰相前宣徽使甄城翟光鄴爲樞密使左金吾大將軍王景崇爲宣徽使以北來指揮使劉祚權侍衛親軍都指揮使充在京巡檢松徽之子也百官謁見淑妃淑妃泣曰吾母子單弱如此而爲諸公所推是禍吾家也翰留燕兵千人守諸門爲從益宿衞壬寅翰及劉晞辭行從益餞於北郊遣使召髙行周於宋州武行德於河陽皆不至淑妃懼召大臣謀之曰吾母子爲蕭翰所逼分當滅亡諸公無罪宜早迎新主自求多福勿以吾母子爲意衆感其言皆未忍叛去或曰今集諸營兵不減五千與燕兵併力堅守一月北救必至淑妃曰吾母子亡國之餘安敢與人爭天下不幸至此死生惟人所裁若新主見察當知我無所負今更爲計畫則禍及它人闔城塗炭終何益乎衆猶欲拒守三司使文安劉審交曰余燕人豈不爲燕兵計顧事有不可如何者今城中大亂之餘公私窮竭遺民無幾若復受圍一月無噍類矣願諸公勿復言一從太妃處分乃用趙逺翟光鄴策稱梁王知軍國事遣使奉表稱臣迎帝請早赴京師仍出居私第甲辰帝至􅀳州契丹主兀欲以契丹主德光有子在國己以兄子襲位又無􅄒律太后之命擅自立內不自安初契丹主阿保機卒於渤海述律太后殺酋長及諸將凡數百人契丹主德光復卒於境外酋長諸將懼死乃謀奉契丹主兀欲勒兵北歸契丹主以安國節度使麻荅爲中京留守以前武州刺史髙奉明爲安國節度使晉文武官及士卒悉留於恒州獨以翰林學士徐台符李澣及後宫宦者教坊人自隨乙巳發眞定帝之即位也絳州刺史李從朗與契丹將成霸卿等拒命帝遣西南面招討使護國節度使白文珂攻之未下帝至城下命諸軍四布而勿攻以利害諭之戊申從朗舉城降帝命親將分護諸門士卒一人毋得入以偏將薛瓊爲防禦使辛亥帝至陜州趙暉自御帝馬而入壬子至石濠汴人有來迎者六月甲寅朔蕭翰至恒州與麻荅以鐡􅀐圍張礪之第礪方卧病出見之翰數之曰汝何故言於先帝云胡人不可以爲節度使又吾爲宣武節度使且國舅也汝在中書乃帖我又先帝留我守汴州令我處宫中汝以爲不可又􅉲我及解里於先帝云解里好掠人財我好掠人子女今我必殺汝命鎖之礪抗聲曰此皆國家大體吾實言之欲殺即殺奚以鎻爲麻荅以大臣不可專殺力救止之翰乃釋之是夕礪憤恚而卒崔廷勲見麻荅趨走拜起跪而獻酒麻荅踞而受之乙卯帝至新安西京留司官悉來迎吳越忠獻王弘佐卒遺令以丞相弘倧爲鎭海鎭東節度使兼侍中丙辰帝至洛陽入居宫中汴州百官奉表來迎詔諭以受契丹補署者皆勿自疑聚其告牒而焚之趙逺更名上交命鄭州防禦使郭從義先入大梁淸宫密令殺李從益及王淑妃淑妃且死曰吾兒爲契丹所立何罪而死何不留之使每歳寒食以一盂麥飯洒明宗陵乎聞者泣下戊午帝發洛陽樞密院吏魏仁浦自契丹逃歸見於鞏郭威問以兵數及故事仁浦強記精敏威由是親任之仁浦衞州人也辛酉汴州百官竇貞固等迎於滎陽甲子帝至大梁晉之藩鎭相繼來降丙寅呉越王弘倧襲位戊辰帝下詔大赦凡契丹所除節度使下至將吏各安職任不復變更復以汴州爲東京改國號曰漢仍稱天福年曰余未忍忘晉也復青襄汝三節度壬申以北京留守崇爲河東節度使同平章事契丹述律太后聞契丹主自立大怒發兵拒之契丹主以偉王爲前鋒相遇於石橋初􅀳侍衞馬軍都指揮使李彦韜從晉主北遷􅊢述律太后麾下太后以爲排陳使彦韜迎降於偉王太后兵由是大敗契丹主幽太后於阿保機墓改元天禄自稱天授皇帝以髙勲爲樞密使契丹主慕中華風俗多用晉臣而荒于酒色輕慢諸酋長由是國人不附諸部數叛興兵誅討故數年之中不暇南寇初契丹主德光命奉國都指揮使南宫王繼弘都虞候樊暉以所部兵戍相州彰德節度使髙唐英善待之戍兵無鎧仗唐英以鎧仗給之􅀝信如親戚唐英聞帝南下舉鎭請降使者未返繼弘暉殺唐英繼弘自稱留後遣使告云唐英反覆詔以繼弘爲彰德留後庚辰以暉爲磁州刺史安國節度使髙奉明聞唐英死心不自安請於麻荅署馬歩都指揮使劉鐸爲節度副使知軍府事身歸恒州帝遣使告諭荆南髙從誨上表賀且求郢州帝不許及加恩使至拒而不受唐主聞契丹主德光卒蕭翰弃大梁去下詔曰乃眷中原本朝故地以左右衛聖統軍忠武節度使同平章事李金全爲北面行營招討使議經略北方聞帝已入大梁遂不敢出兵秋七月甲午以馬希廣爲天策上將軍武安節度使江南諸道都統兼中書令封楚王或傳趙延壽已死郭威言於帝曰趙匡賛契丹所署今猶在河中宜遣使弔祭因起復移鎭彼旣家國無歸必感恩承命從之㑹鄴都留守天雄節度使兼中書令杜重威天平節度使兼侍中李守貞皆奉表歸命重威仍請移它鎮歸德節度使兼中書令髙行周入朝丙申徙重威為歸德節度使以行周代之守貞爲䕶國節度使加兼中書令徙䕶國節度使趙匡賛爲􅀳昌節度使後二年延壽始卒於契丹吳越王弘倧以其弟台州刺史弘俶同參相府事李逹以其弟通知福州留後自詣錢塘見呉越王弘倧弘倧承制加逹兼侍中更其名曰孺贇既而孺贇悔懼以金筍二十株及雜寳賂內牙統軍使胡進思求歸福州進思爲之請弘倧從之杜重威自以附契丹負中國內常疑懼及移鎭制下復拒而不受遣其子弘璲質於麻荅以求援趙延壽有幽州親兵二千在恒州指揮使張璉將之重威請以守魏麻荅遣其將楊衮將契丹千五百人及幽州兵赴之閏月庚午詔削奪重威官爵以髙行周爲招討使鎭寧節度使慕容彦超副之以討重威辛未楊邠郭威王章皆爲正使時兵荒之餘公私匱竭北來兵與朝廷兵合頓増數倍章白帝罷不急之務省無益之費以奉軍用度克贍庚辰制建宗廟太祖髙皇帝世祖光武皇帝皆百世不遷又立四親廟追尊謚號凡六廟麻荅貪猾殘忍民間有珍貨美婦女必奪取之又捕村民誣以爲盜披面抉目斷腕焚炙而殺之欲以威衆常以其具自隨左右前後懸人肝膽手足飲食起居於其間語笑自若出入或􅀍黄衣用乗輿服御物曰兹事漢人以爲不可吾國無忌也又以宰相貟不足乃牒馮道判弘文館李崧判史館和凝判集賢劉朐判中書其􅆫妄如此然契丹或犯法無所容貸故市肆不擾常恐漢人亡去謂門者曰漢有窺門者即斷其首以來麻荅遣使督運於洺州洺州防禦使薛懷讓聞帝入大梁殺其使者舉州降帝遣郭從義將兵萬人㑹懷讓攻劉鐸於邢州不克鐸請兵於麻荅麻荅遣其將楊安及前義武節度使李殷將千􅀐攻懷讓於洺州懐讓嬰城自守安等縱兵大掠於邢洺之境契丹所留兵不滿二千麻荅令所司給萬四千人食收其餘以自入麻荅常疑漢兵且以爲無用稍稍廢省又損其食以飼胡兵衆心怨憤聞帝入大梁皆有南歸之志前潁州防禦使何福進控鶴指揮使太原李榮潜結軍中壯士數十人謀攻契丹然畏契丹尚彊猶豫未發㑹楊衮楊安等軍出契丹留恒州者􅂊八百人福進等遂決計約以擊佛寺鍾爲號辛巳契丹主兀欲遣􅀐至􅁪州召前威勝節度使兼中書令馮道樞密使李崧左僕射和凝等㑹葬契丹主德光於木葉山道等未行食時鐘聲發漢兵奪契丹守門者兵擊契丹殺十餘人因突入府中李榮先據甲庫悉召漢兵及市人以鎧仗授之焚牙門與契丹戰榮召諸將并力護聖左廂都指揮使恩州團練使白再榮狐疑匿於别室軍吏以佩刀決幕引其臂再榮不得已而行諸將繼至煙火四起鼔譟震地麻荅等大驚載寳貨家屬走保北城而漢兵無所統壹貪狡者乗亂剽掠懦者􅇡匿八月壬午朔契丹自北門入勢復振漢民死者二千餘人前磁州剌史李榖恐事不濟請馮道李崧和凝至戰所慰勉士卒士卒見道等至爭自奮㑹日暮有村民數千譟於城外欲奪契丹寳貨婦女契丹懼而北遁麻荅劉晞崔廷勲皆奔定州與義武節度使邪律忠合忠即郎五也馮道等四出安撫兵民衆推道爲節度使道曰我書生也當奏事而已宜擇諸將爲留後時李榮功最多而白再榮位在上乃以再榮權知留後具以狀聞且請援兵帝遣左飛龍使李彦從將兵赴之白再榮貪昧猜忌諸將奉國廂主華池王饒恐爲再榮所併詐稱足疾據東門樓嚴兵自衛司天􅁥趙延乂善於二人往來諭釋始得解再榮以李崧和凝乆爲相家富遣軍士圍其第求賞給崧凝各以家財與之又欲殺崧凝以滅口李榖往見再榮責之曰國亡主辱公軰握兵不救今僅能逐一虜將鎮民死者近三千人豈獨公之力邪􅂊得脫死遽欲殺宰相新天子若詰公專殺之罪公何辭以對再榮懼而止又欲率民財以給軍榖力爭之乃止漢人嘗事麻荅者再榮皆拘之以取其財恒人以其貪虐謂之白麻荅楊衮至邢州聞麻荅􅀍逐即日北還楊安亦遁去李殷以其衆來降庚寅以薛懷讓爲安國節度使劉鐸聞麻荅遁去舉邢州降懐讓詐云廵檢引兵向邢州鐸開門納之懐讓殺鐸以克復聞朝廷知而不問辛卯復以恒州順國軍爲鎭州成德軍乙未以白再榮爲成德留後踰年始以何福進爲曹州防禦使李榮爲博州剌史敕盜賊母問贓多少皆抵死時四方盜賊多朝廷患之故重其法仍分命使者逐捕蘇逢吉自草詔意云應賊盜并四鄰同保皆全族處斬衆以爲盜猶不可族況鄰保乎逢吉固爭不得已但省去全族字由是捕賊使者張令柔殺平隂十七村民逢吉爲人文深好殺在河東幕府帝嘗令靜獄以祈福逢吉盡殺獄囚還報及爲相朝廷草創帝悉以軍旅之事委楊邠郭威百司庻務委逢吉及蘇禹珪二相決事皆出胷臆不拘舊制雖事無留滯而用捨黜陟惟其所欲帝方􅀝信之無敢言者逢吉尤貪詐公求貨財無所顧避繼母死不爲服庶兄自外至不白逢吉而見諸子逢吉怒密語郭威以它事杖殺之楚王希廣庶弟天䇿左司馬希崇性狡險隂遺兄希蕚書言劉彦瑫等違先王之命廢長立少以激怒之希蕚自永州來奔喪乙巳至趺石彦瑫白希廣遣侍從都指揮使周廷誨等將水軍逆之命永州將士皆釋甲而入館希萼於碧湘宫成服於其次不聽入與希廣相見希萼求還朗州周廷誨勸希廣殺之希廣曰吾何忍殺兄寧分潭朗而治之乃厚贈希萼遣還朗州希崇常爲希萼詗希廣語言動作悉以告之約爲內應契丹之滅晉也驅戰馬二萬匹歸其國至是漢兵乏馬詔市士民馬於河南諸道不經剽掠者制以錢弘倧爲東南兵馬都元帥鎭海鎭東節度使兼中書令吳越王髙從誨聞杜重威叛發水軍數千襲襄州山南東道節度使安審􅄾擊却之又寇郢州剌史尹實大破之乃絶漢附于唐蜀初荆南介居湖南嶺南福建之間地狹兵弱自武信王季興時諸道入貢過其境者多掠奪其貨幣及諸道移書詰讓或加以兵不得已復歸之曽不爲愧及從誨立唐晉契丹漢更據中原南漢閩呉蜀皆稱帝從誨利其賜予所向稱臣諸國賤之謂之髙無頼唐主以太傅兼中書令宋齊丘爲鎭南節度使南漢主恐諸弟與其子爭國殺齊王弘弼貴王弘道定王弘益辨王弘濟同王弘簡益王弘建恩王弘偉宜王弘照盡殺其男納其女充後宫作離宫千餘間飾以珠寳設鑊湯鐡牀刳剔等刑號生地獄嘗醉戲以􅀲置樂工之頸試劒遂斷其頭初帝與吏部尚書竇貞固俱事晉髙祖雅相知重及即位欲以爲相問蘇逢吉其次誰可相者逢吉與翰林學士李濤善因薦之曰昔濤乞斬張彦澤陛下在太原常重之此可相也㑹髙行周慕容彦超共討杜重威於鄴都彦超欲急攻城行周欲緩之以待其弊行周女爲重威子婦彦超楊言行周以女故愛賊不攻由是二將不協帝恐生它變欲自將擊重威意未決濤上䟽請親征帝大恱以濤有宰相器九月甲戌加逢吉左僕射兼門下侍郎蘇禹珪右僕射兼中書侍郎貞固司空兼門下侍郎濤户部尚書兼中書侍郎並同平章事戊寅詔幸澶魏勞軍以皇子承訓爲東京留守馮道李崧和凝自鎭州還己卯以崧爲太子太􅀓凝爲太子太保庚辰帝發大梁晉昌節度使趙匡賛恐終不爲朝廷所容冬十月遣使降蜀請自終南山路出兵應援戊戌帝至鄴都城下舍於髙行周營行周言於帝曰城中食未盡急攻徒殺士卒未易克也不若緩之彼食盡自潰帝然之慕容彦超數因事陵轢行周行周泣訴於執政掬糞壤實其口蘇逢吉楊邠密以白帝帝深知彦超之曲猶命二臣和解之又召彦超於帳中責之且使詣行周謝杜重威聲言車駕至即降帝遣給事中陳觀往諭指重威復閉門拒之城中食浸竭將士多出降者慕容彦超固請攻城帝從之丙午親督諸將攻城自寅至辰士卒傷者萬餘人死者千餘人不克而止彦超乃不敢復言􅀄契丹留幽州兵千五百人戍大梁帝入大梁或告幽州兵將爲變帝盡殺之於繁臺之下及圍鄴都張璉將幽州兵二千助重威拒守帝屢遣人招諭許以不死璉曰繁臺之卒何罪而戮今守此以死爲期耳由是城乆不下十一月丙辰內殿直韓訓獻攻城之具帝曰城之所恃者衆心耳衆心茍離城無所保用此何爲杜重威之叛也觀察判官金鄉王敏屢泣諌不聽及食竭力盡甲戌遣敏奉表出降乙亥重威子弘璉來見丙子妻石氏來見石氏即晉之宋國長公主也帝復遣入城丁丑重威開門出降城中餒死者什七八存者皆㒬瘠無人狀張璉先邀朝廷信誓詔許以歸鄉里及出降殺璉等將校數十人縱其士卒北歸將出境大掠而去郭威請殺重威牙將百餘人并重威家貲籍之以賞戰士從之以重威爲太傅兼中書令楚國公重威每出入路人往往擲瓦礫詬之臣光曰漢髙祖殺幽州無辜千五百人非仁也誘張璉而誅之非信也杜重威罪大而赦之非刑也仁以合衆信以行令刑以懲姧失此三者何以守國其祚運之不延也冝哉髙行周以慕容彦超在澶州固辭鄴都己卯以忠武節度使史弘肈領歸德節度使兼侍衛馬歩都指揮使義成節度使劉信領忠武節度使兼侍衞馬歩副都指揮使徙彦超爲天平節度使並加同平章事呉越王弘倧大閱水軍賞賜倍於舊胡進思固諫弘倧怒投筆水中曰吾之財與士卒共之奚多少之限邪十二月丙戌帝發鄴都蜀主遣雄武都押牙呉崇惲以樞密使王處回書招鳯翔節度使矦益庚寅以山南西道節度使兼中書令張䖍釗爲北面行營招討安撫使雄武節度使何重建副之宣徽使韓保貞爲都虞候共將兵五萬䖍釗出散關重建出隴州以擊鳯翔奉鑾肅衞都虞候李廷珪將兵二萬出子午谷以援長安諸軍發成都旌旗數十里辛卯皇子開封尹承訓卒承訓孝友忠厚逹於從政人皆惜之癸巳帝至大梁威武節度使李孺贇與呉越戍將鮑脩讓不協謀襲殺脩讓復以福州降唐脩讓覺之引兵攻府第是日殺孺贇夷其族乙未追立皇子承訓爲魏王矦益請降於蜀使呉崇惲持兵籍糧帳西還與趙匡賛同上表請出兵平定關中巳酉鮑脩讓傳李孺贇首至錢塘呉越王弘倧以丞相山隂呉程知威武節度事呉越王弘倧性剛嚴憤忠獻王弘佐時容養諸將政非巳出及襲位誅杭越侮法吏三人內牙統軍使胡進思恃迎立功千預政事弘倧惡之欲授以一州進思不可進思有所謀議弘倧數面折之進思還家設忠獻王位被髪慟哭民有殺牛者吏按之引人所市肉近千斤弘倧問進思牛大者肉幾何對曰不過三百斤弘倧曰然則吏妄也命按其罪進思拜賀其明弘倧曰公何能知其詳進思踧踖對曰臣昔未從軍亦嘗從事於此進思以弘倧爲知其素業故辱之益恨怒進思建議遣李孺贇歸福州及孺贇叛弘倧責之進思愈不自安弘倧與內牙指揮使何承訓謀逐進思又謀於內都􅁥使水丘昭劵昭劵以爲進思黨盛難制不如容之弘倧猶豫未決承訓恐事􅂥反以謀告進思庚戌晦弘倧夜宴將吏進思疑其圖已與其黨謀作亂帥親兵百人戎服執兵入見於天策堂曰老奴無罪王何故圖之弘倧叱之不退左右持兵者皆憤怒弘倧猝愕不暇發言趨入義和院進思鎻其門矯稱王命告中外云猝得風疾傳位於同參相府事弘俶進思因帥諸將迎弘俶于私第且召丞相元德昭德昭至立於簾外不拜曰俟見新君進思亟出褰簾德昭乃拜進思稱弘倧之命承制授弘俶鎭海鎭東節度使兼侍中弘俶曰能全吾兄乃敢承命不然當避賢路進思許之弘俶始視事進思殺水丘昭劵及進侍鹿光鉉光鉉弘倧之舅也進思之妻曰它人猶可殺昭劵君子也柰何害之是歳唐主以羽林大將軍王延政爲安化節度使翻陽王鎭饒州乾祐元年春正月乙卯大赦改元帝以趙匡賛矦益與蜀兵共爲寇患之㑹回鶻入貢訴稱爲党項所阻乞兵應接詔右衞大將軍王景崇將軍齊藏珍將禁軍數千赴之因使之經略關西晉昌節度判官李恕乆在趙延壽幕下延壽使之佐匡贊匡贊將入蜀恕諌曰燕王入胡豈所願哉今漢家新得天下方務招懷若謝罪歸朝必保富貴入蜀非全計也蹄涔不容尺鯉公必悔之匡贊乃遣恕奉表請入朝景崇等未行而恕至帝問恕匡贊何爲附蜀對曰匡贊自以身受虜官父在虜庭恐陛下未之察故附蜀求茍免耳臣以爲國家必應存撫故遣臣來祈哀帝曰匡贊父子本吾人也不幸䧟虜今延壽方墜檻穽吾何忍更害匡贊乎即聽其入朝矦益亦請赴二月四日聖壽節上壽景崇等將行帝召入卧內敕之曰匡賛益之心皆未可知汝至彼彼已入朝則勿問若尚遷延顧望當以便宜從事己未帝更名暠以前威勝節度使馮道爲太師壬戌吳越王弘俶遷故王弘倧於衣錦軍私第遣匡武都頭薛温將親兵衞之潜戒之曰若有非常處分皆非吾意當以死拒之帝自魏王承訓卒悲痛過甚甲子始不豫趙匡贊不俟李恕返命已離長安丙子入見王景崇等至長安聞蜀兵已入秦川以兵少發本道及趙匡贊牙兵千餘人同拒之景崇恐匡贊牙兵亡逸欲文其面微露風旨軍校趙思綰首請自文其面以帥下景崇恱齊藏珍竊言曰思綰凶􅁀難制不如殺之景崇不聽思綰魏州人也蜀李廷珪將至長安聞趙匡贊已入朝欲引歸王景崇邀之敗廷珪於子午谷張䖍釗至寳雞諸將議不協按兵未進矦益聞廷珪西還因閉壁拒蜀兵䖍釗勢􅀌引兵夜遁景崇帥鳯翔隴邠涇鄜坊之兵追敗蜀兵於散􅀜俘將卒四百人丁丑帝大漸楊邠忌侍衞馬軍都指揮使忠武節度使劉信立遣之鎭信不得奉辭雨泣而去帝召蘇逢吉楊邠史弘肈郭威入受顧命曰余氣息微不能多言承祐㓜弱後事託在卿軰又曰善防重威是日殂于萬歳殿逢吉等祕不發喪庚辰下詔稱重威父子因朕小疾謗議搖衆并其子弘璋弘璉弘璨皆斬之晉公主及內外親族一切不問磔重威尸於市市人爭啖其肉吏不能禁斯須而盡二月辛巳朔立皇子左衛大將軍大内都㸃檢承祐爲周王同平章事有頃發䘮宣遺制令周王即皇帝位時年十八蜀韓保貞龐福誠引兵自隴州還要何重建俱西是日保貞等至秦州分兵守諸門及衢路重建遂入于蜀丁亥尊皇后曰皇太后朝廷知成德留後白再榮非將帥才庚寅以前建雄留後劉在明代之癸巳大赦呉越内牙指揮使何承訓復請誅胡進思及其黨呉越王弘俶惡其反覆且懼召禍乙未執承訓斬之進思屢請殺廢王弘倧以絶後患弘俶不許進思詐以王命密令薛温害之温曰僕受命之日不聞此言不敢妄發進思乃夜遣其黨方安等二人踰垣而入弘倧闔户拒之大呼求救温聞之率衆而入斃安等于庭中入告弘俶弘俶大驚曰全吾兄汝之力也弘俶畏忌進思曲意下之進思亦内憂懼未幾疽發背卒弘倧由是獲全詔以王景崇兼鳯翔廵檢使景崇引兵至鳯翔矦益尚未行景崇以禁兵分守諸門或勸景崇殺益景崇以受先朝密旨嗣主未之知或疑於專殺猶豫未決益聞之不告景崇而去景崇悔自詬戊戌益入朝隱帝問何故召蜀軍對曰臣欲誘致而殺之帝哂之蜀張䖍釗自恨無功癸卯至興州慙忿而卒侍衞馬歩都指揮使同平章事史弘肈遭母䘮不數日復出朝參卷終
