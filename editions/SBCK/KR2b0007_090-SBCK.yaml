front:
  text: 寔以其老弗許及聞長安不守肅悲憤而卒寔遣太府司馬韓璞撫戎將軍張閬等帥步騎一萬東擊漢命討虜將軍陳安故太守賈騫隴西太守吳紹各統郡兵為前驅又遺相國保書曰王室有事不㤀投軀前遣賈騫瞻公舉動中被符命敕騫還軍俄聞冦逼長安胡崧不進麴允持金五百請救於崧遂决遣騫等進軍度嶺㑹聞朝廷傾覆為忠不遂憤痛之深死有餘責今更遣璞等唯公命是從璞等卒不能進而還至南安諸􅆧斷路相持百餘日糧竭矢盡璞殺車中牛以饗士泣謂之曰汝曹念父母乎曰念念妻子乎曰念欲生還乎曰欲從我令乎曰諾乃鼓譟進戰㑹張閬帥金城兵繼至夾擊大破之斬首數千級先是長安謡曰秦川中血没腕唯有涼州倚柱觀及漢兵覆關中氐羌掠隴右雍秦之民死者什八九獨涼州安全二月漢主聦使從弟暢帥步騎三萬攻滎陽太守李矩屯韓王故壘相去七里遣使招矩時暢兵猝至矩未及為備乃遣使詐降於暢暢不復設備大饗渠帥皆醉矩欲夜襲之士卒皆恇懼矩乃遣其將郭誦禱於子産祠使巫揚言曰子産有教當遣神兵相助衆皆踊躍爭進矩選勇敢千人使誦將之掩擊暢營斬首數千級暢僅以身免辛巳宋哲至建康稱受愍帝詔令丞相琅邪王睿統攝萬機三月琅邪王素服出次舉哀三日於是西陽王羕及官屬等共上尊號王不許羕等固請不已王慨然流涕曰孤罪人也諸賢見逼不已當歸琅邪耳呼私奴命駕將歸國羕等乃請依魏晉故事稱晉王許之辛夘即晉王位大赦改元始僃百官立宗廟建社稷有司請立太子王愛次子宣城公裒欲立之謂王導曰立子當以德導曰世子宣城俱有朗雋之美而世子年長王從之丙辰立世子紹為王太子封裒為琅邪王奉恭王後仍以裒都督青徐兖三州諸軍事鎮廣陵以西陽王羕為太保封譙剛王遜之子承為譙王遜宣帝之弟子也又以征南大將軍王敦為大將軍江州牧揚州刺史王導為驃騎將軍都督中外諸軍事領中書監録尚書事丞相左長史刁協為尚書左僕射右長史周顗為吏部尚書軍諮祭酒賀循為中書令右司馬戴淵王邃為尚書司直劉隗為御史中丞行參軍劉超為中書舎人參軍事孔愉長兼中書郎自餘參軍悉拜奉車都尉掾屬拜駙馬都尉行參軍舎人拜騎都尉王敦辭州牧王導以敦統六州辭中外都督賀循以老病辭中書令王皆許之以循為太常是時承䘮亂之後江東草創刁協久宦中朝諳練舊事賀循為世儒宗明習禮學凡有疑議皆取决焉劉琨段匹磾相與歃血同盟期以翼戴晉室辛丑琨檄告華夷遣兼左長史右司馬温嶠匹磾遣左長史榮邵奉表及盟文詣建康勸進嶠羨之弟子也嶠之從母為琨妻琨謂嶠曰晉祚雖衰天命未改吾當立功河朔使卿延譽江南行矣勉之王以鮮卑大都督慕容廆為都督遼左雜夷流民諸軍事龍驤將軍大單于昌黎公廆不受征虜將軍魯昌説廆曰今兩京覆没天子䝉塵琅邪王承制江東為四海所係屬明公雖雄據一方而諸部猶阻兵未服者蓋以官非王命故也謂宐通使琅邪勸承大統然後奉詔令以伐有罪誰敢不從處士遼東高詡曰霸王之資非義不濟今晉室雖微人心猶附之宐遣使江東示有所尊然後杖大義以征諸部不患無辭矣廆從之遣長史王濟浮海詣建康勸進漢相國粲使其黨王平謂太弟义曰適奉中詔云京師將有變宐衷甲以備非常义信之命宫臣皆衷甲以居粲馳遣告靳凖王沈凖以白漢主聦曰太弟將為亂已衷甲矣聦大驚曰寧有是邪王沈等皆曰臣等聞之久矣屢言之而陛下不之信也聦使粲以兵圍東宫粲使凖沈収氐􅆧酋長十餘人窮問之皆懸首高格燒鐵灼目酋長自誣與义謀反聦謂沈等曰吾今而後知卿等之忠也當念知無不言勿恨往日言而不用也於是誅東宫官屬及义素所親厚凖沈等素所憎怨者大臣數十人阬士卒萬五千餘人夏四月廢义為北海王粲尋使凖賊殺之义形神秀爽寛仁有器度故士心多附之聦聞其死哭之慟曰吾兄弟止餘二人而不相容安得使天下知吾心邪氐羌叛者甚衆以靳凖行車騎大將軍討平之五月壬午日有食之
