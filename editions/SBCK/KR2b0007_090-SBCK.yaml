body:
  text: 六月丙寅温嶠等至建康王導周顗庾亮等皆愛嶠才爭與之交是時太尉豫州牧荀組冀州刺史邵續青州刺史曹嶷寧州刺史王遜東夷校尉崔毖等皆上表勸進王不許初流民張平樊雅各聚衆數千人在譙為塢主王之為丞相也遣行參軍譙國桓宣往說平雅平雅皆請降及豫州刺史祖逖出屯蘆洲遣參軍殷义詣平雅乂意輕平視其屋曰可作馬廐見大鑊曰可鑄鐵器平曰此乃帝王鑊天下清平方用之奈何毁之乂曰卿未能保其頭而愛鑊邪平大怒於坐斬乂勒兵固守逖攻之嵗餘不下乃誘其部將謝浮使殺之逖進據太丘樊雅猶據譙城與逖相拒逖攻之不克請兵於南中郎將王含桓宣時為含參軍含遣宣將兵五百助逖逖謂宣曰卿信義已著於彼今復為我說雅宣乃單馬從兩人詣雅曰祖豫州方欲平蕩劉石倚卿為援前殷乂輕薄非豫州意也雅即詣逖降逖既入譙城石勒遣石虎圍譙王含復遣桓宣救之虎解去逖表宣為譙國内史己巳晉王􅀓檄天下稱石虎敢帥犬羊渡河縱毒今遣琅邪王裒等九軍銳卒三萬水陸四道徑造賊場受祖逖節度尋復召裒還建康秋七月大旱司冀并青雍州大蝗河汾溢漂千餘家漢主聦立晉王粲為皇太子領相國大單于揔攝朝政如故大赦段匹磾推劉琨為大都督檄其兄遼西公疾陸眷及叔父涉復辰弟末柸等㑹于固安共討石勒末柸說疾陸眷涉復辰曰以父兄而從子弟恥也且幸而有功匹磾獨収之吾屬何有哉各引兵還琨匹磾不能獨留亦還薊以荀組為司徒八月漢趙固襲衛將軍華薈於臨潁殺之初趙固與長史周振有隙振宻譖固於漢主聦李矩之破劉暢也於帳中得聦詔令暢既克矩還過洛陽収固斬之以振代固矩送以示固固斬振父子帥騎一千來降矩復令固守洛陽鄭攀等相與拒王廙衆心不壹散還横桑口欲入杜曾王敦遣武昌太守趙誘襄陽太守失軌擊之攀等懼請降杜曾亦請擊第五猗於襄陽以自贖廙將赴荆州留長史劉浚鎭揚口壘竟陵内史朱伺謂廙曰曾猾賊也外示屈服欲誘官軍使西然後兼道襲揚口耳宐大部分未可便西廙性矜厲自用以伺為老怯遂西行曾等果還趨揚口廙乃遣伺歸裁至壘即為曾所圍劉浚自守北門使伺守南門馬儁從曽來攻壘儁妻子先在壘中或欲皮其面以示之伺曰殺其妻子未能解圍但益其怒耳乃止曽攻陷北門伺被傷退入船開船底以出沈行五十步乃得免曽遣人說伺曰馬儁德卿全其妻子今盡以卿家内外百口付儁儁已盡心收視卿可來也伺報曰吾年六十餘不能復與卿作賊吾死亦當南歸妻子付汝裁之乃就王廙於甑山病創而卒戊寅趙誘朱軌及陵江將軍黄峻與曽戰於女觀湖誘等皆敗死曾乗勝徑造沔口威震江沔王使豫章太守周訪擊之訪有衆八千進至沌陽曾鋭氣甚盛訪使將軍李恒督左甄許朝督右甄訪自領中軍曽先攻左右甄訪於陣後射雉以安衆心令其衆曰一甄敗鳴三鼓兩甄敗鳴六鼓趙誘子胤將父餘兵屬左甄力戰敗而復合馳馬告訪訪怒叱令更進胤號哭還戰自旦至申兩甄皆敗訪選精銳八百人自行酒飲之敕不得妄動聞鼓音乃進曽兵未至三十步訪親鳴鼓將士皆騰躍犇赴曽遂大潰殺千餘人訪夜追之諸將請待明日訪曰曽驍勇能戰向者彼勞我逸故克之宐及其衰乗之可滅也乃鼓行而進遂定漢沔曾走保武當王廙始得至荆州訪以功遷梁州刺史屯㐮陽冬十月丁未琅邪王裒薨十一月己酉朔日有食之丁夘以劉琨為侍中太尉征南軍司戴邈上䟽以為䘮亂以來庠序隳廢議者或謂平世尚文遭亂尚武此言似之而實不然夫儒道深奥不可倉猝而成比天下平泰然後脩之則廢墜已乆矣又貴遊之子未必有斬將搴旗之才從軍征戌之役不及盛年使之講肄道義良可惜也世道久喪禮俗日弊猶火之消膏莫之覺也今王業肇建萬物權輿謂宐篤道崇儒以勵風化王從之始立太學漢主聦出畋以愍帝行車騎將軍戎服執㦸前導見者指之曰此故長安天子也聚而觀之故老有泣者太子粲言於聦曰昔周武王豈樂殺紂乎正恐同惡相求為患故也今興兵聚衆者皆以子業為名不如早除之聦曰吾前殺庾珉輩而民心猶如是吾未忍復殺也且小觀之十二月聦饗羣臣于光極殿使愍帝行酒洗爵已而更衣又使之執蓋晉臣多涕泣有失聲者尚書郎隴西辛賔起抱帝大哭聦命引出斬之趙固與河内太守郭黙侵漢河東至絳右司􅀠部民犇之者三萬餘人騎兵將軍劉勲追擊之殺萬餘人固黙引歸太子粲帥將軍劉雅生等步騎十萬屯小平津固揚言曰要當生縛劉粲以贖天子粲表於聦曰子業若死民無所望則不為李矩趙固之用不攻而自滅矣戊戌愍帝遇害於平陽粲遣雅生攻洛陽固犇陽城山是歲王命課督農功二千石長吏以入􅂖多少為殿最諸軍各自佃作即以為稟氐王揚茂搜卒長子難敵立與少子堅頭分領部曲難敵號左賢王屯下辨堅頭號右賢王屯河池河南王吐谷渾卒吐谷渾者慕容廆之庶兄也父涉歸分户一千七百以􅀠之及廆嗣位二部馬鬬廆遣使讓吐谷渾曰先公分建有别柰何不相逺異而令馬有鬭傷吐谷渾怒曰馬是六畜鬬乃其常何至怒及於人欲逺别甚易恐後㑹為難耳今當去汝萬里之外遂帥其衆西徙廆悔之遣其長史乙郍婁馮追謝之吐谷渾曰先公嘗稱卜筮之言云吾二子皆當彊盛祚流後世我孽子也理無並大今因馬而别殆天意乎遂不復還西傅隂山而居屬永嘉之亂因度隴而西據洮水之西極于白蘭地方數千里鮮卑謂兄為阿于廆追思之為之作阿于之歌吐谷渾有子六十人長子吐延嗣吐延長大有勇力􅆧胡皆畏之大興元年春正月遼西公疾陸眷卒其子㓜叔父渉復辰自立段匹磾自薊往犇䘮段末柸宣言匹磾之來欲為簒也匹磾至右北平涉復辰發兵拒之末柸乗虚襲涉復辰殺之并其子弟黨與自稱單于迎擊匹磾敗之匹磾走還薊三月癸丑愍帝凶問至建康王斬縗居廬百官請上尊號王不許紀瞻曰晉氏統絶於今二年陛下當承大業顧望宗室誰復與譲若光踐大位則神民有所憑依茍爲逆天時違人事大勢一去不可復還今兩都燔蕩宗廟無主劉聦竊號於西北而陛下方高讓於東南此所謂揖讓而救火也王猶不許使殿中將軍韓績徹去御坐瞻叱績曰帝坐上應列星敢動者斬王爲之改容奉朝請周嵩上䟽曰古之王者義全而後取讓成而後得是以享世長久重光萬載也今梓宫未返舊京未清義夫泣血士女遑遑宐開延嘉謀訓卒厲兵先雪社稷大恥副四海之心則神器將安適哉由是忤㫖出為新安太守又坐怨望抵罪嵩顗之弟也丙辰王即皇帝位百官皆陪列帝命王導升御牀共坐導固辭曰若太陽下同萬物蒼生何由仰照帝乃止大赦改元文武増位二等帝欲賜諸吏投刺勸進者加位一等民投刺者皆除吏凡二十餘萬人散騎常侍熊逺曰陛下應天繼統率土歸戴豈獨近者情重逺者情輕不若依漢法徧賜天下爵於恩為普且可以息檢覈之煩塞巧偽之端也帝不從庚午立王太子紹為皇太子太子仁孝喜文辭善武藝好賢禮士容受規諫與􅁃亮温嶠等為布衣之交亮風格峻整善談老莊帝器重之聘亮妹為太子妃帝以賀循行太子太傅周顗為少傅􅁃亮以中書郎侍講東宫帝好刑名家以韓非書賜太子庾亮諫曰申韓刻薄傷化不足留聖心太子納之帝復遣使授慕容廆龍驤將軍大單于昌黎公廆辭公爵不受廆以游邃為龍驤長史劉翔為主簿命邃創定府朝儀法裴嶷言於廆曰晉室衰微介居江表威德不能及逺中原之亂非明公不能拯也今諸部雖各擁兵然皆頑愚相聚宐以漸并取以為西討之資廆曰君言大非孤所及也然君中朝名德不以孤僻陋而教誨之是天以君賜孤而祐其國也乃以嶷為長史委以軍國之謀諸部弱小者稍稍擊取之李矩使郭黙郭誦救趙固屯于洛汭誦潛遣其將耿稚等夜濟河襲漢營漢貝丘王翼光覘知之以告太子粲請為之僃粲曰彼聞趙固之敗自保不暇安敢來此邪毋為驚動將士俄而稚等奄至十道進攻粲衆驚潰死傷太半粲走保陽鄉稚等據其營獲器械軍資不可勝數及旦粲見稚等兵少更與劉雅生収餘衆攻之漢主聦使太尉范隆帥騎助之與稚等相持苦戰二十餘日不能下李矩進兵救之漢兵臨河拒守矩兵不得濟稚等殺其所獲牛馬焚其軍資突圍犇虎牢詔以矩都督河南三郡諸軍事漢螽斯則百堂災燒殺漢主聦之子㑹稽王康等二十一人聦以其子濟南王驥為大將軍都督中外諸軍事録尚書齊王勱為大司徒焦嵩陳安舉兵逼上邽相國保遣使告急於張寔寔遣金城太守竇濤督步騎二萬赴之軍至新陽聞愍帝崩保謀稱尊號破􅆧都尉張詵言於寔曰南陽王國之䟽屬忘其大恥而亟欲自尊必不能成功晉王近親且有名德當帥天下以奉之寔從之遣牙門蔡忠奉表詣建康比至帝已即位寔不用江東年號猶稱建興夏四月丁丑朔日有食之加王敦江州牧王導驃騎大將軍開府儀同三司導遣八部從事行揚州郡國還同時俱見諸從事各言二千石官長得失獨顧和無言導問之和曰明公作輔寧使網漏吞舟何縁採聽風聞以察察爲政邪導咨嗟稱善和榮之族子也成丞相范長生卒成王雄以長生子侍中賁為丞相長生博學多藝能年近百嵗蜀人奉之如神漢中常侍王沈養女有美色漢主聦立以為左皇后尚書令王鑒中書監崔懿之中書令曹恂諫曰臣聞王者立后比徳乾坤生承宗廟没配后土必擇世德名宗幽閑令淑乃副四海之望稱神祇之心孝成帝以趙飛鷰為后使繼嗣絶滅社稷為墟此前鑑也自麟嘉以來中宫之位不以德舉借使沈之弟女刑餘小醜猶不可以塵汙椒房况其家婢邪六宫妃嬪皆公子公孫奈何一旦以婢主之臣恐非國家之福也聦大怒使中常侍宣懐謂太子粲曰鑒等小子狂言侮慢無復君臣上下之禮其速考實於是收鑒等送市皆斬之金紫光禄大夫王延馳將入諫門者弗通鑒等臨刑王沈以杖叩之曰庸奴復能為惡乎乃公何與汝事鑒瞋目叱之曰豎子滅大漢者正坐汝鼠輩與靳凖耳要當訴汝於先帝取汝於地下治之凖謂鑒曰吾受詔收君有何不善君言漢滅由吾也鑒曰汝殺皇太弟使主上獲不友之名國家畜養汝輩何得不滅懿之謂凖曰汝心如梟獍必為國患汝既食人人亦當食汝聦又立宣懷養女為中皇后司徒荀組在許昌逼於石勒帥其屬數百人渡江詔組與太保西陽王羕並録尚書事叚匹磾之犇疾陸眷䘮也劉琨使其世子羣送之匹磾敗羣為段末柸所得末柸厚禮之許以琨為幽州刺史欲與之襲匹磾宻遣使齎羣書請琨為内應為匹磾邏騎所得時琨别屯征北小城不知也來見匹磾匹磾以羣書示琨曰意亦不疑公是以白公耳琨曰與公同盟庶雪國家之恥若兒書密達亦終不以一子之故負公而忘義也匹磾雅重琨初無害琨意將聽還屯其弟叔軍謂匹磾曰我胡夷耳所以能服晉人者畏吾衆也今我骨肉乖離是其良圖之日若有奉琨以起吾族盡矣匹磾遂留琨琨之庶長子遵懼誅與琨左長史楊橋等閉門自守匹磾攻拔之代郡太守辟閭嵩後將軍韓據復潛謀襲匹磾事泄匹磾執嵩據及其徒黨悉誅之五月癸丑匹磾稱詔收琨縊殺之并殺其子姪四人琨從事中郎盧諶崔恱等帥琨餘衆犇遼西依段末柸奉劉羣為主將佐多犇石勒恱林之曽孫也朝廷以匹磾尚彊冀其能平河朔乃不為琨舉哀温嶠表琨盡忠帝室家破身亾宐在褒恤盧諶崔恱因末柸使者亦上表為琨訟寃後數嵗乃贈琨太尉侍中謚曰愍於是夷晉以琨死故皆不附匹磾末柸遣其弟攻匹磾匹磾帥其衆數千將犇邵續勒將石越邀之於鹽山大敗之匹磾復還保薊末柸自稱幽州刺史初温嶠為劉琨奉表詣建康其母崔氏固止之嶠絶裾而去既至屢求返命朝廷不許㑹琨死除散騎侍郎嶠聞母亡阻亂不得犇䘮臨􅁙固讓不拜苦請北歸詔曰凡行禮者當使理可經通今桀逆未梟諸軍奉迎梓宫猶未得進嶠以一身於何濟其私難而不從玉命邪嶠不得已受拜初曹嶷既據青州乃叛漢來降又以建康懸逺勢援不接復與石勒相結勒授嶷東州大將軍青州牧封琅邪公六月甲申以刁協為尚書令荀崧為左僕射協性剛悍與物多忤與侍中劉隗俱為帝所寵任欲矯時弊每崇上抑下排沮豪彊故為王氏所疾諸刻碎之政皆云隗協所建協又使酒放肆侵毁公卿見者皆側目憚之戊戌封皇子晞為武陵王劉虎自朔方侵拓跋鬱律西部秋七月鬱律擊虎大破之虎走出塞從弟路孤帥其部落降于鬱律於是鬱律西取烏孫故地東兼勿吉以西士馬精彊雄於北方漢主聦寢疾徴大司馬曜為丞相石勒為大將軍皆録尚書事受遺詔輔政曜勒固辭乃以曜為丞相領雍州牧勒為大將軍領幽冀二州牧勒辭不受以上洛王景為太宰濟南王驥為大司馬昌國公顗為太師朱紀為太傅呼延晏為太保並録尚書事范隆守尚書令儀同三司靳凖為大司空領司􅀠校尉皆迭决尚書奏事癸亥聦卒甲子太子粲即位尊皇后靳氏為皇太后樊氏號弘道皇后武氏號弘徳皇后王氏號弘孝皇后立其妻靳氏為皇后子元公為太子大赦改元漢昌􅁙聦於宣光陵謚曰昭武皇帝廟號烈宗靳太后等皆年未盈二十粲多行無禮無復哀戚靳凖隂有異志私謂粲曰如聞諸公欲行伊霍之事先誅太保及臣以大司馬統萬機陛下宐早圖之粲不從凖懼復使二靳氏言之粲乃從之収其太宰景大司馬驥驥母弟車騎大將軍呉王逞太師顗大司徒齊王勱皆殺之朱紀范隆犇長安八月粲治兵於上林謀討石勒以丞相曜為相國都督中外諸軍事仍鎮長安靳凖為大將軍録尚書事粲常逰宴後宫軍國之事一决於凖凖矯詔以從弟明為車騎將軍康為衛將軍凖將作亂謀於王延延弗從馳將告之遇靳康劫延以歸凖遂勒兵升光極殿使甲士執粲數而殺之謚曰隱帝劉氏男女無少長皆斬東市發永光宣光二陵斬聦屍焚其宗廟凖自號大將軍漢天王稱制置百官謂安定胡嵩曰自古無胡人爲天子者今以傳國璽付汝還如晉家嵩不敢受凖怒殺之遣使告司州刺史李矩曰劉淵屠各小醜因晉之亂矯稱天命使二帝幽没輒帥衆扶侍梓宫請以上聞矩馳表于帝帝遣太常韓􅅌等奉迎梓宫漢尚書北宫純等招集晉人堡於東宫靳康攻滅之凖欲以王延爲左光禄大夫延罵曰屠各逆奴何不速殺我以吾左目置西陽門觀相國之入也右目置建春門觀大將軍之入也凖殺之相國曜聞亂自長安赴之石勒帥精鋭五萬以討凖據襄陵北原凖數挑戰勒堅壁以挫之冬十月曜至赤壁大保呼延晏等自平陽歸之與太傅朱紀等共上尊號曜即皇帝位大赦惟靳凖一門不在赦例改元光初以朱紀領司徒呼延晏領司空太尉范隆以下悉復本位以石勒為大司馬大將軍加九錫増封十郡進爵為趙公勒進攻凖於平陽巴及􅆧羯降者十餘萬落勒皆徙之於所部郡縣漢主曜使征北將軍劉雅鎮北將軍劉䇿屯汾隂與勒共討凖十一月乙夘日夜出高三丈詔以王敦為荆州牧加陶侃都督交州諸軍事敦固辭州牧乃聽為刺史庚申詔群公卿士各陳得失御史中丞熊逺上䟽以為胡賊猾夏梓宫未返而不能遣軍進討一失也群官不以讎賊未報為恥務在調戯酒食而已二失也選官用人不料實徳惟在白望不求才幹惟事請託當官者以治事為俗吏奉灋為苛刻盡禮為諂䛕從容為高妙放蕩為達士驕蹇為簡雅三失也世之所惡者陸沈泥滓時之所善者翺翔雲霄是以萬機未整風俗偽薄朝廷羣司以從順為善相違見貶安得朝有辨爭之臣士無禄仕之志乎古之取士敷奏以言今光禄不試甚違古義又舉賢不出世族用灋不及權貴是以才不濟務姦無所懲若此道不改求以救亂難矣先是帝以離亂之際欲慰恱人心州郡秀孝至者不試普皆署吏尚書陳頵亦上言宐漸循舊制試以經䇿帝從之仍詔不中科者刺史太守免官於是秀孝皆不敢行其有到者亦皆託疾比三年無就試者帝欲特除孝廉已到者官尚書郎孔坦奏議以為近郡懼累君父皆不敢行逺郡冀於不試冒昧來赴今若偏加除署是為謹身奉灋者失分僥倖投射者得官頽風傷教恐從此始不若一切罷歸而為之延期使得就學則灋均而令信矣帝從之聽孝亷甲至七年乃試坦愉之從子也靳凖使侍中卜泰送乗輿服御請和於石勒勒囚泰送於漢主曜曜謂泰曰先帝末年實亂大倫司空行伊霍之權使朕及此其功大矣若早迎大駕者當悉以政事相委况免死乎卿為朕入城具宣此意泰還平陽凖自以殺曜母兄沈吟未從十二月左右車騎將軍喬泰王騰衛將軍靳康等相與殺凖推尚書令靳明為主遣卜㤗奉傳國六璽降漢石勒大怒進軍攻明明出戰大敗乃嬰城固守丁丑封皇子煥為琅邪王煥鄭夫人之子生二年矣帝愛之以其疾篤故王之己夘薨帝以成人之禮􅁙之備吉凶儀服營起園陵功費甚廣琅邪國右常侍㑹稽孫霄上䟽諫曰古者凶荒殺禮况今海内喪亂憲章舊制猶宐節省而禮典所無顧崇飾如是乎竭已罷之民營無益之事殫已困之財脩無用之費此臣之所不安也帝不從彭城内史周撫殺沛國内史周黙以其衆降石勒詔下邳内史劉遐領彭城内史與徐州刺史蔡豹泰山太守徐龕共討之豹質之玄孫也石虎帥幽冀之兵㑹石勒攻平陽靳明屢敗遣使求救於漢漢主曜使劉雅劉䇿迎之明帥平陽士女萬五千人犇漢曜西屯粟邑収靳氏男女無少長皆斬之曜迎其母胡氏之䘮於平陽􅁙于粟邑號曰陽陵謚曰宣明皇太后石勒焚平陽宫室使裴憲石㑹脩永光宣光二陵収漢主粲已下百餘口􅁙之置戌而歸成梁州刺史李鳳數有功成主雄兄子稚在晉壽疾之鳳以巴西叛雄自至涪使太傅驤討鳳斬之以李壽為前將軍督巴西軍事資治通鑑卷第九十
