body:
  text: 臣司馬光奉勑編集唐紀六十一圉大荒落凡四年起閼逢攝提格盡彊文宗元聖昭獻孝皇帝中大和八年春正月上疾小瘳丁巳御大和殿見近臣然神識耗減不能復故二月壬午朔日有食之夏六月丙戌莒王紓薨上以乆旱詔求致雨之方司門員外郎李中敏上表以為仍歲大旱非聖德不至直以宋申錫之寃濫鄭注之姦邪今致雨之方莫若斬注而雪申錫表留中中敏謝病歸東都郯王經薨初李仲言流象州遇赦還東都㑹留守李逢吉思復入相仲言自言與鄭注善逢吉使仲言厚賂之注引仲言見王守澄守澄薦於上云仲言善易上召見之時仲言有母服難入禁中乃使衣民服號王山人仲言儀狀秀偉倜儻尚氣頗工文辭有口辨多權數上見之大恱以為竒士待遇日隆仲言既除服秋八月辛夘上欲以仲言為諫官寘之翰林李德裕曰仲言曏所為計陛下必盡知之豈宜寘之近侍上曰然豈不容其改過對曰臣聞惟顔囘能不貳過彼聖賢之過但思慮不至或失中道耳至於仲言之惡著於心本安能悛改邪上曰李逢吉薦之朕不欲食言對曰逢吉身為宰相乃薦姦邪以誤國亦罪人也上曰然則别除一官對曰亦不可上顧王涯涯對曰可德裕揮手止之上囘顧適見色殊不懌而罷始涯聞上欲用仲言草諫䟽極憤激既而見上意堅且畏其黨盛遂中變尋以仲言為四門助教給事中鄭肅韓佽封還敕書德裕將出中書謂涯曰且喜給事中封敕涯即召肅佽謂曰李公適留語令二閣老不用封敕二人即行下明日以白德裕德裕驚曰德裕不欲封還當面聞何必使人傳言且有司封駮豈復禀宰相意邪二人悵恨而去九月辛亥徴昭義節度副使鄭注至京師王守澄李仲言鄭注皆惡李德裕以山南西道節度使李宗閔與德裕不相恱引宗閔以敵之壬戌詔徴宗閔於興元冬十月辛巳幽州軍亂逐節度使楊志誠及監軍李懷仵推兵馬使史元忠主留務庚寅以李宗閔為中書侍郎同平章事甲午以中書侍郎同平章事李德裕同平章事充山南西道節度使是日以李仲言為翰林侍講學士給事中髙銖鄭肅韓佽諫議大夫郭承嘏中書舍人權璩等争之不能得承嘏晞之孫璩德輿之子也乙巳貢院奏進士復試詩賦從之李德裕見上自陳請留京師丙午以德裕為兵部尚書楊志誠過太原李載義自􅇌擊欲殺之幕僚諫救得免殺其妻子及從行將卒朝廷以載義有功不問載義母兄葬幽州志誠􅀤取其財載義奏乞取志誠心以祭母不許十一月成德節度使王庭湊薨軍中奉其子都知兵馬使元逵知留後元逵改父所爲事朝廷禮甚謹史元忠獻楊志誠所造衮衣及諸僭物丁􅆗流志誠於嶺南道殺之李宗閔言李德裕制命己行不冝自便乙亥復以德裕爲鎭海節度使不復兼平章事時德裕宗閔各有朋黨互相擠援上患之每歎曰去河北賊易去朝中朋黨難臣光曰夫君子小人之不相容猶水炭之不可同器而處也故君子得位則斥小人小人得勢則排君子此自然之理也然君子進賢退不肖其處心也公其指事也實小人與其所好毁其所惡其處心也私其指事也誣公且實者謂之正直私且誣者謂之朋黨在人主所以辨之耳是以明主在上度德而叙位量能而授官有功者賞有罪者刑姧不能惑佞不能移夫如是則朋黨何自而生哉彼昏主則不然明不能燭彊不能斷邪正並進毁譽交至取捨不在於己威福潛移於人於是讒慝得志而朋黨之議興矣夫木腐而蠧生醯酸而蜹集故朝廷有朋黨則人主當自咎而不當以咎羣臣也文宗茍患羣臣之朋黨何不察其所毁譽者為實為誣所進退者為賢為不肖其心為公為私其人為君子為小人茍實也賢也公也君子也匪徒用其言又當進之誣也不肖也私也小人也匪徒弃其言又當刑之如是雖使之為朋黨孰敢哉釋是不為乃怨羣臣之難治是猶不種不芸而怨田之蕪也朝中之黨且不能去况河北賊乎丙子李仲言請改名訓幽州奏莫州軍亂刺史張元汎不知所在十二月己夘以昭義節度副使鄭注為太僕卿郭承嘏累上䟽言其不可上不聽於是注詐上表固辭上遣中使再以告身賜之不受癸未以史元忠為盧龍留後初宋申錫與御史中丞宇文鼎受密詔誅鄭注使京兆尹王璠掩捕之璠密以堂帖示王守澄注由是得免深德璠璠又與李訓善於是訓注共薦之自浙西觀察使徴為尚書左丞九年春正月乙夘以王元逵為成德節度使巢公湊薨追贈齊王鄭注上言秦地有災宜興役以禳之辛夘􅀤左右神䇿千五百人浚曲江及昆明池三月冀王絿薨丙辰以史元忠為盧龍節度使初李德裕為浙西觀察使漳王傅母杜仲陽坐宋申錫事放歸金陵詔德裕存處之㑹德裕已離浙西牒留後李蟾使如詔㫖至是左丞王璠户部侍郎李漢奏德裕厚賂仲陽隂結漳王圖為不軌上怒甚召宰相及璠漢鄭注等面質之璠漢等極口誣之路隋曰德裕不至亦果如所言臣亦應得罪言者稍息夏四月以德裕為賔客分司癸巳以鄭注守太僕卿兼御史大夫注始受之仍舉倉部貟外郎李􅅃自代曰加臣之罪雖於理而無辜在􅅃之誠乃事君而盡節時人皆哂之丙申以門下侍郎同平章事路隋同平章事充鎭海節度使趣之赴鎭不得面辭坐救李徳裕故也初京兆尹河南賈餗性褊躁輕率與李德裕有隙而善於李宗閔鄭注上已賜百官宴於曲江故事尹於外門下馬揖御史餗恃其貴勢乘馬直入殿中侍御史楊儉蘇特與之争餗罵曰黄靣兒敢爾坐罰俸餗恥之求出詔以為浙西觀察使尚未行戊戌以餗為中書侍郎同平章事庚子制以曏日上初得疾王涯呼李德裕奔問起居德裕竟不至又在西蜀徴逋懸錢三十萬緍百姓愁困貶德裕袁州長史初宋申錫獲罪宦官益横上外雖包容内不能堪李訓鄭注既得幸揣知上意訓因進講數以微言動上上見其才辯意訓可與謀大事且以訓注皆因王守澄以進冀宦官不之疑遂密以誠告之訓注遂以誅宦官為己任二人相挾朝夕計議所言於上無不從聲勢烜赫注多在禁中或時休沐賔客填門賂遺山積外人但知訓注倚宦官擅作威福不知其與上有密謀也上之立也右領軍將軍興寜仇士良有功王守澄抑之由是有隙訓注為上謀進擢士良以分守澄之權五月乙丑以士良為左神䇿中尉守澄不恱戊辰以左丞王璠為户部尚書判度支京城訛言鄭注為上合金丹須小兒心肝民間驚懼上聞而惡之鄭注素惡京兆尹楊虞卿與李訓共搆之云此語出於虞卿家人上怒六月下虞卿御史獄注求為兩省官中書侍郎同平章事李宗閔不許注毁之於上㑹宗閔救楊虞卿上怒叱出之壬寅貶明州刺史左神䇿中尉韋元素樞密使楊承和王踐言乆居中用事與王守澄争權不叶李訓鄭注因之出承和於西川元素於淮南踐言於河東皆為監軍秋七月甲辰朔貶楊虞卿䖍州司馬庚戌作紫雲樓於曲江辛亥以御史大夫李固言為門下侍郎同平章事李訓鄭注為上畫太平之䇿以為當先除宦官次復河湟次清河北開陳方略如指諸掌上以為信然寵任日隆初李宗閔為吏部侍郎因駙馬都尉沈􅔲結女學士宋若憲知樞密楊承和得為相及貶明州鄭注􅀤其事壬子再貶處州長史著作郎分司舒元輿與李訓善訓用事召為右司郎中兼侍御史知雜鞫楊虞卿獄癸丑擢為御史中丞元輿元襃之兄也貶吏部侍郎李漢為汾州刺史刑部侍郎蕭澣為遂州刺史皆坐李宗閔之黨是時李訓鄭注連逐三相威震天下於是平生絲恩髪怨無不報者李訓奏僧尼猥多耗蠧公私丁巳詔所在試僧尼誦經不中格皆勒歸俗禁置寺及私度人時人皆言鄭注朝夕且為相侍御史李甘揚言於朝曰白麻出我必壞之於庭癸亥貶甘封州司馬然李訓亦忌注不欲使為相事竟寢甲子以國子博士李訓爲兵部郎中知制誥依前侍講學士貶左金吾大將軍沈􅔲爲邵州刺史八月丙子又貶李宗閔潮州司户賜宋若憲死丁丑以太僕卿鄭注爲工部尚書充翰林侍講學士注好服鹿裘以隠淪自處上以師友待之注之初得幸上嘗問翰林學士户部侍郎李珏曰卿知有鄭注乎亦嘗與之言乎對曰臣豈特知其姓名兼深知其爲人其人姧邪陛下寵之恐無益聖德臣忝在近宻安敢與此人交通戊寅貶珏江州刺史再貶沈􅔲柳州司户丙申詔以楊承和庇護宋申錫韋元素王踐言與李宗閔李德裕中外連結受其賂遺承和可驩州安置元素可象州安置踐言可恩州安置令所在錮送楊虞卿李漢蕭澣為朋黨之首貶虞卿䖍州司户漢汾州司馬澣遂州司馬尋遣使追賜承和元素踐言死時崔潭峻已卒亦剖棺鞭尸己亥以前廬州刺史羅立言為司農少卿立言贓吏以賂結鄭注而得之鄭注之入翰林也中書舍人髙元裕草制言以醫藥奉君親注衘之奏元裕嘗出郊送李宗閔壬寅貶元裕閬州刺史元裕士廉之六世孫也時注與李訓所惡朝士皆指目為二李之黨貶逐無虚日班列殆空廷中忷忷上亦知之訓注恐為人所揺九月癸夘朔勸上下詔應與德裕宗閔親舊及門生故吏今日以前貶黜之外餘皆不問人情稍安鹽鐵使王涯奏改江淮嶺南茶灋增其税庚申以鳳翔節度使李聽為忠武節度使代杜悰憲宗之崩也人皆言宦官陳􅀪志所為時􅀪志為山南東道監軍李訓為上謀召之至青泥驛癸亥封杖殺之鄭注求為鳳翔節度使門下侍郎同平章事李固言不可丁夘以固言為山南西道節度使注為鳳翔節度使李訓雖因注得進及勢位俱盛心頗忌注謀欲中外協勢以誅宦官故出注於鳳翔其實俟既誅宦官并圗注也注欲取名家才望之士為參佐請禮部員外郎韋温為副使温不可或曰拒之必為患温曰擇禍莫若輕拒之止於逺貶從之有不測之禍卒辭之戊辰以右神䇿中尉行右衞上將軍知内侍省事王守澄為左右神䇿觀軍容使兼十二衞統軍李訓鄭注為上謀以虚名尊守澄實奪之權也己巳以御史中丞兼刑部侍郎舒元輿為刑部侍郎兵部郎中知制誥充翰林侍講學士李訓為禮部侍郎並同平章事仍命訓三二日一入翰林講易元輿為中丞凡訓注所惡者則為之弹擊由是得為相又上懲李宗閔李德裕多朋黨以賈餗及元輿皆孤寒新進故擢為相庶其無黨耳訓起流人期年致位宰相天子傾意任之訓或在中書或在翰林天下事皆决於訓而涯輩承順其風指惟恐不逮自中尉樞密禁衞諸將見訓皆震慴迎拜叩首壬申以刑部郎中兼御史知雜李孝本權知御史中丞孝本宗室之子依訓注得進李聽自恃勲舊不禮於鄭注注代聽鎮鳳翔先遣牙將丹駿至軍中慰勞誣奏聽在鎮貪虐冬十月乙亥以聽為太子太保分司復以杜悰為忠武節度使鄭注每自負經濟之略上問以富人之術注無以對乃請􅅦茶於是以王涯兼􅅦茶使涯知不可而不敢違人甚苦之鄭注欲收僧尼之譽固請罷沙汰從之李訓鄭注密言於上請除王守澄辛巳遣中使李好古就第賜酖殺之贈楊州大都督訓注本因守澄進卒謀而殺之人皆快守澄之受佞而疾訓注之隂狡於是元和之逆黨略盡矣乙酉鄭注赴鎮庚子以東都留守司徒兼侍中裴度兼中書令餘如故李訓所奬拔率皆狂險之士然亦時取天下重望以順人心如裴度令狐楚鄭覃皆累朝耆俊乆為當路所軋置之散地訓皆引居崇秩由是士大夫亦有望其真能致太平者不惟天子惑之也然識者見其横甚知將敗矣十一月丙午以大理卿郭行餘為邠寜節度使癸丑以河東節度使同平章事李載義兼侍中丁巳以户部尚書判度支王璠為河東節度使戊午以京兆尹李石為户部侍郎判度支以京兆少尹羅立言權知府事石神符之五世孫也己未以太府卿韓約為左金吾衞大將軍始鄭注與李訓謀至鎮選壯士數百皆持白棓懷其斧以為親兵是月戊辰王守澄葬於滻水注奏請入䕶葬事因以親兵自隨仍奏令内臣中尉以下盡集滻水送葬注因闔門令親兵斧之使無遺類約既定訓與其黨謀如此事成則注專有其功不若使行餘璠以赴鎮為名多募壯士為部曲并用金吾臺府吏卒先期誅宦者已而并注去之行餘璠立言約及中丞李孝本皆訓素所厚也故列置要地獨與是數人及舒元輿謀之它人皆莫之知也壬戌上御紫宸殿百官班定韓約不報平安奏稱左金吾聽事後石榴夜有甘露臣遞門奏訖因蹈舞再拜宰相亦帥百官稱賀訓元輿勸上親往觀之以承天貺上許之百官退班於含元殿日加辰上乘軟輿出紫宸門升含元殿先命宰相及兩省官詣左仗視之良乆而還訓奏臣與衆人驗之殆非真甘露未可遽宣布恐天下稱賀上曰豈有是邪顧左右中尉仇士良魚志􅀪帥諸宦者往視之宦者既去訓遽召郭行餘王璠曰來受敕㫖璠股栗不敢前獨行餘拜殿下時二人部曲數百皆執兵立丹鳳門外訓已先使入召之令入受敕獨東兵入邠寜兵竟不至仇士良等至左仗視甘露韓約變色流汗士良怪之曰將軍何為如是俄風吹幕起見執兵者甚衆又聞兵仗聲士良等驚駭走出門者欲閉之士良叱之關不得上士良等奔詣上告變訓見之遽呼金吾衛士曰來上殿衛乘輿者人賞錢百緍宦者曰事急矣請陛下還宫即舉軟輿迎上扶升輿决殿後罘罳疾趨北出訓攀輿呼曰臣奏事未竟陛下不可入宫金吾兵已登殿羅立言帥京兆邏卒三百餘自東來李孝本帥御史臺從人二百餘自西來皆登殿縱擊宦官流血呼寃死傷者十餘人乘輿迤邐入宣政門訓攀輿呼益急上叱之宦官郗志榮奮拳敺其胷偃於地乘輿既入門隨闔宦者皆呼萬歲百官駭愕散出訓知事不濟脫從吏緑衫衣之走馬而出揚言於道曰我何罪而竄謫人不之疑王涯賈餗舒元輿還中書相謂曰上且開延英召吾屬議之兩省官詣宰相請其故皆曰不知何事諸公各自便士良等知上豫其謀怨憤出不遜語上慙懼不復言士良等命左右神䇿副使劉泰倫魏仲卿等各帥禁兵五百人露刃出閤門討賊王涯等將㑹食吏白有兵自内出逢人輒殺涯等狼狽歩走兩省及金吾吏卒千餘人填門爭出門尋闔其不得出者六百餘人皆死士良等分兵閉宫門索諸司討賊黨諸司吏卒及民酤販在中者皆死死者又千餘人横尸流血狼藉塗地諸司印及圖籍帷幕器皿俱盡又遣􅀐各千餘出城追亡者又遣兵大索城中舒元輿易服單􅀐出安化門禁兵追擒之王涯徒歩至永昌里茶肆禁兵擒入左軍涯時年七十餘􅀍以桎梏掠治不勝苦自誣服稱與李訓謀行大逆尊立鄭注王璠歸長興坊私第閉門以其兵自防神䇿將至門呼曰王涯等謀反欲起尚書爲相魚䕶軍令致意璠喜出見之將趨賀再三璠知見紿涕泣而行至左軍見王涯曰二十兄自反胡為見引涯曰五弟昔為京兆尹不漏言於王守澄豈有今日邪璠俛首不言又收羅立言於太平里及涯等親屬奴婢皆入兩軍繫之户部貟外郎李元臯訓之再從弟也訓實與之無恩亦執而殺之故嶺南節度使胡証家鉅富禁兵利其財託以搜賈餗入其家執其子溵殺之又入左常侍羅讓詹事渾鍼翰林學士黎埴等家掠其貲財掃地無遺鍼瑊之子也坊市惡少年因之報私仇殺人剽掠百貨互相攻劫塵埃蔽天癸亥百官入朝日出始開建福門惟聽以從者一人自隨禁兵露刃夾道至宣政門尚未開時無宰相御史知班百官無復班列上御紫宸殿問宰相何為不來仇士良曰王涯等謀反繫獄因以涯手狀呈上召左僕射令狐楚右僕射鄭覃等升殿示之上悲憤不自勝謂楚等曰是涯手書乎對曰是也誠如此罪不容誅因命楚覃留宿中書參决機務使楚草制宣告中外楚叙王涯賈餗反事浮沉仇士良等不恱由是不得為相時坊市剽掠者猶未止命左右神䇿將楊鎮靳遂良等各將五百人分屯通衢擊鼓以警之斬十餘人然後定賈餗變服潛民閒經宿自知無所逃素服乘驢詣興安門自言我宰相賈餗也為姧人所汚可送我詣兩軍門者執送西軍李孝本改衣緑猶服金帶以帽鄣面單騎奔鳳翔至咸陽西追擒之甲子以右僕射鄭覃同平章事李訓素與終南僧宗宻善往投之宗宻欲剃其髪而匿之其徒不可訓出山將奔鳳翔為盩厔鎮遏使宋楚所擒械送京師至昆明池訓恐至軍中更受酷辱謂送者曰得我者則富貴矣聞禁兵所在搜捕汝必為所奪不若取我首送之送者從之斬其首以來乙丑以户部侍郎判度支李石同平章事仍判度攴前河東節度使李載義復舊任左神䇿出兵三百人以李訓首引王涯王璠羅立言郭行餘右神䇿出兵三百人擁賈餗舒元輿李孝本獻于廟社徇于兩市命百官臨視􅆎斬于獨栁之下梟其首於興安門外親屬無問親踈皆死孩稺無遺妻女不死者没為官婢百姓觀者怨王涯􅅦茶或詬詈或投瓦礫擊之臣光曰論者皆謂涯餗有文學名聲初不知訓注之謀横罹覆族之禍憤歎其􅁈臣獨以為不然夫顛危不扶焉用彼相涯餗安髙位飽重禄訓注小人窮姧宄險力取將相涯餗與之比肩不以為恥國家危殆不以為憂偷合茍容日復一日自謂得保身之良䇿莫我如也若使人人如此而無禍則姧臣孰不願之哉一旦禍生不虞足折刑剭蓋天誅之也士良安能族之哉王涯有再從弟沐家於江南老且貧聞涯為相跨驢詣之欲求一簿尉留長安二歲餘始得一見涯待之殊落莫乆之沐因嬖奴以道所欲涯許以微官自是旦夕造涯之門以俟命及涯家被收沐適在其第與涯俱􅆎斬舒元輿有族子守謙愿而敏元輿愛之從元輿者十年一旦忽以非罪怒之日加譴責奴婢輩亦薄之守謙不自安求歸江南元輿亦不留守謙悲歎而去夕至昭應聞元輿收族守謙獨免是日以令狐楚為鹽鐵轉運使左散騎常侍張仲方權知京兆尹時數日之間殺生除拜皆决於兩中尉上不豫知初王守澄惡宦者田全操劉行深周元稹薛士幹似先義逸劉英誗等李訓鄭注因之遣分詣鹽州靈武涇原夏州振武鳳翔廵邉命翰林學士顧師邕為詔書賜六道使殺之㑹訓敗六道得詔皆廢不行丙寅以師邕為矯詔下御史獄先是鄭注將親兵五百已􅀤鳳翔至扶風扶風令韓遼知其謀不供具􅂝印及吏卒奔武功注知訓已敗復還鳳翔仇士良等使人齎密敕授鳳翔監軍張仲清令取注仲清惶惑不知所為押牙李叔和說仲清曰叔和為公以好召注屏其從兵於坐取之事立定矣仲清從之伏甲以待注注恃其兵衛遂詣仲清叔和稍引其從兵享之於外注獨與數人入既啜茶叔和抽刀斬注因閉外門悉誅其親兵乃出密敕宣示將士遂滅注家并殺副使錢可復節度判官盧簡能觀察判官蕭傑掌書記盧􅀪茂等及其枝黨死者千餘人可復徽之子簡能綸之子傑俛之弟也朝廷未知注死丁夘詔削奪注官爵令鄰道桉兵觀變以左神䇿大將軍陳君奕為鳳翔節度使戊辰夜張仲清遣李叔和等以注首入獻梟於興安門人情稍安京師諸軍始各還營詔將士討賊有功及娖隊者官爵賜賚各有差右神䇿軍獲韓約於崇義坊己巳斬之仇士良等各進階遷官有差自是天下事皆决於北司宰相行文書而已宦官氣益盛迫脅天子下視宰相陵暴朝士如草芥每延英議事士良等動引訓注折宰相鄭覃李石曰訓注誠為亂首但不知訓注始因何人得進宦者稍屈搢紳頼之時中書惟有空垣破屋百物皆闕江西湖南獻衣糧百二十分充宰相召募從人辛未李石上言宰相若忠正無邪神靈所祐縱遇盗賊亦不能傷若内懷姧㒺雖兵衞甚設鬼得而誅之臣願竭赤心以報國止循故事以金吾卒導從足矣其兩道所獻衣糧並乞停寢從之十二月壬申朔顧師邕流儋州至商山賜死􅅦茶使令狐楚奏罷􅅦茶從之度支奏籍鄭注家貲得絹百餘萬匹它物稱是庚辰上問宰相坊市安未李石對曰漸安然比日寒冽特甚蓋刑殺太過所致鄭覃曰罪人周親前已皆死其餘殆不足問時宦官深怨李訓等凡與之有瓜葛親或蹔䝉奬引者誅貶不已故二相言之李訓鄭注既誅召六道廵邉使田全操追忿訓注之謀在道􅀭言我入城凡儒服者無貴賤當盡殺之癸未全操等乘驛疾驅入金光門京城訛言有宼至士民驚譟縱横走塵埃四起兩省諸司官聞之皆奔散有不及束帶韈而乘馬者鄭覃李石在中書顧吏卒稍稍逃去覃謂石曰耳目頗異宜且出避之石曰宰相位尊望重人心所屬不可輕也今事虚實未可知堅坐鎮之庶㡬可定若宰相亦走則中外亂矣且果有禍亂避亦不免覃然之石坐視文案沛然自若敕使相繼傳呼閉皇城諸司門左金吾大將軍陳君賞帥其衆立望仙門下謂敕使曰賊至閉門未晩請徐觀其變不宜示弱至晡後乃定是日坊市惡少年皆衣緋皁執弓刀北望見皇城閉即欲剽掠非石與君賞鎮之京城幾再亂矣時兩省官應入直者皆與其家人辭訣甲申敕罷修曲江亭館丁亥詔逆人親黨自非前已就戮及指名收捕者餘一切不問諸司官吏雖為所脅從渉於詿誤皆赦之它人母得妄相告言及相恐愒見亡匿者勿復追捕三日内各聽自歸本司時禁軍暴横京兆尹張仲方不敢詰宰相以其不勝任出為華州刺史以司農卿薛元賞代之元賞甞詣李石第聞石方坐聽事與一人争辨甚喧元賞使覘之云有神䇿軍將訴事元賞趨入責石曰相公輔佐天子紀綱四海今近不能制一軍將使無禮如此何以鎮服四夷即趨出上馬命左右擒軍將俟於下馬橋元賞至則已解衣跽之矣其黨訴於仇士良士良遣宦者召之曰中尉屈大尹元賞曰屬有公事行當繼至遂杖殺之乃白服見士良士良曰癡書生何敢杖殺禁軍大將元賞曰中尉大臣也宰相亦大臣也宰相之人若無禮於中尉如之何中尉之人無禮於宰相庸可恕乎中尉與國同體當為國惜灋元賞已囚服而來惟中尉死生之士良知軍將已死無可如何乃呼酒與元賞歡飲而罷初武元衡之死詔出内庫弓矢陌刀給金吾仗使衛從宰相至建福門而退至是悉罷之開成元年春正月辛丑朔上御宣政殿赦天下改元仇士良請以神䇿仗衛殿門諫議大夫馮定言其不可乃止定宿之弟也二月癸未上與宰相語患四方表奏華而不典李石對曰古人因事為文今人以文害事昭義節度使劉從諫上表請王涯等罪名且言涯等儒生荷國榮寵咸欲保身全族安肯搆逆訓等實欲討除内臣兩中尉自為救死之謀遂致相殺誣以反逆誠恐非辜設若宰相實有異圖當委之有司正其刑典豈有内臣擅領甲兵恣行剽劫延及士庶横被殺傷流血千門僵尸萬計搜羅枝蔓中外恫疑臣欲身詣闕廷靣陳臧否恐并陷孥戮事亦無成謹當修飾封疆訓練士卒内為陛下心腹外為陛下藩垣如姧臣難制誓以死清君側丙申加從諫檢校司徒天德軍奏吐谷渾三千帳詣豐州降三月壬寅以袁州長史李德裕為滁州刺史左僕射令狐楚從容奏王涯等既伏辜其家夷滅遺骸弃捐請官為収瘞以順陽和之氣上慘然乆之命京兆収􅁙涯等十一人於城西各賜衣一襲仇士良潛使人􅀤之弃骨於渭水丁未皇城留守郭皎奏諸司儀仗有鋒刃者請皆輸軍器使遇立仗别給儀刀從之劉從諫復遣牙將焦楚長上表讓官稱臣之所陳繫國大體可聽則涯等宜䝉湔洗不可聽則賞典不宜妄加安有死寃不申而生者荷禄因暴揚仇士良等罪惡辛酉上召見楚長慰諭遣之時士良等恣横朝臣日憂破家及從諫表至士良等憚之由是鄭覃李石粗能秉政天子倚之亦差以自彊夏四月乙夘以潮州司户李宗閔為衡州司馬凡李訓所指為李德裕宗閔黨者稍稍収復之淄王協薨甲午以山南西道節度使李固言為門下侍郎同平章事以左僕射令狐楚代之戊戌上與宰相從容論詩之工拙鄭覃曰詩之工者無若三百篇皆國人作之以刺美時政王者采之以觀風俗耳不聞王者為詩也後代辭人之詩華而不實無補於事陳後主隋煬帝皆工於詩不免亡國陛下何取焉覃篤於經術上甚重之己酉上御紫宸殿宰相因奏事拜謝外間因訛言天子欲令宰相掌禁兵已拜恩矣由是中外復有猜阻人情忷忷士民不敢解衣寢者數日乙丑李石奏請召仇士良等面釋其疑上為召士良等出上及石等共諭釋之使毋疑懼然後事解閏月乙酉以太子太保分司李聽為河中節度使上常歎曰付之兵不疑置之散地不怨惟聽為可以然乙未李固言薦崔球為起居舍人鄭覃再三以為不可上曰公事勿相違覃曰若宰相盡同則事必有欺陛下者矣李孝本二女配没右軍上取之入宫秋七月右拾遺魏謩上䟽以為陛下不邇聲色屢出宫女以配鰥夫竊聞數月以來教坊選試以百數莊宅収市猶未巳又召李孝本女入宫不避宗姓大興物論臣竊惜之昔漢光武一顧列女屏風宋􅀪猶正色抗言光武即撤之陛下豈可不思宋􅀪之言欲居光武之下乎上即出孝本女擢謩為補闕曰朕選市女子以賜諸王耳憐孝本女宗枝髫齓孤露故収養宫中謩於疑似之間皆能盡言可謂愛我不忝厥祖矣命中書優為制辭以賞之謩徴之五世孫也鄜坊節度使蕭洪詐稱太后弟事覺八月甲辰流驩州於道賜死趙縝吕璋等皆流嶺南初李訓知洪之詐洪懼辟訓兄仲京置幕府先是自神䇿軍出為節度使者軍中皆資其行裝至鎮二倍償之有自左軍出鎮鄜坊未償而死者軍中徴之於洪洪恃訓之勢不與又徴於死者之子洪教其子遮宰相自言訓判絶之仇士良由是恨洪太后有異母弟在閩中孱弱不能自逹有閩人蕭本從之得其内外族諱因士良進逹於上且􅀤洪之詐洪由是得罪上以本為真太后弟戊申擢為右贊善大夫九月丁丑李石為上言宋申錫忠直為讒人所誣竄死遐荒未䝉昭雪上俛首乆之既而流涕􅊄然曰兹事朕乆知其誤姧人逼我以社稷大計兄弟㡬不能保况申錫僅全􅆎領耳非獨内臣外廷亦有助之者皆由朕之不明曏使遇漢昭帝必無此寃矣鄭覃李固言亦共言其寃上深痛恨有慙色庚辰詔悉復申錫官爵以其子慎微為成固尉李石用金部員外郎韓益判度支桉益坐􅂍三千餘緡繫獄石曰臣始以益頗曉錢榖故用之不知其貪乃如是上曰宰相但知人則用有過則懲如此則人易得卿所用人不掩其惡可謂至公從前宰相用人好曲蔽其過不欲人彈劾此大病也冬十月丁巳貶益梧州司户上自甘露之變意忽忽不樂兩軍毬鞠之㑹什減六七雖宴享音伎雜遝盈庭未嘗解顔閑居或徘徊眺望或獨語歎息壬午上於延英謂宰相曰朕每與卿等論天下事則不免愁對曰為理者不可以速成上曰朕每讀書恥為凡主李石曰方今内外之臣其間小人尚多疑阻願陛下更以寛御之彼有公清奉灋如劉􅀪逸薛季稜者陛下亦宜襃賞以勸為善甲申上復謂宰相曰我與卿等論天下事有勢未得行者退但飲醇酒求醉耳對曰此皆臣等之罪也有司以左藏積弊日乆請行檢勘且言官典罪在赦前者請宥之上許之既而果得繒帛妄稱漬汚者敕赦之給事中狄兼謩封還敕書曰官典犯􅂍理不可赦上諭之曰有司請檢之初朕既許之矣與其失信寜失罪人卿能奉職朕甚嘉之十二月庚戌以華州刺史盧鈞為嶺南節度使李石言於上曰盧鈞除嶺南朝士皆相賀以為嶺南富饒之地近歲皆厚賂北司而得之今北司不橈朝權陛下亦宜有以襃之庶㡬内外奉灋此致理之本也上從之鈞至鎮以清恵著名己未漵王縱薨二年春二月己未上謂宰相薦人勿問親踈朕聞竇易直為相未嘗用親故若親故果才避嫌而弃之是亦不為至公也均王緯薨三月有彗星出於張長八丈餘壬申詔撤樂減膳以一日之膳分充十日夏四月甲辰上對中書舍人翰林學士兼侍書栁公權等於便殿上舉衫袖示之曰此衣已三澣矣衆皆美上之儉德公權獨無言上問其故對曰陛下貴為天子富有四海當進賢退不肖納諫諍明賞罰乃可以致雍熈服澣濯之衣乃末節耳上曰朕知舍人不應復為諫議以卿有諍臣風采須屈卿為之乙巳以公權為諫議大夫餘如故戊戌以翰林學士工部侍郎陳夷行同平章事六月河陽軍亂節度使李泳奔懷州軍士焚府署殺泳二子大掠數日方止泳長安市人寓籍禁軍以賂得方鎮所至恃所交結貪殘不灋其下不堪命故作亂丁未貶泳澧州長史戊申以左金吾將軍李執方為河陽節度使秋七月癸亥振武奏党項三百餘帳剽掠逃去給事中韋温為太子侍讀晨詣東宫日中乃得見温諫曰太子當雞鳴而起問安視膳不宜專事晏安太子不能用其言温乃辭侍讀辛未罷守本官振武突厥百五十帳叛剽掠營田戊寅節度使劉沔擊破之八月庚戌以昭儀王氏為德妃昭容楊氏為賢妃立敬宗之子休復為梁王執中為襄王言楊為􅂎王成美為陳王癸丑立皇子宗儉為蔣王河陽軍士既逐李泳日相扇欲為亂九月李執方索得首亂者七十餘人悉斬之餘黨分􅀠外鎮然後定冬十月國子監石經成福建奏晉江百姓蕭􅀪稱太后族人詔御史臺桉之戊申以門下侍郎同平章事李固言同平章事充西川節度使甲寅御史臺奏蕭􅀪詐妄詔遞歸鄉里不之罪冀得其真資治通鑑卷第二百四十五
