body:
  text: 臣司馬光奉勑編集唐紀十三大荒落五月凡二年有竒起昭陽單閼四月盡旃蒙太宗文武大聖大廣孝皇帝中之下貞觀十七年夏四月庚辰朔承基上變告太子謀反敕長孫无忌房玄齡蕭瑀李丗勣與大理中書門下叅鞫之反形已具上謂侍臣將何以處承乾羣臣莫敢對通事舍人來濟進曰陛下不失為慈父太子得盡天年則善矣上從之濟護兒之子也乙酉詔廢太子承乾為庶人幽於右領軍府上欲免漢王元昌死羣臣固争乃賜自盡於家而宥其母妻子矦君集李安儼趙節杜荷等皆伏誅左庶子張玄素右庶子趙弘智令狐徳棻等以不能諌争皆坐免爲庶人餘當連坐者悉赦之詹事于志寜以數諌獨蒙勞勉以紇干承基爲祐川府折衝都尉爵平棘縣公矦君集被收賀蘭楚石復詣闕告其事上引君集謂曰朕不欲令刀筆吏辱公故自鞫公耳君集􅀄不承引楚石具陳始末又以所與承乾徃來啓示之君集辭窮乃服上謂侍臣曰君集有功欲乞其生可乎羣臣以爲不可上乃謂君集曰與公長訣矣因泣下君集亦自投于地遂斬之於市君集臨刑謂監刑將軍曰君集蹉跌至此然事陛下於藩邸擊取二國乞全一子以奉祭祀上乃原其妻及子徙嶺􅀯籍沒其家得二美人自㓜飲人乳而不食􅀄上使李靖教君集兵法君集言於上曰李靖將反矣上問其故對曰靖獨教臣以其粗而匿其精以是知之上以問靖靖對曰此乃君集欲反耳今諸夏已定臣之所教足以制四夷而君集固求盡臣之術非反而何江夏王道宗嘗從容言於上曰君集志大而智小自負㣲功恥在房玄齡李靖之下雖為吏部尚書未滿其志以臣觀之必將為亂上曰君集材器亦何施不可朕豈惜重位但次第未至耳豈可億度妄生猜貳邪及君集反誅上乃謝道宗曰果如卿言李安儼父年九十餘上愍之賜奴婢以養之太子承乾既獲罪魏王泰日入侍奉上面許立為太子岑文本劉洎亦勸之長孫无忌固請立晉王治上謂侍臣曰昨青雀投我懐云臣今日始得為陛下子乃更生之日也臣有一子臣死之日當為陛下殺之傳位晉王人誰不愛其子朕見其如此甚憐之諌議大夫褚遂良曰陛下言大失願審思勿誤也安有陛下萬歲後魏王據天下肯殺其愛子傳位晉王者乎陛下日者既立承乾為太子復寵魏王禮秩過於承乾以成今日之禍前事不逺足以為鑒陛下今立魏王願先措置晉王始得安全耳上流涕曰我不能爾因起入宫魏王泰恐上立晉王治謂之曰汝與元昌善元昌今敗得無憂乎治由是憂形於色上怪屢問其故治乃以狀告上憮然始悔立泰之言矣上面責承乾承乾曰臣為太子復何所求但為泰所圖時與朝臣謀自安之術不逞之人遂教臣為不軌耳今􅀂泰為太子所謂落其度内承乾既廢上御兩儀殿羣臣俱出獨留長孫无忌房玄齡李丗勣褚遂良謂曰我三子一弟所為如是我心誠无聊賴因自投于牀无忌等爭前扶抱上又抽佩刀欲自刺遂良奪刀以授晉王治无忌等請上所欲上曰我欲立晉王无忌曰謹奉詔有異議者臣請斬之上謂治曰汝舅許汝矣宜拜謝治因拜之上謂无忌等曰公等已同我意未知外議何如對曰晉王仁孝天下屬心乆矣乞陛下試召問百官有不同者臣負陛下萬死上乃御太極殿召文武六品以上謂曰承乾悖逆泰亦凶險皆不可立朕欲選諸子為嗣誰可者卿軰明言之衆皆讙呼曰晉王仁孝當為嗣上恱是日泰從百餘騎至永安門敕門司盡辟其騎引泰入肅章門幽於北苑丙戌詔立晉王治為皇太子御承天門樓赦天下酺三日上謂侍臣曰我􅀂立㤗則是太子之位可經營而得自今太子失道藩王窺伺者皆兩弃之傳諸子孫永為後法且泰立則承乾與治皆不全治立則承乾與泰皆無恙矣臣光曰唐太宗不以天下大器私其所愛以杜禍亂之原可謂能逺謀矣丁亥以中書令楊師道為吏部尚書初長廣公主適趙慈景生節慈景死更適師道師道與長孫无忌等共鞫承乾獄隂為趙節道地由是獲譴上至公主所公主以首擊地泣謝子罪上亦拜泣曰賞不避仇讎罰不阿親戚此天下至公之道不敢違也以是負姊己丑詔以長孫无忌為太子太師房玄齡為太傅蕭瑀為太保李丗勣為詹事瑀丗勣並同中書門下三品同中書門下三品自此始又以左衛大將軍李大亮領右衛率前詹事于志寧中書侍郎馬周為左庶子吏部侍郎蘇朂中書舍人髙季輔為右庶子刑部侍郎張行成為少詹事諌議大夫褚遂良為賔客李丗勣嘗得暴疾方云須灰可療上自翦須為之和藥丗勣頓首出血泣謝上曰爲社稷非為卿也何謝之有丗勣嘗侍宴上從容謂曰朕求羣臣可託幼孤者無以踰公公往不負李宻豈負朕哉丗勣流涕辭謝齧指出血因飲沈醉上解御服以覆之癸巳詔解魏王泰雍州牧相州都督左武候大將軍降爵為東萊郡王泰府僚屬為泰所親狎者皆遷嶺表以杜楚客兄如晦有功免死廢為庶人給事中崔仁師嘗宻請立魏王泰為太子左遷鴻臚少卿庚子定太子見三師儀迎於殿門外先拜三師荅拜每門讓於三師三師坐太子乃坐其與三師書前後稱名惶恐五月癸酉太子上表以承乾泰衣服不過隨身飲食不能適口幽憂可愍乞敕有司優加供給上從之黄門侍郎劉洎上言以太子宜勤學問親師友今入侍宫闈動踰旬朔師保以下接對甚希伏願少抑下流之愛弘逺大之規則海内幸甚上乃命洎與岑文本褚遂良馬周更日詣東宫與太子遊處談論六月己卯朔日有食之丁亥太常丞鄧素使髙麗還請於懐逺鎮増戍兵以逼髙麗上曰逺人不服則修文徳以來之未聞一二百戍兵能威絶域者也丁酉右僕射髙士廉遜位許之其開府儀同三司勲封如故仍同門下中書三品知政事閏月辛亥上謂侍臣曰朕自立太子遇物則誨之見其飯則曰汝知稼穡之艱難則常有斯飯矣見其乗馬則曰汝知其勞逸不竭其力則常得乘之矣見其乗舟則曰水所以載舟亦所以覆舟民猶水也君猶舟也見其息於木下則曰木從繩則正后從諌則聖丁巳詔太子知左右屯營兵馬事其大將軍以下並受處分薛延陀真珠可汗使其姪突利設來納幣獻馬五萬匹牛橐駝萬頭羊十萬口庚申突利設獻饌上御相思殿大饗羣臣設十部樂突利設再拜上壽賜賚甚厚契苾何力上言薛延陀不可與昬上曰吾已許之矣豈可為天子而食言乎何力對曰臣非欲陛下遽絶之也願且遷延其事臣聞古有親迎之禮若敕夷男使親迎雖不至京師亦應至靈州彼必不敢來則絶之有名矣夷男性剛戾既不成昬其下復攜貳不過一二年必病死兩子爭立則可以坐制之矣上從之乃徴真珠可汗使親迎仍發詔將幸靈州與之㑹真珠大喜欲詣靈州其臣諌曰脫為所留悔之無及真珠曰吾聞唐天子有聖德我得身往見之死無所恨且漠北必當有主我行決矣勿復多言上發使三道受其所獻雜畜薛延陀先無庫廐真珠調歛諸部往返萬里道渉沙磧無水草耗死將半失期不至議者或以為聘財未備而與為昏將使戎狄輕中國上乃下詔絶其昏停幸靈州追還三使禇遂良上䟽以為薛延陀本一俟斤陛下盪平沙塞萬里蕭條餘宼奔波須有酋長璽書鼓纛立為可汗比者復降鴻私許其姻媾西告吐蕃北諭思摩中國童㓜靡不知之御幸北門受其獻食羣臣四夷宴樂終日咸言陛下欲安百姓不愛一女凡在含生孰不懐德今一朝生進退之意有改悔之心臣為國家惜茲聲聽所顧甚少所失殊多嫌隙既生必構邊患彼國蓄見欺之怒此民懐負約之慙恐非所以服逺人訓戎士也陛下君臨天下十有七載以仁恩結庶類以信義撫戎夷莫不欣然負之無力何惜不使有始有卒乎夫龍沙以北部落無筭中國誅之終不能盡當懐之以徳使為惡者在夷不在華失信者在彼不在此則堯舜禹湯不及陛下逺矣上不聼是時羣臣多言國家既許其昬受其聘幣不可失信戎狄更生邊患上曰卿曹皆知古而不知今昔漢初匈奴彊中國弱故飾子女􅂢金絮以餌之得事之宜今中國彊戎狄弱以我徒兵一千可擊胡騎數萬薛延陀所以匍匐稽顙惟我所欲不敢驕慢者以新為君長雜姓非其種族欲假中國之勢以威服之耳彼同羅僕骨回紇等十餘部兵各數萬并力攻之立可破滅所以不敢發者畏中國所立故也今以女妻之彼自恃大國之壻雜姓誰敢不服戎狄人面獸心一旦㣲不得意必反噬為害今吾絶其昬殺其禮雜姓知我弃之不日將􅀲剖之矣卿曹第志之臣光曰孔子稱去食去兵不可去信唐太宗審知薛延陀不可妻則􅀄勿許其昏可也既許之矣乃復恃彊弃信而絶之雖滅薛延陀猶可羞也王者發言出令可不慎哉上曰蓋蘇文弑其君而專國政誠不可忍以今日兵力取之不難但不欲勞百姓吾欲且使契丹靺鞨擾之何如長孫无忌曰蓋蘇文自知罪大畏大國之討必嚴設守備陛下姑為之隐忍彼得以自安必更驕惰愈肆其惡然後討之未晩也上曰善戊辰詔以髙麗王藏為上柱國遼東郡王髙麗王遣使持節册命丙子徙東萊王泰為順陽王􅀄太子承乾失徳上宻謂中書侍郎兼左庶子杜正倫曰吾兒足疾乃可耳但踈逺賢良狎昵羣小卿可察之果不可教示當來告我正倫屢諌不聽乃以上語告之太子抗表以聞上責正倫漏泄對曰臣以此恐之冀其遷善耳上怒出正倫為榖州刺史及承乾敗秋七月辛卯復左遷正倫為交州都督􅀄魏徴嘗薦正倫及矦君集有宰相材請以君集為僕射且曰國家安不忘危不可無大將諸衛兵馬宜委君集專知上以君集好誇誕不用及正倫以罪黜君集謀反誅上始疑徴阿黨又有言徴自録前後諌辭以示起居郎褚遂良者上愈不恱乃罷叔玉尚主而踣所撰碑􅀄上謂監修國史房玄齡曰前丗史官所記皆不令人主見之何也對曰史官不虛美不隐惡若人主見之必怒故不敢獻也上曰朕之為心異於前世帝王欲自觀國史知前日之惡為後來之戒公可撰次以聞諌議大夫朱子奢上言陛下聖徳在躬舉無過事史官所述義歸盡善陛下獨覽起居於事無失若以此法傳示子孫竊恐曽玄之後或非上智飾非護短史官必不免刑誅如此則莫不希風順㫖全身逺害悠悠千載何所信乎所以前代不觀蓋為此也上不從玄齡乃與給事中許敬宗等刪為髙袓今上實録癸巳書成上之上見書六月四日事語多微隱謂玄齡曰昔周公誅管蔡以安周季友鴆叔牙以存魯朕之所為亦類是耳史官何諱焉即命削去浮詞直書其事八月庚戌以洛州都督張亮為刑部尚書參預朝政以左衛大將軍太子右衛率李大亮為工部尚書大亮身居三職宿衛兩宫㳟儉忠謹毎宿直必坐寐逹旦房玄齡甚重之毎稱大亮有王陵周勃之節可當大位初大亮為龐王兵曹為李宻所獲同軰皆死賊帥張弼見而釋之遂與定交及大亮貴求弼欲報其德弼時為將作丞自匿不言大亮遇諸途而識之持弼而泣多推家貲以遺弼弼拒不受大亮言於上乞悉以其官爵授弼上為之擢弼為中郎將時人皆賢大亮不負恩而多弼之不伐也九月庚辰新羅遣使言百濟攻取其國四十餘城復與髙麗連兵謀絶新羅入朝之路乞兵救援上命司農丞相里玄奬齎璽書賜髙麗曰新羅委質國家朝貢不乏爾與百濟各宜戢兵􅀂更攻之明年發兵擊爾國矣癸未徙承乾於黔州甲午徙順陽王泰於均州上曰父子之情出於自然朕今與泰生離亦何心自處然朕爲天下主但使百姓安寧私情亦可割耳又以泰所上表示近臣曰泰誠爲俊才朕心念之卿曹所知但以社稷之故不得不斷之以義使之居外者亦所以兩全之耳先是諸州長官或上佐􅀊首親奉貢物入京師謂之朝集使亦謂之考使京師無邸率僦屋與商賈雜居上始命有司爲之作邸冬十一月己卯上祀圓丘初上與隱太子巢刺王有隙宻明公贈司空封德􅂜隂持兩端楊文幹之亂上皇欲廢隱太子而立上德彞固諌而止其事甚袐上不之知薨後乃知之壬辰治書侍御史唐臨始追劾其事請黜官奪爵上命百官議之尚書唐儉等議德彞罪暴身後恩結生前所歷衆官不可追奪請降贈改謚詔黜其贈官改謚曰謬削所食實封敕選良家女以實東宫癸巳太子遣左庶子于志寧辭之上曰吾不欲使子孫生於微賤耳今既致辭當從其意上疑太子仁弱宻謂長孫无忌曰公勸我立雉奴雉奴懦恐不能守社稷柰何吳王恪英果類我我欲立之何如无忌固爭以為不可上曰公以恪非己之甥邪无忌曰太子仁厚真守文良主儲副至重豈可數易願陛下熟思之上乃止十二月壬子上謂吳王恪曰父子雖至親及其有罪則天下之法不可私也漢已立昭帝燕王旦不服隂圖不軌霍光折簡誅之為人臣子不可不戒庚申車駕幸驪山温湯庚午還宫十八年春正月乙未車駕幸鍾官城庚子幸鄠縣壬寅幸驪山温湯相里玄奬至平壤莫離支已將兵擊新羅破其兩城髙麗王使召之乃還玄奬諭使勿攻新羅莫離攴曰昔隋人入宼新羅乘釁侵我地五百里自非歸我侵地恐兵未能已玄奬曰既徃之事焉可追論至於遼東諸城本皆中國郡縣中國尚且不言髙麗豈得必求故地莫離攴竟不從二月乙巳朔玄奬還具言其狀上曰蓋蘇文弑其君賊其大臣殘虐其民今又違我詔命侵暴鄰國不可以不討諌議大夫禇遂良曰陛下指麾則中原清晏顧眄則四夷讋服威望大矣今乃渡海逺征小夷若指期克捷猶可也萬一蹉跌傷威損望更興忿兵則安危難測矣李丗勣曰間者薛延陀入宼陛下欲發兵窮討魏徴諌而止使至今為患曏用陛下之䇿北鄙安矣上曰然此誠徴之失朕尋悔之而不欲言恐塞良謀故也上欲自征髙麗禇遂良上䟽以為天下譬猶一身兩京心腹也州縣四支也四夷身外之物也髙麗罪大誠當致討但命二三猛將將四五萬衆仗陛下威靈取之如反掌耳今太子新立年尚㓜穉自餘藩屏陛下所知一旦弃金湯之全踰遼海之險以天下之君輕行逺舉皆愚臣之所甚憂也上不聽時羣臣多諌征髙麗者上曰八堯九舜不能冬種野夫童子春種而生得時故也夫天有其時人有其功蓋蘇文陵上虐下民延頸待救此正髙麗可亡之時也議者紛紜但不見此耳己酉上幸靈口乙卯還宫三月辛卯以左衛將軍薛萬徹守右衛大將軍上嘗謂侍臣曰於今名將惟丗勣道宗萬徹三人而已丗勣道宗不能大勝亦不大敗萬徹非大勝則大敗夏四月上御兩儀殿皇太子侍上謂羣臣曰太子性行外人亦聞之乎司徒无忌曰太子雖不出宫門天下無不欽仰聖徳上曰吾如治年時頗不能循常度治自幼寛厚諺曰如狼生子猶恐如羊冀其稍壯自不同耳无忌對曰陛下神武乃撥亂之才太子仁恕實守文之德趣尚雖異各當其分此乃皇天所以祚大唐而褔蒼生者也辛亥上幸九成宫壬子至太平宫謂侍臣曰人臣順㫖者多犯顔則少今朕欲自聞其失諸公其直言無隐長孫无忌等皆曰陛下無失劉洎曰頃有上書不稱㫖者陛下皆面加窮詰無不慙懼而退恐非所以廣言路馬周曰陛下比來賞罰微以喜怒有所髙下此外不見其失上皆納之上好文學而辯敏羣臣言事者上引古今以折之多不能對劉洎上書諌曰帝王之與凡庶聖哲之與庸愚上下相懸擬倫斯絶是知以至愚而對至聖以極卑而對至尊徒思自强不可得也陛下降恩㫖假慈顔凝旒以聽其言虛襟以納其說猶恐羣下未敢對敭况動神機縱天辯飾辭以折其理引古以排其議欲令凡庶何階應答且多記則損心多語則損氣心氣內損形神外勞初雖不覺後必為累須為社稷自愛豈為性好自傷乎至如秦政彊辯失人心於自矜魏文宏才虧衆望於虛說此才辯之累較然可知矣上飛白答之曰非慮無以臨下非言無以述慮比有談論遂致煩多輕物驕人恐由茲道形神心氣非此為勞今聞讜言虛懐以改己未至顯仁宫上將征髙麗秋七月辛卯敕將作大匠閻立徳等詣洪饒江三州造舩四百艘以載軍粮甲午下詔遣營州都督張儉等帥幽營二都督兵及契丹奚靺鞨先擊遼東以觀其勢以太常卿韋挺為饋運使以民部侍郎崔仁師副之自河北諸州皆受挺節度聽以便宜從事又命太僕少卿蕭銳運河南諸州糧入海銳瑀之子也八月壬子上謂司徒无忌等曰人苦不自知其過卿可為朕明言之對曰陛下武功文徳臣等將順之不暇又何過之可言上曰朕問公以已過公等乃曲相䛕恱朕欲面舉公等得失以相戒而改之何如皆拜謝上曰長孫无忌善避嫌疑應物敏速決斷事理古人不過而揔兵攻戰非其所長髙士廉渉獵古今心術明逹臨難不改節當官無朋黨所乏者骨鯁規諌耳唐儉言辭辯㨗善和解人事朕三十年遂無言及於獻替楊師道性行純和自無愆違而情實怯懦緩急不可得力岑文本性質敦厚文章華贍而持論􅁪據經逺自當不負於物劉洎性最堅貞有利益然其意尚然諾私於朋友馬周見事敏速性甚貞正論量人物直道而言朕比任使多能稱意禇遂良學問稍長性亦堅正毎寫忠誠親附於朕譬如飛鳥依人人自憐之甲子上還京師丁卯以散騎常侍劉洎爲侍中行中書侍郎岑文本爲中書令太子左庶子中書侍郎馬周守中書令文本既拜還家有憂色母問其故文本曰非勲非舊濫荷寵榮位髙責重所以憂懼親賔有來賀者文本曰今受弔不受賀也文本弟文昭爲校書郎喜賓客上聞之不恱嘗從容謂文本曰卿弟過爾交結恐爲卿累朕欲出爲外官何如文本泣曰臣弟少孤老母特所鍾愛未嘗信宿離左右今􅀂出外母必愁悴儻無此弟亦無老母矣因歔欷嗚咽上愍其意而止惟召文昭嚴戒之亦卒無過九月以諌議大夫褚遂良為黄門侍郎參預朝政焉耆貳於西突厥西突厥大臣屈利啜為其弟娶焉耆王女由是朝貢多闕安西都護郭孝恪請討之詔以孝恪為西州道行軍揔管帥歩騎三千出銀山道以擊之㑹焉耆王弟頡􅈹兄弟三人至西州孝恪以頡􅈹弟栗婆準為郷導焉耆城四面皆水恃險而不設備孝恪倍道兼行夜至城下命將士浮水而度比曉登城執其王突騎支獲首虜七千級留栗婆準攝國事而還孝恪去三日屈利啜引兵救焉耆不及執栗婆準以勁騎五千追孝恪至銀山孝恪還擊破之追奔數十里辛卯上謂侍臣曰孝恪近奏稱八月十一日往擊焉耆二十日應至必以二十二日破之朕計其道里使者今日至矣言未畢驛騎至西突厥處那啜使其吐屯攝焉耆遣使入貢上數之曰我發兵擊得焉耆汝何人而據之吐屯懼返其國焉耆立栗婆準從父兄薛婆阿那支為王仍附於處那啜乙未鴻臚奏髙麗莫離支貢白金禇遂良曰莫離攴弑其君九夷所不容今將討之而納其金此郜鼎之類也臣謂不可受上從之上謂髙麗使者曰汝曹皆事髙武有官爵莫離支弑逆汝曹不能復讎今更為之遊說以欺大國罪孰大焉悉以屬大理冬十月辛丑朔日有食之甲寅車駕行幸洛陽以房玄齡留守京師右衛大將軍工部尚書李大亮副之郭孝恪鏁焉耆王突騎攴及其妻子詣行在敕宥之丁巳上謂太子曰焉耆王不求賢輔不用忠謀自取滅亡係頸束手溧揺萬里人以此思懼則懼可知矣己巳畋于澠池之天池十一月壬申至洛陽前宜州刺史鄭元璹已致仕上以其常從隋焬帝伐髙麗召詣行在問之對曰遼東道逺粮運艱阻東夷善守城攻之不可猝下上曰今日非隋之比公但聽之張儉等值遼水漲乆不得濟上以為畏懦召儉詣洛陽至具陳山川險易水草美惡上恱上聞洛州刺史程名振善用兵召問方略嘉其才敏勞勉之曰卿有將相之器朕方將任使名振失不拜謝上試責怒以觀其所為曰山東鄙夫得一刺史以為富貴極邪敢於天子之側言語麤踈又復不拜名振謝曰疎野之臣未嘗親奉聖問適方心思所對故忘拜耳舉止自若應對愈明辯上乃歎曰房玄齡處朕左右二十餘年毎見朕譴責餘人顔色無主名振平生未嘗見朕朕一旦責之曽無震懾辭理不失眞竒士也即日拜右驍衛將軍甲午以刑部尚書張亮為平壤道行軍大揔管帥江淮嶺硤兵四萬長安洛陽募士三千戰艦五百艘自萊州泛海趨平壤又以太子詹事左衛率李丗勣為遼東道行軍大揔管帥歩騎六萬及蘭河二州降胡趣遼東兩軍合勢竝進庚子諸軍大集於幽州遣行軍揔管姜行本少府少監丘行淹先督衆工造梯衝於安蘿山時逺近勇士應募及獻攻城器械者不可勝數上皆親加損益取其便易又手詔諭天下以髙麗蓋蘇文弑主虐民情何可忍今欲廵幸幽薊問罪遼碣所過營頓無為勞費且言昔隋焬帝殘暴其下髙麗王仁愛其民以思亂之軍擊安和之衆故不能成功今略言必勝之道有五一曰以大擊小二曰以順討逆三曰以治乘亂四曰以逸敵勞五曰以恱當怨何憂不克布告元元勿為疑懼於是凡頓舍供費之具減者太半十一月辛丑武陽懿公李大亮卒於長安遺表請罷髙麗之師家餘米五斛布三十匹親戚早孤為大亮所養䘮之如父者十有五人壬寅故太子承乾卒於黔州上為之廢朝葬以國公禮甲寅詔諸軍及新羅百濟奚契丹分道擊髙麗初上遣突厥􅃸利苾可汗北度河薛延陀眞珠可汗恐其部落翻動意甚惡之豫蓄輕騎於漠北欲擊之上遣使戒敕無得相攻真珠可汗對曰至尊有命安敢不從然突厥翻覆難期當其未破之時嵗犯中國殺人以千萬計臣以為至尊克之當翦為奴婢以賜中國之人乃反養之如子其恩德至矣而結社率竟反此屬獸心安可以人理待也臣荷恩深厚請為至尊誅之自是數相攻候利苾之北度也有衆十萬勝兵四萬人候利苾不能撫御衆不愜服戊午悉弃候利苾􅀯度河請處於勝夏之間上許之羣臣皆以爲陛下方逺征遼左而置突厥於河南距京師不逺豈得不爲後慮願留鎮洛陽遣諸將東征上曰夷狄亦人耳其情與中夏不殊人主患徳澤不加不必猜忌異類蓋德澤洽則四夷可使如一家猜忌多則骨肉不免爲讎敵􅌆帝無道失人已乆遼東之役人皆斷手足以避征役玄感以運卒反於黎陽非戎狄爲患也朕今征髙麗皆取願行者募十得百募百得千其不得從軍者皆憤歎鬱邑豈比隋之行怨民哉突厥貧弱吾収而養之計其感恩入於骨髓豈肯為患且彼與薛延陀嗜欲略同彼不北走薛延陀而南歸我其情可見矣顧謂禇遂良曰爾知起居為我志之自今十五年保無突厥之患候利苾既失衆輕騎入朝上以為右武衛將軍十九年春正月韋挺坐不先行視漕渠運米六百餘艘至盧思臺側淺塞不能進械送洛陽丁酉除名以將作少監李道裕代之崔仁師亦坐免官滄州刺史席辯坐贓汚二月庚子詔朝集使臨觀而戮之庚戌上自將諸軍發洛陽以特進蕭瑀為洛陽宫留守乙卯詔朕發定州後宜令皇太子監國開府儀同三司致仕尉遲敬德上言陛下親征遼東太子在定州長安洛陽心腹空虛恐有玄感之變且邊隅小夷不足以勤萬乘願遣偏師征之指期可殄上不從以敬德為左一馬軍揔管使從行丁巳詔謚殷太師比干曰忠烈所司封其墓春秋祠以少牢給隨近五户供灑掃上之發京師也命房玄齡得以便冝從事不復奏請或詣留臺稱有密玄齡問密謀所在對曰公則是也玄齡驛送行在上聞留守有表送告宻人怒使人持長刀於前而後見之問告者為誰曰房玄齡上曰果然叱令腰斬璽書讓玄齡以不能自信更有如是者可專決之癸亥上至鄴自為文祭魏太袓曰臨危制變料敵設竒一將之智有餘萬乗之才不足是月李丗勣軍至幽州三月丁丑車駕至定州丁亥上謂侍臣曰遼東本中國之地隋氏四出師而不能得朕今東征欲為中國報子弟之讎髙麗雪君父之恥耳且方隅大定惟此未平故及朕之未老用士大夫餘力以取之朕自發洛陽惟噉肉飯雖春􅂼亦不之進懼其煩擾故也上見病卒召至御榻前存慰付州縣療之士卒莫不感恱有不預征名自願以私裝從軍動以千計皆曰不求縣官勲賞惟願効死遼東上不許上將發太子悲泣數日上曰今留汝鎮守輔以俊賢欲使天下識汝風采夫為國之要在於進賢退不肖賞善罰惡至公無私汝當努力行此悲泣何為命開府儀同三司髙士廉攝太子太傅與劉洎馬周少詹事張行成右庶子髙季輔同掌機務輔太子長孫无忌岑文本與吏部尚書楊師道從行壬辰車駕發定州親佩弓矢手結雨衣於鞍後命長孫无忌攝侍中楊師道攝中書令李丗勣軍發柳城多張形勢若出懐逺鎮者而濳師北趣甬道出髙麗不意夏四月戊戌朔丗勣自通定濟遼水至玄莬髙麗大駭城邑皆閉門自守壬寅遼東道副大揔管江夏王道宗將兵數千至新城折衝都尉曹三良引十餘騎直壓城門城中驚擾無敢出者營州都督張儉將胡兵為前鋒進渡遼水趨建安城破髙麗兵斬首數千級太子引髙士廉同榻視事又令更為士廉設案士廉固辭丁未車駕發幽州上悉以軍中資糧器械簿書委岑文本文本夙夜勤力躬自料配籌筆不去手精神耗竭言辭舉措頗異平日上見而憂之謂左右曰文本與我同行恐不與我同返是日遇暴疾而薨其夕上聞嚴鼓聲曰文本殞沒所不忍聞命撤之時右庶子許敬宗在定州與髙士亷等共知機要文本薨上召敬宗以本官檢校中書侍郎壬子李丗勣江夏王道宗攻髙麗蓋牟城丁巳車駕至北平癸亥李丗勣等拔蓋牟城獲二萬餘口糧十餘萬石張亮帥舟師自東萊渡海襲卑沙城其城四面懸絶惟西門可上程名振引兵夜至副揔管王大度先登五月己巳拔之􅀗男女八千口分遣揔管丘孝忠等曜兵於鴨緑水李丗勣進至遼東城下庚午車駕至遼澤泥淖二百餘里人馬不可通將作大匠閻立徳布土作橋軍不留行壬申度澤東乙亥髙麗歩騎四萬救遼東江夏王道宗將四千騎逆擊之軍中皆以爲衆寡懸絶不若深溝髙壘以俟車駕之至道宗曰賊恃衆有輕我心逺來疲頓擊之必敗且吾屬爲前軍當清道以待乘輿乃更以賊遺君父乎李丗勣以爲然果毅都尉馬文舉曰不遇勍敵何以顯壯士䇿馬趨敵所向皆靡衆心稍安既合戰行軍揔管張君乂退走唐兵不利道宗収散卒登髙而望見髙麗陳亂與驍騎數十衝之左右出入李丗勣引兵助之髙麗大敗斬首千餘級丁丑車駕度遼水撤橋以堅士卒之心軍於馬首山勞賜江夏王道宗超拜馬文舉中郎將斬張君乂上自將數百騎至遼東城下見士卒負土填塹上分其尤重者於馬上持之從官爭負土致城下李丗勣攻遼東城晝夜不息旬有二日上引精兵㑹之圍其城數百重鼓譟聲震天地甲申􅀯風急上遣銳卒登衝竿之末􅅡其西􅀯樓火延燒城中因麾將士登城髙麗力戰不能敵遂克之所殺萬餘人得勝兵萬餘人男女四萬口以其城為遼州乙未進軍白巖城丙申右衛大將軍李思摩中弩矢上親為之吮血將士聞之莫不感動烏骨城遣兵萬餘為白巖聲援將軍契苾何力以勁騎八百擊之何力挺身陷陳槊中其腰尚輦奉御薛萬備單騎往救之㧞何力於萬衆之中而還何力氣益憤束瘡而戰從騎奮擊遂破髙麗兵追奔數十里斬首千餘級㑹暝而罷萬備萬徹之弟也資治通鑑卷第一百九十七
