front:
  text: 資治通鑑卷第二百七十三
  hash: sha256:9b457f44e42c00207a18c3f78c378a7a31614ba4ed8578ce5f674ed826781a01
body:
  text: 臣司馬光奉勑編集後唐紀二噩十月凡一年有竒起閼逢涒灘盡旃䝉作莊宗光聖神閔孝皇帝中同光二年春正月甲辰幽州奏契丹入寇至瓦橋以天平軍節度使李嗣源為北面行營都招討使陜州留後霍彦威副之宣徽使李紹宏為監軍將兵救幽州孔謙復言於郭崇韜曰首座相公萬機事繁居第且逺租庸簿書多留滯宜更圖之豆盧革嘗以手書假省庫錢數十萬謙以手書示崇韜崇韜微以諷革革懼奏請崇韜專判租庸崇韜固辭上曰然則誰可者崇韜曰孔謙雖久典金榖若遽委大任恐不叶物望請復用張憲帝即命召之謙彌失望岐王聞帝入洛内不自安遣其子行軍司馬彰義節度使兼侍中繼曮入貢始上表稱臣帝以其前朝􅂄舊與太祖比肩特加優禮每賜詔但稱岐王而不名庚戌加繼曮兼中書令遣還敕内官不應居外應前朝内官及諸道監軍并私家先所畜者不以貴賤並遣詣闕時在上左右者巳五百人至是殆及千人皆給贍優厚委之事任以為腹心内諸司使自天祐以來以士人代之至是復用宦者浸干政事既而復置諸道監軍節度使出征或留闕下軍府之政皆監軍决之陵忽主帥怙勢爭權由是藩鎮皆憤怒契丹出塞召李嗣源旋師命泰寧節度使李紹欽澤州刺史董璋戍瓦橋李繼曮見唐甲兵之盛歸語岐王岐王益懼癸丑表請正藩臣之禮優詔不許孔謙惡張憲之來言於豆盧革曰錢榖細事一健吏可辦耳魏都根本之地顧不重乎興唐尹王正言操守有餘智力不足必不得已使之居朝廷衆人輔之猶愈於專委方面也革為之言於崇韜崇韜乃奏留張憲於東京甲寅以正言為租庸使正言昬懦謙利其易制故也李存審奏契丹去復得新州戊午敕鹽鐵度支户部三司並􅀠租庸使上遣皇弟存渥皇子繼岌迎太后太妃於晉陽太妃曰陵廟在此若相與俱行嵗時何人奉祀遂留不來太后至庚申上出迎於河陽辛酉從太后入洛陽二月己巳朔上祀南郊大赦孔謙欲聚斂以求媚凡赦文所蠲者謙復徴之自是每有詔令人皆不信百姓愁怨郭崇韜初至汴洛頗受藩鎮饋遺所親或諫之崇韜曰吾位兼將相禄賜巨萬豈藉外財但以偽梁之季賄賂成風今河南藩鎮皆梁之舊臣主上之仇讎也若拒其意能無懼乎吾特為國家藏之私室耳及將祀南郊崇韜首獻勞軍錢十萬緡先是宦官勸帝分天下財賦為内外府州縣上供者入外府充經費方鎮貢獻者入内府充宴遊及給賜左右於是外府常虛竭無餘而内府山積及有司辦郊祀乏勞軍錢崇韜言於上曰臣已傾家所有以助大禮願陛下亦出内府之財以賜有司上黙然久之曰吾晉陽自有儲積可令租庸輦取以相助於是取李継韜私第金帛數十萬以益之軍士皆不滿望始怨恨有離心矣河中節度使李継麟請􅅦安邑解縣鹽每季輸省課己卯以継麟充制置兩池􅅦鹽使辛巳進岐王爵為秦王仍不名不拜郭崇韜知李紹宏怏怏乃置内句使掌句三司財賦以紹宏為之兾弭其意而紹宏終不悦徒使州縣増移報之煩崇韜位兼將相復領節旄以天下為己任權侔人主旦夕車馬填門性剛急遇事輒發嬖倖僥求多所摧抑宦官疾之朝夕短之於上崇韜扼腕欲制之不能豆盧革韋説嘗問之曰汾陽王本太原人徙華隂公世家鴈門豈其枝􅂀邪崇韜因曰遭亂亡失譜諜嘗聞先人言上距汾陽四世耳革曰然則固從祖也崇韜由是以膏梁自處多甄别流品引拔浮華鄙弃勲舊有求官者崇韜曰深知公功能然門地寒素不敢相用恐為名流所嗤由是嬖倖疾之於内勲舊怨之於外崇韜屢請以樞密使讓李紹宏上不許又請分樞密院事歸内諸司以輕其權而宦官謗之不已崇韜鬱鬱不得志與所親謀赴本鎮以避之其人曰不可蛟龍失水螻蟻足以制之先是上􅁒以劉夫人為皇后而有正妃韓夫人在太后素惡劉夫人崇韜亦屢諫上以是不果於是所親説崇韜曰公若請立劉夫人為皇后上必喜内有皇后之助則伶宦輩不能為患矣崇韜從之與宰相帥百官共奏劉夫人宜正位中宫癸未立魏國夫人劉氏為皇后皇后生於寒微既貴專務蓄財其在魏州至於薪蘇果茹皆販鬻之及為后四方貢獻皆分為二一上天子一上中宫以是寶貨山積惟用寫佛經施尼師而已是時皇太后誥皇后教與制勑交行於藩鎮奉之如一詔蔡州刺史朱勍浚索水通漕運三月己亥朔蜀主宴近臣於怡神亭酒酣君臣及宫人皆脱冠露髻喧譁自恣知制誥京兆李􅀛禎諫曰君臣沈湎不憂國政臣恐啟北敵之謀不聽乙巳鎮州言契丹將犯塞詔横海節度使李紹斌北京左廂馬軍指揮使李從珂帥騎兵分道備之天平節度使李嗣源屯邢州紹斌本姓趙名行實幽州人也丙午加髙季興兼尚書令進封南平王李存審自以身為諸將之首不得預克汴之功感憤疾益甚屢表求入覲郭崇韜抑而不許存審疾亟表乞生覩龍顔乃許之初帝嘗與右武衞上將軍李存賢手搏存賢不盡其技帝曰汝能勝我我當授藩鎮存賢乃奉詔僅仆帝而止及許存審入覲帝以存賢為盧龍行軍司馬旬日除節度使曰手搏之約吾不食言矣庚戌幽州奏契丹寇新城勲臣畏伶官之讒皆不自安蕃漢内外馬步副揔管李嗣源求解兵柄帝不許自唐末喪亂搢紳之家或以告赤鬻於族姻遂亂昭穆至有舅叔拜甥姪者選人偽濫者衆郭崇韜􅁒革其弊請令銓司精加考覈時南郊行事官千二百人注官者纔數十人塗毁告身者十之九選人或號哭道路或餒死逆旅唐室諸陵先為温韜所發庚申以工部郎中李途為長安按視諸陵使皇子繼岌代張全義判六軍諸衞事夏四月己巳朔羣臣上尊號曰昭文睿武至德光孝皇帝帝遣客省使李嚴使于蜀嚴盛稱帝威德有混一天下之志且言朱氏簒竊諸侯曽無勤王之舉王宗儔以其語侵蜀請斬之蜀主不從宣徽北院使宋光葆上言晉王有憑陵我國家之志宜選將練兵屯戌邊鄙積糗糧治戰艦以待之蜀主乃以光葆為梓州觀察使充武德節度留後乙亥加楚王殷兼尚書令庚辰賜前保義留後霍彦威姓名李紹真秦忠敬王李茂貞卒遺奏以其子繼曮權知鳳翔軍府事初安義牙將楊立有寵於李繼韜繼韜誅常邑邑思亂㑹發安義兵三千戍涿州立謂其衆曰前此潞兵未嘗戌邊今朝廷驅我輩投之絶塞蓋不􅁒置之潞州耳與其暴骨沙場不若據城自守事成富貴不成為羣盜耳因聚譟攻子城東門焚掠市肆節度副使李繼珂監軍張弘祚弃城走立自稱留後遣將士表求旄節詔以天平節度使李嗣源為招討使武寧節度使李紹榮為部署帳前都指揮使張廷藴為馬步都指揮使以討之孔謙貸民錢使以賤估償絲屢檄州縣督之翰林學士承㫖權知汴州盧質上言梁趙巖為租庸使舉貸誅斂結怨于人今陛下革故鼎新為人除害而有司未改其所為是趙巖復生也今春霜害桑繭絲甚薄但輸正税猶懼流移况益以稱貸人何以堪臣惟事天子不事租庸敕㫖未頒省牒頻下願早降明命帝不報漢主引兵侵閩屯於汀漳境上閩人擊之漢主敗走初胡柳之役伶人周匝為梁所得帝每思之入汴之日匝謁見於馬前帝甚喜匝涕泣言曰臣所以得生全者皆梁教坊使陳俊内園栽接使儲德源之力也願就陛下乞二州以報之帝許之郭崇韜諫曰陛下所與共取天下者皆英豪忠勇之士今大功始就封賞未及一人而先以伶人為刺史恐失天下心以是不行踰年伶人屢以為言帝謂崇韜曰吾已許周匝矣使吾慙見此三人公言雖正然當為我屈意行之五月壬寅以俊為景州刺史德源為憲州刺史時親軍有從帝百戰未得刺史者莫不憤歎乙巳右諫議大夫薛昭文上疏以為今諸道僭竊者尚多征伐之謀未可遽息又士卒久從征伐賞給未豐貧乏者多宜以四方貢獻及南郊羨餘更加頒賚又河南諸軍皆梁之精鋭恐僭竊之國潛以厚利誘之宜加收撫又戸口流亡者宜寛徭薄賦以安集之又土木不急之役宜加裁省又請擇隙地牧馬勿使踐京畿民田皆不從戊申蜀主遣李嚴還初帝因嚴入蜀令以馬市宫中珍玩而蜀法禁錦綺珍竒不得入中國其粗惡者乃聽入中國謂之入草物嚴還以聞帝怒曰王􅄛寧免為入草之人乎嚴因言於帝曰􅄛童騃荒縱不親政務斥逺故老昵比小人其用事之臣王宗弼宋光嗣等諂諛專恣黷貨無厭賢愚易位刑賞紊亂君臣上下專以奢􅁋相尚以臣觀之大兵一臨瓦解土崩可翹足而待也帝深以為然帝以潞州叛故庚戌詔天下州鎮無得修城濬隍悉毁防城之具壬子新宣武節度使兼中書令蕃漢馬步揔管李存審卒于幽州存審出於寒微常戒諸子曰爾父少提一劒去鄉里四十年間位極將相其間出萬死獲一生者非一破骨出鏃者凡百餘因授以所出鏃命藏之曰爾曹生於膏粱當知爾父起家如此也幽州言契丹將入寇甲寅以横海節度使李紹斌充東北面行營招討使將大軍度河而北契丹屯幽州東南城門之外虜騎充斥饋運多為所掠壬戌以李繼曮為鳳翔節度使乙丑以權知歸義留後曹義金為節度使時􅀲沙與吐蕃雜居義金遣使間道入貢故命之李嗣源大軍前鋒至潞州日已暝泊軍方定張廷藴帥麾下壯士百餘輩踰塹坎城而上守者不能禦即斬闗延諸軍入比明嗣源及李紹榮至城已下矣嗣源等不悦丙寅嗣源奏潞州平六月丙子磔楊立及其黨於鎮國橋潞州城池髙深帝命夷之丙戌以武寧節度使李紹榮為歸德節度使同平章事留宿衞寵遇甚厚帝或時與太后皇后同至其家帝有幸姬色美嘗生子矣劉后妬之㑹紹榮喪妻一日侍禁中帝問紹榮汝復娶乎為汝求昬后因指幸姬曰大家憐紹榮何不以此賜之帝難言不可微許之后趣紹榮拜謝比起顧幸姬已肩輿出宫矣帝為之託疾不食者累日壬辰以天平節度使李嗣源為宣武節度使代李存審為蕃漢内外馬步揔管秋七月壬寅蜀以禮部尚書許寂為中書侍郎同平章事孔謙復短王正言於郭崇韜又厚賂伶宦求租庸使終不獲意怏怏癸卯表求解職帝怒以為避事將寘於法景進救之得免梁所决河連年為曹濮患甲辰命右監門上將軍婁繼英督汴滑兵塞之未幾復壊庚申置威塞軍於新州契丹恃其彊盛遣使就帝求幽州以處盧文進時東北諸夷皆役屬契丹惟渤海未服契丹主謀入寇恐渤海掎其後乃先舉兵擊渤海之遼東遣其將秃餒及盧文進據營平等州以擾燕地八月戊辰蜀主以右定逺軍使王宗鍔為招討馬步使帥二十一軍屯洋州乙亥以長直馬軍使林思諤為昭武節度使戍利州以備唐租庸使王正言病風恍惚不能治事景進屢以為言癸酉以副使衞尉卿孔謙為租庸使右威衞大將軍孔循為副使循即趙殷衡也梁亡復其姓名謙自是得行其志重斂急徴以充帝欲民不聊生癸未賜謙號豐財贍國功臣帝復遣使者李彦稠入蜀九月己亥至成都癸卯帝獵于近郊時帝屢出遊獵從騎傷民禾稼洛陽令何澤伏於叢薄俟帝至遮馬諫曰陛下賦斂既急今稼穡將成復蹂踐之使吏何以為理民何以為生臣願先賜死帝慰而遣之澤廣州人也契丹攻渤海無功而還蜀前山南節度使兼中書令王宗儔以蜀主失德與王宗弼謀廢立宗弼猶豫未决庚戌宗儔憂憤而卒宗弼謂樞密使宋光嗣景潤澄等曰宗儔教我殺爾曹今日無患矣光嗣輩俯伏泣謝宗弼子承班聞之謂人曰吾家難乎免矣乙卯蜀主以前鎮江節度使張武為峽路應援招討使丁巳幽州言契丹入寇冬十月辛未天平節度使李存霸平盧節度使苻習言屬州多稱直奉租庸使帖指揮公事使司殊不知有紊規程租庸使奏近例皆直下敕朝廷故事制敕不下支郡牧守不專奏陳今兩道所奏廼本朝舊規租庸所陳是偽廷近事自今支郡自非進奉皆須本道騰奏租庸徴催亦須牒觀察使雖有此敕竟不行易定言契丹入寇蜀宣徽北院使王承休請擇諸軍驍勇者萬二千人置駕下左右龍武步騎四十軍兵械給賜皆優異於它軍以承休為龍武軍馬步都指揮使以禆將安重霸副之舊將無不憤恥重霸雲州人以狡佞賄賂事承休故承休悦之吳越王鏐復修本朝職貢壬午帝因梁官爵而命之鏐厚貢獻并賂權要求金印玉冊賜詔不名稱國王有司言故事惟天子用玉冊王公皆用竹冊又非四夷無封國王者帝皆曲從鏐意吳王如白沙觀樓船更命白沙曰迎鑾鎮徐温自金陵來朝先是温以親吏翟䖍為閤門宫城武備等使使察王起居䖍防制王甚急至是王對温名雨為水温請其故王曰翟䖍父名吾諱之熟矣因謂温曰公之忠誠我所知也然翟䖍無禮宫中及宗室所須多不獲温頓首謝罪請斬之王曰斬則太過逺徙可也乃徙撫州十一月蜀主遣其翰林學士歐陽彬來聘彬衡山人也又遣李彦稠東還癸卯帝帥親軍獵于伊闕命從官拜梁太祖墓涉歴山險連日不止或夜合圍士卒墜崖谷死及折傷者甚衆丙午還宫蜀以唐修好罷威武城戍召闗宏業等二十四軍還成都戊申又罷武定武興招討劉潛等三十七軍丁巳賜䕶國節度使李繼麟鐵劵以其子令德令錫皆為節度使諸子勝衣者即拜官寵冠列藩庚申蔚州言契丹入寇辛酉蜀主罷天雄軍招討命王承騫等二十九軍還成都十二月乙丑朔蜀主以右僕射張格兼中書侍郎同平章事初格之得罪中書吏王魯柔乗危窘之及再為相用事杖殺之許寂謂人曰張公才髙而識淺戮一魯柔它人誰敢自保此取禍之端也蜀主罷金州屯戍命王承勲等七軍還成都己巳命宣武節度使李嗣源將宿衞兵三萬七千人赴汴州遂如幽州禦契丹庚午帝及皇后如張全義第全義大陳貢獻酒酣皇后奏稱妾幼失父母見老者輒思之請父事全義帝許之全義惶恐固辭再三彊之竟受皇后拜復貢獻謝恩明日后命翰林學士趙鳳草書謝全義鳳密奏自古無天下之母拜人臣為父者帝嘉其直然卒行之自是后與全義日遣使往來問遺不絶初唐僖昭之世宦官雖盛未嘗有建節者蜀安重霸勸王承休求秦州節度使承休言於蜀主曰秦州多美婦人請為陛下采擇以獻蜀主許之庚午以承休為天雄節度使封魯國公以龍武軍為承休牙兵乙亥蜀主以前武德節度使兼中書令徐延瓊為京城内外馬步都指揮使延瓊以外戚代王宗弼居舊將之右衆皆不平壬午北京言契丹寇嵐州辛卯蜀主改明年元曰咸康盧龍節度使李存賢卒是嵗蜀徙普王宗仁為衞王雅王宗輅為豳王襃王宗紀為趙王榮王宗智為韓王興王宗澤為宋王彭王宗鼎為魯王忠王宗平為薛王資王宗特為莒王宗輅宗智宗平皆罷軍使三年春正月甲午朔蜀大赦丙申敕有司改葬昭宗及少帝竟以用度不足而止契丹寇幽州庚子帝發洛陽庚戌至興唐詔平盧節度使苻習治酸棗遥隄以禦決河初李嗣源北征過興唐東京庫有供御細鎧嗣源牒副留守張憲取五百領憲以軍興不暇奏而給之帝怒曰憲不奉詔擅以吾鎧給嗣源何意也罰憲俸一月令自往軍中取之帝以義武節度使王都將入朝欲闢毬場憲曰比以行宫闕廷為毬場前年陛下即位於此其壇不可毁請闢毬場於宫西數日未成帝命毁即位壇憲謂郭崇韜曰此壇主上所以禮上帝始受命之地也若之何毁之崇韜從容言於帝帝立命兩虞􅀱毁之憲私於崇韜曰忘天背本不祥莫大焉二月甲戌横海節度使李紹斌為盧龍節度使丙子李嗣源奏敗契丹於涿州上以契丹為憂與郭崇韜謀以威名宿將零落殆盡李紹斌位望素輕欲徙李嗣源鎮真定為紹斌聲援崇韜深以為便時崇韜領真定上欲徙崇韜鎮汴州崇韜辭曰臣内典樞機外預大政富貴極矣何必更領藩方且羣臣或從陛下嵗久身經百戰所得不過一州臣無汗馬之勞徒以侍從左右時賛聖謨致位至此常不自安今因委任勲賢使臣得解旄節乃大願也且汴州闗東衝要地富人繁臣既不至治所徒令它人攝職何異空城非所以固國基也上曰深知卿忠盡然卿為朕畫策襲取汶陽保固河津既而自此路乗虚直趨大梁成朕帝業豈百戰之功可比乎今今朕貴為天子豈可使卿曽無尺寸之地乎崇韜固辭不已上乃許之庚辰徙李嗣源為成德節度使漢主聞帝滅梁而懼遣宫苑使何詞入貢且覘中國彊弱甲申詞至魏及還言帝驕淫無政不足畏也漢主大悦自是不復通中國帝性剛好勝不欲權在臣下入洛之後信伶宦之讒頗疎忌宿將李嗣源家在太原三月丁酉表衞州刺史李從珂為北京内牙馬步都指揮使以便其家帝怒曰嗣源握兵權居大鎮軍政在吾安得為其子奏請乃黜從珂為突騎指揮使帥數百人戍石門鎮嗣源憂恐上章申理久之方解辛丑嗣源乞至東京朝覲不許郭崇韜以嗣源功髙位重亦忌之私謂人曰揔管令公非久為人下者皇家子弟皆不及也密勸帝召之宿衞罷其兵權又勸帝除之帝皆不從己酉帝發興唐自德勝濟河歴楊村戚城觀昔時戰處指示羣臣以為樂洛陽宫殿宏邃宦者欲上増廣嬪御詐言宫中夜見鬼物上欲使符呪者攘之宦者曰臣昔逮事咸通乾符天子當是時六宫貴賤不減萬人今掖庭太半空虛故鬼物遊之耳上乃命宦者王允平伶人景進采擇民間女子逺至太原幽鎮以充後庭不啻三千人不問所從來上還自興唐載以牛車纍纍盈路張憲奏諸營婦女亡逸者千餘人慮扈從諸軍挾匿以行其實皆入宫矣庚辰帝至洛陽辛酉詔復以洛陽為東都興唐府為鄴都夏四月癸亥朔日有食之初五臺僧誠惠以妖妄惑人自言能降伏天龍命風召雨帝尊信之親帥后妃及皇弟皇子拜之誠惠安坐不起羣臣莫敢不拜獨郭崇韜不拜時大旱帝自鄴都迎誠惠至洛陽使祈雨士民朝夕瞻仰數旬不雨或謂誠惠官以師祈雨無驗將焚之誠惠逃去慙懼而卒庚寅中書侍郎同平章事趙光􅅌卒太后自與太妃别常忽忽不樂雖娛玩盈前未嘗解顔太妃既别太后亦邑邑成疾太后遣中使醫藥相繼於道聞疾稍加輒不食又謂帝曰吾與太妃恩如兄弟欲自往省之帝以天暑道逺苦諫久之乃止但遣皇弟存渥等往迎侍五月丁酉北都奏太妃薨太后悲哀不食者累日帝寛譬不離左右太后自是得疾又欲自往㑹太妃葬帝力諫而止閩王審知寢疾命其子節度副使延翰權知軍府事自春夏大旱六月壬申始雨帝苦溽暑於禁中擇髙凉之所皆不稱㫖宦者因言臣見長安全盛時大明興慶宫樓觀以百數今日宅家曽無避暑之所宫殿之盛曽不及當時公卿第舍耳帝乃命宫苑使王允平别建一樓以清暑宦者曰郭崇韜常不伸眉為孔謙論用度不足恐陛下雖欲營繕終不可得帝曰吾自用内府錢無闗經費然猶慮崇韜諌遣中使語之曰今嵗盛暑異常朕昔在河上與梁人相拒行營卑濕被甲乗馬親當矢石猶無此暑今居深宫之中而暑不可度奈何對曰陛下昔在河上勍敵未滅深念讎恥雖有盛暑不介聖懐今外患巳除海内賔服故雖珍臺閑館猶覺鬱蒸也陛下儻不忘艱難之時則暑氣自消矣帝黙然宦者曰崇韜之第無異皇居宜其不知至尊之􅀬也帝卒命允平營樓日役萬人所費巨萬崇韜諫曰今兩河水旱軍食不充願且息役以俟豐年帝不聽帝將伐蜀辛卯詔天下括市戰馬吳鎮海節度判官楚州團練使陳彦謙有疾徐知誥恐其遺言及繼嗣事遺之醫藥金帛相屬於道彦謙臨終密留書遺徐温請以所生子為嗣太后疾甚秋七月甲午成德節度使李嗣源以邊事稍弭表求入朝省太后帝不許壬寅太后殂帝哀毁過甚五日方食八月癸未杖殺河南令羅貫初貫為禮部員外郎性彊直為郭崇韜所知用為河南令為政不避權豪伶宦請托書積几案一不報皆以示崇韜崇韜奏之由是伶宦切齒河南尹張全義亦以貫髙伉惡之遣婢訴於皇后后與伶宦共毁之帝含怒未發㑹帝自往壽安視坤陵役者道路泥濘橋多壊帝問主者為誰宦官對屬河南帝怒下貫獄獄吏榜掠體無完膚明日傳詔殺之崇韜諫曰貫坐橋道不修法不至死帝怒曰太后靈駕將發天子朝夕往來橋道不修卿言無罪是黨也崇韜曰陛下以萬乗之尊怒一縣令使天下謂陛下用法不平臣之罪也帝曰既公所愛任公裁之拂衣起入宫崇韜隨之論奏不已帝自闔殿門崇韜不得入貫竟死㬥尸府門逺近寃之丁亥遣吏部侍郎李德休等賜吳越國王玉冊金印紅袍御衣九月蜀主與太后太妃遊青城山歴丈人觀上清宫遂至彭州陽平化漢州三學山而還乙未立皇子繼岌為魏王丁酉帝與宰相議伐蜀威勝節度使李紹欽素諂事宣徽使李紹宏紹宏薦紹欽有蓋世竒才雖孫吳不如可以大任郭崇韜曰段凝亡國之將姦諂絶倫不可信也衆舉李嗣源崇韜曰契丹方熾揔管不可離河朔魏王地當儲副未立殊功請依故事以為伐蜀都綂成其威名帝曰兒幼豈能獨往當求其副既而曰無以易卿庚子以魏王繼岌充西川四面行營都綂崇韜充東北面行營都招討制置等使軍事悉以委之又以荆南節度使髙季興充東南面行營都招討使鳳翔節度使李繼曮充都供軍轉運應接等使同州節度使李令德充行營副招討使陜州節度使李紹琛充蕃漢馬步軍都排陳斬斫使兼馬步軍都指揮使西京留守張筠充西川管内安撫應接使華州節度使毛璋充左廂馬步都虞􅀱邠州節度使董璋充右廂馬步都虞􅀱客省使李嚴充西川管内招撫使將兵六萬伐蜀仍詔季興自取夔忠萬三州為巡屬都綂置中軍以供奉官李從襲充中軍馬步都指揮監押髙品李廷安吕知柔充魏王牙通謁辛丑以工部尚書任圜翰林學士李愚並參預都綂軍機自六月甲午雨罕見日星江河百川皆溢凡七十五日乃霽郭崇韜以北都留守孟知祥有薦引舊恩將行言於上曰孟知祥信厚有謀若得西川而求帥無踰此人者又薦鄴都副留守張憲謹重有識可為相戊申大軍西行蜀安重霸勸王承休請蜀主東遊秦州承休到官即毁府署作行宫大興力役强取民間女子教歌舞圖形遺韓昭使言於蜀主又獻花木圖盛稱秦州山川土風之美蜀主將如秦州羣臣諫者甚衆皆不聽王宗弼上表諫蜀主投其表於地太后涕泣不食止之亦不能得前秦州節度判官蒲禹卿上表幾二千言其畧曰先帝艱難創業欲傳之萬世陛下少長富貴荒色惑酒秦州人雜羌胡地多瘴癘萬衆困於奔馳郡縣罷於供億鳳翔久為仇讎必生釁隙唐國方通歡好恐懐疑貳先皇未嘗無故盤游陛下率意頻離宫闕秦皇東狩鑾駕不還煬帝南巡龍舟不返蜀都彊盛雄視隣邦邊亭無烽火之虞境内有腹心之疾百姓失業盜賊公行昔李勢屈於桓温劉禪降於鄧艾山河險固不足憑恃韓昭謂禹卿曰吾收汝表俟主上西歸當使獄吏字字問汝王承休妻嚴氏美蜀主私焉故鋭意欲行冬十月排陳斬斫使李紹琛與李嚴將驍騎三千步兵萬人為前鋒招討判官陳乂至寶雞稱疾乞留李愚厲聲曰陳乂見利則進懼難則止今大軍涉險人心易揺宜斬以徇由是軍中無敢顧望者乂薊州人也癸亥蜀主引兵數萬發成都甲子至漢州武興節度使王承捷告唐兵西上蜀主以為羣臣同謀沮已猶不信大言曰吾方欲耀武遂東行在道與羣臣賦詩殊不為意丁丑李紹琛攻蜀威武城蜀指揮使唐景思將兵出降城使周彦禋等知不能守亦降景思秦州人也得城中糧二十萬斛紹琛縱其敗兵萬餘人逸去因倍道趣鳳州李嚴飛書以諭王承捷李繼曮竭鳳翔蓄積以饋軍不能充人情憂恐郭崇韜入散闗指其山曰吾輩進無成功不得復還此矣當盡力一决今饋運將竭宜先取鳳州因其糧諸將皆言蜀地險固未可長驅宜按兵觀釁崇韜以問李愚愚曰蜀人苦其主荒􅁋莫為之用宜乗其人情崩離風驅霆擊彼皆破膽雖有險阻誰與守之兵勢不可緩也是日李紹琛告捷崇韜喜謂愚曰公料敵如此吾復何憂乃倍道而進戊寅王承㨗以鳳興文扶四州印節迎降得兵八千糧四十萬斛崇韜曰平蜀必矣即以都綂牒命承捷攝武興節度使己卯蜀主至利州威武敗卒奔還始信唐兵之來王宗弼宋光嗣言於蜀主曰東川山南兵力尚完陛下但以大軍扼利州唐人安敢懸兵深入從之庚辰以隨駕清道指揮使王宗勲王宗儼兼侍中王宗昱為三招討將兵三萬逆戰從駕兵自綿漢至深渡千里相屬皆怨憤曰龍武軍糧賜倍於它軍它軍安能禦敵李紹琛等過長舉興州都指揮使程奉璉將所部兵五百來降且請先治橋棧以俟唐軍由是軍行無險阻之虞辛巳興州刺史王承鑒棄城走紹琛等克興州郭崇韜以唐景思攝興州刺史乙酉成州刺史王承朴棄城走李紹琛等與蜀三招討戰于三泉蜀兵大敗斬首五千級餘衆潰走又得糧十五萬斛於三泉由是軍食優足戊子葬貞簡太后于坤陵蜀主聞王宗勲等敗自利州倍道西走斷桔柏津浮梁命中書令判六軍諸衞事王宗弼將大軍守利州且令斬王宗勲等三招討李紹琛晝夜兼行趣利州蜀武德留後宋光葆遺郭崇韜書請唐兵不入境當舉巡屬内附茍不如約則背城決戰以報本朝崇韜復書撫納之己丑魏王繼岌至興州光葆以梓綿劒龍普五州武定節度使王承肇以洋蓬壁三州山南節度使兼侍中王宗威以梁開通渠麟五州階州刺史王承岳以階州皆降承肇宗侃之子也自餘城鎮皆望風款附天雄節度使王承休與副使安重霸謀掩擊唐軍重霸曰擊之不勝則大事去矣蜀中精兵十萬天下險固唐兵雖勇安能直度劒門邪然公受國恩聞難不可不赴願與公俱西承休素親信之以為然重霸請賂羌人買文扶州路以歸承休從之使重霸將龍武軍及所募兵萬二千人以從將行州人餞於城外承休上道重霸拜於馬前曰國家竭力以得秦隴若從開府還朝誰當守之開府行矣重霸請為公留守承休業已上道無如之何遂與招討副使王宗汭自文扶而南其地皆不毛羌人抄之且戰且行士卒凍餒比至茂州餘衆二千而已重霸遂以秦隴來降髙季興常欲取三峽畏蜀峽路招討使張武威名不敢進至是乗唐兵勢使其子行軍司馬從誨權軍府事自將水軍上峽取施州張武以鐵鏁斷江路季興遣勇士乗舟斫之㑹風大起舟絓於鏁不能進退矢石交下壊其戰艦季興輕舟遁去既而聞北路陷敗䕫忠萬三州遣使詣魏王降郭崇韜遺王宗弼等書為陳利害李紹琛未至利州宗弼棄城引兵西歸王宗勲等三招討追及宗弼於白芀宗弼懐中探詔書示之曰宋光嗣令我殺爾曹因相持而泣遂合謀送款於唐資治通鑑卷第二百七十三
