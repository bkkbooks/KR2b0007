body:
  text: 臣司馬光奉勑編集梁紀九噩一年屠維作髙祖武皇帝九中大通元年春正月甲寅魏于暉所部都督彭樂帥二千餘􅀐叛奔韓樓暉引還辛酉上祀南郊大赦甲子魏汝南王恱求還國許之辛巳上祀明堂二月甲午魏主尊彭城武宣王爲文穆皇帝廟號肅祖母李妃爲文穆皇后將遷神主於太廟以髙祖爲伯考大司馬兼録尚書臨淮王彧表諫以爲漢髙祖立太上皇廟於香街光武祀南頓君於春陵元帝之於光武已䟽絶服猶身奉子道入繼太宗髙祖德洽寰中道超無外肅祖雖勲格宇宙猶比面爲臣又二后皆將配享乃是君臣並筵嫂叔同室竊謂不可吏部尚書李神儁亦諫不聽彧又請去帝著皇亦不聽詔更定二百四十號將軍爲四十四班壬寅魏詔濟隂王暉業兼行臺尚書都督丘大千等鎭梁國暉業小新成之曾孫也三月壬戌魏詔上黨王天穆討邢杲以費穆爲前鋒大都督夏四月癸未魏遷肅祖及文穆皇后神主于太廟又追尊彭城王劭爲孝宣皇帝臨淮王彧諫曰兹事古所未有陛下作而不法後丗何觀弗聽魏元天穆將擊邢杲以北海王顥方入寇集文武議之衆皆曰杲衆彊盛宜以爲先行臺尚書薛琡曰邢杲兵衆雖多䑕竊狗偷非有逺志顥帝室近親來稱義舉其勢難測宜先去之天穆以諸將多欲擊杲又魏朝亦以顥爲􅀌弱不足慮命天穆等先定齊地還師擊顥遂引兵東岀顥與陳慶之乗虚自銍城進㧞􅂪城遂至梁國魏丘大千有衆七萬分築九城以拒之慶之攻之自旦至申拔其三壘大千請降顥登壇燔燎即帝位於睢陽城南改元孝基濟隂王暉業帥羽林兵二萬軍考城慶之攻拔其城擒暉業辛丑魏上黨王天穆及爾朱兆破邢杲於濟南杲降送洛陽斬之兆榮之從子也五月丁巳魏以東南道大都督楊昱鎭滎陽尚書僕射爾朱丗隆鎭虎牢侍中爾朱世承鎭崿岅乙丑内外戒嚴戊辰北海王顥克梁國顥以陳慶之爲衛將軍徐州刺史引兵而西楊昱擁衆七萬據滎陽慶之攻之未拔顥遣人􅀃昱使降昱不從元天穆與驃􅀐將軍爾朱吐没兒將大軍前後繼至梁士卒皆恐慶之解鞍秣馬諭將士曰吾至此以來屠城略地實爲不少君等殺人父兄掠人子女亦無筭矣天穆之衆皆是仇讎我輩衆纔七千虜衆三十餘萬今日之事唯有必死乃可得生耳虜􅀐多不可與之野戰當及其未盡至急攻取其城而據之諸君勿或􅀌疑自取屠膾乃鼓之使登城將士即相帥蟻附而入癸酉拔滎陽執楊昱諸將三百餘人伏顥帳前請曰陛下渡江三千里無遺鏃之費昨滎陽城下一朝殺傷五百餘人願乞楊昱以快衆意顥曰我在江東聞梁主言初舉兵下都􅀽昂爲呉郡不降每稱其忠節楊昱忠臣柰何殺之此外唯卿等所取於是斬昱所部統帥三十七人皆刳其心而食之俄而天穆等引兵圍城慶之帥􅀐三千背城力戰大破之天穆吐没兒皆走慶之進擊虎牢爾朱世隆弃城走獲魏東中郎將辛纂魏主將出避顥未知所之或勸之長安中書舎人髙道穆曰􅀜中荒殘何可復往顥士衆不多乗虛深入由將帥不得其人故能至此陛下􅀂親帥􅀫衛髙募重賞背城一戰臣等竭其死力破顥􅀌軍必矣或恐勝負難期則車駕不若渡河徴大將軍天穆大丞相榮各使引兵來㑹掎角進討旬月之間必見成功此萬全之策也魏主從之甲戌魏主北行夜至河内郡北命髙道穆於燭下作詔書數十紙布告逺近於是四方始知魏主所在乙亥魏主入河内臨淮王彧安豐王延明帥百僚封府庫備法駕迎顥丙子顥入洛陽宫改元建武大赦以陳慶之爲侍中車􅀐大將軍增邑萬户楊椿在洛陽椿弟順爲冀州刺史兄子􅋲爲北中郎將從魏主在河北顥意忌椿而以其家世顯重恐失人望未敢誅也或勸椿岀亡椿曰吾内外百口何所逃匿正當坐待天命耳顥後軍都督矦暄守睢陽爲後援魏行臺崔孝芬大都督刁宣馳往圍暄晝夜急攻戊寅暄突走禽斬之上黨王天穆等帥衆四萬攻拔大梁分遣費穆將兵二萬攻虎牢顥使陳慶之擊之天穆畏顥將北渡河謂行臺郎中濟隂温子昇曰卿欲向洛爲隨我北渡子昇曰主上以虎牢失守致此狼狽元顥新入人情未安今往擊之無不克者大王平定京邑奉迎大駕此􅁊文之舉也捨此北渡竊爲大王惜之天穆善之而不能用遂引兵渡河費穆攻虎牢將拔聞天穆北渡自以無後繼遂降於慶之慶之進擊大梁梁國皆下之慶之以數千之衆自發銍縣至洛陽凡取三十二城四十七戰所向皆克顥使黃門郎祖瑩作書遺魏主曰朕泣請梁朝誓在復恥正欲問罪於爾朱出卿於桎梏卿託命犲狼委身虎口假獲民地本是榮物固非卿有今國家隆替在卿與我若天道助順則皇魏再興脫或不然在榮爲福於卿爲禍卿宜三復富貴可保顥旣入洛自河以南州郡多附之齊州刺史沛郡王欣集文武議所從曰北海長樂俱帝室近親今宗祏不移我欲受赦諸君意何如在坐莫不失色軍司崔光韶獨抗言曰元顥受制於梁引寇讎之兵以覆宗國此魏之賊臣亂子也豈唯大王家事所宜切齒下官等皆荷朝眷未敢仰從長史崔景茂等皆曰軍司議是欣乃斬顥使光韶亮之從父弟也於是襄州刺史賈思同廣州刺史鄭先護南兖州刺史元暹亦不受顥命思同思伯之弟也顥以冀州刺史元孚爲東道行臺彭城郡王孚封送其書於魏主平陽主敬先起兵於河橋以討顥不克而死魏以侍中車􅀐將軍尚書右僕射爾朱丗隆爲使持節行臺僕射大將軍相州刺史鎭鄴城魏主之出也單􅀐而去侍衛後宫皆案堵如故顥一旦得之號令已出四方人情想其風政而顥自謂天授遽有驕怠之志宿昔賔客近習咸見寵待干擾政事日夜縱酒不恤軍國所從南兵陵暴市里朝野失望髙道穆兄子儒自洛陽出從魏主魏主問洛中事子儒曰顥敗在旦夕不足憂也爾朱榮聞魏主北出即時馳傳見魏主於長子行且部分魏主即日南還榮爲前驅旬日之間兵衆大集資糧器仗相繼而至六月壬午魏大赦榮旣南下并肆不安乃以爾朱天光爲并肆等九州行臺仍行并州事天光至晉陽部分約勒所部皆安己丑費穆至洛陽顥引入責以河隂之事而殺之顥使都督宗正珍孫與河内太守元襲據河内爾朱榮攻之上黨王天穆引兵㑹之壬寅拔其城斬珍孫及襲辛亥魏淮隂太守晉鴻以湖陽來降閏月己未南康簡王績卒魏北海王顥旣得志密與臨淮王彧安豐王延明謀叛梁以事難未平藉陳慶之兵力故外同内異言多猜忌慶之亦密爲之備􅀃顥曰今逺來至此未服者尚多彼􅀂知吾虚實連兵四合將何以禦之宜啟天子更請精兵并敕諸州有南人没此者悉須部送顥欲從之延明曰慶之兵不出數千已自難制今更增其衆寧肯復爲人用乎大權一去動息由人魏之宗廟於斯墜矣顥乃不用慶之言又慮慶之密啓乃表於上曰今河北河南一時克定唯爾朱榮尚敢跋扈臣與慶之自能擒討州郡新服正須綏撫不宜更復加兵搖動百姓上乃詔諸軍繼進者皆停於境上洛中南兵不滿一萬而羗胡之衆十倍軍副馬佛念爲慶之曰將軍威行河洛聲震中原功髙勢重爲魏所疑一旦變生不測可無慮乎不若乗其無備殺顥據洛此千載一時也慶之不從顥先以慶之爲徐州刺史因固求之鎭顥心憚之不遣曰主上以洛陽之地全相任委忽聞捨此朝􅀉欲往彭城謂君遽取富貴不爲國計非徒有損於君恐僕并受其責慶之不敢復言爾朱榮與顥相持於河上慶之守北中城顥自據南岸慶之三日十一戰殺傷甚衆有夏州義士爲顥守河中渚隂與榮通謀求破橋立効榮引兵赴之及橋破榮應接不逮顥悉屠之榮悵然失望又以安豐王延明縁河固守而北軍無􅂳可渡議欲還北更圗後舉黃門郎楊􅋲曰大王發并州之日已知夏州義士之謀指來應之邪爲欲廣施經略厈復帝室乎夫用兵者何甞不散而更合瘡愈更戰況今未有所損豈可以一事不諧而衆謀頓廢乎今四方顒顒視公此舉若未有所成遽復引歸民情失望各懷去就勝􅀒所在未可知也不若徴發民材多爲桴筏間以舟檝縁河布列數百里中皆爲渡勢首尾旣逺使顥不知所防一旦得渡必立大功髙道穆曰今乗輿飄蕩主憂臣辱大王擁百萬之衆輔天子而令諸矦若分兵造筏所在散渡指掌可克柰河捨之北歸使顥復得完聚徴兵天下此所謂飬虺成蛇悔無及矣榮曰楊黃門已陳此策當相與議之劉靈助言於榮曰不出十日河南必平伏波將軍正平楊檦與其族居馬渚自言有小船數艘求爲郷導戊辰榮命車􅀐將軍爾朱兆與大都督賀拔勝縳材爲筏自馬渚西硤石夜渡襲擊顥子領軍將軍冠受擒之安豐王延明之衆聞之大潰顥失據帥麾下數百􅀐南走陳慶之收步􅀐數千結陳東還顥所得諸城一時復降於魏爾朱榮自追陳慶之㑹嵩髙水漲慶之軍士死散略盡乃削須髪爲沙門間行出汝隂還建康猶以功除右衛將軍封永興縣矦中軍大都督兼領軍大將軍楊津入􅀫殿中掃洒宫庭封閉府庫出迎魏主於北邙流涕謝罪帝慰勞之庚午帝入居華林園大赦以爾朱兆爲車􅀐大將軍儀同三司北來軍士及隨駕文武諸立義者加五級河北報事之官及河南立義者加二級壬申加大丞相榮天柱大將軍增封通前二十萬戸北海王顥自轘轅南出至臨潁從􅀐分散臨潁縣卒江豐斬之癸酉傳首洛陽臨淮王彧復自歸於魏主安豐王延明􅂝妻子來奔陳慶之之入洛也蕭贊送啓求還時呉淑媛尚在上使以贊幼時衣􅀉之信未逹而慶之敗慶之自魏還特重北人朱异怪而問之慶之曰吾始以爲大江以北皆戎狄之郷比至洛陽乃知衣冠人物盡在中原非江東所及也柰何輕之甲戌魏以上黨王天穆爲太宰城陽王徽爲大司馬兼太尉乙亥魏主宴勞爾朱榮上黨王天穆及北來督將於都亭出宫人三百繒錦雜綵數萬匹班賜有差凡受元顥爵賞階復者悉追奪之秋七月辛巳魏主始入宫以髙道穆爲御史中尉帝姊壽陽公主行犯清路赤棒卒呵之不止道穆令卒擊破其軍公主泣訴於帝帝曰髙中尉清直之士彼所行者公事豈可以私責之也道穆見帝帝曰家姊行路相犯極以爲愧道穆免冠謝帝曰朕以愧卿卿何謝也於是魏多細錢米斗幾直一千髙道穆上表以爲在市銅價八十一錢得銅一斤私造薄錢斤贏二百旣示之以深利又隨之以重刑抵罪雖多姦鑄彌衆今錢徒有五銖之文而無二銖之實置之水上殆欲不沈此乃因循有漸科防不切朝廷失之彼復何罪宜改鑄大錢文載年號以記其始則一斤所成止七十錢計私鑄所費不能自潤直置無利自應息心況復嚴刑廣設也金紫光禄大夫楊􅋲亦奏乞聽民與官並鑄五銖錢使民樂爲而弊自改魏主從之始鑄永安五銖錢辛卯魏以車􅀐將軍楊津爲司空初魏以梁益二州境土荒逺更立巴州以統諸獠凡二十餘萬戸以巴酋嚴始欣爲刺史又立隆城鎭以始欣族子愷爲鎭將始欣貪暴孝昌初諸獠反圍州城行臺魏子建撫諭之乃散始欣恐獲罪隂來請降帝遣使以詔書鐵劵衣􅃣等賜之爲愷所獲以送子建子建奏以隆城鎭爲南梁州用愷爲刺史囚始欣於南鄭魏以唐永爲東益州刺史代子建以梁州刺史􅀓豎眼爲行臺子建去東益而氐蜀尋反唐永弃城走東益州遂没􅀓豎眼之初至梁州也州人相賀旣而乆病不能親政事其子敬紹奢滛貪暴州人患之嚴始欣重賂敬紹得還巴州遂舉兵擊嚴愷滅之以巴州來降帝遣將軍蕭玩等援兵援之􅀓敬紹見魏室方亂隂有保據南鄭之志使其妻兄唐崑崙於外扇誘山民相聚圍城欲爲内應圍合而謀泄城中將士共執敬紹以白豎眼而殺之豎眼恥恚而卒八月己未魏以太傅李延寔爲司徒甲戌侍中太保楊椿致仕九月癸巳上幸同㤗寺設四部無遮大㑹上釋御服持法衣行清浄大捨以便省爲房素牀瓦器乗小車私人執役甲子升講堂法座爲四部大衆開涅槃經題癸卯羣臣以錢一億萬祈白三寳奉贖皇帝菩薩僧衆黙許乙巳百辟詣寺東門奉表請還臨宸極三請乃許上三荅書前後並稱頓首魏爾朱榮使大都督尖山矦淵討韓樓於薊配卒甚少􅀐止七百或以爲言榮曰矦淵臨機設變是其所長若摠大衆未必能用今以此衆擊此賊必能取之淵遂廣張軍聲多設供具親帥數百􅀐深入樓境去薊百餘里值賊帥陳周馬歩萬餘淵潜伏以乗其背大破之虜其卒五千餘人尋還其馬仗縱令入城左右諫曰旣獲賊衆何爲復資遣之淵曰我兵旣少不可力戰須爲竒計以離間之乃可克也淵度其已至遂帥􅀐夜進昧旦叩其城門韓樓果疑降卒爲淵内應遂走追擒之幽光平以淵爲平州刺史鎭范陽先是魏使征東將軍劉靈助兼尚書左僕射慰勞幽州流民於濮陽頓丘因帥流民北還與矦淵共滅韓樓仍以靈助行幽州事加車􅀐將軍又爲幽平營安四州行臺万俟醜奴攻魏東秦州㧞之殺刺史髙子朗冬十月己酉上又設四部無遮大㑹道俗五萬餘人㑹畢上御金輅還宫御太極殿大赦改元魏以前司空蕭贊爲司徒十一月己卯就徳興請降於魏營州平丙午魏以城陽王徽爲太保丹楊王蕭贊爲太尉雍州刺史長孫稚爲司徒十二月辛亥兖州刺史張景邕荆州刺史李靈起雄信將軍蕭進明叛降魏以陳慶之爲北兖州刺史有妖賊僧彊自稱天子土豪蔡伯龍起兵應之衆至三萬攻陷北徐州慶之討斬之魏以岐州刺史王羆行南秦州事羆誘捕州境羣盗悉誅之資治通鑑卷第一百五十三
