body:
  text: 臣司馬光奉勑編集唐紀十七章困敦凡八年有奇起􅀇黓閹茂八月盡上高宗天皇大聖大弘孝皇帝中之上龍朔二年八月壬寅以許敬宗爲太子少師同東西臺三品知西臺事九月戊寅初令八品九品衣碧冬十月丁酉上幸驪山温湯太子監國丁未還宫庚戌西臺侍郎陜人上官儀同東西臺三品癸丑詔以四年正月有事於泰山仍以來年二月幸東都左相許圉師之子奉輦直長自然遊獵犯人田田主怒自然以鳴鏑射之圉師杖自然一百而不以聞田主詣司憲訟之司憲大夫楊德裔不爲治西臺舎人袁公瑜遣人易姓名上封事告之上曰圉師爲宰相侵陵百姓匿而不言豈非作威作福圉師謝曰臣備位樞軸以直道事陛下不能悉允衆心故爲人所攻訐至於作威福者或手握彊兵或身居重鎮臣以文吏奉事聖明惟知閉門自守何敢作威福上怒曰汝恨無兵邪許敬宗曰人臣如此罪不容誅遽令引出詔特免官癸酉立皇子旭輪爲殷王十二月戊申詔以方討高麗百濟河北之民勞於征役其封泰山幸東都並停䫻海道揔管蘇海政受詔討􅀛兹敕興昔亡繼往絶二可汗發兵與之俱至興昔亡之境繼往絶素與興昔亡有怨密謂海政曰彌射謀反請誅之時海政兵纔數千集軍吏謀曰彌射若反我輩無噍類不如先事誅之乃矯稱敕令大揔管齎帛數萬段賜可汗及諸酋長興昔亡帥其徒受賜海政悉収斬之其䑕尼施抜塞幹兩部亡走海政與繼往絶追討平之軍還至踈勒南弓月部復引吐蕃之衆來欲與唐兵戰海政以師老不敢戰以軍資賂吐蕃約和而還由是諸部落皆以興昔亡爲寃各有離心繼往絶尋卒十姓無主有阿史那都支及李遮匐収其餘衆附於吐蕃是歲西突厥宼庭州刺史來濟將兵拒之謂其衆曰吾乆當死幸䝉存全以至今日當以身報國遂不釋甲胄赴敵而死三年春正月左武衞將軍鄭仁泰討鐵勒叛者餘種悉平之乙酉以李義府爲右相仍知選事二月徙燕然都䕶府於回紇更名瀚海都䕶徙故瀚海都䕶於雲中古城更名雲中都䕶以磧爲境磧北州府皆􅀠瀚海磧南􅀠雲中三月許圉師再貶䖍州刺史楊德裔以阿黨流庭州圉師子文思自然並免官右相河間郡公李義府典選恃中宮之勢專以賣官爲事銓綜無次怨讟盈路上頗聞之從容謂義府曰卿子及壻頗不謹多爲非法我尚爲卿掩覆卿宜戒之義府勃然變色頸頰俱張曰誰告陛下上曰但我言如是何必就我索其所從得邪義府殊不引咎緩步而去上由是不恱望氣者杜元紀謂義府所居第有獄氣宜積錢二十萬緡以厭之義府信之聚歛尤急義府居母䘮朔望給哭假輙㣲服與元紀出城東登古塜􅀱望氣色或告義府窺覘災眚隂有異圖又遣其子右司議郎津召長孫无忌之孫延受其錢七百緡除延司津監右金吾倉曹參軍楊行頴告之夏四月乙丑下義府獄遣司刑太常伯劉祥道與御史詳刑共鞫之仍命司空李勣監焉事皆有實戊子詔義府除名流嶲州津除名流振州諸子及壻並除名流庭州朝野莫不稱慶或作河間道行軍元帥劉祥道破銅山大賊李義府露布牓之通衢義府多取人奴婢及敗各散歸其家故其露布云混奴婢而亂放各識家而競入乙未置雞林大都督府於新羅國以金法敏為之丙午蓬萊宫含元殿成上始移仗居之更命故宫曰西内戊申始御紫宸殿聽政五月壬午栁州蠻酋吳君解反遣冀州長史劉伯英右武衛將軍馮士翽􅀤嶺南兵討之吐蕃與吐谷渾互相攻各遣使上表論曲直更來求援上皆不許吐谷渾之臣素和貴有罪逃奔吐蕃具言吐谷渾虚實吐蕃發兵擊吐谷渾大破之吐谷渾可汗曷鉢與弘化公主帥數千帳弃國走依涼州請徙居内地上以涼州都督鄭仁泰為清海道行軍大揔管帥右武衛將軍獨孤卿雲辛文陵等分屯涼鄯二州以備吐蕃六月戊申又以左武衛大將軍蘇定方為安集大使節度諸軍為吐谷渾之援吐蕃禄東賛屯青海遣使者論仲琮入見表陳吐谷渾之罪且請和親上不許遣左衛郎將劉文祥使于吐蕃降璽書責讓之秋八月戊申上以海東累歲用兵百姓困於征調士卒戰溺死者甚衆詔罷三十六州所造船遣司元太常伯竇德玄等分詣十道問人疾苦黜陟官吏德玄毅之曽孫也九月戊午熊津道行軍揔管右威衛將軍孫仁師等破百濟餘衆及倭兵於白江㧞其周留城初劉仁願劉仁軌既克眞峴城詔孫仁師將兵浮海助之百濟王豐南引倭人以拒唐兵仁師與仁願仁軌合軍勢大振諸將以加林城水陸之衝欲先攻之仁軌曰加林險固急攻則傷士卒緩之則曠日持乆周留城虜之巢穴羣凶所聚除惡務本宜先攻之若克周留諸城自下於是仁師仁願與新羅王法敏將陸軍以進仁軌與别將杜爽扶餘隆將水軍及糧船自熊津入白江以㑹陸軍同趣周留城遇倭兵於白江口四戰皆捷焚其舟四百艘煙炎灼天海水皆赤百濟王豐脫身奔髙麗王子忠勝忠志等帥衆降百濟盡平唯别帥遟受信據任存城不下初百濟西部人黑齒常之長七尺餘驍勇有謀略仕百濟為達率兼郡將猶中國刺史也蘇定方克百濟常之帥所部隨衆降定方縶其王及太子縱兵劫掠壯者多死常之懼與左右十餘人遁歸本部収集亡散保任存山結柵以自固旬日間歸附者三萬餘人定方遣兵攻之常之拒戰唐兵不利常之復取二百餘城定方不能克而還常之與别部將沙吒相如各據險以應福信百濟既敗皆帥其衆降劉仁軌使常之相如自將其衆取任存城仍以糧仗助之孫仁師曰此屬獸心何可信也仁軌曰吾觀二人皆忠勇有謀敦信重義但曏者所託未得其人今正是其感激立效之時不用疑也遂給其粮仗分兵隨之攻㧞任存城遟受信弃妻子奔髙麗詔留劉仁軌將兵鎮百濟召孫仁師劉仁願還百濟兵火之餘比屋彫殘僵尸滿野仁軌始命瘞骸骨籍戸口理村聚署官長通道塗立橋梁補堤堰復陂塘課耕桑賑貧乏養孤老立唐社禝頒正朔及廟諱百濟大恱闔境各安其業然後修屯田儲糗粮訓士卒以圖高麗劉仁願至京師上問之曰卿在海東前後奏事皆合機宜復有文理卿本武人何能如是仁願曰此皆劉仁軌所為非臣所及也上恱加仁軌六階正除帶方州刺史為築第長安厚賜其妻子遣使齎璽書勞勉之上官儀曰仁軌遭黜削而能盡忠仁願秉節制而能推賢皆可謂君子矣冬十月辛巳朔詔太子毎五日於光順門内視諸司奏事其事之小者皆委太子决之十二月庚子詔改來年元壬寅以安西都䕶髙賢爲行軍揔管將兵擊弓月以救于闐是歲大食擊波斯拂菻破之南侵婆羅門吞滅諸胡勝兵四十餘萬麟德元年春正月甲子改雲中都䕶府為單于大都䕶府以殷王旭輪為單于大都䕶初李靖破突厥遷三百帳于雲中城阿史德氏為其長至是部落漸衆阿史德氏詣闕請如胡法立親王為可汗以統之上召見謂曰今之可汗古之單于也故更為單于都䕶府而使殷王遥領之二月戊子上行幸萬年宫夏四月壬子衛州刺史道孝王元慶薨丙午魏州刺史郇公孝協坐贓賜死司宗卿隴西王博义等奏孝協父叔良死王事孝協無兄弟恐絶嗣上曰畫一之法不以親踈異制茍害百姓雖皇太子亦所不赦孝恊有一子何憂乏祀乎孝恊竟自盡於第五月戊申朔遂州刺史許悼王孝薨乙卯於昆明之弄棟川置姚州都督府秋七月丁未朔詔以三年正月有事於岱宗八月丙子車駕還京師幸舊宅留七日壬午還蓬萊宫丁亥以司列太常伯劉祥道兼右相大司憲竇德玄為司元太常伯檢校左相冬十月庚辰檢校熊津都督劉仁軌上言臣伏覩所存戍兵疲羸者多勇健者少衣服貧弊唯思西歸無心展效臣問以往在海西見百姓人人應募爭欲從軍或請自辦衣糧謂之義征何為今日士卒如此咸言今日官府與曩時不同人心亦殊曩時東西征役身没王事並䝉敕使弔祭追贈官爵或以死者官爵回授子弟凡度遼海者皆賜勲一轉自顯慶五年以來征人屢經渡海官不記錄其死者亦無人誰何州縣毎發百姓為兵其壯而富者行錢參逐皆亡匿得免貧者身雖老弱被發即行頃者破百濟及平壤苦戰當是時將帥號令許以勲賞無所不至及達西岸唯聞枷鏁推禁奪賜破勲州縣追呼無以自存公私困弊不可悉言以是昨發海西之日已有逃亡自殘者非獨至海外而然也又本因征役授勲級以為榮寵而比年出征皆使勲官挽引勞苦與白丁無殊百姓不願從軍率皆由此臣又問曩日士卒留鎮五年尚得支濟今爾等始經一年何為如此單露咸言初發家日惟令備一年資裝今已二年未有還期臣檢校軍士所留衣今冬僅可充事來秋以往全無凖擬陛下留兵海外欲殄滅髙麗百濟髙麗舊相黨援倭人雖逺亦共為影響若無鎮兵還成一國今既資戍守又置屯田所籍士卒同心同德而衆有此議何望成功自非有所更張厚加慰勞明賞重罰以起士心若止如今日已前處置恐師衆疲老立效無日逆耳之事或無人為陛下盡言故臣披露肝膽昧死奏陳上深納其言遣右威衛將軍劉仁願將兵渡海以代舊鎮之兵仍敕仁軌俱還仁軌謂仁願曰國家懸軍海外欲以經略髙麗其事非易今収穫未畢而軍吏與士卒一時代去軍將又歸夷人新服衆心未安必將生變不如且留舊兵漸令収穫辦具資糧節級遣還軍將且留鎮撫未可還也仁願曰吾前還海西大遭䜛謗云吾多留兵衆謀據海東幾不免禍今日惟知准敕豈敢擅有所為仁軌曰人臣茍利於國知無不為豈恤其私乃上表陳便宜自請留鎮海東上從之仍以扶餘隆為熊津都尉使招輯其餘衆初武后能屈身忍辱奉順上意故上排羣議而立之及得志專作威福上欲有所為動為后所制上不勝其忿有道士郭行眞出入禁中嘗為厭勝之術宦者王伏勝發之上大怒密召西臺侍郎同東西臺三品上官儀議之儀因言皇后專恣海内所不與請廢之上意亦以為然即命儀草詔左右奔告于后后遽詣上自訴詔草猶在上所上羞縮不忍復待之如初猶恐后怨怒因紿之曰我初無此心皆上官儀教我儀先為陳王諮議與王伏勝俱事故太子忠后於是使許敬宗誣奏儀伏勝與忠謀大逆十二月丙戌儀下獄與其子庭芝王伏勝皆死籍没其家戊子賜忠死于流所右相劉祥道坐與儀善罷政事為司禮太常伯左肅機鄭欽泰等朝士流貶者甚衆皆坐與儀交通故也自是上毎視事則后垂簾於後政無大小皆預聞之天下大權悉歸中宫黜陟生殺决於其口天子拱手而已中外謂之二聖太子右中䕶檢校西臺侍郎樂彥瑋西臺侍郎孫處約並同東西臺三品二年春正月丁卯吐蕃遣使入見請復與吐谷渾和親仍求赤水地畜牧上不許二月壬午車駕發京師丁酉至合璧宫上語及隋煬帝謂侍臣曰煬帝拒諫而亡朕常以爲戒虛心求諫而竟無諫者何也李勣對曰陛下所爲盡善羣臣無得而諫三月甲寅以兼司戎太常伯姜恪同東西臺三品恪寳誼之子也辛未東都乾元殿成閏月壬申朔車駕至東都踈勒弓月引吐蕃侵于闐敕西州都督崔知辯左武衞將軍曹繼叔將兵救之夏四月戊辰左侍極陸敦信檢校右相西臺侍郎孫處約太子右中䕶檢校西臺侍郎樂彦瑋並罷政事祕閣郎中李淳風以傅仁均戊寅曆推步浸踈乃增損劉焯皇極曆更撰麟德曆五月辛卯行之秋七月己丑兖州都督鄧康王元裕薨上命熊津都尉扶餘隆與新羅王法敏釋去舊怨八月壬子同盟于熊津城劉仁軌以新羅百濟耽羅倭國使者浮海西還會祠泰山高麗亦遣太子福男來侍祠冬十月癸丑皇后表稱封禪舊儀祭皇地祗太后昭配而令公卿行事禮有未安至日妾請帥內外命婦奠獻詔禪社首以皇后為亞獻越國太妃燕氏為終獻壬戍詔封禪壇所設上帝后土位先用藳秸陶匏等並宜改用茵褥罍爵其諸郊祀亦宜凖此又詔自今郊廟享宴文舞用功成慶善之樂武舞用神功破陳之樂丙寅上發東都從駕文武儀仗數百里不絶列營置幕彌亘原野東自髙麗西至波斯烏長諸國朝㑹者各帥其屬扈從穹廬毳幕牛羊駝馬填咽道路時比歳豐稔米斗至五錢麥豆不列于市十一月戊子上至濮陽竇德玄騎從上問濮陽謂之帝丘何也德玄不能對許敬宗自後躍馬而前曰昔顓頊居此故謂之帝丘上稱善敬宗退謂人曰大臣不可以無學吾見德玄不能對心實羞之德玄聞之曰人各有能有不能吾不強對以所不知此吾所能也李勣曰敬宗多聞信美矣德玄之言亦善也夀張人張公藝九世同居齊隋唐皆旌表其門上過夀張幸其宅問所以能共居之故公藝書忍字百餘以進上善之賜以縑帛十二月丙午車駕至齊州留十日丙辰發靈巖頓至泰山下有司於山南為圎壇山上為登封壇社首山上為降禪方壇乾封元年春正月戊辰朔上祀昊天上帝于泰山南己巳登泰山封玉牒上帝冊藏以玉匱配帝冊藏以金匱皆纒以金繩封以金泥印以玉璽藏以石䃭庚午降禪于社首祭皇地祗上初獻畢執事者皆趨下宦者執帷皇后升壇亞獻帷弈皆以錦繡為之酌酒實爼豆登歌皆用宫人壬申上御朝覲壇受朝賀赦天下改元文武官三品已上賜爵一等四品已下加一階先是階無泛加皆以勞考叙進至五品三品仍奏取進止至是始有泛階比及末年服緋者滿朝矣時大赦惟長流人不聽還李義府憂憤發病卒自義府流竄朝士日憂其復入及聞其卒衆心乃安丙戌車駕發泰山辛卯至曲阜贈孔子太師以少牢致祭癸未至亳州謁老君廟上尊號曰太上玄元皇帝丁丑至東都留六日甲申幸合璧宫夏四月甲辰至京師謁太廟庚戌左侍極兼檢校右相陸敦信以老疾辭職拜大司成兼左侍極罷政事五月庚寅鑄乾封泉寳錢一當十俟期年盡廢舊錢高麗泉蓋蘇文卒長子男生代爲莫離支初知國政出廵諸城使其弟男建男産留知後事或謂二弟曰男生惡二弟之逼意欲除之不如先為計二弟初未之信又有告男生者曰二弟恐兄還奪其權欲拒兄不納男生潜遣所親往平壤伺之二弟収掩得之乃以王命召男生男生懼不敢歸男建自為莫離支發兵討之男生走保别城使其子獻誠詣闕求救六月壬寅以右驍衞大將軍契苾何力為遼東道安撫大使將兵救之以獻誠為右武衞將軍使為鄉導又以左金吾衞將軍龎同善營州都督高侃為行軍揔管同討髙麗秋七月乙丑朔徙殷王旭輪為豫王以大司憲兼檢校太子左中䕶劉仁軌為右相初仁軌為給事中按畢正義事李義府怨之出為青州刺史會討百濟仁軌當浮海運糧時未可行義府督之遭風失船丁夫溺死甚衆命監察御史袁異式往鞫之義府謂異式曰君能辦事勿憂無官異式至謂仁軌曰君與朝廷何人為讎宜早自為計仁􅁤曰仁􅁤當官不職國有常刑公以法斃之無所逃命若使遽自引决以快讎人竊所未甘乃具獄以聞異式將行仍自掣其鎻獄上義府言於上曰不斬仁軌無以謝百姓舍人源直心曰海風暴起非人力所及上乃命除名以白衣從軍自效義府又諷劉仁願使害之仁願不忍殺及為大司憲異式懼不自安仁軌瀝觴告之曰仁軌若念疇昔之事有如此觴仁軌既知政事異式尋遷詹事丞時論紛然仁軌聞之遽薦為司元大夫監察御史杜易簡謂人曰斯所謂矯枉過正矣八月辛丑司元太常伯兼檢校左相竇德玄薨初武士彠娶相里氏生男元慶元爽又娶楊氏生三女長適越王府法曹賀蘭越石次皇后次適郭孝慎士彠卒元慶元爽及士彠兄子惟良懐運皆不禮於楊氏楊氏深銜之越石孝慎及孝慎妻並早卒越石妻生敏之及一女而寡后既立楊氏號榮國夫人越石妻號韓國夫人惟良自始州長史超遷司衞少卿懐運自瀛州長史遷淄州刺史元慶自右衛郎將為宗正少卿元爽自安州户曹累遷少府少監榮國夫人嘗置酒謂惟良等曰頗憶疇昔之事乎今日之榮貴復何如對曰惟良等幸以功臣子弟早登宦籍揣分量才不求貴逹豈意以皇后之故曲荷朝恩夙夜憂懼不為榮也榮國不恱皇后乃上䟽請出惟良等為逺州刺史外示謙抑實惡之也於是以惟良檢校始州刺史元慶為龍州刺史元爽為濠州刺史元慶至州以憂卒元爽坐事流振州而死韓國夫人及其女以后故出入禁中皆得幸於上韓國尋卒其女賜號魏國夫人上欲以魏國為内職心難后未决后惡之㑹惟良懐運與諸州刺史詣泰山朝覲從至京師惟良等獻食后密置毒醢中使魏國食之暴卒因歸罪於惟良懐運丁未誅之改其姓為蝮氏懐運兄懐亮早卒其妻善氏尤不禮於榮國坐惟良等沒入掖庭榮國令后以他事束棘鞭之肉盡見骨而死􅊨九月龎同善大破高麗兵泉男生帥衆與同善合詔以男生為特進遼東大都督兼平壤道安撫大使封玄莵郡公戊子金紫光禄大夫致仕廣平宣公劉祥道薨子齊賢嗣齊賢為人方正上甚重之為晉州司馬將軍史興宗嘗從上獵苑中因言晉州産佳鷂劉齊賢今為司馬請使捕之上曰劉齊賢豈捕鷂者邪卿何以此待之􅊨冬十二月己酉以李勣為遼東道行軍大揔管兼安撫大使以司列少常伯安陸郝處俊副之以擊高麗龎同善契苾何力並為遼東道行軍副大揔管兼安撫大使如故其水陸諸軍揔管并運糧使竇義積獨孤卿雲郭待封等並受勣處分河北諸州租賦悉詣遼東給軍用待封孝恪之子也勣欲與其壻京兆杜懐恭偕行以求勲效懐恭辭以貧勣贍之復辭以無奴馬又贍之懐恭辭窮乃亡匿岐陽山中謂人曰公欲以我立法耳勣聞之流涕曰杜郎踈放此或有之乃止二年春正月上耕藉田有司進耒耜加以彫飾上曰耒耜農夫所執豈宜如此之麗命易之既而耕之九推乃止自行乾封泉寳錢榖帛踊貴商賈不行癸未詔罷之二月丁酉涪陵悼王愔薨辛丑復以萬年宫為九成宫生羌十二州為吐蕃所破三月戊寅悉廢之上屢責侍臣不進賢衆莫敢對司列少常伯李安期對曰天下未嘗無賢亦非羣臣敢蔽賢也比來公卿有所薦引為讒者已指為朋黨滯淹未獲伸而在位者先􅀗罪矣是以各務杜口耳陛下果推至誠以待之其誰不願舉所知此在陛下非在羣臣也上深以為然安期百藥之子也夏六月乙卯西臺侍郎楊弘武戴至德正諫大夫兼東臺侍郎李安期東臺舍人昌樂張文瓘司列少常伯兼正諫大夫河北趙仁本並同東西臺三品弘武素之弟子至德胄之兄子也時造蓬萊上陽合璧等宫頻征伐四夷廐馬萬匹倉庫漸虛張文瓘諫曰隋鑒不逺願勿使百姓生怨上納其言减廐馬數千匹秋八月己丑朔日有食之辛亥東臺侍郎同東西臺三品李安期出爲荆州長史九月庚申上以乆疾命太子弘監國辛未李勣㧞高麗之新城使契苾何力守之勣初渡遼謂諸將曰新城高麗西邊要害不先得之餘城未易取也遂攻之城人師夫仇等縳城主開門降勣引兵進擊一十六城皆下之龎同善高侃尚在新城泉男建遣兵襲其營左武衞將軍薛仁貴擊破之侃進至金山與高麗戰不利高麗乗勝逐北仁貴引兵横擊之大破髙麗斬首五萬餘級㧞南蘇木底蒼巖三城與泉男生軍合郭待封以水軍自别道趣平壤勣遣别將馮師本載糧仗以資之師本船破失期待封軍中飢窘欲作書與勣恐爲虜所得知其虚實乃作離合詩以與勣勣怒曰軍事方急何以詩為必斬之行軍管記通事舍人河南元萬頃為釋其義勣乃更遣糧仗赴之萬頃作檄髙麗文曰不知守鴨綠之險泉男建報曰謹聞命矣即移兵據鴨綠津唐兵不得度上聞之流萬頃於嶺南郝處俊在髙麗城下未及成列高麗奄至軍中大駭處俊據胡床方食乾糒潜簡精鋭擊敗之將士服其膽略冬十二月甲午詔自今祀昊天上帝五帝皇地祗神州地祗並以高祖太宗配仍合祀昊天上帝五帝於明堂是歳海南獠䧟瓊州緫章元年春正月壬子以右相劉仁軌為遼東道副大揔管二月壬午李勣等拔髙麗扶餘城薛仁貴既破髙麗於金山乗勝將三千人將攻扶餘城諸將以其兵少止之仁貴曰兵不必多顧用之何如耳遂為前鋒以進與高麗戰大破之殺獲萬餘人遂㧞扶餘城扶餘川中四十餘城皆望風請服侍御史洛陽賈言忠奉使自遼東還上問以軍事言忠對曰髙麗必平上曰卿何以知之對曰隋煬帝東征而不克者人心離怨故也先帝東征而不克者髙麗未有舋也今高藏微弱權臣擅命蓋蘇文死男建兄弟内相攻奪男生傾心内附為我鄉導彼之情偽靡不知之以陛下明聖國家富彊將士盡力以乗高麗之亂其勢必克不俟再舉矣且高麗連年饑饉妖異屢降人心危駭其亡可翹足待也上又問遼東諸將孰賢對曰薛仁貴勇冠三軍龎同善雖不善鬬而持軍嚴整高侃勤儉自處忠果有謀契苾何力沈毅能斷雖頗忌前而有統御之才然夙夜小心忘身憂國皆莫及李勣也上深然其言泉男建復遣兵五萬人救扶餘城與李勣等遇於薛賀水合戰大破之斬獲三萬餘人進攻大行城拔之朝廷議明堂制度略定三月庚寅赦天下改元戊寅上幸九成宫夏四月丙辰彗星見于五車上避正殿减常膳徹樂許敬宗等奏請復常曰彗見東北高麗將滅之兆也上曰朕之不德謫見於天豈可歸咎小夷且髙麗百姓亦朕之百姓也不許戊辰彗星見辛巳西臺侍郎同東西臺三品楊弘武薨八月辛酉卑列道行軍揔管右威衞將軍劉仁願坐征高麗逗留流姚州癸酉車駕還京師九月癸巳李勣㧞平壤勣既克大行城諸軍出它道者皆與勣會進至鴨綠柵髙麗發兵拒戰勣等奮擊大破之追奔二百餘里㧞辱夷城諸城遁逃及降者相繼契苾何力先引兵至平壤城下勣軍繼之圍平壤月餘髙麗王藏遣泉男産帥首領九十八人持白幡詣勣降勣以禮接之泉男建猶閉門拒守頻遣兵出戰皆敗男建以軍事委僧信誠信誠密遣人詣勣請為内應後五日信誠開門勣縱兵登城鼓噪焚城四月男建自刺不死遂擒之髙麗悉平冬十月戊午以烏荼國婆羅門盧迦逸多為懐化大將軍逸多自言能合不死藥上將餌之東臺侍郎郝處俊諫曰脩短有命非藥可延貞觀之末先帝服那羅邇娑婆寐藥竟無效大漸之際名醫不知所為議者歸罪娑婆寐將加顯戮恐取笑戎狄而止前鑒不逺願陛下深察上乃止李勣將至上命先以高藏等獻于昭陵具軍容奏凱歌入京師獻于太廟十二月丁巳上受俘于含元殿以髙藏政非己出赦以為司平太常伯貟外同正以泉男産為司宰少卿僧信誠為銀青光祿大夫泉男生為右衞大將軍李勣以下封賞有差泉男建流黔州扶餘豐流嶺南分高麗五部百七十六城六十九萬餘户為九都督府四十二州百縣置安東都䕶府於平壤以統之擢其酋帥有功者為都督刺史縣令與華人參理以右威衞大將軍薛仁貴檢校安東都䕶揔兵二萬人以鎮撫之丁卯上祀南郊告平高麗以李勣為亞獻己巳謁太廟渭南尉劉延祐弱冠登進士第政事為畿縣最李勣謂之曰足下春秋甫爾遽擅大名宜稍自貶抑無為獨出人右也時有敇征遼軍士逃亡限内不首及首而更逃者身斬妻子籍没太子上表以為如此之比其數至多或遇病不及隊伍怖懼而逃或因樵採為賊所掠或渡海漂没或深入賊庭為所傷殺軍法嚴重同隊恐并獲罪即舉以為逃軍旅之中不暇勘當直據隊司通狀關移所屬妻子没官情實可哀書曰與其殺不辜寧失不經伏願逃亡之家免其配没從之甲戌司戎太常伯姜恪兼檢校左相司平太常伯閻立本守右相是􅀊京師及山東江淮旱饑二年春二月辛酉以張文瓘為東臺侍郎以右肅機檢校太子中護譙人李敬玄為西臺侍郎並同東西臺三品先是同三品不入銜至是始入銜癸亥以雍州長史盧承慶為司刑太常伯承慶嘗考內外官有一官督運遭風失米承慶考之曰監運損糧考中下其人容色自若無言而退承慶重其雅量改注曰非力所及考中中既無喜容亦無愧詞又改曰寵辱不驚考中上三月丙戌東臺侍郎郝處俊同東西臺三品丁亥詔定明堂制度其基八觚其宇上圎覆以清陽玉葉其門牆階級䆫櫺楣柱枊楶枅栱皆法天地隂陽律曆之數詔下之後衆議猶未决又㑹飢饉竟不果立夏四月己酉朔上幸九成宫髙麗之民多離叛者敇徙髙麗戶三萬八千二百於江淮之南及山南京西諸州空曠之地留其貧弱者使守安東六月戊申朔日有食之秋八月丁未朔詔以十月幸凉州時隴右虛耗議者多以為未宜遊幸上聞之辛亥御延福殿召五品已上謂曰自古帝王莫不廵守故朕欲廵視逺俗若果爲不可何不面陳而退有後言何也自宰相以下莫敢對詳刑大夫來公敏獨進曰廵守雖帝王常事然今髙麗新平餘冦尚多西邊經略亦未息兵隴右戶口彫弊鑾輿所至供億百端誠為未易外間實有竊議但明制己行故羣臣不敢陳論耳上善其言為之罷西廵未幾擢公敏為黄門侍郎甲戌改瀚海都䕶府為安北都䕶府九月丁丑朔詔徙吐谷渾部落就凉州南山議者恐吐蕃侵暴使不能自存欲先發兵擊吐蕃右相閻立本以為去歳饑歉未可興師議乆不决竟不果徙庚寅大風海溢漂永嘉安固六千餘家冬十月丁巳車駕還京師十一月丁亥徙豫王旭輪為冀王更名輪司空太子太師英貞武公李勣寢疾上悉召其子弟在外者使歸侍疾上及太子所賜藥勣則餌之子弟為之迎醫皆不聽進曰吾本山東田夫遭值聖明致位三公年將八十豈非命邪脩短有期豈能復就醫工求活一旦忽謂其弟司衛少卿弼曰吾今日小愈可共置酒為樂於是子孫悉集酒闌謂弼曰吾自度必不起故欲與汝曹為别耳汝曹勿悲泣聽我約束武見房杜平生勤苦僅能立門户遭不肖子蕩覆無餘吾有此子孫今悉付汝葬畢汝即遷入我堂撫養孤㓜謹察視之其有志氣不倫交遊非類者皆先檛殺然後以聞自是不復更言十二月戊申薨上聞之悲泣葬日幸未央宫登樓望轜車慟哭起冡象隂山鐵山烏德鞬山以旌其破突厥薛延陀之功勣為將有謀善斷與人議事從善如流戰勝則歸功於下所得金帛悉散之將士故人思致死所向克㨗臨事選將必訾相其狀貌豐厚者遣之或問其故勣曰薄命之人不足與成功名閨門雍睦而嚴其姊嘗病勣已為僕射親為之煑粥風回􅅡其須􅁂姊曰僕妾幸多何自苦如是勣曰非為無人使令也顧姊老勣亦老雖欲乆為姊煑粥其可得乎勣常謂人我年十二三時為亡賴賊逢人則殺十四五為難當賊有所不愜則殺之十七八為佳賊臨陳乃殺人二十為大將用兵以救人死勣長子震早卒震子敬業襲爵時承平既乆選人益多是嵗司列少常伯裴行儉始與貟外郎張仁禕設長名姓歷牓引銓注之法又定州縣升降官資高下其後遂為永制無能革之者大略唐之選法取人以身言書判計資量勞而擬官始集而試觀其書判已試而銓察其身言已銓而注詢其便利已注而唱集衆告之然後類以為甲先簡僕射乃上門下給事中讀侍郎省侍中審之不當者駮下既審然後上聞主者受㫖奉行各給以符謂之告身兵部武選亦然課試之法以騎射及翹闗負米人有格限未至而能試文三篇謂之宏詞試判三條謂之㧞萃入等者得不限而授其黔中嶺南閩中州縣官不由吏部委都督選擇土人補授凡居官以年為考六品以下四考為滿咸亨元年春正月丁丑右相劉仁軌請致仕許之三月甲戌朔以旱赦天下改元丁丑改蓬萊宫為含元宫壬辰太子少師許敬宗請致仕許之敕突厥酋長子弟事東宫西臺舍人徐齊聃上䟽以為皇太子當引文學端良之士寘左右豈可使戎狄醜類入侍軒闥又奏齊獻公即陛下外祖雖子孫有犯豈應上延祖禰今周忠孝公廟甚修而齊獻公廟毁廢不審陛下何以垂示海内彰孝理之風上皆從之齊聃充容之弟也夏四月吐蕃陷西域十八州又與于闐襲􅀛兹撥換城陷之罷􅀛兹于闐焉耆踈勒四鎮辛亥以右衛大將軍薛仁貴為邏娑道行軍大揔管左衛貟外大將軍阿史那道眞左衛將軍郭待封副之以討吐蕃且援送吐谷渾還故地庚午上幸九成宫高麗酋長劒牟岑反立髙藏外孫安舜為主以左監門大將軍髙侃為東州道行軍揔管發兵討之安舜殺劒牟岑奔新羅六月壬寅朔日有食之秋八月丁巳車駕還京師郭待封先與薛仁貴並列及征吐蕃恥居其下仁貴所言待封多違之軍至大非川將趣烏海仁貴曰烏海險逺車行甚難輜重自隨難以趨利宜留二萬人為兩柵於大非嶺上輜重悉置柵内吾屬帥輕鋭倍道兼行掩其未僃破之必矣仁貴帥所部前行擊吐蕃於河口大破之斬獲甚衆進屯烏海以俟待封待封不用仁貴䇿將輜重徐進未至烏海遇吐蕃二十餘萬待封軍大敗還走悉弃輜重仁貴退屯大非川吐蕃相論欽陵將兵四十餘萬就擊之唐兵大敗死傷略盡仁貴待封與阿史那道眞並脫身免與欽陵約和而還敕大司憲樂彦瑋即軍中按其敗狀械送京師三人皆免死除名欽陵禄東賛之子也與弟賛婆悉多于勃論皆有才略禄東賛卒欽陵代之秉政三弟將兵居外鄰國畏之關中旱饑九月丁丑詔以明年正月幸東都甲申皇后母魯國忠烈夫人楊氏卒敕文武九品以上及外命婦並詣宅弔哭閏月癸卯皇后以乆旱請避位不許壬子加贈司徒周忠孝公武士彠為太尉太原王夫人為王妃甲寅以左相姜恪為涼州道行軍大揔管以禦吐蕃冬十月乙未太子右中護同東西臺三品趙仁本為左肅機罷政事庚寅詔官名皆復舊資治通鑑卷第二百一
