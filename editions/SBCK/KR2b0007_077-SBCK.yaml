body:
  text: 魏紀九光大荒落凡六年起柔兆困敦盡重高貴鄉公下甘露元年春正月漢姜維進位大将軍二月丙辰帝宴羣臣於太極東堂與諸儒論夏少康漢高祖優劣以少康為優夏四月庚戍賜大将軍昭衮冕之服赤舄副焉丙辰帝幸太學與諸儒論書易及禮諸儒莫能及帝常與中護軍司馬望侍中王沈散􅀐常侍裴秀黄門侍郎鍾會等講宴於東堂并屬文論特加禮異謂秀爲儒林丈人沈爲文籍先生帝性急請召欲速以望職在外特給追鋒車虎賁五人每有集會輙犇馳而至秀濳之子也六月丙午改元姜維在鍾提議者多以爲維力已竭未能更出安西將軍鄧艾曰洮西之敗非小失也士卒彫殘倉廪空虛百姓流離今以策言之彼有乘勝之埶我有虚弱之實一也彼上下相習五兵犀利我将易兵新器仗未復二也彼以船行吾以陸軍勞逸不同三也狄道隴西南安祁山各當有守彼専爲一我分爲四四也從南安隴西因食羌榖若趣祁山熟麥千頃爲之外倉五也賊有黠計其來必矣秋七月姜維復率衆出祁山聞鄧艾已有備乃回從董亭趣南安艾據武城山以拒之維與艾爭險不克其夜渡渭東行緣山趣上邽艾與戰於叚谷大破之以艾為鎭西將軍都督隴右諸軍事維與其鎭西大將軍胡濟期會上邽濟失期不至故敗士卒星散死者甚衆蜀人由是怨維維上書謝求自貶黜乃以衛將軍行大將軍事八月庚午詔司馬昭加號大都督奏事不名假黄鉞癸酉以太尉司馬孚為太傅九月以司徒高柔為太尉文欽說吳人以伐魏之利孫峻使欽與驃騎將軍吕據及車騎将軍劉纂鎮南將軍朱異前將軍唐咨自江都入淮泗以圖青徐峻餞之於石頭遇暴疾以後事付從父弟偏將軍綝丁亥峻卒呉人以綝為侍中武衛將軍都督中外諸軍事召吕據等還己丑吳大司馬吕岱卒年九十六始岱親近吳郡徐原慷慨有才志岱知其可成賜巾褠與共言論後遂薦抜官至侍御史原性忠壯好直言岱時有得失原輙諫爭又公論之人或以告岱岱歎曰是我所以貴德淵者也及原死岱哭之甚哀曰徐德淵吕岱之益友今不幸岱復於何聞過談者美之吕據聞孫綝代孫峻輔政大怒與諸督将連名共表薦􅅬胤為丞相綝更以胤為大司馬代吕岱駐武昌據引兵還使人報胤欲共廢綝冬十月丁未綝遣從兄憲将兵逆據於江都使中使敕文欽劉纂唐咨等共擊取棣又遣侍中左將軍華融中晝丞丁晏告喻􅅌宜速去意胤自以禍及因留融晏勒兵自衛召典軍楊崇將軍孫咨告以綝為亂迫融等使作書難綝綝不聽表言􅅌反許將軍劉丞以封爵使率兵騎攻圍􅅌􅅌又劫融等使詐為詔發兵融等不從皆殺之或勸􅅌引兵至蒼龍門將士見公出必委綝就公時夜已半􅅌恃與據期又難舉兵向宫乃約令部曲説吕侯已在近道故皆為胤盡死無離㪚者􅅌顔色不變談笑如常時大風比曉據不至綝兵大會遂殺􅅌及將士數十人夷胤三族己酉大赦改元太平或勸吕據犇魏者據曰吾恥為叛臣遂自殺以司空鄭沖為司徒左僕射盧毓為司空毓固讓驃􅀐將軍王昶光禄大夫王觀司􅀠校尉琅邪王祥詔不許祥性至孝繼母朱氏遇之無道祥愈恭謹朱氏子覽年數嵗每見祥被楚撻輙涕泣抱持母母以非理使祥覽輙與祥俱往及長娶妻母虐使祥妻覽妻亦趨而共之母患之為之少止祥漸有時譽母深疾之密使酖祥覽知之徑起取酒祥爭而不與母遽奪反之自後母賜祥饌覽輒先甞母懼覽致斃遂止漢末遭亂祥隱居三十餘年不應州郡之命母終毁瘁杖而後起徐州刺史吕䖍檄為别駕委以州事州界清靜政化大行時人歌之曰海沂之康實賴王祥邦國不空别駕之功十一月吳孫綝遷大將軍綝負貴倨傲多行無禮峻從弟憲嘗與誅諸葛恪峻厚遇之官至右将軍無難督平九官事綝遇憲薄於峻時憲怒與將軍王惇謀殺綝事泄綝殺惇憲服藥死二年春三月大梁成侯盧毓卒夏四月吳主臨正殿大赦始親政事孫綝表奏多見難問又科兵子弟十八已下十五以上三千餘人選大將子弟年少有勇力者使將之日於苑中教習曰吾立此軍欲與之俱長又數出中書視大帝時舊事問左右侍臣曰先帝數有特制今大將軍問事但令我書可邪嘗食生梅使黄門至中藏取蜜蜜中有䑕矢召問藏吏藏吏叩頭吳主曰黄門從爾求蜜邪吏曰向求實不敢與黄門不服吳主令破䑕矢矢中燥因大笑謂左右曰若矢先在蜜中中外當俱濕今外濕裏燥此必黄門所為也詰之果服左右莫不驚悚征東大將軍諸葛誕素與夏侯玄鄧颺等友善􅀇等死王淩毋丘儉相繼誅滅誕内不自安乃傾帑藏振施曲赦有罪以収衆心畜養揚州輕俠數千人以為死士因吳人欲向徐堨請十萬衆以守壽春又求臨淮築城以僃吳寇司馬昭初秉政長史賈充請遣參佐慰勞四征且觀其志昭遣充至淮南充見誕論説時事因曰洛中諸賢皆願禪代君以為如何誕厲聲曰卿非賈豫州子乎世受魏恩豈可欲以社稷輸人乎若洛中有難吾當死之充黙然還言於昭曰諸葛誕再在揚州得士衆心今召之必不來然反疾而禍小不召則反遲而禍大不如召之昭從之甲子詔以誕為司空召赴京師誕得詔書愈恐疑揚州刺史樂綝閒已遂殺綝斂淮南及淮北郡縣屯田口十餘萬官兵揚州新附勝兵者四五萬人聚榖足一年食為閉門自守之計遣長史吳綱將少子靚至吳稱臣請救并請以牙門子弟為質吳滕胤吕據之妻皆夏口督孫壹之妹也六月孫綝使鎭南将軍朱異自虎林將兵襲壹異至武昌壹將部曲來犇乙已詔拜壹車騎將軍交州牧封吳侯開府辟召儀同三司衮冕赤舄事從豐厚司馬昭奉帝及太后討諸葛誕吳綱至吳吳人大喜使將軍全懌全端唐咨王祚將三萬衆與文欽同救誕以誕為左都䕶假節大司徒驃騎將軍青州牧封壽春侯懌琮之子端其從子也六月甲子車駕次項司馬昭督諸軍二十六萬進屯丘頭以鎭南將軍王基行鎭東將軍都督揚豫諸軍事與安東將軍陳騫等圍壽春基始至圍城未合文欽全懌等從城東北因山乗險得將其衆突入城昭敕基歛軍堅壁基累求進討㑹吳朱異率三萬人進屯安豐為文欽外埶詔基引諸軍轉據北山基謂諸將曰今圍壘轉固兵馬向集但當精脩守僃以待越逸而更移兵守險使得放縱雖有智者不能善其後矣遂守便宜上䟽曰今與賊家對敵當不動如山若遷移依險人心搖蕩於埶大損諸軍並據深溝高壘衆心皆定不可傾動此御兵之要也書奏報聽於是基等四面合圍表裏再重塹壘甚峻文欽等數出犯圍逆擊走之司馬昭又使􅁬武將軍監青州諸軍事石苞督兖州刺史州泰徐州刺史胡質等簡鋭卒為游軍以僃外㓂泰擊破朱異於陽淵異走泰追之殺傷二千人秋七月吳大將軍綝大發卒出屯鑊里復遣朱異帥將軍丁奉黎斐等五人前解壽春之圍異留輜重於都陸進屯黎漿石苞州泰又擊破之太山太守胡烈以竒兵五千襲都陸盡焚異資糧異將餘兵食葛葉走歸孫綝綝使異更死戰異以士卒乏食不從綝命綝怒九月己巳綝斬異於鑊里辛未引兵還建業綝旣不能拔出諸葛誕而䘮敗士衆自戮名将由是吳人莫不怨之司馬昭曰異不得至壽春非其罪也而吳人殺之欲以謝壽春而堅誕意使其猶望救耳今當堅圍僃其越逸而多方以誤之乃縱反閒揚言吳救方至大軍乏食分遣羸􅍚就榖淮北埶不能乆誕等益寛恣食俄而城中乏糧外救不至將軍蔣班焦彞皆誕腹心謀主也言於誕曰朱異等以大衆來而不能進孫綝殺異而歸江東外以發兵為名内實坐湏成敗今宜及衆心尚固士卒思用并力决死攻其一面雖不能盡克猶有可全者空坐守死無為也文欽曰公今舉十餘萬之衆歸命於吳而欽與全端等皆同居死地父兄子弟盡在江表就孫綝不欲來主上及其親戚豈肯聽乎且中國無嵗無事軍民並疲今守我一年内變將起柰何捨此欲乗危徼倖乎班􅂜固勸之欽怒誕欲殺班彞二人懼十一月棄誕踰城來降全懌兄子輝儀在建業與其家内爭訟擕其母將部曲數十家來犇於是懌與兄子靖及全端弟翩緝皆將兵在壽春城中司馬昭用黄門侍郎鍾㑹䇿密為輝儀作書使輝儀所親信齎入城告懌等説吳中怒懌等不能拔壽春欲盡誅諸將家故逃來歸命十二月懌等率其衆數千人開門出降城中震懼不知所為詔拜懌平東將軍封臨湘侯端等封拜各有差漢姜維聞魏分關中兵以赴淮南欲乗虚向秦川率數萬人岀駱谷至沈嶺時長城積榖甚多而守兵少征西將軍都督雍凉諸軍事司馬望及安西將軍鄧艾進兵據之以拒維維壁於芒水數挑戰望艾不應是時維數出兵蜀人愁苦中散大夫譙周作仇國論以諷之曰或問往古能以弱勝彊者其術何如曰吾聞之處大無患者常多慢處小有憂者常思善多慢則生亂思善則生治理之常也故周文養民以少取多句踐䘏衆以弱斃彊此其術也或曰曩者項彊漢弱相與戰爭項羽與漢約分鴻溝各歸息民張良以為民志旣定則難動也率兵追羽終斃項氏豈必由文王之事乎曰當商周之際王侯世尊君臣乆固民習所専深根者難㧞據固者難遷當此之時雖漢祖安能杖劔鞭馬取天下乎及秦罷侯置守之後民疲秦役天下土崩或嵗改主或月易公鳥驚獸駭莫知所從於是豪彊並爭虎裂狼分疾􅅮者獲多遲後者見吞今我與彼皆傳國易世矣既非秦末鼎沸之時實有六國並據之埶故可為文王難為漢祖夫民之疲勞則騷擾之兆生上慢下暴則瓦解之形起諺曰射幸數跌不如審發是故智者不為小利移目不為意似改歩時可而後動數合而後舉故湯武之師不再戰而克誠重民勞而度時審也如遂極武黷征土崩埶生不幸遇難雖有智者將不能謀之矣三年春正月文欽謂諸葛誕曰蔣班焦彛謂我不能出而走全端全懌又率衆逆降此敵無備之時也可以戰矣誕及唐咨等皆以為然遂大為攻具晝夜五六日攻南圍欲决圍而岀圍上諸軍臨高發石車火箭逆燒破其攻具矢石雨下死傷蔽地血流盈壍復還城城内食轉竭出降者數萬口欽欲盡出北方人省食與吳人堅守誕不聽由是爭恨欽素與誕有隙徒以計合事急愈相疑欽見誕計事誕遂殺欽欽子鴦虎將兵在小城中聞欽死勒兵赴之衆不為用遂單走踰城出自歸於司馬昭軍吏請誅之昭曰欽之罪不容誅其子固應就戮然鴦虎以窮歸命且城未拔殺之是堅其心也乃赦鴦虎使將數百騎廵城呼曰文欽之子猶不見殺其餘何懼又表鴦虎皆為將軍賜爵闗内侯城内皆喜且日益饑困司馬昭身自臨圍見城上持弓者不發曰可攻矣乃四面進軍同時鼔譟登城二月乙酉克之誕窘急單馬將其麾下突小城欲出司馬胡奮部兵擊斬之夷其三族誕麾下數百人皆拱手為列不降每斬一人輙降之卒不變以至於盡吳將于詮曰大丈夫受命其主以兵救人旣不能克又束手於敵吾弗取也乃免胄冒陳而死唐咨王祚等皆降吳兵萬衆器仗山積司馬昭初圍壽春王基石苞等皆欲急攻之昭以為壽春城固而衆多攻之必力屈若有外㓂表裏受敵此危道也今三叛相聚於孤城之中天其或者使同就戮吾當以全䇿縻之但堅守三面若吳賊陸道而來軍糧必少吾以游兵輕騎絕其轉輸可不戰而破也吳賊破欽等必成擒矣乃命諸軍按甲以守之卒不煩攻而破議者又以為淮南仍為叛逆吳兵室家在江南不可縱宜悉坑之昭曰古之用兵全國為上戮其元惡而已吳兵就得亡還適可以示中國之大度耳一無所殺分布三河近郡以安處之拜唐咨安逺將軍其餘禆將咸假位號衆皆恱服其淮南將士吏民為誕所脅略者皆赦之聽文鴦兄弟收斂父䘮給其車牛致葬舊墓昭遺王基書曰初議者云云求移者甚衆時未臨履亦謂宜然將軍深筭利害獨秉固志上違詔命下拒衆議終至制敵禽賊雖古人所述不是過也昭欲遣諸軍輕兵深入招迎唐咨等子弟因釁有滅吳之埶王基諫曰昔諸葛恪乗東關之勝竭江表之兵以圍新城城既不㧞而衆死者大半姜維因洮西之利輕兵深入糧餉不繼軍覆上邽夫大捷之後上下輕敵輕敵則慮難不深今賊新敗於外又内患未弭是其脩僃設慮之時也且兵出踰年人有歸志今俘馘十萬罪人斯得自歴代征伐未有全兵獨克如今之盛者也武皇帝克􅀽紹於官渡自以所獲已多不復追犇懼挫威也昭乃止以基為征東將軍都督揚州諸軍事進封東武侯習鑿齒曰君子謂司馬大將軍於是役也可謂能以德攻矣夫建業者異道各有所尚而不能兼并也故窮武之雄斃於不仁存義之國䘮於懦退今一征而禽三叛大虜吳衆席卷淮浦俘馘十萬可謂壮矣而未及安坐賞王基之功種惠吳人結異類之情寵鴦葬欽忘疇昔之隙不咎誕衆使揚土懐愧功高而人樂其成業廣而敵懐其德武昭既敷文筭又洽推此道也天下其孰能當之哉司馬昭之克壽春鍾㑹謀畫居多昭親待日隆委以腹心之任時人比之子房漢姜維聞諸葛誕死復還成都復拜大將軍夏五月詔以司馬昭為相國封晉公食邑八郡加九錫昭前後九讓乃止秋七月吳主封故齊王奮為章安侯八月以驃騎將軍王昶為司空詔以關内侯王祥為三老鄭小同為五更帝率羣臣幸太學行養老乞言之禮小同􅀇之孫也吳孫綝以吳主親覽政事多所難問甚懼返自鑊里遂稱疾不朝使弟威遠將軍據入倉龍門宿衛武衛將軍恩偏將軍幹長水校尉闓分屯諸營欲以自固吳主惡之乃推朱公主死意全公主懼曰我實不知皆朱據二子熊損所白是時熊為虎林督損為外部督吳主皆殺之損妻即孫峻妹也綝諫不從由是益懼呉主隂與全公主及將軍劉丞謀誅綝全后父尚為太常衛將軍吳主謂尚子黄門侍郎紀曰孫綝專埶輕小於孤孤前敕之使速上岸為唐咨等作援而留湖中不上岸一歩又委罪於朱異擅殺功臣不先表聞築第橋南不復朝見此為自在無復所畏不可乆忍今規取之卿父作中軍都督使密嚴整士馬孤當自出臨橋率宿衛虎騎左右無難一時圍之作版詔敕綝所領皆解散不得舉手正爾自當得之卿去但當使密耳卿宣詔卿父勿令卿母知之女人既不曉大事且綝同堂姊邂逅漏泄誤孤非小也紀承詔以告尚尚無逺慮以語紀母母使人密語綝九月戊午綝夜以兵襲尚執之遣弟恩殺劉承於蒼龍門外比明遂圍宫吳主大怒上馬帶鞬執弓欲出曰孤大皇帝適子在位已五年誰敢不從者侍中近臣及乳母共牽攀止之不得出歎宅不食罵全后曰爾父憒憒敗我大事又遣呼紀紀曰臣父奉詔不謹負上無面目復見因自殺綝使光禄勲孟宗告太廟廢吳主為㑹稽王召羣臣議曰少帝荒病昬亂不可以處大位承宗廟已告先帝廢之諸君若有不同者下異議皆震怖曰唯將軍令綝遣中書郎李崇奪吳主璽綬以吳主罪班告逺近尚書桓彛不肯署名綝怒殺之典軍施正勸綝迎立琅邪王休綝從之己未綝使宗正楷與中書郎董朝迎琅邪王於㑹稽遣將軍孫耽送㑹稽王亮之國亮時年十六徙全尚於零陵尋追殺之遷全公主於豫章冬十月戊午琅邪王行至曲阿有老公􅃒王叩頭曰事乆變生天下喁喁願陛下速行王善之是日進及布塞亭孫綝以琅邪王未至欲入居宫中召百官㑹議皆惶怖失色徒唯唯而已選曹郎虞汜曰明公為國伊周處將相之任擅廢立之威將上安宗廟下惠百姓大小踴躍自以伊霍復見今迎王未至而始入宮如是羣下搖蕩衆聽疑惑非所以永終忠孝揚名後世也綝不懌而止汜翻之子也綝命弟恩行丞相事率百僚以乘輿法駕迎琅邪王於永昌亭築宫以武帳為便殿設御坐己卯王至便殿止東廂孫恩奉上璽符王三讓乃受羣臣以次奉引王就乗輿百官陪位綝以兵千人迎於半野拜于道側王下車荅拜即日御正殿大赦改元永安孫綝稱草莽臣詣闕上書上印綬節􅃏求避賢路吳主引見慰諭下詔以綝為丞相荆州牧増邑五縣以恩為御史大夫衛將軍中軍督封縣侯孫據幹闓皆拜將軍封侯又以長水校尉張布為輔義將軍封永康侯先是丹陽太守李衡數以事侵琅邪王其妻習氏諫之衡不聽琅邪王上書乞徙他郡詔徙㑹稽及琅邪王即位李衡憂懼謂妻曰不用卿言以至於此吾欲犇魏何如妻曰不可君本庶民耳先帝相抜過重既數作無禮而復逆自猜嫌逃叛求活以此北歸何面目見中國人乎衡曰計何所岀妻曰琅邪王素好善慕名方欲自顯於天下終不以私嫌殺君明矣可自囚詣獄表列前失顯求受罪如此乃當逆見優饒非但直活而已衡從之吳主詔曰丹陽太守李衡以往事之嫌自拘司敗夫射鉤斬祛在君為君其遣衡還郡勿令自疑又加威逺將軍授以棨㦸己丑吳主封故南陽王和子皓為烏程侯羣臣奏立皇后太子吳主曰朕以寡徳奉承洪業涖事日淺恩澤未敷后妃之號嗣子之位非所急也有司固請吳主不許孫綝奉牛酒詣吳主吳主不受齎詣左將軍張布酒酣出怨言曰初廢少主時多勸吾自為之者吾以陛下賢明故迎之帝非我不立今上禮見拒是與凡臣無異當復改圖耳布以告吳主吳主衘之恐其有變數加賞賜戊戍吳主詔曰大將軍掌中外諸軍事事統煩多其加衛將軍御史大夫恩侍中與大將軍分省諸事或有告綝懷怨侮上欲圖反者吳主執以付綝綝殺之由是益懼因孟宗求出屯武昌吳主許之綝盡敕所督中營精兵萬餘人皆令裝載又取武庫兵器吳主咸令給與綝求中書兩郎典知荆州諸軍事主者奏中書不應外出吳主特聽之其所請求一無違者將軍魏邈説吳主曰綝居外必有變武衛士施朔又告綝謀反吳主將討綝密問輔義將軍張布布曰左將軍丁奉雖不能吏書而計略過人能斷大事吳主召奉告之且問以計畫奉曰丞相兄弟支黨甚盛恐人心不同不可卒制可因臘㑹有陛兵以誅之吳主從之十二月丁卯建業中謡言明㑹有變綝聞之不恱夜大風發屋揚沙綝益懼戊辰臘㑹綝稱疾不至吳主彊起之使者十餘輩綝不得已將入衆止焉綝曰國家屢有命不可辭可豫整兵令府内起火因是可得速還遂入尋而火起綝求出吳主曰外兵自多不足煩丞相也綝起離席奉布目左右縛之綝叩頭曰願徙交州吳主曰卿何以不徙滕胤呂據於交州乎綝復曰願没為官奴吳主曰卿何不以􅅌據為奴乎遂斬之以綝首令其衆曰諸與綝同謀者皆赦之放仗者五千人孫闓乗船欲降北追殺之夷綝三族發孫峻棺取其印綬斵其木而埋之己巳吳主以張布為中軍督改葬諸葛恪􅅬􅅌呂據等其罹恪等事逺徙者一切召還朝臣有乞為諸葛恪立碑者呉主詔曰盛夏出軍士卒傷損無尺寸之功不可謂能受託孤之任死於豎子之手不可謂智遂寑初漢昭烈留魏延鎮漢中皆實兵諸圍以禦外敵敵若來攻使不得入及興埶之役王平捍拒曹爽皆承此制及姜維用事建議以為錯守諸圍適可禦敵不獲大利不若使聞敵至諸圍皆斂兵聚榖退就漢樂二城聽敵入平重關頭鎮守以捍之令游軍旁出以伺其虚敵攻關不克野無散榖千里運糧自然疲乏引退之日然後諸城並出與游軍并力傳之此殄敵之術也於是漢主令督漢中胡濟却住漢夀監軍王含守樂城䕶軍蔣斌守漢城四年春正月黄龍二見寧陵井中先是頓丘冠軍陽夏井中屢有龍見羣臣以為吉祥帝曰龍者君徳也上不在天下不在田而數屈於井非嘉兆也作潛龍詩以自諷司馬昭見而惡之夏六月京陵穆侯王昶卒漢主封其子諶為北地王恂為新興王䖍為上黨王尚書令陳祗以巧佞有寵於漢主姜維雖位在祗上而多率衆在外希親朝政權任不及祗秋八月丙子祗卒漢主以僕射義陽董厥為尚書令尚書諸葛瞻為僕射冬十一月車騎將軍孫壹為婢所殺是嵗以王基為征南將軍都督荆州諸軍事景元元年春正月朔日有食之夏四月詔有司率遵前命復進大將軍昭位相國封晉公加九錫帝見威權日去不勝其忿五月己丑召侍中王沈尚書王經散騎常侍王業謂曰司馬昭之心路人所知也吾不能坐受廢辱今日當與卿自出討之王經曰昔魯昭公不忍季氏敗走失國為天下笑今權在其門為日乆矣朝廷四方皆為之致死不顧逆順之理非一日也且宿衛空闕兵甲寡弱陛下何所資用而一旦如此無乃欲除疾而更深之邪禍殆不測宜見重詳帝乃出懷中黄素詔投地曰行之決矣正使死何懼况不必死邪於是入白太后沈業犇走告昭呼經欲與俱經不從帝遂㧞劔升輦率殿中宿衛蒼頭官僮鼓譟而出昭弟屯騎校尉伷遇帝於東止車門左右呵之伷衆犇走中䕶軍賈充自外入逆與帝戰於南闕下帝自用劔衆欲退騎督成倅弟太子舍人濟問充曰事急矣當云何充曰司馬公畜養汝等正為今日今日之事無所問也濟即抽戈前刺帝殞于車下昭聞之大驚自投於地太傅孚犇往枕帝股而哭甚哀曰殺陛下者臣之罪也昭入殿中召羣臣㑹議尚書左僕射陳泰不至昭使其舅尚書荀顗召之泰曰世之論者以泰方於舅今舅不如泰也子弟内外咸共逼之乃入見昭悲慟昭亦對之泣曰􅀇伯卿何以處我泰曰獨有斬賈充少可以謝天下耳昭久之曰卿更思其次泰曰泰言惟有進於此不知其次昭乃不復更言顗彧之子也太后下令罪狀高貴鄉公廢為庶人葬以民禮収王經及其家屬付廷尉經謝其母母顔色不變笑而應曰人誰不死正恐不得其所以此并命何恨之有及就誅故吏向雄哭之哀動一市王沈以功封安平侯庚寅太傅孚等上言請以王禮葬高貴鄉公太后許之使中䕶軍司馬炎迎燕王宇之子常道鄉公璜於鄴以為明帝嗣炎昭之子也辛夘羣公奏太后自今令書皆稱詔制癸卯司馬昭固讓相國晉公九錫之命太后詔許之戊申昭上言成濟兄弟大逆不道夷其族六月癸丑太后詔常道鄉公更名奐甲寅常道鄉公入洛陽是日即皇帝位年十五大赦改元丙辰詔進司馬昭爵位九錫如前昭固讓乃止癸亥以尚書右僕射王觀為司空吳都尉嚴密建議作浦里塘羣臣皆以為難唯衛將軍陳留濮陽興以為可成遂㑹諸軍民就作功費不可勝數士卒多死亡民大愁怨㑹稽郡謠言王亮當還為天子而亮宫人告亮使巫禱祠有惡言有司以聞吳主黜亮為候官侯遣之國亮自殺衛送者皆伏罪冬十月陽鄉肅侯王觀卒十一月詔尊燕王待以殊禮十二月甲午以司隷校尉王祥為司空尚書王沈為豫州刺史初到下敎敕屬城及士民曰若有能陳長吏可否説百姓所患者給榖五百斛若説刺史得失朝政寛猛者給榖千斛主簿陳廞禇䂮入白曰敎㫖思聞苦言示以勸賞竊恐拘介之士或憚賞而不言貪昧之人將慕利而妄舉茍不合宜賞不虛行則逺聽者未知當否之所在徒見言之不用謂設而不行愚以告下之事可少須後沈又敎曰夫興益於上受分於下斯乃君子之操何不言之有禇䂮復白曰堯舜周公所以能致忠諫者以其􅅃誠之心著也冰炭不言而冷熱之質自明者以其有實也若好忠直如冰炭之自然則諤諤之言將不求而自至若德不足以配唐虞明不足以並周公實不可以同冰炭雖懸重賞忠諫之言未可致也沈乃止二年春三月襄陽太守胡烈表言吳将鄧由李光等十八屯同謀歸化遣使送質任欲令郡兵臨江迎拔詔王基部分諸軍徑造沮水以迎之若由等如期到者便當因此震蕩江表基馳驛遺司馬昭書説由等可疑之狀且當清澄未宜便舉重兵深入應之又曰夷陵東西道皆險陿竹木叢蔚卒有要害弩馬不陳今者筋角濡弱水潦方降廢盛農之務徼難必之利此事之危者也姜維之趣上邽文欽之據夀春皆深入求利以取覆没此近事之鑒戒也嘉平已來累有内難當今之宜當務鎮安社稷撫寧上下力農務本懷柔百姓未宜動衆以求外利也昭累得基書意狐疑敕諸軍已上道者且權停住所在湏􅀱節度基復遺昭書曰昔漢祖納酈生之説欲封六國寤張良之謀而趣銷印基謀慮淺短誠不及留侯亦懼襄陽有食其之謬昭於是罷兵報基書曰凡處事者多曲相從順鮮能確然共盡理實誠感忠愛每見規示輙依來㫖已罷軍嚴既而由等果不降烈奮之弟也秋八月甲寅復命司馬昭進爵位如前不受冬十月漢主以董厥為輔國大將軍諸葛瞻為都䕶衛將軍共平尚書事以侍中樊建為尚書令時中常侍黄皓用事厥瞻皆不能矯正士大夫多附之唯建不與皓往來祕書令郤正乆在内職與皓比屋周旋三十餘年澹然自守以書自娛既不為皓所愛亦不為皓所憎故官不過六百石而亦不罹其禍漢主弟甘陵王永憎皓皓譖之使十年不得朝見吳主使五官中郎將薛珝聘于漢及還吳主問漢政得失對曰主闇而不知其過臣下容身以求免罪入其朝不聞直言經其野民皆菜色臣聞燕雀處堂子母相樂自以為至安也突決棟焚而燕雀怡然不知禍之將及其是之謂乎珝綜之子也是嵗鮮卑索頭部大人拓䟦力微始遣其子沙漠汗入貢因留為質力微之先世居北荒不交南夏至可汗毛始彊大統國三十六大姓九十九後五世至可汗推寅南遷大澤又七世至可汗鄰使其兄弟七人及族人乙旃氏車惃氏分統部衆為十族鄰老以位授其子詰汾使南遷遂居匈奴故地詰汾卒力微立復徙居定襄之盛樂部衆浸盛諸部皆畏服之資治通鑑卷第七十七
