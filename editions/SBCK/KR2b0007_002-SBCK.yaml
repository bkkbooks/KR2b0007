body:
  text: 秦獻公薨子孝公立孝公生二十一年矣是時河山以東彊國六淮泗之間小國十餘楚魏與秦接界魏築長城自鄭濵洛以北有上郡楚自漢中南有巴黔中皆以夷翟遇秦擯斥之不得與中國之㑹盟於是孝公發憤布德修政欲以彊秦八年孝公令國中曰昔我穆公自岐雍之間修德行武東平􅀳亂以河為界西霸戎翟廣地千里天子致伯諸矦畢賀為後丗開業甚光美會往者厲躁簡公出子之不寜國家内憂未遑外事三􅀳攻奪我先君河西地醜莫大焉獻公即位鎭撫邊境徙治櫟陽且欲東伐復穆公之故地修穆公之政令寡人思念先君之意常痛於心賔客羣臣有能出奇計彊秦者吾且尊官與之分土於是衞公孫鞅聞是令下乃西入秦公孫鞅者衞之庶孫也好刑名之學事魏相公孫痤痤知其賢未及進會病魏惠王往問之曰公叔病有如不可諱將柰社稷何公叔曰痤之中庶子衞鞅年雖少有竒才願君舉國而聽之王嘿然公叔曰君即不聽用鞅必殺之無令出境王許諾而去公叔召鞅謝曰吾先君而後臣故先為君謀後以告子子必速行矣鞅曰君不能用子之言任臣又安能用子之言殺臣乎卒不去王出謂左右曰公叔病甚悲乎欲令寡人以國聽衞鞅也旣又勸寡人殺之豈不悖哉衞鞅旣至秦因嬖臣景監以求見孝公說以富國彊兵之術公大悅與議國事十年衞鞅欲變灋秦人不悅衞鞅言於秦孝公曰夫民不可與慮始而可與樂成論至德者不和於俗成大功者不謀於衆是以聖人茍可以彊國不灋其故甘龍曰不然縁灋而治者吏習而民安之衞鞅曰常人安於故俗學者溺於所聞以此兩者居官守灋可也非所與論於灋之外也智者作灋愚者制焉賢者更禮不肖者拘焉公曰善以衞鞅為左庶長卒定變灋之令令民為什伍而相收司連坐告姦者與斬敵首同賞不告姦者與降敵同罰有軍功者各以率受上爵為私鬭者各以輕重被刑大小僇力本業耕織致粟帛多者復其身事末利及怠而貧者舉以為收孥宗室非有軍功論不得為屬籍明尊卑爵秩等級各以差次名田宅臣妾衣服有功者顯榮無功者雖富無所芬華令既具未布恐民之不信乃立三丈之木於國都市南門募民有能徙置北門者予十金民怪之莫敢徙復曰能徙者予五十金有一人徙之􅂺予五十金乃下令令行朞年秦民之國都言新令之不便者以千數於是太子犯灋衞鞅曰灋之不行自上犯之太子君嗣也不可施刑刑其傅公子䖍黥其師公孫賈明日秦人皆趨令行之十年秦國道不拾遺山無盗賊民勇於公戰怯於私鬭鄉邑大治秦民初言令不便者有來言令便衞鞅曰此皆亂灋之民也盡遷之於邊其後民莫敢議令臣光曰夫信者人君之大寶也國保於民民保於信非信無以使民非民無以守國是故古之王者不欺四海霸者不欺四鄰善為國者不欺其民善為家者不欺其親不善者反之欺其鄰國欺其百姓甚者欺其兄弟欺其父子上不信下下不信上上下離心以至於敗所利不能藥其所傷所獲不能補其所亡豈不哀哉昔齊􅁊公不背曹沫之盟晉文公不貪伐原之利魏文矦不棄虞人之期秦孝公不廢徙木之賞此四君者道非粹白而商君尤稱刻薄又處戰攻之丗天下趨於詐力猶且不敢忘信以畜其民況為四海治平之政者哉韓懿矦薨子昭矦立十一年秦敗韓師於西山十二年魏趙㑹于鄗十三年趙燕㑹于阿趙齊宋㑹于平陸十四年齊威王魏惠王㑹田於郊惠王曰齊亦有寶乎威王曰無有惠王曰寡人國雖小尚有徑寸之珠照車前後各十二乗者十枚豈以齊大國而無寶乎威王曰寡人之所以為寶者與王異吾臣有檀子者使守南城則楚人不敢為宼泗上十二諸矦皆來朝吾臣有盼子者使守高唐則趙人不敢東漁於河吾吏有黔夫者使守徐州則燕人祭北門趙人祭西門徙而從者七千餘家吾臣有種首者使備盗賊則道不拾遺此四臣者將照千里豈特十二乗哉惠王有慙色秦孝公魏惠王㑹于杜平魯共公薨子康公毛立十五年秦敗魏師于元里斬首七千級取少梁魏惠王伐趙圍邯鄲楚王使景舎救趙十六年齊威王使田忌救趙初孫臏與龎㳙俱學兵灋龐㳙仕魏為將軍自以能不及孫臏乃召之至則以灋斷其兩足而黥之欲使終身廢棄齊使者至魏孫臏以刑徒隂見說齊使者齊使者竊載與之齊田忌善而客待之進於威王威王問兵灋遂以為師於是威王謀救趙以孫臏為將辭以刑餘之人不可乃以田忌為將而孫子為師居輜車中坐為計謀田忌欲引兵之趙孫子曰夫解雜亂紛紏者不控拳救鬭者不搏撠批亢擣虚形格勢禁則自為解耳今梁趙相攻輕兵銳卒必竭於外老弱疲於内子不若引兵疾走魏都據其街路衝其方虚彼必釋趙而自救是我一舉解趙之圍而收弊於魏也田忌從之十月邯鄲降魏魏師還與齊戰于桂陵魏師大敗韓伐東周取陵觀廪丘楚昭奚恤為相江乙言於楚王曰人有愛其狗者狗甞溺井其鄰人見欲入言之狗當門而噬之今昭奚恤常惡臣之見亦猶是也且人有好揚人之善者王曰此君子也近之好揚人之惡者王曰此小人也逺之然則且有子弑其父臣弑其主者而王終已不知也何者以王好聞人之美而惡聞人惡也王曰善寡人願兩聞之十七年秦大良造衞鞅伐魏諸矦圍魏襄陵十八年秦衞鞅圍魏固陽降之魏人歸趙邯鄲與趙盟漳水上韓昭矦以申不害為相申不害者鄭之賤臣也學黄老刑名以干昭矦昭矦用為相内修政敎外應諸矦十五年終申子之身國治兵彊申子甞請仕其從兄昭矦不許申子有怨色昭矦曰所為學於子者欲以治國也今將聽子之謁而廢子之術乎已其行子之術而廢子之請乎子甞敎寡人修功勞視次第今有所私求我將奚聽乎申子乃辟舎請罪曰君眞其人也昭矦有弊袴命藏之侍者曰君亦不仁者矣不賜左右而藏之昭矦曰吾聞明主愛一嚬一咲嚬有為嚬咲有為咲今袴豈特嚬咲哉吾必待有功者十九年秦商鞅築冀闕宫庭於咸陽徙都之令民父子兄弟同室内息者為禁并諸小鄉聚集為一縣縣置令丞凡三十一縣廢井田開阡陌平斗桶權衡丈尺秦魏遇于彤趙成矦薨公子緤與太子爭立緤敗奔韓二十一年秦商鞅更為賦稅灋行之二十二年趙公子范襲邯鄲不勝而死二十三年齊殺其大夫牟魯康公薨子景公偃立衞更貶號曰矦服屬三晉二十五年諸矦會于京師二十六年王致伯于秦諸矦皆賀秦秦孝公使公子少官帥師㑹諸矦于逢澤以朝王二十八年魏龎㳙伐韓韓請救於齊齊威王召大臣而謀曰蚤救孰與晚救成矦曰不如勿救田忌曰弗救則韓且折而入於魏不如蚤救之孫臏曰夫韓魏之兵未弊而救之是吾代韓受魏之兵顧反聽命於韓也且魏有破國之志韓見亡必東面而愬於齊矣吾因深結韓之親而晚承魏之弊則可受重利而得尊名也王曰善乃隂許韓使而遣之韓因恃齊五戰不勝而東委國於齊齊因起兵使田忌田嬰田盼將之孫子為師以救韓直走魏都龎㳙聞之去韓而歸魏人大發兵以太子申為將以禦齊師孫子謂田忌曰彼三晉之兵素悍勇而輕齊齊號為怯善戰者因其勢而利導之兵灋百里而趣利者蹶上將五十里而趣利者軍半至乃使齊軍入魏地為十萬竈明日為五萬竈又明日為二萬竈龎㳙行三日大喜曰我固知齊軍怯入吾地三日士卒亡者過半矣乃棄其歩軍與其輕銳倍日并行逐之孫子度其行暮當至馬陵馬陵道陿而旁多阻隘可伏兵乃斫大樹白而書之曰龎㳙死此樹下於是令齊師善射者萬弩夾道而伏期曰暮見火舉而俱發龎㳙果夜至斫木下見白書以火燭之讀未畢萬弩俱發魏師大亂相失龎㳙自知智窮兵敗乃自剄曰遂成豎子之名齊因乗勝大破魏師虜太子申成矦鄒忌惡田忌使人操十金卜於市曰我田忌之人也我為將三戰三勝欲行大事可乎卜者出因使人執之田忌不能自明率其徒攻臨淄求成矦不克出奔楚二十九年衞鞅言於秦孝公曰秦之與魏譬若人之有腹心之疾非魏并秦秦即并魏何者魏居嶺阨之西都安邑與秦界河而獨擅山東之利利則西侵秦病則東收地今以君之賢聖國賴以盛而魏往年大破於齊諸矦畔之可因此時伐魏魏不支秦必東徙然後秦據河山之固東鄉以制諸矦此帝王之業也公從之使衞鞅將兵伐魏魏使公子卬將而禦之軍既相距衞鞅遺公子卬書曰吾始與公子驩今俱為兩國將不忍相攻可與公子面相見盟樂飲而罷兵以安秦魏之民公子卬以為然乃相與會盟已飲而衞鞅伏甲士襲虜公子卬因攻魏師大破之魏惠王恐使使獻河西之地於秦以和因去安邑徙都大梁乃嘆曰吾恨不用公叔之言秦封衞鞅商於十五邑號曰商君齊趙伐魏楚宣王薨子威王商立三十一年秦孝公薨子惠文王立公子䖍之徒告商君欲反發吏捕之商君亡之魏魏人不受復内之秦商君乃與其徒之商於發兵北擊鄭秦人攻商君殺之車裂以徇盡滅其家初商君相秦用灋嚴酷甞臨渭論囚渭水盡赤為相十年人多怨之趙良見商君商君問曰子觀我治秦孰與五羖大夫賢趙良曰千人之諾諾不如一士之諤諤僕請終日正言而無誅可乎商君曰諾趙良曰五羖大夫荆之鄙人也穆公舉之牛口之下而加之百姓之上秦國莫敢望焉相秦六七年而東伐鄭三置晉君一救荆禍其為相也勞不坐乗暑不張蓋行於國中不從車乗不操干戈五羖大夫死秦國男女流涕童子不歌謡舂者不相杵今君之見也因嬖人景監以為主其從政也凌轢公族殘傷百姓公子䖍杜門不出已八年矣君又殺祝懽而黥公孫賈詩曰得人者興失人者崩此數者非所以得人也君之出也後車載甲多力而駢脅者為驂乗持矛而操闟㦸者旁車而趨此一物不具君固不出書曰恃德者昌恃力者亡此數者非恃德也君之危若朝露而尚貪商於之富寵秦國之政畜百姓之怨秦王一旦􅂢賔客而不立朝秦國之所以收君者豈其微哉商君弗從居五月而難作三十二年韓申不害卒三十三年宋太丘社亡鄒人孟軻見魏惠王王曰叟不逺千里而來亦有以利吾國乎孟子曰君何必曰利仁義而已矣君曰何以利吾國大夫曰何以利吾家士庶人曰何以利吾身上下交征利而國危矣未有仁而遺其親者也未有義而後其君者也王曰善初孟子師子思甞問牧民之道何先子思曰先利之孟子曰君子所以教民亦仁義而已矣何必利子思曰仁義固所以利之也上不仁則下不得其所上不義則下樂為詐也此為不利大矣故易曰利者義之和也又曰利用安身以崇德也此皆利之大者也臣光曰子思孟子之言一也夫唯仁者為知仁義之利不仁者不知也故孟子之對梁王直以仁義而不及利者所與言之人異故也三十四年秦伐韓拔宜陽三十五年齊王魏王㑹于徐州以相王韓昭矦作髙門屈宜臼曰君必不出此門何也不時吾所謂時者非時日也夫人固有利不利時往者君甞利矣不作高門前年秦抜宜陽今年旱君不以此時恤民之急而顧益奢此所謂時詘舉贏者也故曰不時越王無彊伐齊齊王使人說之以伐齊不如伐楚之利越王遂伐楚楚人大敗之乗勝盡取吳故地東至于浙江越以此散諸公族爭立或為王或為君濵於海上朝服於楚三十六年楚王伐齊圍徐州韓高門成昭矦薨子宣惠王立初洛陽人蘇秦說秦王以兼天下之術秦王不用其言蘇秦乃去說燕文公曰燕之所以不犯宼被甲兵者以趙之為蔽其南也且秦之攻燕也戰於千里之外趙之攻燕也戰於百里之内夫不憂百里之患而重千里之外計無過於此者願大王與趙從親天下為一則燕國必無患矣文公從之資蘇秦車馬以說趙肅矦曰當今之時山東之建國莫彊於趙秦之所害亦莫如趙然而秦不敢舉兵伐趙者畏韓魏之議其後也秦之攻韓魏也無有名山大川之限稍蠶食之傅國都而止韓魏不能支秦必入臣於秦秦無韓魏之規則禍中於趙矣臣以天下之圖案之諸矦之地五倍於秦料度諸侯之卒十倍於秦六國為一并力西鄉而攻秦秦必破矣夫衡人者皆欲割諸矦之地以與秦秦成則其身富榮國被秦患而不與其憂是故衡人日夜務以秦􅁠恐愒諸矦以求割地故願大王熟計之也竊為大王計莫如一韓魏齊楚燕趙爲從親以畔秦令天下之將相㑹於洹水之上通質結盟約曰秦攻一國五國各出銳師或橈秦或救之有不如約者五國共伐之諸矦從親以擯秦秦甲必不敢出於函谷以害山東矣肅矦大說厚待蘇秦尊寵賜賚之以約於諸矦㑹秦使犀首伐魏大敗其師四萬餘人禽將龍賈取雕隂且欲東兵蘇秦恐秦兵至趙而敗從約念莫可使用於秦者乃激怒張儀入之於秦張儀者魏人與蘇秦俱事鬼谷先生學縱横之術蘇秦自以為不及也儀游諸矦無所遇困於楚蘇秦故召而辱之儀怒念諸矦獨秦能苦趙遂入秦蘇秦隂遣其舎人齎金幣資儀儀得見秦王秦王說之以為客卿舎人辭去曰蘇君憂秦伐趙敗從約以為非君莫能得秦柄故激怒君使臣隂奉給君資盡蘇君之計謀也張儀曰嗟乎此在吾術中而不悟吾不及蘇君明矣為吾謝蘇君蘇君之時儀何敢言於是蘇秦說韓宣惠王曰韓地方九百餘里帶甲數十萬天下之彊弓勁弩利劒皆從韓出韓卒超足而射百發不暇止以韓卒之勇被堅甲蹠勁弩帶利劒一人當百不足言也大王事秦秦必求宜陽成臯今兹効之明年又復求割地與則無地以給之不與則棄前功受後禍且大王之地有盡而秦之求無己以有盡之地逆無己之求此所謂市怨結禍者也不戰而地已削矣鄙諺曰寜為雞口無爲牛後夫以大王之賢挾彊韓之兵而有牛後之名臣竊為大王羞之韓王從其言蘇秦說魏王曰大王之地方千里地名雖小然而田舎廬廡之數曽無所芻牧人民之衆車馬之多日夜行不絶輷輷殷殷若有三軍之衆臣竊量大王之國不下楚今竊聞大王之卒武士二十萬蒼頭二十萬奮擊二十萬厮徒十萬車六百乗􅀐五千匹乃聽於羣臣之說而欲臣事秦願大王熟察之故敝邑趙王使臣効愚計奉明約在大王之詔詔之魏王聽之蘇秦說齊王曰齊四塞之國地方二千餘里帶甲數十萬粟如丘山三軍之良五家之兵進如鋒矢戰如雷霆解如風雨即有軍役未甞倍泰山絶清河渉渤海也臨葘之中七萬户臣竊度之不下戸三男子不待發於逺縣而臨葘之卒固已二十一萬矣臨葘甚富而實其民無不鬭雞走狗六博闒鞠臨葘之塗車轂擊人肩摩連衽成帷揮汗成雨夫韓魏之所以重畏秦者為與秦接境壤也兵出而相當不十日而戰勝存亡之機決矣韓魏戰而勝秦則兵半折四境不守戰而不勝則國已危亡隨其後是故韓魏之所以重與秦戰而輕為之臣也今秦之攻齊則不然倍韓魏之地過衞陽晉之道經乎亢父之險車不得方􅁤􅀐不得比行百人守險千人不敢過也秦雖欲深入則狼顧恐韓魏之議其後也是故恫疑虚喝驕矜而不敢進則秦之不能害齊亦明矣夫不深料秦之無奈齊何而欲西面而事之是羣臣之計過也今無臣事秦之名而有彊國之實臣是故願大王少留意計之齊王許之乃西南說楚威王曰楚天下之彊國也地方六千餘里帶甲百萬車千乗􅀐萬匹粟支十年此霸王之資也秦之所害莫如楚楚彊則秦弱秦彊則楚弱其勢不兩立故爲大王計莫如從親以孤秦臣請令山東之國奉四時之獻以承大王之明詔委社稷奉宗廟練士厲兵在大王之所用之故從親則諸矦割地以事楚衡合則楚割地以事秦此兩䇿者相去逺矣大王何居焉楚王亦許之於是蘇秦爲從約長并相六國北報趙車􅀐輜重擬於王者齊威王薨子宣王辟彊立知成矦賣田忌乃召而復之燕文公薨子易王立衞成矦薨子平侯立三十七年秦惠王使犀首欺齊魏與共伐趙以敗從約趙肅矦讓蘇秦蘇秦恐請使燕必報齊蘇秦去趙而從約皆解趙人決河水以灌齊魏之師齊魏之師乃去魏以隂晉為和於秦寔華隂齊王伐燕取十城已而復歸之三十九年秦伐魏圍焦曲沃魏入少梁河西地于秦四十年秦伐魏度河取汾隂皮氏拔焦楚威王薨子懷王槐立宋公剔成之弟偃襲攻剔成剔成奔齊偃自立為君四十一年秦公子華張儀帥師圍魏蒲陽取之張儀言於秦王請以蒲陽復與魏而使公子繇質於魏儀因說魏王曰秦之遇魏甚厚魏不可以無禮於秦魏因盡入上郡十五縣以謝焉張儀歸而相秦四十二年秦縣義渠以其君為臣秦歸焦曲沃於魏四十三年趙肅矦薨子武靈王立置博聞師三人左右司過三人先問先君貴臣肥義加其秩四十四年夏四月戊午秦初稱王衛平矦薨子嗣君立衛有胥靡亡之魏因為魏王之后治病嗣君聞之使人請以五十金買之五反魏不與乃以左氏易之左右諫曰夫以一都買一胥靡可乎嗣君曰非子所知也夫治無小亂無大灋不立誅不必雖有十左氏無益也灋立誅必失十左氏無害也魏王聞之曰人主之欲不聼之不祥因載而往徒獻之四十五年秦張儀帥師伐魏取陜蘇秦通於燕文公之夫人易王知之蘇秦恐乃說易王曰臣居燕不能使燕重而在齊則燕重易王許之乃偽得罪於燕而奔齊齊宣王以為客卿蘇秦說齊王高宮室大苑囿以明得意欲以敝齊而為燕四十六年秦張儀及齊楚之相會齧桑韓燕皆稱王趙武靈王獨不肯曰無其實敢處其名乎令國人謂已曰君四十七年秦張儀自齧桑還而免相相魏欲令魏先事秦而諸矦効之魏王不聼秦王伐魏取曲沃平周復隂厚張儀益甚四十八年王崩子愼靚王定立燕易王薨子噲立齊王封田嬰於薛號曰靖郭君靖郭君言於齊王曰五官之計不可不日聼而數覧也王從之已而厭之悉以委靖郭君靖郭君由是得專齊之權靖郭君欲城薛客謂靖郭君曰君不聞海大魚乎網不能止鉤不能牽蕩而失水則螻蟻制焉今夫齊亦君之水也君長有齊奚以薛爲茍爲失齊雖隆薛之城到於天庸足恃乎乃不果城靖郭君有子四十餘人其賤妾之子曰文文通儻饒智略說靖郭君以散財養士靖郭君使文主家待賔客賔客爭譽其美皆請靖郭君以文為嗣靖郭君卒文嗣為薛公號曰孟甞君孟甞君招致諸矦遊士及有罪亡人皆舎業厚遇之存救其親戚食客常數千人各自以為孟甞君親已由是孟甞君之名重天下臣光曰君子之養士以為民也易曰聖人養賢以及萬民夫賢者其德足以敦化正俗其才足以頓綱振紀其明足以燭微慮逺其彊足以結仁固義大則利天下小則利一國是以君子豐禄以富之隆爵以尊之養一人而及萬人者養賢之道也今孟甞君之養士也不恤智愚不擇臧否盜其君之禄以立私黨張虚譽上以侮其君下以蠧其民是姦人之雄也烏足尚哉書曰受為天下逋逃主萃淵藪此之謂也孟甞君聘於楚楚王遺之象牀登徒直送之不欲行謂孟甞君門人公孫戌曰象牀之直千金苟傷之毫髮則賣妻子不足償也足下能使僕無行者有先人之寶劒願獻之公孫戌許諾入見孟甞君曰小國所以皆致相印於君者以君能振逹貧窮存亡繼絶故莫不悅君之義慕君之廉也今始至楚而受象牀則未至之國何以待君哉孟甞君曰善遂不受公孫戌趨去未至中閨孟甞君召而反之曰子何足之高志之揚也公孫戌以實對孟甞君乃書門版曰有能揚文之名止文之過私得寶於外者疾入諫臣光曰孟甞君可謂能用諫矣茍其言之善也雖懷詐諼之心猶將用之况盡忠無私以事其上乎詩云采葑采菲無以下體孟甞君有焉韓宣惠王欲兩用公仲公叔為政問於繆留對曰不可晉用六卿而國分齊簡公用陳成子及闞止而見殺魏用犀首張儀而西河之外亡今君兩用之其多力者内樹黨其寡力者藉外權羣臣有内樹黨以驕主有外為交以削地君之國危矣資治通鑑巻第二
