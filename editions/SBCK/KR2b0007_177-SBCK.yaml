body:
  text: 臣司馬光奉勑編集隋紀一光大淵獻凡三年起屠維作噩盡重高祖文皇帝上之上開皇九年春正月乙丑朔陳主朝㑹羣臣大霧四塞入人􅈹皆辛酸陳主昬睡至晡時乃寤是日賀若弼自廣陵引兵濟江先是弼以老馬多買陳船而匿之買弊船五六十艘置於瀆内陳人覘之以為内國無船弼又請縁江防人每交代之際必集廣陵於是大列旗幟營幕被野陳人以為隋兵大至急發兵為備旣知防人交代其衆復散後以為常不復設備又使兵縁江時獵人馬喧譟故弼之濟江陳人不覺韓擒虎將五百人自横江宵濟采石守者皆醉遂克之晉王廣帥大軍屯六合鎭桃葉山丙寅采石戌主徐子建馳啓告變丁卯召公卿入議軍旅戊辰陳主下詔曰犬羊陵縱侵竊郊畿蜂蠆有毒宜時掃定朕當親御六師廓清八表内外並可戒嚴以驃騎將軍蕭摩訶䕶軍將軍樊毅中領軍魯廣達並為都督司空司馬消難湘州刺史施文慶並為大監軍遣南豫州刺史樊猛帥舟師出白下散騎常侍臯文奏將兵鎮南豫州重立賞格僧尼道士盡令執役庚午賀若弼攻拔京口執南徐州刺史黄恪弼軍令嚴肅秋毫不犯有軍士於民間酤酒者弼立斬之所俘獲六千餘人弼皆釋之給糧勞遣付以敕書令分道宣諭於是所至風靡樊猛在建康其子巡攝行南豫州事辛未韓擒虎進攻姑孰半日拔之執巡及其家口臯文奏敗還江南父老素聞擒虎威信來謁軍門者晝夜不絶魯廣達之子世眞在新蔡與其弟世雄及所部降於擒虎遣使致書招廣達廣達時屯建康自劾詣廷尉請罪陳主慰勞之加賜黄金遣還營樊猛與左衛將軍蔣元遜將青龍八十艘於白下遊弈以禦六合兵陳主以猛妻子在隋軍懼有異志欲使鎭東大將軍任忠代之令蕭摩訶徐諭猛猛不悦陳主重傷其意而止於是賀若弼自北道韓擒虎自南道並進縁江諸戌望風盡走弼分兵斷曲阿之衝而入陳主命司徒豫章王叔英屯朝堂蕭摩訶屯樂遊苑樊毅屯耆闍寺魯廣達屯白土岡忠武將軍孔範屯寶田寺己卯任忠自呉興入赴仍屯朱雀門辛未賀若弼進據鍾山頓白土岡之東晉王廣遣摠管杜彦與韓擒虎合軍步騎二萬屯于新林蘄州摠管王世積以舟師出九江破陣將紀瑱於蘄口陳人大駭降者相繼晉王廣上狀帝大悦宴賜羣臣時建康甲士尚十餘萬人陳主素怯懦不逹軍事唯晝夜啼泣臺内處分一以委施文慶文慶既知諸將疾已恐其有功乃奏曰此等怏怏素不伏官迫此事機那可專信由是諸將凡有啓請率皆不行賀若弼之攻京口也蕭摩訶請將兵逆戰陳主不許及弼至鍾山摩訶又曰弼懸軍深入壘塹未堅出兵掩襲可以必克又不許陳主召摩訶任忠等於内殿議軍事忠曰兵法客貴速戰主貴持重今國家足食足兵宜固守臺城縁淮立栅北軍雖來勿與交戰分兵斷江路無令彼信得通給臣精兵一萬金翅三百艘下江徑掩六合彼大軍必謂其度江將士已被俘獲自然挫氣淮南土人與臣舊相知悉今聞臣往必皆景從臣復揚聲欲往徐州斷彼歸路則諸軍不擊自去待春水既漲上江周羅睺等衆軍必㳂流赴援此良策也陳主不能從明日欻然曰兵乆不决令人腹煩可呼蕭郎一出擊之任忠叩頭苦請勿戰孔範又奏請作一決當為官勒石燕然陳主從之謂摩訶曰公可為我一決摩訶曰從來行陳為國為身今日之事兼為妻子陳主多出金帛賦諸軍以充賞甲申使魯廣達陳於白土岡居諸軍之南任忠次之樊毅孔範又次之蕭摩訶軍最在北諸軍南北亘二十里首尾進退不相知賀若弼將輕騎登山望見衆軍因馳下與所部七摠管楊牙員明等甲士凡八千勒陳以待之陳主通於蕭摩訶之妻故摩訶初無戰意唯魯廣達以其徒力戰與弼相當隋師退走者數四弼麾下死者二百七十三人弼縱煙以自隠窘而復振陳兵得人頭皆走獻陳主求賞弼知其驕惰更引兵趣孔範範兵暫交即走陳諸軍顧之騎卒亂潰不可復止死者五千人員明擒蕭摩訶送於弼弼命牽斬之摩訶顔色自若乃釋而禮之任忠馳入臺見陳主言敗狀曰官好住臣無所用力矣陳主與之金兩縢使募人出戰忠曰陛下唯當具舟楫就上流衆軍臣以死奉衛陳主信之敕忠出部分令宫人裝束以待之怪其乆不至時韓擒虎自新林進軍忠已帥數騎迎降於石子岡領軍蔡徵守朱雀航聞擒虎將至衆懼而潰忠引擒虎軍直入朱雀門陳人欲戰忠揮之曰老夫尚降諸軍何事衆皆散走於是城内文武百司皆遁岀唯尚書僕射袁憲在殿中尚書令江摠等數人居省中陳主謂袁憲曰我從來接遇卿不勝餘人今日但以追愧非唯朕無徳亦是江東衣冠道盡陳主遑遽將避匿憲正色曰北兵之入必無所犯大事如此陛下去欲安之臣願陛下正衣冠御正殿依梁武帝見矦景故事陳主不從下榻馳去曰鋒刃之下未可交當吾自有計從宫人十餘出後堂景陽殿將自投于井憲苦諫不從後閤舎人夏矦公韻以身蔽井陳主與爭乆之乃得入既而軍人窺井呼之不應欲下石乃聞叫聲以繩引之驚其太重及出乃與張貴妃孔貴嬪同束而上沈后居處如常太子深年十五閉閤而坐舎人孔伯魚侍側軍士叩閤而入深安坐勞之曰戎旅在塗不至勞也軍士咸致敬焉時陳人宗室王矦在建康者百餘人陳主恐其爲變皆召入令屯朝堂使豫章王叔英摠督之又隂爲之備及臺城失守相帥出降賀若弼乗勝至樂遊苑魯廣達猶督餘兵苦戰不息所殺獲數百人㑹日暮乃解甲靣臺再拜慟哭謂衆曰我身不能救國負罪深矣士卒皆涕泣歔欷遂就擒諸門衛皆走弼夜燒北掖門入聞韓擒虎已得陳叔寶呼視之叔寶惶懼流汗股慄向弼再拜弼謂之曰小國之君當大國之卿拜乃禮也入朝不失作歸命矦無勞恐懼既而恥功在韓擒虎後與擒虎相訽挺刃而出欲令蔡徵爲叔寶作降箋命乗騾車歸已事不果弼置叔寶於德教殿以兵衛守高頻先入建康熲子徳􅀪為晉王廣記室廣使徳􅀪馳詣熲所令留張麗華熲曰昔太公蒙靣以斬妲己今豈可留麗華乃斬之於青溪徳􅀪還報廣變色曰昔人云無徳不報我必有以報高公矣由是恨熲丙戌晉王廣入建康以施文慶受委不忠曲為諂佞以蔽耳目沈客卿重賦厚歛以悦其上與太市令陽慧朗刑法監徐析尚書都令史暨慧皆為民害斬於石闕下以謝三呉使高熲與元帥府記室裴矩收圖籍封府庫資財一無所取天下皆穪廣以爲賢矩讓之之弟子也廣以賀若弼先期決戰違軍令收以屬吏上驛召之詔廣曰平定江表弼與韓擒虎之力也賜物萬段又賜弼與擒虎詔美其功開府儀同三司王頒僧辯之子也夜發陳高祖陵焚骨取灰投水而飲之既而自縛歸罪於晉王廣廣以聞上命赦之詔陳高祖世祖高宗陵摠給五戸分守之上遣使以陳亡告許善心善心衰服號哭於西階之下藉草東向坐三日敕書唁焉明日有詔就館拜通直散騎常侍賜衣一襲善心哭盡哀入房改服復出北靣立垂泣再拜受詔明日乃朝伏泣於殿下悲不能興上顧左右曰我平陳國唯獲此人既能懐其舊君即我之誠臣也敕以本官直門下省陳水軍都督周羅睺與郢州刺史荀法尚守江夏秦王俊督三十摠管水陸十餘萬屯漢口不得進相持踰月陳荆州刺史陳慧紀遣南康内史呂忠肅屯岐亭據巫峽於北岸鑿巖綴鐵鎖三條横截上流以遏隋船忠肅竭其私財以充軍用楊素劉仁恩奮兵擊之四十餘戰忠肅守險力爭隋兵死者五千餘人陳人盡取其鼻以求功賞既而隋師屢捷獲陳之士卒三縱之忠肅弃栅而遁素徐去其鎻忠肅復據荆門之延洲素遣巴蜑千人乗五牙四艘以拍竿碎其十餘艦遂大破之俘甲士二千餘人忠肅僅以身免陳信州刺史顧覺屯安蜀城弃城走陳慧紀屯公安悉燒其儲蓄引兵東下於是巴陵以東無復城守者陳慧紀帥將士三萬人樓船千餘艘㳂江而下欲入援建康為秦王俊軍所拒不得前是時陳晉熈王叔文罷湘州還至巴州慧紀推叔文為盟主而叔文已帥巴州刺史畢寶等致書請降於俊俊遣使迎勞之㑹建康平晉王廣命陳叔寶手書招上江諸將使樊毅詣周羅睺陳慧紀子正業詣慧紀諭指時諸城皆解甲羅睺乃與諸將大臨三日放兵散然後詣俊降陳慧紀亦降上江皆平楊素下至漢口與俊㑹王世積在蘄口聞陳已亡移書告諭江南諸郡於是江州司馬黄偲弃城走豫章等諸郡太守皆詣世積降癸巳詔遣使者巡撫陳州郡二月乙未廢淮南行臺省蘇威奏請五百家置鄉正使治民簡辭訟李徳林以為本廢鄉官判事為其里閭親識剖斷不平令令鄉正專治五百家恐為害更甚且要荒小縣有不至五百家者豈可使兩縣共管一鄉帝不聽丙申制五百家為鄉置鄉正一人百家為里置里長一人陳呉州刺史蕭瓛能得物情陳亡呉人推瓛為主右衛大將軍武川宇文述帥行軍摠管元契張黙言等討之落叢公燕榮以舟師自東海至亦受述節度陳永新矦陳君範自晉陵奔瓛并軍拒述述軍且至瓛立栅於晉陵城東留兵拒述遣其將王褒守呉州自義興入太湖欲掩述後述進破其栅㢠兵擊瓛大破之又遣兵别道襲呉州王褒衣道士服弃城走瓛以餘衆保包山燕榮擊破之瓛將左右數人匿民家為人所執述進至奉公埭陳東揚州刺史蕭巖以㑹稽降與瓛皆送長安斬之楊素之下荆門也遣别將龐暉將兵略地南至湘州城中將士莫有固志刻日請降刺史岳陽王叔愼年十八置酒㑹文武僚吏酒酣叔愼歎曰君臣之義盡於此乎長史謝基伏而流涕湘州助防遂興矦正理在坐乃起曰主辱臣死諸君獨非陳國之臣乎今天下有難實致命之秋也縱其無成猶見臣節青門之外有死不能今日之機不可猶豫後應者斬衆咸許諾乃刑牲結盟仍遣人詐奉降書於龐暉暉信之克期而入叔愼伏甲待之暉至執之以徇并其衆皆斬之叔慎坐于射堂招合士衆數日之中得五千人衡陽太守樊通武州刺史鄔居業皆請舉兵助之隋所除湘州刺史薛胄將兵適至與行軍摠管劉仁恩共擊之叔愼遣其將陳正理與樊通拒戰兵敗胄乗勝入城擒叔愼仁恩破鄔居業於横橋亦擒之俱送秦王俊斬於漢口嶺南未有所附數郡共奉高凉郡太夫人洗氏為主號聖母保境拒守詔遣柱國韋洸等安撫嶺外陳豫章太守徐璒據南康拒之洸等不得進晉王廣遣陳叔寶遺夫人書諭以國亡使之歸隋夫人集首領數千人盡日慟哭遣其孫馮魂帥衆迎洸洸擊斬徐璒入至廣州説諭嶺南諸州皆定表馮魂為儀同三司册洗氏為宋康郡夫人洸夐之子也衡州司馬任瓌勸都督王勇據嶺南求陳氏子孫立以為帝勇不能用以所部來降瓌棄官去瓌忠之弟子也於是陳國皆平得州三十郡一百縣四百詔建康城邑宫室並平蕩耕墾更於石頭城置蔣州晉王廣班師留王韶鎭石頭委以後事三月己巳陳叔寶與其王公百司發建康詣長安大小在路五百里纍纍不絶帝命權分長安士民宅以俟之内外脩整遣使迎勞陳人至者如歸夏四月辛亥帝幸驪山親勞旋師乙巳諸軍凱入獻俘於太廟陳叔寶及諸王矦將相并乗輿服御天文圖籍等以次行列仍以鐵騎圍之從晉王廣秦王俊入列于廟廷拜廣爲太尉賜輅車乗馬衮冕之服􅀇圭白璧丙午帝坐廣陽門觀引陳叔寶於前及太子諸王二十八人司空司馬消難以下至尚書郎凡二百餘人帝使納言宣詔勞之次使内史令宣詔責以君臣不能相輔乃至滅亡叔寶及其羣臣並愧懼伏地屏息不能對既而宥之初武元帝迎司馬消難與消難結為兄弟情好甚篤帝每以叔父禮事之及平陳消難至特免死配為樂戸二旬而免猶以舊恩引見尋卒於家魯廣逹追傷本朝淪覆得疾不療憤􅁣而卒庚戌帝御廣陽門宴將士自門外夾道列布帛之積達于南郭班賜各有差凡用三百餘萬段故陳之境内給復十年餘州免其年租賦樂安公元諧進曰陛下威徳逺被臣前請以突厥可汗為􅀱正陳叔寶為令史今可用臣言矣帝曰朕平陳國本以除逆非欲誇誕公之所奏殊非朕心突厥不知山川何能警􅃸叔寶昬醉寧堪驅使諧黙然而退辛酉進楊素爵為越公以其子􅀇感為儀同三司􅀇奬為情河郡公賜物萬段粟萬石命賀若弼登御坐賜物八千段加位上柱國進爵宋公仍各加賜金寶及陳叔寶妹為妾賀若弼韓擒虎爭功於帝前弼曰臣在蔣山死戰破其鋭卒擒其驍將震揚威武遂平陳國韓擒虎略不交陳豈臣之比擒虎曰本奉明㫖令臣與弼同時合勢以取偽都弼乃敢先期逢賊遂戰致令將士傷死甚多臣以輕騎五百兵不血刃直取金陵降任蠻奴執陳叔寶據其府庫傾其巢穴弼至夕方扣北掖門臣啓闗而納之斯乃救罪不暇安得與臣相比帝曰二將俱為上勲於是進擒虎位上柱國賜物八千段有司劾擒虎放縱士卒淫汙陳宫坐此不加爵邑加高熲上柱國進爵齊公賜物九千段帝勞之曰公伐陳後人言公反朕已斬之君臣道合非青蠅所能間也帝從容命熲與賀若弼論平陳事熲曰賀若弼先獻十策後於蔣山苦戰破賊臣文吏耳焉敢與大將論功帝大笑嘉其有讓帝之伐陳也使高熲問方略於上儀同三司李徳林以授晉王廣至是帝賞其功授柱國封郡公賞物三千段已宣敕訖或説高熲曰今歸功於李徳林諸將必當憤惋且後世觀公有若虚行熲入言之乃止以秦王俊為揚州摠管四十四州諸軍事鎭廣陵晉王廣還并州晉王廣之戮陳五佞也未知都官尚書孔範散騎常侍王瑳王儀御史中丞沈瓘之罪故得免及至長安事並露乙未帝暴其過惡投之邊裔以謝呉越之人瑳刻薄貪鄙忌害才能儀傾巧側媚獻二女以求親昵瓘險慘苛酷發言邪諂故同罪焉帝給賜陳叔寶甚厚數得引見班同三品每預宴恐致傷心為不奏呉音後監守者奏言叔寶云既無秩位每預朝集願得一官號帝曰叔寶全無心肝監者又言叔寶常醉罕有醒時帝問飲酒幾何對曰與其子弟日飲一石帝大驚使節其酒既而曰任其性不爾何以過日帝以陳氏子弟旣多恐其在京城爲非乃分置邊州給田業使為生歲時賜衣服以安全之詔以陳尚書令江摠為上開府儀同三司僕射袁憲驃騎蕭摩訶領軍任忠皆為開府儀同三司吏部尚書呉興姚察為秘書丞上嘉袁憲雅操下詔以為江表稱首授昌州刺史聞陳散騎常侍袁元友數直言於陳叔寶擢拜主爵侍郎謂羣臣曰平陳之初我悔不殺任蠻奴受人榮禄兼當重寄不能横尸徇國乃云無所用力與􅀪演納肝何其逺也帝見周羅睺慰諭之許以富貴羅睺垂泣對曰臣荷陳氏厚遇本朝淪亡無節可紀得免於死陛下之賜也何富貴之敢望賀若弼謂羅睺曰聞公郢漢捉兵即知揚州可得王師利涉果如所量羅睺曰若得與公周旋勝負未可知也頃之拜上儀同三司先是陳禆將羊翔來降伐陳之役使為鄉導位至上開府儀同三司班在羅睺上韓擒虎於朝堂戲之曰不知機變乃立在羊翔之下能無愧乎羅睺曰昔在江南乆承令問謂公天下節士今日所言殊非所望擒虎有愧色帝之責陳君臣也陳叔文獨欣然有得色既而復上表自陳昔在巴州已先送欵乞知此情望異常例帝雖嫌其不忠而欲懐柔江表乃授叔文開府儀同三司拜宜州刺史初陳散騎常侍韋鼎聘于周遇帝而異之謂帝曰公當大貴貴則天下一家歲一周天老夫當委質於公及至徳之初鼎為太府卿盡賣田宅大匠卿毛彪問其故鼎曰江東王氣盡於此矣吾與爾當􅁙長安及陳平上召鼎為上儀同三司鼎叡之孫也壬戌詔曰今率土大同含生遂性太平之法方可流行凡我臣民澡身浴徳家家自修人人克念兵可立威不可不戢刑可助化不可專行禁衛九重之餘鎮守四方之外戎旅軍器皆冝停罷世路既夷羣方無事武力之子俱可學經民間甲伏悉皆除毁頒告天下咸悉此意賀若弼撰其所畫策上之謂為御授平陳七策帝弗省曰公欲發揚我名我不求名公宜自載家傳弼位望隆重兄弟並封郡公為刺史列將家之珍玩不可勝計婢妾曳羅綺者數百時人榮之其後突厥來朝上謂之曰汝聞江南有陳國天子乎對曰聞之上命左右引突厥詣韓擒虎前曰此是執得陳國天子者擒虎厲色顧之突厥惶恐不敢仰視右衛將軍龐晃等短高熲於上上怒皆黜之親禮逾密因謂熲曰獨孤公猶鏡也每被磨瑩皎然益明初熲父賓為獨孤信僚佐賜姓獨孤氏故上常呼爲獨孤而不名樂安公元諧性豪俠有氣調少與上同學甚相愛及即位累歴顯仕諧好排詆不能取媚左右與上柱國王􅁩善􅁩誅上稍疎忌之或告諧與從父弟上開府儀同三司滂臨澤矦田鸞上儀同三司祈緒等謀反下有司案驗奏諧謀令祈緒勒党項兵斷巴蜀又諧嘗與滂同謁上諧私謂滂曰我是主人殿上者賊也因令滂望氣滂曰彼雲似蹲狗走鹿不如我軰有福徳雲上大怒諧滂鸞緒並伏誅閏月己卯以吏部尚書蘇威為右僕射六月乙丑以荆州摠管楊素為納言朝野皆請封禪秋七月丙午詔曰豈可命一將軍除一小國遐邇注意便謂太平以薄徳而封名山用虚言而干上帝非朕攸聞而今而後言及封禪宜即禁絶左衛大將軍廣平王雄貴寵特盛與高熲虞慶則蘇威稱為四貴雄寛容下士朝野傾屬上惡其得衆隂忌之不欲其典兵馬八月壬戌以雄為司空實奪之權雄既無職務乃杜門不通賓客帝踐阼之初柱國沛公鄭譯請修正雅樂詔太常卿牛􅀪國子祭酒辛彦之博士何妥等議之積年不决譯言古樂十二律旋相為宫各用七聲丗莫能通譯因􅀛兹人蘇祇婆善琵琶始得其法推演爲十二均八十四調以校太樂所奏例皆乖越譯又於七音之外更立一聲謂之應聲作書宣示朝廷與邳公丗子蘇䕫議累黍定律時人以音律乆無通者非譯䕫一朝可定帝素不悦學而牛弘不精音律何妥自恥宿儒反不逮譯等常欲沮壊其事乃立議非十二律旋相爲宫及七調競爲異議各立朋黨或欲令各造樂待成擇其善者而從之妥恐樂成善惡易見乃請帝張樂試之先白帝云黄鍾象人君之德及奏黄鍾之調帝曰滔滔和雅甚與我心㑹妥因奏止用黄鍾一宫不假餘律帝悦從之時又有樂工萬寶常妙達鍾律譯等爲黄鍾調成奏之帝召問寶常寶常曰此亡國之音也帝不悦寶常請以水尺為律以調樂器上從之寶常造諸樂器其聲率下鄭譯調二律損益樂器不可勝紀其聲雅淡不為時人所好太常善聲者多排毁之蘇䕫尤忌寶常䕫父威方用事凡言樂者皆附之而短寶常寶常樂竟為威所抑寢不行及平陳獲宋齊舊樂器并江左樂工帝令廷奏之歎曰此華夏正聲也乃調五音為五夏二舞登歌房内等十四調賓祭用之仍詔太常置清商署以掌之時天下既壹異代器物皆集樂府牛􅀪奏中國舊音多在江左前克荆州得梁樂今平蔣州又得陳樂史傳相承以為合古請加修緝以備雅樂其後魏之樂及後周所用雜有邊裔之聲皆不可用請悉停之冬十二月甲子詔􅀪與許善心姚察及通直郎虞世基參定雅樂世基荔之子也己巳以黄州摠管周法尚為永州摠管安集嶺南給黄州兵三千五百人為帳内陳桂州刺史錢季卿等皆詣法尚降定州刺史呂子廊據山洞不受命法尚擊斬之以駕部侍郎狄道辛公義為岷州刺史岷州俗畏疫一人病疫闔家避之病者多死公義命皆輿置已之㕔事暑月病人或至數百聽廊皆滿公義設榻晝夜處其間以秩禄具醫藥身自省問病者既愈乃召其親戚諭之曰死生有命豈能相染若相染者吾死乆矣皆慙謝而去其後人有病者爭就使君其家親戚固留養之始相慈愛風俗遂變後遷并州刺史下車先至獄中露坐親自驗問十餘日間决遣咸盡方還聽事受領新訟事皆立决若有未盡必須禁者公義即宿聽事終不還閤或諫曰公事有程使君何自苦公義曰刺史無徳不能使民無訟豈可禁人在獄而安寢於家乎罪人聞之咸自欵服後有訟者鄉閭父老遽曉之曰此小事何忍勤勞使君訟者多兩讓而止十年春正月乙未以皇孫昭為河南王楷為華陽王昭廣之子也二月庚申上幸晉陽命高熲居守夏四月辛酉至自晉陽成安文子李徳林恃其才望論議好勝同列多疾之由是以佐命元功十年不徙級徳林數與蘇威異議高熲常助威奏徳林狠戾上多從威議上賜徳林莊店使自擇之徳林請逆人高阿那肱衛國縣市店上許之及幸晉陽店人訴稱高氏强奪民田於内造店賃之蘇威因奏徳林誣罔妄奏自入司農卿李圓通等復助之曰此店收利如食千戸請計日追􅂍上自是益惡之虞慶則等奉使闗東巡省還皆奏稱鄉正專理辭訟黨與愛憎公行貨賄不便於民上令廢之徳林曰兹事臣本以為不可然置來始爾復即停廢政令不一朝成暮毁深非帝王設法之義臣望陛下自今羣臣於律令輒欲改張即以軍法從事不然者紛紜未巳上遂發怒大詬云爾欲以我為王莽邪先是德林稱父爲太尉諮議以取贈官給事黄門侍郎猗氏陳茂等密奏徳林父終於校書妄稱諮議上甚銜之至是上因數之曰公為内史典朕機密比不可豫計議者以公不􅀪耳寧自知乎又罔冒取店妄加父官朕實忿之而未能發今當以一州相遣耳因出為湖州刺史徳林拜謝曰臣不敢復望内史令請但預散參上不許遷懐州刺史而卒李圓通本上微時家奴有器幹及為隋公以圓通及陳茂為參佐由是信任之梁國之廢也上以梁太府卿柳莊為給事黄門侍郎莊有識度博學善辭令明習典故雅達政事上及高熲蘇威皆重之與陳茂同僚不能降意茂譛之於上上稍疎之出為饒州刺史上性猜忌不悦學既任智以獲大位因以文法自矜明察臨下恒令左右覘視内外有過失則加以重罪又患令史􅂍汙私使人以錢帛遺之得犯立斬每於殿廷捶人一日之中或至數四嘗怒問事揮楚不甚即命斬之尚書左僕射高熲治書侍御史柳彧等諫以為朝堂非殺人之所殿廷非决罰之地上不納熲等乃盡詣朝堂請罪上顧謂領左右都督田元曰吾杖重乎元曰重帝問其狀元舉手曰陛下杖大如指捶人三十者比常杖數百故多死上不懌乃令殿内去杖欲有决罰各付所由後楚州行參軍李君才上言上寵高熲過甚上大怒命杖之而殿内無杖遂以馬鞭捶殺之自是殿内復置杖未幾怒甚又於殿廷殺人兵部侍郎馮基固諫上不從竟於殿廷殺之上亦尋悔宣慰馮基而怒羣臣之不諫者五月乙未詔曰魏末喪亂軍人權置坊府南征北伐居處無定家無完堵地罕包桑朕甚愍之凡是軍人可悉屬州縣墾田籍帳一與民同軍府統領宜依舊式罷山東河南及北方縁邊之地新置軍府六月辛酉制民年五十免役收庸秋七月癸卯以納言楊素為内史令冬十一月辛丑上祀南郊江表自東晉已來刑法疏緩世族陵駕寒門平陳之後牧民者盡更變之蘇威復作五教使民無長幼悉誦之士民嗟怨民間復訛言隋欲徙之入闗逺近驚駭於是婺州汪丈進越州髙智慧蘇州沈􅀇懀皆舉兵反自稱天子署置百官樂安蔡道人蔣山李㥄饒州呉世華温州沈孝徹泉州王國慶杭州楊寶英交州李春等皆自稱大都督攻陷州縣陳之故境大抵皆反大者有衆數萬小者數千共相影響執縣令或抽其腸或臠其肉食之曰更能使儂誦五教邪詔以楊素為行軍摠管以討之素將濟江使始興麥鐵杖戴束藳夜浮渡江覘賊還而復往爲賊所擒遣兵仗三十人防之鐵杖取賊刀亂斬防者殺之皆盡割其􅈹懐之以歸素大竒之奏授儀同三司素帥舟師自揚子津入擊賊帥朱莫問於京口破之進擊晉陵賊帥顧世興無錫賊帥葉略皆平之沈􅀇懀敗走素追擒之高智慧據浙江東岸為營周亘百餘里船艦被江素擊之子摠管南陽來䕶兒言於素曰呉人輕鋭利在舟楫必死之賊難與爭鋒公宜嚴陳以待之勿與接刃請假竒兵數千潜度江掩破其壁使退無所歸進不得戰此韓信破趙之策也素從之䕶兒以輕舸數百直登江岸襲破其營因縱火煙焰張天賊顧火而懼素因縱兵奮擊大破之賊遂潰智慧逃入海素躡之至海曲召行軍記室封徳彞計事徳彛墜水人救獲免易衣見素竟不自言素後知之問其故曰私事也所以不白素嗟異之徳彛名倫以字行隆之之孫也汪文進以蔡道人為司空守樂安素進討悉平之素遣摠管史萬歲帥衆二千自婺州别道踰嶺越海攻破溪洞不可勝數前後七百餘戰轉鬭千餘里寂無聲問者十旬逺近皆以萬歲為沒萬歲置書竹筒中浮之於水汲者得之言於素素上其事上嗟歎賜萬歲家錢十萬素又破沈孝徹於温州步道向天台指臨海逐捕遺逸前後百餘戰高智慧走保閩越上以素乆勞於外令馳傳入朝素以餘賊未殄恐為後患復請行遂乗􅀓至㑹稽王國慶自以海路艱阻非北人所習不設備素泛海奄至國慶惶遽弃州走餘黨散入海島或守溪洞素分遣諸將水陸追捕密令人説國慶使斬送智慧以自贖國慶乃執送智慧斬於泉州餘黨悉降江南大定素班師上遣左領軍將軍獨孤陀至浚儀迎勞比到京師問者日至拜素子􅀇奬爲儀同三司賞賜甚厚陀信之子也楊素用兵多權略馭衆嚴整每將臨敵輒求人過失而斬之多者百餘人少不下十數流血盈前言笑自若及其對陳先令一二百人赴敵陷陳則已如不能陷而還者無問多少悉斬之又令二三百人復進還如向法將士股慄有必死之心由是戰無不勝稱爲名將素時貴幸言無不從其從素行者微功必録至他將雖有大功多爲文吏所譴却故素雖殘忍士亦以此願從焉以并州摠管晉王廣爲揚州摠管鎮江都復以秦王俊爲并州摠管番禺夷王仲宣反嶺南首領多應之引兵圍廣州韋洸中流矢卒詔以其副慕容三藏檢校廣州道行軍事又詔給事郎裴矩廵撫嶺南矩至南康得兵數千人仲宣遣别將周師舉圍東衡州矩與大將軍鹿愿擊斬之進至南海高凉洗夫人遣其孫馮暄將兵救廣州暄與賊將陳佛智素善逗留不進夫人知之大怒遣使執暄繫州獄更遣孫盎出討佛智斬之進㑹鹿愿於南海與慕容三藏合擊仲宣仲宣衆潰廣州獲全洗氏親被甲乗介馬張錦繖引彀騎衛從裴矩廵撫二十餘州蒼梧首領陳坦等皆來謁見矩承制署為刺史縣令使還統其部落嶺表遂定矩復命上謂高熲楊素曰韋洸將二萬兵不能早度嶺朕每患其兵少裴矩以三千弊卒徑至南海有臣若此朕亦何憂以矩為民部侍郎拜馮盎高州刺史追贈馮寶廣州摠管譙國公册洗氏為譙國夫人開譙國夫人幕府置長史以下官屬給印章聽發部落六州兵馬若有機急便宜行事仍敕以夫人誠效之故特赦暄逗留之罪拜羅州刺史皇后賜夫人首飾及宴服一襲夫人並盛於金篋并梁陳賜物各藏一庫每歲時大㑹陳之於庭以示子孫曰我事三代主唯用一忠順之心今賜物具存此其報也汝曹皆念之盡赤心於天子畨州摠管趙訥貪虐諸俚獠多亡叛夫人遣長史張融上封事論安撫之宜并言訥罪不可以招懐逺人上遣推訥得其􅂍賄竟致於法敕委夫人招慰亡叛夫人親載詔書自稱使者歴十餘州宣述上意諭諸俚獠所至皆降上嘉之賜夫人臨振縣為湯沐邑贈馮僕崖州摠管平原公十一年春正月丙午皇太子妃元氏薨二月戊午吐谷渾遣使入貢吐谷渾可汗夸吕聞陳亡大懼遁逃保險不敢為寇夸呂卒子世㐲立使其兄子無素奉表稱藩并獻方物請以女備後庭上謂無素曰若依來請佗國聞之必當相傚何以拒之朕情存安養各令遂性豈可聚歛子女以實後宫乎竟不許平鄉令劉曠有異政以義理曉諭訟者皆引咎而去獄中草滿庭可張羅遷臨潁令高熲薦曠清名善政為天下第一上召見勞勉之顧謂侍臣曰若不殊奬何以為勸丙子優詔擢為莒州刺史辛巳晦日有食之初帝微時與滕穆王瓚不協帝為周相以瓚為大宗伯瓚恐為家禍隂欲圖帝帝隠之瓚妃周高祖妹順陽公主也與獨孤后素不平隂為呪詛帝命出之瓚不可秋八月壬申瓚從帝幸栗園暴薨時人疑其遇鴆乙亥帝至自栗園沛達公鄭譯卒資治通鑑卷第一百七十七
