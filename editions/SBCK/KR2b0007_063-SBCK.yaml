front:
  text: 資治通鑑巻第六十三
  hash: sha256:78ede3c876fc6d88337e6fc287252bbece3aa263c58343f790fe4b146af7ceb6
body:
  text: 臣司馬光奉勑編集漢紀五十五章執徐凡二年起屠維單閼盡上孝獻皇帝戊建安四年春三月黑山帥張燕與公孫續率兵十萬三道救之未至瓚密使行人齎書告續使引五千銕騎於北隰之中起火為應瓚欲自内出戰紹候得其書如期舉火瓚以為救至遂出戰紹設伏擊之瓚大敗復還自守紹為地道穿其樓下施木柱之度足逹半便燒之樓輒傾倒稍至京中瓚自計必無全乃悉縊其姉妹妻子然後引火自焚紹趣兵登臺斬之田楷戰死關靖歎曰前若不止將軍自行未必不濟吾聞君子陷人危必同其難豈可以獨生乎䇿馬赴紹軍而死續為屠各所殺漁陽田豫説太守鮮于輔曰曹氏奉天子以令諸侯終能定天下宜早從之輔乃率其衆以奉王命詔以輔為建忠將軍都督幽州六郡初烏桓王丘力居死子樓班年少從子蹋頓有武略代立緫攝上谷大人難樓遼東大人蘇僕延右北平大人烏延等袁紹攻公孫瓚蹋頓以烏桓助之瓚滅紹承制皆賜蹋頓難樓蘓僕延烏延等單于印綬又以閻柔得烏桓心因加寵慰以安北邊其後難樓蘇僕延奉樓班為單于以蹋頓為王然蹋頓猶秉計䇿眭固屯射犬夏四月曹操進軍臨河使將軍史渙曹仁渡河擊之仁操從弟也固自將兵北詣袁紹求救與渙仁遇於犬城渙仁擊斬之操遂濟河圍射犬射犬降操還軍敖倉初操在兖州舉魏种孝廉兖州叛操曰唯魏种且不棄孤及聞种走操怒曰种不南走越北走胡不置汝也既下射犬生禽种操曰唯其才也釋其􅅞而用之以為河内太守屬以河北事以衛將軍董承為車騎將軍袁術既稱帝淫侈滋甚媵御數百無不兼羅紈厭粱肉自下飢困莫之収䘏既而資實空盡不能自立乃燒宫室犇其部曲陳簡雷薄於􅏦山復為簡等所拒遂大窮士卒散走憂懣不知所為乃遣使歸帝號於從兄紹曰禄去漢室乆矣袁氏受命當王符瑞炳然今君擁有四州人戸百萬謹歸大命君其興之袁譚自青州迎術欲從下邳北過曹操遣劉備及將軍清河朱靈邀之術不得過復走壽春六月至江亭坐簀􅇃而歎曰袁術乃至是乎因憤慨結病歐血死術從弟􅅌畏曹操不敢居壽春率其部曲奉術柩及妻子犇廬江太守劉勲於皖城故廣陵太守徐璆得傳國璽獻之袁紹既克公孫瓚心益驕貢御稀簡主簿耿包密白紹宜應天人稱尊號紹以包白事示軍府僚屬皆言包妖妄宜誅紹不得已殺包以自解紹簡精兵十萬騎萬匹欲以攻許沮授諌曰近討公孫瓚師出歴年百姓疲敝倉庫無積未可動也宜務農息民先遣使獻㨗天子若不得通乃表曹操隔我王路然後進屯黎陽漸營河南益作舟舡繕修器械分遣精騎抄其邊鄙令彼不得安我取其逸如此可坐定也郭圖審配曰以明公之神武引河朔之彊衆以伐曹操易如覆手何必乃爾授曰夫救亂誅暴謂之義兵恃衆憑彊謂之驕兵義者無敵驕者先滅曹操奉天子以令天下今舉師南向於義則違且廟勝之䇿不在彊弱曹操灋令既行士卒精練非公孫瓚坐而受攻者也今棄萬安之術而興無名之師竊為公懼之圖配曰武王伐紂不為不義况兵加曹操而云無名且以公今日之彊將士思奮不及時以定大業所謂天與不取反受其咎此越之所以覇吳之所以滅也監軍之計在於持牢而非見時知幾之變也紹納圖言圖等因是譖授曰授監統内外威震三軍若其寖盛何以制之夫臣與主同者亡此黄石之所忌也且御衆於外不宜知内紹乃分授所統為三都督使授及郭圖淳于瓊各典一軍騎都尉清河崔琰諌曰天子在許民望助順不可攻也紹不從許下諸將聞紹將攻許皆懼曹操曰吾知紹之為人志大而智小色厲而膽薄忌克而少威兵多而分畫不明將驕而政令不一土地雖廣糧食雖豐適足以為吾奉也孔融謂荀彧曰紹地廣兵彊田豐許攸智士也為之謀審配逢紀忠臣也任其事顔良文醜勇將也統其兵殆難克乎彧曰紹兵雖多而灋不整田豐剛而犯上許攸貪而不治審配專而無謀逢紀果而自用此數人者埶不相容必生内變顔良文醜一夫之勇耳可一戰而禽也秋八月操進軍黎陽使臧霸等將精兵入青州以扞東方留于禁屯河上九月操還許分兵守官渡袁紹遣人招張繡并與賈詡書結好繡欲許之詡於繡坐上顯謂紹使曰歸謝袁本初兄弟不能相容而能容天下國士乎繡驚懼曰何至於此竊謂詡曰若此當何歸詡曰不如從曹公繡曰袁彊曹弱又先與曹為讐從之如何詡曰此乃所以宜從也夫曹公奉天子以令天下其宜從一也紹彊盛我以少衆從之必不以我為重曹公衆弱其得我必喜其宜從二也夫有覇王之志者固將釋私怨以明德於四海其宜從三也願將軍無疑冬十一月繡率衆降曹操操執繡手與歡宴為子均取繡女拜揚武將軍表詡為執金吾封都亭侯關中諸將以袁曹方争皆中立顧望凉州牧韋端使從事天水楊阜詣許阜還關右諸將問袁曹勝敗孰在阜曰袁公寛而不斷好謀而少决不斷則無威少决則後事今雖彊終不能成大業曹公有雄才遠畧决機無疑灋一而兵精能用度外之人所任各盡其力必能濟大事者也曹操使治書侍御史河東衛覬鎭撫關中時四方大有還民關中諸將多引為部曲覬書與荀彧曰關中膏腴之地頃遭荒亂人民流入荆州者十萬餘家聞本土安寧皆企望思歸而歸者無以自業諸將各競招懷以為部曲郡縣貧弱不能與爭兵家遂彊一旦變動必有後憂夫鹽國之大寶也亂來放散宜如舊置使者監賣以其直益市犂牛若有歸民以供給之勤耕積粟以豐殖關中遠民聞之必日夜競還又使司􅀠校尉留治關中以為之主則諸將日削官民日盛此彊本弱敵之利也彧以白操操從之始遣謁者僕射監鹽官司􅀠校尉治􅀪農關中由是服從袁紹使人求助於劉表表許之而竟不至亦不援曹操從事中郎南陽韓嵩别駕零陵劉先説表曰今兩雄相持天下之重在於將軍若欲有為起乘其敝可也如其不然固將擇所宜從豈可擁甲十萬坐觀成敗求援而不能助見賢而不肯歸此兩怨必集於將軍恐不得中立矣曹操善用兵賢俊多歸之其埶必舉袁紹然後移兵以向江漢恐將軍不能禦也今之勝計莫若舉荆州以附曹操操必重德將軍長享福祚垂之後嗣此萬全之策也蒯越亦勸之表狐疑不斷乃遣嵩詣許曰今天下未知所定而曹操擁天子都許君為我觀其釁嵩曰聖逹節次守節嵩守節者也夫君臣名定以死守之今策名委質唯將軍所命雖赴湯蹈火死無辭也以嵩觀之曹公必得志於天下將軍能上順天子下歸曹公使嵩可也如其猶豫嵩至京師天子假嵩一職不獲辭命則成天子之臣將軍之故吏耳在君為君則嵩守天子之命義不得復為將軍死也惟加重思無為負嵩表以為憚使彊之至許詔拜嵩侍中零陵太守及還盛稱朝廷曹公之德勸表遣子入侍表大怒以為懷貳大㑹寮屬陳兵持節將斬之數曰韓嵩敢懷貳邪衆皆恐欲令嵩謝嵩不為動容徐謂表曰將軍負嵩嵩不負將軍具陳前言表妻蔡氏諌曰韓嵩楚國之望也且其言直誅之無辭表猶怒考殺從行者知無它意乃弗誅而囚之揚州賊帥鄭寶欲略居民以赴江表以淮南劉曄髙族名人欲刼之使唱此謀曄患之㑹曹操遣使詣州有所案問曄要與歸家寶來候使者曄留與宴飲手刅殺之斬其首以令寳軍曰曹公有令敢有動者與寶同罪其衆數千人皆讋服推曄為主曄以其衆與廬江太守劉勲勲怪其故曄曰寳無灋制其衆素以鈔畧為利僕宿無資而整齊之必懷怨難乆故以相與耳勲以袁術部曲衆多不能贍遣從弟偕求米於上繚諸宗帥不能滿數偕召勲使襲之孫䇿惡勲兵彊偽卑辭以事勲曰上繚宗民數欺鄙郡欲擊之路不便上繚甚冨實願君伐之請出兵以為外援且以珠寶葛越賂勲勲大喜外内盡賀劉曄獨否勲問其故對曰上繚雖小城堅池深攻難守易不可旬日而舉也兵疲於外而國内虛策乘虚襲我則後不能獨守是將軍進屈於敵退無所歸若軍必出禍今至矣勲不聽遂伐上繚至海昬宗帥知之皆空壁逃遷勲了無所得時策引兵西擊黄祖行及石城聞勲在海昬策乃分遣從兄賁輔將八千人屯彭澤自與領江夏太守周瑜將二萬人襲皖城克之得術勲妻子及部曲三萬餘人表汝南李術為廬江太守給兵三千人以守皖城皆徙所得民東詣吳勲還至彭澤孫賁孫輔邀擊破之勲走保流沂求救於黄祖祖遣其子射率船軍五千人助勲策復就攻勲大破之勲北歸曹操射亦遁走策收得勲兵二千餘人船千艘遂進擊黄祖十二月辛亥策軍至沙羡劉表遣從子虎及南陽韓晞將長矛五千來救祖甲寅䇿與戰大破之斬晞祖脱身走獲其妻子及船六千艘士卒殺溺死者數萬人䇿盛兵將徇豫章屯于椒丘謂功曹虞翻曰華子魚自有名字然非吾敵也若不開門讓城金鼓一震不得無所傷害卿便在前具宣孤意翻乃往見華歆曰竊聞明府與鄙郡故王府君齊名中州海内所宗雖在東垂常懷瞻仰歆曰孤不如王㑹稽翻復曰不審豫章資糧器仗士民勇果孰與鄙郡歆曰大不如也翻曰明府言不如王㑹稽謙光之譚耳精兵不如㑹稽實如尊敎孫討逆智畧超世用兵如神前走劉揚州君所親見南定鄙郡亦君所聞也今欲守孤城自料資糧已知不足不早為計悔無及也今大軍已次椒丘僕便還去明日日中迎檄不到者與君辭矣歆曰久在江表常欲北歸孫㑹稽來吾便去也乃夜作檄明旦遣吏齎迎策便進軍歆葛巾迎策策謂歆曰府君年德名望逺近所歸策年㓜稚宜脩子弟之禮便向歆拜禮為上賓孫盛曰歆既無夷皓韜邈之風又失王臣匪躬之操橈心於邪儒之説交臂於陵肆之徒位奪節墮咎孰大焉策分豫章為廬陵郡以孫賁為豫章太守孫輔為廬陵太守㑹僮芝病輔遂進屯廬陵留周瑜鎭巴丘孫策之克皖城也撫視袁術妻子及入豫章收載劉繇䘮善遇其家士大夫以是稱之㑹稽功曹魏騰嘗迕䇿意䇿將殺之衆憂恐計無所出策母吳夫人倚大井謂䇿曰汝新造江南其事未集方當優賢禮士捨過錄功魏功曹在公盡規汝今日殺之則明日人皆叛汝吾不忍見禍之及當先投此井中耳策大驚遽釋騰初吳郡太守㑹稽盛憲舉高岱孝亷許貢來領郡岱將憲避難於營帥許昭家烏程鄒佗錢銅及嘉興王晟等各聚衆萬餘或數千人不附孫策策引兵撲討皆破之進攻嚴白虎白虎兵敗犇餘杭投許昭程普請擊昭策曰許昭有義於舊君有誠於故友此丈夫之志也乃舎之曹操復屯官渡操常從士徐他等謀殺操入操帳見校尉許禇色變禇覺而殺之初車騎將軍董承稱受帝衣帶中密詔與劉備謀誅曹操操從容謂備曰今天下英雄惟使君與操耳本初之徒不足數也備方食失匕箸值天雷震備因曰聖人云迅雷風烈必變良有以也遂與承及長水校尉种輯將軍吳子蘭王服等同謀㑹操遣備與朱靈邀袁術程昱郭嘉董昭皆諌曰備不可遣也操悔追之不及術既南走朱靈等還備遂殺徐州刺史車胄留關羽守下邳行太守事身還小沛東海賊昌豨及郡縣多叛操為備備衆數萬人遣使與袁紹連兵操遣司空長史沛國劉岱中郎將扶風王忠擊之不克備謂岱等曰使汝百人來無如我何曹公自來未可知耳五年春正月董承謀洩壬子曹操殺承及王服种輯皆夷三族操欲自討劉備諸將皆曰與公爭天下者袁紹也今紹方來而棄之東紹乘人後若何操曰劉備人傑也今不擊必為後患郭嘉曰紹性遲而多疑來必不速備新起衆心未附急擊之必敗操師遂東冀州别駕田豐説袁紹曰曹操與劉備連兵未可卒解公舉軍而襲其後可一往而定紹辭以子疾未得行豐舉杖擊地曰嗟乎遭難遇之時而以嬰兒病失其㑹惜哉事去矣曹操擊劉備破之獲其妻子進㧞下邳禽關羽又擊昌豨破之備犇青州因袁譚以歸袁紹紹聞備至身去鄴二百里迎之駐月餘所亡士卒稍稍歸之曹操還軍官渡紹乃議攻許田豐曰曹操既破劉備則許下非復空虛且操善用兵變化無方衆雖少未可輕也今不如以久持之將軍據山河之固擁四州之衆外結英雄内修農戰然後簡其精鋭分為竒兵乘虚迭出以擾河南救右則擊其左救左則擊其右使敵疲於犇命民不得安業我未勞而彼已困不及三年可坐克也今釋廟勝之策而决成敗於一戰若不如志悔無及也紹不從豐彊諌忤紹紹以為沮衆械繫之於是移檄州郡數操罪惡二月進軍黎陽沮授臨行㑹其宗族散資財以與之曰埶存則威無不加埶亡則不保一身哀哉其弟宗曰曹操士馬不敵君何懼焉授曰以曹操之明畧又挾天子以為資我雖克伯珪衆實疲敝而主驕將忲軍之破敗在此舉矣揚雄有言六國蚩蚩為嬴弱姬其今之謂乎振威將軍程昱以七百兵守鄄城曹操欲益昱兵二千昱不肯曰袁紹擁十萬衆自以所向無前今見昱少兵必輕易不來攻若益昱兵過則不可不攻攻之必克徒兩損其埶願公無疑紹聞昱兵少果不往操謂賈詡曰程昱之膽過於賁育矣袁紹遣其將顔良攻東郡太守劉延於白馬沮授曰良性促狹雖驍勇不可獨任紹不聽夏四月曹操北救劉延荀攸曰今兵少不敵必分其勢乃可公到延津若將渡兵向其後者紹必西應之然後輕兵襲白馬掩其不備顔良可禽也操從之紹聞兵渡即分兵西邀之操乃引軍兼行趣白馬未至十餘里良大驚來逆戰操使張遼關羽先登擊之羽望見良麾蓋策馬刺良於萬衆之中斬其首而還紹軍莫能當者遂解白馬之圍徙其民循河而西紹渡河追之沮授諌曰勝負變化不可不詳今宜留屯延津分兵官渡若其􅂶獲還迎不晩設其有難衆弗可還紹弗從授臨濟歎曰上盈其志下務其功悠悠黄河吾其濟乎遂以疾辭紹不許而意恨之復省其所部并屬郭圖紹軍至延津南操勒兵駐營南阪下使登壘望之曰可五六百騎有頃復白騎稍多步兵不可勝數操曰勿復白令騎解鞍放馬是時白馬輜重就道諸將以為敵騎多不如還保營荀攸曰此所以餌敵如何去之操顧攸而笑紹騎將文醜與劉備將五六千騎前後至諸將復白可上馬操曰未也有頃騎至稍多或分趣輜重操曰可矣乃皆上馬時騎不滿六百遂縱兵擊大破之斬醜醜與顔良皆紹名將也再戰悉禽之紹軍奪氣初操壯關羽之為人而察其心神無乆留之意使張遼以其情問之羽歎曰吾極知曹公待我厚然吾受劉將軍恩誓以共死不可背之吾終不留要當立効以報曹公乃去耳遼以羽言報操操義之及羽殺顔良操知其必去重加賞賜羽盡封其所賜拜書告辭而犇劉備於袁軍左右欲追之操曰彼各為其主勿追也操還軍官渡閻柔遣使詣操操以柔為烏桓校尉鮮于輔身見操於官渡操以輔為右渡遼將軍還鎭幽土廣陵太守陳登治射陽孫策西擊黄祖登誘嚴白虎餘黨圖為後害䇿還擊登軍到丹徒須待運糧初策殺吳郡太守許貢貢奴客濳民閒欲為貢報讐䇿性好獵數出驅馳所乘馬精駿從騎絶不能及卒遇貢客三人射策中頰後騎尋至皆刺殺之䇿創甚召張昭等謂曰中國方亂以吳越之衆三江之固足以觀成敗公等善相吾弟呼權佩以印綬謂曰舉江東之衆决機於兩陳之閒與天下爭衡卿不如我舉賢任能各盡其心以保江東我不如卿丙午策卒時年二十六權悲號未視事張昭曰孝廉此寧哭時邪乃改易權服扶令上馬使出廵軍昭率僚屬上表朝廷下移屬城中外將校各令奉職周瑜自巴丘將兵赴䘮遂留吳以中䕶軍與張昭共掌衆事時策雖有會稽吳郡丹陽豫章廬江廬陵然深險之地猶未盡從流寓之士皆以安危去就為意未有君臣之固而張昭周瑜等謂權可與共成大業遂委心而服事焉秋七月立皇子馮為南陽王壬午馮薨汝南黄巾劉辟等叛曹操應袁紹紹遣劉備將兵助辟郡縣多應之紹遣使拜陽安都尉李通為征南將軍劉表亦陰招之通皆拒焉或勸通從紹通按劒叱之曰曹公明哲必定天下紹雖彊盛終為之虜耳吾以死不貳即斬紹使送印綬詣操通急錄戸調朗陵長趙儼見通曰方今諸郡並叛獨陽安懷附復趣収其緜絹小人樂亂無乃不可乎通曰公與袁紹相持甚急左右郡縣背叛乃爾若緜絹不調送觀聽者必謂我顧望有所須待也儼曰誠亦如君慮然當權其輕重小緩調當為君釋此患乃書與荀彧曰今陽安郡百姓困窮鄰城並叛易用傾蕩乃一方安危之機也且此郡人執守忠節在險不貳以為國家宜垂慰撫而更急歛緜絹何以勸善彧即白操悉以緜絹還民上下歡喜郡内遂安通擊羣賊瞿㳟等皆破之遂定淮汝之地時操制新科下州郡頗増嚴峻而調緜絹方急長廣太守何䕫言於操曰先王辨九服之賦以殊遠近制三典之刑以平治亂愚以為此郡宜依遠域新邦之典其民閒小事使長吏臨時隨宜上不背正灋下以順百姓之心比及三年民安其業然後乃可齊之以灋也操從之劉備畧汝潁之閒自許以南吏民不安曹操患之曹仁曰南方以大軍方有目前急其埶不能相救劉備以彊兵臨之其背叛故宜也備新將紹兵未能得其用擊之可破也操乃使仁將騎擊備破走之盡復收諸叛縣而還備還至紹軍陰欲離紹乃説紹南連劉表紹遣備將本兵復至汝南與賊龔都等合衆數千人曹操遣將蔡楊擊之為備所殺袁紹軍陽武沮授説紹曰北兵雖衆而勁果不及南南軍榖少而資儲不如北南幸於急戰北利在緩師宜徐持乆曠以日月紹不從八月紹進營稍前依沙塠為屯東西數十里操亦分營與相當九月庚午朔日有食之曹操出兵與袁紹戰不勝復還堅壁紹為高櫓起土山射營中營中皆蒙楯而行操乃為霹靂車發石以擊紹樓皆破紹復為地道攻操操輙於内為長壍以拒之操衆少糧盡士卒疲乏百姓困於征賦多叛歸紹者操患之與荀彧書議􅁒還許以致紹師彧報曰紹悉衆聚官渡欲與公决勝敗公以至弱當至彊若不能制必為所乘是天下之大機也且紹布衣之雄耳能聚人而不能用以公之神武明哲而輔以大順何向而不濟今穀食雖少未若楚漢在滎陽成臯間也是時劉項莫肯先退者以為先退則埶屈也公以十分居一之衆畫地而守之搤其喉而不得進已半年矣情見埶竭必將有變此用竒之時不可失也操從之乃堅壁持之操見運者撫之曰却十五日為汝破紹不復勞汝矣紹運榖車數千乘至官渡荀攸言於操曰紹運車旦暮至其將韓猛鋭而輕敵擊可破也操曰誰可使者攸曰徐晃可乃遣偏將軍河東徐晃與史渙邀擊猛破走之燒其輜重冬十月紹復遣車運榖使其將淳于瓊等將兵萬餘人送之宿紹營北四十里沮授説紹可遣蔣竒别為支軍於表以絶曹操之鈔紹不從許攸曰曹操兵少而悉師拒我許下餘守埶必空弱若分遣輕軍星行掩襲許可㧞也許㧞則奉迎天子以討操操成禽矣如其未潰可令首尾犇命破之必也紹不從曰吾要當先取操㑹攸家犯灋審配收繫之攸怒遂犇操操聞攸來跣出迎之撫掌笑曰子卿逺來吾事濟矣既入坐謂操曰袁氏軍盛何以待之今有幾糧乎操曰尚可支一歲攸曰無是更言之又曰可支半歳攸曰足下不欲破袁氏邪何言之不實也操曰向言戲之耳其實可一月為之奈何攸曰公孤軍獨守外無救援而糧榖已盡此危急之日也袁氏輜重萬餘乘在故市烏巢屯軍無嚴備若以輕兵襲之不意而至燔其積聚不過三日袁氏自敗也操大喜乃留曹洪荀攸守營自將歩騎五千人皆用袁軍旗幟衘枚􅅞馬口夜從閒道出人抱束薪所歴道有問者語之曰袁公恐曹操鈔畧後軍遣兵以益備聞者信以為然皆自若既至圍屯大放火營中驚亂㑹明瓊等望見操兵少出陳門外操急擊之瓊退保營操遂攻之紹聞操擊瓊謂其子譚曰就操破瓊吾㧞其營彼固無所歸矣乃使其將高覽張郃等攻操營郃曰曹公精兵往必破瓊等瓊等破則事去矣請先往救之郭圖固請攻操營郃曰曹公營固攻之必不㧞若瓊等見禽吾屬盡為虜矣紹但遣輕騎救瓊而以重兵攻操營不能下紹騎至烏巢操左右或言賊騎稍近請分兵拒之操怒曰賊在背後乃白士卒皆殊死戰遂大破之斬瓊等盡燔其糧榖殺士卒千餘人皆取其鼻牛馬割脣舌以示紹軍紹軍將士皆恟懼郭圖慙其計之失復譖張郃於紹曰郃快軍敗郃忿懼遂與高覽焚攻具詣操營降曹洪疑不敢受荀攸曰郃計畫不用怒而來奔君有何疑乃受之於是紹軍驚擾大潰紹及譚等幅巾乘馬與八百騎渡河操追之不及盡収其輜重圖書珍寶餘衆降者操盡阬之前後所殺七萬餘人沮授不及紹渡為操軍所執乃大呼曰授不降也為所執耳操與之有舊迎謂曰分野殊異遂用圯絶不圖今日乃相禽也授曰冀州失䇿自取犇北授知力俱困宜其見禽操曰本初無謀不相用計今䘮亂未定方當與君圖之授曰叔父母弟縣命袁氏若蒙公靈速死為福操歎曰孤早相得天下不足慮也遂赦而厚遇焉授尋謀歸袁氏操乃殺之操收紹書中得許下及軍中人書皆焚之曰當紹之彊孤猶不能自保况衆人乎冀州城邑多降於操袁紹走至黎陽北岸入其將軍蔣義渠營把其手曰孤以首領相付矣義渠避帳而處之使宣號令衆聞紹在稍復歸之或謂田豐曰君必見重矣豐曰公貎寛而内忌不亮吾忠而吾數以至言迕之若勝而喜猶能赦我今戰敗而恚内忌將發吾不望生紹軍士皆拊膺泣曰向令田豐在此必不至於敗紹謂逢紀曰冀州諸人聞吾軍敗皆當念吾惟田别駕前諌止吾與衆不同吾亦慙之紀曰豐聞將軍之退拊手大笑喜其言之中也紹於是謂僚屬曰吾不用田豐言果為所笑遂殺之初曹操聞豐不從戎喜曰紹必敗矣及紹犇遁復曰向使紹用其别駕計尚未可知也審配二子為操所禽紹將孟岱言於紹曰配在位專政族大兵彊且二子在南必懷反計郭圖辛評亦以為然紹遂以岱為監軍代配守鄴䕶軍逢紀素與配不睦紹以問之紀曰配天性烈直每慕古人之節必不以二子在南為不義也願公勿疑紹曰君不惡之邪紀曰先所爭者私情也今所陳者國事也紹曰善乃不廢配配由是更與紀親冀州城邑叛紹者紹稍復擊定之紹為人寛雅有局度喜怒不形於色而性矜愎自髙短於從善故至於敗冬十月辛亥有星孛于大梁廬江太守李術攻殺揚州刺史嚴象廬江梅乾雷緒陳蘭等各聚衆數萬在江淮間曹操表沛國劉馥為揚州刺史時揚州獨有九江馥單馬造合肥空城建立州治招懷乾緒等皆貢獻相繼數年中恩化大行流民歸者以萬數於是廣屯田興陂堨官民有畜乃聚諸生立學校又高為城壘多積木石以脩戰守之備曹操聞孫䇿死欲因䘮伐之侍御史張紘諌曰乘人之䘮既非古義若其不克成讐棄好不如因而厚之操即表權為討虜將軍領㑹稽太守操欲令紘輔權内附乃以紘為㑹稽東部都尉紘至吳太夫人以權年少委紘與張昭共輔之紘思惟補察知無不為太夫人問揚武都尉㑹稽董襲曰江東可保不襲曰江東有山川之固而討逆明府恩德在民討虜承基大小用命張昭秉衆事襲等為爪牙此地利人和之時也萬無所憂權遣張紘之部或以紘本受北任嫌其志趣不止於此權不以介意魯肅將北還周瑜止之因薦肅於權曰肅才冝佐時當廣求其比以成功業權即見肅與語悦之賓退獨引肅合㯓對飲曰今漢室傾危孤思有桓文之功君何以佐之肅曰昔髙帝欲尊事義帝而不獲者以項羽為害也今之曹操猶昔項羽將軍何由得為桓文乎肅竊料之漢室不可復興曹操不可卒除為將軍計惟有保守江東以觀天下之釁耳若因北方多務勦除黄祖進伐劉表竟長江所極據而有之此王業也權曰今盡力一方冀以輔漢耳此言非所及也張昭毁肅年少麤踈權益貴重之賞賜儲偫富擬其舊權料諸小將兵少而用薄者幷合之别部司馬汝南吕䝉軍容鮮整士卒練習權大悦増其兵寵任之功曹駱統勸權尊賢接士勤求損益饗賜之日人人别進問其燥濕加以密意誘諭使言察其志趣權納用焉統俊之子也廬陵太守孫輔恐權不能保江東陰遣人齎書呼曹操行人以告權悉斬輔親近分其部曲徙輔置東曹操表徴華歆為議郎參司空軍事廬江太守李術不肯事權而多納其亡叛權以狀白曹操曰嚴刺史昔為公所用而李術害之肆其無道宜速誅滅今術必復詭説求救明公居阿衡之任海内所瞻願敇執事勿復聽受因舉兵攻術於皖城術求救於操操不救遂屠其城梟術首徙其部曲二萬餘人劉表攻張羡連年不下曹操方與袁紹相拒未暇救之羡病死長沙復立其子懌表攻懌及零桂皆平之於是表地方數千里帶甲十餘萬遂不供職貢郊祀天地居處服用僣擬乘輿焉張魯以劉璋闇懦不復承順襲别部司馬張脩殺之而幷其衆璋怒殺魯母及弟魯逐據漢中與璋為敵璋遣中郎將龎羲擊之不克璋以羲為巴郡太守屯䦘中以禦魯羲輙召漢昌賨民為兵或構羲於璋璋疑之趙韙數諌不從亦恚恨初南陽三輔民流入益州者數萬家劉焉悉収以為兵名曰東州兵璋性寛柔無威畧東州人侵暴舊民璋不能禁趙韙素得人心因益州士民之怨遂作亂引兵數萬攻璋厚賂荆州與之連和蜀郡廣漢犍為皆應之資治通鑑巻第六十三
