body:
  text: 臣司馬光奉勑編集唐紀六十九敦十月凡三年有竒起強圉作噩盡上章困僖宗惠聖恭定孝皇帝上之下乾符四年春正月王郢誘魯寔入舟中執之將士從寔者皆奔潰朝廷聞之以右龍武大將軍宋皓爲江南諸道招討使先徵諸道兵外更􅀤忠武宣武感化三道宣泗二州兵新舊合萬五千餘人並受皓節度二月郢攻陷望海鎮掠明州又攻台州陷之刺史王葆退守唐興詔二浙福建各出舟師以討之王仙芝陷鄂州黄巢陷鄆州殺節度使薛崇南詔酋龍嗣立以來爲邊患殆二十年中國爲之虛耗而其國中亦疲􅁦酋龍卒謚曰景莊皇帝子法立改元貞明承智大同國號鶴拓亦號大封人法好畋獵酣飲委國事於大臣閏月嶺南西首節度使辛讜奏南詔遣陁西叚瑳寳等來請和且言諸道兵戍邕州歲乆餽餉之費疲􅁦中國請許其和使羸瘵息肩詔許之讜遣大將杜弘等齎書幣送瑳寳還南詔但留荆南宣歙數軍戍邕州自餘諸道兵什減其七王郢横行浙西鎭海節度使裴璩嚴兵設僃不與之戰密招其黨朱實降之散其徒六七千人輸噐械二十餘萬舟航粟帛稱是敕以實爲金吾將軍於是郢黨離散郢收餘衆東至明州甬橋鎮遏使劉巨容以筒箭射殺之餘黨皆平璩諝之從曾孫也三月黄巢陷沂州夏四月壬申朔日有食之賊帥柳彦璋剽掠江西陜州軍亂逐觀察使崔碣貶碣懐州司馬黄巢與尚讓合兵保查牙山五月甲子以給事中楊損爲陜虢觀察使損至官誅首亂者損嗣復之子也初桂管觀察使李瓉失政支使薛堅石屢規正之瓉不能從及瓉被逐堅石攝留務移牒鄰道禁遏亂兵一方以安詔擢堅石爲國子博士六月柳彦璋襲陷江州執刺史陶祥使祥上表彦璋亦自附降狀敕以彦璋爲右監門將軍令散衆赴京師以左武衛將軍劉秉仁爲江州刺史彦璋不從以戰艦百餘固湓江爲水寨剽掠如故忠武都將李可封戍邊還至邠州迫脅主帥索舊欠糧鹽留止四日闔境震驚秋七月還至許州節度使崔安潛悉按誅之庚申王仙芝黄巢攻宋州三道兵與戰不利賊遂圍宋威於宋州甲寅右威衞上將軍張自勉將忠武兵七千救宋州殺賊二千餘人賊解圍遁去王鐸盧攜欲使張自勉以所將兵受宋威節度鄭畋以爲威與自勉已有疑忿若在麾下必爲所殺不肯署奏八月辛未鐸攜訴於上求罷免庚辰畋請歸滻川養疾上皆不許王仙芝䧟安州鹽州軍亂逐刺史王承顔詔髙品牛從珪往慰諭之貶承顔象州司户承顔及崔碣素有政聲以嚴肅爲驕卒所逐朝庭與貪暴致亂者同貶時人惜之從珪自鹽州還軍中請以大將王宗誠爲刺史詔宗誠詣闕將士皆釋罪仍加優給乙卯王仙芝陷隨州執刺史崔休徴山南東道節度使李福遣其子將兵救隨州戰死福奏求援兵遣左武衛大將軍李昌言將鳯翔五百騎赴之仙芝遂轉掠復郢忠武大將張貫等四千人與宣武兵援襄州自申蔡閒道逃歸詔忠武節度使崔安潜宣武節度使穆仁裕遣人約還冬十月邠寧節度使李侃奏遣兵討王宗誠斬之餘黨悉平鄭畋與王鐸盧􅂝爭論用兵於上前畋不勝退復上奏以爲自王仙芝俶擾崔安潜首請㑹兵討之繼􅀤士卒罄供資糧賊往來千里塗炭諸州獨不敢犯其境又以本道兵授張自勉解宋州圍使江淮漕運流通不輸冦手今蒙盡以自勉所將七千兵令張貫將之􅀠宋威自勉獨歸許州威復奏加誣毀因功受辱臣竊痛之安潜出師前後克捷非一一旦彊兵盡付它人良將空還若勍宼忽至何以枝梧臣請以忠武四千人授威餘三千人使自勉將之守衛其境既不侵宋威之功又免使安潜愧耻時盧􅂝不以爲然上不能決畋復上言宋威欺罔朝廷敗衂狼藉又聞王仙芝七狀請降威不爲聞奏朝野切齒以爲宜正軍法迹狀如此不應復典兵權願與内大臣參酌早行罷黜不從河中軍亂逐節度使劉侔縱兵焚掠以京兆尹竇璟爲河中宣慰制置使黄巢冦掠蘄黄曽元裕擊破之斬首四千餘級巢遁去十一月己酉以竇璟爲河中節度使招討副都監楊復光遣人説諭王仙芝仙芝遣尚君長等請降於復光宋威遣兵於道中劫取君長等十二月威奏與君長等戰於潁州西南生擒以獻復光奏君長等實降非威所擒詔侍御史歸仁紹等鞫之竟不能明斬君長等於狗脊嶺黄巢陷匡城遂陷濮州詔潁州刺史張自勉將諸道兵擊之江州刺史劉秉仁乘驛之官單舟入柳彦璋水寨賊出不意即迎拜秉仁斬彦璋散其衆王仙芝冦荆南節度使楊知温知至之兄也以文學進不知兵或告賊至知温以爲妄不設僃時漢水淺狹賊自賈塹度五年春正月丁酉朔大雪知温方受賀賊已至城下遂陷羅城將佐共治子城而守之及暮知温猶不出將佐請知温出撫士卒知温紗帽皁裘而行將佐請知温擐甲以僃流矢知温見士卒拒戰猶賦詩示幕僚遣使告急於山南東道節度使李福福悉其衆自將救之時有沙陀五百在襄陽福與之俱至荆門遇賊沙陀縱騎奮擊破之仙芝聞之焚掠江陵而去江陵城下舊三十萬户至是死者什三四壬寅招討副使曾元􅁉大破王仙芝於申州東所殺萬人招降散遣者亦萬人敕以宋威乆病罷招討使還青州以曾元裕爲招討使潁州刺史張自勉爲副使庚戌以西川節度使髙駢爲荆南節度使兼鹽鐡轉運使振武節度使李國昌之子克用爲沙陀副兵馬使戍蔚州時河南盜賊蠭起雲州沙陀兵馬使李盡忠與牙將康君立薛志勤程懐信李存璋等謀曰今天下大亂朝廷號令不復行於四方此乃英雄立功名富貴之秋也吾屬雖各擁兵衆然李振武功大官髙名聞天下其子勇冠諸軍若輔以舉事代北不足平也衆以爲然君立興唐人存璋雲州人志勤奉誠人也㑹大同防禦使叚文楚兼水陸􅀤運使代北荐饑漕運不繼文楚頗減軍士衣米又用法稍峻軍士怨怒盡忠遣君立濳詣蔚州說克用起兵除文楚而代之克用曰吾父在振武俟我禀之君立曰今機事已泄緩則生變何暇千里禀命乎於是盡忠夜帥牙兵攻牙城執文楚及判官柳漢璋等繫獄自知軍州事遣召克用克用帥其衆􅃐雲州行収兵二月庚午至城下衆且萬人屯於􅃲雞臺下壬申盡忠遣使送符印請克用爲防禦留後癸酉盡忠械文楚等五人送􅃲雞臺下克用令軍士咼而食之以騎踐其骸甲戌克用入府舍視事令將士表求敕命朝廷不許李國昌上言乞朝廷速除大同防禦使若克用違命臣請帥本道兵討之終不愛一子以負國家朝廷方欲使國昌諭克用㑹得其奏乃以司農卿支詳爲大同軍宣慰使詔國昌語克用令迎候如常儀除克用官必令稱愜又以太僕卿盧簡方爲大同防禦使貶楊知温爲郴州司馬曽元裕奏大破王仙芝於黄梅殺五萬餘人追斬仙芝傳首餘黨散去黄巢方攻毫州未下尚讓帥仙芝餘衆歸之推巢爲王號衝天大將軍改元王霸署官屬巢襲陷沂州濮州既而屢爲官軍所敗乃遺天平節度使張裼書請奏之詔以巢爲右衛將軍令就鄆州解甲巢竟不至加山南東道節度使李福同平章事賞救荆南之功也三月羣盜陷朗州岳州招討使曽元裕屯荆襄黄巢自濮州掠宋汴乃以副使張自勉充東南面行營招討使黄巢攻衛南遂攻葉陽翟詔􅀤河陽兵千人赴東都與宣武昭義兵二千人共衛宫闕以左神武大將軍劉景仁充東都應援防遏使并將三鎭兵仍聽於東都募兵二千人景仁昌之孫也又詔曽元裕將兵徑還東都􅀤義成兵三千守轘轅伊闕河隂武牢王仙芝餘黨王重隐陷洪州江西觀察使髙湘奔湖口賊轉掠湖南别將曹師雄掠宣潤詔曽元裕楊復光引兵救宣潤湖南軍亂都將髙傑逐觀察使崔瑾瑾郾之子也黄巢引兵度江攻陷䖍吉饒信等州朝廷以李克用據雲中夏四月以前大同軍防禦使盧簡方爲振武節度使以振武節度使李國昌爲大同節度使以爲克用必無以拒也詔以東都軍儲不足貸商旅冨人錢榖以供數月之費仍賜空名殿中侍御史告身五通監察御史告身十通有能出家財助國稍多者賜之時連歲旱蝗冦盜充斥耕桑半廢租賦不足內藏虛竭無所佽助兵部侍郎判度支楊嚴三表自陳才短不能濟辦乞解使務辭極哀切詔不許曹師雄冦湖州鎭海節度使裴璩遣兵擊破之王重隠死其將徐唐莒據洪州饒州將彭㓜璋合義營兵克復饒州南詔遣其酋望趙宗政來請和親無表但令督爽牒中書請爲弟而不稱臣詔百官議之禮部侍郎崔澹等以爲南詔驕僭無禮髙駢不達大體反因一僧呫囁卑辭誘致其使若從其請恐垂􅀏後代髙駢聞之上表與澹爭辨詔諭解之澹璵之子也五月丙申朔鄭畋盧􅂝議蠻事􅂝欲與之和親畋固爭以爲不可􅂝怒拂衣起袂罥硯墯地破之上聞之曰大臣相詬何以儀刑四海丁酉畋􅂝皆罷爲太子賔客分司以翰林學士承㫖户部侍郎豆盧瑑爲兵部侍郎吏部侍郎崔沆爲户部侍郎並同平章事時宰相有好施者常使人以布囊貯錢自隨行施匄者每出襤褸盈路有朝士以書規之曰今百姓疲弊冦盜充斥相公宜舉賢任能紀綱庶務捐不急之費杜私謁之門使萬物各得其所則家給人足自無貧者何必如此行小惠乎宰相大怒邕州大將杜􅀪送叚瑳寳至南詔踰年而還甲辰辛讜復遣攝廵官賈宏大將左瑜曹朗使於南詔李國昌欲父子并據兩鎮得大同制書毁之殺監軍不受代與李克用合兵陷遮虜軍進擊寧武及岢嵐軍盧簡方赴振武至嵐州而薨丁巳河東節度使竇澣􅀤民塹晉陽己未以都押衙康傳圭爲代州刺史又􅀤土團千人戍代州土團至城北娖隊不􅀤求優賞時府庫空竭澣遣馬歩都虞候鄧䖍往慰諭之土團咼䖍牀舁其尸入府澣與監軍自出慰諭人給錢三百布一端衆乃定押牙田公鍔給亂軍錢布衆遂劫之以爲都將赴代州澣借商人錢五萬緍以助軍朝廷以澣爲不才六月以前昭義節度使曹翔爲河東節度使王仙芝餘黨剽掠浙西朝廷以荆南節度使髙駢先在天平有威名仙芝黨多鄆人乃徙駢爲鎮海節度使沙陀焚唐林崞縣入忻州境秋七月曹翔至晉陽己亥捕土團殺鄧䖍者十三人殺之義武兵至晉陽不解甲讙譟求優賞翔斬其十將一人乃定􅀤義成忠武昭義河陽兵㑹于晉陽以禦沙陀八月戊寅曹翔引兵救忻州沙陀攻岢嵐軍陷其羅城敗官軍於洪谷晉陽閉門城守黄巢冦宣州宣歙觀察使王凝拒之敗於南陵巢攻宣州不克乃引兵入浙東開山路七百里攻剽福建諸州九月平盧軍奏節度使宋威薨辛丑以諸道行營招討使曽元裕領平盧節度使壬寅曹翔暴薨丙午昭義兵大掠晉陽坊市民自共擊之殺千餘人乃潰中書侍郎同平章事李蔚罷爲東都留守以吏部尚書鄭從讜爲中書侍郎同平章事從讜餘慶之孫也以户部尚書判户部事李都同平章事兼河中節度使冬十月詔昭義節度使李鈞幽州節度使李可舉與吐谷渾酋長赫連鐸白義誠沙陀酋長安慶薩葛酋長米海萬合兵討李國昌父子於蔚州十一月甲午岢嵐軍翻城應沙陀丁未以河東宣慰使崔季康爲河東節度代北行營招討使沙陀攻石州庚戌崔季康救之十二月甲戌黄巢陷福州觀察使韋岫弃城走南詔使者趙宗政還其國中書不荅督爽牒但作西川節度使崔安濳書意使安濳荅之崔季康及昭義節度使李鈞與李克用戰於洪谷兩鎮兵敗鈞戰死昭義兵還至代州士卒剽掠代州民殺之殆盡餘衆自鵶鳴谷走歸上黨王郢之亂臨安人董昌以土團討賊有功補石鏡鎮將是歲曹師雄冦掠二浙杭州募諸縣鄉兵各千人以討之昌與錢塘劉孟安阮結富陽聞人宇鹽官徐及新城杜稜餘杭凌文舉臨平曹信各爲之都將號杭州八都昌爲之長其後宇卒錢塘人成及代之臨安人錢鏐以驍勇事昌以功爲石鏡都知兵馬使六年春正月魏王佾薨鎮海節度使髙駢遣其將張璘梁纉分道擊黄巢屢破之降其將秦彦畢師鐸李罕之許勍等數十人巢遂趣廣南彦徐州人師鐸寃句人罕之項城人也賈宏等未至南詔相繼卒於道中從者死亦太半時辛讜已病風痺召攝巡官徐雲䖍執其手曰讜已奏朝廷􅀤使入南詔而使者相繼物故柰何吾子既仕則思徇國能爲此行乎讜恨風痺不能拜耳因嗚咽流涕雲䖍曰士爲知己死明公見辟恨無以報徳敢不承命讜喜厚具資裝而遣之二月丙寅雲䖍至善闡城驃信見大使抗禮受副使以下拜己巳驃信使慈雙羽楊宗就館謂雲䖍曰貴府牒欲使驃信稱臣奉表貢方物驃信已遣人自西川入唐與唐約爲兄弟不則舅甥夫兄弟舅甥書幣而已何表貢之有雲䖍曰驃信既欲爲弟爲甥驃信景莊之子景莊豈無兄弟於驃信爲諸父驃信爲君則諸父皆稱臣况弟與甥乎且驃信之先由大唐之命得合六詔爲一恩徳深厚中閒小忿罪在邊鄙今驃信欲修舊好豈可違祖考之故事乎順祖考孝也事大國義也息戰爭仁也審名分禮也四者皆令徳也可不勉乎驃信待雲䖍甚厚雲䖍留善闡十七日而還驃信以木夾二授雲䖍其一上中書門下其一牒嶺南西道然猶未肻奉表稱貢辛未河東軍至静樂士卒作亂殺孔目官石裕等壬申崔季康逃歸晉陽甲戌都頭張鍇郭昢帥行營兵攻東陽門入府殺季康辛巳以陜虢觀察使髙潯爲昭義節度使以邠寧節度使李侃爲河東節度使三月天平軍節度使張裼薨牙將崔君裕自知州事淄州刺史曹全晸討誅之夏四月庚申朔日有食之西川節度使崔安濳到官不詰盜蜀人怪之安濳曰盜非所由通容則不能爲今窮覈則應坐者衆搜捕則徒爲煩擾甲子出庫錢千五百緍分置三市置牓其上曰有能告捕一盜賞錢五百緍盜不能獨爲必有侶侶者告捕釋其罪賞同平人未㡬有捕盜而至者盜不服曰汝與我同爲盜十七年贓皆平分汝安能捕我我與汝同死耳安濳曰汝既知吾有牓何不捕彼以來則彼應死汝受賞矣汝既爲所先死復何辭立命給捕者錢使盜視之然後冎盜於市并滅其家於是諸盜與其侶互相疑無地容足夜不及旦散逃出境境内遂無一人之盜安潜以蜀兵怯弱奏遣大將齎牒詣陳許諸州募壯士與蜀人相雜訓練用之得三千人分爲三軍亦戴黄帽號黄頭軍又奏乞洪州弩手教蜀人用弩走丸而射之選得千人號神機弩營蜀兵由是浸彊涼王侹薨上以羣盜爲憂王鐸曰臣爲宰相之長在朝不足分陛下之憂請自督諸將討之乃以鐸守司徒兼侍中充荆南節度使南面行營招討都統五月辛卯敕賜河東軍士銀牙將賀公雅所部士卒作亂焚掠三城執孔目官王敬送馬歩司節度使李侃與監軍自出慰諭爲之斬敬於牙門乃定泰寧節度使李係晟之曽孫也有口才而實無勇略王鐸以其家世良將奏爲行營副都統兼湖南觀察使使將精兵五萬并土團屯潭州以塞嶺北之路拒黄巢河東都虞候每夜密捕賀公雅部卒作亂者族滅之丁巳餘黨近百人稱報寃將大掠三城焚馬歩都虞候張鍇府城都虞候郭昢家節度使李􅋲下令以軍府不安曲順軍情収鍇昢斬於牙門并逐其家以賀公雅爲馬歩都虞候鍇昢臨刑泣言於衆曰所殺皆捕盗司密申今日寃死獨無烈士相救乎於是軍士復大譟簒取鍇昢歸都虞候司尋下令復其舊職并召還其家収捕盗司元義宗等三十餘家誅㓕之己未以馬歩都教練使朱玫等爲三城斬斫使將兵分捕報寃將悉斬之軍城始定黄巢與浙東觀察使崔璆嶺南東道節度使李迢書求天平節度使二人爲之奏聞朝廷不許巢復上表求廣州節度使上命大臣議之左僕射于琮以爲廣州市舶寳貨所聚豈可令賊得之亦不許乃議别除官六月宰相請除巢率府率從之河東節度使李侃以軍府數有亂稱疾請尋醫敕以代州刺史康傳圭爲河東行軍司馬徴侃詣京師秋八月甲子侃􅀤晉陽尋以東都留守李蔚同平章事充河東節度使鎮海節度使髙駢奏請以權舒州刺史郎幼復充留後守浙西遣都知兵馬使張璘將兵五千於郴州守險兵馬留後王重任將兵八千於循潮二州邀遮臣將萬人自大􅁃嶺趣廣州擊黄巢聞臣往必當遁逃乞敕王鐸以所部兵三萬於梧昭桂永四州守險詔不許九月黄巢得率府率告身大怒詬執政急攻廣州即日陷之執節度使李迢轉掠嶺南州縣巢使迢草表述其所懐迢曰予代受國恩親戚滿朝腕可斷表不可草巣殺之冬十月以鎮海節度使髙駢爲淮南節度使充鹽鐵轉運使以涇原節度使周寳爲鎮海節度使以山南東道行軍司馬劉巨容爲節度使寳平州人也黄巢在嶺南士卒罹瘴疫死者什三四其徒勸之北還以圖大事巢從之自桂州編大栰數十乘暴水㳂湘江而下厯衡永州癸未抵潭州城下李係嬰城不敢出戰巢急攻一日陷之係奔朗州巢盡殺戍兵流尸蔽江而下尚讓乘勝進逼江陵衆號五十萬時諸道兵未集江陵兵不滿萬人王鐸留其將劉漢宏守江陵自帥衆趣襄陽云欲㑹劉巨容之師鐸既去漢宏大掠江陵焚蕩殆盡士民逃竄山谷㑹大雪僵尸滿野後旬餘賊乃至漢宏兖州人也帥其衆北歸爲羣盜閏月丁亥朔河東節度使李蔚有疾以供軍副使李邵權觀察留後監軍李奉臯權兵馬留後己丑蔚薨都虞候張鍇郭昢等署狀納邵以少尹丁球知觀察留後十一月戊午以定州已來制置使萬年王處存爲義武節度使河東行軍司馬鴈門闗已來制置使康傳圭爲河東節度使黄巢北趣襄陽劉巨容與江西招討使淄州刺史曹全晸合兵屯荆門以拒之賊至巨容伏兵林中全晸以輕騎逆戰陽不勝而走賊追至伏􅀤大破賊衆乘勝逐北比至江陵俘斬其什七八巢與尚讓收餘衆度江東走或勸巨容窮追賊可盡也巨容曰國家喜負人有急則撫存將士不愛官賞事寧則弃之或更得罪不若留賊以爲富貴之資衆乃止全晸度江追賊㑹朝廷以泰寧都將叚彦謨代爲招討使全晸亦止由是賊勢復振攻鄂州陷其外郭轉掠饒信池宣歙杭等十五州衆至二十萬康傳圭自代州赴晉陽庚辰至烏城驛張鍇郭昢出迎亂刀斫殺之至府又族其家十二月以王鐸爲太子賔客分司初兵部尚書盧􅂝嘗薦髙駢可爲都統至是駢將張璘等屢破黄巢乃復以􅂝爲門下侍郎平章事凡闗東節度使王鐸鄭畋所除者多易置之是嵗桂陽賊陳彦謙陷栁州殺刺史董岳廣明元年春正月乙卯朔改元沙陀入鴈門闗冦忻代二月庚戌沙陀二萬餘人逼晉陽辛亥陷太谷遣汝州防禦使博昌諸葛爽帥東都防禦兵救河東河東節度使康傳圭專事威刑多復仇怨强取富人財遣前遮虜軍使蘇弘軫擊沙陀於太谷至秦城遇沙陀戰不利而還傳圭怒斬􅀪軫時沙陀已還代北傳圭遣都教練使張彦球將兵三千追之壬戌至百井軍變還趣晉陽傳圭閉城拒之亂兵自西明門入殺傳圭監軍周從寓自出慰諭乃定以彦球爲府城都虞候朝廷聞之遣使宣慰曰所殺節度使事出一時各宜自安勿復憂懼左拾遺侯昌業以盜賊滿闗東而上不親政事專務遊戲賞賜無度田令孜專權無上天文變異社稷將危上䟽極諌上大怒召昌業至内侍省賜死上善騎射劒槊法筭至於音律蒱博無不精妙好蹴鞠闘雞與諸王賭鵝鵝一頭至直五十緡尤善擊毬嘗謂優人石野猪曰朕若應擊毬進士舉須爲狀元對曰若遇堯舜作禮部侍郎恐陛下不免駮放上笑而已度支以用度不足奏借富户及胡商貨財敕借其半鹽鐵轉運使髙駢上言天下盜賊蜂起皆出於饑寒獨富户胡商未耳乃止髙駢奏改楊子院爲􅀤運使三月庚午以左金吾大將軍陳敬瑄爲西川節度使敬瑄許州人田令孜之兄也初崔安潜鎮許昌令孜爲敬瑄求兵馬使安潜不許敬瑄因令孜得􅀠左神䇿軍數歲累遷至大將軍令孜見闗東羣盜日熾隂爲幸蜀之計奏以敬瑄及其腹心左神䇿大將軍楊師立牛朂羅元杲鎮三川上令四人擊毬賭三川敬瑄得第一籌即以爲西川節度使代安潜辛未以門下侍郎同平章事鄭從讜同平章事充河東節度使康傳圭既死河東兵益驕故以宰相鎮之使自擇參佐從讜奏以長安令王調爲節度副使前兵部員外郎史館修撰劉崇􅀛爲節度判官前司勲員外郎史館修撰趙崇爲觀察判官前進士劉崇魯爲推官時人謂之小朝廷言名士之多也崇􅀛崇魯政㑹之七世孫也時承晉陽新亂之後日有殺掠從讜貎温而氣勁多謀而善斷將士欲爲惡者從讜輒先覺誅之姧猾惕息爲善者撫待無疑知張彦球有方略百井之變非本心獨推首亂者殺之召彦球慰諭悉以兵柄委之軍中由是遂安彦球爲從讜盡死力卒獲其用淮南節度使髙駢遣其將張璘等擊黄巢屢捷盧􅂝奏以駢爲諸道行營兵馬都統駢乃傳檄徵天下兵且廣召募得土客之兵共七萬威望大振朝廷深􅀝之安南軍亂節度使曾衮出城避之諸道兵戍邕管者往往自歸夏四月丁酉以太僕卿李琢爲蔚朔等州招討都統行營節度使琢聽之子也張璘度江擊賊帥王重霸降之屢破黄巢軍巢退保饒州别將常宏以其衆數萬降璘攻饒州克之巢走時江淮諸軍屢奏破賊率皆不實宰相以下表賀朝廷差以自安以李琢爲蔚朔節度使仍充都統以楊師立爲東川節度使牛朂爲山南西道節度使以諸葛爽爲北面行營副招討初劉巨容既還襄陽荆南監軍楊復光以忠武都將宋浩權知府事泰寧都將叚彦謩以兵守其城詔以浩爲荆南安撫使彦謩恥居其下浩禁軍士翦伐街中槐柳彦謩部卒犯令浩杖其背彦謩怒挾刅馳入并其二子殺之復光奏浩殘酷爲衆所誅詔以彦謩爲朗州刺史以工部侍郎鄭紹業爲荆南節度使五月丁巳以汝州防禦使諸葛爽爲振武節度使劉漢宏之黨浸盛侵掠宋兖甲子徴東方諸道兵討之黄巢屯信州遇疾疫卒徒多死張璘急擊之巢以金啗璘且致書請降於髙駢求駢保奏駢欲誘致之許爲之求節鉞時昭義感化義武等軍皆至淮南駢恐分其功乃奏賊不日當平不煩諸道兵請悉遣歸朝廷許之賊詗知諸道兵已北度淮乃告絶於駢且請戰駢怒令璘擊之兵敗璘死巢􅀔復振乙亥以樞密使西門思恭爲鳯翔監軍丙子以宣徽使李順融爲樞密使皆降白麻於閤門出案與將相同西川節度使陳敬瑄素㣲賤報至蜀蜀人皆驚莫知爲誰有青城妖人乘其聲􅀔帥其黨詐稱陳僕射止逆旅呼廵虞候索白馬甚急馬歩使瞿大夫覺其妄執之沃以狗血即引服悉誅之六月庚寅敬瑄至成都黄巢别將陷睦州婺州盧􅂝病風不能行謁告己亥始入對敕勿拜遣二黄門掖之攜内挾田令孜外倚髙駢上寵遇甚厚由是專制朝政髙下在心既病精神不完事之可否決於親吏楊温李修貨賂公行豆盧瑑無它才專附㑹攜崔沆時有啓陳常爲所沮庚子李琢奏沙陀二千來降琢將兵萬人屯代州與盧龍節度使李可舉吐谷渾都督赫連鐸共討沙陀李克用遣大將髙文集守朔州自將其衆拒可舉於雄武軍鐸遣人説文集歸國文集執克用將傅文達與沙陀酋長李友金薩葛都督米海萬安慶都督史敬存皆降於琢開門迎官軍友金克用之族父也庚戌黄巢攻宣州陷之劉漢宏南掠申光趙宗政之還南詔也西川節度使崔安濳表以崔澹之議爲是且曰南詔小蠻本雲南一郡之地今遣使與和彼謂中國爲怯復求尚主何以拒之上命宰相議之盧攜豆盧瑑上言大中之末府庫充實自咸通以來蠻兩陷安南邕管一入黔中四犯西川徴兵運糧天下疲􅁦踰十五年租賦太半不入京師三使内庫由兹虚竭戰士死於瘴癘百姓困爲盜賊致中原榛􅂎皆蠻故也前歲冬蠻不爲冦由趙宗政未歸去歲冬蠻不爲冦由徐雲䖍復命蠻尚有冀望今安南子城爲叛卒所據節度使攻之未下自餘戍卒多已自歸邕管客軍又減其半冬期且至儻蠻冦侵軼何以支梧不若且遣使臣報復縱未得其稱臣奉貢且不使之懐怨益深堅決犯邊則可矣乃作詔賜陳敬瑄許其和親不稱臣令敬瑄録詔白并移書與之仍増賜金帛以嗣曹王􅀛年爲宗正少卿充使以徐雲䖍爲副使别遣内使共齎詣南詔秋七月黄巢自采石度江圍天長六合兵勢甚盛淮南將畢師鐸言於髙駢曰朝廷倚公爲安危今賊數十萬衆乘勝長驅若渉無人之境不據險要之地以擊之使踰長淮不可復制必爲中原大患駢以諸道兵已散張璘復死自度力不能制畏怯不敢出兵但命諸將嚴備自保而已且上表告急稱賊六十餘萬屯天長去臣城無五十里先是盧􅂝謂駢有文武長才若悉委以兵柄黄巢不足平朝野雖有謂駢不足恃者然猶庶㡬望之及駢表至上下失望人情大駭詔書責駢散遣諸道兵致賊乘無備度江駢上表言臣奏聞遣歸亦非自專今臣竭力保衛一方必能濟辦但恐賊迤邐過淮宜急敕東道將士善爲禦僃遂稱風痺不復出戰詔河南諸道􅀤兵屯溵水泰寧節度使齊克讓屯汝州以僃黄巢辛酉以淄州刺史曹全晸爲天平節度使兼東面副都統劉漢宏請降戊辰以爲宿州刺史李克用自雄武軍引兵還擊髙文集於朔州李可舉遣行軍司馬韓玄紹邀之於藥兒嶺大破之殺七千餘人李盡忠程懐信皆死又敗之於雄武軍之境殺萬人李琢赫連鐸進攻蔚州李國昌戰敗部衆皆潰獨與克用及宗族北入達靻詔以鐸爲雲州刺史大同軍防禦使吐谷渾白義成爲蔚州刺史薩葛米海萬爲朔州刺史加李可舉兼侍中達靻本靺羯之别部也居于隂山後數月赫連鐸隂賂達靼使取李國昌父子李克用知之時與其豪帥遊獵置馬鞭木葉或懸針射之無不中豪帥心服又置酒與飲酒酣克用言曰吾得罪天子願效忠而不得今聞黄巢北來必爲中原患一旦天子若赦吾罪得與公輩南向共立大功不亦快乎人生㡬何誰能老死沙磧邪逹靻知無留意乃止八月甲午以前西川節度使崔安濳爲太子賔客分司九月東都奏汝州所募軍李光庭等五百人自代州還過東都燒安喜門焚掠市肆由長夏門去黄巢衆號十五萬曹全晸以其衆六千與之戰頗有殺獲以衆寡不敵退屯泗上以俟諸軍至併力擊之而髙駢竟不之救賊遂擊全晸破之徐州遣兵三千赴溵水過許昌徐卒素名凶悖節度使薛能自謂前鎮彭城有恩信於徐人館之毬􅂣及暮徐卒大譟能登子城樓問之對以供僃踈闕慰勞乆之方定許人大懼時忠武亦遣大將周岌詣溵水行未逺聞之夜引兵還比明入城襲擊徐卒盡殺之且怨能之厚徐卒也遂逐之能將奔襄陽亂兵追殺之并其家岌自稱留後汝鄭把截制置使齊克讓恐爲岌所襲引兵還兖州於是諸道兵屯溵水者皆散黄巢遂悉衆度淮所過不虜掠惟取丁壯以益兵先是徴振武節度使吴師泰爲左金吾大將軍以諸葛爽代之師泰見朝廷多故使軍民上表留已冬十月復以師泰爲振武節度使以爽爲夏綏節度使黄巢䧟申州遂入潁宋徐兖之境所至吏民逃潰羣盜陷澧州殺刺史李詢判官皇甫鎭鎭舉進士二十三上不中第詢辟之賊至城陷鎮走問人曰使君免乎曰賊執之矣鎮曰吾受知若此去將何之遂還詣賊竟與同死資治通鑑巻第二百五十三唐僖宗
