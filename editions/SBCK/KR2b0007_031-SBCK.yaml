body:
  text: 閏月壬戌于永卒烏孫小昆彌烏就屠死子拊離代立為弟日貳所殺漢遣使者立拊離子安日為小昆彌日貳亡阻康居安日使貴人姑莫匿等三人詐亡從日貳刺殺之於是西域諸國上書願復得前都䕶叚㑹宗上從之城郭諸國聞之皆翕然親附谷永奏言聖主不以名譽加於實效御史大夫任重職大少府宣逹於從政唯陛下留神考察上然之鴻嘉元年春正月癸巳以薛宣為御史大夫二月壬午上行幸初陵赦作徒以新豐戲鄉為昌陵縣奉初陵上始為㣲行從期門郎或私奴十餘人或乗小車或皆騎出入市里郊野逺至旁縣甘泉長楊五柞鬭雞走馬常自稱富平侯家人富平侯者張安世四世孫放也放父臨尚敬武公主生放放為侍中中郎将娶許皇后女弟當時寵幸無比故假稱之三月庚戌張禹以老病罷以列侯朝朔望位特進見禮如丞相賞賜前後數千萬夏四月庚辰薛宣為丞相封髙陽侯京兆尹王駿為御史大夫王音旣以從舅越親用事小心親職上以音自御史大夫入為将軍不獲宰相之封六月乙巳封音為安陽侯冬黄龍見真定是嵗匈奴復株累單于死弟且麋胥立為搜諧若鞮單于遣子左祝都韓王昫留斯侯入侍以且莫車為左賢王二年春上行幸雲陽甘泉三月博士行大射禮有飛雉集于庭歴階登堂而雊後雉又集大常宗正丞相御史大夫車騎将軍之府又集未央宫承明殿屋上車騎将軍王音待詔寵等上言天地之氣以類相應譴告人君甚㣲而著雉者聽察先聞雷聲故月令以紀氣經載髙宗雊雉之異以明轉禍為福之驗今雉以傅士行禮之日大衆聚會飛集於庭歴階登堂萬衆睢睢驚怪連日徑歴三公之府大常宗正典宗廟骨肉之官然後入宫其宿留告曉人具備深切雖人道相戒何以過是後帝使中常侍鼂閎詔音曰聞捕得雉毛羽頗摧折類拘執者得無人為之音復對曰陛下安得亡國之語不知誰主為佞讇之計誣亂聖徳如此者左右阿䛕甚衆不待臣音復讇而足公卿以下保位自守莫有正言如令陛下覺寤懼大禍且至身深責臣下繩以聖灋臣音當先誅豈有以自解哉今即位十五年繼嗣不立日日駕車而出失行流聞海内􅀓之甚於京師外有㣲行之害内有疾病之憂皇天數見災異欲人變更終巳不改天尚不能感動陛下臣子何望獨有極言待死命在朝暮而巳如有不然老母安得處所尚何皇太后之有髙祖天下當以誰屬乎冝謀於賢智克已復禮以求天意繼嗣可立災變尚可銷也初元帝儉約渭陵不復徙民起邑帝起初陵數年後樂霸陵曲亭南更營之将作大匠解萬年使陳湯為奏請為初陵徙民起邑欲自以為功求重賞湯因自請先徙冀得美田宅上從其言果起昌陵邑夏徙郡國豪桀貲五百萬以上五千户于昌陵五月癸未隕石于杜郵三六月立中山憲王孫雲客為廣徳王是嵗城陽哀王雲薨無子國除三年夏四月赦天下大旱王氏五矦争以奢侈相尚成都矦商甞病欲避暑從上借明光宫後又穿長安城引内灃水注第中大陂以行船立羽蓋張周帷楫棹越歌上幸商第見穿城引水意恨内銜之未言後微行出過曲陽矦第又見園中土山漸臺象白虎殿於是上怒以讓車騎将軍音商根兄弟欲自黥劓以謝太后上聞之大怒乃使尚書責問司􅀠校尉京兆尹知成都矦商等奢僣不軌藏匿姦猾皆阿縦不舉奏正灋二人頓首省户下又賜車騎将軍音䇿書曰外家何甘樂禍敗而欲自黥劓相戮辱於太后前傷慈母之心以危亂國家外家宗族彊上一身寖弱日乆今将一施之君其召諸侯令待府舎是日詔尚書奏文帝時誅将軍薄昭故事車騎将軍音藉稾請罪商立根皆負斧質謝良乆乃巳上特欲恐之實無意誅也秋八月乙卯孝景廟北闕災初許皇后與斑偼伃皆有寵於上上甞遊後庭欲與倢伃同輦載倢伃辭曰觀古圗畫賢聖之君皆有名臣在側三代末主乃有嬖妾今欲同輦得無近似之乎上善其言而止太后聞之喜曰古有樊姬今有斑偼伃斑偼伃進侍者李平得幸亦爲偼伃賜姓曰衛其後上㣲行過陽阿主家恱歌舞者趙飛燕召入宫大幸有女弟復召入姿性尤醲粹左右見之皆嘖嘖嗟賞有宣帝時披香博士淖方成在帝後唾曰此禍水也㓕火必矣姊弟俱爲偼伃貴傾後宫許皇后斑偼伃皆失寵於是趙飛燕譛告許皇后斑偼伃挾媚道祝詛後宮詈及主上冬十一月甲寅許后廢處昭臺宫后姊謁等皆誅死親屬歸故郡考問斑倢伃倢伃對曰妾聞死生有命富貴在天脩正尚未䝉福爲邪欲以何望使鬼神有知不受不臣之愬如其無知愬之何益故不爲也上善其對赦之賜黄金百斤趙氏姊弟驕妬偼伃恐乆見危乃求共養太后於長信宫上許焉廣漢男子鄭躬等六十餘人攻官寺簒囚徒盗庫兵自稱山君四年秋勃海清河信都河水湓溢灌縣邑三十一敗官亭民舎四萬餘所平陵李尋等奏言議者常欲求索九河故迹而穿之今因其自决可且勿塞以觀水埶河欲居之當稍自成川跳出沙土然後順天心而圗之必有成功而用財力寡於是遂止不塞朝臣數言百姓可哀上遣使者處業振贍之廣漢鄭躬等黨與濅廣犯歴四縣衆且萬人州郡不能制冬以河東都尉趙護爲廣漢太守發郡中及蜀郡合三萬人擊之或相捕斬除罪旬月平遷䕶為執金吾賜黄金百斤是嵗平阿安侯王譚薨上悔廢譚使不輔政而薨也乃復成都侯商以特進領城門兵置幕府得舉吏如将軍魏郡杜鄴時為郎素善車騎将軍音見音前與平阿侯有隙即説音曰夫戚而不見殊孰能無怨昔秦伯有千乗之國而不能容其母弟春秋譏焉周召則不然忠以相輔義以相匡同己之親等已之尊不以聖徳獨兼國寵又不為長専受榮任分職於陜並為弼疑故内無感恨之隙外無侵侮之羞俱享天祐兩荷髙名者蓋以此也竊見成都侯以特進領城門兵復有詔得舉吏如五府此明詔所欲寵也将軍宜承順聖意加異往時每事凡議必與及之發於至誠則孰不説諭音甚嘉其言由是與成都侯商親密二人皆重鄴永始元年春正月癸丑大官凌室火戊午戾后園南闕火上欲立趙偼伃為皇后皇太后嫌其所出㣲甚難之太后姊子淳于長為侍中數往來通語東宫嵗餘乃得太后指許之夏四月乙亥上先封偼伃父臨為成陽侯諌大夫河間劉輔上書言昔武王周公承順天地以饗魚烏之瑞然猶君臣祗懼動色相戒况於季世不䝉繼嗣之福屢受威怒之異者虖雖夙夜自責改過易行畏天命念祖業妙選有徳之世考卜窈窕之女以承宗廟順神祗心塞天下望子孫之祥猶恐晚暮今乃觸情縱欲傾於卑賤之女欲以母天下不畏于天不媿于人惑莫大焉里語曰腐木不可以為柱人婢不可以為主天人之所不予必有禍而無福市道皆共知之朝廷莫肯壹言臣竊傷心不敢不盡死書奏上使侍御史收縛輔繫掖庭祕獄羣臣莫知其故於是左将軍辛慶忌右将軍亷襃光禄勲琅邪師丹太中大夫谷永俱上書曰竊見劉輔前以縣令求見擢為諌大夫此其言必有卓詭切至當聖心者故得拔至於此旬月之間收下祕獄臣等愚以為輔幸得託公族之親在諫臣之列新從下土來未知朝廷體獨觸忌諱不足深過小罪宜隠忍而巳如有大惡宜暴治理官與衆共之今天心未豫災異屢降水旱迭臻方當隆寛廣問襃直盡下之時也而行慘急之誅於諫争之臣震驚羣下失忠直心假令輔不坐直言所坐不著天下不可户曉同姓近臣本以言顯其於治親養忠之義誠不宜幽囚于掖庭獄公卿以下見陛下進用輔亟而折傷之暴人有懼心精鋭銷耎莫敢盡節正言非所以昭有虞之聴廣徳美之風臣等竊深傷之唯陛下留神省察上乃徙繫輔共工獄减死罪一等論為鬼薪初太后兄弟八人獨弟曼早死不侯太后憐之曼寡婦渠供養東宫子莽幼孤不及等比其羣兄弟皆将軍五侯子乗時侈靡以輿馬聲色佚游相髙莽因折節為恭儉勤身博學被服如儒生事母及寡嫂養孤兄子行甚敕備又外交英俊内事諸父曲有禮意大将軍鳳病莽侍疾親甞藥亂首垢面不解衣帶連月鳳且死以託太后及帝拜為黄門郎遷射聲校尉乆之叔父成都侯商上書願分户邑以封莽長樂少府戴崇侍中金渉中郎陳湯等皆當世名士咸為莽言上由是賢莽太后又數以為言五月乙未封莽為新都侯遷騎都尉光禄大夫侍中宿衞謹敕爵位益尊節操愈謙散輿馬衣裘振施賔客家無所餘收贍名士交結将相卿大夫甚衆故在位更推薦之游者為之談説虚譽隆洽傾其諸父矣敢為激發之行處之不慙恧甞私買侍婢昆弟或頗聞知莽因曰後将軍朱子元無子莽聞此兒種宜子爲買之即日以婢奉朱博其匿情求名如此六月丙寅立皇后趙氏大赦天下皇后既立寵少衰而其女弟絶幸為昭儀居昭陽舎其中庭彤朱而殿上髹漆切皆銅沓黄金塗白玉階璧帶往往為黄金缸函藍田璧明珠翠羽飾之自後宫未甞有焉趙后居别館多通侍郎宫奴多子者昭儀嘗謂帝曰妾姊性剛有如為人搆陷則趙氏無種矣因泣下悽惻帝信之有白后姦狀者帝輙殺之由是后公為淫恣無敢言者然卒無子光禄大夫劉向以為王教由内及外自近者始於是採取詩書所載賢妃貞婦興國顯家及孽嬖亂亡者序次為列女傳凡八篇及采􅀓記行事著新序説􅁐凡五十篇奏之數上䟽言得失陳灋戒書數十上以助觀覽補遺闕上雖不能盡用然内嘉其言常嗟嘆之昌陵制度奢泰乆而不成劉向上疏曰臣聞王者必通三統明天命所授者博非獨一姓也自古及今未有不亡之國孝文皇帝嘗美石椁之固張釋之曰使其中有可欲雖錮南山猶有隙夫死者無終極而國家有廢興故釋之之言為無窮計也孝文寤焉遂薄葬棺槨之作自黄帝始黄帝尭舜禹湯文武周公丘隴皆小葬具甚㣲其賢臣孝子亦承命順意而薄葬之此誠奉安君父忠孝之至也孔子葬母於防墳四尺延陵季子葬其子封墳掩坎其髙可隠故仲尼孝子而延陵慈父舜禹忠臣周公弟弟其葬君親骨肉皆㣲薄矣非茍為儉誠便於體也秦始皇帝葬於驪山之阿下錮三泉上崇山墳水銀爲江海黄金爲鳬鴈珍寶之臧機械之變棺椁之麗宫館之盛不可勝原天下苦其役而反之驪山之作未成而周章百萬之師至其下矣項籍燔其宫室營宇牧兒持火照求亡羊失火燒其臧椁自古至今葬未有盛如始皇者也數年之間外被項籍之災内離牧豎之禍豈不哀哉是故徳彌厚者葬彌薄知愈深者葬愈㣲無徳寡知其葬愈厚丘隴彌髙宫廟甚麗發掘必速由是觀之明暗之效葬之吉凶昭然可見矣陛下即位躬親節儉始營初陵其制約小天下莫不稱賢明及徙昌陵増埤爲髙積土爲山發民墳墓積以萬數營起邑居期日廹卒功費大萬百餘死者恨於下生者愁於上臣甚惽焉以死者為有知發人之墓其害多矣若其無知又安用大謀之賢知則不説以示衆庶則苦之若茍以説愚夫淫侈之人又何為哉唯陛下上覽明聖之制以為則下觀亡秦之禍以為戒初陵之模宜從公卿大臣之議以息衆庶上感其言初解萬年自詭昌陵三年可成卒不能就羣臣多言其不便者下有司議皆曰昌陵因卑為髙度便房猶在平地上客土之中不保幽冥之靈淺外不固卒徒工庸以鉅萬數至然脂火夜作取土東山且與穀同賈作治數年天下徧被其勞故陵因天性據真土處埶髙敞旁近祖考前又已有十年功緒宜還復故陵勿徙民便秋七月詔曰朕執徳不固謀不盡下過聽将作大匠萬年言昌陵三年可成作治五年中陵司馬殿門内尚未加功天下虛耗百姓罷勞客土䟽惡終不可成朕惟其難怛然傷心夫過而不改是謂過矣其罷昌陵及故陵勿徙吏民令天下毋有動揺之心初鄼侯蕭何之子孫嗣為侯者無子及有罪凡五絶祀髙后文帝景帝武帝宣帝思何之功輒以其支庶紹封是嵗何七世孫鄼侯獲坐使奴殺人减死完為城旦先是上詔有司訪求漢初功臣之後乆未省録杜業説上曰唐虞三代皆封建諸侯以成太平之美是以燕齊之祀與周並傳子繼弟及歴載不墮豈無刑辟繇祖之竭力故支庶賴焉迹漢功臣亦皆割符世爵受山河之誓百餘年閒而襲封者盡朽骨孤於墓苖裔流於道生為愍􅀠死為轉屍以徃況今甚可悲傷聖朝憐閔詔求其後四方忻忻靡不歸心出入數年而不省察恐議者不思大義徒設虛言則厚徳掩息吝簡布章非所以示化勸後也雖難盡継宜従尤功上納其言癸卯封蕭何六世孫南䜌長喜為鄼侯立城陽哀王弟俚為王八月丁丑太皇太后王氏崩九月黑龍見東萊丁巳晦日有食之是嵗以南陽太守陳咸為少府侍中淳于長為水衡都尉二年春正月己丑安陽敬侯王音薨王氏唯音為修整數諫正有忠直節二月癸未夜星隕如雨繹繹未至地滅乙酉晦日有食之三月丁酉以成都侯王商為大司馬衞将軍紅陽侯王立位特進領城門兵京兆尹翟方進為御史大夫谷永為涼州刺史奏事京師訖當之部上使尚書問永受所欲言永對曰臣聞王天下有國家者患在上有危亡之事而危亡之言不得上聞如使危亡之言輙上聞則商周不易姓而迭興三正不變改而更用夏商之将亡也行道之人皆知之晏然自以若天有日莫能危是故惡日廣而不自知大命傾而不自寤易曰危者有其安者也亡者保其存者也陛下誠垂寛明之聽無忌諱之誅使芻蕘之臣得盡所聞於前群臣之上願社稷之長福也元年九月黑龍見其晦日有食之今年二月巳未夜星隕乙酉日有食之六月之間大異四發二二而同月三代之末春秋之乱未甞有也臣聞三代所以隕社稷喪宗廟者皆由婦人與羣惡沈湎於酒秦所以二世十六年而亡者養生泰奢奉終泰厚也二者陛下兼而有之臣請略陳其效建始河平之際許斑之貴傾動前朝熏灼四方女寵至極不可上矣今之後起什倍于前廢先帝灋度聽用其言官秩不當縦釋王誅驕其親屬假之威權従横亂政剌舉之吏莫敢奉憲又以掖庭獄大為乱阱榜箠㿊於炮格絶滅人命主為趙李報徳復怨反除白罪建治正吏多繫無辜掠立廹恐至為人起責分利受謝生入死出者不可勝數是以日食再既以昭其辜王者必先自絶然后天絶之陛下棄萬乗之至貴樂家人之賤事厭髙美之尊號好匹夫之卑字崇聚僄輕無義小人以為私客數離深宫之固挺身晨夜與羣小相隨烏集雜㑹飲醉吏民之家乱服共坐流湎媟嫚溷殽無别黽勉遁樂晝夜在路典門户奉宿衞之臣執干戈而守空宫公卿百僚不知陛下所在積數年矣王者以民為基民以財為本財竭則下畔下畔則上亡是以明王愛飬基本不敢窮極使民如承大祭今陛下輕奪民財不愛民力聴邪臣之計去髙敞初陵改作昌陵役百乾谿費擬驪山靡敝天下五年不成而後反故百姓愁恨感天饑饉仍臻流散宂食餧死於道以百萬數公家無一年之畜百姓無旬日之儲上下俱匱無以相救詩云殷監不逺在夏后之世願陛下追觀夏商周秦所以失之以鏡考巳行有不合者臣當伏妄言之誅漢興九世百九十餘載継躰之主七皆承天順道遵先祖灋度或以中興或以治安至於陛下獨違道縱欲輕身妄行當盛壯之隆無継嗣之福有危亡之憂積失君道不合天意亦以多矣為人後嗣守人功業如此豈不負哉方今社稷宗廟禍福安危之機在於陛下陛下誠肯昭然逺寤専心反道舊愆畢改新徳既章則赫赫大異庶幾可銷天命去就庶幾可復社稷宗廟庶幾可保唯陛下留神反覆熟省臣言帝性寛好文辭而溺於燕樂皆皇太后與諸舅夙夜所常憂至親難數言故推永等使因天變而切諌勸上納用之永自知有内應展意無所依違每言事輙見答禮至上此對上大怒衞将軍商密擿永令發去上使侍御史收永敕過交道廐者勿追御史不及永還上意亦解自悔上甞與張放及趙李諸侍中共宴飲禁中皆引滿舉白談咲大噱時乗輿幄坐張畫屏風畫紂醉踞妲己作長夜之樂侍中光禄大夫班伯乆疾新起上顧指畫而問伯曰紂為無道至於是虖對曰書云乃用婦人之言何有踞肆於朝所謂衆惡歸之不如是之甚者也上曰茍不若此此圗何戒對曰沈湎于酒㣲子所以告去也式號式謼大雅所以流連也詩書淫乱之戒其原皆在於酒上乃喟然歎曰吾乆不見班生今日復聞讜言放等不懌稍自引起更衣因罷出時長信庭林表適使來聞見之後上朝東宫太后泣曰帝間顔色瘦黑班侍中本大将軍所舉宜寵異之益求其比以輔聖徳宜遣富平侯且就國上曰諾上諸舅聞之以風丞相御史求放過失於是丞相宣御史大夫方進奏放驕蹇縦恣奢淫不制拒閉使者賊傷無辜従者支屬並乗權勢為暴虐請免放就國上不得已左迁放為北地都尉其後比年數有災變故放乆不得還璽書勞問不絶敬武公主有疾詔徵放歸第視母疾數月主有瘳後復出放爲河東都尉上雖愛放然上廹太后下用大臣故常涕泣而遣之卭成太后之崩也喪事倉卒吏賦斂以趨辦上聞之以過丞相御史冬十一月己丑􅉺免丞相宣爲庶人御史大夫方進左迁執金吾二十餘日丞相官缺群臣多舉方進者上亦器其能十一月壬子擢方進爲丞相封髙陵矦以諸吏散騎光禄勲孔光爲御史大夫方進以經術進其爲吏用灋刻深好任勢立威有所忌惡峻文深詆中傷甚多有言其挾私詆欺不専平者上以方進所舉應科不以爲非也光襃成君霸之少子也領尚書典樞機十餘年守灋度修故事上有所問據經灋以心所安而對不希指茍合如或不従不敢强諫争以是乆而安時有所言輙削草藳以為章主之過以奸忠直人臣大罪也有所薦舉唯恐其人之聞知沐日歸休兄弟妻子燕語終不及朝省政事或問光温室省中樹皆何木也光嘿不應更荅以它語其不泄如是上行幸雍祠五畤衞将軍王商惡陳湯奏湯妄言昌陵且復發徙又言黑龍冬出㣲行數出之應廷尉奏湯非所宜言大不敬詔以湯有功免為庶人徙邊上以趙后之立也淳于長有力焉故徳之乃追顯其前白罷昌陵之功下公卿議封長光禄勲平當以爲長雖有善言不應封爵之科當坐左遷鉅鹿太守上遂下詔以常侍閎侍中衞尉長首建至䇿賜長閎爵􅀜内侯将作大匠萬年佞邪不忠毒流衆庶與陳湯俱徙燉煌初少府陳咸衞尉逢信官簿皆在翟方進之右方進晚進為京兆尹與咸厚善及御史大夫缺三人皆名卿俱在選中而方進得之㑹丞相薛宣得罪與方進相連上使五二千石雜問丞相御史咸詰責方進冀得其處方進心恨陳湯素以材能得幸於王鳳及王音咸信皆與湯善湯數稱之於鳳音所以此得為九卿及王商黜逐湯方進因奏咸信附㑹湯以求薦舉茍得無恥皆免官是嵗琅邪太守朱博為左馮翊博治郡常令屬縣各用其豪桀以為大吏文武従宜縣有劇賊及它非常博輙移書以詭責之其盡力有效必加厚賞懐詐不稱誅罰輙行以是豪强懾服事無不集三年春正月己卯晦日有食之初帝用匡衡議罷甘泉泰畤其日大風壊甘泉竹宫折拔畤中樹木十圍以上百餘帝異之以問劉向對曰家人尚不欲絶種祠況於國之神寳舊畤且甘泉汾隂及雍五畤始立皆有神祇感應然後營之非茍而巳也武宣之世奉此三神禮敬敕備神光尤著祖宗所立神祇舊位誠未易動前始納貢禹之議後人相因多所動揺易大傳曰誣神者殃及三世恐其咎不獨止禹等上意恨之又以乆無繼嗣冬十月庚辰上白太后令詔有司復甘泉泰畤汾隂后土如故及雍五畤陳寳祠長安及郡國祠著明者皆復之是時上以無繼嗣頗好鬼神方術之屬上書言祭祀方術得待詔者甚衆祠祭費用頗多谷永説上曰臣聞明於天地之性不可惑以神怪知萬物之情不可罔以非類諸背仁義之正道不遵五經之灋言而盛稱竒怪鬼神廣崇祭祀之方求報無福之祠及言世有僊人服食不終之藥遥興輕舉黄冶變化之術者皆姦人惑衆挾左道懐詐偽以欺罔世主聽其言洋洋滿耳若将可遇求之盪盪如係風捕景終不可得是以明王距而不聽聖人絶而不語昔秦始皇使徐福發男女入海求神采藥因逃不還天下怨恨漢興新垣平齊人少翁公孫卿欒大等皆以術窮詐得誅夷伏辜唯陛下距絶此類毋令姦人有以窺朝者上善其言十一月尉氏男子樊並等十三人謀反殺陳留太守劫略吏民自稱将軍徒李譚稱忠鍾祖訾順共殺並以聞皆封為侯十二月山陽鐵官徒蘇令等二百二十八人攻殺長吏盜庫兵自稱将軍經郡國十九殺東郡太守及汝南都尉汝南太守嚴訢捕斬令等遷訢為大司農故南昌尉九江梅福上書曰昔髙祖納善若不及從諌若轉圜聽言不求其能舉功不考其素陳平起於亡命而為謀主韓信拔於行陳而建上将故天下之士雲合歸漢争進竒異知者竭其䇿愚者盡其慮勇士極其節怯夫勉其死合天下之知并天下之威是以舉秦如鴻毛取楚若拾遺此髙祖所以無敵於天下也孝武皇帝好忠諫説至言出爵不待亷茂慶賜不須顯功是以天下布衣各厲志竭精以赴闕庭自衒鬻者不可勝數漢家得賢於此為盛使孝武皇帝聴用其計升平可致於是積尸暴骨快心胡越故淮南王安縁閒而起所以計慮不成而謀議泄者以衆賢聚於本朝故其大臣埶陵不敢和従也方今布衣乃窺國家之隙見閒而起者蜀郡是也及山陽亡徒蘇令之羣蹈藉名都大郡求黨與索隨和而亡逃匿之意此皆輕量大臣無所畏忌國家之權輕故匹夫欲與上争衡也士者國之重器得士則重失士則輕詩云濟濟多士文王以寧廟堂之議非草茅所言也臣誠恐身塗野草尸并卒伍故數上書求見輙報罷臣聞齊桓之時有以九九見者桓公不逆欲以致大也今臣所言非特九九也陛下距臣者三矣此天下士所以不至也昔秦武王好力任鄙叩􅀜自鬻繆公行伯由余歸徳今欲致天下之士民有上書求見者輙使詣尚書問其所言言可采取者秩以升斗之禄賜以一束之帛若此則天下之士發憤懣吐忠言嘉謀日聞於上天下條貫國家表裏爛然可睹矣夫以四海之廣士民之數能言之類至衆多也然其雋桀指世陳政言成文章質之先聖而不繆施之當世合時務若此者亦無幾人故爵禄束帛者天下之砥石髙祖所以厲世摩鈍也孔子曰工欲善其事必先利其器至秦則不然張誹謗之罔以為漢􅛷除倒持泰阿授楚其柄故誠能勿失其柄天下雖有不順莫敢觸其鋒此孝武皇帝所以辟地建功為漢世宗也今陛下既不納天下之言又加戮焉夫鳶鵲遭害則仁鳥増逝愚者䝉戮則智士深退閒者愚民上䟽多觸不急之灋或下廷尉而死者衆自陽朔以來天下以言為諱朝廷尤甚羣臣皆承順上指莫有執正何以明其然也取民所上書陛下之所善試下之廷尉廷尉必曰非所宜言大不敬以此卜之一矣故京兆尹王章資質忠直敢面引廷争孝元皇帝擢之以厲具臣而矯曲朝及至陛下戮及妻子且惡惡止其身王章非有反畔之辜而殃及室家折直士之節結諌臣之舌羣臣皆知其非然不敢爭天下以言爲戒最國家之大患也願陛下循髙祖之􅁤杜亡秦之路除不急之灋下無諱之詔博覽兼聽謀及䟽賤令深者不隠逺者不塞所謂辟四門明四目也往者不可及來者猶可追方今君命犯而主威奪外戚之權日以益隆陛下不見其形願察其景建始以來日食地震以率言之三倍春秋水災亡與比數隂盛陽㣲金鐵爲飛此何景也漢興以來社稷三危吕霍上官皆母后之家也親親之道全之爲右當與之賢師良傅教以忠孝之道今乃尊寵其位授以魁柄使之驕逆至於夷滅此失親親之大者也自霍光之賢不能為子孫慮故權臣易世則危書曰毋若火始庸庸埶陵於君權隆於主然後防之亦無及巳上不納資治通鑑卷第三十一
