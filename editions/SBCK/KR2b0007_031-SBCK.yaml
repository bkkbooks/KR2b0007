front:
  text: 音謹敕臣敢以死保之及鳳且死上䟽謝上復固薦音自代言譚等五人必不可用天子然之初譚倨不肯事鳳而音敬鳳卑恭如子故鳳薦之八月丁巳鳳薨九月甲子以王音為大司馬車騎将軍而王譚位特進領城門兵安定太守谷永以譚失職勸譚辭讓不受城門職由是譚音相與不平冬十一月丁卯光禄勲于永為御史大夫永定國之子也四年春二月赦天下夏四月雨雪秋九月壬申東平思王宇薨少府王駿為京兆尹駿吉之子也先是京兆有趙廣漢張敞王尊王章至駿皆有能名故京師稱曰前有趙張後有三王
  hash: sha256:32be9eba28dfa59289c9f0513c1ef84a0093495bd8debadbcbe944e78046e873
