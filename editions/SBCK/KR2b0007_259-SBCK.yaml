front:
  text: 資治通鑑卷第二百五十九
  hash: sha256:bae74cf64f3ca7a3a970ff264e683d09c05cbf2aa63704f9e2887247031f8834
body:
  text: 臣司馬光奉勑編集唐紀七十五逢攝提格凡三年起玄黓困敦盡閼昭宗聖穆景文孝皇帝上之中景福元年春正月丙寅赦天下改元鳯翔李茂貞静難王行瑜鎮國韓建同州王行約秦州李茂莊五節度使上言楊守亮容匿叛臣楊復恭請出軍討之乞加茂貞山南西道招討使朝議以茂貞得山南不可復制下詔和解之皆不聴王鎔李匡威合兵十餘萬攻堯山李克用遣其將李嗣勲撃之大破幽鎮兵斬獲三萬楊行密謂諸將曰孫儒之衆十倍於我吾戰數不利欲退保銅官何如劉威李神福曰儒掃地逺來利在速戰宜屯據險要堅壁清野以老其師時出輕騎抄其饋餉奪其俘掠彼前不得戰退無資糧可坐擒也戴友規曰儒與我相持數年勝負略相當今悉衆致死於我我若望風弃城正墮其計淮南士民從公度江及自儒軍來降者甚衆公宜遣將先䕶送歸淮南使復生業儒軍聞淮南安堵皆有思歸之心人心既搖安得不敗行密恱從之友規廬州人也威戎節度使楊晟與楊守亮等約攻王建二月丁丑晟出兵掠新繁漢州之境使其將吕蕘將兵二千㑹楊守厚攻梓州建遣行營都指揮使李簡擊蕘斬之戊寅朱全忠出兵擊朱瑄遣其子友裕將兵前行軍于斗門李茂貞王行瑜擅舉兵撃興元茂貞表求招討使不已遺杜讓能西門重遂書陵蔑朝廷上意不能容御延英召宰相諫官議之時宦官有隂與二鎮相表裏者宰相相顧不敢言上不恱給事中牛徽曰先朝多難茂貞誠有翼衛之功諸楊阻兵亟出攻討其志亦在疾惡但不當不俟詔命耳比聞兵過山南殺傷至多陛下儻不以招討使授之使用國法約束則山南之民盡矣上曰此言是也乃以茂貞爲山南西道招討使甲申朱全忠至衛南朱瑄將步騎萬人襲十門朱友裕棄營走瑄據其營全忠不知乙酉引兵趣斗門至者皆爲鄆人所殺全忠退軍瓠河丁亥瑄擊全忠大破之全忠走張歸厚於後力戰全忠僅免副使李璠等皆死朱全忠奏貶河陽節度使趙克裕以佑國節度使張全義兼河陽節度使孫儒圍宣州初劉建鋒爲孫儒守常州將兵從儒撃楊行密甘露鎮使陳可言帥部兵千人據常州行密將張訓引兵奄至城下可言倉猝出迎訓手刃殺之遂取常州行密别將又取潤州朱全忠連年攻時􅄎徐泗濠三州民不得耕穫兖鄆河東兵救之皆無功復值水災人死者什六七􅄎困甚請和於全忠全忠曰必移鎮乃可􅄎許之全忠乃奏請移􅄎它鎮仍命大臣鎮徐州詔以門下侍郎同平章事劉崇望同平章事充感化節度使以􅄎爲太子太師􅄎恐全忠詐而殺之據城不奉詔崇望及華隂而還忠義節度使趙徳諲薨子匡疑代之范暉驕侈失衆心王潮以從弟彦復爲都統弟審知爲都監將兵攻福州民自請輸米餉軍平湖洞及濵海蠻夷皆以兵􅂳助之辛丑王建遣族子嘉州刺史宗􅁉雅州刺史王宗􅋲威信都指揮使華洪茂州刺史王宗瑤將兵五萬攻彭州楊晟逆戰而敗宗􅁉等圍之楊守亮遣其將符昭救晟徑趨成都營三學山建亟召華洪還洪疾驅而至後軍尚未集以數百人夜去昭營數里多擊更鼔昭以爲蜀軍大至引兵宵遁三月以户部尚書鄭延昌爲中書侍郎同平章事延昌從讜之從兄弟也左神䇿勇勝三都都指揮使楊子實子遷子釗皆守亮之假子也自渠州引兵救楊晟知守亮必敗壬子帥其衆二萬降於王建李克用王處存合兵攻王鎔癸丑拔天長鎮戊午鎔與戰於新市大破之殺獲三萬餘人辛酉克用退屯欒城詔和解河東及鎮定幽四鎮楊晟遺楊守貞楊守忠楊守厚書使攻東川以解彭州之圍守貞等從之神䇿督將竇行實戍梓州守厚密誘之爲内應守厚至涪城行實事泄顧彦暉斬之守厚遁去守貞守忠軍至無所歸盤􅁊綿劒閒王建遣其將吉諫襲守厚破之癸亥西川將李簡邀擊守忠於鍾陽斬獲三千餘人夏四月簡又破守厚於銅鉾斬獲三千餘人降萬五千人守忠守厚皆走乙酉置武勝軍於杭州以錢鏐爲防禦使天威軍使賈徳晟以李順節之死頗怨憤西門重遂惡之奏而殺之徳晟麾下千餘騎奔鳯翔李茂貞由是益彊李匡威出兵侵雲代壬寅李克用始引兵還時溥遣兵南侵至楚州楊行密將張訓李徳誠敗之于夀河遂取楚州執其刺史劉瓚五月加邠寧節度使王行瑜兼中書令楊行密屢敗孫儒兵破其廣徳營張訓屯安吉㫁其糧道儒食盡士卒大疫遣其將劉建鋒馬殷分兵掠諸縣六月行密聞儒疾瘧戊寅縱兵擊之㑹大雨晦􅁳儒軍大敗安仁義破儒五十餘寨田頵擒儒於陳斬之傳首京師儒衆多降於行密劉建鋒馬殷収餘衆七千南走洪州推建鋒爲帥殷爲先鋒指揮使以行軍司馬張佶爲謀主比至江西衆十餘萬丁酉楊行密帥衆歸揚州秋七月丙辰至廣陵表田頵守宣州安仁義守潤州先是楊州富庶甲天下時人稱揚一益二及經秦畢孫楊兵火之餘江淮之間東西千里掃地盡矣王建圍彭州久不下民皆􅇡匿山谷諸寨日出俘掠謂之淘虜都將先擇其善者餘則士卒分之以是爲常有軍士王先成者新津人本書生也世亂爲兵度諸將惟北寨王宗侃最賢乃往説之曰彭州本西川之廵屬也陳田召楊晟割四州以授之僞署觀察使與之共拒朝命今陳田已平而晟猶據之州民皆知西川乃其大府而司徒乃其主也故大軍始至民不入城而入山谷避之以俟招安今軍至累月未聞招安之命軍士復從而掠之與盗賊無異奪其貲財驅其畜産分其老弱婦女以爲奴婢使父子兄弟流離愁怨其在山中者暴露於暑雨殘傷於蛇虎孤危飢渇無所歸訴彼始以楊晟非其主而不從今司徒不加存恤彼更思楊氏矣宗􅋲惻然不覺屢移其牀前問之先成曰又有甚於是者今諸寨每旦出六七百人入山淘虜薄暮乃返曽無守備之意頼城中無人耳萬一有智者爲之畫䇿使乘虚奔突先伏精兵千人於門内登城望淘虜者稍逺出弓弩手礮各百人攻寨之一面隨以役卒五百負薪土填壕爲道然後出精兵􅁬擊且焚其寨又於三面城下各出耀兵諸寨咸自僃禦無暇相救城中得以益兵繼出如此能無敗乎宗􅋲矍然曰此誠有之將若之何先成請條列爲狀以白王建宗􅋲即命先成草之大指言今所白之事須四面通共宗􅋲所司止於北靣或所白可從乞以牙舉施行事凡七條其一乞招安山中百姓其二乞禁諸寨軍士及子弟無得一人輒出淘虜仍表諸寨之旁七里内聽樵牧敢越表者斬其三乞置招安寨中容數千人以處所招百姓宗􅋲請選所部將校謹幹者爲招安將使將三十人晝夜執兵廵衛其四招安之事須委一人緫領今牓帖既下諸寨必各遣軍士入山招安百姓見之無不驚疑如鼠見狸誰肯來者欲招之必有其術願降帖付宗􅋲專掌其事其五乞嚴勒四寨指揮使悉索前日所虜彭州男女老㓜集於營場有父子兄弟夫婦自相認者即使相從牒具人數部送招安寨有敢私匿一人者斬仍乞勒府中諸營亦令嚴索有自軍前先寄歸者量給資糧悉部送歸招安寨其六乞置九隴行縣於招安寨中以前南鄭令王丕攝縣令設置曹局撫理百姓擇其子弟之壯者給帖使自入山招其親戚彼知司徒嚴禁侵掠前日爲軍士所虜者皆獲安堵必歡呼踊躍相帥下山如子歸母不日盡出其七彭州土地宜麻百姓未入山時多漚藏者宜令縣令曉諭各歸田里出所漚麻鬻之以爲資糧必漸復業建得之大喜即行之悉如所申明日牓帖至威令赫然無敢犯者三日山中民競出赴招安寨如歸市寨不能容斥而廣之浸有市井又出麻鬻之民見村落無抄暴之患稍稍辭縣令復故業月餘招安寨皆空己巳李茂貞克鳯州感義節度使滿存奔興元茂貞又取興洋二州皆表其子弟鎮之八月以楊行密爲淮南節度使同平章事以田頵知宣州留後安仁義爲潤州刺史孫儒降兵多蔡人行密選其尤勇健者五千人厚其禀賜以皁衣蒙甲號黒雲都每戰使之先登陷陳四鄰畏之行密以用度不足欲以茶鹽易民布帛掌書記舒城髙勗曰兵火之餘十室九空又漁利以困之將復離叛不若悉我所有易鄰道所無足以給軍選賢守令勸課農桑數年之間倉庫自實行密從之田頵聞之曰賢者之言其利逺哉行密馳射武伎皆非所長而寛簡有智略善撫御將士與同甘苦推心待物無所猜忌嘗早出從者㫁馬鞦取其金行密知而不問它日復早出如故人服其度量淮南被兵六年士民轉徙幾盡行密初至賜與將吏帛不過數尺錢不過數百而能以勤儉足用非公宴未嘗舉樂招撫流散輕徭薄歛未及數年公私富庶幾復承平之舊李克用北廵至天寧軍聞李匡威赫連鐸將兵八萬冦雲州遣其將李君慶發兵於晉陽克用潛入新城伏兵於神堆擒吐谷渾邏騎三百匡威等大驚丙申君慶以大軍至克用遷入雲州丁酉出撃匡威等大破之己亥匡威等燒營而遁追至天成軍斬獲不可勝計辛丑李茂貞攻拔興元楊復恭楊守亮楊守信楊守貞楊守忠滿存奔閬州茂貞表其子繼密權知興元府事九月加荆南節度使成汭同平章事時􅄎迫監軍奏稱將士留已冬十月復以􅄎爲侍中感化節度朱全忠奏請追􅄎新命詔諭解之初邢洺磁州留後李存孝與李存信俱爲李克用假子不相睦存信有寵於克用存孝在邢州欲立大功以勝之乃建議取鎮兾存信從中沮之不時聽許及王鎔圍堯山存孝救之不克克用以存信爲蕃漢馬步都指揮使與存孝共擊之二人互相猜忌逗留不進克用更遣李嗣勲等擊破之存信還譖存孝無心擊賊疑與之有私約存孝聞之自以有功於克用而信任顧不及存信憤怨且懼及禍乃潛結王鎔及朱全忠上表以三州自歸於朝廷乞賜旌節及㑹諸道兵討克用詔以存孝爲邢洺磁節度使不許㑹兵十一月時􅄎濠州刺史張璲泗州刺史張諫以州附于朱全忠乙未朱全忠遣其子友􅁉將兵十萬攻濮州拔之執其刺史邵倫遂令友裕移兵擊時􅄎孫儒將王壇陷㜈州刺史蔣瓌奔越州廬州刺史蔡儔發楊行密父祖墓與舒州刺史倪章連兵遣使送印於朱全忠以求救全忠惡其反覆納其印不救且牒報行密行密謝之行密遣行營都指揮使李神福將兵討儔宣明曆浸差太子少詹事邊岡造新曆成十二月上之命曰景福崇玄曆壬午王建遣其將華洪擊楊守亮於閬州破之建遣節度押牙延陵鄭頊使於朱全忠全忠問劔閣頊極言其險全忠不信頊曰茍不以聞恐誤公軍機全忠大笑是嵗明州刺史鍾文季卒其將黄晟自稱刺史二年春正月時溥遣兵攻宿州刺史郭言戰死東川留後顧彦暉既與王建有隙李茂貞欲撫之使從已奏請更賜彦暉節詔以彦暉爲東川節度使茂貞又奏遣知興元府事李繼密救梓州未幾建遣兵敗東川鳯翔之兵於利州彦暉求和請與茂貞絶乃許之鳯翔節度使李茂貞自請鎮興元詔以茂貞爲山南西道兼武定節度使以中書侍郎同平章事徐彦若同平章事充鳯翔節度使又割果閬二州􅀠武定軍茂貞欲兼得鳯翔不奉詔二月甲戌加西川節度使王建同平章事李克用引兵圍邢州王鎔遣牙將王藏海致書解之克用怒斬藏海進兵擊鎔敗鎮兵於平山辛巳攻天長鎮旬日不下鎔出兵三萬救之克用逆戰於叱日嶺下大破之斬首萬餘級餘衆潰去河東軍無食脯其尸而啗之時􅄎求救於朱全忠遣其將霍存將騎兵三千軍曹州以僃之瑾將兵二萬救徐州存引兵赴之與朱友􅁉合擊徐兖兵於石佛山下大破之瑾遁歸兖州辛卯徐兵復出存戰死李克用進下井陘李存孝將兵救王鎔遂入鎮州與鎔計事鎔又乞師於朱全忠全忠方與時􅄎相攻不能救但遺克用書言鄴下有十萬精兵抑而未進克用復書言儻實屯軍鄴下顒望降臨必欲真决雌雄願角逐於常山之尾甲午李匡威引兵救鎔敗河東兵於元氏克用引還邢州鎔犒匡威於藁城輦金帛二十萬以酬之朱友裕圍彭城時􅄎數出兵友􅁉閉壁不戰朱瑾宵遁友􅁉不追都虞候朱友恭以書譖友􅁉於全忠全忠怒驛書下都指揮使龐師古使代之將且按其事書誤達於友􅁉友􅁉大懼以二千騎逃入山中潛詣碭山匿於伯父全昱之所全忠夫人張氏聞之使友􅁉單騎詣汴州見全忠泣涕拜伏於庭全忠命左右捽抑將斬之夫人趨就抱之泣曰汝捨兵衆束身歸罪無異志明矣全忠悟而捨之使權知許州友恭夀春人李彦威也幼爲全忠家僮全忠養以爲子張夫人碭山人多智略全忠敬憚之雖軍府事時與之謀議或將兵出至中塗夫人以爲不可遣一介召之全忠立爲之返龐師古攻佛山寨抜之自是徐兵不敢出李匡威之救王鎔也將發幽州家人㑹别弟匡籌之妻美匡威醉而􅁋之三月匡威自鎮州還至博野匡籌據軍府自稱留後以符追行營兵匡威衆潰歸但與親近留深州進退無所之遣判官李抱真入奏請歸京師京師屢更大亂聞匡威來坊市大恐曰金頭王來圖社稷士民或竄匿山谷王鎔徳其以己故致失地迎歸鎮州爲築第父事之以渝州刺史栁玭爲瀘州刺史栁氏自公綽以來世以孝悌禮法爲士大夫所宗玭爲御史大夫上欲以爲相宦官惡之故久謫於外玭嘗戒其子弟曰凡門地髙可畏不可恃也立身行巳一事有失則得罪重於他人死無以見先人於地下此其所以可畏也門高則驕心易生族盛則爲人所嫉懿行實才人未之信小有玼纇衆皆指之此其所以不可恃也故膏梁子弟學宜加勤行宜加勵僅得比它人耳王建屢請殺陳敬瑄田令孜朝廷不許夏四月乙亥建使人告敬瑄謀作亂殺之新津又告令孜通鳯翔書下獄死建使節度判官馮㳙草表奏之曰開匣出虎孔宣父不責它人當路斬蛇孫叔敖蓋非利己專殺不行於閫外先機恐失於彀中㳙宿之孫也汴軍攻徐州累月不克通事官張濤以書白朱全忠云進兵時日非良故無功全忠以爲然敬翔曰今攻城累月所費甚多徐人已困旦夕且下使將士聞此言則懈於攻取矣全忠乃焚其書癸未全忠自將如徐州戊子龐師古拔彭城時􅄎舉族登鷰子樓自焚死己丑全忠入彭城以宋州刺史張廷範知感化留後奏乞朝廷除文臣爲節度使李匡威在鎮州爲王鎔完城塹繕甲兵訓士卒視之如子匡威以鎔年少且樂真定土風潛謀奪之李抱真自京師還爲之畫䇿隂以恩施悦其將士王氏在鎮久鎮人愛之不徇匡威匡威忌日鎔就第弔之匡威素服􅂨甲伏兵劫之鎔趨抱匡威曰鎔爲晉人所困幾亡矣頼公以有今日公欲得四州此固鎔之願也不若與公共歸府以位讓公則將士莫之拒矣匡威以爲然與鎔駢馬陳兵入府㑹大風雷雨屋瓦皆振匡威入東偏門鎮之親軍閉之有屠者墨君和自缺垣躍出拳敺匡威甲士挾鎔於馬上負之登屋鎮人既得鎔攻匡威殺之并其族黨鎔時年十七體疎瘦爲君和所挾頸痛頭偏者累日李匡籌奏鎔殺其兄請舉兵復寃詔不許幽州將劉仁恭將兵戍蔚州過期未代士卒思歸㑹李匡籌立戍卒奉仁恭爲帥還攻幽州至居庸闗爲府兵所敗仁恭奔河東李克用厚待之李神福圍廬州甲午楊行密自將詣廬州田頵自宣州引兵㑹之初蔡人張顥以驍勇事秦宗權後從孫儒儒敗歸行密行密厚待之使將兵戍廬州蔡儔叛顥更爲之用及圍急顥踰城來降行密以􅀠銀槍都使􅀽稹稹以顥反覆白行密請殺之行密恐稹不能容置之親軍稹陳州人也王彦復王審知攻福州久不下范暉求救於威勝節度董昌昌與陳巖昬姻發温台㜈州兵五千救之彦復審知以城堅援兵且至士卒死傷多白王潮欲罷兵更圖後舉潮不許請潮自臨行營潮報曰兵盡添兵將盡添將兵將俱盡吾當自來彦復審知懼親犯矢石急攻之五月城中食盡暉知不能守夜以印授監軍棄城走援兵亦還庚子彦復等入城辛丑暉亡抵㳂海都爲將士所殺潮入福州自稱留後素服葬陳巖以女妻其子延晦厚撫其家汀建二州降嶺海間羣盗二十餘輩皆降潰閏月以武勝防禦使錢鏐爲蘇杭觀察使又以扈蹕都頭曹誠為黔中節度使耀徳都頭李鋋爲鎮海節度使宣威都頭孫惟晟爲荆南節度使六月以捧日都頭陳珮爲嶺南東道節度使並同平章事時李茂貞跋扈上以武臣難制欲用諸王代之故誠等四人皆加恩解兵柄令赴鎮李匡籌出兵攻王鎔之樂夀武强以報殺匡威之恥秋七月王鎔遣兵救邢州李克用敗之於平山壬申進擊鎮州鎔懼請以兵糧二十萬助攻邢州克用許之克用治兵於欒城合鎔兵三萬進屯任縣李存信屯琉璃陂丁亥楊行密克廬州斬蔡儔左右請發儔父母冢行密曰儔以此得罪吾何爲效之加天雄節度使李茂莊同平章事錢鏐發民夫二十萬及十三都軍士築杭州羅城周七十里昇州刺史張雄卒馮􅀪鐸代之爲刺史李茂貞恃功驕横上表及遺杜讓能書辭語不遜上怒欲討之茂貞又上表略曰陛下貴爲萬乘不能庇元舅之一身尊極九州不能戮復恭之一豎又曰今朝廷但觀彊弱不計是非又曰約衰殘而行法隨盛壯以加恩體物錙銖看人衡纊又曰軍情易変戎馬難羈唯慮甸服生灵因兹受禍未審乘輿播越自此何之上益怒决討茂貞命杜讓能專掌其事讓能諫曰陛下初臨大寳國步未夷茂貞近在國門臣愚以爲未宜與之構怨萬一不克悔之無及上曰王室日卑號令不出國門此乃志士憤痛之秋藥弗瞑眩厥疾弗瘳朕不能甘心爲孱懦之主愔愔度日坐視陵夷卿但爲朕調兵食朕自委諸王用兵成敗不以責卿讓能曰陛下必欲行之則中外大臣共宜恊力以成聖志不當獨以任臣上曰卿位居元輔與朕同休戚無宜避事讓能泣曰臣豈敢避事况陛下所欲行者憲宗之志也顧時有所未可勢有所不能耳但恐它日臣徒受晁錯之誅不能弭七國之禍也敢不奉詔以死繼之上乃命讓能留中書計畫調度月餘不歸崔昭緯隂結邠􅄮爲之耳目讓能朝發一言二鎮夕必知之李茂貞使其黨紏合市人數百千人擁觀軍容使西門君遂馬訴曰􅄮帥無罪不宜致討使百姓塗炭君遂曰此宰相事非吾所及市人又邀崔昭緯鄭延昌肩輿訴之二相曰兹事主上專委杜太尉吾曹不預知市人因亂投瓦石二相下輿走匿民家僅自免喪堂印及朝報上命捕其唱帥者誅之用兵之意益堅京師民或亡匿山谷嚴刑所不能禁八月以嗣覃王嗣周爲京西招討使神䇿大將軍李鐬副之丙辰楊行密遣田頵將宣州兵二萬攻歙州歙州刺史裴樞城守久不下時諸將爲刺史者多貪暴獨池州團練使陶雅寛厚得民歙人曰得陶雅爲刺史請聽命行密即以雅爲歙州刺史歙人納之雅盡禮見樞送之還朝樞遵慶之曽孫也朱全忠命龐師古移兵攻兖州與朱瑾戰屢破之九月丁卯以錢鏐爲鎮海節度使李存孝夜犯李存信營虜奉誠軍使孫考老李克用自引兵攻邢州掘塹築壘環之存孝時出兵突擊塹壘不能成河東牙將􅀽奉韜密使人謂存孝曰大王惟俟塹成即歸晉陽尚書所憚者獨大王耳諸將非尚書敵也大王若歸咫尺之塹安能沮尚書之鋒銳邪存孝以爲然按兵不出旬日塹壘成飛走不能越存孝由是遂窮汴將鄧季筠從克用攻邢州輕騎逃歸朱全忠大喜使將親軍乙亥覃王嗣周帥禁軍三萬送鳯翔節度使徐彦若赴鎮軍于興平李茂貞王行瑜合兵近六萬軍于盩厔以拒之禁軍皆新募市井少年茂貞行瑜所將皆邊兵百戰之餘壬午茂貞等進逼興平禁軍皆望風逃潰茂貞等乘勝進攻三橋京城大震士民奔散市人復守闕請誅首議用兵者崔昭緯心害太尉門下侍郎同平章事杜讓能密遺茂貞書曰用兵非主上意皆出於杜太尉耳甲申茂貞陳於臨􅆏驛表讓能罪請誅之讓能言於上曰臣固先言之矣請以臣爲解上涕下不自禁曰與卿訣矣是日貶讓能梧州刺史制辭略曰弃卿士之臧謀構藩垣之深釁咨詢之際證執彌堅又流觀軍容使西門君遂于儋州内樞密使李周潼于崖州叚詡于驩州乙酉上御安福門斬君遂周潼詡再貶讓能雷州司户遣使謂茂貞曰惑朕舉兵者三人也非讓能之罪以内侍駱全瓘劉景宣爲左右軍中尉壬辰以東都留守韋昭度爲司徒門下侍郎同平章事御史中丞崔胤爲户部侍郎同平章事胤慎由之子也外寛􅀪而内巧險與崔昭緯深相結故得爲相季父安潛謂所親曰吾父兄刻苦以立門户終爲緇郎所壊緇郎胤小字也李茂貞勒兵不解請誅杜讓能然後還鎮崔昭緯復從而擠之冬十月賜讓能及其弟户部侍郎弘徽自盡復下詔布告中外稱讓能舉枉錯直愛憎繫於一時鬻獄賣官聚歛踰於巨萬自是朝廷動息皆禀於邠􅄮南北司往往依附二鎮以邀恩澤有崔鋋王超者爲二鎮判官凡天子有所可否其不逞者輒訴於鋋超二人則教茂貞行踰上章論之朝廷少有依違其辭語已不遜制復以茂貞爲鳯翔節度使兼山南西道節度使守中書令於是茂貞盡有鳯翔興元洋隴秦等十五州之地以徐彦若爲御史大夫戊戌以泉州刺史王潮爲福建觀察使舒州刺史倪章弃城走楊行密以李神福爲舒州刺史邠寧節度使守侍中兼中書令王行瑜求爲尚書令韋昭度密奏稱太宗以尚書令執政遂登大位自是不以授人臣惟郭子儀以大功拜尚書令終身避讓行瑜安可輕議十一月以行瑜爲太師賜號尚父仍賜鐵劵十二月失全忠請徙鹽鐵於汴州以便供軍崔昭緯以爲全忠新破徐鄆兵力倍増若更判鹽鐵不可復制乃賜詔開諭之汴將葛從周攻齊州刺史朱威朱瑄朱瑾引兵救之初武安節度使周岳殺閔勗據潭州邵州刺史鄧處訥聞而哭之諸將入弔處訥曰吾與公等咸受僕射大恩今周岳無狀殺之吾欲與公等竭一州之力爲僕射報仇可乎皆曰善於是訓卒厲兵八年乃結朗州刺史雷滿共攻潭州克之斬岳自稱留後乾寧元年春正月乙丑朔赦天下改元李茂貞入朝大陳兵自衞數日歸鎮以李匡籌爲盧龍節度使二月朱全忠自將擊朱瑄軍于魚山瑄與朱瑾合兵攻之兖鄆兵大敗死者萬餘人以右散􅀐常侍鄭綮爲禮部侍郎同平章事綮好詼諧多爲歇後詩譏嘲時事上以爲有所藴手注班簿命以爲相聞者大驚堂吏往告之綮笑曰諸君大誤使天下更無人未至鄭綮吏曰特出聖意綮曰果如是柰人笑何既而賀客至綮搔首言曰歇後鄭五作宰相時事可知矣累讓不獲乃視事以邵州刺史鄧處訥爲武安節度使彰義節度使張鈞薨表其兄鐇爲留後三月黄州刺史吳討舉州降楊行密邢州城中食盡甲申李存孝登城謂李克用曰兒䝉王恩得富貴茍非困於䜛慝安肯捨父子而從仇讎乎願一見王死不恨克用使劉夫人視之夫人引存孝出見克用存孝泥首謝罪曰兒粗立微勞存信逼兒失圖至此克用叱之曰汝遺朱全忠王鎔書毁我萬端亦存信教汝乎囚之歸于晉陽車裂於牙門存孝驍勇克用軍中皆莫及常將騎兵爲先鋒所向無敵身被重鎧􅆎弓髀槊獨舞鐵撾陷陳萬人辟易每以二馬自隨馬稍乏就陣中易之出入如飛克用惜其才意臨刑諸將必爲之請因而釋之既而諸將疾其能竟無一人言者既死克用爲之不視事者旬日私恨諸將而於李存信竟無所譴又有薛阿檀者其勇與存孝相侔諸將疾之常不得志密與存孝通存孝誅恐事泄遂自殺自是克用兵勢浸弱而朱全忠獨盛矣克用表馬師素爲邢洺節度使朱全忠遣軍將張從晦慰撫夀州從晦陵侮刺史江彦温而與諸將夜飲彦温疑其謀已明日盡殺在席諸將以書謝全忠而自殺軍中推其子從頊知軍州事全忠爲之􅆎斬從晦五月加鎮海節度使錢鏐同平章事劉建鋒馬殷引兵至澧陵鄧處訥遣邵州指揮使蔣勛鄧繼崇將步騎三千守龍回闗殷先至闗下遣使詣勛勛等以牛酒犒師殷使說勛曰劉驤智勇兼人術家言當興翼軫間今將十萬衆精鋭無敵而君以鄉兵數千拒之難矣不如先下之取富貴還鄉里不亦善乎勛等然之謂衆曰東軍許吾屬還士卒皆懽呼弃旗幟鎧仗遁去建鋒令前鋒衣其甲張其旗趨潭州潭人以爲邵州兵還不爲僃建鋒徑入府處訥方宴擒斬之戊辰建鋒入潭州自稱留後王建攻彭州城中人相食彭州内外都指揮使趙章出降王先成請築龍尾道屬于女牆丙子西川兵登城楊晟猶帥衆力戰刀子都虞候王茂權斬之獲彭州馬步使安師建建欲使爲將師建泣謝曰師建誓與楊司徒同生死不忍復戴日月惟速死爲惠再三諭之不從乃殺之禮葬而祭之更趙章姓名曰王宗勉王茂權名曰宗訓又更王釗名曰宗謹李綰姓名曰王宗綰辛􅆗中書侍郎同平章事鄭延昌罷爲右僕射朱瑄朱瑾求救於河東李克用遣騎將安福順及弟福慶福遷督精騎五百假道於魏度河應之武昌節度使杜洪攻黄州楊行密遣行營都指揮使朱延夀等救之六月甲午以宋州刺史張廷範爲武寧節度使從朱全忠之請也蘄州刺史馮敬章邀擊淮南軍朱延夀攻蘄州不克戊午以翰林學士承㫖禮部尚書李谿同平章事方宣制水部郎中知制誥劉崇魯出班掠麻慟哭上召崇魯問其故對言谿姦邪依附楊復恭西門君遂得在翰林無相業恐危社稷谿竟罷爲太子少􅀓谿􅅠之孫也上師谿爲文崔昭緯恐谿爲相分已權故使崇魯沮之谿十表自訟醜詆崇魯父符受贓枉法事覺自殺弟崇望與楊復恭深交崇魯庭拜田令孜爲朱玫作勸進表乃云臣交結内臣何異抱贓唱賊且故事絁巾慘帶不入禁庭臣果不才崇魯自應上章論列豈於正殿慟哭爲國不祥無人臣禮乞正其罪詔停崇魯見任谿猶上表不已乞行誅􅇡表數千言詬詈無所不至李克用大破吐谷渾殺赫連鐸擒白義誠秋七月李茂貞遣兵攻閬州拔之楊復恭楊守亮楊守信帥其族黨犯圍走禮部侍郎同平章事鄭綮自以不合衆望累表避位詔以太子少保致仕以御史大夫徐彦若爲中書侍郎兼吏部尚書同平章事綿州刺史楊守厚卒其將常再榮舉城降王建楊復恭守亮守信將自商山奔河東至乾元遇華州兵獲之八月韓建獻于闕下斬于獨柳李茂貞獻復恭遺守亮書訴致仕之由云承天門乃隋家舊業大姪但積粟訓兵勿貢獻吾於荆榛中立夀王纔得尊位廢定䇿國老有如此負心門生天子昭義節度使康君立詣晉陽謁李克用己未克用㑹諸將飲博酒酣克用語及李存孝流涕不已君立素與李存信善一言忤㫖克用拔劒斫之囚於馬步司九月庚申朔出之君立已死克用表雲州刺史薛志誠爲昭義留後冬十月丁酉封皇子祤爲棣王禊爲䖍王禋爲沂王禕爲遂王劉仁恭數因蓋寓獻䇿於李克用願得兵萬人取幽州克用方攻邢州分兵數千欲納仁恭於幽州不克李匡籌益驕數侵河東之境克用怒十一月大舉兵攻匡籌拔武州進圍新州以涇原留後張鐇爲彰義節度使朱全忠遣使至泗州使者陵慢刺史張諫諫舉州降楊行密行密遣押牙唐令回持茶萬餘斤如汴宋貿易全忠執令回盡取其茶楊汁始有隙十二月李匡籌遣大將將步􅀐數萬救新州李克用選精兵逆戰於叚莊大破之斬首萬餘級生擒將校三百人以練􅖞之徇於城下是夕新州降辛亥進攻嬀州壬子匡籌復發兵出居庸􅀜克用使精􅀐當其前以疲之遣步將李存審自佗道出其背夾擊之幽州兵大敗殺獲萬計甲寅李匡籌挈其族奔滄州義昌節度使盧彦威利其輜重妓妾遣兵攻之於景城殺之盡俘其衆存審本姓苻宛丘人克用養以爲子丙辰克用進軍幽州其大將請降匡籌素暗懦􅀄據軍府兄匡威聞之謂諸將曰兄失弟得不出吾家亦復何恨但惜匡籌才短不能保守得及二年幸矣加匡國節度使王行約檢校侍中吳討畏杜洪之逼納印請代于楊行密行密以先鋒指揮使瞿章權知黄州是嵗黄連洞蠻二萬圍汀州福建觀察使王潮遣其將李承勲將萬人擊之蠻解去承勲追擊之至漿水口破之閩地略定潮遣僚佐巡州縣勸農桑定租税交好鄰道保境息民閩人安之封州刺史劉謙卒子隠居喪於賀江土民百餘人謀亂隠一夕盡誅之嶺南節度使劉崇􅀛召補右都押牙兼賀水鎮使未幾表爲封州刺史義勝節度使董昌爲政苛虐於常賦之外加斂數倍以充貢獻及中外饋遺每旬發一綱金萬兩銀五千鋌越綾萬五千匹它物稱是用卒五百人或遇雨雪風水違程則皆死貢奉爲天下最由是朝廷以爲忠寵命相繼官至司徒同平章事爵隴西郡王昌建生祠於越州制度悉如禹廟命民間禱賽者無得之禹廟皆之生祠昌求爲越王朝廷未之許昌不恱曰朝廷欲負我矣我累年貢獻無筭而惜一越王邪有諂之者曰王爲越王曷若爲越帝於是民間訛言時世將變競相帥填門喧譟請昌爲帝昌大喜遣人謝之曰天時未至時至我自爲之其僚佐吳瑤都虞候李暢之等皆勸成之吏民獻謠䜟符瑞者不可勝紀其始賞之以錢數百緡既而獻者日多稍減至五百三百而已昌曰䜟云兔子上金牀此謂我也我生太嵗在卯明年復在卯二月卯日卯時吾稱帝之秋也資治通鑑卷第二百五十九
