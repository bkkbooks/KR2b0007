body:
  text: 甲戌魏大赦壬午東昏矦遣羽林兵擊雍州中外纂嚴甲申蕭衍至竟陵命王茂曹景宗為前軍以中兵參軍張法安守竟陵城茂等至漢口諸將議欲併兵圍郢分兵襲西陽武昌衍曰漢口不闊一里箭道交至房僧寄以重兵固守與郢城為掎角若悉衆前進僧寄必絶我軍後悔無所及不若遣王曹諸軍濟江與荆州軍合以逼郢城吾自圍魯山以通沔漢使鄖城竟陵之粟方舟而下江陵湘中之兵相繼而至兵多食足何憂兩城之不㧞天下之事可以卧取之耳乃使茂等帥衆濟江頓九里張冲遣中兵參軍陳光靜開門迎戰茂等擊破之光靜死冲嬰城自守景宗遂據石橋浦連軍相續下至加湖荆州遣冠軍將軍鄧元起軍主王世興田安之將數千人會雍州兵於夏首衍築漢口城以守魯山命水軍主義陽張惠紹等遊遏江中絶郢魯二城信使楊公則舉湘州之衆會于夏口蕭頴胄命荆州諸軍皆受公則節度雖蕭頴逹亦􅀠焉府朝議欲遣人行湘州事而難其人西中郎中兵參軍劉坦謂衆曰湘土人情易擾難信用武士則侵漁百姓用文士則威略不振必欲鎮靜一州軍民足食無踰老夫乃以坦為輔國長史長沙太守行湘州事坦先嘗在湘州多舊恩迎者屬路下車選堪事吏分詣十郡􅀤民運租米三十餘萬斛以助荆雍之軍由是資糧不乏三月蕭衍使鄧元起進據南堂西渚田安之頓城北王世興頓曲水故城丁酉張冲病卒驍騎將軍薛元嗣與冲子孜及征虜長史江夏内史程茂共守郢城乙巳南康王即皇帝位於江陵改元大赦立宗廟南北郊州府城門悉依建康宫置尚書五省以南郡太守為尹以蕭頴胄為尚書令蕭衍為左僕射晉安王寳義為司空廬陵王寳源為車騎將軍開府儀同三司建安王寳寅為徐州刺史散騎常侍夏矦詳為中領軍冠軍將軍蕭偉為雍州刺史丙午詔封庶人寳卷為涪陵王乙酉以尚書令蕭頴胄行荆州刺史加蕭衍征東大將軍都督征討諸軍事假黄鉞時衍次楊口和帝遣御史中丞宗夬勞軍寧朔將軍新野庾域諷夬曰黄鉞未加非所以揔帥矦伯夬返西臺遂有是命薛元嗣遣軍主沈難當帥輕舸數千亂流來戰張惠紹等擊擒之癸丑東昏矦以豫州刺史陳伯之為江州刺史假節都督前鋒諸軍事西擊荆雍夏四月蕭衍出沔命王茂蕭頴逹等進軍逼郢城薛元嗣不敢出諸將欲攻之衍不許魏廣陵惠王羽通於貟外郎馮俊興妻夜往為俊興所擊而匿之五月壬子卒魏主既親政事嬖倖擅權王公希得進見咸陽王禧意不自安齊帥劉小茍屢言於禧云聞天子左右人言欲誅禧禧益懼乃與妃兄兼給事黄門侍郎李伯尚氐王楊集始楊靈祐乞伏馬居等謀反會帝出獵北邙禧與其黨會城西小宅欲發兵襲帝使長子通竊入河内舉兵相應乞伏馬居説禧還入洛城勒兵閉門天子必北走桑乾殿下可斷河橋為河南天子衆情前却不壹禧心更緩自旦至晡猶豫不决遂約不泄而散楊集始既出即馳至北邙告之直寢苻承祖薛魏孫與禧通謀是日帝寢於浮圖之隂魏孫欲弑帝承祖曰吾聞殺天子者身當病癩魏孫乃止俄而帝寤集始亦至帝左右皆四出逐禽直衛無幾倉猝不知所出左中郎將于忠曰臣父領軍留守京城計防遏有僃必無所慮帝遣忠馳騎觀之于烈已分兵嚴僃使忠還奏曰臣雖老心力猶可用此屬猖狂不足為慮願陛下清蹕徐還以安物望帝甚悦自華林園還宫撫于忠之背曰卿差彊人意禧不知事露與姬妾及左右宿洪池别墅遣劉小茍奉啟云檢行田收小茍至北邙已逢軍人怪小茍赤衣欲殺之小茍困廹言欲告反乃緩之或謂禧曰殿下集衆圖事見意而停恐必漏泄今夕何宜自寛禧曰吾有此身應知自惜豈待人言又曰殿下長子已濟河兩不相知豈不可慮禧曰吾已遣人追之計今應還時通已入河内列兵仗放囚徒矣于烈遣直閤叔孫矦將虎賁三百人收禧禧聞之自洪池東南走僮僕不過數人濟洛至柏谷塢追兵至擒之送華林都亭帝面詰其反状壬戌賜死於私第同謀伏誅者十餘人諸子皆絶屬籍微給貲產奴婢自餘家財悉分賜高肇及趙脩之家其餘賜内外百官逮于流外多者百餘匹下至十匹禧諸子乏衣食獨彭城王勰屢賑給之河内太守陸琇聞禧敗斬送禧子通首魏朝以琇於禧未敗之前不收捕通責其通情徵詣廷尉死獄中帝以禧無故而反由是益疎忌宗室巴西太守魯休烈巴東太守蕭惠訓不從蕭頴胄之命惠訓遣子璝將兵擊頴胄頴胄遣汶陽太守劉孝慶屯峽口與巴東太守任漾之等拒之東昏矦遣軍主吳子陽陳虎牙等十三軍救郢州進屯巴口虎牙伯之之子也六月西臺遣衛尉席闡文勞蕭衍軍齎蕭頴胄等議謂衍曰今頓兵兩岸不併軍圍郢定西陽武昌取江州此機已失莫若請救於魏與北連和猶為上䇿衍曰漢口路通荆雍控引秦梁糧運資儲仰此氣息所以兵壓漢口連結數州今若併軍圍郢又分兵前進魯山必阻沔路搤吾咽喉若糧運不通自然離散何謂持乆鄧元起近欲以三千兵徃取尋陽彼若懽然知機一説士足矣脱距王師固非三千兵所能下也進退無據未見其可西陽武昌取之即得然既得之後即應鎮守欲守兩城不減萬人糧儲稱是卒無所出脱東軍有上者以萬人攻一城兩城勢不得相救若我分兵應援則首尾俱弱如其不遣孤城必陷一城既没諸城相次土崩天下大事去矣若郢州既拔席卷㳂流西陽武昌自然風靡何遽分兵散衆自貽憂患乎且丈夫舉事欲清天步况擁數州之兵以誅羣小懸河注火奚有不滅豈容北面請救戎狄以示弱於天下彼未必能信徒取醜聲此乃下計何謂上䇿卿為我輩白鎮軍前途攻取但以見付事在目中無患不㨗但借鎮軍靖鎮之耳吳子陽等進軍武口衍命軍主梁天惠等屯漁湖城唐脩期等屯白陽壘夾岸待之子陽進軍加湖去郢三十里傍山帶水築壘自固子陽舉烽城内亦舉火應之而内外各自保不能相救會房僧寄病卒衆復推助防張樂祖代守魯山蕭頴胄之初起也弟頴孚自建康出亡廬陵民脩靈祐為之聚兵得二千人襲廬陵克之内史謝篹奔豫章頴胄遣寧朔將軍范僧簡自湘州赴之僧簡拔安成頴胄以僧簡為安成太守以頴孚為廬陵内史東昏矦遣軍主劉希祖將三千人擊之南康太守王丹以郡應希祖頴孚敗奔長沙尋病卒謝篹復還郡希祖攻拔安成殺范僧簡東昏矦以希祖為安成内史脩靈祐復合餘衆攻謝篹篹敗走東昏矦作芳樂苑山石皆塗以五采望民家有好樹美竹則毁牆撤屋而徙之時方盛暑隨即枯萎朝暮相繼又於苑中立市使宮人宦者共為禆販以潘貴妃爲市令東昏矦自為市録事小有得失妃則與杖乃敕虎賁不得進大荆實中荻又開渠立埭身自引舩或坐而屠肉又好巫覡左右朱光尚詐云見鬼東昏入樂遊苑人馬忽驚以問光尚對曰曏見先帝大嗔不許數出東昏大怒拔刀與光尚尋之既不見乃縛菰為高宗形北向斬之縣首苑門崔慧景之敗也巴陵王昭胄永新矦昭頴出投臺軍各以王矦還第心不自安竟陵王子良故防閤桑偃為梅蟲兒軍副與前巴西太守蕭寅謀立昭胄昭胄許事克用寅為尚書左僕射䕶軍時軍主胡松將兵屯新亭寅遣人説之曰須昏人出寅等將兵奉昭胄入臺閉城號令昏人必還就將軍但閉壘不應則三公不足得也松許諾會東昏新作芳樂􅁐經月不出遊偃等議募健兒百餘人從萬春門入突取之昭胄以為不可偃同黨王山沙慮事乆無成以事告御刀徐僧重寅遣人殺山沙於路吏於麝幐中得其事昭胄兄弟與偃等皆伏誅雍州刺史張欣泰與弟前始安内史欣時密謀結胡松及前南譙太守王靈秀直閤將軍鴻選等誅諸嬖倖廢東昏東昏遣中書舍人馮元嗣監軍救郢秋七月甲午茹法珍梅蟲兒及太子右率李居士制局監楊明泰送之於中興堂欣泰等使人懐刀於座斫元嗣頭墜果柈中又斫明泰破其腹蟲兒傷數瘡手指皆墮居士法珍等散走還臺靈秀詣石頭迎建康王寳寅帥城中將吏見力去車輪載寳寅文武數百唱警蹕向臺城百姓數千人皆空手隨之欣泰聞事作馳馬入宮冀法珍等在外東昏盡以城中處分見委表裏相應既而法珍得返處分閉門上仗不配欣泰兵鴻選在殿内亦不敢發寳寅至杜姥宅日已暝城門閉城上人射外人外人弃寳寅潰去寳寅亦逃三日乃戎服詣草市尉尉馳以啟東昏東昏召寳寅入宮問之寳寅涕泣稱爾日不知何人逼使上車仍將去制不自由東昏笑復其爵位張欣泰等事覺與胡松皆伏誅蕭衍使征虜將軍王茂軍主曹仲宗等乗水漲以舟師襲加湖鼓譟攻之丁酉加湖潰吳子陽等走免將士殺溺死者萬計俘其餘衆而還於是郢魯二城相視奪氣乙巳柔然犯魏邊魯山乏糧軍人於磯頭捕細魚供食密治輕船將奔夏口蕭衍遣偏軍斷其走路丁巳孫樂祖窘迫以城降己未東昏矦以程茂為郢州刺史薛元嗣為雍州刺史是日茂元嗣以郢城降郢城之初圍也士民男女近十萬口閉門二百餘日疾疫流腫死者什七八積尸牀下而寢其上比屋皆滿茂元嗣等議出降使張孜為書與衍張沖故吏青州治中房長瑜謂孜曰前使君忠貫昊天郎君但當坐守畫一以荷析薪若天運不與當幅巾待命下從使君今從諸人之計非唯郢州士女失高山之望亦恐彼所不取也孜不能用蕭衍以韋叡為江夏太守行郢府事收瘞死者而撫其生者郢人遂安諸將欲頓軍夏口衍以為宜乗勝直指建康車騎諮議參軍張􅀪䇿寧逺將軍庾域亦以為然衍命衆軍即日上道緣江至建康凡磯浦村落軍行宿次立頓處所􅀪䇿逆為圖畫如在目中辛酉魏大赦魏安國宣簡矦王肅卒於壽陽贈侍中司空初肅以父死非命四年不除䘮高祖曰三年之䘮賢者不敢過命肅以祥禫之禮除䘮然肅猶素服不聽樂終身汝南民胡文超起兵於灄陽以應蕭衍求取義陽安陸等郡以自効衍又遣軍主唐脩期攻隨郡皆克之司州刺史王僧景遣子貞孫為質於衍司部悉平崔慧景之死也其少子偃為始安内史逃潜得免及西臺建以偃爲寧朔將軍偃詣公車門上書曰臣竊惟高宗之孝子忠臣而昏主之賊臣亂子者江夏王與陛下先臣與鎮軍是也雖成敗異術而所由同方陛下初登至尊與天合符天下纎介之屈尚望陛下申之况先帝之子陛下之兄所行之道即陛下所由哉此尚弗恤其餘何冀今不可幸小民之無識而㒺之若使曉然知其情節相帥而逃陛下將何以應之哉事寢不報偃又上疏曰近冐陳江夏之寃非敢以父子之親而傷至公之義誠不曉聖朝所以然之意若以狂主雖狂而實是天子江夏雖賢實是人臣先臣奉人臣逆人君為不可未審今之嚴兵勁卒直指象魏者其故何哉臣所以不死茍存視息非有它故所以待皇運之開泰申忠魂之枉屈今皇運已開泰矣而死社禝者反為賊臣臣何用此生於陛下之世矣臣謹案鎮軍將軍臣頴胄中領軍臣詳皆社禝之臣也同知先臣股肱江夏匡濟王室天命未遂主亡與亡而不為陛下瞥然一言知而不言不忠不知而不言不智也如以先臣遣使江夏斬之則征東之驛使何為見戮陛下斬征東之使寔詐山陽江夏違先臣之請實謀孔矝天命有歸故事業不遂耳臣所言畢矣乞就湯鑊然臣雖萬没猶願陛下必申先臣何則惻愴而申之則天下伏不惻愴而申之則天下叛先臣之忠有識所知南董之筆千載可期亦何待陛下屈申而為褒貶然小臣惓惓之愚為陛下計耳詔報曰具知卿惋切之懐今當顯加贈諡偃尋下獄死八月丁卯東昏矦以輔國將軍申胄監豫州事辛未以光禄大夫張瓌鎮石頭初東昏矦遣陳伯之鎮江州以為吳子陽等聲援子陽等既敗蕭衍謂諸將曰用兵未必須實力所聽威聲耳今陳虎牙狼狽奔歸尋陽人情理當恟懼可傳檄而定也乃命搜俘囚得伯之幢主蘇隆之厚加賜與使説伯之許即用為安東將軍江州刺史伯之遣隆之返命雖許歸附而云大軍未須遽下衍曰伯之此言意懐首䑕及其猶豫急往逼之計無所出勢不得不降乃命鄧元起引兵先下楊公則徑掩柴桑衍與諸將以次進路元起將至尋陽伯之收兵退保湖口留陳虎牙守湓城選曹郎吳興沈瑀説伯之迎衍伯之泣曰余子在都不能不愛瑀曰不然人情匈匈皆思改計若不早圖衆散難合丙子衍至尋陽伯之束甲請罪初新蔡太守席謙父恭祖為鎮西司馬為魚復矦子響所殺謙從伯之鎮尋陽聞衍東下曰我家世忠貞有殞不二伯之殺之乙卯以伯之為江州刺史虎牙為徐州刺史魯休烈蕭璝破劉孝慶等於峽口任漾之戰死休烈等進至上明江陵大震蕭頴胄恐馳告蕭衍令遣楊公則還援根本衍曰公則今泝流上江陵雖至何能及事休烈等烏合之衆尋自退散政須少時持重耳良須兵力兩弟在雍指遣徃徵不為難至頴胄乃遣蔡道恭假節屯上明以拒蕭璝辛巳東昏矦以太子左率李居士揔督西討諸軍事屯新亭九月乙未詔蕭衍若定京邑得以便宜從事衍留驍騎將軍鄭紹叔守尋陽與陳伯之引兵東下謂紹叔曰卿吾之蕭何寇恂也前途不㨗我當其咎糧運不繼卿任其責紹叔流涕拜辭比克建康紹叔督江湘糧運未嘗乏絶魏司州牧廣陽王嘉請築洛陽三百二十三坊各方三百歩曰雖有暫勞姦盜永息丁酉詔􅀤畿内夫五萬人築之四旬而罷己亥魏立皇后于氏后征虜將軍勁之女勁烈之弟也自祖父栗磾以來累世貴盛一皇后四贈公三領軍二尚書令三開國公甲申東昏矦以李居士為江州刺史冠軍將軍王珍國為雍州刺史建安王寳寅為荆州刺史輔國將軍申胄監郢州龍驤將軍扶風馬仙琕監豫州驍騎將軍徐元稱監徐州軍事珍國廣之之子也是日蕭衍前軍至蕪湖申胄軍二萬人弃姑孰走衍進軍據之戊申東昏矦以後軍參軍蕭璝為司州刺史前輔國將軍魯休烈為益州刺史蕭衍之克江郢也東昏矦逰騁如舊謂茹法珍曰須來至白門前當一决衍至近道乃聚兵為固守之計簡二尚方二冶囚徒以配軍其不可活者於朱雀門内日斬百餘人衍遣曹景宗等進頓江寧丙辰李居士自新亭選精騎一千至江寧景宗始至營壘未立且師行日乆器甲穿弊居士望而輕之鼓譟前薄之景宗奮擊破之因乗勝而前徑至皁莢橋於是王茂鄧元起呂僧珍進據赤􅈹邏新亭城主江道林引兵出戰衆軍擒之於陳衍至新林命王茂進據越城鄧元起據道士墩陳伯之據籬門呂僧珍據白板橋李居士覘知僧珍衆少帥鋭卒萬人直來薄壘僧珍曰吾衆少不可逆戰可勿遥射須至塹裏當併力破之俄而皆越塹㧞柵僧珍分人上城矢石俱􅀤自帥馬歩三百人出其後城上人復踰城而下内外奮擊居士敗走獲其器甲不可勝計居士請於東昏矦燒南岸邑屋以開戰場自大航以西新亭以北皆盡衍諸弟皆自建康自拔赴軍冬十月甲戌東昏矦遣征虜將軍王珍國軍主胡虎牙將精兵十萬餘人陳於朱雀航南宦官王寳孫持白虎幡督戰開航背水以絶歸路衍軍小却王茂下馬單刀直前其甥韋欣慶執鐵纒矟以翼之衝擊東軍應時而陷曹景宗縱兵乗之呂僧珍縱火焚其營將士皆殊死戰鼓譟震天地珍國等衆軍不能抗王寳孫切罵諸將帥直閣將軍席豪發憤突陣而死豪驍將也既死士卒土崩赴淮死者無數積尸與航等後至者乗之以濟於是東昏矦諸軍望之皆潰衍軍長驅至宣陽門諸將移營稍前陳伯之屯西明門每城中有降人出伯之輒呼與耳語衍恐其復懐翻覆密語伯之曰聞城中甚忿卿舉江州降欲遣刺客中卿宜以為慮伯之未之信會東昏矦將鄭伯倫來降衍使伯倫過伯之謂曰城中甚忿卿欲遣信誘卿以封賞須卿復降當生割卿手足卿若不降復欲遣刺客殺卿宜深為僃伯之懼自是始無異志戊寅東昏寧朔將軍徐元瑜以東府城降青冀二州刺史桓和入援屯東宮己卯和詐東昏云出戰因以其衆來降光禄大夫張瓌弃石頭還宮李居士以新亭降於衍琅邪城主張木亦降壬午衍鎮石頭命諸軍攻六門東昏燒門内營署官府驅逼士民悉入宮城閉門自守衍命諸軍築長圍守之楊公則屯領軍府壘北神鋒弩射之矢貫胡牀左右失色公則曰幾中吾脚談弩射之矢貫胡牀左右失色公則曰幾中吾脚談笑如初東昏夜選勇士攻公則柵軍中驚擾公則堅臥不起徐命擊之東昏兵乃退公則所領皆湘州人素號怯懦城中輕之每出盪輒先犯公則壘公則奬厲軍士克獲更多先是東昏遣軍主左僧慶屯京口常僧景屯廣陵李叔獻屯􅀲歩及申胄自姑孰奔歸使屯破墩以為東北聲援至是衍遣使曉諭皆帥其衆來降衍遣弟輔國將軍秀鎮京口輔國將軍恢鎮破墩從弟寧朔將軍景鎮廣陵十一月丙申魏以驃騎大將軍穆亮為司空丁酉以北海王詳為太傅領司徒初詳欲奪彭城王􅎰司徒故譛而黜之既而畏人議已故但為大將軍至是乃居之詳貴盛翕赫將作大匠王遇多隨詳所欲私以官物給之司空長史于忠責遇於詳前曰殿下國之周公阿衡王室所須材用自應闗㫖何至阿諛附勢損公惠私也遇既踧踖詳亦慙謝忠毎以鯁直為詳所忿嘗罵忠曰我憂在前見爾死不憂爾見我死時也忠曰人生於世自有定分若應死於王手避亦不免若其不爾王不能殺忠以討咸陽王禧功封魏郡公遷散騎常侍兼武衛將軍詳因忠表讓之際密勸魏主以忠為列卿令觧左右聽其讓爵於是詔停其封優進太府卿巴東獻武公蕭頴胄以蕭璝與蔡道恭相持不决憂憤成疾壬午卒夏矦詳祕之使似其書者假為敎命密報蕭衍衍亦祕之詳徵兵雍州蕭偉遣蕭憺將兵赴之璝等聞建康已危衆懼而潰璝及魯休烈皆降乃發頴胄䘮贈侍中丞相於是衆望盡歸於衍夏矦詳請與蕭憺共參軍國詔以詳為侍中尚書右僕射尋除使持節撫軍將軍荆州刺史詳固讓于憺乃以憺行荆州府州事魏改築圜丘於伊水之陽乙卯始祀於其上魏鎮南將軍元英上書曰蕭寳卷驕縱日甚虐害無辜其雍州刺史蕭衍東伐秣陵掃土興兵順流而下唯有孤城更無重衛乃皇天授我之日曠載一逢之秋此而不乗將欲何待臣乞躬帥歩騎三萬直指沔隂據襄陽之城斷黒水之路昏虐君臣自相魚肉我居上流威震遐邇長驅南出進拔江陵則三楚之地一朝可收岷蜀之道自成斷絶又命揚徐二州聲言俱舉建業窮蹙魚遊釡中可以齊文軌而大同混天地而為一伏惟陛下獨决聖心無取疑議此期脱爽并吞無日事寢不報車騎大將軍源懐上言蕭衍内侮寳巻孤危廣陵淮隂等戍皆觀望得失斯實天啟之期并吞之會宜東西齊舉以成席卷之勢若使蕭衍克濟上下同心豈惟後圖之難亦恐揚州危逼何則壽春之去建康纔七百里山川水陸皆彼所諳彼若内外無虞君臣分定乗舟藉水倐忽而至未易當也今寳卷都邑有土崩之憂邊城無繼援之望廓清江表正在今日魏主乃以任城王澄為都督淮南諸軍事鎮南大將軍開府儀同三司揚州刺史使為經略既而不果懐賀之子也東豫州刺史田益宗上表曰蕭氏亂常君臣交爭江外州鎮中外為兩東西抗峙已淹歲時民庶窮於轉輸甲兵疲於戰􅃲事救於目前力盡於麾下無暇外維州鎮綱紀庶方藩城棊立孤存而已不乗機電掃廓彼蠻疆恐後之經略未易於此且壽春雖平三面仍梗鎮守之宜實須豫設義陽差近淮源利渉津要朝廷行師必由此道若江南一平有事淮外須乗夏水汎長列舟長淮師赴壽春須從義陽之北便是居我喉要在慮彌深義陽之滅今實時矣度彼不過須精卒一萬二千然行師之法貴張形勢請使兩荆之衆西擬隨雍揚州之卒頓于建安得捍三闗之援然後二豫之軍直據南闗對抗延頭遣一都督揔諸軍節度季冬進師迄于春末不過十旬克之必矣元英又奏稱今寳卷骨肉相殘藩鎮鼎立義陽孤絶密邇王土内無兵儲之固外無糧援之期此乃欲焚之鳥不可去薪授首之㓂豈容緩斧若失此不取豈惟後舉難圖亦恐更為深患今豫州刺史司馬悦已戒嚴垂發東豫州刺史田益宗兵守三闗請遣軍司為之節度魏主乃遣直寢羊靈引為軍司益宗遂入㓂建寧太守黄天賜與益宗戰於赤亭天賜敗績崔慧景之逼建康也東昏矦拜蔣子文神為假黄􅃏使持節相國太宰大將軍録尚書事揚州牧鍾山王及衍至又尊子文為靈帝迎神像入後堂使巫禱祀求福及城閉城中軍事悉委王珍國兖州刺史張稷入衛京師以稷為珍國之副稷瓌之弟也時城中實甲猶七萬人東昏素好軍陳與黄門刀敕及宮人於華光殿前習戰鬪詐作被創勢使人以板掆去用為猒勝常於殿中戎服騎馬出入以金銀為鎧胄具裝飾以孔翠晝眠夜起一如平常聞外鼓呌聲被大紅袍登景陽樓屋上望之弩幾中之始東昏與左右謀以為陳顯逹一戰即敗崔慧景圍城㝷走謂衍兵亦然敕太官辦樵米爲百日調而已及大桁之敗衆情兇懼茹法珍等恐士民逃潰故閉城不復出兵既而長圍已立塹柵嚴固然後出盪屢戰不㨗東昏尤惜金錢不肯賞賜法珍叩頭請之東昏曰賊來獨取我邪何為就我求物後堂儲數百具榜啟為城防東昏欲留作殿竟不與又督御府作三百人精仗待圍觧以擬屏除金銀雕鏤雜物倍急於常衆皆怨怠不為致力外圍既乆城中皆思早亡莫敢先發茹法珍梅蟲兒説東昏曰大臣不留意使圍不觧宜悉誅之王珍國張稷懼禍珍國密遣所親獻明鏡於蕭衍衍斷金以報之兖州中兵參軍馮翊張齊稷之腹心也珍國因齊密與稷謀同弑東昏齊夜引珍國就稷造膝定計齊自執燭又以計告後閤舍人錢強十二月丙寅夜強密令人開雲龍門珍國稷引兵入殿御刀豐勇之為内應東昏在含徳殿作笙歌寢未熟聞兵入趨出北户欲還後宮門已閉宦者黄泰平刀傷其膝仆地張齊斬之稷召尚書右僕射王亮等列坐殿前西鍾下令百僚署牋以黄油裹東昏首遣國子博士范雲等送詣石頭右衛將軍王志歎曰冠雖弊何可加足取庭中樹葉挼服之偽悶不署名衍覽牋無志名心嘉之亮瑩之從弟志僧虔之子也衍與范雲有舊即留參幃幄王亮在東昏朝以依違取容蕭衍至新林百僚皆間道送欵亮獨不遣東昏敗亮出見衍衍曰顛而不扶安用彼相亮曰若其可扶明公豈有今日之舉城中岀者或􅀍劫剥楊公則親帥麾下陳於東掖門衛送公卿士民故出者多由公則營焉衍使張􅀪䇿先入清宮封府庫及圖籍于時城内珍寳委積􅀪䇿禁勒部曲秋毫無犯收潘妃及嬖臣茹法珍梅蟲兒王咺之等四十一人皆屬吏初海陵王之廢也王太后出居鄱陽王故第號宣徳宮乙巳蕭衍以宣徳太后令追廢涪陵王為東昏矦禇后及太子誦並為庶人以衍為中書監大司馬録尚書事驃騎大將軍揚州刺史封建安郡公依晉武陵王遵承制故事百僚致敬以王亮為長史壬申更封建安王寳寅為鄱陽王癸酉以司徒揚州刺史晉安王寳義為太尉領司徒己卯衍入屯閲武堂下令大赦又下令凢昏制謬賦淫刑濫役外可詳檢前原悉皆除盪其主守散失諸所損耗精立科條咸從原例又下令通檢尚書衆曹東昏時諸諍訟失理及主者淹停不時施行者精加訊辨依事議奏又下令收葬義師掩瘞逆徒之死亡者潘妃有國色衍欲留之以問侍中領軍將軍王茂茂曰亡齊者此物留之恐貽外議乃縊殺於獄并誅嬖臣茹法珍等以宮女二千分賚將士乙酉以輔國將軍蕭宏為中䕶軍衍之東下也豫州刺史馬仙琕擁兵不附衍衍使其故人姚仲賔説之仙琕先為設酒乃斬於軍門以徇衍又遣其族叔懐逺説之仙琕曰大義滅親又欲斬之軍中為請乃得免衍至新林仙琕猶於江西日抄運船衍圍宮城州郡皆遣使請降吳興太守袁昂獨拒境不受命昂顗之子也衍使駕部郎考城江革為書與昂曰根本既傾枝葉安附今竭力昏主未足為忠家門屠滅非所謂孝豈若翻然改圖自招多福昂復書曰三吳内地非用兵之所况以偏隅一郡何能為役自承麾斾届止莫不膝袒軍門惟僕一人敢後至者政以内揆庸素文武無施雖欲獻心不增大師之勇置其愚黙寧沮衆軍之威幸藉將軍含􅀪之大可得從容以禮竊以一餐微施尚復投殞况食人之禄而頓忘一旦非惟物議不可亦恐明公鄙之所以躊躇未遑薦璧昂問時事於武康令北地傅映映曰昔元嘉之末開闢未有故太尉殺身以明節司徒當寄託之重理無茍全所以不顧夷險以徇名義今嗣主昏虐曾無悛改荆雍協舉乗據上流天人之意可知願明府深慮無取後悔及建康平衍使豫州刺史李元履廵撫東土敕元履曰袁昂道素之門世有忠節天下須共容之勿以兵威陵辱元履至吳興宣衍㫖昂亦不請降開門撤僃而已仙琕聞臺城不守號泣謂將士曰我受人任寄義不容降君等皆有父母我為忠臣君為孝子不亦可乎乃悉遣城内兵出降餘壯士數十閉門獨守俄而兵入圍之數十重仙琕令士皆持滿兵不敢近日暮仙琕乃投弓曰諸君但來見取我義不降乃檻送石頭衍釋之使待袁昂至俱入曰令天下見二義士衍謂仙琕曰射鉤斬袪昔人所美卿勿以殺使斷運自嫌仙琕謝曰小人如失主犬後主飼之則復為用矣衍笑皆厚遇之丙戌蕭衍入鎮殿中劉希祖既克安成移檄湘部始興内史王僧粲應之僧粲自稱湘州刺史引兵襲長沙去城百餘里於是湘州郡縣兵皆蜂起以應僧粲唯臨湘湘隂瀏陽羅四縣尚全長沙人皆欲汎舟走行事劉坦悉聚其舟焚之遣軍主尹法略拒僧粲戰數不利前湘州鎮軍鍾􅀇紹潜結士民數百人刻日翻城應僧粲坦聞其謀陽為不知因理訟至夜而城門遂不閉以疑之􅀇紹未􅀤明旦詣坦問其故坦乆留與語密遣親兵收其家書􅀇紹在坐而收兵已報具得其文書本末􅀇紹即百伏於坐斬之焚其文書餘黨悉無所問衆愧且服州郡遂安法略與僧粲相持累月建康城平楊公則還州僧粲等散走王丹為郡人所殺劉希祖亦舉郡降公則克己亷慎輕刑薄賦頃之湘州户口幾復其舊資治通鑑卷第一百四十四
