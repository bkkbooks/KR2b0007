seq: 144
front:
  text: 並不受衍命舉兵欲襲襄陽偉憺遣兵邀擊於治平大破之雍州乃安魏咸陽王禧爲上相不親政務驕奢貪淫多爲不法魏主頗惡之禧遣奴就領軍于烈求舊羽林虎賁執仗出入烈曰天子諒闇事歸宰輔領軍但知典掌宿衛非有詔不敢違理從私禧奴惘然而返禧復遣謂烈曰我天子之子天子叔父身爲元輔有所求須與詔何異烈厲色曰烈非不知王之貴也奈何使私奴索天子羽林烈頭可得羽林不可得禧怒以烈爲恒州刺史烈不願出外固辭不許遂稱疾不出烈子左中郎將忠領直閤常在魏主左右烈使忠言於魏主曰諸王專恣意不可測宜早罷之自攬權綱北海王詳亦密以禧過惡白帝且言彭城王勰大得人情不宜乆輔政帝然之時將礿祭王公並齋於廟東坊帝夜使于忠語烈明旦入見當有處分質明烈至帝命烈將直閤等六十餘人宣㫖召禧勰詳衛送至帝所禧等入見於光極殿帝曰恪雖寡昧沗承寳厯比纒尫疹實慿諸父茍延視息奄渉三齡諸父歸遜殷勤今便親攝百揆且還府司當别處分又謂勰曰頃來南北務殷不容仰遂冲操恪是何人而敢久違先敕令遂叔父髙蹈之意􅎰謝曰陛下孝恭仰遵先詔上成睿眀之美下遂微臣之志感今惟往悲喜交深庚戌詔􅎰以王歸第禧進位太保詳為大將軍録尚書事尚書清河張彞邢巒聞處分非常亡走出洛陽城為御史中尉中山甄琛所彈詔書切責之復以于烈為領軍仍加車騎大將軍自是長直禁中軍國大事皆得參焉魏主時年十六不能親决庶務委之左右於是倖臣茹皓趙郡王仲興上谷宼猛趙郡趙脩南陽趙邕及外戚高肇等始用事魏政浸衰趙脩尤親幸旬月間累遷至光禄卿每遷官帝親至其宅設宴王公百官皆從辛亥東昏矦祀南郊大赦丁巳魏主引見羣臣於太極前殿告以親政之意壬戌以咸陽王禧領太尉廣陵王羽為司徒魏主引羽入内面授之羽固辭曰彥和本自不願而陛下強與之今新去此官而以臣代之必招物議乃以為司空二月乙丑南康王以冠軍長史王茂為江州刺史竟陵太守曹景宗為郢州刺史邵陵王寳攸為荆州刺史
