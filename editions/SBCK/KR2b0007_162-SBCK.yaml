front:
  text: 方食投箸􅀍甲與其麾下百􅀐馳往救之與景戰於青塘大破之斬首數百級沈淮水死者千餘人仲禮矟將及景而賊將支伯仁自後斫仲禮中肩馬䧟于淖賊聚矟刺之􅀐將郭山石救之得免仲禮􅀍重瘡㑹稽人惠臶吮瘡斷血故得不死自是景不敢復濟南岸仲禮亦氣衰不復言戰矣邵陵王綸復收散卒與東楊州刺史臨城公大連新淦公大成等自東道並至庚申列營于桁南亦推柳仲禮爲大都督大連大臨之弟也朝野以矦景之禍共尤朱异异慙憤發疾庚申卒故事尚書官不以爲贈上痛惜异特贈尚書右僕射甲子湘東丗子方等及王僧辯軍至
