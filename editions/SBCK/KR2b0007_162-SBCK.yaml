body:
  text: 戊辰封山矦正表以北徐州降東魏東魏徐州刺史髙歸彦遣兵赴之歸彦歡之族弟也己巳太子遷居永福省髙州刺史李遷仕天門太守樊文皎將援兵萬餘人至城下臺城與援軍信命乆絶有羊車兒獻策作紙䲭繫以長繩寫敇於内放以從風兾達衆軍題云得䲭送援軍賞銀百兩太子自出太極殿前乗西北風縱之賊怪之以爲厭勝射而下之援軍募人能入城送啓者鄱陽丗子嗣左右李朗請先受鞭詐爲得罪叛投賊因得入城城中方知援兵四集舉城鼓譟上以朗爲直閤將軍賜金遣之朗縁鍾山之後宵行晝伏積日乃逹癸未鄱陽丗子嗣永安矦確莊鐵羊鴉仁柳敬禮李遷仕樊文皎將兵度淮攻東府前柵焚之矦景退衆軍營於青溪之東遷仕文皎帥鋭卒五千獨進􅀷入所向摧靡至菰首橋東景將宋子仙伏兵擊之文皎戰死遷仕遁還敬禮仲禮之弟也仲禮神情傲很陵蔑諸將邵陵王綸每日執鞭至門亦移時弗見由是與綸及臨城公大連􅀷相仇怨大連又與永安矦確有隙諸軍互相猜阻莫有戰心援軍􅀄至建康士民扶老􅂝㓜以􅀱之纔過淮即縱兵剽掠由是士民失望賊中有謀應官軍者聞之亦止王顯貴以壽陽降東魏臨賀王記室吳郡顧野王起兵討矦景二月己丑引兵来至􅀄臺城之閉也公卿以食爲念男女貴賤並出􅀒米得四十萬斛收諸府藏錢帛五十萬億並聚德陽堂而不備薪芻魚鹽至是壊尚書省爲薪撤薦剉以飼馬薦盡又食以飯軍士無膎或煑鎧熏䑕捕雀而食之御甘露厨有乾苔味酸鹹分給戰士軍人屠馬於殿省閒親以人肉食者必病矦景衆亦飢抄掠無所􅀗東城有米可支一年援軍斷其路又聞荆州兵將至景甚患之王偉曰今臺城不可猝拔援兵日盛吾軍乏食􅀂僞且求和以緩其􅀔東城之米足支一年因求和之際運米入石頭援軍必不得動然後休士息馬繕修器械伺其懈怠擊之一舉可取也景從之遣其將任約于子恱至城下拜表求和乞復先鎭太子以城中窮困白上請許之上怒曰和不如死太子固請曰矦景圍逼巳乆援軍相仗不戰宜且許其和更爲後圖上遲回乆之乃曰汝自圖之勿令取笑千載遂報許之景乞割江右四州之地并求宣城王大器出送然後濟江中領軍傅􅄮固爭曰豈有賊舉兵圍宫闕而更與之和乎此特欲却援軍耳戎狄獸心必不可信且宣城嫡嗣之重國命所繫豈可爲質上乃以大器之弟石城公大欵爲侍中出質於景又敕諸軍不得復進下詔曰善兵不戰止戈爲武可以景爲大丞相都督江西四州諸軍事豫州牧河南王如故巳亥設壇於西華門外遣僕射王克上甲矦韶吏部郎蕭瑳與于子恱任約王偉登壇共盟太子詹事栁津出西華門景出柵門遥相對更殺牲歃血爲盟旣盟而景長圍不解專修鎧仗託云無船不得即發又云恐南軍見躡遣石城公還臺求宣城王出送邀求稍廣了無去志太子知其詐言猶羈縻不絶韶懿之孫也庚子前南兖州刺史南康王㑹理前青冀二州刺史湘潭矦退西昌矦丗子彧衆合三萬至于馬卬洲景慮其自白下而上啓云請敇北軍聚還南岸不爾妨臣濟江太子即勒㑹理自白下城移軍江潭苑退恢之子也辛丑以邵陵王綸爲司空鄱陽王範爲征北將軍柳仲禮爲侍中尚書右僕射景以于子悦任約􅀓士悊皆爲儀同三司夏矦譒爲豫州刺史董紹先爲東徐州刺史徐思玉爲北徐州刺史王偉爲散􅀐常侍上以偉爲侍中乙卯景又啓曰適有西岸信至髙澄巳得壽陽鍾離臣今無所投足求借廣陵并譙州俟得壽陽即奉還朝廷又云援軍旣在南岸湏於京口度江太子並荅許之癸卯大赦庚戍景又啓曰永安矦確直閤趙威方頻隔柵見詬云天子自與汝盟我終當破汝乞召矦及威方入即當引路上遣吏部尚書張綰召確辛亥以確爲廣州刺史威方爲盱眙太守確累啓固辭不入上不許確先遣威方入城因欲南奔邵陵王綸泣謂確曰圍城旣乆聖上憂危臣子之情切於湯火故欲且盟而遣之更申後計成命巳决何得拒違時臺使周石珍東宫主書左法生在綸所確謂之曰矦景雖云欲去而不解長圍意可見也今召僕入城何益於事石珍曰敕旨如此郎那得辭確意尚堅綸大怒謂趙伯超曰譙州爲我斬之持其首去伯超揮刃眄確曰伯超識君矦刀不識也確乃流涕入城上常􅂼食及圍城日乆上厨􅂼茹皆絶乃食雞子綸因使者蹔通上鷄子數百枚上手自料簡歔欷哽咽湘東王繹軍於郢州之武城湘州刺史河東王譽軍於青草湖信州刺史桂陽王慥軍於西峽口託云俟四方援兵淹留不進中記室參軍蕭賁骨鯁士也以繹不早下心非之甞與繹􅀟六食子未下賁曰殿下都無下意繹􅀷衘之及得上敕繹欲旋師賁曰景以人臣舉兵向闕今􅀂放兵未及度江童子能斬之矣必不爲也大王以十萬之衆未見賊而退柰何繹不恱未幾因事殺之慥懿之孫也東魏河内民四千餘家以魏北徐州刺史司馬裔其郷里也相帥歸之丞相泰欲封裔裔固辭曰士大夫逺歸皇化裔豈能帥之賣義士以求榮非所願也矦景運東府米入石頭旣畢王偉聞荆州軍退援軍雖多不相統壹乃説景曰王以人臣舉兵圍守宫闕逼辱妃主殘穢宗廟擢王之髮不足數罪今日持此欲安所容身乎背盟而捷自古多矣願且觀其變臨賀王正德亦謂景曰大功垂就豈可弃去景遂上啓陳上十失且曰臣方事睽違所以冒陳讜直陛下崇飾虚誕惡聞實録以祅怪爲嘉禎以天譴爲無咎敷演六藝排擯前儒王莽之法也以鐵爲貨使輕重無常公孫之制也爛羊鐫印朝章鄙雜更始趙倫之化也豫章以所天爲血讎邵陵以父存而冠布石虎之風也修建浮圖百度糜費使四民飢餒笮融姚興之代也又言建康宫室崇侈陛下唯與主書參斷萬機政以賄成諸閹豪盛衆僧殷實皇太子珠玉是好酒色是耽吐言止於輕薄賦詠不出桑中邵陵所在殘破湘東羣下貪縱南康定襄之屬皆如沭猴而冠耳親爲孫姪位則藩屏臣至百日誰肯勤王此而靈長未之有也昔鬻拳兵諫王卒攺善今日之舉復奚罪乎伏願陛下小懲大戒放䜛納忠使臣無再舉之憂陛下無嬰城之辱則萬姓幸甚上覽啓且慙且怒三月丙辰朔立壇於太極殿前告天地以景違盟舉烽鼔譟􅀄閉城之日男女十餘萬擐甲者二萬餘人􅀍圍旣乆人多身腫氣急死者什八九乗城者不滿四千人率皆羸喘横尸滿路不可瘞埋爛汁滿溝而衆心猶望外援栁仲禮唯聚妓妾置酒作樂諸將日往請戰仲禮不許安南矦駿説邵陵王綸曰城危如此而都督不救􅀂萬一不虞殿下何顔自立於丗今冝分軍爲三道出賊不意攻之可以得志綸不從柳津登城謂仲禮曰汝君父在難不能竭力百丗之後謂汝爲何仲禮亦不以爲意上問策於津對曰陛下有邵陵臣有仲禮不忠不孝賊何由平戊午南康王㑹理與羊鴉仁趙伯超等進營於東府城北約夜度軍旣而鴉仁等暁猶未至景衆覺之營未立景使宋子仙擊之趙伯超望風退走㑹理等兵大敗戰及溺死者五千人景積其首於闕下以示城中景又使于子悅求和上使御史中丞沈浚至景所景實無去志謂浚曰今天時方熱軍未可動乞且留京師立効浚發憤責之景不對横刀叱之浚曰負恩忘義違弃詛盟固天地所不容沈浚五十之年常恐不得死所何爲以死相懼邪因徑去不顧景以其忠直捨之於是景決石闕前水百道攻城晝夜不息邵陵丗子堅屯太陽門終日蒱飲不恤吏士其書佐董勛熊曇朗恨之丁卯夜向曉勛曇朗於城西北樓引景衆登城永安矦確力戰不能却乃排闥入啓上云城巳䧟上安卧不動曰猶可一戰乎對曰不可上歎曰自我得之自我失之亦復何恨因謂確曰汝速去語汝父勿以二宫爲念因使慰勞在外諸軍俄而景遣王偉入文徳殿奉謁上命褰簾開户引偉入偉拜呈景啓稱爲姦倿所蔽領衆入朝驚動聖躬今詣闕待罪上問景何在可召來景入見於太極東堂以甲士五百人自衞景稽顙殿下典儀引就三公榻上神色不變問曰卿在軍中日乆無乃爲勞景不敢仰視汗流􅀍面又曰卿何州人而敢至此妻子猶在北邪景皆不能對任約從旁代對曰臣景妻子皆爲髙氏所屠唯以一身歸陛下上又問􅀄度江有幾人景曰千人圍臺城幾人曰十萬今有幾人曰率土之内莫非已有上俛首不言景復至永福省見太子太子亦無懼容侍衞皆驚散唯中庻子徐摛通事舎人陳郡殷不害側侍摛謂景曰矦王當以禮見何得如此景乃拜太子與言又不能對景退謂其廂公王僧貴曰吾常跨鞌對陳矢刃交下而意氣安緩了無怖心今見蕭公使人自慴豈非天威難犯吾不可以再見之於是悉撤兩宫侍衞縱兵掠乗輿服御宫人皆盡收朝士王矦送永福省使王偉守武德殿于子悦屯太極東堂矯詔大赦自加大都督中外諸軍録尚書事建康士民逃難四出太子洗馬蕭允至京口端居不行曰死生有命如何可逃禍之所來皆生於利苟不求利禍從何生己巳景遣石城公大款以詔命解外援軍柳仲禮召諸將議之邵陵王綸曰今日之命委之將軍仲禮熟視不對裴之髙王僧辯曰將軍擁衆百萬致宫闕淪没正當悉力決戰何所多言仲禮竟無一言諸軍乃隨方各散南兖州刺史臨城公大連湘東丗子方等鄱陽丗子嗣北兖州刺史湘潭矦退呉郡太守表君正􅀳陵太守陸經等各還本鎭君正昂之子也邵陵王綸奔㑹稽仲禮及弟敬禮羊鴉仁王僧辯趙伯超並開營降軍士莫不歎憤仲禮等入城先拜景而後見上上不與言仲禮見父津津慟哭曰汝非我子何勞相見湘東王繹使全威將軍㑹稽王琳送米二十萬石以饋軍至姑孰聞臺城䧟沈米於江而還景命燒臺内積尸病篤未絶者亦聚而焚之庚午詔征鎭牧守可復本任景留柳敬禮羊鴉仁而遣柳仲禮歸司州王僧辯歸竟陵􅀄臨賀王正德與景約平城之日不得全二宫及城開正德帥衆揮刀欲入景先使其徒守門故正德不果入景更以正德爲侍中大司馬百官皆復舊職正德入見上拜且泣上曰啜其泣矣何嗟及矣秦郡陽平盱眙三郡皆降景景攺陽平爲北滄州改秦郡爲西兖州東徐州刺史湛海珍北青州刺史王奉伯淮陽太守王瑜並以地降東魏青州刺史明少遐山陽太守蕭鄰弃城走東魏據其地矦景以儀同三司蕭邕爲南徐州刺史代西昌矦淵藻鎭京口又遣其將徐相攻􅀳陵陸經以郡降之􅀄上以河東王譽爲湘州刺史徙湘州刺史張纉爲雍州刺史代岳陽王詧纉恃其才望輕譽少年迎􅀱有闕譽至檢括州府付度事留纉不遣聞矦景作亂頗陵蹙纉纉恐爲所害輕舟夜遁將之雍部復慮詧拒之纉與湘東王繹有舊欲因之以殺譽兄弟乃如江陵及臺城䧟諸王各還州鎭譽自湖口歸湘州桂陽王慥以荆州督府留軍江陵欲待繹至拜謁乃還信州纉遺繹書曰河東戴檣上水欲襲江陵岳陽在雍共謀不逞江陵游軍主朱榮亦遣使告繹云桂陽留此欲應譽詧繹懼鑿船沈米斬纜自蠻中步道馳歸江陵囚慥殺之矦景以前臨江太守董紹先爲江北行臺使齎上手敕召南兖州刺史南康王㑹理壬午紹先至廣陵衆不滿二百皆積日飢疲㑹理士馬甚盛僚佐說㑹理曰景巳䧟京邑欲先除諸藩然後簒位􅀂四方拒絶立當潰敗柰何委全州之地以資㓂手不如殺紹先發兵固守與魏連和以待其變㑹理素懦即以城授之紹先旣入衆莫敢動㑹理弟通理請先還建康謂其姊曰事旣如此豈可闔家受斃前途亦思立效但未知天命如何耳紹先悉収廣陵文武部曲鎧仗金帛遣㑹理單馬還建康湘潭矦退與北兖州刺史定襄矦低岀奔東魏矦景以蕭弄璋爲北兖州刺史州民發兵拒之景遣直閤將軍羊海將兵助之海以其衆降東魏東魏遂據淮隂祗偉之子也癸未矦景遣于子悦等將羸兵數百東略吳郡新城戍主戴僧逷有精甲五千説太守􅀽君正曰賊今乏食臺中所得不支一旬􅀂閉關拒守立可餓死土豪陸映公等恐不能勝而資産􅀍掠皆勸君正迎之君正素怯載米及牛酒郊迎子悦執君正掠奪財物子女東人皆立堡拒之景又以任約爲南道行臺鎭姑孰夏四月湘東丗子方等至江陵湘東王繹始知臺城不守命於江陵四旁七里樹木爲柵掘塹三重而守之東魏髙岳等攻魏潁川不克大將軍澄益兵助之道路相繼踰年猶不下山鹿忠武公劉豐生建䇿堰洧水以灌之城多崩頺岳悉衆分休迭進王思政身當矢石與士卒同勞苦城中泉涌懸釡而炊太師泰遣大將軍趙貴督東南諸州兵救之自長社以北皆爲陂澤兵至穰不得前東魏人使善射者乗大艦臨城射之城垂䧟燕郡景惠公慕容紹宗與劉豐生臨堰視之見東北塵起同入艦坐避之俄而暴風至逺近晦􅁳纜斷飄船徑向城城上人以長鉤牽船弓弩亂發紹宗赴水溺死豐生游水向土山城上人射殺之甲辰東魏進大將軍勃海王澄位相國封齊王加殊禮丁未澄入朝于鄴固辭不許澄召將佐密議之皆勸澄冝膺朝命獨散􅀐常侍陳元康以爲未可澄由是嫌之崔暹乃薦陸元規爲大行臺郎以分元康之權湘東王繹之入援也令所督諸州皆發兵雍州刺史岳陽王詧遣府司馬劉方貴將兵出漢口繹召詧使自行詧不從方貴潜與繹相知謀襲襄陽未發㑹詧以它事召方貴方貴以爲謀泄遂據樊城拒命詧遣軍攻之繹厚資遣張纉使赴鎭纉至大堤詧巳抜樊城斬方貴纉至襄陽詧推遷未去但以城西白馬寺處之詧猶緫軍府之政聞臺城䧟遂不受代助防杜岸紿纉曰觀岳陽􅀔不容使君不如且往西山以避禍岸旣襄陽豪族兄弟九人皆以驍勇著名纉乃與岸結盟著婦人衣乗青布輿逃入西山詧使岸將兵追擒之纉乞爲沙門更名法纉詧許之荆州長史王冲等上牋於湘東王繹請以太尉都督中外諸軍事承制主盟繹不許丙辰又請以司空主盟亦不許上雖外爲矦景所制而内甚不平景欲以宋子仙爲司空上曰調和隂陽安用此物景又請以其黨二人爲便殿主帥上不許景不能強心甚憚之太子入泣諌上曰誰令汝來􅀂社稷有靈猶當克復如其不然何事流涕景使其軍士入直省中或驅驢馬帶弓刀出入宫庭上怪而問之直閤將軍周石珍對曰矦丞相甲士上大怒叱石珍曰是矦景何謂丞相左右皆懼是後上所求多不遂志飲膳亦爲所裁節憂憤成疾太子以幼子大圜屬湘東王繹并剪爪髮以􅀉之五月丙辰上卧浄居殿口苦索蜜不得再曰荷荷遂殂年八十六景祕不發䘮遷殯於昭陽殿迎太子於永福省使如常入朝王偉陳慶皆侍太子太子嗚咽流涕不敢泄聲殿外文武皆莫之知東魏髙岳旣失慕容紹宗等志氣沮䘮不敢復逼長社城陳元康言於大將軍澄曰王自輔政以來未有殊功雖破矦景本非外賊今潁川垂䧟願王自以爲功澄從之戊寅自將步􅀐十萬攻長社親臨作堰堰三決澄怒推負土者及囊并塞之辛巳發髙祖喪升梓宫於太極殿是日太子即皇帝位大赦矦景出屯朝堂分兵守衞壬午詔北人在南爲奴婢者皆免之所免萬計景或更加超擢兾收其力髙祖之末建康士民服食器用爭尚豪華糧無半年之儲常資四方委輸自景作亂道路斷絶數月之閒人至相食猶不免餓死存者百無一二貴戚豪族皆自出採稆填委溝壑不可勝紀癸未景遣儀同三司來亮入宛陵宣城太守楊白華誘而斬之甲申景遣其將李賢明攻之不克景又遣中軍矦子鑒入吴郡以廂公蘇單于爲呉郡大守遣儀同宋子仙等將兵東屯錢塘新城戍主戴僧逿據縣拒之御史中丞沈浚避難東歸至呉興太守張􅌘與之合謀舉兵討景􅌘稷之子也東揚州刺史臨城公大連亦據州不受景命景號令所行唯呉郡以西南陵以北而巳魏詔太和中代人攺姓者皆復其舊六月丙戍以南康王㑹理爲侍中司空丁亥立宣城王大器爲皇太子􅀄矦景將使太常卿南陽劉之遴授臨賀王正德璽綬之遴髮僧服而逃之遴愽學能文嘗爲湘東王繹長史將歸江陵繹素嫉其才巳丑之遴至夏口繹密送藥殺之而自爲誌銘厚其賻贈壬辰封皇子大心爲尋陽王大欵爲江陵王大臨爲南海王大連爲南郡王大春爲安陸王大成爲山陽王大封爲宜都王長社城中無鹽人病攣腫死者什八九大風從西北起吹水入城城壤東魏大將軍澄令城中曰有能生致王大將軍者封矦􅀂大將軍身有損傷親近左右皆斬王思政帥衆據土山告之曰吾力屈計窮唯當以死謝國因仰天大哭西向再拜欲自刎都督駱訓曰公常語訓等汝齎我頭出降非但得冨貴亦完一城人今髙相旣有此令公獨不哀士卒之死乎衆共執之不得引決澄遣通直散􅀐趙彦􅀷就土山遺以白羽扇執手申意牽之以下澄不令拜延而禮之思政􅀄入潁川將士八千人及城䧟纔三千人卒無叛者澄悉散配其將卒於逺方攺潁川爲鄭州禮遇思政甚重西閤􅀕酒盧潛曰思政不能死節何足可重澄謂左右曰我有盧潜乃是更得一王思政潛度丗之曽孫也初思政屯襄城欲以長社爲行臺治所遣使者魏仲啓陳於太師泰并致書於淅州刺史崔猷猷復書曰襄城控帶京洛寔當今之要地如有動静易相應接潁川旣鄰寇境又無山川之固賊若潛來徑至城下莫若頓兵襄城爲行臺之所潁川置州遣良將鎭守則表裏膠固人心易安縱有不虞豈能爲患仲見泰具以啓聞泰令依猷䇿思政固請且約賊水攻期年陸攻三年之内朝廷不煩赴救泰乃許之及長社不守泰􅀷悔之猷孝芬之子也矦景之南叛也丞相泰恐東魏復取景所部地使諸將分守諸城及潁川䧟泰以諸城道路阻絶皆令拔軍還上甲矦韶自建康出奔江陵稱受髙祖密詔徴兵以湘東王繹爲侍中假黄􅃏大都督中外諸軍事司徒承制自餘藩鎭並加位號宋子仙圍戴僧逷不克丙午吳盜陸緝等起兵襲吴郡殺蘇單于推前淮南太守文成矦寧爲主臨賀王正德怨矦景賣已密書召鄱陽王範使以兵入景遮得其書癸丑縊殺正德景以儀同三司郭元建爲尚書僕射北道行臺揔江北諸軍事鎭新秦封元羅等諸元十餘人皆爲王景愛永安矦確之勇常寘左右邵陵王綸潛遣人呼之確曰景輕佻一夫力耳我欲手刃之正恨未得其便卿還啓家王勿以確爲念景與確游鍾山引弓射鳥因欲射景弦斷不發景覺而殺之湘東王繹娶徐孝嗣孫女爲妃生丗子方等妃醜而妬又多失行繹二三年一至其室妃聞繹當至以繹目眇爲半面粧以待之繹怒而出故方等亦無寵及自建康還江陵繹見其御軍和整始歎其能入告徐妃妃不對垂泣而退繹怒䟽其穢行牓于大閤方等見之益懼湘州刺史河東王譽驍勇得士心繹將討矦景遣使督其糧衆譽曰各自軍府何忽隷人使者三返譽不與方等請討之繹乃以少子安南矦方矩爲湘州刺史使方等將精卒二萬送之方等將行謂所親曰是行也吾必死之死得其所吾復奚恨矦景以趙威方爲豫章太守江州刺史尋陽王大心遣軍拒之擒威方繫州獄威方逃還建康湘東丗子方等軍至麻溪河東王譽將七千人擊之方等軍敗溺死安南矦方矩收餘衆還江陵湘東王繹無戚容繹寵姬王氏生子方諸王氏卒繹疑徐妃爲之逼令自殺妃赴井死葬以庶人禮不聽諸子制服西江督護陳霸先欲起兵討矦景景使人誘廣州刺史元景仲許奉以爲主景仲由是附景隂圖霸先霸先知之與成州刺史王懐明等集兵南海馳檄以討景仲曰元景仲與賊合從朝廷遣曲陽矦勃爲刺史軍巳頓朝亭景仲所部聞之皆弃景仲而散秋七月甲寅景仲縊於閤下霸先迎定州刺史蕭勃鎭廣州前髙州刺史蘭裕欽之弟也與其諸弟扇誘始興等十郡攻監衡州事歐陽頠勃使霸先救之悉擒裕等勃因以霸先監始興郡事湘東王繹遣竟陵太守王僧辯信州刺史東海鮑泉撃湘州分給兵糧刻日就道僧辯以竟陵部下未盡至欲俟衆集然後行與泉入白繹求申期日繹疑僧辯觀望案劒厲聲曰卿憚行拒命欲同賊邪今唯有死耳因斫僧辯中其左髀悶絶乆之方蘇即送獄泉震怖不敢言僧辯母徒行流涕入謝自陳無訓繹意解賜以良藥故得不死丁卯鮑泉獨將兵伐湘州陸緝等競爲暴掠吳人不附宋子仙自錢塘旋軍擊之壬戍緝弃城奔海鹽子仙復據呉郡戊辰矦景置呉州於呉郡以安陸王大春爲剌史庚午以南康王㑹理兼尚書令鄱陽王範聞建康不守戒嚴欲入僚佐或説之曰今魏人巳據壽陽大王移足則虜􅀐必窺合肥前賊未平後城失守將􅀂之何不如待四方兵集使良將將精卒赴之進不失勤王退可固本根範乃止㑹東魏大將軍澄遣西兖州刺史李伯穆逼合肥又使魏收爲書諭範範方謀討矦景藉東魏爲援乃帥戰士二萬出東關以合州輸伯穆并遣諮議劉靈議送二子勤廣爲質于東魏以乞師範屯濡須以待上游之軍遣丗子嗣將千餘人守安樂柵上游軍皆不下範糧乏采苽稗菱藕以自給勤廣至鄴東魏人竟不爲出師範進退無計乃泝流西上軍于樅陽景岀屯姑孰範將裴之悌以衆降之之悌之髙之弟也東魏大將軍澄詣鄴辭爵位殊禮且請立太子澄謂濟隂王暉業曰比讀何暉書業曰數尋伊霍之傳不讀曹馬之書八月甲申朔矦景遣其中軍都督矦子鑒等擊吴興己亥鮑泉軍于石槨寺河東王譽逆戰而敗辛丑又敗于橘洲戰及溺死者萬餘人譽退保長沙泉引軍圍之辛卯東魏立皇子長仁爲太子勃海文襄王髙澄以其弟太原公洋次長意常忌之洋􅀷自悔匿言不出口常自貶退與澄言無不順從澄輕之常曰此人亦得冨貴相書亦何可解洋爲其夫人趙郡李氏營服玩小佳澄􅂺奪取之夫人或恚未與洋笑曰此物猶應可求兄須何容吝惜澄或愧不取洋即受之亦無飾讓毎退朝還第􅂺閉閤静坐雖對妻子能竟日不言或時􅃝跣奔躍夫人問其故洋曰爲爾漫戯其實蓋欲習勞也澄􅀗徐州刺史蘭欽子京以爲膳奴欽請贖之不許京屢自訴澄杖之曰更訴當殺汝京與其黨六人謀作亂澄在鄴居北城東栢堂嬖琅邪公主欲其往來無閒侍衞者常遣出外辛卯澄與散􅀐常侍陳元康吏部尚書侍中楊愔黄門侍郎崔季舒屏左右謀受魏禪署擬百官蘭京進食澄却之謂諸人曰昨夜夢此奴斫我當急殺之京聞之寘刀盤下冒言進食澄怒曰我未索食何爲遽來京揮刀曰來殺汝澄自投傷足入于床下賊去床弑之愔狼狽走岀遺一靴季舒匿于厠中元康以身蔽澄與賊爭刀􅀍傷腸出庫直王紘冐刃禦賊紇奚舎樂鬬死時變起倉猝内外震駭太原公洋在城東􅀟堂聞之神色不變指揮部分入討羣賊斬而臠之徐出言曰奴反大將軍􅀍傷無大苦也内外莫不驚異洋祕不發喪陳元康手書辭母口占使功曹參軍祖班作書陳便宜至夜而卒洋殯之第中詐云出使虚除元康中書令以王紘爲領左右都督紘基之子也勲貴以重兵皆在并州勸洋早如􅀳陽洋從之夜召大將軍督護太原唐邕使部分將士鎭遏四方邕支配須􅁷而畢洋由是重之癸巳洋諷東魏主以立太子大赦澄死問漸露東魏主竊謂左右曰大將軍今死似是天意威權當復歸帝室矣洋留太尉髙岳太保髙隆之開府儀同三司司馬子如侍中楊愔守鄴餘勲貴皆自隨甲午入謁東魏主於昭陽殿從甲士八千人登階者二百餘人皆攘􅃑扣刃􅀂對嚴敵令主者傳奏曰臣有家事須詣􅀳陽再拜而出東魏主失色目送之曰此人又似不相容朕不知死在何日􅀳陽舊臣􅀫將素輕洋及至大㑹文武神彩英暢言辭敏洽衆皆大驚澄政令有不便者洋皆攺之髙隆之司馬子如等惡度支尚書崔暹奏暹及崔季舒過惡鞭二百徙邊矦景以宋子仙爲司徒郭元建爲尚書左僕射與領軍任約等四十人並開府儀同三司仍詔自今開府儀同不須更加將軍是後開府儀同至多不可復記矣鄱陽王範自樅陽遣信告江州刺史尋陽王大心大心遣信邀之範引兵詣江州大心以湓城處之吳興兵力寡弱張􅌘書生不閑軍旅或勸􅌘効􅀽君正以郡迎矦子鑒􅌘歎曰􅀽氏丗濟忠貞不意君正一旦隳之吾豈不知吳郡旣没吳興􅀔難乆全但以身許國有死無貳耳九月癸丑朔子鑒軍至吳興􅌘戰敗還府整服安坐子鑒執送建康矦景嘉其守節欲活之􅌘曰吾忝任專城朝廷傾危不能厈復今日速死爲幸景猶欲存其一子􅌘曰吾一門巳在􅀑録不就爾虜求恩景怒盡殺之并殺沈浚河東王譽告急於岳陽王詧詧留諮議參軍濟陽蔡大寶守襄陽帥衆二萬􅀐二千伐江陵以救湘州湘東王繹大懼遣左右就獄中問計於王僧辯僧辯具陳方略繹乃赦之以爲城中都督乙卯詧至江陵作十三營以攻之㑹大雨平地水􅀷四尺詧軍氣沮繹與新興太守杜崱有舊密邀之乙丑崱與兄岌岸弟幼安兄子龕各帥所部降于繹岸請以五百􅀐襲襄陽晝夜兼行去襄陽三十里城中覺之蔡大寶奉詧母龔保林登城拒戰詧聞之夜遁弃糧食金帛鎧仗於湕水不可勝紀張纉病足詧載以隨軍及敗走守者恐爲追兵所及殺之弃尸而去詧至襄陽岸奔廣平依其兄南陽太守巚湘東王繹以鮑泉圍長沙久不克怒之以平南將軍王僧辯代爲都督數泉十罪命舎人羅重懽與僧辯偕行泉聞僧辯來愕然曰得王竟陵來助我賊不足平拂席待之僧辯入背泉而坐曰鮑郎卿有罪令旨使我鎖卿卿勿以故意見期使重懽宣令鎖之牀側泉爲啓自申且謝淹緩之罪繹怒解遂釋之冬十月癸未朔東魏以開府儀同三司潘相樂爲司空􅀄歷陽太守莊鐵帥衆歸尋陽王大心大心以爲豫章内史鐵至郡即叛推觀寜矦永爲主永範之弟也丁酉鐵引兵襲尋陽大心遣其將徐嗣徽逆擊破之鐡走至建昌光逺將軍韋構邀擊之鐵失其母弟妻子單􅀐還南昌大心遣構將兵追討之宋子仙自吳郡趣錢塘劉神茂自吳興趣富陽前武州刺史富陽孫國恩以城降之十一月乙卯葬武皇帝于脩陵廟號髙祖百濟遣使入貢見城闕荒圮異於曏來哭於端門矦景怒録送莊嚴寺不聽出壬戍宋子仙急攻錢塘戴僧逷降之岳陽王詧使將軍薛暉攻廣平拔之獲杜岸送襄陽詧拔其舌鞭其面支解而烹之又發其祖父墓焚其骸而揚之以其頭爲􅃮椀詧旣與湘東王繹爲敵恐不能自存遣使求援於魏請爲附庸丞相泰令東閤祭酒榮權使於襄陽繹使司州刺史柳仲禮鎭竟陵以圖詧詧懼遣其妃王氏及丗子嶚爲質於魏丞相泰欲經略江漢以開府儀同三司楊忠都督三荆等十五州諸軍事鎭穰城仲禮至安陸安陸太守沈􅎰以城降之仲禮留長史馬岫與其弟子禮守之帥衆一萬趣襄陽泰遣楊忠及行臺僕射長孫儉將兵擊仲禮以救詧宋子仙乗勝度浙江至㑹稽邵陵王綸聞錢塘巳敗出奔鄱陽鄱陽内史開建矦蕃以兵拒之範進擊蕃破之魏楊忠將至義陽太守馬伯符以下溠城降之忠以伯符爲郷導伯符岫之子也南郡王大連爲東楊州刺史時㑹稽豐沃勝兵數萬糧仗山積東人懲矦景殘虐咸樂爲用而大連朝夕酣飲不恤軍事司馬東陽留異凶狡殘􅁀爲衆所患大連悉以軍事委之十二月庚寅宋子仙攻㑹稽大連弃城走異奔還郷里尋以其衆降於子仙大連欲奔鄱陽異爲子仙郷導追及大連於信安執送建康大連猶醉不之知帝聞之引帷自蔽掩􅃑而泣於是三吳盡没於景公矦在㑹稽者俱南度嶺景以留異爲東陽太守收其妻子爲質乙酉東魏以并州刺史彭樂爲司徒邵陵王綸進至九江尋陽王大心以江州讓之綸不受引兵西上始興太守陳霸先結郡中豪傑欲討矦景郡人矦安都張偲等各帥衆千餘人歸之霸先遣主帥杜僧明將二千人頓於嶺上廣州刺史蕭勃遣人止之曰矦景驍雄天下無敵前者援軍十萬士馬精彊猶不能克君以區區之衆將何所之如聞嶺北王矦又皆鼎沸親尋干戈以君踈外詎可暗投未􅀂且留始興遥張聲􅀔保太山之安也霸先曰僕荷國恩往聞矦景度江即欲赴援遭值元蘭梗我中道令京都覆没君辱臣死誰敢愛命君矦體則皇枝任重方岳遣僕一軍猶賢乎巳乃更止之乎乃遣使閒道詣江陵受湘東王繹節度時南康土豪蔡路養起兵據郡勃乃以腹心譚丗逺爲曲江令與路養相結同遏霸先魏楊忠拔隨郡執太守􅁊和東魏使金門公潘樂等將兵五萬襲司州刺史夏矦強降之於是東魏盡有淮南之地資治通鑑卷第一百六十二
