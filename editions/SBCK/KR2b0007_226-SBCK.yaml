front:
  text: 資治通鑑卷第二百二十六
  hash: sha256:8b9350a5e4c2c639949dd1a120f4c44426f4bf76791be9e9e220e43e7ab6ead3
body:
  text: 臣司馬光奉勑編集唐紀四十二作噩五月凡一年有奇起屠維恊洽八月盡重光代宗睿文孝武皇帝下大曆十四年八月甲辰以道州司馬楊炎為門下侍郎懷州刺史喬琳為御史大夫並同平章事上方勵精求治不次用人卜相於崔祐甫祐甫薦炎器業上亦素聞其名故自遷謫中用之琳太原人性粗率喜詼諧無它長與張渉善渉稱其才可大用上信渉言而用之聞者無不駭愕代宗之丗吐蕃數遣使求和而冦盜不息代宗悉留其使者前後八輩有至老死不得歸者俘獲其人皆配江嶺上欲以徳懷之乙巳以隨州司馬韋倫為太常少卿使于吐蕃悉集其俘五百人各賜襲衣而遣之恊律郎沈既濟上選舉議以為選用之法三科而已曰徳也才也勞也今選曹皆不及焉考校之法皆在書判簿歴言詞俯仰而巳夫安行徐言非徳也麗藻芳翰非才也累資積考非勞也執此以求天下之士固未盡矣今人未土著不可本於郷閭鑒不獨明不可專於吏部臣謹詳酌古今謂五品以上及羣司長官宜令宰臣進叙吏部兵部得參議焉其六品以下或僚佐之屬許州府辟用其牧守將帥或選用非公則吏部兵部得察而舉之罪其私冒不慎舉者小加譴黜大正刑典責成授任誰敢不勉夫如是則賢者不奬而自進不肖者不抑而自退衆才咸得而官無不治矣今選法皆擇才於吏部試職於州郡若才職不稱紊亂無任責於刺史則曰命官出於吏曹不敢廢也責於侍郎則曰量書判資考而授之不保其往也責於令史則曰按由歷出入而行之不知其佗也黎庶徒弊誰任其咎若牧守自用則罪將焉逃必州郡之濫獨換一刺史則革矣如吏部之濫雖更其侍郎無益也葢人物浩浩不可得而知法使之然非主司之過今諸道節度都團練觀察租庸等使自判官副將以下皆使自擇縱其閒或有情故大舉其例十猶七全則辟吏之法已試於今但未及於州縣耳利害之理較然可觀曏令諸使僚佐盡受於選曹則安能鎭方隅之重理財賦之殷乎既濟吴人也初衡州刺史曹王臯有治行湖南觀察使辛京杲疾之䧟以法貶潮州刺史時楊炎在道州知其直及入相復擢為衡州刺史始臯之遭誣在治念太妃老將驚而戚出則囚服就辯入則擁笏垂魚即貶于潮以遷入賀及是然後跪謝告實臯明之玄孫也朔方邠寧節度使李懷光既代郭子儀邠府宿將史抗温儒雅龎仙鶴張獻明李光逸功名素出懷光右皆怏怏不服懷光發兵防秋屯長武城軍期進退不時應令監軍翟文秀勸懷光奏令宿衞懷光遣之既離營使人追捕誣以它罪且曰黄萯之敗職爾之由盡殺之九月甲戌改淮西爲淮寧西川節度使同平章事崔寧在蜀十餘年恃地險兵彊恣為􅁋侈朝廷患之而不能易至是入朝加司空兼山陵使南詔王閤羅鳯卒子鳯迦異前死孫異牟尋立冬十月丁酉朔吐蕃與南詔合兵十萬三道入冦一出茂州一出扶文一出黎雅曰吾欲取蜀以為東府崔寧在京師所留諸將不能禦虜連䧟州縣刺史弃城走士民竄匿山谷上憂之趣寧歸鎭寧已辭楊炎言於上曰蜀地富饒寧據有之朝廷失其外府十四年矣寧雖入朝全師尚守其後貢賦不入與無蜀同且寧本與諸將等夷因亂得位威令不行今雖遣之必恐無功若其有功則義不可奪是蜀地敗固失之勝亦不得也願陛下熟察上曰然則柰何對曰請留寧發朱泚所領范陽戍兵數千人􅄂禁兵往擊之何憂不克因而得内親兵於其腹中蜀將必不敢動然後更授他帥使千里沃壤復為國有是因小害而收大利也上曰善遂留寧初馬璘忌涇原都知兵馬使李晟功名遣入宿衛為右神䇿都將上發禁兵四千人使晟將之發邠隴范陽兵五千使金吾大將軍安邑曲環將之以救蜀東川出軍自江油趣白垻與山南兵合擊吐蕃南詔破之范陽兵追及於七盤又破之遂克維茂二州李晟追擊於大度河外又破之吐蕃南詔飢寒隕於崖谷死者八九萬人吐蕃悔怒殺誘導使之來者異牟尋懼築苴咩城延袤十五里徙居之吐蕃封之為日東王上用法嚴百官震悚以山陵近禁人屠宰郭子儀之􅀠人潜殺羊載以入城右金吾將軍裴諝奏之或謂諝曰郭公有社稷大功君獨不為之地乎諝曰此乃吾所以為之地也郭公勲高望重上新即位以為羣臣附之者衆吾故發其小過以明郭公威權不足畏也如此上尊天子下安大臣不亦可乎己酉􅁙睿文孝武皇帝於元陵廟號代宗將發引上送之見輼輬車不當馳道稍指丁未之閒問其故有司對曰陛下本命在午不敢衝也上哭曰安有枉靈駕而謀身利乎命改轅直午而行肅宗代宗皆喜隂陽鬼神事無大小必謀之卜祝故王璵黎幹以左道得進上雅不之信山陵但取七月之期事集而發不復擇日十一月丁丑以晉州刺史韓滉為蘇州刺史浙江東西觀察使喬琳衰老耳聵上或時訪問應對失次所謀議復踈闊壬午以琳為工部尚書罷政事上由是踈張渉楊炎既留崔寧二人由是交惡炎託以北邊須大臣鎭撫癸巳以京畿觀察使崔寧為單于鎮北大都護朔方節度使鎮坊州以荆南節度使張延賞為西川節度使又以靈鹽節度都虞候醴泉杜希全知靈鹽州留後代州刺史張光晟知單于振武等城綏銀麟勝州留後延州刺史李建徽知鄜坊丹州留後時寧既出鎮不當更置留後炎欲奪寧權且窺其所爲令三人皆得自奏事仍諷之使伺寧過失十二月乙卯立宣王誦為皇太子舊制天下金帛皆貯於左藏太府四時上其數比部覆其出入及第五􅄾為度支鹽鐵使時京師多豪將求取無節􅄾不能制乃奏盡貯於大盈内庫使官官掌之天子亦以取給為便故乆不出由是以天下公賦為人君私藏有司不復得窺其多少校其贏縮殆二十年宦官領其事者三百餘員皆蠶食其中蟠結根據牢不可動楊炎頓首於上前曰財賦者國之大本生民之命重輕安危靡不由之是以前丗皆使重臣掌其事猶或耗亂不集今獨使中人出入盈虛大臣皆不得知政之蠧敝莫甚於此請出之以歸有司度宫中歳用幾何量數奉入不敢有乏如此然後可以為政上即日下詔凡財賦皆歸左藏一用舊式歳於數中擇精好者三五千匹進入大盈炎以片言移人主意議者稱之丙寅晦日有食之湖南賊帥王國良阻山為盗上遣都官員外郎􅀜播招撫之辭行上問以為政之要對曰為政之本必求有道賢人與之為理上曰朕比巳下詔求賢又遣使臣廣加搜訪庶幾可以為理乎對曰下詔所求及使者所薦唯得文詞干進之士耳安有有道賢人肯隨牒舉選乎上悅崔祐甫有疾上令肩輿入中書或休假在第大事令中使咨决徳宗神武孝文皇帝一建中元年春正月丁卯朔改元羣臣上尊號曰聖神文武皇帝赦天下始用楊炎議命黜陟使與觀察使刺史約百姓丁産定等級作兩税法比來新舊徴科色目一切罷之二税外輒率一錢者以枉法論唐初賦歛之法曰租庸調有田則有租有身則有庸有户則有調玄宗之末版籍浸壞多非其實及至徳兵起所在賦歛迫趣取辦無復常凖賦歛之司增數而莫相統攝各隨意徴科自立色目新故相仍不知紀極民富者丁多率為官為僧以免課役而貧者丁多無所伏匿故上户優而下户勞吏因縁蠶食民旬輸月送不勝困弊率皆逃徙為浮户其土著百無四五至是炎建議作兩税法先計州縣每嵗所應費用及上供之數而賦於人量出以制入户無土客以見居為簿人無丁中以貧富為差為行商者在所州縣税三十之一使與居者均無僥利居人之税秋夏兩徵之其租庸調雜徭悉省皆揔統於度支上用其言因赦令行之初左僕射劉晏為吏部尚書楊炎為侍郎不相悦元載之死晏有力焉及上即位晏乆典利權衆頗疾之多上言轉運使可罷又有風言晏嘗宻表勸代宗立獨孤妃為皇后者楊炎為宰相欲為元載報仇因為上流涕言晏與黎幹劉忠翼同謀臣為宰相不能討罪當萬死崔祐甫言茲事曖昩陛下已曠然大赦不當復䆒尋虛語炎乃建言尚書省國政之本比置諸使分奪其權今宜復舊上從之甲子詔天下錢榖皆歸金部倉部罷晏轉運租庸青苖鹽鐵等使二月丙申朔命黜陟使十一人分廵天下先是魏博節度使田悦事朝廷猶㳟順河北黜陟使洪經綸不曉時務聞悦軍七萬人符下罷其四萬令還農悦陽順命如符罷之既而集應罷者激怒之曰汝曹乆在軍中有父母妻子今一旦為黜陟使所罷將何資以自衣食乎衆大哭悦乃出家財以賜之使各還部伍於是軍士皆徳悦而怨朝廷崔祐甫以疾多不視事楊炎獨任大政專以復恩讎為事奏用元載遺䇿城原州又欲發兩京關内丁夫浚豐州陵陽渠以興屯田上遣中使詣涇原節度使叚秀實訪以利害秀實以為今邊備尚虛未宜興事以召冦炎怒以為沮己徵秀實為司農卿丁未邠寧節度使李懷光兼四鎭北庭行營涇原節度使使移軍原州以四鎭北庭留後劉文喜為别駕京兆尹嚴郢奏桉朔方五城舊屯沃饒之地自䘮亂以來人功不及因致荒廢十不耕一若力可墾闢不俟浚渠今發兩京闗輔人於豐州浚渠營田計所得不補所費而闗輔之人不免流散是虛畿甸而無益軍儲也䟽奏不報既而陵陽渠竟不成弃之上用楊炎之言託以奏事不實己酉貶劉晏為忠州刺史癸丑以澤潞留後李抱眞為節度使楊炎欲城原州以復秦原命李懷光居前督作朱泚崔寧各將萬人翼其後詔下涇州為城具涇之將士怒曰吾屬為國家西門之屏十餘年矣始居邠州甫營耕桑有地著之安徙屯涇州披荆榛立軍府坐席未暖又投之塞外吾屬何罪而至此乎李懷光始為邠寧帥即誅温儒雅等軍令嚴峻及兼涇原諸將皆懼曰彼五將何罪而為戮今又來此吾屬能無憂乎劉文喜因衆心不安據涇州不受詔上䟽復求叚秀實為帥不則朱泚癸亥以朱泚兼四鎭北庭行軍涇原節度使代懷光三月翰林學士左散騎常侍張渉受前湖南觀察使辛京杲金事覺上怒欲寘于法時李忠臣以檢校司空同平章事奉朝請言於上曰陛下貴為天子而先生以乏財犯法以臣愚觀之非先生之過也上意解辛未放渉歸田里辛京杲以私忿杖殺部曲有司奏京杲罪當死上將從之李忠臣曰京杲當死久矣上問其故忠臣曰京杲諸父兄弟皆戰死獨京杲至今尚存臣故以為當死久矣上憫然左遷京杲諸王傅忠臣乘機救人多此類楊炎罷度支轉運使命金部倉部代之既而省職久廢耳目不相接莫能振舉天下錢榖無所總領癸巳復以諫議大夫韓洄為户部侍郎判度支以金部郎中萬年杜佑權江淮水陸轉運使皆如舊制劉文喜又不受詔欲自邀旌節夏四月乙未朔據涇州叛遣其子質於吐蕃以求援上命朱泚李懷光討之又命神䇿軍使張巨濟將禁兵二千助之吐蕃始聞韋倫歸其俘不之信及俘入境各還部落稱新天子出宫人放禽獸英威聖徳洽於中國吐蕃大悦除道迎倫賛普即發使隨倫入貢且致􅉠贈癸卯至京師上禮接之既而蜀將上言吐蕃犲狼所獲俘不可歸上曰戎狄犯塞則擊之服則歸之擊以示威歸以示信威信不立何以懷逺悉命歸之代宗之丗毎元日冬至端午生日州府於常賦之外競爲貢獻貢獻多者則悦之武將姦吏縁此侵漁下民癸丑上生日四方貢獻皆不受李正已田悦各獻縑三萬匹上悉歸之度支以代租賦五月戊辰以韋倫為太常卿乙酉復遣倫使吐蕃倫請上自為載書與吐蕃盟楊炎以為非敵請與郭子儀輩為載書以聞令上畫可而已從之朱泚等圍劉文喜於涇州杜其出入而閉壁不與戰久之不拔天方旱徵發餽運内外騷然朝臣上書請赦文喜以蘇疲人者不可勝紀上皆不聼曰㣲孽不除何以令天下文喜使其將劉海賔入奏海賔言於上曰臣乃陛下藩邸部曲豈肯附叛人必為陛下梟其首以獻但文喜今所求者節而已願陛下姑與之文喜必怠則臣計得施矣上曰名器不可假人爾能立效固善我節不可得也使海賔歸以告文喜而攻之如􅀄減御膳以給軍士城中將士當受春服者賜予如故於是衆知上意不可移時吐蕃方睦於唐不為發兵城中勢窮庚寅海賔與諸將共殺文喜傳首而原州竟不果城自上即位李正已内不自安遣參佐入奏事㑹涇州捷奏至上使觀文喜之首而歸正已益懼六月甲午朔門下侍郎同平章事崔祐甫薨術士桑道茂上言陛下不出數年暫有離宫之厄臣望奉天有天子氣冝高大其城以備非常辛丑命京兆發丁夫數千雜六軍之士築奉天城􅀄囘紇風俗朴厚君臣之等不甚異故衆志專一勁健無敵及有功於唐唐賜遺甚厚登里可汗始自尊大築宫殿以居婦人有粉黛文繡之飾中國為之虛耗而虜俗亦壞及代宗崩上遣中使梁文秀往告哀登里驕不為禮九姓胡附回紇者説登里以中國富饒今乗䘮伐之可有大利登里從之欲舉國入冦其相頓莫賀逹千登里之從父兄也諫曰唐大國也無負於我吾前年侵太原獲羊馬數萬可謂大㨗而道逺糧乏比歸士卒多徒行者今舉國深入萬一不㨗將安歸乎登里不聽頓莫賀乗人心之不欲南冦也舉兵擊殺之并九姓胡二千人自立為合骨咄禄毗伽可汗遣其臣聿逹干與梁文秀俱入見願為藩臣垂髪不翦以待册命乙卯命京兆少尹臨漳源休册頓莫賀為武義成功可汗秋七月丙寅邵州賊帥王國良降國良本湖南牙將觀察使辛京杲使戍武岡以扞西原蠻京杲貪暴國良家富京杲以死罪加之國良懼據縣叛與西原蠻合聚衆千人侵掠州縣瀕湖千里咸被其害詔荆黔洪桂諸道合兵討之連年不能克及曹王臯爲湖南觀察使曰驅疲甿誅反仄非䇿之得者也乃遺國良書言將軍非敢爲逆欲救死耳我與將軍俱爲辛京杲所構我已䝉聖朝湔洗何心復加兵刃於將軍乎將軍遇我不速降後悔無及國良且喜且懼遣使乞降猶疑未决臯乃假爲使者從一騎越五百里抵國良壁鞭其門大呼曰我曹王也來受降舉軍大驚國良趨出迎拜請罪臯執其手約爲兄弟盡焚攻守之具散其衆使還農詔赦國良罪賜名惟新辛巳遥尊上母沈氏為皇太后荆南節度使庾準希楊炎指奏忠州刺史劉晏與朱泚書求營救辭多怨望又奏召補州兵欲拒朝命炎證成之上宻遣中使就忠州縊殺之已丑乃下詔賜死天下寃之初安史之亂數年閒天下户口什亡八九州縣多為藩鎭所據貢賦不入朝廷府庫耗竭中國多故戎狄每嵗犯邊所在宿重兵仰給縣官所費不貲皆倚辦於晏晏初為轉運使獨領陜東諸道陜西皆度支領之末年兼領未幾而罷晏有精力多機智變通有無曲盡其妙常以厚直募善走者置遞相望覘報四方物價雖逺方不數日皆逹使司食貨輕重之權悉制在掌握國家獲利而天下無甚貴甚賤之憂常以為辦集衆務在於得人故必擇通敏精悍亷勤之士而用之至於句檢簿書出納錢榖事雖至細必委之士類吏惟書符牒不得輕出一言常言士陷􅂍賄則淪弃於時名重於利故士多清修吏雖絜亷終無顯榮利重於名故吏多貪汚然惟晏能行之它人效者終莫能逮其屬官雖居數千里外奉教令如在目前起居語言無敢欺紿當時權貴或以親故屬之者晏亦應之使俸給多少遷次緩速皆如其志然無得親職事其場院要劇之官必盡一時之選故晏没之後掌財賦有聲者多晏之故吏也晏又以為户口滋多則賦税自廣故其理財常以養民為先諸道各置知院官毎旬月具州縣雨雪豐歉之狀白使司豐則貴糴歉則賤糶或以榖易雜貨供官用及於豐處賣之知院官始見不稔之端先申至某月須如干蠲免某月須如干救助及期晏不俟州縣申請即奏行之應民之急未嘗失時不待其困弊流亡餓殍然後賑之也由是民得安其居業户口蕃息晏始為轉運使時天下見户不過二百萬其季年乃三百餘萬在晏所統則增非晏所統則不增也其初財賦嵗入不過四百萬緡季年乃千餘萬緡晏專用􅅦鹽法充軍國之用時自許汝鄭鄧之西皆食河東池鹽度支主之汴渭唐蔡之東皆食海鹽晏主之晏以為官多則民擾故但於出鹽之鄉置鹽官收鹽户所煑之鹽轉鬻於商人任其所之自餘州縣不復置官其江嶺閒去鹽鄉逺者轉官鹽於彼貯之或商絶鹽貴則減價鬻之謂之常平鹽官獲其利而民不乏鹽其始江淮鹽利不過四十萬緡季年乃六百餘萬緡由是國用充足而民不困弊其河東鹽利不過八十萬緡而價復貴於海鹽先是運闗東榖入長安者以河流湍悍率一斛得八斗至者則為成勞受優賞晏以為江汴河渭水力不同各隨便宜造運船教漕卒江船達揚州汴船達河隂河船達渭口渭􅂳達太倉其閒縁水置倉轉相受給自是每嵗運榖或至百餘萬斛無斗升沈覆者船十艘為一綱使軍將領之十運無失授優勞官其人數運之後無不斑白者晏於楊子置十場造船毎艘給錢千緡或言所用實不及半虛費太多晏曰不然論大計者固不可惜小費凡事必為永久之慮今始置船場執事者至多當先使之私用無窘則官物堅完矣若遽與之屑屑校計錙銖安能久行乎異日必有患吾所給多而減之者減半以下猶可也過此則不能運矣其後五十年有司果減其半及咸通中有司計費而給之無復羡餘船益脆薄易壞漕運遂廢矣晏為人勤力事無閑劇必於一日中決之不使留宿後來言財利者皆莫能及之八月甲午振武留後張光晟殺回紇使者董突等九百餘人董突者武義可汗之叔父也代宗之丗九姓胡常冒回紇之名雜居京師殖貨縱暴與回紇共為公私之患上即位命董突盡帥其徒歸國輜重甚盛至振武留數月厚求資給日食肉千斤它物稱是縱樵牧者暴踐果稼振武人苦之光晟欲殺回紇取其輜重而畏其衆彊未敢發九姓胡聞其種族為新可汗所誅多道亡董突防之甚急九姓胡不得亡又不敢歸乃宻獻䇿於光晟請殺回紇光晟喜其黨類自離許之上以陜州之辱心恨回紇光晟知上㫖乃奏稱回紇本種非多所輔以彊者羣胡耳今聞其自相魚肉頓莫賀新立移地健有孽子及國相梅録各擁兵數千人相攻國未定彼無財則不能使其衆陛下不乘此際除之乃歸其人與之財正所謂借冦兵齎盗糧者也請殺之三奏上不許光晟乃使副將過其館門故不為禮董突怒執而鞭之數十光晟勒兵掩擊并羣胡盡殺之聚為京觀獨留二胡使歸國為證曰回紇鞭辱大將且謀襲據振武故先事誅之上徵光晟為右金吾將軍遣中使王嘉祥往致信幣回紇請得專殺者以復讎上為之貶光晟為睦王傅以慰其意丁未加盧龍隴右涇原節度使朱泚兼中書令盧龍隴右節度如故以舒王謨為四鎭北庭行軍涇原節度大使以涇州牙前兵馬使河中姚令言為留後謨邈之子也早孤上子之癸丑詔贈太后父祖兄弟官及自餘宗族男女拜官封邑者告第告身凡百二十有七通中使以馬負而賜之九月壬午將作奏宣政殿廊壞十月魁岡未可修上曰但不妨公害人則吉矣安問時日即命修之大曆以前賦歛出納俸給皆無法長吏得專之重以元王秉政貨賂公行天下不按􅂍吏者殆二十年惟江西觀察使路嗣恭桉䖍州刺史源敷翰流之上以宣歙觀察使薛邕文雅舊臣徵爲左丞邕去宣州盗隱官物以巨萬計殿中侍御史員㝢發之冬十月己亥貶連山尉於是州縣始畏朝典不敢放縱上初即位踈斥宦官親任朝士而張渉以儒學入侍薛邕以文雅登朝繼以贓敗宦官武將得以藉口曰南牙文臣贓動至巨萬而謂我曹濁亂天下豈非欺罔邪於是上心始疑不知所倚杖矣中書舍人髙參請分遣諸沈訪求太后庚寅以睦王述為奉迎使工部尚書喬琳副之又命諸沈四人為判官與中使分行諸道求之十一月初令待制官外更引朝集使二人訪以時政得失逺人疾苦先是公主下嫁者舅姑拜之婦不荅上命禮官定公主拜見舅姑及壻之諸父兄姊之儀舅姑坐受於中堂諸父兄姊立受於東序如家人禮有縣主將嫁擇用丁丑是日上之從父妹卒命罷之有司奏供張已備且殤服不足廢事上曰爾愛其費我愛其禮卒罷之至徳以來國家多事公主郡縣主多不以時嫁有華髪者雖居禁中或十年不見天子上始引見諸宗女尊者致敬卑者存慰悉命嫁之所齎小大之物必經心目己卯庚辰二日嫁岳陽等凡十一縣主吐蕃見韋倫再至益喜十二月辛卯朔倫還吐蕃遣其相論欽明思等入貢是嵗册太子母王氏為淑妃天下税户三百八萬五千七十六籍兵七十六萬八千餘人税錢一千八十九萬八千餘緡榖二百一十五萬七千餘斛二年春正月戊辰成徳節度使李寶臣薨寶臣欲以軍府傳其子行軍司馬惟岳以其年少闇弱豫誅諸將之難制者深州刺史張獻誠等至有十餘人同日死者寶臣召易州刺史張孝忠孝忠不往使其弟孝節召之孝忠使孝節謂寶臣曰諸將何罪連頸受戮孝忠懼死不敢往亦不敢叛正如公不入朝之意耳孝節泣曰如此孝節必死孝忠曰往則併命我在此必不敢殺汝遂歸寶臣亦不之罪也兵馬使王武俊位卑而有勇故寶臣特親愛之以女妻其子士眞士眞復厚結其左右故孝忠武俊獨得全及薨孔目官胡震家僮王它奴勸惟岳匿䘮二十餘日詐為寶臣表求令惟岳繼襲上不許遣給事中汲人班宏往問寶臣疾且諭之惟岳厚賂宏宏不受還報惟岳乃發䘮自為留後使將佐共奏求旌節上又不許初寶臣與李正已田承嗣梁崇義相結期以土地傳之子孫故承嗣之死寶臣力為之請於朝使以節授田悦代宗從之悦初襲位事朝廷禮甚恭河東節度使馬燧表其必反請先為備至是悦屢為惟岳請繼襲上欲革前弊不許或諫曰惟岳已據父業不因而命之必為亂上曰賊本無資以為亂皆藉我土地假我位號以聚其衆耳曏日因其所欲而命之多矣而亂益滋是爵命不足以已亂而適足以長亂也然則惟岳必為亂命與不命等耳竟不許悦乃與李正已各遣使詣惟岳潜謀勒兵拒命魏博節度副使田庭玠謂悦曰爾藉伯父遺業但謹事朝廷坐享富貴不亦善乎奈何無故與恒鄆共為叛臣爾觀兵興以來逆亂者誰能保其家乎必欲行爾之志可先殺我無使我見田氏之族滅也因稱病卧家悅自往謝之庭玠閉門不内竟以憂卒成徳判官邵眞聞李惟岳之謀泣諫曰先相公受國厚恩大夫衰絰之中遽欲負國此甚不可勸惟岳執李正已使者送京師且請討之曰如此朝廷嘉大夫之忠則旄􅃏庶幾可得惟岳然之使眞草奏長史畢華曰先公與二道結好二十餘年柰何一旦弃之且雖執其使朝廷未必見信正已忽來襲我孤軍無援何以待之惟岳又從之前定州刺史谷從政惟岳之舅也有膽略頗讀書王武俊等皆敬憚之為寶臣所忌從政乃稱病杜門惟岳亦忌之不與圖事日夜獨與胡震王它奴等計議多散金帛以悅將士從政往見惟岳曰今海内無事自上國來者皆言天子聰明英武志欲致太平深不欲諸矦子孫專地爾今首違詔命天子必遣諸道致討將士受賞之際皆言為大夫盡死茍一戰不勝各惜其生誰不離心大將有權者乗危伺便咸思取爾以自為功矣且先相公所殺高班大將殆以百數橈敗之際其子弟欲復仇者庸可數乎又相公與幽州有隙朱滔兄弟常切齒於我今天子必以為將滔與吾擊柝相聞計其聞命疾驅若虎狼之得獸也何以當之昔田承嗣從安史父子同反身經百戰凶悍聞於天下違詔舉兵自謂無敵及盧子期就擒吴希光歸國承嗣指天垂泣身無所措賴先相公按兵不進且為之祈請先帝寛仁赦而不誅不然田氏豈有種乎況爾生長富貴齒髪尚少不更艱危乃信左右之言欲效承嗣所為乎為爾之計不若辭謝將佐使惟誠攝領軍府身自入朝乞留宿衛因言惟誠且令攝事恩命决於聖志上必悦爾忠義縱無大位不失榮禄永無憂矣不然大禍將至悔之何及吾亦知爾素踈忌我顧以舅甥之情事急不得不言耳惟岳及左右見其言切益惡之從政乃復歸杜門稱病惟誠者惟岳之庶兄也謙厚好書得衆心其母妹為李正己子婦是日惟岳送惟誠於正己正己使復姓張遂仕淄青惟岳遣王它奴詣從政家察其起居從政飲藥而卒且死曰吾不憚死哀張氏今族滅矣劉文喜之死也李正已田悦等皆不自安劉晏死正已等益懼相謂曰我軰罪惡豈得與劉晏比乎㑹汴州城隘廣之東方人訛言上欲東封故城汴州正已懼􅀤兵萬人屯曹州田悦亦完聚為備與梁崇義李惟岳遥相應助河南士民騷然驚駭永平軍舊領汴宋滑亳陳潁泗七州丙子分宋亳潁别為節度使以宋州刺史劉洽為之以泗州􅀠淮南又以東都留守路嗣恭為懷鄭汝陜四州河陽三城節度使旬日又以永平節度使李勉都統路嗣恭二道仍割鄭州􅀠之選嘗為將者為諸州刺史以備正已等初高力士有養女嫠居東京頗能言宫中事女官李眞一意其為沈太后詣使者具言其狀上聞之驚喜時沈氏故老已盡無識太后者上遣宦官宫人往驗視之年狀頗同宦官宫人不審識太后皆言是高氏辭稱實非太后驗視者益疑之強迎入居上陽宫上􅀤宫女百餘人齎乗輿御物就上陽宫供奉左右誘諭百方高氏心動乃自言是驗視者走馬入奏上大喜二月辛卯上以偶日御殿羣臣皆入賀詔有司草儀奉迎高氏弟承悦在長安恐不言久獲罪遽自言本末上命力士養孫樊景超往覆視景超見高氏居内殿以太后自處左右侍衛甚嚴景超謂高氏曰姑何自置身於爼上左右叱景超使下景超抗聲曰有詔太后詐偽左右可下左右皆下殿高氏乃曰吾為人所強非已出也以牛車載還其家上恐後人不復敢言太后皆不之罪曰吾寧受百欺庶幾得之自是四方稱得太后者數四皆非是而眞太后竟不知所之御史中丞盧􅂎弈之子也貌醜色如藍有口辯上悦之丁未擢為大夫領京畿觀察使郭子儀毎見賔客姬妾不離側􅂎嘗往問疾子儀悉屏侍妾獨隱几待之或問其故子儀曰􅂎貌陋而心險婦人輩見之必笑它日􅂎得志吾族無類矣楊炎既殺劉晏朝野側目李正已累表請晏罪譏斥朝廷炎懼遣腹心分詣諸道以宣慰為名實使之宻諭節度使云晏昔附姦邪請立獨孤后上自惡而殺之上聞而惡之由是有誅炎之志隱而未􅀤乙巳遷炎中書侍郎擢盧􅂎為門下侍郎並同平章事不專任炎矣􅂎蕞陋無文學炎輕之多託疾不與㑹食􅂎亦恨之􅂎隂狡欲起勢立威小不附者必欲寘之死地引太常博士裴延齡為集賢直學士親任之丙午更汴宋軍名曰宣武振武節度使彭令芳苛虐監軍劉惠光貪婪乙卯軍士共殺之􅀤京西防秋兵萬二千人戍闗東上御望春樓宴勞將士神䇿將士獨不飲上使詰之其將楊惠元對曰臣等􅀤奉天軍帥張巨濟戒之曰此行大建功名凱旋之日相與為歡苟未捷勿飲酒故不敢奉詔及行有司縁道設酒食獨惠元所部缾罌不􅀤上深歎美賜書勞之惠元平州人也三月置溵州於郾城辛巳以汾州刺史王翃為振武軍使鎭北綏銀等州留後遣殿中少監崔漢衡使于吐蕃梁崇義雖與李正已等連結兵勢寡弱禮數最恭或勸其入朝崇義曰來公有大功於國上元中為閹宦所䜛遷延稽命及代宗嗣位不俟駕入朝猶不免族誅吾嵗乆舋積何可往也淮寧節度使李希烈屢請討之崇義懼益修武備流人郭昔告崇義為變崇義聞之請罪上為之杖昔逺流之使金部員外郎李舟詣襄州諭㫖以安之舟嘗奉使詣劉文喜為陳禍福文喜囚之㑹帳下殺文喜以降諸道跋扈者聞之謂舟能覆城殺將至襄州崇義惡之舟又勸崇義入朝言頗切直崇義益不悦及遣使宣慰諸道舟復詣襄州崇義拒境不内上言軍中疑懼請易以它使時兩河諸鎭方猜阻上欲示恩信以安之夏四月庚寅加崇義同平章事妻子悉加封賞賜以鐵劵遣御史張著齎手詔徵之仍以其禆將藺杲為鄧州刺史五月丙寅以軍興增商稅為什一田悅卒與李正已李惟岳定計連兵拒命遣兵馬使孟祐將歩騎五千北助惟岳薛嵩之死也田承嗣盗據洺相二州朝廷獨得邢磁二州及臨洺縣悅欲阻山為境曰邢磁如兩眼在吾腹中不可不取乃遣兵馬使康愔將八千人圍邢州别將楊朝光將五千人柵於邯鄲西北以斷昭義救兵悅自將兵數萬圍臨洺邢州刺史李共臨洺將張伾堅壁拒守貝州刺史邢曹俊田承嗣舊將也老而有謀悦寵信牙官扈㟧而踈之及攻臨洺召曹俊問計曹俊曰兵法十圍五攻尚書以逆犯順勢更不侔今頓兵堅城之下糧竭卒盡自亡之道也不若置萬兵於崞口以遏西師則河北二十四州皆為尚書有矣諸將惡其異已共毁之悦不用其䇿資治通鑑卷第二百二十六
