body:
  text: 臣司馬光奉勑編集唐紀二十六陽赤奮若凡三年有竒起上章閹茂八月盡昭睿宗玄眞大聖大興孝皇帝下景雲元年八月庚寅往巽第桉問重福奄至縣官馳出白留守羣官皆逃匿洛州長史崔日知獨帥衆討之留臺侍御史李邕遇重福於天津橋從者已數百人馳至屯營告之曰譙王得罪先帝今無故入都此必爲亂君等宜立功取富貴又告皇城使閉諸門重福先趣左右屯營營中射之矢如雨下乃還趣左掖門欲取留守兵見門閉大怒命焚之火未及然左屯營兵出逼之重福窘迫策馬出上東逃匿山谷明日留守大出兵捜捕重福赴漕渠溺死日知日用之從父兄也以功拜東都留守鄭愔貌醜多須旣敗梳髻著婦人服匿車中擒􅀗􅀍鞫股慄不能對張靈均神氣自若顧愔曰吾與此人舉事宜其敗也與愔皆斬於東都市􅀄愔附來俊臣得進俊臣誅附張易之易之誅附韋氏韋氏敗又附譙王重福竟坐族誅嚴善思免死流靜州萬􅀐恃討諸韋之功多暴横長安中苦之詔並除外官又停以户奴爲萬􅀐更置飛􅀐􅀠左右羽林姚元之宋璟及御史大夫畢構上言先朝斜封官悉宜停廢上從之癸巳罷斜封官凡數千人刑部尚書同中書門下三品裴談貶蒲州刺史贈蘇安􅁪諌議大夫九月辛未以太子少師致仕唐休璟爲朔方道大揔管冬十月甲申禮儀使姚元之宋璟奏大行皇帝神主應祔太廟請遷義宗神主於東都别立廟從之乙未追復天后尊號爲大聖天后丁酉以幽州鎭守經略節度大使薛訥爲左武衞大將軍兼幽州都督節度使之名自訥始太平公主以太子年少意頗易之旣而憚其英武欲更擇闇弱者立之以乆其權數爲流言云太子非長不當立己亥制戒諭中外以息浮議公主每覘伺太子所爲纎介必聞於上太子左右亦往往爲公主耳目太子深不自安謚故太子重俊曰節愍太府少卿萬年韋湊上書以爲賞罰所不加者則考行立謚以襃貶之故太子重俊與李多祚等稱兵入宫中宗登玄武門以避之太子據鞍督兵自若及其徒倒戈多祚等死太子方逃竄曏使宿衞不守其爲禍也胡可忍言明日中宗雨泣謂供奉官曰幾不與卿等相見其危如此今聖朝禮葬謚爲節愍臣竊惑之夫臣子之禮過廟必下過位必趨漢成帝之爲太子不敢絶馳道而重俊稱兵宫内跨馬御前無禮甚矣若以其誅武三思父子而嘉之則興兵以誅姦臣而尊君父可也今欲自取之是與三思競爲逆也又足嘉乎若以其欲廢韋氏而嘉之則韋氏於時逆狀未彰大義未絶苟無中宗之命而廢之是脅父廢母也庸可乎漢戾太子困於江充之讒發憤殺充雖興兵交戰非圍逼君父也兵敗而死及其孫爲天子始得改葬猶謚曰戾況重俊可謚之曰節愍乎臣恐後之亂臣賊子得引以爲比開悖逆之原非所以彰善癉惡也請改其謚多祚等從重俊興兵不爲無罪陛下今宥之可也名之爲雪亦所未安上甚然其言而執政以爲制命已行不爲追改但停多祚等贈官而已十一月戊申朔以姚元之爲中書令己酉葬孝和皇帝于定陵廟號中宗朝議以韋后有罪不應祔葬追謚故英王妃趙氏曰和思順聖皇后求其瘞莫有知者乃以禕衣招䰟覆以夷衾祔􅁙定陵壬子侍中韋安石罷爲太子少保左僕射同中書門下三品蘇瓌罷爲少􅀓甲寅追復裴炎官爵􅀄裴伷先自嶺南逃歸復杖一百徙北庭至徙所殖貨任俠常遣客詗都下事武后之誅流人也伷先先知之逃奔胡中北庭都護追獲囚之以聞使者至流人盡死伷先以待報未殺旣而武后下制安撫流人有未死者悉放還伷先由是得歸至是求炎後獨伷先在拜詹事丞壬戌追復王同皎官爵庚午許文貞公蘇瓌薨制起復其子頲爲工部侍郎頲固辭上使李日知諭㫖日知終坐不言而還奏曰臣見其哀毁不忍發言恐其隕絶上乃聽其終制十二月癸未上以二女西城隆昌公主爲女官以資天皇天后之福仍欲於京城西造觀諌議大夫寗原悌上言以爲先朝悖逆庶人以愛女驕盈而及禍新都宜城以庶孽抑損而獲全又釋道二家皆以清淨爲本不當廣營寺觀勞人費財梁武致敗於前先帝取災於後殷鑒不逺今二公主入道將爲之置觀不宜過爲崇麗取謗四方又先朝所親狎諸僧尚在左右宜加屏斥上覽而善之宦者閭興貴以事屬長安令李朝隱朝隱繫於獄上聞之召見朝隱勞之曰卿爲赤縣令能如此朕復何憂因御承天門集百官及諸州朝集使宣示以朝隱所爲且下制稱宦官遇寛柔之代必弄威權朕覽前載毎所歎息能副朕意實在斯人可加一階爲太中大夫賜中上考及絹百匹壬辰奚霫犯塞掠漁陽雍奴出盧龍塞而去幽州都督薛訥追擊之弗克舊制三品以上官冊授五品以上制授六品以下敕授皆委尚書省奏擬文屬吏部武屬兵部尚書曰中銓侍郎曰東西銓中宗之末嬖倖用事選舉混淆無復綱紀至是以宋璟爲吏部尚書李乂盧從愿爲侍郎皆不畏彊禦請謁路絶集者萬餘人留者三銓不過二千人服其公以姚元之爲兵部尚書陸象先盧懷愼爲侍郎武選亦治從愿承慶之族子象先元方之子也侍御史藳城倪若水奏彈國子祭酒祝欽明司業郭山惲亂常改作希㫖病君於是左授欽明饒州刺史山惲括州長史侍御史楊孚彈紏不避權貴權貴毁之上曰鷹搏狡兎須急救之不爾必反爲所噬御史繩姦慝亦然苟非人主保衞之則亦爲姦慝所噬矣孚隋文帝之姪孫也置河西節度支度營田等使領涼甘肅伊􅀲沙西七州治涼州姚州羣蠻先附吐蕃攝􅁥察御史李知古請發兵擊之旣降又請築城列置州縣重稅之黄門侍郎徐堅以爲不可不從知古發劒南兵築城因欲誅其豪傑掠子女爲奴婢羣蠻怨怒蠻酋傍名引吐蕃攻知古殺之以其尸祭天由是姚嶲路絶連年不通安西都護張􅀇表侵掠吐蕃北境吐蕃雖怨而未絶和親乃賂鄯州都督楊矩請河西九曲之地以爲公主湯沐邑矩奏與之二年春正月癸丑突厥可汗黙啜遣使請和許之己未以太僕卿郭元振中書侍郎張􅀃並同平章事以温王重茂爲襄王充集州刺史遣中郎將將兵五百就防之乙丑追立妃劉氏曰肅明皇后陵曰惠陵德妃竇氏曰昭成皇后陵曰靖陵皆招䰟葬於東都城南立廟京師號儀坤廟竇氏太子之母也太平公主與益州長史竇懷貞等結爲朋黨欲以危太子使其壻唐晙邀韋安石至其第安石固辭不往上嘗宻召安石謂曰聞朝廷皆傾心東宫卿宜察之對曰陛下安得亡國之言此必太平之謀耳太子有功於社稷仁明孝友天下所知願陛下無惑讒言上瞿然曰朕知之矣卿勿言時公主在簾下竊聽之以飛語䧟安石欲収桉之頼郭元振救之得免公王又嘗乘輦邀宰相於光範門内諷以易置東宮衆皆失色宋璟抗言曰東宫有大功於天下眞宗廟社稷之主公主柰何忽有此議璟與姚元之宻言於上曰宋王陛下之元子􅃎王髙宗之長孫太平公主交構其閒將使東宫不安請出宋王及􅃎王皆爲刺史罷岐薛二王左右羽林使爲左右率以事太子太平公主請與武攸暨皆於東都安置上曰朕更無兄弟惟太平一妹豈可逺置東都諸王惟卿所處乃先下制云諸王駙馬自今毋得典禁兵見任者皆改它官頃之上謂侍臣曰術者言五日中當有急兵入宫卿等爲朕僃之張􅀃曰此必讒人欲離閒東宫願陛下使太子監國則流言自息矣姚元之曰張􅀃所言社稷之至計也上􅀃二月丙子朔以宋王成器爲同州刺史􅃎王守禮爲􅃎州刺史左羽林大將軍岐王隆範爲左衞率右羽林大將軍薛王隆業爲右衛率太平公主蒲州安置丁丑命太子􅁥國六品以下除官及徒罪以下並取太子處分殿中侍御史崔蒞太子中允薛昭素言於上曰斜封官皆先帝所除恩命已布姚元之等建議一朝盡奪之彰先帝之過爲陛下招怨今衆口沸騰徧於海内恐生非常之變太平公主亦言之上以爲然戊寅制諸縁斜封别敇授官先停任者並量材叙用太平公主聞姚元之宋璟之謀大怒以讓太子太子懼奏元之璟離閒姑兄請從極法甲申貶元之爲申州刺史璟爲楚州刺史丙戌宋王􅃎王亦寢刺史之命中書舍人參知機務劉幽求罷爲户部尚書以太子少保韋安石爲侍中安石與李日知代姚宋爲政自是綱紀紊亂復如景龍之丗矣前右率府鎧曹參軍柳澤上䟽以爲斜封官皆因僕妾汲引豈出孝和之意陛下一切黜之天下莫不稱明一旦忽盡收叙善惡不定反覆相攻何陛下政令之不一也議者咸稱太平公主令胡僧慧範曲引此曹誑誤陛下臣恐積小成大爲禍不細上弗聽澤亨之孫也左右萬􅀐與左右羽林爲北門四軍使葛福順等將之三月以宋王成器女爲金山公主許嫁突厥黙啜夏四月甲申宋王成器讓司徒許之以爲太子賔客以韋安石爲中書令上召羣臣三品以上謂曰朕素懷澹泊不以萬乘爲貴曩爲皇嗣又爲太弟皆辭不處今欲傳位太子何如羣臣莫對太子使右庻子李景伯固辭不許殿中侍御史和逢堯附太平公主言於上曰陛下春秋未髙方爲四海所依仰豈得遽爾上乃止戊子制凡政事皆取太子處分其軍旅死刑及五品巳上除授皆先與太子議之然後以聞辛卯以李日知守侍中壬寅赦天下五月太子請讓位於宋王成器不許請召太平公主還京師許之庚戌制則天皇后父母墳仍舊爲昊陵順陵量置官屬太平公主爲武攸暨請之也辛酉更以西城爲金仙公主隆昌爲玉真公主各爲之造觀逼奪民居甚多用功數百萬右散􅀐常侍魏知古黄門侍郎李乂諌皆不聽壬戌殿中􅁥竇懷貞爲御史大夫同平章事僧慧範恃太平公主勢逼奪民産御史大夫薛謙光與殿中侍御史慕容珣奏彈之公主訴於上出謙光爲岐州刺史時遣使按察十道議者以山南所部闊逺乃分爲東西道又分隴右爲河西道六月壬午又分天下置汴齊兖魏兾并蒲鄜涇秦益緜遂荆岐通梁襄楊安淮越洪潭二十四都督各糺察所部刺史以下善惡惟洛及近畿州不􅀠都督府太子右庶子李景伯舍人盧俌等上言都督專殺生之柄權任太重或用非其人爲害不細今御史秩卑望重以時廵察姦宄自禁其後竟罷都督但置十道按察使而已秋七月癸巳追復上官昭容謚曰惠文乙卯以髙祖故宅枯柿復生赦天下己巳以右御史大夫解琬爲朔方大揔管琬考按三城戍兵奏減十萬人庚午以中書令韋安石爲左僕射兼太子賔客同中書門下三品太平公主以安石不附己故崇以虚名實去其權也九月庚辰以竇懷貞爲侍中懷貞毎退朝必詣太平公主第時修金仙玉眞二觀羣臣多諌懷貞獨勸成之身自督役時人謂懷貞前爲皇后阿㸙今爲公主邑司冬十月甲辰上御承天門引韋安石郭元振竇懷貞李日知張􅀃宣制責以政教多闕水旱爲災府庫益竭僚吏日滋雖朕之薄德亦輔佐非才安石可左僕射東都留守元振可吏部尚書懷貞可左御史大夫日知可户部尚書說可左丞並罷政事以吏部尚書劉幽求爲侍中右散騎常侍魏知古爲左散騎常侍太子詹事崔湜爲中書侍郎並同中書門下三品中書侍郎陸象先同平章事皆太平公主之志也象先清凈寡欲言論髙逺爲時人所重湜私侍太平公主公主欲引以爲相湜請與象先同升公主不可湜曰然則湜亦不敢當公主乃為之并言於上上不欲用湜公主涕泣以請乃從之右補闕辛替否上䟽以為自古失道破國亡家者口説不如身逢耳聞不如目覩臣請以陛下所目覩者言之太宗皇帝陛下之祖也撥亂返正開基立極官不虚授財無枉費不多造寺觀而有福不多度僧尼而無災天地垂祐風雨時若粟帛充溢蠻夷率服享國久長名髙萬古陛下何不取而法之中宗皇帝陛下之兄弃祖宗之業徇女子之意無能而禄者數千人無功而封者百餘家造寺不止費財貨者數百億度人無窮免租庸者數十萬所出日滋所入日寡奪百姓口中之食以養貪殘剝萬人體上之衣以塗土木於是人怨神怒衆叛親離水旱並臻公私俱罄享國不永禍及其身陛下何不懲而改之自頃以來水旱相繼兼以霜蝗人無所食未聞賑恤而爲二女造觀用錢百餘萬緡陛下豈可不計當今府庫之蓄積有幾中外之經費有㡬而輕用百餘萬緡以供無用之役乎陛下族韋氏之家而不去韋氏之惡忍弃太宗之法不忍弃中宗之政乎且陛下與太子當韋氏用事之時日夕憂危切齒於羣兇今幸而除之乃不改其所為臣恐復有切齒於陛下者也然則陛下又何惡於羣凶而誅之昔先帝之憐悖逆也宗晉卿為之造第趙履温為之葺園殫國財竭人力第成不暇居園成不暇遊而身為戮沒今之造觀崇侈者必非陛下公主之本意殆有宗趙之徒從而勸之不可不察也陛下不停斯役臣恐人之愁怨不減先朝之時人人知其禍敗而口不敢言言則刑戮隨之如韋月將燕欽融之徒先朝誅之陛下賞之豈非陛下知直言之有益於國乎臣今所言亦先朝之直也惟陛下察之上雖不能從而嘉其切直御史中丞和逢堯攝鴻臚卿使于突厥說黙啜曰處宻堅昆聞可汗結昏於唐皆當歸附可汗何不襲唐冠帶使諸胡知之豈不美哉黙啜許諾明日襆頭衣紫衫南向再拜稱臣遣其子楊我支及國相隨逢堯入朝十一月戊寅至京師逢堯以奉使功遷户部侍郎壬辰令天下百姓二十五入軍五十五免十二月癸卯以興昔亡可汗阿史那獻爲招慰十姓使上召天台山道士司馬承禎問以隂陽數術對曰道者損之又損以至於無爲安肯勞心以學數術乎上曰理身無爲則髙矣如理國何對曰國猶身也順物自然而心無所私則天下理矣上歎曰廣成之言無以過也承禎固請還山上許之尚書左丞盧藏用指終南山謂承禎曰此中大有佳處何必天台承禎曰以愚觀之此乃仕宦之疾徑耳藏用嘗隱終南則天時徵爲左拾遺故承禎言之􅀇宗至道大聖大明孝皇帝上之上先天元年春正月辛巳睿宗祀南郊初用諌議大夫賈曾議合祭天地曾言忠之子也戊子幸滻東耕藉田己丑赦天下改元太極乙未上御安福門宴突厥楊我支以金山公主示之既而㑹上􅀓位昏竟不成以左御史大夫竇懷貞户部尚書岑羲並同中書門下三品二月辛酉廢右御史臺蒲州刺史蕭至忠自託於太平公主公主引為刑部尚書華州長史蔣欽緒其妹夫也謂之曰如子之才何憂不逹勿為非分妄求至忠不應欽緒退歎曰九代卿族一舉滅之可哀也哉至忠素有雅望嘗自公主第門出遇宋璟璟曰非所望於蕭君也至忠笑曰善乎宋生之言遽策馬而去幽州大都督薛訥鎮幽州二十餘年吏民安之未嘗舉兵岀塞虜亦不敢犯與燕州刺史李璡有隙璡毁之於劉幽求幽求薦左羽林將軍孫佺代之三月丁丑以佺為幽州大都督徙訥為并州長史夏五月益州獠反戊寅上祭北郊辛巳赦天下改元延和六月丁未右散騎常侍武攸暨卒追封定王上以節愍太子之亂岑羲有保護之功癸丑以羲為侍中庚申幽州大都督孫佺與奚酋李大酺戰于冷陘全軍覆沒是時佺帥左驍衛將軍李楷洛左威衛將軍周以悌發兵二萬騎八千分為三軍以襲奚契丹將軍烏可利諫曰道險而天熱懸軍逺襲往必敗佺曰薛訥在邊積年竟不能為國家復營州今乘其無僃往必有功使楷洛將騎四千前驅遇奚騎八千楷洛戰不利佺怯懦不敢救引軍欲還虜乘之唐兵大敗佺阻山為方陳以自固大酺使謂佺曰朝廷既與我和親今大軍何為而來佺曰吾奉敇來招慰耳楷洛不禀節度輒與汝戰請斬以謝大酺曰若然國信安在佺悉歛軍中帛得萬餘叚并紫袍金帶魚袋以贈之大酺曰請將軍南還勿相驚擾將士懼無復部伍虜追擊之士卒皆潰佺以悌為虜所擒獻於突厥黙啜皆殺之楷洛可利脱歸秋七月彗星出西方經軒轅入太㣲至于大角有相者謂同中書門下三品竇懷貞曰公有刑厄懷貞懼請解官為安國寺奴敕聽解官乙亥復以懷貞為左僕射兼御史大夫平章軍國重事太平公主使術者言於上曰彗所以除舊布新又帝座及心前星皆有變皇太子當為天子上曰􅀓徳避災吾志决矣太平公主及其黨皆力諫以為不可上曰中宗之時羣姦用事天變屢臻朕時請中宗擇賢子立之以應災異中宗不恱朕憂恐數日不食豈可在彼則能勸之在己則不能邪太子聞之馳入見自投於地叩頭請曰臣以微功不次為嗣懼不克堪未審陛下遽以大位􅀓之何也上曰社稷所以再安吾之所以得天下皆汝力也今帝座有災故以授汝轉禍為福汝何疑邪太子固辭上曰汝為孝子何必待柩前然後即位邪太子流涕而出壬辰制􅀓位於太子太子上表固辭太平公主勸上雖􅀓位猶宜自揔大政上乃謂太子曰汝以天下事重欲朕兼理之邪昔舜禪禹猶親廵狩朕雖􅀓位豈忘家國其軍國大事當兼省之八月庚子􅀇宗即位尊睿宗為太上皇上皇自稱曰朕命曰誥五日一受朝於太極殿皇帝自稱曰予命曰制敕日受朝於武徳殿三品以上除授及大刑政决於上皇餘皆决於皇帝􅊨壬寅上大聖天后尊號曰聖帝天后􅊨甲辰赦天下改元乙巳於漠州北置渤海軍􅁪定州境置恒陽軍媯蔚州境置懷柔軍屯兵五萬􅊨丙午立妃王氏為皇后以后父仁皎為太僕卿仁皎下邽人也戊申立皇子許昌王嗣直為郯王真定王嗣謙為郢王􅊨以劉幽求為右僕射同中書門下三品魏知古為侍中崔湜為檢校中書令初河内人王琚預於王同皎之謀亡命傭書於江都上之為太子也琚還長安選補諸暨主簿過謝太子琚至廷中故徐行髙視宦者曰殿下在簾内琚曰何謂殿下當今獨有太平公主耳太子遽召見與語琚曰韋庶人弑逆人心不服誅之易耳太平公主武后之子凶猾無比大臣多為之用琚竊憂之太子引與同榻坐泣曰主上同氣唯有太平言之恐傷主上之意不言為患日深為之柰何琚曰天子之孝異於匹夫當以安宗廟社稷為事蓋主漢昭帝之姊自㓜供養有罪猶誅之為天下者豈顧小節太子恱曰君有何藝可與寡人遊琚曰能飛煉詼嘲太子乃奏為詹事府司直日與遊處累遷太子中舍人及即位以為中書侍郎是時宰相多太平公主之黨劉幽求與右羽林將軍張暐謀以羽林兵誅之使暐宻言於上曰竇懷貞崔湜岑羲皆因公主得進日夜為謀不輕若不早圖一旦事起大上皇何以得安請速誅之臣已與幽求定計惟俟陛下之命上深以為然暐洩其謀於侍御史鄧光賔上大懼遽列上其狀丙辰幽求下獄有司奏幽求等離間骨肉罪當死上為言幽求有大功不可殺癸亥流幽求于封州書暐于峯州光賔于繡州初崔湜爲襄州剌史密與譙王重福通書重福遺之金帶重福敗湜當死張說劉幽求營䕶得免既而湜附太平公主與公主謀罷説政事以左丞分司東都及幽求流封州湜諷廣州都督周利貞使殺之桂州都督景城王晙知其謀留幽求不遣利貞屢移牒索之晙不應利貞以聞湜屢逼晙使遣幽求幽求謂晙曰公拒執政而保流人勢不能全徒仰累耳固請詣廣州晙曰公所坐非可絶於朋友者也晙因公獲罪無所恨竟逗遛不遣幽求由是得免九月丁卯朔日有食之辛夘立皇子嗣昇爲陜王嗣昇母楊氏士逹之曾孫也王后無子母養之冬十月庚子上謁太廟赦天下癸卯上幸新豐獵於驪山之下辛酉沙陀金山遣使入貢沙陀者處月之别種也姓朱邪氏十一月乙酉奚契丹二萬騎冦漁陽幽州都督宋璟閉城不出虜大掠而去上皇誥遣皇帝廵邉西自河隴東及燕薊選將練卒甲午以幽州都督宋璟為左軍大揔管并州長史薛訥為中軍大揔管朔方大揔管兵部尚書郭元振為右軍大揔管十二月刑部尚書李日知請致仕日知在官不行捶撻而事集刑部有令史受敕三日忘不行日知怒索杖集羣吏欲捶之既而謂曰我欲捶汝天下人必謂汝能撩李日知嗔受李日知杖不得比於人妻子亦將弃汝矣遂釋之吏皆感悦無敢犯者脱有稽失衆共謫之開元元年春正月己亥誥衛士自今二十五入軍五十免羽林飛騎並以衛士簡補以吏部尚書蕭至忠為中書令皇帝廵邊改期所募兵各散遣約八月復集竟不成行二月庚子夜開門然燈又追作去年大酺大合􅇊樂上皇與上御門樓臨觀或以夜繼晝凡月餘左拾遺華隂嚴挺之上䟽諌以為酺者因人所利合醵為歡今乃損萬人之力營百戲之資非所以光聖徳美風化也乃止初髙麗既亡其别種大祚榮徙居營州及李盡忠反祚榮與靺鞨乞四北羽聚衆東走阻險自固盡忠死武后使將軍李楷固討其餘黨楷固擊乞四北羽斬之引兵踰天門嶺逼祚榮祚榮逆戰楷固大敗僅以身免祚榮遂帥其衆東據東牟山築城居之祚榮驍勇善戰髙麗靺鞨之人稍稍歸之地方二千里户十餘萬勝兵數萬人自稱振國王附于突厥時奚契丹皆叛道路阻絶武后不能討中宗即位遣侍御史張行岌招慰之祚榮遣子入侍至是以祚榮為左驍衛大將軍渤海郡王以其所部為忽汗州令祚榮兼都督庚申敕以嚴挺之忠直宣示百官厚賞之三月辛巳皇后親蠶晉陵尉楊相如上䟽言時政其略曰煬帝自恃其彊不憂時政雖制敇交行而聲實舛謬言同堯舜迹如桀紂舉天下之大一擲而弃之又曰隋氏縱欲而亡太宗抑欲而昌願陛下詳擇之又曰人主莫不好忠正而􅁖佞邪然忠正者常踈佞邪者常親以至於覆國危身而不寤者何哉誠由忠正者多忤意倿邪者多順指積忤生憎積順生愛此親踈之所以分也明主則不然愛其忤以収忠賢􅁖其順以去倿邪則太宗太平之業將何逺哉又曰夫法貴簡而能禁罰貴輕而必行陛下方興崇至徳大布新政請一切除去碎宻不察小過小過不察則無煩苛大罪不漏則止姦慝使簡而難犯寛而能制則善矣上覧而善之先是修大明宫未畢夏五月庚寅敕以農務方勤罷之以待閑月六月丙辰以兵部尚書郭元振同中書門下三品太平公主依上皇之􅀔擅權用事與上有隙宰相七人五出其門文武之臣太半附之與竇懷貞岑羲蕭至忠崔湜及太子少保薛稷雍州長史新興王晉左羽林大將軍常元楷知右羽林將軍事李慈左金吾將軍李欽中書舍人李猷右散騎常侍賈膺福鴻臚卿唐晙及僧慧範等謀廢立又與宫人元氏謀於赤箭粉中寘毒進於上晉徳良之孫也元楷慈數往來主第相與結謀王琚言於上曰事廹矣不可不速發左丞張説自東都遣人遺上佩刀意欲上斷割荆州長史崔日用入奏事言於上曰太平謀逆有日陛下往在東宫猶為臣子若欲討之須用謀力今既光臨大寳但下一制書誰敢不從萬一姦宄得志悔之何及上曰誠如卿言直恐驚動上皇日用曰天子之孝在於安四海若姦人得志則社稷為墟安在其為孝乎請先定北軍後收逆黨則不驚動上皇矣上以為然以日用為吏部侍郎秋七月魏知古告公主欲以是月四日作亂令元楷慈以羽林兵突入武徳殿懷貞至忠羲等於南牙舉兵應之上乃與岐王範薛王業郭元振及龍武將軍王毛仲殿中少監姜皎太僕少卿李令問尚乘奉御王守一内給事髙力士果毅李守徳等定計誅之皎謩之曾孫令問靖弟客師之孫守一仁皎之子力士潘州人也甲子上因王毛仲取閑廐馬及兵三百餘人與同謀十餘人自武徳殿入䖍化門召元楷慈先斬之擒膺福猷於内客省以出執至忠羲於朝堂皆斬之懷貞逃入溝中自縊死戮其尸改姓曰毒上皇聞變登承天門樓郭元振奏皇帝前奉誥誅竇懷貞等無它也上尋至樓上上皇乃下誥罪状懷貞等因赦天下惟逆人親黨不赦薛稷賜死於萬年獄乙丑上皇誥自今軍國政刑一皆取皇帝處分朕方無為養志以遂素心是日徙居百福殿太平公主逃入山寺三日乃出賜死于家公主諸子及黨與死者數十人薛崇簡以數諫其母被撻特免死賜姓李官爵如故籍公主家財貨山積珍物侔於御府廐牧羊馬田園息錢收之數年不盡慧範家産亦數十萬緡改新興王晉之姓曰厲初上謀誅竇懷貞等召崔湜將託以心腹湜弟滌謂湜曰主上有問勿有所隱湜不從懷貞等既誅湜與右丞盧藏用俱坐私侍太平公主湜流竇州藏用流瀧州新興王晉臨刑歎曰本為此謀者崔湜今吾死湜生不亦寃乎㑹有司鞫宮人元氏元氏引湜同謀進毒乃追賜死於荆州薛稷之子伯陽以尚主免死流嶺南於道自殺初太平公主與其黨謀廢立竇懷貞蕭至忠岑羲崔湜皆以為然陸象先獨以為不可公主曰廢長立少已為不順且又失徳若之何不去象先曰既以功立當以罪廢今實無罪象先終不敢從公主怒而去上既誅懷貞等召象先謂曰嵗寒知松栢信哉時窮治公主枝黨當坐者衆象先宻為申理所全甚多然未嘗自言當時無知者百官素為公主所善及惡之者或黜或陟終嵗不盡丁卯上御承天門樓赦天下己巳賞功臣郭元振等官爵第舍金帛有差以髙力士為右監門將軍知内侍省事初太宗定制内侍省不置三品官黄衣廪食守門傳命而已天后雖女主宦官亦不用事中宗時嬖倖猥多宦官七品以上至千餘人然衣緋者尚寡上在藩邸力士傾心奉之及為太子奏為内給事至是以誅蕭岑功賞之是後宦官稍増至三千餘人除三品將軍者浸多衣緋紫至千餘人宦官之盛自此始壬申遣益州長史畢構等六人宣撫十道乙亥以左丞張説為中書令庚辰中書侍郎同平章事陸象先罷為益州長史劒南桉察使八月癸巳以封州流人劉幽求為左僕射平章軍國大事丙辰突厥可汗黙啜遣其子揚我支來求昏丁巳許以蜀王女南和縣主妻之中宗之崩也同中書門下三品李嶠宻表韋后請出相王諸子於外上即位於禁中得其表以示侍臣嶠時以特進致仕或請誅之張説曰嶠雖不識逆順然為當時之謀則忠矣上然之九月壬戌以嶠子率更令暢為䖍州刺史令嶠隨暢之官庚午以劉幽求同中書門下三品丙戌復置右御史臺督察諸州罷諸道桉察使冬十月辛卯引見京畿縣令戒以嵗饑恵養黎元之意己亥上幸新豐癸卯講武於驪山之下徵兵二十萬旌旗連亘五十餘里以軍容不整坐兵部尚書郭元振於纛下將斬之劉幽求張説跪於馬前諫曰元振有大功於社稷不可殺乃流新州斬給事中知禮儀事唐紹以其制軍禮不肅故也上始欲立威亦無殺紹之意金吾衛將軍李邈遽宣敕斬之上尋罷邈官廢弃終身時二大臣得罪諸軍多震懾失次惟左軍節度薛訥朔方道大揔管解琬二軍不動上遣輕騎召之皆不得入其陳上深歎美慰勉之甲辰獵于渭川上欲以同州刺史姚元之為相張說疾之使御史大夫趙彦昭彈之上不納又使殿中監姜皎言於上曰陛下常欲擇河東揔管而難其人臣今得之矣上問為誰皎曰姚元之文武全才真其人也上曰此張説之意也汝何得靣欺罪當死皎叩頭首服上即遣中使召元之詣行在既至上方獵引見即拜兵部尚書同中書門下三品元之吏事明敏三為宰相皆兼兵部尚書縁邉屯戍斥􅀱士馬儲械無不黙記上􅀄即位勵精為治毎事訪於元之元之應荅如響同僚皆唯諾而已故上專委任之元之請抑權倖愛爵賞納諫諍却貢獻不與群臣褻狎上皆納之乙巳車駕還京師姚元之嘗奏請序進郎吏上仰視殿屋元之再三言之終不應元之懼趨出罷朝髙力士諫曰陛下新揔萬機宰臣奏事當面加可否柰何一不省察上曰朕任元之以庶政大事當奏聞共議之郎吏卑秩乃一一以煩朕邪㑹力士宣事至省中為元之道上語元之乃喜聞者皆服上識人君之體左拾遺曲江張九齡以元之有重望為上所信任奏記勸其逺謟躁進純厚其略曰任人當才為政大體與之共理無出此途而曏之用才非無知人之鍳其所以失溺在縁情之舉又曰自君矦職相國之事持用人之權而淺中弱植之徒已延頸企踵而至謟親戚以求譽媚賔客以取容其間豈不有才所失在於無恥元之嘉納其言新興王晉之誅也僚吏皆奔散惟司功李撝歩從不失在官之禮仍哭其尸姚元之聞之曰欒布之儔也及為相擢為尚書郎己酉以刑部尚書趙彦昭為朔方道大揔管十一月乙丑劉幽求兼侍中辛巳羣臣上表請加尊號為開元神武皇帝從之戊子受冊中書侍郎王琚為上所親厚羣臣莫及毎進見侍笑語逮夜方出或時休沐往往遣中使召之或言於上曰王琚權譎縱横之才可與之定禍亂難與之守承平上由是浸踈之是月命琚兼御史大夫桉行北邉諸軍十二月庚寅赦天下改元尚書左右僕射為左右丞相中書省為紫㣲省門下省為黄門省侍中為監雍州為京兆府洛州為河南府長史為尹司馬為少尹甲午吐蕃遣其大臣來求和壬寅以姚元之兼紫微令元之避開元尊號復名崇敕都督刺史都護將之官皆引面辭畢側門取進止姚崇既為相紫㣲令張説懼乃潜詣岐王申款它日崇對於便殿行微蹇上問有足疾乎對曰臣有腹心之疾非足疾也上問其故對曰岐王陛下愛弟張説為輔臣而宻乘車入王家恐為所誤故憂之癸丑説左遷相州刺史右僕射同中書門下三品劉幽求亦罷為太子少保甲寅以黄門侍郎盧懷慎同紫微黄門平章事資治通鑑卷第二百十
