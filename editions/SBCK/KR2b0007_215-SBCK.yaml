body:
  text: 臣司馬光奉勑編集唐紀三十一獻十一月凡五年有奇起􅀇黓敦牂盡强圉大淵􅀇宗至道大聖大明孝皇帝中之下天寶元年春正月丁未朔上御勤政樓受朝賀赦天下改元壬子分平盧别為節度以安祿山為節度使是時天下聲教所被之州三百二十一羈縻之州八百置十節度經略使以備邊安西節度撫寜西域統􅀛兹焉耆于闐疎勒四鎮治􅀛兹城兵二萬四千北庭節度防制突騎施堅昆統瀚海天山伊吾三軍屯伊西二州之境治北庭都護府兵二萬人河西節度斷隔吐蕃突厥統赤水大斗建康寜寇玉門墨離豆盧新泉八軍張掖交城白亭三守捉屯凉肅􅀲沙㑹五州之境治凉州兵七萬三千人朔方節度捍禦突厥統經略豐安定逺三軍三受降城安北單于二都䕶府屯靈夏豐三州之境治靈州兵六萬四千七百人河東節度與朔方犄角以禦突厥統天兵大同横野岢嵐四軍雲中守捉屯太原府忻代嵐三州之境治太原府兵五萬五千人范陽節度臨制奚契丹統經略威武清夷靜塞恒陽北平高陽唐興横海九軍屯幽薊媯檀易恒定漠滄九州之境治幽州兵九萬一千四百人平盧節度鎭撫室韋靺鞨統平盧盧龍二軍榆闗守捉安東都䕶府屯營平二州之境治營州兵三萬七千五百人隴右節度備禦吐蕃統臨洮河源白水安人振威威戎漠門寜塞積石鎮西十軍綏和合川平夷三守捉屯鄯廓洮河之境治鄯州兵七萬五千人劒南節度西抗吐蕃南撫蠻獠統天寶平戎昆明寜逺澄川南江六軍屯益翼茂當嶲柘松維恭雅黎姚悉十三州之境治益州兵三萬九百人嶺南五府經略綏靜夷獠統經略清海二軍桂容邕交四管治廣州兵萬五千四百人此外又有長樂經略福州領之兵千五百人東萊守捉萊州領之東牟守捉登州領之兵各千人凡鎭兵四十九萬人馬八萬餘匹開元之前每嵗供邊兵衣糧費不過二百萬天寶之後邊將奏益兵浸多每嵗用衣千二十萬疋糧百九十萬斛公私勞費民始困苦矣甲寅陳王府參軍田同秀上言見􅀇元皇帝於丹鳳門外之空中告以我藏靈符在尹喜故宅上遣使於故函谷闗尹喜臺旁求得之陜州刺史李齊物穿三門運渠辛未渠成齊物神通之曾孫也壬辰羣臣上表以函谷寶符濳應年號先天不違請於尊號加天寶字從之二月辛卯上享􅀇元皇帝於新廟甲午享太廟丙申合祀天地於南郊赦天下改侍中為左相中書令為右相尚書左右丞相復為僕射東都北都皆為京州為郡刺史為太守改桃林縣曰靈寶田同秀除朝散大夫時人皆疑寶符同秀所為閒一嵗清河人崔以清復言見􅀇元皇帝於天津橋北云藏符在武城紫微山敕使往掘亦得之東京留守王倕知其詐按問果首服奏之上亦不深罪流之而已三月以長安令韋堅為陜郡太守領江淮租庸轉運使初宇文融既敗言利者稍息及楊慎矜得幸於是韋堅王鉷之徒競以利進百司有事權者稍稍别置使以領之舊官充位而已堅太子之妃兄也為吏以幹敏稱上使之督江淮租運嵗增巨萬上以為能故擢任之王鉷方翼之孫也亦以善治租賦為戸部員外郎兼侍御史李林甫為相凡才望功業出己右及為上所厚勢位將逼己者必百計去之尤忌文學之士或陽與之善啗以甘言而陰䧟之世謂李林甫口有蜜腹有劒上嘗陳樂於勤政樓下垂簾觀之兵部侍郎盧絢謂上已起垂鞭按轡横過樓下絢風標清粹上目送之深歎其蘊藉林甫常厚以金帛賂上左右上舉動必知之乃召絢子弟謂曰尊君素望清崇今交廣藉才聖上欲以尊君為之可乎若憚遠行則當左遷不然以賔詹分務東洛亦優賢之命也何如絢懼以賔詹為請林甫恐乖衆望乃除華州刺史到官未幾誣其有疾州事不理除詹事員外同正上又嘗問林甫以嚴挺之今安在是人亦可用挺之時為絳州刺史林甫退召挺之弟損之諭以上待尊兄意甚厚盍為見上之䇿奏稱風疾求還京師就醫挺之從之林甫以其奏白上云挺之衰老得風疾宜且授以散秩使便醫藥上歎吒久之夏四月壬寅以為詹事又以汴州刺史河南采訪使齊澣為少詹事皆員外同正於東京養疾澣亦朝廷宿望故并忌之上發兵納十姓可汗阿史那昕於突騎施至俱蘭城為莫賀達干所殺突騎施大纛官都摩度來降六月乙未冊都摩度為三姓葉䕶秋七月癸卯朔日有食之辛未左相牛仙客薨八月丁丑以刑部尚書李適之為左相突厥拔悉宻囘紇葛邏祿三部共攻骨咄葉䕶殺之推拔悉宻酋長為頡趺伊施可汗囘紇葛邏祿自為左右葉䕶突厥餘衆共立判闕特勒之子為烏蘇米施可汗以其子葛臘哆為西殺上遣使諭烏蘇令内附烏蘇不從朔方節度使王忠嗣盛兵磧口以威之烏蘇懼請降而遷延不至忠嗣知其詐乃遣使説拔悉宻囘紇葛邏祿使攻之烏蘇遁去忠嗣因出兵擊之取其右廂以歸丁亥突厥西葉䕶阿布思及西殺葛臘哆黙啜之孫勃德支伊然小妻毗伽登利之女帥部衆千餘帳相次來降突厥遂㣲九月辛亥上御花萼樓宴突厥降者賞賜甚厚䕶宻先附吐蕃戊午其王頡吉里匐遣使請降冬十月丁酉上幸驪山温泉己巳還宫十二月隴右節度使皇甫惟明奏破吐蕃大嶺等軍戊戌又奏破青海道莽布支營三萬餘衆斬獲五千餘級庚子河西節度使王倕奏破吐蕃漁海及遊奕等軍是嵗天下縣一千五百二十八鄉一萬六千八百二十九戸八百五十二萬五千七百六十三口四千八百九十萬九千八百囘紇葉䕶骨力裴羅遣使入貢賜爵奉義王二年春正月安祿山入朝上寵待甚厚謁見無時祿山奏言去秋營州蟲食苖臣焚香祝天云臣若操心不正事君不忠願使蟲食臣心若不負神祗願使蟲散即有羣鳥從北來食蟲立盡請宣付史官從之李林甫領吏部尚書日在政府選事悉委侍郎宋遥苖晉卿御史中丞張倚新得幸於上遥晉卿欲附之時選人集者以萬計入等者六十四人倚子奭為之首羣議沸騰前薊令蘇孝韞以告安祿山祿山入言於上上悉召入等人靣試之奭手持試紙終日不成一字時人謂之曳白癸亥遥貶武當太守晉卿貶安康太守倚貶淮陽太守同考判官禮部郎中裴朏等皆貶嶺南官晉卿壺闗人也三月壬子追尊􅀇元皇帝父周上御大夫為先天太皇又尊臯繇為德明皇帝凉武昭王為興聖皇帝江淮南租庸等使韋堅引滻水抵苑東望春樓下為潭以聚江淮運船役夫匠通漕渠發人丘壟自江淮至京城民間蕭然愁怨二年而成丙寅上幸望春樓觀新潭堅以新船數百艘扁榜郡名各陳郡中珍貨於船背陜尉崔成甫著錦半臂缺胯緑衫以裼之紅袙首居前船唱得寶歌使美婦百人盛飾而和之連檣數里堅跪進諸郡輕貨仍上百牙盤食上置宴竟日而罷觀者山積夏四月加堅左散騎常侍其僚屬吏卒襃賞有差名其潭曰廣運時京兆尹韓朝宗亦引渭水置潭於西街以貯材木丁亥皇甫惟明引軍出西平擊吐蕃行千餘里攻洪濟城破之上以右賛善大夫楊慎矜知御史中丞事時李林甫專權公卿之進有不出其門者必以罪去之慎矜由是固辭不敢受五月辛丑以慎矜為諌議大夫冬十月戊寅上幸驪山温泉乙卯還宫三載春正月丙申朔改年曰載辛丑上幸驪山温泉二月庚午還宫辛卯太子更名亨海賊吳令光等抄掠台明命河南尹裴敦復將兵討之三月己巳以平盧節度使安祿山兼范陽節度使以范陽節度使裴寛為戸部尚書禮部尚書席建矦為河北黜陟使稱祿山公直李林甫裴寛皆順㫖稱其美三人皆上所信任由是祿山之寵益固不搖矣夏四月裴敦復破吳令光擒之五月河西節度使夫䝉靈詧討突騎施莫賀達干斬之更請立黑姓伊里底蜜施骨咄祿毗伽六月甲辰冊拜骨咄祿毗伽為十姓可汗秋八月拔悉蜜攻斬突厥烏蘇可汗傳首京師國人立其弟鶻隴匐白眉特勒是為白眉可汗於是突厥大亂敇朔方節度使王忠嗣出兵乗之至薩河内山破其左廂阿波達干等十一部右廂未下㑹囘紇葛邏祿共攻拔悉蜜頡跌伊施可汗殺之回紇骨力裴羅自立為骨咄祿毗伽闕可汗遣使言狀上冊拜裴羅為懷仁可汗於是懷仁南據突厥故地立牙帳於烏德犍山舊統藥邏葛等九姓其後又并拔悉蜜葛邏祿凡十一部各置都督每戰則以二客部為先李林甫以楊慎矜屈附於己九月甲戌復以慎矜為御史中丞充諸道鑄錢使冬十月癸巳上幸驪山溫泉十一月丁卯還宫術士蘇嘉慶上言遯甲術有九宫貴神典司水旱請立壇於東郊祀以四孟月從之禮在昊天上帝下太清宫太廟上所用牲玉皆侔天地十二月癸巳置㑹昌縣於溫泉宫下戸部尚書裴寛素為上所重李林甫恐其入相忌之刑部尚書裴敦復擊海賊還受請託廣序軍功寛微奏其事林甫以告敦復敦復言寛亦嘗以親故屬敦復林甫曰君速奏之勿後於人敦復乃以五百金賂女官楊太眞之姊使言於上甲午寛坐貶睢陽太守初武惠妃薨上悼念不已後宫數千無當意者或言夀王妃楊氏之美絶世無䨇上見而悦之乃令妃自以其意乞為女官號太眞更為夀王娶左衛郎將韋昭訓女濳内太真宫中太真肌態豐豔曉音律性警穎善承迎上意不朞嵗寵遇如惠妃宫中號曰娘子凡儀體皆如皇后癸卯以宗女為和義公主嫁寜遠奉化王阿悉爛達干癸丑上祀九宫貴神赦天下初令百姓十八為中二十三成丁初上自東都還李林甫知上厭巡幸乃與牛仙客謀增近道粟賦及和糴以實闗中數年蓄積稍豐上從容謂高力士曰朕不出長安近十年天下無事朕欲高居無為悉以政事委林甫何如對曰天子巡狩古之制也且天下大柄不可假人彼威勢既成誰敢復議之者上不悦力士頓首自陳臣狂疾發妄言罪當死上乃為力士置酒左右皆呼萬嵗力士自是不敢深言天下事矣四載春正月庚午上謂宰相曰朕比以甲子日於宫中為壇為百姓祈福朕自草黄素置案上俄飛升天聞空中語云聖夀延長又朕於嵩山鍊藥成亦置壇上及夜左右欲収之又聞空中語云藥未須収此自守護達曙乃収之太子諸王宰相皆上表賀回紇懷仁可汗擊突厥白眉可汗殺之傳首京師突厥毗伽可敦帥衆來降於是北邊晏然烽燧無警矣回紇斥地愈廣東際室韋西抵金山南跨大漠盡有突厥故地懐仁卒子磨延啜立號葛勒可汗二月己酉以朔方節度使王忠嗣兼河東節度使忠嗣少以勇敢自負及鎮方靣專以持重安邊為務常曰太平之將但當撫循訓練士卒而巳不可疲中國之力以邀功名有漆弓百五十斤常貯之櫜中以示不用軍中日夜思戰忠嗣多遣諜人伺其閒隙見可勝然後興師故出必有功既兼兩道節制自朔方至雲中邊陲數千里要害之地悉列置城堡斥地各數百里邊人以為自張仁亶之後將帥皆不及三月壬申上以外孫獨孤氏為靜樂公主嫁契丹王李懷節甥楊氏為宜芳公主嫁奚王李延寵乙巳以刑部尚書裴敦復充嶺南五府經略等使五月壬申敦復坐逗留不之官貶淄川太守以光祿少卿彭杲代之上嘉敦復平海賊之功故李林甫陷之李適之與李林甫爭權有隙適之領兵部尚書駙馬張垍為侍郎林甫亦惡之使人發兵部銓曹姦利事收吏六十餘人付京兆與御史對鞫之數日竟不得其情京兆尹蕭炅使法曹吉温鞫之温入院置兵部吏於外先於後㕔取二重囚訊之或杖或壓號呼之聲所不忍聞皆曰茍存餘生乞紙盡荅兵部吏素聞温之慘酷引入皆自誣服無敢違温意者頃刻而獄成騐囚無榜掠之迹六月辛亥敕誚責前後知銓侍郎及判南曹郎官而宥之垍均之兄温頊之弟子也温始為新豐丞太子文學薛嶷薦温才上召見顧嶷曰是一不良人朕不用也蕭炅為河南尹嘗坐事西臺遣温往按之温治炅甚急及温為萬年丞未幾炅為京兆尹温素與高力士相結力士自禁中歸温度炅必往謝官乃先詣力士與之談謔握手甚歡炅後至温陽為驚避力士呼曰吉七不須避謂炅曰此亦吾故人也召還與炅坐炅接之甚恭不敢以前事為怨它日温謁炅曰曩者温不敢隳國家法自今請洗心事公炅遂與盡歡引為法曹及林甫欲除不附己者求治獄吏炅薦温於林甫林甫得之大喜温常曰若遇知己南山白額虎不足縛也時又有杭州人羅希奭為吏深刻林甫引之自御史臺主簿再遷殿中侍御史二人皆隨林甫所欲深淺鍛鍊成獄無能自脱者時人謂之羅鉗吉網秋七月壬午冊韋昭訓女為夀王妃八月壬寅冊楊太真為貴妃贈其父􅀇琰兵部尚書以其叔父􅀇珪為光祿卿從兄銛為殿中少監錡為駙馬都尉癸卯冊武惠妃女為太華公主命錡尚之及貴妃三姊皆賜第京師寵貴赫然楊釗貴妃之從祖兄也不學無行為宗黨所鄙從軍於蜀得新都尉考滿家貧不能自歸新政富民鮮于仲通常資給之楊􅀇琰卒於蜀釗往來其家遂與其中女通鮮于仲通名向以字行頗讀書有材智劒南節度使章仇兼瓊引為采訪支使委以心腹嘗從容謂仲通曰今吾獨為上所厚茍無内援必為李林甫所危聞楊妃新得幸人未敢附之子能為我至長安與其家相結吾無患矣仲通曰仲通蜀人未嘗遊上國恐敗公事今為公更求得一人因言釗本末兼瓊引見釗儀觀甚偉言辭敏給兼瓊大喜即辟為推官往來浸親宻乃使人獻春綵於京師將别謂曰有少物在郫以具一日之糧子過可取之釗至郫兼瓊使親信大齎蜀貨精美者遺之可直萬緡釗大喜過望晝夜兼行至長安歴抵諸妹以蜀貨遺之曰此章仇公所贈也時中女新寡釗遂館於其室中分蜀貨以與之於是諸楊日夜譽兼瓊且言釗善樗蒲引之見上得隨供奉官出入禁中改金吾兵曹參軍九月癸未以郟郡太守江淮租庸轉運使韋堅為刑部尚書罷其諸使以御史中丞楊慎矜代之堅妻姜氏皎之女林甫之舅子也故林甫昵之及堅以通漕有寵於上遂有入相之志又與李適之善林甫由是惡之故遷以美官實奪之權也安祿山欲以邊功市寵數侵掠奚契丹奚契丹各殺公主以叛祿山討破之隴右節度使皇甫惟明與吐蕃戰於石堡城為虜所敗副將褚誗戰死冬十月甲午安祿山奏臣討契丹至北平郡夢先朝名將李靖李勣從臣求食遂命立廟又奏薦奠之日廟梁産芝丁酉上幸驪山温泉上以戸部郎中王鉷為戸口色役使敕賜百姓復除鉷奏徴其輦運之費廣張錢數又使市本郡輕貨百姓所輸乃甚於不復除舊制戍邊者免其租庸六嵗而更時邊將恥敗士卒死者皆不申牒貫籍不除王鉷志在聚斂以有籍無人者皆為避課按籍戍邊六嵗之外悉徴其租庸有併徴三十年者民無所訴上在位乆用度日侈後宫賞賜無節不欲數於左右藏取之鉷探知上指嵗貢額外錢帛百億萬貯於内庫以供宫中宴賜曰此皆不出於租庸調無預經費上以鉷為能富國益厚遇之鉷務為割剝以求媚中外嗟怨丙子以鉷為御史中丞京畿采訪使楊釗侍宴禁中專掌樗蒲文簿鉤校精宻上賞其彊明曰好度支郎諸楊數徴此言於上又以屬王鉷鉷因奏充判官十二月戊戌上還宫五載春正月乙丑以隴右節度使皇甫惟明兼河西節度使李適之性疎率李林甫嘗謂適之曰華山有金礦采之可以富國主上未之知也它日適之因奏事言之上以問林甫對曰臣久知之但華山陛下本命王氣所在鑿之非宜故不敢言上以林甫為愛已薄適之慮事不熟謂曰自今奏事宜先與林甫議之無得輕脱適之由是束手矣適之既失恩韋堅失權益相親宻林甫愈惡之初太子之立非林甫意林甫恐異日為己禍常有動搖東宫之志而堅又太子之妃兄也皇甫惟明嘗為忠王友時破吐蕃入獻捷見林甫專權意頗不平時因見上乗間微勸上去林甫林甫知之使楊慎矜宻伺其所為㑹正月望夜太子出遊與堅相見堅又與惟明㑹於景龍觀道士之室慎矜發其事以為堅戚里不應與邊將狎暱林甫因􅉲堅與惟明結謀欲共立太子堅惟明下獄林甫使慎矜與御史中丞王鉷京兆府法曹吉温共鞫之上亦疑堅與惟明有謀而不顯其罪癸酉下制責堅以干進不已貶縉雲太守惟明以離閒君臣貶播川太守仍别下制戒百官以王忠嗣為河西隴右節度使兼知朔方河東節度事忠嗣始在朔方河東每互市高估馬價諸胡聞之爭賣馬於唐忠嗣皆買之由是胡馬少唐兵益壯及徙隴右河西復請分朔方河東馬九千匹以實之其軍亦壯忠嗣杖四節控制萬里天下勁兵重鎮皆在掌握與吐蕃戰於青海積石皆大捷又討吐谷渾於墨離軍虜其全部而歸夏四月癸未立奚酋娑固為昭信王契丹酋楷洛為㳟仁王己亥制自今四孟月皆擇吉日祀天地九宫韋堅等既貶左相李適之懼自求散地庚寅以適之為太子少保罷政事其子衛尉少卿霅嘗盛饌召客客畏李林甫竟日無一人敢往者以門下侍郎崇􅀇館大學士陳希烈同平章事希烈宋州人以講老莊得進專用神仙符瑞取媚於上李林甫以希烈為上所愛且柔佞易制故引以為相凡政事一決於林甫希烈但給唯諾故事宰相午後六刻乃出林甫奏今太平無事巳時即還第軍國機務皆決於私家主書抱成案詣希烈書名而已五月壬子朔日有食之乙亥以劒南節度使章仇兼瓊為戸部尚書諸楊引之也秋七月丙辰敕流貶人多在道逗留自今左降官日馳十驛以上是後流貶者多不全矣楊貴妃方有寵每乗馬則高力士執轡授鞭織繡之工專供貴妃院者七百人中外爭獻服器珍玩嶺南經略使張九章廣陵長史王翼以所獻精美九章加三品翼入為戸部侍郎天下從風而靡民間歌之曰生男勿喜女勿悲君今看女作門楣妃欲得生荔支歲命嶺南馳驛致之比至長安色味不變至是妃以妬悍不遜上怒命送歸兄銛之第是日上不懌比日中猶未食左右動不稱㫖横被棰撻高力士欲嘗上意請悉載院中儲偫送貴妃凡百餘車上自分御膳以賜之及夜力士伏奏請迎貴妃歸院遂開禁門而入自是恩遇愈隆後官莫得進矣將作少匠韋蘭兵部員外郎韋芝為其兄堅訟寃且引太子為言上益怒太子懼表請與妃離昏乞不以親廢法丙子再貶堅江夏别駕蘭芝皆貶嶺南然上素知太子孝謹故譴怒不及李林甫因言堅與李適之等為朋黨後數日堅長流臨封適之貶宜春太守太常少卿韋斌貶巴陵太守嗣薛王琄貶夷陵别駕睢陽太守裴寛貶安陸别駕河南尹李齊物貶竟陵太守凡堅親黨連坐流貶者數十人斌安石之子琄業之子堅之甥也琄母亦令隨琄之官冬十月戊戌上幸驪山温泉十一月乙巳還宫賛善大夫杜有鄰女為太子良娣良娣之姊為左驍衛兵曹柳勣妻勣性狂疎好功名喜交結豪俊淄川太守裴敦復薦於北海太守李邕邕與之定交勣至京師與著作郎王曾等為友皆當時名士也勣與妻族不協欲䧟之為飛語告有鄰妄稱圖讖交構東宫指斥乗輿林甫令京兆士曹吉温與御史鞫之乃勣首謀也温令勣連引曾等入臺十二月甲戌有鄰勣及曾等皆杖死積尸大理妻子流遠方中外震慄嗣虢王巨貶義陽司馬巨邕之子也别遣監察御史羅希奭往桉李邕太子亦出良娣為庶人乙亥鄴郡太守王琚坐贓貶江華司馬琚性豪侈與李邕皆自謂耆舊久在外意怏怏李林甫惡其負材使氣故因事除之六載春正月辛巳李邕裴敦復皆杖死邕才藝出衆盧藏用常語之曰君如干將莫邪難與爭鋒然終虞缺折耳邕不能用林甫又奏分遣御史即貶所賜皇甫惟明韋堅兄弟等死羅希奭自青州如嶺南所過殺遷謫者郡縣惶駭排馬牒至宜春李適之憂懼仰藥自殺至江華王琚仰藥不死聞希奭已至即自縊希奭又过路過安陸欲怖殺裴寛寛向希奭叩頭祈生希奭不宿而過乃得免李適之子霅迎父喪至東京李林甫令人誣告霅杖死於河南府給事中房琯至與適之善貶宜春太守琯融之子也林甫恨韋堅不已遣使於循河及江淮州縣求堅罪所在收繫綱典船夫溢於牢獄徴剝逋負延及鄰伍皆裸露死於公府至林甫薨乃止丁亥上享太廟戊子合祭天地於南郊赦天下制免百姓今載田租又令除削絞斬條上慕好生之名故令應絞斬者皆重杖流嶺南其實有司率杖殺之又令天下為嫁母服三載上欲廣求天下之士命通一藝以上皆詣京師李林甫恐草野之士對䇿斥言其姦惡建言舉人多卑賤愚聵恐有俚言汚濁聖聽乃令郡縣長官精加試練灼然超絶者具名送省委尚書覆試御史中丞監之取名實相副者聞奏既而至者皆試以詩賦論遂無一人及第者林甫乃上表賀野無遺賢戊寅以范陽平盧節度使安祿山兼御史大夫祿山體充肥腹垂過膝嘗自稱重三百斤外若癡直內實狡黠常令其將劉駱谷留京師詗朝廷指趣動靜皆報之或應有牋表者駱谷即為代作通之歲獻俘虜雜畜奇禽異獸珍玩之物不絶於路郡縣疲於逓運祿山在上前應對敏給雜以詼諧上嘗戲指其腹曰此胡腹中何所有其大乃爾對曰更無餘物正有赤心耳上恱又嘗命見太子祿山不拜左右趣之拜祿山拱立曰臣胡人不習朝儀不知太子者何官上曰此儲君也朕千秋萬歲後代朕君汝者也祿山曰臣愚曏者惟知有陛下一人不知乃更有儲君不得已然後拜上以為信然益愛之上嘗宴勤政樓百官列坐樓下獨為祿山於御座東間設金雞障置榻使坐其前仍命卷簾以示榮寵命楊銛楊錡貴妃三姊皆與祿山叙兄弟祿山得出入禁中因請為貴妃兒上與貴妃共坐祿山先拜貴妃上問何故對曰胡人先母而後父上恱李林甫以王忠嗣功名日盛恐其入相忌之安祿山潛蓄異志託以禦寇築雄武城大貯兵器請忠嗣助役因欲留其兵忠嗣先期而往不見祿山而還數上言祿山必反林甫益惡之夏四月忠嗣固辭兼河東朔方節度許之冬十月己酉上幸驪山温泉改温泉宫曰華清宫河西隴右節度使王忠嗣以部將哥舒翰為大斗軍副使李光弼為河西兵馬使充赤水軍使翰父祖本突騎施别部酋長光弼契丹王楷洛之子也皆以勇略為忠嗣所重忠嗣使翰擊吐蕃有同列為之副倨慢不為用翰撾殺之軍中股慄累功至隴右節度副使每歲積石軍麥熟吐蕃輙來穫之無能禦者邊人謂之吐蕃麥莊翰先伏兵於其側虜至斷其後夾擊之無一人得返者自是不敢復來上欲使王忠嗣攻吐蕃石堡城忠嗣上言石堡險固吐蕃舉國守之今頓兵其下非殺數萬人不能克臣恐所得不如所亡不如且厲兵秣馬俟其有釁然後取之上意不快將軍董延光自請將兵取石堡城上命忠嗣分兵助之忠嗣不得已奉詔而不盡副延光所欲延光怨之李光弼言於忠嗣曰大夫以愛士卒之故不欲成延光之功雖廹於制書實奪其謀也何以知之今以數萬衆授之而不立重賞士卒安肯為之盡力乎然此天子意也彼無功必歸罪於大夫大夫軍府充牣何愛數萬段帛不以杜其䜛口乎忠嗣曰今以數萬之衆爭一城得之未足以制敵不得亦無害於國故忠嗣不欲為之忠嗣今受責天子不過以金吾羽林一將軍歸宿衛其次不過黔中上佐忠嗣豈以數萬人之命易一官乎李將軍子誠愛我矣然吾志決矣子勿復言光弼曰曏者恐為大夫之累故不敢不言今大夫能行古人之事非光弼所及也遂趨出延光過期不克言忠嗣沮撓軍計上怒李林甫因使濟陽别駕魏林告忠嗣嘗自言我幼養宫中與忠王相愛狎欲擁兵以尊奉太子敕徵忠嗣入朝委三司鞫之上聞哥舒翰名召見華清宫與語悦之十一月辛卯以翰判西平太守充隴右節度使以朔方節度使安思順判武威郡事充河西節度使戸部侍郎兼御史中丞楊慎矜為上所厚李林甫浸忌之慎矜與王鉷父晉中表兄弟也少與鉷狎鉷之入臺頗因慎矜推引及鉷遷中丞慎矜與語猶名之鉷自恃與林甫善意稍不平慎矜奪鉷職田鉷母本賤慎矜嘗以語人鉷深銜之慎矜猶以故意待之嘗與之私語讖書慎矜與術士史敬忠善敬忠言天下將亂勸慎矜於臨汝山中買莊為避亂之所㑹慎矜父墓田中草木皆流血慎矜惡之以問敬忠敬忠請禳之設道塲於後園慎矜退朝輒躶貫桎梏坐其中旬日血止慎矜德之慎矜有侍婢明珠色美敬忠屢目之慎矜即以遺敬忠車載過貴妃柳氏姊樓下姊邀敬忠上樓求車中美人敬忠不敢拒明日姊入宫以明珠自隨上見而異之問所從來明珠具以實對上以慎矜與術士為妖法惡之含怒未發楊釗以告鉷鉷心喜因侮慢慎矜慎矜怒林甫知鉷與慎矜有隙宻誘使圖之鉷乃遣人以飛語告慎矜隋􅌆帝孫與凶人往來家有讖書謀復祖業上大怒收愼矜繫獄命刑部大理與侍御史楊釗殿中侍御史盧􅉗同鞫之太府少卿張瑄慎矜所薦也盧鉉誣瑄嘗與愼矜論讖栲掠百端瑄不肯荅辨乃以木綴其足使人引其枷柄向前挽之身加長數尺腰細欲絶眼鼻出血瑄竟不荅又使吉温捕史敬忠於汝州敬忠與温父素善温之㓜也敬忠常抱撫之及捕獲温不與交言鎖其頸以布䝉首驅之馬前至戲水温使吏誘之曰楊慎矜已􅅃服惟須子一辨若解人意則生不然必死前至温湯則求首不獲矣敬忠顧謂温曰七郎求一紙温陽不應去温湯十餘里敬忠懇請哀切乃於桑下令荅三紙辯皆如温意温徐謂曰丈人且勿恠因起拜之至㑹昌始鞫愼矜以敬忠為證愼矜皆引服惟搜讖書不獲林甫危之使盧􅉗入長安搜愼矜家􅉗袖讖書入闇中詬而出曰逆賊深藏袐記至㑹昌以示慎矜歎曰吾不蓄讖書此何從在吾家哉吾應死而已丁酉賜愼矜及兄少府少監愼餘洛陽令愼名自盡敬忠杖百妻子皆流嶺南瑄杖六十流臨封死於㑹昌嗣虢王巨雖不預謀坐與敬忠相識解官南賔安置自餘連坐者數十人慎名聞敕神色不變為書别姊愼餘合掌指天而縊三司按王忠嗣上曰吾兒居深宮安得與外人通謀此必妄也但劾忠嗣沮撓軍功哥舒翰之入朝也或勸多齎金帛以救忠嗣翰曰若直道尚存王公必不冤死如其將喪多賂何為遂單囊而行三司奏忠嗣罪當死翰始遇知於上力陳忠嗣之冤且請以己官爵贖忠嗣罪上起入禁中翰叩頭隨之言與淚俱上感寤己亥貶忠嗣漢陽太守李林甫屢起大獄别置推事院於長安以楊釗有掖廷之親出入禁闥所言多聽乃引以為援擢為御史事有微涉東宫者皆指擿使之奏劾付羅希奭吉温鞫之釗因得逞其私志所擠䧟誅夷者數百家皆釗發之幸太子仁孝謹靜張垍高力士常保䕶於上前故林甫終不能間也十二月壬戌發馮翊華陰民夫築㑹昌城置百司王公各置第舍土畝直千金癸亥上還宫丙寅命百官閲天下歲貢物於尚書省既而悉以車載賜李林甫家上或時不視朝百司悉集林甫第門臺省為空陳希烈雖坐府無一人入謁者林甫子岫為將作監頗以滿盈為懼嘗從林甫遊後園指役夫言於林甫曰大人乆處鈞軸怨仇滿天下一朝禍至欲為此得乎林甫不樂曰勢已如此將若之何先是宰相皆以德度自處不事威勢騶從不過數人士民或不之避林甫自以多結怨常虞刺客出則步騎百餘人為左右翼金吾靜街前驅在數百步外公卿走避居則重闗複壁以石甃地牆中置板如防大敵一夕屢徙牀雖家人莫知其處宰相騶従之盛自林甫始初將軍高仙芝本高麗人從軍安西仙芝驍勇善騎射節度使夫䝉靈詧累薦至安西副都䕶都知兵馬使充四鎭節度副使吐蕃以女妻小勃律王及其旁二十餘國皆附吐蕃貢獻不入前後節度使討之皆不能克制以仙芝為行營節度使將萬騎討之自安西行百餘日乃至特勒滿川分軍為三道期以七月十三日㑹吐蕃連雲堡下有兵近萬人不意唐兵猝至大驚依山拒戰礮櫑如雨仙芝以郎將高陵李嗣業為陌刀將令之曰不及日中決須破虜嗣業執一旗引陌刀緣險先登力戰自辰至巳大破之斬首五千級捕虜千餘人餘皆逃潰中使邊令誠以入虜境已深懼不敢進仙芝乃使令誠以羸弱三千守其城復進三日至坦駒嶺下峻阪四十餘里前有阿弩越城仙芝恐士卒憚險不肯下先令人胡服詐為阿弩越守者迎降云阿弩越赤心歸唐娑夷水藤橋已斫斷矣娑夷即弱水也其水不能勝草芥藤橋者通吐蕃之路也仙芝陽喜士卒乃下又三日阿弩越城迎者果至明日仙芝入阿弩越城遣將軍席元慶將千騎前行謂曰小勃律聞大軍至其君臣百姓必走山谷弟呼出取繒帛稱敕賜之大臣至盡縛之以待我元慶如其言悉縛諸大臣王及吐蕃公主逃入石窟取不可得仙芝至斬其附吐蕃者大臣數人藤橋去城猶六十里仙芝急遣元慶往斫之甫畢吐蕃兵大至已無及矣籐橋闊盡一矢力修之朞年乃成八月仙芝虜小勃律王及吐蕃公主而還九月至連雲堡與邊令誠俱月末至播宻川遣使奏狀至河西夫䝉靈詧怒仙芝不先言已而遽發奏一不迎勞罵仙芝曰噉狗糞高麗奴汝官皆因誰得而不待我處分擅奏捷書高麗奴汝罪當斬但以汝新有功不忍耳仙芝但謝罪邊令誠奏仙芝深入萬里立奇功今旦夕憂死資治通鑑卷第二百一十五
