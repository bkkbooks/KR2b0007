front:
  text: 資治通鑑巻第二百五十五
  hash: sha256:21fd45ed22561261d1c1ba8fecf7a067dd6d9d945d7090573b6d0b8fc104ed89
body:
  text: 臣司馬光奉勑編集唐紀七十一逢執徐五月凡二年有竒起玄黓攝提格五月盡閼僖宗惠聖恭定孝皇帝中之下中和二年五月以湖南觀察使閔勗權充鎭南節度使勗屢求於湖南建節朝廷恐諸道觀察使效之不許先是王仙芝宼掠江西髙安人鍾傳聚蠻獠依山爲堡衆至萬人仙芝陷撫州而不能守傳入據之詔即以爲刺史至是又逐江西觀察使髙茂卿據洪州朝廷以勗本江西牙將故復置鎭南軍使勗領之若傳不受代令勗因而討之勗知朝廷意欲鬭二盜使相斃辭不行加淮南節度使髙駢兼侍中罷其鹽鐵轉運使駢既失兵柄又解利權攘袂大詬遣幕僚顧雲草表自訴言辭不遜其略曰是陛下不用㣲臣固非㣲臣有負陛下又曰姦臣未悟陛下猶迷不思宗廟之焚燒不痛園陵之開毁又曰王鐸僨軍之將崔安濳在蜀貪黷豈二儒士能戢彊兵又曰今之所用上至帥臣下及禆將以臣所料悉可坐擒又曰無使百代有抱恨之臣千古留刮席之恥臣但慮宼生東土劉氏復興即軹道之災豈獨徃日又曰今賢才在野憸人滿朝致陛下爲亡國之君此子等計將安出上命鄭畋草詔切責之其略曰綰利則牢盆在手主兵則都統當權直至京北京西神䇿諸鎭悉在指揮之下可知董制之權而又貴作司徒榮爲太尉以爲不用如何爲用乎又曰朕縁乆付卿兵柄不能翦蕩元凶自天長漏網過淮不出一兵襲逐奄殘京國首尾三年廣陵之師未離封部忠臣積望勇士興譏所以擢用元臣誅夷巨宼又曰從來倚仗之意一旦控告無門凝睇東南惟増悽惻又曰謝􅀇破苻堅於淝水裴度平元濟於淮西未必儒臣不如武將又謂宗廟焚燒園陵開毁􅀛玉毁櫝誰之過與又曰姦臣未悟之言何人肻認陛下猶迷之語朕不敢當又曰卿尚不能􅅞黄巢於天長安能坐擒諸將又曰卿云劉氏復興不知誰爲魁首比朕於劉􅀇子嬰何太誣罔又曰况天歩未傾皇綱尚整三靈不昧百度俱存君臣之禮儀上下之名分所宜遵守未可墮陵朕雖冲人安得輕侮駢臣節既虧自是貢賦遂絶以天平留後曹存實爲節度使黄巢攻興平興平諸軍退屯奉天加河陽節度使諸葛爽同平章事六月以涇原留後張鈞爲節度使荆南節度使叚彦謨與監軍朱敬玫相惡敬玫别選壯士三千人號忠勇軍自將之彦謨謀殺敬玫己亥敬玫先帥衆攻彦謨殺之以少尹李燧爲留後蜀人羅渾擎句胡僧羅夫子各聚衆數千人以應阡能楊行遷等與之戰數不利求益兵府中兵盡陳敬瑄悉搜倉庫門庭之卒以給之是月大戰於乾谿官軍大敗行遷等恐無功獲罪多執村民爲俘送府日數十百人敬瑄不問悉斬之其中亦有老弱及婦女觀者或問之皆曰我方治田績麻官軍忽入村係虜以來竟不知何罪秋七月乙巳以鍾傳爲江西觀察使從髙駢之請也傳既去撫州南城人危全諷復據之又遣其弟仔倡據信州尚讓攻宜君寨㑹大雪盈尺賊凍死者什二三蜀人韓求聚衆數千人應阡能鎭海節度使周寳奏髙駢承制以賊帥孫端爲宣歙觀察使詔寳與宣歙觀察使裴䖍餘􅀤兵拒之南詔上書請早降公主詔報以方議禮儀以保大留後東方逵爲節度使充京城東面行營招討使閏月加魏博節度使韓簡兼侍中八月以兵部侍郎判度支鄭紹業同平章事兼荆南節度使浙東觀察使劉漢宏遣弟漢宥及馬歩軍都虞候辛約將兵二萬營于西陵謀兼并浙西杭州刺史董昌遣都知兵馬使錢鏐拒之壬子鏐乘霧夜濟江襲其營大破之所殺殆盡漢宥辛約皆走魏博節度使韓􅂤亦有兼并之志自將兵三萬攻河陽敗諸葛爽於脩武爽弃城走簡留兵戍之因掠邢洺而還李國昌自達靼帥其族遷于代州黄巢所署同州防禦使朱温屢請益兵以扞河中知右軍事孟楷抑之不報温見巢兵勢日蹙知其將亡親將胡眞謝瞳勸温歸國九月丙戌温殺其監軍嚴實舉州降王重榮温以舅事重榮王鐸承制以温爲同華節度使使瞳奉表詣行在瞳福州人也李詳以重榮待温厚亦欲歸之爲監軍所告黄巢殺之以其弟思鄴爲華州刺史桂州軍亂逐節度使張從訓以前容管經略使崔焯爲嶺南西道節度使平盧大將王敬武逐節度使安師儒自爲留後初朝廷以龎勛降將湯羣爲嵐州刺史羣潜通沙陀朝廷疑之徙羣懐州刺史鄭從讜遣使齎告身授之冬十月庚子朔羣殺使者據城叛附于沙陀壬寅從讜遣馬歩都虞候張彦球將兵討之賊帥韓秀昇屈行從起兵斷峽江路癸丑陳敬瑄遣押牙莊夢蝶將二千人討之又遣押牙胡弘略將千人繼之韓簡復引兵擊鄆州節度使曹存實逆戰敗死天平都將下邑朱瑄収餘衆嬰城拒守簡攻之不下詔以瑄權知天平留後以朱温爲右金吾大將軍河中行營招討副使賜名全忠李克用雖累表請降而據忻代州數侵掠并汾爭樓煩監義武節度使王處存與克用世爲昬姻詔處存諭克用若誠心款附宜且歸朔州俟朝命若暴横如故當與河東大同共討之以平盧大將王敬武爲留後時諸道兵皆㑹關中討黄巢獨平盧不至王鐸遣都統判官諌議大夫張濬徃說之敬武已受黄巢官爵不出迎濬見敬武責之曰公爲天子藩臣侮慢詔使不能事上何以使下敬武愕然謝之既宣詔將士皆不應濬徐諭之曰人生當先曉逆順次知利害黄巢前日販鹽虜耳公等捨累葉天子而臣之果何利哉今天下勤王之師皆集京畿而淄青獨不至一旦賊平天子返正公等何面見天下之人乎不亟徃分功名取富貴後悔無及矣將士皆改容引咎顧謂敬武曰諌議之言是也敬武即􅀤兵從濬而西劉漢宏又遣登髙鎭將王鎭將兵七萬屯西陵錢鏐復夜濟江襲擊大破之斬獲萬計得漢宏補諸将官僞敕二百餘通鎭奔諸暨黄巢兵勢尚彊王重榮患之謂行營都監楊復光曰臣賊則負國討賊則力不足柰何復光曰雁門李僕射驍勇有彊兵其家尊與吾先人嘗共事相善彼亦有徇國之志所以不至者以與河東結隙耳誠以朝㫖諭鄭公而召之必來來則賊不足平矣東面宣慰使王徽亦以爲然時王鐸在河中乃以墨敕召李克用諭鄭從讜十一月克用将沙陀萬七千自嵐石路趣河中不敢入太原境獨與數百騎過晉陽城下與從讜别從讜以名馬器幣贈之李詳舊卒共逐黄思鄴推華隂鎭使王遇爲主以華州降于王重榮王鐸承制以遇爲刺史阡能黨愈熾侵淫入蜀州境陳敬瑄以楊行遷等久無功以押牙髙仁厚爲都招討指揮使将兵五百人往代之未發前一日有鬻麵者自旦至午出入營中數四邏者疑之執而訊之果阡能之諜也仁厚命釋􅅞温言問之對曰某村民阡能囚其父母妻子於獄云汝詗事歸得實則免汝家不然盡死某非願爾也仁厚曰誠知汝如是我何忍殺汝今縱汝歸救汝父母妻子但語阡能云髙尚書來日發所将止五百人無多兵也然我活汝一家汝當爲我潜語寨中人云僕射愍汝曹皆良人爲賊所制情非得已尚書欲拯救湔洗汝曹尚書來汝曹各投兵迎降尚書當使人書汝背爲歸順字遣汝復舊業所欲誅者阡能羅渾擎句胡僧羅夫子韓求五人耳必不使横及百姓也諜曰此皆百姓心上事尚書盡知而赦之其誰不舞躍聴命一口傳百百傳千川騰海沸不可遏也比尚書之至百姓必盡奔赴如嬰兒之見慈母阡能孤居立成擒矣遂遣之明日仁厚引兵􅀤至雙流把截使白文現出迎仁厚周視塹柵怒曰阡能役夫其衆皆耕民耳竭一府之兵歳餘不能擒今觀塹柵重􅃨牢密如此宜其可以安眠飽食養寇邀功也命引出斬之監軍力救久之乃得免命悉平塹柵纔留五百兵守之餘兵悉以自隨又召諸寨兵相繼皆集阡能聞仁厚将至遣羅渾擎立五寨於雙流之西伏兵千人於野橋箐以邀官軍仁厚詗知引兵圍之下令勿殺遣人釋戎服入賊中告諭如昨日所以語諜者賊大喜呼譟爭弃甲投兵請降拜如摧山仁厚悉撫諭書其背使歸語寨中未降者寨中餘衆爭出降渾擎狼狽踰塹走其衆執以詣仁厚仁厚曰此愚夫不足與語械以送府悉命焚五寨及其甲兵惟留旗幟所降凡四千人明旦仁厚謂降者曰始欲即遣汝歸而前塗諸寨百姓未知吾心或有憂疑藉汝曹爲我前行過穿口新津寨下示以背字告諭之比至延貢可歸矣乃取渾擎旗倒繫之毎五十人爲隊授以一旗使前走􅀭旗疾呼曰羅渾擎已生擒送使府大軍行至汝曹居寨中者速如我出降立得爲良人無事矣至穿口句胡僧置十一寨寨中人爭出降胡僧大驚拔劒遏之衆投瓦石撃之共擒以獻仁厚其衆五千餘人皆降又明旦焚寨使降者執旗先驅一如雙流至新津韓求置十三寨皆迎降求自投深塹其衆鉤出之已死斬首以獻将士欲焚寨仁厚止之曰降人皆未食使先運出資糧然後焚之新降者競炊爨與先降來告者共食之語笑歌吹終夜不絶明日仁厚縱雙流穿口降者先歸使新津降者執旗先驅且曰入卭州境亦可散歸矣羅夫子置九寨於延貢其衆前夕望新津火光已不眠矣及新津人至羅夫子脱身弃寨奔阡能其衆皆降明日羅夫子至阡能寨與之謀悉衆決戰計未定日向暮延貢降者至阡能羅夫子走馬巡寨欲出兵衆皆不應仁厚引兵連夜逼之明旦諸寨知大軍已近呼譟爭出執阡能阡能窘急赴井爲衆所擒不死又執羅夫子羅夫子自剄衆挈羅夫子首􅅞阡能驅之前迎官軍見仁厚擁馬首大呼泣拜曰百姓負􅁈日久無所控訴自諜者還百姓引領度頃刻如朞年今遇尚書如出九泉睹白日已死而復生矣讙呼不可止賊寨在它所者分遣諸将往降之仁厚出軍凡六日五賊皆平每下縣鎭輙補鎭遏使使安集户口於是陳敬瑄梟韓求羅夫子首於市釘阡能羅渾擎句胡僧於城西七日而咼之阡能孔目官張榮本安仁進士屢舉不中第歸於阡能爲之謀主爲草書檄阡能敗以詩啓求哀於仁厚仁厚送府釘於馬市自餘不戮一人十二月以仁厚爲眉州防禦使陳敬瑄牓卭州凡阡能等親黨皆不問未㡬卭州刺史申捕獲阡能叔父行全家三十五人繫獄請準法敬瑄以問孔目官唐溪對曰公已有牓令勿問而刺史復捕之此必有故今若殺之豈惟使明公失大信竊恐阡能之黨紛紛復起矣敬瑄從之遣押牙牛暈往集衆於州門破械而釋之因詢其所以然果行全有良田刺史欲買之不與故恨之敬瑄召刺史将按其罪刺史以憂死它日行全聞其家由唐溪以免宻餉溪蝕箔金百兩溪怒曰此乃太師仁明何預吾事汝乃懷禍相餉乎還其金斥逐使去河東節度使鄭從讜奏克嵐州執湯羣斬之以忻代等州留後李克用爲鴈門節度使初朝廷以鄭紹業爲荆南節度使時段彦謨方據荆南紹業憚之踰半歳乃至鎭上幸蜀召紹業還以彦謨爲節度使彦謨爲朱敬玫所殺復以紹業爲節度使紹業畏敬玫逗遛不進軍中久無帥至是敬玫署押牙陳儒知府事儒江陵人也加奉天節度使齊克儉河中節度使王重榮並同平章事李克用将兵四萬至河中遣從父弟克脩先将兵五百濟河嘗賊初克用弟克讓爲南山寺僧所殺其僕渾進通歸于黄巢自髙潯之敗諸軍皆畏賊莫敢進及克用軍至賊憚之曰鵶軍至矣當避其鋒克用皆衣黑故謂之鵶軍巢乃捕南山寺僧十餘人遣使齎詔書及重賂因渾進通詣克用以求和克用殺僧哭克讓受其賂以分諸将焚其詔書歸其使者引兵自夏陽度河軍于同州孟方立既殺成麟引兵歸邢州潞人請監軍吳全勗知留後是歳王鐸墨制以方立知邢州事方立不受囚全勗與鐸書願得儒臣鎭潞州鐸以鄭昌圖知昭義軍事既而朝廷以右僕射租庸使王徽同平章事充昭義節度使徽以車駕播遷中原方擾方立專據山東邢洺磁三州度朝廷力未能制辭不行請且委昌圖詔以徽爲大明宮留守京畿安撫制置修奉園陵使昌圖至潞州不三月而去方立遂遷昭義軍於邢州自稱留後表其将李殷鋭爲潞州刺史和州刺史秦彦使其子将兵數千襲宣州逐觀察使竇潏而代之三年春正月李克用將李存貞敗黄揆于沙􅁐己巳克用進屯沙􅁐揆巢之弟也王鐸承制以克用爲東北面行營都統以楊復光爲東面都統監軍使陳景思爲北面都統監軍使乙亥制以中書令充諸道行營都統王鐸爲義成節度使令赴鎭田令孜欲歸重北司稱鐸討黄巢乆無功卒用楊復光䇿召沙陀而破之故罷鐸兵柄以恱復光又以副都統崔安潜爲東都留守以都都監西門思恭爲右神䇿中尉充諸道租庸兼催促諸道進軍等使令孜自以建議幸蜀収傳國寳列聖眞容散家財犒軍爲己功令宰相藩鎭共請加賞上以令孜爲十軍兼十二衛觀軍容使成徳節度使常山忠穆王王景崇薨軍中立其子節度副使鎔知留後事時鎔生十年矣以天平留後朱瑄爲節度使二月壬子李克用進軍乾阬與河中易定忠武軍合尚讓等将十五萬衆屯于梁田陂明日大戰自午至晡賊衆大敗俘斬數萬伏尸三十里巢将王璠黄揆襲華州據之王遇亡去初光州刺史李罕之爲秦宗權所攻弃州奔項城餘衆歸諸葛爽爽以爲懷州刺史韓􅂤攻鄆州半年不能下爽復襲取河陽朱瑄請和簡乃捨之引兵擊河陽爽遣罕之逆戰於武陟魏軍大敗而還大将澶州刺史樂行達先歸據魏州軍中共立行達爲留後簡爲部下所殺己未以行達爲魏博留後甲子李克用進圍華州黄思鄴黄揆嬰城固守克用分騎屯渭北以王鎔爲成徳留後以鄭紹業爲太子賓客分司以陳儒爲荆南留後峽路招討指揮使荘夢蝶爲韓秀昇屈行從所敗退保忠州應援使胡􅀪略戰亦不利江淮貢賦皆爲賊所阻百官無俸雲安淯井路不通民閒乏鹽陳敬瑄奏以眉州防禦使髙仁厚爲西川行軍司馬将三千兵討之加鳯翔節度使李昌言同平章事黄巢兵數敗食復盡隂爲遁計􅀤兵三萬搤藍田道三月壬申遣尚讓将兵救華州李克用王重榮引兵逆戰於零口破之克用進軍渭橋騎軍在渭北克用每夜令其将薛志勤康君立潜入長安燔積聚斬虜而還賊中大驚以淮南押牙合肥楊行愍爲廬州刺史行愍本廬州牙将勇敢屢有戰功都将忌之白刺史郎幼復連使出戍於外行愍過辭都将以甘言悦之問其所須行愍曰正須汝頭耳遂起斬之并将諸營自稱八營都知兵馬使幼復不能制薦於髙駢請以自代駢以行愍爲淮南押牙知廬州事朝廷因而命之行愍聞州人王勗賢召欲用之固辭問其子弟曰子潜好學慎宻可任以事弟子稔有氣節可爲将行愍召潜置門下以稔及定逺人季章爲騎将初呂用之因左驍雄軍使俞公楚得見髙駢用之横甚或以咎公楚公楚數戒用之少自斂無相累用之衘之右驍雄軍使姚歸禮氣直敢言尤疾用之所爲時面數其罪常欲手刃之癸未夜用之與其黨㑹倡家歸禮潜遣人􅅡其室殺貌類者數人用之易服得免明旦窮治其事獲縱火者皆驍雄之卒用之於是日夜譛二将於駢未㡬駢使二将将驍雄卒三千襲賊於慎縣用之宻以語楊行愍云公楚歸禮欲襲廬州行愍􅀤兵掩之二将不爲備舉軍盡殪以二将謀亂告駢駢不知用之謀厚賞行愍己丑以河中行營招討副使朱全忠爲宣武節度使俟克復長安令赴鎮癸巳李克用等拔華州黄揆弃城走劉漢宏分兵屯黄嶺巖下貞女三鎭錢鏐將八都兵自富春擊之破黄嶺擒巖下鎭将史弁貞女鎭将楊元宗漢宏以精兵屯諸暨鏐又擊破之漢宏走荘夢蝶與韓秀昇屈行從戰又敗其敗兵紛紜還走所在慰諭不可遏遇髙仁厚於路叱之即止仁厚斬都虞候一人更令修娖部伍乃召耆老詢以山川蹊徑及賊寨所據喜曰賊精兵盡在舟中使老弱守寨資糧皆在寨中此所謂重戰輕防其敗必矣乃􅀭兵江上爲欲涉之状賊晝夜禦備遣兵挑戰仁厚不與交兵潜􅀤勇士千人執兵負藁夜由閒道攻其寨且焚之賊望見分兵往救之不及資糧蕩盡衆心已搖仁厚復募善游者鑿其舟底相繼皆沈賊往來惶惑不能相救仁厚遣兵於要路邀擊且招之賊衆皆降秀昇行從見衆潰揮劔亂斫欲止之衆愈怒共執二人詣仁厚仁厚詰之曰何故反秀昇曰自大中皇帝晏駕天下無復公道紐解綱絶今日反者豈惟秀昇成是敗非机上之肉惟所烹醢耳仁厚愀然命善食而械之夏四月庚子獻于行在斬之李克用與忠武将龐從河中将白志遷等引兵先進與黄巢軍戰於渭南一日三戰皆捷義成義武等諸軍繼之賊衆大奔甲辰克用等自光泰門入京師黄巢力戰不勝焚宮室遁去賊死及降者甚衆官軍暴掠無異於賊長安室屋及民所存無㡬巢自藍田入商山多遺珍寳於路官軍爭取之不急追賊遂逸去楊復光遣使告捷百官入賀詔留忠武等軍二萬人委大明宮留守王徽及京畿制置使田從異部分守衛長安五月加朱玫克用東方逵同平章事升陜州爲節度以王重盈爲節度使又建延州爲保塞軍以保大行軍司馬延州刺史李孝恭爲節度使克用時年二十八於諸将最少而破黄巢復長安功第一兵勢最彊諸将皆畏之克用一目微眇時人謂之獨眼龍詔以崔璆家貴身顯爲黄巢相首尾三載不逃不隱於所在斬之黄巢使其驍将孟楷将萬人爲前鋒擊蔡州節度使秦宗權逆戰而敗賊進攻其城宗權遂稱臣於巢與之連兵初巢在長安陳州刺史宛丘趙犨謂將佐曰巢不死長安必東走陳其衝也且巢素與忠武爲仇不可不爲之備乃完城塹繕甲兵積芻粟六十里之内民有資糧者悉徙之入城多募勇士使其弟昶珝子麓林分将之孟楷既下蔡州移兵擊陳軍于項城犨先示之弱伺其無僃襲擊之殺獲殆盡生擒楷斬之巢聞楷死驚怒悉衆屯溵水六月與秦宗權合兵圍陳州掘塹五重百道攻之陳人大恐犨諭之曰忠武素著義勇陳州號爲勁兵况吾家乆食陳禄誓與此州存亡男子當求生於死中且狥國而死不愈於臣賊而生乎有異議者斬數引鋭兵開門出撃賊破之巢益怒營於州北立宫室百司爲持乆之計時民閒無積聚賊掠人爲糧生投於碓磑并骨食之號給糧之處曰舂磨寨縱兵四掠自河南許汝唐鄧孟鄭汴曹濮徐兖等數十州咸􅀍其毒初上蔡人劉謙爲嶺南小校節度使韋宙竒其器以兄女妻之謙擊羣盜屢有功辛丑以謙爲封州刺史加東川節度使楊師立同平章事宣武節度使朱全忠帥所部數百人赴鎭秋七月丁卯至汴州時汴宋荐饑公私窮竭内外驕軍難制外爲大敵所攻無日不戰衆心危懼而全忠勇氣益振詔以黄巢未平加全忠東北面都招討使南詔遣布爕楊竒肱來迎公主詔陳敬瑄與書辭以鑾輿巡幸儀物未備俟還京邑然後出降竒肱不從直前至成都李克用自長安引兵還鴈門尋有詔以克用爲河東節度使召鄭從讜詣行在克用乃自東道過榆次詣鴈門省其父克用尋牓河東安慰軍民曰勿爲舊念各安家業左驍衛上將軍楊復光卒于河中復光慷慨喜忠義善撫士卒軍中慟哭累日八都将鹿宴􅀪等各以其衆散去田令孜素畏忌之聞其卒甚喜因擯斥其兄樞宻使復恭爲飛龍使令孜專權人莫與之抗惟復恭數與之爭得失故令孜惡之復恭因稱疾歸藍田以成徳留後王鎔魏博留後樂行達天平留後朱瑄爲本道節度使司徒門下侍郎同平章事鄭畋雖當播越猶謹法度田令孜爲判官吳圓求郎官畋不許陳敬瑄欲立於宰相之上畋以故事使相品秩雖髙皆居眞相之下固爭之二人乃令鳯翔節度使李昌言上言軍情猜忌不可令畋扈從過此畋亦累表辭位乃罷爲太子太保又以其子兵部侍郎凝績爲彭州刺史使之就飬以兵部尚書判度支裴澈爲中書侍郎同平章事八月甲辰李克用至晉陽詔以前振武節度使李國昌爲代北節度使鎭代州升湖南爲欽化軍以觀察使閔勗爲節度使九月加陳敬瑄兼中書令進爵潁川郡王感化節度使時􅄎營於溵水加􅄎東面兵馬都統以荆南留後陳儒爲節度使昭義節度使孟方立以潞州地險人勁屢簒主帥欲漸弱之乃遷治所於邢州大將家及富室皆徙山東潞人不悦監軍祁審誨因人心不安使武鄉鎭使安居受潜以蠟丸乞師於李克用請復軍府於潞州冬十月克用遣其將賀公雅等赴之爲方立所敗又遣李克修擊之辛亥取潞州殺其刺史李殷鋭是後克用毎歳出兵爭山東三州之人半爲俘馘野無稼穡矣以宗女爲安化長公主妻南詔劉漢宏将十餘萬衆出西陵将擊董昌戊午錢鏐濟江逆戰大破之漢宏易服持鱠刀而遁己未漢宏収餘衆四萬復戰鏐又破之斬其弟漢容及将辛約十一月甲子朔秦宗權圍許州忠武大将鹿晏􅀪帥所部自河中南掠襄鄧金洋所過屠滅聲云西赴行在十二月至興元逐節度使牛勗勗奔龍州西山晏􅀪據興元自稱留後武寧節度使時􅄎因食中毒疑判官李凝古而殺之凝古父損爲右散騎常侍在成都􅄎奏凝古與父同謀田令孜受溥賂令御史臺鞫之侍御史王華爲損論寃令孜矯詔移損下神策獄華拒而不遣蕭遘奏稱李凝古行毒事出曖昧已爲溥所殺父損相别數年聲問不通安得誣以同謀溥恃功亂法陵蔑朝廷欲殺天子侍臣若徇其欲行及臣輩朝廷何以自立由是損得免死歸田里時令孜專權羣臣莫敢迕視惟遘屢與爭辯朝廷倚之升浙東爲義勝軍以劉漢宏爲節度使趙犨遣人間道求救於鄰道於是周岌時􅄎朱全忠皆引兵救之全忠與黄巢之黨戰於鹿邑敗之斬首二千餘級遂引兵入毫州而據之四年春正月以鹿晏􅀪爲興元留後賜魏博節度使樂行達名彦禎東川節度使楊師立以陳敬瑄兄弟權寵之盛心不能平敬瑄之遣髙仁厚討韓秀昇也語之曰成功而還當奏天子以東川相賞師立聞之怒曰彼此列藩而遽以我彊土許人是無天地也田令孜恐其爲亂因其不發兵防遏徴師立爲右僕射黄巢兵尚彊周岌時􅄎朱全忠不能支共求救於河東節度使李克用二月克用将蕃漢兵五萬出天井􅀜河陽節度使諸葛爽辭以河橋不完屯兵萬善以拒之克用乃還兵自陜河中度河而東楊師立得詔書怒不受代殺官告使及監軍使舉兵以討陳敬瑄爲名大将有諫者􅂺殺之進屯涪城遣其将郝蠲襲綿州不克丙午以陳敬瑄爲西川東川山東西道都指揮招討安撫處置等使三月甲子楊師立移檄行在百官及諸道将吏士庻數陳敬瑄十罪自言集本道将士八州壇丁共十五萬人長驅問罪詔削師立官爵以眉州防禦使髙仁厚爲東川留後将兵五千討之以西川押牙楊茂言爲行軍副使朱全忠撃黄巢瓦子寨拔之巢將陜人李唐賔楚丘王䖍裕降于全忠㜈州人王鎭執刺史黄碣降于錢鏐劉漢宏遣其將婁賚殺鎭而代之浦陽鎭将蒋瓌召鏐兵共攻婺州擒賚而還碣閔人也髙駢從子左驍衞大将軍澞䟽吕用之罪状二十餘幅密以呈駢且泣曰用之內則假神仙之說蠱惑尊聽外則盜節制之權殘賊百姓将佐懼死莫之敢言歳月浸深羽翼将成苟不除之恐髙氏弈代勲庸一朝掃地矣因嗚咽不自勝駢曰汝醉邪命扶出明日以澞状示用之用之曰四十郎嘗以空乏見告未獲遵命故有此憾因出澞手書數幅呈之駢甚慙遂禁澞出入後月餘以澞知舒州事羣盜陳儒攻舒州澞求救於廬州楊行愍力不能救謀於其将李神福神福請不用寸刃而逐之乃多齎旗幟閒道入舒州頃之引舒州兵建廬州旗幟而出指畫地形若布大陳状賊懼宵遁神福洺州人也久之羣盜吳逈李本復攻舒州澞不能守弃城走駢使人就殺之楊行愍遣其将合肥陶雅清流張訓等将兵擊吳逈李本擒斬之以雅攝舒州刺史秦宗權遣其弟将兵寇廬州據舒城楊行愍遣其将合肥田頵擊走之前杭州刺史路審中客居黄州聞鄂州刺史崔紹卒募兵三千人入據之武昌牙将杜洪亦逐岳州刺史而代之黄巢圍陳州㡬三百日趙犨兄弟與之大小數百戰雖兵食将盡而衆心益固李克用㑹許汴徐兖之軍于陳州時尚讓屯太康夏四月癸巳諸軍進拔太康黄思鄴屯西華諸軍復攻之思鄴走黄巢聞之懼退軍故陽里陳州圍始解朱全忠黄巢将至引軍還大梁五月癸亥大雨平地三尺黄巢營爲水所漂且聞李克用至遂引兵東北趣汴州屠尉氏尚讓以驍騎五千進逼大梁至于繁臺宣武将豐人朱珍南華龐師古撃却之全忠復告急於李克用丙寅克用與忠武都監使田從異􅀤許州戊辰追及黄巢於中牟北王滿渡乘其半濟奮撃大破之殺萬餘人賊遂潰尚讓帥其衆降時􅄎别将臨晉李讜曲周霍存甄城葛從周􅁈句張歸霸及從弟歸厚帥其衆降朱全忠巢踰汴而北己巳克用追擊之於封丘又破之庚午夜復大雨賊驚懼東走克用追之過胙城匡城巢収餘衆近千人東奔兖州辛未克用追至􅁈句騎能屬者纔數百人晝夜行二百餘里人馬疲乏糧盡乃還汴州欲裹糧復追之獲巢㓜子及乘輿器服符印得所掠男女萬人悉縱遣之癸酉髙仁厚屯徳陽楊師立遣其将鄭君雄張士安據鹿頭關以拒之甲戌李克用至汴州營於城外朱全忠固請入城館於上源驛全忠就置酒聲樂饌具皆精豐禮貌甚恭克用乘酒使氣語頗侵之全忠不平薄暮罷酒從者皆霑醉宣武将楊彦洪宻與全忠謀連車樹柵以塞衢路􅀤兵圍驛而攻之呼聲動地克用醉不之聞親兵薛志勤史敬思等十餘人格闘侍者郭景銖滅燭扶克用匿牀下以水沃其面徐告以難克用始張目援弓而起志勤射汴人死者數十須㬰煙火四合㑹大雨震電天地晦㝠志勤扶克用帥左右數人踰垣突圍乘電光而行汴人扼橋力戰得度史敬思爲後拒戰死克用登尉氏門縋城得出監軍陳景思等三百餘人皆爲汴人所殺楊彦洪謂全忠曰胡人急則乘馬見乘馬者則射之是夕彦洪乘馬適在全忠前全忠射之殪克用妻劉氏多智略左右先脱歸者以汴人爲變告劉氏神色不動立斬之隂召大将約束謀保軍以還比明克用至欲勒兵攻全忠劉氏曰公比爲國討賊救東諸矦之急今汴人不道乃謀害公自當訴之朝廷若擅舉兵相攻則天下孰能辨其曲直且彼得以有辭矣克用從之引兵去但移書責全忠全忠復書曰前夕之變僕不之知朝廷自遣使者與楊彦洪爲謀彦洪既伏其辜惟公諒察克用養子嗣源年十七從克用自上源出矢石之間獨無所傷嗣源本胡人名邈佶烈無姓克用擇軍中驍勇者多養爲子名回鶻張政之子曰存信振武孫重進曰存進許州王賢曰存賢安敬思曰存孝皆冒姓李氏丙子克用至許州故寨求糧於周岌岌辭以糧乏乃自陜濟河還晉陽鄭君雄張士安堅壁不出髙仁厚曰攻之則彼利我傷圍之則彼困我逸遂列十二寨圍之丁丑夜二鼔君雄等出勁兵掩撃城北副使寨楊茂言不能禦帥衆弃寨走其旁數寨見副使走亦走東川人併兵南攻中軍仁厚聞之大開寨門設炬火照之自帥士卒爲兩翼伏道左右賊至見門開不敢入還去仁厚發伏撃之東川兵大奔追至城下蹙之壕中斬獲甚衆而還仁厚念諸弃寨走者明旦所當誅殺甚多乃密召孔目官張韶諭之曰爾速遣步探子将數十人分道追走者自以爾意諭之曰僕射幸不出寨皆不知汝曹速歸來旦牙參如常勿憂也韶素名長者衆信之至四鼓皆還寨惟楊茂言走至張把乃追及之仁厚聞諸寨漏鼓如故喜曰悉歸矣詰旦諸将牙集以爲仁厚誠不知也坐良久仁厚謂茂言曰昨夜聞副使身先士卒走至張把有諸對曰昨夜聞賊攻中軍左右言僕射已去遂策馬參隨既而審其虛復還寨中仁厚曰仁厚與副使俱受命天子将兵討賊若仁厚先走副使當叱下馬行軍法代總軍事然後奏聞今副使既先走又爲欺罔理當何如茂言拱手曰當死仁厚曰然命左右扶下斬之諸将股栗仁厚乃召昨夜所獲俘虜數十人釋縛縱歸君雄等聞之懼曰彼軍法嚴整如是自今兵不可復出矣庚辰時溥遣其将李師悦将兵萬人追黄巢癸未髙仁厚陳於鹿頭􅀜城下鄭君雄等悉衆出戰仁厚設伏於陳後陽敗走君雄等追之伏􅀤君雄等大敗是夕遁歸梓州陳敬瑄􅀤兵三千以益仁厚軍進圍梓州資治通鑑巻二百五十五
