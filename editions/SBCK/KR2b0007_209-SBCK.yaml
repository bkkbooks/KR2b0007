front:
  text: 資治通鑑卷第二百九
  hash: sha256:e1347de17fa594fac753ab21b8cd867c09d6ad29c0acc06768fbb89428a45f85
body:
  text: 臣司馬光奉勑編集唐紀二十五茂七月凡二年有竒起著雍涒灘盡上章閹中宗大和大聖大昭孝皇帝下景龍二年春二月庚寅宫中言皇后衣笥裙上有五色雲起上令圖以示百官韋巨源請布之天下從之仍赦天下迦葉志忠奏昔神堯皇帝未受命天下歌桃李子文武皇帝未受命天下歌秦王破陣樂天皇大帝未受命天下歌堂堂則天皇后未受命天下歌娬媚娘應天皇帝未受命天下歌英王石州順天皇后未受命天下歌桑條韋蓋天意以順天皇后宜爲國母主􅁞桑之事謹上桑韋歌十二篇請編之樂府皇后祀先􅁞則奏之太常卿鄭愔又引而申之上恱皆受厚賞右補闕趙延禧上言周唐一統符命同歸故髙宗封陛下爲周王則天時唐同泰獻洛水圖孔子曰其或繼周者雖百代可知也陛下繼則天子孫當百代王天下上恱擢延禧爲諫議大夫丁亥蕭至忠上䟽以爲恩倖者止可富之金帛食以粱肉不可以公器爲私用今列位已廣冗貟倍之干求未厭日月增數陛下降不貲之澤近戚有無涯之請賣官利已鬻法徇私臺寺之内朱紫盈滿忽事則不存職務恃勢則公違憲章徒忝官曹無益時政上雖嘉其意竟不能用三月丙辰朔方道大揔管張仁愿築三受降城於河上初朔方軍與突厥以河爲境河北有拂雲祠突厥將入寇必先詣祠祈禱牧馬料兵而後度河時黙啜悉衆西擊突􅀐施仁愿請乗虚奪取漠南地於河北築三受降城首尾相應以絶其南寇之路太子少師唐休暻以爲兩漢以來皆北阻大河今築城寇境恐勞人費功終爲虜有仁愿固請不已上竟從之仁愿表留嵗滿鎭兵以助其功咸陽兵二百餘人逃歸仁愿悉擒之斬於城下軍中股慄六旬而成以拂雲祠爲中城距東西兩城各四百餘里皆據津要拓地三百餘里於牛頭朝那山北置烽候千八百所以左玉鈐衞將軍論弓仁爲朔方軍前鋒遊弈使戍諾眞水爲邏衞自是突厥不敢度山畋牧朔方無復寇掠減鎮兵數萬人仁愿建三城不置壅門及僃守之具或問之仁愿曰兵貴進取不利退守寇至此當併力出戰回首望城者猶應斬之安用守僃生其退恧之心也其後常元楷爲朔方軍揔管始築壅門人是以重仁愿而輕元楷夏四月癸未置修文館大學士四貟直學士八貟學士十二貟選公卿以下善爲文者李嶠等爲之每遊幸禁􅁐或宗戚宴集學士無不畢從賦詩屬和使上官昭容第其甲乙優者賜金帛同預宴者惟中書門下及長參王公親貴數人而已至大宴方召八座九列諸司五品以上預焉於是天下靡然爭以文華相尚儒學忠讜之士莫得進矣秋七月癸巳以左屯衞大將軍朔方道大揔管張仁愿同中書門下三品甲午清源尉吕元泰上䟽以為邊境未寧鎮戍不息士卒困苦轉輸疲弊而營建佛寺日廣月滋勞人費財無有窮極昔黄帝堯舜禹湯文武惟以儉約仁義立徳垂名晉宋以降塔廟競起而䘮亂相繼由是好尚失所奢靡相髙人不堪命故也伏願回營造之資充疆􅂣之費使烽燧永息羣生富庶則如來慈悲之施平等之心孰過於此䟽奏不省安樂長寧公主及皇后妹郕國夫人上官婕妤婕妤母沛國夫人鄭氏尚宫柴氏賀婁氏女巫第五英兒隴西夫人趙氏皆依勢用事請謁受賕雖屠沽臧獲用錢三十萬則别降墨敕除官斜封付中書時人謂之斜封官錢三萬則度爲僧尼其貟外同正試攝檢校判知官凡數千人西京東都各置兩吏部侍郎爲四銓選者嵗數萬人上官婕妤及後宫多立外第出入無節朝士往往從之遊處以求進逹安樂公主尤驕横宰相以下多出其門與長寧公主競起第舍以侈麗相髙擬於宫掖而精巧過之安樂公主請昆明池上以百姓蒲魚所資不許公主不恱乃更奪民田作定昆池延袤數里累石象華山引水象天津欲以勝昆明故名定昆安樂有織成裙直錢一億花卉鳥獸皆如粟粒正視旁視日中影中各為一色上好擊毬由是風俗相尚駙馬武崇訓楊慎交灑油以築毬􅂣慎交㳟仁曾孫也上及皇后公主多營佛寺左拾遺京兆辛替否上䟽諫略曰臣聞古之建官貟不必僃士有完行家有廉節朝廷有餘俸百姓有餘食伏惟陛下百倍行賞十倍增官金銀不供其印束帛不充於錫遂使富商豪賈盡居纓冕之流鬻伎行巫或渉膏􅃾之地又曰公主陛下之愛女然而用不合於古義行不根於人心將恐變愛成憎翻福爲禍何者竭人之力費人之財奪人之家愛數子而取三怨使邊疆之士不盡力朝廷之士不盡忠人之散矣獨持所愛何所恃乎君以人爲本本固則􅀖寧􅀖寧則陛下之夫婦母子長相保也又曰若以造寺必爲理體養人不足經􅀖則殷周以往皆暗亂漢魏已降皆聖明殷周已往為不長漢魏已降爲不短矣陛下緩其所急急其所緩親未來而踈見在失真實而冀虚無重俗人之為輕天子之業雖以隂陽爲炭萬物爲銅役不食之人使不衣之士猶尚不給況資於天生地養風動雨潤而後得之乎一旦風塵再擾霜雹荐臻沙彌不可操干戈寺塔不足攘飢饉臣竊惜之䟽奏不省時斜封官皆不由兩省而授兩省莫敢執奏即宣示所司吏部貟外郎李朝隠前後執破一千四百餘人怨謗紛然朝隠一無所顧冬十月己酉修文館直學士起居舍人武平一上表請抑損外戚􅁠寵不敢斥言韋氏但請抑損己家上優制不許平一名甄以字行載徳之子也十一月庚申突騎施酋長娑葛自立為可汗殺唐使者御史中丞馮嘉賓遣其弟遮努等帥衆犯塞初娑葛既代烏質勒綂衆父時故將闕啜忠節不服數相攻擊忠節衆弱不能支金山道行軍揔管郭元振奏追忠節入朝宿衛忠節行至播仙城經略使右威衛將軍周以悌􅀃之曰國家不愛髙官顯爵以待君者以君有部落之衆故也今脫身入朝一老胡耳豈惟不保寵禄死生亦制於人手方今宰相宗楚客紀處訥用事不若厚賂二公請留不行發安西兵及引吐蕃以擊娑葛求阿史那獻爲可汗以招十姓使郭䖍􅗕發㧞汗那兵以自助旣不失部落又得報仇比於入朝豈可同日語哉郭䖍􅗕者歷城人時爲西邊將忠節然其言遣間使賂楚客處訥請如以悌之䇿元振聞其謀上䟽以爲往嵗吐蕃所以犯邊正爲求十姓四鎮之地不獲故耳比者息兵請和非能慕悅中國之禮義也直以國多内難人畜疫癘恐中國乘其弊故且屈志求自昵使其國小安豈能忘取十姓四鎮之地哉今忠節不論國家大計直欲爲吐蕃鄉導恐四鎮危機將從此始頃縁黙啜慿陵所應者多兼四鎮兵疲弊勢未能爲忠節經略非憐突􅀐施也忠節不體國家中外之意而更求吐蕃吐蕃得志則忠節在其掌握豈得復事唐也往年吐蕃無恩於中國猶欲求十姓四鎮之地今若破娑葛有功請分于闐踈勒不知以何理抑之又其所部諸蠻及婆羅門等方不服若借唐兵助討之亦不知以何詞拒之是以古之智者皆不願受夷狄之惠蓋豫憂其求請無厭終為後患故也又彼請阿史那獻者豈非以獻為可汗子孫欲依之以招懷十姓乎按獻父元慶叔父僕羅兄俀子及斛瑟羅懐道等皆可汗子孫也往者唐及吐蕃徧曾立之以為可汗欲以招撫十姓皆不能致尋自破滅何則此屬非有過人之才恩威不足以動衆雖復可汗舊種衆心終不親附况獻又踈遠於其父兄乎若使忠節兵力自能誘脅十姓則不必求立可汗子孫也又欲令郭䖍􅗕入㧞汗那發其兵䖍􅗕前此已嘗與忠節擅入㧞汗那發兵不能得其片甲匹馬而㧞汗那不勝侵擾南引吐蕃奉俀子還侵四鎭時㧞汗那四旁無彊寇爲援䖍瓘等恣為侵掠如獨行無人之境猶引俀子爲患今北有娑葛急則與之并力内則諸胡堅壁拒守外則突厥伺隙邀遮臣料䖍􅗕等此行必不能如往年之得志内外受敵自䧟危亡徒與虜結􅂩令四鎮不安以臣愚揣之實爲非計楚客等不從建議遣馮嘉賓持節安撫忠節侍御史吕守素處置四鎮以將軍牛師􅅄為安西副都護發甘涼以西兵兼徴吐蕃以討娑葛娑葛遣使娑臘獻馬在京師聞其謀馳還報娑葛於是娑葛發五千􅀐岀安西五千􅀐岀撥換五千騎出焉􅂄五千騎出踈勒入寇元振在踈勒柵於河口不敢出忠節逆嘉賓於計舒河口娑葛遣兵襲之生擒忠節殺嘉賓擒吕守素於僻城縳於驛柱冎而殺之上以安樂公主將適左衛中郎將武延秀遣使召太子賓客武攸緒於嵩山攸緒將至上敕禮官於兩儀殿設别位欲行問道之禮聽以山服葛巾入見不名不拜仗入通事舍人引攸緒就位攸緒趨立辭見班中再拜如常儀上愕然竟不成所擬之禮上屢延之内殿頻煩寵錫皆謝不受親貴謁候寒温之外不交一言初武崇訓之尚公主也延秀數得侍宴延秀美姿儀善歌舞公主恱之及崇訓死遂以延秀尚焉己卯成禮假皇后仗分禁兵以盛其儀衛命安國相王障車庚辰赦天下以延秀爲太常卿兼右衛將軍辛巳宴羣臣于兩儀殿命公主出拜公卿公卿皆伏地稽首癸未牛師奬與突騎施娑葛戰于火燒城師奬兵敗沒娑葛遂陷安西斷四鎮路遣使上表求宗楚客頭楚客又奏以周以悌代郭元振統衆徴元振入朝以阿史那獻爲十姓可汗置軍焉􅂄以討娑葛娑葛遺元振書稱我與唐初無惡但讎闕啜宗尚書受闕啜金欲枉破奴部落馮中丞牛都護相繼而來奴豈得坐而待死又聞史獻欲來徒擾軍州恐未有寧日乞大使商量處置元振奏娑葛書楚客怒奏言元振有異圗召將罪之元振使其子鴻閒道具奏其狀乞留定西土不敢歸周以悌竟坐流白州復以元振代以悌赦娑葛罪冊爲十四姓可汗以婕妤上官氏爲昭容十二月御史中丞姚廷筠奏稱比見諸司不遵律令格式事無大小皆悉聞奏臣聞爲君者任臣爲臣者奉法萬機叢委不可徧覽豈有修一水竇伐一枯木皆取斷宸􅂨自今若軍國大事及條式無文者聽奏取進止自餘各準法處分其有故生疑滯致有稽失望令御史紏彈從之丁巳晦敕中書門下與學士諸王駙馬入閤守嵗設庭燎置酒奏樂酒酣上謂御史大夫竇從一曰聞卿乆無伉儷朕每憂之今夕嵗除為卿成禮從一但唯唯拜謝俄而内侍引燭籠歩障金縷羅扇自西廊而上扇後有人衣禮衣花釵令與從一對坐上命從一誦却扇詩數首扇却去花易服而出徐視之乃皇后老乳母王氏本蠻婢也上與侍臣大笑詔封莒國夫人嫁為從一妻俗謂乳母之壻曰阿㸙從一每謁見及進表狀自稱翊聖皇后阿㸙時人謂之國㸙從一欣然有自負之色三年春正月丁卯制廣東都聖善寺居民失業者數十家長寧安樂諸公主多縱僮奴掠百姓子女爲奴婢侍御史袁從之収繫獄治之公主訴於上上手制釋之從之奏稱陛下縱奴掠良人何以理天下上竟釋之二月己丑上幸􅀇武門與近臣觀宫女拔河又命宫女為市肆公卿為商旅與之交易因爲忿爭言辭䙝慢上與后臨觀為樂丙申監察御史崔琬對仗彈宗楚客紀處訥潜通戎狄受其貨賂致生邊患故事大臣被彈俯僂趨出立於朝堂待罪至是楚客更憤怒作色自陳忠鯁為琬所誣上竟不窮問命琬與楚客結爲兄弟以和解之時人謂之和事天子壬寅以韋巨源爲左僕射楊再思為右僕射並同中書門下三品上數與近臣學士宴集令各效伎藝以為樂工部尚書張錫舞談容娘将作大匠宗晉卿舞渾脱左衛將軍張洽舞黄麞左金吾將軍杜元談誦婆羅門呪中書舍人盧藏用效道士上章國子司業河東郭山惲獨曰臣無所解請歌古詩上許之山惲乃歌鹿鳴蟋蟀眀日上賜山惲敕嘉美其意賜時服一襲上又嘗宴侍臣使各為廻波辭衆皆為謟語或自求榮䘵諫議大夫李景伯曰廻波爾時酒巵㣲臣職在箴規侍宴旣過三爵諠譁竊恐非儀上不恱蕭至忠曰此真諫官也三月戊午以宗楚客為中書令蕭至忠為侍中大府卿韋嗣立為中書侍郎同中書門下三品中書侍郎崔湜趙彦昭並同平章事崔湜通於上官昭容故昭容引以為相彦昭張掖人也時政出多門濫官充溢人以為三無坐處謂宰相御史及員外官也韋嗣立上䟽以為比者造寺極多務取崇麗大則用錢百數十萬小則三五萬無慮所費千萬以上人力勞弊怨嗟盈路佛之為教要在降伏身心豈彫畫土木相誇壯麗萬一水旱為災戎狄構患雖龍象如雲將何救哉又食封之家其數甚衆昨問戸部云用六十餘萬丁一丁絹兩匹凡百二十餘萬匹臣頃在太府毎嵗庸調絹多不過百萬少則六七十萬匹比之封家所入殊少夫有佐命之勲始可分茅胙土國初功臣食封者不過三二十家今以恩澤食封者乃踰百數國家租賦太半私門私門有餘徒益奢侈公家不足坐致憂危制國之方豈謂為得封户之物諸家自徴僮僕依勢陵轢州縣多索裹頭轉行貿易煩擾驅廹不勝其苦不若悉計丁輸之太府使封家於左藏受之於事為愈又貟外置官數倍正闕曹署典吏困於祗承府庫倉儲竭於資奉又刺史縣令近年以來不存簡擇京官有犯及聲望下者方遣刺州吏部選人衰耄無手筆者方補縣令以此理人何由率化望自今應除三省兩臺及五品以上清望官皆先於刺史縣令中選用則天下理矣上弗聽戊寅以禮部尚書韋温為太子少保同中書門下三品太常卿鄭愔為吏部尚書同平章事温皇后之兄也太常􅀶士唐紹以武氏昊陵順陵置守户五百與昭陵數同梁宣王魯忠王墓守户多於親王五倍韋氏襃徳廟衛兵多於太廟上䟽請量裁减不聽紹臨之孫也中書侍郎兼知吏部侍郎同平章事崔湜吏部侍郎同平章事鄭愔俱掌銓衡傾附勢要贓賄狼藉數外留人授擬不足逆用三年闕選法大壊湜父挹為司業受選人錢湜不之知長名放之其人訴曰公所親受某賂柰何不與官湜怒曰所親為誰當擒取杖殺之其人曰公勿杖殺將使公遭憂湜大慙侍御史靳􅁪與監察御史李尚隠對仗彈之上下湜等獄命監察御史裴漼按之安樂公主諷漼寛其獄漼復對仗彈之夏五月丙寅愔免死流吉州湜貶江州司馬上官昭容密與安樂公主武延秀曲為申理明日以湜為襄州刺史愔為江州司馬六月右僕射同中書門下三品楊再思薨秋七月突騎施娑葛遣使請降庚辰拜欽化可汗賜名守忠八月己酉以李嶠同中書門下三品韋安石為侍中蕭至忠為中書令至忠女適皇后舅子崔無詖成昏日上主蕭氏后主崔氏時人謂之天子嫁女皇后娶婦上將祀南郊丁酉國子祭酒祝欽明國子司業郭山惲建言古者大祭祀后祼獻以瑶爵皇后當助祭天地太常博士唐紹蔣欽緒駮之以為鄭􅀇注周禮内司服惟有助祭先王先公無助祭天地之丈皇后不當助祭南郊國子司業鹽官禇無量議以為祭天惟以始祖為主不配以祖妣故皇后不應預祭韋巨源定儀注請依欽明議上從之以皇后為亞獻仍以宰相女為齋娘助執豆籩欽明又欲以安樂公主為終獻紹欽緒固爭乃止以巨源攝太尉為終獻欽緒膠水人也己巳上幸定昆池命從官賦詩黄門侍郎李日知詩曰所願蹔思居者逸勿使時稱作者勞及睿宗即位謂日知曰當是時朕亦不敢言之九月戊辰以蘇瓌為右僕射同中書門下三品太平安樂公主各樹朋黨更相􅉲毁上患之冬十一月癸亥上謂修文館直學士武平一曰比聞内外親貴多不輯睦以何法和之平一以為此由讒謟之人隂為離閒宜深加誨諭斥逐姦險若猶未巳伏願捨近圗遠抑慈存嚴示以知禁無令積惡上賜平一帛而不能用其言上召前修文館學士崔湜鄭愔入陪大禮乙丑上祀南郊赦天下并十惡咸赦除之流人並放還齋娘有壻者皆改官甲戌開府儀同三司平章軍國重事豆盧欽望薨乙亥吐蕃賛普遣其大臣尚贊咄等千餘人逆金城公主河南道廵察使監察御史宋務光以於時食實封者凡一百四十餘家應出封戸者凡五十四州皆割上􅃾之田或一封分食數州而太平安樂公主又取髙貲多丁者刻剝過苦應充封戸者甚於征役滑州地出綾縑人多趨射尤受其弊人多流亡請稍分封戸散配餘州又徴封使者煩擾公私請附租庸毎年送納上弗聽時流人皆放還均州刺史譙王重福獨不得歸乃上表自陳曰陛下焚柴展禮郊祀上玄蒼生並得赦除赤子偏加擯弃皇天平分之道固若此乎天下之人聞者為臣流涕況陛下慈念豈不愍臣栖遑表奏不報前右僕射致仕唐休璟年八十餘進取彌鋭娶賀婁尚宫養女為其子婦十二月壬辰以休璟為太子少師同中書門下三品甲午上幸驪山温湯庚子幸韋嗣立莊舍以嗣立與周髙士韋夐同族賜爵逍遥公嗣立皇后之踈屬也由是顧賞尤重乙巳還宫是嵗關中饑米斗百錢運山東江淮榖輸京師牛死什八九羣臣多請車駕復幸東都韋后家本杜陵不樂東遷乃使巫覡彭君卿等說上云今歳不利東行後復有言者上怒曰豈有逐糧天子邪乃止睿宗玄眞大聖大興孝皇帝上景雲元年春正月丙寅夜中宗與韋后微行觀燈於市里又縱宫女數千人出遊多不歸者上命紀處訥送金城公主適吐蕃處訥辭又命趙彦昭彦昭亦辭丁丑命左驍衞大將軍楊矩送之己卯上自送公主至始平二月癸未還宫公主至吐蕃贊普爲之别築城以居之庚戌上御梨園毬􅂣命文武三品以上抛毬及分朋拔河韋巨源唐休璟衰老隨絙踣地乆之不能興上及皇后妃主臨觀大笑夏四月丙戌上遊芳林園命公卿馬上摘櫻桃􅀄則天之世長安城東隅民王純家井溢浸成大池數十頃號隆慶池相王子五王列第於其北望氣者言常鬱鬱有帝王氣比日尤盛乙未上幸隆慶池結綵為樓宴侍臣泛舟戲象以厭之定州人郎岌上言韋后宗楚客將為逆亂韋后白上杖殺之五月丁卯許州司兵參軍偃師燕欽融復上言皇后滛亂干預國政宗族彊盛安樂公主武延秀宗楚客圗危宗社上召欽融面詰之欽融頓首抗言神色不撓上黙然宗楚客矯制令飛􅀐撲殺之投於殿庭石上折頸而死楚客大呼稱快上雖不窮問意頗怏怏不恱由是韋后及其黨始憂懼己卯上宴近臣國子祭酒祝欽明自請作八風舞揺頭轉目僃諸醜態上笑欽明素以儒學著名吏部侍郎盧藏用私謂諸學士曰祝公五經掃地盡矣散騎常侍馬秦客以醫術光祿少卿楊均以善烹調皆出入宫掖得幸於韋后恐事泄被誅安樂公主欲韋后臨朝自為皇太女乃相與合謀於餅餤中進毒六月壬午中宗崩於神龍殿韋后祕不發䘮自揔庶政癸未召諸宰相入禁中徴諸府兵五萬人屯京城使駙馬都尉韋捷韋􅈅衞尉卿韋璿左千牛中郎韋錡長安令韋播郎將髙嵩等分領之璿温之族弟播從子嵩其甥也中書舍人韋元徼廵六街又命左􅁥門大將軍兼内侍薛思簡等將兵五百人馳驛戍均州以僃譙王重福以刑部尚書裴談工部尚書張錫並同中書門下三品仍充東都留守吏部尚書張嘉福中書侍郎岑羲吏部侍郎崔湜並同平章事羲長倩之子也太平公主與上官昭容謀草遺制立温王重茂為皇太子皇后知政事相王旦參謀政事宗楚客密謂韋温曰相王輔政於理非宜且於皇后嫂叔不通問聽朝之際何以為禮遂帥諸宰相表請皇后臨朝罷相王政事蘇瓌曰遺詔豈可改邪温楚客怒瓌懼而從之乃以相王爲太子太師甲申梓宫遷御太極殿集百官發䘮皇后臨朝攝政赦天下改元唐隆進相王旦爲太尉雍王守禮為􅃎王夀春王成器為宋王以從人望命韋温揔知内外守捉兵馬事丁亥殤帝即位時年十六尊皇后為皇太后立妃陸氏為皇后壬辰命紀處訥持節廵撫闗内道岑羲河南道張嘉福河北道宗楚客與太常卿武延秀司農卿趙履温國子祭酒葉静能及諸韋共􅂆韋后遵武后故事南北衛軍臺閣要司皆以韋氏子弟領之廣聚黨衆中外連結楚客又密上書稱引圗䜟謂韋氏宜革唐命謀害殤帝深忌相王及太平公主宻與韋温安樂公主謀去之相王子臨淄王隆基先罷潞州别駕在京師隂聚才勇之士謀匡復社稷􅀄太宗選官户及蕃口驍勇者著虎文衣跨豹文韉從遊獵於馬前射禽獸謂之百騎則天時稍增為千騎􅀠左右羽林中宗謂之萬騎置使以領之隆基皆厚結其豪傑兵部侍郎崔日用素附韋武與宗楚客善知楚客謀恐禍及己遣寳昌寺僧普潤宻詣隆基告之勸其速發隆基乃與太平公主及公主子衞尉卿薛崇暕苑揔􅁥贛人鍾紹京尚衣奉御王崇曄前朝邑尉劉幽求利仁府折衝麻嗣宗謀先事誅之韋播髙嵩數榜捶万􅀐欲以立威万􅀐皆怨果毅􅁑福順陳玄禮見隆基訴之隆基諷以誅諸韋皆踴躍請以死自效万􅀐果毅李仙鳬亦預其謀或謂隆基當啓相王隆基曰我曹爲此以徇社稷事成福歸於王不成以身死之不以累王也今啓而見從則王預危事不從將敗大計遂不啓庚子晡時隆基微服與幽求等入苑中㑹鍾紹京廨舍紹京悔欲拒之其妻許氏曰忘身徇國神必助之且同謀素定今雖不行庸得免乎紹京乃趨出拜謁隆基執其手與坐時羽林將士皆屯玄武門逮夜葛福順李仙鳬皆至隆基所請號而行向二鼓天星散落如雪劉幽求曰天意如此時不可失福順㧞劔直入羽林營斬韋璿韋播髙嵩以徇曰韋后酖殺先帝謀危社稷今夕當共誅諸韋馬鞭以上皆斬之立相王以安天下敢有懷兩端助逆黨者罪及三族羽林之士皆欣然聽命乃送璿等首於隆基隆基取火視之遂與幽求等出苑南門紹京帥丁匠二百餘人執斧鋸以從使福順將左万􅀐攻玄德門仙鳬將右万􅀐攻白獸門約㑹於陵煙閣前即大譟福順等殺守門將斬闗而入隆基勒兵玄武門外三鼔聞譟聲帥揔􅁥及羽林兵而入諸衞兵在太極殿宿衞梓宫者聞譟聲皆被甲應之韋后惶惑走入飛􅀐營有飛􅀐斬其首獻於隆基安樂公主方照鏡畫眉軍士斬之斬武延秀於肅章門外斬內將軍賀婁氏於太極殿西􅀄上官昭容引其從母之子王昱爲左拾遺昱􅀃昭容母鄭氏曰武氏天之所廢不可興也今媫妤附於三思此滅族之道也願姨思之鄭氏以戒昭容昭容弗聽及太子重俊起兵誅三思索昭容昭容始懼思昱言自是心附帝室與安樂公主各樹朋黨及中宗崩昭容草遺制立温王以相王輔政宗韋改之及隆基入宫昭容執燭帥宫人迎之以制草示劉幽求幽求爲之言隆基不許斬於旗下時少帝在太極殿劉幽求曰衆約今夕共立相王何不早定隆基遽止之捕索諸韋在宫中及守諸門并素爲韋后所親信者皆斬之比曉內外皆定辛巳隆基出見相王叩頭謝不先啓之罪相王抱之泣曰社稷宗廟不墜於地汝之力也遂迎相王入輔少帝閉宫門及京城門分遣万騎収捕諸韋親黨斬太子少保同中書門下三品韋温於東市之北中書令宗楚客衣斬衰乘青驢逃出至通化門門者曰公宗尚書也去布㡌執而斬之并斬其弟晉卿相王奉少帝御安福門慰諭百姓􅀄趙履温傾國資以奉安樂公主爲之起第舍築臺穿池無休已擫紫衫以項挽公主犢車公主死履温馳詣安福樓下舞蹈稱万嵗聲未絶相王令萬􅀐斬之百姓怨其勞役爭割其肉立盡祕書􅁥汴王邕娶韋后妹崇國夫人與御史大夫竇從一各手斬其妻首以獻邕鳳之孫也左僕射同中書門下三品韋巨源聞亂家人勸之逃匿巨源曰吾位大臣豈可聞難不赴出至都街爲亂兵所殺時年八十於是梟馬秦客楊均葉靜能等首尸韋后於市崔日用將兵誅諸韋於杜曲襁褓兒無免者諸杜濫死非一是日赦天下云逆賊魁首已誅自餘支黨一無所問以臨淄王隆基爲平王兼知内外閑廏押左右廂万􅀐薛崇􅌔賜爵立節王以鍾紹京守中書侍郎劉幽求守中書舍人並參知機務麻嗣宗行左金吾衞中郎將武氏宗屬誅死流竄殆盡侍中紀處訥行至華州吏部尚書同平章事張嘉福行至懷州皆収斬之壬寅劉幽求在太極殿有宫人與宦官令幽求作制書立太后幽求曰國有大難人情不安山陵未畢遽立太后不可平王隆基曰此勿輕言遣十道使齎璽書宣撫及詣均州宣慰譙王重福貶竇從一爲濠州司馬罷諸公主府官癸卯太平公主傳少帝命請讓位於相王相王固辭以平王隆基爲殿中􅁥同中書門下三品以宋王成器爲左衞大將軍衡陽王成義爲右衛大將軍巴陵王隆範爲左羽林大將軍彭城王隆業爲右羽林大將軍光禄少卿嗣道王微檢校右金吾衛大將軍微元慶之孫也以黄門侍郎李日知中書侍郎鍾紹京並同中書門下三品太平公主之子薛崇訓爲右千牛衞將軍隆基有二奴王毛仲李守德皆趫勇善􅀐射常侍衞左右隆基之入苑中也毛仲避匿不從事定數日方歸隆基不之責仍超拜將軍毛仲本髙麗也汴王邕貶沁州刺史左散􅀐常侍駙馬都尉楊愼交貶巴州刺史中書令蕭至忠貶許州刺史兵部尚書同中書門下三品韋嗣立貶宋州刺史中書侍郎同平章事趙彦昭貶絳州刺史吏部侍郎同平章事崔湜貶華州刺史劉幽求言於宋王成器平王隆基曰相王疇昔已居宸極羣望所屬今人心未安家國事重相王豈得尚守小節不早即位以鎭天下乎隆基曰王性恬淡不以代事嬰懷雖有天下猶讓於人況親兄之子安肯代之乎幽求曰衆心不可違王雖欲髙居獨善其如社稷何成器隆基入見相王極言其事相王乃許之甲辰少帝在太極殿東隅西向相王立於梓宫旁太平公主曰皇帝欲以此位讓叔父可乎幽求跪曰國家多難皇帝仁孝追蹤堯舜誠合至公相王代之任重慈愛尤厚矣乃以少帝制傳位相王時少帝猶在御座太平公主進曰天下之心已歸相王此非兒座遂提下之睿宗即位御承天門赦天下復以少帝爲温王以鍾紹京爲中書令鍾紹京少爲司農録事旣典朝政縱情賞罰衆皆惡之太常少卿薛稷勸其上表禮讓紹京從之稷入言於上曰紹京雖有勲勞素無才德出自胥徒一旦超居元宰恐失聖朝具瞻之美上以爲然丙午改除户部尚書尋出爲蜀州刺史上將立太子以宋王成器嫡長而平王隆基有大功疑不能決成器辭曰國家安則先嫡長國家危則先有功苟違其宜四海失望臣死不敢居平王之上涕泣固請者累日大臣亦多言平王功大宜立劉幽求曰臣聞除天下之禍者當享天下之福平王拯社稷之危救君親之難論功莫大語德最賢無可疑者上從之丁未立平王隆基爲太子隆基復表讓成器不許則天大聖皇后復舊號爲天后追謚雍王賢曰章懷太子戊申以宋王成器爲雍州牧揚州大都督太子太師置温王重茂於内宅以太常少卿薛稷爲黄門侍郎參知機務稷以工書事上於藩邸其子伯陽尚仙源公主故爲相追削武三思武崇訓爵謚斵棺暴尸平其墳墓以許州刺史姚元之爲兵部尚書同中書門下三品宋州刺史韋嗣立許州刺史蕭至忠爲中書令絳州刺史趙彦昭爲中書侍郎華州刺史崔湜爲吏部侍郎並同平章事越州長史宋之問饒州刺史冉祖雍坐謟附韋武皆流嶺表己酉立衡陽王成義爲申王巴陵王隆範爲歧王彭城王隆業爲薛王加太平公主實封滿万户太平公主沈敏多權略武后以爲類己故於諸子中獨愛幸頗得預宻謀然尚畏武后之嚴未敢招權勢及誅張易之公主有力焉中宗之丗韋后安樂公主皆畏之又與太子共誅韋氏旣屢立大功益尊重上常與之圖議大政毎入奏事坐語移時或時不朝謁則宰相就第咨之毎宰相奏事上􅂺問嘗與太平議否又問與三郎議否然後可之三郎謂太子也公主所欲上無不聽自宰相以下進退繫其一言其餘薦士驟歷清顯者不可勝數權傾人主趨附其門者如市子薛崇行崇敏崇􅂤皆封王田園遍於近甸収市營造諸器玩遠至嶺蜀輸送者相屬於路居處奉養擬於宫掖追贈郎岌燕欽融諫議大夫秋七月庚戌朔贈韋月將宣州刺史癸丑以兵部侍郎崔日用為黄門侍郎參知機務追復故太子重俊位號雪敬暉􅁊彦範崔玄暐張柬之袁恕己成王千里李多祚等罪復其官爵丁巳以洛州長史宋璟檢校吏部尚書同中書門下三品岑羲罷爲右散􅀐常侍兼刑部尚書璟與姚元之恊心革中宗弊政進忠良退不肖賞罰盡公請託不行綱紀修舉當時翕然以爲復有貞觀永徽之風壬戌崔湜罷爲尚書左丞張錫爲絳州刺史蕭至忠爲晉州刺史韋嗣立爲許州刺史趙彦昭爲宋州刺史丙寅姚元之兼中書令兵部尚書同中書門下三品李嶠貶懷州刺史丁卯太子少師同中書門下三品唐休璟致仕右武衛大將軍同中書門下三品張仁愿罷爲左衞大將軍黄門侍郎參知機務崔日用與中書侍郎參知機務薛稷爭於上前稷曰日用傾側曏附武三思非忠臣賣友邀功非義士日用曰臣往雖有過今立大功稷外託國姻内附張易之宗楚客非傾側而何上由是兩罷之戊辰以日用爲雍州長史稷爲左散􅀐常侍己巳赦天下改元凡韋氏餘黨未施行者咸赦之乙亥廢武氏崇恩廟及昊陵順陵追廢韋后爲庶人安樂公主爲悖逆庻人韋后之臨朝也吏部侍郎鄭愔貶江州司馬濳過均州與刺史譙王重福及洛陽人張靈均謀舉兵誅韋氏未發而韋氏敗重福遷集州刺史未行靈均􅀃重福曰大王地居嫡長當爲天子相王雖有功不當継統東都士庶皆願王來主若濳入洛陽發左右屯營兵襲殺留守據東都如從天而下也然後西取陜州東取河南北天下指麾可定重福從之靈均乃宻與愔結謀聚徒數十人時愔自祕書少監左遷沅州刺史遟留洛陽以俟重福爲重福草制立重福爲帝改元爲中元克復尊上爲皇季叔以温王爲皇太弟愔爲左丞相知内外文事靈均爲右丞相天柱大將軍知武事右散􅀐常侍嚴善思爲禮部尚書知吏部事重福與靈均詐乗驛東都愔先供張駙馬都尉裴巽第以待重福洛陽縣官微聞其謀資治通鑑卷第二百九
