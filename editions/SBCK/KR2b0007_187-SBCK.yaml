front:
  text: 資治通鑑卷第一百八十七
  hash: sha256:297ce8913cd33dc4c94322ec08989123c8727b66072192b5b23f7868b70a32bb
body:
  text: 臣司馬光奉勑編集唐紀三盡十月不滿一年起屠維單閼正月高祖神堯大聖光孝皇帝上之下武徳二年春正月壬寅王丗充悉取隋朝顯官名士為太尉府官屬杜淹戴胄皆預焉胄安陽人也隋將軍王隆帥屯衛將軍張鎭周都水少監蘇丗長等以山南兵始至東都王丗充專揔朝政事無大小悉關太尉府臺省監署莫不闃然丗充立三牌於府門外一求文學才識堪濟時務者一求武勇智略能摧鋒陷敵者一求身有􅁈滯擁抑不申者於是上書陳事者日有數百丗充悉引見躬自省覽殷勤慰諭人人自喜以爲言聽計從然終無所施行下至士卒厮養丗充皆以甘言悅之而實無恩施隋馬軍揔管獨孤武都爲丗充所親任其從弟司􅀠大夫機與虞部郎楊恭愼前勃海郡主簿孫師孝歩兵揔管劉孝元李儉崔孝仁謀召唐兵使孝仁􅀃武都曰王公徒爲兒女之態以悅下愚而鄙隘貪忍不顧親舊豈能成大業哉圖䜟之文應歸李氏人皆知之唐起􅀳陽奄有關内兵不留行英雄景附且坦懷待物舉善責功不念舊惡據勝勢以爭天下誰能敵之吾屬託身非所坐待夷滅今任管公兵近在新安又吾之故人也若遣閒使召之使夜造城下吾曹共為内應開門納之事無不集矣武都從之事泄丗充皆殺之恭愼達之子也癸卯命秦王丗民出鎭長春宫宇文化及攻魏州揔管元寳藏四旬不克魏徵往􅀃之丁未寶藏舉州來降戊午淮安王神通擊宇文化及於魏縣化及不能抗東走聊城神通拔魏縣斬獲二千餘人引兵追化及至聊城圍之甲子以陳叔達為納言丙寅李密所置伊州刺史張善相來降朱粲有衆二十萬剽掠漢淮之閒遷徙無常每破州縣食其積粟未盡復他適將去悉焚其餘資又不務稼穡民餒死者如積粲無可復掠軍中乏食乃敎士卒烹婦人嬰兒噉之曰肉之美者無過於人但使佗國有人何憂於餒隋著作佐郎陸從典通事舍人顔愍楚謫官在南陽粲初引為賔客其後無食闔家皆為所噉愍楚之推之子也又稅諸城堡細弱以供軍食諸城堡相帥叛之淮安土豪楊士林田瓚起兵攻粲諸州皆應之粲與戰于淮源大敗帥餘衆數千奔菊潭士林家丗蠻酋隋末士林為鷹􅀭府校尉殺郡官而據其郡既逐朱粲己巳帥漢東四郡遣使詣信州揔管廬江王瑗請降詔以為顯州道行臺士林以瓚為長史初王丗充既殺元盧慮人情未服猶媚事皇泰主禮甚謙敬又請為劉太后假子尊號曰聖感皇太后既而漸驕横甞賜食於宫中還家大吐疑遇毒自是不復朝謁皇泰主知其終不為臣而力不能制唯取内庫綵物大造幡花又出諸服玩令僧散施貧乏以求福丗充使其黨張績董濬守章善顯福二門宫内雜物毫釐不得出是月丗充使人獻印及劒又言河水清欲以耀衆為已符瑞云上遣金紫光祿大夫武功靳孝謨安集邊郡為梁師都所獲孝謨罵之極口師都殺之二月詔追賜爵武昌縣公謚曰忠初定租庸調法每丁租二石絹二匹綿三兩自兹以外不得横有調歛丙戍詔諸宗姓居官者在同列之上未仕者免其徭役每州置宗師一人以攝緫别為團伍張俟徳至涼李􅁤召其羣臣廷議曰唐天子吾之從兄今已正位京邑一姓不可自爭天下吾欲去帝號受其官爵可乎曹珍曰隋失其鹿天下共逐之稱王稱帝者奚啻一人唐帝關中涼帝河右固不相妨且已為天子柰何復自貶黜必欲以小事大請依蕭詧事魏故事軌從之戊戍軌遣其尚書左丞鄧曉入見奉書稱皇從弟大涼皇帝臣􅁤而不受官爵帝怒拘曉不遣始議興師討之初隋煬帝自征吐谷渾吐谷渾可汗伏允以數千􅀐奔党項􅌆帝立其質子順為主使統餘衆不果入而還㑹中國喪亂伏允復還収其故地上受禪順自江都還長安上遣使與伏允連和使擊李軌許以順還之伏允喜起兵擊􅁤數遣使入貢請順上遣之閏月朱粲遣使請降詔以粲爲楚王聽自置官屬以便宜從事宇文化及以珍貨誘海曲諸賊賊帥王薄帥衆從之與共守聊城竇建德謂其羣下曰吾為隋民隋為吾君今宇文化及弑逆乃吾讎也吾不可以不討乃引兵趣聊城淮安王神通攻聊城化及糧盡請降神通不許安撫副使崔丗幹勸神通許之神通曰軍士暴露日乆賊食盡計窮克在旦暮吾當攻取以示國威且散其玉帛以勞將士若受其降將何以為軍賞乎丗幹曰今建徳方至若化及未平内外受敵吾軍必敗夫不攻而下之為功甚易柰何貪其玉帛而不受乎神通怒囚丗幹於軍中既而宇文士及自濟北餽之化及軍稍振遂復拒戰神通督兵攻之貝州刺史趙君德攀堞先登神通心害其功収兵不戰君德大詬而下遂不克建德軍且至神通引兵退建德與化及連戰大破之化及復保聊城建徳縱兵四面急攻王薄開門納之建徳入城生擒化及先謁隋蕭皇后語皆稱臣素服哭煬帝盡哀収傳國璽及鹵簿儀仗撫存隋之百官然後執逆黨宇文智及楊士覽元武達許􅀪仁孟景集隋官而斬之梟首軍門之外以檻車載化及并二子承基承趾至襄國斬之化及且死更無餘言但云不負夏王建德每戰勝克城所得資財悉以分將士身無所取又不噉肉常食􅂼茹粟飯妻曹氏不衣紈綺所役婢妾纔十許人及破化及得隋宫人千數即時散遣之以隋黄門侍郎裴矩爲左僕射掌選事兵部侍郎崔君肅爲侍中少府令何稠爲工部尚書右司郎中柳調爲左丞虞丗南爲黄門侍郎歐陽詢爲太常卿詢紇之子也自餘隨才授職委以政事其不願留欲詣關中及東都者亦聽之仍給資糧以兵援之出境隋驍果尚近萬人亦各縱遣任其所之又與王丗充結好遣使奉表於隋皇泰主皇泰主封爲夏王建德起於羣盜雖建國未有文物法度裴矩爲之定朝儀制律令建德甚悅每從之諮訪典禮甲辰上考第羣臣以李綱孫伏伽爲第一因置酒高㑹謂裴寂等曰隋氏以主驕臣諂亡天下朕即位以來每虛心求諫然唯李綱差盡忠欵孫伏伽可謂誠直餘人猶踵敝風俛眉而已豈朕所望哉朕視卿如愛子卿當視朕如慈父有懷必盡勿自隱也因命捨君臣之敬極歡而罷遣前御史大夫段確使於朱粲初上為隋殿内少監宇文士及為尚輦奉御上與之善士及從化及至黎陽上手詔召之士及潛遣家僮閒道詣長安又因使者獻金環化及至魏縣兵勢日蹙士及勸之歸唐化及不從内史令封德彝􅀃士及於濟北徴督軍糧以觀其變化及稱帝立士及為蜀王化及死士及與德彝自濟北來降時士及妹為昭儀由是授上儀同上以封德彝隋室舊臣而諂巧不忠深誚責之罷遣就舍德彝以祕策干上上悅尋拜内史舎人俄遷侍郎甲寅隋夷陵郡丞安陸許紹帥黔安武陵澧陽等諸郡來降紹幼與帝同學詔以紹為峽州刺史賜爵安陸公丙辰以徐丗勣為黎州揔管丁巳驃􅀐將軍張孝珉以勁卒百人襲王丗充汜水城入其郛沈米船百五十艘己未丗充宼榖州丗充以秦叔寶為龍驤大將軍程知節為將軍待之皆厚然二人疾丗充多詐知節謂叔寳曰王公器度淺狹而多妄語好為呪誓此乃老巫嫗耳豈撥亂之主乎丗充與唐兵戰於九曲叔寳知節皆將兵在陳與其徒數十􅀐西馳百許歩下馬拜丗充曰僕荷公殊禮深思報効公性猜忌喜信讒言非僕託身之所今不能仰事請從此辭遂躍馬來降丗充不敢逼上使事秦王丗民丗民素聞其名厚禮之以叔寳為馬軍揔管知節為左三統軍時丗充驍將又有驃􅀐武安李君羨征南將軍臨邑田留安亦惡丗充之為人帥衆來降丗民引君羨置左右以留安為右四統軍王丗充囚李育德之兄厚德於獲嘉厚德與其守將趙君頴逐殷州刺史段大師以城來降以厚德為殷州刺史竇建德陷邢州執揔管陳君賔上遣殿内監竇誕右衛將軍宇文歆助并州揔管齊王元吉守􅀳陽誕抗之子也尚帝女襄陽公主元吉性驕侈奴客婢妾數百人好使之被甲戲為攻戰前後死傷甚衆元吉亦甞被傷其乳母陳善意苦諌元吉醉怒命壯士歐殺之性好田獵載罔罟三十餘車甞言我寧三日不食不能一日不獵常與誕遊獵蹂踐人禾稼又縱左右奪民物當衢射人觀其避箭夜開府門宣淫他室百姓憤怨歆屢諫不納乃表言其狀壬戌元吉坐免官癸亥陟州刺史李育德攻下王丗充河内堡聚三十一所乙丑丗充遣其兄子君廓侵陟州李育德擊走之斬首千餘級李厚德歸省親疾使李育德守獲嘉丗充併兵攻之丁卯城陷育德及弟三人皆戰死己巳李公逸以雍丘來降拜杞州揔管以其族弟善行為杞州刺史隋吏部侍郎楊恭仁從宇文化及至河北化及敗魏州揔管元寳藏獲之己巳送長安上與之有舊拜黄門侍郎尋以為涼州揔管恭仁素習邊事曉羌胡情偽民夷悅服自葱嶺已東並入朝貢突厥始畢可汗將其衆度河至夏州梁師都發兵會之以五百􅀐授劉武周欲自句注入宼太原會始畢卒子什鉢苾㓜未可立立其弟俟利弗設為處羅可汗處羅以什鉢苾為尼歩設使居東偏直幽州之北先是上遣右武候將軍高靜奉幣使於始畢至豐州聞始畢卒􅃯納於所在之庫突厥聞之怒欲入宼豐州揔管張長遜遣高靜以幣出塞為朝廷致賻突厥乃還三月庚午梁師都宼靈州長史楊則擊走之壬申王丗充宼榖州刺史史萬寳戰不利庚辰隋北海通守鄭䖍符文登令方惠整及東海齊郡東平任城平陸壽張須昌賊帥王薄等並以其地來降王丗充之宼新安也外示攻取實召文武之附已者議受禪李丗英深以為不可曰四方所以奔馳歸附東都者以公能中興隋室故也今九州之地未清其一遽正位號恐逺人皆思叛去矣丗充曰公言是也長史韋節楊續等曰隋氏數窮在理昭然夫非常之事固不可與常人議之太史令樂德融曰昔嵗長星出乃除舊布新之徴今嵗星在角亢亢鄭之分野若不亟順天道恐王氣衰息丗充從之外兵曹參軍戴胄言於丗充曰君臣猶父子也休戚同之明公莫若竭忠徇國則家國俱安矣丗充詭辭稱善而遣之丗充議受九錫胄復固諫丗充怒出為鄭州長史使與兄子行本鎭虎牢乃使段達等言於皇泰主請加丗充九錫皇泰主曰鄭公近平李密已拜太尉自是以來未有殊績俟天下稍平議之未晚段達曰太尉欲之皇泰主熟視達曰任公辛巳達等以皇泰主之詔命丗充為相國假黄鉞揔百揆進爵鄭王加九錫鄭國置丞相以下官初宇文化及以隋大理卿鄭善果為民部尚書從至聊城為化及督戰中流矢竇建德克聊城王琮獲善果責之曰公名臣之家隋室大臣柰何為弑君之賊効命苦戰傷痍至此乎善果大慙欲自殺宋正本馳往救止之建德復不為禮乃奔相州淮安王神通送之長安庚午善果至上優禮之拜左庶子檢校内史侍郎齊王元吉諷并州父老詣闕留己甲申復以元吉爲并州揔管戊子淮南五州皆遣使來降辛卯劉武周宼并州壬辰營州揔管鄧暠擊高開道敗之甲午王丗充遣其將高毗宼義州東都道士􅁊法嗣獻孔子閉房記於王丗充言相國當代隋爲天子丗充大悅以法嗣爲諌議大夫丗充又羅取雜鳥書帛繫頸自言符命而縱之有得鳥來獻者亦拜官爵於是段達以皇泰主命加丗充殊禮丗充奉表三讓百官勸進設位於都堂納言蘇威年老不任朝謁丗充以威隋氏重臣欲以􅅭耀士民每勸進必冠威名及受殊禮之日扶威置百官之上然後南面正坐受之夏四月劉武周引突厥之衆軍於黄蛇嶺兵鋒甚盛齊王元吉使車􅀐將軍張逹以歩卒百人甞宼逹辭以兵少不可往元吉强遣之至則俱没逹忿恨庚子引武周襲榆次陷之散􅀐常侍段確性嗜酒奉詔慰勞朱粲於菊潭辛丑乘醉侮粲曰聞卿好噉人人作何味粲曰噉醉人正如糟藏彘肉確怒罵曰狂賊入朝為一頭奴耳復得噉人乎粲於座収確及從者數十人悉烹之以噉左右遂屠菊潭奔王丗充丗充以為龍驤大將軍王丗充令長史韋節楊續等及太常博士衡水孔頴達造禪代儀遣段達雲定興等十餘人入奏皇泰主曰天命不常鄭王功德甚盛願陛下遵唐虞之迹皇泰主歛􅂰據按怒曰天下高祖之天下若隋祚未亡此言不應輒發必天命已攺何煩禪讓公等或祖禰舊臣或台鼎高位既有斯言朕復何望顔色凛冽在廷者皆流汗退朝泣對太后丗充更使人謂之曰今海内未寧須立長君俟四方安集當復子明辟必如前誓癸卯丗充稱皇泰主命禪位于鄭遣其兄丗惲幽皇泰主於含涼殿雖有三表陳讓及敕書敦勸皇泰主皆不知也遣諸將引兵入清宫城又遣術人以桃湯葦火祓除禁省隋將帥郡縣及賊帥前後繼有降者詔以王薄為齊州總管伏德為濟州揔管鄭䖍符為青州揔管綦公順為淮州揔管王孝師爲滄州揔管甲辰遣大理卿新樂郎楚之安撫山東祕書監夏侯端安撫淮左乙巳王丗充備法駕入宫即皇帝位丙午大赦攺元開明丁未隋禦衛將軍陳稜以江都來降以稜為􅀭州揔管戊申王丗充立子􅀇應為太子􅀇恕為漢王餘兄弟宗族十九人皆為王奉皇泰主為潞國公以蘇威為太師段達為司徒雲定興為太尉張僅為司空楊續為納言韋節為内史王隆為左僕射韋霽為右僕射齊王丗惲為尚書令楊汪為吏部尚書杜淹為少吏部鄭頲為御史大夫丗惲丗充之兄也又以國子助教吴人陸徳明為漢王師令􅀇恕就其家行束脩禮德明恥之故服巴豆散卧稱病􅀇恕入跪牀下對之遺利竟不與語德明名朗以字行丗充於闕下及􅀇武門等數處皆設榻坐無常所親受章表或輕􅀐遊歴衢市亦不清道民但避路而已丗充按轡徐行語之曰昔時天子深居九重在下事情無由聞徹今丗充非貪天位但欲救恤時危正如一州刺史親覽庶務當與士庶共評朝政尚恐門有禁限今於門外設坐聽朝宜各盡情又令西朝堂納􅁈抑東朝堂納直諌於是獻書上䇿者日有數百條䟽既煩省覽難遍數日後不復更出竇建徳聞王丗充自立乃絶之始建天子旌旗出警入蹕下書稱詔追謚隋煬帝為閔帝齊王􅌔之死也有遺腹子政道建德立以為鄖公然猶依􅀝突厥以壯其兵勢隋義成公主遣使迎蕭皇后及南陽公主建德遣千餘􅀐送之又傳宇文化及首以獻義成公主丙辰劉武周圍并州齊王元吉拒却之戊午詔太常卿李仲文將兵救并州王丗充將軍丘懷義居門下内省召越王君度漢王􅀇恕將軍郭士衡雜妓妾飲博侍御史張藴古彈之丗充大怒令散手執君度􅀇恕批其耳數十又命引入東上閤杖之各四十懷義士衡不問賞藴古帛百段遷太子舎人君度丗充之兄子也丗充每聽朝殷勤誨諭言詞重複千端萬緒侍衛之人不勝倦弊百司奏事疲於聽受御史大夫蘇良諌曰陛下語太多而無領要計云爾即可何煩許辭也丗充黙然良乆亦不罪良然性如是終不能攺也王丗充數攻伊州揔管張善相拒之糧盡援兵不至癸亥城陷善相罵丗充極口而死帝聞歎曰吾負善相善相不負吾也賜其子爵襄城郡公五月王丗充陷義州復宼西濟州遣右驍衛大將軍劉􅀪基將兵救之李軌將安脩仁兄興貴仕長安表請􅀃軌諭以禍福上曰軌阻兵恃險連結吐谷渾突厥吾興兵擊之尚恐不克豈口舌所能下乎興貴曰臣家在涼州弈丗豪望為民夷所附弟脩仁為軌所信任子弟在機近者以十數臣往􅀃之軌聽臣固善若其不聽圖之肘腋易矣上乃遣之興貴至武威軌以為左右衛大將軍興貴乘閒􅀃軌曰涼地不過千里土薄民貧今唐起太原取函秦宰制中原戰必勝攻必取此殆天啓非人力也不若舉河西歸之則竇融之功復見於今日矣軌曰吾據山河之固彼雖彊大若我何汝自唐來爲唐遊􅀃耳興貴謝曰臣聞富貴不歸故鄉如衣繡夜行臣闔門受陛下榮祿安肯附唐但欲效其愚慮可否在陛下耳於是退與脩仁隂結諸胡起兵擊軌軌出戰而敗嬰城自守興貴徇曰大唐遣我來誅李軌敢助之者夷三族城中人爭出就興貴軌計窮與妻子登玉女臺置酒爲别庚辰興貴執之以聞河西悉平鄧曉在長安舞蹈稱慶上曰汝爲人使臣聞國亡不慼而喜以求媚於朕不忠於李軌肯爲朕用乎遂廢之終身軌至長安并其子弟皆伏誅以安興貴為右武候大將軍上柱國涼國公賜帛萬段安脩仁為左武候大將軍申國公隋末離石胡劉龍兒擁兵數萬自號劉王以其子季眞為太子虎賁郎將梁徳擊斬龍兒至是季眞與弟六兒復舉兵為亂引劉武周之衆攻陷石州殺刺史王儉季眞自稱突利可汗以六兒為拓定王六兒遣使請降詔以為嵐州揔管壬午以秦王丗民為左武候大將軍使持節涼甘等九州諸軍事涼州揔管其太尉尚書令雍州牧陜東道行臺並如故遣黄門侍郎楊恭仁安撫河西丙戌劉武周陷平遥癸巳梁州揔管山東道安撫副使陳政為麾下所殺攜其首奔王丗充政茂之子也王丗充以禮部尚書裴仁基左輔大將軍裴行儼有威名忌之仁基父子知之亦不自安乃與尚書左丞宇文儒童儒童弟尚食直長温散􅀐常侍崔德本謀殺丗充及其黨復尊立皇泰主事泄皆夷三族齊王丗惲言於丗充曰儒童等謀反正為皇泰主尚在故也不如早除之丗充從之遣兄子唐王仁則及家奴梁百年酖皇泰主皇泰主曰更為請太尉以往者之言未應至此百年欲為啟陳丗惲不許又請與太后辭訣亦不許乃布席焚香禮佛願自今已往不復生帝王家飲藥不能絕以帛縊殺之謚曰恭皇帝丗充以其兄楚王丗偉為太保齊王丗惲為太傅領尚書令六月庚子竇建德陷滄州初易州賊帥宋金剛有衆萬餘與魏刀兒連結刀兒為竇建德所滅金剛救之戰敗帥衆四千西奔劉武周武周聞其善用兵得之甚喜號曰宋王委以軍事中分家貲以遺之金剛亦深自結出其故妻納武周之妺因􅀃武周圖􅀳陽南向爭天下武周以金剛為西􅀯道大行臺使將兵三萬宼并州丁未武周進逼介州沙門道澄以佛幡縋之入城遂陷介州詔左武衛大將軍姜寳􅁩行軍揔管李仲文擊之武周將黄子英往來雀鼠谷數以輕兵挑戰兵纔接子英陽不勝而走如是再三寳􅁩仲文悉衆逐之伏兵發唐兵大敗寳􅁩仲文皆為所虜既而俱逃歸上復使二人將兵擊武周己酉突厥遣使來告始畢可汗之喪上舉哀于長樂門廢朝三曰詔百官就館弔其使者又遣内史舎人鄭德挺弔處羅可汗賻帛三萬段上以劉武周入宼為憂右僕射裴寂請自行癸亥以寂為􅀳州道行軍揔管討武周聽以便宜從事秋七月初置十二軍分關内諸府以􅀠焉皆取天星為名以車􅀐府統之每軍將副各一人取威名素重者為之督以耕戰之務由是士馬精彊所向無敵海岱賊帥徐圓朗以數州之地請降拜兖州揔管封魯國公王丗充遣其將羅士信宼穀州士信帥其衆千餘人來降先是士信從李密擊丗充兵敗為丗充所得丗充厚禮之與同寢食既而得邴元眞等待之如士信士信恥之士信有駿馬世充兄子趙王道詢欲之不與世充奪之以賜道詢士信怒故來降上聞其來甚喜遣使迎勞賜帛五千段廪食其所部以士信為陜州道行軍揔管世充左龍驤將軍臨涇席辯與同列楊䖍安李君義皆帥所部來降丙子王丗充遣其將郭士衡宼穀州刺史任瓌大破之俘斬且盡甲申行軍揔管劉􅀪基遣其將种如願襲王丗充河陽城毁其河橋而還乙酉西突厥統葉䕶可汗高昌王麴伯雅各遣使入貢初西突厥曷娑那可汗入朝于隋隋人留之國人立其叔父號射匱可汗射匱者逹頭可汗之孫也既立拓地東至金山西至海遂與北突厥為敵建庭於􅀛兹北三彌山射匱卒子弟統葉護可汗立統葉護勇而有謀北并鐵勒控􅁌數十萬據烏孫故地又移庭於石國北千泉西域諸國皆臣之葉護各遣吐屯監之督其征賦辛卯宋金剛宼浩州浹旬而退八月丁酉酅公薨謚曰隋恭帝無後以族子行基嗣竇建徳將兵十餘萬趣洺州淮安王神通帥諸軍退保相州己亥建德兵至洺州城下丙午將軍秦武通軍至洛陽敗王丗充將葛彦璋丁未竇建德陷洺州揔管􅀽子幹降之乙卯引兵趣相州淮安王神通聞之帥諸軍就李丗勣於黎陽梁師都與突厥合數千􅀐宼延州行軍揔管段德操兵少不敵閉壁不戰伺師都稍怠九月丙寅遣副揔管梁禮將兵擊之師都與禮戰方酣德操以輕􅀐多張旗幟掩擊其後師都軍潰逐北二百餘里破其魏州虜男女二千餘口德操孝先之子也蕭銑遣其將楊道生宼峽州刺史許紹擊破之銑又遣其將陳普環帥舟師上峽規取巴蜀紹遣其子智仁及錄事參軍李􅀪節等追至西陵大破之擒普環銑遣兵戍安蜀城及荆門城先是上遣開府李靖詣䕫州經略蕭銑靖至峽州阻銑兵乆不得進上怒其遲留隂敕許紹斬之紹惜其才為之奏請獲免己巳竇建徳陷相州殺刺史吕珉民部尚書魯公劉文靜自以才略功勲在裴寂之右而位居其下意甚不平每廷議寂有所是文靜必非之數侵侮寂由是有隙文靜與弟通直散􅀐常侍文起飲酒酣怨望拔刀擊柱曰㑹當斬裴寂首家數有妖文起召巫於星下被髮銜刀爲厭勝文靜有妾無寵使其兄上變告之上以文靜屬吏遣裴寂蕭瑀問狀文靜曰建義之初忝爲司馬計與長史位望略同今寂爲僕射據甲第臣官賞不異衆人東西征討老母留京師風雨無所庇實有觖望之心因醉怨言不能自保上謂羣臣曰觀文靜此言反明白矣李綱蕭瑀皆明其不反秦王丗民爲之固請曰昔在􅀳陽文靜先定非常之策始告寂知及克京城任遇懸隔令文靜觖望則有之非敢謀反裴寂言於上曰文靜才略實冠時人性復麤險今天下未定留之必貽後患上素親寂低回乆之卒用寂言辛未文靜及文起坐死籍没其家沈法興既克毗陵謂江淮之南指撝可定自稱梁王都毗陵攺元延康置百官性殘忍專尚威刑將士小有過即斬之由是其下離怨時杜伏威據歷陽陳稜據江都李子通據海陵俱有窺江表之心法興軍數敗㑹子通圍稜於江都稜送質求救於法興及伏威法興使其子綸將兵數萬與伏威共救之伏威軍清流綸軍􅀭子相去數十里子通納言毛文深獻策募江南人詐為綸兵夜襲伏威營伏威怒復遣兵襲綸由是二人相疑莫敢先進子通得盡銳攻江都克之稜奔伏威子通入江都因縱擊綸大破之伏威亦引去子通即皇帝位國號吴攺元明政丹陽賊帥樂伯通帥衆萬餘降之子通以為左僕射杜伏威請降丁丑以伏威為淮南安撫大使和州揔管裴寂至介休宋金剛據城拒之寂軍于度索原營中飲澗水金剛絶之士卒渴乏寂欲移營就水金剛縱兵擊之寂軍遂潰失亡略盡寂一日一夜馳至􅀳州先是劉武周屢遣兵攻西河浩州刺史劉贍拒之李仲文引兵就之與共守西河及裴寂敗自􅀳州以北城鎮俱没唯西河獨存姜寳􅁩復為金剛所虜謀逃歸金剛殺之裴寂上表謝罪上慰諭之復使鎭撫河東劉武周進逼并州齊王元吉紿其司馬劉德威曰卿以老弱守城吾以彊兵出戰辛巳元吉夜出兵攜其妻妾弃州奔還長安元吉始去武周兵已至城下􅀳陽土豪薛深以城納武周上聞之大怒謂禮部尚書李綱曰元吉㓜弱未習時事故遣竇誕宇文歆輔之􅀳陽彊兵數萬食支十年興王之基一旦弃之聞宇文歆首畫此策我當斬之綱曰王年少驕逸竇誕曾無規諌又掩覆之使士民憤怨今日之敗誕之罪也歆諌王不悛尋皆聞奏乃忠臣也豈可殺哉明日上召綱入升御座曰我得公遂無濫刑元吉自為不善非二人所能禁也并誕赦之衛尉少卿劉政㑹在太原為武周所虜政㑹密遣人奉表論武周形勢武周據太原遣宋金剛攻􅀳州拔之虜右驍衛大將軍劉􅀪基弘基逃歸金剛進逼絳州陷龍門西突厥曷娑那可汗與北突厥有怨曷娑那在長安北突厥遣使請殺之上不許羣臣皆曰保一人而失一國後必為患秦王丗民曰人窮來歸我殺之不義上遲迴乆之不得巳丙戌引曷娑那於内殿宴飲既而送中書省縱北突厥使者使殺之禮部尚書李綱領太子詹事太子建成始甚禮之乆之太子漸昵近小人疾秦王丗民功高頗相猜忌綱屢諌不聽乃乞骸骨上罵之曰卿為何潘仁長史乃恥為朕尚書邪且方使卿輔導建成而固求去何也綱頓首曰潘仁賊也每欲妄殺人臣諌之即止為其長史可以無愧陛下創業明主臣不才所言如水投石言於太子亦然臣何敢乆汚天臺辱東朝乎上曰知公直士勉留輔吾兒戊子以綱為太子少保尚書詹事如故綱復上書諌太子飲酒無節及信讒慝踈骨肉太子不懌而所為如故綱鬱鬱不得志是嵗固稱老病辭職詔解尚書仍為少保淮安王神通使慰撫使張道源鎭趙州庚寅竇建德陷趙州執揔管張志昻及道源建德以二人及邢州刺史陳君賔不早下欲殺之國子祭酒凌敬諌曰人臣各為其主用彼堅守不下乃忠臣也今大王殺之何以勵羣下乎建德怒曰吾至城下彼猶不降力屈就擒何可捨也敬曰今大王使大將高士興拒羅藝於易水藝纔至士興即降大王之意以為何如建德乃悟即命釋之乙未梁師都復宼延州段德操擊破之斬首二千餘級師都以百餘􅀐遁去徳操以功拜柱國賜爵平原郡公鄜州刺史鄜城壯公梁禮戰没冬十月己亥就加涼州揔管楊恭仁納言賜幽州揔管燕公羅藝姓李氏封燕郡王辛丑李藝破竇建衡於衡水癸卯以左武候大將軍龎玉為梁州揔管時集州獠反玉討之獠據險自守軍不得進糧且盡熟獠與反者皆鄰里親黨爭言賊不可擊請玉還玉􅀭言秋穀將熟百姓毋得収刈一切供軍非平賊吾不返聞者大懼曰大軍不去吾曹皆將餒死其中壯士乃入賊營與所親潛謀斬其渠帥而降餘黨皆散玉追討悉平之劉武周將宋金剛進攻澮州陷之軍勢甚銳裴寂性怯無將帥之略唯發使駱驛趣虞泰二州收民入城堡焚其積聚民驚擾愁怨皆思為盜夏縣民吕崇茂聚衆自稱魏王以應武周寂討之為所敗詔永安王孝基工部尚書獨孤懷恩陜州揔管于筠内史侍郎唐儉等將兵討之時王行本猶據蒲反未下亦與武周相應關中震駭上出手敕曰賊勢如此難與爭鋒宜弃大河以東謹守關西而已秦王丗民上表曰太原王業所基國之根本河東殷實京邑所資若舉而弃之臣竊憤恨願假臣精兵三萬必冀平殄武周克復汾􅀳上於是悉發關中兵以益丗民所統使擊武周乙卯幸華隂至長春宫以送之竇建徳引兵趣衛州建徳每行軍常為三道輜重細弱居中央歩􅀐夾左右相去三里許建德以千􅀐前行過黎陽三十里李丗勣遣􅀐將丘孝剛將二百􅀐偵之孝剛驍勇善馬槊與建德遇遂擊之建德敗走右方兵救之擊斬孝剛建德怒還攻黎陽克之虜淮安王神通李丗勣父蓋魏徵及帝妺同安公主唯李丗勣以數百􅀐走度河數日以其父故還詣建德降衛州聞黎陽陷亦降建德以李丗勣為左驍衛將軍使守黎陽常以其父葢自隨為質以魏徵為起居舎人滑州刺史王軌奴殺軌攜其首詣建德降建德曰奴殺主大逆吾何為受之立命斬奴返其首於滑州吏民感悅即日請降於是其旁州縣及徐圓朗等皆望風歸附己未建德還洺州築萬春宫徙都之置淮安王神通於下博待以客禮行軍揔管羅士信帥勇士夜入洛陽外郭縱火焚清化里而還壬戌士信拔青城堡王丗充自將兵徇地至滑臺臨黎陽尉氏城主時德叡汴州刺史王要漢亳州刺史丁叔則遣使降之以德叡為尉州刺史要漢伯當之兄也夏矦端至黎陽李丗勣發兵送之自澶淵濟河傳檄州縣東至于海南至于淮二十餘州皆遣使來降行至譙州㑹汴亳降於王丗充還路遂絶端素得衆心所從二千人雖糧盡不忍委去端坐澤中殺馬以饗士因歔欷謂曰卿等鄉里皆已從賊特以共事之情未能見委我奉王命不可從卿卿有妻子無宜效我可斬吾首歸賊必獲富貴衆皆流涕曰公於唐室非有親屬直以忠義志不圖存某等雖賤心亦人也寧肯害公以求利乎端曰卿不忍見殺吾當自刎衆抱持之乃復同進潜行五日餒死及為賊所擊奔潰相失者大半唯餘五十三人同走采䝁豆生食之端持節未甞離身屢遣從者散自求生衆又不可時河南之地皆入丗充唯杞州刺史李公逸為唐堅守遣兵迎端館給之丗充遣使召端解衣遺之仍送除書以端為淮南郡公尚書少吏部端對使者焚書毁衣曰夏矦端天子大使豈受王丗充官乎汝欲吾往唯可取吾首耳因解節旄懷之置刃於竿自山中西走無復蹊徑冒踐荆棘晝夜兼行得逹宜陽從者墜崖溺水為虎狼所食又喪其半其存者鬢髮禿落無復人狀端詣闕見上但謝無功初不自言艱苦上復以為祕書監郎楚之至山東亦為竇建德獲楚之不屈竟得還王丗充遣其從弟丗辨以徐亳之兵攻雍丘李公逸遣使求救上以隔賊境不能救公逸乃留其屬李善行守雍丘身帥輕􅀐入朝至襄城為丗充伊州刺史張殷所獲丗充謂曰卿越鄭臣唐其說安在公逸曰我於天下唯知有唐不知有鄭丗充怒斬之善行亦没上以公逸子為襄邑公甲子上祠華山資治通鑑卷第一百八十七
