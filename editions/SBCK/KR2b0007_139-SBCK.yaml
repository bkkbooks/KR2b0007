seq: 139
front:
  text: 過爾輕率今猶欲將二三千人自隨公意何如顯逹曰殿下若不留部曲乃是大違敕㫖其事不輕且此間人亦難可收用子懋黙然顯逹因辭出即發去子懋計未立乃之尋陽西昌矦鸞將謀廢立引前鎮西諮議參軍蕭衍與同謀荆州刺史隨王子隆性温和有文才鸞欲徵之恐其不從衍曰隨王雖有美名其實庸劣既無智謀之士爪牙唯仗司馬垣歷生武陵太守卞白龍耳二人唯利是從若啗以顯職無有不來隨王止須折簡耳鸞從之徵歷生爲太子左衞率白龍爲游擊將軍二人並至續召子隆爲侍中撫軍將軍豫州刺史崔慧景髙武舊將鸞疑之以蕭衍爲寜朔將軍戍壽陽慧景懼白服出迎衍撫安之辛亥鬰林王祀南郊戊午拜崇安陵癸亥魏主南巡戊辰過比干墓祭以太牢魏主自爲祝文曰烏呼介士胡不我臣帝寵幸中書舍人綦母珍之朱隆之直閤將軍曹道剛周奉叔宦者徐龍駒等珍之所論薦事無不允內外要職皆先論價旬月之閒家累千金擅取官物及役作不俟詔㫖有司至相語云寜拒至尊敇不可違舍人命帝以龍駒爲後閤舍人常居含章殿著黄綸帽􅀍貂裘南面向案代帝畫敕左右侍直與帝不異帝自山陵之後即與左右微服遊走市里好於丗宗崇安陵隧中擲塗賭跳作諸鄙戲極意賞賜左右動至百數十萬每見錢曰我昔思汝一枚不得今日得用汝未丗祖聚錢上庫五億萬齋庫亦出三億萬金銀布帛不可勝計鬰林王即位未朞嵗所用垂盡入主衣庫令何后及寵姬以諸寳器相投擊破碎之用爲笑樂蒸於丗祖幸姬霍氏更其姓曰徐朝事大小皆决於西昌矦鸞鸞數諫爭帝多不從心忌鸞欲除之以尚書右僕射鄱陽王鏘爲丗祖所厚私謂鏘曰公聞鸞於灋身如何鏘素和謹對曰臣鸞於宗戚最長且受􅀉先帝臣等皆年少朝廷所損唯鸞一人願陛下無以爲慮帝退謂徐龍駒曰我欲與公共計取鸞公既不同我不能獨辦且復小聽衞尉蕭諶丗祖之族子也自丗祖在郢州諶巳爲腹心及即位常典宿衞機密之事無不預聞征南諮議蕭坦之諶之族人也嘗爲東宫直閤爲丗宗所知帝以二人祖父舊人甚親信之諶每請急出宿帝通夕不寐諶還乃安坦之得出入後宫帝褻狎宴遊坦之皆在側帝醉後常裸袒坦之輒扶持諌諭西昌矦鸞欲有所諌帝在後宫不出唯遣諶坦之徑進乃得聞逹何后亦淫泆私於帝左右楊珉與同寢處如伉儷又與帝相愛狎故帝恣之迎后親戚入宫以耀靈殿處之齋閤通夜洞開外内淆雜無復分别西昌矦鸞遣坦之入奏誅珉何后流涕覆面曰楊郎好年少無罪何可枉殺坦之附耳語帝曰外閒並云楊珉與皇后有情事彰遐邇不可不誅帝不得巳許之俄敇原之巳行刑矣鸞又啓誅徐龍駒帝亦不能違而心忌鸞益甚蕭諶蕭坦之見帝狂縱日甚無復悛攺恐禍及己乃更回意附鸞勸其廢立隂爲鸞耳目帝不之覺也周奉叔恃勇挾􅀔陵轢公卿常翼單刀二十口自隨出入禁闥門衞不敢訶每語人曰周郎刀不識君鸞忌之使蕭諶蕭坦之說帝出奉叔爲外援巳巳以奉叔爲靑州刺史曹道剛爲中軍司馬奉叔就帝求千户矦許之鸞以爲不可封曲江縣男食三百户奉叔大怒於衆中攘刀厲色鸞說諭之乃受奉叔辭畢將之鎮部伍巳出鸞與蕭諶稱敇召奉叔於省中􅇌殺之啓云奉叔慢朝廷帝不􅀗巳可其奏溧陽令錢唐杜文謙嘗爲南郡王侍讀前此說綦母珍之曰天下事可知灰盡粉滅匪朝伊夕不早爲計吾徒無􅀋矣珍之曰計將安出文謙曰先帝舊人多見擯斥今召而使之誰不慷慨近聞王洪範與宿衞將萬靈㑹等共語皆攘袂搥牀君其密報周奉叔使萬靈㑹等殺蕭諶則宫內之兵皆我用也即勒兵入尚書斬蕭令兩都伯力耳今舉大事亦死不舉事亦死二死等耳死社稷可乎若遲疑不斷復少日録君稱敕賜死父母爲殉在眼中矣珍之不能用及鸞殺奉叔并收珍之文謙殺之
