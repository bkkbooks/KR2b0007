body:
  text: 乙亥魏主如洛陽西宫中書侍郎韓顯宗上書陳四事其一以爲竊聞輿駕今夏不巡三齊當幸中山往冬輿駕停鄴當農隙之時猶比屋供奉不勝勞費况今蠶麥方急將何以堪命且六軍涉暑恐生癘疫臣願早還北京以省諸州供張之苦成洛都營繕之役其二以爲洛陽宫殿故基皆魏明帝所造前丗巳譏其奢今兹營繕宜加裁損又頃來北都富室競以第舎相尚宜因遷徙爲之制度及端廣衢路通利溝渠其三以爲陛下之還洛陽輕將從􅀐王者於闈闥之内猶施警蹕況涉履山河而不加三思乎其四以爲陛下耳聽灋音目翫墳典口對百辟心虞萬機景􅉴而食夜分而寢加以孝思之至隨時而深文章之業日成篇卷雖叡明所用未足爲煩然非所以嗇神養性保無疆之祚也伏願陛下垂拱司契而天下治矣帝頗納之顯宗麒麟之子也顯宗又上言以爲州郡貢察徒有秀孝之名而無秀孝之實朝廷但檢其門望不復彈坐如此則可令别貢門望以叙士人何假冒秀孝之名也夫門望者乃其父祖之遺烈亦何益於皇家益於時者賢才而巳苟有其才雖屠釣奴虜聖王不恥以爲臣苟非其才雖三后之㣧墜於皁􅀠矣議者或云今丗等無竒才不若取士於門此亦失矣豈可以丗無周邵遂廢宰相邪但當校其寸長銖重者先叙之則賢才無遺矣又刑罸之要在於明當不在於重苟不失有罪雖捶撻之薄人莫敢犯若容可僥幸雖參夷之嚴不足懲禁今內外之官欲邀當時之名爭以深酷爲無私迭相敦厲遂成風俗陛下居九重之內視人如赤子百司分萬務之任遇下如仇讎是則堯舜止一人而桀紂以千百和氣不至蓋由於此謂宜敕示百僚以惠元元之命又昔周居洛邑猶存宗周漢遷東都京兆置尹案春秋之義有宗廟曰都無曰邑況代京宗廟山陵所託王業所基其爲神鄉福地實亦逺矣今便同之郡國臣竊不安謂宜建畿置尹一如故事崇本重舊光示萬葉又古者四民異居欲其業專志定也太祖道武皇帝創基撥亂日不暇給然猶分别士庶不令雜居工伎屠沽各有攸處但不設科禁乆而混殽今聞洛邑居民之制專以官位相從不分族􅀋夫官位無常朝榮夕悴則是衣冠皁􅀠不日同處矣借使一里之內或調習歌舞或講肄詩書縱羣兒隨其所之則必不棄歌舞而從詩書矣然則使工伎之家習士人風禮百年難成士人之子効工伎容態一朝而就是以仲尼稱里仁之美孟母勤三徙之訓此乃風俗之原不可不察朝廷每選人士校其一㛰一宦以爲升降何其宻也至於度地居民則清濁連甍何其略也今因遷徙之初皆是公地分别工伎在於一言有何可疑而闕盛美又南人昔有淮北之地自比中華僑置郡縣自歸附聖化仍而不攺名實交錯文書難辨宜依地理舊名一皆釐革小者并合大者分置及中州郡縣昔以户少併省今民口既多亦可復舊又君人者以天下爲家不可有所私倉庫之儲以供軍國之用自非有功德者不當加賜在朝諸貴受禄不輕比來頒賚動以千計若分以賜鰥寡孤獨之民所濟實多今直以與親近之臣殆非周急不繼富之謂也帝覽奏甚善之二月乙丑魏主如河隂規方澤辛卯帝祀明堂司徒參軍劉斆等聘于魏丙申魏徙河南王幹爲趙郡王潁川王雍爲髙陽王壬寅魏主北巡癸卯濟河三月壬申至平城使羣臣更論遷都利害各言其志燕州刺史穆羆曰今四方未定未宜遷都且征伐無馬將何以克帝曰廐牧在代何患無馬今代在􅁪山之北九州之外非帝王之都也尚書于果曰臣非以代地爲勝伊洛之美也但自先帝以來乆居於此百姓安之一旦南遷衆情不樂平陽公丕曰遷都大事當迅之卜筮帝曰昔周邵聖賢乃能卜宅今無其人卜之何益且卜以決疑不疑何卜黄帝卜而􅀛焦天老曰吉黄帝從之然則至人之知未然審於􅀛矣王者以四海爲家或南或北何常之有朕之逺祖丗居北荒平文皇帝始都東木根山昭成皇帝更營盛樂道武皇帝遷于平城朕幸屬勝殘之運何爲獨不得遷乎羣臣不敢復言羆壽之孫果烈之弟也癸酉魏主臨朝堂部分遷留夏四月庚辰魏罷西郊祭天辛巳武陵昭王曅卒戊子竟陵文宣王子良以憂卒帝常憂子良爲變聞其卒甚喜臣光曰孔子稱鄙夫不可與事君未得之患得之既得之患失之苟患失之無所不至王融乗危徼幸謀易嗣君子良當時賢王雖素以忠慎自居不免憂死迹其所以然正由融速求富貴而巳輕躁之士烏可近哉巳亥魏罷五月五日七月七日饗祖考魏録尚書事廣陵王羽奏令文每嵗終州鎮列屬官治狀及再考則行黜陟去十五年京官盡經考爲三等今巳三載臣輒凖外考以定京官治行魏主曰考績事重應􅀜朕聽不可輕發且俟至秋閏月丁卯鎮軍將軍鸞即本號開府儀同三司戊辰以新安王昭文爲楊州刺史五月甲戌朔日有食之六月己巳魏遣兼貟外散􅀐常侍盧昶兼貟外散􅀐侍郎王清石來聘昶度丗之子也清石丗仕江南魏主謂清石曰卿勿以南人自嫌彼有知識欲見則見欲言則言凡使人以和爲貴勿迭相矜夸見於辭色失將命之體也秋七月乙亥魏以宋王劉昶爲使持節都督吳越楚諸軍事大將軍鎮彭城魏主親餞之以王肅爲昶府長史昶至鎮不能撫接義故卒無成功壬午魏安定靖王休卒自卒至殯魏主三臨其第葬之如尉元之禮送之出郊慟哭而返壬戌魏主北巡西昌矦鸞既誅徐龍駒周奉叔而尼媪外入者頗傳異語中書令何胤以后之從叔爲帝所親使直殿省帝與胤謀誅鸞令胤受事胤不敢當依違諫説帝意復止乃謀出鸞於西州中敇用事不復􅀜咨於鸞是時蕭諶蕭坦之握兵權左僕射王晏揔尚書事諶密召諸王典籖約語之不許諸王外接人物諶親要日乆衆皆憚而從之鸞以其謀告王晏晏聞之響應又告丹楊尹徐孝嗣孝嗣亦從之驃􅀐録事南陽樂豫謂孝嗣曰外傳籍籍似有伊周之事君蒙武帝殊常之恩荷託附之重恐不得同人此舉人笑褚公至今齒冷孝嗣心然之而不能從帝謂蕭坦之曰人言鎮軍與王晏蕭諶欲共廢我似非虚傳卿所聞云何坦之曰天下寜當有此誰樂無事廢天子邪朝貴不容造此論當是諸尼姥言耳豈可信邪官若無事除此三人誰敢自保直閤將軍曹道剛疑外間有異密有處分謀未能發時始興內史蕭季敞南陽太守蕭潁基皆內遷諶欲待二人至藉其勢力以舉事鸞慮事變以告坦之坦之馳謂諶曰廢天子古來大事比聞曹道剛朱隆之等轉巳猜疑衞尉明曰若不就事無所復及弟有百嵗母豈能坐聽禍敗正應作餘計耳諶惶遽從之壬辰鸞使蕭諶先入宫遇曹道剛及中書舍人朱隆之皆殺之直後徐僧亮盛怒大言於衆曰吾等荷恩今日應死報又殺之鸞引兵自尚書入雲龍門戎服加朱衣於上比入門三失履王晏徐孝嗣蕭坦之陳顯逹王廣之沈文季皆隨其後帝在壽昌殿聞外有變猶密爲手敇呼蕭諶又使閉內殿諸房閤俄而諶引兵入壽昌閤帝走趨徐姬房拔劒自刺不入以帛纒頸輿接出延德殿諶初入殿宿衞將士皆操弓楯欲拒戰諶謂之曰所取自有人卿等不須動宿衞素􅀠服於諶皆信之及見帝出各欲自奮帝竟無一言行至西弄弑之輿尸出殯徐龍駒宅葬以王禮徐姬及諸嬖倖皆伏誅鸞既執帝欲作太后令徐孝嗣於袖中出而進之鸞大恱癸巳以太后令追廢帝爲鬱林王又廢何后爲王妃迎立新安王昭文吏部尚書謝瀹方與客圍棊左右聞有變驚走報瀹瀹每下子輒云其當有意竟局乃還齋卧竟不問外事大匠卿虞悰竊歎曰王徐遂縛袴廢天子天下豈有此理邪悰嘯父之孫也朝臣被召入宫國子祭酒江斆至雲龍門託藥發吐車中而去西昌矦鸞欲引中散大夫孫謙爲腹心使兼衞尉給甲仗百人謙不欲與之同輒散甲士鸞亦不之罪也丁酉新安王即皇帝位時年十五以西昌矦鸞爲驃􅀐大將軍録尚書事楊州刺史宣城郡公大赦攺元延興辛丑魏主至朔州八月甲辰以司空王敬則爲太尉鄱陽王鏘爲司徒車􅀐大將軍陳顯逹爲司空尚書左僕射王晏爲尚書令魏主至隂山以始安王遥光爲南郡太守不之官遥光鸞之兄子也鸞有異志遥光贊成之凡大誅賞無不預謀戊申以中書郎蕭遥欣爲兖州刺史遥欣遥光之弟也鸞欲樹置親黨故用之癸丑魏主如懐朔鎮己未如武川鎮辛酉如撫宜鎮甲子如柔􅀇鎮乙丑南還辛未至平城九月壬申朔魏詔曰三載考績三考黜陟可黜者不足爲遲可進者大成賖緩朕今三載一考即行黜陟欲令愚滯無妨於賢者才能不擁於下位各令當曹考其優劣爲三等其上下二等仍分爲三六品巳下尚書重問五品巳上朕將親與公卿論其善惡上上者遷之下下者黜之中者守其本任魏主之北巡也留任城王澄銓簡舊臣自公矦巳下有官者以萬數澄品其優劣能否爲三等人無怨者壬午魏主臨朝堂黜陟百官謂諸尚書曰尚書樞機之任非徒揔庶務行文書而巳朕之得失盡在於此卿等居官年垂再朞未嘗獻可替否進一賢退一不肖此最罪之大者又謂錄尚書事廣陵王羽曰汝爲朕弟居機衡之右無勤恪之聲有阿黨之迹今黜汝録尚書廷尉但爲特進太子太保又謂尚書令陸叡曰叔翻到省之初甚有善稱比來偏頗懈怠由卿不能相導以義雖無大責宜有小罰今奪卿禄一朞又謂左僕射拓跋贊曰叔翻受黜卿應大辟但以咎歸一人不復重責今解卿少師削禄一朞又謂左丞公孫良右丞乞伏義受曰卿亦應大辟可以白衣守本官冠服禄䘏盡從削奪若三年有成還復本任無成永歸南畒又謂尚書任城王澄曰叔神志驕傲可解少保又謂長兼尚書于果曰卿不勤職事數辭以疾可解長兼削禄一朞其餘守尚書尉羽盧淵等並以不軄或解任或黜官或奪禄皆靣數其過而行之淵昶之兄也帝又謂陸叡曰北人每言北俗質魯何由知書朕聞之深用憮然今知書者甚衆豈皆聖人顧學與不學耳朕修百官興禮樂其志固欲移風易俗朕爲天子何必居中原正欲卿等子孫漸染美俗聞見廣博若永居􅁪北復值不好文之主不免面牆耳對曰誠如聖言金日磾不入仕漢朝何能七丗知名帝甚恱鬱林王之廢也鄱陽王鏘初不知謀及宣城公鸞權勢益重中外皆知其蓄不臣之志鏘毎詣鸞鸞常屣履至車後迎之語及家國言淚俱發鏘以此信之宫臺之內皆屬意於鏘勸鏘入宫發兵輔政制局監謝粲說鏘及隨王子隆曰二王但乗油壁車入宫出天子置朝堂夾輔號令粲等閉城門上仗誰敢不同東城人正共􅅞送蕭令耳子隆欲定計鏘以上臺兵力既悉度東府且慮事不捷意甚猶豫馬隊主劉巨丗祖時舊人詣鏘請閒叩頭勸鏘立事鏘命駕將入復還內與母陸太妃别日暮不成行典籖知其謀告之癸酉鸞遣兵二千人圍鏘第殺鏘遂殺子隆及謝粲等於時太祖諸子子隆最壯大有才能故鸞尤忌之江州刺史晉安王子懋聞鄱陽隨王死欲起兵謂防閤吳郡陸超之曰事成則宗廟􅀗安不成猶爲義􅀑防閤丹陽董僧慧曰此州雖小宋孝武嘗用之若舉兵向闕以請鬱林之罪誰能禦之子懋母阮氏在建康密遣書迎之阮氏報其同母兄于謡之爲計謡之馳告宣城公鸞乙亥假鸞黄􅃏內外纂嚴遣中護軍王􅀇邈討子懋又遣軍主裴叔業與于謡之先襲尋陽聲云爲郢府司馬子懋知之遣三百人守湓城叔業泝流直上至夜回襲湓城城局參軍樂賁開門納之子懋聞之帥府州兵力據城自守子懋部曲多雍州人皆勇躍願奮叔業畏之遣于謠之說子懋曰今還都必無過憂正當作散官不失富貴也子懋既不出兵攻叔業衆情稍沮中兵參軍于琳之瑶之兄也說子懋重賂叔業可以免禍子懋使琳之往琳之因說叔業取子懋叔業遣軍主徐􅀇慶將四百人隨琳之入州城僚佐皆奔散琳之從二百人拔白刃入齋子懋罵曰小人何忍行此琳之以䄂鄣面使人殺之王􅀇邈執董僧慧將殺之僧慧曰晉安舉義兵僕實豫其謀得爲主人死不恨矣願至大斂畢退就鼎鑊􅀇邈義之具以白鸞免死配東冶子懋子昭基九嵗以方二寸絹爲書參其消息并遺錢五百行金得逹僧慧視之曰郎君書也悲慟而卒于琳之勸陸超之逃亡超之曰人皆有死此不足懼吾若逃亡非唯孤晉安之眷亦恐田横客笑人􅀇邈等欲囚以還都超之端坐俟命超之門生謂殺超之當得賞密自後斬之頭墜而身不僵􅀇邈厚加殯斂門生亦助舉棺棺墜壓其首折頸而死鸞遣平西將軍王廣之襲南兖州刺史安陸王子敬廣之至歐陽遣部將濟隂陳伯之先驅伯之因城開獨入斬子敬鸞又遣徐􅀇慶西上害諸王臨海王昭秀爲荆州刺史西中郎長史何昌㝢行州事􅀇慶至江陵欲以便宜從事昌㝢曰僕受朝廷意􅀉翼輔外藩殿下未有愆失君以一介之使來何容即以相付邪若朝廷必湏殿下當自啓聞更聽後㫖昭秀由是得還建康昌㝢尚之之弟子也鸞以吴興太守孔琇之行郢州事欲使之殺晉熈王銶琇之辭不許遂不食而死琇之靖之孫也裴叔業自尋陽仍進向湘州欲殺湘州刺史南平王銳防閤周伯玉大言於衆曰此非天子意今斬叔業舉兵匡社稷誰敢不從銳典籖叱左右斬之乙酉殺銳又殺郢州刺史晉熈王銶南豫州刺史宜都王鏗丁亥以廬陵王子卿爲司徒桂陽王鑠爲中軍將軍開府儀同三司冬十月丁酉解嚴以宣城公鸞爲太傅領大將軍楊州牧都督中外諸軍事加殊禮進爵爲王宣城王謀繼大統多引朝廷名士與參籌策侍中謝朏心不願乃求出爲吳興太守至郡致酒數斛遺其弟吏部尚書瀹爲書曰可力飲此勿豫人事臣光曰臣聞衣人之衣者懐人之憂食人之食者死人之事二謝兄弟比肩貴近安享榮禄危不預知爲臣如此可謂忠乎宣城王雖專國政人情猶未服王胛上有赤誌驃􅀐諮議參軍考城江祏勸王出以示人王以示晉壽太守王洪範曰人言此是日月相卿幸勿泄洪範曰公日月在軀如何可隱當轉言之王母祏之姑也戊戌殺桂陽王鑠衡陽王鈞江夏王鋒建安王子真巴陵王子倫鑠與鄱陽王鏘齊名鏘好文章鑠好名理時人稱爲鄱桂鏘死鑠不自安至東府見宣城王還謂左右曰向録公見接慇勤流連不能巳而面有慙色此必欲殺我是夕遇害宣城王每殺諸王常夜遣兵圍其第斬􅀜踰垣呼譟而入家貲皆封籍之江夏王鋒有才行宣城王嘗與之言遥光才力可委鋒曰遥光之於殿下猶殿下之於髙皇衞宗廟安社稷實有攸􅀉宣城王失色及殺諸王鋒遺宣城王書誚責之宣城王深憚之不敢於第收鋒使兼祠官於太廟夜遣兵廟中收之鋒出登車兵人欲上車鋒有力手擊數人皆仆地然後死宣城王遣典籖柯令孫殺建安王子真子真走入牀下令孫手牽出之叩頭乞爲奴不許而死又遣中書舎人茹灋亮殺巴陵王子倫子倫性英果時爲南蘭陵太守鎮琅邪城有守兵宣城王恐不肯就死以問典籖華伯茂伯茂曰公若以兵取之恐不可即辦若委伯茂一夫力耳乃手自執酖逼之子倫正衣冠出受詔謂灋亮曰先朝昔滅劉氏今日之事理數固然君是身家舊人今衘此使當由事不􅀗巳此酒非勸酬之爵因仰之而死時年十六灋亮及左右皆流涕初諸王出鎮皆置典籖主帥一方之事悉以委之時入奏事一嵗數返時主輒與之閒語訪以州事刺史美惡專繫其口自刺史以下莫不折節奉之􅁪慮弗及於是威行州部大爲姦利武陵王曅爲江州性烈直不可干典籖趙渥之謂人曰今出都易刺史及見丗祖盛毁之曅遂免還南海王子罕戍琅邪欲暫游東堂典籖姜秀不許子罕還泣謂母曰兒欲移五步亦不得與囚何異邵陵王子貞嘗求熊白厨人荅典籖不在不敢與永明中巴東王子響殺劉寅等丗祖聞之謂羣臣曰子響遂反戴僧靜大言曰諸王都自應反豈唯巴東上問其故對曰天生無罪而一時被囚取一挺藕一杯漿皆諮籖帥籖帥不在則竟日忍渴諸州唯聞有籖帥不聞有刺史何得不反竟陵王子良嘗問衆曰士大夫何意詣籖帥參軍范雲曰詣長史以下皆無益詣籖帥立有倍本之價不詣謂何子良有愧色及宣城王誅諸王皆令典籖殺之竟無一人能抗拒者孔珪聞之流涕曰齊之衡陽江夏最有意而復害之若不立籖帥故當不至於此宣城王亦深知典籖之弊乃詔自今諸州有急事當密以奏聞勿復遣典籖入都自是典籖之任浸輕矣蕭子顯論曰帝王之子生長富厚期出閨閫暮司方岳防驕翦逸積代常典故輔以上佐􅂤自帝心勞舊左右用爲主帥飲食遊居動應聞啓處地雖重行已莫由威不在身恩未下及一朝艱難揔至望其釋位扶危何可得矣斯宋氏之餘風至齊室而尤弊也癸卯以寜朔將軍蕭遥欣爲豫州刺史黄門郎蕭遥昌爲郢州刺史輔國將軍蕭誕爲司州刺史遥昌遥欣之弟誕諶之兄也甲辰魏以太尉東陽王丕爲太傅録尚書事留守平城戊申魏主親告太廟使髙陽王雍于烈奉遷神主于洛陽辛亥發平城海陵王在位起居飲食皆諮宣城王而後行嘗思食蒸魚菜太官令荅無録公命竟不與辛亥皇太后令曰嗣主沖幼庶政多昧且早嬰尫疾弗克負荷太傅宣城王㣧體宣皇鍾慈太祖宜入承寶命帝可降封海陵王吾當歸老别館且以宣城王爲太祖第三子癸亥髙宗即皇帝位大赦攺元以太尉王敬則爲大司馬司空陳顯逹爲太尉尚書令王晏加驃􅀐大將軍左僕射徐孝嗣加中軍大將軍中領軍蕭諶爲領軍將軍度支尚書虞悰稱疾不陪位帝以悰舊人欲引參佐命使王晏齎廢立事示悰悰曰主上聖明公卿戮力寜假朽老以贊惟新乎不敢聞命因慟哭朝議欲糾之徐孝嗣曰此亦古之遺直乃止帝與羣臣宴㑹詔功臣上酒王晏等興席謝瀹獨不起曰陛下受命應天順人王晏妄叨天功以爲已力帝大笑解之座罷晏呼瀹共載還令省欲相撫恱瀹正色曰君巢窟在何處晏甚憚之丁卯詔藩牧守宰或有薦獻事非子立皇子寶卷爲太子魏主至洛陽欲澄清流品以尚書崔亮兼吏部郎亮道固之兄孫也魏主敇後軍將軍宁文福行牧地福表石濟以西河內以東距河凡十里魏主自代徙雜畜置其地使福掌之畜無耗失以爲司衛監初丗祖平統萬及秦涼以河西水草豐美用爲牧地畜甚蕃息馬至二百餘萬匹橐駞半之牛羊無數及髙祖置牧􅂣於河陽常畜戎馬十萬匹每嵗自河西徙牧并州稍復南徙欲其漸習水土不至死傷而河西之牧愈更蕃滋及正光以後皆爲寇盜所掠無孑遺矣永明中御史中丞沈淵表百官年七十皆令致仕並窮困私門庚子詔依舊銓叙上輔政所誅諸王皆復屬籍封其子爲矦上詐稱海陵㳟王有疾數遣御師瞻視因而殞之葬禮並依漢東海㳟王故事魏郢州刺史韋珍在州有聲績魏主賜以駿馬榖帛珍集境内孤貧者悉散與之謂之曰天子以我能綏撫卿等故賜以榖帛吾何敢獨有之魏主以上廢海陵王自立謀大舉入寇㑹邊將言雍州刺史下邳曹虎遣使請降於魏十一月辛丑朔魏遣行征南將軍薛真度督四將向襄陽大將軍劉昶平南將軍王肅向義陽徐州刺史拓跋衍向鍾離平南將軍廣平劉藻向南鄭真度安都從祖弟也以尚書盧淵爲安南將軍督襄陽前鋒諸軍淵辭以不習軍旅不許淵曰但恐曹虎爲周魴耳魏主欲變易舊風壬寅詔禁士民胡服國人多不恱通直散􅀐常侍劉芳纘之族弟也與給事黄門侍郎太原郭祚皆以文學爲帝所親禮多引與講論及密議政事大臣貴戚皆以爲踈已怏怏有不平之色帝使給事黄門侍郎陸凱私諭之曰至尊但欲廣知古事詢訪前丗灋式耳終不親彼而相䟽也衆意乃稍解凱馛之子也魏主欲自將入寇癸卯中外戒嚴戊申詔代民遷洛者復租賦三年相州刺史髙閭上表稱洛陽草創曹虎既不遣質任必非誠心無宜輕舉魏主不從乆之虎使竟不再來魏主引公卿議行留之計公卿或以爲宜止或以爲宜行帝曰衆人紛紜莫知所從必欲盡行留之勢宜有客主共相起發任城鎮南爲留議朕爲行論諸公坐聽得矣長者從之衆皆曰諾鎮南將軍李沖曰臣等正以遷都草創人思少安爲内應者未得審諦不宜輕動帝曰彼降欵虚實誠未可知若其虚也朕巡撫淮甸訪民疾苦使彼知君德之所在有北向之心若其實也今不以時應接則失乗時之機孤歸義之誠敗朕大略矣任城王澄曰虎無質任又使不再來其詐可知也今代都新遷之民皆有戀本之心扶老􅂝幼始就洛邑居無一椽之室食無甔石之儲又冬月垂盡東作將起乃百堵皆興俶載南畒之時而驅之使擐甲執兵泣當白刃殆非歌舞之師也且諸軍巳進非無應接若降欵有實待既平樊􅃆然後鑾輿順動亦何晩之有今率然輕􅘏上下疲勞若空行空返恐挫損天威更成賊氣非䇿之得者也司空穆亮以爲宜行公卿皆同之澄謂亮曰公輩在外之時見張旗授甲皆有憂色平居論議不願南征何得對上即爲此語面背不同事涉欺佞豈大臣之義國士之體乎萬一傾危皆公輩所爲也沖曰任城王可謂忠於社稷帝曰任城以從朕者爲佞不從朕者豈必皆忠夫小忠者大忠之賊無乃似諸澄曰臣愚闇雖涉小忠要是竭誠謀國不知大忠者竟何所據帝不從辛亥發洛陽以北海王詳爲尚書僕射統留臺事李沖兼僕射同守洛陽給事黄門侍郎崔休爲左丞趙郡王幹都督中外諸軍事始平王勰將宗子軍宿衞左右休逞之􅀇孫也戊辰魏主至懸瓠己巳詔壽陽鍾離馬頭之師所􅀗男女皆放還南曹虎果不降魏主命盧淵攻南陽淵以軍中乏糧請先攻赭陽以取葉倉魏主許之乃與征南大將軍城陽王鸞安南將軍李佐荆州刺史韋珍共攻赭陽鸞長壽之子佐寶之子也北襄城太守成公期閉城拒守薛真度軍於沙堨南陽太守房伯玉新野太守劉思忌拒之先是魏主遣中書監髙閭治古樂㑹閭出爲相州刺史是嵗表薦著作郎韓顯宗太樂祭酒公孫崇參知鍾律帝從之資治通鑑卷第一百三十九
