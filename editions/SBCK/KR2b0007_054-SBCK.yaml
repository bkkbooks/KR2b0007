body:
  text: 以司空韓縯為司徒以太常北海孫朗為司空延熹元年夏五月甲戌晦日有食之太史令陳授因小黄門徐璜陳日食之變咎在大將軍冀冀聞之諷雒陽收考授死於獄帝由是怒冀京師蝗六月戊寅赦天下改元大雩秋七月甲子太尉黄瓊免以太常胡廣為太尉冬十月帝校獵廣成遂幸上林苑十二月南匈奴諸部並叛與烏桓鮮卑冦縁邊九郡帝以京兆尹陳􅀛為度遼將軍􅀛臨行上疏曰臣聞三辰不軌擢士為相蠻夷不恭拔卒為將臣無文武之材而忝鷹􅀭之任雖殁軀體無所云補今西州邊鄙土地塉埆民數更冦虜室家殘破雖含生氣實同枯朽往嵗并州水雨災螟互生稼穡荒秏租更空闕陛下以百姓為子焉可不垂撫循之恩哉古公西伯天下歸仁豈復輿金輦寳以為民惠乎陛下繼中興之統承光武之業臨朝聽政而未留聖意且牧守不良或出中官懼逆上㫖取過目前呼嗟之聲招致災害胡虜凶悍因衰縁隙而令倉庫單於豺狼之口功業無銖兩之効皆由將帥不忠聚姦所致前凉州刺史祝良初除到州多所糾罰太守令長貶黜將半政未踰時功効卓然實應賞異以勸功能改任牧守去斥姦殘又宜更選匈奴烏桓䕶羗中郎將校尉簡練文武授之灋令除并凉二州今年租更寛赦罪隸掃除更始則善吏知奉公之祐惡者覺營私之禍胡馬可不窺長城塞下無􅀱望之患矣帝乃更選幽并刺史自營郡太守都尉以下多所革易下詔為陳將軍除并凉一年租賦以賜吏民􅀛到職州郡重足震栗省息經用嵗以億計詔拜安定屬國都尉張奐為北中郎將以討匈奴烏桓等匈奴烏桓燒度遼將軍門引屯赤阬煙火相望兵衆大恐各欲亡去奐安坐帷中與弟子講誦自若軍士稍安乃潛誘烏桓隂與和通遂使斬匈奴屠各渠帥襲破其衆諸胡悉降奐以南單于車兒不能統理國事乃拘之奏立左谷蠡王為單于詔曰春秋大居正車兒一心向化何罪而黜其遣還庭大將軍冀與陳􅀛素有隙譖其沮毁國威挑取功譽不為胡虜所畏坐徵還以种暠為度遼將軍􅀛遂乞骸骨歸田里復徵為尚書冀􅁀虐日甚􅀛上疏言其罪狀請誅之帝不省􅀛自知必為冀所害不食七日而死种暠到營所先宣恩信誘降諸胡其有不服然後加討羗虜先時有生見獲質於郡縣者悉遣還之誠心懐撫信賞分明由是羗胡皆來順服暠乃去烽燧除􅇋望邊方晏然無警入為大司農二年春二月鮮卑冦鴈門蜀郡夷冦蠶陵三月復斷刺史二千石行三年喪夏京師大水六月鮮卑冦遼東梁皇后恃姊兄䕃埶恣極奢靡兼倍前世專寵妬忌六宫莫得進見及太后崩恩寵寖衰后既無子每宫人孕育鮮得全者帝雖迫畏梁冀不敢譴怒然進御轉稀后益憂恚秋七月丙午皇后梁氏崩乙丑葬懿獻皇后于懿陵梁冀一門前後七矦三皇后六貴人二大將軍夫人女食邑稱君者七人尚公主者三人其餘卿將尹校五十七人冀專擅威柄凶恣日積宫衛近侍並樹所親禁省起居纎微必知其四方調發嵗時貢獻皆先輸上第於冀乘輿乃其次焉吏民齎貨求官請罪者道路相望百官遷召皆先到冀門牋檄謝恩然後敢詣尚書下邳吳樹為宛令之官辭冀冀賔客布在縣界以情託樹樹曰小人姦蠹比屋可誅明將軍處上將之位宜崇賢善以補朝闕自侍坐以來未聞稱一長者而多託非人誠非敢聞冀嘿然不恱樹到縣遂誅殺冀客為人害者數十人樹後為荆州刺史辭冀冀鴆之出死車上遼東太守侯猛初拜不謁冀冀託以它事腰斬之郎中汝南袁著年十九詣闕上書曰夫四時之運功成則退髙爵厚寵鮮不致災今大將軍位極功成可為至戒宜遵縣車之禮髙枕頥神傳曰木實繁者披枝害心若不抑損盛權將無以全其身矣冀聞而宻遣掩捕著乃變易姓名託病偽死結蒲為人市棺殯送冀知其詐求得笞殺之太原郝絜胡武好危言髙論與著友善絜武嘗連名奏記三府薦海内髙士而不詣冀冀追怒之敇中都官移檄禽捕遂誅武家死者六十餘人絜初逃亡知不得免因輿櫬奏書冀門書入仰藥而死家乃得全安帝嫡母耿貴人薨冀從貴人從子林慮侯承求貴人珍玩不能得冀怒并族其家十餘人涿郡崔琦以文章為冀所善琦作外戚箴白鵠賦以風冀怒琦曰昔管仲相齊樂聞譏諌之言蕭何佐漢乃設書過之吏今將軍累世台輔任齊伊周而徳政未聞黎元塗炭不能結納貞良以救禍敗反欲鉗塞士口杜蔽主聽將使􅀇黄改色馬鹿易形乎冀無以對因遣琦歸琦懼而亡匿冀捕得殺之冀秉政幾二十年威行内外天子拱手不得有所親與帝既不乎之及陳授死帝愈怒和熹皇后從兄子郎中鄧香妻宣生女猛香卒宣更適梁紀紀孫壽之舅也壽以猛色美引入掖庭為貴人冀欲認猛為其女易猛姓為梁冀恐猛姊壻議郎邴尊沮敗宣意遣客刺殺之又欲殺宣宣家與中常侍袁赦相比冀客登赦屋欲入宣家赦覺之鳴鼓㑹衆以告宣宣馳入白帝帝大怒因如厠獨呼小黄門史唐衡問左右與外舍不相得者誰乎衡對中常侍單超小黄門史左悺與梁不疑有隙中常侍徐璜黄門令具瑗常私忿疾外舍放横口不敢道於是帝呼超悺入室謂曰梁將軍兄弟專朝迫脅内外公卿以下從其風㫖今欲誅之於常侍意如何超等對曰誠國姦賊當誅日乆臣等弱劣未知聖意如何耳帝曰審然者常侍宻圖之對曰圖之不難但恐陛下腹中狐疑帝曰姦臣脅國當伏其罪何疑乎於是更召璜瑗等五人共定其議帝齧超臂出血為盟超等曰陛下今計已決勿復更言恐為人所疑冀心疑超等八月丁丑使中黄門張惲入省宿以防其變具瑗敇吏收惲以輒從外入欲圖不軌帝御前殿召諸尚書入發其事使尚書令尹勲持節勒丞郎以下皆操兵守省閤斂諸符節送省中使具瑗將左右廐騶虎賁羽林都􅀱劒㦸士合千餘人與司隸校尉張彪共圍冀第使光禄勲􅀽盱持節收冀大將軍印綬徙封比景都鄉侯冀及妻壽即日皆自殺不疑䝉先卒悉收梁氏孫氏中外宗親送詔獄無長少皆棄市它所連及公卿列校刺史二千石死者數十人太尉胡廣司徒韓縯司空孫朗皆坐阿附􅆝冀不衛宫止長壽亭減死一等免爲庶人故吏賔客免黜者三百餘人朝廷為空是時事猝從中發使者交馳公卿失其度官府市里鼎沸數日乃定百姓莫不稱慶收冀財貨縣官斥賣合三十餘萬萬以充王府用減天下税租之半散其苑囿以業窮民壬午立梁貴人為皇后追廢懿陵為貴人冡帝惡梁氏改皇后姓為薄氏乆之知為鄧香女乃復姓鄧氏詔賞誅梁冀之功封單超徐璜具瑗左悺唐衡皆為縣侯超食二萬户璜等各萬餘户世謂之五侯仍以悺衡為中常侍又封尚書令尹勲等七人皆為亭侯以大司農黄瓊為太尉光祿大夫中山祝恬為司徒大鴻臚梁國盛允為司空是時新誅梁冀天下想望異政黄瓊首居公位乃舉奏州郡素行貪汙至死徙者十餘人海内翕然稱之瓊辟汝南范滂滂少厲清節為州里所服嘗為清詔使案察冀州滂登車攬轡慨然有澄清天下之志守令臧汙者皆望風解印綬去其所舉奏莫不厭塞衆議㑹詔三府掾屬舉謠言滂奏刺史二千石權豪之黨二十餘人尚書責滂所劾猥多疑有私故滂對曰臣之所舉自非叨穢姦暴深為民害豈以汙簡札哉間以㑹日迫促故先舉所急其未審者方更參實臣聞農夫去草嘉穀必茂忠臣除姦王道以清若臣言有貳甘受顯戮尚書不能詰尚書令陳蕃上疏薦五處士豫章徐穉彭城姜肱汝南􅀽閎京兆韋著潁川李曇帝悉以安車玄纁備禮徵之皆不至穉家貧常自耕稼非其力不食恭儉義讓所居服其徳屢辟公府不起陳蕃為豫章太守以禮請署功曹穉不之免既謁而退蕃性方峻不接賔客唯穉來特設一榻去則縣之後舉有道家拜太原太守皆不就穉雖不應諸公之辟然聞其死喪輒負笈赴弔常於家豫灸雞一隻以一兩緜絮漬酒中暴乾以裹雞徑到所赴冢隧外以水漬緜使有酒氣斗米飯白茅為藉以雞置前醊酒畢留謁則去不見喪主肱與二弟仲海季江俱以孝友著聞常同被而寑不應徵聘肱嘗與季江俱詣郡夜於道為盜所劫欲殺之肱曰弟年幼父母所憐又未聘娶願殺身濟弟季江曰兄年徳在前家之珍寳國之英俊乞自受戮以代兄命盜遂兩釋焉但掠奪衣資而已既至郡中見肱無衣服怪問其故肱託以它辭終不言盜盜聞而感悔就精廬求見徵君叩頭謝罪還所略物肱不受勞以酒食而遣之帝既徵肱不至乃下彭城使畫工圖其形狀肱卧於幽闇以被韜面言患􅅭疾不欲出風工竟不得見之閎安之􅀇孫也苦身脩節不應辟召著隠居講授不脩世務曇繼母酷烈曇奉之逾謹得四時珍玩未嘗不先拜而後進鄉里以為灋帝又徵安陽魏桓其鄉人勸之行桓曰夫干祿求進所以行其志也今後宫千數其可損乎廐馬萬匹其可減乎左右權豪其可去乎皆對曰不可桓乃慨然歎曰使桓生行死歸於諸子何有哉遂隠身不出帝既誅梁冀故舊恩私多受封爵追贈皇后父鄧香為車騎將軍封安陽矦更封后母宣為昆陽君兄子康秉皆為列矦宗族皆列校郎將賞賜以巨萬計中常侍矦覽上縑五千匹帝賜爵關内矦又託以與議誅冀進封高鄉矦又封小黄門劉普趙忠等八人為鄉矦自是權埶專歸宦官矣五矦尤貪縱傾動内外時災異數見白馬令甘陵李雲露布上書移副三府曰梁冀雖持權專擅虐流天下今以罪行誅猶召家臣搤殺之耳而猥封謀臣萬户以上髙祖聞之得無見非西北列將得無解體孔子曰帝者諦也今官位錯亂小人諂進財貨公行政化日損尺一拜用不經御省是帝欲不諦乎帝得奏震怒下有司逮雲詔尚書都䕶劒㦸送黄門北寺獄使中常侍管霸與御史廷尉雜考之時􅀪農五官掾杜衆傷雲以忠諫獲罪上書願與雲同日死帝愈怒遂并下廷尉大鴻臚陳蕃上疏曰李雲所言雖不識禁忌干上逆㫖其意歸於忠國而已昔髙祖忍周昌不諱之諫成帝赦朱雲腰領之誅今日殺雲臣恐剖心之譏復議於世矣太常楊秉雒陽市長沐茂郎中上官資並上疏請雲帝恚甚有司奏以為大不敬詔切責蕃秉免歸田里茂資貶秩二等時帝在濯龍池管霸奏雲等事霸跪言曰李雲野澤愚儒杜衆郡中小吏出於狂戇不足加罪帝謂霸曰帝欲不諦是何等語而常侍欲原之邪顧使小黄門可其奏雲衆皆死獄中於是嬖寵益横太尉瓊自度力不能制乃稱疾不起上疏曰陛下即位以來未有勝政諸梁秉權豎宦充朝李固杜喬既以忠言横見殘滅而李雲杜衆復以直道繼踵受誅海内傷懼益以怨結朝野之人以忠為諱尚書周永素事梁冀假其威勢見冀將衰乃陽毁示忠遂因姦計亦取封侯又黄門挾邪羣輩相黨自冀興盛腹背相親朝夕圖謀共構姦軌臨冀當誅無可設巧復記其惡以要爵賞陛下不加清徵審别真偽復與忠臣並時顯封使朱紫共色粉墨雜糅所謂抵金玉於砂礫碎珪璧於泥塗四方聞之莫不憤歎臣世荷國恩身輕位重敢以垂絶之日陳不諱之言書奏不納冬十月壬申上行幸長安中常侍單超疾病壬寅以超為車騎將軍十二月己巳上還自長安燒當燒何當煎勒姐等八種羗宼隴西金城塞䕶羗校尉叚熲擊破之追至羅亭斬其酋豪以下二千級獲生口萬餘人詔復以陳蕃為光祿勲楊秉為河南尹單超兄子匡為濟隂太守負埶貪放兖州刺史第五種使從事衛羽案之得臧五六千萬種即奏匡并以劾超匡窘迫賂客任方刺羽羽覺其姦捕方囚繫雒陽匡慮楊秉窮竟其事宻令方等突獄亡走尚書召秉詰責秉對曰方等無狀釁由單匡乞檻車徵匡考覈其事則姦慝蹤緒必可立得秉竟坐論作左校時泰山賊叔孫無忌宼暴徐兖州郡不能討單超以是陷第五種坐徙朔方超外孫董援為朔方太守稸怒以待之種故吏孫斌知種必死結客追種及於太原劫之以歸亡命數年會赦得免種倫之曾孫也是時封賞踰制内寵猥盛陳蕃上疏曰夫諸侯上象四七藩屏上國髙祖之約非功臣不侯而聞追録河南尹鄧萬世父遵之微功更爵尚書令黄儁先人之絶封近習以非義授邑左右以無功傳賞至乃一門之内侯者數人故緯象失度隂陽謬序臣知封事已行言之無及誠欲陛下從是而止又采女數千食肉衣綺脂油粉黛不可貲計鄙諺言盜不過五女門以女貧家也今後宫之女豈不貧國乎帝頗采其言為出宫女五百餘人但賜儁爵關内侯而封萬世南鄉侯帝從容問侍中陳留爰延朕何如主也對曰陛下為漢中主帝曰何以言之對曰尚書令陳蕃任事則治中常侍黄門與政則亂是以知陛下可與為善可與為非帝曰昔朱雲廷折欄檻今侍中面稱朕違敬聞闕矣拜五官中郎將累遷大鴻臚㑹客星經帝坐帝宻以問延延上封事曰陛下以河南尹鄧萬世有龍潛之舊封為通侯恩重公卿惠豐宗室加頃引見與之對博上下媟黷有虧尊嚴臣聞之帝左右者所以咨政徳也善人同處則日聞嘉訓惡人從游則日生邪情惟陛下逺讒䛕之人納謇謇之士則災變可除帝不能用延稱病免歸三年春正月丙申赦天下詔求李固後嗣初固既策罷知不免禍乃遣三子基兹爕皆歸鄉里時爕年十三姉文姬為同郡趙伯英妻見二兄歸具知事本黙然獨悲曰李氏滅矣自太公已來積徳累仁何以遇此宻與二兄謀豫藏匿燮託言還京師人咸信之有頃難作州郡收基兹皆死獄中文姬乃告父門生王成曰君執義先公有古人之節今委君以六尺之孤李氏存滅其在君矣成乃將燮乗江東下入徐州界變姓名為酒家傭而成賣卜於市各為異人隂相徃來積十餘年梁冀既誅燮乃以夲末告酒家酒家具車重厚遣之燮皆不受遂還鄉里追行喪服姊弟相見悲感傍人姊戒燮曰吾家血食將絶弟幸而得濟豈非天邪宜杜絶衆人勿妄往來愼無一言加於梁氏加梁氏則連主上禍重至矣唯引咎而已燮謹從其誨後王成卒燮以禮葬之每四節為設上賔之位而祠焉丙午新豐侯單超卒賜東園祕器棺中玉具及葬發五營騎士將作大匠起冢塋其後四侯轉横天下為之語曰左回天具獨坐徐卧虎唐雨墯皆競起第宅以華侈相尚其僕從皆乘牛車而從列騎兄弟姻戚宰州臨郡辜較百姓與盜無異虐徧天下民不堪命故多爲盗賊焉中常侍矦覽小黃門叚珪皆有田業近濟北界僕從賔客劫掠行旅濟北相滕延一切收捕殺數十人陳尸路衢覽珪以事訴帝延坐徵詣廷尉免左悺兄勝爲河東太守皮氏長京兆趙岐恥之即日棄官西歸唐衡兄玹爲京兆尹素與岐有隙收岐家屬宗親陷以重灋盡殺之岐逃難四方靡所不歴自匿姓名賣餅北海市中安丘孫嵩見而異之載與俱歸藏於複壁中及諸唐死遇赦乃敢出閏月西羌餘衆復與燒何大豪宼張掖晨薄校尉段熲軍熲下馬大戰至日中刀折矢盡虜亦引退熲追之且鬬且行晝夜相攻割肉食雪四十餘日遂至積石山出塞二千餘里斬燒何大帥降其餘衆而還夏五月甲戌漢中山崩六月辛丑司徒祝恬薨秋七月以司空盛允爲司徒太常虞放爲司空長沙蠻反屯益陽零陵蠻冦長沙九眞餘賊屯據日南衆轉彊盛詔復拜桂陽太守夏方為交阯刺史方威惠素著冬十一月日南賊二萬餘人相率詣方降勒姐零吾種羌圍允街叚熲擊破之泰山賊叔孫無忌攻殺都尉矦章遣中郎將宗資討破之詔徵皇甫規拜泰山太守規到官廣設方畧冦虜悉平四年春正月辛酉南宫嘉徳殿火戊子丙署火大疫二月壬辰武庫火司徒盛允免以大司農种暠為司徒三月太尉黄瓊免夏四月以太常沛國劉矩爲太尉初矩為雍丘令以禮讓化民有訟者常引之於前提耳訓告以為忿恚可忍縣官不可入使歸更思訟者感之輒各罷去甲寅封河間孝王子參户亭侯愽為任城王奉孝王後五月辛酉有星孛于心丁卯原陵長壽門火己卯京師雨雹六月京兆扶風及涼州地震庚子岱山及博尤來山並穨裂己酉赦天下司空虞放免以前太尉黄瓊為司空犍為屬國夷冦鈔百姓益州刺史山昱擊破之零吾羌與先零諸種反冦三輔秋七月京師雩減公卿已下奉貣王侯半租占賣關内侯虎賁羽林緹騎營士五大夫錢各有差九月司空黄瓊免以大鴻臚東萊劉寵為司空寵嘗為㑹稽太守簡除煩苛禁察非灋郡中大治徵為將作大匠山隂縣有五六老叟自若邪山谷間出人齎百錢以送寵曰山谷鄙生未嘗識郡朝它守時吏發求民間至夜不絶或狗吠竟夕民不得安自明府下車以來狗不夜吠民不見吏年老遭值聖明今聞當見棄去故自扶奉送寵曰吾政何能及公言邪勤苦父老為人選一大錢受之冬先零沈氐羌與諸種羌冦并涼二州校尉段熲將湟中義從討之涼州刺史郭閎貪共其功稽固熲軍使不得進義從役乆戀鄉舊皆悉叛歸郭閎歸罪於熲熲坐徵下獄輸作左校以濟南相胡閎代為校尉胡閎無威略羌遂陸梁覆沒營塢轉相招結唐突諸郡冦患轉盛泰山太守皇甫規上疏曰今猾賊就滅泰山略平復聞羣羌並皆反逆臣生長邠岐年五十有九昔爲郡吏再更叛羌豫籌其事有誤中之言臣素有痼疾恐犬馬齒窮不報大恩願乞冗官備單車一介之使勞來三輔宣國威澤以所習地形兵埶佐助諸軍臣窮居孤危之中坐觀郡將已數十年矣自鳥䑕至于東岱其病一也力求猛敵不如清平勤明孫吳未若奉灋前變未逺臣誠戚之是以越職盡其區區詔以規爲中郎將持節監關西兵討零吾等十一月規擊羌破之斬首八百級先零諸種羌慕規威信相勸降者十餘萬五年春正月壬午南宫丙署火三月沈氐羌冦張掖酒泉皇甫規發先零諸種羌共討隴右而道路隔絶軍中大疫死者十三四規親入庵廬巡視將士三軍感悦東羌遂遣使乞降涼州復通先是安定太守孫雋受取狼藉屬國都尉李翕督軍御史張禀多殺降羌涼州刺史郭閎漢陽太守趙熹並老弱不任職而皆倚恃權貴不遵灋度規到悉條奏其罪或免或誅羌人聞之翕然反善沈氐大豪滇昌飢恬等十餘萬口復詣規降夏四月長沙賊起冦桂陽蒼梧乙丑恭陵東闕火戊辰虎賁掖門火五月康陵園寢火長沙零陵賊入桂陽蒼梧南海交趾刺史及蒼梧太守望風逃犇遣御史中丞盛脩督州郡募兵討之不能克乙亥京師地震甲申中藏府丞祿署火秋七月己未南宫承善闥火鳥吾羌冦漢陽隴西金城諸郡兵討破之艾縣賊攻長沙郡縣殺益陽令衆至萬餘人謁者馬睦督荆州刺史劉度撃之軍敗睦度犇走零陵蠻亦反冬十月武陵蠻反冦江陵南郡太守李肅犇走主簿胡爽扣馬首諫曰蠻夷見郡無儆備故敢乘間而進明府為國大臣連城千里舉旗鳴鼓應聲十萬奈何委符守之重而為逋逃之人乎肅拔刃向爽曰掾促去太守今急何暇此計爽抱馬固諫肅遂殺爽而走帝聞之徵肅棄市度睦減死一等復爽門閭拜家一人為郎尚書朱穆舉右校令山陽度尚為荆州刺史辛丑以太常馮緄為車騎將軍將兵十餘萬討武陵蠻先是所遣將帥宦官多陷以折耗軍資徃徃抵罪緄願請中常侍一人監軍財費尚書朱穆奏緄以財自嫌失大臣之節有詔勿劾緄請前武陵太守應奉與俱拜從事中郎十一月緄軍至長沙賊聞之悉詣營乞降進撃武陵蠻夷斬首四千餘級受降十餘萬人荆州平定詔書賜錢一億固讓不受振旅還京師推功於應奉薦以為司隸校尉而上書乞骸骨朝廷不許滇那羌宼武威張掖酒泉太尉劉矩免以太常楊秉為太尉皇甫規持節為將還督鄉里既無它私惠而多所舉奏又惡絶宦官不與交通於是中外並怨遂共誣規貨賂羣羌令其文降帝璽書誚讓相屬規上書自訟曰四年之秋戎醜蠢戾舊都懼駭朝廷西顧臣振國威靈羌戎稽首所省之費一億以上以為忠臣之義不敢告勞故恥以片言自及微効然比方先事庶免罪悔前踐州界先奏孫儁李翕張禀旋師南征又上郭閎趙熹陳其過惡埶據大辟凡此五臣支黨半國其餘墨綬下至小吏所連及者復有百餘吏託報將之怨子思復父之恥載贄馳車懐糧步走交構豪門競流謗讟云臣私報諸羌讎以錢貨若臣以私財則家無擔石如物出於官則文簿易考就臣愚惑信如言者前世尚遺匈奴以宫姬鎮烏孫以公主今臣但費千萬以懐叛羌則良臣之才畧兵家之所貴將有何罪負義違理乎自永初以來將出不少覆軍有五動資巨億有旋車完封寫之權門而名成功立厚加爵封今臣還督本土糾舉諸郡絶交離親戮辱舊故衆謗隂害固其宜也帝乃徵規還拜議郎論功當封而中常侍徐璜左悺欲從求貨數遣賔客就問功狀規終不荅璜等忿怒陷以前事下之於吏官屬欲賦斂請謝規誓而不聽遂以餘宼不絶坐繫廷尉論輸左校諸公及太學生張鳳等三百餘人詣闕訟之㑹赦歸家六年春二月戊午司徒种暠薨􅊨三月戊戌赦天下以衛尉潁川許栩為司徒夏四月辛亥康陵東署火􅊨五月鮮卑冦遼東屬國􅊨秋七月甲申平陵園寑火桂陽賊李研等冦郡界武陵蠻復反太守陳奉討平之宦官素惡馮緄八月緄坐軍還盜賊復發免冬十月丙辰上校獵廣成遂幸函谷關上林苑光祿勲陳蕃上疏諫曰安平之時遊畋宜有節况今有三空之戹哉田野空朝廷空倉庫空加之兵戎未戢四方離散是陛下焦心毁顏坐以待旦之時也豈宜􅀭旗曜武騁心輿馬之觀乎又前秋多雨民始種麥今失其勸種之時而令給驅禽除路之役非賢聖恤民之意也書奏不納十一月司空劉寵免十二月以衛尉周景為司空景榮之孫也時宦官方熾景與太尉楊秉上言内外吏職多非其人舊典中臣子弟不得居位秉埶而今枝葉賔客布列職署或年少庸人典據守宰上下忿患四方愁毒可遵用舊章退貪殘塞災謗請下司隸校尉中二千石城門五營校尉北軍中􅀱各實覈所部應當斥罷自以狀言三府兼察有遺漏續上帝從之於是秉條奏牧守青州刺史羊亮等五十餘人或死或免天下莫不肅然詔徵皇甫規為度遼將軍初張奐坐梁冀故吏免官禁錮凡諸交舊莫敢為言唯規薦舉前後七上由是拜武威太守及規為度遼到營數月上書薦奐才畧兼優宜正元帥以從衆望若猶謂愚臣宜充舉事者願乞宂官以為奐副朝廷從之以奐代規為度遼將軍以規為使匈奴中郎將西州吏民守闕為前䕶羌校尉叚熲訟寃者甚衆㑹滇那等諸種羌益熾涼州幾亡乃復以熲爲䕶羌校尉尚書朱穆疾宦官恣横上疏曰按漢故事中常侍參選士人建武以後乃悉用宦者自延平以來浸益貴盛假貂璫之飾處常伯之任天朝政事一更其手權傾海内寵貴無極子弟親戚並荷榮任放濫驕溢莫能禁禦窮破天下空竭小民愚臣以爲可悉罷省遵復徃初更選海内清淳之士明達國體者以補其處即兆庶黎萌䝉被聖化矣帝不納後穆因進見復口陳曰臣聞漢家舊典置侍中中常侍各一人省尚書事黄門侍郎一人傳發書奏皆用姓族自和熹太后以女主稱制不接公卿乃以閹人爲常侍小黄門通命兩宫自此以來權傾人主窮困天下宜皆罷遣博選耆儒宿徳與參政事帝怒不應穆伏不肯起左右傳出良乆乃趨而去自此中官數因事稱詔詆毁之穆素剛不得意居無幾憤懣發疽卒資治通鑑卷第五十四
