front:
  text: 於貨在乎民飢竊見比年已來良苗盡於蝗螟之口杼軸空於公私之求民所患者豈謂錢貨之厚薄銖兩之輕重哉就使當今沙礫化為南金瓦石變為和玉使百姓渇無所飲飢無所食雖皇羲之純徳唐虞之文明猶不能以保蕭牆之内也葢民可百年無貨不可一朝有飢故食為至急也議者不達農殖之本多言鑄冶之便葢萬人鑄之一人奪之猶不能給况今一人鑄之則萬人奪之乎雖以隂陽為炭萬物為銅役不食之民使不飢之士猶不能足無猒之求也夫欲民殷財阜要在止役禁奪則百姓不勞而足陛下愍海内之憂戚欲鑄錢齊貨以救其敝猶養魚沸鼎之中棲鳥烈火之上水木本魚鳥之所生也用之不時必至焦爛願陛下寛鍥薄之禁後冶鑄之議聽民庶之謠吟問路叟之所憂瞰三光之文耀視山河之分流天下之心國家大事粲然皆見無有遺惑者矣伏念當今地廣而不得耕民衆而無所食羣小競進秉國之位鷹􅀭天下鳥鈔求飽吞肌及骨並噬無猒誠恐卒有役夫窮匠起於板築之間投斤攘臂登髙逺呼使愁怨之民響應雲合雖方尺之錢何能有救其危也遂不改錢冬十一月司徒尹頌薨長沙蠻反宼益陽
