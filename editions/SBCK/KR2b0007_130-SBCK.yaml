seq: 130
front:
  text: 高宗嗣之與時消息靜以鎮之懷集中外民心復安甲辰太子􅀪即皇帝位大赦尊皇后曰皇太后顯祖時年十二侍中車騎大將軍乙渾專權矯詔殺尚書楊保年平陽公賈愛仁南陽公張天度于禁中侍中司徒平原王陸麗治疾於代郡温泉乙渾使司衛監穆多侯召之多矦謂麗曰渾有無君之心今宫車晏駕王德望素重姦臣所忌宜少淹留以觀之朝廷安靜然後入未晩也麗曰安有聞君父之喪慮患而不赴者乎即馳赴平城乙渾所為多不灋麗數爭之戊申渾又殺麗及穆多矦多矦壽之弟也己酉魏以渾為太尉録尚書事東安王劉尼為司徒尚書左僕射代人和其奴為司空殿中尚書順陽公郁謀誅乙渾渾殺之
  hash: sha256:6197868cad7e3c8f740c56eb51f123520d37f3d14c3dc596794862eb0693d7bc
body:
  text: 壬子魏以淮南王它為鎮西大將軍儀同三司鎮凉州六月魏開酒禁壬午加柳元景南豫州刺史加顔師伯丹楊尹秋七月癸巳魏以太尉乙渾為丞相位居諸王上事無大小皆决於渾廢帝幼而狷暴及即位始猶難太后大臣及戴灋興等未敢自恣太后既殂帝年漸長欲有所為灋興輒抑制之謂帝曰官所為如此欲作營陽邪帝稍不能平所幸閹人華願兒賜與無筭灋興常加裁減願兒恨之帝使願兒於外察聽風謡願兒言於帝曰道路皆言宫中有二天子灋興爲真天子官為贗天子且官居深宫與人物不接灋興與太宰顔柳共為一體徃來門客恒有數百内外士庶莫不畏服灋興是孝武左右乆在宫闈今與它人作一家深恐此坐席非復官有帝遂􅀤詔免灋興遣還田里仍徙逺郡八月辛酉賜灋興興死解巢尚之舍人員外散騎侍郎東海奚顯度亦有寵於世祖常典作役課督苛虐捶扑慘毒人皆苦之帝嘗戲曰顯度為百姓患比當除之左右因唱諾即宣㫖殺之尚書右僕射領衛尉卿丹楊尹顔師伯居權日久海内輻湊驕奢淫恣為衣冠所疾帝欲親朝政庚午以師伯為尚書左僕射解卿尹以吏部尚書王彧為右僕射分其權侍師伯始懼初世祖多猜忌王公大臣重足屏息莫敢妄相過從世祖殂太宰義恭等皆相賀曰今日始免横死矣甫過山陵義恭與柳元景顔師伯等聲樂酣飲不捨書夜帝内不能平既殺戴灋興諸大臣無不震慴各不自安於是元景師伯宻謀廢帝立義恭日夜聚謀而持疑不能决元景以其謀告沈慶之慶之與義恭素不厚又師伯常專斷朝事不與慶之參懷謂令史曰沈公爪牙耳安得預政事慶之恨之乃􅀤其事癸酉帝自帥羽林兵討義恭殺之并其四子斷絶義恭支體分裂腸胃挑取眼睛以蜜漬之謂之鬼目粽别遣使者稱詔召柳元景以兵隨之左右奔告兵刃非常元景知禍至入辭其母整朝服乗車應召弟車騎司馬叔仁戎服帥左右壯士欲拒命元景苦禁之既出巷軍士大至元景下車受戮容色恬然并其八子六弟及諸姪獲顔師伯於道殺之并其六子又殺廷尉劉德願改元景和文武進位二等遣使誅湘州刺史江夏世子伯禽自是公卿以下皆被捶曵如奴􅀠矣初帝在東宫多過失世祖欲廢之而立新安王子鸞侍中袁顗盛稱太子好學有日新之美世祖乃止帝由是德之既誅羣公欲引進顗任以朝政遷為吏部尚書與尚書左丞徐爰皆以誅義恭等功賜爵縣子徐爰便辟善事人頗渉書傳自元嘉初入侍左右豫參顧問既長於附㑹又飾以典文故為太祖所任遇大明之世委寄尤重時殿省舊人多見誅逐唯爰巧於將迎始終無迕廢帝待之益厚羣臣莫及帝每出常與沈慶之及山隂公主同輦爰亦預焉山隂公主帝姊也適駙馬都尉何戢戢偃之子也公主尤淫恣嘗謂帝曰妾與陛下男女雖殊俱託體先帝陛下六宫萬數而妾唯駙馬一人事太不均帝乃為公主置面首左右三十人進爵㑹稽郡長公主秩同郡王吏部郎褚淵貌美公主就帝請以自侍帝許之淵侍公主十日備見逼廹以死自誓乃得免淵湛之之子也帝令太廟别畫祖考之像帝入廟指高祖像曰渠大英雄生擒數天子指太祖像曰渠亦不惡但末年不免兒斫去頭指世祖像曰渠大齄鼻如何不齄立召畫工令齄之以建安王休仁為雍州刺史湘東王彧爲南豫州刺史皆留不遣甲戍以司徒楊州刺史豫章王子尚領尚書令乙亥以始興公沈慶之為侍中太尉慶之固辭徴青冀二州刺史王􅀇謨為領軍將軍魏葬文成皇帝于金陵廟號高宗九月癸巳帝如湖熟戊戌還建康新安王子鸞有寵於世祖帝疾之辛丑遣使賜子鸞死又殺其母弟南海王子師及其母妹􅀤殷貴妃墓又欲掘景寧陵太師以為不利於帝乃止初金紫光禄大夫謝莊為殷貴妃誄曰贊軌堯門帝以莊比貴妃於鉤弋夫人欲殺之或説帝曰死者人之所同一往之苦不足為困莊生長冨貴今繫之尚方使知天下苦劇然後殺之未晚也帝從之徐州刺史義陽王昶素為世祖所惡民閒每訛言昶當反是歳訛言尤甚廢帝常謂左右曰我即大位來遂未嘗戒嚴使人邑邑昶使典籖蘧灋生奉表詣建康求入朝帝謂灋生曰義陽與太宰謀反我正欲討之今知求還甚善又屢詰問法生義陽謀反何故不啓灋生懼逃還彭城帝因此用兵己酉下詔討昶内外戒嚴帝自將兵度江命沈慶之統諸軍前驅灋生至彭城昶即聚兵反移檄綂内諸郡皆不受命斬昶使將佐文武悉懷異心昶知事不成棄母妻􅂝愛妾夜與數十騎開北門奔魏昶頗渉學能屬文魏人重之使尚公主拜侍中征南將軍駙馬都尉賜爵丹楊王吏部尚書袁顗始為帝所寵任俄而失指待遇頓衰使有司糾奏其罪白衣領職顗懼詭辭求出甲寅以顗爲督雍梁等四州諸軍事雍州刺史顗舅蔡興宗謂之曰襄陽星惡何可徃顗曰白刅交前不救流矢今者之行唯願生出虎口耳且天道遼遠何必皆驗是時臨海王子頊為都督荆湘等八州諸軍事荆州刺史朝廷以興宗為子頊長史南郡太守行府州事興宗辭不行顗説興宗曰朝廷形勢人所共見在内大臣朝不保夕舅今出居陜西為八州行事顗在襄沔地勝兵彊去江陵咫尺水陸流通若朝廷有事可以共立桓文之功豈比受制凶狂臨不測之禍乎今得間不去後復求出豈可得邪興宗曰吾素門平進與主上甚踈未容有患宫省内外人不自保㑹應有變若内難得弭外舋未必可量汝欲在外求全我欲居中免禍各行其志不亦善乎顗於是狼狽上路猶慮見追行至尋陽喜曰今始免矣鄧琬為晉安王子勛鎮軍長史尋陽内史行江州事顗與之欵狎過常每清閑必盡日窮夜顗與琬人地本殊見者知其有異志矣尋復以興宗為吏部尚書戊午解嚴帝因自白下濟江至􅀲歩沈慶之復啓聽民私鑄錢由是錢貨亂敗千錢長不盈三寸大小稱此謂之鵝眼錢劣於此者謂之綖環錢貫之以縷入水不沈隨手破碎市井不復料數十萬錢不盈一掬斗米一萬商貨不行冬十月丙寅帝還建康帝舅東陽太守王藻尚世祖女臨川長公主公主妬譖藻於帝己卯藻下獄死㑹稽太守孔靈符所至有政績以忤犯近臣近臣譖之帝遣使鞭殺靈符并誅其二子寧朔將軍何邁瑀之子也尚帝姑新蔡長公主帝納公主於後宫謂之謝貴嬪詐言公主薨殺宫婢送邁第殯葬行喪禮庚辰拜貴嬪為夫人加鸞輅龍旂岀警入蹕邁素豪俠多養死士謀因帝出遊廢之立晉安王子勛事泄十一月壬辰帝自將兵誅邁初沈慶之既發顔栁之謀遂自昵於帝數盡言規諌帝浸不悦慶之懼禍杜門不接賔客嘗遣左右范羡至吏部尚書蔡興宗所興宗使羡謂慶之曰公閉門絶客以避悠悠請託者耳如興宗非有求於公者也何為見拒慶之使羡邀興宗興宗往見慶之因説之曰主上比者所行人倫道盡率德改行無可復望今所忌憚唯在於公百姓喁喁所瞻頼者亦在公一人而已公威名素著天下所服今舉朝遑遑人懷危怖指麾之日誰不響應如猶豫不斷欲坐觀成敗豈惟旦暮及禍四海重責將有所歸僕䝉眷異常故敢盡言願公詳思其計慶之曰僕誠知今日憂危不復自保但盡忠奉國始終以之當委任天命耳加老退私門兵力頓闕雖欲為之事亦無成興宗曰當今懐謀思奮者非欲邀功賞富貴正求脱朝夕之死耳殿中將帥唯聼外閒消息若一人唱首則俯仰可定况公綂戎累朝舊日部曲布在宫省受恩者多沈攸之輩皆公家子弟耳何患不從且公門徒義附並三吳勇士殿中將軍陸攸之公之鄉人今入東討賊大有鎧仗在青溪未􅀤公取其噐仗以配衣麾下使陸攸之帥以前驅僕在尚書中自當帥百僚案前世故事更簡賢明以奉社稷天下之事立定矣又朝廷諸所施為民間傳言公悉豫之公今不决當有先公起事者公亦不免附從之禍聞車駕屢幸貴第酣醉淹留又聞屏左右獨入閤内此萬世一時不可失也慶之曰感君至言然此大事非僕所能行事至固當抱忠以没耳青州刺史沈文秀慶之弟子也將之鎮帥部曲出屯白下亦說慶之曰主上狂暴如此禍亂不久而一門受其寵任万物皆謂與之同心且若人愛憎無常猜忍特甚不測之禍進退難免今因此衆力圖之易於反掌機㑹難值不可失也再三言之至於流涕慶之終不從文秀遂行及帝誅何邁量慶之必當入諌先閉青溪諸橋以絶之慶之聞之果徃不得進而還帝乃使慶之從父兄子直閤將軍攸之賜慶之藥慶之不肯飲攸之以被揜殺之時年八十慶之子侍中文叔欲亡恐如太宰義恭被支觧謂其弟中書郎文季曰我能死爾能報遂飲慶之之藥而死弟秘書郎昭明亦自經死文季揮刀馳馬而去追者不敢逼遂得免帝詐言慶之病薨贈侍中太尉謚曰忠武公葬禮甚厚領軍將軍王􅀇謨數流涕諌帝以刑殺過差帝大怒玄謨宿將有威名道路訛言􅀇謨已見誅蔡興宗嘗為東陽太守玄謨典籖包灋榮家在東陽玄謨使灋榮至興宗所興宗謂灋榮曰領軍殊當憂懼灋榮曰領軍比日殆不復食夜亦不眠􅁪言收已在門不保俄頃興宗曰領軍憂懼當為方略那得坐待禍至因使灋榮勸􅀇謨舉事玄謨使灋榮謝曰此亦未易可行期當不泄君言右衛將軍劉道隆為帝所寵任專典禁兵興宗嘗與之俱從帝夜岀道隆過興宗車後興宗曰劉君比日思一閑寫道隆解其意搯興宗手曰蔡公勿多言壬寅立皇后路氏太皇太后弟道慶之女也帝畏忌諸父恐其在外為患皆聚之建康拘於殿内毆捶陵曵無復人理湘東王彧建安王休仁山陽王休祐皆肥壯帝為竹籠盛而稱之以彧尤肥謂之猪王謂休仁為殺王休祐為賊王以三王年長尤惡之常録以自隨不離左右東海王禕性凡劣謂之驢王桂陽王休範巴陵王休若年尚少故並得從容嘗以木槽盛飯并雜食攪之掘地為阬實以泥水裸彧内阬中使以口就槽食之用為歡笑前後欲殺三王以十數休仁多智數每以談笑佞䛕説之故得推遷少府劉曚妾孕臨月帝迎入後宫俟其生男欲立為太子彧嘗忤㫖帝裸之縛其手足貫之以杖使人檐付太官曰今日屠猪休仁笑曰猪未應死帝問其故休仁曰待皇太子生殺猪取其肝肺帝怒乃解曰且付廷尉一宿釋之丁未曚妾生子名曰皇子為之大赦賜為父後者爵一級帝又以太祖世祖在兄弟數皆第三江州刺史晉安王子勛亦第三故惡之因何邁之謀使左右朱景雲送藥賜子勛死景雲至湓口停不進子勛典籖謝道邁主帥潘欣之侍書褚靈嗣聞之馳以告長史鄧琬泣涕請計琬曰身南土寒士䝉先帝殊恩以愛子見託豈得惜門户百口期當以死報効幼主昏􅁀社稷危殆雖曰天子事猶獨夫今便指帥文武直造京邑與羣公卿士廢昏立眀耳戊申琬稱子勛教令所部戒嚴子勛戎服岀聽事集僚佐使潘欣之口宣㫖諭之四座未對録事叅軍陶亮首請效死前驅衆皆奉㫖乃以亮為諮議叅軍領中兵摠綂軍事功曹張沈為諮議叅軍綂作舟艦南陽太守沈懷寶岷山太守薛常寶彭澤令陳紹宗等並為將帥初帝使荆州録送前軍長史荆州行事張悦至湓口琬稱子勛命釋其桎梏迎以所乗車以為司馬悦暢之弟也琬悦二人共掌内外衆事遣將軍俞伯竒帥五百人斷大雷禁絶商旅及公私使命遣使上諸郡民丁收斂噐械旬日之内得甲士五千人岀頓大雷於兩岸築壘又以巴東建平二郡太守孫冲之為諮議叅軍領中兵與陶亮並統前軍移檄遠近戊午帝召諸妃主列於前彊左右使辱之南平王鑠妃江氏不從帝怒殺妃三子南平王敬猷廬陵王敬先安南矦敬淵鞭江妃一百先是民間訛言湘中岀天子帝將南巡荆湘二州以厭之明旦欲先誅湘東王彧然後􅀤初帝既殺諸公恐羣下謀已以直閤將軍宗越譚金童太一沈攸之等有勇力引為爪牙賞賜美人金帛充牣其家越等久在殿省衆所畏服皆為帝盡力帝恃之益無所顧憚恣為不道中外騷然左右宿衛之士皆有異志而畏越等不敢發時三王久幽不知所為湘東王彧主衣㑹稽阮佃夫内監吴興王道隆學官令臨淮李道兒與直閤將軍桞光世及帝左右琅邪淳于文祖等隂謀弑帝帝以立后故假諸王閹人彧左右錢藍生亦在中彧密使候帝動止先是帝遊華林園竹林堂使宫人倮相逐一人不從命斬之夜夢在竹林堂有女子罵曰帝悖虐不道明年不及熟矣帝於宫中求得一人似所夢者斬之又夢所殺者罵曰我已訴上帝矣於是巫覡言竹林堂有鬼是日晡時帝岀華林園建安王休仁山陽王休祐㑹稽公主並從湘東王彧獨在秘書省不被召益憂懼帝素惡主衣吳興壽寂之見輙切齒阮佃夫以其謀告寂之及外監典事東陽朱幼細鎧主南彭城姜産之細鎧將晉陵王敬則中書舎人戴明寶寂之等聞之皆響應幼豫約勒内外使錢藍生宻報休仁休祐時帝欲南廵腹心宗越等並聽岀外裝束唯隊主樊僧整防華林閤栁光世與僧整鄉人因宻邀之僧整即受命凡同謀十餘人阮佃夫慮力少不濟更欲招合壽寂之曰謀廣或泄不煩多人其夕帝悉屏侍衛與羣巫及綵女數百人射鬼於竹林堂事畢將奏樂壽寂之抽刀前入姜産之次之淳于文祖等皆隨其後休仁聞行聲甚急謂休祐曰事作矣相隨奔景陽山帝見寂之至引弓射之不中綵女皆迸走帝亦走大呼寂寂者三寂之追而弑之宣令宿衛曰湘東王受太皇太后令除征主今已平定殿省惶惑未知所為休仁就祕書省見湘東王即稱臣引升西堂登御座召見諸大臣于時事起倉猝王失履跣至西堂猶著烏帽坐定休仁呼主衣以白帽代之令備羽儀雖未即位凡事悉稱令書施行宣太皇太后令數廢帝罪惡命湘東王纂承皇極及明宗越等始入湘東王撫接甚厚廢帝母弟司徒楊州刺史豫章王子尚頑悖有兄風己未湘東王以太皇太后令賜子尚及㑹稽公主死建安王休仁等始得岀居外舎釋謝莊之囚廢帝猶横尸太醫閤口蔡興宗謂尚書右僕射王彧曰此雖凶悖要是天下之主宜使喪禮粗足若直如此四海必將乗人乃葬之秣陵縣南初湘東王母沈婕妤早卒路太后養之王事太后甚謹太后愛王亦篤王既弑廢帝欲慰太后心下令以太后弟子休之為黄門侍郎茂之為中書侍郎論功行賞壽寂之等十四人皆封縣侯縣子十二月庚申朔以東海王禕為中書監太尉進鎮軍將軍江州刺史晉安王子勛為車騎將軍開府儀同三司癸亥以建安王休仁為司徒尚書令楊州刺史以山陽王休祐為荆州刺史桂陽王休範為南徐州刺史乙丑徙安陸王子綏為江夏王丙寅湘東王即皇帝位大赦改元其廢帝時昏制謬封並皆刋削庚午以右衛將軍劉道隆為中䕶軍道隆暱於廢帝甞無禮於建安太妃至是建安王休仁求解職明帝乃賜道隆死宗越譚金童太一等雖為上所撫接内不自安上亦不欲使居中從容謂之曰卿等遭罹􅁀朝勤勞日乆應得自養之地兵馬大郡隨卿等所擇越等素已自疑聞之皆相顧失色因謀作亂以告沈攸之攸之以聞上收越等下獄死攸之復入直閤辛未徙臨賀王子産為南平王晉熈王子輿為廬陵王壬申以尚書右僕射王景文為尚書僕射景文即彧也避上名以字行乙亥追尊沈太妃曰宣太后陵曰崇寧初豫州刺史山陽王休祐入朝以長史南梁郡太守陳郡殷琰行府州事及休祐徙荆州即以琰為督豫司二州諸軍事豫州刺史有司奏路太后宜即前號移居外宮上不許戊寅尊路太后為崇憲皇太后居崇憲宫供奉禮儀不異舊日立妃王氏為皇后后景文之妹也罷二銖錢禁鵝眼綖環錢餘皆通用江州佐吏得上所下令書皆喜共造鄧琬曰􅁀亂既除殿下又開黄閤實為公私大慶琬以晉安王子勛次第居三又以尋陽起事與世祖同符謂事必有成取令書投地曰殿下當開端門黄閤是吾徒事耳衆皆駭愕琬更與陶亮等繕治噐甲徴兵四方袁顗既至襄陽即與諮議參軍劉胡繕修兵械簡集士卒詐稱被太皇太后令使其起兵即建牙馳檄奉表勸子勛即大位辛巳更以山陽王休祐為江州刺史荆州刺史臨海王子頊即留本任先是廢帝以邵陵王子元為湘州刺史中兵參軍沈仲玉為道路行事至鵲頭聞尋陽兵起不敢進琬遣數百人刼迎之令子勛建牙於桑尾傳檄建康稱孤志遵前典黜幽陟眀又謂上矯害眀荗簒竊天寳干我昭穆寡我兄弟藐孤同氣猶有十三聖靈何辜而當乏饗郢州刺史安陸王子綏承子勛初檄欲攻廢帝聞廢帝已隕即解甲下標既而聞江雍猶治兵郢府行事茍卞之大懼即遣諮議領中兵參軍鄭景􅀇帥衆馳下并送軍糧荆州行事孔道存奉刺史臨海王子頊㑹稽將佐奉太守尋陽王子房皆舉兵以應子勛資治通鑑卷第一百三十
