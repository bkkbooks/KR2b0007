front:
  text: 爲太尉尚書左僕射宜都王目辰爲司徒南部尚書李訢爲司空尊皇太后曰太皇太后復臨朝稱制以馮熈爲侍中太師中書監熈自以外戚固辭内任乃除都督洛州刺史侍中太師如故顯祖神主袝太廟有司奏廟中執事之官請依故事皆賜爵祕書令廣平程駿上言建侯裂地帝王所重或以親賢或因功伐未聞神主祔廟而百司受封者也皇家故事葢一時之恩豈可爲長世之法乎太后善而從之謂羣臣曰凡議事當依古典正言豈得但修故事而已賜駿衣一襲帛二百匹太后性聦察知書計曉政事被服儉素膳羞減於故事什七八而猜忍多權數高祖性至孝能承顔順志事無大小皆仰成於太后太后往往專决不復關白於帝所幸宦者高平王琚安定張祐􅂎嶷馮翊王遇略陽符承祖高陽王質皆依勢用事祐官至尚書左僕射爵新平王琚官至征南將軍爵高平王嶷等官亦至侍中吏部尚書刺史爵爲公矦賞賜巨萬賜鐵劵許以不死又太卜令姑臧王叡得幸於太后超遷至侍中吏部尚書爵太原公祕書令李冲雖以才進亦由私寵賞賜皆不可勝紀又外禮人望東陽王丕游明根等皆極其優厚毎襃賞叡等輙以丕等參之以示不私丕烈帝之玄孫冲寶之子也太后自以失行畏人議已羣下語言小渉疑忌輙殺之然所寵幸左右茍有小過必加笞箠或至百餘而無宿憾尋復待之如初或因此更富貴故左右雖被罰終無離心乙亥加蕭道成尚書左僕射劉秉中書令楊運長阮佃夫等忌建平王景素益甚景素乃與錄事參軍陳郡殷濔中兵參軍略陽垣慶延參軍沈顒左暄等謀爲自全之計遣人往來建康要結才力之士冠軍將軍黃回游擊將軍高道慶輔國將軍曹欣之前軍將軍韓道清長水校尉郭蘭之羽林監垣祗祖皆隂與通謀武人不得志者無不歸之時帝好獨出遊走郊野欣之謀據石頭城伺帝出作亂道清蘭之欲說蕭道成因帝夜出執帝迎景素道成不從者即圖之景素毎禁使緩之楊阮微聞其事遣傖人周天賜僞投景素􅂆令舉兵景素知之斬天賜首送臺秋七月祗祖帥數百人自建康奔京口云京師已潰亂勸令速入景素信之戊子據京口起兵士民赴之者以千數楊阮聞祗祖叛走即命纂嚴己丑遣驍騎將軍任農夫領軍將軍黃回左軍將軍蘭陵李安民將歩軍右軍將軍張保將水軍以討之辛卯又命南豫州刺史叚佛榮爲都統蕭道成知黃回有異志故使安民佛榮與之偕行回私戒其士卒道逢京口兵勿得戰道成屯玄武湖冠軍將軍蕭􅄨鎭東府始安王伯融都鄉侯伯猷皆建安王休仁之子也楊阮忌其年長悉稱詔賜死景素欲斷竹里以拒臺軍垣慶延垣祗祖沈顒皆曰今天時旱熱臺軍遠來疲困引之使至以逸待勞可一戰而克殷濔等固爭不能得農夫等既至縱火燒市邑慶延等各相顧望莫有鬬志景素本乏威略恇擾不知所爲黃回迫於叚佛榮且見京口軍弱遂不發張保泊西渚景素左右勇士數十人自相要結進擊水軍甲午張保敗死而諸將不相應赴復爲臺軍所破臺軍既薄城下顒先帥衆走祗祖次之其餘諸軍相繼奔退獨左暄與臺軍力戰於萬嵗樓下而所配兵力甚弱不能敵而散乙未㧞京口黃回軍先入自以有誓不殺諸王乃以景素讓殿中將軍張倪奴倪奴擒景素斬之并其三子同黨垣祗祖等數十人皆伏誅蕭道成釋黄回高道慶不問撫之如舊是日解嚴丙申大赦初巴東建平蠻反沈攸之遣軍討之及景素反攸之急追峽中軍以赴建康巴東太守劉攘兵建平太守劉道欣疑攸之有異謀勒兵斷峽不聽軍下攘兵子天賜爲荆州西曹攸之遣天賜往諭之攘兵知景素實反乃釋甲謝愆攸之待之如故劉道欣堅守建平攘兵譬說不回乃與伐蠻軍攻斬之
