body:
  text: 甲辰魏主追尊其母李貴人曰思皇后八月丁卯立皇弟翽爲南陽王嵩爲新興王禧爲始建王庚午以給事黃門侍郎阮佃夫爲南豫州刺史留鎭京師九月戊子賜驍騎將軍高道慶死冬十月辛酉以吏部尚書王僧䖍爲尚書右僕射十一月戊子魏以太尉安樂王長樂爲定州刺史司空李訢爲徐州刺史順皇帝昇明元年春正月乙酉朔魏改元太和己酉略陽氐王元壽聚衆五千餘家自稱衝天王二月辛未魏秦益二州刺史尉洛矦擊破之三月庚子魏以東陽王丕爲司徒夏四月丁卯魏主如白登壬申如崞山初蒼梧王在東宫好緣漆帳竿去地丈餘喜怒乖節主帥不能禁太宗屢敕陳太妃痛捶之及即帝位内畏太后太妃外憚諸大臣未敢縱逸自加元服内外稍無以制數出遊行始出宫猶整儀衛俄而弃車騎帥左右數人或出郊野或入市㕓太妃毎乘青犢車隨相檢攝旣而輕騎遠走一二十里太妃不復能追儀衛亦懼禍不敢追尋唯整部伍别在一處瞻望而已初太宗甞以陳太妃賜嬖人李道兒已復迎還生帝故帝毎微行自稱劉統或稱李將軍常著小袴衫營署巷陌無不貫穿或夜宿客舎或晝卧道傍排突厮養與之交易或遭慢辱悅而受之凡諸鄙事裁衣作帽過目則能未嘗吹箎執管便韻及京口既平驕恣尤甚無日不出夕去晨返晨出暮歸從者並執鋋矛行人男女及犬馬牛驢逢無免者民閒擾懼商販皆息門戸晝閉行人殆絶鍼椎鑿鋸不離左右小有忤意即加屠剖一日不殺則慘然不樂殿省憂惶食息不保阮佃夫與直閣將軍申伯宗等謀因帝出江乘射雉稱太后令喚隊仗還閉城門遣人執帝廢之立安成王凖事覺甲戍帝収佃夫等殺之太后數訓戒帝帝不悅會端午太后賜帝毛扇帝嫌其不華令太醫煑藥欲酖太后左右止之曰若行此事官便應作孝子豈復得出入狡獪帝曰汝語大有理乃止六月甲戌有告散騎常侍杜幼文司徒左長史沈勃游擊將軍孫超之與阮佃夫同謀者帝登帥衛士自掩三家悉誅之刳解臠割嬰孩不免沈勃時居䘮在廬左右未至帝揮刀獨前勃知不免手搏帝耳唾罵之曰汝罪踰桀紂屠戮無日遂死是日大赦帝嘗直入領軍府時盛熱蕭道成晝卧祼􅃝帝立道成於室内畫腹爲的自引滿將射之道成歛板曰老臣無罪左右王天恩曰領軍腹大是佳射堋一箭便死後無復射不如以骲箭射之帝乃更以骲箭射正中其臍投弓大笑曰此手何如帝忌道成威名嘗自磨鋋曰明日殺蕭道成陳太妃罵之曰蕭道成有功於國若害之誰復爲汝盡力邪帝乃止道成憂懼密與袁粲禇淵謀廢立粲曰主上㓜年微過易改伊霍之事非季世所行縱使功成亦終無全地淵黙然領軍功曹丹陽紀僧眞言於道成曰今朝廷猖狂人不自保天下之望不在袁禇明公豈得坐受夷滅存亡之機仰希熟慮道成然之或勸道成奔廣陵起兵道成世子賾時爲晉熈王長史行郢州事欲使賾將郢州兵東下會京口道成密遣所親劉僧副告其從兄行青冀二州刺史劉善明曰人多見勸北固廣陵恐未爲長筭今秋風行起鄉若能與垣東海微共動虜則我諸計可立亦告東海太守垣榮祖善明曰宋氏將亡愚智共知北虜若動反爲公患公神武高世唯當靜以待之因機奮發功業自定不可遠去根本自貽猖蹷榮祖亦曰領府去臺百歩公走人豈不知若單騎輕行廣陵人閉門不受公欲何之公今動足下牀恐即有扣臺門者公事去矣紀僧眞曰主上雖無道國家累世之基猶爲安固公百口北度必不得俱縱得廣陵城天子居深宫施號令目公爲逆何以避之此非萬全䇿也道成族弟鎭軍長史領之及次子驃騎從事中郎嶷皆以爲帝好單行道路於此立計易以成功外州起兵鮮有克捷徒先人受禍耳道成乃止東中郎司馬行㑹稽郡事李安民欲奉江夏王躋起兵於東方道成止之越騎校尉王敬則潛自結於道成夜著青衣扶匐道路爲道成聽察帝之往來道成命敬則隂結帝左右楊玉夫楊萬年陳奉伯等一十五人於殿中詗伺機便秋七月丁亥夜帝微行至領軍府門左右曰一府皆眠何不緣牆入帝曰我今夕欲於一處作適宜待明夕員外郎桓康等於道成門閒聽聞之戊子帝乘露車與左右於臺岡賭跳仍往青園尼寺晚至新安寺偷狗就曇度道人煑之飲酒醉還仁夀殿寢楊玉夫常得帝意至是忽憎之見輙切齒曰明日當殺小子取肝肺是夜令玉夫伺織女度河曰見當報我不見將殺汝時帝出入無常省内諸閤夜皆不閉廂下畏相逢值無敢出者宿衛並逃避内外莫相禁攝是夕王敬則出外玉夫伺帝熟寢與楊萬年取帝防身刀刎之敕廂下奏伎陳奉伯袖其首依常行法稱敕開承明門出以首與敬則敬則馳詣領軍府叩門大呼蕭道成慮蒼梧王誑之不敢開門敬則於牆上投其首道成洗視乃戎服乘馬而出敬則桓康等皆從入宫至承明門詐爲行還敬則恐内人覘見以刀環塞窐孔呼門甚急門開而入佗夕蒼梧王毎開門門者震懾不敢仰視至是弗之疑道成入殿殿中驚怖旣而聞蒼梧王死咸稱萬歲己丑旦道成戎服出殿庭槐樹下以太后令召袁粲褚淵劉秉入㑹議道成謂秉曰此使君家事何以断之秉未荅道成須髯盡張目光如電秉曰尚書衆事可以見付軍旅處分一委領軍道成次讓袁粲粲亦不敢當王敬則㧞白刃在牀側跳躍曰天下事皆應關蕭公敢有開一言者血染敬則刀仍手取白紗帽加道成首令即位曰今日誰敢復動事須及熱道成正色呵之曰卿都自不解粲欲有言敬則叱之乃止禇淵曰非蕭公無以了此手取事授道成道成曰相與不肯我安得辭乃下議備法駕詣東城迎立安成王於是長刀遮粲秉等各失色而去秉出於路逢從弟韞韞開車迎問曰今日之事當歸兄邪秉曰吾等已讓領軍矣韞拊膺曰兄肉中詎有血邪今年族矣是日以太后令數蒼梧王罪惡曰吾密令蕭領軍濳運明略安成王凖宜臨万國追封昱爲蒼梧王儀衛至東府門安成王令門者勿開以待袁司徒粲至王乃入居朝宫壬辰王即皇帝位時年十一改元大赦葬蒼梧王於郊壇西魏京兆康王子推卒甲午蕭道成出鎭東府丙申以道成爲司空錄尚書事驃騎大將軍袁粲遷中書監禇淵加開府儀同三司劉秉遷尚書令加中領軍以晉熈王燮爲楊州刺史劉秉始謂尚書万機本以宗室居之則天下無變既而蕭道成兼揔軍國布置心膂與奪自專褚淵素相憑附秉與袁粲閣手仰成矣辛丑以尚書右僕射王僧䖍爲僕射丙午以武陵王贊爲郢州刺史蕭道成改領南徐州刺史八月壬子魏大赦癸亥詔袁粲鎭石頭粲性冲靜毎有朝命常固辭逼切不得已乃就職至是知蕭道成有不臣之志隂欲圖之即時受命初太宗使陳昭華母養順帝戊辰尊昭華爲皇太妃丙子魏詔曰工商皂􅀠各有厥分而有司縱濫或染流俗自今戸内有役者唯止本部丞若有勲勞者不從此制蕭道成固讓司空庚辰以為驃騎大將軍開府儀同三司九月乙酉魏更定律令戊申封楊玉夫等二十五人爲侯伯子男冬十月氐帥楊文度遣其弟文弘襲魏仇池䧟之初魏徐州刺史李訢事顯祖爲倉部尚書信用盧奴令范􅋆訢弟左將軍瑛諌曰􅋆能降人以色假人以財輕德義而重勢利聽其言也甘察其行也賊不早絶之後悔無及訢不從腹心之事皆以語􅋆尚書趙黒與訢皆有寵於顯祖對掌選部訢以其私用人爲方州黒對􅂋祖發之由是有隙頃之訢發黒前爲監藏盗用官物黒坐黜爲門士黒恨之寢食爲之衰少踰年復入爲侍中尚書左僕射領選及􅂋祖殂黒白馮太后稱訢專恣出爲徐州范􅋆知太后怨訢乃告訢謀外叛太后徴訢至平城問狀訢對無之太后引􅋆使證之訢謂􅋆曰汝今誣我我復何言然汝受我恩如此之厚乃忍爲爾乎􅋆曰􅋆受公恩何如公受李敷恩公忍之於敷􅋆何爲不忍於公訢慨然嘆曰吾不用瑛言悔之何及趙黒復於中構成其罪丙子誅訢及其子令和令度黒然後寢食如故十一月癸未魏征西將軍皮歡喜等三將軍帥衆四萬擊楊文弘丁亥魏懷州民伊祁苟自稱堯後聚衆於重山作亂洛州刺史馮熈討滅之馮太后欲盡誅闔城之民雍州刺史張白澤諫曰凶渠逆黨盡已梟夷城中豈無忠良仁信之士柰何不問白黒一切誅之乃止十二月魏皮歡喜軍至建安楊文弘棄城走初沈攸之與蕭道成於大明景和之間同直殿省深相親善道成女爲攸之子中書侍郎文和婦攸之在荆州直閤將軍高道慶家在華容假還過江陵與攸之爭戲槊馳還建康言攸之反狀已成請以三千人襲之執政皆以爲不可道成仍保證其不然楊運長等惡攸之密與道慶謀遣刺客殺攸之不克㑹蒼梧王遇弑主簿宗儼之功曹臧寅勸攸之因此起兵攸之以其長子元琰在建康爲司徒左長史故未發寅凝之之子也時楊運長等已不在内蕭道成遣元琰以蒼梧王刳斮之具示攸之攸之以道成名位素出已下一旦專制朝權心不平謂元琰曰吾寜為王陵死不為賈充生然亦未暇舉兵乃上表稱慶因留元琰雍州刺史張敬兒素與攸之司馬劉攘兵善疑攸之將起事密以問攘兵攘兵無所言寄敬兒馬橙一隻敬兒乃爲之僃攸之有素書十數行常韜在裲襠角云是明帝與已約誓攸之將舉兵其妾崔氏諌曰官年已老那不爲百口計攸之指裲襠角示之且稱太后使至賜攸之燭割之得太后手令云社稷之事一以委公於是勒兵移檄遣使邀張敬兒及豫州刺史劉懷珍梁州刺史梓潼范栢年司州刺史姚道和湘州行事􅁃佩玉巴陵内史王文和同舉兵敬兒懷珍文和並斬其使馳表以聞文和尋弃州奔夏口柏年道和佩玉皆懷兩端道和後秦髙祖之孫也辛酉攸之遣輔國將軍孫同等相繼東下攸之遺道成書以爲少帝昏狂宜與諸公密議共白太后下令廢之柰何交結左右親行弑逆乃至不殯流蟲在戸凡在臣下誰不惋駭又移易朝舊布置親黨宫閤管籥悉關家人吾不知子孟孔明遺訓固如此乎足下既有賊宋之心吾寜敢捐包胥之節邪朝廷聞之忷懼丁卯道成入守朝堂命侍中蕭嶷代鎭東府撫軍行參軍蕭映鎭京口映嶷之弟也戊辰内外纂嚴己巳以郢州刺史武陵王贊爲荆州刺史庚午以右衛將軍黄回爲郢州刺史督前鋒諸軍以討攸之初道成以世子賾爲晉熈王夑長史行郢州事修治器械以備攸之及徵夑爲楊州以賾爲左衛將軍與夑俱下劉懷珍言於道成曰夏口衝要宜得其人道成與賾書曰汝既入朝當須文武兼資與汝意合者委以後事賾乃薦夑司馬柳世隆自代道成以世隆爲武陵王贊長史行郢州事賾將行謂世隆曰攸之一旦爲變焚夏口舟艦㳂流而東不可制也若得攸之留攻郢城必未能猝㧞君爲其内我爲其外破之必矣及攸之起兵賾行至尋陽未得朝廷處分衆欲倍道趨建康賾曰尋陽地居中流密邇畿甸若留屯湓口内藩朝廷外援夏首保據形勝控制西南今日㑹此天所置也或以爲湓口城小難固左中郎將周山圖曰今據中流爲四方勢援不可以小事難之苟衆心齊一江山皆城隍也庚午賾奉夑鎭湓口賾悉以事委山圖山圖斷取行旅船板以造樓櫓立水柵旬日皆辦道成聞之喜曰賾眞我子也以賾爲西討都督賾啓山圖爲軍副時江州刺史邵陵王友鎭尋陽賾以爲尋陽城不足固表移友同鎭湓口留江州别駕豫章胡諧之守尋陽湘州刺史王藴遭母䘮罷歸至巴陵與沈攸之深相結時攸之未舉兵藴過郢州欲因蕭賾出弔作難據郢城賾知之不出還至東府又欲因蕭道成出弔作難道成又不出藴乃與袁粲劉秉密謀誅道成將帥黃回任候伯孫曇瓘王宜興卜伯興等皆與通謀伯興天與之子也道成初聞攸之事起自往詣粲粲辭不見通直郎袁逹謂粲不宜示異同粲曰彼􅀂以主幼時艱與桂陽時不異劫我入臺我何辭以拒之一朝同止欲異得乎道成乃召禇淵與之連席毎事必引淵共之時劉韞爲領軍將軍入直門下省卜伯興爲直閤黃回等諸將皆出屯新亭初禇淵爲衛將軍遭母憂去職朝廷敦迫不起粲素有重名自往譬説淵乃從之及粲爲尚書令遭母憂淵譬説懇至粲遂不起淵由是恨之及沈攸之事起道成與淵議之淵曰西夏亹難事必無成公當先備其内耳粲謀既定將以告淵衆謂淵與道成素善不可告粲曰淵與彼雖善豈容大作同異今若不告事定便應除之乃以謀告淵淵即以告道成道成亦先聞其謀遣軍主蘇烈薛淵太原王天生將兵助粲守石頭薛淵固辭道成彊之淵不得已涕泣拜辭道成曰􅀸近在石頭日夕去來何悲如是且又何辭淵曰不審公能保袁公共爲一家否今淵往與之同則負公不同則立受禍何得不悲道成曰所以遣卿正爲能盡臨事之宜使我無西顧之憂耳但當努力無所多言淵安都之從子也道成又以驍騎將軍王敬則爲直閤與伯興共揔禁兵粲謀矯太后令使韞伯興帥宿衛兵攻道成於朝堂回等帥所領爲應劉秉任候伯等並赴石頭本期壬申夜發秉恇擾不知所爲晡後即束裝臨去啜羮寫胷上手振不自禁未暗載婦女盡室奔石頭部曲數百赫奕滿道既至見粲粲驚曰何事遽來今敗矣秉曰得見公萬死何恨孫曇瓘聞之亦奔石頭丹楊丞王遜等走告道成事乃大露遜僧綽之子也道成密使人告王敬則時閤已閉敬則欲開閤出卜伯興嚴兵爲備敬則乃鋸所止屋壁得出至中書省收韞韞已成嚴列燭自照見敬則猝至驚起迎之曰兄何能夜顧敬則呵之曰小子那敢作賊韞抱敬則敬則秦􅇌其頰仆地而殺之又殺伯興蘇烈等據倉城拒粲王藴聞秉已走歎曰事不成矣狼狽帥部曲數百向石頭本期開南門時暗夜薛淵據門射之藴謂粲已敗即散走道成遣軍主㑹稽戴僧靜帥數百人向石頭助烈等自倉門得入與之并力攻粲孫曇瓘驍勇善戰臺軍死者百餘人王天生殊死戰故得相持自亥至丑戴僧靜分兵攻府西門焚之粲與秉在城東門見火起欲還赴府秉與二子俁陔踰城走粲下城列燭自照謂其子最曰本知一木不能止大厦之崩但以名義至此耳僧靜乘暗踰城獨進最覺有異人以身衛粲僧靜直前斫之粲謂最曰我不失忠臣汝不失孝子遂父子俱死百姓哀之爲之謡曰可憐石頭城寜爲袁粲死不作禇淵生劉秉父子走至額檐湖追執斬之任候伯等並乘船赴石頭既至臺軍已集不得入乃馳還黃回嚴兵期詰旦帥所領從御道直向臺門攻道成聞事泄不敢發道成撫之如舊王藴孫曇瓘皆逃竄先捕得藴斬之其餘粲黨皆無所問粲典籖莫嗣祖爲粲秉宣通密謀道成召詰之曰袁粲謀反何不啓聞嗣祖曰小人無識但知報恩何敢泄其大事今袁公已死義不求生藴嬖人張承伯藏匿藴道成並赦而用之粲簡淡平素而無經世之才好飲酒善吟諷身居劇任不肯當事主事毎往諮决或高詠對之閑居高卧門無雜賔物情不接故及於敗裴子野論曰袁景倩民望國華受付託之重智不足以除姦權不足以處變蕭條散落危而不扶及九鼎既輕三才將換區區斗城之裏出萬死而不辭蓋蹈匹夫之節而無棟梁之具矣甲戌大赦乙亥以尚書僕射王僧䖍爲左僕射新除中書令王延之爲右僕射度支尚書張岱爲吏部尚書吏部尚書王奐爲丹楊尹延之裕之孫也劉秉弟遐爲吳郡太守司徒右長史張瓌永之子也遭父䘮在吳家素豪盛蕭道成使瓌伺間取遐㑹遐召瓌詣府瓌帥部曲十餘人直入齋中執遐斬之郡中莫敢動道成聞之以告瓌從父領軍沖沖曰瓌以百口一擲出手得盧矣道成即以瓌爲吳郡太守道成移屯閱武堂猶以重兵付黃回使西上而配以腹心回素與王宜興不恊恐宜興反告其謀閏月辛巳因事收宜興斬之諸將皆言回握彊兵必反寜朔將軍桓康請獨往刺之道成曰卿等何疑彼無能爲也沈攸之遣中兵參軍孫同等五將以三萬人爲前驅司馬劉攘兵等五將以二萬人次之又遣中兵參軍王靈秀等四將分兵出夏口據魯山癸巳攸之至夏口自恃兵彊有驕色以郢城弱小不足攻云欲問訊安西蹔泊黃金浦遣人告柳世隆曰被太后令當蹔還都􅀸既相與奉國想得此意世隆曰東下之師久承聲問郢城小鎭自守而已宗儼之勸攸之攻郢城臧寅以爲郢城兵雖少而地險攻守勢異非旬日可㧞若不時舉挫鋭損威今順流長驅計日可捷既傾根本則郢城豈能自固攸之從其計欲留偏師守郢城自將大衆東下乙未將發柳世隆遣人於西渚挑戰前軍中兵參軍焦度於城樓上肆言罵攸之且穢辱之攸之怒改計攻城令諸軍登岸燒郭邑築長圍晝夜攻戰世隆隨宜拒應攸之不能克道成命吳興太守沈文季督吳錢唐軍事文秀收攸之弟新安太守登之誅其宗族乙未以後軍將軍楊運長爲宣城太守於是太宗嬖臣無在禁省者矣沈約論曰夫人君南面九重奥絶陪奉朝夕義隔卿士堦闥之任宜有司存既而恩以狎生信由恩固無可憚之姿有易親之色孝建泰始主威獨運而刑政糾雜理難遍通耳目所寄事歸近習及覘歡愠候慘舒動中主情舉無謬㫖人主謂其身卑位薄以爲權不得重曾不知䑕憑社貴狐藉虎威外無逼主之嫌内有專用之効勢傾天下未之或悟及太宗晩運慮經盛衰權倖之徒慴憚宗戚欲使㓜主孤立永竊國權構造同異興樹禍隙帝弟宗王相繼屠勦寶祚夙傾實由於此矣辛丑尚書左丞濟陽江謐建議假蕭道成黃􅃏從之加北秦州刺史武都王楊文度都督北秦雍二州諸軍事以龍驤將軍楊文弘爲略陽太守壬寅魏皮歡喜㧞葭蘆斬文度魏以楊難當族弟廣香爲隂平公葭蘆戍主仍詔歡喜築駱谷城文弘奉表謝罪於魏遣子苟奴入侍魏以文弘爲南秦州刺史武都王乙巳蕭道成出頓新亭謂驃騎參軍江淹曰天下紛紛君謂何如淹曰成敗在徳不在衆寡公雄武有竒略一勝也寛容而仁恕二勝也賢能畢力三勝也民望所歸四勝也奉天子以伐叛逆五勝也彼志鋭而器小一敗也有威而無恩二敗也士卒解體三敗也搢紳不懷四敗也懸兵數千里而無同惡相濟五敗也雖豺狼十萬終爲我獲道成笑曰君談過矣南徐州行事劉善明言於道成曰攸之收衆聚騎造舟治械苞藏禍心於今十年性既險躁才非持重而起逆累旬遲回不進一則暗於兵機二則人情離怨三則有掣肘之患四則天奪其魄本慮其剽勇輕速掩襲未備决於一戰今六師齊奮諸侯同舉此籠中之鳥耳蕭賾問攸之於周山圖山圖曰攸之相與鄰鄉數共征伐頗悉其爲人性度險刻士心不附今頓兵堅城之下適所以爲離散之漸耳二年春正月己酉朔百官戎服入朝沈攸之盡鋭攻郢城柳世隆乘間屢破之蕭賾遣軍主桓敬等入軍據西塞爲世隆聲援攸之獲郢府法曹南鄉范雲使送書入城餉武陵王贊犢一羫柳世隆魚三十尾皆去其首城中欲殺之雲曰老母弱弟懸命沈氏若違其命禍必及親今日就戮甘心如薺乃赦之攸之遣其將皇甫仲賢向武昌中兵參軍公孫方平向西陽武昌太守臧渙降於攸之西陽太守王毓奔湓城方平據西陽豫州刺史劉懷珍遣建寜太守張謨等將萬人擊之辛酉方平敗走平西將軍黃回等軍至西陽泝流而進攸之素失人情但劫以威力初發江陵日有逃者及攻郢城三十餘日不㧞逃者稍多攸之日夕乘馬歴營撫慰而去者不息攸之大怒召諸軍主曰我被太后令建義下都大事若克白紗帽共著耳如其不振朝廷自誅我百口不關餘人比軍人叛散皆卿等不以爲意我亦不能問叛身自今軍中有叛者軍主任其罪於是一人叛遣人追之亦去不返莫敢發覺咸有異計劉攘兵射書入城請降柳世隆開門納之丁卯夜攘兵燒營而去軍中見火起爭弃甲走將帥不能禁攸之聞之怒銜須咀之收攘兵兄子天賜女壻張平虜斬之向旦攸之帥衆過江至魯山軍遂大散諸將皆走臧寅曰幸其成而弃其敗吾不忍爲也乃投水死攸之猶有數十騎自隨宣令軍中曰荆州城中大有錢可相與還取以爲資糧郢城未有追軍而散軍畏蠻抄更相聚結可二萬人隨攸之還江陵張敬兒既斬攸之使者即勒兵偵攸之下遂襲江陵攸之使子元琰與兼長史江乂别駕傳宣共守江陵城敬兒至沙橋觀望未進城中夜聞鶴唳謂爲軍來乂宣開門出走吏民崩潰元琰奔寵洲爲人所殺敬兒至江陵誅攸之二子四孫攸之將至江陵百餘里聞城已爲敬兒所據士卒隨之者皆散攸之無所歸與其子文和走至華容界皆縊于櫟林己巳村民斬首送江陵敬兒擎之以楯覆以青絲徇諸市郭乃送建康敬兒誅攸之親黨收其財物數十萬皆以入私初倉曹參軍金城邊榮爲府録事所辱攸之爲榮鞭殺録事及敬兒將至榮爲留府司馬或説之使詣敬兒降榮曰受沈公厚恩共如此大事一朝緩急便易本心吾不能也城潰軍士執以見敬兒敬兒曰邊公何不早來榮曰沈公見留守城不忍委去本不祈生何須見問敬兒曰死何難得命斬之榮懽笑而去榮客太山程邕之抱榮曰與邊公周遊不忍見邊公死乞先見殺兵人不得行戮以白敬兒敬兒曰求死甚易何爲不許先殺邕之然後及榮軍人莫不垂泣孫同宗儼之等皆伏誅丙子解嚴以侍中柳世隆爲尚書右僕射蕭道成還鎮東府丁丑以左衛將軍蕭賾爲江州刺史侍中蕭嶷爲中領軍二月庚辰以尚書左僕射王僧䖍爲尚書令右僕射王延之爲左僕射癸未加蕭道成太尉都督南徐等十六州諸軍事以衛將軍褚淵爲中書監司空道成表送黃􅃏吏部郎王儉僧綽之子也神彩淵曠好學博聞少有宰相之志時論亦推許之道成以儉爲太尉右長史待遇隆密事無大小專委之丁亥魏主如代湯泉癸卯還宕昌王彌機初立三月丙子魏遣使拜彌機征南大將軍梁益二州牧河南公宕昌王黃回不樂在郢州固求南兖遂帥部曲輙還辛卯改都督南兖等五州諸軍事南兖州刺史初王藴去湘州湘州刺史南陽王翽未之鎭長沙内史􅁃佩玉行府事翽先遣中兵參軍韓㓜宗將兵戍湘州與佩玉不相能及沈攸之反兩人互相疑佩玉襲殺幼宗黃回至郢州遣輔國將軍任候伯行湘州事候伯輙殺佩玉冀以自免湘州刺史呂安國之鎭蕭道成使安國誅候伯夏四月甲申魏主如崞山丁亥還蕭道成以黃回終爲禍亂回有部曲數千人欲遣收恐爲亂辛卯召回入東府至停外齋使桓康將數十人數回罪而殺之并其子竟陵相僧念甲午以淮南宣城二郡太守蕭映行南兖州事仍以其弟晃代之五月魏禁皇族貴戚及士民之家不顧氏族下與非類昏偶犯者以違制論魏主與太后臨虎圏有虎逸登閣道㡬至御座侍衛皆驚靡吏部尚書王叡執㦸禦之太后稱以爲忠親任愈重六月丁酉以輔國將軍楊文弘爲北秦州刺史武都王庚子魏皇叔若卒蕭道成以大明以來公私奢侈秋八月奏罷御府省二尚方彫飾器玩辛卯又奏禁民閒華僞雜物凡十七條乙未以蕭賾爲領軍將軍蕭嶷爲江州刺史九月乙巳朔日有食之蕭道成欲引時賢參贊大業夜召驃騎長史謝朏屏人與語久之朏無言唯二小兒捉燭道成慮朏難之仍取燭遣兒朏又無言道成乃呼左右朏莊之子也太尉右長史王儉知其指它日請間言於道成曰功高不賞古今非一以公今日位地欲終北面可乎道成正色裁之而神采内和儉因曰儉䝉公殊眄所以吐所難吐何賜拒之深宋氏失徳非公豈復寜濟但人情澆薄不能持久公若小復推遷則人望去矣豈唯大業永淪七尺亦不可得保道成曰卿言不無理儉曰公今名位故是經常宰相宜禮絶羣后微示變革當先令禇公知之儉請衘命道成曰我當自往經少日道成自造禇淵􅅃言移晷乃謂曰我夢應得官淵曰今授始爾恐一二年間未容便移且吉夢未必應在旦夕道成還以告儉儉曰禇是未逹理耳儉乃唱議加道成太傅假黃􅃏使中書舎人虞整作詔道成所親任遐曰此大事應報禇公道成曰禇公不從柰何遐曰彦迴惜身保妻子非有竒才異節遐能制之淵果無違異丙午詔進道成假黃􅃏大都督中外諸軍事太傅領楊州牧劒履上殿入朝不趨贊拜不名使持節太尉驃騎大將軍録尚書南徐州刺史如故道成固辭殊禮以楊州刺史晉熈王夑爲司徒戊申太傅道成以蕭映爲南兖州刺史冬十月丁丑以蕭晃爲豫州刺史己卯獲孫曇瓘殺之魏員外散騎常侍鄭羲來聘壬寅立皇后謝氏后莊之孫也十一月癸亥臨澧矦劉晃坐謀反與其黨皆伏誅晃秉之從子也甲子徙南陽王翽爲隨郡王魏馮太后忌青州刺史南郡王李惠誣云惠將南叛十二月癸巳誅惠及妻并其子弟太后以猜嫌所夷滅者十餘家而惠所歷皆有善政魏人尤寃惜之尚書令王僧䖍奏以朝廷禮樂多違正典大明中即以宫縣合和鞞拂節數雖㑹慮乖雅體又今之清商實由銅爵三祖風流遺音盈耳京洛相髙江左彌貴中庸和雅莫近於斯而情變聽移稍復銷落十數年閒亡者將半民閒競造新聲雜曲煩淫無極宜命有司悉加􅀘綴朝廷從之是歲魏懷州刺史高允以老疾告歸鄉里尋復以安車徵至平城拜鎭軍大將軍中書監固辭不許乘車入殿朝賀不拜資治通鑑卷第一百三十四
