body:
  text: 臣司馬光奉勑編集漢紀五十二陽作噩凡三年起重光協洽盡昭孝獻皇帝乙初平二年春正月辛丑赦天下關東諸將議以朝廷幼沖逼於董卓遠隔關塞不知存否幽州牧劉虞宗室賢儁欲共立為主曹操曰吾等所以舉兵而逺近莫不響應者以義動故也今幼主微弱制於姦臣非有昌邑亡國之釁而一旦改易天下其孰安之諸君北面我自西向韓馥袁紹以書與袁術曰帝非孝靈子欲依絳灌誅廢少主迎立代王故事奉大司馬虞為帝術陰有不臣之心不利國家有長君乃外託公義以拒之紹復與術書曰今西名有幼君無血脉之屬公卿以下皆媚事卓安可復信但當使兵往屯關要皆自蹙死東立聖君太平可冀如何有疑又室家見戮不念子胥可復北面乎術荅曰聖主聰叡有周成之質賊卓因危亂之際威服百寮此乃漢家小厄之會乃云今主無血脉之屬豈不誣乎又曰室家見戮可復北面此卓所為豈國家哉慺慺赤心志在滅卓不識其他馥紹竟遣故樂浪太守張岐等齎議上虞尊號虞見岐等厲色叱之曰今天下崩亂主上䝉塵吾被重恩未能清雪國恥諸君各據州郡冝共戮力盡心王室而反造逆謀以相垢汙邪固拒之馥等又請虞領尚書事承制封拜復不聽欲犇匈奴以自絶紹等乃止二月丁丑以董卓為太師位在諸矦王上孫堅移屯梁東為卓將徐榮所敗復收散卒進屯陽人卓遣東郡太守胡軫督歩騎五千擊之以吕布為騎督軫與布不相得堅出擊大破之梟其都督華雄或謂袁術曰堅若得雒不可復制此為除狼而得虎也術疑之不運軍糧堅夜馳見術畫地計校曰所以出身不顧者上為國家討賊下慰將軍家門之私讎堅與卓非有骨肉之怨也而將軍受浸潤之言還相嫌疑何也術踧踖即調發軍糧堅還屯卓遣將軍李傕説堅欲與和親令堅疏子弟任刺史郡守者許表用之堅曰卓逆天無道今不夷汝三族縣示四海則吾死不瞑目豈將與乃和親邪復進軍大谷距雒九十里卓自出與堅戰於諸陵間卓敗走却屯澠池聚兵於陜堅進至雒陽擊吕布復破走堅乃掃除宗廟祠以太牢得傳國璽於城南甄官井中分兵出新安澠池間以邀卓卓謂長史劉艾曰關東軍敗數矣皆畏孤無能為也惟孫堅小戇頗能用人當語諸將使知忌之孤昔與周愼西征邊韓於金城孤語張温求引所將兵為慎作後駐温不聽温又使孤討先零叛羌孤知其不克而不得止遂行留别部司馬劉靖將歩騎四千屯安定以為聲勢叛羌欲􅎒歸道孤小擊輒開畏安定有兵故也虜謂安定當數萬人不知但靖也而孫堅隨周愼行謂愼求先將萬兵造金城使愼以二萬作後駐邊韓畏愼大兵不敢輕與堅戰而堅兵足以斷其運道兒曹用其言凉州或能定也温既不能用孤愼又不能用堅卒用敗走堅以佐軍司馬所見略與人同固自為可但無故從諸袁兒終亦死耳乃使東中郎將董越屯澠池中郎將段煨屯華陰中郎將牛輔屯安邑其餘諸將布在諸縣以禦山東輔卓之壻也卓引還長安孫堅修塞諸陵引軍還魯陽夏四月董卓至長安公卿皆迎拜車下卓抵手謂御史中丞皇甫嵩曰義眞怖未乎嵩曰明公以德輔朝廷大慶方至何怖之有若淫刑以逞將天下皆懼豈獨嵩乎卓黨欲尊卓比太公稱尚父卓以問蔡邕邕曰明公威德誠為巍巍然比之太公愚意以為未可宜須關東平定車駕還反舊京然後議之卓乃止卓使司􅀠校尉劉囂籍吏民有為子不孝為臣不忠為吏不清為弟不順者皆身誅財物没官於是更相誣引冤死者以千數百姓囂囂道路以目六月丙戌地震秋七月司空种拂免以光禄大夫濟南淳于嘉為司空太尉趙謙罷以太常馬日磾為太尉初何進遣雲中張楊還并州募兵㑹進敗楊留上黨有衆數千人袁紹在河内楊往歸之與南單于於扶羅屯漳水韓馥以豪傑多歸心袁紹忌之陰貶節其軍糧欲使其衆離散㑹馥將麴義叛馥與戰而敗紹因與義相結紹客逢紀謂紹曰將軍舉大事而仰人資給不據一州無以自全紹曰冀州兵彊吾士飢乏設不能辦無所容立紀曰韓馥庸才可密要公孫瓚使取冀州馥必駭懼因遣辯士為陳禍福馥迫於倉卒必肯遜讓紹然之即以書與瓚瓚遂引兵而至外託討董卓而陰謀襲馥馥與戰不利㑹董卓入關紹還軍延津使外甥陳留高幹及馥所親潁川辛評荀諶郭圖等説馥曰公孫瓚將燕代之卒乘勝來南而諸郡應之其鋒不可當袁車騎引軍東向其意未可量也竊為將軍危之馥懼曰然則為之奈何諶曰君自料寛仁容衆為天下所附孰與袁氏馥曰不如也臨危吐决智勇過人又孰與袁氏馥曰不如也世布恩德天下家受其惠又孰與袁氏馥曰不如也諶曰袁氏一時之傑將軍資三不如之埶久處其上彼必不為將軍下也夫冀州天下之重資也彼若與公孫瓚并力取之危亡可立而待也夫袁氏將軍之舊且為同盟當今之計若舉冀州以讓袁氏彼必厚德將軍瓚亦不能與之争矣是將軍有讓賢之名而身安於泰山也馥性恇怯因然其計馥長史耿武别駕閔純治中李歴聞而諌曰冀州帶甲百萬穀支十年袁紹孤客窮軍仰我􅈹息譬如嬰兒在股掌之上絶其哺乳立可餓殺奈何欲以州與之馥曰吾袁氏故吏且才不如本初度德而讓古人所貴諸君獨何病焉先是馥從事趙浮程渙將強弩萬張屯孟津聞之率兵馳還時紹在朝歌清水浮等從後來船數百艘衆萬餘人整兵鼓夜過紹營紹甚惡之浮等到謂馥曰袁本􅀄軍無斗糧各已離散雖有張楊於扶羅新附未肯為用不足敵也小從事等請自以見兵拒之旬日之間必土崩瓦解明將軍但當開閤高枕何憂何懼馥又不聽乃避位出居中常侍趙忠故舎遣子送印綬以讓紹紹將至從事十人爭棄馥去獨耿武閔純杖刀拒之不能禁乃止紹皆殺之紹遂領冀州牧承制以馥為奮威將軍而無所將御亦無官屬紹以廣平沮授為奮武將軍使監䕶諸將寵遇甚厚魏郡審配鉅鹿田豐並以正直不得志於韓馥紹以豐為别駕配為治中及南陽許攸逢紀潁川荀諶皆為謀主紹以河内朱漢為都官從事漢先為韓馥所不禮且欲徼迎紹意擅發兵圍守馥第㧞刃登屋馥走上樓收得馥大兒槌折兩脚紹立收漢殺之馥猶憂怖從紹索去往依張邈後紹遣使詣邈有所計議與邈耳語馥在坐上謂為見圖無何起至溷以書刀自殺鮑信謂曹操曰袁紹為盟主因權專利將自生亂是復有一卓也若抑之則力不能制秖以遘難且可規大河之南以待其變操善之㑹黑山于毒白繞眭固等十餘萬衆略東郡王肱不能禦曹操引兵入東郡擊白繞於濮陽破之袁紹因表操為東郡太守治東武陽南單于劫張楊以叛袁紹屯於黎陽董卓以楊為建義將軍河内太守太史望氣言當有大臣戮死者董卓使人誣衛尉張温與袁術交通冬十月壬戌笞殺温於市以應之青州黄巾冦勃海衆三十萬欲與黒山合公孫瓚率歩騎二萬人逆擊於東光南大破之斬首三萬餘級賊棄其輜重犇走度河瓚因其半濟薄之賊復大破死者數萬流血丹水收得生口七萬餘人車甲財物不可勝筭威名大震劉虞子和為侍中帝思東歸使和偽逃董卓濳出武關詣虞令將兵來迎和至南陽袁術利虞為援留和不遣許兵至俱西令和為書與虞虞得書遣數千騎詣和公孫瓚知術有異志止之虞不聽瓚恐術聞而怨之亦遣其從弟越將千騎詣術而陰教術執和奪其兵由是虞瓚有隙和逃術來北復為袁紹所留是時關東州郡務相兼并以自彊大袁紹袁術亦自相離貳術遣孫堅擊董卓未返紹以㑹稽周昻為豫州刺史襲奪堅陽城堅歎曰同舉義兵將救社稷逆賊垂破而各若此吾當誰與戮力乎引兵擊昻走之袁術遣公孫越助堅攻昻越為流矢所中死公孫瓚怒曰余弟死禍起於紹遂出軍屯磐河上䟽數紹罪惡進兵攻紹冀州諸城多畔紹從瓚紹懼以所佩勃海太守印綬授瓚從弟範遣之郡而範遂背紹領勃海兵以助瓚瓚乃自署其將帥嚴綱為冀州刺史田楷為青州刺史單經為兖州刺史又悉改置郡縣守令初涿郡劉備中山靖王之後也少孤貧與母以販履為業長七尺五寸垂手下䣛顧自見其耳有大志少語言喜怒不形於色嘗與公孫瓚同師事盧植由是往依瓚瓚使備與田楷徇青州有功因以為平原相備少與河東關羽􅃰郡張飛相友善以羽飛為别部司馬分綂部曲備與二人寑則同牀恩若兄弟而稠人廣坐侍立終日隨備周旋不避艱險常山趙雲為本郡將吏兵詣公孫瓚瓚曰聞貴州人皆願袁氏尹何獨迷而能反乎雲曰天下訩訩未知孰是民有倒縣之厄鄙州論議從仁政所在不爲忽袁公私明將軍也劉僃見而竒之深加接納雲遂從僃至平原爲僃主騎兵初袁術之得南陽戸口數百萬而術奢淫肆欲徴斂無度百姓苦之稍稍離散既與袁紹有隙各立黨援以相圖謀術結公孫瓚而紹連劉表豪桀多附於紹術怒曰羣豎不吾從而從吾家奴乎又與公孫瓚書曰紹非袁氏子紹聞大怒術使孫堅擊劉表表遣其將黄祖逆戰於樊鄧之間堅擊破之遂圍襄陽表夜遣黄祖濳出發兵祖將兵欲還堅逆與戰祖敗走􅇡峴山中堅乘勝夜追祖祖部兵從竹木間暗射堅殺之堅所舉孝廉長沙桓階詣表請堅䘮表義而許之堅兄子賁率其士衆就袁術術復表賁為豫州刺史術由是不能勝表初董卓入關留朱儁守雒陽而儁濳與山東諸將通謀懼為卓所襲出犇荆州卓以􅀪農楊懿為河南尹儁復引兵還雒擊懿走之儁以河南殘破無所資乃東屯中牟移書州郡請師討卓徐州刺史陶謙上儁行車騎將軍遣精兵三千助之餘州郡亦有所給謙丹陽人朝廷以黄巾冦亂徐州用謙為刺史謙至擊黄巾大破走之州境晏然劉焉在益州陰圖異計沛人張魯自祖父陵以來世為五斗米道客居于蜀魯母以鬼道常往來焉家焉乃以魯為督義司馬以張脩為别部司馬與合兵掩殺漢中太守蘇固斷絶斜谷閣殺害漢使焉上書言米賊斷道不得復通又託他事殺州中豪強王咸李權等十餘人以立威刑犍爲太守任岐及校尉賈龍由此起兵攻焉焉擊殺岐龍焉意漸盛作乘輿車具千餘乘劉表上焉有似子夏在西河疑聖人之論時焉子範爲左中郎將誕爲治書御史璋爲奉車都尉皆從帝在長安惟小子别部司馬瑁素隨焉帝使璋曉喻焉焉留璋不遣公孫度威行海外中國人士避亂者多歸之北海管寧邴原王烈皆往依焉寧少時與華歆爲友嘗與歆共鋤菜見地有金寧揮鋤不顧與瓦石無異歆捉而擲之人以是知其優劣邴原逺行遊學八九年而歸師友以原不飲酒會米肉送之原曰本能飲酒但以荒思廢業故斷之耳今當遠别可一飲燕於是共坐飲酒終日不醉寧原俱以操尚稱度虛館以􅇋之寧既見度乃廬於山谷時避難者多居郡南而寧獨居北示無還志後漸來從之旬月而成邑寧毎見度語唯經典不及世事還山專講詩書習爼豆非學者無見也由是度安其賢民化其德邴原性剛直清議以格物度已下心不安之寧謂原曰濳龍以不見成德言非其時皆招禍之道也密遣原逃歸度聞之亦不復追也王烈器業過人少時名聞在原寧之右善於教誘鄉里有盜牛者主得之盜請罪曰刑戮是甘乞不使王彦方知也烈聞而使人謝之遺布一端或問其故烈曰盜懼吾聞其過是有恥惡之心既知恥惡則善心將生故與布以勸為善也後有老父遺劒於路行道一人見而守之至暮老父還尋得劒怪之以事告烈烈使推求乃先盜牛者也諸有爭訟曲直將質之於烈或至塗而反或望廬而還皆相推以直不敢使烈聞之度欲以為長史烈辭之為商賈以自穢乃免三年春正月丁丑赦天下董卓遣牛輔將兵屯陜輔分遣校尉北地李傕張掖郭汜武威張濟將步騎數萬擊破朱儁於中牟因掠陳留潁川諸縣所過殺虜無遺初荀淑有孫曰彧少有才名何顒見而異之曰王佐才也及天下亂彧謂父老曰潁川四戰之地冝亟避之鄉人多懷土不能去彧獨率宗族去依韓馥㑹袁紹已奪馥位待彧以上賓之禮彧度紹終不能定大業聞曹操有雄略乃去紹從操操與語大悦曰吾子房也以為奮武司馬其鄉人留者多為傕汜等所殺袁紹自出拒公孫瓚與瓚戰於界橋南二十里瓚兵三萬其鋒甚鋭紹令麴義領精兵八百先登強弩千張夾承之瓚輕其兵少縱騎騰之義兵伏楯下不動未至十數歩一時同發讙呼動地瓚軍大敗斬其所置冀州刺史嚴綱獲甲首千餘級追至界橋瓚斂兵還戰義復破之遂到瓚營㧞其牙門餘衆皆走初兖州刺史劉岱與紹瓚連和紹令妻子居岱所瓚亦遣從事范方將騎助岱及瓚擊破紹軍語岱令遣紹妻子别敕范方若岱不遣紹家將騎還吾定紹將加兵於岱岱與官屬議連日不决聞東郡程昱有智謀召而問之昱曰若棄紹近援而求瓚遠助此假人於越以救溺子之説也夫公孫瓚非袁紹之敵也今雖壞紹軍然終爲紹所禽岱從之范方將其騎歸未至而瓚敗曹操軍頓丘于毒等攻東武陽操引兵西入山攻毒等本屯諸將皆請救武陽操曰使賊聞我西而還武陽自解也不還我能敗其本屯虜不能㧞武陽必矣遂行毒聞之棄武陽還操遂擊眭固及匃奴於夫羅於内黄皆大破之董卓以其弟旻爲左將軍兄子璜爲中軍校尉皆典兵事宗族内外並列朝廷卓侍妾懷抱中子皆封矦弄以金紫卓車服僭擬天子召呼三臺尚書以下皆自詣卓府啓事又築塢於郿高厚皆七丈積榖為三十年儲自云事成雄據天下不成守此足以畢老卓忍於誅殺諸將言語有蹉跌者便戮於前人不聊生司徒王允與司􅀠校尉黄琬僕射士孫瑞尚書楊瓚密謀誅卓中郎將呂布便弓馬膂力過人卓自以遇人無禮行止常以布自衛甚愛信之誓為父子然卓性剛􅄶嘗小失卓意卓㧞手㦸擲布布拳捷避之而改容顧謝卓意亦解布由是陰怨於卓卓又使布守中閤而私於傅婢益不自安王允素善待布布見允自陳卓幾見殺之􅃺允因以誅卓之謀告布使為内應布曰如父子何曰君自姓吕本非骨肉今憂死不暇何謂父子擲㦸之時豈有父子情邪布遂許之夏四月丁巳帝有疾新愈大㑹未央殿卓朝服乘車而入陳兵夾道自營至宫左歩右騎屯衛周帀令吕布等扞衛前後王允使士孫瑞自書詔以授布布令同郡騎都尉李肅與勇士秦誼陳衛等十餘人偽著衛士服守北掖門内以待卓卓入門肅以㦸刺之卓衷甲不入傷臂墯車顧大呼曰呂布何在布曰有詔討賊臣卓大罵曰庸狗敢如是邪布應聲持矛刺卓趣兵斬之主簿田儀及卓倉頭前赴其尸布又殺之凡所殺三人布即出懷中詔版以令吏士曰詔討卓耳餘皆不問吏士皆正立不動大稱萬嵗百姓歌舞於道長安中士女賣其珠玉衣裝市酒肉相慶者塡滿街肆弟旻璜等及宗族老弱在郿皆為其羣下所斫射死􅁀卓尸於市天時始熱卓素充􅏂脂流於地守尸吏為大炷置卓臍中然之光明逹曙如是積日諸袁門生聚董氏之尸焚灰楊之於路塢中有金二三萬斤銀八九萬斤錦綺竒玩積如丘山以王允録尚書事吕布為奮威將軍假節儀比三司封温矦共秉朝政卓之死也左中郎將高陽矦蔡邕在王允坐聞之驚歎允勃然叱之曰董卓國之大賊幾亡漢室君為王臣所宜同疾而懷其私遇反相傷痛豈不共為逆哉即收付廷尉邕謝曰身雖不忠古今大義耳所厭聞口所常玩豈當背國而嚮卓也願黥首刖足繼成漢史士大夫多矜救之不能得太尉馬日磾謂允曰伯喈曠世逸才多識漢事當續成後史為一代大典而所坐至微誅之無乃失人望乎允曰昔武帝不殺司馬遷使作謗書流於後世方今國祚中衰戎馬在郊不可令佞臣執筆在幼主左右既無益聖德復使吾黨䝉其訕議日磾退而告人曰王公其無後乎善人國之紀也制作國之典也滅紀廢典其能久乎邕遂死獄中初黄門侍郎荀攸與尚書鄭泰侍中种輯等謀曰董卓驕忍無親雖資彊兵實一匹夫耳可直刺殺也事垂就而覺收攸繫獄泰逃犇袁術攸言語飲食自若㑹卓死得免青州黄巾冦兖州劉岱欲擊之濟北相鮑信諌曰今賊衆百萬百姓皆震恐士卒無􅃲志不可敵也然賊軍無輜重唯以鈔略為資今不若畜士衆之力先為固守彼欲戰不得攻又不能其勢必離散然後選精鋭據要害擊之可破也岱不從遂與戰果為所殺曹操部將東郡陳宫謂操曰州今無主而王命斷絶宫請説州中綱紀明府尋往牧之資之以收天下此霸王之業也宫因往説别駕治中曰今天下分裂而州無主曹東郡命世之才也若迎以牧州必寧生民鮑信等亦以為然乃與州吏萬濳等至東郡迎操領兖州刺史操遂進兵擊黄巾於壽張東不利賊衆精悍操兵寡弱操撫循激勵明設賞罰承間設竒晝夜㑹戰戰輒禽獲賊遂退走鮑信戰死操購求其喪不得乃刻木如信狀祭而哭焉詔以京兆金尚為兖州刺史將之部操逆擊之尚犇袁術五月以征西將軍皇甫嵩為車騎將軍初吕布勸王允盡殺董卓部曲允曰此軰無罪不可布欲以卓財物班賜公卿將校允又不從允素以劒客遇布布負其功勞多自誇伐既失意望漸不相平允性剛稜疾惡初懼董卓故折節下之卓既殱滅自謂無復患難頗自驕傲以是羣下不甚附之允始與士孫瑞議特下詔赦卓部曲既而疑曰部曲從其主耳今若名之惡逆而赦之恐適使深自疑非所以安之也乃止又議悉罷其軍或説允曰凉州人素憚袁氏而畏關東今若一旦解兵開關必人人自危可以皇甫義眞為將軍就領其衆因使留陜以安撫之允曰不然関東舉義兵者皆吾徙也今若距險屯陜雖安凉州而疑關東之心不可也時百姓訛言當悉誅凉州人卓故將校遂轉相恐動皆擁兵自守更相謂曰蔡伯喈但以董公親厚尚從坐今既不赦我曹而欲使解兵今日解兵明日當復為魚肉矣吕布使李肅至陜以詔命誅牛輔輔等逆與肅戰肅敗走􅀪農布誅殺之輔恇怯失守㑹營中無故自驚輔欲走為左右所殺李催等還輔已死催等無所依遣使詣長安求赦王允曰一歳不可再赦不許催等益懼不知所為欲各解散間行歸鄉里討虜校尉武威賈詡曰諸君若弃軍單行則一亭長能束君矣不如相率而西以攻長安爲董公報仇事濟奉國家以正天下若其不合走未後也催等然之乃相與結盟率軍數千晨夜西行王允以胡文才楊整脩皆凉州大人召使東解釋之不假借以温顔謂曰關東䑕子欲何爲邪卿往呼之於是二人往實召兵而還傕隨道收兵比至長安已十餘萬與卓故部曲樊稠李䝉等合圍長安城城峻不可攻守之八日吕布軍有叟兵内反六月戊午引傕衆入城放兵虜掠布與戰城中不勝將數百騎以卓頭繫馬鞍出走駐馬青􅃈門外招王允同去允曰若䝉社稷之靈上安國家吾之願也如其不獲則奉身以死之朝廷糼少恃我而已臨難茍免吾不忍也努力謝關東諸公勤以國家爲念太常种拂曰為國大臣不能禁暴禦侮使白刃向宫去將安之遂戰而死傕汜屯南宫掖門殺太僕魯大鴻臚周奐城門校尉崔烈越騎校尉王頎吏民死者萬餘人狼藉滿道王允扶帝上宣平門避兵傕等於城門下伏地叩頭帝謂傕等曰卿等放兵縱横欲何為乎傕等曰董卓忠於陛下而無故為吕布所殺臣等為卓報讎非敢為逆也請事畢詣廷尉受罪傕等圍門樓共表請司徒王允出問太師何罪允窮蹙乃下見之己未赦天下以李傕為揚武將軍郭汜為揚烈將軍樊稠等皆為中郎催等收司􅀠校尉黄琬下獄殺之初王允以同郡宋翼為左馮翊王宏為右扶風催等欲殺允恐二郡為患乃先徴翼宏宏遣使謂翼曰郭汜李傕以我二人在外故未危王公今日就徴明日俱族計將安出翼曰雖禍福難量然王命所不得避也宏曰關東義兵鼎沸欲誅董卓今卓已死其黨與易制耳若舉兵共討傕等與山東相應此轉禍為福之計也翼不從宏不能獨立遂俱就徴甲子傕收允及翼宏并殺之允妻子皆死宏臨命詬曰宋翼豎儒不足議大計傕尸王允於市莫敢收者故吏平陵令京兆趙戩棄官收而葬之始允自專討卓之勞士孫瑞歸功不矦故得免於難臣光曰易稱勞謙君子有終吉士孫瑞有功不伐以保其身可不謂之智乎傕等以賈詡為左馮翊欲矦之詡曰此救命之計何功之有固辭不受又以為尚書僕射詡曰尚書僕射官之師長天下所望詡名不素重非所以服人也乃以為尚書吕布自武關犇南陽袁術待之甚厚布自恃有功於袁氏恣兵鈔掠術患之布不自安去從張楊於河内李催等購求布急布又逃歸袁紹丙子以前將軍趙謙為司徒秋七月庚子以太尉馬日磾為太􅀓録尚書事八月以車騎將軍皇甫嵩為太尉詔太傅馬日磾太僕趙岐杖節鎮撫關東九月以李傕為車騎將軍領司􅀠校尉假節郭汜為後將軍樊稠為右將軍張濟為驃騎將軍皆封矦催汜稠筦朝政濟出屯􅀪農司徒趙謙罷甲申以司空淳于嘉為司徒光禄大夫楊彪為司空録尚書事初董卓入關説韓遂馬騰與共圖山東遂騰率衆詣長安會卓死李傕等以遂為鎮西將軍遣還金城騰為征西將軍遣屯郿冬十月荆州刺史劉表遣使貢獻以表為鎮南將軍荆州牧封成武矦十二月太尉皇甫嵩免以光禄大夫周忠為太尉參録尚書事曹操追黄巾至濟北悉降之得戎卒三十餘萬男女百餘萬口收其精鋭者號青州兵操辟陳留毛玠為治中從事玠言於操曰今天下分崩乘輿播蕩生民廢業饑饉流亡公家無經歳之儲百姓無安固之志難以持久夫兵義者勝守位以財宜奉天子以令不臣脩耕植以畜軍資如此則霸王之業可成也操納其言遣使詣河内太守張楊欲假塗西至長安楊不聽定陶董昭説楊曰袁曹雖為一家勢不久羣曹今雖弱然實天下之英雄也當故結之况今有縁宜通其上事并表薦之若事有成永為深分楊於是通操上事仍表薦操昭為操作書與李傕郭汜等各隨輕重致殷勤傕汜見操使以為關東欲自立天子今曹操雖有使命非其誠實議留操使黄門侍郎鍾繇説催汜曰方今英雄並起各矯命專制唯曹兖州乃心王室而逆其忠款非所以副將來之望也傕汜乃厚加報荅繇皓之曾孫也徐州刺史陶謙與諸守相共奏記推朱儁為太師因移檄牧伯欲以同討李傕等奉迎天子會李傕用太尉周忠尚書賈詡䇿徴儁入朝儁乃辭謙議而就徴復爲太僕公孫瓚復遣兵擊袁紹至龍湊紹擊破之瓚遂還幽州不敢復出揚州刺史汝南陳温卒袁紹使袁遺領揚州袁術擊破之遺走至沛爲兵所殺術以下邳陳瑀爲揚州刺史四年春正月甲寅朔日有食之丁卯赦天下曹操軍甄城袁術為劉表所逼引軍屯封丘黒山别部及匈奴於扶羅皆附之曹操擊破術軍遂圍封丘術走襄邑又走寧陵操追擊連破之術走九江揚州刺史陳瑀拒術不納術退保陰陵集兵於淮北復進向壽春瑀懼走歸下邳術遂領其州兼稱徐州伯李傕欲結術爲援以術為左將軍封陽翟矦假節袁紹與公孫瓚所置青州刺史田楷連戰二年士卒疲困糧食並盡互掠百姓野無青草紹以其子譚為青州刺史楷與戰不勝㑹趙岐來和解關東瓚乃與紹和親各引兵去三月袁紹在薄落津魏郡兵反與黒山賊于毒等數萬人共覆鄴城殺其太守紹還屯斥丘夏曹操還軍定陶徐州治中東海王朗及别駕琅邪趙昱説刺史陶謙曰求諸矦莫如勤王今天子越在西京宜遣使奉貢謙乃遣昱奉章至長安詔拜謙徐州牧加安東將軍封溧陽矦以昱為廣陵太守朗為㑹稽太守是時徐方百姓殷盛榖實差豐流民多歸之而謙信用讒邪疎遠忠直刑政不治由是徐州漸亂許劭避地廣陵謙禮之甚厚劭告其徒曰陶恭祖外慕聲名内非真正待吾雖厚其埶必薄遂去之後謙果捕諸寓士人乃服其先識六月扶風大雨雹華山崩裂太尉周忠免以太僕朱儁為太尉錄尚書事下邳闕宣聚衆數千人自稱天子陶謙擊殺之大雨晝夜二十餘日漂沒民居袁紹出軍入朝哥鹿膓山討于毒圍攻五日破之斬毒及其衆萬餘級紹遂尋山北行進擊諸賊左髭丈八等皆斬之又擊劉石青牛角黄龍左校郭大賢李大目于氐根等復斬數萬級皆屠其屯壁遂與黒山賊張燕及四營屠各鴈門烏桓戰於常山燕精兵數萬騎數千匹紹與吕布共擊燕連戰十餘日燕兵死傷雖多紹軍亦疲遂俱退吕布將士多暴横紹患之布因求還雒陽紹承制以布領司􅀠校尉遣壯士送布而陰圖之布使人鼓筝於帳中密亡去送者夜起斫帳被皆壞明旦紹聞布尚在懼閉城自守布引軍復歸張楊前太尉曹嵩避難在瑯邪其子操令泰山太守應劭迎之嵩輜重百餘兩陶謙别將守陰平士卒利嵩財寶掩襲嵩於華費間殺之并少子德秋操引兵擊謙攻抜十餘城至彭城大戰謙兵敗走保郯初京雒遭董卓之亂民流移東出多依徐土遇操至坑殺男女數十萬口於泗水水為不流操攻郯不能克乃去攻取慮睢陵夏丘皆屠之雞犬亦盡墟邑無復行人冬十月辛丑京師地震有星孛于天市司空楊彪免丙午以太常趙温為司空録尚書事劉虞與公孫瓚積不相能瓚數與袁紹相攻虞禁之不可而稍節其禀假瓚怒屢違節度又復侵犯百姓虞不能制乃遣驛使奉章陳其􅁀掠之罪瓚亦上虞稟糧不周二奏交馳互相非毁朝廷依違而已瓚乃築小城於薊城東南以居之虞數請㑹瓚輒稱病不應虞恐其終為亂乃率所部兵合十萬人以討之時瓚部曲放散在外倉卒掘東城欲走虞兵無部伍不習戰又愛民廬舎敕不聽焚燒戒軍士曰無傷餘人殺一伯珪而已攻圍不下瓚乃簡募鋭士數百人因風縱火直衝突之虞衆大潰虞與官屬北犇居庸瓚追攻之三日城陷執虞并妻子還薊猶使領州文書㑹詔遣使者段訓増虞封邑督六州事拜瓚前將軍封易矦瓚乃誣虞前與袁紹等謀稱尊號脅訓斬虞及妻子於薊市故常山相孫瑾掾張逸張瓚等相與就虞罵瓚極口然後同死瓚傳虞首於京師故吏尾敦於路劫虞首歸葬之虞以恩厚得衆心北州百姓流舊莫不痛惜初虞欲遣使奉章詣長安而難其人衆咸曰右北平田疇年二十二年雖少然有竒才虞乃備禮請以為􅁺具車騎將行疇曰今道路阻絶冦虞縱横稱官泰使爲衆所指願以私行期於得逹而已虞從之疇乃自選家客二十騎俱上西關出塞傍北山直趣朔方循間道至長安致命詔拜疇為騎都尉疇以天子方䝉塵未安不可以荷佩榮寵固辭不受得報馳還比至虞已死疇謁祭虞墓陳發章表哭泣而去公孫瓚怒購求獲疇謂曰汝不送章報我何也疇曰漢室衰穨人懷異心唯劉公不失忠節章報所言於將軍未美恐非所樂聞故不進也且將軍既滅無罪之君又讎守義之臣疇恐燕趙之士將皆蹈東海而死莫有從將軍者也瓚乃釋之疇北歸無終率宗族及他附從者數百人埽地而盟曰君仇不報吾不可以立於世遂入徐無山中營深險平敞地而居躬耕以養父母百姓歸之數年間至五千餘家疇謂其父老曰今衆成都邑而莫相統一又無法制以治之恐非久安之道疇有愚計願與諸君共施之可乎皆曰可疇乃為約束相殺傷犯盗諍訟者隨輕重抵罪重者至死凡一十餘條又制為㛰姻嫁娶之禮與學校講授之業班行於衆衆皆便之至道不拾遺北邊翕然服其威信烏桓鮮卑各遣使致饋疇悉撫納令不為寇十二月辛丑地震司空趙温免乙巳以衞尉張喜為司空資治通鑑巻第六十
