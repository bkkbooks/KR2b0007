body:
  text: 氐王楊難當自稱大秦王改元建義立妻爲王后世子爲太子置百官皆如天子之制然猶貢奉宋魏不絶夏四月魏娥清古弼攻燕白狼城克之髙麗遣其將葛盧孟光將衆數萬随陽伊至和龍迎燕王髙麗屯于臨川燕尚書令郭生因民之憚遷開城門納魏兵魏人疑之不入生遂勒兵攻燕王王引髙麗兵入自東門與生戰于闕下生中流矢死葛盧孟光入城命軍士脱弊􅄄取燕武庫精仗以給之大掠城中五月乙卯燕王帥龍城見戸東徙焚宫殿火一旬不滅令婦人􅀍甲居中陽伊等勒精兵居外葛盧孟光帥􅀐殿後方軌而進前後八十餘里古弼部將髙茍子帥􅀐欲追之弼醉抜刀止之故燕王得逃去魏主聞之怒檻車徴弼及娥清至平城皆黜爲門卒戊午魏主遣散􅀐常侍封撥使髙麗令送燕王丁卯魏主如河西六月詔寧朔將軍蕭汪之將兵討程道養軍至郪口帛氐奴請降道養兵敗還入郪山赫連定之西遷也楊難當遂據上邽秋七月魏主遣驃􅀐大將軍樂平王丕尚書令劉絜督河西髙平諸軍以討之先遣平東將軍崔􅄨齎詔書諭難當魏散􅀐侍郎游雅來聘已未零陵王太妃禇氏卒追諡曰晉恭思皇后葬以晉禮八月魏主畋于河西魏主遣廣平公張􅀺發定州兵一萬二千通莎泉道九月庚戍魏樂平王丕等至略陽楊難當懼請奉詔攝上邽守兵還仇池諸將議以爲不誅其豪帥軍還之後必相聚爲亂又大衆逺出不有所掠無以充軍實賞將士丕將從之中書侍郎髙允參丕軍事諌曰如諸將之謀是傷其向化之心大軍旣還爲亂必速丕乃止撫慰􅀄附秋毫不犯秦隴遂安難當以其子順爲雍州刺史守下辯髙麗不送燕王於魏遣使奉表稱當與馮􅀪俱奉王化魏主以髙麗違詔議擊之將􅀤隴右􅀐卒劉絜曰秦隴新民且當優復俟其饒實然後用之樂平王丕曰和龍新定宐廣脩農桑以豐軍實然後進取則髙麗一舉可滅也魏主乃止癸丑封皇子濬爲始興王駿爲武陵王冬十一月巳酉魏主如棝陽驅野馬於雲中置野馬􅁐閏月壬子還宫初髙祖克長安得古銅渾儀儀狀雖舉不綴七曜是歳詔太史令錢樂之更鑄渾儀徑六尺八分以水轉之昏明中星與天相應柔然與魏絶和親犯魏邊吐谷渾惠王慕璝卒弟慕利延立十四年春正月戊子魏北平宣王長孫嵩卒辛卯大赦二月乙卯魏主如幽州三月丁丑魏主以南平王渾爲鎭東大將軍儀同三司鎭和龍已卯還宫帝遣散􅀐常侍劉熈伯如魏議納幣㑹帝女亡而止夏四月趙廣張尋梁顯等各帥衆降别將王道恩斬程道養送首餘黨悉平丁未以輔國將軍周籍之爲益州刺史魏主以民官多貪夏五月已丑詔吏民得舉告守令不如法者於是姦猾專求牧宰之失廹脅在位横於閭里而長吏咸降心待之貪縱如故丙申魏主如雲中秋七月戊子魏永昌王健等討山胡白龍餘黨於西河滅之八月甲辰魏主如河西九月甲申還宫丁酉魏主遣使者拜吐谷渾王慕利延爲鎭西大將軍儀同三司改封西平王冬十月癸卯魏主如雲中十一月壬申還宫魏主復遣散􅀐侍郎董琬髙明等多齎金帛使西域招撫九國琬等至烏孫其王甚喜曰破洛那者舌二國皆欲稱臣致貢於魏但無路自致耳今使君宐過撫之乃遣導譯送琬詣破洛那明詣者舌旁國聞之爭遣使者隨琬等入貢凡十六國自是毎歳朝貢不絶魏主以其妹武威公主妻河西王牧犍河西王遣宋繇奉表詣平城謝且問其母及公主所宐稱魏主使羣臣議之皆曰母以子貴妻從夫爵牧犍母宐稱河西國太后公主於其國稱王后於京師則稱公主魏主從之初牧犍娶涼武昭王之女及魏公主至李氏與其母尹氏遷居酒泉頃之李氏卒尹氏撫之不哭曰汝國破家亡今死晚矣牧犍之弟無諱鎭酒泉謂尹氏曰后諸孫在伊吾后欲就之乎尹氏未測其意紿之曰吾子孫漂蕩託身異域餘生無幾當死此不復爲氊裘之􅀑也未幾潛犇伊吾無諱遣􅀐追及之尹氏謂追􅀐曰沮渠酒泉許吾歸北何爲復追汝取吾首以往吾不復還矣追􅀐不敢逼引還尹氏卒於伊吾牧犍遣將軍沮渠旁周入貢于魏魏主遣侍中古弼尚書李順賜其侍臣衣服并徴世子封壇入侍是歳牧犍遣封壇如魏亦遣使詣建康獻雜書及敦煌趙􅜫所撰甲寅元曆并求雜書數十種帝皆與之李順自河西還魏主問之曰卿往年言取凉州之䇿朕以東方有事未遑也今和龍巳平吾欲即以此年西征可乎對曰臣疇昔所言以今觀之私謂不謬然國家戎車屢動士馬疲勞西征之議請俟它年魏主乃止十五年春二月丁未以吐谷渾王慕利延爲都督西秦河沙三州諸軍事鎭西大將軍西秦河二州刺史隴西王二月癸未魏主詔罷沙門年五十巳下者初燕王􅀪至遼東髙麗王璉遣使勞之曰龍城王馮君爰適野次士馬勞乎􅀪慙怒稱制讓之髙麗處之平郭尋徙北豐􅀪素侮髙麗政刑賞罰猶如其國髙麗乃奪其侍人取其太子王仁爲質􅀪怨髙麗遣使來上表求迎上遣使者王白駒等迎之并令髙麗資遣髙麗王不欲使弘南來遣將孫潄髙仇等殺弘于北豐并其子孫十餘人諡弘曰昭成皇帝白駒等帥所領七千餘人掩討漱仇殺仇生擒漱髙麗王以白駒等專殺遣使執送之上以逺國不欲違其意下白駒等獄巳而原之夏四月納故黃門侍郎殷淳女爲太子劭妃五月戊寅魏大赦丙申魏主如五原秋七月自五原北伐柔然命樂平王丕督十五將出東道永昌王徤督十五將出西道魏主自出中道至浚稽山復分中道爲二陳留王崇從大澤向涿邪山魏主從浚稽北向天山西登白阜不見柔然而還時漠北大旱無水草人馬多死冬十一月丁卯朔日有食之十二月丁巳魏主至平城豫章雷次宗好學隱居廬山甞徴爲散􅀐侍郎不就是歳以處士徴至建康爲開館於雞籠山使聚徒教授帝雅好藝文使丹楊尹廬江何尚之立玄學太子率更令何承天立史學司徒參軍謝元立文學并次宗儒學爲四學元靈運之從祖弟也帝數幸次宗學館令次宗以巾褠侍講資給甚厚又除給事中不就乆之還廬山臣光曰易曰君子多識前言往行以畜其德孔子曰辭逹而巳矣然則史者儒之一端文者儒之餘事至於老莊虚無固非所以爲敎也夫學者所以求道天下無二道安有四學哉帝性仁厚恭儉勤於爲政守灋而不峻容物而不弛百官皆乆於其職守宰以六朞爲斷吏不苟免民有所係三十年間四境之内晏安無事戸口蕃息出租供徭止於歳賦晨出暮歸自事而巳閭閻之内講誦相聞士敦操尚鄉恥輕薄江左風俗於斯爲美後之言政治者皆稱元嘉焉十六年春正月庚寅司徒義康進位大將軍領司徒南兖州刺史江夏王義恭進位司空魏主如定州初髙祖遺詔令諸子次第居荆州臨川王義慶在荆州八年欲爲之選代其次應在南譙王義宣帝以義宣人才凡鄙置不用二月己亥以衡陽王義季爲都督荆湘等八州諸軍事荆州刺史義季甞春月出畋有老父􅀍苫而耕左右斥之老父曰盤于遊畋古人所戒今陽和布氣一日不耕民失其時柰何以從禽之樂而驅斥老農也義季止馬曰賢者也命賜之食辭曰大王不奪農時則境内之民皆飽大王之食老夫何敢獨受大王之賜乎義季問其名不告而退三月魏雍州刺史葛那宼上洛上洛太守鐔長生弃郡走辛未魏主還宫楊保宗與兄保顯自童亭犇魏庚寅魏主以保宗爲都督隴西諸軍事征西大將軍開府儀同三司秦州牧武都王鎭上邽妻以公主保顯爲鎭西將軍晉夀公河西王牧犍通於其嫂李氏兄弟三人傳嬖之李氏與牧犍之姊共毒魏公主魏主遣解毒醫乗傳救之得愈魏主徵李氏牧犍不遣厚資給使居酒泉魏毎遣使者詣西域常詔牧犍􅀤導護送出流沙使者自西域還至武威牧犍左右有告魏使者曰我君承蠕蠕可汗妄言云去歳魏天子自來伐我士馬疫死大敗而還我擒其長弟樂平王丕我君大喜宣言於國又聞可汗遣使告西域諸國稱魏巳削弱今天下唯我爲彊􅀂更有魏使勿復供奉西域諸國頗有貳心使還具以狀聞魏主遣尚書賀多羅使涼州􅀚虚實多羅還亦言牧犍雖外脩臣禮内實乖悖魏主欲討之以問崔浩對曰牧犍逆心巳露不可不誅官軍往年北伐雖不克獲實無所􅂢戰馬三十萬匹計在道死傷不滿八千常歳羸死亦不減萬匹而逺方乗虚遽謂衰耗不能復振今出其不意大軍猝至彼必駭擾不知所爲擒之必矣魏主曰善吾意亦以爲然於是大集公卿議於西堂弘農王奚斤等三十餘人皆曰牧犍西垂下國雖心不純臣然繼父位以來職貢不乏朝廷待以藩臣妻以公主今其罪惡未彰宐加恕宥國家新征蠕蠕士馬疲弊未可大舉且聞其土地鹵瘠難得水草大軍旣至彼必嬰城固守攻之不抜野無所掠此危道也􅀄崔浩惡尚書李順順使涼州凡十二返魏主以爲能涼武宣王數與順遊宴對其羣下時爲驕慢之語恐順泄之隨以金寳納於順懐順亦爲之隱浩知之密以白魏主魏主未之信及議伐涼州順與尚書古弼皆曰自温圉水以西至姑臧地皆枯石絶無水草彼人言姑臧城南天梯山上冬有積雪深至丈餘春夏消釋下流成川居民引以漑灌彼聞軍至決此渠口水必乏絶環城百里之内地不生草人馬飢渴難以久留斤等之議是也魏主乃命浩與斤等相詰難衆無復它言但云彼無水草浩曰漢書地理志稱凉州之畜爲天下饒􅀂無水草畜何以蕃又漢人終不於無水草之地築城郭建郡縣也且雪之消釋僅能斂塵何得通渠漑灌乎此言大爲欺誣矣李順曰耳聞不如目見吾甞目見何可共辯浩曰汝受人金錢欲爲之遊説謂我目不見便可欺邪帝隱聽聞之乃出見斤等辭色嚴厲羣臣不敢復言唯唯而巳羣臣旣出振威將軍代人伊馛言於帝曰涼州􅀂果無水草彼何以爲國衆議皆不可用宐從浩言帝善之夏五月丁丑魏主治兵於西郊六月甲辰􅀤平城使侍中宐都王穆夀輔太子晃監國決留臺事内外聽焉又使大將軍長樂王稽敬輔國大將軍建寧王崇將二萬人屯漠南以僃柔然命公卿爲書以讓河西王牧犍數其十二罪且曰􅀂親帥羣臣委贄逺迎謁拜馬首上䇿也六軍旣臨面縛輿襯其次也􅀂守迷窮城不時悛悟身死族滅爲世大戮宐思厥中自求多福己酉改封隴西王吐谷渾慕利延爲河南王魏主自雲中濟河秋七月已巳至上郡屬國城壬午留輜重部分諸軍使撫軍大將軍永昌王健尚書令劉絜與常山王素爲前鋒兩道竝進驃􅀐大將軍樂平王丕太宰陽平王杜超爲後繼以平西將軍源賀爲鄕導魏主問賀以取涼州方略對曰姑臧城旁有四部鮮卑皆臣祖父舊民臣願處軍前宣國威信示以禍福必相帥歸命外援旣服然後取其孤城如反掌耳魏主曰善八月甲午永昌王健獲河西畜産二十餘萬河西王牧犍聞有魏師驚曰何爲乃爾用左丞姚定國計不肯出迎求救於柔然遣其弟征南大將軍董來將兵萬餘人出戰於城南望風犇潰劉絜用卜者言以爲日辰不不利斂兵不追董來遂得入城魏主由是怒之丙申魏主至姑臧遣使諭牧犍令出降牧犍聞柔然欲入魏邊爲宼冀幸魏主東還遂嬰城固守其兄子祖踰城出降魏主具知其情乃分軍圍之源賀引兵招慰諸部下三萬餘落故魏主得專攻姑臧無復外慮魏主見姑臧城外水草豐饒由是恨李順謂崔浩曰卿之昔言今果驗矣對曰臣之言不敢不實􅀋皆如此魏主之將伐涼州也太子晃亦以爲疑至是魏主賜太子詔曰姑臧城東西門外涌泉合於城北其大如河自餘溝渠流入漠中其閒乃無燥地故有此敕以釋汝疑庚子立皇子鑠爲南平王九月丙戍河西王牧犍兄子萬年帥所領降魏姑臧城潰牧犍帥其文武五千人面縛請降魏主釋其縛而禮之收其城内戸口二十餘萬倉庫珍寳不可勝計使張掖王秃髮保周龍􅀐將軍穆罷安逺將軍源賀分徇諸郡雜胡降者又數十萬􅀄牧犍以其弟無諱爲沙州刺史都督建康以西諸軍事領酒泉太守宐得爲秦州刺史都督丹嶺以西諸軍事領張掖太守安周爲樂都太守從弟唐兒爲敦煌太守及姑臧破魏主遣鎭南將軍代人奚眷擊張掖鎭北將軍封沓擊樂都宐得燒倉庫西犇酒泉安周南犇吐谷渾封沓掠數千戸而還奚眷進攻酒泉無諱宐得收遺民犇晉昌遂就唐兒於敦煌魏主使弋陽公元絜守酒泉及武威張掖皆置將守之魏主置酒姑臧謂羣臣曰崔公智略有餘吾不復以爲竒伊馛弓馬之士而所見乃與崔公同此深可竒也馛善射能曳牛却行走及犇馬而性忠謹故魏主特愛之魏主之西伐也穆夀送至河上魏主敕之曰吳提與牧犍相結素深聞朕討牧犍吳提必犯塞朕故留壯兵肥馬使卿輔佐太子收田旣畢即􅀤兵詣漠南分伏要害以待虜至引使深入然後擊之無不克矣涼州路逺朕不得救卿勿違朕言夀頓首受命夀雅信中書博士公孫質以爲謀主夀質皆信卜筮以爲柔然必不來不爲之僃質軌之弟也柔然敕連可汗聞魏主向姑臧乗虚入宼留其兄乞列歸與嵇敬建寜王崇相拒於北鎭自帥精􅀐深入至善無七介山平城大駭民爭走中城穆壽不知所爲欲塞西郭門請太子避保南山竇太后不聽而止遣司空長孫道生征北大將軍張􅀺拒之於吐頽山㑹嵇敬建寧王崇擊破乞列歸於隂山之北擒之并其伯父他吾無鹿胡及將帥五百人斬首萬餘級敕連聞之遁去追至漠南而還冬十月辛酉魏主東還留樂平王丕及征西將軍賀多羅鎭涼州徙沮渠牧犍宗族及吏民三萬戸于平城癸亥秃髪保周帥諸部鮮卑據張掖叛魏十二月乙亥太子劭加元服大赦劭美􅁂眉好讀書便弓馬喜延賔客意之所欲上必從之東宫置兵與羽林等壬午魏主至平城以柔然入宼無大失亡故穆壽等得不誅魏主猶以妹婿待沮渠牧犍征西大將軍河西王如故牧犍母卒葬以太妃禮爲武宣王置守􅃁三十家涼州自張氏以來號爲多士沮渠牧犍尤喜文學以敦煌闞駰爲姑臧太守張湛爲兵部尚書劉昞索敞隂興爲國師助敎金城宋欽爲世子洗馬趙柔爲金部郎廣平程駿駿弟從弘爲世子侍講魏主克涼州皆禮而用之以闞駰劉昞爲樂平王丕從事中郎安定胡叟少有俊才往從牧犍牧犍不甚重之叟謂程􅀪曰貴主居僻陋之國而淫名僣禮以小事大而心不純壹外慕仁義而實無道德其亡可翹足待也吾將擇木先集于魏與子暫違非乆闊也遂適魏歳餘而牧犍敗魏主以叟爲先識拜虎威將軍賜爵始復男河内常爽世寓凉州不受禮命魏主以爲宣威將軍河西右相宋繇從魏主至平城而卒魏主以索敞爲中書博士時魏朝方尚武功貴遊子弟不以講學爲意敞爲博士十餘年勤於誘導肅而有禮貴遊皆嚴憚之多所成立前後顕逹至尚書牧守者數十人常爽置館於温水之右教授七百餘人爽立賞罰之科弟子事之如嚴君由是魏之儒風始振髙允毎稱爽訓厲有方曰文翁柔勝先生剛克立敎雖殊成人一也陳留江强寓居涼州獻經史諸子千餘卷及書法亦拜中書博士魏主命崔浩監祕書事綜理史職以中書侍郎髙允散􅀐侍郎張偉參典著作浩啟稱隂仲逹叚承根涼土美才請同修國史皆除著作郎仲逹武威人承根暉之子也浩集諸曆家考校漢元以來日月薄食五星行度并譏前史之失别爲魏曆以示髙允允曰漢元年十月五星聚東井此乃曆術之淺事今譏漢史而不覺此謬恐後人之譏今猶今之譏古也浩曰所謬云何允曰案星傳太白辰星常附日而行十月日在尾箕昏没於申南而東井方出於寅北二星何得背日而行是史官欲神其事不復推之於理也浩曰天文欲爲變者何所不可邪允曰此不可以空言爭宐更審之坐者咸怪允之言唯東宫少傅㳺雅曰髙君精於暦數當不虚也後歳餘浩謂允曰先所論者本不經心及更考究果如君言五星乃以前三月聚東井非十月也衆乃歎服允雖明曆􅀄不推歩及爲人論說唯㳺雅知之雅數以災異問允允曰隂陽災異知之甚難旣巳知之復恐漏泄不如不知也天下妙理至多何遽問此雅乃止魏主問允爲政何先時魏多封禁良田允曰臣少賤唯知農事􅀂國家廣田積穀公私有僃則饑饉不足憂矣帝乃命悉除田禁以賦百姓吐谷渾王慕利延聞魏克涼州大懼帥衆西遁踰沙漠魏主以其兄慕璝有擒赫連定之功遣使撫諭之慕利延乃還故地氐王楊難當將兵數萬宼魏上邽秦州人多應之東平吕羅漢説鎭將拓跋意頭曰難當衆盛今不出戰示之以弱衆情離沮不可守也意頭遣羅漢將精􅀐千餘出衝難當陳所向披靡殺其左右􅀐八人難當大驚㑹魏主以璽書責讓難當難當引還仇池南豐太妃司馬氏卒故營陽王之后也趙廣張尋等復謀反伏誅十七年春正月巳酉沮渠無諱宼魏酒泉元絜輕之出城與語壬子無諱執絜以圍酒泉二月魏假通直常侍邢頴來聘三月沮渠無諱扳酒泉夏四月戊午朔日有食之庚辰沮渠無諱宼魏張掖禿髪保周屯刪丹丙戍魏主遣撫軍大將軍永昌王健督諸將討之司徒義康專揔朝􅁠上羸疾積年心勞輒􅀤屢至危殆義康盡心營奉藥食非口所親甞不進或連夕不寐内外衆事皆專決施行性好吏職紏剔文案莫不精盡上由是多委以事凡所陳奏入無不可方伯以下竝令義康選用生殺大事或以録命断之􅀔傾逺近朝野輻湊毎旦府門常有車數百乗義康傾身引接未甞懈倦復能强記耳目所經終身不忘好於稠人廣席標題所憶以示聦明士之幹練者多􅀍意遇甞謂劉湛曰王敬弘王球之屬竟何所堪坐取富貴復􅃚可解然素無學術不識大體朝士有才用者皆引入巳府府僚無施及忤㫖者乃斥爲臺官自謂兄弟至親不復存君臣形迹率心而行曾無猜防私置僮六千餘人不以言臺四方獻饋皆以上品薦義康而以次者供御上甞冬月噉甘歎其形味竝劣義康曰今年甘殊有佳者遣人還東府取甘大供御者三寸領軍劉湛與僕射殷景仁有隙湛欲􅀝義康之重以傾之義康􅁠勢巳盛湛愈推崇之無復人臣之禮上浸不能平湛􅀄入朝上恩禮甚厚湛善論治道諳前代故事敘致銓理聽者忘疲毎入雲龍門御者即解駕左右及羽儀隨意分散不夕不出以此爲常及晚節驅煽義康上意雖内離而接遇不改甞謂所親曰劉班􅀄自西還宫與語常視日早晚慮其將去比入吾亦視日早晚苦其不去殷景仁密言於上曰相王權重非社稷計宐少加裁抑上隂然之司徒左長史劉斌湛之宗也大將軍從事中郎王履謐之孫也及主簿劉敬文祭酒魯郡孔􅅌秀皆以傾諂有寵於義康見上多疾皆謂宫車一日晏駕宐立長君上甞疾篤使義康具顧命詔義康還省流涕以告湛及景仁湛曰天下艱難詎是㓜主所御義康景仁竝不荅而㣧秀等輒就尚書議曹索晉咸康末立康帝舊事義康不知也及上疾瘳微聞之而斌等密謀欲使大業終歸義康遂邀結朋黨伺察禁省有不與巳同者必百方構䧟之又採拾景仁短長或虚造異同以告湛自是主相之勢分矣義康欲以劉斌爲丹楊尹言次啓上陳其家貧言未卒上曰以爲吴郡後㑹稽大守羊玄保求還義康又欲以斌代之啓上曰羊玄保欲還不審以誰爲㑹稽上時未有所擬倉猝曰我巳用王鴻自去年秋上不復往東府五月癸巳劉湛遭母憂去職湛自知罪舋巳彰無復全地謂所親曰今年必敗常日正賴口舌爭之故得推遷耳今旣窮毒無復此望禍至其能乆乎乙巳沮渠無諱復圍張掖不克退保臨松魏主不復加討但以詔諭之六月丁丑魏皇孫濬生大赦改元太平眞君取宼謙之神書云輔佐北方太平眞君故也太子劭詣京口拜京陵司徒義康竟陵王誕等竝從南兖州刺史江夏王義恭自江都㑹之秋七月巳丑魏永昌王健擊破秃髪保周于番禾保周走遣安南將軍尉眷追之丙申魏太后竇氏殂壬子皇后􅀽氏殂癸丑秃髪保周窮廹自殺八月甲申沮渠無諱使其中尉梁偉詣魏永昌王健請降歸酒泉郡及所虜將士元絜等魏主使尉眷留鎭涼州九月壬子葬元皇后上以司徒彭城王義康嫌隙巳著將成禍亂冬十月戊申收劉湛付廷尉下詔暴其罪惡就獄誅之并誅其子黯亮儼及其黨劉斌劉敬文孔胤秀等八人徙尚書庫部郎何默子等五人於廣州因大赦是日敕義康入宿留止中書省其夕分收湛等靑州刺史杜驥勒兵殿内以備非常遣人宣㫖告義康以湛等罪狀義康上表遜位詔以義康爲江州刺史侍中大將軍如故出鎭豫章􅀄殷景仁卧疾五年雖不見上而密函去來日以十數朝政大小必以咨之影迹周密莫有窺其際者收湛之日景仁使拂拭衣冠左右皆不曉其意其夜上出華林園延賢堂召景仁景仁猶稱脚疾以小牀輿就坐誅討處分一皆委之􅀄檀道濟薦吳興沈慶之忠謹曉兵上使領隊防東掖門劉湛爲領軍甞謂之曰卿在省歳乆比當相論慶之正色曰下官在省十年自應得轉不復以此仰累收湛之夕上開門召慶之慶之戎服縛袴而入上曰卿何意乃爾急裝慶之曰夜半喚隊主不容緩服上遣慶之收劉斌殺之驍􅀐將軍徐湛之逵之之子也與義康尤親厚上深衘之義康敗湛之􅀍收罪當死其母㑹稽公主於兄弟爲長嫡素爲上所禮家事大小必咨而後行髙祖微時常自於新洲伐荻有納布衫襖臧皇后手所作也旣貴以付公主曰後世有驕奢不節可以此衣示之至是公主入宫見上號哭不復施臣妾之禮以錦囊盛納衣擲地曰汝家本貧賤此是我母爲汝父所作今日得一飽餐遽欲殺我兒邪上乃赦之吏部尚書王球履之叔父也以簡淡有美名爲上所重履性進利深結義康及湛球屢戒之不從誅湛之夕履徒跣告球球命左右爲取履先温酒與之謂曰常日語汝云何履怖懼不得荅球徐曰阿父在汝亦何憂上以球故履得免死廢於家義康方用事人爭求親暱唯司徒主簿江湛早能自疎求出爲武陵内史檀道濟甞爲其子求㛰於湛湛固辭道濟因義康以請之湛拒之愈堅故不染於二公之難上聞而嘉之湛夷之子也彭城王義康停省十餘日見上奉辭便下渚上惟對之慟哭餘無所言上遣沙門慧琳視之義康曰弟子有還理不慧琳曰恨公不讀數百卷書初吴興太守謝述􅁉之弟也累佐義康數有規益早卒義康將南歎曰昔謝述唯勸吾退劉班唯勸吾進今班存而述死其敗也宐哉上亦曰謝述􅀂存義康必不至此以征虜司馬蕭斌爲義康諮議參軍領豫章太守事無大小皆以委之斌摹之之子也使龍驤將軍蕭承之將兵防守義康左右愛念者竝聽隨從資奉優厚信賜相係朝廷大事皆報示之乆之上就㑹稽公主宴集甚懽主起再拜叩頭悲不自勝上不曉其意自起扶之主曰車子歳暮必不爲陛下所容今特請其命因慟哭上亦流涕指蔣山曰必無此慮􅀂違今誓便是負􅀄寧陵即封所飲酒賜義康并書曰會稽姊飲宴憶弟所餘酒今封送故終主之身義康得無恙臣光曰文帝之於義康友愛之情其始非不隆也終於失兄弟之歡虧君臣之義迹其亂階正由劉湛權利之心無有厭巳詩云貪人敗􅀋其是之謂乎徴南兖州刺史江夏王義恭爲司徒録尚書事戊寅以臨川王義慶爲南兖州刺史殷景仁爲楊州刺史僕射吏部尚書如故義恭懲彭城之敗雖爲揔録奉行文書而巳上乃安之上年給相府錢二千萬它物稱此而義恭性奢用常不足上又别給錢年至千萬十一月丁亥魏主如山北殷景仁旣拜楊州羸疾遂篤上爲之敕西州道上不得有車聲癸丑卒十二月癸亥以光禄大夫王球爲僕射戊辰以始興王濬爲楊州刺史時濬尚幼州事悉委後軍長史范曄主簿沈璞曄泰之子璞林子之子也曄尋遷左衛將軍以吏部郎沈演之爲右衛將軍對掌禁旅又以庾炳之爲吏部郎俱參機密演之勁之曾孫也曄有儁才而薄情淺行數犯名敎爲士流所鄙性躁競自謂才用不盡常怏怏不得志吏部尚書何尚之言於帝曰范曄志趨異常請出爲廣州刺史􅀂在内舋成不得不加鈇鉞鈇鉞亟行非國家之美也帝曰始誅劉湛復遷范曄人將謂卿等不能容才朕信受䜛言但共知其如此無能爲害也是歳魏寧南將軍王慧龍卒吕􅀇伯留守其墓終身不去魏主欲以伊馛爲尚書封郡公馛辭曰尚書務殷公爵至重非臣年少愚近所宐膺受帝問其所欲對曰中祕二省多諸文士􅀂恩矜不巳請參其次帝善之以爲中護軍將軍祕書監大秦王楊難當復稱武都王十八年春正月癸卯魏以沮渠無諱爲征西大將軍涼州牧酒泉王彭城王義康至豫章辭刺史甲辰以義康都督江交廣三州諸軍事前龍驤參軍巴東扶令育詣闕上表稱昔􅀽盎諌漢文帝曰淮南王􅀂道路遇霜露死陛下有殺弟之名文帝不用追悔無及彭城王義康先朝之愛子陛下之次弟􅀂有迷謬之愆正可數之以善惡導之以義方柰何信疑似之嫌一旦黜削逺送南垂草萊黔首皆爲陛下痛之廬陵徃事足爲􅀛鑑恐義康年窮命盡奄忽于南臣雖微賤竊爲陛下羞之陛下徒知惡枝之宐伐豈知伐枝之傷樹伏願亟召義康返于京甸兄弟恊和君臣輯睦則四海之望塞多言之路絶矣何必司徒公楊州牧然後可以置彭城王哉􅀂臣所言於國爲非請伏重誅以謝陛下表奏即收付建康獄賜死裴子野論曰夫在上爲善􅀂雲行雨施萬物受其賜及其惡也􅀂天裂地震萬物所驚駭其誰弗知其誰弗見豈戮一人之身鉗一夫之口所能禳逃所能弭滅哉是皆不勝其忿怒而有増於疾疹也以太祖之含弘尚掩耳於彭城之戮自斯以後誰易由言有宋累葉罕聞直諒豈骨鯁之氣俗愧前古抑時王刑政使之然乎張約隕於權臣扶育斃於哲后宋之鼎鑊吁可畏哉魏新興王俊荒淫不灋三月庚戍降爵爲公俊母先得罪死俊積怨望有逆謀事覺賜死辛亥魏賜郁乆閭乞列歸爵爲朔方王沮渠萬年爲張掖王夏四月沮渠唐兒叛沮渠無諱無諱留從弟天周守酒泉與弟宐得引兵擊唐兒唐兒敗死魏以無諱終爲邊患庚辰遣鎮南將軍奚眷擊酒泉秋八月辛亥魏遣散􅀐侍郎張偉來聘九月戊戍魏永昌王健卒冬十一月戊子王球卒巳亥以丹楊尹孟顗爲尚書僕射酒泉城中食盡萬餘口皆餓死沮渠天周殺妻以食戰士庚子魏奚眷抜酒泉獲天周送平城殺之沮渠無諱乏食且畏魏兵之盛乃謀西度流沙遣其弟安周西擊鄯善鄯善王欲降㑹魏使者至勸令拒守安周不能克退保東城氐王楊難當傾國入宼謀據蜀土遣其建忠將軍苻沖出東洛以禦梁州兵梁秦二州刺史劉眞道擊沖斬之眞道懐敬之子也難當攻抜葭萌獲晉壽太守申坦遂圍涪城巴西梓潼二郡太守劉道錫嬰城固守難當攻之十餘日不克乃還道錫道産之弟也十二月癸亥詔龍驤將軍裴方明等帥甲士三千人又發荆雍二州兵以討難當皆受劉眞道節度晉寜太守爨松子反寜州刺史徐循討平之天門蠻田向求等反破漊中荆州刺史衡陽王義季遣行參軍曹孫念討破之魏宼謙之言於魏主曰今陛下以眞君御世建静輪天宫之灋開古以來未之有也應登受符書以彰聖德帝從之資治通鑑卷第一百二十三
