front:
  text: 日晏駕道濟不復可制㑹帝疾篤義康言於帝召道濟入朝其妻向氏謂道濟曰髙世之勲自古所忌今無事相召禍其至矣旣至留之累月帝稍閒將遣還巳下渚未􅀤㑹帝疾動義康矯詔召道濟入祖道因執之三月巳未下詔稱道濟潛散金貨招誘剽猾因朕寢疾規肆禍心收付廷尉并其子給事黄門侍郎植等十一人誅之唯宥其孫孺又殺司空參軍薛彤髙進之二人皆道濟腹心有勇力時人比之􅀜張道濟見收憤怒目光如炬脫幘投地曰乃壊汝萬里長城魏人聞之喜曰道濟死吴子輩不足復憚庚申大赦以中軍將軍南譙王義宣爲江州刺史辛未魏平東將軍娥清安西將軍古弼將精􅀐一萬伐燕平州刺史拓跋嬰帥遼西諸軍會之
  hash: sha256:99f23028f34e83630675971ea5cc004631472ebcb400b6bc2c2546a36ab4c73f
