body:
  text: 臣司馬光奉勑編集後梁紀四赤奮若六月凡三年有奇起昭陽作噩十二月盡強圉均王上下乾化三年十二月吳鎮海節度使徐温平盧節度使朱瑾帥諸將拒之遇于趙步吳徵兵未集温以四千餘人與景仁戰不勝而却景仁引兵乗之將及於隘吳吏士皆失色左驍衛大將軍宛丘陳紹援槍大呼曰誘敵太深可以進矣躍馬還鬭衆隨之梁兵乃退温拊其背曰非子之智勇吾幾困矣賜之金帛紹悉以分麾下吳兵旣集復戰於霍丘梁兵大敗王景仁以數騎殿吳人不敢逼梁之渡淮而南也表其可涉之津霍丘守將朱景浮表於木徙置深淵及梁兵敗還望表而涉溺死者太半吳人聚梁尸為京觀於霍丘庚午晉王以周德威為盧龍節度使兼侍中以李嗣本為振武節度燕主守光將奔滄州就劉守竒涉寒足腫且迷失道至燕樂之境晝匿阬谷數日不食令妻祝氏乞食於田父張師造家師造怪婦人異狀詰知守光處并其三子擒之癸酉晉王方宴將吏擒守光適至王語之曰主人何避客之深邪并仁㳟置之館舍以器服膳飲賜之王命掌書記王緘草露布緘不知故事書之於布遣人曳之晉王欲自雲代歸趙王鎔及王處直請由中山真定趣井陘王從之庚辰晉王發幽州劉仁恭父子皆荷校於露布之下守光父母唾其面而罵之曰逆賊破我家至此守光俛首而已甲申至定州舍于關城丙戌晉王與王處直謁北嶽廟是日至行唐趙王鎔迎謁于路四年春正月戊戌朔趙王鎔詣晉王行帳上壽置酒鎔願識劉太師靣晉王命吏脱劉仁恭及守光械引就席同宴鎔荅其拜又以衣服鞍馬酒饌贈之己亥晉王與鎔畋于行唐之西鎔送至境上而别丙子蜀主命太子判六軍開崇勲府置僚屬後更謂之天䇿府壬子晉王以練􅖞劉仁恭父子凱歌入于晉陽丙辰獻于太廟自臨斬劉守光守光呼曰守光死不恨然教守光不降者李小喜也王召小喜證之小喜瞋目叱守光曰汝内亂禽獸行亦我教邪王怒其無禮先斬之守光曰守光善騎射王欲成霸業何不留之使自効其二妻李氏祝氏讓之曰皇帝事已如此生亦何益妾請先死即伸頸就戮守光至死號泣哀祈不已王命節度副使盧汝弼等械仁恭至代州刺其心血以祭先王墓然後斬之或説趙王鎔曰大王所稱尚書令乃梁官也大王旣與梁為讎不當稱其官且自太宗踐阼已來無敢當其名者今晉王為盟主勳高位卑不若以尚書令讓之鎔曰善乃與王處直各遣使推晉王為尚書令晉王三讓然後受之始開府置行臺如太宗故事高季昌以蜀䕫萬忠涪四州舊􅀠荆南興兵取之先以水軍攻䕫州時鎮江節度使兼侍中嘉王宗壽鎮忠州䕫州刺史王成先請甲宗壽但以白布袍給之成先帥之逆戰季昌縱火船焚蜀浮橋招討副使張武舉鐵絙拒之船不得進㑹風反荆南兵焚溺死者甚衆季昌乗戰艦蒙以牛革飛石中之折其尾季昌易小舟以遁荆南兵大敗俘斬五千級成先密遣人奏宗壽不給甲之狀宗壽獲之召成先斬之帝以岐人數為冦二月甲戌徙感化節度使康懷英為永平節度使鎮長安懷英即懷貞也避帝名改焉夏四月丙子蜀主徙鎮江軍治䕫州丁丑司空兼門下侍郎同平章事于兢坐挾私遷補軍校罷為工部侍郎再貶萊州司馬吳袁州刺史劉崇景叛附于楚崇景威之子也楚將許貞將萬人援之吳都指揮使柴再用米志誠帥諸將討之楚岳州刺史許德勲將水軍巡邊夜分南風暴起都指揮使王環乗風趣黄州以繩梯登城徑趣州署執吳刺史馬鄴大掠而還德勲曰鄂州將邀我宜備之環曰我軍入黄州鄂人不知奄過其城彼自救不暇安敢邀我乃展旗鳴鼓而行鄂人不敢逼五月朔方節度使兼中書令潁川王韓遜卒軍中推其子洙為留後癸丑詔以洙為節度使吳柴再用等與劉崇景許貞戰於萬勝岡大破之崇景貞弃袁州遁去晉王旣克幽州乃謀入冦秋七月㑹趙王鎔及周德威於趙州南冦邢州李嗣昭引昭義兵㑹之楊師厚引兵救邢州軍於漳水之東晉軍至張公橋裨將曹進金來奔晉軍退諸鎮兵皆引歸八月晉王還晉陽蜀武泰節度使王宗訓鎮黔州貪㬥不法擅還成都庚辰見蜀主多所邀求言辭狂悖蜀主怒命衛士敺殺之戊子以内樞密使潘峭為武泰節度使同平章事翰林學士承㫖毛文錫為禮部尚書判樞密院峽上有堰或勸蜀主乗夏秋江漲決之以灌江陵毛文錫諫曰高季昌不服其民何罪陛下方以德懷天下忍以鄰國之民為魚鼈食乎蜀主乃止帝以福王友璋為武寧節度使前節度使王殷友珪所置也懼不受代叛附於吳九月命淮南西北靣招討應接使牛存節及開封尹劉鄩將兵討之冬十月存節等軍于宿州吳平盧節度使朱瑾等將兵救徐州存節等逆擊破之吳兵引歸十一月乙巳南詔冦黎州蜀主以䕫王宗範兼中書令宗播嘉王宗壽為三招討以擊之丙辰敗之於潘倉嶂斬其酋長趙嵯政等壬戌又敗之於山口城十二月乙亥破其武侯嶺十三寨辛巳又敗之於大度河俘斬數萬級蠻爭走度水橋絶溺死者數萬人宗範等將作浮梁濟大度河攻之蜀主召之令還癸未蜀興州刺史兼北路制置指揮使王宗鐸攻岐階州及固鎮破細沙等十一寨斬首四千級甲申指揮使王宗儼破岐長城關等四寨斬首二千級岐靜難節度使李繼徽為其子彥魯所毒而死彦魯自為留後貞明元年春正月己亥蜀主御得賢門受蠻俘大赦初黎雅蠻酋劉昌嗣郝􅀇鑒楊師泰雖内屬於唐受爵賞號㚋金堡三王而濳通南詔為之詗導鎮蜀者多文臣雖知其情不敢詰至是蜀主數以漏泄軍謀斬於成都市毁㚋金堡自是南詔不復敢犯邊二月牛存節等拔彭城王殷舉族自焚三月丁卯以右僕射兼門下侍郎同平章事趙光逢為太子太保致仕天雄節度使兼中書令鄴王楊師厚卒師厚晚年矜功恃衆擅割財賦選軍中驍勇置銀槍効節都數千人給賜優厚欲以復故時牙兵之盛帝雖外加尊禮内實忌之及卒私於宫中受賀租庸使趙巖判官邵賛言於帝曰魏􅀶為唐腹心之蠧二百餘年不能除去者以其地廣兵强之故也羅紹威楊師厚據之朝廷皆不能制陛下不乗此時為之計所謂彈疽不嚴必將復聚安知來者不為師厚乎宜分六州為兩鎮以弱其權帝以為然以平盧節度使賀德倫為天雄節度使置昭德軍於相州割澶衛二州􅀠焉以宣徽使張筠為昭德節度使仍分魏州將士府庫之半於相州筠海州人也二人旣赴鎮朝廷恐魏人不服遣開封尹劉鄩將兵六萬自白馬濟河以討鎮定為名實張形勢以脅之魏兵皆父子相承數百年族姻磐結不願分徙德倫屢趣之應行者皆嗟怨連營聚哭己丑劉鄩屯南樂先遣澶州刺史王彦章將龍驤五百騎入魏州屯金波亭魏兵相與謀曰朝廷忌吾軍府彊盛欲設䇿使之殘破耳吾六州歴代藩鎮兵未嘗逺出河門一旦骨肉流離生不如死是夕軍亂縱火大掠圍金波亭王彦章斬關而走詰旦亂兵入牙城殺賀德倫之親兵五百人劫德倫置樓上有効節軍校張彦者自帥其黨拔白刄止剽掠夏四月帝遣供奉官扈異撫諭魏軍許張彦以刺史彦請復相澶衛三州如舊制異還言張彦易與但遣劉鄩加兵立當傳首帝由是不許但以優詔荅之使者再返彥裂詔書抵於地㦸手南向詬朝廷謂德倫曰天子愚暗聽人穿鼻今我兵甲雖彊茍無外援不能獨立宜投款於晉遂逼德倫以書求援於晉李繼徽假子保衡殺李彦魯自稱静難留後舉邠寧二州來附詔以保衡為感化節度使以河陽留後霍彦威為靜難節度使吳徐温以其子牙内都指揮使知訓為淮南行軍副使内外馬步諸軍副使晉王得賀德倫書命馬步副總管李存審自趙州引兵進據臨清五月存審至臨清劉鄩屯洹水賀德倫復遣使告急于晉晉王引大軍自黄澤嶺東下與存審㑹於臨清猶疑魏人之詐按兵不進德倫遣判官司空頲犒軍密言於晉王曰除亂當除根因言張彦凶狡之狀勸晉王先除之則無虞矣王黙然頲貝州人也晉王進屯永濟張彦選銀槍効節五百人皆執兵自衛詣永濟謁見王登驛樓語之曰汝陵脅主帥殘虐百姓數日中迎馬訴寃者百餘輩我今舉兵而來以安百姓非貪人土地汝雖有功於我不得不誅以謝魏人遂斬彦及其黨七人餘衆股栗王召諭之曰罪止八人餘無所問自今當竭力為吾爪牙衆皆拜伏呼萬嵗明日王緩帶輕裘而進令張彦之卒擐甲執兵翼馬而從仍以為帳前銀槍都衆心由是大服劉鄩聞晉軍至選兵萬餘人自洹水趣魏縣晉王留李存審屯臨清遣史建瑭屯魏縣以拒之王自引親軍至魏縣與鄩夾河為營帝聞魏博叛大悔懼遣天平節度使牛存節將兵屯楊劉為鄩聲援㑹存節病卒以匡國節度使王檀代之岐王遣彰義節度使劉知俊圍邠州霍彦威固守拒之六月庚寅朔賀德倫帥將吏請晉王入府城慰勞旣入德倫上印節請王兼領天雄軍王固辭曰比聞汴冦侵逼貴道故親董師徒逺來相救又聞城中新罹塗炭故暫入存撫明公不垂鑒信乃以印節見推誠非素懷德倫再拜曰今冦敵密邇軍城新有大變人心未安德倫心腹紀綱為張彥所殺殆盡形孤勢弱安能統衆一旦生事恐負大恩王乃受之德倫帥將吏拜賀王承制以德倫為大同節度使遣之官德倫至晉陽張承業留之時銀槍効節都在魏城猶驕横晉王下令自今有朋黨流言及暴掠百姓者殺無赦以沁州刺史李存進為天雄都巡按使有訛言搖衆及强取人一錢已上者存進皆梟首磔尸於市旬日城中肅然無敢喧譁者存進本姓孫名重進振武人也晉王多出征討天雄軍府事皆委判官司空頲決之頲恃才挾勢睚眦必報納賄驕侈頲有從子在河南頲密使人召之都虞候張裕執其使者以白王王責頲曰自吾得魏愽庶事悉以委公公何得見欺如是獨不可先相示邪揖令歸第是日族誅於軍門以判官王正言代之正言鄆州人也魏州孔目吏孔謙勤敏多計數善治簿書晉王以為支度務使謙能曲事權要由是寵任彌固魏州新亂之後府庫空竭民間疲弊而聚三鎮之兵戰於河上殆將十年供億軍須未嘗有闕謙之力也然急徵重歛使六州愁苦歸怨於王亦其所為也張彦之以魏愽歸晉也貝州刺史張源德不從北結滄德南連劉鄩以拒晉數斷鎮定糧道或説晉王請先發兵萬人取源德然後東兼滄景則海隅之地皆為我有晉王曰不然貝州城堅兵多未易猝攻德州􅀠於滄州而無備若得而戍之則滄貝不得往來二壘旣孤然後可取乃遣騎兵五百晝夜兼行襲德州刺史不意晉兵至踰城走遂克之以遼州守捉將馮通為刺史秋七月晉人夜襲澶州陷之刺史王彦章在劉鄩營晉人獲其妻子待之甚厚遣間使誘彦章彦章斬其使晉人盡滅其家晉王以魏州將李巖爲澶州刺史晉王勞軍於魏縣因帥百餘騎循河而上覘劉鄩營㑹天隂晦鄩伏兵五千於河曲叢林間鼔譟而出圍王數重王躍馬大呼帥騎馳突所向披靡禆將夏魯竒等操短兵力戰自午至申乃得出亡其七騎魯竒手殺百餘人傷夷遍體㑹李存審救兵至乃得免王顧謂從騎曰幾爲虜嗤皆曰適足使敵人見大王之英武耳魯奇青州人也王以是益愛之賜姓名曰李紹竒劉鄩以晉兵盡在魏州晉陽必虛欲以竒計襲取之乃濳引兵自黄澤西去晉人怪鄩軍數日不出寂無聲迹遣騎覘之城中無煙火但時見旗幟循堞往來晉王曰吾聞劉鄩用兵一步百計此必詐也更使覘之乃縛芻為人執旗乗驢在城上耳得城中老弱者詰之云軍去巳二日矣晉王曰劉鄩長於襲人短於決戰計彼行纔及山下亟發騎兵追之㑹隂雨積旬黄澤道險堇泥深尺餘士卒援藤葛而進皆腹疾足腫或墜崖谷死者什二三晉將李嗣恩倍道先入晉陽城中知之勒兵為備鄩至樂平糗糧且盡又聞晉有備追兵在後衆懼將潰鄩諭之曰今去家千里深入敵境腹背有兵山谷髙深如墜井中去將何之惟力戰庶幾可免不則以死報君親耳衆泣而止周德威聞鄩西上自幽州引千騎救晉陽至土門鄩已整衆下山自邢州陳宋口踰漳水而東屯於宗城鄩軍往還馬死殆半時晉軍乏食鄩知臨清有蓄積欲據之以絶晉糧道德威急追鄩再宿至南宫遣騎擒其斥候者數十人斷腕而縱之使言曰周侍中已據臨清矣鄩軍大駭詰朝德威略鄩營而過入臨清鄩引軍趨貝州時晉王出師屯愽州劉鄩軍堂邑周德威攻之不克翌日鄩軍于莘縣晉軍踵之鄩治莘城塹而守之自莘及河築甬道以通饋餉晉王營於莘西三十里煙火相望一日數戰晉王愛元行欽驍健從代州刺史李嗣源求之嗣源不得已獻之以為散員都部署賜姓名曰李紹榮紹榮嘗力戰深入劒中其面未解高行周救之得免王復欲求行周重於發言密使人以官祿啗之行周辭曰代州養壯士亦為大王耳行周事代州亦猶事大王也代州脱行周兄弟於死行周不忍負之乃止絳州刺史尹皓攻晉之隰州八月又攻慈州皆不克王檀與昭義留後賀瓌攻澶州拔之執李巖送東都帝以楊師厚故將楊延直為澶州刺史使將兵萬人助劉鄩且招誘魏人晉王遣李存審將兵五千擊貝州張源德有卒三千每夕分出剽掠州民苦之請塹其城以安耕耘存審乃發八縣丁夫塹而圍之劉鄩在莘久饋運不給晉人數抵其寨下挑戰鄩不出晉人乃攻絶其甬道以千餘斧斬寨木梁人驚擾而出因俘獲而還帝以詔書讓鄩老師費糧失亡多不速戰鄩奏稱臣比欲以竒兵擣其腹心還取鎮定期以旬時再清河朔無何天未厭亂滛雨積旬糧竭士病又欲據臨清斷其饋餉而周楊五奄至馳突如神臣今退保莘縣享士訓兵以俟進取觀其兵數甚多便習騎射誠爲勍敵未易輕也茍有隙可乗臣豈敢偷安養冦帝復問鄩決勝之䇿鄩曰臣今無䇿惟願人給十斛糧賊可破矣帝怒責鄩曰將軍蓄米欲破賊邪欲療飢邪乃遣中使往督戰鄩集諸將問曰主上深居禁中不知軍旅徙與少年新進輩謀之夫兵在臨機制變不可預度今敵尚彊與戰必不利柰何諸將皆曰勝負須一決曠日何待鄩黙然不恱退謂所親曰主暗臣諛將驕卒惰吾未知死所矣他日復集諸將於軍門人置河水一器於前令飲之衆莫之測鄩諭之曰一器猶難滔滔之河可勝盡乎衆失色後數日鄩將萬餘人薄鎮定營鎮定人驚擾晉李存審以騎兵二千横擊之李建及以銀槍千人助之鄩大敗奔還晉人逐之及寨下俘斬千計劉巖逆婦于楚楚王殷遣永順節度使存逆之乙未蜀主以兼中書令王宗綰為北路行營都制置使兼中書令王宗播為招討使攻秦州兼中書令王宗瑤為東北面招討使同平章事王宗翰為副使攻鳳州庚戌吳以鎮海節度使徐温為管内水陸馬步諸軍都指揮使兩浙都招討使守侍中齊國公鎮潤州以昇潤常宣歙池六州為巡屬軍國庶務參決如故留徐知訓居廣陵秉政初帝為均王娶河陽節度使張歸霸女為妃即位欲立為后后以帝未南郊固辭九月壬午妃疾甚冊為德妃是夕卒康王友敬目重瞳子自謂當為天子遂謀作亂冬十月辛亥夜德妃將出葬友敬使腹心數人匿於寢殿帝斍之跣足踰垣而出召宿衛兵索殿中得而手刄之壬子捕友敬誅之帝由是踈忌宗室專任趙巖及德妃兄弟漢鼎漢傑從兄弟漢倫漢融咸居近職參預謀議每出兵必使之監護巖等依勢弄權賣官鬻獄離間舊將相敬翔李振雖為執政所言多不用振每稱疾不預事以避趙張之族政事日紊以至於亡劉鄩遣卒詐降於晉謀賂膳夫以毒晉王事泄晉王殺之并其黨五人十一月己未夜蜀宫火自得成都以來寶貨貯於百尺樓悉為煨燼諸軍都指揮使兼中書令宗侃等帥衛兵欲入救火蜀主閉門不内庚申旦火猶未熄蜀主出義興門見羣臣命有司聚太廟神主分巡都城言畢復入宫閉門將相皆獻帷幕飲食壬戌蜀大赦乙丑改元己巳蜀王宗翰引兵出青泥嶺克固鎮與秦州將郭守謙戰於泥陽川蜀兵敗退保鹿臺山辛未王宗綰等敗秦州兵於金沙谷擒其將李彦巢等乗勝趣秦州興州刺史王宗鐸克階州降其刺史李彦安甲戌王宗綰克成州擒其刺史李彦德蜀軍至上染坊秦州節度使李繼崇遣其子彦秀奉牌印迎降宗絳入秦州表排陳使王宗儔為留後劉知俊攻霍彦威於邠州半嵗不克聞秦州降蜀知俊妻子皆遷成都知俊解圍還鳳翔終懼及禍夜帥親兵七十人斬關而出庚辰奔于蜀軍王宗綰自河池兩當進兵㑹王宗瑤攻鳳州癸未克之岐義勝節度使同平章事李彦韜知岐王衰弱十二月舉耀鼎二州來降彦韜即温韜也乙未詔改耀州為崇州鼎州為􅁉州義勝軍為靜勝軍復彦韜姓温氏名昭圖官任如故丁未蜀大赦改明年元曰通正置武興軍於鳳州割文興二州􅀠之以前利州團練使王宗魯為節度使是嵗清海建武節度使兼中書令劉巖以吳越王鏐為國王而已獨為南平王表求封南越王及加都統帝不許巖謂僚屬曰今中國紛紛孰為天子安能梯航萬里逺事偽庭乎自是貢使遂絶二年春正月宣武節度使守中書令廣德靖王全昱卒帝聞前河南府參軍李愚學行召為左拾遺充崇政院直學士衡王友諒貴重李振等見皆拜之愚獨長揖帝聞而讓之曰衡王於朕兄也朕猶拜之卿長揖可乎對曰陛下以家人禮見衡王拜之宜也振等陛下家臣臣於王無素不敢妄有所屈久之竟以抗直罷為鄧州觀察判官蜀主以李繼崇為武泰節度使兼中書令隴西王二月辛丑夜吳宿衛將馬謙李球劫吳王登樓發庫兵討徐知訓知訓將出走嚴可求曰軍城有變公先棄衆自去衆將何依知訓乃止衆猶疑懼可求闔户而寢鼾息聞於外府中稍安壬寅謙等陳于天興門外諸道副都統朱瑾自潤州至視之曰不足畏也返顧外衆舉手大呼亂兵皆潰擒謙球斬之帝屢趣劉鄩戰鄩閉壁不出晉王乃留副揔管李存審守營自勞軍於貝州聲言歸晉陽鄩聞之奏請襲魏州帝報曰今掃境内以屬將軍社稷存亡繫兹一舉將軍勉之鄩令澶州刺史楊延直引兵萬人㑹於魏州延直夜半至城南城中選壯士五百濳出擊之延直不為備潰亂而走詰旦鄩自莘縣悉衆至城東與延直餘衆合李存審以營中兵踵其後李嗣源以城中兵出戰晉王亦自貝州至與嗣源當其前鄩見之驚曰晉王邪引兵稍却晉王躡之至故元城西與李存審遇晉王為方陳於西北存審為方陳於東南鄩為圓陳於其中間四面受敵合戰良久梁兵大敗鄩引數十騎突圍走梁步卒凡七萬晉兵環而擊之敗卒登木木枝為之折追至河上殺溺殆盡鄩收散卒自黎陽度河保滑州匡國節度使王檀密䟽請發關西兵襲晉陽帝從之發河中陜同華諸鎮兵合三萬出隂地關奄至晉陽城下晝夜急攻城中無備發諸司丁匠及驅市人乗城拒守城幾䧟者數四張承業大懼代北故將安金全退居太原往見承業曰晉陽根本之地若失之則大事去矣僕雖老病憂兼家國請以庫甲見授爲公擊之承業即與之金全帥其子弟及退將之家得數百人夜出北門擊梁兵於羊馬城内梁兵大驚引却昭義節度使李嗣昭聞晉陽有冦遣牙將石君立將五百騎救之君立朝發上黨夕至晉陽梁兵扼汾橋君立擊破之徑至城下大呼曰昭義侍中大軍至矣遂入城夜與安金全等分出諸門擊梁兵梁兵死傷什二三詰朝王檀引兵大掠而還晉王性矜伐以䇿非已出故金全等賞皆不行梁兵之在晉陽城下也大同節度使賀德倫部兵多逃入梁軍張承業恐其為變收德倫斬之帝聞劉鄩敗又聞王檀無功歎曰吾事去矣三月乙卯朔晉王攻衛州壬戌刺史米昭降之又攻惠州刺史靳紹走擒斬之復以惠州為磁州晉王還魏州上屢召劉鄩不至己巳即以鄩為宣義節度使使將兵屯黎陽夏四月晉人拔洺州以魏州都巡檢使􅀽建豐為洺州刺史劉鄩旣敗河南大恐鄩復不應召由是將卒皆摇心帝遣捉生都指揮使李霸帥所部千人戍楊劉癸卯出宋門其夕復自水門入大譟縱火剽掠攻建國門帝登樓拒戰龍驤四軍都指揮使杜晏球以五百騎屯毬場賊以油沃幕長木揭之欲焚樓勢甚危晏球於門隙窺之見賊無甲胃乃出騎擊之決力死戰俄而賊潰走帝見騎兵擊賊呼曰非吾龍驤之士乎誰為亂首晏球曰亂者惟李霸一都餘軍不動陛下但帥控鶴守宫城遲明臣必破之旣而晏球討亂者闔營皆族之以功除單州刺史五月吳越王鏐遣浙西安撫判官皮光業自建汀䖍郴潭岳荆南道入貢光業日休之子也六月晉人攻邢州保義節度使閻寶拒守帝遣捉生都指揮使張温將兵五百救之温以其衆降晉秋七月甲寅朔晉王至魏州上嘉吴越王鏐貢獻之勤壬戌加鏐諸道兵馬元帥朝議多言鏐之入貢利於市易不宜過以名器假之翰林學士竇夢徵執麻以泣坐貶蓬萊尉夢徵棣州人也甲子吳潤州牙將周郊作亂入府殺大將秦師權等大將陳祐等討斬之八月丁酉以太子少保致仕趙光逢為司空兼門下侍郎同平章事丙午蜀主以王宗綰為東北面都招討集王宗翰嘉王宗壽為第一第二招討將兵十萬出鳳州以王宗播為西北靣都招討武信節度使劉知俊天雄節度使王宗儔匡國軍使唐文裔為第一第二第三招討將兵十二萬出秦州以伐岐晉王自將攻邢州昭德節度使張筠弃相州走晉人復以相州􅀠天雄軍以李嗣源為刺史晉王遣人告閻寶以相州已拔又遣張温帥援兵至城下諭之寶舉城降晉王以寶為東南面招討使領天平節度使同平章事以李存審為安國節度使鎮邢州契丹王阿保機帥諸部兵三十萬號百萬自麟勝攻晉蔚州䧟之虜振武節度使李嗣本遣使以木書求貨於大同防禦使李存璋存璋斬其使契丹進攻雲州存璋悉力拒之九月晉王還晉陽王性孝故雖經營河北而數還晉陽省曹夫人嵗再三焉晉人以兵逼滄州順化節度使戴思逺弃城奔東都滄州將毛璋據城降晉晉王命李嗣源將兵鎮撫之嗣源遣璋詣晉陽晉王徙李存審為横海節度使鎮滄州以嗣源為安國節度使嗣源以安重誨為中門使委以心腹重誨亦為嗣源盡力重誨應州胡人也晉王自將兵救雲州行至代州契丹聞之引去王亦還以李存璋為大同節度使晉人圍貝州踰年張源德聞河北諸州皆為晉有欲降謀於其衆衆以窮而後降恐不免死不從共殺源德嬰城固守城中食盡噉人為糧乃謂晉將曰出降懼死請擐甲執兵而降事定而釋之晉將許之其衆三千人出降旣釋甲圍而殺之盡殪晉王以毛璋為貝州刺史於是河北皆入于晉惟黎陽為梁守晉王如魏州吳光州將王言殺刺史載肇吳王遣楚州團練使李厚討之廬州觀察使張崇不俟命引兵趣光州言弃城走以李厚權知光州崇慎縣人也庚申蜀新宫成在舊宫之北天平節度使兼中書令琅邪忠毅王王檀多募羣盜置帳下為親兵己卯盜乗檀無備突入府殺檀節度副使裴彦帥府兵討誅之軍府由是獲安冬十月甲申蜀王宗綰等出大散關大破岐兵俘斬萬計遂取寶雞己丑王宗播等出故關至隴州丙寅保勝節度使兼侍中李繼岌畏岐王猜忌帥其衆二萬弃隴州奔于蜀軍蜀兵進攻隴州以繼岌為西北面行營第四招討劉知俊㑹王宗綰等圍鳳翔岐兵不出㑹大雪蜀主召軍還復李繼岌姓名曰桑􅀪志􅀪志黎陽人也丁酉以禮部侍郎鄭珏為中書侍郎同平章事珏綮之姪孫也己亥蜀大赦晉王遣使如吳㑹兵以擊梁十一月吳以行軍副使徐知訓為淮北行營都招討使及朱瑾等將兵趣宋亳與晉相應旣渡淮移檄州縣進圍潁州十二月戊申蜀大赦改明年元曰天漢國號大漢楚王殷聞晉王平河北遣使通好晉王亦遣使報之是嵗慶州叛附于岐岐將李繼陟據之詔以左龍虎統軍賀瓌為西面行營馬步都指揮使將兵討之破岐兵下寧衍二州河東監軍張承業旣貴用事其姪瓘等五人自同州往依之晉王以承業故皆擢用之承業治家甚嚴有姪為盜殺販牛者承業聞立斬之王亟使救之已不及王以瓘為麟州刺史承業謂瓘曰汝本車度一民與劉開道為賊慣為不法今若不悛死無日矣由此瓘所至不敢貪暴吳越牙内先鋒都指揮使錢傳珦逆婦於閩自是閩與吳越通好閩鑄鈆錢與銅錢並行初燕人苦劉守光殘虐軍士多亡歸契丹及守光被圍於幽州其北邊士民多為契丹所掠契丹日益彊大契丹王阿保機自稱皇帝國人謂之天皇王以妻述律氏為皇后置百官至是改元神冊述律后勇決多權變阿保機行兵御衆述律后常預其謀阿保機嘗度磧擊党項留述律后守其帳黄頭臭伯二室韋乗虚合兵掠之述律后知之勒兵以待其至奮擊大破之由是名震諸夷述律后有母有姑皆踞榻受其拜曰吾惟拜天不拜人也晉王方經營河北欲結契丹為援常以叔父事阿保機以叔母事述律后劉守光末年衰困遣參軍韓延徽求援於契丹契丹主怒其不拜留之使牧馬於野延徽幽州人有智略頗知屬文述律后言於契丹主曰延徽能守節不屈此今之賢者柰何辱以牧圉宜禮而用之契丹主召延徽與語恱之遂以為謀主舉動訪焉延徽始教契丹建牙開府築城郭立市里以處漢人使各有配偶墾蓺荒田由是漢人各安生業逃亡者益少契丹威服諸國延徽有助焉頃之延徽逃奔晉陽晉王欲置之幕府掌書記王緘疾之延徽不自安求東歸省母過眞定止於鄉人王德明家德明問所之延徽曰今河北皆為晉有當復詣契丹耳德明曰叛而復往得無取死乎延徽曰彼自吾來如䘮手目今往詣之彼手目復完安肯害我旣省母遂復入契丹契丹主聞其至大喜如自天而下拊其背曰曏者何往延徽曰思母欲告歸恐不聽故私歸耳契丹主待之益厚及稱帝以延徽為相累遷至中書令晉王遣使至契丹延徽寓書於晉王敘所以北去之意且曰非不戀英主非不思故鄉所以不留正懼王緘之讒耳因以老母為託且曰延徽在此契丹必不南牧故終同光之世契丹不深入為冦延徽之力也三年春正月詔宣武節度使􅀽象先救潁州旣至吳軍引還二月甲申晉王攻黎陽劉鄩拒之數日不克而去晉王之弟威塞軍防禦使存矩在新州驕惰不治侍婢預政晉王使募山北部落驍勇者及劉守光亡卒以益南討之軍又率其民出馬民或鬻十牛易一戰馬期㑹迫促邊人嗟怨存矩得五百騎自部送之以壽州刺史盧文進為裨將行者皆憚逺役存矩復不存恤甲午至祁溝關小校宫彦璋與士卒謀曰聞晉王與梁人確鬭騎兵死傷不少吾儕􅂢父母妻子為人客戰千里送死而使長復不矜恤柰何衆曰殺使長擁盧將軍還新州據城自守其如我何因執兵大譟趣傳舍詰朝存矩寢未起就殺之文進不能制撫膺哭其尸曰奴輩旣害郎君使我何面復見晉王因為衆所擁還新州守將楊全章拒之又攻武州鴈門以北都知防禦兵馬使李嗣肱擊敗之周德威亦遣兵追討文進帥其衆奔契丹晉王聞存矩不道以致亂殺侍婢及幕僚數人初幽州北七百里有渝關下有渝水通海自關東北循海有道道狹處纔數尺旁皆亂山高峻不可越比至進牛口舊置八防禦軍募土兵守之田租皆供軍食不入於葪幽州嵗致繒纊以供戰士衣每嵗早穫清野堅壁以待契丹契丹至輒閉壁不戰俟其去選驍勇據隘邀之契丹常失利走土兵皆自為田園力戰有功則賜勲加賞由是契丹不敢輕入冦及周德威為盧龍節度使恃勇不修邊備遂失渝關之險契丹每芻牧於營平之間德威又忌幽州舊將有名者往往殺之吳王遣使遺契丹主以猛火油曰攻城以此油然火焚樓櫓敵以水沃之火愈熾契丹主大喜即選騎三萬欲攻幽州述律后哂之曰豈有試油而攻一國乎因指帳前樹謂契丹主曰此樹無皮可以生乎契丹主曰不可述律后曰幽州城亦猶是矣吾但以三千騎伏其旁掠其四野使城中無食不過數年城自困矣何必如此躁動輕舉萬一不勝為中國笑吾部落亦解體矣契丹主乃止三月盧文進引契丹兵急攻新州刺史安金全不能守弃城走文進以其部將劉殷為刺史使守之晉王使周徳威合河東鎮定之兵攻之旬日不克契丹主帥衆三十萬救之德威衆寡不敵大為契丹所敗奔歸楚王殷遣其弟存攻吳上高俘獲而還契丹乗勝進圍幽州聲言有衆百萬氊車毳幕彌漫山澤盧文進教之攻城為地道晝夜四面俱進城中宂地然膏以邀之又為土山以臨城城中鎔銅以灑之日殺千計而攻之不止周德威遣間使詣晉王告急王方與梁相持河上欲分兵則兵少欲勿救恐失之憂形於色謀於諸將獨李嗣源李存審閻寶勸王救之王喜曰昔太宗得一李靖猶擒頡利今吾有猛將三人復何憂哉存審寶以為虜無輜重勢不能久俟其野無所掠食盡自還然後踵而擊之李嗣源曰周德威社稷之臣今幽州朝夕不保恐變生於中何暇待虜之衰臣請身為前鋒以赴之王曰公言是也即日命治兵夏四月晉王命嗣源將兵先進軍于淶水閻寶以鎮定之兵繼之吳昇州刺史徐知誥治城市府舍甚盛五月徐温行部至昇州愛其繁富潤州司馬陳彦謙勸温徙鎮海軍治所於昇州温從之徙知誥為潤州團練使知誥求宣州温不許知誥不樂宋齊丘密言於知誥曰三郎驕縱敗在朝夕潤州去廣陵隔一水耳此天授也知誥恱即之官三郎謂温長子知訓也温以陳彦謙為鎮海節度判官温但舉大綱細務悉委彦謙江淮稱治彦謙常州人也高季昌與孔勍修好復通貢獻資治通鑑卷第二百六十九
