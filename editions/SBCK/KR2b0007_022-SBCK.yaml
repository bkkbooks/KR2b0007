front:
  text: 資治通鑑卷第二十二
  hash: sha256:4f00c0f99810cb319cb71d8c7a7d14fa57fbb3b24eef9fef0e1d0f5430e6ae2f
body:
  text: 臣司馬光奉勑編集漢紀十四逢敦牂凡十二年起昭陽協洽盡閼丗宗孝武皇帝下之下天漢三年春二月王卿有罪自殺以執金吾杜周爲御史大夫􅀄搉酒酤三月上行幸泰山脩封祀明堂因受計還祠常山瘞􅀇玉方士之􅇋祠神人入海求蓬萊者終無有驗而公孫卿猶以大人跡爲解天子益怠厭方士之怪迂語矣然猶覊糜不絶冀遇其眞自此之後方士言神祠者彌衆然其效可睹矣夏四月大旱赦天下秋匈奴入鴈門太守坐畏愞棄市四年春正月朝諸矦王于甘泉宫發天下七科讁及勇敢士遣貳師將軍李廣利將􅀐六萬步兵七萬出朔方彊弩都尉路博德將萬餘人與貳師㑹游擊將軍韓􅀃將歩兵三萬人出五原因杅將軍公孫敖將􅀐萬歩兵三萬人出鴈門匈奴聞之悉逺其累重於余吾水北而單于以兵十萬待水南與貳師接戰貳師解而引歸與單于連􅃲十餘日游擊無所得因杅與左賢王戰不利引歸時上遣敖深入匈奴迎李陵敖軍無功還因曰捕得生口言李陵教單于爲兵以僃漢軍故臣無所得上於是族陵家旣而聞之乃漢將降匈奴者李緒非陵也陵使人刺殺緒大閼氏欲殺陵單于匿之北方大閼氏死乃還單于以女妻陵立爲右校王與衛律皆貴用事衛律常在單于左右陵居外有大事乃入議夏四月立皇子髆爲昌邑王太始元年春正月公孫敖坐妻爲巫蠱要斬徙郡國豪桀于茂陵夏六月赦天下是嵗匈奴且鞮矦單于死有兩子長爲左賢王次爲左大將左賢王未至貴人以爲有病更立左大將爲單于左賢王聞之不敢進左大將使人召左賢王而讓位焉左賢王辭以病左大將不聽謂曰即不幸死傳之於我左賢王許之遂立爲狐鹿姑單于以左大將爲左賢王數年病死其子先賢撣不得代更以爲日逐王單于自以其子爲左賢王二年春正月上行幸回中杜周卒光禄大夫暴勝之爲御史大夫秋旱趙中大夫白公奏穿渠引涇水首起谷口尾入櫟陽注渭中袤二百里溉田四千五百餘頃因名曰白渠民得其饒三年春正月上行幸甘泉宫二月幸東海獲赤鴈幸琅邪禮日成山登之罘浮大海而還是嵗皇子弗陵生弗陵母曰河閒趙倢伃居鉤弋宫任身十四月而生上曰聞昔堯十四月而生今鉤弋亦然乃命其所生門曰堯母門臣光曰爲人君者動靜舉措不可不愼發於中必形於外天下無不知之當是時也皇后太子皆無恙而命鉤弋之門曰堯母非名也是以姦人逆探上意知其竒愛少子欲以爲嗣遂有危皇后太子之心卒成巫蠱之禍悲夫趙人江充爲水衡都尉􅀄充爲趙敬肅王客得罪於太子丹亡逃詣闕告趙太子隂事太子坐廢上召充入見充容貌魁岸􅀍服輕靡上竒之與語政事大悅由是有寵拜爲直指繡衣使者使督察貴戚近臣踰侈者充舉劾無所避上以爲忠直所言皆中意嘗從上甘泉逄太子家使乘車馬行馳道中充以屬吏太子聞之使人謝充曰非愛車馬誠不欲令上聞之以教敕亡素者唯江君寛之充不聽遂白奏上曰人臣當如是矣大見信用威震京師四年春三月上行幸泰山壬午祀髙祖于明堂以配上帝因受計癸未祀孝景皇帝于明堂甲申修封丙戌禪石閭夏四月幸不其五月還幸建章宫赦天下冬十月甲寅晦日有食之十二月上行幸雍祠五畤西至安定北地征和元年春正月上還幸建章宫三月趙敬肅王彭祖薨彭祖取江都易王所幸淖􅁎生男號淖子時淖􅁎兄爲漢宦者上召問淖子何如對曰爲人多欲上曰多欲不宜君國子民問武始矦昌曰無咎無譽上曰如是可矣遣使者立昌爲趙王夏大旱上居建章宫見一男子帶劒入中龍華門疑其異人命收之男子捐劒走逐之弗獲上怒斬門􅇋冬十一月發三輔􅀐士大搜上林閉長安城門索十一日乃解巫蠱始起丞相公孫賀夫人君孺衞皇后姊也賀由是有寵賀子敬聲代父爲太僕驕奢不奉法擅用北軍錢千九百萬發覺下獄是時詔捕陽陵大俠朱安丗甚急賀自請逐捕安丗以贖敬聲罪上許之後果得安丗安丗􅀏曰丞相禍及宗矣遂從獄中上書告敬聲與陽石公主私通上且上甘泉使巫當馳道埋偶人祝詛上有惡言二年春正月下賀獄案驗父子死獄中家族以涿郡太守劉屈氂爲左丞相封澎矦屈氂中山靖王子也夏四月大風發屋折木閏月諸邑公主陽石公主及皇后弟子長平矦伉皆坐巫蠱誅上行幸甘泉􅀄上年二十九乃生戾太子甚愛之及長性仁恕温謹上嫌其材能少不􅀋已而所幸王夫人生子閎李姬生子旦胥李夫人生子髆皇后太子寵寖衰常有不自安之意上覺之謂大將軍青曰漢家庶事草創加四夷侵陵中國朕不變更制度後丗無灋不出師征伐天下不安爲此者不得不勞民􅀂後丗又如朕所爲是襲亡秦之跡也太子敦重好靜必能安天下不使朕憂欲求守文之主安有賢於太子者乎聞皇后與太子有不安之意豈有之邪可以意曉之大將軍頓首謝皇后聞之脫􅆪請罪太子毎諌征伐四夷上􅀏曰吾當其勞以逸遺汝不亦可乎上每行幸常以後事付太子宫内付皇后有所平決還白其最上亦無異有時不省也上用灋嚴多任深刻吏太子寛厚多所平反雖得百姓心而用灋大臣皆不悅皇后恐乆獲罪每戒太子宜留取上意不應擅有所縱捨上聞之是太子而非皇后羣臣寛厚長者皆附太子而深酷用灋者皆毁之邪臣多黨與故太子譽少而毁多衞青薨後臣下無復外家爲據競欲構太子上與諸子䟽皇后希得見太子嘗謁皇后移日乃出黃門蘇文告上曰太子與宫人戲上益太子宫人滿二百人太子後知之心銜文文與小黃門常融王弼等常微伺太子過輒增加白之皇后切齒使太子白誅文等太子曰第勿爲過何畏文等上聦明不信邪佞不足憂也上嘗小不平使常融召太子融言太子有喜色上嘿然及太子至上察其貌有涕泣處而佯語􅀏上怪之更微問知其情乃誅融皇后亦善自防閑避嫌疑雖乆無寵尚􅀍禮遇是時方士及諸神巫多聚京師率皆左道惑衆變幻無所不爲女巫往來宫中教美人度厄每屋輒埋木人祭祀之因妬忌恚詈更相告訐以爲祝詛上無道上怒所殺後宫延及大臣死者數百人上心旣以爲疑嘗晝寢夢木人數千持杖欲擊上上驚寤因是體不平遂苦忽忽善忘江充自以與太子及衞氏有隙見上年老恐晏駕後爲太子所誅因是爲姦言上疾祟在巫蠱於是上以充爲使者治巫蠱獄充將胡巫掘地求偶人捕蠱及夜祠視􅀑染汙令有處輒收捕驗治燒鐡鉗灼強服之民轉相誣以巫蠱吏輒劾以大逆無道自京師三輔連及郡國坐而死者前後數萬人是時上春秋髙疑左右皆爲蠱祝詛有與無莫敢訟其􅁈者充旣知上意因胡巫檀何言宫中有蠱氣不除之上終不差上乃使充入宫至省中壞御座掘地求蠱又使按道矦韓􅀃御史章贛黃門蘇文等助充充先治後宫希幸夫人以次及皇后太子宫掘地縱横太子皇后無復施床處充云於太子宫得木人尤多又有帛書所言不道當奏聞太子懼問少傅石德德懼爲師傅并誅因謂太子曰前丞相父子兩公主及衞氏皆坐此今巫與使者掘地得徴驗不知巫置之邪將實有也無以自明可矯以節收捕充等繫獄窮治其姦詐且上疾在甘泉皇后及家吏請問皆不報上存亡未可知而姦臣如此太子將不念秦扶蘇事邪太子曰吾人子安得擅誅不如歸謝幸得無罪太子將往之甘泉而江充持太子甚急太子計不知所出遂從石德計秋七月壬午太子使客詐爲使者收捕充等按道矦􅀃疑使者有詐不肯受詔客格殺􅀃太子自臨斬充罵曰趙虜前亂乃國王父子不足邪乃復亂吾父子也又炙胡巫上林中太子使舎人無且持節夜入未央宫殿長秋門因長御􅀝華具白皇后發中廏車載射士出武庫兵發長樂宫衞卒長安擾亂言太子反蘇文迸走得亡歸甘泉說太子無狀上曰太子必懼又忿充等故有此變乃使使召太子使者不敢進歸報云太子反巳成欲斬臣臣逃歸上大怒丞相屈氂聞變挺身逃亡其印綬使長史乗疾置以聞上問丞相何爲對曰丞相祕之未敢發兵上怒曰事籍籍如此何謂祕也丞相無周公之風矣周公不誅管蔡乎乃賜丞相璽書曰捕斬反者自有賞罰以牛車爲櫓母接短兵多殺傷士衆堅閉城門母令反者得出太子宣言告令百官云帝在甘泉病困疑有變姦臣欲作亂上於是從甘泉來幸城西建章宫詔發三輔近縣兵部中二千石以下丞相兼將之太子亦遣使者矯制赦長安中都官囚徒命少傅石德及賔客張光等分將使長安囚如矦持節發長水及宣曲胡􅀐皆以裝㑹侍郎馬通使長安因追捕如矦告胡人曰節有詐勿聽也遂斬如矦引􅀐入長安又發楫棹士以予大鴻臚商丘成􅀄漢節純赤以太子持赤節故更爲黄旄加上以相别太子立車北軍南門外召䕶北軍使者任安與節令發兵安拜受節入閉門不出太子引兵去毆四市人凡數萬衆至長樂西闕下逢丞相軍合戰五日死者數萬人血流入溝中民間皆云太子反以故衆不附太子丞相附兵􅎊多庚寅太子兵敗南犇覆盎城門司直田仁部閉城門以爲太子父子之親不欲急之太子由是得出亡丞相欲斬仁御史大夫暴勝之謂丞相曰司直吏二千石當先請柰何擅斬之丞相釋仁上聞而大怒下吏責問御史大夫曰司直縱反者丞相斬之灋也大夫何以擅止之勝之惶恐自殺詔遣宗正劉長執金吾劉敢奉策收皇后璽綬后自殺上以爲任安老吏見兵事起欲坐觀成敗見勝者合從之有兩心與田仁皆要斬上以馬通獲如矦長安男子景建從通獲石德商丘成力戰獲張光封通爲重合矦建爲徳矦成爲秺矦諸太子賔客嘗出入宫門皆坐誅其隨太子發兵以反灋族吏士劫略者皆徙燉煌郡以太子在外始置屯兵長安諸城門上怒甚羣下憂懼不知所出壷關三老茂上書曰臣聞父者猶天母者猶地子猶萬物也故天平地安物乃茂成父慈母愛子乃孝順今皇太子爲漢適嗣承萬丗之業體祖宗之重親則皇帝之宗子也江充布衣之人閭閻之􅀠臣耳陛下顯而用之銜至尊之命以迫蹵皇太子造飾姦詐羣邪錯繆是以親戚之路鬲塞而不通太子進則不得見上退則困於亂臣獨􅁈結而無告不忍忿忿之心起而殺充恐懼逋逃子盜父兵以救難自免耳臣竊以爲無邪心詩曰營營靑蠅止于藩愷悌君子無信䜛言讒言罔極交亂四國往者江充䜛殺趙太子天下莫不聞陛下不省察深過太子發盛怒舉大兵而求之三公自將智者不敢言辯士不敢􅀃臣竊痛之唯陛下寛心慰意少察所親母患太子之非亟罷甲兵無令太子乆亡臣不勝惓惓出一旦之命待罪建章宫下書奏天子感寤然尚未顯言赦之也太子亡東至湖藏匿泉鳩里主人家貧常賣屨以給太子太子有故人在湖聞其富贍使人呼之而發覺八月辛亥吏圍捕太子太子自度不得脫即入室距户自經山陽男子張富昌爲卒足蹋開户新安令史李壽趨抱解太子主人公遂格􅃲死皇孫二人皆并遇害上旣傷太子乃封李夀爲邘矦張富昌爲題矦初上爲太子立博望苑使通賔客從其所好故賔客多以異端進者臣光曰古之明王教養太子爲之擇方正敦良之士以爲保傅師友使朝夕與之遊處左右前後無非正人出入起居無非正道然猶有淫放邪僻而䧟於禍敗者焉今乃使太子自通賔客從其所好夫正直難親謟䛕易合此固中人之常情宜太子之不終也癸亥地震九月商丘成爲御史大夫立趙敬肅王小子偃爲平干王匈奴入上谷五原殺掠吏民二年春正月上行幸雍至安定北地匈奴入五原酒泉殺兩都尉三月遣李廣利將七萬人出五原商丘成將二萬人出西河馬通將四萬􅀐出酒泉擊匈奴夏五月赦天下匈奴單于聞漢兵大出悉徙其輜重北邸郅居水左賢王驅其人民度余吾水六七百里居兠銜山單于自將精兵度姑且水商丘成軍至追邪徑無所見還匈奴使大將與李陵將三萬餘􅀐追漢軍轉戰九日至蒲奴水虜不利還去馬通軍至天山匈奴使大將偃渠將二萬餘􅀐要漢兵見漢兵彊引去通無所得失是時漢恐車師兵遮馬通軍遣開陵矦成娩將樓蘭尉犁危須等六國兵共圍車師盡得其王民衆而還貳師將軍出塞匈奴使右大都尉與衞律將五千􅀐要擊漢軍於夫羊句山陿貳師擊破之乗勝追北至范夫人城匈奴犇走莫敢距敵初貳師之出也丞相劉屈氂爲祖道送至渭橋廣利曰願君矦早請昌邑王爲太子如立爲帝君矦長何憂乎屈氂許諾昌邑王者貳師將軍女弟李夫人子也貳師女爲屈氂子妻故共欲立焉㑹内者令郭穰告丞相夫人祝詛上及與貳師共禱祠欲令昌邑王爲帝桉驗罪至大逆不道六月詔載屈氂㕑車以徇要斬東市妻子梟首華陽街貳師妻子亦收貳師聞之憂懼其􅁺胡亞夫亦避罪從軍􅀃貳師曰夫人室家皆在吏􅀂還不稱意適與獄㑹郅居以北可復得見乎貳師由是狐疑深入要功遂北至郅居水上虜巳去貳師遣䕶軍將二萬􅀐度郅居之水逢左賢王左大將將二萬􅀐與漢軍合戰一日漢軍殺左大將虜死傷甚衆軍長史與決眭都尉煇渠矦謀曰將軍懐異心欲危衆求功恐必敗謀共執貳師貳師聞之斬長史引兵還至燕然山單于知漢軍勞倦自將五萬􅀐遮擊貳師相殺傷甚衆夜壍漢軍前深數尺從後急擊之軍大亂敗貳師遂降單于素知其漢大將以女妻之尊寵在衞律上宗族遂滅秋蝗九月故城父令公孫勇與客胡倩等謀反倩詐稱光禄大夫言使督盜賊淮陽太守田廣明覺知發兵捕斬焉公孫勇衣繡衣乘駟馬車至圉圉守尉魏不害等誅之封不害等四人爲矦吏民以巫蠱相告言者案驗多不實上頗知太子惶恐無他意㑹髙寢郎田千秋上急變訟太子􅁈曰子弄父兵罪當笞天子之子過誤殺人當何罪哉臣嘗夢見一白頭翁教臣言上乃大感寤召見千秋謂曰父子之間人所難言也公獨明其不然此髙廟神靈使公教我公當遂爲吾輔佐立拜千秋爲大鴻臚而族滅江充家焚蘇文於横橋上及泉鳩里加兵刃於太子者􅀄爲北地太守後族上憐太子無辜乃作思子宫爲歸來望思之臺於湖天下聞而悲之四年春正月上行幸東萊臨大海欲浮海求神山羣臣諌上弗聽而大風晦㝠海水沸湧上留十餘日不得御樓船乃還二月丁酉雍縣無雲如靁者三隕石二黑如黳三月上耕于鉅定還幸泰山脩封庚寅祀于明堂癸巳禪石閭見羣臣上乃言曰朕即位以來所爲狂悖使天下愁苦不可追悔自今事有傷害百姓糜費天下者悉罷之田千秋曰方士言神仙者甚衆而無顯功臣請皆罷斥遣之上曰大鴻臚言是也於是悉罷諸方士􅇋神人者是後上每對羣臣自歎曏時愚惑爲方士所欺天下豈有仙人盡妖妄耳節食服藥差可少病而巳夏六月還幸甘泉丁巳以大鴻臚田千秋爲丞相封富民矦千秋無它材能術學又無伐閱功勞特以一言寤意數月取宰相封矦丗未嘗有也然爲人敦厚有智居位自稱踰於前後數公先是搜粟都尉桑􅀪羊與丞相御史奏言輪臺東有溉田五千頃以上可遣屯田卒置校尉三人分䕶益種五穀張掖酒泉遣􅀐假司馬爲斥􅇋募民壯健敢徙者詣田所益墾溉田稍築列亭連城而西以威西國輔烏孫上乃下詔深陳旣往之悔曰前有司奏欲益民賦三十助邊用是重困老弱􅀌獨也而今又請遣卒田輪臺輪臺西於車師千餘里前開陵矦擊車師時雖勝降其王以遼逺乏食道死者尚數千人況益西乎曩者朕之不明以軍􅇋􅀪上書言匈奴縛馬前後足置城下馳言秦人我匄􅀂馬又漢使者乆留不還故興遣貳師將軍欲以爲使者威重也古者卿大夫與謀參以蓍􅀛不吉不行乃者以縳馬書徧視丞相御史二千石諸大夫郎爲文學者乃至郡屬國都尉等皆以虜自縛其馬不祥甚哉或以爲欲以見彊夫不足者視人有餘公車方士太史治星望氣及太卜􅀛蓍皆以爲吉匈奴必破時不可再得也又曰北伐行將於鬴山必克卦諸將貳師最吉故朕親發貳師下鬴山詔之必母深入今計謀卦兆皆反繆重合矦得虜􅇋者乃言縛馬者匈奴詛軍事也匈奴常言漢極大然不耐饑渴失一狼走千羊乃者貳師敗軍士死略離散悲痛常在朕心今又請逺田輪臺欲起亭隧是擾勞天下非所以優民也朕不忍聞大鴻臚等又議欲募囚徒送匈奴使者明封矦之賞以報忿此五伯所弗爲也且匈奴得漢降者常提掖搜索問以所聞豈得行其計乎當今務在禁苛暴止擅賦力本農脩馬復令以補缺母乏武僃而巳郡國二千石各上進畜馬方略補邊狀與計對由是不復出軍而封田千秋爲富民矦以明休息思富養民也又以趙過爲搜粟都尉過能爲代田其耕耘田器皆有便巧以教民用力少而得穀多民皆便之臣光曰天下信未嘗無士也武帝好四夷之功而勇銳輕死之士充滿朝廷闢土廣地無不如意及後息民重農而趙過之儔教民耕耘民亦被其利此一君之身趣好殊别而士輙應之誠使武帝兼三王之量以興商周之治其無三代之臣乎秋八月辛酉晦日有食之衞律害貳師之寵㑹匈奴單于母閼氏病律飭胡巫言先單于怒曰胡故時祠兵常言得貳師以社何故不用於是收貳師貳師罵曰我死必滅匈奴遂屠貳師以祠後元元年春正月上行幸甘泉郊泰畤遂幸安定昌邑哀王髆薨二月赦天下夏六月商丘成坐祝詛自殺初侍中僕射馬何羅與江充相善及衞太子起兵何羅弟通以力戰封重合矦後上夷滅充宗族黨與何羅兄弟懼及遂謀爲逆侍中駙馬都尉金日磾視其志意有非常心疑之隂獨察其動靜與俱上下何羅亦覺日磾意以故乆不得發是時上行幸林光宫日磾小疾卧廬何羅與通及小弟安成矯制夜出共殺使者發兵明旦上未起何羅無何從外入日磾奏厠心動立入坐内户下須􅁷何羅袖白刃從東廂上見日磾色變走趨卧内欲入行觸寶瑟僵日磾得抱何羅因傳曰馬何羅反上驚起左右抜刃欲格之上恐并中日磾上勿格日磾投何羅殿下得禽縛之窮治皆伏辜秋七月地震燕王旦自以次第當爲太子上書求入宿衞上怒斬其使於北闕又坐藏匿亡命削良鄉安次文安三縣上由是惡旦旦辯慧博學其弟廣陵王胥有勇力而皆動作無灋度多過失故上皆不立時鉤弋夫人之子弗陵年數嵗形體壯大多知上竒愛之心欲立焉以其年穉母少猶與乆之欲以大臣輔之察羣臣唯奉車都尉光禄大夫霍光忠厚可任大事上乃使黄門畫周公負成王朝諸矦以賜光後數日帝譴責鉤弋夫人夫人脫簪珥叩頭帝曰引持去送掖庭獄夫人還顧帝曰趣行汝不得活卒賜死頃之帝閑居問左右曰外人言云何左右對曰人言且立其子何去其母乎帝曰然是非兒曹愚人之所知也往古國家所以亂由主少母壯也女主獨居驕蹇淫亂自恣莫能禁也汝不聞吕后邪故不得不先去之也二年春正月上朝諸矦王于甘泉宫二月行幸盩厔五柞宫上病篤霍光涕泣問曰如有不諱誰當嗣者上曰君未諭前畫意邪立少子君行周公之事光頓首讓曰臣不如金日磾日磾亦曰臣外國人不如光且使匈奴輕漢矣乙丑詔立弗陵爲皇太子時年八嵗丙寅以光爲大司馬大將軍日磾爲車􅀐將軍太僕上官桀爲左將軍受遺詔輔少主又以搜粟都尉桑􅀪羊爲御史大夫皆拜卧内牀下光出入禁闥二十餘年出則奉車入侍左右小心謹愼未嘗有過爲人沈靜詳審每出入下殿門止進有常處郎僕射竊識視之不失尺寸日磾在上左右目不忤視者數十年賜出宫女不敢近上欲内其女後宫不肯其篤愼如此上尤竒異之日磾長子爲帝弄兒帝甚愛之其後弄兒壯大不謹自殿下與宫人戲日磾適見之惡其淫亂遂殺弄兒上聞之大怒日磾頓首謝具言所以殺弄兒狀上甚哀爲之泣巳而心敬日磾上官桀始以材力得幸爲未央廄令上嘗體不安及愈見馬馬多瘦上大怒曰令以我不復見馬邪欲下吏桀頓首曰臣聞聖體不安日夜憂懼意誠不在馬言未卒泣數行下上以爲愛已由是親近爲侍中稍遷至太僕三人皆上素所愛信者故特舉之授以後事丁卯帝崩于五柞宫入殯未央宫前殿帝聦明能斷善用人行灋無所假貸隆慮公主子昭平君尚帝女夷安公主隆慮主病困以金千斤錢千萬爲昭平君豫贖死罪上許之隆慮主卒昭平君日驕醉殺主傅繫獄廷尉以公主子上請左右人人爲言前又入贖陛下許之上曰吾弟老有是一子死以屬我於是爲之垂涕歎息良乆曰灋令者先帝所造也用弟故而誣先帝之灋吾何面目入髙廟乎又下負萬民乃可其奏哀不能自止左右盡悲待詔東方朔前上夀曰臣聞聖王爲政賞不避仇讎誅不擇骨肉書曰不偏不黨王道蕩蕩此二者五帝所重三王所難也陛下行之天下幸甚臣朔奉觴昧死再拜上萬嵗夀上初怒朔旣而善之以朔爲中郎班固賛曰漢承百王之弊髙祖撥亂反正文景務在養民至于稽古禮文之事猶多闕焉孝武初立卓然罷黜百家表章六經遂疇咨海内舉其俊茂與之立功興太學修郊祀攺正朔定歷數協音律作詩樂建封禪禮百神紹周後號令文章煥焉可述後嗣得遵洪業而有三代之風如武帝之雄材大略不攺文景之恭儉以濟斯民雖詩書所稱何有加焉臣光曰孝武窮奢極欲繁刑重斂内侈宫室外事四夷信惑神怪廵遊無度使百姓疲敝起爲盜賊其所以異於秦始皇者無幾矣然秦以之亡漢以之興者孝武能尊先王之道知所統守受忠直之言惡人欺蔽好賢不倦誅賞嚴明晩而攺過顧託得人此其所以有亡秦之失而免亡秦之禍乎戊辰太子即皇帝位帝姊鄂邑公主共養省中霍光金日磾上官桀共領尚書事光輔㓜主政自已出天下想聞其風采殿中嘗有怪一夜羣臣相驚光召尚符璽郎欲收取璽郎不肯授光欲奪之郎桉劒曰臣頭可得璽不可得也光甚誼之明日詔增此郎秩二等衆庶莫不多光三月甲辰葬孝武皇帝于茂陵夏六月赦天下秋七月有星孛于東方濟北王寛坐禽獸行自殺冬匈奴入朔方殺略吏民發軍屯西河左將軍桀行北邊資治通鑑卷第二十二
