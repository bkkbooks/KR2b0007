front:
  text: 資治通鑑卷第一百一十一
  hash: sha256:5cb2e0e87663d2d12cad1528570951c68c03b84ba76ea5b90809d4851f75148a
body:
  text: 臣司馬光奉勑編集晉紀三十三上章困敦凡二年起屠維大淵獻盡安皇帝丙隆安三年春正月辛酉大赦戊辰燕昌黎尹留忠謀反誅事連尚書令東陽公根尚書叚成皆坐死遣中衞将軍衞雙就誅忠弟幽州剌史志於凡城以衞將軍平原公元為司徒尚書令庚午魏主珪北廵分命大将軍常山王遵等三軍從東道出長川鎮北將軍高凉王樂真等七軍從西道出牛川珪自將大軍從中道出駮髯水以襲高車壬午燕右將軍張真城門校尉和翰坐謀反誅癸未燕大赦改元長樂燕主盛每十日一自决獄不加栲掠多得其情武威王烏孤徙治樂都以其弟西平公利鹿孤鎮安夷廣武公傉檀鎮西平叔父素渥鎮湟河若留鎮澆河從弟替引鎮嶺南洛囘鎮亷川從叔吐若留鎮浩亹夷夏俊傑隨才授任内居顯位外典郡縣咸得其宜烏孤謂羣臣曰隴右河西本數郡之地遭亂分裂至十餘國吕氏乞伏氏叚氏最彊今欲取之三者何先楊統曰乞伏氏本吾之部落終當服從叚氏書生無能為患且結好於我攻之不義吕光衰耄嗣子微弱纂弘雖有才而内相猜忌若使浩舋廉川乗虛迭出彼必疲於奔命不過二年兵勞民困則姑臧可圖也姑臧舉則二冦不待攻而服矣烏孤曰善二月丁亥朔魏軍大破高車二十餘部獲七萬餘口馬三十餘萬匹牛羊百四十餘萬頭衞王儀别将三萬騎絶漠千餘里破其七部獲二萬餘口馬五萬餘匹牛羊二萬餘頭高車諸部大震林邑王范達陷日南九真遂冦交阯太守杜瑗擊破之庚戌魏征虜将軍庾岳破張超於勃海斬之段業即凉王位改元天璽以沮渠蒙遜為尚書左丞梁中庸為右丞魏主珪大獵於牛川之南以髙車人為圍周七百餘里因驅其禽獸南抵平城使高車築鹿苑廣數十里三月己未珪還平城甲子珪分尚書三十六曹及外署凡置三百六十曹令八部大夫主之吏部尚書崔宏通署三十六曹如令僕統事置五經博士增國子太學生員合三千人珪問博士李先曰天下何物最善可以益人神智對曰莫若書籍珪曰書籍凡有幾何如何可集對曰自書契以來世有滋益以至于今不可勝計茍人主所好何憂不集珪從之命郡縣大索書籍悉送平城􅊨初秦主登之弟廣帥衆三千依南燕王徳徳以為冠軍將軍處之乞活堡㑹熒惑守東井或言秦當復興廣乃自稱秦王擊南燕北地王鍾破之是時滑臺孤弱土無十城衆不過一萬鍾旣敗附徳者多去徳而附廣徳乃留魯陽王和守滑臺自帥衆討廣斬之燕主寳之至黎陽也魯陽王和長史李辯勸和納之和不從辯懼故潜引晉軍至管城欲因徳出戰而作亂旣而徳不出辯愈不自安及徳討苻廣辯復勸和反和不從辯乃殺和以滑臺降魏魏行臺尚書和跋在鄴帥輕騎自鄴赴之旣至辨悔之閉門拒守跋使尚書郎鄧暉説之辯乃開門内跋跋悉收徳宫人府庫徳遣兵擊跋跋逆擊破之又破徳将桂陽王鎮俘獲千餘人陳頴之民多附於魏南燕右衞將軍慕容雲斬李辯帥将士家屬二萬餘口出滑臺赴徳徳欲攻滑臺韓範曰嚮也魏為客吾為主人今也吾為客魏為主人人心危懼不可復戰不如先據一方自立基本乃圖進取張華曰彭城楚之舊都可攻而據之北地王鍾等皆勸徳攻滑臺尚書潘聦曰滑臺四通八達之地北有魏南有晉西有秦居之未嘗一日安也彭城土曠人稀平夷無險且晉之舊鎮未易可取又密邇江淮夏秋多水乗舟而戰者呉之所長我之所短也青州沃野二千里精兵十餘萬左有負海之饒右有山河之固廣固城曹嶷所築地形阻峻足為帝王之都三齊英傑思得明主以立功於世久矣辟閭渾昔為燕臣今宜遣辯士馳説於前大兵繼踵於後若其不服取之如拾芥耳旣得其地然後閉闗養鋭伺隙而動此乃陛下之闗中河内也徳猶豫未决沙門笁朗素善占候徳使牙門蘇撫問之朗曰敬覽三策潘尚書之議興邦之言也且今歲之初彗星起奎婁掃虚危彗者除舊布新之象奎婁爲魯虛危爲齊宜先取兖州廵撫琅邪至秋乃北徇齊地此天道也撫又密問以年世㓪以周易筮之曰燕衰庚戌年則一紀世則及子撫還報徳徳乃引師而南兖州北鄙諸郡縣皆降之徳置守宰以撫之禁軍士無得虜掠百姓大恱牛酒屬路丙子魏主珪遣建義将軍􅁃真越騎校尉奚斤擊庫狄宥連侯莫陳三部皆破之追奔至大峨谷置戍而還己卯追尊帝所生母陳夫人爲徳皇太后夏四月鮮卑疊掘河内帥户五千降于西秦西秦王乾歸以河内爲疊掘都統以宗女妻之甲午燕大赦㑹稽王道子有疾且無日不醉世子元顯知朝望去之乃諷朝廷解道子司徒楊州刺史乙未以元顯為楊州刺史道子醒而後知之大怒無如之何元顯以廬江太守㑹稽張灋順為謀主多引樹親黨朝貴皆畏事之燕散騎常侍餘超左將軍高和等坐謀反誅凉太子紹太原公纂將兵伐北凉北凉王業求救於武威王烏孤烏孤遣驃騎大将軍利鹿孤及楊軌救之業将戰沮渠蒙遜諫曰楊軌恃鮮卑之彊有窺窬之志紹纂深入置兵死地不可敵也今不戰則有泰山之安戰則有累卵之危業從之案兵不戰紹纂引兵歸六月烏孤以利鹿孤為凉州牧鎮西平召車騎大将軍傉檀入録府國事會稽世子元顯自以少年不欲頓居重任戊子以琅邪王徳文為司徒魏前河間太守范陽盧溥帥其部曲數千家就食漁陽遂據有數郡秋七月己未燕主盛遣使拜溥幽州刺史辛酉燕主盛下詔曰法例律公侯有罪得以金帛贖此不足以懲惡而利於王府甚無謂也自今皆令立功以自贖勿復輸金帛西秦丞相南川宣公出連乞都卒秦齊公崇鎮東將軍楊佛嵩㓂洛陽河南太守隴西辛恭靖嬰城固守雍州刺史楊佺期遣使求救於魏常山王遵魏主珪以散騎侍郎西河張濟為遵從事中郎以報之佺期問於濟曰魏之伐中山戎士幾何濟曰四十餘萬佺期曰以魏之彊小羌不足滅也且晉之與魏本為一家今旣結好義無所隱此間兵弱糧寡洛陽之救恃魏而已若其保全必有厚報若其不守與其使羌得之不若使魏得之濟還報八月珪遣太尉穆崇將六萬騎往救之燕遼西太守李㓪在郡十年威行境内恐燕主盛疑之累徵不赴以其家在龍城未敢顯叛隂召魏兵許以郡降魏遣使馳詣龍城廣張㓂勢盛曰此必詐也召使者詰問果無事實盛盡滅㓪族丁酉遣輔國將軍李旱討之初魏奮武將軍張衮以才謀為魏主珪所信重委以腹心珪問中州士人於衮衮薦盧􅄎及崔逞珪皆用之珪圍中山久未下軍食乏問計於羣臣逞為御史中丞對曰桑椹可以佐糧飛鴞食椹而改音詩人所稱也珪雖用其言聽民以椹當租然以逞為侮慢心銜之秦人㓂襄陽雍州刺史郗恢以書求救於魏常山王遵曰賢兄虎步中原珪以恢無君臣之禮命衮及逞為復書必貶其主衮逞謂帝為貴主珪怒曰命汝貶之而謂之貴主何如賢兄也逞之降魏也以天下方亂恐無復遺種使其妻張氏與四子留冀州逞獨與幼子賾詣平城所留妻子遂奔南燕珪并以是責逞賜逞死盧溥受燕爵命侵掠魏郡縣殺魏幽州刺史封沓干珪謂衮所舉皆非其人黜衮為尚書令史衮乃闔門不通人事惟手校經籍嵗餘而終燕主寶之敗也中書令民部尚書封懿降於魏珪以懿為給事黄門侍郎都坐大官珪問懿以燕氏舊事懿應對踈慢亦坐廢於家武威王秃髪烏孤醉走馬傷脅而卒遺令立長君國人立其弟利鹿孤諡烏孤曰武王廟號烈祖利鹿孤大赦徙治西平南燕王徳遣使説幽州刺史辟閭渾欲下之渾不從徳遣北地王鍾帥步騎二萬擊之徳進據琅邪徐兖之民歸附者十餘萬徳自琅邪引兵而北以南海王灋為兖州刺史鎮梁父進攻莒城守将任安委城走徳以潘聰為徐州刺史鎮莒城蘭汗之亂燕吏部尚書封孚南奔辟閭渾渾表爲勃海太守及徳至孚出降徳大喜曰孤得青州不為喜喜得卿耳遂委以機密北地王鍾傳檄青州諸郡諭以禍福辟閭渾徙八千餘家入守廣固遣司馬崔誕戍薄荀固平原太守張豁戍栁泉誕豁承檄皆降於徳渾懼擕妻子奔魏徳遣射聲校尉劉綱追之及於莒城斬之渾子道秀自詣徳請與父俱死徳曰父雖不忠而子能孝特赦之渾參軍張瑛為渾作檄辭多不遜徳執而讓之瑛神色自若徐曰渾之有臣猶韓信之有蒯通通遇漢祖而生臣遭陛下而死比之古人竊爲不幸耳徳殺之遂定都廣固燕李旱行至建安燕主盛急召之羣臣莫測其故九月辛未復遣之李朗聞其家被誅擁二千餘户以自固及聞旱還謂有内變不復設備留其子養守令支自迎魏師於北平壬子旱襲令支克之遣廣威將軍孟廣平追及朗於無終斬之秦主興以災異屢見降號稱王下詔令羣公卿士將牧守宰各降一等大赦改元弘始存問孤貧舉拔賢俊簡省灋令清察獄訟守令之有政迹者賞之貪殘者誅之逺近肅然冬十月甲午燕中衞將軍衞雙有罪賜死李旱還聞雙死懼棄軍而亡至板陘復還歸罪燕主盛復其爵位謂侍中孫勍曰旱為將而棄軍罪在不赦然昔先帝蒙塵骨肉離心公卿失節惟旱以宦者忠勤不懈始終如一故吾念其功而赦之耳辛恭靖固守百餘日魏救未至秦兵拔洛陽獲恭靖恭靖見秦王興不拜曰吾不為羌賊臣興囚之恭靖逃歸自淮漢以北諸城多請降送任於秦魏王珪以穆崇為豫州刺史鎮野王會稽世子元顯性苛刻生殺任意發東土諸郡免奴為客者號曰樂屬移置京師以充兵役東土嚻然苦之孫恩因民心騷動自海島帥其黨殺上虞令遂攻㑹稽㑹稽内史王凝之羲之之子也世奉天師道不出兵亦不設備日於道室稽顙跪呪官屬請出兵討恩凝之曰我已請大道借鬼兵守諸津要各數萬賊不足憂也及恩漸近乃聽出兵恩已至郡下甲寅恩陷會稽凝之出走恩執而殺之并其諸子凝之妻謝道藴弈之女也聞冦至舉措自若命婢肩輿抽刀出門手殺數人乃被執呉國内史桓謙臨海太守新秦王崇義興太守魏隱皆棄郡走於是會稽謝鍼呉郡陸瓌呉興丘尫義興許充之臨海周胄永嘉張永等及東陽新安凡人郡人一時起兵殺長吏以應恩旬日之中衆數十萬呉興太守謝邈永嘉太守司馬逸嘉興公顧胤南康公謝明慧黄門郎謝冲張琨中書郎孔道等皆為恩黨所殺邈冲皆安之弟子也時三吳承平日久民不習戰故郡縣兵皆望風奔潰恩據㑹稽自稱征東將軍逼人士為官屬號其黨曰長生人民有不與之同者戮及嬰孩死者什七八醢諸縣令以食其妻子不肯食者輙支解之所過掠財物燒邑屋焚倉廪刋木堙井相帥聚於㑹稽婦人有嬰兒不能去者投於水中曰賀汝先登仙堂我當尋後就汝恩表㑹稽王道子及世子元顯之罪請誅之自帝即位以來内外乖異石頭以南皆為荆江所據以西皆豫州所專京口及江北皆劉牢之及廣陵相髙雅之所制朝政所行惟三呉而已及孫恩作亂八郡皆為恩有畿内諸縣盜賊處處蠭起恩黨亦有潜伏在建康者人情危懼常慮竊發於是内外戒嚴加道子黄鉞元顯領中軍将軍命徐州刺史謝琰兼督呉興義興軍事以討恩劉牢之亦發兵討恩拜表輙行西秦以金城太守辛靜為右丞相十二月甲午燕燕郡太守高湖帥户三千降魏湖泰之子也丙午燕主盛封弟淵為章武公䖍為博陵公子定為遼西公丁未燕太后叚氏卒諡曰惠徳皇后謝琰擊斬許允之迎魏隱還郡進擊丘尫破之與劉牢之轉鬬而前所向輙克琰留屯烏程遣司馬高素助牢之進臨浙江詔以牢之都督呉都諸軍事初彭城劉裕生而母死父翹僑居京口家貧将棄之同郡劉懐敬之母裕之從母也生懐敬未朞走往救之㫁懐敬乳而乳之及長勇健有大志僅識文字以賣履為業好樗蒲為鄉閭所賤劉牢之擊孫恩引裕參軍事使將數十人覘賊遇賊數千人即迎擊之從者皆死裕墜岸下賊臨岸欲下裕奮長刀仰斫殺數人乃得登岸仍大呼逐之賊皆走􅁉所殺傷甚衆劉敬宣怪裕久不返引兵尋之見裕獨驅數千人咸共歎息因進擊賊大破之斬獲千餘人初恩聞八郡響應謂其屬曰天下無復事矣當與諸君朝服至建康旣而聞牢之臨江曰我割浙江以東不失作句踐戊申牢之引兵濟江恩聞之曰孤不羞走遂驅男女二十餘萬口東走多棄寶物子女於道官軍競取之恩由是得脱復逃入海島高素破恩黨於山陰斬恩所署呉郡太守陸瓌呉興太守丘尫餘姚令呉與沈穆夫東土遭亂企望官軍之至既而牢之等縱軍士暴掠士民失望郡縣城中無復人跡月餘乃稍有還者朝廷憂恩復至以謝琰為會稽太守都督五郡軍事帥徐州文武戍海浦以元顯録尚書事時人謂道子為東録元顯爲西録西府車􅀐塡湊東第門可張羅矣元顯無良師友所親信者率皆佞諛之人或以為一時英傑或以為風流名士由是元顯日益驕侈諷禮官立議以已徳隆望重既録百揆百揆皆應盡敬於是公卿以下見元顯皆拜時軍旅數起國用虚竭自司徒以下日廪七升而元顯聚斂不已富踰帝室殷仲堪恐桓􅀇跋扈乃與楊佺期結昏為援佺期屢欲攻玄仲堪每抑止之玄恐終為殷楊所滅乃告執政求廣其所統執政亦欲交構使之乖離乃加玄都督荆州四郡軍事又以玄兄偉代佺期兄廣為南蠻校尉佺期忿懼楊廣欲拒桓偉仲堪不聽出廣為宜都建平二郡太守楊孜敬先為江夏相玄以兵襲而劫之以為諮議參軍佺期勒兵建牙聲云援洛欲與仲堪共襲玄仲堪雖外結佺期而内疑其心苦止之猶慮弗能禁遣從弟遹屯于北境以遏佺期佺期旣不能獨舉又不測仲堪本意乃解兵仲堪多疑少決諮議參軍羅企生謂其弟遵生曰殷侯仁而無㫁必及於難吾䝉知遇義不可去必將死之是嵗荆州大水平地三丈仲堪竭倉廪以賑饑民桓玄欲乗其虛而伐之乃發兵西上亦聲言救洛與仲堪書曰佺期受國恩而棄山陵冝共罪之今當入沔討除佺期已頓兵江口若見與無貳可收楊廣殺之如其不爾便當帥兵入江時巴陵有積穀玄先遣兵襲取之梁州刺史郭銓當之官路經夏口玄詐稱朝廷遣銓為已前鋒乃授以江夏之衆使督諸軍並進密報兄偉令為内應偉遑遽不知所為自齎疏示仲堪仲堪執偉為質令與玄書辭甚苦至玄曰仲堪為人無決常懷成敗之計為兒子作慮我兄必無憂也仲堪遣殷遹帥水軍七千至西江口玄使郭銓苻宏擊之遹等敗走玄頓巴陵食其穀仲堪遣楊廣及弟子道䕶等拒之皆為玄所敗江陵震駭城中乏食以胡麻廪軍士玄乗勝至零口去江陵二十里仲堪急召楊佺期以自救佺期曰江陵無食何以待敵可來見就共守襄陽仲堪志在全軍保境不欲棄州逆走乃紿之曰比來收集已有儲矣佺期信之帥步騎八千精甲耀日至江陵仲堪唯以飯餉其軍佺期大怒曰今茲敗矣不見仲堪與其兄廣共擊玄玄畏其鋭退軍馬頭明日佺期引兵急擊郭銓幾獲之會玄兵至佺期大敗單騎奔襄陽仲堪出奔鄼城玄遣將軍馮該追佺期及廣皆獲而殺之傳首建康佺期弟思平從弟尚保孜敬逃入蠻中仲堪聞佺期死将數百人将奔長安至冠軍城該追獲之還至柞溪逼令自殺并殺殷道䕶仲堪奉天師道禱請鬼神不吝財賄而嗇於周急好為小惠以恱人病者自為診脉分藥用計倚伏煩密而短於鑒略故至於敗仲堪之走也文武無送者惟羅企生從之路經家門弟遵生曰作如此分離何可不一執手企生旋馬授手遵生有力因牽下之曰家有老母去将何之企生揮淚曰今日之事我必死之汝等奉養不失子道一門之中有忠與孝亦復何恨遵生抱之愈急仲堪於路待之見企生無脱理策馬而去及玄至荆州人士無不詣玄者企生獨不往而營理仲堪家事或曰如此禍必至矣企生曰殷侯遇我以國士為弟所制不得隨之共殄醜逆復何面目就桓求生乎玄聞之怒然待企生素厚先遣人謂曰若謝我當釋汝企生曰吾為殷荆州史荆州敗不能救尚何謝為玄乃收之復遣人問企生欲何言企生曰文帝殺嵇康嵇紹為晉忠臣從公乞一弟以養老母玄乃殺企生而赦其弟凉王光疾甚立太子紹為天王自號太上皇帝以太原公纂為太尉常山公弘為司徒謂紹曰今國家多難三鄰伺隙吾沒之後使纂統六軍弘管朝政汝恭已無為委重二兄庶幾可濟若内相猜忌則蕭牆之變旦夕至矣又謂纂弘曰永業才非撥亂直以立嫡有常猥居元首今外有彊冦人心未寧汝兄弟緝睦則祚流萬世若内自相圖則禍不旋踵矣纂弘泣曰不敢又執纂手戒之曰汝性麤暴深為吾憂善輔永業勿聽讒言是日光卒紹祕不發喪纂排閤入哭盡哀而出紹懼以位讓之曰兄功髙年長宜承大統纂曰陛下國之冢嫡臣敢奸之紹固讓纂不許驃騎将軍吕超謂紹曰纂為將積年威震内外臨䘮不安歩髙視逺必有異志宜早除之紹曰先帝言猶在耳柰何棄之吾以弱年負荷大任方頼二兄以寧家國縱其圖我我視死如歸終不忍有此意也卿勿復言纂見紹於湛露堂超執刀侍側目纂請收之紹弗許超光弟寶之子也弘密遣尚書姜紀謂纂曰主上闇弱未堪多難兄威恩素著宜為社稷計不可徇小節也纂於是夜帥壯士數百踰北城攻廣夏門弘帥東苑之衆斧洪範門左衛將軍齊從守融明觀逆問之曰誰也衆曰太原公從曰國有大故主上新立太原公行不由道夜入禁城将為亂邪因抽劔直前斫纂中額纂左右禽之纂曰義士也勿殺紹遣虎賁中郎将吕開帥禁兵拒戰於端門吕超帥卒二千赴之衆素憚纂皆不戰而潰纂入自青角門升謙光殿紹登紫閤自殺吕超奔廣武纂憚弘兵彊以位讓弘弘曰弘以紹弟也而承大統衆心不順是以違先帝遺命而廢之慙負黄泉今復踰兄而立豈弘之本志乎纂乃使弘出告衆曰先帝臨終受詔如此羣臣皆曰茍社稷有主誰敢違者纂遂即天王位大赦改元咸寧諡光曰懿武皇帝廟號太祖諡紹曰隱王以弘為大都督督中外諸軍事大司馬車騎大将軍司􅀠校尉録尚書事改封番禾郡公纂謂齊從曰卿前斫我一何甚也從泣曰隱王先帝所立陛下雖應天順人而微心未達唯恐陛下不死何謂甚也纂賞其忠善遇之纂叔父征東将軍方鎮廣武纂遣使謂方曰超實忠臣義勇可嘉但不識國家大體權變之冝方頼其用以濟世難可以此意諭之超上䟽陳謝纂復其爵位是嵗燕主盛以河閒公熙為都督中外諸軍事尚書左僕射領中領軍劉衞辰子文陳降魏魏主珪妻以宗女拜上将軍賜姓宿氏四年春正月壬子朔燕主盛大赦自貶號為庶人天王魏材官將軍和跋襲盧溥於遼西戊午克之禽溥及其子煥送平城車裂之燕主盛遣廣威将軍孟廣平救溥不及斬魏遼西守宰而還乙亥大赦西秦王乾歸遷都苑川秃髪利鹿孤大赦改元建和高句麗王安事燕禮慢二月丙申燕王盛自将兵三萬襲之以驃騎大將軍熙為前鋒拔新城南蘇二城開境七百餘里徙五千餘户而還熙勇冠諸將盛曰叔父雄果有世祖之風但弘略不如耳初魏主珪納劉頭眷之女寵冠後庭生子嗣及克中山獲燕主寶之幼女将立皇后用其國故事鑄金人以卜之劉氏所鑄不成慕容氏成三月戊午立慕容氏為皇后桓􅀇既克荆雍表求領荆江二州詔以玄為都督荆司雍秦梁益寧七州諸軍事荆州刺史以中䕶軍桓脩為江州刺史玄上疏固求江州於是進玄督八州及楊豫八部諸軍事復領江州刺史玄輙以兄偉為雍州刺史朝廷不能違又以從子振為淮南太守凉王纂以大司馬弘功髙地逼忌之􅀪亦自疑遂以東苑之兵作亂攻纂纂遣其将焦辨擊之弘衆潰出走纂縱兵大掠悉以東苑婦女賞軍弘之妻子亦在中纂笑謂羣臣曰今日之戰何如侍中房晷對曰天禍凉室憂患仍臻先帝始崩隱王廢黜山陵甫訖大司馬稱兵京師流血昆弟接刃雖弘自取夷滅亦由陛下無常棣之恩當省已責躬以謝百姓乃更縱兵大掠囚辱士女釁自弘起百姓何罪且弘妻陛下之弟婦弘女陛下之姪也奈何使無頼小人辱為婢妾天地神明豈忍見此遂歔欷流涕纂改容謝之召弘妻子寘於東宫厚撫之弘將奔秃髪利鹿孤道過廣武詣吕方方見之大哭曰天下甚寛汝何為至此乃執弘送獄纂遣力士康龍就拉殺之纂立妃楊氏為后以后父桓為尚書左僕射凉都尹辛卯燕襄平令叚登等謀反誅凉王纂将伐武威王利鹿孤中書令楊頴諫曰利鹿孤上下用命國未有釁不可伐也不從利鹿孤使其弟傉檀拒之夏四月傉檀敗凉兵於三堆斬首二千餘級初隴西李暠好文學有令名嘗與郭黁及同母弟敦煌宋繇同宿黁起謂繇曰君當位極人臣李君終當有國家有騍馬生白額駒此其時也及孟敏為沙州刺史以暠為效穀令宋繇事北凉王業為中散常侍孟敏卒敦煌䕶軍馮翊郭謙沙州治中敦煌索仙等以暠溫毅有惠政推為敦煌太守暠初難之㑹宋繇自張掖告歸謂暠曰叚王無逺略終必無成兄忘郭黁之言邪白額駒今已生矣暠乃從之遣使請命於業業因以暠為敦煌太守右衞將軍敦煌索嗣言於業曰李暠不可使處敦煌業以嗣代暠為敦煌太守使帥五百騎之官嗣未至二十里移暠迎己暠驚疑將出迎之效穀令張邈及宋繇止之曰叚王闇弱正是英豪有為之日将軍據一國成資奈何拱手授人嗣自恃本郡謂人情附已不意將軍猝能拒之可一戰禽也暠從之先遣繇見嗣啗以甘言繇還謂暠曰嗣志驕兵弱易取也暠乃遣邈繇與其二子歆讓逆撃之嗣敗走還張掖暠素與嗣善尤恨之表業請誅嗣沮渠男成亦惡嗣勸業除之業乃殺嗣遣使謝暠進暠都督凉興巳西諸軍事鎮西將軍吐谷渾視羆卒世子樹洛干方九歲弟烏紇堤立妻樹洛干之母念氏生慕璝慕延烏紇堤懦弱荒淫不能治國念氏專制國事有膽智國人畏服之燕前將軍叚璣太后叚氏之兄子也為叚登辭所連及五月壬子逃奔遼西丙寅衞將軍東亭獻矦王珣卒己巳魏主珪東如涿鹿西如馬邑觀灅源戊寅燕叚璣復還歸罪燕王盛赦之賜號曰思悔矦使尚公主入直殿内謝琰以資望鎮會稽不能綏懷又不為武備諸將咸諫曰賊近在海浦伺人形便宜開其自新之路琰不從曰苻堅之衆百萬尚送死淮南孫恩小賊敗死入海何能復出若其果出是天欲殺之也旣而恩冦浹口入餘姚破上虞進及邢浦琰遣參軍劉宣之擊破之恩退走少日復冦邢浦官軍失利恩乗勝徑進己卯至㑹稽琰尚未食曰要當先滅此賊而後食因跨馬出戰兵敗為帳下都督張猛所殺吳興太守庾桓恐郡民復應恩殺男女數千人恩轉冦臨海朝廷大震遣冠軍将軍桓不才輔國将軍孫無終寧朔将軍髙雅之拒之秦征西大将軍隴西公碩徳将兵五千伐西秦入自南安峽西秦王乾歸帥諸將拒之軍于隴西楊軌田玄明謀殺武威王利鹿孤利鹿孤殺之六月庚辰朔日有食之以琅邪王師何澄為尚書左僕射澄準之子也甲子燕大赦凉王纂将襲北凉姜紀諌曰盛夏農事方殷且宜息兵今逺出嶺西秃髪氏乗虚襲京師將若之何不從進圍張掖西掠建康秃髪傉檀聞之將萬騎襲姑臧纂弟隴西公緯憑北城以自固傉檀置酒朱明門上鳴鍾皷饗将士曜兵於青陽門掠八千餘户而去纂聞之引兵還秋七月壬子太皇太后季氏崩丁卯大赦西秦王乾歸使武衛將軍慕兀等屯守秦軍樵采路絶秦王興潜引兵救之乾歸聞之使慕兀帥中軍二萬屯柏楊鎮軍將軍羅敦帥外軍四萬屯侯辰谷乾歸自将輕騎數千前候秦兵㑹大風昏霧與中軍相失為追騎所逼入於外軍旦與秦戰大敗走歸苑川其部衆三萬六千皆降於秦興進軍枹罕乾歸奔金城謂諸豪帥曰吾不才叨竊名號已踰一紀今敗散如此無以待敵欲西保允吾若舉國而去必不得免卿等留此各以其衆降秦以全宗族勿吾隨也皆曰死生願從陛下乾歸曰吾今将寄食於人若天未亡我庶幾異日克復舊業復與卿等相見今相隨而死無益也乃大哭而别乾歸獨引數百騎奔允吾乞降於武威王利鹿孤利鹿孤遣廣武公傉檀迎之寘於晉興待以上賔之禮鎮北將軍秃髪俱延言於利鹿孤曰乾歸本吾之屬國因亂自尊今勢窮歸命非其誠欵若逃歸姚氏必為國患不如徙置乙弗之間使不得去利鹿孤曰彼窮來歸我而逆疑其心何以勸來者俱延利鹿孤之弟也秦兵既退南羗梁戈等密招乾歸乾歸将應之其臣屋引阿洛以告晉興太守隂暢暢馳白利鹿孤利鹿孤遣其弟吐雷帥騎三千屯捫天嶺乾歸懼為利鹿孤所殺謂其太子熾盤曰吾父子居此必不為利鹿孤所容今姚氏方强吾將歸之若盡室俱行必為追騎所及吾以汝兄弟及汝母為質彼必不疑吾在長安彼終不敢害汝也乃送熾盤等於西平八月乾歸南奔枹罕遂降於秦丁亥尚書右僕射王雅卒九月癸丑地震凉吕方降於秦廣武民三千餘户奔武威王利鹿孤冬十一月髙雅之與孫恩戰於餘姚雅之敗走山隂死者什七八詔以劉牢之都督會稽等五郡帥衆擊恩恩走入海牢之東屯上虞使劉裕戍句章呉國内史袁崧築滬瀆壘以備恩崧喬之孫也會稽世子元顯求領徐州詔以元顯為開府儀同三司都督楊豫徐兖青幽冀并荆江司雍梁益交廣十六州諸軍事領徐州刺史封其子彦瑋為東海王乞伏乾歸至長安秦王興以為都督河南諸軍事河州刺史歸義侯乆之乞伏熾磐欲逃詣乾歸武威王利鹿孤追獲之利鹿孤將殺熾磐廣武公傉檀曰子而歸父無足深責宜宥之以示大度利鹿孤從之秦王興遣晉將劉嵩等二百餘人來歸北凉晉昌太守唐瑶叛移檄六郡推李暠為冠軍大將軍沙州刺史凉公領敦煌太守暠赦其境内改元庚子以瑤為征東將軍郭謙為軍諮祭酒索仙為左長史張邈為右長史尹建興為左司馬張體順為右司馬遣從事中郎宋繇東伐凉興并擊玉門已西諸城皆下之酒泉太守王徳亦叛北凉自稱河州刺史北凉王業使沮渠蒙遜討之徳焚城将部曲奔唐瑤蒙遜追至沙頭大破之虜其妻子部落而還十二月戊寅有星孛于天津會稽世子元顯以星變解録尚書事復加尚書令吏部尚書車胤以元顯驕恣白㑹稽王道子請禁抑之元顯聞而未察以問道子曰車武子屏人言及何事道子弗荅固問之道子怒曰爾欲幽我不令我與朝士語耶元顯出謂其徒曰車胤間我父子密遣人責之胤懼自殺壬辰燕主盛立燕臺統諸部雜夷魏太史屢奏天文乖亂魏主珪自覽占書多云改王易政乃下詔風勵羣下以帝王繼統皆有天命不可妄干又數變易官名欲以厭塞災異儀曹郎董謐獻服餌仙經珪置仙人博士立仙坊煑鍊百藥封西山以供薪蒸藥成令死罪者試服之多死不驗而珪猶信之訪求不已珪常以燕主垂諸子分據勢要使權柄下移遂至敗亡深非之博士公孫表希㫖上韓非書勸珪以法制御下左將軍李粟性簡慢常對珪舒放不肅咳唾任情珪積其宿過遂誅之羣下震粟丁酉燕王盛尊獻莊后丁氏爲皇太后立遼西公定為皇太子大赦是歳南燕王徳即皇帝位于廣固大赦改元建平更名備徳欲使吏民易避追謚燕主暐曰幽皇帝以北地王鍾為司徒慕輿拔為司空封孚為左僕射慕輿䕶為右僕射立妃叚氏為皇后資治通鑑卷第一百一十一
