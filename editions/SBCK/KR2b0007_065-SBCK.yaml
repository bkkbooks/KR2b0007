seq: 65
front:
  text: 到官誘喻招納皆禮召其豪右稍稍薦舉使詣幕府豪右已盡次發諸丁彊以爲義從又因大軍出征令諸將分請以爲勇力吏兵已去之後稍移其家前後送鄴凡數萬口其不從命者興兵致討斬首千數降附者萬計單于恭順名王稽顙服事供職同於編户邊境肅清百姓布野勤勸農桑令行禁止長老稱詠以爲自所聞識刺史未有如習者習乃貢逹名士避地州界者河内常林楊俊王􅁚荀緯及太原王淩之徒操悉以爲縣長後皆顯名於丗初山陽仲長統遊學至并州過髙幹幹善遇之訪以丗事統謂幹曰君有雄志而無雄才好士而不能擇人所以爲君深戒也幹雅自多不恱統言統遂去之幹死荀彧舉統爲尙書郎著論曰昌言其言治亂略曰豪傑之當天命者未始有天下之分者也無天下之分故戰爭者競起焉角智者皆窮角力者皆􅀒形不堪復伉埶不足復校乃始羈首係頸就我之銜紲耳及繼體之時豪傑之心旣絶士民之志已定貴有常家尊在一人當此之時雖下愚之才居之猶能使恩同天地威侔􅀑神周孔數千無所復角其聖賁育百萬無所復奮其勇矣彼後嗣之愚主見天下莫敢與之違自謂若天地之不可亡也乃犇其私􅄝騁其邪欲君臣宣􅁋上下同惡荒廢庶政棄忘人物信任親愛者盡佞諂容􅀃之人也寵貴隆豐者盡后妃􅁎妾之家也遂至熬天下之脂膏斵生民之骨髓怨毒無聊禍亂並起中國擾攘四夷侵叛土崩瓦解一朝而去昔之爲我哺乳之子孫者今盡是我飲血之寇讎也至於運徙埶去猶不覺悟者豈非冨貴生不仁沈溺致愚疾邪存亡以之迭代治亂從此周復天道常然之大數也秋七月武威太守張猛殺雍州刺史邯鄲商州兵討誅之猛奐之子也八月曹操東討海賊管承至淳于遣將樂進李典擊破之承走入海島昌豨復叛操遣于禁討斬之是歳立故琅邪王容子熈爲琅邪王齊北海阜陵下邳常山甘陵濟隂平原八國皆除
  hash: sha256:1d358e36e0ba8a8ecb0fdaa08f7602672731da3f2bd2f83dcbb3e50c93c5ad67
body:
  text: 烏桓乗天下亂略有漢民十餘萬户􅀽紹皆立其酋豪爲單于以家人子爲已女妻焉遼西烏􅁊蹋頓尤彊爲紹所厚故尚兄弟歸之數入塞爲寇欲助尚復故地曹操將擊之鑿平虜渠泉州渠以通運孫權擊山賊麻保二屯平之十二年春二月曹操自淳于還鄴丁酉操奏封大功臣二十餘人皆爲列侯因表萬歳亭矦荀彧功狀三月增封彧千户又欲授以三公彧使荀攸深自陳讓至于十數乃止曹操將擊烏桓諸將皆曰􅀽尚亡虜耳夷狄貪而無親豈能爲尚用今深入征之劉備必􅀃劉表以襲許萬一爲變事不可悔郭嘉曰公雖威震天下胡恃其逺必不設備因其無備卒然擊之可破滅也且􅀽紹有恩於民夷而尚兄弟生存今四州之民徒以威附德施未加舎而南征尚因烏􅁊之資招其死主之臣胡人一動民夷俱應以生蹋頓之心成覬覦之計恐青冀非己之有也表坐談客耳自知才不足以御備重任之則恐不能制輕任之則備不爲用雖虚國逺征公無憂矣操從之行至易郭嘉曰兵貴神速今千里襲人輜重多難以趨利且彼聞之必爲備不如留輜重輕兵兼道以出掩其不意初􅀽紹數遣使召田疇於無終又即授將軍印使安輯所統疇皆拒之及曹操定冀州河閒邢顒謂疇曰黃巾起來二十餘年海内鼎沸百姓流離今聞曹公灋令嚴民厭亂矣亂極則平請以身先遂裝還郷里疇曰邢顒天民之先覺者也操以顒爲冀州從事疇忿烏􅁊多殺其本郡冠蓋意欲討之而力未能操遣使辟疇疇戒其門下趣治嚴門人曰昔􅀽公慕君禮命五至君義不屈今曹公使一來而君若恐弗及者何也疇笑曰此非君所識也遂隨使者到軍拜爲蓨令隨軍次無終時方夏水雨而濵海洿下濘滯不通虜亦遮守蹊要軍不得進操患之以問田疇疇曰此道秋夏每常有水淺不通車馬深不載舟􅂳爲難乆矣舊北平郡治在平岡道出盧龍逹于栁城自建武以來陷壞斷絶垂二百載而尚有微徑可從今虜將以大軍當由無終不得進而退懈弛無備若嘿回軍從盧龍口越白檀之險出空虚之地路近而便掩其不備蹋頓可不戰而禽也操曰善乃引軍還而署大木表於水側路傍曰方今夏暑道路不通且俟秋冬乃復進軍虜􅇋􅀐見之誠以爲大軍去也操令疇將其衆爲郷導上徐無山壍山堙谷五百餘里經白檀歴平岡渉鮮卑庭東指栁城未至二百里虜乃知之尚熙與蹋頓及遼西單于樓班右北平單于能臣抵之等將數萬􅀐逆軍八月操登白狼山卒與虜遇衆甚盛操車重在後被甲者少左右皆懼操登髙望虜陣不整乃縱兵擊之使張遼爲先鋒虜衆大崩斬蹋頓及名王已下胡漢降者二十餘萬口遼東單于速僕丸與尚熈犇遼東太守公孫康其衆尚有數千􅀐或勸操遂擊之操曰吾方使康斬送尚熈首不煩兵矣九月操引兵自柳城還公孫康欲取尚熈以爲功乃先置精勇於廐中然後請尚熈入未及坐康叱伏兵禽之遂斬尚熈并速僕丸首送之諸將或問操公還而康斬尚熈何也操曰彼素畏尚熈吾急之則并力緩之則自相圖其埶然也操梟尚首令三軍敢有哭之者斬牽招獨設祭悲哭操義之舉爲茂才時天寒且旱二百里無水軍又乏食殺馬數千匹以爲糧鑿地入三十餘丈方得水旣還科問前諫者衆莫知其故人人皆懼操皆厚賞之曰􅀌前行乗危以徼倖雖得之天所佐也顧不可以爲常諸君之諫萬安之計是以相賞後勿難言之冬十月辛卯有星孛于鶉尾乙巳黃巾殺濟南王贇十一月曹操至易水烏􅁊單于代郡普富盧上郡那樓皆來賀師還論功行賞以五百户封田疇爲亭矦疇曰吾始爲劉公報仇率衆遁逃志義不立反以爲利非本志也固讓不受操知其至心許而不奪操之北伐也劉僃􅀃劉表襲許表不能用及聞操還表謂備曰不用君言故爲失此大㑹備曰今天下分裂日尋干戈事㑹之來豈有終極乎若能應之於後者則此未足爲恨也是歳孫權西擊黃祖虜其人民而還權母吴氏疾篤引見張昭等屬以後事而卒初琅邪諸葛亮寓居襄陽隆中每自比管仲樂毅時人莫之許也惟潁川徐庶與崔州平謂爲信然州平烈之子也劉僃在荆州訪士於襄陽司馬徽徽曰儒生俗士豈識時務識時務者在乎俊傑此閒自有伏龍鳳雛僃問爲誰曰諸葛孔明龐士元也徐庶見僃於新野僃器之庶謂僃曰諸葛孔明卧龍也將軍豈願見之乎僃曰君與俱來庶曰此人可就見不可屈致也將軍宜枉駕顧之僃由是詣亮凡三往乃見因屏人曰漢室傾頽姦臣竊命􅀌不度德量力欲信大義於天下而智術淺短遂用猖蹶至于今日然志猶未已君謂計將安出亮曰今曹操已擁百萬之衆挾天子而令諸矦此誠不可與爭鋒孫權據有江東已歷三丗國險而民附賢能爲之用此可與爲援而不可圗也荆州北據漢􅃆利盡南海東連吳㑹西通巴蜀此用武之國而其主不能守此殆天所以資將軍也益州險塞沃野千里天府之土劉璋闇弱張魯在北民殷國富而不知存䘏智能之士思得明君將軍旣帝室之胄信義著於四海若跨有荆益保其巖阻撫和戎越結好孫權内脩政治外觀時變則霸業可成漢室可興矣僃曰善於是與亮情好日密􅀜羽張飛不恱僃解之曰􅀌之有孔明猶魚之有水也願諸君勿復言羽飛乃止司馬徽清雅有知人之鑑同縣龐德公素有重名徽兄事之諸葛亮每至德公家獨拜牀下德公初不令止德公從子統少時樸鈍未有識者惟德公與徽重之德公常謂孔明爲卧龍士元爲鳳鶵德操爲水鑑故德操與劉僃語而稱之十三年春正月司徒趙温辟曹操子丕操表温辟臣子弟選舉故不以實策免之曹操還鄴作􅀇武池以肄舟師初巴郡甘寧將僮客八百人歸劉表表儒人不習軍事寧觀表事埶終必無成恐一朝衆散并受其禍欲東入吴黄祖在夏口軍不得過乃留依祖三年祖以凡人畜之孫權擊祖祖軍敗走權校尉凌操將兵急追之寧善射將兵在後射殺操祖由是得免軍罷還營待寧如初祖都督􅂫飛數薦寧祖不用寧欲去恐不免飛乃白祖以寧爲邾長寧遂亡犇孫權周瑜吕蒙共薦逹之權禮異同於舊臣寧獻策於權曰今漢祚日微曹操終爲􅆲盜南荆之地山川形便誠國之西埶也寧觀劉表慮旣不逺兒子又劣非能承業傳基者也至尊當早圗之不可後操圖之之計冝先取黃祖祖今昬耄已甚財榖並乏左右貪縱吏士心怨舟􅂳戰具頓廢不脩怠於耕農軍無灋伍至尊今往其破可必一破祖軍鼓行而西據楚􅀜大􅀔彌廣即可漸規巴蜀矣權深納之張昭時在坐難曰今吴下業業若軍果行恐必致亂寧謂昭曰國家以蕭何之任付君君居守而憂亂奚以希慕古人乎權舉酒屬寧曰興霸今年行討如此酒矣决以付卿卿但當勉建方略令必克祖則卿之功何嫌張長史之言乎權遂西擊黃祖祖橫兩蒙衝挾守􅃆口以栟閭大紲繫石爲矴上有千人以弩交射飛矢雨下軍不得前偏將軍董襲與别部司馬凌統俱爲前部各將敢死百人人被兩鎧乗大舸突入蒙衝裏襲身以刀斷兩紲蒙衝乃横流大兵遂進祖令都督陳就以水軍逆戰平北都尉吕蒙勒前鋒親梟就首於是將士乗勝水陸並進􅀓其城盡銳攻之遂屠其城祖挺身走追斬之虜其男女數萬口權先作兩函欲以盛祖及􅂫飛首權爲諸將置酒甘寧下席叩頭血涕交流爲權言飛疇昔舊恩寧不值飛固已􅂢骸於溝壑不得致命於麾下今飛罪當夷戮特從將軍乞其首領權感其言謂曰今爲君置之若走去何寧曰飛免分裂之禍受更生之恩逐之尚必不走豈當圗亡哉若爾寧頭當代入函權乃赦之凌統怨寧殺其父操常欲殺寧權命統不得讎之令寧將兵屯於它所夏六月罷三公官復置丞相御史大夫癸巳以曹操爲丞相操以冀州别駕從事崔琰爲丞相西曹􅁺司空東曹􅁺陳留毛玠爲丞相東曹􅁺元城令河内司馬朗爲主簿弟懿爲文學􅁺冀州主簿盧毓爲灋曹議令史毓植之子也琰玠並典選舉其所舉用皆清正之士雖於時有盛名而行不由本者終莫得進拔敦實斥華僞進冲遜抑阿黨由是天下之士莫不以廉節自勵雖貴寵之臣輿服不敢過度至乃長吏還者垢靣羸衣獨乗柴車軍吏入府朝服徒行吏㓗於上俗移於下操聞之歎曰用人如此使天下人自治吾復何爲哉司馬懿少聦逹多大略崔琰謂其兄朗曰君弟聦亮明允剛斷英特非子所及也操聞而辟之懿辭以風痺操怒欲收之懿懼就職操使張遼屯長社臨發軍中有謀反者夜驚亂起火一軍盡擾遼謂左右曰勿動是不一營盡反必有造變者欲以驚動人耳乃令軍中其不反者安坐遼將親兵數十人中陳而立有頃皆定即得首謀者殺之遼在長社于禁屯潁隂樂進屯陽翟三將任氣多共不恊操使司空主簿趙儼并參三軍每事訓諭遂相親睦初前將軍馬騰與鎭西將軍韓遂結爲異姓兄弟後以部曲相侵更爲讎敵朝廷使司􅀠校尉鍾繇涼州刺史韋端和解之徴騰入屯槐里曹操將征荆州使張旣􅀃騰令釋部曲還朝騰許之已而更猶豫旣恐其爲變乃移諸縣促儲偫二千石郊迎騰不得已發東操表騰爲衛尉以其子超爲偏將軍統其衆悉徙其家屬詣鄴秋七月曹操南擊劉表八月丁未以光禄勲山陽郗慮爲御史大夫壬子太中大夫孔融棄市融恃其才望數戱侮曹操發辭偏宕多致乖忤操以融名重天下外相容忍而内甚嫌之融又上書言宜準古王畿之制千里寰内不以封建諸矦操疑融所論建漸廣益憚之融與郗慮有􅂩慮承操風㫖構成其罪令丞相軍謀􅀕酒路粹奏融昔在北海見王室不靜而招合徒衆欲規不軌及與孫權使語謗訕朝廷又前與白衣禰衡跌蕩放言更相賛揚衡謂融曰仲尼不死融荅顏回復生大逆不道宜極重誅操遂收融并其妻子皆殺之初京兆脂習與融善每戒融剛直太過必罹丗患及融死許下莫敢收者習往撫尸曰文舉舎我死吾何用生爲操收習欲殺之旣而赦之初劉表二子􅄾琮表爲琮娶其後妻蔡氏之姪蔡氏遂愛琮而惡􅄾表妻弟蔡瑁外甥張允並得幸於表日相與毁􅄾而譽琮􅄾不自寧與諸葛亮謀自安之術亮不對後乃共升髙樓因令去梯謂亮曰今日上不至天下不至地言出子口而入吾耳可以言未亮曰君不見申生在内而危重耳居外而安乎􅄾意感悟隂規出計㑹黃祖死􅄾求代其任表乃以􅄾爲江夏太守表病甚􅄾歸省疾瑁允恐其見表而父子相感更有託後之意乃謂􅄾曰將軍命君撫臨江夏其任至重今釋衆擅來必見譴怒傷親之歡重増其疾非孝敬之道也遂遏于户外使不得見􅄾流涕而去表卒瑁允等遂以琮爲嗣琮以矦印授􅄾􅄾怒􅄬之地將因犇喪作難會曹操軍至􅄾犇江南章陵太守蒯越及東曹􅁺傅巽等勸劉琮降操曰逆順有大體彊弱有定埶以人臣而拒人主逆道也以新造之楚而禦中國必危也以劉僃而敵曹公不當也三者皆短將何以待敵且將軍自料何如劉僃若僃不足禦曹公則雖全楚不能以自存也若足禦曹公則僃不爲將軍下也琮從之九月操至新野琮遂舉州降以節迎操諸將皆疑其詐婁圭曰天下擾攘各貪王命以自重今以節來是必至誠操遂進兵時劉僃屯樊琮不敢告僃僃乆之乃覺遣所親問琮琮令其官屬宋忠詣僃宣㫖時曹操已在宛僃乃大驚駭謂忠曰卿諸人作事如此不早相語今禍至方告我不亦太劇乎引刀向忠曰今斷卿頭不足以解忿亦恥丈夫臨别復殺卿軰遣忠去乃呼部曲共議或勸僃攻琮荆州可得僃曰劉荆州臨亡託我以􅀌遺背信自濟吾所不爲死何面目以見劉荆州乎僃將其衆去過襄陽駐馬呼琮琮懼不能起琮左右及荆州人多歸僃僃過辭表墓涕泣而去比到當陽衆十餘萬人輜重數千兩日行十餘里别遣􅀜羽乗􅂳數百艘使㑹江陵或謂僃曰宜速行保江陵今雖擁大衆被甲者少若曹公兵至何以拒之僃曰夫濟大事必以人爲本今人歸吾吾何忍棄去習鑿齒論曰劉玄德雖顚沛險難而信義愈明勢偪事危而言不失道追景升之顧則情感三軍戀赴義之士則甘與同敗終濟大業不亦宜乎劉琮將王威􅀃琮曰曹操聞將軍旣降劉僃已走必懈弛無僃輕行單進若給威竒兵數千徼之於險操可獲也獲操即威震四海非徒保守今日而已琮不納操以江陵有軍實恐劉僃據之乃釋輜重輕軍到襄陽聞僃已過操將精􅀐五千急追之一日一夜行三百餘里及於當陽之長坂僃棄妻子與諸葛亮張飛趙雲等數十􅀐走操大獲其人衆輜重徐庶母爲操所獲庶辭僃指其心曰本欲與將軍共圖王霸之業者以此方寸之地也今已失老母方寸亂矣無益於事請從此别遂詣操張飛將二十􅀐拒後飛㩀水斷橋瞋目横矛曰身是張益德也可來共决死操兵無敢近者或謂僃趙雲已北走僃以手㦸擿之曰子龍不棄我走也頃之雲身抱僃子禪與􅀜羽􅂳㑹得濟沔遇劉􅄾衆萬餘人與俱到夏口曹操進軍江陵以劉琮爲青州刺史封列矦并蒯越等矦者凡十五人釋韓嵩之囚待以交友之禮使條品州人優劣皆擢而用之以嵩爲大鴻臚蒯越爲光禄勲劉先爲尚書鄧羲爲侍中荆州大將南陽文聘别屯在外琮之降也呼聘欲與俱聘曰聘不能全州當待罪而已操濟漢聘乃詣操操曰來何遟邪聘曰先日不能輔弼劉荆州以奉國家荆州雖没常願據守漢川保全土境生不􅀒於􅀌弱死無愧於地下而計不在已以至於此實懷悲慙無顔早見耳遂歔欷流涕操爲之愴然字謂之曰仲業卿眞忠臣也厚禮待之使統本兵爲江夏太守初􅀽紹在冀州遣使迎汝􅀯士大夫西平和洽以爲冀州土平民彊英桀所利四戰之地不如荆州土險民弱易依􅀝也遂從劉表表以上客待之洽曰所以不從本初辟爭地也昬丗之主不可黷近乆而不去讒慝將興遂南之武陵表辟南陽劉望之爲從事而其友二人皆以讒毁爲表所誅望之又以正諫不合投傳告歸望之弟廙謂望之曰趙殺鳴犢仲尼回輪今兄旣不能灋柳下惠和光同塵於内則宜模范蠡遷化於外坐而自絕於時殆不可也望之不從尋復見害廙犇揚州南陽韓曁避􅀽術之命徙居山都山劉表又辟之遂遁居孱陵表深恨之墍懼應命除宜城長河東裴潛亦爲表所禮重潛私謂王暢之子粲及河内司馬芝曰劉牧非霸王之才乃欲西伯自處其敗無日矣遂南適長沙於是操以曁爲丞相士曹屬潛參丞相軍事洽廙粲皆爲􅁺屬芝爲管令從人望也冬十月癸未朔日有食之初魯肅聞劉表卒言於孫權曰荆州與國鄰接江山險固沃野萬里士民殷富若據而有之此帝王之資也今劉表新亡二子不協軍中諸將各有彼此劉僃天下梟雄與操有􅂩􅀉寓於表表惡其能而不能用也若僃與彼協心上下齊同則宜撫安與結盟好如有離違宜别圖之以濟大事肅請得奉命弔表二子并慰勞其軍中用事者及􅀃僃使撫表衆同心一意共洽曹操僃必喜而從命如其克諧天下可定也今不速往恐爲操所先權即遣肅行到夏口聞操已向荆州晨夜兼道比至南郡而琮已降僃􅀯走肅徑迎之與僃㑹於當陽長坂肅宣權㫖論天下事埶致殷勤之意且問僃曰豫州今欲何至僃曰與蒼梧太守吴巨有舊欲往投之肅曰孫討虜聦明仁惠敬賢禮士江表英豪咸歸附之已據有六郡兵精糧多足以立事今爲君計莫若遣腹心自結於東以共濟世業而欲投吴巨巨是凡人偏在逺郡行將爲人所併豈足託乎僃甚恱肅又謂諸葛亮曰我子瑜友也即共定交子瑜者亮兄瑾也避亂江東爲孫權長史備用肅計進住鄂縣之樊口曹操自江陵將順江東下諸葛亮謂劉僃曰事急矣請奉命求救於孫將軍遂與魯肅俱詣孫權亮見權於柴桑􅀃權曰海内大亂將軍起兵江東劉豫州収衆漢南與曹操並爭天下今操芟夷大難略已平矣遂破荆州威震四海英雄無用武之地故豫州遁逃至此願將軍量力而處之若能以吴越之衆與中國抗衡不如早與之絶若不能何不按兵朿甲北面而事之今將軍外託服從之名而内懷猶豫之計事急而不斷禍至無日矣權曰苟如君言劉豫州何不遂事之乎亮曰田橫齊之壯士耳猶守義不辱况劉豫州王室之胄英才蓋丗衆士慕仰若水之歸海若事之不濟此乃天也安能復爲之下乎權勃然曰吾不能舉全吴之地十萬之衆受制於人吾計决矣非劉豫州莫可以當曹操者然豫州新敗之後安能抗此難乎亮曰豫州軍雖敗於長阪今戰士還者及􅀜羽水軍精甲萬人劉􅄾合江夏戰士亦不下萬人曹操之衆逺來疲敝聞追豫州輕􅀐一日一夜行三百餘里此所謂彊弩之末埶不能穿魯縞者也故兵灋忌之曰必蹶上將軍且北方之人不習水戰又荆州之民附操者偪兵埶耳非心服也今將軍誠能命猛將統兵數萬與豫州恊規同力破操軍必矣操軍破必北還如此則荆吴之埶彊鼎足之形成矣成敗之機在於今日權大恱與其羣下謀之是時曹操遺權書曰近者奉辭伐罪旌麾􅀯指劉琮束手今治水軍八十萬衆方與將軍㑹獵於吴權以示羣下莫不響震失色長史張昭等曰曹公豺虎也挾天子以征四方動以朝廷爲辭今日拒之事更不順且將軍大埶可以拒操者長江也今操得荆州奄有其地劉表治水軍蒙衝􅃲艦乃以千數操悉浮以􅆓江兼有歩兵水陸俱下此爲長江之險已與我共之矣而埶力衆寡又不可論愚謂大計不如迎之魯肅獨不言權起更衣肅追於宇下權知其意執肅手曰卿欲何言肅曰向察衆人之議專欲誤將軍不足與圖大事今肅可迎操耳如將軍不可也何以言之今肅迎操操當以肅還付郷黨品其名位猶不失下曹從事乗犢車從吏卒交游士林累官故不失州郡也將軍迎操欲安所歸乎願早定大計莫用衆人之議也權歎息曰諸人持議甚失􅀌望今卿廓開大計正與􅀌同時周瑜受使至番陽肅勸權召瑜還瑜至謂權曰操雖託名漢相其實漢賊也將軍以神武雄才兼杖父兄之烈割據江東地方數千里兵精足用英雄樂業當橫行天下爲漢家除殘去穢况操自送死而可迎之邪請爲將軍籌之今北土未平馬超韓遂尚在關西爲操後患而操舍鞍馬杖舟楫與吳越爭衡又今盛寒馬無藁草驅中國士衆逺渉江湖之閒不習水土必生疾病此數者用兵之患也而操皆冒行之將軍禽操宜在今日瑜請得精兵數萬人進住夏口保爲將軍破之權曰老賊欲廢漢自立乆矣徒忌二􅀽吕布劉表與􅀌耳今數雄已滅惟􅀌尚存􅀌與老賊勢不兩立君言當擊甚與􅀌合此天以君授􅀌也因抜刀斫前奏案曰諸將吏敢復有言當迎操者與此案同乃罷㑹是夜瑜復見權曰諸人徒見操書言水歩八十萬而各恐懾不復料其虚實便開此議甚無謂也今以實校之彼所將中國人不過十五六萬且已乆疲所得表衆亦極七八萬耳尚懷狐疑夫以疲病之卒御狐疑之衆衆數雖多甚未足畏瑜得精兵五萬自足制之願將軍勿慮權撫其背曰公瑾卿言至此甚合􅀌心子布元表諸人各顧妻子挾持私慮深失所望獨卿與子敬與􅀌同耳此天以卿二人賛􅀌也五萬兵難卒合已選三萬人􅂳糧戰具俱辦卿與子敬程公便在前發􅀌當續發人衆多載資糧爲卿後援卿能辦之者誠决邂逅不如意便還就􅀌􅀌當與孟德决之遂以周瑜程普爲左右督將兵與僃并力逆操以魯肅爲賛軍校尉助畫方略劉僃在樊口日遣邏吏於水次􅇋望權軍吏望見瑜􅂳馳往白僃僃遣人慰勞之瑜曰有軍任不可得委署儻能屈威誠副其所望僃乃乗單舸往見瑜問曰今拒曹公深爲得計戰卒有幾瑜曰三萬人僃曰恨少瑜曰此自足用豫州但觀瑜破之僃欲呼魯肅等共㑹語瑜曰受命不得妄委署若欲見子敬可别過之僃深愧喜進與操遇於赤壁時操軍衆已有疾疫初一交戰操軍不利引次江北瑜等在南岸瑜部將黃蓋曰今宼衆我寡難與持乆操軍方連􅂳艦首尾相接可燒而走也乃取蒙衝􅃲艦十艘載燥荻枯柴灌油其中裹以帷幕上建旌旗豫僃走舸繫於其尾先以書遺操詐云欲降時東南風急蓋以十艦最著前中江舉帆餘􅂳以次俱進操軍吏士皆出營立觀指言蓋降去北軍二里餘同時發火火烈風猛􅂳往如箭燒盡北􅂳延及岸上營落頃之煙炎張天人馬燒溺死者甚衆瑜等率輕銳繼其後靁鼓大進北軍大壞操引軍從華容道歩走遇泥濘道不通天又大風悉使羸兵􅀒草塡之􅀐乃得過羸兵爲人馬所蹈藉䧟泥中死者甚衆劉僃周瑜水陸並進追操至南郡時操軍兼以饑疫死者太半操乃留征􅀯將軍曹仁横野將軍徐晃守江陵折衝將軍樂進守襄陽引軍北還周瑜程普將數萬衆與曹仁隔江未戰甘寧請先徑進取夷陵往即得其城因入守之益州將襲肅舉軍降周瑜表以肅兵益橫野中郎將吕蒙蒙盛稱肅有膽用且慕化逺來於義宜益不宜奪也權善其言還肅兵曹仁遣兵圍甘寧寧困急求救於周瑜諸將以爲兵少不足分吕蒙謂周瑜程普曰留凌公績於江陵蒙與君行解圍釋急勢亦不乆蒙保公績能十日守也瑜從之大破仁兵於夷陵獲馬三百匹而還於是將士形埶自倍瑜乃渡江屯北岸與仁相拒十二月孫權自將圍合肥使張昭攻九江之當塗不克劉僃表劉􅄾爲荆州剌史引兵􅀯徇四郡武陵太守金旋長沙太守韓玄桂陽太守趙範零陵太守劉度皆降廬江營帥靁緒率部曲數萬口歸僃僃以諸葛亮爲軍師中郎將使督零陵桂陽長沙三郡調其賦稅以充軍實以偏將軍趙雲領桂陽太守益州牧劉璋聞曹操克荆州遣别駕張松致敬於操松爲人短小放蕩然識逹精果操時已定荆州走劉僃不復存録松主簿楊脩白操辟松操不納松以此怨歸勸劉璋絶操與劉僃相結璋從之習鑿齒論曰昔齊􅁊一矝其功而叛者九國曹操暫自驕伐而天下三分皆勤之於數十年之内而棄之於俯仰之頃豈不惜乎曹操追念田疇功恨前聽其讓曰是成一人之志而虧王灋大制也乃復以前爵封疇疇上䟽陳誠以死自誓操不聽欲引拜之至于數四終不受有司劾疇狷介違道苟立小節宜免官加刑操下丗子及大臣博議丗子丕以疇同於子文辭禄申胥逃賞宜勿奪以優其節尚書令荀彧司􅀠校尉鍾繇亦以爲可聽操猶欲矦之疇素與夏矦惇善操使惇自以其情喻之惇就疇􅀫而勸之疇揣知其指不復發言惇臨去固邀疇疇曰疇􅀒義逃竄之人耳蒙恩全活爲幸多矣豈可賣盧龍之塞以易賞禄哉縱國私疇疇獨不愧於心乎將軍雅知疇者猶復如此若必不得已請願效死刎首於前言未卒涕泣橫流悙具以答操操喟然知不可屈乃拜爲議郎操㓜子倉舒卒操傷惜之甚司空􅁺邴原女早亡操欲求與倉舒合葬原辭曰嫁殤非禮也原之所以自容於明公公之所以待原者以能守訓典而不易也若聽明公之命則是凡庸也明公焉以爲哉操乃止孫權使威武中郎將賀齊討丹陽黟歙賊黟帥陳僕祖山等二萬户屯林歷山四面壁立不可得攻軍住經月齊隂募輕捷士於隱險處夜以鐡戈拓山濳上縣布以援下人得上者百餘人令分布四面鳴鼓角賊大驚守路者皆逆走還依衆大軍因是得上大破之權乃分其地爲新都郡以齊爲太守資治通鑑卷第六十五
