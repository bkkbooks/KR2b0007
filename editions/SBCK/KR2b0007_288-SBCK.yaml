front:
  text: 資治通鑑卷第二百八十八
  hash: sha256:4b1e67f9d099a97ff0fcad72a4f9d6b3ae2e8bed80eacf98a6b57816d80a9d7e
body:
  text: 臣司馬光奉勑編集後漢紀三維作噩凡一年有竒起著雍涒灘三月盡屠髙祖睿文聖武昭肅孝皇帝下乾祐元年三月丙辰史弘肈起復加兼侍中矦益家富於財厚賂執政及史弘肈等由是大臣爭譽之丙寅以益兼中書令行開封尹改廣晉府爲大名府晉昌軍爲永興軍矦益盛毀王景崇於朝言其恣横景崇聞益尹開封知事已變内不自安且怨朝廷㑹詔遣供奉官王益如鳯翔徴趙匡贊牙兵詣闕趙思綰等甚懼景崇因以言激之思綰途中謂其黨常彦卿曰小太尉巳落其手吾屬至京師并死矣柰何彦卿曰臨機制變子勿復言癸酉至長安永興節度副使安友規廵檢喬守温出迎王益置酒於客亭思綰前白曰壕寨使巳定舎館於城東今將士家屬皆在城中欲各入城挈家詣城東宿友規等然之時思綰等皆無鎧仗旣入西門有州校坐門側思綰遽奪其劒斬之其徒因大譟持白挺殺守門者十餘人分遣其黨守諸門思綰入府開庫取鎧仗給之友規等皆逃去思綰遂據城集城中少年得四千餘人繕城隍葺樓堞旬日間戰守之具皆僃王景崇諷鳯翔吏民表景崇知軍府事朝廷患之甲戌徙靜難節度使王守恩爲永興節度使徙保義節度使趙暉爲鳯翔節度使並同平章事以景崇爲邠州留後令便道之官虢州伶人靖邊庭殺團練使田令方驅掠州民奔趙思綰至潼􅀜潼􅀜守將出擊之其衆皆潰􅀄契丹主北歸至定州以義武節度副使耶律忠爲節度使徙故節度使孫方簡爲大同節度使方簡怨恚且懼入朝爲契丹所留遷延不受命帥其黨三千人保狼山故寨控守要害契丹攻之不克未幾遣使請降帝復其舊官以扞契丹邪律忠聞鄴都旣平常懼華人爲變詔以成德留後劉在明爲幽州道馬歩都部署使出兵經略定州未行忠與麻荅等焚掠定州悉驅其人弃城北去孫方簡自狼山帥其衆數百還據定州又奏以弟行友爲易州刺史方遇爲泰州刺史毎契丹入寇兄弟奔命契丹頗畏之於是晉末州縣䧟契丹者皆復爲漢有矣丙子以劉在明爲成德節度使麻荅至其國契丹主責以失守麻荅不服曰因朝廷徴漢官致亂耳契丹主鴆殺之蘇逢吉等爲相多遷􅀘官吏楊邠以爲虚費國用所奏多抑之逢吉等不恱中書侍郎兼户部尚書同平章事李濤上䟽言今關西紛擾外禦爲急二樞密皆佐命功臣官雖貴而家未冨宜授以要害大鎮樞機之務在陛下目前易以裁決逢吉禹珪自先帝時任事皆可委也楊邠郭威聞之見太后泣訴稱臣等從先帝起艱難中今天子取人言欲弃之於外況􅀜西方有事臣等何忍自取安逸不顧社稷若臣等必不任職乞留過山陵太后怒以讓帝曰國家勲舊之臣奈何聽人言而逐之帝曰此宰相所言也因詰責宰相濤曰此䟽臣獨爲之它人無預丁丑罷濤政事勒歸私第是日邠涇同華四鎭俱上言護國節度使兼中書令李守貞與永興鳯翔同反始守貞聞杜重威死而懼隂有異志自以晉丗嘗爲上將有戰功素好施得士卒心漢室新造天子年少初立執政皆後進有輕朝廷之志乃招納亡命養死士治城塹繕甲兵晝夜不息遣人間道齎蠟丸結契丹屢爲邊吏所獲浚儀人趙修已素善術數自守貞鎭滑州署司户參軍累從移鎮爲守貞言時命不可勿妄動前後切諫非一守貞不聽乃稱疾歸郷里僧揔倫以術媚守貞言其必爲天子守貞信之又嘗㑹將佐置酒引弓指䑛掌虎圖曰吾有非常之福當中其舌一發中之左右皆賀守貞益自負㑹趙思綰據長安奉表獻御衣於守貞守貞自謂天人恊契乃自稱秦王遣其驍將平陸王繼勲將兵據潼􅀜以思綰爲晉昌節度使同州距河中最近匡國節度使張彦威常詗守貞所爲奏請先爲之僃詔滑州馬軍都指揮使羅金山將部兵戍同州故守貞起兵同州不爲所併金山雲州人也定難節度使李彛殷發兵屯境上奏稱去三載前羌族㖡母殺綏州刺史李仁􅁉叛去請討之慶州上言請益兵爲僃詔以司天言今歲不利先舉兵諭止之夏四月辛巳陜州都􅁥王玉奏克復潼􅀜帝與左右謀以太后怒李濤離間欲更進用二樞密以明非帝意左右亦疾二蘇之專欲奪其權共勸之壬午制以樞密使楊邠爲中書侍郎兼吏部尚書同平章事樞密使如故以副樞密使郭威爲樞密使又加三司使王章同平章事凡中書除官諸司奏事帝皆委邠斟酌自是三相拱手政事盡決於邠事有未更邠所可否者莫敢施行遂成凝滯三相每進擬用人茍不出邠意雖簿尉亦不之與邠素不喜書生常言國家府廪實甲兵彊乃爲急務至於文章禮樂何足介意旣恨二蘇排已又以其除官太濫爲衆所非欲矯其弊由是艱於除拜士大夫往往有自漢興至亡不霑一命者凡門䕃及百司入仕悉罷之雖由邠之愚蔽時人亦咎二蘇之不公所致云以鎭寕節度使郭從義充永興行營都部署將侍衞兵討趙思綰戊子以保義節度使白文珂爲河中行營都部署内客省使王峻爲都􅁥辛卯削奪李守貞官爵命文珂等㑹兵討之乙未以寕江節度使侍衞歩軍都指揮使尚洪遷爲西面行營都虞候王景崇遷延不之邠州閱集鳯翔丁壯詐言討趙思綰仍牒邠州㑹兵契丹主如遼陽故􅀳主與太后皇后皆謁見有禪奴利者契丹主之妻兄也聞晉主有女未嫁詣晉主求之晉主辭以㓜後數日契丹主使人馳取其女而去以賜襌奴王景崇遺蜀鳯州刺史徐彦書求通互市壬戌蜀主使彦復書招之契丹主留晉翰林學士徐台符於幽州台符逃歸五月乙亥滑州言河決魚池六月戊寅朔日有食之辛巳以奉國左廂都虞候劉詞充河中行營馬歩都虞候乙酉王景崇遣使請降于蜀亦受李守貞官爵髙從誨旣與漢絶北方商旅不至境内貧乏乃遣使上表謝罪乞修職貢詔遣使慰撫之西面行營都虞候尚洪遷攻長安傷重而卒秋七月以工部侍郎李榖充西南面行營都轉運使庚申加樞密使郭威同平章事蜀司空兼中書侍郎同平章事張業性豪侈强市人田宅藏匿亡命於私第置獄繫負債者或歷年至有瘐死者其子檢校左僕射繼昭好擊劒嘗與僧歸信訪善劒者右匡聖都指揮使孫漢韶與業有􅂩密告業繼昭謀反翰林承旨李昊奉聖控鶴馬歩都指揮使安思謙復從而􅉲之甲子業入朝蜀主命壯士就都堂擊殺之下詔暴其罪惡籍没其家樞密使保寜節度使兼侍中王處回亦專權貪縱賣官鬻獄四方饋獻皆先輸處回次及内府家貲巨萬子德鈞亦驕横張業旣死蜀主不忍殺處回聽歸私第處回惶恐辭位以爲武德節度使兼中書令蜀主欲以普豐庫使髙延昭茶酒庫使王昭逺爲樞密使以其名位素輕乃授通奏使知樞密院事昭逺成都人㓜以僧童從其師入府蜀髙祖愛其敏慧令給事蜀主左右至是委以機務府庫金帛恣其取與不復㑹計戊辰以郭從義爲永興節度使白文珂兼知河中行府事蜀主以翰林承旨尚書左丞李昊爲門下侍郎兼户部尚書翰林學士兵部侍郎徐光􅄎爲中書侍郎兼禮部尚書並同平章事蜀安思謙謀盡去舊將又譛衛聖都指揮使兼中書令趙廷隱謀反欲代其位夜發兵圍其第㑹山南西道節度使李廷珪入朝極言廷隱無罪乃得免廷隱因稱疾固請解軍職甲戊蜀主許之鳯翔節度使趙暉至長安乙亥表王景崇反狀益明請進兵擊之初髙祖鎭河東皇弟崇爲馬歩都指揮使與蕃漢都孔目官郭威爭權有􅂩及威執政崇憂之節度判官鄭珙勸崇爲自全計崇然之珙青州人也八月庚辰崇表募兵四指揮自是選募勇士招納亡命繕甲兵實府庫罷上供財賦皆以僃契丹爲名朝廷詔令多不禀承自河中永興鳯翔三鎭拒命以來朝廷繼遣諸將討之昭義節度使常思屯潼􅀜白文珂屯同州趙暉屯咸陽惟郭從義王峻置柵近長安而二人相惡如水火自春徂秋皆相持莫肯攻戰帝患之欲遣重臣臨督壬午以郭威爲西面軍前招慰安撫使諸軍皆受威節度威將行問䇿於太師馮道道曰守貞自謂舊將爲士卒所附願公勿愛官物以賜士卒則奪其所恃矣威從之由是衆心始附於威詔白文珂趣河中趙暉趣鳯翔甲申蜀主以趙廷隱爲太􅀓賜爵宋王國有大事就第問之戊子蜀改鳯翔曰岐陽軍己丑以王景崇爲岐陽節度使同平章事乙未以錢弘俶爲東南兵馬都元帥鎮海鎭東節度使兼中書令呉越國王郭威與諸將議攻討諸將欲先取長安鳯翔鎭國節度使扈彦珂曰今三叛連衡推守貞爲主守貞亡則兩鎭自破矣若捨近而攻逺萬一王趙拒吾前守貞掎吾後此危道也威善之於是威自陜州白文珂及寧江節度使侍衞歩軍都指揮使劉詞自同州常思自潼􅀜三道攻河中威撫養士卒與同苦樂小有功􅂺厚賞之微有傷常親視之士無賢不肖有所陳啓皆温辭色而受之違忤不怒小過不責由是將卒咸歸心於威始李守貞以禁軍皆嘗在麾下受其恩施又士卒素驕苦漢法之嚴謂其至則叩城奉迎可坐而待之旣而士卒新受賜於郭威皆忘守貞舊恩己亥至城下􅀭旗伐鼔踊躍詬譟守貞視之失色白文珂克西􅀜城柵於河西常思柵於城南威柵於城西未幾威以常思無將領才先遣歸鎭諸將欲急攻城威曰守貞前朝􅀫將徤􅃲好施屢立戰功況城臨大河樓堞完固未易輕也且彼慿城而􅃲吾仰而攻之何異帥士卒投湯火乎夫勇有盛衰攻有緩急時有可否事有後先不若且設長圍而守之使飛走路絶吾洗兵牧馬坐食轉輸温飽有餘俟城中無食公帑家財皆竭然後進梯衝以逼之飛書檄以招之彼之將士脫身逃死父子且不相保況烏合之衆乎思綰景崇但分兵縻之不足慮也乃發諸州民夫二萬餘人使白文珂等帥之刳長壕築連城列隊伍而圍之威又謂諸將曰守貞曏畏髙祖不敢鴟張以我軰崛起太原事功未著有輕我心故敢反耳正宜静以制之乃偃旗卧鼔但循河設火鋪連延數十里畨歩卒以守之遣水軍檥舟於岸寇有濳往來者無不擒之於是守貞如坐網中矣蜀武徳節度使兼中書令王處回請老辛丑以太子太􅀓致仕南漢主遣知制誥宣化鍾􅁢章求昬於楚楚王希廣不許南漢主怒問允章馬公復能經略南土乎對曰馬氏兄弟方爭亡於不暇安能害我南漢主曰然希廣懦而吝嗇其士卒忘戰日乆此乃吾進取之秋也武平節度使馬希萼請與楚王希廣各修職貢求朝廷别加官爵希廣用天䇿府内都押牙歐弘練進奏官張仲荀謀厚賂執政使拒其請九月壬子賜希萼及楚王希廣詔書諭以兄弟宜相輯睦凡希萼所貢當附希廣以聞希萼不從蜀兵援王景崇軍于散􅀜趙暉遣都􅁥李彦從襲擊破之蜀兵遁去蜀主以張業王處回執政事多壅蔽己未始置匭函後改爲獻納函王景崇盡殺矦益家屬七十餘人益子前天平行軍司馬仁矩先在外得免庚申以仁矩爲隰州剌史仁矩子延廣尚在襁褓乳母劉氏以已子易之抱延廣而逃乞食至于大梁歸于益家李守貞屢出兵欲突長圍皆敗而返遣人齎蠟丸求救於唐蜀契丹皆爲邏者所獲城中食且盡殍死者日衆守貞憂形於色召揔倫詰之揔倫曰大王當爲天子人不能奪但此分野有災待磨滅將盡只餘一人一􅀐乃大王鵲起之時也守貞猶以爲然冬十月王景崇遣其子徳讓趙思綰遣其子懐乂見蜀主于成都戊寅景崇遣兵出西門趙暉擊破之遂取西􅀜城景崇退守大城暉塹而圍之數挑戰不出暉潜遣千餘人擐甲執兵効蜀旗幟循南山而下令諸軍聲言蜀兵至矣景崇果遣兵數千出迎之暉設伏掩擊盡殪之自是景崇不復敢出蜀主遣山南西道節度使安思謙將兵救鳯翔左僕射兼門下侍􅀰同平章事母昭裔上䟽諌曰臣竊見莊宗皇帝志貪西顧前蜀主意欲北行凡在庭臣皆貢諌䟽殊無聽納有何所成只此兩朝可爲鑒誡不聽又遣雄武節度使韓保貞引兵出汧陽以分漢兵之勢王景崇遣前義成節度使酸􅀥李彦舜等逆蜀兵丙申安思謙屯右界漢兵屯寳雞思謙遣眉州剌史申貴將兵二千趣模壁設伏於竹林丁酉旦貴以兵數百壓寳雞而陳漢兵逐之遇伏而敗蜀兵逐北破寶雞寨蜀兵去漢兵復入寳雞己亥思謙進屯渭水漢益兵五千戍寳雞思謙畏之謂衆曰糧少敵彊宜更爲後圖辛丑退屯鳯州尋歸興元貴潞州人也荆南節度使兼中書令南平文獻王髙從誨寢疾以其子節度副使保融判內外兵馬事癸卯從誨卒保融知留後彰武節度使髙允權與定難節度使李彞殷有􅂩李守貞密求援於彞殷發兵屯延丹境上聞官軍圍河中乃退甲辰允權以其狀聞彞殷亦自訴朝廷和解之初髙祖入大梁太師馮道太子太􅀓李崧皆在眞定髙祖以道第賜蘇禹珪崧第賜蘇逢吉崧第中瘞藏之物及洛陽别業逢吉盡有之及崧歸朝自以形迹􅀌危事漢權臣常􅅥惕謙謹多稱疾杜門而二弟嶼㠖與逢吉子弟俱爲朝士時乗酒出怨言云奪我居第家貲逢吉由是惡之未幾崧以兩京宅劵獻於逢吉逢吉愈不恱翰林學士陶榖先爲崧所引用復從而􅉲之漢法旣嚴而侍衞都指揮使史弘肈尤殘忍寵任孔目官解暉凡入軍獄者使之隨意鍜鍊無不自誣及三叛連兵羣情震動民間或訛言相驚駭弘肈掌部禁兵廵邏京城得罪人不問情輕重於法何如皆專殺不請或決口斷舌斮筋折脛無虚日雖姧盗屏跡而冤死者甚衆莫敢辨訴李嶼僕夫葛延遇爲嶼販鬻多所欺匿嶼抶之督其負甚急延遇與蘇逢吉之僕李澄謀上變告嶼謀反逢吉聞而誘致之因召崧至第收送侍衛獄嶼自誣云與兄崧弟㠖甥王凝及家僮合二十人謀因山陵發引縱火焚京城作亂又遣人以蠟書入河中城結李守貞又遣人召契丹兵及具獄上逢吉取筆改二十爲五十字十一月甲寅下詔誅崧兄弟家屬及辭所連及者皆陳尸於市仍厚賞葛延遇等時人無不寃之自是士民家皆畏憚僕􅊢往往爲所脅制它日祕書郎眞定李昉詣陶榖榖曰君於李侍中近逺昉曰族叔父榖曰李氏之禍榖有力焉昉聞之汗出榖邠州人也本姓唐避晉髙祖諱改焉史弘肈尤惡文士常曰此屬輕人難耐每謂吾軰爲卒弘肈領歸德節度使委親吏楊乙收屬府公利乙依勢驕横合境畏之如弘肇副使以下望風展敬乙皆下視之月率錢萬緡以輸弘肈部民不勝其苦􅀄沈丘人舒元嵩山道士楊訥俱以遊客干李守貞守貞爲漢所攻遣元更姓朱訥更姓李名平間道奉表求救於唐唐諫議大夫查文徽兵部侍郎魏岑請出兵應之唐主命北面行營招討使李金全將兵救河中以清淮節度使劉彦貞副之文徽爲􅁥軍使岑爲㳂淮廵檢使軍于沂州之境金全與諸將方㑹食候􅀐白有漢兵數百在澗北皆羸弱請掩之金全令曰敢言過澗者斬及暮伏兵四起金皷聞十餘里金全曰曏可與之戰乎時唐士卒厭兵莫有􅃲志又河中道逺勢不相及丙寅唐兵退保海州唐主遺帝書謝請復通商旅且請赦守貞朝廷不報壬申葬睿文聖武昭肅孝皇帝于睿陵廟號髙祖十二月丁丑以髙保融爲荆南節度使同平章事辛巳南漢主以內常侍呉懐恩爲開府儀同三司西北面招討使將兵擊楚攻賀州楚王希廣遣決勝指揮使徐知新等將兵五千救之未至南漢人已拔賀州鑿大穽於城外覆以竹箔加土下施機軸自塹中穿􅔙通穽中知新等至引兵攻城南漢遣人自穴中發機楚兵悉陷南漢出兵從而擊之楚兵死者以千數知新等遁歸希廣斬之南漢兵復陷昭州王景崇累表告急於蜀蜀主命安思謙再出兵救之壬午思謙自興元引兵屯鳯州請先運糧四十萬斛乃可出境蜀王曰觀思謙之意安肯爲朕進取然亦發興州興元米數萬斛以饋之戊子思謙進屯散關遣馬歩使髙彦儔眉州刺史申貴擊漢箭筈安都寨破之庚寅思謙敗漢兵於玉女潭漢兵退屯寳雞思謙進屯模壁韓保貞出新關壬辰軍于隴州神前漢兵不出保貞亦不敢進趙暉告急於郭威威自往赴之時李守貞遣副使周光遜禆將王繼勲聶知遇守城西威戒白文珂劉詞曰賊茍不能突圍終爲我擒萬一得出則吾不得復留於此成敗之機於是乎在賊之驍銳盡在城西我去必來突圍爾曹謹備之威至華州聞蜀兵食盡引去威乃還韓保貞聞安思謙去亦退保弓川寨蜀中書侍郎兼禮部尚書同平章事徐光􅄎坐以豔辭挑前蜀安康長公主丁酉罷守本官隱皇帝上乾祐二年春正月乙巳朔大赦郭威將至河中白文珂出迎之戊申夜李守貞遣王繼勲等引精兵千餘人循河而南襲漢柵坎岸而登遂入之縱火大譟軍中狼狽不知所爲劉詞神色自若下令曰小盜不足驚也帥衆擊之客省使閻晉卿曰賊甲皆黄紙爲火所照易辨耳柰衆無􅃲志何禆將李韜曰安有無事食君禄有急不死􅃲者邪援矟先進衆從之河中兵退走死者七百人繼勲重傷僅以身免己酉郭威至劉詞迎馬首請罪威厚賞之曰吾所憂正在於此微兄健􅃲幾爲虜嗤然虜伎殫於此矣晉卿忻州人也守貞之欲攻河西柵也先遣人出酤酒於村墅或貰與不責其直邏􅀐多醉由是河中兵得潜行入寨幾至不守郭威乃下令將士非犒宴毋得私飲愛將李審晨飲少酒威怒曰汝爲吾帳下首違軍令何以齊衆立斬以徇甲寅蜀安思謙退屯鳯州上表待罪蜀主釋不問詔以靜州􅊢定難軍二月辛未李彞殷上表謝彞殷以中原多故有輕傲之志每藩鎭有叛者常隂助之邀其重賂朝廷知其事亦以恩澤羈縻之淮北羣盜多請命於唐唐主遣神衛都虞候皇甫暉等將兵萬人出海泗以招納之蒙城鎭將咸師朗等降於暉徐州將成德欽敗唐兵于峒峿鎭俘斬六百級暉等引歸晉李太后詣契丹主請依漢人城寨之側給田以耕桑自贍契丹主許之并晉主遷於建州未至安大妃卒於路遺令必焚我骨南向颺之庶幾魂魄歸逹於漢旣至建州得田五十餘頃晉主令從者耕其中以給食頃之述律王遣􅀐取晉主寵􅁎趙氏聶氏而去述律王者契丹主德光之子也三月己未以歸德牙內指揮使史德珫領忠州刺史德珫弘肈之子也頗讀書常不樂父之所爲有舉人呼譟於貢院門蘇逢吉命執送侍衛司欲其痛箠而黥之德珫言於父曰書生無禮自有臺府治之非軍務也此乃公卿欲彰大人之過耳弘肈大然之即破械遣之楚將徐進敗蠻于風陽山斬首五千級夏四月壬午太白晝見民有仰視之者爲邏卒所執史弘肈􅆎斬之河中城中食且盡民餓死者什五六癸卯李守貞出兵五千餘人齎梯橋分五道以攻長圍之西北隅郭威遣都􅁥呉䖍􅁉引兵横擊之河中兵敗走殺傷太半奪其攻具五月丙午守貞復出兵又敗之擒其將魏延朗鄭賔壬子周光遜王繼勲聶知遇帥其衆千餘人來降守貞將士降者相繼威乗其離散庚申督諸軍百道攻之趙思綰好食人肝嘗面剖而膾之膾盡人猶未死又好以酒吞人膽謂人曰吞此千枚則膽無敵矣及長安城中食盡取婦女幼稚爲軍糧日計數而給之毎犒軍輒屠數百人如羊豕法思綰計窮不知所出郭從義使人誘之􅀄思綰少時求爲左驍衞上將軍致仕李肅僕肅不納曰是人目亂而語誕它日必爲叛臣肅妻張氏全義之女也曰君今拒之後且爲患乃厚以金帛遺之及思綰據長安肅閑居在城中思綰數就見之拜伏如故禮肅曰是子亟來且汙我欲自殺妻曰曷若勸之歸國㑹思綰問自全之計肅乃與判官程讓能􅀃思綰曰公本與國家無嫌但懼罪耳今國家三道用兵俱未有功若以此時翻然改圖朝廷必喜自可不失富貴孰與坐而待斃乎思綰從之遣使詣闕請降乙丑以思綰爲華州留後都指揮使常彦卿爲虢州刺史令便道之官呉越內牙都指揮使鈄滔胡進思之黨也或告其謀叛辭連丞相弘億呉越王弘俶不欲窮治貶滔于處州六月癸酉朔日有食之秋七月甲辰趙思綰釋甲出城受詔郭從義以兵守其南門復遣還城思綰求其牙兵及鎧仗從義亦給之思綰遷延收斂財賄三改行期從義等疑之密白郭威請圖之威許之壬子從義與都􅁥南院宣徽使王峻按轡入城處于府舎召思綰酌别因執之并常彦卿及其父兄部曲三百人皆斬於市甲寅郭威攻河中克其外郭李守貞收餘衆退保子城諸將請急攻之威曰夫鳥窮則啄況一軍乎涸水取魚安用急爲壬戌李守貞與妻及子崇勲等自焚威入城獲其子崇玉等及所署宰相靖孫愿樞密使劉芮國師揔倫等送大梁磔於市徴趙脩已爲翰林天文威閱守貞文書得朝廷權臣乃藩鎭與守貞交通書詞意悖逆欲奏之祕書郎榆次王溥諌曰魑魅乗夜争出見日自消願一切焚之以安反仄威從之三叛旣平帝浸驕縱與左右狎暱飛龍使瑕丘後匡贊茶酒使太原郭允明以謟媚得幸帝好與之爲廋辭醜語太后屢戒之帝不以爲意癸亥太常卿張昭上言宜親近儒臣講習經訓不聽昭即昭逺避髙祖諱改之戊辰加永興節度使郭從義同平章事徙鎭國節度使扈彦珂爲護國節度使以河中行營馬歩都虞候劉詞爲鎭國節度使唐主復進用魏岑吏部郎中㑹稽鍾謨尚書貟外郎李德明始以辯慧得幸參預國政二人皆恃恩輕躁雖不與岑爲黨而國人皆惡之户部員外郎范沖敏性狷介乃教天威都虞候王建封上書歷詆用事者請進用正人唐主謂建封武臣典兵不當干預國政大怒流建封於池州未至殺之沖敏弃市唐主聞河中破以朱元爲駕部貟外郎待詔文理院李平爲尚書貟外郎呉越王弘俶以丞相弘億判明州西京留守同平章事王守恩性貪鄙專事聚斂䘮車非輸錢不得出城下至抒厠行乞之人不免課率或縱麾下令盜人財有冨室娶婦守恩與俳優數人往爲賔客得銀數鋌而返八月甲申郭威自河中還過洛陽守恩自恃位兼將相肩輿出迎威怒以爲慢已辭以浴不見即以頭子命保義節度使同平章事白文珂代守恩爲留守文珂不敢違守恩猶坐客次吏白新留守已視事於府矣守恩大驚狼狽而歸見家屬數百已逐出府在通衢矣朝廷不之問以文珂兼侍中充西京留守歐陽脩論曰自古亂亡之國必先壊其法制而後亂從之此􅀔之然也五代之際是已文珂守恩皆漢大臣而周太祖以一樞宻使頭子而易置之如更戍卒是時太祖未有無君之志而所爲如此者蓋習爲常事故文珂不敢違守恩不敢拒太祖旣處之不疑而漢廷君臣亦置而不問豈非綱紀壊亂之極而至於此歟是以善爲天下慮者不敢忽於微而常杜其漸也可不戒哉守恩至大梁恐獲罪廣爲貢獻重賂權貴朝廷亦以守恩首舉潞州歸漢故宥之但誅其用事者數人而已馬希萼悉調朗州丁壯爲郷兵造號静江軍作戰艦七百艘將攻潭州其妻苑氏諌曰兄弟相攻勝􅀒皆爲人笑不聽引兵趣長沙馬希廣聞之曰朗州吾兄也不可與爭當以國讓之而已劉彦瑫李弘臯等固爭以爲不可乃以岳州刺史王贇爲都部署戰棹指揮使以彦瑫􅁥其軍己丑大破希萼於僕射洲獲其戰艦三百艘贇追希萼將及之希廣遣使召之曰勿傷吾兄贇引兵還贇環之子也希萼自赤沙湖乗輕舟遁歸苑氏泣曰禍將至矣余不忍見也赴井而死戊戌郭威至大梁入見帝勞之賜金帛衣服玉帶鞍馬辭曰臣受命期年僅克一城何功之有且臣將兵在外凡鎮安京師供億所湏使兵食不乏皆諸大臣居中者之力也臣安敢獨膺此賜請徧賞之又議加領方鎮辭曰楊邠位在臣上未有茅土且帷幄之臣不可以弘肈爲比九月壬寅徧賜宰相樞宻宣徽三司侍衛使九人與威如一帝欲特賞威辭曰運籌建畫出於廟堂發兵饋糧資於藩鎮􅁀露戰闘在於將士而功獨歸臣臣何以堪之乙巳加威兼侍中史弘肈兼中書令辛亥加竇貞固司徒蘇逢吉司空蘇禹珪左僕射楊邠右僕射諸大臣議以朝廷執政􅄎加恩恐藩鎮觖望乙夘加天雄節度使髙行周守太師山南東道節度使安審􅄾守太􅀓泰寜節度使符彦卿守太保河東節度使劉崇兼中書令己未加忠武節度使劉信天平節度使慕容彦超平盧節度使劉銖並兼侍中辛酉加朔方節度使馮暉定難節度使李彞殷兼中書令冬十月壬申加義武節度使孫方簡武寕節度使劉贇同平章事壬午加呉越王弘俶尚書令楚王希廣太尉丙戌加荆南節度使髙保融兼侍中議者以郭威不專有其功推以分人信爲美矣而國家爵位以一人立功而覃及天下不亦濫乎呉越王弘俶募民能墾荒田者勿收其稅由是境內無弃田或請糾民遺丁以増賦仍自掌其事弘俶杖之國門國人皆恱楚静江節度使馬希瞻以兄希萼希廣交爭屢遣使諌止不從知終覆族疽發于背丁亥卒契丹寇河北所過殺掠節度使刺史各嬰城自守遊􅀐至貝州及鄴都之北境帝憂之己丑遣樞密使郭威督諸將禦之以宣徽使王峻􅁥其軍十一月契丹聞漢兵度河乃引去辛亥郭威軍至鄴都令王峻分軍趣鎭定戊午威至邢州唐兵度淮攻正陽十二月潁州將白福進擊敗之楊邠爲政苛細初邢州人周璨爲諸衞將軍罷秩無依從王景崇西征景崇叛遂爲之謀主邠奏諸前資官喜揺動藩臣宜悉遣詣京師旣而四方雲集日遮宰相馬求官辛卯邠復奏前資官宜分居兩京以俟有闕而􅀘之漂泊失所者甚衆邠又奏行道往來者皆給過所旣而官司填咽民情大擾乃止趙暉急攻鳯翔周璨謂王景崇曰公曏與蒲雍相表裏今二鎭已平蜀兒不足恃不如降也景崇曰善吾更思之後數日外攻轉急景崇謂其黨曰事窮矣吾欲爲急計乃謂其將公孫輦張思練曰趙暉精兵多在城北來日五鼔前爾二人燒城東門詐降勿令寇入吾與周璨以牙兵出北門突暉軍縱無成而死猶勝束手皆曰善癸巳未明輦思練燒東門請降府牙火亦發二將遣人詗之景崇已與家人自焚矣璨亦降丁酉密州刺史王萬敢擊唐海州荻水鎭殘之是月南漢主如英州是歳唐泉州刺史留從效兄南州副使從願酖刺史董思安而代之唐主不能制置清源軍於泉州以從效爲節度使資治通鑑卷第二百八十八
