seq: 41
front:
  text: 赤眉陽敗棄輜重走車皆載土以豆覆其上兵士飢爭取之赤眉引還擊􅀪􅀪軍潰亂異與禹合兵救之赤眉小卻異以士卒飢倦可且休禹不聽復戰大爲所敗死傷者三千餘人禹以二十四騎脫歸宜陽異棄馬奔走上回谿阪與麾下數人歸營收其散卒復堅壁自守辛巳立四親廟於雒陽祀父南頓君以上至舂陵節矦
  hash: sha256:cf016a7bf4a6b9f06280b3088c838e5ddd1357d2e9f4639a190b7297a16d5223
body:
  text: 壬午大赦閏月乙巳鄧禹上大司徒梁矦印綬詔還梁矦印綬以爲右將軍馮異與赤眉約期㑹戰使壯士變服與赤眉同伏於道側旦日赤眉使萬人攻異前部異少出兵以救之賊見埶弱遂悉衆攻異異乃縦兵大戰日昊賊氣衰伏兵卒起衣服相亂赤眉不復識别衆遂驚潰追擊大破之於崤底降男女八萬人帝降璽書勞異曰始雖垂翅回谿終能奮翼澠池可謂失之東隅收之桑榆方論功賞以荅大勲赤眉餘衆東向宜陽甲辰帝親勒六軍嚴陳以待之赤眉忽遇大軍驚震不知所謂乃遣劉恭乞降曰盆子將百萬衆降陛下何以待之帝曰待汝以不死耳丙午盆子及丞相徐宣以下三十餘人肉袒降上所得傳國璽綬積兵甲宜陽城西與熊耳山齊赤眉衆尚十餘萬人帝令縣厨皆賜食明旦大陳兵馬臨雒水令盆子君臣列而觀之帝謂樊崇等曰得無悔降乎朕今遣卿歸營勒兵鳴鼔相攻決其勝負不欲彊相服也徐宣等叩頭曰臣等出長安東都門君臣計議歸命聖徳百姓可與樂成難與圗始故不告衆耳今日得降猶去虎口歸慈母誠歡誠喜無所恨也帝曰卿所謂鐵中錚錚傭中佼佼者也戊申還自宜陽帝令樊崇等各與妻子居雒陽賜之田宅其後樊崇逢安反誅楊音徐宣卒於鄉里帝憐盆子以為趙王郎中後病失明賜滎陽均輸官地使食其税終身劉恭為更始報仇殺謝禄自繫獄帝赦不誅二月劉永立董憲為海西王永聞伏隆至劇亦遣使立張歩為齊王歩貪王爵猶豫未決隆曉譬曰髙祖與天下約非劉氏不王今可得為十萬戸矦耳歩欲留隆與共守二州隆不聽求得反命歩遂執隆而受永封隆遣閒使上書曰臣隆奉使無狀受執凶逆雖在困阨授命不顧又吏民知歩反畔心不附之願以時進兵無以臣隆為念臣隆得生到闕廷受誅有司此其大願若令沒身寇手以父母昆弟長累陛下陛下與皇后太子永享萬國與天無極帝得隆奏召其父湛流涕示之曰恨不且許而遽求還也其後歩遂殺之帝方北憂漁陽南事梁楚故張歩得專集齊地據郡十二焉帝幸懐吳漢率耿弇蓋延擊青犢於軹西大破降之三月壬寅以司直伏湛為大司徒涿郡太守張豐反自稱無上大將軍與彭寵連兵朱浮以帝不自征彭寵上疏求救詔報曰往年赤眉跋扈長安吾䇿其無榖必東果來歸附今度此反虜埶無乆全其中必有内相斬者今軍資未充故須後麥耳浮城中糧盡人相食㑹耿況遣騎來救浮乃得脱身走薊城遂降於彭寵寵自稱燕王攻拔右北平上谷數縣賂遺匈奴借兵為助又南結張歩及富平獲索諸賊皆與交通帝自將征鄧奉至堵陽奉逃歸淯陽董訢降夏四月帝追奉至小長安與戰大破之奉肉袒因朱祜降帝憐奉舊功臣且釁起吳漢欲全宥之岑彭耿弇諫曰鄧奉背恩反逆㬥師經年陛下旣至不知悔善而親在行陳兵敗乃降若不誅奉無以懲惡於是斬之復朱祜位延岑旣破赤眉即拜置牧守欲據關中時關中衆宼猶盛岑據藍田王歆據下邽芳丹據新豐蔣震據霸陵張邯據長安公孫守據長陵楊周據谷口呂鮪據陳倉角閎據汧駱延據􅉦厔任良據鄠汝章據槐里各稱將軍擁兵多者萬餘人少者數千人轉相攻擊馮異且戰且行屯軍上林苑中延岑引張邯任良共攻異異擊大破之諸營保附岑者皆來降岑遂自武關走南陽時百姓饑餓黄金一斤易豆五升道路斷隔委輸不至馮異軍士悉以果實為糧詔拜南陽趙匡為右扶風將兵助異并送縑榖異兵榖漸盛乃稍誅擊豪傑不從令者襃賞降附有功勞者悉遣諸營渠帥詣京師散其衆歸本業威行關中唯呂鮪張邯蔣震遣使降蜀其餘悉平吳漢率驃騎大將軍杜茂等七將軍圍蘇茂於廣樂周建招集得十餘萬人救之漢迎與之戰不利墯馬傷䣛還營建等遂連兵入城諸將謂漢曰大敵在前而公傷卧衆心懼矣漢乃勃然裹創而起椎牛饗士慰勉之士氣自倍旦日蘇茂周建出兵圍漢漢奮擊大破之茂走還湖陵睢陽人反城迎劉永蓋延率諸將圍之呉漢留杜茂陳俊守廣樂自將兵助延圍睢陽車駕自小長安引還令岑彭率傅俊臧宫劉宏等三萬餘人南擊秦豐五月己酉車駕還宫乙卯晦日有食之六月壬戌大赦延岑攻南陽得數城建威大將軍耿弇與戰於穰大破之岑與數騎走東陽與秦豐合豐以女妻之建義大將軍朱祜率􅀕遵等與岑戰於東陽破之岑走歸秦豐祜遂南與岑彭等軍合延岑䕶軍鄧仲況擁兵據隂縣而劉歆孫龔為其謀主前侍中扶風蘇竟以書説之仲況與龔降竟終不伐其功隠身樂道夀終於家秦豐拒岑彭於鄧秋七月彭擊破之進圍豐於黎丘别遣積弩將軍傅俊將兵徇江東揚州悉定蓋延圍睢陽百日劉永蘇茂周建突出將走鄼延追擊之急永將慶吾斬永首降蘇茂周建犇垂惠共立永子紆為梁王佼彊犇保西防冬十月壬申上幸舂陵祠園廟耿弇從容言於帝自請北收上谷兵未發者定彭寵於漁陽取張豐於涿郡還收富平􅀗索東攻張步以平齊地帝壯其意許之十一月乙未帝還自舂陵是嵗李憲稱帝置百官擁九城衆十餘萬帝謂太中大夫來歙曰今西州未附子陽稱帝道里阻逺諸將方務關東思西州方略未知所在柰何歙曰臣嘗與隗囂相遇長安其人始起以漢為名臣願得奉威命開以丹青之信囂必束手自歸則述自亡之埶不足圗也帝然之始令歙使於囂囂旣有功於漢又受鄧禹爵署其腹心議者多勸通使京師囂乃奉奏詣闕帝報以殊禮言稱字用敵國之儀所以慰藉之甚厚四年正月甲申大赦二月壬子上行幸懐壬申還雒陽延岑復宼順陽遣鄧禹將兵擊破之岑犇漢中公孫述以岑為大司馬封汝寧王田戎聞秦豐破恐懼欲降其妻兄辛臣圖彭寵張歩董憲公孫述等所得郡國以示戎曰雒陽地如掌耳不如且按甲以觀其變戎曰以秦王之彊猶爲征南所圍吾降決矣乃留辛臣使守夷陵自將兵㳂江泝沔止黎丘辛臣於後盜戎珍寳從閒道先降於岑彭而以書招戎曰宜以時降無拘前計戎疑臣賣已灼龜卜降兆中坼遂復反與秦豐合岑彭擊破之戎亡歸夷陵夏四月丁巳上行幸鄴己巳幸臨平遣吳漢陳俊王梁擊破五校於臨平鬲縣五姓共逐守長據城而反諸將爭欲攻之呉漢曰使鬲反者守長罪也敢輕冒進兵者斬乃移檄告郡使收守長而使人謝城中五姓大喜即相率降諸將乃服曰不戰而下城非衆所及也五月上幸元氏辛巳幸盧奴將親征彭寵伏湛諫曰今兖豫青冀中國之都而宼賊從横未及從化漁陽邊外荒耗豈足先圗陛下捨近務遠棄易求難誠臣之所惑也上乃還帝遣建議大將軍朱祜建威大將軍耿弇征虜將軍祭遵驍騎將軍劉喜討張豐於涿郡祭遵先至急攻豐禽之初豐好方術有道士言豐當為天子以五綵囊裹石繫豐肘云石中有玉璽豐信之遂反旣執當斬猶曰肘石有玉璽傍人為椎破之豐乃知被詐仰天歎曰當死無恨上詔耿弇進擊彭寵弇以父况與寵同功又兄弟無在京師者不敢獨進求詣雒陽詔報曰將軍舉宗為國功效尤著何嫌何疑而欲求徴况聞之更遣弇弟國入侍時祭遵屯良鄉劉喜屯陽鄉彭寵引匈奴兵欲擊之耿况使其子舒襲破匈奴兵斬兩王寵乃退走六月辛亥車駕還宫秋七月丁亥上幸譙遣捕虜將軍馬武騎都尉王霸圍劉紆周建於垂惠董憲將賁休以蘭陵降憲聞之自郯圍之蓋延及平狄將軍山陽龎萌在楚請往救之帝敕曰可直往擣郯則蘭陵自解延等以賁休城危遂先赴之憲逆戰而陽敗退延等因拔圍入城明日憲大出兵合圍延等懼遽出突走因往攻郯帝讓之曰間欲先赴郯者以其不意故耳今旣犇走賊計已立圍豈可解乎延等至郯果不能克而董憲遂㧞蘭陵殺賁休八月戊午上幸夀春遣揚武將軍南陽馬成率誅虜將軍南陽劉隆等三將軍發㑹稽丹陽九江六安四郡兵擊李憲九月圍憲於舒王莽末天下亂臨淮大尹河南矦霸獨能保全其郡帝徴霸㑹夀春拜尚書令時朝廷無故典又少舊臣霸明習故事收録遺文條奏前世善政灋度施行之冬十月甲寅車駕還宫隗囂使馬援往觀公孫述援素與述同里閈相善以為旣至當握手歡如平生而述盛陳陛衛以延援入交拜禮畢使出就館更為援制都布單衣交讓冠㑹百官於宗廟中立舊交之位述鸞旗旄騎警蹕就車磬折而入禮饗官屬甚盛欲授援以封矦大將軍位賓客皆樂留援曉之曰天下雄雌未定公孫不吐哺走迎國士與圗成敗反修飾邊幅如偶人形此子何足乆稽天下士乎因辭歸謂囂曰子陽井底蛙耳而妄自尊大不如專意東方囂乃使援奉書雒陽援初到良乆中黄門引入帝在宣徳殿南廡下但幘坐迎笑謂援曰卿遨遊二帝間今見卿使人大慙援頓首辭謝因曰當今之世非但君擇臣臣亦擇君矣臣與公孫述同縣少相善臣前至蜀述陛㦸而後進臣臣今遠來陛下何知非刺客姦人而簡易若是帝復笑曰卿非刺客顧説客耳援曰天下反覆盜名字者不可勝數今見陛下恢廓大度同符髙祖乃知帝王自有眞也太傅卓茂薨十一月丙申上行幸宛岑彭攻秦豐三嵗斬首九萬餘級豐餘兵裁千人食且盡十二月丙寅帝幸黎丘遣使招豐豐不肯降乃使朱祜等代岑彭圍黎丘使岑彭傅俊南擊田戎公孫述聚兵數十萬人積粮漢中又造十層樓船多刻天下牧守印章遣將軍李育程烏將數萬衆出屯陳倉就呂鮪將徇三輔馮異迎擊大破之育烏俱犇漢中異還擊破呂鮪營保降者甚衆是時隗囂遣兵佐異有功遣使上狀帝報以手書曰慕樂徳義思相結納昔文王三分猶服事殷但駑馬鉛刀不可強扶數蒙伯樂一顧之價將軍南拒公孫之兵北御羌胡之亂是以馮異西征得以數千百人躑躅三輔㣲將軍之助則咸陽已為它人禽矣如令子陽到漢中三輔願因將軍兵馬鼔旗相當儻肯如言即智士計功割地之秋也管仲曰生我者父母成我者鮑子自今以後手書相聞勿用傍人間構之言其後公孫述數遣將間出囂輒與馮異合勢共摧挫之述遣使以大司空扶安王印綬授囂囂斬其使出兵擊之以故蜀兵不復北出泰山豪傑多與張歩連兵呉漢薦彊弩大將軍陳俊為泰山太守擊破歩兵遂定泰山五年春正月癸巳車駕還宫帝使來歙持節送馬援歸隴右隗囂與援共卧起問以東方事曰前到朝廷上引見數十每接燕語自夕至旦才明勇略非人敵也且開心見誠無所隠伏闊達多大節略與髙帝同經學博覽政事文辯前世無比囂曰卿謂何如髙帝援曰不如也髙帝無可無不可今上好吏事動如節度又不喜飲酒囂意不懌曰如卿言反復勝邪二月丙午大赦蘇茂將五校兵救周建於垂惠馬武為茂建所敗犇過王霸營大呼求救霸曰賊兵盛出必兩敗弩力而已乃閉營堅壁軍吏皆爭之霸曰茂兵精鋭其衆又多吾吏士心恐而捕虜與吾相恃兩軍不一此敗道也今閉營固守示不相援賊必乗勝輕進捕虜無救其戰自倍如此茂衆疲勞吾承其敝乃可克也茂建果悉出攻武合戰良乆霸軍中壯士數十人斷髪請戰霸乃開營後出精騎襲其背茂建前後受敵驚亂敗走霸武各歸營茂建復聚兵挑戰霸堅卧不出方饗士作倡樂茂雨射營中中霸前酒樽霸安坐不動軍吏皆曰茂前日已破今易擊也霸曰不然蘇茂客兵遠來粮食不足故數挑戰以徼一時之勝今閉營休士所謂不戰而屈人兵者也茂建旣不得戰乃引還營其夜周建兄子誦反閉城拒之建於道死茂犇下邳與董憲合劉紆犇佼彊乙丑上行幸魏郡彭寵妻數爲惡夢又多見怪變卜筮望氣者皆言兵當從中起寵以子后蘭卿質漢歸不信之使將兵居外無親於中寵齋在便室蒼頭子宻等三人因寵卧寐共縛著牀告外吏云大王齋禁皆使吏休僞稱寵命收縛奴婢各置一處又以寵命呼其妻妻入驚曰奴反奴乃捽其頭擊其頰寵急呼曰趣為諸將軍辦裝於是兩奴將妻入取寳物留一奴守寵寵謂守奴曰若小兒吾素所愛也今為子宻所廹劫耳解我縛當以女珠妻汝家中財物皆以與若小奴意欲解之視戸外見子宻聽其語遂不敢解於是收金玉衣物至寵所裝之被馬六匹使妻縫兩縑嚢昏夜後解寵手令作記告城門將軍云今遣子宻等至子后蘭卿所速開門岀勿稽留之書成斬寵及妻頭置嚢中便持記馳出城因以詣闕明旦閤門不開官屬踰牆而入見寵尸驚怖其尚書韓立等共立寵子午為王國師韓利斬午首詣祭遵降夷其宗族帝封子宻為不義􅇋權徳輿議曰伯通之叛命子宻之戕君同歸于亂罪不相蔽宜各致於灋昭示王度反乃爵於五等又以不義為名且舉以不義莫可矦也此而可矦漢爵為不足勸矣春秋書齊豹盜三叛人名之義無乃異於是乎帝以扶風郭伋為漁陽太守伋承離亂之後養民訓兵開示威信盜賊銷散匈奴遠迹在職五年户口増倍帝使光禄大夫樊宏持節迎耿況於上谷曰邊郡寒苦不足乆居况至京師賜甲第奉朝請封牟平矦呉漢率耿弇王常擊富平獲索賊於平原大破之追討餘黨至勃海降者四萬餘人上因詔弇進討張歩平敵將軍龐萌為人遜順帝信愛之常稱曰可以託六尺之孤寄百里之命者龐萌是也使與蓋延共擊董憲時詔書獨下延而不及萌萌以為延譛已自疑遂反襲延軍破之與董憲連和自號東平王屯桃鄉之北帝聞之大怒自將討萌與諸將書曰吾常以龐萌為社稷之臣將軍得無笑其言乎老賊當族其各厲兵馬㑹睢陽龐萌攻破彭城將殺楚郡太守孫萌郡吏劉平伏太守身上號泣請代其死身被七創龐萌義而捨之太守已絶復蘇渴求飲平傾創血以飲之岑彭攻拔夷陵田戎亡入蜀盡獲其妻子士衆數萬人公孫述以戎為翼江王岑彭謀伐蜀以夾川榖少水險難漕留威虜將軍馮駿軍江州都尉田鴻軍夷陵領軍李􅀇軍夷道自引兵還屯津鄉當荆州要㑹喻告諸蠻夷降者奏封其君長夏四月旱蝗隗囂問於班彪曰徃者周亡戰國並爭數世然後定意者從横之事復起於今乎將承運迭興在於一人也彪曰周之廢興與漢殊異昔周爵五等諸矦從政本根旣㣲枝葉彊大故其末流有從横之事埶數然也漢承秦制改立郡縣主有專已之威臣無百年之柄至於成帝假借外家哀平短祚國嗣三絶故王氏擅朝因竊號位危自上起傷不及下是以即眞之後天下莫不引領而歎十餘年閒中外騷擾逺近俱發假號雲合咸稱劉氏不謀同辭方今雄桀帶州域者皆無七國世業之資而百姓謳吟思漢漢必復興已可知矣囂曰生言周漢之埶可也至於但見愚人習識劉氏姓號之故而謂漢復興踈矣昔秦失其鹿劉季逐而掎之時民復知漢乎彪乃為之著王命論以風切之曰昔堯之禪舜曰天之歷數在爾躬舜亦以命禹洎于稷契咸佐唐虞至湯武而有天下劉氏承堯之祚堯據火徳而漢紹之有赤帝子之符故為鬼神所福饗天下所歸徃由是言之未見運世無本功徳不紀而得屈起在此位者也俗見髙祖興於布衣不達其故至比天下於逐鹿幸㨗而得之不知神器有命不可以智力求也悲夫此世所以多亂臣賊子者也夫餓饉流􅀠飢寒道路所願不過一金然終轉死溝壑何則貧窮亦有命也況虖天子之貴四海之富神明之祚可得而妄處哉故雖遭罹阨㑹竊其權柄勇如信布彊如梁籍成如王莽然卒潤鑊伏質亨醢分裂又况么麽尚不及數子而欲闇奸天位者虖昔陳嬰之母以嬰家世貧賤卒富貴不祥止嬰勿王王陵之母知漢王必得天下伏劔而死以固勉陵夫以匹婦之明猶能推事理之致探禍福之機而全宗祀於無窮垂䇿書於春秋而况大丈夫之事虖是故窮達有命吉凶由人嬰母知廢陵母知興審此二者帝王之分決矣加之髙祖寛明而仁恕知人善任使當食吐哺納子房之䇿拔足揮洗揖酈生之説舉韓信於行陳收陳平於亡命英雄陳力羣䇿畢舉此髙祖之大略所以成帝業也若乃靈瑞符應其事甚衆故淮隂留矦謂之天授非人力也英雄誠知覺寤超然逺覽淵然深識收陵嬰之明分絶信布之覬覦距逐鹿之瞽説審神器之有授毋貪不可兾為二母之所咲則福祚流于子孫天禄其永終矣囂不聽彪遂避地河西竇融以為從事甚禮重之彪遂為融畫策使之專意事漢焉初竇融等聞帝威徳心欲東向以河西隔逺未能自通乃從隗囂受建武正朔囂皆假其將軍印綬囂外順人望内懐異心使辯士張􅀇説融等曰更始事已成尋復亡滅此一姓不再興之効也今即有所主便相係屬一旦拘制自令失柄後有危敗雖悔無及方今豪桀競逐雌雄未決當各據土宇與隴蜀合從髙可為六國下不失尉佗融等召豪桀議之其中識者皆曰今皇帝姓名見於圗書自前世博物道術之士谷子雲夏賀良等皆言漢有再受命之符故劉子駿改易名字冀應其占及莽末西門君惠謀立子駿事覺被殺出謂觀者曰䜟文不誤劉秀眞汝主也此皆近事㬥著衆所共見者也况今稱帝者數人而雒陽土地最廣甲兵最彊號令最明觀符命而察人事它姓殆未能當也衆議或同或異融遂決䇿東向遣長史劉鈞等奉書詣雒陽先是帝亦發使遺融書以招之遇鈞於道即與俱還帝見鈞歡甚禮饗畢乃遣令還賜融璽書曰今益州有公孫子陽天水有隗將軍方蜀漢相攻權在將軍舉足左右便有輕重以此言之欲相厚豈有量哉欲遂立桓文輔㣲國當勉卒功業欲三分鼎足連衡合從亦宜以時定天下未并吾與爾絶域非相吞之國今之議者必有任囂教尉佗制七郡之計王者有分土無分民自適己事而已因授融為涼州牧璽書至河西河西皆驚以為天子明見萬里之外朱祜急攻黎丘六月秦豐窮困出降轞車送洛陽呉漢劾祜廢詔命受豐降上誅豐不罪祜董憲與劉紆蘇茂佼彊去下邳還蘭陵使茂彊助龐萌圍桃城帝時幸蒙聞之乃留輜重自將輕兵晨夜馳赴至亢父或言百官疲倦可且止宿上不聽復行十里宿任城去桃城六十里旦日諸將請進龐萌等亦勒兵挑戰帝令諸將不得出休士養鋭以挫其鋒時吳漢等在東郡馳使召之萌等驚曰數百里晨夜行以爲至當戰而堅坐任城致人城下眞不可往也乃悉兵攻桃城城中聞車駕至衆心益固萌等攻二十餘日衆疲困不能下吳漢王常蓋延王梁馬武王霸等皆至帝乃率衆軍進救桃城親自搏戰大破之龐萌蘇茂佼彊夜走從董憲秋七月丁丑帝幸沛進幸湖陵董憲與劉紆悉其兵數萬人屯昌慮憲招誘五校餘賊與之拒守建陽帝至蕃去憲所百餘里諸將請進帝不聽知五校乏食當退敕各堅壁以待其敝頃之五校果引去帝乃親臨四面攻憲三日大破之佼彊將其衆降蘇茂犇張歩憲及龐萌走保郯八月己酉帝幸郯留呉漢攻之車駕轉徇彭城下邳呉漢拔郯董憲龐萌走保朐劉紆不知所歸其軍士髙扈斬之以降吳漢進圍朐冬十月帝幸魯張歩聞耿弇將至使其大將軍費邑軍歴下又令兵屯祝阿别於泰山鐘城列營數十以待之弇渡河先擊祝阿自旦攻城未中而㧞之故開圍一角令其衆得犇歸鐘城鐘城人聞祝阿已潰大恐懼遂空壁亡去費邑分遣弟敢守巨里弇進兵先脅巨里嚴令軍中趣脩攻具宣敕諸部後三日當悉力攻巨里城隂緩生口令得亡歸以弇期告邑邑至日果自將精兵三萬餘人來救之弇喜謂諸將曰吾所以修攻具者欲誘致之耳野兵不擊何以城為即分三千人守巨里自引精兵上岡阪乗髙合戰大破之臨陳斬邑旣而收首級以示城中城中兇懼費敢悉衆亡歸張歩弇復收其積聚縱兵擊諸未下者平四十餘營遂定濟南時張歩都劇使其弟藍將精兵二萬守西安諸郡太守合萬餘人守臨菑相去四十里弇進軍畫中居二城之間弇視西安城小而堅且藍兵又精臨菑名雖大而實易攻乃敕諸校後五日㑹攻西安藍聞之晨夜警守至期夜半弇敕諸將皆蓐食㑹明至臨菑城䕶軍荀梁等爭之以為攻臨菑西安必救之攻西安臨菑不能救不如攻西安弇曰不然西安聞吾欲攻之日夜為備方自憂何暇救人臨菑出不意而至必驚擾吾攻之一日必㧞㧞臨菑即西安孤與劇隔絶必復亡去所謂擊一而得二者也若先攻西安不能卒下頓兵堅城死傷必多縱能拔之藍引軍還奔臨菑并兵合埶觀人虛實吾深入敵地後無轉輸旬月之間不戰而困矣遂攻臨菑半日拔之入據其城張藍聞之懼遂將其衆亡歸劇弇乃令軍中無得虜掠須張歩至乃取之以激怒歩歩聞大笑曰以尤來大彤十餘萬衆吾皆即其營而破之今大耿兵少於彼又皆疲勞何足懼乎乃與三弟藍􅀪夀及故大彤渠帥重異等兵號二十萬至臨菑大城東將攻弇弇上書曰臣據臨菑深塹髙壘張歩從劇縣來攻疲勞飢渴欲進誘而攻之欲去隨而擊之臣依營而戰精鋭百倍以逸待勞以實擊虚旬日之間歩首可獲於是弇先出菑水上與重異遇突騎欲縱弇恐挫其鋒令歩不敢進故示弱以盛其氣乃引歸小城陳兵於内使都尉劉歆泰山太守陳俊分陳於城下歩氣盛直攻弇營與劉歆等合戰弇升王宫壞臺望之視歆等鋒交乃自引精兵以横突歩陳於東城下大破之飛矢中弇股以佩刀截之左右無知者至暮罷弇明旦復勒兵出是時帝在魯聞弇為歩所攻自往救之未至陳俊謂弇曰劇虜兵盛可且閉營休士以須上來弇曰乗輿且到臣子當擊牛釃酒以待百官反欲以賊虜遺君父邪乃出兵大戰自旦及昏復大破之殺傷無數溝塹皆滿弇知歩困將退豫置左右翼為伏以待之人定時歩果引去伏兵起縱擊追至鉅昩水上八九十里僵尸相屬收得輜重二千餘兩歩還劇兄弟各分兵散去後數日車駕至臨菑自勞軍羣臣大㑹帝謂弇曰昔韓信破歴下以開基今將軍攻祝阿以發迹此皆齊之西界功足相方而韓信襲擊已降將軍獨拔勍敵其功又難於信也又田横亨酈生及田横降髙帝詔衛尉不聽為仇張歩前亦殺伏隆若歩來歸命吾當詔大司徒釋其怨又事尤相類也將軍前在南陽建此大䇿常以為落落難合有志者事竟成也帝進幸劇耿弇復追張歩歩犇平夀蘇茂將萬餘人來救之茂讓歩曰以南陽兵精延岑善戰而耿弇走之大王奈何就攻其營旣呼茂不能待邪歩曰負負無可言者帝遣使告歩茂能相斬降者封為列矦歩遂斬茂詣耿弇軍門肉袒降弇傳詣行在所而勒兵入據其城樹十二郡旗鼔令歩兵各以郡人詣旗下衆尚十餘萬輜重七千餘兩皆罷遣歸鄉里張歩三弟各自繫所在獄詔皆赦之封歩為安丘矦與妻子居雒陽於是琅邪未平上徙陳俊為琅邪太守始入境盜賊皆散耿弇復引兵至城陽降五校餘黨齊地悉平振旅還京師弇為將凡所平郡四十六屠城三百未嘗挫折焉初起太學車駕還宫幸太學稽式古典脩明禮樂煥然文物可觀矣十一月大司徒伏湛免以矦霸為大司徒霸聞太原閔仲叔之名而辟之旣至霸不及政事徒勞苦而已仲叔恨曰始蒙嘉命且喜且懼今見明公喜懼皆去以仲叔為不足問邪不當辟也辟而不問是失人也遂辭出投劾而去初五原人李興隨昱朔方人田颯代郡人石鮪閔堪各起兵自稱將軍匈奴單于遣使與興等和親欲令盧芳還漢地為帝興等引兵至單于庭迎芳十二月與俱入塞都九原縣掠有五原朔方雲中定襄鴈門五郡並置守令與胡通兵侵苦北邊馮異治關中出入三嵗上林成都人有上章言異威權至重百姓歸心號為咸陽王帝以章示異異惶懼上書陳謝詔報曰將軍之於國家義為君臣恩猶父子何嫌何疑而有懼意隗囂矜已飾智每自比西伯與諸將議欲稱王鄭興曰昔文王三分天下有其二尚服事殷武王八百諸矦不謀同㑹猶還兵待時髙祖征伐累年猶以沛公行師今令徳雖明世無宗周之祚威略雖振未有髙祖之功而欲舉未可之事昭速禍患無乃不可乎囂乃止後又置廣職位以自尊髙鄭興曰夫中郎將太中大夫使持節官皆王者之器非人臣所當制也無益於實有損於名非尊上之意也囂病之而止時關中將帥數上書言蜀可擊之狀帝以書示囂因使擊蜀以效其信囂上書盛言三輔單弱劉文伯在邊未宜謀蜀帝知囂欲持兩端不願天下統一於是稍黜其禮正君臣之儀帝以囂與馬援來歙相善數使歙援奉使往來勸令入朝許以重爵囂連遣使深持謙辭言無功徳須四方平定退伏閭里帝復遣來歙説囂遣子入侍囂聞劉永彭寵皆已破滅乃遣長子恂隨歙詣闕帝以為胡騎校尉封鐫羌矦鄭興因恂求歸葬父母囂不聽而徙興舍益其秩禮興入見曰今為父母未葬乞骸骨若以増秩徙舍中更停留是以親為餌也無禮甚矣將軍焉用之願留妻子獨歸葬將軍又何猜焉囂乃令與妻子俱東馬援亦將家屬隨恂歸雒陽以所將賓客猥多求屯田上林苑中帝許之囂將王元以為天下成敗未可知不願專心内事􅀃囂曰昔更始西都四方響應天下喁喁謂之太平一旦壞敗將軍幾無所厝今南有子陽北有文伯江湖海岱王公十數而欲牽儒生之􅀃弃千乗之基羈旅危國以求萬全此循覆車之軌者也今天水完富士馬最彊元請以一丸泥爲大王東封函谷關此萬世一時也若計不及此且畜養士馬據隘自守曠日持乆以待四方之變圗王不成其敝猶足以霸要之魚不可脫於淵神龍失埶與蚯蚓同囂心然元計雖遣子入質猶負其險阨欲專制方面申屠剛諫曰愚聞人所歸者天所與人所畔者天所去也本朝誠天之所福非人力也今璽書數到委國歸信欲與將軍共同吉凶布衣相與尚有沒身不負然諾之信況於萬乗者哉今何畏何利而乆疑若是卒有非常之變上負忠孝下愧當世夫未至豫言固常為虚及其已至又無所及是以忠言至諫希得為用誠願反覆愚老之言囂不納於是遊士長者稍稍去之王莽末交趾諸郡閉境自守岑彭素與交趾牧鄧讓厚善與讓書陳國家威徳又遣偏將軍屈充移檄江南班行詔命於是讓與江夏太守矦登武陵太守王堂長沙相韓福桂陽太守張隆零陵太守田翕蒼梧太守杜穆交趾太守錫光等相率遣使貢獻悉封爲列矦鍚光者漢中人在交趾教民夷以禮義帝復以宛人任延為九眞太守延教民耕種嫁娶故嶺南華風始於二守焉是嵗詔徴處士太原周黨㑹稽嚴光等至京師黨入見伏而不謁自陳願守所志博士范升奏曰伏見太原周黨東海王良山陽王成等蒙受厚恩使者三聘乃肯就車及陛見帝廷黨不以禮屈伏而不謁偃蹇驕悍同時俱逝黨等文不能演義武不能死君釣采華名庶幾三公之位臣願與坐雲臺之下考試圗國之道不如臣言伏虚妄之罪而敢私竊虚名誇上求髙皆大不敬書奏詔曰自古明王聖主必有不賔之士伯夷叔齊不食周粟太原周黨不受朕禄亦各有志焉其賜帛四十匹罷之帝少與嚴光同遊學及即位以物色訪之得於齊國累徴乃至拜諫議大夫不肯受去耕釣於富春山中以夀終於家王良後歴沛郡太守大司徒司直在位恭儉布被瓦器妻子不入官舍後以病歸一嵗復徴至滎陽疾篤不任進道過其友人友人不肯見曰不有忠言奇謀而取大位何其往來屑屑不憚煩也遂拒之良慙自後連徴不應卒於家元帝之世莎車王延嘗為侍子京師慕樂中國及王莽之亂匈奴略有西域唯延不肯附屬常敕諸子當世奉漢家不可負也延卒子康立康率傍國拒匈奴擁衛故都䕶吏士妻子千餘口檄書河西問中國動静竇融乃承制立康為漢莎車建功懷徳王西域大都尉五十五國皆屬焉資治通鑑卷第四十一
