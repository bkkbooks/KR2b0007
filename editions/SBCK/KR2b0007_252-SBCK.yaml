front:
  text: 資治通鑑卷第二百五十二
  hash: sha256:76f9d0282777e034a5444acbdb4d0192d8b0c61ac7f2376e45edfab7b350927f
body:
  text: 臣司馬光奉勑編集唐紀六十八柔兆涒灘凡七年起丄章攝提格盡懿宗昭聖恭惠孝皇帝下咸通十一年春正月甲寅朔羣臣上尊號曰睿文英武明徳至仁大聖廣孝皇帝赦天下西川之民聞蠻冦將至爭走入成都時成都但有子城亦無壕人所占地各不過一席許雨則戴箕盎以自庇又乏水取摩訶池泥汁澄而飲之將士不習武僃節度使盧耽召彭州刺史吳行魯使攝參謀與前瀘州刺史揚慶復共修守僃選將校分職事立戰棚具礮檑造器僃嚴警邏先是西川將士多虚職名亦無禀給至是掲牓募驍勇之士補以實職厚給糧賜應募者雲集慶復乃諭之曰汝曹皆軍中子弟年少材勇平居無由自進今蠻冦憑陵乃汝曹取富貴之秋也可不勉乎皆歡呼踊躍於是列兵械於庭使之各試所能兩兩角勝察其勇怯而進退之得選兵三千人號曰突將行魯彭州人也戊午蠻至眉州耽遣同節度副使王偃等齎書見其用事之臣杜元忠與之約和蠻報曰我輩行止只繫雅懐路巖韋保衡上言康承訓討龐勛時逗橈不進又不能盡其餘黨又貪虜獲不時上功辛酉貶蜀王傅分司尋再貶恩州司馬南詔進軍新津定邊之北境也盧耽遣同節度副使譚奉祀致書于杜元忠問其所以來之意蠻留之不還耽遣使告急於朝且請遣使與和以紓一時之患朝廷命知四方館事太僕卿支詳爲宣諭通和使蠻以耽待之恭亦爲之盤􅁊而成都守僃由是粗完甲子蠻長驅而北陷雙流庚午耽遣節度副使柳槃往見之杜元忠授槃書一通曰此通和之後驃信與軍府相見之儀也其儀皆以王者自處語極驕慢又遣人負綵幕至城南云欲張陳蜀王㕔以居驃信癸酉廢定邊軍復以七州歸西川是日蠻軍抵成都城下前一日盧耽遣先鋒遊奕使王晝至漢州詗援軍且趣之時興元六千人鳯翔四千人已至漢州㑹竇滂以忠武義成徐宿四千人自導江奔漢州就援軍以自存丁丑王晝以興元資簡兵三千餘人軍於毗橋遇蠻前鋒與戰不利退保漢州時成都日望援軍之至而竇滂自以失地欲西川相繼陷沒以分其責毎援軍自北至輒説之曰蠻衆多於官軍數十倍官軍逺來疲􅁦未易遽前諸將信之皆狐疑不進成都十將李自孝隂與蠻通欲焚城東倉爲内應城中執而殺之後數日蠻果攻城乆之城中無應而止二月癸未朔蠻合梯衝四面攻成都城上以鉤繯挽之使近投火沃油焚之攻者皆死盧耽以楊慶復攝左都押牙李驤各帥突將出戰殺傷蠻二千餘人㑹暮焚其攻具三千餘物而還蜀人素怯其突將新爲慶復所奬拔且利於厚賞勇氣自倍其不得出者皆憤鬱求􅁬後數日賊取民籬重沓濕而屈之以爲蓬置人其下舉以抵城而斸之矢石不能入火不能然慶復鎔鐵汁以灌之攻者又死乙酉支詳遣使與蠻約和丁亥蠻斂兵請和戊子遣使迎支詳時顔慶復以援軍將至詳謂蠻使曰受詔詣定邊約和今雲南乃圍成都則與曏日詔㫖異矣且朝廷所以和者兾其不犯成都也今矢石晝夜相交何謂和乎蠻見和使不至庚寅復進攻城辛卯城中出兵擊之乃退初韋臯招南詔以破吐蕃既而蠻訴以無甲弩臯使匠往教之數歲蠻中甲弩皆精利又東蠻苴那時勿鄧夢衝三部助臯破吐蕃有功其後邊吏遇之無狀東蠻怨唐深自附於南詔毎從南詔入冦爲之盡力得唐人皆虐殺之朝廷貶竇滂爲康州司户以顔慶復爲東川節度使凡援蜀諸軍皆受慶復節制癸巳慶復至新都蠻分兵往拒之甲午與慶復遇慶復大破蠻軍殺二千餘人蜀民數千人爭操芟刀白棓以助官軍呼聲震野乙未蠻歩騎數萬復至㑹右武衛上將軍宋威以忠武軍二千人至即與諸軍㑹戰蠻軍大敗死者五千餘人退保星宿山威進軍沱江驛距成都三十里蠻遣其臣楊定保詣支詳請和詳曰宜先解圍退軍定保還蠻圍城如故城中不知援軍之至但見其數來請和知援軍必勝矣戊戌蠻復請和使者十返城中亦依違荅之蠻以援軍在近攻城尤急驃信以下親立矢石之間庚子官軍至城下與蠻戰奪其升遷橋是夕蠻自燒攻具遁去比明官軍乃覺之初朝廷使顔慶復救成都命宋威屯綿漢爲後繼威乘勝先至城下破蠻軍功居多慶復疾之威飯士欲追蠻軍城中戰士亦欲與北軍合勢俱進慶復牒威奪其軍勒歸漢州蠻至􅀟流阻新穿水造橋未能成狼狽失度三日橋成乃得過斷橋而去甲兵服物遺弃於路蜀人甚恨之黎州刺史嚴師本収散卒數千保邛州蠻圍之二日不克亦捨去顔慶復始教蜀人築壅門城穿塹引水滿之植鹿角分營鋪蠻知有僃自是不復犯成都矣先是西川牙將有職無官及拒却南詔四人以功授監察御史堂帖人輸堂例錢三百緡貧者苦之三月左僕射同平章事曹確同平章事充鎭海節度使夏四月丙午以翰林學士承㫖兵部侍郎韋保衡同平章事徐賊餘黨猶相聚閭里爲羣盜散居兖鄆青齊之間詔徐州觀察使夏矦曈招諭之五月丁丑以邛州刺史吳行魯爲西川留後光州民逐刺史李弱翁弱翁奔新息左補闕楊堪等上言刺史不道百姓負寃當訴於朝廷寘諸典刑豈得羣黨相聚擅自斥逐亂上下之分此風殆不可長宜加嚴誅以懲來者上令百官議處置徐州之宜六月丙午太子少傅李膠等狀以爲徐州雖屢構禍亂未必比屋頑凶蓋由統御失人是致姦回乘釁今使名雖降兵額尚存以爲支郡則糧餉不給分􅀠别藩則人心未服或舊惡相濟更成披猖惟泗州曏因攻守結釁已深宜有更張庶爲兩便詔從之徐州依舊爲􅀚察使統徐濠宿三州爲團練使割􅀠淮南加幽州節度使張允伸兼侍中秋八月乙未同昌公主薨上痛悼不已殺翰林醫官韓宗劭等二十餘人悉収捕其親族三百餘人繫京兆獄中書侍郎同平章事劉瞻召諫官使言之諫官莫敢言者乃自上言以爲脩短之期人之定分昨公主有疾深軫聖慈宗劭等診療之時惟求疾愈僃施方術非不盡心而禍福難移竟成差跌原其情狀亦可哀矜而械繫老幼三百餘人物議沸騰道路嗟嘆柰何以逹理知命之君渉肆暴不明之謗盖由安不慮危忿不思難之故也伏願少回聖慮寛釋繫者上覽䟽不恱瞻又與京兆尹温璋力諫於上前上大怒叱出之魏博節度使何全皥年少驕暴好殺又減將士衣糧將士作亂全皥單騎走追殺之推大將韓君雄爲留後成徳節度使王景崇爲之請旌節九月庚戌以君雄爲魏博留後丙辰以劉瞻同平章事充荆南節度使温璋振州司馬璋歎曰生不逢時死何足惜是夕仰藥卒庚申敕曰茍無蠧害何至於斯惡實貫盈死有餘責宜令三日內且於城外􅁠瘞俟經恩宥方許歸葬使中外快心姦邪知懼己巳貶右諌議大夫髙湘比部郎中知制誥楊知至禮部郎中魏簹等於嶺南皆坐與劉瞻親善爲韋保衡所逐也知至汝士之子簹扶之子也保衡又與路巖共􅉲劉瞻云與醫官通謀誤投毒藥丙子貶贍康州刺史翰林學士承旨鄭畋草瞻罷相制辭曰安數畒之居仍非已有却四方之賂惟畏人知巖謂畋曰侍郎乃表薦劉相也坐貶梧州刺史御史中丞孫瑝坐爲瞻所擢用亦貶汀州刺史路巖素與劉瞻論議多不叶瞻既貶康州巖猶不快閱十道圖以驩州去長安萬里再貶驩州司户冬十月癸卯以西川留後吳行魯爲節度使十一月辛亥以兵部尚書鹽鐵轉運使王鐸爲禮部尚書同平章事鐸起之兄子也丁卯復以徐州爲感化軍節度十二月加成徳節度使王景崇同平章事以左金吾上將軍李國昌爲振武節度使十二年春正月辛酉葬文懿公主韋氏之人爭取庭祭之灰汰其金銀凡服玩毎物皆百二十輿以錦繡珠玉爲儀衛明器輝煥三十餘里賜酒百斛餅餤四十槖駝以飼体夫上與郭淑妃思公主不已樂工李可及作歎百年曲其聲悽惋舞者數百人􅀤内庫雜寳爲其首飾以絁八百匹爲地衣舞罷珠璣覆地以魏博留後韓君雄爲節度使門下侍郎同平章事路巖與韋保衡素相表裏勢傾天下既而爭權浸有隙保衡遂短巖於上夏四月癸卯以巖同平章事充西川節度使巖出城路人以瓦礫擲之權京兆尹薛能巖所擢也巖謂能曰臨行煩以瓦礫相餞能徐舉笏對曰曏來宰相出府司無例發人防衛巖甚慙能汾州人也五月上幸安國寺賜僧重謙僧澈沈檀講座二各髙二丈設萬人齋秋七月以兵部尚書盧耽同平章事充山南東道節度使冬十月以兵部侍郎鹽鐵轉運使劉鄴爲禮部尚書同平章事十三年春正月幽州節度使張允伸得風疾請委軍政就醫許之以其子簡㑹爲留後疾甚遣使上表納旌節丙申薨允伸鎭幽州二十三年勤儉恭謹邊鄙無警上下安之二月丁巳以兵部侍郎同平章事于琮爲山南東道節度使以刑部侍郎判户部奉天趙隠爲户部侍郎同平章事平州刺史張公素素有威望爲幽人所服張允伸薨公素帥州兵來奔䘮張簡㑹懼三月奔京師以爲諸衛將軍夏四月立皇子保爲吉王傑爲壽王倚爲睦王以張公素爲平盧留後五月國子司業韋殷裕詣閤門告郭淑妃弟内作坊使敬􅄒隂事上大怒杖殺殷裕籍沒其家乙亥閤門使田獻銛奪紫改橋陵使以其受殷裕狀故也殷裕妻父太僕少卿崔元應妻從兄中書舍人崔沆季父君卿皆貶嶺南官給事中杜裔休坐與殷裕善亦貶端州司户沆鉉之子也裔休悰之子也丙子貶山南東道節度使于琮爲普王􅀓分司韋保衡譛之也辛巳貶尚書左丞李當吏部侍郎王渢左散騎常侍李都翰林學士承㫖兵部侍郎張楊前中書舍人封彦卿左諌議大夫楊塾癸未貶工部尚書嚴祁給事中李貺給事中張鐸左金吾大將軍李敬仲起居舍人蕭遘李瀆鄭彦特李藻皆處之湖嶺之南坐與琮厚善故也貺漢之子遘寘之子也甲申貶前平盧節度使于琄爲涼王府長史分司前湖南觀察使于瓌爲􅀽州刺史瓌琄皆琮之兄也尋再貶琮韶州刺史琮妻廣徳公主上之妹也與琮皆之韶州行則肩輿門相對坐則執琮之帶琮由是獲全時諸公主多驕縱惟廣徳動遵法度事于氏宗親尊卑無不如禮内外稱之六月以盧龍留後張公素爲節度使韋保衡欲以其黨裴條爲郎官憚左丞李璋方嚴恐其不放上先遣人達意璋曰朝廷遷除不應見問秋七月乙未以璋爲宣歙觀察使八月歸義節度使張義潮薨沙州長史曹義金代領軍府制以義金爲歸義節度使是後中原多故朝命不及回鶻陷甘州自餘諸州􅀠歸義者多爲羗胡所據冬十二月追上宣宗謚曰元聖至明成武獻文睿智章仁神聦懿道大孝皇帝振武節度使李國昌恃功恣横專殺長吏朝廷不能平徙國昌爲大同軍防禦使國昌稱疾不赴十四年春三月癸巳上遣敕使詣法門寺迎佛骨羣臣諫者甚衆至有言憲宗迎佛骨尋晏駕者上曰朕生得見之死亦無恨廣造浮圖寳帳香轝幡花幢蓋以迎之皆飾以金玉錦繡珠翠自京城至寺三百里間道路車馬晝夜不絶夏四月壬寅佛骨至京師導以禁軍兵仗公私音樂沸天燭地綿亘數十里儀衛之盛過於郊祀元和之時不及逺矣富室夾道爲綵樓及無遮㑹競爲侈靡上御安福門降樓膜拜流涕霑臆賜僧及京城􅂄老甞見元和事者金帛迎佛骨入禁中三日出置安國崇化寺宰相已下競施金帛不可勝紀因下徳音降中外繫囚五月丁亥以西川節度使路巖兼中書令南詔冦西川又冦黔南黔中經略使秦匡謀兵少不敵弃城奔荆南荆南節度使汪悰囚而奏之六月乙未敕斬匡謀籍沒其家貲親族應縁坐者令有司搜捕以聞匡謀鳯翔人也以中書侍郎同平章事王鐸同平章事充宣武節度使時韋保衡挾恩弄權以劉瞻于琮先在相位不禮於己譛而逐之王鐸保衡及第時主文也蕭遘同年進士也二人素薄保衡之爲人保衡皆擯斥之秋七月戊寅上疾大漸左軍中尉劉行深右軍中尉韓文約立少子普王儼庚辰制立儼爲皇太子權句當軍國政事辛巳上崩于咸寧殿遺詔以韋保衡攝􅃁宰僖宗即位八月丁未追尊母王貴妃爲皇太后劉行深韓文約皆封國公關東河南大水九月有司上先太后謚曰惠安司徒門下侍郎同平章事韋保衡怨家告其陰事貶保衡賀州刺史樂工李可及流嶺南可及有寵於懿宗嘗爲子娶婦懿宗賜之酒二銀壷啓之無酒而中實右軍中尉西門季玄屢以爲言懿宗不聽可及嘗大受賜物載以官車季玄謂曰汝它日破家此物復應以官車載還非爲受賜徒煩牛足耳及流嶺南籍􅃿其家果如季玄言以西川節度使路巖兼侍中加成徳節度使王景崇中書令魏博節度使韓君雄盧龍節度使張公素天平節度使髙駢並同平章事君雄仍賜名允中冬十月乙未以左僕射蕭倣爲門下侍郎同平章事韋保衡再貶崖州澄邁令尋賜自盡又貶其弟翰林學士兵部侍郎保乂爲賔州司户所親翰林學士户部侍郎劉承雍爲涪州司馬承雍禹錫之子也癸卯赦天下西川節度使路巖喜聲色遊宴委軍府政事於親吏邊咸郭籌皆先行後申上下畏之嘗大閱二人議事黙書紙相示而焚之軍中以爲有異圖驚懼不安朝廷聞之十一月戊辰徙巖荆南節度使咸籌濳知其故遂亡命以右僕射蕭鄴同平章事充河東節度使十二月己亥詔送佛骨還法門寺再貶路巖爲新州刺史僖宗惠聖恭定孝皇帝上之上乾符元年春正月丁亥翰林學士盧攜上言以爲陛下初臨大寳宜深念黎元國家之有百姓如草木之有根柢若秋冬培溉則春夏滋榮臣竊見闗東去年旱災自虢至海麥纔半收秋稼㡬無冬菜至少貧者磑蓬實爲麵蓄槐葉爲韲或更衰羸亦難采拾常年不稔則散之鄰境今所在皆饑無所依投坐守鄉閭待盡溝壑其蠲免餘稅實無可徴而州縣以有上供及三司錢督趣甚急動加捶撻雖撤屋伐木雇妻鬻子止可供所由酒食之費未得至於府庫也或租稅之外更有它徭朝廷儻不撫存百姓實無生計乞敕州縣應所欠殘稅並一切停徴以俟蠶麥仍􅀤所在義倉亟加賑給至深春之後有菜葉木牙繼以桑椹漸有可食在今數月之間尤爲窘急行之不可稽緩敕從其言而有司竟不能行徒爲空文而已路巖行至江陵敕削官爵長流儋州巖美姿儀囚於江陵獄再夕須髪皆白尋賜自盡籍沒其家巖之爲相也密奏三品以上賜死皆令使者剔取結喉三寸以進驗其必死至是自罹其禍所死之處乃楊收賜死之榻也邊咸郭籌捕得皆伏誅初巖佐崔鉉於淮南爲支使鉉知其必貴曰路十終須作彼一官既而入爲監察御史不出長安城十年至宰相其自監察入翰林也鉉猶在淮南聞之曰路十今已入翰林如何得老皆如鉉言以太子少􅀓于琮同平章事充山南東道節度使二月甲午􅁙昭聖恭惠孝皇帝于簡陵廟號懿宗以中書侍郎同平章事趙隠同平章事充鎭海節度使以華州刺史裴坦爲中書侍郎同平章事以虢州刺史劉瞻爲刑部尚書瞻之貶也人無賢愚莫不痛惜及其還也長安兩市人率錢雇百戲迎之瞻聞之改期由它道而入夏五月乙未裴坦薨以劉瞻爲中書侍郎同平章事初瞻南遷劉鄴附於韋路共短之及瞻還爲相鄴内懼秋八月丁巳朔鄴延瞻置酒於鹽鐵院瞻歸而遇疾辛未薨時人皆以爲鄴鴆之也以兵部侍郎判度支崔彦昭爲中書侍郎同平章事彦昭羣之從子也兵部侍郎王凝正雅之從孫也其母彦昭之從母凝彦昭同舉進士凝先及第嘗衩衣見彦昭且戲之曰君不若舉明經彦昭怒遂爲深仇及彦昭爲相其母謂侍婢曰爲我多作韈履王侍郎母子必將竄逐吾當與妹偕行彦昭拜且泣謝曰必不敢凝由是得免冬十月以門下侍郎同平章事劉鄴同平章事充淮南節度使以吏部侍郎鄭畋爲兵部侍郎翰林學士承㫖户部侍郎盧攜守本官並同平章事十一月庚寅日南至羣臣上尊號曰聖神聦睿仁哲孝皇帝改元魏博節度使韓允中薨軍中立其子節度副使簡爲留後南詔冦西川作浮梁濟大度河防河都知兵馬使黎州刺史黄景復俟其半濟擊之蠻敗走斷其浮梁蠻以中軍多張旗幟當其前而分兵濳出上下流各二十里夜作浮梁詰朝俱濟襲破諸城栅夾攻景復力戰三日景復陽敗走蠻盡銳追之景復設三伏以待之蠻過三分之二乃􅀤伏擊之蠻兵大敗殺二千餘人追至大度河南而還復修完城栅而守之蠻歸至之羅谷遇國中􅀤兵繼至新舊相合鉦鼓聲聞數十里復冦大度河與唐夾水而軍詐云求和又自上下流濳濟與景復戰連日西川援兵不至而蠻衆日益景復不能支軍遂潰十二月党項回鶻冦天徳軍感化軍奏羣盜冦掠州縣不能禁敕兖鄆等道出兵討之南詔乘勝陷黎州入邛崍闗攻雅州大度河潰兵奔入邛州成都驚擾民爭入城或北奔它州城中大爲守􅍯而塹壘比曏時嚴固驃信使其坦綽遺節度使牛叢書云非敢爲冦也欲入見天子面訴數十年爲讒人離間冤抑之事儻蒙聖恩矜恤當還與尚書永敦鄰好今假道貴府欲借蜀王㕔留止數日即東上叢素懦怯欲許之楊慶復以爲不可斬其使者留二人授以書遣還書辭極數其罪詈辱之蠻兵及新津而還叢恐蠻至豫焚城外民居蕩盡蜀人尤之詔􅀤河東山南西道東川兵援之仍命天平節度使髙駢詣西川制置蠻事以韓簡爲魏博留後商州刺史王樞以軍州空窘減折糴錢民相帥以白梃􅇌之又􅇌殺官吏二人朝廷更除刺史李誥到官收捕民李叔汶等三十人斬之初回鶻屢求册命詔遣册立使郗宗莒詣其國㑹回鶻爲吐谷渾嗢末所破逃遁不知所之詔宗莒以玉册國信授靈鹽節度使唐弘夫掌之還京師上年少政在臣下南牙北司互相矛楯自懿宗以來奢侈日甚用兵不息賦歛愈急闗東連年水旱州縣不以實聞上下相蒙百姓流殍無所控訴相聚爲盜所在蜂起州縣兵少加以承平日乆人不習戰毎與盜遇官軍多敗是歳濮州人王仙芝始聚衆數千起於長垣二年春正月丙戌以髙駢爲西川節度使辛巳上祀圓丘赦天下髙駢至劒州先遣使走馬開成都門或諌曰蠻冦逼近成都相公尚逺萬一豨突柰何駢曰吾在交趾破蠻二十萬衆蠻聞我來逃竄不暇何敢犯成都今春氣向暖數十萬人藴積城中生死共處汚穢鬱蒸將成癘疫不可緩也使者至成都開門縱民出各復常業乗城者皆下城解甲民大恱蠻方攻雅州聞之遣使請和引兵去駢又奏南蠻小醜易以枝梧今西川新舊兵已多所發長武鄜坊河東兵徒有勞費並乞勒還敕止河東兵而已上之爲普王也小馬坊使田令孜有寵及即位使知樞密遂擢爲中尉上時年十四專事遊戲政事一委令孜呼爲阿父令孜頗讀書多巧數招權納賄除官及賜緋紫皆不闗白於上毎見常自僃果食兩盤與上相對飲啗從容良乆而退上與内園小兒狎昵賞賜樂工伎兒所費動以萬計府藏空竭令孜說上籍兩市商旅寳貨悉輸内庫有陳訴者付京兆杖殺之宰相以下鉗口莫敢言髙駢至成都明日􅀤歩騎五千追南詔至大度河殺獲甚衆擒其酋長數十人至成都斬之修復邛崍闗大度河諸城柵又築城於戎州馬湖鎭號平夷軍又築城於沐源川皆蠻入蜀之要道也各置兵數千戍之自是蠻不復入冦駢召黄景復責以大度河失守腰斬之駢又奏請自將本管及天平昭義義成等軍共六萬擊南詔詔不許先是南詔督爽屢牒中書辭語怨望中書不荅盧攜奏稱如此則蠻益驕謂唐無以荅宜數其十代受恩以責之然自中書􅀤牒則嫌於體敵請賜髙駢及嶺南節度使辛讜詔使録詔白牒與之從之三月以魏博留後韓簡爲節度使去歲感化軍􅀤兵詣靈武防秋㑹南詔冦西川敕往救援未至成都蠻退遣還至鳳翔不肯詣靈武欲擅歸徐州内養王裕本都將劉逢搜擒唱帥者胡雄等八人斬之衆然後定初南詔圍成都楊慶復以右職優給募突將以禦之成都由是獲全及髙駢至悉令納牒又託以蜀中屢遭蠻冦人未復業停其禀給突將皆忿怨駢好妖術每􅀤兵追蠻皆夜張旗立隊對將士焚紙畫人馬散小豆曰蜀兵懦怯今遣玄女神兵前行軍中壯士皆恥之又索闔境官有出於胥吏者皆停之令民間皆用足陌錢陌不足者皆執之劾以行賂取與皆死刑罰嚴酷由是蜀人皆不悅夏四月突將作亂大譟突入府廷駢走匿於厠間突將索之不獲天平都將張傑帥所部數百人被甲入府擊突將突將撤前牙儀注兵仗無者􅁬挺揮拳乘怒氣力􅃲天平軍不能敵走歸營突將追之營門閉不得入監軍遣人招諭許以復職名禀給乆之乃肯還營天平軍復開門出爲追逐之勢至城北時方脩毬􅂣役者數百人天平軍悉取其首還詣府云已誅亂者駢出見之厚以金帛賞之明日牓謝突將悉還其職名衣糧自是日令諸道將士從已來者更直府中嚴兵自衛加成徳節度使王景崇兼侍中浙西狼山鎭遏使王郢等六十九人有戰功節度使趙隠賞以職名而不給衣糧郢等論訴不獲遂劫庫兵作亂行收黨衆近萬人攻陷蘇常乘舟往來泛江入海轉掠二浙南及福建大爲人患五月以太傅分司令狐綯同平章事充鳯翔節度使司空同平章事蕭倣薨六月以御史大夫李蔚爲中書侍郎同平章事辛未髙駢隂籍突將之名使人夜掩捕之圍其家挑牆壊户而入老幼孕病悉驅去殺之嬰兒或撲於階或擊於柱流血成渠號哭震天死者數千人夜以車載尸投之於江有一婦人臨刑㦸手大罵曰髙駢汝無故奪有功將士職名衣糧激成衆怒幸而得免不省已自咎乃更以詐殺無辜近萬人天地鬼神豈容汝如此我必訴汝於上帝使汝它日舉家屠㓕如我今日寃抑汚辱如我今日驚憂惴恐如我今日言畢拜天怫然就戮乆之突將有自戍役歸者駢復欲盡族之有元從親吏王殷諌曰相公奉道宜好生惡殺此屬在外初不同謀若復誅之則自危者多矣駢乃止王仙芝及其黨尚君長攻陷􅗛州曹州衆至數萬天平節度使薛崇出兵擊之爲仙芝所敗寃句人黄巢亦聚衆數千人應仙芝巢少與仙芝皆以販私鹽爲事巢善騎射喜任俠粗渉書傳屢舉進士不第遂爲盜與仙芝攻剽州縣横行山東民之困於重歛者爭歸之數月之間衆至數萬盧龍節度使張公素性暴戾不爲軍士所附大將李茂勲本回鶻阿布思之族回鶻敗降於張仲武仲武使戍邊屢有功賜姓名納降軍使陳貢言者幽之宿將爲軍士所信服茂勲濳殺貢言聲云貢言舉兵向葪公素出戰而敗奔京師茂勲入城衆乃知非貢言也不得已推而立之朝廷因以茂勲爲留後秋七月蝗自東而西蔽日所過赤地京兆尹楊知至奏蝗入京畿不食稼皆抱荆棘而死宰相皆賀八月李茂勲爲盧龍節度使九月左補闕董禹諫上遊畋乘驢擊毬上賜金帛以褒之邠寧節度使李侃奏爲假父華清宫使道雅求贈官禹上䟽論之語頗侵宦官樞密使楊復㳟等列訴於上冬十月禹坐貶郴州司馬復㳟欽義之養孫也昭義軍亂大將劉廣逐節度使髙湜自爲留後以左金吾大將軍曹翔爲昭義節度使回鶻還至羅川十一月遣使者同羅榆禄入貢賜拯接絹萬匹羣盜侵滛剽掠十餘州至于淮南多者千餘人少者數百人詔淮南忠武宣武義成天平五軍節度使監軍亟加討捕及招懐十二月王仙芝冦沂州平盧節度使宋威表請以歩騎五千别爲一使兼帥本道兵所在討賊乃以威爲諸道行營招討草賊使仍給禁兵三千甲騎五百因詔河南方鎮所遣討賊都頭並取威處分三年春正月天平軍奏遣將士張晏等救沂州還至義橋聞北境復有盗起留使扞禦晏等不從喧譟趣鄆州都將張思泰李承祐走馬出城裂䄂與盟以俸錢僃酒殽慰諭然後定詔本軍宣慰一切無得窮詰二月敕福建江西湖南諸道觀察刺史皆訓練士卒又令天下郷村各置弓刀鼔板以僃羣盗賜海兖節度號泰寧軍三月盧龍節度使李茂勲請以其子幽州左司馬可舉知留後自求致仕詔茂勲以左僕射致仕以可舉爲盧龍留後門下侍郎同平章事崔彦昭罷爲太子太傅以左僕射王鐸兼門下侍郎同平章事南詔遣使者詣髙駢求和而盜邊不息駢斬其使者蠻之陷交趾也虜安南經略判官杜驤妻李瑶瑶宗室之踈屬也蠻遣瑶還遞木夾以遺駢稱督爽牒西川節度使辭極驕慢駢送瑶京師甲辰復牒南詔數其負累聖恩徳暴犯邊境殘賊欺詐之罪安南大度覆敗之狀折辱之原州刺史史懐操貪暴夏四月軍亂逐之賜宣武感化節度泗州防禦使密詔選精兵數百人於巡内遊奕防衛綱船五日一具上供錢米平安狀聞奏五月昭王汭薨以盧龍留後李可舉爲節度使六月撫王紘薨雄州地震裂水涌壊州城及公私廬舍俱盡秋七月以前巖州刺史髙傑爲左驍衛將軍充縁海水軍都知兵馬使以討王郢鄂王潤薨加魏博節度使韓簡同平章事宋威擊王仙芝於沂州城下大破之仙芝亡去威奏仙芝已死縱遣諸道兵身還青州百官皆入賀居三日州縣奏仙芝尚在攻剽如故時兵始休詔復􅀤之士皆忿怨思亂八月仙芝陷陽翟郟城詔忠武節度使崔安濳􅀤兵擊之安濳慎由之弟也又命昭義節度使曹翔將歩騎五千及義成兵衛東都宫以左散騎常侍曽元裕爲招討副使守東都又詔山南東道節度使李福選歩騎二千守汝鄧要路仙芝進逼汝州詔邠寧節度使李侃鳯翔節度使令狐綯選歩兵一千騎兵五百守陜州潼闗加成徳節度使王景崇兼中書令九月乙亥朔日有食之丙子王仙芝陷汝州執刺史王鐐鐐鐸之從父兄弟也東都大震士民挈家逃出城乙酉敕赦王仙芝尚君長罪除官以招諭之仙芝陷陽武攻鄭州昭義監軍判官雷殷符屯中牟擊仙芝破走之冬十月仙芝南攻唐鄧西川節度使髙駢築成都羅城使僧景仙規度周二十五里悉召縣令庀徒賦役􅁷受百錢以上皆死蜀土䟽惡以甓甃之環城十里内取土皆剗丘垤平之無得爲坎埳以害耕種役者不過十日而代衆樂其均不費扑撻而功辦自八月癸丑築之至十一月戊子畢功役之始作也駢恐南詔揚聲入冦雖不敢決來役者必驚擾乃奏遣景仙託遊行入南詔説諭驃信使歸附中國仍許妻以公主因與議二國禮儀乆之不決駢又聲言欲巡邊朝夕通烽火至大度河而實不行蠻中惴恐由是訖於城成邊候無風塵之警先是西川將吏入南詔驃信皆坐受其拜駢以其俗尚浮屠故遣景仙往驃信果帥其大臣迎拜信用其言王仙芝攻郢復二州陷之王郢因温州刺史魯寔請降寔屢爲之論奏敕郢詣闕郢擁兵遷延半年不至固求望海鎭使朝廷不許以郢爲右率府率仍令左神䇿軍補以重職其先所掠之財並令給與十二月王仙芝攻申光廬壽舒通等州淮南節度使劉鄴奏求益兵敕感化節度使薛能選精兵數千助之鄭畋以言計不行稱疾遜位不許乃上言自沂州奏捷之後仙芝愈肆猖狂屠陷五六州瘡痍數千里宋威衰老多病自妄奏以來諸道尤所不服今淹留亳州殊無進討之意曽元裕擁兵蘄黄專欲望風退縮若使賊陷揚州則江南亦非國有崔安濳威望過人張自勉驍雄良將宫苑使李瑑西平王晟之孫嚴而有勇請以安濳爲行營都統瑑爲招討使代威自勉爲副使代元裕上頗采其言青滄軍士戍安南還至桂州逐觀察使李瓉瓉宗閔之子也以右諌議大夫張禹謨爲桂州觀察使桂管監軍李維周驕横瓉曲奉之浸不能制桂管有兵八百人防禦使纔得百人餘皆屬監軍又預於逐帥之謀强取兩使印擅􅀘知州官奪昭州送使錢詔禹謨并按之禹謨徹之子也招討副使都監楊復光奏尚君長弟讓據查牙山官軍退保鄧州復光􅀇价之養子也王仙芝攻蘄州蘄州刺史裴渥王鐸知舉時所擢進士也王鐐在賊中爲仙芝以書説渥渥與仙芝約歛兵不戰許爲之奏官鐐亦説仙芝許以如約渥乃開城延仙芝及黄巢輩三十餘人入城置酒大陳貨賄以贈之表陳其狀諸宰相多言先帝不赦龐勛朞年卒誅之今仙芝小賊非龐勛之比赦罪除官益長奸宄王鐸固請許之乃以仙芝爲左神䇿軍押牙兼監察御史遣中使以告身即蘄州授之仙芝得之甚喜鐐渥皆賀未退黄巢以官不及已大怒曰始者共立大誓横行天下今獨取官赴左軍使此五千餘衆安所歸乎因敺仙芝傷首其衆諠譟不已仙芝畏衆怒遂不受命大掠蘄州城中之人半驅半殺焚其廬舍渥奔鄂州敕使奔襄州鐐爲賊所拘賊乃分其軍三千餘人從仙芝及尚君長二千餘人從巢各分道而去資治通鑑卷第二百五十二
