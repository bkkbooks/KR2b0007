body:
  text: 臣司馬光奉勅編集陳紀十雍涒難凡五年起閼逢執徐盡著長城公下至徳二年春正月甲子日有食之己巳隋主享太廟辛未祀南郊壬申梁主入朝于隋服通天冠絳紗袍北面受郊勞及入見於大興殿隋主服通天冠絳紗袍梁主服逺遊冠朝服君臣並拜賜縑萬匹珍玩稱是隋前華州刺史張賓儀同三司劉暉等造甲子元曆成奏之壬辰詔頒新曆癸巳大赦二月乙巳隋主餞梁主於灞上突厥蘇尼部男女萬餘口降隋庚戍隋主如隴州突厥達頭可汗請降于隋夏四月庚子隋以吏部尚書虞慶則為右僕射隋上大將軍賀婁子幹發五州兵擊吐谷渾殺男女萬餘口二旬而還帝以隴西頻被寇掠而俗不設村塢命子幹勒民為堡仍營田積榖子幹上書曰隴西河右土曠民稀邊境未寧不可廣佃比見屯田之所獲少費多虛役人功卒逢踐暴屯田疎逺者請皆廢省但隴右之民以畜牧為事若更屯聚彌不自安但使鎭戍連接烽堠相望民雖散居必謂無慮帝從之以子幹曉習邊事丁巳以為榆闗揔管五月以吏部尚書江揔為僕射隋主以渭水多沙深淺不常漕者苦之六月壬子詔太子左庶子宇文愷帥水工鑿渠引渭水自大興城東至潼闗三百餘里名曰廣通渠漕運通利闗内賴之秋七月丙寅遣兼散騎常侍謝泉等聘于隋八月壬寅隋鄧恭公竇熾卒乙卯將軍夏矦苗請降於隋隋主以通和不納九月甲戌隋主以闗中飢行如洛陽隋主不喜辭華詔天下公私文翰並宜實録泗州刺史司馬幼之文表華艷付所司治罪治書侍御史趙郡李諤亦以當時屬文體尚輕薄上書曰魏之三祖崇尚文詞忽君人之大道好雕蟲之藝下之從上遂成風俗江左齊梁其弊彌甚競一韻之竒爭一字之巧連篇累牘不出月露之形積案盈箱唯是風雲之狀世俗以此相高朝廷據兹擢士禄利之路既開愛尚之情愈篤於是閭里童昏貴遊揔丱未窺六甲先製五言至如羲皇舜禹之典伊傅周孔之説不復闗心何嘗入耳以傲誕為清虛以縁情為勲績指儒素為古拙用詞賦為君子故文筆日繁其政日亂良由弃大聖之􅁤模構無用以為用也今朝廷雖有是詔如聞外州逺縣仍踵弊風躬仁孝之行者擯落私門不加收齒工輕薄之藝者選充吏職舉送天朝蓋由縣令刺史未遵風教請普加采察送臺推劾又上言士大夫矜伐干進無復亷恥乞明加罪黜以懲風軌詔以諤前後所奏頒示四方突厥沙鉢略可汗數為隋所敗乃請和親千金公主自請改姓楊氏為隋主女隋主遣開府儀同三司徐平和使於沙鉢略更封千金公主為大義公主晉王廣請因舋乘之隋主不許沙鉢略遣使致書曰從天生大突厥天下賢聖天子伊利俱盧設莫何沙鉢略可汗致書大隋皇帝皇帝婦父乃是翁比此為女夫乃是兒例兩境雖殊情義如一自今子子孫孫乃至萬世親好不絶上天為證終不違負此國羊馬皆皇帝之畜彼之繒綵皆此國之物帝復書曰大隋天子貽書大突厥沙鉢略可汗得書知大有善意既為沙鉢略婦翁今日視沙鉢略與兒子不異時遣大臣往彼省女復省沙鉢略也於是遣尚書右僕射虞慶則使於沙鉢略車騎將軍長孫晟副之沙鉢略陳兵列其珍寶坐見慶則稱病不能起且曰我諸父以來不向人拜慶則責而諭之千金公主私謂慶則曰可汗豺狼性過與爭將齧人長孫晟謂沙鉢略曰突厥與隋俱大國天子可汗不起安敢違意但可賀敦為帝女則可汗是大隋女壻奈何不敬婦翁沙鉢略笑謂其達官曰須拜婦翁乃起拜頓顙跪受璽書以戴於首既而大慙與羣下相聚慟哭慶則又遣稱臣沙鉢略謂左右曰何謂臣左右曰隋言臣猶此云奴耳沙鉢略曰得為大隋天子奴虞僕射之力也贈慶則馬千匹并以從妹妻之冬十一月壬戌隋主遣兼散騎常侍薛道衡等來聘戒道衡當識朕意勿以言辭相折是歲上於光昭殿前起臨春結綺望仙三閣各高數十丈連延數十間其牕牖壁帶縣楣欄檻皆以沈檀為之飾以金玉問以珠翠外施珠簾内有寶牀寶帳其服玩瑰麗近古所未有每微風暫至香聞數里其下積石為山引水為池雜植竒花異卉上自居臨春閣張貴妃居結綺閣龔孔二貴嬪居望仙閣並復道交相往來又有王李二美人張薛二淑媛袁昭儀何婕妤江修容並有寵迭遊其上以宮人有文學者袁大捨等為女學士僕射江揔雖為宰輔不親政務日與都官尚書孔範散騎常侍王瑳等文士十餘人侍上遊宴後庭無復尊卑之序謂之狎客上每飲酒使諸妃嬪及女學士與狎客共賦詩互相贈荅采其尤豔麗者被以新聲選宮女千餘人習而歌之分部迭進其曲有玉樹後庭花臨春樂等大略皆美諸妃嬪之容色君臣酣歌自夕達旦以此為常張貴妃名麗華本兵家女為龔貴嬪侍兒上見而悦之得幸生太子深貴妃髮長七尺其光可鑑性敏慧有神彩進止閑華每瞻視眄睞光采溢目照映左右善􅀱人主顔色引薦諸宮女後宮咸徳之競言其善又有厭魅之術常置淫祀於宮中聚女巫鼓舞上怠於政事百司啟奏並因宦者蔡脱兒李善度進請上倚隠囊置張貴妃於膝上共決之李蔡所不能記者貴妃並為條疏無所遺脱因參訪外事人間有一言一事貴妃必先知白之由是益加寵異冠絶後庭宦官近習内外連結援引宗戚縱横不法賣官鬻獄貨賂公行賞罰之命不出于外大臣有不從者因而譛之於是孔張之權熏灼四方大臣執政皆從風諂附孔範與孔貴嬪結為兄妹上惡聞過失每有惡事孔範必曲為文飾稱揚贊美由是寵遇優渥言聽計從羣臣有諫者輒以罪斥之中書舎人施文慶頗涉書史嘗事上於東宮聰敏彊記眀閑吏職心筭口占應時條理由是大被親幸又薦所善呉興沈客卿陽惠朗徐哲暨慧景等云有吏能上皆擢用之以客卿為中書舎人客卿有口辯頗知朝廷典故兼掌金帛局舊制軍人士人並無闗市之稅上盛修宮室窮極耳目府庫虛空有所興造恒苦不給客卿奏請不問士庶並責闗市之征而又増重其舊於是以陽惠朗為太市令暨慧景為尚書金倉都令史二人家本小吏考校簿領豪􅁵不差然皆不達大體督責苛碎聚歛無厭士民嗟怨客卿揔督之每歲所入過於常格數十倍上大悦益以施文慶為知人尤加親重小大衆事無不委任轉相汲引珥貂蟬者五十人孔範自謂文武才能舉朝莫及從容白上曰外間諸將起自行伍匹夫敵耳深見逺慮豈其所知上以問施文慶文慶畏範亦以為然司馬申復贊之自是將帥微有過失即奪其兵分配文吏奪任忠部曲以配範及蔡徵由是文武解體以至覆滅三年春正月戊午朔日有食之隋主命禮部尚書牛􅀪修五禮勒成百卷戊辰詔行新禮三月戊午隋以尚書左僕射高熲為左領軍大將軍豐州刺史章大寶昭達之子也在州貪縱朝廷以太僕卿李暈代之暈將至辛酉大寶襲殺暈舉兵反隋大司徒郢公王誼與隋主有舊其子尚帝女蘭陵公主帝待之恩禮稍薄誼頗怨望或告誼自言名應圖䜟相表當王公卿奏誼大逆不道壬寅賜誼死戊申隋主還長安章大寳遣其將楊通攻建安不克臺軍將至大寶衆潰逃入山為追兵所擒夷三族隋度支尚書長孫平奏令民間每秋家出粟麥一石已下貧富為差儲之當社委社司檢校以備凶年名曰義倉隋主從之五月甲申初詔郡縣置義倉平儉之子也時民間多妄稱老小以免賦役山東承北齊之弊政戸口租調姦偽尤多隋主命州縣大索貌閲戸口不實者里正黨長逺配大功以下皆令析籍以防容隠於是計帳得新附一百六十四萬餘口高熲又言民間課輸無定簿難以推校請為輸籍法徧下諸州帝從之自是姦無所容矣諸州調物每歲河南自潼􅀜河北自蒲坂輸長安者相屬於路晝夜不絶者數月梁主殂諡曰孝明皇帝廟號丗宗丗宗孝慈儉約境内安之太子琮嗣位􅀄突厥阿波可汗旣與沙鉢略有隙分而爲二阿波浸彊東距都斤西越金山􅀛兹鐵勒伊吾及西域諸胡悉附之號西突厥隋主亦遣上大將軍元契使于阿波以撫之秋七月庚申遣散騎常侍王話等聘于隋突厥沙鉢略既為達頭所困又畏契丹遣使告急於隋請將部落度漠南寄居白道川隋主許之命晉王廣以兵援之給以衣食賜之車服鼓吹沙鉢略因西擊阿波破之而阿拔國乗虛掠其妻子官軍為擊阿拔敗之所獲悉與沙鉢略沙鉢略大喜乃立約以磧為界因上表曰天無二日土無二王大隋皇帝眞皇帝也豈敢阻兵恃險偷竊名號今感慕淳風歸心有道屈膝稽顙永爲藩附遣其子庫合眞入朝八月丙戌庫合眞至長安隋主下詔曰沙鉢往雖與和猶是二國今作君臣便成一體因命肅告郊廟普頒逺近凡賜沙鉢略詔不稱其名宴庫合眞於内殿引見皇后賞勞甚厚沙鉢略大悦自是歲時貢獻不絶九月將軍湛文徹侵隋和州隋儀同三司費寶首擊擒之丙子隋使季若等來聘冬十月壬辰隋以上柱國楊素為信州揔管初北地傅縡以庶子事上於東宫及即位遷祕書監右衛將軍兼中書通事舎人負才使氣人多怨之施文慶沈客卿共譛縡受高麗使金上収縡下獄縡於獄中上書曰夫君人者恭事上帝子愛下民省嗜欲逺諂佞未明求夜日旰忘食是以澤被區宇慶流子孫陛下頃來酒色過度不䖍郊廟大神專媚淫昏之鬼小人在側宦豎弄權惡忠直若仇讎視生民如草芥後宫曳綺繡廐馬餘菽粟百姓流離殭尸蔽野貨賄公行帑藏損耗神怒民怨衆叛親離臣恐東南王氣自斯而盡書奏上大怒頃之意稍解遣使謂縡曰我欲赦卿卿能改過不對曰臣心如面臣面可改則臣心可改上益怒令宦者李善慶窮治其事遂賜死獄中上每當郊祀常稱疾不行故縡言及之是歲梁大將軍戚昕以舟師襲公安不克而還隋主徵梁主叔父太尉呉王岑入朝拜大將軍封懐義公因留不遣復置江陵揔管以監之梁大將軍許丗武密以城召荆州刺史冝黄矦慧紀謀泄梁主殺之慧紀高祖之從孫也隋主使司農少卿崔仲方發丁三萬於朔方靈武築長城東距河西至綏州綿歴七百里以遏胡寇四年春正月梁改元廣運甲子党項羌請降於隋庚午隋頒曆於突厥二月隋始令刺史上佐每歲暮更入朝上考課丁亥隋復令崔仲方發丁十五萬於朔方以東縁邊險要築數十城丙申立皇弟叔謨為巴東王叔顯為臨江王叔坦為新㑹王叔隆為新寧王庚子隋大赦三月己未洛陽男子高徳上書請隋主為太上皇傳位皇太子帝曰朕承天命撫育蒼生日旰孜孜猶恐不逮豈效近代帝王傳位於子自求逸樂者哉夏四月己亥遣周磻等聘于隋五月丁巳立皇子莊爲㑹稽王秋八月隋遣散騎常侍裴豪等來聘戊申隋申明公李穆卒葬以殊禮閏月丁卯隋太子勇鎭洛陽隋上柱國郕公梁士彦討尉遲迥所當必破代迥爲相州刺史隋主忌之召還長安上柱國􅂎公宇文忻與隋主少相厚善用兵有威名隋主亦忌之以譴去官與柱國舒公劉昉皆被疎逺閑居無事頗懐怨望數相往來隂謀不軌忻欲使士彦於蒲州起兵已爲内應士彦之甥裴通預其謀而告之帝隠其事以士彦爲晉州刺史欲觀其意士彦欣然謂昉等曰天也又請儀同三司薛摩兒爲長史帝亦許之後與公卿朝謁帝令左右執士彦忻昉等於行間詰之初猶不伏捕薛摩兒適至命之庭對摩兒具論始末士彦失色顧謂摩兒曰汝殺我丙子士彦忻昉等皆伏誅叔姪兄弟免死除名九月辛巳隋主素服臨射殿命百官射三家資物以為誡冬十月己酉隋以兵部尚書楊尚希為禮部尚書隋主每旦臨朝日昊不倦尚希諫曰周文王以憂勤損夀武王以安樂延年願陛下舉大綱責成宰輔繁碎之務非人主所宜親也帝善之而不能從癸丑隋置山南道行臺於襄州以秦王俊為尚書令俊妃崔氏生男隋主喜頒賜羣官直祕書内省博陵李文博家素貧人往賀之博文曰賞罰之設功過所存今王妃生男於羣官何事乃妄受賞也聞者愧之癸亥以尚書僕射江揔為尚書令吏部尚書謝伷為僕射十一月己卯大赦吐谷渾可汗夸呂在位百年屢因喜怒廢殺太子後太子懼謀執夸呂而降請兵於隋邊吏秦州揔管河間王弘請以兵應之隋主不許太子謀洩為夸呂所殺復立其少子嵬王訶為太子疊州刺史杜粲請因其舋而討之隋主又不許是歲嵬王訶復懼誅謀帥部落萬五千戸降隋遣使詣闕請兵迎之隋主曰渾賊風俗特異人倫父既不慈子復不孝朕以徳訓人何有成其惡逆乎乃謂使者曰父有過失子當諫爭豈可潛謀非法受不孝之名溥天之下皆朕臣妾各為善事即稱朕心嵬王既欲歸朕唯教嵬王為臣子之法不可逺遣兵馬助為惡事嵬王訶乃止禎明元年春正月戊寅大赦改元癸巳隋主享太廟乙未隋制諸州歲貢士三人二月丁巳隋主朝日于東郊遣兼散騎常侍王亨等聘于隋隋發丁男十萬餘人修長城二旬而罷夏四月於揚州開山陽瀆以通運突厥沙鉢略可汗遣其子入貢于隋因請獵於恒代之間隋主許之仍遣人賜以酒食沙鉢略帥部落再拜受賜沙鉢略尋卒隋為之廢朝三日遣太常弔祭初沙鉢略以其子雍虞閭懦弱遺令立其弟葉護處羅矦雍虞閭遣使迎處羅矦將立之處羅矦曰我突厥自木杵可汗以來多以弟代兄以庶奪嫡失先祖之法不相敬畏汝當嗣位我不憚拜汝雍虞閭曰叔與我父共根連體我枝葉也豈可使根本反從枝葉叔父屈於卑㓜乎且亡父之命何可廢也願叔勿疑遣使相讓者五六處羅矦竟立是爲莫何可汗以雍虞閭爲葉䕶遣使上表言狀隋使車騎將軍長孫晟持節拜之賜以鼓吹幡旗莫何勇而有謀以隋所賜旗鼓西擊阿波阿波之衆以爲得隋兵助之多望風降附遂生擒阿波上書請其死生之命隋主下其議樂安公元諧請就彼梟首武陽公李充請生取入朝顯戮以示百姓隋主謂長孫晨於卿何如晟對曰若突厥背誕湏齊之以刑今其是弟自相夷滅阿波之惡非負國家因其困窮取而爲戮恐非招逺之道不如兩存之左僕射高熲曰骨肉相殘教之蠧也冝存養以示寛大隋主從之甲戌隋遣兼散騎常侍楊同等來聘五月乙亥朔日有食之秋七月己丑隋衛昭王爽卒八月隋徴梁主入朝梁主帥其羣臣二百餘人發江陵庚申至長安隋主以梁主在外遣武鄉公崔弘度將兵戍江陵軍至都州梁主叔父太傅安平王巖弟荆州刺史義興王瓛等恐弘度襲之乙丑遣其都官尚書沈君公詣荆州刺史冝黄矦慧紀請降九月庚寅慧紀引兵至江陵城下辛卯巖等驅文武男女十萬口來奔隋主聞之廢梁國遣尚書左僕射高熲安集遺民梁中宗世宗各給守家十戸拜梁主琮柱國賜爵莒公甲午大赦冬十月隋主如同州癸亥如蒲州十一月丙子以蕭巖為開府儀同三司東揚州刺史蕭瓛為吴州刺史丁亥以豫章王叔英兼司徒甲午隋主如馮翊親祠故社戊戌還長安是行也内史令李徳林以疾不從隋主自同州敕書追之與議伐陳之計及還帝馬上舉鞭南指曰待平陳之日以七寶裝嚴公使自山以東無及公者初隋主受禪以來與陳鄰好甚篤每獲陳諜皆給衣馬禮遣之而高宗猶不禁侵掠故太建之末隋師入寇㑹高宗殂隋主即命班師遣使赴弔書稱姓名頓首帝荅之益驕書末云想彼統内如宜此宇宙清泰隋主不悦以示朝臣上柱國楊素以為主辱臣死再拜請罪隋主問取陳之策於高熲對曰江北地寒田收差晩江南水田早熟量彼収穫之際微徵士馬聲言掩襲彼必屯兵守禦足得廢其農時彼既聚兵我便解甲再三若此彼以為常後更集兵彼必不信猶豫之頃我乃濟師登陸而戰兵氣益倍又江南土薄舎多茅竹所有儲積皆非地窖密遣行人因風縱火待彼修立復更燒之不出數年自可財力俱盡隋主用其策陳人始困於是楊素賀若弼及光州刺史高勱虢州刺史崔仲方等爭獻平江南之策仲方上書曰今唯湏武昌以下蘄和滁方吴海等州更帖精兵密營度計益信襄荆基郢等州速造舟楫多張形勢為水戰之具蜀漢二江是其上流水路衝要必爭之所賊雖於流頭荆門延洲公安巴陵隠璣夏首蘄口湓城置船然終聚漢口峽口以水戰大決若賊必以上流有軍令精兵赴援者下流諸將即須擇便橫度如擁衆自衛上江水軍鼓行以前彼雖恃九江五湖之險非徳無以為固徒有三吴百越之兵非恩不能自立矣隋主以仲方為基州刺史及受蕭巖等降隋主益忿謂高熲曰我為民父母豈可限一衣帶水不拯之乎命大作戰船人請密之隋主曰吾將顯行天誅何密之有使投其柹於江曰若彼懼而能改吾復何求楊素在永安造大艦名曰五牙上起樓五層高百餘尺左右前後置六拍竿並高五十尺容戰士八百人次曰黄龍置兵百人自餘平乗舴艋等各有等差晉州刺史皇甫續將之官稽首言陳有三可滅帝問其狀對曰大吞小一也以有道伐無道二也納叛臣蕭巖於我有詞三也陛下若命將出師臣願展絲髮之効隋主勞而遣之時江南妖異特衆臨平湖草乆塞忽然自開帝惡之乃自賣於佛寺為奴以厭之又於建康造大皇寺起七級浮圖未畢火從中起而焚之呉興章華好學善屬文朝臣以華素無伐閱競排詆之除太市令華鬱鬱不得志上書極諌略曰昔高祖南平百越北誅逆虜丗祖東定吴㑹西破王琳髙宗克復淮南辟地千里三祖之功勤亦至矣陛下即位于今五年不思先帝之艱難不知天命之可畏溺於嬖寵惑於酒色祠七廟而不出拜三妃而臨軒老臣宿將弃之草莽諂佞讒邪升之朝廷今疆埸日蹙隋軍壓境陛下如不改絃易張臣見麋鹿復遊於姑蘇矣帝大怒即日斬之二年春正月辛巳立皇子恮為東陽王恬爲錢塘王遣散騎常侍袁雅等聘于隋又遣散騎常侍九江周羅㬋將兵屯峽口侵隋峽州三月甲戌隋遣兼散騎常侍程尚賢等來聘戊寅隋下詔曰陳叔寶據手掌之地恣溪壑之欲劫奪閭閻資産俱竭驅逼内外勞役弗已窮奢極侈俾晝作夜斬直言之客滅無罪之家欺天造惡祭鬼求恩盛粉黛而執干戈曳羅綺而呼警蹕自古昏亂罕或能比君子潜逃小人得志天災地孽物恠人妖衣冠鉗口道路以目重以背徳違言揺蕩疆埸晝伏夜遊鼠竊狗盜天之所覆無非朕臣每闗聽覽有懐傷惻可出師授律應機誅殄在斯一舉永清吴越又送璽書暴帝二十惡仍散寫詔書三十萬紙遍諭江外太子胤性聰敏好文學然頗有過失詹事袁憲切諫不聽時沈后無寵而近侍左右數於東宫往來太子亦數使人至后所帝疑其怨望甚惡之張孔二貴妃日夜構成后及太子之短孔範之徒又於外助之帝欲立張貴妃子始安王深爲嗣嘗從容言之吏部尚書蔡徵順㫖稱贊袁憲厲色折之曰皇太子國家儲副億兆宅心卿是何人輕言廢立帝卒從徵議夏五月庚子廢太子胤爲吴興王立揚州刺史始安王深爲太子徵景歷之子也深亦聰惠有志操容止儼然雖左右近侍未嘗見其喜愠帝聞袁憲嘗諫胤即日用憲爲尚書僕射帝遇沈后素薄張貴妃專後宫之政后澹然未嘗有所忌怨身居儉約衣服無錦綉之飾唯尋閲圗史及釋典爲事數上書諫爭帝欲廢之而立張貴妃㑹國亡不果冬十月己亥立皇子蕃爲吴郡王己未隋置淮南行省於夀春以晉王廣爲尚書令帝遣兼散騎常侍王琬兼通直散騎常侍許善心聘于隋隋人留於客館琬等屢請還不聽甲子隋以出師有事於太廟命晉王廣秦王俊清河公楊素皆為行軍元帥廣出六合俊出襄陽素出永安荆州刺史劉仁恩出江陵蘄州刺史王世積出蘄春廬州摠管韓擒虎出廬州吴州摠管賀若弼岀廣陵青州摠管􅀪農燕榮出東海凡摠管九十兵五十一萬八千皆受晉王節度東接滄海西距巴蜀旌旗舟楫横亘數千里以左僕射高熲為晉王元帥長史右僕射王韶為司馬軍中事皆取決焉區處支度無所凝滯十一月丁卯隋主親餞將士乙亥至定城陳師誓衆丙子立皇弟叔榮為新昌王叔厈為太原王隋主如河東十二月庚子還長安突厥莫何可汗西擊鄰國中流矢而卒國人立雍虞閭號頡伽施多那都藍可汗隋軍臨江高熲謂行臺吏部郎中薛道衡曰今兹大舉江東必可克乎道衡曰克之嘗聞郭璞有言江東分王三百年復與中國合合此數將周一也主上恭儉勤勞叔寶荒淫驕侈二也國之安危在所委任彼以江摠為相唯事詩酒拔小人施文慶委以政事蕭摩訶任蠻奴為大將皆一夫之用耳三也我有道而大彼無徳而小量其甲士不過十萬西自巫峽東至滄海分之則勢懸而力弱聚之則守此而失彼四也席卷之勢事在不疑熲忻然曰得君言成敗之理令人豁然本以才學相期不意籌略乃爾秦王俊督諸軍屯漢口為上流節度詔以散騎常侍周羅㬋都督巴峽縁江諸軍事以拒之楊素引舟師下三峽軍至流頭灘將軍戚昕以青龍百餘艘兵數千人守狼尾灘地勢險峭隋人患之素曰勝負大計在此一舉若晝日下船彼見我虛實灘流迅激制不由人則吾失其便不如以夜掩之素親帥黄龍數千艘銜枚而下遣開府儀同三司王長襲引步卒自南岸擊昕别柵大將軍劉仁恩帥甲騎自北岸趣白沙遲明而至擊之昕敗走悉俘其衆勞而遣之秋毫不犯素帥水軍東下舟艫被江旌甲曜日素坐平乗大船容貌雄偉陳人望之皆懼曰清河公即江神也江濱鎭戍聞隋軍將至相繼奏聞施文慶沈客卿並抑而不言初上以蕭巖蕭瓛梁之宗室擁衆來奔心忌之故逺散其衆以巖為東揚州刺史瓛為吴州刺史使領軍任忠出守吴興郡以襟帶二州使南平王嶷鎮江州永嘉王彦鎮南徐州尋召二王赴明年元㑹命縁江諸防船艦悉從二王還都為威勢以示梁人之來者由是江中無一鬬船上流諸州兵皆阻楊素軍不得至湘州刺史晉熈王叔文在職既乆大得人和上以其據有上流隂忌之自度素與羣臣少恩恐不為用無可任者乃擢施文慶為都督湘州刺史配以精兵二千欲令西上仍徵叔文還朝文慶深喜其事然懼出外之後執事者持己短長因進其黨沈客卿以自代未發間二人共掌機密䕶軍將軍樊毅言於僕射袁憲曰京口采石俱是要地各湏鋭兵五千并出金翅二百縁江上下以為防備憲及驃騎將軍蕭摩訶皆以為然乃與文武羣臣共議請如毅策施文慶恐無兵從已廢其述職而客卿又利文慶之任已得專權俱言於朝曰必有論議不假面陳但作文啓即為通奏憲等以為然二人齎啓入白帝曰此是常事邊城將帥足以當之若出人船必恐驚擾及隋軍臨江間諜驟至憲等殷勤奏請至於再三文慶曰元㑹將逼南郊之日太子多從今若出兵事便廢闕帝曰今且出兵若北邊無事因以水軍從郊何為不可又曰如此則聲聞鄰境便謂國弱後又以貨動江摠摠内為之遊説帝重違其意而迫羣官之請乃令付外詳議摠又抑憲等由是議乆不決帝從容謂侍臣曰王氣在此齊兵三來周師再來無不摧敗彼何為者邪都官尚書孔範曰長江天塹古以為限隔南北今日虜軍豈能飛度邪邊將欲作功勞妄言事急臣每患官卑虜若度江臣定作太尉公矣或妄言北軍馬死範曰此是我馬何為而死帝笑以為然故不為深備奏伎縱酒賦詩不輟是歲吐谷渾禆王拓跋木彌請以千餘家降隋隋主曰􅄎天之下皆是朕臣朕之撫育俱存仁孝渾賊惛狂妻子懐怖並思歸化自救危亡然叛夫背父不可收納又其本意正自避死今若違拒又復不仁若更有音信但宜慰撫任其自拔不湏出兵應接其妹夫及甥欲來亦任其意不勞勸誘也河南王移兹裒卒隋主令其弟樹歸襲綂其衆資治通鑑卷第一百七十六
