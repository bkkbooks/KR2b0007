body:
  text: 臣司馬光奉勑編集唐紀七十三雍涒灘凡一年有竒起強圉恊洽四月盡著僖宗惠聖恭定孝皇帝下之下光啓三年夏四月甲辰朔約逐蘇州刺史張雄帥其衆逃入海高駢聞秦宗權將宼淮南遣左廂都知兵馬使畢師鐸將百騎屯高郵時吕用之用事宿將多爲所誅師鐸自以黄巢降將常自危師鐸有美妾用之欲見之師鐸不許用之因師鐸出竊往見之師鐸慙怒出其妾由是有隙師鐸將如高郵用之待之加厚師鐸益疑懼謂禍在旦夕師鐸子娶高郵鎮遏使張神劒女師鐸密與之謀神劒以爲無是事神劒名雄人以其善用劒故謂之神劒時府中藉藉亦以爲師鐸且受誅其母使人語之曰設有是事汝自努力前去勿以老母弱子爲累師鐸疑未決㑹駢子四十三郎者素惡用之欲使師鐸帥外鎮將吏共䟽用之罪惡聞於其父密使人紿之曰用之比來頻啓令公欲因此相圖已有委曲在張尚書所宜備之師鐸問神劒曰昨夜使司有文書翁胡不言神劒不寤曰無之師鐸內不自安歸營謀於腹心皆勸師鐸起兵誅用之師鐸曰用之數年以來人怨鬼怒安知天不假手於我誅之邪淮寜軍使鄭漢章我鄉人昔歸順時副將也素切齒於用之聞吾謀必喜乃夜與百騎潛詣漢章漢章大喜悉發鎮兵及驅居民合千餘人從師鐸至高郵師鐸詰張神劒以所得委曲神劒驚曰無有師鐸聲色浸厲神劒奮曰公何見事之暗用之姦惡天地所不容况近者重賂權貴得嶺南節度復不行或云謀竊據此土使其得志吾輩豈能握刀頭事此妖物邪要冎此數賊以謝淮海何必多言漢章喜遽命取酒割臂血瀝酒共飲之乙巳衆推師鐸爲行營使爲文告天地移書淮南境内言誅用之及張守一諸葛殷之意以漢章爲行營副使神劒爲都指揮使神劒以師鐸成敗未可知請以所部留高郵曰一則爲公聲援二則供給糧餉師鐸不悅漢章曰張尚書謀亦善茍終始同心事捷之日子女玉帛相與共之今日豈可復相違師鐸乃許之戊申師鐸漢章發高郵庚戌詗騎以白高駢吕用之匿之朱珍至淄青旬日應募者萬餘人又襲青州獲馬千匹辛亥還至大梁朱全忠喜曰吾事濟矣時蔡人方宼汴州其將張晊屯北郊秦賢屯板橋各有衆數萬列三十六寨連延二十餘里全忠謂諸將曰彼蓄銳休兵方來擊我未知朱珍之至謂吾兵少畏怯自守而已宜出其不意先擊之乃自引兵攻秦賢寨士卒踊躍爭先賢不爲備連拔四寨斬萬餘級蔡人大驚以爲神全忠又使牙將新野郭言募兵於河陽陜虢得萬餘人而還畢師鐸兵奄至廣陵城下城中驚擾壬壬吕用之引麾下勁兵誘以重賞出城力戰師鐸兵少却用之始得斷橋塞門爲守僃是日駢登延和閣聞喧譟聲左右以師鐸之變告駢驚急召用之詰之用之徐對曰師鐸之衆思歸爲門衛所遏適已隨宜區處計尋退散儻或不已正煩玄女一力士耳願令公勿憂駢曰近者覺君之妄多矣君善爲之勿使吾爲周待中言畢慘沮乆之用之慙懅而退師鐸退屯山光寺以廣陵城堅兵多甚有悔色癸丑遣其屬孫約與其子詣宣州乞師於觀察使秦彦且許以克城之日迎彦爲帥㑹師鐸館客畢慕顔自城中逃出言衆心離散用之憂窘若堅守之不日當潰師鐸乃恱是日未明駢召用之問以事本末用之始以實對駢曰吾不欲復出兵相攻君可選一温信大將以我手扎諭之若其未從當别處分用之退念諸將皆仇敵往必不利於已甲寅遣其所部討擊副使許戡齎駢委曲及用之誓狀并酒殽出勞師鐸師鐸始亦望駢舊將勞問得以具陳用之姦惡披泄積憤見戡至大罵曰梁纉韓問何在乃使此穢物來戡未及發言已牽出斬之乙卯師鐸射書入城用之不發即焚之丁巳用之以甲士百人入見駢於延和閣下駢大驚匿于寢室乆而後出曰節度使所居無故以兵入欲反邪命左右驅出用之大懼出子城南門舉策指之曰吾不可復入此自是高吕始判矣是夜駢召其從子前左金吾衛將軍傑密議軍事戊午署傑都牢城使泣而勉之以親信五百人給之用之命諸將大索城中丁壯無問朝士書生悉以白刃驅􅅞登城令分立城上自旦至暮不得休息又恐其與外宼通數易其地家人餉之莫知所在由是城中人亦恨師鐸入城之晚也駢遣大將石鍔以師鐸幼子及其母書并駢委曲至楊子諭師鐸師鐸遽遣其子還曰令公但斬吕張以示師鐸師鐸不敢負恩願以妻子爲質駢恐用之屠其家収師鐸母妻子置使院辛酉秦彦遣其將秦稠將兵三千至楊子助師鐸壬戌宣州軍攻南門不克癸亥又攻羅城東南隅城幾陷者數四甲子羅城西南隅守者焚戰格以應師鐸師鐸毁城以内其衆用之帥其衆千人力戰于三橋北師鐸垂敗㑹高傑以牢城兵自子城出欲擒用之以授師鐸用之乃開參佐門北走駢召梁纉以昭義軍百餘人保子城乙丑師鐸縱兵大掠駢不得已命徹備與師鐸相見於延和閣下交拜如賓主之儀署師鐸節度副使行軍司馬仍承制加左僕射鄭漢章等各遷官有差左莫邪都虞􅀱申及本徐州健將入見駢說之曰師鐸逆黨不多諸門尚未有守者請令公及此選元從三十人夜自教場門出比師鐸覺之追不及矣然後發諸鎮兵還取府城此轉禍爲福也若一二日事定浸恐艱難及亦不得在左右矣言之且泣駢猶豫不聽及恐語泄遂竄匿㑹張雄至東塘及往歸之丙寅師鐸果分兵守諸門搜捕用之親黨悉誅之師鐸入居使院秦稠以宣軍千人分守使宅及諸倉庫丙寅駢牒請解所任以師鐸兼判府事師鐸遣孫約至宣城趣秦彦過江或說師鐸曰僕射曏者舉兵葢以用之輩姦邪暴横高令公坐自聾瞽不能區理故順衆心爲一方去害今用之既敗軍府廓然僕射宜復奉高公而佐之但揔其兵權以號令誰敢不服用之乃淮南一叛將耳移書所在立可梟擒如此則外有推奉之名内得兼并之實雖朝廷聞之亦無虧臣節使高公聰明必知内愧如其不悛乃机上肉耳柰何以此功業付之它人豈惟受制於人終恐自相魚肉前日秦稠先守倉庫其相疑已可見且秦司空爲節度使廬州夀州其肯爲之下乎僕見戰攻之端未有窮已豈惟淮南之人肝腦塗地竊恐僕射功名成敗未可知也不若及今亟止秦司空勿使過江彼若粗識安危必未敢輕進就使它日責我以負約猶不失爲高氏忠臣也師鐸大以爲不然明日以告鄭漢章漢章曰此智士也散求之其人畏禍竟不復出戊辰駢遷家出居南第師鐸以甲士百人爲衛其實囚之也是日宣軍以所求未􅀗焚進奉兩樓數十間寳貨悉爲煨燼己巳師鐸於府㕔視事凡官吏非有兵權者皆如故復遷駢於東第自城陷諸軍大掠晝夜不已至是師鐸始以先鋒使唐宏爲静街使禁止之駢先爲鹽鐵使積年不貢奉貨財在楊州者填委如山駢作郊天御樓六軍立仗儀服及大殿元㑹内署行幸供張器用皆刻鏤金玉蟠龍蹙鳳數十萬事悉爲亂兵所掠歸于閭閻張陳寢處其中庚午獲諸葛殷杖殺之弃尸道傍怨家抉其目斷其舌衆以瓦石投之須臾成冢吕用之之敗也其黨鄭􅂎首歸師鐸師鐸署􅂎知海陵監事􅂎至海陵隂記高霸得失聞於師鐸霸獲其書杖􅂎背斷手足刳目截舌然後斬之蔡將盧瑭屯于萬勝夾汴水而軍以絶汴州運路朱全忠乗霧襲之掩殺殆盡於是蔡兵皆徙就張晊屯於赤崗全忠復就撃之殺二萬餘人蔡人大懼或軍中自相驚全忠乃還大梁養兵休士辛未高駢密以金遺守者畢師鐸聞之壬午復迎駢入道院収高氏子弟甥姪十餘人同幽之前蘇州刺史張雄帥其衆自海泝江屯於東塘遣其將趙暉入據上元畢師鐸之攻廣陵也吕用之詐爲高駢牒署廬州刺史楊行密行軍司馬追兵入援廬江人袁襲說行密曰高公昬惑用之姦邪師鐸悖逆凶徳參㑹而求兵於我此天以淮南授明公也趣赴之行密乃悉發廬州兵復借兵於和州刺史孫端合數千人赴之五月至天長鄭漢章之從師鐸也留其妻守淮口用之帥衆攻之旬日不克漢章引兵救之用之聞行密至天長引兵歸之丙子朱全忠出撃張晊大破之秦宗權聞之自鄭州引精兵㑹之張神劒求貨於畢師鐸師鐸報以俟秦司空之命神劒怒亦以其衆歸楊行密及海陵鎮遏使高霸曲溪人劉金盱眙人賈令威悉以其衆屬焉行密衆至萬七千人張神劒運高郵糧以給之朱全忠求救於兖鄆朱瑄朱瑾皆引兵赴之義成軍亦至辛巳全忠以四鎭兵攻秦宗權於邊孝村大破之斬首二萬餘級宗權宵遁全忠追之至陽武橋而還全忠深徳朱瑄兄事之蔡人之守東都河陽許汝懷鄭陜虢者聞宗權敗皆弃去宗權發鄭州孫儒發河陽皆屠滅其人焚其廬舍而去宗權之勢自是稍衰朝廷以扈駕都頭楊守宗知許州事朱全忠以其將孫從益知鄭州事錢鏐遣東安都將杜稜浙江都將阮結静江都將成及將兵討薛㓪甲午秦彦將宣歙兵三萬餘人乗竹筏㳂江而下趙暉邀撃於上元殺溺殆半丙申彦入廣陵自稱權知淮南節度事仍以畢師鐸爲行軍司馬􅀘池州刺史趙鍠爲宣歙觀察使戊戌楊行密帥諸軍抵廣陵城下爲八寨以守之秦彦閉城自守六月戊申天威都頭楊守立與鳯翔節度使李昌符爭道麾下相歐帝命中使諭之不止是夕宿衛皆嚴兵爲僃己酉昌符擁兵燒行宫庚戌復攻大安門守立與昌符戰於通衢昌符兵敗帥麾下走保隴州杜讓能聞難挺身步入侍上韋昭度質其家於軍中誓誅反賊故軍士力戰而勝之守立復恭之假子也壬子以扈駕都將武定節度使李茂貞爲隴州招討使以討昌符甲寅河中牙將常行儒殺節度使王重榮重榮用法嚴末年尤甚行儒嘗被罰恥之遂作亂夜攻府舍重榮逃於别墅明旦行儒得而殺之制以陜虢節度使王重盈爲護國節度使又以重盈子珙權知陜虢留後重盈至河中執行儒殺之戊午秦彦遣畢師鐸秦稠將兵八千出城西撃楊行密稠敗死士卒死者什七八城中乏食樵採路絶宣州軍始食人壬戌亳州將謝殷逐其刺史宋衮孫儒既去河陽李罕之召張全義於澤州與之収合餘衆罕之據河陽全義據東都共求援於河東李克用以其將安金俊爲澤州刺史將騎助之表罕之爲河陽節度使全義爲河南尹初東都經黄巢之亂遺民聚爲三城以相保繼以秦宗權孫儒殘暴僅存壞垣而已全義初至白骨蔽地荆棘彌望居民不滿百户全義麾下纔百餘人相與保中州城四野俱無耕者全義乃於麾下選十八人材器可任者人給一旗一牓謂之屯將使詣十八縣故墟落中植旗張牓招懷流散勸之樹蓻惟殺人者死餘但笞杖而已無嚴刑無租稅民歸之者如市又選壯者教之戰陳以禦㓂盜數年之後都城坊曲漸復舊制諸縣户口率皆歸復桑麻蔚然野無曠土其勝兵者大縣至七千人小縣不減二千人乃奏置令佐以治之全義明察人不能欺而爲政寛簡出見田疇美者輒下馬與僚佐共觀之召田主勞以酒食有蠶麥善収者或親至其家悉呼出老幼賜以茶綵衣物民間言張公不喜聲伎見之未嘗笑獨見佳麥良繭則笑耳有田荒穢者則集衆杖之或訴以乏人牛乃召其鄰里責之曰彼誠乏人牛何不助之衆皆謝乃釋之由是鄰里有無相助故比户皆有蓄積凶年不饑遂成富庶焉杜陵等敗薛㓪將李君暀于陽羨秋七月癸未淮南將吳苖帥其徒八千人踰城降楊行密八月壬寅朔李茂貞奏隴州刺史薛知籌以城降斬李昌符滅其族朱全忠引兵過亳州遣其將霍存襲謝殷斬之丙子以李茂貞同平章事充鳳翔節度使以韋昭度守太保兼侍中朱全忠欲兼兖鄆而以朱瑄兄弟有功於已攻之無名乃誣瑄招誘宣武軍士移書誚讓瑄復書不遜全忠遣其將朱珍葛從周襲曹州壬子拔之殺刺史丘弘禮又攻濮州與兖鄆兵戰於劉橋殺數萬人朱瑄朱瑾僅以身免全忠與兖鄆始有隙秦彦以張雄兵彊兾得其用以僕射告身授雄以尚書告身三通授禆將馮弘鐸等廣陵人競以金玉珠繒詣雄軍貿食通犀帶一得米五升錦衾一得糠五升雄軍既富不復肯戰未幾復助楊行密丁卯彦悉出城中兵萬二千人遣畢師鐸鄭漢章將之陳於城西延袤數里軍勢甚盛行密安卧帳中曰賊近告我牙將李宗禮曰衆寡不敵宜堅壁自守徐圖還師李濤怒曰吾以順討逆何論衆寡大軍至此去將安歸濤願將所部爲前鋒保爲公破之濤趙州人也行密乃積金帛麰米於一寨使羸弱守之多伏精兵於其旁自將千餘人衝其陳兵始交行密陽不勝而走廣陵兵追之入空寨爭取金帛麰米伏兵四起廣陵衆亂行密縱兵撃之俘斬殆盡積尸十里溝瀆皆滿師鐸漢章單騎僅免自是秦彦不復言出師矣九月以户部侍郎判度支張濬爲兵部侍郎同平章事高駢在道院秦彦供給甚薄左右無食至然木像煑革帶食之有相㗖者彦與畢師鐸出師屢敗疑駢爲厭勝外圍益急恐駢黨有爲内應者有妖尼王奉仙言於彦曰楊州分野極灾必有一大人死自此喜矣甲戌命其將劉匡時殺駢并其子弟甥姪無少長皆死同坎瘞之乙亥楊行密聞之帥士卒縞素向城大哭三日朱珍攻濮州朱瑄遣其弟罕將步騎萬人救之辛夘朱全忠逆擊罕於范擒斬之冬十月秦彦遣鄭漢章將步騎五千出擊張神劒高霸寨破之神劒奔高郵霸奔海陵丁未朱珍拔濮州刺史朱裕奔鄆珍進兵攻鄆瑄使裕詐遺珍書約爲内應珍夜引兵赴之瑄開門納汴軍閉而殺之死者數千人汴軍乃退瑄乗勝復取曹州以其屬郭詞爲刺史甲寅立皇子陞爲益王杜稜等拔常州丁從實奔海陵錢鏐奉周寳歸杭州屬櫜鞬具部將禮郊迎之楊行密圍廣陵且半年秦彦畢師鐸大小數十戰多不利城中無食米斗直錢五十緡草根木實皆盡以堇泥爲餅食之餓死者太半宣軍掠人詣肆賣之驅􅅞屠割如羊豕訖無一聲積骸流血滿於坊市彦師鐸無如之何嚬蹙而已外圍益急彦師鐸憂懣殆無生意相對抱膝終日悄然行密亦以城乆不下欲引還己巳夜大風雨吕用之部將張審威帥麾下士三百晨伏於西壕俟守者易代潜登城啓關納其衆守者皆不鬬而潰先是彦師鐸信重尼奉仙雖戰陳日時賞罰輕重皆取决焉至是復咨於奉仙曰何以取濟奉仙曰走爲上策乃自開化門出奔東塘行密帥諸軍合萬五千人入城以梁纉不盡節於高氏爲秦畢用斬於㦸門之外韓問聞之赴井死以高駢從孫愈攝副使使攺殯駢及其族城中遺民纔數百家飢羸非復人狀行密輦西寨米以賑之行密自稱淮南留後秦宗權遣其弟宗衡將兵萬人度淮與楊行密爭楊州以孫儒爲副張佶劉建鋒馬殷及宗權族弟彦暉皆從十一月辛未抵廣陵城西據行密故寨行密輜重之未入城者爲蔡人所得秦彦畢師鐸至東塘張雄不納將度江􅃐宣州宗衡召之乃引兵還與宗衡合未幾宗權召宗衡還蔡拒朱全忠孫儒知宗權勢不能乆稱疾不行宗衡屢促之儒怒甲戌與宗衡飲酒座中手刃之傳首於全忠宗衡將安仁義降於行密仁義本沙陀將也行密悉以騎兵委之列於田頵之上儒分兵掠鄰州未幾衆至數萬以城下乏食與彦師鐸襲高郵初宣武都指揮使朱珍與排陳斬斫使李唐賓勇略功名略相當全忠每戰使二人偕徃無不捷然二人素不相下珍使迎其妻於大梁不白全忠全忠怒追還其妻殺守門者使親吏蔣玄暉召珍以漢賓代揔其衆館驛巡官馮翊敬翔諫曰朱珍未易輕取恐其猜懼生變全忠悔使人追止之珍果自疑丙子夜珍置酒召諸將唐賓疑其有異圖斬關奔大梁珍亦弃軍單騎繼至全忠兩惜其才皆不罪遣還濮州因引兵歸全忠多權數將佐莫測其所爲惟敬翔能逆知之往往助其所不及全忠大悅自恨得翔晚凡軍機民政悉以咨之辛巳高郵鎭遏使張神劒帥麾下二百人逃歸楊州丙戌孫儒屠高郵戊子高郵殘兵七百人潰圍而至楊行密慮其爲變分􅀠諸將一夕盡阬之明日殺神劒於其第楊行密恐孫儒乗勝取海陵壬寅命鎭遏使高霸帥其兵民悉歸府城曰有違命者族之於是數萬户弃資産焚廬舍挈老㓜遷于廣陵戊戌霸與弟暀部將余繞山前常州刺史丁從實至廣陵行密出郭迎之與霸􅙬約爲兄弟置其將卒於法雲寺己亥秦宗權陷鄭州朝廷以淮南乆亂閏月以朱全忠兼淮南節度使東南面招討使陳敬瑄惡顧彦朗與王建相親恐其合兵圖已謀於田令孜令孜曰建吾子也不爲楊興元所容故作賊耳今折簡召之可致麾下乃遣使以書召之建大喜詣梓州見彦朗曰十軍阿父見召當徃省之因見陳太師求一大州若得之私願足矣乃留其家於梓州帥麾下精兵二千與從子宗鐬假子宗瑤宗弼宗侃宗弁俱西宗瑤燕人姜郅宗弼許人魏弘夫宗侃許人田師侃宗弁鹿弁也建至鹿頭關西川參謀李乂謂敬瑄曰王建虎也柰何延之入室彼安肯爲公下乎敬瑄悔亟遣人止之且增修守備建怒破關而進敗漢州刺史張頊於綿竹遂拔漢州進軍學射山又敗西川將句惟立於蠶北又拔徳陽敬瑄遣使讓之對曰十軍阿父召我來及門而拒之重爲顧公所疑進退無歸矣田令孜登樓慰諭之建與諸將於清逺橋上髠髪羅拜曰今既無歸且辭阿父作賊矣顧彦朗以其弟彦暉爲漢州刺史發兵助建急攻成都三日不克而退還屯漢州敬瑄告難於朝詔遣中使和解之又令李茂貞以書諭之皆不從楊行密欲遣高霸屯天長以拒孫儒袁襲曰霸高氏舊將常挾兩端我勝則來不勝則叛今處之天長是自絶其歸路也不如殺之己酉行密伏甲執霸及丁從實余繞山皆殺之又遣千騎掩殺其黨於法雲寺死者數千人是日大雪寺外數坊地皆赤高􅙬出走明日獲而殺之吕用之之在天長也紿楊行密曰用之有銀五萬鋌埋於所居克城之日願備麾下一醉之資庚戌行密閲士卒顧用之曰僕射許此曹銀何食言邪因牽下械繋命田頵鞫之云與鄭􅂎董瑾謀因中元夜邀高駢至其第建黄籙齋乗其入静縊殺之聲言上升因令莫邪都帥諸軍推用之爲節度使是日􅆎斬用之怨家刳裂立盡并誅其族黨軍士發其中堂得桐人書駢姓名於胷桎梏而釘之袁襲言於行密曰廣陵飢弊已甚蔡賊復來民必重困不如避之甲寅行密遣和州將延陵宗以其衆二千人歸和州乙卯又命指揮使蔡儔將兵千人輜重數千兩歸于廬州趙暉據上元㑹周寳敗浙西潰卒多歸之衆至數萬暉遂自驕大治南朝臺城而居之服器奢􅆫張雄在東塘暉不與通問雄泝江而上暉以兵塞其中流雄怒戊午攻上元拔之暉奔當塗未至爲其下所殺餘衆降雄悉阬之朱全忠遣内客將張廷範致朝命於楊行密以行密爲淮南節度副使又以宣武行軍司馬李璠爲淮南留後遣牙將郭言將兵千人送之感化節度使時溥自以於全忠爲先進官爲都統顧不得淮南而全忠得之意甚恨望全忠以書假道於溥溥不許璠至泗州溥以兵襲之郭言力戰得免而還徐汴始構怨十二月癸巳秦宗權所署山南東道留後趙徳諲陷荆南節度使張瓌留其將王建肇守城而去遺民纔數百家饒州刺史陳儒陷衢州上蔡賊帥馮敬章陷蘄州乙未周寳卒於杭州錢鏐以杜稜爲常州制置使命阮結等進攻潤州丙申克之劉浩走擒薛㓪以歸文徳元年春正月甲寅孫儒殺秦彦畢師鐸鄭漢章彦等之歸秦宗衡也其衆猶二千餘人其後稍稍爲儒所奪禆將唐宏知其必及禍恐并死乃誣告彦等潛召汴軍儒殺彦等以宏爲馬軍使張守一與吕用之同歸楊行密復爲諸將合仙丹又欲千軍府之政行密怒而殺之蔡將石璠將萬餘人㓂陳亳朱全忠遣朱珍葛從周將數千􅀐擊擒之癸亥以全忠爲蔡州四靣行營都統代時􅄎諸鎭兵皆受全忠節度張廷範至廣陵楊行密厚禮之及聞李璠來爲留後怒有不受之色廷範密使人白全忠宜自以大軍赴鎭全忠從之至宋州廷範自廣陵逃來曰行密未可圖也甲子李璠至言徐軍遮道全忠乃止丙寅錢鏐斬薛㓪剖其心以祭周寶以阮結爲潤州制置使二月朱全忠奏以楊行密爲淮南留後乙亥上不豫壬午發鳯翔己丑至長安庚寅赦天下攺元以韋昭度兼中書令魏愽節度使樂彦楨驕泰不法發六州民築羅城方八十里人苦其役其子從訓尤凶險既殺王鐸魏人皆惡之從訓聚亡命五百餘人爲親兵謂之子將牙兵疑之藉藉不安從訓懼易服逃出止於近縣彦禎因以爲相州刺史從訓遣人至魏運甲兵金帛交錯於路牙兵益疑彦禎懼請避位居龍興寺爲僧衆推都將趙文㺹知留後事從訓引兵三萬至城下文㺹不出戰衆復殺之推牙將貴鄉羅􅀪信知留後事先是人有言見白須翁言弘信當爲地主者文㺹既死衆羣聚呼曰誰欲爲節度使者弘信出應曰白須翁已命我矣衆環視曰可也遂立之弘信引兵出與從訓戰敗之從訓収餘衆保内黄魏人圍之先是朱全忠將討蔡州遣押牙雷鄴以銀萬兩請糴於魏牙兵既逐彦禎殺鄴於館從訓既敗乃求救於全忠初河陽節度使李罕之與河南尹張全義刻臂爲盟相得歡甚罕之勇而無謀性復貪暴意輕全義聞其勤儉力穡笑曰此田舍一夫耳全義聞之不以爲忤罕之屢求穀帛全義皆與之而罕之徴求無厭河南不能給小不如所欲輒械河南注吏至河陽杖之河南將佐皆憤怒全義曰李太傅所求柰何不與竭力奉之狀若畏之者罕之益驕罕之所部不耕稼專以剽掠爲資啗人爲糧至是悉其衆攻絳州絳州刺史王友遇降之進攻晉州護國節度使王重盈密結全義以圖之全義潛發屯兵夜乗虚襲河陽黎明入三城罕之踰垣步走全義盡俘其家遂兼領河陽節度使罕之奔澤州求救於李克用三月戊戌朔日有食之既己亥上疾復作壬寅大漸皇弟吉王保長而賢羣臣屬望十軍觀軍容使楊復恭請立其弟夀王傑是日下詔立傑爲皇太弟監軍國事右軍中尉劉季述遣兵迎傑於六王宅入居少陽院宰相以下就見之癸卯上崩于靈符殿遺制太弟傑更名敏以韋昭度攝冢宰昭宗即位體貌明粹有英氣喜文學以僖宗威令不振朝廷日卑有恢復前烈之志尊禮大臣夢想賢豪踐祚之始中外忻忻焉朱全忠裹糧於宋州將攻秦宗權㑹樂從訓來告急乃移軍屯滑州遣都押牙李唐賓等將步騎三萬攻蔡州遣都指揮使朱珍等分兵救樂從訓自白馬濟河下黎陽臨河李固三鎮進至内黄敗魏軍萬餘人獲其將周儒等十人李克用以其將康君立爲南面招討使督李存孝薛阿檀史儼安金俊安休休五將騎七千助李罕之攻河陽張全義嬰城自守城中食盡求救於朱全忠以妻子爲質王建攻彭州陳敬瑄救之乃去建大掠西川十二州皆被其患夏四月庚午追尊上母王氏曰恭憲皇后壬午孫儒襲楊州克之楊行密出走儒自稱淮南節度使行密將奔海陵袁襲勸歸廬州再爲進取之計從之朱全忠遣其將丁㑹葛從周牛存節將兵數萬救河陽李存孝令李罕之以步兵攻城自帥騎兵逆戰於温河東軍敗安休休懼罪奔蔡州汴人分兵欲斷太行路康君立等懼引兵還全忠表丁㑹爲河陽留後復以張全義爲河南尹㑹夀春人存節博昌人也全義徳全忠出已由是盡心附之全忠每出戰全義主給其糧仗無乏李罕之爲澤州刺史領河陽節度使罕之留其子頎事克用身還澤州專以宼鈔爲事自懷孟晉絳數百里間州無刺史縣無令長田無麥禾邑無煙火者殆將十年河中絳州之間有摩雲山絶高民保聚其上宼盜莫能近罕之攻拔之時人謂之李摩雲樂從訓移軍洹水羅弘信遣其將程公信撃從訓斬之與父彦禎皆梟首軍門癸巳遣使以厚幣犒全忠軍請修好全忠乃召軍還詔以羅弘信權知魏􅀶留後歸州刺史郭禹撃荆南逐王建肇建肇奔黔州詔以禹爲荆南留後荆南兵荒之餘止有一十七家禹厲精爲治撫集彫殘通商務農晚年殆及萬户時藩鎮各務兵力相殘莫以養民爲事獨華州刺史韓建招撫流散勸課農桑數年之間民富軍贍時人謂之北韓南郭秦宗權别將常厚據䕫州禹與其將汝陽許存攻奪之乆之朝廷以禹爲荆南節度使建肇爲武泰節度使禹奏復姓名爲成汭加李克用兼侍中五月己亥加朱全忠兼侍中趙徳諲既失荆南且度秦宗權必敗壬寅舉山南東道來降且自託於朱全忠全忠表請以徳諲自副制以山南東道爲忠義軍以徳諲爲節度使充蔡州四靣行營副都統朱全忠既得洛孟無西顧之憂乃大發兵擊秦宗權大破宗權於蔡州之南克北􅀜門宗權退守中州全忠分諸將爲二十八寨以環之加鳳翔節度使李茂貞檢校侍中陳敬瑄方與王建相攻貢賦中絶建以成都尚彊退無所掠欲罷兵周庠綦母諫以爲不可庠曰邛州城塹完固食支數年可據之以爲根本建曰吾在軍中乆觀用兵者不倚天子之重則衆心易離不若䟽敬瑄之罪表請朝廷命大臣爲帥而佐之則功庶可成乃使庠草表請討敬瑄以贖罪因求邛州顧彦㓪亦表請赦建罪移敬瑄它鎮以靖兩川初黄巢之亂上爲夀王從僖宗幸蜀時事出倉猝諸王多徒行至山谷中夀王疲乏不能前卧磻石上田令孜自後至趣之行王曰足痛幸軍容給一馬令孜曰此深山安得馬以鞭抶王使前王顧而不言心銜之及即位遣人監西川軍令孜不奉詔上方憤藩鎮跋扈欲以威制之㑹得彦㓪建表以令孜所恃者敬瑄耳六月以韋昭度兼中書令充西川節度使兼兩川招撫制置等使徵敬瑄爲龍武統軍王建軍新都時綿竹土豪何義陽安仁費師懃等所在擁兵自保衆或萬人少者千人建遣王宗瑤說之皆帥衆附於建給其資糧建軍復振置佑國軍於河南府以張全義爲節度使秋七月李罕之引河東兵宼河陽丁㑹擊却之升鳳州為節度府割興利州􅀠之以鳳州防禦使滿存爲節度使同平章事以權知魏博留後羅弘信為節度使八月戊辰朱全忠拔蔡州南城楊行密畏孫儒之逼欲輕兵襲洪州袁襲曰鍾􅀓定江西已乆兵强食足未易圖也趙鍠新得宣州怙亂殘暴衆心不附公宜卑辭厚幣說和州孫端上元張雄使自採石濟江侵其境彼必來逆戰公自銅官濟江㑹之破鍠必矣行密從之使蔡儔守廬州帥諸將濟自糝潭孫端張雄爲趙鍠所敗鍠將蘇塘漆朗將兵二萬屯曷山袁襲曰公引兵急趍曷山堅壁自守彼求戰不得謂我畏怯因其怠可破也行密從之塘等大敗遂圍宣州鍠兄乾之自池州帥衆救宣州行密使其將陶雅擊乾之于九華破之乾之奔江西以雅爲池州制置使九月朱全忠以饋運不繼且秦宗權殘破不足憂引兵還丙申遣朱珍將兵五千送楚州刺史劉瓉之官錢鏐遣其從弟銶將兵攻徐約于蘇州冬十月徐兵邀朱珍劉瓉不聴前珍等撃之取沛滕二縣斬獲萬計孟方立遣其將奚忠信將兵三萬襲遼州李克脩邀擊大破之擒忠信送晉陽辛卯葬惠聖恭定孝皇帝于靖陵廟號僖宗陳敬瑄田令孜聞韋昭度將至治兵完城以拒之十一月時􅄎自將步騎七萬屯吳康鎭朱珍與戰大破之朱全忠又遣别將攻宿州刺史張友降之丙申秦宗權别將攻陷許州執忠武留後王藴復取許州十二月蔡將申叢執宗權折其足而囚之降於全忠全忠表叢爲蔡州留後初感義節度使楊晟既失興鳳走據文龍成茂四州王建攻西川田令孜以晟已之故將假威戎軍節度使使守彭州王建攻彭州陳敬瑄眉州刺史山行章將兵五萬壁新繁以救之丁亥以韋昭度爲行營招討使山南西道節度使楊守亮副之東川節度使顧彦㓪爲行軍司馬割邛蜀黎雅置永平軍以王建爲節度使治邛州充行營諸軍都指揮使戊子削陳敬瑄官爵山南西道節度使楊守厚陷夔州資治通鑑卷第二百五十七
