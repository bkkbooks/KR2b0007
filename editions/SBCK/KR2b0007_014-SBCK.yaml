front:
  text: 資治通鑑卷第十四
  hash: sha256:23f4c43cda82ce68d135c1ef9c34fd7cb77f38e8216e9954063498ba60b8f976
body:
  text: 臣司馬光奉勑編集漢紀六光恊洽凡八年起閼逢困敦盡重太宗孝文皇帝中前三年冬十月丁酉晦日有食之十一月丁卯晦日有食之詔曰前遣列矦之國或辭未行丞相朕之所重其爲朕率列矦之國十二月免丞相勃遣就國乙亥以太尉灌嬰爲丞相罷太尉官屬丞相夏四月城陽景王章薨初趙王敖獻美人於髙祖得幸有娠及貫髙事發美人亦坐繫河內美人母弟趙兼因辟陽矦審食其言吕后吕后妬弗肯白美人已生子恚即自殺吏奉其子詣上上悔名之曰長令吕后母之而葬其母眞定後封長爲淮南王淮南王蚤失母常附吕后故孝惠吕后時得無患而常心怨辟陽矦以爲不彊爭之於吕后使其母恨而死也及帝即位淮南王自以最親驕蹇數不奉法上常寛假之是􅀊入朝從上入􅁐囿獵與上同車常謂上大兄王有材力能扛鼎乃往見辟陽矦自袖鐵椎椎辟陽矦令從者魏敬剄之馳走闕下肉袒謝罪帝傷其志為親故赦弗治當是時薄太后及太子諸大臣皆憚淮南王淮南王以此歸國益驕恣出入稱警蹕稱制擬於天子袁盎諫曰諸侯太驕必生患上不聽五月匈奴右賢王入居河南地侵盗上郡保塞蠻夷殺略人民上幸甘泉遣丞相灌嬰發車􅀐八萬五千詣髙奴擊右賢王發中尉材官屬衞將軍軍長安右賢王走岀塞上自甘泉之髙奴因幸太原見故羣臣皆賜之復晉陽中都民三􅀊租留游太原十餘日初大臣之誅諸吕也朱虚矦功尤大大臣許盡以趙地王朱虚矦盡以梁地王東牟矦及帝立聞朱虚東牟之初欲立齊王故絀其功及王諸子乃割齊二郡以王之興居自以失職奪功頗怏怏聞帝幸太原以爲天子且自擊胡遂發兵反帝聞之罷丞相及行兵皆歸長安以棘蒲矦柴武爲大將軍將四將軍十萬衆擊之祁矦繒賀爲將軍軍滎陽秋七月上自大原至長安詔濟北吏民兵未至先自定及以軍城邑降者皆赦之復官爵與王興居去來者赦之八月濟北王興居兵敗自殺初南陽張釋之爲􅀐郎十年不得調欲免歸􅀽盎知其賢而薦之爲謁者僕射釋之從行登虎圈上問上林尉諸禽獸簿十餘問尉左右視盡不能對虎圈嗇夫從旁代尉對上所問禽獸簿甚悉欲以觀其能口對響應無窮者帝曰吏不當若是邪尉無頼乃詔釋之拜嗇夫爲上林令釋之乆之前曰陛下以絳矦周勃何如人也上曰長者也又復問東陽矦張相如何如人也上復曰長者釋之曰夫絳矦東陽矦稱爲長者此兩人言事曾不能出口豈效此嗇夫喋喋利口捷給哉且秦以任刀筆之吏爭以亟疾苛察相髙其敝徒文具而無實不聞其過陵遲至於土崩今陛下以嗇夫口辨而超遷之臣恐天下隨風而靡爭爲口辯而無其實夫下之化上疾於景響舉錯不可不審也帝曰善乃不拜嗇夫上就車召釋之參乗徐行問釋之秦之敝具以質言至宫上拜釋之爲公車令頃之太子與梁王共車入朝不下司馬門於是釋之追止太子梁王無得入殿門遂劾不下公門不敬奏之薄太后聞之帝免冠謝教兒子不謹薄太后乃使使承詔赦太子梁王然後得入帝由是竒釋之拜爲中大夫頃之至中郎將從行至覇陵上謂羣臣曰嗟乎以北山石爲椁用紵絮斮陳漆其間豈可動哉左右皆曰善釋之曰使其中有可欲者雖錮南山猶有􅂩使其中無可欲者雖無石椁又何戚焉帝稱善是􅀊釋之爲廷尉上行出中渭橋有一人從橋下走乗輿馬驚於是使􅀐捕之屬廷尉釋之奏當此人犯蹕當罰金上怒曰此人親驚吾馬馬頼和柔令他馬固不敗傷我乎而廷尉乃當之罰金釋之曰法者天下公共也今法如是更重之是法不信於民也且方其時上使使誅之則已今已下廷尉廷尉天下之平也壹傾天下用法皆為之輕重民安所錯其手足唯陛下察之上良久曰廷尉當是也其後人有盜髙廟坐前玉環得帝怒下廷尉治釋之按盜宗廟服御物者爲奏當棄市上大怒曰人無道乃盗先帝器吾屬廷尉者欲致之族而君以法奏之非吾所以共承宗廟意也釋之免冠頓首謝曰法如是足也且罪等然以逆順爲差今盜宗廟器而族之有如萬分一假令愚民取長陵一抔土陛下且何以加其法乎帝乃白太后許之四年冬十二月潁隂懿矦灌嬰薨春正月甲午以御史大夫陽武張蒼爲丞相蒼好書博聞􅀹邃律歷上召河東守季布欲以爲御史大夫有言其勇使酒難近者至留邸一月見罷季布因進曰臣無功竊寵待罪河東陛下無故召臣此人必有以臣欺陛下者今臣至無所受事罷去此人必有毀臣者夫陛下以一人之譽而召臣以一人之毀而去臣臣恐天下有識聞之有以闚陛下之淺深也上黙然慙良乆曰河東吾股肱郡故特召君耳上議以賈誼任公卿之位大臣多短之曰洛陽之人年少初學專欲擅權紛亂諸事於是天子後亦䟽之不用其議以爲長沙王太傅絳矦周勃旣就國每河東守尉行縣至絳勃自畏恐誅常被甲令家人持兵以見之其後人有上書告勃欲反下廷尉廷尉逮捕勃治之勃恐不知置辭吏稍侵辱之勃以千金與獄吏獄吏乃書牘背示之曰以公主爲證公主者帝女也勃太子勝之尚之薄太后亦以爲勃無反事帝朝太后太后以冒絮提帝曰絳矦始誅諸吕綰皇帝璽將兵於北軍不以此時反今居一小縣顧欲反邪帝旣見絳矦獄辭乃謝曰吏方驗而出之於是使使持節赦絳矦復爵邑絳矦旣出曰吾嘗將百萬軍然安知獄吏之貴乎作顧成廟五年春二月地震初秦用半兩錢髙祖嫌其重難用更鑄莢錢於是物價騰踊米至石萬錢夏四月更造四銖錢除盗鑄錢令使民得自鑄賈誼諌曰法使天下公得雇租鑄銅錫爲錢敢雜以鈆鐵爲它巧者其罪黥然鑄錢之情非殽雜爲巧則不可得贏而殽之甚微爲利甚厚夫事有召禍而法有起姦今令細民人操造幣之埶各隱屏而鑄作因欲禁其厚利微姦雖黥罪日報其埶不止乃者民人抵罪多者一縣百數及吏之所疑搒笞犇走者甚衆夫縣法以誘民使入䧟阱孰多於此又民用錢郡縣不同或用輕錢百加若干或用重錢平稱不受法錢不立吏急而壹之乎則大爲煩苛而力不能勝縱而弗呵乎則市肆異用錢文大亂茍非其術何鄉而可哉今農事棄􅂢而采銅者日蕃釋其耒耨冶鎔炊炭姦錢日多五榖不爲多善人􅇶而爲姦邪愿民䧟而之刑戮刑戮將甚不詳柰何而忽國知患此吏議必曰禁之禁之不得其術其傷必大令禁鑄錢則錢必重重則其利深盜鑄如雲而起棄市之罪又不足以禁矣姦數不勝而法禁數潰銅使之然也銅布於天下其爲禍博矣故不如收之賈山亦上書諫以爲錢者亡用器也而可以易富貴富貴者人主之操柄也令民爲之是與人主共操柄不可長也上不聽是時太中大夫鄧通方寵幸上欲其富賜之蜀嚴道銅山使鑄錢吴王濞有豫章銅山招致天下亡命者以鑄錢東煑海水爲鹽以故無賦而國用饒足於是吴鄧錢布天下以帝分代爲二國立皇子武爲代王參爲太原王是􅀊徙代王武爲淮陽王以太原王參爲代王盡得故地六年冬十月桃李華淮南厲王長自作法令行於其國逐漢所置吏請自置相二千石帝曲意從之又擅刑殺不辜及爵人至􅀜内矦數上書不遜順帝重自切責之乃令薄昭與書風諭之引管蔡及代頃王濟北王興居以爲儆戒王不􅀃令大夫但士伍開章等七十人與棘蒲矦柴武太子竒謀以輦車四十乗反谷口令人使閩越匈奴事覺有司治之使使召淮南王王至長安丞相張蒼典客馮敬行御史大夫事與宗正廷尉奏長罪當棄市制曰其赦長死罪廢勿王徙處蜀郡嚴道卭郵盡誅所與謀者載長以輜車令縣以次傳之􅀽盎諫曰上素驕淮南王弗爲置嚴傅相以故至此淮南王爲人剛今暴摧折之臣恐卒逢霧露病死陛下有殺弟之名柰何上曰吾特苦之耳今復之淮南王果憤恚不食死縣傳至雍雍令發封以死聞上哭甚悲謂􅀽盎曰吾不聽公言卒亡淮南王今爲柰何盎曰獨斬丞相御史以謝天下乃可上即令丞相御史逮考諸縣傳送淮南王不發封餽侍者皆棄市以列矦葬淮南王於雍置守􅃁三十户匈奴單于遺漢書曰前時皇帝言和親事稱書意合􅂬漢邊吏侵侮右賢王右賢王不請聽後義盧矦難支等計與漢吏相距絶二主之約離兄弟之親故罰右賢王使之西求月氏擊之以天之福吏卒良馬力強以夷滅月氏盡斬殺降下定之樓蘭烏孫呼揭及其旁二十六國皆已爲匈奴諸引弓之民并爲一家北州以定願寢兵休士卒養馬除前事復故約以安邊民皇帝即不欲匈奴近塞則且詔吏民逺舍帝報書曰單于欲除前事復故約朕甚嘉之此古聖王之志也漢與匈奴約爲兄弟所以遺單于甚厚倍約離兄弟之親者常在匈奴然右賢王事已在赦前單于勿深誅單于若稱書意明吿諸吏使無負約有信敬如單于書後頃之冒頓死子稽粥立號曰老上單于老上單于􅀄立帝復遣宗室女翁主爲單于閼氏使宦者燕人中行􅀃􅀓翁主􅀃不欲行漢強使之􅀃曰必我也爲漢患者中行􅀃旣至因降單于單于甚親幸之初匈奴好漢繒絮食物中行􅀃曰匈奴人衆不能當漢之一郡然所以強者以衣食異無仰於漢也今單于變俗好漢物漢物不過什二則匈奴盡歸於漢矣其得漢繒絮以馳草棘中衣袴皆裂敝以示不如旃裘之完善也得漢食物皆去之以示不如湩酪之便美也於是􅀃教單于左右䟽記以計課其人衆畜牧其遺漢書牘及印封皆令長大倨傲其辭自稱天地所生日月所置匈奴大單于漢使或訾咲匈奴俗無禮義者中行􅀃輒窮漢使曰匈奴約朿徑易行君臣簡可乆一國之政猶一體也故匈奴雖亂必立宗種今中國雖云有禮義及親屬益踈則相殺奪以至易姓皆從此􅀋也嗟土室之人顧無多辭喋喋佔佔顧漢所輸匈奴繒絮米蘖令其量中必善美而已矣何以言爲乎且所給僃善則已不僃苦惡則􅇋秋熟以􅀐馳蹂而稼穡耳梁太傅賈誼上䟽曰臣竊惟今之事埶可爲痛哭者一可爲流涕者二可爲長太息者六若其它背理而傷道者難徧以䟽舉進言者皆曰天下已安已治矣臣獨以爲未也曰安且治者非愚則䛕皆非事實知治亂之體者也夫抱火厝之積薪之下而寢其上火未及然因謂之安方今之埶何以異此陛下何不壹令臣得孰數之於前因陳治安之䇿試詳擇焉使爲治勞智慮苦身體乏鍾鼓之樂勿爲可也樂與今同而加之諸矦􅁤道兵革不動匈奴賔服百姓素朴生爲明帝没爲明神名譽之美垂於無窮使顧成之廟稱爲太宗上配太祖與漢亡極立經陳紀爲萬丗灋雖有愚幼不肖之嗣猶得蒙業而安以陛下之明逹因使少知治體者得佐下風致此非難也夫樹國固必相疑之埶下數􅀍其殃上數爽其憂甚非所以安上而全下也今或親弟謀爲東帝親兄之子西鄕而擊今吴又見告矣天子春秋鼎盛行義未過德澤有加焉猶尚如是況莫大諸矦權力且十此者虖然而天下少安何也大國之王㓜弱未壯漢之所置傅相方握其事數年之後諸矦之王大抵皆冠血氣方剛漢之傅相稱病而賜罷彼自丞尉以上徧置私人如此有異淮南濟北之爲邪此時而欲爲治安雖堯舜不治黄帝曰日中必熭操刀必割今令此道順而全安甚易不肯蚤爲已乃墮骨肉之屬而抗剄之豈有異秦之季丗虖其異姓負彊而動者漢已幸而勝之矣又不易其所以然同姓襲是跡而動旣有徴矣其埶盡又復然殃旤之變未知所移明帝處之尚不能以安後丗將如之何臣竊跡前事大抵彊者先反長沙乃二萬五千户耳功少而最完埶䟽而最忠非獨性異人也亦形埶然也曩令樊酈絳灌據數十城而王今雖以殘亡可也令信越之倫列爲徹矦而居雖至今存可也然則天下之大計可知已欲諸王之皆忠附則莫若令如長沙王欲臣子勿菹醢則莫若令如樊酈等欲天下之治安莫若衆建諸矦而少其力力少則易使以義國小則亡邪心令海內之埶如身之使臂臂之使指莫不制從諸矦之君不敢有異心輻湊並進而歸命天子割地定制令齊趙楚各爲若干國使悼惠王幽王元王之子孫畢以次各受祖之分地地盡而止其分地衆而子孫少者建以爲國空而置之須其子孫生者舉使君之一寸之地一人之衆天子亡所利焉誠以定治而巳如此則卧赤子天下之上而安植遺腹朝委裘而天下不亂當時大治後世誦聖陛下誰憚而乆不爲此天下之埶方病大瘇一脛之大幾如要一指之大幾如股平居不可屈伸一二指搐身慮亡聊失今不治必爲錮疾後雖有扁鵲不能爲巳病非徒瘇也又苦􅏓盭元王之子帝之從弟也今之王者從弟之子也惠王之子親兄子也今之王者兄子之子也親者或亡分地以安天下䟽者或制大權以偪天子臣故曰非徒病瘇也又苦􅏓盭可痛哭者此病是也天下之埶方倒縣凡天子者天下之首何也上也蠻夷者天下之足何也下也今匈奴嫚侮侵掠至不敬也而漢􅀊致金絮采繒以奉之足反居上首顧居下倒縣如此莫之能解猶爲國有人乎可爲流涕者此也今不獵猛敵而獵田彘不搏反寇而搏畜莵翫細娛而不圖大患德可逺加而直數百里外威令不伸可爲流涕者此也今庶人屋壁得爲帝服倡優下賤得為后飾且帝之身自衣皁綈而富民牆屋被文繡天子之后以緣其領庶人孽妾以緣其履此臣所謂舛也夫百人作之不能衣一人欲天下亡寒胡可得也一人耕之十人聚而食之欲天下亡飢不可得也飢寒切於民之肌膚欲其亡爲姦邪不可得也可爲長太息者此也商君遺禮義棄仁恩并心於進取行之二􅀊秦俗日敗故秦人家富子壯則出分家貧子壯則出贅借父耰鉏慮有德色母取箕箒立而誶語抱哺其子與公併倨婦姑不相􅀃則反脣而相稽其慈子􅂄利不同禽獸者亡幾耳今其遺風餘俗猶尚未改棄禮誼􅂢廉恥日甚可謂月異而􅀊不同矣逐利不耳慮非顧行也今其甚者殺父兄矣而大臣特以簿書不報期㑹之閒以爲大故至於俗流失丗壞敗因恬而不知怪慮不動於耳目以爲是適然耳夫移風易俗使天下回心而鄉道類非俗吏之所能爲也俗吏之所務在於刀筆筐篋而不知大體陛下又不自憂竊爲陛下惜之豈如今定經制令君君臣臣上下有差父子六親各得其宜此業壹定丗丗常安而後有所持循矣若夫經制不定是猶度江河亡維楫中流而遇風波船必覆矣可爲長太息者此也夏殷周爲天子皆數十世秦爲天子二丗而亡人性不甚相逺也何三代之君有道之長而秦無道之暴也其故可知也古之王者太子乃生固舉以禮有司齊肅端冕見之南郊過闕則下過廟則趨故自爲赤子而教固巳行矣孩提有識三公三少明孝仁禮義以道習之逐去邪人不使見惡行於是皆選天下之端士孝悌博聞有道術者以衞翼之使與太子居處出入故太子乃生而見正事聞正言行正道左右前後皆正人也夫習與正人居之不能毋正猶生長於齊不能不齊言也習與不正人居之不能毋不正猶生長於楚之地不能不楚言也孔子曰少成若天性習貫如自然習與智長故切而不媿化與心成故中道若性夫三代之所以長乆者以其輔翼太子有此具也及秦而不然使趙髙􅀓胡亥而教之獄所習者非斬劓人則夷人之三族也胡亥今日即位而明日射人忠諫者謂之誹謗深計者謂之妖言其視殺人若艾草菅然豈惟胡亥之性惡哉彼其所以道之者非其理故也鄙諺曰前車覆後車誡秦丗之所以亟絶者其轍跡可見也然而不避是後車又將覆也天下之命縣於太子太子之善在於早諭教與選左右夫心未濫而先諭教則化易成也開於道術智誼之指則教之力也若其服習積貫則左右而巳夫胡粤之人生而同聲􅄝欲不異及其長而成俗累數譯而不能相通有雖死而不相爲者則教習然也臣故曰選左右早諭教最急夫教得而左右正則太子正矣太子正而天下定矣書曰一人有慶兆民頼之此時務也凡人之智能見巳然不能見將然夫禮者禁於將然之前而灋者禁於巳然之後是故灋之所爲用易見而禮之所爲生難知也若夫慶賞以􅂆善刑罰以懲惡先王執此之政堅如金石行此之令信如四時據此之公無私如天地豈顧不用哉然而曰禮云禮云者貴絶惡於未萌而起教於微眇使民日遷善逺辠而不自知也孔子曰聽訟吾猶人也必也使毋訟乎爲人主計者莫如先審取舍取舍之極定於内而安危之萌應於外矣秦王之欲尊宗廟而安子孫與湯武同然而湯武廣大其德行六七百􅀊而弗失秦王治天下十餘􅀊則大敗此亡他故矣湯武之定取舍審而秦王之定取舍不審矣夫天下大器也今人之置器置諸安處則安置諸危處則危天下之情與器無以異在天子之所置之湯武置天下於仁義禮樂累子孫數十丗此天下所共聞也秦王置天下於灋令刑罰旤幾及身子孫誅絶此天下之所共見也是非其明效大驗邪人之言曰聽言之道必以其事觀之則言者莫敢妄言今或言禮誼之不如灋令教化之不如刑罰人主胡不引殷周秦事以觀之也人主之尊譬如堂羣臣如陛衆庶如地故陛九級上廉逺地則堂髙陛無級廉近地則堂卑髙者難攀卑者易陵理埶然也故古者聖王制爲等列内有公卿大夫士外有公矦伯子男然後有官師小吏延及庶人等級分明而天子加焉故其尊不可及也里諺曰欲投䑕而忌器此善諭也䑕近於器尚憚不投恐傷其器況於貴臣之近主乎廉恥節禮以治君子故有賜死而亡戮辱是以黥劓之辠不及大夫以其離主上不逺也禮不敢齒君之路馬蹵其芻者有罰所以爲主上豫逺不敬也今自王矦三公之貴皆天子之所改容而禮之也古天子之所謂伯父伯舅也而令與衆庶同黥劓髠刖笞傌棄市之灋然則堂不無陛虖􅀍戮辱者不泰迫虖廉恥不行大臣無乃握重􅁠大官而有徒􅀠無恥之心虖夫望夷之事二丗見當以重灋者投䑕而不忌器之習也臣聞之履雖鮮不加於枕冠雖敝不以苴履夫嘗巳在貴寵之位天子改容而體貌之矣吏民嘗俯伏以敬畏之矣今而有過帝令廢之可也退之可也賜之死可也滅之可也若夫束縛之係緤之輸之司寇編之徒官司寇小吏詈罵而榜笞之殆非所以令衆庶見也夫卑賤者習知尊貴者之一旦吾亦乃可以加此也非所以尊尊貴貴之化也古者大臣有坐不廉而廢者不謂不廉曰簠簋不飾坐汙􅁾淫亂男女無别者不曰汙􅁾曰帷薄不脩坐罷軟不勝任者不謂罷軟曰下官不職故貴大臣定有其辠矣猶未斥然正以呼之也尚遷就而爲之諱也故其在大譴大何之域者聞譴何則白冠氂纓盤水加劒造請室而請辠耳上不執􅅞係引而行也其有中罪者聞命而自弛上不使人頸盭而加也其有大辠者聞命則北面再拜跪而自裁上不使人捽抑而刑之也曰子大夫自有過耳吾遇子有禮矣遇之有禮故羣臣自憙嬰以廉恥故人矝節行上設廉恥禮義以遇其臣而臣不以節行報其上者則非人􅀋也故化成俗定則爲人臣者皆顧行而忘利守節而伏義故可以託不御之權可以􅀉六尺之􅀌此厲廉恥行禮誼之所致也主上何喪焉此之不爲而顧彼之乆行故曰可爲長太息者此也誼以絳矦前逮繫獄卒無事故以此譏上上深納其言養臣下有節是後大臣有罪皆自殺不受刑七年冬十月令列矦太夫人夫人諸矦王子及吏二千石無得擅徴捕夏四月赦天下六月癸酉未央宫東闕罘罳災民有歌淮南王者曰一尺布尚可縫一斗粟尚可舂兄弟二人不相容帝聞而病之八年夏封淮南厲王子安等四人爲列矦賈誼知上必將復王之也上䟽諌曰淮南王之悖逆無道天下孰不知其辠陛下幸而赦遷之自疾而死天下孰以王死之不當今奉尊罪人之子適足以負謗於天下耳此人少壯豈能忘其父哉白公勝所爲父報仇者大父與叔父也白公爲亂非欲取國代主發忿快志剡手以衝仇人之匈固爲俱靡而巳淮南雖小黥布嘗用之矣漢存特幸耳夫擅仇人足以危漢之資於䇿不便予之衆積之財此非有子胥白公報於廣都之中即疑有剸諸荆軻起於兩柱之閒所謂假賊兵爲虎翼者也願陛下少留計上弗聽有長星岀于東方九年春大旱十年冬上行幸甘泉將軍薄昭殺漢使者帝不忍加誅使公卿從之飲酒欲令自引分昭不肯使羣臣喪服徃哭之乃自殺臣光曰李德􅁉以爲漢文帝誅薄昭断則明矣於義則未安也秦康送晉文興如存之感況太后尚存唯一弟薄昭断之不疑非所以慰母氏之心也臣愚以爲法者天下之公器惟善持法者親踈如一無所不行則人莫敢有所恃而犯之也夫簿昭雖素稱長者文帝不爲置賢師傅而用之典兵驕犯上至於殺漢使者非有恃而然乎若又從而赦之則與成哀之丗何異哉魏文帝嘗稱漢文帝之美而不取其殺薄昭曰舅后之家但當養育以恩而不當假借以權旣觸罪法又不得不害譏文帝之始不防閑昭也斯言得之矣然則欲慰母心者將愼之於始乎資治通鑑卷第十四
