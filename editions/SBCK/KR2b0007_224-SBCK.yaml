body:
  text: 臣司馬光奉勑編集唐紀四十陽赤奮若凡八年有竒起旃䝉大荒落閏月盡昭代宗睿文孝武皇帝中之上永泰元年閏十月乙巳郭子儀入朝子儀以靈武初復百姓彫弊戎落未安請以朔方軍糧使三原路嗣恭鎮之河西節度使楊志烈既死請遣使廵撫河西及置凉甘肅􅀲沙等州長史上皆從之丁未百官請納職田充軍糧許之戊申以户部侍郎路嗣恭為朔方節度使嗣恭披荆棘立軍府威令大行己酉郭子儀還河中初劒南節度使嚴武奏將軍崔旰為利州刺史時蜀中新亂山賊塞路旰討平之及武再鎮劒南賂山南西道節度使張獻誠以求旰獻誠使旰移疾自解詣武武以為漢州刺史使將兵擊吐蕃於西山連㧞其數城攘地數百里武作七寳轝迎旰入成都以寵之武薨行軍司馬杜濟知軍府事都知兵馬使郭英幹英乂之弟也與都虞侯郭嘉琳共請英乂為節度使旰時為西山都知兵馬使與所部共請大將王崇俊為節度使㑹朝廷已除英乂英乂由是銜之至成都數日即誣崇俊以罪而誅之召旰還成都旰辭以備吐蕃未可歸英乂愈怒絶其餽餉以困之旰轉徙入深山英乂自將兵攻之聲言助旰拒守㑹大雪山谷深數尺士馬凍死者甚衆旰出兵擊之英乂大敗收餘兵纔及千人而還英乂為政嚴暴驕奢不恤士卒衆心離怨􅀇宗之離蜀也以所居行宫為道士觀仍鑄金為真容英乂愛其竹樹茂美奏為軍營因徙去真容自居之旰宣言英乂反不然何以徙真容自居其處於是帥所部五千餘人襲成都辛亥戰于城西英乂大敗旰遂入成都屠英乂家英乂單騎奔簡州普州刺史韓澄殺英乂送首於旰卭州牙將柏茂琳瀘州牙將楊子琳劒州牙將李昌巙各舉兵討旰蜀中大亂旰衛州人也華原令顧繇上言元載子伯和等招權受賄十二月戊戌繇坐流錦州自安史之亂國子監室堂頽壊軍士多借居之祭酒蕭昕上言學校不可遂廢大曆元年春正月乙酉敕復補國子學生丙戌以户部尚書劉晏為都畿河南淮南江南湖南荆南山南東道轉運常平鑄錢鹽鐵等使侍郎第五琦為京畿闗内河東劒南山南西道轉運等使分理天下財賦常周智光至華州益驕横召之不至上命杜冕從張獻誠於山南以避之智光遣兵於商山邀之不獲智光自知罪重乃聚亡命無賴子弟衆至數萬縱其剽掠以恱其心擅留闗中所漕米二萬斛藩鎮貢獻往往殺其使者而奪之二月丁亥朔釋奠于國子監命宰相帥常參官魚朝恩帥六軍諸將往聽講子弟皆服朱紫為諸生朝恩既貴顯乃學講經為文僅能執筆辨章句遽自謂才兼文武人莫敢與之抗辛卯命有司修國子監元載專權恐奏事者攻訐其私乃請百官凡論事皆先白長官長官白宰相然後奏聞仍以上㫖諭百官曰比日諸司奏事煩多所言多讒毁故委長官宰相先定其可否刑部尚書顔真卿上疏以為諌官御史陛下之耳目今使論事者先白宰相是自掩其耳目也陛下患羣臣之為讒何不察其言之虚實若所言果虛宜誅之果實宜賞之不務為此而使天下謂陛下厭聽覧之煩託此為辭以塞諫争之路臣竊為陛下惜之太宗著司門式云其無門籍人有急奏者皆令門司與仗家引奏無得闗礙所以防壅蔽也天寳以後李林甫為相深疾言者道路以目上意不下逮下情不上達䝉蔽喑嗚卒成幸蜀之禍陵夷至于今日其所從來者漸矣夫人主大開不諱之路羣臣猶莫敢盡言况令宰相大臣裁而抑之則陛下所聞見者不過三數人耳天下之士從此鉗口結舌陛下見無復言者以為天下無事可論是林甫復起於今日也昔林甫雖擅權羣臣有不諮宰相輒奏事者則託以它事隂中傷之猶不敢明令百司奏事皆先白宰相也陛下儻不早寤漸成孤立後雖悔之亦無及矣載聞而恨之奏真卿誹謗乙未貶峽州别駕己亥命大理少卿楊濟修好於吐蕃壬子以杜鴻漸為山南西道劒南東西川副元帥劒南西川節度使以平蜀亂以四鎮北庭行營節度使馬璘兼邠寜節度使璘以叚秀實為三使都虞􅀱卒有能引弓重二百四十斤者犯盗當死璘欲生之秀實曰將有愛憎而法不一雖韓彭不能為理璘善其議竟殺之璘處事或不中理秀實力争之璘有時怒甚左右戰栗秀實曰秀實罪若可殺何以怒為無罪殺人恐涉非道璘拂衣起秀實徐步而出良久璘置酒召秀實謝之自是軍州事皆咨秀實而後行璘由是在邠寜聲稱殊美癸丑以山南西道節度使張獻誠兼劒南東川節度使卭州刺史柏茂琳為卭南防禦使以崔旰為茂州刺史充西山防禦使三月癸未獻誠與旰戰于梓州獻誠軍敗僅以身免旌節皆為旰所奪夏五月河西節度使楊休明徙鎮沙州秋八月國子監成丁亥釋奠魚朝恩執易升高座講鼎覆餗以譏宰相王縉怒元載怡然朝恩謂人曰怒者常情笑者不可測也杜鴻漸至蜀境聞張獻誠敗而懼使人先達意於崔旰許以萬全旰卑辭重賂以迎之鴻漸喜進至成都見旰但接以溫恭無一言責其干紀日與將佐髙會州府事悉以委旰又數薦之於朝因請以節制譲旰以柏茂琳楊子琳李昌巙各為本州刺史上不得已從之壬寅以旰為成都尹西川節度行軍司馬甲辰以魚朝恩行内侍監判國子監事中書舍人京兆常衮上言成均之任當用名儒不宜以宦者領之丁未命宰相以下送朝恩上京兆尹黎幹自南山引澗水穿漕渠入長安功竟不成冬十月乙未上生日諸道節度使獻金帛器服珍玩駿馬為壽共直緡錢二十四萬常衮上言以為節度使非能男耕女織必取之於人歛怨求媚不可長也請却之上不聽京兆用第五琦什一稅法民苦其重多流亡十一月甲子日南至赦改元悉停什一稅法十二月癸卯周智光殺陜州監軍張志斌智光素與陜州刺史皇甫温不恊志斌入奏事智光館之志斌責其部下不肅智光怒曰僕固懐恩不反正由汝輩激之我亦不反今日為汝反矣叱下斬之臠食其肉朝士舉選人畏智光之暴多自同州竊過智光遣將將兵邀之於路死者甚衆戊申詔加智光檢校左僕射遣中使余元仙持告身授之智光慢罵曰智光有大功於天下國家不與平章事而與僕射且同華地狹不足展才若益以陜虢商鄜坊五州庶猶可耳因厯數大臣過失且曰此去長安百八十里智光夜眠不敢舒足恐踏破長安城至於挾天子令諸侯惟周智光能之元仙股慄郭子儀屢請討智光上不許郭子儀以河中軍食常乏乃自耕百畒將校以是為差於是士卒皆不勸而耕是歲河中野無曠土軍有餘糧以隴右行軍司馬陳少逰為桂管觀察使少逰博州人也為吏彊敏而好賄善結權貴以是得進既得桂州惡其道逺多瘴癘宦官董秀掌樞密少逰請歲獻五萬緡又納賄於元載子仲武内外引薦數日改宣歙觀察使二年春正月丁巳密詔郭子儀討周智光子儀命大將渾瑊李懐光軍于渭上智光麾下聞之皆有離心己未智光大將李漢惠自同州帥所部降於子儀壬戌貶智光澧州刺史甲子華州牙將姚懐李延俊殺智光以其首來獻淮西節度使李忠臣入朝以收華州為名帥部兵大掠自潼闗至赤水二百里閒財畜殆盡官吏有衣紙或數日不食者己巳置潼闗鎮兵二千人壬申分劒南置東川觀察使鎮遂州二月丙戌郭子儀入朝上命元載王縉魚朝恩等互置酒於其第一㑹之費至十萬緡上禮重子儀常謂之大臣而不名郭曖嘗與昇平公主争言曖曰汝倚乃父為天子邪我父薄天子不為公主恚奔車奏之上曰此非汝所知彼誠如是使彼欲為天子天下豈汝家所有邪慰諭令歸子儀聞之囚曖入待罪上曰鄙諺有之不癡不聾不爲家翁兒女子閨房之言何足聽也子儀歸杖曖數十夏四月庚子命宰相魚朝恩與吐蕃盟于興唐寺杜鴻漸請入朝奏事以崔旰知西川留後六月甲戌鴻漸來自成都廣為貢獻因盛陳利害薦旰才堪寄任上亦務姑息乃留鴻漸復知政事秋七月丙寅以旰為西川節度使杜濟為東川節度使旰厚歛以賂權貴元載擢旰弟寛至御史中丞寛兄審至給事中丁卯魚朝恩奏以先所賜莊為章敬寺以資章敬太后冥福於是窮壯極麗盡都市之財不足用奏毁曲江及華清宫館以給之費逾萬億衞州進士高郢上書略曰先太后聖徳不必以一寺增輝國家永圗無寜以百姓為本捨人就寺何福之為又曰無寺猶可無人其可乎又曰陛下當卑宫室以夏禹為法而崇塔廟踵梁武之風乎又上書略曰古之明王積善以致福不費財以求福修徳以消禍不勞人以禳禍今興造急促晝夜不息力不逮者隨以榜笞愁痛之聲盈於道路以此望福臣恐不然又曰陛下廻正道於内心求微助於外物徇左右之過計傷皇王之大猷臣竊為陛下惜之皆寢不報始上好祠祀未甚重佛元載王縉杜鴻漸為相三人皆好佛縉尤甚不食葷血與鴻漸造寺無窮上嘗問以佛言報應果為有無載等奏以國家運祚靈長非宿植福業何以致之福業已定雖時有小災終不能為害所以安史悖逆方熾而皆有子禍僕固懐恩稱兵内侮出門病死回紇吐蕃大舉深入不戰而退此皆非人力所及豈得言無報應也上由是深信之常於禁中飯僧百餘人有冦至則令僧講仁王經以禳之冦去則厚加賞賜胡僧不空官至卿監爵為國公出入禁闥勢移權貴京畿良田美利多歸僧寺敕天下無得箠曵僧尼造金閣寺於五臺山鑄銅塗金為瓦所費鉅億縉給中書符牒令五臺僧數十人散之四方求利以營之載等每侍上從容多談佛事由是中外臣民承流相化皆廢人事而奉佛政刑日紊矣八月庚辰鳯翔等道節度使左僕射平章事李抱玉入朝固讓僕射言情確至上許之癸丑又讓鳯翔節度使不許丁酉杜鴻漸飯千僧以使蜀無恙故也九月吐蕃衆數萬圍靈州逰騎至潘原宜禄詔郭子儀自河中帥甲士三萬鎮涇陽京師戒嚴甲子子儀移鎮奉天山獠䧟桂州逐刺史李良冬十月戊寅朔方節度使路嗣恭破吐蕃於靈州城下斬首二千餘級吐蕃引去十二月庚辰盗發郭子儀父冢捕之不獲人以魚朝恩素惡子儀疑其使之子儀自奉天入朝朝廷憂其為變子儀見上上語及之子儀流涕曰臣久將兵不能禁暴軍士多發人冢今日及此乃天譴非人事也朝廷乃安是歲復以鎭西為安西新羅王憲英卒子乾運立三年春正月乙丑上幸章敬寺度僧尼千人贈建寜王倓為齊王二月癸巳商州兵馬使劉洽殺防禦使殷仲卿尋討平之甲午郭子儀禁無故軍中走馬南陽夫人乳母之子犯禁都虞􅀱杖殺之諸子泣訴於子儀且言都虞􅀱之横子儀叱遣之明日以事語僚佐而歎息曰子儀諸子皆奴材也不賞父之都虞􅀱而惜母之乳母子非奴材而何庚子以後宫獨孤氏為貴妃三月乙巳朔日有食之夏四月戊寅山南西道節度使張獻誠以疾舉從父弟右羽林將軍獻恭自代上許之壬寅西川節度使崔旰入朝初上遣中使徴李泌於衡山既至復賜金紫為之作書院於蓬萊殿側上時衣汗衫躡屨過之自給舍以上及方鎮除拜軍國大事皆與之議又使魚朝恩於白花屯為泌作外院使與親舊相見上欲以泌為門下侍郎同平章事泌固辭上曰機務之煩不得晨夕相見誠不若且居密近何必署敕然後為宰相邪後因端午王公妃主各獻服玩上謂泌曰先生何獨無所獻對曰臣居禁中自巾至履皆陛下所賜所餘獨一身耳何以為獻上曰朕所求正在此耳泌曰臣身非陛下有誰則有之上曰先帝欲以宰相屈卿而不能得自今既獻其身當惟朕所為不為卿有矣泌曰陛下欲使臣何為上曰朕欲卿食酒肉有室家受禄位為俗人泌泣曰臣絶粒二十餘年陛下何必使臣隳其志乎上曰泣復何益卿在九重之中欲何之乃命中使為泌葬二親又為泌娶盧氏女為妻資費皆出縣官賜第於光福坊令泌數日􅀫第中數日􅀫蓬萊院上與泌語及齊王倓欲厚加襃贈泌請用岐薛故事贈太子上泣曰吾弟首建靈武之議成中興之業岐薛豈有此功乎竭誠忠孝乃為讒人所害曏使尚存朕必以為太弟今當崇以帝號成吾夙志乙卯制追諡倓曰承天皇帝庚申葬順陵崔旰之入朝也以弟寛為留後瀘州刺史楊子琳帥精騎數千乗虚突入成都朝廷聞之戊辰加旰檢校工部尚書賜名寜遣還鎮六月壬辰幽州兵馬使朱希彩經略副使昌平朱泚泚弟滔共殺節度使李懐仙希彩自稱留後閏月成德節度使李寳臣遣將將兵討希彩為希彩所敗朝廷不得已宥之庚申以王縉領盧龍節度使丁卯以希彩知幽州留後崔寛與楊子琳戰數不利秋七月崔寜妾任氏出家財數十萬募兵得數千人帥以擊子琳破之子琳走乙亥王縉如幽州朱希彩盛兵嚴備以逆之縉晏然而行希彩迎謁甚恭縉度終不可制勞軍旬餘日而還回紇可敦卒庚辰以右散騎常侍蕭昕為弔祭使回紇庭詰昕曰我於唐有大功唐奈何失信市我馬不時歸其直昕曰回紇之功唐已報之矣僕固懐恩之叛回紇助之與吐蕃連兵入冦逼我郊畿及懐恩死吐蕃走然後回紇懼而請和我唐不忘前功加惠而縱之不然匹馬不歸矣乃回紇負約豈唐失信邪回紇慙厚禮而歸之丙戌内出盂蘭盆賜章敬寺設七廟神座書尊號於旛上百官迎謁於光順門自是歲以為常八月壬戌吐蕃十萬衆冦靈武丁卯吐蕃尚賛摩二萬衆冦邠州京師戒嚴邠寜節度使馬璘擊破之庚午河東節度使同平章事辛雲京薨以王縉領河東節度使餘如故九月壬申命郭子儀將兵五萬屯奉天以備吐蕃丁丑濟王環薨壬午朔方騎將白元光擊吐蕃破之壬辰元光又破吐蕃二萬衆於靈武鳯翔節度使李抱玉使右軍都將臨洮李晟將兵五千擊吐蕃晟曰以力則五千不足用以謀則太多乃將千人兼行出大震闗至臨洮屠吐蕃定秦堡焚其積聚虜堡帥慕容谷種而還吐蕃聞之釋靈州之圍而去戊戌京師解嚴頴州刺史李岵以事忤滑毫節度使令狐彰彰使節度判官姚奭按行頴州因代岵領州事且曰岵不受代即殺之岵知之因激怒將士使殺奭與奭同死者百餘人岵走依河南節度使田神功於汴州冬十月乙巳彰表言其狀岵亦上表自理上命給事中賀若察往按之丁卯郭子儀自奉天入朝十一月丁亥以幽州留後朱希彩為節度使郭子儀還河中元載以吐蕃連歲入冦馬璘以四鎮兵屯邠寜力不能拒而郭子儀以朔方重兵鎮河中深居腹中無事之地乃與子儀及諸將議徙璘鎮涇州而使子儀以朔方兵鎭邠州曰若以邊土荒殘軍費不給則以内地租稅及運金帛以助之諸將皆以為然十二月己酉徙馬璘爲涇原節度使以邠寜慶三州􅀠朔方璘先往城涇州以都虞􅀱叚秀實知邠州留後初四鎭北庭兵逺赴中原之難久羈旅數遷徙四鎮厯汴虢鳯翔北庭厯懐絳鄜然後至邠頗積勞弊及徙涇州衆皆怨誹刀斧兵馬使王童之謀作亂期以辛酉旦警嚴而發前夕有告之者秀實陽召掌漏者怒之以其失節令每更來白輒延之數刻遂四更而曙童之不果發秀實欲討之而亂迹未露恐軍中疑其寃告者又云今夕欲焚馬坊草因救火謀作亂中夕火果發秀實命軍中行者皆止坐者勿起各整部伍嚴守要害童之白請救火不許及旦捕童之及其黨八人皆斬之下令曰後徙者族流言者刑遂徙于涇癸亥西川破吐蕃萬餘衆平盧行軍司馬許杲將卒三千人駐濠州不去有窺淮南意淮南節度使崔圎令副使元城張萬福攝濠州刺史杲聞即提卒去止當塗是歲上召萬福以為和州刺史行營防禦使討杲萬福至州杲懼移軍上元又北至楚州大掠淮南節度使韋元甫命萬福追討之未至淮隂杲為其將康自勸所逐自勸擁兵繼掠循淮而東萬福倍道追而殺之免者什二三元甫將厚賞將士萬福曰官健常虗費衣糧無所事今方立小功不足過賞請用三之一四年春正月丙子郭子儀入朝魚朝恩邀之逰章敬寺元載恐其相結密使子儀軍吏告子儀曰朝恩謀不利於公子儀不聽吏亦告諸將將士請衷甲以從者三百人子儀曰我國之大臣彼無天子之命安敢害我若受命而來汝曹欲何為乃從家僮數人而往朝恩迎之驚其從者之約子儀以所聞告且曰恐煩公經營耳朝恩撫膺捧手流涕曰非公長者能無疑乎壬午流李岾於夷州乙酉郭子儀還河中辛卯賜李岵死二月壬寅以京兆之好畤鳯翔之麟遊普潤􅀠神策軍從魚朝恩之請也楊子琳既敗還瀘州招聚亡命得數千人㳂江東下聲言入朝涪州守捉使王守仙伏兵黄草峽子琳悉擒之擊守仙於忠州守仙僅以身免子琳遂殺夔州别駕張忠據其城荆南節度使衛伯玉欲結以為援以夔州許之為之請於朝陽曲人劉昌裔􅀃子琳遣使詣闕請罪子琳從之乙巳以子琳為峽州團練使初僕固懐恩死上憐其有功置其女宫中養以為女回紇請以為可敦夏五月辛卯冊為崇徽公主嫁回紇可汗壬辰遣兵部侍郎李涵送之涵奏祠部郎中虞鄉董晉為判官六月丁酉公主辭行至回紇牙帳回紇來言曰唐約我為市馬既入而歸我賄不足我於使人乎取之涵懼不敢對視晉晉曰吾非無馬而與爾為市為爾賜不既多乎爾之馬歲至吾數皮而歸資邊吏請致詰也天子念爾有勞故下詔禁侵犯諸戎畏我大國之爾與也莫敢校焉爾之父子寜而畜馬蕃者非我誰使之於是其衆皆環晉拜既又相帥南靣序拜皆舉兩手曰不敢有意大國戊申王縉表讓副元帥都統行營使許之辛酉郭子儀自河中遷于邠州其精兵皆自隨餘兵使禆將將之分守河中靈州軍士久家河中頗不樂徙往往自邠逃歸行軍司馬嚴郢領留府悉捕得誅其渠帥衆心乃定秋九月吐蕃宼靈州丁丑朔方留後常謙光擊破之河東兵馬使王無縱張奉璋等恃功驕蹇以王縉書生易之多違約束縉受詔發兵詣鹽州防秋遣無縱奉璋將步騎三千赴之奉璋逗遛不進無縱託它事擅入太原城縉悉擒斬之并其黨七人諸將悍戾者殆盡軍府始安冬十月常謙光奏吐蕃宼鳴沙首尾四十里郭子儀遣兵馬使渾瑊將銳兵五千救靈州子儀自將進至慶州聞吐蕃退乃還黄門侍郎同平章事杜鴻漸以疾辭位壬申許之乙亥薨鴻漸病甚令僧削髮遺令為塔以葬丙子以左僕射裴冕同平章事初元載為新平尉冕嘗薦之故載舉以為相亦利其老病易制受命之際蹈舞仆地載趨而扶之代為謝詞十二月戊戌冕薨五年春正月己巳羌酋白對蓬等各帥部落内屬觀軍容宣慰處置使左監門衛大將軍兼神策軍使内侍監魚朝恩專典禁兵寵任無比上常與議軍國事勢傾朝野朝恩好於廣座恣談時政陵侮宰相元載雖彊辯亦拱黙不敢應神策都虞􅀱劉希暹都知兵馬使王駕鶴皆有寵於朝恩希暹說朝恩於北軍置獄使坊市惡少年羅告富室誣以罪惡捕繫地牢訊掠取服籍沒其家貲入軍并分賞告捕者地在禁密人莫敢言朝恩每奏事以必允為期朝廷政事有不豫者輒怒曰天下事有不由我者邪上聞之由是不懌朝恩養子令徽尚幼為内給使衣緑與同列忿争歸告朝恩朝恩明日見上曰臣子官卑為儕輩所陵乞賜之紫衣上未應有司已執紫衣在前令徽服之拜謝上強笑曰兒服紫大宜稱心愈不平元載測知上指乗閒奏朝恩專恣不軌請除之上亦知天下共怨怒遂令載為方略朝恩每入殿常使射生將周皓將百人自衛又使其黨陜州節度使皇甫溫握兵於外以為援載皆以重賂結之故朝恩隂謀密語上一一聞之而朝恩不之覺也辛卯載為上謀徙李抱玉為山南西道節度使以温為鳯翔節度使外重其權實内温以自助也載又請割郿虢寳鷄鄠盩厔􅀠抱玉興平武功天興扶風􅀠神策軍朝恩喜於得地殊不以載為虞驕横如故壬辰加河南尹張延賞為東都留守罷河南等道副元帥以其兵屬留守延賞嘉貞之子也二月戊戌李抱玉徙鎮盩厔軍士憤怒大掠鳯翔坊市數日乃定劉希暹頗覺上意異以告魚朝恩朝恩始疑懼然上每見之恩禮益隆朝恩亦以此自安皇甫温至京師元載留之未遣因與温及周皓密謀誅朝恩既定計載白上上曰善圗之勿反受禍三月癸酉寒食上置酒宴貴近於禁中載守中書省宴罷朝恩將還營上留之議事因責其異圗朝恩自辯語頗悖慢皓與左右擒而縊殺之外無知者上下詔罷朝恩觀軍容等使内侍監如故詐云朝恩受詔乃自縊以尸還其家賜錢六百萬以葬丁丑加劉希暹王駕鶴御史中丞以慰安北軍之心丙戌赦京城繫囚命盡釋朝恩黨與且曰北軍將士皆朕爪牙並宜仍舊朕今親御禁旅勿有憂懼己丑罷度支使及闗内等道轉運常平鹽鐵使其度支事委宰相領之敕皇甫温還鎮于陜元載既誅魚朝恩上寵任益厚載遂志氣驕溢每衆中大言自謂有文武才略古今莫及弄權舞智政以賄成僣侈無度吏部侍郎楊綰典選平允性介直不附載嶺南節度使徐浩貪而佞傾南方珍貨以賂載辛卯載以綰為國子祭酒引浩代之浩越州人也載有丈人自宣州來從載求官載度其人不足任事但贈河北一書而遣之丈人不恱行至幽州私發書視之書無一言惟署名而已丈人大怒不得已試謁院僚判官聞有載書大驚立白節度使遣大校以箱受書館之上舍留宴數日辭去贈絹千匹其威權動人如此夏四月庚子湖南兵馬使臧玠殺觀察使崔灌澧州刺史楊子琳起兵討之取賂而還郷涇原節度使馬璘屢訴本鎮荒殘無以贍軍上諷李抱玉以鄭潁二州譲之乙巳以璘兼鄭頴節度使庚申王縉自太原入朝癸未以左羽林大將軍辛京杲為湖南觀察使荆南節度使衛伯玉遭母䘮六月戊戌以殿中監王昻代之伯玉諷大將楊鉥等拒昻留己甲寅制起復伯玉鎮荆南如故秋七月京畿饑斗米千錢劉希暹内常自疑有不遜語王駕鶴以聞九月辛未賜希暹死吐蕃冦永壽冬十一月郭子儀入朝上悉知元載所為以其任政日久欲全始終因獨見深戒之載猶不悛上由是稍惡之載以李泌有寵於上忌之言泌常與親故宴於北軍與魚朝恩親善宜知其謀上曰北軍泌之故吏也故朕使之就見親故朝恩之誅泌亦豫謀卿勿以為疑載與其黨攻之不已㑹江西觀察使魏少逰求参佐上謂泌曰元載不容卿朕今匿卿於魏少逰所俟朕决意除載當有信報卿可束裝來乃以泌為江西判官且屬少逰使善待之六年春二月壬寅河西隴右山南西道副元帥兼澤潞山南西道節度使李抱玉上言凡所掌之兵當自訓練今自河隴達于扶文綿亘二千餘里撫御至難若吐蕃兩道俱下臣保固汧隴則不救梁岷進兵扶文則冦逼闗輔首尾不贍進退無從願更擇能臣委以山南使臣得專備隴坻詔許之郭子儀還邠州嶺南蠻酋梁崇牽自稱平南十道大都統據容州與西原蠻張侯夏永等連兵攻䧟城邑前容管經略使元結等皆寄治藤梧經略使王翃至藤州以私財募兵不數月斬賊帥歐陽珪馳詣廣州見節度使李勉請兵以復容州勉以為難翃曰大夫如未暇出兵但乞移牒諸州揚言出千兵為援冀藉聲勢亦可成功勉從之翃乃與義州刺史陳仁璀藤州刺史李曉庭等結盟討賊翃募得三千餘人破賊數萬衆攻容州㧞之擒梁崇牽前後大小百餘戰盡復容州故地分命諸將襲西原蠻復鬰林等諸州先是畨禺賊帥馮崇道桂州叛將朱濟時皆據險為亂䧟十餘州官軍討之連年不克李勉遣其將李觀與翃併力攻討悉斬之三月五嶺皆平河北旱米斗千錢夏四月己未澧州刺史楊子琳入朝上優接之賜名猷庚申以典内董秀為内常侍吐蕃請和庚辰遣兼御史大夫呉損使于吐蕃成都司録李少良上書言元載姦􅂍隂事上置少良於客省少良以上語告友人韋頌殿中侍御史陸珽以告載載奏之上怒下少良頌珽御史臺獄御史奏少良頌珽凶險比周離間君臣五月戊申敕付京兆皆杖死秋七月丙午元載奏凡别敕除文武六品以下官乞令吏部兵部無得檢勘從之時載所奏擬多不遵法度恐為有司所駁故也八月丁卯淮西節度使李忠臣將兵二千屯奉天防秋上益厭元載所為思得士大夫之不阿附者為腹心漸收載權丙子内出制書以浙西觀察使李栖筠為御史大夫宰相不知載由是稍絀九月吐蕃下青石嶺軍于郱城郭子儀使人諭之明日引退是歲以尚書右丞韓滉為户部侍郎判度支自兵興以來所在賦歛無度倉庫出入無法國用虚耗滉為人亷勤精於簿領作賦歛出入之法御下嚴急吏不敢欺亦值連歲豐穰邊境無冦自是倉庫蓄積始充滉休之子也七年春正月甲辰回紇使者擅出鴻臚寺掠人子女所司禁之敺擊所司以三百騎犯金光朱雀門是日宫門皆閉上遣中使劉清潭諭之乃止三月郭子儀入朝丙午還邠州夏四月吐蕃五千騎至靈州尋退五月乙未赦天下秋七月癸巳回紇又擅出鴻臚寺遂長安令邵說至含光門街奪其馬說乘它馬而去弗敢争盧龍節度使朱希彩既得位悖慢朝廷殘虐將卒孔自官李懐瑗因衆怒伺閒殺之衆未知所從經略副使朱泚營於城北其弟滔將牙内兵潜使百餘人於衆中大言曰節度使非朱副使不可衆皆從之泚遂權知留後遣使言狀冬十月辛未以泚為檢校左常待幽州盧龍節度使十二月辛未置永平軍於滑州八年春正月昭義節度使相州刺史薛嵩薨子平年十二將士脅以為帥平偽許之既而讓其叔父㟧夜奉父喪逃歸鄉里壬午制以㟧知留後二月壬申永平節度使令狐彰薨彰承滑亳離亂之後治軍勸農府廪充實時藩鎮率皆䟦扈獨彰貢賦未嘗闕歲遣兵三千詣京西防秋自齎糧食道路供餽皆不受所過秋豪不犯疾亟召掌書記髙陽齊映與謀後事映勸彰請代人遣子歸私第彰從之遺表稱昔魚朝恩破史朝義欲掠滑州臣不聽由是有隙及朝恩誅值臣寢疾以是未得入朝生死愧負臣今必不起倉庫畜牧先已封籍軍中將士州縣官吏按堵待命伏見吏部尚書劉晏工部尚書李勉可委大事願速以代臣臣男建等今勒歸東都私第彰薨將士欲立建建誓死不從舉家西歸三月丙子以李勉為永平節度使吏部侍郎徐浩薛邕皆元載王縉之黨浩妾弟侯莫陳怤為美原尉浩屬京兆尹杜濟虚以知驛奏優又屬邕擬長安尉怤参臺御史大夫李栖筠劾奏其狀敕禮部侍郎萬年于邵等按之邵奏邕罪在赦前應原除上怒夏五月乙酉貶浩明州别駕邕歙州刺史丙戌貶濟杭州刺史邵桂州長史朝廷稍肅辛卯鄭王邈薨贈昭靖太子回紇自乾元以來歲求和市每一馬易四十縑動至數萬匹馬皆駑瘠無用朝廷苦之所市多不能盡其數回紇待遣繼至者常不絶於鴻臚至是上欲恱其意命盡市之秋七月辛丑回紇辭歸載賜遺及馬價共用車千餘乗八月己未吐蕃六萬騎冦靈武踐秋稼而去辛未幽州節度使朱泚遣弟滔將五千精騎詣涇州防秋自安禄山反幽州兵未嘗為用滔至上大喜勞賜甚厚壬申回紇復遣使者赤心以馬萬匹來求互市九月壬午循州刺史哥舒晃殺嶺南節度使吕崇賁據嶺南反癸未晉州男子郇摸以麻辮髮持竹筐葦席哭於東市人問其故對曰願獻三十字一字為一事若言無所取請以席裹尸貯筐中弃於野京兆以聞上召見賜新衣館於客省其言團者請罷諸州團練使也監者請罷諸道監軍使也魏博節度使田承嗣為安史父子立祠堂謂之四聖且求為相上令内侍孫知古因奉使諷令毁之冬十月甲辰加承嗣同平章事以褒之靈州破吐蕃萬餘衆吐蕃衆十萬冦涇邠郭子儀遣朔方兵馬使渾瑊將步騎五千拒之庚申戰于宜禄瑊登黄萯原望虜命據險布拒馬以備其馳突宿將史抗溫儒雅等意輕瑊不用其命瑊召使擊虜則己醉矣見拒馬曰野戰烏用此為命撤之叱騎兵衝虜陳不能入而返虜躡而乘之官軍大敗士卒死者什七八居民為吐蕃所掠千餘人甲子馬璘與吐蕃戰于鹽倉又敗璘為虜所隔逮暮未還涇原兵馬使焦令諶等與敗卒争門而入或勸行軍司馬叚秀實乘城拒守秀實曰大帥未知所在當前擊虜豈得茍自全乎召令諶等讓之曰軍法失大將麾下皆死諸君㤀其死邪令諶等惶恐拜請命秀實乃發城中兵未戰者悉出陳于東原且收散兵為將力戰狀吐蕃畏之稍却既夜璘乃得還郭子儀召諸將謀曰敗軍之罪在我不在諸將然朔方兵精聞天下今為虜敗何策可以雪恥莫對渾瑊曰敗軍之將不當復預議然願一言今日之事惟理瑊罪不則再見任子儀赦其罪使將兵趣朝那虜既破官軍欲掠汧隴鹽州刺史李國臣曰虜乗勝必犯郊畿我掎其後虜必返顧乃引兵趣秦原鳴鼔而西虜聞之至百城返渾瑊邀之於隘盡復得其所掠馬璘亦出精兵襲虜輜重於潘原殺數千人虜遂遁去乙丑以江西觀察使路嗣恭兼嶺南節度使討哥舒晃初元載嘗為西州刺史知河西隴右山川形勢是時吐蕃數為冦載言於上曰四鎮北庭既治涇州無險要可守隴山髙峻南連秦嶺北抵大河今國家西境盡潘原而吐蕃戍摧沙堡原州居其中間當隴山之口其西皆監牧故地草肥水羙平凉在其東獨耕一縣可給軍食故壘尚存吐蕃弃而不居每歲盛夏吐蕃畜牧青海去塞甚逺若乘間築之二旬可畢移京西軍戌原州移郭子儀軍戍涇州為之根本分兵守石門木峽漸開隴右進逹安西據吐蕃腹心則朝廷可髙枕矣并圗地形獻之密遣人出隴山商度功用㑹汴宋節度使田神功入朝上問之對曰行軍料敵宿將所難陛下奈何用一書生語欲舉國從之乎載尋得罪事遂寢有司以回紇赤心馬多請市千匹郭子儀以為如此逆其意太甚自請輸一嵗俸為國市之上不許十一月戊子命市六千匹資治通鑑卷二百二十四
