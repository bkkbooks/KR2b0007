front:
  text: 佐命新朝常非薄世祖故事既居朝端事多專决内外要職並用所親每與上爭用人上雖以事際須晏而心惡之嘗料簡世祖中詔得與晏手敕三百餘紙皆論國家事又得晏啟諫世祖以上領選事以此愈猜薄之始安王遥光勸上誅晏上曰晏於我有功且未有罪遥光曰晏尚不能為武帝安能為陛下乎上黙然上遣心腹左右陳世範等出塗巷採聽異言晏輕淺無防意望開府數呼相工自視云當大貴與賓客語好屏人請閑上聞之疑晏欲反遂有誅晏之意奉朝請鮮于文粲密探上㫖告晏有異志世範等又啟上云晏謀因四年南郊與世祖故主帥於道中竊􅀤㑹虎犯郊壇上愈懼未郊一日有敕停行先報晏及徐孝嗣孝嗣奉㫖而晏陳郊祀事大必宜自力上益信世範之言丙辰召晏於華林省誅之并北中郎司馬蕭毅臺隊主劉明達及晏子徳元徳和下詔云晏與毅明達以河東王鉉識用微弱謀奉以為主使守虛器晏弟詡為廣州刺史上遣南中郎司馬蕭季敞襲殺之季敞上之從祖弟也蕭毅奢豪好弓馬為上所忌故因事陷之河東王鉉先以年少才弱故未為上所殺鉉朝見常鞠躬俯僂不敢平行直視至是年稍長遂坐晏事免官禁不得與外人交通鬱林王之將廢也晏從弟御史中丞思逺謂晏曰兄荷世祖厚恩今一旦贊人如此事彼或可以權計相須未知兄將來何以自立若及此引决猶可保全門户不失後名晏曰方噉粥未暇此事及拜驃騎將軍集㑹子弟謂思逺兄思徵曰隆昌之末阿戎勸吾自裁若從其語豈有今日思逺遽應曰如阿戎所見今猶未晩也思逺知上外待晏厚而内已疑異乗間謂晏曰時事稍異兄亦覺不凡人多拙於自謀而巧於謀人晏不應思逺退晏方歎曰世乃有勸人死者旬日而晏敗上聞思逺言故不之罪仍遷侍中晏外弟尉氏阮孝緒亦知晏必敗晏屢至其門逃匿不見甞食醬美問知得於晏家吐而覆之及晏敗人為之懼孝緒曰親而不黨何懼之有卒免於罪二月壬戌魏主至太原甲子以左僕射徐孝嗣爲尚書令征虜將軍蕭季敞爲廣州刺史癸酉魏主至平城引見穆泰陸叡之黨問之無一人稱枉者時人皆服任城王澄之明穆泰及其親黨皆伏誅賜陸叡死於獄宥其妻子徙遼西爲民初魏主遷都變易舊俗并州刺史新興公丕皆所不樂帝以其宗室耆舊亦不之逼但誘示大理令其不生同異而已及朝臣皆變衣冠朱衣滿坐而丕獨胡服於其間晚乃稍加冠帶而不能修飾容儀帝亦不强也太子恂自平城將遷洛陽元隆與穆泰等密謀留恂因舉兵斷關規據陘北丕在并州隆等以其謀告之丕外慮不成口雖折難心頗然之及事覺丕從帝至平城帝毎推問泰等常令丕坐觀有司奏元業元隆元超罪當族丕應從坐帝以丕當受詔許以不死聽免死為民留其後妻二子與居于太原殺隆超同產乙升餘子徙敦煌初丕叡與僕射李冲領軍于烈俱受不死之詔叡既誅帝賜沖烈詔曰叡反逆之志自負幽㝠違誓在彼不闗朕也反逆旣異餘犯雖欲矜恕如何可得然猶不忘前言聽自死别府免其孥戮元丕二子一弟首為賊端連坐應死特恕為民朕本期始終而彼自棄絶違心乖念一何可悲故此别示想無致怪謀反之外皎如白日耳冲烈皆上表謝
