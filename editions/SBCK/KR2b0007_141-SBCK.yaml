body:
  text: 臣光曰夫爵禄廢置殺生予奪人君所以馭臣之大柄也是故先王之制雖有親故賢能功貴勤賓茍有其罪不直赦也必議於槐棘之下可赦則赦可宥則宥可刑則刑可殺則殺輕重視情寛猛隨時故君得以施恩而不失其威臣得以免罪而不敢自恃及魏則不然勳貴之臣往往豫許之以不死使彼驕而觸罪又從而殺之是以不信之令誘之使陷於死地也刑政之失無此為大焉是時代鄉舊族多與泰等連謀唯于烈一族無所染涉帝由是益重之帝以北方酋長及侍子畏暑聽秋朝洛陽春還部落時人謂之鴈臣三月己酉魏主南至離石叛胡請降詔宥之夏四月庚申至龍門遣使祀夏禹癸亥至蒲坂祀虞舜辛未至長安魏太子恂既廢頗自悔過御史中尉李彪密表恂復與左右謀逆魏王使中書侍郎邢蠻與咸陽王禧奉詔齎椒酒詣河陽賜恂死歛以麤棺常服瘞於河陽癸未魏大將軍宋明王劉昶卒於劉城追加九鍚葬以殊禮五月己丑魏主東還汎渭入河壬辰遣使祀周文王於豐武王於鎬六月庚申還洛陽壬戌魏􅀤冀定瀛相濟五州兵二十萬將入寇魏穆泰之反也中書監魏郡公穆羆與之通謀赦後事􅀤削官爵為民羆弟司空亮以府事付司馬慕容契上表自劾魏主優詔不許亮固請不己癸亥聽亮遜位丁夘魏分六師以定行留秋七月甲午魏立昭儀馮氏為皇后后欲母養太子恪恪母髙氏自代如洛陽暴卒於共縣戊辰魏以穆亮為征北大將軍開府儀同三司冀州刺史八月丙辰魏詔中外戒嚴壬戌魏立皇子愉為京兆王懌為清河王懐為廣平王追尊景皇所生王氏為恭太后甲戌魏講武於華林園庚辰軍􅀤洛陽使吏部尚書任城王澄居守以御史中丞李彪兼度支尚書與僕射李冲參治留臺事假彭城王􅎰中軍大將軍􅎰辭曰親踈並用古之道也臣獨何人頻煩寵授昔陳思求而不允愚臣不請而得何否泰之相逺也魏主大笑執􅎰手曰二曹以才名相忌吾與汝以道徳相親上遣軍王直閣將軍胡松助北襄城太守成公期戍赭陽軍主鮑舉助西汝南北義陽二郡太守黃瑶起戍舞陰魏以氐帥楊靈珍為南梁州刺史靈珍舉州來降送其母及子於南鄭以為質遣其弟婆羅阿卜珍將步騎萬餘襲魏武興王楊集始殺其二弟集同集衆集始窘急請降九月丁酉魏主以河南尹李崇為都督隴右諸軍事將兵數萬討之初魏遷洛陽荆州刺史薛真度勸魏主先取樊鄧真度引兵寇南陽太守房伯玉擊敗之魏主怒以南陽小郡志必㓕之遂引兵向襄陽彭城王􅎰等三十六軍前後相繼衆號百萬吹脣沸地辛丑魏主留諸將攻赭陽自引兵南下癸夘至宛夜襲其郛克之房伯玉嬰内城拒守魏主遣中書舎人孫延景謂伯玉曰我今蕩壹六合非如曏時冬來春去不有所克終不還北卿此城當我六龍之首無容不先攻取逺期一年近止一月封矦梟首事在俯仰宜善圖之且卿有三罪今令卿知卿先事武帝䝉殊常之寵不能建忠致命而盡節於其讎罪一也頃年薛真度來卿傷我偏師罪二也今鸞輅親臨不面縛麾下罪三也伯玉遣軍副樂稚柔對曰承欲攻圍期於必克卑微當人得抗大威真可謂獲其死所外臣䝉武帝採拔豈敢忘恩但嗣君失徳主上光紹大宗非唯副億兆之深望抑亦兼武皇之遺敕是以區區盡節不敢失墜往者北師深入寇擾邊民輒厲將士以脩職業返已而言不應垂責宛城東南隅溝上有橋魏主引兵過之伯玉使勇士數人衣班衣戴虎頭㡌伏於竇下突出擊之魏主人馬俱驚召善射者原靈度射之應􅁌而斃乃得免李崇槎山分道出氐不意表裏襲之羣氐皆棄楊靈珍散歸靈珍之衆减太半崇進據赤土靈珍遣從弟建帥五千人屯龍門自帥精勇一萬屯鷲硤龍門之北數十里中伐樹塞路鷲硤之口積大木聚礌石臨崖下之以拒魏兵崇命統軍慕容拒帥衆五千從它路夜襲龍門破之崇自攻鷲硤靈珍連戰敗走俘其妻子遂克武興梁州刺史陰廣宗參軍鄭猷等將兵救靈珍崇進擊大破之斬楊婆羅阿卜珍生擒猷等靈珍奔還漢中魏主聞之喜曰使朕無西顧之憂者李崇也以崇為都督梁秦二州諸軍事梁州刺史以安集其地丁未魏主發南陽留太尉咸陽王禧等攻之己酉魏主至新野新野太守劉思忌拒守冬十月丁巳魏軍攻之不克築長圍守之遣人謂城中曰房伯玉已降汝何為獨取糜碎思忌遣人對曰城中兵食猶多未暇從汝小虜語也魏右軍府長史韓顯宗將别軍屯赭陽成公期遣胡松引蠻兵攻其營顯宗力戰破之斬其裨將髙灋援顯宗至新野魏主謂曰卿破賊斬將殊益軍勢朕方攻堅城何為不作露布對曰頃聞鎮南將軍王肅獲賊二三人驢馬數匹皆為露布臣在東觀私常哂之近雖仰憑威靈得摧醜虜兵寡力弱擒斬不多脱復髙曵長縑虚張功烈尤而效之其罪彌大臣所以不敢為之解上而已魏主益賢之上詔徐州刺史裴叔業引兵救雍州叔業啟稱北人不樂逺行唯樂鈔掠若侵虜境則司雍之寇自然分矣上從之叔業引兵攻虹城獲男女四千餘人甲戌遣太子中庶子蕭衍右軍司馬張稷救雍州十一月甲午前軍將軍韓秀方等十五將降於魏丁酉魏敗齊兵於沔北將軍王伏保等為魏所獲丙辰以楊靈珍為北秦州刺史仇池公武都王新野人張䐗帥萬餘家據柵拒魏十二月庚申魏人攻拔雍州刺史曹虎與房伯玉不恊故緩救之頓軍樊城丁丑詔遣度支尚書崔慧景救雍州假慧景節帥衆二萬騎千匹向襄陽雍州衆軍並受節度庚午魏主南臨􅃆水戊寅還新野將軍王曇紛以萬餘人攻魏南青州黃郭戍魏戌主崔僧淵破之舉軍皆没將軍魯康祚趙公政將兵萬人侵魏太倉口魏豫州刺史王肅使長史清河傅永將甲士三千擊之康祚等軍於淮南永軍於淮北相去十餘里永曰南人好夜斫營必於渡淮之所置火以記淺處乃夜分兵為二部伏於營外又以瓠貯火密使人過淮南岸於深處置之戒曰見火起則亦然之是夜康祚等果引兵斫永營伏兵夾擊之康祚等走趣淮水火既競起不知所從溺死及斬首數千級生擒公政獲康祚之尸以歸豫州刺史裴叔業侵魏楚王戍肅復令永擊之永將心腹一人馳詣楚王戍令填外塹夜伏戰士千人於城外曉而叔業等至城東部分將置長圍永伏兵擊其後軍破之叔業留將佐守營自將精兵數千救之永登門樓望叔業南行數里即開門奮擊大破之獲叔業傘扇鼓幕甲仗萬餘叔業進退失據遂走左右欲追之永曰吾弱卒不滿三千彼精甲猶盛非力屈而敗自墮吾計中耳既不測我之虚實足使喪膽俘此足矣何更追之魏主遣謁者就拜永安逺將軍汝南太守封貝丘縣男永有勇力好學能文魏主常歎曰上馬能擊賊下馬作露板唯傅脩期耳曲江公遥欣好武事上以諸子尚幼内親則仗遥欣兄弟外親則倚后弟西中郎長史彭城劉暄内弟太子詹事江袥故以始安王遥光為揚州刺史居中用事遥欣為都督荆雍等七州諸軍事荆州刺史鎮據西面而遥欣在江陵多招材勇厚自封殖上甚惡之遥欣侮南郡太守劉季連季連密表遥欣有異迹上乃以季連為益州刺史使據遙欣上流以制之季連思考之子也是嵗髙昌王馬儒遣司馬王體􅀇入貢于魏請兵迎接求舉國内徙魏主遣明威將軍韓安保迎之割伊吾之地五百里以居儒衆儒遣左長史顧禮右長史金城麴嘉將步騎一千五百迎安保而安保不至禮嘉還髙昌安保亦還伊吾安保遣其屬朝興安等使髙昌儒復遣顧禮將世子義舒迎安保至白棘城去髙昌百六十里髙昌舊人戀土不願東遷相與殺儒立麴喜為王復臣於柔然安獨與顧禮馬義舒還洛陽永泰元年春正月癸未朔大赦加中軍大將軍徐孝嗣開府儀同三司孝嗣固辭魏統軍李佐攻新野丁亥拔之縛劉思忌問之曰今欲降未思忌曰寧為南鬼不為北臣乃殺之於是沔北大震戊子湖陽戍主蔡道福辛夘赭陽戍主成公期壬辰舞隂戍主黃瑶起南鄉太守席謙相繼南遁瑶起為魏所獲魏主以賜王肅肅臠而食之乙巳命太尉陳顯達救雍州上有疾以近親寡弱忌髙武子孫時髙武子孫猶有十王每朔望入朝上還後宫輒歎息曰我及司徒諸子皆不長髙武子孫日益長大上欲盡除髙武之族以微言問陳顯達對曰此等豈足介慮以問揚州刺史始安王遥光遥光以為當以次施行遥光有足疾上常令乗輿自望賢門入每與上屏人久語畢上索香火嗚咽流涕明日必有所誅㑹上疾暴甚絶而復蘇遥光遂行其策丁未殺河東王􅉗臨賀王子岳西陽王子文永陽王子峻南康王子琳衡陽王子珉湘東王子建南郡王子夏桂陽王昭粲巴陵王昭秀於是太祖世祖及世宗諸子皆盡矣􅉗等已死乃使公卿奏其罪狀請誅之下詔不許再奏然後許之南康侍讀濟陽江泌哭子琳淚盡繼之以血親視殯葬畢乃去庚戌魏主如南陽二月癸丑詔左衞將軍蕭惠休救夀陽甲子魏人拔宛北城房伯玉面縛出降伯玉從父弟思安為魏中統軍數為伯玉泣請魏主乃赦之庚午魏主如新野辛巳以彭城王􅎰為使持節都督南征諸軍事中軍大將軍開府儀同三司三月壬午朔崔慧景蕭衍大敗於鄧城時慧景至襄陽五郡已没慧景與衍及軍主劉山陽傅灋憲等帥五千餘人進行鄧城魏數萬騎奄至諸軍登城拒守時將士蓐食輕行皆有飢懼之色衍欲出戰慧景曰虜不夜圍人城待日暮自當去既而魏衆轉至慧景於南門拔軍去諸軍不相知相繼皆遁魏兵自北門入劉山陽與部曲數百人斷後死戰且戰且却行慧景過閙溝軍人相蹈藉橋皆斷壊魏兵夾路射之殺傅灋憲士卒赴溝死者相枕岳陽取襖仗填溝乗之得免魏主將大兵追之晡時至沔山陽據城苦戰至暮魏兵乃退諸軍恐懼是夕皆下船還襄陽庚寅魏主將十萬衆羽儀華蓋以圍樊城曹虎閉門自守魏主臨沔水望襄陽岸乃去如湖陽辛亥如懸瓠魏鎮南將軍王肅攻義陽裴叔業將兵五萬圍渦陽以救義陽魏南兖州刺史濟北孟表守渦陽糧盡食草木皮葉叔業積所殺魏人髙五丈以示城内别遣軍主蕭璝等攻龍亢魏廣陵王羽救之叔業引兵擊羽大破之追獲其節魏主使安逺將軍􅀓永征虜將軍劉藻假輔國將軍髙聰等救渦陽並受王肅節度叔業進擊大破之聰奔懸瓠永收散卒徐還叔業再戰凡斬首萬級俘三千餘人獲品械雜畜財物以千萬計魏主命鎖三將詣懸瓠劉藻髙聰免死徙平州傅永奪官爵黜王肅為平南將軍肅表請更遣軍救渦陽魏主報曰觀卿意必以藻等新敗故難於更往朕今少分兵則不及制敵多分兵則禁旅有闕卿審圖之義陽當止則止當下則下若失渦陽卿之過也肅乃解義陽之圍與統軍楊大眼奚康生等步騎十餘萬救渦陽叔業見魏兵盛夜引兵退明日士衆奔潰魏人追之殺傷不可勝數叔業還保渦口初魏中尉李彪家世孤微朝無親援初遊代都以清淵文穆公李冲好士傾心附之沖亦重其材學禮遇甚厚薦於魏主且為之延譽於朝公私汲引及為中尉彈劾不避貴戚魏主賢之以比汲黯彪自以結知人主不復藉冲稍稍疎之唯公坐歛袂而已無復宗敬之意冲浸銜之及魏主南伐彪與冲及任城王澄共掌留務彪性剛豪意議多所乖異數與冲爭辨形於聲色自以身為灋官它人莫能糾劾事多專恣冲不勝忿乃積其前後過惡禁彪於尚書省上表劾彪違傲髙亢公行僣逸坐輿禁省私取官材輙駕乗黃無所憚懾臣輙集尚書已下令史已上於尚書都座以彪所犯罪狀告彪訊其虛實彪皆伏罪請以見事免彪所居職付廷尉治罪冲又表稱臣與彪相識以來垂二十載見其才優學博議論剛正愚意誠謂拔萃公清之人後稍察其為人酷急猶謂益多損少自大駕南行以來彪兼尚書日夕共事始知其專恣無忌尊身忽物聽其言如振古忠恕之賢校其行寔天下佞暴之賊臣與任城卑躬曲己若順弟之奉暴兄其所欲者事雖非理無不屈從依事求實悉有成驗如臣列得實宜殛彪於北荒以除亂政之姦所引無證宜投臣於四裔以息青蠅之譛冲手自作表家人不知帝覽表歎悵久之曰不意留臺乃至於此既而曰道固可謂溢矣而僕射亦為滿也黃門侍郎宋弁素怨冲而與彪同州相善陰左右之有司處彪大辟帝宥之除名而已冲雅性愠厚收彪之際親數彪前後過失瞋目大呼投折几案御史皆泥首面􅅞冲詈辱肆口遂􅀤病荒悸言語錯繆時扼腕大罵稱李彪小人醫藥皆不能療或以爲肝裂旬餘而卒帝哭之悲不自勝贈司空冲勤敏彊力久處要劇文案盈積終日視事未嘗厭倦職業脩舉纔四十而髮白兄弟六人凡四母少時頗多忿競及冲貴禄賜皆與共之更成敦睦然多援引族姻私以官爵一家歳禄萬匹有餘時人以此少之魏主以彭城王􅎰爲宗師詔使督察宗室有不帥教者以聞夏四月甲寅改元大司馬㑹稽太守王敬則自以髙武舊將心不自安上雖外禮甚厚而内相疑備數訪問敬則飲食體幹堪宜聞其衰老且以居内地故得少寛前二嵗上遣領軍將軍蕭坦之將齋仗五百人行武進陵敬則諸子在都憂怖無計上知之遣敬則世子仲雄入東安尉之仲雄善琴上以蔡邕焦尾琴借之仲雄於御前鼓琴作懊憹歌曰常歎負情儂郎今果行許又曰君行不淨心那得惡人題上愈猜愧上疾屢危乃以光禄大夫張瓌為平東將軍吳郡太守置兵佐以密防敬則中外傳言當有異處分敬則聞之竊曰東今有誰只是欲平我耳東亦何易可平吾終不受金甖金甖謂鴆也敬則女為徐州行事謝朓妻敬則子太子洗馬幼隆遣正員將軍徐岳以情告脁為計若同者當往報敬則朓執岳馳啟以聞敬則城􅈰參軍徐庶家在京口其子密以報庶庶以告敬則五官王公林公林敬則族子也常所委信公林勸敬則急送啟賜兒死單舟星夜還都敬則令司馬張思祖草啟既而曰若爾諸郎在都要應有信且忍一夕其夜呼僚佐文武樗蒱謂衆曰卿諸人欲令我作何計莫敢先荅防閤丁興懐曰官衹應作爾敬則不應明旦召山陰令王詢臺傳御史鍾離祖願敬則橫刀跋坐問詢等發丁可得幾人庫見有幾錢物詢稱縣丁猝不可集祖願稱庫物多未輸入敬則怒將出斬之王公林又諫曰凡事皆可悔唯此事不可悔官詎不更思敬則唾其面曰我作事何闗汝小子丁卯敬則舉兵反招集配衣二三日便􅀤前中書令何􅅌棄官隠居若邪山敬則欲劫以為尚書令長史王弄璋等諫曰何令髙􅌃必不從不從便應殺之舉大事先殺名賢事必不濟敬則乃止􅅌尚之之孫也庚午魏發州郡兵二十萬人期八月中旬集懸瓠魏趙郡靈王幹卒上聞王敬則反收王幼隆及其兄員外郎世雄記室參軍季哲其弟太子舎人少安等皆殺之長子黃門郎元遷將千人在徐州撃魏敕徐州刺史徐􅀇慶殺之前吳郡太守南康侯子恪嶷之子也敬則起兵以奉子恪為名子恪亡走未知所在始安王遥光勸上盡誅髙武子孫於是悉召諸王侯入宫晉安王寳義江陵公寳覽等處中書省髙武諸孫處西省敕人各從左右两人過此依軍灋孩幼者與乳母俱入其夜令太醫煮椒二斛都水辦棺材數十具須三更當盡殺之子恪徒跣自歸二更達建陽門刺啟時刻已至而上眠不起中書舎人沈徽孚與上所親左右單景雋共謀少留其事須㬰上覺景雋啟子恪已至上驚問曰未邪未邪景雋具以事對上撫牀曰遥光幾誤人事乃賜王侯供饌明日悉遣還第以子恪為太子中庶子寳覽緬之子也敬則帥實甲萬人過浙江張瓌遣兵三千拒敬則於松江聞敬則軍鼓聲一時散走瓌棄郡逃民間敬則以舊將舉事百姓擔篙荷鍤隨之者十餘萬衆至晉陵南沙人范脩化殺縣令公上延孫以應之敬則至武進陵口慟哭而過烏程丘仲孚為曲阿令敬則前鋒奄至仲孚謂吏民曰賊乗勝雖鋭而烏合易離今若收船艦鑿長岡埭㵼瀆水以阻其路得留數日臺軍必至如此則大事濟矣敬則軍至值瀆涸果頓兵不得進五月壬午詔前軍司馬左興盛後軍將軍崔恭祖輔國將軍劉山陽龍驤將軍馬軍主胡松築壘於曲阿長岡右僕射沈文季為持節都督屯湖頭備京口路恭祖慧景之族也敬則急攻興盛山陽二壘臺軍不能敵欲退而圍不開各死戰胡松引騎兵突其後白丁無器仗皆驚散敬則軍大敗索馬再上不能得崔恭祖刺之仆地興盛軍客袁文曠斬之乙酉傳首建康是時上疾已篤敬則倉猝東起朝廷震懼太子寳卷使人上屋望見征虜亭失火謂敬則至急裝欲走敬則聞之喜曰檀公三十六策走為上䇿計汝父子唯有走耳蓋時人譏檀道濟避魏之語也敬則之來聲勢甚盛裁少日而敗臺軍討賊黨晉陵民以附敬則應死者甚衆太守王瞻上言愚民易動不足窮法上許之所全活以萬數瞻􅀪之從孫也上賞謝脁之功遷尚書吏部郎朓上表三讓上不許中書疑朓官未及讓國子祭酒沈約曰近世小官不讓遂成恒俗謝吏部今授超階讓别有意夫讓出人情豈闗官之大小邪朓妻常懐刃欲殺朓朓不敢相見秋七月魏彭城王􅎰表以一嵗國秩職俸親恤裨軍國之用魏主詔曰割身存國理為逺矣職俸便停親國聽三分受一壬午又詔損皇后私府之半六宫嬪御五服男女供恤亦減半在軍者三分省一以給軍賞癸夘以太子中庶子蕭衍為雍州刺史己酉上殂于正福殿遺詔徐令可重申前命沈文季可左僕射江祏可右僕射江祀可侍中劉暄可衞尉軍政事委陳太尉内外衆事無大小委徐孝嗣遥光坦之江袥其大事與沈文季江祀劉暄參懐心膂之任可委劉悛蕭惠休崔慧景上性猜多慮簡於出入竟不郊天又深信巫覡每出先占利害東出云西南出云北初有疾甚袐之聽覽不輟久之敕臺省文簿中求白魚以為藥外始知之太子即位八月辛亥魏太子自洛陽朝于懸瓠壬子奉朝請鄧學以齊興郡降魏魏主之入寇也遣使􅀤高車兵髙車憚逺役奉袁紇樹者爲主相帥北叛魏主遣征北將軍宇文福討之大敗而還福坐黜官更命平北將軍江陽王繼都督北討諸軍事以討之自懐朔以東悉稟節度仍攝鎮平城繼熈之曽孫也八月葬明皇帝於興安陵廟號髙宗東昏侯惡靈在太極殿欲速葬徐孝嗣固爭得踰月帝每當哭輙云喉痛太中大夫羊闡入臨無髮號慟俯仰幘遂脱地帝輟哭大笑謂左右曰秃鶖啼來乎九月己亥魏主聞髙宗殂下詔稱禮不伐喪引兵還庚子詔北伐髙車魏主得疾甚篤旬日不見侍臣左右唯彭城王􅎰等數人而已􅎰内侍醫藥外揔軍國之務逺近肅然人無異議右軍將軍丹楊徐謇善醫時在洛陽急召之既至􅎰涕泣執手謂曰君能已至尊之疾當獲意外之賞不然有不測之誅非但榮辱乃繫存亡􅎰又密為壇於汝水之濱依周公故事告天地及顯祖乞以身代魏主魏主疾有閒丙午發懸瓠舎于汝濱集百官坐徐謇于上席稱揚其功除鴻臚卿封金鄉縣伯賜錢萬緡諸王别餉賚各不減千匹冬十一月辛巳魏主如鄴戊子立妃褚氏為皇后魏江陽王繼上言髙車頑昧避役遁逃若悉追戮恐遂擾亂請遣使鎮别推檢斬魁首一人自餘加以慰撫若悔悟從役者即令赴軍詔從之於是叛者往往自歸繼先遣人慰諭樹者樹者亡入柔然尋自悔相帥出降魏主善之曰江陽可大任也十二月甲寅魏主自鄴班師林邑王諸農入朝海中值風溺死以其子文􅍁爲林邑王資治通鑑卷第一百四十一
