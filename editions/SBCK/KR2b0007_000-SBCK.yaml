  text: 資治通鑑序
  hash: sha256:a608098d7dcf792d0c8c866cc3fbbba5f4b61f3e012c6ab9b279b55ff72b6480
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0007_SBCK_295-8a}
body:
  text: 御製朕惟君子多識前言往行以畜其德故能剛健篤實輝光日新書亦曰王人求多聞時惟建事詩書春秋皆所以明乎得失之迹存王道之正垂鑑戒於後丗者也漢司馬遷􆉒石室金匱之書據左氏國語推丗本戰國策楚漢春秋采經摭傳罔羅天下放失舊聞考之行事馳騁上下數千載閒首記軒轅至于麟止作爲紀表丗家書傳後之述者不能易此體也惟其是非不謬於聖人襃貶岀於至當則良史之才矣􅀂稽古英考留神載籍萬機之暇未甞廢卷甞命龍圖閣直學士司馬光論次歷代君臣事迹俾就祕閣繙閱給吏史筆札起周威烈王訖于五代光之志以爲周積衰王室微禮樂征伐自諸矦岀平王東遷齊楚秦􅀳始大􅁊文更霸猶託尊王爲辭以服天下威烈王自陪臣命韓趙魏爲諸矦周雖未滅王制盡矣此亦古人述作造端立意之所繇也其所載明君良臣切摩治道議論之精語徳刑之善制天人相與之際休咎庶證之原威福盛衰之本規模利害之効良將之方略循吏之條敎斷之以邪正要之於治忽辭令淵厚之體箴諫深切之義良謂僃焉凡十六代勒成二百九十四卷列于戸牖之閒而盡古今之統博而得其要􅂤而周於事是亦典刑之緫㑹􅁽牘之淵林矣荀卿有言欲觀聖人之迹則於其粲然者矣後王是也􅀂夫漢之文宣唐之太宗孔子所謂吾無閒焉者自餘治丗盛王有慘怛之愛有忠利之敎或知人善任恭儉勤畏亦各得聖賢之一體孟軻所謂吾於武成取二三策而巳至于荒墜顚危可見前車之失亂賊姦宄厥有履霜之漸詩云商鑑不逺在夏后之丗故賜其書名曰資治通鑑以著朕之志焉耳治平四年十月初開經筵奉聖􅈲讀資治通鑑其月九日臣光初進讀面賜御製序令候書成日冩入資治通鑑序終
  hash: sha256:1e55551d95009eafd230823c3f484e7da4eb826b67e85cce9d17347ca2ab7fee
