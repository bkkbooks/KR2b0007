front:
  text: 資治通鑑卷第二百十一
  hash: sha256:d9fe446d472edfa90906643b21fbb03d9896f2f7ebe3916bf8c9b516c65acce8
body:
  text: 臣司馬光奉勑編集唐紀二十七圉大荒落凡四年起閼逢攝提格盡强􅀇宗至道大聖大明孝皇帝上之中開元二年春正月壬申制選京官有才識者除都督刺史都督刺史有政迹者除京官使出入常均永為恒式己卯以盧懷慎檢校黄門監舊制雅俗之樂皆􅀠太常上精曉音律以太常禮樂之司不應典倡優雜伎乃更置左右教坊以教俗樂命右驍衞將軍范及為之使又選樂工數百人自教法曲於梨園謂之皇帝梨園弟子又教宫中使習之又選伎女置宜春院給賜其家禮部侍郎張廷珪酸棗尉􅀽楚客皆上䟽以為上春秋鼎盛宜崇經術邇端士尚撲素深以恱鄭聲好遊獵為戒上雖不能用欲開言路咸嘉賞之中宗以來貴戚爭營佛寺奏度人為僧兼以偽妄富户彊丁多削髪以避徭役所在充滿姚崇上言佛圖澄不能存趙鳩摩羅什不能存秦齊襄梁武未免禍殃但使蒼生安樂即是佛身何用妄度姦人使壞正法上從之丙寅命有司沙汰天下僧尼以偽妄還俗者萬二千餘人初營州都督治栁城以鎮撫奚契丹則天之世都督趙文翽失政奚契丹攻陷之是後寄治於幽州東漁陽城或言靺鞨奚霫大欲降唐止以唐不建營州無所依投為黙啜所侵擾故且附之若唐復建營州則相帥歸化矣并州長史和戎大武等軍州節度大使薛訥信之奏請擊契丹復置營州上亦以冷陘之役欲討契丹羣臣姚崇等多諌甲申以訥同紫微黄門三品將兵擊契丹羣臣乃不敢言薛王業之舅王仙童侵暴百姓御史彈奏業為之請敕紫微黄門覆桉姚崇盧懷慎等奏仙童罪狀明白御史所言無所枉不可縱捨上從之由是貴戚束手二月庚寅朔太史奏太陽應虧不虧姚崇表賀請書之史冊從之乙未突厥可汗黙啜遣其子同俄特勒及妹夫火㧞頡利發石阿失畢將兵圍北庭都護府都護郭䖍瓘擊破之同俄單􅀐逼城下䖍瓘伏壯士於道側突起斬之突厥請悉軍中資糧以贖同俄聞其已死慟哭而去丁未敕自今所在母得創建佛寺舊寺頺壞應葺者詣有司陳牒檢視然後聽之閏月以鴻臚少卿朔方軍副大揔管王晙兼安北大都護朔方道行軍大揔管令豐安定逺三受降城及旁側諸軍皆受晙節度徙大都護府於中受降城置兵屯田丁卯復置十道桉察使以益州長史陸象先等爲之上思徐有功用法平直乙亥以其子大理司直惀爲㳟陵令竇孝諶之子光禄卿􅃎公希瑊等請以已官爵讓惀以報其德由是惀累遷申王府司馬丙子申王成義請以其府録事閻楚珪爲其府參軍上許之姚崇盧懷慎上言先嘗得㫖云王公駙馬有所奏請非墨敕皆勿行臣竊以量材授官當歸有司若緣親故之恩得以官爵為惠踵習近事實紊紀綱事遂寢由是請謁不行突厥石阿失畢既失同俄不敢歸癸未與其妻來奔以為右衛大將軍封燕北郡王命其妻曰金山公主或告太子少保劉幽求太子詹事鍾紹京有怨望語下紫微省按問幽求等不服姚崇盧懷慎薛訥言於上曰幽求等皆功臣乍就閑職微有沮䘮人情或然功業既大榮寵亦深一朝下獄慮驚逺聽戊子貶幽求為睦州刺史紹京為果州刺史紫㣲侍郎王琚行邉軍未還亦坐幽求黨貶澤州刺史敕涪州刺史周利貞等十三人皆天后時酷吏比周興等情狀差輕冝放歸草澤終身勿齒西突厥十姓酋長都擔叛三月己亥磧西節度使阿史那獻克碎葉等鎮擒斬都擔降其部落二萬餘帳御史中丞姜晦以宗楚客等改中宗遺詔青州刺史韋安石太子賔客韋嗣立刑部尚書趙彦昭特進致仕李嶠於時同為宰相不能匡正令監察御史郭震彈之且言彦昭拜巫趙氏為姑䝉婦人服與妻乘車詣其家甲辰貶安石為沔州别駕嗣立為岳州别駕彦昭為袁州别駕嶠為滁州别駕安石至􅃆州晦又奏安石嘗檢校定陵盜隱官物下州徵贓安石歎曰此秪應須我死耳憤恚而卒晦皎之弟也毁天樞發匠鎔其銅鐵歷月不盡先是韋后亦於天街作石臺髙數丈以頌功德至是并毁之夏四月辛巳突厥可汗黙啜復遣使求昬自稱乾和永清太駙馬天上得果報天男突厥聖天骨咄禄可汗五月己丑以嵗饑悉罷員外試檢校官自今非戰功及别敕毋得注擬己酉吐蕃相坌逹延遺宰相書請先遣解琬至河源正二國封疆然後結盟琬嘗為朔方大揔管故吐蕃請之前此琬以金紫光禄大夫致仕復召拜左散騎常侍而遣之又命宰相復坌逹延書招懷之琬上言吐蕃必隂懷叛計請預屯兵十萬於秦渭等州以備之黄門監魏知古本起小吏因姚崇引薦以至同為相崇意輕之請知古攝吏部尚書知東都選事遣吏部尚書宋璟於門下過官知古衘之崇二子分司東都恃其父有德於知古頗招權請託知古歸悉以聞它日上從容問崇卿子才性何如今何官也崇揣知上意對曰臣有三子兩在東都為人多欲而不謹是必以事干魏知古臣未及問之耳上始以崇必為其子隱及聞崇奏喜問卿安從知之對曰知古微時臣夘而翼之臣子愚以為知古必徳臣容其為非故敢干之耳上於是以崇為無私而薄知古負崇欲斥之崇固請曰臣子無狀撓陛下法陛下赦其罪已幸矣苟因臣逐知古天下必以陛下為私於臣累聖政矣上久乃許之辛亥知古罷為工部尚書宋王成器申王成義於上兄也岐王範薛王業上之弟也􅃎王守禮上之從兄也上素友愛近丗帝王莫能及􅀄即位爲長枕大被與兄弟同寢諸王每旦朝於側門退則相從宴飲􅃲雞擊毬或獵於近郊遊賞别墅中使存問相望於道上聽朝罷多從諸王遊在禁中拜跪如家人禮飲食起居相與同之於殿中設五幄與諸王更處其中謂之五王帳或講論賦詩間以飲酒􅀶弈遊獵或自執絲竹成器善笛範善琵琶與上更奏之諸王或有疾上為之終日不食終夜不寢業嘗疾上方臨朝須㬰之閒使者十返上親為業煑藥囘颷吹火誤􅅡上須左右驚救之上曰但使王飲此藥而愈須何足惜成器尤恭慎未嘗議及時政與人交結上愈信重之故讒閒之言無自而入然專以衣食聲色畜養娱樂之不任以職事羣臣以成器等地逼請循故事出刺外州六月丁巳以宋王成器兼岐州刺史申王成義兼􅃎州刺史􅃎王守禮兼虢州刺史令到官但領大綱自餘州務皆委上佐主之是後諸王為都護都督刺史者並準此丙寅吐蕃使其宰相尚欽藏來獻盟書上以風俗奢靡秋七月乙未制乘輿服御金銀器玩宜令有司銷毁以供軍國之用其珠玉錦繡焚於殿前后妃以下皆毋得服珠玉錦繡戊戌敕百官所服帶及酒器馬銜鐙三品以上聽飾以玉四品以金五品以銀自餘皆禁之婦人服飾從其夫子其舊成錦繡聽染為皂自今天下更毋得采珠玉織錦繡等物違者杖一百工人減一等罷兩京織錦坊臣光曰明皇之始欲為治能自刻厲節儉如此晩節猶以奢敗甚哉奢靡之易以溺人也詩云靡不有初鮮克有終可不慎哉薛訥與左監門衛將軍杜賔客定州刺史崔宣道等將兵六萬出檀州擊契丹賔客以為士卒盛夏負戈甲齎資糧深入冦境難以成功訥曰盛夏草肥羔犢孳息因糧於敵正得天時一舉滅虜不可失也行至灤水山峽中契丹伏兵遮其前後從山上擊之唐兵大敗死者什八九訥與數十騎突圍得免虜中嗤之謂之薛婆崔宣道將後軍聞訥敗亦走訥歸罪於宣道及胡將李思敬等八人制悉斬之於幽州庚子敕免訥死削除其官爵獨赦杜賔客之罪壬寅以北庭都護郭䖍瓘爲涼州刺史河西諸軍州節度使果州刺史鍾紹京心怨望數上䟽妄陳休咎乙巳貶溱州刺史丁未房州刺史襄王重茂薨輟朝三日追謚曰殤皇帝戊申禁百官家毋得與僧尼道士往還壬子禁人閒鑄佛冩經宋王成器等請獻興慶坊宅爲離宫甲寅制許之始作興慶宫仍各賜成器等宅環於宫側又於宫西南置樓題其西曰花蕚相輝之樓南曰勤政務本之樓上或登樓聞王奏樂則召升樓同宴或幸其所居盡歡賞賚優渥乙卯以􅄮王範兼絳州刺史薛王業兼同州刺史仍敕宋王以下每季二人入朝周而復始民間訛言上采擇女子以充掖庭上聞之八月乙丑令有司具車牛於崇明門自選後宫無用者載還其家敕曰燕寢之内尚令罷遣閭閻之間足可知悉乙亥吐蕃將坌逹延乞力徐帥衆十萬冦臨洮軍蘭州至于渭源掠取牧馬命薛訥白衣攝左羽林將軍爲隴右防禦使以右驍衞將軍常樂郭知運爲副使與太僕少卿王晙帥兵擊之辛巳大募勇士詣河隴就訥教習初鄯州都督楊矩以九曲之地與吐蕃其地肥饒吐蕃就之畜牧因以入㓂矩悔懼自殺乙酉太子賔客薛謙光獻武后所製豫州鼎銘其末云上􅀇降鑒方建隆基以爲上受命之符姚崇表賀且請宣示史官頒告中外臣光曰日食不驗太史之過也而君臣相賀是誣天也采偶然之文以爲符命小臣之謟也而宰相因而實之是侮其君也上誣於天下侮其君以明皇之明姚崇之賢猶不免於是豈不惜哉九月戊申上幸驪山温湯敕以歳稔傷農令諸州修常平倉法江嶺淮浙劔南地下濕不堪貯積不在此例突厥可汗黙啜衰老昏虐愈甚壬子葛邏禄等部落詣涼州降冬十月吐蕃復冦渭原丙辰上下詔欲親征發兵十餘萬人馬四萬匹戊午上還宫甲子薛訥與吐蕃戰於武街大破之時太僕少卿隴右羣牧使王晙帥所部二千人與訥㑹擊吐蕃坌逹延將吐蕃十萬屯大來谷晙選勇士七百衣胡服夜襲之多置鼓角於其後五里前軍遇敵大呼後人鳴鼔角以應之虜以爲大軍至驚懼自相殺傷死者萬計訥時在武街去大來谷二十里虜軍塞其中閒晙復夜出兵襲之虜大潰始得與訥軍合同追奔至洮水復戰於長城堡又敗之前後殺獲數萬人豐安軍使王海賔戰死乙丑敕罷親佂戊辰姚崇盧懷慎等奏頃者吐蕃以河爲境神龍中尚公主遂踰河築城置獨山九曲兩軍去積石三百里又於河上造橋今吐蕃既叛宜毁橋拔城從之以王海賔之子忠嗣爲朝散大夫尚輦奉御養之宫中己巳突厥可汗默啜又遣使求昬上許以來􅀊迎公主突厥十姓胡禄屋等諸部詣北庭請降命都護郭䖍瓘撫存之乙酉命左驍衛郎將尉遟瓌使天吐蕃宣慰金城公主吐蕃遣其大臣宗俄因矛至洮水請和用敵國禮上不許自是連嵗犯邊十一月辛卯葬殤皇帝丙申遣左散􅀐常侍解琬詣北庭宣慰突厥降者隨便宜區處十二月壬戌沙陀金山入朝甲子置隴右節度大使領嗣鄯奉河渭蘭臨武洮岷郭疊宕十二州以隴右防禦副使郭知運爲之乙丑立皇子嗣真爲鄫王嗣􅀄爲鄂王嗣玄爲鄄王辛巳立郢王嗣謙爲皇太子嗣真上之長子母曰劉華妃嗣謙次子也母曰趙麗妃麗妃以倡進有寵於上故立之是歳置幽州節度經略鎭守大使領幽平檀嬀燕六州突􅀐施可汗守忠之弟遮弩恨所分部落少於其兄遂叛入突厥請爲鄉導以伐守忠黙啜遣兵二萬擊守忠虜之而還謂遮弩曰汝叛其兄何有於我遂并殺之三年春正月癸卯以盧懷愼檢校吏部尚書兼黄門監懷愼清謹儉素不營資産雖貴爲卿相所得俸賜隨散親舊妻子不免飢寒所居不蔽風雨姚崇嘗有子喪謁告十餘日政事委積懷愼不能決惶恐入謝於上上曰朕以天下事委姚崇以卿坐鎭雅俗耳崇既出須㬰裁決俱盡頗有得色顧謂紫微舍人齊澣曰余爲相可比何人澣未對崇曰何如管晏澣曰管晏之法雖不能施於後猶能沒身公所為法隨復更之似不及也崇曰然則竟如何澣曰公可謂救時之相耳崇喜投筆曰救時之相豈易得乎懷慎與崇同為相自以才不及崇毎事推之時人謂之伴食宰相臣光曰昔鮑叔之於管仲子皮之於子産皆位居其上能知其賢而下之授以國政孔子美之曹參自謂不及蕭何一遵其法無所變更漢業以成夫不肖用事為其僚者愛身保禄而從之不顧國家之安危是誠罪人也賢智用事為其僚者愚惑以亂其治專固以分其權媢嫉以毁其功愎戾以竊其名是亦罪人也崇唐之賢相懷慎與之同心勠力以濟明皇太平之政夫何罪哉秦誓曰如有一介臣斷斷猗無它技其心休休焉其如有容人之有技若已有之人之彦聖其心好之不啻如自其口出是能容之以保我子孫黎民亦職有利哉懷慎之謂矣御史大夫宋璟坐􅁥朝堂杖人杖輕貶睦州刺史突厥十姓降者前後萬餘帳髙麗莫離支文簡十姓之壻也二月與􅎤跌都督思泰等亦自突厥帥衆來降制皆以河南地處之三月胡禄屋酋長支匐忌等入朝上以十姓降者浸多夏四月庚申以右羽林大將軍薛訥爲涼州鎭大揔管赤水等軍並受節度居涼州左衞大將軍郭䖍瓘爲朔州鎮大揔管和戎等軍並受節度居并州勒兵以僃黙啜黙啜發兵擊葛邏禄胡禄屋鼠尼施等屢破之敕北庭都護湯嘉惠左散􅀐常侍解琬等發兵救之五月壬辰敕嘉惠等與葛邏禄胡禄屋鼠尼施及定邉道大揔管阿史那獻互相應援山東大蝗民或於田旁焚香膜拜設祭而不敢殺姚崇奏遣御史督州縣捕而瘞之議者以爲蝗衆多除不可盡上亦疑之崇曰今蝗滿山東河南北之人流亡殆盡豈可坐視食苗曾不救乎借使除之不盡猶勝養以成災上乃從之盧懷慎以爲殺蝗太多恐傷和氣崇曰昔楚莊吞蛭而愈疾孫叔殺蛇而致福柰何不忍於蝗而忍人之饑死乎若使殺蝗有禍崇請當之秋七月庚辰朔日有食之上謂宰相曰朕每讀書有所疑滯無從質問可選儒學之士日使入內侍讀盧懷慎薦太常卿馬懷素九月戊寅以懷素為左散騎常侍使與右散騎常侍禇無量更日侍讀每至閤門令乘肩輿以進或在别館道逺聽於宫中乘馬親送迎之待以師傅之禮以無量羸老特爲之造􅆎輿在內殿令內侍舁之九姓思結都督磨散等來降己未悉除官遣還西南蠻宼邊遣右驍衛將軍李玄道發戎瀘䕫巴梁鳯等州兵三萬人并舊屯兵討之壬戌以涼州大揔管薛訥爲朔方道行軍大揔管太僕卿吕延祚靈州刺史杜賔客副之以討突厥甲子上幸鳯泉湯十一月己卯還京師劉幽求自杭州刺史徙郴州刺史憤恚甲申卒於道丁酉以左羽林大將軍郭䖍瓘兼安西大都護四鎭經略大使䖍瓘請募􅀜中兵萬人詣安西討擊皆給遞䭾及熟食敕許之將作大匠韋湊上䟽以爲今西域服從雖或時有小盗竊舊鎭兵足以制之􅀜中常宜充實以彊幹弱枝自頃西北二虜冦邊凡在丁壯征行略盡豈宜更募驍勇逺資荒服又一萬征人行六千餘里咸給遞䭾熟食道次州縣將何以供秦隴之西户口漸少涼州已往沙磧悠然遣彼居人如何取濟縱令必克其獲幾何儻稽天誅無乃甚損請計所用所得校其多少則知利害昔唐堯之代兼愛夷夏中外乂安漢武窮兵逺征雖多克獲而中國疲耗今論帝王之盛徳者皆歸唐堯不歸漢武况邀功不成者復何足比議乎時姚崇亦以䖍瓘之策為不然既而䖍瓘卒無功初監察御史張孝嵩奉使廓州還陳磧西利害請往察其形勢上許之聽以便宜從事枝汗那者古烏孫也内附嵗久吐蕃與大食共立阿了逹為王發兵攻之枝汗那王兵敗奔安西求救孝嵩謂都䕶吕休璟曰不救則無以號令西域遂帥旁側戎落兵萬餘人出龜茲西數千里下數百城長驅而進是月攻阿了逹于連城孝嵩自擐甲督士卒急攻自巳至酉屠其三城俘斬千餘級阿了逹與數騎逃入山谷孝嵩傳檄諸國威振西域大食康居大宛􅄢賔等八國皆遣使請降勒石紀功而還㑹有言其贓汚者坐繫涼州獄貶靈州兵曹參軍京兆尹崔日知貪暴不法御史大夫李傑將紏之日知反構傑罪十二月侍御史楊瑒廷奏曰若糾彈之司使姦人得而恐愒則御史臺可廢矣上遽命傑視事如故貶日知為歙縣丞或上言桉察使徒煩擾公私請精簡刺史縣令停桉察使上命召尚書省官議之姚崇以爲今止擇十使猶患未盡得人況天下三百餘州縣多數倍安得刺史縣令皆稱其職乎乃止尚書左丞韋玢奏郎官多不舉職請沙汰改授它官玢尋出爲刺史宰相奏擬兾州敕改小州姚崇奏言臺郎寛怠及不稱職玢請沙汰乃是奉公臺郎甫爾改官玢即貶黜於外議者皆謂郎官謗傷臣恐後來左右丞指以為戒則省事何從而舉矣伏望聖慈詳察使當官者無所疑懼乃除兾州刺史突騎施守忠既死黙啜兵還守忠部將蘇禄鳩集餘衆為之酋長蘇禄頗善綏撫十姓部落稍稍歸之有衆二十萬遂據有西方尋遣使入見是嵗以蘇禄為左羽林大將軍金方道經略大使皇后妹夫尚衣奉御長孫昕以細故與御史大夫李傑不協四年春正月昕與其妹夫楊仙玉於里巷伺傑而敺之傑上表自訴曰髪膚見毁雖則痛心冠冕被陵誠為辱國上大怒命於朝堂杖殺以謝百僚仍以敕書慰傑曰昕等朕之宻戚不能訓導使陵犯衣冠雖寘以極刑未足謝罪卿宜以剛腸疾惡勿以凶人介意丁亥宋王成器更名憲申王成美更名撝乙酉隴右節度使郭䖍瓘奏奴石良才等八人皆有戰功請除游擊將軍敕下盧懷慎等奏曰郭䖍瓘恃其㣲效􅂺侮彛章爲奴請五品實亂綱紀不可許上從之丙午以鄫王嗣眞爲安北大都護安撫河東闗内隴右諸蕃大使以安北大都護張知運為之副陜王嗣昇為安西大都護安撫河西四鎮諸蕃大使以安西都護郭䖍瓘為之副二王皆不出閤諸王遥領節度自此始二月丙辰上幸驪山温湯吐蕃圍松州丁卯上還宫辛未以尚書右丞倪若水為汴州刺史兼河南采訪使上雖欲重都督刺史選京官才望者為之然當時士大夫猶輕外任楊州采訪使班景倩入為大理少卿過大梁若水餞之行立望其行塵乆之乃返謂官屬曰班生此行何異登仙癸酉松州都督孫仁獻襲擊吐蕃於城下大破之上嘗遣宦官詣江南取鵁鶄鸂􅴞等欲置苑中使者所至煩擾道過汴州倪若水上言今農桑方急而羅捕禽鳥以供園池之翫逺自江嶺水陸傳送食以􅆝肉道路觀者豈不以陛下爲賤人而貴鳥乎陛下方當以鳯皇為凡鳥麒麟為凡獸況鵁鶄鸂􅴞曷足貴也上手敕謝若水賜帛四十叚縱散其鳥山東蝗復大起姚崇又命捕之倪若水謂蝗乃天災非人力所及宜修徳以禳之劉聦時常捕埋之為害益甚拒御史不從其命崇牒若水曰劉聦僞主徳不勝妖今日聖朝妖不勝徳古之良守蝗不入境若其修徳可免彼豈無徳致然若水乃不敢違夏五月甲辰敕委使者詳察州縣捕蝗勤惰者各以名聞由是連歳蝗災不至大饑或言於上曰今歳選叙太濫縣令非才及入謝上悉召縣令於宣政殿庭試以理人策惟鄄城令韋濟詞理第一擢為醴泉令餘二百餘人不入第且令之官四十五人放歸學問吏部侍郎盧從愿左遷豫州刺史李朝隱左遷滑州刺史從愿典選六年與朝隱皆名稱職􅀄髙宗之世馬載裴行儉在吏部最有名時人稱吏部前有馬裴後有盧李濟嗣立之子也有胡人上言海南多珠翠竒寶可往營致因言市舶之利又欲往師子國求靈藥及善醫之嫗寘之宫掖上命監察御史楊範臣與胡人偕往求之範臣從容奏曰陛下前年焚珠玉錦繡示不復用今所求者何以異於所焚者乎彼市舶與商賈爭利殆非王者之體胡藥之性中國多不能知況於胡嫗豈宜寘之宫掖夫御史天子耳目之官必有軍國大事臣雖觸冒炎瘴死不敢辭此特胡人眩惑求媚無益聖徳竊恐非陛下之意願熟思之上遽自引咎慰諭而罷之六月癸亥上皇崩于百福殿己巳以上女萬安公主為女官欲以追福癸酉㧞曵固斬突厥可汗黙啜首來獻時黙啜北擊㧞曵固大破之於獨樂水恃勝輕歸不復設僃遇㧞曵固迸卒頡質略自栁林突出斬之時大武軍子將郝靈荃奉使在突厥頡質略以其首歸之與偕詣闕懸其首於廣街㧞曵固回紇同羅霫僕固五部皆來降置於大武軍北黙啜之子小可汗立骨咄禄之子闕特勒擊殺之及黙啜諸子親信略盡立其兄左賢王黙棘連是爲毗伽可汗國人謂之小殺毗伽以國固讓闕特勒闕特勒不受乃以爲左賢王專典兵馬秋七月壬辰太常博士陳貞節蘇獻以太廟七室巳滿請遷中宗神主於别廟奉睿宗神主祔太廟從之又奏遷昭成皇后祔睿宗室肅明皇后留祀於儀坤廟八月乙巳立中宗廟於太廟之西辛未契丹李失活奚李大酺帥所部來降制以失活為松漠郡王行左金吾大將軍兼松漠都督因其八部落酋長拜為刺史又以將軍薛㤗督軍鎮撫之大酺為饒樂郡王行右金吾大將軍兼饒樂都督失活盡忠之從父弟也吐蕃復請和上許之突厥黙啜既死奚契丹㧞曵固等諸部皆内附突騎施蘇禄復自立為可汗突厥部落多離散毗伽可汗患之乃召黙啜時牙官暾欲谷以爲謀主暾欲谷年七十餘多智略國人信服之突厥降户處河曲者聞毗伽立多復叛歸之幷州長史王晙上言此屬徒以其國䘮亂故相帥來降若彼安寧必復叛去今置之河曲此屬桀黠實難制御往往不受軍州約束興兵剽掠聞其逃者已多與虜聲問往來通傳委曲乃是畜養此屬使為閒諜日月滋乆姦詐逾深窺伺邊隙將成大患虜騎南牧必為内應來逼軍州表裏受敵雖有韓彭不能取勝矣願以秋冬之交大集兵衆諭以利害給其資糧徙之内地二十年外漸變舊俗皆成勁兵雖一時暫勞然永乆安靖比者守邉將吏及出境使人多為䛕辭皆非事實或云北虜破滅或云降户妥帖皆欲自衒其功非能盡忠徇國願察斯利口勿忘逺慮議者必曰國家曏時已嘗寘降户於河曲皆獲安寧今何所疑此則事同時異不可不察曏者頡利既亡降者無復異心故得久安無變今北虜尚存此屬或畏其威或懷其惠或其親屬豈樂南來校之彼時固不侔矣以臣愚慮徙之内地上也多屯士馬大為之備華夷相參人勞費廣次也正如今日下也願審茲三策擇利而行縱使因徙逃亡得者皆為唐有若留至河冰恐必有變䟽奏未報降户􅎤跌思㤗阿悉爛等果叛冬十月甲辰命朔方大揔管薛訥發兵追討之王晙引并州兵西濟河晝夜兼行追擊叛者破之斬獲三千級先是單于副都護張知運悉収降户兵仗令度河而南降户怨怒御史中丞姜晦爲廵邉使降户訴無弓矢不得射獵晦悉還之降户得之遂叛張知運不設僃與之戰於青剛嶺爲虜所擒欲送突厥至綏州境將軍郭知運以朔方兵邀擊之大破其衆於黒山呼延谷虜釋張知運而去上以張知運䘮師斬之以徇毗伽可汗既得思泰等欲南入為冦暾欲谷曰唐主英武民和年豐未有間隙不可動也我衆新集力尚疲羸且當息養數年始可觀變而舉毗伽又欲築城并立寺觀暾欲谷曰不可突厥人徒稀少不及唐家百分之一所以能與為敵者正以隨逐水草居處無常射獵為業人皆習武彊則進兵抄掠弱則􅇡伏山林唐兵雖多無所施用若築城而居變更舊俗一朝失利必為所滅釋老之法教人仁弱非用武爭勝之術不可崇也毗伽乃止庚午葬大聖皇帝于橋陵廟號睿宗御史大夫李傑護橋陵作判官王旭犯贓傑按之反為所構左遷衢州刺史十一月己卯黄門􅁥盧懷慎疾亟上表薦宋璟李傑李朝隱盧從愿並明時重器所坐者小所弃者大望垂矜録上深納之乙未薨家無餘蓄惟一老蒼頭請自鬻以辦䘮事丙申以尚書左丞源乾曜為黄門侍郎同平章事姚崇無居第寓居罔極寺以病痁謁告上遣使問飲食起居狀日數十輩源乾曜奏事或稱㫖上輒曰此必姚崇之謀也或不稱㫖輙曰何不與姚崇議之乾曜常謝實然每有大事上常令乾曜就寺問崇癸卯乾曜請遷崇於四方館仍聽家人入侍疾上許之崇以四方館有簿書非病者所宜處固辭上曰設四方館為官吏也使卿居之爲社稷也恨不可使卿居禁中耳此何足辭崇子光禄少卿彛宗正少卿异廣通賔客頗受饋遺爲時所譏主書趙誨爲崇所親信受胡人賂事覺上親鞫問下獄當死崇復營救上由是不恱㑹曲赦京城敕特標誨名杖之一百流嶺南崇由是憂懼數請避相位薦廣州都督宋璟自代十二月上將幸東都以璟爲刑部尚書西京留守令馳驛詣闕遣内侍將軍楊思勗迎之璟風度凝逺人莫測其際在塗竟不與思勗交言思勗素貴幸歸訴於上上嗟歎良乆益重璟丙辰上幸驪山温湯乙丑還宫閏月己亥姚崇罷爲開府儀同三司源乾曜罷爲京兆尹西京留守以刑部尚書宋璟守吏部尚書兼黄門監紫微侍郎蘇頲同平章事璟為相務在擇人隨材授任使百官各稱其職刑賞無私敢犯顔正諫上甚敬憚之雖不合意亦曲從之突厥黙啜自則天世為中國患朝廷旰食傾天下之力不能克郝靈荃得其首自謂不世之功璟以天子好武功恐好事者競生心徼倖痛抑其賞逾年始授郎將靈荃慟哭而死璟與蘇頲相得甚厚頲遇事多讓於璟璟毎論事則頲為之助璟嘗謂人曰吾與蘇氏父子皆同居相府僕射寛厚誠為國器然獻可替否吏事精敏則黄門過其父矣姚宋相繼為相崇善應變成務璟善守法持正二人志操不同然恊心輔佐使賦役寛平刑罰清省百姓富庶唐世賢相前稱房杜後稱姚宋它人莫得比焉二人每進見上輙為之起去則臨軒送之及李林甫為相雖寵任過於姚宋然禮遇殊卑薄矣紫㣲舍人髙仲舒博通典籍齊澣練習時務姚宋每坐二人以質所疑既而歎曰欲知古問髙君欲知今問齊君可以無缺政矣辛丑罷十道按察使舊制六品以下官皆委尚書省奏擬是嵗始制員外郎御史起居遺補不擬五年春正月癸卯太廟四室壞上素服避正殿時上將幸東都以問宋璟蘇頲對曰陛下三年之制未終遽爾行幸恐未契天心災異為戒願且停車駕又問姚崇對曰太廟屋材皆苻堅時物嵗久朽腐而壞適與行期相㑹何足異也且王者以四海為家陛下以闗中不稔幸東都百司供擬己備不可失信但應遷神主於太極殿更修太廟如期自行耳上大喜從之賜崇絹二百匹己酉上行享禮於太極殿命姚崇五日一朝仍入閤供奉恩禮更厚有大政輒訪焉右散騎常侍禇无量上言隋文帝富有天下遷都之日豈取苻氏舊材以立太廟乎此特䛕臣之言耳願陛下克謹天戒納忠諫逺諂䛕上弗聽辛亥行幸東都過崤谷道隘不治上欲免河南尹及知頓使官宋璟諌曰陛下方事廵幸今以此罪二臣臣恐將來民受其􅁦上遽命釋之璟曰陛下罪之以臣言而免之是臣代陛下受徳也請令待罪朝堂而後赦之上從之二月甲戌至東都赦天下奚契丹既内附貝州刺史宋慶禮建議請復營州三月庚戌制復置營州都督於柳城兼平盧軍使管内州縣鎮戍皆如其舊以太子詹事姜師度為營田支度使與慶禮等築之三旬而畢慶禮清勤嚴肅開屯田八十餘所招安流散數年之閒倉廪充實市里浸繁夏四月甲戌賜奚王李大酺妃辛氏號固安公主己丑皇子嗣一卒追立為夏王謚曰悼嗣一母武惠妃攸止之女也突騎施酋長左羽林大將軍蘇禄部衆浸彊雖職貢不乏隂有窺邊之志五月十姓可汗阿史那獻欲發葛邏禄兵擊之上不許初上微時與太常卿姜皎親善及誅竇懷貞等皎預有功由是寵遇羣臣莫及常出入卧内與后妃連榻宴飲賞賜不可勝紀弟晦亦以皎故累遷吏部侍郎宋璟言皎兄弟權寵太盛非所以安之上亦以爲然秋七月庚子以晦爲宗正卿因下制曰西漢諸將以權貴不全南陽故人以優閑自保皎宜放歸田園散官勲封皆如故壬寅隴右節度使郭知運大破吐蕃於九曲安西副大都護湯嘉惠奏突􅀐施引大食吐蕃謀取四鎭圍鉢換及大石城已發三姓葛邏禄兵與阿史那獻擊之并州長史張嘉貞上言突厥九姓新降者散居太原以北請宿重兵以鎭之辛酉置天兵軍於并州集兵八萬以嘉貞爲天兵軍大使太常少卿王仁惠等奏則天立明堂不合古制又明堂尚質而窮極奢侈宻邇宫掖人神雜擾甲子制復以明堂爲乾元殿冬至元日受朝賀季秋大享復就圓丘九月中書門下省及侍中皆復舊名貞觀之制中書門下及三品官入奏事必使諫官史官隨之有失則匡正美惡必記之諸司皆於正牙奏事御史彈百官服豸冠對仗讀彈文故大臣不得專君而小臣不得爲讒慝及許敬宗李義府用事政多私僻奏事官多俟仗下於御坐前屏左右宻奏􅁥奏御史及待制官逺立以俟其退諫官御史皆隨仗出仗下後事不復預聞武后以法制羣下諌官御史得以風聞言事自御史大夫至􅁥察得互相彈奏率以險詖相傾覆及宋璟爲相欲復貞觀之政戊申制自今事非的須祕宻者皆令對仗奏聞史官自依故事冬十月癸酉伊闕人孫平子上言春秋譏魯躋僖公今遷中宗於别廟而祀睿宗正與魯同兄臣於弟猶不可躋況弟臣於兄可躋之於兄上乎若以兄弟同昭則不應出兄置於别廟願下羣臣博議遷中宗入廟事下禮官太常博士陳貞節馮宗蘇獻議以爲七代之廟不數兄弟殷代或兄弟四人相繼爲君若數以爲代則無祖禰之祭矣今睿宗之室當亞髙宗故爲中宗特立别廟中宗旣升新廟睿宗乃祔髙宗何嘗躋居中宗之上而平子引躋僖公爲證誣罔聖朝漸不可長時論多是平子上亦以爲然故議乆不决蘇獻頲之從祖兄也故頲右之卒從禮官議平子論之不已謫爲康州都城尉新廟成戊寅神主祔廟上命宋璟蘇頲爲諸皇子制名及國邑之號又令别制一佳名及佳號進之璟等上言七子均養著於國風今臣等所制名號各三十餘輒混同以進以彰陛下覆燾無偏之德上甚善之十一月丙申契丹王李失活入朝十二月壬午以東平王外孫楊氏爲永樂公主妻之祕書􅁥馬懷素奏省中書散亂訛缺請選學術之士二十人整比校補從之於是搜訪逸書選吏繕寫命國子博士尹知章桑泉尉韋述等二十人同刋正以左散􅀐常侍禇无量爲之使於乾元殿前編校羣書資治通鑑卷第二百一十一
