front:
  text: 資治通鑑卷第二百五
  hash: sha256:715ff413e78476243b7260fd65e62c414d77366400d2505555db3ebde504819a
body:
  text: 臣司馬光奉勑編集唐紀二十一兆涒灘凡五年起玄黓執徐盡柔則天順聖皇后中之上長壽元年正月戊辰朔太后享萬象神宫臘月立故于闐王尉遲伏闍雄之子瑕爲于闐王春一月丁卯太后引見存撫使所舉人無問賢愚悉加擢用髙者試鳯閣舍人給事中次試貟外郎侍御史􅀘闕拾遺校書郎試官自此始時人爲之語曰􅀘闕連車載拾遺平斗量欋推侍御史盌脱校書郎有舉人沈全交續之曰􅭢心存撫使眯目聖神皇爲御史紀先知所擒劾其誹謗朝政請杖之朝堂然後付法太后笑曰但使卿輩不濫何恤人言宜釋其罪先知大慙太后雖濫以禄位収天下人心然不稱職者尋亦黜之或加刑誅挾刑賞之柄以駕御天下政由巳出明察善㫁故當時英賢亦競爲之用寧陵丞廬江郭霸以諂䛕干太后拜監察御史中丞魏元忠病霸往問之因嘗其糞喜曰大夫糞甘則可憂今苦無傷也元忠大惡之遇人輒告之戊辰以夏官尚書楊執柔同平章事執柔恭仁弟之孫也太后以外族用之􅀄隋煬帝作東都無外城僅有短垣而巳至是鳯閣侍郎李昭徳始築之左臺中丞來俊臣羅告同平章事任知古狄仁傑裴行本司農卿裴宣禮前文昌左丞盧獻御史中丞魏元忠潞州刺史李嗣真謀反先是來俊臣奏請降敕一問即承反者得減死及知古等下獄俊臣以此誘之仁傑對曰大周革命萬物惟新唐室舊臣甘從誅戮反是實俊臣乃少寛之判官王徳壽謂仁傑曰尚書定減死矣徳壽業受驅䇿欲求少階級煩尚書引楊執柔可乎仁傑曰皇天后土遣狄仁傑爲如此事以頭觸柱血流􅀍面徳壽懼而謝之矦思止鞠魏元忠元忠辭氣不屈思止怒命倒曵之元忠曰我薄命譬如墜驢足絓於鐙爲所曵耳思止愈怒更曵之元忠曰矦思止汝若須魏元忠頭則截取何必使承反也狄仁傑既承反有司待報行刑不復嚴備仁傑裂衾帛書寃狀置綿衣中謂王徳壽曰天時方􅀬請授家人去其綿徳壽許之仁傑子光逺得書持之稱變得召見則天覽之以問俊臣對曰仁傑等下獄臣未嘗褫其巾帶寢處甚安苟無事實安肯承反太后使通事舍人周綝往視之俊臣暫假仁傑等巾帶羅立於西使綝視之綝不敢視惟東顧唯諾而巳俊臣又詐爲仁傑等謝死表使綝奏之樂思晦男未十嵗没入司農上變得召見太后問狀對曰臣父巳死臣家巳破但惜陛下法爲俊臣等所弄陛下不信臣言乞擇朝臣之忠清陛下素所信任者爲反狀以付俊臣無不承反矣太后意稍寤召見仁傑等問曰卿承反何也對曰不承則巳死於拷掠矣太后曰何爲作謝死表對曰無之出表示之乃知其詐於是出此七族庚午貶知古江夏令仁傑彭澤令宣禮夷陵令元忠涪陵令獻西郷令流行本嗣真于嶺􅀯俊臣與武承嗣等固請誅之太后不許俊臣乃獨稱行本罪尤重請誅之秋官郎中徐有功駮之以爲明主有更生之恩俊臣不能將順虧損恩信殿中侍御史貴郷霍獻可宣禮之甥也言於太后曰陛下不殺裴宣禮臣請隕命於前以頭觸殿階血流霑地以示爲人臣不私其親太后皆不聽獻可常以緑帛褁其傷微露之於幞頭下冀太后見之以爲忠甲戌􅀘闕薛謙光上䟽以爲選舉之法冝得實才取捨之間風化所繫今之選人咸稱覔舉奔競相尚諠訴無慙至於才應經􅀖惟令試䇿武能制敵止驗彎弧昔漢武帝見司馬相如賦恨不同時及置之朝廷終文園令知其不堪公卿之任故也呉起將戰左右進劎起曰將者提鼔揮桴臨難決疑一劎之任非將事也然則虚文豈足以佐時善射豈足以克敵要在文吏察其行能武吏􅀚其勇略考居官之臧否行舉者賞罸而巳來俊臣求金於左衛大將軍泉獻誠不得誣以謀反下獄乙亥縊殺之庚辰司刑卿檢校陜州剌史李游道爲冬官尚書同平章事二月己亥吐蕃党項部落萬餘人内附分置十州戊午以秋官尚書袁智弘同平章事夏四月丙申赦天下攺元如意五月丙寅禁天下屠殺及捕魚蝦江淮旱饑民不得采魚蝦餓死者甚衆右拾遺張徳生男三日私殺羊㑹同僚􅀘闕杜肅懐一餤上表告之明日太后對仗謂徳曰聞卿生男甚喜徳拜謝太后曰何從得肉徳叩頭服罪太后曰朕禁屠宰吉凶不預然卿自今召客亦須擇人出肅表示之肅大慙舉朝欲唾其面吐蕃酋長曷蘇帥部落請内附以右玉鈐衛將軍張玄遇爲安撫使將精卒二萬迎之六月軍至大渡水西曷蘇事洩爲國人所擒别部酋長昝捶帥羌蠻八千餘人内附玄遇以其部落置萊川州而還辛亥萬年主簿徐堅上䟽以爲書有五聽之道令著三覆之奏竊見比有敕推按反者令使者得實即行斬決人命至重死不再生萬一懐枉吞聲赤族豈不痛哉此不足肅姦逆而明典刑適所以長威福而生疑懼臣望絶此處分依法覆奏又法官之任冝加簡擇有用法寛平爲百姓所稱者願親而任之有處事深酷不允人望者願踈而退之堅齊聃之子也夏官侍郎李昭徳密言於太后曰魏王承嗣權太重太后曰吾姪也故委以腹心昭徳曰姪之於姑其親何如子之於父子猶有簒弑其父者況姪乎今承嗣既陛下之姪爲親王又爲宰相權侔人主臣恐陛下不得乆安天位也太后矍然曰朕未之思秋七月戊寅以文昌左相同鳯閣鸞臺三品武承嗣爲特進納言武攸寧爲冬官尚書夏官尚書同平章事楊執柔爲地官尚書並罷政事以秋官侍郎新鄭崔元綜爲鸞臺侍郎夏官侍郎李昭徳為鳯閣侍郎檢校天官侍郎姚璹爲文昌左丞檢校地官侍郎李元素爲文昌右丞與司賔卿崔神基並同平章事璹思廉之孫元素敬玄之弟也辛巳以營繕大匠王璿爲夏官尚書同平章事承嗣亦毁昭徳於太后太后曰吾任昭徳始得安眠此代吾勞汝勿言也是時酷吏恣横百官畏之側足昭徳獨廷奏其姦太后好祥瑞有獻白石赤文者執政詰其異對曰以其赤心昭徳怒曰此石赤心它石盡反邪左右皆笑襄州人胡慶以丹漆書􅀛腹曰天子萬萬年詣闕獻之昭徳以刀刮盡奏請付法太后曰此心亦無惡命釋之太后習猫使與鸚鵡共處出示百官傳觀未遍猫飢􅅮鸚鵡食之太后甚慙太后自垂拱以來任用酷吏先誅唐宗室貴戚數百人次及大臣數百家其剌史郎將以下不可勝數每除一官户婢竊相謂曰􅀑朴又來矣不旬月輒遭掩捕族誅監察御史朝邑嚴善思公直敢言時告密者不可勝數太后亦厭其煩命善思按問引虚伏罪者八百五十餘人羅織之黨爲之不振乃相與共􅌟䧟善思坐流驩州太后知其枉尋復召爲渾儀監丞善思名譔以字行右補闕新鄭朱敬則以太后本任威刑以禁異議今既革命衆心巳定宜省刑尚寛乃上䟽以爲李斯相秦用刻薄變詐以屠諸矦不知易之以寛和卒至土崩此不知變之祸也漢髙祖定天下陸賈叔孫通説之以禮義傳丗十二此知變之善也自文明草昧天地屯蒙三叔流言四凶􅌟難不設鉤距無以應天順人不切刑名不可摧姦息暴故置神器開告端曲直之影必呈包藏之心盡露神道助直無罪不除蒼生晏然紫宸易主然而急趨無善迹促柱少和聲向時之妙䇿乃當今之芻狗也伏願覽秦漢之得失考時事之合宜審糟粕之可遺覺蘧廬之須毁去萋菲之牙角頓姦險之鋒芒窒羅織之源掃朋黨之迹使天下蒼生坦然大悦豈不樂哉太后善之賜帛三百叚侍御史周矩上疏曰推劾之吏皆相矜以虐泥耳籠頭枷研楔􆄎摺膺籖爪懸髪薰耳號曰獄持或累日節食連宵緩問晝夜揺撼使不得眠號曰宿囚此等既非木石且救目前苟求賖死臣竊聽輿議皆稱天下太平何苦須反豈被告者盡是英雄欲求帝王邪但不勝楚毒自誣耳願陛下察之今滿朝側息不安皆以爲陛下朝與之密夕與之讎不可保也周用仁而昌秦用刑而亡願陛下緩刑用仁天下幸甚太后頗采其言制獄稍衰太后春秋雖髙善自塗澤雖左右不覺其衰丙戌敕以齒落更生九月庚子御則天門赦天下攺元更以九月爲社制於并州置北都癸丑同平章事李游道王璿袁智弘崔神基李元素春官侍郎孔思元益州長史任令輝皆爲王弘義所陷流嶺南左羽林中郎將來子珣坐事流愛州尋卒初新豐王孝傑從劉審禮撃吐蕃爲副揔管與審禮皆没於吐蕃賛普見孝傑泣曰貎類吾父厚禮之後竟得歸累遷右鷹揚衛將軍孝傑乆在吐蕃知其虚實㑹西州都督唐休璟請復取􅀛兹于闐踈勒碎葉四鎮敕以孝傑爲武威軍揔管與左武衛大將軍阿史那忠節將兵撃吐蕃冬十月丙戌大破吐蕃復取四鎮置安西都護府於􅀛兹發兵戍之二年正月壬辰朔太后享萬象神宫以魏王承嗣爲亞獻梁王三思爲終獻太后自制神宫樂用舞者九百人户婢團兒爲太后所寵信有憾於皇嗣乃譛皇嗣妃劉氏徳妃竇氏爲厭呪癸巳妃與徳妃朝太后於嘉豫殿既退同時殺之瘞於宫中莫知所在徳妃抗之曾孫也皇嗣畏忤㫖不敢言居太后前容止自如團兒復欲害皇嗣有言其情於太后者太后乃殺團兒是時告密者皆誘人奴婢告其主以求功賞徳妃父孝諶爲潤州剌史有奴妄爲妖異以恐徳妃母龐氏龐氏懼奴請夜祠禱解因發其事下監察御史龍門薛季昶按之季昶誣奏以爲與徳妃同祝詛先涕泣不自勝乃言曰龐氏所爲臣子所不忍道太后擢季昶爲給事中龐氏當斬其子希瑊詣侍御史徐有功訟寃有功牒所司停刑上奏論之以爲無罪季昶奏有功阿黨惡逆請付法法司處有功罪當絞令史以白有功有功歎曰豈我獨死諸人永不死邪既食掩扇而􅃦人以有功苟自強必內憂懼密伺之方熟寢太后召有功迎謂曰卿比按獄失出何多對曰失出人臣之小過好生聖人之大徳太后黙然由是龐氏得減死與其三子皆流嶺􅀯孝諶貶羅州司馬有功亦除名戊申姚璹奏請令宰相撰時政記月送史館從之時政記自此始臘月丁卯降皇孫成器爲壽春王􅁪王成義爲衡陽王楚王隆基爲臨淄王衛王隆範爲巴陵王趙王隆業爲彭城王皆睿宗之子也春一月庚子以夏官侍郎婁師徳同平章事師徳寛厚清慎犯而不校與李昭徳俱入朝師徳體肥行緩昭徳屢待之不至怒罵曰田舍夫師徳徐笑曰師徳不爲田舍夫誰當爲之其弟除代州剌史将行師徳謂曰吾備位宰相汝復爲州牧榮寵過盛人所疾也將何以自免弟長跪曰自今雖有人唾某面某拭之而巳庶不爲兄憂師徳愀然曰此所以爲吾憂也人唾汝面怒汝也汝拭之乃逆其意所以重其怒夫唾不拭自乾當笑而受之甲寅前尚方監裴匪躬內常侍范雲仙坐私謁皇嗣腰斬於市自是公卿以下皆不得見又有告皇嗣濳有異謀者太后命來俊臣鞫其左右左右不勝楚毒皆欲自誣太常工人京兆安金藏大呼謂俊臣曰公既不信金藏之言請剖心以明皇嗣不反即引佩刀自剖其胷五藏皆出流血􅀍地太后聞之令轝入宫中使醫内五藏以桑皮線縫之傅以藥經􅀫始蘇太后親臨視之歎曰吾有子不能自明使汝至此即命俊臣停推睿宗由是得免罷舉人習老子更習太后所造臣􅁤二月丙子新羅王政明卒遣使立其子理洪爲王乙亥禁人間錦侍御史矦思止私畜錦李昭徳按之杖殺於朝堂或告嶺􅀯流人謀反太后遣司刑評事萬國俊攝監察御史就按之國俊至廣州悉召流人矯制賜自盡流人號呼不服國俊驅就水曲盡斬之一朝殺三百餘人然後詐爲反狀還奏因言諸道流人亦必有怨望謀反者不可不早誅太后喜擢國俊爲朝散大夫行侍御史更遣右翊衛兵曹參軍劉光業司刑評事王徳壽􅁐􅀯面監丞鮑思恭尚輦直長王大貞右武威衛兵曹參軍屈貞筠皆攝監察御史詣諸道按流人光業等以國俊多殺蒙賞爭効之光業殺七百人徳壽殺五百人自餘少者不減百人其遠年雜犯流人亦與之俱斃太后頗知其濫制六道流人未死者并家屬皆聽還郷里國俊等亦相繼死或得罪流竄來俊臣誣冬官尚書蘇幹云在魏州與琅邪王冲通謀夏四月乙未殺之五月癸丑棣州河溢流二千餘家秋九月丁亥朔日有食之魏王承嗣等五千人表請加尊號曰金輪聖神皇帝乙未太后御萬象神宫受尊號赦天下作金輪等七寳每朝㑹陳之殿庭庚子追尊昭安皇帝曰渾元昭安皇帝文穆皇帝曰立極文穆皇帝孝明髙皇帝曰無上孝明髙皇帝皇后從帝號辛丑以文昌左丞同平章事姚璹爲司賔卿罷政事以司賔卿萬年豆盧欽望爲內史文昌左丞韋巨源同平章事秋官侍郎呉人陸元方爲鸞臺侍郎同平章事巨源孝寛之玄孫也延載元年正月丙戌太后享萬象神宫突厥可汗骨篤禄卒其子㓜弟黙啜自立爲可汗臘月甲戌黙啜宼靈州室韋反遣右鷹揚衛大將軍李多祚擊破之春一月以婁師徳爲河源等軍檢校營田大使二月武威道揔管王孝傑破吐蕃㪍論賛刃突厥可汗俀子等於泠泉及大嶺各三萬餘人碎葉鎮守使韓思忠破泥熟俟斤等萬餘人庚午以僧懐義爲代北道行軍大揔管以討黙啜三月甲申以鳯閣舍人蘇味道爲鳯閣侍郎同平章事李昭徳檢校內史更以僧懐義爲朔方道行軍大揔管以李昭徳爲長史蘇味道爲司馬帥契苾明曹仁師沙吒忠義等十八將軍以討黙啜未行虜退而止昭徳嘗與懐義議事失其㫖懐義撻之昭徳惶懼請罪夏四月壬戌以夏官尚書武威道大揔管王孝傑同鳯閣鸞臺三品五月魏王承嗣等二萬六千餘人上尊號曰越古金輪聖神皇帝甲午御則天門樓受尊號赦天下攺元天授中遣監察御史壽春裴懐古安集西􅀯蠻六月癸丑永昌蠻酋薫期帥部落二十餘萬戸内附河內有老尼居神都麟趾寺與嵩山人韋什方等以妖妄惑衆尼自號淨光如來云能知未然什方自云呉赤烏元年生又有老胡亦自言五百嵗云見薛師巳二百年矣容貎愈少太后甚信重之賜什方姓武氏秋七月癸未以什方爲正諌大夫同平章事制云邁軒代之廣成逾漢朝之河上八月什方乞還山制罷遣之戊辰以王孝傑爲瀚海道行軍揔管仍受朔方道行軍大揔管薛懐義節度巳巳以司賔少卿姚璹爲納言左肅政中丞原武楊再思爲鸞臺侍郎洛州司馬杜景儉爲鳯閣侍郎並同平章事豆盧欽望請京官九品以上輸兩月俸以贍軍轉帖百官令拜表百官但赴拜不知何事拾遺王求禮謂欽望曰明公禄厚輸之無傷卑官貧迫柰何不使其知而欺奪之乎欽望正色拒之既上表求禮進言曰陛下冨有四海軍國有儲何藉貧官九品之俸而欺奪之姚璹曰求禮不識大體求禮曰如姚璹爲識大體者邪事遂寢戊寅鸞臺侍郎同平章事崔元綜坐事流振州武三思帥四夷酋長請鑄銅鐵爲天樞立於端門之外銘紀功德黜唐頌周以姚璹爲督作使諸胡聚錢百萬億買銅鐵不能足賦民間農器以足之九月壬午朔日有食之殿中丞來俊臣坐􅂍貶同州參軍王弘義流瓊州詐稱敕追還至漢北侍御史胡元禮遇之按驗得其姦狀杖殺之內史李昭徳恃太后委遇頗專權使氣人多疾之前魯王府功曹參軍丘愔上䟽攻之其略曰陛下天授以前萬機獨斷自長壽以來委任昭徳參奉機密獻可替否事有便利不預諮謀要待畫日將行方乃别生駮異揚露專擅顯示於人歸美引愆義不如此又曰臣觀其膽乃大於身鼻息所衝上拂雲漢又曰蟻穴壞隄針芒冩氣權重一去収之極難長上果毅鄧注又著石論數千言述昭徳專權之狀鳯閣舍人逄弘敏取奏之太后由是惡昭徳壬寅貶昭徳爲􅀯賔尉尋又免死流竄太后出梨花一枝以示宰相宰相皆以爲瑞杜景儉獨曰今草木黄落而此更發榮隂陽不時咎在臣等因拜謝太后曰卿真宰相也冬十月壬申以文昌右丞李元素爲鳯閣侍郎右肅政中丞周允元檢校鳯閣侍郎並同平章事允元豫州人也嶺􅀯獠反以容州都督張玄遇爲桂永等州經略大使以討之天冊萬嵗元年正月辛巳朔太后加號慈氏越古金輪聖神皇帝赦天下攺元證聖周允元與司刑少卿皇甫文備奏內史豆盧欽望同平章事韋巨源杜景儉蘇味道陸元方附㑹李昭徳不能匡正欽望貶趙州巨源貶麟州景儉貶溱州味道貶集州元方貶綏州剌史􅀄明堂既成太后命僧懐義作夾紵大像其小指中猶容數十人於明堂北􅌟天堂以貯之堂始􅌟爲風所摧更􅌟之日役萬人采木江嶺數年之間所費以萬億計府藏爲之耗竭懐義用財如糞土太后一聽之無所問每作無遮㑹用錢萬緡士女雲集又散錢十車使之爭拾相蹈踐有死者所在公私田宅多爲僧有懐義頗厭入宫多居白馬寺所度力士爲僧者滿千人侍御史周矩疑有姦謀固請按之太后曰卿姑退朕即令往矩至臺懐義亦至乗馬就階而下坦腹於牀矩召吏將按之遽躍馬而去矩具奏其狀太后曰此道人病風不足詰所度僧惟卿所處悉流遠州遷矩天官貟外郎乙未作無遮㑹於朝堂鑿地爲阬深五丈結綵爲宫殿佛像皆於阬中引出之云自地涌出又殺牛取血畫大像首髙二百尺云懐義剌膝血爲之丙申張像於天津橋􅀯設齋時御醫沈􅀯璆亦得幸於太后懐義心愠是夕宻燒天堂延及明堂火照城中如晝比明皆盡暴風裂血像爲數百叚大后恥而諱之但云内作工徒誤燒麻主遂渉明堂時方酺宴左拾遺劉承慶請輟朝停酺以荅天譴太后將從之姚璹曰昔成周宣榭卜代愈隆漢武建章盛徳彌永今明堂布政之所非宗廟也不應自貶損太后乃御端門􅀚酺如平日命更造明堂天堂仍以懐義充使又鑄銅爲九州鼎及十二神皆髙一丈各置其方先是河内老尼晝食一麻一米夜則烹宰宴樂畜弟子百餘人淫穢靡所不爲武什方自言能合長年藥太后遣乗驛於嶺􅀯采藥及明堂火尼入唁太后太后怒叱之曰汝常言能前知何以不言明堂火因斥還河内弟子及老胡等皆逃散又有發其姦者太后乃復召尼還麟趾寺弟子畢集敕給使掩捕盡􅀗之皆没爲官婢什方還至偃師聞事露自絞死庚子以明堂火告廟下制求直言劉承慶上䟽以爲火發既從麻主後及緫章所營佛舍恐勞無益請罷之又明堂所以統和天人一旦焚毁臣下何心猶爲酺宴憂喜相爭傷於情性又陛下垂制博訪許陳至理而左史張鼎以爲今旣火流王屋彌顯大周之祥通事舍人逄敏奏稱彌勒成道時有天魔燒宫七寳臺須􅁷散壊斯實諂妄之邪言非君臣之正論伏願陛下乾乾翼翼無戾天人之心而興不急之役則兆人蒙頼福禄無窮􅀗嘉主簿彭城劉知幾表陳四事其一以爲皇業􅁠輿天地開闢嗣君即位黎元更始則時藉非常之慶以申再造之恩今六合清晏而赦令不息近則一年再降逺則每嵗無遺至於違法悖禮之徒無頼不仁之輩編戸則寇攘爲業當官則􅂍賄是求而元日之朝指期天澤重陽之節佇降皇恩如其忖度咸果釋免或有名垂結正罪將斷決竊行貨賄方便規求故致稽延畢霑寛宥用使俗多頑悖時罕廉隅爲善者不預恩光作惡者獨承徼幸古語曰小人之幸君子之不幸斯之謂也望陛下而今而後頗節於赦使黎氓知禁姦宄肅清其二以爲海内具僚九品以上每歳逢赦必賜階勲至於朝野宴集公私聚㑹緋服衆於青衣象板多於木笏皆榮非徳舉位罕才升不知何者爲妍􅃖何者爲美惡臣望自今以後稍息私恩使有善者逾効忠勤無才者咸知勉勵其三以爲陛下臨朝踐極取士太廣六品以下職事清官遂乃方之土芥比之沙礫若遂不加沙汰臣恐有穢皇風其四以爲今之牧伯遷代太速倐來忽往蓬轉萍流既懐苟且之謀何暇循良之政望自今刺史非三嵗以上不可遷官仍明察功過尤甄賞罰䟽奏太后頗嘉之是時官爵易得而法網嚴峻故人競爲趨進而多陷刑戮知幾乃著思慎賦以剌時見志焉丙午以王孝傑爲朔方道行軍揔管撃突厥春二月己酉朔日有食之僧懐義益驕恣太后惡之旣焚明堂心不自安言多不順太后密選宫人多力者百餘人以防之壬子執之於瑶光殿前樹下使建昌王武攸寜帥壯士敺殺之送尸白馬寺焚之以造塔甲子太后去慈氏越古之號三月丙辰鳯閣侍郎同平章事周允元薨夏四月天樞成髙一百五尺徑十二尺八面各徑五尺下爲鐡山周百七十尺以銅爲蟠龍麒麟縈繞之上爲騰雲承銅盤徑三丈四龍人立捧火珠髙一丈工人毛婆羅造模武三思爲文刻百官及四夷酋長名太后自書其榜曰大周萬國頌徳天樞秋七月辛酉吐蕃寇臨洮以王孝傑爲肅邉道行軍大揔管以討之九月甲寅太后合祭天地於􅀯郊加號天冊金輪大聖皇帝赦天下攺元冬十月突厥黙啜遣使請降太后喜冊授左衛大將軍歸國公萬嵗通天元年臘月甲戌太后發神都甲申封神嶽赦天下攺元萬􅀊登封天下百姓無出今年租税大酺九日丁亥禪于少室己丑御朝覲壇受賀癸巳還宫甲午謁太廟右千牛衛將軍安平王武攸緒少有志行恬澹寡欲扈從封中嶽還即求弃官隱於嵩山之陽太后疑其詐許之以觀其所爲攸緒遂優游巖壑冬居茅椒夏居石室一如山林之士太后所賜及王公所遺野服器玩攸緒一皆置之不用塵埃凝積買田使奴耕種與民無異春一月甲寅以婁師徳爲肅邊道行軍副揔管撃吐蕃己巳以師徳爲左肅政大夫知政事如故攺長安崇尊廟爲太廟二月辛巳尊神嶽天中王爲神嶽天中黄帝靈妃爲天中黄后啟爲齊聖皇帝封啟母神爲玉京太后三月壬寅王孝傑婁師徳與吐蕃將論欽陵賛婆戰於素羅汗山唐兵大敗孝傑坐免爲庶人師徳貶原州貟外司馬師徳因署移牒驚曰官爵盡無邪既而曰亦善亦善不復介意丁巳新明堂成髙二百九十四尺方三百尺規模率小於舊上施金塗鐡鳯髙二丈後爲大風所損更爲銅火珠羣龍捧之號曰通天宫赦天下攺元萬嵗通天大食請獻師子姚璹上䟽以爲師子專食肉遠道傳致肉既難得極爲勞費陛下鷹犬不蓄漁獵悉停豈容菲薄於身而厚給於獸乃却之以檢校夏官侍郎孫元亨同平章事夏五月壬子營州契丹松漠都督李盡忠歸誠州剌史孫萬榮舉兵反攻陷營州殺都督趙文翽盡忠萬榮之妹夫也皆居於營州城側文翽剛愎契丹饑不加賑給視酋長如奴僕故二人怨而反乙丑遣左鷹揚衛將軍曹仁師右金吾衛大将軍張玄遇左威衛大将軍李多祚司農少卿麻仁節等二十八將討之秋七月辛亥以春官尚書梁王武三思爲榆關道安撫大使姚璹副之以備契丹攺李盡忠爲李盡滅孫萬榮爲孫萬斬盡忠尋自稱無上可汗據營州以萬榮爲前鋒略地所向皆下旬日兵至數萬進圍檀州清邊前軍副揔管張九節擊却之八月丁酉曹仁師張玄遇麻仁節與契丹戰于硤石谷唐兵大敗先是契丹破營州􅀗唐俘數百囚之地牢聞唐兵將至使守牢霫紿之曰吾輩家屬飢寒不能自存唯俟官軍至即降耳既而契丹引出其俘飼以糠粥慰勞之曰吾養汝則無食殺汝又不忍今縱汝去遂釋之俘至幽州具言其狀諸軍聞之爭欲先入至黄麞谷虜又遣老弱迎降故遺老牛瘦馬於道側仁師等三軍弃歩卒將􅀐兵輕進契丹設伏横擊之飛索以䌈玄遇仁節生􅀗之將卒死者填山谷鮮有脱者契丹得軍印詐爲牒令玄遇等署之牒揔管燕匪石宗懐昌等云官軍巳破賊若至營州軍將皆斬兵不叙勲匪石等得牒晝夜兼行不遑寢食以赴之士馬疲弊契丹伏兵於中道邀之全軍皆没九月制天下繫囚及士庶家奴驍勇者官償其直發以擊契丹初令山東近邊諸州置武􅀐團兵以同州剌史建安王武攸宜爲右武威衛大將軍充清邊道行軍大揔管以討契丹右拾遺陳子昂爲攸宜府參謀上䟽曰恩制免天下罪人及募諸色奴充兵討擊契丹此乃捷急之計非天子之兵且比來刑獄乆清罪人全少奴多怯弱不慣征行縱其募集未足可用況當今天下忠臣勇士萬分未用其一契丹小孽假命待誅何勞免罪贖奴損國大體臣恐此䇿不可威示天下丁巳突厥寇凉州執都督許欽明欽明紹之曽孫也時出按部突厥數萬奄至城下欽明拒戰爲所虜欽明兄欽寂時爲龍山軍討擊副使與契丹戰於崇州軍敗被擒虜將圍安東令欽寂說其屬城未下者安東都護裴玄珪在城中欽寂謂曰狂賊天殃滅在朝夕公但勵兵謹守以全忠節虜殺之吐蕃復遣使請和親太后遣右武衛胄曹參軍貴郷郭元振往察其宜吐蕃將論欽陵請罷安西四鎮戍兵并求分十姓突厥之地元振曰四鎮十姓與吐蕃種類本殊今請罷唐兵豈非有兼并之志乎欽陵曰吐蕃苟貪土地欲爲邊患則東侵甘凉豈肯規利於萬里之外邪乃遣使者隨元振入請之朝廷疑未決元振上䟽以爲欽陵求罷兵割地此乃利害之機誠不可輕舉措也今若直拒其善意則爲邊患必深四鎮之利逺甘凉之害近不可不深圖也宜以計緩之使其和望未絶則善矣彼四鎮十姓吐蕃之所甚欲也而青海吐谷渾亦國家之要地也今報之宜曰四鎮十姓之地本無用於中國所以遣兵戍之欲以鎮撫西域分吐蕃之􅀔使不得併力東侵也今若果無東侵之志當歸我吐谷渾諸部及青海故地則五俟斤部亦當以歸吐蕃如此則足以塞欽陵之口而亦未與之絶也若欽陵小有乖違則曲在彼矣且四鎮十姓􅅃附􅀊乆今未察其情之向背事之利害遥割而弃之恐傷諸國之心非所以御四夷也太后從之元振又上言吐蕃百姓疲於徭戍早願和親欽陵利於統兵專制獨不欲歸􅅃若國家嵗發和親使而欽陵常不從命則彼國之人怨欽陵日深望國恩日甚設欲大舉其徒固亦難矣斯亦離問之漸可使其上下猜阻禍亂内興矣太后深然之元振名震以字行庚申以并州長史王方慶爲鸞臺侍郎與殿中監萬年李道廣並同平章事突厥黙啜請爲太后子并爲其女求昬悉歸河西降戸帥其部衆爲國討契丹太后遣豹韜衛大將軍閻知微左衛郎將攝司賔卿田歸道冊授黙啜左衛大將軍遷善可汗知微立徳之孫歸道仁㑹之子也冬十月辛卯契丹李盡忠卒孫萬榮代領其衆突厥黙啜乗間襲松漠虜盡忠萬榮妻子而去太后進拜黙啜爲頡跌利施大單于立功報國可汗孫萬榮収合餘衆軍􅀔復振遣别帥駱務整何阿小爲前鋒攻陷冀州殺刺史陸寳積屠吏民數千人又攻瀛州河北震動制起彭澤令狄仁傑爲魏州剌史前刺史獨孤思莊畏契丹猝至悉驅百姓入城繕脩守備仁傑至悉遣還農曰賊猶在逺何煩如是萬一賊來吾自當之百姓大恱時契丹入寇軍書填委夏官郎中硤石姚元崇剖析如流皆有條理太后竒之擢爲夏官侍郎太后思徐有功用法平擢拜左臺殿中侍御史逺近聞者無不相賀鹿城主簿宗城潘好禮著論稱有功􅌃道依仁固守誠節不以貴賤死生易其操履設客問曰徐公於今誰與爲比主人曰四海至廣人物至多或匿迹韜光僕不敢誣若所聞見則一人而巳當於古人中求之客曰何如張釋之主人曰釋之所行者甚易徐公所行者甚難難易之間優劣見矣張公逢漢文之時天下無事至如盗髙廟玉環及渭橋驚馬守法而巳豈不易哉徐公逢革命之秋屬惟新之運唐朝遺老或包藏祸心使人主有疑如周興來俊臣乃堯年之四凶也崇飾惡言以誣盛徳而徐公守死善道深相明白幾陷囹圄數挂網羅此吾子所聞豈不難哉客曰使爲司刑卿乃得展其才矣主人曰吾子徒見徐公用法平允謂可置司刑僕覩其人方寸之地何所不容若其用之何事不可豈直司刑而巳哉資治通鑑卷第二百五
