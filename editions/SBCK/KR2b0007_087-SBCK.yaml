front:
  text: 劫璠為主詔徴璠為越騎校尉南州由是遂亂父老莫不追思劉弘
  hash: sha256:1b05439dd6d971a83547dcd2c760cd4bd7f6e1c4d0bc82d33d88ce3e1f330606
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0007_SBCK_087-1a}
body:
  text: 丁巳太傅越自滎陽入京師中書監王敦謂所親曰太傅專執威權而選用表請尚書猶以舊制裁之今日之來必有所誅帝之為太弟也與中庶子繆播親善及即位以播為中書監繆胤為太僕卿委以心膂帝舅散騎常侍王延尚書何綏太史令高堂冲並參機宻越疑朝臣貳於己劉輿潘滔勸越悉誅播等越乃誣播等欲為亂乙丑遣平東將軍王秉帥甲士三千入宫執播等十餘人於帝側付廷尉殺之帝歎息流涕而已綏曽之孫也初何曽侍武帝宴退謂諸子曰主上開創大業吾每宴見未嘗聞經國逺圖惟說平生常事非貽厥孫謀之道也及身而已後嗣其殆乎汝軰猶可以免指諸孫曰此屬必及於難及綏死兄嵩哭之曰我祖其殆聖乎曽日食萬錢猶云無下箸處子劭日食二萬綏及弟機羡汰侈尤甚與人書疏詞禮簡傲河内王尼見綏書謂人曰伯蔚居亂世而矜豪乃爾其能免乎人曰伯蔚聞卿言必相危害尼曰伯蔚比聞我言自已死矣及永嘉之末何氏無遺種臣光曰何曽議武帝偷惰取過目前不為逺慮知天下將亂子孫必與其憂何其明也然身為僭侈使子孫承流卒以驕奢亡族其明安在哉且身為宰相知其君之過不以告而私語於家非忠臣也太傅越以王敦為揚州刺史劉寔連年請老朝廷不許尚書左丞劉坦上言古之養老以不事為優不以吏之為重謂宐聽寔所守丁卯詔寔以侯就第以王衍為太尉太傅越解兖州牧領司徒越以頃來興事多由殿省乃奏宿衛有矦爵者皆罷之時殿中武官並封矦由是出者略盡皆泣涕而去更使右衛將軍何倫左衛將軍王秉領東海國兵數百人宿衛左積弩將軍朱誕奔漢具陳洛陽孤弱勸漢主淵攻之淵以誕為前鋒都督以滅晉大將軍劉景為大都督將兵攻黎陽克之又敗王堪於延津沈男女三萬餘人於河淵聞之怒曰景何面復見朕且天道豈能容之吾所欲除者司馬氏耳細民何罪黜景為平虜將軍夏大旱江漢河洛皆竭可涉漢安東大將軍石勒冦鉅鹿常山衆至十餘萬集衣冠人物别為君子營以趙郡張賔為謀主刁膺為股肱䕫安孔萇支雄桃豹逯明為􅀲牙并州諸胡羯多從之初張賓好讀書闊達有大志常自比張子房及石勒徇山東賓謂所親曰吾歴觀諸將無如此胡將軍者可與共成大業乃提劒詣軍門大呼請見勒亦未之奇也賔數以䇿干勒已而皆如所言勒由是奇之署為軍功曹動靜咨之漢主淵以王彌為侍中都督青徐兖豫荆揚六州諸軍事征東大將軍青州牧與楚王聰共攻壺􅀜以石勒爲前鋒都督劉琨遣護軍黄肅韓述救之聦敗述於西澗勒敗肅於封田皆殺之太傅越遣淮南内史王曠將軍施融曹超將兵拒聰等曠濟河欲長驅而前融曰彼乘險閒出我雖有數萬之衆猶是一軍獨受敵也且當阻水為固以量形􅀔然後圖之曠怒曰君欲沮衆邪融退曰彼善用兵曠闇於事勢吾屬今必死矣曠等踰太行與聰遇戰於長平之閒曠兵大敗融超皆死聰遂破屯留長子凡斬獲萬九千級上黨太守龎淳以壺闗降漢劉琨以都尉張倚領上黨太守據襄垣初匈奴劉猛死右賢王去卑之子誥升爰代領其衆誥升爰卒子虎立居新興號鐵弗氏與白部鮮卑皆附於漢劉琨自將擊虎劉聦遣兵襲晉陽不克五月漢主淵封子􅁉爲齊王隆爲魯王秋八月漢主淵命楚王聰等進攻洛陽詔平北將軍曹武等拒之皆為聰所敗聰長驅至宐陽自恃驟勝怠不設備九月􅀪農太守垣延詐降夜襲聰軍聰大敗而還王浚遣祁弘與鮮卑段務勿塵擊石勒于飛龍山大破之勒退屯黎陽冬十月漢主淵復遣楚王聰王彌始安王曜汝隂王景帥精騎五萬冦洛陽大司空鴈門剛穆公呼延翼帥步卒繼之丙辰聰等至宐陽朝廷以漢兵新敗不意其復至大懼辛酉聰屯西明門北宫純等夜帥勇士千餘人出攻漢壁斬其征虜將軍呼延顥壬戌聦南屯洛水乙丑呼延翼為其下所殺其衆自大陽潰歸淵敕聰等還師聰表稱晉兵微弱不可以翼顥死故還師固請留攻洛陽淵許之太傅越嬰城自守戊寅聰親祈嵩山留平晉將軍安陽哀王厲冠軍將軍呼延朗督攝留軍太傅參軍孫詢說越乗虛出擊朗斬之厲赴水死王彌謂聰曰今軍既失利洛陽守備猶固運車在陜糧食不支數日殿下不如與龍驤還平陽裹糧發卒更為後舉下官亦收兵榖待命於兖豫不亦可乎聰自以請留未敢還宣于修之言於淵曰嵗在辛未乃得洛陽今晉氣猶盛大軍不歸必敗淵乃召聰等還天水人訇琦等殺成太尉李離尚書令閻式以梓潼降羅尚成主雄遣太傅驤司徒雲司空璜攻之不克雲璜戰死初譙周有子居巴西成巴西太守馬脱殺之其子登詣劉弘請兵以復讎弘表登為梓潼内史使自募巴蜀流民得二千人西上至巴郡從羅尚求益兵不得登進攻宕渠斬馬脫食其肝㑹梓潼降登進據涪城雄自攻之為登所敗十一月甲申漢楚王聰始安王曜歸于平陽王彌南出轘轅流民之在潁川襄城汝南南陽河南者數萬家素為居民所苦皆燒城邑殺二千石長吏以應彌石勒冦信都殺冀州刺史王斌王浚自領冀州詔車騎將軍王堪北中郎將裴憲將兵討勒勒引兵還拒之魏郡太守劉矩以郡降勒勒至黎陽裴憲棄軍奔淮南王堪退保倉垣十二月漢主淵以陳留王歡樂為太傅楚王聰為大司徒江都王延年為大司空遣都護大將軍曲陽王賢與征北大將軍劉靈安北將軍趙固平北將軍王桑東屯内黄王彌表左長史曹嶷行安東將軍東徇青州且迎其家淵許之初東夷校尉勃海李臻與王浚約共輔晉室浚内有異志臻恨之和演之死也别駕昌黎王誕亡歸李臻說臻舉兵討浚臻遣其子成將兵擊浚遼東太守龐本素與臻有隙乗虚襲殺臻遣人殺成於無慮誕亡歸慕容廆詔以勃海封釋代臻為東夷校尉龐本復謀殺之釋子悛勸釋伏兵請本收斬之悉誅其家四年春正月乙丑朔大赦漢主淵立單徴女為皇后梁王和為皇太子大赦封子义為北海王以長樂王洋為大司馬漢鎮東大將軍石勒濟河拔白馬王彌以三萬衆㑹之共冦徐豫兖州二月勒襲鄄城殺兖州刺史袁孚遂拔倉垣殺王堪復北濟河攻冀州諸郡民從之者九萬餘口成太尉李國鎮巴西帳下文石殺國以巴西降羅尚太傅越徴建威將軍吴興錢璯及揚州刺史王敦璯謀殺敦以反敦奔建業告琅邪王睿璯遂反進冦陽羨睿遣將軍郭逸等討之周玘紏合鄉里與逸等共討璯斬之玘三定江南睿以玘為呉興太守於其鄉里置義興郡以旌之曹嶷自大梁引兵而東所至皆下遂克東平進攻琅邪夏四月王浚將祁弘敗漢冀州刺史劉靈於廣宗殺之成主雄謂其將張寳曰汝能得梓潼吾以李離之官賞汝寶乃先殺人而亡奔梓潼訇琦等信之委以心腹㑹羅尚遣使至梓潼􅄾等出送之寶從後閇門琦等奔巴西雄以寶為太尉幽并司冀秦雍六州大蝗食草木牛馬毛皆盡秋七月漢楚王聰始安王曜石勒及安北大將軍趙固圍河内太守裴整于懐詔征虜將軍宋抽救懷勒與平北大將軍王桑逆擊抽殺之河内人執整以降漢主淵以整為尚書左丞河内督將郭黙收整餘衆自為塢主劉琨以黙為河内太守羅尚卒於巴郡詔以長沙太守下邳皮素代之庚午漢主淵寢疾辛未以陳留王歡樂為太宰長樂王洋為太傅江都王延年為太保楚王聰為大司馬大單于並録尚書事置單于臺於平陽西以齊王􅁉為大司徒魯王隆為尚書令北海王义為撫軍大將軍領司􅀠校尉始安王曜為征討大都督領單于左輔廷尉喬智明為冠軍大將軍領單于右輔光禄大夫劉殷為左僕射王育為右僕射任顗為吏部尚書朱紀為中書監䕶軍馬景領左衛將軍永安王安國領右衛將軍安昌王盛安邑王欽西陽王璿皆領武衛將軍分典禁兵初盛少時不好讀書唯讀孝經論語曰誦此能行足矣安用多誦而不行乎李憙見之歎曰望之如可易及至肅如嚴君可謂君子矣淵以其忠篤故臨終委以要任丁丑淵召太宰歡樂等入禁中受遺詔輔政己卯淵卒太子和即位和性猜忌無恩宗正呼延攸翼之子也淵以其無才行終身不遷官侍中劉乗素惡楚王聰衛尉西昌王銳耻不預顧命乃相與謀說和曰先帝不惟輕重之勢使三王揔彊兵於内大司馬擁十萬衆屯於近郊陛下便為寄坐耳宐早為之計和攸之甥也深信之辛巳夜召安昌王盛安邑王欽等告之盛曰先帝梓宫在殯四王未有逆節一旦自相魚􅁏天下謂陛下何且大業甫爾陛下勿信䜛夫之言以疑兄弟兄弟尚不可信他人誰足信哉攸銳怒之曰今日之議理無有二領軍是何言乎命左右刄之盛既死欽懼曰惟陛下命壬午銳帥馬景攻楚王聰于單于臺攸帥水安王安國攻齊王􅁉于司徒府乗帥安邑王欽攻魯王隆使尚書田宻武衛將軍劉璿攻北海王义宻璿挾义斬闗歸于聰聰命貫甲以待之銳知聰有備馳還與攸乗共攻隆􅁉攸乗疑安國欽有異志殺之是日斬􅁉癸未斬隆甲申聰攻西明門克之鋭等走入南宫前鋒隨之乙酉殺和於光極西室收鋭攸乗梟首通衢群臣請聰即帝位聰以北海王义單后之子也以位讓之义涕泣固請聰久而許之曰义及羣公正以禍難尚殷貪孤年長故耳此家國之事孤何敢辭俟义年長當以大業歸之遂即位大赦改元光興尊單氏曰皇太后其母張氏曰帝太后以义為皇太弟領大單于大司徒立其妻呼延氏爲皇后呼延氏淵后之從父妹也封其子粲為河内王易為河間王翼為彭城王悝為高平王仍以粲為撫軍大將軍都督中外諸軍事以石勒為并州刺史封汲郡公略陽臨渭氐酋蒲洪驍勇多權略羣氐畏服之漢主聰遣使拜洪平逺將軍洪不受自稱䕶氐校尉秦州刺史略陽公九月辛未􅁙漢主淵于永光陵謚曰光文皇帝廟號高祖雍州流民多在南陽詔書遣還鄉里流民以闗中荒殘皆不願歸征南將軍山簡南中郎將杜蕤各遣兵送之促期令發京兆王如遂潛結壯士夜襲二軍破之於是馮翊嚴嶷京兆矦脫各聚衆攻城鎮殺令長以應之未㡬衆至四五萬自號大將軍領司雍二州牧稱藩于漢冬十月漢河内王粲始安王矅及王彌帥衆四萬冦洛陽石勒帥騎二萬㑹粲于大陽敗監軍裴邈于澠池遂長驅入洛川粲出轘轅掠梁陳汝潁間勒出成臯􅀜壬寅圍陳留太守王讃於倉垣為讃所敗退屯文石津劉琨自將討劉虎及白部遣使卑辭厚禮說鮮卑拓跋猗盧以請兵猗盧使其弟弗之子鬱律帥騎二萬助之遂破劉虎白部屠其營琨與猗盧結為兄弟表猗盧為大單于以代郡封之為代公時代郡屬幽州王浚不許遣兵擊猗盧猗盧拒破之浚由是與琨有􅂩猗盧以封邑去國懸逺民不相接乃帥部落萬餘家自雲中入鴈門從琨求陘北之地琨不能制且欲倚之為援乃徙樓煩馬邑隂館繁畤崞五縣民於陘南以其地與猗盧由是猗盧益盛琨遣使言於太傅越請出兵共討劉聰石勒越忌茍晞及豫州刺史馮嵩恐為後患不許琨乃謝猗盧之兵遣歸國劉虎收餘衆西度河居朔方肆盧川漢主聰以虎宗室封樓煩公壬子以劉琨爲平北大將軍王浚為司空進鮮卑段務勿塵為大單于京師饑困日甚太傅越遣使以羽檄徴天下兵使入援京師帝謂使者曰為我語諸征鎮今日尚可救後則無及矣既而卒無至者征南將軍山簡遣督䕶王萬將兵入援軍于􅄺陽為王如所敗如遂大掠􅃆漢進逼襄陽簡嬰城自守荆州刺史王澄自將欲援京師至沶口聞簡敗衆散而還朝議多欲遷都以避難王衍以為不可賣車牛以安衆心山簡為嚴嶷所逼自襄陽徙屯夏口石勒引兵濟河將趣南陽王如矦脫嚴嶷等聞之遣衆一萬屯襄城以拒勒勒擊之盡俘其衆進屯宛北是時矦脫據宛王如據穰如素與脫不恊遣使重賂勒結為兄弟說勒使攻脫勒攻宛克之嚴嶷引兵救宛不及而降勒斬脫囚嶷送于平陽盡并其衆遂南冦襄陽攻拔江西壘壁三十餘所還􅃐襄城王如遣弟璃襲勒勒迎擊滅之復屯江西太傅越既殺王延等大失衆望又以胡冦益盛内不自安乃戎服入見請討石勒且鎮集兖豫帝曰今胡虜侵逼郊畿人無固志朝廷社稷倚頼於公豈可逺出以孤根本對曰臣出幸而破賊則國威可振猶愈於坐待困窮也十一月甲戌越帥甲士四萬向許昌留妃裴氏世子毗及龍驤將軍李惲右衛將軍何倫守衛京師防察宫省以潘滔為河南尹揔留事越表以行臺自隨用太尉衍為軍司朝賢素望悉為佐吏名將勁卒咸入其府於是宫省無復守衛荒饉日甚殿内死人交横盗賊公行府寺營署並掘塹自守越東屯項以馮嵩為左司馬自領豫州牧竟陵王楙白帝遣兵襲何倫不克帝委罪於楙楙逃竄得免揚州都督周馥以洛陽􅀌危上書請遷都壽春太傅越以馥不先白已而直上書大怒召馥及淮南太守裴頠馥不肯行令碩帥兵先進碩詐稱受越宻㫖襲馥為馥所敗退保東城詔加張軌鎮西將軍都督隴右諸軍事光禄大夫傅祗太常摯虞遺軌書告以京師飢匱軌遣參軍杜勲獻馬五百匹㲜布三萬匹成太傅驤攻譙登於涪城羅尚子宇及參佐素惡登不給其粮益州刺史皮素怒欲治其罪十二月素至巴郡羅宇等使人夜殺素建平都尉暴重殺宇巴郡亂驤知登食盡援絶攻涪愈急士民皆熏鼠食之餓死甚衆無一人離叛者驤子壽先在登所登乃歸之三府官屬表巴東監軍南陽韓松為益州刺史治巴東初帝以王彌石勒侵逼京畿詔茍晞督帥州郡討之㑹曹嶷破琅邪北收齊地兵勢甚盛茍純閉城自守晞還救青州與嶷連戰破之是嵗寧州刺史王遜到官表李釗為朱提太守時寧州外逼於成内有夷冦城邑丘墟遜惡衣菜食招集離散勞徠不倦數年之間州境復安誅豪右不奉灋者十餘家以五苓夷昔為亂首擊滅之内外震服漢主聰自以越次而立忌其嫡兄恭因恭寢穴其壁間刺而殺之漢太后單氏卒漢主聰尊母張氏為皇太后單氏年少美色聰烝焉太弟义屢以為言單氏慙恚而死义寵由是漸衰然以單氏故尚未之廢也呼延后言於聰曰父死子繼古今常道陛下承高祖之業太弟何為者哉陛下百年後粲兄弟必無種矣聰曰然吾當徐思之呼延氏曰事留變生太弟見粲兄弟浸長必有不安之志萬一有小人交構其間未必不禍發于今日也聰心然之义舅光禄大夫單冲泣謂义曰踈不間親主上有意於河内王矣殿下何不避之义曰河瑞之末主上自惟嫡庶之分以大位讓义义以主上齒長故相推奉天下者高祖之天下兄終弟及何為不可粲兄弟既壯猶今日也且子弟之間親疎距㡬主上寧可有此意乎五年春正月壬申茍晞為曹嶷所敗棄城奔高平石勒謀保據江漢參軍都尉張賓以為不可㑹軍中饑疫死者太半乃渡沔冦江夏癸酉拔之乙亥成太傅驤拔涪城獲譙登太保始拔巴西殺文石於是成主雄大赦改元玉衡譙登至成都雄欲宥之登詞氣不屈雄殺之巴蜀流民布在荆湘間數為土民所侵苦蜀人李驤聚衆據樂鄉反南平太守應詹與醴陵令杜弢共擊破之王澄使成都内史王機討驤驤請降澄偽許而襲殺之以其妻子為賞沈八千餘人於江流民益怨忿蜀人杜疇等復反湘州參軍馮素與蜀人汝班有隙言於刺史荀眺曰巴蜀流民皆欲反眺信之欲盡誅流民流民大懼四五萬家一時俱反以杜弢州里重望共推為主弢自稱梁益二州牧領湘州刺史裴碩求救於琅邪王睿睿使揚威將軍甘卓等攻周馥於壽春馥衆潰奔項豫州都督新蔡王確執之馥憂憤而卒確騰之子也揚州刺史劉陶卒琅邪王睿復以安東軍諮祭酒王敦為揚州刺史尋加都督征討諸軍事庚辰平原王幹薨二月石勒攻新蔡殺新蔡莊王確於南頓進拔許昌殺平東將軍王康氐苻成隗文復叛自宐都趣巴東建平都尉暴重討之重因殺韓松自領三府事東海孝獻王越既與茍晞有隙河南尹潘滔尚書劉望等復從而譛之晞怒表求滔等首颺言司馬元超為宰相不平使天下淆亂茍道將豈可以不義使之乃移檄諸州自稱功伐陳越罪狀帝亦惡越專權多違詔命所留將士何倫等抄掠公卿逼辱公主密賜晞手詔使討之睎數與帝文書往來越疑之使遊騎於成臯間伺之果獲晞使及詔書乃下檄罪狀晞以從事中郎楊瑁為兖州刺史使與徐州刺史裴盾共討晞晞遣騎収潘滔滔夜遁得免執尚書劉曽侍中程延斬之越憂憤成疾以後事付王衍三月丙子薨于項祕不發䘮衆共推衍為元帥衍不敢當以讓襄陽王範範亦不受範瑋之子也於是衍等相與奉越䘮還􅁙東海何倫李惲等聞越薨奉裴妃及世子毗自洛陽東走城中士民爭隨之帝追貶越為縣王以茍晞為大將軍大都督督青徐兖豫荆揚六州諸軍事益州將吏共殺暴重表巴郡太守張羅行三府事羅與隗文等戰死文等驅掠吏民西降於成三府文武共表平西司馬蜀郡王異行三府事領巴郡太守初梁州刺史張光㑹諸郡守於魏興共謀進取張燕唱言漢中荒敗迫近大賊克復之事當俟英雄光以燕受鄧定賂致失漢中今復沮衆呵出斬之治兵進戰累年乃得至漢中綏撫荒殘百姓恱服夏四月石勒帥輕騎追太傅越之䘮及於苦縣寗平城大敗晉兵縱騎圍而射之將士十餘萬人相踐如山無一人得免者執太尉衍襄陽王範任城王濟武陵莊王澹西河王喜梁懐王禧齊王超吏部尚書劉望廷尉諸葛銓豫州刺史劉喬太傅長史庾敳等坐之幕下問以晉故衍具陳禍敗之由云計不在己且自言少無宦情不豫世事因勸勒稱尊號冀以自免勒曰君少壯登朝名蓋四海身居重任何得言無宦情邪破壊天下非君而誰命左右扶出衆人畏死多自陳述獨襄陽王範神色儼然顧呵之曰今日之事何復紛紜勒謂孔萇曰吾行天下多矣未嘗見此輩人當可存乎萇曰彼皆晉之王公終不為吾用勒曰雖然要不可加以鋒刃夜使人排牆殺之濟宣帝弟子景王陵之子禧澹之子也剖越柩焚其尸曰亂天下者此人也吾為天下報之故焚其骨以告天地何倫等至洧倉遇勒戰敗東海世子毗及宗室四十八王皆没於勒何倫奔下邳李惲奔廣宗裴妃為人所掠賣久之渡江初琅邪王睿之鎮建業裴妃意也故睿徳之厚加存撫以其子冲繼越後漢趙固王桑攻裴盾殺之杜􅋶攻長沙五月荀眺棄城奔廣州􅋶追擒之於是􅋶南破零桂東掠武昌殺二千石長吏甚衆以太子太傅傅祗為司徒尚書令荀藩為司空加王浚大司馬侍中大都督督幽冀諸軍事南陽王模為太尉大都督張軌為車騎大將軍琅邪王睿為鎮東大將軍兼督揚江湘交廣五州諸軍事初太傅越以南陽王模不能綏撫闗中表徴為司空將軍淳于定說模使不就徴模從之表遣世子保為平西中郎將鎮上邽秦州刺史裴苞拒之模使帳下都尉陳安攻苞苞奔安定太守賈疋納之荀晞表請遷都倉垣使從事中郎劉㑹將船數十艘宿衛五百人榖千斛迎帝帝將從之公卿猶豫左右戀資財遂不果行既而洛陽饑困人相食百官流亡者什八九帝召公卿議將行而衛從不備帝撫手歎曰如何㑹無車輿乃使􅀓柢出詣河隂治舟楫朝士數十人導從帝步出西掖門至銅駞街為盜所掠不得進而還度支校尉東郡魏浚帥流民數百家保河隂之硤石時刼掠得榖麥獻之帝以為揚威將軍平陽太守度支如故漢主聰使前軍大將軍呼延晏將兵二萬七千冦洛陽比及河南晉兵前後十二敗死者三萬餘人始安王曜王彌石勒皆引兵㑹之未至晏留輜重於張方故壘癸未先至洛陽甲申攻平昌門丙戍克之遂焚東陽門及諸府寺六月丁未朔晏以外繼不至俘掠而去帝具舟於洛水將東走晏盡焚之庚寅荀藩及弟光禄大夫組奔轘轅辛夘王彌至宣陽門壬辰始安王曜至西明門丁酉王彌呼延晏克宣陽門入南宫升太極前殿縱兵大掠悉收宫人珍寶帝出華林園門欲奔長安漢兵追執之幽於端門曜自西明門入屯武庫戊戌曜殺太子詮吴孝王晏竟陵王楙右僕射曹馥尚書閭丘冲河南尹劉黙等士民死者三萬餘人遂發掘諸陵焚宫廟官府皆盡曜納惠帝羊皇后遷帝及六璽於平陽石勒引兵出轘轅屯許昌光禄大夫劉蕃尚書盧志奔并州丁未漢主聰大赦改元嘉平以帝為特進左光禄大夫封平阿公以侍中庾珉王儁為光禄大夫岷敳之兄也初始安王曜以王彌不待已至先入洛陽怨之彌說曜曰洛陽天下之中山河四塞城池宫室不假修營宐白主上自平陽徙都之曜以天下未定洛陽四面受敵不可守不用彌䇿而焚之彌罵曰屠各子豈有帝王之意邪遂與曜有隙引兵東屯項關前司􅀠校尉劉暾說彌曰今九州糜沸羣雄競逐將軍於漢建不世之功又與始安王相失將何以自容不如東據本州徐觀天下之勢上可以混壹四海下不失鼎峙之業䇿之上者也彌心然之司徒傅祗建行臺於河隂司空荀藩在陽城河南尹華薈在成臯汝隂太守平陽李矩為之立屋輸榖以給之薈歆之曾孫也藩與弟組族子中護軍崧薈與弟中領軍恒建行臺於密傳檄四方推琅邪王睿為盟主藩承制以崧為襄城太守矩為滎陽太守前冠軍將軍河南禇翜為梁國内史􅀭威將軍魏浚屯洛北石梁塢劉琨承制假浚河南尹浚詣荀藩諮謀軍事藩邀李矩同㑹矩夜赴之矩官屬皆曰浚不可信不宐夜往矩曰忠臣伺心何所疑乎遂往相與結歡而去浚族子該聚衆據一泉塢藩以為武威將軍豫章王端太子詮之弟也東奔倉垣苟晞帥羣官奉以為皇太子置行臺端承制以晞領太子太傅都督中外諸軍録尚書事自倉垣徙屯䝉城撫軍將軍秦王業吴孝王之子荀藩之甥也年十二南奔密藩等奉之南趣許昌前豫州刺史天水閻鼎聚西州流民數千人於宻欲還鄉里荀藩以鼎有才而擁衆用鼎為豫州刺史以中書令李絙司徒左長史彭城劉疇鎮軍長史周顗司馬李述等為之參佐顗浚之子也時海内大亂獨江東差安中國士民避亂者多南渡江鎮東司馬王導說琅邪王睿収其賢俊與之共事睿從之辟掾屬百餘人時人謂之百六掾以前潁川太守勃海刁恊為軍諮祭酒前東海太守王承廣陵相卞壼為從事中郎江寧令諸葛恢歴陽參軍陳國陳頵為行參軍前太傅掾􅁃亮為西曹掾承渾之弟子恢靚之子亮兖之弟子也江州刺史華軼歆之曽孫也自以受朝廷之命而為琅邪王睿所督多不受其教令郡縣多諌之軼曰吾欲見詔書耳及睿承荀藩檄承制署置官司改易長吏軼與豫州刺史裴憲皆不從命睿遣揚州刺史王敦歴陽内史甘卓與揚烈將軍廬江周訪合兵擊軼軼兵敗奔安成訪追斬之及其五子裴憲奔幽州睿以甘卓為湘州刺史周訪為尋陽太守又以揚武將軍陶􅋲為武昌太守秋七月王浚設壇告類立皇太子布告天下稱受中詔承制封拜備置百官列署征鎮以荀藩為太尉琅邪王睿為大將軍浚自領尚書令以裴憲及其婿棗嵩為尚書以田徽為兖州刺史李惲為青州刺史南陽王模使牙門趙染戊蒲坂染求馮翊太守不得而怒帥衆降漢漢主聰以染為平西將軍八月聰遣染與安西將軍劉雅帥騎二萬攻模于長安河内王粲始安王曜帥大衆繼之染敗模兵於潼關長驅至下邽凉州將北宫純自長安帥其衆降漢漢兵圍長安模遣淳于定出戰而敗模倉庫虚竭士卒離散遂降於漢趙染送模於河内王粲九月粲殺模闗西饑饉白骨蔽野士民存者百無一二聰以始安王曜為車騎大將軍雍州牧更封中山王鎮長安以王彌為大將軍封齊公茍晞驕奢苛暴前遼西太守閻亨纘之子也數諫晞晞殺之從事中郎明預有疾自轝入諫晞怒曰我殺閻亨何闗人事而轝病罵我預曰明公以禮待預故預以禮自盡今明公怒預其如逺近怒明公何桀為天子猶以驕暴而亡况人臣乎願明公且置是怒思預之言晞不從由是衆心離怨加以疾疫饑饉石勒攻王纘於陽夏擒之遂襲䝉城執晞及豫章王端鎖晞頸以為左司馬漢主聰拜勒幽州牧王彌與勒外相親而内相忌劉暾說彌使召曹嶷之兵以圖勒彌為書使暾召嶷且邀勒共向青州暾至東阿勒㳺騎獲之勒潛殺暾而彌不知㑹彌將徐邈高梁輒引所部兵去彌兵漸衰彌聞勒擒茍晞心惡之以書賀勒曰公獲茍晞而用之何其神也使晞為公左彌為公右天下不足定也勒謂張賓曰王公位重而言卑其圖我必矣賓因勸勒乗彌小衰誘而取之時勒方與乞活陳午相攻於􅅾關彌亦與劉瑞相持甚急彌請救於勒勒未之許張賓曰公常恐不得王公之便今天以王公授我矣陳午小豎不足憂王公人傑當早除之勒乃引兵擊瑞斬之彌大喜謂勒實親已不復疑也冬十月勒請彌燕于已吾彌將往長史張嵩諫不聽酒酣勒手斬彌而并其衆表漢主聰稱彌叛逆聰大怒遣使讓勒専害公輔有無君之心然猶加勒鎮東大將軍督并幽二州諸軍事領并州刺史以慰其心苟晞王讃濳謀叛勒勒殺之并晞弟純勒引兵掠豫州諸郡臨江而還屯于葛陂初勒之為人所掠賣也與其母王氏相失劉琨得之遣使并其從子虎送於勒因遺勒書曰將軍用兵如神所向無敵所以周流天下而無容足之地百戰百勝而無尺寸之功者蓋得主則為義兵附逆則為賊衆故也成敗之數有似呼吸吹之則寒嘘之則温今相授侍中車騎大將軍領䕶匈奴中郎將襄城郡公將軍其受之勒報書曰事功殊途非腐儒所知君當逞節本朝吾自夷難為効遺琨名馬珍寶厚禮其使謝而絶之時虎年十七殘忍無度為軍中患勒白母曰此兒凶暴無頼使軍人殺之聲名可惜不若自除之母曰快牛為犢多能破車汝小忍之及長便弓馬勇冠當時勒以為征虜將軍每屠城邑鮮有遺類然御衆嚴而不煩莫敢犯者指授攻討所向無前勒遂寵任之勒攻滎陽太守李矩矩擊却之初南陽王模以從事中郎索綝為馮翊太守綝靖之子也模死綝與安夷䕶軍金城麴允頻陽令梁肅俱奔安定時安定太守賈疋與諸氐羗皆送任子於漢綝等遇之於隂宻擁還臨涇與疋謀興復晉室疋從之乃共推疋為平西將軍帥衆五萬向長安雍州刺史麴特新平太守笁恢皆不降於漢聞疋起兵與扶風太守梁綜帥衆十萬㑹之綜肅之兄也漢河内王粲在新豐使其將劉雅趙染攻新平不克索綝救新平大小百戰雅等敗退中山王曜與疋等戰於黄丘曜衆大敗疋遂襲漢梁州刺史彭蕩仲殺之麴特等擊破粲於新豐粲還平陽於是疋等兵􅀔大振􅀜西胡􅀳翕然響應閻鼎欲奉秦王業入闗據長安以號令四方河隂令傅暢祗之子也亦以書勸之鼎遂行荀藩劉疇周顗李述等皆山東人不欲西行中塗逃散鼎遣兵追之不及殺李絙等鼎與業自宛趣武關遇盜於上洛士卒敗散収其餘衆進至藍田使人告賈疋疋遣兵迎之十二月入于雍城使梁綜將兵衛之周顗奔琅邪王睿睿以顗為軍諮祭酒前騎都尉譙國桓彞亦避亂過江見睿微弱謂顗曰我以中州多故來此求全而單弱如此將何以濟既而見王導共論世事退謂顗曰向見管夷吾無復憂矣諸名士相與登新亭遊宴周顗中坐歎曰風景不殊舉目有江河之異因相視流涕王導愀然變色曰當共勠力王室克復神州何至作楚囚對泣邪衆皆収淚謝之陳頵遺王導書曰中華所以傾弊者正以取才失所先白望而後實事浮競驅馳互相貢薦言重者先顯言輕者後叙遂相波扇乃至陵遟加有莊老之俗傾惑朝廷飬望者為弘雅政事者為俗人王職不䘏灋物墜䘮夫欲制逺先由近始今宐改張明賞信罰拔卓茂於密縣顯朱邑於桐郷然後大業可舉中興可冀耳導不能從劉琨長於招懷而短於撫御一日之中雖歸者數千而去者亦相繼琨遣子遵請兵於代公猗盧又遣族人高陽内史希合衆於中山幽州所統代郡上谷廣寗之民多歸之衆至三萬王浚怒遣燕相胡矩督諸軍與遼西公段疾陸眷共攻希殺之驅略三郡士女而去疾六眷務勿塵之子也猗盧遣其子六修將兵助琨戍新興琨牙門將邢延以碧石獻琨琨以與六修六修復就延求之不得執延妻子延怒以所部兵襲六修六修走延遂以新興附漢請兵以攻并州李臻之死也遼東附塞鮮卑素喜連木丸津託為臻報仇攻陷諸縣殺掠士民屢敗郡兵連年為冦東夷校尉封釋不能討請與連和連津不從民失業歸慕容廆者甚衆廆稟給遣還願留者即撫存之廆少子鷹揚將軍翰言於廆曰自古有為之君莫不尊天子以從民望成大業今連津外以龐本為名内實幸災為亂封使君已誅本請和而冦暴不已中原離亂州師不振遼東荒散莫之救恤單于不若數其罪而討之上則興復遼東下則并吞二部忠義彰於本朝私利歸於我國此霸王之基也廆笑曰孺子乃能及此乎遂帥衆東擊連津以翰為前鋒破斬之盡併二部之衆得所掠民三千餘家及前歸廆者悉以付郡遼東頼以復存封釋疾病屬其孫弈於廆釋卒廆召弈與語說之曰奇士也􅀘小都督釋子冀州主簿悛幽州參軍抽來奔䘮廆見之曰此家抎抎千斤犍也以道不通䘮不得還皆留仕廆廆以抽為長史悛為參軍王浚以妻舅崔毖為東夷校尉毖琰之曽孫也資治通鑑卷第八十七
