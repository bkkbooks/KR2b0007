body:
  text: 臣司馬光奉勑編集唐紀五十六淵獻正月凡二年有竒起強圉作噩盡屠維大憲宗昭文章武大聖至神孝皇帝中之下元和十二年春正月甲申貶袁滋爲撫州刺史李愬至唐州軍中承喪敗之餘士卒皆憚戰愬知之有出迓者愬謂之曰天子知愬柔懦能忍耻故使來拊循爾曹至於戰攻進取非吾事也衆信而安之愬親行視士卒傷病者存恤之不事威嚴或以軍政不肅爲言愬曰吾非不知也袁尚書專以恩惠懐賊賊易之聞吾至必増備吾故示之以不肅彼必以吾爲懦而懈惰然後可圖也淮西人自以嘗敗髙袁二帥輕愬名位素微遂不爲備遣鹽鐵轉運副使程异督財賦於江淮回鶻屢請尚公主有司計其費近五百萬緡時中原方用兵故上未之許二月辛卯朔遣回鶻摩尼僧等歸國命宗正少卿李誠使回鶻諭意以緩其期李愬謀襲蔡州表請益兵詔以昭義河中鄜坊歩騎二千給之丁酉愬遣十將馬少良將十餘騎廵邏遇呉元濟捉生虞候丁士良與戰擒之士良元濟驍將常爲東邊患衆請刳其心愬許之既而召詰之士良無懼色愬曰眞丈夫也命釋其縛士良乃自言本非淮西士貞元中􅀠安州與呉氏戰爲其所擒自分死矣呉氏釋我而用之我因呉氏而再生故爲呉氏父子竭力昨日力屈復爲公所擒亦分死矣今公又生之請盡死以報德愬乃給其衣服器械署爲捉生將己亥淮西行營奏克蔡州古葛伯城丁士良言於李愬曰呉秀琳擁三千之衆據文城柵爲賊左臂官軍不敢近者有陳光洽爲之謀主也光洽勇而輕好自出戰請爲公先擒光洽則秀琳自降矣戊申士良擒光洽以歸鄂岳觀察使李道古引兵出穆陵􅀜甲寅攻申州克其外郭進攻子城城中守將夜出兵擊之道古之衆驚亂死者甚衆道古臯之子也淮西被兵數年竭倉廩以奉戰士民多無食采菱芡魚鼈鳥獸食之亦盡相帥歸官軍者前後五千餘户賊亦患其耗糧食不復禁庚申救置行縣以處之爲擇縣令使之撫養并置兵以衛之三月乙丑李愬自唐州徙屯宜陽柵郗士美敗於柏鄉抜營而歸士卒死者千餘人戊辰賜程執恭名權戊寅王承宗遣兵二萬入東光斷白橋路程權不能禦以衆歸滄州呉秀琳以文城柵降于李愬戊子愬引兵至文城西五里遣唐州刺史李進誠將甲士八千至城下召秀琳城中矢石如雨衆不得前進誠還報賊僞降未可信也愬曰此待我至耳即前至城下秀琳束兵投身馬足下愬撫其背慰勞之降其衆三千人秀琳將李憲有材勇愬更其名曰忠義而用之悉遷婦女於唐州入據其城於是唐鄧軍氣復振人有欲戰之志賊中降者相繼於道隨其所便而置之聞有父母者給粟帛遣之曰汝曹皆王人勿弃親戚衆皆感泣官軍與淮西兵夾溵水而軍諸軍相顧望無敢度溵水者陳許兵馬使王沛先引兵五千度溵水據要地爲城於是河陽宣武河東魏博等軍相繼皆度進逼郾城丁亥李光顔敗淮西兵三萬於郾城走其將張伯良殺士卒什二三己丑李愬遣山河十將董少玢等分兵攻諸柵其日少玢下馬鞍山拔路口柵夏四月辛卯山河十將馬少良下嵖岈山擒淮西將柳子野呉元濟以蔡人董昌齡爲郾城令質其母楊氏楊氏謂昌齡曰順死賢於逆生汝去逆而吾死乃孝子也從逆而吾生是戮吾也㑹官軍圍青陵絶郾城歸路郾城守將鄧懐金謀於昌齡昌齡勸之歸國懐金乃請降於李光顔曰城人之父母妻子皆在蔡州請公來攻城吾舉峰求救救兵至公逆擊之蔡兵必敗然後吾降則父母妻子庶免矣光顔從之乙未昌齡懐金舉城降光顔引兵入據之呉元濟聞郾城不守甚懼時董重質將騾軍守洄曲元濟悉發親近及守城卒詣重質以拒之李愬山河十將媯雅田智榮下冶爐城丙申十將閻士榮下白狗汶港二柵癸夘媯雅田智榮破西平丙午遊奕兵馬使王義破楚城五月辛酉李愬遣栁子野李忠義襲朗山擒其守將梁希果六鎭討王承宗者兵十餘萬回環數千里既無統帥又相去逺期約難壹由是厯二年無功千里饋運牛驢死者什四五劉緫既得武強引兵出境纔五里留屯不進月給度攴錢十五萬緍李逢吉及朝士多言冝併力先取淮西俟淮西平乘其勝勢回取恒冀如拾芥耳上猶豫久乃從之丙子罷河北行營各使還鎮丁丑李愬遣方城鎭遏使李榮宗擊青喜城拔之愬毎得降卒必親引問委曲由是賊中險易逺近虚實盡知之愬厚待呉秀琳與之謀取蔡秀琳曰公欲取蔡非得李祐不可如秀琳無能爲也祐者淮西騎將有勇略守興橋柵常陵暴官軍庚辰祐帥士卒刈麥於張柴村愬召廂虞候史用誠戒之曰爾以三百騎伏彼林中又使人揺幟於前若將焚其麥積者祐素易官軍必輕騎來逐之爾乃發騎掩之必擒之用誠如言而往生擒祐以歸將士以祐曏日多殺官軍爭請殺之愬不許釋􅅞待以客禮時愬欲襲蔡而更宻其謀獨召祐及李忠義屏人語或至夜分它人莫得預聞諸將恐祐爲變多諫愬愬待祐益厚士卒亦不悦諸軍日有牒稱祐爲賊内應且言得賊諜者具言其事愬恐謗先逹於上已不及救乃持祐泣曰豈天不欲平此賊邪何吾二人相知之深而不能勝衆口也因謂衆曰諸君既以祐爲疑請令歸死於天子乃械祐送京師先宻表其狀且曰若殺祐則無以成功詔釋之以還愬愬見之喜執其手曰爾之得全社稷之靈也乃署散兵馬使令佩刀廵警出入帳中或與之同宿宻語不寐逹曙有竊聽於帳外者但聞祐感泣聲時唐隨牙隊三千人號六院兵馬皆山南東道之精鋭也愬又以祐爲六院兵馬使舊軍令舍賊諜者屠其家愬除其令使厚待之諜反以情告愬愬益知賊中虛實乙酉愬遣兵攻朗山淮西兵救之官軍不利衆皆悵恨愬獨歡然曰此吾計也乃募敢死士三千人號曰突將朝夕自教習之使常爲行備欲以襲蔡㑹久雨所在積水未果閏月己亥程异還自江淮得供軍錢百八十五萬緍諫議大夫韋綬兼太子侍讀每以珍膳餉太子又悦太子以諧謔上聞之丁未罷綬侍讀尋出爲䖍州刺史綬京兆人也呉元濟見其下數叛兵勢日蹙六月壬戌上表謝罪願束身自歸上遣中使賜詔許以不死而爲左右及大將董重質所制不得出秋七月大水或平地二丈初國子祭酒孔戣爲華州刺史明州嵗貢蚶蛤淡菜水陸遞夫勞費戣奏䟽罷之甲辰嶺南節度使崔詠薨宰相奏擬代詠者數人上皆不用曰頃有諫進蚶蛤淡菜者爲誰可求其人與之庚戌以戣爲嶺南節度使諸軍討淮西四年不克饋運疲弊民至有以驢耕者上亦病之以問宰相李逢吉等競言師老財竭意欲罷兵裴度獨無言上問之對曰臣請自往督戰乙卯上復謂度曰卿眞能爲朕行乎對曰臣誓不與此賊俱生臣比觀呉元濟表勢實窘蹙但諸將心不壹不併力廹之故未降耳若臣自詣行營諸將恐臣奪其功必爭進破賊矣上悦丙戌以度爲門下侍郎同平章事兼彰義節度使仍充淮西宣慰招討處置使又以户部侍郎崔羣爲中書侍郎同平章事制下度以韓􅀪巳爲都統不欲更爲招討請但稱宣慰處置使仍奏刑部侍郎馬摠爲宣慰副使右庶子韓愈爲彰義行軍司馬判官書記皆朝廷之選上皆從之度將行言於上曰臣若賊滅則朝天有期賊在則歸闕無日上爲之流涕八月庚申度赴淮西上御通化門送之右神武將軍張茂和茂昭弟也嘗以膽略自􅃷於度度表爲都押牙茂和辭以疾度奏請斬之上曰此忠順之門爲卿逺貶辛酉貶茂和永州司馬以嘉王傅髙承簡爲都押牙承簡崇文之子也李逢吉不欲討蔡翰林學士令狐楚與逢吉善度恐其合中外之勢以沮軍事乃請改制書數字且言其草制失辭壬戌罷楚爲中書舍人李光顔烏重㣧與淮西戰癸亥敗于賈店裴度過襄城南白草原淮西人以驍騎七百邀之鎭將楚丘曹華知而爲備擊却之度雖辭招討名實行元帥事以郾城爲治所甲申至郾城先是諸道皆有中使監陳進退不由主將勝則先使獻㨗不利則陵挫百端度悉奏去之諸將始得專其軍事戰多有功九月庚子淮西兵宼溵水鎭殺三將焚芻藁而去初上爲廣陵王布衣張宿以辯口得幸及即位累官至比部員外郎宿招權受賂於外門下侍郎同平章事李逢吉惡之上欲以宿爲諫議大夫逢吉曰諫議重任必能可否朝政者始宜爲之宿小人豈得竊賢者之位必欲用宿請先去臣乃可上由是不悦逢吉又與裴度異議上方倚度以平蔡丁未罷逢吉爲東川節度使甲寅李愬將攻呉房諸將曰今日往亡愬曰吾兵少不足戰宜出其不意彼以往亡不吾虞正可擊也遂往克其外城斬首千餘級餘衆保子城不敢出愬引兵還以誘之淮西將孫獻忠果以驍騎五百追擊其背衆驚將走愬下馬據胡牀令曰敢退者斬返斾力戰獻忠死淮西兵乃退或勸愬乗勝攻其子城可拔也愬曰非吾計也引兵還營李祐言於李愬曰蔡之精兵皆在洄曲及四境拒守守州城者皆羸老之卒可以乗虛直抵其城比賊將聞之元濟已成擒矣愬然之冬十月甲子遣掌書記鄭澥至郾城宻白裴度度曰兵非出竒不勝常侍良圖也上竟用張宿爲諫議大夫崔羣王涯固諫不聽乃請以爲權知諫議大夫許之宿由是怨執政及當時端方之士與皇甫鎛相表裏譖去之裴度帥僚佐觀築城於沱口董重質帥騎出五溝邀之大呼而進注弩挺刃勢將及度李光顔與田布力戰拒之度僅得入城賊退布扼其溝中歸路賊下馬踰溝墜壓死者千餘人辛未李愬命馬歩都虞候隨州刺史史旻等留鎭文城命李祐李忠義帥突將三千爲前驅自與監軍將三千人爲中軍命李進誠將三千人殿其後軍出不知所之愬曰但東行行六十里夜至張柴村盡殺其戍卒及烽子據其柵命士卒少休食乾糒整羈靮留義成軍五百人鎭之以斷朗山救兵命丁士良將五百人斷洄曲及諸道橋梁復夜引兵出門諸將請所之愬曰入蔡州取呉元濟諸將皆失色監軍哭曰果落李祐姦計時大風雪旌旗裂人馬凍死者相望天隂黒自張柴村以東道路皆官軍所未嘗行人人自以爲必死然畏愬莫敢違夜半雪愈甚行七十里至州城近城有鵝鴨池愬令擊之以混軍聲自呉少誠拒命官軍不至蔡州城下三十餘年故蔡人不爲僃壬申四鼓愬至城下無一人知者李祐李忠義钁其城爲坎以先登壯士從之守門卒方熟寐盡殺之而留擊柝者使擊柝如故遂開門納衆及裏城亦然城中皆不之覺雞鳴雪止愬入居元濟外宅或告元濟曰官軍至矣元濟尚寢笑曰俘囚爲盗耳曉當盡戮之又有告者曰城䧟矣元濟曰此必洄曲子弟就吾求寒衣也起聽於廷聞愬軍號令曰常侍傳語應者近萬人元濟始懼曰何等常侍能至於此乃帥左右登牙城拒戰時董重質擁精兵萬餘人據洄曲愬曰元濟所望者重質之救耳乃訪重質家厚撫之遣其子傳道持書諭重質重質遂單騎詣愬降愬遣李進誠攻牙城毁其外門得甲庫取其器械癸酉復攻之燒其南門民爭負薪芻助之城上矢如蝟毛晡時門壊元濟於城上請罪進誠梯而下之甲戌愬以檻車送元濟詣京師且告于裴度是日申光二州及諸鎭兵二萬餘人相繼來降自元濟就擒愬不戮一人凡元濟官吏帳下厨廐之卒皆復其職使之不疑然後屯於鞠􅂣以待裴度以淮南節度使李鄘爲門下侍郎同平章事己卯淮西行營奏獲呉元濟光祿少卿楊元卿言於上曰淮西大有珍寳臣能知之往取必得上曰朕討淮西爲人除害珍寳非所求也董重質之去洄曲軍也李光顔馳入其壁悉降其衆庚辰裴度遣馬揔先入蔡州慰撫辛巳度建彰義軍節將降卒萬餘人入城李愬具櫜鞬出迎拜於路左度將避之愬曰蔡人頑悖不識上下之分數十年矣願公因而示之使知朝廷之尊度乃受之李愬還軍文城諸將請曰始公敗於朗山而不憂勝於呉房而不取冒大風甚雪而不止孤軍深入而不懼然卒以成功皆衆人所不諭也敢問其故愬曰朗山不利則賊輕我不爲備矣取呉房則其衆奔蔡併力固守故存之以分其兵風雪隂晦則烽火不接不知吾至孤軍深入則人皆致死戰自倍矣夫視逺者不顧近慮大者不計細若矜小勝恤小敗先自撓矣何暇立功乎衆皆服愬儉於奉已而豐於待士知賢不疑見可能斷此其所以成功也裴度以蔡卒爲牙兵或諫曰蔡人反仄者尚多不可不備度笑曰吾爲彰義節度使元惡既擒蔡人則吾人也又何疑焉蔡人聞之感泣先是呉氏父子阻兵禁人偶語於塗夜不然燭有以酒食相過從者罪死度既視事下令惟禁盗賊闘殺餘皆不問往來者不限晝夜蔡人始知有生民之樂甲申詔韓􅀪裴度條列平蔡將士功狀及蔡之將士降者皆差第以聞淮西州縣百姓給復二年近賊四州免來年夏税官軍戰亡者皆爲収葬給其家衣糧五年其因戰傷殘廢者勿停衣糧十一月丙戌朔上御興安門受俘遂以呉元濟獻廟社斬于獨桞之下初淮西之人刼於李希烈呉少誠之威虐不能自拔久而老者衰㓜者壯安於悖逆不復知有朝廷矣自少誠以來遣諸將出兵皆不束以法制聽各以便宜自戰故人人得盡其才韓全義之敗于溵水也於其帳中得朝貴所與問訊書少誠束而示衆曰此皆公卿屬全義書云破蔡州日乞一將士妻女爲婢妾由是衆皆憤怒以死爲賊用雖居中土其風俗獷戾過於夷貊故以三州之衆舉天下之兵環而攻之四年然後克之官軍之攻元濟也李師道募人通使於蔡察其形勢牙前虞候劉晏平應募出汴宋間潛行至蔡元濟大喜厚禮而遣之晏平還至鄆師道屏人而問之晏平曰元濟暴兵數萬於外阽危如此而日與僕妾遊戯博奕於内晏然曾無憂色以愚觀之殆必亡不久矣師道素倚淮西爲援聞之驚怒尋誣以它過杖殺之戊子以李愬爲山南東道節度使賜爵凉國公加韓弘兼侍中李光顔烏重㣧等各遷官有差舊制御史二人知驛壬辰詔以宦者爲館驛使左補闕裴潾諫曰内臣外事職分各殊切在塞侵官之源絶出位之漸事有不便必戒於初令或有妨不必在大上不聽甲午恩王連薨辛丑以唐隨兵馬使李祐爲神武將軍知軍事裴度以馬揔爲彰義留後癸丑發蔡州上封二劒以授梁守謙使誅呉元濟舊將度至郾城遇之復與俱入蔡州量罪施刑不盡如詔㫖仍上䟽言之十二月壬戌賜裴度爵晉國公復入知政事以馬揔爲淮西節度使初吐突承璀方貴寵用事爲淮南監軍李鄘爲節度使性剛嚴與承璀互相敬憚故未嘗相失承璀歸引鄘爲相鄘恥由宦官進及將佐出祖樂作鄘泣下曰吾老安外鎭宰相非吾任也戍寅鄘至京師辭疾不入見不視事百官到門者皆辭不見庚辰貶淮西降將董重質爲春州司户重質爲呉元濟謀主屢破官軍上欲殺之李愬奏先許重質以不死十三年春正月乙酉朔赦天下初李師道謀逆命判官髙沭與同僚郭昈李公度屢諫之判官李文會孔目官林英素爲師道所親信涕泣言於師道曰文㑹等盡誠爲尚書憂家事反爲髙沐等所疾尚書柰何不愛十二州之土地以成沐等之功名乎師道由是踈沐等出沐知萊州㑹林英入奏事令進奏吏宻申師道云沐潛輸欵於朝廷文㑹從而構之師道殺沐并囚郭昈凡軍中勸師道效順者文㑹皆指爲髙沐之黨而囚之及淮西平師道憂懼不知所爲李公度及牙將李英曇因其懼而説之使納質獻地以自贖師道從之遣使奉表請使長子入侍并獻沂宻海三州上許之乙巳遣左常侍李遜詣鄆州宣慰上命六軍修麟德殿右龍武統軍張奉國大將軍李文悦以外宼初平營繕太多白宰相冀有論諫裴度因奏事言之上怒二月丁夘以奉國爲鴻臚卿壬申以文悦爲右武衛大將軍充威逺營使於是浚龍首池起承暉殿土木浸興矣李愬奏請判官大將以下官凡百五十員上不悦謂裴度曰李愬誠有竒功然奏請過多使如李晟渾瑊又何如哉遂留中不下李鄘固辭相位戊戌以鄘爲户部尚書以御史大夫李夷簡爲門下侍郎同平章事初渤海僖王言義卒弟簡王明忠立改元太始一歳卒從父仁秀立改元建興乙巳遣使來告䘮横海節度使程權自以世襲滄景與河朔三鎭無殊内不自安己酉遣使上表請舉族入朝許之横海將士樂自擅不聽權去掌書記林藴諭以禍福權乃得出詔以藴爲禮部員外郎裴度之在淮西也布衣柏耆以䇿干韓愈曰呉元濟既就擒王承宗破膽矣願得奉丞相書往説之可不煩兵而服愈白度爲書遣之承宗懼求哀於田弘正請以二子爲質及獻德棣二州輸租税請官吏弘正爲之奏請上初不許弘正上表相繼上重違弘正意乃許之夏四月甲寅朔魏博遣使送承宗子知感知信及德棣二州圖印至京師幽州太將譚忠説劉總曰自元和以來劉闢李錡田季安盧從史呉元濟阻兵馮險自以爲深根固蔕天下莫能危也然顧眄之間身死家覆皆不自知此非人力所能及殆天誅也况今天子神聖威武苦身焦思縮衣節食以養戰士此志豈須臾忘天下哉今國兵駸駸北來趙人已獻城十二忠深爲公憂之緫泣且拜曰聞先生言吾心定矣遂專意歸朝廷􅊨戊辰内出廢印二紐賜左右三軍辟仗使舊制以宦官爲六軍辟仗使如方鎭之監軍無印及張奉國等得罪至是始賜印得紏繩軍政事任專逹矣庚辰詔洗雪王承宗及成德將士復其官爵李師道暗弱軍府大事獨與妻魏氏奴胡惟堪楊自温婢蒲氏袁氏及孔目官王再升謀之大將及幕僚莫得預焉魏氏不欲其子入質與蒲氏袁氏言於師道曰自先司徒以來有此十二州柰何無故割而獻之今計境内之兵不下數十萬不獻三州不過以兵相加若力戰不勝獻之未晩師道乃大悔欲殺李公度慕僚賈直言謂其用事奴曰今大禍將至豈非髙沐寃氣所爲若又殺公度軍府其危哉乃囚之遷李英曇於萊州未至縊殺之李遜至鄆州師道大陳兵迎之遜盛氣正色爲陳禍福責其決語欲白天子師道退與其黨謀之皆曰弟許之它日正煩一表解紛耳師道乃謝曰曏以父子之私且廹於將士之情故遷延未遣今重煩朝使豈敢復有二三遜察師道非實誠歸言於上曰師道頑愚反覆恐必須用兵既而師道表言軍情不聽納質割地上怒决意討之賈直言冒刃諫師道者二輿櫬諫者一又畫縛載檻車妻子係纍者以獻師道怒囚之五月丙申以忠武節度使李光顔爲義成節度使謀討師道也以淮西節度使馬揔爲忠武節度陳許溵蔡州觀察使以申州􅀠鄂岳光州􅀠淮南辛丑以知勃海國務大仁秀爲勃海王以河陽都知兵馬使曹華爲棣州刺史詔以河陽兵二千送至滳河㑹縣爲平盧兵所陷華擊却之殺二千餘人復其縣以聞詔加横海節度副使六月癸丑朔日有食之丁丑復以烏重㣧領懐州刺史鎭河陽秋七月癸未朔徙李愬爲武寧節度使乙酉下制罪狀李師道令宣武魏博義成武寧横海兵共討之以宣歙觀察使王遂爲供軍使遂方慶之孫也上方委裴度以用兵門下侍郎同平章事李夷簡自謂才不及度求出鎭辛丑以夷簡同平章事充淮南節度使八月壬子朔中書侍郎同平章事王涯罷爲兵部侍郎呉元濟既平韓􅀪懼九月自將兵擊李師道圍曹州淮西既平上浸驕侈户部侍郎判度支皇甫鎛衛尉卿鹽鐵轉運使程异曉其意數進羡餘以供其費由是有寵鎛又以厚賂結吐突承璀甲辰鎛以本官异以工部侍郎並同平章事判使如故制下朝野駭愕至於市道負販者亦嗤之裴度崔羣極陳其不可上不聽度耻與小人同列表求自退不許度復上䟽以爲鎛异皆錢榖吏佞巧小人陛下一旦寘之相位中外無不駭笑况鎛在度支專以豐取刻與爲務凡中外仰給度支之人無不思食其肉比者裁損淮西糧料軍士怨怒㑹臣至行營曉諭慰勉僅無潰亂今舊將舊兵悉向淄青聞鎛入相必盡驚憂知無可訴之地矣程异雖人品庸下然心事和平可處煩劇不宜爲相至如鎛資性狡詐天下共知唯能上惑聖聦足見姦邪之極臣若不退天下謂臣不知廉耻臣若不言天下謂臣有負恩寵今退既不許言又不聽臣如烈火燒心衆鏑叢體所可惜者淮西盪定河北底寧承宗歛手削地韓弘輿疾討賊豈朝廷之力能制其命哉直以處置得宜能服其心耳陛下建升平之業十已八九何忍還自墮壊使四方解體乎上以度爲朋黨不之省鎛自知不爲衆所與益爲巧謟以自固奏減内外官俸以助國用給事中崔植封還敕書極論之乃止植祐甫之弟子也時内出積年繒帛付度支令賣鎛悉以髙價買之以給邊軍其繒帛朽敗隨手破裂邊軍聚而焚之度因奏事言之鎛於上前引其足曰此靴亦内庫所出臣以錢二千買之堅完可久服度言不可信上以爲然由是鎛益無所憚程异亦自知不合衆心能亷謹謙遜爲相月餘不敢知印秉筆故終免於禍五坊使楊朝汶妄捕繫人廹以考捶責其息錢遂轉相誣引所繫近千人中丞蕭俛劾奏其狀裴度崔羣亦以爲言上曰姑與卿論用兵事此小事朕自處之度曰用兵事小所憂不過山東耳五坊使暴横恐亂輦轂上不悦退召朝汶責之曰以汝故令吾羞見宰相冬十月賜朝汶死盡釋繫者上晩節好神仙詔天下求方士宗正卿李道古先爲鄂岳觀察使以貪暴聞恐終獲罪思所以自媚於上乃因皇甫鎛薦山人栁泌云能合長生藥甲戌詔泌居興唐觀煉藥十一月辛巳朔鹽州奏吐蕃寇河曲夏州靈武奏破吐蕃長樂州克其外城栁泌言於上曰天台山神仙所聚多靈草臣雖知之力不能致誠得爲彼長吏庶幾可求上信之丁亥以泌權知台州刺史仍賜服金紫諫官爭論奏以爲人主喜方士未有使之臨民賦政者上曰煩一州之力而能爲人主致長生臣子亦何愛焉由是羣臣莫敢言甲午鹽州奏吐蕃引去壬寅以河陽節度使烏重㣧爲横海節度使丁未以華州刺史令狐楚爲河陽節度使重㣧以河陽精兵三千赴鎭河陽兵不樂去鄉里中道潰歸又不敢入城屯于城北將大掠令狐楚適至單騎出慰撫之與俱歸先是田弘正請自黎陽渡河㑹義成莭度使李光顔討李師道裴度曰魏博軍既度河不可復退立須進擊方有成功既至滑州即仰給度支徒有供餉之勞更生觀望之勢又或與李光顔互相疑阻益致遷延與其度河而不進不若養威於河北宜且使之秣馬厲兵俟霜降水落自楊劉渡河直指鄆州得至陽榖置營則兵勢自盛賊衆揺心矣上從之是月弘正將魏博全師自楊劉度河距鄆州四十里築壘賊中大震功德使上言鳯翔法門寺塔有佛指骨相傳三十年一開開則歳豐人安來年應開請迎之十二月庚戌朔上遣中使帥僧衆迎之戊辰以春州司户董重質爲試太子詹事委武寧軍驅使李愬請之也戊寅魏愽義成軍送所獲李師道都知兵馬使夏侯澄等四十七人上皆釋弗誅各付所獲行營驅使曰若有父母欲歸者優給遣之朕所誅者師道而已於是賊中聞之降者相繼初李文㑹與兄元規皆在李師古幕下師古薨師道立元規辭去文㑹屬師道親黨請留元規將行謂文㑹曰我去身退而安全汝留必驟貴而受禍及官軍四臨平盧兵勢日蹙將士喧然皆曰髙沐郭昈李存爲司空忠謀李文㑹姧佞殺沐囚昈存以致此禍師道不得已出文㑹攝登州刺史召昈存還幕府上常語宰相人臣當力爲善何乃好立朋黨朕甚惡之裴度對曰方以類聚物以羣分君子小人志趣同者勢必相合君子爲徒謂之同德小人爲徒謂之朋黨外雖相似内實懸殊在聖主辨其所爲邪正耳武寧節度使李愬與平盧兵十一戰皆㨗乙卯晦進攻金鄉克之李師道性懦怯自官軍致討聞小敗及失城邑輒憂悸成疾由是左右皆蔽匿不以實告金鄉兖州之要地既失之其刺史遣驛騎告急左右不爲通師道至死竟不知也十四年春正月辛巳韓弘拔考城殺二千餘人丙戌師道所署沭陽令梁洞以縣降于楚州刺史李聽吐蕃遣使者論短立藏等來修好未返入寇河曲上曰其國失信其使何罪庚寅遣歸國壬辰武寧節度使李愬拔魚臺中使迎佛骨至京師上留禁中三日乃厯送諸寺王公士民瞻奉捨施惟恐弗及有竭産充施者有然香臂頂供養者刑部侍郎韓愈上表切諫以爲佛者夷狄之一法耳自黄帝以至禹湯文武皆享壽考百姓安樂當是時未有佛也漢明帝時始有佛法其後亂亡相繼運祚不長宋齊梁陳元魏已下事佛漸謹年代尤促唯梁武帝在位四十八年前後三捨身爲寺家奴竟爲矦景所逼餓死臺城國亦尋滅事佛求福乃更得禍由此觀之佛不足信亦可知矣百姓愚冥易惑難曉茍見陛下如此皆云天子大聖猶一心敬信百姓微賤於佛豈可更惜身命佛本夷狄之人口不言先王之法言身不服先王之法服不知君臣之義父子之恩假如其身尚在奉國命來朝京師陛下容而接之不過宣政一見禮賔一設賜衣一襲衛而出之於境不令惑衆也况其身死已久枯朽之骨豈宜以入宫禁古之諸矦行弔於國尚令巫祝先以桃茢除不祥今無故取朽穢之物親視之巫祝不先桃茢不用羣臣不言其非御史不舉其罪臣實恥之乞以此骨付有司投諸水火永絶根本斷天下之疑絶後代之惑使天下之人知大聖人之所作爲出於尋常萬萬也豈不盛哉佛如有靈能作禍福凡有殃咎宜加臣身上得表大怒出示宰相將加愈極刑裴度崔羣爲言愈雖狂􅀤於忠懇宜寛容以開言路癸巳貶愈爲潮州刺史自戰國之世老莊與儒者爭衡更相是非至漢末益之以佛然好者尚寡晉宋以來日益繁熾自帝王至于士民莫不尊信下者畏慕罪福髙者論難空有濁愈惡其蠧財惑衆力排之其言多矯激太過惟送文暢師序最得其要曰夫鳥俛而啄仰而四顧獸深居而簡出懼物之爲已害也猶且不免焉弱之肉彊之食今吾與文暢安居而暇食優游以生死與禽獸異者寧可不知其所自邪丙申田弘正奏敗淄青兵於東阿殺萬餘人滄州刺史李宗奭與横海節度使鄭權不叶不受其節制權奏之上遣中使追之宗奭使其軍中留已表稱懼亂未敢離州詔以烏重㣧代權將吏懼逐宗奭宗奭奔京師辛丑斬于獨栁之下丙午田弘正奏敗平盧兵於陽榖資治通鑑卷第二百四十
