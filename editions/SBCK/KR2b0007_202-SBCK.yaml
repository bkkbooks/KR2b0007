front:
  text: 資治通鑑卷第二百二
  hash: sha256:b8e319670883c5afe658a9c6a2f2b7666353f32df0043b6d3fbc13aa2ed73aba
body:
  text: 臣司馬光奉勑編集唐紀十八大荒落凡十一年起重光協洽盡重光髙宗天皇大聖大弘孝皇帝中之下咸亨二年春正月甲子上幸東都夏四月甲申以西突厥阿史那都支為左驍衛大將軍兼匐延都督以安集五咄陸之衆初武元慶等既死皇后奏以其姊子賀蘭敏之為士彠之嗣襲爵周公改姓武氏累遷弘文舘學士左散騎常侍魏國夫人之死也上見敏之悲泣曰曏吾出視朝猶無恙退朝已不救何蒼猝如此敏之號哭不對后聞之曰此兒疑我由是惡之敏之貌美蒸於太原王妃及居妃喪釋衰絰奏妓司衛少卿楊思儉女有殊色上及后自選以為太子妃昏有日矣敏之逼而淫之后於是表言敏之前後罪惡請加竄逐六月丙子敕流雷州復其本姓至韶州以馬韁絞死朝士坐與敏之交遊流嶺南者甚衆秋七月乙未朔髙侃破髙麗餘衆於安市城九月丙申潞州剌史徐王元禮薨冬十一月甲午朔日有食之車駕自東都幸許汝十二月癸酉校獵於葉縣丙戌還東都三年春正月辛丑以太子右衛副率梁積夀為姚州道行軍揔管將兵討叛蠻庚戌昆明蠻十四姓二萬三千户内附置殷敦緫三州二月庚午徙吐谷渾於鄯州浩亹水南吐谷渾畏吐蕃之彊不安其居又鄯州地狹尋徙靈州以其部落置安樂州以可汗諾曷鉢為刺史吐谷渾故地皆入於吐蕃己卯侍中永安郡公姜恪薨夏四月庚午上幸合璧宫吐蕃遣其大臣仲琮入貢上問以吐蕃風俗對曰吐蕃地薄氣寒風俗朴魯然法令嚴整上下一心議事常自下而起因人所利而行之斯所以能持久也上詰以吞滅吐谷渾敗薛仁貴冦逼凉州事對曰臣受命貢獻而已軍旅之事非所聞也上厚賜而遣之癸未遣都水使者黄仁素使于吐蕃秋八月壬午特進髙陽郡公許敬宗卒太常博士袁思古議敬宗弃長子於荒徼嫁少女於夷貃案謚法名與實爽曰繆請謚為繆敬宗孫太子舍人彦伯訟思古與許氏有怨請改謚太常博士王福畤議以為謚者得失一朝榮辱千載若嫌隙有實當據法椎繩如其不然義不可奪户部尚書戴至德謂福畤曰髙陽公任遇如是何以謚之為繆對曰昔晉司空何曾既忠且孝徒以日食萬錢秦秀謚之曰繆許敬宗忠孝不逮於曾而飲食男女之累過之謚之曰繆無負許氏矣詔集五品已上更議禮部尚書陽思敬議按謚法既過能改曰恭請諡曰恭詔從之敬宗嘗奏流其子昂于嶺南又以女嫁蠻酋馮盎之子多納其貨故思古議及之福畤勃之父也九月癸卯徙沛王賢為雍王冬十月己未詔太子監國壬戌車駕發東都十一月戊子朔日有食之甲辰車駕至京師十二月髙侃與髙麗餘衆戰于白水山破之新羅遣兵救髙麗侃擊破之癸卯以左庶子劉仁軌同中書門下三品太子罕接宫臣典膳丞全椒邢文偉輒減所供膳并上書諫太子太子復書謝以多疾及入侍少暇嘉納其意頃之右史缺上曰邢文偉事吾子能撤膳進諫此直士也擢為右史太子因宴集命宫臣擲倒次至左奉裕率王及善及善曰擲倒自有伶官臣若奉令恐非所以羽翼殿下也太子謝之上聞之賜及善縑百匹尋遷左千牛衛將軍四年春正月丙辰絳州刺史鄭惠王元懿薨三月丙申詔劉仁軌等改修國史以許敬宗等所記多不實故也夏四月丙子車駕幸九成宫閏五月燕山道揔管右領軍大將軍李謹行大破髙麗叛者於瓠蘆河之西俘獲數千人餘衆皆奔新羅時謹行妻劉氏留伐奴城髙麗引靺鞨攻之劉氏擐甲帥衆守城久之虜退上嘉其功封燕國夫人謹行靺鞨人突地稽之子也武力絶人為衆夷所憚秋七月辛巳婺州大水溺死者五千人八月辛丑上以瘧疾命太子於延福殿受諸司啓事冬十月壬午中書令閻立本薨乙巳車駕還京師十二月丙午弓月踈勒二王來降西突厥興昔亡可汗之世諸部離散弓月及阿悉吉皆叛蘇定方之西討也擒阿悉吉以歸弓月南結吐蕃比招咽麪共攻踈勒降之上遣鴻臚卿蕭嗣業發兵討之嗣業兵未至弓月懼與踈勒皆入朝上赦其罪遣歸國上元元年春正月壬午以左庶子同中書門下三品劉仁軌為雞林道大揔管衛尉卿李弼右領軍大將軍李謹行副之發兵討新羅時新羅王法敏既納髙麗叛衆又據百濟故地使人守之上大怒詔削法敏官爵其弟右驍衛貟外大將軍臨海郡公仁問在京師立以為新羅王使歸國三月辛亥朔日有食之賀蘭敏之既得罪皇后奏召武元爽之子承嗣於嶺南襲爵周公拜尚衣奉御夏四月辛卯遷宗正卿秋八月壬辰追尊宣簡公為宣皇帝妣張氏為宣莊皇后懿王為光皇帝妣賈氏為光懿皇后太武皇帝為神堯皇帝太穆皇后為太穆神皇后文皇帝為太宗文武聖皇帝文德皇后為文德聖皇后皇帝稱天皇皇后稱天后以避先帝先后之稱改元赦天下戊戍敕文武官三品以上服紫金玉帶四品服深緋金帯五品服淺緋金帶六品服􅀷緑七品服淺緑並銀帶八品服深青九品服淺青並䃋石帶庶人服黄銅鐵帶自非庶人不聽服黄九月癸丑詔追復長孫晟長孫无忌官爵以无忌曾孫翼襲爵趙公聽无忌喪歸陪葬昭陵甲寅上御翔鸞閣觀大酺分音樂為東西朋使雍王賢主東朋周王顯主西朋角勝為樂郝處俊諫曰二王春秋尚少志趣未定當推棃讓棗相親如一今分二朋遞相誇競俳優小人言辭無度恐其交爭勝負譏誚失禮非所以崇禮義勸敦睦也上瞿然曰卿逺識非衆人所及也遽止之是日衛尉卿李弼暴卒于宴所為之廢酺一日冬十一月丙午朔車駕發京師己酉校獵華山之曲武原戊辰至東都箕州録事參軍張君澈等誣告刺史蔣王惲及其子汝南郡王煒謀反敕通事舍人薛思貞馳傳往按之十二月癸未惲惶懼自縊死上知其非罪深痛惜之斬君澈等四人戊子于闐王伏闍雄來朝辛卯波斯王卑路斯來朝壬寅天后上表以為國家聖緒出自玄元皇帝請令王公以下皆習老子每歳明經凖孝經論語策試又請自今父在為母服齊衰三年又京官八品以上宜量加俸禄及其餘便宜合十二條詔書襃美皆行之是歳有劉曉者上䟽論選以為今選曹以檢勘為公道書判為得人殊不知考其德行才能况書判借人者衆矣又禮部取士專用文章為甲乙故天下之士皆捨德行而趨文藝有朝登甲科而夕陷刑辟者雖日誦萬言何闗理體文成七歩未足化人况盡心卉木之間極筆煙霞之際以斯成俗豈非大謬夫人之慕名如水趨下上有所好下必甚焉陛下若取士以德行爲先文藝為末則多士雷奔四方風動矣二年春正月丙寅以于闐國為毗沙都督府分其境内為十州以于闐王尉遲伏闍雄為毗沙都督辛未吐蕃遣其大臣論吐渾彌來請和且請與吐谷渾復修鄰好上不許二月劉仁軌大破新羅之衆於七重城又使靺鞨浮海略新羅之南境斬獲甚衆仁軌引兵還詔以李謹行為安東鎮撫大使屯新羅之買肖城以經略之三戰皆㨗新羅乃遣使入貢且謝罪上赦之復新羅王法敏官爵金仁問中道而還改封臨海郡公三月丁巳天后祀先蠶于邙山之陽百官及朝集使皆陪位上苦風􅅭甚議使天后攝知國政中書侍郎同三品郝處俊曰天子理外后理内天之道也昔魏文帝著令雖有㓜主不許皇后臨朝所以杜禍亂之萌也陛下柰何以髙祖太宗之天下不傳之子孫而委之天后乎中書侍郎昌樂李義琰曰處俊之言至忠陛下宜聽之上乃止天后多引文學之士著作郎元萬頃左史劉禕之等使之撰列女傳臣􅁤百僚新戒樂書凡千餘卷朝廷奏議及百司表䟽時密令參决以分宰相之權時人謂之北門學士禕之子翼之子也夏四月庚辰以司農少卿韋弘機為司農卿弘機兼知東都營田受詔完葺宫苑有宦者於苑中犯法弘機杖之然後奏聞上以為能賜絹數十匹曰更有犯者卿即杖之不必奏也初左千牛將軍長安趙瓌尚髙祖女常樂公主生女為周王顯妃公主頗為上所厚天后惡之辛巳妃坐廢幽閉於内侍省食料給生者防人􅀱其突煙而已數日煙不出開視死腐矣瓌自定州刺史貶括州刺史令公主隨之官仍絶其朝謁太子弘仁孝謙謹上甚愛之禮接士大夫中外屬心天后方逞其志太子奏請數迕旨由是失愛於天后義陽宣城二公主蕭淑妃之女也坐母得罪幽于掖庭年踰三十不嫁太子見之驚惻遽奏請出降上許之天后怒即日以公主配當上翊衛權毅王遂古己亥太子薨于合璧宫時人以為天后酖之也壬寅車駕還洛陽宫五月戊申下詔朕方欲禪位皇太子而疾遽不起宜申往命加以尊名可謚為孝敬皇帝六月戊寅立雍王賢為皇太子赦天下天后惡慈州刺史杞王上金有司希㫖奏其罪秋七月上金坐解官澧州安置八月庚寅葬孝敬皇帝于恭陵戊戌以戴至德為右僕射庚子以劉仁軌為左僕射並同中書門下三品如故張文瓘為侍中郝處俊為中書令李敬玄為吏部尚書兼左庶子同中書門下三品如故劉仁軌戴至德更日受牒訴仁軌常以美言許之至德必據理難詰未嘗與奪實有寃結者密為奏辨由是時譽皆歸仁軌或問其故至德曰威福者人主之柄人臣安得盗取之上聞深重之有老嫗欲詣仁軌陳牒誤詣至德至德覽之未終嫗曰本謂是解事僕射乃不解事僕射邪歸我牒至德笑而授之時人稱其長者文瓘時兼大理卿囚聞改官皆慟哭文瓘性嚴正諸司奏議多所糾駮上甚委之儀鳯元年春正月壬戌徙冀王輪為相王納州獠反敕黔州都督發兵討之二月甲戌徙安東都䕶府於遼東故城先有華人任安東官者悉罷之徙熊津都督府於建安故城其百濟户口先徙徐兖等州者皆置於建安天后􅂆上封中嶽癸未詔以今冬有事于嵩山丁亥上幸汝州之温湯三月癸卯黄門侍郎來􅁪中書侍郎薛元超並同中書門下三品􅁪濟之兄元超収之子也甲辰上還東都閏月吐蕃冦鄯廓河芳等州敕左監門衛中郎將令狐智通發興鳯等州兵以禦之己卯詔以吐蕃犯塞停封中嶽乙酉以洛州牧周王顯為洮州道行軍元帥將工部尚書劉審禮等十二揔管并州大都督相王輪為凉州道行軍元帥將左衛大將軍契苾何力等以討吐蕃二王皆不行庚寅車駕西還甲寅中書侍郎李義琰同中書門下三品戊午車駕至九成宫六月癸亥黄門侍郎晉陵髙智周同中書門下三品秋八月乙未吐蕃冦疊州壬寅敕桂廣文黔等都督府比來注擬土人簡擇未精自今每四年遣五品已上清正官充使仍令御史同往注擬時人謂之南選九月壬申大理奏左威衛大將軍權善才右監門中郎將范懐義誤斫昭陵栢罪當除名上特命殺之大理丞太原狄仁傑奏二人罪不當死上曰善才等斫陵栢我不殺則為不孝仁傑固執不已上作色令出仁傑曰犯顏直諫自古以為難臣以為遇桀紂則難遇堯舜則易今法不至死而陛下特殺之是法不信於人也人何所措其手足且張釋之有言設有盗長陵一抔土陛下何以處之今以一株栢殺二將軍後代謂陛下為何如矣臣不敢奉詔者恐陷陛下於不道且羞見釋之於地下故也上怒稍解二人除名流嶺南後數日擢仁傑為侍御史初仁傑為并州法曹同僚鄭崇質當使絶域崇質母老且病仁傑曰彼母如此豈可復使之有萬里之憂詣長史藺仁基請代之行仁基素與司馬李孝廉不叶因相謂曰吾輩豈可不自愧乎遂相與輯睦冬十月車駕還京師丁酉祫享太廟用大學博士史璨議禘後三年而祫祫後二年而禘郇王素節蕭淑妃之子也警敏好學天后惡之自岐州刺史左遷申州刺史乾封􅀄敕曰素節既有舊疾不須入朝而素節實無疾自以久不得入覲乃著忠孝論王府倉曹參軍張柬之因使濳封其論以進后見之誣以贓賄丙午降封鄱陽王袁州安置十一月壬申改元赦天下庚寅以李敬玄為中書令十二月戊午以來􅁪為河南道大使薛元超為河北道大使尚書左丞鄢陵崔知悌國子司業鄭祖玄為江南道大使分道廵撫二年春正月乙亥上耕籍田初劉仁􅁤引兵自熊津還扶餘隆畏新羅之逼不敢留尋亦還朝二月丁巳以工部尚書髙藏為遼東州都督封朝鮮王遣歸遼東安輯髙麗餘衆髙麗先在諸州者皆遣與藏俱歸又以司農卿扶餘隆為熊津都督封帶方王亦遣歸安輯百濟餘衆仍移安東都䕶府於新城以統之時百濟荒殘命隆寓居髙麗之境藏至遼東謀叛潜與靺鞨通召還徙卭州而死散徙其人於河南隴右諸州貧者留安東城傍髙麗舊城没於新羅餘衆散入靺鞨及突厥隆亦竟不敢還故地髙氏扶餘氏遂亡三月癸亥朔以郝處俊髙智周並為左庶子李義琰為右庶子夏四月左庶子張大安同中書門下三品大安公謹之子也詔以河南北旱遣御史中丞崔謐等分道存問賑給侍御史寧陵劉思立上䟽以為今麥秀蠶老農事方殷敕使撫廵人皆竦抃忘其家業冀此天恩聚集參迎妨廢不少既縁賑給須立簿書本欲安存更成煩擾望且委州縣賑給待秋深務閑出使褒貶䟽奏謐等遂不行五月吐蕃冦扶州之臨河鎮擒鎮將杜孝昇令齎書説松州都督武居寂使降孝昇固執不從吐蕃軍還捨孝昇而去孝昇復帥餘衆拒守詔以孝昇為游擊將軍秋八月徙周王顯為英王更名哲命劉仁軌鎮洮河軍冬十二月乙卯詔大發兵討吐蕃詔以顯慶新禮多不師古其五禮並依周禮行事自是禮官益無憑守每有大禮臨時撰定三年春正月辛酉百官及蠻夷酋長朝天后于光順門劉仁􅁤鎮洮河每有奏請多為李敬玄所抑由是怨之仁軌知敬玄非將帥才欲中傷之奏言西邊鎮守非敬玄莫可敬玄固辭上曰仁軌須朕朕亦自往卿安得辭丙子以敬玄代仁軌為洮河道大揔管兼安撫大使仍檢校鄯州都督又命益州大都督府長史李孝逸等發劒南山南兵以赴之孝逸神通之子也癸未遣左金吾將軍曹懐舜等分往河南北募猛士不問布衣及仕官夏四月戊申赦天下改來年元為通乾五月壬戌上幸九成宫丙寅山中雨大寒從兵有凍死者秋七月李敬玄奏破吐蕃於龍支上初即位不忍觀破陳樂命撤之辛酉太常少卿韋萬石奏乆寢不作懼成廢缺請自今大宴㑹復奏之上從之九月辛酉車駕還京師上將發兵討新羅侍中張文瓘卧疾在家自輿入見諌曰今吐蕃為冦方發兵西討新羅雖云不順未嘗犯邊若又東征臣恐公私不堪其弊上乃止癸亥文瓘薨丙寅李敬玄將兵十八萬與吐蕃將論欽陵戰於青海之上兵敗工部尚書左衛大將軍彭城僖公劉審禮為吐蕃所虜時審禮將前軍深入頓于濠所為虜所攻敬玄懦怯按兵不救聞審禮戰没狼狽還走頓于承風嶺阻泥溝以自固虜屯兵髙岡以壓之左領軍貟外將軍黑齒常之夜帥敢死之士五百人襲擊虜營虜衆潰亂其將䟦地設引兵遁去敬玄乃収餘衆還鄯州審禮諸子自縳詣闕請入吐蕃贖其父敕聽次子易從詣吐蕃省之比至審禮已病卒易從晝夜號哭不絶聲吐蕃哀之還其尸易從徒跣負之以歸上嘉黑齒常之之功擢拜左武衛將軍充河源軍副使李敬玄之西征也監察御史原武婁師德應猛士詔從軍及敗敕師德収集散亡軍乃復振因命使于吐蕃吐蕃將論賛婆迎之赤嶺師德宣導上意諭以禍福賛婆甚恱為之數年不犯邊師德遷殿中侍御史充河源軍司馬兼知營田事上以吐蕃為憂悉召侍臣謀之或欲和親以息民或欲嚴設守僃俟公私富實而討之或欲亟發兵擊之議竟不决賜食而遣之太學生宋城魏元忠上封事言禦吐蕃之策以為理國之要在文與武今言文者則以辭華為首而不及經綸言武者則以騎射為先而不知方略是皆何益於理亂哉故陸機著辨亡之論無救河橋之敗養由基射穿七札不濟鄢陵之師此己然之明効也古語有之人無常俗政有理亂兵無彊弱將有巧拙故選將當以智略為本勇力為末今朝廷用人類取將門子弟及死事之家彼皆庸人豈足當閫外之任李左車陳湯吕蒙孟觀皆出貧賤而立殊功未聞其家代為將也夫賞罰者軍國之切務茍有功不賞有罪不誅雖堯舜不能以致理議者皆云近日征伐虚有賞格而無事實蓋由小才之吏不知大體徒惜勲庸恐虛倉庫不知士不用命所損幾何黔首雖微不可欺罔豈得懸不信之令設虛賞之科而望其立功乎自蘇定方征遼東李勣破平壤賞絶不行勲仍淹滯不聞斬一臺郎戮一令史以謝勲人大非川之敗薛仁貴郭待封等不即重誅曏使早誅仁貴等則自餘諸將豈敢失利於後哉臣恐吐蕃之平非旦夕可冀也又出師之要全資馬力臣請開畜馬之禁使百姓皆得畜馬若官軍大舉委州縣長吏以官錢增價市之則皆為官有彼胡虜恃馬力以為彊若聽人間市而畜之乃是損彼之彊為中國之利也先是禁百姓畜馬故元忠言之上善其言召見令直中書省仗内供奉冬十月丙午徐州刺史密貞王元曉薨十一月壬子黄門侍郎同中書門下三品來􅁪薨十二月詔停來年通乾之號以反語不善故也調露元年春正月己酉上幸東都司農卿韋弘機作宿羽髙山上陽等宫制度壯麗上陽宫臨洛水為長廊亘一里宫成上移御之侍御史狄仁傑劾奏弘機導上為奢泰弘機坐免官左司郎中王本立恃恩用事朝廷畏之仁傑奏其姦請付法司上特原之仁傑曰國家雖乏英才豈少本立軰陛下何惜罪人以虧王法必欲曲赦本立請弃臣於無人之境為忠貞將來之誡本立竟得罪由是朝廷肅然庚戌右僕射太子賔客道恭公戴至德薨二月壬戌吐蕃賛普卒子器弩悉弄立生八年矣時器弩悉弄與其舅麴薩若詣羊同發兵有弟生六年在論欽陵軍中國人畏欽陵之彊欲立之欽陵不可與薩若共立器弩悉弄上聞賛普卒嗣主未定命裴行儉乗閒圖之行儉曰欽陵為政大臣輯睦未可圖也乃止夏四月辛酉郝處俊為侍中偃師人眀崇儼以符呪幻術為上及天后所重官至正諌大夫五月壬午崇儼為盗所殺求賊竟不得贈崇儼侍中丙戌命太子監國太子處事明審時人稱之戊戌作紫桂宫於澠池之西六月辛亥赦天下改元初西突厥十姓可汗阿史那都支及其别帥李遮匐與吐蕃連和侵逼安西朝議欲發兵討之吏部侍郎裴行儉曰吐蕃為冦審禮覆没干戈未息豈可復出師西方今波斯王卒其子泥洹師為質在京師宜遣使者送歸國道過二虜以便宜取之可不血刅而擒也上從之命行儉冊立波斯王仍為安撫大食使行儉奏肅州刺史王方翼以為已副仍令檢校安西都䕶秋七月己卯朔詔以今年冬至有事于嵩山初裴行儉嘗為西州長史及奉使過西州吏人郊迎行儉悉召其豪傑子弟千餘人自隨且􅀭言天時方熱未可涉逺湏稍凉乃西上阿史那都支覘知之遂不設僃行儉徐召四鎮諸胡酋長謂曰昔在西州縱獵甚樂今欲尋舊賞誰能從吾獵者諸胡子弟爭請從行近得萬人行儉陽為畋獵校勒部伍數日遂倍道西進去都支部落十餘里先遣都支所親問其安否外示閑暇似非討襲續使人促召相見都支先與李遮匐約秋中拒漢使猝聞軍至計無所出帥其子弟迎謁遂擒之因傳其契箭悉召諸部酋長執送碎葉城簡其精騎輕齎晝夜進掩遮匐途中獲都支還使與遮匐使者同來行儉釋遮匐使者使先往諭遮匐以都攴巳就擒遮匐亦降於是囚都支遮匐以歸遣波斯王自還其國留王方翼於安西使築碎葉城冬十月單于大都䕶府突厥阿史德温傳奉職二部俱反立阿史那泥熟匐為可汗二十四州酋長皆叛應之衆數十萬遣鴻臚卿單于大都䕶府長史蕭嗣業左領軍衛將軍花大智右千牛衛將軍李景嘉等將兵討之嗣業等先戰屢捷因不設僃會大雪突厥夜襲其營嗣業狼狽㧞營走衆遂大亂為虜所敗死者不可勝數大智景嘉引步兵且行且戰得入單于都䕶府嗣業減死流桂州大智景嘉並免官突厥冦定州刺史霍王元􅁤命開門偃旗虜疑有伏懼而宵遁州人李嘉運與虜通謀事洩上令元軌窮其黨與元軌曰彊冦在境人心不安若多所逮繫是驅之使叛也乃獨殺嘉運餘無所問因自劾違制上覽表大喜謂使者曰朕亦悔之向無王失定州矣自是朝廷有大事上多密敕問之壬子遣左金吾衛將軍曹懐舜屯井陘右武衛將軍崔獻屯龍門以備突厥突厥扇誘奚契丹侵掠營州都督周道務遣户曹始平唐休璟將兵擊破之庚申詔以突厥背誕罷封嵩山癸亥吐蕃文成公主遣其大臣論塞調傍來告喪并請和親上遣郎將宋令文詣吐蕃㑹賛普之葬十一月戊寅朔以太子左庶子同中書門下三品髙智周為御史大夫罷知政事癸未上宴裴行儉謂之曰卿有文武兼資今授卿二職乃除禮部尚書兼檢校右衛大將軍甲辰以行儉為定襄道行軍大揔管將兵十八萬并西軍檢校豐州都督程務挺東軍幽州都督李文暕揔三十餘萬以討突厥並受行儉節度務挺名振之子也永隆元年春二月癸丑上幸汝州之温湯戊午幸嵩山處士三原田遊巖所居己未幸道士宗城潘師正所居上及天后太子皆拜之乙丑還東都三月裴行儉大破突厥於黑山擒其酋長奉職可汗泥熟匐為其下所殺以其首來降初行儉行至朔川謂其下曰用兵之道撫士貴誠制敵尚詐前日蕭嗣業糧運為突厥所掠士卒凍餒故敗今突厥必復為此謀宜有以詐之乃詐爲糧車三百乗毎車伏壯士五人各持陌刀勁弩以羸兵數百為之援且伏精兵於險要以待之虜果至羸兵弃車散走虜驅車就氷草解鞍牧馬欲取糧壯士自車中躍出擊之虜驚走復為伏兵所邀殺獲殆盡自是糧運行者虜莫敢近軍至單于府北抵暮下營掘壍己周行儉遽命移就髙岡諸將皆言士卒已安堵不可復動行儉不從趣使移是夜風雨暴至前所營地水深丈餘諸將驚服問其故行儉笑曰自今但從我命不必問其所由知也奉職既就擒餘黨走保狼山詔户部尚書崔知悌馳傳詣定襄宣慰將士且區處餘冦行儉引軍還夏四月乙丑上幸紫桂宫戊辰黄門侍郎聞喜裴炎崔知温中書侍郎京兆王德眞並同中書門下三品知温知悌之弟也秋七月吐蕃宼河源左武衛將軍黑齒常之擊却之擢常之爲河源軍經略大使常之以河源衝要欲加兵戍之而轉輸險逺乃廣置烽戍七十餘所開屯田五千餘頃嵗収五百餘萬石由是戰守有僃焉先是劒􅀯募兵於茂州西􅀯築安戎城以斷吐蕃通蠻之路吐蕃以生羌為郷導攻陷其城以兵據之由是西洱諸蠻皆降于吐蕃吐蕃盡據羊同党項及諸羌之地東接涼松茂嶲等州南鄰天笁西陷􅀛兹踈勒等四鎮北抵突厥地方萬餘里諸胡之盛莫與為比丙申鄭州刺史江王元祥薨突厥餘衆圍雲州代州都督竇懐悊右領軍中郎將程務挺將兵擊破之八月丁未上還東都中書令檢校鄯州都督李敬玄軍既敗屢稱疾請還上許之既至無疾詣中書視事上怒丁巳貶衡州刺史太子賢聞宫中竊議以賢為天后姊韓國夫人所生内自疑懼明崇儼以厭勝之術為天后所信嘗密稱太子不堪承繼英王貌類太宗又言相王相最貴天后嘗命北門學士撰少陽正範及孝子傳以賜太子又數作書誚讓之太子愈不自安及崇儼死賊不得天后疑太子所為太子頗好聲色與户奴趙道生等狎昵多賜之金帛司議郎韋承慶上書諫不聽天后使人告其事詔薛元超裴炎與御史大夫髙智周等雜鞫之於東宫馬坊搜得皂甲數百領以為反具道生又欵稱太子使道生殺崇儼上素愛太子遟回欲宥之天后曰為人子懐逆謀天地所不容大義滅親何可赦也甲子廢太子賢為庶人遣右監門中郎將令狐智通等送賢詣京師幽於别所黨與皆伏誅仍焚其甲於天津橋南以示士民承慶思謙之子也乙丑立左衛大將軍雍州牧英王哲為皇太子改元赦天下太子洗馬劉訥言嘗撰誹諧集以獻賢賢敗搜得之上怒曰以六經教人猶恐不化乃進誹諧鄙説豈輔導之義邪流訥言於振州左衛將軍髙眞行之子政為太子典膳丞事與賢連上以付其父使自訓責政入門真行以佩刀刺其喉眞行兄户部侍郎審行又刺其腹眞行兄子琁斷其首弃之道中上聞之不恱貶真行為睦州刺史審行為渝州刺史眞行士廉之子也左庶子同中書門下三品張大安坐阿附太子左遷普州刺史其餘宫僚上皆釋其罪使復位左庶子薛元超等皆舞蹈拜恩右庶子李義琰獨引咎涕泣時論美之九月甲申以中書侍郎同中書門下三品王德眞為相王府長史罷政事冬十月壬寅蘇州刺史曹王明沂州刺史嗣蔣王煒皆坐故太子賢之黨明降封零陵郡王黔州安置煒除名道州安置丙午文成公主薨于吐蕃己酉車駕西還十一月壬申朔日有食之開耀元年春正月突厥冦原慶等州乙亥遣右衛將軍李知十等將兵屯涇慶二州以僃突厥庚辰以初立太子敕宴百官及命婦於宣政殿引九部伎及散樂自宣政門入太常博士袁利貞上䟽以為正寢非命婦宴㑹之地路門非倡優進御之所請命婦㑹於别殿九部伎自東西門入其散樂伏望停省上乃更命置宴於麟德殿宴日賜利貞帛百叚利貞昂之曾孫也利貞族孫誼為蘇州刺史自以其先自宋太尉淑以來盡忠帝室謂琅邪王氏雖弈世台鼎而為歷代佐命恥與為比嘗曰所貴於名家者為其世篤忠貞才行相繼故也彼鬻婚姻求禄利者又烏足貴乎時人是其言裴行儉軍既還突厥阿史那伏念復自立為可汗與阿史德温傅連兵為冦癸巳以行儉為定襄道大揔管以右武衛將軍曹懐舜幽州都督李文暕為副將兵討之二月天后表請赦杞王上金鄱陽王素節之罪以上金為沔州刺史素節為岳州刺史仍不聽朝集三月辛卯以劉仁􅁤兼太子少傅餘如故以侍中郝處俊為太子少保罷政事少府監裴匪舒善營利奏賣苑中馬糞歳得錢二十萬緡上以問劉仁􅁤對曰利則厚矣恐後代稱唐家賣馬糞非嘉名也乃止匪舒又為上造鏡殿成上與仁軌觀之仁軌驚趨下殿上問其故對曰天無二日土無二王適視四壁有數天子不祥孰甚焉上遽令剔去曹懐舜與禆將竇義昭將前軍擊突厥或告阿史那伏念與阿史德温傅在黑沙北左右纔二十騎以下可徑往取也懐舜等信之留老弱於瓠蘆泊帥輕鋭倍道進至黑沙無所見人馬疲頓乃引兵還㑹薛延陀部落欲西詣伏念遇懐舜軍因請降懐舜等引兵徐還至長城北遇温傅小戰各引去至横水遇伏念懐舜義昭與李文暕及禆將劉敬同四軍合為方陳且戰且行經一日伏念乗便風擊之軍中擾亂懐舜等弃軍走軍遂大敗死者不可勝數懐舜等収散卒歛金帛以賂伏念與之約和殺牛為盟伏念北去懐舜等乃得還夏五月丙戌懐舜免死流嶺南己丑河源道經略大使黑齒常之將兵擊吐蕃論賛婆於良非川破之収其糧畜而還常之在軍七年吐蕃深畏之不敢犯邊初太原王妃之薨也天后請以太平公主為女官以追福及吐蕃求和親請尚太平公主上乃為之立太平觀以公主為觀主以拒之至是始選光禄卿汾隂薛曜之子紹尚焉紹母太宗女城陽公主也秋七月公主適薛氏自興安門南至宣陽坊西燎炬相屬夾路槐木多死紹兄顗以公主寵盛深憂之以問族祖户部郎中克構克構曰帝甥尚主國家故事茍以恭慎行之亦何傷然諺曰娶婦得公主無事取官府不得不為之懼也天后以顗妻蕭氏及顗弟緒妻成氏非貴族欲出之曰我女豈可使與田舍女爲妯娌邪或曰蕭氏瑀之姪孫國家舊姻乃止夏州羣牧使安元夀奏自調露元年九月以來喪馬一十八萬餘匹監牧吏卒爲虜所殺掠者八百餘人薛延陀逹渾等五州四萬餘帳來降甲午左僕射兼太子少傅同中書門下三品劉仁軌固請解僕射許之閏七月丁未裴炎爲侍中崔知温薛元超並守中書令上徵田遊巖爲太子洗馬在東宫無所規益右衛副率蔣儼以書責之曰足下負巢由之俊節傲唐虞之聖主聲出區宇名流海内主上屈萬乗之重申三顧之榮遇子以商山之客待子以不臣之禮將以輔導儲貳漸染芝蘭耳皇太子春秋鼎盛聖道未周僕以不才猶參庭諍足下受調䕶之寄是可言之秋唯唯而無一談悠悠以卒年歳向使不飡周粟僕何敢言禄及親矣以何酬塞想為不逹謹書起予遊巖竟不能荅庚申上以服餌令太子監國裴行儉軍於代州之陘口多縱反間由是阿史那伏念與阿史德温傅浸相猜貳伏念留妻子輜重於金牙山以輕騎襲曹懐舜行儉遣禆將何迦密自通漠道程務挺自石地道掩取之伏念與曹懐舜等約和而還比至金牙山失其妻子輜重士卒多疾疫乃引兵北走保細沙行儉又使副揔管劉敬同程務挺等將單于府兵追躡之伏念請執温傅以自效然尚猶豫又自恃道逺唐兵必不能至不復設僃敬同等軍到伏念狼狽不能整其衆遂執温傅從間道詣行儉降􅀱騎告以煙塵漲天而至將士皆震恐行儉曰此乃伏念執温􅀓來降非他盗也然受降如受敵不可無僃乃命嚴僃遣單使迎前勞之少選伏念果帥酋長􅅞温傅詣軍門請罪行儉盡平突厥餘黨以伏念温傅歸京師冬十月丙寅朔日有食之壬戌裴行儉等獻定襄之俘乙丑改元丙寅斬阿史那伏念阿史德温傅等五十四人於都市初行儉許伏念以不死故降裴炎疾行儉之功奏言伏念為副將張䖍朂程務挺所逼又廻紇等自磧北南向逼之窮窘而降耳遂誅之行儉歎曰渾濬爭功古今所恥但恐殺降無復來者因稱疾不出丁亥新羅王法敏卒遣使立其子政明十一月癸卯徙故太子賢於巴州資治通鑑卷第二百二唐武后
