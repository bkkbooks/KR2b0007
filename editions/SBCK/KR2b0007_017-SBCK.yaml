front:
  text: 非道亡也幽厲不繇也至於宣王思昔先王之徳興滯補敝明文武之功業周道粲然復興此夙夜不懈行善之所致也孔子曰人能􅀪道非道􅀪人故治亂廢興在於己非天降命不可得反其所操持誖謬失其統也爲人君者正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方四方正逺近莫敢不壹於正而亡有邪氣奸其間者是以隂陽調而風雨時羣生和而萬民殖諸福之物可致之祥莫不畢至而王道終矣孔子曰鳯鳥不至河不出圖吾己矣夫自悲可致此物而身卑賤不得致也今陛下貴爲天子富有四海居得致之位操可致之勢又有能致之資行髙而恩厚知明而意美愛民而好士可謂誼主矣然而天地未應而美祥莫至者何也凡以教化不立而萬民不正也夫萬民之從利也如水之走下不以教化隄防之不能止也古之王者明於此故南面而治天下莫不以教化為大務立太學以教於國設庠序以化於邑漸民以仁摩民以􅁩節民以禮故其刑罰甚輕而禁不犯者教化行而習俗美也聖王之繼亂世也掃除其迹而悉去之復脩教化而崇起之教化己明習俗己成子孫循之行五六百嵗尚未敗也秦滅先聖之道為茍且之治故立十四年而亡其遺毒餘烈至今未滅使習俗薄惡人民嚚頑抵冒殊扞孰爛如此之甚者也竊譬之琴瑟不調甚者必解而更張之乃可鼓也為政而不行甚者必變而更化之乃可理也故漢得天下以來常欲治而至今不可善治者失之於當更化而不更化也臣聞聖王之治天下也少則習之學長則材諸位爵禄以養其徳刑罰以威其惡故民曉於禮誼而恥犯其上武王行大誼平殘賊周公作禮樂以文之至於成康之隆囹圄空虚四十餘年此亦教化之漸而仁誼之流非獨傷肌膚之效也至秦則不然師申商之法行韓非之説憎帝王之道以貪狼為俗誅名而不察實為善者不必免而犯惡者未必刑也是以百官皆飾虚辭而不顧實外有事君之禮内有背上之心造偽飾詐趨利無恥是以刑者甚衆死者相望而姦不息俗化使然也今陛下并有天下莫不率服而功不加於百姓者殆王心未加焉曽子曰尊其所聞則髙明矣行其所知則光大矣髙明光大不在於它在乎加之意而已願陛下因用所聞設誠於内而致行之則三王何異哉夫不素養士而欲求賢譬猶不琢玉而求文采也故養士之大者莫大虖太學太學者賢士之所闗也教化之本原也今以一郡一國之衆對亡應書者是王道往往而絶也臣願陛下興太學置明師以養天下之士數考問以盡其材則英俊宜可得矣今之郡守縣令民之師帥所使承流而宣化也故師帥不賢則主徳不宣恩澤不流今吏既亡教訓於下或不承用主上之灋暴虐百姓與姦為币貧窮孤弱寃苦失職甚不稱陛下之意是以隂陽錯繆氛氣充塞羣生寡遂黎民未濟皆長吏不明使至於此也夫長吏多出於郎中中郎吏二千石子弟選郎吏又以富訾未必賢也且古所謂功者以任官稱職為差非謂積日累久也故小材雖累日不離於小官賢材雖未乆不害為輔佐是以有司竭力盡知務治其業而以赴功今則不然累日以取貴積久以致官是以㢘恥貿亂賢不肖渾殽未得其眞臣愚以為使諸列矦郡守二千石各擇其吏民之賢者􅀊貢各二人以給宿衛且以觀大臣之能所貢賢者有賞所貢不肖者有罰夫如是諸吏二千石皆盡心於求賢天下之士可得而官使也徧得天下之賢人則三王之盛易爲而堯舜之名可及也毋以日月為功實試賢能為上量材而授官録徳而定位則㢘恥殊路賢不肖異處矣臣聞衆少成多積小致鉅故聖人莫不以晻致明以微致顯是以堯發於諸矦舜興虖深山非一日而顯也蓋有漸以致之矣言出於己不可塞也行發於身不可掩也言行治之大者君子之所以動天地也故盡小者大愼微者著積善在身猶長日加益而人不知也積惡在身猶火銷膏而人不見也此唐虞之所以得令名而桀紂之可為悼懼者也夫樂而不亂復而不厭者謂之道道者萬世亡敝敝者道之失也先王之道必有偏而不起之處故政有眊而不行舉其偏者以補其敝而已矣三王之道所祖不同非其相反將以捄溢扶衰所遭之變然也故孔子曰無為而治者其舜虖改正朔易服色以順天命而已其餘盡循堯道何更為哉故王者有改制之名亡變道之實然夏上忠殷上敬周上文者所繼之捄當用此也孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也其或繼周者雖百世可知也此言百王之用以此三者矣夏因於虞而獨不言所損益者其道一而所上同也道之大原出于天天不變道亦不變是以禹繼舜舜繼堯三聖相受而守一道亡救敝之政也故不言其所損益也繇是觀之繼治世者其道同繼亂世者其道變今漢繼大亂之後若宜少損周之文致用夏之忠者夫古之天下亦今之天下共是天下以古凖今壹何不相逮之逺也安所繆盭而陵夷若是意者有所失於古之道與有所詭於天之理與夫天亦有所分予予之齒者去其角傅其翼者兩其足是所受大者不得取小也古之所予禄者不食於力不動於末是亦受大者不得取小與天同意者也夫己受大又取小天不能足而况人虖此民之所以囂囂苦不足也身寵而載髙位家温而食厚禄因乗富貴之資力以與民爭利於下民安能如之哉民日削月朘寖以大窮富者奢侈羨溢貧者窮急愁苦民不樂生安能避罪此刑罰之所以蕃而姦邪不可勝者也天子大夫者下民之所視效逺方之所四面而内望也近者視而放之逺者望而效之豈可以居賢人之位而為庶人行哉夫皇皇求財利常恐乏匱者庶人之意也皇皇求仁義常恐不能化民者大夫之意也易曰負且乗致寇至乗車者君子之位也負擔者小人之事也此言居君子之位而為庶人之行者患禍必至也若居君子之位當君子之行則舍公儀休之相魯無可為者矣春秋大一統者天地之常經古今之通誼也今師異道人異論百家殊方指意不同是以上無以持一統法制數變下不知所守臣愚以為諸不在六蓺之科孔子之術者皆絶其道勿使並進邪辟之説滅息然後統紀可一而法度可明民知所從矣天子善其對以仲舒為江都相㑹稽莊助亦以賢良對䇿天子擢為中大夫丞相衛綰奏所舉賢良或治申韓蘇張之言亂國政者請皆罷奏可董仲舒少治春秋孝景時為博士進退容止非禮不行學者皆師尊之及為江都相事易王易王帝兄素驕好勇仲舒以禮匡正王敬重焉春二月赦行三銖錢
