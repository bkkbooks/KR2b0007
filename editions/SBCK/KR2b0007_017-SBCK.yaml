body:
  text: 夏六月丞相衛綰免丙寅以魏其矦竇嬰為丞相武安矦田蚡為太尉上雅嚮儒術嬰蚡俱好儒推轂代趙綰為御史大夫蘭陵王臧為郎中令綰請立明堂以朝諸矦且薦其師申公秋天子使使束帛加璧安車駟馬以迎申公既至見天子天子問治亂之事申公年八十餘對曰為治者不至多言顧力行何如耳是時天子方好文詞見申公對黙然然己招致則以為太中大夫舍魯邸議明堂巡狩改歴服色事是嵗内史􅇞成抵罪髠鉗二年冬十月淮南王安來朝上以安屬為諸父而材髙甚尊重之每宴見談語昏暮然後罷安雅善武安矦田蚡其入朝武安矦迎之霸上與語曰上無太子王親髙皇帝孫行仁義天下莫不聞宫車一日晏駕非王尚誰立者安大喜厚遺蚡金錢財物太皇竇太后好黄老言不恱儒術趙綰請毋奏事東宫竇太后大怒曰此欲復為新垣平邪隂求得趙綰王臧姦利事以讓上上因廢明堂事諸所興爲皆廢下綰臧吏皆自殺丞相嬰太尉蚡免申公亦以疾免歸初景帝以太子太傅石奮及四子皆二千石乃集其門號奮爲萬石君萬石君無文學而㳟謹無與比子孫爲小吏來歸謁萬石君必朝服見之不名子孫有過失不責讓爲便坐對案不食然后諸子相責因長老肉袒謝罪改之乃許子孫勝冠者在側雖燕居必冠其執喪哀戚甚悼子孫遵教皆以孝謹聞乎郡國及趙綰王臧以文學獲罪竇太后以爲儒者文多質少今萬石君家不言而躬行乃以其長子建爲郎中令少子慶爲内史建在上側事有可言屏人恣言極切至廷見如不能言者上以是親之慶嘗爲太僕御出上問車中㡬馬慶以䇿數馬畢舉手曰六馬慶於諸子中最為簡易矣竇嬰田蚡既免以矦家居蚡雖不任職以王太后故親幸數言事多效士吏趨埶利者皆去嬰而歸蚡蚡日益横春二月丙戌朔日有食之三月乙未以太常柏至矦許昌為丞相初堂邑矦陳午尚帝姑館陶公主嫖帝之為太子公主有力焉以其女為太子妃及即位妃為皇后竇太主恃功求請無厭上患之皇后驕妬擅寵而無子與醫錢凡九千萬欲以求子然卒無之后寵寖衰皇太后謂上曰汝新即位大臣未服先為明堂太皇太后已怒今又忤長主必重得罪婦人性易恱耳宜深愼之上乃於長主皇后復稍加恩禮上袚霸上還過上姊平陽公主恱謳者衛子夫子夫母衛媪平陽公主家僮也主因奉送子夫入宫恩寵日隆陳皇后聞之恚幾死者數矣上愈怒子夫同母弟衛青其父鄭季本平陽縣吏給事矦家與衛媪私通而生青冒姓衛氏青長為矦家騎奴大長公主執囚青欲殺之其友騎郎公孫敖與壯士簒取之上聞乃召青為建章監侍中賞賜數日間累千金既而以子夫為夫人青為太中大夫夏四月有星如日夜出初置茂陵邑時大臣議者多寃鼂錯之䇿務摧抑諸矦王數奏暴其過惡吹毛求疵笞服其臣使證其君諸矦王莫不悲怨三年冬十月代王登長沙王發中山王勝濟川王明來朝上置酒勝聞樂聲而泣上問其故對曰悲者不可為累欷思者不可為歎息今臣心結日乆每聞幼眇之聲不知涕泣之横集也臣得蒙肺附為東藩屬又稱兄今羣臣非有葭莩之親鴻毛之重羣居黨議朋友相為使夫宗室擯卻骨肉氷釋臣竊傷之具以吏所侵聞於是上乃厚諸矦之禮省有司所奏諸矦事加親親之恩焉河水溢于平原大饑人相食秋七月有星孛于西北濟川王明坐殺中傅廢遷房陵七國之敗也吳王子駒亡走閩越怨東甌殺其父常勸閩越擊東甌閩粤從之發兵圍東甌東甌使人告急天子天子問田蚡蚡對曰越人相攻擊固其常又數反覆自秦時棄不屬不足以煩中國往救也莊助曰特患力不能救徳不能覆誠能何故棄之且秦舉咸陽而棄之何但越也今小國以窮困來吿急天子不救尚安所愬又何以子萬國乎上曰太尉不足與計吾新即位不欲出虎符發兵郡國乃遣助以節發兵㑹稽㑹稽守欲距灋不為發助乃斬一司馬諭意指遂發兵浮海救東甌未至閩越引兵罷東甌請舉國内徙乃悉舉其衆來處於江淮之間九月丙子晦日有食之上自初即位招選天下文學材智之士待以不次之位四方士多上書言得失自􅅭鬻者以千數上簡拔其俊異者寵用之莊助最先進後又得吳人朱買臣趙人吾丘夀王蜀人司馬相如平原東方朔吳人枚臯濟南終軍等並在左右每令與大臣辨論中外相應以義理之文大臣數屈焉然相如特以辭賦得幸朔臯不根持論好詼諧上以俳優畜之雖數賞賜終不任以事也朔亦觀上顔色時時直諫有所補益是嵗上始為微行北至池陽西至黄山南獵長楊東游宜春與左右能騎射者期諸殿門常以夜出自稱平陽矦旦明入南山下射鹿豕狐兎馳騖禾稼之地民皆號呼罵詈鄠杜令欲執之示以乗興物乃得免又嘗夜至柏谷投逆旅宿就逆旅主人求漿主人翁曰無漿正有溺耳且疑上為姦盜聚少年欲攻之主人嫗睹上狀貌而異之止其翁曰客非常人也且又有僃不可圖也翁不聽嫗飲翁以酒醉而縛之少年皆散走嫗乃殺雞為食以謝客明日上歸召嫗賜金千斤拜其夫為羽林郎後乃私置更衣從宣曲以南十二所夜投宿長楊五柞等諸宫上以道逺勞苦又為百姓所患乃使太中大夫吾丘夀王舉籍阿城以南盩厔以東宜春以西提封頃畮及其賈直欲除以為上林苑屬之南山又詔中尉左右内史表屬縣草田欲以償鄠杜之民夀王奏事上大説稱善時東方朔在傍進諫曰夫南山天下之阻也漢興去三河之地止霸滻以西都涇渭之南此所謂天下陸海之地秦之所以虜西戎兼山東者也其山岀玉石金銀銅鐵良材百工所取給萬民所卬足也又有秔稻棃栗桑麻竹箭之饒土宜薑芋水多䵷魚貧者得以人給家足無飢寒之憂故酆鎬之間號為土膏其賈畮一金今規以為􅁐絶陂池水澤之利而取民膏腴之地上乏國家之用下奪農桑之業是其不可一也盛荆棘之林廣狐菟之苑大虎狼之虚壊人􅃁墓發人室廬令幼弱懐土而思耆老泣涕而悲是其不可二也斥而營之垣而囿之騎馳東西車騖南北有深溝大渠夫一日之樂不足以危無隄之輿是其不可三也夫殷作九市之宫而諸矦畔靈王起章華之臺而楚民散秦興阿房之殿而天下亂糞土愚臣逆盛意罪當萬死上乃拜朔爲太中大夫給事中賜黄金百斤然遂起上林􅁐如壽王所奏上又好自擊熊豕馳逐野獸司馬相如上䟽諌曰臣聞物有同類而殊能者故力稱烏獲㨗言慶忌勇期賁育臣之愚竊以爲人誠有之獸亦宜然今陛下好陵阻險射猛獸卒然遇逸材之獸駭不存之地犯屬車之清塵輿不及還轅人不暇施巧雖有烏獲逢蒙之技不得用枯木朽株盡爲難矣是胡越起於轂下而羌夷接軫也豈不殆哉雖萬全而無患然本非天子之所宜近也且夫清道而後行中路而馳猶時有銜橜之變況乎渉豐草騁丘虚前有利獸之樂而内無存變之意其爲害也不難矣夫輕萬乗之重不以爲安樂岀萬有一危之塗以為娛臣竊為陛下不取蓋明者逺見於未萌而知者避危於無形旤固多藏於隱微而發於人之所忽者也故鄙諺曰家累千金坐不垂堂此言雖小可以諭大上善之四年夏有風赤如血六月旱秋九月有星孛于東北是嵗南越王佗死其孫文王胡立五年春罷三銖錢行半兩錢置五經博士夏五月大蝗秋八月廣川惠王越清河哀王乗皆薨無後國除六年春二月乙未遼東髙廟災夏四月壬子髙園便殿火上素服五日五月丁亥太皇太后崩六月癸巳丞相昌免武安矦田蚡為丞相蚡驕侈治宅甲諸第田園極膏腴市買郡縣物相屬於道多受四方賂遺其家金玊婦女狗馬聲樂玩好不可勝數每入奏事坐語移日所言皆聽薦人或起家至二千石權移主上上乃曰君除吏已盡未吾亦欲除吏嘗請考工地益宅上怒曰君何不遂取武庫是後乃稍退秋八月有星孛于東方長竟天閩越王郢興兵擊南越邊邑南越王守天子約不敢擅興兵使人上書吿天子於是天子多南越義大為發兵遣大行王恢出豫章大農令韓安國出㑹稽擊閩越淮南王安上書諫曰陛下臨天下布徳施恵天下攝然人安其生自以没身不見兵革今聞有司舉兵將以誅越臣安竊為陛下重之越方外之地翦髮文身之民也不可以冠帶之國法度理也自三代之盛胡越不與受正朔非彊弗能服威弗能制也以為不居之地不牧之民不足以煩中國也自漢初定已來七十二年越人相攻擊者不可勝數然天子未嘗舉兵而入其地也臣聞越非有城郭邑里也處谿谷之間篁竹之中習於水鬭便於用舟地深昧而多水險中國之人不知其埶阻而入其地雖百不當其一得其地不可郡縣也攻之不可暴取也以地圖察其山川要塞相去不過寸數而間獨數百千里阻險林叢弗能盡著視之若易行之甚難天下賴宗廟之靈方内大寜戴白之老不見兵革民得夫婦相守父子相保陛下之徳也越人名為藩臣貢酎之奉不輸大内一卒之用不給上事自相攻擊而陛下發兵救之是反以中國而勞蠻夷也且越人愚戇輕薄負約反覆其不用天子之法度非一日之積也壹不奉詔舉兵誅之臣恐後兵革無時得息也間者數年嵗比不登民待賣爵贅子以接衣食賴陛下徳澤振救之得毋轉死溝壑四年不登五年復蝗民生未復今發兵行數千里資衣糧入越地輿轎而隃領拕舟而入水行數百千里夾以深林叢竹水道上下擊石林中多蝮蛇猛獸夏月暑時歐泄霍亂之病相隨屬也曾未施兵接刃死傷者必衆矣前時南海王反陛下先臣使將軍間忌將兵擊之以其軍降處之上淦後復反㑹天暑多􅀨樓船卒水居擊棹未戰而疾死者過半親老涕泣孤子啼號破家散業迎尸千里之外裹骸骨而歸悲哀之氣數年不息長老至今以為記曽未入其地而禍已至此矣陛下徳配天地明象日月恩至禽獸澤及草木一人有飢寒不終其天年而死者為之悽愴於心今方内無狗吠之警而使陛下甲卒死亡暴露中原霑漬山谷邊境之民為之早閉晏開朝不及夕臣安竊為陛下重之不習南方地形者多以越為人衆兵彊能難邊城淮南全國之時多為邊吏臣竊聞之與中國異限以髙山人迹絶車道不通天地所以隔外内也其入中國必下領水領水之山峭峻漂石破舟不可以大船載食糧下也越人欲為變必先田餘干界中積食糧乃入伐材治船邊城守􅀱誠謹越人有入伐材者輒收捕焚其積聚雖百越柰邊城何且越人緜力薄材不能陸戰又無車騎弓弩之用然而不可入者以保地險而中國之人不耐其水土也臣聞越甲卒不下數十萬所以入之五倍乃足輓車奉餉者不在其中南方暑濕近夏癉熱暴露水居蝮蛇蠚生疾疢多作兵未血刃而病死者什二三雖舉越國而虜之不足以償所亡臣聞道路言閩越王弟甲弑而殺之甲以誅死其民未有所屬陛下若欲來内處之中國使重臣臨存施德垂賞以招致之此必􅂝幼扶老以歸聖徳若陛下無所用之則繼其絶世存其亡國建其王矦以為畜越此必委質為藩臣世共貢職陛下以方寸之印丈二之組塡撫方处不勞一卒不頓一㦸而威徳並行今以兵入其地此必震恐以有司為欲屠滅之也必雉兎逃入山林險阻背而去之則復相羣聚留而守之歴嵗經年則士卒罷勌食糧乏絶民苦兵事盜賊必起臣聞長老言秦之時嘗使尉屠睢擊越又使監禄鑿渠通道越人逃入深山林叢不可得攻留軍屯守空地曠日引乆士卒勞倦越出擊之秦兵大破乃發適戍以僃之當此之時外内騷動皆不聊生亡逃相從羣為盜賊於是山東之難始興兵者凶事一方有急四面皆聳臣恐變故之生姦邪之作由此始也臣聞天子之兵有征而無戰言莫敢校也如使越人蒙徼幸以逆執事之顔行厮輿之卒有一不備而歸者雖得越王之首臣猶竊為大漢羞之陛下以四海為境生民之屬皆為臣妾垂徳恵以覆露之使安生樂業則澤被萬世􅀓之子孫施之無窮天下之安猶泰山而四維之也夷狄之地何足以為一日之閒而煩汗馬之勞乎詩云王猶允塞徐方既來言王道甚大而逺方懐之也臣安竊恐將吏之以十萬之師為一使之任也是時漢兵遂出未隃領閩越王郢發兵距險其弟餘善乃與相宗族謀曰王以擅發兵擊南越不請故天子兵來誅漢兵衆彊即幸勝之後來益多終滅國而止今殺王以謝天子天子聽罷兵固國完不聽乃力戰不勝即亡入海皆曰善即鏦殺王使使奉其頭致大行大行曰所爲來者誅王今王頭至謝罪不戰而殞利莫大焉乃以便宜案兵告大農軍而使使奉王頭馳報天子詔罷兩將兵曰郢等首惡獨無諸孫繇君丑不與謀焉乃使中郎將立丑爲越繇王奉閩越先祭祀餘善已殺郢威行於國國民多屬竊自立爲王繇王不能制上聞之爲餘善不足復興師曰餘善數與郢謀亂而後首誅郢師得不勞因立餘善爲東越王與繇王並處上使莊助諭意南粤南粤王胡頓首曰天子乃爲臣興兵討閩越死無以報徳遣太子嬰齊入宿衛謂助曰國新被寇使者行矣胡方日夜裝入見天子助還過淮南上又使助諭淮南王安以討越事嘉答其意安謝不及助既去南越南越大臣皆諫其王曰漢興兵誅郢亦行以驚動南越且先王昔言事天子期無失禮要之不可以説好語入見則不得復歸亡國之勢也於是胡稱病竟不入見是嵗韓安國為御史大夫東海太守濮陽汲黯為主爵都尉始黯為謁者以嚴見憚東越相攻上使黯往視之不至至吳而還報曰越人相攻固其俗然不足以辱天子之使河内失火延燒千餘家上使黯往視之還報曰家人失火屋比延燒不足憂也臣過河南河南貧人傷水旱萬餘家或父子相食臣謹以便宜持節發河南倉粟以振貧民臣請歸節伏矯制之罪上賢而釋之其在東海治官理民好清靜擇丞史任之責大指而已不苛小黯多病臥閨閤内不出嵗餘東海大治稱之上聞召為主爵都尉列於九卿其治務在無為引大體不拘文法黯為人性倨少禮面折不能容人之過時天子方招文學儒者上曰吾欲云云黯對曰陛下内多欲而外施仁義柰何欲效唐虞之治乎上黙然怒變色而罷朝公卿皆為黯懼上退謂左右曰甚矣汲黯之戇也羣臣或數黯黯曰天子置公卿輔弼之臣寧令從諛承意陷主於不義乎且己在其位縱愛身柰辱朝廷何黯多病病且滿三月上常賜告者數終不愈最後病莊助為請告上曰汲黯何如人哉助曰使黯任職居官無以踰人然至其輔少主守城深堅招之不來麾之不去雖自謂賁育亦不能奪之矣上曰然古有社稷之臣至如黯近之矣匈奴来請和親天子下其議大行王恢燕人也習胡事議曰漢與匈奴和親率不過數嵗即復倍約不如勿許興兵擊之韓安國曰匈奴遷徙鳥舉難得而制自上古不屬為人今漢行數千里與之爭利則人馬罷乏虜以全制其敝此危道也不如和親羣臣議者多附安國於是上許和親元光元年冬十一月初令郡國舉孝㢘各一人從董仲舒之言也衛尉李廣為驍騎將軍屯雲中中尉程不識為車騎將軍屯鴈門六月罷廣與不識俱以邉太守將兵有名當時廣行無部伍行陳就善水草舍止人人自便不擊刁斗以自衛莫府省約文書然亦逺斥􅀱未嘗遇害程不識正部曲行伍營陳撃刁斗士吏治軍簿至明軍不得休息然亦未嘗遇害不識曰李廣軍極簡易然虜卒犯之無以禁也而其士卒亦佚樂咸樂為之死我軍雖煩擾然虜亦不得犯我然匈奴畏李廣之略士卒亦多樂從李廣而苦程不識臣光曰易曰師出以律否臧凶言治衆而不用法無不凶也李廣之將使人人自便以廣之材如此焉可也然不可以為法何則其繼者難也况與之並時而為將乎夫小人之情樂於安肆而昧於近禍彼既以程不識為煩擾而樂於從廣且將仇其上而不服然則簡易之害非徒廣軍無以禁虜之倉卒而已也故曰兵事以嚴終為將者亦嚴而已矣然則傚程不識雖無功猶不敗傚李廣鮮不覆亡哉夏四月赦天下五月詔舉賢良文學上親䇿之秋七月癸未日有食之資治通鑑卷第十七
