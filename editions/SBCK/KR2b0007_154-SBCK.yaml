front:
  text: 資治通鑑卷第一百五十四
  hash: sha256:de8a75200dfd3df8093dd95573a129111fa9727690de096bd8299657f4bef3ab
body:
  text: 臣司馬光奉勑編集梁紀十茂一年上章閹髙祖武皇帝十中大通二年春正月己丑魏益州刺史長孫壽梁州刺史元儁等遣將擊嚴始欣斬之蕭玩等亦敗死失亡萬餘人辛亥魏東徐州城民吕文欣等殺刺史元大賔據城反魏遣都官尚書平城樊子鵠等討之二月甲寅斬文欣万俟醜奴侵擾􅀜中魏爾朱榮遣武衛將軍賀拔岳討之岳私謂其兄勝曰醜奴勍敵也今攻之不勝固有罪勝之讒嫉將生勝曰然則柰何岳曰願得爾朱氏一人爲帥而佐之勝爲之言於榮榮恱以爾朱天光爲使持節都督二雍二岐諸軍事驃􅀐大將軍雍州刺史以岳爲左大都督又以征西將軍代郡矦莫陳恱爲右大都督並爲天光之副以討之天光初行唯配軍士千人發洛陽以西路次民馬以給之時赤水蜀賊斷路詔侍中楊􅋲先行慰諭并稅其馬蜀持疑不下軍至潼閞天光不敢進岳曰蜀賊䑕竊公尚遲疑若遇大敵將何以戰天光曰今日之事一以相委岳遂進擊蜀於渭北破之獲馬二千匹簡其壯健以充軍士又稅民馬合萬餘匹以軍士尚少淹留未進榮怒遣􅀐兵參軍劉貴乗驛至軍中責天光杖之一百以軍士二千人益之三月醜奴自將其衆圍岐州遣其大行臺尉遲菩薩僕射万俟仵自武功南渡渭攻圍趣柵天光使賀拔岳將千􅀐救之菩薩等已拔柵而還岳故殺掠其吏民以挑之菩薩帥歩􅀐二萬至渭北岳以輕􅀐數十自渭南與菩薩隔水而語稱􅀭國威菩薩令省事傳語岳怒曰我與菩薩語卿何人也射殺之明日復引百餘􅀐隔水與賊語稍引而東至水淺可渉之處岳即馳馬東出賊以爲走乃弃歩兵輕􅀐南渡渭追岳岳依橫岡設伏兵以待之賊半度岡東岳還兵擊之賊敗走岳下令賊下馬者勿殺賊悉投馬俄獲三千人馬亦無遺遂擒菩薩仍度渭北降歩卒萬餘並收其輜重醜奴聞之弃岐州北走安定置柵於平亭天光方自雍至岐與岳合夏四月天光至汧渭之間停軍牧馬宣言天時將熱未可行師俟秋涼更圖進止獲醜奴覘􅃸者縱遣之醜奴信之散衆耕於細川使其太尉侯伏侯元進將兵五千據險立柵其餘千人已下爲柵者甚衆天光知其勢分晡時密嚴諸軍相繼俱發􅀺明圍元進大柵㧞之所得俘囚一皆縱遣諸柵聞之皆降天光晝夜徑進抵安定城下賊涇州刺史侯幾長貴以城降醜奴弃平亭走欲趣髙平天光遣賀拔岳輕􅀐追之丁卯及於平涼賊未成列直閤代郡矦莫陳崇單􅀐入賊中於馬上生擒醜奴因大呼衆皆披靡無敢當者後􅀐益集賊衆崩潰遂大破之天光進逼髙平城中執送蕭寶寅以降壬申以吐谷渾王佛輔爲西秦河二州刺史甲戌魏以􅀜中平大赦万俟醜奴蕭寶寅至洛陽置閶闔門外都街之中士女聚觀凡三日丹陽王蕭贊表請寶寅之命吏部尚書李神儁黃門侍郎髙道穆素與寶寅善欲左右之言於魏主曰寶寅叛逆事在前朝㑹應詔王道習自外至帝問道習在外所聞對曰唯聞李尚書髙黃門與蕭寳寅周欵並居得言之地必能全之且二人謂寶寅叛逆在前朝寶寅爲醜奴太傅豈非陛下時邪賊臣不翦法欲安施帝乃賜寶寅死於駞牛署斬醜奴於都市六月丁巳帝復以魏汝南王恱爲魏王戊寅魏詔胡氏親屬受爵於朝者皆黜爲民庚申以魏降將范遵爲安北將軍司州牧從魏王恱北還万俟醜奴旣敗自涇􅃎以西至靈州賊黨皆降於魏唯所署行臺万俟道洛帥衆六千逃入山中不降時髙平大旱爾朱天光以馬乏草退屯城東五十里遣都督長孫邪利帥二百人行原州事以鎭之道洛濳與城民通謀掩襲邪利并其所部皆殺之天光帥諸軍赴之道洛出戰而敗帥其衆西入牽屯山據險自守爾朱榮以天光失邪利不獲道洛復遣使杖之一百以詔書黜天光爲撫軍將軍雍州刺史降爵爲矦天光追擊道洛於牽屯道洛敗走入隴歸略陽賊帥王慶雲道洛驍果絶倫慶雲得之甚喜謂大事可濟遂稱帝於水洛城置百官以道洛爲大將軍秋七月天光帥諸軍入隴至水洛城慶雲道洛出戰天光射道洛中臂失弓還走拔其東城賊併兵趣西城城中無水衆渇乏有降者言慶雲道洛欲突走天光恐失之乃遣人招諭慶雲使早降曰若未能自決當聽諸人今夜共議明晨早報慶雲等冀得少緩因待夜突出乃報曰請俟明日天光因使謂曰知須水今相爲小退任取澗水飲之賊衆恱無復走心天光密使軍士多作木槍各長七尺昬後繞城布列要路加厚又伏人槍中備其衝突兼令密􅅞長梯於城北其夜慶雲道洛果馳馬突出遇槍馬各傷倒伏兵起即時擒之軍士縁梯入城餘衆皆出城南遇槍而止窮窘乞降丙子天光悉收其仗而阬之死者萬七千人分其家口於是三秦河渭􅀲涼鄯州皆降天光頓軍略陽詔復天光官爵尋加侍中儀同三司以賀拔岳爲涇州刺史矦莫陳恱爲渭州刺史秦州城民謀殺刺史駱超南秦州城民謀殺刺史辛顯超顯皆覺之走歸天光天光遣兵討平之歩兵校尉宇文泰從賀拔岳入􅀜以功遷征西將軍行原州事時􅀜隴彫弊泰撫以恩信民皆感恱曰早遇宇文使君吾輩豈從亂乎八月庚戌上餞魏王恱於德陽堂遣兵送至境上魏爾朱榮雖居外藩遥制朝政樹置親黨布列魏主左右伺察動静大小必知魏主雖受制於榮然性勤政事朝夕不倦數親覽辭訟理􅁈獄榮聞之不恱帝又與吏部尚書李神儁議清治選部榮甞􅀜補曲陽縣令神儁以階懸不奏别更擬人榮大怒即遣所補者往奪其任神儁懼而辭位榮使尚書左僕射爾朱丗隆攝選榮啓北人爲河南諸州帝未之許太宰天穆入見面論帝猶不許天穆曰天柱旣有大功爲國宰相若請普代天下官恐陛下亦不得違之如何啓數人爲州遽不用也帝正色曰天柱若不爲人臣朕亦須代如其猶存臣節無代天下百官之理榮聞之大恚恨曰天子由誰得立今乃不用我語爾朱皇后性妬忌屢致忿恚帝遣爾朱丗隆語以大理后曰天子由我家置立今便如此我父本即自作今亦復決丗隆曰止自不爲若本自爲之臣今亦封王矣帝旣外逼於榮内迫皇后􅁪怏怏不以萬乗爲樂唯幸寇盜未息欲使與榮相持及關隴旣定告捷之日乃不甚喜謂尚書令臨淮王彧曰即今天下便是無賊彧見帝色不恱曰臣恐賊平之後方勞聖慮帝畏餘人怪之還以它語亂之曰然撫寧荒餘彌成不易榮見四方無事奏稱參軍許周勸臣取九錫臣惡其言已斥遣令去榮時望得殊禮故以意諷朝廷帝實不欲與之因稱歎其忠榮好獵不捨寒暑列圍而進令士卒必齊壹雖遇險阻不得違避一鹿逸出必數人坐死有一卒見虎而走榮謂曰汝畏死邪即斬之自是每獵士卒如登戰場甞見虎在窮谷中榮令十餘人空手搏之母得損傷死者數人卒擒得之以此爲樂其下甚苦之太宰天穆從容謂榮曰大王勲業已盛四方無事唯宜脩政養民順時蒐狩何必盛夏馳逐感傷和氣榮攘袂曰靈后女主不能自正推奉天子乃人臣常節葛榮之徒本皆奴才乗時作亂譬如奴走擒獲即已頃來受國大恩未能混壹海内何得遽言勲業如聞朝士猶自寛縱今秋欲與兄戒勒士馬校獵嵩髙令貪汙朝貴入圍搏虎仍出魯陽歷三荆悉擁生蠻北塡六鎭回軍之際掃平汾胡明年簡練精􅀐分出江淮蕭衍若降乞萬戸矦如其不降以數千􅀐徑度􅅞取然後與兄奉天子廵四方乃可稱勲耳今不頻獵兵士懈怠安可復用也城陽王徽之妃帝之舅女侍中李彧延寔之子帝之姊壻也徽彧欲得權寵惡榮爲己害日毁榮於帝勸帝除之帝懲河隂之難恐榮終難保由是密有圖榮之意侍中楊􅋲尚書右僕射元羅亦預其謀㑹榮請入朝欲視皇后㝃乳徽等勸帝因其入刺殺之唯膠東矦李􅋲晞濟隂王暉業言榮若來必當有備恐不可圖又欲殺其黨與􅀤兵拒之帝疑未定而洛陽人懷憂懼中書侍郎邢子才之徒已避之東出榮乃遍與朝士書相任去留中書舎人温子昇以書呈帝帝􅁪望其不來及見書以榮必來色甚不恱子才名邵以字行巒之族弟也時人多以字行者舊史皆因之武衛將軍奚毅建義初往來通命帝每期之甚重然猶以榮所親信不敢與之言情毅曰若必有變臣寧死陛下不能事契胡帝曰朕保天柱無異心亦不忘卿忠􅅃爾朱丗隆疑帝欲爲變乃爲匿名書自牓其門云天子與楊􅋲髙道穆等爲計欲殺天柱取以呈榮榮自恃其彊不以爲意手毁其書唾地曰丗隆無膽誰敢生心榮妻北鄕長公主亦勸榮不行榮不從是月榮將四五千􅀐發并州時人皆言榮反又云天子必當圖榮九月榮至洛陽帝即欲殺之以太宰天穆在并州恐爲後患故忍未發并召天穆有人告榮云帝欲圖之榮即具奏帝曰外人亦言王欲害我豈可信之於是榮不自疑毎入謁帝從人不過數十又皆挺身不持兵伏帝欲止城陽王徽曰縱不反亦何可耐況不可保邪先是長星出中台掃大角􅁪州人髙榮祖頗知天文榮問之對曰除舊布新之象也榮甚恱榮至洛陽行臺郎中李顯和曰天柱至那無九錫安須王自索也亦是天子不見機都督郭羅刹曰今年眞可作禪文何但九錫參軍褚光曰人言并州城上有紫氣何慮天柱不應之榮下人皆陵侮帝左右無所忌憚故其事皆上聞奚毅又見帝求間帝即下明光殿與語知其至誠乃召城陽王徽及楊􅋲李彧告以毅語榮小女適帝兄子陳留王寛榮甞指之曰我終當得此壻力徽以白帝曰榮慮陛下終爲己患脫有東宫必貪立孩幼若皇后不生太子則立陳留耳帝夣手持刀自割落十指惡之告徽及楊􅋲徽曰蝮蛇螫手壯士解腕割指亦是其類乃吉祥也戊子天穆至洛陽帝出迎之榮與天穆並從入西林園讌射榮奏曰近來侍官皆不習武陛下宜將五百􅀐出獵因省辭訟先是奚毅言榮欲因獵挾天子移都由是帝益疑之辛卯帝召中書舎人温子昇告以殺榮狀并問以殺董卓事子昇具通本末帝曰王允若即赦涼州人必不應至此良乆語子昇曰朕之情理卿所具知死猶須爲況不必死吾寧爲髙貴鄕公死不爲常道鄕公生帝謂殺榮天穆即赦其黨皆應不動應詔王道習曰爾朱世隆司馬子如朱元龍特爲榮所委任具知天下虛實謂不宜留徽及楊􅋲皆曰若丗隆不全仲逺天光豈有來理帝亦以爲然徽曰榮腰間常有刀或能狼戾傷人臨事願陛下起避之乃伏􅋲等十餘人於明光殿東其日榮與天穆並入坐食未訖起出􅋲等從東階上殿見榮天穆已至中庭事不果壬辰帝忌日癸巳榮忌日甲午榮暫入即詣陳留王家飲酒極醉遂言病動頻日不入帝謀頗泄丗隆又以告榮且勸其速􅀤榮輕帝以爲無能爲曰何怱怱預帝謀者皆懼帝患之城陽王徽曰以生太子爲辭榮必入朝因此斃之帝曰后懷孕始九月可乎徽曰婦人不及期而産者多矣彼必不疑帝從之戍戌帝伏兵於明光殿東序聲言皇子生遣徽馳􅀐至榮第告之榮方與上黨王天穆慱徽脫榮帽懽舞盤旋兼殿内文武傳聲趣之榮遂信之與天穆俱入朝帝聞榮來不覺失色中書舎人温子昇曰陛下色變帝連索酒飲之帝令子昇作赦文旣成執以出遇榮自外入問是何文書子昇顔色不變曰敕榮不取視而入帝在東序下西向坐榮天穆在御榻西北南向坐徽入始一拜榮見光禄少卿魯安典御李􅋲晞等抽刀從東戸入即起趨御坐帝先橫刀􅂰下遂手刃之安等亂砍榮與天穆同時俱死榮子菩提及車􅀐將軍爾朱陽覩等三十人從榮入宫亦爲伏兵所殺帝得榮手板上有數牒啓皆左右去留人名非其腹心者悉在出限帝曰豎子若過今日遂不可制於是内外喜譟聲滿洛陽城百僚入賀帝登閶闔門下詔大赦遣武衛將軍奚毅前燕州刺史崔淵將兵鎭北中是夜爾朱丗隆奉北鄕長公主帥榮部曲焚西陽門出屯河隂衛將軍賀拔勝與榮黨田怡等聞榮死奔赴榮第時宫殿門猶未加嚴防怡等議即攻門勝止之曰天子旣行大事必當有備吾等衆少何可輕爾但得出城更爲它計怡乃止及丗隆走勝遂不從帝甚嘉之朱瑞雖爲榮所委而善處朝廷之間帝亦善遇之故瑞從丗隆走而中道逃還榮素厚金紫光禄大夫司馬子如榮死子如自宫中突出至榮第弃家隨榮妻子走出城丗隆即欲還北子如曰兵不厭詐今天下恟恟唯彊是視當此之際不可以弱示人若亟北走恐變生肘腋不如分兵守河橋還軍向京師出其不意或可成功假使不得所欲亦足示有餘力使天下畏我之彊不敢叛散丗隆從之己亥攻河橋擒奚毅等殺之據北中城魏朝大懼遣前華陽太守段育慰諭之丗隆斬首以徇魏以雍州刺史爾朱天光爲侍中儀同三司以司空楊津爲都督并肆等九州諸軍事驃􅀐大將軍并州刺史兼尚書令北道大行臺經略河汾榮之入洛也以髙敖曹自隨禁於駝牛署榮死帝引見勞勉之兄乾自東冀州馳赴洛陽帝以乾爲河北大使敖曹爲直閤將軍使歸招集鄕曲爲表裏形援帝親送之於河橋舉酒指水曰卿兄弟冀部豪傑能令士卒致死京城儻有變可爲朕河上一揚塵乾垂涕受詔敖曹援劒起舞誓以必死冬十月癸卯朔丗隆遣爾朱拂律歸將胡􅀐一千皆白服來至郭下索太原王尸帝升大夏門望之遣主書牛法尚謂之曰太原王立功不終隂圖舋逆王法無親已正刑書罪止榮身餘皆不問卿等若降官爵如故拂律歸曰臣等從太原王入朝忽致􅁈酷今不忍空歸願得太原王尸生死無恨因涕泣哀不自勝羣胡皆慟哭聲振城邑帝亦爲之愴然遣侍中朱瑞齎鐵劵賜丗隆丗隆謂瑞曰太原王功格天地赤心奉國長樂不顧信誓枉加屠害今日兩行鐵字何足可信吾爲太原王報讎終無降理瑞還白帝帝即出庫物置城西門外募敢死之士以討丗隆一日即得萬人與拂律歸等戰於郭外拂律歸等生長戎旅洛陽之人不習戰􅃲屢戰不克甲辰以前車􅀐大將軍李叔仁爲大都督帥衆討丗隆戊申皇子生大赦以中書令魏蘭根兼尚書左僕射爲河北行臺定相殷三州皆稟蘭根節度爾朱氏兵猶在城下帝集羣臣愽議皆恇懼不知所出通直散􅀐常侍李苗奮衣起曰今小賊唐突如此朝廷有不測之危正是忠臣烈士效節之日臣雖不武請以一旅之衆爲陛下徑斷河橋城陽王徽髙道穆皆以爲善帝許之乙卯苗募人從馬渚上流乗􅂳夜下去橋數里縱火􅂳焚河橋倐忽而至爾朱氏兵在南岸者望之爭橋北度俄而橋絶溺死者甚衆苗將百許人泊於小渚以待南援官軍不至爾朱氏就擊之左右皆盡苗赴水死帝傷惜之贈車􅀐大將軍儀同三司封河陽矦謚曰忠烈丗隆亦收兵北遁丙辰詔行臺源子恭將歩􅀐一萬出西道楊昱將募士八千出東道以討之子恭仍鎭太行丹谷築壘以防之世隆至建州刺史陸希質閉城拒守丗隆攻拔之殺城中人無遺類以肆其忿唯希質走免詔以前東荆州刺史元顯恭爲晉州刺史兼尚書左僕射西道行臺魏東徐州刺史廣牧斛斯椿素依附爾朱榮榮死椿懼聞汝南王恱在境上乃帥部衆弃州歸恱恱授椿侍中大將軍司空封靈丘郡公又爲大行臺前驅都督汾州刺史爾朱兆聞榮死自汾州帥􅀐據晉陽丗隆至長子兆來㑹之壬申共推太原太守行并州事長廣王曄即皇帝位大赦改元建明曄英之弟子也以兆爲大將軍進爵爲王丗隆爲尚書令賜爵樂平王加太傅司州牧又以榮從弟度律爲太尉賜爵常山王丗隆兄天柱長史彦伯爲侍中徐州刺史仲逺爲車􅀐大將軍兼尚書左僕射三徐州大行臺仲逺亦起兵向洛陽爾朱天光之克平涼也􅀫勤明逹請降旣而復叛北走天光遣賀拔岳討之明逹奔東夏岳聞爾朱榮死不復窮追還涇州以待天光天光與矦莫陳恱亦下隴與岳謀引兵向洛魏敬宗使朱瑞慰諭天光天光與岳謀欲令帝外奔而更立宗室乃頻啟云臣實無異心唯欲仰奉天顔以申宗門之罪又使其下僚屬啓云天光密有異圖願思勝筭以防之范陽太守盧文偉誘平州刺史矦淵出獵閉門拒之淵屯於郡南爲榮舉哀勒兵南向進至中山行臺僕射魏蘭根邀擊之爲淵所敗敬宗以城陽王徽兼大司馬録尚書事揔統内外徽意謂榮旣死枝葉自應散落及爾朱丗隆等兵四起黨衆日盛徽憂怖不知所出性多忌嫉不欲人居已前每獨與帝謀議羣臣有獻䇿者徽輙勸帝不納且曰小賊何慮不平又靳惜財貨賞賜率皆薄少或多而中減或與而復追故徒有糜費而恩不感物十一月癸酉朔敬宗以車􅀐將軍鄭先護爲大都督與行臺楊昱共討爾朱仲逺乙亥以司徒長孫稚爲太尉臨淮王彧爲司徒丙子進雍州刺史廣宗公爾朱天光爵爲王長廣王亦以天光爲隴西王爾朱仲逺攻西兖州丁丑拔之擒刺史王衍衍肅之兄子也癸未敬宗以右衛將軍賀拔勝爲東征都督壬辰又以鄭先護兼尚書左僕射爲行臺與勝共討仲逺戊戌詔罷魏蘭根行臺以定州刺史薛曇尚兼尚書爲北道行臺鄭先護疑賀拔勝置之營外庚子勝與仲逺戰於滑臺東兵敗降於仲逺初爾朱榮甞從容問左右曰一日無我誰可主軍皆稱爾朱兆榮曰兆雖勇於戰􅃲然所將不過三千􅀐多則亂矣堪代我者唯賀六渾耳因戒兆曰爾非其匹終當爲其穿鼻乃以髙歡爲晉州刺史及兆引兵向洛遣使召歡歡遣長史孫騰詣兆辭以山蜀未平今方攻討不可委去致有後憂定蜀之日當隔河爲掎角之勢兆不恱曰還白髙晉州吾得􅁻夢夢與吾先人登髙丘丘旁之地耕之已熟獨餘馬藺先人命吾拔之隨手而盡以此觀之往無不克騰還報歡曰兆狂愚如是而敢為悖逆吾勢不得乆事爾朱矣十二月壬寅朔爾朱兆攻丹谷都督崔伯鳳戰死都督史仵龍開璧請降源子㳟退走兆輕兵倍道兼行從河橋西渉渡先是敬宗以大河深廣謂兆未能猝濟是日水不没馬腹甲辰暴風黄塵漲天兆􅀐叩宫門􅀫衛乃覺彎弓欲射矢不得發一時散走華山王鷙斤之玄孫也素附爾朱氏帝始聞兆南下欲自帥諸軍討之鷙􅀃帝曰黄河萬仭兆安得渡帝遂自安及兆入宫鷙復約止衛兵不使􅃲帝歩出雲龍門外遇城陽王徽乗馬走帝屡呼之不顧而去兆􅀐執帝鎻於永寧寺樓上帝寒甚就兆求頭巾不與兆營於尚書省用天子金鼔設刻漏於庭撲殺皇子汙辱嬪御妃主縱兵大掠殺司空臨淮王彧尚書左僕射范陽王誨青州刺史李延寔等城陽王徽走至山南抵前洛陽令冦祖仁家祖仁一門三刺史皆徽所引㧞以有舊恩故投之徽齎金百斤馬五十匹祖仁利其財外雖容納而私謂子弟曰如聞爾朱兆購募城陽王得之者封千戸矦今日富貴至矣乃怖徽云官捕將至令其逃於它所使人於路邀殺之送首於兆兆亦不加勲賞兆夣徽謂己曰我有金二百斤馬百匹在祖仁家卿可取之兆旣覺意所夣爲實即掩捕祖仁徴其金馬祖仁謂人密告望風􅅃服云實得金百斤馬五十匹兆疑其隱匿依夣徴之祖仁家舊有金三十斤馬三十匹盡以輸兆兆猶不信發怒執祖仁懸首髙樹大石墜足捶之至死爾朱丗隆至洛陽兆自以爲己功責丗隆曰叔父在朝日乆耳目應廣如何令天柱受禍按劒瞋目聲色甚厲丗隆遜辭拜謝然後得已由是深恨之爾朱仲逺亦自滑臺至洛戊申魏長廣王大赦爾朱榮之死也敬宗詔河西賊帥紇豆陵歩蕃使襲秀容及兆入洛歩蕃南下兵勢甚盛故兆不暇乆留亟還􅀳陽以禦之使爾朱丗隆度律彦伯等留鎭洛陽甲寅兆遷敬宗於􅀳陽兆自於河梁監閱財資髙􅂬聞敬宗向晉陽帥􅀐東巡欲邀之不及因與兆書爲陳禍福不宜害天子受惡名兆怒不納爾朱天光輕􅀐入洛見丗隆等即還雍州初敬宗恐北軍不利欲爲南走之計託云征蠻以髙道穆爲南道大行臺未及發而兆入洛道穆託疾去丗隆殺之主者請追李苗封贈丗隆曰當時衆議更一二日即欲縱兵大掠焚燒郭邑賴苗之故京師獲全天下之善一也不宜復追爾朱榮之死也丗隆等徴兵於大寜太守代人房謨謨不應前後斬其三使遣弟毓詣洛陽及兆得志其黨建州刺史是蘭安定執謨繫州獄郡中蜀人聞之皆叛安定給謨弱馬令軍前慰勞諸賊見謨莫不遙拜謨先所乗馬安定别給將士戰敗蜀人得之謂謨遇害莫不悲泣善養其馬不聽人乗之兒童婦女競投草粟皆言此房公馬也爾朱丗隆聞之捨其罪以為其府長史北道大行臺楊津以衆少留鄴召募欲自􅇭口入并州㑹爾朱兆入洛津乃散衆輕􅀐還朝爾朱丗隆與兄弟密謀慮長廣王母衛氏干預朝政伺其出行遣數十􅀐如劫盗者於京巷殺之尋懸牓以千萬錢募賊甲子爾朱兆縊敬宗於􅀳陽三級佛寺并殺陳留王寛是月紇豆陵歩蕃大破爾朱兆於秀容南逼晉陽兆懼使人召髙歡并力僚屬皆􅂆􅂬勿應召歡曰兆方急保無它慮遂行歡所親賀拔焉過兒請緩行以弊之歡往往逗留辭以河無橋不得渡歩蕃兵日盛兆屡敗告急於歡歡乃往從之兆時避歩蕃南出歩蕃至平樂郡歡與兆進兵合擊大破之斬歩蕃於石鼔山其衆退走兆德歡相與誓爲兄弟將數十􅀐詣歡通夜宴飲初葛榮部衆流入并肆者二十餘萬爲契胡陵暴皆不聊生大小二十六反誅夷者半猶謀亂不止兆患之問計於歡歡曰六鎭反殘不可盡殺宜選王腹心使統之有犯者罪其帥則所罪者寡矣兆曰善誰可使者賀㧞允時在坐請使歡領之歡拳敺其口折一齒曰平生天柱時奴輩伏處分如鷹大今日天下事取捨在王而阿鞠泥敢僣易妄言請殺之兆以歡爲誠遂以其衆委焉歡以兆醉恐醒而悔之遂出宣言受委統州鎭兵可集汾東受號令乃建牙陽曲川陳部分軍士素惡兆而樂屬歡莫不皆至居無何又使劉貴請兆以并肆頻歲霜旱降戸掘田䑕而食之面無榖色徒汙人境内請令就食山東待温飽更受處分兆從其議長史慕容紹宗諫曰不可方今四方紛擾人懐異望髙公雄才蓋世復使握大兵於外譬如借蛟龍以雲雨將不可制矣兆曰有香火重誓何慮邪紹宗曰親兄弟尚不可信何論香火時兆左右已受􅂬金因稱紹宗與􅂬有舊隙兆怒囚紹宗趣􅂬發􅂬自􅀳陽出􅇭口道逢北郷長公主自洛陽來有馬三百匹盡奪而易之兆聞之乃釋紹宗而問之紹宗曰此猶是掌握中物也兆乃自追􅂬至襄垣㑹漳水暴漲橋壞􅂬隔水拜曰所以借公主馬非有它故備山東盗耳王信公主之讒自來賜追今不辭度水而死恐此衆便叛兆自陳無此意因輕馬度水與􅂬坐幕下陳謝授􅂬刀引頸使􅂬斫之􅂬大哭曰自天柱之薨賀六渾更何所仰但願大家千萬歳以申力用耳今爲旁人所構間大家何忍復出此言兆投刀於地復斬白馬與􅂬爲誓因留宿夜飲尉景伏壯士欲執兆􅂬齧臂止之曰今殺之其黨必奔歸聚結兵飢馬瘦不可與敵若英雄乗之而起則爲害滋甚不如且置之兆雖驍勇兇悍無謀不足圖也旦日兆歸營復召􅂬􅂬將上馬詣之孫騰牽􅂬衣􅂬乃止兆隔水肆罵馳還晉陽兆腹心念賢領降戸家屬别爲營􅂬僞與之善觀其佩刀因取殺之士衆感恱益願附從齊州城民趙洛周聞爾朱兆入洛逐刺史丹楊王蕭贊以城歸兆賛變形爲沙門逃入長白山流轉卒於陽平梁人或盗其柩以歸上猶以子禮葬於陵次魏荆州刺史李琰之韶之族弟也南陽太守趙修延以琰之敬宗外族誣琰之欲奔梁發兵襲州城執琰之自行州事魏王恱改元更興聞爾朱兆已入洛自知不及事遂南還斛斯椿復弃恱奔魏是歳詔以陳慶之爲都督南北司等四州諸軍事南北司二州刺史慶之引兵圍魏懸瓠破魏潁州刺史婁起等於溱水又破行臺孫騰等於楚城罷義陽鎭兵停水陸漕運江湖諸州並得休息開田六十頃二年之後倉廪充實資治通鑑卷第一百五十四
