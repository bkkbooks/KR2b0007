body:
  text: 臣光曰孔子稱舉善而教不能則勸是以堯舉臯陶湯舉伊尹而不仁者遠有德故也光武即位之初羣雄競逐四海鼎沸彼摧堅䧟敵之人權略詭辯之士方見重於世而獨能取忠厚之臣旌循良之吏抜於草萊之中寘諸羣公之首宜其光復舊物享祚乆長蓋由知所先務而得其本原故也諸將圍洛陽數月朱鮪堅守不下帝以廷尉岑彭嘗爲鮪校尉令往􅀃之鮪在城上彭在城下爲陳成敗鮪曰大司徒被害時鮪與共謀又諫更始無遣蕭王北伐誠自知罪深不敢降彭還具言於帝帝曰舉大事者不忌小怨鮪今若降官爵可保况誅罰乎河水在此吾不食言彭復往告鮪鮪從城上下索曰必信可乗此上彭趣索欲上鮪見其誠即許降辛卯朱鮪靣縛與岑彭俱詣河陽帝解其縛召見之復令彭夜送鮪歸城明旦與蘇茂等悉其衆出降拜鮪爲平狄將軍封扶溝矦後爲少府傳封累世帝使侍御史河内杜詩安集洛陽將軍蕭廣縱兵士暴横詩敕曉不改遂格殺廣還以狀聞上召見賜以棨㦸遂擢任之冬十月癸丑車駕入洛陽幸南宫遂定都焉赤眉下書曰聖公降者封爲長沙王過二十日勿受更始遣劉㳟請降赤眉使其將謝禄往受之更始隨祿肉􅃝上璽綬於盆子赤眉坐更始置庭中將殺之劉恭謝禄爲請不能得遂引更始出劉恭追呼曰臣誠力極請得先死拔劒欲自刎樊崇等遽共救止之乃赦更始封爲畏威矦劉恭復為固請竟得封長沙王更始常依謝禄居劉恭亦擁護之劉盆子居長樂宫三輔郡縣營長遣使貢獻兵士輙剽奪之又數暴掠吏民由是皆復固守百姓不知所歸聞鄧禹乗勝獨克而師行有紀皆望風相􅂝負以迎軍降者日以千數衆號百萬禹所止輙停車拄節以勞來之父老童稺垂髪戴白滿其車下莫不感恱於是名震關西諸將豪桀皆勸禹徑攻長安禹曰不然今吾衆雖多能戰者少前無可仰之積後無轉饋之資赤眉新抜長安財榖充實鋒銳未可當也夫盜賊羣居無終日之計財榖雖多變故萬端寧能堅守者也上郡北地安定三郡土廣人稀饒榖多畜吾且休兵北道就糧養士以觀其敝乃可圗也於是引軍北至栒邑所到諸營保郡邑皆開門歸附上遣岑彭擊荆州羣賊下犨葉等十餘城十一月甲午上幸懷梁王永稱帝於睢陽十二月丙戌上還洛陽三輔苦赤眉暴虐皆憐更始欲盜出之張卬等深以爲慮使謝禄縊殺之劉㳟夜往收藏其尸帝詔鄧禹葬之於霸陵中郎將宛人趙憙將出武關道遇更始親屬皆裸跣飢困憙竭其資糧以與之將護而前宛王賜聞之迎還鄉里隗囂歸天水復招聚其衆興修故業自稱西州上將軍三輔士大夫避亂者多歸囂囂傾身引接爲布衣交以平陵范逡爲師友前涼州刺史河南鄭興爲祭酒茂陵申屠剛杜林爲治書馬援爲綏德將軍楊廣王遵周宗及平襄行廵阿陽王㨗長陵王元爲大將軍安陵班彪之屬爲賔客由此名震西州聞於山東馬援少時以家用不足辭其兄況欲就邊郡田牧況曰汝大才當晚成良工不示人以朴且從所好遂之北地田牧常謂賔客曰丈夫爲志窮當益堅老當益壯後有畜數千頭榖數萬斛旣而歎曰凡殖財産貴其能賑施也否則守錢虜耳乃盡散於親舊聞隗囂好士往從之囂甚敬重與決籌䇿班彪稺之子也初平陵竇融累世仕宦河西知其土俗與更始右大司馬趙萌善私謂兄弟曰天下安危未可知河西殷富帶河爲固張掖屬國精兵萬騎一旦緩急杜絶河津足以自守此遺種處也乃因萌求往河西萌薦融於更始以爲張掖屬國都尉融旣到撫結雄桀懷輯羌虜甚得其歡心是時酒泉太守安定梁統金城太守庫鈞張掖都尉茂陵史苞酒泉都尉笁曽敦煌都尉辛肜並州郡英俊融皆與厚善及更始敗融與梁統等計議曰今天下擾亂未知所歸河西斗絶在羌胡中不同心勠力則不能自守權鈞力齊復無以相率當推一人爲大將軍共全五部觀時變動議旣定而各謙讓以位次咸共推梁統統固辭乃推融行河西五郡大將軍事武威太守馬期張掖太守任仲並􅀌立無黨乃共移書告示之二人即解印綬去於是以梁統爲武威太守史苞爲張掖太守笁曽爲酒泉太守辛肜爲敦煌太守融居屬國領都尉職如故置從事監察五郡河西民俗質樸而融等政亦寛和上下相親晏然富殖脩兵馬習戰射明烽燧羌胡犯塞融輙自將與諸郡相救皆如符要每輙破之其後羌胡皆震服親附内郡流民避凶饑者歸之不絶王莽之世天下咸思漢德安定三水盧芳居左谷中詐稱武帝曽孫劉文伯云曽祖母匈奴渾邪王之姊也常以是言誑惑安定閒王莽末乃與三水屬國羌胡起兵更始至長安徴芳爲騎都尉使鎭撫安定以西更始敗三水豪桀共立芳爲上將軍西平王使使與西羌匈奴結和親單于以爲漢氏中絶劉氏來歸我亦當如呼韓邪立之令尊事我乃使句林王將數千􅀐迎芳兄弟入匈奴立芳為漢帝以芳弟程爲中郎將將胡􅀐還入安定帝以關中未定而鄧禹乆不進兵賜書責之曰司徒堯也亡賊桀也長安吏民遑遑無所依歸宜以時進討鎭慰西京繫百姓之心禹猶執前意别攻上郡諸縣更徴兵引榖歸至大要積弩將軍馮愔車騎將軍宗歆守栒邑二人爭權相攻愔遂殺歆因反擊禹禹遣使以聞帝問使人愔所親愛爲誰對曰護軍黄防帝度愔防不能乆和埶必相忤因報禹曰縛馮愔者必黄防也乃遣尚書宗廣持節往降之後月餘防果執愔將其衆歸罪更始諸將王匡胡殷成丹等皆詣廣降廣與東歸至安邑道欲亡廣悉斬之愔之叛也引兵西向天水隗囂逆擊破之於髙平盡獲其輜重於是禹承制遣使持節命囂爲西州大將軍得專制涼州朔方事臘日赤眉設樂大㑹酒未行羣臣更相辨鬬而兵衆遂各踰宫斬關入掠酒肉互相殺傷衛尉諸葛稺聞之勒兵入格殺百餘人乃定劉盆子惶恐日夜啼泣從官皆憐之帝遣宗正劉延攻天井關與田邑連戰十餘合延不得進及更始敗邑遣使請降即拜爲上黨太守帝又遣諌議大夫儲大伯持節徴鮑永永未知更始存亡疑不肯從收繫大伯遣使馳至長安詗問虛實初帝從更始在宛納新野隂氏之女麗華是歳遣使迎麗華與帝姊湖陽公主妹寧平公主俱到洛陽以麗華爲貴人更始西平王李通先娶寧平公主上徴通爲衞尉初更始以王閎爲琅邪太守張歩據郡拒之閎諭降得贛榆等六縣收兵與歩戰不勝歩旣受劉永官號治兵於劇遣將徇泰山東萊城陽膠東北海濟南齊郡皆下之閎力不敵乃詣歩相見歩大陳兵而見之怒曰歩有何罪君前見攻之甚閎按劒曰太守奉朝命而文公擁兵相拒閎攻賊耳何謂甚邪歩起跪謝與之宴飲待爲上賔令閎關掌郡事二年春正月甲子朔日有食之劉㳟知赤眉必敗密教弟盆子歸璽綬習爲辭讓之言及正旦大㑹㳟先曰諸君共立㳟弟爲帝德誠深厚立且一年殽亂日甚誠不足以相成恐死而無益願得退爲庶人更求賢知唯諸君省察樊崇等謝曰此皆崇等罪也㳟復固請或曰此寧式矦事邪㳟惶恐起去盆子乃下􅇃解璽綬叩頭曰今設置縣官而爲賊如故四方怨恨不復信向此皆立非其人所致願乞骸骨避賢聖路必欲殺盆子以塞責者無所離死因涕泣嘘唏崇等及㑹者數百人莫不哀憐之乃皆避席頓首曰臣無狀負陛下請自今已後不敢復放縱因共抱持盆子帶以璽綬盆子號呼不得已旣罷出各閉營自守三輔翕然稱天子聦明百姓爭還長安市里且滿後二十餘日復出大掠如故刀子都爲其部曲所殺餘黨與諸賊㑹檀鄉號檀鄉賊宼魏郡清河魏郡大吏李熊弟陸謀反城迎檀鄉或以告魏郡太守潁川銚期期召問熊熊叩頭首服願與老母俱就死期曰爲吏儻不若爲賊樂者可歸與老母往就陸也使吏送出城熊行求得陸將詣鄴城西門陸不勝愧感自殺以謝期期嗟歎以禮葬之而還熊故職於是郡中服其威信帝遣吳漢率王梁等九將軍擊檀鄉於鄴東漳水上大破之十餘萬衆皆降又使梁與大將軍杜茂將兵安輯魏郡清河東郡悉平諸營保三郡清静邊路流通庚辰悉封諸功臣爲列矦梁矦鄧禹廣平矦吳漢皆食四縣博士丁恭議曰古者封諸矦不過百里強幹弱枝所以爲治也今封四縣不合灋制帝曰古之亡國皆以無道未嘗聞功臣地多而滅亡者也隂鄉矦隂識貴人之兄也以軍功當増封識叩頭讓曰天下初定將帥有功者衆臣託屬掖廷仍加爵邑不可以示天下此爲親戚受賞國人計功也帝從之帝令諸將各言所樂皆占美縣河南太守潁川丁綝獨求封本鄉或問其故綝曰綝能薄功微得鄉亭厚矣帝從其志封新安鄉矦帝使郎中魏郡馮勤典諸矦封事勤差量功次輕重國土逺近地埶豐薄不相踰越莫不厭服焉帝以爲能尚書衆事皆令緫録之故事尚書郎以令史乆次􅀘之帝始用孝廉爲尚書郎起髙廟于洛陽四時合祀髙祖太宗世宗建社稷于宗廟之右立郊兆于城南長安城中糧盡赤眉收載珍寳大縱火燒宫室市里恣行殺掠長安城中無復人行乃引兵而西衆號百萬自南山轉掠城邑遂入安定北地鄧禹引兵南至長安軍昆明池謁祠髙廟收十一帝神主送詣洛陽因廵行園陵爲置吏士奉守焉眞定王楊造䜟記曰赤九之後癭楊爲主楊病癭欲以惑衆與綿曼賊交通帝遣􅀐都尉陳副游擊將軍鄧隆徵之楊閉城門不内帝復遣前將軍耿純持節行幽冀所過勞慰王矦宻敕收楊純至眞定止傳舍邀楊相見純眞定宗室之出也故楊不以爲疑且自恃衆強而純意安靜即從官屬詣之楊兄弟並將輕兵在門外楊入見純純接以禮敬因延請其兄弟皆入乃閉閤悉誅之因勒兵而出眞定震怖無敢動者帝憐楊謀未發而誅復封其子爲眞定王二月己酉車駕幸修武鮑永馮衍審知更始已亡乃發喪出儲大伯等封上印綬悉罷兵幅巾詣河内帝見永問曰卿衆安在永離席叩頭曰臣事更始不能令全誠慙以其衆幸富貴故悉罷之帝曰卿言大而意不悦旣而永以立功見用衍遂廢棄永謂衍曰昔髙祖賞季布之罪誅丁固之功今遭明主亦何憂哉衍曰人有挑其鄰人之妻者其長者罵而少者報之後其夫死取其長者或謂之曰夫非罵爾者邪曰在人欲其報我在我欲其罵人也夫天命難知人道易守守道之臣何患死亡大司空王梁屢違詔命帝怒遣尚書宗廣持節即軍中斬梁廣檻車送京師旣至赦之以爲中郎將北守箕關壬子以太中大夫京兆宋􅀪爲大司空􅀪薦沛國􅁊譚爲議郎給事中帝令譚鼔琴愛其繁聲􅀪聞之不恱伺譚内出正朝服坐府上遣吏召之譚至不與席而讓之且曰能自改邪將令相舉以灋乎譚頓首辭謝良乆乃遣之後大㑹羣臣帝使譚鼓琴譚見􅀪失其常度帝怪而問之􅀪乃離席免冠謝曰臣所以薦􅁊譚者望能以忠正導主而令朝廷耽恱鄭聲臣之罪也帝改容謝之湖陽公主新寡帝與共論朝臣微觀其意主曰宋公威容德器羣臣莫及帝曰方且圗之後􅀪􅀍引見帝令主坐屏風後因謂􅀪曰諺言貴易交富易妻人情乎􅀪曰臣聞貧賤之知不可忘糟糠之妻不下堂帝顧謂主曰事不諧矣帝之討王郎也彭寵發突騎以助軍轉糧食前後不絶及帝追銅馬至薊寵自負其功意望甚髙帝接之不能滿以此懷不平及即位吳漢王梁寵之所遣並爲三公而寵獨無所加愈怏怏不得志歎曰如此我當爲王但爾者陛下忘我邪是時北州破散而漁陽差完有舊鐵官寵轉以貿榖積珍寶益富彊幽州牧朱浮年少有俊才欲厲風迹收士心辟召州中名宿及王莽時故吏二千石皆引置幕府多發諸郡倉榖稟贍其妻子寵以爲天下未定師旅方起不宜多置官屬以損軍實不從其令浮性矜急自多寵亦佷彊嫌怨轉積浮數譛構之宻奏寵多聚兵榖意計難量上輒漏泄令寵聞以脅恐之至是有詔徴寵寵上䟽願與浮俱徴帝不許寵益以自疑其妻素剛不堪抑屈固勸無受徴曰天下未定四方各自爲雄漁陽大郡兵馬最精何故爲人所奏而弃此去乎寵又與所親信吏計議皆懐怨於浮莫有勸行者帝遣寵從弟子后蘭卿喻之寵因留子后蘭卿遂發兵反拜署將帥自將二萬餘人攻朱浮於薊又以與耿況俱有重功而恩賞並薄數遣使要誘況況不受斬其使延岑復反圍南鄭漢中王嘉兵敗走岑遂據漢中進兵武都爲更始柱功矦李寳所破岑走天水公孫述遣將矦丹取南鄭嘉收散卒得數萬人以李寳爲相從武都南擊矦丹不利還軍河池下辨復與延岑連戰岑引北入散關至陳倉嘉追擊破之公孫述又遣將軍任滿從閬中下江州東據扞關於是盡有益州之地辛卯上還洛陽三月乙未大赦更始諸大將在南方未降者尚多帝召諸將議兵事以檄叩地曰郾最彊宛爲次誰當擊之賈復率然對曰臣請擊郾帝笑曰執金吾擊郾吾復何憂大司馬當擊宛遂遣復擊郾破之尹尊降又東擊更始淮陽太守暴汜汜降夏四月虎牙大將軍蓋延督駙馬都尉馬武等四將軍擊劉永破之遂圍永於睢陽故更始將􅂫茂反殺淮陽太守潘蹇據廣樂而臣於永永以茂爲大司馬淮陽王吳漢擊宛宛王賜奉更始妻子詣洛陽降帝封賜爲愼矦叔父良族父歙族兄祉皆自長安來甲午封良爲廣陽王祉爲城陽王又封兄縯子章爲太原王興爲魯王更始三子求歆鯉皆爲列矦鄧王王常降帝見之甚歡曰吾見王廷尉不憂南方矣拜爲左曹封山桑矦五月庚辰封族父歙爲泗水王帝以隂貴人雅性寛仁欲立以爲后貴人以郭貴人有子終不肯當六月戊戌立貴人郭氏爲皇后立其子彊爲皇太子大赦丙午封泗水王子終爲湽川王秋賈復南擊召陵新息平之後部將殺人於潁川潁川太守宼恂捕得繫獄時尚草創軍營犯灋率多相容恂戮之於市復以爲恥還過潁川謂左右曰吾與寇恂並列將帥而爲其所䧟今見恂必手劒之恂知其謀不欲與相見姊子谷崇曰崇將也得帶劒侍側卒有變足以相當恂曰不然昔藺相如不畏秦王而屈於廉頗者爲國也乃敕屬縣盛供具儲酒醪執金吾軍入界一人皆兼二人之饌恂出迎於道稱疾而還復勒兵欲追之而吏士皆醉遂過去恂遣谷崇以狀聞帝乃徴恂恂至引見時賈復先在坐欲起相避帝曰天下未定兩虎安得私􅃲今日朕分之於是並坐極歡遂共車同出結友而去八月帝自率諸將征五校丙辰幸内黄大破五校於羛陽降其衆五萬人帝遣游擊將軍鄧隆助朱浮討彭寵隆軍潞南浮軍雍奴遣吏奏狀帝讀檄怒謂使吏曰營相去百里其埶豈可得相及比若還北軍必敗矣彭寵果遣輕兵擊隆軍大破之浮逺遂不能救蓋延圍睢陽數月克之劉永走至虞虞人反殺其母妻永與麾下數十人犇譙􅂫茂佼彊周建合軍三萬餘人救永延與戰於沛西大破之永彊建走保湖陵茂犇還廣樂延遂定沛楚臨淮帝使太中大夫伏隆持節使青徐二州招降郡國青徐羣盜聞劉永破敗皆惶怖請降張歩遣其􅁺孫昱隨隆詣闕上書獻鰒魚隆湛之子也堵鄉人董訢反宛城執南陽太守劉驎揚化將軍堅鐔攻宛拔之訢走還堵鄉呉漢徇南陽諸縣所過多侵暴破虜將軍鄧奉謁歸新野怒漢掠其鄉里遂反擊破漢軍屯據淯陽與諸賊合從九月壬戌帝自内黄還陜賊􅂫況攻破弘農帝使景丹討之㑹丹薨征虜將軍祭遵擊弘農柏華蠻中賊皆平之赤眉引兵欲西上隴隗囂遣將軍楊廣迎擊破之又追敗之於烏氏涇陽間赤眉至陽城番須中逢大雪坑谷皆蒲士多凍死乃復還發掘諸陵取其寳貨凡有玉匣殮者率皆如生賊遂汙辱呂后尸鄧禹遣兵擊之於郁夷反爲所敗禹乃出之雲陽赤眉復入長安延岑屯杜陵赤眉將逢安擊之鄧禹以安精兵在外引兵襲長安㑹謝禄救至禹兵敗走延岑擊逢安大破之死者十餘萬人廖湛將赤眉十八萬攻漢中王嘉嘉與戰於谷口大破之嘉手殺湛遂到雲陽就榖嘉妻兄新野來歙帝之姑子也帝令鄧禹招嘉嘉因歙詣禹降李寳倨慢禹斬之冬十一月以廷尉岑彭爲征南大將軍帝於大㑹中指王常謂羣臣曰此家率下江諸將輔翼漢室心如金石眞忠臣也即日拜常爲漢忠將軍使與岑彭率建義大將軍朱祜等七將軍討鄧奉董訢彭等先擊堵鄉鄧奉救之朱祜軍敗爲奉所􅀗銅馬青犢尤來餘賊共立孫登爲天子登將樂􅀇殺登以其衆五萬餘人降鄧禹自馮愔叛後威名稍損又乏糧食戰數不利歸附者日益離散赤眉延岑暴亂三輔郡縣大姓各擁兵衆禹不能定帝乃遣偏將軍馮異代禹討之車駕送至河南敕異曰三輔遭王莽更始之亂重以赤眉延岑之酷元元塗炭無所依訴將軍今奉辭討諸不軌營堡降者遣其渠帥詣京師散其小民令就農桑壊其營壁無使復聚征伐非必略地屠城要在平定安集之耳諸將非不健􅃲然好虜掠卿本能御吏士念自修敕無爲郡縣所苦異頓首受命引而西所至布威信羣盜多降臣光曰昔周人頌武王之德曰鋪時繹思我徂惟求定言王者之兵志在布陳威德安民而已觀光武之所以取關中用是道也豈不美哉又詔徴鄧禹還曰愼毋與窮宼爭鋒赤眉無榖自當來東吾以飽待饑以逸待勞折箠笞之非諸將憂也無得復妄進兵帝以伏隆爲光禄大夫復使於張歩拜歩東萊太守并與新除青州牧守都尉俱東詔隆輙拜令長以下十二月戊午詔宗室列矦爲王莽所絶者皆復故國三輔大饑人相食城郭皆空白骨蔽野遺民往往聚爲營保各堅壁清野赤眉虜掠無所得乃引而東歸衆尚二十餘萬隨道復散帝遣破姦將軍矦進等屯新安建威大將軍耿弇等屯宜陽以要其還路敕諸將曰賊若東走可引宜陽兵㑹新安賊若南走可引新安兵㑹宜陽馮異與赤眉遇於華隂相拒六十餘日戰數十合降其將卒五千餘人資治通鑑卷第四十
