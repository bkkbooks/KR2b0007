front:
  text: 人赤眉遂轉北至湖蜀郡功曹李熊􅀃公孫述冝稱天子夏四月述即帝位號成家改元龍興以李熊爲大司徒述弟光爲大司馬恢爲大司空越嶲任貴據郡降述蕭王北擊尤來大槍五幡於元氏追至北平連破之又戰於順水北乗勝輕進反爲所敗王自投髙岸遇突騎王豐下馬授王王僅而得免散兵歸保范陽軍中不見王或云已歿諸將不知所爲吴漢曰卿曹弩力王兄子在南陽何憂無主衆恐懼數日乃定賊雖戰勝而憚王威名夜遂引去大軍復進至安次連戰破之賊退入漁陽所過虜掠彊弩將軍陳俊言於王曰賊無輜重宜令輕􅀐出賊前使百姓各自堅壁以絶其食可不戰而殄也王然之遣俊將輕􅀐馳出賊前視人保壁堅完者敕令固守放散在野者因掠取之賊至無所得遂散敗王謂俊曰困此虜者將軍䇿也馮異遺李軼書爲陳禍福勸令歸附蕭王軼知長安已危而以伯升之死心不自安乃報書曰軼本與蕭王首謀造漢今軼守洛陽將軍鎭孟津俱據機軸千載一㑹思成斷金唯深逹蕭王願進愚䇿以佐國安民軼自通書之後不復與異爭鋒故異得北攻天井關拔上黨兩城又南下河南成臯以東十三縣降者十餘萬武勃將萬餘人攻諸畔者異與戰於士鄉下大破斬勃軼閉門不救異見其信效具以白王王報異曰季文多詐人不能得其要領今移其書告守尉當警僃者衆皆怪王宣露軼書朱鮪聞之使人刺殺軼由是城中乖離多有降者朱鮪聞王北征而河内孤乃遣其將蘇茂賈彊將兵三萬餘人度鞏河攻温鮪自將數萬人攻平隂以綴異檄書至河内宼恂即勒軍馳出並移告屬縣發兵㑹温下軍吏皆諌曰今洛陽兵度河前後不絶冝待衆軍畢集乃可出也恂曰溫郡之藩蔽失溫則郡不可守遂馳赴之旦日合戰而馮異遣救及諸縣兵適至恂令士卒乗城鼓譟大呼言曰劉公兵到蘇茂軍聞之陳動恂因犇擊大破之馮異亦渡河擊朱鮪鮪走異與恂追至洛陽環城一帀而歸自是洛陽震恐城門晝閉異恂移檄上狀諸將入賀因上尊號將軍南陽馬武先進曰大王雖執謙退柰宗廟社稷何冝先即尊位乃議征伐今此誰賊而馳騖擊之乎王驚曰何將軍出此言可斬也乃引軍還薊復遣吳漢率耿弇景丹等十三將軍追尤來等斬首萬三千餘級遂窮追至浚靡而還賊散入遼西遼東爲烏􅁊貊人所鈔擊略盡都護將軍賈復與五校戰於眞定復傷瘡甚王大驚曰我所以不令賈復别將者爲其輕敵也果然失吾名將聞其婦有孕生女邪我子娶之生男邪我女嫁之不令其憂妻子也復病尋愈追及王於薊相見甚驩還至中山諸將復上尊號王又不聽行到南平棘諸將復固請之王不許諸將且出耿純進曰天下士大夫􅂢親戚棄土壤從大王於矢石之間者其計固望攀龍鱗附鳯翼以成其所志耳今大王留時逆衆不正號位純恐士大夫望絶計窮則有去歸之思無爲乆自苦也大衆一散難可復合純言甚誠切王深感曰吾將思之行至鄗召馮異詣鄗問四方動靜異曰更始必敗宗廟之憂在於大王冝從衆議㑹儒生彊華自關中奉赤伏符來詣王曰劉秀發兵捕不道四夷雲集龍􅃲野四七之際火爲王羣臣因復奏請六月己未王即皇帝位于鄗南改元大赦鄧禹圍安邑數月未下更始大將軍樊參將數萬人度大陽欲攻禹禹逆擊於解南斬之王匡成丹劉均合軍十餘萬復共擊禹禹軍不利明日癸亥匡等以六甲窮日不出禹因得更治兵甲子匡悉軍出攻禹禹令軍中無得妄動既至營下因傳發諸將鼓而並進大破之匡等皆走禹追斬均及河東太守楊寳遂定河東匡等犇還長安張卬與諸將議曰赤眉旦暮且至見滅不久不如掠長安東歸南陽事若不集復入湖池中爲盜耳乃共入説更始更始怒不應莫敢復言更始使王匡陳牧成丹趙萌屯新豐李松軍掫以拒赤眉張卬廖湛胡殷申屠建與隗囂合謀欲以立秋日貙膢時共劫更始俱成前計更始知之託病不出召張卬等入將悉誅之唯隗囂稱疾不入會客王遵周宗等勒兵自守更始狐疑不決卬湛殷疑有變遂突出獨申屠建在更始斬建使執金吾鄧瞱將兵圍隗囂第卬湛殷勒兵燒門入戰宫中更始大敗囂亦潰圍走歸天水明旦更始東犇趙萌於新豐更始復疑王匡陳牧成丹與張卬等同謀乃並召入牧丹先至即斬之王匡懼將兵入長安與張卬等合赤眉進至華隂軍中有齊巫常鼔舞祠城陽景王巫狂言景王大怒曰當爲縣官何故爲賊有笑巫者輒病軍中驚動方望弟陽􅀃樊崇等曰今將軍擁百萬之衆西向帝城而無稱號名爲羣賊不可以乆不如立宗室挾義誅伐以此號令誰敢不從崇等以爲然而巫言益甚前至鄭乃相與議曰今迫近長安而鬼神若此當求劉氏共尊立之先是赤眉過式掠故式矦萌之子㳟茂盆子三人自隨㳟少習尚書隨樊崇等降更始於洛陽復封式矦爲侍中在長安茂與盆子留軍中屬右校卒史劉俠卿主牧牛及崇等欲立帝求軍中景王後得七十餘人唯茂盆子及前西安矦孝最爲近屬崇等曰聞古者天子將兵稱上將軍乃書札爲符曰上將軍又以兩空札置笥中於鄭北設壇場祠城陽景王諸三老從事皆大㑹列盆子等三人居中立以年次探札盆子最㓜後探得符諸將皆稱臣拜盆子時年十五􅀍髪徒跣敝衣赭汗見衆拜恐畏欲啼茂謂曰善臧符盆子即齧折棄之以徐宣爲丞相樊崇爲御史大夫逢安爲左大司馬謝禄爲右大司馬其餘皆列卿將軍盆子雖立猶朝夕拜劉俠卿時欲出從牧兒戯俠卿怒止之崇等亦不復􅇋視也秋七月辛未帝使使持節拜鄧禹爲大司徒封鄼矦食邑萬户禹時年二十四又議選大司空帝以赤伏符曰王梁主衛作􅀇武丁丑以野王令王梁爲大司空又欲以䜟文用平狄將軍孫咸行大司馬衆咸不恱壬午以吳漢爲大司馬初更始以琅邪伏湛爲平原太守時天下兵起湛獨晏然撫循百姓門下督謀爲湛起兵湛収斬之於是吏民信向平原一境賴湛以全帝徴湛爲尚書使典定舊制又以鄧禹西征拜湛爲司直行大司徒事車駕每出征伐常留鎭守鄧禹自汾隂度河入夏陽更始左輔都尉公乗歙引其衆十萬與左馮翊兵共拒禹於衙禹復破走之宗室劉茂聚衆京密間自稱厭新將軍攻下潁川汝南衆十餘萬人帝使驃騎大將軍景丹建威大將軍耿弇彊弩將軍陳俊攻之茂來降封爲中山王己亥帝幸懷遣耿弇陳俊軍五社津僃滎陽以東使吴漢率建義大將軍朱祜等十一將軍圍朱鮪於洛陽八月進幸河陽李松自掫引兵還從更始與趙萌共攻王匡張卬於長安連戰月餘匡等敗走更始徙居長信宫赤眉至髙陵王匡張卬等迎降之遂共連兵進攻東都門李松出戰赤眉生得松松弟況爲城門校尉開門納之九月赤眉入長安更始單騎走從厨城門出式矦㳟以赤眉立其弟自繫詔獄聞更始敗走乃出見定陶王祉祉爲之除械相與從更始於渭濵右輔都尉嚴本恐失更始爲赤眉所誅即將更始至髙陵本將兵􅀫衛其實圍之更始將相皆降赤眉獨丞相曹竟不降手劒格死辛未詔封更始爲淮陽王吏民敢有賊害者罪同大逆其送詣吏者封列矦初宛人卓茂寛仁㳟愛恬蕩樂道雅實不爲華貌行已在於清濁之間自束髮至白首與人未甞有爭競鄉黨故舊雖行能與茂不同而皆愛慕欣欣焉哀平間爲宻令視民如子舉善而教口無惡言吏民親愛不忍欺之民嘗有言部亭長受其米肉遺者茂曰亭長爲從汝求乎爲汝有事囑之而受乎將平居自以恩意遺之乎民曰徃遺之耳茂曰遺之而受何故言邪民曰竊聞賢明之君使民不畏吏吏不取民今我畏吏是以遺之吏旣卒受故來言耳茂曰汝爲敝民矣凡人所以羣居不亂異於禽獸者以有仁愛禮義知相敬事也汝獨不欲修之寧能髙飛逺走不在人閒邪吏顧不當乗威力彊請求耳亭長素善吏􅀊時遺之禮也民曰苟如此律何故禁之茂笑曰律設大灋禮順人情今我以禮教汝汝必無怨惡以律治汝汝何所措其手足乎一門之内小者可論大者可殺也且歸念之􅀄茂到縣有所廢置吏民笑之鄰城聞者皆蚩其不能河南郡爲置守令茂不爲嫌治事自若數年教化大行道不拾遺遷京部丞密人老少皆涕泣隨送及王莽居攝以病免歸上即位先訪求茂茂時年七十餘甲申詔曰夫名冠天下當受天下重賞今以茂爲太傅封褒德矦
