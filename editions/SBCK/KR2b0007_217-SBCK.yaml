body:
  text: 司馬光奉勑編集唐紀三十三灘四月凡二年有竒起閼逢敦牂盡柔兆涒􅀇宗至道大聖大明孝皇帝下之下十三載春正月己亥安祿山入朝是時楊國忠言祿山必反且曰陛下試召之必不來上使召之祿山聞命即至庚子見上於華清宫泣曰臣本胡人陛下寵擢至此為國忠所疾臣死無日矣上憐之賞賜巨萬由是益親信祿山國忠之言不能入矣太子亦知祿山必反言於上上不聽甲辰太清宫奏學士李琪見􅀇元皇帝乗紫雲告以國祚延昌唐初詔敕皆中書門下官有文者為之乾封以後始召文士元萬頃范履冰等草諸文辭常於北門􅀱進止時人謂之北門學士中宗之世上官昭容專其事上即位始置翰林院密邇禁廷延文章之士下至僧道書畫琴棊數術之工皆處之謂之待詔刑部尚書張均及弟太常卿垍皆翰林院供奉上欲加安祿山同平章事已令張垍草制楊國忠諌曰祿山雖有軍功目不知書豈可為宰相制書若下恐四夷輕唐上乃止乙巳加祿山左僕射賜一子三品一子四品官丙午上還宫安祿山求兼領閑廐羣牧庚申以祿山為閑廐隴右羣牧等使祿山又求兼揔監壬戌兼知揔監事禄山奏以御史中丞吉温為武部侍郎充閑廐副使楊國忠由是惡温祿山密遣親信選徤馬堪戰者數千匹别飼之二月壬申上朝獻太清宫上聖祖尊號曰大聖祖高上大道金闕􅀇元大皇太帝癸酉享太廟上高祖諡曰神堯大聖光孝皇帝太宗諡曰文武大聖大廣孝皇帝高宗諡曰天皇大聖大􅀪孝皇帝中宗諡曰孝和大聖大昭孝皇帝睿宗諡曰􅀇真大聖大興孝皇帝以漢家諸帝皆諡孝故也甲戌羣臣上尊號曰開元天地大寶聖文神武證道孝德皇帝赦天下丁丑楊國忠進位司空甲申臨軒冊命己丑安祿山奏臣所部將士討奚契丹九姓同羅等勲效甚多乞不拘常格超資加賞仍好冩告身付臣軍授之於是除將軍者五百餘人中郎將者二千餘人禄山欲反故先以此收衆心也三月丁酉朔祿山辭歸范陽上解御衣以賜之禄山受之驚喜恐楊國忠奏留之疾驅出闗乗船沿河而下令船夫執䋲板立於岸側十五里一更晝夜兼行日數百里過郡縣不下船自是有言禄山反者上皆縳送之由是人皆知其將反無敢言者禄山之􅀤長安也上令高力士餞之長樂坡及還上問禄山慰意乎對曰觀其意怏怏必知欲命為相而中止故也上以告國忠曰此議它人不知必張垍兄弟告之也上怒貶張均為建安太守垍為盧溪司馬垍弟給事中埱為宜春司馬哥舒翰亦為其部將論功敕以隴右十將特進火拔州都督燕山郡王火㧞歸仁為驃騎大將軍河源軍使王思禮加特進臨洮太守成如璆討擊副使范陽魯炅臯蘭府都督渾惟明並加雲麾將軍隴右討擊副使郭英乂為左羽林將軍英乂知運之子也翰又奏嚴挺之之子武為節度判官河東吕諲為度支判官前封丘尉高適為掌書記安邑曲環為别將程千里執阿布思獻於闕下斬之甲子以千里為金吾大將軍以封常清權北庭都䕶伊西節度使夏四月癸巳安祿山奏擊奚破之虜其王李日越六月乙丑朔日有食之不盡如鉤侍御史劒南留後李宓將兵七萬擊南詔閤羅鳳誘之深入至太和城閉壁不戰宓糧盡士卒罹瘴疫及飢死什七八乃引還蠻追擊之宓被擒全軍皆没楊國忠隠其敗更以捷聞益􅀤中國兵討之前後死者幾二十萬人無敢言者上嘗謂高力士曰朕今老矣朝事付之宰相邊事付之諸將夫復何憂力士對曰臣聞雲南數喪師又邊將擁兵太盛陛下將何以制之臣恐一旦禍􅀤不可復救何謂無憂也上曰卿勿言朕徐思之秋七月癸丑哥舒翰奏於所開九曲之地置洮陽澆河二郡及神䇿軍以臨洮太守成如璆兼洮陽太守充神䇿軍使楊國忠忌陳希烈希烈累表辭位上欲以武部侍郎吉温代之國忠以温附安禄山奏言不可以文部侍郎韋見素和雅易制薦之八月丙戌以希烈為太子太師罷政事以見素為武部尚書同平章事自去嵗水旱相繼闗中大饑楊國忠惡京兆尹李峴不附己以災沴歸咎於峴九月貶長沙太守峴禕之子也上憂雨傷稼國忠取禾之善者獻之曰雨雖多不害稼也上以為然扶風太守房琯言所部水災國忠使御史推之是嵗天下無敢言災者高力士侍側上曰淫雨不已卿可盡言對曰自陛下以權假宰相賞罰無章陰陽失度臣何敢言上黙然冬十月乙酉上幸華清宫十一月己未置内侍監二貟正三品河東太守兼本道采訪使韋陟斌之兄也文雅有盛名楊國忠恐其入相使人告陟􅂍汚事下御史按問陟賂中丞吉温使求救於安祿山復為國忠所􅀤閏月壬寅貶陟桂嶺尉温澧陽長史安祿山為温訟寃且言國忠䜛疾上兩無所問戊午上還宫是嵗戸部奏天下郡三百二十一縣千五百三十八鄉萬六千八百二十九戸九百六萬九千一百五十四口五千二百八十八萬四百八十八十四載春正月蘇毗王子悉諾邏去吐蕃來降二月辛亥安祿山使副將何千年入奏請以蕃將三十二人代漢將上命立進畫給告身韋見素謂楊國忠曰祿山久有異志今又有此請其反明矣明日見素當極言上未允公其繼之國忠許諾壬子國忠見素入見上迎謂曰卿等有疑祿山之意邪見素因極言禄山反已有迹所請不可許上不悦國忠逡巡不敢言上竟從祿山之請它日國忠見素言於上曰臣有䇿可坐消祿山之謀今若除祿山平章事召詣闕以賈循為范陽節度使呂知誨為平盧節度使楊光翽為河東節度使則勢自分矣上從之已草制上留不􅀤更遣中使輔璆琳以珍果賜禄山濳察其變璆琳受祿山厚賂還盛言祿山竭忠奉國無有二心上謂國忠等曰祿山朕推心待之必無異志東北二虜藉其鎮遏朕自保之卿等勿憂也事遂寢循華原人也時為節度副使隴右河西節度使哥舒翰入朝道得風疾遂留京師家居不出三月辛巳命給事中裴士淹宣慰河北夏四月安禄山奏破奚契丹癸巳以蘇毗王子悉諾邏為懷義王賜姓名李忠信安禄山歸至范陽朝廷每遣使者至皆稱疾不出迎盛陳武備然後見之裴士淹至范陽二十餘日乃得見無復人臣禮楊國忠日夜求禄山反狀使京兆尹圍其第捕禄山客李超等送御史臺獄濳殺之禄山子慶宗尚宗女榮義郡主供奉在京師密報禄山禄山愈懼六月上以其子成昬手詔召禄山觀禮禄山辭疾不至秋七月禄山表獻馬三千匹每匹執控夫二人遣蕃將二十二人部送河南尹逹奚珣疑有變奏請諭禄山以進車馬宜俟至冬官自給夫無煩本軍於是上稍寤始有疑禄山之意會輔璆琳受賂事亦泄上託以它事撲殺之上遣中使馮神威齎手詔諭祿山如珣䇿旦曰朕新為卿作一湯十月於華清宫待卿神威至范陽宣㫖禄山踞牀微起亦不拜曰聖人安隠又曰馬不獻亦可十月灼然詣京師即令左右引神威置館舍不復見數日遣還亦無表神威還見上泣曰臣幾不得見大家八月辛卯免今載百姓租庸冬十月庚寅上幸華清宫安禄山專制三道陰蓄異志殆將十年以上待之厚欲俟上晏駕然後作亂㑹楊國忠與禄山不相恱屢言禄山且反上不聽國忠數以事激之欲其速反以取信於上祿山由是決意遽反獨與孔目官太僕丞嚴莊掌書記屯田員外郎高尚將軍阿史那承慶密謀自餘將佐皆莫之知但恠其自八月以來屢饗士卒秣馬厲兵而已㑹有奏事官自京師還禄山詐為敕書悉召諸將示之曰有密㫖令祿山將兵入朝討楊國忠諸君宜即従軍衆愕然相顧莫敢異言十一月甲子禄山􅀤所部兵及同羅奚契丹室韋凡十五萬衆號二十萬反於范陽命范陽節度副使賈循守范陽平盧節度副使呂知誨守平盧别将高秀巖守大同諸將皆引兵夜􅀤詰朝祿山出薊城南大閱誓衆以討楊國忠為名牓軍中曰有異議扇動軍人者斬及三族於是引兵而南祿山乗鐵轝步騎精鋭煙塵千里鼓譟震地時海内久承平百姓累世不識兵革猝聞范陽兵起逺近震駭河北皆禄山統内所過州縣望風瓦解守令或開門出迎或棄城竄匿或為所擒戮無敢拒之者禄山先遣將軍何千年高邈將奚騎二十聲言獻射生手乗驛詣太原乙丑北京副留守楊光翽出迎因刼之以去太原具言其狀東受降城亦奏祿山反上猶以為惡祿山者詐為之未之信也庚午上聞祿山定反乃召宰相謀之楊國忠􅀭􅀭有得色曰今反者獨禄山耳將士皆不欲也不過旬日必傳首詣行在上以為然大臣相顧失色上遣特進畢思琛詣東京金吾將軍程千里詣河東各簡募數萬人隨便團結以拒之辛未安西節度使封常清入朝上問以討賊方略常清大言曰今太平積乆故人望風憚賊然事有逆順勢有奇變臣請走馬詣東京開府庫募驍勇挑馬箠度河計日取逆胡之首獻闕下上恱壬申以常清為范陽平盧節度使常清即日乗驛詣東京募兵旬日得六萬人乃斷河陽橋為守禦之備甲戌祿山至博陵南何千年等執楊光翽見祿山責光翽以附楊國忠斬之以徇祿山使其將安忠志將精兵軍土門忠志奚人祿山養為假子又以張獻誠攝博陵太守獻誠守珪之子也祿山至藁城常山太守顔杲卿力不能拒與長史袁履謙往迎之祿山輒賜杲卿金紫質其子弟使仍守常山又使其將李欽湊将兵數千人守井陘口以備西來諸軍杲卿歸途中指其衣謂履謙曰何為著此履謙悟其意乃陰與杲卿謀起兵討祿山杲卿思魯之􅀇孫也丙子上還宫斬太僕卿安慶宗賜榮義郡主自盡以朔方節度使安思順為戸部尚書思順弟元貞為太僕卿以朔方右廂兵馬使九原太守郭子儀為朔方節度使右羽林大將軍王承業為太原尹置河南節度使領陳留等十三郡以衛尉卿猗氏張介然為之以程千里為潞州長史諸郡當賊衝者始置防禦使丁丑以榮王琬為元帥右金吾大將軍高仙芝副之統諸軍東征出内府錢帛於京師募兵十一萬號曰天武軍旬日而集皆市井子弟也十二月丙戌高仙芝將飛騎彍騎及新募兵邊兵在京師者合五萬人􅀤長安上遣宦者監門將軍邊令誠監其軍屯於陜丁亥安禄山自靈昌度河以絙約敗船及草木横絶河流一夕冰合如浮梁遂䧟靈昌郡禄山步騎散漫人莫知其數所過殘滅張介然至陳留纔數日祿山至授兵乗城衆忷懼不能守庚寅太守郭納以城降禄山入北郭聞安慶宗死慟哭曰我何罪而殺我子時陳留将士降者夾道近萬人禄山皆殺之以快其忿斬張介然於軍門以其將李庭望為節度使守陳留壬辰上下制欲親征其朔方河西隴右兵留守城堡之外皆赴行營令節度使自将之期二十日畢集初平原太守顔真卿知禄山且反因霖雨完城浚壕料丁壯實倉廩祿山以其書生易之及禄山反牒真卿以平原博平兵七千人防河津真卿遣平原司兵李平間道奏之上始聞禄山反河北郡縣皆風靡歎曰二十四郡曾無一人義士邪及平至大喜曰朕不識顔真卿作何狀乃能如是真卿遣親客密懷購賊牒詣諸郡由是諸郡多應者真卿杲卿之從弟也安禄山引兵向滎陽太守崔無詖拒之士卒乗城者聞鼓角聲自墜如雨癸巳祿山陷滎陽殺無詖以其將武令珣守之祿山聲勢益張以其將田承嗣安忠志張孝忠為前鋒封常清所募兵皆白徒未更訓練屯武牢以拒賊賊以鐵騎蹂之官軍大敗常清收餘衆戰於葵園又敗戰上東門内又敗丁酉祿山䧟東京賊鼔譟自四門入縱兵殺掠常清戰於都亭驛又敗退守宣仁門又敗乃自苑西壊牆西走河南尹達奚珣降於禄山留守李憕謂御史中丞盧奕曰吾曹荷國重任雖知力不敵必死之奕許諾憕収殘兵數百欲戰皆弃憕潰去憕獨坐府中弈先遣妻子懷印間道走長安朝服坐臺中左右皆散禄山屯於閑廐使人執憕奕及采訪判官蔣清皆殺之奕罵禄山數其罪顧賊黨曰凡為人當知逆順我死不失節夫復何恨憕文水人弈懷慎之子清欽緒之子也禄山以其黨張萬頃為河南尹封常清帥餘衆至陜陜郡太守竇廷芝巳奔河東吏民皆散常清謂高仙芝曰常清連日血戰賊鋒不可當且潼闗無兵若賊豕突入闗則長安危矣陜不可守不如引兵先據潼闗以拒之仙芝乃帥見兵西趣潼闗賊尋至官軍狼狽走無復部伍士馬相騰踐死者甚衆至潼闗修完守備賊至不得入而去祿山使其將崔乾祐屯陜臨汝􅀪農濟陰濮陽雲中郡皆降於祿山是時朝廷徴兵諸道皆未至闗中忷懼㑹祿山方謀稱帝留東京不進故朝廷得為之備兵亦稍集祿山以張通儒之弟通晤為睢陽太守與陳留長史楊朝宗将胡騎千餘東略地郡縣官多望風降走惟東平太守嗣吳王祗濟南太守李隨起兵拒之祗禕之弟也郡縣之不從賊者皆倚吳王為名單父尉賈賁帥吏民南擊睢陽斬張通晤李庭望引兵欲東徇地聞之不敢進而還庚子以永王璘為山南節度使江陵長史源洧為之副潁王璬為劒南節度使蜀郡長史崔圓為之副二王皆不出閤洧光裕之子也上議親征辛丑制太子監國謂宰相曰朕在位垂五十載倦于憂勤去秋已欲傳位太子值水旱相仍不欲以餘災遺子孫淹留俟稍豐不意逆胡横􅀤朕當親征且使之監國事平之日朕將高枕無為矣楊國忠大懼退謂韓虢秦三夫人曰太子素惡吾家專横乆矣若一旦得天下吾與姊妹併命在旦暮矣相與聚哭使三夫人説貴妃衘土請命於上事遂寢顔真卿召募勇士旬日至萬餘人諭以舉兵討安禄山繼以涕泣士皆感憤祿山使其黨叚子光齎李憕盧弈蔣清首徇河北諸郡至平原壬寅眞卿執子光腰斬以徇取三人首續以蒲身棺斂葬之祭哭受弔祿山以海運使劉道􅀇攝景城太守清池尉賈載鹽山尉河内穆寜共斬道􅀇得其甲仗五十餘船攜道􅀇首謁長史李暐暐收嚴莊宗族悉誅之是日送道􅀇首至平原眞卿召載寜及清河尉張澹詣平原計事饒陽太守盧全誠據城不受代河間司法李奐殺禄山所署長史王懷忠李隨遣遊弈將訾嗣賢濟河殺祿山所署博平太守馬冀各有衆數千或萬人共推眞卿為盟主軍事皆禀焉禄山使張獻誠將上谷博陵常山趙郡文安五郡團結兵萬人圍饒陽高仙芝之東征也監軍邊令誠數以事干之仙芝多不従令誠入奏事具言仙芝常清撓敗之狀且云常清以賊揺衆而仙芝棄陜地數百里又盜減軍士糧賜上大怒癸卯遣令誠齎敕即軍中斬仙芝及常清初常清既敗三遣使奉表陳賊形勢上皆不之見常清乃自馳詣闕至渭南敕削其官爵令還仙芝軍白衣自效常清草遺表曰臣死之後望陛下不輕此賊無忘臣言時朝議皆以為祿山狂悖不日受首故常清云然令誠至潼闗先引常清宣敕示之常清以表附令誠上之常清既死陳尸蘧蒢仙芝還至聽事令誠索陌刀手百餘人自隨乃謂仙芝曰大夫亦有恩命仙芝遽下令誠宣敕仙芝曰我遇敵而退死則宜矣今上戴天下履地謂我盜減糧賜則誣也時士卒在前皆大呼稱枉其聲振地遂斬之以將軍李承光攝領其衆河西隴右節度使哥舒翰病廢在家上藉其威名且素與禄山不協召見拜兵馬副元帥將兵八萬以討祿山仍敕天下四面進兵㑹攻洛陽翰以病固辭上不許以田良丘為御史中丞充行軍司馬起居郎蕭昕為判官蕃將火㧞歸仁等各將部落以從并仙芝舊卒號二十萬軍于潼闗翰病不能治事悉以軍政委田良丘良丘復不敢專決使王思禮主騎李承光主步二人爭長無所統壹翰用法嚴而不恤士卒皆懈弛無鬬志安禄山大同軍使高秀巖寇振武軍朔方節度使郭子儀擊敗之子儀乗勝拔靜邉軍大同兵馬使薛忠義寇靜邊軍子儀使左兵馬使李光弼右兵馬使高濬左武鋒使僕固懷恩右武鋒使渾釋之等逆擊大破之阬其騎七千進圍雲中使别將公孫瓊巖將二千騎擊馬邑㧞之開東陘闗甲辰加子儀御史大夫懷恩哥濫拔之之曾孫也世為金微都督釋之渾部酋長世為臯蘭都督顔杲卿將起兵參軍馮䖍前真定令賈深藁城尉崔安石郡人翟萬德内丘丞張通幽等皆預其謀又遣人語太原尹王承業密與相應㑹顔真卿自平原遣杲卿甥盧逖濳告杲卿欲連兵斷禄山歸路以緩其西入之謀時祿山遣其金吾将軍高邈詣幽州徴兵未還杲卿以禄山命召李欽湊使帥衆詣郡受犒賚丙午薄暮欽湊至杲卿使袁履謙馮䖍等攜酒食妓樂往勞之并其黨皆大醉乃斷欽湊首收其甲兵盡縳其黨明日斬之悉散井陘之衆有頃高邈自幽州還且至藁城杲卿使馮䖍往擒之南境又白何千年自東京來崔安石與翟萬德馳詣醴泉驛迎千年又擒之同日致於郡下千年謂杲卿曰今太守欲輸力王室既善其始當慎其終此郡應募烏合難以臨敵宜深溝高壘勿與爭鋒俟朔方軍至併力齊進傳檄趙魏斷燕薊要膂彼則成擒矣今且宜聲云李光弼引步騎一萬出井陘因使人說張獻誠云足下所將多團練之人無堅甲利兵難以當山西勁兵獻誠必觧圍遁去此亦一竒也杲卿悅用其䇿獻誠果遁去其團練兵皆潰杲卿乃使人入饒陽城慰勞將士命崔安石等徇諸郡云大軍巳下井陘朝夕當至先平河北諸郡先下者賞後至者誅於是河北諸郡響應凡十七郡皆歸朝廷兵合二十餘萬其附禄山者唯范陽盧龍密雲漁陽汲鄴六郡而巳杲卿又密使人入漁陽招賈循郟城人馬燧說循曰禄山負恩悖逆雖得洛陽終歸夷滅公若誅諸將之不從命者以范陽歸國傾其根柢此不丗之功也循然之猶豫不時􅀤别將牛潤容知之以告禄山禄山使其黨韓朝陽召循朝陽至漁陽引循屛語使壯士縊殺之滅其族以别將牛延玠知范陽軍事史思明李立節将蕃漢步騎萬人擊博陵常山馬燧亡入西山隱者徐遇匿之得免初禄山欲自將攻潼闗至新安聞河北有變而還蔡希德將兵萬人自河内北擊常山戊申榮王琬薨贈謚靖恭太子是嵗吐蕃賛普乞梨蘇籠獵賛卒子娑悉籠獵賛立肅宗文明武德大聖大宣孝皇帝上之上至德元載春正月乙卯朔祿山自稱大燕皇帝改元聖武以達奚珣為侍中張通儒為中書令高尚嚴莊為中書侍郎李隨至睢陽有衆數萬丙辰以隨為河南節度使以前高要尉許遠為睢陽太守兼防禦使濮陽客尚衡起兵討祿山以郡人王栖曜為衙前揔管攻拔濟陰殺祿山將邢超然顔杲卿使其子泉明賈深翟萬德獻李欽湊首及何千年高邈于京師張通幽泣請曰通幽兄陷賊乞與泉明偕行以救宗族杲卿哀而許之至太原通幽欲自託於王承業乃教之留泉明等更其表多自為功毁短杲卿别遣使獻之杲卿起兵纔八日守備未完史思明蔡希德引兵皆至城下杲卿告急於承業承業既竊其功利於城陷遂擁兵不救杲卿晝夜拒戰糧盡矢竭壬戌城陷賊縱兵殺萬餘人執杲卿及袁履謙等送洛陽王承業使者至京師􅀇宗大喜拜承業羽林大將軍麾下受官爵者以百數徴顔杲卿為衛尉卿朝命未至常山已陷杲卿至洛陽祿山數之曰汝自范陽戸曹我奏汝為判官不數年超至太守何負於汝而反邪杲卿瞋目罵曰汝本營州牧羊羯奴天子擢汝為三道節度使恩幸無比何負於汝而反我世為唐臣祿位皆唐有雖為汝所奏豈從汝反邪我為國討賊恨不斬汝何謂反也臊羯狗何不速殺我祿山大怒并袁履謙等縳於中橋之柱而冎之杲卿履謙比死罵不虛口顔氏一門死於刀鋸者三十餘人史思明李立節蔡希德既克常山引兵撃諸郡之不從者所過殘滅於是鄴廣平鉅鹿趙上谷博陵文安魏信都等郡復為賊守饒陽太守盧全誠獨不從思明等圍之河間司法李奐將七千人景城長史李暐遣其子祀將八千人救之皆為思明所敗上命郭子儀罷圍雲中還朔方益􅀤兵進取東京選良將一人分兵先出井陘定河北子儀薦李光弼癸亥以光弼為河東節度使分朔方兵萬人與之甲子加哥舒翰左僕射同平章事餘如故置南陽節度使以南陽太守魯炅為之將嶺南黔中襄陽子弟五萬人屯葉北以備安祿山炅表薛愿為潁川太守兼防禦使龎堅為副使愿故太子瑛之妃兄堅玉之玄孫也乙丑安祿山遣其子慶緒寇潼闗哥舒翰擊却之己巳加顔眞卿戸部侍郎兼本郡防禦使眞卿以李暐為副二月丙戌加李光弼魏郡太守河北道采訪使史思明等圍饒陽二十九日不下李光弼将蕃漢步騎萬餘人太原弩手三千人出井陘己亥至常山常山團練兵三千人殺胡兵執安思義出降光弼謂思義曰汝自知當死否思義不應光弼曰汝久更陳行視吾此衆可敵思明否今為我計當如何汝䇿可取當不殺汝思義曰大夫士馬遠來疲􅁦猝遇大敵恐未易當不如移軍入城早為備禦先料勝負然後出兵胡騎雖銳不能持重茍不獲利氣沮心離於時乃可圖矣思明今在饒陽此去不二百里昨暮羽書已去計其先鋒來晨必至而大軍繼之不可不留意也光弼悦釋其縳即移軍入城史思明聞常山不守立解饒陽之圍明日未旦先鋒已至思明等繼之合二萬餘騎直抵城下光弼遣步卒五千自東門出戰賊守門不退光弼命五百弩於城上齊􅀤射之賊稍却乃出弩手千人分為四隊使其矢􅀤􅀤相繼賊不能當斂軍道北光弼出兵五千為槍城於道南夾呼沱水而陳賊數以騎兵摶戰光弼之兵射之人馬中矢者大半乃退小憇以俟步兵有村民告賊步兵五千自饒陽來晝夜行百七十里至九門南逢壁度憇息光弼遣步騎各二千匿旗鼔並水濳行至逄壁賊方飯縱兵掩擊殺之無遺思明聞之失勢退入九門時常山九縣七附官軍惟九門藁城為賊所據光弼遣禆將張奉璋以兵五百戍石邑餘皆三百人戍之上以吳王祗為靈昌太守河南都知兵馬使賈賁前至雍丘有衆二千先是譙郡太守楊萬石以郡降安祿山逼真源令河東張巡使為長史西迎賊巡至真源帥吏民哭於􅀇元皇帝廟起兵討賊吏民樂從者數千人巡選精兵千人西至雍丘與賈賁合初雍丘令令狐潮以縣降賊賊以為將使東擊淮陽救兵于襄邑破之俘百餘人拘於雍丘将殺之往見李庭望淮陽兵遂殺守者潮棄妻子走故賈賁得以其間入雍丘庚子潮引賊精兵攻雍丘賁出戰敗死張巡力戰却賊因兼領賁衆自稱吳王先鋒使三月乙卯潮復與賊将李懷仙楊朝宗謝元同等四萬餘衆奄至城下衆懼莫有固志巡曰賊兵精銳有輕我心今出其不意擊之彼必驚潰賊勢小折然後城可守也乃使千人乗城自帥千人分數隊開門突出巡身先士卒直衝賊陳人馬辟易賊遂退明日復進攻城設百礟環城樓堞皆盡巡於城上立木柵以拒之賊蟻附而登巡束蒿灌脂焚而投之賊不得上時伺賊隙出兵擊之或夜縋斫營積六十餘日大小三百餘戰帶甲而食裹瘡復戰賊遂敗走巡乗勝追之獲胡兵二千人而還軍聲大振􅀄戸部尚書安思順知禄山反謀因入朝奏之及禄山反上以思順先奏不之罪也哥舒翰素與之有隙使人詐為禄山遺思順書於闗門擒之以獻且數思順七罪請誅之丙辰思順及弟太僕卿元貞皆坐死家屬徙嶺外楊國忠不能救由是始畏翰郭子儀至朔方益選精兵戊午進軍于代戊辰吳王祗擊謝元同走之拜陳留太守河南節度使壬午以河東節度使李光弼為范陽長史河北節度使加顔真卿河北采訪使真卿以張澹為支使先是清河客李萼年二十餘為郡人乞師於真卿曰公首唱大義河北諸郡恃公以為長城今清河公之西鄰國家平日聚江淮河南錢帛於彼以贍北軍謂之天下北庫今有布三百餘萬匹帛八十餘萬匹錢三十餘萬緡糧三十餘萬斛昔討黙啜甲兵皆貯清河庫今有五十餘萬事戸七萬口十餘萬竊計財足以三平原之富兵足以倍平原之彊公誠資以士卒撫而有之以二郡為腹心則餘郡如四支無不隨所使矣真卿曰平原兵新集尚未訓練自保恐不足何暇及鄰雖然借若諾子之請則将何為乎蕚曰清河遣僕銜命於公者非力不足而借公之師以嘗寇也亦欲觀大賢之明義耳今仰瞻高意未有決辭定色僕何敢遽言所為哉真卿奇之欲與之兵衆以為蕚年少輕慮徒分兵力必無所成真卿不得已辭之蕚就館復為書說真卿以為清河去逆効順奉粟帛器械以資軍公乃不納而疑之僕囘轅之後清河不能孤立必有所繋託將為公西面之彊敵公能無悔乎真卿大驚遽詣其舘以兵六千借之送至境執手别真卿問曰兵已行矣可以言子之所為乎蕚曰聞朝廷遣程千里將精兵十萬出崞口討賊賊據險拒之不得前今當引兵先擊魏郡執祿山所署太守袁知泰納舊太守司馬垂使為西南主人分兵開崞口出千里之師因討汲鄴以北至于幽陵郡縣之未下者平原清河帥諸同盟合兵十萬南臨孟津分兵循河據守要害制其北走之路計官軍東討者不下二十萬河南義兵西向者亦不減十萬公但當表朝廷堅壁勿戰不過月餘賊必有内潰相圖之變矣真卿曰善命錄事參軍李擇交及平原令范冬馥將其兵㑹清河兵四千及博平兵千人軍于堂邑西南袁知泰遣其將白嗣恭等將二萬餘人來逆戰三郡兵力戰盡日魏兵大敗斬首萬餘級捕虜千餘人得馬千匹軍資甚衆知泰奔汲郡遂克魏郡軍聲大振時北海太守賀蘭進明亦起兵真卿以書召之并力進明将步騎五千度河真卿陳兵逆之相揖哭於馬上哀動行伍進明屯平原城南休養士馬真卿每事咨之由是軍權稍移於進明矣真卿不以為嫌真卿以堂邑之功讓進明進明奏其狀取捨任意敕加進明河北招討使擇交冬馥微進資級清河博平有功者皆不錄進明攻信都郡久之不克錄事參軍長安第五琦勸進明厚以金帛募勇士遂克之李光弼與史思明相守四十餘日思明絶常山糧道城中乏草馬食薦藉光弼以車五百乗之石邑取草將車者皆衣甲弩手千人衛之為方陳而行賊不能奪蔡希德引兵攻石邑張奉璋拒却之光弼遣使告急於郭子儀子儀引兵自井陘出夏四月壬辰至常山與光弼合蕃漢步騎共十餘萬甲午子儀光弼與史思明等戰於九門城南思明大敗中郎將渾瑊射李立節殺之瑊釋之之子也思明收餘衆奔趙郡蔡希德奔鉅鹿思明自趙郡如博陵時博陵已降官軍思明盡殺郡官河朔之民苦賊殘暴所在屯結多至二萬人少者萬人各為營以拒賊及郭李軍至爭出自效庚子攻趙郡一日城降士卒多虜掠光弼坐城門收所獲悉歸之民大悦子儀生擒四千人皆捨之斬祿山太守郭獻璆光弼進圍博陵十日不拔引兵還恒陽就食楊國忠問士之可為將者於左拾遺博平張鎬及蕭昕鎬昕薦左賛善大夫永夀來瑱丙午以瑱為潁川太守賊屢攻之瑱前後破賊甚衆加本郡防禦使人謂之來嚼鐵安祿山使平盧節度使吕知誨誘安東副大都䕶馬靈詧殺之平盧遊奕使武陟劉客奴先鋒使董秦及安東將王􅀇志同謀討誅知誨遣使踰海與顔真卿相聞請取范陽以自效真卿遣判官賈載齎糧及戰士衣助之真卿時惟一子頗纔十餘歲使詣客奴為質朝廷聞之以客奴為平盧節度使賜名王臣􅀇志為安東副大都䕶董秦為平盧兵馬使南陽節度使魯炅立柵於滍水之南安禄山將武令珣畢思琛攻之資治通鑑卷第二百一十七
