front:
  text: 資治通鑑卷第二百四十九
  hash: sha256:22df5f1c4a3005a295b5e089de45401e7af35b73bc6e7097e0eeccbd01dbec8c
body:
  text: 臣司馬光奉勑編集唐紀六十五維單閼几十年起上章敦牂盡屠宣宗元聖至明成武獻文睿智章仁神聦懿道大孝皇帝下大中四年春正月庚辰朔赦天下二月以秦州􅀠鳯翔夏四月庚戌以中書侍郎同平章事馬植為天平節度使上之立也左軍中尉馬元贄有力焉由是恩遇冠諸宦者植與之敘宗姓上賜元贄寳帶元贄以遺植植服之以朝上見而識之植變色不敢隠明日罷相收植親吏董侔下御史臺鞫之盡得植與元贄交通之狀再貶常州刺史六月戊申兵部侍郎同平章事魏扶薨以户部尚書判度支崔龜從同平章事秋八月以白敏中判延資庫盧龍節度使周綝薨軍中表請以押牙兼馬步都知兵馬使張允伸爲留後九月丁酉從之党項爲邊患􅀤諸道兵討之連年無功戍饋不已右補闕孔温裕上疏切諫上怒貶栁州司馬温裕戣之子也吐蕃論恐熱遣僧莽羅藺真將兵於雞項闗南造橋以擊尚婢婢軍於白土嶺婢婢遣其將尚鐸羅榻藏將兵據臨蕃軍以拒之不利復遣磨離羆子燭盧鞏力將兵據􅈊牛峽以禦之鞏力請按兵拒險勿與戰以竒兵絶其糧道使進不得戰退不得還不過旬月其衆必潰羆子不從鞏力曰吾寧為不用之人不為敗軍之將稱疾歸鄯州羆子逆戰敗死婢婢糧乏留拓䟦懷光守鄯州帥部落三千餘人就水草於甘州西恐熱聞婢婢弃鄯州自將輕騎五千追之至􅀲州聞懷光守鄯州遂大掠河西鄯廓等八州殺其丁壯劓刖其羸老及婦人以槊貫嬰兒為戲焚其室廬五千里間赤地殆盡冬十月辛未以翰林學士承㫖兵部侍郎令狐綯同平章事十一月壬寅以翰林學士劉瑑為京西招討党項行營宣慰使以盧龍留後張允伸為節度使十二月以鳯翔節度使李業河東節度使李拭並兼招討党項使吏部侍郎孔温業白執政求外官白敏中謂同列曰我輩須自㸃檢孔吏部不肯居朝廷矣温業戣之弟子也五年春正月壬戌天徳軍奏攝沙州刺史張義潮遣使來降義潮沙州人也時吐蕃大亂義潮隂結豪傑謀自拔歸唐一旦帥衆被甲譟於州門唐人皆應之吐蕃守將驚走義潮遂攝州事奉表來降以義潮為沙州防禦使以兵部侍郎裴休為鹽鐵轉運使休肅之子也自大和以來嵗運江淮米不過四十萬斛吏卒侵盜沈舟達渭倉者什不三四大墮劉晏之法休窮究其弊立漕法十條嵗運米至渭倉者百二十萬斛上頗知党項之反由邊帥利其羊馬數欺奪之或妄誅殺党項不勝憤怨故反乃以右諌議大夫李福為夏綏節度使自是継選儒臣以代邊帥之貪暴者行日復面加戒勵党項由是遂安福石之弟也上以南山平夏党項乆未平頗厭用兵崔􅉗建議宜遣大臣鎮撫三月以白敏中為司空同平章充招討党項行營都統制置等使南北兩路供軍使兼邠寧節度使敏中請用裴度故事擇廷臣為將佐許之夏四月以左諫議大夫孫景商為左庶子充邠寧行軍司馬知制誥蔣伸為右庶子充節度副使伸係之弟也初上令白敏中為萬夀公主選佳壻敏中薦鄭顥時顥已昏盧氏行至鄭州堂帖追還顥甚銜之由是數毁敏中於上敏中將赴鎮言於上曰鄭顥不樂尚主怨臣入骨髓臣在政府無如臣何今臣出外顥必中傷臣死無日矣上曰朕知之乆矣卿何言之晩邪命左右於禁中取小檉函以授敏中曰此皆鄭郎譖卿之書也朕若信之豈任卿以至今日敏中歸置檉函於佛前焚香事之敏中軍於寧州壬子定逺城使史元破党項九千餘帳於三交谷敏中奏党項平辛未詔平夏党項已就安帖南山党項聞出山者廹於飢寒猶行鈔掠平夏不容窮無所歸宜委李福存諭於銀夏境内授以閑田如能革心向化則撫如赤子從前為惡一切不問或有抑屈聽於本鎮投牒自訴若再犯疆埸或復入山林不受教令則誅討無赦將吏有功者甄奬死傷者優恤靈夏邠鄜四道百姓給復三年鄰道量免租稅曏由邊將貪鄙置其怨叛自今當更擇㢘良撫之若復致侵叛當先罪邊將後討冦虜吐蕃論恐熱殘虐所部多叛拓跋懷光使人說誘之其衆或散歸部落或降於懷光恐熱勢孤乃􅀭言於衆曰吾今入朝於唐借兵五十萬來誅不服者然後以渭州為國城請唐冊我為賛普誰敢不從五月恐熱入朝上遣左丞李景讓就禮賔院問所欲恐熱氣色驕倨語言荒誕求為河渭節度使上不許召對三殿如常日胡客勞賜遣還恐熱怏怏而去復歸落門川聚其舊衆欲為邊患㑹乆雨乏食衆稍散纔有三百餘人奔于廓州六月立皇子潤為鄂王進士孫樵上言百姓男耕女織不自温飽而羣僧安坐華屋美衣精饌率以十户不能養一僧武宗憤其然髮十七萬僧是天下百七十萬户始得蘇息也陛下即位以來修復廢寺天下斧斤之聲至今不絶度僧幾復其舊矣陛下縱不能如武宗除積弊奈何興之於已廢乎日者陛下欲修國東門諌官上言遽為罷役今所復之寺豈若東門之急乎所役之功豈若東門之勞乎願早降明詔僧未復者勿復寺未修者勿修庶幾百姓猶得以息肩也秋七月中書門下奏陛下崇奉釋氏羣下莫不奔走恐財力有所不逮因之生事擾人望委所在長吏量加撙節所度僧亦委選擇有行業者若容凶麤之人則更非敬道也鄉村佛舎請罷兵日修從之八月白敏中奏南山党項亦請降時用兵嵗乆國用頗乏詔并赦南山党項使之安業冬十月乙夘中書門下奏今邊事已息而州府諸寺尚未畢功望且令成之其大縣逺於州府者聽置一寺其鄉村毋得更置佛舎從之戊辰以户部侍郎魏謩同平章事仍判户部時上春秋已髙未立太子羣臣莫敢言謩入謝因言今海内無事惟未建儲副使正人輔導臣竊以為憂且泣時人重之蓬果羣盜依阻雞山冦掠三川以果州刺史王贄􅀪充三川行營都知兵馬使以討之制以党項既平罷白敏中都統但以司空平章事充邠寧節度使張義潮􅀤兵畧定其旁􅀲伊西甘肅蘭鄯河岷廓十州遣其兄義澤奉十一州圖籍入見於是河湟之地盡入于唐十一月置歸義軍於沙州以義潮為節度使十一州觀察使又以義潮判官曹義金為歸義軍長史以中書侍郎同平章事崔龜從同平章事充宣武節度使右羽林統軍張直方坐出獵累日不還宿衛貶左驍衛將軍六年春二月王贄􅀪討雞山賊平之是時山南西道節度使封敖奏巴南妖賊言辭悖慢上怒甚崔􅉗曰此皆陛下赤子廹於饑寒盜弄陛下兵於谿谷閒不足辱大軍但遣一使者可平矣乃遣京兆少尹劉潼詣果州招諭之潼上言請不􅀤兵攻討且曰今以日月之明燭愚迷之衆使之稽顙歸命其勢甚易所慮者武臣恥不戰之功議者責欲速之效耳潼至山中盜彎弓待之潼屏左右直前曰我面受詔赦汝罪使汝復為平人聞汝木弓射二百步今我去汝十步汝真欲反者可射我賊皆投弓列拜請降潼歸館而王贄􅀪與中使似先義逸引兵已至山下竟擊滅之三月敇先賜右衛大將軍鄭光鄠縣及雲陽莊並免稅役中書門下奏以為稅役之法天下皆同陛下屢􅀤徳音欲使中外畫一今獨免鄭光似稍乖前意事雖至細繫體則多敕曰朕以鄭光元舅之尊貴欲優異令免征稅初不細思况親戚之間人所難議卿等茍非愛我豈進嘉言庶事能盡如斯天下何憂不理有始有卒當共守之並依所奏夏四月甲辰以邠寧節度使白敏中為西川節度使湖南奏團練副使馮少端討衡州賊帥鄧裴平党項復擾邊上欲擇可為邠寧帥者而難其人從容與翰林學士中書舎人須昌景諴論邊事諴援古據今具陳方畧上恱曰吾方擇帥不意頗牧近在禁廷卿其為朕行乎諴欣然奉命上欲重其資履六月壬申先以諴為刑部侍郎癸酉乃除邠寧節度使雍王渼薨追諡靖懷太子河東節度使李業縱吏民侵掠雜虜又妄殺降者由是北邊擾動閏月庚子以太子少師盧鈞為河東節度使業内有所恃人莫敢言魏謩獨請貶黜上不許但徙義成節度使盧鈞奏度支郎中韋宙為副使宙徧詣塞下悉召酋長諭以禍福禁唐民毋得入虜境侵掠犯者必死雜虜由是遂安掌書記李璋杖一牙職明日牙將百餘人訴於鈞鈞杖其為首者謫戍外鎮餘皆罰之曰邊鎮百餘人無故横訴不可不抑璋絳之子也八月甲子以禮部尚書裴休同平章事獠冦昌資二州冬十月邠寧節度使畢諴奏招諭党項皆降驍衛將軍張直方坐以小過屢殺奴婢貶恩州司户十一月立憲宗子惴為棣王十二月中書門下奏度僧不精則戒法墮壞造寺無節則損費過多請自今諸州凖元敕許置寺外有勝地靈迹許修復繁㑹之縣許置一院嚴禁私度僧尼若官度僧尼有闕則擇人補之仍申祠部給牒其欲逺遊尋師者須有本州公驗從之七年春正月戊申上祀圎丘赦天下夏四月丙寅敕自今法司處罪用常行杖杖脊一折法杖十杖臋一折笞五使吏用法有常凖冬十二月左補闕趙璘請罷來年元㑹止御宣政上以問宰相對曰元㑹大禮不可罷况天下無事上曰近華州奏有賊光火劫下邽闗中少雪皆朕之憂何謂無事雖宣政亦不可御也上事鄭太后甚謹不居别宫朝夕奉養舅鄭光歴平盧河中節度使入朝上與之論為政光應對鄙淺上不恱留為右羽林統軍使奉朝太后數言其貧上輒厚賜金帛終不復任以民官度支奏自河湟平毎嵗天下所納錢九百二十五萬餘緡内五百五十萬餘緡租稅八十二萬餘緡􅅦酤二百七十八萬餘緡鹽利八年春正月丙戌朔日有食之罷元㑹上自即位以來治弑憲宗之黨宦官外戚乃至東宫官屬誅竄甚衆慮人情不安丙申詔長慶之初亂臣賊子頃搜擿餘黨流竄已盡其餘族從疎逺者一切不問二月中書門下奏拾遺補闕缺貟請更増補上曰諫官要在舉職不必人多如張道符牛叢趙璘輩數人使朕日聞所不聞足矣叢僧孺之子也乆之叢自司勲貟外郎出為睦州刺史入謝上賜之紫叢既謝前言曰臣所服緋刺史所借也上遽曰且賜緋上重惜服章有司常具緋紫衣數襲從行以備賞賜或半嵗不用其一故當時以緋紫為榮上重翰林學士至於遷官必校嵗月以為不可以官爵私近臣也秋九月丙戌以右散騎常侍髙少逸為陜虢觀察使有敕使過硤石怒餅黒鞭驛吏見血少逸封其餅以進敕使還上責之曰深山中如此食豈易得讁配恭陵立皇子洽為懷王汭為昭王汶為康王上獵於苑北遇樵夫問其縣曰涇陽人也令為誰曰李行言為政何如曰性執有强盜數人軍家索之竟不與盡殺之上歸帖其名於寢殿之柱冬十月行言除海州刺史入謝上賜之金紫問曰卿知所以衣紫乎對曰不知上命取殿柱之帖示之上以甘露之變惟李訓鄭注當死自餘王涯賈餗等無罪詔皆雪其寃上召翰林學士韋澳託以論詩屏左右與之語曰近日外間謂内侍權勢何如對曰陛下威斷非前朝之比上閉目揺首曰全未全未尚畏之在卿謂䇿將安出對曰若與外廷議之恐有大和之變不若就其中擇有才識者與之謀上曰此乃末䇿朕已試之矣自衣黄衣緑至衣緋皆感恩纔衣紫則相與為一矣上又甞與令狐綯謀盡誅宦官綯恐濫及無辜密奏曰但有罪勿捨有闕勿補自然漸耗至於盡矣宦者竊見其奏由是益與朝士相惡南北司如水火矣九年春正月甲申成徳軍奏節度使王元逵薨軍中立其子節度副使紹鼎癸夘以紹鼎為成徳留後二月以醴泉令李君奭為懷州刺史初上校獵渭上有父老以十數聚於佛祠上問之對曰醴泉百姓也縣令李君奭有異政考滿當罷詣府乞留故此祈佛兾諧所願耳及懷州刺史闕上手筆除君奭宰相莫之測君奭入謝上以此奬厲衆始知之三月詔邠寧節度使畢諴還邠州先是以河湟初附党項未平移邠寧軍於寧州至是南山平夏党項皆安威鹽武三州軍食足故令還理理所夏閏四月詔以州縣差役不均自今每縣據人貧富及役輕重作差科簿送刺史檢署訖鏁於令㕔每有役事委令據簿輪差五月丙寅以王紹鼎為成徳節度使上聰察彊記宫中厮役給灑掃者皆能識其姓名才性所任呼召使令無差誤者天下奏獄吏卒姓名一覽皆記之度支奏漬汚帛誤書漬為清樞密承㫖孫隠中謂上不之見輒足成之及中書覆入上怒推按擅改章奏者罰讁之上密令翰林學士韋澳纂次諸州境土風物及諸利害為一書自寫而上之雖子弟不知也號曰處分語它日鄧州刺史薛􅀪宗入謝出謂澳曰上處分本州事驚人澳詢之皆處分語中事也澳在翰林上或遣中使宣㫖草詔事有不可者澳輒曰兹事須降御礼方敢施行淹留至旦上疏論之上多從之秋七月浙東軍亂逐觀察使李訥訥遜之弟子也性卞急遇將士不以禮故亂作淮南饑民多流亡節度使杜悰荒於遊宴政事不治上聞之甲午以門下侍郎同平章事崔􅉗同平章事充淮南節度使丁酉以悰為太子太傅分司九月乙亥貶李訥為朗州刺史監軍王宗景杖四十配恭陵仍詔自今戎臣失律并坐監軍以禮部侍郎沈詢為浙東觀察使詢傳師之子也冬十一月以吏部侍郎栁仲郢為兵部侍郎充鹽鐵轉運使有閭閻醫工劉集因緣交通禁中上敕鹽鐵補􅂣官仲郢上言醫工術精宜補醫官若委務銅鹽何以課其殿最且􅂣官賤品非特敕所宜親臣未敢奉詔上遽批劉集宜賜絹百匹遣之它日見仲郢勞之曰卿論劉集事甚佳上甞苦不能食召醫工梁新診脉治之數日良已新因自陳求官上不許但敕鹽鐵使月給錢三十緍而已右威衛大將軍康季榮前為涇原節度使擅用官錢二萬緍事覺季榮請以家財償之上以季榮有開河湟功許之給事中封還敕書諫官亦上言十二月庚辰貶季榮䕫州長史江西觀察使鄭祇徳以其子顥尚主通顯固求散地甲午以祇徳為賔客分司十年春正月丁巳以御史大夫鄭朗為工部尚書同平章事上命裴休極言時事休請早建太子上曰若建太子則朕遂為閑人休不敢復言二月丙戌休以疾辭位不許三月辛亥詔以回鶻有功於國世為昏姻稱臣奉貢北邊無警㑹昌中虜廷喪亂可汗奔亡屬姧臣當軸遽加殄滅近有降者云已厖歴今為可汗尚寓安西俟其歸復牙帳當加冊命上以京兆乆不理夏五月丁夘以翰林學士工部侍郎韋澳為京兆尹澳為人公直既視事豪貴歛手鄭光莊吏恣横爲閭里患積年租稅不入澳執而械之上於延英問澳澳具奏其狀上曰卿何以處之澳曰欲寘於法上曰鄭光甚愛之何如對曰陛下自内庭用臣為京兆欲以清畿甸之積弊若鄭光莊吏積年為蠧得寛重辟是陛下之法獨行於貧户耳臣未敢奉詔上曰誠如此但鄭光殢我不置卿與痛杖貸其死可乎對曰臣不敢不奉詔願聽臣且繋之俟徴租足乃釋之上曰灼然可朕為鄭光故撓卿法殊以為愧澳歸府即杖之督租數百斛足乃以吏歸光六月戊寅以中書侍郎同平章事裴休同平章事充宣武節度使司農卿韋廑欲求夏州節度使有術士知之詣廑門曰吾善醮星辰求官無不如意廑信之夜設醮具於庭術士曰請公自書官階一通既得之仰天大呼曰韋廑有異志令我祭天廑舉家拜泣曰願山人賜百口之命家之貨財珍玩盡與之邏者怪術士服鮮衣執以為盜術士急乃曰韋廑令我祭天我欲告之彼以家財求我耳事上聞秋九月上召廑面詰之具知其寃謂宰相曰韋廑城南甲族為姦人所誣勿使獄吏辱之立以術士付京兆杖死貶廑永州司馬户部侍郎判户部駙馬都尉鄭顥營求作相甚切其父祇徳聞之與書曰聞汝已判户部是吾必死之年又聞欲求宰相是吾必死之日也顥懼累表辭劇務冬十月乙酉以顥為祕書監上遣使詣安西鎮撫回鶻使者至靈武㑹回鶻可汗遣使入貢十一月辛亥冊拜為嗢祿登里羅日沒密施合俱録毗伽懷建可汗以衛尉少卿王端章充使吏部尚書李景讓上言穆宗乃陛下兄敬宗文宗武宗乃兄之子陛下拜兄尚可拜姪可乎是使陛下不得親事七廟也宜遷四主出太廟還代宗以下入廟詔百官議其事不決而止時人以是薄景讓敕於靈感㑹善二寺置戒壇諸道僧尼應填闕者委長老僧選擇給公憑赴兩壇受戒兩京各選大徳十人主其事有不堪者罷之堪者給牒遣歸本州不見戒壇公牒毋得私容仍先選舊僧尼舊僧尼無堪者乃選外人壬辰以户部侍郎判户部崔慎由為工部尚書同平章事上每命相左右無知者前此一日令樞密宣㫖於學士院以兵部侍郎判度支蕭鄴同平章事樞密使王歸長馬公儒覆奏鄴所判度支應罷否上以為歸長等佑之即手書慎由名及新命付學士院仍云落判户部事鄴明之八世孫也内園使李敬寔遇鄭朗不避馬朗奏之上責敬寔對曰供奉官例不避上曰汝銜敕命横絶可也豈得私出而不避宰相乎命剥色配南牙十一年春正月丙午以御史中丞兼尚書右丞夏侯孜爲户部侍郎判户部事先是判户部有缺京兆尹韋澳奏事上欲以澳補之辭曰臣比年心力衰耗難以處繁劇屢就陛下乞小鎮聖恩未許上不恱及歸其甥柳玭尤之澳曰主上不與宰輔僉議私欲用我人必謂我以它歧得之何以自明且爾知時事浸不佳乎由吾曹貪名位所致耳丙辰以澳爲河陽節度使玭仲郢之子也上欲幸華清宫諫官論之甚切上為之止上樂聞規諌凡諫官論事門下封駮茍合於理多屈意從之得大臣章疏必焚香盥手而讀之二月辛巳以門下侍郎同平章事魏謩同平章事充西川節度使謩為相議事於上前它相或委曲規諷謩獨正言無所避上毎歎曰謩綽有祖風我心重之然竟以剛直為令狐綯所忌而出之嶺南溪洞蠻屢為侵盜夏四月壬申以右千牛大將軍宋涯為安南邕管宣慰使五月乙巳以涯為安南經畧使容州軍亂逐經畧使王球六月癸巳以涯為容管經畧使甲午立皇子灌為衛王澭為廣王秋七月庚子以兵部侍郎判度支蕭鄴同平章事仍判度支教坊祝漢貞滑稽敏給上或指物使之口占摹詠有如宿構由是寵冠諸優一日在上前抵掌詼諧頗及外事上正色謂曰我畜養爾曹正供戲笑耳豈得輒預朝政邪自是疎之㑹其子坐贓杖死流漢貞於天徳軍樂工羅程善琵琶自武宗朝已得幸上素曉音律尤有寵程恃恩暴横以睚眦殺人繫京兆獄諸樂工欲為之請因上幸後苑奏樂乃設虛坐置琵琶而羅拜於庭且泣上問其故對曰羅程負陛下萬死然臣等惜其天下絶藝不復得奉宴遊矣上曰汝曹所惜者羅程藝朕所惜者髙祖太宗法竟杖殺之八月成徳節度使王紹鼎薨紹鼎沈湎無度好登樓彈射人以為樂衆欲逐之㑹病薨軍中立其弟節度副使紹懿戊寅以紹懿為成徳留後九月辛酉以太子太師盧鈞同平章事充山南西道節度使冬十月己巳以秦成防禦使李承勛為涇原節度使承勛光弼之孫也先是吐蕃酋長尚延心以河渭二州部落來降拜武衛將軍承勛利其羊馬之富誘之入鳯林闗居秦州之西承勛與諸將謀執延心誣云謀叛盡掠其財徙其衆於荒逺延心知之因承勛軍宴坐中謂承勛曰河渭二州土曠人稀因以饑疫唐人多内徙三川吐蕃皆逺遁於疊宕之西二千里間寂無人煙延心欲入見天子請盡帥部衆分徙内地為唐百姓使西邊永無􅀭塵之警其功亦不愧於張義潮矣承勛欲自有其功猶豫未許延心復曰延心既入朝部落内徙但惜秦州無所復恃耳承勛與諸將相顧黙然明日諸將言於承勛曰明公首開營田置使府擁萬兵仰給度支將士無戰守之勞有耕市之利若從延心之謀則西陲無事朝廷必罷使府省戍兵還以秦州􅀠鳯翔吾屬無所復望矣承勛以為然即奏延心為河渭都遊弈使使統其衆居之中書侍郎同平章事鄭㓪以疾辭位壬申以㓪為太子太師上晩節頗好神仙遣中使迎道士軒轅集於羅浮山王端章冊立回鶻可汗道為黒車子所塞不至而還辛夘貶端章賀州司馬十一月壬寅以成徳軍留後王紹懿為節度使十二月蕭鄴罷判度支十二年春正月以康王傅分司王式為安南都䕶經畧使式有才畧至交趾樹芀木為柵可支數十年深塹其外泄城中水塹外植竹冦不能冒選教士卒甚銳頃之南蠻大至屯錦田歩去交趾半日程式意思安閑遣譯諭之中其要害蠻一夕引去遣人謝曰我自執叛獠耳非為寇也安南都校羅行恭乆專府政麾下精兵二千都䕶中軍纔羸兵數百式至杖其背黜於邊徼初户部侍郎判度支劉瑑為翰林學士上器重之時為河東節度使手詔徴入朝瑑奏􅀤河東外人始知之戊午以瑑同平章事瑑仁軌之五世孫也瑑與崔慎由議政於上前慎由曰惟當甄别品流上酬萬一瑑曰昔王夷甫祖尚浮華妄分流品致中原丘墟今盛明之朝當循名責實使百官各稱其職而遽以品流為先臣未知致理之日慎由無以對軒轅集至長安上召入禁中問曰長生可學乎對曰王者屏欲而崇徳則自然受大遐福何處更求長生留數月堅求還山乃遣之二月甲子朔罷公卿朝拜光陵及忌日行香悉移宫人於諸陵戊辰以中書侍郎同平章事崔慎由為東川節度使上欲御樓肆赦令狐綯曰御樓所費甚廣事須有名且赦不可數上不恱曰遣朕於何得名慎由曰陛下未建儲宫四海屬望若舉此禮雖郊祀亦可况於御樓時上餌方士藥已覺躁渇而外人未知疑忌方深聞之俛首不復言旬日慎由罷相勃海王彞震卒癸未立其弟䖍晃為勃海王夏四月以右街使駙馬都尉劉異為邠寧節度使異尚安平公主上妹也庚子嶺南都將王令寰作亂囚節度使楊􅀤􅀤蘇州人也戊申以兵部侍郎鹽鐵轉運使夏侯孜同平章事五月丙寅工部尚書同平章事劉瑑薨瑑病篤猶手疏論事上甚惜之以右金吾大將軍李燧為嶺南節度使已命中使賜之節給事中蕭倣封還制書上方奏樂不暇别召中使使優人追之節及燧門而返倣俛之從父弟也辛巳以涇原節度使李承勛為嶺南節度使􅀤鄰道兵討亂者平之是日湖南軍亂都將石載順等逐觀察使韓悰殺都押牙王桂直琮待將士不以禮故及於難六月丙申江西軍亂都將毛鶴逐觀察使鄭憲初安南都䕶李􅃰為政貪暴强市蠻中馬牛一頭止與鹽一斗又殺蠻酋杜存誠羣蠻怨怒導南詔侵盜邊境峯州有林西原舊有防冬兵六千其旁七綰洞蠻其酋長曰李由獨常助中國戍守輸租賦知峯州者言於􅃰請罷戍兵專委由獨防遏於是由獨勢孤不能自立南詔拓東節度使以書誘之以甥妻其子補拓東押牙由獨遂帥其衆臣於南詔自是安南始有蠻患是月蠻冦安南秋七月丙寅宣州都將康全泰作亂逐觀察使鄭薰薰奔楊州丁卯右補闕内供奉張潛上䟽以爲藩府代移之際皆奏倉庫蓄積之數以羨餘多爲課績朝廷亦因而甄奬竊惟藩府財賦所出有常苟非賦斂過差及停廢將士減削衣糧則羨餘何從而致比來南方諸鎮數有不寧皆此故也一朝有變所蓄之財悉遭剽掠又􅀤兵致討費用百倍然則朝廷竟有何利乞自今藩府長吏不増賦斂不減糧賜獨節遊宴省浮費能致羨餘者然後賞之上嘉納之容管奏都虞􅀱來正謀叛經略使宋涯捕斬之􅀄忠武軍精兵皆以黄冒首號黄頭軍李承勛以百人定嶺南宋涯使麾下效其服裝亦定容州安南有惡民屢爲亂聞之驚曰黄頭軍度海來襲我矣相與夜圍交趾城鼓譟願送都䕶北歸我須此城禦黄頭軍王式方食或勸出避之式曰吾足一動則城潰矣徐食畢擐甲率左右登城建大將旗坐而責之亂者反走明日悉捕誅之有杜守澄者自齊梁以來擁衆據溪洞不可制式離閒其親黨守澄走死安南饑亂相継六年無上供軍中無犒賞式始修貢賦饗將士占城真臘皆復通使淮南節度使崔􅉗奏已出兵討宣州賊八月甲午以􅉗兼宣歙觀察使己亥以宋州刺史温璋為宣州團練使璋造之子也河南比淮南大水徐泗水深五丈漂沒數萬家冬十月建州刺史于延陵入辭上曰建州去京師幾何對曰八千里上曰卿到彼為政善惡朕皆知之勿謂其逺此階前則萬里也卿知之乎延陵悸懾失緒上撫而遣之到官竟以不職貶復州司馬令狐綯擬李逺杭州刺史上曰吾聞逺詩云長日惟消一局棊安能理人綯曰詩人託此為髙興耳未必實然上曰且令往試觀之上詔刺史毋得外徙必令至京師面察其能否然後除之令狐綯甞徙其故人為鄰州刺史便道之官上見其謝上表以問綯對曰以其道近省送迎耳上曰朕以刺史多非其人為百姓害故欲一一見之訪問其所施設知其優劣以行黜陟而詔命既行直廢格不用宰相可畏有權時方寒綯汗透重裘上臨朝接對羣臣如賔客雖左右近習未甞見其有惰容每宰相奏事旁無一人立者威嚴不可仰視奏事畢忽怡然曰可以閑語矣因問閭閻細事或談宫中遊宴無所不至一刻許復整容曰卿輩善為之朕常恐卿輩負朕後日不復得再相見乃起入宫令狐綯謂人曰吾十年秉政最承恩遇然每延英奏事未甞不汗霑衣也初山南東道節度使徐商以封疆險闊素多盜賊選精兵數百人别置營訓練號捕盜將及湖南逐帥詔商討之商遣捕盜將二百人討平之崔􅉗奏克宣州斬康全泰及其黨四百餘人上以光祿卿韋宙父丹有惠政於江西以宙為江西觀察使􅀤鄰道兵以討毛鶴崔􅉗以宣州已平辭宣歙觀察使十一月戊寅以温璋為宣歙觀察使兵部侍郎判户部蔣伸從容言於上曰近日官頗易得人思徼幸上警曰如此則亂矣對曰亂則未亂但徼幸者多亂亦非難上稱歎再三伸三起上三留之曰異日不復得獨對卿矣伸不諭十二月甲寅以伸同平章事韋宙奏克洪州斬毛鶴及其黨五百餘人宙過襄州徐商遣都將韓季友帥捕盜將從行宙至江州季友請夜帥其衆自陸道閒行比明至洪州州人不知即日討平之宙奏留捕盜將二百人於江西以季友為都虞􅀱十三年春正月戊午朔赦天下三月割河東雲蔚朔三州􅀠大同軍夏四月辛夘以校書郎于琮為左拾遺内供奉初上欲以悰尚永福公主既而中寢宰相請其故上曰朕近與此女子㑹食對朕輒折匕筯性情如是豈可為士大夫妻乃更命悰尚廣徳公主二公主皆上女琮敖之子也武寧節度使康季榮不䘏士卒士卒譟而逐之上以左金吾大將軍田牟甞鎮徐州有能名復以為武寧節度使一方遂安貶季榮於嶺南六月癸巳封憲宗子惕為彭王初上長子鄆王温無寵居十六宅餘子皆居禁中䕫王滋第三子也上愛之欲以為嗣為其非次故乆不建東宫上餌醫官李􅀇伯道士虞紫芝山人王樂藥疽􅀤於背八月疽甚宰相及朝臣皆不得見上密以䕫王屬樞密使王歸長馬公儒宣徽南院使王居方使立之三人及右軍中尉王茂􅀇皆上平日所厚也獨左軍中尉王宗實素不同心三人相與謀出宗實為淮南監軍宗實已受敕於宣化門外將自銀臺門出左軍副使亓元實謂宗實曰聖人不豫踰月中尉止隔門起居今日除改未可辨也何不見聖人而出宗實感寤復入諸門已踵故事増人守捉矣亓元實翼導宗實直至寢殿上已崩東首環泣矣宗實叱歸長等責以矯詔皆捧足乞命乃遣宣徽北院使齊元簡迎鄆王壬辰下詔立鄆王為皇太子權句當軍國政事仍更名漼收歸長公儒居方皆殺之癸巳宣遺制以令狐綯攝冡宰宣宗性明察沈斷用法無私從諫如流重惜官賞恭謹節儉惠愛民物故大中之政訖於唐亡人思詠之謂之小太宗丙申懿宗即位癸􅆗尊皇太后爲太皇太后以王宗實爲驃􅀐上將軍李玄伯虞紫芝王樂皆伏誅九月追尊上母晁昭容爲元昭皇太后加魏博節度使何弘敬兼中書令幽州節度使張允伸同平章事冬十月辛卯赦天下十一月戊午以門下侍郎同平章事蕭鄴同平章事充荆南節度使十二月甲申以翰林學士承旨兵部侍郎杜審權同平章事審權元頴之弟孫也浙東賊帥裘甫攻陷象山官軍屢敗明州城門晝閉進逼剡縣有衆百人浙東騷動觀察使鄭祇徳遣討擊副使劉勍副將范居植將兵三百合台州軍共討之也司空門下侍郎同平章事令狐綯執政嵗乆忌勝己者中外側目其子滈頗招權受賄宣宗既崩言事者競攻其短丁酉以綯同平章事充河中節度使以前荆南節度使同平章事白敏中守司徒兼門下侍郎同平章事初韋臯在西川開青溪道以通羣蠻使由蜀入貢又選羣蠻子弟聚之成都教以書數欲以慰恱羈縻之業成則去復以它子弟繼之如是五十年羣蠻子弟學於成都者殆以千數軍府頗厭於稟給又蠻使入貢利於賜與所從傔人浸多杜悰為西川節度使奏請節減其數詔從之南詔豐祐怒其賀冬使者留表付嶲州而還又索習學子弟移牒不遜自是入貢不時頗擾邊境㑹宣宗崩遣中使告哀時南詔豐祐適卒子酋龍立怒曰我國亦有喪朝廷不弔祭又詔書乃賜故王遂置使者於外館禮遇甚薄使者還具以狀聞上以酋龍不遣使來告喪又名近􅀇宗諱遂不行冊禮酋龍乃自稱皇帝國號大禮改元建極遣兵陷播州資治通鑑卷第二百四十九
