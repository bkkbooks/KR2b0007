front:
  text: 資治通鑑卷第一百六十四
  hash: sha256:8f1489d300b595619bb3e50bcfef227535299d21d134f4801d96b8243b63f698
body:
  text: 臣司馬光奉勑編集梁紀二十黓涒灘凡二年起重光協洽盡􅀇太宗簡文皇帝下大寶二年春正月新呉余孝頃舉兵拒矦景景遣于慶攻之不克庚戌湘東王繹遣䕶軍將軍尹恱安東將軍杜幼安巴州剌史王珣將兵二萬自江夏􅃐武昌受徐文盛節度楊乾運攻拔劒閣楊法退保石門乾運據南隂平辛亥齊主祀圎丘張彪遣其將趙稜圍錢塘孫鳯圍冨春矦景遣儀同三司田遷趙伯超救之稜鳯敗走稜伯超之兄子也癸亥齊主耕籍田乙丑享太廟魏楊忠圍汝南李素戰死二月乙亥城䧟執邵陵攜王綸殺之投尸江岸岳陽王詧取而葬之或告齊太尉彭樂謀反壬辰樂坐誅齊遣散􅀐常侍曹文皎使于江陵湘東王繹使兼散􅀐常侍王子敏報之矦景以王克爲太師宋子仙爲太保元羅爲太􅀓郭元建爲太尉支化仁爲司徒任約爲司空王偉爲尚書左僕射索超丗爲右僕射景置三公官動以十數儀同尤多以子仙元建化仁爲佐命元功偉超丗爲謀主于子恱彭儁主擊斷陳慶吕季略盧暉略丁和等爲爪牙梁人爲景用者則故將軍趙伯超前制􅈰監周石珍内監嚴亶邵陵王記室伏知命自餘王克元羅及侍中殷不害大常周弘正等景從人望加以尊位非腹心之任也北兖州刺史蕭邕謀降魏矦景殺之楊乾運進據平興平興者楊法琛所治也法琛退保魚石洞乾運焚平興而歸李遷仕收衆還擊南康陳霸先遣其將杜僧明等拒之生擒遷仕斬之湘東王繹使霸先進兵取江州以爲江州刺史三月丙午齊襄城王淯卒庚戌魏文帝殂太子欽立乙卯徐文盛等克武昌進軍蘆洲己未齊以湘東王繹爲梁相國建梁臺揔百揆承制齊司空司馬子如自求封王齊主怒庚申免子如官任約告急矦景自帥衆西上􅂝太子大器從軍以爲質留王偉居守閏月景發建康自石頭至新林舳艫相接約分兵襲破定州刺史田龍祖於齊安壬寅景軍至西陽與徐文盛夾江築壘癸卯文盛擊破之射其右丞庫狄式和墜水死景遁走還營夏四月甲辰魏葬文帝于永陵郢州刺史蕭方諸年十五以行事鮑泉和弱常侮易之或使伏牀􅀐背爲馬恃徐文盛在近不復設備日以蒱酒爲樂矦景聞江夏空虚乙巳使宋子仙任約帥精􅀐四百由淮内襲郢州丙午大風疾雨天色晦􅁳有豋陴望見賊者告泉曰虜􅀐至矣泉曰徐文盛大軍在下賊何因得至當是王珣軍人還耳旣而走告者稍衆始命閉門子仙等巳入城方諸方踞泉腹以五色綵辮其髯見子仙至方諸迎拜泉匿于牀下子仙俯窺見泉素髯閒綵驚􅕎遂擒之及司馬虞豫送於景所景因便風中江舉帆遂越文盛等軍丁未入江夏文盛衆懼而潰與長沙王韶等逃歸江陵王珣杜幼安以家在江夏遂降於景湘東王繹以王僧辯爲大都督帥巴州剌史丹楊淳于量定州剌史杜龕宜州剌史王琳郴州刺史裴之横東擊景徐文盛以下並受節度戊申僧辯等軍至巴陵聞郢州已陷因留戍之繹遺僧辯書曰賊旣乗勝必將西下不勞遠擊但守巴丘以逸待勞無慮不克又謂僚佐曰景若水歩兩道直指江陵此上策也據夏首積兵糧中策也悉力攻巴陵下策也巴陵城小而固僧辯足可委任景攻城不抜野無所掠暑疫時起食盡兵疫破之必矣乃命羅州刺史徐嗣徽自岳陽武州刺史杜崱自武陵引兵㑹僧辯景使丁和將兵五千守夏首宋子仙將兵一萬爲前驅趣巴陵分遣任約直指江陵景帥大兵水步繼進於是縁江戍邏望風請服景拓邏至于隱磯僧辯乗城固守偃旗卧鼔安􅀂無人壬戌景衆濟江遣輕􅀐至城下問城内爲誰荅曰王領軍􅀐曰何不早降僧辯曰大軍但向荆州此城自當非礙􅀐去頃之執王珣等至城下使􅀃其弟琳琳曰兄受命討賊不能死難曽不内慙翻欲賜誘取弓射之珣慙而退景肉薄百道攻城城中鼔譟矢石雨下景士卒死者甚衆乃退僧辯遣輕兵出戰凡十餘返皆捷景􅀍甲在城下督戰僧辯著綬乗輿奏鼔吹廵城景望之服其膽勇岳陽王詧聞矦景克郢州遣蔡大寶將兵一萬進據武寧遣使至江陵詐稱赴援衆議欲荅以矦景已破令其退軍湘東王繹曰今語以退軍是趣之令進也乃使謂大寶曰岳陽累啓連和不相侵犯卿那忽據武寧今當遣天門太守胡僧祐精甲二萬鐵馬五千頓湕水待時進軍詧聞之召其軍還僧祐南陽人也五月魏隴西襄公李虎卒矦景晝夜攻巴陵不克軍中食盡疾疫死傷太半湘東王繹遣晉州剌史蕭惠正將兵援巴陵惠正辭不堪舉胡僧祐自代僧祐時坐謀議忤旨繫獄繹即出之拜武猛將軍令赴援戒之曰賊􅀂水戰但以大艦臨之必克􅀂欲歩戰自可鼔棹直就巴丘不須交鋒也僧祐至湘浦景遣任約帥銳卒五千據白塉以待之僧祐由它路西上約謂其畏已急追之及於芊口呼僧祐曰呉兒何不早降走何所之僧祐不應潛引兵至赤沙亭㑹信州刺史陸法和至與之合軍法和有異術先隱於江陵百里洲衣食居處一如苦行沙門或豫言吉㐫多中人莫能測矦景之圍臺城也或問之曰事將何如法和曰凡人取果宜待熟時不撩自落固問之法和曰亦克亦不克及任約向江陵法和自請擊之繹許之壬寅約至赤亭六月甲辰僧祐法和縱兵擊之約兵大潰殺溺死者甚衆擒約送江陵景聞之乙巳焚營宵遁以丁和爲郢州刺史留宋子仙等衆號二萬戍郢城别將支化仁鎭魯山范希榮行江州事儀同三司任延和􅀳州刺史夏矦威生守􅀳州景與麾下兵數千順流而下丁和以大石磕殺鮑泉及虞預沈於黃鶴磯任約至江陵繹赦之徐文盛坐怨望下獄死巴州刺史余孝頃遣兄子僧重將兵救鄱陽于慶退走繹以王僧辯爲征東將軍尚書令胡僧祐等皆進位號使引兵東下陸法和請還旣至謂繹曰矦景自然平矣蜀賊將至請守險以待之乃引兵屯峽口庚申王僧辯至漢口先攻魯山擒支化仁送江陵辛酉攻郢州克其羅城斬首千級宋子仙退據金城僧辯四面起土山攻之豫州刺史荀朗自巢湖出濡須邀景破其後軍景奔歸船前後相失太子船入樅陽浦船中腹心皆勸太子因此入北太子曰自國家喪敗志不圖生主上􅂪塵寧忍違離左右吾今􅀂去乃是叛父非避賊也因涕泗嗚咽即命前進甲子宋子仙等困蹙乞輸郢城身還就景王僧辯僞許之命給船百艘以安其意子仙謂爲信然浮舟將􅀤僧辯命杜龕帥精勇千人攀堞而上鼔譟奄進水軍主宋遥帥樓船暗江雲合子仙且戰且走至白楊浦大破之周鐵虎生擒子仙及丁和送江陵殺之庚午齊主以司馬子如髙祖之舊復以爲太尉江安矦圎正爲西陽太守寛和好施歸附者衆有兵一萬湘東王繹欲圖之署爲平南將軍及至弗見使南平王恪與之飲醉因囚之内省分其部曲使人告其罪荆益之舋自此起矣陳霸先引兵發南康灨石舊有二十四灘㑹水暴漲數丈三百里閒巨石皆没霸先進頓西昌鐵勒將伐柔然突厥酋長土門邀擊破之盡降其衆五萬餘落土門恃其彊盛求婚於柔然柔然頭兵可汗大怒使人詈辱之曰爾我之鍜奴也何敢發是言土門亦怒殺其使者遂與之絶而求婚於魏魏丞相泰以長樂公主妻之秋七月乙亥湘東王繹以長沙王韶監郢州事丁亥矦景還至建康于慶自鄱陽還豫章矦瑱閉門拒之慶走江州據郭黙城繹以瑱爲兖州刺史景悉殺瑱子弟辛丑王僧辯乗勝下湓城陳霸先帥所部三萬人將㑹之屯于巴丘西軍乏食霸先有糧五十萬石分三十萬以資之八月壬寅朔王僧辯前軍襲于慶慶棄郭黙城走范希榮亦棄尋陽城走􅀳熈王僧振等起兵圍郡城僧辯遣沙州刺史丁道貴助之任延和等棄城走湘東王繹命僧辯且頓尋陽以待諸軍之集􅀄景既克建康常言呉兒怯弱易以掩取當湏拓定中原然後爲帝景尚帝女溧陽公主嬖之妨於政事王偉屢諌景以告主主有惡言偉恐爲所讒因􅀃景除帝及景自巴陵敗歸猛將多死自恐不能乆存欲早登大位王偉曰自古移鼎必湏廢立旣示我威權且絶彼民望景從之使前壽光殿學士謝昊爲詔書以爲弟姪爭立星辰失次皆由朕非正緒召亂致災宜禪位於豫章王棟使呂季略齎入逼帝書之棟歡之子也戊午景遣衛尉卿彭儁等帥兵入殿廢帝爲􅀳安王幽于永福省悉撤内外侍衛使突􅀐左右守之牆垣悉布枳􅁄庚申下詔迎豫章王棟棟時幽拘廩餼甚薄仰􅂼茹爲食方與妃張氏鉏葵法駕奄至棟驚不知所爲泣而升輦景殺哀太子大器尋陽王大心西陽王大鈞建平王大球義安王大昕及王矦在建康者二十餘人太子神明端嶷於景黨未甞屈意所親竊問之太子曰賊􅀂於事義未湏見殺吾雖陵慢呵叱終不敢言􅀂見殺時至雖一日百拜亦無所益又曰殿下今居困阨而神貌怡然不貶平日何也太子曰吾自度死日必在賊前􅀂諸叔能滅賊賊必先見殺然後就死􅀂其不然賊亦殺我以取冨貴安能以必死之命爲無益之愁乎及難太子顔色不變徐曰乆知此事嗟其晩耳刑者將以衣帶絞之太子曰此不能見殺命取繫帳繩絞之而絶壬戌棟即帝位大赦改元天正太尉郭元建聞之自秦郡馳還謂景曰主上先帝太子旣無愆失何得廢之景曰王偉勸吾云早除民望吾故從之以安天下元建曰吾挾天子令諸矦猶懼不濟無故廢之乃所以自危何安之有景欲迎帝復位以棟爲太孫王偉曰廢立大事豈可數改邪乃止乙丑景又使使殺南海王大臨於吴郡南郡王大連於姑孰安陸王大春於㑹稽髙唐王大壯於京口以太子妃賜郭元建元建曰豈有皇太子妃乃爲人妾乎竟不與相見聽使入道丙寅追尊昭明太子爲昭明皇帝豫章安王爲安皇帝金華敬妃爲敬太皇太后豫章太妃王氏爲皇太后妃張氏爲皇后以劉神茂爲司空九月癸巳齊主如趙定二州遂如􅀳陽己亥湘東王繹以尚書令王僧辯爲江州剌史江州剌史陳霸先爲東揚州剌史王偉􅀃矦景弑太宗以絶衆心景從之冬十月壬寅夜偉與左衛將軍彭儁王脩纂進酒於太宗曰丞相以陛下幽憂旣乆使臣等來上壽太宗􅀏曰巳禪帝位何得言陛下此壽酒將不盡此乎於是儁等齎曲項琵琶與太宗極飲太宗知將見殺因盡醉曰不圗爲樂之至於斯也旣醉而寢偉乃出儁進土囊脩纂坐其上而殂偉撤戸扉爲棺遷殯于城北酒庫中太宗自幽縶之後無復侍者及紙乃書壁及板障爲詩及文數百篇辭甚悽愴景謚曰明皇帝廟號髙宗矦景之逼江陵也湘東王繹求援於魏命梁秦二州剌史宜豐矦循以南鄭與魏召循還江陵循以無故輸城非忠臣之節報曰請待改命魏太師泰遣大將軍逹奚武將兵三萬取漢中又遣大將軍王雄出子午谷攻上津循遣記室參軍沛人劉璠求援於武陵王紀紀遣潼州刺史楊乾運救之循恢之子也王僧辯等聞太宗殂丙辰啓湘東王繹請上尊號繹弗許司空東道行臺劉神茂聞矦景自巴丘敗還隂謀叛景呉中士大夫咸勸之乃與儀同三司尹思合劉歸義王曅雲麾將軍元頵等據東陽以應江陵遣頵及别將李占下據建德江口張彪攻永嘉克之新安民程靈洗起兵據郡以應神茂於是浙江以東皆附江陵湘東王繹以靈洗爲譙州刺史領新安太守十一月乙亥王僧辯等復上表勸進湘東王繹不許戊寅繹以湘州刺史安南矦方矩爲中衛將軍以自副方矩方諸之弟也以南平王恪爲湘州刺史矦景以趙伯超爲東道行臺據錢塘以田遷爲軍司據富春以李慶緒爲中軍都督謝荅仁爲右廂都督李遵爲左廂都督以討劉神茂己卯加矦景九錫漢國置丞相以下官己丑豫章王棟禪位于景景即皇帝位于南郊還登太極殿其黨數萬皆吹脣呼譟而上大赦改元太始封棟爲淮隂王并其二弟橋樛同鎻於密室王偉請立七廟景曰何謂七廟偉曰天子祭七丗祖考并請七丗諱景曰前丗吾不復記唯記我父名標且彼在朔州那得來噉此衆咸咲之景黨有知景祖名乙羽周者自外皆王偉制其名位追尊父標爲元皇帝景之作相也以西州爲府文武無尊卑皆引接及居禁中非故舊不得見由是諸將多怨望景好獨乗小馬彈射飛鳥王偉毎禁止之不許輕出景鬱鬱不樂更成失志曰吾無事爲帝與受擯不殊壬辰湘東王以長沙王韶爲郢州刺史益州長史劉孝勝等勸武陵王紀稱帝紀雖未許而大造乗輿車服十二月丁未謝荅仁李慶緒攻建德擒元頵李占送建康景截其手足以徇經日乃死齊主毎出入常以中山王自隨王妃太原公主􅁪爲之甞飲食護視之是月齊主飲公主酒使人鴆中山王殺之并其三子諡王曰魏孝静皇帝葬於鄴西漳北其後齊主忽掘其陵投梓宫於漳水齊主初受禪魏神主悉􅀉於七帝寺至是亦取焚之彭城公元韶以髙氏壻寵遇異於諸元開府儀同三司美陽公元暉業以位望隆重又志氣不倫尤爲齊主所忌從齊主在􅀳陽暉業於宫門外罵韶曰爾不及一老嫗􅀒璽與人何不擊碎之我出此言知即死爾亦詎得幾時齊主聞而殺之及臨淮公元孝友皆鑿汾水冰沈其尸孝友彧之弟也齊主甞剃元韶鬢鬚加之粉黛以自隨曰吾以彭城爲嬪御言其懦弱如婦人也丗祖孝元皇帝上承聖元年春正月湘東王以南平内史王襃爲吏部尚書褒騫之孫也齊人屢侵矦景邊地甲戌景遣郭元建帥歩軍趣小峴矦子鑒帥舟師向濡須己卯至合肥齊人閉城不出乃引還丙申齊主伐庫莫奚大破之俘􅀗四千人雜畜十餘萬齊主連年出塞給事中兼中書舎人唐邕練習軍書自督將以降勞効本末及四方軍士彊弱多少畨代往還器械精粗糧儲虚實靡不諳悉或於帝前簡閱雖數千人不執文簿唱其姓名未甞謬誤帝常曰唐邕彊幹一人當千又曰邕毎有軍事手作文書口且處分耳又聽受實異人也寵待賞賜羣臣莫及魏將王雄取上津魏興東梁州剌史安康李遷哲軍敗降之突厥土門襲擊柔然大破之柔然頭兵可汗自殺其太子菴羅辰及阿那瓌從弟豋注俟利豋注子庫提並帥衆奔齊餘衆復立豋注次子鐵伐爲主土門自號伊利可汗號其妻爲可賀敦子弟謂之特勒别將兵者皆謂之設湘東王命王僧辯等東擊矦景二月庚子諸軍􅀤尋陽舳艫數百里陳霸先帥甲士三萬舟艦二千自南江出湓口㑹僧辯於白茅灣築壇歃血共讀盟文流涕慷慨癸卯僧辯使矦瑱襲南陵鵲頭二戍克之戊申僧辯等軍于大雷丙辰􅀤鵲頭戊午矦子鑒還至戰鳥西軍奄至子鑒驚懼奔還淮南矦景儀同三司謝荅仁攻劉神茂於東陽程靈洗張彪皆勒兵將救之神茂欲專其功不許營於下淮或謂神茂曰賊長於野戰下淮地平四面受敵不如據七里瀨賊必不能進不從神茂偏裨多北人不與神茂同心别將王曅酈通並據外營降於荅仁劉歸義尹思合等棄城走神茂􅀌危辛未亦降於荅仁荅仁送之建康癸酉王僧辯等至蕪湖矦景守將張黑弃城走景聞之甚懼下詔赦湘東王繹王僧辯之罪衆咸笑之侯子鑒據姑孰南洲以拒西師景遣其黨史安和等將兵二千助之三月己巳朔景下詔欲自至姑孰又遣人戒子鑒曰西人善水戰勿與爭鋒往年任約之敗良爲此也􅀂得歩􅀐一交必當可破汝但結營岸上引船入浦以待之子鑒乃捨舟登岸閉營不出僧辯等停軍蕪湖十餘日景黨大喜告景曰西師畏吾之彊􅀔將遁矣不擊且失之景乃復命子鑒爲水戰之備丁丑僧辯至姑孰子鑒帥歩􅀐萬餘人度洲於岸挑戰又以鵃䑠千艘載戰士僧辯麾細船皆令退縮留大艦夾泊兩岸子鑒之衆謂水軍欲退爭出趨之大艦斷其歸路鼔譟大呼合戰中江子鑒大敗士卒赴水死者數千人子鑒僅以身免収散卒走還建康據東府僧辯留虎臣將軍莊丘慧逹鎭姑孰引軍而前歷陽戍迎降景聞子鑒敗大懼涕下覆面引衾而卧良乆方起歎曰誤殺乃公庚辰僧辯督諸軍至張公洲辛巳乗潮入淮進至禪靈寺前景召石頭津主張賔使引淮中舣䑰及海艟以石縋之塞淮口縁淮作城自石頭至于朱雀街十餘里中樓堞相接僧辯問計於陳霸先霸先曰前柳仲禮數十萬兵隔水而坐韋粲在青溪竟不度岸賊登髙望之表裏俱盡故能覆我師徒今圍石頭須度北岸諸將􅀂不能當鋒霸先請先往立柵壬午霸先於石頭西落星山築柵衆軍次連八城直出石頭西北景恐西州路絶自帥矦子鑒等亦於石頭東北築五城以遏大路景使王偉等守臺城乙酉景殺湘東丗子方諸前平東將軍杜幼安劉神茂至建康丙戌景命爲大剉碓先進其足寸寸斬之以至於頭留異外同神茂而濳通於景故得免禍丁亥王僧辯進軍招提寺北矦景帥衆萬餘人鐡􅀐八百餘匹陳於西州之西陳霸先曰我衆賊寡應分其兵勢以彊制弱何故聚其鋒銳令致死於我乃命諸將分處置兵景衝將軍王僧志陳僧志小縮霸先遣將軍安陸徐度將弩手二千横截其後景兵乃却霸先與王琳杜龕等以鐵􅀐乗之僧辯以大軍繼進景兵敗退據其柵龕岸之兄子也景儀同三司盧暉略守石頭城開北門降僧辯入據之景與霸先殊死戰景帥百餘􅀐弃矟執刀左右衝陳陳不動衆遂大潰諸軍逐北至西明門景至闕下不敢入臺召王偉責之曰爾令我爲帝今日誤我偉不能對繞闕而藏景欲走偉執鞚諌曰自古豈有叛天子邪宫中衛士猶足一戰弃此將欲安之景曰我昔敗賀拔勝破􅁑榮揚名河朔度江平臺城降柳仲禮如反掌今日天亡我也因仰觀石闕歎息乆之以皮囊盛其江東所生二子挂之鞌後與房丗貴等百餘􅀐東走欲就謝荅仁於呉矦子鑒王偉陳慶奔朱方僧辯命裴之横杜龕屯杜姥宅杜崱入據臺城僧辯不戢軍士剽掠居民男女祼露自石頭至于東城號泣滿道是夜軍士遺火焚太極殿及東西堂寶器羽儀輦輅無遺戊子僧辯命矦瑱等帥精甲五千追景王克元羅等帥臺内舊臣迎僧辯於道僧辯勞克曰甚苦事夷狄之君克不能對又問璽紱何在克良乆曰趙平原持去僧辯曰王氏百丗卿族一朝而墜僧辯迎太宗梓宫升朝堂帥百官哭踊如禮己丑僧辯等上表勸進且迎都建業湘東王荅曰淮海長鯨雖云授首襄陽短狐未全革面太平玉燭爾乃議之庚寅南兖州剌史郭元建秦郡戍主郭正買陽平戍主魯伯和行南徐州事郭子仲並據城降僧辯之􅀤江陵也啓湘東王曰平賊之後嗣君萬福未審何以爲禮王曰六門之内自極兵威僧辯曰討賊之謀臣爲己任成濟之事請别舉人王乃密諭宣猛將軍朱買臣使爲之所及景敗太宗巳殂豫章王棟及二弟橋樛相扶出於密室逢杜崱於道爲去其鎻二弟曰今日始免横死矣棟曰􅀝伏難知吾猶有懼辛卯遇朱買臣呼之就船共飲未竟並沈於水僧辯遣陳霸先將兵向廣陵受郭元建等降又遣使者住安慰之諸將多私使别索馬仗㑹矦子鑒度江至廣陵謂元建等曰我曹梁之深讎何顔復見其主不􅀂投北可得還郷遂皆降齊霸先至歐陽齊行臺辛術已據廣陵王偉與矦子鑒相失直瀆戍主黄公喜􅀗之送建康王僧辯問曰卿爲賊相不能死節而求活草閒邪偉曰廢興命也使漢帝早從偉言明公豈有今日尚書左丞虞騭甞爲偉所辱乃唾其面偉曰君不讀書不足與語騭慙而退僧辯命羅州剌史徐嗣徽鎭朱方壬辰矦景至􅀳陵得田遷餘兵因驅掠居民東趨呉郡夏四月齊主使大都督潘樂與郭元建將兵五萬攻陽平拔之王僧辯啓陳霸先鎭京口益州剌史太尉武陵王紀頗有武略在蜀十七年南開寧州越嶲西通資陵吐谷渾内脩耕桑鹽鐵之政外通啇賈逺方之利故能殖其財用器甲殷積有馬八千匹聞矦景陷臺城湘東王將討之謂僚佐曰七官文士豈能匡濟内􅃦柏殿柱繞節生花紀以爲己瑞乙巳即皇帝位改元天正立子圎照爲皇太子圎正爲西陽王圎滿爲竟陵王圎普爲譙王圎肅爲宜都王以巴西梓潼二郡太守永豐矦撝爲征西大將軍益州剌史封秦郡王司馬王僧略直兵參軍徐怦固諌不從僧略僧辯之弟怦勉之從子也初臺城之圍怦勸紀速入援紀意不欲行内銜之㑹蜀人費合告怦反怦有與將帥書云事事往人口具紀即以爲反徴謂怦曰以卿舊情當使諸子無恙對曰生兒悉如殿下留之何益紀乃盡誅之梟首於市亦殺王僧略永豐矦撝歎曰王事不成矣善人國之基也今先殺之不亡何待紀徵宜豐矦諮議參軍劉璠爲中書侍郎使者八反乃至紀令劉孝勝深布腹心璠苦求還中記室韋登私謂璠曰殿下忍而畜憾足下不留將致大禍孰若共構大厦使身名俱美哉璠正色曰卿欲緩頰於我邪我與府矦分義已定豈以夷險易其心乎殿下方布大義於天下終不逞志於一夫紀知必不爲巳用乃厚禮遣之以宜豐矦循爲益州刺史封隨郡王以璠爲循府長史蜀郡太守謝荅仁討劉神茂還至富陽聞矦景敗走帥萬人欲北出􅃸之趙伯超據錢塘拒之矦景進至嘉興聞伯超叛之乃退據吳己酉矦瑱追及景於松江景猶有船二百艘衆數千人瑱進擊敗之擒彭儁田遷房丗貴蔡壽樂王伯醜瑱生剖儁腹抽其腸儁猶不死手自收之乃斬之景與腹心數十人單舸走推墮二子於水將入海瑱遣副將焦僧度追之景納羊侃之女爲小妻以其兄鵾爲庫直都督待之甚厚鵾隨景東走與景所親王元禮謝葳蕤密圖之葳蕤荅仁之弟也景下海欲向􅂪山己卯景晝寢鵾語海師此中何處有􅂪山汝但聽我處分遂直向京口至胡豆洲景覺大驚問岸上人云郭元建猶在廣陵景大喜將依之鵾拔刀叱海師向京口因謂景曰吾等爲王効力多矣今至於此終無所成欲就乞頭以取富貴景未及荅白刃交下景欲投水鵾以刀斫之景走入船中以佩刀抉船底鵾以矟剌殺之尚書右僕射索超丗在别船葳蕤以景命召而執之南徐州剌史徐嗣徽斬超丗以鹽内景腹中送其尸於建康僧辯傳首江陵截其手使謝葳蕤送于齊暴景尸於市士民爭取食之并骨皆盡溧陽公主亦預食焉初景之五子在北齊丗宗剝其長子面而烹之幼者皆下蠶室齊顯祖即位夢獼猴坐其御牀乃盡烹之趙伯超謝荅仁皆降於矦瑱瑱并田遷等送建康王僧辯斬房丗貴於市送王偉吕季略周石珍嚴亶趙伯超伏知命於江陵丁巳湘東王下令解嚴乙丑葬簡文帝于莊陵廟號太宗矦景之敗也以傳國璽自隨使其侍中兼平原太守趙思賢掌之曰􅀂我死宜沈於江勿令吴兒復得之思賢自京口濟江遇盜從者弃之草間至廣陵以告郭元建元建取之以與辛術壬申術送之至鄴甲申齊以吏部尚書楊愔爲右僕射以太原公主妻之公主即魏孝静帝之后也楊乾運至劒北魏逹奚武逆擊之大破乾運於白馬陳其俘馘於南鄭城下且遣人辱宜豐矦循循怒出兵與戰都督楊紹伏兵擊之殺傷殆盡劉璠還至白馬西爲武所􅀗送長安太師泰素聞其名待之如舊交時南鄭乆不下武請屠之泰將許之璠請之於朝泰怒不許璠泣請不已泰曰事人當如是乃從其請五月庚午司空南平王恪等復勸進湘東王猶不受遣侍中豐城矦㤗等謁山陵脩復廟社戊寅矦景首至江陵梟之於市三日煑而漆之以付武庫庚辰以南平王恪爲楊州剌史甲申以王僧辯爲司徒鎭衛將軍封長寧公陳霸先爲征虜將軍開府儀同三司封長城縣矦乙酉誅矦景所署尚書僕射王偉左民尚書吕季略少府周石珍舎人嚴亶於市趙伯超伏知命餓死於獄以謝荅仁不失禮於太宗特宥之王偉於獄中上五百言詩湘東王愛其才欲宥之有嫉之者言於王曰前日偉作檄文甚佳王求而視之檄云項羽重瞳尚有烏江之敗湘東一目寧爲赤縣所歸王大怒釘其舌於柱剜腹臠肉而殺之丙戌齊合州剌史斛斯昭攻歷陽拔之丁亥下令以王偉等旣死自餘衣冠舊貴􅀍逼偷生猛士勲豪和光茍免者皆不問扶風民魯悉逹紏合郷人以保新蔡力田蓄榖時江東饑亂餓死者什八九遺民􅂝老幼歸之悉逹分給糧廩全濟甚衆招集􅀳熈等五郡盡有其地使其弟廣逹將兵從王僧辯討矦景景平以悉逹爲北江州剌史齊主使其散􅀐常侍曹文皎等來聘湘東王使散􅀐常侍柳暉等報之且告平矦景亦遣舎人魏彦告于魏齊主使潘樂郭元建將兵圍秦郡行臺尚書辛術諫曰朝廷與湘東王信使不絶陽平矦景之土取之可也今王僧辯巳遣嚴超逹守秦郡於義何得復爭之且水潦方降不如班師弗從陳霸先命别將徐度引兵助秦郡固守齊衆七萬攻之甚急王僧辯使左衛將軍杜崱救之霸先亦自歐陽來㑹與元建大戰於土林大破之斬首萬餘級生擒千餘人元建收餘衆北遁猶以通好不窮追也辛術遷吏部尚書自魏遷鄴以來大選之職知名者數人互有得失齊丗宗少年髙朗所弊者踈􅀽叔德沈密謹厚所傷者細楊愔風流辯給取士失於浮華唯術性尚貞明取士必以才器循名責實新舊參舉管庫必擢門閥不遺考之前後最爲折􅂨魏逹奚武遣尚書左丞柳帶韋入南鄭􅀃宜豐矦循曰足下所固者險所恃者援所保者民今王旅深入所慿之險不足固也白馬破走酋豪不進所望之援不可恃也長圍四合所部之民不可保也且足下本朝喪亂社稷無主欲誰爲爲忠乎豈􅀂轉禍爲福使慶流子孫邪循乃請降帶韋慶之子也開府儀同三司賀蘭德願聞城中食盡請攻之大都督赫連逹曰不戰而獲城䇿之上者豈可利其子女貪其貨財而不愛民命乎且觀其土馬猶彊城池尚固攻之縱克必彼此俱傷如困獸猶鬬則成敗未可知也武曰公言是也乃受循降􅀗男女二萬口而還於是劒北皆入于魏六月丁未齊主還鄴乙卯復如􅀳陽庚寅立安南矦方矩爲王太子齊遣散􅀐常侍謝季卿來賀平矦景衡州刺史王懷明作亂廣州刺史蕭勃討平之齊政煩賦重江北之民不樂屬齊其豪傑數請兵於王僧辯僧辯以與齊通好皆不許秋七月廣陵僑人朱盛等濳聚黨數千人謀襲殺齊剌史温仲邕遣使求援於陳霸先云已克其外城霸先使告僧辯僧辯曰人之情僞未易可測􅀂審克外城亟須應援如其不爾無煩進軍使未報霸先巳濟江僧辯乃命武州刺史杜崱等助之㑹盛等謀泄霸先因進軍圍廣陵八月魏安康人黃衆寶反攻魏興執太守柳檜進圍東梁州令檜誘􅀃城中檜不從而死檜蚪之弟也太師泰遣王雄與驃􅀐大將軍武川宇文蚪討之武陵王紀舉兵由外水東下以永豐矦撝爲益州刺史守成都使其子宜都王圎肅副之九月甲戌司空南平王恪卒甲申以王僧辯爲揚州剌史齊主使告王僧辯陳霸先曰請釋廣陵之圍必歸廣陵歷陽兩城霸先引兵還京口江北之民從霸先濟江者萬餘口湘東王以霸先爲征北大將軍開府儀同三司南徐州刺史徵霸先丗子昌及兄子頊詣江陵以昌爲貟外散􅀐常侍頊爲領直宜豐矦循之降魏也丞相泰許其南還久而未遣從容問劉璠曰我於古誰比對曰璠常以公爲湯武今日所見曽􅁊文之不如泰曰我安敢比湯武庶幾望伊周何至不如􅁊文對曰齊􅁊存三亡國􅀳文不失信於伐原語未竟泰撫掌曰我解爾意欲激我耳乃謂循曰王欲之荆爲之益循請還江陵泰厚禮遣之循以文武千家自隨湘東王疑之遣使覘察相望於道始至之夕命刼竊其財及旦循啓輸馬仗王乃安之引入對泣以循爲侍中驃􅀐將軍開府儀同三司冬十月齊主自􅀳陽如離石自黃櫨嶺起長城北至社平戍四百餘里置三十六戍戊申湘東王執湘州剌史王琳於殿中殺其副將殷晏琳本㑹稽兵家其姉妹皆入王宫故琳少在王左右琳好勇王以爲將帥琳傾身下士所得賞賜不以入家麾下萬人多江淮羣盗從王僧辯平矦景與杜龕功居第一在建康恃寵縱暴僧辯不能禁僧辯以宫殿之燒恐得罪欲以琳塞責乃密啓王請誅琳王以琳爲湘州琳自疑及禍使長史陸納帥部曲赴湘州身詣江陵陳謝謂納等曰吾􅀂不返子將安之咸曰請死之相泣而别至江陵王下琳吏辛酉以王子方略爲湘州剌史又以廷尉黃羅漢爲長史使與太舟卿張載至巴陵先據琳軍載有寵於王而御下峻刻荆州人疾之如讎羅漢等至琳軍陸納及士卒並哭不肯受命執羅漢及載王遣宦者陳旻往諭之納對旻刳載腹抽腸以繫馬足使繞而走腸盡氣絶又臠割出其心向之抃舞焚其餘骨以黃羅漢清謹而免之納與諸將引兵襲湘州時州中無主納遂據之公卿藩鎭數勸進於湘東王十一月丙子丗祖即皇帝位於江陵改元大赦是日帝不升正殿公卿陪列而已丁丑以宜豐矦循爲湘州剌史己卯立王太子方矩爲皇太子更名元良皇子方智爲􅀳安王方略爲始安王方等之子莊爲永嘉王追尊母阮脩容爲文宣皇后矦景之亂州郡太半入魏自巴陵以下至建康以長江爲限荆州界北盡武寧西拒硤口嶺南復爲蕭勃所據詔令所行千里而近民户著藉者不盈三萬而已陸納襲擊衡州刺史丁道貴於淥口破之道貴奔零陵其衆悉降於納上聞之遣使徵司徒王僧辯右衛將軍杜崱平北將軍裴之横與宜豐矦循共討納循軍巴陵以待之矦景之亂零陵人李洪雅據其郡上即以爲營州剌史洪雅請討陸納上許之丁道貴收餘衆與之俱納遣其將吴藏襲擊破之洪雅等退保空雲城藏引兵圍之頃之納請降求送妻子上遣陳旻至納所納衆皆泣曰王郎􅀍囚故我曹逃罪於湘州非有它志也乃出妻子付旻旻至巴陵循曰此詐也必將襲我乃密爲之備納果夜以輕兵繼旻後約至城下鼔譟十二月壬午晨去巴陵十里衆謂巳至即鼔譟軍中皆驚循坐胡牀於壘門望之納乗水來攻矢下如雨循方食甘蔗略無懼色徐部分將士擊之􅀗其一艦納退保長沙壬午齊主還鄴戊午復如􅀳陽資治通鑑卷第一百六十四
