body:
  text: 羣盜李洪攻燒鞏西闕口以東南結諸蠻魏都督李神軌武衛將軍費穆討之穆敗洪於闕口南遂平之葛榮擊杜洛周殺之併其衆魏靈太后再臨朝以來嬖倖用事政事縱弛威恩不立盗賊蠭起封疆日蹙魏肅宗年浸長太后自以所爲不謹恐左右聞之於帝凡帝所愛信者太后輙以事去之務爲壅蔽不使帝知外事通直散􅀐常侍昌􅀺谷士恢有寵於帝使領左右太后屢諷之欲用爲州士恢懷寵不願出外太后乃誣以罪而殺之有蜜多道人能胡語帝常置左右太后使人殺之於城南而詐懸賞購賊由是母子之間嫌􅂩日深是時車􅀐將軍儀同三司并肆汾廣􅁪雲六州討虜大都督爾朱榮兵􅀔彊盛魏朝憚之髙歡段榮尉景蔡儁先在杜洛周黨中欲圗洛周不果逃奔􅁑榮又亡歸爾朱榮劉貴先在爾朱榮所屢薦歡於榮榮見其憔悴未之竒也歡從榮之馬廐廏有悍馬榮命歡翦之歡不加羈絆而翦之竟不蹄齧起謂榮曰御惡人亦猶是矣榮竒其言坐歡於牀下屏左右訪以時事歡曰聞公有馬十二谷色别爲羣畜此竟何用也榮曰但言爾意歡曰今天子闇弱太后滛亂嬖孽擅命朝政不行以明公雄武乗時奮發討鄭儼徐紇之罪以清帝側霸業可舉鞭而成此賀六渾之意也榮大恱語自日中至夜半乃出自是每參軍謀并州刺史元天穆􅀌之五丗孫也與榮善榮兄事之榮常與天穆及帳下都督賀拔岳密謀欲舉兵入洛内誅嬖倖外清群盗二人皆勸成之榮上書以山東群盗方熾冀定覆没官軍屢敗請遣精􅀐三千東援相州太后疑之報以念生梟戮寶寅就擒醜奴請降􅀜隴已定費穆大破羣蠻絳蜀漸平又北海王顥帥衆二萬出鎭相州不須出兵榮復上書以爲賊􅀔雖衰官軍屢敗人情危怯恐實難用若不更思方略無以萬全臣愚以爲蠕蠕主阿那瓌荷國厚恩未應忘報宜遣發兵東趣下口以躡其背北海之軍嚴加警備以當其前臣麾下雖少輒盡力命自井陘以北滏口以西分據險要攻其肘腋葛榮雖并洛周威恩未著人類差異形勢可分遂勒兵召集義勇北捍馬邑東塞井陘徐紇􅀃太后以鐡劵閒榮左右榮聞而恨之魏肅宗亦惡儼紇等逼於太后不能去密詔榮舉兵内向欲以脅太后榮以髙歡爲前鋒行至上黨帝復以私詔止之儼紇恐禍及己隂與太后謀酖帝癸丑帝暴殂甲寅太后立皇女爲帝大赦旣而下詔稱潘充華本實生女故臨洮王寶暉丗子釗體自髙祖宜膺大寳百官文武加二階􅀫衛加三階乙卯釗即位釗始生三歲太后欲乆專政故貪其幼而立之爾朱榮聞之大怒謂元天穆曰主上晏駕春秋十九海内猶謂之幼君況今奉未言之兒以臨天下欲求治安其可得乎吾欲帥鐵􅀐赴哀山陵翦誅姦佞更立長君何如天穆曰此伊霍復見於今矣乃抗表稱大行皇帝背棄萬方海内咸稱酖毒致禍豈有天子不豫初不召醫貴戚大臣皆不侍側安得不使逺近怪愕又以皇女爲儲兩虚行赦宥上欺天地下惑朝野已乃選君於孩提之中實使姦豎專朝隳亂綱紀此何異掩目捕雀塞耳盜鍾今羣盜沸騰鄰敵窺窬而欲以未言之兒鎭安天下不亦難乎願聽臣赴闕參預大議問侍臣帝崩之由訪禁衞不知之狀以徐鄭之徒付之司敗雪同天之恥謝逺近之怨然後更擇宗親以承寶祚榮從弟世隆時爲直閤太后遣詣􅀳陽慰諭榮榮欲留之丗隆曰朝廷疑兄故遣世隆來今留丗隆使朝廷得預爲之備非計也乃遣之三月癸未葛榮陷魏滄州執刺史薛慶之居民死者什八九乙酉魏葬孝明皇帝于定陵廟號肅宗爾朱榮與元天穆議以彭城武宣王有忠勲其子長樂王子攸素有令望欲立之又遣從子天光及親信奚毅倉頭王相入洛與爾朱丗隆密議天光見子攸具論榮心子攸許之天光等還􅀳陽榮猶疑之乃以銅爲顯祖諸子孫各鑄像唯長樂王像成榮乃起兵􅀤􅀳陽丗隆逃出㑹榮於上黨靈太后聞之甚懼悉召王公等入議宗室大臣皆疾太后所爲莫肯致言徐紇獨曰爾朱榮小胡敢稱兵向闕文武􅀫衞足以制之但守險要以逸待勞彼懸軍千里士馬疲弊破之必矣太后以爲然以黃門侍郎李神軌爲大都督帥衆拒之别將鄭季明鄭先護將兵守河橋武衞將軍費穆屯小平津先護儼之從祖兄弟也榮至河内復遣王相密至洛迎長樂王子攸夏四月丙申子攸與兄彭城王劭弟霸城公子正潜自髙渚渡河丁酉㑹榮於河陽將士咸稱萬歳戊戌濟河子攸即帝位以劭爲無上王子正爲始平王以榮爲侍中都督中外諸軍事大將軍尚書令領軍將軍領左右封太原王鄭先護素與敬宗善聞帝即位與鄭季明開城納之李神軌至河橋聞北中不守即遁還費穆棄衆先降於榮徐紇矯詔夜開殿門取驊騮廏御馬十匹東奔兖州鄭儼亦走還郷里太后盡召肅宗後宫皆令出家太后亦自落髮榮召百官迎車駕己亥百官奉璽綬備法駕迎敬宗於河橋庚子榮遣􅀐執太后及幼主送至河隂太后對榮多所陳􅀃榮拂衣而起沈太后及㓜主於河費穆密􅀃榮曰公士馬不出萬人今長驅向洛前無橫陳旣無戰勝之威羣情素不厭服以京師之衆百官之盛知公虚實有輕侮之心若不大行誅罰更樹親黨恐公還北之日未度太行而内變作矣榮心然之謂所親慕容紹宗曰洛中人士䌓盛驕侈成俗不加芟翦終難制馭吾欲因百官出迎悉誅之何如紹宗曰太后荒淫失道嬖倖弄權殽亂四海故明公興義兵以清朝廷今無故殱夷多士不分忠佞恐大失天下之望非長䇿也榮不聽乃請帝循河西至淘渚引百官於行宫西北云欲祭天百官旣集列胡􅀐圍之責以天下喪亂肅宗暴崩皆由朝臣貪虐不能匡弼因縱兵殺之自丞相髙陽王雍司空元欽儀同三司義陽王略以下死者二千餘人前黃門郎王遵業兄弟居父喪其母敬宗之從母也相帥出迎俱死遵業慧龍之孫也雋爽渉學時人惜其才而譏其躁有朝士百餘人後至榮復以胡􅀐圍之令曰有能爲禪文者免死侍御史趙元則出應募遂使爲之榮又令其軍士言元氏旣滅爾朱氏興皆稱萬歳榮又遣數十人拔刀向行宫帝與無上王劭始平王子正俱岀帳外榮先遣并州人郭羅刹西部髙車叱列殺􅀑侍帝側詐言防衛抱帝入帳餘人即殺劭及子正又遣數十人遷帝於河橋置之幕下帝憂憤無計使人諭㫖於榮曰帝王迭興盛衰無常今四方瓦解將軍奮袂而起所向無前此乃天意非人力也我本相投志在全生豈敢妄希天位將軍見逼以至於此若天命有歸將軍宜時正尊號若推而不居存魏社稷亦當更擇親賢而輔之時都督髙歡勸榮稱帝左右多同之榮疑未決賀拔岳進曰將軍首舉義兵志除姦逆大勲未立遽有此謀正可速禍未見其福榮乃自鑄金爲像凡四鑄不成功曹叅軍燕郡劉靈助善卜筮榮信之靈助言天時人事未可榮曰若我不􅁻當迎天穆立之靈助曰天穆亦不􅁻唯長樂王有天命耳榮亦精神恍惚不自支持乆而方寤深自愧悔曰過誤若是唯當以死謝朝廷賀拔岳請殺髙歡以謝天下左右皆曰歡雖復愚踈言不思難今四方多事須藉武將請捨之收其後效榮乃止夜四更復迎帝還營榮望馬首叩頭請死榮所從胡􅀐殺朝士旣多不敢入洛城即欲向北爲遷都之計榮狐疑甚乆武衛將軍汎禮固諌辛丑榮奉帝入城帝御太極殿下詔大赦改元建義從太原王將士普加五階在京文官二階武官三階百姓復租役三年時百官蕩盡存者皆竄匿不出唯散􅀐常侍山偉一人拜赦於闕下洛中士民草草人懷異慮或云榮欲縱兵大掠或云欲遷都􅀳陽冨者棄宅貧者襁􅀒率皆逃竄什不存一二直衛空虛官守曠廢榮乃上書稱大兵交際難可齊壹諸王朝貴横死者衆臣今粉軀不足塞咎乞追贈亡者微申私責無上王請追尊爲無上皇帝自餘死於河隂者諸王贈三司三品贈令僕五品贈刺史七品已下及白民贈郡鎭死者無後聽繼即授封爵又遣使者循城勞問詔從之於是朝士稍出人心粗安封無上王之子韶爲彭城王榮猶執遷都之議帝亦不能違都官尚書元諶争之以爲不可榮怒曰何􅀜君事而固執也且河隂之役君應知之諶曰天下事當與天下論之奈何以河隂之酷而恐元諶諶國之宗室位居常伯生旣無益死復何損正使今日碎首流膓亦無所懼榮大怒欲抵諶罪爾朱世隆固諌乃止見者莫不震悚諶顔色自若後數日帝與榮登髙見宫闕壯麗列樹成行乃歎曰臣昨愚闇有北遷之意今見皇居之盛熟思元尚書言深不可奪由是罷遷都之議諶謐之兄也癸卯以江陽王繼爲太師北海王顥爲太傅光禄大夫李延寔爲太保賜爵濮陽王并州刺史元天穆爲太尉賜爵上黨王前侍中楊椿爲司徒車􅀐大將軍穆紹爲司空領尚書令進爵頓丘王雍州刺史長孫稚爲驃􅀐大將軍開府儀同三司賜爵馮翊王殿中尚書元諶爲尚書右僕射賜爵魏郡王金紫光禄大夫廣陵王㳟加儀同三司其餘起家暴貴者不可勝數延寔沖之子也以帝舅故得超拜徐紇弟獻伯爲北海太守季産爲青州長史紇使人告之皆將家屬逃去與紇俱奔泰山鄭儼與從兄滎陽太守仲明謀據郡起兵爲部下所殺丁未詔内外解嚴魏郢州刺史元願逹請降詔郢州刺史元樹迎之夏矦夔亦自楚城往㑹之遂留鎭焉改魏郢州爲北司州以夔爲刺史兼督司州夔進攻毛城逼新蔡豫州刺史夏矦亶圍南頓攻陳項魏行臺源子恭拒之庚戌魏賜爾朱榮子义羅爵梁郡王柔然頭兵可汗數入貢于魏魏詔頭兵賛拜不名上書不稱臣魏汝南王恱及東道行臺臨淮王彧聞河隂之亂皆來奔先是魏人降者皆稱魏官爲僞彧表啓獨稱魏臨淮王上亦體其雅素不之責魏北海王顥將之相州至汲郡聞葛榮南侵及爾朱榮縱暴隂爲自安之計盤􅁊不進以其舅殷州刺史范遵行相州事代前刺史李神守鄴行臺甄密知顥有異志相帥廢遵復推李神攝州事遣兵迎顥且察其變顥聞之帥左右來奔密琛之從父弟也北青州刺史元丗雋南荆州刺史李志皆舉州來降五月丁巳朔魏加爾朱榮北道大行臺以尚書右僕射元羅爲東道大使光禄勲元欣副之巡方黜陟先行後聞欣羽之子也爾朱榮入見魏主於明光殿重謝河橋之事誓言無復貳心帝自起止之因復爲榮誓言無疑心榮喜因求酒飲之熟醉帝欲誅之左右苦諌乃止即以牀轝向中常侍省榮夜半方寤遂逹旦不眠自此不復禁中􅀫矣榮女先爲肅宗嬪榮欲敬宗立以爲后帝疑未決給事黃門侍郎祖瑩曰昔文公在秦懷嬴入侍事有反經合義陛下獨何疑焉帝遂從之榮意甚恱榮舉止輕脫喜馳射每入朝見更無所爲唯戲上下馬於西林園宴射􅁪請皇后出觀并召王公妃主共在一堂每見天子射中輒自起舞叫將相卿士悉皆盤旋乃至妃主亦不免隨之舉袂及酒酣耳熱必自匡坐唱虜歌日暮罷歸與左右連手蹋地唱回波樂而出性甚嚴暴喜愠無􅁪刀槊弓矢不離於手毎有瞋嫌即行擊射左右􅁪有死憂甞見沙彌重􅀐一馬榮即令相觸力窮不復能動遂使傍人以頭相擊死而後已辛酉榮還􅀳陽帝餞之於邙隂榮令元天穆入洛陽加天穆侍中録尚書事京畿大都督兼領軍將軍以行臺郎中桑乾朱瑞爲黃門侍郎兼中書舎人朝廷要官悉用其腹心爲之丙寅魏主詔孝昌以來凡有􅁈抑無訴者悉集華林東門當親理之時承䘮亂之後倉廪虛竭始詔入粟八千石者賜爵散矦白民輸五百石者賜出身沙門授本州統及郡縣維那爾朱榮之趣洛也遣其都督樊子鵠取唐州唐州刺史崔元珍行臺酈惲拒守不從乙亥子鵠拔平陽斬元珍及惲元珍挺之從父弟也將軍曹義宗圍魏荆州堰水灌城不没者數板時魏方多難不能救城中糧盡刺史王羆煑粥與將士均分食之毎出戰不擐甲胄仰天大呼曰荆州城孝文皇帝所置天若不祐國家令箭中王羆額不爾王羆必當破賊彌歷三年前後􅅮戰甚衆亦不被傷癸未魏以中軍將軍費穆都督南征諸軍事將兵救之魏臨淮王彧聞魏主定位乃以母老求還辭情懇至上惜其才而不能違六月丁亥遣彧還魏以彧爲侍中驃􅀐大將軍加儀同三司魏貟外散􅀐常侍髙乾祐之從子也與弟敖曹季式皆喜輕俠與魏主有舊爾朱榮之向洛也逃奔齊州聞河隂之亂遂集流民起兵於河濟之間受葛榮官爵頻破州軍魏主使元欣諭㫖乾等乃降以乾爲給事黃門侍郎兼武衛將軍敖曹爲通直散􅀐侍郎榮以乾兄弟前爲叛亂不應復居近要魏主乃聽解官歸鄕里敖曹復行抄掠榮誘執之與薛脩義同拘於􅀳陽敖曹名昂以字行葛榮軍乏食遣其僕射任褒將兵南掠至沁水魏以元天穆爲大都督東北道諸軍事帥宗正珍孫等討之前幽州平北府主簿河間邢杲帥河北流民十萬餘户反於青州之北海自稱漢王改元天統戊申魏以征東將軍李叔仁爲車􅀐大將軍儀同三司帥衆討之辛亥魏主詔曰朕當親御六戎掃靜燕代以大將軍爾朱榮爲左軍上黨王天穆爲前軍司徒楊椿爲右軍司空穆紹爲後軍葛榮退屯相州之北秋七月乙丑魏加爾朱榮柱國大將軍録尚書事壬子魏光州民劉舉聚衆反於濮陽自稱皇武大將軍是月万俟醜奴自稱天子置百官㑹波斯國獻師子於魏醜奴留之改元神獸魏泰山太守羊􅋲以其祖規甞爲宋髙祖􅀕酒從事常有南歸之志徐紇往依之因勸􅋲起兵􅋲從之兖州刺史羊敦􅋲之從兄也密知之據州拒􅋲八月􅋲引兵襲敦弗克築十餘城守之且遣使來降詔廣晉縣矦泰山羊鴉仁等將兵應接魏以􅋲爲驃􅀐大將軍泰山公兖州刺史􅋲斬其使者不受將軍王弁侵魏徐州畨郡民續靈珍擁衆萬人攻畨城以應梁魏徐州刺史楊昱擊靈珍斬之弁引還甲辰魏大都督宗正珍孫擊劉舉於濮陽㓕之葛榮引兵圍鄴衆號百萬遊兵已過汲郡所至殘掠爾朱榮啟求討之九月爾朱榮召從子肆州刺史天光留鎭晉陽曰我身不得至處非汝無以稱我心自帥精􅀐七千馬皆有副倍道兼行東出滏口以矦景爲前驅葛榮爲盜日乆橫行河北爾朱榮衆寡非敵議者謂無取勝之理葛榮聞之喜見於色令其衆曰此易與耳諸人俱辦長繩至則縳取自鄴以北列陳數十里箕張而進爾朱榮潜軍山谷爲竒兵分督將已上三人爲一處處有數百􅀐令所在􅀭塵鼔譟使賊不測多少又以人馬逼戰刀不如棒勒軍士齎䄂棒一枚置於馬側至戰時慮廢騰逐不聽級斬以棒棒之而已分命壯勇所向衝突號令嚴明戰士同奮爾朱榮身自陷陳出於賊後表裏合擊大破之於陳擒葛榮餘衆悉降以賊徒旣衆若即分割恐其疑懼或更結聚乃下令各從所樂親属相隨任所居止於是羣情大喜登即四散數十萬衆一朝散盡待出百里之外乃始分道押領隨便安置咸得其宜擢其渠帥量才授任新附者咸安時人服其處分機速以檻車送葛榮赴洛冀定滄瀛殷五州皆平時上黨王天穆軍於朝歌之南穆紹楊椿猶未發而葛榮已滅乃皆罷兵初宇文肱從鮮于脩禮攻定州戰死於唐河其子泰在脩禮軍中脩禮死從葛榮葛榮敗爾朱榮愛泰之才以爲統軍乙亥魏大赦改元永安辛巳以爾朱榮爲大丞相都督河北畿外諸軍事榮子平昌公文殊昌樂公文暢並進爵爲王以楊椿爲太保城陽王徽爲司徒冬十月丁亥葛榮至洛魏主御閶闔門引見斬於都市帝以魏北海王顥爲魏王遣東宫直閤將軍陳慶之將兵送之還北丙申魏以太原王丗子爾朱菩提爲驃􅀐大將軍開府儀同三司丁酉以長樂等七郡各萬户通前十萬户爲太原王榮國戊戌又加榮太師皆賞擒葛榮之功也壬子魏江陽武烈王繼卒魏使征虜將軍韓子熈招諭邢杲杲詐降而復反李叔仁擊杲於濰水失利而還魏費穆奄至荆州曹義宗軍敗爲魏所擒荆州之圍始解元顥取魏銍城而據之魏行臺尚書左僕射于暉等兵數十萬擊羊􅋲於瑕丘徐紇恐事不濟􅀃􅋲請乞師於梁􅋲信之紇遂來奔暉等圍􅋲十餘重柵中矢盡南軍不進十一月癸亥夜􅋲潰圍出且戰且行一日一夜乃出魏境至渣口衆尚萬餘人馬二千匹士卒皆竟夜悲歌􅋲乃謝曰卿等懷土理不能相隨幸適去留於此爲别各拜辭而去魏復取泰山暉勁之子也戊寅魏以上黨王天穆爲大將軍開府儀同三司丗襲并州刺史十二月庚子魏詔于暉還師討邢杲葛榮餘黨韓樓復據幽州反北邊被其患爾朱榮以撫軍將軍賀拔勝爲大都督鎭中山樓畏勝威名不敢南出資治通鑑卷第一百五十二
