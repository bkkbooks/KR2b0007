front:
  text: 不殺衆無不感其仁及葛榮代脩禮統衆使人􅀃津許以爲司徒津斬其使固守三年杜洛周圍之魏不能救津遣其子遁突圍出詣柔然頭兵可汗求救遁日夜泣請頭兵遣其從祖吐豆發帥精􅀐一萬南出前鋒至廣昌賊塞隘口柔然遂還乙丑津長史李裔引賊入執津欲烹之旣而捨之瀛州刺史元寧以城降洛周乙丑魏潘嬪生女胡太后詐言皇子丙寅大赦改元武泰蕭寶寅圍馮翊未下長孫稚軍至􅁪農行臺左丞楊􅋲謂稚曰昔魏武與韓遂馬超據潼關相拒遂超之才非魏武敵也然而勝􅀒乆不决者扼其險要故也今賊守禦已固雖魏武復生無以施其智勇不如北取蒲坂渡河而西入其腹心置兵死地則華州之圍不戰自解潼􅀜之守必内顧而走支節旣解長安可坐取也若愚計可取願爲明公前驅稚曰子之計則善矣然今薛脩義圍河東薛鳯賢據安邑宗正珍孫守虞坂不得進如何可往􅋲曰珍孫行陳一夫因縁爲將可爲人使安能使人河東治在蒲反西逼河漘封疆多在郡東脩義驅帥士民西圍郡城其父母妻子皆留舊村一旦聞官軍來至皆有内顧之心必望風自潰矣稚乃使子其子彦與􅋲帥􅀐兵自􅁪農北渡據石錐璧􅋲聲言今且停此以待步兵且觀民情向背命送降名者各自還村俟臺軍舉三烽當亦舉烽相應其無應烽者乃賊黨也當進擊屠之以所􅀗賞軍於是村民轉相告語雖實未降者亦詐舉烽一宿之間火光遍數百里賊圍城者不測其故各自散歸脩義亦逃還與鳯賢俱請降丙子稚克潼􅀜遂入河東㑹有詔廢鹽池稅稚上表以爲鹽池天産之貨密邇京畿唯應寶而守之均贍以理今四方多虞府藏罄竭冀定擾攘常調之絹不復可收惟仰府庫有出無入略論鹽稅一年之中凖絹而言不減三十萬匹乃是移冀定二州置於畿甸今若廢之事同再失臣前仰違嚴旨不先討􅀜賊徑解河東者非緩長安而急蒲坂一失鹽池三軍乏食天助大魏兹計不爽昔髙祖昇平之年無所乏少猶創置鹽官而加典護非與物競利恐由利而亂俗也況今國用不足租徴六年之粟調折來歳之資此皆奪人私財事不獲已臣輙符同監將尉還帥所部依常收稅更聽後敕蕭寳寅遣其將矦終德擊毛遐㑹郭子恢等屢爲魏軍所敗終德因其勢挫還軍襲寶寅至白門寶寅始覺丁丑與終德戰敗􅂝其妻南陽公主及其少子帥麾下百餘􅀐自後門出奔万俟醜奴醜奴以寶寅爲太傅二月魏以長孫稚爲車􅀐大將軍開府儀同三司雍州刺史尚書僕射西道行臺
