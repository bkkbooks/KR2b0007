seq: 59
front:
  text: 將亂益州分野有天子氣焉乃更求益州㑹益州刺史郤儉賦斂煩擾謡言遠聞而耿鄙張懿皆為盜所殺朝廷遂從焉議選列卿尚書為州牧各以本秩居任以焉為益州牧太僕黄琬為豫州牧宗正東海劉虞為幽州牧州任之重自此而始焉魯恭王之後虞東海恭王之五丗孫也虞嘗為幽州刺史民夷懷其恩信故用之董扶及太倉令趙韙皆弃官隨焉入蜀詔發南匃奴兵配劉虞討張純單于羌渠遣左賢王將騎詣幽州國人恐發兵無已於是右部䤈落反與屠各胡合凡十餘萬人攻殺羌渠國人立其子右賢王於扶羅為持至尸逐矦單于
  hash: sha256:c0b551c682cecf76c6eff70e305607215a8b9a95830a55f73ea93ef7c3330f46
body:
  text: 夏四月太尉曹嵩罷五月以永樂少府南陽樊陵為太尉六月罷益州賊馬相趙祗等起兵緜竹自號黄巾殺刺史郤儉進擊巴郡犍為旬月之間破壞三郡有衆數萬相自稱天子州從事賈龍率吏民攻相等數日破走州界清静龍乃選吏卒迎劉焉焉徙治緜竹撫納離叛務行寛惠以收人心郡國七大水故太􅀓陳蕃子逸與術士襄楷會於冀州刺史王芬坐楷曰天文不利宦者黄門常侍眞族滅矣逸喜芬曰若然者芬願驅除因與豪傑轉相招合上書言黑山賊攻劫郡縣欲因以起兵會帝欲北廵河間舊宅芬等謀以兵徼劫誅諸常侍黄門因廢帝立合肥侯以其謀告議郎曹操操曰夫廢立之事天下之至不祥也古人有權成敗計輕重而行之者伊霍是也伊霍皆懷至忠之誠據宰輔之埶因秉政之重同衆人之欲故能計從事立今諸君徒見曩者之易未覩當今之難而造作非常欲望必克不以危乎芬又呼平原華歆陶丘洪共定計洪欲行歆止之曰夫廢立大事伊霍之所難芬性疎而不武此必無成洪乃止會北方夜半有赤氣東西竟天太史上言北方有陰謀不宜北行帝乃止敕芬罷兵俄而徴之芬懼解印綬亡走至平原自殺秋七月以射聲校尉馬日磾為太尉日磾融之族孫也八月初置西園八校尉以小黄門蹇碩為上軍校尉虎賁中郎將袁紹為中軍校尉屯騎校尉鮑鴻為下軍校尉議郎曹操為典軍校尉趙融為助軍左校尉馮芳為助軍右校尉諌議大夫夏牟為左校尉淳于瓊為右校尉皆綂於蹇碩帝自黄巾之起留心戎事碩壯健有武略帝親任之雖大將軍亦領屬焉九月司徒許相罷以司空丁宫為司徒光禄勲南陽劉􅀪為司空以衛尉條矦董重為票騎將軍重永樂太后兄子也冬十月青徐黄巾復起冦郡縣望氣者以為京師當有大兵兩宮流血帝欲厭之乃大發四方兵講武於平樂觀下起大壇上建十二重華蓋髙十丈壇東北為小壇復建九重華蓋高九丈列歩騎數萬人結營為陳甲子帝親出臨軍駐大華蓋下大將軍進駐小華蓋下帝躬擐甲介馬稱無上將軍行陳三帀而還以兵授進帝問討虜校尉蓋勲曰吾講武如是何如對曰臣聞先王曜德不觀兵今冦在逺而設近陳不足昭果毅秖黷武耳帝曰善恨見君晩羣臣初無是言也勲謂袁紹曰上甚聰明但蔽於左右耳與紹謀共誅嬖倖蹇碩懼出勲為京兆尹十一月王國圍陳倉詔復拜皇甫嵩為左將軍督前將軍董卓合兵四萬人以拒之張純與丘力居鈔略青徐幽冀四州詔騎都尉公孫瓚討之瓚與戰於屬國石門純等大敗弃妻子踰塞走悉得所略男女瓚深入無繼反為丘力居等所圍於遼西管子城二百餘日糧盡衆潰士卒死者什五六董卓謂皇甫嵩曰陳倉危急請速救之嵩曰不然百戰百勝不如不戰而屈人兵陳倉雖小城守固備未易可㧞王國雖強攻陳倉不下其衆必疲疲而擊之全勝之道也將何救焉國攻陳倉八十餘日不㧞六年春二月國衆疲敝解圍去皇甫嵩進兵擊之董卓曰不可兵法窮冦勿廹歸衆勿追嵩曰不然前吾不擊避其鋭也今而擊之待其衰也所擊疲師非歸衆也國衆且走莫有鬭志以整擊亂非窮冦也遂獨進擊之使卓為後拒連戰大破之斬首萬餘級卓大慙恨由是與嵩有隙韓遂等共廢王國而劫故信都令漢陽閻忠使督綂諸部忠病死遂等稍爭權利更相殺害由是寖衰幽州牧劉虞到部遣使至鮮卑中告以利害責使送張舉張純首厚加購賞丘力居等聞虞至喜各遣譯自歸舉純走出塞餘皆降散虞上罷諸屯兵但留降虜校尉公孫瓚將歩騎萬人屯右北平三月張純客王政殺純送首詣虞公孫瓚志欲掃滅烏桓而虞欲以恩信招降由是與瓚有隙夏四月丙子朔日有食之太尉馬日磾免遣使即拜幽州牧劉虞為太尉封容丘矦蹇碩忌大將軍進與諸常侍共説帝遣進西擊韓遂帝從之進陰知其謀奏遣袁紹收徐兗二州兵須紹還而西以稽行期初帝數失皇子何皇后生子辯養於道人史子眇家號曰史矦王美人生子協董太后自養之號曰董矦群臣請立太子帝以辯輕佻無威儀欲立協猶豫未决㑹疾篤屬恊於蹇碩丙辰帝崩于嘉德殿碩時在内欲先誅何進而立協使人迎進欲與計事進即駕往碩司馬潘隱與進早舊迎而目之進驚馳從儳道歸營引兵入屯百郡邸因稱疾不入戊午皇子辯即皇帝位年十四尊皇后曰皇太后太后臨朝赦天下改元爲光熹封皇弟協爲渤海王協年九歳以後將軍袁隗爲太傅與大將軍何進參錄尚書事進既秉朝政忿蹇碩圖已陰規誅之袁紹因進親客張津勸進悉誅諸宦官進以􅀽氏累世貴寵而紹與從弟虎賁中郎將術皆爲豪桀所歸信而用之復博徴智謀之士何顒荀攸及河南鄭泰等二十餘人以顒為北軍中候攸為黄門侍郎泰為尚書與同腹心攸爽之從孫也蹇碩疑不自安與中常侍趙忠宋典等書曰大將軍兄弟秉國專朝今與天下黨人謀誅先帝左右掃滅我曹但以碩典禁兵故且沈吟今宜共閉上閤急捕誅之中常侍郭勝進同郡人也太后及進之貴幸勝有力焉故親信何氏與趙忠等議下從碩計而以其書示進庚午進使黄門令收碩誅之因悉領其屯兵票騎將軍董重與何進權勢相害中官挾重以為黨助董太后每欲參干政事何太后輙相禁塞董后忿恚詈曰汝今輈張怙汝兄耶吾敕票騎斷何進頭如反手耳何太后聞之以告進五月進與三公共奏孝仁皇后使故中常侍夏惲等交通州郡辜較財利悉入西省故事蕃后不得留京師請遷宫本國奏可辛巳進舉兵圍票騎府收董重免官自殺六月辛亥董后憂怖暴崩民間由是不附何氏辛酉葬孝靈皇帝于文陵何進懲蹇碩之謀稱疾不入陪喪又不送山陵大水秋七月徙渤海王恊為陳留王司徒丁宫罷袁紹復説何進曰前竇武欲誅内寵而反為所害者但坐言語漏泄五營兵士皆服畏中人而竇氏反用之自取禍滅今將軍兄弟並領勁兵部曲將吏皆英俊名士樂盡力命事在掌握此天贊之時也將軍宜一為天下除患以垂名後世不可失也進乃白太后請盡罷中常侍以下以三署郎補其處太后不聽曰中官綂領禁省自古及今漢家故事不可廢也且先帝新弃天下我奈何楚楚與士人共對事乎進難違太后意且欲誅其放縱者紹以為中官親近至尊出納號令今不悉廢後必為患而太后母舞陽君及何苖數受諸宦官賂遺知進欲誅之數白太后為其障蔽又言大將軍專殺左右擅權以弱社稷太后疑以為然進新貴素敬憚中官雖外慕大名而内不能斷故事久不决紹等又為畫䇿多召四方猛將及諸豪傑使並引兵向京城以脅太后進然之主簿廣陵陳琳諌曰諺稱掩目捕雀夫微物尚不可欺以得志况國之大事其可以詐立乎今將軍總皇威握兵要龍驤虎歩高下在心此猶鼓洪爐燎毛髪耳但當速發雷霆行權立斷則天人順之而反委釋利器更徴外助大兵聚㑹彊者為雄所謂倒持干戈授人以柄功必不成秖為亂階耳進不聽典軍校尉曹操聞而笑曰宦者之官古今宜有但世主不當假之權寵使至於此既治其罪當誅元惡一獄吏足矣何至紛紛召外兵乎欲盡誅之事必宣露吾見其敗也初靈帝徴董卓為少府卓上書言所將湟中義從及秦胡兵皆詣臣言牢直不畢禀賜斷絶妻子饑凍牽挽臣車使不得行羗胡憋膓狗態臣不能禁止輙將順安慰増異復上朝廷不能制及帝寢疾璽書拜卓并州牧令以兵屬皇甫嵩卓復上書言臣誤䝉天恩掌戎十年士卒大小相狎彌久戀臣畜養之思為臣奮一旦之命乞將之北州效力邊垂嵩從子酈説嵩曰天下兵柄在大人與董卓耳今怨隙已結埶不俱存卓被詔委兵而上書自請此逆命也彼度京師政亂故敢躊躇不進此懐姦也二者刑所不赦且其凶戾無親將士不附大人今為元帥杖國威以討之上顯忠義下除凶害無不濟也嵩曰違命雖罪專誅亦有責也不如顯奏其事使朝廷裁之乃上書以聞帝以讓卓卓亦不奉詔駐兵河東以觀時變何進召卓使將兵詣京師侍御史鄭泰諌曰董卓彊忍寡義志欲無厭若借之朝政授以大事將恣凶欲以危朝廷明公以親德之重據阿衡之權秉意獨斷誅除有罪誠不宜假卓以為資援也且事留變生殷鑒不遠宜在速决尚書盧植亦言不宜召卓進皆不從泰乃棄官去謂荀攸曰何公未易輔也進府掾王匡騎都尉鮑信皆泰山人進使還郷里募兵并召東郡太守橋瑁屯成臯使武猛都尉丁原將數千人冦河内燒孟津火照城中皆以誅宦官為言董卓聞召即時就道并上書曰中常侍張讓等竊倖承寵濁亂海内臣聞􅀭湯止沸莫若去薪潰癰雖痛勝於内食昔趙鞅興晉陽之甲以逐君側之惡今臣輙鳴鐘鼓如雒陽請收讓等以清姦穢大后猶不從何苖謂進曰始共從南陽來俱以貧賤依省内以致富貴國家之事亦何容易覆水不收宜深思之且與省内和也卓至澠池而進更狐疑使諫議大夫种邵宣詔止之卓不受詔遂前至河南邵迎勞之因譬令還軍卓疑有變使其軍士以兵脅邵邵怒稱詔叱之軍士皆披遂前質責卓卓辭屈乃還軍夕陽亭邵暠之孫也袁紹懼進變計因脅之曰交構已成形埶已露將軍復欲何待而不早决之乎事久變生復為竇氏矣進於是以紹為司􅀠校尉假節專命擊斷從事中郎王允為河南尹紹使雒陽方略武吏司察宦者而促董卓等使馳驛上奏欲進兵平樂觀太后乃恐悉罷中常侍小董門使還里舎唯留進素所私人以守省中諸常侍小董門皆詣進謝罪唯所措置進謂曰天下匃匈正患諸君耳今董卓垂至諸君何不早各就國袁紹勸進便於此决之至于再三進不許紹又爲書告諸州郡詐宣進意使捕案中官親屬進謀積日頗泄中官懼而思變張讓子婦太后之妹也讓向子婦叩頭曰老臣得罪當與新婦俱歸私門唯受恩累世今當遠離宫殿情懷戀戀願復一入直得暫奉望太后陛下顔色然後退就溝壑死不恨矣子婦言於舞陽君入白太后乃詔諸常侍皆復入直八月戊辰進入長樂宫白太后請盡誅諸常侍中常侍張讓叚珪相謂曰大將軍稱疾不臨䘮不送葬今欻入省此意何為竇氏事竟復起邪使潛聽具聞其語乃率其黨數十人持兵竊自側闥入伏省戸下進出因詐以太后詔召進入坐省閤讓等詰進曰天下憒憒亦非獨我曹罪也先帝嘗與太后不快幾至成敗我曹涕泣救解各出家財千萬為禮和悦上意但欲託卿門戸耳今乃欲滅我曹種族不亦太甚乎於是尚方監渠穆㧞劒斬進於嘉德殿前讓珪等為詔以故大尉樊陵為司􅀠校尉少府許相為河南尹尚書得詔板疑之曰請大將軍出共議中黄門以進頭擲與尚書曰何進謀反已伏誅矣進部曲將吳匡張璋在外聞進被害欲引兵入宫宫門閉虎賁中郎將袁術與匡共斫攻之中黄門持兵守閤㑹日暮術因燒南宫青􅃈門欲以脅岀讓等譲等入白太后言大將軍兵反燒宫攻尚書闥因將太后少帝及陳留王劫省内官屬從複道走北宫尚書盧植執戈於閣道䆫下仰數叚珪珪懼乃釋太后太后投閣得免袁紹與叔父隗矯詔召樊陵許相斬之紹及何苗引兵屯朱雀闕下捕得趙忠等斬之吳匡等素怨苗不與進同心而又疑其與宦官通謀乃令軍中曰殺大將軍者即車騎也吏士能為報讎乎皆流涕曰願致死匡遂引兵與董卓弟奉車都尉旻攻殺苗棄其屍於􅁐中紹遂閉北宫門勒兵捕諸宦者無少長皆殺之凡二千餘人或有無須而誤死者紹因進兵排宫或上端門屋以攻省内庚午張讓叚珪等困廹遂將帝與陳留王數十人歩出榖門夜至小平津六璽不自隨公卿無得從者唯尚書盧植河南中部掾閔貢夜至河上貢厲聲質責讓等且曰今不速死吾將殺汝因手劒斬數人讓等惶怖叉手再拜叩頭向帝辭曰臣等死陛下自愛遂投河而死貢扶帝與陳留王夜步逐螢光南行欲還宫行數里得民家露車共乘之至雒舎止辛未帝獨乘一馬陳留王與貢共乘一馬從雒舎南行公卿稍有至者董卓至顯陽苑遠見火起知有變引兵急進未明到城西聞帝在北因與公卿往奉迎於北芒阪下帝見卓將兵卒至恐怖涕泣羣公謂卓曰有詔却兵卓曰公諸人為國大臣不能匡正王室至使國家播蕩何却兵之有卓與帝語語不可了乃更與陳留王語問禍亂由起王荅自初至終無所遺失卓大喜以王為賢且為董太后所養卓自以與太后同族遂有廢立之意是日帝還宫赦天下改光熹為昭寧失傳國璽餘璽皆得之以丁原為執金吾騎都尉鮑信自泰山募兵適至説袁紹曰董卓擁彊兵將有異志今不早圖必為所制及其新至疲勞襲之可禽也紹畏卓不敢發信乃引兵還泰山董卓之入也歩騎不過三千自嫌兵少恐不為遠近所服率四五日輙夜潛出軍近營明旦乃大陳旌鼓而還以為西兵復至雒中無知者俄而進及弟苖部曲皆歸於卓卓又陰使丁原部曲司馬五原吕布殺原而并其衆卓兵於是大盛乃諷朝廷以久雨䇿免司空劉􅀪而代之初蔡邕徙朔方㑹赦得還五原太守王智甫之弟也奏蔡邕謗訕朝廷邕遂亡命江海積十二年董卓聞其名而辟之稱疾不就卓怒詈曰我能族人邕懼而應命到署祭酒甚見敬重舉高第三日之間周歴三臺遷為侍中董卓謂袁紹曰天下之主宜得賢明毎念靈帝令人憤毒董侯似可今欲立之為能勝史侯否人有小智大癡亦知復何如為當且爾劉氏種不足復遺紹曰漢家君天下四百許年恩澤深渥兆民戴之今上冨於春秋未有不善宣於天下公欲廢嫡立庶恐衆不從公議也卓按劒叱紹曰豎子敢然天下之事豈不在我我欲為之誰敢不從爾謂董卓刀為不利乎紹勃然曰天下健者豈惟董公引佩刀横揖徑出卓以新至見紹大家故不敢害紹縣節於上東門逃犇冀州九月癸酉卓大㑹百寮奮首而言曰皇帝闇弱不可以奉宗廟為天下主今欲依伊尹霍光故事更立陳留王何如公卿以下皆惶恐莫敢對卓又抗言曰昔霍光定䇿延年按劒有敢沮大議皆以軍法從事坐者震動尚書盧植獨曰昔太甲既立不明昌邑罪過千餘故有廢立之事今上冨於春秋行無失德非前事之比也卓大怒罷坐將殺植蔡邕為之請議郎彭伯亦諌卓曰盧尚書海内大儒人之望也今先害之天下震怖卓乃止但免植官植遂逃隠於上谷卓以廢立議示太傅袁隗隗報如議甲戌卓復集羣僚於崇德前殿遂脅太后䇿廢少帝曰皇帝在喪無人子之心威儀不類人君今廢為􅀪農王立陳留王恊為帝袁隗解帝璽綬以奉陳留王扶􅀪農王下殿北面稱臣太后鯁涕群臣含悲莫敢言者卓又議太后踧廹永樂宫至令憂死逆婦姑之禮乃遷太后於永安宫赦天下改昭寧為永漢丙子卓酖殺何太后公卿以下不布服㑹葬素衣而已卓又發何苗棺出其尸支解節斷棄於道邊殺苗母舞陽君棄尸於􅁐枳落中詔除公卿以下子弟為郎以􅀘宦官之職侍於殿上乙酉以太尉劉虞為大司馬封襄賁矦董卓自為太尉領前將軍事加節􅀓斧鉞虎賁更封郿矦丙戌以太中太天楊彪為司空甲午以豫州牧黄琬為司徒董卓率諸公上書追理陳蕃竇武及諸黨人悉復其爵位遣使弔祠擢用其子孫自六月雨至干是月冬十月乙巳葬靈思皇后白波賊冦河東董卓遣其將牛輔擊之初南單于於扶羅既立國人殺其父者遂叛共立須卜骨都矦為單于於扶羅詣闕自訟㑹靈帝崩天下大亂於扶羅將數千騎與白波賊合兵冦郡縣時民皆保聚鈔掠無利而兵遂挫傷復欲歸國國人不受乃止河東平陽須卜骨都矦為單于一年而死南庭遂虚其位以老王行國事十一月以董卓為相國贊拜不名入朝不趨劒履上殿十二月戊戌以司徒黄琬爲太尉司空楊彪爲司徒光禄勲荀爽爲司空初尚書武威周毖城門校尉汝南伍瓊説董卓矯桓靈之政擢用天下名士以收衆望卓從之命毖瓊與尚書鄭泰長史何顒等沙汰穢惡顯㧞幽滯於是徴處士荀爽陳紀韓融申屠蟠復就拜爽平原相行至宛陵遷光禄勲視事三日進拜司空自被徴命及登台司凡九十三日又以紀為五官中郎將融為大鴻臚紀寔之子融韶之子也爽等皆畏卓之暴無敢不至獨申屠蟠得徴書人勸之行蟠笑而不荅卓終不能屈年七十餘以壽終卓又以尚書韓馥為冀州牧侍中劉岱為兖州刺史陳留孔伷爲豫州刺史東平張邈為陳留太守潁川張咨為南陽太守卓所親愛並不處顯職但將校而已詔除光熹昭寧永漢三號董卓性殘忍一旦專政據有國家甲兵珍寳威震天下所願無極語賔客曰我相貴無上也侍御史擾龍宗詣卓白事不解劒立撾殺之是時洛中貴戚室第相望金帛財産家家充積卓縱放兵士突其廬舎剽虜資物妻略婦女不避貴賤人情崩恐不保朝夕卓購求袁紹急周毖伍瓊説卓曰夫廢立大事非常人所及袁紹不逹大體恐懼出犇非有它志今急購之埶必為變袁氏樹恩四世門生故吏徧於天下若收豪傑以聚徒衆英雄因之而起則山東非公之有也不如赦之拜一郡守紹喜於免罪必無患矣卓以為然乃即拜紹勃海太守封邟鄉矦又以袁術為後將軍曹操為驍騎校尉術畏卓出犇南陽操變易姓名間行東歸過中牟為亭長所疑執詣縣時縣已被卓書唯功曹心知是操以世方亂不宜拘天下雄雋因白令釋之操至陳留散家財合兵得五千人是時豪傑多欲起兵討卓者袁紹在勃海冀州牧韓馥遣數部從事守之不得動揺東郡太守橋瑁詐作京師三公移書與州郡陳卓罪惡云見逼廹無以自救企望義兵解國患難馥得移請諸從事問曰今當助袁氏邪助董氏邪治中從事劉子惠曰今興兵為國何謂袁董馥有慙色子惠復言兵者凶事不可為首今宜往視他州有發動者然後和之冀州於他州不為弱也他人功未有在冀州之右者也馥然之馥乃作書與紹道卓之惡聽其舉兵孝獻皇帝甲初平元年春正月關東州郡皆起兵以討董卓推渤海太守袁紹為盟主紹自號車騎將軍諸將皆板授官號紹與河内太守玉屯河内冀州牧韓馥留鄴給其軍糧豫州刺史孔伷屯潁川兖州刺史劉岱陳留太守張邈邈弟廣陵大守超東郡太守橋瑁山陽太守袁遺濟北相鮑信與曹操俱屯酸棗後將軍袁術屯魯陽衆各數萬豪傑多歸心袁紹者鮑信獨謂曹操曰夫略不世出能撥亂反正者君也茍非其人雖彊必斃君殆天之所啓乎辛亥赦天下癸酉董卓使郎中令李儒酖殺􅀪農王辯卓議大發兵以討山東尚書鄭泰曰夫政在德不在衆也卓不悦曰如卿此言兵為無用邪泰曰非謂其然也以為山東不足加大兵耳明公出自西州少為將帥閑習軍事袁本初公卿子弟生處京師張孟卓東平長者坐不闚堂孔公緒清談高論噓枯吹生並無軍旅之才臨鋒決敵非公之儔也况王爵不加尊卑無序若恃衆怙力將各棊峙以觀成敗不肯同心共膽與齊進退也且山東承平日乆民不習戰關西頃遭羌冦婦女皆能挾弓而鬭天下所畏者無若并凉之人與羌胡義從而明公擁之以為􅀲牙譬猶驅虎兕以赴犬羊鼓烈風以掃枯葉誰敢禦之無事徴兵以驚天下使患役之民相聚為非弃德恃衆自虧威重也卓乃悦董卓以山東兵盛欲遷都以避之公卿皆不欲而莫敢言卓表河南尹朱儁為太僕以為已副使者召拜儁辭不肯受因曰國家西遷必孤天下之望以成山東之釁臣不知其可也使者曰召君受拜而君拒之不問徙事而君陳之何也儁曰副相國非臣所堪也遷都非計事所急也辭所不堪言其所急臣之宜也由是止不為副卓大㑹公卿議曰高祖都關中十有一世光武宫雒陽於今亦十一世矣案石包䜟宜徙都長安以􅀿天人之意百官皆黙然司徒楊彪曰移都改制天下大事故盤庚遷亳殷民胥怨昔關中遭王莽殘破故光武更都雒邑歴年已久百姓安樂今無故捐宗廟棄園陵恐百姓驚動必有糜沸之亂石包䜟妖邪之書豈可信用卓曰關中肥饒故秦得并吞六國且隴右材木自出杜陵有武帝陶竈并功營之可使一朝而辦百姓何足與議若有前却我以大兵驅之可令詣滄海彪曰天下動之至易安之甚難惟明公慮焉卓作色曰公欲沮國計邪太尉黄琬曰此國之大事楊公之言得無可思卓不荅司空荀爽見卓意壯恐害彪等因從容言曰相國豈樂此邪山東兵起非一日可禁故當遷以圖之此秦漢之埶也卓意小解琬退又為駮議二月乙亥卓以灾異奏免琬彪等以光禄勲趙謙為太尉太僕王允為司徒城門校尉伍瓊督軍校尉周毖固諌遷都卓大怒曰卓初入朝二君勸用善士故卓相從而諸君到官舉兵相圖此二君賣卓卓何用相負庚辰收瓊毖斬之楊彪黄琬恐懼詣卓謝卓亦悔殺瓊毖乃復表彪琬為光禄大夫卓徴京兆尹蓋勲為議郎時左將軍皇甫嵩將兵三萬屯扶風勲密與嵩謀討卓㑹卓亦徴嵩為城門校尉嵩長史梁衍説嵩曰董卓冦掠京邑廢立從意今徴將軍大則危禍小則困辱今及卓在雒陽天子來西以將軍之衆迎接至尊奉令討逆徴兵羣帥袁氏逼其東將軍廹其西此成禽也嵩不從遂就徴勲以衆弱不能獨立亦還京師卓以勲為越騎校尉河南尹朱儁為卓陳軍事卓折儁曰我百戰百勝决之於心卿勿妄説且汙我刀蓋勲曰昔武丁之明猶求箴諫况如卿者而欲杜人之口乎卓乃謝之卓遣軍至陽城值民㑹於社下悉就斬之駕其車重載其婦女以頭繫車轅歌呼還雒云攻賊大獲卓焚燒其頭以婦女與甲兵為婢妾丁亥車駕西遷董卓收諸富室以罪惡誅之没入其財物死者不可勝計悉驅徙其餘民數百萬口於長安歩騎驅蹙更相蹈藉飢餓冦掠積尸盈路卓自留屯畢圭苑中悉燒宫廟官府居家二百里内室屋蕩盡無復雞犬又使吕布發諸帝陵及公卿以下冢墓收其珍寶卓獲山東兵以猪膏塗布十餘匹用纒其身然後燒之先從足起三月乙巳車駕入長安居京兆府舍後乃稍葺宫室而居之時董卓未至朝政大小皆委之王允允外相彌縫内謀王室甚有大臣之度自天子及朝中皆倚允允屈意承卓卓亦雅信焉董卓以袁紹之故戊午殺太傅袁隗太僕袁基及其家尺口以上五十餘人初荆州刺史王叡與長沙太守孫堅共擊零桂賊以堅武官言頗輕之及州郡舉兵討董卓叡與堅亦皆起兵叡素與武陵太守曹寅不相能􅀭言當先殺寅寅懼詐作按行使者檄移堅説叡罪過令收行刑訖以狀上堅承檄即勒兵襲叡叡聞兵至登樓望之遣問欲何為堅前部荅曰兵乆戰勞苦欲詣使君求資直耳叡見堅驚曰兵自求賞孫府君何以在其中堅曰被使者檄誅君叡曰我何罪堅曰坐無所知叡窮迫刮金飲之而死堅前至南陽衆已數萬人南陽太守張咨不肯給軍糧堅誘而斬之郡中震慄無求不獲前到魯陽與袁術合兵術由是得據南陽表堅行破虜將軍領豫州刺史詔以北軍中候劉表爲荆州刺史時冦賊縱横道路梗塞表單馬入宜城請南郡名士蒯良蒯越與之謀曰今江南宗賊甚盛各擁衆不附若袁術因之禍必至矣吾欲徴兵恐不能集其䇿焉出蒯良曰衆不附者仁不足也附而不治者義不足也茍仁義之道行百姓歸之如水之趣下何患徴兵之不集乎蒯越曰袁術驕而無謀宗賊帥多貪暴為下所患若使人示之以利必以衆來使君誅其無道撫而用之一州之人有樂存之心聞君威德必襁負而至矣兵集衆附南據江陵北守襄陽荆州八郡可傳檄而定公路雖至無能為也表曰善乃使越誘宗賊帥至者五十五人皆斬之而取其衆遂徙治襄陽鎮撫郡縣江南悉平董卓在雒陽袁紹等諸軍皆畏其彊莫敢先進曹操曰舉義兵以誅暴亂大衆已合諸君何疑向使董卓倚王室據舊京東向以臨天下雖以無道行之猶足為患今焚燒宫室劫遷天子海内震動不知所歸此天亡之時也一戰而天下定矣遂引兵西將據成臯張邈遣將衛兹分兵隨之進至滎陽汴水遇卓將􅀇菟徐榮與戰操兵敗為流矢所中所乘馬被創從弟洪以馬與操操不受洪曰天下可無洪不可無君遂歩從操夜遁去榮見操所將兵少力戰盡日謂酸􅀥未易攻也亦引兵還操到酸􅀥諸軍十餘萬日置酒高㑹不圖進操取責讓之因為謀曰諸君能聽吾計使勃海引河内之衆臨孟津酸􅀥諸將守成臯據敖倉塞轘轅太谷全制其險使袁將軍率南陽之軍軍丹析入武関以震三輔皆高壘深壁勿與戰益為疑兵示天下形勢以順誅逆可立定也今兵以義動持疑不進失天下望竊為諸君恥之邈等不能用操乃與司馬沛國夏侯惇等詣揚州募兵得千餘人還屯河内頃之酸􅀥諸軍食盡衆散劉岱與橋瑁相惡岱殺瑁以王肱領東郡太守青州刺史焦和亦起兵討董卓務及諸將西行不為民人保障兵始濟河黄巾已入其境青州素殷實甲兵甚盛和毎望冦奔北未嘗接風塵交旗鼓也性好卜筮信鬼神入見其人清談干雲出觀其政賞罰淆亂州遂蕭條悉為丘墟頃之和病卒袁紹使廣陵臧洪領青州以撫之夏四月以幽州牧劉虞為大􅀓道路壅塞信命竟不得通先是幽部應接荒外資費甚廣嵗常割青冀賦調二憶有餘以足之時處處斷絶委輸不至而虞敝衣繩屨食無兼肉務存寛政勸督農桑開上谷胡市之利通漁陽鹽鐵之饒民悦年登榖石三十青徐士庶避難歸虞者百餘萬口虞皆收視温恤為安立生業流民皆忘其遷徙焉五月司空荀爽薨六月辛丑以光禄大夫种拂為司空拂邵之父也董卓遣大鴻臚韓融少府陰脩執金吾胡母班將作大匠吳脩越騎校尉王瓌安集關東解譬袁紹等胡母班吳脩王瓌至河内袁紹使王匡悉收擊殺之袁術亦殺陰脩惟韓融以名德免董卓壞五銖錢更鑄小錢悉取雒陽及長安銅人鐘虡飛廉銅馬之屬以鑄之由是貨賤物貴榖石至數萬錢冬孫堅與官屬㑹飲於魯陽城東董卓步騎數萬猝至堅方行酒談笑整頓部曲無得妄動後騎漸益堅徐罷坐導引入城乃曰向堅所以不即起者恐兵相蹈藉諸君不得入耳卓兵見其整不敢攻而還王匡屯河陽津董卓襲擊大破之左中郎將蔡邕議孝和以下廟號稱宗者皆宜省去以遵先典從之中郎將徐榮薦同郡故冀州刺史公孫度於董卓卓以為遼東太守度到官以法誅滅郡中名豪大姓百餘家郡中震慄乃東伐高句驪西擊烏桓語所親吏柳毅陽儀等曰漢祚將絶當與諸卿圖王耳於是分遼東為遼西中遼郡各置太守越海收東萊諸縣置營州刺史自立為遼東矦平州牧立漢二祖廟承制郊祀天地藉田乗鵉路設旄頭羽騎資治通鑑卷第五十九
