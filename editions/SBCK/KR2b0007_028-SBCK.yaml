body:
  text: 臣光曰忠臣之事君也責其所難則其易者不勞而正補其所短則其長者不勸而遂孝元踐位之初虚心以問禹禹宜先其所急後其所緩然則優游不斷讒佞用權當時之大患也而禹不以為言恭謹節儉孝元之素志也而禹孜孜言之何哉使禹之智不足以知烏得為賢知而不言為罪愈大矣匈奴呼韓邪單于復上書言民衆困乏詔雲中五原郡轉榖二萬斛以給之是歳􅀄置戊巳校尉使屯田車師故地二年春正月上行幸甘泉郊泰畤樂陵矦史髙以外屬領尚書事前將軍蕭望之光禄大夫周堪為之副望之名儒與堪皆以師傅舊恩天子任之數宴見言治亂陳王事望之選白宗室明經有行散􅀐諫大夫劉更生給事中與侍中金敞並拾遺左右四人同心謀議勸導上以古制多所欲匡正上甚鄕納之史髙充位而已由此與望之有隙中書令􅀪恭僕射石顯自宣帝時乆典樞機明習文灋帝即位多疾以顯乆典事中人無外黨精專可信任遂委以政事無小大因顯白決貴幸傾朝百僚皆敬事顯顯為人巧慧習事能深得人主微指内深賊持詭辯以中傷人忤恨睚眦輒被以危灋亦與車􅀐將軍髙為表裏議論常獨持故事不從望之等望之等患苦許史放縱又疾恭顯擅權建白以為中書政本國家樞機宜以通眀公正處之武帝游宴後庭故用宦者非古制也宜罷中書宦官應古不近刑人之義由是大與髙恭顯忤上初即位謙讓重改作議乆不定出劉更生為宗正望之堪數薦名儒茂材以僃諌官㑹稽鄭朋隂欲附望之上䟽言車􅀐將軍髙遣客為姦利郡國及言許史子弟罪過章視周堪堪白令朋待詔金馬門朋奏記望之曰今將軍規撫云若管晏而休遂行日昊至周召乃留乎若管晏而休則下走將歸延陵之臯没齒而已矣如將軍興周召之遺業親日昊之兼聽則下走其庶㡬願竭區區奉萬分之一望之始見朋接待以意後知其傾邪絶不與通朋楚士怨恨更求入許史推所言許史事曰皆周堪劉更生敎我我􅀜東人何以知此於是侍中許章白見朋朋出揚言曰我見言前將軍小過五大罪一待詔華龍行汙穢欲入堪等堪等不納亦與朋相結恭顯令二人告望之等謀欲罷車􅀐將軍䟽退許史狀􅇋望之出休日令朋龍上之事下􅀪恭問狀望之對曰外戚在位多奢淫欲以匡正國家非為邪也恭顯奏望之堪更生朋黨相稱舉數譛訴大臣毀離親戚欲以專擅權埶為臣不忠誣上不道請謁者召致廷尉時上􅀄即位不省召致廷尉為下獄也可其奏後上召堪更生曰繫獄上大驚曰非但廷尉問邪以責恭顯皆叩頭謝上曰令出視事恭顯因使史髙言上新即位未以德化聞於天下而先驗師傅旣下九卿大夫獄冝因決免於是制詔丞相御史前將軍望之傅朕八年無它罪過今事乆逺識忘難明其赦望之罪收前將軍光禄勲印綬及堪更生皆免為庶人二月丁巳立弟竟為清河王戊午隴西地震敗城郭屋室壓殺人衆三月立廣陵厲王子霸為王詔罷黄門乗輿狗馬水衡禁囿宜春下􅁐少府佽飛外池嚴籞池田假與貧民又詔赦天下舉茂材異等直言極諌之士夏四月丁巳立子驁為皇太子待詔鄭朋薦太原太守張敞先帝名臣宜傅輔皇太子上以問蕭望之望之以為敞能吏任治煩亂材輕非師傅之器天子使使者徴敞欲以為左馮翊㑹病卒詔賜蕭望之爵􅀜内矦給事中朝朔望􅀜東饑齊地人相食秋七月己酉地復震上復徴周堪劉更生欲以為諌大夫弘恭石顯白皆以為中郎上器重蕭望之不已欲􅀝以為相恭顯及許史子弟侍中諸曹皆側目於望之等更生乃使其外親上變事言地震殆為恭等不為三獨夫動臣愚以為宜退恭顯以章蔽善之罰進望之等以通賢者之路如此太平之門開災異之原塞矣書奏恭顯疑其更生所為白請考姦詐辭果服遂逮更生繫獄免為庶人會望之子散􅀐中郎伋亦上書訟望之前事事下有司復奏望之前所坐明白無譖訴者而敎子上書稱引亡辜之詩失大臣體不敬請逮捕弘恭石顯等知望之素髙節不詘辱建白望之前幸得不坐復賜爵邑不悔過服罪深懐怨望敎子上書歸非於上自以託師傅終必不坐非頗屈望之於牢獄塞其怏怏心則聖朝無以施恩厚上曰蕭大傅素剛安肯就吏顯等曰人命至重望之所坐語言薄罪必無所憂上乃可其奏冬十二月顯等封詔以付謁者敕令召望之手付因令太常急發執金吾車􅀐馳圍其第使者至召望之望之以問門下生魯國朱雲雲者好節士勸望之自裁於是望之仰天歎曰吾甞僃位將相年踰六十矣老入牢獄苟求生活不亦鄙乎字謂雲曰游趣和藥來無乆留我死竟飲鴆自殺天子聞之驚拊手曰曩固疑其不就牢獄果然殺吾賢傅是時太官方上晝食上乃卻食爲之涕泣哀動左右於是召顯等責問以議不詳皆免冠謝良乆然後已上追念望之不忘每歳時遣使者祠祭望之冢終帝之丗臣光曰甚矣孝元之爲君易欺而難寤也夫恭顯之譖愬望之其邪說詭計誠有所不能辨也至於始疑望之不肯就獄恭顯以爲必無憂已而果自殺則恭顯之欺亦明矣在中智之君孰不感動奮發以厎邪臣之罰孝元則不然雖涕泣不食以傷望之而終不能誅恭顯纔得其免冠謝而已如此則姦臣安所懲乎是使恭顯得肆其邪心而無復忌憚者也是歳弘恭病死石顯爲中書令􅀄武帝滅南越開置珠厓儋耳郡在海中洲上吏卒皆中國人多侵陵之其民亦􅁀惡自以阻絶數犯吏禁率數年壹反殺吏漢輒發兵擊定之二十餘年閒凡六反至宣帝時又再反上即位之明年珠厓山南縣反發兵擊之諸縣更叛連年不定上博謀於羣臣欲大發軍待詔賈􅂢之曰臣聞堯舜禹之聖德地方不過數千里西􅀍流沙東漸于海朔南曁聲教言欲與聲敎則治之不欲與者不彊治也故君臣歌德含氣之物各得其宜武丁成王殷周之大仁也然地東不過江黃西不過氐羌南不過蠻荆北不過朔方是以頌聲並作視聽之􅀋咸樂其生越裳氏重九譯而獻此非兵革之所能致也以至于秦興兵逺攻貪外虚内而天下潰畔孝文皇帝偃武行文當此之時斷獄數百賦役輕􅂤孝武皇帝厲兵馬以攘四夷天下斷獄萬數賦煩役重冦賊並起軍旅數發父戰死於前子􅃲傷於後女子乗亭障􅀌兒號於道老母寡婦飲泣巷哭是皆廓地泰大征伐不休之故也今􅀜東民衆乆困流離道路人情莫親父母莫樂夫婦至嫁妻賣子灋不能禁義不能止此社稷之憂也今陛下不忍悁悁之忿欲驅士衆擠之大海之中快心幽冥之地非所以救助饑饉保全元元也詩云蠢爾蠻荆大邦為讎言聖人起則後服中國衰則先畔自古而患之何况乃復其南方萬里之蠻乎駱越之人父子同川而浴相習以鼻飲與禽獸無異本不足郡縣置也顓顓獨居一海之中霧露氣濕多毒草蟲虵水土之害人未見虜戰士自死又非獨珠厓有珠犀瑇瑁也棄之不足惜不擊不損威其民譬猶魚鼈何足貪也臣竊以往者􅆧軍言之暴師曾未一年兵出不踰千里費四十餘萬萬大司農錢盡乃以少府禁錢續之夫一隅為不善費尚如此況於勞師逺攻亡士毋功乎求之往古則不合施之當今又不便臣愚以為非冠帶之國禹貢所及春秋所治皆可且無以為願遂棄珠厓專用恤􅀜東為憂上以問丞相御史御史大夫陳萬年以為當擊丞相于定國以為前日興兵擊之連年護軍都尉校尉及丞凡十一人還者二人卒士及轉輸死者萬人以上費用三萬萬餘尚未能盡降今􅀜東困乏民難揺動􅂢之議是上從之􅂢之賈誼曾孫也三年春詔曰珠厓虜殺吏民背畔為逆今廷議者或言可擊或言可守或欲棄之其指各殊朕日夜惟思議者之言羞威不行則欲誅之狐疑辟難則守屯田通于時變則憂萬民夫萬民之饑餓與逺蠻之不討危孰大焉且宗廟之祭凶年不僃況乎辟不嫌之辱哉今􅀜東大困倉庫空虚無以相贍又以動兵非特勞民凶年隨之其罷珠厓郡民有慕義欲内屬便處之不欲勿彊夏四月乙未晦茂陵白鶴館災赦天下夏旱立長沙􅌆王弟宗為王長信少府貢禹上言諸離宫及長樂宫衞可減其太半以寛繇役六月詔曰朕惟烝庶之饑寒逺離父母妻子勞於非業之作衞於不居之宫恐非所以佐隂陽之道也其罷甘泉建章宫衞令就農百官各省費條奏毋有所諱是歳上復擢周堪為光禄勲堪弟子張猛為光禄大夫給事中大見信任四年春正月上行幸甘泉郊泰畤三月行幸河東祠后土赦汾隂徒五年春正月以周子南君為周承休矦三月上行幸雍祠五畤夏四月有星孛于參上用諸儒貢禹等之言詔大官毋日殺所具各減半乗輿秣馬無乏正事而已罷角抵上林宫館希御幸者齊三服官北假田官鹽鐵官常平倉博士弟子毋置貟以廣學者令民有能通一經者皆復省刑罰七十餘事陳萬年卒六月辛酉長信少府貢禹為御史大夫禹前後言得失書數十上上嘉其質直多采用之匈奴郅支單于自以道逺又怨漢擁護呼韓邪而不助己困辱漢使者江乃始等遣使奉獻因求侍子漢議遣衞司馬谷吉送之御史大夫貢禹博士東海匡衡以為郅支單于郷化未醇所在絶逺宜令使者送其子至塞而還吉上書言中國與夷狄有羈縻不絶之義今旣養全其子十年德澤甚厚空絶而不送近從塞還示棄􅂢不畜使無郷從之心棄前恩立後怨不便議者見前江乃始無應敵之數智勇俱困以致恥辱即豫爲臣憂臣幸得建彊漢之節承明聖之詔宣諭厚恩不宜敢桀若懷禽獸心加無道於臣則單于長嬰大罪必遁逃逺舎不敢近邊没一使以安百姓國之計臣之願也願送至庭上許焉旣至郅支單于怒竟殺吉等自知負漢又聞呼韓邪益強恐見襲擊欲逺去㑹康居王數爲烏孫所困與諸翕矦計以爲匈奴大國烏孫素服屬之今郅支單于困阨在外可迎置東邊使合兵取烏孫以立之長無匈奴憂矣即使使至堅昆通語郅支郅支素恐又怨烏孫聞康居計大說遂與相結引兵而西郅支人衆中寒道死餘財三千人到康居康居王以女妻郅支郅支亦以女予康居王康居甚尊敬郅支欲􅀝其威以脅諸國郅支數借兵擊烏孫深入至赤谷城殺略民人敺畜産去烏孫不敢追西邊空虚不居者五千里冬十二月丁未貢禹卒丁巳長信少府薛廣德為御史大夫永光元年春正月上行幸甘泉郊泰畤禮畢因留射獵薛廣德上書曰竊見􅀜東困極人民流離陛下日撞亡秦之鍾聽鄭衞之樂臣誠悼之今士卒暴露從官勞倦願陛下亟反宫思與百姓同憂樂天下幸甚上即日還二月詔丞相御史舉質樸敦厚遜讓有行者光禄歳以此科第郎從官三月赦天下雨雪隕霜殺桑秋上酎祭宗廟出便門欲御樓舩薛廣德當乗輿車免冠頓首曰宜從橋詔曰大夫冠廣德曰陛下不聽臣臣自刎以血汙車輪陛下不得入廟矣上不說先敺光禄大夫張猛進曰臣聞主聖臣直乗舩危就橋安聖主不乗危御史大夫言可聽上曰曉人不當如是邪乃從橋九月隕霜殺稼天下大饑丞相于定國大司馬車􅀐將軍史髙御史大夫薛廣德俱以災異乞骸骨賜安車駟馬黃金六十斤罷太子太傅韋玄成為御史大夫廣德歸縣其安車以傳示子孫為榮帝之為太子也從太中大夫孔霸受尚書及即位賜霸爵􅀜内矦號襃成君給事中上欲致霸相位霸為人謙退不好權埶常稱爵位泰過何德以堪之御史大夫屢缺上輒欲用霸霸讓位自陳至于再三上深知其至誠乃弗用以是敬之賞賜甚厚戊子侍中衞尉王接為大司馬車􅀐將軍石顯憚周堪張猛等數譛毀之劉更生懼其傾危上書曰臣聞舜命九官濟濟相讓和之至也衆臣和於朝則萬物和於野故簫韶九成而鳳皇來儀至周幽厲之際朝廷不和轉相非怨則日月薄食水泉沸騰山谷易處霜降失節由此觀之和氣致祥乖氣致異祥多者其國安異衆者其國危天地之常經古今之通義也今陛下開三代之業招文學之士優游寛容使得並進今賢不肖渾殽白黒不分邪正雜糅忠讒並進章交公車人滿北軍朝臣舛午膠戾乖剌更相讒愬轉相是非所以營惑耳目感移心意不可勝載分曹為黨往往羣朋將同心以䧟正臣正臣進者治之表也正臣䧟者亂之機也乗治亂之機未知孰任而災異數見此臣所以寒心者也初元以來六年矣按春秋六年之中災異未有稠如今者也原其所以然者由讒邪並進也讒邪之所以並進者由上多疑心旣已用賢人而行善政如或譛之則賢人退而善政還矣夫執狐疑之心者來讒賊之口持不斷之意者開羣枉之門讒邪進則衆賢退羣枉盛則正士消故易有否泰小人道長君子道消則政日亂君子道長小人道消則政日治昔者鯀共工驩兠與舜禹雜處堯朝周公與管蔡竝居周位當是時迭進相毀流言相謗豈可勝道哉帝堯成王能賢舜禹周公而消共工管蔡故以大治榮華至今孔子與季孟偕仕於魯李斯與叔孫俱宦於秦定公始皇賢季孟李斯而消孔子叔孫故以大亂汙辱至今故冶亂榮辱之端在所信任信任旣賢在於堅固而不移詩云我心匪石不可轉也言守善篤也易曰渙汗其大號言號令如汗汗出而不反者也今出善令未能踰時而反是反汗也用賢未能三旬而退是轉石也論語曰見不善如探湯今二府奏佞讇不當在位歷年而不去故出令則如反汗用賢則如轉石去佞則如拔山如此望隂陽之調不亦難乎是以羣小窺見閒隙縁飾文字巧言醜詆流言飛文譁於民閒故詩云憂心悄悄愠于羣小小人成羣誠足愠也昔孔子與顔淵子貢更相稱譽不為朋黨禹稷與臯陶傳相汲引不為比周何則忠於為國無邪心也今佞邪與賢臣並交㦸之内合黨共謀違善依惡歙歙訿訿數設危險之言欲以傾移主上如忽然用之此天地之所以先戒災異之所以重至者也自古明聖未有無誅而治者也故舜有四放之罰而孔子有兩觀之誅然後聖化可得而行也今以陛下明知誠深思天地之心覽否泰之卦歷周唐之所進以為灋原秦魯之所消以為戒考祥應之福省災異之禍以揆當丗之變放逺佞邪之黨壊散險詖之聚杜閉羣枉之門廣開衆正之路決斷狐疑分别猶豫使是非炳然可知則百異消滅而衆祥並至太平之基萬丗之利也顯見其書愈與許史比而怨更生等是歳夏寒日青無光顯及許史皆言堪猛用事之咎上内重堪又患衆口之􅎊潤無所取信時長安令楊興以材能幸常稱譽堪上欲以為助乃見問興朝臣斷斷不可光禄勲何邪興者傾巧士謂上疑堪因順指曰堪非獨不可於朝廷自州里亦不可也臣見衆人聞堪前與劉更生等謀毀骨肉以為當誅故臣前書言堪不可誅傷為國養恩也上曰然此何罪而誅今宜柰何興曰臣愚以為可賜爵􅀜内矦食邑三百户勿令典事眀主不失師傅之恩此最䇿之得也上於是疑之司􅀠校尉琅邪諸葛豐始以特立剛直著名於朝數侵犯貴戚在位多言其短後坐春夏繫治人徙城門校尉豐於是上書告堪猛罪上不直豐乃制詔御史城門校尉豐前與光禄勲堪光禄大夫猛在朝之時數稱言堪猛之美豐前爲司􅀠校尉不順四時修灋度專作苛􅁀以獲虚威朕不忍下吏以爲城門校尉不内省諸已而反怨堪猛以求報舉告按無證之辭􅁀揚難驗之罪毀譽恣意不顧前言不信之大也朕憐豐之􅂄老不忍加刑其免爲庶人又曰豐言堪猛貞信不立朕閔而不治又惜其材能未有所効其左遷堪爲河東太守猛槐里令臣光曰諸葛豐之於堪猛前譽而後毀其志非爲朝廷進善而去姦也欲比周求進而已矣斯亦鄭朋􅀭興之流烏在其為剛直哉人君者察美惡辨是非賞以勸善罰以懲姦所以為治也使豐言得實則豐不當絀若其誣罔則堪猛何辜焉今兩責而俱棄之則美惡是非果何在哉賈􅂢之與楊興善􅂢之數短石顯以故不得官稀復進見興新以材能得幸􅂢之謂興曰京兆尹缺使我得見言君蘭京兆尹可立得興曰君房下筆言語妙天下使君房為尚書令勝五鹿充宗逺甚􅂢之曰令我得代充宗君蘭為京兆京兆郡國首尚書百官本天下眞大冶士則不隔矣􅂢之復短石顯興曰顯方貴上信用之今欲進第從我計且與合意即得入矣􅂢之即與興共爲薦顯奏稱譽其美以爲宜賜爵􅀜内矦引其兄弟以爲諸曹又共爲薦興奏以爲可試守京兆尹石顯聞知白之上乃下興􅂢之獄令顯治之奏興􅂢之懐詐偽更相薦譽欲得大位罔上不道􅂢之竟坐棄市興髠鉗爲城旦臣光曰君子以正攻邪猶懼不克況􅂢之以邪攻邪其能免乎徙清河王竟爲中山王匈奴呼韓邪單于民衆益盛塞下禽獸盡單于足以自衞不畏郅支其大臣多勸單于北歸者乆之單于竟北歸庭民衆稍稍歸之其國遂定二年春二月赦天下丁酉御史大夫韋玄成爲丞相右扶風鄭弘爲御史大夫三月壬戌朔日有食之夏六月赦天下上問給事中匡衡以地震日食之變衡上䟽曰陛下躬聖德開太平之路閔愚吏民觸灋抵禁比年大赦使百姓得改行自新天下幸甚臣竊見大赦之後姦邪不為衰止今日大赦明日犯灋相隨入獄此殆導之未得其務也今天下俗貪財賤義好聲色上侈靡親戚之恩薄㛰姻之黨隆苟合徼幸以身設利不改其原雖歳赦之刑猶難使錯而不用也臣愚以為宜壹曠然大變其俗夫朝廷者天下之楨幹也朝有變色之言則下有爭􅃲之患上有自專之士則下有不讓之人上有克勝之佐則下有傷害之心上有好利之臣則下有盗竊之民此其本也治天下者審所上而已敎化之流非家至而人說之也賢者在位能者布職朝廷崇禮百僚敬讓道德之行由内及外自近者始然後民知所灋遷善日進而不自知也詩曰商邑翼翼四方之極今長安天子之都親承聖化然其習俗無以異於逺方郡國來者無所灋則或見侈靡而放効之此敎化之原本風俗之樞機宜先正者也臣聞天人之際精祲有以相盪善惡有以相推事作乎下者象動乎上隂變則静者動陽蔽則明者晻水旱之災隨類而至陛下祗畏天戒哀閔元元宜省靡麗考制度近忠正逺巧佞以崇至仁匡失俗道德弘於京師淑問􅀭乎疆外然後大化可成禮讓可興也上說其言遷衡為光禄大夫荀恱論曰夫赦者權時之宜非常典也漢興承秦兵革之後大愚之丗比屋可刑故設三章之灋大赦之令蕩滌穢流與民更始時埶然也後丗承業襲而不革失時宜矣若惠文之丗無所赦之若孝景之時七國皆亂異心並起姦詐非一及武帝末年賦役繁興羣盜並起加以太子之事巫蠱之禍天下紛然百姓無聊人不自安及光武之際撥亂之後如此之比宜為赦矣秋七月隴西羌彡姐旁種反詔召丞相韋玄成等入議是時歳比不登朝廷方以為憂而遭羌變玄成等漠然莫有對者右將軍馮奉丗曰羌虜近在竟内背畔不以時誅無以威制逺蠻臣願帥師討之上問用兵之數對曰臣聞善用兵者役不再興糧不三載故師不乆暴而天誅亟決往者數不料敵而師至於折傷再三發調則曠日煩費威武虧矣今反虜無慮三萬人灋當倍用六萬人然羌戎弓矛之兵耳器不犀利可用四萬人一月足以決丞相御史兩將軍皆以爲民方收斂時未可多發發萬人屯守之且足奉丗曰不可天下􅀍饑饉士馬羸耗守戰之僃乆廢不簡夷狄皆有輕邊吏之心而羌首難今以萬人分屯數處虜見兵少必不畏懼戰則挫兵病師守則百姓不救如此怯弱之形見羌人乗利諸種並和相扇而起臣恐中國之役不得止於四萬非財幣所能解也故少發師而曠日與一舉而疾決利害相萬也固爭之不能得有詔益二千人於是遣奉丗將萬二千人􅀐以將屯為名典屬國任立護軍都尉韓昌為偏禆到隴西分屯三處昌先遣兩校尉與羌戰羌虜盛多皆為所破殺兩校尉奉丗具上地形部衆多少之計願益三萬六千人乃足以決事書奏天子大為發兵六万餘人八月拜太常弋陽矦任千秋為奮武將軍以助之冬十月兵畢至隴西十一月並進羌虜大破斬首數千級餘皆走出塞兵未決間漢復發募士萬人拜定襄太守韓安國為建威將軍未進聞羌破而還詔罷吏士頗留屯田備要害處資治通鑑卷第二十八
