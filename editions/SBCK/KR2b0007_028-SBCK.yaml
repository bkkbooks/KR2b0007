front:
  text: 或人相食轉旁郡錢榖以相救上素聞琅邪王吉貢禹皆眀經潔行遣使者徴之吉道病卒禹至拜為諌大夫上數虚己問以政事禹奏言古者人君節儉什一而税亡它賦役故家給人足髙祖孝文孝景皇帝宫女不過十餘人廐馬百餘匹後丗爭為奢侈轉轉益甚臣下亦相放效臣愚以為如太古難宜少放古以自節焉方今宫室已定無可柰何矣其餘盡可減損故時齊三服官輸物不過十笥方今齊三服官作工各數千人一歳費數鉅萬廐馬食粟將萬匹武帝時又多取好女至數千人以填後宫及棄天下多藏金錢財物鳥獸魚鼈凡百九十物又皆以後宫女置於園陵至孝宣皇帝時陛下惡有所言羣臣亦隨故事甚可痛也故使天下承化取女皆大過度諸矦妻妾或至數百人豪富吏民畜歌者至數十人是以内多怨女外多曠夫及衆庶葬埋皆虚地上以實地下其過自上生皆在大臣循故事之辠也唯陛下深察古道從其儉者大減損乗輿服御器物三分去二擇後宫賢者留二十人餘悉歸之及諸陵園女無子者宜悉遣廐馬可無過數十匹獨舎長安城南􅁐地以爲田獵之囿方今天下饑饉可無大自損減以救之稱天意乎天生聖人蓋爲萬民非獨使自娛樂而已也天子納善其言下詔令諸宫館希御幸者勿繕治太僕減榖食馬水衡省肉食獸
