body:
  text: 領軍將軍徐度出東􅀜侵齊戊子至合肥燒齊船三千艘歐陽頠等出南康頠屯豫章之苦竹灘􅀓泰據蹠口城余孝頃遣其弟孝勵守郡城自出豫章據石頭巴山太守熊曇朗誘頠共襲髙州刺史黄法􅉤又語法􅉤約共破頠且曰事捷與我馬仗遂出軍與頠俱進至法􅉤城下曇朗陽敗走法􅉤乗之頠失援而走曇朗取其馬仗歸于巴山周文育軍少船余孝頃有船在上牢文育遣軍主焦僧度襲之盡取以歸仍於豫章立柵軍中食盡諸將欲退文育不許使人間行遺周廸書約爲兄弟廸得書甚喜許饋以糧於是文育分遣老弱乗故船㳂流俱下燒䂊章栅僞􅀂遁去者孝頃望之大喜不復設備文育由間道兼行據芊韶芊韶上流則歐陽頠蕭孜下流則􅀓泰余孝頃營文育據其中間築城饗士頠等大駭頠退入泥溪文育遣嚴威將軍周鐵虎等襲頠癸巳擒之文育盛陳兵甲與頠乗舟而宴廵蹠口城下使其將丁法洪攻泰擒之孜孝頃退走甲午周以于謹爲大􅀓大宗伯侯莫陳崇爲太保􅀳公護爲大􅃁宰柱國武川賀蘭祥爲大司馬髙陽公逹奚武爲大司㓂周人殺魏㳟帝三月庚子周文育送歐陽頠􅀓泰于建康丞相覇先與頠有舊釋而厚待之周􅀳公護以趙景公獨孤信名重不欲顯誅之己酉逼令自殺甲辰以司空王琳爲湘郢二州刺史曲江侯勃在南康聞歐陽頠等敗軍中忷懼甲寅德州刺史陳法武前衡州刺史譚丗逺攻勃殺之夏四月己邜鑄四柱錢一當二十齊遣使請和壬午周王謁成陵乙酉還宫齊以太師斛律金爲右丞相前大將軍可朱渾道元爲太􅀓開府儀同三司賀拔仁爲太保尚書令常山王演爲司空録尚書事長廣王湛爲尚書令右僕射楊愔爲左僕射仍加開府儀同三司幷省尚書右僕射崔暹爲左僕射上黨王渙録尚書事丁亥周王享太廣壬辰改四柱錢一當十丙申復閉細錢故曲江侯勃主帥蘭敱襲殺譚丗逺軍主夏侯明徹殺敱持勃首降勃故記室李賀藏奉懷安侯任據廣州蕭孜余孝頃猶據石頭爲兩城各居其一多設船艦夾水而陳丞相覇先遣平南將軍侯安都助周文育擊之戊戌安都潜師夜燒其船艦文育帥水軍安都帥歩􅀐進攻之蕭孜出降孝頃逃歸新呉文育等引兵還丞相覇先以歐陽頠聲著南土復以頠爲衡州刺史使討嶺南未至其子紇已克始興頠至嶺南諸郡皆降遂克廣州嶺南悉平周儀同三司齊􅁤謂御正中大夫薛善曰軍國之政當歸天子何得猶在權門善以告􅀳公護護殺之以善爲中外府司馬五月戊辰余孝頃遣使詣丞相府乞降王琳旣不就徵大治舟艦將攻陳覇先六月戊寅覇先以開府儀同三司侯安都爲西道都督周文育爲南道都督將舟師二萬㑹武昌以擊之秋七月辛亥周王享太廟河南北大蝗齊主問於魏郡丞崔叔瓉曰何故致蝗對曰五行志土功不時蝗蟲爲災今外築長城内興三臺殆以此乎齊主大怒使左右敺之擢其髮以溷沃其頭曳足以出叔瓉季舒之兄也八月丁邜周人歸梁丗祖之柩及諸將家屬千餘人於王琳戊辰周王祭太社甲午進丞相覇先位太􅀓加黄􅃏殊禮賛拜不名九月辛丑進丞相爲相國㧾百揆封陳公備九錫陳國置百司周孝􅉖帝性剛果惡􅀳公護之専權司㑹李植自太祖時爲相府司録參掌朝政軍司馬孫􅁪亦乆居權要及護執政植􅁪恐不見容乃與宫伯乙弗鳯賀拔提等共譛之於周王植􅁪曰護自誅趙貴以來威權日盛謀臣􅀫將争往附之大小之政皆决於護以臣􅀚之將不守臣節願陛下早圗之王以爲然鳯提曰以先王之明猶委植􅁪以朝政今以事付二人何患不成且護常自比周公臣聞周公攝政七年陛下安能七年邑邑如此乎王愈信之數引武士於後園講習爲執􅅞之􅀔植等又引宫伯張光洛同謀光洛以告護護乃出植爲梁州刺史􅁪爲潼州刺史欲散其謀後王思植等毎欲召之護泣諌曰天下至親無過兄弟􅀂兄弟尚相疑它人誰可信者太祖以陛下冨於春秋屬臣後事臣情兼家國實願竭其股肱􅀂陛下親鍳萬機威加四海臣死之日猶生之年但恐除臣之後姦回得志非唯不利陛下亦將傾覆社稷使臣無面目見太祖於九泉且臣旣爲天子之兄位至宰相尚復何求願陛下勿信䜛人之言踈弃骨肉王乃止不召而心猶疑之鳯等益懼密謀滋甚刻日召群公入醼因執護誅之張光洛又以告護護乃召柱國賀蘭祥領軍尉遟綱等謀之祥等􅂆護廢立時綱緫領禁兵護遣綱入宫召鳯等議事及至以次執送護第因罷散􅀫衞兵王方悟獨在内殿令宫人執兵自守護遣賀蘭祥逼王遜位幽於舊第悉召公卿㑹議廢王爲畧陽公迎立歧州刺史寕都公毓公卿皆曰此公之家事敢不唯命是聽乃斬鳯等於門外孫􅁪亦伏誅時李植父柱國大將軍逺鎮弘農護召逺及植還朝逺疑有變沈呤乆之乃曰大丈夫寕爲忠􅀑安可作叛臣邪遂就徵旣至長安護以逺功名素重猶欲全之引與相見謂之曰公兒遂有異謀非止屠戮護身乃是傾危宗社叛臣賊子理冝同疾公可早爲之所乃以植付逺逺素愛植植又口辯自陳􅀄無此謀逺謂爲信然詰朝將植謁護護謂植已死左右白植亦在門護大怒曰陽平公不信我乃召入仍命逺同坐令畧陽公與植相質於逺前植辭窮謂畧陽公曰本爲此謀欲安社稷利至尊耳今日至此何事云云逺聞之自投於牀曰􅀂爾誠合萬死於是護乃害植并逼逺令自殺植弟叔詣叔謙叔譲亦死餘子以㓜得免􅀄逺弟開府儀同三司穆知植非保家之主每􅂆逺除之逺不能用及逺臨刑泣謂穆曰吾不用汝言以至此穆當從坐以前言獲免除名爲民及其子弟亦免官植弟浙州刺史基尚義歸公主當從坐穆請以二子代基命護两釋之後月餘護弑畧陽公黜王后元氏爲尼癸亥寕都公自歧州至長安甲子即天王位大赦冬十月戊辰進陳公爵爲王辛未梁敬帝禪位于陳癸酉周魏武公李弼卒陳王使中書舎人劉師知引宣猛將軍沈恪勒兵入宫衞送梁主如别宫恪排闥見王叩頭謝曰恪身經事蕭氏今日不忍見此分受死耳决不奉命王嘉其意不復逼更以盪主王僧志代之乙亥王即皇帝位于南郊還宫大赦改元奉梁敬帝爲江隂王梁太后爲太妃皇后爲妃以給事黄門侍郎蔡景歴爲秘書􅁥中書通事舎人是時政事皆由中書省置二十一局各當尚書諸曹揔國機要尚書唯聽受而已丙子上幸鍾山祠蔣帝廟庚辰上出佛牙於杜姥宅設無遮大㑹帝親出闕前膜拜辛巳追尊皇考文讃爲景皇帝廟號太祖皇妣董氏曰安皇后追立前夫人錢氏爲昭皇后丗子克爲孝懷太子立夫人章氏爲皇后章后烏程人也置刪定郎治律令乙酉周王祀圜丘丙戌祀方丘甲午􅀕太社戊子太祖神主祔太廟七廟始共用一太牢始祖薦首餘皆骨體侯安都至武昌王琳將樊猛弃城走周文育自豫章㑹之安都聞上受禪歎曰吾今兹必敗戰無名矣時两將俱行不相統攝部下交争稍不相平軍至郢州琳將潘純陀於城中遥射官軍安都怒進軍圍之未克而王琳至弇口安都乃釋郢州悉衆詣沌口留沈㤗一軍守漢曲安都遇風不得進琳據東岸安都等據西岸相持數日乃合􅀾安都等大敗安都文育及禆將徐敬成周鐡虎程靈洗皆爲琳所擒沈㤗引軍奔歸琳引見諸將與語周鐡虎辝氣不屈琳殺鐡虎而囚安都等揔以一長鎻繫之置琳所坐䑽下令所親宦者王子􅀳掌視之琳乃移湘州軍府就郢城又遣其將樊猛襲據江州十一月丙申上立兄子蒨爲臨川王頊爲始興王弟子曇朗已死而上未知遥立爲南康王庚子周王享太廟丁未祀圜丘十二月庚午謁成陵癸酉還宫譙淹帥水軍七千老弱三萬自蜀江東下欲就王琳周使開府儀同三司賀􅀂敦叱羅暉等擊之斬淹悉俘其衆是歳詔給事黄門侍郎蕭乾招諭閩中時熊曇朗在豫章周廸在臨川留異在東陽陳寳應在晋安共相連結閩中豪帥徃徃立砦以自保上患之使乾諭以禍福豪帥皆帥衆請降即以乾爲建安太守乾子範之子也􅀄梁興州刺史席固以州降魏周太祖以固爲豐州剌史乆之固猶習梁法不遵北方制度周人宻欲代之而難其人乃以司憲中大夫令狐整􅁠鎮豐州委以代固之畧整廣布威恩傾身撫接數月之間化洽州府於是除整豐州刺史以固爲湖州刺史整遷豐州於武當旬日之間城府周備遷者如歸固之去也其部曲多願留爲整左右整諭以朝制弗許莫不流涕而去齊人於長城内築重城自庫洛枝東至鳴紇戍凡四百餘里􅀄齊有術士言亡髙者黒衣故髙祖每出不欲見沙門顯祖在晋陽問左右何物最黒對曰無過於漆帝以上黨王渙於兄弟第七使庫直都督破六韓伯昇之鄴徵渙渙至紫栢橋殺伯昇而逃浮河􅀯度至濟州爲人所執送鄴帝之爲太原公也與永安王浚偕見丗宗帝有時洟出浚責帝左右曰何不爲二兄拭鼻帝心衘之及即位浚爲青州刺史聦明矜恕吏民悅之浚以帝􅄝酒私謂親近曰二兄因酒敗德朝廷無敢諌者大敵未㓕吾甚以爲憂欲乗驛至鄴面諌不知用吾不或密以白帝帝益衘之浚入朝從幸東山帝祼䄇爲樂浚進諌曰此非人主所宜帝不悅浚又於屏處召楊愔譏其不諌帝時不欲大臣與諸王交通愔懼奏之帝大怒曰小人由來難忍遂罷酒還宫浚尋還州又上書切諌詔徵浚浚懼禍謝疾不至帝遣馳驛収浚老㓜泣送者數千人至鄴與上黨王渙皆盛以鐡籠寘於北城地牢飲食溲穢共在一所二年春正月王琳引兵下至湓城屯於白水浦帶甲十萬琳以北江州刺史魯悉逹爲鎮北將軍上亦以悉逹爲征西將軍各送鼔吹女樂悉逹两受之遷延顧望皆不就上遣安西將軍沈㤗襲之不克琳欲引軍東下而悉逹制其中流琳遣使􅀃誘終不從己亥琳遣記室宗虩求援於齊且請納梁永嘉王莊以主梁祀衡州刺史周廸欲自據􅀯川乃揔召所部八郡守宰結盟齊言入赴上恐其爲變厚慰撫之新呉洞主余孝頃遣沙門道林􅀃琳曰周廸黄法􅉤皆依附金陵隂窺間隙大軍􅀂下必爲後患不如先定南川然後東下孝頃請席卷所部以從下吏琳乃遣輕車將軍樊猛平南將軍李孝欽平東將軍劉廣德將兵八千赴之使孝頃揔督三將屯於臨川故郡徵兵糧於廸以􅀚其所爲以開府儀同三司侯瑱爲司空衡州刺史歐陽頠爲都督交廣等十九州諸軍事廣州刺史周以晋公護爲太師辛丑上祀南郊大赦乙巳祀北郊辛亥周王耕藉田癸丑周立王后獨􅀌氏戊午上祀明堂二月壬申南豫州刺史沈㤗奔齊􅊨齊北豫州刺史司馬消難以齊主昏虐滋甚隂爲自全之計曲意撫循所部消難尚髙祖女情好不睦公主訴之上黨王渙之亡也鄴中大擾疑其赴成皐消難從弟子瑞爲尚書左丞與御史中丞畢義雲有隙義雲遣御史張子階詣北豫州采風聞先禁消難典籖家客等消難懼密令所親中兵參軍裴藻託以私假間行入關請降于周三月甲午周遣柱國逹奚武大將軍楊忠帥􅀐士五千迎消難從間道馳入齊境五百里前後三遣使報消難皆不報去虎牢三十里武疑有變欲還忠曰有進死無退生獨以千􅀐夜趣城下城四面峭絶但聞擊柝聲武親來麾数百􅀐西去忠勒餘􅀐不動俟門開而入馳遣召武齊鎮城伏敬逺勒甲士二千人據東城舉烽嚴警武惮之不欲保城乃多􅂑財物以消難及其屬先歸忠以三千􅀐爲殿至洛南皆觧鞍而卧齊衆來追至洛北忠謂將士曰但飽食今在死地賊必不敢度水已而果然乃徐引還武歎曰逹糧樊猛等欲受盟而還孝頃貪其利不許樹柵圍之由是猛等與孝頃不恊周以大司空侯莫陳崇爲大宗伯癸丑齊廣陵南城王張􅂋和長史張僧那各帥所部來降辛丑齊以尚書令長廣王湛録尚書事驃􅀐大將軍平秦王歸彦爲尚書左僕射甲辰以前左僕射楊愔爲尚書令辛酉上幸大莊嚴寺捨身壬戌群臣表請還宫六月乙丑齊主北廵以太子殷監國因立大都督府與尚書省分理衆務仍開府置佐齊主特崇其選以趙郡王叡爲侍中攝大都督府長史己巳詔司空侯瑱領軍將軍徐度帥舟師爲前軍以討王琳齊主至祁連池戊寅還晉陽秋七月戊戌上幸石頭送侯瑱等髙州刺史黄法􅉤呉興太守沈恪寕州刺史周敷合兵救周迪敷自臨川故郡斷江口分兵攻余孝頃别城樊猛等不救而没劉廣德乗流先下故􅀗全孝頃等皆弃舟引兵歩走廸追擊盡擒之送孝頃及李孝欽於建康歸樊猛於王琳甲辰上遣吏部尚書謝哲往諭王琳哲朏之孫也八月甲子周大赦乙丑齊王還鄴辛未詔臨川王蒨西討以舟師五萬發建康上幸冶城寺送之甲戌齊主如晋陽王琳在白水浦周文育侯安都徐敬成許王子晉以厚賂子晉乃僞以小船依䑽而釣夜載之上岸入深草中歩投陳軍還建康自劾上引見並宥之戊寅復其本官謝哲返命王琳請還湘州詔追衆軍還癸未衆軍至自大雷九月甲申周封少師元羅爲韓國公以紹魏後丁未周王如同州冬十月辛酉還長安余孝頃之弟孝勱及子公颺猶據舊柵不下庚午詔開府儀同三司周文育都督衆軍出豫章討之齊三臺成更名銅爵曰金鳯金虎曰聖應氷井曰崇光十一月甲午齊主至鄴大赦齊主遊三臺戱以槊剌都督尉子輝應手而斃常山王演以帝沈湎憂憤形於顏色帝覺之謂曰但令汝在我何爲不縱樂演唯啼泣拜伏竟無所言帝亦大悲抵盃於地曰汝似嫌我如是自今敢進酒者斬之因取所御盃盡壊弃未幾沈湎益甚或於諸貴戚家角力批拉不限貴賤唯演至則内外肅然演又宻撰事條將諫其犮王晞以爲不可演不從因間極言遂逢大怒演性頗嚴尚書郎中剖斷有失輒加捶楚令史姦慝即考竟帝乃立演於前以刀鐶擬脇召被演罰者臨以白刃求演之短咸無所陳乃釋之晞昕之弟也帝疑演假辭於晞以諫欲殺之王私謂晞曰王􅀶士明日當作一條事爲欲相活亦圖自全宜深體勿怪乃於衆中杖晞二十帝尋發怒聞晞得杖以故不殺髠鞭配甲坊居三年演又因諫争大被敺撻閉口不食太后日夜涕泣帝不知所爲曰儻小兒死奈我老母何於是數徃問演疾謂曰努力強食當以王晞還汝乃釋晞令詣演演抱晞曰吾氣息惙然恐不復相見晞流涕曰天道神明豈令殿下遂斃此舎至尊親爲人兄尊爲人主安可與計殿下不食太后亦不食殿下縱不自惜獨不念太后乎言未卒演强坐而飯晞由是得免徙還爲王犮及演録尚書事除官者皆詣演謝去必辭晞言於演曰受爵天朝拜恩私第自古以爲不可宜一切約絶演從之乆之演從容謂晞曰主上起居不􅁪卿宜耳目所具吾豈可以前逢一怒遂爾結舌卿宜爲撰諫草吾當伺便極諫晞遂條十餘事以呈因謂演曰今朝廷所恃者唯殿下乃欲學匹夫耿介輕一朝之命狂藥令人不自覺刀箭豈復識親踈一旦禍出理外將奈殿下家業何奈皇太后何演欷歔不自勝曰乃至是乎明日見晞曰吾長夜乆思今遂息意即命火對晞焚之後復承間苦諫帝使力士反接拔白刃注頸罵曰小子何知是誰教汝演曰天下噤口非臣誰敢有言帝趣杖亂捶之數十會醉卧得解帝䙝黷之遊遍於宗戚所徃留連唯至常山第多無適而去尚書左僕射崔暹屢諫演謂暹曰今太后不敢致言吾兄弟杜口僕射獨能犯顔内外深相愧感太子殷自㓜温􅁉開朗禮士好學關覽時政甚有羙名帝嘗嫌太子得漢家性質不似我欲廢之帝登金鳳臺召太子使手刄囚太子惻然有難色再三不斷其首帝大怒親以馬鞭撞之太子由是氣悸語吃精神昏擾帝因酣宴屢云太子性懦社稷事重終當傳位常山太子少傅魏收謂楊愔曰太子國之根本不可動摇至尊三爵之後每言傳位常山令臣下疑貳若其實也當决行之此言非所以爲戯恐徒使國家不安愔以收言白帝帝乃止帝旣殘忍有司訊囚莫不嚴酷或燒犁耳使立其上或燒車缸使以臂貫之旣不勝苦皆至誣伏唯三公郎中武強蘇瓊歷職中外所至皆以寛平爲治時趙州及清河屢有人告謀反者前後皆付瓊推撿事多申雪尚書崔昻謂瓊曰若欲立功名當更思餘理數雪反逆身命何輕瓊正色曰所雪者寃枉耳不縱反逆也昻大慙帝怒臨漳令嵆曄舍人李文師以賜臣下爲奴中書侍郎彭城鄭頥私誘祠部尚書王昕曰自古無朝士爲奴者昕曰箕子爲之奴頥以白帝曰王元景比陛下於紂帝衘之頃之帝與朝臣酣飲昕稱疾不至帝遣􅀐執之見方摇膝吟詠遂斬於殿前投尸漳水齊主北築長城南助蕭莊士馬死者以數十萬重以脩築臺殿賜與無節府藏之積不足以供乃减百官之禄撤軍人常􅅒併省州郡縣鎮戍之職以節費用焉十二月庚寅齊以可朱渾道元爲太師尉粲爲太尉兾州刺史叚韶爲司空常山王演爲大司馬長廣王湛爲司徒壬午周大赦齊主如北城因視永安簡平王浚上黨剛肅王渙於地牢帝臨穴謳歌令浚等和之浚等惶怖且悲不覺聲顫帝愴然爲之下泣將赦之長廣王湛素與浚不睦進曰猛虎安可出穴帝黙然浚等聞之呼湛小字曰歩落稽皇天見汝帝亦以浚與渙皆有雄畧恐爲後害乃自刺渙又使壯士劉桃枝就籠亂刺槊毎下浚渙輒以手拉折之號哭呼天於是薪火亂投燒殺之填以土石後出之皮髮皆盡尸色如炭逺近爲之痛憤帝以儀同三司劉郁㨗殺浚以浚妃陸氏賜之馮文洛殺渙以渙妃李氏賜之二人皆帝家舊奴也陸氏尋以無寵於浚得免髙凉太守馮寶卒海隅擾亂妻洗氏懐集部落數州晏然其子僕生九年是􅀊遣僕帥諸酋長入朝詔以僕爲陽春太守後梁主遣其大將軍王操將兵畧取王琳之長沙武陵南平等郡三年春正月己酉周太師護上表歸政周王始親萬機軍旅之事䕶猶緫之初改都督州軍事爲緫管王琳召桂州刺史淳于量量雖與琳合而潜通於陳二月辛酉以量爲開府儀同三司壬午侯瑱引兵焚齊舟艦於合肥丙戌齊主於甘露寺禪居深􅀚唯軍國大事乃以聞尚書右僕射崔暹卒齊主幸其第哭之謂其妻李氏曰頗思暹乎對曰思之帝曰然則自往省之因手斬其妻擲首牆外齊斛律光將􅀐一萬擊周開府儀同三司曹回公斬之栢谷城主薛禹生棄城走遂取文侯鎭立戍置柵而還三月戊戌齊以侍中髙德政爲尚書右僕射􅄍谷渾㓂周邉庚戌周遣大司馬賀蘭祥擊之丙辰齊主至鄴梁永嘉王莊至郢州遣使入貢於齊王琳遣其將雷文䇿襲後梁監利太守蔡大有殺之齊主之爲魏相也膠州刺史定陽文肅侯杜弼爲長史帝將受禪弼諌止之帝問治國當用何人對曰鮮卑車馬客會湏用中國人帝以爲譏已衘之髙德政用事弼不爲之下嘗於衆前面折德政德政數言其短於帝弼恃舊不自疑夏帝因飲酒積其愆失遣使就州斬之旣而悔之驛追不及閏四月戊子周命有司更定新暦丁酉遣鎭北將軍徐度將兵城南皖口齊髙德政與楊愔同爲相愔常忌之齊主酣飲德政數彊諫齊主不悦謂左右曰髙德政􅁪以精神凌逼人德政懼稱疾欲自退帝謂楊愔曰我大憂德政病對曰陛下若用爲冀州刺史病當自差帝從之德政見除書即起帝大怒召德政謂曰聞爾病我爲爾針親以小刀刺之血流霑地又使曵下斬去其足劉桃枝執刀不敢下帝責桃枝曰爾頭即墜地桃枝乃斬其足之三指帝怒不解囚德政於門下其夜以氈輿送還家明旦德政妻出珍寳滿四牀欲以􅀉人帝奄至其宅見之怒曰我内府猶無是物詰其所從得皆諸元賂之遂曵出斬之妻出拜又斬之并其子伯堅以司州牧彭城王浟爲司空侍中髙陽王湜爲尚書右僕射乙巳以浟兼太尉齊主封子紹亷爲長安王辛亥周以侯莫陳崇爲大司徒達奚武爲大宗伯武陽公豆盧寧爲大司㓂柱國輔城公邕爲大司空乙夘周詔有司無得紏赦前事唯庫廐倉􅅒與海内所共若有侵盗雖經赦宥免其罪徵備如法周賀蘭祥與吐谷渾戰破之拔其洮陽洪和二城以其地爲洮州五月丙辰朔日有食之齊太史奏今年當除舊布新齊主問於特進彭城公元韶曰漢光武何故中興對曰爲誅諸劉不盡於是齊主悉殺諸元以厭之癸未誅始平公元世哲等二十五家囚韶等十九家韶幽於地牢絶食㗖衣袖而死周文育周迪黄法􅉤共討余公颺豫章内史熊曇朗引兵㑹之衆且萬人文育軍於金口公颺詐降謀執文育文育覺之囚送建康文育進屯三陂王琳遣其將曹慶帥二千人救余孝勱慶分遣主帥常衆愛與文育相拒自帥其衆攻周迪及安南將軍呉明徹迪等敗文育退據金口熊曇朗因其失利謀殺文育以應衆愛監軍孫白象聞其謀􅂆文育先之文育不從時周迪棄船走不知所在乙酉文育得迪書自齎以示曇朗曇朗殺之於座而併其衆因據新淦城曇朗將兵萬人襲周敷敷擊破之曇朗單􅀐奔巴山魯悉逹部將梅天養等引齊軍入城悉逹帥麾下數千人濟江自歸拜平南將軍北江州刺史六月戊子周以霖雨詔群臣上封事極諌左光禄大夫猗氏樂遜上言四事其一以爲比來守令代期旣促責其成効專務威猛今關東之民淪䧟塗炭若不布政優優聞諸境外何以使彼勞民歸就樂土其二以爲頃者魏都洛陽一時殷盛貴􅀔之家競爲侈靡終使禍亂交興天下䘮敗比來朝貴器服稍華百工造作務盡竒巧臣誠恐物逐好移有損政俗其三以爲選曹補擬宜與衆共之今州郡選置猶集郷閭况天下銓衡不取物望旣非機事何足苛宻其選置之日宜令衆心明白然後呈奏其四以爲髙洋據有山東未易猝制譬猶碁刼相持爭行先後若一行不當或成彼利誠應捨小營大先保封域不宜貪利邊陲輕爲舉動周處士韋夐孝寛之兄也志尚夷簡魏周之際十徵不屈周太祖甚重之不奪其志世宗禮敬尤厚號曰逍遥公晋公護延之至第訪以政事護盛修第舎夐仰視堂歎曰酣酒􅄝音峻宇雕牆有一于此未或不亡護不悦驃􅀐大將軍開府儀同三司㓂儁讃之孫也少有學行家人嘗賣物多得絹五匹儁於後知之曰得財失行吾所不取訪主還之敦睦宗族與同豐約敎訓子孫必先禮義自大統中稱老疾不朝謁世宗虛心欲見之儁不得已入見王引之同席而坐問以魏朝舊事載以御輿令於王前乗之以出顧謂左右曰如此之事唯積善者可以致之周文育之討余孝勱也帝令南豫州刺史侯安都繼之文育死安都還遇王琳將周炅周恊南歸與戰擒之孝勱弟孝猷帥所部四千家詣安都降安都進軍至左里擊曹慶常衆愛破之衆愛奔廬山庚寅廬山民斬之傳首詔臨川王蒨於南皖口置城使東徐州刺史呉興錢道戢守之丁酉上不豫丙午殂上臨戎制勝英謀獨運而爲政務崇寛簡非軍旅急務不輕調發性儉素常膳不過數品私宴用瓦器蚌盤殽核充事而已後宫無金翠之飾不設女樂時皇子昌在長安内無嫡嗣外有彊敵􅀫將皆將兵在外朝無重臣唯中領軍杜稜典􅀫衞兵在建康章皇后召稜及中書侍郎蔡景歴入禁中定議祕不發䘮急召臨川王蒨於南皖景歴親與宦者宫人宻營歛具時天暑湏治梓宫恐斤斧之聲聞於外乃以蠟爲祕器文書詔敕依舊宣行侯安都軍還適至南皖與臨川王俱還朝甲寅王至建康入居中書省安都與群臣定議奉王嗣位王謙讓不敢當皇后以昌故未肯下令群臣猶豫不能决安都曰今四方未定何暇及逺臨川王有大功於天下湏共立之今日之事後應者斬即按劒上殿白皇后出璽又手解蒨髮推就䘮次遷殯大行于太極西階皇后乃下令以蒨纂承大統是日即皇帝位大赦秋七月丙辰尊皇后爲皇太后辛酉以侯瑱爲太尉侯安都爲司空齊顯祖將如晋陽乃盡誅諸元或祖父爲王或身嘗貴顯皆斬於東市其嬰兒投於空中承之以矟前後死者凢七百二十一人悉棄尸漳水剖魚者徃徃得人􅀲甲鄴下爲之乆不食魚使元黄頭與諸囚自金鳳臺各乗􅁓鴟以飛黄頭獨能至紫陌乃墮仍付御史中丞畢義雲餓殺之唯開府儀同三司元蠻祠部郎中元文遥等數家􅀗免蠻繼之子常山王演之妃父文遥遵之五世孫也定襄令元景安䖍之玄孫也欲請改姓髙氏其從兄景皓曰安有棄其本宗而從人之姓者乎丈夫寜可玉碎何能瓦全景安以其言白帝帝收景皓誅之賜景安姓髙氏八月甲申葬武皇帝於萬安陵廟號髙祖戊戌齊封皇子紹義爲廣陽王以尚書右僕射河間王孝琬爲左僕射都官尚書崔昻爲右僕射周御正中大夫崔猷建議以爲聖人㳂革因時制宜今天子稱王不足以威天下請遵秦漢舊制稱皇帝建年號己亥周王始稱皇帝追尊文王曰文皇帝改元武成癸卯齊詔民間或有父祖冒姓元氏或假托􅂝養者不問世數逺近悉聽改復本姓初髙祖追封謚兄道譚爲始興昭烈王以其次子頊襲封及世祖即位頊在長安未還上以本宗乏享戊戌詔徙封頊爲安成王皇子伯茂爲始興王初周太祖平蜀以其形勝之地不欲使􅀫將居之問諸子誰可徃者皆不對少子安成公憲請行太祖以其㓜不許壬子周人以憲爲益州緫管時年十六善於撫綏留心政術蜀人悦之九月乙卯以大將軍天水公廣爲梁州緫管廣導之子也辛酉立皇子伯宗爲太子己巳齊主如晋陽辛未周主封其弟輔城公邕爲魯公安成公憲爲齊公純爲陳公盛爲越公逹爲代公通爲兾公逌爲􅅬公乙亥立太子母呉興沈妃爲皇后周少保懷寕莊公蔡祐卒齊顯祖􅄝酒成疾不復能食自知不能乆謂李后曰人生必有死何足致惜但憐正道尚㓜人將奪之耳又謂常山王演曰奪則任汝慎勿殺也尚書令開封王楊愔領軍大將軍平秦王歸彥侍中廣漢燕子獻黄門侍郎鄭頥皆受遺詔輔政冬十月甲午殂癸卯發䘮群臣號哭無下泣者唯楊愔涕泗嗚咽太子殷即位大赦庚戌尊太后爲太皇太后皇后爲皇太后詔諸土木金鐡雜匠一切停罷王琳聞髙祖殂乃以少府卿呉郡孫瑒爲郢州刺史緫留任奉梁永嘉王莊出屯濡湏口齊揚州道行臺慕容儼帥衆臨江爲之聲援十一月乙夘琳㓂大雷詔侯瑱侯安都及儀同徐度將兵禦之安州刺史呉明徹夜襲湓城琳遣巴陵太守任忠擊明徹大破之明徹僅以身免琳因引兵東下齊以右丞相斛律金爲左丞相常山王演爲太􅀓長廣王湛爲太尉叚韶爲司徒平陽王淹爲司空髙陽王湜爲尚書左僕射河間王孝琬爲司州牧侍中燕子獻爲右僕射辛未齊顯祖之䘮至鄴十二月戊戌齊徙上黨王紹仁爲漁陽王廣陽王紹義爲范陽王長樂王紹廣爲隴西王資治通鑑卷第一百六十七
