front:
  text: 丗出於神農以神農配二丘始祖獻侯配南北郊文王配明堂廟號太祖癸卯祀方丘甲辰祭大社除市門稅乙巳享太廟仍用鄭玄義立太祖與二昭二穆爲五廟其有德者别爲祧廟不毁辛亥祀􅀯郊壬子立王后元氏后魏文帝之女晋安公主也齊􅀯安城主馮顯請降於周周柱國宇文貴使豐州刺史太原郭彦將兵迎之遂據􅀯安􅄍谷渾爲㓂於周攻涼鄯河三州秦州都督遣渭州刺史于翼赴援翼不從僚屬咸以爲言翼曰攻取之術非夷俗所長此㓂之來不過鈔掠邊牧耳掠而無􅀗􅀔將自走勞師以往必無所及翼揣之巳了幸勿復言數日問至果如翼所䇿􅀄梁丗祖以始興郡爲東衡州以歐陽頠爲刺史乆之徙頠爲郢州刺史蕭勃留頠不遣丗祖以王琳代勃爲廣州刺史勃遣其將孫盪􅁥廣州盡帥所部屯始興以避之頠别據一城不往謁閉門自守勃怒遣兵襲之盡取其貲財馬仗尋赦之使復其所與之結盟江陵䧟頠遂事勃二月庚午勃起兵於廣州遣頠及其將􅀓泰蕭孜爲前軍孜勃之從子也􅀯江州刺史余孝頃以兵㑹之詔平西將軍周文育帥諸軍討之癸酉周王朝日於東郊戊寅祭太社周楚公趙貴衞公獨􅀌信故皆與太祖等夷及晋公護専政皆怏怏不服貴謀殺護信止之開府儀同三司宇文盛告之丁亥貴入朝護執而殺之免信官
