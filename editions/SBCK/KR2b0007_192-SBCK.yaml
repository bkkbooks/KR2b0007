front:
  text: 資治通鑑巻第一百九十二
  hash: sha256:ee2af946ac52b722e2132f314916a9f092c91afc93c2309079db4374721301be
body:
  text: 臣司馬光奉勑編集唐紀八雍困敦七月凡二年起柔兆閹茂九月盡著髙祖神堯大聖光孝皇帝下之下武徳九年九月突厥頡利獻馬三千匹羊萬口上不受但詔歸所掠中國户口徴温彦博還朝丁未上引諸衞將卒習射於顯徳殿庭諭之曰戎狄侵盜自古有之患在邊境少安則人主逸遊忘戰是以寇來莫之能禦今朕不使汝曹穿池築苑專習弓矢居閑無事則為汝師突厥入寇則為汝將庶㡬中國之民可以少安乎於是日引數百人教射於殿庭上親臨試中多者賞以弓刀帛其將帥亦加上考羣臣多諫曰於律以兵刃至御在所者絞今使卑碎之人張弓挾矢於軒陛之側陛下親在其間萬一有狂夫竊發出於不意非所以重社稷也韓州刺史封同人詐乗驛馬入朝切諫上皆不聴曰王者視四海如一家封域之内皆朕赤子朕一一推心置其腹中柰何宿衞之士亦加猜忌乎由是人思自勵數年之間悉為精鋭上嘗言吾自少經畧四方頗知用兵之要每觀敵陳則知其彊弱常以吾弱當其彊彊當其弱彼乗吾弱逐奔不過數十百步吾乗其弱必出其陳後反擊之無不潰敗所以取勝多在此也己酉上面定勲臣長孫無忌等爵邑命陳叔達於殿下唱名示之且曰朕叙卿等勲賞或未當宜各自言於是諸將爭功紛紜不已淮安王神通曰臣舉兵闗西首應義旗今房玄齡杜如晦等專弄刀筆功居臣上臣竊不服上曰義旗初起叔父雖首唱舉兵盖亦自營脱禍及竇建徳吞噬山東叔父全軍覆没劉黑闥􅄪合餘燼叔父望風奔北玄齡等運籌帷幄坐安社稷論功行賞固宜居叔父之先叔父國之至親朕誠無所愛但不可以私恩濫與勲臣同賞耳諸將乃相謂曰陛下至公雖淮安王尚無所私吾儕何敢不安其分遂皆悦服房玄齡嘗言秦府舊人未遷官者皆嗟怨曰吾属奉事左右㡬何年矣今除官返出前宫齊府人之後上曰王者至公無私故能服天下之心朕與卿軰日所衣食皆取諸民者也故設官分職以為民也當擇賢才而用之豈以新舊為先後哉必也新而賢舊而不肖安可捨新而取舊乎今不論其賢不肖而直言嗟怨豈為政之體乎詔民間不得妄立妖祠自非卜筮正術其餘雜占悉從禁絶上於􅀪文殿聚四部書二十餘萬巻置􅀪文館於殿側精選天下文學之士虞世南禇亮姚思亷歐陽詢蔡允恭蕭徳言等以本官兼學士令更日宿直聴朝之隙引入内殿講論前言往行商􅅦政事或至夜分乃罷又取三品已上子孫充􅀪文舘學生冬十月丙辰朔日有食之詔追封故太子建成為息王諡曰隠齊王元吉為海陵王謚曰剌以禮改葬葬日上哭之於宜秋門甚哀魏徴王珪表請陪送至墓所上許之命宫府舊僚皆送葬癸亥立皇子中山王承乾為太子生八年矣庚辰初定功臣實封有差初蕭瑀薦封徳彞於上皇上皇以為中書令及上即位瑀為左僕射徳彞為右僕射議事已定徳彞數反之於上前由是有隙時房􅀇齡杜如晦新用事皆疎瑀而親徳彞瑀不能平遂上封事論之辭指寥落由是忤㫖㑹瑀與陳叔達忿爭於上前庚辰瑀叔達皆坐不敬免官甲申民部尚書裴矩奏民遭突厥暴踐者請户給絹一匹上曰朕以誠信御下不欲虚有存恤之名而無其實户有大小豈得雷同給賜乎於是計口為率初上皇欲彊宗室以鎮天下故皇再從三從弟及兄弟之子雖童孺皆為王王者數十人上從容問羣臣徧封宗子於天下利乎封徳彞對曰前世唯皇子及兄弟乃為王自餘非有大功無為王者上皇敦睦九族大封宗室自兩漢以來未有如今之多者爵命既崇多給力役恐非示天下以至公也上曰然朕為天子所以養百姓也豈可勞百姓以養己之宗族乎十一月庚寅降宗室郡王皆為縣公惟有功者數人不降丙午上與羣臣論止盜或請重灋以禁之上哂之曰民之所以為盜者由賦繁役重官吏貪求饑寒切身故不暇顧亷恥耳朕當去奢省費輕徭薄賦選用亷吏使民衣食有餘則自不為盜安用重灋邪自是數年之後海内升平路不拾遺外户不閉商旅野宿焉上又嘗謂侍臣曰君依於國國依於民刻民以奉君猶割肉以充腹腹飽而身斃君富而國亡故人君之患不自外來常由身出夫欲盛則費廣費廣則賦重賦重則民愁民愁則國危國危則君喪矣朕常以此思之故不敢縱欲也十二月己巳益州大都督竇軌奏稱獠反請發兵討之上曰獠依阻山林時岀䑕竊乃其常俗牧守苟能撫以恩信自然帥服安可輕動干戈漁獵其民比之禽獸豈爲民父母之意邪竟不許上謂裴寂曰比多上書言事者朕皆粘之屋壁得出入省覽每思治道或深夜方寢公輩亦當恪勤職業副朕此意上厲精求治數引魏徴入卧内訪以得失徴知無不言上皆欣然嘉納上遣使㸃兵封徳􅂜奏中男雖未十八其軀幹壯大者亦可并㸃上從之敕出魏徴固執以為不可不肯署敕至于數四上怒召而讓之曰中男壯大者乃姦民詐妄以避征役取之何害而卿固執至此對曰夫兵在御之得其道不在衆多陛下取其壯健以道御之足以無敵於天下何必多取細弱以増虚數乎且陛下每云吾以誠信御天下欲使臣民皆無欺詐今即位未㡬失信者數矣上愕然曰朕何為失信對曰陛下初即位下詔云逋貟官物悉令蠲免有司以為負秦府國司者非官物徴督如故陛下以秦王升為天子國司之物非官物而何又曰闗中免二年租調闗外給復一年既而繼有敕云已役已輸者以來年為始散還之後方復更徴百姓固已不能無恠今既徴得物復㸃為兵何謂來年為始乎又陛下所與共治天下者在於守宰居常簡閲咸以委之至於㸃兵獨疑其詐豈所謂以誠信為治乎上悦曰曏者朕以卿固執疑卿不達政事今卿論國家大體誠盡其精要夫號令不信則民不知所從天下何由而治乎朕過深矣乃不􅀧中男賜徴金甕一上聞景州錄事叅軍張玄素名召見問以政道對曰隋主好自專庶務不任羣臣羣臣恐懼唯知禀受奉行而已莫之敢違以一人之智决天下之務借使得失相半乖謬已多下諛上蔽不亡何待陛下誠能謹擇羣臣而分任以事髙拱穆清而考其成敗以施刑賞何憂不治又臣觀隋末亂離其欲爭天下者不過十餘人而已其餘皆保鄉黨全妻子以待有道而歸之耳乃知百姓好亂者亦鮮但人主不能安之耳上善其言擢爲侍御史前幽州記室直中書省張藴古上大寶箴其略曰聖人受命拯溺亨屯故以一人治天下不以天下奉一人又曰壯九重於内所居不過容膝彼昬不知瑶其臺而瓊其室羅八珍於前所食不過適口惟狂罔念丘其糟而池其酒又曰勿没没而闇勿察察而明雖冕旒蔽目而視於未形雖黈纊塞耳而聴於無聲上嘉之賜以束帛除大理丞上召傅奕賜之食謂曰汝前所奏㡬為吾禍然凡有天變卿宜盡言皆如此勿以前事為懲也上嘗謂奕曰佛之為教􅀇妙可師卿何獨不悟其理對曰佛乃胡中桀黠誑耀彼土中國邪僻之人取老莊􅀇談飾以妖幻之語用欺愚俗無益於民有害於國臣非不悟鄙不學也上頗然之上患吏多受賕宻使左右試賂之有司門令史受絹一匹上欲殺之民部尚書裴矩諫曰為吏受賂罪誠當死但陛下使人遺之而受乃陷人於灋也恐非所謂道之以徳齊之以禮上悦召文武五品已上告之曰裴矩能當官力爭不為面從儻每事皆然何憂不治臣光曰古人有言君明臣直裴矩佞於隋而忠於唐非其性之有變也君惡聞其過則忠化為佞君樂聞直言則佞化為忠是知君者表也臣者景也表動則景隨矣是嵗進皇子長沙郡王恪為漢王宜陽郡王祐為楚王新羅百濟髙麗三國有宿仇迭相攻擊上遣國子助教朱子奢往諭指三國皆上表謝罪太宗文武大聖大廣孝皇帝上之上貞觀元年春正月乙酉改元丁亥上宴羣臣奏秦王破陳樂上曰朕昔受委專征民閒遂有此曲雖非文徳之雍容然功業由茲而成不敢忘本封徳彞曰陛下以神武平海内豈文徳之足比上曰戡亂以武守成以文文武之用各隨其時卿謂文不及武斯言過矣徳􅂜頓首謝己亥制自今中書門下及三品以上入閤議事皆命諫官隨之有失輒諫上命吏部尚書長孫无忌等與學士灋官更議定律令寛絞刑五十條為斷右趾上猶嫌其慘曰肉刑廢已久宜有以易之蜀王灋曹叅軍裴􅀪獻請改為加役流徙三千里居作三年詔從之上以兵部郎中戴胄忠清公直擢為大理少卿上以選人多詐冒資䕃敕令自首不首者死未㡬有詐冒事覺者上欲殺之胄奏據灋應流上怒曰卿欲守灋而使朕失信乎對曰敕者出於一時之喜怒灋者國家所以布大信於天下也陛下忿選人之多詐故欲殺之而既知其不可復斷之以灋此乃忍小忿而存大信也上曰卿能執灋朕復何憂胄前後犯顔執灋言如涌泉上皆從之天下無寃獄上令封徳彞舉賢久無所舉上詰之對曰非不盡心但於今未有竒才耳上曰君子用人如器各取所長古之致治者豈借才於異代乎正患己不能知安可誣一世之人徳􅂜慙而退御史大夫杜淹奏諸司文案恐有稽失請令御史就司檢校上以問封徳􅂜對曰設官分職各有所司果有愆違御史自應紏舉若徧厯諸司搜摘疵纇太為煩碎淹黙然上問淹何故不復論執對曰天下之務當盡至公善則從之德彞所言眞得大體臣誠心服不敢遂非上悦曰公等各能如是朕復何憂右驍衞大將軍長孫順徳受人餽絹事覺上曰順徳果能有益國家朕與之共有府庫耳何至貪冒如是乎猶惜其有功不之罪但於殿庭賜絹數十匹大理少卿胡演曰順徳枉灋受財罪不可赦柰何復賜之絹上曰彼有人性得絹之辱甚於受刑如不知愧一禽獸耳殺之何益辛丑天節將軍燕郡主李藝據涇州反藝之初入朝也恃功驕倨秦王左右至其營藝無故敺之上皇怒收藝繫獄既而釋之上即位藝内不自安曹州妖巫李五戒謂藝曰王貴色已發勸之反藝乃詐稱奉宻敕勒兵入朝遂引兵至豳州豳州治中趙慈皓馳出謁之藝入據豳州詔吏部尚書長孫无忌等為行軍揔管以討之趙慈皓聞官軍將至宻與統軍楊岌圖之事洩藝囚慈皓岌在城外覺變勒兵攻之藝衆潰弃妻子將奔突厥至烏氏左右斬之傳首長安弟夀為利州都督亦坐誅初隋末喪亂豪傑並起擁衆據地自相雄長唐興相帥來歸上皇為之割置州縣以寵禄之由是州縣之數倍於開皇大業之間上以民少吏多思革其弊二月命大加併省因山川形便分為十道一曰闗内二曰河南三曰河東四曰河北五曰山南六曰隴右七曰淮南八曰江南九曰劒南十曰嶺南三月癸巳皇后帥内外命婦親蠶閏月癸丑朔日有食之壬申上謂太子少師蕭瑀曰朕少好弓矢得良弓十數自謂無以加近以示弓工乃曰皆非良材朕問其故工曰木心不直則脉理皆邪弓雖勁而發矢不直朕始寤曏者辨之未精也朕以弓矢定四方識之猶未能盡况天下之務其能徧知乎乃令京官五品以上更宿中書内省數延見問以民閒疾苦及政事得失凉州都督長樂王幼良性麤暴左右百餘人皆無賴子弟侵暴百姓又與羗胡互市或告幼良有異志上遣中書令宇文士及馳驛代之并按其事左右懼謀劫幼良入北虜又欲殺士及據有河西復有告其謀者夏四月癸巳賜幼良死五月苑君璋帥衆來降初君璋引突厥陷馬邑殺髙滿政退保恒安其衆皆中國人多弃君璋來降君璋懼亦降請捍北邊以贖罪上皇許之君璋請約契上皇使鴈門人元普賜之金券頡利可汗復遣人招之君璋猶豫未决恒安人郭子威説君璋以恒安地險城堅突厥方彊且當倚之以觀變未可束手於人君璋乃執元普送突厥復與之合數與突厥入寇至是見頡利政亂知其不足恃遂帥衆來降上以君璋為隰州都督芮國公有上書請去佞臣者上問佞臣為誰對曰臣居草澤不能的知其人願陛下與羣臣言或陽怒以試之彼執理不屈者直臣也畏威順㫖者佞臣也上曰君源也臣流也濁其源而求其㳘之清不可得矣吾自為詐何以責臣下之直乎朕方以至誠治天下見前世帝王好以權譎小數接其臣下者常竊恥之卿策雖善朕不取也六月辛巳右僕射宻明公封徳􅂜薨壬辰復以太子少師蕭瑀為左僕射戊申上與侍臣論周秦修短蕭瑀對曰紂為不道武王征之周及六國無罪始皇滅之得天下雖同人心則異上曰公知其一未知其二周得天下増修仁義秦得天下益尚詐力此修短之所以殊也蓋取之或可以逆得而守之不可以不順故也瑀謝不及山東大旱詔所在賑䘏無出今年租賦秋七月壬子以吏部尚書長孫无忌為右僕射无忌與上為布衣交加以外戚有佐命功上委以腹心其禮遇羣臣莫及欲用爲宰相者數矣文徳皇后固請曰妾備位椒房家之貴寵極矣誠不願兄弟復執國政吕霍上官可爲切骨之戒幸陛下矜察上不聴卒用之初突厥性淳厚政令質略頡利可汗得華人趙徳言委用之徳言專其威福多變更舊俗政令煩苛國人始不悦頡利又好信任諸胡而踈突厥胡人貪冒多反覆兵革嵗動㑹大雪深數尺雜畜多死連年饑饉民皆凍餒頡利用度不給重斂諸部由是内外離怨諸部多叛兵浸弱言事者多請擊之上以問蕭瑀長孫无忌曰頡利君臣昬虐危亡可必今擊之則新與之盟不擊恐失機㑹如何而可瑀請擊之无忌對曰虜不犯塞而弃信勞民非王者之師也上乃止上問公卿以享國久長之策蕭瑀言三代封建而久長秦孤立而速亡上以爲然於是始有封建之議黄門侍郎王珪有宻奏附侍中髙士亷寢而不言上聞之八月戊戌出士亷爲安州大都督九月庚戌朔日有食之辛酉中書令宇文士及罷爲殿中監御史大夫杜淹參䂊朝政它官參豫政事自此始淹薦刑部員外郎邸懷道上問其行能對曰煬帝將幸江都召百官問行留之計懷道爲吏部主事獨言不可臣親見之上曰卿稱懷道爲是何爲自不正諫對曰臣爾日不居重任又知諫不從徒死無益上曰卿知煬帝不可諫何爲立其朝既立其朝何得不諫卿仕隋容可云位卑後仕王世充尊顯矣何得亦不諫對曰臣於世充非不諫但不從耳上曰世充若賢而納諫不應亡國若暴而拒諫卿何得免禍淹不能對上曰今日可謂尊任矣可以諫未對曰願盡死上笑辛未幽州都督王君廓謀叛道死君廓在州驕縱多不灋徴入朝長史李􅀇道房􅀇齡從甥也憑君廓附書君廓私發之不識草書疑其告己罪行至渭南殺驛吏而逃將奔突厥為野人所殺嶺南酋長馮盎談殿等迭相攻擊久未入朝諸州奏稱盎反前後以十數上命將軍藺謩等發江嶺數十州兵討之魏徵諫曰中國初定嶺南瘴癘險遠不可以宿大兵且盎反狀未成未宜動衆上曰告者道路不絶何云反狀未成對曰盎若反必分兵據險攻掠州縣今告者已數年而兵不出境此不反明矣諸州既疑其反陛下又不遣使鎮撫彼畏死故不敢入朝若遣信臣示以至誠彼喜於免禍可不煩兵而服上乃罷兵冬十月乙酉遣員外散騎侍郎李公掩持節慰諭之盎遣其子智戴隨使者入朝上曰魏徴令我發一介之使而嶺表遂安勝十萬之師不可不賞賜徴絹五百匹十二月壬午左僕射蕭瑀坐事免戊申利州都督義安王李孝常等謀反伏誅孝常因入朝留京師與右武衞將軍劉徳裕及其甥統軍元􅀪善監門將軍長孫安業互説符命謀以宿衞兵作亂安業皇后之異母兄也嗜酒無賴父晟卒弟无忌及后並幼安業斥還舅氏及上即位后不以舊怨為意恩禮甚厚及反事覺后涕泣為之固請曰安業罪誠當萬死然不慈於妾天下知之今寘以極刑人必謂妾所為恐亦為聖朝之累由是得減死流巂州或告右丞魏徴私其親戚上使御史大夫温彦博按之無狀彦博言於上曰徴不存形迹逺避嫌疑心雖無私亦有可責上令彦博讓徴且曰自今宜存形迹它日徴入見言於上曰臣聞君臣同體宜相與盡誠若上下俱存形迹則國之興喪尚未可知臣不敢奉詔上瞿然曰吾已悔之徴再拜曰臣幸得奉事陛下願使臣爲良臣勿爲忠臣上曰忠良有以異乎對曰稷契臯陶君臣恊心俱享尊榮所謂良臣龍逢比干面折廷爭身誅國亡所謂忠臣上悦賜絹五百匹上神采英毅羣臣進見者皆失舉措上知之每見人奏事必假以辭色兾聞規諫嘗謂公卿曰人欲自見其形必資明鏡君欲自知其過必待忠臣茍其君愎諫自賢其臣阿諛順㫖君既失國臣豈能獨全如虞世基等謟事􅌆帝以保富貴􅌆帝既弑世基等亦誅公輩宜用此為戒事有得失無惜盡言或上言秦府舊兵宜盡除武職追入宿衞上謂之曰朕以天下為家惟賢是與豈舊兵之外皆無可信者乎汝之此意非所以廣朕徳於天下也上謂公卿曰昔禹鑿山治水而民無謗讟者與人同利故也秦始皇營宫室而人怨叛者病人以利己故也夫靡麗珍竒固人之所欲若縱之不已則危亡立至朕欲營一殿材用己具鑒秦而止王公已下宜體朕此意由是二十年間風俗素朴衣無錦繡公私富給上謂黄門侍郎王珪曰國家本置中書門下以相檢察中書詔敕或有差失則門下當行駮正人心所見互有不同茍論難往來務求至當捨己從人亦復何傷比來或獲己之短遂成怨隙或茍避私怨知非不正順一人之顔情為兆民之深怨此乃亡國之政也煬帝之世内外庶官務相順從當是之時皆自謂有智禍不及身及天下大亂家國兩亡雖其間萬一有得免者亦為時論所貶終古不磨卿曹各當徇公忘私勿雷同也上謂侍臣曰吾聞西域賈胡得美珠剖身以藏之有諸侍臣曰有之上曰人皆知􅀏彼之愛珠而不愛其身也吏受賕抵灋與帝王徇奢欲而亡國者何以異於彼胡之可笑邪魏徴曰昔魯哀公謂孔子曰人有好忘者徙宅而忘其妻孔子曰又有甚者桀紂乃忘其身亦猶是也上曰然朕與公輩宜戮力相輔庶免為人所笑也青州有謀反者州縣逮捕支黨收繫滿獄詔殿中侍御史安喜崔仁師覆按之仁師至悉脱去杻械與飲食湯沐寛慰之止坐其魁首十餘人餘皆釋之還報敕使將往决之大理少卿孫伏伽謂仁師曰足下平反者多人情誰不貪生恐見徒侣得免未肯甘心深為足下憂之仁師曰凡治獄當以平恕為本豈可自規免罪知其寃而不為伸邪萬一闇短誤有所縱以一身易十囚之死亦所願也伏伽慙而退及敕使至更訊諸囚皆曰崔公平恕事無枉濫請速就死無一人異辭者上好騎射孫伏伽諫以為天子居則九門行則警蹕非欲茍自尊嚴乃為社稷生民之計也陛下好自走馬射的以娛悦近臣此乃少年為諸王時所為非今日天子事業也既非所以安養聖躬又非所以儀刑後世臣竊為陛下不取上悦未㡬以伏伽為諫議大夫隋丗選人十一月集至春而罷人患其期促至是吏部侍郎觀城劉林甫奏四時聽選隨闕注擬人以爲便唐初士大夫以亂離之後不樂仕進官員不充省符下諸州差人赴選州府及詔使多以赤牒補官至是盡省之勒赴省選集者七千餘人林甫隨才銓叙各得其所時人稱之詔以闗中米貴始分人於洛州選上謂房玄齡曰官在得人不在員多命玄齡併省留文武揔六百四十三員隋祕書監晉陵劉子翼有學行性剛直朋友有過常面責之李百藥常稱劉四雖復罵人人終不恨是嵗有詔徵之辭以母老不至鄃令裴仁軌私役門夫上怒欲斬之殿中侍御史長安李乾祐諫曰灋者陛下所與天下共也非陛下所獨有也今仁軌坐輕罪而抵極刑臣恐人無所措手足上悦免仁軌死以乾祐為侍御史上嘗語及闗中山東人意有同異殿中侍御史義豐張行成跪奏曰天子以四海為家不當有東西之異恐示人以隘上善其言厚賜之自是每有大政常使預議初突厥既彊敕勒諸部分散有薛延陀迴紇都播骨科幹多濫葛同羅僕固拔野古思結渾斛薛奚結阿跌契苾白霫等十五部皆居磧北風俗大抵與突厥同薛延陀於諸部為最彊西突厥曷薩那可汗方彊敕勒諸部皆臣之曷薩那徴税無度諸部皆怨曷薩那誅其渠帥百餘人敕勒相帥叛之共推契苾哥楞為易勿真莫賀可汗居貪于山北又以薛延陀乙失鉢為也咥小可汗居燕末山北及射匱可汗兵復振薛延陀契苾二部並去可汗之號以臣之回紇等六部在鬱督軍山者東屬始畢可汗統葉䕶可汗勢衰乙失鉢之孫夷男帥其部落七萬餘家附于頡利可汗頡利政亂薛延陀與回紇拔野古等相帥叛之頡利遣其兄子欲谷設將十萬騎討之回紇酋長菩薩將五千騎與戰於馬鬛山大破之欲谷設走菩薩追至天山部衆多為所虜回紇由是大振薛延陀又破其四設頡利不能制頡利益衰國人離散㑹大雪平地數尺羊馬多死民大饑頡利恐唐乗其弊引兵入朔州境上揚言㑹獵實設備焉鴻臚卿鄭元璹使突厥還言於上曰戎狄興衰專以羊馬為􅀱今突厥民饑畜瘦此將亡之兆也不過三年上然之羣臣多勸上乗閒擊突厥上曰新與人盟而背之不信利人之災不仁乗人之危以取勝不武縱使其種落盡叛六畜無餘朕終不擊必待有罪然後討之西突厥統葉䕶可汗遣真珠統俟斤與髙平王道立來獻萬釘寶鈿金帶馬五千匹以迎公主頡利不欲中國與之和親數遣兵入寇又遣人謂統葉䕶曰汝迎唐公主要須經我國中過統葉䕶患之未成昏二年春正月辛亥右僕射長孫无忌罷時有宻表稱无忌權寵過盛者上以表示之曰朕於卿洞然無疑若各懷所聞而不言則君臣之意有不通又召百官謂之曰朕諸子皆幼視无忌如子非它人所能間也无忌自懼滿盈固求遜位皇后又力為之請上乃許之以為開府儀同三司置六司侍郎副六尚書并置左右司郎中各一人癸丑吐谷渾寇岷州都督李道彦擊走之丁巳徙漢王恪為蜀王衞王泰為越王楚王祐為燕王上問魏徴曰人主何為而明何為而暗對曰兼聴則明偏信則暗昔堯清問下民故有苗之惡得以上聞舜明四目達四聰故共鯀驩兜不能蔽也秦二世偏信趙髙以成望夷之禍梁武帝偏信朱异以取臺城之辱隋􅌆帝偏信虞世基以致彭城閣之變是故人君兼聴廣納則貴臣不得擁蔽而下情得以上通也上曰善上謂黄門侍郎王珪曰開皇十四年大旱隋文帝不許賑給而令百姓就食山東比至末年天下儲積可供五十年􅌆帝恃其富饒侈心無厭卒亡天下但使倉廪之積足以備凶年其餘何用哉二月上謂侍臣曰人言天子至尊無所畏憚朕則不然上畏皇天之監臨下憚羣臣之瞻仰兢兢業業猶恐不合天意未副人望魏徴曰此誠致治之要願陛下慎終如始則善矣上謂房􅀇齡等曰為政莫若至公昔諸葛亮􅇡廖立李嚴於南夷亮卒而立嚴皆悲泣有死者非至公能如是乎又髙熲為隋相公平識治體隋之興亡繫熲之存没朕既慕前世之明君卿等不可不灋前世之賢相也三月戊寅朔日有食之壬子大理少卿胡演進每月囚帳上命自今大辟皆令中書門下四品已上及尚書議之庶無寃濫既而引囚至岐州刺史鄭善果上謂胡演曰善果雖復有罪官品不卑豈可使與諸囚為伍自今三品已上犯罪不須引過聴於朝堂俟進止闗内旱饑民多賣子以接衣食己巳詔出御府金帛為贖之歸其父母庚午詔以去嵗霖雨今茲旱蝗赦天下詔書畧曰若使年穀豐稔天下乂安移災朕身以存萬國是所願也甘心無吝㑹所在有雨民大悦夏四月己卯詔以隋末亂離因之饑饉暴骸滿野傷人心目宜令所在官司收瘞初突厥突利可汗建牙直幽州之北主東偏奚霫等數十部多叛突厥來降頡利可汗以其失衆責之及薛延陀回紇等敗欲谷設頡利遣突利討之突利兵又敗輕騎奔還頡利怒拘之十餘日而撻之突利由是怨隂欲叛頡利頡利數徴兵於突利突利不與表請入朝上謂侍臣曰曏者突厥之彊控􅁌百萬憑陵中夏用是驕恣以失其民今自請入朝非困窮肯如是乎朕聞之且喜且懼何則突厥衰則邊境安矣故喜然朕或失道它日亦將如突厥能無懼乎卿曹宜不惜苦諫以輔朕之不逮也頡利發兵攻突利丁亥突利遣使來求救上謀於大臣曰朕與突利為兄弟有急不可不救然頡利亦與之有盟奈何兵部尚書杜如晦曰戎狄無信終當負約今不因其亂而取之後悔無及夫取亂侮亡古之道也丙申契丹酋長帥其部落來降頡利遣使請以梁師都易契丹上謂使者曰契丹與突厥異類今來歸附何故索之師都中國之人盜我土地暴我百姓突厥受而庇之我興兵致討輒來救之彼如魚游釜中何患不爲我有借使不得亦終不以降附之民易之也先是上知突厥政亂不能庇梁師都以書諭之師都不從上遣夏州都督長史劉旻司馬劉蘭成圖之旻等數遣輕騎踐其禾稼多縱反間離其君臣其國漸虚降者相屬其名將李正寶等謀執師都事洩來奔由是上下益相疑旻等知可取上表請兵上遣右衞大將軍柴紹殿中少監薛萬均擊之又遣旻等據朔方東城以逼之師都引突厥兵至城下劉蘭成偃旗卧鼓不出師都宵遁蘭成追擊破之突厥大發兵救師都柴紹等未至朔方數十里與突厥遇奮擊大破之遂圍朔方突厥不能救城中食盡壬寅師都從父弟洛仁殺師都以城降以其地為夏州太常少卿祖孝孫以爲梁陳之音多吳楚周齊之音多胡夷於是斟酌南北考以古聲作唐雅樂凡八十四調三十一曲十二和詔協律郎張文收與孝孫同修定六月乙酉孝孫等奏新樂上曰禮樂者蓋聖人縁情以設教耳治之隆替豈由於此御史大夫杜淹曰齊之將亡作伴侣曲陳之將亡作玉樹後庭花其聲哀思行路聞之皆悲泣何得言治之隆替不在樂也上曰不然夫樂能感人故樂者聞之則喜憂者聞之則悲悲喜在人心非由樂也將亡之政民必愁苦故聞樂而悲耳今二曲具存朕為公奏之公豈悲乎右丞魏徴曰古人稱禮云禮云玉帛云乎哉樂云樂云鍾鼓云乎哉樂誠在人和不在聲音也臣光曰臣聞垂能目制方圓心度曲直然不能以教人其所以教人者必規矩而已矣聖人不勉而中不思而得然不能以授人其所以授人者必禮樂而已矣禮者聖人之所履也樂者聖人之所樂也聖人履中正而樂和平又思與四海共之百世傳之於是乎作禮樂焉故工人執垂之規矩而施之器是亦垂之功巳王者執五帝三王之禮樂而施之世是亦五帝三王之治已五帝三王其違世已久後之人見其禮知其所履聞其樂知其所樂炳然若猶存於世焉此非禮樂之功邪夫禮樂有本有文中和者本也容聲者末也二者不可偏廢先王守禮樂之本未嘗須臾去於心行禮樂之文未嘗須臾逺於身興於閨門著於朝廷被於鄉遂比隣達於諸侯流於四海自祭祀軍旅至於飲食起居未嘗不在禮樂之中如此數十百年然後治化周浹鳳凰來儀也茍無其本而徒有其末一日行之而百日捨之求以移風易俗誠亦難矣是以漢武帝置協律歌天瑞非不美也不能免哀痛之詔王莽建羲和考律吕非不精也不能救漸臺之禍晉武帝制笛尺調金石非不詳也不能弭平陽之災梁武帝立四器調八音非不察也不能免臺城之辱然則雖韶夏濩武之音具存於世茍其餘不足以稱之曽不能化一夫况四海乎是猶執垂之規矩而無工與材坐而待器之成終不可得也况齊陳滛昬之主亡國之音蹔奏於庭烏能變一世之哀樂乎而太宗遽云治之隆替不由於樂何發言之易而果於非聖人也如此夫禮非威儀之謂也然無威儀則禮不可得而行矣樂非聲音之謂也然無聲音則樂不可得而見矣譬諸山取其一土一石而謂之山則不可然土石皆去山於何在哉故曰無本不立無文不行奈何以齊陳之音不驗於今世而謂樂無益於治亂何異暏拳石而輕泰山乎必若所言則是五帝三王之作樂皆妄也君子於其所不知蓋闕如也惜哉戊子上謂侍臣曰朕觀隋􅌆帝集文辭奥博亦知是堯舜而非桀紂然行事何其反也魏徴對曰人君雖聖哲猶當虚已以受人故智者獻其謀勇者竭其力􅌆帝恃其俊才驕矜自用故口誦堯舜之言而身為桀紂之行曽不自知以至覆亡也上曰前事不逺吾屬之師也畿内有蝗辛卯上入苑中見蝗掇數枚祝之曰民以穀為命而汝食之寧食吾之肺腸舉手欲吞之左右諫曰惡物或成疾上曰朕為民受災何疾之避遂吞之是嵗蝗不為災上曰朕每臨朝欲發一言未嘗不三思恐為民害是以不多言給事中知起居事杜正倫曰臣職在記言陛下之言失臣必書之豈徒有害於今亦恐貽譏於後上悦賜絹二百叚上曰梁武帝君臣惟談苦空矦景之亂百官不能乗馬元帝為周師所圍猶講老子百官戎服以聴此深足為戒朕所好者唯堯舜周孔之道以為如鳥有翼如魚有水失之則死不可暫無耳以辰州刺史裴䖍通煬帝故人特䝉寵任而身為弑逆雖時移事變屢更赦令幸免族夷不可猶使牧民乃下詔除名流驩州䖍通常言身除隋室以啟大唐自以為功頗有觖望之色及得罪怨憤而死秋七月詔宇文化及之黨萊州刺史牛方裕絳州刺史薛世良廣州都督長史唐奉義隋武牙郎將元禮並除名徙邊上謂侍臣曰古語有之赦者小人之幸君子之不幸一嵗再赦善人喑啞夫養稂莠者害嘉穀赦有罪者賊良民故朕即位以來不欲數赦恐小人恃之輕犯憲章故也資治通鑑卷第一百九十二
