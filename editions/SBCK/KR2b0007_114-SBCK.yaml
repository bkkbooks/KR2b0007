front:
  text: 望見火起知城巳䧟其衆皆潰振逃于溳川乙未詔大處分悉委冠軍將軍劉毅戊戌大赦攺元惟􅁊氏不原以􅁊沖忠於王室特宥其孫㣧以魯宗之爲雍州刺史毛璩爲征西將軍都督益梁秦凉寧五州諸軍事璩弟瑾爲梁秦二州刺史瑗爲寧州刺史劉懐肅追斬馮該於石城􅁊謙􅁊怡􅁊蔚􅁊謐何澹之温楷皆犇秦怡弘之弟也燕王熙伐髙句麗戊申攻遼東城且䧟熙命將士母得先登俟剗平其城朕與皇后乗輦而入由是城中得嚴僃卒不克而還秦王興以鳩摩羅什爲國師奉之如神親帥羣臣及沙門聽羅什講佛經又命羅什翻譯西域經論三百餘卷大營塔寺沙門坐禪者常以千數公卿以下皆奉佛由是州郡化之事佛者十室而九乞伏乾歸擊吐谷渾大孩大破之俘萬餘口而還大孩走死胡園視羆世子樹洛于帥其餘衆數千家犇莫何川自稱車􅀐大將軍大單于吐谷渾王樹洛干輕傜薄賦信賞必罰吐谷渾復興沙漒諸戎皆附之西涼公暠自稱大將軍大都督領秦涼二州牧大赦攺元建􅀄遣舍人黄始梁興閒行奉表詣建康二月丁己留臺僃灋駕迎帝於江陵劉毅劉道規留屯夏口何無忌奉帝東還􅀄毛璩聞􅁊振䧟江陵帥衆三萬順流東下將討之使其弟西夷校尉瑾蜀郡太守瑗出外水參軍巴西譙縱矦暉出涪水蜀人不樂逺征暉至五城水口與巴西陽昧謀作亂縱爲人和謹蜀人愛之暉昩共逼縱爲主縱不可走投于水引出以兵逼縱登輿縱又投地叩頭固辭暉􅅞縱於輿還襲毛瑾於涪城殺之推縱爲梁秦二州刺史璩至略城聞變犇還成都遣參軍王瓊將兵討之爲縱弟明子所敗死者什八九益州營户李騰開城納縱兵殺璩及弟瑗滅其家縱稱成都王以從弟洪爲益州刺史以明子爲巴州刺史屯白帝於是蜀大亂漢中空虚氐王楊盛遣其兄子平􅀯將軍撫據之癸亥魏主珪還自犲山罷尚書三十六曹
