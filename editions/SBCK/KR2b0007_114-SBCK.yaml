body:
  text: 三月􅁊振自鄖城襲江陵荆州刺史司馬休之戰敗犇襄陽振自稱荆州刺史建威將軍劉懐肅自雲杜引兵馳赴與振戰於沙橋劉毅遣廣武將軍唐興助之臨陳斬振復取江陵甲午帝至建康乙未百官詣闕請罪詔令復職尚書殷仲文以朝廷音樂未僃言於劉􅁉請治之􅁉曰今日不暇給且性所不解仲文曰好之自解􅁉曰正以解則好之故不習耳庚子以琅邪王徳文爲大司馬武陵王遵爲太保劉裕爲侍中車􅀐將軍都督中外諸軍事徐青二州刺史如故劉毅爲左將軍何無忌爲右將軍督豫州楊州五郡軍事豫州刺史劉道規爲輔國將軍督淮北諸軍事并州刺史魏詠之爲征虜將軍呉國内史裕固讓不受加録尚書事又不受屢請歸藩詔百僚敦勸帝親幸其第􅁉惶懼復詣闕陳請乃聽歸藩以魏詠之爲荆州刺史代司馬休之􅀄劉毅甞爲劉敬宣寧朔參軍時人或以雄傑許之敬宣曰夫非常之才自有調度豈得便謂此君爲人豪邪此君之性外寛而內忌自伐而尚人若一旦遭遇亦當以陵上取禍耳毅聞而恨之及敬宣爲江州辭以無功不宜授任先於毅等􅁉不許毅使人言於􅁉曰劉敬宣不豫建義猛將勞臣方須叙報如敬宣之比宜令在後若使君不忘平生正可爲貟外常侍耳聞巳授郡實爲過優尋復爲江州尤用駭惋敬宣愈不自安自表解職乃召還爲宣城內史夏四月劉􅁉旋鎮京口攺授都督荆司等十六州諸軍事加領兖州刺史盧循遣使貢獻時朝廷新定未暇征討壬申以循爲廣州刺史徐道覆爲始興相循遺劉裕益智粽􅁉報以續命湯循以前琅邪內史王誕爲平􅀯長史誕説循曰誕本非戎旅在此無用素爲劉鎮軍所厚若得北歸必蒙􅀉任公私際㑹仰荅厚恩循甚然之劉􅁉與循書令遣吴隱之還循不從誕復説循曰將軍今留吴公公私非計孫伯符豈不欲留華子魚邪但以一境不容二君耳於是循遣隱之與誕俱還􅀄􅀯燕主僃德仕秦爲張掖太守其兄納與母公孫氏居于張掖僃徳之從秦王堅寇淮􅀯也留金刀與其母别僃德與燕王垂舉兵於山東張掖太守苻昌收納及僃徳諸子皆誅之公孫氏以老獲免納妻叚氏方娠未決獄掾呼延平僃德之故吏也竊以公孫氏及叚氏逃于羌中叚氏生子超十歳而公孫氏病臨卒以金刀授超曰汝得東歸當以此刀還汝叔也呼延平又以超母子犇涼及吕隆降秦超隨涼州民徙長安平卒叚氏為超娶其女爲婦超恐爲秦人所録乃陽狂行乞秦人賤之惟東平公紹見而異之言於秦王興曰慕容超姿幹􅉞偉殆非真狂願微加官爵以縻之興召見與語超故爲謬對或問而不荅興謂紹曰諺云妍皮不裹癡骨徒妄語耳乃罷遣之僃徳聞納有遺腹子在秦遣濟隂人吴辯往視之辯因郷人宗正謙賣卜在長安以告超超不敢告其母妻濳與謙變姓名逃歸􅀯燕行至梁父鎮􅀯長史恱壽以告兖州刺史慕容灋灋曰昔漢有卜者詐稱衛太子今安知非此類也不禮之超由是與灋有隙僃德聞超至大喜遣􅀐三百迎之超至廣固以金刀獻於僃德僃德慟哭悲不自勝封超爲北海王拜侍中驃􅀐大將軍司􅀠校尉開府妙選時賢爲之僚佐僃德無子欲以超爲嗣超入則侍奉盡歡出則傾身下士由是内外譽望翕然歸之五月桂陽太守章武王秀及益州刺史司馬􅁤之謀反伏誅秀妻􅁊振之妹也故自疑而反􅁊玄餘黨􅁊亮苻宏等擁衆寇亂郡縣者以十數劉毅劉道規檀祗等分兵討滅之荆湘江豫皆平詔以毅爲都督淮􅀯等五郡軍事豫州刺史何無忌爲都督江東五郡軍事會稽内史北青州刺史劉該反引魏爲援清河陽平二郡太守孫全聚衆應之六月魏豫州刺史索度真大將斛斯蘭冦徐州圍彭城劉􅁉遣其弟􅀯彭城內史道憐東海太守孟龍苻將兵救之斬該及全魏兵敗走龍符懐玉之弟也秦隴西公碩徳伐仇池屢破楊盛兵將軍斂俱攻漢中拔成固徙流民三千餘家於􅀜中秋七月楊盛請降于秦秦以盛爲都督益寧二州諸軍事征􅀯大將軍益州牧劉裕遣使求和於秦且求􅀯郷等諸郡秦王興許之羣臣咸以爲不可興曰天下之善一也劉裕拔起細微能討誅􅁊玄興復晉室內釐庶政外脩封疆吾何惜數郡不以成其羙乎遂割􅀯郷順陽新野舞隂等十二郡歸于晉八月燕遼西太守邵顔有罪亡命爲盗九月中常侍郭仲討斬之汝水竭􅀯燕主僃德惡之俄而寢疾北海王超請禱之僃徳曰人主之命短長在天非汝水所能制也固請不許戊午僃德引見羣臣于東陽殿議立超爲太子俄而地震百僚驚恐僃德亦不自安還宫是夜疾篤瞑不能言叚后大呼今召中書作詔立超可乎僃德開目頷之乃立超爲皇太子大赦僃德尋卒爲十餘棺夜分出四門潜瘞山谷己未超即皇帝位大赦攺元太上尊叚后爲皇太后以北地王鍾都督中外諸軍録尚書事慕容灋爲征􅀯大將軍都督徐兖楊􅀯兖四州諸軍事加慕容鎮開府儀同三司以尚書令封孚爲太尉麴仲爲司空封嵩爲尚書左僕射癸亥虚葬僃德於東陽陵諡曰獻武皇帝廟號丗宗超引所親公孫五樓爲腹心備徳故大臣北地王鍾段宏等皆不自安求補外職超以鍾爲青州牧宏爲徐州刺史公孫五樓爲武衛將軍領屯􅀐校尉内參政事封孚諌曰臣聞親不處外羇不處内鍾國之宗臣社稷所頼宏外戚懿望百姓具瞻正應參翼百揆不宜逺鎮外方今鍾等出藩五樓内輔臣竊未安超不從鍾宏心皆不平相謂曰黄犬之皮恐終􅀘狐裘也五樓聞而恨之魏詠之卒江陵令羅脩謀舉兵襲江陵奉王慧龍爲主劉􅁉以并州刺史劉道規爲都督荆寧等六州諸軍事荆州刺史脩不果發奉慧龍犇秦乞伏乾歸伐仇池爲楊盛所敗西涼公暠與長史張邈謀徙都酒泉以逼沮渠蒙遜以張體順爲建康太守鎮樂涫以宋繇爲敦煌護軍與其子敦煌太守讓鎮敦煌遂遷于酒泉暠手令戒諸子以爲從政者當審慎賞罰勿任愛憎近忠正逺佞諛勿使左右竊弄威福毁譽之來當研覈真僞聽訟折獄必和顔任理謹勿逆詐億必輕加聲色務廣咨詢勿自專用吾蒞事五年雖未能息民然含垢匿瑕朝爲冦讎夕委心膂粗無負於新舊事任公平坦然無纇􅀄不容懐有所損益計近則如不足經逺乃爲有餘庶亦無愧前人也十二月燕王熙襲契丹二年春正月甲申魏主珪如豺山宫諸州置三刺史郡置三太守縣置三令長刺史令長各之州縣太守雖置而未臨民功臣爲州者皆徴還京師以爵歸第益州刺史司馬榮期擊譙明子于白帝破之燕王熙至陘北畏契丹之衆欲還苻后不聽戊申遂棄輜重輕兵襲髙句麗􅀯燕主超猜虐日甚政出權倖盤于遊畋封孚韓􅒲屢諫不聴超甞臨軒問孚曰朕可方前丗何主對曰桀紂超慙怒孚徐步而出不爲攺容鞠仲謂孚曰與天子言何得如是宜還謝孚曰行年七十惟求死所耳竟不謝超以其時望優容之􅁊􅀇之亂河閒王曇之子國璠叔璠犇南燕二月甲戌國璠等攻陷弋陽燕軍行三千餘里士馬疲凍死者屬路攻髙句麗木底城不克而還夕陽公雲傷於矢且畏燕王熙之虐遂以疾去官三月庚子魏主珪還平城夏四月庚申復如豺山宫甲午還平城柔然社崘侵魏邊五月燕主寶之子博陵公䖍上黨公昭皆以嫌疑賜死六月秦隴西公碩徳自上邽入朝秦王興爲之大赦及歸送之至雍乃還興事晉公緒及碩徳皆如家人禮車馬服玩先奉二叔而自服其次國家大政皆咨而後行秃髪傉檀伐沮渠蒙遜蒙遜嬰城固守傉檀至赤泉而還獻馬三千匹羊三萬口于秦秦王興以爲忠以傉檀爲都督河右諸軍事車􅀐大將軍涼州刺史鎮姑臧徴王尚還長安涼州人申屠英等遣主簿胡威詣長安請留尚興弗許威見興流涕言曰臣州奉戴王化於兹五年土宇僻逺威靈不接士民甞膽抆血共守孤城仰恃陛下聖徳俯杖良牧仁政克自保全以至今日陛下柰何乃以臣等貿馬三千匹羊三萬口賤人貴畜無乃不可若軍國湏馬直煩尚書一符臣州三千餘户各輸一馬朝下夕辦何難之有昔漢武傾天下之資力開拓河西以斷匈奴右臂今陛下無故棄五郡之地忠良華族以資暴虜豈惟臣州士民墜於塗炭恐方爲聖朝旰食之憂興悔之使西平人車普馳止王尚又遣使諭傉檀會傉檀巳帥步􅀐三萬軍于五澗普先以狀告之傉檀遽逼遣王尚尚出自清陽門傉檀入自涼風門别駕宗敞送尚還長安傉檀謂敞曰吾得涼州三千餘家情之所􅀉唯卿一人柰何捨我去乎敞曰今送舊君所以忠於殿下也傉檀曰吾新牧貴州懐逺安邇之略如何敞曰涼土雖􅁦形勝之地殿下惠撫其民収其賢俊以建功名其何求不獲因薦本州文武名士十餘人傉檀嘉納之王尚至長安興以爲尚書傉檀燕羣僚於宣徳堂仰視歎曰古人有言作者不居居者不作信矣武威孟禕曰昔張文王始爲此堂於今百年十有二主矣惟履信思順者可以乆處傉檀善之魏主珪規度平城欲擬鄴洛長安脩廣宫室以濟陽太守莫題有巧思召見與之商功題乆侍稍怠珪怒賜死題含之孫也於是發八部五百里内男丁築灅􅀯宫闕門髙十餘丈穿溝池廣􅁐囿規立外城方二十里分置市里三十日罷秋七月魏太尉冝都丁公穆崇薨八月秃髮傉檀以興城矦文支鎮姑臧自還樂都雖受秦爵命然其車服禮儀皆如王者甲辰魏主珪如豺山宫遂之石漠九月度漠北癸巳􅀯還長川劉􅁉聞譙縱反遣龍驤將軍毛脩之將兵與司馬榮期文處茂時延祖共討之脩之至宕渠榮期爲其參軍楊承祖所殺承祖自稱巴州刺史脩之退還白帝秃髮傉檀求好於西涼西涼公暠許之沮渠蒙遜襲酒泉至安珍暠戰敗城守蒙遜引還􅀯燕公孫五樓欲擅朝權譛北地王鍾於􅀯燕主超請誅之􅀯燕主僃德之卒也慕容灋不奔喪超遣使讓之灋懼遂與鍾及叚宏謀反超聞之徴鍾鍾稱疾不至超収其黨侍中慕容統等殺之征􅀯司馬卜珍告左僕射封嵩數與灋往來疑有姦超収嵩下廷尉太后懼泣告超曰嵩數遣黄門令牟常説吾云帝非太后所生恐依永康故事我婦人識淺恐帝見殺即以語灋灋爲謀見誤知復何言超乃車裂嵩西中郎將封融犇魏超遣慕容鎮攻青州慕容昱攻徐州右僕射濟陽王凝及韓範攻兖州昱拔莒城叚宏犇魏封融與羣盗襲石塞城殺鎮西大將軍餘鬱國中振恐濟陽王凝謀殺韓範襲廣固範知之勒兵攻凝凝犇梁父範并將其衆攻梁父克之灋出犇魏凝出犇秦慕容鎮克青州鍾殺其妻子爲地道以出與髙都公始皆犇秦秦以鍾爲始平太守凝爲侍中􅀯燕主超好變更舊制朝野多不恱又欲復肉刑增置烹轘之灋衆議不合而止冬十月封孚卒尚書論建義功奏封劉裕豫章郡公劉毅􅀯平郡公何無忌安成郡公自餘封賞有差梁州刺史劉稚反劉毅遣將討禽之庚申魏主珪還平城乙亥以左將軍孔安國爲尚書左僕射十一月秃髮傉檀遷于姑臧乞伏乾歸入朝于秦十二月以何無忌爲都督荆江豫三州八郡軍事江州刺史是嵗􅁊石綏與司馬國璠陳襲聚衆胡桃山爲寇劉毅遣司馬劉懐肅討破之石綏石生之弟也三年春正月辛丑朔燕大赦攺元建始秦王興以乞伏乾歸寖彊難制留爲主客尚書以其丗子熾磐行西夷校尉監其部衆二月己酉劉􅁉詣建康固辭新所除官欲詣廷尉詔從其所守􅁉乃還丹徒魏主珪立其子脩爲河閒王處文爲長樂王連爲廣平王黎爲京兆王殷仲文素有才望自謂冝當朝政悒悒不得志出爲東陽太守尤不樂何無忌素慕其名東陽無忌所統仲文許便道脩謁無忌喜欽遲之而仲文失志恍惚遂不過府無忌以爲薄已大怒會南燕入寇無忌言於劉􅁉曰􅁊㣧殷仲文乃腹心之疾北虜不足憂也閏月劉裕府將駱冰謀作亂事覺􅁉斬之因言冰與仲文􅁊石松曹靖之卞承之劉延祖潜相連結謀立桓㣧爲主皆族誅之燕王熙爲其后苻氏起承華殿負土於北門土與穀同價􅀫軍典軍杜静載棺詣闕極諫熙斬之苻氏甞季夏思凍魚仲冬湏生地黄熙下有司切責不得而斬之夏四月癸丑苻氏卒熙哭之懣絶乆而復蘇喪之如父母服斬衰食粥命百官於宫内設位而哭使人案檢哭者無淚則罪之羣臣皆含辛以爲淚髙陽王妃張氏熙之嫂也羙而有巧思熙欲以爲殉乃毁其禭鞾中得弊氈遂賜死右僕射韋璆等皆恐爲殉沐浴俟命公卿以下至兵民户率營陵費殫府藏陵周圍數里熙謂監作者曰善爲之朕將繼往丁酉燕太后叚氏去尊號出居外宫氐王楊盛以平北將軍苻宣爲梁州督護將兵入漢中秦梁州别駕吕瑩等起兵應之刺史王敏攻之瑩等求援於盛盛遣軍臨濜口敏退屯武興盛復通於􅀳􅀳以盛爲都督隴右諸軍事征西大將軍開府儀同三司盛因以宣行梁州刺史五月壬戌燕尚書郎苻進謀反誅進定之子也魏主珪北巡至濡源魏常山王遵以罪賜死􅀄魏主珪滅劉衛辰其子勃勃犇秦秦髙平公􅃿弈干以女妻之勃勃魁岸羙風儀性辯慧秦王興見而竒之與論軍國大事寵遇踰於勲舊興弟邕諌曰勃勃不可近也興曰勃勃有濟世之才吾方與之平天下柰何逆忌之乃以爲安逺將軍使助􅃿弈干鎮髙平以三城朔方雜夷及衛辰部衆三萬配之使伺魏閒隙邕固爭以爲不可興曰卿何以知其爲人邕曰勃勃奉上慢御衆殘貪猾不仁輕爲去就寵之踰分恐終爲邊患興乃止乆之竟以勃勃爲安北將軍五原公配以三交五部鮮卑及雜虜二萬餘落鎮朔方魏主珪歸所虜秦將唐小方于秦秦王興請歸賀狄干仍送良馬千匹以贖狄伯支珪許之勃勃聞秦復與魏通而怒乃謀叛秦柔然可汗社崘獻馬八千匹于秦至大城勃勃掠取之悉集其衆三萬餘人僞畋於髙平川因襲殺没弈干而并其衆勃勃自謂夏后氏之苗裔六月自稱大夏天王大單于大赦攺元龍升置百官以其兄右地代爲丞相封代公力俟提爲大將軍封魏公叱干阿利爲御史大夫封梁公弟阿利羅引爲司􅀠校尉若門爲尚書令叱以鞬爲左僕射乙斗爲右僕射賀狄干乆在長安常幽閉因習讀經史舉止如儒者及還魏主珪見其言語衣服皆􅀋秦人以爲慕而效之怒并其弟歸殺之秦王興以太子泓録尚書事秋七月戊戌朔日有食之汝南王遵之坐事死遵之亮之五丗孫也癸亥燕王熙葬其后苻氏于徽平陵喪車髙大毁北門而出熙􅀍髮徒跣步從二十餘里甲子大赦􅀄中衛將軍馮跋及弟侍御郎素弗皆得罪於熙熙欲殺之跋兄弟亡命山澤熙賦役繁數民不堪命跋素弗與其從弟萬泥謀曰吾輩還首無路不若因民之怨共舉大事可以建公矦之業事之不捷死未晚也遂相與乗車使婦人御潜入龍城匿於北部司馬孫護之家及熙出送葬跋等與左衛將軍張興及苻進餘黨作亂䟦素與慕容雲善乃推雲爲主雲以疾辭跋曰河閒滛虐人神共怒此天亡之時也公髙氏名家何能爲人養子而棄難得之運乎扶之而出䟦弟乳陳等帥衆攻弘光門鼔噪而進禁衛皆散走遂入宫授甲閉門拒守中黄門趙洛生走告于熙熙曰䑕盜何能爲朕當還誅之乃置后柩於南􅁐收髮貫甲馳還赴難夜至龍城攻北門不克􅀫於門外乙丑雲即天王位大赦攺元正始熙退入龍騰􅁐尚方兵禇頭踰城從熙稱營兵同心效順唯俟軍至熙聞之驚走而出左右莫敢迫熙從溝下潜遁良乆左右怪其不還相與尋之唯得衣冠不知所適中領軍慕容拔謂中常侍郭仲曰大事垂捷而帝無故自驚深可怪也然城内企遟至必成功不可稽留吾當先往趣城卿留待帝得帝速來若帝未還吾得如意安撫城中徐迎未晚乃分將壯士二千餘人登北城將士謂熙至皆投仗請降既而熙乆不至拔兵無後繼衆心疑懼復下城赴􅁐遂皆潰去拔爲城中人所殺丙寅熙微服匿於林中爲人所執送於雲雲數而殺之并其諸子雲復姓髙氏幽州刺史上庸公懿以令支降魏魏以懿爲平州牧昌黎王懿評之孫也魏主珪自濡源西如參合陂乃還平城秃髪傉檀復貳於秦遣使邀乞伏熾磐熾盤斬其使送長安南燕主超母妻猶在秦超遣御史中丞封愷使於秦以請之秦王興曰昔苻氏之敗太樂諸􅇊悉入于燕燕今稱藩送􅇊或送吴口千人所請乃可得也超與羣臣議之左僕射叚暉曰陛下嗣守社稷不宜以私親之故遂降尊號且太樂先代遺音不可與也不如掠吴口與之尚書張華曰侵掠鄰國兵連禍結此既能往彼亦能來非國家之福也陛下慈親在人掌握豈可靳惜虚名不爲之降屈乎中書令韓範甞與秦王俱爲苻氏太子舍人若使之往必得如志超從之乃使韓範聘于秦稱藩奉表慕容凝言於興曰燕王得其母妻不復可臣宜先使送伎興乃謂範曰朕歸燕王家屬必矣然今天時尚􅀬當俟秋涼八月秦使貟外散􅀐常侍韋宗聘於燕超與羣臣議見宗之禮張華曰陛下前既奉表今冝北靣受詔封逞曰大燕七聖重光柰何一旦爲豎子屈節超曰吾爲太后屈願諸君勿復言遂北靣受詔毛脩之與漢嘉太守馮遷合兵擊楊承祖斬之脩之欲進討譙縱益州刺史鮑陋不可脩之上表言人之所以重生實有生理可保臣之情地生塗巳竭所以借命朝露者庶憑天威誅夷讎逆今屢有可乗之機而陋每違期不赴臣雖效死冦庭而救援理絶將何以濟劉裕乃表襄城太守劉敬宣帥衆五千伐蜀以劉道規爲征蜀都督魏主珪如豺山宫候官告司空􅁃岳服飾鮮麗行止風采擬則人君珪収岳殺之北燕王雲以馮跋爲都督中外諸軍事開府儀同三司録尚書事馮萬泥爲尚書令馮素弗爲昌黎尹馮􅀪爲征東大將軍孫護爲尚書左僕射張興爲輔國大將軍􅀪䟦之弟也九月譙縱稱藩於秦秃髪傉檀將五萬餘人伐沮渠蒙遜蒙遜與戰於均石大破之蒙遜進攻西郡太守楊統於日勒降之冬十月秦河州刺史彭奚念叛降於秃髮傉檀秦以乞伏熾磐行河州刺史南燕主超使左僕射張華給事中宗正元獻太樂􅇊一百二十人於秦秦王興乃還超母妻厚其資禮而遣之超親帥六宫迎於馬耳􅀜夏王勃勃破鮮卑薛千等三部降其衆以萬數進攻秦三城巳北諸戍斬秦將楊丕姚石生等諸將皆曰陛下欲經營􅀜中宜先固根本使人心有所慿係髙平山川險固土田饒沃可以定都勃勃曰卿知其一未知其二吾大業草創士衆未多姚興亦一時之雄諸將用命􅀜中未可圖也我今専固一城彼必并力於我衆非其敵亡可立待不如以驍􅀐風馳出其不意救前則擊後救後則擊前使彼疲於犇命我則游食自若不及十年嶺北河東盡爲我有待興既死嗣子闇弱徐取長安在吾計中矣於是侵掠嶺北嶺北諸城門不晝啟興乃歎曰吾不用黄兒之言以至於此勃勃求婚於秃髮傉檀傉檀不許十一月勃勃帥􅀐二萬擊傉檀至于支陽殺傷萬餘人驅掠二萬七千餘口牛馬羊數十萬而還傉檀帥衆追之焦朗曰勃勃天姿雄徤御軍嚴整未可輕也不如從温圍北渡趣萬斛堆阻水結營扼其咽喉百戰百勝之術也傉檀將賀連怒曰勃勃敗亡之餘烏合之衆柰何避之示之以弱冝急追之傉檀從之勃勃於陽武下峽鑿凌埋車以塞路勒兵逆擊傉檀大破之追犇八十餘里殺傷萬計名臣勇將死者什六七傉檀與數􅀐犇南山幾爲追􅀐所得勃勃積尸而封之號曰髑髏臺勃勃又敗秦將張佛生於青石原俘斬五千餘人傉檀懼外寇之逼徙三百里内民皆入姑臧國人駭怨屠各成七兒因之作亂一夕聚衆至數千人殿中都尉張猛大言於衆曰主上陽武之敗蓋恃衆故也責躬悔過何損於明而諸君遽從此小人爲不義之事殿中兵今至禍在目前矣衆聞之皆散七兒犇晏然追斬之軍諮祭酒梁裒輔國司馬邊憲等謀反傉檀皆殺之魏主珪還平城十二月戊子武岡文恭矦王謐薨是歳西涼公暠以前表未報復遣沙門灋泉閒行奉表詣建康四年春正月甲辰以琅邪王徳文領司徒劉毅等不欲劉􅁉入輔政議以中領軍謝混爲楊州刺史或欲令􅁉於丹徒領楊州以内事付孟昶遣尚書右丞皮沈以二議諮􅁉沈先見􅁉記室録事參軍劉穆之具道朝議穆之僞起如厠密䟽白􅁉曰皮沈之言不可從􅁉既見沈且令出外呼穆之問之穆之曰晉朝失政日乆天命巳移公興復皇祚勲髙位重今日形勢豈得居謙遂爲守藩之將耶劉孟諸公與公俱起布衣共立大義以取冨貴事有前後故一時相推非爲委體心服􅀫定臣主之分也力敵勢均終相吞噬楊州根本所係不可假人前者以授王謐事出權道今若復以佗授便應受制於人一失權柄無由可得將來之危難可熟念今朝議如此宜相酬荅必云在我措辭又難唯應云神州治本宰輔崇要此事既大非可懸論便蹔入朝共盡同異公至京邑彼必不敢越公更授餘人明矣􅁉從之朝廷乃徴􅁉爲侍中車􅀐將軍開府儀同三司楊州刺史録尚書事徐兖二州刺史如故􅁉表解兖州以諸葛長民爲青州刺史鎮丹徒劉道憐爲并州刺史戍石頭庚申武陵忠敬王遵薨魏主珪如豺山宫遂至􅇞川南燕主超尊其母叚氏爲皇太后妻呼延氏爲皇后超祀南郊有獸如䑕而赤大如馬來至壇側須㬰大風晝晦羽儀帷幄皆毁裂超懼以問太史令成公綏對曰陛下信用姦佞誅戮賢良賦斂繁多事役殷重之所致也超乃大赦黜公孫五樓等俄而復用之北燕王雲立妻李氏爲皇后子彭城爲太子三月庚申葬燕王熙及苻后于徽平陵謚熙曰昭文皇帝髙句麗遣使聘北燕且敘宗族北燕王雲遣侍御史李拔報之夏四月尚書左僕射孔安國卒甲午以吏部尚書孟昶代之北燕大赦五月北燕以尚書令馮萬泥爲幽冀二州牧鎮肥如中軍將軍馮乳陳爲并州牧鎮白狼撫軍大將軍馮素弗爲司􅀠校尉司􅀠校尉務銀提爲尚書令譙縱遣使稱藩於秦又與盧循潛通縱上表請􅁊謙於秦欲與之共擊劉裕秦王興以問謙謙曰臣之累丗著恩荆楚若得因巴蜀之資順流東下士民必翕然響應興曰小水不容巨魚若縱之才力自足辦事亦不假君以爲鱗翼宜自求多福遂遣之謙至成都虚懐引士縱疑之置於龍格使人守之謙泣謂諸弟曰姚主之言神矣秦王興以秃髮傉檀外内多難欲因而取之使尚書郎韋宗往覘之傉檀與宗論當丗大略縱横無窮宗退嘆曰竒才英器不必華夏明智敏識不必讀書吾乃今知九州之外五經之表復自有人也歸言於興曰涼州雖弊傉檀權譎過人未可圖也興曰劉勃勃以烏合之衆猶能破之况我舉天下之兵以加之乎宗曰不然形移勢變返覆萬端陵人者易敗戒懼者難攻傉檀之所以敗於勃勃者輕之也今我以大軍臨之彼必懼而求全臣竊觀羣臣才略無傉檀之比者雖以天威臨之亦未敢保其必勝也興不聽使其子中軍將軍廣平公弼後軍將軍斂成鎮逺將軍乞伏乾歸帥步􅀐三萬襲傉檀左僕射齊難帥􅀐二萬討勃勃吏部尚書尹昭諫曰傉檀恃其險逺故敢違慢不若詔沮渠蒙遜及李暠討之使自相困斃不必煩中國之兵也亦不聽興遺傉檀書曰今遣齊難討勃勃恐其西逸故令弼等於河西邀之傉檀以爲然遂不設僃弼濟自金城姜紀言於弼曰今王師聲言討勃勃傉檀猶豫守僃未嚴願給輕􅀐五千掩其城門則山澤之民皆爲吾有孤城無援可坐克也弼不從進至漠口昌松太守蘇霸閉城拒之弼遣人諭之使降霸曰汝棄信誓而伐與國吾有死而巳何降之有弼進攻斬之長驅至姑臧傉檀嬰城固守出竒兵擊弼破之弼退據西􅁐城中人王鍾等謀爲内應事泄傉檀欲誅首謀者而赦其餘前軍將軍伊力延矦曰今彊寇在外而姦人竊發於内危孰甚焉不悉阬之何以懲後傉檀從之殺五千餘人命郡縣悉散牛羊於野斂成縱兵鈔掠傉檀遣鎮北大將軍俱延鎮軍將軍敬歸等擊之秦兵大敗斬首七千餘級姚弼固壘不出傉檀攻之未克秋七月興遣衛大將軍常山公顯帥􅀐二萬爲諸軍後繼至髙平聞弼敗倍道赴之顯遣善射者孟欽等五人挑戰於凉風門􅁌未及發傉檀材官將軍宋益等迎擊斬之顯乃委罪斂成遣使謝傉檀慰撫河外引兵還傉檀遣使者徐宿詣秦謝罪夏王勃勃聞秦兵且至退保河曲齊難以勃勃既逺縱兵野掠勃勃潜師襲之俘斬七千餘人難引兵退走勃勃追至木城禽之虜其將士萬三千人於是嶺北夷夏附於勃勃者以萬數勃勃皆置守宰以撫之司馬叔璠自蕃城寇鄒山魯郡太守徐邕棄城走車􅀐長史劉鍾擊却之北燕王雲封慕容歸爲遼東公使主燕祀劉敬宣既入峽遣巴東太守温祚以二千人出外水自帥益州刺史鮑陋輔國將軍文處茂龍驤將軍時延祖由墊江轉戰而前譙縱求救於秦秦王興遣平西將軍姚賞􅀯梁州刺史王敏將兵二萬赴之敬宣軍至黄虎去成都五百里縱輔國將軍譙道福悉衆拒嶮相持六十餘日敬宣不得進食盡軍中疾疫死者太半乃引軍還敬宣坐免官削封三分之一荆州刺史劉道規以督統降號建威將軍九月劉􅁉以敬宣失利請遜位詔降爲中軍將軍開府如故劉毅欲以重灋繩敬宣􅁉保護之何無忌謂毅曰柰何以私憾傷至公毅乃止乞伏熾磐以秦政寖衰且畏秦之攻襲冬十月招結諸部二萬餘人築城于嵻㟍山而據之十一月秃髪傉檀復稱涼王大赦攺元嘉平置百官立夫人折掘氏爲王后丗子武臺爲太子録尚書事左長史趙鼂右長史郭倖爲尚書左右僕射昌松矦俱延爲太尉南燕汝水竭河凍皆合而澠水不冰南燕主超惡之問於李宣對曰澠水無氷良由逼帶京城近日月也超大恱賜朝服一具十二月乞伏熾磐攻彭奚念於枹罕爲奚念所敗而還是嵗魏主珪殺髙邑公莫題􅀄拓跋窟咄之伐珪也題以珪年少潜以箭遺窟咄曰三嵗犢豈能勝重載邪珪心銜之至是或告題居處倨傲擬則人主者珪使人以箭示題而謂之曰三嵗犢果何如題父子對泣詰朝収斬之資治通鑑卷第一百一十四
