front:
  text: 狀甲辰風霾晝晦賴盧營有火建言於儀曰賴盧燒營爲變矣儀以爲然引兵退賴盧聞之亦退建帥其衆詣德降且言儀師老可擊德遣桂陽王鎮南安王青帥騎七千追擊魏軍大破之燕主寳使左衛將軍慕輿騰攻愽陵殺魏所置守宰王建等攻信都六十餘日不下士卒多死庚申魏王珪自攻信都壬戌夜燕宜都王鳳踰城奔中山癸亥信都降魏凉王光以西秦王乾歸數反覆舉兵伐之乾歸羣下請東奔成紀以避之乾歸曰軍之勝敗在於巧拙不在衆寡光兵雖衆而無法其弟延勇而無謀不足憚也且其精兵盡在延所延敗光自走矣光軍于長最遣太原公纂等帥步騎三萬攻金城乾歸帥衆二萬救之未至纂等㧞金城光又遣其將梁㳟等以甲卒萬餘出陽武下峽與秦州刺史沒奕干攻其東天水公延以枹罕之衆攻臨洮武始河闗皆克之乾歸使人紿延云乾歸衆潰犇成紀延欲引輕騎追之司馬耿稚諫曰乾歸勇略過人安肯望風自潰前破王廣楊定皆羸師以誘之今告者視高色動殆必有姦宜整陳而前使步騎相屬俟諸軍畢集然後擊之無不克矣延不從進與乾歸遇延戰死稚與將軍姜顯収散卒還屯枹罕光亦引兵還姑臧秃髪烏孤自稱大都督大將軍大單于西平王大赦改元太初治兵廣武攻凉金城克之凉王光遣將軍竇茍伐之戰于街亭凉兵大敗燕主寳聞魏王珪攻信都出屯深澤遣趙王麟攻楊城殺守兵三百寳悉出珍寳及宫人募郡國羣盗以擊魏二月己巳朔珪還屯楊城沒根兄子醜提為并州監軍聞其叔父降燕懼誅帥所部兵還國作亂珪欲北還遣其國相涉延求和於燕且請以其弟為質寳聞魏有内難不許使冗從僕射蘭真責珪負恩悉發其衆步卒十二萬騎三萬七千屯於曲陽之柏肆營於滹沲水北以邀之丁丑魏軍至營於水南寳濳師夜濟募勇敢萬餘人襲魏營寳陳於營北以為之援募兵因風縱火急擊魏軍魏軍大亂珪驚起弃營跣走燕將軍乞特真帥百餘人至其帳下得珪衣鞾既而募兵無故自驚互相斫射珪於營外望見之乃擊鼓收衆左右及中軍將士稍稍來集多布火炬於營外縱騎衝之募兵大敗還赴寳陳寳引兵復渡水北戊寅魏整衆而至與燕相持燕軍奪氣寳引還中山魏兵隨而擊之燕兵屢敗寳懼弃大軍帥騎二萬奔還時大風雪凍死者相枕寳恐為魏軍所及命士卒皆棄袍仗兵器數十萬寸刄不返燕之朝臣將卒降魏及爲魏所係虜者甚衆先是張衮常為魏王珪言燕祕書監崔逞之材珪得之甚喜以逞為尚書使錄三十六曹任以政事魏軍士有自柏肆亡歸者言大軍敗散不知王處道過晉陽晉陽守將封真因起兵攻并州刺史曲陽侯素延素延擊斬之南安公順守雲中聞之欲自攝國事幢將代人莫題曰此大事不可輕爾宜審待後問不然爲禍不細順乃止順什翼犍之孫也賀蘭部帥附力眷紇隣部帥匿物尼紇奚部帥叱奴根皆舉兵反順討之不克珪遣安逺將軍􅁃岳帥萬騎還討三部皆平之國人乃安珪欲撫慰新附深悔參合之誅素延坐討反者殺戮過多免官以奚牧為并州刺史牧與東秦主興書稱頓首與之均禮興怒以告珪珪為之殺牧己卯夜燕尚書郎慕輿皓謀弑燕主寳立趙王麟不克斬闗出奔魏麟由是不自安
