body:
  text: 三月燕以儀同三司武鄉張崇為司空初燕清河王㑹聞魏軍東下表求赴難燕主寳許之會初無去意使征南將軍庫傉官偉建威將軍餘崇將兵五千為前鋒崇嵩之子也偉等頓盧龍近百日無食噉馬牛且盡會不發寳怒累詔切責會不得已以治行簡練為名復留月餘時道路不通偉欲使輕軍前行通道偵魏彊弱且張聲勢諸將皆畏避不欲行餘崇奮曰今巨寇滔天京都危逼匹夫猶思致命以救君父諸君荷國寵任而更惜生乎若社稷傾覆臣節不立死有餘辱諸君安居於此崇請當之偉喜簡給步騎五百人崇進至漁陽遇魏千餘騎崇謂其衆曰彼衆我寡不擊則不得免乃鼓譟直進崇手殺十餘人魏騎潰去崇亦引還斬首獲生具言敵中闊狹衆心稍振會乃上道徐進是月始達薊城魏圍中山既久城中將士皆思出戰征北大將軍隆言於寳曰涉珪雖屢獲小利然頓兵經年凶勢沮屈士馬死傷太半人心思歸諸部離解正是可破之時也加之舉城思奮若因我之鋭乗彼之衰往無不克如其持重不決將卒氣喪日益困逼事久變生後雖欲用之不可得也寳然之而衞大將軍麟每沮其議隆成列而罷者前後數四寳使人請於魏王珪欲還其弟觚割常山以西皆與魏以求和珪許之既而寳悔之己酉珪如盧奴辛亥復圍中山燕將士數千人俱自請於寳曰今坐守窮城終於困弊臣等願得一出樂戰而陛下每抑之此為坐自摧敗也且受圍歴時無他竒變徒望積久寇賊自退今内外之勢彊弱懸絶彼必不自退明矣宜從衆一决寳許之隆退而勒兵召諸參佐謂之曰皇威不振寇賊内侮臣子同恥義不顧生今幸而破賊吉還固善若其不幸亦使吾志節獲展卿等有北見吾母者為吾道此情也乃被甲上馬詣門俟命麟復固止寳衆大忿恨隆涕泣而還是夜麟以兵劫左衞將軍北地王精使帥禁兵弑寳精以義拒之麟怒殺精出奔西山依丁零餘衆於是城中人情震駭寳不知麟所之以清河王會軍在近恐麟奪會軍先據龍城乃召隆及驃騎大將軍農謀去中山走保龍城隆曰先帝櫛風沐雨以成中興之業崩未朞年而天下大壊豈得不謂之孤負邪今外寇方盛而内難復起骨肉乖離百姓疑懼誠不可以拒敵北遷舊都亦事之宜然龍川地狹民貧若以中國之意取足其中復朝夕望有大功此必不可若節用愛民務農訓兵數年之中公私充實而趙魏之間厭苦寇暴民思燕德庶幾返斾克復故業如其未能則憑險自固猶足以優遊養鋭耳寳曰卿言盡理朕一從卿意耳遼東高撫善卜筮素為隆所信厚私謂隆曰殿下北行終不能達太妃亦不可得見若使主上獨往殿下潛留於此必有大功隆曰國有大難主上䝉塵且老母在北吾得北首而死猶無所恨卿是何言也乃遍召僚佐問其去留唯司馬魯恭參軍成岌願從餘皆欲留隆並聽之農部將谷會歸説農曰城中之人皆涉珪參合所殺者父兄子弟泣血踊躍欲與魏戰而為衞軍所抑今聞主上當北遷皆曰得慕容氏一人奉而立之以與魏戰死無所恨大王幸而留此以副衆望擊退魏軍撫寧畿甸奉迎大駕亦不失為忠臣也農欲殺歸而惜其材力謂之曰必如此以望生不如就死壬子夜寳與太子策遼西王農高陽王隆長樂王盛等萬餘騎出赴會軍河間王熈勃海王㓪愽陵王鑒皆㓜不能出城隆還入迎之自為鞁乗俱得免燕將王沈等降魏樂浪王惠中書侍郎韓範員外郎叚宏太史令劉起等帥工伎三百奔鄴中山城中無主百姓惶惑東門不閉魏王珪欲夜入城冠軍將軍王建志在虜掠乃言恐士卒盗府庫物請俟明旦珪乃止燕開封公詳從寳不及城中立以為主閉門拒守珪盡衆攻之連日不㧞使人登巢車臨城諭之曰慕容寳已棄汝走汝曹百姓空自取死欲誰為乎皆曰羣小無知恐復如參合之衆故茍延旬月之命耳珪顧王建而唾其面使中領將軍長孫肥左將軍李栗將三千騎追寳至范陽不及破其新城戍而還甲寅尊皇太后李氏為太皇太后戊午立皇后王氏燕主寳出中山與趙王麟遇于􅛪城麟不意寳至驚駭帥其衆奔蒲隂復出屯望都土人頗供給之慕容詳遣兵掩擊麟獲其妻子麟脱走入山甲寅寳至薊殿中親近散亡略盡惟高陽王隆所領數百騎為宿衞清河王會帥騎卒二萬迎于薊南寳怪會容止怏怏有恨色宻告隆及遼西王農農隆俱曰會年少專任方面習驕所致豈有它也臣等當以禮責之寳雖從之然猶詔解㑹兵以屬隆隆固辭乃減會兵分給農隆又遣西河公庫傉官驥帥兵三千助守中山丙辰寳盡徙薊中府庫北趣龍城魏石河頭引兵追之戊午及寳於夏謙澤寳不欲戰清河王會曰臣撫教士卒惟敵是求今大駕䝉塵人思效命而虜敢自送衆心忿憤兵法曰歸師勿遏又曰置之死地而後生今我皆得之何患不克若其捨去賊必乘人或生餘變寶乃從之會整陳與魏兵戰農隆等將南來騎衝之魏兵大敗追奔百餘里斬首數千級隆又獨追數十里而還謂故吏留臺治書陽璆曰中山城中積兵數萬不得展吾意今日之捷令人遺恨因慷慨流涕會既敗魏兵矜很滋甚隆屢訓責之會益忿恚會以農隆皆嘗鎮龍城屬尊位重名望素出已右恐至龍城權政不復在已又知終無為嗣之望乃謀作亂幽平之兵皆懐會恩不樂屬二王請於寳曰清河王勇略高世臣等與之誓同生死願陛下與皇太子諸王留薊宫臣等從王南解京師之圍還迎太駕寳左右皆惡會言於寳曰清河王不得為太子神色甚不平且其才武過人善収人心陛下若從衆請臣恐解圍之後必有衞輒之事寳乃謂衆曰道通年少才不及二王豈可當專征之任且朕方自統六師仗㑹以為羽翼何可離左右也衆不悦而退左右勸寳殺會侍御史仇尼歸聞之告㑹曰大王所恃者父父巳異圖所杖者兵兵巳去手欲於何所自容乎不如誅二王廢太子大王自處東宮兼將相之任以匡復社稷此上策也會猶豫未許寳謂農隆曰觀道通志趣必反無疑宜早除之農隆曰今寇敵内侮中土紛紜社稷之危有如累卵會鎮撫舊都逺赴國難其威名之重足以震動四鄰逆狀未彰而遽殺之豈徒傷父子之恩亦恐大損威望寳曰會逆志巳成卿等慈恕不忍早殺恐一旦為變必先害諸父然後及吾至時勿悔自負也會聞之益懼夏四月癸酉寳宿廣都黄榆谷會遣其黨仇尼歸吳提染于帥壯士二十餘人分道襲農隆殺隆於帳下農被重創執仇尼歸逃入山中會以仇尼歸被執事終顯發乃夜詣寳曰農隆謀逆臣巳除之寳欲討會陽為好言以安之曰吾固疑二王久矣除之甚善甲戌旦會立仗嚴備乃引道會欲棄隆喪餘崇涕泣固請乃聴載隨軍農出自歸寳呵之曰何以自負邪命執之行十餘里寳顧召羣臣食且議農罪會就坐寳目衞軍將軍慕輿騰使斬會傷其首不能殺㑹走赴其軍勒兵攻寳寳帥數百騎馳二百里晡時至龍城會遣騎追至石城不及乙亥㑹遣仇尼歸攻龍城寳夜遣兵襲擊破之會遣使請誅左右佞臣并求為太子寳不許會盡收乘輿器服以後宮分給將帥署置百官自稱皇太子錄尚書事引兵向龍城以討慕輿騰為名丙子頓兵城下寳臨西門會乘馬遥與寳語寳責讓之會命軍士向寳大譟以耀威城中將士皆憤怒向暮出戰大破之會兵死傷太半走還營侍御郎高雲夜帥敢死士百餘人襲會軍會衆皆潰會將十餘騎奔中山開封公詳殺之寳殺會母及其三子丁丑寳大赦凡與會同謀者皆除罪復舊職論功行賞拜將軍封侯者數百人遼西王農骨破見腦寳手自裹創僅而獲濟以農為左僕射尋拜司空領尚書令餘崇出自歸寳嘉其忠拜中堅將軍使典宿衞贈高陽王隆司徒諡曰康寳以高雲為建威將軍封夕陽公養以為子雲高句麗之支屬也燕王皝破高句麗徙於青山由是世為燕臣雲沈厚寡言時人莫知惟中衞將軍長樂馮䟦竒其志度與之為友䟦父和事西燕主永為將軍永敗徙和龍僕射王國寳建威將軍王緒依附會稽王道子納賄窮奢不知紀極惡王恭殷仲堪勸道子裁損其兵權中外恟恟不安恭等各繕甲勒兵表請北伐道子疑之詔以盛夏妨農悉使解嚴恭遣使與仲堪謀討國寳等桓􅀇以仕不得志欲假仲堪兵勢以作亂乃説仲堪曰國寳與君諸人素已為對唯患相斃之不速耳今既執大權與王緒相表裏其所廻易無不如志孝伯居元舅之地必未敢害之君為先帝所㧞超居方任人情皆以君為雖有思致非方伯才彼若發詔徵君為中書令用殷覬為荆州君何以處之仲堪曰憂之乆矣計將安出􅀇曰孝伯疾惡深至君宜潛與之約興晉陽之甲以除君側之惡東西齊舉􅀇雖不肖願帥荆楚豪桀荷戈先驅此桓文之勳也仲堪心然之乃外結雍州刺史郗恢内與從兄南蠻校尉覬南郡相陳留江績謀之覬曰人臣當各守職分朝廷是非豈藩屏之所制也晉陽之事不敢預聞仲堪固邀之覬怒曰吾進不敢同退不敢異績亦極言其不可覬恐績及禍於坐和解之績曰大丈夫何至以死相脅邪江仲元行年六十但未獲死所耳仲堪憚其堅正以楊佺期代之朝廷聞之徵績為御史中丞覬遂稱疾發辭位仲堪往省之謂覬曰兄病殊為可憂覬曰我病不過身死汝病乃當滅門宜深自愛勿以我為念郗恢亦不肯從仲堪疑未決會王恭使至仲堪許之恭大喜甲戌恭上表罪狀國寳舉兵討之初孝武帝􅀝任王珣及帝暴崩不及受顧命珣一旦失勢循黙而已丁丑王恭表至内外戒嚴道子問珣曰二藩作逆卿知之乎珣曰朝政得失珣弗之預王殷作難何由可知王國寳惶懼不知所為遣數百人戍竹里夜遇風雨各散歸王緒説國寳矯相王之命召王珣車胤殺之以除時望因挾君相發兵以討二藩國寳許之珣胤至國寳不敢害更問計於珣珣曰王殷與卿素無深怨所競不過勢利之間耳國寳曰將曹爽我乎珣曰是何言歟卿寧有爽之罪王孝伯豈宣帝之儔邪又問計於胤胤曰昔桓公圍壽陽彌時乃克今朝廷遣軍恭必城守若京口未㧞而上流奄至君將何以待之國寳尤懼遂上疏解職詣闕待罪既而悔之詐稱詔復其本官道子闇懦欲求姑息乃委罪國寳遣驃騎諮議參軍譙王尚之收國寳付廷尉尚之恬之子也甲申賜國寳死斬緒於市遣使詣恭深謝愆失恭乃罷兵還京口國寳兄侍中愷驃騎司馬愉並請解職道子以愷愉與國寳異母又素不恊皆釋不問戊子大赦殷仲堪雖許王恭猶豫不敢下聞國寳等死乃始抗表舉兵遣楊佺期屯巴陵道子以書止之仲堪乃還會稽世子元顯年十六有雋才為侍中説道子以王殷終必為患請潛為之備道子乃拜元顯征虜將軍以其衞府及徐州文武悉配之魏王珪以軍食不給命東平公儀去鄴徙屯鉅鹿積租楊城慕容詳出步卒六千人伺間襲魏諸屯珪擊破之斬首五千生擒七百人皆縱之初張掖盧水胡沮渠羅仇匈奴沮渠王之後也世為部帥涼王光以羅仇爲尚書從光伐西秦及呂延敗死羅仇弟三河太守麴粥謂羅仇曰主上荒耄信䜛今軍敗將死正其猜忌智勇之時也吾兄弟必不見容與其死之無名不若勒兵向西平出苕藋奮臂一呼凉州不足定也羅仇曰誠如汝言然吾家世以忠孝著於西土寧使人負我我不忍負人也光果聴䜛以敗軍之罪殺羅仇及麴粥羅仇弟子䝉遜雄傑有策略涉獵書史以羅仇麴粥之喪歸葬諸部多其族姻會葬者凡萬餘人䝉遜哭謂衆曰呂王昏荒無道多殺不辜吾之上世虎視河西今欲與諸部雪二父之恥復上世之業何如衆咸稱萬歳遂結盟起兵攻凉臨松郡㧞之屯據金山司徒左長史王廞導之孫也以母喪居吳王恭之討王國寳也版廞行吳國内史使起兵於東方廞使前吳國内史虞嘯父等入吳興義興召募兵衆赴者萬計未幾國寳死恭罷兵符廞去職反喪服廞以起兵之際誅異已者頗多勢不得止遂大怒不承恭命使其子㤗將兵伐恭牋於會稽王道子稱恭罪惡道子以其牋送恭五月恭遣司馬劉牢之帥五千人擊泰斬之又與廞戰於曲阿衆潰廞單騎走不知所在收虞嘯父下廷尉以其祖潭有功免為庶人燕庫傉官驥入中山與開封公詳相攻詳殺驥盡滅庫傉官氏又殺中山尹苻謨夷其族中山城無定主民恐魏兵乘之男女結盟人自為戰甲辰魏王珪罷中山之圍就榖河間督諸郡義租甲寅以東平公儀為驃騎大將軍都督中外諸軍事兖豫雍荆徐楊六州牧左丞相封衞王慕容詳自謂能却魏兵威德已振乃即皇帝位改元建始置百官以新平公可足渾潭為車騎大將軍尚書令殺拓䟦觚以固衆心鄴中官屬勸范陽王德稱尊號會有自龍城來者知燕主寳猶存乃止凉王光遣太原公纂將兵擊沮渠䝉遜於怱谷破之䝉遜逃入山中䝉遜從兄男成為凉將軍聞䝉遜起兵亦合衆數千屯樂涫酒泉太守壘澄討男成兵敗澄死男成進攻建康遣使説建康太守叚業曰呂氏政衰權臣擅命刑殺無常人無容處一州之地叛者相望瓦解之形昭然在目百姓嗷然無所依附府君奈何以葢世之才欲立忠於垂亡之國男成等既唱大義欲屈府君撫臨鄙州使塗炭之餘䝉來蘇之惠何如業不從相持二旬外救不至郡人高逵史惠等勸業從男成之請業素與涼侍中房晷僕射王詳不平懼不自安乃許之男成等推業為大都督龍驤大將軍凉州牧建康公改元神璽以男成為輔國將軍委以軍國之任蒙遜帥衆歸業業以蒙遜為鎮西將軍光命太原公纂將兵討業不克六月西秦王乾歸徵北河州刺史彭奚念為鎮衛將軍以鎮西將軍屋弘破光為河州牧定州刺史翟瑥爲興晉太守鎮枹罕秋七月慕容詳殺可足渾潭詳􅄝酒奢淫不恤士民刑殺無度所誅王公以下五百餘人羣下離心城中饑窘詳不聴民出采稆死者相枕舉城皆謀迎趙王麟詳遣輔國將軍張驤帥五千餘人督租於常山麟自丁零入驤軍潜襲中山城門不閉執詳斬之麟遂稱尊號聴人四出采稆人既飽求與魏戰麟不從稍復窮餒魏王珪軍魯口遣長孫肥帥騎七千襲中山入其郛麟追至泒水為魏所敗而還八月丙寅朔魏王珪徙軍常山之九門軍中大疫人畜多死將士皆思歸珪問疫於諸將對曰在者纔什四五珪曰此固天命將若之何四海之民皆可為國在吾所以御之耳何患無民羣臣乃不敢言遣撫軍大將軍略陽公遵襲中山入其郛而還燕以遼西王農為都督中外諸軍事大司馬錄尚書事凉散騎常侍太常西平郭黁善天文數術國人信重之會熒惑守東井黁謂僕射王詳曰凉之分野將有大兵主上老病太子闇弱太原公凶悍一旦不諱禍亂必起吾二人久居内要彼常切齒將為誅首矣田胡王乞基部落最彊二苑之人多其舊衆吾欲與公舉大事推乞基為主二苑之衆盡我有也得城之後徐更議之詳從之黁夜以二苑之衆燒洪範門使詳為内應事泄詳被誅黁遂據東苑以叛民間皆言聖人起兵事無不成從之者甚衆凉王光召太原公纂使討黁纂將還諸將皆曰叚業必躡軍後宜潛師夜發纂曰業無雄才憑城自守若潛師夜去適足張其氣勢耳乃遣使告業曰郭黁作亂吾今還都卿能决者可早出戰於是引還業不敢出纂司馬楊統謂其從兄桓曰郭黁舉事必不虚發吾欲殺纂推兄為主西襲呂􅀪據張掖號令諸郡此千載一時也桓怒曰吾為呂氏臣安享其祿危不能救豈可復増其難乎呂氏若亡吾為􅀪演矣統至番禾遂叛歸黁􅀪纂之弟也纂與西安太守石元良共擊黁大破之乃得入姑臧黁得光孫八人於東苑及敗而恚悉投於鋒上枝分節解飲其血以盟衆衆皆掩目凉人張捷宋生等招集戎夏三千人反於休屠城與黁共推凉後將軍楊􅁤為盟主􅁤略陽氐也將軍程肇諫曰卿棄龍頭而從虵尾非計也􅁤不從自稱大將軍涼州牧西平公纂擊破黁將王斐于城西黁兵勢漸衰遣使請救于秃髪烏孤九月烏孤使其弟驃騎將軍利鹿孤帥騎五千赴之秦太后虵氏卒秦主興哀毁過禮不親庶政羣臣請依漢魏故事既葬即吉尚書郎李嵩上疏曰孝治天下先王之高事也宜遵聖性以光道訓既葬之後素服臨朝尹緯駮曰嵩矯常越禮請付有司論罪興曰嵩忠臣孝子有何罪乎其一如嵩議鮮卑薛勃叛秦秦主興自將討之勃敗奔沒弈干沒弈干執送之秦􅊄氏男姚買得謀弑秦主興不克而死秦主興入寇湖城􅀪農太守陶仲山華山太守董邁皆降之遂至陜城進寇上洛㧞之遣姚崇寇洛陽河南太守夏侯宗之固守金墉崇攻之不克乃徙流民二萬餘戸而還武都氐屠飛啖鐵等據方山以叛秦興遣姚紹等討之斬飛鐵興勤於政事延納善言京兆杜瑾等皆以論事得顯㧞天水姜龕等以儒學見尊禮給事黄門侍郎古成詵等以文章參機密詵剛介雅正以風教為己任京兆韋髙慕阮籍之爲人居母喪彈琴飲酒詵聞之而泣持劒求髙欲殺之髙懼而逃匿中山饑甚慕容麟帥二萬餘人出據新市甲子晦魏王珪進軍攻之太史令鼂崇曰不吉昔紂以甲子亡謂之疾日兵家忌之珪曰紂以甲子亡周武不以甲子興乎崇無以對冬十月丙寅麟退阻􅂀水甲戌珪與麟戰於義臺大破之斬首九千餘級麟與數十騎馳取妻子入西山遂奔鄴甲申魏克中山燕公卿尚書將吏士卒降者二萬餘人張驤李沈等先嘗降魏復亡去珪入城皆赦之得燕璽綬圖書府庫珍寳以萬數班賞羣臣將士有差追諡弟觚為秦愍王發慕容詳冡斬其尸收殺觚者髙霸程同皆夷五族以大刃剉之丁亥遣三萬騎就衛王儀將攻鄴秦長水校尉姚珍奔西秦西秦王乾歸以女妻之河南鮮卑吐秣等十二部大人皆附於秃髪烏孤燕人有自中山至龍城者言拓䟦涉珪衰弱司徒德完守鄴城會德表至勸燕主寳南還寳於是大簡士馬將復取中原遣鴻臚魯邃冊拜德為丞相冀州牧南夏公侯牧守皆聴承制封拜十一月癸丑燕大赦十二月調兵悉集戒嚴在頓遣將軍啓崙南視形勢乙亥慕容麟至鄴復稱趙王説范陽王德曰魏既克中山將乘勝攻鄴鄴中雖有蓄積然城大難固且人心恇懼不可守也不如南趣滑臺阻河以待魏伺釁而動河北庶可復也時魯陽王和鎮滑臺和垂之弟子也亦遣使迎德德許之資治通鑑卷第一百九晉安帝
