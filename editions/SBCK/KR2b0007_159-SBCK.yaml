seq: 159
front:
  text: 谷渾之女以招懐之丁未置􅀳陽宫二月庚申東魏主納吐谷渾可汗從妹為容華
  hash: sha256:c8334614b9b834b23a3a478cd431f5161e885eb4970ff3f2a799d88499940e5d
body:
  text: 魏丞相泰遣酒泉胡安諾槃陀始通使於突厥突厥本西方小國姓阿史那氏丗居金山之陽為柔然鐵工至其酋長土門始彊大頗侵魏西邊安諾槃陀至其國人皆喜曰大國使者至吾國其將興矣三月乙未東魏丞相歡入朝于鄴百官迎於紫陌歡握崔暹手而勞之曰往日朝廷豈無灋官莫肯糾劾中尉盡心徇國不避豪彊遂使逺邇肅清衝鋒陷陳大有其人當官正色今始見之富貴乃中尉自取髙歡父子無以相報賜暹良馬暹拜馬驚走歡親擁之授以轡東魏主晏於華林園使歡擇朝廷公直者勸之酒歡降階跪曰唯暹一人可勸并請以臣所射賜物千段賜之髙澄退謂暹曰我尚畏羡何况餘人然暹中懐頗挾巧詐初魏髙陽王斌有庶妹玉儀不為其家所齒為孫騰妓騰又棄之髙澄遇諸塗恱而納之遂有殊寵封琅邪公主澄謂崔季舒曰崔暹必造直諌我亦有以待之及暹諮事澄不復假以顔色居三日暹懐刺墜之於前澄問何用此為暹悚然曰未得通公主澄大恱把暹臂入見之季舒語人曰崔暹常忿吾佞在大將軍前毎言叔父可殺及其自作乃過於吾夏五月甲辰東魏大赦魏王盟卒􅀳氏以來文章競爲浮華魏丞相泰欲革其弊六月丁巳魏主饗太廟泰命大行臺度支尚書領著作蘇綽作大誥宣示羣臣戒以政事仍命自今文章皆依此體上遣交州刺史楊㬓討李賁以陳霸先為司馬命定州刺史蕭勃㑹㬓於西江勃知軍士憚逺役因詭􅀃留㬓㬓集諸將問計霸先曰交阯叛换罪由宗室遂使溷亂數州逋誅累嵗定州欲偷安目前不顧大計節下奉辭伐罪當死生以之豈可逗撓不進長寇沮衆也遂勒兵先發㬓以霸先為前鋒至交州賁帥衆三萬拒之敗於朱鳶又敗於蘇歴江口賁奔嘉寧城諸軍進圍之勃昺之子也魏與柔然頭兵可汗謀連兵伐東魏丞相歡患之遣行臺郎中杜弼使於柔然為丗子澄求㛰頭兵曰髙王自娶則可歡猶豫未決婁妃曰國家大計願勿疑也丗子澄尉景亦勸之歡乃遣鎭南將軍慕容儼聘之號曰蠕蠕公主秋八月歡親迎於下舘公主至婁妃避正室以處之歡跪而拜謝妃曰彼將覺之願絶勿顧頭兵使其弟秃突佳來送女且報娉仍戒曰待見外孫乃歸公主性嚴毅終身不肯華言歡嘗病不得往秃突佳怨恚歡輿疾就之冬十月乙未詔有罪者復聽入贖東魏遣中書舎人尉瑾來聘乙未東魏丞相歡請釋邙山俘囚桎梏配以民間寡婦十二月東魏以矦景為司徒中書令韓軌為司空戊子以孫騰録尚書事魏築圓丘於城南散􅀐常侍賀琛啓陳四事其一以為今北邊稽服正是生聚教議之時而天下户口減落關外彌甚郡不堪州之控揔縣不堪郡之裒削更相呼擾惟事徴斂民不堪命各務流移此豈非牧守之過歟東境户口空虚皆由使命繁數窮幽極逺無不皆至毎有一使所屬搔擾駑困邑宰則拱手聽其漁獵桀􅃛長吏又因之重為貪殘縱有廉平郡猶掣肘如此雖年降復業之詔屢下蠲賦之恩而民不得反其居也其二以為今天下守宰所以貪殘良由風俗侈靡使之然也今之燕喜相競誇豪積果如丘陵列肴同綺繡露臺之産不周一燕之資而賔主之間裁取滿腹未及下堂已同臭腐又畜妓之夫無有等秩為吏牧民者致貲巨億罷歸之日不支數年率皆盡於燕飲之物歌謡之具所費事等丘山為歡止在俄頃乃更追恨向所取之少如復傅翼増其搏噬一何悖哉其餘滛侈著之凡百習以成俗日見滋甚欲使人守廉白安可得邪誠宜嚴為禁制道以節儉糾奏浮華變其耳目夫失節之嗟亦民所自患正恥不能及羣故勉強而為之苟以淳素為先足正彫流之弊矣其三以為陛下憂念四海不憚勤勞至於百司莫不奏事但斗筲之人旣得伏奏帷扆便欲詭競求進不論國之大體心存明恕惟務吹毛求疵擘肌分理以深刻為能以繩逐為務迹雖似於奉公事更成其威福犯罪者多巧避滋甚長弊増姦寔由於此誠願責其公平之效黜其讒慝之心則下安上謐無徼倖之患矣其四以為今天下無事而猶日不暇給宜省事息費事省則民養費息則財聚應内省職掌各檢所部凡京師治署邸肆及國容戎備四方屯傳邸治有所宜除除之有所冝減減之興造有非急者徴求有可緩者皆宜停省以息費休民故畜其財者所以大用之也養其民者所以大役之也若言小事不足害財則終年不息矣以小役不足妨民則終年不止矣如此則難可以語富彊而圖逺大矣啓奏上大怒召主書於前口授敇書以責琛大指以為朕有天下四十餘年公車讜言日關聽覽所陳之事與卿不異毎苦倥偬更増惽惑卿不冝自同闟茸止取名字宣之行路言我能上事恨朝廷之不用何不分别顯言某刺史横暴某太守貪殘尚書蘭臺某人姦猾使者漁獵並何姓名取與者誰明言其事得以誅黜更擇材良又士民飲食過差若加嚴禁密房曲屋云何可知儻家家搜檢恐益増苛擾若指朝廷我無此事昔之牲牢乆不宰殺朝中㑹同菜􅂼而已若復減此必有蟋蟀之譏若以為功德事者皆是園中之物變一􅀲為數十種治一菜為數十味以變故多何損於事我自非公宴不食國家之食多歷年所乃至宫人亦不食國家之食凡所營造不關材官及以國匠皆資雇借以成其事勇怯不同貪廉各用亦非朝廷為之傅翼卿以朝廷為悖乃自甘之當思致悖所以卿云宜導之以節儉朕絶房室三十餘年至於居處不過一牀之地雕飾之物不入於宫受生不飲酒不好音聲所以朝中曲宴未甞奏樂此羣賢之所見也朕三更出治事随事多少事少午前得竟事多日昊方食日常一食若晝若夜昔要腹過於十圍今之瘦削裁二尺餘舊帶猶存非爲妄􅀃爲誰爲之救物故也卿又曰百司莫不奏事詭競求進今不使外人呈事誰尸其任専委之人云何可得古人云專聽生姦獨任成亂二丗之委趙髙元后之付王莽呼鹿爲馬又可法歟卿云吹毛求疵復是何人擘肌分理復是何事治署邸肆等何者宜除何者宜減何處興造非急何處徴求可緩各出其事具以奏聞富國彊兵之術息民省役之宜並宜具列若不具列則是欺罔朝廷佇聞重奏當復省覽付之尚書班下海内庻惟新之美復見今日琛但謝過而已不敢復言上為人孝慈㳟儉博學能文隂陽卜筮􅀐射聲律草􅀠圍碁無不精妙勤於政務冬月四更竟即起視事執筆觸寒手為皴裂自天監中用釋氏法長齋斷魚肉日止一食惟菜羮糲飯而已或遇事繁日移中則嗽口以過身衣布衣木緜皁帳一冠三載一衾二年後宫貴妃以下衣不曵地性不飲酒非宗廟祭祀大饗宴及諸法事未甞作樂雖居暗室􅁪理衣冠小坐盛暑未甞褰袒對内豎小臣如遇大賔然優假士人太過牧守多侵漁百姓使者干擾郡縣又好親任小人頗復苛察多造塔廟公私費損江南乆安風俗奢靡故琛啓及之上惡其觸實故怒臣光曰梁髙祖之不終也宜哉夫人主聽納之失在於叢脞人臣獻替之病在於煩碎是以明主守要道以御萬幾之本忠臣陳大體以格君心之非故身不勞而收功逺言至約而為益大也觀夫賀琛之諌亦未至於切直而髙祖巳赫然震怒䕶其所短矜其所長詰貪暴之主名問勞費之條目困以難對之狀責以必窮之辭自以􅂼食之儉為盛德日昊之勤為至治君道巳備無復可加羣臣箴規舉不足聽如此則自餘切直之言過於琛者誰敢進哉由是姦佞居前而不見大謀顚錯而不知名辱身危覆􅀖絶祀為千古所閔􅀏豈不哀哉上敦尚文雅疎簡刑法自公卿大臣咸不以鞫獄為意姦吏招權弄法貨賂成市枉濫者多大率二嵗刑巳上嵗至五千人徙居作者具五任其無任者著升械若疾病權解之是後囚徒或有優劇時王矦子弟多驕淫不法上年老厭於萬幾又專精佛戒毎斷重罪則終日不懌或謀反逆事覺亦泣而宥之由是王矦益横或白晝殺人於都街或暮夜公行剽掠有罪亡命者匿於王家有司不敢搜捕上􅀷知其弊而溺於慈愛不能禁也魏東陽王榮為􅀲州刺史與其壻鄧彦偕行榮卒􅀲州首望表榮子康為刺史彦殺康而奪其位魏不能討因以彦爲刺史屢徴不至又南通吐谷渾丞相泰以道逺難於動衆欲以計取之以給事黄門侍郎申徽爲河西大使密令圖彦徽以五十􅀐行旣至止於賔館彦見徽單使不以爲疑徽遣人微勸彦歸朝彦不從徽又使賛成其留計彦信之遂來至館徽先與州主簿敦煌令狐整等密謀執彦於坐責而縛之因宣詔慰諭吏民且云大軍續至城中無敢動者遂送彦於長安泰以徽爲都官尚書中大同元年春正月癸丑楊㬓等克嘉寧城李賁奔新昌獠中諸軍頓于江口二月魏以義州刺史史寧爲涼州刺史前刺史宇文仲和據州不受代􅀲州民張保殺刺史成慶以應之􅀳昌民吕興殺太守郭肆以郡應保丞相泰遣太子太保獨孤信開府儀同三司怡峯與史寧討之三月乙巳大赦庚戍上幸同泰寺遂停寺省講三慧經夏四月丙戌解講大赦改元是夜同泰寺浮圖災上曰此魔也宜廣為法事羣臣皆稱善乃下詔曰道髙魔盛行善鄣生當窮兹土木倍増往日遂起十二層浮圖將成值矦景亂而止魏史寧暁諭凉州吏民率皆歸附獨宇文仲和據城不下五月獨孤信使諸將夜攻其東北自帥壯士襲其西南遲明克之遂擒仲和初張保欲殺州主簿令狐整以其人望恐失衆心雖外相敬内甚忌之整陽爲親附因使人􅀃保曰今東軍漸逼涼州彼􅀔孤危恐不能敵宜急分精銳以救之然成敗在於將領令狐延保兼資文武使將兵以往蔑不濟矣保從之整行及玉門召豪桀述保罪狀馳還襲之先克􅀳昌斬吕興進擊􅀲州州人素信服整皆棄保來降保奔吐谷渾衆議推整為刺史整曰吾屬以張保逆亂恐闔州之人俱陷不義故相與討誅之今復見推是效尤也乃推魏所遣使波斯者張道義行州事具以狀聞丞相泰以申徽為􅀲州刺史召整為壽昌太守封襄武男整帥宗族鄉里三千餘人入朝從泰征討累遷驃􅀐大將軍開府儀同三司加侍中六月庚子東魏以司徒矦景為河南大將軍大行臺秋七月壬寅東魏遣散􅀐常侍元廓來聘甲子詔犯罪非大逆父母祖父母不坐先是江東唯建康及三吴荆郢江湘梁益用錢其餘州郡雜以榖帛交廣專以金銀為貨上自鑄五銖及女錢二品並行禁諸古錢普通中更鑄鐡錢由是民私鑄者多物價騰踊交易者至以車載錢不復計數又自破嶺以東八十為百名曰東錢江郢以上七十為百名曰西錢建康以九十為百名曰長錢丙寅詔曰朝四暮三衆狙皆喜名實未虧而喜怒為用頃聞外間多用九陌錢陌減則物貴陌足則物賤非物有貴賤乃心有顚倒至於逺方日更滋甚徒亂王制無益民財自今可通用足陌錢令書行後百日為期若猶有犯男子謫運女子質作並同三年詔下而人不從錢陌益少至于季年遂以三十五為百云上年髙諸子心不相下互相猜忌邵陵王綸為丹楊尹湘東王繹在江州武陵王紀在益州皆權侔人主太子綱惡之常選精兵以衛東宫八月以綸為南徐州刺史東魏丞相歡如鄴髙澄遷洛陽石經五十二碑於鄴魏徙并州刺史王思政為荆州刺史使之舉諸將可代鎭玉壁者思政舉􅀳州刺史韋孝寛丞相泰從之東魏丞相歡悉舉山東之衆將伐魏癸巳自鄴㑹兵於􅀳陽九月至玉壁圍之以挑西師西師不出李賁復帥衆二萬自獠中出屯典澈湖大造船艦充塞湖中衆軍憚之頓湖口不敢進陳霸先謂諸將曰我師巳老將士疲勞且孤軍無援入人心腹若一戰不捷豈望生全今藉其屢奔人情未固夷獠烏合易為摧殄正當共出百死決力取之無故停留時事去矣諸將皆黙然莫應是夜江水暴起七丈注湖中霸先勒所部兵乗流先進衆軍鼓譟俱前賁衆大潰竄入屈獠洞中冬十月乙亥以前東楊州刺史岳陽王詧為雍州刺史上捨詧兄弟而立太子綱内常愧之寵亞諸子以㑹稽人物殷阜故用詧兄弟迭為東楊州以慰其心詧兄弟亦内懐不平詧以上衰老朝多秕政遂蓄聚貨財折節下士招募勇敢左右至數千人以襄陽形勝之地梁業所基遇亂可以圖大功乃克已為政撫循士民數施恩惠延納規諫所部稱治東魏丞相歡攻玉壁晝夜不息魏韋孝寛隨機拒之城中無水汲於汾歡使移汾一夕而畢歡於城南起土山欲乗之以入城上先有二樓孝寛縛木接之令常髙於土山以禦之歡使告之曰雖爾縛樓至天我當穿地取爾乃鑿地為十道又用術士李業興孤虚法聚攻其北北天險也孝寛掘長塹邀其地道選戰士屯塹上毎穿至塹戰士輙擒殺之又於塹外積柴貯火敵有在地道内者塞柴投火以皮排吹之一鼓皆焦爛敵以攻車撞城車之所及莫不摧毁無能禦者孝寛縫布為幔隨其所向張之布旣懸空車不能壊敵又縛松麻於竿灌油加火以燒布并欲焚樓孝寛作長鉤利其刃火竿將至以鉤遥割之松麻俱落敵又於城四面穿地為二十道其中施梁柱縱火燒之柱折城崩孝寛隨崩處豎木柵以扞之敵不得入城外盡攻擊之術而城中守禦有餘孝寛又奪據其土山歡無如之何乃使倉曹參軍祖珽􅀃之曰君獨守孤城而西方無救恐終不能全何不降也孝寛報曰我城池嚴固兵食有餘攻者自勞守者常逸豈有旬朔之間巳須救援適憂爾衆有不返之危孝寛關西男子必不為降将軍也珽復謂城中人曰韋城主受彼榮禄或復可爾自外軍民何事相隨入湯火中乃射募格於城中云能斬城主降者拜太尉封開國郡公賞帛萬匹孝寛手題書背返射城外云能斬髙歡者準此班瑩之子也東魏苦攻凡五十日士卒戰及病死者七萬人共爲一冡歡智力皆困因而發疾有星墜歡營中士卒驚懼十一月庚子解圍去先是歡别使矦景將兵趣齊子嶺魏建州刺史楊􅋆鎭車箱恐其㓂邵郡帥􅀐禦之景聞􅋆至斫木斷路六十餘里猶驚而不安遂還河陽庚戌歡使段韶從太原公洋鎭鄴辛亥徴丗子澄㑹􅀳陽魏以韋孝寛爲驃􅀐大將軍開府儀同三司進爵建忠公時人以王思政爲知人十二月己夘歡以無功表解都督中外諸軍東魏主許之歡之自玉壁歸也軍中訛言韋孝寛以定功弩射殺丞相魏人聞之因下令曰勁弩一發凶身自隕歡聞之勉坐見諸貴使斛律金作敇勒歌歡自和之哀感流涕魏大行臺度支尚書司農卿蘇綽性忠儉常以喪亂未平為己任薦賢拔能紀綱庶政丞相泰推心任之人莫能間或出遊常預署空紙以授綽有須處分隨事施行及還啓知而巳綽常謂為國之道當愛人如慈父訓人如嚴師毎與公卿論議自晝逹夜事無巨細若指諸掌積勞成疾而卒泰􅀷痛惜之謂公卿曰蘇尚書平生㢘讓吾欲全其素志恐悠悠之徒有所未逹如厚加贈諡又乖宿昔相知之心何為而可尚書令史麻瑶越次進曰儉約所以彰其美也泰從之歸葬武功載以布車一乗泰與羣公步送出同州郭外泰於車後酹酒言曰尚書平生為事妻子兄弟所不知者吾皆知之唯爾知吾心吾知爾志方欲共定天下遽捨吾去柰何因舉聲慟哭不覺巵落於手東魏司徒河南大將軍大行臺矦景右足偏短弓馬非其長而多謀筭諸將髙敖曹彭樂等皆勇冠一時景常輕之曰此屬皆如豕突􅀔何所至景嘗言於丞相歡願得兵三萬横行天下要須濟江縛取蕭衍老公以為太平寺主歡使將兵十萬專制河南杖任若已之半體景素輕髙澄甞謂司馬子如曰髙王在吾不敢有異王没吾不能與鮮卑小兒共事子如掩其口及歡疾篤澄詐為歡書以召景先是景與歡約曰今握兵在逺人易為詐所賜書皆請加微􅀧歡從之景得書無􅀧辭不至又聞歡疾篤用其行臺郎潁川王偉計遂擁兵自固歡謂澄曰我雖病汝面更有餘憂何也澄未及對歡曰豈非憂矦景叛邪對曰然歡曰景專制河南十四年矣常有飛揚跋扈之志顧我能畜養非汝所能駕御也今四方未定勿遽發哀庫狄干鮮卑老公斛律金敇勒老公並性遒直終不􅀒汝可朱渾道元劉豐生逺來投我必無異心潘相樂本作道人心和厚汝兄弟當得其力韓軌少戇宜寛借之彭樂心腹難得宜防䕶之堪敵矦景者唯有慕容紹宗我故不貴之留以遺汝又曰叚孝先忠亮仁厚智勇兼備親戚之中唯有此子軍旅大事宜共籌之又曰邙山之戰吾不用陳元康之言留患遺汝死不􅉂目相樂廣寧人也資治通鑑卷第一百五十九
