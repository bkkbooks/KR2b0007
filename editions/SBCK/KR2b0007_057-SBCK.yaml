seq: 57
front:
  text: 竝爲三司練達故事明解朝章故京師諺曰萬事不理問伯始天下中庸有胡公然温柔謹慤常遜言恭色以取媚於時無忠直之風天下以此薄之五月己巳赦天下改元長樂太僕矦覽坐專權驕奢策收印綬自殺
  hash: sha256:d42238a75f5dd5b0e034e88932cb94dfa185107fe68ea8bb11f4c0e54a28fc40
body:
  text: 六月京師大水竇太后母卒於比景太后憂思感疾癸巳崩於雲臺宦者積怨竇氏以衣車載太后尸置城南市舍數日曹節王甫欲用貴人禮殯帝曰太后親立朕躬統承大業豈宜以貴人終乎於是發喪成禮節等欲别葬太后而以馮貴人配祔詔公卿大㑹朝堂令中常侍趙忠監議太尉李咸時病扶輿而起擣椒自隨謂妻子曰若皇太后不得配食桓帝吾不生還矣旣議坐者數百人各瞻望良久莫肯先言趙忠曰議當時定廷尉陳球曰皇太后以盛德良家母臨天下宜配先帝是無所疑忠笑而言曰陳廷尉宜便操筆球即下議曰皇太后自在椒房有聰明母儀之德遭時不造援立聖明承繼宗廟功烈至重先帝晏駕因遇大獄遷居空宫不幸早世家雖獲罪事非太后今若别葬誠失天下之望且馮貴人冡嘗被發掘骸骨暴露與賊併尸魂靈汙染且無功於國何宜上配至尊忠省球議作色俛仰蚩球曰陳廷尉建此議甚健球曰陳竇既寃皇太后無故幽閉臣常痛心天下憤歎今日言之退而受罪宿昔之願也李咸曰臣本謂宜爾誠與意合於是公卿以下皆從球議曹節王甫猶爭以為梁后家犯惡逆别葬懿陵武帝黜廢衛后而以李夫人配食今竇氏罪深豈得合葬先帝李咸復上疏曰臣伏惟章德竇后虐害恭懷安思閻后家犯惡逆而和帝無異葬之議順朝無貶降之文至於衛后孝武皇帝身所廢棄不可以為比今長樂太后尊號在身親嘗稱制且援立聖明光隆皇祚太后以陛下為子陛下豈得不以太后為母子無黜母臣無貶君宜合葬宣陵一如舊制帝省奏從之秋七月甲寅葬桓思皇后于宣陵有人書朱雀闕言天下大亂曹節王甫幽殺太后公卿皆尸祿無忠言者詔司􅀠校尉劉猛逐捕十日一㑹猛以誹書言直不肯急捕月餘主名不立猛坐左轉諫議大夫以御史中丞段熲代之熲乃四出逐捕及太學游生繫者千餘人節等又使熲以它事奏猛論輸左校初司􅀠校尉王寓依倚宦官求薦於太常張奐奐拒之寓遂陷奐以黨罪禁錮奐嘗與段熲争擊羌不相平熲為司􅀠欲逐奐歸敦煌而害之奐奏記哀請於熲乃得免初魏郡李暠為司􅀠校尉以舊怨殺扶風蘇謙謙子不韋瘞而不葬變姓名結客報仇暠遷大司農不韋匿於廥中鑿地旁達暠之寢室殺其妾并小兒暠大懼以板藉地一夕九徙又掘暠父冡斷取其頭標之於市暠求捕不獲憤恚嘔血死不韋遇赦還家乃葬父行喪張奐素睦於蘇氏而段熲與暠善熲辟不韋為司􅀠從事不韋懼稱病不詣熲怒使從事張賢就家殺之先以鴆與賢父曰若賢不得不韋便可飲此賢遂收不韋并其一門六十餘人盡誅之勃海王悝之貶廮陶也因中常侍王甫求復國許謝錢五千萬既而桓帝遺詔復悝國悝知非甫功不肯還謝錢中常侍鄭颯中黄門董騰數與悝交通甫密司察以告段熲冬十月收颯送北寺獄使尚書令亷忠誣奏颯等謀迎立悝大逆不道遂詔冀州刺史收悝考實迫責悝令自殺妃妾十一人子女七十人伎女二十四人皆死獄中傅相以下悉伏誅甫等十二人皆以功封列矦十一月㑹稽妖賊許生起句章自稱陽明皇帝衆以萬數遣揚州刺史臧旻丹陽太守陳寅討之十二月司徒許栩罷以大鴻臚袁隗為司徒鮮卑寇并州是歲單于車兒死子屠特若尸逐就單于立二年春正月大疫丁丑司空宗俱薨二月壬午赦天下以光祿勲楊賜為司空三月太尉李咸免夏五月以司隷校尉段熲為太尉六月北海地震秋七月司空楊賜免以太常潁川唐珍為司空珍衡之弟也冬十二月太尉段熲罷鮮卑冦幽并二州癸酉晦日有食之三年春二月己巳赦天下以太常東海陳耽為太尉三月中山穆王暢薨無子國除夏六月封河閒王利子康為濟南王奉孝仁皇祀吳郡司馬富春孫堅召募精勇得千餘人助州郡討許生冬十一月臧旻陳寅大破生於㑹稽斬之任城王博薨無子國絶十二月鮮卑入北地太守夏育率屠各追擊破之遷育為䕶烏桓校尉鮮卑又寇并州司空唐珍罷以永樂少府許訓為司空四年春三月詔諸儒正五經文字命議郎蔡邕為古文篆􅀠三體書之刻石立于太學門外使後儒晩學咸取正焉碑始立其觀視及摹寫者車乘日千餘兩填塞街陌初朝議以州郡相黨人情比周乃制昬姻之家及兩州人士不得對相監臨至是復有三互灋禁忌轉密選用艱難幽冀二州久缺不補蔡邕上疏曰伏見幽冀舊壤鎧馬所出比年兵饑漸至空耗今者闕職經時吏民延屬而三府選舉踰月不定臣怪問其故云避三互十一月有禁當取二州而已又二州之士或復限以歲月狐疑遲淹兩州懸空萬里蕭條無所管繫愚以為三互之禁禁之薄者今但申以威靈明其憲令對相部主尚畏懼不敢營私况乃三互何足為嫌昔韓安國起自徒中朱買臣出於賤幽竝以才宜還守本邦豈復顧循三互繫以末制乎臣願陛下上則先帝蠲除近禁其諸州刺史器用可換者無拘日月三互以差厥中朝廷不從臣光曰叔向有言國將亡必多制明王之政謹擇忠賢而任之凡中外之臣有功則賞有罪則誅無所阿私灋制不煩而天下大治所以然者何哉執其本故也及其衰也百官之任不能擇人而禁令益多防閑益密有功者以閡文不賞為姦者以巧灋免誅上下勞擾而天下大亂所以然者何哉逐其末故也孝靈之時刺史二千石貪如豺虎暴殄烝民而朝廷方守三互之禁以今視之豈不適足為笑而深可為戒哉封河間王建孫佗為任城王夏四月郡國七大水五月丁卯赦天下延陵園災鮮卑寇幽州六月􅀪農三輔螟于寘王安國攻拘彌大破之殺其王戊巳校尉西域長史各發兵輔立拘彌侍子定興為王人衆裁千口五年夏四月癸亥赦天下益州郡夷反太守李顒討平之大雩五月太尉陳耽罷以司空許訓為太尉閏月永昌太守曹鸞上書曰夫黨人者或耆年淵德或衣冠英賢皆宜股肱王室左右大猷者也而久被禁錮辱在塗泥謀反大逆尚蒙赦宥黨人何罪獨不開恕乎所以災異屢見水旱荐臻皆由於斯宜加沛然以副天心帝省奏大怒即詔司隷益州檻車收鸞送槐里獄掠殺之於是詔州郡更考黨人門生故吏父子兄弟在位者悉免官禁錮爰及五屬六月壬戌以太常南陽劉逸為司空秋七月太尉許訓罷以光祿勲劉寛為太尉冬十月司徒袁隗罷十一月丙戌以光祿大夫楊賜為司徒是歲鮮卑宼幽州六年春正月辛丑赦天下夏四月大旱七州蝗令三公條奏長吏苛酷貪汚者罷免之平原相漁陽陽球坐嚴酷徵詣廷尉帝以球前為九江太守討賊有功特赦之拜議郎鮮卑寇三邊市賈小民有相聚為宣陵孝子者數十人詔皆除太子舍人秋七月司空劉逸免以衛尉陳球為司空初帝好文學自造皇羲篇五十章因引諸生能為文賦者竝待制鴻都門下後諸為尺牘及工書鳥􅂐者皆加引召遂至數十人侍中祭酒樂松賈護多引無行趣埶之徒置其間憙陳閭里小事帝甚悦之待以不次之位又久不親行郊廟之禮會詔羣臣各陳政要蔡邕上封事曰夫迎氣五郊清廟祭祀養老辟雍皆帝者之大業祖宗所祗奉也而有司數以蕃國疎喪宫内産生及吏卒小汙廢闕不行忘禮敬之大任禁忌之書拘信小故以虧大典自今齋制宜如故典庶荅風霆災妖之異又古者取士必使諸矦歲貢孝武之世郡舉孝廉又有賢良文學之選於是名臣輩出文武竝興漢之得人數路而已夫書畫辭賦才之小者匡國治政未有其能陛下即位之初先渉經術聽政餘日觀省篇章聊以游意當代博弈非以為教化取士之本而諸生競利作者鼎沸其髙者頗引經訓風喻之言下則連偶俗語有類俳優或竊成文虛冒名氏臣每受詔於盛化門差次録第其未及者亦復隨輩皆見拜擢既加之恩難復收改但守奉祿於義已􅀪不可復使治民及在州郡昔孝宣㑹諸儒於石渠章帝集學士於白虎通經釋義其事優大文武之道所宜從之若乃小能小善雖有可觀孔子以為致逺則􅅺君子固當志其大者又前一切以宣陵孝子為太子舍人臣聞孝文皇帝制喪服三十六日雖繼體之君父子至親公卿列臣受恩之重皆屈情從制不敢踰越今虛偽小人本非骨肉既無幸私之恩又無祿仕之實惻隱之心義無所依至有姦軌之人通容其中桓思皇后祖載之時東郡有盜人妻者亡在孝中本縣追捕乃伏其辜虛偽雜穢難得勝言太子官屬宜搜選令德豈有但取丘墓凶醜之人其為不祥莫與大焉宜遣歸田里以明詐偽書奏帝乃親迎氣北郊及行辟雍之禮又詔宣陵孝子為舍人者悉改為丞尉焉護烏桓校尉夏育上言鮮卑宼邊自春以來三十餘發請徵幽州諸郡兵出塞擊之一冬二春必能禽滅先是護羗校尉田晏坐事論刑被原欲立功自効乃請中常侍王甫求得為將甫因此議遣兵與育并力討賊帝乃拜晏為破鮮卑中郎將大臣多有不同乃召百官議於朝堂蔡邕議曰征討殊類所由尚矣然而時有同異埶有可否故謀有得失事有成敗不可齊也夫以世宗神武將帥良猛財賦充實所括廣逺數十年間官民俱匱猶有悔焉况今人財竝乏事劣昔時乎自匈奴遁逃鮮卑强盛據其故地稱兵十萬才力勁健意智益生加以闗塞不嚴禁網多漏精金良鐵皆為賊有漢人逋逃為之謀主兵利馬疾過於匈奴昔段熲良將習兵善戰有事西羌猶十餘年今育晏才策未必過熲鮮卑種衆不弱曩時而虛計二載自許有成若禍結兵連豈得中休當復徵發衆人轉運無已是為耗竭諸夏并力蠻夷夫邊垂之患手足之疥搔中國之困胷背之瘭疽方今郡縣盜賊尚不能禁況此醜虜而可伏乎昔髙祖忍平城之恥吕后棄慢書之詬方之於今何者為盛天設山河秦築長城漢起塞垣所以别内外異殊俗也茍無䠞國内侮之患則可矣豈與蟲螘之虜校往來之數哉雖或破之豈可殄盡而方令本朝為之旰食乎昔淮南王安諫伐越曰如使越人蒙死以逆執事厮輿之卒有一不備而歸者雖得越王之首猶為大漢羞之而欲以齊民易醜虜皇威辱外夷就如其言猶已危矣况乎得失不可量邪帝不從八月遣夏育出髙栁田晏出雲中匈奴中郎將臧旻率南單于出鴈門各將萬騎三道出塞二千餘里檀石槐命三部大人各帥衆逆戰育等大敗喪其節傳輜重各將數十騎犇還死者什七八三將檻車徵下獄贖為庶人冬十月癸丑朔日有食之太尉劉寛免辛丑京師地震十一月司空陳球免十二月甲寅以太常河南孟􅖢爲太尉庚辰司徒楊賜免以太常陳耽為司空遼西太守甘陵趙苞到官遣使迎母及妻子垂當到郡道經栁城值鮮卑萬餘人入塞冦鈔苞母及妻子遂為所劫質載以擊郡苞率騎二萬與賊對陳賊出母以示苞苞悲號謂母曰為子無狀欲以微祿奉養朝夕不圖為母作禍昔為母子今為王臣義不得顧私恩毁忠節唯當萬死無以塞罪母遥謂曰威豪人各有命何得相顧以虧忠義爾其勉之苞即時進戰賊悉摧破其母妻皆為所害苞自上歸葬帝遣使弔慰封鄃矦苞葬訖謂鄉人曰食祿而避難非忠也殺母以全義非孝也如是有何面目立於天下遂歐血而死光和元年春正月合浦交阯烏滸蠻反招引九真日南民攻没郡縣太尉孟􅖢罷二月辛亥朔日有食之癸丑以光祿勲陳國袁滂為司徒己未地震置鴻都門學其諸生皆敇州郡三公舉用辟召或出為刺史太守入為尚書侍中有封矦賜爵者士君子皆耻與為列焉三月辛丑赦天下改元以太常常山張顥為太尉顥中常侍奉之弟也夏四月丙辰地震侍中寺雌雞化為雄司空陳耽免以太常來豔為司空六月丁丑有黒氣墮帝所御温德殿東庭中長十餘丈似龍秋七月壬子青虹見玉堂後殿庭中詔召光祿大夫楊賜等詣金商門問以災異及消復之術賜對曰春秋䜟曰天投蜺天下怨海内亂加四百之期亦復垂及今妾媵閹尹之徒共專國朝欺罔日月又鴻都門下招㑹羣小造作賦説見寵於時更相薦説旬月之間竝各㧞擢樂松處常伯任芝居納言郤儉梁鵠各受豐爵不次之寵而令搢紳之徒委伏畎畮口誦堯舜之言身蹈絶俗之行棄捐溝壑不見逮及冠履倒易陵谷代處幸頼皇天垂象譴告周書曰天子見怪則修德諸矦見怪則修政卿大夫見怪則修職士庶人見怪則修身唯陛下斥逺佞巧之臣速徵鶴鳴之士斷絶尺一抑止槃游冀上天還威衆變可弭議郎蔡邕對曰臣伏思諸異皆亡國之怪也天於大漢殷勤不已故屢出祅變以當譴責欲令人君感悟改危即安今蜺墮雞化皆婦人干政之所致也前者乳母趙嬈貴重天下讒諛驕溢續以永樂門史霍玉依阻城社又為姦邪今道路紛紛復云有程大人者察其風聲將為國患宜髙為隄防明設禁令深惟趙霍以為至戒今太尉張顥為王所進光祿勲偉璋有名貪濁又長水校尉趙玹屯騎校尉蓋升竝叨時幸榮富優足宜念小人在位之咎退思引身避賢之福伏見廷尉郭禧純厚老成光禄大夫橋􅀇聰達方直故太尉劉寵忠實守正竝宜為謀主數見訪問夫宰相大臣君之四體委任責成優劣已分不宜聽納小吏雕琢大臣也又尚方工技之作鴻都篇賦之文可且消息以示惟憂宰府孝廉士之髙選近者以辟召不慎切責三公而今竝以小文超取選舉開請託之門違明王之典衆心不厭莫之敢言臣願陛下忍而絶之思惟萬機以荅天望聖朝既自約厲左右近臣亦宜從化人自抑損以塞咎戒則天道虧滿鬼神福謙矣夫君臣不密上有漏言之戒下有失身之禍願寑臣表無使盡忠之吏受怨姦仇章奏帝覽而歎息因起更衣曹節於後竊視之悉宣語左右事遂漏露其為邕所裁黜者側目思報初邕與大鴻臚劉郃素不相平叔父衛尉質又與將作大匠陽球有隙球即中常侍程璜女夫也璜遂使人飛章言邕質數以私事請託於郃郃不聽邕含隱切志欲相中於是詔下尚書召邕詰狀邕上書曰臣實愚戇不顧後害陛下不念忠臣直言宜加掩蔽誹謗卒至便用疑怪臣年四十有六孤特一身得託名忠臣死有餘榮恐陛下於此不復聞至言矣於是下邕質於雒陽獄劾以仇怨奉公議害大臣大不敬弃市事奏中常侍河南吕强愍邕無罪力為伸請帝亦更思其章有詔減死一等與家屬髠鉗徙朔方不得以赦令除陽球使客追路刺邕客感其義皆莫為用球又賂其部主使加毒害所賂者反以其情戒邕由是得免八月有星孛于天市九月太尉張顥罷以太常陳球為太尉司空來豔薨冬十月以屯騎校尉袁逢為司空宋皇后無寵後宫幸姬衆共譖毁渤海王悝妃宋氏即后之姑也中常侍王甫恐后怨之因譖后挾左道祝詛帝信之遂策收璽綬后自致暴室以憂死父不其鄉矦酆及兄弟竝被誅丙子晦日有食之尚書盧植上言凡諸黨錮多非其罪可加赦恕申宥回枉又宋后家屬竝以無辜委骸横尸不得歛葬宜敇收拾以安遊魂又郡守刺史一月數遷宜依黜陟以章能否縱不九載可滿三歲又請謁希求一宜禁塞選之舉事責成主者又天子之體理無私積宜弘大務蠲略細微帝不省十一月太尉陳球免十二月丁巳以光禄大夫橋􅀇爲太尉鮮卑冦酒泉種衆日多縁邊莫不被毒詔中尚方為鴻都文學樂松江覽等三十二人圖象立贊以勸學者尚書令陽球諫曰臣案松覽等皆出於微蔑斗筲小人依慿世戚附託權豪俛眉承睫徼進明時或獻賦一篇或鳥􅂐盈簡而位升郎中形圖丹青亦有筆不􅀧牘辭不辨心假手請字妖偽百品莫不被蒙殊恩蟬蜕滓濁是以有識掩口天下嗟嘆臣聞圖象之設以昭勸戒欲令人君動鑒得失未聞豎子小人詐作文頌而可妄竊天官垂象圖素者也今太學東觀足以宣明聖化願罷鴻都之選以銷天下之謗書奏不省是歲初開西邸賣官入錢各有差二千石二千萬四百石四百萬其以德次應選者半之或三分之一於西園立庫以貯之或詣闕上書占令長隨縣好醜豐約有賈富者則先入錢貧者到官然後倍輸又私令左右賣公卿公千萬卿五百萬初帝為矦時常苦貧及即位每歎桓帝不能作家居曾無私錢故賣官聚錢以為私藏帝嘗問侍中楊竒曰朕何如桓帝對曰陛下之於桓帝亦猶虞舜比德唐堯帝不悦曰卿强項眞楊震子孫死後必復致大鳥矣竒震之曾孫也南匈奴屠特若尸逐就單于死子呼徵立二年春大疫三月司徒袁滂免以大鴻臚劉郃為司徒乙丑太尉橋玄罷拜太中大夫以太中大夫段熲為太尉􅀇㓜子遊門次為人所劫登樓求貨􅀇不與司􅀠校尉河南尹圍守􅀇家不敢迫􅀇瞋目呼曰姦人無狀􅀇豈以一子之命而縱國賊乎促令攻之􅀇子亦死􅀇因上言天下凡有劫質皆并殺之不得贖以財寶開張姦路由是劫質遂絶京兆地震司空袁逢罷以太常張濟為司空夏四月甲戌朔日有食之王甫曹節等姦虐弄權扇動内外太尉段熲阿附之節甫父兄子弟為卿校牧守令長者布滿天下所在貪暴甫養子吉為沛相尤殘酷凡殺人皆磔尸車上隨其罪目宣示屬縣夏月腐爛則以繩連其骨周徧一郡乃止見者駭懼視事五年凡殺萬餘人尚書令陽球常拊髀發憤曰若陽球作司隷此曹子安得容乎既而球果遷司隷甫使門生於京兆界辜􅅦官財物七千餘萬京兆尹楊彪發其姦言之司隷彪賜之子也時甫休沐里舍熲方以日食自劾球詣闕謝恩因奏甫熲及中常侍淳于登袁赦封􅛑等罪惡辛巳悉收甫熲等送洛陽獄及甫子永樂少府萌沛相吉球自臨考甫等五毒備極萌先嘗為司􅀠乃謂球曰父子既當伏誅亦以先後之義少以楚毒假借老父球曰爾罪惡無狀死不滅責乃欲論先後求假借邪萌乃罵曰爾前奉事吾父子如奴奴敢反汝主乎今日臨阬相擠行自及也球使以土窒萌口箠扑交至父子悉死於杖下熲亦自殺乃僵磔甫屍於夏城門大署牓曰賊臣王甫盡没入其財産妻子皆徙比景球既誅甫欲以次表曹節等乃敇中都官從事曰且先去權貴大猾乃議其餘耳公卿豪右若袁氏兒輩從事自辦之何須校尉邪權門聞之莫不屏氣曹節等皆不敢出沐㑹順帝虞貴人葬百官㑹喪還曹節見磔甫尸道次慨然抆淚曰我曹可自相食何宜使犬䑛其汁乎語諸常侍今且俱入勿過里舍也節直入省白帝曰陽球故酷暴吏前三府奏當免官以九江微功復見擢用愆過之人好為妄作不宜使在司􅀠以騁毒虐帝乃徙球為衛尉時球出謁陵節敇尚書令召拜不得稽留尺一球被召急因求見帝叩頭曰臣無清髙之行横蒙鷹犬之任前雖誅王甫段熲蓋狐狸小醜未足宣示天下願假臣一月必令豺狼鴟梟各服其辜叩頭流血殿上呵叱曰衛尉扞詔邪至於再三乃受拜於是曹節朱瑀等權勢復盛節領尚書令郎中梁人審忠上書曰陛下即位之初未能萬機皇太后念在撫育權時攝政故中常侍蘇康管霸應時誅殄太傅陳蕃大將軍竇武考其黨與志清朝政華容矦朱瑀知事覺露禍及其身遂興造逆謀作亂王室撞蹋省闥執奪璽綬迫脅陛下聚㑹羣臣離間骨肉母子之恩遂誅蕃武及尹勲等因共割裂城社自相封賞父子兄弟被􅀩尊榮素所親厚布在州郡或登九列或據三司不惟祿重位尊之責而茍營私門多蓄財貨繕修第舍連里竟巷盜取御水以作漁釣車馬服玩擬於天家羣公卿士杜口吞聲莫敢有言州牧郡守承順風㫖辟召選舉釋賢取愚故蟲蝗為之生夷寇為之起天意憤盈積十餘年故頻歲日食於上地震於下所以譴戒人主欲令覺悟誅鉏無狀昔髙宗以雉雊之變故獲中興之功近者神祇啟悟陛下發赫斯之怒故王甫父子應時馘􅎒路人士女莫不稱善若除父母之讎誠恐陛下復忍孽臣之類不悉殄滅昔秦信趙髙以危其國吳使刑人身遘其禍今以不忍之恩赦夷族之罪姦謀一成悔亦何及臣為郎十五年皆耳目聞見瑀之所為誠皇天所不復赦願陛下留漏刻之聽裁省臣表埽滅醜類以荅天怒與瑀考驗有不如言願受湯鑊之誅妻子并徙以絶妄言之路章寑不報中常侍吕强清忠奉公帝以衆例封為都鄉矦强固辭不受因上疏陳事曰臣聞髙祖重約非功臣不矦所以重天爵明勸戒也中常侍曹節等宦官祐薄品卑人賤讒諂媚主佞邪徼寵有趙髙之禍未被轘裂之誅陛下不悟妄授茅土開國承家小人是用又并及家人重金兼紫交結邪黨下比羣佞隂陽乖刺稼穡荒蕪人用不康罔不由兹臣誠知封事已行言之無逮所以冒死干觸陳愚忠者實願陛下損改既謬從此一止臣又聞後宫采女數千餘人衣食之費日數百金比􅂖雖賤而户有饑色案法當貴而今更賤者由賦發繁數以解縣官寒不敢衣饑不敢食民有斯戹而莫之䘏宫女無用填積後庭天下雖復盡力耕桑猶不能供又前召議郎蔡邕對問於金商門邕不敢懐道迷國而切言極對毁刺貴臣譏呵宦官陛下不密其言至令宣露羣邪項領膏脣拭舌競欲咀嚼造作飛條陛下回受誹謗致邕刑罪室家徙放老幼流離豈不負忠臣哉今羣臣皆以邕為戒上畏不測之難下懼劒客之害臣知朝廷不復得聞忠言矣故太尉段熲武勇冠世習於邊事垂髪服戎功成皓首歴事二主勲烈獨昭陛下既已式序位登台司而為司􅀠校尉陽球所見誣脅一身既斃而妻子逺播天下惆悵功臣失望宜徵邕更加授任反熲家屬則忠貞路開衆怨以弭矣帝知其忠而不能用丁酉赦天下上禄長和海上言禮從祖兄弟别居異財恩義已輕服屬踈末而今黨人錮及五族既乖典訓之文有謬經常之灋帝覽之而悟於是黨錮自從祖以下皆得解釋五月以衛尉劉寛為太尉護匈奴中郎將張脩與南單于呼徵不相能脩擅斬之更立右賢王羌渠為單于秋七月脩坐不先請而擅誅殺檻車徵詣廷尉死初司徒劉郃兄侍中鯈與竇武同謀俱死永樂少府陳球説郃曰公岀自宗室位登台鼎天下瞻望社稷鎮衛豈得雷同容容無違而已今曹節等放縱為害而久在左右又公兄侍中受害節等今可表徙衛尉陽球為司􅀠校尉以次收節等誅之政出聖主天下太平可翹足而待也郃曰凶豎多耳目恐事未㑹先受其禍尚書劉納曰為國棟梁傾危不持焉用彼相邪郃許諾亦與陽球結謀球小妻程璜之女由是節等頗得聞知乃重賂璜且脅之璜懼迫以球謀告節節因共白帝曰郃與劉納陳球陽球交通書疏謀議不軌帝大怒冬十月甲申劉郃陳球劉納陽球皆下獄死巴郡板楯蠻反遣御史中丞蕭瑗督益州刺史討之不克十二月以光祿勲楊賜為司徒鮮卑冦幽并二州三年春正月癸酉赦天下夏四月江夏蠻反秋酒泉地震冬有星孛于狼弧鮮卑冦幽并二州十二月立貴人何氏為皇后徵后兄潁川太守進為侍中后本南陽屠家以選入掖庭生皇子辯故立之是歲作畢圭靈昆苑司徒楊賜諫曰先帝之制左開鴻池右作上林不奢不約以合禮中今猥規郊城之地以為苑囿壞沃衍廢田園驅居民畜禽獸殆非所謂若保赤子之義今城外之苑已有五六可以逞情意順四節也宜惟夏禹卑宫太宗露臺之意以尉下民之勞書奏帝欲止以問侍中任芝樂松對曰昔文王之囿百里人以為小齊宣五里人以為大今與百姓共之無害於政也帝悦遂為之巴郡板楯蠻反蒼梧桂陽賊攻郡縣零陵太守楊琁制馬車數十乘以排囊盛石灰於車上繋布索於馬尾又為兵車專彀弓弩及戰令馬車居前順風鼓灰賊不得視因以火燒布然馬驚犇突賊陣因使後車弓弩亂發鉦鼓鳴震羣盜波駭破散追逐傷斬無數梟其渠帥郡境以清荆州刺史趙凱誣奏琁實非身破賊而妄有其功琁與相章奏凱有黨助遂檻車徵琁防禁嚴密無由自訟乃噬臂出血書衣為章具陳破賊形埶及言凱所誣狀潛令親屬詣闕通之詔書原琁拜議郎凱受誣人之罪琁喬之弟也資治通鑑卷第五十七
