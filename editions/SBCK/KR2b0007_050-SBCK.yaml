front:
  text: 反州郡討平之九月築馮翊北界􅇋塢五百所以僃羌
  hash: sha256:ff7b56df915cc2b20a2c952c6b16c1b4cb753add660a0a332d4691fb415cb429
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0007_SBCK_049-19b}
body:
  text: 冬十一月蒼梧鬱林合浦蠻夷降舊制公卿二千石刺史不得行三年䘮司徒劉愷以為非所以師表百姓宣美風俗丙戌初聽大臣行三年䘮癸卯郡國九地震十二月丁巳任尚遣兵擊零昌於北地殺其妻子燒其廬落斬首七百餘級四年春二月乙巳朔日有食之乙卯赦天下壬戌武庫災任尚遣當闐種羌榆鬼等刺殺杜季貢封榆鬼為破羌矦司空袁敞廉勁不阿權貴失鄧氏㫖尚書郎張俊有私書與敞子俊怨家封上之夏四月戊申敞坐䇿免自殺俊等下獄當死俊上書自訟臨刑太后詔以減死論己巳遼西鮮卑連休等入冦郡兵與烏桓大人於秩居等共擊大破之斬首千三百級六月戊辰三郡雨雹尹就坐不能定益州徴抵罪以益州刺史張喬領其軍屯招誘叛羌稍稍降散秋七月京師及郡國十雨水九月護羌校尉任尚復募効功種羌號封刺殺零昌封號封為羌王冬十一月己卯彭城靖王恭薨越嶲夷以郡縣賦斂煩數十二月大牛種封離等反殺遂乆令甲子任尚與騎都尉馬賢共擊先零羌狼莫追至北地相持六十餘日戰於富平河上大破之斬首五千級狼莫逃去於是西河䖍人種羌萬人詣鄧遵降隴右平是嵗郡國十三地震五年春三月京師及郡國五旱夏六月髙句驪與濊貊冦􅀇莬永昌益州蜀郡夷皆叛應封離衆至十餘萬破壞二十餘縣殺長吏焚掠百姓骸骨委積千里無人秋八月丙申朔日有食之代郡鮮卑入冦殺長吏發縁邊甲卒黎陽營兵屯上谷以僃之冬十月鮮卑冦上谷攻居庸關復發縁邊諸郡黎陽營兵積射士歩騎二萬人屯列衝要鄧遵募上郡全無種羌雕何刺殺狼莫封雕何為羌矦自羌叛十餘年閒軍旅之費凡用二百四十餘億府帑空竭邊民及内郡死者不可勝數并涼二州遂至虚秏及零昌狼莫死諸羌瓦解三輔益州無復冦警詔封鄧遵為武陽矦邑三千户遵以太后從弟故爵封優大任尚與遵争功又坐詐增首級受賕枉灋贓千萬已上十二月檻車徴尚棄市沒入財物鄧騭子侍中鳯嘗受尚馬騭髠妻及鳯以謝罪是嵗郡國十四地震太后弟悝閶皆卒封悝子廣宗為葉矦閶子忠為西華矦六年春二月乙巳京師及郡國四十二地震夏四月沛國勃海大風雨雹五月京師旱六月丙戌平原哀王得薨無子秋七月鮮卑冦馬城塞殺長吏度遼將軍鄧遵及中郎將馬續率南單于追擊大破之九月癸巳陳懷王竦薨無子國除冬十二月戊午朔日有食之旣郡國八地震是嵗太后徴和帝弟濟北王夀河閒王開子男女年五嵗以上四十餘人及鄧氏近親子孫三十餘人並為開邸第教學經書躬自監試詔從兄河南尹豹越騎校尉康等曰末世貴戚食禄之家温衣美飯乘堅驅良而面牆術學不識臧否斯故禍敗之從來也豫章有芝草生太守劉祗欲上之以問郡人唐檀檀曰方今外戚豪盛君道微弱斯豈嘉瑞乎祗乃止益州刺史張喬遣從事楊竦將兵至楪榆擊封離等大破之斬首三萬餘級獲生口千五百人封離等惶怖斬其同謀渠帥詣竦乞降竦厚加慰納其餘三十六種皆來降附竦因奏長吏姦猾侵犯蠻夷者九十人皆減死論初西域諸國既絶於漢北匈奴復以兵威役屬之與共為邉冦敦煌太守曹宗患之乃上遣行長史索班將千餘人屯伊吾以招撫之於是車師前王及鄯善王復來降初䟽勒王安國死無子國人立其舅子遺腹為王遺腹叔父臣磐在月氏月氏納而立之後莎車畔于窴屬䟽勒䟽勒遂彊與􅀛兹于窴為敵國焉永寧元年春三月丁酉濟北惠王夀薨北匈奴率車師後王軍就共殺後部司馬及敦煌長史索班等遂擊走其前王略有北道鄯善逼急求救於曹宗宗因此請出兵五千人擊匈奴以報索班之恥因復取西域公卿多以爲宜閉玉門關絶西域太后聞軍司馬班勇有父風召詣朝堂問之爲上議曰昔孝武皇帝患匈奴彊盛於是開通西域論者以為奪匈奴府藏斷其右臂光武中興未遑外事故匈奴負彊驅率諸國及至永平再攻敦煌河西諸郡城門晝閉孝明皇帝深惟廟䇿乃命虎臣出征西域故匈奴逺遁邊境得安及至永元莫不内屬㑹閒者羌亂西域復絶北虜遂遣責諸國僃其逋租髙其價直嚴以期㑹鄯善車師皆懐憤怨思樂事漢其路無從前所以時有叛者皆由牧養失宜還為其害故也今曹宗徒恥於前負欲報雪匈奴而不尋出兵故事未度當時之宜也夫要功荒外萬無一成若兵連禍結悔無所及況今府藏未充師無後繼是示弱於逺夷􅁀短於海内臣愚以為不可許也舊敦煌郡有營兵三百人今宜復之復置護西域副校尉居於敦煌如永元故事又宜遣西域長史將五百人屯樓蘭西當焉􅂄龜兹徑路南彊鄯善于窴心膽北扞匈奴東近敦煌如此誠便尚書復問勇利害云何勇對曰昔永平之末始通西域初遣中郎將居敦煌後置副校於車師既為胡虜節度又禁漢人不得有所侵擾故外夷歸心匈奴畏威今鄯善王尤還漢人外孫若匈奴得志則尤還必死此等雖同鳥獸亦知避害若出屯樓蘭足以招附其心愚以為便長樂衞尉鐔顯廷尉綦母參司􅀠校尉崔據難曰朝廷前所以棄西域者以其無益於中國而費難供也今車師已屬匈奴鄯善不可保信一旦反覆班將能保北虜不為邊害乎勇對曰今中國置州牧者以禁郡縣姦猾盗賊也若州牧能保盗賊不起者臣亦願以要斬保匈奴之不為邊害也令通西域則虜執必弱虜埶弱則為患微矣孰與歸其府藏續其斷臂哉今置校尉以扞撫西域設長史以招懐諸國若棄而不立則西域望絶望絶之後屈就北虜縁邊之郡將受困害恐河西城門必須復有晝閉之儆矣今不廓開朝廷之徳而拘屯戍之費若此北虜遂熾豈安邊乆長之䇿哉太尉屬毛軫難曰今若置校尉則西域駱驛遣使求索無猒與之則費難供不與則失其心一旦為匈奴所廹當復求救則為役大矣勇對曰今設以西域歸匈奴而使其恩徳大漢不為鈔盜則可矣如其不然則因西域租入之饒兵馬之衆以擾動縁邊是為富仇讎之財增暴夷之埶也置校尉者宣威布徳以繫諸國内向之心而疑匈奴覬覦之情而無費財秏國之慮也且西域之人無它求索其來入者不過禀食而已今若拒絶埶歸北屬夷虜并力以冦并涼則中國之費不止十億置之誠便於是從勇議復敦煌郡營兵三百人置西域副校尉居敦煌雖復羈縻西域然亦未能出屯其後匈奴果數與車師共入冦鈔河西大􅀍其害沈氐羌寇張掖夏四月丙寅立皇子保為太子改元赦天下己巳紹封陳敬王子崇為陳王濟北惠王子萇為樂成王河間孝王子翼為平原王六月護羌校尉馬賢將萬人討沈氐羌於張掖破之斬首千八百級􅀗生口千餘人餘虜悉降時當煎種大豪飢五等以賢兵在張掖乃乘虚冦金城賢還軍追之出塞斬首數千級而還燒當燒何種聞賢軍還復寇張掖殺長吏秋七月乙酉朔日有食之冬十月己巳司空李郃免癸酉以衛尉廬江陳襃為司空京師及郡國三十三大水十二月永昌徼外撣國王雍曲調遣使者獻樂及幻人戊辰司徒劉愷請致仕許之以千石禄歸養遼西鮮卑大人烏倫其至鞬各以其衆詣度遼將軍鄧遵降癸酉以太常楊震為司徒是嵗郡國二十三地震太后從弟越騎校尉康以太后乆臨朝政宗門盛滿數上書太后以為宜崇公室自損私權言甚切至太后不從康謝病不朝太后使内侍者問之所使者乃康家先婢自通中大人康聞而詬之婢怨恚還白康詐疾而言不遜太后不怒免康官遣歸國絶屬籍􅀄當煎種飢五同種大豪盧怱忍良等千餘户别留允街而首施兩端建光元年春護羌校尉馬賢召盧怱斬之因放兵擊其種人􅀗首虜二千餘忍良等皆亡出塞幽州刺史巴郡馮煥􅀇莬太守姚光遼東太守蔡諷等將兵擊髙句麗髙句麗王宫遣嗣子遂成詐降而襲􅀇莬遼東殺傷二千餘人二月皇太后寢疾癸亥赦天下三月癸巳皇太后鄧氏崩未及大斂帝復申前命封鄧騭為上蔡矦位特進丙午葬和熹皇后太后自臨朝以來水旱十載四夷外侵盗賊内起每聞民飢或逹旦不寐躬自減徹以救災戹故天下復平歳還豐穰上始親政事尚書陳忠薦隱逸及直道之士潁川杜根平原成翊世之徒上皆納用之忠寵之子也初鄧太后臨朝根為郎中與同時郎上書言帝年長宜親政事太后大怒皆令盛以縑囊於殿上撲殺之既而載出城外根得蘇太后使人檢視根遂詐死三日目中生蛆因得逃竄為宜城山中酒家保積十五年成翊世以郡吏亦坐諌太后不歸政抵罪帝皆徴詣公車拜根侍御史翊世尚書郎或問根曰往者遇禍天下同義知故不少何至自苦如此根曰周旋民閒非絶跡之處邂逅發露禍及親知故不為也戊申追尊清河孝王曰孝德皇皇妣左氏曰孝徳后祖妣宋貴人曰敬隱后初長樂太僕蔡倫受竇后諷㫖誣陷宋貴人帝敇使自致廷尉倫飲藥死夏四月高句麗復與鮮卑入冦遼東蔡諷追擊於新昌戰歿功曹􅁺龍端兵馬掾公孫酺以身扞諷俱没於陳丁巳尊帝嫡母耿􅁎為甘陵大貴人甲子樂成王萇坐驕淫不灋貶為蕪湖矦己巳令公卿下至郡國守相各舉有道之士一人尚書陳忠以詔書既開諌争慮言事者必多激切或致不能容乃上䟽豫通廣帝意曰臣聞仁君廣山藪之大納切直之謀忠臣盡謇諤之節不畏逆耳之害是以高祖舍周昌桀紂之譬孝文嘉袁盎人豕之譏武帝納東方朔宣室之正元帝容薛廣徳自刎之切今明詔崇高宗之徳推宋景之誠引咎克躬諮訪羣吏言事者見杜根成翊世等新䝉表録顯列二臺必承風響應争爲切直若嘉謀異䇿宜輒納用如其管穴妄有譏刺雖苦口逆耳不得事實且優游寛容以示聖朝無諱之美若有道之士對問高者宜垂省覽特遷一等以廣直言之路書御有詔拜有道高第士沛國施延爲侍中初汝南薛包少有至行父娶後妻而憎包分出之包日夜號泣不能去至被敺扑不得已廬於舎外旦入洒掃父怒又逐之乃廬於里門昬晨不廢積嵗餘父母慙而還之及父母亡弟子求分財異居包不能止乃中分其財奴婢引其老者曰與我共事乆若不能使也田廬取其荒頓者曰吾少時所治意所戀也器物取朽敗者曰我素所服食身口所安也弟子數破其産輒復賑給帝聞其名令公車特徴至拜侍中包以死自乞有詔賜告歸加禮如毛義帝少號聦明故鄧太后立之及長多不徳稍不可太后意帝乳母王聖知之太后徴濟北河閒王子詣京師河閒王子翼美容儀太后竒之以為平原懷王後留京師王聖見太后乆不歸政慮有廢置常與中黄門李閏江京􅇋伺左右共毁短太后於帝帝每懷忿懼及太后崩宫人先有受罰者懐怨恚因誣告太后兄弟悝弘閶先從尚書鄧訪取廢帝故事謀立平原王帝聞追怒令有司奏悝等大逆無道遂廢西平矦廣宗葉矦廣徳西華矦忠陽安矦珍都鄉矦甫德皆為庶人鄧騭以不與謀但免特進遣就國宗族免官歸故郡沒入騭等貲財田宅徙鄧訪及家屬於逺郡郡縣逼廹廣宗及忠皆自殺又徙封騭為羅矦五月庚辰騭與子鳳並不食而死騭從弟河南尹豹度遼將軍舞陽矦遵將作大匠暢皆自殺唯廣徳兄弟以母與閻后同産得留京師復以耿䕫為度遼將軍徴樂安矦鄧康為太僕丙申貶平原王翼為都鄉矦遣歸河間翼謝絶賔客閉門自守由是得免􅀄鄧后之立也太尉張禹司徒徐防欲與司空陳寵共奏追封后父訓寵以先世無奏請故事爭之連日不能奪及訓追加封謚禹防復約寵俱遣子奉禮於虎賁中郎將騭寵不從故寵子忠不得志于鄧氏騭等敗忠為尚書數上䟽䧟成其惡大司農京兆朱寵痛騭無罪遇禍乃肉袒輿櫬上䟽曰伏惟和熹皇后聖善之德為漢文母兄弟忠孝同心憂國宗廟有主王室是賴功成身退讓國遜位歷世外戚無與為比當享積善履謙之祐而横為宫人單辭所䧟利口傾險反亂國家罪無申證獄不訊鞫遂令騭等罹此酷濫一門七人並不以命屍骸流離寃魂不反逆天感人率土䘮氣宜收還􅃁次寵樹遺􅀌奉承血祀以謝亡靈寵知其言切自致廷尉陳忠復劾奏寵詔免官歸田里衆庶多為騭稱枉者帝意頗悟乃譴讓州郡還葬騭等於北芒諸從昆弟皆得歸京師帝以耿貴人兄牟平矦寶監羽林左軍車騎封宋楊四子皆為列矦宋氏為卿校侍中大夫謁者郎吏十餘人閻皇后兄弟顯景耀並為卿校典禁兵於是内寵始盛帝以江京嘗迎帝於邸以為京功封都鄉矦封李閏為雍鄉矦閏京並遷中常侍京兼大長秋與中常侍樊豐黄門令劉安鉤盾令陳達及王聖聖女伯榮扇動内外競為侈虐伯榮出入宫掖傳通姦賂司徒楊震上䟽曰臣聞政以得賢為本治以去穢為務是以唐虞俊乂在官四凶流放天下咸服以致雍熈方今九徳未事嬖倖充庭阿母王聖出自賤微得遭千載奉飬聖躬雖有推燥居溼之勤前後賞惠過報勞苦而無厭之心不知紀極外交屬託擾亂天下損辱清朝塵㸃日月夫女子小人近之喜逺之怨實為難飬宜速出阿母令居外舎斷絶伯榮莫使往來令恩德兩隆上下俱美奏御帝以示阿母等内倖皆懐忿恚而伯榮驕淫尤甚通於故朝陽矦劉護從兄瓌􅅛遂以為妻官至侍中得襲護爵震上䟽曰經制父死子繼兄亡弟及以防􅆲也伏見詔書封故朝陽矦劉護再從兄瓌襲護爵為矦護同産弟威今猶見在臣聞天子專封封有功諸矦專爵爵有徳今瓌無佗功行但以配阿母女一時之閒既位侍中又至封矦不稽舊制不合經義行人諠譁百姓不安陛下宜鑒鏡既往順帝之則尚書廣陵翟酺上䟽曰昔竇鄧之寵傾動四方兼官重紱盈金積貨至使議弄神器改更社稷豈不以埶尊威廣以致斯患乎及其破壊頭顙墯地願為􅀌豚豈可得哉夫致貴無漸失必􅁀受爵非道殃必疾今外戚寵幸功均造化漢元以來未有等比陛下誠仁恩周洽以親九族然禄去公室政移私門覆車重尋寧無摧折此最安危之極戒社稷之深計也昔文帝愛百金於露臺餙帷帳於皁囊或有譏其儉者上曰朕爲天下守財耳豈得妄用之哉今自初政已來日月未乆費用賞賜已不可筭斂天下之財積無功之家帑藏單盡民物彫傷卒有不虞復當重賦百姓怨叛旣生危亂可待也願陛下勉求忠貞之臣誅逺佞諂之黨割情欲之歡罷宴私之好心存亡國所以失之鑒觀興王所以得之庶災害可息豐年可招矣書奏皆不省秋七月己卯改元赦天下壬寅太尉馬英薨燒當羌忍良等以麻奴兄弟本燒當世嫡而校尉馬賢撫恤不至常有怨心遂相結共脅將諸種寇湟中攻金城諸縣八月賢將先零種擊之戰於牧苑不利麻奴等又敗武威張掖郡兵於令居因脅將先零沈氐諸種四千餘户縁山西走冦武威賢追到鸞鳥招引之諸種降者數千麻奴南還湟中甲子以前司徒劉愷為太尉初清河相叔孫光坐臧抵罪遂增錮二世至是居延都尉范邠復犯臧罪朝廷欲依光比劉愷獨以爲春秋之義善善及子孫惡惡止其身所以進人於善也如今使臧吏禁錮子孫以輕從重懼及善人非先王詳刑之意也尚書陳忠亦以為然有詔太尉議是鮮卑其至鞬寇居庸關九月雲中太守成嚴擊之兵敗功曹楊穆以身捍嚴與之俱歿鮮卑於是圍烏􅁊校尉徐常於馬城度遼將軍耿䕫與幽州刺史龐參發廣陽漁陽􅃰郡甲卒救之鮮卑解去戊子帝幸衛尉馮石府留飲十許日賞賜甚厚拜其子世為黄門侍郎世弟二人皆為郎中石陽邑矦魴之孫也父柱尚顯宗女獲嘉公主石襲公主爵為獲嘉矦能取悦當世故為帝所寵京師及郡國二十七雨水冬十一月己丑郡國三十五地震鮮卑冦玄菟尚書令祋諷等奏以為孝文皇帝定約禮之制光武皇帝絶告寧之典貽則萬世誠不可改宜復斷大臣行三年䘮尚書陳忠上䟽曰高祖受命蕭何創制大臣有寧告之科合於致憂之義建武之初新承大亂凡諸國政多趣簡易大臣旣不得告寧而羣司營禄念私鮮循三年之喪以報顧復之恩者禮義之方實為彫損陛下聽大臣終䘮聖功美業靡以尚兹孟子有言老吾老以及人之老幼吾幼以及人之幼天下可運於掌臣願陛下登高北望以甘陵之思揆度臣子之心則海内咸得其所時宦官不便之竟寢忠奏庚子復斷二千石以上行三年䘮袁宏論曰古之帝王所以篤化美俗率民為善因其自然而不奪其情民猶有不及者而況毁禮止哀滅其天性乎十二月高句驪王宫率馬韓濊貊數千騎圍􅀇菟夫餘王遣子尉仇台將二萬餘人與州郡并力討破之是嵗宫死子遂成立􅀇菟太守姚光上言欲因其䘮發兵擊之議者皆以為可許陳忠曰宫前桀黠光不能討死而擊之非義也宜遣使弔問因責讓前罪赦不加誅取其後善帝從之延光元年春三月丙午改元赦天下䕶羌校尉馬賢追擊麻奴到湟中破之種衆散遁夏四月癸未京師郡國二十一雨雹河西雹大者如斗幽州刺史馮煥玄菟太守姚光數糾發姦惡怨者詐作璽書譴責煥光賜以歐刀又下遼東都尉龐奮使速行刑奮即斬光收煥煥欲自殺其子緄疑詔文有異止煥曰大人在州志欲去惡實無它故必是凶人妄詐規肆姦毒願以事自上甘罪無晚煥從其言上書自訟果詐者所爲徴奮抵罪癸巳司空陳襃免五月庚戌宗正彭城劉授爲司空己巳封河閒孝王子德爲安平王嗣樂成靖王後六月郡國蝗秋七月癸卯京師及郡國十三地震高句驪王遂成還漢生口詣玄莬降其後濊貊率服東垂少事䖍人羌與上郡胡反度遼將軍耿䕫擊破之八月陽陵園寑火九月甲戌郡國二十七地震鮮卑旣累殺郡守膽意轉盛控􅁌數萬騎冬十月復冦鴈門定襄十一月冦太原燒當羌麻奴飢困將種衆詣漢陽太守耿种降是嵗京師及郡國二十七兩水帝數遣黄門常侍及中使伯榮往來甘陵尚書僕射陳忠上䟽曰今天心未得隔并屢臻青冀之域淫兩漏河徐岱之濵海水盆溢兖豫蝗蝝滋生荆楊稻收儉薄并涼二州羌戎叛戾加以百姓不足府帑虛匱陛下以不得親奉孝徳皇園廟比遣中使致敬甘陵朱軒駢馬相望道路可謂孝至矣然臣竊聞使者所過威權翕赫震動郡縣王矦二千石至爲伯榮獨拜車下發民修道繕理亭傳多設儲偫徴役無度老弱相隨動有萬計賂遺僕從人數百匹頓踣呼嗟莫不叩心河間託叔父之屬清河有陵廟之尊及剖符大臣皆猥為伯榮屈節車下陛下不問必以爲陛下欲其然也伯榮之威重於陛下陛下之柄在於臣妾水災之發必起於此昔韓嫣託副車之乘受馳視之使江都誤為一拜而嫣受歐刀之誅臣願明主嚴天元之尊正乾剛之位不宜復令女使干錯萬機重察左右得無石顯泄漏之姦尚書納言得無趙昌􅉲崇之詐公卿大臣得無朱博阿傅之援外屬近戚得無王鳳害商之謀若國政一由帝命王事毎決於已則下不得偪上臣不得干君常雨大水必當霽上四方衆異不能為害書奏不省時三府任輕機事專委尚書而災眚變咎輒切免三公陳忠上䟽曰漢典舊事丞相所請靡有不聽今之三公雖當其名而無其實選舉誅賞一由尚書尚書見任重於三公陵遲以來其漸乆矣臣忠心常獨不安近以地震䇿免司空陳襃今者災異復欲切讓三公昔孝成皇帝以妖星守心移咎丞相卒不䝉上天之福徒乖宋景之誠故知是非之分較然有歸矣又尚書决事多違故典罪灋無例詆欺為先文慘言醜有乖章憲宜責求其意割而勿聽上順國典下防威福置方貟於規矩審輕重於衡石誠國家之典萬世之灋也汝南太守山陽王龔政崇温和好才愛士以袁閬為功曹引進郡人黄憲陳蕃等憲雖不屈蕃遂就吏閬不修異操而致名當時蕃性氣高明龔皆禮之由是羣士莫不歸心憲世貧賤父為牛醫潁川荀淑至愼陽遇憲於逆旅時年十四淑竦然異之揖與語移日不能去謂憲曰子吾之師表也既而前至袁閬所未及勞問逆曰子國有顔子寧識之乎閬曰見吾叔度邪是時同郡戴良才高倨傲而見憲未嘗不正容及歸罔然若有失也其母問曰汝復從牛醫兒來邪對曰良不見叔度自以為無不及既覩其人則瞻之在前忽焉在後固難得而測矣陳蕃及同郡周舉常相謂曰時月之閒不見黄生則鄙吝之萌復存乎心矣太原郭泰少遊汝南先過袁閬不宿而退進往從憲累日方還或以問泰曰奉髙之器譬諸氿濫雖清而易挹叔度汪汪若千頃陂澄之不清淆之不濁不可量也憲初舉孝廉又辟公府友人勸其仕憲亦不拒之暫到京師即還竟無所就年四十八終范曄論曰黄憲言論風㫖無所傳聞然士君子見之者靡不服深逺去玼吝將以道周性全無德而稱乎余曾祖穆矦以為憲隤然其處順淵乎其似道淺深莫臻其分清濁未議其方若及門於孔氏其殆庶乎二年春正月旄牛夷反益州刺史張喬擊破之夏四月戊子爵乳母王聖為野王君北匈奴連與車師入寇河西議者欲復閉玉門陽關以絶其患敦煌太守張璫上書曰臣在京師亦以為西域宜棄今親踐其土地乃知棄西域則河西不能自存謹陳西域三䇿北虜呼􅄛王常展轉蒲類秦海之閒專制西域共為寇鈔今以酒泉屬國吏士二千餘人集昆侖塞先擊呼􅄛王絶其根本因發鄯善兵五千人脅車師後部此上計也若不能出兵可置軍司馬將士五百人四郡供其犂牛􅂖食出據栁中此中計也如又不能則宜棄交河城收鄯善等悉使入塞此下計也朝廷下其議陳忠上䟽曰西域内附日乆區區東望扣關者數矣此其不樂匈奴慕漢之效也今北虜已破車師埶必南攻鄯善棄而不救則諸國從矣若然則虜財賄益增膽埶益殖威臨南羌與之交通如此河西四郡危矣河西既危不可不救則百倍之役興不訾之費發矣議者但念西域絶逺䘏之煩費不見孝武苦心勤勞之意也方今敦煌􅀌危逺來告急復不輔助内無以慰勞吏民外無以威示百蠻蹙國減土非良計也臣以為敦煌宜置校尉桉舊增四郡屯兵以西撫諸國帝納之於是復以班勇為西域長史將兵五百人出屯栁中秋七月丹陽山崩九月郡國五雨水冬十月辛未太尉劉愷罷甲戌以司徒楊震爲太尉光禄勲東萊劉熹爲司徒大鴻臚耿寳自􅇋震薦中常侍李閏兄於震曰李常侍國家所重欲令公辟其兄寳唯傳上意耳震曰如朝廷欲令三府辟召故宜有尚書敕寳大恨而去執金吾閻顯亦薦所親於震震又不從司空劉授聞之即辟此二人由是震益見怨時詔遣使者大爲王聖脩第中常侍樊豐及侍中周廣謝惲等更相扇動傾揺朝廷震上䟽曰臣伏念方今災害滋甚百姓空虚三邊震擾帑藏匱乏殆非社稷安寧之時詔書爲阿母興起第舎合兩爲一連里竟街雕修繕飾窮極巧伎攻山採石轉相迫促爲費巨億周廣謝惲兄弟與國無胏府枝葉之屬依倚近倖姦佞之人與之分威共權屬託州郡傾動大臣宰司辟召承望㫖意招來海内貪汙之人受其貨賂至有臧錮棄世之徒復得顯用白黒溷淆清濁同源天下讙譁為朝結譏臣聞師言上之所取財盡則怨力盡則叛怨叛之人不可復使惟陛下度之上不聽鮮卑其至鞬自將萬餘騎攻南匈奴於曼栢薁鞬日逐王戰死殺千餘人十二月戊辰京師及郡國三地震陳忠薦汝南周爕南陽馮良學行深純隠居不仕名重於世帝以􅀇纁羔幣聘之爕宗族更勸之曰夫修徳立行所以為國君獨何為守東岡之陂乎燮曰夫修道者度其時而動動而不時焉得亨乎與良皆自載至近縣稱病而還三年春正月班勇至樓蘭以鄯善歸附特加三綬而龜兹王白英猶自疑未下勇開以恩信白英乃率姑墨温宿自􅅞詣勇因發其兵歩騎萬餘人到車師前王庭擊走匈奴伊蠡王於伊和谷收得前部五千餘人於是前部始復開通還屯田柳中二月丙子車駕東廵辛卯幸泰山三月戊戌幸魯還幸東平至東郡歷魏郡河内而還初樊豐周廣謝惲等見楊震連諌不從無所顧忌遂詐作詔書調發司農錢􅂖大匠見徒材木各起家舍園池廬觀役費無數震復上䟽曰臣僃台輔不能調和隂陽去年十二月四日京師地動其日戊辰三者皆土位在中宫此中臣近官持權用事之象也臣伏惟陛下以邊境未寧躬自菲薄宫殿垣屋傾倚枝拄而已而親近倖臣未崇斷金驕溢踰灋多請徒士盛修第舎賣弄威福道路讙譁地動之變殆爲此發又冬無宿雪春節未雨百僚焦心而繕修不止誠致旱之徴也唯陛下奮乾剛之徳棄驕奢之臣以承皇天之戒震前後所言轉切帝既不平之而樊豐等皆側目憤怨以其名儒未敢加害㑹河閒男子趙騰上書指陳得失帝發怒遂收考詔獄結以罔上不道震上䟽救之曰臣聞殷周哲王小人怨詈則還自敬德今趙騰所坐激訐謗語爲罪與手刃犯灋有差乞爲虧除全騰之命以誘芻蕘輿人之言帝不聽騰竟伏尸都市及帝東廵樊豐等因乗輿在外競脩第宅太尉部掾高舒召大匠令史考校之得豐等所詐下詔書具奏須行還上之豐等惶怖㑹太史言星變逆行遂共譛震云自趙騰死後深用怨懟且鄧氏故吏有恚恨之心壬戌車駕還京師便時太學夜遣使者䇿收震太尉印綬震於是柴門絶賔客豐等復惡之令大鴻臚耿寶奏震大臣不服罪懐恚望有詔遣歸本郡震行至城西几陽亭乃慷慨謂其諸子門人曰死者士之常分吾䝉恩居上司疾姦臣狡猾而不能誅惡嬖女傾亂而不能禁何面目復見日月身死之日以雜木為捾布單被裁足蓋形勿歸􅃁次勿設祭祀因飲酖而卒􅀪農太守移良承樊豐等㫖遣吏於陜縣留停震䘮露棺道側讁震諸子代郵行書道路皆為隕涕太僕征羌矦來歷曰耿寳託元舅之親榮寵過厚不念報國恩而傾側姦臣傷害忠良其天禍亦將至矣歷歙之曾孫也夏四月乙丑車駕入宫戊辰以光禄勲馮石為太尉南單于檀死弟㧞立為烏稽矦尸逐鞮單于時鮮卑數冦邊度遼將軍耿䕫與温禺犢王呼尤徽將新降者連年出塞擊之還使屯列衝要耿䕫徴發煩劇新降者皆怨恨大人阿族等遂反脅呼尤徽欲與俱去呼尤徽曰我老矣受漢家恩寧死不能相隨衆欲殺之有救者得免阿族等遂將其衆亡去中郎將馬翼與胡騎追擊破之斬獲殆盡日南徼外蠻夷内屬六月鮮卑冦􅀇莬庚午閬中山崩秋七月辛巳以大鴻臚耿寶為大將軍王聖江京樊豐等譛太子乳母王男厨監邴吉等殺之家屬徙比景太子思男吉數為歎息京豐懼有後害乃與閻后妄造虚無構讒太子及東宫官屬帝怒召公卿以下議廢太子耿寶等承㫖皆以為當廢太僕來歷與太常桓焉廷尉犍為張皓議曰經説年未滿十五過惡不在其身且男吉之謀皇太子容有不知宜選忠良保傅輔以禮義廢置事重此誠聖恩所􅀫冝留帝不從焉郁之子也張皓退復上書曰昔賊臣江充造構讒逆傾覆戾園孝武乆乃覺寤雖追前失悔之何及今皇太子方十嵗未習保傅之教可遽責乎書奏不省九月丁酉廢皇太子保為濟隂王居於徳陽殿西鍾下來歷乃要結光禄勲祋諷宗正劉瑋將作大匠薛皓侍中閭丘弘陳光趙代施延太中大夫九江朱倀等十餘人俱詣鴻都門證太子無過帝與左右患之乃使中常侍奉詔脅羣臣曰父子一體天性自然以義割恩為天下也歷諷等不識大典而與羣小共為讙譁外見忠直而内希後福飾邪違義豈事君之禮朝廷廣開言事之路故且一切假貸若懷迷不反當顯明刑書諌者莫不失色薛皓先頓首曰固宜如明詔歷怫然廷詰皓曰屬通諌何言而今復背之大臣乘朝車處國事固得輾轉若此乎乃各稍自引起歷獨守闕連日不肯去帝大怒尚書令陳忠與諸尚書遂共劾奏歷等帝乃免歷兄弟官削國租黜歷母武安公主不得㑹見隴西郡始還狄道燒當羌豪麻奴死弟犀苦立庚申晦日有食之冬十月上行幸長安十一月乙丑還雒陽是嵗京師及諸郡國二十三地震三十六大水雨雹資治通鑑卷第五十
