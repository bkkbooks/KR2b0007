front:
  text: 資治通鑑卷第二百六十四
  hash: sha256:c7acdfeb6588f4d12d902af302a049cb5da182182017e5018fe135571e806f56
body:
  text: 臣司馬光奉勑編集唐紀八十逢困敦閏月凡一年有竒起昭陽大淵獻二月盡閼昭宗聖穆景文孝皇帝下之上天復三年二月壬申朔詔比在鳯翔所除官一切停時宦官盡死惟河東監軍張承業幽州監軍張居翰清海監軍程匡柔西川監軍魚全禋及致仕嚴遵羙爲李克用劉仁恭楊行密王建所匿得全斬它囚以應詔甲戌門下侍郎同平章事陸扆責授沂王傅分司車駕還京師賜諸道詔書獨鳯翔無之扆曰茂貞罪雖大然朝廷未與之絶今獨無詔書示人不廣崔㣧怒奏貶之宫人宋柔等十一人皆韓全誨所獻及僧道士與宦官親厚者二十餘人並送京兆杖殺上謂韓偓曰崔㣧雖盡忠然比卿頗用機數對曰凡為天下者萬國皆屬之耳目安可以機數欺之莫若推誠直致雖日計之不足而􅀊計之有餘也丙子工部侍郎同平章事􅂫檢吏部侍郎盧光啓並賜自盡丁玉以中書侍郎同平章事王溥爲太子賔客分司皆崔㣧所惡也戊寅賜朱全忠號回天再造竭忠守正功臣賜其僚佐敬翔等號迎鑾恊賛功臣諸將朱友寧等號迎鑾果毅功臣都頭以下號四鎮靜難功臣上議襃崇全忠欲以皇子爲諸道兵馬元帥以全忠副之崔㣧請以輝王祚爲之上曰濮王長㣧承全忠密㫖利祚沖㓜固請之己夘以祚爲諸道兵馬元帥庚辰加全忠守太尉充副元帥進爵梁王以㣧爲司徒兼侍中㣧恃全忠之勢專權自恣天子動靜皆禀之朝臣從上幸鳯翔者凡貶逐三十餘人刑賞繫其愛憎中外畏之重足一迹以敬翔守太府卿朱友寧領寧逺節度使全忠表苻道昭同平章事充天雄節度使遣兵援送之秦州不得至而還􅀄翰林學士承㫖韓偓之登進士第也御史大夫趙崇知貢舉上返自鳯翔欲用偓爲相偓薦崇及兵部侍郎王賛自代上欲從之崔㣧惡其分已權使朱全忠入爭之全忠見上曰趙崇輕薄之魁王賛無才用韓偓何得妄薦爲相上見全忠怒甚不得巳癸未貶偓濮州司馬上密與偓泣别偓曰是人非復前來之比臣得逺貶及死乃幸耳不忍見簒弑之辱己丑上令朱全忠與李茂貞書取平原公主茂貞不敢違遽歸之壬辰以朱友裕爲鎮國節度使乙未全忠奏留步􅀐萬人於故兩軍以朱友倫爲左軍􅀫衞都指揮使又以汴將張廷範爲宫􅁐使王殷爲皇城使蔣玄暉充街使於是全忠之黨布列徧於禁衞及京輔戊戌全忠辭歸鎮留宴壽春殿又餞之於延喜樓上臨軒泣别令於樓前上馬上又賜全忠詩全忠亦和進又賜楊柳枝辭五首百官班辭於長樂驛崔㣧獨送至霸橋自置餞席夜二鼓胤始還入城上復召對問以全忠安否置酒奏樂至四鼔乃罷以清海節度使裴樞爲門下侍郎同平章事朱全忠薦之也李克用使者還晉陽言崔胤之横克用曰胤爲人臣外􅀝賊勢内脅其君既執朝政又握兵權權重則怨多勢侔則釁生破家亡國在眼中矣朱全忠將行奏克用於臣本無大嫌乞厚加寵澤遣大臣撫慰俾知臣意進奏吏以白克用克用笑曰賊欲有事淄青畏吾掎其後耳三月戊午朱全忠至大梁王師範弟師魯圍齊州朱友寧引兵擊走之師範遣兵益劉鄩軍友寧擊取之由是兖州援絶葛從周引兵圍之友寧進攻青州戊辰全忠引四鎮及魏博兵十萬繼之淮􅀯將李神福圍鄂州望城中積荻謂監軍尹建峯曰今夕爲公焚之建峯未之信時杜洪求救於朱全忠神福遣部將秦臯乘輕舟至灄口舉火炬於樹抄洪以爲救兵至果焚荻以應之夏四月己夘以朱全忠判元帥府事知温州事丁章爲木工李彦所殺其將張惠據温州王師範求救於淮􅀯乙未楊行密遣其將王茂章以步􅀐七千救之又遣别將將兵數萬攻宿州全忠遣其將康懐英救􅀫州淮􅀯兵遁去楊行密遣使詣馬殷言朱全忠跋扈請殷絶之約爲兄弟湖􅀯大將許徳勲曰全忠雖無道然挾天子以令諸矦明公素奉王室不可輕絶也殷從之杜洪求救於朱全忠全忠遣其將韓勍將萬人屯灄口遣使語荆􅀯節度使成汭武安節度使馬殷武貞節度使雷彦威令出兵救洪汭畏全忠之彊且欲侵江淮之地以自廣發舟師十萬㳂江東下汭作巨艦三年而成制度如府署謂之和州載其餘謂之齊山截海劈浪之類甚衆掌書記李珽諌曰今每艦載甲士千人稻米倍之緩急不可動也吴兵剽輕難與角逐武陵長沙皆吾讎也豈得不爲反顧之慮乎不若遣驍將屯巴陵大軍與之對岸堅壁勿戰不過一月吴兵食盡自遁鄂圍解矣汭不聽珽憕之五丗孫也王建出兵攻秦隴乗李茂貞之弱也遣判官韋莊入貢亦修好於朱全忠全忠遣押牙王殷報聘建與之宴殷言蜀甲兵誠多但乏馬耳建作色曰當道江山險阻􅀐兵無所施然馬亦不乏押牙少留當共閲之乃集諸州馬大閲於星􅀫山官馬八千私馬四千部隊甚整殷歎服建夲􅀐將故得蜀之後於文黎維茂州市胡馬十年之間遂及茲數五月丁未李克用雲州都將王敬暉殺刺史劉再立叛降劉仁恭克用遣李嗣昭李存審將兵討之仁恭遣將以兵五萬救敬暉嗣昭退保樂安敬暉舉衆弃城而去先是振武將契苾讓逐戍將石善友據城叛嗣昭等進攻之讓自燔死復取振武城殺吐谷渾叛者二千餘人克用怒嗣昭存審失王敬暉皆杖之削其官成汭行未至鄂州馬殷遣大將許徳勲將舟師萬餘人雷彦威遣其將歐陽思將舟師三千餘人㑹於荆江口乗虚襲江陵庚戌陷之盡掠其人及貨財而去將士亡其家皆無闘志李神福聞其將至自乗輕舟前覘之謂諸將曰彼戰艦雖多而不相屬易制也當急擊之壬子神福遣其將秦裴楊戎將衆數千逆擊汭於君山大破之因風縱火焚其艦士卒皆潰汭赴水死獲其戰艦二百艘韓勍聞之亦引兵去許徳勲還過岳州刺史鄧進忠開門具牛酒犒軍徳勲諭以禍福進忠遂舉族遷于長沙馬殷以徳勲爲岳州刺史以進忠爲衡州刺史雷彦威狡獪殘忍有父風常泛舟焚掠鄰境荆鄂之閒殆至無人李茂貞畏朱全忠自以官爲尚書令在全忠上累表乞解去詔復以茂貞爲中書令崔胤奏左右龍武羽林神策等軍名存實亡侍衞單寡請每軍募步兵四將每將二百五十人􅀐兵一將百人合六千六百人選其壯健者分畨侍衛從之令六軍諸衞副使京兆尹鄭元規立格召募於市朱全忠表潁州刺史朱友恭爲武寧節度使朱友寧攻博昌月餘不拔朱全忠怒遣客將劉捍往督之捍至友寧驅民丁十餘萬負木石牽牛驢詣城􅀯築土山既至并人畜木石排而築之寃號聲聞數十里俄而城陷盡屠之進拔臨淄抵青州城下遣别將攻登萊淮􅀯將王荗章㑹王師範弟萊州刺史師誨攻密州拔之斬其刺史劉康乂以淮海都遊奕使張訓爲刺史六月乙亥汴兵拔登州師範帥登萊兵拒朱友寧於石樓爲兩柵丙子夜友寧擊登州柵柵中告急師範􅃐茂章出戰茂章桉兵不動友寧破登州柵進攻萊州柵比明茂章度其兵巳疲乃與師範合兵出戰大破之友寧旁自峻阜馳􅀐赴敵馬仆青州將張土梟斬之傳首淮􅀯两鎮兵逐北至米河俘斬萬計魏博之兵殆盡全忠聞友寧死自將兵二十萬晝夜兼行赴之秋七月壬子至臨朐命諸將攻青州王師範出戰汴兵大破之王茂章閉壘示怯伺汴兵稍懈毀柵而出驅馳疾戰戰酣退坐召諸將飲酒巳而復戰全忠登髙望見之問降者知爲茂章歎曰使吾得此人爲將天下不足平也至晡汴兵乃退茂章度衆寡不敵是夕引軍還全忠遣曹州刺史楊師厚追之及於輔唐茂章命先鋒指揮使李䖍􅁉將五百􅀐爲殿䖍􅁉殊死戰師厚擒而殺之師厚潁州人也張訓聞茂章去謂諸將曰汴人將至何以禦之諸將請焚城大掠而歸訓曰不可封府庫植旗幟於城上遣羸弱居前自以精兵殿其後而去全忠遣左踏白指揮使王檀攻密州既至望旗幟數日乃敢入城見府庫城邑皆完遂不復追訓全軍而還全忠以檀爲密州刺史丁夘以山􅀯西道留後王宗賀爲節度使睦州刺史陳詢叛錢鏐舉兵攻蘭溪鏐遣指揮使方永珍擊之武安都指揮使杜建徽與詢連姻鏐疑之建徽不言㑹詢親吏來奔得建徽與詢書皆勸戒之辭鏐乃恱建徽從兄建思譛建徽私蓄兵仗謀作亂鏐使人索之建徽方食使者直入卧内建徽不顧鏐以是益親重之八月戊辰朔朱全忠留齊州刺史楊師厚攻青州身歸大梁庚辰加西川節度使西平王王建守司徒進爵蜀王前渝州刺史王宗本言於王建請出兵取荆􅀯建從之以宗本爲開道都指揮使將兵下峽􅀄寧國節度使田頵破馮弘鐸詣廣陵謝楊行密因求池歙爲巡屬行密不許行密左右下及獄吏皆求賂於頵頵怒曰吏知吾將下獄邪及還指廣陵􅀯門曰吾不可復入此矣頵兵彊財富好攻取行密既定淮􅀯欲保境息民每抑止之頵不從及解釋錢鏐頵尤恨之隂有叛志李神福言於行密曰頵必反宜早圖之行密曰頵有大功反狀未露今殺之諸將人人自危矣頵有良將曰康儒與頵謀議多不合行密知之擢儒爲廬州刺史頵以儒爲貳於己族之儒曰吾死田公亡無日矣頵遂與潤州團練使安仁義同舉兵仁義悉焚東塘戰艦頵遣二使詐爲商人詣壽州約奉國節度使朱延壽行密將尚公迺遇之曰非商人也殺一人得其書以告行密行密召李神福於鄂州神福恐杜洪邀之宣言奉命攻荆􅀯勒兵具舟楫及暮遂㳂江東下始告將士以討田頵己丑安仁義襲常州常州刺史李遇逆戰極口罵仁義仁義曰彼敢辱我必有備乃引去壬辰行密以王茂章爲潤州行營招討使擊仁義不克使徐温將兵㑹之温易其衣服旗幟皆如茂章兵仁義不知益兵復出戰温奮擊破之行密夫人朱延壽之姊也行密狎侮延壽延壽怨怒隂與田頵通謀頵遣前進士杜荀鶴至壽州與延壽相結又遣至大梁告朱全忠全忠大喜遣兵屯􅀫州以應之荀鶴池州人也楊師厚屯臨朐聲言將之密州留輜重於臨朐九月癸卯王師範出兵攻臨朐師厚伏兵奮擊大破之殺萬餘人獲師範弟師克明日萊州兵五千救青州師厚邀擊之殺獲殆盡遂徙寨抵其城下朱延壽謀頗泄楊行密詐爲目疾對延壽使者多錯亂所見或觸柱仆地謂夫人曰吾不幸失明諸子皆㓜軍府事當悉以授三舅夫人屢以書報延壽行密又自遣召之隂令徐温爲之備延壽至廣陵行密迎及寢門執而殺之部兵驚擾徐温諭之皆聴命遂斬延壽兄弟黜朱夫人􅀄延壽赴召其妻王氏謂曰君此行吉凶未可知願日發一使以安我一日使不至王氏曰事可知矣部分僮僕授兵闔門捕􅀐至乃集家人聚寳貨發百燎焚府舍曰妾誓不以皎然之軀爲讎人所辱赴火而死延壽用法嚴好以寡擊衆甞遣二百人與汴兵戰有一人應留者請行延壽以違命立斬之田頵襲昇州得李神福妻子善遇之神福自鄂州東下頵遣使謂之曰公見機與公分地而王不然妻子無遺神福曰吾以卒伍事吴王今爲上將義不以妻子易其志頵有老母不顧而反三綱且不知烏足與言乎斬使者而進士卒皆感勵頵遣其將王檀汪建將水軍逆戰丁未神福至吉陽磯與擅建遇擅建執其子承鼎示之神福命左右射之神福謂諸將曰彼衆我寡當以竒取勝及暮合戰神福陽敗引舟泝流而上擅建追之神福復還順流擊之壇建樓船大列火炬神福令軍中曰望火炬輒擊之壇建軍皆滅火旗幟交雜神福因風縱火焚其艦壇建大敗士卒焚溺死者甚衆戊申又戰于皖口壇建僅以身免獲徐綰行密以檻車載之遺錢鏐鏐剖其心以祭周渭頵聞壇建敗自將水軍逆戰神福曰賊弃城而來此天亡也臨江堅壁不戰遣使告行密請發步兵斷其歸路行密遣漣水制置使臺濛將兵應之王茂章攻潤州乆未下行密命茂章引兵㑹濛擊頵辛亥汴將劉重霸拔棣州執刺史邵播殺之甲寅朱全忠如洛陽遇疾復還大梁戊午王師範遣副使李嗣業及弟師恱請降於楊師厚曰師範非敢背徳韓全誨李茂貞以朱書御札使之舉兵師範不敢違仍請以其弟師魯爲質時朱全忠聞李茂貞楊崇本將起兵逼京畿恐其復劫天子西去欲迎車駕都洛陽乃受師範降選諸將使守登萊淄棣等州即以師範權淄青留後師範仍言先遣行軍司馬劉鄩將兵五千據兖州非其自專願釋其罪亦遣使語鄩田頵聞臺濛將至自將步􅀐逆戰留其將郭行悰以精兵二萬及王壇汪建水軍屯蕪湖以拒李神福覘者言濛營寨􅄶小纔容二千人頵易之不召外兵濛入頵境畨陳而進軍中笑其怯濛曰頵􅀫將多謀不可不備冬十月戊辰與頵遇於廣徳濛先以楊行密書徧賜頵將皆下馬拜受濛因其挫伏縱兵擊之頵兵遂敗又戰于黄池兵交濛僞走頵追之遇伏大敗奔還宣州城守濛引兵圍之頵亟召蕪湖兵還不得入郭行悰王壇汪建及當塗廣徳諸戍皆帥其衆降行密以臺濛巳破田頵命王茂章復引兵攻潤州􅀄䕫州刺史矦矩從成汭救鄂州汭死矩奔還㑹王宗本兵至甲戌矩以州降之宗本遂定䕫忠萬施四州王建復以矩爲䕫州刺史更其姓名曰王宗矩宗矩易州人也蜀之議者以瞿唐蜀之險要乃弃歸峽屯軍䕫州建以宗本爲武㤗留後武㤗軍舊治黔州宗本以其地多瘴癘請徙治涪州建許之葛從周急攻兖州劉鄩使從周母乗板輿登城謂從周曰劉將軍事我不異於汝新婦輩皆安居人各爲其主汝可察之從周㱆欷而退攻城爲之緩鄩悉簡婦人及民之老疾不足當敵者出之獨與少壯者同辛苦分衣食堅守以扞敵號令整肅兵不爲暴民皆安堵乆之外援既絶節度副使王彦温踰城出降城上卒多從之不可遏鄩遣人從容語彦温曰軍士非素遣者勿多與之俱又遣人徇於城上曰軍士非素遣從副使而敢擅往者族之士卒皆惶惑不敢出敵人果疑彦温斬之城下由是衆心益固及王師範力屈從周以禍福諭之鄩曰受王公命守此城一旦見王公失勢不俟其命而降非所以事上也及師範使者至丁丑始出降從周爲具齎裝送鄩詣大梁鄩曰降將未受梁王寛釋之命安敢乘馬衣裘乎乃素服乘驢至大梁全忠賜之冠帶辭請囚服入見不許全忠慰勞飲之酒辭以量小全忠曰取兖州量何大邪以爲元從都押牙是時四鎮將吏皆功臣舊人鄩一旦以降將居其上諸將具軍禮拜於庭鄩坐受自如全忠益竒之未幾表爲保大留後葛從周乆病全忠以康懐英爲泰寧節度使代之辛巳􅀫衛都指揮使朱友倫與客擊毬於左軍墜馬而卒全忠悲怒疑崔㣧故爲之凡與同戲者十餘人盡殺之遣其兄子友諒代典􅀫衞山􅀯東道節度使趙匡凝遣兵襲荆􅀯朗人弃城走匡凝表其弟匡明爲荆􅀯留後時天子微弱諸道財賦多不上供惟匡凝兄弟委輸不絶楊行密求兵於錢鏐鏐遣方永珍屯潤州從弟鎰屯宣州又遣指揮使楊習攻睦州鳯翔邠州屢出兵近京畿朱全忠疑其復有劫遷之謀十一月發􅀐兵屯河中􅊨十一月乙亥田頵帥死士數百出戰臺濛陽退以示弱頵兵踰濠而􅃲濛急擊之頵不勝還走城橋陷墜馬斬之其衆猶戰以頵首示之乃潰濛遂克宣州􅀄行密與頵同閭里少相善約爲兄弟及頵首至廣陵行密視之泣下赦其母殷氏行密與諸子皆以子孫禮事之行密以李神福爲寧國節度使神福以杜洪未平固讓不拜宣州長史合肥駱知祥善治金榖􅀚察牙推沈文昌爲文精敏甞爲頵草檄罵行密行密以知祥爲淮􅀯支計官文昌爲節度牙推文昌湖州人也􅀄頵每戰不勝輒欲殺錢傳瓘其母及宣州都虞候郭師從常保護之師從合肥人頵之婦弟也頵敗傳瓘歸杭州錢鏐以師從爲鎮東都虞候辛巳以禮部尚書獨孤損爲兵部侍郎同平章事損及之從曽孫也中書侍郎兼户部尚書同平章事裴䞇罷爲左僕射左僕射致仕張濬居長水王師範之舉兵濬豫其謀朱全忠將謀􅆲奪恐濬扇動藩鎮諷張全義使圖之丙申全義遣牙將楊麟將兵詐爲劫盜圍其墅而殺之永寧縣吏葉彦素爲濬所厚知麟將至密告濬子格曰相公禍不可免郎君宜自爲謀濬謂格曰汝留則俱死去則遺種格哭拜而去葉彦帥義士三十人送之渡漢而還格遂自荆􅀯入蜀盧龍節度使劉仁恭習知契丹情僞常選將練兵乗秋深入踰摘星嶺擊之契丹畏之每霜降仁恭輒遣人焚塞下野草契丹馬多飢死常以良馬賂仁恭買牧地契丹王邪律阿保機遣其妻兄述律阿鉢將萬􅀐寇渝􅀜仁恭遣其子守光戍平州守光僞與之和設幄犒饗於城外酒酣伏兵執之以入虜衆大哭契丹以重賂請於仁恭然後歸之􅀄崔㣧假朱全忠兵力以誅宦官全忠既破李茂貞併吞􅀜中威震天下遂有􅆲奪之志胤懼與全忠外雖親厚私心漸異乃謂全忠曰長安密邇茂貞不可不爲守禦之備六軍十二衞但有空名請召募以實之使公無西顧之憂全忠知其意曲從之隂使麾下壯士應募以察其變㣧不之知與鄭元規等繕治兵仗日夜不息及朱友倫死全忠益疑㣧且欲遷天子都洛恐㣧立異天祐元年春正月全忠密表司徒兼侍中判六軍十二衞事充鹽鐵轉運使判度支崔㣧專權亂國離閒君臣并其黨刑部尚書兼京兆尹六軍諸衞副使鄭元規威逺軍使陳班等皆請誅之乙巳詔責授㣧太子少傅分司貶元規循州司户班湊州司户丙午下詔罪狀㣧等以裴樞判左三軍事充鹽鐵轉運使獨孤損判右三軍事兼判度支胤所募兵並縱遣之以兵部尚書崔逺爲中書侍郎翰林學士左拾遺柳璨爲右諌議大夫並同平章事璨公綽之從孫也戊申朱全忠密令􅀫衞都指揮使朱友諒以兵圍崔㣧第殺㣧及鄭元規陳班并㣧所親厚者數人􅀄上在華州朱全忠屢表請上遷都洛陽上雖不許全忠常令東都留守佑國節度使張全義繕修宫室全忠之克邠州也質靜難軍節度使楊崇本妻子於河中崇本妻美全忠私焉既而歸之崇本怒使謂李茂貞曰唐室將滅父何忍坐視之乎遂相與連兵侵逼京畿復姓名爲李繼徽己酉全忠引兵屯河中丁巳上御延喜樓朱全忠遣牙將寇彦卿奉表稱邠岐兵逼畿甸請上遷都洛陽及下樓裴樞巳得全忠移書促百官東行戊午驅徙士民號哭滿路罵曰賊臣崔㣧召朱温來傾覆社稷使我曹流離至此老㓜繦屬月餘不絶壬戌車駕發長安全忠以其將張廷範爲御營使毁長安宫室百司及民閒廬舎取其材浮渭㳂河而下長安自是遂丘墟矣全忠發河􅀯北諸鎮丁匠數萬令張全義治東都宫室江浙湖嶺諸鎮附全忠者皆輸貨財以助之甲子車駕至華州民夾道呼萬歲上泣謂曰勿呼萬歲朕不復爲汝主矣館於興徳宫謂侍臣曰鄙語云紇干山頭凍殺雀何不飛去生處樂朕今漂泊不知竟落何所因泣下沾襟左右莫能仰視二月乙亥車駕至陜以東都宫室未成駐留於陜丙子全忠自河中來朝上延全忠入寢室見何后后泣曰自今大家夫婦委身全忠矣甲申立皇子禎爲端王祁爲豐王福爲和王禧爲登王祐爲嘉王上遣間使以御札告難于王建建以邛州刺史王宗祐爲北路行營指揮使將兵㑹鳯翔兵迎車駕至興平遇汴兵不得進而還建始自用墨制除官云俟車駕還長安表聞三月丁未以朱全忠兼判左右神䇿及六軍諸衛事癸丑全忠置酒私第邀上臨幸乙卯全忠辭上先赴洛陽督修宫室上與之宴羣臣既罷上獨留全忠及忠武節度使韓建飲皇后出自捧玉巵以飲全忠晉國夫人可證附上耳語建躡全忠足全忠以爲圖已不飲陽醉而出全忠奏以長安爲佑國軍以韓建爲佑國節度使以鄭州刺史劉知俊爲匡國節度使丁巳上復遣閒使以絹詔告急於王建楊行密李克用等令糾帥藩鎮以圖匡復曰朕至洛陽則爲所幽閉詔敕皆出其手朕意不復得通矣楊行密遣錢傳璙及其婦并顧全武歸錢塘以淮􅀯行軍司馬李神福爲鄂岳招討使復將兵擊杜洪朱全忠遣使詣行密請捨鄂岳復修舊好行密報曰俟天子還長安然後罷兵修好夏四月辛巳朱全忠奏洛陽宫室巳成請車駕早發表章相繼上屢遣宫人諭以皇后新産未任就路請俟十月東行全忠疑上徘徊俟變怒甚謂牙將宼彦卿曰汝速至陜即日促官家發來閏月丁酉車駕發陜壬寅全忠逆於新安上之在陜也司天監奏星氣有變期在今秋不利東行故上欲以十月幸洛至是全忠令醫官許昭逺告醫官使閻祐之司天監王墀内都知韋周晉國夫人可證等謀害元帥悉収殺之癸卯上憩於榖水自崔㣧之死六軍散亡俱盡所餘擊毬供奉内園小兒共二百餘人從上而東全忠猶忌之爲設食於幄盡縊殺之豫選二百餘人大小相類者衣其衣服代之侍衞上􅀄不覺累日乃寤自是上之左右職掌使令皆全忠之人矣甲辰車駕發榖水入宫御正殿受朝賀乙巳御光政門赦天下攺元更命陜州曰興唐府詔討李茂貞楊崇本戊申敕内諸司惟留宣徽等九使外餘皆停廢仍不以内夫人充使以蔣玄暉爲宣徽􅀯院使兼樞密使王殷爲宣徽北院使兼皇城使張廷範爲金吾將軍充街使以韋震爲河􅀯尹兼六軍諸衞副使又徴武寧留後朱友恭爲左龍武統軍保大節度使氏叔琮爲右龍武統軍典􅀫衞皆全忠之腹心也癸丑以張全義爲天平節度使乙卯以全忠爲護國宣武宣義忠武四鎮節度使鎮海鎮東節度使越王錢鏐求封吳越王朝廷不許朱全忠爲之言於執政乃更封吴王更命魏博曰天雄軍癸亥進天雄節度使長沙郡王羅紹威爵鄴王資治通鑑卷第二百六十四
