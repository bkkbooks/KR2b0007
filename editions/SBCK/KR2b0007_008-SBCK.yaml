front:
  text: 已破矣秦兵旦暮至我圍滎陽城弗能下秦兵至必大敗不如少遺兵守滎陽悉精兵迎秦軍今假王驕不知兵權不足與計事恐敗因相與矯王令以誅呉叔獻其首於陳王陳王使使賜田臧楚令尹印使為上將田臧乃使諸將李歸等守滎陽自以精兵西迎秦軍於敖倉與戰田臧死軍破章邯進兵擊李歸等滎陽下破之李歸等死陽城人鄧説將兵居郯章邯别將擊破之銍人伍逢將兵居許章邯擊破之兩軍皆散走陳陳王誅鄧説二世數誚讓李斯居三公位如何令盗如此李斯恐懼重爵禄不知所出乃阿二世意以書對曰夫賢主者必能行督責之術者也故申子曰有天下而不恣睢命之曰以天下為桎梏者無佗焉不能督責而顧以其身勞於天下之民若堯禹然故謂之桎梏也夫不能修申韓之明術行督責之道専以天下自適也而徒務苦形勞神以身徇百姓則是黔首之役非畜天下者也何足貴哉故明主能行督責之術以獨断於上則權不在臣下然後能滅仁義之塗絶諌説之辯犖然行恣睢之心而莫之敢逆如此羣臣百姓救過不給何變之敢圖二世説於是行督責益嚴税民深者為明吏殺人衆者為忠臣刑者相半於道而死人日成積於市秦民益駭懼思亂趙李良已定常山還報趙王趙王復使良畧太原至石邑秦兵塞井陘未能前秦將詐為二世書以招良良得書未信還之邯鄲益請兵未至道逢趙王姊出飲從百餘騎良望見以為王伏謁道旁王姊醉不知其將使騎謝李良李良素貴起慙其從官從官有一人曰天下畔秦能者先立且趙王素出將軍下今女兒乃不為將軍下車請追殺之李良已得秦書固欲反趙未決因此怒遣人追殺王姊因將其兵襲邯鄲邯鄲不知竟殺趙王邵騷趙人多為張耳陳餘耳目者以故二人獨得脱陳人秦嘉符離人朱雞石等起兵圍東海守於郯陳王聞之使武平君畔為將軍監郯下軍秦嘉不受命自立為大司馬惡屬武平君告軍吏曰武平君年少不知兵事勿聽因矯以王命殺武平君畔
