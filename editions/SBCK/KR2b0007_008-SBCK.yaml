body:
  text: 二世益遣長史司馬欣董翳佐章邯擊盜章邯已破伍逢擊陳柱國房君殺之又進擊陳西張賀軍陳王出監戰張賀死臘月陳王之汝隂還至下城父其御莊賈殺陳王以降初陳涉旣為王其故人皆往依之妻之父亦往焉陳王以衆賔待之長揖不拜妻之父怒曰怙亂僣號而傲長者不能久矣不辭而去陳王跪謝遂不為顧客出入愈益發舒言陳王故情或説陳王曰客愚無知顓妄言輕威陳王斬之諸故人皆自引去由是無親陳王者陳王以朱防為中正胡武為司過主司羣臣諸將徇地至令之不是者輒繫而罪之以苛察為忠其所不善者弗下吏輒自治之諸將以其故不親附此其所以敗也陳王故㳙人將軍吕臣為蒼頭軍起新陽攻陳下之殺莊賈復以陳為楚葬陳王於碭諡曰隠王初陳王令銍人宋留將兵定南陽入武關留已徇南陽聞陳王死南陽復為秦宋留以軍降二世車裂留以徇魏周市將兵畧地豐沛使人招雍齒雍齒雅不欲屬沛公即以豐降魏沛公攻之不克趙張耳陳餘收其散兵得數萬人擊李良良敗走歸章邯客有説耳餘曰兩君羇旅而欲附趙難可獨立立趙後輔以誼可就功乃求得趙歇春正月耳餘立歇為趙王居信都東陽寗君秦嘉聞陳王軍敗迺立景駒為楚王引兵之方與欲擊秦軍定陶下使公孫慶使齊欲與之并力俱進齊王曰陳王戰敗不知其死生楚安得不請而立王公孫慶曰齊不請楚而立王楚何故請齊而立王且楚首事當令於天下田儋殺公孫慶秦左右校復攻陳下之吕將軍走徼兵復聚與番盜黥布相遇攻擊秦左右校破之青波復以陳為楚黥布者六人也姓英氏坐法黥以刑徒論輸驪山驪山之徒數十萬人布皆與其徒長豪傑交通廼率其曹耦亡之江中為群盜番陽令呉芮甚得江湖間心號曰番君布徃見之其衆已數千人番君乃以女妻之使將其兵擊秦楚王景駒在留沛公徃從之張良亦聚少年百餘人欲往從景駒道遇沛公遂屬焉沛公拜良為廏將良數以太公兵法説沛公沛公善之常用其䇿良為佗人言皆不省良曰沛公殆天授故遂從不去沛公與良俱見景駒欲請兵以攻豐時章邯司馬􅊂將兵北定楚地屠相至碭東陽寗君沛公引兵西戰蕭西不利還收兵聚留二月攻碭三日拔之收碭兵得六千人與故合九千人三月攻下邑拔之還擊豐不下廣陵人召平為陳王徇廣陵未下聞陳王敗走章邯且至廼渡江矯陳王令拜項梁為楚上柱國曰江東已定急引兵西擊秦梁乃以八千人渡江而西聞陳嬰已下東陽使使欲與連和俱西陳嬰者故東陽令史居縣中素信謹稱為長者東陽少年殺其令相聚得二萬人欲立嬰為王嬰母謂嬰曰自我為汝家婦未嘗聞汝先世之有貴者今􅁀得大名不祥不如有所屬事成猶得封侯事敗易以亡非世所指名也嬰乃不敢為王謂其軍吏曰項氏世世將家有名於楚今欲舉大事將非其人不可我倚名族亡秦必矣其衆從之乃以其兵屬梁英布旣破秦軍引兵而東聞項梁西度淮布與蒲將軍皆以其兵屬焉項梁衆凡六七萬人軍下邳景駒秦嘉軍彭城東欲以距梁梁謂軍吏曰陳王先首事戰不利未聞所在今秦嘉倍陳王而立景駒逆無道乃進兵擊秦嘉秦嘉軍敗走追之至胡陵嘉還戰一日嘉死軍降景駒走死梁地梁已并秦嘉軍軍胡陵將引軍而西章邯軍至栗項梁使别將朱雞石餘樊君與戰餘樊君死朱雞石軍敗亡走胡陵梁乃引兵入薛誅朱雞石沛公從騎百餘往見梁梁與沛公卒五千人五大夫將十人沛公還引兵攻豐拔之雍齒犇魏項梁使項羽别攻襄城襄城堅守不下已拔皆阬之還報梁聞陳王定死召諸别將會薛計事沛公亦往焉居鄛人范増年七十素居家好竒計往説項梁曰陳勝敗固當夫秦滅六國楚最無罪自懷王入秦不反楚人憐之至今故楚南公曰楚雖三户亡秦必楚今陳勝首事不立楚後而自立其勢不長今君起江東楚蠭起之將皆争附君者以君世世楚將為能復立楚之後也於是項梁然其言乃求得楚懷王孫心於民間為人牧羊夏六月立以為楚懷王從民望也陳嬰為上柱國封五縣與懷王都盱眙項梁自號為武信君張良説項梁曰君已立楚後而韓諸公子横陽君成最賢可立為王益樹黨項梁使良求韓成立以為韓王以良為司徒與韓王將千餘人西略韓地得數城秦輒復取之往來為游兵潁川章邯已破陳王乃進兵擊魏王於臨濟魏王使周市出請救於齊楚齊王儋及楚將項它皆將兵隨市救魏章邯夜衘枚擊大破齊楚軍於臨濟下殺齊王及周市魏王咎為其民約降約定自燒殺其弟豹亡走楚楚懷王予魏豹數千人復徇魏地齊田榮收其兄儋餘兵東走東阿章邯追圍之齊人聞齊王儋死乃立故齊王建之弟假為王田角為相角弟間為將以距諸侯秋七月大霖雨武信君引兵攻亢父聞田榮之急廼引兵擊破章邯軍東阿下章邯走而西田榮引兵東歸齊武信君獨追北使項羽沛公别攻城陽屠之楚軍軍濮陽東復與章邯戰又破之章邯復振守濮陽環水沛公項羽去攻定陶八月田榮擊逐齊王假假亡走楚田角亡走趙田間前救趙因留不敢歸田榮乃立儋子市為齊王榮相之田横為將平齊地章邯兵益盛項梁數使使告齊趙發兵共擊章邯田榮曰楚殺田假趙殺角間乃出兵楚趙不許田榮怒終不肯出兵郎中令趙髙恃恩専恣以私怨誅殺人衆多恐大臣入朝奏事言之乃説二世曰天子所以貴者但以聞聲羣臣莫得見其面故也且陛下富於春秋未必盡通諸事今坐朝廷譴舉有不當者則見短於大臣非所以示神明於天下也陛下不如深拱禁中與臣及侍中習法者待事事來有以揆之如此則大臣不敢奏疑事天下稱聖主矣二世用其計乃不坐朝廷見大臣常居禁中趙髙侍中用事事皆決於趙髙髙聞李斯以為言乃見丞相曰關東羣盜多今上急益發繇治阿房宫聚狗馬無用之物臣欲諫為位賤此真君侯之事君何不諫李斯曰固也吾欲言之久矣今時上不坐朝廷常居深宫吾所言者不可傳也欲見無閒趙髙曰君誠能諫請為君候上間語君於是趙髙侍二世方燕樂婦女居前使人告丞相上方閒可奏事丞相至宫門上謁如此者三二世怒曰吾常多閒日丞相不來吾方燕私丞相輒來請事丞相豈少我哉且固我哉趙髙因曰夫沙丘之謀丞相與焉今陛下已立為帝而丞相貴不益此其意亦望裂地而王矣且陛下不問臣臣不敢言丞相長男李由為三川守楚盗陳勝等皆丞相傍縣之子以故楚盜公行過三川城守不肯擊髙聞其文書相往來未得其審故未敢以聞丞相居外權重於陛下二世以為然欲案丞相恐其不審乃先使人按驗三川守與盜通狀李斯聞之因上書言趙髙之短曰髙擅利擅害與陛下無異昔田常相齊簡公竊其恩威下得百姓上得羣臣卒弑簡公而取齊國此天下所明知也今髙有邪佚之志危反之行私家之冨若田氏之於齊矣而又貪欲無厭求利不止列勢次主其欲無窮劫陛下之威信其志若韓玘為韓安相也陛下不圖臣恐其必為變也二世曰何哉夫髙故宦人也然不為安肆志不以危易心潔行脩善自使至此以忠得進以信守位朕實賢之而君疑之何也且朕非屬趙君當誰任哉且趙君為人精廉彊力下知人情上能適朕君其勿疑二世雅愛信髙恐李斯殺之乃私告趙髙髙曰丞相所患者獨髙髙已死丞相即欲為田常所為是時盜賊益多而闗中卒發東擊盜者無已右丞相馮去疾左丞相李斯將軍馮劫進諫曰闗東羣盜並起秦發兵追擊所殺亡甚衆然猶不止盜多皆以戍漕轉作事苦稅賦大也請且止阿房宫作者減省四邊戍轉二世曰凢所爲貴有天下者得肆意極欲主重明法下不敢爲非以制御海内矣夫虞夏之主貴爲天子親處窮苦之實以徇百姓尚何於法且先帝起諸侯兼天下天下已定外攘四夷以安邊境作宫室以章得意而君觀先帝功業有緒今朕即位二年之間羣盜並起君不能禁又欲罷先帝之所爲是上無以報先帝次不爲朕盡忠力何以在位下去疾斯劫吏案責佗罪去疾劫自殺獨李斯就獄二世以屬趙髙治之責斯與子由謀反狀皆收捕宗族賔客趙髙治斯榜掠千餘不勝痛自誣服斯所以不死者自負其辯有功實無反心欲上書自陳幸二世寤而赦之乃從獄中上書曰臣為丞相治民三十餘年矣逮秦地之陿隘不過千里兵數十萬臣盡薄材隂行謀臣資之金玉使游説諸侯隂脩甲兵飭政教官鬬士尊功臣故終以脅韓弱魏破燕趙夷齊楚卒兼六國虜其王立秦為天子又北逐胡貉南定北越以見秦之彊更剋畫平斗斛度量文章布之天下以樹秦之名此皆臣之罪也臣當死久矣上幸盡其能力乃得至今願陛下察之書上趙髙使吏棄去不奏曰囚安得上書趙髙使其客十餘輩詐為御史謁者侍中更徃覆訊斯斯更以其實對輒使人復榜之後二世使人驗斯斯以為如前終不敢更言辭服奏當上二世喜曰微趙君幾為丞相所賣及二世所使案三川守由者至則楚兵已擊殺之使者來會丞相下吏髙皆妄為反辭以相傅會遂具斯五刑論腰斬咸陽市斯出獄與其中子俱執顧謂其中子曰吾欲與若復牽黄犬俱出上蔡東門逐狡兎豈可得乎遂父子相哭而夷三族二世乃以趙髙為丞相事無大小皆决焉項梁已破章邯於東阿引兵西北至定陶再破秦軍項羽沛公又與秦軍戰於雍丘大破之斬李由項梁益輕秦有驕色宋義諫曰戰勝而將驕卒惰者敗今卒少惰矣秦兵日益臣為君畏之項梁弗聽乃使宋義使於齊道遇齊使者髙陵君顯曰公將見武信君乎曰然曰臣論武信君軍必敗公徐行即免死疾行則及禍二世悉起兵益章邯擊楚軍大破之定陶項梁死時連雨自七月至九月項羽沛公攻外黄未下去攻陳留聞武信君死士卒恐乃與將軍吕臣引兵而東徙懷王自盱眙都彭城吕臣軍彭城東項羽軍彭城西沛公軍碭魏豹下魏二十餘城楚懷王立豹為魏王後九月楚懷王并吕臣項羽軍自將之以沛公為碭郡長封武安侯將碭郡兵封項羽為長安侯號為魯公吕臣為司徒其父吕青為令尹章邯已破項梁以為楚地兵不足憂乃度河北擊趙大破之引兵至邯鄲皆徙其民河内夷其城郭張耳與趙王歇走入鉅鹿城王離圍之陳餘北收常山兵得數萬人軍鉅鹿北章邯軍鉅鹿南棘原趙數請救於楚髙陵君顯在楚見楚王曰宋義論武信君之軍必敗居數日軍果敗兵未戰而先見敗徵此可謂知兵矣王召宋義與計事而大説之因置以爲上將軍項羽爲次將范増爲末將以救趙諸别將皆屬宋義號爲卿子冠軍初楚懷王與諸將約先入定闗中者王之當是時秦兵彊常乗勝逐北諸將莫利先入闗獨項羽怨秦之殺項梁奮􅀔願與沛公西入闗懷王諸老將皆曰項羽爲人慓悍猾賊嘗攻襄城襄城無遺類皆阬之諸所過無不殘㓕且楚數進取前陳王項梁皆敗不如更遣長者扶義而西告諭秦父兄秦父兄苦其主久矣今誠得長者徃無侵􅁀宜可下項羽不可遣獨沛公素寛大長者可遣懷王乃不許項羽而遣沛公西畧地收陳王項梁散卒以伐秦沛公道碭至陽城與杠里攻秦壁破其二軍三年冬十月齊將田都畔田榮助楚救趙沛公攻破東郡尉於成武宋義行至安陽留四十六日不進項羽曰秦圍趙急宜疾引兵渡河楚擊其外趙應其内破秦軍必矣宋義曰不然夫搏牛之蝱不可以破蟣蝨今秦攻趙戰勝則兵罷我承其敝不勝則我引兵鼓行而西必舉秦矣故不如先鬬秦趙夫被堅執鋭義不如公坐運籌䇿公不如義因下令軍中曰有猛如虎狼如羊貪如狼彊不可使者皆斬之乃遣其子宋襄相齊身送之至無鹽飲酒髙會天寒大雨士卒凍飢項羽曰將勠力而攻秦久留不行今歲饑民貧士卒食半菽軍無見糧乃飲酒髙會不引兵渡河因趙食與趙并力攻秦乃曰承其敝夫以秦之彊攻新造之趙其勢必舉趙舉秦彊何敝之承且國兵新破王坐不安席埽境内而専屬於將軍國家安危在此一舉今不恤士卒而徇其私非社稷之臣也十一月項羽晨朝上將軍宋義即其帳中斬宋義頭出令軍中曰宋義與齊謀反楚楚王隂令籍誅之當是時諸將皆慴服莫敢枝梧皆曰首立楚者將軍家也今將軍誅亂乃相與共立羽為假上將軍使人追宋義子及之齊殺之使桓楚報命於懷王懷王因使羽為上將軍十二月沛公引兵至栗遇剛武侯奪其軍四千餘人并之與魏將皇欣武滿軍合攻秦軍破之故齊王建孫安下濟北從項羽救趙章邯築甬道屬河餉王離王離兵食多急攻鉅鹿鉅鹿城中食盡兵少張耳數使人召前陳餘陳餘度兵少不敵秦不敢前數月張耳大怒怨陳餘使張黶陳澤徃讓陳餘曰始吾與公為刎頸交今王與耳旦暮且死而公擁兵數萬不肯相救安在其相為死茍必信胡不赴秦軍俱死且有十一二相全陳餘曰吾度前終不能救趙徒盡亡軍且餘所以不俱死欲為趙王張君報秦今必俱死如以肉委餓虎何益張黶陳澤要以俱死乃使黶澤將五千人先嘗秦軍至皆沒當是時齊師燕師皆來救趙張敖亦北收代兵得萬餘人來皆壁餘旁未敢擊秦項羽已殺卿子冠軍威震楚國乃遣當陽君蒲將軍將卒二萬渡河救鉅鹿戰少利絶章邯甬道王離軍乏食陳餘復請兵項羽乃悉引兵渡河皆沈船破釡甑燒廬舍持三日糧以示士卒必死無一還心於是至則圍王離與秦軍遇九戰大破之章邯引兵却諸侯兵乃敢進擊秦軍遂殺蘇角虜王離渉間不降自燒殺當是時楚軍冠諸侯軍救鉅鹿者十餘壁莫敢縱兵及楚擊秦諸侯將皆從壁上觀楚戰士無不一當十呼聲動天地諸侯軍無不人人惴恐於是已破秦軍項羽召見諸侯將諸侯將入轅門無不膝行而前莫敢仰視項羽由是始為諸侯上將軍諸侯皆屬焉於是趙王歇張耳乃得出鉅鹿城謝諸侯張耳與陳餘相見責讓陳餘以不肯救趙及問張黶陳澤所在疑陳餘殺之數以問餘餘怒曰不意君之望臣深也豈以臣為重去將印哉乃脱解印綬推予張耳張耳亦愕不受陳餘起如厠客有説張耳曰臣聞天與不取反受其咎今陳將軍與君印君不受反天不祥急取之張耳乃佩其印收其麾下而陳餘還亦望張耳不讓遂趨出獨與麾下所善數百人之河上澤中漁獵趙王歇還信都春二月沛公北擊昌邑遇彭越越以其兵從沛公越昌邑人常漁鉅野澤中為羣盜陳勝項梁之起澤間少年相聚百餘人徃從彭越曰請仲為長越謝曰臣不願也諸少年彊請乃許與期旦日日出會後期者斬旦日日出十餘人後後者至日中於是越謝曰臣老諸君彊以為長今期而多後不可盡誅誅最後者一人令校長斬之皆笑曰何至是請後不敢於是越引一人斬之設壇祭令徒屬徒屬皆大驚莫敢仰視乃略地收諸侯散卒得千餘人遂助沛公攻昌邑昌邑未下沛公引兵西過髙陽髙陽人酈食其家貧落魄為里監門沛公麾下騎士適食其里中人食其見謂曰諸侯將過髙陽者數十人吾問其將皆握齪好苛禮自用不能聽大度之言吾聞沛公慢而易人多大畧此眞吾所願從游莫為我先若見沛公謂曰臣里中有酈生年六十餘長八尺人皆謂之狂生生自謂我非狂生騎士曰沛公不好儒諸客冠儒冠來者沛公輒觧其冠溲溺其中與人言常大罵未可以儒生説也酈生曰第言之騎士從容言如酈生所誡者沛公至髙陽傳舍使人召酈生酈生至入謁沛公方倨牀使兩女子洗足而見酈生酈生入則長揖不拜曰足下欲助秦攻諸矦乎且欲率諸矦破秦也沛公罵曰豎儒天下同苦秦久矣故諸矦相率而攻秦何謂助秦攻諸矦乎酈生曰必聚徒合義兵誅無道秦不宜倨見長者於是沛公輟洗起攝衣延酈生上坐謝之酈生因言六國從横時沛公喜賜酈生食問曰計將安出酈生曰足下起糾合之衆收散亂之兵不滿萬人欲以徑入彊秦此所謂探虎口者也夫陳留天下之衝四通五達之郊也今其城中又多積粟臣善其令請得使之令下足下即不聽足下舉兵攻之臣爲内應於是遣酈生行沛公引兵隨之遂下陳留號酈食其爲廣野君酈生言其弟商時商聚少年得四千人來屬沛公沛公以爲將將陳留兵以從酈生常爲説客使諸侯三月沛公攻開封未拔西與秦將楊熊會戰白馬又戰曲遇東大破之楊熊走之滎陽二世使使者斬之以徇夏四月沛公南攻頴川屠之因張良遂略韓地時趙别將司馬卬方欲度河入闗沛公乃北攻平隂絶河津南戰洛陽東軍不利南出轘轅張良引兵從沛公沛公令韓王成留守陽翟與良俱南六月與南陽守齮戰犨東破之略南陽郡南陽守走保城守宛沛公引兵過宛西張良諫曰沛公雖欲急入闗秦兵尚衆距險今不下宛宛從後擊彊秦在前此危道也於是沛公乃夜引軍從他道還偃旗幟遲明圍宛城三匝南陽守欲自剄其舍人陳恢曰死未晚也乃踰城見沛公曰臣聞足下約先入咸陽者王之今足下留守宛宛郡縣連城數十其吏民自以為降必死故皆堅守乗城今足下盡日止攻士死傷者必多引兵去宛宛必隨足下後足下前則失咸陽之約後有彊宛之患為足下計莫若約降封其守因使止守引其甲卒與之西諸城未下者聞聲争開門而待足下足下通行無所累沛公曰善秋七月南陽守齮降封為殷侯封陳恢千户引兵西無不下者至丹水髙武侯鰓襄侯王陵降還攻胡陽遇番君别將梅鋗與偕攻析酈皆降所過亡得鹵掠秦民皆喜王離軍既沒章邯軍棘原項羽軍漳南相持未戰秦軍數却二世使人讓章邯章邯恐使長史欣請事至咸陽留司馬門三日趙髙不見有不信之心長史欣恐還走其軍不敢出故道趙髙果使人追之不及欣至軍報曰趙髙用事於中下無可為者今戰能勝髙必疾妬吾功不能勝不免於死願將軍孰計之陳餘亦遺章邯書曰白起為秦將南征鄢郢北阬馬服攻城略地不可勝計而竟賜死蒙恬為秦將北逐戎人開榆中地數千里竟斬陽周何者功多秦不能盡封因以法誅之今將軍為秦將三歲矣所亡失以十萬數而諸侯並起滋益多彼趙髙素䛕日久今事急亦恐二世誅之故欲以法誅將軍以塞責使人更代將軍以脱其禍夫將軍居外久多内郤有功亦誅無功亦誅且天之亡秦無愚智皆知之今將軍内不能直諫外為亡國將孤特獨立而欲常存豈不哀哉將軍何不還兵與諸侯為從約共攻秦分王其地南面稱孤此孰與身伏鈇質妻子為戮乎章邯狐疑隂使侯始成使項羽欲約約未成項羽使蒲將軍日夜引兵度三户軍漳南與秦軍戰再破之項羽悉引兵擊秦軍汗水上大破之章邯使人見項羽欲約項羽召軍吏謀曰糧少欲聽其約軍吏皆曰善項羽乃與期洹水南殷虛上已盟章邯見項羽而流涕為言趙髙項羽乃立章邯為雍王置楚軍中使長史欣為上將軍將秦軍為前行瑕丘申陽下河南引兵從項羽初中丞相趙髙欲專秦權恐羣臣不聽乃先設驗持鹿獻於二世曰馬也二世笑曰丞相誤邪謂鹿為馬問左右左右或黙或言馬以阿順趙髙或言鹿者髙因隂中諸言鹿者以法後羣臣皆畏髙莫敢言其過髙前數言關東盜無能為也及項羽虜王離等而章邯等軍數敗上書請益助自關以東大抵盡畔秦吏應諸矦諸矦咸率其衆西鄉八月沛公將數萬人攻武關屠之髙恐二世怒誅及其身乃謝病不朝見二世夢白虎齧其左驂馬殺之心不樂怪問占夢卜曰涇水為祟二世乃齋於望夷宮欲祠涇水沈四白馬使使責讓高以盜賊事高懼乃隂與其壻咸陽令閻樂及弟趙成謀曰上不聽諫今事急欲歸禍於吾吾欲易置上更立子嬰子嬰仁儉百姓皆載其言乃使郎中令為内應詐為有大賊令樂召吏發兵追劫樂毋置髙舍遣樂將吏卒千餘人至望夷宮殿門縛衛令􅗛射曰賊入此何不止衛令曰周廬設卒甚謹安得賊敢入宮樂遂斬衛令直將吏入行射郎宦者郎宦者大驚或走或格格者輒死死者數十人郎中令與樂俱入射上幄坐幃二世怒召左右左右皆惶擾不鬬旁有宦者一人侍不敢去二世入内謂曰公何不早告我乃至於此宦者曰臣不敢言故得全使臣早言皆已誅安得至今閻樂前即二世數曰足下驕恣誅殺無道天下共畔足下足下其自為計二世曰丞相可得見否樂曰不可二世曰吾願得一郡為王弗許又曰願為萬户侯弗許曰願與妻子為黔首比諸公子閻樂曰臣受命於丞相為天下誅足下足下雖多言臣不敢報麾其兵進二世自殺閻樂歸報趙高趙高乃悉召諸大臣公子告以誅二世之狀曰秦故王國始皇君天下故稱帝今六國復自立秦地益小乃以空名為帝不可冝為王故如便乃立子嬰為秦王以黔首葬二世杜南冝春苑中九月趙髙令子嬰齋當廟見受玉璽齋五日子嬰與其子二人謀曰丞相髙殺二世望夷宮恐羣臣誅之乃佯以義立我我聞趙髙乃與楚約㓕秦宗室而分王關中今使我齋見廟此欲因廟中殺我我稱病不行丞相必自來來則殺之高使人請子嬰數軰子嬰不行高果自徃曰宗廟重事王柰何不行子嬰遂刺殺高於齋宮三族高家以徇遣將將兵距嶢關沛公欲擊之張良曰秦兵尚彊未可輕願先遣人益張旗幟於山上為疑兵使酈食其陸賈徃説秦將㗖以利秦將果欲連和沛公欲許之張良曰此獨其將欲叛恐其士卒不從不如因其懈怠擊之沛公引兵繞嶢關踰蕢山擊秦軍大破之藍田南遂至藍田又戰其北秦兵大敗資治通鑑卷第八
