body:
  text: 臣司馬光奉勑編集周紀三大淵獻凡二十三年􅁸重光赤奮若盡昭陽愼靚王元年衞更貶號曰君二年秦伐韓取鄢魏惠王薨子襄王立孟子入見而出語人曰望之不似人君就之而不見所畏焉卒然問曰天下惡乎定吾對曰定于一孰能一之對曰不嗜殺人者能一之孰能與之對曰天下莫不與也王知夫苖乎七八月之間旱則苖槁矣天油然作雲沛然下雨則苖浡然興之矣其如是孰能禦之三年楚趙魏韓燕同伐秦攻函谷􅀜秦人出兵逆之五國之師皆敗走􅊨宋初稱王四年秦敗韓師于脩魚斬首八萬級虜其將䱸申差于濁澤諸矦振恐齊大夫與蘇秦爭寵使人剌秦殺之張儀說魏襄王曰梁地方不至千里卒不過三十萬地四平無名山大川之限卒戍楚韓齊趙之境守亭障者不下十萬梁之地勢固戰場也夫諸矦之約從盟洹水之上結為兄弟以相堅也今親兄弟同父母尚有爭錢財相殺傷而欲恃反覆蘇秦之餘謀其不可成亦明矣大王不事秦秦下兵攻河外據卷􅄛酸􅀥刼衞取陽晉則趙不南趙不南則梁不北梁不北則從道絶從道絶則大王之國欲毋危不可得也故願大王審定計議且賜骸骨魏王乃倍從約而因儀以請成于秦張儀歸復相秦魯景公薨子平公旅立五年巴蜀相攻擊俱告急於秦秦惠王欲伐蜀以為道險陿難至而韓又來侵猶豫未能決司馬錯請伐蜀張儀曰不如伐韓王曰請聞其說儀曰親魏善楚下兵三川攻新城宜陽以臨二周之郊據九鼎按圖籍挾天子以令於天下天下莫敢不聽此王業也臣聞爭名者於朝爭利者於市今三川周室天下之朝市也而王不爭焉顧爭於戎翟去王業逺矣司馬錯曰不然臣聞之欲富國者務廣其地欲彊兵者務富其民欲王者務博其德三資者備而王隨之矣今王地小民貧故臣願先從事於易夫蜀西僻之國而戎翟之長也有桀紂之亂以秦攻之譬如使犲狼逐羣羊得其地足以廣國取其財足以富民繕兵不傷衆而彼已服焉拔一國而天下不以為暴利盡西海而天下不以為貪是我一舉而名實附也而又有禁暴止亂之名今攻韓劫天子惡名也而未必利也又有不義之名而攻天下所不欲危矣臣請論其故周天下之宗室也齊韓之與國也周自知失九鼎韓自知亡三川將二國并力合謀以因乎齊趙而求解乎楚魏以鼎與楚以地與魏王弗能止也此臣之所謂危也不如伐蜀完王從錯計起兵伐蜀十月取之貶蜀王更號爲矦而使陳荘相蜀蜀旣屬秦秦以益彊富厚輕諸矦蘇秦既死秦弟代厲亦以遊說顯於諸矦燕相子之與蘇代婚欲得燕權蘇代使於齊而還燕王噲問曰齊王其霸乎對曰不能王曰何故對曰不信其臣於是燕王專任子之鹿毛夀謂燕王曰人之謂堯賢者以其能讓天下也今王以國讓子之是王與堯同名也燕王因屬國於子之子之大重或曰禹薦益而以啓人爲吏及老而以啓爲不足任天下傳之於益啓與交黨攻益奪之天下謂禹名傳天下於益而實令啓自取之今王言屬國於子之而吏無非太子人者是名屬子之而實太子用事也王因收印綬自三百石吏已上而效之子之子之南面行王事而噲老不聽政顧為臣國事皆決於子之六年王崩子赧王延立赧王上元年秦人侵義渠得二十五城魏人叛秦秦人伐魏取曲沃而歸其人又敗韓於岸門韓太子倉入質于秦以和燕子之為王三年國内大亂將軍市被與太子平謀攻子之齊王令人謂燕太子曰寡人聞太子將飭君臣之義明父子之位寡人之國雖小唯太子所以令之太子因要黨聚衆使市被攻子之不克市被反攻太子搆難數月死者數萬人百姓恫恐齊王令章子將五都之兵因北地之衆以伐燕燕士卒不戰城門不閉齊人取子之醢之遂殺燕王噲齊王問孟子曰或謂寡人勿取燕或謂寡人取之以萬乗之國伐萬乗之國五旬而舉之人力不至於此不取必有天殃取之何如孟子對曰取之而燕民悅則取之古之人有行之者武王是也取之而燕民不悅則勿取古之人有行之者文王是也以萬乗之國伐萬乗之國簞食壷漿以迎王師豈有他哉避水火也如水益深如火益熱亦運而已矣諸矦將謀救燕齊王謂孟子曰諸矦多謀伐寡人者何以待之對曰臣聞七十里為政於天下者湯是也未聞以千里畏人者也書曰徯我后后來其蘇今燕虐其民王往而征之民以為將拯己於水火之中也簞食壷漿以迎王師若殺其父兄係累其子弟毁其宗廟遷其重器如之何其可也天下固畏齊之彊也今又倍地而不行仁政是動天下之兵也王速出令反其旄倪止其重器謀於燕衆置君而後去之則猶可及止也齊王不聽已而燕人叛齊王曰吾甚慙於孟子陳賈曰王無患焉乃見孟子問曰周公何人也曰古聖人也陳賈曰周公使管叔監商管叔以商畔也周公知其將畔而使之與曰不知也陳賈曰然則聖人亦有過與曰周公弟也管叔兄也周公之過不亦宜乎且古之君子過則攺之今之君子過則順之古之君子其過也如日月之食民皆見之及其更也民皆仰之今之君子豈徒順之又從為之辭是歳齊宣王薨子湣王地立二年秦右更疾伐趙拔藺虜其將荘豹秦王欲伐齊患齊楚之從親乃使張儀至楚說楚王曰大王誠能聽臣閉􅀜絶約於齊臣請獻商於之地六百里使秦女得為大王箕帚之妾秦楚娶婦嫁女長為兄弟之國楚王說而許之羣臣皆賀陳軫獨弔王怒曰寡人不興師而得六百里地何弔也對曰不然以臣觀之商於之地不可得而齊秦合齊秦合則患必至矣王曰有說乎對曰夫秦之所以重楚者以其有齊也今閉􅀜絶約於齊則楚孤秦奚貪夫孤國而與之商於之地六百里張儀至秦必負王是王北絶齊交西生患於秦也兩國之兵必俱至為王計者不若隂合而陽絶於齊使人隨張儀茍與吾地絶齊未晚也王曰願陳子閉口毋復言以待寡人得地乃以相印授張儀厚賜之遂閉􅀜絶約於齊使一將軍隨張儀至秦張儀佯墮車不朝三月楚王聞之曰儀以寡人絶齊未甚邪乃使勇士宋遺借宋之符北罵齊王齊王大怒折節而事秦齊秦之交合張儀乃朝見楚使者曰子何不受地從某至某廣袤六里使者怒還報楚王楚王大怒欲發兵而攻秦陳軫曰軫可發口言乎攻之不如因賂以一名都與之并兵而攻齊是我亡地於秦取償於齊也今王已絶於齊而責欺於秦是吾合秦齊之交而來天下之兵也國必大傷矣楚王不聽使屈匄帥師伐秦秦亦發兵使庶長章擊之三年春秦師及楚戰于丹陽楚師大敗斬甲士八萬虜屈匄及列矦執珪七十餘人遂取漢中郡楚王悉發國内兵以復襲秦戰於藍田楚師大敗韓魏聞楚之困南襲楚至鄧楚人聞之乃引兵歸割兩城以請平于秦燕人共立太子平是為昭王昭王於破燕之後即位弔死問孤與百姓同甘苦卑身厚幣以招賢者謂郭隗曰齊因孤之國亂而襲破燕孤極知燕小力少不足以報然誠得賢士與共國以雪先王之恥孤之願也先生視可者得身事之郭隗曰古之人君有以千金使㳙人求千里馬者馬已死買其首五百金而返君大怒㳙人曰死馬且買之況生者乎馬今至矣不期年千里之馬至者三今王必欲致士先從隗始況賢於隗者豈逺千里哉於是昭王為隗攺築宫而師事之於是士爭趣燕樂毅自魏往劇辛自趙往昭王以樂毅為亞卿任以國政韓宣惠王薨子襄王倉立四年蜀相殺蜀矦秦惠王使人告楚懷王請以武􅀜之外易黔中地楚王曰不願易地願得張儀而獻黔中地張儀聞之請行王曰楚將甘心於子奈何行張儀曰秦彊楚弱大王在楚不宜敢取臣且臣善其嬖臣靳尚靳尚得事幸姬鄭袖袖之言王無不聽者遂往楚王囚將殺之靳尚謂鄭袖曰秦王甚愛張儀將以上庸六縣及美女贖之王重地尊秦秦女必貴而夫人斥矣於是鄭袖日夜泣於楚王曰臣各為其主耳今殺張儀秦必大怒妾請子母俱遷江南毋為秦所魚肉也王乃赦張儀而厚禮之張儀因說楚王曰夫為從者無以異於驅羣羊而攻猛虎不格明矣今王不事秦秦劫韓驅梁而攻楚則楚危矣秦西有巴蜀治船積粟浮岷江而下一日行五百餘里不至十日而距扞􅀜扞􅀜驚則從境以東盡城守矣黔中巫郡非王之有秦舉甲出武􅀜則北地絶秦兵之攻楚也危難在三月之内而楚待諸矦之救在半歳之外夫待弱國之救忘彊秦之禍此臣所為大王患也大王誠能聽臣請令秦楚長為兄弟之國無相攻伐楚王已得張儀而重出黔中地乃許之張儀遂之韓說韓王曰韓地險惡山居五穀所生非菽而麥國無二歳之食見卒不過二十萬秦被甲百餘萬山東之士被甲蒙胄而㑹戰秦人􅂢甲徒裼以趨敵左挈人頭右挾生虜夫戰孟賁烏獲之士以攻不服之弱國無異埀千鈞之重於鳥卵之上必無幸矣大王不事秦秦下甲據宜陽塞成臯則王之國分矣鴻臺之宫桑林之花非王之有也為大王計莫如事秦而攻楚以轉禍而悅秦計無便於此者韓王許之張儀歸報秦王封以六邑號武信君復使東􅀃齊王曰從人􅀃大王者必曰齊蔽於三晉地廣民衆兵彊士勇雖有百秦將無奈齊何大王賢其􅀃而不計其實今秦楚嫁女娶婦為昆弟之國韓獻宜陽梁效河外趙王入朝割河間以事秦大王不事秦秦驅韓梁攻齊之南地悉趙兵渡清河指博􅀜臨菑即墨非王之有也國一日見攻雖欲事秦不可得也齊王許張儀張儀去西􅀃趙王曰大王收率天下以擯秦秦兵不敢出函谷􅀜十五年大王之威行於山東敝邑恐懼繕甲厲兵力田積粟愁居懾處不敢動揺唯大王有意督過之也今以大王之力舉巴蜀并漢中包兩周守白馬之津秦雖僻逺然而心忿含怒之日乆矣今秦有敝甲凋兵軍於澠池願渡河踰漳據畨吾㑹邯鄲之下願以甲子合戰正殷紂之事謹使使臣先聞左右今楚與秦為昆弟之國而韓梁稱東藩之臣齊獻魚鹽之地此斷趙之右肩也夫斷右肩而與人鬭失其黨而孤居求欲毋危得乎今秦發三將軍其一軍塞午道告齊使渡清河軍於邯鄲之東一軍軍成臯驅韓梁軍於河外一軍軍於澠池約四國為一以攻趙趙服必四分其地臣竊為大王計莫如與秦王面相約而口相結常為兄弟之國也趙王許之張儀乃北之燕􅀃燕王曰今趙王已入朝効河閒以事秦大王不事秦秦下甲雲中九原驅趙而攻燕則易水長城非大王之有也且今時齊趙之於秦猶郡縣也不敢妄舉師以攻伐今王事秦長無齊趙之患矣燕王請獻常山之尾五城以和張儀歸報未至咸陽秦惠王薨子武王立武王自為太子時不􅀃張儀及即位羣臣多毁短之諸矦聞儀與秦王有隙皆畔衡復合從五年張儀􅀃秦武王曰為王計者東方有變然後王可以多割得地也臣聞齊王甚憎臣臣之所在必伐之臣願乞其不肖之身以之梁齊必伐梁齊梁交兵而不能相去王以其閒伐韓入三川挾天子案圖籍此王業也王許之齊王果伐梁梁王恐張儀曰王勿患也請令齊罷兵乃使其舎人之楚借使謂齊王曰甚矣王之託儀於秦也齊王曰何故楚使者曰張儀之去秦也固與秦王謀矣欲齊梁相攻而令秦取三川也今王果伐梁是王内罷國而外伐與國以信儀於秦王也齊王乃解兵還張儀相魏一歲卒儀與蘇秦皆以縱横之術遊諸矦致位富貴天下爭慕效之又有魏人公孫􅄛者號曰犀首亦以談􅀃顯名其餘蘇代蘇厲周最樓緩之徒紛紜徧於天下務以辯詐相高不可勝紀而儀秦􅄛最著孟子論之曰或謂張儀公孫􅄛豈不大丈夫哉一怒而諸矦懼安居而天下熄孟子曰是惡足以為大丈夫哉君子立天下之正位行天下之正道得志則與民由之不得志則獨行其道富貴不能淫貧賤不能移威武不能詘是之謂大丈夫揚子灋言曰或問儀秦學乎鬼谷術而習乎縱横言安中國者各十餘年是夫曰詐人也聖人惡諸曰孔子讀而儀秦行何如也曰甚矣鳳鳴而鷙翰也然則子貢不為歟曰亂而不解子貢恥諸􅀃而不富貴儀秦恥諸或曰儀秦其才矣乎跡不蹈已曰昔在任人帝而難之不以才矣才乎才非吾徒之才也秦王使甘茂誅蜀相莊秦王魏王會于臨晉趙武靈王納吳廣之女孟姚有寵是為惠后生子何六年秦初置丞相以樗里疾為右丞相七年秦魏㑹于應秦王使甘茂約魏以伐韓而令向壽輔行甘茂至魏令向壽還謂王曰魏聽臣矣然願王勿伐王迎甘茂於息壤而問其故對曰宜陽大縣其實郡也今王倍數險行千里攻之難魯人有與曽參同姓名者殺人人告其母其母織自若也及三人告之其母投杼下機踰牆而走臣之賢不若曽參王之信臣又不如其母疑臣者非特三人臣恐大王之投杼也魏文矦令樂羊將而攻中山三年而㧞之反而論功文矦示之謗書一篋樂羊再拜稽首曰此非臣之功君之力也令臣羇旅之臣也樗里子公孫奭挾韓而議之王必聽之是王欺魏王而臣受公仲侈之怨也王曰寡人弗聽也請與子盟乃盟於息壤秋甘茂庶長封帥師伐宜陽八年甘茂攻宜陽五月而不拔樗里子公孫奭果爭之秦王召甘茂欲罷兵甘茂曰息壤在彼王曰有之因大悉起兵以佐甘茂斬首六萬遂拔宜陽韓公仲侈入謝於秦以請平秦武王好以力戯力士任鄙烏獲孟􅀃皆至大官八月王與孟􅀃舉鼎絶脈而薨族孟􅀃武王無子異母弟稷為質於燕國人逆而立之是為昭襄王昭襄王母芉八子楚女也寔宣太后趙武靈王北略中山之地至房子遂之代北至無窮西至河登黄華之上與肥義謀胡服􅀐射以教百姓曰愚者所笑賢者察焉雖驅丗以笑我胡地中山吾必有之遂胡服國人皆不欲公子成稱疾不朝王使人請之曰家聽於親而國聽於君今寡人作教易服而公叔不服吾恐天下議之也制國有常利民為本從政有經令行為上明德先論於賤而從政先信於貴故願慕公叔之義以成胡服之功也公子成再拜稽首曰臣聞中國者聖賢之所敎也禮樂之所用也逺方之所觀赴也蠻夷之所則效也今王舎此而襲逺方之服變古之道逆人之心臣願王熟圖之也使者以報王自往請之曰吾國東有齊中山北有燕東胡西有樓煩秦韓之邊今無􅀐射之備則何以守之哉先時中山負齊之彊兵侵暴吾地係累吾民引水圍鄗微社稷之神靈則鄗幾於不守也先君醜之放寡人變服􅀐射欲以備四境之難報中山之怨而叔順中國之俗惡變服之名以忘鄗事之醜非寡人之所望也公子成聽命乃賜胡服明日服而朝於是始出胡服令而招􅀐射焉九年秦昭王使向壽平宜陽而使樗里子甘茂伐魏甘茂言於王以武遂復歸之韓向壽公孫奭爭之不能得由此怨䜛甘茂茂懼輟伐魏蒲阪亡去樗里子與魏講而罷兵甘茂奔齊趙王略中山地至寧葭西略胡地至榆中林胡王獻馬歸使樓緩之秦仇液之韓王賁之楚富丁之魏趙爵之齊代相趙固主胡致其兵楚王與齊韓合從十年彗星見趙王伐中山取丹丘爽陽鴻之塞又取鄗石邑封龍東垣中山獻四邑以和秦宣太后異父弟曰穰矦魏冉同父弟曰華陽君芉戎王之同母弟曰高陵君涇陽君魏冉最賢自惠王武王時任職用事武王薨諸弟爭立唯魏冉力能立昭王昭王即位以冉為將軍衛咸陽是歲庶長壯及大臣諸公子謀作亂魏冉誅之及惠文后皆不得良死悼武王后出歸于魏王兄弟不善者魏冉皆滅之王少宣太后自治事任魏冉為政威震秦國十一年秦王楚王盟于黄棘秦復與楚上庸十二年彗星見秦取魏蒲阪晉陽封陵又取韓武遂齊韓魏以楚負其從親合兵伐楚楚王使太子横為質於秦而請救秦客卿通將兵救楚三國引兵去十三年秦王魏王韓太子嬰㑹于臨晉韓太子至咸陽而歸秦復與魏蒲阪秦大夫有私與楚太子鬭者太子殺之亡歸十四年日有食之既秦人取韓穰蜀守煇叛秦秦司馬錯往誅之秦庶長奐㑹韓魏齊兵伐楚敗其師於重丘殺其將唐昧遂取重丘趙王伐中山中山君奔齊十五年秦涇陽君為質於齊秦華陽君伐楚大破楚師斬首三萬殺其將景缺取楚襄城楚王恐使太子為質於齊以請平秦樗里疾卒以趙人樓緩為丞相趙武靈王愛少子何欲及其生而立之十六年五月戊申大朝東宫傳國於何王廟見禮畢出臨朝大夫悉為臣肥義為相國并傅王武靈王自號主父主父欲使子治國身胡服將士大夫西北略胡地將自雲中九原南襲咸陽於是詐自為使者入秦欲以觀秦地形及秦王之為人秦王不知已而怪其狀甚偉非人臣之度使人逐之主父行已脫􅀜矣審問之乃主父也秦人大驚齊王魏王㑹于韓秦人伐楚取八城秦王遺楚王書曰始寡人與王約為弟兄盟於黄棘太子入質至驩也太子陵殺寡人之重臣不謝而亡去寡人誠不勝怒使兵侵君王之邊今聞君王乃令太子質於齊以求平寡人與楚接境婚姻相親而今秦楚不驩則無以令諸矦寡人願與君王㑹武􅀜面相約結盟而去寡人之願也楚王患之欲往恐見欺欲不往恐秦益怒昭雎曰毋行而發兵自守耳秦虎狼也有并諸矦之心不可信也懷王之子子蘭勸王行王乃入秦秦王令一將軍詐為王伏兵武􅀜楚王至則閉􅀜劫之與西至咸陽朝章臺如藩臣禮要以割巫黔中郡楚王欲盟秦王欲先得地楚王怒曰秦詐我而又彊要我以地因不復許秦人留之楚大臣患之乃相與謀曰吾王在秦不得還要以割地而太子為質於齊齊秦合謀則楚無國矣欲立王子之在國者昭雎曰王與太子俱困於諸矦而今又倍王命而立其庶子不宜乃詐赴於齊齊湣王召羣臣謀之或曰不若留太子以求楚之淮北齊相曰不可郢中立王是吾抱空質而行不義於天下也其人曰不然郢中立王因與其新王市曰予我下東國吾為王殺太子不然將與三國共立之齊王卒用其相計而歸楚太子楚人立之秦王聞孟甞君之賢使涇陽君為質於齊以請孟甞君來入秦秦王以為丞相十七年或謂秦王曰孟甞君相秦必先齊而後秦秦其危哉秦王乃以樓緩為相囚孟甞君欲殺之孟甞君使人求解於秦王幸姬姬曰願得君狐白裘孟甞君有狐白裘已獻之秦王無以應姬求客有善為狗盗者入秦藏中盗狐白裘以獻姬姬乃為之言於王而遣之王後悔使追之孟甞君至􅀜􅀜灋鷄鳴而出客時尚蚤追者將至客有善為鷄鳴者野鷄聞之皆鳴孟甞君乃得脫歸楚人告于秦曰頼社稷神靈國有王矣秦王怒發兵出武􅀜撃楚斬首五萬取十六城趙王封其弟勝爲平原君平原君好士食客常數千人有公孫龍者善為堅白同異之辯平原君客之孔穿自魯適趙與公孫龍論臧三耳龍甚辯析子高弗應俄而辭出明日復見平原君平原君曰疇昔公孫之言信辯也先生以為何如對曰然幾能令臧三耳矣雖然實難僕願得又問於君今謂三耳甚難而實非也謂兩耳甚易而實是也不知君將從易而是者乎其亦從難而非者乎平原君無以應明日謂公孫龍曰公無復與孔子高辯事也其人理勝於辭公辭勝於理辭勝於理終必受詘齊鄒􅄛過趙平原君使與公孫龍論白馬非馬之􅀃鄒子曰不可夫辯者别殊類使不相害序異端使不相亂抒意通指明其所謂使人與知焉不務相迷也故勝者不失其所守不勝者得其所求若是故辯可為也及至煩文以相假飾辭以相惇巧譬以相移引人使不得及其意如此害大道夫繳紛爭言而競後息不能無害君子􅄛不為也座皆稱善公孫龍由是遂絀資治通鑑巻第三
