front:
  text: 師羣臣惟盛稱功德莫諭其意日晚坐散中書令傅亮還外乃悟而宫門已閉亮叩扉請見王即開門見之亮入但曰臣暫宐還都王解其意無復他言直云須幾人自送亮曰數十人可也即時奉辭亮出已夜見長星竟天拊髀歎曰我常不信天文今始驗矣亮至建康夏四月徴王入輔王留子義康為都督豫司雍并四州諸軍事豫州刺史鎮夀陽義康尚㓜以相國參軍南陽劉湛為長史決府州事湛自弱年即有宰物之情常自比管葛博涉書史不為文章不喜談議王甚重之五月乙酉魏更謚宣武帝曰道武帝魏淮南公司馬國璠池陽子司馬道賜謀外叛司馬文思告之庚戌魏主殺國璠道賜賜文思爵鬱林公國璠等連引平城豪桀坐族誅者數十人章安矦封懿之子􅀇之當坐魏主以􅀇之燕朝舊族欲宥其一子􅀇之曰弟子磨奴早孤乞全其命乃殺􅀇之四子而宥磨奴六月壬戌王至建康傅亮諷晉恭帝禪位於宋具詔草呈帝使書之帝欣然操筆謂左右曰桓􅀇之時晉氏已無天下重為劉公所延將二十載今日之事本所甘心遂書赤紙為詔甲子帝遜于琅邪第百官拜辭祕書監徐廣流涕哀慟丁夘王為壇於南郊即皇帝位禮畢自石頭備灋駕入建康宫徐廣又悲感流涕侍中謝晦謂之曰徐公得無小過廣曰君為宋朝佐命身是晉室遺老悲歡之事固不可同廣邈之弟也帝臨大極殿大赦改元其犯鄉論清議一皆蕩滌與之更始
