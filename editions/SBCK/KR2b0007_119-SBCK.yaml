body:
  text: 裴子野論曰昔重華受終四凶流放武王克殷頑民遷洛天下之惡一也鄉論清議除之過矣奉晉恭帝為零陵王優崇之禮皆倣晉初故事即宫于故秣陵縣使冠軍將軍劉遵考將兵防衛降禇后為王妃追尊皇考為孝穆皇帝皇妣趙氏為孝穆皇后尊王太后蕭氏為皇太后上事蕭太后素謹及即位春秋已高毎旦入朝太后未嘗失時刻詔晉氏封爵當隨運改獨置始興廬陵始安長沙康樂五公降爵為縣公及縣矦以奉王導謝安温嶠陶侃謝􅀇之祀其宣力義􅄉豫同艱難者一仍本秩庚午以司空道憐爲太尉封長沙王追封司徒道規為臨川王以道憐子義慶襲其爵其餘功臣徐羨之等增位進爵各有差追封劉穆之為南康郡公王鎮惡為龍陽縣矦上每歎念穆之曰穆之不死當助我治天下可謂人之云亡邦國殄瘁又曰穆之死人輕易我立皇子桂陽公義真為廬陵王彭城公義隆為宐都王義康為彭城王己夘改泰始曆為永初曆魏主如翳犢山遂至馮滷池聞上受禪驛召崔浩告之曰卿往年之言驗矣朕於今日始信天道秋七月丁酉魏主如五原甲辰詔以涼公歆為都督高昌等七郡諸軍事征西大將軍酒泉公秦王熾磐為安西大將軍交州刺史杜慧度擊林邑大破之所殺過半林邑乞降前後為所鈔掠者皆遣還慧度在交州為政纎密一如治家吏民畏而愛之城門夜開道不拾遺丁未魏主如雲中河西王䝉遜欲伐涼先引兵攻秦浩亹旣至濳師還屯川巖涼公歆欲乗虛襲張掖宋繇張體順切諌不聽太后尹氏謂歆曰汝新造之國地狹民希自守猶懼不足何暇伐人先王臨終殷勤戒汝深慎用兵保境寧民以俟天時言猶在耳柰何弃之䝉遜善用兵非汝之敵數年以來常有兼并之志汝國雖小足為善政修徳養民靜以待之彼若昏暴民將歸汝若其休明汝將事之豈得輕為舉動僥冀非望以吾觀之非但喪師殆將亡國亦不聽宋繇歎曰今兹大事去矣歆將步騎三萬東出䝉遜聞之曰歆已入吾術中然聞吾旋師必不敢前乃露布西境云已克浩亹將進攻黄谷歆聞之喜進入都瀆澗䝉遜引兵擊之戰於懐城歆大敗或勸歆還保酒泉歆曰吾違老母之言以取敗不殺此胡何面目復見我母遂勒兵戰於蓼泉為䝉遜所殺歆弟酒泉太守翻新城太守預領羽林右監密左將軍眺右將軍亮西奔敦煌䝉遜入酒泉禁侵掠士民安堵以宋繇為吏部郎中委之選舉涼之舊臣有才望者咸禮而用之以其子牧犍為酒泉太守敦煌太守李恂翻之弟也與翻等弃敦煌奔北山䝉遜以索嗣之子元緒行敦煌太守䝉遜還姑臧見涼太后尹氏而勞之尹氏曰李氏為胡所滅知復何言或謂尹氏曰今母子之命在人掌握奈何傲之且國亡子死曾無憂色何也尹氏曰存亡死生皆有天命奈何更如凡人為兒女子之悲乎吾老婦人國亡家破豈可復惜餘生為人臣妾乎惟速死為幸耳䝉遜嘉而赦之娶其女為牧犍婦八月辛未追謚妃臧氏為敬皇后癸酉立王太子義符為皇太子閏月壬午詔晉帝諸陵悉署守衛九月秦振武將軍王基等襲河西王蒙遜胡園戍俘二千餘人而還李恂在敦煌有惠政索元緒麤險好殺大失人和郡人宋承張􅀪密信招恂冬恂帥數十騎入敦煌元緒東奔涼興承等推恂為冠軍將軍涼州剌史改元永建河西王䝉遜遣世子政徳攻敦煌恂閉城不戰十二月丁亥杏城羌酋狄温子帥三千餘家降魏是歳魏姚夫人卒追諡昭哀皇后二年春正月辛酉上祀南郊大赦裴子野論曰夫郊祀天地修歳事也赦彼有罪夫何為哉以揚州刺史廬陵王義真為司徒尚書僕射徐羨之為尚書令揚州刺史中書令傅亮為尚書僕射辛未魏主行如公陽河西王䝉遜帥衆二萬攻李恂于敦煌秦王熾磐遣征北將軍木弈于輔國將軍元基攻上邽遇霖雨而還三月甲子魏陽平王熈卒魏主發代都六千人築苑東包白登周三十餘里河西王䝉遜築隄壅水以灌敦煌李恂乞降不許恂將宋承等舉城降恂自殺䝉遜屠其城獲恂弟子寳囚于姑臧於是西域諸國皆詣䝉遜稱臣朝貢夏四月己夘朔詔所在淫祠自蔣子文以下皆除之其先賢及以勲徳立祠者不在此例吐谷渾王阿柴遣使降秦秦王熾磐以阿柴為征西大將軍開府儀同三司安州牧白蘭王六月乙酉魏主北巡至蟠羊山秋七月西巡至河河西王䝉遜遣右衛將軍沮渠鄯善建節將軍沮渠茍生帥衆七千伐秦秦王熾磐遣征北將軍木弈干等帥步騎五千拒之敗鄯善等于五澗虜茍生斬首二千而還初帝以毒酒一甖授前琅邪郎中令張偉使酖零陵王偉歎曰酖君以求生不如死乃於道自飲而卒偉邵之兄也太常褚秀之侍中褚淡之皆王之妃兄也王每生男帝輒令秀之兄弟方便殺之王自遜位深慮禍及與禇妃共處一室自煑食於牀前飲食所資皆出禇妃故宋人莫得伺其隙九月帝令淡之與兄右衛將軍叔度往視妃妃出就别室相見兵人踰垣而入進藥於王王不肯飲曰佛教自殺者不復得人身兵人以被掩殺之帝帥百官臨于朝堂三日庚戌魏主還宫冬十月己亥詔以河西王䝉遜為鎮軍大將軍開府儀同三司涼州刺史己亥魏主如代十一月辛亥葬晉恭帝于沖平陵帝帥百官瞻送十二月丙申魏主西巡至雲中秦王熾磐遣征西將軍孔子等帥騎二萬擊契汗秃眞於羅川河西王蒙遜所署晉昌太守唐契據郡叛䝉遜遣世子政徳討之契瑶之子也上之為宋公也謝瞻為宋臺中書侍郎其弟晦為右衛將軍時晦權遇已重自彭城還都迎家賓客輻湊門巷填咽瞻在家驚駭謂晦曰汝名位未多而人歸趣乃爾吾家素以恬退為業不願干豫時事交遊不過親朋而汝遂勢傾朝野此豈門戶之福邪乃以籬隔門庭曰吾不忍見此及還彭城言於宋公曰臣本素士父祖位不過二千石弟年始三十志用凡近榮冠臺府位任顯密福過災生其應無逺特乞降黜以保衰門前後屢陳之晦或以朝廷密事語瞻瞻故向親舊陳説用為戲笑以絶其言及上即位晦以佐命功位任益重瞻愈憂懼是歲瞻為豫章太守遇病不療臨終遺晦書曰吾得啓體幸全亦何所恨弟思自勉勵為國為家三年春正月甲辰朔魏主自雲中西巡至屋竇城癸丑以徐羨之為司空録尚書事刺史如故江州刺史王􅀪為衛將軍開府儀同三司中領軍謝晦為領軍將軍兼散騎常侍入直殿省揔統宿衛徐羨之起自布衣又無術學直以志力局度一旦居廊廟朝野推服咸謂有宰臣之望沈密寡言不以憂喜見色頗工弈棊觀戲常若未解當世倍以此推之傅亮蔡廓常言徐公曉萬事安異同嘗與傅亮謝晦宴聚亮晦才學辯博羨之風度詳整時然後言鄭鮮之歎曰觀徐傅言論不復以學問為長秦征西將軍孔子等大破契汗秃眞獲男女二萬口牛羊五十餘萬頭禿真帥騎數千西走其别部樹奚帥户五千降秦二月丁丑詔分豫州淮以東為南豫州治歴陽以彭城王義康為刺史又分荆州十郡置湘州治臨湘以左衛將軍張邵為刺史丙戌魏主還宫三月上不豫太尉長沙王道憐司空徐羨之尚書僕射傅亮領軍將軍謝晦䕶軍將軍檀道濟並入侍醫藥羣臣請祈禱神祇上不許唯使侍中謝方明以疾告宗廟而已上性不信竒怪微時多符瑞及貴史官審以所聞上拒而不答檀道濟出為鎮北將軍南兖州刺史鎮廣陵悉監淮南諸軍皇太子多狎羣小謝晦言於上曰陛下春秋既高宐思存萬世神器至重不可使負荷非才上曰廬陵何如晦曰臣請觀焉出造廬陵王義真義真盛欲與談晦不甚答還曰徳輕於才非人主也丁未出義真為都督南豫豫雍司秦并六州諸軍事車騎將軍開府儀同三司南豫州刺史是後大州率加都督多者或至五十州不可復詳載矣帝疾瘳己未大赦秦雍流民南入梁州庚申遣使送絹萬匹且漕荆雍之穀以賑之刁逵之誅也其子彌亡命辛酉彌帥數十人入京口城太尉留府司馬陸仲元撃斬之乙丑魏河南王曜卒夏四月甲戌魏立皇子燾為太平王拜相國加大將軍丕為樂平王彌為安定王範為樂安王健為永昌王崇為建寧王俊為新興王乙亥詔封仇池公楊盛為武都王秦王熾磐以折衝將軍乞伏是辰為西胡校尉築列渾城於汁羅以鎮之五月帝疾甚召太子誡之曰檀道濟雖有幹略而無逺志非如兄韶有難御之氣也徐羨之傅亮當無異圖謝晦數從征伐頗識機變若有同異必此人也又為手詔曰後世若有㓜主朝事一委宰相母后不煩臨朝司空徐羨之中書令傅亮領軍將軍謝晦鎮北將軍檀道濟同被顧命癸亥帝殂于西殿帝清簡寡欲嚴整有灋度被服居處儉於布素遊宴甚稀嬪御至少嘗得後秦髙祖從女有盛寵頗以廢事謝晦㣲諌即時遣出財帛皆在外府内無私藏嶺南嘗獻入筒細布一端八丈帝惡其精麗勞人即付有司彈太守以布還之并制嶺南禁作此布公主出適遣送不過二十萬無錦繡之物内外奉禁莫敢為侈靡太子即皇帝位年十七大赦尊皇太后曰太皇太后立妃司馬氏為皇后后晉恭帝女海鹽公主也魏主服寒食散頻年藥發災異屢見頗以自憂遣中使宻問白馬公崔浩曰屬者日食趙代之分朕疾彌年不愈恐一旦不諱諸子並少將若之何其為我思身後之計浩曰陛下春秋富盛行就平愈必不得已請陳瞽言自聖代龍興不崇儲貳是以永興之始社稷幾危今宐早建東宫選賢公卿以為師傅左右信臣以為賓友入揔萬機出撫戎政如此則陛下可以優遊無為頥神養夀萬歳之後國有成主民有所歸姦宄息望禍無自生矣皇子燾年將周星明叡温和立子以長禮之大經若必待成人然後擇之倒錯天倫則召亂之道也魏主復以問南平公長孫嵩對曰立長則順置賢則人服燾長且賢天所命也帝従之立太平王燾為皇太子使之居正殿臨朝為國副主以長孫嵩及山陽公奚斤北新公安同為左輔坐東廂西面崔浩與太尉穆觀散騎常侍代人丘堆為右弼坐西廂東面百官揔已以聽焉帝避居西宫時隠而窺之聽其決㫁大悦謂侍臣曰嵩宿徳舊臣歴事四世功存社稷斤辯捷智謀名聞遐邇同曉解俗情明練於事觀達於政要識吾㫖趣浩博聞彊識精察天人堆雖無大用然在公専謹以此六人輔相太子吾與汝曹巡行四境伐叛柔服足以得志於天下矣嵩實姓拔拔斤姓逹奚觀姓丘穆陵堆姓丘敦是時魏之羣臣岀於代北者姓多重􅃨及髙祖遷洛始皆改之舊史患其煩雜難知故皆從後姓以就簡易今從之魏主又以典東西部劉絜門下奏事代人古弼直郎徒河盧魯元忠謹㳟勤使之給侍東宫分典機要宣納辭令太子聰明有大度羣臣時奏所疑帝曰此非我所知當決之汝曹國主也六月壬申以尚書僕射傅亮為中書監尚書令以領軍將軍謝晦領中書令侍中謝方明為丹楊尹方明善治郡所至有能名承代前人不易其政必宐改者則以漸移變使無迹可尋戊子長沙景王道憐卒魏建義將軍刁雍冦青州州兵擊破之雍收散卒走保大鄉山秋七月己酉葬武皇帝于初寧陵廟號髙祖河西王䝉遜遣前將軍沮渠成都帥衆一萬耀兵嶺南遂屯五潤九月秦王熾磐遣征北將軍出連䖍等帥騎六千擊之初魏主聞髙祖克長安大懼遣使請和自是每嵗交聘不絶及髙祖殂殿中將軍沈範等奉使在魏還及河魏主遣人追執之議發兵取洛陽虎牢滑臺崔浩諫曰陛下不以劉裕欻起納其使貢裕亦敬事陛下不幸今死遽乗喪伐之雖得之不足為美且國家今日亦未能一舉取江南也而徒有伐喪之名竊為陛下不取臣謂宐遣人弔祭存其孤弱恤其凶災使義聲布於天下則江南不攻自服矣况裕新死黨與未離兵臨其境必相帥拒戰功不可必不如緩之待其彊臣爭權變難必起然後命將出師可以兵不疲勞坐收淮北也魏主曰劉裕乗姚興之死而滅之今我乗裕喪而伐之何為不可浩曰不然姚興死諸子交爭故裕乗舋伐之今江南無舋不可比也魏主不從假司空奚斤節加晉兵大將軍行揚州刺史使督宋兵將軍交州刺史周幾吳兵將軍廣州刺史公孫表同入冦乙巳魏主如灅南宫遂如廣寗辛亥魏人築平城外郭周圍三十二里魏主如喬山遂東如幽州冬十月甲戌還宫魏軍將發公卿集議於監國之前以先攻城與先略地奚斤欲先攻城崔浩曰南人長於守城若苻氏攻襄陽經年不拔今以大兵坐攻小城若不時克挫傷軍勢敵得徐嚴而來我怠彼鋭此危道也不如分軍略地至淮為限列置守宰收斂租穀則洛陽滑臺虎牢更在軍北絶望南救必㳂河東走不則為囿中之物何憂其不獲也公孫表固請攻城魏主従之於是奚斤等帥步騎二萬濟河營於滑臺之東時司州剌史毛徳祖戍虎牢東郡太守王景度告急於德祖德祖遣司馬翟廣等將步騎三千救之先是司馬楚之聚衆在陳留之境聞魏兵濟河遣使迎降魏以楚之為征南將軍荆州刺史使侵擾北境徳祖遣長社令王灋政將五百人戍邵陵將軍劉憐將二百騎戍雍丘以備之楚之引兵襲憐不克㑹臺送軍資憐出迎之酸棗民王玉馳以告魏丁酉魏尚書滑稽引兵襲倉垣兵吏悉踰城走陳留太守馮翊嚴稜詣斥降魏以王玉為陳留太守給兵守倉垣奚斤等攻滑臺不拔求益兵魏主怒切責之壬辰自將諸國兵五萬餘人南出天關踰恒嶺為斤等聲援秦出連䖍與河西沮渠成都戰禽之十一月魏太子燾將兵出屯塞上使安定王彌與安同居守庚戌奚斤等急攻滑臺拔之王景度岀走景度司馬陽瓚為魏所執不降而死魏主以成皋矦茍兒為兖州刺史鎮滑臺斤等進擊翟廣等於土樓破之乗勝進逼虎牢毛徳祖與戰屢破之魏主别遣黑矟將軍于栗磾將三千人屯河陽謀取金墉徳祖遣振威將軍竇晃等縁河拒之十二月丙戌魏主至冀州遣楚兵將軍徐州刺史叔孫建將兵自平原濟河徇青兖豫州刺史劉粹遣治中髙道瑾將步騎五百據項城徐州刺史王仲徳將兵屯湖陸于栗磾濟河與奚斤并力攻竇晃等破之魏主遣中領軍代人娥清期思矦柔然閭大肥將兵七千人㑹周幾叔孫建南渡河軍於碻磝癸未兖州刺史徐琰弃尹卯南走於是泰山髙平金郷等郡皆没於魏叔孫建等東入青州司馬愛之季之先聚衆於濟東皆降於魏戊子魏兵逼虎牢青州刺史東莞笁䕫鎮東陽城遣使告急己丑詔南兖州刺史檀道濟監征討諸軍事與王仲徳共救之廬陵王義眞遣龍驤將軍沈叔狸將三千人就劉粹量宐赴援秦王熾磐徴秦州牧曇達為左丞相征東大將軍營陽王景平元年春正月己亥朔大赦改元辛丑帝祀南郊魏于栗磾攻金墉癸夘河南太守王涓之弃城走魏主以栗磾為豫州刺史鎮洛陽魏主南巡􅁪嶽丙辰至鄴己未詔徴豫章太守蔡廓為吏部尚書廓謂傅亮曰選事若悉以見付不論不然不能拜也亮以語錄尚書徐羨之羨之曰黄散以下悉以委蔡吾徒不復措懐自此以上故宐共參同異廓曰我不能為徐干木署紙尾遂不拜干木羨之小字也選桉黄紙錄尚書與吏部尚書連名故廓云然沈約論曰蔡廓固辭銓衡恥為志屈豈不知選錄同體義無偏㫁乎良以主闇時難不欲居通塞之任逺矣哉庚申檀道濟軍于彭城魏叔孫建入臨淄所向城邑皆潰笁䕫聚民保東陽城其不入城者使各依據山險芟夷禾稼魏軍至無所得食濟南太守垣苗帥衆依䕫刁雍見魏主於鄴魏主曰叔孫建等入青州民皆藏避攻城不下彼素服卿威信今遣卿助之乃以雍為青州刺史給雍騎使行募兵以取青州魏兵濟河向青州者凡六萬騎刁雍募兵得五千人撫慰土民皆送租供軍柔然冦魏邊二月戊辰魏築長城自赤城西至五原延袤二千餘里備置戍卒以備柔然丁丑太皇太后蕭氏殂河西王蒙遜及吐谷渾王阿柴皆遣使入貢庚辰詔以䝉遜為都督涼秦河沙四州諸軍事驃騎大將軍涼州牧河西王以阿柴為督塞表諸軍事安西將軍沙州刺史澆河公三月壬子葬孝懿皇后于興寜陵魏奚斤公孫表等共攻虎牢魏主自鄴遣兵助之毛徳祖於城内穴地入七丈分為六道出魏圍外募敢死之士四百人使參軍范道基等帥之從穴中出掩襲其後魏兵驚擾斬首數百級焚其攻具而還魏兵雖退散隨復更合攻之益急奚斤自虎牢將歩騎三千攻頴川太守李元徳等於許昌元徳等敗走魏以頴川人庾龍為頴川太守戍許昌毛徳祖出兵與公孫表大戰従朝至晡殺魏兵數百㑹奚斤自許昌還合撃徳祖大破之亡甲士一千餘人復嬰城自守魏主又遣萬餘人従白沙度河屯濮陽南朝議以項城去魏不逺非輕軍所抗使劉粹召高道瑾還夀陽若沈叔狸已進亦宐且追粹奏虜攻虎牢未復南向若遽攝軍捨項城則淮西諸郡無所慿依沈叔狸已頓肥口又不宐遽退時李元徳帥散卒二百至項劉粹使助髙道瑾戍守請宥其奔敗之罪朝議並許之乙已魏主畋於韓陵山遂如汲郡至枋頭初毛徳祖在北與公孫表有舊表有權略徳祖患之乃與交通音問密遣人說奚斤云表與之連謀毎荅表書輒多所治定表以書示斤斤疑之以告魏主先是表與太史令王亮少同營署好輕侮亮亮奏表置軍虎牢東不得便地故令賊不時滅魏主素好術數以為然積前後忿使人夜就帳中縊殺之乙夘魏主濟自靈昌津遂如東郡陳留叔孫建將三萬騎逼東陽城城中文武纔一千五百人笁䕫垣苗悉力固守時出竒兵擊魏破之魏步騎繞城列陳十餘里大治攻具䕫作四重塹魏人填其三重為橦車以攻城䕫遣人從地道中出以大麻絙挽之令折魏人復作長圍進攻逾急歷時浸久城轉墮壊戰士多死傷餘衆困乏旦暮且陷檀道濟至彭城以司青二州並急而所領兵少不足分赴青州道近笁䕫兵弱乃與王仲徳兼行先救之甲子劉粹遣李元徳襲許昌斬庾龍元徳因留綏撫并上租糧魏主至盟津于栗磾造浮橋於冶阪津乙丑魏主引兵北濟西如河内娥清周幾閭大肥徇地至湖陸髙平民屯聚而射之清等盡攻破高平諸縣滅數千家虜掠萬餘口兖州刺史鄭順之戍湖陸以兵少不敢出魏主又遣并州刺史伊樓拔助奚斤攻虎牢毛徳祖隨方抗拒頗殺魏兵而將士稍零落夏四月丁夘魏主如城臯絶虎牢汲河之路停三日自督衆攻城竟不能下遂如洛陽觀石經遣使祀嵩高叔孫建攻東陽墮其北城三十許歩刁雍請速入建不許遂不克及聞檀道濟等將至雍又謂建曰賊畏官軍突騎以鎻連車為函陳大峴已南處處狹隘車不得方軌雍請將所募兵五千據險以邀之破之必矣時天暑魏軍多疫建曰兵人疫病過半若相持不休兵自死盡何須復戰今全軍而返計之上也己巳道濟軍于臨朐壬申建等燒營及器械而遁道濟至東陽糧盡不能追笁䕫以東陽城壊不可守移鎮不其城叔孫建自東陽趨滑臺道濟分遣王仲徳向尹夘道濟停軍湖陸仲徳未至尹夘聞魏兵己逺還就道濟刁雍遂留鎮尹夘招集譙梁彭沛民五千餘家置二十七營以領之蠻王梅安帥渠帥數十人入貢于魏初諸蠻本居江淮之間其後種落滋蔓布於數州東連夀春西通巴蜀北接汝潁往往有之在魏世不甚為患及晉稍益繁昌漸為冦暴及劉石亂中原諸蠻無所忌憚漸復北徙伊闕以南滿於山谷矣河西世子政徳攻晉昌克之唐契及弟和甥李寳同奔伊吾招集遺民歸附者至二千餘家臣於柔然柔然以契為伊吾王秦王熾磐謂其羣臣曰今宋雖奄有江南夏人雄據關中皆不足與也獨魏主弈世英武賢能為用且䜟云􅁪代之北當有眞人吾將舉國而事之乃遣尚書郎漠者阿胡等入見于魏貢黄金二百斤并陳伐夏方略閏月丁未魏主如河内登太行至高都叔孫建自滑臺西就奚斤共攻虎牢虎牢被圍二百日無日不戰勁兵戰死殆盡而魏増兵轉多魏人毁其外城毛徳祖於其内更築三重城以拒之魏人又毁其二重徳祖唯保一城晝夜相拒將士眼皆生創德祖撫之以恩終無離心時檀道濟軍湖陸劉粹軍項城沈叔狸軍髙橋皆畏魏兵彊不敢進丁已魏人作地道以洩虎牢城中井井深四十丈山勢峻峭不可得防城中人馬渴乏被創者不復出血重以飢疫魏仍急攻之己未城陷將士欲扶徳祖出走徳祖曰我誓與此城俱斃義不使城亡而身存也魏主命將士得徳祖者必生致之將軍代人豆代田執徳祖以獻將佐在城中者皆為魏所虜唯參軍范道基將二百人突圍南還魏士卒疫死者亦什二三奚斤等悉定司兖豫諸郡縣置守宰以撫之魏主命周幾鎮河南河南人安之徐羨之傅亮謝晦以亡失境土上表自劾詔勿問徐羨之兄子吳郡太守珮之頗豫政事與侍中王韶之程道惠中書舎人邢安泰潘盛結為黨友時謝晦乆病不堪見客珮之等疑其詐疾有異圖乃稱羨之意以告傅亮欲令亮作詔誅之亮曰我等三人同受顧命豈可自相誅戮諸君果行此事亮當角巾步出掖門耳珮之等乃止五月魏主還平城六月己亥魏宐都文成王穆觀卒丙辰魏主北巡至參合陂秋七月癸酉尊帝母張夫人為皇太后魏主如三會屋矦泉八月辛丑如馬邑觀灅源柔然冦河西河西王䝉遜命世子政徳擊之政徳輕騎進戰為柔然所殺蒙遜立次子興為世子九月乙亥魏主還宫召奚斤還平城留兵守虎牢使娥淸周幾鎮枋頭以司馬楚之所將戶口置汝南南陽南頓新蔡四郡以益豫州冬十月癸卯魏人廣西宫外垣周二十里秃髪傉檀之死也河西王䝉遜遣人誘其故太子虎臺許以番禾西安二郡處之且借之兵使伐秦報其父讎復取故地虎臺隂許之事泄而止秦王熾磐之后虎臺之妹也熾磐待之如初后密與虎臺謀曰秦本我之仇讎雖以婚姻待之蓋時宐耳先王之薨又非天命遺令不治者欲全濟子孫故也為人子者豈可臣妾於仇讎而不思報復乎乃與武衛將軍越質洛城謀弑熾磐后妹為熾磐左夫人有寵知其謀而告之熾磐殺后及虎臺等十餘人十一月魏周幾冦許昌許昌潰潁川太守李元徳奔項戊辰魏人圍汝陽汝陽太守王公度亦奔項劉粹遣其將姚聳夫等將兵助守項城魏人夷許昌城毁鍾城以立封疆而還己巳魏太宗殂壬申世祖即位大赦十二月庚子魏葬明元帝于金陵廟號太宗魏主追尊其母杜貴嬪為密皇后自司徒長孫嵩以下普增爵位以襄城公盧魯元為中書監㑹稽公劉絜為尚書令司衛監尉眷散騎侍郎劉庫仁等八人分典四部眷古眞之弟子也以河内鎮將代人羅結為侍中外都大官揔三十六曹事結時年一百七精爽不衰魏主以其忠慤親任之使兼長秋卿監典後宫出入卧内年一百一十乃聽歸老朝廷毎有大事遣騎訪焉又十年乃卒左光禄大夫崔浩研精經術練習制度凡朝廷禮儀軍國書詔無不關掌浩不好老莊之書曰此矯誣之說不近人情老聃習禮仲尼所師豈肯為敗灋之書以亂先王之治乎尤不信佛灋曰何為事此胡神及世祖即位左右多毁之帝不得已命浩以公歸第然素知其賢毎有疑議輒召問之浩纎妍潔白如美婦人常自謂才比張良而稽古過之既歸第因脩服食養性之術初嵩山道士冦謙之讃之弟也修張道陵之術自言嘗遇老子降命謙之繼道陵為天師授以辟穀輕身之術及科戒二十卷使之清整道教又遇神人李譜丈云老子之􅀇孫也授以圖籙眞經六十餘卷使之輔佐北方太平眞君出天宫靜輪之灋其中數篇李君之手筆也謙之奉其書獻於魏主朝野多未之信崔浩獨師事之從受其術且上書贊明其事曰臣聞聖王受命必有天應河圖洛書皆寄言於蟲獸之丈未若今日人神接對手筆粲然辭㫖深妙自古無比豈可以世俗常慮而忽上靈之命臣竊懼之帝欣然使謁者奉玉帛牲牢祭嵩嶽迎致謙之弟子在山中者以崇奉天師顯揚新灋宣布天下起天師道埸於平城之東南重壇五層給道士百二十人衣食毎月設厨㑹數千人臣光曰老莊之書大指欲同死生輕去就而為神仙者服餌修鍊以求輕舉鍊草石為金銀其為術正相戾矣是以劉歆七略敘道家為諸子神仙為方技其後復有符水禁呪之術至謙之遂合而為一至今循之其訛甚矣崔浩不喜佛老之書而信謙之之言其故何哉昔臧文仲祀爰居孔子以為不智如謙之者其為爰居亦大矣詩三百一言以蔽之曰思無邪君子之於擇術可不慎哉資治通鑑卷第一百一十九
