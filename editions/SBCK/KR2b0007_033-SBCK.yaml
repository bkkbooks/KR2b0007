seq: 33
front:
  text: 姓窮困曰欲退君位尚未忍使尚書令賜君上尊酒十石飬牛一君審處焉方進即日自殺上祕之遣九卿􅁽贈印綬賜乗輿祕器少府供張柱檻皆衣素天子親臨弔者數至禮賜異於它相故事
  hash: sha256:6588c4f481ba920cb44330e29164a036e2c29b89d8146db41841f63dbb0f8ea2
body:
  text: 臣光曰晏嬰有言天命不慆不貳其命禍福之至安可移乎昔楚昭王宋景公不忍移災於卿佐曰移腹心之疾寘諸股肱何益也藉其災可移仁君猶不肯爲况不可乎使方進罪不至死而誅之以當大變是誣天也方進有罪當刑隠其誅而厚其塟是誣人也孝成欲誣天人而卒無所益可謂不知命矣三月上行幸河東祠后土丙戌帝崩于未央宫帝素彊無疾病是時楚思王衍梁王立來朝明旦當辭去上宿供張白虎殿又欲拜左将軍孔光為丞相已刻侯印書賛昏夜平善鄉晨傅絝韈欲起因失衣不能言晝漏上十刻而崩民閒讙譁咸歸罪趙昭儀皇太后詔大司馬莽雜與御史丞相廷尉治問皇帝起居發病状趙昭儀自殺班彪賛曰臣姑充後宫為媫妤父子昆弟侍帷幄數為臣言成帝善修容儀升車正立不内顧不疾言不親指臨朝淵嘿尊嚴若神可謂有穆穆天子之容者矣博覽古今容受直辭公卿奏議可述遭世承平上下和睦然湛乎酒色趙氏亂内外家擅朝言之可為於邑建始以來王氏始執國命哀平短祚莽遂簒位蓋其威福所由來者漸矣是日孔光於大行前拜受丞相博山侯印綬富平侯張放聞帝崩思慕哭泣而死荀悦論曰放非不愛上忠不存焉故愛而不忠仁之賊也皇太后詔南北郊長安如故夏四月丙午太子即皇帝位謁髙廟尊皇太后曰太皇太后皇后曰皇太后大赦天下哀帝初立躬行儉約省減諸用政事由已出朝廷翕然望至治焉己邜塟孝成皇帝于延陵太皇太后令傅太后丁姬十日一至未央宫有詔問丞相大司空定陶共王太后宜當何居丞相孔光素聞傅太后為人剛􅁀長於權謀自帝在襁褓而飬長教道至於成人帝之立又有力光心恐傅太后與政事不欲與帝旦夕相近即議以爲定陶太后宜改築宫大司空何武曰可居北宫上従武言北宫有紫房複道通未央宫傅太后果従􅃨道朝夕至帝所求欲稱尊號貴寵其親屬使上不得由直道行髙昌矦董宏希指上書言秦荘襄王母本夏氏而為華陽夫人所子及即位後俱稱太后宜立定陶共王后為帝太后事下有司大司馬王莽左将軍關内侯領尚書事師丹劾奏宏知皇太后至尊之號天下一綂而稱引亡秦以為比喻詿誤聖朝非所宜言大不道上新立謙讓納用莽丹言免宏為庶人傅太后大怒要上欲必稱尊號上乃白太皇太后令下詔尊定陶恭王為恭皇五月丙戌立皇后傅氏傅太后従弟晏之子也詔曰春秋母以子貴宜尊定陶太后曰恭皇太后丁姬曰恭皇后各置左右詹事食邑如長信宫中官追尊傅父為崇祖矦丁父為褒徳侯封舅丁明為陽安侯舅子滿為平周矦皇后父晏為孔鄉矦皇太后弟侍中光禄大夫趙欽為新城矦太皇太后詔大司馬莽就第避帝外家莽上䟽乞骸骨帝遣尚書令詔起莽又遣丞相孔光大司空何武左将軍師丹衛尉傅喜白太皇太后曰皇帝聞太后詔甚悲大司馬即不起皇帝即不敢聴政太后乃復令莽視事成帝之世鄭聲尤甚黄門名倡丙彊景武之屬富顯於世貴戚至與人主争女樂帝自為定陶王時疾之又性不好音六月詔曰孔子不云乎放鄭聲鄭聲淫其罷樂府官郊祭樂及古兵灋武樂在經非鄭衛之樂者條奏别屬他官凡所罷省過半然百姓漸漬日乆又不制雅樂有以相變豪富吏民湛沔自若王莽薦中壘校尉劉歆有材行為侍中稍遷光禄大夫貴幸更名秀上復令秀典領五經卒父前業秀於是總羣書而奏其七畧有輯略有六蓺略有諸子略有詩賦略有兵書略有術數略有方技略凡書六略三十八種五百九十六家萬三千二百六十九卷其叙諸子分為九流曰儒曰道曰隂陽曰灋曰名曰墨曰從横曰雜曰農以爲為九家皆起於王道既㣲諸侯力政時君世主好惡殊方是以九家之術蠭出並作各引一端崇其所善以此馳説取合諸侯其言雖殊譬猶水火相滅亦相生也仁之與義敬之與和相反而皆相成也易曰天下同歸而殊途一致而百慮今異家者推所長窮知究慮以明其指雖有蔽短合其要歸亦六經之支與流裔使其人遭明王聖主得其所折中皆股肱之材已仲尼有言禮失而求諸野方今去聖乆逺道術缺廢無所更索彼九家者不猶愈於野乎若能脩六蓺之術而觀此九家之言舎短取長則可以通萬方之略矣河閒恵王良能脩獻王之行母太后薨服喪如禮詔益封萬户以為宗室儀表初董仲舒説武帝以秦用商鞅之灋除井田民得賣買富者田連阡陌貧者亡立錐之地邑有人君之尊里有公侯之富小民安得不困古井田灋雖難卒行宜少近古限民名田以贍不足塞并兼之路去奴婢除専殺之威薄賦歛省繇役以寛民力然後可善治也及上即位師丹復建言今累世承平豪富吏民訾數鉅萬而貧弱愈困宜略為限天子下其議丞相光大司空武奏請自諸侯王列侯公主名田各有限關内侯吏民名田皆毋過三十頃奴婢毋過三十人期盡三年犯者沒入官時田宅奴婢賈為減賤貴戚近習皆不便也詔書且須後遂寑不行又詔齊三服官諸官織綺繡難成害女紅之物皆止無作輸除任子令及誹謗詆欺灋掖廷宫人年三十以下出嫁之官奴婢五十以上免為庶人益吏三百石以下俸上置酒未央宫内者令為傅太后張幄坐於太皇太后坐旁大司馬莽按行責内者令曰定陶太后藩妾何以得與至尊並徹去更設坐傅太后聞之大怒不肯㑹重怨恚莽莽復乞骸骨秋七月丁夘上賜莽黄金五百斤安車駟馬罷就第公卿大夫多稱之者上乃加恩寵置中黄門為莽家給使十日一賜餐又下詔益封曲陽侯根安陽侯舜新都侯莽丞相光大司空武邑户各有差以莽為特進給事中朝朔望見禮如三公又還紅陽侯立於京師傅太后従弟右将軍喜好學問有志行王莽既罷退衆庶歸望於喜初上之官爵外親也喜獨執謙稱疾傅太后始與政事數諫之由是傅太后不欲令喜輔政庚午以左将軍師丹為大司馬封髙鄉亭侯賜喜黄金百斤上右将軍印綬以光禄大夫飬病以光禄勲淮陽彭宣為右将軍大司空何武尚書令唐林皆上書言喜行義修潔忠誠憂國内輔之臣也今以寑病一旦遣歸衆庶失望皆曰傅氏賢子以論議不合於定陶太后故退百寮莫不為國恨之忠臣社稷之衛魯以季友治亂楚以子玉輕重魏以無忌折衝項以范増存亡百萬之衆不如一賢故秦行千金以閒亷頗漢散萬金以䟽亞夫喜立於朝陛下之光輝傅氏之廢興也上亦自重之故尋復進用焉建平侯杜業上書詆曲陽侯王根髙陽侯薛宣安昌侯張禹而薦朱博帝少而聞知王氏驕盛心不能善以初立故且優之後月餘司􅀠校尉解光奏曲陽侯先帝山陵未成公聘取故掖庭女樂五官殷嚴王飛君等置酒歌舞及根兄子成都侯况亦聘取故掖庭貴人以為妻皆無人臣禮大不敬不道於是天子曰先帝遇根况父子至厚也今乃背忘恩義以根嘗建社稷之䇿遣就國免况為庶人歸故郡根及况父商所薦舉為官者皆罷九月庚申地震自京師到北邊郡國三十餘處壞城郭凡壓殺四百餘人上以災異問待詔李尋對曰夫日者衆陽之長人君之表也君不修道則日失其度晻昧亡光閒者日尤不精光明侵奪失色邪氣珥蜺數作小臣不知内事竊以日視陛下志操衰於始初多矣唯陛下執乾剛之德彊志守度母聴女謁邪臣之態諸保阿乳母甘言悲辭之託斷而勿聴勉彊大􅁩絶小不忍良有不得已可賜以貨財不可私以官位誠皇天之禁也臣聞月者衆隂之長妃后大臣諸矦之象也閒者月數爲變此爲母后與政亂朝隂陽俱傷兩不相便外臣不知朝事竊信天文即如此近臣已不足杖矣唯陛下親求賢士無彊所惡以崇社稷尊彊本朝臣聞五行以水爲本水爲準平王道公正脩明則百川理落脉通偏黨失綱則涌溢爲敗今汝潁漂涌與雨水並爲民害此詩所謂百川沸騰咎在皇甫卿士之屬唯陛下少抑外親大臣臣聞地道柔靜隂之常義也間者關東地數震宜務崇陽抑隂以救其咎固志建威閉絶私路拔進英雋退不任職以彊本朝夫本彊則精神折衝本弱則招殃致凶爲邪謀所陵聞往者淮南王作謀之時其所難者獨有汲黯以爲公孫弘等不足言也弘漢之名相於今亡比而尚見輕何况亡弘之屬乎故曰朝廷亡人則爲賊亂所輕其道自然也騎都尉平當使領河隄奏九河今皆窴滅桉經義治水有決河深川而無隄防壅塞之文河從魏郡以東北多溢決水迹難以分明四海之衆不可誣宜愽求能浚川䟽河者上從之待詔賈讓奏言治河有上中下䇿古者立國居民疆理土地必遺川澤之分度水埶所不及大川無防小水得入陂障卑下以為汙澤使秋水多得其所休息左右游波寛緩而不廹夫土之有川猶人之有口也治土而防其川猶止兒啼而塞其口豈不遽止然其死可立而待也故曰善為川者決之使道善為民者宣之使言蓋隄防之作近起戰國雍防百川各以自利齊與趙魏以河為竟趙魏瀕山齊地卑下作隄去河二十五里河水東扺齊隄則西泛趙魏趙魏亦為隄去河二十五里雖非其正水尚有所遊盪時至而去則填淤肥美民耕田之或乆無害稍築宮宅遂成聚落大水時至漂沒則更起隄防以自救稍去其城郭排水澤而居之湛溺自其宜也今隄防愜者去水數百步逺者數里於故大隄之内復有數重民居其閒此皆前世所排也河従河内黎陽至魏郡昭陽東西互有石隄激水使還百餘里閒河再西三東廹阨如此不得安息今行上䇿徙冀州之民當水衝者決黎陽遮害亭放河使北入海河西薄大山東薄金隄埶不能逺泛濫朞月自定難者将曰若如此敗壞城郭田廬冡墓以萬數百姓怨恨昔大禹治水山陵當路者毁之故鑿龍門辟伊闕析㡳柱破碣石墮斷天地之性此乃人功所造何足言也今瀕河十郡治隄嵗費且萬萬及其大決所殘無數如出數年治河之費以業所徙之民遵古聖之灋定山川之位使神人各處其所而不相奸且以大漢方制萬里豈其與水争咫尺之地哉此功一立河定民安千載無患故謂之上策若乃多穿漕渠於冀州地使民得以溉田分殺水怒雖非聖人灋然亦救敗術也可従淇口以東為石隄多張水門恐議者疑河大川難禁制滎陽漕渠足以卜之冀州渠首盡當仰此水門諸渠皆徃徃股引取之旱則開東方下水門溉冀州水則開西方髙門分河流民田適治河隄亦成此誠富國安民興利除害支數百嵗故謂之中䇿若乃繕完故隄増卑倍薄勞費無已數逢其害此最下䇿也孔光何武奏迭毁之次當以時定請與羣臣雜議於是光禄勲彭宣等五十三人皆以為孝武皇帝雖有功烈親盡宜毁太僕王舜中壘校尉劉歆議曰禮天子七廟七者其正法數可常數者也宗不在此數中宗變也苟有功徳則宗之不可預為設數臣愚以為孝武皇帝功烈如彼孝宣皇帝崇立之如此不宜毁上覽其議制曰太僕舜中壘校尉歆議可何武後母在蜀郡遣吏歸迎㑹成帝崩吏恐道路有盗賊後母留止左右或譏武事親不篤帝亦欲改易大臣冬十月䇿免武以列侯歸國癸酉以師丹為大司空丹見上多所匡改成帝之政乃上書言古者諒闇不言聴於冡宰三年無改於父之道前大行屍柩在堂而官爵臣等以及親屬赫然皆貴寵封舅為陽安侯皇后尊號未定豫封父為孔鄉侯出侍中王邑射聲校尉王邯等詔書比下變動政事卒暴無漸臣縦不能明陳大義復曽不能牢讓爵位相隨空受封侯増益陛下之過間者郡國多地動水出流殺人民日月不明五星失行此皆舉錯失中號令不定灋度失理隂陽溷濁之應也臣伏惟人情無子年雖六七十猶博取而廣求孝成皇帝深見天命燭知至徳以壮年克己立陛下為嗣先帝暴棄天下而陛下繼體四海安寧百姓不懼此先帝聖徳當合天人之功也臣聞天威不違顔咫尺願陛下深思先帝所以建立陛下之意且克己躬行以觀羣下之従化天下者陛下之家也胏附何患不富貴不宜倉卒若是其不乆長矣丹書數十上多切直之言傅太后従弟子遷在左右尤傾邪上惡之免官遣歸故郡傅太后怒上不得已復留遷丞相光與大司空丹奏言詔書前後相反天下疑惑無所取信臣請歸遷故郡以銷姦黨卒不得遣復為侍中其逼於傅太后皆此類也議郎耿育上書寃訟陳湯曰甘延夀陳湯為聖漢揚鉤深致逺之威雪國家累年之恥討絶域不羈之君係萬里難制之虜豈有比哉先帝嘉之仍下明詔宣著其功改年垂歴􅀓之無窮應是南郡獻白虎邊垂無警備㑹先帝寑疾然猶垂意不忘數使尚書責問丞相趣立其功獨丞相匡衡排而不予封延夀湯數百户此功臣戰士所以失望也孝成皇帝承建業之基乗征伐之威兵革不動國家無事而大臣傾邪欲専主威排妒有功使湯塊然被冤拘囚不能自明卒以無罪老棄燉煌正當西域通道令威名折衝之臣旋踵及身復為郅支遺虜所笑誠可悲也至今奉使外蠻者未甞不陳郅支之誅以揚漢國之盛夫援人之功以懼敵棄人之身以快讒豈不痛哉且安不忘危盛必慮衰今國家素無文帝累年節儉富饒之畜又無武帝薦延梟俊禽敵之臣獨有一陳湯耳假使異世不及陛下尚望國家追録其功封表其墓以勸後進也湯幸得身當聖世功曽未乆反聴邪臣鞭逐斥逺使亡逃分竄死無處所逺覽之士莫不計度以為湯功累世不可及而湯過人情所有湯尚如此雖復破絶筋骨暴露形骸猶復制於脣舌為嫉妒之臣所係虜耳此臣所以為國家尤戚戚也書奏天子還湯卒於長安孝哀皇帝上建平元年春正月隕石于北地十六赦天下司􅀠解光奏言臣聞許美人及故中宫史曹宫皆御幸孝成皇帝産子子隠不見臣遣吏驗問皆得其状元延元年宫有身其十月宫乳掖庭牛官令舎中黄門田客持詔記與掖庭獄丞籍武令收置暴室獄母問兒男女誰兒也宫曰善臧我兒胞丞知是何等兒也後三日客持詔記與武問兒死未武對未死客曰上與昭儀大怒柰何不殺武叩頭啼曰不殺兒自知當死殺之亦死即因客奏封事曰陛下未有繼嗣子無貴賤唯留意奏入客復特詔記取兒付中黄門王舜舜受詔内兒殿中爲擇乳母吿善飬兒且有賞母令漏泄舜擇官婢張棄爲乳母後三日客復持詔記并藥以飲宫宫曰果也欲姊弟擅天下我兒男也頟上有壯髪類孝元皇帝今兒安在危殺之矣柰何令長信得聞之遂飲藥死棄所飬兒十一日宫長李南以詔書取兒去不知所置許美人元延二年懷子十一月乳昭儀謂成帝曰常紿我言從中宫來即從中宫來許美人兒何從生中許氏竟當復立邪懟以手自擣以頭擊壁户柱從牀上自投地啼泣不肯食曰今當安置我我欲歸耳帝曰今故告之反怒為殊不可曉也帝亦不食昭儀曰陛下自知是不食何為陛下常自言約不負女今美人有子竟負約謂何帝曰約以趙氏故不立許氏使天下無出趙氏上者毋憂也後詔使中黄門靳嚴従許美人取兒去盛以葦箧置飾室簾南去帝與昭儀坐使御者于客子解箧緘未巳帝使客子及御者皆出自閉户獨與昭儀在須㬰開户嘑客子使緘封箧及詔記令中黄門吴恭持以與籍武曰告武箧中有死兒埋屏處勿令人知武穿獄樓垣下為坎埋其中其它飲藥傷墯者無數事皆在四月丙辰赦令前臣謹案永光三年男子忠等發長陵傅夫人冡事更大赦孝元皇帝下詔曰此朕所不當得赦也窮治盡伏辜天下以為當趙昭儀傾亂聖朝親滅繼嗣家屬當伏天誅而同産親屬皆在尊貴之位廹近帷幄羣下寒心請事窮竟丞相以下議正灋帝於是免新成侯趙欽欽兄子成陽侯訢皆為庶人将家屬徙遼西郡議郎耿育上䟽言臣聞繼嗣失統廢適立庶聖人灋禁古今至戒然太伯見歴知適逡循固讓委身吴粤權變所設不計常灋致位王季以崇聖嗣卒有天下子孫承業七八百載功冠三王道徳最備是以尊號追及太王故世必有非常之變然後乃有非常之謀孝成皇帝自知繼嗣不以時立念雖未有皇子萬嵗之後末能持國􅁠柄之重制於女主女主驕盛則耆欲無極少主幼弱則大臣不使世無周公抱負之輔恐危社稷傾乱天下知陛下有賢聖通明之徳仁孝子愛之恩懷獨見之明内斷於身故廢後宫就館之漸絶㣲嗣禍乱之根乃欲致位陛下以安宗廟愚臣既不能深援安危定金匱之計又不知推演聖徳述先帝之志乃反覆校省内暴露私燕誣汙先帝傾惑之過成結寵妾妬媢之誅甚失聖賢逺見之明逆負先帝憂國之意夫論大徳不拘俗立大功不合衆此乃孝成皇帝至思所以萬萬於衆臣陛下聖徳盛茂所以符合於皇天也豈當世庸庸斗筲之臣所能及哉且褒廣将順君父之美匡救銷滅既往之過古今通義也事不當時固争防禍於未然各隨指阿従以求容媚晏駕之後尊號已定萬事已訖乃探追不及之事訐揚幽昧之過此臣所深痛也願下有司議即如臣言宜宣布天下使咸曉知先帝聖意所起不然空使謗議上及山陵下流後世逺聞百蠻近布海内甚非先帝託後之意也蓋孝子善述父之志善成人之事唯陛下省察帝亦以為太子頗得趙太后力遂不竟其事傅太后恩趙太后趙太后亦歸心故太皇太后及王氏皆怨之丁酉光禄大夫傅喜為大司馬封髙武侯秋九月甲辰隕石于虞二郎中令泠襃黄門郎叚猶等復奏言定陶共皇太后共皇后皆不宜復引定陶藩國之名以冠大號車馬衣服宜皆稱皇之意置吏二千石以下各供厥職又宜為共皇立廟京師上復下其議羣下多順指言母以子貴宜立尊號以厚孝道唯丞相光大司馬喜大司空丹以為不可丹曰聖王制禮取灋於天地尊卑者所以正天地之位不可亂也今定陶共皇太后共皇后以定陶共為號者母従子妻従夫之義也欲立官置吏車服與太皇太后並非所以明尊無二上之義也定陶共皇號謚已前定義不得復改禮父為士子為天子祭以天子其尸服以士服子無爵父之義尊父母也為人後者為之子故為所後服斬衰三年而降其父母朞明尊本祖而重正統也孝成皇帝聖恩深逺故為共王立後奉承祭祀令共皇長為一國太祖萬世不毁恩義已備陛下既繼體先帝持重大宗承宗廟天地社稷之祀義不可復奉定陶共皇祭入其廟今欲立廟於京師而使臣下祭之是無主也又親盡當毁空去一國太祖不墮之祀而就無主當毁不正之禮非所以尊厚共皇也丹由是浸不合上意㑹有上書言古者以龜貝為貨今以錢易之民以故貧宜可改幣上以問丹丹對言可改章下有司議皆以為行錢以來乆難卒變易丹老人忘其前語復従公卿議又丹使吏書奏吏私寫其草丁傅子弟聞之使人上書告丹上封事行道人徧持其書上以問将軍中朝臣皆對曰忠臣不顯諫大臣奏事不宜漏泄宜下廷尉治事下廷尉劾丹大不敬事未决給事中博士申咸炔欽上書言丹經行無比自近世大臣能若丹者少發憤懣奏封事不及深思逺慮使主簿書漏泄之過不在丹以此貶黜恐不厭衆心上貶咸欽秩各二等遂䇿免丹曰朕惟君位尊任重懷諼迷國進退違命反覆異言甚為君恥之以君甞託傅位未忍考于理其上大司空髙樂侯印綬罷歸尚書令唐林上䟽曰竊見免大司空丹䇿書泰深痛切君子作文為賢者諱丹經為世儒宗徳為國黄耉親傅聖躬位在三公所坐者㣲海内未見其大過事既已徃免爵太重京師識者咸以為宜復丹爵邑使奉朝請唯陛下裁覽衆心有以尉復師傅之臣上從林言下詔賜丹爵關内矦上用杜業之言召見朱博起家復爲光禄大夫遷京兆尹冬十月壬午以博爲大司空中山王箕子㓜有眚病祖母馮太后自飬視數禱祠解上遣中郎謁者張由將毉治之由素有狂易病病發怒去西歸長安尚書簿責由擅去状由恐因誣言中山太后祝詛上及傅太后傅太后與馮太后並事元帝追怨之因是遣御史丁玄案驗數十日無所得更使中謁者令史立治之立受傅太后指冀得封矦治馮太后女弟習及弟婦君之死者數十人誣奏云祝詛謀殺上立中山王責問馮太后無服辭立曰熊之上殿何其勇今何怯也太后還謂左右此乃中語前世事吏何用知之欲䧟我效也乃飲藥自殺宜鄉侯參君之習夫及子當相坐者或自殺或伏灋凡死者十七人衆莫不憐之司􅀠孫寳奏請覆治馮氏獄傅太后大怒曰帝置司􅀠主使察我馮氏反事明白故欲擿抉以揚我惡我當坐之上乃順指下寳獄尚書僕射唐林争之上以林朋黨比周左遷燉煌魚澤障侯大司馬傅喜光禄大夫龔勝固争上為言太后出寳復官張由以先告賜爵關内侯史立遷中太僕資治通鑑卷第三十三
