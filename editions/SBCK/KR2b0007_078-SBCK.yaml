body:
  text: 吳主以濮陽興為丞相廷尉丁密光禄勲孟宗為左右御史大夫初興為㑹稽太守吳主在㑹稽興遇之厚左將軍張布嘗為㑹稽王左右督將故吳主即位二人皆貴寵用事布典宫省興關軍國以佞巧更相表裏吳人失望吳主喜讀書欲與博士祭酒韋昭博士盛沖講論張布以昭沖切直恐其入侍言已隂過固諫止之吳主曰孤之渉學羣書略徧但欲與昭等講習舊聞亦何所損君特當恐昭等道臣下姦慝故不欲令入耳如此之事孤已自備之不湏昭等然後乃解也布惶恐陳謝且言懼妨政事吳主曰王務學業其流各異不相妨也此無所為非而君以為不宜是以孤有所及耳不圖君今日在事更行此於孤也良甚不取布拜表叩頭吳主曰聊相開悟耳何至叩頭乎如君之忠誠逺近所知吾今日之巍巍皆君之功也詩云靡不有初鮮克有終終之實難君其終之然吳主恐布疑懼卒如布意廢其講業不復使昭等入譙郡嵇康文辭壯麗好言老荘而尚竒任俠與陳留阮籍籍兄子咸河内山濤河南向秀琅邪王戎沛人劉伶特相友善號竹林七賢皆崇尚虚無輕蔑禮法縱酒昬酣遺落世事阮籍為歩兵校尉其母卒籍方與人圍碁對者求止籍留與決賭既而飲酒二斗舉聲一號吐血數升毁瘠骨立居䘮飲酒無異平日司􅀠校尉何曽惡之面質籍於司馬昭座曰卿縱情背禮敗俗之人今忠賢執政綜核名實若卿之曹不可長也因謂昭曰公方以孝治天下而聽阮籍以重哀飲酒食肉於公座何以訓人宜擯之四裔無令汙染華夏昭愛籍才常擁護之曾䕫之子也阮咸素幸姑婢姑將婢去咸方對客遽借客馬而追之累騎而還劉伶嗜酒常乗鹿車㩦一壺酒使人荷鍤隨之曰死便埋我當時士大夫皆以為賢爭慕效之謂之放逹鍾㑹方有寵於司馬昭聞嵇康名而造之康箕踞而鍜不為之禮㑹將去康曰何所聞而來何所見而去㑹曰聞所聞而來見所見而去遂深衘之山濤為吏部郎舉康自代康與濤書自説不堪流俗而非薄湯武昭聞而怒之康與東平呂安親善安兄巽誣安不孝康為證其不然㑹因譖康嘗欲助毋丘儉且安康有盛名於世而言論放蕩害時亂教宜因此除之昭遂殺安及康康嘗詣隱者汲郡孫登登曰子才多識寡難乎免於今之世矣司馬昭患姜維數為宼官騎路遺求為刺客入蜀從事中郎荀朂曰明公為天下宰宜杖正義以伐違貳而以刺客除賊非所以刑于四海也昭善之朂爽之曾孫也昭欲大舉伐漢朝臣多以為不可獨司􅀠校尉鍾㑹勸之昭諭衆曰自定夀春已來息役六年治兵繕甲以擬二虜今吳地廣大而下濕攻之用功差難不如先定巴蜀三年之後因順流之埶水陸並進此滅虢取虞之埶也計蜀戰士九萬居守成都及僃他境不下四萬然則餘衆不過五萬今絆姜維於沓中使不得東顧直指駱谷出其空虚之地以襲漢中以劉禪之闇而邉城外破士女内震其亡可知也乃以鍾㑹為鎮西將軍都督關中征西將軍鄧艾以為蜀未有釁屢陳異議昭使主簿師纂為艾司馬以諭之艾乃奉命姜維表漢主聞鍾㑹治兵關中欲規進取宜並遣左右車騎張翼廖化督諸軍分䕶陽安關口及隂平之橋頭以防未然黄皓信巫鬼謂敵終不自致啓漢主寢其事羣臣莫知四年春二月復命司馬昭進爵位如前又辭不受吳交趾太守孫諝貪暴為百姓所患㑹吳主遣察戰鄧荀至交趾荀擅調孔爵三十頭送建業民憚逺役因謀作亂夏五月郡吏呂興等殺諝及荀遣使來請太守及兵九真日南皆應之詔諸軍大舉伐漢遣征西將軍鄧艾督三萬餘人自狄道趣甘松沓中以連綴姜維雍州刺史諸葛緒督三萬餘人自祁山趣武街橋頭絶維歸路鍾㑹統十餘萬衆分從斜谷駱谷子午谷趣漢中以廷尉衛瓘持節監艾㑹軍事行鎮西軍司瓘覬之子也㑹過幽州刺史王雄之孫戎問計將安出戎曰道家有言為而不恃非成功難保之難也或以問參相國軍事平原劉寔曰鍾鄧其平蜀乎寔曰破蜀必矣而皆不還客問其故寔笑而不荅秋八月軍發洛陽大賚將士陳師誓衆將軍鄧敦謂蜀未可討司馬昭斬以徇漢人聞魏兵且至乃遣廖化將兵詣沓中為姜維繼援張翼董厥等詣陽安關口為諸圍外助大赦改元炎興敕諸圍皆不得戰退保漢樂二城城中各有兵五千人翼厥比至隂平聞諸葛緒將向建威留住月餘待之鍾㑹率諸軍平行至漢中九月鍾㑹使前將含於樂城䕶軍荀愷圍蔣斌於漢城㑹徑過西趣陽安口遣人祭諸葛亮墓初漢武興督蔣舒在事無稱漢朝令人代之使助將軍傅僉守關口舒由是恨鍾㑹使䕶軍胡烈為前鋒攻關口舒詭謂僉曰今賊至不擊而閉城自守非良圖也僉曰受命保城惟全為功今違命出戰若䘮師負國死無益矣舒曰子以保城獲全為功我以出戰克敵為功請各行其志遂率其衆出僉謂其戰也不設備舒率其衆迎降胡烈烈乗虚襲城僉格鬬而死僉肜之子也鍾㑹聞關口已下長驅而前大得庫藏積榖鄧艾遣天水太守王頎直攻姜維營隴西太守牽􅀪邀其前金城太守楊欣趣甘松維聞鍾㑹諸軍已入漢中引兵還欣等追躡於彊川口大戰維敗走聞諸葛緒已塞道屯橋頭乃從孔函谷入北道欲出緒後緒聞之却還三十里維入北道三十餘里聞緒軍却尋還從橋頭過緒趣截維較一日不及維遂還至隂平合集士衆欲赴關城未到聞其已破退趣白水遇廖化張翼董厥等合兵守劒閣以拒㑹安國元侯高柔卒冬十月漢人告急於吳甲申吳主使大將軍丁奉督諸軍向夀春將軍留平就施績於南郡議兵所向将軍丁封孫異如沔中以救漢詔以征蜀諸將獻㨗交至復命大將軍昭進位爵賜一如前詔昭乃受命昭辟任城魏舒為相國參軍初舒少時遲鈍質朴不為鄉親所重從叔父吏部郎衡有名當世亦不知之使守水碓毎歎曰舒堪數百戶長我願畢矣舒亦不以介意不為皎厲之事唯太原王乂謂舒曰卿終當為台輔常振其匱乏舒受而不辭年四十餘郡舉上計掾察孝亷宗黨以舒無學業勸令不就可以為高舒曰若試而不中其負在我安可虛竊不就之高以為已榮乎於是自課百日習一經因而對䇿升第累遷後將軍鍾毓長史毓每與參佐射舒常為畫籌而已後遇朋人不足以舒滿數舒容範閑雅發無不中舉坐愕然莫有敵者毓歎而謝曰吾之不足以盡卿才有如此射矣豈一事哉及為相國參軍府朝碎務未嘗見是非至於廢興大事衆人莫能斷者舒徐為籌之多出衆議之表昭深器重之癸卯立皇后卞氏昭烈將軍秉之孫也鄧艾進至隂平簡選精鋭欲與諸葛緒自江油趣成都緒以本受節度邀姜維西行非本詔遂引軍向白水與鍾㑹合㑹欲專軍埶密白緒畏懦不進檻車徴還軍悉屬㑹姜維列營守險㑹攻之不能克糧道險逺軍食乏欲引還鄧艾上言賊已摧折冝遂乗之若從隂平由邪徑經漢徳陽亭趣涪出劒閣西百里去成都三百餘里竒兵衝其腹心出其不意劒閣之守必還赴涪則㑹方軌而進劒閣之軍不還則應涪之兵寡矣遂自隂平行無人之地七百餘里鑿山通道造作橋閣山髙谷深至為艱險又糧運將匱瀕於危殆艾以氊自裹推轉而下將士皆攀木緣崖魚貫而進先登至江油蜀守將馬邈降諸葛瞻督諸軍拒艾至涪停住不進尚書郎黄崇權之子也屢勸瞻宜速行據險無令敵得入平地瞻猶豫未納崇再三言之至于流涕瞻不能從艾遂長驅而前擊破瞻前鋒瞻退住緜竹艾以書誘瞻曰若降者必表為琅邪王瞻怒斬艾使列陳以待艾艾遣子惠唐亭侯忠等出其右司馬師纂等出其左忠纂戰不利並引還曰賊未可擊艾怒曰存亡之分在此一舉何不可之有叱忠纂等將斬之忠纂馳還更戰大破斬瞻及黄崇瞻子尚歎曰父子荷國重恩不早斬黄皓使敗國殄民用生何為䇿馬冒陳而死漢人不意魏兵卒至不為城守調度聞艾已入平土百姓擾擾皆迸山野不可禁制漢主使羣臣㑹議或以為蜀之與吳本為與國宜可犇吳或以為南中七郡阻險斗絶易以自守宜可犇南光禄大夫譙周以為自古以來無寄他國為天子者今若入吳國亦當臣服且治政不殊則大能吞小此數之自然也由此言之則魏能并吳吳不能并魏明矣等為稱臣為小孰與為大再辱之恥何與一辱且若欲犇南則當蚤為之計然後可果今大敵已近禍敗將及羣小之心無一可保恐發足之日其變不測何至南之有乎或曰今艾已不逺恐不受降如之何周曰方今東吳未賔事埶不得不受受之不得不禮若陛下降魏魏不裂土以封陛下者周請身詣京都以古義爭之衆人皆從周議漢主猶欲入南狐疑未決周上䟽曰南方逺夷之地平常無所供為猶數反叛自丞相亮以兵威偪之窮乃率從今若至南外當拒敵内供服御費用張廣他無所取耗損諸夷其叛必矣漢主乃遣侍中張紹等奉璽綬以降於艾北地王諶怒曰若理窮力屈禍敗將及便當父子君臣背城一戰同死社稷以見先帝可也柰何降乎漢主不聽是日諶哭於昭烈之廟先殺妻子而後自殺張紹等見鄧艾於雒艾大喜報書襃納漢主遣太僕蒋顯别敕姜維使降鍾㑹又遣尚書郎李虎送士民簿於艾戸二十八萬口九十四萬甲士十萬二千吏四萬人艾至成都城北漢主率太子諸王及羣臣六十餘人面縛輿櫬詣軍門艾持節解􅅞焚櫬延請相見檢御将士無得虜略綏納降附使復舊業輙依鄧禹故事承制拜漢主禪行驃騎將軍太子奉車諸王駙馬都尉漢羣司各隨高下拜為王官或領艾官屬以師纂領益州刺史隴西太守牽􅀪等領蜀中諸郡艾聞黄皓姦險收閉將殺之皓賂艾左右卒以得免姜維等聞諸葛瞻敗未知漢主所嚮乃引軍東入于巴鍾會進軍至涪遣胡烈等追維維至郪得漢主敕命乃令兵悉放仗送節傳於胡烈自從東道與廖化張翼董厥等同詣㑹降將士咸怒㧞刀斫石於是諸郡縣圍守皆被漢主敕罷兵降鍾㑹厚待姜維等皆權還其印綬節蓋吳人聞蜀已亡乃罷丁奉等兵吳中書丞吳郡華覈詣宫門上表曰伏聞成都不守臣主播越社稷傾覆失委附之土棄貢獻之國臣以草芥竊懐不寧陛下聖仁恩澤逺撫卒聞如此必垂哀悼臣不勝忡悵之情謹拜表以聞魏之伐蜀也吳人或謂襄陽張悌曰司馬氏得政以來大難屢作百姓未服今又勞力逺征敗於不暇何以能克悌曰不然曹操雖功蓋中夏民畏其威而不懷其德也丕叡承之刑繁役重東西驅馳無有寧嵗司馬懿父子累有大功除其煩苛而布其平惠為之謀主而救其􅍚苦民心歸之亦已乆矣故淮南三叛而腹心不擾曹髦之死四方不動任賢使能各盡其心其本根固矣姦計立矣今蜀閹宦專朝國無政令而玩戎黷武民勞卒敝競於外利不脩守僃彼彊弱不同智筭亦勝因危而伐殆無不克噫彼之得志我之憂也吳人笑其言至是乃服吳人以武陵五溪夷與蜀接界蜀亡懼其叛亂乃以越騎校尉鍾離牧領武陵太守魏已遣漢葭縣長郭純試守武陵太守率涪陵民入遷陵界屯于赤沙誘動諸夷進攻酉陽郡中震懼牧問朝吏曰西蜀傾覆邊境見侵何以禦之皆對曰今二縣山險諸夷阻兵不可以軍驚擾驚擾則諸夷盤結宜以漸安可遣恩信吏宣敎慰勞牧曰不然外境内侵誑誘人民當及其根柢未深而撲取之此救火貴速之埶也敕外趣嚴撫夷將軍高尚謂牧曰昔潘太常督兵五萬然後討五谿夷是時劉氏連和諸夷率化今旣無往日之援而郭純已據遷陵而明府以三千兵深入尚未見其利也牧曰非常之事何得循舊即率所領晨夜進道緣山險行垂二千里斬惡民懷異心者魁帥百餘人及其支黨凡千餘級純等散走五溪皆平十二月庚戌以司徒鄭沖為太保壬子分益州為梁州癸丑特赦益州士民復除租税之半五年乙卯以鄧艾為太尉增邑二萬戸鍾㑹為司徒增邑萬戸皇太后郭氏殂鄧艾在成都頗自矜伐謂蜀士大夫曰諸君賴遭艾故得有今日耳如遇吳漢之徒已殄滅矣艾以書言於晉公昭曰兵有先聲而後實者今因平蜀之􅀔以乗吳吳人震恐席卷之時也然大舉之後將士疲勞不可便用且徐緩之留隴右兵二萬人蜀兵二萬人煑鹽興冶為軍農要用並作舟船豫為順流之事然後發使告以利害吳必歸化可不征而定也今宜厚劉禪以致孫休封禪為扶風王錫其資財供其左右郡有董卓塢為之宫舍爵其子為公侯食郡内縣以顯歸命之寵開廣陵城陽以待吳人則畏威懷徳望風而從矣昭使監軍衛瓘喻艾事當須報不宜輙行艾重言曰銜命征行奉指授之䇿元惡旣服至於承制拜假以安初附謂合權宜今蜀舉衆歸命地盡南海東接吳㑹宜早鎮定若待國命往復道途延引日月春秋之義大夫出疆有可以安社稷利國家專之可也今吳未賔埶與蜀連不可拘常以失事機兵法進不求名退不避罪艾雖無古人之節終不自嫌以損國家計也鍾㑹内有異志姜維知之欲􅌟成擾亂乃説㑹曰聞君自淮南已來筭無遺䇿晉道克昌皆君之力今復定蜀威徳振世民高其功主畏其謀欲以此安歸乎何不法陶朱公泛舟絶迹全功保身邪㑹曰君言逺矣我不能行且爲今之道或未盡於此也維曰其佗則君智力之所能無煩於老夫矣由是情好歡甚出則同轝坐則同席㑹因鄧艾承制專事乃與衞瓘密白艾有反狀㑹善效人書於劒閣要艾章表白事皆易其言令辭指悖傲多自矜伐又毁晉公昭報書手作以疑之咸熈元年春正月壬辰詔以檻車徴鄧艾晉公昭恐艾不從命敕鍾㑹進軍成都又遣賈充將兵入斜谷昭自將大軍從帝幸長安以諸王公皆在鄴乃以山濤為行軍司馬鎮鄴初鍾㑹以才能見任昭夫人王氏言於昭曰㑹見利忘義好為事端寵過必亂不可大任及㑹將伐漢西曹屬邵悌言於晉公曰今遣鍾㑹率十萬餘衆伐蜀愚謂㑹單身無任不若使餘人行也晉公笑曰我寧不知此邪蜀數為邉宼師老民疲我今伐之如指掌耳而衆言蜀不可伐夫人心豫怯則智勇並竭智勇並竭而彊使之適所以為敵禽耳惟鍾㑹與人意同今遣㑹伐蜀蜀必可滅滅蜀之後就如卿慮何憂其不能辦邪夫蜀已破亡遺民震恐不足與共圖事中國將士各自思歸不肯與同也㑹若作惡秪自滅族耳卿不湏憂此慎勿使人聞也及晉公將之長安悌復曰鍾㑹所統兵五六倍於鄧艾但可敕㑹取艾不須自行晉公曰卿忘前言邪而云不須行乎雖然所言不可宣也我要自當以信意待人但人不當負我耳我豈可先人生心哉近日賈䕶軍問我頗疑鍾㑹不我荅言如今遣卿行寜可復疑卿邪賈亦無以易我語也我到長安則自了矣鍾㑹遣衛瓘先至成都収鄧艾㑹以瓘兵少欲令艾殺瓘因以為艾罪瓘知其意然不可得距乃夜至成都檄艾所統諸將稱奉詔収艾其餘一無所問若來赴官軍爵賞如先敢有不出誅及三族比至鷄鳴悉來赴瓘唯艾帳内在焉平旦開門瓘乗使者車徑入至艾所居艾尚卧未起遂執艾父子置艾於檻車諸將圖欲劫艾整仗趣瓘營瓘輕出迎之偽作表草将申明艾事諸將信之而止丙子㑹至成都送艾赴京師㑹所憚惟艾艾父子既禽㑹獨統大衆威震西土遂決意謀反㑹欲使姜維將五萬人出斜谷為前驅㑹自將大衆隨其後既至長安令騎士從陸道歩兵從水道順流浮渭入河以為五日可到孟津與騎兵㑹洛陽一旦天下可定也㑹得晉公書云恐鄧艾或不就徴今遣中䕶軍賈充將歩騎萬人徑入斜谷屯樂城吾自将十萬屯長安相見在近㑹得書驚呼所親語之曰但取鄧艾相國知我獨辦之今來大重必覺我異矣便當速發事成可得天下不成退保蜀漢不失作劉僃也丁丑㑹悉請䕶軍郡守牙門騎督以上及蜀之故官爲太后發哀於蜀朝堂矯太后遺詔使㑹起兵廢司馬昭皆班示坐上人使下議訖書版署置更使所親信代領諸軍所請羣官悉閉著益州諸曹屋中城門宮門皆閉嚴兵圍守衛瓘詐稱􅍚篤出就外廨㑹信之無所復憚姜維欲使㑹盡殺北來諸將已因殺㑹盡坑魏兵復立漢主密書與劉禪曰願陛下忍數日之辱臣欲使社稷危而復安日月幽而復明㑹欲從維言誅諸將猶䂊未決㑹帳下督丘建本屬胡烈㑹愛信之建愍烈獨坐啓㑹使聽内一親兵出取飲食諸牙門隨例各内一人烈紿語親兵及䟽與其子淵曰丘建宻説消息㑹已作大坑白棓數千欲悉呼外兵入人賜白㡊拜散將以次棓殺内坑中諸牙門親兵亦咸説此語一夜轉相告皆徧己夘日中胡淵率其父兵雷鼓出門諸軍不期皆鼓譟而出曾無督促之者而爭先赴城時㑹方給姜維鎧仗白外有匈匈聲似失火者有頃白兵走向城㑹驚謂維曰兵來似欲作惡當云何維曰但當擊之耳㑹遣兵悉殺所閉諸牙門郡守內人共舉机以柱門兵斫門不能破斯須城外倚梯登城或燒城屋蟻附亂進矢下如雨牙門郡守各緣屋出與其軍士相得姜維率㑹左右戰手殺五六人衆格斬維爭前殺㑹㑹將士死者數百人殺漢太子璿及姜維妻子軍衆鈔略死䘮狼籍衛瓘部分諸将數日乃定鄧艾本營將士追出艾於檻車迎還衛瓘自以與㑹共陷艾恐其為變乃遣䕶軍田續等將兵襲艾遇於緜竹西斬艾父子艾之入江油也田續不進艾欲斬續既而捨之及瓘遣續謂曰可以報江油之辱矣鎮西長史杜預言於衆曰伯玉其不免乎身為名士位望已高既無徳音又不御下以正將何以堪其責乎瓘聞之不􅀱駕而謝預預恕之子也鄧艾餘子在洛陽者悉伏誅徙其妻及孫於西城鍾㑹兄毓嘗密言於晉公曰㑹挾術難保不可專任及㑹反毓已卒晉公思鍾繇之勲與毓之賢特原毓子峻辿官爵如故㑹功曹向雄収葬㑹尸晉公召而責之曰往者王經之死卿哭於東市而我不問鍾㑹躬為叛逆又輙收葬若復相容其如王法何雄曰昔先王掩骼埋胔仁流朽骨當時豈先卜其功罪而後收葬哉今王誅既加於法已僃雄感義収葬敎亦無闕法立於上敎􅀪於下以此訓物不亦可乎何必使雄背死違生以立於世明公讎對枯骨捐之中野豈仁賢之度哉晉公恱與宴談而遣之二月丙辰車駕還洛陽庚申葬明元皇后初劉禪使巴東太守襄陽羅憲將兵二千人守永安聞成都敗吏民驚擾憲斬稱成都亂者一人百姓乃定及得禪手敕乃帥所統臨于都亭三日吴聞蜀敗起兵西上外託救援内欲襲憲憲曰本朝傾覆吴為脣齒不恤我難而背盟徼利不義甚矣且漢已亡吳何得久我寜能為吳降虜乎保城繕甲告誓將士厲以節義莫不憤激吳人聞鍾鄧敗百城無主有兼蜀之志而巴東固守兵不得過乃使撫軍歩恊率衆而西憲力弱不能禦遣參軍楊宗突圍北出告急於安東將軍陳騫又送文武印綬任子詣晉公恊攻永安憲與戰大破之吳主怒復遣鎮軍陸抗等帥衆三萬人增憲之圍三月丁丑以司空王祥為太尉征北將軍何曾為司徒左僕射荀顗為司空􅊨己夘進晉公爵為王增封十郡王祥何曾荀顗共詣晉王顗謂祥曰相王尊重何侯與一朝之臣皆已盡敬今日便當相率而拜無所疑也祥曰相國雖尊要是魏之宰相吾等魏之三公王公相去一階而已安有天子三公可輙拜人者損魏朝之望虧晉王之徳君子愛人以禮我不為也及入顗遂拜而祥獨長揖王謂祥曰今日然後知君見顧之重也􅊨劉禪舉家東遷洛陽時擾攘倉猝禪之大臣無從行者惟袐書令郤正及殿中督汝南張通捨妻子單身隨禪禪頼正相導冝適舉動無闕乃慨然歎息恨知正之晩初漢建寜太守霍弋都督南中聞魏兵至欲赴成都劉禪以備敵既定不聽成都不守弋素服大臨三日諸將咸勸弋冝速降弋曰今道路隔塞未詳主之安危去就大故不可茍也若魏以禮遇主上則保境而降不晩也若萬一危辱吾將以死拒之何論遲速邪得禪東遷之問始率六郡将守上表曰臣聞人生於三事之如一惟難所在則致其命今臣國敗主附守死無所是以委質不敢有貳晉王善之拜南中都尉委以本任丁亥封劉禪為安樂公子孫及羣臣封侯者五十餘人晉王與襌宴為之作故蜀􅇊旁人皆為之感愴而禪喜笑自若王謂賈充曰人之無情乃至於是雖使諸葛亮在不能輔之乆全况姜維邪佗日王問禪曰頗思蜀否禪曰此間樂不思蜀也郤正聞之謂禪曰若王後問冝泣而荅曰先人墳墓逺在岷蜀乃心西悲無日不思因閉其目㑹王復問禪對如前王曰何乃似郤正語邪禪驚視曰誠如尊命左右皆笑夏四月新附督王稚浮海入吴句章略其長吏及男女二百餘口而還五月庚申晉王奏復五等爵封騎督以上六百餘人甲戍改元癸未追命舞陽文宣矦懿為晉宣王忠武矦師為景王羅憲被攻凡六月救援不到城中疾病太半或説憲棄城走憲曰吾為城主百姓所仰危不能安急而棄之君子不爲也畢命於此矣陳騫言於晉王遣荆州刺史胡烈將歩騎二萬攻西陵以救憲秋七月吳師退晉王使憲因仍舊任加陵江將軍封萬年亭侯晉王奏使司空荀顗定禮儀中䕶軍賈充正法律尚書僕射裴秀議官制太保鄭冲㧾而裁焉吳分交州置廣州吳主寑疾口不能言乃手書呼丞相濮陽興入令子􅓣出拜之休把興臂指􅓣以託之癸未吳主殂謚曰景帝羣臣尊朱后爲皇太后吳人以蜀初亡交趾􅂝叛國内恐懼欲得長君左典軍萬彧嘗爲烏程令與烏程侯皓相善稱皓才識明斷長沙􅁊王之疇也又加之好學奉遵法度屢言之於丞相興左将軍布興布説朱太后欲以皓爲嗣朱后曰我寡婦人安知社稷之慮茍吳國無隕宗廟有頼可矣於是遂迎立皓改元元興大赦八月庚寅命中撫軍司馬炎副貳相國事初鍾㑹之伐漢也辛憲英謂其夫之從子羊祜曰㑹在事縱恣非持乆處下之道吾畏其有他志也㑹請其子郎中琇為參軍憲英憂曰他日吾為國憂今日難至吾家矣琇固請於晉王王不聽憲英謂琇曰行矣戒之軍旅之間可以濟者其惟仁恕乎琇竟以全歸癸巳詔以琇嘗諫㑹反賜爵關内侯九月戊午以司馬炎為撫軍大將軍辛未詔以呂興為安南將軍都督交州諸軍事以南中監軍霍弋遥領交州刺史得以便宜選用長吏弋表遣建寜㸑谷為交趾太守率牙門董元毛炅孟幹孟通爨能李松王素等將兵助興未至興為其功曹李統所殺吳主貶朱太后為景皇后追謚父和曰文皇帝尊母何氏為太后冬十月丁亥詔以夀春所獲吳相國參軍事徐紹為散騎常侍水曹掾孫彧為給事黄門侍郎以使於吳其家人在此者悉聽自隨不必使還以開廣大信晉王因致書吳主諭以禍福初晉王娶王肅之女生炎及攸以攸繼景王後攸性孝友多材蓺清和平允名聞過於炎晉王愛之常曰天下者景王之天下也吾攝居相位百年之後大業宜歸攸炎立髪委地手垂過䣛嘗從容問裴秀曰人有相否因以異相示之秀由是歸心羊琇與炎善為炎畫䇿察時政所宜損益皆令炎豫記之以僃晉王訪問晉王欲以攸為世子山濤曰廢長立少違禮不祥賈充曰中撫軍有君人之徳不可易也何曾裴秀曰中撫軍聦明神武有超世之才人望既茂天表如此固非人臣之相也晉王由是意定丙午立炎為世子吳主封太子􅓣及其三弟皆為王立妃滕氏為皇后初吳主之立發優詔恤士民開倉廪振貧乏科出宫女以配無妻者禽獸養於苑中者皆放之當時翕然稱為明主及既得志麤􅁀驕盈多忌諱好酒色大小失望濮陽興張布竊悔之或譛諸吳主十一月朔興布入朝吳主執之徙於廣州道殺之夷三族以后父滕牧為衛将軍録尚書事牧胤之族人也是歳罷屯田官資治通鑑卷第七十八
