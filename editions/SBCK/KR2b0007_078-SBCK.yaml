front:
  text: 將軍閻宇親善隂欲廢維樹宇維知之言於漢主曰皓姦巧專恣將敗國家請殺之漢主曰皓趨走小臣耳往董允每切齒吾常恨之君何足介意維見皓枝附葉連懼於失言遜辭而出漢主敕皓詣維陳謝維由是自疑懼返自洮陽因求種麥沓中不敢歸成都
  hash: sha256:b724347e00f91d685661547c892b72b8cf46e6b5e34a0241a58f6db5bcc6d9fc
