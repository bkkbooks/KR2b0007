body:
  text: 秋八月詔曰往年災害多今年􅁞麥傷所振貸種食勿收責母令民出今年田租初武帝征伐匈奴深入窮追二十餘年匈奴馬畜孕重墯殰罷極苦之常有欲和親意未能得狐鹿􅀌單于有異母弟爲左大都尉賢國人鄉之母閼氏恐單于不立子而立左大都尉也乃私使殺之左大都尉同母兄怨遂不肯復㑹單于庭是嵗單于病且死謂諸貴人我子少不能治國立弟右谷蠡王及單于死衛律等與顓渠閼氏謀匿其喪矯單于令更立子左谷蠡王爲壷衍鞮單于左賢王右谷蠡王怨望率其衆欲南歸漢恐不能自致即脅盧屠王欲與西降烏孫盧屠王告之單于使人驗問右谷蠡王不服反以其罪罪盧屠王國人皆􅁈之於是二王去居其所不復肯㑹龍城匈奴始衰三年春二月有星孛于西北冬十一月壬辰朔日有食之初霍光與上官桀相親善光每休沐出桀常代光入决事光女爲桀子安妻生女年甫五嵗安欲因光内之宫中光以爲尚㓜不聽蓋長公主私近子客河間丁外人安素與外人善􅀃外人曰安子容貌端正誠因長主時得入爲后以臣父子在朝而有椒房之重成之在於足下漢家故事常以列矦尚主足下何憂不封矦乎外人喜言於長主長主以爲然詔召安女入爲倢伃安爲􅀐都尉四年春三月甲寅立皇后上官氏赦天下西南夷姑繒葉榆復反遣水衡都尉吕辟胡將益州兵擊之辟胡不進蠻夷遂殺益州太守乗勝與辟胡戰士戰及溺死者四千餘人冬遣大鴻臚田廣明擊之廷尉李种坐故縱死罪棄市是嵗上官安爲車􅀐將軍五年春正月追尊帝外祖趙父爲順成矦順成矦有姊君姁賜錢二百萬奴婢第宅以充實焉諸昆弟各以親䟽受賞賜無在位者有男子乗黄犢車詣北闕自謂衛太子公車以聞詔使公卿將軍中二千石􅄂識視長安中吏民聚觀者數萬人右將軍勒兵闕下以僃非常丞相御史中二千石至者並莫敢發言京兆尹不疑後到叱從吏收縛或曰是非未可知且安之不疑曰諸君何患於衛太子昔蒯聵違命出犇輙距而不納春秋是之衛太子得罪先帝亡不即死今來自詣此罪人也遂送詔獄天子與大將軍霍光聞而嘉之曰公卿大臣當用有經術明於大誼者繇是不疑名聲重於朝廷在位者皆自以不及也廷尉驗治何人竟得姦詐本夏陽人姓成名方遂居湖以卜筮爲事有故太子舎人嘗從方遂卜謂曰子狀貌甚似衛太子方遂心利其言冀得以富貴坐誣罔不道要斬夏六月封上官安爲桑樂矦安日以驕淫受賜殿中對賔客言與我壻飲大樂見其服飾使人歸欲自燒物子病死仰而罵天其頑悖如此罷儋耳真番郡秋大鴻臚廣明軍正王平擊益州斬首捕虜三萬餘人獲畜産五萬餘頭諌大夫杜延年見國家承武帝奢侈師旅之後數爲大將軍光言年嵗比不登流民未盡還宜脩孝文時政示以儉約寛和順天心􅀃民意年嵗宜應光納其言延年故御史大夫周之子也六年春二月詔有司問郡國所舉賢良文學民所疾苦教化之要皆對願罷鹽鐡酒􅅦均輸官母與天下爭利示以儉節然後教化可興桑弘羊難以爲此國家大業所以制四夷安邊足用之本不可廢也於是鹽鐡之議起焉􅀄蘇武旣徙北海上禀食不至掘野䑕去草實而食之杖漢節牧羊卧起操持節旄盡落武在漢與李陵俱爲侍中陵降匈奴不敢求武乆之單于使陵至海上爲武置酒設樂因謂武曰單于聞陵與子卿素厚故使來􅀃足下虚心欲相待終不得歸漢空自苦亡人之地信義安所見乎足下兄弟二人前皆坐事自殺來時太夫人巳不幸子卿婦年少聞巳更嫁矣獨有女弟二人兩女一男今復十餘年存亡不可知人生如朝露何乆自苦如此陵始降時忽忽如狂自痛負漢加以老母繫保宫子卿不欲降何以過陵且陛下春秋髙法令無常大臣無罪夷滅者數十家安危不可知子卿尚復誰爲乎武曰武父子無功德皆爲陛下所成就位列將爵通矦兄弟親近常願肝腦塗地今得殺身自効雖斧􅃏湯鑊誠甘樂之臣事君猶子事父也子爲父死無所恨願勿復再言陵與武飲數日復曰子卿壹聽陵言武曰自分巳死乆矣王必欲降武請畢今日之驩効死於前陵見其至誠喟然歎曰嗟乎義士陵與衞律之罪上通於天因泣下霑衿與武決去賜武牛羊數十頭後陵復至北海上語武以武帝崩武南郷號哭歐血旦夕臨數月及壷衍鞮單于立母閼氏不正國内乖離常恐漢兵襲之於是衞律爲單于謀與漢和親漢使至求蘇武等匈奴詭言武死後漢使復至匈奴常惠私見漢使教使者謂單于言天子射上林中得鴈足有係帛書言武等在某澤中使者大喜如惠語以讓單于單于視左右而驚謝漢使曰武等實在乃歸武及馬宏等馬宏者前副光禄大夫王忠使西國爲匈奴所遮忠戰死馬宏生得亦不肯降故匈奴歸此二人欲以通善意於是李陵置酒賀武曰今足下還歸揚名於匈奴功顯於漢室雖古竹帛所載丹青所畫何以過子卿陵雖駑怯令漢貰陵罪全其老母使得奮大辱之積志庶幾乎曹柯之盟此陵宿昔之所不忘也收族陵家爲丗大戮陵尚復何顧乎巳矣令子卿知吾心耳陵泣下數行因與武決單于召㑹武官屬前巳降及物故凡隨武還者九人旣至京師詔武奉一太牢謁武帝園廟拜爲典屬國秩中二千石賜錢二百萬公田二頃宅一區武留匈奴凡十九嵗始以彊壯出及還須髪盡白霍光上官桀與李陵素善遣陵故人隴西任立政等三人俱至匈奴招之陵曰歸易耳丈夫不能再辱遂死於匈奴夏旱秋七月罷榷酤官從賢良文學之議也武帝之末海内虚耗户口減半霍光知時務之要輕徭薄賦與民休息至是匈奴和親百姓充實稍復文景之業焉詔以鉤町矦母波率其邑君長人民擊反者有功立以爲鉤町王賜田廣明爵􅀜内矦元鳯元年春武都氐人反遣執金吾馬適建龍頟矦韓増大鴻臚田廣明將三輔太常徒皆免刑擊之夏六月赦天下秋七月乙亥晦日有食之旣八月攺元上官桀父子旣尊盛德長公主欲爲丁外人求封矦霍光不許又爲外人求光禄大夫欲令得召見又不許長主大以是怨光而桀安數爲外人求官爵弗能得亦慙又桀妻父所幸充國爲太醫監䦨入殿中下獄當死冬月且盡蓋主爲充國入馬二十匹贖罪乃得減死論於是桀安父子深怨光而重德蓋主自先帝時桀巳爲九卿位在光右及父子並爲將軍皇后親安女光乃其外祖而顧專制朝事由是與光爭權燕王旦自以帝兄不得立常懐怨望及御史大夫桑􅀪羊建造酒􅅦鹽鐵爲國興利伐其功欲爲子弟得官亦怨恨光於是蓋主桀安􅀪羊皆與旦通謀旦遣孫縱之等前後十餘輩多齎金寶走馬賂遺蓋主桀􅀪羊等桀等又詐令人爲燕王上書言光出都肄郎羽林道上稱䟆太官先置又引蘇武使匈奴二十年不降乃爲典屬國大將軍長史敞無功爲搜粟都尉又擅調益莫府校尉光專權自恣疑有非常臣旦願歸符璽入宿衞察姦臣變􅇋司光出沐日奏之桀欲從中下其事弘羊當與諸大臣共執退光書奏帝不肻下明旦光聞之止畫室中不入上問大將軍安在左將軍桀對曰以燕王告其罪故不敢入有詔召大將軍光入免冠頓首謝上曰將軍冠朕知是書詐也將軍無罪光曰陛下何以知之上曰將軍之廣明都郎近耳調校尉以來未能十日燕王何以得知之且將軍爲非不須校尉是時帝年十四尚書左右皆驚而上書者果亡捕之甚急桀等懼白上小事不足遂上不聽後桀黨與有譛光者上輙怒曰大將軍忠臣先帝所屬以輔朕身敢有毁者坐之自是桀等不敢復言李德裕論曰人君之德莫大於至明明以照姦則百邪不能蔽矣漢昭帝是也周成王有慙德矣髙祖文景俱不如也成王聞管蔡流言遂使周公狼跋而東漢髙聞陳平去魏背楚欲捨腹心臣漢文惑季布使酒難近罷歸股肱郡疑賈生擅權紛亂復踈賢士景帝信誅晁錯兵解遂戮三公所謂執狐疑之心來讒賊之口使昭帝得伊呂之佐則成康不足侔矣桀等謀令長公主置酒請光伏兵格殺之因廢帝迎立燕王爲天子旦置驛書往來相報許立桀爲王外連郡國豪桀以千數旦以語相平平曰大王前與劉澤結謀事未成而發覺者以劉澤素夸好侵陵也平聞左將軍素輕易車􅀐將軍少而驕臣恐其如劉澤時不能成又恐旣成反大王也旦曰前日一男子詣闕自謂故太子長安中民趣郷之正讙不可止大將軍恐出兵陳之以自僃耳我帝長子天下所信何憂見反後謂羣臣蓋主報言獨患大將軍與右將軍王莽今右將軍物故丞相病幸事必成徴不乆令羣臣皆裝安又謀誘燕王至而誅之因廢帝而立桀或曰當如皇后何安曰逐麋之狗當顧莬邪且用皇后爲尊一旦人主意有所移雖欲爲家人亦不可得此百丗之一時也㑹蓋主舎人父稻田使者燕倉知其謀以告大司農楊敞敞素謹畏事不敢言乃移病卧以告諫大夫杜延年延年以聞九月詔丞相部中二千石逐捕孫縱之及桀安􅀪羊外人等并宗族悉誅之蓋主自殺燕王旦聞之召相平曰事敗遂發兵乎平曰左將軍巳死百姓皆知之不可發也王憂懣置酒與羣臣妃妾别㑹天子以璽書讓旦旦以綬自絞死后夫人隨旦自殺者二十餘人天子加恩赦王太子建爲庶人賜旦謚曰刺王皇后以年少不與謀亦霍光外孫故得不廢庚午右扶風王訢爲御史大夫冬十月封杜延年爲建平矦燕倉爲宜城矦故丞相徴事任宫捕得桀爲弋陽矦丞相少史王山壽誘安入府爲商利矦乆之文學濟隂魏相對䇿以爲日者燕王爲無道韓義出身彊諌爲王所殺義無比干之親而蹈比干之節宜顯賞其子以示天下明爲人臣之義乃擢義子延壽爲諌大夫大將軍光以朝無舊臣光禄勲張安丗自先帝時爲尚書令志行純篤乃白用安丗爲右將軍兼光禄勲以自副焉安丗故御史大夫湯之子也光又以杜延年有忠節擢爲太僕右曹給事中光持刑罰嚴延年常輔之以寛吏民上書言便宜輙下延年平處復奏言可官試者至爲縣令或丞相御史除用滿嵗以狀聞或抵其罪法是嵗匈奴發左右部二萬􅀐爲四隊並入邊爲宼漢兵追之斬首獲虜九千人生得甌脫王漢無所失亡匈奴見甌脫王在漢恐以爲道擊之即西北逺去不敢南逐水草發人民屯甌脫二年夏四月上自建章宫徙未央宫六月赦天下是嵗匈奴復遣九千􅀐屯受降城以僃漢北橋余吾水令可度以僃犇走欲求和親而恐漢不聽故不肯先言常使左右風漢使者然其侵盜益希遇漢使愈厚欲以漸致和親漢亦覊縻之三年春正月泰山有大石自起立上林有柳樹枯僵自起生有蟲食其葉成文曰公孫病巳立符節令魯國眭弘上書言大石自立僵柳復起當有匹庶爲天子者枯樹復生故廢之家公孫氏當復興乎漢家承堯之後有傳國之運當求賢人禪帝位退自封百里以順天命􅀪坐設妖言惑衆伏誅匈奴單于使犂汙王窺邊言酒泉張掖兵益弱出兵試擊冀可復得其地時漢先得降者聞其計天子詔邊警僃後無幾右賢王犂汙王四千􅀐分三隊入日勒屋蘭番和張掖太守屬國都尉發兵擊大破之得脫者數百人屬國義渠王射殺犂汙王賜黄金二百斤馬二百匹因封爲犂汙王自是後匈奴不敢入張掖燕蓋之亂桑􅀪羊子遷亡過父故吏矦史吳後遷捕得伏法㑹赦矦史吳自出繫獄廷尉王平與少府徐仁雜治反事皆以爲桑遷坐父謀反而矦史吳臧之非匿反者乃匿爲隨者也即以赦令除吳罪後侍御史治實以桑遷通經術知父謀反而不諌爭與反者身無異矦史吳故三百石吏首匿遷不與庶人匿隨從者等吳不得赦奏請覆治劾廷尉少府縱反者少府徐仁即丞相車千秋女壻也故千秋數爲矦史吳言恐大將軍光不聽千秋即召中二千石博士㑹公車門議問吳法議者知大將軍指皆執吳爲不道明日千秋封上衆議光於是以千秋擅召中二千石以下外内異言遂下廷尉平少府仁獄朝廷皆恐丞相坐之太僕杜延年奏記光曰吏縱罪人有常法今更詆吳爲不道恐於法深又丞相素無所守持而爲好言於下盡其素行也至擅召中二千石甚無狀延年愚以爲丞相乆故及先帝用事非有大故不可棄也閒者民頗言獄深吏爲峻詆今丞相所議又獄事也如是以及丞相恐不合衆心羣下讙譁庶人私議流言四布延年竊重將軍失此名於天下也光以廷尉少府弄法輕重卒下之獄夏四月仁自殺平與左馮翊賈勝胡皆要斬而不以及丞相終與相竟延年論議持平合和朝廷皆此􅀋也冬遼東烏􅁊反􅀄冒頓破東胡東胡餘衆散保烏􅁊及鮮卑山爲二族丗役屬匈奴武帝擊破匈奴左地因徙烏􅁊於上谷漁陽右北平遼東塞外爲漢偵察匈奴動靜置護烏􅁊校尉監領之使不得與匈奴交通至是部衆漸彊遂反先是匈奴三千餘􅀐入五原殺略數千人後數萬􅀐南旁塞獵行攻塞外亭障略取吏民去是時漢邊郡㷭火􅇋望精明匈奴爲邊宼者少利希復犯塞漢復得匈奴降者言烏􅁊嘗發先單于冡匈奴怨之方發二萬􅀐擊烏􅁊霍光欲發兵邀擊之以問護軍都尉趙充國充國以爲烏􅁊閒數犯塞今匈奴擊之於漢便又匈奴希宼盗北邊幸無事蠻夷自相攻擊而發兵要之招宼生事非計也光更問中郎將范明友明友言可擊於是拜明友爲度遼將軍將二萬􅀐出遼東匈奴聞漢兵至引去􅀄光誡明友兵不空出即後匈奴遂擊烏􅁊烏􅁊時新中匈奴兵明友旣後匈奴因乗烏􅁊敝擊之斬首六千餘級獲三王首匈奴由是恐不能復出兵四年春正月丁亥帝加元服甲戌富民定矦田千秋薨時政事壹決大將軍光千秋居丞相位謹厚自守而巳夏五月丁丑孝文廟正殿火上及羣臣皆素服發中二千石將五校作治六日成太常及廟令丞郎吏皆劾大不敬㑹赦太常轑陽矦德免為庶人六月赦天下􅀄材罙遣太子賴丹爲質於􅀛兹貳師擊大宛還將賴丹入至京師霍光用桑􅀪羊前議以賴丹為校尉將軍田輪臺􅀛兹貴人姑翼謂其王曰賴丹本臣屬吾國今佩漢印綬來迫吾國而田必為害王即殺賴丹而上書謝漢樓蘭王死匈奴先聞之遣其質子安歸歸得立為王漢遣使詔新王令入朝王辭不至樓蘭國最在東垂近漢當白龍堆乏水草常主發導􅀒水擔糧送迎漢使又數為吏卒所宼懲艾不便與漢通後復爲匈奴反閒數遮殺漢使其弟尉屠􅂄降漢具言狀駿馬監北地傅介子使大宛詔因令責樓蘭􅀛兹介子至樓蘭􅀛兹責其王皆謝服介子從大宛還到􅀛兹㑹匈奴使從烏孫還在􅀛兹介子因率其吏士共誅斬匈奴使者還奏事詔拜介子為中郎遷平樂監介子謂大將軍霍光曰樓蘭􅀛兹數反覆而不誅無所懲艾介子過􅀛兹時其王近就人易得也願往刺之以威示諸國大將軍曰􅀛兹道逺且驗之於樓蘭於是白遣之介子與士卒俱齎金幣揚言以賜外國爲名至樓蘭樓蘭王意不親介子介子陽引去至其西界使譯謂曰漢使者持黄金錦繡行賜諸國王不來受我去之西國矣即出金幣以示譯譯還報王王貪漢物來見使者介子與坐飲陳物示之飲酒皆醉介子謂王曰天子使我私報王王起隨介子入帳中屏語壯士二人從後剌之刃交匈立死其貴人左右皆散走介子告諭以王􅀒漢罪天子遣我誅王當更立王弟尉屠􅂄在漢者漢兵方至母敢動自令滅國矣介子遂斬王安歸首馳傳詣闕縣首北闕下乃立尉屠􅂄爲王更名其國爲鄯善爲刻印章賜以宫女爲夫人僃車􅀐輜重丞相率百官送至横門外祖而遣之王自請天子曰身在漢乆今歸單弱而前王有子在恐為所殺國中有伊循城其城肥美願漢遣一將屯田積􅂖令臣得依其威重於是漢遣司馬一人吏士四十人田伊循以塡撫之秋七月乙巳封范明友為平陵矦傅介子為義陽矦臣光曰王者之於戎狄叛則討之服則舎之今樓蘭王旣服其罪又從而誅之後有叛者不可得而懐矣必以為有罪而討之則宜陳師鞠旅明致其罰今乃遣使者誘以金幣而殺之後有奉使諸國者復可信乎且以大漢之彊而為盗賊之謀於蠻夷不亦可羞哉論者或美介子以為竒功過矣五年夏大旱秋罷象郡分屬鬰林牂柯冬十一月大雷十二月庚戍宜春敬侯王訢薨六年春正月募郡國徒築遼東玄莬城夏赦天下烏􅁊復犯塞遣度遼將軍范明友擊之冬十一月乙丑以楊敞爲丞相少府河内蔡義爲御史大夫資治通鑑卷第二十三
