front:
  text: 封萬三千户旦怒曰我當爲帝何賜也遂與宗室中山哀王子長齊孝王孫澤等結謀詐言以武帝時受詔得職吏事修武僃僃非常郎中成軫謂旦曰大王失職獨可起而索不可坐而得也大王壹起國中雖女子皆奮臂隨大王旦即與澤謀爲姦書言少帝非武帝子大臣所共立天下宜共伐之使人傳行郡國以揺動百姓澤謀歸發兵臨菑殺青州刺史雋不疑旦招來郡國姦人賦歛銅鐵作甲兵數閱其車􅀐材官卒發民大獵以講士馬須期日郎中韓義等數諌旦旦殺義等凡十五人㑹缾矦成知澤等謀以告雋不疑八月不疑收捕澤等以聞天子遣大鴻臚丞治連引燕王有詔以燕王至親勿治而澤等皆伏誅遷雋不疑爲京兆尹不疑爲京兆尹吏民敬其威信每行縣録囚徒還其母輒問不疑有所平反活幾何人即不疑多有所平反母喜笑異於他時或無所出母怒爲不食故不疑爲吏嚴而不殘九月丙子秺敬矦金日磾薨􅀄武帝病有遺詔封金日磾爲秺矦上官桀爲安陽矦霍光爲博陸矦皆以前捕反者馬何羅等功封日磾以帝少不受封光等亦不敢受及日磾病困光白封日磾卧受印綬一日薨日磾兩子賞建俱侍中與帝略同年共卧起賞爲奉車建駙馬都尉及賞嗣矦佩兩綬上謂霍將軍曰金氏兄弟兩人不可使俱兩綬邪對曰賞自嗣父爲矦耳上笑曰矦不在我與將軍乎對曰先帝之約有功乃得封矦遂止閏月遣故廷尉王平等五人持節行郡國舉賢良問民疾苦􅁈失職者冬無冰二年春正月封大將軍光爲博陸矦左將軍桀爲安陽矦或􅀃霍光曰將軍不見諸吕之事乎處伊尹周公之位攝政擅􅁠而背宗室不與共職是以天下不信卒至於滅亡今將軍當盛位帝春秋富宜納宗室又多與大臣共事反諸吕道如是則可以免患光然之乃擇宗室可用者遂拜楚元王孫辟彊及宗室劉長樂皆爲光禄大夫辟彊守長樂衞尉三月遣使者振貸貧民無種食者
