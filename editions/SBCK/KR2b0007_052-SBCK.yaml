front:
  text: 陛下改過之効徒勞至尊暴露風塵誠無益也陛下但務其華不尋其實猶縁木希魚􅁍求求前誠宜推信革政崇道變惑出後宫不御之女除太官重膳之費易傳曰陽感天不旋日惟陛下留神裁察帝復召舉面問得失舉對以宜慎官人去貪汙逺佞邪帝曰官貪汙佞邪者為誰乎對曰臣從下州超僃機宻不足以别羣臣然公卿大臣數有直言者忠貞也阿䛕苟容者佞邪也太史令張衡亦上䟽言前年京師地震土裂裂者威分震者民擾也竊懼聖思厭倦制不專己恩不忍割與衆共威威不可分德不可共願陛下思惟所以稽古率舊勿令刑德八柄不由天子然後神望允塞災消不至矣衡又以中興之後儒者爭學圖緯上䟽言春秋元命包有公輸班與墨翟事見戰國又言别有益州益州之置在於漢世又劉向父子領校祕書閲定九流亦無䜟録則知圖䜟成於哀平之際皆虚偽之徒以要世取資欺罔較然莫之紏禁且律歷卦􅇋九宫風角數有徴効世莫肯學而競稱不占之書譬猶畫工惡圖犬馬而好作鬼魅誠以實事難形而虚僞不窮也宜收藏圖䜟一禁絶之則朱紫無所􅅭典籍無瑕玷矣秋七月鍾羌良封等復冦隴西漢陽詔拜前校尉馬賢為謁者鎭撫諸種冬十月護羌校尉馬續遣兵擊良封破之
