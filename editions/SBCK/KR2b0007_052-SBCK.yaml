body:
  text: 十一月壬寅司徒劉﨑司空孔扶免用周舉之言也乙巳以大司農黄尚為司徒光禄勲河東王卓為司空耿貴人數爲耿氏請帝乃紹封耿寳子箕為牟平矦四年春北匈奴呼􅄛王侵車師後部帝令敦煌太守發兵救之不利二月丙子初聽中官得以養子襲爵初帝之復位宦官之力也由是有寵參與政事御史張綱上書曰竊尋文明二帝德化尤盛中官常侍不過兩人近倖賞賜裁滿數金惜費重民故家給人足而頃者以來無功小人皆有官爵非愛民重器承天順道者也書奏不省綱皓之子也旱謁者馬賢擊鍾羌大破之夏四月甲子太尉施延免戊寅以執金吾梁商為大將軍故太尉龐參為太尉商稱疾不起且一年帝使太常􅁊焉奉策就第即拜商乃詣闕受命商少通經傳謙恭好士辟漢陽巨覽上黨陳􅀛為掾屬李固為從事中郎楊倫為長史李固以商柔和自守不能有所整裁乃奏記於商曰數年以來災怪屢見孔子曰智者見變思形愚者覩怪諱名天道無親可為祗畏誠令王綱一整道行忠立明公踵伯成之髙全不朽之譽豈與此外戚凡輩耽榮好位者同日而論哉商不能用秋閏八月丁亥朔日有食之冬十月烏􅁊冦雲中度遼將軍耿曅追擊不利十一月烏􅁊圍曅於蘭池城發兵數千人救之烏􅁊乃退十二月甲寅京師地震永和元年春正月己巳改元赦天下冬十月丁亥承福殿火十一月丙子太尉龎參罷十二月象林蠻夷反乙巳以前司空王龔爲太尉龔疾宦官專權上書極言其狀諸黄門使客誣奏龔罪上命龔亟自實李固奏記於梁商曰王公以堅貞之操横爲讒佞所構衆人聞知莫不歎慄夫三公尊重無詣理訴寃之義纎微感槩輒引分决是以舊典不有大罪不至重問王公卒有它變則朝廷獲害賢之名羣臣無救護之節矣語曰善人在患飢不及餐斯其時也商即言之於帝事乃得釋是嵗以執金吾梁冀爲河南尹冀性嗜酒逸遊自恣居職多縱暴非灋父商所親客雒陽令吕放以告商商以讓冀冀遣人於道刺殺放而恐商知之乃推疑放之怨仇請以放弟禹為雒陽令使捕之盡滅其宗親賔客百餘人武陵太守上書以蠻夷率服可比漢人増其租賦議者皆以為可尚書令虞詡曰自古聖王不臣異俗先帝舊典貢稅多少所由來乆矣今猥増之必有怨叛計其所得不償所費必有後悔帝不從澧中漊中蠻果爭貢布非舊約遂殺鄉吏舉種反二年春武陵蠻二萬人圍充城八千人㓂夷道二月廣漢屬國都尉擊破白馬羌帝遣武陵太守李進擊叛蠻破平之進乃簡選良吏撫循蠻夷郡境遂安三月乙卯司空王卓薨丁丑以光祿勲郭䖍為司空夏四月丙申京師地震五月癸丑山陽君宋娥坐構姦誣罔收印綬歸里舍黄龍楊佗孟叔李建張賢史汎王道李元李剛等九矦坐與宋娥更相賂遺求髙官増邑並遣就國減租四分之一象林蠻區憐等攻縣寺殺長吏交阯刺史樊演發交阯九眞兵萬餘人救之兵士憚逺役秋七月二郡兵反攻其府府雖擊破反者而蠻埶轉盛冬十月甲申上行幸長安扶風田弱薦同郡灋眞博通内外學隱居不仕冝就加衮職帝虚心欲致之前後四徵終不屈友人郭正稱之曰灋真名可得聞身難得而見逃名而名我隨避名而名我追可謂百世之師者矣真雄之子也丁卯京師地震太尉王龔以中常侍張昉等專弄國權欲奏誅之宗親有以楊震行事諫之者龔乃止十二月乙亥上還自長安三年春二月乙亥京師及金城隴西地震二郡山崩夏閏四月己酉京師地震五月吳郡丞羊珍反攻郡府太守王衡破斬之侍御史賈昌與州郡幷力討區憐等不克為所攻圍嵗餘兵􅂖不繼帝召公卿百官及四府掾屬問以方略皆議遣大將發荆楊兖豫四萬人赴之李固駮曰若荆楊無事發之可也今二州盜賊磐結不散武陵南郡蠻夷未輯長沙桂陽數被徴發如復擾動必更生患其不可一也又兖豫之人卒被徴發逺赴萬里無有還期詔書迫促必致叛亡其不可二也南州水土温暑加有瘴氣致死亡者十必四五其不可三也逺涉萬里士卒疲勞比至嶺南不復堪􅃲其不可四也軍行三十里爲程而去日南九千餘里三百日乃到計人稟五升用米六十萬斛不計將吏驢馬之食但負甲自致費便若此其不可五也設軍所在死亡必衆既不足禦敵當復更發此爲刻割心腹以􅀘四支其不可六也九真日南相去千里發其吏民猶尚不堪何況乃苦四州之卒以赴萬里之艱哉其不可七也前中郎將尹就討益州叛羌益州諺曰虜來尚可尹來殺我後就徵還以兵付刺史張喬喬因其將吏旬月之間破殄冦虜此發將無益之効州郡可任之驗也宜更選有勇略仁惠任將帥者以為刺史太守悉使共住交阯今日南兵單無􅂖守既不足戰又不能可一切徙其吏民北依交阯事靜之後乃命歸本還募蠻夷使自相攻轉輸金帛以為其資有能反閒致頭首者許以封矦列土之賞故并州刺史長沙祝良性多勇決又南陽張喬前在益州有破虜之功皆可任用昔太宗就加魏尚為雲中守哀帝即拜龔舍為泰山守宜即拜良等便道之官四府悉從固議即拜祝良為九眞太守張喬為交阯刺史喬至開示慰誘並皆降散良到九眞單車入賊中設方略招以威信降者數萬人皆為良築起府寺由是嶺外復平秋八月己未司徒黄尚免九月己酉以光禄勲長沙劉壽為司徒丙戌令大將軍三公舉剛毅武猛謀謨任將帥者各二人特進卿校尉各一人初尚書令左雄薦冀州刺史周舉為尚書既而雄為司􅊢校尉舉故冀州刺史馮直任將帥直嘗坐臧受罪舉以此劾奏雄雄曰詔書使我選武猛不使我選清髙舉曰詔書使君選武猛不使君選貪汚也雄曰進君適所以自伐也舉曰昔趙宣子任韓厥為司馬厥以軍灋戮宣子僕宣子謂諸大夫曰可賀我矣吾選厥也任其事今君不以舉之不才誤升諸朝不敢阿君以為君羞不寤君之意與宣子殊也雄悦謝曰吾嘗事馮直之父又與直善今宣光以此奏吾是吾之過也天下益以此賢之是時宦官競賣恩勢唯大長秋良賀清儉退厚及詔舉武猛賀獨無所薦帝問其故對曰臣生自草茅長於宫掖既無知人之明又未嘗交加士類昔衛鞅因景監以見有識知其不終今得臣舉者匪榮伊辱是以不敢帝由是賞之冬十月燒當羌那離等三千餘騎冦金城校尉馬賢擊破之十二月戊戌朔日有食之大將軍商以小黄門南陽曹節等用事於中遣子冀不疑與為交友而宦官忌其寵反欲陷之中常侍張逵蘧政楊定等與左右連謀共譛商及中常侍曹騰孟賁云欲徴諸王子圖議廢立請收商等案罪帝曰大將軍父子我所親騰賁我所愛必無是但汝曹共妒之耳逵等知言不用懼迫遂出矯詔收縛騰賁於省中帝聞震怒敇宦者李歙急呼騰賁釋之收逵等下獄四年春正月庚辰逵等伏誅事連􅀪農太守張鳳安平相楊皓皆坐死辭所連染延及在位大臣商懼多侵枉乃上䟽曰春秋之義功在元帥罪止首惡大獄一起無辜者衆死囚乆繫纎微成大非所以順迎和氣平政成化也宜早訖竟以止逮捕之煩帝納之罪止坐者二月帝以商少子虎賁中郎將不疑為步兵校尉商上書辭曰不疑童孺猥處成人之位昔晏平仲辭鄁殿以守其富公儀休不受魚飱以定其位臣雖不才亦願固福祿於聖世上乃以不疑為侍中奉車都尉三月乙亥京師地震燒當羌􅃚離等復反夏四月癸卯護羌校尉馬賢討斬之獲首虜千二百餘級戊午赦天下五月戊辰封故濟北惠王壽子安為濟北王􅊨秋八月太原旱五年春二月戊申京師地震南匈奴句龍王吾斯車紐等反冦西河招誘右賢王合兵圍美稷殺朔方代郡長吏夏五月度遼將軍馬續與中郎將梁並等發邊兵及羌胡合二萬餘人掩擊破之吾斯等復更屯聚攻沒城邑天子遣使責讓單于單于本不預謀乃脱帽避帳詣並謝罪並以病徴五原太守陳􅀛代為中郎將􅀛以單于不能制下逼迫單于及其弟左賢王皆令自殺􅀛又欲徙單于近親於内郡而降者遂更狐疑􅀛坐下獄免大將軍商上表曰匈奴冦畔自知罪極窮鳥困獸皆知救死況種類繁熾不可單盡今轉運日増三軍疲苦虚内給外非中國之利度遼將軍馬續素有謀謨且典邊日乆深曉兵要每得續書與臣策合宜令續深溝髙壁以恩信招降宣示購賞明為期約如此則醜類可服國家無事矣帝從之乃詔續招降畔虜商又移書續等曰中國安寧忘戰日乆良騎野合交鋒接矢決勝當時戎狄之所長而中國之所短也彊弩乘城堅營固守以待其衰中國之所長而戎狄之所短也宜務先所長而觀其變設購開賞宣示反悔勿貪小功以亂大謀於是右賢王部抑鞮等萬三千口皆詣續降己丑晦日有食之初那離等既平朝廷以來機為并州刺史劉秉為涼州刺史機等天性虐刻多所擾發且凍傅難種羌遂反攻金城與雜種羌胡大冦三輔殺害長吏機秉並坐徴於是拜馬賢為征西將軍以騎都尉耿叔為副將左右羽林五校士及諸州郡兵十萬人屯漢陽九月令扶風漢陽築隴道塢三百所置屯兵辛未太尉王龔以老病罷且凍羌冦武都燒隴關壬午以太常􅁊焉為太尉匈奴句龍王吾斯等立車紐為單于東引烏􅁊西收羌胡等數萬人攻破京兆虎牙營殺上郡都尉及軍司馬遂冦掠并涼幽冀四州乃徙西河治離石上郡治夏陽朔方治五原十二月遣使匈奴中郎將張耽將幽州烏桓諸郡營兵擊車紐等戰於馬邑斬首三千級獲生口甚衆車紐乞降而吾斯猶率其部曲與烏桓冦鈔初上命馬賢討西羌大將軍商以爲賢老不如太中大夫宋漢帝不從漢由之子也賢到軍稽留不進武都太守馬融上䟽曰今雜種諸羌轉相鈔盜宜及其未并亟遣深入破其支黨而馬賢等處處留滯羌胡百里望塵千里聽聲今逃匿避回漏出其後則必侵冦三輔爲民大害臣願請賢所不可用關東兵五千裁假部隊之號盡力率厲埋根行首以先吏士三旬之中必克破之臣又聞吳起爲將暑不張蓋寒不披裘今賢野次垂幕珍肴雜遝兒子侍妾事與古反臣懼賢等專守一城言攻於西而羌出於東且其將士將不堪命必有髙克潰叛之變也安定人皇甫規亦見賢不恤軍事審其必敗上書言狀朝廷皆不從六年春正月丙子征西將軍馬賢與且凍羌戰于射姑山賢軍敗賢及二子皆沒東西羌遂大合閏月鞏唐羌冦隴西遂及三輔燒園陵殺掠吏民二月丁巳有星孛于營室三月上巳大將軍商大㑹賔客讌于雒水酒闌繼以䪥露之歌從事中郎周舉聞之歎曰此所謂哀樂失時非其所也殃將及乎武都太守趙沖追擊鞏唐羌斬首四百餘級降二千餘人詔沖督河西四郡兵為節度安定上計掾皇甫規上䟽曰臣比年以來數陳便宜羌戎未動策其將反馬賢始出知其必敗誤中之言在可考校臣每惟賢等擁衆四年未有成功縣師之費且百億計出於平民回入姦吏故江湖之人羣為盜賊青徐荒饑襁負流散夫羌戎潰叛不由承平皆因邊將失於綏御乘常守安則加侵暴茍競小利則致大害微勝則虚張首級軍敗則隠匿不言軍士勞怨困於猾吏進不得快戰以徼功退不得温飽以全命餓死溝渠暴骨中原徒見王師之出不聞振旅之聲酋毫泣血驚懼生變是以安不能乆叛則經年臣所以搏手叩心而増歎者也願假臣兩營二郡屯列坐食之兵五千岀其不意與趙沖共相首尾土地山谷臣所曉習兵埶巧便臣已更之可不煩方寸之印尺帛之賜髙可以滌患下可以納降若謂臣年少官輕不足用者凡諸敗將非官爵之不髙年齒之不邁臣不勝至誠沒死自陳帝不能用庚子司空郭䖍免丙午以太僕趙戒為司空夏使匈奴中郎將張耽度遼將軍馬續率鮮卑到􅂖城擊烏􅁊於通天山大破之鞏唐羌冦北地北地太守賈福與趙冲擊之不利秋八月乘氏忠矦梁商病篤敇子冀等曰吾生無以輔益朝廷死何可秏費帑藏衣衾飯含玉匣珠貝之屬何益朽骨百僚勞擾紛華道路秪増塵垢耳宜皆辭之丙辰薨帝親臨喪諸子欲從其誨朝廷不聽賜以東園祕器銀鏤黄腸玉匣及葬賜輕車介士中宫親送帝幸宜陽亭瞻望車騎壬戌以河南尹乘氏矦梁冀為大將軍冀弟侍中不疑為河南尹臣光曰成帝不能選任賢俊委政舅家可謂闇矣猶知王立之不材弃而不用順帝援大柄授之后族梁冀頑嚚凶暴著於平昔而使之繼父之位終於悖逆蕩覆漢室校於成帝闇又甚焉初梁商病篤帝親臨幸問以遺言對曰臣從事中郎周舉清髙忠正可重任也由是拜舉諫議大夫九月諸羌寇武威辛亥晦日有食之冬十月癸丑以羌冦充斥涼部震恐復徙安定居扶風北地居馮翊十一月庚子以執金吾張喬行車騎將軍事將兵萬五千人屯三輔荆州盜賊起彌年不定以大將軍從事中郎李固為荆州刺史固到遣吏勞問境内赦冦盜前釁與之更始於是賊帥夏宻等率其魁黨六百餘人自縳歸首固皆原之遣還使自相招集開示威灋半嵗間餘類悉降州内清平奏南陽太守髙賜等臧穢賜等重賂大將軍梁冀冀為之千里移檄而固持之愈急冀遂徙固為㤗山太守時泰山盜賊屯聚歷年郡兵常千人追討不能制固到悉罷遣歸農但選留任戰者百餘人以恩信招誘之未滿嵗賊皆弭散漢安元年春正月癸巳赦天下改元秋八月南匈奴句龍吾斯與薁鞬臺􅂄等復反冦掠并部丁卯遣侍中河内杜喬周舉守光禄大夫周栩馮羨魏郡欒巴張綱郭遵劉班分行州郡表賢良顯忠勤其貪汚有罪者刺史二千石驛馬上之墨綬以下便輒收舉喬等受命之部張綱獨埋其車輪於雒陽都亭曰豺狼當路安問狐狸遂劾奏大將軍冀河南尹不疑以外戚䝉恩居阿衡之任而專肆貪叨縱恣無極多樹諂䛕以害忠良誠天威所不赦大辟所宜加也謹條其無君之心十五事斯皆臣子所切齒者也書御京師震竦時皇后寵方盛諸梁姻族滿朝帝雖知綱言直不能用也杜喬至兖州表奏泰山太守李固政為天下第一上徴固為將作大匠八使所劾奏多梁冀及宦者親黨互為請救事皆寢遏侍御史河南种暠疾之復行案舉廷尉吳雄將作大匠李固亦上言八使所紏宜急誅罰帝乃更下八使奏章令考正其罪梁冀恨張綱思有以中傷之時廣陵賊張嬰冦亂揚徐閒積十餘年二千石不能制冀乃以綱為廣陵太守前太守率多求兵馬綱獨請單車之職既到徑詣嬰壘門嬰大驚遽走閉壘綱於門外罷遣吏兵獨留所親者十餘人以書喻嬰請與相見嬰見綱至誠乃出拜謁綱延置上坐譬之曰前後二千石多肆貪暴故致公等懷憤相聚二千石信有罪矣然為之者又非義也今主上仁聖欲以文徳服叛故遣太守來思以爵祿相榮不願以刑罰相加今誠轉禍為福之時也若聞義不服天子赫然震怒荆􅀭兖豫大兵雲合身首横分血嗣俱絶二者利害公其深計之嬰聞泣下曰荒裔愚民不能自通朝廷不堪侵枉遂復相聚偷生若魚遊釜中知其不可乆且以喘息須􅁷閒耳今聞明府之言乃嬰等更生之辰也乃辭還營明日將所部萬餘人與妻子靣縛歸降綱單車入嬰壘大㑹置酒為樂散遣部衆任從所之親為卜居宅相田疇子弟欲為吏者皆引召之人情恱服南州晏然朝廷論功當封梁冀遏之在郡一歳卒張嬰等五百餘人為之制服行喪送到犍為負土成墳詔拜其子續為郎中賜錢百萬是時二千石長吏有能政者有雒陽令渤海任峻冀州刺史京兆蘇章膠東相陳留吳祐雒陽令自王渙之後皆不稱職峻能選用文武吏各盡其用發姦不旋踵民閒不畏吏其威禁猛於渙而文理政教不如也章為冀州刺史有故人為清河太守章行部欲案其姦臧乃請太守為設酒肴陳平生之好甚歡太守喜曰人皆有一天我獨有二天章曰今夕蘇孺文與故人飲者私恩也明日冀州刺史案事者公灋也遂舉正其罪州境肅然後以摧折權豪忤㫖坐免時天下日敝民多愁苦論者日夜稱章朝廷遂不能復用也祐為膠東相政崇仁簡民不忍欺嗇夫孫性私賦民錢市衣以進其父父得而怒曰有君如是何忍欺之促歸伏罪性慙懼詣閤持衣自首祐屏左右問其故性具談父言祐曰掾以親故受汚穢之名所謂觀過斯知仁矣使歸謝其父還以衣遺之冬十月辛未太尉􅁊焉司徒劉壽免罕羌邑落五千餘户詣趙沖降唯燒何種據參䜌未下甲戌罷張喬軍屯十一月壬午以司隸校尉下邳趙峻為太尉大司農胡廣為司徒二年夏四月庚戌護羌校尉趙冲與漢陽太守張貢擊燒當羌於參䜌破之六月丙寅立南匈奴守義王兠樓儲為呼蘭若尸逐就單于時兠樓儲在京師上親臨軒授璽綬引上殿賜車馬器服金帛甚厚詔太常大鴻臚與諸國侍子於廣陽城門外祖㑹饗賜作樂角抵百戲冬閏十月趙冲擊燒當羌於阿陽破之十一月使匈奴中郎將扶風馬寔遣人刺殺句龍吾斯凉州自九月以來地百八十震山谷拆裂壞敗城寺民壓死者甚衆尚書令黄瓊以前左雄所上孝廉之選專用儒學文吏於取士之義猶有所遺乃奏増孝悌及能從政者為四科帝從之建康元年春護羌從事馬􅀇為諸羌所誘將羌衆亡出塞領護羌校尉衛琚追擊􅀇等斬首八百餘級趙冲復追叛羌到建威鸇隂河軍度竟所將降胡六百餘人叛走冲將數百人追之遇羌伏兵與戰而殁冲雖死而前後多所斬獲羌由是衰秏詔封冲子為義陽亭矦夏四月使匈奴中郎將馬寔擊南匈奴左部破之於是胡羌烏桓悉詣寔降辛巳立皇子炳為太子改元赦天下太子居承光宫帝使侍御史种暠監其家中常侍髙梵從中單駕出迎太子時太傅杜喬等疑不欲從而未決暠乃手劒當車曰太子國之儲副人命所係今常侍來無詔信何以知非姦邪今日有死而已梵辭屈不敢對馳還奏之詔報太子乃得去喬退而歎息愧暠臨事不惑帝亦嘉其持重稱善者良乆楊徐盜賊羣起盤互連歳秋八月九江范容周生等冦掠城邑屯據歷陽為江淮巨患遣御史中丞馮緄督州兵討之庚午帝崩于玉堂前殿太子即皇帝位年二嵗尊皇后曰皇太后太后臨朝丁丑以太尉趙峻為太傅大司農李固為太尉參録尚書事九月丙午葬孝順皇帝于憲陵廟曰敬宗是日京師及太原鴈門地震庚戌詔舉賢良方正之士策問之皇甫規對曰伏惟孝順皇帝初勤王政紀綱四方幾以獲安後遭姦偽威分近習受賂賣爵賔客交錯天下擾擾從亂如歸官民並竭上下窮虚陛下體兼乾坤聦哲純茂攝政之初拔用忠貞其餘維綱多所改正逺近翕然望見太平而災異不息冦賊縱横殆以姦臣權重之所致也其常侍尤無狀者宜亟黜遣披埽凶黨收入財賄以塞痛怨以荅天誡大將軍冀河南尹不疑亦宜增脩謙節輔以儒術省去遊娛不急之務割減廬第無益之飾夫君者舟也民者水也羣臣乘舟者也將軍兄弟操檝者也若能平志畢力以度元元所謂福也如其怠㢮將淪波濤可不慎乎夫徳不稱禄猶鑿墉之趾以益其髙豈量力審功安固之道哉凡諸宿猾酒徒戲客皆宜貶斥以懲不軌令冀等深思得賢之福失人之累梁冀忿之以規為下第拜郎中託疾免歸州郡承冀㫖幾陷死者再三遂沈廢於家積十餘年揚州刺史尹耀九江太守鄧顯討范容等於歷陽敗歿冬十月日南蠻夷復反攻燒縣邑交阯刺史九江夏方招誘降之十一月九江盜賊徐鳳馬勉等攻燒城邑鳳稱無上將軍勉稱皇帝築營於當塗山中建年號置百官十二月九江賊黄虎等攻合肥是嵗羣盜發憲陵漢孝沖皇帝永嘉元年春正月戊戌帝崩于玉堂前殿梁太后以􅀭徐盜賊方盛欲須所徵諸王矦到乃發喪太尉李固曰帝雖幼少猶天下之父今日崩亡人神感動豈有人子反共掩匿乎昔秦皇沙丘之謀及近日北鄉之事皆祕不發喪此天下大忌不可之甚者也太后從之即暮發喪徵清河王蒜及渤海孝王鴻之子纘皆至京師蒜父曰清河恭王延平延平及鴻皆樂安夷王寵之子千乘貞王伉之孫也淸河王爲人嚴重動止有灋度公卿皆歸心焉李固謂大將軍冀曰今當立帝宜擇長年髙明有徳任親政事者願將軍審詳大計察周霍之立文宣戒鄧閻之利幼弱冀不從與太后定策禁中丙辰冀持節以王青蓋車迎纘入南宫丁巳封為建平矦其日即皇帝位年八嵗蒜罷歸國將卜山陵李固曰今處處冦賊軍興費廣新創憲陵賦發非一帝尚幼小可起陵於憲陵塋内依康陵制度太后從之己未葬孝冲皇帝于懐陵太后委政宰輔李固所言太后多從之黄門宦官為惡者一皆斥遣天下咸望治平而梁冀深忌疾之初順帝時所除官多不以次及固在事奏免百餘人此等既怨又希望冀㫖遂共作飛章誣奏固曰太尉李固因公假私依正行邪離閒近戚自隆支黨大行在殯路人掩涕固獨胡粉飾貌搔頭弄姿槃旋偃仰從容治步曽無慘怛傷悴之心山陵未成違矯舊政善則稱己過則歸君斥逐近臣不得侍送作威作福莫固之甚矣夫子罪莫大於累父臣惡莫深於毁君固之過釁事合誅辟書奏冀以白太后使下其書太后不聽廣陵賊張嬰復聚衆數千人反據廣陵二月乙酉赦天下西羌叛亂積年費用八十餘億諸將多斷盜牢禀私自潤入皆以珍寳貨賂左右上下放縱不恤軍事士卒不得其死者白骨相望於野左馮翊梁並以恩信招誘叛羌離湳狐奴等五萬餘户皆詣並降隴右復平太后以徐􅀭盜賊益熾􅀶求將帥三公舉涿令北海滕撫有文武才詔拜撫九江都尉與中郎將趙序助馮緄合州郡兵數萬人共討之又廣開賞募錢邑各有差又議遣太尉李固未及行三月撫等進擊衆賊大破之斬馬勉范容周生等千五百級徐鳳以餘衆燒東城縣夏五月下邳人謝安應募率其宗親設伏擊鳳斬之封安為平鄉矦拜滕撫中郎將督􅀭徐二州事丙辰詔曰孝殤皇帝即位踰年君臣禮成孝安皇帝承襲統業而前世遂令恭陵在康陵之上先後相踰失其次序今其正之六月鮮卑冦代郡秋廬江盜賊攻尋陽又攻盱台滕撫遣司馬王章擊破之九月庚戌太傅趙峻薨滕撫進擊張嬰冬十一月丙午破嬰斬獲千餘人丁未中郎將趙序坐畏懦詐増首級棄市歷陽賊華孟自稱黑帝攻殺九江太守楊岑滕撫進擊破之斬孟等三千八百級虜獲七百餘人於是東南悉平振旅而還以撫為左馮翊永昌太守劉君世鑄黄金為文蛇以獻大將軍冀益州刺史种暠紏發逮捕馳傳上言冀由是恨暠㑹巴郡人服直聚黨數百人自稱天王暠與太守應承討捕不克吏民多被傷害冀因此陷之傳逮暠承李固上疏曰臣伏聞討捕所傷本非暠承之意實由縣吏懼灋畏罪迫逐深苦致此不詳比盜賊羣起處處未絶暠承以首舉大姦而相隨受罪臣恐沮傷州縣紏發之意更共飾匿莫復盡心太后省奏乃赦暠承罪免官而已金蛇輸司農冀從大司農杜喬借觀之喬不肯與冀小女死令公卿㑹喪喬獨不往冀由是銜之資治通鑑卷第五十二
