front:
  text: 深溝髙壘勿與戰彼前不得鬬退不得還野無所掠不至十日而两將之頭可致於麾下否則必為二子所禽矣成安君嘗自稱義兵不用詐謀竒計曰韓信兵少而疲如此避而不擊則諸矦謂吾怯而輕來伐我矣韓信使人間視知其不用廣武君䇿則大喜乃敢引兵遂下未至井陘口三十里止舍夜半傳發選輕騎二千人人持一赤幟從間道萆山而望趙軍誡曰趙見我走必空壁逐我若疾入趙壁拔趙幟立漢赤幟令其禆將傳餐曰今日破趙㑹食諸將皆莫信佯應曰諾信曰趙已先據便地為壁且彼未見吾大將旗皷未肯擊前行恐吾至阻險而還也乃使萬人先行出背水陳趙軍望見而大笑平旦信建大將旗皷皷行出井陘口趙開壁撃之大戰良乆於是信與張耳佯棄旗皷走水上軍水上軍開入之復疾戰趙果空壁爭漢旗皷逐信耳信耳已入水上軍軍皆殊死戰不可敗信所出竒兵二千騎共候趙空壁逐利則馳入趙壁皆拔趙旗立漢赤幟二千趙軍已不能得信等欲還歸壁壁皆漢赤幟見而大驚以為漢皆已得趙王將矣兵遂亂遁走趙將雖斬之不能禁也於是漢兵夾擊大破趙軍斬成安君泜水上禽趙王歇諸將効首虜畢賀因問信曰兵法右倍山陵前左水澤今者將軍令臣等反背水陳曰破趙㑹食臣等不服然竟以勝此何術也信曰此在兵法顧諸君不察耳兵法不曰䧟之死地而後生置之亡地而後存且信非得素拊循士大夫也此所謂驅市人而戰之其勢非置之死地使人人自為戰今予之生地皆走寧尚可得而用之乎諸將皆服曰善非臣所及也信募生得廣武君者予千金有縛致麾下者信解其縛東鄉坐師事之問曰僕欲北攻燕東伐齊何若而有功廣武君辭謝曰臣敗亡之虜何足以權大事乎信曰僕聞之百里奚居虞而虞亡在秦而秦霸非愚於虞而智於秦也用與不用聽與不聽也誠令成安君聽足下計若信者亦已為禽矣以不用足下故信得侍耳今僕委心歸計願足下勿辭廣武君曰今將軍涉西河虜魏王禽夏説東下井陘不終朝而破趙二十萬衆誅成安君名聞海内威震天下農夫莫不輟耕釋耒褕衣甘食傾耳以待命者此將軍之所長也然而衆勞卒罷其實難用今將軍欲舉倦敝之兵頓之燕堅城之下欲戰不得攻之不拔情見勢屈曠日持乆糧食單竭燕既不服齊必距境以自彊燕齊相持而不下則劉項之權未有所分也此將軍所短也善用兵者不以短擊長而以長擊短韓信曰然則何由廣武君對曰方今為將軍計莫如按甲休兵鎮撫趙民百里之内牛酒日至以饗士大夫北首燕路而後遣辯士奉咫尺之書􅁀其所長於燕燕必不敢不聽從燕已從而東臨齊雖有智者亦不知為齊計矣如是則天下事皆可圖也兵固有先聲而後實者此之謂也韓信曰善從其䇿發使使燕燕從風而靡遣使報漢且請以張耳王趙漢王許之楚數使竒兵渡河擊趙張耳韓信往來救趙因行定趙城邑發兵詣漢甲戍晦日有食之十一月癸卯晦日有食之隨何至九江九江太宰主之三日不得見随何説太宰曰王之不見何必以楚為彊以漢為弱也此臣之所以為使使何得見言之而是大王所􅁒聞也言之而非使何等二十人伏斧質九江市足以明王倍漢而與楚也太宰乃言之王王見之隨何曰漢王使臣敬進書大王御者切怪大王與楚何親也九江王曰寡人北鄉而臣事之隨何曰大王與項王俱列為諸侯北鄉而臣事之者必以楚為彊可以托國也項王伐齊身負版築為士卒先大王冝悉九江之衆身自將之為楚前鋒今乃發四千人以助楚夫北面而臣事人者固若是乎漢王入彭城項王未出齊也大王冝悉九江之兵渡淮日夜㑹戰彭城下大王乃撫萬人之衆無一人渡淮者垂拱而觀其孰勝夫託國於人者固若是乎大王提空名以鄉楚而欲厚自託臣竊為大王不取也然而大王不背楚者以漢為弱也夫楚兵雖彊天下負之以不義之名以其背盟約而殺義帝也漢王收諸侯還守成臯滎陽下蜀漢之粟深溝壁壘分卒守徼乗塞楚人深入敵國八九百里老弱轉糧千里之外漢堅守而不動楚進則不得功退則不能解故曰楚兵不足恃也使楚勝漢則諸侯自危懼而相救夫楚之彊適足以致天下之兵耳故楚不如漢其勢易見也今大王不與萬全之漢而自託於危亡之楚臣竊為大王惑之臣非以九江之兵足以亡楚也大王發兵而倍楚項王必留留數月漢之取天下可以萬全臣請與大王提劒而歸漢漢王必裂地而封大王又况九江必大王有也九江王曰請奉命隂許畔楚與漢未敢泄也楚使者在九江舍􅀓舍方急責布發兵隨何直入坐楚使者上曰九江王已歸漢楚何以得發兵布愕然楚使者起何因説布曰事已構可遂殺楚使者無使歸而疾走漢并力布曰如使者教於是殺楚使者因起兵而攻楚楚使項聲龍且攻九江數月龍且破九江軍布欲引兵走漢恐楚兵殺之乃間行與何俱歸漢十二月九江王至漢漢王方踞牀洗足召布入見布大怒悔來欲自殺及出就舍帳御飲食從官皆如漢王居布又大喜過望於是乃使人入九江楚已使項伯收九江兵盡殺布妻子布使者頗得故人幸臣將衆數千人歸漢漢益九江王兵與俱屯成臯楚數侵奪漢甬道漢軍乏食漢王與酈食其謀橈楚權食其曰昔湯伐桀封其後於杞武王伐紂封其後於宋今秦失徳棄義侵伐諸侯滅其社稷使無立錐之地陛下誠能復立六國之後此其君臣百姓必皆戴陛下之徳莫不嚮風慕義願為臣妾徳義已行陛下南鄉稱霸楚必斂祍而朝漢王曰善趣刻印先生因行佩之矣食其未行張良從外來謁漢王方食曰子房前客有為我計橈楚權者具以酈生語告良曰何如良曰誰為陛下畫此計者陛下事去矣漢王曰何哉對曰臣請借前箸為大王籌之昔湯武封桀紂之後者度能制其死生之命也今陛下能制項籍之死命乎其不可一也武王入殷表商容之閭釋箕子之囚封比干之墓今陛下能乎其不可二也發巨橋之粟散鹿臺之錢以賜貧窮今陛下能乎其不可三也殷事已畢偃革為軒倒載干戈示天下不復用兵今陛下能乎其不可四也休馬華山之陽示以無為今陛下能乎其不可五也放牛桃林之隂以示不復輸積今陛下能乎其不可六也天下游士離其親戚棄墳墓去故舊從陛下游者徒欲日夜望咫尺之地今復立六國之後天下游士各歸事其主從其親戚反其故舊墳墓陛下與誰取天下乎其不可七也且夫楚唯無彊六國立者復橈而從之陛下焉得而臣之其不可八也誠用客之謀陛下事去矣漢王輟食吐哺罵曰豎儒幾敗而公事令趣銷印
