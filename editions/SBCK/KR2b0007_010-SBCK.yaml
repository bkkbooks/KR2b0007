body:
  text: 荀恱論曰夫立䇿決勝之術其要有三一曰形二曰勢三曰情形者言其大體得失之數也勢者言其臨時之冝進退之機也情者言其心志可否之實也故䇿同事等而功殊者三術不同也初張耳陳餘説陳渉以復六國自為樹黨酈生亦説漢王所以説者同而得失異者陳渉之起天下皆欲亡秦而楚漢之分未有所定今天下未必欲亡項也故立六國於陳渉所謂多已之黨而益秦之敵也且陳渉未能專天下之地也所謂取非其有以與於人行虚惠而獲實福也立六國於漢王所謂割已之有而以資敵設虛名而受實禍也此同事而異形者也及宋義待秦趙之斃與昔卞莊刺虎同説者也施之戰國之時鄰國相攻無臨時之急則可也戰國之立其日久矣一戰勝敗未必以存亡也其勢非能急於亡敵國也進乗利退自保故累力待時乗敵之斃其勢然也今楚趙所起其與秦勢不並立安危之機呼吸成變進則定功退則受禍此同事而異勢者也伐趙之役韓信軍於汦水之上而趙不能敗彭城之難漢王戰于睢水之上士卒皆赴入睢水而楚兵大勝何則趙兵出國迎戰見可而進知難而退懐内顧之心無出死之計韓信軍孤在水上士卒必死無有二心此信之所以勝也漢王深入敵國置酒髙㑹士卒逸豫戰心不固楚以彊大之威而䘮其國都士卒皆有憤激之氣救敗赴亡之急以決一旦之命此漢之所以敗也且韓信選精兵以守而趙以内顧之士攻之項羽選精兵以攻而漢以怠惰之卒應之此同事而異情者也故曰權不可豫設變不可先圖與時遷移應物變化設䇿之機也漢王謂陳平曰天下紛紛何時定乎陳平曰項王骨鯁之臣亞父鍾離昩龍且周殷之屬不過數人耳大王誠能岀捐數萬斤金行反間間其君臣以疑其心項王為人意忌信䜛必内相誅漢因舉兵而攻之破楚必矣漢王曰善乃出黄金四萬斤與平恣所為不問其出入平多以金縱反間於楚軍宣言諸將鍾離昧等為項王將功多矣然而終不得裂地而王欲與漢為一以滅項氏而分王其地項羽果意不信鍾離昧等夏四月楚圍漢王於滎陽急漢王請和割滎陽以西者為漢亞父勸羽急攻滎陽漢王患之項王使使至漢陳平使為大牢具舉進見楚使即佯驚曰吾以為亞父使乃項王使復持去更以惡草具進楚使楚使歸具以報項王項王果大疑亞父亞父欲急攻下滎陽城項王不信不肯聽亞父聞項王疑之乃怒曰天下事大定矣君王自為之願請骸骨歸未至彭城疽發背而死五月將軍紀信言於漢王曰事急矣臣請誑楚王可以間岀於是陳平夜出女子東門二千餘人楚因四面擊之紀信乃乗王車黄屋左纛曰食盡漢王降楚楚皆呼萬歲之城東觀以故漢王得與數十騎出西門遁去令韓王信與周苛魏豹樅公守滎陽羽見紀信問漢王安在曰已出去矣羽燒殺信周苛樅公相謂曰反國之王難與守城因殺魏豹漢王出滎陽至成臯入關收兵欲復東轅生説漢王曰漢與楚相距滎陽數嵗漢常困願君王出武關項王必引兵南走王深壁勿戰令滎陽成臯間且得休息使韓信等得安輯河北趙地連燕齊君王乃復走滎陽如此則楚所僃者多力分漢得休息復與之戰破之必矣漢王從其計出軍宛葉間與黥布行收兵羽聞漢王在宛果引兵南漢王堅壁不與戰漢王之敗彭城解而西也彭越皆亡其所下城獨將其兵北居河上常往來為漢游兵擊楚絶其後糧是月彭越度睢與項聲薛公戰下邳破殺薛公羽乃使終公守成臯而自東擊彭越漢王引兵北擊破終公復軍成臯六月羽已破走彭越聞漢復軍成臯乃引兵西拔滎陽城生得周苛羽謂苛為我將以公為上將軍封三萬户周苛罵曰若不趨降漢今為虜矣若非漢王敵也羽烹周苛并殺樅公而虜韓王信遂圍成臯漢王逃獨與􅅬公共車出成臯玉門北渡河宿小脩武􅀓舍晨自稱漢使馳入趙壁張耳韓信未起即其卧内奪其印符以麾召諸將易置之信耳起乃知漢王來大驚漢王既奪兩人軍即令張耳狥行僃守趙地拜韓信為相國收趙兵未發者擊齊諸將稍稍得出成臯從漢王楚遂拔成臯欲西漢使兵距之鞏令其不得西秋七月有星孛于大角臨江王敖薨子尉嗣漢王得韓信軍復大振八月引兵臨河南鄉軍小脩武欲復與楚戰郎中鄭忠説止漢王使髙壘深壍勿與戰漢王聽其計使將軍劉賈盧綰將卒二萬人騎數百度白馬津入楚地佐彭越燒楚積聚以破其業無以給項王軍食而已楚兵擊劉賈賈輒堅壁不肯與戰而與彭越相保彭越攻徇梁地下睢陽外黄等十七城九月項王謂大司馬曹咎曰謹守成臯即漢王欲挑戰慎勿與戰勿令得東而已我十五日必定梁地復從將軍羽引兵東行擊陳留外黄睢陽等城皆下之漢王欲􅂢成臯以東屯鞏洛以距楚酈生曰臣聞知天之天者王事可成王者以民為天而民以食為天夫敖倉天下轉輸乆矣臣聞其下乃有藏粟甚多楚人拔滎陽不堅守敖倉乃引而東令適卒分守成臯此乃天所以資漢也方今楚易取而漢反却自奪其便臣竊以為過矣且两雄不俱立楚漢乆相持不决海内揺蕩農夫釋耒紅女下機天下之心未有所定也願足下急復進兵收取滎陽據敖倉之粟塞成臯之險杜大行之道距蜚狐之口守白馬之津以示諸矦形制之勢則天下知所歸矣王從之乃復謀取敖倉食其又説王曰方今燕趙已定唯齊未下諸田宗彊負海岱阻河濟南近於楚人多變詐足下雖遣數萬師未可以嵗月破也臣請得奉明詔説齊王使為漢而稱東藩上曰善乃使酈生説齊王曰王知天下之所歸乎王曰不知也天下何所歸酈生曰歸漢曰先生何以言之曰漢王先入咸陽項王負約王之漢中項王遷殺義帝漢王聞之起蜀漢之兵擊三秦出關而責義帝之處收天下之兵立諸矦之後降城即以侯其將得賂即以分其士與天下同其利豪英賢才皆樂為之用項王有倍約之名殺義帝之實於人之功無所記於人之罪無所忘戰勝而不得其賞拔城而不得其封非項氏莫得用事天下畔之賢才怨之而莫為之用故天下之事歸於漢王可坐而䇿也夫漢王發蜀漢定三秦渉西河破北魏出井陘誅成安君此非人之力也天之福也今已據敖倉之粟塞成臯之險守白馬之津杜大行之阪距蜚狐之口天下後服者先亡矣王疾先下漢王齊國可得而保也不然危亡可立而待也先是齊聞韓信且東兵使華無傷田解將重兵屯歷下以距漢及納酈生之言遣使與漢平乃罷歷下守戰僃與酈生日縱酒為樂韓信引兵東未度平原聞酈食其已説下齊欲止辯士蒯徹説信曰將軍受詔擊齊而漢獨發間使下齊寧有詔止將軍乎何以得毋行也且酈生一士伏軾掉三寸之舌下齊七十餘城將軍以數萬衆嵗餘乃下趙五十餘城為將數嵗反不如一豎儒之功乎於是信然之遂渡河四年冬十月信襲破齊歷下軍遂至臨淄齊王以酈生為賣已乃烹之引兵東走髙密使使之楚請救田横走慱陽守相田光走城陽將軍田既軍於膠東楚大司馬咎守成臯漢數挑戰楚軍不出使人辱之數日咎怒渡兵汜水士卒半渡漢擊之大破楚軍盡得楚國金玉貨賂咎及司馬欣皆自剄汜水上漢王引兵渡河復取成臯軍廣武就敖倉食項羽下梁地十餘城聞成臯破乃引兵還漢軍方圍鍾離昧於滎陽東聞羽至盡走險阻羽亦軍廣武與漢相守數月楚軍食少項王患之乃為髙袓置太公其上告漢王曰今不急下吾烹太公漢王曰吾與羽俱北面受吾懐王約為兄弟吾翁即若翁必欲烹而翁幸分我一桮羮項王怒欲殺之項伯曰天下事未可知且為天下者不顧家雖殺之無益祇益禍耳項王從之項王謂漢王曰天下匈匈數嵗者徒以吾兩人耳願與漢王挑戰决雌雄毋徒苦天下之民父子為也漢王笑謝曰吾寧闘智不能闘力項王三令壯士出挑戰漢有善騎射者樓煩輙射殺之項王大怒乃自被甲持㦸挑戰樓煩欲射之項王瞋目叱之樓煩目不敢視手不敢發遂走還入壁不敢復出漢王使人間問之乃項王也漢王大驚於是項王乃即漢王相與臨廣武間而語羽欲與漢王獨身挑戰漢王數羽曰羽負約王我於蜀漢罪一矯殺卿子冠軍罪二救趙不還報而擅劫諸矦兵入關罪三燒秦宫室掘始皇帝冢收私其財罪四殺秦降王子嬰罪五詐阬秦子弟新安二十萬罪六王諸將善地而徙逐故主罪七出逐義帝彭城自都之奪韓王地并王梁楚多自與罪八使人隂殺義帝江南罪九為政不平主約不信天下所不容大逆無道罪十也吾以義兵從諸侯誅殘賊使刑餘罪人擊公何苦乃與公挑戰羽大怒伏弩射中漢王漢王傷胷乃捫足曰虜中吾指漢王病創卧張良彊請漢王起行勞軍以安士卒毋令楚乗勝漢王出行軍疾甚因馳入成臯韓信已定臨淄遂東追齊王項王使龍且將兵號二十萬以救齊與齊王合軍髙密客或説龍且曰漢兵遠鬭窮戰其鋒不可當齊楚自居其地兵易敗散不如深壁齊王使其信臣招所亡城亡城聞王在楚來救必反漢漢兵二千里客居齊地齊城皆反之其勢無所得食可無戰而降也龍且曰吾平生知韓信為人易與耳寄食於漂母無資身之䇿受辱於袴下無兼人之勇不足畏也且夫救齊不戰而降之吾何功今戰而勝之齊之半可得也十一月齊楚與漢夾濰水而陳韓信夜令人為萬餘囊滿盛沙壅水上流引軍半渡擊龍且洋不勝還走龍且果喜曰固知信怯也遂追信信使人决壅囊水大至龍且軍大半不得渡即急擊殺龍且水東軍散走齊王廣亡去信遂追北至城陽虜齊王廣漢將灌嬰追得齊守相田光進至慱陽田横聞齊王死自立為齊王還擊嬰嬰敗横軍於嬴下田横亡走梁歸彭越嬰進擊齊將田吸於千乗曹參擊田既於膠東皆殺之盡定齊地立張耳為趙王漢王疾愈西入關至櫟陽梟故塞王欣頭櫟陽市留四日復如軍軍廣武韓信使人言漢王曰齊偽詐多變反覆之國也南邊楚請為假王以鎮之漢王發書大怒罵曰吾困於此旦暮望若來佐我乃欲自立為王張良陳平躡漢王足因附耳語曰漢方不利寧能禁信之自王乎不如因而立之善遇使自為守不然變生漢王亦悟因復罵曰大丈夫定諸侯即為真王耳何以假為春二月遣張良操印立韓信為齊王徴其兵擊楚項王聞龍且死大懼使盱台人武渉徃説齊王信曰天下共苦秦乆矣相與戮力擊秦秦已破計功割地分土而王之以休士卒今漢王復興兵而東侵人之分奪人之地已破三秦引兵出關收諸侯之兵以東擊楚其意非盡吞天下者不休其不知厭足如是甚也且漢王不可必身居項王掌握中數矣項王憐而活之然得脱輙倍約復擊項王其不可親信如此今足下雖自以與漢王為厚交為之盡力用兵必終為所禽矣足下所以得湏㬰至今者以項王尚存也當今二王之事權在足下足下右投則漢王勝左投則項王勝項王今日亡則次取足下足下與項王有故何不反漢與楚連和參分天下王之今釋此時而自必於漢以擊楚且為智者固若此乎韓信謝曰臣事項王官不過郎中位不過執㦸言不聽畫不用故倍楚而歸漢漢王授我上将軍印予我數萬衆解衣衣我推食食我言聽計用故吾得以至於此夫人深親我我倍之不祥雖死不易幸為信謝項王武渉已去蒯徹知天下權在信乃以相人之術説信曰僕相君之面不過封侯又危不安相君之背貴乃不可言韓信曰何謂也蒯徹曰天下初發難也憂在亡秦而已今楚漢分爭使天下之人肝膽塗地父子􅁀骸骨於中野不可勝數楚人起彭城轉鬬逐北乗利席卷威震天下然兵困於京索之間迫西山而不能進者三年於此矣漢王將數十萬之衆距鞏雒阻山河之險一日數戰無尺寸之功折北不救此所謂智勇俱困者也百姓罷極望怨無所歸倚以臣料之其勢非天下之賢聖固不能息天下之禍當今两主之命縣於足下足下爲漢則漢勝與楚則楚勝誠能聽臣之計莫若两利而俱存之參分天下鼎足而居其勢莫敢先動夫以足下之賢聖有甲兵之衆據彊齊從燕趙出空虛之地而制其後因民之欲西鄉爲百姓請命則天下風走而響應矣孰敢不聽割大弱彊以立諸侯諸侯已立天下服聽而歸徳於齊案齊之故有膠泗之地深拱揖讓則天下之君王相率而朝於齊矣盖聞天與弗取反受其咎時至不行反受其殃願足下熟慮之韓信曰漢王遇我甚厚吾豈可以鄉利而倍義乎蒯生曰始常山王成安君為布衣時相與為刎頸之交後爭張黶陳澤之事常山王殺成安君泜水之南頭足異處此二人相與天下至驩也然而卒相禽者何也患生於多欲而人心難測也今足下欲行忠信以交於漢王必不能固於二君之相與也而事多大於張黶陳澤者故臣以為足下必漢王之不危已亦誤矣大夫種存亡越霸句踐立功成名而身死亡野獸已盡而獵狗烹夫以交友言之則不如張耳之與成安君者也以忠信言之則不過大夫種之於句踐也此二者足以觀矣願足下深慮之且臣聞勇略震主者身危功盖天下者不賞今足下戴震主之威挾不賞之功歸楚楚人不信歸漢漢人震恐足下欲持是安歸乎韓信謝曰先生且休矣吾將念之後數日蒯徹復説曰夫聽者事之􅇋也計者事之機也聽過計失而能乆安者鮮矣故知者决之斷也疑者事之害也審毫釐之小計遺天下之大數智誠知之决弗敢行者百事之禍也夫功者難成而易敗時者難得而易失也時乎時不再來韓信猶豫不忍倍漢又自以為功多漢終不奪我齊遂謝蒯徹因去佯狂為巫秋七月立黥布為淮南王八月北貉燕人來致梟騎助漢漢王下令軍士不幸死者吏為衣衾棺歛轉送其家四方歸心焉是嵗以中尉周昌為御史大夫昌苛從弟也項羽自知少助食盡韓信又進兵擊楚羽患之漢遣侯公説羽請太公羽乃與漢約中分天下割洪溝以西為漢以東為楚歸太公吕后引兵解而東歸漢王欲西歸張良陳平説曰漢有天下太半而諸侯皆附楚兵疲食盡此天亡之時也今釋弗擊此謂養虎自遺患也漢王從之資治通鑑卷第十
