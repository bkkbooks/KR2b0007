front:
  text: 岸温攀温楷果走趣城平幼追擊大破之詳夜將妻子犇彭城其衆三萬餘户皆降於燕垂以太原王楷爲兖州刺史鎭東阿􅀄垂在長安秦王堅甞與之交手語垂岀宂從僕射光祚言於堅曰陛下頗疑慕容垂乎垂非乆為人下者也堅以告垂及秦主丕自鄴犇晉陽祚與黄門侍郎封孚鉅鹿太守封勸皆來犇勸弈之子也垂之再圍鄴也秦故臣西河朱肅等各以其衆來犇詔以祚等爲河北諸郡太守皆營於濟北濮陽羈屬温詳詳敗俱詣燕軍降垂赦之撫待如舊垂見光祚流涕沾衿曰秦主待我深吾事之亦盡但爲二公猜忌吾懼死而負之每一念之中宵不寐祚亦悲慟垂賜祚金帛祚固辭垂曰卿猶復疑邪祚曰臣昔者惟知忠於所事不意陛下至今懷之臣敢逃其死垂曰此乃卿之忠固吾所求也前言戲之耳待之彌厚以爲中常侍
  hash: sha256:0f69388f382c462070d862c6764c330c8a06f4c986f79195b856de380abdeb7f
body:
  text: 翟遼遣其子釗寇陳潁朱序遣將軍秦膺擊走之秦主登立妃毛氏爲皇后勃海王懿爲太弟后興之女也遣使拜東海王纂爲使持節都督中外諸軍事太師領大司馬封魯王纂弟師奴爲撫軍大將軍并州牧封朔方公纂怒謂使者曰勃海王先帝之子南安王何以不立而自立乎長史王旅諌曰南安已立理無中改今冦虜未滅不可宗室之中自爲仇敵也纂乃受命於是盧水胡彭沛榖屠各董成張龍世新平羗雷惡地等皆附於纂有衆十餘萬後秦主萇徙秦州豪傑三萬户于安定初安次人齊涉聚衆八千餘家據新柵降燕燕主垂拜渉魏郡太守既而復叛連張願願自帥萬餘人進屯祝阿之瓮口招翟遼共應涉髙陽王隆言於垂曰新柵堅固攻之未易猝㧞若乆頓兵於其城下張願擁帥流民西引丁零爲患方深願衆雖多然皆新附未䏻力闘因其自至宜先擊之願父子恃其驍勇必不肯避去可一戰擒也願破則涉自不能存矣垂從之二月遣范陽王德陳留王紹龍驤將軍張崇帥步􅀐二萬㑹隆擊願軍至斗城去瓮口二十餘里解鞍頓息願引兵奄至燕人驚遽德軍退走隆勒兵不動願子􅀛出衝陳隆遣左右王末逆擊斬之隆徐進戰願兵乃退徳行里餘復整兵還與隆合謂隆曰賊氣方銳宜且緩之隆曰願乗人不備宜得大捷而吾士卒皆以懸隔河津􅀔迫之故人思自戰故䏻却之今賊不得利氣竭􅀔衰皆有進退之志不䏻齊奮宜亟擊之德曰吾唯卿所爲耳遂進戰於瓮口大破之斬首七千八百級願脫身保三布口燕人進軍歷城青兖徐州郡縣壁壘多降垂以陳留王紹爲青州刺史鎭歷城德等還師新柵人冬鸞執渉送之垂誅渉父子餘悉原之三月秦主登以竇衝爲南秦州牧楊定爲益州牧楊壁爲司空梁州牧乞伏國仁爲大將軍大單于苑川王燕上谷人王敏殺太守封戢代郡人許謙逐太守賈閏各以郡附劉顯燕樂浪王温爲尚書右僕射夏四月戊辰尊帝母李氏爲皇太妃儀服如太后後秦征西將軍姚碩德爲楊定所逼退守涇陽定與秦魯王纂共攻之戰于涇陽碩德大敗後秦主萇自隂宻救之纂退屯敷陸燕主垂自碻磝還中山慕容柔慕容盛慕容㑹來自長子庚辰垂爲之大赦垂問盛長子人情如何爲可取乎盛曰西軍擾擾人有東歸之志陛下唯當脩仁政以俟之耳若大軍一臨必投戈而來若孝子之歸慈父也垂恱癸未封柔爲陽平王盛爲長樂公㑹爲清河公髙平人翟暢執太守徐含逺以郡降翟遼燕主垂謂諸將曰遼以一城之衆返覆三國之間不可不討五月以章武王宙監中外諸軍事輔太子寳守中山垂自帥諸將􅀯攻遼以太原王楷爲前鋒都督遼衆皆燕趙之人聞楷至皆曰太原王子吾之父母也相帥歸之遼懼遣使請降垂以遼爲徐州牧封河􅀯公前至􅀺陽受降而還井陘人賈鮑招引北山丁零翟遥等五千餘人夜襲中山䧟其外郭章武王宙以竒兵出其外太子寳鼓譟於内合擊大破之盡俘其衆唯遥鮑單馬走免劉顯地廣兵彊雄於北方㑹其兄弟乖争魏長史張衮言於魏王珪曰顯志在并吞今不乗其内潰而取之必爲後患然吾不䏻獨克請與燕共攻之珪從之復遣安同乞師於燕詔徴㑹稽處士戴逵逵累辭不就郡縣敦逼不已逵逃匿于吴謝玄上䟽曰逵自求其志今王命未回將罹風霜之患陛下旣已愛而器之亦宜使其身名並存請絶召命帝許之逵􅋟之兄也秦主登以其兄同成爲司徒守尚書令封潁川王弟廣爲中書監封安成王子崇爲尚書左僕射封東平王燕主垂自􅀺陽還中山吴深殺燕清河太守丁國章武人王祖殺太守白欽勃海人張申據髙城以叛燕主垂命樂浪王温討之苑川王國仁帥􅀐三萬襲鮮卑大人宻貴􅁉茍提倫三部于六泉秋七月與没奕千金熈戰于渇渾川沒弈于金熈大敗三部皆降秦主登軍于瓦亭後秦主萇攻彭沛榖堡㧞之榖犇杏城萇還隂宻以太子興鎭長安燕趙王麟討王敏于上谷斬之劉衛辰獻馬於燕劉顯掠之燕主垂怒遣太原王楷將兵助趙王麟擊顯大破之顯犇馬邑西山魏王珪引兵㑹麟擊顯於彌澤又破之顯犇西燕麟悉收其部衆獲馬牛羊以千萬數吕光將彭晃徐炅攻張大豫于臨洮破之大豫犇廣武王穆犇建康八月廣武人執大豫送姑臧斬之穆襲據酒泉自稱大將軍涼州牧辛巳立皇子德宗爲太子大赦燕主垂立劉顯弟可泥為烏桓王以撫其衆徙八千餘落于中山秦馮翊太守蘭櫝帥衆二萬自頻陽入和寧與魯王纂謀攻長安纂弟師奴勸纂稱尊號纂不從師奴殺纂而代之櫝遂與師奴絶西燕主永攻櫝櫝遣使請救於後秦後秦主萇欲自救之尚書令姚旻左僕射尹緯曰苻登近在瓦亭將乗虚襲吾後萇曰苻登衆盛非旦夕可制登遲重少決必不能輕軍深入比兩月閒吾必破賊而返登雖至無䏻爲也九月萇軍于泥源師奴逆戰大敗亡犇鮮卑後秦盡收其衆屠各董成等皆降秦主登進據胡空堡戎夏歸之者十餘萬冬十月翟遼復叛燕遣兵與王祖張申冦抄清河平原後秦主萇進擊西燕王永於河西永走蘭櫝復列兵拒守萇攻之十二月禽櫝遂如杏城後秦姚方成攻秦雍州刺史徐嵩壘拔之執嵩而數之嵩罵曰汝姚萇罪當萬死苻黄眉欲斬之先帝止之授任内外榮寵極矣曽不如犬馬識所養之恩親爲大逆汝羗輩豈可以人理期也何不速殺我早見先帝取姚萇於地下治之方成怒三斬嵩悉阬其士卒以妻子賞軍後秦王萇掘秦主堅尸鞭撻無數剥衣倮形薦之以棘坎土而埋之涼州大饑米斗直錢五百人相食死者太半吕光西平太守康寧自稱匈奴王殺河湟太守強禧以叛張掖太守彭晃亦叛東結康寧西通王穆光欲自擊晃諸將皆曰今康寜在􅀯伺釁而動若晃穆未誅康寧復至進退狼狽􅀔必大危光曰實如卿言然我今不往是坐待其來也若三寇連兵東西交至則城外皆非吾有大事去矣今晃初叛與寜穆情契未宻出其倉猝取之差易耳乃自帥􅀐三萬倍道兼行旣至攻之二旬拔其城誅晃初王穆起兵遣使招敦煌處士郭瑀瑀歎曰今民將左祍吾忍不救之邪乃與同郡索嘏起兵應穆運粟三萬石以餉之穆以瑀爲太府左長史軍師將軍嘏爲敦煌太守旣而穆聽讒言引兵攻嘏瑀諌不聽出城大哭舉手謝城曰吾不復見汝矣還而引􅀍覆面不與人言不食而卒吕光聞之曰二虜相攻此成擒也不可以憚屢戰之勞而失永逸之機也遂帥歩􅀐二萬攻酒泉克之進屯涼興穆引兵東還未至衆潰穆單􅀐走騂馬令郭文斬其首送之十三年春正月康樂獻武公謝玄卒二月秦主登軍朝那後秦主萇軍武都翟遼遣司馬眭瓊詣燕謝罪燕主垂以其數反覆斬瓊以絶之遼乃自稱魏天王改元建光置百官燕青州刺史陳留王紹爲平原太守辟閭渾所逼退屯黄巾固燕主垂更以紹爲徐州刺史渾蔚之子也因符氏亂據齊地來降三月乙亥燕主垂以太子寳録尚書事授之以政自揔大綱而已燕趙王麟擊許謙破之謙犇西燕遂廢代郡悉徙其民於龍城吕光之定涼州也杜進功居多光以爲武威太守貴寵用事羣僚莫及光甥石聦自關中來光問之曰中州人言我爲政何如聦曰但聞有杜進耳不聞有舅光由是忌進而殺之光與羣寮宴語及政事參軍京兆段業曰眀公用灋大峻光曰呉起無恩而楚彊啇鞅嚴刑而秦興業曰起喪其身鞅亡其家皆殘酷之致也眀公方開建大業景行堯舜猶懼不濟乃慕起鞅之爲治豈此州士女所望哉光改容謝之夏四月戊午以朱序爲都督司雍梁秦四州諸軍事雍州刺史戌洛陽以譙王恬代序爲都督兖冀幽并四州諸軍事青兖二州刺史苑川主國仁破鮮卑越質叱黎於平襄􅀗其子詰歸丁亥燕主垂立夫人段氏爲皇后以太子寳領太單于段氏右光禄大夫儀之女其妹適范陽王德儀寳之舅也追謚前妃段氏爲成昭皇后五月秦太弟懿卒謚曰獻哀翟遼徙屯滑臺六月􅁐川王乞伏國仁卒謚曰宣烈廟號烈祖其子公府尚幼羣下推國仁弟乾歸爲大都督大將軍大單于河􅀯王大赦改元太初魏王珪破庫莫奚於弱落水南秋七月庫莫奚復襲魏營珪又破之庫莫奚者本屬宇文部與契丹同類而異種其先皆爲燕王皝所破徙居松漠之間秦後秦自春相持屢戰玄有勝􅀒至是各解歸關西豪桀以後秦乆無成功多去而附秦河􅀯王乾歸立其妻邊氏爲王后置百官倣漢制以􅀯川矦出連乞都爲丞相梁州刺史悌眷爲御史大夫金城邊芮爲左長史東秦州刺史祕冝爲右長史武始翟勍爲左司馬略陽王松壽爲主簿從弟軻彈爲梁州牧弟益州爲秦州牧屈眷爲河州牧八月秦主登立子崇爲皇太子弁爲􅀯安王尚爲北海王燕護軍將軍平㓜㑹章武王宙討呉深破之深走保繹幕魏王珪密有圖燕之志遣九原公儀奉使至中山燕主垂詰之曰魏王何以不自來儀曰先王與燕並事晉室丗爲兄弟臣今奉使於理未失垂曰吾今威加四海豈得以昔日爲比儀曰燕若不脩德禮欲以兵威自彊此乃將帥之事非使臣所知也儀還言於珪曰燕主衰老太子闇弱范陽王自負材氣非少主臣也燕主旣沒内難必作於時乃可圖也今則未可珪善之儀珪母弟翰之子也九月河南王乾歸遷都金城張申攻廣平王祖攻樂陵壬午燕髙陽王隆將兵討之冬十月後秦主萇還安定秦主登就食新平帥衆萬餘圍萇營四面大哭萇命營中哭以應之登乃退十二月庚子尚書令南康襄公謝石卒燕太原王楷趙王麟將兵㑹髙陽王隆於合口以擊張申王祖帥諸壘共救之夜犯燕軍燕人逆擊走之隆欲追之楷麟曰王祖老賊或詐走而設伏不如俟明隆曰此白地羣盗烏合而來徼幸一決非素有約束䏻壹其進退也今失利而去衆莫爲用乗􅀔追之不過數里可盡禽也申之所恃惟在於祖祖破則申降矣乃留楷麟守申壘隆與平㓜分道擊之比明大獲而還懸所獲之首以示申甲寅申出降祖亦歸罪秦以潁川王同成爲太尉十四年春正月燕以陽平王柔鎭襄國遼西王農在龍城五年庶務修舉乃上表曰臣頃因征即鎭所統將士安逸積年青徐荆雍遺冦尚繁願時代還展竭微效生無餘力没無遺恨臣之志也庚申燕主垂召農爲侍中司􅀠校尉以髙陽王隆爲都督幽平二州諸軍事征北大將軍幽州牧建留臺於龍城以隆録留臺尚書事又以護軍將軍平幼爲征北長史散􅀐常侍封孚爲司馬並兼留臺尚書隆因農舊規修而廣之遼碣由是遂安後秦主萇以秦戰屢勝謂得秦王堅之神助亦於軍中立堅像而禱之曰臣兄襄敕臣復讎新平之禍臣行襄之命非臣罪也苻登陛下踈屬猶欲復讎况臣敢忘其兄乎且陛下命臣以龍驤建業臣敢違之今爲陛下立像陛下勿追計臣過也秦主登升樓遥謂萇曰爲臣弑君而立像求福庸有益乎因大呼曰弑君賊姚萇何不自出吾與汝決之萇不應乆之以戰未有利軍中每夜數驚乃斬像首以送秦秦主登以河南王乾歸爲大將軍大單于金城王甲寅魏王珪襲髙車破之二月吕光自稱三河王大赦改元麟嘉置百官光妻石氏子紹弟德丗自仇池來至姑臧光立石氏爲妃紹爲世子癸巳魏王珪擊吐突隣部於女水大破之盡徙其部落而還秦主登留輜重於大界自將輕騎萬餘攻安定羌宻造保克之夏四月翟遼冦滎陽執太守張卓燕以長樂公盛鎭薊城脩繕舊宫五月清河民孔金斬呉深送首中山金城王乾歸擊矦年部大破之於是秦涼鮮卑羌胡多附乾歸乾歸悉授以官爵後秦主萇與秦主登戰數敗乃遣中軍將軍姚崇襲大界登邀擊之於安丘又敗之燕范陽王德趙王麟擊賀訥追犇至勿根山訥窮迫請降徙之上谷質其弟染干於中山秋七月以驃􅀐長史王忱爲荆州刺史都督荆益寧三州諸軍忱國寶之弟也秦主登攻後秦右將軍呉忠等於平涼克之八月登據苟頭原以逼安定諸將􅂆後秦主萇决戰萇曰與窮寇競勝兵家之忌也吾將以計取之乃留尚書令姚旻守安定夜帥􅀐三萬襲秦輜重于大界克之殺毛后王弁北及南安海王尚擒名將數十人驅掠男女五萬餘口而還毛氏美而勇善􅀐射後秦兵入其營毛氏猶彎弓跨馬帥壯士數百力戰殺七百餘人衆寡不敵爲後秦所執萇將納之毛氏罵且哭曰姚萇汝先已殺天子今又欲辱天后土皇后皇寧汝容乎萇殺之諸将欲因秦軍駭亂擊之萇曰登衆雖亂怒氣猶盛未可輕也遂止登収餘衆屯胡空堡萇使姚碩德鎭安定徙安定千餘家于隂宻遣其弟征南將軍靖鎭之九月庚午以左僕射陸納爲尚書令秦主登之東也後秦主萇使姚碩德置秦州守宰以從弟常戍隴城邢奴戍冀城姚詳戍略陽楊定攻隴冀克之斬常執邢奴詳棄略陽犇隂宻定自稱秦州牧隴西王秦因其所稱而授之冬十月秦主登以竇衝爲大司馬都督隴東諸軍事雍州牧楊定爲左丞相都督中外諸軍事秦梁二州牧約與共攻後秦又約監河西諸軍事并州刺史楊政都督河東諸軍事冀州刺史楊楷各帥其衆㑹長安政楷皆河東人秦主丕旣敗政楷收集流民數萬户政據河西楷據湖陜之閒遣使請命於秦登因而授之燕樂浪悼王温爲冀州刺史翟遼遣丁零故堤詐温爲降於温帳下乙酉刺温殺之并其長史司馬驅帥守兵二百户犇西燕遼西王農邀擊於襄國盡獲之惟堤走免十一月枹罕羌彭奚念附於乞伏乾歸以奚念爲北河州刺史􅀄帝旣親政事威權已出有人主之量已而溺於酒色委事於琅邪王道子道子亦嗜酒日夕與帝以酣歌爲事又崇尚浮屠窮奢極費所親暱者皆姏姆僧尼左右近習爭弄權柄交通請託賄賂公行官賞濫􅄂刑獄謬亂尚書令陸納望宫闕歎曰好家居纎兒欲撞壞之邪左衛領營將軍㑹稽許營上䟽曰今臺府局吏直衛武官及僕􅀠婢兒取母之姓者本無鄉邑品第皆得爲郡守縣令或帶職在内及僧尼乳母競進親黨又受貨賂輒臨官領衆政教不均㬥濫無罪禁令不明刼盗公行昔年下書敇羣下盡規而衆議兼集無所採用臣聞佛者清逺玄虚之神今僧尼往往依傍灋服五誡麤灋尚不能遵况精妙乎而流惑之徒競加敬事又侵漁百姓取財爲惠亦未合布施之道也䟽奏不省道子勢傾内外逺近犇湊帝漸不平然猶外加優崇侍中王國寳以讒佞有寵於道子扇動朝衆諷八座啟道子宜進位丞相揚州牧假黄􅃏加殊禮護軍將軍􅀯平車㣧曰此乃成王所以尊周公也今主上當陽非成王之比相王在位豈得爲周公乎乃稱疾不署䟽奏帝大怒而嘉㣧有守中書侍郎范甯徐邈爲帝所親信數進忠言􅀘正闕失指斥姦黨王國寳甯之甥也甯尤疾其阿䛕勸帝黜之陳郡􅀽恱之有寵於道子國寳使恱之因尼支妙音致書於太子母陳淑媛云國寳忠謹宜見親信帝知之發怒託以他事斬恱之國寳大懼與道子共譖范甯出爲豫章太守甯臨發上䟽言今邊烽不舉而倉庫空匱古者使民歳不過三日今之勞擾殆無三日之休至有生兒不復舉養鰥寡不敢嫁娶臣恐社稷之憂厝火積薪不足喻也甯又上言中原士民流寓江左嵗月漸乆人安其業凡天下之人原其先祖皆隨丗遷移何至於今而獨不可謂宜正其封疆户口皆以土斷又人性無涯奢儉由􅀔今并兼之室亦多不贍非其財力不足蓋由用之無節爭以靡麗相髙無有限極故也禮十九爲長殤以其未成人也今以十六爲全丁十三爲半丁所任非復童幼之事豈不傷天理困百姓乎謂宜以二十爲全丁十六爲半丁則人無夭折生長繁滋矣帝多納用之甯在豫章遣十五議曹下屬城採求風政并吏假還訊問官長得失徐邈與甯書曰足下聽斷眀允庶事無滯則吏愼其􅀒而人聽不惑矣豈湏邑至里詣飾其游聲哉非徒不足致益乃寔蠶漁之所資豈有善人君子而干非其事多所告白者乎自古以來欲爲左右耳目者無非小人皆先因小忠而成其大不忠先藉小信而成其大不信遂使讒謟並進善惡倒置可不戒哉足下愼選綱紀必得國士以攝諸曹諸曹皆得良吏以掌文按又擇公方之人以爲監司則清濁能否與事而眀足下但平心處之何取於耳目哉昔眀德馬后未甞顧左右與言可謂逺識況大丈夫而不能免此乎十二月後秦主萇使其東門將軍任瓫詐遣使招秦主登許開門納之登將從之征東將軍雷惡地將兵在外聞之馳􅀐見登曰姚萇多詐不可信也登乃止萇聞惡地詣登謂諸將曰此羌見登事不成矣登以惡地勇略過人隂憚之惡地懼降於後秦萇以惡地爲鎭軍將軍秦以安成王廣爲司徒十五年春正月乙亥譙敬王恬薨西燕主永引兵向洛陽朱序自河隂北濟河擊敗之永走還上黨序追至白水㑹翟遼謀向洛陽序乃引兵還擊走之留鷹􅀭將軍朱黨戍石門使其子略督護洛陽以參軍趙蕃佐之身還襄陽琅琊王道子恃寵驕恣侍宴酣醉或虧禮敬帝浸不能平欲選時望爲藩鎮以潜制道子問於太子左衞率王雅曰吾欲用王恭殷仲堪何如雅曰王恭風神簡貴志氣方嚴仲堪謹於細行以文義著稱然皆峻狹自是且幹略不長若委以方面天下無事足以守職若其有事必爲亂階矣帝不從恭藴之子仲堪融之孫也二月辛巳以中書令王恭爲都督青兖幽并冀五州諸軍事兖青二州刺史鎭京口三月戊辰大赦後秦主萇攻秦扶風太守齊益男於新羅堡克之益男走秦主登攻後秦天水太守張業生於隴東萇救之登引去夏四月秦鎭東將軍魏掲飛自稱衝天王帥氐胡攻後秦安北將軍姚當成於杏城鎭軍將軍雷惡地叛應之攻鎭東將軍姚漢得於李潤後秦主萇欲自擊之羣臣皆曰陛下不憂六十里苻登乃憂六百里魏掲飛何也萇曰登非可猝滅吾城亦非登所猝拔惡地智略非常若南引掲飛東結董成得杏城李潤而據之長安東北非吾有也乃潛引精兵一千六百赴之掲飛惡地有衆數萬氐胡赴之者首尾不絶萇每見一軍至輒喜羣臣怪而問之萇曰掲飛等扇誘同惡種類甚繁吾雖克其魁帥餘黨未易猝平今烏集而至吾乗勝取之可一舉無餘也掲飛等見後秦兵少悉衆攻之萇固壘不戰示之以弱潛遣其子中軍將軍崇帥􅀐數百出其後掲飛兵擾亂萇遣鎭逺將軍王超等縱兵擊之斬掲飛及其將士萬餘級惡地請降萇待之如初惡地謂人曰吾自謂智勇傑出一時而每遇姚翁輙困固其分也萇命姚當成於所營之地每柵孔中輙樹一木以旌戰功嵗餘問之當成曰營地太小已廣之矣萇曰吾自結髪以來與人戰未甞如此之快以千餘兵破三萬之衆營地惟小爲竒豈以大爲貴哉吐谷渾視連遣使獻見於金城王乾歸乾歸拜視連沙州牧白蘭王丙寅魏王珪㑹燕趙王麟於意辛山擊賀蘭紇突鄰紇奚三部破之紇突隣紇奚皆降於魏秋七月馮翊人郭質起兵於廣郷以應秦移檄三輔曰姚萇凶虐毒被神人吾屬世䝉先帝堯舜之仁非常伯納言之子即卿校牧守之孫也與其含恥而存孰若蹈道而死於是三輔壁壘皆應之獨鄭縣人苟曜不從聚衆數千附於後秦秦以質爲馮翊太守後秦以曜爲豫州刺史劉衞辰遣子直力鞮攻賀蘭部賀訥困急請降於魏丙子魏王珪引兵救之直力鞮退珪徙訥部落處之東境八月劉牢之擊翟釗於鄄城釗走河北又敗翟遼於滑臺張願來降九月北平人呉柱聚衆千餘立沙門法長爲天子破北平郡轉冦廣都入白狼城燕幽州牧髙陽王隆方葬其夫人郡縣守宰皆㑹之衆聞柱反請隆還城遣大兵討之隆曰今閭閻安業民不思亂柱等以詐謀惑愚夫誘脅相聚無䏻爲也遂留葬訖遣廣平太守廣都令先歸續遣安昌矦進將百餘􅀐趨白狼城柱衆聞之皆潰窮捕斬之以侍中王國寳爲中書令俄兼中領軍丁未以呉郡太守王珣爲尚書右僕射吐谷渾視連卒子視羆立視羆以其父祖慈仁爲四鄰所侵侮乃督厲將士欲建功業冬十月金城王乾歸遣使拜視羆沙州牧白蘭王視羆不受十二月郭質及苟曜戰于鄭東質敗犇洛陽越質詰歸據平襄叛金城王乾歸十六年春正月燕置行臺於薊加長樂公盛録行臺文書事金城王乾歸擊越質詰歸詰歸降乾歸以宗女妻之賀染干謀殺其兄訥訥知之舉兵相攻魏王珪告于燕請爲鄉導以討之二月甲戌燕主垂遣趙王麟將兵擊訥鎭北將軍蘭汗帥龍城之兵擊染干三月秦主登自雍攻後秦安東將軍金榮于范氏堡克之遂渡渭水攻京兆太守韋範于叚氏堡不克進據曲牢夏四月燕蘭汗破賀染干於牛都苟曜有衆一萬宻召秦主登許爲内應登自曲牢向繁川軍于馬頭原五月後秦主萇引兵逆戰登擊破之斬其右將軍呉忠萇収衆復戰姚碩德曰陛下愼於輕戰每欲以計取之今戰失利而更前逼賊何也萇曰登用兵遲緩不識虚實今輕兵直進遥據吾東此必苟曜豎子與之有謀也緩之則其謀得成故及其交之未合急擊之以敗散其事耳遂進戰大破之登退屯於郿秦兖州刺史強金槌據新平降後秦以其子逵爲質後秦主萇將數百􅀐入金槌營羣下諫之萇曰金槌旣去苻登又欲圖我將安所歸乎且彼􅀄來欵附宜推心以結之奈何復以不信疑之乎既而羣氐欲取萇金槌不從六月甲辰燕趙王麟破賀訥於赤城禽之降其部落數萬燕主垂命麟歸訥部落徙染干於中山麟歸言於垂曰臣觀拓跋珪舉動終爲國患不若攝之還朝使其弟監國事垂不從西燕主永冦河南太守楊佺期擊破之秋七月壬申燕主垂如范楊魏王珪遣其弟觚獻見於燕燕主垂衰老子弟用事留觚以求良馬魏王珪弗與遂與燕絶使長史張衮求好於西燕觚逃歸燕太子寳追獲之垂待之如􅀄秦主登攻新平後秦主萇救之登引去秦驃􅀐將軍沒弈干以其二子爲質於金城王乾歸請共擊鮮卑大兠乾歸與没弈干攻大兠於鳴蟬堡克之兠微服走乾歸収其部衆而還歸沒弈干二子沒弈干尋叛東合劉衞辰八月乾歸帥􅀐一萬討沒弈干没弈干犇他樓城乾歸射之中目九月癸未以尚書右僕射王珣爲左僕射太子詹事謝琰爲右僕射太學博士范弘之論殷浩宜加贈謚因敘􅁊温不臣之迹是時􅁊氏猶盛王珣温之故吏也以爲温廢昏立明有忠貞之節黜弘之爲餘杭令弘之汪之孫也冬十月壬辰燕主垂還中山􅀄柔然部人丗服於代其大人郁乆閭地粟􅀽卒部落分爲二長子匹􅇋跋繼父居東邊次子緼紇提别居西邊秦主堅滅代柔然附於劉衞辰及魏王珪即位攻擊髙車等諸部率皆服從獨柔然不事魏戊戌珪引兵擊之柔然舉部遁走珪追犇六百里諸將因張衮言於珪曰賊逺糧盡不如早還珪問諸將若殺副馬爲三日食足乎皆曰足乃復倍道追之及於大磧􅀯牀山下大破之虜其半部匹􅇋跋及别部帥屋擊各収餘衆遁走珪遣長孫嵩長孫肥追之珪謂將佐曰卿曹知吾前問三日糧意乎曰不知也珪曰柔然驅畜産犇走數日至水必留我以輕􅀐追之計其道里不過三日及之矣皆曰非所及也嵩追斬屋擊於平望川肥追匹􅇋跋至􅃰邪山匹􅇋跋舉衆降獲緼紇提之子曷多汗兄子社崘斛律等宗黨數百人緼紇提將犇劉衛辰珪追及之緼紇提亦降珪悉徙其部衆於雲中翟遼卒子釗代立改元定鼎攻燕鄴城燕遼西王農擊却之三河王光遣兵乗虚伐金城王乾歸乾歸聞之引兵還光兵亦退劉衞辰遣子直力鞮帥衆八九萬攻魏南部十一月己卯魏王珪引兵五六千人拒之壬午大破直力鞮於鐵岐山南直力鞮單􅀐走乗勝追之戊子自五原金津南濟河徑入衞辰國衞辰部落駭亂辛卯珪直抵其所居恱跋城衞辰父子出走壬辰分遣諸將輕􅀐追之將軍伊謂禽直力鞮於木根山衞辰爲其部下所殺十二月珪軍于鹽池誅衞辰宗黨五千餘人皆投尸于河自河以南諸部悉降獲馬三十餘萬匹牛羊四百餘萬頭國用由是遂饒衞辰少子勃勃亡犇薛干部珪使人求之薛于部帥太悉伏出勃勃以示使者曰勃勃國破家亡以窮歸我我寧與之俱亡何忍執以與魏乃送勃勃於沒弈干沒弈干以女妻之戊申燕主垂如魯口秦主登攻安定後秦主萇如隂宻以拒之謂太子興曰苟曜聞吾北行必來見汝汝執誅之曜果見興於長安興使尹緯讓而誅之萇敗登於安定城東登退據路承堡萇置酒髙㑹諸將皆曰若值魏武王不令此賊至今陛下將牢太過耳萇笑曰吾不如亡兄有四身長八尺五寸臂垂過膝人望而畏之一也將十萬之衆與天下爭衡望麾而進前無横陳二也温古知今講論道藝收羅英雋三也董帥大衆上下咸恱人盡死力四也所以得建立功業驅䇿羣賢者正望筭略中有片長耳羣臣咸稱萬嵗資治通鑑卷第一百七
