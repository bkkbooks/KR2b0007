front:
  text: 餌大國而不足以有所禁禦方今制在陛下制國而令子適足以爲餌豈可謂不哉臣之愚計願舉淮南地以益淮陽而爲梁王立後割淮陽北邊二三列城與東郡以益梁不可者可徙代王而都睢陽梁起於新郪以北著之河淮陽包陳以南楗之江則大諸矦之有異心者破膽而不敢謀梁足以扞齊趙淮陽足以禁吳楚陛下髙枕終無山東之憂矣此二丗之利也當今恬然適遇諸矦之皆少數􅀊之後陛下且見之矣夫秦日夜苦心勞力以除六國之旤今陛下力制天下頥指如意髙拱以成六國之旤難以言智苟身無事畜亂宿旤孰視而不定萬年之後傳之老母弱子將使不寜不可謂仁帝於是從誼計徙淮陽王武爲梁王北界泰山西至髙陽得大縣四十餘城後􅀊餘賈誼亦死死時年三十三矣
  hash: sha256:b054c01892399e07e911ef0f5bd1bfd39a14cd8abc7b06628ab30a6402c61393
body:
  text: 徙城陽王喜爲淮南王匈奴寇狄道時匈奴數爲邊患太子家令潁川鼂錯上言兵事曰兵灋曰有必勝之將無必勝之民繇此觀之安邊境立功名在於良將不可不擇也臣又聞用兵臨戰合刃之急者三一曰得地形二曰卒服習三曰器用利兵灋歩兵車􅀐弓弩長㦸矛鋋劒楯之地各有所宜不得其宜者或十不當一士不選練卒不服習起居不精動靜不集趨利弗及避難不畢前擊後解與金皷之指相失此不習勒卒之過也百不當十兵不完利與空手同甲不堅密與􅃝裼同弩不可以及逺與短兵同射不能中與無矢同中不能入與無鏃同此將不省兵之禍也五不當一故兵灋曰器械不利以其卒予敵也卒不可用以其將予敵也將不知兵以其主予敵也君不擇將以其國予敵也四者兵之至要也臣又聞小大異形彊弱異埶險易異僃夫卑身以事彊小國之形也合小以攻大敵國之形也以蠻夷攻蠻夷中國之形也今匈奴地形技蓺與中國異上下山阪出入溪澗中國之馬弗與也險道傾仄且馳且射中國之􅀐弗與也風雨罷勞飢渴不困中國之人弗與也此匈奴之長技也若夫平原易地輕車突􅀐則匈奴之衆易撓亂也勁弩長㦸射䟽及逺則匈奴之弓弗能格也堅甲利刃長短相雜遊弩往來什伍俱前則匈奴之兵弗能當也材官騶發矢道同的則匈奴之革笥木薦弗能支也下馬地􅃲劒㦸相接去就相薄則匈奴之足弗能給也此中國之長技也以此觀之匈奴之長技三中國之長技五陛下又興數十萬之衆以誅數萬之匈奴衆寡之計以一擊十之術也雖然兵㓙器戰危事也故以大爲小以彊爲弱在俛仰之間耳夫以人之死爭勝跌而不振則悔之無及也帝王之道出於萬全今降胡義渠蠻夷之屬來歸誼者其衆數千飲食長技與匈奴同可賜之堅甲絮衣勁弓利矢益以邊郡之良􅀐令明將能知其習俗和輯其心者以陛下之明約將之即有險阻以此當之平地通道則以輕車材官制之兩軍相爲表裏各用其長技衡加之以衆此萬全之術也帝嘉之賜錯書寵荅焉錯又上言曰臣聞秦起兵而攻胡粤者非以衞邊地而救民死也貪戾而欲廣大也故功未立而天下亂且夫起兵而不知其埶戰則爲人禽屯則卒積死夫胡貉之人其性耐寒楊粤之人其性耐暑秦之戍卒不耐其水土戍者死於邊輸者僨於道秦民見行如往棄市因以讁發之名曰讁戍先發吏有讁及贅壻賈人後以嘗有市籍者又後以大父母父母嘗有市籍者後入閭取其左發之不順行者憤怨有萬死之害而亡銖兩之報死事之後不得一筭之復天下明知禍烈及巳也陳勝行戍至於大澤爲天下先倡天下從之如流水者秦以威劫而行之之敝也胡人衣食之業不著於地其埶易以擾亂邊境往來轉徙時至時去此胡人之生業而中國之所以離􅀯畮也今胡人數轉牧行獵於塞下以􅇋僃塞之卒卒少則入陛下不救則邊民絶望而有降敵之心救之少發則不足多發逺縣􅂊至則胡又巳去聚而不罷爲費甚大罷之則胡復入如此連年則中國貧苦而民不安矣陛下幸憂邊境遣將吏發卒以治塞甚大惠也然今逺方之卒守塞一􅀊而更不知胡人之能不如選常居者家室田作且以僃之以便爲之髙城深塹要害之處通川之道調立城邑毋下千家先爲室屋具田器乃募民免罪拜爵復其家予冬夏衣稟食能自給而止塞下之民禄利不厚不可使乆居危難之地胡人入驅而能止其所驅者以其半予之縣官爲贖其民如是則邑里相救助赴胡不避死非以德上也欲全親戚而利其財也此與東方之戍卒不習地埶而心畏胡者功相萬也以陛下之時徙民實邊使逺方無屯戍之事塞下之民父子相保無係虜之患利施後丗名稱聖明其與秦之行怨民相去逺矣上從其言募民徙塞下錯復言陛下幸募民徙以實塞下使屯戍之事益省輸將之費益寡甚大惠也下吏誠能稱厚惠奉明灋存䘏所徙之老弱善遇其壯士和輯其心而勿侵刻使先至者安樂而不思故鄉則貧民相慕而勸往矣臣聞古之徙民者相其隂陽之和嘗其水泉之味然後營邑立城製里割宅先爲築室家置器物焉民至有所居作有所用此民所以輕去故鄕而勸之新邑也爲置醫巫以救疾病以脩祭祀男女有昬生死相䘏墳墓相從種樹畜長室屋完安此所以使民樂其處而有長居之心也臣又聞古之制邊縣以僃敵也使五家爲伍伍有長十長一里里有假士四里一連連有假五百十連一邑邑有假候皆擇其邑之賢材有護習地形知民心者居則習民於射灋出則教民於應敵故卒伍成於內則軍政定於外服習以成勿令遷徙幼則同遊長則共事夜戰聲相知則足以相救晝戰目相見則足以相識驩愛之心足以相死如此而勸以厚賞威以重罰則前死不還踵矣所徙之民非壯有材者但費衣糧不可用也雖有材力不得良吏猶亡功也陛下絶匈奴不與和親臣竊意其冬來南也壹大治則終身創矣欲立威者始於折膠來而不能困使得氣去後未易服也錯爲人陗直刻深以其辯得幸太子太子家號曰智囊十二年冬十二月河決酸棗東潰金隄東郡大興卒塞之春三月除􅀜無用傳鼂錯言於上曰聖王在上而民不凍飢者非能耕而食之織而衣之也爲開其資財之道也故堯有九年之水湯有七年之旱而國亡􅂢瘠者以畜積多而僃先具也今海內爲一土地人民之衆不減湯禹加以無天災數年之水旱而畜積未及者何也地有遺利民有餘力生穀之土未盡墾山澤之利未盡出游食之民未盡歸農也夫寒之於衣不待輕暖飢之於食不待甘㫖飢寒至身不顧廉恥人情一日不再食則飢終􅀊不製衣則寒夫腹飢不得食膚寒不得衣雖慈母不能保其子君安能以有其民哉明主知其然也故務民於農桑薄賦歛廣畜積以實倉廩僃水旱故民可得而有也民者在上所以牧之民之趨利如水走下四方無擇也夫珠玉金銀飢不可食寒不可衣然而衆貴之者以上用之故也其爲物輕微易藏在於把握可以周海內而無飢寒之患此令臣輕背其主而民易去其鄕盗賊有所勸亡逃者得輕資也粟米布帛生於地長於時聚於力非可一日成也數石之重中人弗勝不爲姦邪所利一日弗得而飢寒至是故明君貴五榖而賤金玉今農夫五口之家其服役者不下二人其能耕者不過百畮百畮之收不過百石春耕夏耘秋穫冬藏伐薪樵治官府給繇役春不得避風塵夏不得避暑􅀬秋不得避隂雨冬不得避寒凍四時之間亡日休息又私自送往迎來弔死問疾養􅀌長幼在其中勤苦如此尚復􅀍水旱之災急政暴賦賦斂不時朝令而暮改有者半賈而賣無者取倍稱之息於是有賣田宅鬻子孫以償責者矣而商賈大者積貯倍息小者坐列販賣操其竒贏日游都市乗上之急所賣必倍故其男不耕耘女不􅁞織衣必文采食必梁肉無農夫之苦有仟伯之得因其富厚交通王矦力過吏埶以利相傾千里游敖冠蓋相朢乗堅䇿肥履􅁝曵縞此商人所以兼并農人農人所以流亡者也方今之務莫若使民務農而已矣欲民務農在於貴粟貴粟之道在於使民以粟爲賞罰今募天下入粟縣官得以拜爵得以除罪如此富人有爵農民有錢粟有所渫夫能入粟以受爵皆有餘者也取於有餘以供上用則貧民之賦可損所謂損有餘􅀘不足令出而民利者也今令民有車􅀐馬一匹者復卒三人車􅀐者天下武僃也故爲復卒神農之教曰有石城十仞湯池百歩帶甲百萬而無粟弗能守也以是觀之粟者王者大用政之本務令民入粟受爵至五大夫以上乃復一人耳此其與􅀐馬之功相去逺矣爵者上之所擅出於口而無窮粟者民之所種生於地而不乏夫得髙爵與免罪人之所甚欲也使天下人入粟於邊以受爵免罪不過三􅀊塞下之粟必多矣帝從之令民入粟邊拜爵各以多少級數爲差錯復奏言陛下幸使天下入粟塞下以拜爵甚大惠也竊恐塞卒之食不足用大渫天下粟邊食足以支五􅀊可令入粟郡縣矣郡縣足支一􅀊以上可時赦勿收農民租如此德澤加於萬民民愈勤農大富樂矣上復從其言詔曰道民之路在於務本朕親率天下農十年于今而野不加辟􅀊一不登民有飢色是從事焉尚寡而吏未加務吾詔書數下􅀊勸民種樹而功未興是吏奉吾詔不勤而勸民不明也且吾農民甚苦而吏莫之省將何以勸焉其賜農民今年租税之半十三年春二月甲寅詔曰朕親率天下農耕以供粢盛皇后親桑以奉祭服其具禮儀􅀄秦時祝官有祕祝即有災祥輒移過於下夏詔曰蓋聞天道禍自怨起而福繇德興百官之非宜由朕躬今祕祝之官移過於下以彰吾之不德朕甚弗取其除之齊太倉令淳于意有罪當刑詔獄逮繫長安其少女緹縈上書曰妾父爲吏齊中皆稱其廉平今坐灋當刑妾傷夫死者不可復生刑者不可復屬雖後欲改過自新其道無繇也妾願没入爲官婢以贖父刑罪使得自新天子憐悲其意五月詔曰詩曰愷弟君子民之父母今人有過教未施而刑巳加焉或欲改行爲善而道無繇至朕甚憐之夫刑至斷支體刻肌膚終身不息何其刑之痛而不德也豈爲民父母之意哉其除肉刑有以易之及令罪人各以輕重不亡逃有年而免具爲令丞相張蒼御史大夫馮敬奏請定律曰諸當髠者爲城旦舂當黥者髠鉗爲城旦舂當劓者笞三百當斬左止者笞五百當斬右止及殺人先自吿及吏坐受賕枉灋守縣官財物而即盗之巳論而復有笞罪者皆棄市罪人獄巳決爲城旦舂者各有􅀊數以免制曰可是時上旣躬修玄黙而將相皆舊功臣少文多質懲惡亡秦之政論議務在寛厚恥言人之過失化行天下吿訐之俗易吏安其官民樂其業畜積􅀊増户口寖息風流篤厚禁罔䟽闊罪疑者予民是以刑罰大省至於斷獄四百有刑錯之風焉六月詔曰農天下之本務莫大焉今勤身從事而有租稅之賦是爲本末者無以異也其於勸農之道未僃其除田之租税十四年冬匈奴老上單于十四萬􅀐入朝那蕭􅀜殺北地都尉卬虜人民畜産甚多遂至彭陽使竒兵入燒回中宫􅇋􅀐至雍甘泉帝以中尉周舎郎中令張武爲將軍發車千乗􅀐卒十萬軍長安旁以僃胡寇而拜昌矦盧卿爲上郡將軍寗矦魏遫爲北地將軍隆慮矦周竈爲隴西將軍屯三郡上親勞軍勒兵申教令賜吏卒自欲征匈奴羣臣諫不聽皇太后固要上乃止於是以東陽矦張相如爲大將軍成矦董赤內史欒布皆爲將軍擊匈奴單于留塞內月餘乃去漢逐出塞即還不能有所殺上輦過郎署問郎署長馮唐曰父家安在對曰臣大父趙人父徙代上曰吾居代時吾尚食監髙祛數爲我言趙將李齊之賢戰於鉅鹿下今吾每飯意未嘗不在鉅鹿也父知之乎唐對曰尚不如廉頗李牧之爲將也上摶髀曰嗟乎吾獨不得廉頗李牧爲將吾豈憂匈奴哉唐曰陛下雖得廉頗李牧弗能用也上怒起入禁中良乆召唐讓曰公柰何衆辱我獨無間處乎唐謝曰鄙人不知忌諱上方以胡寇爲意乃卒復問唐曰公何以知吾不能用廉頗李牧也唐對曰臣聞上古王者之遣將也跪而推轂曰閫以內者寡人制之閫以外者將軍制之軍功爵賞皆決於外歸而奏之此非虚言也臣大父言李牧爲趙將居邊軍市之租皆自用饗士賞賜決於外不從中覆也委任而責成功故李牧乃得盡其智能選車千三百乗彀􅀐萬三千百金之士十萬是以北逐單于破東胡滅澹抔西抑彊秦南支韓魏當是之時趙幾霸其後㑹趙王遷立用郭開䜛卒誅李牧令顔聚代之是以兵破士北爲秦所禽滅今臣竊聞魏尚爲雲中守其軍市租盡以饗士卒私養錢五日一椎牛自饗賔客軍吏舎人是以匈奴逺避不近雲中之塞虜曽一入尚率車􅀐擊之所殺甚衆夫士卒盡家人子起田中從軍安知尺籍伍符終日力戰斬首捕虜上功幕府一言不相應文吏以灋繩之其賞不行而吏奉灋必用臣愚以爲陛下賞太輕罰太重且雲中守魏尚坐上功首虜差六級陛下下之吏削其爵罰作之由此言之陛下雖得廉頗李牧弗能用也上􅀃是日令唐持節赦魏尚復以爲雲中守而拜唐爲車􅀐都尉春詔廣増諸祀壇塲珪幣且曰吾聞祠官祝釐皆歸福於朕躬不爲百姓朕甚愧之夫以朕之不德而專饗獨美其福百姓不與焉是重吾不德也其令祠官致敬無有所祈是􅀊河間文王辟彊薨初丞相張蒼以爲漢得水德魯人公孫臣以爲漢當土德其應黄龍見蒼以爲非是罷之十五年春黄龍見成紀帝召公孫臣拜爲博士與諸生申明土德草改歷服色事張蒼由此自絀夏四月上始幸雍郊見五帝赦天下九月詔諸矦王公卿郡守舉賢良能直言極諫者上親䇿之太子家令鼂錯對䇿髙第擢爲中大夫錯又上言宜削諸矦及灋令可更定者書凡三十篇上雖不盡聽然竒其材是􅀊齊文王則河間哀王福皆薨無子國除趙人新垣平以望氣見上言長安東北有神氣成五采於是作渭陽五帝廟十六年夏四月上郊祀五帝于渭陽五帝廟於是貴新垣平至上大夫賜累千金而使􅀶士諸生剌六經中作王制謀議廵狩封禪事又於長門道北立五帝壇徙淮南王喜復爲城陽王又分齊爲六國丙寅立齊悼惠王子在者六人楊虚矦將閭爲齊王安都矦志爲濟北王武成矦賢爲葘川王白石矦雄渠爲膠東王平昌矦卬爲膠西王扐矦辟光爲濟南王淮南厲王子在者三人阜陵矦安爲淮南王安陽矦勃爲衡山王陽周矦賜爲廬江王秋九月新垣平使人持玉杯上書闕下獻之平言上曰闕下有寶玉氣來者巳視之果有獻玉杯者刻曰人主延壽平又言臣􅇋日再中居頃之日郤復中於是始更以十七年爲元年令天下大酺平言曰周鼎亡在泗水中今河決通於泗臣望東北汾隂直有金寳氣意周鼎其出乎兆見不迎則不至於是上使使治廟汾隂南臨河欲祠出周鼎後元年冬十月人有上書吿新垣平所言皆詐也下吏治誅夷平是後上亦怠於改正服􅀑神之事而渭陽長門五帝使祠官領以時致禮不往焉春三月孝惠皇后張氏薨詔曰閒者數年不登又有水旱疾疫之災朕甚憂之愚而不明未逹其咎意者朕之政有所失而行有過與乃天道有不順地利或不得人事多失和􅀑神廢不享與何以致此將百官之奉養或廢無用之事或多與何其民食之寡乏也夫度田非益寡而計民未加益以口量地其於古猶有餘而食之甚不足者其咎安在無乃百姓之從事於末以害農者蕃爲酒醪以靡榖者多六畜之食焉者衆與細大之義吾未得其中其與丞相列矦吏二千石博士議之有可以佐百姓者率意逺思無有所隱二年夏上行幸雍棫陽宫六月代孝王參薨匈奴連􅀊入邊殺略人民畜産甚多雲中遼東最甚郡萬餘人上患之乃使使遺匈奴書單于亦使當户報謝復與匈奴和親八月戊戌丞相張蒼免帝以皇后弟竇廣國賢有行欲相之曰恐天下以吾私廣國乆念不可而髙帝時大臣餘見無可者御史大夫梁國申屠嘉故以材官蹶張從髙帝封􅀜內矦庚午以嘉爲丞相封故安矦嘉爲人廉直門不受私謁是時太中大夫鄧通方愛幸賞賜累鉅萬帝嘗燕飲通家其寵幸無比嘉嘗入朝而通居上旁有怠慢之禮嘉奏事畢因言曰陛下幸愛羣臣則富貴之至於朝廷之禮不可以不肅上曰君勿言吾私之罷朝坐府中嘉爲檄召通詣丞相府不來且斬通通恐入言上上曰汝第徃吾今使人召若通詣丞相免冠徒跣頓首謝嘉嘉坐自如弗爲禮責曰夫朝廷者髙帝之朝廷也通小臣戲殿上大不敬當斬吏今行斬之通頓首首盡出血不解上度丞相巳困通使使持節召通而謝丞相此吾弄臣君釋之鄧通旣至爲上泣曰丞相幾殺臣三年春二月上行幸代是􅀊匈奴老上單于死子軍臣單于立四年夏四月丙寅晦日有食之五月赦天下上行幸雍五年春正月上行幸隴西三月行幸雍秋七月行幸代六年冬匈奴三萬􅀐入上郡三萬􅀐入雲中所殺略甚衆烽火通於甘泉長安以中大夫令免爲車􅀐將軍屯飛狐故楚相蘇意爲將軍屯句注將軍張武屯北地河內太守周亞夫爲將軍次細柳宗正劉禮爲將軍次霸上祝兹矦徐厲爲將軍次棘門以僃胡上自勞軍至霸上及棘門軍直馳入將以下􅀐送迎巳而之細柳軍軍士吏被甲銳兵刃彀弓弩持滿天子先驅至不得入先驅曰天子且至軍門都尉曰將軍令曰軍中聞將軍令不聞天子之詔居無何上至又不得入於是上乃使使持節詔將軍吾欲入營勞軍亞夫乃傳言開壁門壁門士請車􅀐曰將軍約軍中不得驅馳於是天子乃按轡徐行至營將軍亞夫持兵揖曰介胄之士不拜請以軍禮見天子爲動改容式車使人稱謝皇帝敬勞將軍成禮而去旣出軍門羣臣皆驚上曰嗟乎此眞將軍矣曩者霸上棘門軍若兒戲耳其將固可襲而虜也至於亞夫可得而犯邪稱善者乆之月餘漢兵至邊匈奴亦逺塞漢兵亦罷乃拜周亞夫爲中尉夏四月大旱蝗令諸矦無入貢弛山澤減諸服御損郎吏貟發倉􅁃以振民民得賣爵七年夏六月已亥帝崩于未央宫遺詔曰朕聞之盖天下萬物之萌生靡不有死死者天地之理萬物之自然奚可甚哀當今之丗咸嘉生而惡死厚葬以破業重服以傷生吾甚不取且朕旣不德無以佐百姓今崩又使重服乆臨以罹寒暑之數哀人父子傷長老之志損其飲食絶􅀑神之祭祀以重吾不德謂天下何朕獲保宗廟以眇眇之身託于天下君王之上二十有餘年矣頼天之靈社稷之福方內安寜靡有兵革朕旣不敏常畏過行以羞先帝之遺德惟年之乆長懼于不終今乃幸以天年得復供養于髙廟其奚哀念之有其令天下吏民令到出臨三日皆釋服毋禁取婦嫁女祠祀飲酒食肉自當給喪事服臨者皆無跣絰帶無過三寸毋布車及兵器毋發民哭臨宫殿中殿中當臨者皆以旦夕各十五舉音禮畢罷非旦夕臨時禁毋得擅哭臨巳下棺服大功十五日小功十四日纎七日釋服它不在令中者皆以此令比類從事布告天下使明知朕意霸陵山川因其故毋有所改歸夫人以下至少使乙巳葬霸陵帝即位二十三年宫室􅁐囿車􅀐服御無所增益有不便輒弛以利民嘗欲作露臺召匠計之直百金上曰百金中人十家之産也吾奉先帝宫室常恐羞之何以臺爲身衣弋綈所幸慎夫人衣不曵地帷帳無文繡以示敦朴爲天下先治霸陵皆瓦器不得以金銀銅錫爲飾因其山不起墳吳王詐病不朝賜以几杖羣臣􅀽盎等諫􅀃雖切常假借納用焉張武等受賂金錢覺更加賞賜以媿其心專務以德化民是以海內安寜家給人足後丗鮮能及之丁未太子即皇帝位尊皇太后薄氏曰太皇太后皇后曰皇太后九月有星孛于西方是􅀊長沙王吳著薨無子國除初髙祖賢文王芮制誥御史長沙王忠其令著令至孝惠髙后時封芮庶子二人爲列矦傳國數丗絶孝景皇帝上元年冬十月丞相嘉等奏功莫大於髙皇帝德莫盛於孝文皇帝髙皇帝廟宜爲帝者太祖之廟孝文皇帝廟宜爲帝者太宗之廟天子宜丗丗獻祖宗之廟郡國諸矦宜各爲孝文皇帝立太宗之廟制曰可夏四月乙卯赦天下遣御史大夫靑至代下與匈奴和親五月復收民田半租三十而稅一初文帝除肉刑外有輕刑之名內實殺人斬右止者又當死斬左止者笞五百當劓者答三百率多死是􅀊下詔曰加笞重罪無異幸而不死不可爲人其定律笞五百曰三百笞三百曰二百以太中大夫周仁爲郎中令張歐爲廷尉楚元王子平陸矦禮爲宗正中大夫鼂錯爲左內史仁始爲大子舎人以廉謹得幸張歐亦事帝於太子宫雖治刑名家爲人長者帝由是重之用爲九卿歐爲吏未嘗言按人專以誠長者處官官屬以爲長者亦不敢大欺二年冬十二月有星孛于西南令天下男子年二十始傅春三月甲寅立皇子德爲河閒王閼爲臨江王餘爲淮陽王非爲汝南王彭祖爲廣川王發爲長沙王夏四月壬午太皇太后薄氏崩六月丞相申屠嘉薨時內史鼂錯數請閒言事輒聽寵幸傾九卿灋令多所更定丞相嘉自絀所言不用疾錯錯爲內史東出不便更穿一門南出南出者太上皇廟堧垣也嘉聞錯穿宗廟垣爲奏請誅錯客有語錯錯恐夜入宫上謁自歸上至朝嘉請誅內史錯上曰錯所穿非眞廟垣乃外堧垣故冗官居其中且又我使爲之錯無罪丞相嘉謝罷朝嘉謂長史曰吾悔不先斬錯乃請之爲錯所賣至舍因歐血而死錯以此愈貴秋與匈奴和親八月丁未以御史大夫開封矦陶靑爲丞相丁巳以內史鼂錯爲御史大夫彗星出東北秋衡山雨雹大者五寸深者二尺滎惑逆行守北辰月出北辰閒􅀊星逆行天廷中梁孝王以竇太后少子故有寵王四十餘城居天下膏􅃾地賞賜不可勝道府庫金錢且百巨萬珠玊寶器多於京師築東􅁐方三百餘里廣睢陽城七十里大治宫室爲􅃨道自宫連屬於平臺三十餘里招延四方豪俊之士如吳人枚乗嚴忌齊人羊勝公孫詭鄒陽蜀人司馬相如之屬皆從之遊每入朝上使使持節以乗輿駟馬迎梁王於􅀜下旣至寵幸無比入則侍上同輦出則同車射獵上林中因上䟽請留且半􅀊梁侍中郎謁者著籍引出入天子殿門與漢宦官無異資治通鑑卷第十五
