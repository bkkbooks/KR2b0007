body:
  text: 臣司馬光奉勑編集宋紀十雍閹茂凡五年起閼逢敦牂盡著丗祖孝武皇帝上孝建元年春正月己亥朔上祀南郊改元大赦甲辰以尚書令何尚之爲左光禄大夫護軍將軍以左衞將軍顔竣爲吏部尚書領驍􅀐將軍壬戌更鑄孝建四銖錢乙丑魏以侍中伊馛爲司空丙子立皇子子業爲太子初江州刺史臧質自謂人才足爲一丗英雄太子劭之亂質潛有異圖以荆州刺史南郡王義宣庸闇易制欲外相推奉因而覆之質於義宣爲内兄既至江陵即稱名拜義宣義宣驚愕問故質曰事中宜然時義宣已奉帝爲主故其計不行及至新亭又拜江夏王義恭曰天下屯危禮異常日劭既誅義宣與質功皆第一由是驕恣事多專行凡所求欲無不必從義宣在荆州十年財富兵彊朝廷所下制度意有不同一不遵承質自建康之江州舫千餘乗部伍前後百餘里帝方自攬威權而質以少主遇之政刑慶賞一不咨禀擅用湓口鉤圻米臺符屢加檢詰漸致猜懼帝􅁋義宣諸女義宣由是恨怒質乃遣密信說義宣以爲負不賞之功挾震主之威自古能全者有幾今萬物係心於公聲迹已著見幾不作將爲它人所先若命徐遺寳魯爽驅西北精兵來屯江上質帥九江樓船爲公前驅已爲得天下之半公以八州之衆徐進而臨之雖韓白更生不能爲建康計矣且少主失德聞於道路沈栁諸將亦我之故人誰肯爲少主盡力者夫不可留者年也不可失者時也質常恐溘先朝露不得展其旅力爲公掃除於時悔之何及義宣腹心將佐諮議參軍蔡超司馬笁超民等咸有富貴之望欲􅀝質威名以成其業共勸義宣從其計質女爲義宣子採之婦義宣謂質無復異同遂許之超民䕫之子也臧敦時爲黃門侍郎帝使敦至義宣所道經尋陽質更令敦說誘義宣義宣意遂定豫州刺史魯爽有勇力義宣質素與之相結義宣密使人報爽及兖州刺史徐遺寶期以今秋同舉兵使者至壽陽爽方飲醉失義宣指即日舉兵爽弟瑜在建康聞之逃叛爽使其衆戴黄標竊造灋服登壇自號建平元年疑長史韋處穆中兵參軍楊元駒治中庾騰之不與已同皆殺之遺寶亦勒兵向彭城二月義宣聞爽已反狼狽舉兵魯瑜弟弘爲質府佐帝敕質收之質即執臺使舉兵義宣與質皆上表言爲左右所讒疾欲誅君側之惡義宣進爽號征北將軍爽於是送所造輿服詣江陵使征北府户曹板義宣等文曰丞相劉今􅀘天子名義宣車􅀐臧今􅀘丞相名質西平朱今補車􅀐名脩之皆板到奉行義宣駭愕爽所送灋物並留竟陵不聽進質加魯弘輔國將軍下戍大雷義宣遣諮議參軍劉諶之將萬人就弘召司州刺史魯秀欲使爲諶之後繼秀至江陵見義宣出拊膺曰吾兄誤我乃與癡人作賊今年敗矣義宣兼荆江兖豫四州之力威震逺近帝欲奉乗輿灋物迎之竟陵王誕固執不可曰奈何持此座與人乃止己卯以領軍將軍栁元景爲撫軍將軍辛卯以左衞將軍王玄謨爲豫州刺史命元景統玄謨等諸將以討義宣癸巳進據梁山洲於兩岸築偃月壘水陸待之義宣自􅁛都督中外諸軍事命僚佐悉􅁛名甲午魏主詣道壇受圖籙丙申以安北司馬夏矦祖歡爲兖州刺史三月己亥内外戒嚴辛丑以徐州刺史蕭思話爲江州刺史栁元景爲雍州刺史癸卯以太子左衞率龐秀之爲徐州刺史義宣移檄州郡加進位號使同發兵雍州刺史朱脩之僞許之而遣使陳誠於帝益州刺史劉秀之斬義宣使者遣中兵參軍韋崧將萬人襲江陵戊申義宣帥衆十萬􅀤江津舳艫數百里以子慆爲輔國將軍與左司馬笁超民留鎮江陵檄朱脩之使發兵萬人繼進脩之不從義宣知脩之貳於己乃以魯秀爲雍州刺史使將萬餘人擊之王玄謨聞秀不來喜曰臧質易與耳冀州刺史垣䕶之妻徐遺寳之姉也遺寶邀護之同反護之不從發兵擊之遺寳遣兵襲徐州長史明胤於彭城不克胤與夏侯祖歡垣護之共擊遺寳於湖陸遺寳棄衆焚城奔魯爽義宣至尋陽以質爲前鋒而進爽亦引兵直趣歴陽與質水陸俱下殿中將軍沈靈賜將百舸破質前軍於南陵擒軍主徐慶安等質至梁山夾陳兩岸與官軍相拒夏四月戊辰以後將軍劉義綦爲湘州刺史甲申以朱脩之爲荆州刺史上遣左軍將軍薛安都龍驤將軍南陽宗越等戍歴陽與魯爽前鋒楊胡興等戰斬之爽不能進留軍大峴使魯瑜屯小峴上復遣鎮軍將軍沈慶之濟江督諸將討爽爽食少引兵稍退自留斷後慶之使薛安都帥輕􅀐追之丙戌及爽於小峴爽將戰飲酒過醉安都望見爽即躍馬大呼直往刺之應手而倒左右范雙斬其首爽衆奔散瑜亦爲部下所殺遂進攻壽陽克之徐遺寳奔東海東海人殺之李延壽論曰凶人之濟其身非丗亂莫由焉魯爽以亂丗之情而行之於平日其取敗也宜哉南郡王義宣至鵲頭慶之送爽首示之并與書曰僕荷任一方而舋生所統近聊帥輕師指往翦撲軍鋒裁及賊爽授首公情契異常或欲相見及其可識指送相呈爽累世將家驍猛善戰號萬人敵義宣與質聞其死皆駭懼栁元景軍于採石王玄謨以臧質衆盛遣使來求益兵上使元景進屯姑孰太傅義恭與義宣書曰往時仲堪假兵靈寶尋害其族孝伯推誠牢之旋踵而敗臧質少無美行弟所具悉今藉西楚之彊力圖濟其私凶謀􅀂果恐非復池中物也義宣由此疑之五月甲辰義宣至蕪湖質進計曰今以萬人取􅀯州則梁山中絶萬人綴梁山則玄謨必不敢動下官中流鼔棹直趣石頭此上䇿也義宣將從之劉諶之密言於義宣曰質求前驅此志難測不如盡銳攻梁山事克然後長驅此萬安之計也義宣乃止宂從僕射胡子反等守梁山西壘㑹西南風急質遣其將尹周之攻西壘子反方度東岸就玄謨計事聞之馳歸周之攻壘甚急偏將劉季之帥水軍殊死戰求救於玄謨玄謨不遣大司馬參軍崔勲之固爭乃遣勲之與積弩將軍垣詢之救之比至城巳陷勲之詢之皆戰死詢之䕶之之弟也子反等奔還東岸質又遣其將龐法起將數千兵趨南浦欲自後掩玄謨游擊將軍垣護之引水軍與戰破之朱脩之斷馬鞍山道據險自守魯秀攻之不克屢爲脩之所敗乃還江陵脩之引兵躡之或勸脩之急追脩之曰魯秀驍將也獸窮則攫不可迫也王玄謨使垣護之告急於栁元景曰西城不守唯餘東城萬人賊軍數倍彊弱不敵欲退還姑孰就節下協力當之更議進取元景不許曰賊勢方盛不可先退吾當卷甲赴之護之曰賊謂南州有三萬人而將軍麾下裁十分之一􅀂往造賊壘則虚實露矣王豫州必不可來不如分兵援之元景曰善乃留羸弱自守悉遣精兵助玄謨多張旗幟梁山望之如數萬人皆以爲建康兵悉至衆心乃安質請自攻東城諮議參軍顔樂之說義宣曰質􅀂復克東城則大功盡歸之矣宜遣麾下自行義宣乃遣劉諶之與質俱進甲寅義宣至梁山頓兵西岸質與劉諶之進攻東城玄謨督諸軍大戰薛安都帥突􅀐先衝其陳之東南䧟之斬諶之首劉季之宗越又䧟其西北質等兵大敗垣護之燒江中舟艦煙熖覆水延及西岸營壘殆盡諸軍乗勢攻之義宣兵亦潰義宣單舸迸走閉户而泣荆州人隨之者猶百餘舸質欲見義宣計事而義宣已去質不知所爲亦走其衆皆降散己未解嚴癸亥以吳興太守劉延孫爲尚書右僕射六月丙寅魏主如隂山臧質至咸陽焚燒府舍載妓妾西走使嬖人何文敬領餘兵居前至西陽西陽太守魯方平紿文敬曰詔書唯捕元惡餘無所問不如逃之文敬棄衆亡去質先以妹夫羊沖爲武昌郡質往投之沖已爲郡丞胡庇之所殺質無所歸乃逃于南湖掇蓮實噉之追兵至以荷覆頭自沈於水出其鼻戊辰軍主鄭俱兒望見射之中心兵刃亂至腸胃縈水草斬首送建康子孫皆棄市并誅其黨䂊章太守樂安任薈之臨川内史劉懐之鄱陽太守杜仲儒仲儒驥之兄子也功臣柳元景等封賞各有差丞相義宣走至江夏聞巴陵有軍回向江陵衆散且盡與左右十許人徒歩脚痛不能前僦民露車自載縁道求食至江陵郭外遣人報竺超民超民具羽儀兵衆迎之時荆州帶甲尚萬餘人左右翟靈寳誡義宣使撫慰將佐以臧質違指授之宜用致失利今治兵繕甲更爲後圖昔漢髙百敗終成大業而義宣忘靈寳之言誤云項羽千敗衆咸掩口魯秀笁超民等猶欲收餘兵更圖一決而義宣惽沮無復神守入内不復出左右腹心稍稍離叛魯秀北走義宣不能自立欲隨秀去乃􅂝息慆及所愛妾五人著男子服相隨城内擾亂白刃交横義宣懼墜馬遂歩進笁超民送至城外更以馬與之歸而城守義宣求秀不得左右盡棄之夜復還南郡空廨旦日超民收送刺姦義宣止獄戸坐地歎曰臧質老奴誤我五妾尋􅀍遣出義宣號泣語獄吏曰常日非苦今日分别始是苦魯秀衆散不能去還向江陵城上人射之秀赴水死就取其首詔右僕射劉延孫使荆江二州旌别枉直就行誅賞且分割二州之地議更置新州初晉氏南遷以揚州爲京畿榖帛所資皆出焉以荆江爲重鎮甲兵所聚盡在焉常使大將居之三州戸口居江南之半上惡其彊大故欲分之癸未分楊州浙東五郡置東楊州治㑹稽分荆湘江豫州之八郡置郢州治江夏罷南蠻校尉遷其營於建康大傅義恭議使郢州治巴陵尚書令何尚之曰夏口在荆江之中正對沔口通接雍梁寔爲津要由來舊鎮根基不易既有見城浦大容舫於事爲便上從之既而荆楊因此虚耗尚之請復合二州上不許戊子省録尚書事上惡宗室彊盛不欲權在臣下太傅義恭知其指故請省之上使王公八座與荆州刺史朱脩之書令丞相義宣自爲計書未逹庚寅脩之入江陵殺義宣并誅其子十六人及同黨笁超民從事中郎蔡超諮議參軍顔樂之等超民兄弟應從誅何尚之上言賊既遁走一夫可擒􅀂超民反覆昧利即當取之非唯免愆亦可要不義之賞而超民曽無此意微足觀過知仁且爲官保全城府謹守庫藏端坐待縛今戮及兄弟則與其餘逆黨無異於事爲重上乃原之秋七月丙申朔日有食之庚子魏皇子弘生辛丑大赦改元興光丙辰大赦八月甲戌魏趙王􅀷卒乙亥魏主還平城冬十一月戊戌魏主如中山遂如信都十二月丙子還幸靈丘至温泉宫庚辰還平城二年春正月魏車􅀐大將軍樂平王拔有罪賜死鎮北大將軍南兖州刺史沈慶之請老二月丙寅以爲左光禄大夫開府儀同三司慶之固讓表䟽數十上又面自陳乃至稽顙泣涕上不能奪聽以始興公就第厚加給奉頃之上復欲用慶之使何尚之往起之尚之累陳上意慶之笑曰沈公不效何公往而復返尚之慙而止辛巳以尚書右僕射劉延孫爲南兖州刺史夏五月戊戌以湘州刺史劉遵考爲尚書右僕射六月壬戌魏改元太安甲子大赦甲申魏主還平城秋七月癸巳立皇弟休祐爲山陽王休茂爲海陵王休業爲鄱陽王丙辰魏主如河西雍州刺史武昌王渾與左右作檄文自號楚王改元永光僃置百官以爲戲笑長史王翼之封呈其手迹八月庚申廢渾爲庶人徙始安郡上遣貟外散􅀐侍郎東海戴明寶詰責渾因逼令自殺時年十七丁亥魏主還平城詔祀郊廟初設備樂從前殿中曹郎荀萬秋之議也上欲削弱王侯冬十月己未江夏王義恭竟陵王誕奏裁損王侯車服器用樂舞制度凡九事上因諷有司奏増廣爲二十四條聽事不得南向坐施帳劔不得爲鹿盧形内史相及封内官長止稱下官不得稱臣罷官則不復追敬詔可庚午魏以遼西王常英爲太宰壬午以太傅義恭領楊州剌史竟陵王誕爲司空領南徐州刺史建平王宏爲尚書令是嵗以故氐王楊保宗子元和爲征虜將軍楊頭爲輔國將軍頭文德之從祖兄也元和雖楊氏正統朝廷以其年幼才弱未正位號部落無定主頭先戍葭蘆母妻子弟並爲魏所執而頭爲宋堅守無貳心雍州刺史王玄謨上言請以頭爲假節西秦州刺史用安輯其衆俟數年之後元和稍長使嗣故業􅀂元和才用不稱便應歸頭頭能藩扞漢川使無虜患彼四千戶荒州殆不足惜􅀂葭蘆不守漢川亦無立理上不從三年春正月庚寅立皇弟休範爲順陽王休􅀂爲巴陵王戊戌立皇子子尚爲西陽王壬子納右衞將軍何瑀女爲太子妃瑀澄之曽孫也甲寅大赦乙卯魏立貴人馬氏爲皇后后遼西郡公朗之女也朗爲秦雍二州刺史坐事誅后由是没入宫二月丁巳魏主立子弘爲皇太子先使其母李貴人條記所付託兄弟然後依故事賜死甲子以廣州刺史宗慤爲豫州刺史故事府州部内論事皆籖前直叙所論之事置典籖以主之宋丗諸皇子爲方鎮者多幼時主皆以親近左右領典籖典籖之權稍重至是雖長王臨藩素族出鎮典籖皆出納教命執其樞要刺史不得專其職任及慤爲豫州臨安吳喜爲典籖慤刑政所施喜毎多違執慤大怒曰宗慤年將六十爲國竭命正得一州如斗大不能復與典籖共臨之喜稽顙流血乃止丁零數千家匿井陘山中爲盜魏選部尚書陸真與州郡合兵討滅之閏月戊午以尚書左僕射劉遵考爲丹陽尹癸酉鄱陽哀王休業卒太傅義恭以南兖州刺史西陽王子尚有寵將避之乃辭揚州秋七月解義恭楊州丙子以子尚爲楊州刺史時熒惑守南斗上廢西州舊館使子尚移治東城以厭之揚州别駕從事沈懐文曰天道示變宜應之以德今雖空西州恐無益也不從懐文懐逺之兄也八月魏平西將軍漁陽公尉眷擊伊吾克其城大獲而還九月壬戌以丹陽尹劉遵考爲尚書右僕射冬十月甲申魏主還平城丙午太傅義恭進位太宰領司徒十一月魏以尚書西平王源賀爲冀州刺史更賜爵隴西王賀上言今北虜遊魂南冦負險疆埸之間猶須防戍臣愚以爲自非大逆赤手殺人其坐􅂍盜及過誤應入死者皆可原宥讁使守邉則是已斷之體受更生之恩徭役之家蒙休息之恵魏髙宗從之久之謂羣臣曰吾用賀言一歳所活不少増戍兵亦多卿等人人如賀朕何憂哉㑹武邑人石華告賀謀反有司以聞帝曰賀竭誠事國朕爲卿等保之無此明矣命精加訊驗華果引誣帝誅之因謂左右曰以賀忠誠猶不免誣謗不及賀者可無慎哉十二月濮陽太守姜龍駒新平太守楊自倫帥吏民棄郡奔魏上欲移青冀二州并鎮歴城議者多不同青冀二州刺史垣護之曰青州北有河濟又多陂澤非虜所向毎來宼掠必由歴城二州并鎮此經逺之略也北又近河歸順者易近息民患逺申王威安邉之上計也由是遂定元嘉中官鑄四銖錢輪郭形制與五銖同用費無利故民不盗鑄及上即位又鑄孝建四銖形式薄小輪郭不成於是盗鑄者衆雜以鉛錫翦鑿古錢錢轉薄小守宰不能禁坐死免者相繼盗鑄益甚物價踊貴朝廷患之去歳春詔錢薄小無輪郭者悉不得行民閒喧擾是嵗始興郡公沈慶之建議以爲宜聽民鑄錢郡縣置錢署樂鑄之家皆居署内平其凖式去其雜僞去春所禁新品一時施用今鑄悉依此格萬稅三千嚴檢盜鑄丹楊尹顔竣駮之以爲五銖輕重定於漢丗魏晉以降莫之能改誠以物貨既均改之僞生故也今云去春所禁一時施用􅀂巨細揔行而不從公鑄利已既深情僞無極私鑄翦鑿盡不可禁財貨未贍大錢已竭數歳之間悉爲塵土矣今新禁􅀄行品式未一須㬰自止不足以垂聖慮唯府藏空匱實爲重憂今縱行細錢官無益賦之理百姓雖贍無解官乏唯簡費去華專在節儉求贍之道莫此爲貴耳議者又以銅轉難得欲鑄二銖錢竣曰議者以爲官藏空虛宜更改鑄天下銅少宜減錢式以救交弊賑國舒民愚以爲不然今鑄二銖恣行新細於官無解於乏而民間姦巧大興天下之貨將糜碎至盡空嚴立禁而利深難絶不一二年其弊不可復救民懲大錢之改兼畏近日新禁市井之閒必生紛擾逺利未聞切患猥及富商得志貧民困窘此皆甚不可者也乃止魏定州刺史髙陽許宗之求取不節深澤民馬超謗毁宗之宗之敺殺超恐其家人告狀上超詆訕朝政魏髙宗曰此必妄也朕爲天下主何惡於超而有此言必宗之懼罪誣超案驗果然斬宗之於都南金紫光禄大夫顔延之卒延之子竣貴重凡所資供延之一無所受布衣茅屋蕭然如故常乗羸牛笨車逢竣鹵簿即屏住道側常語竣曰吾平生不憙見要人今不幸見汝竣起宅延之謂曰善爲之無令後人笑汝拙也延之甞早詣竣見賓客盈門竣尚未起延之怒曰汝出糞土之中升雲霞之上遽驕傲如此其能久乎竣丁父憂裁踰月起爲右將軍丹楊尹如故竣固辭表十上不許遣中書舍人戴明寶抱竣登車載之郡舍賜以布衣一襲絮以綵綸遣主衣就衣諸體大明元年春正月辛亥朔改元大赦壬戌魏主畋於崞山戊辰還平城魏以漁陽王尉眷爲太尉録尚書事二月魏人寇兖州向無鹽敗東平太守南陽劉胡詔遣太子左衞率薛安都將􅀐兵東陽太守沈灋系將水軍向彭城以禦之並受徐州刺史申坦節度比至魏兵已去先是群盗聚任城荆榛中累丗爲患謂之任榛申坦請回軍討之上許之任榛聞之皆逃散時天旱人馬渴乏無功而還安都灋系坐白衣領職坦當誅羣臣爲請莫能得沈慶之抱坦哭於市曰汝無罪而死我哭汝於市行當就汝矣有司以聞上乃免之三月庚申魏王畋於松山己巳還平城魏主立其弟新成爲陽平王上自即吉之後奢淫自恣多所興造丹楊尹顔竣以蕃朝舊臣數懇切諌爭無所回避上浸不恱竣自謂才足幹時恩舊莫比當居中永執朝政而所陳多不納疑上欲踈之乃求外出以占上意夏六月丁亥詔以竣爲東揚州刺史竣始大懼癸卯魏主如隂山雍州所統多僑郡縣刺史王玄謨上言僑郡縣無有境土新舊錯亂租課不時請皆土斷秋七月辛未詔并雍州三郡十六縣爲一郡郡縣流民不願屬籍訛言玄謨欲反時柳元景宗彊羣從多爲雍部二千石乗聲皆欲討玄謨玄謨令内外晏然以解衆惑馳使啓上具陳本末上知其虚遣主書吳喜撫慰之且報曰七十老公反欲何求君臣之際足以相保聊復爲􅀏伸郷眉頭耳玄謨性嚴未嘗妄笑故上以此戱之八月己亥魏主還平城甲辰徙司空南徐州刺史竟陵王誕爲南兖州刺史以太子詹事劉延孫爲南徐州刺史初髙祖遺詔以京口要地去建康密邇自非宗室近親不得居之延孫之先雖與髙祖同源而髙祖屬彭城延孫屬莒縣從來不序昭穆上既命延孫鎮京口仍詔與延孫合族使諸王皆序長㓜上閨門無禮不擇親踈尊卑流聞民閒無所不至誕寛而有禮又誅太子劭丞相義宣皆有大功人心竊向之誕多聚才力之士蓄精甲利兵上由是畏而忌之不欲誕居中使出鎮京口猶嫌其逼更徙之廣陵以延孫腹心之臣故使鎮京口以防之魏主將東廵冬十月詔太宰常英起行宫於遼西黃山十二月丁亥更以順陽王休範爲桂陽王二年春正月丙午朔魏設酒禁釀酤飲者皆斬之吉凶之㑹聽開禁有程日魏主以士民多因酒致鬪及議國政故禁之増置内外候官伺察諸曹及州鎮或微服雜亂於府寺閒以求百官過失有司窮治訊掠取服百官􅂍滿二丈皆斬又増律七十九章乙卯魏主如廣􅇞温泉宫遂廵平州庚午至黄山宫二月丙子登碣石山觀滄海戊寅南如信都畋於廣川乙酉以金紫光禄大夫禇湛之爲尚書左僕射丙戌建平宣簡王宏以疾解尚書令三月丁未卒丙辰魏髙宗還平城起太華殿是時給事中郭善明性傾巧說帝大起宫室中書侍郎髙允諌曰太祖始建都邑其所營立必因農隙況建國已久永安前殿足以朝㑹西堂温室足以宴息紫樓足以臨望縱有修廣亦宜馴致不可倉猝今計所當役凡二萬人老弱供餉又當倍之期半年可畢一夫不耕或受之飢況四萬人之勞費可勝道乎此陛下所宜留心也帝納之允好切諌朝廷事有不便允輙求見帝常屏左右以待之或自朝至暮或連日不出群臣莫知其所言語或痛切帝所不忍聞命左右扶出然終善遇之時有上事爲激訐者帝省之謂羣臣曰君父一也父有過子何不作書於衆中諌之而於私室屏處諌者豈非不欲其父之惡彰於外邪至於事君何獨不然君有得失不能面陳而上表顯諌欲以彰君之短明己之直此豈忠臣所爲乎如髙允者乃真忠臣也朕有過未嘗不面言至有朕所不堪聞者允皆無所避朕聞其過而天下不知可不謂忠乎允所與同徴者游雅等皆至大官封侯部下吏至刺史二千石者亦數十百人而允爲郎二十七年不徙官帝謂羣臣曰汝等雖執弓刀在朕左右徒立耳未嘗有一言規正唯伺朕喜恱之際祈官乞爵今皆無功而至王公允執筆佐我國家數十年爲益不小不過爲郎汝等不自愧乎乃拜允中書令時魏百官無禄允常使諸子樵採以自給司徒陸麗言於帝曰髙允雖蒙寵待而家貧妻子不立帝曰公何不先言今見朕用之乃言其貧乎即日至允第惟草屋數間布􅀍緼􅂁厨中鹽菜而巳帝歎息賜帛五百匹粟千斛拜長子恱爲長樂太守允固辭不許帝重允常呼爲令公而不名游雅常曰前史稱卓子康劉文饒之爲人􅄶心者或不之信余與髙子遊處四十年未嘗見其喜愠之色乃知古人爲不誣耳髙子内文明而外柔順其言呐呐不能出口昔崔司徒嘗謂余云髙生豐才愽學一代佳士所乏者矯矯風節耳余亦以爲然及司徒得罪起於纎微詔指臨責司徒聲嘶股栗殆不能言宗欽巳下伏地流汗皆無人色髙子獨敷陳事理申釋是非辭義清辯音韻髙亮人主爲之動容聽者無不神聳此非所謂矯矯者乎宗愛方用事威振四海嘗召百官於都坐王公已下皆趍庭望拜髙子獨升階長揖由此觀之汲長孺可以卧見衞青何抗禮之有此非所謂風節者乎夫人固未易知吾既失之於心崔又漏之於外此乃管仲所以致慟於鮑叔也乙丑魏東平成王陸俟卒夏四月甲申立皇子子綏爲安陸王帝不欲權在臣下六月戊寅分吏部尚書置二人以都官尚書謝莊度支尚書吳郡顧覬之爲之又省五兵尚書􅀄晉丗散􅀐常侍選望甚重與侍中不異其後職任閑散用人漸輕上欲重其選乃用當時名士臨海太守孔覬司徒長史王彧爲之侍中蔡興宗謂人曰選曹要重常侍閑淡改之以名而不以實雖主意欲爲輕重人心豈可變邪既而常侍之選復卑選部之貴不異覬琳之之孫彧謐之兄孫興宗廓之子也裴子野論曰官人之難先王言之尚矣周禮始於學校論之州里告諸六事而後貢于王庭其在漢家州郡積其功能五府舉爲椽屬三公參其得失尚書奏之天子一人之身所閲者衆故能官得其才鮮有敗事魏晉易是所失弘多夫厚皃􅀷衷險如谿壑擇言觀行猶懼弗周況今萬品千羣俄折乎一面庶僚百位專斷於一司於是囂風遂行不可抑止干進務得兼加諂黷無復㢘恥之風謹厚之操官邪國敗不可紀綱假使龍作納言舜居南面而治致平章不可必也況後之官人者哉孝武雖分曹爲兩不能反之於周漢朝三暮四其庸愈乎丙申魏主畋於松山秋七月庚午如河西南彭城民髙闍沙門曇標以妖妄相扇與殿中將軍苗允等謀作亂立闍爲帝事覺甲辰皆伏誅死者數十人於是下詔沙汰諸沙門設諸條禁嚴其誅坐自非戒行精苦並使還俗而諸尼多出入宫掖此制竟不能行中書令王僧逹幼聦警能文而跌蕩不拘帝􅀄踐阼擢為僕射居顔劉之右自負才地謂當時莫及一二年間即望宰相既而遷護軍怏怏不得志累啓求出上不悦由是稍稍下遷五嵗七徙再􅀍彈削僧逹既恥且怨所上表奏辭㫖抑揚又好非議朝政上已積憤怒路太后兄子嘗詣僧達趨升其榻僧達令舁棄之太后大怒固邀上令必殺僧逹㑹髙闍反上因誣僧達與闍通謀八月丙戌收付廷尉賜死沈約論曰夫君子小人類物之通稱蹈道則爲君子違之則爲小人是以太公起屠釣爲周師傅說去板築爲殷相明敭幽仄唯才是與逮于二漢兹道未革胡廣累丗農夫致位公相黃憲牛醫之子名重京師非􅀂晩代分爲二途也魏武始立九品蓋以論人才優劣非謂丗族髙卑而都正俗士隨時俯仰慿藉丗資用相陵駕因此相㳂遂爲成法周漢之道以智役愚魏晉以來以貴役賤士庶之科較然有辨矣裴子野論曰古者德義可尊無擇負販茍非其人何取丗族名公子孫還齊布衣之伍士庶雖分本無華素之隔有晉以來其流稍改草澤竒士猶顯清途降及季年專限閥閱自是三公之子傲九棘之家黄散之孫蔑令長之室轉相驕矜互爭銖兩唯論門戸不問賢能以謝靈運王僧逹之才華輕躁使生自寒宗猶將覆折重以怙其庇廕召禍宜哉九月乙巳魏主還平城丙寅魏大赦冬十月甲戌魏主北巡欲伐柔然至隂山㑹雨雪魏主欲還太尉尉眷曰今動大衆以威北敵去都不逺而車駕遽還虜必疑我有內難將士雖寒不可不進魏主從之辛卯軍于車崘山積射將軍殷孝祖築兩城於清水之東魏鎮西將軍封敕文攻之清口戍主振威將軍傅乾愛拒破之孝祖羡之曽孫也上遣虎賁主龐孟蚪將兵救清口青冀二州刺史顔師伯遣中兵參軍茍思逹助之敗魏兵於沙溝師伯竣之族兄也上遣司空參軍卜天生將兵㑹傅乾愛及中兵參軍江方興共擊魏兵屢破之斬魏將窟􅉞公等數人十一月魏征西將軍皮豹子等將三萬􅀐助封敕文寇青州顔師伯禦之輔國參軍焦度刺豹子墜馬獲其鎧矟具裝手殺數十人度本南安氐也魏主自將􅀐十萬車十五萬兩擊柔然度大漠旌旗千里柔然處羅可汗逺遁其别部烏朱駕頹等帥數千落降于魏魏主刻石紀功而還初上在江州山隂戴灋興戴明寶蔡閑爲典籖及即位皆以爲南臺侍御史兼中書通事舍人是嵗三典籖並以初舉兵預密謀賜爵縣男閑已卒追賜之時上親覽朝政不任大臣而腹心耳目不得無所委􅀉灋興頗知古今素見親待魯郡巢尚之人士之末渉獵文史爲上所知亦以爲中書通事舍人凡選授遷徙誅賞大處分上皆與灋興尚之參懐內外雜事多委明寶三人權重當時而灋興明寶大納貨賄凡所薦逹言無不行天下輻湊門外成市家産並累千金吏部尚書顧覬之獨不降意於灋興等蔡興宗與覬之善嫌其風節太峻覬之曰辛毗有言孫劉不過使吾不爲三公耳覬之常以爲人稟命有定分非智力所移唯應恭已守道而闍者不逹妄意僥倖徒虧雅道無闗得喪乃以其意命弟子原著定命論以釋之資治通鑑卷第一百二十八
