front:
  text: 僻逺徙居徒河之青山
  hash: sha256:20e0b8c92a5b1233e1933a48dca61ed5dac7f52c6270b2d94ced6aae94aa9ffb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0007_SBCK_082-1a}
body:
  text: 冬十月復明堂及南郊五帝位十一月丙辰尚書令濟北成矦荀朂卒勗有才思善伺人主意以是能固其寵久在中書專管機事及遷尚書甚罔悵人有賀之者勗曰奪我鳳皇池諸君何賀邪帝極意聲色遂至成疾楊駿忌汝南王亮排出之甲申以亮爲侍中大司馬假黄􅃏大都督督豫州諸軍事鎮許昌徙南陽王柬爲秦王都督闗中諸軍事始平王瑋爲楚王都督荆州諸軍事濮陽王允爲淮南王都督揚江二州諸軍事並假節之國立皇子乂爲長沙王頴爲成都王晏爲呉王熾爲豫章王演爲代王皇孫遹爲廣陵王又封淮南王子迪爲漢王楚王子儀爲毗陵王徙扶風王暢爲順陽王暢弟歆爲新野公暢駿之子也琅邪王覲弟澹爲東武公繇爲東安公覲伷之子也初帝以才人謝玖賜太子生皇孫遹宫中嘗夜失火帝登樓望之遹年五嵗牽帝裾入闇中曰暮夜倉猝宜僃非常不可令照見人主帝由是奇之甞對羣臣稱遹似宣帝故天下咸歸仰之帝知太子不才然恃遹明慧故無廢立之心復用王佑之謀以太子母弟柬瑋允分鎭要害又恐楊氏之偪復以佑爲北軍中􅇋典禁兵帝爲皇孫遹高選僚佐以散騎常侍劉寔志行清素命爲廣陵王傅寔以時俗喜進趣少亷譲甞著崇讓論欲令􅀄除官通謝章者必推賢讓能乃得通之一官缺則擇爲人所讓最多者用之以爲人情爭則欲毁已所不如譲則競推於勝已故世爭則優劣難分時讓則賢智顯出當此時也能退身脩已則譲之者多矣雖欲守貧賤不可得也馳騖進趨而欲人見譲猶却行而求前也淮南相劉頌上疏曰陛下以灋禁寛縱積之有素未可一旦直繩御下此誠時宜也然至於矯世救弊自宜漸就清肅譬猶行舟雖不横截迅流然當漸靡而往稍向所趨然後得濟也自泰始以來將三十年凡諸事業不茂既徃以陛下明聖猶未反叔世之敝以成始初之􅂭傳之後世不無慮乎使夫異時大業或有不安其憂責猶在陛下也臣聞爲社稷計莫若封建親賢然宜審量事勢使諸矦率義而動者其力足以維帶京邑若包藏禍心者其埶不足獨以有爲其齊此甚難陛下宜與達古今之士深共籌之周之諸矦有罪誅放其身而國祚不泯漢之諸矦有罪或無子者國隨以亡今宜反漢之敝循周之舊則下固而上安矣天下至大萬事至衆人君至少同於天日是以聖王之化執要於已委務於下非憚勞而好逸誠以政體宜然也夫居事始以别能否甚難察也因成敗以分功罪甚易識也今陛下每精於造始而略於考終此政功所以未善也人主誠能居易執要考功罪於成敗之後則羣下無所逃其誅賞矣古者六卿分職冡宰爲師秦漢已來九列執事丞相都緫今尚書制斷諸卿奉成於古制爲太重可出衆事付外寺使得專之尚書統領大綱若丞相之爲嵗終課功校簿賞罰而已斯亦可矣今動皆受成於上上之所失不得復以罪下歳終事功不建不知所責也夫細過謬妄人情之所必有而悉糾以灋則朝野無立人矣近世以來爲監司者類大綱不振而微過必舉蓋由畏避豪彊而又懼職事之曠則謹宻網以羅微罪使奏劾相接狀似盡公而橈灋在其中矣是以聖王不善碎密之案必責凶猾之奏則害政之姦自然禽矣夫創業之勲在於立教定制使遺風繫人心餘烈匡幼弱後世慿之雖昬猶明雖愚若智乃足尚也至夫脩飾官署凡諸作役恒傷泰過不患不舉此將來所不須於陛下而自能者也今勤所不須以傷所慿竊以爲過矣帝皆不能用詔以劉淵爲匈奴北部都尉淵輕財好施傾心接物五部豪傑幽冀名儒多往歸之奚軻男女十萬口來降孝惠皇帝上之上永熈元年春正月辛酉朔改元太熈己巳以王渾爲司徒司空侍中尚書令衛瓘子宣尚繁昌公主宣嗜酒多過失楊駿惡瓘欲逐之乃與黄門謀共毁宣勸武帝奪公主瓘慙懼告老遜位詔進瓘位太保以公就第劇陽康子魏舒薨三月甲子以右光禄大夫石鑒爲司空帝疾篤未有顧命勲舊之臣多已物故侍中車騎將軍楊駿獨侍疾禁中大臣皆不得在左右駿因輒以私意改易要近樹其心腹㑹帝小間見其新所用者正色謂駿曰何得便爾時汝南王亮尚未發乃令中書作詔以亮與駿同輔政又欲擇朝士有聞望者數人佐之駿從中書借詔觀之得便藏去中書監華廙恐懼自往索之終不與㑹帝復迷亂皇后奏以駿輔政帝頷之夏四月辛丑皇后召華廙及中書令何劭口宣帝㫖作詔以駿爲太尉太子太傅都督中外諸軍事侍中録尚書事詔成后對廙劭以呈帝帝視而無言廙歆之孫劭曽之子也遂趨汝南王亮赴鎭帝尋小閒問汝南王來未左右言未至帝遂困篤己酉崩于含章殿帝宇量弘厚明逹好謀容納直言未嘗失色於人太子即皇帝位太赦改元尊皇后曰皇太后立妃賈氏爲皇后楊駿入居太極殿梓宫將殯六宫出辭而駿不下殿以虎賁百人自衛詔石鑒與中䕶軍張劭監作山陵汝南王亮畏駿不敢臨䘮哭於大司馬門外出營城外表求過葬而行或告亮欲舉兵討駿者駿大懼白太后令帝爲手詔與石鑒張劭使帥陵兵討亮劭駿甥也即帥所領趨鑒速發鑒以爲不然保持之亮問計於廷尉何朂朂曰今朝野皆歸心於公公不討人而畏人討邪亮不敢發夜馳赴許昌乃得免駿弟濟及甥河南尹李斌皆勸駿留亮駿不從濟謂尚書左丞􅀓咸曰家兄若徴大司馬退身避之門户庶㡬可全咸曰宗室外戚相恃爲安但召大司馬還共崇至公以輔政無爲避也濟又使侍中石崇見駿言之駿不從五月辛未􅁙武帝于峻陽陵楊駿自知素無羙望欲依魏明帝即位故事普進封爵以求媚於衆左軍將軍傅祇與駿書曰未有帝王始崩臣下論功者也駿不從祗嘏之子也丙子詔中外羣臣皆増位一等預䘮事者増二等二千石已上皆封關中矦復租調一年散騎常侍石崇散騎侍郎何攀共上奏以爲帝正位東宫二十餘年今承大業而班賞行爵優於泰始革命之初及諸將平吴之功輕重不稱且大晉卜世無窮今之開制當垂于後若有爵必進則數世之後莫非公矦矣不從詔以太尉駿爲太傅大都督假黄􅃏録朝政百官緫已以聽傅咸謂駿曰諒闇不行久矣今聖上謙冲委政於公而天下不以爲善懼明公未易當也周公大聖猶致流言況聖上春秋非成王之年乎竊謂山陵既畢明公當審思進退之宜茍有以察其忠􅅃言豈在多駿不從咸數諫駿駿漸不平欲出咸爲郡守李斌曰斥逐正人將失人望乃止楊濟遺咸書曰諺云生子癡了官事官事未易了也想慮破頭故具有白咸復書曰衛公有言酒色殺人甚於作直坐酒色死人不爲悔而逆畏以直致禍此由心不能正欲以茍且爲明哲耳自古以直致禍者當由矯枉過正或不忠篤欲以亢厲爲聲故致忿耳安有悾悾忠益而返見怨疾乎楊駿以賈后險悍多權略忌之故以其甥段廣爲散騎常侍管機密張劭爲中䕶軍典禁兵凡有詔命帝省訖入呈太后然後行之駿爲政嚴碎專愎中外多惡之馮翊太守孫楚謂駿曰公以外戚居伊霍之任當以至公誠信謙順處之今宗室彊盛而公不與共參萬機内懷猜忌外樹私昵禍至無日矣駿不從楚資之孫也弘訓少府蒯欽駿之姑子也數以直言犯駿他人皆爲之懼欽曰楊文長雖闇猶知人之無罪不可妄殺不過踈我我得疎乃可以免不然與之俱族矣駿辟匈奴東部人王彰爲司馬彰逃避不受其友新興張宣子怪而問之彰曰自古一姓二后未有不敗況楊太傅昵近小人疎逺君子專權自恣敗無日矣吾踰海出塞以避之猶恐及禍柰何應其辟乎且武帝不惟社稷大計嗣子既不克負荷受遺者復非其人天下之亂可立待也秋八月壬午立廣陵王遹爲皇太子以中書監何劭為太子太師衛尉裴楷爲少師吏部尚書王戎爲太􅀓前太常張華爲少傅衛將軍楊濟爲太保尚書和嶠爲少保拜太子母謝氏爲淑媛賈后常置謝氏於别室不聽與太子相見初和嶠嘗從容言於武帝曰皇太子有淳古之風而末世多僞恐不了陛下家事武帝黙然後與荀朂等同侍武帝武帝曰太子近入朝差長進卿可俱詣之粗及世事既還朂等並稱太子明識雅度誠如明詔嶠曰聖質如初武帝不恱而起及帝即位嶠從太子遹入朝賈后使帝問曰卿昔謂我不了家事今日定如何嶠曰臣昔事先帝曽有斯言言之不效國之福也冬十月辛酉以石鑒爲太尉隴西王泰爲司空以劉淵爲建威將軍匈奴五部大都督元康元年春正月乙酉朔改元永平初賈后之爲太子妃也嘗以妬手殺數人又以㦸擲孕妾子隨刃墯武帝大怒脩金墉城將廢之荀朂馮紞楊珧及充華趙粲共營救之曰賈妃年少妬者婦人常情長自當差楊后曰賈公閭有大勲於社稷妃親其女正復妬忌豈可遽忘其先德邪妃由是得不廢后數誡厲妃妃不知后之助已返以后爲構已於武帝更恨之及帝即位賈后不肯以婦道事太后又欲干預政事而爲太傅駿所抑殿中中郎渤海孟觀李肇皆駿所不禮也隂􅌟駿云將危社稷黄門董猛素給事東宫爲寺人監賈后密使猛與觀肇謀誅駿廢太后又使肇報汝南王亮使舉兵討駿亮不可肇報都督荆州諸軍事楚王瑋瑋欣然許之乃求入朝駿素憚瑋勇鋭欲召之而未敢因其求朝遂聽之二月癸酉瑋及都督楊州諸軍事淮南王允來朝三月辛卯孟觀李肇啟帝夜作詔誣駿謀反中外戒嚴遣使奉詔廢駿以矦就第命東安公繇帥殿中四百人討駿楚王瑋屯司馬門以淮南相劉頌爲三公尚書屯衛殿中段廣跪言於帝曰楊駿孤公無子豈有反理願陛下審之帝不荅時駿居曹爽故府在武庫南聞内有變召衆官議之太傅主簿朱振􅀃駿曰今内有變其趣可知必是閹豎爲賈后設謀不利於公宜燒雲龍門以脅之索造事者首開萬春門引東宫及外營兵擁皇太子入宫取姦人殿内震懼必斬送之不然無以免難駿素怯懦不決乃曰雲龍門魏明帝所造功費甚大柰何燒之侍中􅀓祗白駿請與尚書武茂入宫觀察事埶因謂羣僚曰宫中不宜空遂揖而下階衆皆走茂猶坐祗顧曰君非天子臣邪今内外隔絶不知國家所在何得安坐茂乃驚起駿黨左軍將軍劉豫陳兵在門遇右軍將軍裴頠問太傅所在頠紿之曰向於西掖門遇公乗素車從二人西出矣豫曰吾何之頠曰宜至廷尉豫從頠言遂委而去尋詔頠代豫領左軍將軍屯萬春門頠秀之子也皇太后題帛爲書射之城外曰救太傅者有賞賈后因宣言太后同反尋而殿中兵出燒駿府又令弩士於閣上臨駿府而射之駿兵皆不得出駿逃于馬廄就殺之孟觀等遂收駿弟珧濟張劭李斌段廣劉豫武茂及散騎常侍楊邈中書令蔣俊東夷校尉文鴦皆夷三族死者數千人珧臨刑告東安公繇曰表在石函可問張華衆謂宜依鍾毓例爲之申理繇不聽而賈氏族黨趣使行刑珧號呌不已刑者以刀破其頭繇諸葛誕之外孫也故忌文鴦誣以爲駿黨而誅之是夜誅賞皆自繇出威振内外王戎謂繇曰大事之後宜深逺權埶繇不從壬辰赦天下改元賈后矯詔使後軍將軍荀悝送太后于永寧宫特全太后母高都君龐氏之命聽就太后居尋復諷羣公有司奏曰皇太后隂漸姦謀圖危社稷飛箭繫書要募將士同惡相濟自絶于天魯矦絶文姜春秋所許蓋奉祖宗任至公於天下陛下雖懷無已之情臣下不敢奉詔詔曰此大事更詳之有司又奏宜廢皇太后爲峻陽庶人中書監張華議皇太后非得罪於先帝今黨其所親爲不母於聖丗宜依漢廢趙太后為孝成后故事貶皇太后之號還稱武皇后居異宫以全始終之恩左僕射荀愷與太子少師下邳王晃等議曰皇太后謀危社稷不可復配先帝宜貶尊號廢詣金墉城於是有司奏請從晃等議廢太后爲庶人詔可又奏楊駿造亂家屬應誅詔原其妻龎命以尉太后之心今太后廢爲庶人請以龐付廷尉行刑詔不許有司復固請乃從之龐臨刑太后抱持號呌截髪稽顙上表詣賈后稱妾請全母命不見省董養遊太學升堂歎曰朝廷建斯堂將以何爲乎每覽國家赦書謀反大逆皆赦至於殺祖父母父母不赦者以爲王灋所不容故也柰何公卿處議文飾禮典乃至此乎天人之理既滅大亂將作矣有司收駿官屬欲悉誅之侍中傅祗啟曰昔魯芝爲曹爽司馬斬關赴爽宣帝用爲青州刺史駿之僚佐不可悉加罪詔赦之壬寅徴汝南王亮爲太宰興太保衛瓘皆録尚書事輔政以秦王柬爲大將軍東平王楙爲撫軍大將軍楚王瑋爲衛將軍領北軍中候下邳王晃爲尚書令東安公繇爲尚書左僕射進爵爲王楙望之子也封董猛爲武安矦三兄皆爲亭矦亮欲取悦衆心論誅楊駿之功督將矦者千八十一人御史中丞傅咸遺亮書曰今封賞熏赫震動天地自古以來未之有也無功而獲厚賞則人莫不樂國之有禍是禍原無窮也凡作此者由東安公人謂殿下既至當有以正之正之以道衆亦何怒衆之所怒者在於不平耳而今皆更倍論莫不失望亮頗專權埶咸復諫曰楊駿有震主之威委任親戚此天下所以諠譁今之處重宜反此失靜黙頥神有大得失乃維持之自非大事一皆抑遣比過尊門冠蓋車馬填塞街衢此之翕習既宜弭息又夏矦長容無功而暴擢爲少府論者謂長容公之姻家故至於此流聞四方非所以爲益也亮皆不從賈后族兄車騎司馬模從舅右衛將軍郭彰女弟之子賈謐與楚王瑋東安王繇並預國政賈后暴戾日甚繇宻謀廢后賈氏憚之繇兄東武公澹素惡繇屢譛之於太宰亮曰繇專行誅賞欲擅朝政庚戍詔免繇官又坐有悖言廢徙帶方於是賈謐郭彰權埶愈盛賔客盈門謐雖驕奢而好學喜延士大夫郭彰石崇陸機機弟雲和郁及滎陽潘岳清河崔基勃海歐陽建蘭陵繆徴京兆杜斌摰虞琅邪諸葛詮弘農王粹襄城杜育南陽鄒捷齊國左思沛國劉瓌周恢安平牽秀潁川陳眕高陽許猛彭城劉訥中山劉輿輿弟琨皆附於謐號曰二十四友郁嶠之弟也崇與岳尤謟事謐每􅇋謐及廣城君郭槐出皆降車路左望塵而拜太宰亮太保瓘以楚王瑋剛愎好殺惡之欲奪其兵權以臨海矦裴楷代瑋爲北軍中􅇋瑋怒楷聞之不敢拜亮復與瓘謀遣瑋與諸王之國瑋益忿怨瑋長史公孫宏舎人岐盛皆有寵於瑋勸瑋自昵於賈后后留瑋領太子少傅盛素善於楊駿衛瓘惡其反覆將收之盛乃與宏謀因積弩將軍李肈矯稱瑋命譛亮瓘於賈后云將謀廢立后素怨瓘且患二公執政已不得專恣夏六月后使帝作手詔賜瑋曰太宰太保欲爲伊霍之事王宜宣詔令淮南長沙成都王屯諸宫門免亮及瓘官夜使黄門齎以授瑋瑋欲覆奏黄門曰事恐漏泄非宻詔本意也瑋亦欲因此復私怨遂勒本軍復矯詔召三十六軍告以二公潜圖不軌吾今受詔都督中外諸軍諸在直衛者皆嚴加警僃其在外營便相帥徑詣行府助順討逆又矯詔亮瓘官屬一無所問皆罷遣之若不奉詔便軍灋從事遣公孫宏李肈以兵圍亮府侍中清河王遐收瓘亮帳下督李龍白外有變請拒之亮不聽俄而兵登牆大呼亮驚曰吾無貳心何故至此詔書其可見乎宏等不許趣兵攻之長史劉準謂亮曰觀此必是姦謀府中俊乂如林猶可力戰又不聽遂爲肇所執歎曰我之赤心可破示天下也與世子矩俱死衛瓘左右亦疑遐矯詔請拒之須自表得報就戮未晩瓘不聽初瓘爲司空帳下督榮晦有罪斥遣之至是晦從遐收瓘輒殺瓘及子孫共九人遐不能禁歧盛説瑋宜因兵埶遂誅賈郭以正王室安天下瑋猶豫未決㑹天明太子少􅀓張華使董猛說賈后曰楚王旣誅二公則天下威權盡歸之矣人主何以自安宜以瑋專殺之罪誅之賈后亦欲因此除瑋深然之是時内外擾亂朝廷恟懼不知所出張華白帝遣殿中將軍王宫齎騶虞幡出麾衆曰楚王矯詔勿聽也衆皆釋仗而走瑋左右無復一人窘迫不知所爲遂執之下廷尉乙丑斬之瑋出懷中青紙詔流涕以示監刑尚書劉頌曰幸託體先帝而受枉乃如此乎公孫宏歧盛並夷三族瑋之起兵也隴西王泰嚴兵將助瑋祭酒丁綏諫曰公爲宰相不可輕動且夜中倉猝宜遣人參審定問泰乃止衛瓘女與國臣書曰先公名謚未顯每怪一國蔑然無言春秋之失其咎安在於是太保主簿劉繇等執黄幡撾登聞鼓上言曰􅀄矯詔者至公即奉送章綬單車從命如矯詔之文唯免公官而故給使榮晦輒收公父子及孫一時斬戮乞驗盡情僞加以明刑乃詔族誅榮晦追復亮爵位謚曰文成封瓘蘭陵郡公謚曰成於是賈后專朝委任親黨以賈模爲散騎常侍加侍中賈謐與后謀以張華庶姓無逼上之嫌而儒雅有籌略爲衆望所依欲委以朝政疑未決以問裴頠頠賛成之乃以華爲侍中中書監頠爲侍中又以安南將軍裴楷爲中書令加侍中與右僕射王戎並管機要華盡忠帝室彌縫遺闕賈后雖凶險猶知敬重華賈模與華頠同心輔政故數年之閒雖闇主在上而朝野安靜華等之功也秋七月分荆揚十郡爲江州八月辛未立隴西王泰世子越爲東海王九月甲午秦獻王柬薨辛丑徴征西大將軍梁王肜爲衞將軍録尚書事二年春二月己酉故楊太后卒于金墉城是時太后尚有侍御十餘人賈后悉奪之絶膳八日而卒賈后恐太后有靈或訴􅁈於先帝乃覆而殯之仍施諸厭劾符書藥物等秋八月壬子赦天下三年夏六月􅀪農雨雹深三尺鮮卑宇文莫槐爲其下所殺弟普撥立拓跋綽卒弟子弗立四年春正月丁酉安昌元公石鑒薨夏五月匈奴郝散反攻上黨殺長吏秋八月郝散帥衆降馮翊都尉殺之是嵗大饑司􅀠校尉傅咸卒咸性剛簡風格峻整初爲司􅀠校尉上言貨賂流行所宜深絶時朝政寛弛權豪放恣咸奏免河南尹澹等官京師肅然慕容廆徙居大棘城拓跋弗卒叔父禄官立五年夏六月東海雨雹深五寸荆揚兖豫青徐六州大水冬十月武庫火焚累代之寶及二百萬人器械十二月丙戍新作武庫大調兵器拓跋禄官分其國爲三部一居上谷之北濡源之西自統之一居代郡參合陂之北使兄沙漠汗之子猗㐌統之一居定襄之盛樂故城使猗㐌弟猗盧統之猗盧善用兵西擊匈奴烏桓諸部皆破之代人衛操與從子雄及同郡箕澹往依拓跋氏説猗㐌猗盧招納晉人猗㐌悦之任以國事晉人附者稍衆六年春正月赦天下下邳獻王晃薨以中書監張華爲司空太尉隴西王泰行尚書令徙封高宻王夏郝散弟度元與馮翊北地馬蘭羌盧水胡俱反殺北地太守張損敗馮翊太守歐陽建征西大將軍趙王倫信用嬖人琅邪孫秀與雍州刺史濟南解系爭軍事更相表奏歐陽建亦表倫罪惡朝廷以倫撓亂關右徴倫爲車騎將軍以梁王肜爲征西大將軍都督雍涼二州諸軍事系與其弟御史中丞結皆表請誅秀以謝氐羌張華以告梁王肜使誅之肜許諾秀友人辛冉爲之說肜曰氐羌自反非秀之罪秀由是得免倫至洛陽用秀計深交賈郭賈后大愛信之倫因求録尚書事又求尚書令張華裴頠固執以爲不可倫秀由是怨之秋八月解系爲郝度元所敗秦雍氐羌悉反立氐帥齊萬年爲帝圍涇陽御史中丞周處彈劾不避權戚梁王肜嘗違灋處按劾之冬十一月詔以處爲建威將軍與振威將軍盧播俱􅀠安西將軍夏矦駿以討齊萬年中書令陳準言於朝曰駿及梁王皆貴戚非將帥之才進不求名退不畏罪周處呉人忠直勇果有仇無援宜詔積弩將軍孟觀以精兵萬人爲處前鋒必能殄冦不然梁王當使處先驅以不救而䧟之其敗必也朝廷不從齊萬年聞處來曰周府君嘗爲新平太守有文武才若專斷而來不可當也或受制於人此成禽耳關中饑疫初略陽清水氐楊駒始居仇池仇池方百頃其旁平地二十餘里四面斗絶而高爲羊膓蟠道三十六回而上至其孫千萬附魏封爲百頃王千萬孫飛龍浸強盛徙居略陽飛龍以其甥令狐茂搜爲子茂搜避齊萬年之亂十二月自略陽帥部落四千家還保仇池自號輔國將軍右賢王關中人士避亂者多依之茂搜迎接撫納欲去者衛䕶資送之是嵗以揚烈將軍巴西趙廞爲益州刺史發梁益兵糧助雍州討氐羌七年春正月齊萬年屯梁山有衆七萬梁王肜夏矦駿使周處以五千兵擊之處曰軍無後繼必敗不徒亡身爲國取恥肜駿不聽逼遣之癸丑處與盧播解系攻萬年於六陌處軍士未食肜促令速進自旦戰至暮斬獲甚衆弦絶矢盡救兵不至左右勸處退處按劒曰是吾効節致命之日也遂力戰而死朝廷雖以尤肜而亦不能罪也秋七月雍秦二州大旱疾疫米斛萬錢丁丑京陵元公王渾薨九月以尚書右僕射王戎爲司徒太子太師何劭爲尚書左僕射戎爲三公與時浮沈無所匡救委事僚寀輕出遊放性復貪吝園田徧天下每自執牙籌晝夜㑹計常若不足家有好李賣之恐人得種常鑚其核凡所賞抜專事虚名阮咸之子瞻嘗見戎戎問曰聖人貴名敎老莊明自然其㫖同異瞻曰將無同戎咨嗟良久遂辟之時人謂之三語掾是時王衍爲尚書令南陽樂廣爲河南尹皆善清談宅心事外名重當世朝野之人爭慕效之衍與弟澄好題品人物舉世以爲儀準衍神情明秀少時山濤見之嗟歎良久曰何物老嫗生寧馨兒然誤天下蒼生者未必非此人也樂廣性沖約清逺與物無競每談論以約言析理厭人之心而其所不知黙如也凡論人必先稱其所長則所短不言自見王澄及阮咸咸從子脩泰山胡母輔之陳國謝鯤城陽王尼新蔡畢卓皆以任放爲達至於醉狂裸體不以爲非胡母輔之嘗酣飲其子謙之闚而厲聲呼其父字曰彦國年老不得爲爾輔之歡笑呼入共飲畢卓嘗為吏部郎比舍郎釀熟卓因醉夜至甕間盜飲之為掌酒者所縛明旦視之乃畢吏部也樂廣聞而笑之曰名敎内自有樂地何必乃爾初何晏等祖述老莊立論以為天地萬物皆以無為本無也者開物成務無往不存者也隂陽恃以化生賢者恃以成德故無之為用無爵而貴矣王衍之徒皆愛重之由是朝廷士大夫皆以浮誕為美弛廢職業裴頠著崇有論以釋其蔽曰夫利欲可損而未可絶有也事務可節而未可全無也葢有飾為高談之具者深列有形之累盛稱空無之美形器之累有徴空無之義難檢辯巧之文可悦似象之言足惑衆聽眩焉溺其成說雖頗有異此心者辭不獲濟屈於所習因謂虛無之理誠不可蓋一唱百和往而不反遂薄綜世之務賤功利之用高浮游之業卑經實之賢人情所徇名利從之於是文者衍其辭訥者賛其㫖立言藉於虛無謂之玄妙處官不親所職謂之雅逺奉身散其亷操謂之曠逹故砥礪之風彌以陵遲放者因斯或悖吉凶之禮忽容止之表瀆長㓜之序混貴賤之級甚者至於祼䄇䙝慢無所不至士行又虧矣夫萬物之有形者雖生於無然生以有爲己分則無是有之所遺者也故養既化之有非無用之所能全也治既有之衆非無爲之所能脩也心非事也而制事必由於心然不可謂心爲無也匠非器也而制器必須於匠然不可謂匠非有也是以欲收重淵之鱗非偃息之所能獲也隕高墉之禽非靜拱之所能捷也由此而觀濟有者皆有也虚無奚益於己有之羣生哉然習俗已成頠論亦不能救也拓跋猗㐌度漠北廵因西略諸國積五嵗降附者三十餘國八年春三月壬戍赦天下秋九月荆豫徐揚冀五州大水初張魯在漢中賨人李氏自巴西宕渠往依之魏武帝克漢中李氏將五百餘家歸之拜爲將軍遷于略陽北土號曰巴氐其孫特庠流皆有材武善騎射性任俠州黨多附之及齊萬年反關中荐饑略陽天水等六郡民流移就榖入漢川者數萬家道路有疾病窮乏者特兄弟常營䕶振救之由是得衆心流民至漢中上書求寄食巴蜀朝議不許遣侍御史李苾持節慰勞且監察之不令入劒閣苾至漢中受流民賂表言流民十萬餘口非漢中一郡所能振贍蜀有倉儲人復豐稔宜令就食朝廷從之由是散在梁益不可禁止李特至劒閣太息曰劉禪有如此地面縛於人豈非庸才邪聞者異之張華陳準以趙王梁王相繼在關中皆雍容驕貴師老無功乃薦孟觀沈毅有文武材用使討齊萬年觀身當矢石大戰十數皆破之資治通鑑卷第八十二
