body:
  text: 臣司馬光奉勑編集齊紀九徐一年上章執東昬矦下永元二年春正月元會帝食後方出朝賀裁竟即還殿西序寢自己至申百僚陪位皆僵仆飢甚比起就會怱遽而罷乙巳魏大赦改元景明豫州刺史裴叔業聞帝數誅大臣心不自安登壽陽城北望肥水謂部下曰卿等欲富貴乎我能辦之及除南兖州意不樂内徙會陳顯逹反叔業遣司馬遼東李元䕶將兵救建康實持兩端顯逹敗而還朝廷疑叔業有異志叔業亦遣使參察建康消息衆論益疑之叔業兄子植颺粲皆為直閤在殿中懼弃母奔壽陽説叔業以朝廷必相掩襲宜早為計徐世􅋆等以叔業在邊急則引魏自助力未能制白帝遣叔業宗人中書舍人長穆宣㫖許停本任叔業猶憂畏而植等説之不已叔業遣親人馬文範至襄陽問蕭衍以自安之計曰天下大勢可知恐無復自存之理不若回面向北不失作河南公衍報曰羣小用事豈能及逺計慮回惑自無所成唯應送家還都以安慰之若意外相逼當勒馬歩二萬直出横江以斷其後則天下之事一舉可定若欲北向彼必遣人相代以河北一州相處河南公寧可復得邪如此則南歸之望絶矣叔業沈疑未决乃遣其子芬之入建康為質亦遣信詣魏豫州刺史薛真度問以入魏可不之宜真度勸其早降曰若事廹而來則功㣲賞薄矣數遣密信往來相應和建康人傳叔業叛者不已芬之懼復奔壽陽叔業遂遣芬之及兄女壻杜陵韋伯昕奉表降魏丁未魏遣驃騎大將軍彭城王􅎰車騎將軍王肅帥歩騎十萬赴之以叔業為使持節都督豫雍等五州諸軍事征南將軍豫州刺史封蘭陵郡公庚午下詔討叔業二月丙戌以衛尉蕭懿為豫州刺史戊戌魏以彭城王􅎰為司徒領楊州刺史鎮壽陽魏人遣大將軍李醜揚大眼將二千騎入壽陽又遣奚康生將羽林一千馳赴之大眼難當之孫也魏兵未渡淮己亥裴叔業病卒僚佐多欲推司馬李元䕶監州一二日謀不定前建安戌主安定席法友等以元䕶非其郷曲恐有異志共推裴植監州袐叔業䘮問教命處分皆出於植奚康生至植乃開門納魏兵城庫管籥悉付康生康生集城内耆舊宣詔撫賚之魏以植為兖州刺史李元䕶為齊州刺史席法友為豫州刺史軍主京兆王世弼為南徐州刺史巴西民雍道晞聚衆萬餘逼郡城巴西太守魯休烈嬰城自守三月劉季連遣中兵參軍李奉伯帥衆五千救之與郡兵合撃道晞斬之奉伯欲進討郡東餘賊涪令李膺止之曰卒惰將驕乗勝履險非完䇿也不如少緩更思後計奉伯不從悉衆入山大敗而還乙卯遣平西將軍崔慧景將水軍討壽陽帝屏除出琅邪城送之帝戎服坐樓上召慧景單騎進圍内無一人自隨者裁交數言拜辭而去慧景既得出甚喜豫州刺史蕭懿將歩軍三萬屯小峴交州刺史李叔獻屯合肥懿遣裨將胡松李居士帥衆萬餘屯死虎驃騎司馬陳伯之將水軍泝淮而上以逼壽陽軍于硤石壽陽士民多謀應齊者魏奚康生防禦内外閉城一月援軍乃至丙申彭城王􅎰王肅擊松伯之等大破之進攻合肥生擒叔獻統軍宇文福言於􅎰曰建安淮南重鎮彼此要衝得之則義陽昜圖不得則壽陽難保􅎰然之使福攻建安建安戌主胡景略面縛出降己亥魏皇弟恌卒崔慧景之􅀤建康也其子覺為直閤將軍密與之約慧景至廣陵覺走從之慧景過廣陵數十里召會諸軍主曰吾荷三帝厚恩當顧託之重幼主昏狂朝廷壊亂危而不扶責在今日欲與諸君共建大功以安社禝何如衆皆響應於是還軍向廣陵司馬崔恭祖守廣陵城開門納之帝聞變壬子假右衛將軍左興盛節督建康水陸諸軍以討之慧景停廣陵二日即收衆濟江初南徐兖二州刺史江夏王寶􅀇娶徐孝嗣女為妃孝嗣誅詔令離昏寶􅀇恨望慧景遣使奉寶􅀇為主寶􅀇斬其使因􅀤將吏守城帝遣馬軍主戚平外監黄林夫助鎮京口慧景將渡江寶􅀇密與相應殺司馬孔矜典籖吕承緒及平林夫開門納慧景使長史沈佚之諮議栁憕分部軍衆寶􅀇乗八掆輿手執絳麾隨慧景向建康臺遣驍騎將軍張佛䕶直閤將軍徐元稱等六將據竹里為數城以拒之寶􅀇遣信謂佛䕶曰身自還朝君何意苦相斷遏佛䕶對曰小人荷國重恩使於此創立小戍殿下還朝但自直過豈敢斷遏遂射慧景軍因合戰崔覺崔恭祖將前鋒皆荒傖善戰又輕行不㸑食以數舫縁江載酒肉為軍糧每見臺軍城中煙火起輙盡力攻之臺軍不復得食以此飢困元稱等議欲降佛䕶不可恭祖等進攻城㧞之斬佛䕶徐元稱降餘四軍主皆死乙卯遣中領軍王瑩都督衆軍據湖頭築壘上帶蔣山西巖實甲數萬瑩誕之從曾孫也慧景至查硎竹塘人萬副兒説慧景曰今平路皆為臺軍所斷不可議進唯宜從蔣山龍尾上出其不意耳慧景從之分遣千餘人魚貫縁山自西巖夜下皷叫臨城中臺軍驚恐即時奔散帝又遣右衛將軍左興盛帥臺内三萬人拒慧景於北籬門興盛望風退走甲子慧景入樂遊苑崔恭祖帥輕騎十餘突入北掖門乃復出宫門皆閉慧景引衆圍之於是東府石頭白下新亭諸城皆潰左興盛走不得入宫逃淮渚荻舫中慧景擒殺之宫中遣兵出盪不克慧景燒蘭臺府署為戰場守御尉蕭暢屯南掖門處分城内隨方應拒衆心稍安慧景稱宣徳太后令廢帝為吴王陳顯逹之反也帝復召諸王矦入宫巴陵王昭胄懲永泰之難與弟永新矦昭頴詐為沙門逃於江西昭胄子良之子也及慧景舉兵昭胄兄弟出赴之慧景意更向昭胄猶豫未知所立竹里之㨗崔覺與崔恭祖爭功慧景不能决恭祖勸慧景以火箭燒北掖樓慧景以大事垂定後若更造費用功多不從慧景性好談義兼觧佛理頓法輪寺對客高談恭祖深懐怨望時豫州刺史蕭懿將兵在小峴帝遣密使告之懿方食投箸而起帥軍主胡松李居士等數千人自採石濟江頓越城舉火臺城中皷叫稱慶恭祖先勸慧景遣二千人斷西岸兵令不得度慧景以城旦夕降外救自然應散不從至是恭祖請擊懿軍又不許獨遣崔覺將精手數千人渡南岸懿軍昧旦進戰數合士皆致死覺大敗赴淮死者二千餘人覺單馬退開桁阻淮恭祖掠得東宫女伎覺逼奪之恭祖積忿恨其夜與慧景驍將劉靈運詣城降衆心離懷夏四月癸酉慧景將腹心數人潜去欲北渡江城北諸軍不知猶為拒戰城中出盪殺數百人懿軍渡北岸慧景餘衆皆走慧景圍城凡十二日而敗從者於道稍散單騎至蠏浦為漁人所斬以頭内鰌籃擔送建康恭祖繫尚方少時殺之覺亡命為道人捕獲伏誅寶􅀇初至建康軍於東城士民多往投集慧景敗收得朝野投寶􅀇及慧景人名帝令燒之曰江夏尚爾豈可復罪餘人寶􅀇逃亡數日乃出帝召入後堂以歩障裏之令左右數十人鳴皷角馳繞其外遣人謂寶􅀇曰汝近圍我亦如此耳初慧景欲交處士何㸃㸃不顧及圍建康逼召㸃㸃往赴其軍終日談佛義不及軍事慧景敗帝欲殺㸃蕭暢謂茹法珍曰㸃若不誘賊共講未易可量以此言之乃應得封帝乃止㸃胤之兄也蕭懿既去小峴魏王肅亦還洛陽荒人往來者妄云肅復謀歸國五月乙巳詔以肅爲都督豫徐司三州諸軍事豫州刺史西豐公己酉江夏王寶􅀇伏誅壬子大赦六月丙子魏彭城王􅎰進位大司馬領司徒王肅加開府儀同三司太陽蠻田育丘等二萬八千户附於魏魏置四郡十八縣乙丑曲赦建康南徐兖二州先是崔慧景既平詔赦其黨而嬖倖用事不依詔書無罪而家富者皆誣為賊黨殺而籍其貲實附賊而貧者皆不問或謂中書舍人王咺之云赦書無信人情大惡咺之曰正當復有赦耳由是再赦既而嬖倖誅縱亦如初是時帝所寵左右凡三十一人黄門十人直閤驍騎將軍徐世􅋆素為帝所委任凡有殺戮皆在其手及陳顯逹事起加輔國將軍雖用䕶軍崔慧景為都督而兵權實在世􅋆世􅋆亦知帝昏縱密謂其黨茹法珍梅蟲兒曰何世天子無要人但儂貨主惡耳法珍等與之爭權以白帝帝稍惡其凶彊遣禁兵殺之世􅋆拒戰而死自是法珍蟲兒用事並為外監口稱詔敕王咺之專掌文翰與相脣齒帝呼所幸潘貴妃父寶慶及茹法珍為阿丈梅蟲兒及俞靈韻為阿兄帝與法珍等俱詣寶慶家躬自汲水助廚人作膳寶慶恃勢作姦富人悉誣以罪田宅貲財莫不啟乞一家被陷禍及親隣又慮後患盡殺其男口帝數往諸刀敕家游宴有吉凶輙往慶弔奄人王寶孫年十三四號為倀子最有寵參預朝政雖王咺之梅蟲兒之徒亦下之控制大臣移易詔敕乃至騎馬入殿詆訶天子公卿見之莫不懾息焉吐谷渾王伏連籌事魏盡禮而居其國置百官皆如天子之制稱制於其鄰國魏主遣使責而宥之冠軍將軍驃騎司馬陳伯之再引兵攻壽陽魏彭城王􅎰拒之援軍未至汝隂太守傅永將郡兵三千救壽陽伯之防淮口甚固永去淮口二十餘里牽船上汝水南岸以水牛挽之直南趣淮下船即渡適上南岸齊兵亦至會夜永潜進入城􅎰喜甚曰吾北望已乆恐洛陽難可復見不意卿能至也􅎰令永引兵入城永曰永之此來欲以却敵若如教㫖乃是與殿下同受攻圍豈救援之意遂軍於城外秋八月乙酉􅎰部分將士與永并勢擊伯之於肥口大破之斬首九千俘獲一萬伯之脱身遁還淮南遂入于魏魏遣鎮􅀯將軍元英將兵救淮南未至伯之已敗魏主召􅎰還洛陽􅎰累表辭大司馬領司徒乞還中山魏主不許以元英行揚州事尋以王肅為都督淮南諸軍事揚州刺史持節代之甲辰夜後宫火時帝出未還宫内人不得出外人不敢輙開比及開死者相枕燒三千餘間時嬖倖之徒皆號為鬼有趙鬼者能讀西京賦言於帝曰拍梁既災建章是營帝乃大起芳樂玊壽等諸殿以麝香塗壁刻畫裝飾窮極綺麗役者自夜逹暁猶不副速後宫服御極選珍奇府庫舊物不復周用貴市民間金寳價皆數倍建康酒租皆折使輸金猶不能足鑿金為蓮華以帖地令潘妃行其上曰此歩歩生蓮華也又訂出雉頭鶴氅白鷺縗嬖倖因緣為姦利課一輸十又各就州縣求為人輸準取見直不為輸送守宰皆不敢言重更科斂如此相仍前後不息百姓困盡號泣道路軍主吳子陽等出三關侵魏九月與魏東豫州刺史田益宗戰於長風城子陽等敗還蕭懿之入援也蕭衍馳使所親虞安福説懿曰誅賊之後則有不賞之功當明君賢主尚或難立况於亂朝何以自免若賊滅之後仍勒兵入宫行伊霍故事此萬世一時若不欲爾便放表還歷陽託以外拒為事則威振内外誰敢不從一朝放兵受其厚爵高而無民必生後悔長史徐曜甫亦苦勸之懿並不從崔慧景死懿爲尚書令有弟九人敷衍暢融宏偉秀憺恢懿以元勲居朝右暢爲衛尉掌管籥時帝出入無度或勸懿因其出門舉兵廢之懿不聽嬖臣茹法珍王喧之等憚懿威㩲説帝曰懿將行隆昌故事陛下命在晷刻帝然之徐曜甫知之密具舟江渚勸懿西奔襄陽懿曰自古皆有死豈有叛走尚書令邪懿弟姪咸爲之備冬十月己卯帝賜懿藥於省中懿且死曰家弟在雍深爲朝廷憂之懿弟姪皆亡匿於里巷無人􅀤之者唯融捕得誅之丁亥魏以彭城王􅎰為司徒録尚書事􅎰固辭不免􅎰雅好恬素不樂勢利高祖重其事幹故委以權任雖有遺詔復爲世宗所留􅎰每乖情願常悽然歎息爲人美風儀端嚴若神折旋合度出入言笑觀者忘疲敦尚文史物務之暇披覧不輟小心謹慎初無過失雖閑居獨處亦無惰容愛敬儒雅傾心禮待清正儉素門無私謁十一月己亥魏東荆州刺史􅁊暉入㓂㧞下笮戍歸之者二千餘户暉誕之子也初帝疑雍州刺史蕭衍有異志直後滎陽鄭植弟紹叔為衍寧蠻長史帝使植以候紹叔爲名往刺衍紹叔知之密以白衍衍置酒紹叔家戲植曰朝廷遣卿見圖今日閑宴是可取良會也賔王大笑又令植歷觀城隍府庫士馬器械舟艦植退謂紹叔曰雍州實力未易圖也紹叔曰兄還具爲天子言之若取雍州紹叔請以此衆一戰送植於南峴相持動哭而别及懿死衍聞之夜召張弘策呂僧珍長史王茂别駕柳慶逺功曹吉士瞻等入宅定議茂天生之子慶逺元景之弟子也乙巳衍集僚佐謂曰昏主暴虐惡踰於紂當與卿等共除之是日建牙集衆得甲士萬餘人馬千餘匹船三千艘出檀溪竹木裝艦葺之以茅事皆立辦諸將爭㯭呂僧珍出先所具者毎船付二張爭者乃息是時南康王寳融為荆州刺史西中郎長史蕭頴胄行府州事帝遣輔國將軍巴西梓潼二郡太守劉山陽將兵三千之官就頴胄兵使襲襄陽衍知其謀遣參軍王天虎詣江陵徧與州府書聲云山陽西上并襲荆雍衍因謂諸將佐曰荆州素畏襄陽人加以脣亡齒寒寧不闇同邪我合荆雍之兵皷行而東雖使韓白復生不能為建康計况以昏主役刀敕之徒哉頴胄等得書疑未能决山陽至巴陵衍復令天虎齎書與頴胄及其弟南康王友頴逹天虎既行衍謂張􅀪䇿曰用兵之道攻心為上近遣天虎往荆州人皆有書今叚乗驛甚急止有兩函與行事兄弟云天虎口具及問天虎而口無所説天虎是行事心膂彼間必謂行事與天虎共隱其事則人人生疑山陽惑於衆口判相嫌貳則行事進退無以自明必入吾謀内是馳兩空函定一州矣山陽至江安遲回十餘日不上頴胄大懼計無所出夜遣呼西中郎城局參軍安定席闡文諮議參軍柳忱閉齋定議闡文曰蕭雍州蓄養士馬非復一日江陵素畏襄陽人又衆寡不敵取之必不可制就能制之歲寒復不為朝廷所容今若殺山陽與雍州舉事立天子以令諸矦則覇業成矣山陽持疑不進是不信我今斬送天虎則彼疑可釋至而圖之㒺不濟矣忱曰朝廷狂悖日滋京師貴人莫不重足累息今幸在逺得假日自安雍州之事且藉以相斃耳獨不見蕭令君乎以精兵數千破崔氏十萬衆竟為羣邪所陷禍酷相尋前事之不忘後事之師也且雍州士鋭糧多蕭使君雄姿冠世必非山陽所能敵若破山陽荆州復受失律之責進退無可宜深慮之蕭頴逹亦勸頴胄從闡文等計詰旦頴胄謂天虎曰卿與劉輔國相識今不得不借卿頭乃斬天虎送示山陽發民車牛聲云起歩軍征襄陽山陽大喜甲寅山陽至江津單車白服從左右數十人詣頴胄頴胄使前汶陽太守劉孝慶等伏兵城内山陽入門即於車中斬之副軍主李元履收餘衆請降柳忱世隆之子也頴胄慮西中郎司馬夏矦詳不同以告忱忱曰易耳近詳求昏未之許也乃以女嫁詳子䕫而告之謀詳從之乙卯以南康王寳融敎纂嚴又敎赦囚徒施惠澤頒賞格丙辰以蕭衍為使持節都督前鋒諸軍事丁巳以蕭頴胄為都督行留諸軍事頴胄有器局既舉大事虛心委己衆情歸之以别駕南陽宗夬及同郡中兵參軍劉垣諮議參軍樂藹為州人所推信軍府經略每事諮焉頴胄夬各獻私錢榖及換借富貲以助軍長沙寺僧素富鑄黄金為龍數千兩埋土中頴胄取之以充軍費頴胄遣使送劉山陽首於蕭衍且言年月未利當須明年二月進兵衍曰舉事之初所藉者一時驍鋭之心事事相接猶恐疑怠若頓兵十旬必生悔吝且坐甲十萬糧用自竭若童子立異則大事不成况處分已定安可中息哉昔武王伐紂行逆太歲豈復待年月乎戊午衍上表勸南康王寳融稱尊號不許十二月頴胄與夏矦詳移檄建康百官及州郡牧守數帝及梅蟲兒茹法珍罪惡頴胄遣冠軍將軍天水楊公則向湘州西中郎參軍南郡鄧元起向夏口軍主王法度坐不進軍免官乙亥荆州將佐復勸寳融稱尊號不許夏矦詳之子驍騎將軍亶為殿中主帥詳密召之亶自建康亡歸壬辰至江陵稱奉宣徳皇太后令南康王宜纂承皇祚方俟清宫未即大號可封十郡為宣城王相國荆州牧加黄鉞選百官西中郎府南康國如故須軍次近路主者僃法駕奉迎竟陵太守新野曹景宗遣親人説蕭衍迎南康王都襄陽先正尊號然後將軍衍不從王茂私謂張􅀪䇿曰今以南康置人手中彼扶天子以令諸矦節下前進為人所使此豈它日之長計乎􅀪策以告衍衍曰若前塗大事不㨗故自蘭艾同焚若其克㨗則威振四海誰敢不從豈碌碌受人處分者邪初陳顯逹崔慧景之亂人心不安或問時事於上庸太守杜陵韋叡叡曰陳雖舊將非命世才崔頗更事懦而不武其赤族宜矣定天下者殆必在吾州將乎乃遣二子自結於蕭衍及衍起兵叡帥郡兵二千倍道赴之華山太守藍田康絢帥郡兵三千赴衍馮道根居母䘮聞衍起兵帥鄉人子弟勝兵者悉往赴之梁南秦二州刺史柳惔亦起兵應衍惔忱之兄也帝聞劉山陽死發詔討荆雍戊寅以冠軍長史劉澮為雍州刺史遣驍騎將軍薛元嗣制局監暨榮伯將兵及運糧百四十餘船送郢州刺史張冲使拒西師元嗣等懲劉山陽之死疑冲不敢進停夏口浦聞西師將至乃相帥入郢城前竟陵太守房僧寄將還建康至郢帝敕僧寄留守魯山除驍騎將軍張冲與之結盟遣軍主孫樂祖將數千人助僧寄守魯山蕭頴胄與武寧太守鄧元起書招之張冲待元起素厚衆皆勸其還郢元起大言於衆曰朝廷暴虐誅戮宰輔羣小用事衣冠盡荆雍二州同舉大事何患不克且我老母在西若事不成正受戮昏朝幸免不孝之罪即日治嚴上道至江陵爲西中郎中兵參軍湘州行事張寳積􅀤兵自守未知所附楊公則克巴陵進軍白沙寳積懼請降公則入長沙撫納之是􅀊北秦州刺史楊集始將衆萬餘自漢中北出規復舊地魏梁州刺史楊椿將歩騎五千出頓下辯遺集始書開以利害集始遂復將其部曲千餘人降魏魏人還其爵位使歸守武興資治通鑑卷第一百四十三
