front:
  text: 資治通鑑卷第二百八十五
  hash: sha256:11f1d00a8cc4ce2f79ab5bb873ef8a2433219e7d1d044731776adcc6fdb1914c
body:
  text: 臣司馬光奉勑編集後􅀳紀六柔兆敦牂凡一年有竒起旃蒙大荒落八月盡齊王下開運二年八月甲子朔日有食之丙寅右僕射兼中書侍郎同平章事和凝罷守本官加樞密使戸部尚書馮玉中書侍郎同平章事事無大小悉以委之帝自陽城之捷謂天下無虞驕侈益甚四方貢獻珍竒皆歸内府多造器玩廣宫室崇飾後庭近朝莫之及作織錦樓以織地衣用織工數百期年乃成又賞賜優伶無度桑維翰諫曰曏者陛下親禦胡寇戰士重傷者賞不過帛數端今優人一談一笑稱㫖往往賜束帛萬錢錦袍銀帶彼戰士見之能不觖望曰我曹冐白刃絶筋折骨曽不如一談一笑之功乎如此則士卒解體陛下誰與衛社稷乎帝不聽馮玉每善承迎帝意由是益有寵嘗有疾在家帝謂諸宰相曰自刺史以上俟馮玉出乃得除其􅀝任如此玉乗勢弄權四方賂遺輻湊其門由是朝政益壞唐兵圍建州旣乆建人離心或謂董思安盍早擇去就思安曰吾丗事王氏危而叛之天下其誰容我衆感其言無叛者丁亥唐先鋒橋道使上元王建封先登遂克建州閩主延政降王忠順戰死董思安整衆奔泉州􅀄唐兵之來建人苦王氏之亂與楊思㳟之重斂爭伐木開道以迎之及破建州縱兵大掠焚宫室廬舎俱盡是夕寒雨凍死者相枕建人失望唐主以其有功皆不問漢主殺韶王弘雅九月許文稹以汀州王繼勲以泉州王繼成以漳州皆降於唐唐置永安軍於建州丙申以西京留守兼侍中景延廣充北面行營副招討使殿中監王欽祚權知恒州事㑹之軍儲詔欽祚括糴民粟杜威有粟十餘萬斛在􅁪州欽祚舉籍以聞威大怒表稱臣有何罪欽祚籍没臣粟朝廷為之召欽祚還仍厚賜威以慰安之戊申置威信軍於曹州遣侍衛馬歩都指揮使李守貞戍澶州乙卯遣彰徳節度使張彦澤戍􅁪州漢主殺劉思潮林少強林少良何昌延以左僕射王翻嘗與髙祖謀立弘昌出為英州刺史未至賜死内外皆懼不自保冬十月癸巳置鎭安軍於陳州唐元敬宋太后殂王延政至金陵唐主以為羽林大將軍斬楊思㳟以謝建人以百勝節度使王崇文為永安節度使崇文治以寛簡建人遂安􅀄髙麗王建用兵吞滅鄰國頗彊大因胡僧襪囉言於髙祖曰勃海我昬姻也其王為契丹所虜請與朝廷共擊取之髙祖不報及帝與契丹為仇襪囉復言之帝欲使髙麗擾契丹東邊以分其兵勢㑹建卒子武自稱權知國事上表告喪十一月戊戌以武為大義軍使髙麗王遣通事舎人郭仁遇使其國諭指使擊契丹仁遇至其國見其兵極弱曏者襪囉之言特建為誇誕耳實不敢與契丹為敵仁遇還武更以它故為解乙卯吴越王弘佐誅内都監使杜昭逹己未誅内牙上統軍使明州刺史闞璠昭逹建徽之孫也與璠皆好貨錢塘富人程昭恱以貨結二人得侍弘佐左右昭恱為人狡佞王恱之寵待踰於舊將璠不能平昭恱知之詣璠頓首謝罪璠責讓乆之乃曰吾始者决欲殺汝今旣悔過吾亦釋然昭恱懼謀去璠璠專而愎國人惡之者衆王亦惡之昭恱欲出璠於外恐璠覺之私謂右統軍使胡進思曰今欲除公及璠各為本州使璠不疑可乎進思許之乃以璠為明州刺史進思為湖州刺史璠怒曰出我於外是弃我也進思曰老兵得大州幸矣不行何為璠乃受命旣而復以它故留進思内外馬歩都統軍使錢仁俊母杜昭逹之姑也昭恱因譛璠昭逹謀奉仁俊作亂下獄鍜錬成之璠昭逹旣誅奪仁俊官幽于東府於是昭恱治闞杜之黨凡權位與已侔意所忌者誅放百餘人國人畏之側目胡進思重厚寡言昭恱以為戇故獨存之昭恱收仁俊故吏愼温其使證仁俊之罪拷掠僃至温其堅守不屈弘佐嘉之擢為國官温其衢州人也十二月乙丑加吴越王弘佐東南面兵馬都元帥辛未以前中書舎人廣晉殷鵬為給事中樞密直學士鵬馮玉之黨也朝廷每有遷除玉皆與鵬議之由是請謁賂遺充滿其門􅀄帝疾未平㑹正旦樞密使中書令桑維翰遣女僕入宫起居太后因問皇弟睿近讀書否帝聞之以告馮玉玉因譖維翰有廢立之志帝疑之李守貞素惡維翰馮玉李彦韜與守貞合謀排之以中書令行開封尹趙瑩柔而易制共薦以代維翰丁亥罷維翰政事為開封尹以瑩為中書令李崧為樞密使守侍中維翰遂稱足疾希復朝謁杜絕賔客或謂馮玉曰桑公元老今旣解其樞務縱不留之相位猶當優以大藩柰何使之尹京親猥細之務乎玉曰恐其反耳曰儒生安能反玉曰縱不自反恐其教人耳楚湘隂處士戴偃為詩多譏刺楚王希範囚之天䇿副都軍使丁思瑾上書切諌希範削其官爵唐齊王景逹府屬謝仲宣言於景逹曰宋齊丘先帝布衣之交今弃之草萊不厭衆心景逹為之言於唐主曰齊丘宿望勿用可也何必弃之以為名唐主乃使景逹自至青陽召之三年春正月以齊丘為太􅀓兼中書令但奉朝請不預政事以昭武節度使李建勲為右僕射兼門下侍郎與中書侍郎馮延巳皆同平章事建勲練習吏事而懦怯少斷延巳工文辭而狡佞喜大言多樹朋黨水部郎中髙越上書指延巳兄弟過惡唐主怒貶越蘄州司士初唐主置宣政院於禁中以翰林學士給事中常夢錫領之專典機密與中書侍郎嚴續皆忠直無私唐主謂夢錫曰大臣惟嚴續中立然無才恐不勝其黨卿宐左右之未幾夢錫罷宣政院續亦出為池州觀察使夢錫於是移疾縱酒不復預朝廷事續可求之子也二月壬戌朔日有食之晉昌節度使兼侍中趙在禮更歷十鎭所至貪暴家貲為諸帥之最帝利其富三月庚申為皇子鎭寧節度使延煦娶其女在禮自費緡錢十萬縣官之費數倍過之延煦及弟延寳皆髙祖諸孫帝養以為子唐泉州刺史王繼勲致書修好於威武節度使李弘義弘義以泉州故􅀠威武軍怒其抗禮夏四月遣弟弘通將兵萬人伐之初朔方節度使馮暉在靈州留党項酋長拓跋彦超於州下故諸部不敢為寇及將罷鎭而縱之前彰武節度使王令温代暉鎭朔方不存撫羌胡以中國法繩之羌胡怨怒皆叛競為寇鈔拓跋彦超石存也厮褒三族共攻靈州殺令温弟令周戊午令温上表告急泉州都指揮使留從效謂刺史王繼勲曰李弘通兵勢甚盛士卒以使君賞罰不當莫肯力戰使君宐避位自省乃廢繼勲歸私第代領軍府事勒兵擊李弘通大破之表聞于唐唐主以從效為泉州刺史召繼勲還金陵遣將將兵戌泉州徙漳州刺史王繼成為和州刺史汀州刺史許文稹為蘄州刺史定州西北二百里有狼山土人築堡於山上以避胡寇堡中有佛舍尼孫深意居之以妖術惑衆言事頗驗逺近信奉之中山人孫方簡及弟行友自言深意之姪不飲酒食肉事深意甚謹深意卒方簡嗣行其術稱深意坐化嚴飾事之如生其徒日滋㑹晉與契丹絕好北邉賦役繁重冦盜充斥民不安其業方簡行友因帥鄉里豪健者據寺為寨以自保契丹入寇方簡帥衆邀擊頗獲其甲兵牛馬軍資人挈家往依之者益衆乆之至千餘家遂為羣盜懼為吏所討乃歸􅅃朝廷朝廷亦資其禦寇署東北招收指揮使方簡時入契丹境鈔掠多所殺獲旣而邀求不已朝廷小不副其意則舉寨降於契丹請為郷道以入寇時河北大饑民餓死者所在以萬數兖鄆滄貝之間盜賊蠭起吏不能禁天雄節度使杜威遣元隨軍將劉延翰市馬於邊方簡執之獻於契丹延翰逃歸六月壬戌至大梁言方簡欲乗中國凶饑引契丹入寇宐為之僃初朔方節度使馮暉在靈武得羌胡心市馬朞年至五千匹朝廷忌之徙鎭邠州及陜州入為侍衞歩軍都指揮使領河陽節度使暉知朝廷之意悔離靈武乃厚事馮玉李彦韜求復鎮靈州朝廷亦以羌胡方擾丙寅復以暉為朔方節度使將關西兵擊羌胡以威州刺史藥元福為行營馬軍都指揮使乙丑定州言契丹勒兵壓境詔以天平節度使侍衛馬歩都指揮使李守貞為北面行營都部署義成節度使皇甫遇副之彰徳節度使張彦澤充馬軍都指揮使兼都虞􅀱義武節度使薊人李殷充歩軍都指揮使兼都排陣使遣護聖指揮使臨清王彦超太原白延遇以部兵十營詣邢州時馬軍都指揮使鎭安節度使李彦韜方用事視守貞蔑如也守貞在外所為事無大小彦韜必知之守貞外雖敬奉而内恨之初唐人旣克建州欲乗勝取福州唐主不許樞密使陳覺請自往說李弘義必令入朝宋齊丘薦覺才辯可不煩寸刃坐致弘義唐主乃拜弘義母妻皆為國夫人四弟皆遷官以覺為福州宣諭使厚賜弘義金帛弘義知其謀見覺辭色甚倨待之踈薄覺不敢言入朝事而還秋七月河決楊劉西入莘縣廣四十里自朝城北流有自幽州來者言趙延壽有意歸國樞密使李崧馮玉信之命天雄節度使杜威致書於延壽具述朝㫖啖以厚利洺州軍將趙行實嘗事延壽遣齎書潜往遺之延壽復書言乆處異域思歸中國乞發大軍應接拔身南去辭皆懇密朝廷欣然復遣行實詣延壽與為期約八月李守貞言與契丹千餘􅀐遇於長城北轉􅃲四十里斬其酋帥解里擁餘衆入水溺死者甚衆丁卯詔李守貞還屯澶州帝旣與契丹絕好數召吐谷渾酋長白承福入朝宴賜甚厚承福從帝與契丹戰澶州又與張從恩戍滑州屬歳大􅀬遣其部落還太原畜牧於嵐石之境部落多犯法劉知逺無所縱捨部落知朝廷微弱且畏知逺之嚴謀相與遁歸故地有白可乆者位亞承福帥所部先亡歸契丹契丹用為雲州觀察使以誘承福知逺與郭威謀曰今天下多事置此屬於太原乃腹心之疾也不如去之承福家甚富飼馬用銀槽威勸知逺誅之收其貨以贍軍知逺密表吐谷渾反覆難保請遷於内地帝遣使發其部落千九百人分置河陽及諸州知逺遣威誘承福等入居太原城中因誣承福等五族謀叛以兵圍而殺之合四百口籍没其家貲詔褒賞之吐谷渾由是遂微濮州刺史慕容彦超坐違法科歛擅取官麥五百斛造麴賦與部民李彦韜素與彦超有隙發其事罪應死彦韜趣馮玉使殺之劉知逺上表論救李崧曰如彦超之罪今天下藩矦皆有之若盡其法恐人人不自安甲戌敇免彦超死削官爵流房州唐陳誨自福州還至劒州恥無功矯詔使侍衛官顧忠召弘義入朝自稱權福州軍府事擅發汀建撫信州兵及戍卒命建州監軍使馮延魯將之趣福州迎弘義延魯先遺弘義書諭以禍福弘義復書請戰遣樓船指揮使楊崇保將州師拒之覺以劒州刺史陳誨為縁江戰棹指揮使表福州􅀌危旦夕可克唐主以覺專命甚怒羣臣多言兵已􅀓城下不可中止當發兵助之丁丑覺延魯敗楊崇保於候官戊寅乗勝進攻福州西關弘義出擊大破之執唐左神威指揮使楊匡鄴唐主以永安節度使王崇文為東南面都招討使以漳泉安撫使諫議大夫魏岑為東面監軍使延魯為南面監軍使㑹兵攻福州克其外郭弘義固守第二城馮暉引兵過旱海至輝徳糗粮已盡拓跋彦超衆數萬為三陳扼要路據水泉以待之軍中大懼暉以賂求和於彦超彦超許之自旦至日中使者往返數四兵未解藥元福曰虜知我飢渇陽許和以困我耳若至暮則吾輩成擒矣今虜雖衆精兵不多依西山而陳者是也其餘歩卒不足為患請公嚴陳以待我我以精􅀐先犯西山兵小勝則舉黃旗大軍合勢擊之破之必矣乃帥􅀐先進用短兵力戰彦超小却元福舉黄旗暉引兵赴之彦超大敗明日暉入靈州九月契丹三萬寇河東壬辰劉知逺敗之於楊武谷斬首七千級漢劉思潮等旣死陳道庠内不自安特進鄧伸遺之漢紀道庠問其故伸曰憨獠此書有誅韓信醢彭越事宐審讀之漢主聞之族道庠及伸李弘義自稱威武留後權知閩國事更名弘逹奉表請命于􅀳甲午以弘逹為威武節度使同平章事知閩國事張彦澤奏敗契丹於定州北又敗之於泰州斬首二千級辛丑福州排陳使馬捷引唐兵自馬牧山拔寨而入至善化門橋都指揮使丁彦貞以兵百人拒之弘逹退保善化門外城再重皆為唐兵所據弘逹更名逹遣使奉表稱臣乞師于呉越楚王希範知帝好奢靡屢以珍玩為獻求都元帥甲辰以希範為諸道兵馬都元帥丙辰河決澶州臨黃契丹使瀛州刺史劉延祚遺樂壽監軍王巒書請舉城内附且云城中契丹兵不滿千人乞朝廷發輕兵襲之已為内應又今秋多雨自瓦橋已北積水無際契丹主已歸牙帳雖聞關南有變地逺阻水不能救也巒與天雄節度使兼中書令杜威屢奏瀛莫乗此可取深州刺史慕容遷獻瀛莫圖馮玉李崧信以為然欲發大兵迎趙延壽及延祚先是侍衛馬歩都指揮使天平節度使李守貞數將兵過廣􅀳杜威厚待之贈金帛甲兵動以萬計守貞由是與威親善守貞入朝帝勞之曰聞卿為將常費私財以賞戰士對曰此皆杜威盡忠於國以金帛資臣臣安敢掠有其美因言陛下若它日用兵臣願與威戮力以清沙漠帝由是亦賢之及將北征帝與馮玉李崧議以威為元帥守貞副之趙瑩私謂馮李曰杜令國戚貴為將相而所欲未厭心常慊慊豈可復假以兵權必若有事北方不若止任守貞為愈也不從冬十月辛未以威為北面行營都招討使以守貞為兵馬都監㤗寧節度使安審琦為左右廂都指揮使武寧節度使符彦卿為軍馬左廂都指揮使義成節度使皇甫遇為馬軍右廂都指揮使永清節度使梁漢璋為馬軍都排陣使前威勝節度使宋彦筠為歩軍左廂都指揮使奉國左廂都指揮使王饒為歩軍右廂都指揮使洛州團練使薛懐讓為先鋒都指揮使仍下敇牓曰專發大軍往平􅃛虜先收瀛莫安定關南次復幽燕盪平塞北又曰有能擒獲虜主者除上鎭節度使賞錢萬緡絹萬匹銀萬兩時自六月積雨至是未止軍行及饋運者甚艱苦唐漳州將林贊堯作亂殺監軍使周承義劒州刺史陳誨泉州刺史留從效舉兵逐賛堯以泉州禆將董思安權知漳州唐主以思安為漳州刺史思安辭以父名章唐主改漳州為南州命思安及留從效將州兵㑹攻福州庚辰圍之福州使者至錢塘呉越王弘佐召諸將謀之皆曰道險逺難救惟内都監使臨安水丘昭劵以為當救弘佐曰脣亡齒寒吾為天下元帥曽不能救鄰道將安用之諸君但樂飽食安坐邪壬午遣統軍使張筠趙承泰將兵三萬水陸救福州先是募兵乆無應者弘佐命紏之曰紏而為兵者粮賜減半明日應募者雲集弘佐命昭劵專掌用兵昭劵憚程昭恱以用兵事讓之弘佐命昭恱掌應援饋運事而以軍謀委元徳昭徳昭危仔倡之子也弘佐議鑄鐡錢以益將士禄賜其弟牙内都虞候弘億諌曰鑄鐡錢有八害新錢旣行舊錢皆流入鄰國一也可用於吾國而不可用於它國則商賈不行百貨不通二也銅禁至嚴民猶盜鑄況家有鐺釡野有鏵犂犯法必多三也閩人鑄鐡錢而亂亡不足為法四也國用幸豐而自示空乏五也禄賜有常而無故益之以啓無厭之心六也法變而弊不可遽復七也錢者國姓易之不祥八也弘佐乃止杜威李守貞㑹兵於廣􅀳而北行威屢使公主入奏請益兵曰今深入虜境必資衆力由是禁軍皆在其麾下而􅀫衛空虛十一月丁酉以李守貞權知幽州行府事己亥杜威等至瀛州城門洞啓寂若無人威等不敢進聞契丹將髙謨翰先已引兵潜出威遣梁漢璋將二千􅀐追之漢璋遇契丹於南陽務敗死威等聞之引兵而南時束城等數縣請降威等焚其廬舎掠其婦女而還己酉呉越兵至福州自罾浦南潜入州城唐兵進據東武門李逹與呉越兵共禦之不利自是内外斷絕城中益危唐主遣信州刺史王建封助攻福州時王崇文雖為元帥而陳覺馮延魯魏岑爭用事留從效王建封倔強不用命各爭功進退不相應由是將士皆解體故攻城不克唐主以江州觀察使杜昌業為吏部尚書判省事先是昌業自兵部尚書判省事出江州及還閱簿籍撫案歎曰未數年而府庫所耗者半其能乆乎契丹主大舉入寇自易定趣􅁪州杜威等至武強聞之將自兾貝而南彰徳節度使張彦澤時在􅁪州引兵㑹之言契丹可破之狀威等乃復趣􅁪州以彦澤為前鋒甲寅威等至中度橋契丹已據橋彦澤帥􅀐爭之契丹焚橋而退􅀳兵與契丹夾滹沱而軍始契丹見􅀳軍大至又爭橋不勝恐􅀳軍急渡滹沱與􅁪州合勢擊之議引兵還及聞􅀳軍築壘為持乆之計遂不去蜀施州刺史田行皐叛遣供奉官耿彦珣將兵討之杜威雖以貴戚為上將性懦怯偏禆皆節度使但日相承迎置酒作樂罕議軍事磁州刺史兼北面轉運使李榖說威及李守貞曰今大軍去􅁪州咫尺煙火相望若多以三股木置水中積薪布土其上橋可立成密約城中舉火相應夜募壯土斫虜營而入表裏合勢虜必遁逃諸將皆以為然獨杜威不可遣榖南至懐孟督軍糧契丹以大兵當晉軍之前潜遣其將蕭翰通事劉重進將百􅀐及羸卒並西山出􅀳軍之後斷􅀳糧道及歸路樵采者遇之盡為所掠有逸歸者皆稱虜衆之盛軍中忷懼翰等至欒城城中戍兵千餘人不覺其至狼狽降之契丹獲􅀳民皆黥其面曰奉敕不殺縱之南走運夫在道遇之皆弃車驚潰翰契丹主之舅也十二月丁巳朔李穀自書密奏具言大軍危急之勢請車駕幸滑州遣髙行周符彦卿扈從及發兵守澶州河陽以僃虜之奔衝遣軍將關勲走馬上之己未帝始聞大軍屯中度是夕關勲至庚申杜威奏請益兵詔悉發守宫禁者得數百人赴之又詔發河北及滑孟澤潞芻糧五十萬詣軍前督迫嚴急所在鼎沸辛酉威又遣從者張祚等來告急祚等還為契丹所􅀗自是朝廷與軍前聲問兩不相通時宿衛兵皆在行營人心懔懔莫知為計開封尹桑維翰以國家危在旦夕求見帝言事帝方在􅁐中調鷹辭不見又詣執政言之執政不以為然退謂所親曰􅀳氏不血食矣帝欲自將北征李彦韜諌而止時符彦卿雖任行營職事帝留之使戍荆州口壬戌詔以歸徳節度使髙行周為北面都部署以彦卿副之共戍澶州以西京留守景延廣戌河陽且張形勢奉國都指揮使王清言於杜威曰今大軍去恒州五里守此何為營􅀌食盡勢將自潰請以歩卒二千為前鋒奪橋開道公帥諸軍繼之得入􅁪州則無憂矣威許諾遣清與宋彦筠俱進清戰甚銳契丹不能支􅀔小却諸將請以大軍繼之威不許彦筠為契丹所敗浮水抵岸得免因退走清獨帥麾下陳於水北力戰互有殺傷屢請救於威威竟不遣一􅀐助之清謂其衆曰上將握兵坐觀吾輩困急而不救此必有異志吾輩當以死報國耳衆感其言莫有退者至暮戰不息契丹以新兵繼之清及士衆盡死由是諸軍皆奪氣清洺州人也甲子契丹遥以兵環􅀳營内外斷絕軍中食且盡杜威與李守貞宋彦筠謀降契丹威潜遣腹心詣契丹牙帳邀求重賞契丹主紿之曰趙延壽威望素淺恐不能帝中國汝果降者當以汝為之威喜遂定降計丙寅伏甲召諸將出降表示之使署名諸將駭愕莫敢言者但唯唯聽命威遣閤門使髙勲齎詣契丹契丹主賜詔慰納之是日威悉命軍士出陳於外軍士皆踊躍以為且戰威親諭之曰今食盡塗窮當與汝曹共求生計因命釋甲軍士皆慟哭聲振原野威守貞仍於衆中揚言主上失徳信任姧邪猜忌於己聞者無不切齒契丹主遣趙延壽衣赭袍至􅀳營慰撫士卒曰彼皆汝物也杜威已下皆迎謁於馬前亦以赭袍衣威以示􅀳軍其實皆戲之耳以威為太傅李守貞為司徒威引契丹主至􅁪州城下諭順國節度使王周以已降之狀周亦出降戊辰契丹主入􅁪州遣兵襲代州刺史王暉以城降之先是契丹主屢攻易州刺史郭璘固守拒之契丹主毎過城下指而嘆曰吾能吞併天下而為此人所扼及杜威旣降契丹主遣通事耿崇美至易州誘諭其衆衆皆降璘不能制遂為崇美所殺璘邢州人也義武節度使李殷安國留後方太皆降於契丹契丹主以孫方簡為義武節度使麻荅為安國節度使以客省副使馬崇祚權知􅁪州事契丹翰林承旨吏部尚書張礪言於契丹主曰今大遼已得天下中國將相宐用中國人為之不宐用北人及左右近習茍政令乖失則人心不服雖得之猶將失之契丹主不從引兵自邢相而南杜威將降兵以從遣張彦澤將二千􅀐先取大梁且撫安吏民以通事􅀓住兒為都監杜威之降也皇甫遇初不預謀契丹主欲遣遇先將兵入大梁遇辭退謂所親曰吾位為將相敗不能死忍復圖其主乎至平􅁄謂從者曰吾不食累日矣何面目復南行遂扼吭而死張彦澤倍道疾驅夜度白馬津壬申帝始聞杜威等降是夕又聞彦澤至滑州召李崧馮玉李彦韜入禁中計事欲詔劉知逺發兵入援癸酉未明彦澤自封丘門斬􅀜而入李彦韜帥禁兵五百赴之不能遏彦澤頓兵明徳門外城中大擾帝於宫中起火自携劒驅後宫十餘人將赴火為親軍將薛超所持俄而彦澤自寛仁門傳契丹主與太后書慰撫之且召桑維翰景延廣帝乃命滅火悉開宫城門帝坐􅁐中與后妃相聚而泣召翰林學士范質草降表自稱孫男臣重貴禍至神惑運盡天亡今與太后及妻馮氏舉族於郊野靣􅅞待罪次遣男鎭寧節度使延煦威信節度使延寳奉國寳一金印三出迎太后亦上表稱新婦李氏妾􅀓住兒入宣契丹主命帝脫黄􅂁服素衫再拜受宣左右皆掩泣帝使召張彦澤欲與計事彦澤曰臣無靣目見陛下帝復召之彦澤微笑不應或􅂆桑維翰逃去維翰曰吾大臣逃將安之坐而俟命彦澤以帝命召維翰維翰至天街遇李崧駐馬語未畢有軍吏於馬前揖維翰赴侍衛司維翰知不免顧謂崧曰侍中當國今日國亡反令維翰死之何也崧有媿色彦澤倨坐見維翰維翰責之曰去年拔公於罪人之中復領大鎮授以兵權何乃負恩至此彦澤無以應遣兵守之宣徽使孟承誨素以佞巧有寵於帝至是帝召承誨欲與之謀承誨伏匿不至張彦澤捕而殺之彦澤縱兵大掠貧民乗之亦爭入富室殺人取其貨二日方止都城為之一空彦澤所居寳貨山積自謂有功於契丹晝夜以酒樂自娱出入􅀐從常數百人其旗幟皆題赤心為主見者笑之軍士擒罪人至前彦澤不問所犯但瞋目竪三指即驅出斷其􅆎領彦澤素與閤門使髙勲不協乗醉至其家殺其叔父及弟尸諸門首士民不寒而慄中書舍人李濤謂人曰吾與其逃於溝瀆而不免不若往見之乃投刺謁彦澤曰上䟽請殺太尉人李濤謹來請死彦澤欣然接之謂濤曰舎人今日懼乎濤曰濤今日之懼亦猶足下昔年之懼也曏使髙祖用濤言事安至此彦澤大笑命酒飲之濤引滿而去旁若無人甲戌張彦澤遷帝於開封府頃刻不得留宫中慟哭帝與太后皇后乗肩輿宫人宦者十餘人歩從見者流涕帝悉以内庫金珠自隨彦澤使人諷之曰契丹主至此物不可匿也帝悉歸之亦分以遺彦澤彦擇取其竒貨而封其餘以待契丹彦澤遣控鶴指揮使李筠以兵守帝内外不通帝姑烏氏公主賂守門者入與帝訣相持而泣歸第自經死帝與太后所上契丹主表章皆先示彦澤然後敢發帝使取内庫帛數叚主者不與曰此非帝物也又求酒於李崧崧亦辭以它故不進又欲見李彦韜彦韜亦辭不往帝惆悵乆之馮玉佞張彦澤求自送傳國寳兾契丹復任用楚國夫人丁氏延煦之母也有美色彦澤使人取之太后遲迴未與彦澤詬詈立載之去是夕彦澤殺桑維翰以帶加頸白契丹主云其自經契丹主曰吾無意殺維翰何為如是命厚撫其家髙行周符彦卿皆詣契丹牙帳降契丹主以陽城之戰為彦卿所敗詰之彦卿曰臣當時惟知為􅀳主竭力今日死生惟命契丹主笑而釋之己卯延煦延寳自牙帳還契丹主賜帝手詔且遣解里謂帝曰孫勿憂必使汝有噉飯之所帝心稍安上表謝恩契丹以所獻傳國寳追琢非工又不與前史相應疑其非眞以詔書詰帝使獻眞者帝奏頃王從珂自焚舊傳國寳不知所在必與之俱燼此寳先帝所為羣臣僃知臣今日焉敢匿寳乃止帝聞契丹主將度河欲與太后於前塗奉迎張彦澤先奏之契丹主不許有司又欲使帝衘璧牽羊大臣輿襯迎於郊外先具儀注白契丹主契丹主曰吾遣竒兵直取大梁非受降也亦不許又詔􅀳文武羣官一切如故朝廷制度並用漢禮有司欲僃法駕迎契丹主契丹主報曰吾方擐甲揔戎太常儀衛未暇施也皆却之先是契丹主至相州即遣兵趣河陽捕景延廣延廣蒼猝無所逃伏往見契丹主於封丘契丹主詰之曰致兩主失歡皆汝所為也十萬橫磨劒安在召喬榮使相辨證事凡十條延廣初不服榮以紙所記語示之乃服毎服一事輒授一籌至八籌延廣但以面伏地請死乃鎖之丙戌晦百官㝛於封禪寺資治通鑑卷第二百八十五
