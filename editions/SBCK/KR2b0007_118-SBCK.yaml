body:
  text: 西秦安東將軍木弈干擊吐谷渾樹洛干破其弟阿柴於堯杆川俘五千餘口而還樹洛干走保白蘭山慙憤發疾將卒謂阿柴曰吾子拾䖍幼弱今以大事付汝樹洛干卒阿柴立自稱驃騎將軍沙州刺史諡樹洛干曰武王阿柴稍用兵侵併其傍小種地方數千里遂為疆國河西王䝉遜遣其將襲烏啼部大破之又撃卑和部降之王鎭惡進軍澠池遣毛徳祖襲尹雅於蠡吾城禽之雅殺守者而逃鎮惡引兵徑前扺潼關檀道濟沈林子自陜北渡河拔襄邑堡秦河北太守薛帛犇河東又攻秦并州刺史尹昭於蒲阪不克别將攻匈奴堡為姚成都所敗辛酉滎陽守將傅洪以虎牢降魏秦主􅇦以東平公紹為太宰大將軍都督中外諸軍事假黄鉞改封魯公使督武衛將軍姚鸞等步騎五萬守潼關又遣别將姚驢救蒲阪沈林子謂檀道濟曰蒲阪城堅兵多不可猝拔攻之傷衆守之引日王鎮惡在潼關勢孤力弱不如與鎮惡合勢并力以争潼關若得之尹昭不攻自潰矣道濟從之三月道濟林子至潼關秦魯公紹引兵出戰道濟林子奮擊大破之斬獲以千數紹退屯定城據險拒守謂諸將曰道濟等兵力不多懸軍深入不過堅壁以待繼援吾分軍絶其糧道可坐禽也乃遣姚鸞屯大路以絶道濟糧道鸞遣尹雅將兵與晉戰於闗南為晉兵所獲將殺之雅曰雅前日已當死幸得脱至今死固甘心然夷夏雖殊君臣之義一也晉以大義行師獨不使秦有守節之臣乎乃免之丙子夜沈林子將鋭卒襲鸞營斬鸞殺其士卒數千人紹又遣東平公讚屯河上以㫁水道沈林子擊之讚敗走還定城薛帛據河曲來降太尉裕將水軍自淮泗入清河將泝河西上先遣使假道於魏秦王􅇦亦遣使請救於魏魏主嗣使羣臣議之皆曰潼闗天險劉裕以水軍攻之甚難若登岸北侵其勢便易裕聲言伐秦其志難測且秦婚姻之國不可不救也宐發兵㫁河上流勿使得西愽士祭酒崔浩曰裕圗秦久矣今姚興死子􅇦懦劣國多内難裕乗其危而伐之其志必取若遏其上流裕心忿戾必上岸北侵是我代秦受敵也今柔然宼邊民食又乏若復與裕為敵發兵南赴則北宼愈深救北則南州復危非良計也不若假之水道聽裕西上然後屯兵以塞其東使裕克捷必徳我之假道不捷吾不失救秦之名此策之得者也且南北異俗借使國家棄􅁪山以南裕必不能以吳越之兵與吾争守河北之地安能為吾患乎夫為國計者惟社稷是利豈顧一女子乎議者猶曰裕西入闗則恐吾㫁其後腹背受敵北上則姚氏必不出闗助我其勢必聲西而實北也嗣乃以司徒長孫嵩督山東諸軍事又遣振威將軍娥清冀州刺史阿薄干將步騎十萬屯河北岸庚辰裕引軍入河以左將軍向彌為北青州刺史留戍碻磝初裕命王鎮惡等若克洛陽須大軍到俱進鎮惡等乘利徑趨潼關為秦兵所拒不得前久之乏食衆心疑懼或欲棄輜重還赴大軍沈林子按劒怒曰相公志清六合今許洛已定闗右將平事之濟否繫於前鋒奈何沮乘勝之氣棄垂成之功乎且大軍尚逺賊衆方盛雖欲求還豈可得乎下官授命不顧今日之事當自為將軍辦之未知二三君子將何面以見相公之旗鼔邪鎮惡等遣使馳告裕求遣糧援裕呼使者開舫北戸指河上魏軍以示之曰我語令勿進今輕佻深入岸上如此何由得遣軍鎮惡乃親至􅀪農説諭百姓百姓競送義租軍食復振魏人以數千騎縁河隨裕軍西行軍人於南岸牽百丈風水迅急有漂渡北岸者輒為魏人所殺略裕遣軍擊之裁登岸則走退則復來夏四月裕遣白直隊主丁旿帥仗士七百人車百乘渡北岸去水百餘步為却月陣兩端抱河車置七仗士事畢使竪一白毦魏人不解其意皆未動裕先命寧朔將軍朱超石戒嚴白毦既舉超石帥二千人馳往赴之齎大弩百張一車益二十人設彭排於轅上魏人見營陣既立乃進圍之長孫嵩帥三萬騎助之四靣肉薄攻營弩不能制時超石别齎大鎚及矟千餘張乃㫁矟長三四尺以鎚鎚之一矟輒洞貫三四人魏兵不能當一時犇潰死者相積臨陳斬阿薄干魏人退還畔城超石帥寧朔將軍胡藩寧逺將軍劉榮祖追擊又破之殺獲千計魏王嗣聞之乃恨不用崔浩之言秦魯公紹遣長史姚洽寧朔將軍安鸞䕶軍姚墨蠡河東太守唐小方帥衆三千屯河北之九原阻河為固欲以絶檀道濟糧援沈林子邀擊破之斬洽墨蠡小方殺獲殆盡林子因啓太尉裕曰紹氣蓋關中今兵屈於外國危於内恐其凶命先盡不得以膏齊斧耳紹聞洽等敗死憤恚發病嘔血以兵屬東平公讚而卒讚既代紹衆力猶盛引兵襲林子林子復擊破之太尉裕至洛陽行視城塹嘉毛脩之完葺之功賜衣服玩好直二千萬丁巳魏主嗣如髙栁壬戌還平城河西王䝉遜大赦遣張掖太守沮渠廣宗詐降以誘涼公歆歆發兵應之䝉遜將兵三萬伏於蓼泉歆覺之引兵還䝉遜追之歆與戰於解支澗大破之斬首七千餘級䝉遜城建康置戍而還五月乙未齊郡太守王懿降於魏上書言劉裕在洛宐發兵絶其歸路可不戰而克魏主嗣善之崔浩侍講在前嗣問之曰劉裕伐姚􅇦果能克乎對曰克之嗣曰何故對曰昔姚興好事虛名而少實用子􅇦懦而多病兄弟乖争裕乗其危兵精將勇何故不克嗣曰裕才何如慕容垂對曰勝之垂藉父兄之資修復舊業國人歸之若夜蟲之就火少加倚仗易以立功劉裕奮起寒微不階尺土討滅􅁊􅀇興復晉室北禽慕容超南梟盧循所向無前非其才之過人安能如是乎嗣曰裕既入闗不能進退我以精騎直擣彭城夀春裕將若之何對曰今西有屈丏北有柔然窺伺國隙陛下既不可親御六師雖有精兵未睹良將長孫嵩長於治國短於用兵非劉裕敵也興兵逺攻未見其利不如且安静以待之裕克秦而歸必簒其主關中華戎雜錯風俗勁悍裕欲以荆楊之化施之函秦此無異解衣包火張羅捕虎雖留兵守之人情未洽趨尚不同適足為寇敵之資耳願陛下按兵息民以觀其變秦地終為國家之有可坐而守也嗣笑曰卿料之審矣浩曰臣嘗私論近世將相之臣若王猛之治國苻堅之管仲也慕容恪之輔幼主慕容暐之霍光也劉裕之平禍亂司馬徳宗之曹操也嗣曰屈丏何如浩曰屈丏國破家覆孤孑一身寄食姚氏受其封殖不思醻恩報義而乘時徼利盜有一方結怨四鄰撅豎小人雖能縱暴一時終當為人所吞食耳嗣大恱語至夜半賜浩御縹醪十觚水精鹽一兩曰朕味卿言如此鹽酒故欲與卿共饗其美然猶命長孫嵩叔孫建各簡精兵伺裕西過自成臯濟河南侵彭沛若不時過則引兵隨之魏主嗣西巡至雲中遂濟河畋于大漠魏置天地四方六部大人以諸公為之秋七月大尉裕至陜沈田子傅􅀪之入武關秦戍將皆委城走田子等進屯青泥秦主􅇦使給事黄門侍郎姚和都屯嶢桞以拒之西秦相國翟勍卒八月以尚書令曇達為左丞相左僕射元基為右丞相御史大夫麴景爲尚書令侍中翟紹為左僕射太尉裕至閺鄉沈田子等將攻嶢栁秦主􅇦欲自將以禦裕軍恐田子等襲其後欲先擊滅田子等然後傾國東出乃帥步騎數萬奄至青泥田子本為疑兵所領裁千餘人聞􅇦至欲擊之傅􅀪之以衆寡不敵止之田子曰兵貴用竒不必在衆且今衆寡相懸勢不兩立若彼結圍既固則我無所逃矣不如乗其始至營陳未立先薄之可以有功遂帥所領先進􅀪之繼之秦兵合圍數重田子撫慰士卒曰諸君冒險逺來正求今日之戰死生一决封矦之業於此在矣士卒皆踊躍鼔譟執短兵奮擊秦兵大敗斬馘萬餘級得其乘輿服御物秦主􅇦犇還灞上初裕以田子等衆少遣沈林子將兵自秦嶺往助之至則秦兵已敗乃相與追之關中郡縣多潛送􅅃於田子辛丑太尉裕至潼闗以朱超石為河東太守使與振武將軍徐猗之㑹薛帛於河北共攻蒲阪秦平原公璞與姚和都共擊之猗之敗死超石犇還潼關東平公讚遣司馬國璠引魏兵以躡裕後王鎮惡請帥水軍自河入渭以趨長安裕許之秦恢武將軍姚難自香城引兵而西鎮惡追之秦主􅇦自灞上引兵還屯石橋以為之援鎮北將軍姚彊與難合兵屯涇上以拒鎮惡鎮惡使毛徳祖進擊破之彊死難犇長安東平公讚退屯鄭城太尉裕進軍逼之􅇦使姚丕守渭橋胡翼度屯石積東平公讚屯灞東􅇦屯逍遙園鎮惡沂渭而上乘䝉衝小艦行船者皆在艦内秦人見艦進而無行船者皆驚以為神壬戌旦鎮惡至渭橋令軍士食畢皆持仗登岸後登者斬衆既登渭水迅急艦皆隨流倐忽不知所在時􅇦所將尚數萬人鎮惡諭士卒曰吾屬竝家在江南此為長安北門去家萬里舟楫衣糧皆已隨流今進戰而勝則功名俱顯不勝則骸骨不返無它歧矣卿等勉之乃身先士卒衆騰踊爭進大破姚丕於渭橋􅇦引兵救之為丕敗卒所蹂踐不戰而潰姚諶等皆死􅇦單馬還宫鎮惡入自平朔門􅇦與姚裕等數百騎逃犇石橋東平公讚聞􅇦敗引兵赴之衆皆潰去胡翼度降於太尉裕􅇦將出降其子佛念年十一言於􅇦曰晉人將逞其欲雖降必不免不如引決􅇦憮然不應佛念登宫牆自投而死癸亥􅇦將妻子羣臣詣鎮惡壘門請降鎮惡以屬吏城中夷晉六萬餘戸鎮惡以國恩撫慰號令嚴肅百姓安堵九月太尉裕至長安鎮惡迎於灞上裕勞之曰成吾霸業者卿也鎮惡再拜謝曰明公之威諸將之力鎮惡何功之有裕笑曰卿欲學馮異耶鎮惡性貪秦府庫盈積鎭惡盜取不可勝紀裕以其功大不問或譛諸裕曰鎮惡藏姚􅇦偽輦將有異志裕使人覘之鎮惡剔取其金銀棄輦於垣側裕意乃安裕收秦彞器渾儀土圭記里鼓指南車送詣建康其餘金玉繒帛珍寳皆以頒賜將士秦平原公璞并州刺史尹昭以蒲阪降東平公讚帥宗族百餘人詣裕降􅁉皆殺之送姚􅇦至建康斬於市裕以薛辯為平陽太守使鎮捍北道裕議遷都洛陽諮議參軍王仲徳曰非常之事固非常人所及必致駭動今暴師日久士卒思歸遷都之計未可議也裕乃止羌衆十餘萬口西犇隴上沈林子追擊至槐里俘虜萬計河西王䝉遜聞太尉裕滅秦怒甚門下校郎劉祥入言事䝉遜曰汝聞劉裕入闗敢研研然也遂斬之初夏王勃勃聞太尉裕伐秦謂羣臣曰姚􅇦非裕敵也且其兄弟内叛安能拒人裕取關中必矣然裕不能久留必將南歸留子弟及諸將守之吾取之如拾芥耳乃秣馬礪兵訓養士卒進據安定秦嶺北郡縣鎭戍皆降之裕遣使遺勃勃書約為兄弟勃勃使中書侍􅀰皇甫徽為報書而隂誦之對裕使者口授舎人使書之裕讀其文歎曰吾不如也廣州刺史謝欣卒東海人徐道期聚衆攻陷州城進攻始興始興相彭城劉謙之討誅之詔以謙之為廣州刺史癸酉司馬休之司馬文思司馬國璠司馬道賜魯軌韓延之刁雍王慧龍及􅁊温之孫道度道子族人􅁊謐􅁊璲陳郡袁式等皆詣魏長孫嵩降秦匈奴鎮將姚成都及弟和都舉鎮降魏魏主嗣詔民間得姚氏子弟送平城者賞之冬十月己酉嗣召長孫嵩等還司馬休之尋卒於魏魏賜國璠爵淮南公道賜爵池陽子魯軌爵㐮陽公刁雍表求南鄙自效嗣以雍為建義將軍雍聚衆於河濟之間擾動徐兖太尉裕遣兵討之不克雍進屯固山衆至二萬詔進宋公爵為王增封十郡辭不受西秦王熾磐遣左丞相曇達等擊秦故將姚艾艾遣使稱藩熾磐以艾為征東大將軍秦州牧徴王松夀為尚書左僕射十一月魏叔孫建等討西山丁零翟蜀洛支等平之辛未劉穆之卒太尉裕聞之驚慟哀惋者累日始裕欲留長安經略西北而諸將佐皆久役思歸多不欲留㑹穆之卒裕以根本無託遂決意東還穆之之卒也朝廷恇懼欲發詔以太尉左司馬徐羨之代之中軍諮議參軍張邵曰今誠急病任終在徐然世子無專命宐須諮之裕欲以王􅀪代穆之從事中郎謝晦曰休元輕易不若羨之乃以羨之為吏部尚書建威將軍丹楊尹代管留任於是朝廷大事常決於穆之者竝悉北諮裕以次子桂陽公義真為都督雍梁秦三州諸軍事安西將軍領雍東秦二州刺史義真時年十二以太尉諮議參軍京兆王脩爲長史王鎮惡為司馬領馮翊太守沈田子毛徳祖皆為中兵參軍仍以田子領始平太守徳祖領秦州刺史天水太守傅􅀪之為雍州治中從事史先是隴上流戸寓闗中者望因兵威得復本土及置東秦州知裕無復西略之意皆歎息失望闗中人素重王猛裕之克長安王鎮惡功為多由是南人皆忌之沈田子自以嶢栁之捷與鎮惡争功不平裕將還田子及傅􅀪之屢言於裕曰鎮惡家在闗中不可保信裕曰今留卿文武將士精兵萬人彼若欲為不善正足自滅耳勿復多言裕私謂田子曰鍾㑹不得遂其亂者以有衛瓘故也語曰猛獸不如羣狐卿等十餘人何懼王鎮惡臣光曰古人有言疑則勿任任則勿疑裕既委鎮惡以闗中而復與田子有後言是鬬之使為亂也惜乎百年之寇千里之土得之艱難失之造次使豐鄗之都復輸寇手荀子曰兼并易能也堅凝之難信哉三秦父老聞裕將還詣門流涕訴曰殘民不霑王化於今百年始覩衣冠人人相賀長安十陵是公家墳墓咸陽宫殿是公家室宅捨此欲何之乎裕為之愍然慰諭之曰受命朝廷不得擅留誠多諸君懐本之志今以次息與文武賢才共鎮此境勉與之居十二月庚子裕發長安自洛入河開汴渠以歸氐豪徐駭奴齊元子等擁部落三萬在雍遣使請降於魏魏主嗣遣將軍王洛生河内太守楊聲等西行以應之閏月壬申魏主嗣如大甯長川姚􅇦㓕秦雍人千餘家推襄邑令上谷寇讚為主以降於魏魏主嗣拜讚魏郡太守久之秦雍人流入魏之河南滎陽河内者戸以萬數嗣乃置南雍州以讚為刺史封河南公治洛陽立雍州郡縣以撫之讚善於招懐流民歸之者三倍其初夏王勃勃聞太尉裕東還大喜問於王買徳曰朕欲取關中卿試言其方略買徳曰關中形勝之地而裕以㓜子守之狼狽而歸正欲急成簒事耳不暇復以中原為意此天以關中賜我不可失也青泥上洛南北之險要宐先遣遊軍㫁之東塞潼關絶其水陸之路然後傳檄三輔施以威徳則義真在網罟之中不足取也勃勃乃以其子撫軍大將軍璝都督前鋒諸軍事帥騎二萬向長安前將軍昌屯潼闗以買徳為撫軍右長史屯青泥勃勃將大軍為後繼是歳魏都坐大官章安矦封懿卒十四年春正月丁酉朔魏主嗣至平城命䕶髙車中郎將薛繁帥髙車丁零北略至弱水而還卒已大赦夏赫連璝至渭關中民降之者屬路龍驤將軍沈田子將兵拒之畏其衆盛退屯劉迴堡遣使還報王鎮惡鎮惡謂王脩曰公以十歳兒付吾屬當共思竭力而擁兵不進虜何由得平使者還以告田子田子與鎮惡素有相圗之志由是益忿懼未㡬鎮惡與田子俱出北地以拒夏兵軍中訛言鎮惡欲盡殺南人以數十人送義眞南還因據闗中反辛亥田子請鎮惡至傅􅀪之營計事田子求屏人語使其宗人沈敬仁斬之幕下矯稱受太尉令誅之􅀪之犇告劉義真義真與王脩被甲登横門以察其變俄而田子帥數十人來至言鎮惡反脩執田子數以專戮斬之以冠軍將軍毛脩之代鎮惡為安西司馬傅􅀪之大破赫連璝於池陽又破之於寡婦渡斬獲甚衆夏兵乃退壬戌太尉裕至彭城解嚴琅邪王徳文先歸建康裕聞王鎮惡死表言沈田子忽發狂易奄害忠勲追贈鎮惡左將軍青州刺史以彭城內史劉遵考爲并州剌史領河東太守鎭蒲阪徴荆州刺史劉道憐為徐兖二州刺史裕欲以世子義符鎮荆州以徐州刺史劉義隆為司州刺史鎮洛陽中軍諮議張邵諫曰儲貳之重四海所繫不宐處外乃更以義隆為都督荆益寧雍梁秦六州諸軍事西中郎將荆州刺史以南郡太守到彦之為南蠻校尉張邵為司馬領南郡相冠軍功曹王曇首為長史北徐州從事王華為西中郎主簿沈林子為西中郎參軍義隆尚㓜府事皆決於邵曇首􅀪之弟也裕謂義隆曰王曇首沈毅有器度宰相才也汝每事諮之以南郡公劉義慶為豫州刺史義慶道憐之子也裕解司州領徐冀二州刺史秦王熾磐以乞伏木弈干為沙州刺史鎮樂都二月乙弗烏地延帥戸二萬降秦三月遣使聘魏夏四月己巳魏徙冀定幽三州徒河於代都初和龍有赤氣四塞蔽日自寅至申燕太史令張穆言於燕王跋曰此兵氣也今魏方彊盛而執其使者好命不通臣竊懼焉跋曰吾方思之五月魏主嗣東巡至濡源及甘松遣征東將軍長孫道生安東將軍李先給事黄門侍郎奚觀帥精騎二萬襲燕又命驍騎將軍延普幽州刺史尉諾自幽州引兵趨遼西爲之聲勢嗣屯突門嶺以待之道生等拔乙連城進攻和龍與燕單于右輔古泥戰破之殺其將皇甫軌燕王跋嬰城自守魏人攻之不克掠其民萬餘家而還六月太尉裕始受相國宋公九錫之命赦國中殊死以下崇繼母蘭陵蕭氏爲太妃以太尉軍諮祭酒孔靖為宋國尚書令左長史王􅀪為僕射領選從事中郎傅亮蔡廓皆為侍中謝晦為右衛將軍右長史鄭鮮之為奉常行參軍殷景仁為祕書郎其餘百官悉依天朝之制靖辭不受亮咸之孫廓謨之曾孫鮮之渾之􅀇孫景仁融之曾孫也景仁學不為文敏有思致口不談義深達理體至於國典朝儀舊章記注莫不撰録識者知其有當世之志魏天部大人白馬文貞公崔宏疾篤魏主嗣遣侍臣問病一夜數返及卒詔羣臣及附國渠帥皆㑹葬秋七月戊午魏主嗣至平城九月甲寅魏人命諸州調民租戸五十石積於定相冀三州河西王䝉遜復引兵伐涼涼公歆將拒之左長史張體順固諫乃止䝉遜芟其秋稼而還歆遣使來告襲位冬十月以歆為都督七郡諸軍事鎮西大將軍酒泉公姚艾叛秦降河西王䝉遜䝉遜引兵迎之艾叔父儁言於衆曰秦王寛仁有雅度自可安居事之何為從河西王西遷衆咸以為然乃相與逐艾推儁為主復歸於秦秦王熾磐徴儁為侍中中書監征南將軍賜爵隴西公以左丞相曇達為都督洮罕以東諸軍事征東大將軍秦州牧鎮南安劉義眞年少賜與左右無節王脩每裁抑之左右皆怨譛脩於義眞曰王鎮惡欲反故沈田子殺之脩殺田子是亦欲反也義眞信之使左右劉乞等殺脩脩既死人情離駭莫相統壹義眞悉召外軍入長安閉門拒守闗中郡縣悉降於夏赫連璝夜襲長安不克夏王勃勃進據咸陽長安樵采路絶宋公裕聞之使輔國將軍蒯恩如長安召義真東歸以相國右司馬朱齡石為都督闗中諸軍事右將軍雍州刺史代鎮長安裕謂齡石曰卿至可敕義真輕裝速發既出闗然可徐行若闗右必不可守可與義真俱歸又命中書侍郎朱超石慰勞河洛十一月齡石至長安義真將士貪縱大掠而東多載寳貨子女方軌徐行雍州别駕韋華犇夏赫連璝帥衆三萬追義真建威將軍傅􅀪之曰公處分亟進今多將輜重一日行不過十里虜追騎且至何以待之宜棄車輕行乃可以免義真不從俄而夏兵大至傅􅀪之蒯恩㫁後力戰連日至青泥晉兵大敗􅀪之恩皆爲王買徳所禽司馬毛脩之與義真相失亦爲夏兵所禽義真行在前㑹日暮夏兵不窮追故得免左右盡散獨逃草中中兵參軍段宏單騎追尋縁道呼之義真識其聲出就之曰君非段中兵邪身在此行矣必不兩全可刎身頭以南使家公望絶宏泣曰死生共之下官不忍乃束義真於背單馬而歸義真謂宏曰今日之事誠無算略然丈夫不經此何以知艱難夏王勃勃欲降傅􅀪之􅀪之不屈時天寒勃勃裸之􅀪之叫罵而死勃勃積人頭爲京觀號曰髑髏臺長安百姓逐朱齡石齡石焚其宫殿犇潼關勃勃入長安大饗將士舉觴謂王買徳曰卿往日之言一朞而驗可謂筭無遺策此觴所集非卿而誰以買徳為都官尚書封河陽侯龍驤將軍王敬先戍曹公壘齡石往從之朱超石至蒲阪聞齡石所在亦往從之赫連昌攻敬先壘㫁其水道衆渴不能戰城且陷齡石謂超石曰弟兄俱死異城使老親何以為心爾求間道亡歸我死此無恨矣超石持兄泣曰人誰不死寧忍今日辭兄去乎遂與敬先及右軍參軍劉欽之皆被執送長安勃勃殺之欽之弟秀之悲泣不歡燕者十年欽之穆之之従兄子也宋公裕聞青泥敗未知義真存亡怒甚刻日北伐侍中謝晦諫以士卒疲弊請俟它年不從鄭鮮之上表以爲虜聞殿下親征必併力守潼闗徑往攻之恐未易可克若輿駕􅉐洛則不足上勞聖躬且虜雖得志不敢乗勝過陜者猶攝服大威為將來之慮故也若造洛而返虜必更有揣量之心或益生邊患况大軍逺出後患甚多昔歳西征劉鍾狼狽去年北討廣州傾覆既往之效後來之鑒也今諸州大水民食寡乏三呉羣盜攻没諸縣皆由困於征役故也江南士庶引領顒顒以望殿下之返斾聞更北出不測淺深之謀往還之期臣恐返顧之憂更在腹心也若慮西虜更為河洛之患者宐結好北虜北虜親則河南安河南安則濟泗静矣㑹得段宏啓知義真得免裕乃止但登城北望慨然流涕而已降義真為建威將軍司州刺史以段宏為宋臺黄門郎領太子右衛率裕以天水太守毛徳祖為河東太守代劉遵考守蒲阪夏王勃勃築壇於灞上即皇帝位改元昌武西秦王熾磐東巡十二月徙上邽民五千餘户于枹罕彗星出天津入太㣲經北斗絡紫㣲八十餘日而滅魏主嗣復召諸儒術士問之曰今四海分裂災咎之應果在何國朕甚畏之卿輩盡言勿有所隱衆推崔浩使對浩曰夫災異之興皆象人事人茍無舋又何畏焉昔王莽將簒漢彗星出入正與今同國家主尊臣卑民無異望晉室陵夷危亡不逺彗之為異其劉裕將簒之應乎衆無以易其言宋公裕以䜟云昌明之後尚有二帝乃使中書侍郎王韶之與帝左右密謀酖帝而立琅邪王徳文徳文常在帝左右飲食寢處未嘗暫離韶之伺之經時不得間㑹徳文有疾出居於外戊寅韶之以散衣縊帝於東堂韶之廙之曾孫也裕因稱遺詔奉徳文即皇帝位大赦是歳河西王䝉遜奉表稱藩拜涼州刺史尚書右僕射袁湛卒恭皇帝元熈元年春正月壬辰朔改元立琅邪王妃褚氏為皇后后裒之曾孫也魏主嗣畋于犢渚甲午徴宋公裕入朝進爵為王裕辭癸夘魏主嗣還平城庚申葬安皇帝于休平陵敕劉道憐司空出鎮京口夏將叱奴矦提帥步騎二萬攻毛徳祖於蒲阪徳祖不能禦全軍歸彭城二月宋公裕以徳祖為滎陽太守戍虎牢􅊨夏主勃勃徴隠士京兆韋祖思祖思既至恭懼過甚勃勃怒曰我以國士徴汝汝乃以非類遇我汝昔不拜姚興今何獨拜我我在汝猶不以我為帝王我死汝曹弄筆當置我於何地邪遂殺之羣臣請都長安勃勃曰朕豈不知長安歷世帝王之都沃饒險固然晉人僻逺終不能為吾患魏與我風俗略同土壤鄰接自統萬距魏境裁百餘里朕在長安統萬必危若在統萬魏必不敢濟河而西諸卿適未見此耳皆曰非所及也乃於長安置南臺以赫連璝領大將軍雍州牧録南臺尚書事勃勃還統萬大赦改元真興勃勃性驕虐視民如草芥常居城上置弓劒於側有所嫌忿手自殺之羣臣迕視者鑿其目笑者決其脣諌者先截其舌而後斬之初司馬楚之奉其父榮期之喪歸建康㑹宋公裕誅翦宗室之有才望者楚之叔父宣期兄貞之皆死楚之亡匿竟陵蠻中及從祖休之自江陵犇秦楚之亡之汝潁間聚衆以謀復讎楚之少有英氣能折節下士有衆萬餘屯據長社裕使刺客沐謙往刺之楚之待謙甚厚謙欲發未得間乃夜稱疾知楚之必往問疾因欲刺之楚之果自齎湯藥往視疾情意勤篤謙不忍發乃出匕首於席下以狀告之曰將軍深為劉裕所忌願勿輕率以自保全遂委身事之為之防衛王鎮惡之死也沈田子殺其兄弟七人唯弟康得免逃就宋公裕於彭城裕以為相國行參軍康求還洛陽視母㑹長安不守康糾合闗中徙民得百許人驅帥僑戸七百餘家共保金墉城時宗室多逃亡在河南有司馬文榮者帥乞活千餘戸屯金墉城南又有司馬道恭自東垣帥三千人屯城西司馬順明帥五千人屯陵雲臺司馬楚之屯柏谷塢魏河内鎮將于栗磾遊騎在芒山上攻逼交至康堅守六旬裕以康為河東太守遣兵救之平等皆散走康勸課農桑百姓甚親賴之司馬順明司馬道恭及平陽太守薛辯皆降於魏魏以辯為河東太守以拒夏人夏四月秦征西將軍孔子帥騎五千討吐谷渾覔地於弱水南大破之覔地帥其衆六千降於夏拜弱水䕶軍庚辰魏主嗣有事于東廟助祭者數百國辛巳南巡至鴈門五月庚寅朔魏主嗣觀漁於灅水己亥還平城涼公歆用刑過嚴又好治宫室從事中郎張顯上疏以爲涼土三分勢不支久兼并之本在於務農懐逺之略莫如寛簡今入歳已來隂陽失序風雨乖和是宐減膳撤懸側身修道而更繁刑峻灋繕築不止殆非所以致興隆也昔文王以百里而興二世以四海而滅前車之軌得失昭然太祖以神聖之姿爲西夏所推左取酒泉右開西域殿下不能奉承遺志混壹涼土侔蹤張后將何以下見先王乎沮渠䝉遜胡夷之傑内脩政事外禮英賢攻戰之際身先士卒百姓懐之樂為之用臣謂殿下非但不能平殄䝉遜亦懼䝉遜方為社稷之憂歆覽之不悦主簿汜稱上疏諫曰天之子愛人主殷勤至矣故政之不脩下災異以戒告之改者雖危必昌不改者雖安必亡元年三月癸夘敦煌謙徳堂陷八月效糓地裂二年元日昏霧四塞四月日赤無光二旬乃復十一月狐上南門今茲春夏地頻五震六月隕星于建康臣雖學不稽古行年五十有九請為殿下略言耳目之所聞見不復能逺論書傳之事也乃者咸安之初西平地裂狐入謙光殿前俄而秦師奄至都城不守梁熈旣為涼州不撫百姓專為聚歛建元十九年姑臧南門崩隕石於閑豫堂明年為吕光所殺段業稱制此方三年之中地震五十餘所既而先王龍興於瓜州䝉遜簒弑於張掖此皆目前之成事殿下所明知也效穀先王鴻漸之地謙徳即尊之室基陷地裂大凶之徴也日者太陽之精中國之象赤而無光中國將衰諺曰野獸入家主人將去狐上南門亦變異之大者也今蠻夷益盛中國益㣲願殿下亟罷宫室之役止逰畋之娛延禮英俊愛養百姓以應天變防未然歆不從秋七月宋公裕始受進爵之命八月移鎮夀陽以度支尚書劉懐慎為督淮北諸軍事徐州刺史鎮彭城辛未魏主嗣東巡甲申還平城九月宋王裕自解楊州牧秦左衛將軍匹達等將兵討彭利和于漒川大破之利和單騎犇仇池獲其妻子徙羌豪三千戸于枹罕漒川羌三萬餘户皆安堵如故冬十月以尚書右僕射王松夀為益州刺史鎮漒川宋王裕以河南蕭條乙酉徙司州刺史義真為揚州刺史鎮石頭蕭太妃謂裕曰道憐汝布衣兄弟宐用為楊州裕曰寄奴於道憐豈有所惜楊州根本所寄事務至多非道憐所了太妃曰道憐年出五十豈不如汝十歳兒邪裕曰義真雖為刺史事無大小悉由寄奴道憐年長不親其事於聽望不足太妃乃無言道憐性愚鄙而貪縱故裕不肯用十一月丁亥朔日有食之十二月癸亥魏主嗣西巡至雲中從君子津西渡河大獵於薛林山辛夘宋王裕加殊禮進王太妃為太后世子為太子資治通鑑卷第一百一十八
