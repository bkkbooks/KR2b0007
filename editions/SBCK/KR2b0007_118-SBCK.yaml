front:
  text: 空虚公亟引輕兵襲之必克恢不從南攻郿城鎮西將軍姚諶為恢所敗長安大震􅇦馳使徴東平公紹遣姚裕及輔國將軍胡翼度屯灃西扶風太守姚儁等皆降於恢東平公紹引諸軍西還與恢相持於靈臺姚讚留寧朔將軍尹雅為􅀪農太守守潼關亦引兵還恢衆見諸軍四集皆有懼心其將齊黄等詣大軍降恢進兵逼紹讚自後擊之恢兵大敗殺恢及其三弟􅇦哭之慟葬以公禮太尉裕引水軍發彭城留其子彭城公義隆鎮彭城詔以義隆為監徐兖青冀四州諸軍事徐州刺史涼公暠寢疾遺命長史宋繇曰吾死之後世子猶卿子也善訓導之二月暠卒官屬奉世子歆為大都督大將軍涼公領涼州牧大赦改元嘉興尊歆母天水尹氏為太后以宋繇錄三府事諡暠曰武昭王廟號太祖
