seq: 47
front:
  text: 威四者或興則下有怨心吾詔書數下冠蓋接道而吏不加治民或失職其咎安在勉思舊令稱朕意焉北匈奴大人車利涿兵等亡來入塞凡七十三輩時北虜衰耗黨衆離畔南部攻其前丁零寇其後鮮卑擊其左西域侵其右不復自立乃逺引而去南單于長死單于汗之子宣立為伊屠於閭鞮單于
  hash: sha256:09cb7b939bbb16b5389a07c98d5ed7cbc38789a04261fcf6cc0e6ff52e3c5cbe
body:
  text: 太初曆施行百有餘年曆稍後天上命治曆編訢李􅆊等綜校其狀作四分厯二月甲寅始施行之帝之為太子也受尚書於東郡太守汝南張酺丙辰帝東廵幸東郡引酺及門生并郡縣掾史並會庭中帝先備弟子之儀使酺講尚書一篇然後脩君臣之禮賞賜殊特莫不沾洽行過任城幸鄭均舍賜尚書祿以終其身時人號為白衣尚書乙丑帝耕於定陶辛未幸㤗山柴告岱宗進幸奉髙壬申宗祀五帝于汶上明堂丙子赦天下戊寅進幸濟南三月己丑幸魯庚寅祠孔子於闕里及七十二弟子作六代之樂大會孔氏男子二十以上者六十二人帝謂孔僖曰今日之會寧於卿宗有光榮乎對曰臣聞明王聖主莫不尊師貴道今陛下親屈萬乗辱臨敝里此乃崇禮先師增煇聖德至於光榮非所敢承帝大笑曰非聖者子孫焉有斯言乎拜僖郎中壬辰帝幸東平追念獻王謂其諸子曰思其人至其鄉其處在其人亡因泣下沾襟遂幸獻王陵祠以太牢親拜祠坐哭泣盡哀獻王之歸國也驃騎府吏丁牧周栩以王愛賢下士不忍去之遂為王家大夫數十年事祖及孫帝聞之皆引見既愍其淹滯且欲􅀭獻王德美即皆擢為議郎乙未幸東阿北登太行山至天井􅀜夏四月乙卯還宫庚申假于祖禰五月徙江陵王恭為六安王秋七月庚子詔曰春秋重三正慎三微其定律無以十一月十二月報囚止用冬初十月而已冬南單于遣兵與北虜温禺犢王戰於涿邪山斬獲而還武威太守孟雲上言北虜以前既和親而南部復往抄掠北單于謂漢欺之謀欲犯塞謂宜還南所掠生口以慰安其意詔百官議於朝堂太尉鄭􅀪司空第五倫等以為不可許司徒桓虞及太僕袁安等以為當與之􅀪因大言激厲虞曰諸言當還生口者皆為不忠虞廷叱之倫及大鴻臚韋彪各作色變容司􅀠校尉舉奏􅀪等􅀪等皆上印綬謝詔報曰久議沈滯各有所志蓋事以議從策由衆定誾誾衎衎得禮之容寑嘿抑心更非朝廷之福君何尤而深謝其各冠履帝乃下詔曰江海所以能長百川者以其下之也少加屈下尚何足病況今與匈奴君臣分定辭順約明貢獻累至豈宜違信自受其曲其敕度遼及領中郎將龐奮倍雇南部所得生口以還北虜其南部斬首獲生計功受賞如常科三年春正月丙申帝北廵辛丑耕于懐二月乙丑敇侍御史司空曰方春所過無得有所伐殺車可以引避引避之騑馬可輟解輟解之戊辰進幸中山出長城癸酉還幸元氏三月己卯進幸趙辛卯還宫太尉鄭􅀪數陳侍中竇憲權勢太盛言甚苦切憲疾之會􅀪奏憲黨尚書張林雒陽令楊光在官貪殘書奏吏與光故舊因以告之光報憲憲奏􅀪大臣漏泄密事帝詰讓􅀪夏四月丙寅收􅀪印綬􅀪自詣廷尉詔敇出之因乞骸骨歸未許病篤上書陳謝曰竇憲姦惡貫天達地海内疑惑賢愚疾惡謂憲何術以迷主上近日王氏之禍昞然可見陛下處天子之尊保萬世之祚而信讒佞之臣不計存亡之機臣雖命在晷刻死不忘忠願陛下誅四凶之罪以猒人鬼憤結之望帝省章遣醫視弘病比至已薨以大司農宋由為太尉司空第五倫以老病乞身五月丙子賜策罷以二千石俸終其身倫奉公盡節言事無所依違性質慤少文采在位以貞白稱或問倫曰公有私乎對曰昔人有與吾千里馬者吾雖不受每三公有所選舉心不能忘而亦終不用也若是者豈可謂無私乎以太僕袁安為司空秋八月乙丑帝幸安邑觀鹽池九月還宫燒當羌迷吾復與弟號吾及諸種反號吾先輕入寇隴西界督烽掾李章追之生得號吾將詣郡號吾曰獨殺我無損於羌誠得生歸必悉罷兵不復犯塞隴西太守張紆放遣之羌即為解散各歸故地迷吾退居河北歸義城疏勒王忠從康居王借兵還據損中遣使詐降於班超超知其姦而偽許之忠從輕騎詣超超斬之因擊破其衆南道遂通楚許太后薨詔改葬楚王英追爵諡曰楚厲矦帝以潁川郭躬為廷尉決獄斷刑多依矜恕條諸重文可從輕者四十一奏之事皆施行博士魯國曹襃上疏以為宜定文制著成漢禮太常巢堪以為一世大典非襃所定不可許帝知諸儒拘攣難與圖始朝廷禮憲宜以時立乃拜襃侍中􅀇武司馬班固以為宜廣集諸儒共議得失帝曰諺言作舍道邊三年不成會禮之家名為聚訟互生疑異筆不得下昔堯作大章一䕫足矣章和元年春正月帝召襃授以叔孫通漢儀十二篇曰此制散略多不合經今宜依禮條正使可施行䕶羌校尉傅育欲伐燒當羌為其新降不欲出兵乃募人鬭諸羌胡羌胡不肯遂復叛出塞更依迷吾育請發諸郡兵數萬人共擊羌未及會三月育獨進軍迷吾聞之徙廬落去育遣精騎三千窮追之夜至三兠谷不設備迷吾襲擊大破之殺育及吏士八百八十人及諸郡兵到羌遂引去詔以隴西太守張紆為校尉將萬人屯臨羌夏六月戊辰司徒􅁊虞免癸卯以司空袁安為司徒光禄勲任隗為司空隗光之子也齊王晃及弟利矦剛與母太姬更相誣告秋七月癸卯詔貶晃爵為蕪湖矦削剛戸三千收太姬璽綬壬子淮陽頃王昞薨鮮卑入左地擊北匈奴大破之斬優留單于而還羌豪迷吾復與諸種寇金城塞張紆遣從事河内司馬防與戰於木乗谷迷吾兵敗走因譯使欲降紆納之迷吾將人衆詣臨羌紆設兵大會施毒酒中伏兵殺其酋豪八百餘人斬迷吾頭以祭􅀓育冢復放兵擊其餘衆斬獲數千人迷吾子迷唐與諸種解仇結㛰交質據大小榆谷以叛種衆熾盛張紆不能制壬戌詔以瑞物仍集改元章和是時京師四方屢有嘉瑞前後數百千言事者咸以為美而太尉掾平陵何敞獨惡之謂宋由袁安曰夫瑞應依德而至災異緣政而生今異鳥翔於殿屋怪草生於庭際不可不察由安懼不敢荅八月癸酉帝南廵戊子幸梁乙未晦幸沛日有食之九月庚子帝幸彭城辛亥幸壽春復封阜陵矦延為阜陵王己未幸汝陰冬十月丙子還宫北匈奴大亂屈蘭儲等五十八部口二十八萬詣雲中五原朔方北地降曹襃依凖舊典雜以五經䜟記之文撰次天子至於庶人冠㛰吉凶終始制度凡百五十篇奏之帝以衆論難一故但納之不復令有司平奏是歲班超發于窴諸國兵共二萬五千人擊莎車龜兹王發温宿姑墨尉頭兵合五萬人救之超召將校及于窴王議曰今兵少不敵其計莫若各散去于窴從是而東長史亦於此西歸可須夜鼓聲而發隂緩所得生口􅀛兹王聞之大喜自以萬騎於西界遮超温宿王將八千騎於東界徼于窴超知二虜已出宻召諸部勒兵雞鳴馳赴莎車營胡大驚亂犇走追斬五千餘級莎車遂降􅀛兹等因各退散自是威震西域二年春正月濟南王康阜陵王延中山王焉來朝上性寛仁篤於親親故叔父濟南中山二王每數入朝特加恩寵及諸昆弟並留京師不遣就國又賞賜羣臣過於制度倉帑爲虚何敞奏記宋由曰比年水旱民不收穫涼州縁邊家被凶害中州内郡公私屈竭此實損膳節用之時國恩覆載賞賚過度但聞臘賜自郎官以上公卿王矦以下至於空竭帑藏損耗國資尋公家之用皆百姓之力明君賜賚冝有品制忠臣受賞亦應有度是以夏禹玄圭周公束帛今明公位尊任重責深負大上當匡正綱紀下當濟安元元豈但空空無違而已哉冝先正已以率羣下還所得賜因陳得失奏王矦就國除苑囿之禁節省浮費賑䘏窮孤則恩澤下暢黎庶悦豫矣由不能用尚書南陽宋意上疏曰陛下至孝烝烝恩愛隆深禮寵諸王同之家人車入殿門即席不拜分甘損膳賞賜優渥康焉幸以支庶享食大國陛下恩寵踰制禮敬過度春秋之義諸父昆弟無所不臣所以尊尊卑卑彊幹弱枝者也陛下德業隆盛當爲萬丗典灋不冝以私恩損上下之序失君臣之正又西平王羨等六王皆妻子成家官屬備具當早就蕃國為子孫基阯而室第相望久磐京邑驕奢僣擬寵祿隆過冝割情不忍以義斷恩發遣康焉各歸蕃國令羨等速就便時以塞衆望帝未及遣壬辰帝崩於章德前殿年三十一遺詔無起寑廟一如先帝灋制范曄論曰魏文帝稱明帝察察章帝長者章帝素知人厭明帝苛切事從寛厚奉承明德太后盡心孝道平傜簡賦而民賴其慶又體之以忠恕文之以禮樂謂之長者不亦宜乎太子即位年十歲尊皇后曰皇太后三月丁酉用遺詔徙西平王羨為陳王六安王恭為彭城王癸卯葬孝章皇帝于敬陵南單于宣死單于長之弟屯屠何立為休蘭尸逐矦鞮單于太后臨朝竇憲以侍中内幹機密出宣誥命弟篤為虎賁中郎將篤弟景瓌並為中常侍兄弟皆在親要之地憲客崔駰以書戒憲曰傳曰生而冨者驕生而貴者慠生冨貴而能不驕慠者未之有也今寵祿初隆百僚觀行豈可不庶幾夙夜以永衆譽乎昔馮野王以外戚居位稱為賢臣近陰衞尉克己復禮終受多福外戚所以獲譏於時垂愆於後者蓋在滿而不挹位有餘而仁不足也漢興以後迄于哀平外家二十保族全身四人而已書曰鑒于有殷可不慎哉庚戌皇太后詔以故太尉鄧彪為太傅賜爵闗内矦錄尚書事百官緫己以聽竇憲以彪有義讓先帝所敬而仁厚委隨故尊崇之其所施為輒外令彪奏内白大后事無不從彪在位修身而已不能有所匡正憲性果急睚眦之怨莫不報復永平時謁者韓紆考劾憲父勲獄憲遂令客斬䊸子以首祭勲冢癸亥陳王羨彭城王恭樂成王黨下邳王衍梁王暢始就國夏四月戊寅以遺詔罷郡國鹽鐵之禁縱民煑鑄五月京師旱北匈奴饑亂降南部者歲數千人秋七月南單于上言冝及北虜分争出兵討伐破北成南并為一國令漢家長無北念臣等生長漢地開口仰食歲時賞賜動輒億萬雖垂拱安枕慙無報效之義願發國中及諸部故胡新降精兵分道並出期十二月同會虜地臣兵衆單少不足以防内外願遣執金吾耿秉度遼將軍鄧鴻及西河雲中五原朔方上郡太守并力而北冀因聖帝威神一舉平定臣國成敗要在今年已敕諸部嚴兵馬唯裁哀省察太后以示耿秉秉上言昔武帝單極天下欲臣虜匈奴未遇天時事遂無成今幸遭天授北虜分争以夷伐夷國家之利宜可聽許秉因自陳受恩分當出命效用太后議欲從之尚書宋意上書曰夫戎狄簡賤禮義無有上下彊者為雄弱即屈服自漢興以來征伐數矣其所克獲曾不補害光武皇帝躬服金革之難深昭天地之明故因其來降羈縻畜養邊民得生勞役休息於兹四十餘年矣今鮮卑奉順斬獲萬數中國坐享大功而百姓不知其勞漢興功烈於斯為盛所以然者夷虜相攻無損漢兵者也臣察鮮卑侵伐匈奴正是利其抄掠及歸功聖朝實由貪得重賞今若聽南虜還都北庭則不得不禁制鮮卑鮮卑外失暴掠之願内無功勞之賞豺狼貪婪必為邊患今北虜西遁請求和親宜因其歸附以為外扞巍巍之業無以過此若引兵費賦以順南虜則坐失上略去安即危矣誠不可許會齊殤王子都鄉矦暢來弔國憂太后數召見之竇憲懼暢分宫省之權遣客刺殺暢於屯衞之中而歸罪於暢弟利矦剛乃使侍御史與青州刺史雜考剛等尚書潁川韓稜以為賊在京師不冝捨近問逺恐為姦臣所笑太后怒以切責稜稜固執其議何敞説宋由曰暢宗室肺府茅土藩臣來弔大憂上書須報親在武衞致此殘酷奉憲之吏莫適討捕蹤跡不顯主名不立敞備數股肱職典賊曹欲親至發所以糾其變而二府執事以為故事三公不與賊盜公縱姦慝莫以為咎敞請獨奏案之由乃許焉二府聞敞行皆遣主者隨之於是推舉具得事實太后怒閉憲於内宫憲懼誅因自求擊匈奴以贖死冬十月乙亥以憲為車騎將軍伐北匈奴以執金吾耿秉為副發北軍五校黎陽雍營縁邊十二郡騎士及羌胡兵出塞公卿舉故張掖太守鄧訓代張紆為䕶羌校尉迷唐率兵萬騎來至塞下未敢攻訓先欲脅小月氏胡訓擁衞小月氏胡令不得戰議者咸以羌胡相攻縣官之利不宜禁䕶訓曰張紆失信衆羌大動涼州吏民命縣絲髪原諸胡所以難得意者皆恩信不厚耳今因其廹急以德懐之庶能有用遂令開城及所居園門悉驅羣胡妻子内之嚴兵守衞羌掠無所得又不敢逼諸胡因即解去由是湟中諸胡皆言漢家常欲鬭我曹今鄧使君待我以恩信開門内我妻子乃是得父母也咸歡喜叩頭曰唯使君所命訓遂撫養教諭小大莫不感悦於是賞賂諸羌種使相招誘迷唐叔父號吾將其種人八百戸來降訓因發湟中秦胡羌兵四千人出塞掩擊迷唐於寫谷破之迷唐乃去大小榆居頗巖谷衆悉離散漢孝和皇帝上永元元年春迷唐欲復歸故地鄧訓發湟中六千人令長史任尚將之縫革爲船置於箄上以度河掩擊迷唐大破之斬首前後一千八百餘級獲生口二千人馬牛羊三萬餘頭一種殆盡迷唐收其餘衆西徙千餘里諸附落小種皆畔之燒當豪帥東號稽顙歸死餘皆􅅃塞納質於是訓綏接歸附威信大行遂罷屯兵各令歸郡唯置㢮刑徒二千餘人分以屯田修理塢壁而已竇憲將征匈奴三公九卿詣朝堂上書諫以爲匈奴不犯邊塞而無故勞師逺渉損費國用徼功萬里非社稷之計書連上輒寑宋由懼遂不敢復署議而諸卿稍自引止唯袁安任隗守正不移至免冠朝堂固争前後且十上衆皆為之危懼安隗正色自若侍御史魯㳟上疏曰國家新遭大憂陛下方在諒隂百姓闕然三時不聞警蹕之音莫不懐思皇皇若有求而不得今乃以盛春之月興發軍役擾動天下以事戎夷誠非所以垂恩中國改元正時由内及外也萬民者天之所生天愛其所生猶父母愛其子一物有不得其所者則天氣為之舛錯况於人乎故愛民者必有天報夫戎狄者四方之異氣也與鳥獸無别若雜居中國則錯亂天氣汙辱善人是以聖王之制羈縻不絶而已今匈奴為鮮卑所破逺藏於史矦河西去塞數千里而欲乗其虚耗利其㣲弱是非義之所出也今始徵發而大司農調度不足上下相廹民間之急亦已甚矣羣僚百姓咸曰不可陛下獨奈何以一人之計棄萬人之命不䘏其言乎上觀天心下察人志足以知事之得失臣恐中國不為中國豈徒匈奴而已哉尚書令韓稜騎都尉朱暉議郎京兆樂恢皆上疏諫太后不聽又詔使者為憲弟篤景並起邸第勞役百姓侍御史何敞上疏曰臣聞匈奴之為桀逆久矣平城之圍慢書之恥此二辱者臣子所謂捐軀而必死髙祖吕后忍怒還忿舍而不誅今匈奴無逆節之罪漢朝無可慙之恥而盛春東作興動大役元元怨恨咸懐不悦又猥復為衞尉篤奉車都尉景繕修館第彌街絶里篤景親近貴臣當為百僚表儀今衆軍在道朝廷焦脣百姓愁苦縣官無用而遽起大第崇飾玩好非所以垂令德示無窮也冝且罷工匠專憂北邊恤民之困書奏不省竇憲嘗使門生齎書詣尚書僕射郅壽有所請託壽即送詔獄前後上書陳憲驕恣引王莽以誡國家又因朝會刺譏憲等以伐匈奴起第宅事厲音正色辭㫖甚切憲怒䧟壽以買公田誹謗下吏當誅何敞上疏曰壽機密近臣匡救為職若懐默不言其罪當誅今壽違衆正議以安宗廟豈其私邪臣所以觸死瞽言非爲壽也忠臣盡節以死為歸臣雖不知壽度其甘心安之誠不欲聖朝行誹謗之誅以傷晏晏之化杜塞忠直垂譏無窮臣敞謬與機密言所不冝罪名明白當填牢獄先壽僵仆萬死有餘書奏壽得減死論徙合浦未行自殺壽惲之子也夏六月竇憲耿秉出朔方雞鹿塞南單于出滿夷谷度遼將軍鄧鴻出㧽陽塞皆會涿邪山憲分遣副校尉閻盤司馬耿䕫耿譚將南匈奴精騎萬餘與北單于戰於稽落山大破之單于遁走追擊諸部遂臨私渠北鞮海斬名王已下萬三千級獲生口甚衆雜畜百餘萬頭諸禆小王率衆降者前後八十一部二十餘萬人憲秉出塞三千餘里登燕然山命中護軍班固刻石勒功紀漢威德而還遣軍司馬吳汜梁諷奉金帛遺北單于時虜中乖亂汜諷及單于於西海上宣國威信以詔致賜單于稽首拜受諷因説令修呼韓邪故事單于喜悦即將其衆與諷俱還到私渠海聞漢軍已入塞乃遣弟右温禺鞮王奉貢入侍隨諷詣闕憲以單于不自身到奏還其侍弟秋七月乙未會稽山崩九月庚申以竇憲為大將軍中郎將劉尚為車騎將軍封憲武陽矦食邑二萬戸憲固辭封爵詔許之舊大將軍位在三公下至是詔憲位次太傅下三公上長史司馬秩中二千石封耿秉為美陽矦竇氏兄弟驕縱而執金吾景尤甚奴客緹騎強奪人財貨簒取罪人妻略婦女商賈閉塞如避寇讎又擅發縁邊諸郡突騎有才力者有司莫敢舉奏袁安劾景擅發邊民驚惑吏民二千石不待符信而輒承景檄當伏顯誅又奏司􅀠校尉河南尹阿附貴戚不舉劾請免官案罪並寑不報駙馬都尉瓌獨好經書節約自修尚書何敞上封事曰昔鄭武姜之幸叔叚衛莊公之寵州吁愛而不教終至凶戾由是觀之愛子若此猶飢而食之以毒適所以害之也伏見大將軍憲始遭大憂公卿比奏欲令典幹國事憲深執謙退固辭盛位懇懇勤勤言之深至天下聞之莫不恱喜今踰年無幾大禮未終卒然中改兄弟專朝憲秉三軍之重篤景總宫衞之權而虐用百姓奢侈僣偪誅戮無罪肆心自快今者論議訩訩咸謂叔叚州吁復生於漢臣觀公卿懐持兩端不肯極言者以為憲等若有匪懈之志則已受吉甫襃申伯之功如憲等䧟於罪辜則自取陳平周勃順吕后之權終不以憲等吉凶為憂也臣敞區區誠欲計策兩安絶其緜緜塞其㳙㳙上不欲令皇太后損文母之號陛下有誓泉之譏下使憲等得長保其福祐也駙馬都尉􅅛比請退身願抑家權可與參謀聽順其意誠宗廟至計竇氏之福時濟南王康尊貴驕甚憲乃白出敞為濟南太傅康有違失敞輒諫争康雖不能從然素敬重敞無所嫌牾焉冬十月庚子阜陵質王延薨是歳郡國九大水二年春正月丁丑赦天下二月壬午日有食之夏五月丙辰封皇弟壽為濟北王開為河間王淑為城陽王紹封故淮陽頃王子側為常山王竇憲遣副校尉閻盤將二千餘騎掩擊北匈奴之守伊吾者復取其地車師震慴前後王各遣子入侍月氏求尚公主班超拒還其使由是怨恨遣其副王謝將兵七萬攻超超衆少皆大恐超譬軍士曰月氏兵雖多然數千里踰葱嶺來非有運輸何足憂邪但當收榖堅守彼飢窮自降不過數十日決矣謝遂前攻超不下又鈔掠無所得超度其糧將盡必從龜兹求食乃遣兵數百於東界要之謝果遣騎齎金銀珠玉以賂龜兹超伏兵遮擊盡殺之持其使首以示謝謝大驚即遣使請罪願得生歸超縱遣之月氏由是大震歲奉貢獻初北海哀王無後肅宗以齊武王首創大業而後嗣廢絶心常愍之遺詔令復齊北海二國丁卯封蕪湖矦無忌為齊王北海敬王庶子威為北海王六月辛卯中山簡王焉薨焉東海恭王之母弟而竇太后恭王之甥也故加賻錢一億大為修冢塋平夷吏民冢墓以千數作者萬餘人凡徴發揺動六州十八郡詔封竇憲為冠軍矦篤為郾矦瓌為夏陽矦憲獨不受封秋十月乙卯竇憲出屯凉州以侍中鄧疊行征西將軍事為副北單于以漢還其侍弟九月復遣使款塞稱臣欲入朝見冬十月竇憲遣班固梁諷迎之會南單于復上書求滅北庭於是遣左谷蠡王師子等將左右部八千騎出雞鹿塞中郎將耿譚遣從事將護之襲擊北單于夜至圍之北單于被創僅而得免獲閼氏及男女五人斬首八千級生虜數千口班固至私渠海而還是時南部黨衆益盛領戸三萬四千勝兵五萬三年春正月甲子帝用曹襃新禮加元服擢襃監羽林左騎竇憲以北匈奴微弱欲遂滅之二月遣左校尉耿䕫司馬任尚出居延塞圍北單于於金微山大破之獲其母閼氏名王已下五千餘級北單于逃走不知所在出塞五千餘里而還自漢出師所未嘗至也封䕫爲粟邑矦竇憲既立大功威名益盛以耿䕫任尚等為􅀲牙鄧疊郭璜為心腹班固傅毅之徒典文章刺史守令多出其門競賦歛吏民共為賂遺司徒袁安司空任隗舉奏諸二千石并所連及貶秩免官者四十餘人竇氏大恨但安隗素行高亦未有以害之尚書僕射樂恢刺舉無所回避憲等疾之恢上䟽曰陛下冨於春秋纂承大業諸舅不宜幹正王室以示天下之私方今之宜上以義自割下以謙自引四舅可長保爵土之榮皇太后永無慙負宗廟之憂誠䇿之上者也書奏不省恢稱疾乞骸骨歸長陵憲風厲州郡廹脅恢飲藥死於是朝臣震慴望風承㫖無敢違者袁安以天子幼弱外戚擅權每朝會進見及與公卿言國家事未嘗不喑嗚流涕自天子及大臣皆恃賴之冬十月癸未上行幸長安詔求蕭曹近親冝為嗣者紹其封邑詔竇憲與車駕會長安憲至尚書以下議欲拜之伏稱萬歲尚書韓稜正色曰夫上交不諂下交不黷禮無人臣稱萬歲之制議者皆慙而止尚書左丞王龍私奏記上牛酒於憲稜舉奏龍論為城旦龜兹姑墨温宿諸國皆降十二月復置西域都䕶騎都尉戊巳校尉官以班超爲都護徐幹爲長史拜龜兹侍子白霸為龜兹王遣司馬姚光送之超與光共脅龜兹廢其王尤利多而立白霸使光將尤利多還詣京師超居龜兹它乾城徐幹屯疏勒唯焉􅂄危須尉犁以前没都䕶猶懐二心其餘悉定庚辰上至自長安初北單于既亡其弟右谷蠡王於除鞬自立為單于將衆數千人止蒲類海遣使欵塞竇憲請遣使立於除鞬為單于置中郎將領䕶如南單于故事事下公卿議宋由等以為可許袁安任隗奏以為光武招懐南虜非謂可永安内地正以權時之筭可得扞禦北狄故也今朔漠旣定冝令南單于反其北庭并領降衆無縁復更立於除鞬以增國費事奏未以時定安懼憲計遂行乃獨上封事曰南單于屯先父舉衆歸德自䝉恩以來四十餘年三帝積累以遺陛下陛下深冝遵述先志成就其業況屯首唱大謀空盡北虜輟而弗圖更立新降以一朝之計違三丗之規失信於所養建立於無功論語曰言忠信行篤敬雖蠻貊行焉今若失信於一屯則百蠻不敢復保誓矣又烏桓鮮卑新殺北單于凡人之情咸畏仇讎今立其弟則二虜懐怨且漢故事供給南單于費直歲一億九十餘萬西域歲七千四百八十萬今北庭彌逺其費過倍是乃空盡天下而非建策之要也詔下其議安又與憲更相難折憲險急負埶言辭驕訐至詆毁安稱光武誅韓歆戴渉故事安終不移然上竟從憲策資治通鑑卷第四十七
