front:
  text: 又使尚書令滿奮持節奉璽綬禪位於倫左衛將軍王輿前軍將軍司馬雅等帥甲士入殿曉諭三部司馬示以威賞無敢違者張林等屯守諸門乙丑倫僃灋駕入宫即帝位赦天下改元建始帝自華林西門出居金墉城倫使張衡將兵守之丙寅尊帝爲太上皇改金墉曰永昌宫廢皇太孫爲濮陽王立世子荂爲皇太子封子馥爲京兆王䖍爲廣平王詡爲霸城王皆侍中將兵以梁王肜爲宰衡何劭爲太宰孫秀爲侍中中書監票騎將軍儀同三司義陽王威爲中書令張林爲衛將軍其餘黨與皆爲卿將超階越次不可勝紀下至奴卒亦加爵位每朝㑹貂蟬盈坐時人爲之諺曰貂不足狗尾續是嵗天下所舉賢良秀才孝亷皆不試郡國計吏及太學生年十六以上者皆署吏守令赦日在職者皆封矦郡綱紀並爲孝亷縣綱紀並爲亷吏府庫之儲不足以供賜與應矦者多鑄印不給或以白板封之初平􅀯將軍孫旂之子弼弟子髦輔琰皆附㑹孫秀與之合族旬月間致位通顯及倫稱帝四子皆爲將軍封郡矦以旂爲車騎將軍開府旂以弼等受倫官爵過差必爲家禍遣幼子回責之弼等不從旂不能制慟哭而已
