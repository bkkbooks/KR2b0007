body:
  text: 癸酉殺濮陽哀王臧孫秀專執朝政倫所出詔令秀輒改更與奪自書青紙爲詔或朝行夕改百官轉易如流張林素與秀不相能且怨不得開府潛與太子荂牋言秀專權不合衆心而功臣皆小人撓亂朝廷可悉誅之荂以書白倫倫以示秀秀勸倫收林殺之夷其三族秀以齊王囧成都王穎河間王顒各擁彊兵據方面惡之乃盡用其親黨爲三王參佐加囧鎭東大將軍穎征北大將軍皆開府儀同三司以寵安之李庠驍勇得衆心趙廞浸忌之而未言長史蜀郡杜淑張粲說廞曰將軍起兵始爾而遽遣李庠握彊兵於外非我族類其心必異此倒戈授人也宐早圖之㑹庠勸廞稱尊號淑粲因白廞以庠大逆不道引斬之并其子姪十餘人時李特李流皆將兵在外廞遣人尉撫之曰庠非所宐言罪應死兄弟罪不相及復以特流爲督將特流怨廞引兵歸緜竹廞牙門將涪陵許弇求爲巴東監軍杜淑張粲固執不許弇怒手殺淑粲於廞閤下淑粲左右復殺弇三人皆廞之腹心也廞由是遂衰廞遣長史犍爲費逺蜀郡太守李苾督䕶常俊督萬餘人斷北道屯緜竹之石亭李特宻收兵得七千餘人夜襲逺等軍燒之死者什八九遂進攻成都費逺李苾及軍祭酒張微夜斬關走文武盡散廞獨與妻子乗小船走至廣都爲從者所殺特入成都縱兵大掠遣使詣洛陽陳廞罪狀初梁州刺史羅尚聞趙廞反表廞素非雄才蜀人不附敗亡可計日而待詔拜尚平西將軍益州刺史督牙門將王敦蜀郡太守徐儉廣漢太守辛冉等七千餘人入蜀特等聞尚來甚懼使其弟驤於道奉迎并獻珍玩尚恱以驤爲騎督特流復以牛酒勞尚於緜竹王敦辛冉􅀃尚曰特等專爲盜賊宐因㑹斬之不然必爲後患尚不從冉與特有舊謂特曰故人相逢不吉當凶矣特深自猜懼三月尚至成都汶山羌反尚遣王敦討之爲羌所殺齊王囧謀討趙王倫未發㑹離狐王盛頴川處穆聚衆於濁澤百姓從之日以萬數倫以其將管襲爲齊王軍司討盛穆斬之囧因收襲殺之與豫州刺史何勗龍驤將軍董艾等起兵遣使告成都王穎河間王顒常山王乂及南中郎將新野公歆移檄征鎮州郡縣國稱逆臣孫秀迷誤趙王當共誅討有不從命者誅及三族使者至鄴成都王穎召鄴令盧志謀之志曰趙王簒逆人神共憤殿下收英俊以從人望杖大順以討之百姓必不召自至攘臂爭進蔑不克矣穎從之以志爲諮議參軍仍補左長史志毓之孫也穎以兖州刺史王彦冀州刺史李毅督䕶趙驤石超等爲前鋒逺近響應至朝歌衆二十餘萬超苞之孫也常山王乂在其國與太原内史劉暾各帥衆爲穎後繼新野公歆得囧檄未知所從嬖人王綏曰趙親而彊齊疎而弱公宐從趙參軍孫洵大言於衆曰趙王凶逆天下當共誅之何親疎強弱之有歆乃從囧前安西參軍夏矦奭在始平合衆數千人以應囧遣使邀河間王顒顒用長史隴西李含謀遣振武將軍河間張方討擒奭及其黨􅆎斬之囧檄至顒執囧使送於倫遣張方將兵助倫方至華隂顒聞二王兵盛復召方還更附二王囧檄至揚州州人皆欲應囧刺史郗隆慮之玄孫也以兄子鑒及諸子悉在洛陽疑未決悉召僚吏謀之主簿淮南趙誘前秀才虞潭皆曰趙王簒逆海内所疾今義兵四起其敗必矣爲明使君計莫若自將精兵徑赴許昌上䇿也遣將將兵㑹之中䇿也量遣小軍隨形助勝下䇿也隆退密與别駕顧彦謀之彦曰誘等下䇿乃上計也治中留寶主簿張褒西曹留承聞之請見曰不審明使君今當何施隆曰我俱受二帝恩無所偏助欲守州而已承曰天下者世祖之天下也太上承代已久今上取之不平齊王順時舉事成敗可見使君不早發兵應之狐疑遷延變難將生此州豈可保也隆不應潭翻之孫也隆停檄六日不下將士憤怒參軍王邃鎮石頭將士爭往歸之隆遣從事於牛渚禁之不能止將士遂奉邃攻隆隆父子及顧彦皆死傳首於囧安南將軍監沔北諸軍事孟觀以爲紫宫帝坐無他變倫必不敗乃爲之固守倫秀聞三王兵起大懼詐爲囧表曰不知何賊猝見攻圍臣懦弱不能自固乞中軍見救庶得歸死以其表宣示内外遣上軍將軍孫輔折衝將軍李嚴帥兵七千自延壽關出征虜將軍張泓左軍將軍蔡璜前軍將軍閭和帥兵九千自堮阪關出鎭軍將軍司馬雅揚威將軍莫原帥兵八千自成臯關出以拒囧遣孫秀子㑹督將軍士猗許超帥宿衛兵三萬以拒穎召東平王楙爲衛將軍都督諸軍又遣京兆王馥廣平王䖍帥兵八千爲三軍繼援倫秀日夜禱祈厭勝以求福使巫覡選戰日又使人於嵩山著羽衣詐稱仙人王喬作書述倫祚長久欲以惑衆閏月丙戍朔日有食之自正月至于是月五星互經天縱横無常張泓等進據陽翟與齊王囧戰屢破之囧軍穎隂夏四月泓乗勝逼之囧遣兵逆戰諸軍不動而孫輔徐建軍夜亂徑歸洛自首曰齊王兵盛不可當泓等已没矣趙王倫大恐祕之而召其子䖍及許超還㑹泓破囧露布至倫乃復遣之泓等悉帥諸軍濟潁攻囧營囧出兵擊其别將孫髦司馬譚等破之泓等乃退孫秀詐稱已破囧營擒得囧令百官皆賀成都王穎前鋒至黄橋爲孫㑹士猗許超所敗殺傷萬餘人士衆震駭穎欲退保朝歌盧志王彦曰今我軍失利敵新得志有輕我之心我若退縮士氣沮衂不可復用且戰何能無勝負不若更選精兵星行倍道出敵不意此用兵之奇也穎從之倫賞黄橋之功士猗許超與孫㑹皆持節由是各不相從軍政不一且恃勝輕穎而不設備穎帥諸軍擊之大戰于湨水㑹等大敗棄軍􅀯走穎乗勝長驅濟河自冏等起兵百官將士皆欲誅倫秀秀懼不敢出中書省及聞河北軍敗憂懣不知所爲孫㑹許超士猗等至與秀謀或欲收餘卒出戰或欲焚宫室誅不附己者挾倫南就孫旂孟觀或欲乗船東走入海計未決辛酉左衛將軍王輿與尚書廣陵公漼帥營兵七百餘人自南掖門入宫三部司馬爲應於内攻孫秀許超士猗於中書省皆斬之遂殺孫奇孫弼及前將軍謝惔等漼伷之子也王輿屯雲龍門召八坐皆入殿中使倫爲詔曰吾爲孫秀所誤以怒三王今已誅秀其迎太上皇復位吾歸老于農􅅿傳詔以騶虞幡敕將士解兵黄門將倫自華林東門出及太子荂皆還汶陽里第遣甲士數千迎帝于金墉城百姓咸稱萬嵗帝自端門入升殿羣臣頓首謝罪詔送倫荂等付金墉城廣平王䖍自河北還至九曲聞變棄軍將數十人歸里第癸亥赦天下改元大酺五日分遣使者慰勞三王梁王肜等表趙王倫父子凶逆宐伏誅丁卯遣尚書􅀽敞持節賜倫死收其子荂馥䖍詡皆誅之凡百官爲倫所用者皆斥免臺省府衛僅有存者是日成都王穎至己巳河閒王顒至穎使趙驤石超助齊王討張􅇦等於陽翟􅇦等皆降自兵興六十餘日戰􅃲死者近十萬人斬張衡閭和孫髦于東市蔡璜自殺五月誅義陽王威襄陽太守宗岱承囧檄斬孫旂永饒冶令空桐機斬孟觀皆傳首洛陽夷三族立襄陽王尚爲皇太孫六月乙卯齊王囧帥衆入洛陽頓軍通章署甲士數十萬威震京都戊辰赦天下復封賔徒王晏爲呉王甲戍詔以齊王囧爲大司馬加九錫僃物典策如宣景文武輔魏故事成都王穎爲大將軍都督中外諸軍事假黄􅃏録尚書事加九錫入朝不趨劒履上殿河閒王顒爲侍中太尉加三賜之禮常山王乂爲撫軍大將軍領左軍進廣陵公漼爵爲王領尚書加侍中進新野公歆爵爲王都督荆州諸軍事加鎮􅀯大將軍齊成都河閒三府各置掾屬四十人武號森列文官僃員而已識者知兵之未戢也己卯以梁王肜爲太宰領司徒光禄大夫劉蕃女爲趙世子荂妻故蕃及二子散騎侍郎輿冠軍將軍琨皆爲趙王倫所委任大司馬囧以琨父子有才望特宥之以輿爲中書郎琨爲尚書左丞又以前司徒王戎爲尚書令劉暾爲御史中丞王衍爲河􅀯尹新野王歆將之鎮與囧同乗謁陵因說囧曰成都王至親同建大勲今宐留之與輔政若不能爾當奪其兵權常山王乂與成都王穎俱拜陵乂謂穎曰天下者先帝之業王宐維正之聞其言者莫不憂懼盧志謂穎曰齊王衆號百萬與張泓等相持不能決大王逕前濟河功無與貳然今齊王欲與大王共輔朝政志聞兩雄不俱立宐因太妃微疾求還定省委重齊王以收四海之心此計之上也穎從之帝見穎于東堂慰勞之穎拜謝曰此大司馬囧之勲臣無豫焉因表稱囧功德宐委以萬機自陳母疾請歸藩即辭出不復還營便謁太廟出自東陽城門遂歸鄴遣信與囧别囧大驚馳出送穎至七里澗及之穎住車言别流涕滂沱惟以太妃疾苦爲憂不及時事由是士民之譽皆歸穎囧辟新興劉殷爲軍諮祭酒洛陽令曹攄爲記室督尚書郎江統陽平太守河内茍晞參軍事呉國張翰爲東曹掾孫惠爲户曹掾前廷尉正顧榮及順陽王豹爲主簿惠賁之曽孫榮雍之孫也殷幼孤貧養曽祖母以孝聞人以榖帛遺之殷受而不謝直云待後貴當相酬耳及長􅀶通經史性倜儻有大志儉而不陋清而不介望之頹然而不可侵也囧以何勗爲中領軍董艾典樞機又封其將佐有功者葛旟路秀衛毅劉眞韓泰皆爲縣公委以心膂號曰五公成都王穎至鄴詔遣使者就申前命穎受大將軍譲九錫殊禮表論興義功臣皆封公矦又表稱大司馬前在陽翟與賊相持既久百姓困敝乞運河北邸閣米十五萬斛以賑陽翟饑民造棺八千餘枚以成都國秩爲衣服歛祭黄橋戰士旌顯其家加常戰亡二等又命温縣瘞趙王倫戰士萬四千餘人皆盧志之謀也穎形羙而神昏不知書然氣性敦厚委事於志故得成其美焉詔復遣使諭穎入輔并使受九錫穎嬖人孟玖不欲還洛又程太妃愛戀鄴都故穎終辭不拜初大司馬囧疑中書郎陸機爲趙王倫撰禪詔收欲殺之大將軍穎爲之辯理得免死因表爲平原内史以其弟雲爲清河内史機友人顧榮及廣陵戴淵以中國多難勸機還呉機以受穎全濟之恩且謂穎有時望可與立功遂留不去秋七月復封常山王乂爲長沙王遷開府驃騎將軍東萊王㽔凶暴使酒數陵侮大司馬囧又從囧求開府不得而怨之宻表囧專權與左衛將軍王輿謀廢囧事覺八月詔廢蕤爲庶人誅輿三族徙蕤於上庸上庸内史陳鍾承囧㫖潛殺之赦天下東武公澹坐不孝徙遼東九月徴其弟東安王繇復舊爵拜尚書左僕射繇舉東平王楙爲平東將軍都督徐州諸軍事鎮下邳􅀄朝廷符下秦雍州使召還流民入蜀者又遣御史馮該張昌督之李特兄輔自略陽至蜀言中國方亂不足復還特然之累遣天水閻式詣羅尚求權停至秋又納賂於尚及馮該尚該許之朝廷論討趙廞功拜特宣威將軍弟流奮威將軍皆封矦璽書下益州條列六郡流民與特同討廞者將加封賞廣漢太守辛冉欲以滅廞爲己功寑朝命不以實上衆咸怨之羅尚遣從事督遣流民限七月上道時流民布在梁益爲人傭力聞州郡逼遣人人愁怨不知所爲且水潦方盛年榖未登無以爲行資特復遣閻式詣尚求停至冬辛冉及犍爲太守李苾以爲不可尚舉别駕蜀郡杜弢秀才式爲弢說逼移利害弢亦欲寛流民一年尚用冉苾之謀不從弢乃致秀才板出還家冉性貪暴欲殺流民首領取其資貨乃與苾白尚言流民前因趙廞之亂多所剽掠宐因移設關以奪取之尚移書令梓潼太守張演於諸要施關搜索寶貨特數爲流民請留流民皆感而恃之多相帥歸特特乃結大營於緜竹以處流民移辛冉求自寛冉大怒遣人分牓通衢購募特兄弟許以重賞特見之悉取以歸與弟驤改其購云能送六郡之豪李任閻趙楊上官及氏叟矦王一首賞百匹於是流民大懼歸特者愈衆旬月閒過二萬人流亦聚衆數千人特又遣閻式詣羅尚求申期式見營柵衝要謀揜流民歎曰民心方危今而速之亂將作矣又知辛冉李苾意不可回乃辭尚還緜竹尚謂式曰子且以吾意告諸流民今聽寛矣式曰明公惑於姦說恐無寛理弱而不可輕者民也今趣之不以理衆怒難犯恐爲禍不淺尚曰然吾不欺子子其行矣式至緜竹言於特曰尚雖云爾然未可信也何者尚威刑不立冉等各擁彊兵一旦爲變亦非尚所能制深宐爲僃特從之冬十月特分爲二營特居北營流居東營繕甲厲兵戒嚴以待之冉苾相與謀曰羅矦貪而無斷日復一日令流民得展姦計李特兄弟並有雄才吾屬將爲所虜矣宐爲決計羅矦不足復問也乃遣廣漢都尉曽元牙門張顯劉並等潛帥步騎三萬襲特營羅尚聞之亦遣督䕶田佐助元元等至特安卧不動待其衆半入發伏擊之死者甚衆殺田佐曽元張顯傳首以示尚冉尚謂將佐曰此虜成去矣而廣漢不用吾言以張賊勢今若之何於是六郡流民李含等共推特行鎮北大將軍承制封拜以其弟流行鎮東大將軍號東督䕶以相鎭統又以兄輔爲驃騎將軍弟驤爲驍騎將軍進兵攻冉於廣漢尚遣李苾費逺帥衆救冉畏特不敢進冉出戰屢敗潰圍犇德陽特入據廣漢以李超爲太守進兵攻尚於成都尚以書諭閻式式復書曰辛冉傾巧曽元小豎李叔平非將帥之材式前爲節下及杜景文論留徙之宐人懷桑梓孰不願之但往日初至隨榖庸賃一室五分復值秋潦乞湏冬熟而終不見聽繩之太過窮鹿抵虎流民不肯延頸受刀以致爲變即聽式言寛使治嚴不過去九月盡集十月進道今達鄉里何有如此也特以兄輔弟驤子始蕩雄及李含含子國離任回李攀攀弟恭上官晶任臧楊褒上官悙等為將帥閻式李逺等爲僚佐羅尚素貪殘爲百姓患特與蜀民約灋三章施捨振貸禮賢抜滯軍政肅然蜀民大悅尚頻爲特所敗乃阻長圍緣郫水作營連延七百里與特相拒求救於梁州及􅀯夷校尉十二月潁昌康公何邵薨封大司馬囧子冰爲樂安王英爲濟陽王超爲淮􅀯王太元元年春三月沖太孫尚薨夏五月乙酉梁孝王肜薨以右光禄大夫劉寔爲太傅尋以老病罷河間王顒遣督䕶衙愽討李特軍于梓潼朝廷復以張微爲廣漢太守軍于德陽羅尚遣督䕶張􅀛軍于繁城特使其子鎭軍將軍蕩等襲博而自將擊􅀛破之蕩敗博兵於陽沔梓潼太守張演委城走巴西丞毛植以郡降蕩進攻博於葭萌愽走其衆盡降河間王顒更以許雄爲梁州刺史特自稱大將軍益州牧都督梁益二州諸軍事大司馬囧欲久專大政以帝子孫俱盡大將軍頴有次立之勢清河王覃遐之子也方八嵗乃上表請立之癸卯立覃爲皇太子以囧爲太子太師東海王越爲司空領中書監秋八月李特攻張微微擊破之遂進攻特營李蕩引兵救之山道險陿蕩力戰而前遂破微兵特欲還涪蕩及司馬王幸諫曰微軍已敗智勇俱竭宐乘銳氣遂禽之特復進攻微殺之生禽微子存以微䘮還之特以其將寋碩守德陽李驤軍毗橋羅尚遣軍擊之屢爲驤所敗驤遂進攻成都燒其門李流軍成都之北尚遣精勇萬人攻驤驤與流合擊大破之還者什一二許雄數遣軍攻特不勝特勢益盛建寧大姓李叡毛詵逐太守杜俊朱提大姓李猛逐太守雍約以應特衆各數萬􅀯夷校尉李毅討破之斬詵李猛奉牋降而辭意不遜毅誘而殺之冬十一月丙戌復置寧州以毅爲刺史齊武閔王囧既得志頗驕奢擅權大起府第壞公私廬舎以百數制與西宫等中外失望侍中嵇紹上疏曰存不忘亡易之善戒也臣願陛下無忘金墉大司馬無忘潁上大將軍無忘黄橋則禍亂之萌無由而兆矣又與囧書以爲唐虞茅茨夏禹卑宫今大興第舎及爲三王立宅豈今日之所急邪囧遜辭謝之然不能從囧耽於宴樂不入朝見坐拜百官符敕三臺選舉不均嬖寵用事殿中御史􅁊豹奏事不先經囧府即加考竟􅀯陽處士鄭方上書諫囧曰今大王安不慮危燕樂過度一失也宗室骨肉當無纎介今則不然二失也蠻夷不靜大王謂功業已隆不以爲念三失也兵革之後百姓窮困不聞賑救四失也大王與義兵盟約事定之後賞不踰時而今猶有有功未論者五失也囧謝曰非子􅀌不聞過孫惠上書曰天下有五難四不可而明公皆居之冒犯鋒刃一難也聚致英豪二難也與將士均勞苦三難也以弱勝彊四難也興復皇業五難也大名不可久荷大功不可久任大權不可久執大威不可久居大王行其難而不以爲難處其不可而謂之可惠竊所不安也明公宐思功成身退之道崇親推近委重長沙成都二王長揖歸藩則太伯子臧不專美於前矣今乃忘高亢之可危貪權埶以受疑雖遨遊高臺之上逍遥重墉之内愚竊謂危亡之憂過於在潁翟之時也囧不能用惠辭疾去囧謂曹攄曰或勸吾委權還國何如攄曰物禁太盛大王誠能居高慮危褰裳去之斯善之善者也囧不聽張翰顧榮皆慮及禍翰因秋風起思菰菜蓴羮鱸魚鱠歎曰人生貴適志耳富貴何爲即引去榮故酣飲不省府事長史葛旟以其廢職白囧徙榮爲中書侍郎潁川處士􅁃衮聞囧朞年不朝歎曰晉室卑矣禍亂將興帥妻子逃於林慮山中王豹致牋於囧曰伏思元康已來宰相在位未有一人􅀗終者乃事埶使然非皆爲不善也今公克平禍亂安國定家乃復尋覆車之軌欲冀長存不亦難乎今河閒樹根於􅀜右成都盤􅁊於舊魏新野大封於江漢三王各以方剛强盛之年並典戎馬處要害之地而明公以難賞之功挾震主之威獨據京都專執大權進則亢龍有悔退則據于蒺䔧冀此求安未見其福也因請悉遣王矦之國依周召之法以成都王爲北州伯治鄴囧自爲􅀯州伯治宛分河爲界各統王矦以夾輔天子囧優令荅之長沙王乂見豹牋謂囧曰小子離間骨肉何不銅駞下打殺囧乃奏豹讒内間外坐生猜嫌不忠不義鞭殺之豹將死曰縣吾頭大司馬門見兵之攻齊也囧以河間王顒本附趙王倫心常恨之梁州刺史安定皇甫商與顒長史李含不平含被徴爲翊軍校尉時商參囧軍事夏矦奭兄亦在囧府含心不自安又與囧右司馬趙驤有隙遂單馬犇顒詐稱受宻詔使顒誅囧因說顒曰成都王至親有大功推讓還藩甚得衆心齊王越親而專政朝廷側目今檄長沙王使討齊齊王必誅長沙吾因以爲齊罪而討之必可禽也去齊立成都除逼建親以安社稷大勲也顒從之是時武帝族弟范陽王虓都督豫州諸軍事顒上表陳囧罪狀且言勒兵十萬欲與成都王頴新野王歆范陽王虓共㑹洛陽請長沙王乂廢囧還第以頴代囧輔政顒遂舉兵以李含爲都督帥張方等趨洛陽復遣使邀穎穎將應之盧志諫不聽十二月丁卯顒表至囧大懼㑹百官議之曰孤首唱義兵臣子之節信著神明今二王信讒作難將若之何尚書令王戎曰公勲業誠大然賞不及勞故人懷貳心今二王兵盛不可當也若以王就第委權崇讓庶可求安囧從事中郎葛旟怒曰三臺納言不恤王事賞報稽緩責不在府讒言逆亂當共誅討柰何虛承僞書遽令公就第乎漢魏以來王矦就第寧有得保妻子者邪議者可斬百官震悚失色戎僞藥發墯厠得免李含屯隂盤張方帥兵二萬軍新安檄長沙王乂使討囧冏遣董艾襲乂乂將左右百餘人馳入宫閉諸門奉天子攻大司馬府董艾陳兵宫西縱火燒千秋神武門囧使人執騶虞幡唱云長沙王矯詔乂又稱大司馬謀反是夕城内大戰飛矢雨集火光屬天帝幸上東門矢集御前羣臣死者相枕連戰三日囧衆大敗大司馬長史趙淵殺何勗因執囧以降囧至殿前帝惻然欲活之乂叱左右趣牽出斬於閶闔門外徇首六軍同黨皆夷三族死者二千餘人囚囧子超冰英於金墉城廢囧弟北海王寔赦天下改元李含等聞囧死引兵還長安長沙王乂雖在朝廷事無巨細皆就鄴諮大將軍穎穎以孫惠爲參軍陸雲爲右司馬是嵗陳留王薨謚曰魏元皇帝鮮卑宇文單于莫圭部衆彊盛遣其弟屈雲攻慕容廆廆擊其别帥素怒延破之素怒延恥之復發兵十萬圍廆於棘城廆衆皆懼廆曰素怒延兵雖多而無灋制已在吾筭中矣諸君但爲力戰無所憂也遂岀擊大破之追犇百里俘斬萬計遼東孟暉先没於宇文部帥其衆數千家降於廆廆以爲建威將軍廆以其臣慕輿句勤恪亷靖使掌府庫句心計黙識不案簿書始終無漏以慕輿河明敏精審使典獄訟覆訊清允資治通鑑卷第八十四
