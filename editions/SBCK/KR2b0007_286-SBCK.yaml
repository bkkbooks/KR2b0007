front:
  text: 資治通鑑卷第二百八十六
  hash: sha256:74d405f45e2a3cfe11053afe32c71e6b33e0189ac709deaeaea4f3302df354be
body:
  text: 臣司馬光奉勑編集後漢紀一盡四月不滿一年起強圉協洽正月髙祖睿文聖武昭肅孝皇帝上天福十二年春正月丁亥朔百官遥辭􅀳主於城北乃易素服紗帽迎契丹主伏路側請罪契丹主貂帽貂裘衷甲駐馬髙阜命起改服撫慰之左衛上將軍安叔千獨出班胡語契丹主曰汝安没字邪汝昔鎭邢州已累表輸誠我不忘也叔千拜謝呼躍而退􅀳主與太后已下迎於封丘門外契丹主辭不見契丹主入門民皆驚呼而走契丹主登城樓遣通事諭之曰我亦人也汝曹勿懼㑹當使汝曹蘇息我無心南來漢兵引我至此耳至明徳門下馬拜而後入宫以其樞密副使劉密權開封尹事日暮契丹主復出屯於赤岡戊子執鄭州防禦使楊承勲至大梁責以殺父叛契丹命左右臠食之未幾以其弟右羽林將軍承信為平盧節度使悉以其父舊兵授之髙勲訴張彦澤殺其家人於契丹主契丹主亦怒彦澤剽掠京城并􅀓住兒鎖之以彦澤之罪宣示百官問應死否皆言應死百姓亦投牒爭䟽彦澤罪己丑斬彦澤住兒於北市仍命髙勲監刑彦澤前所殺士大夫子孫皆絰杖號哭隨而詬詈以杖扑之勲命斷腕出鎖剖其心以祭死者市人爭破其腦取髓臠其肉而食之契丹送景延廣歸其國庚寅宿陳橋夜伺守者稍怠扼吭而死辛卯契丹以􅀳主為負義矦置於黃龍府黃龍府即慕容氏和龍城也契丹主使謂李太后曰聞重貴不用母命以至於此可求自便勿與俱行太后曰重貴事妾甚謹所失者違先君之志絶兩國之􅂬耳今幸蒙大恩全生保家母不隨子欲何所歸癸巳契丹遷􅀳主及其家人於封禪寺遣大同節度使兼侍中河内崔廷勲以兵守之契丹主數遣使存問􅀳主毎聞使至舉家憂恐時雨雪連旬外無供億上下凍餒太后使人謂寺僧曰吾嘗於此飯僧數萬今日獨無一人相念邪僧辭以虜意難測不敢獻食􅀳主隂祈守者乃稍得食是日契丹主自赤岡引兵入宫都城諸門及宫禁門皆以契丹守衛晝夜不釋兵仗磔犬於門以竿懸羊皮於庭為厭勝契丹主謂􅀳羣臣曰自今不修甲兵不市戰馬輕賦省役天下太平矣廢東京降開封府為汴州尹為防禦使乙未契丹主改服中國衣􅃣百官起居皆如舊制趙延壽張礪共薦李崧之才㑹威勝節度使馮道自鄧州入朝契丹主素聞二人名皆禮重之未幾以崧為太子太師充樞密使道守太傅於樞密院祗候以僃顧問契丹主分遣使者以詔書賜􅀳之藩鎭􅀳之藩鎭爭上表稱臣被召者無不奔馳而至惟彰義節度使史匡威據涇州不受命匡威建瑭之子也雄武節度使何重建斬契丹使者以秦成階三州降蜀初杜重威旣以􅀳軍降契丹契丹主悉收其鎧仗數百萬貯􅁪州驅馬數萬歸其國遣重威將其衆從已而南及河契丹主以􅀳兵之衆恐其為變欲悉以胡􅀐擁而納之河流或諌曰􅀳兵在它所者尚多彼聞降者盡死必皆拒命爲患不若且撫之徐思其策契丹主乃使重威以其衆屯陳橋㑹乆雪官無所給士卒凍餒咸怨重威相聚而泣重威每出道旁人皆罵之契丹主猶欲誅􅀳兵趙延壽言於契丹主曰皇帝親冒矢石以取􅀳國欲自有之乎將為它人取之乎契丹主變色曰朕舉國南征五年不解甲僅能得之豈為它人乎延壽曰􅀳國南有唐西有蜀常為仇敵皇帝亦知之乎曰知之延壽曰􅀳國東自沂密西及秦鳯延袤數千里邊於吳蜀常以兵戍之南方暑濕上國之人不能居也它日車駕北歸以晉國如此之大無兵守之呉蜀必相與乗虚入寇如此豈非為它人取之乎契丹主曰我不知也然則柰何延壽曰陳橋降卒可分以戍南邊則呉蜀不能為患矣契丹主曰吾昔在上黨失於斷割悉以唐兵授􅀳既而返為仇讎北向與吾戰辛勤累年僅能勝之今幸入吾手不因此時悉除之豈可復留以為後患乎延壽曰曏留晉兵於河南不質其妻子故有此憂今若悉徙其家於􅁪定雲朔之間毎歳分畨使戍南邊何憂其為變哉此上策也契丹主恱曰善惟大王所以處之由是陳橋兵始得免分遣還營契丹主殺右金吾衛大將軍李彦紳宦者秦繼旻以其為唐潞王殺東丹王故也以其家族貲財賜東丹王之子永康王兀欲兀欲眇一目為人雄健好施癸卯晉主與李太后安太妃馮后及弟睿子延煦延寳俱北遷後宫左右從者百餘人契丹遣三百􅀐援送之又遣晉中書令趙瑩樞密使馮玉馬軍都指揮使李彦韜與之俱晉主在塗供饋不繼或時與太后俱絶食舊臣無敢進謁者獨磁州刺史李穀迎謁於路相對泣下穀曰臣無狀負陛下因傾貲以獻􅀳主至中度橋見杜重威寨歎曰天乎我家何負為此賊所破慟哭而去癸丑蜀主以左千牛衛上將軍李繼勲為秦州宣慰使契丹主以前燕京留守劉晞為西京留守永康王兀欲之弟留珪為義成節度使族人郎五爲鎭寧節度使兀欲姊壻潘聿撚為横海節度使趙延壽之子匡贊為護國節度使漢將張彦超為雄武節度使史佺為彰義節度使客省副使劉晏僧為忠武節度使前護國節度使矦益為鳳翔節度使權知鳯翔府事焦繼勲為保大節度使晞涿州人也既而何重建附蜀史匡威不受代契丹勢稍沮􅀳昌節度使趙在禮入朝其禆將留長安者作亂節度副使建人李肅討誅之軍府以安􅀳主之絶契丹也匡國節度使劉繼勲為宣徽北院使頗預其謀契丹主入汴繼勲入朝契丹主責之時馮道在殿上繼勲急指道曰馮道為首相與景延廣實為此謀臣位卑何敢發言契丹主曰此叟非多事者勿妄引之命鎖繼勲將送黃龍府趙在禮至洛陽謂人曰契丹主嘗言莊宗之亂由我所致我此行良可憂契丹遣契丹將􅄒軋奚王拽刺渤海將髙謨翰戍洛陽在禮入謁拜於庭下拽刺等皆踞坐受之乙卯在禮至鄭州聞繼勲被鎖大驚夜自經於馬櫪間契丹主聞在禮死乃釋繼勲繼勲憂憤而卒劉晞在契丹嘗為樞密使同平章事至洛陽詬奚王曰趙在禮漢家大臣爾北方一酋長耳安得慢之如此立於庭下以挫之由是洛人稍安契丹主廣受四方貢獻大縱酒作樂毎謂􅀳臣曰中國事我皆知之吾國事汝曹弗知也趙延壽請給上國兵廩食契丹主曰吾國無此法乃縱胡􅀐四出以牧馬為名分畨剽掠謂之打草穀丁壯斃於鋒刃老弱委於溝壑自東西兩畿及鄭滑曹濮數百里間財畜殆盡契丹主謂判三司劉煦曰契丹兵三十萬既平􅀳國應有優賜速宐營辦時府庫空竭煦不知所出請括借都城士民錢帛自將相以下皆不免又分遣使者數十人詣諸州括借皆迫以嚴誅人不聊生其實無所頒給皆蓄之内庫欲輦歸其國於是内外怨憤始患苦契丹皆思逐之矣初􅀳主與河東節度使中書令北平王劉知逺相猜忌雖以為北面行營都統徒尊以虛名而諸軍進止實不得預聞知逺因之廣募士卒陽城之戰諸軍散卒歸之者數千人又得吐谷渾財畜由是河東富彊冠諸鎭歩􅀐至五萬人􅀳主與契丹結怨知逺知其必危而未嘗論諌契丹屢深入知逺初無邀􅃒入援之志及聞契丹入汴知逺分兵守四境以防侵軼遣客將安陽王峻奉三表詣契丹主一賀入汴二以太原夷夏雜居戍兵所聚未敢離鎭三以應有貢物值契丹將劉九一軍自土門西入屯於南川城中憂懼俟召還此軍道路始通可以入貢契丹主賜詔襃美及進書親加兒字於知逺姓名之上仍賜以木柺胡法優禮大臣則賜之如漢賜几杖之比惟偉王以叔父之尊得之知逺又遣北都副留守太原白文珂入獻竒繒名馬契丹主知知逺觀望不至及文珂還使謂知逺曰汝不事南朝又不事北朝意欲何所俟邪蕃漢孔目官郭威言於知逺曰虜恨我深矣王峻言契丹貪殘失人心必不能乆有中國或勸知逺舉兵進取知逺曰用兵有緩有急當隨時制宐今契丹新降􅀳軍十萬虎據京邑未有它變豈可輕動哉且觀其所利止於貨財貨財既足必將北去況冰雪已消勢難乆留宐待其去然後取之可以萬全昭義節度使張從恩以地迫懐洛欲入朝於契丹遣使謀於知逺知逺曰我以一隅之地安敢抗天下之大君宐先行我當繼往從恩以為然判官髙防諌曰公􅀳室懿親不可輕變臣節從恩不從左驍衞大將軍王守恩與從恩姻家時在上黨從恩以副使趙行遷知留後牒守恩權巡檢使與髙防佐之遂行守恩建立之子也荆南節度使髙從誨遣使入貢於契丹契丹遣使以馬賜之從誨亦遣使詣河東勸進唐主立齊王景遂為皇太弟徙燕王景逹為齊王領諸道兵馬元帥徙南昌王弘冀為燕王為之副景遂嘗與宫僚燕集賛善大夫元城張易有所規諫景遂方與客傳玩玉柸弗之顧易怒曰殿下重寳而輕士取柸抵地碎之衆皆失色景遂斂容謝之待易益厚景逹性剛直唐主與宗室近臣飲馮延巳延魯魏岑陳覺輩極傾諂之態或乗酒喧笑景逹屢呵責之復極言諫唐主以不宐親近佞臣延巳以二弟立非己意欲以虚言徳之嘗宴東宫陽醉撫景逹背曰爾不可忘我景逹大怒拂衣入禁中白唐主請斬之唐主諭解乃止張易謂景逹曰羣小交構禍福所繫殿下力未能去數面折之使彼懼而為僃何所不至自是每遊宴景逹多辭疾不預唐主遣使賀契丹滅􅀳且請詣長安修復唐室諸陵契丹不許而遣使報之􅀳密州刺史皇甫暉棣州刺史王建皆避契丹帥衆奔唐淮北賊帥多請命於唐唐虞部貟外郎史館修撰韓熈載上䟽以為陛下恢復祖業今也其時若虜主北歸中原有主則未易圖也時方連兵福州未暇北顧唐人皆以為恨唐主亦悔之契丹主召晉百官悉集於庭問曰吾國廣大方數萬里有君長二十七人今中國之俗異於吾國吾欲擇一人君之如何皆曰天無二日夷夏之心皆願推戴皇帝如是者再契丹主乃曰汝曹旣欲君我今兹所行何事為先對曰王者初有天下應大赦二月丁巳朔契丹主服通天􅃣絳紗袍登正殿設樂懸儀衞於庭百官朝賀華人皆法服胡人仍胡服立於文武班中間下制稱大遼㑹同十年大赦仍云自今節度使刺史母得置牙兵市戰馬趙延壽以契丹主負約心怏怏令李崧言於契丹主曰漢天子所不敢望乞爲皇太子崧不得已爲言之契丹主曰我於燕王雖割吾肉有用於燕王吾無所愛然吾聞皇太子當以天子兒爲之豈燕王所可爲也因令爲燕王遷官時契丹以恒州爲中京翰林承旨張礪奏擬燕王中京留守大丞相録尚書事都督中外諸軍事樞密使如故契丹主取筆􅂗去録尚書事都督中外諸軍事而行之壬戌蜀李繼勲與興州刺史劉景攻固鎭拔之乙丑何重建請出蜀兵與階成兵共扼散關以取鳯州丙寅蜀主發山南兵三千七百赴之劉知逺聞何重建降蜀歎曰戎狄慿陵中原無主令藩鎭外附吾爲方伯良可愧也於是將佐勸知逺稱尊號以號令四方觀諸矦去就知逺不許聞􅀳主北遷聲言欲出兵井陘迎歸􅀳陽丁卯命武節都指揮使滎澤史弘肈集諸軍於毬􅂣告以出師之期軍士皆曰今契丹䧟京城執天子天下無主主天下者非我王而誰宐先正位號然後出師爭呼萬歳不已知逺曰虜勢尚彊吾軍威未振當且建功業士卒何知命左右遏止之已巳行軍司馬潞城張彦威等三上牋勸進知逺疑未決郭威與都押牙冠氏楊邠入說知逺曰今逺近之心不謀而同此天意也王不乗此際取之謙讓不居恐人心且移移則反受其咎矣知逺從之契丹以其將劉愿為保義節度副使陜人苦其暴虐奉國都頭王晏與指揮使趙暉都頭矦章謀曰今胡虜亂華乃吾屬奮發之秋河東劉公威徳逺著吾輩若殺愿舉陜城歸之為天下唱取富貴如反掌耳暉等然之晏與壯士數人夜踰牙城入府出庫兵以給衆庚午旦斬愿首懸諸府門又殺契丹監軍奉暉為留後晏徐州暉澶州章太原人也辛未劉知逺即皇帝位自言未忍改􅀳國又惡開運之名乃更稱天福十二年壬申詔諸道為契丹括率錢帛者皆罷之其􅀳臣被迫脅為使者勿問令詣行在自餘契丹所在誅之何重建遣宫􅁐使崔延琛將兵攻鳯州不克退保固鎭甲戌帝自將東迎􅀳主及太后至壽陽聞已過恒州數日乃留兵戍承天軍而還􅀳主既出塞契丹無復供給從官宫女皆自采木實草葉而食之至錦州契丹令􅀳主及后妃拜契丹主阿保機墓􅀳主不勝屈辱泣曰薛超誤我馮后隂令左右求毒藥欲與􅀳主俱自殺不果契丹主聞帝即位以通事耿崇美為昭義節度使高唐英為彰徳節度使崔廷勲為河陽節度使以控扼要害初􅀳置鄉兵號天威軍教習歳餘村民不閑軍旅竟不可用悉罷之但令七户輸錢十千其鎧仗悉輸官而無賴子弟不復肯復農業山林之盗自是而繁及契丹入汴縱胡􅀐打草穀又多以其子弟及親信左右為節度使刺史不通政事華人之狡獪者多往依其麾下教之妄作威福掊歛貨財民不堪命於是所在相聚爲盗多者數萬人少者不减千百攻䧟州縣殺掠吏民滏陽賊帥梁暉有衆數百送􅅃􅀳陽求效用帝許之磁州刺史李穀密通表於帝令暉襲相州暉偵知髙唐英未至相州積兵器無守僃丁丑夜遣壯士踰城入啓關納其衆殺契丹數百其守將突圍走暉據州自稱留後表言其狀戊寅帝還至􅀳陽議率民財以賞將士夫人李氏諫曰陛下因河東創大業未有以惠澤其民而先奪其生生之資殆非新天子所以救民之意也今宫中所有請悉出之以勞軍雖復不厚人無怨言帝曰善即罷率民傾内府蓄積以賜將士中外聞之大恱李氏􅀳陽人也呉越内都監程昭恱多聚賔客畜兵器與術士遊呉越王弘佐欲誅之謂水丘昭劵曰汝今夕帥甲士千人圍昭恱第昭劵曰昭恱家臣也有罪當顯戮不宐夜興兵弘佐曰善命内牙指揮使儲温伺昭恱歸第執送東府己卯斬之釋錢仁俊之囚武節都指揮使史弘肈攻代州拔之斬王暉建雄留後劉在明朝于契丹以節度副使駱從朗知州事帝遣使者張晏洪等如􅀳州諭以已即帝位從朗皆囚之大將藥可儔殺從朗推晏洪權留後庚辰遣使以聞契丹主遣右諫議大夫趙熈使晉州括率錢帛徵督甚急從朗既死民相帥共殺熈契丹主賜趙暉詔即以為保義留後暉斬契丹使者焚其詔遣支使河間趙矩奉表詣􅀳陽契丹遣其將髙模翰攻暉不克帝見矩甚喜曰子挈咽㗋之地以歸我天下不足定也矩因勸帝早引兵南向以副天下之望帝善之辛巳以暉為保義節度使矦章為鎭國節度使保義軍馬歩都指揮使王晏為絳州防禦使保義軍馬歩副指揮使髙防與王守恩謀遣指揮使李萬超白晝帥衆大譟入府斬趙行遷推守恩權知昭義留後守恩殺契丹使者舉鎭來降鎮寧節度使邪律郎五性殘虐澶州人苦之賊帥王瓊帥其徒千餘人夜襲據南城北度浮航縱兵大掠圍郎五於牙城契丹主聞之甚懼始遣天平節度使李守貞天雄節度使杜重威還鎭由是無乆留河南之意遣兵救澶州瓊退屯近郊遣其弟超奉表來求救癸未帝厚賜超遣還瓊兵敗為契丹所殺蜀主加雄武節度使何重建同平章事延州録事參軍髙允權萬金之子也彰武節度使周密闇而貪將士作亂攻之密敗保東城衆以允權家丗延帥推為留後據西城密應州人也丹州都指揮使髙彦珣殺契丹所署刺史自領州事契丹述律太后遣使以其國中酒饌脯果賜契丹主賀平􅀳國契丹主與羣臣宴於永福殿毎舉酒立而飲之曰太后所賜不敢坐飲唐王淑妃與郇公從益居洛陽趙延壽娶明宗女為夫人淑妃詣大梁㑹禮契丹主見而拜之曰吾嫂也統軍劉遂凝因淑妃求節􅃏契丹主以從益為許王威信節度使遂凝為安逺節度使淑妃以從益㓜辭不赴鎭復歸于洛契丹主以張礪為右僕射兼門下侍郎同平章事左僕射和凝兼中書侍郎同平章事司空兼門下侍郎同平章事劉煦以目疾辭位罷為太保東方羣盜大起䧟宋亳密三州契丹主謂左右曰我不知中國之人難制如此亟遣泰寧節度使安審琦武寧節度使符彦卿等歸鎮仍以契丹兵送之彦卿至埇橋賊帥李仁恕帥衆數萬急攻徐州彦卿與數十􅀐至城下揚鞭欲招諭之仁恕控彦卿馬請從相公入城彦卿子昭序自城中遣軍校陳守習縋而出呼於賊中曰相公已䧟虎口聽相公助賊攻城城不可得也賊知不可刧乃相帥羅拜於彦卿馬前乞赦其罪彦卿與之誓乃解去三月丙戌朔契丹主服赭袍坐崇元殿百官行入閤禮戊子帝遣使以詔書安集農民保聚山谷避契丹之患者辛卯髙允權奉表來降帝諭允權聽周密詣行在密遂弃東城來奔壬辰髙彦珣以丹州來降蜀翰林承旨李昊謂樞密使王處回曰敵復據固鎮則興州道絶不復能救秦州矣請遣山南西道節度使孫漢韶將兵急攻鳯州癸巳蜀主命漢韶詣鳯州行營契丹主復召􅀳百官諭之曰天時向暑吾難乆留欲暫至上國省太后當留親信一人於此為節度使百官請迎太后契丹主曰太后族大如古栢根不可移也契丹主欲盡以􅀳之百官自隨或曰舉國北遷恐揺人心不如稍稍遷之乃詔有職事者從行餘留大梁復以汴州為宣武軍以蕭翰為節度使翰述律太后之兄子其妹復為契丹主后翰始以蕭為姓自是契丹后族皆稱蕭氏呉越復發水軍遣其將余安將之自海道救福州己亥至白蝦浦海岸泥淖須布竹簀乃可行唐之諸軍在城南者聚而射之簀不得施馮延魯曰城所以不降恃此救也今相持不戰徒老我師不若縱其登岸盡殺之則城不攻自降矣禆將孟堅曰浙兵至此巳乆不能進退求一戰而死不可得若聽其登岸彼必致死於我其鋒不可當安能盡殺乎延魯不聽曰吾自擊之吴越兵既登岸大呼奮撃延魯不能禦弃衆而走孟堅戰死吴越兵乗勝而進城中兵亦出夾擊唐兵大破之唐城南諸軍皆遁吴越兵追之王崇文以牙兵三百拒之諸軍陳於崇文之後追者乃還或言浙兵欲弃福州拔李逹之衆歸錢唐東南守將劉洪進等白王建封請縱其盡出而取其城留從效不欲福州之平建封亦忿陳覺等専横乃曰吾軍敗矣安能與人爭城是夕燒營而遁城北諸軍亦相顧而潰馮延魯引佩刀自刺親吏救之不死唐兵死者二萬餘人委弃軍資器械數十萬府庫為之秏竭余安引兵入福州李逹舉所部授之留從效引兵還泉州謂唐戍將曰泉州與福州丗爲仇敵南接嶺海瘴癘之鄕地險土瘠比年軍旅屢興農桑廢業冬徴夏斂僅能自贍豈勞大軍乆戍於此置酒餞之戍將不得已引兵歸唐主不能制加從效檢校太傅壬寅契丹主發大梁􅀳文武諸司從者數千人諸軍吏卒又數千人宫女宦官數百人盡載府庫之實以行所留樂器儀仗而已夕㝛赤岡契丹主見村落皆空命有司發牓數百通所在招撫百姓然竟不禁胡􅀐剽掠丙午契丹自白馬度河謂宣徽使髙勲曰吾在上國以射獵爲樂至此令人悒悒今得歸死無恨矣蜀孫漢韶將兵二萬攻鳯州軍于固鎮分兵扼散關以絶援路張筠余安皆還錢唐呉越王弘佐遣東南安撫使鮑修讓將兵戍福州以東府安撫使錢弘倧為丞相庚戌以皇弟北京馬歩都指揮使崇行太原尹知府事辛亥契丹主將攻相州梁暉請降契丹主赦之許以為防禦使暉疑其詐復乗城拒守夏四月己未未明契丹主命蕃漢諸軍急攻相州食時克之悉殺城中男子驅其婦女而北胡人擲嬰孩於空中舉刃接之以為樂留髙唐英守相州唐英閱城中遺民男女得七百餘人其後節度使王繼弘歛城中髑髏瘞之凡得十餘萬或告磁州刺史李榖謀舉州應漢契丹主執而詰之榖不服契丹主引手於車中若取所獲文書者榖知其詐因請曰必有其驗乞顯示之凡六詰榖辭氣不屈乃釋之帝以從弟北京馬軍都指揮使信領義成節度使充侍衛馬軍都指揮使武節都指揮使史弘肈領忠武節度使充歩軍都指揮使右都押牙楊邠權樞密使蕃漢兵馬都孔目官郭威權副樞宻使兩使都孔目官南樂王章權三司使癸亥立魏國夫人李氏為皇后契丹主見所過城邑丘墟謂蕃漢羣臣曰致中國如此皆燕王之罪也顧張礪曰爾亦有力焉甲子帝以河東節度判官長安蘇逢吉觀察判官蘇禹珪為中書侍郎同平章事禹珪密州人也振武節度使府州團練使折從逺入朝更名從阮置永安軍於府州以從阮為節度使又以河東左都押牙劉銖為河陽節度使銖陜人也契丹昭義節度使耿崇美屯澤州將攻潞州乙丑詔史弘肈將歩􅀐萬人救之丙寅以王守恩為昭義節度使高允權為彰武節度使又以岢嵐軍使鄭謙為忻州刺史領彰國節度使兼忻代二州義軍都部署丁卯以縁河巡檢使閻萬進為嵐州刺史領振武節度使兼嵐憲二州義軍都制置使帝聞契丹北歸欲經略河南故以弘肈為前驅又遣謙萬進出北方以分契丹兵勢萬進并州人也契丹主以􅂳數十艘載􅀳鎧仗將自汴泝河歸其國命寧國都虞候榆次武行徳將士卒千餘人部送之至河隂行徳與將士謀曰今為虜所制將逺去鄉里人生㑹有死安能為異域之􅀑乎虜勢不能乆留中國不若共逐其黨堅守河陽以俟天命之所歸者而臣之豈非長䇿乎衆以為然行徳即以鎧仗授之相與殺契丹監軍使㑹契丹河陽節度使崔廷勲以兵送耿崇美之潞州行徳遂乗虚入據河陽衆推行徳為河陽都部署行徳遣弟行友奉蠟表間道詣􅀳陽契丹遣武定節度使方太詣洛陽巡檢至鄭州州有戍兵共迫太為鄭王梁嗣密王朱乙逃禍為僧嵩山賊帥張遇得之立以為天子取嵩岳神衮冕以衣之帥衆萬餘襲鄭州太擊走之太以契丹尚彊恐事不濟說諭戍兵欲與之俱西衆不從太自西門逃奔洛陽戍兵既失太反譛太於於契丹云脅我為亂太遣子師朗自訴於契丹契丹將麻荅殺之太無以自明㑹羣盜攻洛陽契丹留守劉晞弃城奔許州太乃入府行留守事與廵檢使潘環擊羣盜却之張遇殺朱乙請降伊闕賊帥自稱天子誓衆於南郊壇將入洛陽太逆擊走之太欲自歸於􅀳陽武行徳使人誘太曰我裨校也公舊鎭此地今虚位相待太信之至河陽為行徳所殺蕭翰遣髙謨翰援送劉晞自許還洛陽晞疑潘環構其衆逐已使謨翰殺之戊辰武行友至􅀳陽庚午史弘肈奏遣先鋒將馬誨擊契丹斬首千餘級時耿崇美崔廷勲至澤州聞弘肈兵已入潞州不敢進引衆而南弘肈遣誨追擊破之崇美廷勲與奚王拽剌退保懐州辛未以武行徳為河陽節度使契丹主聞河陽亂歎曰我有三失宐天下之叛我也諸道括錢一失也令上國人打草穀二失也不早遣諸節度使還鎭三失也唐主以矯詔敗軍皆陳覺馮延魯之罪壬申詔赦諸將議斬二人以謝中外御史中丞江文蔚對仗彈馮延巳魏岑曰陛下踐阼以來所信任者延巳延魯岑覺四人而已皆隂狡弄權壅蔽聦明排斥忠良引用羣小諫爭者逐竊議者刑上下相䝉道路以目今覺延魯雖伏辜而延巳岑猶在本根未殄枝幹復生同罪異誅人心疑惑又曰上之視聽惟在數人雖日接羣臣終成􅀌立又曰在外者握兵居中者當國又曰岑覺延魯更相違戾彼前則我却彼東則我西天生五材國之利器一旦為小人忿爭妄動之具又曰征討之柄在岑折簡帑藏取與繫岑一言唐主以文蔚所言為太過怒貶江州司士參軍械送覺延魯至金陵宋齊丘以嘗薦覺使福州上表待罪詔流覺於蘄州延魯於舒州知制誥㑹稽徐鉉史館修撰韓熈載上䟽曰覺延魯罪不容誅但齊丘延巳為之陳請故陛下赦之擅興者不罪則疆埸有生事者矣䘮師者獲存則行陳無效死者矣請行顯戮以重軍威不從中書侍郎同平章事馮延巳罷為太弟少保貶魏岑為太子洗馬韓熈載屢言宋齊丘黨與必為禍亂齊丘奏熈載􅄝酒猖狂貶和州司士參軍乙亥鳯州防禦使石奉頵舉州降蜀奉頵􅀳之宗屬也契丹主至臨城得疾及欒城病甚苦熱聚冰於胷腹手足且啖之丙子至殺胡林而卒國人剖其腹實鹽數斗載之北去􅀳人謂之帝羓趙延壽恨契丹主負約謂人曰我不復入龍沙矣即日先引兵入恒州契丹永康王兀欲及南北二王各以所部兵相繼而入延壽欲拒之恐失大援乃納之時契丹諸將已密議奉兀欲為主兀欲登鼔角樓受叔兄拜而延壽不之知自稱受契丹皇帝遺詔權知南朝軍國事仍下教布告諸道所以供給兀欲與諸將同兀欲衘之恒州諸門管鑰及倉庫出納兀欲皆自主之延壽使人請之不與契丹主䘮至國􅄒律太后不哭曰待諸部寧壹如故則葬汝矣帝之自壽陽還也留兵千人戍承天軍戍兵聞契丹北還不為僃契丹襲擊之戍兵驚潰契丹焚其市邑一日狼煙百餘舉帝曰此虜將遁張虚勢也遣親將葉仁魯將歩􅀐三千赴之㑹契丹出剽掠仁魯乗虚大破之丁丑復取承天軍兾州人殺契丹刺史何行通推牢城指揮使張廷翰知州事廷翰兾州人符習之甥也或說趙延壽曰契丹諸大人數日聚謀此必有變今漢兵不減萬人不若先事圗之延壽猶豫不決壬午延壽下令以來月朔日於待賢館上事受文武官賀其儀宰相樞密使拜於階上節度使以下拜於階下李崧以虜意不同事理難測固請趙延壽未行此禮乃止資治通鑑卷第二百八十六
