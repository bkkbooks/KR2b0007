front:
  text: 資治通鑑卷第一百八十三
  hash: sha256:c428594908026e8ac343f689acb5f7f2619c7487ae5bbe8f4b3d5e2272532642
body:
  text: 臣司馬光奉勑編集隋紀七奮若五月凡一年有竒起柔兆困敦盡強圉赤煬皇帝下大業十二年春正月朝集使不至者二十餘郡始議分遣使者十二道發兵討捕盗賊詔毗陵通守路道徳集十郡兵數萬人於郡東南起宫苑周圍十二里内為十六離宫大抵倣東都西苑之制而竒麗過之又欲築宫於㑹稽㑹亂不果成三月上巳帝與羣臣飲於西苑水上命學士杜寶撰水飾圖經采古水事七十二使朝散大夫黄衮以木為之閒以妓航酒船人物自動如生鍾磬箏瑟能成音曲己丑張金稱陷平恩一朝殺男女萬餘口又陷武安鉅鹿清河諸縣金稱比諸賊尤殘暴所過民無孑遺夏四月丁巳大業殿西院火帝以為盗起驚走入西苑匿草閒火定乃還帝自八年以後每夜眠中恒驚悸云有賊令數婦人搖撫乃得眠癸亥歴山飛别將甄翟兒衆十萬冦太原將軍潘長文敗死五月丙戌朔日有食之既壬午帝於景華宫徴求螢火得數斛夜出遊山放之光遍巖谷帝問侍臣盗賊左翊衛大將軍宇文述曰漸少帝曰比從來少幾何對曰不能什一納言蘇威引身隠柱帝呼前問之對曰臣非所司不委多少但患漸近帝曰何謂也威曰他日賊據長白山今近在汜水且往日租賦丁役今皆何在豈非其人皆化爲盗乎比見奏賊皆不以實遂使失於支計不時翦除又昔在鴈門許罷征遼今復徴發賊何由息帝不悦而罷尋屬五月五日百僚多饋珍玩威獨獻尚書或譛之曰尚書有五子之歌威意甚不遜帝益怒頃之帝問威以伐髙麗事威欲帝知天下多盗對曰今兹之役願不發兵但赦羣盗自可得數十萬遣之東征彼喜於免罪爭務立功髙麗可滅帝不懌威出御史大夫裴藴奏曰此大不遜天下何處有多許賊帝曰老革多姦以賊脅我欲批其口且復隠忍藴知帝意遣河南白衣張行本奏威昔在髙陽典選濫授人官畏怯突厥請還京師帝令案驗獄成下詔數威罪狀除名為民後月餘復有奏威與突厥隂圖不軌者事下裴藴推之藴處威死威無以自明但摧謝而已帝憫而釋之曰未忍即殺遂并其子孫三世皆除名秋七月壬戌濟景公樊子蓋卒江都新作龍舟成送東都宇文述勸幸江都帝從之右候衛大將軍酒泉趙才諫曰今百姓疲勞府藏空竭盗賊蜂起禁令不行願陛下還京師安兆庶帝大怒以才屬吏旬日意解乃出之朝臣皆不欲行帝意甚堅無敢諌者建節尉任宗上書極諫即日於朝堂杖殺之甲子帝幸江都命越王侗與光祿大夫叚達太府卿元文都檢校民部尚書韋津右武衛將軍皇甫無逸右司郎盧楚等揔留後事津孝寛之子也帝以詩留别宫人曰我夢江都好征遼亦偶然奉信郎崔民象以盗賊充斥於建國門上表諫帝大怒先解其頥然後斬之戊辰馮翊孫華舉兵為盗虞世基以盗賊充斥請發兵屯洛口倉帝曰卿是書生定猶恇怯戊辰車駕至鞏敕有司移箕山公路二府於倉内仍令築城以備不虞至汜水奉信郎王愛仁復上表請還西京帝斬之而行至梁郡郡人邀車駕上書曰陛下若遂幸江都天下非陛下之有又斬之是時李子通據海陵左才相掠准北杜伏威屯六合衆各數萬帝遣光祿大夫陳稜將宿衛精兵八千討之往往克捷八月乙巳賊帥趙萬海衆數十萬自恒山冦髙陽冬十月己丑許恭公宇文述卒初述子化及智及皆無頼化及事帝於東宫帝寵昵之及即位以為太僕少卿帝幸榆林化及智及冒禁與突厥交市帝怒將斬之已解衣辮髪既而釋之賜述為奴智及弟士及以尚主之故常輕智及唯化及與之親昵述卒帝復以化及為右屯衛將軍智及為將作少監李密之亡也往依郝孝徳孝徳不禮之又入王薄薄亦不之竒也密困乏至削樹皮而食之匿於淮陽村舍變姓名聚徒教授郡縣疑而捕之密亡去抵其妹夫雍丘令丘君明君明不敢舍匿轉寄密於遊俠王秀才家秀才以女妻之君明從姪懐義告其事帝令懐義自齎敕書與梁郡通守楊汪相知收捕汪遣兵圍秀才宅適值密出外由是獲免君明秀才皆死韋城翟讓為東都灋曹坐事當斬獄吏黄君漢竒其驍勇夜中濳謂讓曰翟灋司天時人事抑亦可知豈能守死獄中乎讓驚喜叩頭曰讓圈牢之豕死生唯黄曹主所命君漢即破械出之讓再拜曰讓蒙再生之恩則幸矣奈黄曹主何因泣下君漢怒曰本以公為大丈夫可救生民之命故不顧其死以奉脱奈何反效兒女子涕泣相謝乎君但努力自免勿憂吾也讓遂亡命於瓦崗為羣盗同郡單雄信驍健善用馬槊聚少年往從之離狐徐世勣家於衛南年十七有勇畧説讓曰東郡於公與勣皆為鄉里人多相識不宜侵掠滎陽梁郡汴水所經剽行舟啇旅足以自資讓然之引衆入二郡界掠公私船資用豐給附者益衆聚徒至萬餘人時又有外黄王當仁濟陽王伯當韋城周文舉雍丘李公逸等皆擁衆為盗李密自雍丘亡命往來諸帥閒説以取天下之策始皆不信乆之稍以為然相謂曰斯人公卿子孫志氣若是今人人皆云楊氏將滅李氏將興吾聞王者不死斯人再三獲濟豈非其人乎由是漸敬密密察諸帥唯翟讓最彊乃因王伯當以見讓為讓畫策往説諸小盗皆下之讓悦稍親近密與之計事密因説讓曰劉項皆起布衣為帝王今主昬於上民怨於下鋭兵盡於遼東和親絶於突厥方乃廵遊楊越委弃東都此亦劉項奮起之㑹也以足下雄才大畧士馬精鋭席卷二京誅滅暴虐隋氏不足亡也讓謝曰吾儕羣盗旦夕偷生草閒君之言者非吾所及也㑹有李􅀇英者自東都逃來經歴諸賊求訪李密云斯人當代隋家人問其故􅀇英言比來民閒謠歌有桃李章曰桃李子皇后繞揚州宛轉花園裏勿浪語誰道許桃李子謂逃亡者李氏之子也皇與后皆君也宛轉花園裏謂天子在揚州無還日將轉於溝壑也莫浪語誰道許者密也既與密遇遂委身事之前宋城尉齊郡房彦藻自負其才恨不為時用預於楊􅀇感之謀變姓名亡命遇密於梁宋之閒遂與之俱遊漢沔徧入諸賊説其豪傑還日從者數百人仍為遊客處於讓營讓見密為豪傑所歸欲從其計猶豫未决有賈雄者曉隂陽占候為讓軍師言無不用密深結於雄使之託術數以説讓雄許諾懐之未發㑹讓召雄告以密所言問其可否對曰吉不可言又曰公自立恐未必成若立斯人事無不濟讓曰如卿言蒲山公當自立何來從我對曰事有相因所以來者將軍姓翟翟者澤也蒲非澤不生故須將軍也讓然之與密情好日篤密因説讓曰今四海糜沸不得耕耘公士衆雖多食無倉廩唯資野掠常苦不給若曠日持乆加以大敵臨之必渙然離散未若先取滎陽休兵館穀待士馬肥充然後與人爭利讓從之於是破金隄關攻滎陽諸縣多下之滎陽大守郇王慶􅀪之子也不能討帝徙張須陁為滎陽通守以討之庚戌須陁引兵擊讓讓曏數為須陁所敗聞其來大懼將避之密曰須陁勇而無謀兵又驟勝既驕且很可一戰擒也公但列陳以待密保為公破之讓不得已勒兵將戰宻分兵千餘人伏於大海寺北林閒須陁素輕讓方陳而前讓與戰不利須陁乘之逐北十餘里密發伏掩之須陁兵敗密與讓及徐世勣王伯當合軍圍之須陁潰圍出左右不能盡出須陁躍馬復入救之來往數四遂戰死所部兵晝夜號哭數日不止河南郡縣爲之䘮氣鷹揚郎將河東賈務本爲須陁之副亦被傷帥餘衆五千餘人奔梁郡務本尋卒詔以光祿大夫裴仁基爲河南道討捕大使代領其衆徙鎮虎牢讓乃令密建牙别綂所部號蒲山公營密部分嚴整凡號令士卒雖盛夏皆如背負霜雪躬服儉素所得金寶悉頒賜麾下由是人爲之用麾下士卒多爲讓士卒所陵辱以威約有素不敢報也讓謂密曰今資糧粗足意欲還向瓦崗公若不往唯公所適讓從此别矣讓帥輜重東引密亦西行至康城説下數城大獲資儲讓尋悔復引兵從密鄱陽賊帥操師乞自稱元興王建元始興攻陷豫章郡以其鄉人林士弘爲大將軍詔治書侍御史劉子翊將兵討之師乞中流矢死士􅀪代綂其衆與子翊戰於彭蠡湖子翊敗死士􅀪兵大振至十餘萬人十二月壬辰士􅀪自稱皇帝國號楚建元太平遂取九江臨川南康宜春等郡豪傑爭殺隋守令以郡縣應之其地北自九江南及番禺皆為所有詔以右驍衛將軍唐公李淵為太原留守以虎賁郎將王威虎牙郎將高君雅為之副將兵討甄翟兒與翟兒遇於雀䑕谷淵衆纔數千賊圍淵數匝李世民將精兵救之抜淵於萬衆之中㑹歩兵至合擊大破之帝疎薄骨肉蔡王智積每不自安及病不呼醫臨終謂所親曰吾今日始知得保首領没於地矣張金稱郝孝徳孫宣雅髙士達楊公卿等冦掠河北屠陷郡縣隋將帥敗亡相繼唯虎賁中郎將蒲城王辯清河郡丞華隂揚善㑹數有功善㑹前後與賊七百餘戰未嘗負敗帝遣太僕楊義臣討張金稱金稱營於平恩東北義臣引兵直進抵臨清之西據永濟渠為營去金稱營四十里深溝高壘不與戰金稱日引兵至義臣營西義臣勒兵擐甲約與之戰既而不出日暮金稱還營明旦復來如是月餘義臣竟不出金稱以為怯屢逼其營詈辱之義臣乃謂金稱曰汝明旦來我當必戰金稱易之不復設備義臣簡精騎二千夜自館陶濟河伺金稱離營即入擊其累重金稱聞之引兵還義臣從後擊之金稱大敗與左右逃於清河之東月餘楊善㑹討擒之吏立木於市懸其頭張其手足令仇家割食之未死間歌謳不輟詔以善㑹為清河通守涿郡通守郭絢將兵萬餘人討髙士達士達自以才畧不及竇建徳乃進建徳為軍司馬悉以兵授之建徳請士達守輜重自簡精兵七千人拒絢詐為與士達有隙而叛遣人請降於絢願為前驅擊士達以自効絢信之引兵隨建徳至長河不復設備建徳襲之殺虜數千人斬絢首獻士達張金稱餘衆皆歸建徳楊義臣乘勝至平原欲入髙雞泊討之建徳謂士達曰歴觀隋將善用兵者無如義臣今滅張金稱而來其鋒不可當請引兵避之使其欲戰不得坐費嵗月將士疲倦然後乘閒擊之乃可破也不然恐非公之敵士達不從留建徳守營自帥精兵逆擊義臣戰小勝因縱酒髙宴建徳聞之曰東海公未能破敵遽自矜大禍至不乆矣後五日義臣大破士達於陳斬之乘勝逐北趣其營營中守兵皆潰建徳與百餘騎亡去至饒陽乘其無備攻陷之收兵得三千餘人義臣既殺士達以為建徳不足憂引去建徳還平原收士達散兵收葬死者為士達發䘮軍復大振自稱將軍先是羣盗得隋官及士族子弟皆殺之獨建德善遇之由是隋官稍以城降之聲勢日盛勝兵至十餘萬人内史侍郎虞世基以帝惡聞賊盗諸將及郡縣有告敗求救者世基皆抑損表狀不以實聞但云䑕竊狗盗郡縣捕逐行當殄盡願陛下勿以介懐帝良以爲然或杖其使者以爲妄言由是盗賊徧海内陷没郡縣帝皆弗之知也楊義臣破降河北賊數十萬列狀上聞帝歎曰我初不聞賊頓如此義臣降賊何多也世基對曰小竊雖多未足爲慮義臣克之擁兵不少乆在閫外此最非宜帝曰卿言是也遽追義臣放散其兵賊由是復盛治書侍御史韋雲起劾奏世基及御史大夫裴藴職典樞要維持内外四方告變不爲奏聞賊數實多裁減言少陛下既聞賊少發兵不多衆寡懸殊往皆不克故使官軍失利賊黨日滋請付有司結正其罪大理卿鄭善果奏雲起詆訾名臣所言不實非毁朝政妄作威權由是左遷雲起為大理司直帝至江都江淮郡官謁見者專問禮餉豐薄豐則超遷丞守薄則率從停解江都郡丞王世充獻銅鏡屏風遷通守歷陽郡丞趙元楷獻異味遷江都郡丞由是郡縣競務刻剝以充貢獻民外為盗賊所掠内為郡縣所賦生計無遺加之饑饉無食民始采樹皮葉或擣藁為末或煑土而食之諸物皆盡乃自相食而官食猶充牣吏皆畏灋莫敢振救王世充密為帝簡閲江淮民閒美女獻之由是益有寵河閒賊帥格謙擁衆十餘萬據豆子䴚自稱燕王帝命王世充將兵討斬之謙將勃海髙開道收其餘衆冦掠燕地軍勢復振初帝謀伐髙麗器械資儲皆積於涿郡涿郡人物殷阜屯兵數萬又臨朔宫多珍寶諸賊競來侵掠留守官虎賁郎將趙什住等不能拒唯虎賁郎將雲陽羅藝獨出戰前後破賊甚衆威名日重什住等隂忌之藝將作亂先宣言以激其衆曰吾輩討賊數有功城中倉庫山積制在留守之官而莫肯散施以濟貧乏將何以勸將士衆皆憤怨軍還郡丞出城候藝藝因執之陳兵而入什住等懼皆來聽命乃發庫物以賜戰士開倉廩以賑貧乏境内咸悅殺不同己者勃海太守唐禕等數人威振燕地栁城懐遠並歸之藝黜栁城太守楊林甫改郡為營州以襄平太守鄧暠為揔管藝自稱幽州揔管突厥數冦北邊詔晉陽留守李淵帥太原道兵與馬邑太守王仁恭擊之時突厥方彊兩軍衆不滿五千仁恭患之淵選善騎射者二千人使之飲食舍止一如突厥或與突厥遇則伺便擊之前後屢㨗突厥頗憚之恭皇帝上義寧元年春正月右禦衛將軍陳稜討杜伏威伏威帥衆拒之稜閉壁不戰伏威遺以婦人之服謂之陳姥稜怒出戰伏威奮擊大破之稜僅以身免伏威乘勝破髙郵引兵據歴陽自稱揔管以輔公祏為長史分遣諸將徇屬縣所至輙下江淮閒小盗爭附之伏威常選敢死之士五千人謂之上募寵遇甚厚有攻戰輙令上募先擊之戰罷閲視有傷在背者即殺之以其退而被擊故也所獲資財皆以賞軍士有戰死者以妻妾殉葬故人自爲戰所向無敵丙辰竇建徳爲壇於樂壽自稱長樂王置百官改元丁丑辛巳魯郡賊帥徐圓朗攻陷東平分兵略地自琅邪以西北至東平盡有之勝兵二萬餘人盧明月轉掠河南至于淮北衆號四十萬自稱無上王帝命江都通守王世充討之世充與戰於南陽大破之斬明月餘衆皆散二月壬午朔方鷹揚郎將梁師都殺郡丞唐世宗據郡自稱大丞相北連突厥馬邑太守王仁恭多受貨賂不能振施郡人劉武周驍勇喜任俠爲鷹揚府校尉仁恭以其土豪甚親厚之令帥親兵屯閤下武周與仁恭侍兒私通恐事泄謀作亂先宣言曰今百姓饑饉僵尸滿道王府君閉倉不賑䘏豈為民父母之意乎衆皆憤怒武周稱疾卧家豪傑來候問武周椎牛縱酒因大言曰壯士豈能坐待溝壑今倉粟爛積誰能與我共取之豪傑皆許諾己丑仁恭坐聽事武周上謁其黨張萬嵗等隨入升階斬仁恭持其首出徇郡中無敢動者於是開倉以賑饑民馳檄境内屬城皆下之收兵得萬餘人武周自稱太守遣使附于突厥李密説翟讓曰今東都空虚兵不素練越王冲㓜留守諸官政令不壹士民離心叚達元文都闇而無謀以僕料之彼非將軍之敵若將軍能用僕計天下可指麾而定也乃遣其黨裴叔方覘東都虚實留守官司覺之始爲守禦之僃且馳表告江都密謂讓曰事勢如此不可不發兵灋曰先則制於已後則制於人今百姓饑饉洛口倉多積粟去都百里有餘將軍若親帥大衆輕行掩襲彼遠未能救又先無豫僃取之如拾遺耳比其聞知吾已獲之發粟以賑窮乏逺近孰不歸附百萬之衆一朝可集枕威養鋭以逸待勞縱彼能來吾有僃矣然後檄召四方引賢豪而資計策選驍悍而授兵柄除亡隋之社稷布將軍之政令豈不盛哉讓曰此英雄之略非僕所堪惟君之命盡力從事請君先發僕爲後殿庚寅密讓將精兵七千人出陽城北踰方山自羅口襲興洛倉破之開倉恣民所取老弱襁負道路相屬朝散大夫時徳叡以尉氏應密前宿城令祖君彦自昌平往歸之君彦珽之子也博學强記文辭贍敏著名海内吏部侍郎薛道衡嘗薦之於髙祖髙祖曰是歌殺斛律明月人兒邪朕不須此輩煬帝即位尤疾其名依常調選東平郡書佐撿校宿城令君彦自負其才􅁪鬱鬱思亂密素聞其名得之大喜引爲上客軍中書檄悉以委之越王侗遣虎賁郎將劉長恭光祿少卿房崱帥歩騎二萬五千討密時東都人皆以密為饑賊盗米烏合易破爭來應募國子三館學士及貴勝親戚皆來從軍器械修整衣服鮮華旌旗鉦鼓甚盛長恭等當其前使河南討捕使裴仁基等將所部兵自汜水西入以掩其後約十一日㑹於倉城南密讓具知其計東都兵先至士卒未朝食長恭等驅之度洛水陳於石子河西南北十餘里密讓選驍雄分為十隊令四隊伏横嶺下以待仁基以六隊陳於石子河東長恭等見密兵少輕之讓先接戰不利密帥麾下横衝之隋兵饑疲遂大敗長恭等解衣濳竄得免奔還東都士卒死者什五六越王侗釋長恭等罪慰撫之密讓盡收其輜重器甲威聲大振讓於是推密為主上密號為魏公庚子設壇場即位稱元年大赦其文書行下稱行軍元帥府其魏公府置三司六衛元帥府置長史以下官屬拜翟讓為上柱國司徒東郡公亦置長史以下官減元帥府之半以單雄信為左武候大將軍徐世勣為右武候大將軍各領所部房彦藻為元帥左長史東郡邴元真為右長史楊徳方為左司馬鄭徳韜為右司馬祖君彦為記室其餘封拜各有差於是趙魏以南江淮以北羣盗莫不響應孟讓郝孝徳王徳仁及濟隂房獻伯上谷王君廓長平李士才淮陽魏六兒李徳謙譙郡張遷魏郡李文相譙郡黑社白社濟北張青特上洛周比洮胡驢賊等皆歸密密悉拜官爵使各領其衆置百營簿以領之道路降者不絶如流衆至數十萬乃命其䕶軍田茂廣築洛口城周四十里而居之密遣房彦藻將兵東略地取安陸汝南淮安濟陽河南郡縣多陷於密鴈門郡丞河東陳孝意與虎賁郎將王智辯共討劉武周圍其桑乾鎮壬寅武周與突厥合兵擊智辯殺之孝意奔還鴈門三月丁夘武周襲破樓煩郡進取汾陽宫獲隋宫人以賂突厥始畢可汗始畢以馬報之兵勢益振又攻陷定襄突厥立武周為定楊可汗遺以狼頭纛武周即皇帝位立妻沮氏為皇后改元天興以衛士楊伏念為尚書左僕射妹婿同縣苑君璋為内史令武周引兵圍鴈門陳孝意悉力拒守乘閒出擊武周屢破之既而外無救援遣閒使詣江都皆不報孝意誓以必死旦暮向詔敕庫俯伏流涕悲動左右圍城百餘日食盡校尉張倫殺孝意以降梁師都略定雕隂􅀪化延安等郡遂即皇帝位國號梁改元永隆始畢遺以狼頭纛號為大度毗伽可汗師都乃引突厥居河南之地攻破鹽川郡左翊衛蒲城郭子和坐事徙榆林㑹郡中大饑子和濳結敢死士十八人攻郡門執郡丞王才數以不恤百姓斬之開倉賑施自稱永樂王改元丑平尊其父為太公以其弟子政為尚書令子端子升為左右僕射有二千餘騎南連梁師都北附突厥各遣子為質以自固始畢以劉武周為定楊天子梁師都為解事天子子和為平楊天子子和固辭不敢當乃更以為屋利設汾隂薛舉僑居金城驍勇絶倫家貲鉅萬交結豪傑雄於西邊為金城府校尉時隴右盗起金城令赦瑗募兵得數千人使舉將而討之夏四月癸未方授甲置酒饗士舉與其子仁果及同黨十三人於座劫瑗發兵囚郡縣官開倉賑施自稱西秦霸王改元秦興以仁果爲齊公少子仁越爲晉公招集羣盗掠官牧馬賊帥宗羅㬋帥衆歸之以爲義興公將軍皇甫綰將兵一萬屯枹罕舉選精鋭二千人襲之遂克枹罕岷山羌酋鍾利俗擁衆二萬歸之舉兵大振更以仁果爲齊王領東道行軍元帥仁越爲晉王兼河州刺史羅㬋爲興王以副仁杲分兵略地取西平澆河二郡未幾盡有隴西之地衆至十三萬李密以孟讓爲揔管齊郡公己丑夜讓帥歩騎二千入東都外郭燒掠豐都市比曉而去於是東都居民悉遷入宫城臺省府寺皆滿鞏縣長柴孝和監察御史鄭頲以城降密密以孝和為䕶軍頲為右長史裴仁基每破賊得軍資悉以賞士卒監軍御史蕭懐靜不許士卒怨之懐靜又屢求仁基長短劾奏之倉城之戰仁基失期不至聞劉長恭等敗懼不敢進屯百花谷固壘自守又恐獲罪於朝李密知其狼狽使人説之啗以厚利賈務本之子閏甫在軍中勸仁基降密仁基曰如蕭御史何閏甫曰蕭君如栖上雞若不知機變在明公一刀耳仁基從之遣閏甫詣密請降密大喜以閏甫為元帥府司兵參軍兼直記室事使之復命遺仁基書慰納之仁基還屯虎牢蕭懐靜密表其事仁基知之遂殺懐靜帥其衆以虎牢降密密以仁基爲上柱國河東公仁基子行儼驍勇善戰密亦以爲上柱國絳郡公密得秦叔寶及東阿程齩金皆用爲驃騎選軍中尤驍勇者八千人分􅀠四驃騎以自衞號曰内軍常曰此八千人足當百萬齩金後更名知節羅士信趙仁基皆帥衆歸密密署爲揔管使各綂所部癸巳密遣裴仁基孟讓帥二萬餘人襲回洛東倉破之遂燒天津橋縱兵大掠東都出兵擊之仁基等敗走密自帥衆屯回洛倉東都兵尚二十餘萬人乘城擊柝晝夜不解甲密攻偃師金墉皆不克乙未還洛口東都城内乏糧而布帛山積至以絹爲汲綆然布以㸑越王侗使人運回洛倉米入城遣兵五千屯豐都市五千屯上春門五千屯北邙山為九營首尾相應以備密丁酉房獻伯陷汝隂淮陽太守趙陁舉郡降密己亥密帥衆三萬復據回洛倉大修營塹以逼東都叚達等出兵七萬拒之辛丑戰於倉北隋兵敗走丁未密使其幕府移檄郡縣數煬帝十罪且曰罄南山之竹書罪無窮決東海之波流惡難盡祖君彦之辭也越王侗遣太常丞元善達閒行賊中詣江都奏稱李密有衆百萬圍逼東都據洛口倉城内無食若陛下速還烏合必散不然者東都决没因歔欷嗚咽帝為之改容虞世基進曰越王年少此輩誑之若如所言善達何緣來至帝乃勃然怒曰善達小人敢廷辱我因使經賊中向東陽催運善達遂為羣盗所殺是後人人杜口莫敢以賊聞世基容貌沈審言多合意特為帝所親愛朝臣無與為比親黨慿之鬻官賣獄賄賂公行其門如市由是朝野共疾怨之内史舍人封徳彛託附世基以世基不閑吏務密為指畫宣行詔命諂順帝意羣臣表疏忤㫖者皆屛而不奏鞫獄用灋多峻文深詆論功行賞則抑削就薄故世基之寵日隆而隋政益壊皆徳彞所為也初唐公李淵娶於神武肅公竇毅生四男建成世民􅀇覇元吉一女適太子千牛備身臨汾柴紹世民聦明勇决識量過人見隋室方亂隂有安天下之志傾身下士散財結客咸得其歡心世民娶右驍衛將軍長孫晟之女右勲衛長孫順徳晟之族弟也與右勲侍池陽劉􅀪基皆避遼東之役亡命在晉陽依淵與世民善左親衛竇琮熾之孫也亦亡命在太原素與世民有隙每以自疑世民加意待之出入卧内琮意乃安晉陽宫監猗氏裴寂晉陽令武功劉文靜相與同宿見城上烽火寂歎曰貧賤如此復逢亂離將何以自存文靜笑曰時事可知吾二人相得何憂貧賤文靜見李世民而異之深自結納謂寂曰此非常人豁達類漢髙神武同魏祖年雖少命世才也寂初未然之文靜坐與李密連昬繫太原獄世民就省之文靜曰天下大亂非髙光之才不能定也世民曰安知其無但人不識耳我來相省非兒女子之情欲與君議大事也計將安出文靜曰今主上南廵江淮李密圍逼東都羣盗殆以萬數當此之際有真主驅駕而用之取天下如反掌耳太原百姓皆避盗入城文靜為令數年知其豪傑一旦收集可得十萬人尊公所將之兵復且數萬一言出口誰敢不從以此乘虚入關號令天下不過半年帝業成矣世民笑曰君言正合我意乃隂部署賔客淵不之知也世民恐淵不從猶豫乆之不敢言淵與裴寂有舊每相與宴語或連日夜文靜欲因寂關説乃引寂與世民交世民出私錢數百萬使龍山令髙斌亷與寂博稍以輸之寂大喜由是日從世民遊情欵益狎世民乃以其謀告之寂許諾㑹突厥冦馬邑淵遣髙君雅將兵與馬邑太守王仁恭并力拒之仁恭君雅戰不利淵恐并獲罪甚憂之世民乘閒屏人説淵曰今主上無道百姓困窮晉陽城外皆為戰場大人若守小節下有冦盗上有嚴刑危亡無日不若順民心興義兵轉禍為福此天授之時也淵大驚曰汝安得為此言吾今執汝以告縣官因取紙筆欲為表世民徐曰世民覩天時人事如此故敢發言必欲執告不敢辭死淵曰吾豈忍告汝汝慎勿出口明日世民復説淵曰今盗賊日繁遍於天下大人受詔討賊賊可盡乎要之終不免罪且世人皆傳李氏當應圖䜟故李金才無罪一朝族滅大人設能盡賊則功髙不賞身益危矣唯昨日之言可以救禍此萬全之策也願大人勿疑淵乃歎曰吾一夕思汝言亦大有理今日破家亡軀亦由汝化家為國亦由汝矣先是裴寂私以晉陽宫人侍淵淵從寂飲酒酣寂從容言曰二郎隂養士馬欲舉大事正為寂以宫人侍公恐事覺并誅為此急計耳衆情已恊公意如何淵曰吾兒誠有此謀事已如此當復奈何正須從之耳帝以淵與王仁恭不能禦冦遣使者執詣江都淵大懼世民與寂等復説淵曰今主昬國亂盡忠無益偏禆失律而罪及明公事已迫矣宜早定計且晉陽士馬精彊宫監蓄積巨萬以茲舉事何患無成代王㓜冲關中豪桀並起未知所附公若鼓行而西撫而有之如探囊中之物耳柰何受單使之囚坐取夷滅乎淵然之密部勒將發㑹帝繼遣使者馳驛赦淵及仁恭使復舊任淵謀亦緩淵之為河東討捕使也請大理司直夏侯端為副端詳之孫也善占候及相人謂淵曰今玉牀搖動帝座不安參墟得嵗必有真人起於其分非公而誰乎主上猜忍尤忌諸李金才既死公不思變通必為之次矣淵心然之及留守晉陽鷹揚府司馬太原許世緒説淵曰公姓在圖籙名應歌謠握五郡之兵當四戰之地舉事則帝業可成端居則亡不旋踵唯公圖之行軍司鎧文水武士彠前太子左勲衛唐憲憲弟儉皆勸淵舉兵儉説淵曰明公北招戎狄南收豪桀以取天下此湯武之舉也淵曰湯武非所敢擬在私則圖存在公則拯亂卿姑自重吾將思之憲邕之孫也時建成元吉尚在河東故淵遷延未發劉文靜謂裴寂曰先發制人後發制於人何不早勸唐公舉兵而推遷不已且公為宫監而以宫人侍客公死可爾何誤唐公也寂甚懼屢趣淵起兵淵乃使文靜詐為敕書發太原西河鴈門馬邑民年二十已上五十已下悉為兵期嵗暮集涿郡擊髙麗由是人情忷忷思亂者益衆及劉武周據汾陽宫世民言於淵曰大人為留守而盗賊竊據離宫不早建大計禍今至矣淵乃集將佐謂之曰武周據汾陽宫吾輩不能制罪當族滅若之何王威等皆懼再拜請計淵曰朝廷用兵動止皆稟節度今賊在數百里内江都在三千里外加以道路險要復有他賊據之以嬰城膠柱之兵當巨猾豕突之勢必不全矣進退維谷何爲而可威等皆曰公地兼親賢同國休戚若俟奏報豈及事機要在平賊專之可也淵陽若不得已而從之者曰然則先當集兵乃命世民與劉文靜長孫順徳劉弘基等各募兵遠近赴集旬日間近萬人仍密遣使召建成元吉於河東柴紹於長安王威髙君雅見兵大集疑淵有異志謂武士彠曰順徳弘基皆背征三侍所犯當死安得將兵欲収按之士彠曰二人皆唐公客若爾必大致紛紜威等乃止留守司兵田徳平欲勸威等按募人之狀士彠曰討捕之兵悉􅀠唐公威君雅但寄坐耳彼何能為徳平亦止晉陽鄉長劉世龍密告淵云威君雅欲因晉祠祈雨為不利五月癸亥夜淵使世民伏兵於晉陽宫城之外甲子旦淵與威君雅共坐視事使劉文靜引開陽府司馬胙城劉政㑹入立庭中稱有密伏淵自威等取狀視之政㑹不與曰所告乃副留守事唯唐公得視之淵陽驚曰豈有是邪視其狀云威君雅濳引突厥入冦君雅攘袂大詬曰此乃反者欲殺我耳時世民已布兵塞衢路文靜因與劉􅀪基長孫順徳等共執威君雅繫獄丙寅突厥數萬衆冦晉陽輕騎入外郭北門出其東門淵命裴寂等勒兵為備而悉開諸城門突厥不能測莫敢進衆以為威君雅實召之也淵於是斬威君雅以徇淵部將王康達將千餘人出戰皆死城中忷懼淵夜遣軍濳出城旦則張旗鳴鼓自他道來如援軍者突厥終疑之留城外二日大掠而去煬帝命監門將軍涇陽龐王虎賁郎將霍世舉將關内兵援東都柴孝和説李密曰秦地山川之固秦漢所慿以成王業者也今不若使翟司徒守洛口裴柱國守回洛明公自簡精鋭西襲長安既克京邑業固兵彊然後東向以平河洛傳檄而天下定矣方今隋失其鹿豪桀競逐不早為之必有先我者悔無及矣密曰此誠上策吾亦思之乆矣但昬主尚存從兵猶衆我所部皆山東人見洛陽未下誰肯從我西入諸將出於羣盗留之各競雌雄如此則大業隳矣孝和曰然則大軍既未可西上僕請間行觀釁密許之孝和與數十騎至陜縣山賊歸之者萬餘人時密兵鋒甚鋭每入苑與隋兵連戰㑹密為流矢所中卧營中丁丑越王侗使叚達與龐玉等夜出兵陳於回洛倉西北密與裴仁基出戰達等大破之殺傷太半密乃弃回洛奔洛口龐玉霍世舉軍于偃師柴孝和之衆聞密退各散去孝和輕騎歸密楊徳方鄭徳韜皆死密以鄭頲為左司馬滎陽鄭乾象為右司馬李建成李元吉弃其弟智雲於河東而去吏執智雲送長安殺之建成元吉遇柴紹於道與之偕行資治通鑑卷第一百八十三
