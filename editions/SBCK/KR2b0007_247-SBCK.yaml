front:
  text: 資治通鑑卷第二百四十七
  hash: sha256:67a44a3ef4fed0cc182467bbe36901d8ae741c245f0730d67e72e334de1c125c
body:
  text: 臣司馬光奉勑編集唐紀六十三困敦七月凡一年有竒起昭陽大淵献盡閼逢武宗至道昭肅孝皇帝中㑹昌三年春正月回鶻烏介可汗帥衆侵逼振武劉沔遣麟州刺史石雄都知兵馬使王逢帥沙陀朱邪赤心三部及契苾拓跋三千騎襲其牙帳沔自以大軍繼之雄至振武登城望回鶻之衆寡見氊車數十乘從者皆衣朱碧類華人使諜問之曰公主帳也雄使諜告之曰公主至此家也當求歸路今將出兵擊可汗請公主潛與侍從相保駐車勿動雄乃鑿城爲十餘穴引兵夜出直攻可汗牙帳至其帳下虜乃覺之可汗大驚不知所爲弃輜重走雄追擊之庚子大破回鶻於殺胡山可汗被瘡與數百􅀐遁去雄迎太和公主以歸斬首萬級降其部落二萬餘人丙午劉沔捷奏至李思忠入朝自以回鶻降將懼邊將猜忌乞并弟思貞等及愛弘順皆歸闕庭上從之庚戌以石雄爲豐州都防禦使烏介可汗走保黒車子族其潰兵多詣幽州降二月庚申朔日有食之詔停歸義軍以其士卒分􅀠諸道爲􅀐兵優給糧賜辛未􅃛戞斯遣使者注吾合索獻名馬二詔太僕卿趙蕃飲勞之甲戌上引對班在勃海使之上上欲令趙蕃就頡戞斯求安西北庭李徳裕等上言安西去京師七千餘里北庭五千餘里借使得之當復置都護以唐兵萬人戍之不知此兵於何處追􅀤饋運從何道得通此乃用實費以易虛名非計也上乃止中書侍郎同平章事崔珙罷為右僕射􅃛戞斯求冊命李徳裕奏宜與之結歡令自將兵求殺使者罪人及討黒車子上恐加可汗之名即不脩臣禮踵回鶻故事求嵗遺及賣馬猶豫未決徳裕奏􅃛戞斯已自稱可汗今欲藉其力恐不可吝此名回鶻有平安史之功故嵗賜絹二萬匹且與之和市􅃛戞斯未甞有功於中國豈敢遽求賂遺乎若慮其不臣當與之約必如回鶻稱臣乃行冊命又當叙同姓以親之使執子孫之禮上從之庚寅太和公主至京師改封安定大長公主詔宰相帥百官迎謁於章敬寺前公主詣光順門去盛服脫簪珥謝回鶻負恩和親無狀之罪上遣中使慰諭然後入宫陽安等六公主不來慰問安定公主各罰俸物及封絹賜魏博節度使何重順名弘敬三月以太僕卿趙蕃為安撫􅃛戞斯使上命李徳裕草賜􅃛戞斯可汗書諭以貞觀二十一年􅃛戞斯先君身自入朝授左屯衛將軍堅昆都督迄于天寳朝貢不絶比為回鶻所隔回鶻陵虐諸蕃可汗能復讎雪怨茂功壯節近古無儔今回鶻殘兵不滿千人散投山谷可汗既與為怨須盡殱夷儻留餘燼必生後患又聞可汗受氏之原與我同族國家承北平太守之後可汗乃都尉苖裔以此合族尊卑可知今欲冊命可汗特加美號緣未知可汗之意且遣諭懷待趙蕃回日别命使展禮自回鶻至塞上及􅃛戞斯入貢每有詔敕上多命徳裕草之徳裕請委翰林學士上曰學士不能盡人意須卿自為之劉沔奏歸義軍回鶻三千餘人及酋長四十三人凖詔分􅀠諸道皆大呼連營據呼沱河不肯從命已盡誅之回鶻降幽州者前後三萬餘人皆散􅀠諸道李徳裕追論維州悉怛謀事云維州據髙山絶頂三面臨江在戎虜平川之衝是漢地入兵之路初河隴盡沒唯此獨存吐蕃潛以婦人嫁此州門者二十年後兩男長成竊開壘門引兵夜入遂為所陷號曰無憂城從此得併力於西邉更無虞於南路憑陵近甸旰食累朝貞元中韋臯欲經略河湟須此城為始萬旅盡銳急攻數年雖擒論莽熱而還城堅卒不可克臣初到西蜀外楊國威中緝邊僃其維州熟臣信令空壁來歸臣始受其降南蠻震懾山西八國皆願内屬其吐蕃合水棲雞等城既失險阨自須抽歸可減八處鎭兵坐収千餘里舊地且維州未降前一年吐蕃猶圍魯州豈顧盟約臣受降之初指天為誓面許奏聞各加酬賞當時不與臣者望風疾臣詔臣執送悉怛謀等令彼自戮臣寧忍以三百餘人命弃信偷安累表陳論乞垂矜捨荅詔嚴切竟令執還體僃三木輿於竹畚及將就路寃呌嗚嗚將吏對臣無不隕涕其部送者更為蕃帥譏誚云既已降彼何須送來復以此降人戮於漢境之上恣行殘忍用固􅂝離至乃擲其嬰孩承以槍槊絶忠款之路快兇虐之情從古已來未有此事雖時更一紀而運屬千年乞追奬忠魂各加襃贈詔贈悉怛謀右衛將軍臣光曰論者多疑維州之取捨不能決牛李之是非臣以為昔荀呉圍鼓鼓人或請以城叛呉弗許曰或以吾城叛吾所甚惡也人以城來吾獨何好焉吾不可以欲城而邇姦使鼓人殺叛者而繕守僃是時唐新與吐蕃修好而納其維州以利言之則維州小而信大以害言之則維州緩而􅀜中急然則為唐計者宜何先乎悉怛謀在唐則為向化在吐蕃不免為叛臣其受誅也又何矜焉且徳裕所言者利也僧孺所言者義也匹夫徇利而忘義猶恥之况天子乎譬如鄰人有牛逸而入於家或勸其兄歸之或勸其弟攘之勸歸者曰攘之不義也且致訟勸攘者曰彼甞攘吾羊矣何義之拘牛大畜也鬻之可以富家以是觀之牛李之是非端可見矣夏四月辛未李徳裕乞退就閑􅈰上曰卿每辭位使我旬日不得所今大事皆未就卿豈得求去初昭義節度使劉從諫累表言仇士良罪惡士良亦言從諫窺伺朝廷及上即位從諫有馬髙九尺獻之上不受從諫以爲士良所爲怒殺其馬由是與朝廷相猜恨遂招納亡命繕完兵械鄰境皆潛爲之僃從諫榷馬牧及商旅嵗入錢五万緡又賣鐵煑鹽亦數万緡大商皆假以牙職使通好諸道因爲販易商人􅀝從諫勢所至多陵轢將吏諸道皆惡之從諫疾病謂妻裴氏曰吾以忠直事朝廷而朝廷不明我志諸道皆不我與我死它人主此軍則吾家無炊火矣乃與幕客張谷陳􅀭庭謀效河北諸鎭以弟右驍衛將軍從素之子稹爲牙内都知兵馬使從子匡周爲中軍兵馬使孔目官王恊爲押牙親事兵馬使以奴李士貴爲使宅十將兵馬使劉守義劉守忠董可武崔玄度分將牙兵谷鄆州人􅀭庭洪州人也從諫尋薨稹秘不􅀤喪王恊為稹謀曰正當如寳曆年様為之不出百日旌節自至但嚴奉監軍厚遺敇使四境勿出兵城中暗為僃而已使押牙姜崟奏求國醫上遣中使解朝政以醫往問疾稹又逼監軍崔士康奏稱從諫疾病請命其子稹為留後上遣供奉官薛士幹往諭指云恐從諫疾未平宜且就東都療之俟稍瘳别有任使仍遣稹入朝必厚加官爵上以澤潞事謀於宰相宰相多以為回鶻餘燼未滅邊鄙猶須警僃復討澤潞國力不支請以劉稹權知軍事諫官及羣臣上言者亦然李徳裕獨曰澤潞事體與河朔三鎭不同河朔習亂已乆人心難化是故累朝以來置之度外澤潞近處心腹一軍素稱忠義甞破走朱滔擒盧從史頃時多用儒臣為帥如李抱眞成立此軍徳宗猶不許承襲使李緘護喪歸東都敬宗不恤國務宰相又無逺略劉悟之死因循以授從諫從諫跋扈難制累上表廹脅朝廷今垂死之際復以兵權擅付豎子朝廷若又因而授之則四方諸鎭誰不思效其所為天子威令不復行矣上曰卿以何術制之果可克否對曰稹所恃者河朔三鎭但得鎭魏不與之同則稹無能為也若遣重臣往諭王元逵何弘敬以河朔自艱難以來列聖許其傳襲已成故事與澤潞不同今朝廷將加兵澤潞不欲更出禁軍至山東其山東三州􅀠昭義者委兩鎭攻之兼令徧諭將士以賊平之日厚加官賞茍兩鎭聽命不從旁沮橈官軍則稹必成擒矣上喜曰吾與徳裕同之保無後悔遂決意討稹羣臣言者不復入矣上命徳裕草詔賜成徳節度使王元逵魏博節度使何弘敬其略曰澤潞一鎭與卿事體不同勿為子孫之謀欲存輔車之勢但能顯立功效自然福及後昆丁丑上臨朝稱其語要切曰當如此直告之是也又賜張仲武詔以回鶻餘燼未滅塞上多虞專委卿禦侮元逵弘敬得詔悚息聽命解朝政至上黨劉稹見朝政曰相公危困不任拜詔朝政欲突入兵馬使劉武徳董可武躡簾而立朝政恐有它變遽走出稹贈賮直數千緍復遣牙將梁叔文入謝薛士幹入境俱不問從諫之疾直為已知其死之意都押牙郭誼等乃大出軍至龍泉驛迎􅀱敕使請用河朔事體又見監軍言之崔士康懦怯不敢違於是將吏扶稹出見士衆􅀤喪士幹竟不得入牙門稹亦不受敇命誼兖州人也解朝政復命上怒杖之配恭陵囚姜崟梁叔文辛巳始為從諫輟朝贈太傅詔劉稹護喪歸東都又召見劉從素令以書諭稹稹不從丁亥以忠武節度使王茂元為河陽節度使邠寧節度使王宰為忠武節度使茂元栖曜之子宰智興之子也黄州刺史杜牧上李徳裕書自言甞問淮西將董重質以三州之衆四嵗不破之由重質以為由朝廷徴兵太雜客軍數少既不能自成一軍事須帖付地主勢羸力弱心志不一多致敗亡故初戰二年以來戰則必勝是多殺客軍及二年已後客軍殫少止與陳許河陽全軍相搏縱使唐州兵不能因雪取城蔡州事力亦不支矣其時朝廷若使鄂州夀州唐州只保境不用進戰但用陳許鄭滑兩道全軍帖以宣潤弩手令其守隘即不出一嵗無蔡州矣今者上黨之叛復與淮西不同淮西為寇僅五十嵗其人味為寇之􅃾見為寇之利風俗益固氣燄已成自以為天下之兵莫與我敵根深源闊取之固難夫上黨則不然自安史南下不甚附􅀠建中之後每奮忠義是以郳公抱眞能窘田恱走朱滔常以孤窮寒苦之軍横折河朔彊梁之衆以此證驗人心忠赤習尚專一可以盡見劉悟卒從諫求繼與扶同者只鄆州隨來中軍二千耳值寳曆多故因以授之今纔二十餘嵗風俗未改故老尚存雖欲劫之必不用命今成徳魏博雖盡節效順亦不過圍一城攻一堡係纍穉老而已若使河陽万人爲壘窒天井之口髙壁深塹勿與之戰只以忠武武寧兩軍帖以青州五千精甲宣潤二千弩手徑擣上黨不過數月必覆其巢穴矣時徳裕制置澤潞亦頗采牧言上雖外尊寵仇士良内實忌惡之士良頗覺之遂以老病求散秩詔以左衛上將軍兼内侍監知省事李徳裕言於上曰議者皆云劉悟有功稹未可亟誅宜全恩禮請下百官議以盡人情上曰悟亦何功當時迫於救死耳非素心徇國也藉使有功父子爲將相二十餘年國家報之足矣稹何得復自立朕以爲凡有功當顯賞有罪亦不可苟免也徳􅁉曰陛下之言誠得理國之要五月李徳􅁉言太子賔客分司李宗閔與劉從諫交通不宜寘之東都戊戌以宗閔爲湖州刺史河陽節度使王茂元以步􅀐三千守萬善河東節度使劉沔步􅀐二千守芒車闗步兵一千五百軍榆社成徳節度使王元逵以步􅀐三千守臨洺掠堯山河中節度使陳夷行以步騎一千守翼城步兵五百益兾氏辛丑制削奪劉從諫及子稹官爵以元逵爲澤潞北面招討使何弘敬為南面招討使與夷行劉沔茂元合力攻討先是河北諸鎭有自立者朝廷必先有弔祭使次冊贈使宣慰使繼往商度軍情必不可與節則别除一官俟軍中不聽出然後始用兵故常及半嵗軍中得繕完為僃至是宰相亦欲且遣使開諭上即命下詔討之王元逵受詔之日出師屯趙州壬寅以翰林學士承㫖崔鉉為中書侍郎同平章事鉉元略之子也上夜召學士韋琮以鉉名授之令草制宰相樞密皆不之知時樞密使劉行深楊欽義皆愿慤不敢預事老宦者尤之曰此由劉楊懦怯墮敗舊風故也悰乾度之子也以武寧節度使李彦佐為晉絳行營諸軍節度招討使劉沔自代州還太原築望仙觀於禁中六月王茂元遣兵馬使馬繼等將步騎二千軍於天井闗南科斗店劉稹遣衙内十將薛茂卿將親軍二千拒之􅃛戞斯可汗遣將軍温仵合入貢上賜之書諭以速平回鶻黒車子乃遣使行冊命癸酉仇士良以左衛上將軍内侍監致仕其黨送歸私第士良教以固權寵之術曰天子不可令閑常宜以奢靡娯其耳目使日新月盛無暇更及它事然後吾輩可以得志愼勿使之讀書親近儒生彼見前代興亡心知憂懼則吾輩踈斥矣其黨拜謝而去丙子詔王元逵李彦佐劉沔王茂元何弘敬以七月中旬五道齊進劉稹求降皆不得受又詔劉沔自將兵取仰車闗路以臨賊境吐蕃鄯州節度使尚婢婢丗爲吐蕃相婢婢好讀書不樂仕進國人敬之年四十餘彞泰賛普彊起之使鎭鄯州婢婢寛厚沈勇有謀略訓練士卒多精勇論恐熱雖名義兵實謀簒國忌婢婢恐襲其後欲先滅之是月大舉兵擊婢婢旌旗雜畜千里不絶至鎭西大風震電天火燒殺禆將十餘人雜畜以百數恐熱惡之盤􅁊不進婢婢謂其下曰恐熱之來視我如螻蟻以爲不足屠也今遇天災猶豫不進吾不如迎伏以却之使其志益驕而不爲僃然後可圖也乃遣使以金帛牛酒犒師且致書言相公舉義兵以匡國難闔境之内孰不向風茍遣一介賜之折簡敢不承命何必逺辱士衆親臨下藩婢婢資性愚僻惟嗜讀書先賛普授以藩維誠為非據夙夜慙惕惟求退居相公若賜以骸骨聽歸田里乃愜平生之素願也恐熱得書喜徧示諸將曰婢婢惟把書卷安知用兵待吾得國當位以宰相坐之於家亦無所用也乃復為書勤厚荅之引兵歸婢婢聞之撫髀笑曰我國無主則歸大唐豈能事此犬䑕乎秋七月以山南東道節度使盧鈞為昭義節度招撫使朝廷以鈞在襄陽寛厚有惠政得衆心故使領昭義以招懷之上遣刑部侍郎兼御史中丞李回宣慰河北三鎭令幽州乗秋早平回鶻鎭魏早平澤潞回太祖之八丗孫也甲辰李徳裕言於上曰臣見曏日河朔用兵諸道利於出境仰給度支或隂與賊通借一縣一柵據之自以為功坐食轉輸延引嵗時今請賜諸軍詔指令王元逵取邢州何弘敬取洺州王茂元取澤州李彦佐劉沔取潞州毋得取縣上從之晉絳行營節度使李彦佐自􅀤徐州行甚緩又請休兵於絳州兼請益兵李徳裕言於上曰彦佐逗遛顧望殊無討賊之意所請皆不可許宜賜詔切責令進軍翼城上從之徳裕因請以天徳防禦使石雄為彦佐之副俟至軍中令代之乙巳以雄為晉絳行營節度副使仍詔彦佐進屯翼城劉稹上表自陳亡父從諫為李訓雪寃言仇士良罪惡由此為權倖所疾謂臣父潛懷異志臣所以不敢舉族歸朝乞陛下稍垂寛察活臣一方何弘敬亦為之奏雪皆不報李回至河朔何弘敬王元逵張仲武皆具櫜鞬郊迎立於道左不敢令人控馬讓制使先行自兵興以來未之有也回明辯有膽氣三鎭無不奉詔王元逵奏拔宣務柵擊堯山劉稹遣兵救堯山元逵擊敗之詔切責李彦佐劉沔王茂元使速進兵逼賊境且稱元逵之功以激厲之加元逵同平章事八月乙丑昭義大將李丕來降議者或謂賊故遣丕降欲以疑誤官軍李徳裕言於上曰自用兵半年未有降者今安問誠之與詐且須厚賞以勸將來但不可置之要地耳上從容言文宗好聽外議諫官言事多不著名有如匿名書李徳裕曰臣頃在中書文宗猶不爾此乃李訓鄭注教文宗以術御下遂成此風人主但當推誠任人有欺罔者威以明刑孰敢哉上善之王元逵前鋒入邢州境已踰月何弘敬猶未出師元逵屢有密表稱弘敬懷兩端丁卯李徳裕上言忠武累戰有功軍聲頗振王宰年力方壯謀略可稱請賜弘敬詔以河陽河東皆閡山險未能進軍賊屢出兵焚掠晉絳今遣王宰將忠武全軍徑魏愽直抵磁州以分賊勢弘敬必懼此攻心伐謀之術也從之詔宰悉選步騎精兵自相魏趣磁州甲戌薛茂卿破科斗寨擒河陽大將馬繼等焚掠小寨一十七距懷州纔十餘里茂卿以無劉稹之命故不敢入時議者鼎沸以爲劉悟有功不可絶其嗣又從諫養精兵十萬糧支十年如何可取上亦疑之以問李徳􅁉對曰小小進退兵家之常願陛下勿聽外議則成功必矣上乃謂宰相曰爲我語朝士有上䟽沮議者我必於賊境上斬之議者乃止何弘敬聞王宰將至恐忠武兵入魏境軍中有變蒼黄出師丙子弘敬奏已自將全軍度漳水趣磁州庚辰李徳􅁉上言河陽兵力寡弱自科斗店之敗賊勢愈熾王茂元復有疾人情危怯欲退保懷州臣竊見元和以來諸賊常視官軍寡弱之處併力攻之一軍不支然後更攻它處今魏􅀶未與賊戰西軍閡險不進故賊得併力南下若河陽退縮不惟虧沮軍聲兼恐震驚洛師望詔王宰更不之磁州亟以忠武軍應援河陽不惟扞蔽東都兼可臨制魏博若慮全軍供餉難給且令􅀤先鋒五千人赴河陽亦足張聲勢甲申又奏請敕玉宰以全軍繼進仍急以器械繒帛助河陽窘乏上皆從之王茂元軍萬善劉稹遣牙將張巨劉公直等㑹薛茂卿共攻之期以九月朔圍萬善乙酉公直等潛師先過萬善南五里焚雍店巨引兵繼之過萬善覘知城中守僃單弱欲專有功遂攻之日昊城且拔乃使人告公直等時義成軍適至茂元困急欲帥衆弃城走都虞候孟章遮馬諫曰賊衆自有前却半在雍店半在此乃亂兵耳今義成軍纔至尚未食聞僕射走則自潰矣願且强留茂元乃止㑹日暮公直等不至巨引兵退始登山微雨晦黒自相驚曰追兵近矣皆走人馬相踐墜崖谷死者甚衆上以王茂元王宰兩節度使共處河陽非宜庚寅李徳裕等奏茂元習吏事而非將才請以宰為河陽行營攻討使茂元病愈止令鎭河陽病困亦免它虞九月辛卯以宰兼河陽行營攻討使何弘敬奏拔肥鄉平恩殺傷甚衆得劉稹牓帖皆謂官軍為賊云遇之即須痛殺癸巳上謂宰相何弘敬已克兩縣可釋前疑既有殺傷雖欲持兩端不可得已乃加弘敬檢校左僕射丙午河陽奏王茂元薨李徳裕奏王宰止可令以忠武節度使將萬善營兵不可使兼領河陽恐其不愛河陽州縣恣爲侵擾又河陽節度先領懷州刺史常以判官攝事割河南五縣租賦􅀠河陽不若遂以五縣置孟州其懷州别置刺史俟昭義平日仍割澤州􅀠河陽節度則太行之險不在昭義而河陽遂爲重鎭東都無復憂矣上采其言戊申以河南尹敬昕爲河陽節度懷孟觀察使王宰將行營以扞敵昕供饋餉而已庚戌以石雄代李彦佐爲晉絳行營節度使令自冀氏取潞州仍分兵屯翼城以僃侵軼是月吐蕃論恐熱屯大夏川尚婢婢遣其將厖結心及莽羅薛呂將精兵五萬擊之至河州南莽羅薛呂伏兵四萬於險阻厖結心伏萬人於栁林中以千騎登山飛矢繫書罵之恐熱怒將兵數萬追之厖結心陽敗走時為馬乏不進之狀恐熱追之益急不覺行數十里伏兵􅀤斷其歸路夾擊之㑹大風飛沙溪谷皆溢恐熱大敗伏尸五十里溺死者不可勝數恐熱單騎遁歸石雄代李彦佐之明日即引兵踰烏嶺破五寨殺獲千計時王宰軍萬善劉沔軍石㑹皆顧望未進上得雄捷書喜甚冬十月庚申臨朝謂宰相曰雄眞良將李徳裕因言比年前潞州市有男子磬折唱曰石雄七千人至矣劉從諫以為妖言斬之破潞州者必雄也詔賜雄帛為優賞雄悉置軍門自依士卒例先取一匹餘悉分將士故士卒樂為之致死初劉沔破回鶻得太和公主張仲武疾之由是有隙上使李回至幽州和解之仲武意終不平朝廷恐其以私憾敗事辛未徙沔為義成節度使以前荆南節度使李石為河東節度使党項冦鹽州以前武寧節度使李彦佐為朔方靈鹽節度使十一月邠寕奏党項入冦李徳裕奏党項愈熾不可不為區處聞党項分􅀠諸鎭剽掠於此則亡逃歸彼節度使各利其駝馬不為擒送以此無由禁戢臣屢奏不若使一鎭統之陛下以為一鎭專領党項權太重臣今請以皇子兼統諸道擇中朝㢘幹之臣為之副居於夏州理其辭訟庶為得宜乃以兖王岐為靈夏等六道元帥兼安撫党項大使又以御史中丞李回為安撫党項副使史館修撰鄭亞為元帥判官令齎詔往安撫党項及六鎭百姓安南經略使武渾役將士治城將士作亂燒城樓劫府庫渾奔廣州監軍叚士則撫安亂衆忠武軍素號精勇王宰治軍嚴整昭義人甚憚之薛茂卿以科斗寨之功意望超遷或謂劉稹曰留後所求者節耳茂卿太深入多殺官軍激怒朝廷此節所以來益遲也由是無賞茂卿愠懟密與王宰通謀十一月丁巳宰引兵攻天井闗茂卿小戰遽引兵走宰遂克天井闗守之闗東西寨聞茂卿不守皆退走宰遂焚大小箕村茂卿入澤州密使諜召宰進攻澤州當為内應宰疑不敢進失期不至茂卿拊膺頓足而已稹知之誘茂卿至潞州殺之并其族以兵馬使劉公直代茂卿安全慶守烏嶺李佐堯守彫黄嶺郭僚守石㑹康良佺守武鄉僚誼之姪也戊辰王宰進攻澤州與劉公直戰不利公直乗勝復天井闗甲戌宰進擊公直大破之遂圍陵川克之河東奏克石㑹闗洺州刺史李恬石之從兄也石至太原劉稹遣軍將賈羣詣石以恬書與石云稹願舉族歸命相公奉從諫喪歸葬東都石囚羣以其書聞李徳裕上言今官軍四合捷書日至賊勢窮蹙故偽輸誠款兾以緩師稍得自完復來侵軼望詔石荅恬書云前書未敢聞奏若郎君誠能悔過舉族面􅅞待罪境上則石當親往受降護送歸闕若虛為誠款先求解兵次望洗雪則石必不敢以百口保人仍望詔諸道乗其上下離心速進兵攻討不過旬朔必内自生變上從之右拾遺崔碣上䟽請受其降上怒貶碣鄧城令初劉沔破回鶻留兵三千戍横水柵河東行營都知兵馬使王逢奏乞益榆社兵詔河東以兵二千赴之時河東無兵守倉庫者及工匠皆出從軍李石召横水戍卒千五百人使都將楊弁將之詣逢壬午戍卒至太原先是軍士出征人給絹二匹劉沔之去竭府庫自隨石初至軍用乏以已絹益之人纔得一匹時已嵗盡軍士求過正旦而行監軍呂義忠累牒趣之楊弁因衆心之怒又知城中空虛遂作亂四年春正月乙酉朔楊弁帥其衆剽掠城市殺都頭梁季叶李石奔汾州弁據軍府釋賈羣之囚使其姪與之俱詣劉稹約爲兄弟稹大喜石㑹􅀜守將楊珍聞太原亂復以闗降於稹戊子呂義忠遣使言狀朝議喧然或言兩地皆應罷兵王宰又上言遊弈將得劉稹表臣近遣人至澤潞賊有意歸附若許招納乞降詔命李徳􅁉上言宰擅受稹表遣人入賊中曾不聞奏觀宰意似欲擅招撫之功昔韓信破田榮李靖擒頡利皆因其請降潛兵掩襲止可令王宰失信豈得損朝廷威命建立竒功實在今日必不可以太原小擾失此事機望即遣供奉官至行營督其進兵掩其無僃必須劉稹與諸將皆舉族面􅅞方可受納兼遣供奉官至晉絳行營密諭石雄以王宰若納劉稹則雄無功可紀雄於垂成之際須自取竒功勿失此便又為相府與宰書言昔王承宗雖逆命猶遣弟承恭奉表詣張相祈哀又遣其子知感知信入朝憲宗猶未之許今劉稹不詣尚書面縛又不遣血屬祈哀置章表於衢路之閒遊弈將不即毁除實恐非是况稹與楊弁通姦逆狀如此而將帥大臣容受其詐是私惠歸於臣下不赦在於朝廷事體之閒交恐不可自今更有章表宜即所在焚之惟面􅅞而來始可容受徳裕又上言太原人心從來忠順止是貧虛賞犒不足况千五百人何能為事必不可姑息寛縱且用兵未罷深慮所在動心頃張延賞為張朏所逐逃奔漢州還入成都望詔李石義忠還赴太原行營召旁近之兵討除亂者上皆從之是時李石已至晉州詔復還太原辛卯詔王逢悉留太原兵守榆社以易定千騎宣武兖海步兵三千討楊弁又詔王元逵以步騎五千自土門入應接逢軍忻州刺史李丕奏楊弁遣人來為遊說臣已斬之兼斷其北出之路􅀤兵討之辛丑上與宰相議太原事李徳裕曰今太原兵皆在外為亂者止千餘人諸州鎭必無應者計不日誅翦惟應速詔王逢進軍至城下必自有變上曰仲武見鎭魏討澤潞有功必有慕羨之心使之討太原何如徳裕對曰鎭州趣太原路最便近仲武去年討回鶻與太原爭功恐其不戢士卒平人受害乃止上遣中使馬元實至太原曉諭亂兵且覘其彊弱楊弁與之酣飲三日且賂之戊申元實自太原還上遣詣宰相議之元實於衆中大言相公須早與之節李徳裕曰何故元實曰自牙門至栁子列十五里曵地光明甲若之何取之徳裕曰李相正以太原無兵故􅀤横水兵赴榆社庫中之甲盡在行營弁何能遽致如此之衆乎元實曰太原人勁悍皆可為兵弁召募所致耳徳裕曰召募須有貨財李相止以欠軍士絹一匹無從可得故致此亂弁何從得之元實辭屈徳裕曰從其有十五里光明甲必須殺此賊因奏稱楊弁微賊決不可恕如國力不及寧捨劉稹河東兵戍榆社者聞朝廷令客軍取太原恐妻孥為所屠滅乃擁監軍呂義忠自取太原壬子克之生擒楊弁盡誅亂卒三月甲寅朔日有食之乙卯呂義忠奏克太原丙辰李徳裕言於上曰王宰乆應取澤州今已遷延兩月盖宰與石雄素不叶今得澤州距上黨猶二百里而石雄所屯距上黨纔百五十里宰恐攻澤州綴昭義大軍而雄得乘虛入上黨獨有其功耳又宰生子晏實其父智興愛而子之晏實今為磁州刺史為劉稹所質宰之顧望不敢進或為此也上命徳裕草詔賜宰督其進兵且曰朕顧兹小冦終不貸刑亦知晏實是卿愛弟將申大義在抑私懷丁巳以李石為太子少傅分司以河中節度使崔元式為河東節度使石雄為河中節度使元式元略之弟也己未石雄拔良馬等三寨一堡辛酉太原獻楊弁及其黨五十四人皆斬於狗脊嶺壬申李徳裕言於上曰事固有激􅀤而成功者陛下命王宰趣磁州而何弘敬出師遣客軍討太原而戍兵先取楊弁今王宰乆不進軍請徙劉沔鎭河陽仍令以義成精兵二千直抵萬善處宰肘腋之下若宰識朝廷此意必不敢淹留若宰進軍沔以重兵在南聲勢亦壯上曰善戊寅以義成節度使劉沔為河陽節度使王逢擊昭義將康良佺敗之良佺弃石㑹関退屯鼓􅆎嶺􅃛戞斯遣將軍諦徳伊斯難珠等入貢言欲徙居回鶻牙帳請􅀤兵之期集㑹之地上賜詔諭以今秋可汗擊回鶻黒車子之時當令幽州太原振武天徳四鎭出兵要路邀其亡逸便申冊命並依回鶻故事朝廷以回鶻衰微吐蕃内亂議復河湟四鎭十八州乃以給事中劉濛爲巡邊使使之先僃器械糗糧及詗吐蕃守兵衆寡又令天徳振武河東訓卒礪兵以俟今秋􅃛戞斯擊回鶻邀其潰敗之衆南來者皆委濛與節度團練使詳議以聞濛晏之孫也以道士趙歸眞爲右街道門教授先生吐蕃論恐熱之將岌藏豐賛惡恐熱殘忍降於尚婢婢恐熱􅀤兵擊婢婢於鄯州婢婢分兵爲五道拒之恐熱退保東谷婢婢爲木柵圍之絶其水原恐熱將百餘􅀐突圍走保薄寒山餘衆皆降於婢婢夏四月王宰進攻澤州上好神仙道士趙歸眞得幸諫官屢以為言丙子李徳裕亦諫曰歸眞敬宗朝罪人不宜親近上曰朕宮中無事時與之談道滌煩耳至於政事朕必問卿等與次對官雖百歸眞不能惑也徳裕曰小人見勢利所在則奔趣之如夜蛾之投燭閒旬日以來歸眞之門車馬輻凑願陛下深戒之戊寅以左僕射王起同平章事充山南西道節度使起以文臣未甞執政直除使相前無此比固辭上曰宰相無内外之異朕有闕失卿飛表以聞李徳裕以州縣佐官太冗奏令吏部郎中栁仲郢裁減六月仲郢奏減一千二百一十四貟仲郢公綽之子也宦官有􅀤仇士良宿惡於其家得兵仗數千詔削其官爵籍沒家貲秋七月辛卯上與李徳裕議以王逢將兵屯翼城上曰聞逢用法太嚴有諸對曰臣亦甞以此詰之逢言前有白刄法不嚴其誰肯進上曰言亦有理卿更召而戒之徳裕因言劉稹不可赦上曰固然徳裕曰昔李懷光未平京師蝗旱米斗千錢太倉米供天子及六宫無數旬之儲徳宗集百官遣中使馬欽緒詢之左散騎常侍李泌取桐葉􅅮破以授欽緒獻之徳宗召問其故對曰陛下與懷光君臣之分如此葉不可復合矣由是徳宗意定既破懷光遂用為相獨任數年上曰亦大是竒士上聞楊州倡女善為酒令敕淮南監軍選十七人獻之監軍請節度使杜悰同選且欲更擇良家美女教而獻之悰曰監軍自受敇悰不敢預聞監軍再三請之不從監軍怒具表其狀上覽表黙然左右請并敇節度使同選上曰敇藩方選倡女入宫豈聖天子所為杜悰不徇監軍意得大臣體眞宰相才也朕甚愧之遽敇監軍勿復選甲辰以悰同平章事兼度支鹽鐵轉運使及悰中謝上勞之曰卿不從監軍之言朕知卿有致君之心今相卿如得一魏徴矣資治通鑑卷第二百四十七
