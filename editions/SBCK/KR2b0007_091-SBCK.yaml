body:
  text: 初蓬陂塢主陳川自稱陳留太守祖逖之攻樊雅也川遣其將李頭助之頭力戰有功逖厚遇之頭每嘆曰得此人為主吾死無恨川聞而殺之頭黨馮寵帥其衆降逖川益怒大掠豫州諸郡逖遣兵擊破之夏四月川以浚儀叛降石勒周撫之敗走也徐龕部將于藥追斬之及朝廷論功而劉遐先之龕怒以泰山叛降石勒自稱兖州刺史漢主曜還都長安立妃羊氏為皇后子熈為皇太子封子襲為長樂王闡為太原王冲為淮南王敞為齊王高為魯王徽為楚王諸宗室皆進封郡王羊氏即故惠帝后也曜嘗問之曰吾何如司馬家兒羊氏曰陛下開基之聖主彼亡國之暗夫何可並言彼貴為帝王有一婦一子及身三耳曽不能庇妾於爾時實不欲生意謂世間男子皆然自奉巾櫛已來始知天下自有丈夫耳曜甚寵之頗干預國事南陽王保自稱晉王改元建康置百官以張寔為征西大將軍開府儀同三司陳安自稱秦州刺史降于漢又降于成上邽大饑士衆困迫張春奉保之南安祁山寔遣韓璞帥步騎五千救之陳安退保緜諸保歸上邽未㡬保復為安所逼寔遣其將宋毅救之安乃退江東大饑詔百官各上封事益州刺史應詹上䟽曰元康以來賤經尚道以玄虚宏放為夷達以儒術清儉為鄙俗宜崇奬儒官以新俗化祖逖攻陳川于蓬關石勒遣石虎將兵五萬救之戰于浚儀逖兵敗退屯梁國勒又遣桃豹將兵至蓬關逖退屯淮南虎徙川部衆五千户于襄國留豹守川故城石勒遣石虎擊鮮卑日六延於朔方大破之斬首二萬級俘虜三萬餘人孔萇攻幽州諸郡悉取之段匹磾士卒􅏇散欲移保上谷代王鬰律勒兵將擊之匹磾棄妻子奔樂陵依邵續曹嶷遣使賂石勒請以河為境勒許之梁州刺史周訪擊杜曽大破之馬儁等執曽以降訪斬之并獲荆州刺史第五猗送於武昌訪以猗本中朝所署加有時望白王敦不宜殺敦不聽而斬之初敦患杜曽難制謂訪曰若擒曽當相論為荆州及曽死而敦不用王廙在荆州多殺陶侃將佐以皇甫方回為侃所敬責其不詣已收斬之士民怨怒上下不安帝聞之徴廙為散騎常侍以周訪代廙為荆州刺史王敦忌訪威名意難之從事中郎郭舒說敦曰鄙州雖荒􅁦乃用武之國不可以假人宜自領之訪為梁州足矣敦從之六月丙子詔加訪安南將軍餘如故訪大怒敦手書譬解并遺玉環玉椀以申厚意訪抵之於地曰吾豈賈豎可以寶恱邪訪在襄陽務農訓兵隂有圖敦之志守宰有缺輒補然後言上敦患之而不能制魏該為胡冦所逼自宜陽帥衆南遷新野助周訪討杜曽有功拜順陽太守趙固死郭誦留屯陽翟石生屢攻之不能克漢主曜立宗廟社稷南北郊於長安詔曰吾之先興於北方光文立漢宗廟以從民望今宜改國號以單于為祖亟議以聞羣臣奏光文始封盧奴伯陛下又王中山中山趙分也請改國號為趙從之以冒頓配天光文配上帝徐龕冦掠濟岱破東莞帝問將帥可以討龕者於王導導以為太子左衛率太山羊鑒龕之州里冠族必能制之鑒深辭才非將帥郗鑒亦表鑒非才不可使導不從秋八月以羊鑒為征虜將軍征討都督督徐州刺史蔡豹臨淮太守劉遐鮮卑段文鴦等討之冬石勒左右長史張敬張賔左右司馬張屈六程遐等勸勒稱尊號勒不許十一月將佐等復請勒稱大將軍大單于領冀州牧趙王依漢昭烈在蜀魏武在鄴故事以河内等二十四郡為趙國太守皆為内史凖禹貢復冀州之境以大單于鎮撫百蠻罷并朔司三州通置部司以監之勒許之戊寅即趙王位大赦依春秋時列國稱元年初勒以世亂律令煩多命法曹令史貫志采集其要作辛亥制五千文施行十餘年乃用律令以理曹參軍上黨續咸為律學祭酒咸用法詳平國人稱之以中壘將軍支雄游擊將軍王陽領門臣祭酒專主胡人辭訟重禁胡人不得陵侮衣冠華族號胡為國人遣使循行州郡勸課農桑朝㑹始用天子禮樂衣冠儀物從容可觀矣加張賓大執法專緫朝政以石虎為單于元輔都督禁衛諸軍事尋加驃騎將軍侍中開府賜爵中山公自餘羣臣授位進爵各有差張賔任遇優顯羣臣莫及而謙虛敬慎開懷下士屏絶阿私以身帥物入則盡規出則歸美勒甚重之每朝常為之正容貌簡辭令呼曰右矦而不敢名十二月乙亥大赦平州刺史崔毖自以中州人望鎭遼東而士民多歸慕容廆心不平數遣使招之皆不至意廆拘留之乃隂説高句麗段氏字文氏使共攻之約滅廆分其地毖所親勃海高瞻力諫毖不從三國合兵伐廆諸將請擊之廆曰彼為崔毖所誘欲邀一切之利軍勢初合其鋒甚鋭不可與戰當固守以挫之彼烏合而來既無統壹莫相歸服久必􅂝貳一則疑吾與毖詐而覆之二則三國自相猜忌待其人情離貳然後擊之破之必矣三國進攻棘城廆閉門自守遣使獨以牛酒犒宇文氏二國疑宇文氏與廆有謀各引兵歸宇文大人悉獨官曰二國雖歸吾當獨取之宇文氏士卒數十萬連營四十里廆使召其子翰於徒河翰遣使白廆曰悉獨官舉國為冦彼衆我寡易以計破難以力勝今城中之衆足以禦冦翰請為奇兵於外伺其間而擊之内外俱奮使彼震駭不知所備破之必矣今并兵為一彼得專意攻城無復它虞非䇿之得者也且示衆以怯恐士氣不戰先沮矣廆猶疑之遼東韓夀言於廆曰悉獨官有憑陵之志將驕卒惰軍不堅密若奇兵卒起掎其無備必破之䇿也廆乃聽翰留徒河悉獨官聞之曰翰素名驍果今不入城或能為患當先取之城不足憂乃分遣數千騎襲翰翰知之詐為段氏使者逆於道曰慕容翰乆為吾患聞當擊之吾已嚴兵相待宜速進也使者既去翰即出城設伏以待之宇文氏之騎見使者大喜馳行不復設備進入伏中翰奮擊盡獲之乘勝徑進遣間使語廆出兵大戰廆使其子皝與長史裴嶷將精鋭為前鋒自將大兵繼之悉獨官初不設備聞廆至驚悉衆出戰前鋒始交翰將千騎從旁直入其營縱火焚之衆皆惶擾不知所為遂大敗悉獨官僅以身免廆盡俘其衆獲皇帝玉璽三紐崔毖聞之懼使其兄子燾詣棘城偽賀㑹三國使者亦至請和曰非我本意崔平州教我耳廆以示燾臨之以兵燾懼首服廆乃遣燾歸謂毖曰降者上䇿走者下䇿也引兵隨之毖與數十騎棄家奔高句麗其衆悉降於廆廆以其子仁為征虜將軍鎮遼東官府市里案堵如故高句麗將如奴子據于河城廆遣將軍張統掩擊擒之俘其衆千餘家以崔燾高瞻韓恒石琮歸于棘城待以客禮恒安平人琮鑒之孫也廆以高瞻為將軍瞻稱疾不就廆數臨候之撫其心曰君之疾在此不在它也今晉室䘮亂孤欲與諸君共清世難翼戴帝室君中州望族宜同斯願柰何以華夷之異介然踈之哉夫立功立事惟問志略何如耳華夷何足問乎瞻猶不起廆頗不平龍驤主簿宋該與瞻有隙勸廆除之廆不從瞻以憂卒初鞠羡既死茍晞復以羡子彭為東萊太守㑹曹嶷徇青州與彭相攻嶷兵雖彊郡人皆為彭死戰嶷不能克久之彭歎曰今天下大亂彊者為雄曹亦鄉里為天所相茍可依憑即為民主何必與之力爭使百姓肝腦塗地吾去此則禍自息矣郡人以為不可爭獻拒嶷之䇿彭一無所用與鄉里千餘家浮海歸崔毖北海鄭林客於東萊彭嶷之相攻林情無彼此嶷賢之不敢侵掠彭與之俱去比至遼東毖已敗乃歸慕容廆廆以彭參龍驤軍事遺鄭林車牛粟帛皆不受躬耕於野宋該勸廆獻捷江東廆使該為表裴嶷奉之并所得三璽詣建康獻之高句麗數宼遼東廆遣慕容翰慕容仁伐之高句麗王乙弗利逆來求盟翰仁乃還是嵗蒲洪降趙趙主曜以洪為率義矦屠各路松多起兵於新平扶風以附晉王保保使其將楊曼王連據陳倉張顗周庸據隂宻松路多據草壁秦隴氐􅆧多應之趙主曜遣諸將攻之不克曜自將擊之三年春正月曜攻陳倉王連戰死楊曼奔南氏曜進拔草壁路松多奔隴城又拔隂密晉王保懼遷于桑城曜還長安以劉雅為大司徒張春謀奉晉王保奔涼州張寔遣其將隂監將兵迎之聲言翼衛其實拒之段末柸攻段匹磾破之匹磾謂邵續曰吾本夷狄以慕義破家君不忘乆要請相與共擊末柸續許之遂相與追擊末柸大破之匹磾與弟文鴦攻薊後趙王勒知續勢孤遣中山公虎將兵圍猒次孔萇攻續别營十一皆下之二月續自出擊虎虎伏騎斷其後遂執續使降其城續呼兄子笁等謂曰吾志欲報國不幸至此汝等努力奉匹磾為主勿有貳心匹磾自薊還未至猒次聞續已没衆懼而散復為虎所遮文鴦以親兵數百力戰始得入城與續子緝兄子存笁等嬰城固守虎送續於襄國勒以為忠釋而禮之以為從事中郎因下令自今克敵獲士人毋得擅殺必生致之吏部郎劉胤聞續被攻言於帝曰北方藩鎮盡矣惟餘邵續而已如使復為石虎所滅孤義士之心阻歸本之路愚謂宜發兵救之帝不能從聞續已没乃下詔以續位任授其子緝趙將尹安宋始宋恕趙慎四軍屯洛陽叛降後趙後趙將石生引兵赴之安等復叛降司州刺史李矩矩使潁川太守郭黙將兵入洛石生虜宋始一軍北渡河於是河南之民皆相帥歸矩洛陽遂空三月裴嶷至建康盛稱慕容廆之威德賢雋皆為之用朝廷始重之帝謂嶷曰卿中朝名臣當留江東朕别詔龍驤送卿家屬嶷曰臣少䝉國恩出入省闥若得復奉輦轂臣之至榮但以舊京淪没山陵穿毁雖名臣宿將莫能雪恥獨慕容龍驤竭忠王室志除凶逆故使臣萬里歸誠今臣來而不返必謂朝廷以其僻陋而棄之孤其嚮義之心使懈體於討賊此臣之所甚惜是以不敢徇私而忘公也帝曰卿言是也乃遣使隨嶷拜廆安北將軍平州刺史閏月以周顗為尚書左僕射晉王保將張春楊次與别將楊韜不協勸保誅之且請擊陳安保皆不從夏五月春次幽保殺之保體肥大重八百斤喜睡好讀書而暗弱無斷故及於難保無子張春立宗室子瞻為世子稱大將軍保衆散奔涼州者萬餘人陳安表於趙主曜請討瞻等曜以安為大將軍擊瞻殺之張春奔枹罕安執楊次於保柩前斬之因以祭保安以天子禮􅁙保於上邽謚曰元王羊鑒討徐龕頓兵下邳不敢前蔡豹敗龕於檀丘龕求救於後趙後趙王勒遣其將王伏都救之又使張敬將兵為之後繼勒多所邀求而伏都淫暴龕患之張敬至東平龕疑其襲已乃斬伏都等三百餘人復來請降勒大怒命張敬據險以守之帝亦惡龕反覆不受其降敕鑒豹以時進討鑒猶疑憚不進尚書令刁協劾奏鑒免死除名以蔡豹代領其兵王導以所舉失人乞自貶帝不許六月後趙孔萇攻段匹磾恃勝而不設備段文鴦襲擊大破之京兆人劉􅀪客居涼州天梯山以妖術惑衆從受道者千餘人西平元公張寔左右皆事之帳下閻涉牙門趙卭皆􅀪鄉人弘謂之曰天與我神璽應王涼州涉卭信之宻與寔左右十餘人謀殺寔奉􅀪為主寔弟茂知其謀請誅弘寔令牙門將史初收之未至涉等懷刃而入殺寔於外寢弘見史初至謂曰使君已死殺我何為初怒截其舌而囚之轘於姑臧市誅其黨與數百人左司馬隂元等以寔子駿尚幼推張茂為涼州刺史西平公赦其境内以駿為撫軍將軍丙辰趙將解虎及長水校尉尹車謀反與巴酋句徐庫彭等相結事覺虎車皆伏誅趙主曜囚徐彭等五十餘人于阿房將殺之光禄大夫游子逺諫曰聖王用刑惟誅元惡而已不宜多殺爭之叩頭流血曜怒以為助逆而囚之盡殺徐彭等尸諸市十日乃投於水於是巴衆盡反推巴酋句渠知為主自稱大秦改元曰平趙四山氐􅆧巴羯應之者三十餘萬關中大亂城門晝閉子逺又從獄中上表諫爭曜手毁其表曰大荔奴不􅁨命在須臾猶敢如此嫌死晚邪叱左右速殺之中山王雅郭汜朱紀呼延晏等諫曰子逺幽囚禍在不測猶不忘諫爭忠之至也陛下縱不能用柰何殺之若子逺朝誅臣等亦當夕死以彰陛下之過天下將皆捨陛下而去陛下誰與居乎曜意解乃赦之曜敕内外戒嚴將自討渠知子逺又諫曰陛下誠能用臣䇿一月可定大駕不必親征也曜曰卿試言之子逺曰彼非有大志欲圖非望也直畏陛下威刑欲逃死耳陛下莫若廓然大赦與之更始應前日坐虎車等事其家老弱没入奚官者皆縱遣之使之自相招引聽其復業彼既得生路何為不降若其中自知罪重屯結不散者願假臣弱兵五千必為陛下梟之不然今反者彌山被谷雖以天威臨之恐非嵗月可除也曜大恱即日大赦以子逺為車騎大將軍開府儀同三司都督雍秦征討諸軍事子逺屯于雍城降者十餘萬移軍安定反者皆降惟句氏宗黨五千餘家保于隂密進攻滅之遂引兵巡隴右先是氐羗十餘萬落據險不服其酋虛除權渠自號秦王子逺進造其壁權渠出兵拒之五戰皆敗權渠欲降其子伊餘大言於衆曰往者劉曜自來猶無若我何况此偏師何謂降也帥勁卒五萬晨壓子逺壘門諸將欲擊之子逺曰伊餘勇悍當今無敵所將之兵復精於我又其父新敗怒氣方盛其鋒不可當也不如緩之使氣竭而後擊之乃堅壁不戰伊餘有驕色子逺伺其無備夜勒兵蓐食旦值大風塵昏子逺悉衆出掩之生擒伊餘盡俘其衆權渠大懼被髪剺面請降子逺啓曜以權渠為征西將軍西戎公分徙伊餘兄弟及其部落二十餘萬口于長安曜以子逺為大司徒録尚書事曜立太學選民之神志可教者千五百人擇儒臣以教之作酆明觀及西宫起陵霄臺於滈池又於霸陵西南營夀陵侍中喬豫和苞上䟽諫以為衛文公承亂亡之後節用愛民營建宫室得其時制故能興康叔之業延九百之祚前奉詔書營酆明觀市道細民咸譏其奢曰以一觀之功足以平涼州矣今又欲擬阿房而建西宫法瓊臺而起陵霄其為勞費億萬酆明若以資軍旅乃可兼呉蜀而壹齊魏矣又聞營建壽陵周圍四里深三十五丈以銅為椁飾以黄金功費若此殆非國内之所能辦也秦始皇下錮三泉土未乾而發毁自古無不亡之國不掘之墓故聖王之儉葬乃深逺之慮也陛下奈何於中興之日而踵亡國之事乎曜下詔曰二侍中懇懇有古人之風可謂社稷之臣矣其悉罷宫室諸役夀陵制度一遵霸陵之法封豫安昌子苞平輿子並領諫議大夫仍布告天下使知區區之朝欲聞其過也又省酆水囿以與貧民祖逖將韓潛與後趙將桃豹分據陳川故城豹居西臺潛居東臺豹由南門潛由東門出入相守四旬逖以布囊盛土如米狀使千餘人運上臺又使數人檐米息於道豹兵逐之棄擔而走豹兵久飢得米以為逖士衆豐飽益懼後趙將劉夜堂以驢千頭運糧饋豹逖使韓潛及别將馮鐵邀擊於汴水盡獲之豹宵遁屯東燕城逖使潛進屯封丘以逼之馮鐵據二臺逖鎮雍丘數遣兵邀擊後趙兵後趙鎮戌歸逖者甚多境土漸蹙先是趙固上官已李矩郭黙互相攻擊逖馳使和解之示以禍福遂皆受逖節度秋七月詔加逖鎮西將軍逖在軍與將士同甘苦約已務施勸課農桑撫納新附雖踈賤者皆結以恩禮河上諸塢先有任子在後趙者皆聽兩屬時遣游軍偽抄之明其未附塢主皆感恩後趙有異謀輒宻以告由是多所克獲自河以南多叛後趙歸于晉逖練兵積穀為取河北之計後趙王勒患之乃下幽州為逖修祖父墓置守冢二家因與逖書求通使及􅀇市逖不報書而聽其􅀇市收利十倍逖牙門童建殺新蔡内史周宻降于後趙勒斬之送首於逖曰叛臣逃吏吾之深仇將軍之惡猶吾惡也逖深德之自是後趙人叛歸逖者逖皆不納禁諸將不使侵􅁀後趙之民邊境之間稍得休息八月辛未梁州刺史周訪卒訪善於撫納士衆皆為致死知王敦有不臣之心私常切齒敦由是終訪之世未敢為逆敦遣從事中郎郭舒監襄陽軍帝以湘州刺史甘卓為梁州刺史督沔北諸軍事鎮襄陽舒既還帝徴為右丞敦留不遣後趙王勒遣中山公虎帥步騎四萬擊徐龕龕送妻子為質乞降勒許之蔡豹屯卞城石虎將擊之豹退守下邳為徐龕所敗虎引兵城封丘而旋徙士族三百家寘襄國崇仁里置公族大夫以領之後趙王勒用法甚嚴諱胡尤峻宫殿既成初有門户之禁有醉胡乗馬突入止車門勒大怒責宫門小執法馮翥翥惶懼忘諱對曰向有醉胡乗馬馳入甚呵禦之而不可與語勒笑曰胡人正自難與言恕而不罪勒使張賓領選初定五品後更定九品命公卿及州郡嵗舉秀才至孝亷清賢良直言武勇之士各一人西平公張茂立兄子駿為世子蔡豹既敗將詣建康歸罪北中郎將王舒止之帝聞豹退遣使收之舒夜以兵圍豹豹以為它冦帥麾下擊之聞有詔乃止舒執豹送建康冬十月丙辰斬之王敦殺武陵内史向碩帝之始鎮江東也敦與從弟導同心翼戴帝亦推心任之敦緫征討導專機政羣從子弟布列顯要時人為之語曰王與馬共天下後敦自恃有功且宗族彊盛稍益驕恣帝畏而惡之乃引劉隗刁協等以為腹心稍抑損王氏之權導亦漸見踈外中書郎孔愉陳導忠賢有佐命之勲宜加委任帝出愉為司徒左長史導能任眞推分澹如也有識皆稱其善處興廢而敦益懐不平遂構嫌隙初敦辟呉興沈充為參軍充薦同郡錢鳳於敦敦以為鎧曹參軍二人皆巧諂凶狡知敦有異志隂賛成之為之畫䇿敦寵信之勢傾内外敦上疏為導訟屈辭語怨望導封以還敦敦復遣奏之左將軍譙王承忠厚有志行帝親信之夜召承以敦疏示之曰王敦以頃年之功位任足矣而所求不已言至於此將若之何承曰陛下不早裁之以至今日敦必為患劉隗為帝謀出心腹以鎮方面㑹敦表以宣城内史沈充代甘卓為湘州刺史帝謂氶曰王敦姦逆已著朕為惠皇其勢不逺湘州據上流之勢控三州之㑹欲以叔父居之何如承曰臣奉承詔命惟力是視何敢有辭然湘州經蜀冦之餘民物彫弊若得之部比及三年乃可即戎苟未及此雖復灰身亦無益也十二月詔曰晉室開基方鎮之任親賢並用其以譙王氶為湘州刺史長沙鄧騫聞之歎曰湘州之禍其在斯乎氶行至武昌敦與之宴謂氶曰大王雅素佳士恐非將帥才也氶曰公未見知耳鈆刀豈無一割之用敦謂錢鳳曰彼不知懼而學壯語足知其不武無能為也乃聽之鎮時湘土荒殘公私困弊氶躬自儉約傾心綏撫甚有能名高句麗冦遼東慕容仁與戰大破之自是不敢犯仁境四年春二月徐龕復請降張茂築靈鈞臺基高九仞武陵閻曽夜叩府門呼曰武公遣我來言何故勞民築臺有司以為妖請殺之茂曰吾信勞民曽稱先君之命以規我何謂妖乎乃為之罷役三月癸亥日中有黒子著作佐郎河東郭璞以帝用刑過差上疏以為隂陽錯繆皆繁刑所致赦不欲數然子産知鑄刑書非政之善不得不作者須以救弊故也今之宜赦理亦如之後趙中山公虎攻幽州刺史段匹磾於厭次孔萇攻其統内諸城悉拔之段文鴦言於匹磾曰我以勇聞故為民所倚望今視民被掠而不救是怯也民失所望誰復為我致死遂帥壯士數十騎出戰殺後趙兵甚衆馬乏伏不能起虎呼之曰兄與我俱夷狄久欲與兄同為一家今天不違願於此得相見何為復戰請釋仗文鴦罵曰汝為冦賊當死日久吾兄不用吾䇿故令汝得至此我寧鬬死不為汝屈遂下馬苦戰槊折執刀戰不已自辰至申後趙兵四面解馬羅披自鄣前執文鴦文鴦力竭被執城内奪氣匹磾欲單騎歸朝邵續之弟樂安内史洎勒兵不聽洎復欲執臺使王英送於虎匹磾正色責之曰卿不能遵兄之志逼吾不得歸朝亦已甚矣復欲執天子使者我雖夷狄所未聞也洎與兄子緝竺等輿櫬出降匹磾見虎曰我受晉恩志在滅汝不幸至此不能為汝敬也後趙王勒及虎素與匹磾結為兄弟虎即起拜之勒以匹磾為冠軍將軍文鴦爲左中郎將散諸流民三萬餘户復其本業置守宰以撫之於是幽冀并三州皆入於後趙匹磾不為勒禮常著朝服持晉節久之與文鴦邵續皆為後趙所殺五月庚申詔免中州良民遭難為揚州諸郡僮客者以僃征役尚書令刀恊之謀也由是衆益怨之終南山崩秋七月甲戌以尚書僕射戴淵為征西將軍都督司兖豫并雍冀六州諸軍事司州刺史鎮合肥丹楊尹劉隗為鎮北將軍都督青徐幽平四州諸軍事青州刺史鎮淮隂皆假節領兵名為討胡實僃王敦也隗雖在外而朝廷機事進退士大夫帝皆與之宻謀敦遺隗書曰頃承聖上顧眄足下今大賊未滅中原鼎沸欲與足下及周生之徒勠力王室共靜海内若其泰也則帝祚於是乎隆若其否也則天下永無望矣隗答曰魚相忘於江湖人相忘於道術竭股肱之力效之以忠貞吾之志也敦得書甚怒壬午以驃騎將軍王導為侍中司空假節録尚書領中書監帝以敦故并踈忌導御史中丞周嵩上䟽以為導忠素竭誠輔成大業不宜聽孤臣之言惑疑似之說放逐舊德以佞伍賢虧既往之恩招將來之患帝頗感寤導由是得全八月常山崩豫州刺史祖逖以戴淵呉士雖有才望無􅀪致逺識且已翦荆棘收河南地而淵雍容一旦來統之意甚怏怏又聞王敦與劉刁構隙將有内難知大功不遂感激發病九月壬寅卒於雍丘豫州士女若䘮父母譙梁間皆為立祠王敦久懷異志聞逖卒益無所憚冬十月壬午以逖弟約為平西將軍豫州刺史領逖之衆約無綏御之才不為士卒所附初范陽李産避亂依逖見約志趣異常謂所親曰吾以比方鼎沸故逺來就此冀全宗族今觀約所為有不可測之志吾託名姻親當早自為計無事復陷身於不義也爾曹不可以目前之利而忘久長之䇿乃帥子弟十餘人間行歸鄉里十一月皇孫衍生後趙王勒悉召武鄉耆舊詣襄國與之共坐歡飲初勒微時與李陽鄰居數爭漚麻池相歐陽由是獨不敢來勒曰陽壯士也漚麻布衣之恨孤方兼容天下豈讎匹夫乎遽召與飲引陽臂曰孤往日厭卿老拳卿亦飽孤毒手因拜參軍都尉以武鄉比豐沛復之三世勒以民始復業資儲未豐於是重制禁釀郊祀宗廟皆用醴酒行之數年無復釀者十二月以慕容廆為都督幽平二州東夷諸軍事車騎將軍平州牧封遼東公單于如故遣謁者即授印綬聽承制置官司守宰廆於是僃置僚屬以裴嶷游邃為長史裴開為司馬韓壽為别駕陽耽為軍諮祭酒崔燾為主簿黄􅇦鄭林參軍事廆立子皝為世子作東横以平原劉讚為祭酒使皝與諸生同受業廆得暇亦親臨聽之皝雄毅多權略喜經術國人稱之廆徙慕容翰鎮遼東慕容仁鎮平郭翰撫安民夷甚有威惠仁亦次之拓跋猗㐌妻惟氏忌代王鬱律之彊恐不利於其子乃殺鬱律而立其子賀傉大人死者數十人鬱律之子什翼犍幼在襁褓其母王氏匿於袴中祝之曰天苟存汝則勿啼久之不啼乃得免惟氏專制國政遣使聘後趙後趙人謂之女國使資治通鑑卷第九十一
