front:
  text: 蹕如曹公輔漢故事拜王脩及其副劉茂皆為將軍封列矦脩舍人曹平樂從脩至粟邑因留仕漢言於曜曰大司馬遣脩等來外表至誠内覘大駕彊弱俟其復命將襲乗輿時漢兵實疲􅁦曜信之乃追汜還斬脩於市三月勒還至襄國劉茂逃歸言脩死狀勒大怒曰孤事劉氏於人臣之職有加矣彼之基業皆孤所為今既得志還欲相圖趙王趙帝孤自為之何待於彼邪乃誅曹平樂三族帝令羣臣議郊祀尚書令刁協等以為宜須還洛乃脩之司徒荀組等曰漢獻帝都許即行郊祀何必洛邑帝從之立郊丘於建康城之巳地辛夘帝親祀南郊以未有北郊并地祇合祭之詔琅邪恭王宜稱皇考賀循曰禮子不敢以巳爵加於父乃止
