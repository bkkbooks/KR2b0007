front:
  text: 書曰圗讖言公孫即宣帝也代漢者姓當塗其名髙君豈髙之身邪乃復以掌文為瑞王莽何足效乎君非吾賊臣亂子倉卒時人皆欲為君事耳君日月已逝妻子弱小當早為定計天下神器不可力爭宜留三思署曰公孫皇帝述不答其騎都尉平陵荆邯説述曰漢髙祖起於行陳之中兵破身困者數矣然軍敗復合瘡愈復戰何則前死而成功愈於却就於滅亡也隗囂遭遇運㑹割有雍州兵彊士附威加山東遇更始政亂復失天下衆庶引領四方瓦解囂不及此時推危乗勝以爭天命而退欲為西伯之事尊師章句賔友處士偃武息戈卑辭事漢喟然自以文王復出也令漢帝釋關隴之憂專精東伐四分天下而有其三發間使召攜貳使西州豪桀咸居心於山東則五分而有其四若舉兵天水必至沮潰天水旣定則九分而有其八陛下以梁州之地内奉萬乗外給三軍百姓愁困不堪上命將有王氏自潰之變矣臣之愚計以為宜及天下之望未絶豪桀尚可招誘急以此時發國内精兵令田戎據江陵臨江南之㑹倚巫山之固築壘堅守傳檄吳楚長沙以南必隨風而靡令延岑出漢中定三輔天水隴西拱手自服如此海内震搖冀有大利述以問羣臣博士吳柱曰武王伐殷八百諸矦不期同辭然猶還師以待天命未聞無左右之助而欲出師千里之外者也邯曰今東帝無尺土之柄驅烏合之衆跨馬陷敵所向輙平不亟乗時與之分功而坐談武王之説是復效隗囂欲為西伯也述然邯言欲悉發北軍屯士及山東客兵使延岑田戎分出兩道與漢中諸將合兵并埶蜀人及其弟光以為不宜空國千里之外決成敗於一舉固爭之述乃止延岑田戎亦數請兵立功述終疑不聽唯公孫氏得任事述廢銅錢置鐵錢貨幣不行百姓苦之為政苛細察於小事如為清水令時而已好改易郡縣官名少嘗為郎習漢家故事出入灋駕鸞旗旄騎又立其兩子為王食犍為廣漢各數縣或諫曰成敗未可知戎士㬥露而先王愛子示無大志也述不從由此大臣皆怨馮異自長安入朝帝謂公卿曰是我起兵時主簿也為吾披荆棘定闗中旣罷賜珍寳錢帛詔曰倉卒蕪蔞亭豆粥虖沱河麥飯厚意乆不報異稽首謝曰臣聞管仲謂桓公曰願君無忘射鉤臣無忘檻車齊國頼之臣今亦願國家無忘河北之難小臣不敢忘巾車之恩留十餘日令與妻子還西申屠剛杜林自隗囂所來帝皆拜侍御史以鄭興為太中大夫三月公孫述使田戎出江關招其故衆欲以取荆州不克帝乃詔隗囂欲從天水伐蜀囂上言白水險阻棧閣敗絶述性嚴酷上下相患須其罪惡孰著而攻之此大呼響應之埶也帝知其終不為用乃謀討之夏四月丙子上行幸長安謁園陵遣耿弇蓋延等七將軍從隴道伐蜀先使中郎將來歙奉璽書賜囂諭㫖囂復多設疑故事乆冘豫不決歙遂發憤質責囂曰國家以君知臧否曉廢興故以手書暢意足下推忠誠旣遣伯春委質而反欲用佞惑之言為族滅之計邪因欲前刺囂囂起入部勒兵將殺歙歙徐杖節就車而去囂使牛邯將兵圍守之囂將王遵諫曰君叔雖單車逺使而陛下之外兄也殺之無損於漢而隨以族滅昔宋執楚使遂有析骸易子之禍小國猶不可辱況於萬乗之主重以伯春之命哉歙為人有信義言行不違及往來遊説皆可桉覆西州士大夫皆信重之多為其言故得免而東歸五月己未車駕至自長安
