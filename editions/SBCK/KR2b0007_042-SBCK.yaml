body:
  text: 隗囂遂發兵反使王元據隴坻伐木塞道諸將因與囂戰大敗各引兵下隴囂追之急馬武選精騎為後拒殺數千人諸軍乃得還六月辛夘詔曰夫張官置吏所以為民也今百姓遭難户口耗少而縣官吏職所置尚繁其令司􅀠州牧各實所部省減吏員縣國不足置長吏者并之於是并省四百餘縣吏職減損十置其一九月丙寅晦日有食之執金吾朱浮上䟽曰昔堯舜之盛猶加三考大漢之興亦累功效吏皆積乆至長子孫當時吏職何能悉治論議之徒豈不諠譁蓋以為天地之功不可倉卒艱難之業當累日也而間者守宰數見換易迎新相代疲勞道路尋其視事日淺未足昭見其職旣加嚴切人不自保廹於舉劾懼於刺譏故爭飾詐僞以希虚譽斯所以致日月失行之應也夫物暴長者必夭折功卒成者必亟壞如摧長乆之業而造速成之功非陛下之福也願陛下遊意於經年之外望治於一世之後天下幸甚帝采其言自是牧守易代頗簡十二月壬辰大司空宋弘免癸巳詔曰頃者師旅未解用度不足故行十一之税今糧儲差積其令郡國收見田租三十税一如舊制諸將之下隴也帝詔耿弇軍漆馮異軍栒邑祭遵軍汧吳漢等還屯長安馮異引軍未至栒邑隗囂乗勝使王元行廵將二萬餘人下隴分遣廵取栒邑異即馳兵欲先據之諸將曰虜兵盛而乗勝不可與爭鋒宜止軍便地徐思方略異曰虜兵臨境忸􅏸小利遂欲深入若得栒邑三輔動搖夫攻者不足守者有餘今先據城以逸待勞非所以爭也濳往閉城偃旗鼔行廵不知馳赴之異乗其不意卒擊鼓建旗而出廵軍驚亂犇走追擊大破之祭遵亦破王元於汧於是北地諸豪長耿定等悉畔隗囂降詔異進軍義渠擊破盧芳將賈覽匈奴奥鞬日逐王北地上郡安定皆降竇融復遣其弟友上書曰臣幸得託先后末屬累世二千石臣復假歷將帥守持一隅故遣劉鈞口陳肝膽自以底裏上露長無纖介而璽書盛稱蜀漢二主三分鼎足之權任囂尉佗之謀竊自痛傷臣融雖無識猶知利害之際順逆之分豈可背眞舊之主事姦偽之人廢忠貞之節為傾覆之事弃已成之基求無冀之利此三者雖問狂夫猶知去就而臣獨何以用心謹遣弟友詣闕口陳至誠友至髙乎㑹隗囂反道不通乃遣司馬席封間道通書帝復遣封賜融友書所以尉藉之甚厚融乃與隗囂書曰將軍親遇厄㑹之際國家不利之時守節不回承事本朝融等所以欣服髙義願從役於將軍者良為此也而忿悁之間改節易圗委成功造難就百年累之一朝毁之豈不惜乎殆執事者貪功建謀以至於此當今西州地勢局廹民兵離散易以輔人難以自建計若失路不反聞道猶迷不南合子陽則北入文伯耳夫負虚交而易彊禦恃遠救而輕近敵未見其利也自兵起以來城郭皆為丘墟生民轉於溝壑幸頼天運少還而將軍復重其難是使積痾不得遂瘳㓜孤將復流離言之可為酸鼻庸人且猶不忍況仁者乎融聞為忠甚易得宜實難憂人太過以徳取怨知且以言獲罪也囂不納融乃與五郡太守共砥厲兵馬上䟽請師期帝深嘉美之融即與諸郡守將兵入金城擊囂黨先零羌封何等大破之因竝河揚威武伺候車駕時大兵未進融乃引還帝以融信效著明益嘉之脩理融父墳墓祠以太牢數馳輕使致遺四方珍羞梁綂猶恐衆心疑惑乃使人刺殺張􅀇遂與隗囂絶皆解所假將軍印綬先是馬援聞隗囂欲貳於漢數以書責譬之囂得書増怒及囂發兵反援乃上書曰臣與隗囂本實交友初遣臣東謂臣曰本欲為漢願足下往觀之於汝意可即專心矣及臣還反報以赤心實欲導之於善非敢譎以非義而囂自挟姦心盜憎主人怨毒之情遂歸於臣臣欲不言則無以上聞願聽詣行在所極陳滅囂之術帝乃召之援具言謀畫帝因使援將突騎五千往來游説囂將髙峻任禹之屬下及羌豪為陳禍福以離囂支黨援又爲書與囂將楊廣使曉勸於囂曰援竊見四海已定兆民同情而季孟閉拒背畔爲天下表的常懼海内切齒思相屠裂故遺書戀戀以致惻隠之計乃聞季孟歸罪於援而納王游翁諂邪之說因自謂函谷以西舉足可定以今而觀竟何如邪援間至河内過存伯春見其奴吉從西方還説伯春小弟仲舒望見吉欲問伯春無它否竟不能言曉夕號泣宛轉塵中又説其家悲愁之狀不可言也夫怨讎可刺不可毁援聞之不自知泣下也援素知季孟孝愛曽閔不過夫孝於其親豈不慈於其子可有子抱三木而跳梁妄作自同分羹之事乎季孟平生自言所以擁兵衆者欲以保全父母之國而完墳墓也又言茍厚士大夫而已而今所欲全者將破亡之所欲完者將毀傷之所欲厚者將反薄之季孟嘗折愧子陽而不受其爵今更共陸陸欲徃附之將難為顔乎若復責以重質當安從得子主給是哉往時子陽獨欲以王相待而春卿拒之今者歸老更欲低頭與小兒曹共槽􅇫而食併肩側身於怨家之朝乎今國家待春卿意深宜使牛孺卿與諸耆老大人共説季孟若計畫不從真可引領去矣前披輿地圗見天下郡國百有六所奈何欲以區區二邦以當諸夏百有四乎春卿事季孟外有君臣之義内有朋友之道言君臣邪固當諫爭語朋友邪應有切磋豈有知其無成而但萎腇咋舌义手從族乎及今成計殊尚善也過是欲少味矣且來君叔天下信士朝廷重之其意依依常獨為西州言援商朝廷尤欲立信於此必不負約援不得乆留願急賜報廣竟不答諸將毎有疑議更請呼援咸敬重焉隗囂上䟽謝曰吏民聞大兵卒至驚恐自救臣囂不能禁止兵有大利不敢廢臣子之節親自追還昔虞舜事父大杖則走小杖則受臣雖不敏敢忘斯義今臣之事在於本朝賜死則死加刑則刑如更得洗心死骨不朽有司以囂言慢請誅其子帝不忍復使來歙至汧賜囂書曰昔柴將軍云陛下寛仁諸矦雖有亡叛而後歸輙復位號不誅也今若束手復遣恂弟歸闕庭者則爵禄獲全有浩大之福矣吾年垂四十在兵中十嵗厭浮語虚辭即不欲勿報囂知帝審其詐遂遣使稱臣於公孫述匈奴與盧芳為㓂不息帝令歸徳矦颯使匈奴以脩舊好單于驕倨雖遣使報命而㓂暴如故七年春三月罷郡國輕車騎士材官令還復民伍公孫述立隗囂為朔寧王遣兵往來為之援埶癸亥晦日有食之詔百僚各上封事其上書者不得言聖太中大夫鄭興上䟽曰夫國無善政則謫見日月要在因人之心擇人處位今公卿大夫多舉漁陽太守郭伋可大司空者而不以時定道路流言咸曰朝廷欲用功臣功臣用則人位謬矣願陛下屈已從衆以濟羣臣讓善之功頃年日食每多在晦先時而合皆月行疾也日君象而月臣象君亢急則臣下促廹故月行疾今陛下髙明而羣臣惶促宜留思柔克之政垂意洪範之灋帝躬勤政事頗傷嚴急故興奏及之夏四月壬午大赦五月戊戌以前將軍李通為大司空大司農江馮上言宜令司􅀠校尉督察三公司空椽陳元上䟽曰臣聞師臣者帝賔臣者霸故武王以太公為師齊桓以夷吾為仲父近則髙帝優相國之禮太宗假宰輔之權及亡新王莽遭漢中衰專操國柄以偷天下況已自喻不信羣臣奪公輔之任損宰相之威以刺舉為明徼訐為直至乃陪僕告其君長子弟變其父兄㒺密灋峻大臣無所措手足然不能禁董忠之謀身為世戮方今四方尚擾天下未一百姓觀聽咸張耳目陛下冝修文武之聖典襲祖宗之遺徳勞心下士屈節待賢誠不冝使有司察公輔之名帝從之酒泉太守笁曾以弟報怨殺人自免去郡竇融承制拜曾武鋒將軍更以辛肜爲酒泉太守秋隗囂將歩騎三萬侵安定至隂槃馮異率諸將拒之囂又令别將下隴攻祭遵於汧並無利而還帝將自征隗囂先戒竇融師期㑹遇雨道斷且囂兵已退乃止帝令來歙以書招王遵遵來降拜太中大夫封向義矦冬盧芳以事誅其五原太守李興兄弟其朔方太守田颯雲中太守喬扈各舉郡降帝令領職如故帝好圗䜟與鄭興議郊祀事曰吾欲以䜟斷之何如對曰臣不爲䜟帝怒曰卿不爲䜟非之邪興惶恐曰臣於書有所未學而無所非也帝意乃解南陽太守杜詩政治清平興利除害百姓便之又修治陂池廣拓土田郡内比室殷足時人方於召信臣南陽爲之語曰前有召父後有杜母八年春來歙將二千餘人伐山開道從番須囘中徑襲略陽斬隗囂守將金梁囂大驚曰何其神也帝聞得略陽甚喜曰略陽囂所依阻心腹已壞則制其支體易矣呉漢等諸將聞歙據略陽爭馳赴之上以爲囂失所恃亡其要城勢必悉以精鋭來攻曠日乆圍而城不拔士卒頓敝乃可乗危而進皆追漢等還隗囂果使王元拒隴坻行廵守番須口王孟塞雞頭道牛邯軍瓦亭囂自悉其大衆數萬人圍略陽公孫述遣將李育田弇􅂇之斬山築堤激水灌城來歙與將士固死堅守矢盡發屋斷木以為兵囂盡鋭攻之累月不能下夏閏四月帝自將征隗囂光禄勲汝南郭憲諫曰東方初定車駕未可遠征乃當車拔佩刀以斷車靷帝不從西至漆諸將多以王師之重不宜逺入險阻計尤豫未決帝召馬援問之援因説隗囂將帥有土崩之埶兵進有必破之狀又於帝前聚米為山谷指畫形埶開示衆軍所從道徑往來分析昭然可曉帝曰虜在吾目中矣明旦遂進軍至髙平第一竇融率五郡太守及羌虜小月氏等歩騎數萬輕重五千餘兩與大軍㑹是時軍旅草創諸將朝㑹禮容多不肅融先遣從事問㑹見儀適帝聞而善之以宣告百僚乃置酒高㑹待融等以殊禮遂共進軍數道上隴使王遵以書招牛邯下之拜邯太中大夫於是囂大將十三人屬縣十六衆十餘萬皆降囂將妻子犇西城從楊廣而田弇李育保上邽略陽圍解帝勞賜來歙班坐絶席在諸將之右賜歙妻縑千匹進幸上邽詔告隗囂曰若束手自詣父子相見保無佗也若遂欲為黥布者亦自任也囂終不降於是誅其子恂使吳漢岑彭圍西城耿弇蓋延圍上邽以四縣封竇融為安豐矦弟友為顯親矦及五郡太守皆封列矦遣西還所鎮融以乆專方面懼不自安數上書求代詔報曰吾與將軍如左右手耳數執謙退何不曉人意勉循士民無擅離部曲潁川盜賊羣起㓂沒屬縣河東守兵亦叛京師騷動帝聞之曰吾悔不用郭子横之言秋八月帝自上邽晨夜東馳賜岑彭等書曰兩城若下便可將兵南擊蜀虜人苦不知足旣平隴復望蜀每一發兵頭須為白九月乙夘車駕還宫帝謂執金吾㓂恂曰潁川迫近京師當以時定惟念獨卿能平之耳從九卿復出以憂國可也對曰潁川聞陛下有事隴蜀故狂狡乗間相詿誤耳如聞乗輿南向賊必惶怖歸死臣願執鋭前驅帝從之庚申車駕南征潁川盜賊悉降㓂恂竟不拜郡百姓遮道曰願從陛下復借㓂君一年乃留恂長社鎮撫吏民受納餘降東郡濟隂盜賊亦起帝遣李通王常擊之以東光矦耿純嘗爲東郡太守威信著於衛地遣使拜太中大夫使與大兵㑹東郡東郡聞純入界盜賊九千餘人皆詣純降大兵不戰而還璽書復以純爲東郡太守戊寅車駕還自潁川安丘矦張歩將妻子逃犇臨淮與弟􅀪藍欲招其故衆乗船入海琅邪太守陳俊追討斬之冬十月丙午上行幸懐十一月乙丑還雒陽楊廣死隗囂窮困其大將王㨗别在戎丘登城呼漢軍曰爲隗王城守者皆必死無二心願諸軍亟罷請自殺以明之遂自刎死初帝敕吳漢曰諸郡甲卒但坐費糧食若有逃亡則沮敗衆心宜悉罷之漢等貪并力攻囂遂不能遣糧食日少吏士疲役逃亡者多岑彭壅谷水灌西城城未沒丈餘㑹王元行廵周宗將蜀救兵五千餘人乗髙卒至鼔譟大呼曰百萬之衆方至漢軍大驚未及成陳元等决圍殊死戰遂得入城迎囂歸兾吳漢軍食盡乃燒輜重引兵下隴蓋延耿弇亦相隨而退囂出兵尾擊諸營岑彭為後拒諸將乃得全軍東歸唯祭遵屯汧不退呉漢等復屯長安岑彭還津鄉於是安定北地天水隴西復反為囂校尉太原温序為囂將茍宇所獲宇曉譬數四欲降之序大怒叱宇等曰虜何敢迫脅漢將因以節撾殺數人宇衆爭欲殺之宇止之曰此義士死節可賜以劒序受劒衘須於口顧左右曰旣為賊所殺無令須汙土遂伏劒而死從事王忠持其䘮歸雒陽詔賜以冢地拜三子為郎十二月髙句麗王遣使朝貢帝復其王號是嵗大水九年春正月潁陽成矦祭遵薨於軍詔馮異并將其營遵為人亷約小心克己奉公賞賜盡與士卒約束嚴整所在吏民不知有軍取士皆用儒術對酒設樂必雅歌投壺臨終遺戒薄葬問以家事終無所言帝愍悼之尤甚遵䘮至河南車駕素服臨之望哭哀慟還幸城門閲過䘮車涕泣不能已䘮禮成復親祠以太牢詔大長秋謁者河南尹䕶䘮事大司農給費至葬車駕復臨之旣葬又臨其墳存見夫人室家其後朝㑹帝毎歎曰安得憂國奉公如祭征虜者乎衛尉銚期曰陛下至仁哀念祭遵不已羣臣各懐慚懼帝乃止隗囂病且餓餐糗糒恚憤而卒王元周宗立囂少子純為王揔兵據冀公孫述遣將趙匡田弇助純帝使馮異擊之公孫述遣其翼江王田戎大司徒任滿南郡太守程汎將數萬人下江關擊破馮駿等軍遂拔巫及夷道夷陵因據荆門虎牙横江水起浮橋關樓立櫕柱以絶水道結營跨山以塞陸路拒漢兵夏六月丙戌帝幸緱氏登轘轅吳漢率王常等四將軍兵五萬餘人擊盧芳將賈覽閔堪於髙栁匈奴救之漢軍不利於是匈奴轉盛鈔暴日增詔朱祜屯常山王常屯涿郡破姦將軍矦進屯漁陽以討虜將軍王霸為上谷太守以備匈奴帝使來歙悉監護諸將屯長安太中大夫馬援爲之副歙上書曰公孫述以隴西天水爲藩蔽故得延命假息今二郡平蕩則述智計窮矣宜益選兵馬儲積資糧今西州新破兵人疲饉若招以財榖則其衆可集臣知國家所給非一用度不足然有不得已也帝然之於是詔於汧積榖六萬斛秋八月來歙率馮異等五將軍討隗純於天水驃騎將軍杜茂與賈覽戰於繁畤茂軍敗績諸羌自王莽末入居塞内金城屬縣多爲所有隗囂不能討因就慰納發其衆與漢相拒司徒掾班彪上言今涼州部皆有降羌羌胡被髪左祍而與漢人雜處習俗旣異言語不通數爲小吏黠人所見侵奪窮恚無聊故致反叛夫蠻夷㓂亂皆為此也舊制益州部置蠻夷騎都尉幽州部置領烏桓校尉涼州部置䕶羌校尉皆持節領䕶治其怨結嵗時廵行問所疾苦又數遣使譯通導動静使塞外羌夷為吏耳目州郡因此可得警備今宜復如舊以明威防帝從之以牛邯為䕶羌校尉盜殺隂貴人母鄧氏及弟訢帝甚傷之封貴人弟就為宣恩矦復召就兄侍中興欲封之置印綬於前興固讓曰臣未有先登陷陳之功而一家數人竝蒙爵土令天下觖望誠所不願帝嘉之不奪其志貴人問其故興曰夫外戚家苦不知謙退嫁女欲配矦王取婦眄睨公主愚心實不安也富貴有極人當知足夸奢益為觀聽所譏貴人感其言深自降挹卒不為宗親求位帝召㓂恂還以漁陽太守郭伋為潁川太守伋招降山賊趙宏召吳等數百人皆遣歸附農因自劾專命帝不以咎之後宏吳等黨與聞伋威信逺自江南或從幽冀不期俱降駱驛不絶莎車王康卒弟賢立攻殺拘彌西夜王而使康兩子王之十年春正月吳漢復率捕虜將軍王霸等四將軍六萬人出髙栁擊賈覽匈奴數千騎救之連戰於平城下破走之夏陽節矦馮異等與趙匡田弇戰且一年皆斬之隗純未下諸將欲且還休兵異固持不動共攻落門未拔夏異薨於軍秋八月己亥上幸長安初隗囂將安定髙峻擁兵據髙平第一建威大將軍耿弇等圍之一嵗不拔帝自將征之㓂恂諫曰長安道里居中應接近便安定隴西必懐震懼此從容一處可以制四方也今士馬疲倦方履險阻非萬乗之固也前年潁川可為至戒帝不從戊戌進幸汧峻猶不下帝遣㓂恂往降之恂奉璽書至第一峻遣軍師皇甫文出謁辭禮不屈恂怒將誅之諸將諫曰髙峻精兵萬人率多彊弩西遮隴道連年不下今欲降之而反戮其使無乃不可乎恂不應遂斬之遣其副歸告峻曰軍師無禮已戮之矣欲降急降不欲固守峻惶恐即日開城門降諸將皆賀因曰敢問殺其使而降其城何也恂曰皇甫文峻之腹心其所取計者也今來辭意不屈必無降心全之則文得其計殺之則峻亡其膽是以降耳諸將皆曰非所及也冬十月來歙與諸將攻破落門周宗行廵茍宇趙恢等將隗純降王元犇蜀徙諸隗於京師以東後隗純與賔客亡入胡至武威捕得誅之先零羌與諸種㓂金城隴西來歙率蓋延等進擊大破之斬首虜數千人於是開倉稟以賑飢乏隴右遂安而涼州流通焉庚寅車駕還宫十一年春三月己酉帝幸南陽還幸章陵庚午車駕還宫岑彭屯津鄕數攻田戎等不克帝遣吳漢率誅虜將軍劉隆等三將發荆州兵凡六萬餘人騎五千匹與彭㑹荆門彭裝戰船數千艘吳漢以諸郡棹卒多費糧榖欲罷之彭以為蜀兵盛不可遣上書言狀帝報彭曰大司馬習用歩騎不曉水戰荆門之事一由征南公為重而已閏月岑彭令軍中募攻浮橋先登者上賞於是偏將軍魯竒應募而前時東風狂急魯竒船逆流而上直衝浮橋而櫕柱有反杷鉤竒船不得去竒等乗埶殊死戰因飛炬焚之風怒火盛橋樓崩燒岑彭悉軍順風並進所向無前蜀兵大亂溺死者數千人斬任滿生獲程汎而田戎走保江州彭上劉隆為南郡太守自率輔威將軍臧宫驍騎將軍劉歆長驅入江關令軍中無得虜掠所過百姓皆奉牛酒迎勞彭復讓不受百姓大喜争開門降詔彭守益州牧所下郡輙行太守事彭若出界即以太守號付後將軍選官屬守州中長吏彭到江州以其城固糧多難卒拔留馮駿守之自引兵乗利直指墊江攻破平曲收其米數十萬石吳漢留夷陵裝露橈繼進夏先零羌㓂臨洮來歙薦馬援為隴西太守擊先零大破之公孫述以王元為將軍使與領軍環安拒河池六月來歙與蓋延等進攻元安大破之遂克下辨乗勝遂進蜀人大懼使刺客刺歙未殊馳召蓋延延見歙因伏悲哀不能仰視歙叱延曰虎牙何敢然今使者中刺客無以報國故呼巨卿欲相屬以軍事而反效兒女子涕泣乎刃雖在身不能勒兵斬公邪延收淚強起受所誡歙自書表曰臣夜人定後為何人所賊傷中臣要害臣不敢自惜誠恨奉職不稱以為朝廷羞夫理國以得賢為本太中大夫段襄骨鯁可任願陛下裁察又臣兄弟不肖終恐被罪陛下哀憐數賜教督投筆抽刃而絶帝聞大驚省書攬涕以揚武將軍馬成守中郎將代之歙䘮還洛陽乗輿縞素臨弔送葬趙王良從帝送歙䘮還入夏城門與中郎將張邯爭道叱邯旋車又詰責門候使前走數十歩司􅀠校尉鮑永劾奏良無藩臣禮大不敬良尊戚貴重而永劾之朝廷肅然永辟扶風鮑恢為都官從事恢亦抗直不避彊禦帝常曰貴戚且斂手以避二鮑永行縣到霸陵路經更始墓下拜哭盡哀而去西至扶風椎牛上茍諫冢帝聞之意不平問公卿曰奉使如此何如太中大夫張湛對曰仁者行之宗忠者義之主也仁不遺舊忠不忘君行之髙者也帝意乃釋帝自將征公孫述秋七月次長安公孫述使其將延岑呂鮪王元公孫恢悉兵拒廣漢及資中又遣將矦丹率二萬餘人拒黄石岑彭使臧宮將降卒五萬從涪水上平曲拒延岑自分兵浮江下還江州泝都江而上襲擊矦丹大破之因晨夜倍道兼行二千餘里徑拔武陽使精􅀐馳擊廣都去成都數十里埶若風雨所至皆犇散初述聞漢兵在平曲故遣大兵逆之及彭至武陽繞出延岑軍後蜀地震駭述大驚以杖擊地曰是何神也延岑盛兵於沅水臧宫衆多食少轉輸不至降者皆欲散畔郡邑復更保聚觀望成敗宫欲引還恐為所反㑹帝遣謁者將兵詣岑彭有馬七百匹宫矯制取以自益晨夜進兵多張旗幟登山鼓譟右歩左騎挾船而引呼聲動山谷岑不意漢軍卒至登山望之大震恐宫因縱擊大破之斬首溺死者萬餘人水為之濁延岑犇成都其衆悉降盡獲其兵馬珍寳自是乗勝追北降者以十萬數軍至平陽鄉王元舉衆降帝與公孫述書陳言禍福示以丹青之信述省書歎息以示所親太常常少光禄勲張隆皆勸述降述曰廢興命也豈有降天子哉左右莫敢復言少隆皆以憂死帝還自長安冬十月公孫述使刺客詐為亡奴降岑彭夜刺殺彭太中大夫監軍鄭興領其營以俟吳漢至而授之彭持軍整齊秋毫無犯卭榖王任貴聞彭威信數千里遣使迎降㑹彭已被害帝盡以任貴所獻賜彭妻子蜀人為立廟祠之馬成等破河池遂平武都先零諸種羌數萬人屯聚㓂鈔拒浩亹隘成與馬援深入討擊大破之徙降羌置天水隴西扶風是時朝臣以金城破羌之西塗逺多㓂議欲棄之馬援上言破羌以西城多完牢易可依固其田土肥壤灌漑流通如令羌在湟中則爲害不休不可弃也帝從之民歸者三千餘口援為置長吏繕城郭起塢候開溝洫勸以耕牧郡中樂業又招撫塞外氐羌皆來降附援奏復其矦王君長帝悉從之乃罷馬成軍十二月呉漢自夷陵將三萬人泝江而上伐公孫述郭伋為并州牧過京師帝問以得失伋曰選補衆職當簡天下賢俊不宜專用南陽人是時在位多鄉曲故舊故伋言及之資治通鑑卷第四十二
