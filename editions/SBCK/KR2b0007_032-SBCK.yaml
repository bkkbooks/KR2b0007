front:
  text: 奏立禽獸行請誅太中大夫谷永上䟽曰臣聞禮天子外屏不欲見外也是故帝王之意不窺人閨門之私聽聞中冓之言春秋為親者諱今梁王年少頗有狂病始以惡言按驗旣無事實而發閨門之私非本章所指王辭又不服猥强劾立傅致難明之事獨以偏辭成辠斷獄無益於治道汙衊宗室以内亂之惡披布宣揚於天下非所以為公族隠諱増朝廷之榮華昭聖徳之風化也臣愚以為王少而父同産長年齒不倫梁國之富足以厚聘美女招致妖麗父同産亦有恥辱之心案事者乃驗問惡言何故猥自發舒以三者揆之殆非人情疑有所廹切過誤失言文吏躡尋不得轉移萌牙之時加恩勿治上也既已案驗舉憲宜及王辭不服詔廷尉選上徳通理之吏更審考清問著不然之效定失誤之灋而反命於下吏以廣公族附䟽之徳為宗室刷汙亂之恥甚得治親之誼天子由是寑而不治是嵗司􅀠校尉蜀郡何武為京兆尹武為吏守灋盡公進善退惡其所居無赫赫名去後常見思元延元年春正月己亥朔日有食之壬戌王商復為大司馬衛将軍三月上行幸雍祠五畤
