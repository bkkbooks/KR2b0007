body:
  text: 夏四月丁酉無雲而雷有流星従日下東南行四面燿燿如雨自晡及昬而止赦天下秋七月有星孛于東井上以災變博謀羣臣北地太守谷永對曰王者躬行道徳承順天地則五徵時序百姓夀考符瑞並降失道妄行逆天暴物則咎徵著郵妖孽並見饑饉荐臻終不改寤惡洽變備不復譴告更命有徳此天地之常經百王之所同也加以功徳有厚薄期質有脩短時世有中季天道有盛衰陛下承八世之功業當陽數之標季渉三七之節紀遭无妄之卦運直百六之災阸三難異科雜焉同㑹建始元年以來二十載閒羣災大異交錯鋒起多於春秋所書内則為深宫後庭将有驕臣悍妾醉酒狂悖卒起之敗北宫苑囿街巷之中臣妾之家幽閒之處徵舒崔杼之亂外則為諸夏下土将有樊並蘇令陳勝項梁奮臂之禍安危之分界宗廟之至憂臣永所以破膽寒心豫言之累年下有其萌然后變見于上可不致慎禍起細㣲姦生所易願陛下正君臣之義無復與羣小媟黷燕飲勤三綱之嚴修後宫之政抑逺驕妬之寵崇近婉順之行朝覲灋駕而後出陳兵清道而後行無復輕身獨出飲食臣妾之家三者既除内亂之路塞矣諸夏舉兵萌在民饑饉而吏不䘏興於百姓困而賦斂重發於下怨離而上不知傳曰飢而不損兹謂泰厥咎亡比年郡國傷於水災禾麥不收宜損常税之時而有司奏請加賦甚繆經義逆於民心市怨趨禍之道也臣願陛下勿許加賦之奏益减奢泰之費流恩廣施振贍困乏勅勸耕桑以慰綏元元之心諸夏之亂庶幾可息中壘校尉劉向上書曰臣聞帝舜戒伯禹母若丹朱敖周公戒成王母若殷王紂聖帝明王常以敗亂自戒不諱廢興故臣敢極陳其愚唯陛下留神察焉謹案春秋二百四十二年日食三十六今連三年比食自建始以來二十嵗閒而八食率二嵗六月而一發古今罕有異有小大希稠占有舒疾緩急觀秦漢之易世覽恵昭之無後察昌邑之不終視孝宣之紹起皆有變異著於漢紀天之去就豈不昭昭然哉臣幸得託末屬誠見陛下寛明之徳冀銷大異而興髙宗成王之聲以崇劉氏故懇懇數奸死亡之誅天文難以相曉臣雖圗上猶須口説然後可知願賜清燕之閒指圗陳狀上輒入之然終不能用也紅陽侯立舉陳咸方正對䇿拜為光禄大夫給事中丞相方進復奏咸前為九卿坐為貪邪免不當䝉方正舉備内朝臣并劾紅陽侯立選舉故不以實有詔免咸勿劾立十二月乙未王商為大将軍辛亥商薨其弟紅陽侯立次當輔政先是立使客因南郡太守李尚占墾草田數百頃上書以入縣官貴取其直一萬萬以上丞相司直孫寳發之上由是廢立而用其弟光禄勲曲陽侯根庚申以根為大司馬驃騎将軍特進安昌侯張禹請平陵肥牛亭地曲陽侯根争以為此地當平陵寑廟衣冠所出游道宜更賜禹它地上不従卒以賜禹根由是害禹寵數毁惡之天子愈益敬厚禹每病輙以起居聞車駕自臨問之上親拜禹牀下禹頓首謝恩禹小子未有官禹數視其小子上即禹牀下拜為黄門郎給事中禹雖家居以特進為天子師國家每有大政必與定議時吏民多上書言災異之應譏切王氏専政所致上意頗然之未有以明見及車駕至禹弟辟左右親問禹以天變因用吏民所言王氏事示禹禹自見年老子孫弱又與曲陽侯不平恐為所怨則謂上曰春秋日食地震或為諸侯相殺夷狄侵中國災變之意深逺難見故聖人罕言命不語怪神性與天道自子貢之屬不得聞何况淺見鄙儒之所言陛下宜修政事以善應之與下同其福喜此經義意也新學小生亂道誤人宜無信用以經術斷之上雅信愛禹由此不疑王氏後曲陽侯根及諸王子弟聞知禹言皆喜説遂親就禹故槐里令朱雲上書求見公卿在前雲曰今朝廷大臣上不能匡主下無以益民皆尸位素餐孔子所謂鄙夫不可與事君茍患失之亡所不至者也臣願賜尚方斬馬劒斷佞臣一人頭以厲其餘上問誰也對曰安昌侯張禹上大怒曰小臣居下訕上廷辱師傅罪死不赦御史将雲下雲攀殿檻檻折雲呼曰臣得下従龍逢比干遊於地下足矣未知聖朝何如耳御史遂将雲去於是左将軍辛慶忌免冠解印綬叩頭殿下曰此臣素著狂直於世使其言是不可誅其言非固當容之臣敢以死争慶忌叩頭流血上意解然後得已及後當治檻上曰勿易因而輯之以旌直臣匈奴搜諧單于將入朝未入塞病死弟且莫車立為車牙若鞮單于以囊知牙斯為左賢王北地都尉張放到官數月復徵入侍中太后與上書曰前所道尚未效冨平矦反復來其能黙虖上謝曰請今奉詔上於是出放為天水屬國都尉引少府許商光禄勲師丹為光禄大夫班伯為水衡都尉並侍中皆秩中二千石每朝東宫常從及大政俱使諭指於公卿上亦稍厭游宴復脩經書之業太后甚悦是嵗左将軍辛慶忌卒慶忌為國虎臣遭世承平匈奴西域親附敬其威信二年春正月上行幸甘泉郊泰畤三月行幸河東祠后土既祭行遊龍門登歴觀陟西岳而歸夏四月立廣陵孝王子守為王初烏孫小昆彌安日為降民所殺諸翖侯大亂詔徵故金城太守段㑹宗為左曹中郎将光禄大夫使安輯烏孫立安日弟末振将為小昆彌定其國而還時大昆彌雌栗靡勇健末振将恐為所并使貴人烏日領詐降刺殺雌栗靡漢欲以兵討之而未能遣中郎将叚㑹宗立公主孫伊秩靡為大昆彌乆之大昆彌翖侯難栖殺末振将安日子安犂靡代為小昆彌漢恨不自誅末振将復遣叚㑹宗發戊巳校尉諸國兵即誅末振将太子番丘㑹宗恐大兵入烏孫驚番丘亡逃不可得即留所發兵墊婁地選精兵三十弩徑至昆彌所在召番丘責以末振将之罪即手劒擊殺番丘官屬以下驚恐馳歸小昆彌安犂靡勒兵數千騎圍㑹宗㑹宗為言來誅之意今圍守殺我如取漢牛一毛耳宛王郅支頭縣槀街烏孫所知也昆彌以下服曰末振将負漢誅其子可也獨不可告我令飲食之邪㑹宗曰豫告昆彌逃匿之為大罪即飲食以付我傷骨肉恩故不先告昆彌以下號泣罷去㑹宗還奏事天子賜㑹宗爵闗内侯黄金百斤㑹宗以難栖殺末振将奏以為堅守都尉責大禄大監以雌栗靡見殺狀奪金印紫綬更與銅墨云末振将弟卑爰疐本共謀殺大昆彌将衆八萬餘口北附康居謀欲借兵兼并兩昆彌漢復遣㑹宗與都護孫建并力以備之自烏孫分立兩昆彌漢用憂勞且無寧嵗時康居復遣子侍漢貢獻都護郭舜上言本匈奴盛時非以兼有烏孫康居故也及其稱臣妾非以失二國也漢雖皆受其質子然三國内相輸遺交通如故亦相侯司見便則發合不能相親信離不能相臣役以今言之結配烏孫竟未有益反為中國生事然烏孫既結在前今與匈奴俱稱臣義不可距而康居驕黠訖不肯拜使者都䕶吏至其國坐之烏孫諸使下王及貴人先飲食已乃飲啗都護吏故為無所省以夸旁國以此度之何故遣子入侍其欲賈市為好辭之詐也匈奴百蠻大國今事漢甚備聞康居不拜且使單于有悔自卑之意宜歸其侍子絶勿復使以章漢家不通無禮之國漢為其新通重致逺人終羈縻不絶三年春正月丙寅蜀郡岷山崩壅江三日江水竭劉向大惡之曰昔周岐山崩三川竭而幽王亡岐山者周所興也漢家本起於蜀漢今所起之地山崩川竭星孛又及攝提大角従參至辰殆必亡矣二月丙午封淳于長為定陵侯三月上行幸雍祠五畤上将大誇胡人以多禽獸秋命右扶風發民入南山西自襃斜東至弘農南􅇌漢中張羅罔罝罘捕熊羆禽獸載以檻車輸長楊射熊館以罔為周阹縦禽獸其中令胡人手搏之自取其獲上親臨觀焉四年春正月上行幸甘泉郊泰畤中山王興定陶王欣皆來朝中山王獨従傅定陶王盡従傅相中尉上怪之以問定陶王對曰令諸侯王朝得従其國二千石傅相中尉皆國二千石故盡従之上令誦詩通習能説佗日問中山王獨従傅在何灋令不能對令誦尚書又廢及賜食於前後飽起下韈係解帝由此以為不能而賢定陶王數稱其材是時諸侯王唯二人於帝為至親定陶王祖母傅太后隨王來朝私賂遺趙皇后昭儀及票騎将軍王根后昭儀根見上無子亦欲豫自結為長乆計皆更稱定陶王勸帝以為嗣帝亦自美其材為加元服而遣之時年十七矣三月上行幸河東祠后土隕石于􅀜東二王根薦谷永徵入爲大司農永前後所上四十餘事略相反覆専攻上身與後宫而巳黨於王氏上亦知之不甚親信也爲大司農嵗餘病滿三月上不賜告即時免數月卒綏和元年春正月大赦天下上召丞相翟方進御史大夫孔光右将軍亷襃後将軍朱博入禁中議中山定陶王誰宜爲嗣者方進根襃博皆以爲定陶王帝弟之子禮曰昆弟之子猶子也爲其後者爲之子也定陶王宜爲嗣光獨以爲禮立嗣以親以尚書盤庚殷之及王爲比兄終弟及中山王先帝之子帝親弟宜爲嗣上以中山王不材又禮兄弟不得相入廟不從光議二月癸丑詔立定陶王欣爲皇太子封中山王舅諫大夫馮參爲宜鄉矦益中山國三萬户以慰其意使執金吾任宏守大鴻臚持節徵定陶王定陶王謝曰臣材質不足以假充太子之宫臣願且得留國邸旦夕奉問起居俟有聖嗣歸國守藩書奏天子報聞戊午孔光以議不合意左遷廷尉何武爲御史大夫初詔求殷後分散爲十餘姓推求其嫡不能得匡衡梅福皆以爲宜封孔子世爲湯後上從之封孔􅁻爲殷紹嘉矦三月與周承休矦皆進爵爲公地各百里上行幸雍祠五畤初何武之爲廷尉也建言末俗之敝政事煩多宰相之材不能及古而丞相獨兼三公之事所以乆廢而不治也宜建三公官上従之夏四月賜曲陽侯根大司馬印綬置官屬罷票騎将軍官以御史大夫何武為大司空封汜鄉侯皆増奉如丞相以備三公焉秋八月庚戌中山孝王興薨匈奴車牙單于死弟囊知牙斯立為烏珠留若鞮單于烏珠留單于立以弟樂為左賢王輿為右賢王漢遣中郎将夏侯藩副校尉韓容使匈奴或説王根曰匈奴有斗入漢地直張掖郡生竒材木箭竿鷲羽如得之於邊甚饒國家有廣地之實将軍顯功垂於無窮根為上言其利上直欲従單于求之為有不得傷命損威根即但以上指曉藩令従藩所説而求之藩至匈奴以語次説單于曰竊見匈奴斗入漢地直張掖郡漢三都尉居塞上士卒數百人寒苦􅀱望乆勞單于宜上書獻此地直斷割之省兩都尉士卒數百人以復天子厚恩其報必大單于曰此天子詔語邪将従使者所求也藩曰詔指也然藩亦為單于畫善計耳單于曰此温偶駼王所居地也未曉其形狀所生請遣使問之藩容歸漢後復使匈奴至則求地單于曰父兄傳五世漢不求此地至知獨求何也巳問温偶駼王匈奴西邊諸侯作穹廬及車皆仰此山材木且先父地不敢失也藩還遷爲太原太守單于遣使上書以藩求地狀聞詔報單于曰藩擅稱詔従單于求地灋當死更大赦二今徙藩為濟南太守不令當匈奴冬十月甲寅王根病免上以太子既奉大宗後不得顧私親十一月立楚孝王孫景爲定陶王以奉㳟王後太子議欲謝少傅閻崇以爲爲人後之禮不得顧私親不當謝太傅趙玄以爲當謝太子従之詔問所以謝狀尚書劾奏玄左遷少府以光禄勲師丹爲太傅初太子之幼也王祖母傅太后躬自飬視及爲太子詔傅太后與太子母丁姬自居定陶國邸不得相見頃之王太后欲令傅太后丁姬十日一至太子家帝曰太子承正統當共飬陛下不得復顧􅀻親王太后曰太子小而傅太后抱飬之今至太子家以乳母恩耳不足有所妨於是令傅太后得至太子家丁姬以不飬太子獨不得衛尉侍中淳于長有寵於上大見信用貴傾公卿外交諸侯牧守賂遺賞賜累鉅萬淫於聲色許后姊孊為龍􅋕思侯夫人寡居長與孊私通因取為小妻許后時居長定宫因孊賂遺長欲求復為婕妤長受許后金錢乗輿服御物前後千餘萬詐許為白上立以為左皇后孊每入長定宫輙與孊書戲侮許后嫚易無不言交通書記賂遺連年時曲陽侯根輔政乆病數乞骸骨長以外親居九卿位次第當代根侍中騎都尉光禄大夫王莽心害長寵私聞其事莽侍曲陽侯病因言長見将軍乆病意喜自以當代輔政至對衣冠議語署置具言其辠過根怒曰即如是何不白也莽曰未知将軍意故未敢言根曰趣白東宫莽求見太后具言長驕佚欲代曲陽矦私與長定貴人姊通受取其衣物太后亦怒曰兒至如此徃白之帝莽白上上以太后故免長官勿治罪遣就國初紅陽侯立不得輔政疑為長毀譖常怨毒長上知之及長當就國立嗣子融従長請車騎長以珍寳因融重遺立立因上封事為長求留曰陛下既託文以皇太后故誠不可更有它計於是天子疑焉下有司按驗吏捕融立令融自殺以滅口上愈疑其有大姦遂逮長繫洛陽詔獄窮治長具服戲侮長定宫謀立左皇后辠至大逆死獄中妻子當坐者徙合浦母若歸故郡上使廷尉孔光持節賜廢后藥自殺丞相方進復劾奏紅陽侯立狡猾不道請下獄上曰紅陽侯朕之舅不忍致灋遣就國於是方進復奏立黨友後将軍朱博鉅鹿太守孫閎皆免官與故光禄大夫陳咸皆歸故郡咸自知廢錮以憂死方進智能有餘兼通文灋吏事以儒雅縁飾灋律號為通明相天子器重之又善求人主㣲指奏事無不當意方淳于長用事方進獨與長交稱薦之及長坐大逆誅上以方進大臣為之隠諱方進内慙上䟽謝罪乞骸骨上報曰定陵矦長巳伏其辜君雖交通傳不云乎朝過夕改君子與之君何疑焉其専心壹意毋怠醫藥以自持方進起視事復條奏長所厚善京兆尹孫寳右扶風蕭育刺史二千石以上免二十餘人函谷都尉建平矦杜業素與方進不平方進奏業受紅陽矦書聽請不敬免就國上以王莽首發大姦稱其忠直王根因薦莽自代丙寅以莽為大司馬時年三十八莽既拔出同列繼四父而輔政欲令名譽過前人遂克己不倦聘諸賢良以為掾史賞賜邑錢悉以享士愈為儉約母病公卿列矦遣夫人問疾莽妻迎之衣不曵地布蔽膝見之者以為僮使問知其夫人皆驚其飾名如此丞相方進大司空武奏言春秋之義用貴治賤不以卑臨尊刺史位下大夫而臨二千石輕重不相凖臣請罷刺史更置州牧以應古制十二月罷刺史更置州牧秩二千石犍為郡於水濵得古磬十六枚議者以為善祥劉向因是説上宜興辟雍設庠序陳禮樂隆雅頌之聲盛揖讓之容以風化天下如此而不治者未之有也或曰不能具禮禮以飬人為本如有過差是過而飬人也刑罰之過或至死傷今之刑非臯陶之灋也而有司請定灋削則削筆則筆救時務也至於禮樂則曰不敢是敢於殺人不敢於飬人也為其爼豆管􅃶之間小不備因是絶而不為是去小不備而就大不備惑莫甚焉夫教化之比於刑灋刑灋輕是舎所重而急所輕也教化所恃以為治也刑灋所以助治也今廢所恃而獨立其所助非所以致太平也自京師有誖逆不順之子孫至於䧟大辟受刑戮者不絶由不習五常之道也夫承千嵗之衰周繼暴秦之餘敝民漸漬惡俗貪饕險詖不閑義理不示以大化而獨歐以刑罰終已不改帝以向言下公卿議丞相大司空奏請立辟廱按行長安城南營表未作而罷時又有言孔子布衣飬徒三千人今天子太學弟子少於是増弟子貟三千人嵗餘復如故劉向自見得信於上故常顯訟宗室譏刺王氏及在位大臣其言多痛切發於至誠上數欲用向為九卿輙不為王氏居位者及丞相御史所持故終不遷居列大夫官前後三十餘年而卒後十三嵗而王氏代漢資治通鑑卷第三十二
