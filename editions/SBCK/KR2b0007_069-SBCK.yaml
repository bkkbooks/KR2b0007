seq: 69
front:
  text: 僚欲秘不發喪諫議大夫賈逵以爲事不可秘乃發喪或言宜易諸城守悉用譙沛人魏郡太守廣陵徐宣厲聲曰今者逺近一統人懐效節何必專任譙沛以沮宿衛者之心乃止青州兵擅擊鼓相引去衆人以爲宜禁止之不從者討之賈逵曰不可爲作長檄令所在給其稟食鄢陵侯彰從長安來赴問逵先王璽綬所在逵正色曰國有儲副先王璽綬非君侯所宜問也凶問至鄴太子號哭不巳中庶子司馬孚諫曰君王晏駕天下恃殿下爲命當上爲宗廟下爲萬國奈何效匹夫孝也太子良久乃止曰卿言是也時羣臣初聞王薨相聚哭無復行列孚厲聲於朝曰今君王違世天下震動當早拜嗣君以鎮萬國而但哭耶乃罷羣臣僃禁衛治喪事孚懿之弟也羣臣以為太子即位當須詔命尚書陳矯曰王薨于外天下惶懼太子宜割哀即位以繫逺近之望且又愛子在側彼此生變則社稷危矣即具官僃禮一日皆辦明旦以王后令䇿太子即王位大赦漢帝尋遣御史大夫華歆奉䇿詔授太子丞相印綬魏王璽綬領冀州牧於是尊王后曰王太后
  hash: sha256:f70463e6ee933044a65cf8f10a6e8391b3965b4d19276cd96cf4e5a9ff1e0808
body:
  text: 改元延康二月丁未朔日有食之壬戌以太中大夫賈詡為太尉御史大夫華歆為相國大理王朗為御史大夫丁夘葬武王于高陵王弟鄢陵侯彰等皆就國臨菑監國謁者灌均希指奏臨菑侯植醉酒悖慢劫脅使者王貶植為安鄉侯誅右刺姦掾沛國丁儀及弟黄門侍郎廙并其男口皆植之黨也魚豢論曰諺言貧不學儉卑不學恭非人性分殊也埶使然耳假令太祖防遏植等在於疇昔此賢之心何縁有窺望乎彰之挾恨尚無所至至於植者豈能興難乃令楊脩以倚注遇害丁儀以希意族滅哀夫初置散騎常侍侍郎各四人其宦人為官者不得過諸署令為金䇿藏之石室時當選侍中常侍王左右舊人諷主者便欲就用不調餘人司馬孚曰今嗣王新立當進用海内英賢如何欲因際㑹自相薦舉邪官失其任得者亦不足貴也遂他選尚書陳羣以天朝選用不盡人才乃立九品官人之灋州郡皆置中正以定其選擇州郡之賢有識鑒者為之區别人物第其高下夏五月戊寅漢帝追尊王祖太尉曰太王夫人丁氏曰太王后王以安定太守鄒岐為涼州刺史西平麴演結旁郡作亂以拒岐張掖張進執太守杜通酒泉黄華不受太守辛機皆自稱太守以應演武威三種胡復叛武威太守母丘興告急於金城太守䕶羌校尉扶風蘇則則將救之郡人皆以為賊埶方盛宜須大軍時將軍郝昭魏平先屯金城受詔不得西度則乃見郡中大吏及昭等謀曰今賊雖盛然皆新合或有脅從未必同心因釁擊之善惡必離離而歸我我増而彼損矣既獲益衆之實且有倍氣之勢率以進討破之必矣若待大軍曠日彌久善人無歸必合於惡善惡既合埶難卒離雖有詔命違而合權專之可也昭等從之乃發兵救武威降其三種胡與母丘興擊張進於張掖麴演聞之將步騎三千迎則辭來助軍而實欲為變則誘而斬之出以徇軍其黨皆散走則遂與諸軍圍張掖破之斬進黄華懼乞降河西平初燉煌太守馬艾卒官郡人推功曹張恭行長史事恭遣其子就詣朝廷請太守㑹黄華張進叛欲與燉煌并埶執就劫以白刃就終不回私與恭䟽曰大人率厲燉煌忠義顯然豈以就在困厄之中而替之哉今大軍垂至但當促兵以掎之耳願不以下流之愛使就有恨於黄壤也恭即引兵攻酒泉别遣鐵騎二百及官屬縁酒泉北塞東迎太守尹奉黄華欲救張進而西顧恭兵恐擊其後故不得往而降就卒平安奉得之郡詔賜恭爵關内侯六月庚午王引軍南巡秋七月孫權遣使奉獻蜀將軍孟達屯上庸與副軍中郎將劉封不恊封侵陵之達率部曲四千餘家來降達有容止才觀王甚器愛之引與同輦以達為散騎常侍建武將軍封平陽亭侯合房陵上庸西城三郡為新城以達領新城太守委以西南之任行軍長史劉曄曰達有茍得之心而恃才好術必不能感恩懐義新城與孫劉接連若有變態為國生患王不聽遣征南將軍夏侯尚右將軍徐晃與達共襲劉封上庸太守申耽叛封來降封破走還成都初封本羅侯寇氏之子漢中王初至荆州以未有繼嗣養之為子諸葛亮慮封剛猛易世之後終難制御勸漢中王因此際除之遂賜封死武都氐王楊僕率種人内附甲午王次于譙大饗六軍及譙父老于邑東設􅇊樂百戲吏民上壽日夕而罷孫盛曰三年之喪自天子達于庶人故雖三季之末七雄之敝猶未有廢衰斬於旬朔之間釋麻杖於反哭之日者也逮于漢文變易古制人道之紀一旦而廢固巳道薄於當年風頺於百代矣魏王既追漢制替其大禮處莫重之哀而設饗宴之樂居貽厥之始而墮王化之基及至受禪顯納二女是以知王齡之不遐卜世之期促也王以丞相祭酒賈逵為豫州刺史是時天下初定刺史多不能攝郡逵曰州本以六條詔書察二千石以下故其狀皆言嚴能鷹揚有督察之才不言安靜寛仁有愷悌之德也今長吏慢灋盜賊公行州知而不糾天下復何取正乎其二千石以下阿縱不如灋者皆舉奏免之外脩軍旅内治民事興陂田通運渠吏民稱之王曰逵真刺史矣布告天下當以豫州為灋賜逵爵關內侯左中郎將李伏太史丞許芝表言魏當代漢見於圖緯其事衆甚羣臣因上表勸王順天人之望王不許冬十月乙卯漢帝告祠高廟使行御史大夫張音持節奉璽綬詔􅁽禪位于魏王三上書辭讓乃為壇於繁陽辛未升壇受璽綬即皇帝位燎祭天地嶽瀆改元大赦十一月癸酉奉漢帝為山陽公行漢正朔用天子禮樂封公四子為列侯追尊太王曰太皇帝武王曰武皇帝廟號太祖尊王太后曰皇太后以漢諸侯王為崇德侯列侯為關中侯羣臣封爵増位各有差改相國為司徒御史大夫為司空山陽公奉二女以嬪于魏帝欲改正朔侍中辛毗曰魏氏遵舜禹之統應天順民至於湯武以戰伐定天下乃改正朔孔子曰行夏之時左氏傳曰夏數為得天正何必期於相反帝善而從之時羣臣並頌魏德多抑損前朝散騎常侍衛臻獨明禪授之義稱揚漢美帝數目臻曰天下之珍當與山陽共之帝欲追封太后父母尚書陳羣奏曰陛下以聖德應運受命創業革制當永為後式案典籍之文無婦人分土命爵之制在禮典婦因夫爵秦違古灋漢氏因之非先王之令典也帝曰此議是也其勿施行仍著定制藏之臺閣十二月初營洛陽宮戊午帝如洛陽帝謂侍中蘇則曰前破酒泉張掖西域通使燉煌獻徑寸大珠可復求市益得不則對曰若陛下化洽中國德流沙幕即不求自至求而得之不足貴也帝嘿然帝召東中郎將蔣濟為散騎常侍時有詔賜征南將軍夏侯尚曰卿腹心重將特當任使作威作福殺人活人尚以示濟濟至帝問以所聞見對曰未有他善但見亡國之語耳帝忿然作色而問其故濟具以荅因曰夫作威作福書之明誡天子無戲言古人所慎惟陛下察之帝即遣追取前詔帝欲徙冀州士卒家十萬戸實河南時天旱蝗民饑羣司以為不可而帝意甚盛侍中辛毗與朝臣俱求見帝知其欲諫作色以待之皆莫敢言毗曰陛下欲徙士家其計安出帝曰卿謂我徙之非邪毗曰誠以為非也帝曰吾不與卿議也毗曰陛下不以臣不肖置之左右厠之謀議之官安能不與臣議邪臣所言非私也乃社稷之慮也安得怒臣帝不荅起入內毗隨而引其裾帝遂奮衣不還良久乃出曰佐治卿持我何太急邪毗曰今徙旣失民心又無以食也故臣不敢不力爭帝乃徙其半帝嘗出射雉顧羣臣曰射雉樂哉毗對曰於陛下甚樂於羣下甚苦帝黙然後遂為之稀出二年春正月以議郎孔羨為宗聖侯奉孔子祀三月加遼東太守公孫恭車騎將軍初復五銖錢蜀中傳言漢帝已遇害於是漢中王發喪制服謚曰孝愍皇帝羣下競言符瑞勸漢中王稱尊號前部司馬費詩上䟽曰殿下以曹操父子偪主簒位故乃羇旅萬里糾合士衆將以討賊今大敵未克而先自立恐人心疑惑昔高祖與楚約先破秦者王之及屠咸陽獲子嬰猶懐推讓況今殿下未出門庭便欲自立邪愚臣誠不為殿下取也王不恱左遷詩為部永昌從事夏四月丙午漢中王即皇帝位於武擔之南大赦改元章武以諸葛亮為丞相許靖為司徒臣光曰天生烝民其埶不能自治必相與戴君以治之茍能禁暴除害以保全其生賞善罰惡使不至於亂斯可謂之君矣是以三代之前海内諸侯何啻萬國有民人社稷者通謂之君合萬國而君之立灋度班號令而天下莫敢違者乃謂之王王德既衰彊大之國能帥諸侯以尊天子者則謂之霸故自古天下無道諸侯力爭或曠世無王者固亦多矣秦焚書坑儒漢興學者始推五德生勝以秦為閏位在木火之間霸而不王於是正閏之論興矣及漢室顚覆三國鼎跱晉氏失馭五胡雲擾宋魏以降南北分治各有國史互相排黜南謂北為索虜北謂南為島夷朱氏代唐四方幅裂朱邪入汴比之窮新運歷年紀皆棄而不數此皆私已之偏辭非大公之通論也臣愚誠不足以識前代之正閏竊以為茍不能使九州合為一統皆有天子之名而無其實者也雖華夷仁暴大小彊弱或時不同要皆與古之列國無異豈得獨尊奬一國謂之正統而其餘皆為僣偽哉若以自上相授受者為正邪則陳氏何所授拓跋氏何所受若以居中夏者為正邪則劉石慕容符姚赫連所得之土皆五帝三王之舊都也若以有道德者為正邪則蕞爾之國必有令主三代之季豈無僻王是以正閏之論自古及今未有能通其義確然使人不可移奪者也臣今所述止欲叙國家之興衰著生民之休戚使觀者自擇其善惡得失以為勸戒非若春秋立褒貶之灋撥亂世反諸正也正閏之際非所敢知但據其功業之實而言之周秦漢晉隋唐皆嘗混壹九州傳祚於後子孫雖微弱播遷猶承祖宗之業有紹復之望四方與之爭衡者皆其故臣也故全用天子之制以臨之其餘地醜德齊莫能相壹名號不異本非君臣者皆以列國之制處之彼此鈞敵無所抑揚庶幾不誣事實近於至公然天下離析之際不可無歲時月日以識事之先後據漢傳於魏而晉受之晉傳於宋以至於陳而隋取之唐傳於梁以至於周而大宋承之故不得不取魏宋齊梁陳後梁後唐後晉後漢後周年號以紀諸國之事非尊此而卑彼有正閏之辨也昭烈之於漢雖云中山靖王之後而族屬踈逺不能紀其世數名位亦猶宋高祖稱楚元王後南唐烈祖稱呉王恪後是非難辨故不敢以光武及晉元帝為比使得紹漢氏之遺統也孫權自公安徙都鄂更名鄂曰武昌五月辛巳漢主立夫人呉氏為皇后后偏將軍懿之妹故劉璋兄瑁之妻也立子禪為皇太子娶車騎將軍張飛女為太子妃太祖之入鄴也帝為五官中郎將見􅀽熈妻中山甄氏美而恱之太祖為之聘焉生子叡及即皇帝位安平郭貴嬪有寵甄夫人留鄴不得見失意有怨言郭貴嬪譛之帝大怒六月丁夘遣使賜夫人死帝以宗廟在鄴祀太祖於洛陽建始殿如家人禮戉辰晦日有食之有司奏免太尉詔曰災異之作以譴元首而歸過股肱豈禹湯罪已之義乎其令百官各䖍厥職後有天地之眚勿復劾三公漢主立其子永為魯王理為梁王漢主恥關羽之没將擊孫權翊軍將軍趙雲曰國賊曹操非孫權也若先滅魏則權自服今操身雖斃子丕簒盜當因衆心早圖關中居河渭上流以討凶逆関東義士必裹糧策馬以迎王師不應置魏先與呉戰兵埶一交不得卒解非䇿之上也羣臣諫者甚衆漢主皆不聽廣漢處士秦宓陳天時必無利坐下獄幽閉然後貸出初車騎將軍張飛雄壯威猛亞於關羽羽善待卒伍而驕於士大夫飛愛禮君子而不恤軍人漢主常戒飛曰卿刑殺既過差又日鞭檛健兒而令在左右此取禍之道也飛猶不悛漢主將伐孫權飛當率兵萬人自閬中㑹江州臨發其帳下將張達范彊殺飛以其首順流犇孫權漢主聞飛營都督有表曰噫飛死矣陳壽評曰關羽張飛皆稱萬人之敵為世虎臣羽報效曹公飛義釋嚴顔並有國士之風然羽剛而自矜飛暴而無恩以短取敗理數之常也秋七月漢王自率諸軍擊孫權權遣使求和於漢南郡太守諸葛瑾遺漢主牋曰陛下以關羽之親何如先帝荆州大小孰與海内俱應仇疾誰當先後若審此數易於反掌矣漢主不聽時或言瑾别遣親人與漢主相聞者權曰孤與子瑜有死生不易之誓子瑜之不負孤猶孤之不負子瑜也然謗言流聞於外陸遜表明瑾必無此宜有以散其意權報曰子瑜與孤從事積年恩如骨肉深相明究其為人非道不行非義不言􅀇德昔遣孔明至呉孤嘗語子瑜曰卿與孔明同産且弟隨兄於義為順何以不留孔明孔明若留從卿者孤當以書解􅀇德意自隨人耳子瑜荅孤言弟亮已失身於人委質定分義無二心弟之不留猶瑾之不往也其言足貫神明今豈當有此乎前得妄語文䟽謂神交非外言所閒知卿意至輒封來表以示子瑜使知卿意漢主遣將軍呉班馮習攻破權將李異劉阿等於巫進兵秭歸兵四萬餘人武陵蠻夷皆遣使往請兵權以鎮西將軍陸遜為大都督假節督將軍朱然潘璋宋謙韓當徐盛鮮于丹孫桓等五萬人拒之皇弟鄢陵侯彰宛侯據魯陽侯宇譙侯林賛侯衮襄邑侯峻􅀪農侯幹壽春侯彪歷城侯徽平輿侯茂皆進爵為公安鄉侯植改封鄄城侯築陵雲臺初帝詔羣臣令料劉備當為關羽出報孫權否衆議咸云蜀小國耳名將唯羽羽死軍破國内憂懼無縁復出侍中劉曄獨曰蜀雖陿弱而僃之謀欲以威武自彊埶必用衆以示有餘且關羽與僃義為君臣恩猶父子羽死不能為興軍報敵於終始之分不足矣八月孫權遣使稱臣卑辭奉章并送于禁等還朝臣皆賀劉曄獨曰權無故求降必內有急權前襲殺關羽劉僃必大興師伐之外有彊冦衆心不安又恐中國往乘其釁故委地求降一以却中國之兵二假中國之援以彊其衆而疑敵人耳天下三分中國十有其八呉蜀各保一州阻山依水有急相救此小國之利也今還自相攻天亡之也宜大興師徑渡江襲之蜀攻其外我襲其内呉之亡不出旬日矣呉亡則蜀孤若割呉之半以與蜀蜀固不能久存況蜀得其外我得其内乎帝曰人稱臣降而伐之疑天下欲來者心不若且受呉降而襲蜀之後也對曰蜀逺呉近又聞中國伐之便還軍不能止也今僃已怒興兵擊呉聞我伐呉知呉必亡將喜而進與我爭割呉地必不改計抑怒救呉也帝不聽遂受呉降于禁須髮皓白形容憔顇見帝泣涕頓首帝慰喻以荀林父孟明視故事拜安逺將軍令北詣鄴謁髙陵帝使豫於陵屋畫關羽戰克龎德憤怒禁降服之狀禁見慙恚發病死臣光曰于禁將數萬衆敗不能死生降於敵既而復歸文帝廢之可也殺之可也乃畫陵屋以辱之斯為不君矣丁巳遣太常邢貞奉䇿即拜孫權為呉王加九錫劉曄曰不可先帝征伐天下十兼其八威震海内陛下受禪即真德合天地聲暨四逺權雖有雄才故漢票騎將軍南昌侯耳官輕埶卑士民有畏中國心不可彊迫與成所謀也不得已受其降可進其將軍號封十萬戸侯不可即以為王也夫王位去天子一階耳其禮秩服御相亂也彼直為侯江南士民未有君臣之分我信其偽降就封殖之崇其位號定其君臣是為虎傅翼也權既受王位却蜀兵之後外盡禮以事中國使其國内皆聞内為無禮以怒陛下陛下赫然發怒興兵討之乃徐告其民曰我委身事中國不愛珍貨重寳隨時貢獻不敢失臣禮而無故伐我必欲殘我國家俘我人民以為僕妾呉民無縁不信其言也信其言而感怒上下同心戰加十倍矣又不聽諸將以呉内附意皆縱緩獨征南大將軍夏侯尚益脩攻守之備山陽曹偉素有才名聞呉稱藩以白衣與呉王交書求賂欲以交結京師帝聞而誅之呉人城武昌初帝欲以楊彪為太尉彪辭曰嘗為漢朝三公值世衰亂不能立尺寸之益若復為魏臣於國之選亦不為榮也帝乃止冬十月己亥公卿朝朔旦并引彪待以客禮賜延年杖馮几使著布單衣皮弁以見拜光禄大夫秩中二千石朝見位次三公又令門施行馬置吏卒以優崇之年八十四而卒以穀貴罷五銖錢涼州盧水胡治元多等反河西大擾帝召鄒􅄮還以京兆尹張既為涼州刺史遣䕶軍夏侯儒將軍費曜等繼其後胡七千餘騎逆拒既於鸇隂口既揚聲軍從顫隂乃濳由且次出武威胡以為神引還顯美既已據武威曜乃至儒等猶未達既勞賜將士欲進軍擊胡諸將皆曰士卒疲倦虜衆氣銳難與爭鋒既曰今軍無見糧當因敵為資若虜見兵合退依深山追之則道險窮餓兵還則出候寇鈔如此兵不得解所謂一日縱敵患在數世也遂前軍顯美十一月胡騎數千因大風欲放火燒營將士皆恐既夜藏精卒三千人為伏使參軍成公英督千餘騎挑戰敕使陽退胡果爭犇之因發伏截其後首尾進擊大破之斬首獲生以萬數河西悉平後西平麴光反殺其郡守諸將欲擊之既曰唯光等造反郡人未必悉同若便以軍臨之吏民羌胡必謂國家不别是非更使皆相持著此為虎傅翼也光等欲以羌胡為援今先使羌胡鈔擊重其賞募所虜獲者皆以畀之外沮其埶内離其交必不戰而定乃移檄告諭諸羌為光等所詿誤者原之能斬賊帥送首者當加封賞於是光部黨斬送光首其餘皆安堵如故邢貞至呉呉人以為宜稱上將軍九州伯不當受魏封呉王曰九州伯於古未聞也昔沛公亦受項羽封為漢王蓋時宜耳復何損邪遂受之呉王出都亭侯貞貞入門不下車張昭謂貞曰夫禮無不敬灋無不行而君敢自尊大豈以江南寡弱無方寸之刃故乎貞即遽下車中郎將琅邪徐盛忿憤顧謂同列曰盛等不能奮身出命為國家并許洛吞巴蜀而令吾君與貞盟不亦辱乎因涕泣横流貞聞之謂其徒曰江東將相如此非久下人者也呉王遣中大夫南陽趙咨入謝帝問曰呉主何等主也對曰聦明仁智雄略之主也帝問其狀對曰納魯肅於凡品是其聦也拔吕䝉於行陳是其明也獲于禁而不害是其仁也取荆州兵不血刃是其智也據三州虎視於天下是其雄也屈身於陛下是其略也帝曰呉王頗知學乎咨曰呉王浮江萬艘帶甲百萬任賢使能志存經略雖有餘閑博覽書傳歴史籍采竒異不效書生尋章摘句而已帝曰呉可征否對曰大國有征伐之兵小國有備禦之固帝曰呉難魏乎對曰帶甲百萬江漢為池何難之有帝曰呉如大夫者幾人對曰聦明特達者八九十人如臣之比車載斗量不可勝數帝遣使求雀頭香大貝明珠象牙犀角玳瑁孔雀翡翠鬭鴨長鳴鷄於呉呉羣臣曰荆揚二州貢有常典魏所求珍玩之物非禮也宜勿與呉王曰方有事於西北江表元元恃主為命彼所求者於我瓦石耳孤何惜焉且彼在諒闇之中而所求若此寧可與言禮哉皆具以與之呉王以其子登為太子妙選師友以南郡太守諸葛瑾之子恪綏逺將軍張昭之子休大理呉郡顧雍之子譚偏將軍廬江陳武之子表皆為中庶子入講詩書出從騎射謂之四友登接待僚屬畧用布衣之禮十二月帝行東巡帝欲封呉王子登為萬戸侯呉王以登年㓜上書辭不受復遣西曹掾呉郡沈珩入謝并獻方物帝問曰呉嫌魏東向乎珩曰不嫌曰何以曰信恃舊盟言歸于好是以不嫌若魏渝盟自有豫備又問聞太子當來寧然乎珩曰臣在東朝朝不坐宴不與若此之議無所聞也帝善之呉王於武昌臨釣臺飲酒大醉使人以水灑羣臣曰今日酣飲惟醉墮臺中乃當止耳張昭正色不言出外車中坐王遣人呼昭還入謂曰為共作樂耳公何為怒乎昭對曰昔紂為糟丘酒池長夜之飲當時亦以為樂不以為惡也王黙然慙遂罷酒呉王與羣臣飲自起行酒虞翻伏地陽醉不持王去翻起坐王大怒手劒欲擊之侍坐者莫不惶遽惟大司農劉基起抱王諫曰大王以三爵之後手殺善士雖翻有罪天下孰知之且大王以能容賢畜衆故海内望風今一朝棄之可乎王曰曹孟德尚殺孔文舉孤於虞翻何有哉基曰孟德輕害士人天下非之大王躬行德義欲與堯舜比隆何得自喻於彼乎翻由是得免王因敕左右自今酒後言殺皆不得殺基繇之子也初太祖既克蹋頓而烏􅁊浸衰鮮卑大人步度根軻比能素利彌加厥機等因閻柔上貢獻求通市太祖皆表寵以為王軻比能本小種鮮卑以勇徤廉平為衆所服由是能威制餘部最為彊盛自雲中五原以東抵遼水皆為鮮卑庭軻比能與素利彌加割地統御各有分界軻比能部落近塞中國人多亡叛歸之素利等在遼西右北平漁陽塞外道逺故不為邊患帝以平虜校尉牽招為䕶鮮卑校尉南陽太守田豫為䕶烏􅁊校尉使鎮撫之三年春正月丙寅朔日有食之庚午帝行如許昌詔曰今之計孝古之貢士也若限年然後取士是吕尚周晉不顯於前世也其令郡國所選勿拘老㓜儒通經術吏達文灋到皆試用有司糾故不以實者二月鄯善􅀛兹于闐王各遣使奉獻是後西域復通置戊巳校尉漢主自秭歸將進擊呉治中從事黄權諫曰呉人悍戰而水軍㳂流進易退難臣請為先驅以當寇陛下宜為後鎮漢主不從以權為鎮北將軍使督江北諸軍自率諸將自江南縁山截嶺軍於夷道猇亭呉將皆欲迎擊之陸遜曰備舉軍東下銳氣始盛且乗高守險難可卒攻攻之縱下猶難盡克若有不利損我大埶非小故也今但且奬厲將士廣施方畧以觀其變若此間是平原曠野當恐有顛沛交逐之憂今縁山行軍埶不得展自當罷於木石之間徐制其敝耳諸將不解以為遜畏之各懐憤恨漢人自佷山通武陵使侍中襄陽馬良以金錦賜五谿諸蠻夷授以官爵三月乙丑立皇子齊公叡為平原王皇弟鄢陵公彰等皆進爵為王甲戌立皇子霖為河東王甲午帝行如襄邑夏四月戊申立鄄城侯植為鄄城王是時諸侯王皆寄地空名而無其實王國各有老兵百餘人以為守衛隔絶千里之外不聽朝聘為設防輔監國之官以伺察之雖有王侯之號而儕於匹夫皆思為布衣而不能得灋既峻切諸侯王過惡日聞獨北海王衮謹愼好學未嘗有失文學防輔相與言曰受詔察王舉措有過當奏及有善亦宜以聞遂共表稱陳衮美衮聞之大驚懼責讓文學曰脩身自守常人之行耳而諸君乃以上聞是適所以増其負累也且如有善何患不聞而遽共如是是非所以為益也癸亥帝還許昌五月以江南八郡為荆州江北諸郡為郢州漢人自巫峽建平連營至夷陵界立數十屯以馮習為大督張南為前部督自正月與呉相拒至六月不決漢主遣呉班將數千人於平地立營呉將帥皆欲擊之陸遜曰此必有譎且觀之漢主知其計不行乃引伏兵八千從谷中出遜曰所以不聽諸君擊班者揣之必有巧故也遜上䟽於呉王曰夷陵要害國之關限雖為易得亦復易失失之非徒損一郡之地荆州可憂今日爭之當令必諧僃干天常不守窟穴而敢自送臣雖不材慿奉威靈以順討逆破壊在近無可憂者臣初嫌之水陸俱進今反捨船就步處處結營察其布置必無他變伏願至尊高枕不以為念也閏月遜將進攻漢軍諸將並曰攻僃當在初今乃令入五六百里相守經七八月其諸要害皆已固守擊之必無利矣遜曰僃是猾虜更嘗事多其軍始集思慮精專未可干也今住已久不得我便兵疲意沮計不復生掎角此寇正在今日乃先攻一營不利諸將皆曰空殺兵耳遜曰吾已曉破之之術乃敕各持一把茅以火攻拔之一爾埶成通率諸軍同時俱攻斬張南馮習及胡王沙摩柯等首破其四十餘營漢將杜路劉寧等窮逼請降漢主升馬鞌山陳兵自繞遜督促諸軍四靣蹙之土崩瓦解死者萬數漢主夜遁驛人自擔燒鐃鎧斷後僅得入白帝城其舟船器械水步軍資一時畧盡尸骸塞江而下漢主大慙恚曰吾乃為陸遜所折辱豈非天邪將軍義陽傅肜為後殿兵衆盡死肜氣益烈呉人諭之使降肜罵曰呉狗安有漢將軍而降者遂死之從事祭酒程畿泝江而退衆曰後追將至宜解舫輕行畿曰吾在軍未習為敵之走也亦死之初呉安東中郎將孫􅁊别擊漢前鋒於夷道為漢所圍求救於陸遜遜曰未可諸將曰孫安東公族見圍已困奈何不救遜曰安東得士衆心城牢糧足無可憂也待吾計展欲不救安東安東自解及方略大施漢果犇潰􅁊後見遜曰前實怨不見救定至今日乃知調度自有方耳初遜為大都督諸將或討逆時舊將或公室貴戚各自矜恃不相聽從遜按劒曰劉備天下知名曹操所憚今在境界此彊對也諸君並荷國恩當相輯睦共翦此虜上報所受而不相順何也僕雖書生受命主上國家所以屈諸君使相承望者以僕尺寸可稱能忍辱負重故也各任其事豈復得辭軍令有常不可犯也及至破僃計多出遜諸將乃服呉王聞之曰公何以初不啓諸將違節度者邪對曰受恩深重此諸將或任腹心或堪爪牙或是功臣皆國家所當與共克定大事者臣竊慕相如冦恂相下之義以濟國事王大笑稱善加遜輔國將軍領荆州牧改封江陵侯初諸葛亮與尚書令灋正好尚不同而以公義相取亮每竒正智術及漢主伐呉而敗時正已卒亮歎曰孝直若在必能制主上東行就使東行必不傾危矣漢主在白帝徐盛潘璋宋謙等各競表言僃必可禽乞復攻之呉王以問陸遜遜與朱然駱統上言曰曹丕大合士衆外託助國討僃内實有姦心謹決計輒還初帝聞漢兵樹栅連營七百餘里謂羣臣曰僃不曉兵豈有七百里營可以拒敵者乎苞原隰險阻而為軍者為敵所禽此兵忌也孫權上事今至矣後七日呉破漢書到秋七月冀州大蝗饑漢主既敗走黄權在江北道絶不得還八月率其衆來降漢有司請收權妻子漢主曰孤負黄權權不負孤也待之如初帝謂權曰君捨逆效順欲追蹤陳韓邪對曰臣過受劉主殊遇降呉不可還蜀無路是以歸命且敗軍之將免死為幸何古人之可慕也帝善之拜為鎮南將軍封育陽侯加侍中使陪乗蜀降人或云漢誅權妻子帝詔權發喪權曰臣與劉葛推誠相信明臣本志竊疑未實請須後得審問果如所言馬良亦死於五谿九月甲午詔曰夫婦人與政亂之本也自今以後羣臣不得奏事太后后族之家不得當輔政之任又不得横受茅土之爵以此詔傳之後世若有背違天下共誅之卞太后每見外親不假以顔色常言居處當節儉不當望賞念自佚也外舎當怪吾遇之太薄吾自有常度故也吾事武帝四五十年行儉日久不能自變為奢有犯科禁者吾且能加罪一等耳莫望錢米恩貸也帝將立郭貴嬪為后中郎棧潜上䟽曰夫后妃之德盛衰治亂所由生也是以聖哲慎立元妃必取先代世族之家擇其令淑以統六宫䖍奉宗廟易曰家道正而天下定由内及外先王之令典也春秋書宗人釁夏云無以妾為夫人之禮齊􅁊誓命于葵丘亦曰無以妾為妻令後宫嬖寵常亞乗輿若因愛登后使賤人􅁀貴臣恐後世下陵上㬱開張非度亂自上起也帝不從庚子立皇后郭氏初呉王遣于禁䕶軍浩周軍司馬東里衮詣帝自陳誠􅅃辭甚恭慤帝問周等權可信乎周以為權必臣服而衮謂其不可必服帝恱周言以為有以知之故立為呉王復使周至呉周謂呉王曰陛下未信王遣子入侍周以闔門百口明之呉王為之流涕霑襟指天為誓周還而侍子不至但多設虛辭帝欲遣侍中辛毗尚書􅁊階往與盟誓并責任子呉王辭讓不受帝怒欲伐之劉曄曰彼新得志上下齊心而阻帶江湖不可倉卒制也帝不從九月命征東大將軍曹休前將軍張遼鎮東將軍臧霸出洞口大將軍曹仁出濡須上軍大將軍曹真征南大將軍夏侯尚左將軍張郃右將軍徐晃圍南郡呉建威將軍吕範督五軍以舟軍拒体等左將軍諸葛瑾平北將軍潘璋將軍楊粲救南郡禆將軍朱桓以濡須督拒曹仁冬十月甲子表首陽山東為壽陵作終制務從儉薄不臧金玉一用瓦器令以此詔藏之宗廟副在尚書祕書三府呉王以楊越蠻夷多未平集乃卑辭上書求自改厲若罪在難除必不見置當奉還土地民人寄命交州以終餘年又與浩周書云欲為子登求昬宗室又云以登年弱欲遣孫長緒張子布隨登俱來帝報曰朕之與君大義已定豈樂勞師逺臨江漢若登身朝到夕召兵還耳於是呉王改元黄武臨江拒守帝自許昌南征復郢州為荆州十一月辛丑帝如宛曹休在洞口自陳願將銳卒虎步江南因敵取資事必克捷若其無臣不須為念帝恐休便渡江驛馬止之侍中董昭侍側曰竊見陛下有憂色獨以休濟江故乎今者渡江人情所難就休有此志埶不獨行當須諸將臧霸等既富且貴無復他望但欲終其天命保守禄祚而已何肯乗危自投死地以求徼倖茍霸等不進休意自沮臣恐陛下雖有敕渡之詔猶必沈吟未便從命也頃之㑹暴風吹呉吕範等船綆纜悉斷直詣休等營下斬首獲生以千數呉兵迸散帝聞之敕諸軍促渡軍未時進呉救船遂至收軍還江南曹休使臧霸追之不利將軍尹盧戰死庚申晦日有食之呉王使太中大夫鄭泉聘于漢漢太中大夫宗瑋報之呉漢復通漢主聞魏師大出遺陸遜書曰賊今已在江漢吾將復東將軍謂其能然否遜荅曰但恐軍新破創夷未復始求通親且當自補未暇窮兵耳若不推算欲復以傾覆之餘逺送以來者無所逃命漢漢嘉太守黄元叛呉將孫盛督萬人據江陵中洲以為南郡外援資治通鑑卷第六十九
