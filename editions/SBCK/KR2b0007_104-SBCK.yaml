body:
  text: 夏五月甲寅大赦初張天錫之殺張邕也劉肅及安定梁景皆有功二人由是有寵賜姓張氏以爲己子使預政事天錫荒于酒色不親庶務黜世子大懐而立嬖妾焦氏之子大豫以焦氏爲左夫人人情憤怨從弟從事中郎憲輿櫬切諫不聽秦王堅下詔曰張天錫雖稱藩受位然臣道未純可遣使持節武衛將軍武都苟萇左將軍毛盛中書令梁熈歩兵校尉姚萇等將兵臨西河尚書郎閻負梁殊奉詔徴天錫入朝若有違王命即進師撲討是時秦步騎十三萬軍司叚鏗謂周虓曰以此衆戰誰能敵之虓曰戎狄以來未之有也堅又命秦州刺史苟池河州刺史李辯涼州刺史王統帥三州之衆爲苟萇後繼秋七月閻負梁殊至姑臧張天錫會官屬謀之曰今入朝必不返如其不從秦兵必至將若之何禁中録事席仂曰以愛子爲質賂以重寳以退其師然後徐爲之計此屈伸之術也衆皆怒曰吾世事晉朝忠節著於海内今一旦委身賊庭辱及祖宗醜莫大焉且河西天險百年無虞若悉境内精兵右招西域北引匈奴以拒之何遽知其不捷也天錫攘袂大言曰孤計決矣言降者斬使謂閻負梁殊曰君欲生歸乎死歸乎殊等辭氣不屈天錫怒􅅞之軍門命軍士交射之曰射而不中不與我同心者也其母嚴氏泣曰秦主以一州之地横制天下東平鮮卑南取巴蜀兵不留行所向無敵汝若降之猶可延數年之命今以蕞爾一隅抗衡大國又殺其使者亡無日矣天錫使龍驤將軍馬建帥衆二萬拒秦秦人聞天錫殺閻負梁殊八月梁熈姚萇王統李辯濟自清石津攻涼驍烈將軍梁濟於河會城降之甲申茍萇濟自石城津與梁熈等會攻纒縮城拔之馬建懼自楊非退屯清塞天錫又遣征東將軍掌據帥衆三萬軍于洪池天錫自將餘衆五萬軍于金昌城安西將軍敦煌宋皓言於天錫曰臣晝察人事夜觀天文秦兵不可敵也不如降之天錫怒貶皓爲宣威護軍廣武太守辛章曰馬建出於行陳必不爲國家用茍萇使姚萇帥甲士三千爲前驅庚寅馬建帥萬人迎降餘兵皆散走辛夘苟萇及掌據戰于洪池據兵敗馬爲亂兵所殺其屬董儒授之以馬據曰吾三督諸軍再秉節􅃏八將禁旅十揔外兵寵任極矣今卒困於此此吾之死地也尚安之乎乃就帳免胄西向稽首伏劔而死秦兵殺軍司席仂癸巳秦兵入清塞天錫遣司兵趙充哲帥衆拒之秦兵與充哲戰于赤岸大破之俘斬三萬八千級充哲死天錫出城自戰城内又叛天錫與數千騎奔還姑臧甲午秦兵至姑臧天錫素車白馬面􅅞輿櫬降于軍門苟萇釋􅅞焚櫬送于長安涼州郡縣悉降於秦九月秦王堅以梁熈爲涼州刺史鎭姑臧徙豪右七千餘户于關中餘皆按堵如故封天錫爲歸義矦拜北部尚書初秦兵之出也先爲天錫築第於長安至則居之以天錫晉興太守隴西彭和正爲黄門侍郎治中從事武興蘇膺敦煌太守張烈爲尚書郎西平太守金城趙凝爲金城太守髙昌楊幹爲髙昌太守餘皆隨才擢敘梁熈清儉愛民河右安之以天錫武威太守敦煌索泮爲别駕宋皓爲主簿西平郭護起兵攻秦熈以皓爲折衝將軍討平之桓沖聞秦攻涼州遣兖州刺史朱序江州刺史桓石秀與荆州督護桓羆遊軍沔漢爲涼州聲援又遣豫州刺史桓伊帥衆向壽陽淮南太守劉波汎舟淮泗欲橈秦以救涼聞涼州敗沒皆罷兵初哀帝減田租畒収二升乙巳除度田収租之制王公以下口税米三斛蠲在役之身冬十月移淮北民於淮南劉衛辰爲代所逼求救於秦秦王堅以幽州刺史行唐公洛爲北討大都督帥幽冀兵十萬擊代使并州刺史俱難鎭軍將軍鄧羌尚書趙遷李柔前將軍朱肜前禁將軍張蚝右禁將軍郭慶帥步騎二十萬東出和龍西出上郡皆與洛會以衛辰爲鄉導洛菁之弟也苟萇之伐涼州也遣揚武將軍馬暉建武將軍杜周帥八千騎西出恩宿邀張天錫走路期會姑臧暉等行澤中值水失期於灋應斬有司奏徵下獄秦王堅曰水春冬耗竭秋夏盛漲此乃苟萇量事失宜非暉等罪今天下方有事宜宥過責功命暉等回赴北軍擊索虜以自贖衆咸以爲萬里召將非所以應速堅曰暉等喜於免死不可以常事疑也暉等果倍道疾驅遂及東軍十一月己巳朔日有食之代王什翼犍使白部獨孤部南禦秦兵皆不勝又使南部大人劉庫仁將十萬騎禦之庫仁者衛辰之族什翼犍之甥也與秦兵戰於石子嶺庫仁大敗什翼犍病不能自將乃帥諸部奔隂山之北髙車雜種盡叛四面寇鈔不得芻牧什翼犍復度漠南聞秦兵稍退十二月什翼犍還雲中初什翼犍分國之半以授弟孤孤卒子斤失職怨望世子寔及弟翰早卒寔子珪尚㓜慕容妃之子閼婆壽鳩紇根地干力眞窟咄皆長繼嗣未定時秦兵尚在君子津諸子每夜執兵警衛斤因説什翼犍之庶長子寔君曰王將立慕容妃之子欲先殺汝故頃來諸子毎夜戎服以兵遶廬帳伺便將發耳寔君信之遂殺諸弟并弑什翼犍是夜諸子婦及部人奔告秦軍秦李柔張蚝勒兵趨雲中部衆逃潰國中大亂珪母賀氏以珪走依賀訥訥野干之子也秦王堅召代長史燕鳯問代所以亂故鳳具以狀對堅曰天下之惡一也乃執寔君及斤至長安車裂之堅欲遷珪於長安鳳固請曰代王初亡羣下叛散遺孫沖㓜莫相統攝其别部大人劉庫仁勇而有智鐵弗衛辰狡猾多變皆不可獨任宜分諸部爲二令此兩人統之兩人素有深讎其勢莫敢先發俟其孫稍長引而立之是陛下有存亡繼絶之徳於代使其子子孫孫永爲不侵不叛之臣此安邊之良䇿也堅從之分代民爲二部自河以東屬庫仁自河以西屬衛辰各拜官爵使統其衆賀氏以珪歸獨孤部與南部大人長孫嵩元佗等皆依庫仁行唐公洛以什翼犍子窟咄年長遷之長安堅使窟咄入太學讀書下詔曰張天錫承祖父之資藉百年之業擅命河右叛換偏隅索頭世跨朔北中分區域東賔穢貊西引烏孫控􅁌百萬虎視雲中爰命兩師分討黠虜役不淹歳窮殄二凶俘降百萬闢土九千五帝之所未賔周漢之所未至莫不重譯來王懷風率職有司可速班功受爵戎士悉復之五歳賜爵三級於是加行唐公洛征西將軍以鄧羌爲并州刺史陽平國常侍慕容紹私謂其兄楷曰秦恃其彊大務勝不休北戍雲中南守蜀漢轉運萬里道殣相望兵疲於外民困於内危亡近矣冠軍叔仁智度英拔必能恢復燕祚吾屬但當愛身以待時耳􅀄秦人既克涼州議討西障氐羌秦王堅曰彼種落雜居不相統壹不能爲中國大患宜先撫諭徵其租税若不從命然後討之乃使殿中將軍張旬前行宣慰庭中將軍魏曷飛帥騎二萬七千隨之曷飛忿其恃險不服縱兵擊之大掠而歸堅怒其違命鞭之二百斬前鋒督護儲安以謝氐羌氐羌大悦降附貢獻者八萬三千餘落雍州士族先因亂流寓河西者皆聽還本劉庫仁招撫離散恩信甚著奉事拓跋珪恩勤周備不以廢興易意常謂諸子曰此兒有髙天下之志必能恢隆祖業汝曹當謹遇之秦王堅賞其功加廣武將軍給幢麾鼔蓋劉衛辰恥在庫仁之下怒殺秦五原太守而叛庫仁擊衛辰破之追至隂山西北千餘里獲其妻子又西擊庫狄部徙其部落置之桑乾川乆之堅以衞辰爲西單于督攝河西雜類屯代來城是嵗乞伏司繁卒子國仁立二年春髙句麗新羅西南夷皆遣使入貢于秦趙故將作功曹熊邈屢爲秦王堅言石氏宮室器玩之盛堅以邈爲將作長史領尚方丞大修舟艦兵器飾以金銀頗極精巧慕容農私言於慕容垂曰自王猛之死秦之灋制日以頹靡今又重之以奢侈殃將至矣圖䜟之言行當有驗大王宐結納英傑以承天意時不可失也垂笑曰天下事非爾所及桓豁表兖州刺史朱序爲梁州刺史鎭襄陽秋七月丁未以尚書僕射謝安爲司徒安讓不拜復加侍中都督揚豫徐兖青五州諸軍事丙辰征西大將軍荆州刺史桓豁卒冬十月辛丑以桓沖督江荆梁益寧交廣七州諸軍事領荆州刺史以沖子嗣爲江州刺史又以五兵尚書王藴都督江南諸軍事假節領徐州刺史征西司馬領南郡相謝玄爲兖州刺史領廣陵相監江北諸軍事桓沖以秦人彊盛欲移阻江南奏自江陵徙鎭上明使冠軍將軍劉波守江陵諮議參軍楊亮守江夏王藴固讓徐州謝安曰卿居后父之重不應妄自菲薄以虧時遇藴乃受命初中書郎郗超自以其父愔位遇應在謝安之右而安入掌機權愔優遊散地常憤邑形於辭色由是與謝氏有隙是時朝廷方以秦寇爲憂詔求文武良將可以鎭禦北方者謝安以兄子􅀇應詔超聞之歎曰安之明乃能違衆舉親􅀇之才足以不負所舉衆咸以爲不然超曰吾嘗與􅀇共在桓公府見其使才雖履􅄚閒未嘗不得其任是以知之􅀇募驍勇之士得彭城劉牢之等數人以牢之爲參軍常領精鋭爲前鋒戰無不捷時號北府兵敵人畏之壬寅護軍將軍散騎常侍王彪之卒初謝安欲増修宮室彪之曰中興之初即東府爲宮殊爲儉陋蘇峻之亂成帝止蘭臺都坐殆不蔽寒暑是以更營新宮比之漢魏則爲儉比之初過江則爲侈矣今宼敵方彊豈可大興功役勞擾百姓邪安曰宮室弊陋後世謂人無能彪之曰凡任天下之重者當保國寧家緝熈政事乃以修室屋爲能邪安不能奪其議故終彪之之世無所營造十二月臨海太守郗超卒􅀄超黨於􅁊氏以父愔忠於王室不令知之及病甚出一箱書授門生曰公年尊我死之後若以哀惋害寢食者可呈此箱不爾即焚之既而愔果哀惋成疾門生呈箱皆與桓温往反密計愔大怒曰小子死已晩矣遂不復哭三年春二月乙巳作新宮帝移居會稽王邸秦王堅遣征南大將軍都督征討諸軍事守尚書令長樂公丕武衛將軍茍萇尚書慕容暐帥步騎七萬寇襄陽以荆州刺史楊安帥樊鄧之衆爲前鋒征虜將軍始平石越帥精騎一萬出魯陽關京兆尹慕容垂揚武將軍姚萇帥衆五萬出南鄉領軍將軍苟池右將軍毛當強弩將軍王顯帥衆四萬出武當會攻襄陽夏四月秦兵至沔北梁州刺史朱序以秦無舟檝不以爲虞既而石越帥騎五千浮渡漢水序惶駭固守中城越克其外郭獲船百餘艘以濟餘軍長樂公丕督諸將攻中城序母韓氏聞秦兵將至自登城履行至西北隅以爲不固帥百餘婢及城中女丁築邪城於其内及秦兵至西北隅果潰衆移守新城襄陽人謂之夫人城桓沖在上明擁衆七萬憚秦兵之彊不敢進丕欲急攻襄陽苟萇曰吾衆十倍於敵糗糧山積但稍遷漢沔之民於許洛塞其運道絶其援兵譬如網中之禽何患不獲而多殺將士急求成功哉丕從之慕容垂拔南陽執太守鄭裔與丕會襄陽秋七月新宮成辛巳帝入居之秦兖州刺史彭超請攻沛郡太守戴􅋟於彭城且曰願更遣重將攻淮南諸城爲征南棊劫之勢東西並進丹楊不足平也秦王堅從之使都督東討諸軍事後將軍俱難右禁將軍毛盛洛州刺史邵保帥步騎七萬宼淮陽盱眙超越之弟保羌之從弟也八月彭超攻彭城詔右將軍毛虎生帥衆五萬鎭姑孰以禦秦兵秦梁州刺史韋鍾圍魏興太守吉挹於西城九月秦王堅與羣臣飲酒以祕書監朱肜爲正命人人以極醉爲限祕書侍郎趙整作酒徳之歌曰地列酒泉天垂酒池杜康妙識儀狄先知紂喪殷邦桀傾夏國由此言之前危後則堅大悦命整書之以爲酒戒自是宴羣臣禮飲而已秦涼州刺史梁熈遣使入西域楊秦威徳冬十月大宛獻汗血馬秦王堅曰吾嘗慕漢文帝之爲人用千里馬何爲命羣臣作止馬之詩而反之巴西人趙寳起兵梁州自稱晉西蠻校尉巴郡太守秦豫州刺史北海公重鎭洛陽謀反秦王堅曰長史呂光忠正必不與之同即命光収重檻車送長安赦之以公就第重洛之兄也十二月秦御史中丞李柔劾奏長樂公丕等擁衆十萬攻圍小城日費萬金乆而無効請徵下廷尉秦王堅曰丕等廣費無成實宜貶戮但師已淹時不可虛返其特原之令以成功贖罪使黄門侍郎韋華持節切讓丕等賜丕劔曰來春不捷汝可自裁勿復持面見吾也周虓在秦密與桓沖書言秦隂計又逃奔漢中秦人獲而赦之四年春正月辛酉大赦秦長樂公丕等得詔惶恐乃命諸軍并力攻襄陽秦王堅欲自將攻襄陽詔陽平公融以關東六州之兵會壽春梁熈以河西之兵爲後繼陽平公融諫曰陛下欲取江南固當博謀熟慮不可倉猝若止取襄陽又豈足親勞大駕乎未有動天下之衆而爲一城者所謂以隨矦之珠彈千仭之雀也梁熈諫曰晉主之暴未如孫皓江山險固易守難攻陛下必欲廓清江表亦不過分命將帥引關東之兵南臨淮泗下梁益之卒東出巴峽又何必親屈鸞輅逺幸沮澤乎昔漢光武誅公孫述晉武帝擒孫皓未聞二帝自統六師親執枹鼓蒙矢石也堅乃止詔冠軍將軍南郡相劉波帥衆八千救襄陽波畏秦不敢進朱序屢出戰破秦兵引退稍逺序不設備二月襄陽督護李伯護密遣其子送欵於秦請爲内應長樂公丕命諸軍進攻之戊午克襄陽執朱序送長安秦王堅以序能守節拜度支尚書以李伯護爲不忠斬之秦將軍慕容越拔順陽執太守譙國丁穆堅欲官之穆固辭不受堅以中壘將軍梁成爲荆州刺史配兵一萬鎭襄陽選其才望禮而用之桓沖以襄陽䧟沒上䟽送章節請解職不許詔免劉波官俄復以爲冠軍將軍秦以前將軍張蚝爲并州刺史兖州刺史謝玄帥衆萬餘救彭城軍于泗口欲遣間使報戴􅋟而不可得部曲將田泓請沒水潜行趣彭城玄遣之泓爲秦人所獲厚賂之使云南軍巳敗泓偽許之既而告城中曰南軍垂至我單行來報爲賊所得勉之秦人殺之彭超置輜重於留城謝玄揚聲遣後軍將軍東海何謙向留城超聞之釋彭城圍引兵還保輜重戴􅋟帥彭城之衆隨謙奔玄超遂據彭城留兖州治中徐褒守之南攻盱眙俱難克淮隂留邵保戍之三月壬戌詔以疆埸多虞年榖不登其供御所須事從儉約九親供給衆官廪俸權可減半凡諸役費自非軍國事要皆宜停省癸未使右將軍毛虎生帥衆三萬擊巴中以救魏興前鋒督護趙福等至巴西爲秦將張紹等所敗亡七千餘人虎生退屯巴東蜀人李烏聚衆二萬圍成都以應虎生秦王堅使破虜將軍呂光擊滅之夏四月戊申韋鍾拔魏興吉挹引刀欲自殺左右奪其刀會秦人至執之挹不言不食而死秦王堅歎曰周孟威不屈於前丁彦逺絜已於後吉祖沖閉口而死何晉氏之多忠臣也挹參軍史頴逃歸得挹臨終手䟽詔贈益州刺史秦毛當王顯帥衆二萬自襄陽東㑹俱難彭超攻淮南五月乙丑難超拔盱眙執髙密内史毛璪之秦兵六萬圍幽州刺史田洛于三阿去廣陵百里朝廷大震臨江列戍遣征虜將軍謝石帥舟師屯涂中石安之弟也右衛將軍毛安之等帥衆四萬屯堂邑秦毛當毛盛帥􅀐二萬襲堂邑安之等驚潰兖州刺史謝玄自廣陵敕三阿丙子難超戰敗退保盱眙六月戊子玄與田洛帥衆五萬進攻盱眙難超又敗退屯淮隂玄遣何謙等帥舟師乗潮而上夜焚淮橋邵保戰死難超退屯淮北玄與何謙戴􅋟田洛共追之戰于君川復大破之難超北走僅以身免謝玄還廣陵詔進號冠軍將軍加領徐州刺史秦王堅聞之大怒秋七月檻車徵超下廷尉超自殺難削爵爲民以毛當爲徐州刺史鎭彭城毛盛爲兖州刺史鎭胡陸王顯爲揚州刺史戍下邳謝安爲宰相秦人屢入宼邊兵失利衆心危懼安毎鎭之以和静其爲政務舉大綱不爲小察時人比安於王導而謂其文雅過之八月丁亥以左將軍王藴爲尚書僕射頃之遷丹楊尹藴自以國姻不欲在内苦求外出復以爲都督浙江東五郡諸軍事會稽内史是歳秦大饑五年春正月秦王堅復以北海公重爲鎭北大將軍鎭薊二月作敎武堂於渭城命太學生明陰陽兵灋者敎授諸將祕書監朱肜諫曰陛下東征西伐所向無敵四海之地什得其八雖江南未服蓋不足言是宜稍偃武事增修文徳乃更始立學舎教人戰鬬之術殆非所以馴致升平也且諸將皆百戰之餘何患不習於兵而更使受敎於書生非所以彊其志氣也此無益於實而有損於名惟陛下圖之堅乃止秦征北將軍幽州刺史行唐公洛勇而多力能坐制奔牛射洞犂耳自以有滅代之功求開府儀同三司不得由是怨憤三月秦王堅以洛爲使持節都督益寧西南夷諸軍事征南大將軍益州牧使自伊闕趣襄陽泝漢而上洛謂官屬曰孤帝室至親不得入爲將相而常擯棄邊鄙今又投之西裔復不聽過京師此必有陰計欲使梁成沈孤於漢水耳於諸君意何如幽州治中平規曰逆取順守湯武是也因禍爲福桓文是也主上雖不爲昏暴然窮兵黷武民思有所息肩者十室而九若明公神旗一建必率土雲從今跨據全燕地盡東海北揔烏桓鮮卑東引句麗百濟控弦之士不減五十餘萬柰何束手就徴蹈不測之禍乎洛攘袂大言曰孤計决矣沮謀者斬於是自稱大將軍大都督秦王以平規爲幽州刺史􅀇莬太守吉貞爲左長史遼東太守趙讃爲左司馬昌黎太守王緼爲右司馬遼西太守王琳北平太守皇甫傑牧官都尉魏敷等爲從事中郎分遣使者徵兵於鮮卑烏桓髙句麗百濟新羅休忍諸國遣兵三萬助北海公重戍薊諸國皆曰吾爲天子守藩不能從行唐公爲逆洛懼欲止猶豫未决王緼王琳皇甫傑魏敷知其無成欲告之洛皆殺之吉貞趙讃曰今諸國不從事乖本圖明公若憚益州之行者當遣使奉表乞留主上亦不慮不從平規曰今事形頗露何可中止宜聲言受詔盡幽州之兵南出常山陽平公必郊迎因而執之進據冀州揔關東之衆以圖西土天下可指麾而定也洛從之夏四月洛帥衆七萬發和龍秦王堅召羣臣謀之步兵校尉呂光曰行唐公以至親爲逆此天下所共疾願假臣步騎五萬取之如拾遺耳堅曰重洛兄弟據東北一隅兵賦全資未可輕也光曰彼衆迫於凶威一時蟻聚耳若以大軍臨之勢必瓦解不足憂也堅乃遣使讓洛使還和龍當以幽州永爲世封洛謂使者曰汝還白東海王幽州􅄶阨不足以容萬乗須王秦中以承髙祖之業若能迎駕潼關者當位爲上公爵歸本國堅怒遣左將軍武都竇衝及呂光帥步騎四萬討之右將軍都貴馳傳詣鄴將冀州兵三萬爲前鋒以陽平公融爲征討大都督北海公重悉薊城之衆與洛會屯中山有衆十萬五月竇衝等與洛戰於中山洛兵大敗生擒洛送長安北海公重走還薊呂光追斬之屯騎校尉石越自東萊帥騎一萬浮海襲和龍斬平規幽州悉平堅赦洛不誅徙涼州之西海郡臣光曰夫有功不賞有罪不誅雖堯舜不能爲治況他人乎秦王堅毎得反者輒宥之使其臣狃於爲逆行險徼幸雖力屈被擒猶不憂死亂何自而息哉書曰威克厥愛允濟愛克厥威允罔功詩云毋縱詭隨以謹罔極式遏冦虐無俾作慝今堅違之能無亡乎朝廷以秦兵之退爲謝安桓沖之功拜安衛將軍與沖皆開府儀同三司六月甲子大赦丁夘以會稽王道子爲司徒固讓不拜秦王堅召陽平公融爲侍中中書監都督中外諸軍事車騎大將軍司􅀠校尉録尚書事以征南大將軍守尚書令長樂公丕爲都督關東諸軍事征東大將軍冀州牧堅以諸氐種類繁滋秋七月分三原九􅉄武都汧雍氐十五萬户使諸宗親各領之散居方鎭如古諸矦長樂公丕領氐三千户以仇池氐酋射聲校尉楊膺爲征東左司馬九􅉄氐酋長水校尉齊午爲右司馬各領一千五百户爲長樂世卿長樂國郎中令略陽垣敞爲録事參軍侍講扶風韋幹爲參軍事申紹爲别駕膺丕之妃兄也午膺之妻父也八月分幽州置平州以石越爲平州刺史鎭龍城中書令梁讜爲幽州刺史鎭薊城撫軍將軍毛興爲都督河秦二州諸軍事河州刺史鎭枹罕長水校尉王騰爲井州刺史鎭晉陽河并二州各配氐户三千興騰並符氏婚姻氐之崇望也平原公暉爲都督豫洛荆南兖東豫揚六州諸軍事鎭東大將軍豫州牧鎭洛陽移洛州刺史治豐陽以鉅鹿公叡爲雍州刺史鎭蒲坂各配氐户三千二百堅送丕至灞上諸氐别其父兄皆慟哭哀感路人趙整因侍宴援琴而歌曰阿得脂阿得脂博勞舅父是仇綏尾長翼短不能飛逺徙種人留鮮卑一旦緩急當語誰堅笑而不納九月癸未皇后王氏崩冬十月九眞太守李遜據交州反秦王堅以左禁將軍楊壁爲秦州刺史尚書趙遷爲洛州刺史南巴校尉姜宇爲寧州刺史十一月乙酉葬定皇后于隆平陵十二月秦以左將軍都貴爲荆州刺史鎭彭城置東豫州以毛當爲刺史鎭許昌是歳秦王堅遣髙密太守毛璪之等二百餘人來歸六年春正月帝初奉佛灋立精舎於殿内引諸沙門居之尚書左丞王雅表諫不從雅肅之曾孫也丁酉以尚書謝石爲僕射二月東夷西域六十二國入貢于秦夏六月庚子朔日有食之秋七月甲午交阯太守杜瑗斬李遜交州平冬十月故武陵王晞卒于新安追封新寧郡王命其子遵爲嗣十一月己亥以前㑹稽内史郗愔爲司空愔固辭不起秦荆州刺史都貴遣其司馬閻振中兵參軍呉仲帥衆二萬宼竟陵桓沖遣南平太守桓石䖍衛軍參軍桓石民等帥水陸二萬拒之石民石䖍之弟也十二月甲辰石䖍襲擊振仲大破之振仲退保管城石䖍進攻之癸亥拔管城獲振仲斬首七千級俘虜萬人詔封桓沖子謙爲宜陽矦以桓石䖍領河東太守是歳江東大饑七年春三月秦大司農東海公陽貟外散騎侍郎王皮尚書郎周虓謀反事覺収下廷尉陽灋之子皮猛之子也秦王堅問其反狀陽曰臣父哀公死不以罪臣爲父復讎耳堅泣曰哀公之死事不在朕卿豈不知之王皮曰臣父丞相有佐命之勲而臣不免貧賤故欲圖富貴耳堅曰丞相臨終託卿以十具牛爲治田之資未嘗爲卿求官知子莫若父何其明也周虓曰虓世荷晉恩生爲晉臣死爲晉鬼復何問乎先是虓屢謀反叛左右皆請殺之堅曰孟威烈士秉志如此豈憚死乎殺之適足成其名耳皆赦不誅徙陽于涼州之髙昌郡皮虓于朔方之北虓卒於朔方陽勇力兼人尋復徙鄯善及建元之末秦國大亂陽劫鄯善之相欲求東歸鄯善王殺之秦王堅徙鄴銅駞銅馬飛廉翁仲于長安夏四月堅扶風太守王永爲幽州刺史永皮之兄也皮凶險無行而永清修好學故堅用之以陽平公融爲司徒融固辭不受堅方謀伐晉乃以融爲征南大將軍開府儀同三司五月幽州蝗生廣袤千里秦王堅使散騎常侍彭城劉蘭發幽冀青并民撲除之秋八月癸卯大赦秦王堅以諫議大夫裴元略爲巴西梓潼二郡太守使密具舟師九月車師前部王彌窴鄯善王休密䭾入朝于秦請爲鄉導以伐西域之不服者因如漢灋置都護以統理之秦王堅以驍騎將軍呂光爲使持節都督西域征討諸軍事與凌江將軍姜飛輕車將軍彭晃將軍杜進康盛等揔兵十萬鐵騎五千以伐西域陽平公融諌曰西域荒逺得其民不可使得其地不可食漢武征之得不補失今勞師萬里之外以踵漢氏之過舉臣竊惜之不聽桓沖使揚威將軍朱綽擊秦荆州刺史都貴于襄陽焚踐沔北屯田掠六百餘户而還冬十月秦王堅會羣臣于太極殿議曰自吾承業垂三十載四方略定唯東南一隅未霑王化今略計吾士卒可得九十七萬吾欲自將以討之何如秘書監朱肜曰陛下恭行天罰必有征無戰晉主不銜壁軍門則走死江海陛下返中國士民使復其桑梓然後回輿東巡告成岱宗此千載一時也堅喜曰是吾志也尚書左僕射權翼曰昔紂爲無道三仁在朝武王猶爲之旋師今晉雖微弱未有大惡謝安􅁊沖皆江表偉人君臣輯睦內外同心以臣觀之未可圖也堅嘿然良久曰諸君各言其志太子左衛率石越曰今歳鎭守斗福徳在呉伐之必有天殃且彼據長江之險民爲之用殆未可伐也堅曰昔武王伐紂逆歳違卜天道幽逺未易可知夫差孫皓皆保據江湖不免於亡今以吾之衆投鞭於江足斷其流又何險之足恃乎對曰三國之君皆淫虐無道故敵國取之易於拾遺今晉雖無徳未有大罪願陛下且案兵積榖以待其釁於是羣臣各言利害久之不決堅曰此所謂築室道旁無時可成吾當内斷於心耳羣臣皆出獨留陽平公融謂之曰自古定大事者不過一二臣而已今衆言紛紛徒亂人意吾當與汝決之對曰今伐晉有三難天道不順一也晉國無釁二也我數戰兵疲民有畏敵之心三也羣臣言晉不可伐者皆忠臣也願陛下聽之堅作色曰汝亦如此吾復何望吾彊兵百萬資仗如山吾雖未爲令主亦非闇劣乗累捷之勢擊垂亡之國何患不克豈可復留此殘宼使長爲國家之憂哉融泣曰晉未可滅昭然甚明今勞師大舉恐無萬全之功且臣之所憂不止於此陛下寵育鮮卑羌羯布滿畿甸此屬皆我之深仇太子獨與弱卒數萬留守京師臣懼有不虞之變生於腹心肘腋不可悔也臣之頑愚誠不足采王景略一時英傑陛下常比之諸葛武矦獨不記其臨沒之言乎堅不聽於是朝臣進諌者衆堅曰以吾擊晉校其彊弱之埶猶疾風之掃秋葉而朝廷内外皆言不可誠吾所不解也太子宏曰今歳在吳分又晉君無罪若大舉不捷恐威名外挫財力内竭此羣下所以疑也堅曰昔吾滅燕亦犯歳而捷天道固難知也秦滅六國六國之君豈皆暴虐乎冠軍京兆尹慕容垂言於堅曰弱併於彊小併於大此理勢自然非難知也以陛下神武應期威加海外虎旅百萬韓白滿朝而蕞爾江南獨違王命豈可復留之以遺子孫哉詩云謀夫孔多是用不集陛下斷自聖心足矣何必廣詢朝衆晉武平吳所仗者張杜二三臣而已若從朝衆之言豈有混壹之功乎堅大恱曰與吾共定天下者獨鄉而巳賜帛五百匹堅鋭意欲取江東寢不能旦陽平公融諌曰知足不辱知止不殆自古窮兵極武未有不亡者且國家本戎狄也正朔會不歸人江東雖㣲弱僅存然中華正統天意必不絶之堅曰帝王曆數豈有常邪惟徳之所在耳劉禪豈非漢之苗裔邪終爲魏所滅汝所以不如吾者正病此不達變通耳堅素信重沙門道安羣臣使道安乗閒進言十一月堅與道安同輦遊于東苑堅曰朕將與公南遊吳越泛長江臨滄海不亦樂乎安曰陛下應天御世居中土而制四維自足以比隆堯舜何必櫛風沐雨經略遐方乎且東南卑濕沴氣易構虞舜遊而不歸大禹往而不復何足以上勞大駕也堅曰天生烝民而樹之君使司牧之朕豈敢憚勞使彼一方獨不被澤乎必如公言是古之帝王皆無征伐也道安曰必不得已陛下宜駐蹕洛陽遣使者奉尺書於前諸將緫六師於後彼必稽首入臣不必親涉江淮也堅不聽堅所幸張夫人諫曰妾聞天地之生萬物聖王之治天下皆因其自然而順之故功無不成是以黄帝服牛乗馬因其性也禹濬九川障九澤因其勢也后稷播殖百榖因其時也湯武帥天下而攻桀紂因其心也皆有因則成無因則敗今朝野之人皆言晉不可伐陛下獨決意行之妾不知陛下何所因也書曰天聦明自我民聦明天猶因民而況人乎妾又聞王者出師必上觀天道下順人心今人心既不然矣請驗之天道諺云雞夜鳴者不利行師犬羣嘷者宮室將空兵動馬驚軍敗不歸自秋冬以來衆雞夜鳴羣犬哀嘷廄馬多驚武庫兵器自動有聲此皆非出師之祥也堅曰軍旅之事非婦人所當預也堅幼子中山公詵最有寵亦諫曰臣聞國之興亡繫賢人之用捨今陽平公國之謀主而陛下違之晉有謝安桓沖而陛下伐之臣竊惑之堅曰天下大事孺子安知秦劉蘭討蝗經秋冬不能滅十二月有司奏請徵蘭下廷尉秦王堅曰災降自天非人力所能除此由朕之失政蘭何罪乎是歳秦大熟上田畒収七十石下者三十石蝗不出幽州之境不食麻豆上田􅅿収百石下者五十石資治通鑑卷第一百四􅀳孝武
