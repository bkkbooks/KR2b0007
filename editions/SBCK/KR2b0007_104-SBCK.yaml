front:
  text: 堅下詔曰朕聞王者勞於求賢逸於得士斯言何其驗也往得丞相常謂帝王易爲自丞相違世鬚髮中白毎一念之不覺酸慟今天下既無丞相或政教淪替可分遣侍臣周巡郡縣問民疾苦三月秦兵寇南鄉拔之山蠻三萬户降秦
  hash: sha256:c1e5b844c77c6353c082226d90488831d6e21aca284f9c0a74eabc4f80e3f70f
