front:
  text: 資治通鑑巻第一百九十
  hash: sha256:d246d54abf5d0c271940577017e3e421dcd2357412305f3bd73c8c1fa67dec8f
body:
  text: 臣司馬光奉勑編集唐紀六洽五月凡二年有竒起玄黓敦牂盡昭陽協髙祖神堯太皇光孝皇帝中之下武徳五年春正月劉黑闥自稱漢東王改元天造定都洺州以范願爲左僕射董康買爲兵部尚書髙雅賢爲右領軍徴王琮爲中書令劉斌爲中書侍郎竇建徳時文武悉復本位其設法行政悉師建徳而攻戰勇決過之丙戌同安賊帥殷恭邃以舒州來降丁亥濟州别駕劉伯通執刺史竇務本以州附徐圓朗庚寅東鹽州治中王才藝殺刺史田華以城應劉黑闥秦王世民軍至獲嘉劉黑闥弃相州退保洺州丙申世民復取相州進軍肥鄉列營洺水之上以逼之蕭銑既敗散兵多歸林士􅀪軍勢復振己酉嶺南俚帥楊世畧以循潮二州來降唐使者王義童下泉睦建三州幽州揔管李藝將所部兵數萬㑹秦王世民討劉黑闥黑闥聞之留兵萬人使范願守洺州自將兵拒藝夜宿沙河程名振載鼔六十具於城西二里隄上急擊之城中地皆震動范願驚懼馳告黑闥黑闥遽還遣其弟十善與行臺張君立將兵一萬擊藝於鼓城壬子戰於徐河十善君立大敗所失亡八千人洺水人李去惑據城來降秦王世民遣彭公王君廓將千五百騎赴之入城共守二月劉黑闥引兵還攻洺水癸亥行至列人秦王世民使秦叔寶邀擊破之豫章賊帥張善安以䖍吉等五州來降拜洪州揔管戊辰金鄉人陽孝誠叛徐圓朗以城來降己巳秦王世民復取邢州辛未并州人馮伯讓以城來降丙子李藝取劉黑闥定欒廉趙四州獲黑闥尚書劉希道引兵與秦王世民㑹洺州劉黑闥攻洺水甚急城四旁皆有水廣五十餘步黑闥於城東北築二甬道以攻之世民三引兵救之黑闥拒之不得進世民恐王君廓不能守召諸將謀之李世勣曰若甬道達城下城必不守行軍揔管郯勇公羅士信請代君廓守之世民乃登城西南髙冢以旗招君廓君廓帥其徒力戰潰圍而出士信帥左右二百人乗之入城代君廓固守黑闥晝夜急攻㑹大雪救兵不得往凡八日丁丑城陷黑闥素聞其勇欲生之士信詞色不屈乃殺之時年二十戊寅汴州揔管王要漢攻徐圓朗杞州拔之獲其將周文舉庚辰延州道行軍揔管段徳操擊梁師都石堡城師都自將救之徳操與戰大破之師都以十六騎遁去上益其兵使乗勝進攻夏州克其東城師都以數百人保西城㑹突厥救至詔徳操引還辛巳秦王世民拔洺水三月世民與李藝營於洺水之南分兵屯水北黑闥數挑戰世民堅壁不應别遣竒兵絶其糧道壬辰黑闥以髙雅賢為左僕射軍中髙㑹李世勣引兵逼其營雅賢乗醉單騎逐之世勣部將潘毛刺之墜馬左右繼至扶歸未至營而卒甲午諸將復往逼其營潘毛為王小胡所擒黑闥運糧於冀貝滄瀛諸州水陸俱進程名振以千餘人邀之沈其舟焚其車宋州揔管盛彦師帥齊州揔管王薄攻須昌徴軍糧於潭州刺史李義滿與薄有隙閉倉不與及須昌降彦師收義滿繫齊州獄詔釋之使者未至義滿憂憤死獄中薄還過潭州戊戌夜義滿兄子武意執薄殺之彦師亦坐死上遣使賂突厥頡利可汗且許結昏頡利乃遣漢陽公瓌鄭元璹長孫順徳等還庚子復遣使來修好上亦遣其使者特勒熱寒阿史那徳等還并州揔管劉世讓屯鴈門頡利與髙開道苑君璋合衆攻之不克月餘乃退甲辰以隋交趾太守丘和為交州揔管和遣司馬髙士亷奉表請入朝詔許之遣其子師利迎之秦王世民與劉黑闥相持六十餘日黑闥潛師襲李世勣營世民引兵掩其後以敕之為黑闥所圍尉遲敬徳帥壯士犯圍而入世民與畧陽公道宗乗之得出道宗帝之從子也世民度黑闥糧盡必來決戰乃使人堰洺水上流謂守吏曰待我與賊戰乃決之丁未黑闥帥步騎二萬南度洺水壓唐營而陳世民自將精騎擊其騎兵破之乗勝蹂其步兵黑闥帥衆殊死戰自午至昏戰數合黑闥勢不能支王小胡謂黑闥曰智力盡矣宜早亡去遂與黑闥先遁餘衆不知猶格戰守吏決堰洺水大至深丈餘黑闥衆大潰斬首萬餘級溺死數千人黑闥與范願等二百騎奔突厥山東悉平髙開道寇易州殺刺史慕容孝幹夏四月己未隋鴻臚卿甯長真以寧越鬱林之地請降於李靖交愛之道始通以長真為欽州揔管以䕫州揔管趙郡王孝恭為荆州揔管徐圓朗聞劉黑闥敗大懼不知所出河閒人劉復禮説圓朗曰有劉世徹者其人才略不世出名髙東夏且有非常之相真帝王之器將軍若自立恐終無成若迎世徹而奉之天下指揮可定圓朗然之使復禮迎世徹於浚儀或説圓朗曰將軍為人所惑欲迎劉世徹而奉之世徹若得志將軍豈有全地乎僕不敢逺引前古將軍獨不見翟讓之於李宻乎圓朗復以為然世徹至已有衆數千人頓於城外以待圓朗出迎圓朗不出使人召之世徹知事變欲亡走恐不免乃入謁圓朗悉奪其兵以為司馬使徇譙杞二州東人素聞其名所向皆下圓朗遂殺之秦王世民自河北引兵將擊圓朗㑹上召之使馳傳入朝乃以兵屬齊王元吉庚申世民至長安上迎之於長樂世民具陳取圓朗形勢上復遣之詣黎陽㑹大軍趨濟隂丁卯廢山東行臺壬申代州揔管定襄王李大恩為突厥所殺先是大恩奏稱突厥饑饉馬邑可取詔殿内少監獨孤晟將兵與大恩共擊苑君璋期以二月㑹馬邑失期不至大恩不能獨進頓兵新城頡利可汗遣數萬騎與劉黑闥共圍大恩上遣右驍衛大將軍李髙遷救之未至大恩糧盡夜遁突厥邀之衆潰而死上惜之獨孤晟坐減死徙邊丙子行臺民部尚書史萬寶攻徐圓朗陳州拔之戊寅廣州賊帥鄧文進隋合浦太守甯宣日南太守李晙並來降五月庚寅􅀲州土豪王幹斬賀拔行威以降􅀲州平突厥寇忻州李髙遷擊破之六月辛亥劉黑闥引突厥寇山東詔燕郡王李藝擊之癸丑吐谷渾寇洮旭疊三州岷州揔管李長卿擊破之乙卯遣淮安王神通擊徐圓朗丁卯劉黑闥引突厥寇定州秋七月甲申為秦王世民營􅀪義宫使居之世民擊徐圓朗下十餘城聲震淮泗杜伏威懼請入朝世民以淮濟之間畧定使淮安王神通行軍揔管任瓌李世勣攻圓朗乙酉班師丁亥杜伏威入朝延升御榻拜太子太保仍兼行臺尚書令留長安位在齊王元吉上以寵異之以闞稜為左領軍將軍李子通謂樂伯通曰伏威既來江東未定我往收舊兵可以立大功遂相與亡至藍田闗為吏所獲俱伏誅劉黑闥至定州其故將曹湛董康買亡命在鮮虞復聚兵應之甲午以淮陽王道􅀇為河北道行軍揔管以討之丙申遷州人鄧士政執刺史李敬昂以反丁酉隋漢陽太守馮盎承李靖檄帥所部來降以其地為髙羅春白崖儋林振八州以盎為髙州揔管封耿國公先是或説盎曰唐始定中原未能及逺公所領二十餘州地已廣於趙佗宜自稱南越王盎曰吾家居此五世矣為牧伯者不出吾門富貴極矣常懼不克負荷為先人羞敢効趙佗自王一方乎遂來降於是嶺南悉平八月辛亥以洺荆交并幽五州為大揔管府改葬隋煬帝於楊州雷塘甲戌吐谷渾寇岷州敗揔管李長卿詔益州行臺右僕射竇軌渭州刺史且洛生救之乙卯突厥頡利可汗寇邊遣左武衛將軍段徳操雲州揔管李子和將兵拒之子和本姓郭以討劉黑闥有功賜姓丙辰頡利十五萬騎入鴈門己未寇并州别遣兵寇原州庚申命太子出幽州道秦王世民出秦州道以禦之李子和趨雲中掩擊可汗段徳操趨夏州邀其歸路辛酉上謂羣臣曰突厥入寇而復求和和與戰孰利太常卿鄭元璹曰戰則怨深不如和利中書令封徳彞曰突厥恃犬羊之衆有輕中國之意若不戰而和示之以弱明年將復來臣愚以為不如擊之既勝而後與和則恩威兼著矣上從之己巳并州大揔管襄邑王神符破突厥於汾東汾州刺史蕭顗破突厥斬首五千餘級吐谷渾䧟洮州遣武州刺史賀拔亮禦之丙子突厥冦亷州戊寅陷大震闗上遣鄭元璹詣頡利是時突厥精騎數十萬自介休至晉州數百里間填溢山谷元璹見頡利責以負約與相辨詰頡利頗慙元璹因説頡利曰唐與突厥風俗不同突厥雖得唐地不能居也今虜掠所得皆入國人於可汗何有不如旋師復修和親可無跋涉之勞坐受金幣又皆入可汗府庫孰與弃昆弟積年之歡而結子孫無窮之怨乎頡利悦引兵還元璹自義寧以來五使突厥㡬死者數焉九月癸巳交州刺史權士通􅀪州揔管宇文歆靈州揔管楊師道擊突厥於三觀山破之乙未太子班師丙申宇文歆邀突厥於崇崗鎮大破之斬首千餘級壬寅定州揔管雙士洛等擊突厥於恒山之南丙午領軍將軍安興貴擊突厥於甘州皆破之劉黑闥陷瀛州殺刺史馬匡武鹽州人馬君徳以城叛附黑闥髙開道寇蠡州冬十月己酉詔齊王元吉討劉黑闥於山東壬子以元吉為領軍大將軍并州大揔管癸丑貝州刺史許善䕶與黑闥弟十善戰於鄃縣善䕶全軍皆没甲寅右武候將軍桑顯和擊黑闥於晏城破之觀州刺史劉㑹以城叛附黑闥契丹寇北平甲子以秦王世民領左右十二衛大將軍乙丑行軍揔管淮陽壯王道􅀇與劉黑闥戰於下愽軍敗為黑闥所殺時道􅀇將兵三萬與副將史萬寶不恊道􅀇帥輕騎先出犯陳使萬寶將大軍繼之萬寶擁兵不進謂所親曰我奉手敕云淮陽小兒軍事皆委老夫今王輕脱妄進若與之俱必同敗没不如以王餌賊王敗賊必爭進我堅陳以待之破之必矣由是道􅀇獨進敗没萬寶勒兵將戰士卒皆無鬭志軍遂大潰萬寶逃歸道􅀇數從秦王世民征伐死時年十九世民深惜之謂人曰道􅀇常從吾征伐見吾深入賊陳心慕効之以至於此為之流涕世民自起兵以來前後數十戰常身先士卒輕騎深入雖屢危殆而未嘗為矢刃所傷林士􅀪遣其弟鄱陽王藥師攻循州刺史楊畧與戰斬之其將王戎以南昌州降士􅀪懼己巳請降尋復走保安成山洞袁州人相聚應之洪州揔管若干則遣兵擊破之㑹士􅀪死其衆遂散淮陽王道􅀇之敗也山東震駭洺州揔管廬江王瑗弃城西走州縣皆叛附於劉黑闥旬日間黑闥盡復故地乙亥進據洺州十一月庚辰滄州刺史程大買為黑闥所迫弃城走齊王元吉畏黑闥兵彊不敢進上之起兵晉陽也皆秦王世民之謀上謂世民曰若事成則天下皆汝所致當以汝為太子世民拜且辭及為唐王將佐亦請以世民為世子上將立之世民固辭而止太子建成性寛簡喜酒色遊畋齊王元吉多過失皆無寵於上世民功名日盛上常有意以代建成建成内不自安乃與元吉恊謀共傾世民各引樹黨友上晩年多内寵小王且二十人其母競交結諸長子以自固建成與元吉曲意事諸妃嬪諂諛賂遺無所不至以求媚於上或言蒸於張婕妤尹徳妃宫禁深祕莫能明也是時東宫諸王公妃主之家及後宫親戚横長安中奪人田宅恣為非法有司不敢詰世民居承乾殿元吉居武徳殿後院與上臺東宫晝夜通行無復禁限太子二王出入上臺皆乗馬􅂝弓刀雜物相遇如家人禮太子令秦齊王教與詔敕並行有司莫知所從唯據得之先後為定世民獨不奉事諸妃嬪諸妃嬪爭譽建成元吉而短世民世民平洛陽上使貴妃等數人詣洛陽選閱隋宫人及收府庫珍物貴妃等私從世民求寶貨及為其親屬求官世民曰寶貨皆已籍奏官當授賢才有功者皆不許由是益怨世民以淮安王神通有功給田數十頃張婕妤之父因婕妤求之於上上手敕賜之神通以教給在先不與婕妤訴於上曰敕賜妾父田秦王奪之以與神通上遂發怒責世民曰我手敕不如汝教邪它日謂左僕射裴寂曰此兒久典兵在外為書生所教非復昔日子也尹徳妃父阿鼠驕横秦王府屬杜如晦過其門阿鼠家僮數人曳如晦墜馬敺之折一指曰汝何人敢過我門而不下馬阿鼠恐世民訴於上先使徳妃奏云秦王左右陵暴妾家上復怒責世民曰我妃嬪家猶為汝左右所陵况小民乎世民深自辨析上終不信世民每侍晏宫中對諸妃嬪思太穆皇后早終下得見上有天下或歔欷流涕上顧之不樂諸妃嬪因宻共譖世民曰海内幸無事陛下春秋髙唯宜相娛樂而秦王每獨涕泣正是憎疾妾等陛下萬嵗後妾母子必不爲秦王所容無孑遺矣因相與泣且曰皇太子仁孝陛下以妾母子屬之必能保全上爲之愴然由是無易太子意待世民浸踈而建成元吉日親矣太子中允王珪洗馬魏徴説太子曰秦王功蓋天下中外歸心殿下但以年長位居東宫無大功以鎮服海内今劉黑闥散亡之餘衆不滿萬資糧匱乏以大軍臨之勢如拉朽殿下宜自擊之以取功名因結納山東豪傑庶可自安太子乃請行於上上許之珪頍之兄子也甲申詔太子建成將兵討黑闥其陜東道大行臺及山東道行軍元帥河南河北諸州並受建成處分得以便宜從事乙酉封宗室略陽公道宗等十八人為郡王道宗道􅀇從父弟也為靈州揔管梁師都遣弟洛兒引突厥數萬圍之道宗乗間出擊大破之突厥與師都連結遣其郁射設入居故五原道宗逐出之斥地千餘里上以道宗武幹如魏任城王彰乃立為任城郡王丙申上幸宜州己亥齊王元吉遣兵擊劉十善於魏州破之癸卯上校獵於富平劉黑闥擁兵而南自相州以北州縣皆附之唯魏州揔管田留安勒兵拒守黑闥攻之不下引兵南拔元城復還攻之十二月庚戌立宗室孝犮等八人爲郡王孝友神通之子也丙辰上校獵於華池戊午劉黑闥陷恒州殺刺史王公政庚申車駕至長安癸亥幽州大揔管李藝復亷定二州甲子田留安擊劉黑闥破之獲其莘州刺史孟柱降將卒六千人是時山東豪傑多殺長吏以應黑闥上下相猜人益離怨留安待吏民獨坦然無疑白事者無問親踈皆聽直入卧内每謂吏民曰吾與爾曹俱為國禦賊固宜同心協力必欲弃順從逆者但自斬吾首去吏民皆相戒曰田公推至誠以待人當共竭死力報之必不可負有苑竹林者本黑闥之黨潛有異志留安知之不發其事引置左右委以管鑰竹林感激遂更歸心卒收其用以功進封道國公乙丑并州刺史成仁重擊范願破之劉黑闥攻魏州未下太子建成齊王元吉大軍至昌樂黑闥引兵拒之再陳皆不戰而罷魏徴言於太子曰前破黑闥其將帥皆懸名處死妻子係虜故齊王之來雖有詔書赦其黨與之罪皆莫之信今宜悉解其囚俘慰諭遣之則可坐視其離散矣太子從之黑闥食盡衆多亡或縛其渠帥以降黑闥恐城中兵出與大軍表裏擊之遂夜遁至館陶永濟橋未成不得度壬申太子齊王以大軍至黑闥使王小胡背水而陳自視作橋成即過橋西衆遂大潰捨仗來降大軍度橋追黑闥度者纔千餘騎橋壞由是黑闥得與數百騎亡去上以隋末戰士多没於髙麗是嵗賜髙麗王建武書使悉遣還亦使州縣索髙麗人在中土者遣歸其國建武奉詔遣還中國民前後以萬數六年春正月己卯劉黑闥所署饒州刺史諸葛徳威執黑闥舉城降時太子遣騎將劉􅀪基追黑闥黑闥為官軍所迫奔走不得休息至饒陽從者纔百餘人餒甚徳威出迎延黑闥入城黑闥不可徳威涕泣固請黑闥乃從之至城旁市中憩止徳威饋之食食未畢徳威勒兵執之送詣太子并其弟十善斬於洺州黑闥臨刑歎曰我幸在家鉏采爲高雅賢軰所誤至此壬午巂州人王摩沙舉兵自稱元帥改元進通遣驃騎將軍衛彦討之庚子以吳王杜伏威為太保二月庚戌上幸驪山温湯甲寅還宫平陽昭公主薨戊午葬公主詔加前後部鼓吹班劒四十人武賁甲卒太常奏禮婦人無鼓吹上曰鼓吹軍樂也公主親執金鼓興義兵以輔成大業豈與常婦人比乎丙寅徐圓朗窮蹙與數騎棄城走為野人所殺其地悉平林邑王梵志遣使入貢初隋人破林邑分其地為三郡及中原喪亂林邑復國至是始入貢幽州揔管李藝請入朝庚午以藝為左翊衛大將軍廢參旗等十二軍三月癸未髙開道掠文安魯城驃􅀐將軍平善政邀擊破之庚子梁師都將賀遂索同以所部十二州來降乙巳前洪州揔管張善安反遣舒州揔管張鎮周等擊之夏四月吐谷渾寇芳州刺史房當樹奔松州張善安陷孫州執揔管王戎而去乙丑鄜州道行軍揔管段徳操擊梁師都至夏州俘其民畜而還丙寅吐谷渾寇洮岷二州丁卯南州刺史龐孝恭南越州民甯道明髙州首領馮暄俱反陷南越州進攻姜州合州刺史甯純引兵救之壬申立皇子元軌為蜀王鳳為豳王元慶為漢王癸酉以裴寂為左僕射蕭瑀為右僕射楊恭仁為吏部尚書兼中書令封徳彞為中書令五月庚辰遣歧州刺史柴紹救岷州庚寅吐谷渾及党項寇河州刺史盧士良擊破之丙申梁師都將辛獠兒引突厥寇林川戊戌苑君璋將髙滿政寇代州驃騎將軍李寶言擊走之癸卯髙開道引奚騎寇幽州長史王詵擊破之劉黑闥之叛也突地稽引兵助唐徙其部落於幽州之昌平城髙開道引突厥寇幽州突地稽將兵邀擊破之六月戊午髙滿政以馬邑來降先是前并州揔管劉世讓除廣州揔管將之官上問以備邊之策世讓對曰突厥比數為寇良以馬邑為之中頓故也請以勇將戍崞城多貯金帛募有降者厚賞之數出騎兵掠其城下蹂其禾稼敗其生業不出嵗餘彼無所食必降矣上然其計曰非公誰為勇將即命世讓戍崞城馬邑病之是時馬邑人多不願屬突厥上復遣人招諭苑君璋髙滿政説君璋盡殺突厥戍兵降唐君璋不從滿政因衆心所欲夜襲君璋君璋覺之亡奔突厥滿政殺君璋之子及突厥戍兵二百人而降壬戌梁師都以突厥寇匡州丁卯苑君璋與突厥吐屯設寇馬邑髙滿政與戰破之以滿政爲朔州揔管封榮國公􅀲州揔管賀若懷廣按部至沙州值州人張䕶李通反懷廣以數百人保子城涼州揔管楊恭仁遣兵救之爲䕶等所敗癸酉柴紹與吐谷渾戰爲其所圍虜乗髙射之矢下如雨紹遣人彈胡琵琶二女子對舞虜恠之駐弓矢相與聚觀紹察其無僃潛遣精騎出虜陳後擊之虜衆大潰秋七月丙子苑君璋以突厥寇馬邑右武候大將軍李髙遷及髙滿政禦之戰於臘河谷破之張䕶李通殺賀若懷廣立汝州别駕竇伏明為主進逼􅀲州長史趙孝倫擊却之髙開道掠赤岸鎮及靈壽九門行唐三縣而去丁丑崗州刺史馮士翽據新㑹反廣州揔管劉感討降之使復其位辛巳髙開道所部􅀪陽統漢二鎮來降癸未突厥寇原州乙酉寇朔州李髙遷為虜所敗行軍揔管尉遲敬徳將兵救之己亥遣太子將兵屯北邊秦王世民屯并州以備突厥八月甲辰突厥寇真州又寇馬邑壬子淮南道行臺僕射輔公祏反初杜伏威與公祏相友善公祏年長伏威兄事之軍中謂之伯父畏敬與伏威等伏威浸忌之乃署其養子闞稜為左將軍王雄誕為右將軍潛奪其兵權公祏知之怏怏不平與其故人左遊仙陽為學道辟穀以自晦及伏威入朝留公祏守丹楊令雄誕典兵為之副隂謂雄誕曰吾至長安茍不失職勿令公祏為變伏威既行左遊仙説公祏謀反而雄誕握兵公祏不得發乃詐稱得伏威書疑雄誕有貳心雄誕聞之不悦稱疾不視事公祏因奪其兵使其黨西門君儀諭以反計雄誕始寤而悔之曰今天下方平定吳王又在京師大唐兵威所向無敵奈何無故自求族滅乎雄誕有死而已不敢聞命今從公為逆不過延百日之命耳大丈夫安能愛斯湏之死而自䧟於不義乎公祏知不可屈縊殺之雄誕善撫士卒得其死力又約束嚴整每破城邑秋毫無犯死之日江南軍中及民間皆為之流涕公祏又詐稱伏威不得還江南貽書令其起兵大修鎧仗運糧儲尋稱帝於丹楊國號宋修陳故宫室而居之署置百官以左遊仙為兵部尚書東南道大使越州揔管與張善安連兵以善安為西南道大行臺己未突厥寇原州乙丑詔襄州道行臺僕射趙郡王孝恭以舟師趣江州嶺南道大使李靖以交廣泉桂之衆趣宣州懷州揔管黄君漢出譙亳齊州揔管李世勣出淮泗以討輔公祏孝恭將發與諸將宴集命取水忽變為血在坐皆失色孝恭舉止自若曰此乃公祏授首之徴也飲而盡之衆皆悦服丙寅吐谷渾内附辛未突厥陷原州之善和鎮癸酉又寇渭州髙開道以奚侵幽州州兵擊却之九月丙子太子班師戊子輔公祏遣其將徐紹宗寇海州陳政通寇夀陽邛州獠反遣沛公鄭元璹討之庚寅突厥寇幽州壬辰詔以秦王世民為江州道行軍元帥乙未竇伏明以沙州降髙昌王麴伯雅卒子文泰立丙申渝州人張大智反刺史薛敬仁弃城走壬寅髙開道引突厥二萬騎寇幽州突厥惡􅀪農公劉世讓為己患遣其臣曹般陁來言世讓與可汗通謀欲為亂上信之冬十月丙午殺世讓籍没其家秦王世民猶在并州己未詔世民引軍還上幸華隂張大智侵涪州刺史田世康等討之大智以衆降初上遣右武候大將軍李髙遷助朔州揔管髙滿政守馬邑苑君璋引突厥萬餘騎至城下滿政擊破之頡利可汗怒大發兵攻馬邑髙遷懼帥所部二千人斬闗宵遁虜邀之失亡者半頡利自帥衆攻城滿政出兵禦之或一日戰十餘合上命行軍揔管劉世讓救之至松子嶺不敢進還保崞城㑹頡利遣使求婚上曰釋馬邑之圍乃可議婚頡利欲解兵義成公主固請攻之頡利以髙開道善為攻具召開道與之攻馬邑甚急頡利誘滿政使降滿政罵之糧且盡救兵未至滿政欲潰圍走朔州右虞候杜士逺以虜兵盛恐不免壬戌殺滿政降於突厥苑君璋復殺城中豪傑與滿政同謀者三十餘人上以滿政子􅀇積為上柱國襲爵丁卯突厥復請和親以馬邑歸唐上以將軍秦武通為朔州揔管突厥數為邊患并州大揔管府長史竇靜表請於太原置屯田以省餽運議者以為煩擾不許靜切論不已敕徴靜入朝使與裴寂蕭瑀封徳彞相論難於上前寂等不能屈乃從靜議嵗收穀數千斛上善之命檢校并州大揔管靜抗之子也十一月辛巳秦王世民復請増置屯田於并州之境從之黄州揔管周法明將兵擊輔公祏張善安據夏口拒之法明屯荆口鎮壬午法明登戰艦飲酒善安遣刺客數人詐乗漁艓而至見者不以為虞遂殺法明而去甲申舒州揔管張鎮周等擊輔公祏將陳當世於猷州之黄沙大破之丁亥上校獵於華隂己丑迎勞秦王世民於忠武頓十二月癸卯安撫使李大亮誘張善安執之大亮擊善安於洪州與善安隔水而陳遙相與語大亮諭以禍福善安曰善安初無反心正為將士所誤欲降又恐不免大亮曰張揔管有降心則與我一家耳因單騎度水入其陳與善安執手共語示無猜間善安大悦遂許之降既而善安將數十騎詣大亮營大亮止其騎於門外引善安入與語久之善安辭去大亮命武士執之從騎皆走善安營中聞之大怒悉衆而來將攻大亮大亮使人諭之曰吾不留揔管揔管赤心歸國謂我曰若還營恐將士或有異同為其所制故自留不去耳卿軰何怒於我其黨復大罵曰張揔管賣我以自媚於人遂皆潰去大亮追擊多所虜獲送善安於長安善安自稱不與輔公祏交通上赦其罪善遇之及公祏敗得所與往還書乃殺之甲寅車駕至長安己巳突厥寇定州州兵擊走之庚申白簡白狗羌並遣使入貢七年春正月依周齊舊制每州置大中正一人掌知州内人物品量望第以本州門望髙者領之無品秩壬午趙郡王孝恭擊輔公祏别將於樅陽破之庚寅鄒州人鄧同頴殺刺史李士衡反丙申以白狗等羌地置維恭二州二月辛丑輔公祏遣兵圍猷州刺史左難當嬰城自守安撫使李大亮引兵擊公祏破之趙郡王孝恭攻公祏鵲頭鎮拔之丁未髙麗王建武遣使來請班曆遣使冊建武爲遼東郡王髙麗王以百濟王夫餘璋爲帶方郡王新羅王金真平爲樂浪郡王始州獠反遣行臺僕射竇􅁤討之己酉詔諸州有明一經以上未仕者咸以名聞州縣及鄉皆置學壬子行軍副揔管權文誕破輔公祏之黨於猷州拔其枚洄等四鎮丁巳上幸國子學釋奠詔諸王公子弟各就學戊午改大揔管爲大都督府己未髙開道將張金樹殺開道來降開道見天下皆定欲降自以數反覆不敢且恃突厥之衆遂無降意其將卒皆山東人思鄉里咸有離心開道選勇敢士數百謂之假子常直閤内使金樹領之故劉黑闥將張君立亡在開道所與金樹宻謀取開道金樹遣其黨數人入閤内與假子遊戲向夕潛斷其弓􅁌藏刀槊於牀下合瞑抱之趨出金樹帥其黨大譟攻開道閤假子將禦之而弓􅁌皆絶刀槊已失爭出降君立亦舉火於外與相應内外惶擾開道知不免乃擐甲持兵坐堂上與妻妾奏樂酣飲衆憚其勇不敢逼天且明開道縊妻妾及諸子乃自殺金樹陳兵悉收假子斬之并殺君立死者五百餘人遣使來降詔以其地置媯州壬戌以金樹為北燕州都督戊辰洋集二州獠反陷隆州晉城是月太保吳王杜伏威薨輔公祏之反也詐稱伏威之命以紿其衆及公祏平趙郡王孝恭不知其詐以狀聞詔追除伏威名籍没其妻子及太宗即位知其寃赦之復其官爵三月初定令以太尉司徒司空為三公次尚書門下中書祕書殿中内侍為六省次御史臺次太常至太府為九寺次將作監次國子學次天策上將府次左右衞至左右領衞為十四衞東宫置三師三少詹事及兩坊三寺十率府王公置府佐國官公主置邑司並為京職事官州縣鎮戍為外職事官自開府儀同三司至將仕郎二十八階為文散官驃騎大將軍至陪戎副尉三十一階為武散官上柱國至武騎尉十二等為勲官丙戌趙郡王孝恭破輔公祏於蕪湖拔梁山等三鎮辛卯安撫使任瓌拔揚子城廣陵城主龍龕降丁酉突厥寇原州戊戌趙郡王孝恭克丹楊先是輔公祏遣其將馮慧亮陳當世將舟師三萬屯愽望山陳正通徐紹宗將步騎二萬屯青林山仍於梁山連鐵鏁以斷江路築却月城延袤十餘里又結壘江西以拒官軍孝恭與李靖帥舟師次舒州李世勣帥步卒一萬度淮拔夀陽次硤石慧亮等堅壁不戰孝恭遣竒兵絶其糧道慧亮等軍乏食夜遣兵薄孝恭營孝恭安卧不動孝恭集諸將議軍事皆曰慧亮等擁彊兵據水陸之險攻之不可猝拔不如直指丹楊掩其巢穴丹楊既潰慧亮等自降矣孝恭將從其議李靖曰公祏精兵雖在此水陸二軍然所自將亦為不少今愽望諸柵尚不能拔公祏保據石頭豈易取哉進攻丹陽旬月不下慧亮等躡吾後腹背受敵此危道也慧亮正通皆百戰餘賊其心非不欲戰正以公祏立計使之持重欲以老我師耳我今攻其城以挑之一舉可破也孝恭然之使羸兵先攻賊壘而勒精兵結陳以待之攻壘者不勝而走賊出兵追之行數里遇大軍與戰大破之闞稜免胄謂賊衆曰汝曹不識我邪何敢來與我戰賊衆多稜故部曲皆無鬭志或有拜者由是遂敗孝恭靖乗勝逐北轉戰百餘里愽山青林兩戍皆潰慧亮正通等遁歸殺傷及溺死者萬餘人李靖兵先至丹楊公祏大懼擁兵數萬弃城東走欲就左遊仙於㑹稽李世勣追之公祏至句容從兵能屬者纔五百人夜宿常州其將吳騷等謀執之公祏覺之弃妻子獨將腹心數十人斬闗走至武康為野人所攻西門君儀戰死執公祏送丹楊梟首分捕餘黨悉誅之江南皆平己亥以孝恭為東南道行臺右僕射李靖為兵部尚書頃之廢行臺以孝恭為揚州大都督靖為府長史上深美靖功曰靖蕭輔之膏盲也闞稜功多頗自矜伐公祏誣稜與己通謀㑹趙郡王孝恭籍没賊黨田宅稜及杜伏威王雄誕田宅在賊境者孝恭并籍没之稜自訴理忤孝恭孝恭怒以謀反誅之夏四月庚子朔赦天下是日頒新律令比開皇舊制増新格五十三條初定均田租庸調法丁中之民給田一頃篤疾減什之六寡妻妾減七皆以什之二為世業八為口分每丁嵗入租粟二石調隨土地所宜綾絹絁布嵗役二旬不役則收其傭日三尺有事而加役者旬有五日免其調三旬租調俱免水旱蟲霜為災什損四以上免租損六巳上免調損七已上課役俱免凡民貲業分九等百户為里五里為鄉四家為鄰四鄰為保在城邑者為坊田野者為村食禄之家無得與民爭利工商雜􅀋無預士伍男女始生爲黄四歳爲小十六為中二十為丁六十為老歳造計帳三年造户籍丁未党項寇松州庚申通事舎人李鳳起擊萬州反獠平之五月辛未突厥寇朔州甲戌羌與吐谷渾同寇松州遣益州行臺左僕射竇軌自翼州道扶州刺史蔣善合自芳州道擊之丙戌作仁智宫於宜君丁亥竇軌破反獠於方山俘二萬餘口資治通鑑巻第一百九十唐髙祖
