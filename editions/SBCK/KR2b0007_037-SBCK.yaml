body:
  text: 莽又封黄帝少昊顓頊帝嚳堯舜夏商周及皐陶伊尹之後皆爲公矦使各奉其祭祀莽因漢承平之業府庫百官之富百蠻賔服天下晏然莽一朝有之其心意未滿陿小漢家制度欲更爲䟽闊乃自謂黄帝虞舜之後至齊王建孫濟北王安失國齊人謂之王家因以爲氏故以黄帝爲􅀄祖虞帝爲始祖追尊陳胡公曰陳胡王田敬仲曰齊敬王濟北王安曰濟北愍王立祖廟五親廟四天下姚嬀陳田王五姓皆爲宗室丗丗復無有所與封陳崇田豐爲矦以奉胡王敬王後天下牧守皆以前有翟義趙明等作亂領州郡懷忠孝封牧爲男守爲附城以漢髙廟爲文祖廟漢氏園寢廟在京師者勿罷祠薦如故諸劉勿解其復各終厥身州牧數存問勿令有侵􅁈莽以劉之爲字卯金刀也詔正月剛卯金刀之利皆不得行乃罷錯刀契刀及五銖錢更作小錢徑六分重一銖文曰小錢直一與前大錢五十者爲二品並行欲防民盗鑄乃禁不得挾銅炭夏四月徐鄉矦劉快結黨數千人起兵於其國快兄殷故漢膠東王時爲扶崇公快舉兵攻即墨殷閉城門自繫獄吏民距快快敗走至長廣死莽赦殷益其國蒲萬户地方百里莽曰古者一夫田百畒什一而稅則國給民富而頌聲作秦壞聖制廢井田是以兼并起貪鄙生彊者規田以千數弱者曾無立錐之居又置奴婢之市與牛馬同䦨制於民臣顓斷其命繆於天地之性人爲貴之義漢氏減輕田租三十而稅一常有更賦罷癃咸出而豪民侵陵分田劫假厥名三十稅一實什稅五也故富者犬馬餘菽粟驕而爲邪貧者不厭糟糠窮而爲姦俱䧟于辜刑用不錯今更名天下田曰王田奴婢曰私屬皆不得賣買其男口不盈八而田過一井者分餘田予九族鄰里鄉黨故無田今當受田者如制度敢有非井田聖制無灋惑衆者投諸四裔以禦魑魅如皇始祖考虞帝故事秋遣五威將王竒等十二人班符命四十二篇於天下德祥五事符命二十五福應十二五威將奉符命齎印綬王矦以下及吏官名更者外及匈奴西域徼外蠻夷皆即授新室印綬因収故漢印綬大赦天下五威將乗乾文車駕坤六馬背負鷩鳥之毛服飾甚偉毎一將各置五帥將持節帥持幢其東出者至􅀇莬樂浪髙句驪夫餘南出者隃徼外歷益州改句町王爲矦西出者至西域盡改其王爲矦北出者至匈奴庭授單于印改漢印文去璽曰章冬靁桐華以統睦矦陳崇爲司命主司察上公以下又以􅀃符矦崔發等爲中城四關將軍主十二城門及繞􅋼羊頭肴黽汧隴之固皆以五威冠其號又遣諌大夫五十人分鑄錢於郡國是嵗眞定常山大雨雹二年春二月赦天下五威將帥七十二人還奏事漢諸矦王爲公者悉上璽綬爲民無違命者獨故廣陽王嘉以獻符命魯王閔以獻神書中山王成都以獻書言莽德皆封列矦班固論曰昔周封國八百同姓五十有餘所以親親賢賢􅀜諸盛衰深根固本爲不可㧞者也故盛則周召相其治致刑錯衰則五百扶其弱與共守天下謂之共主彊大弗之敢傾歷載八百餘年數極德盡降爲庶人用天年終秦訕笑三代竊自號爲皇帝而子弟爲匹夫内無骨肉本根之輔外無尺土藩翼之䘙陳吴奮其白梃劉項隨而斃之故曰周過其歷秦不及期國埶然也漢興之初懲戒亡秦孤立之敗於是尊王子弟大啓九國自鴈門以東盡遼陽爲燕代常山以南太行左轉度河濟漸于海爲齊趙􅂖泗以往奄有􅀛蒙爲梁楚東帶江湖薄㑹稽爲荆吳北界淮瀕略廬衡爲淮南波漢之陽亘九嶷爲長沙諸矦比境周匝三垂外接胡越天子自有三河東郡潁川南陽自江陵以西至巴蜀北自雲中至隴西與京師内史凡十五郡公主列矦頗邑其中而藩國大者夸州兼郡連城數十宫室百官同制京師可謂矯枉過其正矣雖然髙祖創業日不暇給孝惠享國又淺髙后女主攝位而海内晏如亡狂狡之憂卒折諸吕之難成太宗之業者亦賴之於諸矦也然諸矦原本以大末流濫以致溢小者淫荒越灋大者暌孤横逆以害身喪國故文帝分齊趙景帝削吴楚武帝下推恩之令而藩國自析自此而來齊分爲七趙分爲六梁分爲五淮南分爲三皇子始立者大國不過十餘城長沙燕代雖有舊名皆亡南北邊矣景遭七國之難抑損諸矦减黜其官武有衡山淮南之謀作左官之律設附益之灋諸矦惟得衣食稅租不與政事至於哀平之際皆繼體苗裔親屬踈逺生於帷牆之中不爲士民所尊埶與富室亡異而本朝短丗國統三絶是故王莽知漢中外殫微本末俱弱無所忌憚生其姦心因母后之權假伊周之稱顓作威福廟堂之上不降階序而運天下詐謀旣成遂據南靣之尊分遣五威之吏馳傳天下班行符命漢諸矦王厥角稽首奉上璽韍惟恐在後或乃稱美頌德以求容媚豈不哀哉國師公劉秀言周有泉府之官收不售與欲得即易所謂理財正辭禁民爲非者也莽乃下詔曰周禮有賖貸樂語有五均傳記各有筦焉今開賖貸張五均設諸筦者所以齊衆庶抑并兼也遂於長安及洛陽邯鄲臨菑宛成都立五均司市錢府官司市常以四時仲月定物上中下之賈各爲其市平民賣五榖布帛絲綿之物不售者均官考檢厥實用其本賈取之物貴過平一錢則以平賈賣與民賤減平者聽民自相與市又民有乏絶欲賖貸者錢府予之毎月百錢收息三錢又以周官稅民凡田不耕爲不殖出三夫之稅城郭中宅不樹蓺者爲不毛出三夫之布民浮游無事出夫布一疋其不能出布者冗作縣官衣食之諸取金銀連錫鳥獸魚鼈於山林水澤及畜牧者嬪婦桑蠶織紝紡績補縫工匠醫巫卜祝及它方拔商販賈人皆各自占所爲於其在所之縣官除其本計其利十一分之而以其一爲貢敢不自占自占不以實者盡沒入所采取而作縣官一􅀊羲和魯匡復奏請􅅦酒酤莽從之又禁民不得挾弩鎧犯者徙西海初莽旣班四條於匈奴後護烏􅁊使者告烏􅁊民毋得復與匈奴皮布稅匈奴遣使者責稅收烏􅁊酋豪縳倒懸之酋豪昆弟怒共殺匈奴使單于聞之發左賢王兵入烏􅁊攻擊之頗殺人民敺婦女弱小且千人去置左地告烏􅁊曰持馬畜皮布來贖之烏􅁊持財畜往贖匈奴受留不遣及五威將帥王駿等六人至匈奴重遺單于金帛諭曉以受命代漢狀因易單于故印故印文曰匈奴單于璽莽更曰新匈奴單于章將率旣至授單于印紱詔令上故印紱單于再拜受詔譯前欲解取故印紱單于舉掖授之左姑夕矦􅂫從旁謂單于曰未見新印文宜且勿與單于止不肯與請使者坐穹廬單于欲前爲壽五威將曰故印紱當以時上單于曰諾復舉掖授譯蘇復曰未見印文且勿與單于曰印文何由變更遂解故印紱奉上將帥受著新紱不解視印飲食至夜乃罷右帥陳饒謂諸將帥曰曏者姑夕矦疑印文幾令單于不與人如令視印見其變改必求故印此非辭􅀃所能距也旣得而復失之辱命莫大焉不如椎破故印以絶禍根將帥猶與莫有應者饒燕士果悍即引斧椎壞之明日單于果遣右骨都矦當白將帥曰漢單于印言璽不言章又無漢字諸王己下乃有漢言章今即去璽加新與臣下無别願得故印將帥示以故印謂曰新室順天制作故印隨將帥所自爲破壞單于宜承天命奉新室之制當還白單于知己無可柰又多得賂遺即遣弟右賢王輿奉馬牛隨將帥入謝因上書求故印將帥還到左犂汗王咸所居地見烏􅁊民多以問咸咸具言狀將帥曰前封四條不得受烏􅁊降者亟還之咸曰請密與單于相聞得語歸之單于使咸報曰當從塞内還之邪從塞外還之邪將帥不敢顓決以聞詔報從塞外還之莽悉封五威將爲子帥爲男獨陳饒以破璽之功封威德子單于始用夏矦藩求地有拒漢語後以求稅烏􅁊不得因寇略其人民釁由是生重以印文改易故怨恨乃遣右大且渠蒲呼盧訾等十餘人將兵衆萬􅀐以護送烏􅁊爲名勒兵朔方塞下朔方太守以聞莽以廣新公甄豐爲右伯當出西域車師後王須置離聞之憚於供給煩費謀亡入匈奴都護伹欽召置離斬之置離兄輔國矦狐蘭支將置離衆二千餘人亡降匈奴單于受之遣兵與狐蘭支共入宼擊車師殺後城長傷都護司焉及狐蘭兵復還入匈奴時戊巳校尉刁護病史陳良終帶司馬丞韓玄右曲􅇋任商相與謀曰西域諸國頗背叛匈奴欲大侵要死可殺校尉將人衆降匈奴遂殺護及其子男昆弟盡脅略戊巳校尉吏士男女二千餘人入匈奴單于號良帶曰烏賁都尉冬十一月立國將軍孫建奏九月辛巳陳良終帶自稱廢漢大將軍亡入匈奴又今月癸酉不知何一男子遮臣建車前自稱漢氏劉子輿成帝下妻子也劉氏當復趣空宫收繫男子即常安姓武字仲皆逆天違命大逆無道漢氏宗廟不當在常安城中及諸劉當與漢俱廢陛下至仁乆未定前故安衆矦劉崇等更聚衆謀反今狂狡之虜復依託亡漢至犯夷滅連未止者此聖恩不蚤絶其萌牙故也臣請漢氏諸廟在京師者皆罷諸劉爲吏者皆罷待除於家莽曰可嘉新公國師以符命爲予四輔明德矦劉龔率禮矦劉嘉等凡三十二人皆知天命或獻天符或貢昌言或捕告反虜厥功茂焉諸劉與三十二人同宗共祖者勿罷賜姓曰王唯國師以女配莽子故不賜姓定安公太后自劉氏之廢常稱疾不朝㑹時年未二十莽敬憚傷哀欲嫁之乃更號爲黄皇室主欲絶之於漢令孫建丗子盛飾將醫往問疾后大怒笞鞭其傍侍御因發病不肯起莽遂不復彊也十二月靁莽恃府庫之富欲立威匈奴乃更名匈奴單于曰降奴服于下詔遣立國將軍孫建等率十二將分道並出五威將軍苖訢虎賁將軍王況出五原厭難將軍陳欽震狄將軍王巡出雲中振武將軍王嘉平狄將軍王萌出代郡相威將軍李棽鎮逺將軍李翁出西河誅貉將軍楊俊討􅐮將軍嚴尤出漁陽奮武將軍王駿定胡將軍王晏出張掖及偏裨以下百八十人募天下囚徒丁男甲卒三十萬人轉輸衣裘兵器糧食自負海江淮至北邊使者馳傳督趣以軍興灋從事先至者屯邊郡須畢具乃同時出窮追匈奴内之丁令分其國土人民以爲十五立呼韓邪子孫十五人皆爲單于莽以錢幣訖不行復下書曰寳貨皆重則小用不給皆輕則僦載煩費輕重大小各有差品則用便而民樂於是更作金銀􅀛貝錢布之品名曰寳貨錢貨六品金貨一品銀貨二品􅀛貨四品貝貨五品布貨十品凡寳貨五物六名二十八品鑄作錢布皆用銅殽以連錫百姓潰亂其貨不行莽知民愁乃但行小錢直一與大錢五十二品並行􅀛貝布屬且寑盜鑄錢者不可禁乃重其灋一家鑄錢五家坐之沒入爲奴婢吏民出入持錢以副符傳不持者厨傳勿舎關津苛留公卿皆持以入宫殿門欲以重而行之是時百姓便安漢五銖錢以莽錢大小兩行難知又數變改不信皆私以五銖錢市買訛言大錢當罷莫肯挾莽患之復下書諸挾五銖錢言大錢當罷者比非井田制投四裔及坐賣買田宅奴婢鑄錢自諸矦卿大夫至于庶民抵罪者不可勝數於是農商失業食貨俱廢民人至涕泣於市道莽之謀簒也吏民爭爲符命皆得封矦其不爲者相戲曰獨無天帝除書乎司命陳崇白莽曰此開姦臣作福之路而亂天命宜絶其原莽亦厭之遂使尚書大夫趙並驗治非五威將率所班皆下獄初甄豐劉秀王舜爲莽腹心倡導在位襃揚功德安漢宰衡之號及封莽母兩子兄子皆豐等所共謀而豐舜秀亦受其賜並富貴矣非復欲令莽居攝也居攝之萌出於泉陵矦劉慶前煇光謝嚻長安令田終術莽羽翼巳成意欲稱攝豐等承順其意莽輙復封舜秀豐等子孫以報之豐等爵位已盛心意旣蒲又實畏漢宗室天下豪桀而䟽逺欲進者並作符命莽遂據以即眞舜秀内懼而已豐素剛彊莽覺其不􅀃故託符命文徙豐爲更始將軍與賣餅兒王盛同列豐父子黙黙時子尋爲侍中京兆大尹茂德矦即作符命新室當分陜立二伯以豐爲右伯太傅平晏爲左伯如周召故事莽即從之拜豐爲右伯當述職西出未行尋復作符命言故漢氏平帝后黄皇室主爲尋之妻莽以詐立心疑大臣怨謗欲震威以懼下因是發怒曰黄皇室主天下母此何謂也收捕尋尋亡豐自殺尋隨方士入華山嵗餘捕得辭連國師公秀子侍中隆威矦棻棻弟右曹長水校尉伐虜矦泳大司空邑弟左關將軍掌威矦竒及秀門人侍中􅀐都尉丁隆等牽引公卿黨親列矦以下死者數百人乃流棻于幽州放尋于三危殛隆于羽山皆驛車載其屍傳致云是歲莽始興神僊事以方士蘇樂言起八風臺臺成萬金又種五粱禾於殿中先以寶玉漬種計粟斛成一金三年遣田禾將軍趙並發戍卒屯田五原北假以助軍糧莽遣中郎將藺苞副校尉戴級將兵萬􅀐多齎珍寶至雲中塞下招誘呼韓邪單于諸子欲以次拜爲十五單于苞級使譯出塞誘呼右犂汗王咸咸子登助三人至則脅拜咸爲孝單于助爲順單于皆厚加賞賜傳送助登長安莽封苞爲宣威公拜爲虎牙將軍封級爲揚威公拜爲虎賁將軍單于聞之怒曰先單于受漢宣帝恩不可負也今天子非宣帝子孫何以得立遣左骨都矦右伊秩訾王呼盧訾及左賢王樂將兵入雲中益壽塞大殺吏民是後單于歷告左右部都尉諸邊王入塞寇盜大輩萬餘中輩數千少者數百殺鴈門朔方太守都尉略吏民畜産不可勝數縁邊虚耗是時諸將在邊以大衆未集未敢出擊匈奴討濊將軍嚴尤諌曰臣聞匈奴為害所從來乆矣未聞上世有必征之者也後世三家周秦漢征之然皆未有得上策者也周得中策漢得下策秦無策焉當周宣王時獫狁内侵至于涇陽命將征之盡境而還其視戎狄之侵譬猶蟁蝱􅇌之而已故天下稱明是爲中䇿漢武帝選將練兵約齎輕糧深入逺戍雖有克􅀗之功胡輙報之兵連禍結三十餘年中國罷耗匈奴亦創艾而天下稱武是爲下策秦始皇不忍小恥而輕民力築長城之固延袤萬里轉輸之行起於負海疆境旣完中國内竭以喪社稷是爲無䇿今天下遭陽九之厄比年饑饉西北邊尤甚發三十萬衆具三百日糧東援海代南取江淮然後乃僃計其道里一年尚未集合兵先至者聚居暴露師老械弊埶不可用此一難也邊既空虛不能奉軍糧内調郡國不相及屬此二難也計一人三百日食用糒十八斛非牛力不能勝牛又當自齎食加二十斛重矣胡地沙鹵多乏水草以往事揆之軍出未蒲百日牛必物故且盡餘糧尚多人不能負此三難也胡地秋冬甚寒春夏甚風多齎釡鍑薪炭重不可勝食糒飲水以歷四時師有疾疫之憂是故前世伐胡不過百日非不欲乆埶力不能此四難也輜重自隨則輕銳者少不得疾行虜徐遁逃埶不能及幸而逢虜又累輜重如遇險阻衘尾相隨虜要遮前後危殆不測此五難也大用民力功不可必立臣伏憂之今既發兵宜縱先至者令臣尤等深入霆擊且以創艾胡虜莽不聽尤言轉兵榖如故天下騷動咸旣受莽孝單于之號馳出塞歸庭具以見脅状白單于單于更以爲於粟置支矦匈奴賤官也後助病死莽以登代助爲順單于吏士屯邊者所在放縱而内郡愁於徴發民棄城郭始流亡爲盜賊并州平州尤甚莽令七公六卿號皆兼稱將軍遣著武將軍逯並等鎭名都中郎郎繡衣執灋各五十五人分鎭縁邊大郡督大姦猾擅弄兵者皆乗便爲姦於外橈亂州郡貨賂爲市侵漁百姓莽下書切責之曰自今以來敢犯此者輙捕繫以名聞然猶放縱自若北邊自宣帝以來數丗不見煙火之警人民熾盛牛馬布野及莽橈亂匈奴與之構難邊民死亡係􅀗數年之間北邊虛空野有暴骨矣太師王舜自莽簒位後病悸􅎊劇死莽爲太子置師友各四人秩以大夫以故大司徒馬宫等爲師疑傅丞阿輔保拂是爲四師故尚書令唐林等爲胥附犇走先後禦侮是爲四友又置師友侍中諫議六經祭酒各一人凡九祭酒秩皆上卿遣使者奉璽書印綬安車駟馬迎龔勝即拜爲師友祭酒使者與郡太守縣長吏三老官屬行義諸生千人以上入勝里致詔使者欲令勝起迎乆立門外勝稱病篤爲􅇃室中户西南牖下東首加朝服拕紳使者付璽書奉印綬内安車駟馬進謂勝曰聖朝未嘗忘君制作未定待君爲政思聞所欲施行以安海内勝對曰素愚加以年老被病命在朝夕隨使君上道必死道路無益萬分使者要􅀃至以印綬就加勝身勝輙推不受便者即上言方盛夏暑熱勝病少氣可須秋涼乃發有詔許之使者五日壹與太守俱問起居爲勝兩子及門人髙暉等言朝廷虛心待君以茅土之封雖疾病宜動移至傳舎示有行意必爲子孫遺大業暉等白使者語勝自知不見聽即謂暉等吾受漢家厚恩無以報今年老矣旦暮入地誼豈以一身事二姓下見故主哉勝因敕以棺歛喪事衣周於身棺周於衣勿隨俗動吾􅃁種柏作祠堂語畢遂不復開口飲食積十四日死死時七十九矣是時清名之士又有琅邪紀逡齊薛方太原郇越郇相沛唐林唐尊皆以明經飭行顯名於世紀逡兩唐皆仕莽封矦貴重歷公卿位唐林數上䟽諫正有忠直節唐尊衣敝履空被虚僞名郇相爲莽太子四友病死莽太子遣使裞以衣衾其子攀棺不聽曰死父遺言師友之送勿有所受今於皇太子得託友官故不受也京師稱之莽以安車迎薛方方因使者辭謝曰堯舜在上下有巢由今明主方隆唐虞之德小臣欲守箕山之節使者以聞莽􅀃其言不彊致初隃糜郭欽爲南郡太守杜陵蔣詡爲兖州刺史亦以廉直爲名莽居攝欽詡皆以病免官歸鄉里卧不出户卒於家哀平之際沛國陳咸以律令爲尚書莽輔政多改漢制咸心非之及何武鮑宣死咸嘆曰易稱見幾而作不俟終日吾可以逝矣即乞骸骨去職及莽簒位召咸爲掌㓂大夫咸謝病不肯應時三子參豐欽皆在位咸悉令解官歸鄉里閉門不出入猶用漢家祖臘人問其故咸曰我先人豈知王氏臘乎悉收歛其家律令書文壁藏之又齊栗融北海禽慶蘇章山陽曹竟皆儒生去官不仕於莽班固贊曰春秋列國卿大夫及至漢興將相名臣懷禄耽寵以失其世者多矣是故清節之士於是爲貴然大率多能自治而不能治人王貢之材優於龔鮑守死善道勝實蹈焉貞而不諒薛方近之郭欽蔣詡好遯不汙絶紀唐矣是歲瀕河郡蝗生河決魏郡泛清河以東數郡先是莽恐河決爲元城􅃁墓害及決東去元城不憂水故遂不堤塞四年春二月赦天下厭難將軍陳欽震狄將軍王廵上言捕得虜生口驗問言虜犯邊者皆孝單于咸子角所爲莽乃㑹諸夷斬咸子登於長安市大司馬甄邯死莽至明堂下書以洛陽爲東都常安爲西都􅀖畿連體各有采任州從禹貢爲九爵從周氏爲五諸矦之貟千有八百附城之數亦如之以俟有功諸公一同有衆萬户其餘以是爲差今已受封者公矦以下凡七百九十六人附城千五百一十一人以圖簿未定未授國邑且令受奉都内月錢數千諸矦皆困乏至有傭作者莽性躁擾不能無爲毎有所興造動欲慕古不度時宜制度又不定吏縁爲姦天下謷謷䧟刑者衆莽知民愁怨乃下詔諸食王田皆得賣之勿拘以灋犯私買賣庶人者且一切勿治然它政誖亂刑罰深刻賦斂重數猶如故焉初五威將帥出西南夷改句町王爲矦王邯怨怒不附莽諷䍧柯大尹周歆詐殺邯邯弟承起兵殺歆州郡擊之不能服莽又發髙句驪兵擊匈奴髙句驪不欲行郡彊迫之皆亡出塞因犯灋爲寇遼西大尹田譚追擊之爲所殺州郡歸咎於髙句驪矦騶嚴尤奏言貉人犯灋不從騶起正有它心宜令州郡且慰安之今猥被以大罪恐其遂畔夫餘之屬必有和者匈奴未克夫餘濊貉復起此大憂也莽不尉安濊貉遂反詔尤擊之尤誘髙句驪矦騶至而斬焉傳首長安莽大􅀃下書更名髙句驪爲下句驪於是貉人愈犯邊東北與西南夷皆亂莽志方盛以爲四夷不足吞滅專念稽古之事復下書以此年二月東廵狩具禮儀調度旣而以文母太后體不安且止待後初莽爲安漢公時欲諂太皇太后以斬郅支功奏尊元帝廟爲髙宗太后晏駕後當以禮配食云及莽改號太后爲新室文母絶之於漢不令得體元帝墮壊孝元廟更爲文母太后起廟獨置孝元廟故殿以爲文母篹食堂旣成名曰長夀宫以太后在故未謂之廟莽置酒長壽宫請太后旣至見孝元廟廢徹塗地太后驚泣曰此漢家宗廟皆有神靈與何治而壊之且使鬼神無知又何用廟爲如令有知我乃人之妃妾豈宜辱帝之堂以陳饋食哉私謂左右曰此人慢神多矣能乆得祐乎飲酒不樂而罷自莽簒位後知太后怨恨求所以媚太后無不爲然愈不􅀃莽更漢家黒貂著黄貂又改漢正朔伏臘日太后令其官屬黒貂至漢家正臘日獨與其左右相對飲食五年春二月文母皇太后崩年八十四葬渭陵與元帝合而溝絶之新室世世獻祭其廟元帝配食坐於牀下莽爲太后服喪三年烏孫大小昆彌遣使貢獻莽以烏孫國人多親附小昆彌見匈奴諸邊並侵意欲得烏孫心乃遣使者引小昆彌使坐大昆彌使上師友祭酒滿昌劾奏使者曰夷狄以中國有禮誼故詘而服從大昆彌君也今序臣使於君使之上非所以有夷狄也奉使大不敬莽怒免昌官西域諸國以莽積失恩信焉􅂄先叛殺都護但欽西域遂瓦解十一月彗星出二十餘日不見是歲以犯挾銅炭者多除其灋匈奴烏珠留單于死用事大臣右骨都矦須卜當即王昭君女伊墨居次云之壻也云常欲與中國和親又素與於粟置支矦咸厚善見咸前後爲莽所拜故遂立咸爲烏累若鞮單于烏累單于咸立以弟輿爲左谷蠡王烏珠留單于子蘇屠胡本爲左賢王後更謂之護于欲傳以國咸怨烏珠留單于貶已號乃貶護于爲左屠􅂄王天鳳元年春正月赦天下莽下詔將以是嵗四仲月徧行廵狩之禮太官齎糒乾肉内者行張坐卧所過毋得有所給俟畢北廵狩之禮即于土中居洛陽之都羣公奏言皇帝至孝新遭文母之喪顔色未復飲食損少今一歲四廵道路萬里春秋尊非糒乾肉之所能堪且無廵狩須闋大服以安聖體莽從之要期以天鳳七年廵狩厥明年即土之中遣太傅平晏大司空王邑之洛陽營相宅兆圖起宗廟社稷郊兆云三月壬申晦日有食之大赦天下以災異策大司馬逯並就矦氏朝位太傅平晏勿領尚書事以利苖男訢爲大司馬莽即眞尤僃大臣抑奪下權朝臣有言其過失者輙㧞擢孔仁趙博費興等以敢擊大臣故見信任擇名官而居之國將哀章頗不清莽爲選置和叔敕曰非但保國將閨門當保親屬在西州者諸公皆輕賤而章尤甚夏四月隕霜殺草木海瀕尤甚六月黄霧四塞秋七月大風㧞樹飛北闕直城門屋瓦雨雹殺牛羊莽以周官王制之文置卒正連率大尹職如太守又置州牧部監二十五人分長安城旁六鄉置帥各一人分三輔爲六尉郡河東河内弘農河南潁川南陽爲六隊郡更名河南大尹曰保忠信卿益河南屬縣滿三十置六郊州長各一人人主五縣及它官名悉改大郡至分爲五合百二十有五郡九州之内縣二千二百有三又倣古六服爲惟城惟寜惟翰惟屏惟垣惟藩各以其方爲稱緫爲萬國焉其後􅀊復變更一郡至五易名而還復其故吏民不能紀毎下詔書輙繫其故名云匈奴右骨都矦須卜當伊墨居次云勸單于和親遣人之西河虎猛制虜塞下告塞吏曰欲見和親矦和親矦者王昭君兄子歙也中部都尉以聞莽遣歙歙弟􅀐都尉展徳矦颯使匈奴賀單于初立賜黄金衣􅀍繒帛紿言侍子登在因購求陳良終帶等單于盡收陳良等二十七人皆械檻付使者遣厨唯姑夕王富等四十人送歙颯莽作焚如之刑燒殺陳良等縁邊大饑人相食諌大夫如普行邊兵還言軍士乆屯寒苦邊郡無以相贍今單于新和宜因是罷兵校尉韓威進曰以新室之威而吞胡虜無異口中蚤蝨臣願得勇敢之士五千人不齎斗糧飢食虜肉渴飲其血可以横行莽壯其言以威爲將軍然采普言徴還諸將在邊者免陳欽等十入人又罷四關鎮都尉諸屯兵單于貪莽賂遺故外不失漢故事然内利㓂掠又使還知子登前死怨恨㓂虜從左地入不絶使者問單于輙曰烏􅁊與匈奴無狀􅃛民共爲㓂入塞譬如中國有盜賊耳咸初立持國威信尚淺盡力禁止不敢有二心莽復發軍屯益州蠻夷愁擾盡反復殺益州大尹程隆莽遣平蠻將軍馮茂發巴蜀犍爲吏士賦斂取足於民以擊之莽復申下金銀􅀛貝之貨頗増減其賈直而罷大小錢改作貨布貨泉二品並行又以大錢行乆罷之恐民挾不止乃令民且獨行大錢盡六年毋得復挾大錢矣毎壹易錢民用破業而大䧟刑卷終
