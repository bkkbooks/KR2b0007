front:
  text: 色以孝平皇后爲定安太后讀策畢莽親執孺子手流涕歔欷曰昔周公攝位終得復子明辟今予獨迫皇天威命不得如意哀嘆良乆中傅將孺子下殿北靣而稱臣百僚陪位莫不感動又按金匱封拜輔臣以太傅左輔王舜爲太師封安新公大司徒平晏爲太傅就新公少阿羲和劉秀爲國師嘉新公廣漢梓潼哀章爲國將美新公是爲四輔位上公太保後承甄邯爲大司馬承新公丕進矦王尋爲大司徒章新公歩兵將軍王邑爲大司空隆新公是爲三公太阿右拂大司空甄豐爲更始將軍廣新公京兆王興爲衞將軍奉新公輕車將軍孫建爲立國將軍成新公京兆王盛爲前將軍崇新公是爲四將凡十一公王興者故城門令史王盛者賣餅莽按符命求得此姓名十餘人兩人容貌應卜相徑從布衣登用以示神焉是日封拜卿大夫侍中尚書官凡數百人諸劉爲郡守者皆徙爲諌大夫改明光宫爲定安館定安太后居之以大鴻臚府爲定安公第皆置門䘙使者監領敕阿乳母不得與嬰語常在四壁中至於長大不能名六畜後莽以女孫宇子妻之莽策命羣司各以其職如典誥之文置大司馬司允大司徒司直大司空司若位皆􅀌卿更名大司農曰羲和後更爲納言大理曰作士太常曰秩宗大鴻臚曰典樂少府曰共工水衡都尉曰予虞與三公司卿分屬三公置二十七大夫八十一元士分主中都官諸職又更光禄勲等名爲六監皆上卿改郡太守曰大尹都尉曰大尉縣令長曰宰長樂宫曰常樂室長安曰常安其餘百官宫室郡縣盡易其名不可勝紀封王氏齊縗之屬爲矦大功爲伯小功爲子緦麻爲男其女皆爲任男以睦女以隆爲號焉又曰漢氏諸矦或稱王至于四夷亦如之違於古典繆於一統其定諸矦王之號皆稱公及四夷僭號稱王者皆更爲矦於是漢諸矦王二十二人皆降爲公王子矦者百八十一人皆降爲子其後皆奪爵焉
