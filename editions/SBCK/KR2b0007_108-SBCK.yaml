seq: 108
front:
  text: 成言於興曰今冦敵未滅上復寢疾王統等皆有部曲終爲人患宜盡除之興從之殺王統王廣苻㣧徐成毛盛萇怒曰王統兄弟吾之州里實無他志徐成等皆前朝名將吾方用之柰何輒殺之燕主垂進逼􅂫康壘夏四月翟都􅀯走滑臺翟釗求救於西燕西燕主永謀於羣臣尚書郎勃海鮑遵曰使两冦相弊吾承其後此卞莊子之策也中書侍郎太原張騰曰垂彊釗弱何弊之承不如速救之以成鼎足之􅀔今我引兵趨中山晝多疑兵夜多火炬垂必懼而自救我衝其前釗躡其後此天授之機不可失也永不從燕大赦五月丁卯朔日有食之六月燕主垂軍􅀺陽臨河欲濟翟釗列兵􅀯岸以拒之辛亥垂徙營就西津去黎陽西四十里爲牛皮船百餘艘僞列兵仗沂流而上釗亟引兵趣西津垂濳遣中壘將軍桂林王鎭等自􅀺陽津夜濟營于河􅀯比明而營成釗聞之亟還攻鎭等營垂命鎭等堅壁勿戰釗兵往來疲暍攻營不能拔將引去鎭等引兵出戰驃􅀐將軍農自西津濟與鎭等夾擊大破之釗走還滑臺將妻子収遺衆北濟河登白鹿山慿險自守燕兵不得進農曰釗無糧不能乆居山中乃引兵還留􅀐􅇋之釗果下山還兵掩擊盡獲其衆釗單􅀐犇長子西燕主永以釗爲車􅀐大將軍兖州牧封東郡王􅀊餘釗謀反永殺之􅀄郝晷崔逞及清河崔宏新興張卓遼東䕫騰陽平路纂皆仕於秦避秦亂來犇詔以爲冀州諸郡各將部曲營於河􅀯既而受翟氏官爵翟氏敗皆降於燕燕主垂各隨其材而用之釗所統七郡三萬餘户皆按堵如故以章武王宙爲兖豫二州刺史鎭滑臺徙徐州民七千餘户于黎陽以彭城王脱爲徐州刺史鎭􅀺陽脫垂之弟子也垂以崔䕃爲宙司馬初陳留王紹爲鎭􅀯將軍太原王楷爲征西將軍樂浪王温爲征東將軍垂皆以䕃爲之佐䕃才幹明敏強正善規諌四王皆嚴憚之所至簡刑法輕賦役流民歸之户口滋息秋七月垂如鄴以太原王楷爲冀州牧右光禄大夫餘蔚爲左僕射秦主登聞後秦主萇疾病大喜告祠世祖神主大赦百官進位二等秣馬厲兵進逼安定去城九十餘里八月萇疾小瘳出拒之登引兵出營將逆戰萇遣安南將軍姚熈隆别攻秦營登懼而還萇夜引兵旁出以躡其後旦而􅇋􅀐告曰賊諸營已空不知所向登驚曰彼爲何人去令我不知來令我不􅁴謂其將死忽然復來朕與此羌同丗何其厄哉登遂還雍萇亦還安定
