body:
  text: 三河王光遣其弟右將軍寳等攻金城王乾歸寳及將士死者萬餘人又遣其子虎賁中郎將纂擊南羌彭奚念纂亦敗歸光自將擊奚念於枹罕克之奚念犇甘松冬十月辛亥荆州刺史王忱卒雍州刺史朱序以老病求解職詔以太子右衛率郗恢爲雍州刺史代序鎮襄陽恢曇之子也巴蜀人在關中者皆叛後秦據􅀪農以附秦秦主登以竇衝爲左丞相衝徙屯華隂郗恢遣將軍趙睦守金墉河南太守楊佺期帥衆軍湖城擊衝走之十一月癸酉以黄門郎殷仲堪爲都督荆益寧三州諸軍事荆州刺史鎮江陵仲堪雖有英譽資望猶淺議者不以爲允到官好行小惠綱目不舉南郡公􅁊玄負其才地以雄豪自處朝廷疑而不用年二十三始拜太子洗馬玄甞詣琅邪王道子值其酣醉張目謂衆客曰􅁊温晩塗欲作賊云何玄伏地流汗不能起由是益不自安常切齒於道子後出補義興太守鬱鬱不得志歎曰父爲九州伯兒爲五湖長遂棄官歸國上䟽自訟曰先臣勤王匡復之勲朝廷遺之臣不復計至於先帝龍飛陛下繼明請問談者誰之由邪䟽􅃦不報玄在江陵仲堪甚敬憚之􅁊氏累世臨荆州玄復豪横士民畏之過於仲堪甞於仲堪聽事前戯馬以矟擬仲堪仲堪中兵參軍彭城劉邁謂玄曰馬矟有餘精理不足玄不悅仲堪爲之失色玄出仲堪謂邁曰卿狂人也玄夜遣殺卿我豈能相救邪使邁下都避之玄使人追之邁僅而獲免征虜參軍豫章胡藩過江陵見仲堪􅀃之曰􅁊玄志趣不常每怏怏於失職節下崇待太過恐非將來之計也仲堪不悅藩内弟同郡羅企生為仲堪功曹藩退謂企生曰殷矦倒戈以授人必及於禍君不早圖去就後悔無及矣庚寅立皇子德文爲琅邪王徙琅邪王道子為㑹稽王十二月燕主垂還中山以遼西王農爲都督兖豫荆徐雍五州諸軍事鎮鄴休官權千成據顯親自稱秦州牧清河人李遼上表請敕兖州修孔子廟給户灑掃仍立庠序収教學者曰事有如賖而寔急者此之謂也表不見省十八年春正月燕陽平孝王柔卒權千成爲秦所逼請降於金城王乾歸乾歸以爲東秦州刺史休官大都統顯親公夏四月庚子燕主垂加太子寳大單于以安定王庫傉官偉爲太尉范陽王德爲司徒太原王楷爲司空陳留王紹爲尚書右僕射五月立子熈爲河間王朗爲勃海王鑒爲博陵王秦右丞相竇衝矜才尚人自請封天水王秦主登不許六月衝自稱秦王改元元光金城王乾歸立其子熾磐爲太子熾磐勇略明決過於其父秋七月秦主登攻竇衝於野人堡衝求救於後秦尹緯言於後秦主萇曰太子仁厚之稱著於逺近而英略未著請使擊苻登以著之萇從之太子典將兵攻胡空堡登解衝圍以赴之興因襲平涼大獲而歸萇使興還鎭長安魏王珪以薛干太悉伏不送劉勃勃八月襲其城屠之太悉伏犇秦氐帥楊佛嵩叛犇後秦楊佺期趙睦追之九月丙戌敗佛嵩於潼闗後秦將姚崇救佛嵩敗晉兵趙睦死冬十月後秦主萇疾甚還長安燕主垂議伐西燕諸將皆曰永未有釁我連年征討士卒疲弊未可也范陽王德曰永既國之枝葉又僣舉位號惑民視聽冝先除之以壹民心士卒雖疲庸得已乎垂曰司徒意正與吾同吾比老叩囊底智足以取之終不復留此賊以累子孫也遂戒嚴十一月垂發中山步􅀐七萬遣鎭西將軍丹楊王纉龍驤將軍張崇出井陘攻西燕武鄉公友于晉陽征東將軍平規攻鎭東將軍叚平于沙亭西燕主永遣其尚書令刀雲車􅀐將軍慕容鍾帥衆五萬守潞川友永之弟也十二月垂至鄴己亥後秦主萇召太尉姚旻僕射尹緯姚晃將軍姚大目尚書狄伯支入禁中受遺詔輔政萇謂太子興曰有毁此諸公者愼勿受之汝撫骨肉以恩接大臣以禮待物以信遇民以仁四者不失吾無憂矣姚晃垂涕問取苻登之䇿萇曰今大業垂成興才智足辦奚所復問庚子萇卒興祕不發䘮以其叔父緒鎭安定碩德鎭隂宻弟崇守長安或謂碩德曰公威名素重部曲最彊今易丗之際必爲朝廷所疑不如且犇秦州觀望事勢碩德曰太子志度寛明必無它慮今苻登未滅而骨肉相攻是自亡也吾有死而已終不爲也遂往見興興優禮而遣之興自稱大將軍以尹緯爲長史狄伯支爲司馬帥衆伐秦十九年春正月秦主登聞後秦主萇卒喜曰姚興小兒吾折杖笞之耳乃大赦盡衆而東留司徒安成王廣守雍太子崇守胡空堡遣使拜金城王乾歸爲左丞相河南王領秦梁益涼沙五州牧加九錫初秃髪思復鞬卒子烏􅀌立烏􅀌雄勇有大志與大將紛陁謀取涼州紛陁曰公必欲得涼州宜先務農講武禮俊賢修政刑然後可也烏􅀌從之三河王光遣使拜烏􅀌冠軍大將軍河西鮮卑大都統烏􅀌與其羣下謀之曰可受乎皆曰吾士馬衆多何爲屬人石眞若留不對烏􅀌曰卿畏吕光邪石眞若留曰吾本根未固小大非敵若先致死於我何以待之不如受以驕之俟釁而動蔑不克矣烏􅀌乃受之二月秦主登攻屠各姚奴帛蒲二堡克之燕主垂留清河公㑹鎭鄴發司冀青兖兵遣太原王楷出滏口遼西王農出壷關垂自出沙庭以擊西燕標榜所趣軍各就頓西燕主永聞之嚴兵分道拒守聚粮臺壁遣從子征東將軍小逸豆歸鎭東將軍王次多右將軍勒馬駒帥衆萬餘人戍之夏四月秦主登自六陌趣廢橋後秦始平太守姚詳據馬嵬堡以拒之太子興遣尹緯將兵救詳緯據廢橋以待秦秦兵爭水不能得渴死者什二三因急攻緯興馳遣狄伯攴謂緯曰苻登窮冦宜持重以挫之緯曰先帝登遐人情擾懼今不因思􅁬之力以禽敵大事去矣遂與秦戰秦兵大敗其夜秦衆潰登單􅀐犇雍太子崇及安成王廣聞敗皆棄城走登至無所歸乃犇平涼收集遺衆入馬毛山燕主垂頓軍鄴西􅀯月餘不進西燕主永怪之以爲太行道寛疑垂欲詭道取之乃悉歛諸軍屯軹􅀜杜太行口惟留臺壁一軍甲戌垂引大軍出滏口入天井􅀜五月乙酉燕軍至臺壁永遣從兄太尉大逸豆歸救之平規擊破之小逸豆歸出戰遼西王農又擊破之斬勒馬駒禽王次多遂圍臺壁永召太行軍還自將精兵五萬以拒之刁雲慕容鍾震怖帥衆降燕永誅其妻子己亥垂陳于臺壁南遣驍􅀐將軍慕容國伏千􅀐於澗下庚子與永合戰垂僞退永衆追之行數里國􅀐從澗中出斷其後諸軍四面俱進大破之斬首八千餘級永走歸長子晉陽守將聞之棄城走丹楊王瓉等進取晉陽􅊨後秦太子興始發䘮即皇帝位于槐里大赦改元皇初遂如安定謚後秦主萇曰武昭皇帝廟號太祖􅊨六月壬子追尊㑹稽王太妃鄭氏曰簡文宣太后羣臣謂宣太后應配食元帝太子前率徐邈曰宣太后平素之時不伉儷於先帝至於子孫豈可爲祖考立配國學明教東莞臧燾曰今尊號旣正則罔極之情申别建寢廟則嚴禰之義顯繫子爲稱兼明貴之所由一舉而允三義不亦善乎乃立廟於太廟路西􅊨燕主垂進軍圍長子西燕主永欲犇後秦侍中蘭英曰昔石虎伐龍都太祖堅守不去卒成大燕之基今垂七十老翁厭苦兵革終不能頓兵連嵗以攻我也但當城守以疲之永從之秦主登遣其子汝隂王宗爲質於河南王乾歸以請救進封乾歸梁王納其妹爲梁王后乾歸遣前軍將軍乞伏益州等帥􅀐一萬救之秋七月登引兵出迎乾歸兵後秦主興自安定如涇陽與登戰于山南執登殺之悉散其部衆使歸農業徙隂宻三萬戸於長安以李后賜姚晃益州等聞之引兵還秦太子崇犇湟中即帝位改元延􅀄謚登曰髙皇帝廟號太宗後秦安南將軍强熈鎭逺將軍楊多叛推竇衝爲主後秦主興自將討之軍至武功多兄子良國殺多而降熈犇秦州衝犇汧川汧川氐仇髙執送之三河王光以子覆爲都督玉門以西諸軍事西域大都護鎮高昌命大臣子弟隨之八月己巳尊皇太妃李氐爲皇太后居崇訓宫西燕主永困急遣其子常山公弘等求救於雍州刺史郗恢并獻玉璽一紐恢上言垂若并永爲患益深不如兩存之可以乗機􅀟斃帝以爲然詔青兖二州刺史王恭䂊州刺史􅁃楷救之楷亮之孫也永恐晉兵不出又遣其太子亮來爲質平規追亮及於高都獲之永又告急於魏魏王珪遣陳留公䖍將軍􅁃岳帥􅀐五萬東渡河屯秀容以救之䖍紇根之子也晉魏兵皆未至大逸豆歸部將伐勤等開門內燕兵燕人執永斬之并斬其公卿大將刁雲大逸豆歸等三十餘人得永所統八郡七萬餘户及秦乗輿服御伎樂珍寳甚衆燕主垂以丹楊王瓉爲并州刺史鎭晉陽宜都王鳳爲雍州刺史鎭長子永尚書僕射昌􅀺屈遵尚書陽平王德祕書監中山李先太子詹事勃海封則黄門郎太山胡母亮中書郎張騰尚書郎燕郡公孫表皆隨才擢叙九月垂自長子如鄴冬十月秦主崇爲梁王乾歸所逐犇隴西王楊定定留司馬邵彊守秦州帥衆二萬與崇共攻乾歸乾歸遣涼州牧軻彈秦州牧益州立義將軍詰歸帥􅀐三萬拒之益州與定戰敗於平州軻彈詰歸皆引退軻彈司馬翟瑥􅁬劔怒曰主上以雄武開基所向無敵威振秦蜀將軍以宗室居元帥之任當竭力致命以佐國家今秦州雖敗二軍尚全奈何望風退衂將何面以見主上乎瑥雖無任獨不能以便宜斬將軍乎軻彈謝曰向者未知衆心何如耳果能若是吾敢愛死乃帥􅀐進戰益州詰歸亦勒兵繼之大敗定兵殺定及崇斬首萬七千級乾歸於是盡有隴西之地定無子其叔父佛狗之子盛先守仇池自稱征西將軍秦州刺史仇池公謚定爲武王仍遣使來稱藩秦太子宣犇盛盛分氐羗爲二十部護軍各爲鎭戍不置郡縣燕主垂東巡陽平平原命遼西王農濟河與安南將軍尹國略地青兖農攻廪兵國攻陽城皆拔之東平太守韋簡戰死髙平太山琅邪諸郡皆委城犇潰農進軍臨海徧置守宰柔然曷多汗棄其父與社崘帥衆西走魏長孫肥追之及於上郡跋那山斬曷多汗社崘収其餘衆數百犇疋􅇋跋疋􅇋跋處之南鄙社崘襲疋􅇋跋殺之疋􅇋跋子啟跋呉頡等皆犇魏社崘掠五原以西諸部走度漠北十一月燕遼西王農敗辟閭渾於龍水遂入臨淄十二月燕主垂召農等還秦主興遣使與燕結好并送太子寳之子敏於燕燕封敏爲河東公梁王乾歸自稱秦王大赦二十年春正月燕主垂遣散􅀐常侍封則報聘于秦遂自平原狩于廣川勃海長樂而歸西秦王乾歸以太子熾磐領尚書令左長史邊芮爲左僕射右長史秘宜爲右僕射置官皆如魏武晉文故事然猶稱大單于大將軍邊芮等領府佐如故薛干悉太伏自長安亡歸嶺北上郡以西鮮卑雜胡皆應之二月甲寅尚書令陸納卒三月庚辰朔日有食之皇太子出就東宫以丹陽尹王雅領少􅀓時會稽王道子專權奢縱嬖人趙牙本出倡優茹千秋本錢唐捕賊吏皆以謟賂得進道子以牙爲魏郡太守千秋爲驃􅀐諮議參軍牙爲道子開東第築山穿池功用鉅萬帝嘗幸其第謂道子曰府内乃有山甚善然脩飾太過道子無以對帝去道子謂牙曰上若知山是人力所爲爾必死矣牙曰公在牙何敢死營作彌甚千秋賣官招權聚貨累億博平令吴興聞人奭上䟽言之帝益惡道子而逼於太后不忍廢黜乃擢時望及所親幸王恭郗恢殷仲堪王珣王雅等使居内外要任以防道子道子亦引王國寳及國寳從弟琅邪内史緒以爲心腹由是朋黨競起無復曏時友愛之驩矣太后每和解之中書侍郎徐邈從容言於帝曰漢文明主猶悔淮南世祖聦逹􅀒愧齊王兄弟之際實爲深愼㑹稽王雖有酣媟之累宜加􅀪貸消散羣議外爲國家之計内慰太后之心帝納之復委任道子如故􅀄楊定之死也天水姜乳襲據上邽夏四月西秦王乾歸遣乞伏益州帥􅀐六千討之左僕射邊芮民部尚書王松壽曰益州屢勝而驕不可專任必以輕敵取敗乾歸曰益州驍勇諸將莫及當以重佐輔之耳乃以平北將軍韋䖍爲長史左禁將軍務和爲司馬至大寒嶺益州不設部伍聽將士遊畋縱飲令曰敢言軍事者斬䖍等諌不聽乳逆擊大破之魏王珪叛燕侵逼附塞諸部五月甲戌燕主垂遣太子寳遼西王農趙王麟帥衆八萬自五原伐魏范陽王德陳留王紹别將步􅀐萬八千爲後繼散􅀐常侍髙湖諌曰魏與燕丗爲昏姻彼有内難燕實存之其施德厚矣結好乆矣間以求馬不獲而留其弟曲在於我柰何遽興兵擊之拓跋涉珪沈勇有謀㓜歴艱難兵精馬彊未易輕也皇太子富於春秋志果氣銳今委之專征必小魏而易之萬一不如所欲傷威毁重願陛下深圖之言頗激切垂怒免湖官湖泰之子也六月癸丑燕太原元王楷卒西秦王乾歸遷于西城秋七月三河王光帥衆十萬伐西秦西秦左輔宻貴周左衛將軍莫者羖羝勸西秦王乾歸稱藩於光以子敕勃爲質光引兵還乾歸悔之殺周及羖羝魏張衮聞燕軍將至言於魏王珪曰燕狃於滑臺長子之捷竭國之資力以來有輕我之心宜羸形以驕之乃可克也珪從之悉徙部落畜産西渡河千餘里以避之燕軍至五原降魏别部三萬餘家收穄田百餘萬斛置黑城進軍臨河造舩爲濟具珪遣右司馬許謙乞師於秦秃髪烏􅀌擊乙弗折掘等諸部皆破降之築廉川堡而都之廣武趙振少好竒略聞烏􅀌在廉川棄家從之烏􅀌喜曰吾得趙生大事濟矣拜左司馬三河王光封烏孤爲廣武郡公有長星見自湏女至于哭星帝心惡之於華林園舉酒祝之曰長星勸汝一杯酒自古何有萬歳天子邪八月魏王珪治兵河南九月進軍臨河燕太子寳列兵將濟暴風起漂其舩數十艘洎南岸魏獲其甲士三百餘人皆釋而遣之寳之發中山也燕主垂已有疾旣至五原珪使人邀中山之路伺其使者盡執之寳等數月不聞垂起居珪使所執使者臨河告之曰若父已死何不早歸寳等憂恐士卒駭動珪使陳留公䖍將五萬騎屯河東東平公儀將十萬􅀐屯河北略陽公遵將七萬􅀐塞燕軍之南遵壽鳩之子也秦王興遣楊佛嵩將兵救魏燕術士靳安言於太子寳曰天時不利燕必大敗速去可免寳不聽安退告人曰吾軰皆當棄尸草野不得歸矣燕魏相持積旬趙王麟將慕輿嵩等以垂爲實死謀作亂奉麟爲主事泄嵩等皆死寳麟等内自疑冬十月辛未燒船夜遁時河氷未結寳以魏兵必不能度不設斥􅇋十一月己夘暴風氷合魏王珪引兵濟河留輜重選精銳二萬餘􅀐急追之燕軍至參合陂有大風黑氣如堤自軍後來臨覆軍上沙門支曇猛言於寳曰風氣􅁀迅魏兵將至之􅇋宜遣兵禦之寳以去魏軍已逺􅀏而不應曇猛固請不已麟怒曰以殿下神武師徒之盛足以横行沙漠索虜何敢逺來而曇猛妄言驚衆當斬以徇曇猛泣曰苻氏以百萬之師敗於淮南正由恃衆輕敵不信天道故也司徒德勸寳從曇猛言寳乃遣麟帥􅀐三萬居軍後以備非常麟以曇猛爲妄縱􅀐遊獵不肯設僃寳遣􅀐還詗魏兵􅀐行十餘里即解鞍寢魏軍晨夜兼行乙酉暮至參合陂西燕軍在陂東營於蟠羊山南水上魏王珪夜部分諸將掩覆燕軍士卒衘枚束馬口潜進丙戌日出魏軍登山下臨燕營燕軍將東引顧見之士卒大驚擾亂珪縱兵擊之燕兵走赴水人馬相騰躡壓溺死者以萬數略陽公遵以兵邀其前燕兵四五萬人一時放仗歛手就禽其遺迸去者不過數千人太子寳等皆單􅀐僅免殺燕右僕射陳留悼王紹生禽魯陽王倭奴桂林王道成濟隂公尹國等文武將吏數千人兵甲糧貨以鉅萬計道成垂之弟子也魏王珪擇燕臣之有才用者代郡太守廣川賈閏閏從弟驃􅀐長史昌黎太守彛太史郎遼東晁崇等留之其餘欲悉給衣糧遣還以招懷中州之人中部大人王建曰燕衆彊盛今傾國而來我幸而大捷不如悉殺之則其國空虚取之爲易且獲寇而縱之無乃不可乎乃盡阬之十二月珪還雲中之盛樂燕太子寳恥於參合之敗請更擊魏司徒德言於燕主垂曰虜以參合之捷有輕太子之心宜及陛下神略以服之不然將爲後患垂乃以清河公會録留臺事領幽州刺史代高陽王隆鎭龍城以陽城王蘭汗為北中郎將代長樂公盛鎭薊命隆盛悉引其精兵還中山期以明年大舉擊魏是歳秦主興封其叔父緒爲晉王碩德爲隴西王弟崇爲齊公顯爲常山公二十一年春正月燕高陽王隆引龍城之甲入中山軍容精整燕人之氣稍振休官權萬丗帥衆降西秦燕主垂遣征東將軍平規發兵冀州二月規以傳陵武邑長樂三郡兵反於魯口其從子冀州刺史喜諫不聽規弟海陽令翰亦起兵於遼西以應之垂遣鎭東將軍餘嵩擊規嵩敗死垂自將擊規軍至魯口規棄衆將妻子及平喜等數十人走渡河垂引兵還翰引兵趣龍城清河公會遣東陽公根等擊翰破之翰走山南三月庚子燕主垂留范陽王德守中山引兵宻發踰青嶺經天門鑿山通道出魏不意直指雲中魏陳留公䖍帥部落三萬餘家鎭平城垂至獵嶺以遼西王農高陽王隆爲前鋒以襲之是時燕兵新敗皆畏魏惟龍城兵勇銳爭先䖍素不設僃閏月乙夘燕軍至平城䖍乃覺之帥麾下出戰敗死燕軍盡収其部落魏王珪震怖欲走諸部聞䖍死皆有貳心珪不知所適垂之過參合陂也見積骸如山爲之設祭軍士皆慟哭聲震山谷垂慙憤嘔血由是發疾乘馬輿而進頓平城西北三十里太子寳等聞之皆引還燕軍叛者犇告於魏云垂已死輿尸在軍魏王珪欲追之聞平城巳没乃引還隂山垂在平城積十日疾轉篤乃築燕昌城而還夏四月癸未卒於上谷之沮陽祕不發䘮丙申至中山戊戌發䘮謚曰成武皇帝廟號丗祖壬寅太子寳即位大赦改元永康五月辛亥以范陽王德爲都督兾兖青徐荆豫六州諸軍事車􅀐大將軍冀州牧鎮鄴遼西王農爲都督并雍益梁秦凉六州諸軍事并州牧鎮晉陽又以安定王庫傉官偉爲太師夫餘王蔚爲太傳甲寅以趙王麟領尚書左僕射高陽王隆領右僕射長樂公盛爲司􅀠校尉宜都王鳯爲冀州刺史乙夘以散􅀐常侍彭城劉該爲徐州刺史鎮鄄城甲子以望蔡公謝琰爲尚書左僕射初燕主垂先段后生子令寳後段后生子朗鍳愛諸姬子麟農隆柔熈寳初爲太子有美稱已而荒怠中外失望後段后甞言於垂曰太子遭承平之丗足爲守成之主今國步艱難恐非濟世之才遼西高陽二王陛下之賢子宜擇一人付以大業趙王麟姦詐彊愎異日必爲國家之患宜早圖之寳善事垂左右左右多譽之故垂以爲賢謂段氏曰汝欲使我爲晉獻公乎段氏泣而退告其妺范陽王妃曰太子不才天下所知吾爲社稷言之主上乃以吾爲驪􅁎何其苦哉觀太子必䘮社稷范陽王有非常器度若燕祚未盡其在王乎寳及麟聞而恨之乙丑寳使麟謂段氏曰后常謂主上不能守太業今竟能不宜早自裁以全段宗段氏怒曰汝兄弟不難逼殺其母况能守先業乎吾豈愛死但念國亡不乆耳遂自殺寳議以段后謀廢適統無母后之道不宜成䘮羣臣咸以爲然中書令眭邃颺言於朝曰子無廢母之義漢安恩閻后親廢順帝猶得配饗太廟况先后曖昧之言虚實未可知乎乃成䘮六月癸酉魏王珪遣將軍王建等擊燕廣􅇞太守劉亢泥斬之徙其部落於平城燕上谷太守開封公詳棄郡走詳皝之曾孫也丁亥魏賀太妃卒燕主寳定士族舊籍分辨清濁校閲戸口罷軍營封䕃之户悉屬郡縣由是士民嗟怨始有離心三河王吕光即天王位國號大凉大赦改元龍飛僃置百官以丗子紹爲太子封子弟爲公矦者二十人以中書令王詳爲尚書左僕射著作郎段業等五人爲尚書光遣使者拜秃髮烏􅀌爲征南大將軍益州牧左賢王烏􅀌謂使者曰吕王諸子貪淫三甥暴虐逺近愁怨吾安可違百姓之心受不義之爵乎吾當爲帝王之事耳乃留其鼓吹羽儀謝而遣之平規収合餘黨據髙唐燕主寳遣高陽王隆將兵討之東土之民素懐隆惠迎􅇋者屬路秋七月隆進軍臨河規棄髙唐走隆遣建威將軍慕容進等濟河追之斬規於濟北平喜犇彭城納故中書令王獻之女爲太子妃獻之羲之之子也魏羣臣勸魏王珪稱尊號珪始建天子旌旗出警入蹕改元皇始參軍事上谷張恂勸珪進取中原珪善之燕遼西王農悉將部曲數萬口之并州并州素乏儲㣥是歳早霜民不能供其食又遣諸部護軍分監諸胡由是民夷俱怨濳召魏軍八月己亥魏王珪大舉伐燕步􅀐四十餘萬南出馬邑踰句注旌旗二千餘里鼓行而進左將軍鴈門李栗將五萬􅀐爲前驅别遣將軍封眞等從東道出軍都襲燕幽州燕征北大將軍幽平二州牧清河公會母賤而年長雄俊有器藝燕主垂愛之寳之伐魏也垂命會攝東宫事揔錄禮遇一如太子及垂伐魏命會鎭龍城委以東北之任國官府佐皆選一時才望垂疾篤遺言命寳以會爲嗣而寳愛少子濮陽公策意不在會長樂公盛與㑹同年耻爲之下乃與趙王麟共勸寳立策寳從之乙亥立妃叚氏爲皇后策爲皇太子會盛皆進爵爲王策年十一素憃弱會聞之心愠懟九月章武王宙奉燕主垂及成哀叚后之䘮葬于龍城宣平陵寳詔宙悉徙高陽王隆參佐部曲家屬還中山會違詔多留部曲不遣宙年長屬尊會每事陵侮之見者皆知其有異志戊午魏軍至陽曲乘西山臨晉陽遣􅀐環城大譟而去燕遼西王農出戰大敗犇還晉陽司馬慕輿嵩閉門拒之農將妻子帥數千􅀐東走魏中領將軍長孫肥追之及於潞川獲農妻子燕軍盡没農􅀍創獨與三􅀐逃歸中山魏王珪遂取并州􅀄建臺省置刺史太守尚書郎以下官悉用儒生爲之士大夫詣軍門者無少長皆引入存慰使人人盡言少有才用咸加擢敘己未遣輔國將軍奚収略地汾川獲燕丹楊王買得及離石護軍高秀和以中書侍郎張恂等爲諸郡太守招撫離散勸課農桑燕主寳聞魏軍將至議于東堂中山尹苻謨曰今魏軍衆彊千里逺闘乘勝氣鋭若縱之使入平土不可敵也宜杜險以拒之中書令眭邃曰魏多􅀐兵往來剽速馬上齎糧不過旬日宜令郡縣聚民千家爲一堡深溝高壘清野以待之彼至無所掠不過六旬食盡自退尚書封懿曰今魏兵數十萬天下之勍敵也民雖築堡不足以自固是聚兵及粮以資之也且動揺民心示之以弱不如阻關拒戰計之上也趙王麟曰魏今乘勝氣銳其鋒不可當宜完守中山待其弊而乘之於是修城積粟爲持乆之僃命遼西王農出屯安喜軍事動静悉以委麟帝􅄝酒流連内殿醒治旣少外人罕得進見張貴人寵冠後宫後宫皆畏之庚申帝與後宫宴妓樂盡侍時貴人年近三十帝戯之曰汝以年亦當廢矣吾意更屬少者貴人濳怒向夕帝醉寢於清暑殿貴人徧飲宦者酒散遣之使婢以被蒙帝面弑之重賂左右云因魘暴崩時太子闇弱會稽王道子昏荒遂不復推問王國寳夜叩禁門欲入爲遺詔侍中王爽拒之曰大行晏駕皇太子未至敢入者斬國寳乃止爽恭之弟也辛酉太子即皇帝位大赦癸亥有司奏會稽王道子宜進位太傅揚州牧假黃􅃏詔内外衆事動靜咨之安帝㓜而不慧口不能言至於寒暑飢飽亦不能辨飲食寢興皆非已出母弟琅邪王德文性恭謹常侍左右爲之節適始得其宜􅀄王國寳黨附會稽王道子驕縱不灋屢爲御史中丞禇粲所紏國寳起齋侔清暑殿孝武帝甚惡之國寳懼遂更求媚於帝而踈道子帝復寵昵之道子大怒甞於内省面責國寳以劔擲之舊好盡矣及帝崩國寳復事道子與王緒共爲邪謟道子更惑之倚爲心腹遂參管朝權威震内外並爲時之所疾王㳟入赴山陵每正色直言道子深憚之㳟罷朝歎曰榱棟雖新便有􅁰離之歎緒􅀃國寳因恭入朝勸相王伏兵殺之國寳不許道子欲輯和内外乃深布腹心於恭冀除舊惡而恭每言及時政輙厲聲色道子知恭不可和恊遂有相圖之志或勸恭因入朝以兵誅國寳恭以豫州刺史􅁃楷士馬甚盛黨於國寳憚之不敢發王珣謂恭曰國寳雖終爲禍亂要之罪逆未彰今遽先事而發必大失朝野之望况擁彊兵竊發於京輦誰謂非逆國寳若遂不改惡布天下然後順衆心以除之亦無憂不濟也恭乃止旣而謂珣曰比來視君一似胡廣珣曰王陵廷争陳平慎黙但問歳晏何如耳冬十月甲申葬孝武帝于隆平陵王恭還鎭將行謂道子曰主上諒闇冢宰之任伊周所難願大王親萬幾納直言放鄭聲逺佞人國寳等愈懼魏王珪使冠軍將軍代人于栗磾寜朔將軍公孫蘭帥步􅀐二萬潜自晉陽開韓信故道己酉珪自井陘趨中山李先降魏珪以爲征東左長史西秦涼州牧軻彈與秦州牧益州不平軻彈犇凉魏王珪進攻常山拔之獲太守茍延自常山以東守宰或走或降諸郡縣皆附於魏惟中山鄴信都三城爲燕守十一月珪命東平公儀將五萬􅀐攻鄴冠軍將軍王建左將軍李栗攻信都戊午珪進軍中山己未攻之燕高陽王隆守南郭帥衆力戰自旦至晡殺傷數千人魏兵乃退珪謂諸將曰中山城固寳必不肯出戰急攻則傷士乆圍則費粮不如先取鄴信都然後圖之丁卯珪引兵而南章武王寅自龍城還聞有魏冦馳入薊與鎮北將軍陽城王蘭乘城固守蘭垂之從弟也魏别將石河頭攻之不克退屯漁陽珪軍于魯口博陵太守申永犇河南高陽太守崔宏犇海渚珪素聞宏名遣吏追求獲之以爲黄門侍郎與給事黄門侍郎張衮對掌機要創立制度博陵令屈遵降魏珪以爲中書令出納號令兼緫文誥燕范陽王德使南安王青等夜擊魏軍於鄴下破之魏軍退屯新城青等請追擊之别駕韓􅒲曰古人先計而後戰魏軍不可擊者四懸軍逺客利在野戰一也深入近畿頓兵死地二也前鋒既敗後陣方固三也彼衆我寡四也官軍不冝動者三自戰其地一也動而不勝衆心難固二也城隍未修敵來無僃三也今魏無資粮不如深壘固軍以老之德從之召青還青詳之兄也十二月魏遼西公賀頼盧帥􅀐二萬會東平公儀攻鄴頼盧訥之弟也魏别部大人没根有膽勇魏王珪惡之没根懼誅己丑將親兵數十人降燕燕主寳以爲鎮東大將軍封鴈門公没根求還襲魏寳難與重兵給百餘􅀐没根効其號令夜入魏營至中仗珪乃覺之狼狽驚走没根以所從人少不能壞其大衆多獲首虜而還楊盛遣使來請命詔拜盛鎮南將軍仇池公盛表苻宣爲平北將軍是歳越質詰歸帥户二萬叛西秦降于秦秦人處之成紀拜鎮西將軍平襄公秦隴西王碩徳攻姜乳於上邽乳帥衆降秦以碩德爲秦州牧鎮上邽徴乳爲尚書彊熈權千成帥衆三萬共圍上邽碩徳擊破之熈犇仇池遂來犇碩德西擊千成於畧陽千成降西燕旣亡其所署河東太守柳恭等各擁兵自守秦主興遣晉王緒攻之㳟等臨河拒守緒不得濟􅀄永嘉之亂汾隂薛氏聚其族黨阻河自固不仕劉石及苻氏興乃以禮聘薛彊拜鎮東將軍彊引秦兵自龍門濟遂入蒲阪恭等皆降興以緒爲并兾二州牧鎮蒲阪資治通鑑卷第一百八
