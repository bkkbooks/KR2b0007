seq: 61
front:
  text: 馬騰私有求於李傕不獲而怒欲舉兵相攻帝遣使者和解之不從韓遂率衆來和騰傕既而復與騰合諫議大夫种邵侍中馬宇左中郎將劉範謀使騰襲長安已爲内應以誅傕等壬申騰遂勒兵屯長平觀邵等謀泄出犇槐里傕使樊稠郭汜及兄子利擊之騰遂敗走還凉州又攻槐里邵等皆死庚申詔赦騰等夏四月以騰爲安狄將軍遂爲安降將軍
  hash: sha256:46f75edbad05b3584a32ebcc11f660e9bb9d1b3b4d8a326e64ed7ab50523175d
body:
  text: 曹操使司馬荀彧壽張令程昱守鄄城復往攻陶謙遂略地至琅邪東海所過殘滅還擊破劉備於郯東謙恐欲走歸丹陽㑹陳留太守張邈叛操迎吕布操乃引軍還初張邈少時好游俠袁紹曹操皆與之善及紹爲盟主有驕色邈正議責紹紹怒使操殺之操不聽曰孟卓親友也是非當容之今天下未定奈何自相危也操之前攻陶謙志在必死敕家曰我若不還往依孟卓後還見邈垂泣相對陳留高柔謂鄉人曰曹將軍雖據兖州本有四方之圖未得安坐守也而張府君恃陳留之資將乘閒為變欲與諸君避之何如衆人皆以曹張相親柔又年少不然其言柔從兄幹自河北呼柔柔舉宗從之吕布之捨袁紹從張陽也過邈臨别把手共誓紹聞之大恨邈畏操終為紹殺己也心不自安前九江太守陳留邊讓嘗譏議操操聞而殺之并其妻子讓素有才名由是兖州士大夫皆恐懼陳宫性剛直壯烈内亦自疑乃與從事中郎許汜王楷及邈弟超共謀叛操宫説邈曰今天下分崩雄傑並起君以千里之衆當四戰之地撫劒顧眄亦足以為人豪而反受制於人不亦鄙乎今州軍東征其處空虛吕布壯士善戰無前若權迎之共牧兖州觀天下形埶俟時事之變此亦縱横之一時也邈從之時操使宫將兵留屯東郡遂以其衆濳迎布為兖州牧布至邈乃使其黨劉翊告荀彧曰吕將軍來助曹使君擊陶謙宜亟供其軍食衆疑惑彧知邈為亂即勒兵設備急召東郡太守夏侯惇於濮陽惇來布遂據濮陽時操悉軍攻陶謙留守兵少而督將大吏多與邈宫通謀惇至其夜誅謀叛者數十人衆乃定豫州刺史郭貢率衆數萬來至城下或言與吕布同謀衆甚懼貢求見荀彧彧將往惇等曰君一州鎮也往必危不可彧曰貢與邈等分非素結也今來速計必未定及其未定説之縱不為用可使中立若先疑之彼將怒而成計貢見彧無懼意謂鄄城未易攻遂引兵去是時兖州郡縣皆應布唯鄄城范東阿不動布軍降者言陳宫欲自將兵取東阿又使汎嶷取范吏民皆恐程昱夲東阿人彧謂昱曰今舉州皆叛唯有此三城宫等以重兵臨之非有以深結其心三城必動君民之望也宜往撫之昱乃歸過范説其令靳允曰聞吕布執君母弟妻子孝子誠不可為心今天下大亂英雄並起必有命世能息天下之亂者此智者所宜詳擇也得主者昌失主者亡陳宫叛迎吕布而百城皆應似能有為然以君觀之布何如人哉夫布麤中少親剛而無禮匹夫之雄耳宫等以埶假合不能相君也兵雖衆終必無成曹使君智略不世出殆天所授君必固范我守東阿則田單之功可立也孰與違忠從惡而母子俱亡乎唯君詳慮之允流涕曰不敢有貳心時汎嶷已在縣允乃見嶷伏兵刺殺之歸勒兵自守徐衆評曰允於曹公未成君臣母至親也於義應去衞公子開方仕齊積年不返管仲以為不懷其親安能愛君是以求忠臣必於孝子之門允宜先救至親徐庶母為曹公所得劉備遣庶歸北欲為天下者恕人子之情也曹公亦宜遣允昱又遣别騎絶倉亭津陳宫至不得渡昱至東阿東阿令潁川􅀥祇已率厲吏民拒城堅守卒完三城以待操操還執昱手曰微子之力吾無所歸矣表昱爲東平相屯范吕布攻鄄城不能下西屯濮陽曹操曰布一旦得一州不能據東平斷亢父泰山之道乘險要我而乃屯濮陽吾知其無能爲也乃進攻之五月以揚武將軍郭汜為後將軍安集將軍樊稠爲右將軍並開府如三公合為六府皆參選舉李傕等各欲用其所舉若一違之便忿憤喜怒主者患之乃以次第用其所舉先從傕起汜次之稠次之三公所舉終不見用河西四郡以去凉州治遠隔以河冦上書求别置州六月丙子詔以陳留邯鄲商為雍州刺史典治之丁丑京師地震戊寅又震乙酉晦日有食之秋七月壬子太尉朱儁免戊午以太常楊彪為太尉録尚書事甲子以鎮南將軍楊定為安西將軍開府如三公自四月不雨至于是月糓一斛直錢五十萬長安中人相食帝令侍御史侯汶出太倉米豆為貧人作糜餓死者如故帝疑禀賦不實取米豆各五升於御前作糜得二盆乃杖汶五十於是悉得全濟八月馮翊羌冦屬縣郭汜樊稠等率衆破之吕布有别屯在濮陽西曹操夜襲破之未及還㑹布至身自摶戰自旦至日昳數十合相持甚急操募人陷陳司馬陳留典韋將應募者進當之布弓弩亂發矢至如雨韋不視謂等人曰虜來十歩乃白之等人曰十歩矣又曰五歩乃白等人懼疾言虜至矣韋持㦸大呼而起所抵無不應手倒者布衆退㑹日暮操乃得引去拜韋都尉令常將親兵數百人繞大帳左右濮陽大姓田氏為反閒操得入城燒其東門示無反意及操軍敗布騎得操而不識問曰曹操何在操曰乗黄馬走者是也布騎乃釋操而追黄馬者操突火而出至營自力勞軍令軍中促為攻具進復攻之與布相守百餘日蝗蟲起百姓大餓布糧食亦盡各引去九月操還鄄城布到乘氏為其縣人李進所破東屯山陽冬十月操至東阿袁紹使人説操欲使操遣家居鄴操新失兖州軍食盡將許之程昱曰意者將軍殆臨事而懼不然何慮之不深也夫袁紹有并天下之心而智不能濟也將軍自度能為之下乎將軍以龍虎之威可為之韓彭邪今兖州雖殘尚有三城能戰之士不下萬人以將軍之神武與文若昱等收而用之覇王之業可成也願將軍更慮之操乃止十二月司徒淳于嘉罷以衛尉趙温為司徒錄尚書事馬騰之攻李傕也劉焉二子範誕皆死議郎河南龎羲素與焉善乃募將焉諸孫入蜀㑹天火燒城焉徙治成都疽發背而卒州大吏趙韙等貪焉子璋温仁共上璋為益州刺史詔拜潁川扈瑁為刺史璋將沈彌婁發甘寧反擊璋不勝走入荆州詔乃以璋為益州牧璋以韙為征東中郎將率衆擊劉表屯朐䏰徐州牧陶謙疾篤謂别駕東海麋笁曰非劉備不能安此州也謙卒笁率州人迎備備未敢當曰袁公路近在壽春君可以州與之典農校尉下邳陳登曰公路驕豪非治亂之主今欲為使君合歩騎十萬上可以匡主濟民下可以割地守境若使君不見聽許登亦未敢聽使君也北海相孔融謂備曰袁公路豈憂國忘家者邪冢中枯骨何足介意今日之事百姓與能天與不取悔不可追備遂領徐州初太傅馬日磾與趙岐俱奉使至壽春岐守志不橈袁術憚之日磾頗有求於術術侵侮之從日磾借節視之因奪不還條軍中十餘人使促辟之日磾從術求去術留不遣又欲逼為軍師日磾病其失節嘔血而死初孫堅娶錢唐吳氏生四男䇿權翊匡及一女堅從軍於外留家壽春䇿年十餘嵗已交結知名舒人周瑜與䇿同年亦英逹夙成聞䇿聲問自舒來造焉便推結分好勸䇿徙居舒䇿從之瑜乃推道􅀯大宅與䇿升堂拜母有無通共及堅死䇿年十七還葬曲阿已乃渡江居江都結納豪俊有復讐之志丹陽太守㑹稽周昕與袁術相惡術上䇿舅吳景領丹陽太守攻昕奪其郡以䇿從兄賁為丹陽都尉䇿以母弟託廣陵張紘徑到壽春見袁術涕泣言曰亡父昔從長沙入討董卓與明使君㑹於南陽同盟結好不幸遇難勲業不終䇿感惟先人舊恩欲自憑結願明使君埀察其誠術甚竒之然未肯還其父兵謂䇿曰孤用貴舅為丹陽太守賢從伯陽為都尉彼精兵之地可還依召募䇿遂與汝南吕範及族人孫河迎其母詣曲阿依舅氏因緣召募得數百人而為涇縣大帥祖郎所襲幾至危殆於是復往見術術以堅餘兵千餘人還䇿表拜懷義校尉䇿騎士有罪逃入術營隱於内廐䇿指使人就斬之訖詣術謝術曰兵人好叛當共疾之何為謝也由是軍中益畏憚之術初許以䇿為九江太守己而更用丹陽陳紀後術欲攻徐州從廬江太守陸康求米三萬斛康不與術大怒遣䇿攻康謂曰前錯用陳紀每恨本意不遂今若得康廬江眞卿有也䇿攻康拔之術復用其故吏劉勲為太守䇿益失望侍御史劉繇岱之弟也素有盛名詔書用為揚州刺史州舊治壽春術已據之繇欲南渡江吳景孫賁迎置曲阿及䇿攻廬江繇聞之以景賁本術所置懼為袁孫所并遂搆嫌隙迫逐景賁景賁退屯歴陽繇遣將樊能于糜屯横江張英屯當利口以拒之術乃自用故吏惠衢為揚州刺史以景爲督軍中郎將與賁共將兵擊英等二年春正月癸丑赦天下曹操敗吕布於定陶詔即拜袁紹爲右將軍董卓􅀄死三輔民尚數十萬戸李傕等放兵劫略加以饑饉二年閒民相食略盡李傕郭汜樊稠各相與矜功争權欲鬬者數矣賈詡每以大體責之雖内不能善外相含容樊稠之擊馬騰韓遂也李利戰不甚力稠叱之曰人欲截汝父頭何敢如此我不能斬卿邪及騰遂敗走稠追至陳倉遂語稠曰本所爭者非私怨王家事耳與足下州里人欲相與善語而别乃俱却騎前接馬交臂相加共語良久而别軍還李利告傕韓樊交馬語不知所道意愛甚宻傕亦以稠勇而得衆忌之稠欲將兵東出關從傕索益兵二月傕請稠㑹議便於坐殺稠由是諸將轉相疑貳傕數設酒請郭汜或留汜止宿汜妻恐汜愛傕婢妾思有以閒之㑹傕送饋妻以豉為藥擿以示汜曰一栖不兩雄我固疑將軍信李公也他日傕復請汜飲大醉汜疑其有毒絞糞汁飲之於是各治兵相攻矣帝使侍中尚書和傕汜傕汜不從汜謀迎帝幸其營夜有亡者告傕三月丙寅傕使兄子暹將數千兵圍宫以車三乘迎帝太尉楊彪曰自古帝王無在人家者諸君舉事奈何如是暹曰將軍計定矣於是羣臣歩從乘輿以出兵即入殿中掠宫人御物帝至傕營傕又徙御府金帛置其營遂放火燒宫殿官府居民悉盡帝復使公卿和傕汜汜留楊彪及司空張喜尚書王隆光祿勲劉淵衛尉士孫瑞太僕韓融廷尉宣璠大鴻臚榮郃大司農朱儁將作大匠梁邵屯騎校尉姜宣等於其營以為質朱儁憤懣發病死夏四月甲子立貴人琅邪伏氏為皇后以后父侍中完為執金吾郭汜饗公卿議攻李傕楊彪曰羣臣共鬬一人劫天子一人質公卿可行乎汜怒欲手刃之彪曰卿尚不奉國家吾豈求生邪中郎將楊密固諌汜乃止傕召羌胡數千人先以御物繒綵與之許以宫人婦女欲令攻郭汜汜陰與傕黨中郎將張苞等謀攻傕丙申汜將兵夜攻傕門矢及帝簾帷中又貫傕左耳苞等燒屋火不然楊奉於外拒汜汜兵退苞等因將所領兵歸汜是日傕復移乘輿幸北塢使校尉監塢門内外隔絶侍臣皆有饑色帝求米五斗牛骨五具以賜左右傕曰朝晡上飰何用米為乃以臭牛骨與之帝大怒欲詰責之侍中楊琦諌曰傕自知所犯悖逆欲轉車駕幸池陽黄白城臣願陛下忍之帝乃止司徒趙温與傕書曰公前屠陷王城殺戮大臣今争睚眥之隙以成千鈞之讎朝廷欲令和解詔命不行而復欲轉乘輿於黄白城此誠老夫所不解也於易一為過再為渉三而弗改滅其頂凶不如早共和解傕大怒欲殺温其弟應諌之數日乃止傕信巫覡厭勝之術常以三牲祠董卓於省門外毎對帝或言明陛下或言明帝為帝説郭汜無狀帝亦隨其意應答之傕喜自謂良得天子歡心也閏月己卯帝使謁者僕射皇甫酈和傕汜酈先詣汜汜從命又詣傕傕不肯曰郭多盜馬虜耳何敢欲與吾等邪必誅之君觀吾方略士衆足辦郭多否郭多又劫質公卿所為如是而君茍欲左右之邪酈曰近者董公之强將軍所知也吕布受恩而反圖之斯須之閒身首異處此有勇而無謀也今將軍身為上將荷國寵榮汜質公卿而將軍脅主誰輕重乎張濟與汜有謀楊奉白波賊帥耳猶知將軍所為非是將軍雖寵之猶不為用也傕呵之令出酈出詣省門白傕不肯奉詔辭語不順帝恐傕聞之亟令酈去傕遣虎賁王昌呼欲殺之昌知酈忠直縱令去還答傕言追之不及辛巳以車騎將軍李傕為大司馬在三公之右吕布將薛蘭李封屯鉅野曹操攻之布救蘭等不勝而走操遂斬蘭等操軍乘氏以陶謙已死欲遂取徐州還乃定布荀彧曰昔高祖保關中光武據河内皆深根固本以制天下進足以勝敵退足以堅守故雖有困敗而終濟大業將軍本以兖州首事平山東之難百姓無不歸心悦服且河濟天下之要地也今雖殘壞猶易以自保是亦將軍之關中河内也不可以不先定今已破李封薛蘭若分兵東擊陳宫宫必不敢西顧以其閒勒兵收熟麥約食畜榖一舉而布可破也破布然後南結揚州共討袁術以臨淮泗若舎布而東多留兵則不足用少留兵則民皆保城不得樵采布乘虛冦暴民心益危唯鄄城范衛可全其餘非已之有是無兖州也若徐州不定將軍當安所歸乎且陶謙雖死徐州未易亡也彼懲徃年之敗將懼而結親相為表裏今東方皆已收麥必堅壁清野以待將軍攻之不㧞略之無獲不出十日則十萬之衆未戰而自困耳前討徐州威罰實行其子弟念父兄之恥必人自為守無降心就能破之尚不可有也夫事固有棄此取彼者以大易小可也以安易危可也權一時之埶不患本之不固可也今三者莫利願將軍熟慮之操乃止布復從東緡與陳宫將萬餘人來戰操兵皆出收麥在者不能千人屯營不固屯西有大隄其南樹木幽深操隱兵隄裏出半兵隄外布益進乃令輕兵挑戰既合伏兵乃悉乘隄歩騎並進大破之追至其營而還布夜走操復攻㧞定陶分兵平諸縣布東犇劉備張邈從布使其弟超將家屬保雍丘布初見備甚尊敬之謂備曰我與卿同邊地人也布見關東起兵欲誅董卓布殺卓東出關東諸將無安布者皆欲殺布耳請備於帳中坐婦牀上令婦向拜酌酒飲食名備為弟備見布語言無常外然之而内不悦李傕郭汜相攻連月死者以萬數六月傕將楊奉謀殺傕事泄遂將兵叛傕傕衆稍衰庚午鎮東將軍張濟自陜至欲和傕汜遷乘輿權幸􅀪農帝亦思舊京遣使宣諭十反汜傕許和欲質其愛子傕妻愛其男和計未定而羌胡數來闚省門曰天子在此中耶李將軍許我宫人今皆何在帝患之使侍中劉艾謂宣義將軍賈詡曰卿前奉職公忠故仍升榮寵今羌胡滿路宜思方略詡乃召羌胡大帥飲食之許以封賞羌胡皆引去傕由此單弱於是復有言和解之計者傕乃從之各以女為質秋七月甲子車駕出宣平門當度橋汜兵數百人遮橋曰此天子非也車不得前傕兵數百人皆持大㦸在乘輿車前兵欲交侍中劉艾大呼曰是天子也使侍中楊􅄾高舉車帷帝曰諸兵何敢迫近至尊耶汜兵乃却既度橋士衆皆稱萬歳夜到霸陵從者皆饑張濟賦給各有差傕出屯池陽丙寅以張濟為票騎將軍開府如三公郭汜為車騎將軍楊定為後將軍楊奉為興義將軍皆封列侯又以故牛輔部曲董承為安集將軍郭汜欲令車駕幸高陵公卿及濟以為宜幸􅀪農大㑹議之不決帝遣使諭汜曰􅀪農近郊廟勿有疑也汜不從帝遂終日不食汜聞之曰可且幸近縣八月甲辰車駕幸新豐丙子郭汜復謀脅帝還都郿侍中种輯知之密告楊定董承楊奉令㑹新豐郭汜自知謀泄乃棄軍入南山曹操圍雍丘張邈詣袁術求救未至為其下所殺冬十月以曹操為兖州牧戊戌郭汜黨夏育高碩等謀脅乘輿西行侍中劉艾見火起不止請帝出幸一營以避火楊定董承將兵迎天子幸楊奉營夏育等勒兵欲止乘輿楊定楊奉力戰破之乃得出壬寅行幸華陰寧輯將軍叚煨具服御及公卿已下資儲欲上幸其營煨與楊定有隙定黨种輯左靈言煨欲反太尉楊彪司徒趙温侍中劉艾尚書梁紹皆曰叚煨不反臣等敢以死保董承楊定脅􅀪農督郵令言郭汜來在煨營帝疑之乃露次於道南丁未楊奉董承楊定將攻煨使种輯左靈請帝為詔帝曰煨罪未著奉等攻之而欲令朕有詔耶輯固請至夜半猶弗聽奉等乃輙攻煨營十餘日不下煨供給御膳稟贍百官無有二意詔使侍中尚書告喻定等令與煨和解定等奉詔還營李傕郭汜悔令車駕東聞定攻煨相招共救之因欲劫帝而西楊定聞傕汜至欲還藍田為汜所遮單騎亡走荆州張濟與楊奉董承不相平乃復與傕汜合十二月帝幸􅀪農張濟李傕郭汜共追乘輿大戰於􅀪農東澗承奉軍敗百官士卒死者不可勝數弃御物符䇿典籍畧無所遺射聲校尉沮儁被創墜馬傕謂左右曰尚可活否儁罵之曰汝等凶逆逼劫天子使公卿被害宫人流離亂臣賊子未有如此也傕乃殺之壬申帝露次曹陽承奉乃譎傕等與連和而密遣閒使至河東招故白波帥李樂韓暹胡才及南匈奴右賢王去卑並率其衆數千騎來與承奉共擊傕等大破之斬首數千級於是董承等以新破傕等可復東引庚申車駕發東董承李樂衛乘輿胡才楊奉韓暹匈奴右賢王於後爲拒傕等復來戰奉等大敗死者甚於東澗光禄勲鄧淵廷尉宣璠少府田芬大司農張義皆死司徒趙温太常王絳衛尉周忠司􅀠校尉管郃為傕所遮欲殺之賈詡曰此皆大臣卿奈何害之乃止李樂曰事急矣陛下宜御馬上曰不可舎百官而去此何辜哉兵相連綴四十里方得至陜乃結營自守時殘破之餘虎賁羽林不滿百人傕汜兵繞營叫呼吏士失色各有分散之意李樂懼欲令車駕御船過砥柱出孟津楊彪以為河道險難非萬乘所宜乘乃使李樂夜渡濳具船舉火為應上與公卿歩出營皇后兄伏德扶后一手挾絹十匹董承使符節令孫徽從人閒斫之殺旁侍者血濺后衣河岸高十餘丈不得下乃以絹為輦使人居前負帝餘皆匍匐而下或從上自投冠幘皆壞既至河邊士卒争赴舟董承李樂以戈擊之手指於舟中可掬帝乃御船同濟者皇后及楊彪以下纔數十人其宫女及吏民不得渡者皆為兵所掠奪衣服俱盡髪亦被截凍死者不可勝計衛尉士孫瑞為傕所殺傕見河北有火遣騎候之適見上渡河呼曰汝等將天子去邪董承懼射之以被為幔旣到大陽幸李樂營河内太守張楊使數千人負米來貢餉乙亥帝御牛車幸安邑河東太守王邑奉獻綿帛悉賦公卿以下封邑為列候拜胡才為征東將軍張楊為安國將軍皆假節開府其壘壁羣帥競求拜職刻印不給至乃以錐畫之乘輿居棘籬中門戶無關閉天子與羣臣㑹兵士伏籬上觀互相鎮壓以為笑帝又遣太僕韓融至􅀪農與傕汜等連和傕乃放遣公卿百官頗歸所掠宫人及乘輿器服已而糧榖盡宫人皆食菜果乙卯張楊自野王來朝謀以乘輿還雒陽諸將不聽楊復還野王是時長安城空四十餘日强者四散羸者相食二三年閒關中無復人跡沮授説袁紹曰將軍累葉台輔世濟忠義今朝廷播越宗廟殘毁觀諸州郡雖外託義兵内實相圖未有憂存社稷䘏民之意今州域粗定兵強士附西迎大駕即宫鄴都挾天子而令諸侯畜士馬以討不庭誰能禦之潁川郭圖淳于瓊曰漢室陵遲為日久矣今欲興之不亦難乎且英雄並起各據州郡連徒聚衆動有萬計所謂秦失其鹿先得者王今迎天子自近動輒表聞從之則權輕違之則拒命非計之善者也授曰今迎朝廷於義為得於時為宜若不早定必有先之者矣紹不從初丹陽朱治嘗為孫堅校尉見袁術政德不立勸孫䇿歸取江東時吳景攻樊能張英等歲餘不克䇿説術曰家有舊恩在東願助舅討横江横江㧞因投本土召募可得三萬兵以佐明使君定天下術知其恨而以劉繇據曲阿王朗在㑹稽謂策未必能定乃許之表策為折衝校尉將兵千餘人騎數十匹行收兵比至歴陽衆五六千時周瑜從父尚為丹陽太守瑜將兵迎之仍助以資糧䇿大喜曰吾得卿諧也進攻横江當利皆㧞之樊能張英敗走䇿渡江轉鬭所向皆破莫敢當其鋒者百姓聞孫郎至皆失䰟魄長吏委城郭竄伏山草及䇿至軍士奉令不敢虜略雞犬菜茹一無所犯民乃大悦競以牛酒勞軍䇿為人美姿顔能笑語性闊逹聽受善於用人是以士民見者莫不盡心樂為致死䇿攻劉繇牛渚營盡得邸閣糧穀戰具時彭城相薛禮下邳相丹陽笮融依繇為盟主禮據秣陵城融屯縣南䇿皆擊破之又破繇别將於梅陵轉攻湖孰江乘皆下之進擊繇於曲阿繇同郡太史慈時自東萊來省繇會䇿至或勸繇可以慈為大將繇曰我若用子義許子將不當笑我邪但使慈偵視輕重時獨與一􅀐卒遇策於神亭䇿從騎十三皆堅舊將遼西韓當零陵黄蓋軰也慈便前鬭正與䇿對䇿刺慈馬而擥得慈項上手㦸慈亦得策兠鍪㑹兩家兵騎並各來赴於是解散繇與策戰兵敗走丹徒策入曲阿勞賜將士發恩布令告諭諸縣其劉繇笮融等故鄉部曲來降首者一無所問樂從軍者一身行復除門戸不樂者不強旬日之閒四面雲集得見兵二萬餘人馬千餘匹威震江東丙辰袁術表策行殄冦将軍策將吕範言於策曰今將軍事業日大士衆日盛而綱紀猶有不整者範願蹔領都督佐將軍部分之策曰子衡旣士大夫加手下已有大衆立功於外豈宜復屈小職知軍中細事乎範曰不然今捨本土而託將軍者非為妻子也欲濟世務也譬猶同舟渉海一事不牢卽俱受其敗此亦範計非但將軍也策笑無以荅範出便釋褠著袴褶執鞭詣閤下啟事自稱領都督䇿乃授傳委以衆事由是軍中肅睦威禁大行䇿以張紘為正議校尉彭城張昭為長史常令一人居守一人從征討及廣陵秦松陳端等亦參與謀謨策待昭以師友之禮文武之事一以委昭昭每得北方士大夫書䟽專歸美於昭䇿聞之歡笑曰昔管子相齊一則仲父二則仲父而桓公為霸者宗今子布賢我能用之其功名獨不在我乎袁術以從弟㣧為丹陽太守周尚周瑜皆還壽春劉繇自丹徒將犇㑹稽許劭曰㑹稽富實策之所貪且窮在海隅不可往也不如豫章北連豫壤西接荆州若収合吏民遣使貢獻與曹兖州相聞雖有袁公路隔在其閒其人豺狼不能久也足下受主命孟德景升必相救濟繇從之初陶謙以笮融為下邳相使督廣陵下邳彭城糧運融遂斷三郡委輸以自入大起浮屠祠課人讀佛經招致旁郡好佛者至五千餘戸每浴佛輒多設飲食布席於路經數十里費以巨億計及曹操擊破陶謙徐土不安融乃將男女萬口走廣陵廣陵太守趙昱待以賔禮先是彭城相薛禮為陶謙所逼屯秣陵融利廣陵資貨遂乘酒酣殺昱放兵大掠因過江依禮既而復殺之劉繇使豫章太守朱皓攻袁術所用太守諸葛􅀇􅀇退保西城及繇泝江西上駐於彭澤使融助皓攻􅀇許劭謂繇曰笮融出軍不顧名義者也朱文明喜推誠以信人宜使密防之融到果詐殺皓代領郡事繇進討融融敗走入山為民所殺詔以前太􅀓掾華歆為豫章太守丹陽都尉朱治逐吳郡太守許貢而據其郡貢南依山賊嚴白虎張超在雍丘曹操圍之急超曰惟臧洪當來救吾衆曰袁曹方睦洪為袁所表用必不敗好以招禍超曰子源天下義士終不背本但恐見制強力不相及耳洪時為東郡太守徒跣號泣從紹請兵將赴其難紹不與請自率所領以行亦不許雍丘遂潰張超自殺操夷其三族洪由是怨紹絶不與通紹興兵圍之歴年不下紹令洪邑人陳琳以書喻之洪復書曰僕小人也本乏志用中因行役䝉主人傾蓋恩深分厚遂竊大州寧樂今日自還接刃乎當受任之初自謂究竟大事共尊王室豈悟本州被侵郡將遘戹請師見拒辭行被拘使洪故君遂至淪滅區區微節無所獲申豈得復全交友之道重虧忠孝之名乎斯所以忍悲揮戈収淚告絶行矣孔璋足下徼利於境外臧洪投命於君親吾子託身於盟主臧洪䇿名於長安子謂余身死而名滅僕亦笑子生而無聞焉紹見洪書知無降意増兵急攻城中糧穀已盡外無彊救洪自度必不免呼將吏士民謂曰袁氏無道所圖不軌且不救洪郡將洪於大義不得不死念諸君無事空與此禍可先城未敗將妻子出皆垂泣曰明府與袁氏本無怨隙今為本朝郡將之故自致殘困吏民何忍當舎明府去也初尚掘䑕煑䈥角後無可復食者主簿啟内厨米三升請稍以為饘粥洪歎曰何能獨甘此邪使作薄糜徧班士衆又殺其愛妾以食將士將士咸流涕無能仰視者男女十八千人相枕而死莫有離叛者城陷生執洪紹大㑹諸將見洪謂曰臧洪何相負若此今日服未洪據地瞋目曰諸袁事漢四世五公可謂受恩今王室衰弱無扶翼之意欲因際㑹希冀非望多殺忠良以立姦威洪親見呼張陳留為兄則洪府君亦宜為弟同共戮力為國除害奈何擁衆觀人屠滅惜洪力劣不能推刃為天下報仇何謂服乎紹本愛洪意欲令屈服原之見洪辭切知終不為己用乃殺之洪邑人陳容少親慕洪時在紹坐起謂紹曰將軍舉大事欲為天下除暴而先誅忠義豈合天意臧洪發舉為郡將奈何殺之紹慙使人牽出謂曰汝非臧洪儔空復爾為容顧曰仁義豈有常蹈之則君子背之則小人今日寧與臧洪同日而死不與將軍同日而生也遂復見殺在坐無不歎息竊相謂曰如何一日殺二烈士公孫瓚既殺劉虞盡有幽州之地志氣益盛恃其才力不恤百姓記過忘善睚眦必報衣冠善士名在其右者必以灋害之有材秀者必抑困使在窮苦之地或問其故瓚曰衣冠皆自以職分當貴不謝人惠故所寵愛類多商販庸兒與為兄弟或結婚姻所在侵暴百姓怨之劉虞從事漁陽鮮于輔等合率州兵欲共報仇以燕國閻柔素有恩信推為烏桓司馬柔招誘胡漢數萬人與瓚所置漁陽太守鄒丹戰于潞北斬丹等四千餘級烏桓峭王亦率種人及鮮卑七千餘騎隨輔南迎虞子和與袁紹將麴義合兵十萬共攻瓚破瓚於鮑丘斬首二萬餘級於是代郡廣陽上谷右北平各殺瓚所置長吏復與鮮于輔劉和兵合瓚軍屢敗先是有童謡曰燕南垂趙北際中央不合大如礪唯有此中可避世瓚自謂易地當之遂徙鎮易為圍塹十重於塹裏築京皆高五六丈為樓其上中塹為京特高十丈自居焉以鐵為門斥去左右男人七歳以上不得入門專與姬妾居其文簿書記皆汲而上之令婦人習為大聲使聞數百歩以傳宣教令踈逺賔客無所親信謀臣猛將稍稍乖散自此之後希復攻戰或問其故瓚曰我昔驅畔胡於塞表埽黄巾於孟津當此之時謂天下指麾可定至於今日兵革方始觀此非我所决不如休兵力耕以救凶年兵灋百樓不攻今吾諸營樓樐數十重積榖三百萬斛食盡此榖足以待天下之事矣南單于於扶羅死弟呼厨泉立居于平陽資治通鑑卷第六十一
