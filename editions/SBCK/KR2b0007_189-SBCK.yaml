front:
  text: 資治通鑑巻第一百八十九
  hash: sha256:387918f6bafce27b23f00e738e06c92d94660db173663c597464b0c0603cae0d
body:
  text: 臣司馬光奉勑編集唐紀五盡十二月不滿一年起重光大荒落三月高祖神堯大聖光孝皇帝中之中武徳四年三月庚申以靺鞨渠帥突地稽爲燕州揔管太子建成獲稽胡千餘人釋其酋帥數十人授以官爵使還招其餘黨劉仚成亦降建成詐稱增置州縣築城邑命降胡年二十以上皆集以兵圍而殺之死者六千餘人仚成覺變亡奔梁師都行軍揔管劉世讓攻竇建徳黄州㧞之洺州嚴僃世讓不得進會突厥將入宼上召世讓還竇建德所署普樂令平恩程名振來降上遥除名振永寧令使將兵徇河北名振夜襲鄴俘其男女千餘人去鄴八十里閲婦人乳有湩者九十餘人悉縱遣之鄴人感其仁為之飯僧突厥頡利可汗承父兄之資士馬雄盛有憑凌中國之志妻隋義成公主公主從弟善經避亂在突厥與王世充使者王文素共説頡利曰昔啓民為兄弟所逼脱身奔隋賴文皇帝之力有此土宇子孫享之今唐天子非文皇帝子孫可汗宜奉揚政道以伐之以報文皇帝之徳頡利然之上以中國未寧待突厥甚厚而頡利求請無厭言辭驕慢甲戌突厥冦汾隂唐兵圍洛陽掘塹築壘髙守之城中乏食絹一匹直粟三升布一匹直鹽一升服飾珍玩賤如土芥民食草根木葉皆盡相與澄取浮泥投米屑作餅食之皆病身腫脚弱死者相枕倚於道皇泰主之遷民入宫城也凡三萬家至是無三千家雖貴為公卿糠覈不充尚書郎以下躬自負戴往往餒死竇建徳使其將范願守曹州悉發孟海公徐圓朗之衆西救洛陽至滑州王世充行臺僕射韓洪開門納之己卯軍于酸棗壬午突厥冦石州刺史王集擊却之竇建徳䧟管州殺刺史郭士安又䧟滎陽陽翟等縣水陸並進汎舟運糧泝河西上王世充之弟徐州行臺世辯遣其將郭士衡將兵數千㑹之合十餘萬號三十萬軍於成臯之東原築宫板渚遣使與王世充相聞先是建徳遺秦王世民書請退軍潼闗返鄭侵地復修前好世民集將佐議之皆請避其鋒郭孝恪曰世充窮蹙垂將面縳建徳逺來助之此天意欲兩亡之也宜據武牢之險以拒之伺間而動破之必矣記室薛收曰世充保據東都府庫充實所將之兵皆江淮精鋭即日之患但乏糧食耳以是之故為我所持求戰不得守則難久建徳親帥大衆逺來赴援亦當極其精鋭致死於我若縱之至此兩冦合從轉河北之粟以饋洛陽則戰爭方始偃兵無日混一之期殊未有涯也今宜分兵守洛陽深溝高壘世充出兵慎勿與戰大王親帥驍鋭先據成臯厲兵訓士以待其至以逸待勞决可克也建徳既破世充自下不過二旬兩主就縳矣世民善之收道衡之子也蕭瑀屈突通封徳彞皆曰吾兵疲老世充慿守堅城未易猝抜建徳席勝而來鋒鋭氣盛吾腹背受敵非完䇿也不若退保新安以承其􅁦世民曰世充兵摧食盡上下離心不煩力攻可以坐克建徳新破海公將驕卒惰吾據武牢扼其咽㗋彼若冒險爭鋒吾取之甚易若狐疑不戰旬月之間世充自潰城破兵彊氣勢自倍一舉兩克在此行矣若不速進賊入武牢諸城新附必不能守兩賊併力其勢必彊何􅁦之承吾計决矣通等又請解圍據險以觀其變世民不許中分麾下使通等副齊王元吉圍守東都世民將驍勇三千五百人東趣武牢時正晝出兵歴北邙抵河陽趨鞏而去王世充登城望見莫之測也竟不敢出癸未世民入武牢甲申將驍騎五百出武牢東二十餘里覘建徳之營縁道分留從騎使李世勣程知節秦叔寶將之伏於道旁纔餘四騎與之偕進世民謂尉遟敬徳曰吾執弓矢公執槊相隨雖百萬衆若我何又曰賊見我而還上䇿也去建徳營三里所建徳遊兵遇之以為斥􅀱也世民大呼曰我秦王也引弓射之斃其一將建徳軍中大驚出五六千騎逐之從者咸失色世民曰汝弟前行吾自與敬徳為殿於是按轡徐行追騎將至則引弓射之輒斃一人追者懼而止止而復來如是再三每來必有斃者世民前後射殺數人敬徳殺十許人追者不敢復逼世民逡巡稍却以誘之入於伏内世勣等奮擊大破之斬首三百餘級獲其驍將殷秋石瓚以歸乃為書報建徳論以趙魏之地乆為我有為足下所侵奪但以淮安見禮公主得歸故相與坦懷釋怨世充頃與足下修好已嘗反覆今亡在朝夕更飾辭相誘足下乃以三軍之衆仰哺他人千金之資坐供外費良非上䇿今前茅相遇彼遽崩摧郊勞未通能無懷愧故抑止鋒鋭冀聞擇善若不獲命恐雖悔難追立秦王世民之子泰為衛王夏四月己丑豐州揔管張長遜入朝時言事者多云長遜乆居豐州爲突厥所厚非國家之利長遜聞之請入朝上許之㑹太子建成北伐稽胡長遜帥所部㑹之因入朝拜右武侯將軍益州行臺左僕射竇軌帥巴蜀兵來㑹秦王撃王世充以長遜檢校益州行臺右僕射己亥突厥頡利可汗冦鴈門李大恩擊走之壬寅王世充騎將楊公卿單雄信引兵出戰齊王元吉擊之不利行軍揔管盧君諤戰死太子還長安王世充平州刺史周仲隱以城來降戊申突厥冦并州初處羅可汗與劉武周相表裏冦并州上遣太常卿鄭元璹往諭以禍福處羅不從未幾處羅遇疾卒國人疑元璹毒之留不遣上又遣漢陽公瓌賂頡利可汗以金帛頡利欲令瓌拜瓌不從亦留之又留左驍衛大將軍長孫順徳上怒亦留其使者瓌孝恭之弟也甲寅封皇子元方為周王元禮為鄭王元嘉為宋王元則為荆王元茂為越王竇建徳迫於武牢不得進留屯累月戰數不利將士思歸丁巳秦王世民遣王君廓將輕騎千餘抄其糧運又破之獲其大將軍張青特淩敬言於建徳曰大王悉兵濟河攻取懷州河陽使重將守之更鳴鼓建旗踰太行入上黨徇汾晉趣蒲津如此有三利一則蹈無人之境取勝可以萬全二則拓地收衆形勢益彊三則闗中震駭鄭圍自解為今之䇿無以易此建徳將從之而王世充遣使告急相繼於道王琬長孫安世朝夕涕泣請救洛陽又隂以金玉啗建徳諸將以撓其謀諸將皆曰凌敬書生安知戰事其言豈可用也建徳乃謝敬曰今衆心甚鋭天贊我也因之决戰必將大㨗不得從公言敬固爭之建徳怒令扶出其妻曹氏謂建徳曰祭酒之言不可違也今大王自滏口乘唐國之虚連營漸進以取山北又因突厥西抄闗中唐必還師自救鄭圍何憂不解若頓兵於此老師費財欲求成功在於何日建徳曰此非女子所知吾來救鄭鄭今倒懸亡在朝夕吾乃捨之而去是畏敵而弃信也不可諜者告曰建徳伺唐軍芻盡牧馬於河北將襲武牢五月戊午秦王世民北濟河南臨廣武察敵形勢因留馬千餘匹牧於河渚以誘之夕還武牢己未建徳果悉衆而至自板渚出牛口置陳北距大河西薄汜水南屬鵲山亘二十里鼓行而進諸將皆懼世民將數騎升高丘而望之謂諸將曰賊起山東未嘗見大敵今度險而􅅝是無紀律逼城而陳有輕我心我按兵不出彼勇氣自衰陳乆卒饑勢將自退追而擊之無不克者與公等約甫過日中必破之矣建徳意輕唐軍遣三百騎渉汜水距唐營一里所止遣使與世民相聞曰請選銳士數百與之劇世民遣王君廓將長槊二百以應之相與交戰乍進乍退兩無勝負各引還王琬乘隋􅌆帝騘馬鎧仗甚鮮迥出陳前以誇衆世民曰彼所乘真良馬也尉遲敬徳請往取之世民止之曰豈可以一馬喪猛士敬徳不從與高甑生梁建方三騎直入其陳擒琬引其馬以歸衆無敢當者世民使召河北馬待其至乃出戰建徳列陳自辰至午士卒飢倦皆坐列又爭飲水逡巡欲退世民命宇文士及將三百騎經建徳陳西馳而南上戒之曰賊若不動爾宜引歸動則引兵東出士及至陳前陳果動世民曰可擊矣時河渚馬亦至乃命出戰世民帥輕騎先進大軍繼之東渉汜水直薄其陳建徳羣臣方朝謁唐騎猝來朝臣趨就建徳建徳召騎兵使拒唐兵騎兵阻朝臣不得過建徳揮朝臣令却進退之間唐兵已至建徳窘廹退依東陂竇抗引兵擊之戰小不利世民帥騎赴之所向皆靡淮陽王道􅀇挻身䧟陳直出其後復突陳而歸再入再出飛矢集其身如蝟毛勇氣不衰射人皆應􅁌而仆世民給以副馬使從己於是諸軍大戰塵埃漲天世民帥史大柰程知節秦叔寳宇文歆等巻斾而入出其陳後張唐旗幟建徳將士顧見之大潰追奔三十里斬首三千餘級建徳中槊竄匿於牛口渚車騎將軍白士讓楊武威逐之建徳墜馬士讓援槊欲刺之建徳曰勿殺我我夏王也能富貴汝武威下擒之載以從馬來見世民世民讓之曰我自討王世充何預汝事而來越境犯我兵鋒建徳曰今不自來恐煩逺取建徳將士皆潰去所俘獲五萬人世民即日散遣之使還郷里封徳彞入賀世民笑曰不用公言得有今日智者千慮不免一失乎徳彞甚慙建徳妻曹氏與左僕射齊善行將數百騎遁歸洺州甲子世充偃師鞏縣皆降乙丑以太子左庻子鄭善果為山東道撫慰大使世充將王徳仁弃故洛陽城而遁亞將趙季卿以城降秦王世民囚竇建徳王琬長孫安世郭士衡等至洛陽城下以示世充世充與建徳語而泣仍遣安世等入城言敗狀世充召諸將議突圍南走襄陽諸將皆曰吾所恃者夏王夏王今已為擒雖得出終必無成丙寅世充素服帥其太子羣臣二千餘人詣軍門降世民禮接之世充俯伏流汗世民曰卿常以童子見處今見童子何恭之甚邪世充頓首謝罪於是部分諸軍先入洛陽分守市肆禁止侵掠無敢犯者丁卯世民入宫城命記室房􅀇齡先入中書門下省收隋圖籍制詔已為世充所毁無所獲命蕭瑀竇軌等封庫收其金帛班賜將士收世充之黨罪尤大者叚達王隆崔洪丹薛徳音楊汪孟孝義單雄信楊公卿郭什柱郭士衡董叡張童兒王徳仁朱粲郭善才等十餘人斬於洛水之上初李世勣與單雄信友善誓同生死及洛陽平世勣言雄信驍徤絶倫請盡輸已之官爵以贖之世民不許世勣固請不能得涕泣而退雄信曰我固知汝不辦事世勣曰吾不惜餘生與兄俱死但既以此身許國事無兩遂且吾死之後誰復視兄之妻子乎乃割股肉以㗖雄信曰使此肉隨兄為土庻幾猶不負昔誓也士民疾朱粲殘忍競投瓦礫擊其尸須㬰如冢囚韋節楊續長孫安世等十餘人送長安士民無罪為世充所囚者皆釋之所殺者祭而誄之初秦王府屬杜如晦叔父淹事王世充淹素與如晦兄弟不恊譖如晦兄殺之又囚其弟楚客餓幾死楚客終無怨色及洛陽平淹當死楚客涕泣請如晦救之如晦不從楚客曰曩者叔已殺兄今兄又殺叔一門之内自相殘而盡豈不痛哉欲自剄如晦乃為之請於世民淹得免死秦王世民坐閶闔門蘇威請見稱老病不能拜世民遣人數之曰公隋室宰相危不能扶使君弒國亡見李密王世充皆拜伏舞蹈今既老病無勞相見及至長安又請見不許既老且貧無復官爵卒於家年八十二秦王世民觀隋宫殿歎曰逞侈心窮人欲無亡得乎命撤端門樓焚乾陽殿毁則天門及闕廢諸道場城中僧尼留有名徳者各三十人餘皆返初前真定令周法明法尚之弟也隋末結客襲據黄梅遣族子孝節攻蘄春兄子紹則攻安陸子紹徳攻沔陽皆拔之庚午以四郡來降壬申齊善行以洺相魏等州來降時建徳餘衆走至洺州欲立建徳養子為主徵兵以拒唐又欲剽掠民還向海隅為盜善行獨以為不可曰隋末䘮亂故吾屬相聚草野茍求生耳以夏王之英武平定河朔士馬精彊一朝為擒易如反掌豈非天命有所屬非人力所能爭邪今䘮敗如此守亦無成逃亦不免等為亡國豈可復遺毒於民不若委心請命於唐必欲得繒帛者當盡散府庫之物勿復殘民也於是運府庫之帛數十萬叚置萬春宫東街以散將卒凡三晝夜乃畢仍布兵守坊巷得物者即出無得更入人家士卒散盡然後與右僕射裴矩行臺曹旦帥其百官奉建徳妻曹氏及傳國八璽并破宇文化及所得珍寶請降于唐上以善行為秦王左二䕶軍仍厚賜之初竇建徳之誅宇文化及也隋南陽公主有子曰禪師建徳虎賁郎將於士澄問之曰化及大逆兄弟之子皆當從坐若不能捨禪師當相為留之公主泣曰虎賁既隋室貴臣兹事何湏見問建徳竟殺之公主尋請為尼及建徳敗公主將歸長安與宇文士及遇於洛陽士及請與相見公主不可士及立於户外請復為夫婦公主曰我與君仇家今所以不手刃君者但謀逆之日察君不預知耳訶令速去士及固請公主怒曰必欲就死可相見也士及知不可屈乃拜辭而去乙亥以周法明為黄州揔管戊寅王世充徐州行臺杞王世辯以徐宋等三十八州詣河南道安撫大使任瓌請降世充故地悉平竇建徳博州刺史馮士羡復推淮安王神通為慰撫山東使徇下三十餘州建徳之地悉平己卯代州揔管李大恩擊苑君璋破之突厥冦邊長平靖王叔良督五將擊之叔良中流矢師旋六月戊子卒於道戊戌孟海公餘黨蔣善合以鄆州孟噉鬼以曹州來降噉鬼海公之從兄也庚子營州人石世則執揔管晉文衍舉州叛奉靺鞨突地稽爲主黄州揔管周法明攻蕭銑安州拔之獲其揔管馬貴遷乙巳以右驍衛將軍盛彦師爲宋州揔管安撫河南乙卯海州賊帥臧君相以五州來降拜海州揔管秋七月庚申王世充行臺王弘烈王泰左僕射豆盧行褒右僕射蘇世長以襄州來降上與行褒世長皆有舊先是屢以書招之行襃輒殺使者既至長安上誅行襃而責世長世長曰隋失其鹿天下共逐之陛下既得之矣豈可復忿同獵之徒問爭肉之罪乎上笑而釋之以爲諌議大夫嘗從校獵高陵大獲禽獸上顧羣臣曰今日畋樂乎世長對曰陛下遊獵薄廢萬機不滿十旬未足爲樂上變色既而笑曰狂態復發邪對曰於臣則狂於陛下甚忠嘗侍宴披香殿酒酣謂上曰此殿􅌆帝之所爲邪上曰卿諫似直而實多詐豈不知此殿朕所爲而謂之煬帝乎對曰臣實不知但見其華侈如傾宫鹿臺非興王之所爲故也若陛下爲之誠非所宜臣昔侍陛下於武功見所居宅僅庇風雨當時亦以爲足今因隋之宫室已極侈矣而又増之將何以矯其失乎上深然之甲子秦王世民至長安世民被黄金甲齊王元吉李世勣等二十五將從其後鐵騎萬匹甲士三萬人前後部鼓吹俘王世充竇建徳及隋乘輿御物獻于太廟行飲至之禮以饗之乙丑高句麗王建武遣使入貢建武元之弟也上見王世充而數之世充曰臣罪固當誅然秦王許臣不死丙寅詔赦世充為庻人與兄弟子姪徙處蜀斬竇建徳於市丁卯以天下略定大赦百姓給復一年陝鼎函虢虞芮六州轉輸勞費幽州管内乆隔宼戎並給復二年律令格式且用開皇舊制赦令既下而王竇餘黨尚有逺徙者治書侍御史孫伏伽上言兵食可去信不可去陛下已赦而復徙之是自違本心使臣民何所慿依且世充尚䝉寛宥况於餘黨所宜縱釋上從之王世充以防夫未備置雍州廨舍獨孤機之子定州刺史修徳帥兄弟至其所矯稱敕呼鄭王世充與兄世惲趨出修徳等殺之詔免修徳官其餘兄弟子姪等於道亦以謀反誅隋末錢幣濫薄至裁皮糊紙為之民閒不勝其􅁦至是初行開元通寶錢徑八分重二銖四參積十錢重一兩輕重大小最為折􅂨逺近便之命給事中歐陽詢撰其文并書廻環可讀以屈突通為陜東道大行臺右僕射鎮洛陽以淮陽王道􅀇為洛州揔管李世勣父蓋竟無恙而還詔復其官爵竇􅁤還益州軌將兵征討或經旬月不解甲性嚴酷將佐有犯無貴賤立斬之鞭撻吏民常流血滿庭所部重足屏息癸酉置錢監於洛并幽益等諸州秦王世民齊王元吉賜三鑪裴寂賜一鑪聽鑄錢自餘敢盜鑄者身死家口配没河北既平上以陳君賔為洺州刺史將軍秦武通等將兵屯洺州欲使分鎮東方諸州又以鄭善果等為慰撫大使就洺州選補山東州縣官竇建徳之敗也其諸將多盗匿庫物及居閭里暴横為民患唐官吏以法繩之或加捶撻建徳故將皆驚懼不安高雅賢王小胡家在洺州欲竊其家以逃官吏捕之雅賢等亡命至貝州㑹上徴建徳故將范願董康買曹湛及雅賢等於是願等相謂曰王世充以洛陽降唐其將相大臣叚逹單雄信等皆夷滅吾屬至長安必不免矣吾屬自十年以來身經百戰當死乆矣今何惜餘生不以之立事且夏王得淮安王遇以客禮唐得夏王即殺之吾屬皆爲夏王所厚今不爲之報仇將無以見天下之士乃謀作亂卜之以劉氏爲主吉因相與之漳南見建徳故將劉雅以其謀告之雅曰天下適安定吾將老於耕桑不願復起兵衆怒且恐泄其謀遂殺之故漢東公劉黑闥時屏居漳南諸將往詣之告以其謀黒闥欣然從之黑闥方種蔬即殺耕牛與之共飲食定計聚衆得百人甲戌襲漳南縣據之是時諸道有事則置行臺尚書省無事則罷之朝廷聞黒闥作亂乃置山東道行臺於洺州魏冀定滄並置揔管府丁丑以淮安王神通爲山東道行臺右僕射辛巳褒州道安撫使郭行方攻蕭銑鄀州拔之孟海公與竇建徳同伏誅戴州刺史孟噉鬼不自安挾海公之子義以曹戴二州反以禹城令蔣善合為腹心善合與其左右同謀斬之八月丙戌朔日有食之丁亥命太子安撫北邊丁酉劉黑闥䧟鄃縣魏州刺史權威貝州刺史戴元祥與戰皆敗死黒闥悉收其餘衆及器械竇建徳舊黨稍稍出歸之衆至二千人為壇於漳南祭建徳告以舉兵之意自稱大將軍詔發闗中歩騎二千使將軍秦武通定州揔管藍田李􅀇通擊之又詔幽州揔管李藝引兵㑹擊黑闥癸卯突厥冦代州揔管李大恩遣行軍揔管王孝基拒之舉軍皆没甲辰進圍崞縣乙巳王孝基自突厥逃歸李大恩衆少據城自守突厥不敢逼月餘引去上以南方冦盗尚多丙午以左武侯將軍張鎮周為淮南道行軍揔管大將軍陳智略為嶺南道行軍揔管鎮撫之丁未劉黑闥䧟歴亭執屯衛將軍王行敏使之拜不可遂殺之初洛陽既平徐圓朗請降拜兖州揔管封魯郡公劉黒闥作亂隂與圓朗通謀上使葛公盛彦師安集河南行至任城辛亥圓朗執彦師舉兵反黒闥以圓朗為大行臺元帥兖鄆陳杞伊洛曹戴等八州豪右皆應之圎朗厚禮彦師使作書與其弟令舉虞城降彦師為書曰吾奉使無狀為賊所擒為臣不忠誓之以死汝善侍老母勿以吾爲念圓朗初色動而彦師自若圓朗乃笑曰盛將軍有壯節不可殺也待之如舊河南道安撫大使任瓌行至宋州屬圓朗反副使柳濬勸瓌退保汴州瓌笑曰柳公何怯也圓朗又攻䧟楚丘引兵將圍虞城瓌遣部將崔樞張公謹自鄢陵帥諸州豪右質子百餘人守虞城濬曰樞與公謹皆王世充將諸州質子父兄皆反恐必爲變瓌不應樞至虞城分質子使與土人合隊共守城賊稍近質子有叛者樞斬其隊帥於是諸隊帥皆懼各殺其質子樞不禁梟其首於門外遣使白瓌瓌陽怒曰吾所以使與質子俱者欲招其父兄耳何罪而殺之退謂濬曰吾固知崔樞能辦此也縣人旣殺質子與賊深仇吾何患乎賊攻虞城果不克而去初竇建徳以鄱陽崔元遜為深州刺史及劉黑闥反元遜與其黨數十人謀於野伏甲士於車中以禾覆其上詐爲農人直入聽事自禾中呼譟而出執刺史裴晞殺之傳首黑闥九月乙卯文登賊帥淳于難請降置登州以難為刺史突厥冦并州遣左屯衛大將軍竇琮等擊之戊午突厥冦原州遣行軍揔管尉遟敬徳等擊之辛酉徐圓朗自稱魯王隋末歙州賊帥汪華據黟歙等五州有衆一萬自稱吳王甲子遣使來降拜歙州揔管隋末弋陽盧祖尚紏合壯士以衛鄉里部分嚴整羣盜畏之及􅌆帝遇弑鄉人奉之為光州刺史時年十九奉表於皇泰主及王世充自立祖尚來降丙子以祖尚為光州揔管己卯詔括天下户口徐圓朗冦濟州治中吳伋論擊走之􅊨癸未詔以太常樂工皆前代因罪配没子孫相承多歷年所良可哀愍宜並蠲除為民且令執事若仕官入流勿更追集甲申靈州揔管楊師道擊突厥破之師道恭仁之弟也詔發巴蜀兵以趙郡王孝恭為荆湘道行軍揔管李靖攝行軍長史綂十二揔管自䕫州順流東下以廬江王瑗為荆郢道行軍元帥岀襄州道黔州刺史田世康出辰州道黄州揔管周法明出夏口道以擊蕭銑是月孝恭發䕫州時峽江方漲請將請俟水落進軍李靖曰兵貴神速今吾兵始集銑尚未知若乘江漲倐忽抵其城下掩其不備此必成擒不可失也孝恭從之淮安王神通將闗内兵至冀州與李藝兵合又發邢洺相魏恒趙等州兵合五萬餘人與劉黑闥戰於饒陽城南布陳十餘里黒闥衆少依隄單行而陳以當之㑹風雪神通乘風擊之既而風返神通大敗士馬軍資失亡三分之二李藝居西偏擊高雅賢破之逐奔數里聞大軍不利退保藁城黑闥就擊之藝亦敗薛萬均萬徹皆為所虜截髪驅之萬均兄弟亡歸藝引兵歸幽州黑闥兵勢大振上以秦王世民功大前代官皆不足以稱之特置天䇿上將位在王公上冬十月以世民為天䇿上將領司徒陜東道大行臺尚書令増邑二萬户仍開天䇿府置官屬以齊王元吉為司空世民以海内浸平乃開館於宫西延四方文學之士出教以王府屬杜如晦記室房􅀇齡虞世南文學禇亮姚思廉主簿李􅀇道參軍蔡允恭薛元敬顔相時諮議典籖蘇朂天䇿府從事中郎于志寧軍諮祭酒蘇世長記室薛收倉曹李守素國子助教陸徳明孔頴逹信都蓋文逹宋州揔管府户曹許敬宗並以本官兼文學館學士分為三番更日直宿供給珍膳恩禮優厚世民朝謁公事之暇輙至館中引諸學士討論文籍或夜分乃寢又使庫直閻立本圖像褚亮爲賛號十八學士士大夫得預其選者時人謂之登瀛洲允恭大寳之弟子元敬收之從子相時師古之弟立本毗之子也初杜如晦爲秦王府兵曹參軍俄遷陜州長史時府僚多補外官世民患之房􅀇齡曰餘人不足惜至於杜如晦王佐之才大王欲經營四方非如晦不可世民驚曰㣲公言幾失之即奏爲府屬與􅀇齡常從世民征伐參謀帷幄軍中多事如晦剖决如流世民每破軍克城諸將佐爭取寳貨􅀇齡獨收采人物致之幕府又將佐有勇略者􅀇齡必與之深相結使爲世民盡死力世民每令􅀇齡入奏事上歎曰􅀇齡爲吾兒陳事雖隔千里皆如靣談李􅀇道嘗事李密爲記室密敗官屬爲王世充所虜懼死皆逹曙不寐獨􅀇道起居自若曰死生有命非憂可免衆服其識量庚寅劉黑闥䧟瀛州殺刺吏盧士叡觀州人執刺史雷徳備以城降之辛卯蕭銑鄂州刺史雷長頴以魯山來降趙郡王孝恭帥戰艦二千餘艘東下蕭銑以江水方漲殊不為備孝恭等㧞其荆門宜都二鎮進至夷陵銑將文士􅀪將精兵數萬屯清江癸巳孝恭擊走之獲戰艦三百餘艘殺溺死者萬計追奔至百里洲士􅀪收兵復戰又敗之進入北江銑江州揔管蓋彦舉以五州來降毛州刺史趙元愷性嚴急下不堪命丁卯州民董燈明等作亂殺元愷以應劉黑闥盛彦師自徐圓朗所逃歸王薄因説青萊密諸州皆下之蕭銑之罷兵營農也纔留宿衛數千人聞唐兵至文士􅀪敗大懼倉猝徵兵皆在江嶺之外道塗阻逺不能遽集乃悉見兵出拒戰孝恭將擊之李靖止之曰彼救敗之師䇿非素立勢不能久不若且泊南岸緩之一日彼必分其兵或留拒我或歸自守兵分勢弱我乘其懈而擊之蔑不勝矣今若急之彼則併力死戰楚兵剽鋭未易當也孝恭不從留靖守營自帥銳師出戰果敗走趣南岸銑衆委舟收掠軍資人皆負重靖見其衆亂縱兵奮擊大破之乘勝直抵江陵入其外郭又攻水城抜之大獲舟艦李靖使孝恭盡散之江中諸將皆曰破敵所獲當藉其用柰何弃以資敵靖曰蕭銑之地南出嶺表東距洞庭吾懸軍深入若攻城未拔援兵四集吾表裏受敵進退不獲雖有舟楫將安用之今弃舟艦使塞江而下援兵見之必謂江陵已破未敢輕進徃來覘伺動淹旬月吾取之必矣銑援兵見舟艦果疑不進其交州揔管丘和長史高士廉司馬杜之松等將朝江陵聞銑敗悉詣孝恭降孝恭勒兵圍江陵銑内外阻絶問䇿於中書侍郎岑文本文本勸銑降銑乃謂羣下曰天不祚梁不可復支矣若必待力屈則百姓䝉患柰何以我一人之故䧟百姓於塗炭乎乙巳銑以太牢告于太廟下令開門出降守城者皆哭銑帥羣臣緦縗布幘詣軍門曰當死者唯銑耳百姓無罪願不殺掠孝恭入據其城諸將欲大掠岑文本説孝恭曰江南之民自隋末以來困於虐政重以羣雄虎爭今之存者皆鋒鏑之餘跂踵延頸以望真主是以蕭氏君臣江陵父老决計歸命庻幾有所息肩今若縱兵俘掠使士民失望恐自此以南無復向化之心矣孝恭稱善遽禁止之諸將又言梁之將帥與官軍拒鬬死者其罪既深請籍没其家以賞將士李靖曰王者之師宜使義聲先路彼為其主鬭死乃忠臣也豈可同叛逆之科籍其家乎於是城中安堵秋毫無犯南方州縣聞之皆望風欵附銑降數日援兵至者十餘萬聞江陵不守皆釋甲而降孝恭送銑於長安上數之銑曰隋失其鹿天下共逐之銑無天命故至此若以為罪無所逃死竟斬於都市詔以孝恭爲荆州揔管李靖為上柱國賜爵永康縣公仍使之安撫嶺南得承制拜授先是銑遣黄門侍郎江陵劉洎略地嶺表得五十餘城未還而銑敗洎以所得城來降除南康州都督府長史戊申徐圓朗昌州治中劉善行以須昌來降庚戌詔陜東道大行臺尚書省自令僕至郎中主事品秩皆與京師同而員數差少山東行臺及揔管府諸州並􅀠焉其益州襄州山東淮南河北等道令僕以下各降京師一等員數又減焉行臺尚書令得承制補署其秦王齊王府官之外各置左右六護軍府及左右親事帳内府閠月乙卯上幸稷州己未幸武功舊墅壬戌獵于好畤乙丑獵于九􅉄丁卯獵于仲山戊辰獵于清水谷遂幸三原辛未幸周氏陂壬申還長安十一月甲申上祀圓丘杜伏威遣其將王雄誕擊李子通子通以精兵守獨松嶺雄誕遣其禆將陳當將千餘人乘高據險以逼之多張旗幟夜則􅅞炬火於樹布滿山澤子通懼燒營走保杭州雄誕追擊之又敗之於城下庚寅子通窮蹙請降伏威執子通并其左僕射樂伯通送長安上釋之先是汪華據黟歙稱王十餘年雄誕還軍擊之華拒之於新安洞口甲兵甚銳雄誕伏精兵於山谷帥羸弱數千犯其陳戰纔合陽不勝走還營華進攻之不能克會日暮引還伏兵已據其洞口華不得入窘迫請降聞人遂安據崑山無所屬伏威使雄誕擊之雄誕以崑山險隘難以力勝乃單騎造其城下陳國威靈示以禍福遂安感悅帥諸將出降於是伏威盡有淮南江東之地南至嶺東距海雄誕以功除歙州揔管賜爵宜春郡公壬辰林州揔管劉旻擊劉仚成大破之仚成僅以身免部落皆降李靖度嶺遣使分道招撫諸州所至皆下蕭銑桂州揔管李襲志帥所部諸州來降趙郡王孝恭即以襲志為桂州揔管明年入朝以李靖為嶺南撫慰大使檢校桂州緫管引兵下九十六州得户六十餘萬壬寅劉黑闥䧟定州執揔管李􅀇通黑闥愛其才欲以為大將􅀇通不可故吏有以酒肉饋之者玄通日諸君哀吾幽辱幸以酒肉來相開慰當為諸君一醉酒酣謂守者曰吾能劒舞願假吾刀守者與之􅀇通舞竟太息曰大丈夫受國厚恩鎮撫方面不能保全所守亦何面目視息世間哉即引刀自刺潰腹而死上聞為之流涕拜其子伏護為大將庚戌杞人周文舉殺刺史王文矩以城應徐圓朗幽州大饑高開道許以粟賑之李藝遣老弱詣開道就食開道皆厚遇之藝喜於是發民三千人車數百乘驢馬千餘匹徃受粟開道悉留之告絶於藝復稱燕王北連突厥南與劉黑闥相結引兵攻易州不克大掠而去又遣其將謝稜詐降於藝請兵援接藝出兵應之將至懷戎稜襲擊破之開道與突厥連兵數入為冦恒定幽易咸被其患十二月乙卯劉黑闥䧟冀州殺刺史麴稜黑闥既破淮安王神通移書趙魏故竇建徳將卒爭殺唐官吏以應黑闥庚申遣右屯衛大將軍義安王孝常將兵討黑闥黑闥將兵數萬進逼宗城黎州揔管李世勣先屯宗城弃城走保洺州甲子黑闥追擊世勣等破之殺歩卒五千人世勣僅以身免丙寅洺州土豪翻城應黑闥黑闥築壇於城東南告天及祭竇建徳而後入後旬日引兵攻拔相州執刺史房晃右武衛將軍張士貴潰圍走黑闥南取黎衛二州半嵗之間盡復建徳舊境又遣使北連突厥頡利可汗遣俟斤宋邪那帥胡騎從之左武衛將軍秦武通洺州刺史陳君賔永寕令程名振皆自河北遁歸長安丁卯命秦王世民齊王元吉討黑闥昆彌遣使内附昆彌即漢之昆明也嶲州治中吉􅀪緯通南寜至其國説之遂來降己巳劉黑闥䧟邢州趙州庚午䧟魏州殺揔管潘道毅辛未䧟莘州壬申徙宋王元嘉為徐王資治通鑑巻第一百八十九
