front:
  text: 資治通鑑卷第一百八十四
  hash: sha256:d91c0cfdeb8e77ffa67588732b0dc0318dbb921e90114256f56275b88735d150
body:
  text: 臣司馬光奉勑編集隋紀八六月不滿一年起強圉赤奮若恭皇帝下義寧元年六月己卯李建成等至晉陽劉文静勸李淵與突厥相結資其士馬以益兵勢淵從之自為手啓卑辭厚禮遺始畢可汗云欲大舉義兵逺迎主上復與突厥和親如開皇之時若能與我俱南願勿侵暴百姓若但和親坐受寶貨亦唯可汗所擇始畢得啓謂其大臣曰隋主為人我所知也若迎以來必害唐公而擊我無疑矣茍唐公自為天子我當不避盛暑以兵馬助之即命以此意為復書使者七日而返將佐皆喜請從突厥之言淵不可裴寂劉文静等皆曰今義兵雖集而戎馬殊乏胡兵非所須而馬不可失若復稽回恐其有悔淵曰諸君宜更思其次寂等乃請尊天子為太上皇立代王為帝以安隋室移檄郡縣改易旗幟雜用絳白以示突厥淵曰此可謂掩耳盗鍾然逼於時事不得不爾乃許之遣使以此議告突厥西河郡不從淵命甲申淵使建成世民將兵擊西河命太原令太原温大有與之偕行曰吾兒年少以卿參謀軍事事之成敗當以此行卜之時軍士新集咸未閲習建成世民與之同甘苦遇敵則以身先之近道菜果非買不食軍士有竊之者輙求其主償之亦不詰竊者軍士及民皆感悦至西河城下民有欲入城者皆聽其入郡丞髙徳儒閉城拒守己丑攻㧞之執徳儒至軍門世民數之曰汝指野鳥為鸞以欺人主取髙官吾興義兵正為誅佞人耳遂斬之自餘不戮一人秋毫無犯各尉撫使復業逺近聞之大悦建成等引兵還晉陽往返凡九日淵喜曰以此行兵雖橫行天下可也遂定入關之計淵開倉以賑貧民應募者日益多淵命為三軍分左右通謂之義士裴寂等上淵號為大將軍癸巳建大將軍府以寂為長史劉文靜為司馬唐儉及前長安尉温大雅為記室大雅仍與弟大有共掌機密武士彠為鎧曹劉政㑹及武城崔善為太原張道源為戸曹晉陽長上邽姜謩為司功參軍太谷長殷開山為府掾長孫順徳劉􅀪基竇琮及鷹揚郎將髙平王長諧天水姜寶誼陽屯為左右統軍自餘文武隨才授任又以世子建成為隴西公左領軍大都督左三統軍􅀠焉世民為敦煌公右領軍大都督右三統軍􅀠焉各置官屬以柴紹為右領軍府長史諮議譙人劉贍領西河通守道源名河開山名嶠皆以字行開山不害之孫也李密復帥衆向東都丙申大戰于平樂園密左騎右步中列彊弩鳴千鼓以衝之東都兵大敗密復取回洛倉突厥遣其柱國康鞘利等送馬千匹詣李淵為互市許發兵送淵入關多少隨所欲丁酉淵引見康鞘利等受可汗書禮容盡恭贈遣康鞘利等甚厚擇其馬之善者止市其半義士請以私錢市其餘淵曰虜饒馬而貪利其來將不已恐汝不能市也吾所以少取者示貧且不以為急故也當為汝貰之不足為汝費乙巳靈壽賊帥郗士陵帥衆數千降於淵淵以為鎮東將軍燕郡公仍置鎮東府補僚屬以招撫山東郡縣己巳康鞘利北還淵命劉文靜使於突厥以請兵私謂文靜曰胡騎入中國生民之大蠧也吾所以欲得之者恐劉武周引之共為邊患又胡馬行牧不費芻粟聊欲藉之以為聲勢耳數百人之外無所用之秋七月煬帝遣江都通守王丗充將江淮勁卒將軍王隆帥卭黃蠻河北大使太常少卿韋霽河南大使虎牙郎將王辯等各帥所領同赴東都相知討李密霽丗康之子也壬子李淵以子元吉爲太原太守留守晉陽宫後事並委之癸丑淵帥甲士三萬發晉陽立軍門誓衆并移檄郡縣諭以尊立代王之意西突厥阿史那大柰亦帥其衆以從甲寅遣通議大夫張綸將兵徇稽胡丙辰淵至西河慰勞吏民賑贍窮之民年七十已上皆除散官其餘豪俊隨才授任口詢功能手注官秩一日除千餘人受官者皆不取告身各分淵所書官名而去淵入雀䑕谷壬戌軍賈胡堡去霍邑五十餘里代王侑遣虎牙郎將宋老生帥精兵二萬屯霍邑左武侯大將軍屈突通將驍果數萬屯河東以拒淵㑹積雨淵不得進遣府佐沈叔安等將羸兵還太原更運一月糧乙丑張綸克離石殺太守楊子崇劉文靜至突厥見始畢可汗請兵且與之約曰若入長安民衆土地入唐公金玉繒帛歸突厥始畢大喜丙寅遣其大臣級失特勒先至淵軍告以兵已上道淵以書招李密密自恃兵彊欲為盟主己巳使祖君彦復書曰與兄􅂀流雖異根系本同自唯虚薄為四海英雄共推盟主所望左提右挈戮力同心執子嬰於咸陽殪商辛於牧野豈不盛哉且欲使淵以步騎數千自至河内面結盟約淵得書笑曰密妄自矜大非折簡可致吾方有事關中若遽絶之乃是更生一敵不如卑辭推奬以驕其志使為我塞成臯之道綴東都之兵我得專意西征俟關中平定據險養威徐觀蚌鷸之勢以收漁人之功未為晚也乃使温大雅復書曰吾雖庸劣幸承餘緒出為八使入典六屯顛而不扶通賢所責所以大㑹義兵和親北狄共匡天下志在尊隋天生蒸民必有司牧當今為牧非子而誰老夫年逾知命願不及此欣戴大弟攀鱗附翼唯弟早膺圖籙以寧兆民宗盟之長屬籍見容復封於唐斯榮足矣殪商辛於牧野所不忍言執子嬰於咸陽未敢聞命汾晉左右尚須安輯盟津之㑹未暇卜期密得書甚喜以示將佐曰唐公見推天下不足定矣自是信使往來不絶雨久不止淵軍中糧乏劉文靜未返或傳突厥與劉武周乘虚襲晉陽淵召將佐謀北還裴寂等皆曰宋老生屈突通連兵據險未易猝下李密雖云連和姦謀難測突厥貪而無信唯利是視武周事胡者也太原一方都㑹且義兵家屬在焉不如還救根本更圖後舉李世民曰今禾菽被野何憂乏糧老生輕躁一戰可擒李密顧戀倉粟未遑逺略武周與突厥外雖相附内實相猜武周雖逺利太原豈可近忘馬邑本興大義奮不顧身以救蒼生當先入咸陽號令天下今遇小敵遽已班師恐從義之徒一朝解體還守太原一城之地為賊耳何以自全李建成亦以為然淵不聽促令引發世民將復入諫㑹日暮淵已寢世民不得入號哭於外聲聞帳中淵召問之世民曰今兵以義動進戰則克退還則散衆散於前敵乘於後死亡無日何得不悲淵乃悟曰軍已發奈何世民曰右軍嚴而未發左軍雖去計亦未逺請自追之淵笑曰吾之成敗皆在爾知復何言唯爾所為世民乃與建成分道夜追左軍復還丙子太原運糧亦至武威鷹揚府司馬李軌家富好任俠薛舉作亂於金城軌與同郡曹珍關謹梁碩李贇安修仁等謀曰薛舉必來侵暴郡官庸怯勢不能禦吾軰豈可束手并妻孥為人所虜邪不若相與并力拒之保據河右以待天下之變衆皆以為然欲推一人為主各相讓莫肯當曹珍曰久聞圖纎李氏當王今軌在謀中乃天命也遂相與拜軌奉以為主丙辰軌令修仁集諸胡軌結民閒豪傑共起兵執虎賁郎將謝統師郡丞韋士政軌自稱河西太涼王置官屬並擬開皇故事關謹等欲盡殺隋官分其家貲軌曰諸人既逼以為主當稟其號令今興義兵以救生民乃殺人取貨此羣盜耳將何以濟於是以統師為太僕卿士政為太府卿西突厥闕逹度設據㑹寧川自稱闕可汗請降於軌薛舉自稱秦帝立其妻鞠氏為皇后子仁杲為皇太子遣仁杲將兵圍天水克之舉自金城徙都之仁杲多力善騎射軍中號萬人敵然性貪而好殺嘗獲庾信子立怒其不降磔於火上稍割以噉軍士及克天水悉召富人倒懸之以醋灌鼻責其金寶舉每戒之曰汝之才略足以辦事然苛虐無恩終當覆我國家舉遣晉王仁越將兵趨劒口至河池郡太守蕭瑀拒却之又遣其將常仲興濟河擊李軌與軌將李贇戰於昌松仲興舉軍敗没軌欲縱遣之贇曰力戰獲俘復縱以資敵將焉用之不如盡阬之軌曰天若祚我當擒其主此屬終為我有若其無成留之何益乃縱之未幾攻張掖敦煌西平枹罕皆克之盡有河西五郡之地煬帝詔左禦衛大將軍涿郡留守薛世雄將燕地精兵三萬討李密命王世充等諸將皆受世雄節度軍所過盜賊隨便誅翦世雄行至河賛軍於七里井竇建徳士衆惶懼悉㧞諸城南遁聲言還入豆子䴚世雄以為畏已不復設備建徳謀還襲之其處去世雄營百四十里建徳帥敢死士二百八十人先行令餘衆續發建徳與其士衆約曰夜至則擊其營已明則降之未至一里所天欲明建徳惶惑議降㑹天大霧人咫尺不相辨建徳喜曰天贊我也遂突入其營擊之世雄士卒大亂皆騰栅走世雄不能禁與左右數十騎遁歸涿郡慙恚發病卒建徳遂圍河閒八月己卯雨霽庚辰李淵命軍中曝鎧仗行裝辛巳旦東南由山足細道趣霍邑淵恐宋老生不出李建成李世民曰老生勇而無謀以輕騎挑之理無不出脱其固守則誣以貳於我彼恐為左右所奏安敢不出淵曰汝測之善老生不能逆戰賈胡吾知其無能為也淵與數百騎先至霍邑城東數里以待步兵使建成世民將數十騎至城下舉鞭指麾若將圍城之狀且詬之老生怒引兵三萬自東門南門分道而出淵使殷開山趣召後軍後軍至淵欲使軍士先食而戰世民曰時不可失淵乃與建成陳於城東世民陳於城南淵建成戰小却世民與軍頭臨淄叚志􅀇自南原引兵馳下衝老生陳出其背世民手殺數十人兩刀皆缺流血滿袖灑之復戰淵兵復振因傳呼曰已獲老生矣老生兵大敗淵兵先趣其門門閉老生下馬投塹劉􅀪基就斬之僵尸數里日已暮淵即命登城時無攻具將士肉薄而登遂克之淵賞霍邑之功軍吏疑奴應募者不得與良人同淵曰矢石之閒不辨貴賤論勲之際何有等差宜並從本勲授壬午淵引見霍邑吏民勞賞如西河選其丁壯使從軍關中軍士欲歸者並授五品散官遣歸或諫以官太濫淵曰隋氏吝惜勲賞此所以失人心也柰何効之且収衆以官不勝於用兵乎丙戌淵入臨汾郡慰撫如霍邑庚寅宿鼓山絳郡通守陳叔達拒守辛卯進攻克之叔達陳髙宗之子有才學淵禮而用之癸巳淵至龍門劉文靜康鞘利以突厥兵五百人馬二千匹來至淵喜其來緩謂文靜曰吾西行及河突厥始至兵少馬多皆君將命之功也汾陽薛大鼎説淵請勿攻河東自龍門直濟河據永豐倉傳檄逺近關中可坐取也淵將從之諸將請先攻河東乃以大鼎為大將軍府察非掾河東縣户曹任瓌說淵曰關中豪傑皆企踵以待義兵瓌在馮翊積年知其豪傑請往諭之必從風而靡義師自梁山濟河指韓城逼郃陽蕭造文吏必望塵請服孫華之徒皆當逺迎然後鼔行而進直據永豐雖未得長安關中固已定矣淵悦以瓌為銀青光祿大夫時關内羣盜孫華最彊丙申淵至汾隂以書招之己亥淵進軍壺口河濵之民獻舟者日以百數仍置水軍壬寅孫華自邰陽輕騎度河見淵淵握手與坐慰奬之以華為左光祿大夫武鄉縣公領馮翊太守其徒有功者委華以次授官賞賜甚厚使之先濟繼遣左右統軍王長諧劉􅀪基及左領軍長史陳演壽金紫光祿大夫史大奈將步騎六千自梁山濟營於河西以待大軍以任瓌為招慰大使瓌説韓城下之淵謂長諧等曰屈突通精兵不少相去五十餘里不敢來戰足明其衆不為之用然通畏罪不敢不出若自濟河擊卿等則我進攻河東必不能守若全軍守城則卿等絶其河梁前扼其喉後拊其背彼不走必為擒矣驍果從煬帝在江都者多逃亡帝患之以問裴矩對曰人情非有匹偶難以久處請聽軍士於此納室帝從之九月悉召江都境内寡婦處女集宫下恣將士所取或先與姦者聽自首即以配之武陽郡丞元寶藏以郡降李密甲寅密以寶藏為上柱國武陽公寶藏使其客鉅鹿魏徵為啓謝密且請改武陽為魏州又請帥所部西取魏郡南㑹諸將取黎陽倉密喜即以寶藏為魏州揔管召魏徵為元帥府文學參軍掌記室徵少孤貧好讀書有大志落拓不事生業始為道士寶藏召典書記密愛其文辭故召之初貴鄉長􅀪農魏徳深為政清靜不嚴而治遼東之役徵税百端使者旁午責成郡縣民不堪命唯貴鄉閭里不擾有無相通不竭其力所求皆給元寶藏受詔捕賊數調器械動以軍法從事其鄰城營造皆聚於聽事官吏逓相督責晝夜喧囂猶不能濟徳深聽隨便修營官府寂然恒若無事唯戒吏以不須過勝餘縣使百姓勞苦然民各自竭心常為諸縣之最縣民愛之如父母寶藏深害其能遣將千兵赴東都所領兵聞寶藏降密思其親戚輒出都門東向慟哭而返或勸之降密皆泣曰我與魏明府同來何忍弃去河南山東大水餓殍滿野煬帝詔開黎陽倉賑之吏不時給死者日數萬人徐世勣言於李密曰天下大亂本為饑饉今更得黎陽倉大事濟矣密遣世勣帥麾下五千人自原武濟河㑹元寶藏郝孝徳李文相及洹水賊帥張升清河賊帥趙君徳共襲破黎陽倉據之開倉恣民就食浹旬閒得勝兵二十餘萬武安永安義陽戈陽齊郡相繼降密竇建徳朱粲之徒亦遣使附密密以粲為楊州揔管鄧公㤗山道士徐洪客獻書於密以為大衆久聚恐米盡人散師老猒戰難可成功勸密乘進取之機因士馬之鋭㳂流東指直向江都執取獨夫號令天下密壯其言以書招之洪客竟不出莫知所之乙卯張綸徇龍泉文成等郡皆下之獲文成太守鄭元璹元璹譯之子也屈突通遣虎牙郎將桑顯和將驍果數千人夜襲王長諧等營長諧等戰不利孫華史大奈以遊騎自後擊顯和大破之顯和脱走入城仍自絶河梁丙辰馮翊太守蕭造降於李淵造脩之子也戊午淵帥諸軍圍河東屈突通嬰城自守將佐復推淵領太尉増置官屬淵從之時河東未下三輔豪傑至者日以千數淵欲引兵西趣長安猶豫未决裴寂曰屈突通擁大衆憑堅城吾捨之而去若進攻長安不克退為河東所踵腹背受敵此危道也不若先克河東然後西上長安恃通為援通敗長安必破矣李世民曰不然兵貴神速吾席累勝之威撫歸附之衆鼓行而西長安之人望風震駭智不及謀勇不及斷取之若振槁葉耳若淹留自􅁦於堅城之下彼得成謀脩備以待我坐費日月衆心離沮則大事去矣且關中蜂起之將未有所屬不可不早招懐也屈突通自守虜耳不足為慮淵兩從之留諸將圍河東自引軍而西朝邑法曹武功靳孝謨以蒲津中潬二城降華隂令李孝常以永豐倉降仍應接河西諸軍孝常圓通之子也京兆諸縣亦多遣使請降王世充韋霽王辯及河内通守孟善誼河陽郡尉獨孤武都各帥所領㑹東都唯王隆後期不至己未越王侗使虎賁郎將劉長恭等帥留守兵龐玉等帥偃師兵與世充等合十餘萬衆擊李密於洛口與密夾洛水相守煬帝詔諸軍皆受世充節度帝遣攝江都郡丞馮慈明向東都為密所獲密素聞其名延坐勞問禮意甚厚因謂曰隋祚已盡公能與孤共立大功乎慈明曰公家歴事先朝榮禄兼僃不能善守門閥乃與玄感舉兵偶脫罔羅得有今日唯圖反噬未諭髙旨莽卓敦玄非不彊盛一朝夷滅罪及祖宗僕死而後已不敢聞命密怒囚之慈明説防人席務本使亡走奉表江都及致書東都論賊形勢至雍丘為密將李公逸所獲密又義而釋之出至營門翟讓殺之慈明子琮之子也密之克洛口也箕山府郎將張季珣固守不下密以其寡弱遣人呼之季珣罵密極口密怒遣兵攻之不能克時密衆數十萬在其城下季珣四面阻絶所領不過數百人而執志彌固誓以必死久之糧盡水竭士卒羸病季珣撫循之一無離叛自三月至于是月城遂陷季珣見密不肯拜曰天子爪牙何容拜賊密猶欲降之誘諭終不屈乃殺之季珣祥之子也庚申李淵帥諸軍濟河甲子至朝邑舍於長春宫關中士民歸之者如市丙寅淵遣丗子建成司馬劉文靜帥王長諧等諸軍數萬人屯永豐倉守潼關以僃東方兵慰撫使竇軌等受其節度敦煌公丗民帥劉弘基等諸軍數萬人徇渭北慰撫使殷開山等受其節度軌琮之兄也冠氏長于志寧安養尉顔師古及丗民婦兄長孫无忌謁見淵於長春宫師古名籀以字行志寧宣敏之兄子師古之推之孫也皆以文學知名无忌仍有才略淵皆禮而用之以志寧爲記室師古爲朝散大夫无忌爲渭北行軍典籖屈突通聞淵西入署鷹揚郎將湯隂堯君素領河東通守使守蒲坂自引兵數萬趣長安爲劉文靜所遏將軍劉綱戍潼關屯都尉南城通欲往依之王長諧先引兵襲斬綱據城以拒通通退保北城淵遣其將吕紹宗等攻河東不能克柴紹之自長安赴太原也謂其妻李氏曰尊公舉兵今偕行則不可留此則及禍奈何李氏曰君弟速行我一婦人易以濳匿當自為計紹遂行李氏歸鄠縣别墅散家貲聚徒衆淵從弟神通在長安亡入鄠縣山中與長安大俠史萬寶等起兵以應淵西域商胡何潘仁入司竹園為盜有衆數萬劫前尚書右丞李綱為長史李氏使其奴馬三寶説潘仁與之就神通合勢攻鄠縣下之神通衆踰一萬自稱關中道行軍揔管以前藥城長令狐徳棻為記室徳棻熈之子也李氏又使馬三寶説羣盜李仲文向善志丘師利等皆帥衆從之仲文密之從父師利和之子也西京留守屢遣兵討潘仁等皆為所敗李氏徇盩厔武功始平皆下之衆至七萬左親衛叚綸文振之子也娶淵女亦聚徒於藍田得萬餘人及淵濟河神通李氏綸各遣使迎淵淵以神通為光祿大夫子道彦為朝請大夫綸為金紫光祿大夫使柴紹將數百騎並南山迎李氏何潘仁李仲文向善志及關中羣盜皆請降於淵淵一一以書慰勞授官使各居其所受敦煌公世民節度刑部尚書領京兆内史衛文昇年老聞淵兵向長安憂懼成疾不復預事獨左翊衛將軍隂世師京兆郡丞骨儀奉王侑乘城拒守己巳淵如蒲津庚午自臨晉濟渭至永豐倉勞軍開倉賑饑民辛未還長春宫壬申進屯馮翊世民所至吏民及羣盜歸之如流世民收其豪俊以備僚屬營于涇陽勝兵九萬李氏將精兵萬餘㑹世民於渭北與柴紹各置幕府號娘子軍先是平凉奴賊數萬圍扶風太守竇璡數月不下賊軍食盡丘師利遣其弟行恭帥五百人負米麥持牛酒詣奴賊營奴帥長揖行恭手斬之謂其衆曰汝軰皆良人何故事奴為主使天下謂之奴賊衆皆俯伏曰願改事公行恭即帥其衆與師利共謁世民於渭北世民以為光祿大夫璡琮之從子也隰城尉房􅀇齡謁世民於軍門世民一見如舊識署記室參軍引為謀主􅀇齡亦自以遇知己罄竭心力知無不為淵命劉􅀪基殷開山分引西畧扶風有衆六萬南度渭水屯長安故城城中出戰􅀪基逆擊破之世民引兵趣司竹李仲文何潘仁向善志皆帥衆從之頓于阿城勝兵十三萬軍令嚴整秋毫不犯乙亥世民自盩厔遣使白淵請期日赴長安淵曰屈突東行不能復西不足虞矣乃命建成選倉上精兵自新豐趣長樂宫世民帥新附諸軍北屯長安故城至並聽教延安上郡雕隂皆請降於淵丙子淵引軍西行所過離宫園苑皆罷之出宫女還其親屬冬十月辛巳淵至長安營於春明門之西北諸軍皆集合二十餘萬淵命各依壘壁毋得入村落侵暴屢遣使至城下諭衛文昇等以欲尊隋之意不報辛卯命諸軍進圍城甲午淵遷館於安興坊巴陵校尉鄱陽董景珍雷世猛旅帥鄭文秀許􅀇徹萬瓚徐徳基郭華沔陽張繡等謀據郡叛隋推景珍為主景珍曰吾素寒賤不為衆所服羅川令蕭銑梁室之後寛仁大度請奉之以從衆望乃遣使報銑銑喜從之聲言討賊召募得數千人銑巖之孫也㑹潁川賊帥沈柳生冦羅川銑與戰不利因謂其衆曰今天下皆叛隋政不行巴陵豪傑起兵欲奉吾為主若從其請以號令江南可以中興梁祚以此召柳生亦當從我矣衆皆悦聽命乃自稱梁公改隋服色旗幟皆如梁舊柳生即帥衆歸之以柳生為車騎大將軍起兵五日逺近歸附者至數萬人遂帥衆向巴陵景珍遣徐徳基帥郡中豪傑數百人出迎未及見銑柳生與其黨謀曰我先奉梁公勲居第一今巴陵諸將皆位高兵多我若入城返出其下不如殺徳基質其首領獨挾梁公進取郡城則無出我右者矣遂殺徳基入白銑銑大驚曰今欲撥亂返正忽自相殺吾不能為若主矣因步出軍門柳生大懼伏地請罪銑責而赦之陳兵入城景珍言於銑曰徐徳基建義功臣而柳生無故擅殺之此而不誅何以為政且柳生為盜日久今雖從義凶悖不移共處一城勢必為變失今不取後悔無及銑又從之景珍收柳生斬之其徒皆潰去丙申銑築壇燔燎自稱梁王改元鳴鳯壬寅王世充夜度洛水營於黑石明日分兵守營自將精兵陳於洛北李密聞之引兵度洛逆戰密兵大敗柴孝和溺死密帥麾下精騎度洛南餘衆東走月城世充追圍之密自洛南策馬直趣黑石營中懼連舉六烽世充釋月城之圍狼狽自救密還與戰大破之斬首三千餘級甲辰李淵命諸軍攻城約毋得犯七廟及代王宗室違者夷三族孫華中流矢卒十一月丙辰軍頭雷永吉先登遂克長安代王在東宫左右奔散唯侍讀姚思㢘侍側軍士將登殿思㢘厲聲訶之曰唐公舉義兵匡帝室卿等毋得無禮衆皆愕然布立庭下淵迎王於東宫遷居大興殿後聽思㢘扶王至順陽閤下泣拜而去思㢘察之子也淵還舍於長樂宫與民約法十二條悉除隋苛禁淵之起兵也留守官發其墳墓毁其五廟至是衛文昇已卒戊午執隂世師骨儀等數以貪婪苛酷且拒義師俱斬之死者十餘人餘無所問馬邑郡丞三原李靖素與淵有隙淵入城収靖將斬之靖大呼曰公興義兵欲平􅁀亂乃以私怨殺壯士乎世民為之固請乃捨之世民因召置幕府靖少負志氣有文武才畧其舅韓擒􅄦每撫之曰可與言將帥之畧者獨此子耳王世充自洛北之敗堅壁不出越王侗遣使勞之世充慙懼請戰於密丙辰世充與密夾石子河而陳密布陳南北十餘里翟讓先與丗充戰不利而退丗充逐之王伯當裴仁基從旁横斷其後密勒中軍擊之丗充大敗西走翟讓司馬王儒信勸讓自爲大冡宰揔統衆務以奪密權讓不從讓兄柱國滎陽公弘粗愚人也謂讓曰天子汝當自為奈何與人汝不為者我當為之讓但大笑不以為意密聞而惡之揔管崔丗樞自鄢陵初附於密讓囚之私府責其貨丗樞營求未辦遽欲加刑讓召元帥府記室邢義期博逡巡未就杖之八十讓謂左長史房彦藻曰君前破汝南大得寶貨獨與魏公全不與我魏公我之所立事未可知彦藻懼以狀告密因與左司馬鄭頲共説密曰讓貪愎不仁有無君之心宐早圖之密曰今安危未定遽相誅殺何以示逺頲曰毒虵螫手壯夫解腕所全者大故也彼先得志悔無所及密乃從之置酒召讓戊午讓與兄􅀪及兄子司徒府長史摩侯同詣密密與讓􅀪裴仁基郝孝徳共坐單雄信等皆立侍房彦藻鄭頲往來檢校密曰今日與達官飲不須多人左右止留數人給使而已密左右皆引去讓左右猶在彦藻白密曰今方為樂天時甚寒司徒左右請給酒食密曰聽司徒進止讓應曰甚佳乃引讓左右盡出獨密下壯士蔡建徳持刀立侍食未進密出良弓與讓習射讓方引滿建徳自後斫之踣於牀前聲若牛吼并􅀪摩侯儒信皆殺之徐世勣走岀門者斫之傷頸王伯當遙訶止之單雄信叩頭請命密釋之左右驚擾莫知所為密大言曰與君等同起義兵本除暴亂司徒專行貪虐陵辱羣僚無復上下今所誅止其一家諸君無預也命扶徐世勣置幕下親為傅創讓麾下欲散密使單雄信前往宣慰密尋獨騎入其營歴加撫諭令世勣雄信伯當分領其衆中外遂定讓殘忍摩侯猜忌儒信貪縱故死之日所部無哀之者然密之將佐始有自疑之心矣始王世充知讓與密必不久睦兾其相圖得從而乘之及聞讓死大失望歎曰李密天資明决為龍為蛇固不可測也壬戌李淵備灋駕迎代王即皇帝位於天興殿時年十三大赦改元遥尊煬帝為太上皇甲子淵自長樂宫入長安以淵為假黃鉞使持節大都督内外諸軍事尚書令大丞相進封唐王以武徳殿為丞相府改教稱令日於䖍化門視事乙丑榆林靈武平凉安定諸郡皆遣使請命丙寅詔軍國機務事無大小文武設官位無貴賤憲章賞罰咸歸相府唯郊祀天地四時禘祫奏聞置丞相府官屬以裴寂為長史劉文靜為司馬何潘仁使李綱入見淵留之以為丞相府司錄專掌選事又以前考功郎中竇威為司錄參軍使定禮儀威熾之子也淵傾府庫以賜勲人國用不足右光祿大夫劉世龍獻策以為今義師數萬並在京師樵蘇貴而布帛賤請伐六街及苑中樹為樵以易布帛可得百十萬匹淵從之己巳以李建成為唐世子李世民為京兆尹秦公李元吉為齊公河南諸郡盡附李密唯滎陽太守郇王慶梁郡太守楊汪尚為隋守密以書招慶為陳利害且曰王之先世家住山東本姓郭氏乃非楊族芝焚蕙歎事不同此初慶祖父元孫早孤隨母郭氏養於舅族及武元帝從周文帝起兵關中元孫在鄴恐為髙氏所誅冒姓郭氏故密云然慶得書惶恐即以郡降密復姓郭氏十二月癸未追謚唐王淵大父襄公為景王考仁公為元王夫人竇氏為穆妃薛舉遣其子仁杲冦扶風唐弼據汧源拒之舉遣使招弼弼乃殺李􅀪芝請降於舉仁杲乘其無備襲破之悉并其衆弼以數百騎走詣扶風請降扶風太守竇璡殺之舉勢益張衆號三十萬謀取長安聞丞相淵已定長安遂圍扶風淵使李世民將兵擊之又使姜謩竇軌俱出散關安撫隴右左光祿大夫李孝恭招慰山南府户曹張道源招慰山東孝恭淵之從父兄子也癸巳世民擊薛仁杲於扶風大破之追奔至隴坻而還薛舉大懼問其羣臣曰自古天子有降事乎黃門侍郎錢唐禇亮曰趙佗歸漢劉禪仕晉近世蕭琮至今猶貴轉禍為福自古有之衛尉卿郝瑗趨進曰陛下失問禇亮之言又何悖也昔漢高祖屢經奔敗蜀先主亟亡妻子卒成大業陛下奈何以一戰不利遽為亡國之計乎舉亦悔之曰聊以此試君等耳乃厚賞瑗引為謀主乙未平凉留守張隆丁酉河池太守蕭瑀及扶風漢陽郡相繼來降以竇璡為工部尚書燕國公蕭瑀為禮部尚書宋國公姜謩竇軌進至長道為薛舉所敗引還淵使通議大夫醴泉劉世讓安集唐弼餘黨與舉相遇戰敗為舉所虜李孝恭擊破朱粲諸將請盡殺其俘孝恭曰不可自是以往誰復肯降矣皆釋之於是自金川出巴蜀檄書所至降附者三十餘州屈突通與劉文靜相持月餘通復使桑顯和夜襲其營文靜與左光祿大夫叚志􅀇悉力苦戰顯和敗走盡俘其衆通勢益蹙或説通降通泣曰吾歴事兩主恩顧甚厚食人之祿而違其難吾不為也每自摩其頸曰要當為國家受一刀勞勉將士未嘗不流涕人亦以此懐之丞相淵遣其家僮召之通立斬之及聞長安不守家屬皆為淵所虜乃留顯和鎮潼關引兵東出將趣洛陽通適去顯和即以城降文靜文靜遣竇琮等將輕騎與顯和追之及於稠桑通結陳自固竇琮遣通子壽往諭之通罵曰此賊何來昔與汝為父子今與汝為仇讎命左右射之顯和謂其衆曰今京城巳陷汝軰皆關中人去欲何之衆皆釋仗而降通知不免下馬東南再拜號哭曰臣力屈至此非敢負國天地神祇實知之軍人執通送長安淵以為兵部尚書賜爵蔣公兼秦公元帥府長史淵遣通至河東城下招諭堯君素君素見通歔欷不自勝通亦泣下霑衿因謂君素曰吾軍已敗義旗所指莫不響應事勢如此卿當早降君素曰公為國大臣主上委公以關中代王付公以社稷奈何負國生降乃更為人作説客邪公所乘馬即代王所賜也公何面目乘之哉通曰吁君素我力屈而來君素曰方今力猶未屈何用多言通慙而退東都米斗三千人餓死者什二三庚子王世充軍士有亡降李密者密問世充軍中何所為軍士曰比見益募兵再饗將士不知其故密謂裴仁基曰吾幾落奴度中光祿知之乎吾久不出兵世充芻糧將竭求戰不得故募兵饗士欲乘月晦以襲倉城耳宜速備之乃命平原公郝孝徳琅邪公王伯當齊郡公孟讓勒兵分屯倉城之側以待之其夕三鼔世充兵果至伯當先遇之與戰不利世充兵即陵城揔管魯儒拒却之伯當更收兵擊之世充大敗斬其驍將費青奴士卒戰溺死者千餘人世充屢與密戰不勝越王侗遣使勞之世充訴以兵少數戰疲弊侗以兵七萬益之劉文靜等引兵東略地取􅀪農郡遂定新安以西甲辰李淵遣雲陽令詹俊武功縣正李仲衮循巴蜀下之乙巳方與帥張善安襲陷廬江郡因度江歸林士􅀪於豫章士􅀪疑之營於南塘上善安恨之襲破士􅀪焚其郛郭而去士􅀪徙居南康蕭銑遣其將蘇胡兒襲豫章克之士􅀪退保餘干卷第一百八十四
