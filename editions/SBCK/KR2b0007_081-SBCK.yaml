body:
  text: 十一月壬寅高平武公陳騫薨是嵗揚州刺史周浚移鎭秣陵吴民之未服者屢爲寇亂浚皆討平之賔禮故老搜求俊乂威惠並行吳人悦服三年春正月丁丑朔帝親祀南郊禮畢喟然問司􅀠校尉劉毅曰朕可方漢之何帝對曰桓靈帝曰何至於此對曰􅁊靈賣官錢入官庫陛下賣官錢入私門以此言之殆不如也帝大笑曰桓靈之世不聞此言今朕有直臣固爲勝之毅爲司􅀠糾繩豪貴無所顧忌皇太子鼓吹入東掖門毅劾奏之中䕶軍散騎常侍羊琇與帝有舊恩典禁兵豫機密十餘年恃寵驕侈數犯灋毅劾奏琇罪當死帝遣齊王攸私請琇於毅毅許之都官從事廣平程衛徑馳入䕶軍營收琇屬吏考問隂私先奏琇所犯狼籍然後言於毅帝不得已免琇官未幾復使以白衣領職琇景獻皇后之從父弟也後將軍王愷文明皇后之弟也散騎常侍侍中石崇苞之子也三人皆富於財競以奢侈相高愷以􅏁澳釡崇以蠟代薪愷作紫􅁝步障四十里崇作錦步障五十里崇塗屋以椒愷用赤石脂帝每助愷嘗以􅃢瑚樹賜之高二尺許愷以示崇崇便以鐵如意碎之愷怒以爲疾已之寶崇曰不足多恨今還卿乃命左右悉取其家􅃢瑚樹高三四尺者六七株如愷比者甚衆愷怳然自失車騎司馬􅀓咸上書曰先王之治天下食肉衣帛皆有其制竊謂奢侈之費甚於天災古者人稠地狹而有儲蓄由於節也今者土曠人稀而患不足由於奢也欲時人崇儉當詰其奢奢不見詰轉相高尚無有窮極矣尚書張華以文學才識名重一時論者皆謂華宜爲三公中書監荀朂侍中馮紞以伐吴之謀深疾之㑹帝問華誰可託後事者華對以明德至親莫如齊王由是忤㫖朂因而譛之甲午以華都督幽州諸軍事華至鎭撫循夷夏譽望益振帝復欲徴之馮紞侍帝從容語及鍾㑹紞曰㑹之反頗由太祖帝變色曰卿是何言邪紞免冠謝曰臣聞善御者必知六轡緩急之宜故孔子以仲由兼人而退之冉求退弱而進之漢高祖尊寵五王而夷滅光武抑損諸將而克終非上有仁暴之殊下有愚智之異也蓋抑揚與奪使之然耳鍾㑹才智有限而太祖誇奬無極居以重埶委以大兵使㑹自謂筭無遺䇿功在不賞遂構凶逆耳向令太祖録其小能節以大禮抑之以威權納之以軌則則亂心無由生矣帝曰然紞稽首曰陛下既然臣之言宜思堅氷之漸勿使如㑹之徒復致傾覆帝曰當今豈復有如㑹者邪紞因屏左右而言曰陛下謀畫之臣著大功於天下據方鎭緫戎馬者皆在陛下聖慮矣帝黙然由是止不徴華三月安北將軍嚴詢敗慕容涉歸於昌黎斬獲萬計魯公賈充老病上遣皇太子省視起居充自憂謚傳從子模曰是非久自見不可掩也夏四月庚午充薨世子黎民早卒無嗣妻郭槐欲以充外孫韓謐爲世孫郎中令韓咸中尉曹軫諫曰禮無異姓爲後之文今而行之是使先公受譏於後世而懷愧於地下也槐不聽咸等上書求改立嗣事寑不報槐遂表陳之云充遺意帝許之仍詔自非功如太宰始封無後者皆不得以爲比及太常議謚愽士秦秀曰充悖禮溺情以亂大倫昔鄫養外孫莒公子爲後春秋書莒人滅鄫絶父祖之血食開朝廷之亂原案謚灋昬亂紀度曰荒請謚荒公帝不從更謚曰武閏月丙子廣陸成矦李胤薨齊王攸徳望日隆荀朂馮紞楊珧皆惡之紞言於帝曰陛下詔諸侯之國宜從親者始親者莫如齊王今獨留京師可乎朂曰百僚内外皆歸心齊王陛下萬嵗後太子不得立矣陛下試詔齊王之國必舉朝以爲不可則臣言驗矣帝以爲然冬十二月甲申詔曰古者九命作伯或入毗朝政或出御方嶽其揆一也侍中司空齊王攸佐命立勲劬勞王室其以爲大司馬都督青州諸軍事侍中如故仍加崇典禮主者詳案舊制施行以汝南王亮爲太尉録尚書事領太子太傅光祿大夫山濤爲司徒尚書令衞瓘爲司空征東大將軍王渾上書以爲攸至親盛德侔於周公宜賛皇朝與聞政事今出攸之國假以都督虚號而無典戎幹方之實虧友于􅅃篤之義懼非陛下追述先帝文明太后待攸之宿意也若以同姓寵之太厚則有呉楚逆亂之謀漢之吕霍王氏皆何人也歴觀古今茍事之輕重所在無不爲害唯當任正道而求忠良耳若以智計猜物雖親見疑至於疏者庸可保乎愚以爲太子太保缺宜留攸居之與汝南王亮楊珧共幹朝事三人齊位足相持正既無偏重相傾之埶又不失親親仁覆之恩計之盡善者也於是扶風王駿光禄大夫李憙中䕶軍羊琇侍中王濟甄德皆切諫帝並不從濟使其妻常山公主及德妻長廣公主俱入稽顙涕泣請帝留攸帝怒謂侍中王戎曰兄弟至親今出齊王自是朕家事而甄德王濟連遣婦來生哭人邪乃出濟爲國子祭酒德爲大鴻臚羊琇與北軍中􅇋成粲謀見楊珧手刄殺之珧知之辭疾不出諷有司奏琇左遷太僕琇憤怨發病卒李憙亦以年老遜位卒於家憙在朝姻親故人與之分衣共食而未甞私以王官人以此稱之是嵗散騎常侍薛瑩卒或謂呉郡陸喜曰瑩於呉士當爲第一乎喜曰瑩在四五之間安得爲第一夫以孫皓無道呉國之士沈黙其體潜而勿用者第一也避尊居卑禄以代耕者第二也侃然體國執正不懼者第三也斟酌時宜時獻微益者第四也温恭脩愼不爲謟首者第五也過此以徃不足復數故彼上士多淪没而逺悔吝中士有聲位而近禍殃觀瑩之處身本末又安得爲第一乎四年春正月甲申以尚書右僕射魏舒爲左僕射下邳王晃爲右僕射晃孚之子也戊午新沓康伯山濤薨帝命太常議崇錫齊王之物博士庾旉太叔廣劉暾繆蔚郭頥秦秀傅珍上表曰昔周選建明德以左右王室周公康叔聃季皆入爲三公明股肱之任重守地之位輕也漢諸王矦位在丞相三公上其入讚朝政者乃有兼官其出之國亦不復假台司虛名爲隆寵也今使齊王賢邪則不宜以母弟之親尊居魯衛之常職不賢邪不宜大啟土宇表建東海也古禮三公無職坐而論道不聞以方任嬰之惟宣王救急朝夕然後命召穆公征淮夷故其詩曰徐方不回王曰旋歸宰相不得久在外也今天下已定六合爲家將數延三事與論太平之基而更出之去王城二千里違舊章矣旉純之子暾毅之子也旉既具草先以呈純純不禁事過太常鄭黙􅀶士祭酒曹志志愴然歎曰安有如此之才如此之親不得樹本助化而逺出海隅晉室之隆其殆矣乎乃奏議曰古之夾輔王室同姓則周公異姓則太公皆身居朝廷五世反葬及其衰也雖有五霸代興豈與周召之治同日而論哉自羲皇以來豈一姓所能獨有當推至公之心與天下共其利害乃能享國久長是以秦魏欲獨擅其權而纔得没身周漢能分其利而親疎爲用此前事之明驗也志以爲當如􅀶士等議帝覽之大怒曰曹志尚不明吾心况四海乎且謂愽士不荅所問而荅所不問横造異論下有司策免鄭黙於是尚書朱整褚䂮等奏志等侵官離局迷罔朝廷崇飾惡言假託無諱請收志等付廷尉科罪詔免志官以公還第其餘皆付廷尉科罪庾純詣廷尉自首旉以議草見示愚淺聽之詔免純罪廷尉劉頌奏旉等大不敬當棄市尚書奏請報聽廷尉行刑尚書夏矦駿曰官立八座正爲此時乃獨爲駮議左僕射下邳王晃亦從駿議奏留中七日乃詔曰旉是議主應爲戮首但旉家人自首宜并廣等七人皆丐其死命並除名二月詔以濟南郡益齊國己丑立齊王攸子長樂亭矦寔爲北海王命攸備物典䇿設軒轅之樂六佾之舞黄􅃏朝車乗輿之副從焉三月辛丑朔日有食之齊獻王攸憤怨發病乞守先后陵帝不許遣御醫診視諸醫希旨皆言無疾河南尹向雄諫曰陛下子弟雖多然有德望者少齊王卧居京邑所益實深不可不思也帝不納雄憤恚而卒攸疾轉篤帝猶催上道攸自强入辭素持容儀疾雖困尚自整厲舉止如常帝益疑其無疾辭出數日歐血而薨帝徃臨䘮攸子冏號踴訴父病爲醫所誣詔即誅醫以冏爲嗣初帝愛攸甚篤爲荀朂馮紞等所構欲爲身後之慮故出之及薨帝哀慟不已馮紞侍側曰齊王名過其實天下歸之今自薨殞社稷之福也陛下何哀之過帝収淚而止詔攸䘮禮依安平獻王故事攸舉動以禮鮮有過事雖帝亦敬憚之每引之同處必擇言而後發夏五月己亥琅邪武王伷薨冬十一月以尚書左僕射魏舒爲司徒河南及荆揚等六州大水歸命矦孫皓卒是嵗鮮卑慕容涉歸卒弟刪簒立將殺涉歸子廆廆亡匿於遼東徐郁家五年春正月己亥有青龍二見武庫井中帝觀之有喜色百官將賀尚書左僕射劉毅表曰昔龍降夏庭卒爲周禍易稱潜龍勿用陽在下也尋案舊典無賀龍之禮帝從之初陳羣以吏部不能審覈天下之士故令郡國各置中正州置大中正皆取本土之人任朝廷官德充才盛者爲之使銓次等級以爲九品有言行脩著則升之道義虧缺則降之吏部憑之以補授百官行之浸久中正或非其人姦敝日滋劉毅上疏曰今立中正定九品高下任意榮辱在手操人主之威福奪天朝之權埶公無考校之負私無告訐之忌用心百態營求萬端亷譲之風滅爭訟之俗成臣竊爲聖朝恥之蓋中正之設於損政之道有八高下逐彊弱是非隨興衰一人之身旬日異狀上品無寒門下品無埶族一也置州都者本取州里清議咸所歸服將以鎭異同一言議也今重其任而輕其人使駁違之論横於州里嫌讎之隙結於大臣二也本立格之體爲九品者謂才德有優劣倫軰有首尾也今乃使優劣易地首尾倒錯三也陛下賞善罰惡無不裁之以灋獨置中正委以一國之重曽無賞罰之防又禁人不得訴訟使之縱横任意無所顧憚諸受枉者抱怨積直不獲上聞四也一國之士多者千數或流徙異邦或取給殊方面猶不識况盡其才而中正知與不知皆當品狀采譽於臺府納毁於流言任已則有不識之蔽聽受則有彼此之偏五也凡求人才者欲以治民也今當官著効者或附卑品在官無績者更獲高叙是爲抑功實而隆空名長浮華而廢考績六也凡官不同人事不同能今不狀其才之所宜而但第爲九品以品取人或非才能之所長以狀取人則爲本品之所限徒結白論而品狀相妨七也九品所下不彰其罪所上不列其善各任愛憎以植其私天下之人焉得不懈德行而鋭人事八也由此論之職名中正實爲姦府事名九品而有八損古今之失莫大於此愚臣以爲宜罷中正除九品棄魏氏之敝灋更立一代之美制太尉汝南王亮司空衛瓘亦上疏曰魏氏承䘮亂之後人士流移考詳無地故立九品之制粗且爲一時選用之本耳今九域同規大化方始臣等以爲宜皆蕩除末灋咸用土斷自公卿以下以所居爲正無復縣客逺屬異土盡除中正九品之制使舉善進才各由鄉論則華競自息各求於已矣始平王文學江夏李重上疏以爲九品既除宜先開移徙聽相并就則土斷之實行矣帝雖善其言而終不能改也冬十二月庚午大赦閏月當陽成矦杜預卒是嵗塞外匈奴胡太阿厚帥部落二萬九千三百人來降帝處之塞内西河罷寧州入益州置南夷校尉以䕶之六年春正月尚書左僕射劉毅致仕尋卒戊辰以王渾爲尚書左僕射渾子濟爲侍中渾主者處事不當濟明灋繩之濟從兄佑素與濟不恊因毁濟不能容其父帝由是疎濟後坐事免官濟性豪侈帝謂侍中和嶠曰我將罵濟而後官之如何嶠曰濟俊爽恐不可屈帝乃召濟切譲之既而曰頗知愧不濟曰尺布斗粟之謡常爲陛下愧之他人能令親者踈臣不能令親者親以此愧陛下耳帝黙然嶠洽之孫也青梁幽冀州旱秋八月丙戌朔日有食之冬十二月庚子襄陽武矦王濬卒是嵗慕容刪爲其下所殺部衆復迎涉歸子廆而立之涉歸與宇文部素有隙廆請討之朝廷弗許廆怒入宼遼西殺略甚衆帝遣幽州軍討廆戰于肥如廆衆大敗自是每嵗犯邉又東擊扶餘扶餘王依慮自殺子弟走保沃沮廆夷其國城驅萬餘人而歸七年春正月甲寅朔日有食之魏舒稱疾固請遜位以劇陽子罷舒所爲必先行而後言遜位之際莫有知者衛瓘與舒書曰每與足下共論此事日日未果可謂瞻之在前忽焉在後矣夏慕容廆寇遼東故扶餘王依慮子依羅求帥見人還復舊國請援於東夷校尉何龕龕遣督䕶賈沈將兵送之廆遣其將孫丁帥騎邀之於路沈力戰斬丁遂復扶餘秋匈奴胡都大愽及萎莎胡各帥種落十萬餘口詣雍州降九月戊寅扶風武王駿薨冬十一月壬子以隴西王泰都督關中諸軍事泰宣帝弟馗之子也是嵗鮮卑拓跋悉鹿卒弟綽立八年春正月戊申朔日有食之太廟殿䧟秋九月改營太廟作者六萬人是嵗匈奴都督大豆得一育鞠等復帥種落萬一千五百口來降九年春正月壬申朔日有食之夏六月庚子朔日有食之郡國三十三大旱秋八月壬子星隕如雨地震資治通鑑卷第八十一
