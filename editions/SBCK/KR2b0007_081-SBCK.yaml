seq: 81
front:
  text: 油在船前遇鎖然炬燒之須􅁷融液斷絶於是船無所礙庚申濬克西陵殺吳都督留憲等壬戍克荆門夷道二城殺夷道監陸晏杜預遣牙門周㫖等帥奇兵八百汎舟夜渡江襲樂鄉多張旗幟起火巴山吴都督孫歆懼與江陵督伍延書曰北來諸軍乃飛渡江也㫖等伏兵樂鄉城外歆遣軍出拒王濬大敗而還㫖等發伏兵隨歆軍而入歆不覺直至帳下虜歆而還乙丑王濬擊殺吴水軍都督陸景杜預進攻江陵甲戍克之斬伍延於是沅湘以南接于交廣州郡皆望風送印綬預杖節稱詔而綏撫之凡所斬獲吴都督監軍十四牙門郡守百二十餘人胡奮克江安乙亥詔王濬唐彬既定巴丘與胡奮王戎共平夏口武昌順流長騖直造秣陵杜預當鎭靜零桂懷輯衡陽大兵既過荆州南境固當傳檄而定預等各分兵以益濬彬太尉充移屯項王戎遣參軍襄陽羅尚南陽劉喬將兵與王濬合攻武昌吴江夏太守劉朗督武昌諸軍虞昺皆降昺翻之子也杜預與衆軍㑹議或曰百年之寇未可盡克方春水生難於久駐冝俟來冬更爲大舉預曰昔樂毅藉濟西一戰以并強齊今兵威已振譬如破竹數節之後皆迎刃而解無復著手處也遂指授羣帥方略徑造建業吴主聞王渾南下使丞相張悌督丹楊太守沈瑩䕶軍孫震副軍師諸葛靚帥衆三萬渡江逆戰至牛渚沈瑩曰晉治水軍於蜀久矣上流諸軍素無戒僃名將皆死㓜少當任恐不能禦也晉之水軍必至於此宜畜衆力以待其來與之一戰若幸而勝之江西自清今渡江與晉大軍戰不幸而敗則大事去矣悌曰吳之將亡賢愚所知非今日也吾恐蜀兵至此衆心駭懼不可復整及今渡江猶可決戰若其敗䘮同死社稷無所復恨若其克捷北敵犇走兵埶萬倍便當乗勝南上逆之中道不憂不破也若如子計恐士衆散盡坐待敵到君臣俱降無復一人死難者不亦辱乎三月悌等濟江圍渾部將城陽都尉張喬於楊荷喬衆纔七千閉柵請降諸葛靚欲屠之悌曰彊敵在前不冝先事其小且殺降不祥靚曰此屬以救兵未至力少不敵故且僞降以緩我非眞伏也若捨之而前必爲後患悌不從撫之而進悌與揚州刺史汝南周浚結陳相對沈瑩帥丹陽鋭卒刀楯五千三衝晉兵不動瑩引退其衆亂將軍薛勝蔣班因其亂而乗之呉兵以次犇潰將帥不能止張喬自後擊之大敗呉兵于版橋諸葛靚帥數百人遁去使過迎張悌悌不肯去靚自往牽之曰存亡自有大數非卿一人所支柰何故自取死悌垂涕曰仲思今日是我死日也且我爲兒童時便爲卿家丞相所識拔常恐不得其死負名賢知顧今以身徇社稷復何道邪靚再三牽之不動乃流淚放去行百餘步顧之已爲晉兵所殺并斬孫震沈瑩等七千八百級呉人大震初詔書使王濬下建平受杜預節度至建業受王渾節度預至江陵謂諸將曰若濬得建平則順流長驅威名已著不冝令受制於我若不能克則無縁得施節度濬至西陵預與之書曰足下既摧其西藩便當徑取建業討累世之逋寇釋呉人於塗炭振旅還都亦曠世一事也濬大恱表呈預書及張悌敗死揚州别駕何惲謂周浚曰張悌舉全呉精兵殄滅於此呉之朝野莫不震懾今王龍驤既破武昌乗勝東下所向輒克土崩之勢見矣謂冝速引兵渡江直指建業大軍猝至奪其膽氣可不戰禽也浚善其謀使白王渾惲曰渾闇於事機而欲愼已免咎必不我從浚固使白之渾果曰受詔但令屯江北以抗呉軍不使輕進貴州雖武豈能獨平江東乎今者違命勝不足多若其不勝爲罪已重且詔令龍驤受我節度但當具君舟檝一時俱濟耳惲曰龍驤克萬里之冦以既成之功來受節度未之聞也且明公爲上將見可而進豈得一一須詔令乎今乗此渡江十全必克何疑何慮而淹留不進此鄙州上下所以恨恨也渾不聽王濬自武昌順流徑趣建業呉主遣遊擊將軍張象帥舟師萬人禦之象衆望旗而降濬兵甲滿江旌旗燭天威埶甚盛呉人大懼呉主之嬖臣岑昬以傾險諛佞致位九列好興功役爲衆患苦及晉兵將至殿中親近數百人叩頭請於呉主曰北軍日近而兵不舉刄陛下將如之何呉主曰何故對曰正坐岑昬耳呉主獨言若爾當以奴謝百姓衆因曰唯遂並起收昬呉主駱驛追止已屠之矣陶濬將討郭馬至武昌聞晉兵大入引兵東還至建業呉主引見問水軍消息對曰蜀船皆小今得二萬兵乗大船以戰自足破之於是合衆授濬節􅃏明日當發其夜衆悉逃潰時王渾王濬及琅邪王伷皆臨近境呉司徒何植建威將軍孫晏悉送印節詣渾降呉主用光禄勲薛瑩中書令胡沖等計分遣使者奉書於渾濬伷以請降又遺其羣臣書深自咎責且曰今大晉平治四海是英俊展節之秋勿以移朝改朔用損厥志使者先送璽綬於琅邪王伷壬寅王濬舟師過三山王渾遣信要濬蹔過論事濬舉帆直指建業報曰風利不得泊也是日濬戎卒八萬方舟百里鼓譟入于石頭吴主皓靣縛輿襯詣軍門降濬解􅅞焚櫬延請相見収其圖籍克州四郡四十三户五十二萬三千兵二十三萬朝廷聞呉已平羣臣皆賀上壽帝執爵流涕曰此羊太傅之功也票騎將軍孫秀不賀南向流涕曰昔討逆弱冠以一校尉創業今後主舉江南而棄之宗廟山陵於此爲墟悠悠蒼天此何人哉呉之未下也大臣皆以爲未可輕進獨張華堅執以爲必克賈充上表稱呉地未可悉定方夏江淮下濕疾疫必起冝召諸軍還以爲後圖雖腰斬張華不足以謝天下帝曰此是吾意華但與吾同耳荀朂復奏冝如充表帝不從杜預聞充奏乞罷兵馳表固爭使至轘轅而呉已降充慙懼詣闕請罪帝撫而不問夏四月甲申詔賜孫皓爵歸命矦乙酉大赦改元大酺五日遣使者分詣荆楊撫慰吳牧守已下皆不更易除其苛政悉從簡易呉人大恱滕脩討郭馬未克聞晉伐吴帥衆赴難至巴丘聞吴亡縞素流涕還與廣州刺史閭豐蒼梧太守王毅各送印綬請降孫皓遣陶璜之子融持手書諭璜璜流涕數日亦送印綬降帝皆復其本職王濬之東下也呉城戍皆望風􅅃附獨建平太守吾彦嬰城不下聞呉亡乃降帝以彦爲金城太守初朝廷尊寵孫秀孫楷欲以招來吴人及吴亡降秀爲伏波將軍楷爲渡遼將軍琅邪王伷遣使送孫皓及其宗族詣洛陽五月丁亥朔皓至與其太子瑾等泥頭面􅅞詣東陽門詔遣謁者解其􅅞賜衣服車乘田三十頃嵗給錢榖綿絹甚厚拜瑾爲中郎諸子爲王者皆爲郎中呉之舊望隨才擢叙孫氏將吏渡江者復十年百姓復二十年庚寅帝臨軒大㑹文武有位及四方使者國子學生皆預焉引見歸命矦皓及吴降人皓登殿稽顙帝謂皓曰朕設此座以待卿久矣皓曰臣於南方亦設此座以待陛下賈充謂皓曰聞君在􅀯方鑿人目剥人面皮此何等刑也皓曰人臣有弑其君及姦回不忠者則加此刑耳充黙然甚愧而皓顔色無怍帝從容問散騎常侍薛瑩孫皓所以亡對曰皓昵近小人刑罰放濫大臣諸將人不自保此其所以亡也它日又問吾彦對曰吴主英俊宰輔賢明帝笑曰若是何故亡彦曰天禄永終歴數有屬故爲陛下禽耳帝善之王濬之入建業也其明日王渾乃濟江以濬不待已至先受孫皓降意甚愧忿將攻濬何攀勸濬送皓與渾由是事得解何惲以渾與濬爭功與周浚牋曰書貴克讓易大謙光前破張悌吴人失氣龍驤因之䧟其區宇論其前後我實緩師既失機㑹不及於事而今方競其功彼既不吞聲將虧雍穆之弘興矜爭之鄙斯愚情之所不取也浚得牋即諫止渾渾不納表濬違詔不受節度誣以罪狀渾子濟尚常山公主宗黨強盛有司奏請檻車徵濬帝弗許但以詔書責讓濬以不從渾命違制昧利濬上書自理曰前被詔書令臣直造秣陵又令受太尉充節度臣以十五日至三山見渾軍在北岸遣書邀臣臣水軍風發乗埶徑造賊城無縁迴船過渾臣以日中至秣陵暮乃被渾所下當受節度之符欲令臣明十六日悉將所領還圍石頭又索蜀兵及鎭􅀯諸軍人名定見臣以爲皓已來降無縁空圍石頭又兵人定見不可倉猝得就皆非當今之急不可承用非敢忽棄明制也皓衆叛親離匹夫獨坐雀䑕貪生茍乞一活耳而江北諸軍不知虛實不早縛取自爲小誤臣至便得更見怨恚並云守賊百日而令他人得之臣愚以爲事君之道茍利社稷死生以之若其顧嫌疑以避咎責此是人臣不忠之利實非明主社稷之福也渾又騰周浚書云濬軍得吴寳物又云濬牙門將李高放火燒皓僞宫濬復表曰臣孤根獨立結恨彊宗夫犯上干主其罪可救乖忤貴臣禍在不測僞中郎將孔攄􅀃去二月武昌失守水軍行至皓案行石頭還左右人皆跳刀大呼云要當爲陛下一死戰決之皓意大喜謂必能然便盡出金寶以賜與之小人無狀得便持走皓懼乃圖降首降使適去左右劫奪財物略取妻妾放火燒宫皓逃身竄首恐不脫死臣至遣參軍主者救斷其火耳周浚先入皓宫渾又先登皓舟臣之入觀皆在其後皓宫之中乃無席可坐若有遺寶則浚與渾先得之矣浚等云臣屯聚蜀人不時送皓欲有反狀又恐動吴人言臣皆當誅殺取其妻子冀其作亂得騁私忿謀反大逆尚以見加其餘謗􅊱故其冝耳今年平吴誠爲大慶於臣之身更受咎累濬至京師有司奏濬違詔大不敬請付廷尉科罪詔不許又奏濬赦後燒賊船百三十五艘輒敕付廷尉禁推詔勿推渾濬爭功不已帝命守廷尉廣陵劉頌校其事以渾爲上功濬爲中功帝以頌折灋失理左遷京兆太守庚辰増賈充邑八千户以王濬爲輔國大將軍封襄陽縣矦杜預爲當陽縣矦王戎爲安豐縣矦封琅邪王伷二子爲亭矦増京陵矦王渾邑八千户進爵爲公尚書關内矦張華進封廣武縣矦増邑萬户荀朂以專典詔命功封一子爲亭矦其餘諸將及公卿以下賞賜各有差帝以平吴策告羊祜廟乃封其夫人夏矦氏爲萬嵗鄉君食邑五千户王濬自以功大而爲渾父子及黨與所挫抑每進見陳其功伐之勞及見枉之狀或不勝忿憤徑出不辭帝每容恕之益州䕶軍范通謂濬曰卿功則美矣然恨所以居美者未盡善也卿旋斾之日角巾私第口不言平呉之事若有問者輒曰聖人之德羣帥之力老夫何力之有此藺生所以屈亷頗也王渾能無愧乎濬曰吾始懲鄧艾之事懼禍及身不得無言其終不能遣諸胷中是吾褊也時人咸以濬功重報輕爲之憤邑博士秦秀等並上表訟濬之屈帝乃遷濬鎭軍大將軍王渾嘗詣濬濬嚴設備衛然後見之杜預還襄陽以爲天下雖安忘戰必危乃勤於講武申嚴戍守又引滍淯水以浸田萬餘頃開楊口通零桂之漕公私頼之預身不跨馬射不穿札而用兵制勝諸將莫及預在鎭數餉遺洛中貴要或問其故預曰吾但恐爲害不求益也王渾遷征東大將軍復鎭壽陽諸葛靚逃􅇡不出帝與靚有舊靚姊爲琅邪王妃帝知靚在姊間因就見焉靚逃于厠帝又逼見之謂曰不謂今日復得相見靚流涕曰臣不能漆身皮靣復覩聖顔誠爲慙恨詔以爲侍中固辭不拜歸于鄉里終身不向朝廷而坐六月復封丹水矦睦爲高陽王秋八月己未封皇弟延祚爲樂平王尋薨九月庚寅賈充等以天下一統屢請封禪帝不許冬十月前將軍青州刺史淮南胡威卒威爲尚書嘗諫時政之寛帝曰尚書郎以下吾無所假借威曰臣之所陳豈在丞郎令史正謂如臣等輩始可以肅化明灋耳是嵗以司􅀠所統郡置司州凡州十九郡國一百七十三户二百四十五萬九千八百四十詔曰昔自漢末四海分崩刺史内親民事外領兵馬今天下爲一當韜戢干戈刺史分職皆如漢氏故事悉去州郡兵大郡置武吏百人小郡五十人交州牧陶璜上言交廣東西數千里不賔屬者六萬餘户至於服從官役纔五千餘家二州脣齒唯兵是鎭又寧州諸夷接據上流水陸並通州兵未冝約損以示單虛僕射山濤亦言不冝去州郡武僃帝不聽及永寧以後盜賊羣起州郡無僃不能禽制天下遂大亂如濤所言然其後刺史復兼兵民之政州鎭愈重矣漢魏以來羌胡鮮卑降者多處之塞内諸郡其後數因忿恨殺害長吏漸爲民患侍御史西河郭欽上疏曰戎狄彊獷歴古爲患魏初民少西北諸郡皆爲戎居内及京兆魏郡弘農徃徃有之今雖服從若百年之後有風塵之警胡騎自平陽上黨不三日而至孟津北地西河太原馮翊安定上郡盡爲狄庭矣冝及平吴之威謀臣猛將之略漸徙内郡雜胡於邉地峻四夷出入之防明先王荒服之制此萬世之長䇿也帝不聽二年春三月詔選孫皓宫人五千人入宫帝既平吴頗事遊宴怠於政事掖庭殆將萬人常乗羊車恣其所之至便宴寑宫人競以竹葉插户鹽汁灑地以引帝車而后父楊駿及弟珧濟始用事交通請謁埶傾内外時人謂之三楊舊臣多被疎退山濤數有規諷帝雖知而不能改初鮮卑莫䕶跋始自塞外入居遼西棘城之北號曰慕容部莫䕶跋生木延木延生涉歸遷於遼東之北世附中國數從征討有功拜大單于冬十月涉歸始寇昌黎
