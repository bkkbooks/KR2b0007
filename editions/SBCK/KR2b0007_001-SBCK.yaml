  text: 資治通鑑巻第一
  hash: sha256:22e1727f6e4e51ebdc8695bf5142d405e1d5e2786a3f3a08b2ffc4446e107d85
body:
  text: 臣司馬光奉勑編集周紀一黓困敦凡三十五年起著雍攝提格盡􅀇威烈王二十三年初命􅀳大夫魏斯趙籍韓䖍為諸矦臣光曰臣聞天子之職莫大於禮禮莫大於分分莫大於名何謂禮紀綱是也何謂分君臣是也何謂名公矦卿大夫是也夫以四海之廣兆民之衆受制於一人雖有絶倫之力高世之智莫敢不奔走而服役者豈非以禮為之綱紀哉是故天子統三公三公率諸矦諸矦制卿大夫卿大夫治士庶人貴以臨賤賤以承貴上之使下猶心腹之運手足根本之制支葉下之事上猶手足之衞心腹支葉之庇本根然後能上下相保而國家治安故曰天子之職莫大於禮也文王序易以乾坤為首孔子繫之曰天尊地卑乾坤定矣卑高以陳貴賤位矣言君臣之位猶天地之不可易也春秋抑諸矦尊周室王人雖微序於諸矦之上以是見聖人於君臣之際未嘗不惓惓也非有桀紂之暴湯武之仁人歸之天命之君臣之分當守節伏死而已矣是故以微子而代紂則成湯配天矣以季札而君吳則太伯血食矣然二子寜亡國而不為者誠以禮之大節不可亂也故曰禮莫大於分也夫禮辨貴賤序親䟽裁羣物制庶事非名不著非器不形名以命之器以别之然後上下粲然有倫此禮之大經也名器既亡則禮安得獨在哉昔仲叔于奚有功於衞辭邑而請繁纓孔子以為不如多與之邑惟器與名不可以假人君之所司也政亡則國家從之衞君待孔子而為政孔子欲先正名以為名不正則民無所措手足夫繁纓小物也而孔子惜之正名細務也而孔子先之誠以名器旣亂則上下無以相有故也夫事未有不生於微而成於著聖人之慮逺故能謹其微而治之衆人之識近故必待其著而後救之治其微則用力寡而功多救其著則竭力而不能及也易曰履霜堅冰至書曰一日二日萬幾謂此類也故曰分莫大於名也烏呼幽厲失徳周道日衰綱紀散壞下陵上替諸矦專征大夫擅政禮之大體什喪七八矣然文武之祀猶緜緜相屬者蓋以周之子孫尚能守其名分故也何以言之昔􅀳文公有大功於王室請隧於襄王襄王不許曰王章也未有代徳而有二王亦叔父之所惡也不然叔父有地而隧又何請焉文公於是乎懼而不敢違是故以周之地則不大於曹滕以周之民則不衆於邾莒然歴數百年宗主天下雖以􅀳楚齊秦之彊不敢加者何哉徒以名分尚存故也至於季氏之於魯田常之於齊白公之於楚智伯之於􅀳其勢皆足以逐君而自為然而卒不敢者豈其力不足而心不忍哉乃畏奸名犯分而天下共誅之也今􅀳大夫暴蔑其君剖分􅀳國天子既不能討又寵秩之使列於諸矦是區區之名分復不能守而并棄之也先王之禮於斯盡矣或者以為當是之時周室微弱三􅀳彊盛雖欲勿許其可得乎是大不然夫三􅀳雖彊茍不顧天下之誅而犯義侵禮則不請於天子而自立矣不請於天子而自立則為悖逆之臣天下茍有􅁊文之君必奉禮義而征之今請於天子而天子許之是受天子之命而為諸矦也誰得而討之故三􅀳之列於諸矦非三􅀳之壞禮乃天子自壞之也烏呼君臣之禮旣壞矣則天下以智力相雄長遂使聖賢之後為諸侯者社稷無不泯絶生民之類糜滅幾盡豈不哀哉初智宣子將以瑶為後智果曰不如宵也瑶之賢於人者五其不逮者一也美鬚長大則賢射御足力則賢􅇊藝畢給則賢巧文辯慧則賢彊毅果敢則賢如是而甚不仁夫以其五賢陵人而以不仁行之其誰能待之若果立瑶也智宗必滅弗聽智果别族於太史為輔氏趙簡子之子長曰伯魯幼曰無恤將置後不知所立乃書訓戒之辭於二􅂤以授二子曰謹識之三年而問之伯魯不能舉其辭求其簡已失之矣問無恤誦其辭甚習求其簡出諸袖中而奏之於是簡子以無恤為賢立以為後簡子使尹鐸為􅀳陽請曰以為繭絲乎抑為保障乎簡子曰保障哉尹鐸損其戸數簡子謂無恤曰􅀳國有難而無以尹鐸為少無以􅀳陽為逺必以為歸及智宣子卒智襄子為政與韓康子魏􅁊子宴於藍臺智伯戲康子而侮叚規智國聞之諫曰主不備難必至矣智伯曰難將由我我不為難誰敢興之對曰不然夏書有之曰一人三失怨豈在明不見是圖夫君子能勤小物故無大患今主一宴而恥人之君相又弗備曰不敢興難無乃不可乎蜹蟻蜂蠆皆能害人况君相乎弗聽智伯請地於韓康子康子欲弗與段規曰智伯好利而愎不與將伐我不如與之彼狃於得地必請於佗人佗人不與必嚮之以兵然則我得免於患而待事之變矣康子曰善使使者致萬家之邑於智伯智伯悦交求地於魏桓子桓子欲弗與任章曰何故弗與􅁊子曰無故索地故弗與任章曰無故索地諸大夫必懼吾與之地智伯必驕彼驕而輕敵此懼而相親以相親之兵待輕敵之人智氏之命必不長矣周書曰將欲敗之必姑輔之將欲取之必姑與之主不如與之以驕智伯然後可以擇交而圖智氏矣柰何獨以吾為智氏質乎􅁊子曰善復與之萬家之邑一智伯又求蔡臯狼之地於趙襄子襄子弗與智伯怒帥韓魏之甲以攻趙氏襄子將出曰吾何走乎從者曰長子近且城厚完襄子曰民罷力以完之又斃死以守之其誰與我從者曰邯鄲之倉庫實襄子曰浚民之膏澤以實之又因而殺之其誰與我其􅀳陽乎先主之所屬也尹鐸之所寛也民必和矣乃走􅀳陽三家以國人闈而灌之城不浸者三版沈竈産鼃民無叛意智伯行水魏􅁊子御韓康子驂乘智伯曰吾乃今知水可以亡人國也􅁊子肘康子康子履􅁊子之跗以汾水可以灌安邑絳水可以灌平陽也絺疵謂智伯曰韓魏必反矣智伯曰子何以知之絺疵曰以人事知之夫從韓魏之兵而攻趙趙亡難必及韓魏矣今約勝趙而三分其地城不没者三版人馬相食城降有日而二子無喜志有憂色是非反而何明日智伯以絺疵之言告二子二子曰此夫讒臣欲為趙氏游説使主疑於二家而懈於攻趙氏也不然夫二家豈不利朝夕分趙氏之田而欲為危難不可成之事乎二子出絺疵入曰主何以臣之言告二子也智伯曰子何以知之對曰臣見其視臣端而趨疾知臣得其情故也智伯不悛絺疵請使於齊趙襄子使張孟談潜出見二子曰臣聞脣亡則齒寒今智伯帥韓魏而攻趙趙亡則韓魏為之次矣二子曰我心知其然也恐事未遂而謀泄則禍立至矣張孟談曰謀出二主之口入臣之耳何傷也二子乃隂與張孟談約為之期日而遣之襄子夜使人殺守隄之吏而決水灌智伯軍智伯軍救水而亂韓魏翼而擊之襄子将卒犯其前大敗智伯之衆遂殺智伯盡滅智氏之族唯輔果在臣光曰智伯之亡也才勝徳也夫才與徳異而世俗莫之能辨通謂之賢此其所以失人也夫聦察彊毅之謂才正直中和之謂徳才者徳之資也徳者才之帥也雲夢之竹天下之勁也然而不矯揉不羽括則不能以入堅棠谿之金天下之利也然而不鎔範不砥礪則不能以擊彊是故才徳全盡謂之聖人才徳兼亡謂之愚人徳勝才謂之君子才勝徳謂之小人凡取人之術茍不得聖人君子而與之與其得小人不若得愚人何則君子挾才以為善小人挾才以為惡挾才以為善者善無不至矣挾才以為惡者惡亦無不至矣愚者雖欲為不善智不能周力不能勝譬之乳狗摶人人得而制之小人智足以遂其姦勇足以决其暴是虎而翼者也其為害豈不多哉夫徳者人之所嚴而才者人之所愛愛者易親嚴者易踈是以察者多蔽於才而遺於徳自古昔以來國之亂臣家之敗子才有餘而徳不足以至於顛覆者多矣豈特智伯哉故為國為家者茍能審於才徳之分而知所先後又何失人之足患哉三家分智氏之田趙襄子漆智伯之頭以為飲器智伯之臣豫讓欲為之報仇乃詐為刑人挾匕首入襄子宫中塗厠襄子如厠心動索之獲豫讓左右欲殺之襄子曰智伯死無後而此人欲為報仇眞義士也吾謹避之耳乃舍之豫讓又漆身為癩吞炭為啞行乞於市其妻不識也行見其友其友識之為之泣曰以子之才臣事趙孟必得近幸子乃為所欲為顧不易邪何乃自苦如此求以報仇不亦難乎豫讓曰不可旣已委質為臣而又求殺之是二心也凡吾所為者極難耳然所以為此者将以愧天下後世之為人臣懷二心者也襄子出豫讓伏於橋下襄子至橋馬驚索之得豫讓遂殺之襄子為伯魯之不立也有子五人不肯置後封伯魯之子於代曰代成君早卒立其子浣為趙氏後襄子卒弟􅁊子逐浣而自立一年卒趙氏之人曰􅁊子立非襄主意乃共殺其子復迎浣而立之是為獻子獻子生籍是為烈矦魏斯者􅁊子之孫也是為文矦韓康子生武子武子生䖍是為景矦魏文矦以卜子夏田子方為師每過叚干木之廬必式四方賢士多歸之文矦與羣臣飲酒樂而天雨命駕将適野左右曰今日飲酒樂天又雨君将安之文矦曰吾與虞人期獵雖樂豈可無一㑹期哉乃往身自罷之韓借師於魏以伐趙文矦曰寡人與趙兄弟也不敢聞命趙借師於魏以伐韓文矦應之亦然二國皆怒而去已而知文矦以講於己也皆朝于魏魏由是始大於三晉諸矦莫能與之爭使樂羊伐中山克之以封其子擊文矦問於羣臣曰我何如主皆曰仁君任座曰君得中山不以封君之弟而以封君之子何謂仁君文矦怒任座趨出次問翟璜對曰仁君也文矦曰何以知之對曰臣聞君仁則臣直嚮者任座之言直臣是以知之文矦悦使翟璜召任座而反之親下堂迎之以為上客文矦與田子方飲文矦曰鍾聲不比乎左高田子方笑文矦曰何笑子方曰臣聞之君明樂官不明樂音今君審於音臣恐其聾於官也文矦曰善子擊出遭田子方於道下車伏謁子方不為禮子擊怒謂子方曰富貴者驕人乎貧賤者驕人乎子方曰亦貧賤者驕人耳富貴者安敢驕人國君而驕人則失其國大夫而驕人則失其家失其國者未聞有以國待之者也失其家者未聞有以家待之者也夫士貧賤者言不用行不合則納履而去耳安往而不得貧賤哉子擊乃謝之文矦謂李克曰先生嘗有言曰家貧思良妻國亂思良相今所置非成則璜二子何如對曰卑不謀尊踈不謀戚臣在闕門之外不敢當命文矦曰先生臨事勿讓克曰君弗察故也居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取五者足以定之矣何待克哉文矦曰先生就舍吾之相定矣李克出見翟璜翟璜曰今者聞君召先生而卜相果誰為之克曰魏成翟璜忿然作色曰西河守吳起臣所進也君内以鄴為憂臣進西門豹君欲伐中山臣進樂羊中山已拔無使守之臣進先生君之子無傅臣進屈矦鮒以耳目之所睹記臣何負於魏成李克曰子之言克於子之君者豈将比周以求大官哉君問相於克克之對如是所以知君之必相魏成者魏成食祿千鍾什九在外什一在内是以東得卜子夏田子方叚干木此三人者君皆師之子所進五人者君皆臣之子惡得與魏成比也翟璜逡巡再拜曰璜鄙人也失對願卒為弟子吳起者衞人仕於魯齊人伐魯魯人欲以為将起取齊女為妻魯人疑之起殺妻以求将大破齊師或譛之魯矦曰起始事曾參母死不奔喪曾參絶之今又殺妻以求為君将起殘忍薄行人也且以魯國區區而有勝敵之名則諸矦圖魯矣起恐得罪聞魏文矦賢乃往歸之文矦問諸李克李克曰起貪而好色然用兵司馬穰苴弗能過也於是文矦以為将擊秦拔五城起之為将與士卒最下者同衣食卧不設席行不騎乘親裹贏糧與士卒分勞苦卒有病疽者起為吮之卒母聞而哭之人曰子卒也而将軍自吮其疽何哭為母曰非然也往年吳公吮其父其父戰不還踵遂死於敵吳公今又吮其子妾不知其死所矣是以哭之燕湣公薨子僖公立二十四年王崩子安王驕立盜殺楚聲王國人立其子悼王安王元年秦伐魏至陽狐二年魏韓趙伐楚至桑丘鄭圍韓陽翟韓景矦薨子烈矦取立趙烈矦薨國人立其弟武矦秦簡公薨子惠公立三年王子定奔晉虢山崩壅河四年楚圍鄭鄭人殺其相駟子陽五年曰有食之三月盜殺韓相俠累俠累與濮陽嚴仲子有惡仲子聞軹人聶政之勇以黄金百溢為政母夀欲因以報仇政不受曰老母在政身未敢以許人也及母卒仲子乃使政刺俠累俠累方坐府上兵衞甚衆聶政直入上階刺殺俠累因自皮面抉眼自屠出腸韓人暴其尸於市購問莫能識其姊嫈聞而往哭之曰是軹深井里聶政也以妾尚在之故重自刑以絶從妾柰何畏歿身之誅終滅賢弟之名遂死於政尸之旁六年鄭駟子陽之黨弑繻公而立其弟乙是為康公宋悼公薨子休公田立八年齊伐魯取最韓救魯鄭負黍叛復歸韓九年魏伐鄭晉烈公薨子孝公傾立十一年秦伐韓宜陽取六邑初田常生襄子盤盤生荘子白白生太公和是嵗田和遷齊康公於海上使食一城以奉其先祀十二年秦晉戰于武城齊伐魏取襄陽魯敗齊師于平陸十三年秦侵晉齊田和㑹魏文矦楚人衞人于濁澤求為諸矦魏文矦為之請於王及諸矦王許之十三年秦伐蜀取南鄭魏文矦薨太子擊立是為武矦武矦浮西河而下中流顧謂吳起曰美哉山河之固此魏國之寶也對曰在徳不在險昔三苖氏左洞庭右彭蠡徳義不脩禹滅之夏桀之居左河濟右泰華伊闕在其南羊腸在其北脩政不仁湯放之商紂之國左孟門右太行常山在其北大河經其南脩政不徳武王殺之由此觀之在徳不在險若君不脩徳舟中之人皆敵國也武矦曰善魏置相相田文吳起不悦謂田文曰請與子論功可乎田文曰可起曰将三軍使士卒樂死敵國不敢謀子孰與起文曰不如子起曰治百官親萬民實府庫子孰與起文曰不如子起曰守西河而秦兵不敢東鄉韓趙賓從子孰與起文曰不如子起曰此三者子皆出吾下而位加吾上何也文曰主少國疑大臣未附百姓不信方是之時屬之子乎屬之我乎起默然良久曰屬之子矣久之魏相公叔尚魏公主而害吳起公叔之僕曰起易去也起為人剛勁自喜子先言於君曰吳起賢人也而君之國小臣恐起之無留心也君盍試延以女起無留心則必辭矣子因與起歸而使公主辱子起見公主之賤子也必辭則子之計中矣公叔從之吳起果辭公主魏武矦疑之而未信起懼誅遂奔楚楚悼王素聞其賢至則任之為相起明灋審令捐不急之官廢公族䟽逺者以撫養戰鬭之士要在彊兵破遊說之言從横者於是南平百越北却三􅀳西伐秦諸矦皆患楚之彊而楚之貴戚大臣多怨吳起者秦惠公薨子出公立趙武矦薨國人復立烈矦之太子章是為敬矦韓烈矦薨子文矦立十六年初命齊大夫田和為諸矦趙公子朝作亂岀奔魏與魏襲邯鄲不克十七年秦庶長攺逆獻公于河西而立之殺出子及其母沈之淵旁齊伐魯韓伐鄭取陽城伐宋執宋公齊太公薨子􅁊公午立十九年魏敗趙師于兔臺二十年日有食之既二十一年楚悼王薨貴戚大臣作亂攻吳起起走之王尸而伏之擊起之徒因射剌起并中王尸既葬肅王即位使令尹盡誅為亂者坐起夷宗者七十餘家二十二年齊伐燕取桑丘魏韓趙伐齊至桑丘二十三年趙襲衞不克齊康公薨無子田氏遂并齊而有之是歳齊􅁊公亦薨子威王因齊立二十四年狄敗魏師于澮魏韓趙伐齊至靈丘􅀳孝公薨子靖公俱酒立二十五年蜀伐楚取兹方子思言茍變於衞矦曰其材可將五百乗公曰吾知其可將然變也甞為吏賦於民而食人二鷄子故弗用也子思曰夫聖人之官人猶匠之用木也取其所長棄其所短故􅂎梓連抱而有數尺之朽良工不棄今君處戰國之丗選爪牙之士而以二卵棄干城之將此不可使聞於鄰國也公再拜曰謹受教矣衞矦言計非是而羣臣和者如出一口子思曰以吾觀衞所謂君不君臣不臣者也公丘懿子曰何乃若是子思曰人主自臧則衆謀不進事是而臧之猶却衆謀況和非以長惡乎夫不察事之是非而悅人讃已闇莫甚焉不度理之所在而阿諛求容謟莫甚焉君闇臣謟以居百姓之上民不與也若此不已國無類矣子思言於衞矦曰君之國事將日非矣公曰何故對曰有由然焉君出言自以為是而卿大夫莫敢矯其非卿大夫出言亦自以為是而士庶人莫敢矯其非君臣既自賢矣而羣下同聲賢之賢之則順而有福矯之則逆而有禍如此則善安從生詩曰具曰予聖誰知烏之雌雄抑亦似君之君臣乎魯穆公薨子共公奮立韓文矦薨子哀矦立二十六年王崩子烈王喜立魏韓趙共廢􅀳靖公為家人而分其地烈王元年日有食之韓滅鄭因徙都之趙敬矦薨子成矦種立三年燕敗齊師于林狐魯伐齊入陽關魏伐齊至愽陵燕僖公薨子􅁊公立宋休公薨子辟公立衞愼公薨子聲公訓立四年趙伐衞取都鄙七十三魏敗趙師于北藺五年魏伐楚取魯陽韓嚴遂弑哀矦國人立其子懿矦初哀矦以韓廆為相而愛嚴遂二人甚相害也嚴遂令人剌韓廆於朝廆走哀矦哀矦抱之人剌韓廆兼及哀矦魏武矦薨不立太子子罃與公中緩爭立國内亂六年齊威王來朝是時周室微弱諸矦莫朝而齊獨朝之天下以此益賢威王趙伐齊至鄄魏敗趙師于懷齊威王召即墨大夫語之曰自子之居即墨也毁言日至然吾使人視即墨田野辟人民給官無事東方以寜是子不事吾左右以求助也封之萬家召阿大夫語之曰自子守阿譽言日至吾使人視阿田野不辟人民貧餒昔日趙攻鄄子不救衞取薛陵子不知是子厚幣事吾左右以求譽也是日烹阿大夫及左右甞譽者於是羣臣聳懼莫敢飾詐務盡其情齊國大治彊於天下楚肅王薨無子立其弟良夫是為宣王宋辟公薨子剔成立七年日有食之王崩弟扁立是為顯王魏大夫王錯出奔韓公孫頎謂韓懿矦曰魏亂可取也懿矦乃與趙成矦合兵伐魏戰于濁澤大破之遂圍魏成矦曰殺罃立公中緩割地而退我二國之利也懿矦曰不可殺魏君暴也割地而退貪也不如兩分之魏分為兩不彊於宋衞則我終無魏患矣趙人不聽懿矦不悅以其兵夜去趙成矦亦去罃遂殺公中緩而立是為惠王太史公曰魏惠王之所以身不死國不分者二國之謀不和也若從一家之謀魏必分矣故曰君終無適子其國可破也資治通鑑卷第一
