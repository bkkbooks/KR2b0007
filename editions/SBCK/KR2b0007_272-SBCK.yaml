body:
  text: 臣司馬光奉勑編集後唐紀一洽一年昭陽協莊宗光聖神閔孝皇帝上同光元年春二月晉王下教置百官於四鎮判官中選前朝士族欲以為相河東節度判官盧質為之首質固辭請以義武節度判官豆盧革河東觀察判官盧程為之王即召革程拜行臺左右丞相以質為禮部尚書梁主遣兵部侍郎崔協等冊命吳越王鏐為吳越國王丁卯鏐始建國儀衛名稱多如天子之制謂所居曰宫殿府署曰朝廷教令下統内曰制敕將吏皆稱臣惟不改元表疏首稱吳越國而不言軍以清海節度使兼侍中傳瓘為鎮海鎮東留後揔軍府事置百官有丞相侍郎郎中員外郎客省等使李繼韜雖受晉王命為安義留後終不自安幕僚魏琢牙將申䝉復從而間之曰晉朝無人終為梁所併耳㑹晉王置百官三月召監軍張居翰節度判官任圜赴魏州琢䝉復説繼韜曰王急召二人情可知矣繼韜弟繼逺亦勸繼韜自託於梁繼韜乃使繼逺詣大梁請以澤潞為梁臣梁主大喜更命安義軍曰匡義以繼韜為節度使同平章事繼韜以二子為質安義舊將裴約戍澤州泣諭其衆曰余事故使踰二紀見其分財享士志滅仇讎不幸捐館柩猶未葬而郎君遽背君親吾寧死不能從也遂據州自守梁主以其驍將董璋為澤州刺史將兵攻之繼韜散財募士堯山人郭威往應募威使氣殺人繫獄繼韜惜其才勇而逸之契丹冦幽州晉王問帥於郭崇韜崇韜薦横海節度使李存審時存審卧病己卯徙存審為盧龍節度使輿疾赴鎮以蕃漢馬步副揔管李嗣源領横海節度使晉王築壇於魏州牙城之南夏四月己巳升壇祭告上帝遂即皇帝位國號大唐大赦改元尊母晉國太夫人曹氏為皇太后嫡母秦國夫人劉氏為皇太妃以豆盧革為門下侍郎盧程為中書侍郎並同平章事郭崇韜張居翰為樞密使盧質馮道為翰林學士張憲為工部侍郎租庸使又以義武掌書記李德休為御史中丞德休絳之孫也詔盧程詣晉陽冊太后太妃初太妃無子性賢不妬忌太后為武皇侍姬太妃嘗勸武皇善待之太后亦自謙退由是相得甚歡及受冊太妃詣太后宫賀有喜色太后忸怩不自安太妃曰願吾兒享國久長吾輩獲沒于地園陵有玉餘何足言因相向歔欷豆盧革盧程皆輕淺無它能上特以其衣冠之緒霸府元僚故用之初李紹宏為中門使郭崇韜副之至是自幽州召還崇韜惡其舊人位在已上乃薦張居翰為樞密使以紹宏為宣徽使紹宏由是恨之居翰和謹畏事軍國機政皆崇韜掌之支度務使孔謙自謂才能勤効應為租庸使衆議以謙人微地寒不當遽揔重任故崇韜薦張憲以謙副之謙亦不悦以魏州為興唐府建東京又於太原府建西京又以鎮州為真定府建北都以魏博節度判官王正言為禮部尚書行興唐尹太原馬步都虞候孟知祥為太原尹充西京副留守潞州觀察判官任圜為工部尚書兼真定尹充北京副留守皇子繼岌為北都留守興聖宫使判六軍諸衛事時唐國所有凡十三節度五十州閏月追尊皇曾祖執宜曰懿祖昭烈皇帝祖國昌曰獻祖文皇帝考晉王曰太祖武皇帝立宗廟於晉陽以高祖太宗懿宗昭宗洎懿祖以下為七室甲午契丹冦幽州至易定而還時契丹屢入冦鈔掠饋運幽州食不支半年衛州為梁所取潞州内叛人情岌岌以為梁未可取帝患之㑹鄆州將盧順密來奔先是梁天平節度使戴思逺屯楊村留順密與巡檢使劉遂嚴都指揮使燕顒守鄆州順密言於帝曰鄆州守兵不滿千人遂嚴顒皆失衆心可襲取也郭崇韜等皆以為懸軍逺襲萬一不利虛弃數千人順密不可從帝密召李嗣源於帳中謀之曰梁人志在吞澤潞不備東方若得東平則潰其心腹東平果可取乎嗣源自胡柳有度河之慙常欲立奇功以補過對曰今用兵嵗久生民疲弊苟非出奇取勝大功何由可成臣願獨當此役必有以報帝悦壬寅遣嗣源將所部精兵五千自德勝趣鄆州比及楊劉日已暮隂雨道黑將士皆不欲進高行周曰此天賛我也彼必無備夜度河至城下鄆人不知李從珂先登殺守卒啟關納外兵進攻牙城城中大擾癸卯旦嗣源兵盡入遂拔牙城劉遂嚴燕顒奔大梁嗣源禁焚掠撫吏民執知州事節度副使崔簹判官趙鳳送興唐帝大喜曰緫管真奇才吾事集矣即以嗣源為天平節度使梁王聞鄆州失守大懼斬劉遂嚴燕顒於市罷戴思逺招討使降授宣化留後遣使詰讓北面諸將段凝王彦章等趣令進戰敬翔知梁室已危以繩内靴中入見梁王曰先帝取天下不以臣為不肖所謀無不用今敵勢益彊而陛下棄忽臣言臣身無用不如死引繩將自經梁王止之問所欲言翔曰事急矣非用王彦章為大將不可救也梁主從之以彦章代思逺為北面招討使仍以段凝為副帝聞之自將親軍屯澶州命蕃漢馬步都虞候朱守殷守德勝戒之曰王鐵槍勇決乘憤激之氣必來唐突宜謹備之守殷王幼時所役蒼頭也又遣使遺吳王書告以己克鄆州請同舉兵擊梁五月使者至吳徐温欲持兩端將舟師循海而北助其勝者嚴可求曰若梁人邀我登陸為援何以拒之温乃止梁主召問王彦章以破敵之期彦章對曰三日左右皆失笑彦章出兩日馳至滑州辛酉置酒大㑹隂遣人具舟於楊村夜命甲士六百皆持巨斧載冶者具鞲炭乘流而下會飲尚未散彦章陽起更衣引精兵數千循河南岸趨徳勝天微雨朱守殷不為備舟中兵舉鏁燒斷之因以巨斧斬浮橋而彦章引兵急擊南城浮橋斷南城遂破斬首數千級時受命適三日矣守殷以小舟載甲士濟河救之不及彦章進攻潘張麻家口景店諸寨皆拔之聲勢大振帝遣宦者焦彦賔急􅃐楊劉與鎮使李周固守命守殷弃德勝北城撤屋材爲栰載兵械浮河東下助楊劉守備徙其芻糧薪炭於澶州所秏失殆半王彦章亦撤南城屋材浮河而下各行一岸每遇灣曲輒於中流交鬭飛矢雨集或全舟覆沒一日百戰玄有勝負比及楊劉殆亡士卒之半己巳王彦章段凝以十萬之衆攻楊劉百道俱進晝夜不息連巨艦九艘横亘河津以絶援兵城垂陷者數四頼李周悉力拒之與士卒同甘苦彦章不能克退屯城南為連營以守之楊劉告急於帝請日行百里以赴之帝引兵救之曰李周在内何憂日行六十里不廢畋獵六月乙亥至楊劉梁兵塹壘重複嚴不可入帝患之問計於郭崇韜對曰今彦章據守津要意謂可以坐取東平茍大軍不南則東平不守矣臣請築壘於博州東岸以固河津旣得以應接東平又可以分賊兵勢但慮彦章詗知徑來薄我城不能就願陛下募敢死之士日令挑戰以綴之茍彦章旬日不東則城成矣時李嗣源守鄆州河北聲問不通人心漸離不保朝夕㑹梁右先鋒指揮使康延孝密請降於嗣源延孝者太原胡人有罪亡奔梁時􅀠段凝麾下嗣源遣押牙臨漳范延光送延孝蠟書詣帝延光因言於帝曰楊劉控扼已固梁人必不能取請築壘馬家口以通鄆州之路帝從之遣崇韜將萬人夜發倍道􅃐博州至馬家口度河築城晝夜不息帝在楊劉與梁人晝夜苦戰崇韜築新城凡六日王彦章聞之將兵數萬人馳至戊子急攻新城連巨艦十餘艘於中流以絶援路時板築僅畢城猶卑下沙土疏惡未有樓櫓及守備崇韜慰諭士卒以身先之四面拒戰遣間使告急於帝帝自楊劉引大軍救之陳於新城西岸城中望之増氣大呼叱梁軍梁人斷紲歛艦帝檥舟將度彦章解圍退保鄒家口鄆州奏報始通李嗣源密表請正朱守殷覆軍之罪帝不從秋七月丁未帝引兵循河而南彦章等弃鄒家口復趣楊劉甲寅遊奕將李紹興敗梁遊兵於清丘驛南段凝以為唐兵已自上流渡驚駭失色面數彦章尤其深入乙卯蜀侍中魏王宗侃卒戊午帝遣騎將李紹榮直抵梁營擒其斥候梁人益恐又以火栰焚其連艦王彦章等聞帝引兵已至鄒家口己未解楊劉圍走保楊村唐兵追擊之復屯德勝梁兵前後急攻諸城士卒遭矢石溺水暍死者且萬人委弃資糧鎧仗鍋幕動以千計楊劉比至圍解城中無食已三日矣王彦章疾趙張亂政及為招討使謂所親曰待我成功還當盡誅姦臣以謝天下趙張聞之私相謂曰我輩寧死於沙陀不可為彦章所殺相與恊力傾之段凝素疾彦章之能而諂附趙張在軍中與彦章動相違戾百方沮橈之惟恐其有功濳伺彦章過失以聞於梁主每捷奏至趙張悉歸功於凝由是彦章功竟無成及歸楊村梁主信讒猶恐彦章旦夕成功難制徵還大梁使將兵㑹董璋攻澤州甲子帝至楊劉勞李周曰微卿善守吾事敗矣中書侍郎同平章事盧程以私事干興唐府府吏不能應鞭吏背光祿卿兼興唐少尹任團圜之弟帝之從姊壻也詣程訴之程罵曰公何等蟲豸欲倚婦力邪團訴於帝帝怒曰朕誤相此癡物乃敢辱吾九卿欲賜自盡盧質力救之乃貶右庶子裴約遣間使告急於帝帝曰吾兄不幸乃生梟獍裴約獨能知逆順顧謂北京内牙馬步都指揮使李紹斌曰澤州彈丸之地朕無所用卿為我取裴約以來八月壬申紹斌將甲士五千救之未至城已陷約死帝深惜之甲戌帝自楊劉還興唐梁主命於滑州決河東注曹濮及鄆以限唐兵初梁主遣段凝監大軍於河上敬翔李振屢請罷之梁主曰凝未有過振曰俟其有過則社稷危矣至是凝厚賂趙張求為招討使翔振力爭以為不可趙張主之竟代王彦章為北面招討使於是宿將憤怒士卒亦不服天下兵馬副元帥張宗奭言於梁主曰臣為副元帥雖衰朽猶足為陛下扞禦北方段凝晚進功名未能服人衆議詾詾恐貽國家深憂敬翔曰將帥繫國安危今國勢已爾陛下豈可尚不留意邪梁主皆不聽戊子凝將全軍五萬營于王村自高陵津濟河剽掠澶州諸縣至于頓丘梁主又命王彦章將保鑾騎士及它兵合萬人屯兖鄆之境謀復鄆州以張漢傑監其軍庚寅帝引兵屯朝城戊戌康延孝帥百餘騎來奔帝解所御錦袍玉帶賜之以為南面招討都指揮使領博州刺史帝屏人問延孝以梁事對曰梁朝地不為狹兵不為少然迹其行事終必敗亡何則主旣暗懦趙張兄弟擅權内結宫掖外納貨賂官之高下唯視賂之多少不擇才德不校勲勞段凝智勇俱無一旦居王彦章霍彦威之右自將兵以來專率斂行伍以奉權貴梁主每出一軍不能專任將帥常以近臣監之進止可否動為所制近又聞欲數道出兵令董璋引陜虢澤潞之兵自石㑹關趣太原霍彦威以汝洛之兵自相衛邢洺冦鎮定王彦章張漢傑以禁軍攻鄆州段凝杜晏球以大軍當陛下決以十月大舉臣竊觀梁兵聚則不少分則不多願陛下養勇蓄力以待其分兵帥精騎五千自鄆州直抵大梁擒其偽主旬月之間天下定矣帝大悦蜀主以文思殿大學士韓昭内皇城使潘在迎武勇軍使顧在珣為狎客陪侍遊宴與宫女雜坐或為豔歌相唱和或談嘲謔浪鄙俚䙝慢無所不至蜀主樂之在珣彦朗之子也時樞密使宋光嗣等專斷國事恣為威虐務徇蜀主之欲以盜其權宰相王鍇庾傳素等各保寵祿無敢規正潘在迎每勸蜀主誅諫者無使謗國嘉州司馬劉贊獻陳後主三閣圖并作歌以諷賢良方正蒲禹卿對䇿語極切直蜀主雖不罪亦不能用也九月庚戌蜀主以重陽宴近臣於宣華苑酒酣嘉王宗壽乘間極言社稷將危流涕不已韓昭潘在迎曰嘉王好酒悲因諧笑而罷帝在朝城梁段凝進至臨河之南澶西相南日有冦掠自德勝失利以來䘮芻糧數百萬租庸副使孔謙暴歛以供軍民多流亡租税益少倉廩之積不支半嵗澤潞未下盧文進王郁引契丹屢過瀛涿之南傳聞俟草枯冰合深入為冦又聞梁人欲大舉數道入冦帝深以為憂召諸將㑹議宣徽使李紹宏等皆以為鄆州城門之外皆為冦境孤逺難守有之不如無之請以易衛州及黎陽於梁與之約和以河為境休兵息民俟財力稍集更圖後舉帝不悦曰如此吾無葬地矣乃罷諸將獨召郭崇韜問之對曰陛下不櫛沐不解甲十五餘年其志欲以雪家國之讎恥也今巳正尊號河北士庶日望升平始得鄆州尺寸之地不能守而弃之安能盡有中原乎臣恐將士解體將來食盡衆散雖畫河為境誰為陛下守之臣嘗細詢康延孝以河南之事度已料彼日夜思之成敗之機決在今嵗梁今悉以精兵授段凝據我南鄙又決河自固謂我猝不能渡恃此不復為備使王彦章侵逼鄆州其意兾有姦人動揺變生於内耳段凝本非將材不能臨機決䇿無足可畏降者皆言大梁無兵陛下若留兵守魏固保楊劉自以精兵與鄆州合勢長驅入汴彼城中旣空虛必望風自潰茍偽主授首則諸將自降矣不然今秋榖不登軍糧將盡若非陛下決志大功何由可成諺曰當道築室三年不成帝王應運必有天命在陛下勿疑耳帝曰此正合朕志丈夫得則為王失則為虜吾行決矣司天奏今嵗天道不利深入必無功帝不聽王彦章引兵踰汶水將攻鄆州李嗣源遣李從珂將騎兵逆戰敗其前鋒於遞坊鎮獲將士三百人斬首二百級彦章退保中都戊辰捷奏至朝城帝大喜謂郭崇韜曰鄆州告捷足壯吾氣己巳命將士悉遣其家歸興唐冬十月辛未朔日有食之帝遣魏國夫人劉氏皇子繼岌歸興唐與之訣曰事之成敗在此一決若其不濟當聚吾家於魏宫而焚之仍命豆盧革李紹宏張憲王正言同守東京壬申帝以大軍自楊劉濟河癸酉至鄆州中夜進軍踰汶以李嗣源為前鋒甲戌旦遇梁兵一戰敗之追至中都圍其城城無守備少頃梁兵潰圍出追擊破之王彦章以數十騎走龍武大將軍李紹奇單騎追之識其聲曰王鐵槍也拔矟刺之彦章重傷馬躓遂擒之并擒都監張漢傑曹州刺史李知節禆將趙廷隱劉嗣彬等二百餘人斬首數千級廷隱開封人嗣彬知俊之族子也彦章嘗謂人曰李亞子鬬雞小兒何足畏至是帝謂彦章曰爾常謂我小兒今日服未又問爾名善將何不守兖州中都無壁壘何以自固彦章對曰天命己去無足言者帝惜彦章之材欲用之賜藥傅其創屢遣人誘諭之彦章曰余本匹夫䝉梁恩位至上將與皇帝交戰十五年今兵敗力窮死自其分縱皇帝憐而生我我何面目見天下之人乎豈有朝為梁將暮為唐臣此我所不為也帝復遣李嗣源自往諭之彦章卧謂嗣源曰汝非邈佶烈乎彦章素輕嗣源故以小名呼之於是諸將稱賀帝舉酒屬李嗣源曰今日之功公與崇韜之力也曏從紹宏輩語大事去矣帝又謂諸將曰曏所患惟王彦章今已就擒是天意滅梁也段凝猶在河上進退之計宜何向而可諸將以為傳者雖云大梁無備未知虛實今東方諸鎮兵皆在段凝麾下所餘空城耳以陛下天威臨之無不下者若先廣地東傅于海然後觀釁而動可以萬全康延孝固請亟取大梁李嗣源曰兵貴神速今彦章就擒段凝必未之知就使有人走告之疑信之間尚須三日設若知吾所向即發救兵直路則阻決河須自白馬南渡數萬之衆舟檝亦難猝辦此去大梁至近前無山險方陳横行晝夜兼程信宿可至段凝未離河上友貞已為吾擒矣延孝之言是也請陛下以大軍徐進臣願以千騎前驅帝從之令下諸軍皆踴躍願行是夕嗣源帥前軍倍道趣大梁乙亥帝發中都舁王彦章自隨遣中使問彦章曰吾此行克乎對曰段凝有精兵六萬雖主將非材亦未肯遽爾倒戈殆難克也帝知其終不為用遂斬之丁丑至曹州梁守將降王彦章敗卒有先至大梁告梁主以彦章就擒唐軍長驅且至者梁主聚族哭曰運祚盡矣召羣臣問䇿皆莫能對梁王謂敬翔曰朕居常忽卿所言以至於此今事急矣卿勿以為懟將若之何翔泣曰臣受先帝厚恩殆將三紀名為宰相其實朱氏老奴事陛下如郎君臣前後獻言莫匪盡忠陛下初用段凝臣極言不可小人朋比致有今日今唐兵且至段凝限於水北不能赴救臣欲請陛下出居避狄陛下必不聽從欲請陛下出竒合戰陛下必不果決雖使良平更生誰能為陛下計者臣願先賜死不忍見宗廟之亡也因與梁主相向慟哭梁主遣張漢倫馳騎追段凝軍漢倫至滑州墜馬傷足復限水不能進時城中尚有控鶴軍數千朱珪請帥之出戰梁主不從命開封尹王瓉驅市人乘城為備初梁陜州節度使邵王友誨全昱之子也性頴悟人心多向之或言其誘致禁軍欲爲亂梁主召還與其兄友諒友能並幽于别第及唐師將至梁主疑諸兄弟乗危謀亂并皇弟賀王友雍建王友徽盡殺之梁主登建國樓面擇親信厚賜之使衣野服齎蠟詔促段凝軍旣辭皆亡匿或請幸洛陽收集諸軍以拒唐唐雖得都城勢不能久留或請幸段凝軍控鶴都指揮使皇甫麟曰凝本非將材官由幸進今危窘之際望其臨機制勝轉敗爲功難矣且凝聞彦章軍敗其膽已破安知能終爲陛下盡節乎趙巖曰事勢如此一下此樓誰心可保梁主乃止復召宰相謀之鄭珏請自懷傳國寶詐降以紓國難梁主曰今日固不敢愛寶但如卿此䇿竟可了否珏俛首久之曰但恐未了左右皆縮頸而笑梁主日夜涕泣不知所為置傳國寶於卧内忽失之巳為左右竊之迎唐軍矣戊寅或告唐軍巳過曹州塵埃漲天趙巖謂從者曰吾待温許州厚必不負我遂奔許州梁主謂皇甫麟曰李氏吾世讎理難降首不可俟彼刀鋸吾不能自裁卿可斷吾首麟泣曰臣為陛下揮劒死唐軍則可矣不敢奉此詔梁主曰卿欲賣我邪麟欲自剄梁主持之曰與卿俱死麟遂弑梁主因自殺梁主為人温恭儉約無荒􅁋之失但寵信趙張使擅威福疎弃敬李舊臣不用其言以至於亡己卯旦李嗣源軍至大梁攻封丘門王瓉開門出降嗣源入城撫安軍民是日帝入自梁門百官迎謁於馬首拜伏請罪帝慰勞之使各復其位李嗣源迎賀帝喜不自勝手引嗣源衣以頭觸之曰吾有天下卿父子之功也天下與爾共之帝命訪求梁主頃之或以其首獻李振謂敬翔曰有詔洗滌吾輩相與朝新君乎翔曰吾二人為梁宰相君昬不能諌國亡不能救新君若問將何辭以對是夕未曙或報翔曰崇政李太保已入朝矣翔歎曰李振謬為丈夫朱氏與新君世為仇讎今國亡君死縱新君不誅何面目入建國門乎乃縊而死庚辰梁百官復待罪於朝堂帝宣敕赦之趙巖至許州温昭圖迎謁歸第斬首來獻盡没巖所齎之貨昭圖復名韜辛巳詔王瓉收朱友貞尸殯於佛寺漆其首函之藏於太社段凝自滑州濟河入援以諸軍排陳使杜晏球為前鋒至封丘遇李從珂晏球先降壬午凝將其衆五萬至封丘亦解甲請降凝帥諸大將先詣闕待罪帝勞賜之慰諭士卒使各復其所凝出入公卿閒揚揚自得無愧色梁之舊臣見者皆欲齕其面抉其心丙戌詔貶梁中書侍郎同平章事鄭珏為萊州司户蕭頃為登州司户翰林學士劉岳為均州司馬任賛為房州司馬姚顗為復州司馬封翹為唐州司馬李懌為懷州司馬竇夢徵為沂州司馬崇政學士劉光素為密州司户陸崇為安州司户御史中丞王權為隨州司户以其世受唐恩而仕梁貴顯故也岳崇􅀛之從子顗萬年人翹敖之孫懌京兆人權􅀛之孫也段凝杜晏球上言偽梁要人趙巖趙鵠張希逸張漢倫張漢傑張漢融朱珪等竊弄威福殘蠧羣生不可不誅詔敬翔李振首佐朱温共傾唐祚契丹撒剌阿撥叛兄弃母負恩背國宜與巖等並族誅於市自餘文武將吏一切不問又詔追廢朱温朱友貞爲庶人毁其宗廟神主帝之與梁戰於河上也梁拱宸左廂都指揮使陸思鐸善射常於笴上自鏤姓名射帝中馬鞍帝拔箭藏之至是思鐸從衆俱降帝出箭示之思鐸伏地待罪帝慰而釋之尋授龍武右廂都指揮使以豆盧革尚在魏命樞密使郭崇韜權行中書事梁諸藩鎮稍稍入朝或上表待罪帝皆慰釋之宋州節度使袁象先首來入朝陜州留後霍彦威次之象先輦珍貨數十萬徧賂劉夫人及權貴伶官宦者旬日中外爭譽之恩寵隆異己丑詔偽庭節度觀察防禦團練使刺史及諸將校並不議改更將校官吏先奔偽庭者一切不問庚寅豆盧革至自魏甲午加崇韜守侍中領成德節度使崇韜權兼内外謀猷規益竭忠無隱頗亦薦引人物豆盧革受成而已無所裁正丙申賜滑州留後段凝姓名曰李紹欽耀州刺史杜晏球曰李紹虔乙酉梁西都留守河南尹張宗奭來朝復名全義獻幣馬千計帝命皇子繼岌皇弟存紀等兄事之帝欲發梁太祖墓斲棺焚其尸全義上言朱温雖國之深讎然其人已死刑無可加屠滅其家足以為報乞免焚斲以存聖恩帝從之但鏟其闕室削封樹而已戊戌加天平節度使李嗣源兼中書令以北京留守継岌為東京留守同平章事帝遣使宣諭諸道梁所除節度使五十餘人皆上表入貢楚王殷遣其子牙内馬步都指揮使希範入見納洪鄂行營都統印上本道將吏籍荆南節度使高季昌聞帝滅梁避唐廟諱更名季興欲自入朝梁震曰唐有吞天下之志嚴兵守險猶恐不自保况數千里入朝乎且公朱氏舊將安知彼不以仇敵相遇乎季興不從帝遣使以滅梁告吳蜀二國皆懼徐温尤嚴可求曰公前沮吾計今將奈何可求笑曰聞唐主始得中原志氣驕滿御下無法不出數年將有内變吾但當卑辭厚禮保境安民以待之耳唐使稱詔吳人不受帝易其書用敵國之禮曰大唐皇帝致書于吳國主吳人復書稱大吳國主上大唐皇帝辭禮如牋表吳人有告壽州團練使鍾泰章侵市官馬者徐知誥以吳王之命遣滁州刺史王稔巡霍丘因代為壽州團練使以泰章為饒州刺史徐温召至金陵使陳彦謙詰之者三皆不對或問泰章何以不自辨泰章曰吾在楊州十萬軍中號稱壯士壽州去淮數里步騎不下五千茍有佗志豈王稔單騎能代之乎我義不負國雖黜為縣令亦行况刺史乎何為自辨以彰朝廷之失徐知誥欲以法繩諸將請收泰章治罪徐温曰吾非泰章已死於張顥之手今日富貴安可負之命知誥為子景通娶其女以解之彗星見輿鬼長丈餘蜀司天監言國有大災蜀主詔於玉局化設道場右補闕張雲上疏以為百姓怨氣上徹於天故彗星見此乃亡國之徵非祈禳可弭蜀王怒流雲黎州卒於道郭崇韜上言河南節度使刺史上表者但稱姓名未除新官恐負憂疑十一月始降制以新官命之滑州留後李紹欽因伶人景進納貨於宫掖除泰寧節度使帝幼善音律故伶人多有寵常侍左右帝或時自傅粉墨與優人共戲於庭以悦劉夫人優名謂之李天下嘗因為優自呼曰李天下李天下優人敬新磨遽前批其頰帝失色羣優亦駭愕新磨徐曰理天下者只有一人尚誰呼邪帝悦厚賜之帝嘗畋於中牟踐民稼中牟令當馬前諌曰陛下為民父母柰何毁其所食使轉死溝壑乎帝怒叱去將殺之敬新磨追擒至馬前責之曰汝為縣令獨不知吾天子好獵邪奈何縱民耕種以妨吾天子之馳騁乎汝罪當死因請行刑帝笑而釋之諸伶出入宫掖侮弄縉紳羣臣憤嫉莫敢出氣亦有反相附託以希恩澤者四方藩鎮爭以貨賂結之其尤蠧政害人者景進為之首進好采閭閻鄙細事聞於上上亦欲知外間事遂委進以耳目進每奏事常屏左右問之由是進得施其讒慝干預政事自將相大臣皆憚之孔巖常以兄事之壬寅岐王遣使致書賀帝滅梁以季父自居辭禮甚倨癸卯河中節度使朱友謙入朝帝與之宴寵錫無筭張全義請帝遷都洛陽從之乙巳賜朱友謙姓名曰李繼麟命繼岌兄事之以康延孝為鄭州防禦使賜姓名曰李紹琛廢北都復為成德軍賜宣武節度使袁象先姓名曰李紹安匡國節度使温韜入朝賜姓名曰李紹冲紹冲多齎金帛賂劉夫人及權貴伶宦旬日復遣還鎮郭崇韜曰國家為唐雪恥温韜發唐山陵殆徧其罪與朱温相埓耳何得復居方鎮天下義士其謂我何上曰入汴之初已赦其罪竟遣之戊申中書奏以國用未充請量留三省寺監官餘並停俟見任者滿二十五月以次代之其西班上將軍以下令樞密院準此從之人頗咨怨初梁均王將祀南郊於洛陽聞楊劉陷而止其儀物具在張全義請上亟幸洛陽謁廟畢即祀南郊從之丙辰復以梁東京開封府為宣武軍汴州梁以宋州為宣武軍詔更名歸德軍詔文武官先詣洛陽議者以郭崇韜勲臣為宰相不能知朝廷典故當用前朝名家以佐之或薦禮部尚書薛廷珪太子少保李琪嘗為太祖冊禮使皆耆宿有文宜為相崇韜奏廷珪浮華無相業琪傾險無士風尚書左丞趙光􅅌亷潔方正自梁未亡北人皆稱其有宰相器豆盧革薦禮部侍郎韋説諳練朝章丁巳以光􅅌爲中書侍郎與説並同平章事光􅅌光逢之弟説岫之子廷珪逢之子也光􅅌性輕率喜自矜説謹重守常而已趙光逢自梁朝罷相杜門不交賔客光􅅌時往見之語及政事佗日光逢署其户曰請不言中書事租庸副使孔謙畏張憲公正欲專使務言於郭崇韜曰東京重地須大臣鎮之非張公不可崇韜即奏以憲爲東京副留守知留守事戊午以豆盧革判租庸兼諸道鹽鐵轉運使謙彌失望己未加張全義守尚書令高季興守中書令時季興入朝上待之甚厚從容問曰朕欲用兵於吳蜀二國何先季興以蜀道險難取乃對曰吳地薄民貧克之無益不如先伐蜀蜀土富饒又主荒民怨伐之必克克蜀之後順流而下取吳如反掌耳上曰善辛酉復以永平軍大安府為西京京兆府甲子帝發大梁十二月庚午至洛陽吳越王鏐以行軍司馬杜建徽為左丞相壬申詔以汴州宫苑為行宫以耀州為順義軍延州為彰武軍鄧州為威勝軍晉州為建雄軍安州為安逺軍自餘藩鎮皆復唐舊名庚辰御史臺奏朱温簒逆刪改本朝律令格式悉收舊本焚之今臺司及刑部大理寺所用皆偽庭之法聞定州敕庫獨有本朝律令格式具在乞下本道錄進從之李繼韜聞上滅梁憂懼不知所為欲北走契丹㑹有詔徵詣闕繼韜將行其弟繼逺曰兄以反為名何地自容往與不往等耳不若深溝高壘坐食積粟猶可延嵗月入朝立死矣或謂繼韜曰先令公有大功於國主上於公季父也往必無虞繼韜母楊氏善蓄財家貲百萬乃與楊氏偕行齎銀四十萬兩它貨稱是大布賂遺伶人宦官爭為之言曰繼韜初無邪謀為姦人所惑耳嗣昭親賢不可無後楊氏復入宫見帝泣請其死以其先人為言又求哀於劉夫人劉夫人亦為之言及繼韜入見待罪上釋之留月餘屢從遊畋寵待如故皇弟義成節度使同平章事存渥深詆訶之繼韜心不自安復賂左右求還鎮上不許繼韜濳遣人遺繼逺書教軍士縱火兾天子復遣已撫安之事泄辛巳貶登州長史尋斬於天津橋南并其二子遣使斬繼逺於上黨以李繼達充軍城巡檢召權知軍州事李繼儔詣闕繼儔據有繼韜之室料簡妓妾搜校貨財不時即路繼達怒曰吾家兄弟父子同時誅死者四人大兄曽無骨肉之情貪􅁋如此吾誠羞之無面視人生不如死甲申繼達衰服帥麾下百騎坐㦸門呼曰誰與吾反者因攻牙宅斬繼儔節度副使李繼珂聞亂募市人得千餘攻子城繼達知事不濟開東門歸私第盡殺其妻子將奔契丹出城數里從騎皆散乃自剄甲申吳王復遣司農卿洛陽盧蘋來奉使嚴可求豫料帝所問教蘋應對旣至皆如可求所料蘋還言唐主荒于遊畋嗇財拒諌内外皆怨高季興在洛陽帝左右伶官求貨無厭季興忿之帝欲留季興郭崇韜諌曰陛下新得天下諸侯不過遣子弟將佐入貢惟高季興身自入朝當襃賞以勸來者乃羈留不遣弃信虧義沮四海之心非計也乃遣之季興倍道而去至許州謂左右曰此行有二失來朝一失縱我去一失過襄州節度使孔勍留宴中夜斬關而去丁酉至江陵握梁震手曰不用君言幾不免虎口又謂將佐曰新朝百戰方得河南乃對功臣舉手云吾於十指上得天下矜伐如此則它人皆無功矣其誰不解體又荒于禽色何能久長吾無憂矣乃
