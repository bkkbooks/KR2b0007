body:
  text: 初柔然頭兵可汗始得返國事魏盡禮及永安以後雄據北方禮漸驕倨雖信使不絶不復稱臣頭兵嘗至洛陽心慕中國乃置侍中黄門等官後得魏汝陽王典籖淳于覃親寵任事以為祕書監使典文翰及兩魏分裂頭兵轉不遜數為邊患魏丞相泰以新都􅀜中方有事山東欲結婚以撫之以舎人元翌女為化政公主妻頭兵弟塔寒又言於魏主請廢乙弗后納頭兵之女甲辰以乙弗后為尼使扶風王孚迎頭兵女為后頭兵遂留東魏使者元整不報其使三月辛酉東魏丞相歡以沙苑之敗請解大丞相詔許之頃之復故柔然送悼后於魏車七百乗馬萬匹駝二千頭至黑鹽池遇魏所遣鹵簿儀衛柔然營幕户席皆東向扶風王孚請正南面后曰我未見魏主固柔然女也魏仗南面我自東向丙子立皇后郁乆閭氏丁丑大赦以王盟為司徒丞相泰朝于長安還屯華州夏四月庚寅東魏髙歡朝于鄴壬辰還晉陽五月甲戍東魏遣兼散騎常侍鄭伯猷來聘秋七月東魏荆州刺史王則宼淮南癸亥詔以東冶徒李㣧之得如來舎利大赦東魏侯景髙敖曹等圍魏獨孤信于金墉太師歡帥大軍繼之景悉燒洛陽内外官寺民居存者什二三魏主將如洛陽拜園陵㑹信等告急遂與丞相泰俱東命尚書左僕射周恵達輔太子欽守長安開府儀同三司李弼車􅀐大將軍逹奚武帥千􅀐為前驅八月庚寅丞相泰至榖城侯景等欲整陳以待其至儀同三司太安莫多婁貸文請帥所部擊其前鋒景等固止之貸文勇而專不受命與可朱渾道元以千􅀐前進夜遇李弼逹奚武於孝水弼命軍士鼓譟曵柴揚塵貸文走弼追斬之道元單􅀐獲免悉俘其衆送􅁪農泰進軍瀍東侯景等夜解圍去辛卯泰帥輕􅀐追景至河上景為陳北據河橋南屬邙山與泰合戰泰馬中流矢驚逸遂失所之泰墜地東魏兵追及之左右皆散都督李穆下馬以策抶泰背罵曰籠東軍士爾曹主何在而獨留此追者不疑其貴人捨之而過穆以馬授泰與之俱逸魏兵復振擊東魏兵大破之東魏兵北走京兆忠武公髙敖曹意輕泰建旗蓋以陵陳魏人盡銳攻之一軍皆没敖曹單􅀐走投河陽南城守將北豫州刺史髙永樂歡之從祖兄子也與敖曹有怨閉門不受敖曹仰呼求繩不得拔刀穿闔未徹而追兵至敖曹㐲橋下追者見其從奴持金帶問敖曹所在奴指示之敖曹知不免奮頭曰來與汝開國公追者斬其首去髙歡聞之如喪肝膽杖髙永樂二百贈敖曹太師大司馬太尉泰賞殺敖曹者布絹萬叚嵗嵗稍與之比及周亡猶未能足魏又殺東魏西兖州刺史宋顯等虜甲士萬五千人赴河死者以萬數初歡以万俟普尊老特禮之甞親扶上馬其子洛免冠稽首曰願出死力以報深恩及邙山之戰諸軍北度橋洛獨勒兵不動謂魏人曰万俟受洛干在此能來可來也魏人畏之而去歡名其所營地為回洛是日東西魏置陳旣大首尾懸逺從旦至未戰數十合氛霧四塞莫能相知魏獨孤信李逺居右趙貴怡峯居左戰並不利又未知魏主及丞相泰所在皆弃其卒先歸開府儀同三司李虎念賢等為後軍見信等退即與俱去泰由是燒營而歸留儀同三司長孫子彦守金墉王思政下馬舉長矟左右横擊一舉輙踣數人陷陳旣深從者盡死思政􅀍重創悶絶㑹日暮敵亦收兵思政毎戰常著破衣弊甲敵不知其將帥故得免帳下督雷五安於戰處哭求思政㑹其已蘇割衣裹創扶思政上馬夜乆始得還營平東將軍蔡祐下馬步􅃲左右勸乗馬以僃倉猝祐怒曰丞相愛我如子今日豈惜生乎帥左右十餘人合聲大呼擊東魏兵殺傷甚衆東魏人圍之十餘重祐彎弓持滿四面拒之東魏人募厚甲長刀者直進取之去祐可三十步左右勸射之祐曰吾曹之命在此一矢豈可虚發將至十步祐乃射之應弦而倒東魏兵稍却祐徐引還魏主至􅁪農守將已弃城走所虜降卒在􅁪農者相與閉門拒守丞相泰攻拔之誅其魁首數百人蔡祐追及泰於􅁪農夜見泰泰曰承先爾來吾無憂矣泰驚不得寢枕祐股然後安祐毎從泰戰常為士卒先戰還諸將皆争功祐終無所言泰毎難曰承先口不言勲我當代其論叙泰留王思政鎭􅁪農除侍中東道行臺魏之東伐也􅀜中留守兵少前後所虜東魏士卒散在民間聞魏兵敗謀作亂李虎等至長安計無所出與太尉王盟僕射周惠逹等奉太子欽出屯渭北百姓互相剽掠􅀜中大擾於是沙苑所虜東魏都督趙青雀雍州民于伏德等遂反青雀據長安子城伏德保咸陽與咸陽太守慕容思慶各收降卒以拒還兵長安大城民相帥以拒青雀日與之戰大都督侯莫陳順擊賊屢破之賊不敢出順崇之兄也扶風公王羆鎭河東大開城門悉召軍士謂曰今聞大軍失利青雀作亂諸人莫有固志王羆受委於此以死報恩有能同心者可共固守必恐城陷任自出城衆感其言皆無異志魏主留閺鄉丞相泰以士馬疲弊不可速進且謂青雀等烏合不能為患曰我至長安以輕􅀐臨之必當面縛通直散􅀐常侍吳郡陸通諌曰賊逆謀乆定必無遷善之心蜂蠆有毒安可輕也且賊詐言東宼將至今若以輕􅀐臨之百姓謂為信然益當驚擾今軍雖疲弊精銳尚多以明公之威揔大軍以臨之何憂不克泰從之引兵西入父老見泰至莫不悲喜士女相賀華州刺史宇文導引兵襲咸陽斬思慶擒伏德南度渭與泰㑹攻青雀破之太保梁景睿以疾留長安與青雀通謀泰殺之東魏太師歡自晉陽將七千􅀐至孟津未濟聞魏師已遁遂濟河遣别將追魏師至崤不及而還歡攻金墉長孫子彦弃城走焚城中室屋俱盡歡毁金墉而還東魏之遷鄴也主客郎中裴讓之留洛陽獨孤信之敗也讓之弟諏之隨丞相泰入􅀜為大行臺倉曹郎中歡囚讓之兄弟五人讓之曰昔諸葛亮兄弟事吳蜀各盡其心況讓之老母在此不忠不孝必不為也明公推誠待物物亦歸心若用猜忌去霸業逺矣歡皆釋之九月魏主入長安丞相泰還屯華州東魏大都督賀拔仁擊邢磨納盧仲禮等平之盧景裕本儒生太師歡釋之召館於家使教諸子景裕講論精微難者或相詆訶大聲厲色言至不遜而景裕神彩儼然風調如一從容往復無際可尋性清静歴官屢有進退無得失之色弊衣麤食恬然自安終日端嚴如對賔客冬十月魏歸髙敖曹竇泰莫多婁貸文之首于東魏散􅀐常侍劉孝儀等聘于東魏十二月魏是云寳襲洛陽東魏洛州刺史王元軌弃城走都督趙剛襲廣州拔之於是自襄廣巳西城鎭復為魏魏自正光以後四方多事民避賦役多為僧尼至二百萬人寺有三萬餘區至是東魏始詔牧守令長擅立寺者計其功庸以枉灋論初魏伊川土豪李長壽為防蠻都督積功至北華州刺史孝武帝西遷長壽帥其徒拒東魏魏以長壽為廣州刺史侯景攻拔其壁殺之其子延孫復收集父兵以拒東魏魏之貴臣廣陵王欣録尚書長孫稚等皆攜家往依之延孫資遣衞送使逹􅀜中東魏髙歡患之數遣兵攻延孫不能克魏以延孫為京南行臺節度河南諸軍事廣州刺史延孫以澄清伊洛為己任魏以延孫兵少更以長壽之壻京兆韋灋保為東洛州刺史配兵數百以助之灋保名祐以字行旣至與延孫連兵置柵於伏流獨孤信之入洛陽也欲繕脩宫室使外兵郎中天水權景宣帥徒兵三千出採運㑹東魏兵至河南皆叛景宣間道西走與李延孫相㑹攻孔城拔之洛陽以南尋亦西附丞相泰即留景宣守張白塢節度東南諸軍應􅀜西者是嵗延孫為其長史楊伯蘭所殺韋法保即引兵據延孫之柵東魏將段琛等據宜陽遣陽州刺史牛道􅁪誘魏邊民魏南兖州刺史韋孝寛患之乃詐為道􅁪與孝寛書論歸欵之意使諜人遺之於琛營琛果疑道􅁪孝寛乗其猜阻出兵襲之擒道􅁪及琛崤澠遂清東道行臺王思政以玉壁險要請築城自􅁪農徙鎭之詔加都督汾晉并州諸軍事并州刺史行臺如故東魏以髙澄攝吏部尚書始改崔亮年勞之制銓擢賢能又沙汰尚書郎妙選人地以充之凡才名之士雖未薦擢皆引致門下與之遊宴講論賦詩士大夫以是稱之五年春正月乙卯以尚書左僕射蕭淵藻為中衛將軍丹楊尹何敬容為尚書令吏部尚書張纉為僕射纉弘策之子也自晉宋以來宰相皆以文義自逸敬容獨勤薄領日旰不休為時俗所嗤鄙自徐勉周捨旣卒當權要者外朝則何敬容内省則朱异敬容質慤無文以綱維為己任异文華敏洽曲營丗譽二人行異而俱得幸於上异善伺􅀱人主意為阿䛕用事三十年廣納貨賂為司空秋七月以魏扶風王孚為太尉九月甲子東魏發畿内十萬人城鄴四十日罷冬十月癸亥以新宫成大赦改元興和魏置紙筆於陽武門外以求得失十一月乙亥東魏使散􅀐常侍王元景魏收來聘東魏人以正光曆浸差命校書郎李業興更加修正以甲子為元號曰興光暦旣成行之散􅀐常侍朱异奏頃來置州稍廣而小大不倫請分為五品其位秩髙卑參僚多少皆以是為差詔從之於是上品二十州次品十州次品八州次品二十三州下品二十一州時上方事征伐恢拓境宇北踰淮汝東距彭城西開䍧柯南平俚洞建置州郡紛綸甚衆故异請分之其下品皆異國之人來歸附者徒有州名而無土地或因荒徼之民所居村落置州及郡縣刺史守令皆用彼人為之尚書不能悉領山川險逺職貢罕通五品之外又有二十餘州不知處所凡一百七州又以邊境鎭戌雖領民不多欲重其將帥皆建為郡或一人領二三郡太守州郡雖多而户口日耗矣魏自西遷以來禮樂散逸丞相泰命左僕射周恵逹吏部郎中北海唐瑾損益舊章至是稍備六年春正月壬申東魏以廣平公庫狄干為太保丁丑東魏主入新宫大赦魏扶風王孚卒二月己亥上耕藉田魏鑄五銖錢東魏大行臺侯景出三鵶將復荆州魏丞相泰遣李弼獨孤信各將五千􅀐出武􅀜景乃還魏文后旣為尼居别宫悼后猶忌之乃以其子武都王戊為秦州刺史使文后隨之官魏主雖限大計而恩好不忘密令養髮有追還之意㑹柔然舉國度河南侵時頗有言柔然以悼后故興師者帝曰豈有興百萬之衆為一女子邪雖然致人此言朕亦何顔以見將帥乃遣中常侍曹寵齎手敕賜文后自盡文后泣謂寵曰願至尊千萬嵗天下康寧死無恨也遂自殺鑿麥積崖而葬之號曰寂陵夏丞相泰召諸軍屯沙苑以僃柔然右僕射周惠達發士馬守京城塹諸街巷召雍州刺史王羆議之羆不應召謂使者曰若蠕蠕至渭北者王羆自帥鄉里破之不煩國家兵馬何為天子城中作如此驚擾由周家小兒恇怯致此柔然至夏州而退未㡬悼后遇疾殂五月乙酉魏行臺宫延和陜州刺史宫延慶降于東魏東魏以河北馬場為義州以處之東魏陽州武公髙永樂卒閏月丁丑朔日有食之己丑東魏封皇兄景植為宜陽王皇弟威為清河王謙為潁川王六月壬子東魏華山王鷙卒秋七月丁亥東魏使兼散􅀐常侍李象等來聘八月戊午大赦戊戌司空􅀽昂卒遺䟽不受贈諡敕諸子勿上行状及立銘誌上不許贈本官諡穆正公冬十一月魏太師念賢卒吐谷渾自莫折念生之亂不通于魏伏連籌卒子夸吕立始稱可汗居伏俟城其地東西三千里南北千餘里官有王公僕射尚書郎中將軍之號是嵗始遣使假道柔然聘於東魏七年春正月辛巳上祀南郊大赦辛丑祀明堂宕昌王梁企定為其下所殺弟彌定立二月乙巳以彌定為河梁二州刺史宕昌王辛亥上耕藉田魏幽州刺史順陽王仲景坐事賜死三月魏夏州刺史劉平伏據上郡反大都督于謹討擒之夏五月遣兼散􅀐常侍明少遐等聘于東魏秋七月己卯東魏宜陽王景植卒魏以侍中宇文測為大都督行汾州事測深之兄也為政簡惠得士民心地接東魏東魏人數來宼抄測擒獲之命解縛引與相見為設酒殽待以客禮并給糧餼衛送出境東魏人大慙不復為宼汾晉之間遂通慶弔時論稱之或告測交通境外者丞相泰怒曰測為我安邊我知其志何得間我骨肉命斬之魏丞相泰欲革易時政為彊國富民之灋大行臺度支尚書兼司農卿蘇綽盡其智能賛成其事減官員置二長并置屯田以資軍國又為六條詔書九月始奏行之一曰清心二曰敦敎化三曰盡地利四曰擢賢良五曰恤獄訟六曰均賦役泰甚重之常置諸坐右又令百司習誦之其牧守令長非通六條及計帳者不得居官東魏詔羣官於麟趾閣議定灋制謂之麟趾格冬十月甲寅頒行之乙巳東魏發夫五萬築漳濵堰三十五日罷十一月丙戍東魏以彭城王韶為太尉度支尚書胡僧敬為司空僧敬名䖍以字行國珍之兄孫東魏主之舅也十二月東魏遣兼散􅀐常侍李騫來聘交趾李賁丗為豪右仕不得志有并韶者富於詞藻詣選求官吏部尚書蔡撙以并姓無前賢除廣陽門郎韶恥之賁與韶還鄉里謀作亂㑹交州刺史武林侯諮以刻暴失衆心時賁監德州因連結數州豪傑俱反諮輸賄于賁奔還廣州上遣諮與髙州刺史孫冏新州刺史盧子雄將兵擊之諮恢之子也是嵗魏又益新制十二條東魏丞相歡以諸州調絹不依舊式民甚苦之奏令悉以四十尺為匹魏自喪亂以來農商失業六鎭之民相帥内徙就食齊晉歡因之以成霸業東西分裂連年戰争河南州郡鞠為茂草公私困竭民多餓死歡命諸州濵河及津梁皆置倉積榖以相轉漕供軍旅備飢饉又於幽瀛滄青四州傍海煑鹽軍國之費粗得周贍至是東方連嵗大稔榖斛至九錢山東之民稍復蘇息矣東魏尚書令髙澄尚静帝妹馮翊長公主生子孝琬朝貴賀之澄曰此至尊之甥先賀至尊三日帝幸其第賜錦綵布絹萬匹於是諸貴競致禮遺貨滿十室東魏臨淮王孝友表曰令制百家為族二十五家為閭五家為比百家之内有帥二十五徴發皆免苦樂不均羊少狼多復有蠶食比之為弊乆矣京邑諸坊或七八百家唯一里正二史庶事無闕而況外州乎請依舊置三正之名不改而毎閭止為二比計族省十二丁貲絹畨兵所益甚多事下尚書寝不行安成望族劉敬躬以妖術惑衆人多信之八年春正月敬躬據郡反改元永漢署官屬進攻廬陵逼豫章南方乆不習兵人情擾駭豫章内史張綰募兵以拒之綰纉之弟也二月戊戌江州刺史湘東王繹遣司馬王僧辯中兵曹子郢討敬躬受綰節度二月戊辰擒敬躬送建康斬之僧辯神念之子也該博辯捷器宇肅然雖射不穿札而志氣髙逺魏初置六軍夏四月丙寅東魏使兼散􅀐常侍李繪來聘繪元忠之從子也東魏丞相歡朝于鄴司徒孫騰坐事免乙酉以彭城王韶録尚書事侍中廣陽王湛為太尉尚書右僕射髙隆之為司徒初太傅尉景與丞相歡同歸爾朱榮其妻歡之姊也自恃勲戚貪縱不灋為有司所劾繫獄歡三詣闕泣請乃得免死丁亥降為驃􅀐大將軍開府儀同三司歡往造之景卧不起大叫曰殺我時趣邪歡撫而拜謝之辛卯以庫狄干為太傅以領軍將軍婁昭為大司馬封祖裔為尚書右僕射六月甲辰歡還晉陽八月庚戍東魏以開府儀同三司吏部尚書侯景為兼尚書僕射河南大行臺隨機防討魏以王盟為太保東魏丞相歡擊魏入自汾絳連營四十里丞相泰使王思政守玉壁以斷其道歡以書招思政曰若降當受以并州思政復書曰可朱渾道元降何以不得冬十月己亥歡圍玉壁凡九日遇大雪士卒飢凍多死者遂解圍去魏遣太子欽鎭蒲坂丞相泰出軍蒲坂至皂莢聞歡退度汾追之不及十一月東魏以可朱渾道元為并州刺史十二月魏主狩於華隂大享將士丞相泰帥諸將朝之起萬壽殿於沙苑北辛亥東魏遣兼散􅀐常侍楊斐來聘孫冏盧子雄討李賁以春瘴方起請待至秋廣州刺史新渝侯映不許武林侯諮又趣之冏等至合浦死者什六七衆潰而歸映憺之子也武林侯諮奏冏及子雄與賊交通逗留不進敇於廣州賜死子雄弟子略子烈主帥廣陵杜天合及弟僧明新安周文育等帥子雄之衆攻廣州欲殺映諮為子雄復寃西江督䕶髙要太守吳興陳霸先帥精甲三千救之大破子略等殺天合擒僧明文育霸先以僧明文育驍勇過人釋之以為主帥詔以霸先為直閤將軍魏丞相泰妻馮翊公主生子覺東魏以光州刺史李元忠為侍中元忠雖處要任不以物務干懐唯飲酒自娱丞相歡欲用為僕射丗子澄言其放逹常醉不可委以臺閣其子搔聞之請節酒元忠曰我言作僕射不勝飲酒樂爾愛僕射宜勿飲酒九年春正月壬戌東魏大赦改元武定東魏御史中尉髙仲密取吏部郎崔暹之妹旣而弃之由是與暹有隙仲密選用御史多其親戚鄉黨髙澄奏令改選暹方為澄所寵任仲密疑其構已愈恨之仲密後妻李氏艶而慧澄見而恱之李氏不從衣服皆裂以告仲密仲密益怨尋出為北豫州刺史隂謀外叛丞相歡疑之遣鎭城奚壽興典軍事仲密但知民務仲密置酒延壽興伏壯士執之二月壬申以虎牢叛降魏魏以仲密為侍中司徒歡以仲密之叛由崔暹將殺之髙澄匿暹為之固請歡曰我匄其命須與苦手澄乃出暹而謂大行臺都官郎陳元康曰卿使崔暹得杖勿復相見元康為之言於歡曰大王方以天下付大將軍大將軍有一崔暹不能免其杖父子尚爾況於它人歡乃釋之髙季式在永安戌仲密遣信報之季式走告歡歡待之如舊魏丞相泰帥諸軍以應仲密以太子少傅李逺為前驅至洛陽遣開府儀同三司于謹攻柏谷拔之三月壬申圍河橋南城東魏丞相歡將兵十萬至河北泰退軍􅈆上縱火船於上流以燒河橋斛律金使行臺郎中張亮以小艇百餘載長鎻伺火船將至以釘釘之引鎻向岸橋遂獲全歡度河據邙山為陳不進者數日泰留輜重於􅈆曲夜登邙山以襲歡􅃸􅀐白歡曰賊距此四十餘里蓐食乾飲而來歡曰自當渴死乃正陣以待之戊申􅀺明泰軍與歡軍遇東魏彭樂以數千􅀐為右甄衝魏軍之北垂所向奔潰遂馳入魏營人告彭樂叛歡甚怒俄而西北塵起樂使來告捷虜魏侍中開府儀同三司大都督臨洮王東蜀郡王榮宗江夏王昇鉅鹿王闡譙郡王亮詹事趙善及督將僚佐四十八人諸將乗勝擊魏大破之斬首三萬餘級歡使彭樂追泰泰窘謂樂曰汝非彭樂邪癡男子今日無我明日豈有汝邪何不急還營收汝金寳樂從其言獲泰金帶一囊以歸言於歡曰黑􅆩漏刃破膽矣歡雖喜其勝而怒其失泰令伏諸地親捽其頭連頓之并數以沙苑之敗舉刃將下者三噤齘良乆樂曰乞五千􅀐復為王取之歡曰汝縱之何意而言復取邪命取絹三千匹壓樂背因以賜之明日復戰泰為中軍中山公趙貴為左軍領軍若干惠等為右軍中軍右軍合擊東魏大破之悉俘其步卒歡失馬赫連陽順下馬以授歡歡上馬走從者步􅀐七人追兵至親信都督尉興慶曰王速去興慶腰有百箭足殺百人歡曰事濟以爾為懐州刺史若死用爾子興慶曰兒少願用兄歡許之興慶拒戰矢盡而死東魏軍士有逃奔魏者告以歡所在泰募勇敢三千人皆執短兵配大都督賀拔勝以攻之勝識歡於行閒執槊與十三􅀐逐之馳數里槊刃垂及因字之曰賀六渾賀拔破胡必殺汝歡氣殆絶河州刺史劉洪徽從傍射勝中其二􅀐武衛將軍叚韶射勝馬斃之比副馬至歡已逸去勝歎曰今日不執弓矢天也魏南郢州刺史耿令貴大呼獨入敵中鋒刃亂下人皆謂已死俄奮刀而還如是數四當令貴前者死傷相繼乃謂左右曰吾豈樂殺人壯士除賊不得不爾若不能殺賊又不為賊所傷何異逐坐人也左軍趙貴等五將戰不利東魏兵復振泰與戰又不利㑹日暮魏兵遂遁東魏兵追之獨孤信于謹收散卒自後擊之追兵驚擾魏諸軍由是得全若于惠夜引去東魏兵追之惠徐下馬顧命厨人營食食畢謂左右曰長安死此中死有以異乎乃建旗鳴角收散卒徐還追􅀐疑有伏兵不敢逼泰遂入􅀜屯渭上歡進至陜泰使開府儀同三司逹奚武等拒之行臺郎中封子繪言於􅂬曰混壹東西正在今日昔魏太祖平漢中不乗勝取巴蜀失在遲疑後悔無及願大王不以為疑􅂬深然之集諸將議進止咸以為野無青草人馬疲瘦不可逺追陳元康曰兩雄交爭嵗月已乆今幸而大捷天授我也時不可失當乗勝追之􅂬曰若遇伏兵孤何以濟元康曰王前沙苑失利彼尚無伏今奔敗若此何能逺謀若捨而不追必成後患歡不從使劉豐生將數千􅀐追泰遂東歸泰召王思政於玉壁將使鎭虎牢未至而泰敗乃使守􅁪農思政入城令開門解衣而卧慰勉將士示不足畏後數日劉豐生至城下憚之不敢進引軍還思政乃脩城郭起樓櫓營農田積芻粟由是􅁪農始有守禦之備丞相泰求自貶魏主不許是役也魏諸將皆無功唯耿令貴與太子武衞率王胡仁都督王文逹力戰功多泰欲以雍岐北雍三州授之以州有優劣使探籌取之仍賜胡仁名勇令貴名豪文達名信用彰其功於是廣募􅀜隴豪右以増軍旅髙仲密之將叛也隂遣人扇動冀州豪傑使為内應東魏遣髙隆之馳驛慰撫由是得安髙澄密書與隆之曰仲密枝黨與之俱西者宜悉收其家屬以懲將來隆之以為恩㫖旣行理無追改若復收治示民不信脫致驚擾所虧不細乃啓丞相歡而罷之以太子詹事謝舉為尚書僕射夏四月林邑王攻李賁賁將范脩破林邑於九德清水氐酋李䑕仁乗魏之敗據險作亂隴右大都督獨孤信屢遣軍擊之不克丞相泰遣典籖天水趙昶往諭之諸酋長聚議或從或否其不從者欲加刃於昶昶神色自若辭氣逾厲䑕仁感悟遂相帥降氐酋梁道顯叛泰復遣昶諭降之徙其豪帥四十餘人并部落於華州泰即以昶為都督使領之泰使諜潜入虎牢令守將魏光固守侯景獲之改其書云宜速去縱諜入城光宵遁景獲髙仲密妻子送鄴北豫洛二州復入于東魏五月壬辰東魏以克復虎牢降死罪巳下囚惟不赦髙仲密家丞相歡以髙乾有義勲髙昂死王事季式先自告皆為之請免其從坐仲密妻李氏當死髙澄盛服見之曰今日何如李氏黙然遂納之乙未以侯景為司空秋七月魏大赦以王盟為太傅廣平王賛為司空八月乙丑東魏以汾州刺史斛律金為大司馬東魏遣兼散􅀐常侍李渾等來聘冬十一月甲午東魏主狩于西山乙巳還宫髙澄啓解侍中東魏主以其弟并州刺史太原公洋代之丞相歡築長城於肆州北山西自馬陵東至土墱四十日罷魏諸牧守共謁丞相泰泰命河北太守裴俠别立謂諸牧守曰裴俠清愼奉公為天下最有如俠者可與俱立衆黙然無敢應者泰乃厚賜俠朝野歎服號為獨立君十年春正月李賁自稱越帝置百官改元大德三月癸巳東魏丞相􅂬巡行冀定二州校河北户口損益因朝于鄴甲午上幸蘭陵謁建寧陵使太子入守宫城辛丑謁脩陵丙午東魏以開府儀同三司孫騰為太保己酉上幸京口城北固樓更名北顧庚戌幸回賔亭宴鄉里故老及所經近縣迎􅀱者少長數千人各賚錢二千壬子東魏以髙澄為大将軍領中書監元弼為録尚書事左僕射司馬子如為尚書令侍中髙洋為左僕射丞相歡多在晉陽孫騰司馬子如髙岳髙隆之皆歡之親舊委以朝政鄴中謂之四貴其􅁠勢熏灼中外率多專恣驕貪􅂬欲損奪其􅁠故以澄為大將軍領中書監移門下機事緫歸中書文武賞罰皆禀於澄孫騰見澄不肯盡敬澄叱左右牽下於牀築以刀環立之門外太原公洋於澄前拜髙隆之呼為叔父澄怒罵之􅂬謂羣公曰兒子浸長公宜避之於是公卿以下見澄無不聳懼庫狄干澄姑之壻也自定州來謁立於門外三日乃得見澄欲置腹心於東魏主左右擢中兵參軍崔季舒為中書侍郎澄毎進書於帝有所諌請或文辭繁雜季舒􅂺脩飾通之帝報荅澄父子之語常與季舒論之曰崔中書我乳母也季舒挺之從子也夏四月乙卯上還自蘭陵五月甲申朔魏丞相泰朝于長安甲午東魏遣散􅀐常侍魏季景來聘季景收之族叔也尚書令何敬容妾弟盜官米以書屬領軍河東王譽丁酉敬容坐免官東魏廣陽王湛卒魏琅邪貞獻公賀拔勝諸子在東者丞相􅂬盡殺之勝憤恨發疾而卒丞相泰常謂人曰諸將對敵神色皆動唯賀拔公臨陳如平時眞大勇也秋七月魏更權衡度量命尚書蘇綽損益三十六條之制緫為五卷頒行之搜簡賢才為牧守令長皆依新制而遣焉數年之間百姓便之魏自正光以後政刑弛縱在位多貪汙丞相歡啓以司州中從事宋遊道為御史中尉澄固請以吏部郎崔暹為之以遊道為尚書左丞澄謂暹遊道曰卿一人處南臺一人處北省當使天下肅然暹選畢義雲等為御史時稱得人義雲衆敬之曽孫也澄欲假暹威勢諸公在坐令暹後至通名髙視徐歩兩人挈􅅂而入澄分庭對揖暹不讓而坐觴再行即辭去澄留之食暹曰適受敇在臺檢校遂不待食而去澄降階送之它日澄與諸公出之東山遇暹於道前驅為赤棒所擊澄回馬避之尚書令司馬子如以丞相歡故人當重任意氣自髙與太師咸陽王坦貪黷無厭暹前後彈子如坦及并州刺史可朱渾道元等罪狀無不極筆宋遊道亦劾子如坦及太保孫騰司徒髙隆之司空侯景尚書元羡等澄收子如繫獄一宿髮盡白辭曰司馬子如從夏州䇿杖投相王王給露車一乗觠牸牛犢犢在道死唯觠角存此外皆取之於人丞相歡以書敇澄曰司馬令吾之故舊汝宜寛之澄駐馬行街出子如脫其鎻子如懼曰非作事邪八月癸酉削子如官爵九月甲申以濟隂王暉業為太尉太師咸陽王坦以王還第元羡等皆免官其餘死黜者甚衆乆之歡見子如哀其憔悴以膝承其首親為擇虱賜酒百缾羊五百口米五百石髙澄對諸貴極言襃羙崔暹且戒屬之丞相歡書與鄴下諸貴曰崔暹居憲臺咸陽王司馬令皆吾布衣之舊尊貴親暱無過二人同時獲罪吾不能救諸君其愼之宋遊道奏駮尚書違失數百條省中豪吏王儒之徒並鞭斥之令僕已下皆側目髙隆之誣遊道有不臣之言罪當死給事黄門侍郎楊愔曰畜狗求吠今以數吠殺之恐將來無復吠狗遊道竟坐除名澄謂遊道曰卿早從我向并州不爾彼經略殺卿遊道從澄至􅀳陽以為大行臺吏部己丑大赦東魏以䘮亂之後户口失實徭賦不均冬十月丁巳以太保孫騰大司徒髙隆之為括户大使分行諸州得無籍之户六十餘萬僑居者皆勒還本屬十一月甲申以髙隆之録尚書事以前大司馬婁昭為司徒庚子東魏主祀圜丘東魏丞相􅂬襲擊山胡破之俘萬餘户分配諸州是嵗東魏以散􅀐常侍魏收兼中書侍郎修國史自梁魏通好魏書毎云想彼境内寧静此率土安和上復書去彼字而已収始定書云想境内清晏今萬里安和上亦效之
