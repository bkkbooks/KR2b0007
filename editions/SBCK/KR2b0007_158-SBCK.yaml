front:
  text: 洛州事盧勇請進觀形勢乃帥百騎至大隗山遇魏師日巳暮勇多置幡旗於樹顚夜分􅀐為十隊鳴角直前擒魏儀同三司程華斬儀同三司王征蠻而還廣州守將駱超遂以城降東魏丞相歡以勇行廣州事勇辯之從弟也於是南汾潁豫廣四州復入東魏
  hash: sha256:bc8002c8d6279cc4d749d32b520d6f3f46d56458e38bb03b0dfa0af97694e272
