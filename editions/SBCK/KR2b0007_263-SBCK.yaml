body:
  text: 臣司馬光奉勑編集唐紀七十九淵獻正月凡一年有竒起􅀇黓閹茂盡昭陽大昭宗聖穆景文孝皇帝中之下天復二年春正月癸丑朱全忠復屯三原又移軍武功河東將李嗣昭周徳威攻慈隰以分全忠兵勢丁卯以給事中韋貽範爲工部侍郎同平章事丙子以給事中嚴􅀛充岐汴和恊使賜朱全忠姓李與李茂貞爲兄弟全忠不從時茂貞不出戰全忠聞有河東兵二月戊寅朔旋軍河中李嗣昭等攻慈隰下之進逼晉絳己丑全忠遣兄子友寧將兵㑹晉州刺史氏叔琮擊之李嗣昭等襲取絳州汴將康懐英復取之嗣昭等屯蒲縣乙未汴軍十萬營于蒲􅀯叔琮夜帥衆斷其歸路而攻其壘破之殺獲萬餘人己亥全忠自河中赴之乙巳至晉州盜發簡陵西川兵至利州昭武節度使李繼忠弃鎮奔鳯翔王建以劒州刺史王宗偉爲利州制置使三月庚戌上與李茂貞及宰相學士中尉樞密宴酒酣茂貞及韓全誨亡去上問韋貽範朕何以巡幸至此對曰臣在外不知固問之不對上曰卿何得於朕前妄語云不知又曰卿既以非道取宰相當於公事如法若有不可必準故事怒目視之微言曰此賊兼須杖之二十顧謂韓偓曰此輩亦稱宰相貽範屢以大盃獻上上不即持貽範舉盃直及上頥戊午氏叔琮朱友寧進攻李嗣昭周徳威營時汴軍横陳十里而河東軍不過數萬深入敵境衆心忷懼徳威出戰而敗密令嗣昭以後軍先去徳威尋引􅀐兵亦退叔琮友寧長驅乗之河東軍驚潰禽克用子廷鸞兵仗輜重委弃殆盡朱全忠令叔琮友寧乗勝遂攻河東李克用聞嗣昭等敗遣李存信以親兵逆之至清源遇汴軍存信走還晉陽汴軍取慈隰汾三州辛酉汴軍圍晉陽營于晉祠攻其西門周徳威李嗣昭收餘衆依西山得還城中兵未集叔琮攻城甚急每行圍襃衣博帶以示閑暇克用晝夜乗城不得寢食召諸將議走保雲州李嗣昭李嗣源周徳威曰兒輩在此必能固守王勿爲此謀揺人心李存信曰􅀜東河北皆受制於朱温我兵寡地蹙守此孤城彼築壘穿塹環之以積久制我我飛走無路坐待困斃耳今事勢巳急不若且入北虜徐圖進取嗣昭力爭之克用不能決劉夫人言於克用曰存信北川牧羊兒耳安知逺慮王常笑王行瑜輕去其城死於人手今日反效之邪且王昔居逹靻幾不自免賴朝廷多事乃得復歸今一足出城則禍變不測塞外可得至邪克用乃止居數日潰兵復集軍府浸安克用弟克寧爲忻州刺史聞汴寇至中塗復還晉陽曰此城吾死所也去將何之衆心乃定壬戌朱全忠還河中遣朱友寧將兵西擊李茂貞軍于興平武功之間李嗣昭李嗣源數將敢死士夜入氏叔琮營斬首捕虜汴軍驚擾備禦不暇㑹大疫丁卯叔琮引兵還嗣昭與周徳威將兵追之及石㑹􅀜叔琮留數馬及旌旗於髙崗之巔嗣昭等以爲有伏兵乃引去復取慈隰汾三州自是克用不敢與全忠爭者累年克用以使引咨幕府曰不貯軍食何以聚衆不置兵甲何以克敵不修城池何以扞禦利害之閒請垂議度掌書記李襲吉獻議略曰國冨不在倉儲兵彊不由衆寡人歸有徳神固害盈聚斂寧有盜臣苛政如有猛虎所以鹿臺將散周武以興齊庫既焚晏嬰入賀又曰伏以變法不若養人攺作寜如舊貫韓建蓄財無數首事朱温王珂變法如麻一朝降賊中山城非不峻蔡上兵非不多前事甚明可以爲戒且霸國無貧主彊將無弱兵伏願大王崇徳愛人去奢省役設險固境訓兵務農定亂者選武臣制理者選文吏錢榖有句刑法有律誅賞由我則下無威福之弊近密多正則人無譛謗之憂順天時而絶欺誣敬􅀑神而禁淫祀則不求冨而國冨不求安而自安外破元凶内康疲俗名髙五霸道冠八元至於率閭閻定閒架増麴糵檢田疇開國建邦恐未爲切克用親軍皆沙陀雜虜喜侵暴良民河東甚苦之其子存勗以爲言克用曰此輩從吾攻戰數十年比者帑藏空虚諸軍賣馬以自給今四方諸矦皆重賞以募士我若急之則彼皆散去矣吾安與同保此乎俟天下稍平當更清治之耳存勗㓜警敏有勇略克用爲朱全忠所困封疆日蹙憂形於色存勗進言曰物不極則不返惡不極則不亡朱氏恃其詐力窮凶極暴吞滅四鄰人怨神怒今又攻逼乗輿窺覦神器此其極也殆將斃矣吾家代襲忠貞勢窮力屈無所愧心大人當遵養時晦以待其衰柰何輕爲沮喪使羣下失望乎克用恱即命酒奏樂而罷劉夫人無子克用寵姬曹氏生存勗劉夫人待曹氏加厚克用以是益賢之諸姬有子輒命夫人母之夫人教養悉如所生上以左金吾將軍李儼爲江淮宣諭使書御衣賜楊行密拜行密東面行營都統中書令吴王以討朱全忠以朱瑾爲平盧節度使馮弘鐸爲武寧節度使朱延壽爲奉國節度使加武安節度使馬殷同平章事淮􅀯宣歙湖􅀯等道立功將士聽用都統牒承制遷􅀘然後表聞儼張濬之子也賜姓李夏四月丁酉崔㣧自華州詣河中泣訴於朱全忠恐李茂貞劫天子幸蜀冝以時迎奉勢不可緩全忠與之宴㣧親執板爲全忠歌以侑酒辛丑回鶻遣使入貢請發兵赴難上命翰林學士承㫖韓偓荅書許之乙巳偓上言戎狄獸心不可􅀝信彼見國家人物華靡而城邑荒殘甲兵彫弊必有輕中國之心啓其貪婪且自㑹昌以來回鶻爲國家所破恐其乗危復怨所賜可汗書宜諭以小小冦竊不湏赴難虚愧其意實沮其謀從之兵部侍郎參知機務盧光啓罷爲太子太保楊行密遣顧全武歸杭州以易秦裴錢鏐大喜遣裴還汴將康懐貞擊鳯翔將李繼昭於莫谷大破之繼昭蔡州人也本姓苻名道昭五月庚戌温州刺史朱襃卒兄敖自稱刺史鳯翔人聞朱全忠且來皆懼癸丑城外居民皆遷入城己未全忠將精兵五萬發河中至東渭橋遇霖雨留旬日庚午工部侍郎平章事韋貽範遭母喪宦官薦翰林學士姚洎爲相洎謀於韓偓偓曰若圖永久之利則莫若未就爲善儻出上意固無不可且汴軍旦夕合圍孤城難保家族在東可不慮乎洎乃移疾上亦自不許鎮海鎮東節度使彭城王錢鏐進爵越王六月丙子以中書舍人􅂫檢爲工部侍郎同平章事時韋貽範在草土薦檢及姚洎於李茂貞上既不用洎茂貞及宦官恐上自用人恊力薦檢遂用之丁丑朱全忠軍于虢縣武寧節度使馮弘鐸介居宣揚之閒常不自安然自恃樓船之彊不事兩道寧國節度使田頵欲圖之募弘鐸工人造戰艦工人曰馮公逺求堅木故其船堪乆用今此無之頵曰第爲之吾止湏一用耳弘鐸將馮暉顔建説弘鐸先擊頵弘鐸從之帥衆􅀯上聲言攻洪州實襲宣州也楊行密使人止之不從辛巳頵帥舟師逆擊于葛山大破之甲申李茂貞大出兵自將之與朱全忠戰于虢縣之北大敗而還死者萬餘人丙戌全忠遣其將孔勍出散􅀜攻鳯州拔之丁亥全忠進軍鳯翔城下全忠朝服嚮城而泣曰臣但欲迎車駕還宫耳不與岐王角勝也遂爲五寨環之馮弘鐸收餘衆㳂江將入海楊行密恐其爲後患遣使犒軍且説之曰公徒衆猶盛胡爲自弃於滄海之外吾府雖小足以容公之衆使將吏各得其所如何弘鐸左右皆慟哭聴命弘鐸至東塘行密自乗輕舟迎之從者十餘人常服不持兵升弘鐸舟慰諭之舉軍感悦署弘鐸淮􅀯節度副使館給甚厚􅀄弘鐸遣牙將丹徒尚公廼詣行密求潤州行密不許公迺大言曰公不見聽但恐不敵樓船耳至是行密謂公廼曰頗記求潤州時否公廼謝曰將吏各爲其主但恨無成耳行密笑曰爾事揚叟如馮公無憂矣行密以李神福爲昇州刺史楊行密發兵討朱全忠以副使李承嗣權知淮􅀯軍府事軍吏欲以巨艦運糧都知兵馬使徐温曰運路乆不行葭葦堙塞請用小艇庶幾易通軍至􅀫州㑹乆雨重載不能進士有飢色而小艇先至行密由是竒温始與議軍事行密攻􅀫州乆不克竟以糧運不繼引還秋七月孔勍取成隴二州士卒無􅃲者至秦州州人城守乃自故􅀜歸韋貽範之爲相也多受人賂許以官既而以母喪罷去日爲債家所譟親吏劉延美所負尤多故汲汲於起復日遣人詣兩中尉樞密及李茂貞求之甲戌命韓偓草貽範起復制偓曰吾腕可斷此制不可草即上䟽論貽範遭憂未數月遽令起復實駭物聽傷國體學士院二中使怒曰學士勿以死爲戲偓以䟽授之解衣而寢二使不得巳奏之上即命罷草仍賜敕襃賞之八月乙亥朔班定無白麻可宣宦官喧言韓侍郎不肯草麻聞者大駭茂貞入見上曰陛下命相而學士不肯草麻與反何異上曰卿輩薦貽範朕不之違學士不草麻朕亦不之違况彼所陳事理明白若之何不從茂貞不恱而出至中書見􅂫檢曰姦邪朋黨宛然如舊扼腕者乆之貽範猶經營不巳茂貞語人曰我實不知書生禮數爲貽範所誤㑹當於邠州安置貽範乃止劉延美赴井死保大節度使李茂勲將兵屯三原救李茂貞朱全忠遣其將康懐英孔勍擊之茂勲遁去茂勲茂貞之從弟也􅀄孫儒死其士卒多奔浙西錢鏐愛其驍悍以爲中軍號武勇都行軍司馬杜稜諌曰狼子野心它日必爲深患請以土人代之不從鏐如衣錦軍命武勇右都指揮使徐綰帥衆治溝洫鎮海節度副使成及聞士卒怨言白鏐請罷役不從丙戌鏐臨饗諸將綰謀殺鏐於座不果稱疾先出鏐怪之丁亥命綰將所部先還杭州及外城縱兵焚掠武勇左都指揮使許再思以迎候兵與之合進逼牙城鏐子傳瑛與三城都指揮使馬綽等閉門拒之牙將潘長擊綰綰退屯龍興寺鏐還及龍泉聞變疾驅至城北使成及建鏐旗鼔與綰戰鏐微服乗小舟夜抵牙城東北隅踰城而入直更卒慿鼔而寐鏐親斬之城中始知鏐至武安都指揮使杜建徽自新城入援徐綰聚木將焚北門建徽悉焚之建徽稜之子也湖州刺史髙彦聞難遣其子渭將兵入援至靈隱山綰伏兵擊殺之􅀄鏐築杭州羅城謂僚佐曰十步一樓可以爲固矣掌書記餘杭羅隱曰樓不若皆内向至是人以隱言爲驗庚戌李茂貞出兵夜襲奉天虜汴將倪章邵棠以歸乙未茂貞大出兵與朱全忠戰不勝暮歸汴兵退之幾入西門己亥再起復前户部侍郎同平章事韋貽範使姚洎草制貽範不讓即表謝明日視事西川軍請假道於興元山􅀯西道節度使李繼密遣兵戍三泉以拒之辛丑西川前鋒將王宗播攻之不克退保山寨親吏柳脩業謂宗播曰公舉族歸人不爲之死戰何以自保宗播令其衆曰吾與汝曹决戰取功名不爾死於此遂破全牛黒水西縣襃城四寨軍校秦承厚攻西縣矢貫左目逹于右目鏃不出王建自䑛其創膿潰鏃出王宗播攻馬盤寨繼密戰敗奔還漢中西川軍乗勝至城下王宗滌帥衆先登遂克之繼密請降遷于成都得兵三萬􅀐五千宗滌入屯漢中王建曰繼密殘賊三輔以其降不忍殺復其姓名曰王萬弘不時召見諸將陵易之萬弘終日縱酒俳優輩亦加戲誚萬弘不勝憂憤醉投池水而卒詔以王宗滌爲山􅀯西道節度使宗滌有勇略得衆心王建忌之建作府門繪以朱丹蜀人謂之􅀞紅樓建以爲宗滌姓名應之王宗佶等疾其功復構以飛語建召宗滌至成都詰責之宗滌曰三蜀略平大王聴䜛殺功臣可矣建命親隨馬軍都指揮使唐道襲夜飲之酒縊殺之成都爲之罷市連營涕泣如喪親戚建以指揮使王宗賀權興元留後道襲閬州人也始以舞童事建後浸預謀畫九月乙巳朱全忠以乆雨士卒病召諸將議引兵歸河中親從指揮使髙季昌左開道指揮使劉知俊曰天下英雄窺此舉一歲矣今茂貞巳困柰何捨之去全忠患李茂貞堅壁不出季昌請以譎計誘致之募有能入城爲諜者􅀐士馬景請行曰此行必死願大王録其妻子全忠惻然止之景不可時全忠遣朱友倫發兵於大梁明日將至當出兵迓之景請因此時給駿馬雜衆􅀐而出全忠從之命諸軍皆秣馬飽士丁未旦偃旗幟潜伏無得妄岀營中寂如無人景與衆􅀐偕出忽躍馬西去詐爲逃亡入城告茂貞曰全忠舉軍遁矣獨留傷病者近萬人守營今夕亦去矣請速擊之於是茂貞開門悉衆攻全忠營全忠鼔於中軍百營俱出縱兵擊之又遣數百􅀐據其城門鳯翔軍進退失據自蹈藉殺傷殆盡茂貞自是喪氣始議與全忠連和奉車駕還京不復以詔書勒全忠還鎮矣全忠表季昌爲宋州團練使季昌硤石人本朱友恭之僕夫也戊申武定節度使李思敬以洋州降王建辛亥李茂貞盡出􅀐兵於鄰州就芻糧壬子朱全忠穿蚰蜒壕圍鳯翔設大鋪鈴架以絶内外癸亥以茂貞爲鳯翔靜難武定昭武四鎮節度使或勸錢鏐度江東保越州以避徐許之難杜建徽按劒叱之曰事或不濟同死於此豈可復東度乎鏐恐徐綰等據越州遣大將顧全武將兵戍之全武曰越州不足往不若之廣陵鏐曰何故對曰聞綰等謀召田頵田頵至淮􅀯助之不可敵也建徽曰孫儒之難王甞有徳於楊公今往告之宜有以相報鏐命全武告急於楊行密全武曰徒往無益請得王子爲質鏐命其子傳璙微服爲全武僕與偕之廣陵且求昬於行密過潤州團練使安仁義愛傳璙清麗將以千僕易之全武夜半賂閽者逃去綰等果召田頵頵引兵赴之先遣親吏何饒謂鏐曰請大王東如越州空府廨以相待無爲殺士卒鏐報曰軍中叛亂何方無之公爲節帥乃助賊爲逆戰則亟戰又何大言頵築壘絶往來之道鏐患之募能奪其地者賞以州衢州制置使陳璋將卒三百出城奮擊遂奪其地鏐即以爲衢州刺史顧全武至廣陵説楊行密曰使田頵得志必爲王患王召頵還錢王請以其子傳璙爲質且求昬行密許之以女妻傳璙冬十月李儼至楊州楊行密始建制㩽院每有封拜輒以告儼於紫極宫玄宗像前陳制書再拜然後下王建攻拔興州以軍使王宗浩爲興州刺史戊寅夜李茂貞假子彦詢帥三團步兵奔于汴軍己卯李彦韜繼之庚辰朱全忠遣幕僚司馬鄴奉表入城甲申又遣使獻熊白自是獻食物繒帛相繼上皆先以示李茂貞使啓視之茂貞亦不敢啓丙戌復遣使請與茂貞議連和民出城樵采者皆不抄掠丁亥全忠表請修宫闕及迎車駕己丑遣國子司業薛昌祚内使王延繢齎詔賜全忠癸巳茂貞復出兵擊汴軍城西寨敗還全忠以絳􅂁衣降者使招呼城中人鳯翔軍夜縋去及因樵采去不返者甚衆是後茂貞或遣兵出擊汴軍多不爲用散還茂貞疑上與全忠有密約壬寅更於御院北垣外増兵防衞十一月癸卯朔保大節度使李茂勲帥其衆萬餘人救鳯翔屯於城北阪上與城中舉烽相應甲辰上使趙國夫人詗學士院二使皆不在亟召韓偓姚洎竊見之於土門外執手相泣洎請上速還恐爲它人所見上遽去朱全忠遣其將孔勍李暉將兵乗虚襲鄜坊壬子拔坊州甲寅大雪汴軍冒之夕進五鼔抵鄜州城下鄜人不爲僃汴軍入城城中兵尚八千人格􅃲至午鄜人始敗擒留後李繼璙勍撫存李茂勲及將士之家按堵無擾命李暉權知軍府事茂勲聞之引兵遁去汴軍每夜鳴鼓角城中地如動攻城者詬城上人云劫天子賊乗城者詬城下人云奪天子賊是冬大雪城中食盡凍餒死者不可勝計或卧未死肉巳爲人所冎市中賣人肉斤直錢百犬肉直五百茂貞儲偫亦竭以犬彘供御膳上鬻御衣及小皇子衣於市以充用削漬松􅏄以飼御馬丙子户部侍郎同平章事韋貽範薨癸亥朱全忠遣人薙城外草以困城中甲子李茂貞増兵守宫門諸宦官自度不免互相尤怨􅂫檢數爲韓偓經營入相言於茂貞及中尉樞密且遣親吏告偓偓怒曰公與韋公自貶所召歸旬月致位宰相訖不能有所爲今朝夕不濟乃欲以此相汚邪田頵急攻杭州仍具舟將自西陵度江錢鏐遣其將盛造朱郁拒破之十二月李茂勲遣使請降於朱全忠更名周彞於是茂貞山􅀯州鎮皆入王建􅀜中州鎮皆入全忠坐守孤城乃密謀誅宦官以自贖遺全忠書曰禍亂之興皆由全誨僕迎駕至此以僃它盜公既志匡社稷請公迎扈還宫僕以弊甲彫兵從公陳力全忠復書曰僕舉兵至此正以乗輿播遷公能恊力固所願也楊行密使人召田頵曰不還吾且使人代鎮宣州庚辰頵將還徴犒軍錢二十萬緡於錢鏐且求鏐子爲質將妻以女鏐謂諸子孰能爲田氏壻者莫對鏐欲遣㓜子傳球傳球不可鏐怒將殺之次子傳瓘請行吴夫人泣曰柰何寘兒虎口傳瓘曰紓國家之難安敢愛身再拜而出鏐泣送之傳瓘從數人縋北門而下頵與徐綰許再思同歸宣州鏐奪傳球内牙兵印越州客軍指揮使張洪以徐綰之黨自疑帥步兵三百奔衢州刺史陳璋納之温州將丁章逐刺史朱敖敖奔福州章據温州田頵遣使招之道出衢州陳璋聴其往還錢鏐由是恨璋丁酉上召李茂貞􅂫檢李繼誨李彦弼李繼岌李繼逺李繼忠食議與朱全忠和上曰十六宅諸王以下凍餒死者日有數人在内諸王及公主妃嬪一日食粥一日食湯餅今亦竭矣卿等意如何皆不對上曰速當和解耳鳯翔兵十餘人遮韓全誨於左銀臺門諠罵曰闔境塗炭闔城餒死止爲軍容輩數人耳全誨叩頭訴於茂貞茂貞曰卒輩何知命酌酒兩盃對飲而罷又訴於上上亦諭解之李繼昭謂全誨曰昔楊軍容破楊守亮一族今軍容亦破繼昭一族邪慢罵之遂出降於全忠復姓苻名道昭是歲䖍州刺史盧光稠攻嶺􅀯陷韶州使其子延昌守之進圍潮州清海留後劉隱發兵擊走之乘勝進攻韶州隱弟陟以爲延昌有䖍州之援未可遽取隱不從遂圍韶州㑹江漲餽運不繼光稠自䖍州引兵救之其將譚全播伏精兵萬人於山谷以羸弱挑戰大破隱于城􅀯隱奔還全播悉以功讓諸將光稠益賢之岳州刺史鄧進思卒弟進忠自稱刺史三年春正月甲辰遣殿中侍御史崔構供奉官郭遵誨詣朱全忠營丙午李茂貞亦遣牙將郭啓期往議和解平盧節度使王師範頗好學以忠義自許爲治有聲迹朱全忠圍鳯翔韓全誨以詔書徴藩鎮兵入援乗輿師範見之泣下霑衿曰吾屬爲帝室藩屏豈得坐視天子困辱如此各擁彊兵但自衞乎㑹張濬自長水亦遺之書勸舉義兵師範曰張公言正㑹吾意夫復何疑雖力不足當死生以之時􅀜東兵多從全忠在鳯翔師範分遣諸將詐爲貢獻及商販包束兵仗載以小車入汴徐兖鄆齊沂河􅀯孟滑河中陜􅉑華等州期以同日俱發討全忠適諸州者多事泄􅀍擒獨行軍司馬劉鄩取兖州時泰寧節度使葛從周悉將其兵屯邢州鄩先遣人爲販油者入城詗其虚實及兵所從入丙午鄩將精兵五百夜自水竇入北明軍城悉定市人皆不知鄩據府舍拜從周母每旦省謁待其妻子甚有恩禮子弟職掌供億如故是日青州牙將張居厚帥壯士二百將小車至華州東城知州事婁敬思疑其有異剖視之其徒大呼殺敬思攻西城崔㣧在華州帥衆拒之不克走至商州追獲之全忠留節度判官裴迪守大梁師範遣走卒齎書至大梁迪問以東方事走卒色動迪察其有變屏人問之走卒具以實告迪不暇白全忠亟請馬步都指揮使朱友寧將兵萬餘人東巡兖鄆友寧召葛從周於邢州共攻師範全忠聞變亦分兵先歸使友寧并將之戊申李茂貞獨見上中尉韓全誨張彦弘樞密使袁易簡周敬容皆不得對茂貞請誅全誨等與朱全忠和解奉車駕還京上喜即遣内養帥鳯翔卒四十人収全誨等斬之以御食使弟五可範爲左軍中尉宣徽􅀯院使仇承坦爲右軍中尉王知古爲上院樞密使楊䖍朗爲下院樞密使是夕又斬李繼筠李繼誨李彦弼及内諸司使韋處廷等十六人己酉遣韓偓及趙國夫人詣全忠營又遣使囊全誨等二十餘人首以示全忠曰曏來脅留車駕懼罪離間不欲恊和皆此曹也今朕與茂貞決意誅之卿可曉諭諸軍以豁衆憤辛亥全忠遣觀察判官李振奉表入謝全誨等己誅而全忠圍猶未解茂貞疑崔㣧教全忠欲必取鳯翔白上急召㣧今帥百官赴行在凡四降詔三賜朱書御札言甚切至悉復故官爵㣧竟稱疾不至茂貞懼自致書於㣧辭甚卑遜全忠亦以書召㣧且戲之曰吾未識天子須公來辨其是非㣧始來甲寅鳯翔始啟城門丙辰全忠巡諸寨至城北有鳯翔兵自北山下全忠疑其逼巳遣兵擊之擒其將李繼欽上遣趙國夫人馮翊夫人詣全忠營詰其故全忠遣親吏蔣玄暉奉表入奏李茂貞請以其子侃尚平原公主又欲以􅂫檢女爲景王祕妃以自固平原何后之女也后意難之上曰且令我得出何憂爾女后乃從之壬戌平原公主嫁宋侃納景王妃􅂫氏時鳯翔所誅宦官巳七十二人朱全忠又密令京兆搜捕致仕不從行者誅九十人甲子車駕出鳯翔幸全忠營全忠素服待罪命客省使宣釋罪去三仗止報平安以公服入謝全忠見上頓首流涕上命韓偓扶起之上亦泣曰宗廟社稷賴卿再安朕與宗族賴卿再生親解玉帶以賜之少休即行全忠單􅀐前導十許里上辭之全忠乃令朱友倫將兵扈從自留部分後隊焚撤諸寨友倫存之子也是夕車駕宿岐山丁卯至興平崔㣧始帥百官迎謁復以㣧爲司空門下侍郎同平章事領三司如故己巳入長安庚午全忠崔㣧同對㣧奏國􅀄承平之時宦官不典兵豫政天寳以來宦官浸盛貞元之末分羽林衞爲左右神策軍以便衞從始令宦官主之以二千人爲定制自是參掌機密奪百司權上下彌縫共爲不法大則構扇藩鎮傾危國家小則賣官鬻獄蠧害朝政王室衰亂職此之由不翦其根禍終不巳請悉罷内諸司使其事務盡歸之省寺諸道監軍俱召還闕下上從之是日全忠以兵驅宦官第五可範巳下數百人於内侍省盡殺之寃號之聲徹於内外其出使外方者詔所在収捕誅之止留黄衣㓜弱者三十人以僃洒掃又詔成徳節度使王鎔選進五十人充敕使取其士風深厚人性謹樸也上愍可範等或無罪爲文祭之自是宣傳詔命皆令宫人出入其兩軍内外八鎮兵悉屬六軍以崔㣧兼判六軍十二衞事臣光曰宦者用權爲國家患其來乆矣葢以出入宫禁人主自㓜及長與之親狎非如三公六卿進見有時可嚴憚也其閒復有性識儇利語言辯給善伺候顔色承迎志􅃐受命則無違迕之患使令則有稱㥦之効自非上智之主燭知物情慮患深逺侍奉之外不任以事則近者日親逺者日疎甘言悲辭之請有時而從浸潤膚受之愬有時而聴於是黜陟刑賞之政潜移於近習而不自知如飲醇酒嗜其味而忘其醉也黜陟刑賞之柄移而國家不危亂者未之有也東漢之衰宦官最名驕横然皆假人主之權依慿城社以濁亂天下未有能劫脅天子如制嬰兒廢置在手東西出其意使天子畏之若乗虎狼而挾蛇虺如唐丗者也所以然者非它漢不握兵唐握兵故也太宗鍳前丗之弊􅀷抑宦官無得過四品明皇始隳舊章是崇是長晚節令髙力士省決章奏乃至進退將相時與之議自太子王公皆畏事之宦官自此熾矣及中原板蕩肅宗収兵靈武李輔國以東宫舊隷參豫軍謀寵過而驕不能復制遂至愛子慈父皆不能庇以憂悸終代宗踐阼仍遵覆轍程元振魚朝恩相繼用事竊弄刑賞壅蔽聦明視天子如委裘陵宰相如奴虜是以來瑱入朝遇䜛賜死吐蕃􅀷侵郊甸匿不以聞致狼狽幸陜李光弼危疑憤鬱以隕其生郭子儀擯廢家居不保丘壟僕固懐恩寃抑無訴遂弃勲庸更爲叛亂徳宗􅀄立頗振綱紀宦官稍絀而返自興元猜忌諸將以李晟渾瑊爲不可信悉奪其兵而以竇文場霍仙鳴爲中尉使典􅀫衞自是太阿之柄落其掌握矣憲宗末年吐突承璀欲廢嫡立庶以成陳洪志之變寳曆狎䁥羣小劉克明與􅂫佐明爲逆其後絳王及文武宣懿僖昭六帝皆爲宦官所立勢益驕横王守澄仇士良田令孜楊復恭劉季述韓全誨爲之魁傑自稱定䇿國老目天子爲門生根􅀷蔕固疾成膏肓不可救藥矣文宗深憤其然志欲除之以宋申錫之賢猶不能有所爲反受其殃况李訓鄭注反覆小人欲以一朝譎詐之謀翦累丗膠固之黨遂至涉血禁塗積尸省户公卿大臣連頸就誅闔門屠滅天子陽瘖縱酒飲泣吞氣自比赧獻不亦悲乎以宣宗之嚴毅明察猶閉目摇首自謂畏之况懿僖之驕侈苟聲色毬獵足充其欲則政事一以付之呼之以父固無怪矣賊汚宫闕兩幸梁益皆令孜所爲也昭宗不勝其恥力欲清滌而所任不得其人所行不由其道始則張濬覆軍於平陽増李克用跋扈之勢復恭亡命於山􅀯啟宋文通不臣之心終則兵交闕廷矢及御衣漂泊莎城流寓華隂幽辱東内劫遷岐陽崔昌遐無如之何更召朱全忠以討之連兵圍城再罹寒暑御膳不足於糗糒王矦斃踣於飢寒然後全誨就誅乗輿東出翦滅其黨靡有孑遺而唐之廟社因以丘墟矣然則宦者之禍始於明皇盛於肅代成於徳宗極於昭宗易曰履霜堅氷至爲國家者防微杜漸可不慎其始哉此其爲患章章尤著者也自餘傷賢害能召亂致禍賣官鬻獄沮敗師徒蠧害烝民不可徧舉夫寺人之官自三王之丗載於詩禮所以謹閨闥之禁通内外之言安可無也如巷伯之疾惡寺人披之事君鄭衆之辭賞吕彊之直諌曹日昇之救患馬存亮之弭亂楊復光之討賊嚴遵羙之避權張承業之竭忠其中豈無賢才乎顧人主不當與之謀議政事進退士大夫使有威福足以動人耳果或有罪小則刑之大則誅之無所寛赦如此雖使之專横孰敢哉豈可不察臧否不擇是非欲草薙而禽獮之能無亂乎是以袁紹行之於前而董卓弱漢崔昌遐襲之於後而朱氏簒唐雖快一時之忿而國隨以亡是猶惡衣之垢而焚之患木之蠧而伐之其爲害豈不益多哉孔子曰人而不仁疾之巳甚亂也斯之謂矣王師範遣使以起兵告李克用克用貽書襃賛之河東監軍張承業亦勸克用發兵救鳯翔克用攻晉州聞車駕東歸乃罷楊行密承制加朱瑾東面諸道行營副都統同平章事以昇州刺史李神福爲淮南行軍司馬鄂岳行營招討使舒州團練使劉有副之將兵擊杜洪洪將駱殷戍永興弃城走縣民方詔據城降神福曰永興大縣饋運所仰巳得鄂之半矣資治通鑑卷第二百六十三
