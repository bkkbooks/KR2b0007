body:
  text: 周民東亡秦人取其寳噐遷西周公於􅓆狐之聚楚人遷魯于莒而取其地五十三年摎伐魏取吳城韓王入朝魏舉國聽令五十四年王郊見上帝於雍楚遷于鉅陽五十五年衞懷君朝于魏魏人執而殺之更立其弟是為元君元君魏壻也五十六年秋王薨孝文王立尊唐八子為唐太后以子楚為太子趙人奉子楚妻子歸之韓王衰絰入弔祠燕王喜使栗腹約歡於趙以五百金為趙王酒反而言於燕王曰趙壯者皆死長平其孤未壯可伐也王召昌國君樂閒問之對曰趙四戰之國其民習兵不可王曰吾以五而伐一對曰不可王怒羣臣皆以為可乃發二千乘栗腹將而攻鄗卿秦攻代將渠曰與人通關約交以五百金飲人之王使者報而攻之不祥師必無功王不聽自將偏軍隨之將渠引王之綬王以足䠞之將渠泣曰臣非自為為王也燕師至宋子趙廉頗為將逆擊之敗栗腹於鄗敗卿秦樂乗於代追北五百餘里遂圍燕燕人請和趙人曰必令將渠處和燕王以將渠為相而處和趙師乃觧去趙平原君卒秦孝文王元年冬十月己亥王即位三日薨子楚立是為莊襄王尊華陽夫人為華陽太后夏姬為夏太后燕將攻齊聊城抜之或譛之燕王燕將保聊城不敢歸齊田單攻之歲餘不下魯仲連乃為書約之矢以射城中遺燕將為陳利害曰為公計者不歸燕則歸齊今獨守孤城齊兵日益而燕救不至將何為乎燕將見書泣三日猶豫不能自决欲歸燕已有隙欲降齊所殺虜於齊甚衆恐已降而後見辱喟然歎曰與人刃我寧我自刃遂自殺􅂓城亂田單克􅂓城歸言魯仲連於齊王欲爵之仲連逃之海上曰吾與富貴而詘於人寧貧賤而輕世肆志焉魏安釐王問天下之高士於子順子順曰世無其人也抑可以為次其魯仲連乎王曰魯仲連彊作之者非體自然也子順曰人皆作之作之不止乃成君子作之不變習與體成習與體成則自然也秦莊襄王元年呂不韋為相國東周君為諸矦謀伐秦王使相國帥師討㓕之遷東周君於陽人聚周既不祀周比亡凢有七邑河南洛陽穀城平隂偃師鞏緱氏以河南洛陽十萬户封相國不韋為文信矦蒙驁伐韓取成臯滎陽初置三川郡楚滅魯遷魯頃公於卞為家人二年日有食之蒙驁伐趙定太原取榆次狼孟等三十七城楚春申君言於楚王曰淮北地邊於齊其事急請以為郡而封於江東楚王許之春申君因城故吳墟以為都邑宮室極盛三年王齕攻上黨諸城悉㧞之初置太原郡蒙驁帥師伐魏取高都汲魏師數敗魏王患之乃使人請信陵君於趙信陵君畏得罪不肯還誡門下曰有敢為魏使通者死賔客莫敢諌毛公薛公見信陵君曰公子所以重於諸矦者徒以有魏也今魏急而公子不恤一旦秦人克大梁夷先王之宗廟公子當何面目立天下乎語未卒信陵君色變趣駕還魏魏王持信陵君而泣以為上將軍信陵君使人求援於諸矦諸矦聞信陵君復為魏將皆遣兵救魏信陵君率五國之師敗蒙驁於河外蒙驁遁走信陵君追至函谷關抑之而還安陵人縮高之子仕於秦秦使之守管信陵君攻之不下使人謂安陵君曰君其遣縮高吾將仕之以五大夫使為執節尉安陵君曰安陵小國也不能必使其民使者自徃請之使吏導使者至縮高之所使者致信陵君之命縮高曰君之幸高也將使高攻管也夫父攻子守人之笑也見臣而下是倍主也父敎子倍亦非君之所喜敢再拜辭使者以報信陵君信陵君大怒遣使之安陵君所曰安陵之地亦猶魏也今吾攻管而不下則秦兵及我社稷必危矣願君生束縮高而致之若君弗致無忌將發十萬之師以造安陵之城下安陵君曰吾先君成矦受詔襄王以守此城也手受太府之憲憲之上篇曰子弑父臣弑君有常不赦國雖大赦降城亡子不得與焉今縮高辭大位以全父子之義而君曰必生致之是使我負襄王之詔而廢太府之憲也雖死終不敢行縮高聞之曰信陵君為人悍猛而自用此辭反必為國禍吾已全已無違人臣之義矣豈可使吾君有魏患乎乃之使者之舎刎頸而死信陵君聞之縞素辟舎使使者謝安陵君曰无忌小人也困於思慮失言於君請再拜辭罪王使人行萬金於魏以間信陵君求得晉鄙客令説魏王曰公子亡在外十年矣今復為將諸矦皆屬天下徒聞信陵君而不聞魏王矣王又數使人賀信陵君得為魏王未也魏王日聞其毁不能不信乃使人代信陵君將兵信陵君自知再以毁廢乃謝病不朝日夜以酒色自娛凡四歲而卒韓王徃弔其子榮之以告子順子順曰必辭之以禮鄰國君弔君為之主今君不命子則子無所受韓君也其子辭之五月丙午王薨太子政立生十三年矣國事皆委於文信矦號稱仲父晉陽反秦始皇帝上元年蒙驁擊定之韓欲疲秦人使無東伐乃使水工鄭國為間於秦鑿涇水自仲山為渠並北山東注洛中作而覺秦人欲殺之鄭國曰臣為韓延數年之命然渠成亦秦萬世之利也乃使卒為之注填閼之水漑舄鹵之地四萬餘頃收皆畝一鍾關中由是益富饒二年麃公將卒攻卷斬首三萬趙以廉頗為假相國伐魏取繁陽趙孝成王薨子悼襄王立使武襄君樂乗代廉頗廉頗怒攻武襄君武襄君走廉頗出犇魏久之魏不能信用趙師數困於秦趙王思復得廉頗廉頗亦思復用於趙趙王使使者視廉頗尚可用否廉頗之􅄷郭開多與使者金令毁之廉頗見使者一飯斗米肉十斤被甲上馬以示可用使者還報曰廉將軍雖老尚善飯然與臣坐頃之三遺矢矣趙王以為老遂不召楚人隂使迎之廉頗一為楚將無功曰我思用趙人卒死於壽春三年大饑蒙驁伐韓取十二城趙王以李牧為將伐燕取武遂方城李牧者趙之北邊良將也嘗居代鴈門僃匈奴以便冝置吏市租皆輸入莫府為士卒費日擊數牛饗士習騎射謹烽火多間諜為約曰匈奴即入盗急入收保有敢捕虜者斬匈奴每入烽火謹輒入收保不戰如是數歲亦不亡失匈奴皆以為怯雖趙邊兵亦以為吾將怯趙王讓之李牧如故王怒使佗人代之歲餘屢出戰不利多失亡邊不得田畜王復請李牧李牧杜門稱病不出王彊起之李牧曰必用臣臣如前乃敢奉令王許之李牧至邊如約匈奴數歲無所得終以為怯邊士日得賞賜而不用皆願一戰於是乃具選車得千三百乗選騎得萬三千匹百金之士五萬人彀者十萬人悉勒習戰大縱畜牧人民滿野匈奴小入佯北不勝以數十人委之單于聞之大率衆來入李牧多為奇陳張左右翼擊之大破殺匈奴十餘萬騎滅襜襤破東胡降林胡單于犇走十餘歲不敢近趙邊先是時天下冠帶之國七而三國邊於戎狄秦自隴以西有緜諸緄戎翟䝠之戎歧梁涇漆之北有義渠大荔烏氏朐衍之戎而趙北有林胡樓煩之戎燕北有東胡山戎各分散居谿谷自有君長往往而聚者百有餘戎然莫能相一其後義渠築城郭以自守而秦稍蠶食之至惠王遂㧞義渠二十五城昭王之時宣太后誘義渠王殺諸甘泉遂發兵伐義渠滅之始於隴西北地上郡築長城以拒胡趙武靈王北破林胡樓煩築長城自代並隂山下至髙闕爲塞而置雲中鴈門代郡其後燕將秦開爲質於胡胡甚信之歸而襲破東胡東胡却千餘里燕亦築長城自造陽至襄平置上谷漁陽右北平遼東郡以距胡及戰國之末而匈奴始大四年春蒙驁伐魏取畼有詭三月軍罷秦質子歸自趙趙太子出歸國七月蝗疫令百姓納粟千石拜爵一級魏安釐王薨子景湣王立五年蒙驁伐魏取酸棗燕虛長平雍丘山陽等二十城初置東郡初劇辛在趙與龎煖善已而仕燕燕王見趙數困於秦廉頗去而龐煖爲將欲因其敝而攻之問於劇辛對曰龎煖易與耳燕王使劇辛將而伐趙趙龎煖禦之殺劇辛取燕師二萬諸矦患秦攻伐無已時六年楚趙魏韓衛合從以伐秦楚王為從長春申君用事取壽陵至函谷秦師出五國之師皆敗走楚王以咎春申君春申君以此益疎觀津人朱英謂春申君曰人皆以楚為彊君用之而弱其於英不然先君時秦善楚二十年而不攻楚何也秦踰黽阨之塞而攻楚不便假道於兩周背韓魏而攻楚不可今則不然魏旦暮亡不能愛許鄢陵魏割以與秦秦兵去陳百六十里臣之所觀者見秦楚之日鬬也楚於是去陳徙壽春命曰郢春申君就封於吳行相事秦㧞魏朝歌及衛濮陽衛元君率其支屬徙居野王阻其山以保魏之河内七年伐魏取汲夏太后甍蒙驁卒八年魏與趙鄴韓桓惠王薨子安立九年伐魏取垣蒲夏四月寒民有凍死者王宿雍己酉王冠帶劒楊端和伐魏取衍氏初王即位年少太后時時與文信矦私通王益壯文信矦恐事覺禍及已乃詐以舎人嫪毐為宦者進於太后太后幸之生二子封毐為長信矦以太原為毐國政事皆决於毐客求為毐舎人者甚衆王左右有與毐争言者告毐實非宦者王下吏治毐毐懼矯王御璽發兵欲攻蘄年宮為亂王使相國昌平君昌文君發卒攻毐戰咸陽斬首數百毐敗走獲之秋九月夷毐三族黨與皆車裂滅宗舎人罪輕者徙蜀凢四千餘家遷太后於雍萯陽宮殺其二子下令曰敢以太后事諌者戮而殺之斷其四支積於闕下死者二十七人齊客茅焦上謁請諌王使謂之曰若不見乎積闕下者邪對曰臣聞天有二十八宿今死者二十七人臣之來固欲滿其數耳臣非畏死者也使者走入白之茅焦邑子同食者盡負其衣物而逃王王大怒曰是人也故來犯吾趣召鑊烹之是安得積闕下哉王按劒而坐口正沫出使者召之入茅焦徐行至前再拜謁起稱曰臣聞有生者不諱死有國者不諱亡諱死者不可以得生諱亡者不可以得存死生存亡聖主所欲急聞也陛下欲聞之乎王曰何謂也茅焦曰陛下有狂悖之行不自知邪車裂假父囊撲二弟遷母於雍殘戮諌士桀紂之行不至於是矣令天下聞之盡瓦解無嚮秦者臣竊爲陛下危之臣言已矣乃觧衣伏質王下殿手自接之曰先生起就衣今願受事乃爵之上卿王自駕虛左方往迎太后歸於咸陽復爲母子如初楚考烈王無子春申君患之求婦人冝子者甚衆進之卒無子趙人李園持其妹欲進諸楚王聞其不冝子恐乆無寵乃求爲春申君舎人已而謁歸故失期而還春申君問之李園曰齊王使人求臣之妹與其使者飲故失期春申君曰聘入乎曰未也春申君遂納之既而有娠李園使其妹説春申君曰楚王貴幸君雖兄弟不如也今君相楚二十餘年而王無子即百歲後將更立兄弟彼亦各貴其故所親君又安得常保此寵乎非徒然也君貴用事乆多失禮於王之兄弟兄弟立禍且及身矣今妾有娠而人莫知妾幸君未乆誠以君之重進妾於王王必幸之妾頼天而有男則是君之子為王也楚國盡可得孰與身臨不測之禍哉春申君大然之乃出李園妹謹舍而言諸楚王王召入幸之遂生男立為太子李園妹為王后李園亦貴用事而恐春申君泄其語隂養死士欲殺春申君以滅口國大頗有知之者楚王病朱英謂春申君曰世有無望之福亦有無望之禍今君處無望之世事無望之主安可以無無望之人乎春申君曰何謂無望之福曰君相楚二十餘年矣雖名相國其實王也王今病旦暮薨薨而君相㓜主因而當國王長而反政不即遂南面稱孤此所謂無望之福也何謂無望之禍曰李園不治國而君之仇也不為兵而養死士之日久矣王薨李園必先入據權而殺君以滅口此所謂無望之禍也何謂無望之人曰君置臣郎中王薨李園先入臣為君殺之此所謂無望之人也春申君曰足下置之李園弱人也僕又善之且何至此朱英知言不用懼而亡去後十七日楚王薨李園果先入伏死士於棘門之内春申君入死士俠刺之投其首於棘門之外於是使吏盡捕誅春申君之家太子立是為幽王揚子法言曰或問信陵平原孟嘗春申益乎曰上失其政姦臣竊國命何其益乎王以文信矦奉先王功大不忍誅十年冬十月文信矦免相出就國宗室大臣議曰諸矦人來仕者皆為其主遊間耳請一切逐之於是大索逐客客卿楚人李斯亦在逐中行且上書曰昔穆公求士西取由余於戎東得百里奚於宛迎蹇叔於宋求丕豹公孫支於晉并國二十遂覇西戎孝公用商鞅之法諸矦親服至今治彊惠王用張儀之計散六國之從使之事秦昭王得范睢彊公室杜私門此四君者皆以客之功由此觀之客何負於秦哉夫色樂珠玉不產於秦而王服御者衆取人則不然不問可否不論曲直非秦者去為客者逐是所重者在乎色樂珠玉而所輕者在乎人民也臣聞太山不讓土壤故能成其大河海不澤細流故能就其深王者不却衆庶故能明其徳此五帝三王之所以無敵也今乃棄黔首以資敵國却賔客以業諸矦所謂藉寇兵而齎盗糧者也王乃召李斯復其官除逐客之令李斯至驪邑而還王卒用李斯之謀隂遣辯士齎金玉遊説諸矦諸矦名士可下以財者厚遺結之不肯者利劒刺之離其君臣之計然後使良將隨其後數年之中卒兼天下十一年趙人伐燕取貍陽兵未罷將軍王翦桓齮楊端和伐趙攻鄴取九城王翦攻閼與轑陽桓齮取鄴安陽趙悼襄王薨子幽繆王遷立其母倡也嬖於悼襄王悼襄王廢嫡子嘉而立之遷素以無行聞於國文信矦就國歲餘諸矦賔客使者相望於道請之王恐其為變乃賜文信矦書曰君何功於秦封君河南食十萬户何親於秦號稱仲父其與家屬徙處蜀文信矦自知稍侵恐誅十二年文信矦飲酖死竊葬其舎人臨者皆逐遷之且曰自今以來操國事不道如嫪毐不韋者籍其門視此揚子法言曰或問呂不韋其智矣乎以人易貨曰誰謂不韋智者歟以國易宗呂不韋之盗穿窬之雄乎穿窬也者吾見擔石矣未見雒陽也自六月不雨至于八月發四郡兵助魏伐楚十三年桓齮伐趙敗趙將扈輙於平陽斬首十萬殺扈輙趙王以李牧為大將軍復戰於宜安肥下秦師敗績桓齮犇還趙封李牧為武安君十四年桓齮伐趙取冝安平陽武城韓王納地効璽請為藩臣使韓非來聘韓非者韓之諸公子也善刑名法術之學見韓之削弱數以書干韓王王不能用於是韓非疾治國不務求人任賢反舉浮淫之蠧而加之功實之上寛則寵名譽之人急則用介胄之士所養非所用所用非所養悲廉直不容於邪枉之臣觀徃者得失之變作孤憤五蠧内外儲説林説難五十六篇十餘萬言王聞其賢欲見之非為韓使於秦因上書説王曰今秦地方數千里師名百萬號令賞罰天下不如臣昧死願望見大王言所以破天下從之計大王誠聽臣説一舉而天下之從不破趙不舉韓不亡荆魏不臣齊燕不親霸王之名不成四鄰諸矦不朝大王斬臣以徇國以戒為王謀不忠者也王恱之未任用李斯嫉之曰韓非韓之諸公子也今欲并諸矦非終為韓不為秦此人情也今王不用乆留而歸之此自遺患也不如以法誅之王以為然下吏治非李斯使人遺非藥令早自殺韓非欲自陳不得見王後悔使赦之非已死矣揚子法言曰或問韓非作説難之書而卒死乎説難敢問何反也曰説難盖所以死乎曰何也曰君子以禮動以義止合則進否則退確乎不憂其不合也夫説人而憂其不合則亦無所不至矣或曰非憂説之不合非邪曰説不由道憂也由道而不合非憂也臣光曰臣聞君子親其親以及人之親愛其國以及人之國是以功大名羙而享有百福也今非爲秦畫謀而首欲覆其宗國以售其言罪固不容於死矣烏足愍哉十五年王大興師伐趙一軍抵鄴一軍抵太原取狼孟番吾遇李牧而還初燕太子丹嘗質於趙與王善王即位丹為質於秦王不禮焉丹怒亡歸十六年韓獻南陽地九月發卒受地於韓魏人獻地代地震目樂徐以西北至平隂臺居牆垣太半壞地坼東西百三十步十七年内史勝滅韓虜韓王安以其地置潁川郡華陽太后薨趙大饑衛元君薨子角立十八年王翦將上地兵下井陘端和將河内兵共伐趙趙李牧司馬尚禦之秦人多與趙王嬖臣郭開金使毁牧及尚言其欲反趙王使趙葱及齊將顏聚代之李牧不受命趙人捕而殺之廢司馬尚十九年王翦擊趙軍大破之殺趙葱顔聚亡遂克邯鄲虜趙王遷王如邯鄲故與母家有􅄷怨者皆殺之還從太原上郡歸太后薨王翦屯中山以臨燕趙公子嘉帥其宗族百人犇代自立為代王趙之亡大夫稍稍歸之與燕合兵軍上谷楚幽王薨國人立其弟郝三月郝庶兄負芻殺之自立魏景湣王薨子假立燕太子丹怨王欲報之以問其傅鞠武鞠武請西約三晉南連齊楚北媾匈奴以圖秦太子曰太傅之計曠日彌久令人心惽然恐不能湏也頃之將軍樊於期得罪亡之燕太子受而舎之鞠武諌曰夫以秦王之暴而積怒於燕足為寒心又況聞樊將軍之所在乎是謂委肉當餓虎之蹊也願太子疾遣樊將軍入匈奴太子曰樊將軍窮困於天下歸身於丹是固丹命卒之時也願更慮之鞠武曰夫行危以求安造禍以為福計淺而怨深乃連結一人之後交不顧國家之大害所謂資怨而助禍矣太子不聽太子聞衛人荆軻之賢卑辭厚禮而請見之謂軻曰今秦已虜韓王又舉兵南伐楚北臨趙趙不能支秦則禍必至於燕燕小弱數困於兵何足以當秦諸矦服秦莫敢合從丹之私計愚以為誠得天下之勇士使於秦劫秦王使悉反諸矦侵地若曹沬之與齊桓公則大善矣則不可因而刺殺之彼大將擅兵於外而内有亂則君臣相疑以其間諸矦得合從其破秦必矣唯荆卿留意焉荆軻許之於是舎荆卿於上舎太子日造門下所以奉養荆軻無所不至及王翦滅趙太子聞之懼欲遣荆軻行荆軻曰今行而無信則秦未可親也誠得樊將軍首與燕督亢之地圖奉獻秦王秦王必説見臣臣乃有以報太子曰樊將軍窮困來歸丹丹不忍也荆軻乃私見樊於期曰秦之遇將軍可謂深矣父母宗族皆為戮没今聞購將軍首金千斤邑萬家將柰何於期太息流涕曰計將安出荆卿曰願得將軍之首以獻秦王秦王必喜而見臣臣左手把其袖右手揕其胷則將軍之仇報而燕見陵之愧除矣樊於期曰此臣之日夜切齒腐心也遂自刎太子聞之犇徃伏哭然已無柰何遂以函盛其首太子豫求天下之利匕首使工以藥焠之以試人血濡縷人無不立死者乃􅏻為遣荆軻以燕勇士秦舞陽為之副使入秦資治通鑑卷第六
