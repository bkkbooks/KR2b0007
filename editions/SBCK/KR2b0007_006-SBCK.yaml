front:
  text: 之曰子宣言欲代我相請聞其説蔡澤曰吁君何見之晚也夫四時之序成功者去君獨不見夫秦之商君楚之吳起越之大夫種何足願與應矦謬曰何為不可此三子者義之至也忠之盡也君子有殺身以成名死無所恨蔡澤曰夫人立功豈不期於成全邪身名俱全者上也名可灋而身死者次也名僇辱而身全者下也夫商君吳起大夫種其為人臣盡忠致功則可願矣閎夭周公豈不亦忠且聖乎三子之可願孰與閎夭周公哉應矦曰善蔡澤曰然則君之主惇厚舊故不倍功臣孰與孝公楚王越王曰未知何如蔡澤曰君之功能孰與三子曰不若蔡澤曰然則君身不退患恐甚於三子矣語曰日中則移月滿則虧進退嬴縮與時變化聖人之道也今君之怨已讎而徳已報意欲至矣而無變計竊為君危之應矦遂延以為上客因薦於王王召見與語大恱拜為客卿應矦因謝病免王新恱蔡澤計畫遂以為相國澤為相數月免楚春申君以荀卿為蘭陵令荀卿者趙人名況嘗與臨武君論兵於趙孝成王之前王曰請問兵要臨武君對曰上得天時下得地利觀敵之變動後之發先之至此用兵之要術也荀卿曰不然臣所聞古之道凢用兵攻戰之本在乎一民弓矢不調則羿不能以中六馬不和則造父不能以致逺士民不親附則湯武不能以必勝也故善附民者是乃善用兵也故兵要在乎附民而已臨武君曰不然兵之所貴者勢利也所行者變詐也善用兵者感忽悠闇莫知所從出孫吳用之無敵於天下豈必待民附哉荀卿曰不然臣之所道仁人之兵王者之志也君之所貴權謀勢利也仁人之兵不可詐也彼可詐者怠慢者也露􅃝者也君臣上下之間滑然有離德者也故以桀詐桀猶巧拙有幸焉以桀詐堯譬之以夘投石以指橈沸若赴水火入焉焦没耳故仁人之兵上下一心三軍同力臣之於君也下之於上也若子之事父弟之事兄若手臂之扞頭目而覆胷腹也詐而襲之與先驚而後擊之一也且仁人用十里之國則將有百里之聽用百里之國則將有千里之聽用千里之國則將有四海之聽必將聰明警戒和􅀓而一故仁人之兵聚則成卒散則成列延則若莫􅁘之長刅嬰之者斷兊則若莫􅁘之利鋒當之者潰圜居而方止則若盤石然觸之者角摧而退耳且夫暴國之君將誰與至哉彼其所與至者必其民也其民之親我歡若父母其好我芬若椒蘭彼反顧其上則若灼黥若仇讐人之情雖桀跖豈有肯為其所惡賊其所好者哉是猶使人之子孫自賊其父母也彼必將來告之夫又何可詐也故仁人用國日明諸矦先順者安後順者危敵之者削反之者亡詩曰武王載發有度秉鉞如火烈烈則莫我敢遏此之謂也孝成王臨武君曰善請問王者之兵設何道何行而可筍卿曰凡君賢者其國治君不能者其國亂隆禮貴義者其國治簡禮賤義者其國亂治者彊亂者弱是彊弱之本也上足卬則下可用也上不足卬則下不可用也下可用則彊下不可用則弱是彊弱之常也好士者彊不好士者弱愛民者彊不愛民者弱政令信者彊政令不信者弱重用兵者彊輕用兵者弱權出一者彊權出二者弱是彊弱之常也齊人隆技擊其技也得一首者則賜贖錙金無本賞矣是事小敵毳則偷可用也事大敵堅則渙焉離耳若飛馬然傾側反覆無日是亡國之兵也兵莫弱是矣是其去賃市傭而戰之幾矣魏氏之武卒以度取之衣三屬之甲操十二石之弩負矢五十箇置戈其上冠胄帶劒贏二日之糧日中而趨百里中試則復其户利其田宅是其氣力數年而衰而復利未可奪也改造則不易周也是故地雖大其稅必寡是危國之兵也秦人其生民也陿隘其使民也酷烈劫之以勢隱之以阨忸之以慶賞鰌之以刑罰使民所以要利於上者非鬬無由也使以功賞相長五甲首而􅀠五家是最為衆彊長久之道故四世有勝非幸也數也故齊之技擊不可以遇魏之武卒魏之武卒不可以遇秦之鋭士秦之鋭士不可以當桓文之節制桓文之節制不可以敵湯武之仁義有遇之者若以焦熬投石焉兼是數國者皆干賞蹈利之兵也傭徒鬻賣之道也未有貴上安制綦節之理也諸矦有能微妙之以節則作而兼殆之耳故招延募選隆勢詐尚功利是漸之也禮義敎化是齊之也故以詐遇詐猶有巧拙焉以詐遇齊譬之猶以錐刀墮太山也故湯武之誅桀紂也拱挹指麾而彊暴之國莫不趨使誅桀紂若誅獨夫故泰誓曰獨夫紂此之謂也故兵大齊則制天下小齊則治鄰敵若夫招延募選隆勢詐尚功利之兵則勝不勝無常代翕代張代存代亡相為雌雄耳夫是之謂盗兵君子不由也孝成王臨武君曰善請問為將荀卿曰知莫大乎棄疑行莫大乎無過事莫大乎無悔事至無悔而止矣不可必也故制號政令欲嚴以威慶賞刑罰欲必以信處舎收藏欲周以固徙舉進退欲安以重欲疾以速窺敵觀變欲潜以深欲伍以參遇敵决戰必行吾所明無行吾所疑夫是之謂六術無欲將而惡廢無怠勝而忘敗無威内而輕外無見其利而不顧其害凡慮事欲熟而用財欲泰夫是之謂五權將所以不受命於主有三可殺而不可使處不完可殺而不可使擊不勝可殺而不可使欺百姓夫是之謂三至凡受命於主而行三軍三軍既定百官得序群物皆正則主不能喜敵不能怒夫是之謂至臣慮必先事而申之以敬慎終如始終始如一夫是之謂大吉凡百事之成也必在敬之其敗也必在慢之故敬勝怠則吉怠勝敬則滅計勝欲則從欲勝計則凶戰如守行如戰有功如幸敬謀無曠敬事無曠敬吏無曠敬衆無曠敬敵無曠夫是之謂五無曠慎行此六術五權三至而處之以恭敬無曠夫是之謂天下之將則通於神明矣臨武君曰善請問王者之軍制荀卿曰將死皷御死轡百吏死職士大夫死行列聞皷聲而進聞金聲而退順命為上有功次之令不進而進猶令不退而退也其罪惟均不殺老弱不獵禾稼服者不禽格者不赦犇命者不獲凢誅非誅其百姓也誅其亂百姓者也百姓有扞其賊則是亦賊也以故順刃者生傃刃者死犇命者貢微子開封於宋曹觸龍斷於軍商之服民所以養生之者無異周人故近者謌謳而樂之逺者竭蹷而趨之無幽閒辟陋之國莫不趨使而安樂之四海之内若一家通達之屬莫不從服夫是之謂人師詩曰自西自東自南自北無思不服此之謂也王者有誅而無戰城守不攻兵格不擊敵上下相喜則慶之不屠城不潜軍不留衆師不越時故亂者樂其政不安其上欲其至也臨武君善曰善陳囂問荀卿曰先生議兵常以仁義為本仁者愛人義者循理然則又何以兵為凢所為有兵者為爭奪也荀卿曰非汝所知也彼仁者愛人愛人故惡人之害之也義者循理循理故惡人之亂之也彼兵者所以禁暴除害也非爭奪也燕孝王薨子喜立
