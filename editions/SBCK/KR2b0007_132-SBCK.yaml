body:
  text: 臣司馬光奉勑編集宋紀十四章閹茂凡四年起強圉協洽盡上太宗明皇帝中㤗始三年春正月張永等棄城夜遁會天大雪泗水氷合永等棄船歩走士卒凍死者大半手足斷者什七八尉元邀其前薛安都乘其後大破永等於呂梁之東死者以萬數枕尸六十餘里委棄軍資器械不可勝計永足指亦墮與沈攸之僅以身免梁南秦二州刺史垣恭祖等為魏所虜上聞之召蔡興宗以敗書示之曰我愧卿甚永降號左將軍攸之免官以貞陽公領職還屯淮隂由是失淮北四州及豫州淮西之地裴子野論曰昔齊桓矜於葵丘而九國叛曹公不禮張松而天下分一失豪釐其差遠矣太宗之初威令所被不滿百里卒有離心士無固色而能開誠心布欵實莫不感㤙服德致命效死故西摧北蕩㝢内褰開既而六軍獻㨗方隅束手天子欲賈其餘威師出無名長淮以北倐忽為戎惜乎若以嚮之虛懷不驕不伐則三叛奚為而起哉高祖蟣虱生介冑經啓疆埸後之子孫日蹙百里播穫堂構豈云易哉魏尉元以彭城兵荒之後公私困竭請􅀤冀相濟兖四州粟取張永所弃船九百艘􅆓清運載以賑新民魏朝從之魏東平王道符反於長安殺副將駙馬都尉萬古真等丙午司空和其奴等將殿中兵討之丁未道符司馬叚太陽攻道符斬之以安西將軍陸眞為長安鎮將以撫之道符翰之子也閏月魏以頓丘王李峻為太宰沈文秀崔道固為土人所攻遣使乞降於魏且請兵自救二月魏西河公石自懸瓠引兵攻汝隂太守張超不克退屯陳項議還長社待秋擊之鄭羲曰張超蟻聚窮命糧食已盡不降當走可翹足而待也今弃之遠去超脩城浚隍積薪儲榖更來恐難圖矣石不從遂還長社初尋陽既平帝遣沈文秀弟文炳以詔書諭文秀又遣輔國將軍劉懷珍將馬歩三千人與文炳偕行未至值張永等敗退懷珍還鎮山陽文秀攻青州刺史明僧暠帝使懷珍帥龍驤將軍王廣之將五百騎歩卒二千人浮海救之至東海僧暠已退保東萊懷珍進據朐城衆心兇懼欲且保郁洲懷珍曰文秀欲以青州歸索虜計齊之士民安肯甘心左祍邪今揚兵直前宣布威德諸城可飛書而下柰何守此不進自為沮橈乎遂進至黔陬文秀所署高密平昌二郡太守弃城走懷珍送致文炳逹朝廷意文秀猶不降百姓聞懷珍至皆喜文秀所署長廣太守劉桃根將數千人戍不其城懷珍軍於洋水衆謂且宜堅壁伺隙懷珍曰今衆少糧竭懸軍深入正當以精兵速進掩其不備耳乃遣王廣之將百騎襲不其城㧞之文秀聞諸城皆敗乃遣使請降帝復以為青州刺史崔道固亦請降復以為冀州刺史懷珍引還魏濟隂王小新成卒沈攸之之自彭城還也留長水校尉王􅀇載守下邳積射將軍沈韶守宿豫睢陵淮陽皆留兵戍之􅀇載􅀇謨之從弟也時東平太守申纂守無鹽幽州刺史劉休賔守梁鄒并州刺史清河房崇吉守升城輔國將軍清河張讜守團城及兖州刺史王整蘭陵太守􅁊忻肥城糜溝垣苖等戍皆不附於魏休賔乘民之兄子也魏遣平東將軍長孫陵等將兵赴青州征南大將軍慕容白曜將騎五萬爲之繼援白曜燕太祖之􅀇孫也白曜至無鹽欲攻之將佐皆以為攻具未備不宜遽進左司馬范陽酈範曰今輕軍遠襲深入敵境豈宜淹緩且申纂必謂我軍來速不暇攻圍將不為備今若出其不意可一鼓而克白曜曰司馬䇿是也乃引兵偽退申纂不復設備白曜夜中部分三月甲寅旦攻城食時克之纂走追擒殺之白曜欲盡以無鹽人為軍賞酈範曰齊形勝之地宜遠為經略今王師始入其境人心未洽連城相望咸有拒守之志苟非以徳信懷之未易平也白曜曰善皆免之白曜將攻肥城酈範曰肥城雖小攻之引日勝之不能益軍勢不勝足以挫軍威彼見無鹽之破死傷塗地不敢不懼若飛書告諭縱使不降亦當逃散白曜從之肥城果潰獲粟三十萬斛白曜謂範曰此行得卿三齊不足定也遂取垣苖糜溝二戍一旬中連㧞四城威震齊土丙子以尚書左僕射蔡興宗為郢州刺史房崇吉守升城勝兵者不過七百人慕容白曜築長圍以攻之自二月至于夏四月乃克之白曜忿其不降欲盡阬城中人參軍事昌黎韓麒麟諫曰今勍敵在前而阬其民自此以東諸城人自為守不可克也師老粮盡外冦乘之此危道也白曜乃慰撫其民各使復業崇吉脱身走崇吉母傅氏申纂妻賈氏與濟州刺史盧度世有中表親然已踈遠及為魏所虜度世奉事甚恭贍給優厚度世閨門之内和而有禮雖世有屯夷家有貧富百口怡怡豐儉同之崔道固閉門拒魏沈文秀遣使迎降於魏請兵援接白曜欲遣兵赴之酈範曰文秀室家墳墓皆在江南擁兵數萬城固甲堅彊則拒戰屈則遁去我師未逼其城無朝夕之急何所畏忌而遽求援軍且觀其使者視下而色愧語煩而志怯此必挾詐以誘我不可從也不若先取歴城克般陽下梁鄒平樂陵然後案兵徐進不患其不服也白曜曰崔道固等兵力單弱不敢出戰吾通行無礙直抵東陽彼自知必亡故望風求服夫又何疑範曰歴城兵多糧足非朝夕可拔文秀坐據東陽為諸城根本今多遣兵則無以攻歴城少遣兵則不足以制東陽若進為文秀所拒退為諸城所邀腹背受敵必無全理願更審計無墮賊彀中白曜乃止文秀果不降魏尉元上表稱彭城賊之要藩不有重兵積粟則不可固守若資儲旣廣雖劉彧師徒悉起不敢窺淮北之地又言若賊向彭城必由清泗過宿豫歴下邳趨青州亦由下邳泝水經東安此數者皆為賊用師之要今若先定下邳平宿豫鎮淮陽戍東安則青冀諸鎮可不攻而克若四城不服青冀雖拔百姓狼顧猶懷僥倖之心臣愚以為宜釋青冀之師先定東南之地斷劉彧北顧之意絶愚民南望之心夏水雖盛無津途可由冬路雖通無高城可固如此則淮北自舉暫勞永逸兵貴神速乆則生變若天雨旣降彼或因水通運糧益衆規為進取恐近淮之民翻然改圖青冀二州猝未可㧞也五月壬戌以太子詹事袁粲為尚書右僕射沈攸之自送運米至下邳魏人遣清泗間人詐攸之云薛安都欲降求軍迎接軍副吳喜請遣千人赴之攸之不許旣而來者益多喜固請不已攸之乃集來者告之曰君諸人旣有誠心若能與薛徐州子弟俱來者皆即假君以本鄉縣唯意所欲如其不爾無為空勞往還自是一去不返攸之使軍主彭城陳顯逹將千人助戍下邳而還薛安都子令伯亡命梁雍之間聚黨數千人攻䧟郡縣秋七月雍州刺史巴陵王休若遣南陽太守張敬兒等擊斬之上復遣中領軍沈攸之等擊彭城攸之以為清泗方涸糧運不繼固執以為不可使者七返上怒强遣之八月壬寅以攸之行南兖州刺史將兵北出使行徐州事蕭道成將千人鎮淮隂道成收飬豪俊賔客始盛魏之入彭城也垣崇祖將部曲奔朐山據之遣使來降蕭道成以為朐山戍主朐山濵海孤絶人情未安崇祖浮舟水側欲有急則逃入海魏東徐州刺史成固公戍圂城崇祖部將有罪亡降魏成固公遣歩騎二萬襲朐山去城二十里崇祖方出送客城中人驚懼皆下船欲去崇祖還謂腹心曰虜非有宿謀承叛者之言而來耳易誑也今得百餘人還事必濟矣但人情一駭不可歛集卿等可亟去此一里外大呼而來云艾塘義人已得破虜須戍軍速往相助逐之舟中人果喜爭上岸崇祖引入據城遣羸弱入島人持兩炬火登山鼔譟魏參騎以為軍僃甚盛乃退上以崇祖為北琅邪蘭陵二郡太守垣榮祖亦自彭城奔朐山以奉使不效畏罪不敢出往依蕭道成於淮隂榮祖少學騎射或謂之曰武事可畏何不學書榮祖曰昔曹公父子上馬橫槊下馬談詠此於天下可不負飲食矣君輩無自全之伎何異犬羊乎劉善明從弟僧副將部曲二千人避魏居海島道成亦召而撫之魏於天宫寺作大像高四十三尺用銅十萬斤黃金六百斤魏尉元遣孔伯恭帥歩騎一萬拒沈攸之又以攸之前敗所䘮士卒瘃墮膝行者悉還攸之以沮其氣上尋悔遣攸之等復召使還攸之至焦墟去下邳五十餘里陳顯逹引兵迎攸之至睢清口伯恭擊破之攸之引兵退伯恭追擊之攸之大敗龍驤將軍姜彦之等戰没攸之創重入保顯逹營丁酉夜衆潰攸之輕騎南走委弃軍資器械以萬計還屯淮隂尉元以書諭徐州刺史王􅀇載􅀇載弃下邳走魏以隴西辛紹先為下邳太守紹先不尚苛察務舉大綱教民治生禦㓂而已由是下邳安之孔伯恭進攻宿豫宿豫戍將魯僧遵亦弃城走魏將孔太恒等將千騎南攻淮陽淮陽太守崔武仲焚城走慕容白曜進屯瑕丘崔道固之未降也綏邉將軍房法壽為王􅀇邈司馬屢破道固軍歴城人畏之及道固降皆罷兵道固畏法壽扇動百姓廹遣法壽使還建康會從弟崇吉自升城來以母妻為魏所獲謀於法壽法壽雅不欲南行怨道固廹之時道固遣兼治中房靈賔督清河廣川二郡事戍磐陽法壽乃與崇吉謀襲磐陽據之降於慕容白曜以贖崇吉母妻道固遣兵攻之白曜自瑕丘遣將軍長孫觀救磐陽道固兵退白曜表冠軍將軍韓麒麟與法壽對為兾州刺史以法壽從弟靈民思順靈悦伯憐伯玉叔玉思安㓜安等八人皆為郡守白曜自瑕丘引兵攻崔道固於歴城遣平東將軍長孫陵等攻沈文秀於東陽道固拒守不降白曜築長圍守之陵等至東陽文秀請降陵等入其西郭縱士卒􅁀掠文秀悔怒閉城拒守擊陵等破之陵等退屯清西屢進攻城不克癸卯大赦戊申魏主李夫人生子宏夫人惠之女也馮太后自撫飬宏頃之還政於魏主魏主始視國事勤於為治賞罰嚴明㧞清節黜貪汚於是魏之牧守始有以廉潔著聞者太中大夫徐爰自太祖時用事素不禮於上上銜之詔數其姦佞之罪徙交州冬十月辛巳詔徙義陽王昶為晉熈王使員外郎李豐以金千兩贖昶於魏魏人弗許使昶與上書為兄弟之儀上責其不稱臣不荅魏主復使昶與上書昶辭曰臣本實彧兄未經為臣若改前書事為二敬茍或不改彼所不納臣不敢奉詔乃止魏人愛重昶凡三尚公主十一月乙卯分徐州置東徐州以輔國將軍張讜為刺史十二月庚戌以幽州刺史劉休賔為兖州刺史休賔之妻崔邪利之女也生子文曄與邪利皆沒於魏慕容白曜將其妻子至梁鄒城下示之休賔密遣主簿尹文逹至歴城見白曜且視其妻子休賔欲降而兄子聞慰不可白曜使人至城下呼曰劉休賔數遣人來見僕射約降何故違期不至由是城中皆知之共禁制休賔不得降魏兵圍之魏西河公石復攻汝隂汝隂有備無功而還常珍竒雖降於魏實懷貳心劉勔復以書招之會西河公石攻汝隂珍竒乘虛燒劫懸瓠驅掠上蔡安成平輿三縣民屯於灌水四年春正月己未上祀南郊大赦魏汝陽司馬趙懷仁帥衆宼武津豫州刺史劉勔遣龍驤將軍申元德擊破之又斬魏于都公閼于㧞於汝陽臺東獲運車千三百乘魏復㓂義陽勔使司徒參軍孫臺瓘擊破之淮西民賈元友上書陳伐魏取陳蔡之䇿上以其書示劉勔勔上言元友稱虜主㓜弱内外多難天亡有期臣以為虜自去冬蹈藉王土磐據數郡百姓殘亡今春以來連城圍逼國家未能復境何暇滅虜元友所陳率多夸誕狂謀皆非實言之甚易行之甚難臣竊尋元嘉以來傖荒遠人多干國議負擔歸闕皆勸討虜從來信納皆貽後悔境上之人唯視彊弱王師至彼必壺漿候塗裁見退軍便抄截蜂起此前後所見明驗非一也上乃止魏尉元遣使説東徐州刺史張讜讜以團城降魏魏以中書侍郎高閭與讜對為東徐州刺史李璨與畢衆敬對為東兖州刺史元又説兖州刺史王整蘭陵太守桓忻整忻皆降於魏魏以元為開府儀同三司都督徐南北兖三州諸軍事徐州刺史鎮彭城召薛安都畢衆敬入朝至平城魏以上客待之羣從皆封矦賜第宅資給甚厚慕容白曜圍歴城經年二月庚寅拔其東郭癸巳崔道固面􅅞出降白曜遣道固之子景業與劉文曄同至梁鄒劉休賔亦出降白曜送道固休賔及其僚属於平城辛丑以前龍驤將軍常珍竒為都督司北豫二州諸軍事司州刺史魏西河公石攻之珍竒單騎奔壽陽乙巳車騎大將軍曲江莊公王􅀇謨卒三月魏慕容白曜進圍東陽上以崔道固兄子僧祐爲輔國將軍將兵數千從海道救歴城至不其聞歴城已沒遂降於魏交州刺史劉牧卒州人李長仁殺牧北來部曲據州反自稱刺史廣州刺史羊希使晉康太守沛郡劉思道伐俚思道違節度失利希遣收之思道自所領攻州希兵敗而死龍驤將軍陳伯紹將兵伐俚還擊思道擒斬之希玄保之兄子也夏四月己卯復減郡縣田租之半徙東海王禕為廬江王山陽王休祐為晉平王上以廢帝謂禕為驢王故以廬江封之劉勔敗魏兵於許昌魏以南郡公李惠爲征南大將軍儀同三司都督關右諸軍事雍州刺史進爵為王五月乙卯魏主畋于崞山遂如繁畤辛酉還宫六月魏以昌黎王馮熈為太􅀓熈太后之兄也秋七月庚申以驍騎將軍蕭道成為南兖州刺史八月戊子以南康相劉勃為交州刺史上以沈文秀之弟征北中兵參軍文靜為輔國將軍綂高密等五郡軍事自海道救東陽至不其城為魏所斷因保城自固魏人攻之不克辛卯分青州置東青州以文靜為刺史九月辛亥魏立皇叔楨為南安王長壽為城陽王太洛為章武王休為安定王冬十月癸酉朔日有食之發諸州兵北伐十一月李長仁遣使請降自貶行州事許之十二月魏人㧞不其城殺沈文靜入東陽西郭義嘉之亂巫師請􅀤脩寧陵戮􅀇宫為厭勝是嵗改葬昭太后先是中書侍郎舍人皆以名流為之太祖始用寒士秋當世祖猶雜選士庻巢尚之戴法興皆用事及上即位盡用左右細人遊擊將軍阮佃夫中書通事舍人王道隆員外散騎侍郎楊運長等並參預政事權亞人主巢戴所不及也佃夫尤恣橫人有順迕禍福立至大納貨賂所餉減二百匹絹則不報書園宅飲饌過於諸王妓樂服飾宫掖不如也朝士貴賤莫不自結僕􅀠皆不次除官捉車人至虎賁中郎將馬士至員外郎五年春正月癸亥上耕藉田大赦沈文秀守東陽魏人圍之三年外無救援士卒晝夜拒戰甲胄生蟣虱無離叛之志乙丑魏人㧞東陽文秀解戎服正衣冠取所持節坐齋内魏兵交至問沈文秀何在文秀厲聲曰身是魏人執之去其衣􅅞送慕容白曜使之拜文秀曰各兩國大臣何拜之有白曜還其衣為之設饌鎻送平城魏主數其罪而宥之待為下客給惡衣䟽食旣而重其不屈稍嘉禮之拜外都下大夫於是青冀之地盡入於魏矣戊辰魏平昌宣王和其奴卒二月己卯魏以慕容白曜為都督青齊東徐三州諸軍事征南大將軍開府儀同三司青州刺史進爵濟南王白曜撫御有方東人安之魏自天安以來比嵗旱饑重以青徐用兵山東之民疲於賦役顯祖命因民貧富為三等輸租之法等為三品上三品輸平城中輸它州下輸本州又魏舊制常賦之外有雜調十五至是悉罷之由是民稍贍給河東柳欣慰等謀反欲立太尉廬江王禕禕自以於帝為兄而帝及諸兄弟皆輕之遂與欣慰等通謀相酬和征北諮議參軍杜㓜文告之丙申詔降禕為車騎將軍開府儀同三司南豫州刺史出鎭宣城帝遣腹心楊運長領兵防衛欣慰等並伏誅三月魏人冦汝隂太守楊文萇擊却之夏四月丙申魏大赦五月魏徙青齊民於平城置升城歴城民望於桑乾立平齊郡以居之自餘悉為奴婢分賜百官魏沙門綂曇曜奏平齊戸及諸民有能嵗輸榖六十斛入僧曹者即為僧祇户粟為僧祇粟遇凶嵗賑給饑民又請民犯重罪及官奴以為佛圖戸以供諸寺掃洒魏主並許之於是僧祇戸粟及寺戸徧於州鎭矣六月魏立皇子宏為太子癸酉以左衛將軍沈攸之為郢州刺史上又令有司奏廬江王禕忿懟有怨言請窮治不許丁丑免禕官爵遣大鴻臚持節奉詔責禕因逼令自殺子輔國將軍充明廢徙新安冬十月丁卯朔日有食之魏頓兵王李峻卒十一月丁未魏復遣使來脩和親自是信使嵗通閏月戊子以輔師將軍孟陽為兖州刺史始治淮隂十二月戊戌司徒建安王休仁解楊州休仁年與上鄰亞素相友愛景和之世上頼其力以脱禍及㤗始初四方兵起休仁親當矢石克成大功任揔百揆親寄甚隆由是朝野輻凑上漸不悦休仁悟其㫖故表解楊州己未以桂陽王休範為楊州刺史分荆州之巴東建平益州之巴西梓潼郡置三巴校尉治白帝先是三峽蠻獠嵗為抄􅁀故立府以鎭之上以司徒參軍東莞孫謙為巴東建平二郡太守謙將之官敕募千人自隨謙曰蠻夷不賔蓋待之失節耳何煩兵役以為國費固辭不受至郡開布㤙信蠻獠翕然懷之競餉金寳謙皆慰諭不受臨海賊帥田流自稱東海王剽掠海鹽殺鄞令東土大震六年春正月乙亥初制閒二年一祭南郊閒一年一祭明堂二月壬寅以司徒休仁為太尉領司徒固辭癸丑納江智淵孫女為太子妃甲寅大赦令百官皆獻物始興太守孫㤗伯止獻琴書上大怒封藥賜死既而原之魏以東郡王陸定國為司空定國麗之子也魏主遣征西大將軍上黨王長孫觀擊吐谷渾夏四月辛丑魏大赦戌申魏長孫觀與吐谷渾王拾寅戰於曼頭山拾寅敗走遣别駕康盤龍入貢魏主囚之癸亥立皇子爕為晉熈王奉晉熈王昶後五月魏立皇弟長樂為建昌王六月癸卯以江州刺史王景文為尚書左僕射楊州刺史以尚書僕射袁粲為右僕射上宫中大宴祼婦人而觀之王后以扇障面上怒曰外舍寒乞今共為樂何獨不視后曰為樂之事其方自多豈有姑姊妹集而祼婦人以為笑外舍之樂雅異於此上大怒遣后起后兄景文聞之曰后在家劣弱今叚遂能剛正如此南兖州刺史蕭道成在軍中乆民閒或言道成有異相當為天子上疑之徵為黃門侍郎越騎校尉道成懼不欲内遷而無計得留冠軍參軍廣陵荀伯玉勸道成遣數十騎入魏境安置標榜魏果遣遊騎數百履行境上道成以聞上使道成復本任秋九月命道成遷鎮淮隂以侍中中領軍劉勔為都督南徐兖等五州諸軍事鎭廣陵戊寅立揔明觀置祭酒一人儒􅀇文史學士各十人柔然部眞可汗侵魏魏主引羣臣議之尚書右僕射南平公目辰曰若車駕親征京師危懼不如持重固守虜懸軍深入糧運無繼不乆自退遣將追擊破之必矣給事中張白澤曰蠢爾荒愚輕犯王略若鑾輿親行必望麾崩散豈可坐而縱敵以萬乘之尊嬰城自守非所以威服四夷也魏主從之白澤衮之孫也魏主使京兆王子推等督諸軍出西道任城王雲等督諸軍出東道汝隂王賜等督諸軍爲前鋒隴西王源賀等督諸軍爲後繼鎭西將軍呂羅漢等掌留臺事諸將會魏主於女水之濵與柔然戰柔然大敗乘勝逐北斬首五萬級降者萬餘人獲戎馬器械不可勝計旬有九日往返六千餘里改女水曰武川司徒東安王劉尼坐昏醉軍陳不整免官壬申還至平城是時魏百官不給禄少能以廉白自立者魏主詔吏受所監臨羊一口酒一斛者死與者以從坐論有能糾告尚書已下罪狀者隨所糾官輕重授之張白澤諌曰昔周之下士尚有代耕之禄今皇朝貴臣服勤無報若使受禮者刑身糾之者代職臣恐姦人闚望忠臣懈節如此而求事簡民安不亦難乎請依律令舊法仍班祿以酬亷吏魏主乃為之罷新法冬十月辛卯詔以世祖繼體䧟憲無遺以皇子智隨為世祖子立為武陵王初魏乙渾專政慕容白曜頗附之魏主追以為憾遂稱白曜謀反誅之及其弟如意初魏南部尚書李敷儀曹尚書李訢少相親善與中書侍郎盧度世皆以才能為世祖顯祖所寵任參豫機密出納詔命其後訢出為相州刺史受納貨賂為人所告敷掩蔽之顯祖聞之檻車徵訢案驗服罪當死是時敷弟奕得幸於馮太后帝意已踈之有司以中㫖諷訢告敷兄弟隂事可以得免訢謂其壻裴攸曰吾與敷族世雖遠恩踰同生今在事勸吾為此吾情所不忍每引簮自刺解帶自絞終不得死且吾安能知其隂事將若之何攸曰何為為人死也有馮闡者先為敷所敗其家深怨之今詢其弟敷之隂事可得也訴從之又趙郡范􅋆條列敷兄弟事狀凡三十餘條有司以聞帝大怒誅敷兄弟訢得減死鞭髠配役未㡬復為太倉尚書攝南部事敷順之子也魏陽平王新成卒是嵗命龍驤將軍義興周山圖將兵屯浹口討田流平之柔然攻于闐于闐遣使者素目伽奉表詣魏求救魏主命公卿議之皆曰于闐去京師幾萬里蠕蠕唯習野掠不能攻城若其可攻尋已亡矣雖欲遣師勢無所及魏主以議示使者使者亦以為然乃詔之曰朕應急敇諸軍以拯汝難但去汝遐阻必不能救當時之急汝宜知之朕今練甲飬士一二嵗閒當躬帥猛將為汝除患汝其謹脩警候以待大舉資治通鑑卷第一百三十二宋明帝
