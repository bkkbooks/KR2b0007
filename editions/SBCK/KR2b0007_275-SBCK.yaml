body:
  text: 臣司馬光奉勑編集後唐紀四大淵獻六月凡一年有竒起柔兆閹茂四月盡強圉明宗聖德和武欽孝皇帝上之下天成元年夏四月丁亥朔嚴辦將發􅀐兵陳於宣仁門外步兵陳於五鳳門外從馬直指揮使郭從謙不知睦王存乂已死欲奉之以作亂帥所部兵自營中露刃大呼與黄甲兩軍攻興教門帝方食聞變帥諸王及近衞􅀐兵擊之逐亂兵出門時蕃漢馬步使朱守殷將􅀐兵在外帝遣中使急召之欲與同擊賊守殷不至引兵憩於北邙茂林之下亂兵焚興教門縁城而入近臣宿將皆釋甲潜遁獨散員都指揮使李彦卿及宿衞軍校何福進王全斌等十餘人力戰俄而帝爲流矢所中鷹坊人善友扶帝自門樓下至絳霄殿廡下抽矢渴懣求水皇后不自省視遣宦者進酪須㬰帝殂李彦卿等慟哭而去左右皆散善友斂廡下樂器覆帝尸而焚之彦卿存審之子福進全斌皆太原人也劉后囊金寶繫馬鞍與申王存渥及李紹榮引七百騎焚嘉慶殿自師子門出走通王存確雅王存紀奔南山宫人多逃散朱守殷入宫選宫人三十餘人各令自取樂器珍玩内於其家於是諸軍大掠都城是日李嗣源至罌子谷聞之慟哭謂諸將曰主上素得士心正為羣小蔽惑致此今吾將安歸乎戊子朱守殷遣使馳白嗣源以京城大亂諸軍焚掠不已願亟來救之己丑嗣源入洛陽止于私第禁焚掠拾莊宗骨於灰燼之中而殯之嗣源之入鄴都也前直指揮使平遥矦益脱身歸洛陽莊宗撫之流涕至是益自􅅞請罪嗣源曰爾爲臣盡節又何罪也使復其職嗣源謂朱守殷曰公善巡徼以待魏王淑妃德妃在宫供給尤宜豐備吾俟山陵畢社稷有奉則歸藩爲國家扞禦北方耳是日豆盧革帥百官上牋勸進嗣源靣諭之曰吾奉詔討賊不幸部曲叛散欲入朝自訴又爲紹榮所隔披猖至此吾本無它心諸君遽爾見推殊非相悉願勿言也革等固請嗣源不許李紹榮欲奔河中就永王存霸從兵稍散庚寅至平陸止餘數􅀐爲人所執折足送洛陽存霸亦帥衆千人棄鎭奔晉陽辛卯魏王繼岌至興平聞洛陽亂復引兵而西謀保據鳳翔向延嗣至鳳翔以莊宗之命誅李紹琛初莊宗命吕鄭二内養在晉陽一監兵一監倉庫自留守張憲以下皆承應不暇及鄴都有變又命汾州刺史李彦超爲北都巡檢彦超彦卿之兄也莊宗既殂推官河閒張昭逺勸張憲奉表勸進憲曰吾一書生自布衣至服金紫皆出先帝之恩豈可偷生而不自愧乎昭逺泣曰此古人所行公能行之忠義不朽矣有李存沼者莊宗之近屬自洛陽奔晉陽矯傳莊宗之命隂與二内養謀殺憲及彦超據晉陽拒守彦超知之密告憲欲先圖之憲曰僕受先帝厚恩不忍爲此徇義而不免於禍乃天也彦超謀未決壬辰夜軍士共殺二内養及存沼於牙城因大掠逹旦憲聞變出奔忻州㑹嗣源移書至彦超號令士卒城中始安遂權知太原軍府百官三牋請嗣源監國嗣源乃許之甲午入居興聖宫始受百官班見下令稱教百官稱之曰殿下莊宗後宫存者猶千餘人宣徽使選其美少者數百獻於監國監國曰奚用此爲對曰宫中職掌不可闕也監國曰宫中職掌冝諳故事此軰安知之乃悉用老舊之人􅀘之其少年者皆出歸其親戚無親戚者任其所適蜀中所送宫人亦準此乙未以中門使安重誨爲樞密使鎭州别駕張延朗爲副使延朗開封人也仕梁爲租庸吏性纎巧善事權要以女妻重誨之子故重誨引之監國令所在訪求諸王通王存確雅王存紀匿民間或密告安重誨重誨與李紹真謀曰今殿下旣監國典喪諸王冝早爲之所以壹人心殿下性慈不可以聞乃密遣人就田舍殺之後月餘監國乃聞之切責重誨傷惜乆之劉皇后與申王存渥奔􅀳陽在道與存渥私通存渥至􅀳陽李彦超不納走至風谷爲其下所殺明日永王存霸亦至􅀳陽從兵逃散俱盡存霸削髮僧服謁李彦超願爲山僧幸垂庇護軍士爭欲殺之彦超曰六相公來當奏取進止軍士不聽殺之於府門之碑下劉皇后爲尼於􅀳陽監國使人就殺之薛王存禮及莊宗幼子繼嵩繼潼繼蟾繼嶤遭亂皆不知所終惟邕王存美以病風偏枯得免居于􅀳陽徐温髙季興聞莊宗遇弑益重嚴可求梁震梁震薦前陵州判官貴平孫光憲於季興使掌書記季興大治戰艦欲攻楚光憲諌曰荆南亂離之後賴公休息士民始有生意若又與楚國交惡它國乗吾之弊良可憂也季興乃止戊戌李紹榮至洛陽監國責之曰吾何負於爾而殺吾兒紹榮瞋目直視曰先帝何負於爾遂斬之復其姓名曰元行欽監國恐征蜀軍還爲變以石敬瑭爲陜州留後己亥以李從珂爲河中留後樞密使張居翰乞歸田里許之李紹真屢薦孔循之才庚子以循爲樞密副使李紹宏請復姓馬監國下教數租庸使孔謙姧佞侵刻窮困軍民之罪而斬之凡謙所立苛歛之法皆罷之因廢租庸使及内勾司依舊爲鹽鐵户部度支三司委宰相一人專判又罷諸道監軍使以莊宗由宦官亡國命諸道盡殺之魏王繼岌自興平退至武功宦者李從襲曰禍福未可知退不如進請王亟東行以救内難繼岌從之還至渭水權西都留守張籛已斷浮梁循水浮渡是日至渭南腹心吕知柔等皆已竄匿從襲謂繼岌曰時事已去王冝自圖繼岌徘徊流涕乃自伏於牀命僕夫李環縊殺之任圜代將其衆而東監國命石敬瑭慰撫之軍士皆無異言先是監國命所親李冲爲華州都監應接西師沖擅逼華州節度使史彦鎔入朝同州節度使李存敬過華州沖殺之并屠其家又殺西川行營都監李從襲彦鎔泣訴於安重誨重誨遣彦鎔還鎮召沖歸朝自監國入洛内外機事皆決於李紹真紹真擅收威勝節度使李紹欽太子少保李紹沖下獄欲殺之安重誨謂紹真曰温段罪惡皆在梁朝今殿下新平内難兾安萬國豈專爲公報仇邪紹真由是稍沮辛丑監國教李紹沖紹欽復姓名爲温韜段凝並放歸田里壬寅以孔循爲樞密使有司議即位禮李紹真孔循以爲唐運已盡冝自建國號監國問左右何謂國號對曰先帝賜姓於唐爲唐復讎繼昭宗後故稱唐今梁朝之人不欲殿下稱唐耳監國曰吾年十三事獻祖以吾宗屬視吾猶子又事武皇垂三十年先帝垂二十年經綸攻戰未甞不預武皇之基業則吾之基業也先帝之天下則吾之天下也安有同家而異國乎令執政更議吏部尚書李琪曰若改國號則先帝遂爲路人梓宫安所託乎不惟殿下不忘三世舊君吾曹爲人臣者能自安乎前代以旁支入繼多矣宜用嗣子柩前即位之禮衆從之丙午監國自興聖宫赴西宫服斬衰於柩前即皇位位百官縞素既而御衮冕受􅉺百官吉服稱賀戊申敕中外之臣毋得獻鷹犬竒玩之類有司劾奏太原尹張憲委城之罪庚戌賜憲死任圜將征蜀兵二萬六千人至洛陽明宗慰撫之各令還營甲寅大赦改元量留後宫百人宦官三十人教坊百人鷹坊二十人御厨五十人自餘任從所適諸司使務有名無實者皆廢之分遣諸軍就食近畿以省饋運除夏秋稅省秏節度防禦等使正至端午降誕四節聽貢奉毋得歛百姓刺史以下不得貢奉選人先遭塗毁文書者令三銓止除詐僞餘復舊規五月丙辰朔以太子賔客鄭珏工部尚書任圜並爲中書侍郎同平章事圜仍判三司圜憂公如家簡拔賢俊杜絶僥倖期年之間府庫充實軍民皆足朝綱粗立圜每以天下爲己任由是安重誨忌之武寧節度使李紹真忠武節度使李紹瓊貝州刺史李紹英齊州防禦使李紹䖍河陽節度使李紹竒洺州刺史李紹能各請復舊姓名爲霍彦威萇從簡房知温王晏球夏魯竒米君立許之從簡陳州人也晏球本王氏子畜於杜氏故請復姓王丁巳􅀄令百官正衙常朝外五日一赴内殿起居宦官數百人竄匿山林或落髮爲僧至􅀳陽者七十餘人詔北都指揮使李從温悉誅之從温帝之姪也帝以前相州刺史安金全有功於晉陽壬戌以金全爲振武節度使同平章事丙寅趙在禮請帝幸鄴都戊辰以在禮爲義成節度使辭以軍情未聽不赴鎮李彦超入朝帝曰河東無虞爾之力也庚午以爲建雄留後甲戌加王延翰同平章事帝目不知書四方奏事皆令安重誨讀之重誨亦不能盡通乃奏稱臣徒以忠實之心事陛下得典樞機今事粗能曉知至於古事非臣所及願倣前朝侍講侍讀近代直崇政樞密院選文學之臣與之共事以備應對乃置端明殿學士乙亥以翰林學士馮道趙鳳爲之丙子聽郭崇韜歸葬復朱友謙官爵兩家貨財田宅前籍没者皆歸之戊寅以安重誨領山南東道節度使重誨以襄陽要地不可乏帥無宜兼領固辭許之詔發汴州控鶴指揮使張諌等三千人戍瓦橋六月丁酉出城復還作亂焚掠坊市殺權知州推官髙逖逼馬步都指揮使曹州刺史李彦饒爲帥彦饒曰汝欲吾爲帥當用吾命禁止焚掠衆從之己亥旦彦饒伏甲於室諸將入賀彦饒曰前日唱亂者數人而已遂執張諫等四人斬之其黨張審瓊帥衆大譟於建國門彦饒勒兵擊之盡誅其衆四百人軍州始定即日以軍州事牒節度推官韋儼權知具以狀聞庚子詔以樞密使孔循知汴州收爲亂者三千家悉誅之彦饒彦超之弟也蜀百官至洛陽永平節度使兼侍中馬全曰國亡至此生不如死不食而卒以平章事王鍇等爲諸州府刺史少尹判官司馬亦有復歸蜀者辛丑滑州都指揮使于可洪等縱火作亂攻魏博戍兵三指揮逐出之乙巳敕朕二名但不連稱皆無所避戊申加西川節度使孟知祥兼侍中李繼曮至華州聞洛中亂復歸鳳翔帝爲之誅柴重厚髙季興表求夔忠萬三州爲屬郡詔許之安重誨恃恩驕横殿直馬延誤衝前導斬之於馬前御史大夫李琪以聞秋七月重誨白帝下詔稱延陵突重臣戒諭中外于可洪與魏博戍將互相奏云作亂帝遣使按驗得實辛酉斬可洪於都市其首謀滑州左崇牙全營族誅助亂者右崇牙兩長劒建平將校百人亦族誅壬申􅀄令百官每五日起居轉對奏事契丹主攻渤海拔其夫餘城更命曰東丹國命其長子突欲鎮東丹號人皇王以次子徳光守西樓號元帥太子帝遣供奉官姚坤告哀於契丹契丹主聞莊宗爲亂兵所害慟哭曰我朝定兒也吾方欲救之以渤海未下不果徃致吾兒及此哭不已虜言朝定猶華言朋友也又謂坤曰今天子聞洛陽有急何不救對曰地逺不能及曰何故自立坤爲言帝所以即位之由契丹主曰漢兒喜飾説母多談突欲侍側曰牽牛以蹊人之田而奪之牛可乎坤曰中國無主唐天子不得已而立亦猶天皇王初有國豈強取之乎契丹主曰理當然又聞吾兒專好聲色遊畋不恤軍民冝其及此我自聞之舉家不飲酒散遣伶人解縱鷹犬若亦効吾兒所爲行自亡矣又曰吾兒與我雖世舊然屢與我戰爭於今天子則無怨足以修好若與我大河之北吾不復南侵矣坤曰此非使臣之所得專也契丹主怒囚之旬餘復召之曰河北恐難得得鎭定幽州亦可也給紙筆趣令爲狀坤不可欲殺之韓延徽諌乃復囚之丙子葬光聖神閔孝皇帝于雍陵廟號莊宗丁丑鎭州留後王建立奏涿州刺史劉殷肇不受代謀作亂已討擒之己卯置彰國軍於應州門下侍郎同平章事豆盧革韋􅀃奏事帝前或時禮貌不盡恭百官俸錢皆折估而革父子獨受實錢百官自五月給而革父子自正月給由是衆論沸騰􅀃以孫爲子奏官受選人王傪賂除近官中㫖以庫部郎中蕭希甫爲諌議大夫革􅀃覆奏希甫恨之上䟽言革􅀃不忠前朝阿䛕取容因誣革強奪民田縱田客殺人􅀃奪鄰家井取宿藏物制貶革辰州刺史􅀃漵州刺史庚辰賜希甫金帛擢爲散􅀐常侍辛巳契丹主阿保機卒於夫餘城述律后召諸將及酋長難制者之妻謂曰我今寡居汝不可不効我又集其夫泣問曰汝思先帝乎對曰受先帝恩豈得不思曰果思之宜往見之遂殺之癸未再貶豆盧革費州司户韋􅀃夷州司户甲申革流陵州􅀃流合州孟知祥隂有據蜀之志閲庫中得鎧甲二十萬置左右牙等兵十六營凡萬六千人營於牙城内外八月乙酉朔日有食之丁亥契丹述律后使少子安端少君守東丹與長子突欲奉契丹主之喪將其衆發夫餘城初郭崇韜以蜀􅀐兵分左右驍銳等六營凡三千人歩兵分左右寜逺等二十營凡二萬四千人庚寅孟知祥増置左右衝山等六營凡六千人營於羅城内外又置義寜等二十營凡萬六千人分戍管内州縣就食又置左右牢城四營凡四千人分戍成都境内王公儼旣殺楊希望欲邀節􅃏􅀭言符習爲治嚴急軍府衆情不願其還習還至齊州公儼拒之習不敢前公儼又令將士上表請已爲帥詔除登州刺史公儼不時之官託云軍情所留帝乃徙天平節度使霍彦威爲平盧節度使聚兵淄州以圖攻取公儼懼乙未始之官丁酉彦威至青州追擒之并其族黨悉斬之支使北海韓叔嗣預焉其子熈載將奔呉密告其友汝隂進士李􅂖􅂖送至正陽痛飲而别熈載謂榖曰呉若用我爲相當長驅以定中原􅂖笑曰中原若用吾爲相取呉如囊中物耳庚子幽州言契丹寇邊命齊州防禦使安審通將兵禦之九月壬戌孟知祥置左右飛棹兵六營凡六千人分戍濵江諸州習水戰以備夔峽癸酉盧龍節度使李紹斌請復姓趙從之仍賜名德鈞德鈞養子延壽尚帝女興平公主故德鈞尤䝉親任延壽本蓨令劉邟之子也加楚王殷守尚書令契丹述律后愛中子德光欲立之至西樓命與突欲俱乗馬立帳前謂諸酋長曰二子吾皆愛之莫知所立汝曹擇可立者執其轡酋長知其意爭執徳光轡讙躍曰願事元帥太子后曰衆之所欲吾安敢違遂立之爲天皇王突欲愠帥數百􅀐欲奔唐爲邏者所遏述律后不罪遣歸東丹天皇王尊述律后爲太后國事皆決焉太后復納其姪爲天皇王后天皇王性孝謹母病不食亦不食侍於母前應對或不稱㫖母􅀭眉視之輙懼而趨避非復召不敢見也以韓延徽爲政事令聽姚坤歸復命遣其臣阿思没骨餒來告哀壬午賜李繼曮名從曮冬十月甲申朔􅀄賜文武官春冬衣昭武節度使同平章事王延翰驕􅁋殘暴己丑自稱大閩國王立宫殿置百官威儀文物皆倣天子之制羣下稱之曰殿下赦境内追尊其父審知曰昭武王靜難節度使毛璋驕僣不法訓卒繕兵有跋扈之志詔以潁州團練使李承約爲節度副使以察之壬辰徙璋爲昭義節度使璋欲不奉詔承約與觀察判官長安邊蔚從容􅀃諭乆之乃肯受代庚子幽州奏契丹盧龍節度使盧文進來奔初文進爲契丹守平州帝即位遣間使􅀃之以易代之後無復嫌怨文進所部皆華人思歸乃殺契丹戍平州者帥其衆十餘萬車帳八千乗來奔􅀄魏王繼岌郭崇韜率蜀中富民輸犒賞錢五百萬緡聽以金銀繒帛充晝夜督責有自殺者給軍之餘猶二百萬緡至是任圜判三司知成都富饒遣鹽鐵判官太僕卿趙季良爲孟知祥官告國信兼三川都制置轉運使甲辰季良至成都蜀人欲皆不與知祥曰府庫它人所聚輸之可也州縣租稅以贍鎭兵十萬決不可得季良但發庫物不敢復言制置轉運職事矣安重誨以知祥及東川節度使董璋皆據險要擁强兵恐乆而難制又知祥乃莊宗近姻隂欲圖之客省使泗州防禦使李嚴自請爲西川監軍必能制知祥己酉以嚴爲西川都監文思使太原朱弘昭爲東川副使李嚴母賢明謂嚴曰汝前啓滅蜀之謀今日再往必以死報蜀人矣舊制吏部給告身先責其人輸朱膠綾軸錢喪亂以來貧者但受敇牒多不取告身十一月甲戌吏部侍郎劉岳上言告身有褒貶訓戒之辭豈可使其人􅀄不之覩敇文班丞郎給諌武班大將軍以上宜賜告身其後執政議以爲朱膠綾軸厥費無多朝廷受以官禄何惜小費乃奏凡除官者更不輸錢皆賜告身當是時所除正貟官之外其餘試銜帖號止以寵激軍中將校而已及長興以後所除浸多乃至軍中卒伍使州鎮戍胥吏皆得銀青階及憲官嵗賜告身以萬數矣閩王延翰蔑弃兄弟襲位􅂊踰月出其弟延鈞爲泉州刺史延翰多取民女以充後庭采擇不已延鈞上書極諌延翰怒由是有􅂩父審知養子延稟爲建州刺史延翰與書使之采擇延稟復書不遜亦有􅂩十二月延稟延鈞合兵襲福州延稟順流先至福州指揮使陳陶帥衆拒之兵敗陶自殺是夜延稟帥壯士百餘人趣西門梯城而入執守門者發庫取兵仗及寢門延翰驚匿别室辛卯旦延稟執之暴其罪惡且稱延翰與妻崔氏共弑先王告諭吏民斬于紫宸門外是日延鈞至城南延稟開門納之推延鈞爲威武留後癸巳以盧文進爲義成節度使同平章事庚子以皇子從榮爲天雄節度使同平章事趙季良等運蜀金帛十億至洛陽時朝廷方匱乏頼此以濟是歳呉越王鏐以中國喪亂朝命不通改元寳正其後復通中國乃諱而不稱二年春正月癸丑朔帝更名亶孟知祥聞李嚴來監其軍惡之或請奏止之知祥曰何必然吾有以待之遣吏至綿劒迎候㑹武信節度使李紹文卒知祥自言甞密詔許便宜從事壬戌以西川節度副使内外馬步都指揮使李敬周爲遂州留後促之上道然後表聞嚴先遣使至成都知祥自以於嚴有舊恩兾其懼而自回乃盛陳甲兵以示之嚴不以爲意安重誨以孔循少侍宫禁謂其諳練故事知朝士行能多聽其言豆盧革韋􅀃既得罪朝廷議置相循意不欲用河北人先已薦鄭珏又薦太常卿崔協任圜欲用御史大夫李琪鄭珏素惡琪故循力沮之謂重誨曰李琪非無文學但不廉耳宰相但得端重有器度者足以儀刑多士矣它日議於上前上問誰可相者重誨以協對圜曰重誨未悉朝中人物爲人所賣協雖名家識字甚少臣旣以不學忝相位柰何更益以協爲天下笑乎上曰宰相重任卿輩更審議之吾在河東時見馮書記多才博學與物無競此可相矣既退孔循不揖拂衣徑去曰天下事一則任圜二則任圜圜何者使崔協暴死則已不死㑹須相之因稱疾不朝者數日上使重誨諭之方入重誨私謂圜曰今方乏人協且備貟可乎圜曰明公捨李琪而相崔協是猶弃蘇合之丸取蛣􅎙之轉也循與重誨共事日短琪而譽協癸亥竟以端明殿學士馮道及崔協並為中書侍郎同平章事協邠之曽孫也戊辰王延稟還建州王延鈞送之將别謂延鈞曰善守先人基業勿煩老兄再下延鈞遜謝甚恭而色變庚午􅀄令天下長吏每旬親引慮繋囚孟知祥禮遇李嚴甚厚一日謁知祥知祥謂曰公前奉使王􅄛歸而請兵伐蜀莊宗用公言遂致兩國俱亡今公復來蜀人懼矣且天下皆廢監軍公獨來監吾軍何也嚴惶怖求哀知祥曰衆怒不可遏也遂揖下斬之又召左廂馬步都虞候丁知俊知俊大懼知祥指嚴尸謂曰昔嚴奉使汝爲之副然則故人也爲我瘞之因誣奏嚴詐宣口敇云代臣赴闕又擅許將士優賞臣輒已誅之内八作使楊令芝以事入蜀至鹿頭闗聞嚴死奔還朱弘昭在東川聞之亦懼謀歸洛㑹有軍事董璋使之入奏弘昭僞辭然後行由是得免癸酉以皇子從厚同平章事充河􅀯尹判六軍諸衞事從榮之母弟也從榮聞之不恱己卯加樞密使安重誨兼侍中孔循同平章事呉馬軍都指揮使柴再用戎服入朝御史彈之再用恃功不服侍中徐知誥陽於便殿誤通起居退而自劾呉王優詔不問知誥固請奪一月俸由是中外肅然契丹改元天顯葬其主阿保機於木葉山述律太后左右有桀黠者后輒謂曰爲我逹語於先帝至墓所則殺之前後所殺以百數最後平州人趙思温當往思温不行后曰汝事先帝甞親近何爲不行對曰親近莫如后后行臣則繼之后曰吾非不欲從先帝於地下也顧嗣子幼弱國家無主不得往耳乃斷一腕令置墓中思温亦得免帝以兾州刺史烏震三將兵運糧入幽州二月戊子以震爲河北道副招討領寧國節度使屯盧臺軍代泰寧節度使同平章事房知温歸兖州庚寅以保義節度使石敬瑭兼六軍諸衞副使丙申以從馬直指揮使郭從謙爲景州刺史既至遣使族誅之髙季興既得三州請朝廷不除刺史自以子弟爲之不許及夔州刺史潘炕罷官季興輒遣兵突入州城殺戍兵而據之朝廷除奉聖指揮使西方鄴爲刺史不受又遣兵襲涪州不克魏王繼岌遣押牙韓珙等部送蜀珍貨金帛四十萬浮江而下季興殺珙等於峽口盡掠取之朝廷詰之對曰珙等舟行下峽涉數千里欲知覆溺之故自宜按問水神帝怒壬寅制削奪季興官爵以山􅀯東道節度使劉訓爲􅀯靣招討使知荆􅀯行府事忠武節度使夏魯竒爲副招討使將步􅀐四萬討之東川節度使董璋充東􅀯靣招討使新夔州刺史西方鄴副之將蜀兵下峽仍㑹湖􅀯軍三靣進攻三月甲寅以李敬周爲武信留後丙辰初置監牧蕃息國馬􅀄莊宗之克梁也以魏州牙兵之力及其亡也皇甫暉張破敗之亂亦由之趙在禮之徙滑州不之官亦實爲其下所制在禮欲自謀脫禍隂遣腹心詣闕求移鎭帝乃爲之除皇甫暉陳州刺史趙進貝州刺史趙在禮爲横海節度使以皇子從榮鎭鄴都命宣徽北院使范延光將兵送之且制置鄴都軍事乃出奉節等九指揮三千五百人使軍校龍眰部之戍盧臺軍以備契丹不給鎧仗但繫幟於長竿以别隊伍由是皆俛首而去中塗聞孟知祥殺李嚴軍中籍籍已有訛言旣至㑹朝廷不次擢烏震爲副招討使訛言益甚房知温怨震驟來代己震至未交印壬申震召知温及諸道先鋒馬軍都指揮使齊州防禦使安審通博於東寨知温誘龍眰所部兵殺震於席上其衆譟於營外安審通脫身走奪舟濟河將􅀐兵按甲不動知温恐事不濟亦上馬出門甲士攬其轡曰公當爲士卒主去欲何之知温紿之曰􅀐兵皆在河西不收取之獨有步兵何能集事遂躍馬登舟濟河與審通合謀擊亂兵亂兵遂南行􅀐兵徐踵其後部伍甚整亂者相顧失色列炬宵行疲於荒澤詰朝􅀐兵四合擊之亂兵殆盡餘衆復趣故寨審通已焚之亂兵進退失據遂潰其匿於叢薄溝塍得免者什無一二范延光還至淇門聞盧臺亂發滑州兵復如鄴都以僃奔逸帝遣客省使李仁矩如西川傳詔安諭孟知祥及吏民甲戌至成都劉訓兵至荆南楚王殷遣都指揮使許德勲等將水軍屯岳州髙季興堅壁不戰求救於呉呉人遣水軍援之夏四月庚寅敕盧臺亂兵在營家屬並全門處斬敕至鄴都闔九指揮之門驅三千五百家凡萬餘人於石灰窰悉斬之永濟渠爲之變赤朝廷雖知房知温首亂欲安反仄癸巳加知温兼侍中先是孟知祥遣牙内指揮使文水武漳迎其妻瓊華長公主及子仁賛於􅀳陽及鳳翔李從曮聞知祥殺李嚴止之以聞帝聽其歸蜀丙申至成都鹽鐵判官趙季良與孟知祥有舊知祥奏留季良爲副使朝廷不得已丁酉以季良爲西川節度副使李昊歸蜀知祥以爲觀察推官江陵卑濕復值乆雨糧道不繼將士疾疫劉訓亦寢疾癸卯帝遣樞密使孔循往視之且審攻戰之宜五月癸丑以威武留後王延鈞爲本道節度使守中書令琅邪王孔循至江陵攻之不克遣人入城􅀃髙季興季興不遜丙寅遣使賜湖􅀯行營夏衣萬襲丁卯又遣使賜楚王殷鞍馬玉帶督饋糧於行營竟不能得庚午詔劉訓等引兵還楚王殷遣中軍使史光憲入貢帝賜之駿馬十美女二過江陵髙季興執光憲而奪之且請舉鎮自附於呉徐温曰爲國者當務實效而去虚名髙氏事唐久矣洛陽去江陵不逺唐人步􅀐襲之甚易我以舟師泝流救之甚難夫臣人而弗能救使之危亡能無愧乎乃受其貢物辭其稱臣聽其自附於唐任圜性剛直且恃與帝有舊勇於敢爲權倖多疾之舊制館劵出於户部安重誨請從内出與圜爭於上前往復數四聲色俱厲上退朝宫人問上適與重誨論事爲誰上曰宰相宫人曰妾在長安宫中未甞見宰相樞密奏事敢如是者蓋輕大家耳上愈不恱卒從重誨議圜因求罷三司詔以樞密承㫖孟鵠充三司副使􅁠判鵠魏州人也六月庚辰太子詹事温輦請立太子丙戌門下侍郎同平章事任圜罷守太子少保己丑以宣徽北院使張延朗判三司壬辰貶劉訓爲檀州刺史丙申封楚王殷為楚國王西方鄴敗荆􅀯水軍於峽中復取夔忠萬三州資治通鑑巻第二百七十五
