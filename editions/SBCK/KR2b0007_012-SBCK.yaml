front:
  text: 劉敬劉敬曰天下初定士卒罷於兵未可以武服也冒頓殺父代立妻羣母以力為威未可以仁義説也獨可以計久遠子孫為臣耳然恐陛下不能為上曰柰何對曰陛下誠能以適長公主妻之厚奉遺之彼必慕以為閼氏生子必為太子陛下以嵗時漢所餘彼所鮮數問遺因使辯士風諭以禮節冒頓在固為子壻死則外孫為單于豈嘗聞外孫敢與大父抗禮者哉可無戰以漸臣也若陛下不能遣長公主而令宗室及後宫詐稱公主彼知不肯貴近無益也帝曰善欲遣長公主吕后日夜泣曰妾唯太子一女柰何棄之匈奴上竟不能遣九年冬上取家人子名為長公主以妻單于使劉敬徃結和親約
  hash: sha256:74a50f9ba06156151012d2362650b97f2aa2897660ea5c426a44a10d50e28578
body:
  text: 臣光曰建信矦謂冒頓殘賊不可以仁義説而欲與為㛰姻何前後之相違也夫骨肉之恩尊卑之叙唯仁義之人為能知之柰何欲以此服冒頓哉蓋上世帝王之御夷狄也服則懐之以徳叛則震之以威未聞與為㛰姻也且冒頓視其父如禽獸而獵之奚有於婦翁建信矦之術固已踈矣况魯元已為趙后又可奪乎劉敬從匈奴來因言匈奴河南白羊樓煩王去長安近者七百里輕騎一日一夜可以至秦中秦中新破少民地肥饒可益實夫諸矦初起時非齊諸田楚昭屈景莫能興今陛下雖都闗中實少民東有六國之彊族一日有變陛下亦未得髙枕而卧也臣願陛下徙六國後及豪桀名家居闗中無事可以備胡諸侯有變亦足率以東伐此彊本弱末之術也上曰善十一月徙齊楚大族昭氏屈氏景氏懐氏田氏五族及豪桀於闗中與利田宅凡十餘萬口十二月上行如洛陽貫髙怨家知其謀上變告之於是上逮捕趙王及諸反者趙午等十餘人皆爭自剄貫髙獨怒罵曰誰令公為之今王實無謀而并捕王公等皆死誰白王不反者乃轞車膠致與王詣長安髙對獄曰獨吾屬為之王實不知吏治搒笞數千刺剟身無可擊者終不復言吕后數言張王以公主故不宐有此上怒曰使張敖據天下豈少而女乎不聽廷尉以貫髙事辭聞上曰壯士誰知者以私問之中大夫泄公曰臣之邑子素知之此固趙國立義不侵為然諾者也上使泄公持節往問之箯輿前泄公與相勞苦如生平驩因問張王果有計謀不髙曰人情寧不各愛其父母妻子乎今吾三族皆以論死豈愛王過於吾親哉顧為王實不反獨吾等為之具道本指所以為者王不知狀於是泄公入具以報上春正月上赦趙王敖廢為宣平矦徙代王如意為趙王上賢貫髙為人使泄公具告之曰張王已出因赦貫髙貫髙喜曰吾王審出乎泄公曰然泄公曰上多足下故赦足下貫髙曰所以不死一身無餘者白張王不反也今王已出吾責已塞死不恨矣且人臣有篡弑之名何面目復事上哉縱上不殺我我不愧於心乎乃仰絶亢遂死荀恱論曰貫髙首為亂謀殺主之賊雖能證明其王小亮不塞大逆私行不贖公罪春秋之義大居正罪無赦可也臣光曰髙祖驕以失臣貫髙狠以亡君使貫髙謀逆者髙祖之過也使張敖亡國者貫髙之罪也詔丙寅前有罪殊死已下皆赦之二月行自洛陽至初上詔趙羣臣賔客敢從張王者皆族郎中田叔客孟舒皆自髠鉗為王家奴以從及張敖既免上賢田叔孟舒等召見與語漢廷臣無能出其右者上盡拜為郡守諸侯相夏六月乙未晦日有食之是嵗更以丞相何為相國十年夏五月太上皇崩于櫟陽宫秋七月癸卯􅁙太上皇于萬年楚王梁王皆來送􅁙赦櫟陽囚定陶戚姬有寵於上生趙王如意上以太子仁弱謂如意類已雖封為趙王常留之長安上之闗東戚姬常從日夜啼泣欲立其子吕后年長常留守益䟽上欲廢太子而立趙王大臣爭之皆莫能得御史大夫周昌廷爭之彊上問其説昌為人吃又盛怒曰臣口不能言然臣期期知其不可陛下欲廢太子臣期期不奉詔上欣然而笑吕后側耳於東廂聽既罷見昌為跪謝曰微君太子幾廢時趙王年十嵗上憂萬嵗之後不全也符璽御史趙堯請為趙王置貴彊相及吕后太子羣臣素所敬憚者上曰誰可者堯曰御史大夫昌其人也上乃以昌相趙而以堯代昌為御史大夫初上以陽夏侯陳豨為相國監趙代邊兵豨過辭淮隂侯淮隂侯挈其手辟左右與之步於庭仰天嘆曰子可與言乎豨曰唯將軍令之淮隂侯曰公之所居天下精兵處也而公陛下之信幸臣也人言公之畔陛下必不信再至陛下乃疑矣三至必怒而自將吾為公從中起天下可圖也陳豨素知其能也信之曰謹奉教豨常慕魏無忌之養士及為相守邊告歸過趙賔客隨之者千餘乗邯鄲官舍皆滿趙相周昌求入見上具言豨賔客甚盛擅兵於外數嵗恐有變上令人覆案豨客居代者諸不法事多連引豨豨恐韓王信因使王黄曼丘臣等説誘之太上皇崩上使人召豨豨稱病不至九月遂與王黄等反自立為代王劫略趙代上自東擊之至邯鄲喜曰豨不南據邯鄲而阻漳水吾知其無能為矣周昌奏常山二十五城亡其二十城請誅守尉上曰守尉反乎對曰不上曰是力不足亡罪上令周昌選趙壯士可令將者白見四人上嫚罵曰豎子能為將乎四人慙皆伏地上封各千户以為將左右諫曰從入蜀漢伐楚賞未徧行今封此何功上曰非汝所知陳豨反趙代地皆豨有吾以羽檄徴天下兵未有至者今計唯獨邯鄲中兵耳吾何愛四千户不以慰趙子弟皆曰善又聞豨將皆故賈人上曰吾知所以與之矣乃多以金購豨將豨將多降十一年冬上在邯鄲陳豨將矦敞將萬餘人游行王黄將騎千餘軍曲逆張春將卒萬餘人度河攻聊城漢將軍郭䝉與齊將擊大破之太尉周勃道太原入定代地至馬邑不下攻殘之趙利守東垣帝攻抜之更命曰真定帝購王黄曼丘臣以千金其麾下皆生致之於是陳豨軍遂敗淮隂矦信稱病不從擊豨隂使人至豨所與通謀信謀與家臣夜詐詔赦諸官徒奴欲發以襲吕后太子部署已定待豨報其舍人得罪於信信囚欲殺之春正月舍人弟上變告信欲反狀於吕后吕后欲召恐其儻不就乃與蕭相國謀詐令人從上所來言豨已得死列矦羣臣皆賀相國紿信曰雖疾彊入賀信入吕后使武士縛信斬之長樂鍾室信方斬曰吾悔不用蒯徹之計乃為兒女子所詐豈非天哉遂夷信三族臣光曰世或以韓信為首建大䇿與髙祖起漢中定三秦遂分兵以北禽魏取代仆趙脅燕東擊齊而有之南滅楚垓下漢之所以得天下者大抵皆信之功也觀其距蒯徹之説迎髙祖於陳豈有反心哉良由失職怏怏遂䧟悖逆夫以盧綰里閈舊恩猶南靣王燕信乃以列侯奉朝請豈非髙祖亦有負於信哉臣以為髙祖用詐謀禽信於陳言負則有之雖然信亦有以取之也始漢與楚相距滎陽信滅齊不還報而自王其後漢追楚至固陵與信期共攻楚而信不至當是之時髙祖固有取信之心矣顧力不能耳及天下已定則信復何恃哉夫乗時以徼利者市井之志也醻功而報徳者士君子之心也信以市井之志利其身而以士君子之心望於人不亦難哉是故太史公論之曰假令韓信學道謙讓不伐已功不矜其能則庶㡬哉於漢家勲可以比周召太公之徒後世血食矣不務出此而天下已集乃謀畔逆夷滅宗族不亦宐乎將軍柴武斬韓王信於參合上還洛陽聞淮隂矦之死且喜且憐之問吕后曰信死亦何言吕后曰信言恨不用蒯徹計上曰是齊辯士蒯徹也乃詔齊捕蒯徹蒯徹至上曰若教淮隂矦反乎對曰然臣固教之豎子不用臣之䇿故令自夷於此如用臣之計陛下安得而夷之乎上怒曰烹之徹曰嗟乎􅁈哉烹也上曰君教韓信反何􅁈對曰秦失其鹿天下共逐之髙材疾足者先得焉跖之狗吠堯堯非不仁狗固吠非其主當是時臣唯獨知韓信非知陛下也且天下鋭精持鋒欲為陛下所為者甚衆顧力不能耳又可盡烹之邪上曰置之立子恒為代王都晉陽大赦天下上之擊陳豨也徴兵於梁梁王稱病使將將兵詣邯鄲上怒使人讓之梁王恐欲自往謝其將扈輒曰王始不往見讓而往往則為禽矣不如遂發兵反梁王不聽梁太僕得罪亡走漢告梁王與扈輒謀反於是上使使掩梁王梁王不覺遂囚之洛陽有司治反形已具請論如法上赦以為庶人傳處蜀青衣西至鄭逢吕后從長安來彭王為吕后泣涕自言無罪願處故昌邑吕后許諾與俱東至洛陽吕后白上曰彭王壯士今徙之蜀此自遺患不如遂誅之妾謹與俱來於是吕后乃令其舍人告彭越復謀反廷尉王恬關奏請族之上可其奏三月夷越三族梟越首洛陽下詔有收視者輒捕之梁大夫欒布使於齊還奏事越頭下祠而哭之吏捕以聞上召布罵欲烹之方提趨湯布顧曰願一言而死上曰何言布曰方上之困於彭城敗滎陽成臯間項王所以遂不能西者徒以彭王居梁地與漢合從苦楚也當是之時王一顧與楚則漢破與漢而楚破且垓下之㑹微彭王項氏不亡天下已定彭王剖符受封亦欲傳之萬世今陛下一徴兵於梁彭王病不行而陛下疑以為反反形未具以苛小案誅滅之臣恐功臣人人自危也今彭王已死臣生不如死請就烹於是上乃釋布罪拜為都尉丙午立皇子恢為梁王丙寅立皇子友為淮陽王罷東郡頗益梁罷潁川郡頗益淮陽夏四月行自洛陽至五月詔立秦南海尉趙佗為南粤王使陸賈即授璽綬與剖符通使使和集百越無為南邊患害初秦二世時南海尉任囂病且死召龍川令趙佗語曰秦為無道天下苦之聞陳勝等作亂天下未知所安南海僻逺吾恐盜兵侵地至此欲興兵絶新道自備待諸侯變㑹病甚且番禺負山險阻南海東西數千里頗有中國人相輔此亦一州之主也可以立國郡中長吏無足與言者故召公告之即被佗書行南海尉事囂死佗即移檄告横浦陽山湟谿闗曰盜兵且至急絶道聚兵自守因稍以法誅秦所置長吏以其黨為假守秦已破滅佗即擊并桂林象郡自立為南越武王陸生至尉佗魋結箕倨見陸生陸生說佗曰足下中國人親戚昆弟墳墓在眞定今足下反天性棄冠帶欲以區區之越與天子抗衡為敵國禍且及身矣且夫秦失其政諸侯豪桀並起唯漢王先入闗據咸陽項羽倍約自立為西楚霸王諸侯皆屬可謂至彊然漢王起巴蜀鞭笞天下遂誅項羽滅之五年之間海内平定此非人力天之所建也天子聞君王王南越不助天下誅暴逆將相欲移兵而誅王天子憐百姓新勞苦故且休之遣臣授君王印剖符通使君王宐郊迎北面稱臣乃欲以新造未集之越屈彊於此漢誠聞之掘燒王先人冢夷滅宗族使一偏將將十萬衆臨越則越殺王降漢如反覆手耳於是尉佗乃蹶然起坐謝陸生曰居蠻夷中久殊失禮義因問陸生曰我孰與蕭何曹參韓信賢陸生曰王似賢也復曰我孰與皇帝賢陸生曰皇帝継五帝三皇之業統理中國中國之人以億計地方萬里萬物殷冨政由一家自天地剖判未始有也今王衆不過數十萬皆蠻夷崎嶇山海間譬若漢一郡耳何乃比於漢尉佗大笑曰吾不起中國故王此使我居中國何遽不若漢乃留陸生與飲數月曰越中無足與語至生來令我日聞所不聞賜陸生槖中裝直千金他送亦千金陸生卒拜尉佗為南越王令稱臣奉漢約歸報帝大恱拜賈為太中大夫陸生時時前説稱詩書帝罵之曰乃公居馬上而得之安事詩書陸生曰居馬上得之寧可以馬上治之乎且湯武逆取而以順守之文武並用長久之術也昔者吳王夫差智伯秦始皇皆以極武而亡鄉使秦已并天下行仁義法先聖陛下安得而有之帝有慙色曰試為我著秦所以失天下吾所以得之者及古成敗之國陸生乃粗述存亡之徴凡著十二篇每奏一篇帝未嘗不稱善左右呼萬嵗號其書曰新語帝有疾惡見人卧禁中詔户者無得入羣臣羣臣絳灌等莫敢入十餘日舞陽矦樊噲排闥直入大臣隨之上獨枕一宦者卧噲等見上流涕曰始陛下與臣等起豐沛定天下何其壯也今天下已定又何憊也且陛下病甚大臣震恐不見臣等計事顧獨與一宦者絶乎且陛下獨不見趙髙之事乎帝笑而起秋七月淮南王布反初淮隂侯死布已心恐及彭越誅醢其肉以賜諸侯使者至淮南淮南王方獵見醢因大恐隂令人部聚兵候伺旁郡警急布所幸姬病就醫醫家與中大夫賁赫對門赫乃厚餽遺從姬飲醫家王疑其與亂欲捕赫赫乗傳詣長安上變言布謀反有端可先未發誅也上讀其書語蕭相國相國曰布不宐有此恐仇怨妄誣之請繫赫使人微驗淮南王淮南王布見赫以罪亡上變固已疑其言國隂事漢使又來頗有所驗遂族赫家發兵反反書聞上乃赦賁赫以為將軍上召諸將問計皆曰發兵擊之坑豎子耳何能為乎汝隂侯滕公召故楚令尹薛公問之令尹曰是固當反滕公曰上裂地而封之䟽爵而王之其反何也令尹曰往年殺彭越前年殺韓信此三人者同功一體之人也自疑禍及身故反耳滕公言之上上乃召見問薛公薛公對曰布反不足怪也使布出於上計山東非漢之有也出於中計勝敗之數未可知也出於下計陛下安枕而卧矣上曰何謂上計對曰東取吳西取楚并齊取魯􅀓檄燕趙固守其所山東非漢之有也何謂中計東取吳西取楚并韓取魏據敖倉之粟塞成臯之口勝敗之數未可知也何謂下計東取吳西取下蔡歸重於越身歸長沙陛下安枕而卧漢無事矣上曰是計將安出對曰出下計上曰何謂廢上中計而出下計對曰布故麗山之徒也自致萬乗之主此皆為身不顧後為百姓萬世慮者也故曰出下計上曰善封薛公千户乃立皇子長為淮南王是時上有疾欲使太子徃擊黥布太子客東園公綺里季夏黄公角里先生説建成侯吕釋之曰太子將兵有功則位不益無功則從此受禍矣君何不急請吕后承間為上泣言黥布天下猛將也善用兵今諸將皆陛下故等夷乃令太子將此屬無異使羊將狼莫肯為用且使布聞之則鼓行而西耳上雖病彊載輜車卧而護之諸將不敢不盡力上雖苦為妻子自彊於是吕釋之立夜見吕后吕后承間為上泣涕而言如四人意上曰吾惟豎子固不足遣而公自行耳於是上自將兵而東羣臣居守皆送至霸上留矦病自彊起至曲郵見上曰臣宐從病甚楚人剽疾願上無與爭鋒因説上令太子為將軍監闗中兵上曰子房雖病彊卧而傅太子是時叔孫通為太傅留矦行少傅事發上郡北地隴西車騎巴蜀材官及中尉卒三萬人為皇太子衛軍霸上布之初反謂其將曰上老矣厭兵必不能來使諸將諸將獨患淮隂彭越今皆已死餘不足畏也故遂反果如薛公之言東擊荆荆王賈走死冨陵盡劫其兵渡淮擊楚楚發兵與戰徐僮間為三軍欲以相救為竒或説楚將曰布善用兵民素畏之且兵法諸矦自戰其地為散地今别為三彼敗吾一軍餘皆走安能相救不聽布果破其一軍其二軍散走布遂引兵而西十二年冬十月上與布兵遇於鄿西布兵精甚上壁庸城望布軍置陳如項籍軍上惡之與布相望見遥謂布曰何苦而反布曰欲為帝耳上怒罵之遂大戰布軍敗走渡淮數止戰不利與百餘人走江南上令别將追之上還過沛留置酒沛宫悉召故人父老諸母子弟佐酒道舊故為笑樂酒酣上自為歌起舞忼慨傷懐泣數行下謂沛父兄曰游子悲故鄉朕自沛公以誅暴逆遂有天下其以沛為朕湯沐邑復其民世世無有所與樂飲十餘日乃去漢别將擊英布軍洮水南北皆大破之布故與番君㛰以故長沙成王臣使人誘布偽欲與亡走越布信而隨之番陽人殺布兹鄉民田舍周勃悉定代郡鴈門雲中地斬陳豨於當城上以荆王賈無後更以荆為吴國辛丑立兄仲之子濞為吴王王三郡五十三城十一月上過魯以太牢祠孔子上從破黥布歸疾益甚愈欲易太子張良諫不聽因疾不視事叔孫通諫曰昔者晉獻公以驪姬之故廢太子立奚齊晉國亂者數十年為天下笑秦以不蚤定扶蘇令趙髙得以詐立胡亥自使滅祀此陛下所親見今太子仁孝天下皆聞之吕后與陛下攻苦食淡其可背哉陛下必欲廢適而立少臣願先伏誅以頸血汙地帝曰公罷矣吾直戲耳叔孫通曰太子天下本本一搖天下振動柰何以天下為戲乎時大臣固爭者多上知羣臣心皆不附趙王乃止不立相國何以長安地陿上林中多空地棄願令民得入田毋收槀為禽獸食上大怒曰相國多受賈人財物乃為請吾苑下相國廷尉械繫之數日王衛尉侍前問曰相國何大罪陛下繫之暴也上曰吾聞李斯相秦皇帝有善歸主有惡自與今相國多受賈豎金而為之請吾苑以自媚於民故繫治之王衛尉曰夫職事茍有便於民而請之真宰相事陛下奈何乃疑相國受賈人錢乎且陛下距楚數嵗陳豨黥布反陛下自將而往當是時相國守闗中闗中搖足則闗以西非陛下有也相國不以此時為利今乃利賈人之金乎且秦以不聞其過亡天下李斯之分過又何足法哉陛下何疑宰相之淺也帝不懌是日使使持節赦出相國相國年老素恭謹入徒跣謝帝曰相國休矣相國為民請苑吾不許我不過為桀紂主而相國為賢相吾故繫相國欲令百姓聞吾過也陳豨之反也燕王綰發兵擊其東北當是時陳豨使王黄求救匈奴燕王綰亦使其臣張勝於匈奴言豨等軍破張勝至胡故燕王臧荼子衍出亡在胡見張勝曰公所以重於燕者以習胡事也燕所以久存者以諸侯數反兵連不決也今公為燕欲急滅豨等豨等已盡次亦至燕公等亦且為虜矣公何不令燕且緩陳豨而與胡和事寛得長王燕即有漢急可以安國張勝以為然乃私令匈奴助豨等擊燕燕王綰疑張勝與胡反上書請族張勝勝還具道所以為者燕王乃詐論他人脱勝家屬使得為匈奴間而隂使范齊之陳豨所欲令久亡連兵勿決漢擊黥布豨常將兵居代漢擊斬豨其裨將降言燕王綰使范齊通計謀於豨所帝使使召盧綰綰稱病上又使辟陽侯審食其御史大夫趙堯往迎燕王因驗問左右綰愈恐閉匿謂其幸臣曰非劉氏而王獨我與長沙耳往年春漢族淮隂夏誅彭越皆吕氏計今上病屬任吕后吕后婦人専欲以事誅異姓王者及大功臣乃遂稱病不行其左右皆亡匿語頗泄辟陽侯聞之歸具報上上益怒又得匈奴降者言張勝亡在匈奴為燕使於是上曰盧綰果反矣春二月使樊噲以相國將兵擊綰立皇子建為燕王詔曰南武侯織亦粤之世也立以為南海王上擊布時為流矢所中行道疾甚吕后迎良醫醫入見曰疾可治上嫚罵之曰吾以布衣提三尺取天下此非天命乎命乃在天雖扁鵲何益遂不使治疾賜黄金五十斤罷之吕后問曰陛下百嵗後蕭相國既死誰令代之上曰曹參可問其次曰王陵可然少戇陳平可以助之陳平知有餘然難獨任周勃重厚少文然安劉氏者必勃也可令為太尉吕后復問其次上曰此後亦非乃所知也夏四月甲辰帝崩于長樂宫丁未發喪大赦天下盧綰與數千人居塞下􅇋伺幸上疾愈自入謝聞帝崩遂亡入匈奴五月丙寅􅁙高帝於長陵初髙祖不脩文學而性明達好謀能聽自監門戍卒見之如舊初順民心作三章之約天下既定命蕭何次律令韓信申軍法張蒼定章程叔孫通制禮儀又與功臣剖符作誓丹書鐵契金匱石室蔵之宗廟雖日不暇給規摹􅀪逺矣己巳太子即皇帝位尊皇后曰皇太后初髙帝病甚人有惡樊噲云黨於吕氏即一日上晏駕欲以兵誅趙王如意之屬帝大怒用陳平謀召絳侯周勃受詔牀下曰陳平亟馳傳載勃代噲將平至軍中即斬噲頭二人既受詔馳傳未至軍行計之曰樊噲帝之故人也功多且又吕后弟吕􅎐之夫有親且貴帝以忿怒故欲斬之則恐後悔寧囚而致上上自誅之未至軍為壇以節召樊噲噲受詔即反接載檻車傳詣長安而令絳侯勃代將將兵定燕反縣平行聞帝崩畏吕􅎐讒之於太后乃馳􅀓先去逢使者詔平與灌嬰屯滎陽平受詔立復馳至宫哭殊悲因固請得宿衛中太后乃以為郎中令使傅教惠帝是後吕􅎐讒乃不得行樊噲至則赦復爵邑太后令永巷囚戚夫人髠鉗衣赭衣令舂遣使召趙王如意使者三反趙相周昌謂使者曰髙帝屬臣趙王趙王年少竊聞太后怨戚夫人欲召趙王并誅之臣不敢遣王王且亦病不能奉詔太后怒先使人召昌昌至長安乃使人復召趙王王來未到帝知太后怒自迎趙王霸上與入宫自挾與起居飲食太后欲殺之不得閒孝惠皇帝元年冬十二月帝晨出射趙王少不能蚤起太后使人持酖飲之犂明帝還趙王已死太后遂斷戚夫人手足去眼煇耳飲瘖藥使居厠中命曰人彘居數日乃召帝觀人彘帝見問知其戚夫人乃大哭因病嵗餘不能起使人請太后曰此非人所為臣為太后子終不能治天下帝以此日飲為淫樂不聽政臣光曰為人子者父母有過則諫諫而不聽則號泣而隨之安有守髙祖之業為天下之主不忍母之殘酷遂棄國家而不恤縱酒色以傷生若孝惠者可謂篤於小仁而未知大誼也徙淮陽王友為趙王春正月始作長安城西北方二年冬十月齊悼惠王來朝飲於太后前帝以齊王兄也置之上坐太后怒酌酖酒置前賜齊王為夀齊王起帝亦起取巵太后恐自起泛帝巵齊王怪之因不敢飲佯醉去問知其酖大恐齊内史士説王使獻城陽郡為魯元公主湯沐邑太后喜乃罷歸齊王春正月癸酉有兩龍見蘭陵家人井中隴西地震夏旱郃陽侯仲薨鄼文終侯蕭何病上親自臨視因問曰君即百嵗後誰可代君者對曰知臣莫如主帝曰曹參何如何頓首曰帝得之矣臣死不恨秋七月辛未何薨何置田宅必居窮僻處為家不治垣屋曰後世賢師吾儉不賢母爲埶家所奪癸巳以曹參爲相國參聞何薨吿舍人趣治行吾將入相居無何使者果召參始參微時與蕭何善及爲將相有隙至何且死所推賢唯參參代何爲相舉事無所變更一遵何約束擇郡國吏木訥於文辭重厚長者即召除爲丞相史吏之言文刻深欲務聲名者輒斥去之日夜飲醇酒卿大夫已下吏及賔客見參不事事來者皆欲有言參輒飲以醇酒間欲有所言復飲之醉而後去終莫得開説以爲常見人有細過専掩匿覆蓋之府中無事參子窋爲中大夫帝怪相國不治事以爲豈少朕與使窋歸以其私問參參怒笞窋二百曰趣入侍天下事非若所當言也至朝時帝讓參曰乃者我使諫君也參免冠謝曰陛下自察聖武孰與髙帝上曰朕乃安敢望先帝又曰陛下觀臣能孰與蕭何賢上曰君似不及也參曰陛下言之是也髙帝與蕭何定天下法令既明今陛下垂拱參等守職遵而勿失不亦可乎帝曰善參為相國出入三年百姓歌之曰蕭何為法較若畫一曹參代之守而勿失載其清淨民以寧壹三年春發長安六百里内男女十四萬六千人城長安三十日罷以宗室女為公主嫁匈奴冒頓單于是時冒頓方彊為書使使遺髙后辭極䙝嫚髙后大怒召將相大臣議斬其使者發兵擊之樊噲曰臣願得十萬衆横行匈奴中中郎將季布曰噲可斬也前匈奴圍髙帝於平城漢兵三十二萬噲為上將軍不能解圍今歌吟之聲未絶傷痍者甫起而噲欲搖動天下妄言以十萬衆横行是面謾也且夷狄譬如禽獸得其善言不足喜惡言不足怒也髙后曰善令大謁者張釋報書深自謙愻以謝之并遺以車二乗馬二駟冒頓復使使來謝曰未嘗聞中國禮義陛下幸而赦之因獻馬遂和親夏五月立閩越君揺為東海王搖與無諸皆越王句踐之後也從諸侯滅秦功多其民便附故立之都東甌世號東甌王六月發諸侯王列侯徒􅀠二萬人城長安秋七月都廏災是嵗蜀湔氐反擊平之四年冬十月立皇后張氏后帝姊魯元公主女也太后欲為重親故以配帝春正月舉民孝弟力田者復其身三月甲子皇帝冠赦天下省法令妨吏民者除挾書律帝以朝太后於長樂宫及間徃數蹕煩民乃築複道於武庫南奉常叔孫通諫曰此髙帝月出遊衣冠之道也子孫柰何乗宗廟道上行哉帝懼曰急壞之通曰人主無過舉今已作百姓皆知之矣願陛下為原廟渭北衣冠月出遊之益廣宗廟大孝之本上乃詔有司立原廟臣光曰過者人之所必不免也惟聖賢為能知而改之古之聖王患其有過而不自知也故設誹謗之木置敢諫之鼓豈畏百姓之聞其過哉是以仲虺美成湯曰改過不吝傅説戒髙宗曰無恥過作非由是觀之則爲人君者固不以無過爲賢而以改過爲美也今叔孫通諫孝恵乃云人主無過舉是教人君以文過遂非也豈不繆哉長樂宫鴻臺災秋七月乙亥未央宫凌室災丙子織室災五年冬雷桃李華棗實春正月復發長安六百里內男女十四萬五千人城長安三十日罷夏大旱江河水少谿谷水絶秋八月己􅐫平陽懿侯曹參薨六年冬十月以王陵爲右丞相陳平爲左丞相齊悼恵王􅏂薨夏留文成侯張良薨以周勃爲太尉七年冬發車騎材官詣滎陽太尉灌嬰將春正月辛丑朔日有食之夏五月丁卯日有食之既秋八月戊寅帝崩于未央宫大赦天下九月辛丑􅁙安陵初吕太后命張皇后取他人子養之而殺其母以為太子既􅁙太子即皇帝位年幼太后臨朝稱制資治通鑑卷第十二
