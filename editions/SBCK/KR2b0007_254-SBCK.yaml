body:
  text: 臣司馬光奉勑編集唐紀七十攝提格四月凡一年有竒起上章困敦十一月盡玄黓僖宗惠聖恭定孝皇帝中之上廣明元年十一月河中都虞候王重榮作亂剽掠坊市俱空宿州刺史劉漢宏怨朝廷賞薄甲寅以漢宏爲浙東觀察使詔河東節度使鄭從讜以本道兵授諸葛爽及代州刺史朱玫使南討黄巢乙卯以代北都統李琢爲河陽節度使初黄巢將度淮豆盧瑑請以天平節􅃏授巢俟其到鎮討之盧􅂝曰盜賊無厭雖與之節不能止其剽掠不若急􅀤諸道兵扼泗州汴州節度使爲都統賊既前不能入闗必還掠淮浙偷生海渚耳從之既而淮北相繼告急􅂝稱疾不出京師大恐庚申東都奏黄巢入汝州境辛酉以王重榮權知河中留後以河中節度使同平章事李都爲太子少傅汝鄭把截制置都指揮使齊克讓奏黄巢自稱天􅀘大將軍轉牒諸軍云各宜守壘勿犯吾鋒吾將入東都即至京邑自欲問罪無預衆人上召宰相議之豆盧瑑崔沆請􅀤闗内諸鎮及兩神䇿軍守潼闗壬戌日南至上開延英對宰相泣下觀軍容使田令孜奏請選左右神䇿軍弓弩手守潼闗臣自爲都指揮制置把截使上曰侍衛將士不習征戰恐未足用令孜曰昔安禄山構逆􅀇宗幸蜀以避之崔沆曰禄山衆纔五萬比之黄巢不足言矣豆盧瑑曰哥舒翰以十五萬衆不能守潼闗今黄巢衆六十萬而潼闗又無哥舒之兵若令孜爲社稷計三川帥臣皆令孜腹心比於􅀇宗則有僃矣上不懌謂令孜曰卿且爲朕􅀤兵守潼闗是日上幸左神䇿軍親閱將士令孜薦左軍馬軍將軍張承範右軍歩軍將軍王師㑹左軍兵馬使趙珂上召見三人以承範爲兵馬先鋒使兼把截潼闗制置使師㑹爲制置闗塞糧料使珂爲句當寨柵使令孜爲左右神䇿軍内外八鎮及諸道兵馬都指揮制置招討等使飛龍使楊復恭爲副使癸亥齊克讓奏黄巢已入東都境臣收軍退保潼闗於闗外置寨將士屢經戰闘乆乏資儲州縣殘破人煙殆絶東西南北不見王人凍餒交逼兵械刓􅁦各思鄉閭恐一旦潰去乞早遣資糧及援軍上命選兩神䇿弩手得二千八百人令張承範等將以赴之丁卯黄巢陷東都留守劉允章帥百官迎謁巢入城勞問而已閭里晏然允章廼之曾孫也田令孜奏募坊市人數千以補兩軍辛未陜州奏東都已陷壬申以田令孜爲汝洛晉絳同華都統將左右軍東討是日賊陷虢州以神䇿將羅元杲爲河陽節度使以周岌爲忠武節度使初薛能遣牙將上蔡秦宗權調􅀤至蔡州聞許州亂託云赴難選募蔡兵遂逐刺史據其城及周岌爲節度使即以宗權爲蔡州刺史乙亥張承範等將神䇿弩手􅀤京師神䇿軍士皆長安富家子賂宦官竄名軍籍厚得禀賜但華衣怒馬慿勢使氣未嘗更戰陳聞當出征父子聚泣多以金帛雇病坊貧人代行往往不能操兵是日上御章信門樓臨遣之承範進言聞黄巢擁數十萬之衆鼓行而西齊克讓以饑卒萬人依託闗外復遣臣以二千餘人屯於闗上又未聞爲饋餉之計以此拒賊臣竊寒心願陛下趣諸道精兵早爲繼援上曰卿軰第行兵尋至矣丁丑承範等至華州㑹刺史裴䖍餘徙宣歙觀察使軍民皆逃入華山城中索然州庫唯塵埃䑕迹頼倉中猶有米千餘斛軍士褁三日糧而行十二月庚辰朔承範等至潼􅀜搜菁中得村民百許使運石汲水爲守禦之僃與齊克讓軍皆絶糧士卒莫有闘志是日黄巢前鋒軍抵闗下白旗滿野不見其際克讓與戰賊小却俄而巢至舉軍大呼聲振河華克讓力戰自午至酉始解士卒飢甚遂諠譟燒營而潰克讓走入􅀜􅀜左有谷平日禁人往來以搉征稅謂之禁阬賊至倉猝官軍忘守之潰兵自谷而入谷中灌木壽藤茂密如織一夕踐爲坦塗承範盡散其輜囊以給士卒遣使上表告急稱臣離京六日甲卒未増一人餽餉未聞影響到闗之日巨寇已來以二千餘人拒六十萬衆外軍飢潰蹋開禁阬臣之失守鼎鑊甘心朝廷謀臣愧顔何寄或聞陛下已議西廵茍鑾輿一動則上下土崩臣敢以猶生之軀􅁬冒死之語願與近密及宰臣熟議未可輕動急徵兵以救闗防則髙祖太宗之業庶㡬猶可扶持使黄巢繼安禄山之亡㣲臣勝哥舒翰之死辛巳賊急攻潼闗承範悉力拒之自寅及申闗上矢盡投石以擊之闗外有天塹賊驅民千餘人入其中掘土填之須􅁷即平引兵而度夜縱火焚闗樓俱盡承範分兵八百人使王師㑹守禁阬比至賊已入矣壬午旦賊夾攻潼闗闗上兵皆潰師㑹自殺承範變服帥餘衆脫走至野狐泉遇奉天援兵二千繼至承範曰汝來晩矣博野鳯翔軍還至渭橋見所募新軍衣裘温鮮怒曰此輩何功而然我曹反凍餒遂掠之更爲賊鄉導以􅃐長安賊之攻潼闗也朝廷以前京兆尹蕭廩爲東道轉運糧料使廪稱疾請休官貶賀州司户黄巢入華州留其將喬鈐守之河中留後王重榮請降於賊癸未制以巢爲天平節度使甲申以翰林學士承㫖尚書左丞王徽爲户部侍郎翰林學士户部侍郎裴澈爲工部侍郎並同平章事以盧攜爲太子賔客分司田令孜聞黄巢已入闗恐天子責己乃歸罪於􅂝而貶之薦徽澈爲相是夕􅂝飲藥死澈休之從子也百官退朝聞亂兵入城布路竄匿田令孜帥神䇿兵五百奉帝自金光門出惟福穆澤壽四王及妃嬪數人從行百官皆莫知之上奔馳晝夜不息從官多不能及車駕既去軍士及坊市民競入府庫盜金帛晡時黄巢前鋒將柴存入長安金吾大將軍張直方帥文武數十人迎巢於覇上巢乘金裝肩輿其徒皆被髪約以紅繒衣錦繡執兵以從甲騎如流輜重塞塗千里絡繹不絶民夾道聚觀尚讓厯諭之曰黄王起兵本爲百姓非如李氏不愛汝曹汝但安居毋恐巢舘于田令孜第其徒爲盜乆不勝富見貧者往往施與之居數日各出大掠焚市肆殺人滿街巢不能禁尤憎官吏得者皆殺之上􅃐駱谷鳯翔節度使鄭畋謁上於道次請車駕留鳯翔上曰朕不欲密邇巨冦且幸興元徵兵以圖收復卿東扞賊鋒西撫諸蕃糾合鄰道勉建大勲畋曰道路梗澁奏報難通請得便宜從事許之戊子上至壻水詔牛朂楊師立陳敬瑄諭以京城不守且幸興元若賊勢猶盛將幸成都宜豫爲僃擬庚寅黄巢殺唐宗室在長安者無遺類辛卯巢始入宫壬辰巢即皇帝位于含元殿􅀞皁繒爲衮衣擊戰鼓數百以代金石之樂登丹鳯樓下赦書國號大齊改元金統謂廣明之號去唐下體而著黄家日月以爲己符瑞唐官三品以上悉停任四品以下位如故以妻曹氏爲皇后以尚讓爲太尉兼中書令趙璋兼侍中崔璆楊希古並同平章事孟楷蓋洪爲左右僕射知左右軍事費傳古爲樞密使以太常博士皮日休爲翰林學士璆邠之子也時罷浙東觀察使在長安巢得而相之諸葛爽以代北行營兵屯櫟陽黄巢將碭山朱温屯東渭橋巢使温誘說之爽遂降於巢温少孤貧與兄昱存随母王氏依蕭縣劉崇家崇數笞辱之崇母獨憐之戒家人曰朱三非常人汝曹善遇之巢以諸葛爽爲河陽節度使爽赴鎮羅元杲􅀤兵拒之士卒皆弃甲迎爽元杲逃奔行在鄭畋還鳯翔召將佐議拒賊皆曰賊勢方熾且宜從容以俟兵集乃圖收復畋曰諸君勸畋臣賊乎因悶絶仆地甃傷其面自午至明旦尚未能言㑹巢使者以赦書至監軍袁敬柔與將佐序立宣示代畋草表署名以謝巢監軍與巢使者宴樂奏將佐以下皆哭使者怪之幕客孫儲曰以相公風痺不能來故悲耳民閒聞者無不泣畋聞之曰吾固知人心尚未厭唐賊授首無日矣乃刺指血爲表遣所親閒道詣行在召將佐諭以逆順皆聽命復刺血與盟然後完城塹繕器械訓士卒密約鄰道合兵討賊鄰道皆許諾􅀤兵㑹於鳯翔時禁軍分鎮闗中者尚數萬聞天子幸蜀無所歸畋使人招之皆往從畋畋分財以結其心軍勢大振丁酉車駕至興元詔諸道各出全軍收復京師己亥黄巢下令百官詣趙璋第投名衘者復其官豆盧瑑崔沆及左僕射于琮右僕射劉鄴太子少師裴諗御史中丞趙濛刑部侍郎李􅄎京兆尹李湯扈從不及匿民閒巢搜獲皆殺之廣徳公主曰我唐室之女誓與于僕射俱死執賊刃不置賊并殺之􅀤盧攜尸戮之於市將作監鄭綦庫部郎中鄭係義不臣賊舉家自殺左金吾大將軍張直方雖臣於巢多納亡命匿公卿於複壁巢殺之初樞密使楊復恭薦處士河間張濬拜太常博士遷度支貟外郎黄巢逼潼􅀜濬避亂啇山上幸興元道中無供頓漢隂令李康以騾負糗糧數百䭾獻之從行軍士始得食上問康卿爲縣令何能如是對曰臣不及此乃張濬貟外教臣上召濬詣行在拜兵部郎中義武節度使王處存聞長安失守號哭累日不俟詔命舉軍入援遣二千人閒道詣興元衛車駕黄巢遣使調􅀤河中前後數百人吏民不勝其苦王重榮謂衆曰始吾屈節以紓軍府之患今調財不已又將徴兵吾亡無日矣不如􅀤兵拒之衆皆以爲然乃悉驅巢使者殺之巢遣其將朱温自同州弟黄鄴自華州合兵擊河中重榮與戰大破之獲糧仗四十餘船遣使與王處存結盟引兵營於渭北陳敬瑄聞車駕出幸遣歩騎三千奉迎表請幸成都時從兵浸多興元儲偫不豐田令孜亦勸上上從之中和元年春正月車駕􅀤興元加牛朂同平章事陳敬瑄以扈從之人驕縱難制有内園小兒先至成都遊於行宫笑曰人言西川是蠻今日觀之亦不惡敬瑄執而杖殺之由是衆皆肅然敬瑄迎謁於鹿頭關辛未上至綿州東川節度使楊師立謁見壬申以工部侍郎判度支蕭遘同平章事鄭畋約前朔方節度使唐􅀪夫涇原節度使程宗楚同討黄巢巢遣其將王暉齎詔召畋畋斬之遣其子凝績詣行在凝績追及上於漢州丁丑車駕至成都館於府舍上遣中使􅃐髙駢討黄巢道路相望駢終不出兵上至蜀猶冀駢立功詔駢巡内刺史及諸將有功者自監察至常侍聽以墨欶除訖奏聞裴澈自賊中奔詣行在時百官未集乏人草制右拾遺樂朋􅀛謁田令孜而拜之由是擢爲翰林學士張濬先亦拜令孜令孜嘗召宰相及朝貴飲酒濬恥於衆中拜令孜乃先謁令孜謝酒及賔客畢集令孜言曰令孜與張郎中清濁異流嘗蒙中外既慮玷辱何憚改更今日於隠處謝酒則又不可濬慙懼無所容二月乙卯朔以太子少師王鐸守司徒兼門下侍郎同平章事丙申加鄭畋同平章事加淮南節度使髙駢東面都統加河東節度使鄭從讜兼侍中依前行營招討使代北監軍陳景思帥沙陀酋長李友金及薩葛安慶吐谷渾諸部入援京師至絳州將濟河絳州刺史瞿稹亦沙陀也謂景思曰賊勢方盛未可輕進不若且還代北募兵遂與景思俱還鴈門以樞密使楊復光爲京城西南面行營都監黄巢以朱温爲東南面行營都虞候將兵攻鄧州三月辛亥陷之執刺史趙戎因戍鄧州以扼荆襄壬子加陳敬瑄同平章事甲寅敬瑄奏遣左黄頭軍使李鋋將兵擊黄巢辛酉以鄭畋爲京城四面諸軍行營都統賜畋詔凡蕃漢將士赴難有功者並聽以墨敕除官畋奏以涇原節度使程宗楚爲副都統前朔方節度使唐􅀪夫爲行軍司馬黄巢遣其將尚讓王播帥衆五萬冦鳯翔畋使􅀪夫伏兵要害自以兵數千多張旗幟踈陳於髙岡賊以畋書生輕之鼓行而前無復行伍伏􅀤賊大敗於龍尾陂斬首二萬餘級伏尸數十里有書尚書省門爲詩以嘲賊者尚讓怒應在省官及門卒悉抉目倒懸之大索城中能爲詩者盡殺之識字者給賤役凡殺三千餘人瞿稹李友金至代州募兵踰旬得三萬人皆北方雜胡屯於崞西獷悍暴横稹與友金不能制友金乃說陳景思曰今雖有衆數萬茍無威望之將以統之終無成功吾兄司徒父子勇略過人爲衆所服驃騎誠奏天子赦其罪召以爲帥則代北之人一麾響應狂賊不足平也景思以爲然遣使詣行在言之詔如所請友金以五百騎齎詔詣達靻迎之李克用帥達靻諸部萬人赴之羣臣追從車駕者稍稍集成都南北司朝者近二百人諸道及四夷貢獻不絶蜀中府庫充實與京師無異賞賜不乏士卒欣恱黄巢得王徽逼以官徽陽瘖不從月餘逃奔河中遣人閒道奉絹表詣行在詔以徽爲兵部尚書前夏綏節度使諸葛爽復自河陽奉表自歸即以爲河陽節度使宥州刺史拓跋思恭本党項羌也糾合夷夏兵㑹鄜延節度使李孝昌於鄜州同盟討賊奉天鎮使齊克儉遣使詣鄭畋求自效甲子畋傳檄天下藩鎮合兵討賊時天子在蜀詔令不通天下謂朝廷不能復振及得畋檄爭􅀤兵應之賊懼不敢復窺京西夏四月戊寅朔加王鐸兼侍中以拓䟦思恭權知夏綏節度使黄巢以其將王玫爲邠寧節度使邠州通塞鎮將朱玫起兵誅之讓别將李重古爲節度使自將兵討巢是時唐􅀪夫屯渭北王重榮屯沙苑王處存屯渭橋拓䟦思恭屯武功鄭畋屯􅉦厔􅀪夫乗龍尾之捷進薄長安壬午黄巢帥衆東走程宗楚先自延秋門入弘夫繼至處存帥銳卒五千夜入城坊市民喜爭讙呼出迎官軍或以瓦礫擊賊或拾箭以供官軍宗楚等諸將分其功不報鳯翔鄜夏軍士釋兵入第舍掠金帛妓妾處存令軍士首繫白􅔮爲號坊市少年或竊其號以掠人賊露宿霸上詗知官軍不整且諸軍不相繼引兵還襲之自諸門分入大戰長安中宗楚弘夫死軍士重負不能走是以甚敗死者什八九處存收餘衆還營丁亥巢復入長安怒民之助官軍縱兵屠殺流血成川謂之洗城於是諸軍皆退賊勢愈熾賊所署同州刺史王􅄎華州刺史喬謙商州刺史宋巖聞巢弃長安皆帥衆奔鄧州朱温斬􅄎謙釋巖使還商州庚寅拓跋思恭李孝昌與賊戰於王橋不利詔以河中留後王重榮爲節度使賊衆上黄巢尊號曰承天應運啓聖睿文宣武皇帝有雙雉集廣陵府舍占者以爲野鳥來集城邑將空之兆髙駢惡之乃移檄四方云將入討黄巢悉􅀤巡內兵八萬舟二千艘旌旗甲兵甚盛五月乙未出屯東塘諸將數請行期駢託風濤爲阻或云時日不利竟不􅀤李克用牒河東稱奉詔將兵五萬討黄巢令具頓遞鄭從讜閉城以僃之克用屯於汾東從讜犒勞給其資糧累日不􅀤克用自至城下大呼求與從讜相見從讜登城謝之癸亥復求􅀤軍賞給從讜以錢千緡米千斛遺之甲子克用縱沙陀剽掠居民城中大駭從讜求救於振武節度使契苾璋璋引突厥吐谷渾救之破沙陀兩寨克用追戰至晉陽城南璋引兵入城沙陀掠陽曲榆次而歸黄巢之克長安也忠武節度使周岌降之岌嘗夜宴急召監軍楊復光左右曰周公臣賊將不利於内侍不可往復光曰事已如此義不圖全即詣之酒酣岌言及本朝復光泣下良乆曰丈夫所感者恩義耳公自匹夫爲公矦柰何捨十八葉天子而臣賊乎岌亦流涕曰吾不能獨拒賊故貌奉而心圖之今日召公正爲此耳因瀝酒爲盟是夕復光遣其養子守亮殺賊使者於驛時秦宗權據蔡州不從岌命復光將忠武兵三千詣蔡州說宗權同舉兵討巢宗權遣其將王淑將兵三千從復光擊鄧州逗留不進復光斬之併其軍分忠武八千人爲八都遣牙將鹿晏􅀪晉暉王建韓建張造李師泰龐從等八人將之王建舞陽人韓建長社人晏弘暉造師泰皆許州人也復光帥八都與朱温戰敗之遂克鄧州逐北至藍橋而還昭義節度使髙潯㑹王重榮攻華州克之六月戊戌以鄭畋爲司空兼門下侍郎同平章事都統如故李克用遇大雨己亥引兵北還陷忻代二州因留居代州鄭從讜遣教練使論安等軍百井以僃之邠寧節度副使朱玫屯興平黄巢將王播圍興平玫退屯奉天及龍尾陂西川黄頭軍使李鋋將萬人鞏咸將五千人屯興平爲二寨與黄巢戰屢捷陳敬瑄遣神機營使髙仁厚將二千人益之秋七月丁巳改元赦天下庚申以翰林學士承㫖兵部侍郎韋昭度同平章事論安自百井擅還鄭從讜不解鞾衫斬之滅其族更遣都頭温漢臣將兵屯百井契苾璋引兵還振武初車駕至成都蜀軍賞錢人三緡田令孜爲行在都指揮處置使毎四方貢金帛輒頒賜從駕諸軍無虛月不復及蜀軍蜀軍頗有怨言丙寅令孜宴土客都頭以金杯行酒因賜之諸都頭皆拜而受西川黄頭軍使郭琪獨不受起言曰諸將月受俸料豐贍有餘常思難報豈敢無厭顧蜀軍與諸軍同宿衛而賞賚懸殊頗有觖望恐萬一致變願軍容減諸將之賜以均蜀軍使土客如一則上下幸甚令孜黙然有間曰汝嘗有何功對曰琪生長山東征戍邉鄙嘗與党項十七戰契丹十餘戰金創滿身又嘗征吐谷渾傷脅腸出線縫復戰令孜乃自酌酒於别樽以賜琪琪知其毒不得已再拜飲之歸殺一婢吮其血以解毒吐黒汁數升遂帥所部作亂丁卯焚掠坊市令孜奉天子保東城閉門登樓命諸軍擊之琪引兵還營陳敬瑄命都押牙安金山將兵攻之琪夜突圍出奔廣都從兵皆潰獨㕔吏一人從息於江岸琪謂㕔吏曰陳公知吾無罪然軍府驚擾不可以莫之安也汝事吾能始終今有以報汝汝齎吾印劒詣陳公云郭琪走度江我以劒擊之墜水尸隨湍流下矣得其印劒以獻陳公必據汝所言牓懸印劒於市以安衆汝當獲厚賞吾家亦保無恙吾自此適廣陵歸髙公後數日汝可密以語吾家也遂觧印劒授之而逸㕔吏以獻敬瑄果免琪家上日夕專與宦官同處議天下事待外臣殊踈薄庚午左拾遺孟昭圖上䟽以爲治安之代遐邇猶應同心多難之時中外尤當一體去冬車駕西幸不告南司遂使宰相僕射以下悉爲賊所屠獨北司平善况今朝臣至者皆冒死﨑嶇逺奉君親所宜自兹同休等戚伏見前夕黄頭軍作亂陛下獨與令孜敬瑄及諸内臣閉城登樓並不召王鐸已下及收朝臣入城翌日又不對宰相亦不宣慰朝臣臣僃位諌官至今未知聖躬安否况踈冗乎儻羣臣不顧君上罪固當誅若陛下不恤羣臣於義安在夫天下者髙祖太宗之天下非北司之天下天子者四海九州之天子非北司之天子北司未必盡可信南司未必盡無用豈天子與宰相了無關渉朝臣皆若路人如此恐收復之期尚勞宸慮尸禄之士得以宴安臣躬被寵榮職在禆益雖遂事不諌而來者可追䟽入令孜屏不奏辛未矯詔貶昭圖嘉州司户遣人沉於蟇頥津聞者氣塞而莫敢言鄜延節度李孝昌權夏州節度使拓䟦思恭屯東渭橋黄巢遣朱温拒之以義武節度使王處存爲東南面行營招討使以邠寧節度副使朱玫爲節度使八月己丑夜星交流如織或大如杯椀至丁酉乃止武寧節度使支詳遣牙將時溥陳璠將兵五千入關討黄巢二人皆詳所奬㧞也溥至東都矯稱詳命召師還與璠合兵屠河隂掠鄭州而東及彭城詳迎勞犒賞甚厚溥遣所親說詳曰衆心見迫請公解印以相授詳不能制出居大彭館溥自知留務璠謂溥曰支僕射有惠於徐人不殺必成後悔􅄎不許送詳歸朝璠伏甲於七里亭并其家屬殺之詔以溥爲武寧留後溥表璠爲宿州刺史璠到官貪虐􅄎以都將張友代還殺之楊復光奏升蔡州爲奉國軍以秦宗權爲防禦使壽州屠者王緒與妹夫劉行全聚衆五百盜據本州月餘復陷光州自稱將軍有衆萬餘人秦宗權表爲光州刺史固始縣佐王潮及弟審邽審知皆以材氣知名緒以潮爲軍正使典資糧閲士卒信用之髙潯與黄巢將李詳戰于石橋潯敗奔河中詳乘勝復取華州巢以詳爲華州刺史以權知夏綏節度使拓䟦思恭爲節度使宗正少卿嗣曹王􅀛年自南詔還驃信上表􅅃附請悉遵詔㫖九月李孝昌拓抜思恭與尚讓朱温戰于東渭橋不利引去初髙駢與鎮海節度使周寳俱出神䇿軍駢以兄事寳及駢先貴有功浸輕之既而封壤相鄰數争細故遂有隙駢檄寳入援京師寳治舟師以俟之怪其乆不行訪諸幕客或曰髙公幸朝廷多故有併吞江東之志聲云入援其實未必非圖我也宜爲僃寳未之信使人覘駢殊無北上意㑹駢使人約寳面㑹􅀲洲議軍事寳遂以言者爲然辭疾不往且謂使者曰吾非李康髙公復欲作家門功勲以欺朝廷邪駢怒復遣使責寳何敢輕侮大臣寶詬之曰彼此夾江爲節度使汝爲大臣我豈坊門卒邪由是遂爲深仇駢留東塘百餘日詔屢趣之駢上表託以寳及浙東觀察使劉漢宏將爲後患辛亥復罷兵還府其實無赴難心伹欲禳雉集之異耳髙駢召石鏡將董昌至廣陵欲與之俱擊黄巢昌將錢鏐説昌曰觀髙公無討賊心不若以扞禦鄉里爲辭而去之昌從之駢聽昌還㑹杭州刺史路審中將之官行至嘉興昌自石鏡引兵入據杭州審中懼而還昌自稱杭州都押牙知州事遣將吏請於周寳寳不能制表爲杭州刺史臨海賊杜雄陷台州辛酉立皇子震爲建王昭義十將成麟殺髙潯引兵還據潞州天井關戍將孟方立起兵攻麟殺之方立邢州人也忠武監軍楊復光屯武功永嘉賊朱襃陷温州鳯翔行軍司馬李昌言將本軍屯興平時鳯翔倉庫虛竭犒賞稍薄糧饋不繼昌言知府中兵少因激怒其衆冬十月引軍還襲府城鄭畋登城與士卒言其衆皆下馬羅拜曰相公誡無負我曹畋曰行軍茍能戢兵愛人爲國滅賊亦可以順守矣乃以留務委之即日西赴行在天平節度使南面招討使曹全晸與賊戰死軍中立其兄子存實爲留後十一月乙巳孟楷朱温襲鄜夏二軍於富平二軍敗奔歸本道鄭畋至鳯州累表辭位詔以畋爲太子少傅分司以李昌言爲鳯翔節度行營招討使以門下侍郎同平章事裴澈爲鄂岳觀察使加鎮海節度使周寳同平章事遂昌賊盧約陷處州十二月江西將閔朂戍湖南還過潭州逐觀察使李裕自爲留後以感化留後時溥爲節度使賜夏州號定難軍初髙駢鎮荆南補武陵蠻雷滿爲牙將領蠻軍從駢至淮南逃歸聚衆千人襲朗州殺刺史崔翥詔以滿爲朗州留後歲中率三四引兵冦荆南入其郛焚掠而去大爲荆人之患陬溪人周岳嘗與滿獵爭肉而闘欲殺滿不果聞滿據朗州亦聚衆襲衡州逐刺史徐顥詔以岳爲衡州刺史石門洞蠻尚瓌亦集夷獠數千攻陷澧州殺刺史吕自牧自稱刺史王鐸以髙駢爲諸道都統無心討賊自以身爲首相􅀤憤請行懇􅅃流涕至于再三上許之二年春正月辛亥以王鐸兼中書令充諸道行營都都統權知義成節度使俟罷兵復還政府髙駢但領鹽鐵轉運使罷其都統及諸使聽王鐸自辟將佐以太子少師崔安潜爲副都統辛未以周岌王重榮爲都都統左右司馬諸葛爽及宣武節度使康實爲左右先鋒使時􅄎爲催遣綱運租賦防遏使以右神䇿觀軍容使西門思恭爲諸道行營都都監又以王處存李孝昌拓䟦思恭爲京城東北西面都統以楊復光爲南面行營都監使又以中書舍人鄭昌圖爲義成節度行軍司馬給事中鄭畯爲判官直弘文館王摶爲推官司勲員外郎裴贄爲掌書記昌圖從讜之從祖兄弟畯畋之弟摶璵之曽孫贄坦之子也又以陜虢觀察使王重盈爲東面都供軍使重盈重榮之兄也黄巢以朱温爲同州刺史令温自取之二月同州刺史米誠奔河中温遂據之己卯以太子少􅀓分司鄭畋爲司空兼門下侍郎同平章事召詣行在軍務一以咨之以王鐸兼判户部事朱温冦河中王重榮擊敗之以李昌言爲京城西面都統朱玫爲河南都統涇原節度使胡公素薨軍中請命於都統王鐸承制以大將張鈞爲留後李克用冦蔚州三月振武節度使契苾璋奏與天徳大同共討克用詔鄭從讜與相知應接陳敬瑄多遣人厯縣鎮詗事謂之尋事人所至多所求取有二人過資陽鎮獨無所求鎮將謝弘讓邀之不至自疑有罪夜亡入羣盜中明旦二人去􅀪讓實無罪也捕盜使楊遷誘􅀪讓出首而執以送使云討擊擒獲以求功敬瑄不之問杖􅀪讓脊二十釘於西城二七日煎油潑之又以膠麻掣其瘡僃極慘酷見者寃之又有卭州牙官阡能因公事違期避杖亡命爲盜楊遷復誘之能方出首聞􅀪讓之寃大罵楊遷􅀤憤爲盜驅掠良民不從者舉家殺之踰月衆至萬人立部伍署職級横行卭雅二州閒攻陷城邑所過塗地先是蜀中少盜賊自是紛紛競起州縣不能制敬瑄遣牙將楊行遷將三千人胡洪畧莫匡時各將二千人以討之以右神䇿將軍齊克儉爲左右神䇿軍内外八鎮兼博野奉天節度使賜鄜坊軍號保大夏四月甲午加陳敬瑄兼侍中赫連鐸李可舉與李克用戰不利初髙駢好神仙有方士吕用之坐妖黨亡命歸駢駢厚待之補以軍職用之鄱陽茶商之子也乆客廣陵熟其人情爐鼎之暇頗言公私利病駢益竒之稍加信任駢舊將梁纉陳珙馮綬董瑾俞公楚姚歸禮素爲駢所厚用之欲專權浸以計去之駢遂奪纉兵族珙家綬瑾公楚歸禮咸見踈用之又引其黨張守一諸葛殷共蠱惑駢守一本滄景村民以術干駢無所遇貧困甚用之謂曰但與吾同心勿憂不富貴遂薦於駢駢寵待埒於用之殷始自鄱陽來用之先言於駢曰玉皇以公職事繁重輟左右尊神一人佐公爲理公善遇之欲其乆留亦可縻以人閒重職明日殷謁見詭辯風生駢以爲神補鹽鐵劇職駢嚴絜甥姪輩未嘗得接坐殷病風疽搔捫不替手膿血滿爪駢獨與之同席促膝傳柸器而食左右以爲言駢曰神仙以此試人耳駢有畜犬聞其穢多來近之駢怪之殷笑曰殷嘗於玉皇前見之别來數百年猶相識駢與鄭畋有隙用之謂駢曰宰相有遣劒客來刺公者今夕至矣駢大懼問計安出用之曰張先生嘗學斯術可以禦之駢請於守一守一許諾乃使駢衣婦人之服濳於它室而守一代居駢寢榻中夜擲銅器於階令鏗然有聲又密以囊盛彘血灑於庭宇如格闘之狀及旦笑謂駢曰㡬落奴手駢泣謝曰先生於駢乃更生之惠也厚酬以金寳有蕭勝者賂用之求鹽城監駢有難色用之曰用之非爲勝也近得上仙書云有寳劒在鹽城井中須一靈官取之以勝上仙左右之人欲使取劒耳駢乃許之勝至監數月函一銅􅍰首以獻用之見稽首曰此北帝所佩得之則百里之内五兵不能犯駢乃飾以珠玉常置座隅用之自謂磻溪眞君謂守一乃赤松子殷乃葛將軍勝乃秦穆公之壻也用之又刻青石爲竒字云玉皇授白雲先生髙駢密令左右置道院香按駢得之驚喜用之曰玉皇以公焚修功著將補真官計鸞鶴不日當降此際用之等謫限亦滿必得陪幢節同歸上清耳是後駢於道院庭中刻木鶴時著羽服跨之日夕齋醮錬金燒丹費以巨萬計用之㣲時依止江陽后土廟舉動祈禱及得志白駢崇大其廟極江南工材之選每軍旅大事以少牢禱之用之又言神仙好樓居說駢作迎仙樓費十五萬緡又作延和閣髙八丈用之每對駢呵叱風雨仰揖空際云有神仙過雲表駢輙隨而拜之然常厚賂駢左右使伺駢動静共爲欺罔駢不之寤左右小有異議者輙爲用之陷死不旋踵但濳撫膺鳴指口不敢言駢倚用之如左右手公私大小之事皆決於用之退賢進不肖滛刑濫賞駢之政事於是大壞矣用之知上下怨憤恐有竊􅀤請置巡察使駢即以用之領之募險獪者百餘人縱横閭巷間謂之察子民間呵妻詈子靡不知之用之欲奪人貲財掠人婦女輙誣以叛逆搒掠取服殺其人而取之所破滅者數百家道路以目將吏士民雖家居皆重足屏氣用之又欲以兵威脅制諸將請選募諸軍驍勇之士二萬人號左右莫邪都駢即以張守一及用之爲左右莫邪軍使署置將使如帥府器械精利衣装華絜毎出入導從近千人用之侍妾百餘人自奉奢靡用度不足輒留三司綱輸其家用之猶慮人泄其姧謀乃言於駢曰神仙不難致但恨學道者不能絶俗累故不肯降臨耳駢乃悉去􅁎妾謝絶人事賔客將吏皆不得見有不得已見之者皆先令沐浴齋祓然後見拜起纔畢已復引出由是用之得專行威福無所忌憚境内不復知有駢矣王鐸將兩川興元之軍屯靈感寺涇原屯京西易定河中屯渭北邠寧鳯翔屯興平保大定難屯渭橋忠武屯武功官軍四集黄巢勢已蹙號令所行不出同華民避亂皆入深山築柵自保農事俱廢長安城中斗米直三十緡賊賣人於官軍以爲糧官軍或執山柵之民鬻之人直數百緡以肥瘠論價資治通鑑巻第二百五十四
