body:
  text: 臣司馬光奉勑編集魏紀四逢攝提格凡四年起重光大淵獻盡閼烈祖明皇帝中之上太和五年春二月吳主假太常潘濬節使與吕岱督諸軍五萬人討五溪蠻濬姨兄蔣琬為諸葛亮長史武陵太守衛旍奏濬遣密使與琬相聞欲有自託之計吳主曰承明不為此也即封旍表以示濬而召旍還免官衛温諸葛直軍行經嵗士卒疾疫死者什八九亶洲絶逺卒不可得至得夷洲數千人還温直坐無功誅漢丞相亮命李嚴以中都䕶署府事嚴更名平亮率諸軍入冦圍祁山以木牛運於是大司馬曹真有疾帝命司馬懿西屯長安督將軍張郃費曜戴陵郭淮等以禦之三月邵陵元侯曹真卒自十月不雨至于是月司馬懿使費曜戴陵留精兵四千守上邽餘衆悉出西敕祁山張郃欲分兵駐雍郿懿曰料前軍能獨當之者將軍言是也若不能當而分為前後此楚之三軍所以為黥布禽也遂進亮分兵留攻祁山自逆懿于上邽郭淮費曜等徼亮亮破之因大芟刈其麥與懿遇于上邽之東懿斂軍依險兵不得交亮引還懿等尋亮後至于鹵城張郃曰彼逺來逆我請戰不得謂我利在不戰欲以長計制之也且祁山知大軍已在近人情自固可止屯於此分為竒兵示出其後不宜進前而不敢偪坐失民望也今亮孤軍食少亦行去矣懿不從故尋亮既至又登山掘營不肯戰賈詡魏平數請戰因曰公畏蜀如虎柰天下笑何懿病之諸將咸請戰夏五月辛巳懿乃使張郃攻無當監何平於南圍自案中道向亮亮使魏延髙翔吳班逆戰魏兵大敗漢人獲甲首三千懿還保營六月亮以糧盡退軍司馬懿遣張郃追之郃進至木門與亮戰蜀人乗髙布伏弓弩亂發飛矢中郃右䣛而卒秋七月乙酉皇子殷生大赦黃初以來諸侯王灋禁嚴切吏察之急至於親姻皆不敢相通問東阿王植上䟽曰堯之為教先親後䟽自近及逺周文王刑于寡妻至于兄弟以御于家邦伏惟陛下資帝唐欽明之德體文王翼翼之仁恵洽椒房恩昭九族羣后百寮番休遞上執政不廢於公朝下情得展於私室親理之路通慶弔之情展誠可謂恕己治人推恵施恩者矣至於臣者人道絶緒禁錮明時臣竊自傷也不敢乃望交氣類脩人事叙人倫近且㛰媾不通兄弟乖絶吉凶之問塞慶弔之禮廢恩紀之違甚於路人隔閡之異殊於胡越今臣以一切之制永無朝覲之望至於注心皇極結情紫闥神明知之矣然天實為之謂之何哉退惟諸王常有戚戚具爾之心願陛下沛然垂詔使諸國慶問四節得展以敘骨肉之歡恩全怡怡之篤義妃妾之家膏沐之遺嵗得再通齊義於貴宗等恵於百司如此則古人之所歎風雅之所詠復存於聖世矣臣伏自惟省無錐刀之用及觀陛下之所抜授若以臣為異姓竊自料度不後於朝士矣若得辭逺游戴武弁解朱組佩青紱駙馬奉車趣得一號安宅京室執鞭珥筆出從華蓋入侍輦轂承荅聖問拾遺左右乃臣丹誠之至願不離於夢想者也逺慕鹿鳴君臣之宴中詠常棣匪他之誡下思伐木友生之義終懐蓼莪罔極之哀每四節之㑹塊然獨處左右惟僕􅀠所對惟妻子髙談無所與陳精義無所與展未甞不聞樂而拊心臨觴而歎息也臣伏以為犬馬之誠不能動人譬人之誠不能動天崩城隕霜臣初信之以臣心況徒虚語耳若葵藿之傾葉太陽雖不為回光然向之者誠也竊自比葵藿若降天地之施垂三光之明者實在陛下臣聞文子曰不為福始不為禍先今之否隔友于同憂而臣獨倡言者竊不願於聖世使有不䝉施之物欲陛下崇光被時雍之美宣緝熈章明之德也詔報曰蓋教化所由各有隆敝非皆善始而惡終也事使之然今令諸國兄弟情禮簡怠妃妾之家膏沐䟽略本無禁錮諸國通問之詔也矯枉過正下吏懼譴以至於此耳已敕有司如王所訴植復上䟽曰昔漢文發代疑朝有變宋昌曰内有朱虚東牟之親外有齊楚淮南琅邪此則磐石之宗願王勿疑臣伏惟陛下逺覧姬文二虢之援中慮周成召畢之輔下存宋昌磐石之固臣聞羊質虎皮見草則恱見豺則戰忘其皮之虎也今置將不良有似於此故語曰患為之者不知知之者不得為也昔管蔡放誅周召作弼叔魚䧟刑叔向賛國三監之釁臣自當之二南之輔求必不逺華宗貴族藩王之中必有應斯舉者夫能使天下傾耳注目者當權者是也故謀能移主威能懾下豪右執政不在親戚權之所在雖䟽必重埶之所去雖親必輕蓋取齊者田族非吕宗也分晉者趙魏非姬姓也惟陛下察之茍吉専其位凶離其患者異姓之臣也欲國之安祈家之貴存共其榮歿同其禍者公族之臣也今反公族䟽而異姓親臣竊惑焉今臣與陛下踐氷履炭登山浮澗寒温燥濕髙下共之豈得離陛下哉不勝憤懣拜表陳情若有不合乞且藏之書府不便滅棄臣死之後事或可思若有毫釐少挂聖意者乞出之朝堂使夫博古之士紏臣表之不合義者如是則臣願足矣帝但以優文荅報而已八月詔曰先帝著令不欲使諸王在京都者謂㓜主在位母后攝政防微以漸闗諸盛衰也朕惟不見諸王十有二載悠悠之懐能不興思其令諸王及宗室公侯各將適子一人朝明年正月後有少主母后在宫者自如先帝令漢丞相亮之攻祁山也李平留後主督運事㑹天霖雨平恐運糧不繼遣參軍狐忠督軍成藩喻指呼亮來還亮承以退軍平聞軍退乃更陽驚說軍糧饒足何以便歸又欲殺督運岑述以解己不辦之責又表漢主說軍偽退欲以誘賊與戰亮具出其前後手筆書䟽本末違錯平辭窮情竭首謝罪負於是亮表平前後過惡免官削爵土徙梓潼郡復以平子豐為中郎將參軍事出教敕之曰吾與君父子勠力以奬漢室表都䕶典漢中委君於東闗謂至心感動終始可保何圖中乖乎若都䕶思負一意君與公琰推心從事否可復通逝可復還也詳思斯戒明吾用心亮又與蔣琬董允書曰孝起前為吾說正方腹中有鱗甲鄉黨以為不可近吾以為鱗甲者但不當犯之耳不圖復有蘇張之事出於不意可使孝起知之孝起者衛尉南陽陳震也冬十月吳主使中郎將孫布詐降以誘揚州刺史王淩吳主伏兵於阜陵以俟之布遣人告淩云道逺不能自致乞兵見迎淩騰布書請兵馬迎之征東將軍滿寵以為必詐不與兵而為淩作報書曰知識邪正欲避禍就順去暴歸道甚相嘉尚今欲遣兵相迎然計兵少則不足相衛多則事必逺聞且先密計以成本志臨時節度其冝㑹寵被書入朝敕留府長史若淩欲往迎勿與兵也淩於後索兵不得乃單遣一督將步騎七百人往迎之布夜掩擊督將迸走死傷過半淩允之兄子也先是淩表寵年過耽酒不可居方任帝將召寵給事中郭謀曰寵為汝南太守豫州刺史二十餘年有勲方岳及鎮淮南吳人憚之若不如所表將為所闚可令還朝問以東方事以察之帝從之旣至體氣康彊帝慰勞遣還十一月戊戌晦日有食之十二月戊午博平敬侯華歆卒丁卯吳大赦改明年元曰嘉禾六年春正月吳主少子建昌侯慮卒太子登自武昌入省吳主因自陳久離定省子道有闕又陳陸遜忠勤無所顧憂乃留建業二月詔改封諸侯王皆以郡為國帝愛女淑卒帝痛之甚追謚平原懿公主立廟洛陽葬於南陵取甄后從孫黃與之合葬追封黃為列侯為之置後襲爵帝欲自臨送葬又欲幸許司空陳羣諫曰八嵗下殤禮所不備況未朞月而以成人禮送之加為制服舉朝素衣朝夕哭臨自古以來未有此比而乃復自往視陵親臨祖載願陛下抑割無益有損之事此萬國之至望也又聞車駕欲幸許昌二宫上下皆悉俱東舉朝大小莫不驚怪或言欲以避衰或言欲以便移殿舍或不知何故臣以為吉凶有命禍福由人移走求安則亦無益若必當移避繕治金墉城西宫及孟津别宫皆可權時分止何為舉宫暴露野次公私煩費不可計量且吉士賢人猶不妄徙其家以寧鄉邑使無恐懼之心況乃帝王萬國之主行止動静豈可輕脫哉少府楊阜曰文皇帝武宣皇后崩陛下皆不送葬所以重社稷僃不虞也何至孩抱之赤子而送葬也哉帝皆不聽三月癸酉行東巡吳主遣將軍周賀校尉裴潛乗海之遼東從公孫淵求馬初虞翻性踈直數有酒失又好抵忤人多見謗毁吳主嘗與張昭論及神仙翻指昭曰彼皆死人而語神仙世豈有仙人也吳主積怒非一遂徙翻交州及周賀等之遼東翻聞之以為五谿宜討遼東絶逺聽使來屬尚不足取今去人財以求馬旣非國利又恐無獲欲諫不敢作表以示吕岱岱不報為愛憎所白復徙蒼梧猛陵夏四月壬寅帝如許昌五月皇子殷卒秋七月以衛尉董昭為司徒九月帝行如摩陂治許昌宫起景福承光殿公孫淵隂懐貳心數與吳通帝使汝南太守田豫督青州諸軍自海道幽州刺史王雄自陸道討之散騎常侍蔣濟諫曰凡非相吞之國不侵叛之臣不宜輕伐伐之而不能制是驅使為賊也故曰虎狼當路不治狐狸先除大害小害自己今海表之地累世委質嵗選計孝不乏職貢議者先之正使一舉便克得其民不足益國得其財不足為冨儻不如意是為結怨失信也帝不聽豫等往皆無功詔令罷軍豫以呉使周賀等垂還歳晚風急必畏漂浪東道無岸當赴成山成山無藏船之處遂輙以兵屯據成山賀等還至成山遇風豫勒兵擊賀等斬之吳主聞之始思虞翻之言乃召翻於交州㑹翻已卒以其喪還十一月庚寅陳思王植卒十二月帝還許昌宫侍中劉曄為帝所親重帝將伐蜀朝臣内外皆曰不可曄入與帝議則曰可伐出與朝臣言則曰不可曄有膽智言之皆有形中領軍楊暨帝之親臣又重曄執不可伐之議最堅毎從内出輙過曄曄講不可之意後曁與帝論伐蜀事暨切諫帝曰卿書生焉知兵事暨謝曰臣言誠不足采侍中劉曄先帝謀臣常曰蜀不可伐帝曰曄與吾言蜀可伐暨曰曄可召質也詔召曄至帝問曄終不言後獨見􅁮責帝曰伐國大謀也臣得與聞大謀常恐眯夢漏泄以益臣罪焉敢向人言之夫兵詭道也軍事未發不厭其密陛下顯然露之臣恐敵國已聞之矣於是帝謝之曄見出責暨曰夫釣者中大魚則縱而隨之須可制而後牽則無不得也人主之威豈徒大魚而已子誠直臣然計不足采不可不精思也暨亦謝之或謂帝曰􅁮不盡忠善伺上意所趨而合之陛下試與曄言皆反意而問之若皆與所問反者是曄常與聖意合也毎問皆同者曄之情必無所復逃矣帝如言以驗之果得其情從此䟽焉曄遂發狂出爲大鴻臚以憂死傅子曰巧詐不如拙誠信矣以曄之明智權計若居之以德義行之以忠信古之上賢何以加諸獨任才智不敦誠慤内失君心外困於俗卒以自危豈不惜哉曄甞譛尚書令陳矯専權矯懼以告其子騫騫曰主上明聖大人大臣今若不合不過不作公耳後數日帝意果解尚書郎樂安廉昭以才能得幸昭好抉擿羣臣細過以求媚於上黃門侍郎杜恕上䟽曰伏見廉昭奏左丞曹璠以罰當闗不依詔坐判問又云諸當坐者别奏尚書令陳矯自奏不敢辭罰亦不敢陳理志意懇惻臣竊愍然為朝廷惜之古之帝王所以能輔世長民者莫不逺得百姓之懽心近盡羣臣之智力今陛下憂勞萬幾或親燈火而庶事不康刑禁日弛原其所由非獨臣不盡忠亦主不能使也百里奚愚於虞而智於秦豫讓茍容中行而著節智伯斯則古人之明驗矣若陛下以為今丗無良才朝廷乏賢佐豈可追望稷契之遐蹤坐待來世之雋乂乎今之所謂賢者盡有大官而享厚禄矣然而奉上之節未立向公之心不一者委任之責不専而俗多忌諱故也臣以為忠臣不必親親臣不必忠今有䟽者毁人而陛下疑其私報所憎譽人而陛下疑其私愛所親左右或因之以進憎愛之說遂使䟽者不敢毁譽以至政事損益亦皆有嫌陛下當思所以闡廣朝臣之心篤厲有道之節使之自同古人垂名竹帛反使如廉昭者擾亂其間臣懼大臣遂將容身保位坐觀得失為來世戒也昔周公戒魯侯曰無使大臣怨乎不以言不賢則不可為大臣為大臣則不可不用也書數舜之功稱去四凶不言有罪無問大小則去也今者朝臣不自以為不能以陛下為不任也不自以為不知以陛下為不問也陛下何不遵周公之所以用大舜之所以去使侍中尚書坐則侍帷幄行則從華輦親對詔問各陳所有則羣臣之行皆可得而知忠能者進闇劣者退誰敢依違而不自盡以陛下之聖明親與羣臣論議政事使羣臣人得自盡賢愚能否在陛下之所用以此治事何事不辦以此建功何功不成毎有軍事詔書常曰誰當憂此者邪吾當自憂耳近詔又曰憂公忘私者必不然但先公後私即自辦也伏讀明詔乃知聖思究盡下情然亦怪陛下不治其本而憂其末也人之能否實有本性雖臣亦以爲朝臣不盡稱職也明主之用人也使能者不敢遺其力而不能者不得處非其任選舉非其人未必爲有罪也舉朝共容非其人乃爲怪耳陛下知其不盡力也而代之憂其職知其不能也而教之治其事豈徒主勞而臣逸哉雖聖賢並世終不能以此爲治也陛下又患臺閣禁令之不密人事請屬之不絶作迎客出入之制以惡吏守寺門斯實未得爲禁之本也昔漢安帝時少府竇嘉辟廷尉郭躬無罪之兄子猶見舉奏章劾紛紛近司􅀠校尉孔羨辟大將軍狂悖之弟而有司嘿爾望風希指甚於受屬選舉不以實者也嘉有親戚之寵躬非社稷重臣猶尚如此以今況古陛下自不督必行之罰以絶阿黨之原耳出入之制與惡吏守門非治世之具也使臣之言少䝉察納何患於姦不削滅而養若廉昭等乎夫糾擿姦宄忠事也然而世憎小人行之者以其不顧道理而茍求容進也若陛下不復考其終始必以違衆迕世為奉公宻行白人為盡節焉有通人大才而更不能為此邪誠顧道理而弗為耳使天下皆背道而趨利則人主之所最病者也陛下將何樂焉恕畿之子也帝嘗卒至尚書門陳矯跪問帝曰陛下欲何之帝曰欲案行文書耳矯曰此自臣職分非陛下所宜臨也若臣不稱其職則請就黜退陛下宜還帝慙回車而反帝嘗問矯司馬公忠貞可謂社稷之臣乎矯曰朝廷之望也社稷則未知也吳陸遜引兵向廬江論者以為宜速救之滿寵曰廬江雖小將勁兵精守則經時又賊舍船二百里來後尾空絶不來尚欲誘致今宜聽其遂進但恐走不可及耳乃整軍趨楊宜口吳人聞之夜遁是時吳人嵗有來計滿寵上䟽曰合肥城南臨江湖北逺夀春賊攻圍之得據水為埶官兵救之當先破賊大輩然後圍乃得解賊往甚易而兵往救之甚難宜移城内之兵其西三十里有竒險可依更立城以固守此為引賊平地而掎其歸路於計為便䕶軍將軍蔣濟議以為既示天下以弱且望賊煙火而壊城此為未攻而自拔一至於此劫略無限必淮北為守帝未許寵重表曰孫子言兵者詭道也故能而示之不能驕之以利示之以懾此為形實不必相應也又曰善動敵者形之今賊未至而移城却内所謂形而誘之也引賊逺水擇利而動舉得於外則福生於内矣尚書趙咨以寵䇿為長詔遂報聽青龍元年春正月甲申青龍見摩陂井中二月帝如摩陂觀龍改元公孫淵遣校尉宿舒郎中令孫綜奉表稱臣於吳吳主大恱為之大赦三月吳主遣太常張彌執金吾許晏將軍賀達將兵萬人金寳珍貨九錫僃物乗海授淵封淵為燕王舉朝大臣自顧雍以下皆諫以為淵未可信而寵待太厚但可遣吏兵䕶送舒綜而已吳主不聽張昭曰淵背魏懼討逺來求援非本志也若淵改圖欲自明於魏兩使不反不亦取笑於天下乎吳主反覆難昭昭意彌切吳主不能堪案刀而怒曰吳國士人入宫則拜孤出宫則拜君孤之敬君亦為至矣而數於衆中折孤孤常恐失計昭孰視吳主曰臣雖知言不用毎竭愚忠者誠以太后臨崩呼老臣於牀下遺詔顧命之言故在耳因涕泣橫流吳主擲刀於地與之對泣然卒遣彌晏往昭忿言之不用稱疾不朝吳王恨之土塞其門昭又於内以土封之夏五月戊寅北海王蕤卒閏月庚寅朔日有食之六月洛陽宫鞠室災鮮卑軻比能誘保塞鮮卑歩度根與深結和親自勒萬騎迎其累重於陘北并州刺史畢􅁤表輙出軍以外威比能内鎮步度根帝省表曰步度根已為比能所誘有自疑心今􅁤出軍慎勿越塞過句注也比詔書到􅁤已進軍屯隂館遣將軍蘇尚董弼追鮮卑軻比能遣子將千餘騎迎步度根部落與尚弼相遇戰於樓煩二將沒步度根與泄歸􅅺部落皆叛出塞與軻比能合寇邊帝遣驍騎將軍秦朗將中軍討之軻比能乃走幕北泄歸􅅺將其部衆來降步度根尋為軻比能所殺公孫淵知吳逺難恃乃斬張彌許晏等首􅀓送京師悉沒其兵資珍寳冬十二月詔拜淵大司馬封樂浪公呉主聞之大怒曰朕年六十丗事難易靡所不嘗近為䑕子所前却令人氣踊如山不自截䑕子頭以擲于海無顔復臨萬國就令顚沛不以為恨陸遜上䟽曰陛下以神武之姿誕膺期運破操烏林敗僃西陵禽羽荆州斯三虜者當世雄傑皆摧其鋒聖化所綏萬里草偃方蕩平華夏揔一大猷今不忍小忿而發雷霆之怒違垂堂之戒輕萬乗之重此臣之所惑也臣聞之行萬里者不中道而輟足圖四海者不懐細以害大彊寇在境荒服未庭陛下乗桴逺征必致闚􅎿慼至而憂悔之無及若使大事時捷則淵不討自服今乃逺惜遼東衆之與馬奈何獨欲捐江東萬安之本業而不惜乎尚書僕射薛綜上䟽曰昔漢元帝欲御樓船薛廣德請刎頸以血染車何則水火之險至危非帝王所宜渉也今遼東戎貊小國無城隍之固僃禦之術器械銖鈍犬羊無政往必禽克誠如明詔然其方土寒埆榖稼不殖民習鞍馬轉徙無常卒聞大軍之至自度不敵鳥驚獸駭長驅犇竄一人匹馬不可得見雖獲空地守之無益此不可一也加又洪流滉瀁有成山之難海行無常風波難免倐忽之間人船異埶雖有堯舜之德智無所施賁育之勇力不得設此不可二也加以鬱霧㝠其上鹹水蒸其下善生流腫轉相洿染凡行海者稀無斯患此不可三也天生神聖當乗時平亂康此民物今逆虜將滅海内垂定乃違必然之圖尋至危之阻忽九州之固肆一朝之忿旣非社稷之重計又開闢以來所未嘗有斯誠羣僚所以傾身側息食不甘味寑不安席者也選曹尚書陸瑁上䟽曰北寇與國壤地連接茍有間隙應機而至夫所以爲越海求馬曲意於淵者爲赴目前之急除腹心之疾也而更棄本追末捐近治逺忿以改規激以動衆斯乃猾虜所願聞非大吳之至計也又兵家之術以功役相疲勞逸相待得失之間所覺輒多且沓渚去淵道里尚逺今到其岸兵勢三分使彊者進取次當守船又次運糧行人雖多難得悉用加以單步負糧經逺深入賊地多馬邀截無常若淵狙詐與北未絶動衆之日脣齒相濟若實孑然無所憑頼其畏怖逺迸或難卒滅使天誅稽於朔野山虜承間而起恐非萬安之長慮也吳主未許瑁重上䟽曰夫兵革者固前代所以誅暴亂威四夷也然其役皆在姦雄已除天下無事從容廟堂之上以餘議議之耳至於中夏鼎沸九域盤玄之時率須深根固本愛力惜費未有正於此時舍近治逺以疲軍旅者也昔尉他叛逆僣號稱帝于時天下乂安百姓康阜然漢文猶以逺征不易告喻而已今凶桀未殄疆埸猶警未冝以淵為先願陛下抑威任計暫寧六師潜神嘿規以為後圖天下幸甚吳主乃止吳主數遣人慰謝張昭昭固不起吳主因出過其門呼昭昭辭疾篤吳主燒其門欲以恐之昭亦不出吳主使人滅火住門良乆昭諸子共扶昭起吳主載以還宫深自克責昭不得已然後朝㑹初張彌許晏等至襄平公孫淵欲圖之乃先分散其吏兵中使秦旦張羣杜德黃彊等及吏兵六十人置􅀇莬􅀇莬在遼東北二百里太守王賛領户二百旦等皆舍於民家仰其飲食積四十許日旦與羣等議曰吾人逺辱國命自棄於此與死無異今觀此郡形勢甚弱若一旦同心焚燒城郭殺其長史為國報恥然後伏死足以無恨孰與偷生茍活長為囚虜乎羣等然之於是隂相結約當用八月十九日夜發其日中時為郡中張松所告賛便㑹士衆閉城門旦羣德彊等皆踰城得走時羣病疽創著䣛不及輩旅德常扶接與俱﨑嶇山谷行六七百里創益困不復能前卧草中相守悲泣羣曰吾不幸創甚死亡無日卿諸人宜速進道冀有所達空相守俱死於窮谷之中何益也德曰萬里流離死生共之不忍相委於是推旦彊使前德獨留守羣採菜果食之旦彊别數日得達句麗因宣吳主詔於句麗王位宫及其主簿紿言有賜為遼東所劫奪位宫等大喜即受詔命使人隨旦還迎羣德遣皁衣二十五人送旦等還吳奉表稱臣貢貂皮千枚鶡雞皮十具旦等見吳主悲喜不能自勝吳主壯之皆拜校尉是嵗吳主出兵欲圍新城以其逺水積二十餘日不敢下船滿寵謂諸將曰孫權得吾移城必於其衆中有自大之言今大舉來欲要一切之功雖不敢至必當上岸耀兵以示有餘乃潜遣步騎六千伏肥水隱處以待之吳主果上岸耀兵寵伏軍卒起擊之斬首數百或有赴水死者吳主又使全琮攻六安亦不克蜀庲降都督張翼用灋嚴峻南夷豪帥劉胄叛丞相亮以參軍巴西馬忠代翼召翼令還其人謂翼冝速歸即罪翼曰不然吾以蠻夷蠢動不稱職故還耳然代人未至吾方臨戰場當運糧積榖為滅賊之資豈可以黜退之故而廢公家之務乎於是統攝不懈代到乃發馬忠因其成基破胄斬之諸葛亮勸農講武作木牛流馬運米集斜谷口治斜谷邸閣息民休士三年而後用之二年春二月亮悉大衆十萬由斜谷入冦遣使約吳同時大舉三月庚寅山陽公卒帝素服發喪己酉大赦夏四月大疫崇華殿灾諸葛亮至郿軍於渭水之南司馬懿引軍度渭背水為壘以拒之謂諸將曰亮若出武功依山而東誠為可憂若西上五丈原諸將無事矣亮果屯五丈原雍州刺史郭淮言於懿曰亮必爭北原冝先據之議者多謂不然淮曰若亮跨渭登原連兵北山隔絶隴道揺盪民夷此非國之利也懿乃使淮屯北原塹壘未成漢兵大至淮逆擊却之亮以前者數出皆以運糧不繼使己志不伸乃分兵屯田為久駐之基耕者雜於渭濵居民之間而百姓安堵軍無私焉五月吳主入居巢湖口向合肥新城衆號十萬又遣陸遜諸葛瑾將萬餘人入江夏沔口向襄陽將軍孫韶張承入淮向廣陵淮隂六月滿寵欲率諸軍救新城殄夷將軍田豫曰賊悉衆大舉非圖小利欲質新城以致大軍耳冝聽使攻城挫其銳氣不當與爭鋒也城不可拔衆必罷怠罷怠然後擊之可大克也若賊見計必不攻城勢將自走若便進兵適入其計矣時東方吏士皆分休寵表請中軍兵并召所休將士須集擊之散騎常侍廣平劉劭議以為賊衆新至心專氣銳寵以少人自戰其地若便進擊必不能制寵請待兵未有所失也以為可先遣步兵五千精騎三千先軍前發揚聲進道震曜形埶騎到合肥䟽其行隊多其旌鼔曜兵城下引出賊後擬其歸路要其糧道賊聞大軍來騎斷其後必震怖遁走不戰自破矣帝從之寵欲拔新城守致賊夀春帝不聽曰昔漢光武遣兵據略陽終以破隗囂先帝東置合肥南守襄陽西固祁山賊來輒破於三城之下者地有所必争也縱權攻新城必不能拔敕諸將堅守吾將自往征之比至恐權走也乃使征蜀䕶軍秦朗督步騎二萬助司馬懿禦諸葛亮敕懿但堅壁拒守以挫其鋒彼進不得志退無與戰乆停則糧盡虜略無所獲則必走走而追之全勝之道也秋七月壬寅帝御龍舟東征滿寵募壯士焚吳攻具射殺吳主之弟子泰又吳吏士多疾病帝未至數百里疑兵先至吳主始謂帝不能出聞大軍至遂遁孫韶亦退陸遜遣親人韓扁奉表詣吳主邏者得之諸葛瑾聞之甚懼書與遜云大駕已還賊得韓扁具知吾濶狹且水乾冝當急去遜未荅方催人種葑豆與諸將弈棊射戯如常瑾曰伯言多智略其必當有以乃自來見遜遜曰賊知大駕已還無所復憂得専力於吾又已守要害之處兵將意動且當自定以安之施設變術然後出耳今便示退賊當謂吾怖仍來相蹙必敗之勢也乃密與瑾立計令瑾督舟船遜悉上兵馬以向襄陽城魏人素憚遜名遽還赴城瑾便引船出遜徐整部伍張拓聲埶步趨船魏人不敢逼行到白圍託言住獵潜遣將軍周峻張梁等擊江夏新市安陸石陽斬獲千餘人而還羣臣以為司馬懿方與諸葛亮相守未解車駕可西幸長安帝曰權走亮膽破大軍足以制之吾無憂矣遂進軍至夀春録諸將功封賞各有差八月壬申葬漢孝獻皇帝于禪陵辛巳帝還許昌司馬懿與諸葛亮相守百餘日亮數挑戰懿不出亮乃遺懿巾幗婦人之服懿怒上表請戰帝使衛尉辛毗杖節為軍師以制之護軍姜維謂亮曰辛佐治杖節而到賊不復出矣亮曰彼本無戰情所以固請戰者以示武於其衆耳將在軍君命有所不受茍能制吾豈千里而請戰邪亮遣使者至懿軍懿問其寑食及事之煩簡不問戎事使者對曰諸葛公夙興夜寐罰二十已上皆親覧焉所噉食不至數升懿告人曰諸葛孔明食少事煩其能乆乎亮病篤漢主使尚書僕射李福省侍因諮以國家大計福至與亮語已别去數日復還亮曰孤知君還意近日言語雖彌日有所不盡更來亦决耳公所問者公琰其冝也福謝前實失不諮請如公百年後誰可任大事者故輙還耳乞復請蔣琬之後誰可任者亮曰文偉可以繼之又問其次亮不荅是月亮卒于軍中長史楊儀整軍而出百姓犇告司馬懿懿追之姜維令儀反旗鳴鼓若將向懿者懿斂軍退不敢偪於是儀結陳而去入谷然後發喪百姓為之諺曰死諸葛走生仲達懿聞之笑曰吾能料生不能料死故也懿案行亮之營壘處所歎曰天下竒才也追至赤岸不及而還初漢前軍師魏延勇猛過人善飬士卒毎隨亮出輙欲請兵萬人與亮異道㑹于潼闗如韓信故事亮制而不許延常謂亮為怯歎恨己才用之不盡楊儀為人幹敏亮毎出軍儀常規畫分部籌度糧榖不稽思慮斯須便了軍戎節度取辦於儀延性矜髙當時皆避下之唯儀不假借延延以為至忿有如水火亮深惜二人之才不忍有所偏廢也費禕使吳吳主醉問禕曰楊儀魏延牧豎小人也雖嘗有鳴吠之益於時務然既己任之􅀔不得輕若一朝無諸葛亮必為禍亂矣諸君憒憒不知防慮於此豈所謂貽厥孫謀乎禕對曰儀延之不協起於私忿耳而無黥韓難御之心也今方埽除彊賊混一函夏功以才成業由才廣若捨此不任防其後患是猶備有風波而逆廢舟檝非長計也亮病困與儀及司馬費禕姜維等作身歿之後退軍節度令延斷後姜維次之若延或不從命軍便自發亮卒儀祕不發喪令禕往揣延意指延曰丞相雖亡吾自見在府親官屬便可將喪還葬吾自當率諸軍擊賊云何以一人死廢天下之事邪且魏延何人當為楊儀所部勒作斷後將乎自與禕共作行留部分令禕手書與己連名告下諸將禕紿延曰當為君還解楊長史長史文吏稀更軍事必不違命也禕出門犇馬而去延尋悔之已不及矣延遣人覘儀等欲案亮成規諸營相次引軍還延大怒攙儀未發率所領徑先南歸所過燒絶閣道延儀各相表叛逆一日之中羽檄交至漢主以問侍中董允留府長史蔣琬琬允咸保儀而疑延儀等令槎山通道晝夜兼行亦繼延後延先至據南谷口遣兵逆擊儀等儀等令將軍何平於前禦延平叱先登曰公亡身尚未寒汝輩何敢乃爾延士衆知曲在延莫為用命皆散延獨與其子數人逃亡犇漢中儀遣將馬倵追斬之遂夷延三族蔣琬率宿衛諸營赴難行北行數十里延死問至乃還始延欲殺儀等冀時論以己代諸葛輔政故不北降魏而南還擊儀實無反意也諸軍還成都大赦謚諸葛亮曰忠武侯初亮表於漢主曰成都有桑八百株薄田十五頃子弟衣食自餘饒臣不别治生以長尺寸若臣死之日不使内有餘帛外有贏財以負陛下卒如其所言丞相長史張裔常稱亮曰公賞不遺逺罰不阿近爵不可以無功取刑不可以貴埶免此賢愚之所以僉忘其身者也陳夀評曰諸葛亮之為相國也撫百姓示儀􅁤約官職從權制開誠心布公道盡忠益時者雖讎必賞犯灋怠慢者雖親必罰服罪輸情者雖重必釋游辭巧飾者雖輕必戮善無微而不賞惡無纎而不貶庶事精練物理其本循名責實虚偽不齒終於邦域之内咸畏而愛之刑政雖峻而無怨者以其用心平而勸戒明也可謂識治之良才管蕭之亞匹矣初長水校尉廖立自謂才名冝為諸葛亮之副常以職位游散怏怏怨謗無己亮廢立為民徙之汶山及亮卒立垂泣曰吾終為左祍矣李平聞之亦發病死平常冀亮復收已得自補復䇿後人不能故也習鑿齒論曰昔管仲奪伯氏駢邑三百沒齒而無怨言聖人以為難諸葛亮之使廖立垂泣李嚴致死豈徒無怨言而已哉夫水至平而邪者取灋鑑至明而醜者亡怒水鑑之所以能窮物而無怨者以其無私也水鑑無私猶以免謗況大人君子懐樂生之心流矜恕之德灋行於不可不用刑加乎自犯之罪爵之而非私誅之而不怒天下有不服者乎蜀人所在求為諸葛亮立廟漢主不聽百姓遂因時節私祭之於道陌上步兵校尉習隆等上言請近其墓立一廟於􅃆陽斷其私祀漢主從之漢主以左將軍吳懿為車騎將軍假節督漢中以丞相長史蔣琬為尚書令揔統國事尋加琬行都䕶假節領益州刺史時新喪元帥逺近危悚琬出類抜萃處羣僚之右既無戚容又無喜色神守舉止有如平日由是衆望漸服吳人聞諸葛亮卒恐魏承衰取蜀増巴丘守兵萬人一欲以為救援二欲以事分割漢人聞之亦増永安之守以防非常漢主使右中郎將宗預使吳吳主問曰東之與西譬猶一家而聞西更増白帝之守何也對曰臣以為東益巴丘之戍西増白帝之守皆事埶宜然俱不足以相問也吳主大笑嘉其抗盡禮之亞於鄧芝吳諸葛恪以丹陽山險民多果勁雖前發兵徒得外縣平民而已其餘深逺莫能禽盡屢自求為官出之三年可得甲士四萬衆議咸以丹陽地埶險阻與吳郡㑹稽新都番陽四郡鄰接周旋數千里山谷萬重其幽䆳民人未嘗入城邑對長吏皆仗兵野逸白首於林莽逋亡宿惡咸共逃竄山出銅鐵自鑄甲兵俗好武習戰髙尚氣力其升山赴險抵突叢棘若魚之走淵猨狖之騰木也時觀間隙出為寇盜每致兵征伐尋其窟藏其戰則蠭至敗則鳥竄自前世以來不能羈也皆以為難恪父瑾聞之亦以事終不逮歎曰恪不大興吾家將赤吾族也恪盛陳其必捷吳主乃拜恪撫越將軍領丹陽太守使行其䇿冬十一月洛陽地震吳潘濬討武陵蠻數年斬獲數萬自是羣蠻衰弱一方寧靜十一月濬還武昌資治通鑑卷第七十二
