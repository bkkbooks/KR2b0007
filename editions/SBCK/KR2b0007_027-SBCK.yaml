body:
  text: 秋匈奴屠􅂄單于使先賢撣兄右奥鞬王與烏藉都尉各二萬􅀐屯東方以僃呼韓邪單于是時西方呼揭王來與唯犂當户謀共讒右賢王言欲自立為單于屠􅂄單于殺右賢王父子後知其􅁈復殺唯犂當户於是呼揭三恐遂畔去自立為呼揭單于右奧鞬王聞之即自立為車犂單于烏藉都尉亦自立為烏藉單于凡五單于屠􅂄單于自將兵東擊車犂單于使都隆竒擊烏藉烏藉車犂皆敗西北走與呼揭單于兵合為四萬人烏藉呼揭皆去單于號共并力尊輔車犂單于屠􅂄單于聞之使左大將都尉將四萬􅀐分屯東方以僃呼韓邪單于自將四萬􅀐西擊車犂單于車犂單于敗西北走屠􅂄單于即引兵西南留闟敦地漢議者多曰匈奴為害日乆可因其壊亂舉兵滅之詔問御史大夫蕭望之對曰春秋晉士匄帥師侵齊聞齊侯卒引師而還君子大其不伐喪以為恩足以服孝子誼足以動諸矦前單于慕化鄕善稱弟遣使請求和親海内欣然夷狄莫不聞未終奉約不幸為賊臣所殺今而伐之是乗亂而幸災也彼必犇走逺遁不以義動兵恐勞而無功宜遣使者弔問輔其微弱救其災患四夷聞之咸貴中國之仁義如遂蒙恩得復其位必稱臣服從此德之盛也上從其議冬十有二月乙酉朔日有食之韓延壽代蕭望之為左馮翊望之聞延壽在東郡時放散官錢千餘萬使御史案之延壽聞知即部吏案校望之在馮翊時廪犧官錢放散百餘萬望之自奏職在緫領天下聞事不敢不問而為延壽所拘持上由是不直延壽各令窮竟所考望之卒無事實而望之遣御史案東郡者得其試􅀐士日車服侍衞奢僣逾制又取官銅物􅇋月食鑄刀效尚方事及取官錢帛私假傜使吏及治飾車甲三百萬以上延壽竟坐狡猾不道棄市吏民數千人送至渭城老小扶持車轂爭奏酒炙延壽不忍距逆人人爲飲計飲酒石餘使􅁺史分謝送者逺苦吏民延壽死無所恨百姓莫不流涕二年春正月上行幸甘泉郊泰畤車􅀐將軍韓増薨五月將軍許延壽爲大司馬車􅀐大將軍丞相丙吉年老上重之蕭望之意常輕吉上由是不恱丞相司直奏望之遇丞相禮節倨慢又使吏買賣私所附益凡十萬三千請逮捕繫治秋八月壬午詔左遷望之爲太子太傅以太子太傅黄霸爲御史大夫匈奴呼韓邪單于遣其弟右谷蠡王等西襲屠􅂄單于屯兵殺略萬餘人屠􅂄單于聞之即自將六萬􅀐擊呼韓邪單于屠耆單于兵敗自殺都隆竒乃與屠􅂄少子右谷蠡王姑瞀樓頭亡歸漢車犂單于東降呼韓邪單于冬十一月呼韓邪單于左大將烏厲屈與父呼遫累烏厲温敦皆見匈奴亂率其衆數萬人降漢封烏厲屈為新城矦烏厲温敦為義陽矦是時李陵子復立烏籍都尉為單于呼韓邪單于捕斬之遂復都單于庭然衆裁數萬人屠􅂄單于從弟休旬王自立為閏振單于在西邊呼韓邪單于兄左賢王呼屠吾斯亦自立為郅支骨都矦單于在東邊光禄勲平通矦楊惲廉潔無私然伐其行能又性刻害好發人隂伏由是多怨於朝廷與太僕戴長樂相失人有上書告長樂罪長樂疑惲敎人告之亦上書告惲罪曰惲上書訟韓延壽郎中丘常謂惲曰聞君矦訟韓馮翊當得活乎惲曰事何容易脛脛者未必全也我不能自保眞人所謂䑕不容穴衘窶數者也又語長樂曰正月以來天隂不雨此春秋所記夏矦君所言事下廷尉廷尉定國奏惲怨望為訞惡言大逆不道上不忍加誅有詔皆免惲長樂為庶人三年春正月癸卯博陽定矦丙吉薨班固賛曰古之制名必由象類逺取諸物近取諸身故經謂君為元首臣為股肱明其一體相待而成也是故君臣相配古今常道自然之埶也近觀漢相髙祖開基蕭曹為冠孝宣中興丙魏有聲是時黜陟有序衆職修理公卿多稱其位海内興於禮讓覽其行事豈虚虖哉二月壬辰黃霸為丞相霸材長於治民及為丞相功名損於治郡時京兆尹張敞舎鶡雀飛集丞相府霸以為神雀議欲以聞敞奏霸曰竊見丞相請與中二千石博士雜問郡國上計長史守丞為民興利除害成大化條其對有耕者讓畔男女異路道不拾遺及舉孝子貞婦者為一輩先上殿舉而不知其人數者次之不為條教者在後叩頭謝丞相雖口不言而心欲其為之也長史守丞對時臣敞舎有鶡雀飛止丞相府屋上丞相以下見者數百人邊吏多知鶡雀者問之皆陽不知丞相圖議上奏曰臣問上計長史守丞以興化條皇天報下神雀後知從臣敞舎來乃止郡國吏竊笑丞相仁厚有知略微信竒怪也臣敞非敢毁丞相也誠恐羣臣莫白而長史守丞畏丞相指歸舎法令各為私敎務相增加澆淳散樸並行偽貌有名亡實傾揺解怠甚者為妖假令京師先行讓畔異路道不拾遺其實亡益廉貪貞淫之行而以偽先天下固未可也即諸矦先行之偽聲軼於京師非細事也漢家承敝通變造起律令所以勸善禁姦條貫詳僃不可復加宜令貴臣明飭長史守丞歸告二千石舉三老孝弟力田孝廉廉吏務得其人郡事皆以灋令檢式母得擅為條敎敢挾詐偽以奸名譽者必先受戮以正明好惡天子嘉納敞言召上計吏使侍中臨飭如敞指意霸甚慙又樂陵矦史髙以外屬舊恩侍中貴重霸薦髙可太尉天子使尚書召問霸太尉官罷乆矣夫宣明敎化通逹幽隱使獄無􅁈刑邑無盗賊君之職也將相之官朕之任焉侍中樂陵矦高帷幄近臣朕之所自親君何越職而舉之尚書令受丞相對霸免冠謝罪數日乃決自是後不敢復有所請然自漢興言治民吏以霸為首三月上行幸河東祠后土減天下口錢赦殊死以下六月辛酉以西河太守杜延年為御史大夫置西河北地屬國以處匈奴降者廣陵厲王胥使巫李女須祝詛上求為天子事覺藥殺巫及宫人二十餘人以絕口公卿請誅胥四年春胥自殺匈奴單于稱臣遣弟谷蠡王入侍以邊塞亡宼減戍卒什二大司農中丞耿壽昌奏言歳數豐穰糓賤農人少利故事歳漕􅀜東糓四百萬斛以給京師用卒六萬人宜糴三輔弘農河東上黨太原郡糓足供京師可以省􅀜東漕卒過半上從其計壽昌又白令邊郡皆築倉以糓賤增其賈而糴以利農糓貴時减賈而糶名曰常平倉民便之上廼下詔賜壽昌爵􅀜内矦夏四月辛丑朔日有食之楊惲旣失爵位家居治産業以財自娱其友人安定太守西河孫㑹宗與惲書諫戒之爲言大臣廢退當闔門惶懼爲可憐之意不當治産業通賔客有稱譽惲宰相子有材能少顯朝廷一朝以晻昧語言見廢内懐不服報㑹宗書曰竊自思念過已大矣行已虧矣常為農夫以没丗矣是故身率妻子戮力耕桑不意當復用此為譏議也夫人情所不能止者聖人弗禁故君父至尊親送其終也有時而旣臣之得罪已三年矣田家作苦歳時伏臘烹羊炰羔斗酒自勞酒後耳􅀬仰天拊缶而呼烏烏其詩曰田彼南山蕪穢不治種一頃豆落而為萁人生行樂耳須富貴何時誠淫荒無度不知其不可也又惲兄子安平矦譚謂惲曰矦罪薄又有功且復用惲曰有功何益縣官不足為盡力譚曰縣官實然蓋司􅀠韓馮翊皆盡力吏也俱坐事誅㑹有日食之變騶馬猥佐成上書告惲驕奢不悔過日食之咎此人所致章下廷尉按驗得所予㑹宗書帝見而惡之廷尉當惲大逆無道要斬妻子徙酒泉郡譚坐免為庶人諸在位與惲厚善者未央衞尉韋􅀇成及孫㑹宗等皆免官臣光曰以孝宣之明魏相丙吉為丞相于定國為廷尉而趙蓋韓楊之死皆不厭衆心惜哉其為善政之累大矣周官司寇之灋有議賢議能若廣漢延壽之治民可不謂能乎寛饒惲之剛直可不謂賢乎然則雖有死罪猶將宥之況罪不足以死乎楊子以韓馮翊之愬蕭為臣之自失夫所以使延壽犯上者望之激之也上不之察而延壽獨蒙其辜不亦甚哉匈奴閏振單于率其衆東擊郅支單于郅支與戰殺之并其兵遂進攻呼韓邪呼韓邪兵敗走郅支都單于庭甘露元年春正月行幸甘泉郊㤗畤楊惲之誅也公卿奏京兆尹張敞惲之黨友不宜處位上惜敞材獨寑其奏不下敞使􅁺絮舜有所案驗舜私歸其家曰五日京兆耳安能復案事敞聞舜語即部吏收舜繫獄晝夜驗治竟致其死事舜當出死敞使主簿持敎告舜曰五日京兆竟何如冬月已盡延命乎乃棄舜市㑹立春行􅁈獄使者出舜家載尸并編敞敎自言使者使者奏敞賊殺不辜上欲令敞得自便即先下敞前坐楊惲奏免為庶人敞詣闕上印綬便從闕下亡命數月京師吏民解弛枹鼓數起而冀州部中有大賊天子思敞功効使使者即家在所召敞敞身被重劾及使者至妻子家室皆泣惶懼而敞獨笑曰吾身亡命為民郡吏當就捕今使者來此天子欲用我也裝隨使者詣公車上書曰臣前幸得僃位列卿待罪京兆坐殺􅁺絮舜舜本臣敞素所厚吏數蒙恩貸以臣有章劾當免受記考事便歸卧家謂臣五日京兆背恩忘義傷薄俗化臣竊以舜無狀枉灋以誅之臣敞賊殺無辜鞠獄故不直雖伏明灋死無所恨天子引見敞拜為冀州刺史敞到部盗賊屏迹皇大子柔仁好儒見上所用多文灋吏以刑繩下甞侍燕從容言陛下持刑太深宜用儒生帝作色曰漢家自有制度本以霸王道雜之柰何純任德敎用周政乎且俗儒不逹時宜好是古非今使人眩於名實不知所守何足委任乃歎曰亂我家者太子也臣光曰王霸無異道昔三代之隆禮樂征伐自天子出則謂之王天子微弱不能治諸矦諸矦有能率其與國同討不庭以尊王室者則謂之霸其所以行之也皆本仁祖義任賢使能賞善罰惡禁暴誅亂顧名位有尊卑德澤有深淺功業有鉅細政令有廣狹耳非若白黑甘苦之相反也漢之所以不能復三代之治者由人主之不為非先王之道不可復行於後丗也夫儒有君子有小人彼俗儒者誠不足與爲治也獨不可求眞儒而用之乎稷契皐陶伯益伊尹周公孔子皆大儒也使漢得而用之功烈豈若是而止邪孝宣謂太子懦而不立闇於治體必亂我家則可矣乃曰王道不可行儒者不可用豈不過甚矣哉殆非所以訓示子孫垂灋將來者也淮陽憲王好灋律聦逹有材王母張倢伃尤幸上由是䟽太子而愛淮陽憲王數嗟歎憲王曰真我子也常有意欲立憲王然用太子起於微細上少依􅀝許氏及即位而許后以殺死故弗忍也乆之上拜韋玄成爲淮陽中尉以玄成甞讓爵於兄欲以感諭憲王由是太子遂安匈奴呼韓邪單于之敗也左伊秩訾王爲呼韓邪計勸令稱臣入朝事漢從漢求助如此匈奴乃定呼韓邪問諸大臣皆曰不可匈奴之俗本上氣力而下服役以馬上戰􅃲為國故有威名於百蠻戰死壯士所有也今兄弟爭國不在兄則在弟雖死猶有威名子孫常長諸國漢雖彊猶不能兼并匈奴柰何亂先古之制臣事於漢卑辱先單于為諸國所笑雖如是而安何以復長百蠻左伊秩訾曰不然彊弱有時今漢方盛烏孫城郭諸國皆為臣妾自且鞮矦單于以來匈奴日削不能取復雖屈彊於此未甞一日安也今事漢則安存不事則危亡計何以過此諸大人相難乆之呼韓邪從其計引衆南近塞遣子右賢王銖婁渠堂入侍郅支單于亦遣子右大將駒于利受入侍二月丁巳樂成敬矦許延壽薨夏四月黃龍見新豐丙申太上皇廟火甲辰孝文廟火上素服五日烏孫狂王復尚楚主解憂生一男鴟靡不與主和又􅁀惡失衆漢使衞司馬魏和意副候任昌至烏孫公主言狂王為烏孫所患苦易誅也遂謀置酒使士㧞劒擊之劒旁下狂王傷上馬馳去其子細沈瘦㑹兵圍和意昌及公主於赤谷城數月都護鄭吉發諸國兵救之乃解去漢遣中郎將張遵持醫藥治狂王賜金帛因􅀵和意昌係􅃈從尉犂檻車至長安斬之􅀄肥王翁歸靡胡婦子烏就屠狂王傷時驚與諸翖矦俱去居北山中揚言母家匈奴兵來故衆歸之後遂襲殺狂王自立為昆彌是歳漢遣破羌將軍辛武賢將兵萬五千人至燉煌通渠積榖欲以討之初楚主侍者馮嫽能史書習事甞持漢節為公主使城郭諸國敬信之號曰馮夫人為烏孫右大將妻右大將與烏就屠相愛都護鄭吉使馮夫人說烏就屠以漢兵方出必見滅不如降烏就屠恐曰願得小號以自處帝徴馮夫人自問狀遣謁者笁次期門甘延壽為副送馮夫人馮夫人錦車持節詔烏就屠詣長羅矦赤谷城立元貴靡為大昆彌烏就屠為小昆彌皆賜印綬破羌將軍不出塞還後烏就屠不盡歸諸翖矦民衆漢復遣長羅矦惠將三校屯赤谷因為分别其人民地界大昆彌户六萬餘小昆彌户四萬餘然衆心皆附小昆彌二年春正月立皇子嚻為定陶王詔赦天下減民筭三十珠厓郡反夏四月遣護軍都尉張禄將兵擊之杜延年以老病免五月己丑廷尉于定國為御史大夫秋九月立皇子宇為東平王冬十二月上行幸萯陽宫屬玉觀是歳營平壯武矦趙充國薨先是充國以老乞骸骨賜安車駟馬黃金罷就第朝廷每有四夷大議常與參兵謀問籌策焉匈奴呼韓邪單于􅅃五原塞願奉國珍朝三年正月詔有司議其儀丞相御史曰聖王之制先京師而後諸夏先諸夏而後夷狄匈奴單于朝賀其禮儀宜如諸矦王位次在下太子太傅蕭望之以為單于非正朔所加故稱敵國宜待以不臣之禮位在諸矦王上外夷稽首稱藩中國讓而不臣此則羈縻之誼謙亨之福也書曰戎狄荒服言其來服荒忽亡常如使匈奴後嗣卒有鳥􅇡䑕伏闕於朝享不為畔臣萬丗之長策也天子采之下詔曰匈奴單于稱北蕃朝正朔朕之不德不能􅀪覆其以客禮待之令單于位在諸矦王上贊謁稱臣而不名荀恱論曰春秋之義王者無外欲一于天下也戎狄道里遼逺人迹介絶故正朔不及禮敎不加非尊之也其埶然也詩云自彼氐羌莫敢不來王故要荒之君必奉王貢若不供職則有辭讓號令加焉非敵國之謂也望之欲待以不臣之禮加之王公之上僣度失序以亂天常非禮也若以權時之宜則異論矣詔遣車􅀐都尉韓昌迎單于發所過七郡二千􅀐為陳道上三年春正月上行幸甘泉郊泰畤匈奴呼韓邪單于來朝贊謁稱藩臣而不名賜以冠帶衣裳黃金璽盭綬玉具劒佩刀弓一張矢四發棨㦸十安車一乗鞍勒一具馬十五匹黃金二十斤錢二十萬衣被七十七襲錦繡綺縠雜帛八千匹絮六千斤禮畢使使者道單于先行宿長平上自甘泉宿池陽宫上登長平阪詔單于毋謁其左右當户羣臣皆得列觀及諸蠻夷君長王矦數萬咸迎於渭橋下夾道陳上登渭橋咸稱萬歳單于就邸長安置酒建章宫饗賜單于觀以珍寳二月遣單于歸國單于自請願留居幕南光禄塞下有急保漢受降城漢遣長樂衞尉髙昌矦董忠車􅀐都尉韓昌將􅀐萬六千又發邊郡士馬以千數送單于出朔方雞鹿塞詔忠等留衞單于助誅不服又轉邊糓米糒前後三萬四千斛給贍其食先是自烏孫以西至安息諸國近匈奴者皆畏匈奴而輕漢及呼韓邪單于朝漢後咸尊漢矣上以戎狄賔服思股肱之美乃圖畫其人於麒麟閣灋其形貌署其官爵姓名唯霍光不名曰大司馬大將軍博陸矦姓霍氏其次張安丗韓増趙充國魏相丙吉杜延年劉德梁丘賀蕭望之蘇武凡十一人皆有功德知名當丗是以表而揚之明著中興輔佐列於方叔召虎仲山甫焉鳳皇集新蔡三月己巳建成安矦黃霸薨五月甲午于定國為丞相封西平矦太僕沛郡陳萬年為御史大夫詔諸儒講五經同異蕭望之等平奏其議上親稱制臨決焉乃立梁丘易大小夏矦尚書糓梁春秋愽士烏孫大昆彌元貴靡及鴟靡皆病死公主上書言年老土思願得歸骸骨葬漢地天子閔而迎之冬至京師待之一如公主之制後二歳卒元貴靡子星靡代為大昆彌弱馮夫人上書願使烏孫鎭撫星靡漢遣之都護韓宣奏烏孫大吏大禄大監皆可賜以金印紫綬以尊輔大昆彌漢許之其後叚㑹宗為都護乃招還亡叛安定之星靡死子雌栗靡代立皇太子所幸司馬良娣病且死謂太子曰妾死非天命乃諸娣妾良人更祝詛殺我太子以為然及死太子悲恚發病忽忽不樂帝乃令皇后擇後宫家人子可以娱侍太子者得元城王政君送太子宫政君故繡衣御史賀之孫女也見於丙殿壹幸有身是歳生成帝於甲館畫堂為丗適皇孫帝愛之自名曰鷔字大孫常置左右四年夏廣川王海陽坐禽獸行賊殺不辜廢徙房陵冬十月丁卯未央宫宣室閣火是歳徙定陶王嚻為楚王匈奴呼韓邪郅支兩單于俱遣使朝獻漢待呼韓邪使有加焉黃龍元年春正月上行幸甘泉郊㤗畤匈奴呼韓邪單于來朝二月歸國始郅支單于以為呼韓邪兵弱降漢不能復自還即引其衆西欲攻定右地又屠􅂄單于小弟本侍呼韓邪亦亡之右地收兩兄餘兵得數千人自立為伊利目單于道逢郅支合戰郅支殺之并其兵五萬餘人郅支聞漢出兵榖助呼韓邪即遂留居右地自度力不能定匈奴乃益西近烏孫欲與并力遣使見小昆彌烏就屠烏就屠殺其使發八千􅀐迎郅支郅支覺其謀勒兵逢擊烏孫破之因北擊烏掲堅昆丁令并三國數遣兵擊烏孫常勝之堅昆東去單于庭七千里南去車師五千里郅支留都之三月有星孛于王良閣道入紫微宫帝寑疾選大臣可屬者引外屬侍中樂陵矦史髙太子太傅蕭望之少傅周堪至禁中拜髙為大司馬車􅀐將軍望之為前將軍光禄勲堪為光禄大夫皆受遺詔輔政領尚書事冬十二月甲戌帝崩于未央宫班固贊曰孝宣之治信賞必罰綜核名實政事文學灋理之士咸精其能至于技巧工匠器械自元成閒鮮能及之亦足以知吏稱其職民安其業也遭值匈奴乖亂推亡固存信威北夷單于慕義稽首稱藩功光祖宗業垂後嗣可謂中興侔德殷宗周宣矣癸巳太子即皇帝位謁髙廟尊皇太后曰太皇太后皇后曰皇太后資治通鑑卷第二十七
