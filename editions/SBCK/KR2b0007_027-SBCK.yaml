front:
  text: 義民三老力田皆以差賜爵及帛後數月徴霸為太子太傅五月匈奴單于遣弟呼留若王勝之來朝冬十月鳯皇十一集杜陵河南太守東海嚴延年為治隂鷙酷烈衆人所謂當死者一朝出之所謂當生者詭殺之吏民莫能測其意深淺戰栗不敢犯禁冬月傳屬縣囚㑹論府上流血數里河南號曰屠伯延年素輕黃霸為人及比郡為守襃賞反在已前心内不服河南界中又有蝗蟲府丞義出行蝗還見延年延年曰此蝗豈鳯皇食邪義年老頗悖素畏延年恐見中傷延年本甞與義俱為丞相史實親厚之饋遺之甚厚義愈益恐自筮得死卦忽忽不樂取告至長安上書言延年罪名十事已拜奏因飲藥自殺以明不欺事下御史丞按驗得其語言怨望誹謗政治數事十一月延年坐不道棄市初延年母從東海來欲從延年臘到洛陽適見報囚母大驚便止都亭不肯入府延年出至都亭謁母母閉閤不見延年免冠頓首閤下良乆母乃見之因數責延年幸得僃郡守専治千里不聞仁愛敎化有以全安愚民顧乗刑罰多刑殺人欲以立威豈為民父母意哉延年服罪重頓首謝因自為母御歸府舎母畢正臘謂延年天道神明人不可獨殺我不意當老見壯子被刑戮也行矣去汝東歸埽除墓地耳遂去歸郡見昆弟宗人復為言之後歳餘果敗東海莫不賢智其母匈奴握􅄛朐鞮單于􅁀虐好殺伐國中不附及太子左賢王數讒左地貴人左地貴人皆怨㑹烏桓擊匈奴東邊始夕王頗得人民單于怒姑夕王恐即與烏禪幕及左地貴人共立稽矦㹪為呼韓邪單于發左地兵四五萬人西擊握衍朐鞮單于至姑且水北未戰握衍朐鞮單于兵敗走使人報其弟右賢王曰匈奴共攻我若肯發兵助我乎右賢王曰若不愛人殺昆弟諸貴人各自死若處無來汙我握􅄛朐鞮單于恚自殺左大且渠都隆竒亡之右賢王所其民衆盡降呼韓邪單于呼韓邪單于歸庭數月罷兵使各歸故地乃收其兄呼屠吾斯在民閒者立為左谷蠡王使人告右賢貴人欲令殺右賢王其冬都隆竒與右賢王共立日逐王薄胥堂為屠􅂄單于發兵數萬人東襲呼韓邪單于呼韓邪單于兵敗走屠􅂄單于還以其長子都塗吾西為左谷蠡王少子姑瞀樓頭為右谷蠡王留居單于庭五鳯元年春正月上幸甘泉郊泰畤皇太子冠
