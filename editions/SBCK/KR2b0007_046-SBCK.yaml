front:
  text: 匈奴西開三十六國百姓頻年服役轉輸煩費愁困之民足以感動天地陛下宜留念省察帝下其章第五倫亦同終議牟融鮑昱皆以為孝子無改父之道征伐匈奴屯戍西域先帝所建不宜回異終復上書曰秦築長城功役繁興胡亥不革卒亡四海故孝元弃珠厓之郡光武絶西域之國不以介鱗易我衣裳魯文公毁泉臺春秋譏之曰先祖為之而已毁之不如勿居而已以其無妨害於民也襄公作三軍昭公舍之君子大其復古以為不舍則有害於民也今伊吾之役樓蘭之屯兵乆而未還非天意也帝從之丙寅詔二千石勉勸農桑罪非殊死須秋案驗有司明慎選舉進柔良退貪猾順時令理寃獄是時承永平故事吏政尚嚴切尚書決事率近於重尚書沛國陳寵以帝新即位宜改前世苛俗乃上䟽曰臣聞先王之政賞不僭刑不濫與其不得已寧僭無濫往者斷獄嚴明所以威懲姦慝姦慝既平必宜濟之以寛陛下即位率由此義數詔羣僚弘崇晏晏而有司未悉奉承猶尚深刻斷獄者急於篣格酷烈之痛執憲者煩於詆欺放濫之文或因公行私逞縱威福夫爲政猶張琴瑟大弦急者小弦絶陛下宜隆先王之道蕩滌煩苛之法輕薄箠楚以濟羣生全廣至德以奉天心帝深納寵言每事務於寛厚酒泉太守叚彭等兵會栁中擊車師攻交河城斬首三千八百級獲生口三千餘人北匈奴驚走車師復降會闗寵已殁謁者王䝉等欲引兵還耿恭軍吏范羌時在軍中固請迎恭諸將不敢前乃分兵二千人與羌從山北迎恭遇大雪丈餘軍僅能至城中夜聞兵馬聲以為虜來大驚羌遥呼曰我范羌也漢遣軍迎校尉耳城中皆稱萬歲開門共相持涕泣明日遂相隨俱歸虜兵追之且戰且行吏士素飢困發䟽勒時尚有二十六人隨路死没三月至玉門唯餘十三人衣屨穿決形容枯槁中郎將鄭衆為恭已下洗沐易衣冠上䟽奏恭以單兵守孤城當匈奴數萬之衆連月踰年心力困盡鑿山為井煑弩為糧前後殺傷醜虜數百千計卒全忠勇不為大漢恥宜䝉顯爵以厲將帥恭至雒陽拜騎都尉詔悉罷戊巳校尉及都䕶官徴還班超超將發還疏勒舉國憂恐其都尉黎弇曰漢使弃我我必復為龜兹所滅耳誠不忍見漢使去因以刀自剄超還至于窴王矦以下皆號泣曰依漢使如父母誠不可去互抱超馬脚不得行超亦欲遂其本志乃更還疏勒疏勒兩城已降龜兹而與尉頭連兵超捕斬反者擊破尉頭殺六百餘人疏勒復安甲寅山陽東平地震東平王蒼上便冝三事帝報書曰間吏民奏事亦有此言但明智淺短或謂儻是復慮為非不知所定得王深䇿恢然意解思惟嘉謀以次奉行特賜王錢五百萬後帝欲為原陵顯節陵起縣邑蒼上䟽諫曰竊見光武皇帝躬履儉約之行深覩始終之分勤勤懇懇以葬制為言孝明皇帝大孝無違承奉遵行謙德之美於斯為盛臣愚以園邑之興始自彊秦古者丘隴且不欲其著明豈况築郭邑建都郛哉上違先帝聖心下造無益之功虚費國用動揺百姓非所以致和氣祈豐年也陛下履有虞之至性追祖禰之深思臣蒼誠傷二帝純德之美不暢於無窮也帝乃止自是朝廷每有疑政輒驛使諮問蒼悉心以對皆見納用秋八月庚寅有星孛干天市
