body:
  text: 初益州西部都尉廣漢鄭純為政清潔化行夷貊君長感慕皆奉珍内附明帝為之置永昌郡以純為太守純在官十年而卒後人不能撫循夷人九月哀牢王類牢殺守令反攻博南阜陵王延數懐怨望有告延與子男魴造逆謀者上不忍誅冬十一月貶延為阜陵矦食一縣不得與吏民通北匈奴臯林温禺犢王將衆還居涿邪山南單于與邊郡及烏􅁊共擊破之是歲南部大饑詔稟給之二年春三月甲辰罷伊吾盧屯兵匈奴復遣兵守其地永昌越嶲益州三郡兵及昆明夷鹵承等擊哀牢王類牢於博南大破斬之夏四月戊子詔還坐楚淮陽事徙者四百餘家上欲封爵諸舅太后不聽會大旱言事者以為不封外戚之故有司請依舊典太后詔曰凡言事者皆欲媚朕以要福耳昔王氏五矦同日俱封黄霧四塞不聞澍雨之應夫外戚貴盛鮮不傾覆故先帝防慎舅氏不令在樞機之位又言我子不當與先帝子等今有司柰何欲以馬氏比隂氏乎且隂衞尉天下稱之省中御者至門出不及履此蘧伯玉之敬也新陽矦雖剛彊微失理然有方略據地談論一朝無雙原鹿貞矦勇猛誠信此三人者天下選臣豈可及哉馬氏不及隂氏逺矣吾不才夙夜累息常恐虧先后之法有毛髪之罪吾不釋言之不捨晝夜而親屬犯之不止治喪起墳又不時覺是吾言之不立而耳目之塞也吾為天下母而身服大練食不求甘左右但著帛布無香薰之飾者欲身率下也以為外親見之當傷心自敇但笑言太后素好儉前過濯龍門上見外家問起居者車如流水馬如游龍倉頭衣綠褠領䄂正白顧視御者不及逺矣故不加譴怒但絶歲用而已冀以默愧其心猶懈怠無憂國忘家之慮知臣莫若君況親屬乎吾豈可上負先帝之㫖下虧先人之德重襲西京敗亡之禍哉固不許帝省詔悲歎復重請曰漢興舅氏之封矦猶皇子之為王也太后誠存謙虚柰何令臣獨不加恩三舅乎且衞尉年尊兩校尉有大病如令不諱使臣長抱刻骨之恨冝及吉時不可稽留太后報曰吾反覆念之思令兩善豈徒欲獲謙讓之名而使帝受不外施之嫌哉昔竇太后欲封王皇后之兄丞相條矦言髙祖約無軍功不矦今馬氏無功於國豈得與隂郭中興之后等邪常觀冨貴之家祿位重疊猶再實之木其根必傷且人所以願封矦者欲上奉祭祀下求温飽耳今祭祀則受太官之賜衣食則䝉御府餘資斯豈不可足而必當得一縣乎吾計之孰矣勿有疑也夫至孝之行安親為上今數遭變異榖價數倍憂惶晝夜不安坐卧而欲先營外家之封違慈母之拳拳乎吾素剛急有胷中氣不可不順也子之未冠由於父母已冠成人則行子之志念帝人君也吾以未踰三年之故自吾家族故得專之若隂陽調和邊境清静然後行子之志吾但當含飴弄孫不能復􅀜政矣上乃止太后嘗詔三輔諸馬昬親有屬託郡縣干亂吏治者以法聞太夫人葬起墳微髙太后以爲言兄衞尉廖等即時減削其外親有謙素義行者輒假借温言賞以財位如有纎介則先見嚴恪之色然後加譴其美車服不遵法度者便絶屬籍遣歸田里廣平鉅鹿樂成王車騎朴素無金銀之飾帝以白太后即賜錢各五百萬於是内外從化被服如一諸家惶恐倍於永平時置織室蠶於濯龍中數往觀視以爲娛樂常與帝旦夕言道政事及教授小王論語經書述叙平生雍和終日馬廖慮美業難終上䟽勸成德政曰昔元帝罷服官成帝御浣衣哀帝去樂府然而侈費不息至於衰亂者百姓從行不從言也夫改政移風必有其本傳曰吴王好劒客百姓多創瘢楚王好細􅆎宫中多餓死長安語曰城中好髙結四方髙一尺城中好廣眉四方且半額城中好大䄂四方全匹帛斯言如戲有切事實前下制度未幾後稍不行雖或吏不奉法良由慢起京師今陛下素簡所安發自聖性誠令斯事一竟則四海誦德聲薰天地神明可通況於行令乎太后深納之初安夷縣吏略妻卑湳種羌人婦吏為其夫所殺安夷長宗延追之出塞種人恐見誅遂共殺延而與勒姐吾良二種相結為宼於是燒當羌豪滇吾之子迷吾率諸種俱反敗金城太守郝崇詔以武威太守北地傅育為䕶羌校尉自安夷徙居臨羌迷吾又與封養種豪布橋等五萬餘人共寇隴西漢陽秋八月遣行車騎將軍馬防長水校尉耿恭將北軍五校兵及諸郡射士三萬人擊之第五倫上疏曰臣愚以為貴戚可封矦以冨之不當任以職事何者繩以法則傷恩私以親則違憲伏聞馬防今當西征臣以太后恩仁陛下至孝恐卒有纎介難為意愛帝不從馬防等軍到冀布橋等圍南部都尉於臨洮防進擊破之斬首虜四千餘人遂解臨洮圍其衆皆降唯布橋等二萬餘人屯望曲谷不下十二月戊寅有星孛于紫宫帝納竇勲女為貴人有寵貴人母即東海恭王女沘陽公主也第五倫上疏曰光武承王莽之餘頗以嚴猛爲政後代因之遂成風化郡國所舉類多辦職俗吏殊未有寛博之選以應上求者也陳留令劉豫冠軍令駟協並以刻薄之姿務為嚴苦吏民愁怨莫不疾之而今之議者反以為能違天心失經義非徒應坐豫恊亦冝譴舉者務進仁賢以任時政不過數人則風俗自化矣臣嘗讀書記知秦以酷急亡國又目見王莽亦以苛法自滅故勤勤懇懇實在於此又聞諸王主貴戚驕奢踰制京師尚然何以示逺故曰其身不正雖令不行以身教者從以言教者訟上善之倫雖天性峭直然常疾俗吏苛刻論議每依寛厚云三年春正月己酉宗祀明堂登靈臺赦天下馬防擊布橋大破之布橋將種人萬餘降詔徴防還留耿恭擊諸未服者斬首虜千餘人勒姐燒何等十三種數萬人皆詣恭降恭嘗以言事忤馬防監營謁者承㫖奏恭不憂軍事坐徴下獄免官三月癸巳立貴人竇氏為皇后􅀄顯宗之世治虖沱石臼河從都慮至羊膓倉欲令通漕太原吏民苦役連年無成死者不可勝筭帝以郎中鄧訓為謁者監領其事訓考量隱括知其難成具以上言夏四月己巳詔罷其役更用驢輦歲省費億萬計全活徒士數千人訓禹之子也閏月西域假司馬班超率疏勒康居于窴拘彌兵一萬人攻姑墨石城破之斬首七百級冬十二月丁酉以馬防為車騎將軍武陵漊中蠻反是歲有司奏遣廣平王羡鉅鹿王恭樂成王黨俱就國上性篤愛不忍與諸王乖離遂皆留京師四年春二月庚寅太尉牟融薨夏四月戊子立皇子慶為太子己丑徙鉅鹿王恭為江陵王汝南王暢為梁王常山王昞為淮陽王辛卯封皇子伉為千乗王全為平春王有司連據舊典請封諸舅帝以天下豐稔方垂無事癸卯遂封衞尉廖為順陽矦車騎將軍防為潁陽矦執金吾光為許矦太后聞之曰吾少壯時但慕竹帛志不顧命今雖已老猶戒之在得故日夜􅅥厲思自降損冀乗此道不負先帝所以化導兄弟共同斯志欲令􅉂目之日無所復恨何意老志復不從哉萬年之日長恨矣廖等並辭讓願就闗内矦帝不許廖等不得已受封爵而上書辭位帝許之五月丙辰防廖光皆以特進就第甲戌以司徒鮑昱為太尉南陽太守桓虞為司徒六月癸丑皇太后馬氏崩帝既為太后所養專以馬氏為外家故賈貴人不登極位賈氏親族無受寵榮者及太后崩但加貴人王赤綬安車一駟永巷宫人二百御府雜帛二萬匹大司農黄金千斤錢二千萬而已秋七月壬戌葬明德皇后校書郎楊終建言宣帝博徴羣儒論定五經於石渠閣方今天下少事學者得成其業而章句之徒破壊大體宜如石渠故事永為後世則帝從之冬十一月壬戌詔太常將大夫愽士郎官及諸儒會白虎觀議五經同異使五官中郎將魏應承制問侍中淳于恭奏帝親稱制臨決作白虎議奏名儒丁鴻樓望成封桓郁班固賈逵及廣平王羨皆與焉固超之兄也五年春二月庚辰朔日有食之詔舉直言極諫荆豫諸郡兵討漊中蠻破之夏五月辛亥詔曰朕思遲直士側席異聞其先至者各已發憤吐懣略聞子大夫之志矣皆欲置於左右顧問省納建武詔書又曰堯試臣以職不直以言語筆札今外官多曠並可以􅀘任戊辰太傅趙憙薨班超欲遂平西域上疏請兵曰臣竊見先帝欲開西域故北擊匈奴西使外國鄯善于窴即時向化今拘彌莎車疏勒月氏烏孫康居復願歸附欲共并力破滅􅀛兹平通漢道若得􅀛兹則西域未服者百分之一耳前世議者皆曰取三十六國號為斷匈奴右臂今西域諸國自日之所入莫不向化大小欣欣貢奉不絶唯焉耆􅀛兹獨未服從臣前與官屬三十六人奉使絶域備遭艱戹自孤守疏勒於今五載胡夷情數臣頗識之問其城郭小大皆言倚漢與依天等以是效之則葱領可通龜兹可伐今宜拜龜兹侍子白霸為其國王以歩騎數百送之與諸國連兵歲月之間􅀛兹可禽以夷狄攻夷狄計之善者也臣見莎車疏勒田地肥廣草故饒􅄛不比敦煌鄯善間也兵可不費中國而糧食自足且姑墨温宿二王特為龜兹所置既非其種更相厭苦其埶必有降者若二國來降則龜兹自破願下臣章參考行事誠有萬分死復何恨臣超區區特蒙神靈竊冀未便僵仆目見西域平定陛下舉萬年之觴薦勲祖廟布大喜於天下書奏帝知其功可成議欲給兵平陵徐幹上疏願奮身佐超帝以幹為假司馬將㢮刑及義從千人就超先是莎車以為漢兵不出遂降於龜兹而疏勒都尉番辰亦叛會徐幹適至超遂與幹擊番辰大破之斬首千餘級欲進攻龜兹以烏孫兵彊宜因其力乃上言烏孫大國控弦十萬故武帝妻以公主至孝宣帝卒得其用今可遣使招慰與共合力帝納之六年春二月辛卯琅邪孝王京薨夏六月丙辰太尉鮑昱薨辛未晦日有食之秋七月癸巳以大司農鄧彪為太尉武都太守廉范遷蜀郡太守成都民物豐盛邑宇逼側舊制禁民夜作以防火災而更相隱蔽燒者日屬范乃毁削先令但嚴使儲水而已百姓以為便歌之曰廉叔度來何暮不禁火民安作昔無􅃭今五絝帝以沛王等將入朝遣謁者賜貂裘及太官食物珍果又使大鴻臚竇固持節郊迎帝親自循行邸第豫設帷牀其錢帛器物無不充僃七年春正月沛王輔濟南王康東平王蒼中山王焉東海王政琅邪王宇來朝詔沛濟南東平中山王贊拜不名升殿乃拜上親荅之所以寵光榮顯加於前古每入宫輒以輦迎至省閤乃下上為之興席改容皇后親拜於内皆鞠躬辭謝不自安三月大鴻臚奏遣諸王歸國帝特留東平王蒼於京師初明德太后為帝納扶風宋楊二女為貴人大貴人生太子慶梁松弟竦有二女亦為貴人小貴人生皇子肇竇皇后無子養肇為子宋貴人有寵於馬太后太后崩竇皇后寵盛與母沘陽公主謀陷宋氏外令兄弟求其纖過内使御者偵伺得失宋貴人病思生兔令家求之因誣言欲為厭勝之術由是太子出居承祿觀夏六月甲寅詔曰皇太子有失惑無常之性不可以奉宗廟大義滅親況降退乎今廢慶為清河王皇子肇保育皇后承訓懐袵今以肇為皇太子遂出宋貴人姊妹置丙舍使小黄門蔡倫案之二貴人皆飲藥自殺父議郎楊免歸本郡慶時雖幼亦知避嫌畏禍言不敢及宋氏帝更憐之敇皇后令衣服與太子齊等太子亦親愛慶入則共室出則同輿己未徙廣平王羨為西平王秋八月飲酎畢有司復奏遣東平王蒼歸國帝乃許之手詔賜蒼曰骨肉天性誠不以逺近為親疎然數見顔色情重昔時念王久勞思得還休欲署大鴻臚奏不忍下筆顧授小黄門中心戀戀惻然不能言於是車駕祖送流涕而訣復賜乗輿服御珍寳輿馬錢布以億萬計九月甲戍帝幸偃師東渉卷津至河内下詔曰車駕行秋稼觀收穫因渉郡界皆精騎輕行無它輜重不得輒修道橋逺離城郭遣吏逢迎刺探起居出入前後以爲煩擾動務省約但患不能脱粟瓢飲耳己酉進幸鄴辛卯還宫冬十月癸丑帝行幸長安封蕭何末孫熊爲鄼矦進幸槐里岐山又幸長平御池陽宫東至髙陵十二月丁亥還宫東平獻王蒼疾病馳遣名醫小黄門侍疾使者冠蓋不絶於道又置驛馬千里傳問起居八年春正月壬辰王薨詔告中傅封上王自建武以來章奏並集覽焉遣大鴻臚持節監喪令四姓小矦諸國王主悉會葬夏六月北匈奴三木樓訾大人稽留斯等率三萬餘人款五原塞降冬十二月甲午上行幸陳留梁國淮陽潁陽戊申還宫太子肇之立也梁氏私相慶諸竇聞而惡之皇后欲專名外家忌梁貴人姊妹數譛之於帝漸致踈嫌是歲竇氏作飛書陷梁竦以惡逆竦遂死獄中家屬徙九眞貴人姊妹以憂死辭語連及梁松妻舞隂公主坐徙新城順陽矦馬廖謹篤自守而性寛緩不能教勒子弟皆驕奢不謹校書郎楊終與廖書戒之曰君位地尊重海内所望黄門郎年幼血氣方盛既無長君退讓之風而要結輕狡無行之客縱而莫誨視成任性覽念前往可爲寒心廖不能從防光兄弟資產巨億大起第觀彌亘街路食客常數百人防又多牧馬畜賦斂羌胡帝不喜之數加譴敇所以禁遏甚備由是權埶稍損賔客亦衰廖子豫為歩兵校尉投書怨誹於是有司并奏防光兄弟奢侈踰僭濁亂聖化悉免就國臨上路詔曰舅氏一門俱就國封四時陵廟無助祭先后者朕甚傷之其令許矦思諐田廬有司勿復請以慰朕渭陽之情光比防稍爲謹宻故帝特留之後復位特進豫隨廖歸國考擊物故後復有詔還廖京師諸馬既得罪竇氏益貴盛皇后兄憲為侍中虎賁中郎將弟篤為黄門侍郎並侍宫省賞賜累積喜交通賔客司空第五倫上疏曰臣伏見虎賁中郎將竇憲椒房之親典司禁兵出入省闥年盛志美卑讓樂善此誠其好士交結之方然諸出入貴戚者類多瑕釁禁錮之人尤少守約安貧之節士大夫無志之徒更相販賣雲集其門蓋驕佚所從生也三輔論議者至云以貴戚廢錮當復以貴戚浣濯之猶解酲當以酒也詖險趣埶之徒誠不可親近臣愚願陛下中宫嚴敇憲等閉門自守無妄交通士大夫防其未萌慮於無形令憲永保福祿君臣交歡無纖介之隙此臣之所至願也憲恃宫掖聲勢自王主及隂馬諸家莫不畏憚憲以賤直請奪沁水公公主園田主逼畏不敢計後帝出過園指以問憲憲隂喝不得對後發覺帝大怒召憲切責曰深思前過奪主田園時何用愈趙髙指鹿為馬久念使人驚怖昔永平中常令隂黨隂愽鄧疊三人更相糾察故諸豪戚莫敢犯法者今貴主尚見枉奪何况小民哉國家棄憲如孤雛腐鼠耳憲大懼皇后為毁服深謝良久乃得解使以田還主雖不繩其罪然亦不授以重任臣光曰人臣之罪莫大於欺罔是以明君疾之孝章謂竇憲何異指鹿為馬善矣然卒不能罪憲則姦臣安所懲哉夫人主之於臣下患在不知其姦茍或知之而復赦之則不若不知之為愈也何以言之彼或為姦而上不之知猶有所畏既知而不能討彼知其不足畏也則放縱而無所顧矣是故知善而不能用知惡而不能去人主之深戒也下邳周䊸為雒陽令下車先問大姓主名吏數閭里豪彊以對䊸厲聲怒曰本問貴戚若馬竇等輩豈能知此賣菜傭乎於是部吏望風㫖争以激切爲事貴戚跼蹐京師肅清竇篤夜至止姦亭亭長霍延拔劒擬篤肆詈恣口篤以表聞詔召司􅀠校尉河南尹詣尚書譴問遣劒㦸士收䊸送廷尉詔獄數日貰出之帝拜班超爲將兵長史以徐幹爲軍司馬别遣衞􅇋李邑䕶送烏孫使者邑到于窴值龜兹攻疏勒恐懼不敢前因上書陳西域之功不可成又盛毁超擁愛妻抱愛子安樂外國無内顧心超聞之歎曰身非曾參而有三至之讒恐見疑於當時矣遂去其妻帝知超忠乃切責邑曰縱超擁愛妻抱愛子思歸之士千餘人何能盡與超同心乎令邑詣超受節度詔若邑任在外者便留與從事超即遣邑將烏孫侍子還京師徐幹謂超曰邑前親毁君欲敗西域今何不緣詔書留之更遣它吏送侍子乎超曰是何言之陋也以邑毁超故今遣之内省不疚何䘏人言快意留之非忠臣也帝以侍中會稽鄭弘為大司農舊交阯七郡貢獻轉運皆從東冶汎海而至風波艱阻沈溺相係􅀪奏開零陵桂陽嶠道自是夷通遂為常路在職二年所息省以億萬計遭天下旱邊方有警民食不足而帑藏殷積􅀪又奏宜省貢獻減徭費以利飢民帝從之元和元年春閏正月卒丑濟隂悼王長薨夏四月己卯分東平國封獻王子尚為任城王六月辛酉沛獻王輔薨陳事者多言郡國貢舉率非功次故守職益懈而吏事􅎊疏咎在州郡有詔下公卿朝臣議大鴻臚韋彪上議曰夫國以簡賢為務賢以孝行為首是以求忠臣必於孝子之門夫人才行少能相兼是以孟公綽優於趙魏老不可以為滕薛大夫忠孝之人持心近厚鍜練之吏持心近薄士宜以才行為先不可純以閥閲然其要歸在於選二千石二千石賢則貢舉皆得其人矣彪又上疏曰天下樞要在於尚書尚書之選豈可不重而閒者多從郎官超升此位雖曉習文法長於應對然察察小慧類無大能宜鑒嗇夫㨗􅇥之對深思絳矦木訥之功也帝皆納之彪賢之玄孫也秋七月丁未詔曰律云掠者唯得榜笞立又令丙箠長短有數自往者大獄已來掠者多酷鉆鑚之屬慘苦無極念其痛毒怵然動心宜及秋冬治獄明為其禁八月甲子太尉鄧彪罷以大司農鄭􅀪為太尉癸酉詔改元丁酉車駕南廵詔所經道上郡縣無得設儲跱命司空自將徒支拄橋梁有遣使奉迎探知起居二千石當坐九月辛丑幸章陵十月己未進幸江陵還幸宛召前臨淮太守宛人朱暉拜尚書僕射暉在臨淮有善政民歌之曰彊直自遂南陽朱季吏畏其威民懐其惠時坐法免家居故上召而用之十一月己丑車駕還宫尚書張林上言縣官經用不足宜自煑鹽及復脩武帝均輸之法朱暉固執以為不可曰均輸之法與賈販無異鹽利歸官則下民窮怨誠非明主所宜行帝因發怒切責諸尚書暉等皆自繫獄三日詔敇出之曰國家樂聞駮議黄髪無愆詔書過耳何故自繫暉因稱病篤不肯復署議尚書令以下惶怖謂暉曰今臨得譴讓柰何稱病其禍不細暉曰行年八十蒙恩得在機宻當以死報若心知不可而順㫖靁同負臣子之義今耳目無所聞見伏待死命遂閉口不復言諸尚書不知所為乃共劾奏暉帝意解寑其事後數日詔使直事郎問暉起居太醫視疾太官賜食暉乃起謝復賜錢十萬布百匹衣十領魯國孔僖涿郡崔駰同遊太學相與論孝武皇帝始為天子崇信聖道五六年間號勝文景及後恣已忘其前善鄰房生梁郁上書告駰僖誹謗先帝刺譏當世事下有司駰詣吏受訊僖以書自訟曰凡言誹謗者謂實無此事而虛加誣之也至如孝武皇帝政之美惡顯在漢史坦如日月是為直説書傳實事非虚謗也夫帝者為善為惡天下莫不知斯皆有以致之故不可以誅於人也且陛下即位以來政敎未過而德澤有加天下所具也臣等獨何譏刺哉假使所非實是則固應悛改儻其不當亦宜含容又何罪焉陛下不推原大數深自為計徒肆私忌以快其意臣等受戮死即死耳顧天下之人必回視易慮以此事闚陛下心自今以後茍見不可之事終莫復言者矣齊桓公親􅀭其先君之惡以唱管仲然後羣臣得盡其心今陛下乃欲為十世之武帝逺諱實事豈不與桓公異哉臣恐有司卒然見構衘恨蒙枉不得自叙使後世論者擅以陛下有所比方寧可復使子孫追掩之乎謹詣闕伏待重誅書奏帝立詔勿問拜僖蘭臺令史十二月壬子詔前以妖惡禁錮三屬者一皆蠲除之但不得在宿衞而已廬江毛義東平鄭均皆以行義稱於鄉里南陽張奉慕義名往􅇋之坐定而府檄適至以義守安陽令義捧檄而入喜動顔色奉心賤之辭去後義母死徴辟皆不至奉乃嘆曰賢者固不可測往日之喜乃爲親屈也均兄爲縣吏頗受禮遺均諫不聽乃脱身爲傭歲餘得錢帛歸以與兄曰物盡可復得爲吏坐臧終身捐棄兄感其言遂爲廉潔均仕爲尚書免歸帝下詔襃寵義均賜榖各千斛常以八月長吏問起居加賜羊酒武威太守孟雲上言北匈奴復願與吏民合市詔許之北匈奴大且渠伊莫訾王等驅牛馬萬餘頭來與漢交易南單于遣輕騎出上郡鈔之大獲而還帝復遣假司馬和恭等將兵八百人詣班超超因發䟽勒于窴兵擊莎車莎車以賂誘䟽勒王忠忠遂反從之西保烏即城超乃更立其府丞成大爲䟽勒王悉發其不反者以攻忠使人説康居王執忠以歸其國烏即城遂降卷終
