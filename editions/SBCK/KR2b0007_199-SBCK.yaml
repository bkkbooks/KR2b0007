front:
  text: 資治通鑑卷第一百九十九
  hash: sha256:6f72391e63cd20b0faa1cb62958bbb113e799da8c6d3edd2a8d7a92b34312666
body:
  text: 臣司馬光奉勑編集唐紀十五單閼九月凡七年有竒起著雍涒灘四月盡旃䝉太宗文武大聖大廣孝皇帝下之下貞觀二十二年夏四月丁巳右武候將軍梁建方擊松外蠻破之􅀄嶲州都督劉伯英上言松外諸蠻蹔降復叛請出師討之以通西洱天笁之道敕建方發巴蜀十二州兵討之蠻酋雙舍帥衆拒戰建方擊敗之殺獲千餘人羣蠻震懾亡竄山谷建方分遣使者諭以利害皆來歸附前後至者七十部户十萬九千三百建方署其酋長蒙和等爲縣令各統所部莫不感恱因遣使詣西洱河其帥楊盛大駭具舩將遁使者曉諭以威信盛遂請降其地有楊李趙董等數十姓各據一川大者六百小者二三百户無大君長不相統壹語雖小訛其生業風俗大略與中國同自云本皆華人其所異者以十二月爲歲首己未契丹辱紇主曲據帥衆內附以其地置玄州以曲據爲刺史􅀠營州都督府甲子烏胡鎭將古神感將兵浮海擊髙麗遇髙麗歩騎五千戰於易山破之其夜髙麗萬餘人襲神感船神感設伏又破之而還初西突厥乙毗咄陸可汗以阿史那賀魯爲葉護居多邏斯水在西州北千五百里統處月處密始蘇歌邏禄失畢五姓之衆乙毗咄陸奔吐火羅乙毗射匱可汗遣兵迫逐之部落亡散乙亥賀魯帥其餘衆數千帳内屬詔處之於庭州莫賀城拜左驍衛將軍賀魯聞唐兵討􅀛茲請為郷導仍從數十騎入朝上以為崑丘道行軍揔管厚宴賜而遣之五月庚子右衛率長史王玄䇿擊帝那伏帝王阿羅那順大破之初中天笁王尸羅逸多兵最彊四天笁皆臣之玄䇿奉使至天笁諸國皆遣使入貢㑹尸羅逸多卒國中大亂其臣阿羅那順自立􅀤胡兵攻玄䇿玄䇿帥從者三十人與戰力不敵悉為所擒阿羅那順盡掠諸國貢物玄䇿脱身宵遁抵吐蕃西境以書徴隣國兵吐蕃遣精鋭千二百人泥婆國遣七千餘騎赴之玄䇿與其副蔣師仁帥二國之兵進至中天笁所居茶餺和羅城連戰三日大破之斬首三千餘級赴水溺死者且萬人阿羅那順弃城走更收餘衆還與師仁戰又破之擒阿羅那順餘衆奉其妃及王子阻乾陀衛江仁師進擊之衆潰獲其妃及王子虜男女萬二千人於是天笁響震城邑聚落降者五百八十餘所俘阿羅那順以歸以玄䇿為朝散大夫六月乙丑以白霫部為居延州癸酉特進宋公蕭瑀卒太常議謚曰徳尚書議謚曰肅上曰謚者行之迹當得其實可謚曰貞􅄶公子銳嗣尚上女襄城公主上欲為之營第公主固辭曰婦事舅姑當朝夕侍側􅀂居别第所闕多矣上乃命即瑀第而營之上以髙麗困弊議以明年發三十萬衆一舉滅之或以為大軍東征須備經歲之糧非畜乗所能載宜具舟艦為水運隋末劒􅀯獨無宼盗屬者遼東之役劒􅀯復不預及其百姓富庶宜使之造舟艦上從之秋七月遣右領左右府長史强偉於劒􅀯道伐木造舟艦大者或長百尺其廣半之别遣使行水道自巫峽抵江􅀭趣萊州庚寅西突厥相屈利啜請帥所部從討􅀛茲初左武衛將軍武連縣公武安李君羡直玄武門時太白屢晝見太史占云女主昌民間又傳秘記云唐三丗之後女主武王代有天下上惡之㑹與諸武臣宴宫中行酒令使各言小名君羡自言名五娘上愕然因笑曰何物女子乃爾勇健又以君羡官稱封邑皆有武字深惡之後出為華州刺史有布衣貟道信自言能絶粒曉佛灋君羡深敬信之數相從屛人語御史奏君羡與妖人交通謀不􅁤壬辰君羡坐誅籍沒其家上密問太史令李淳風秘記所云信有之乎對曰臣仰稽天象俯察曆數其人已在陛下宫中為親屬自今不過三十年當王天下殺唐子孫殆盡其兆既成矣上曰疑似者盡殺之何如對曰天之所命人不能違也王者不死徒多殺無辜且自今以往三十年其人已老庶幾頗有慈心為禍或淺今借使得而殺之天或生壯者肆其怨毒恐陛下子孫無遺類矣上乃止司空梁文昭公房玄齡留守京師疾篤上徴赴玉華宫肩輿入殿至御座側乃下相對流涕因留宫下聞其小愈則喜形於色加劇則憂悴玄齡謂諸子曰吾受主上厚恩今天下無事惟東征未已羣臣莫敢諌吾知而不言死有餘責乃上表諌以為老子曰知足不辱知止不殆陛下威名功德亦可足矣拓地開疆亦可止矣且陛下毎决一重囚必令三覆五奏進素膳止音樂者重人命也今驅無罪之士卒委之鋒刃之下使肝腦塗地獨不足愍乎向使髙麗違失臣節誅之可也侵擾百姓滅之可也它日能為中國患除之可也今無此三條而坐煩中國内為前代雪恥外為新羅報讎豈非所存者小所損者大乎願陛下許髙麗自新焚陵波之船罷應募之衆自然華夷慶賴逺肅邇安臣旦夕入地儻蒙録此哀鳴死且不朽玄齡子遺愛尚上女髙陽公主上謂公主曰彼病篤如此尚能憂我國家上自臨視握手與訣悲不自勝癸卯薨柳芳曰玄齡佐太宗定天下及終相位凡三十二年天下號為賢相然無跡可尋徳亦至矣故太宗定禍亂而房杜不言功王魏善諫諍而房杜讓其賢英衛善將兵而房杜行其道理致太平善歸人主為唐宗臣宜哉八月己酉朔日有食之丁丑敕越州都督府及婺洪等州造海船及雙舫千一百艘辛未遣左領軍大將軍執失思力出金山道擊薛延陀餘宼九月庚辰崑丘道行軍大揔管阿史那社爾擊處月處密破之餘衆悉降癸未薛萬徹等伐髙麗還萬徹在軍中使氣陵物裴行方奏其怨望坐除名流象州己丑新羅奏為百濟所攻破其十三城己亥以黄門侍郎禇遂良為中書令彊偉等發民造船役及山獠雅邛眉三州獠反壬寅遣茂州都督張士貴右衛將軍梁建方發隴右峽中兵二萬餘人以擊之蜀人苦造船之役或乞輸直雇潭州人造船上許之州縣督迫嚴急民至賣田宅鬻子女不能供榖價踊貴劒外騷然上聞之遣司農少卿長孫知人馳驛往視之知人奏稱蜀人脆弱不耐勞劇大船一艘庸絹二千二百三十六匹山谷已伐之木挽曵未畢復徴船庸二事併集民不能堪宜加存養上乃敕潭州船庸皆從官給冬十月癸丑車駕還京師回紇吐迷度兄子烏紇蒸其叔母烏紇與俱陸莫賀逹官俱羅勃皆突厥車鼻可汗之壻也相與謀殺吐迷度以歸車鼻烏紇夜引十餘騎襲吐迷度殺之燕然副都護元禮臣使人誘烏紇許奏以爲瀚海都督烏紇輕騎詣禮臣謝禮臣執而斬之以聞上恐回紇部落離散遣兵部尚書崔敦禮往安撫之乆之俱羅勃入見上留之不遣阿史那社爾既破處月處密引兵自焉耆之西趣􅀛茲北境分兵爲五道出其不意焉耆王薛婆阿那支弃城奔􅀛茲保其東境社爾遣兵追擊擒而斬之立其從父弟先那凖為焉耆王使修職貢􅀛茲大震守將多弃城走社爾進屯磧口去其都城三百里遣伊州刺史韓威帥千餘騎為前鋒右衛將軍曹繼叔次之至多褐城􅀛茲王訶利布失畢其相那利羯獵顚帥衆五萬拒戰鋒刃甫接威引兵偽遁􅀛茲悉衆追之行三十里與繼叔軍合􅀛茲懼將却繼叔乗之􅀛茲大敗逐北八十里甲戌以回紇吐迷度子前左屯衛大將軍婆閏為左驍衛大將軍大俟利發瀚海都督十一月庚子契丹帥窋哥奚帥可度者並帥所部內屬以契丹部為松漠府以窟哥為都督又以其别帥逹稽等部為峭落等九州各以其辱紇主為刺史以奚部爲饒樂府以可度者為都督又以其别帥阿㑹等部為弱水等五州亦各以其辱紇主為刺史辛丑置東夷校尉官於營州十二月庚午太子為文徳皇后作大慈恩寺成􅀛兹王布失畢既敗走保都城阿史那社爾進軍逼之布失畢輕騎西走社爾拔其城使安西都護郭孝恪守之沙州刺史蘇海政尚輦奉御薛萬備帥精騎追布失畢行六百里布失畢窘急保撥換城社爾進軍攻之四旬閏月丁丑拔之擒布失畢及羯獵顚那利脫身走濳引西突厥之衆并其國兵萬餘人襲擊孝恪孝恪營於城外􅀛茲人或告之孝恪不以為意那利奄至孝恪帥所部千餘人將入城那利之衆已登城矣城中降胡與之相應共擊孝恪矢刃如雨孝恪不能敵將復出死于西門城中大擾倉部郎中崔義超召募得二百人衛軍資財物與􅀛茲戰於城中曹繼叔韓威亦營於城外自城西北隅擊之那利經宿乃退斬首三千餘級城中始定後旬餘日那利復引山北􅀛兹萬餘人趣都城繼叔逆擊大破之斬首八千級那利單騎走􅀛茲人執之以詣軍門阿史那社爾前後破其大城五遣左衛郎將權袛甫詣諸城開示禍福皆相帥請降凡得七百餘城虜男女數萬口社爾乃召其父老宣國威靈諭以伐罪之意立其王之弟葉護為主􅀛茲人大喜西域震駭西突厥于闐安國爭饋駝馬軍糧社爾勒石紀功而還戊寅以崑丘道行軍揔管左驍衛將軍阿史那賀魯為泥伏沙鉢羅葉護賜以鼓纛使招討西突厥之未服者癸未新羅相金春秋及其子文王入見春秋眞德之弟也上以春秋為特進文王為左武衛將軍春秋請改章服從中國内出冬服賜之二十三年春正月辛亥􅀛茲王布失畢及其相那利等至京師上責讓而釋之以布失畢為左武衛中郎將西南徒莫袛等蠻内附以其地為傍望覽丘四州􅀠朗州都督府上以突厥車鼻可汗不入朝遣右驍衛郎將髙侃􅀤回紇僕骨等兵襲擊之兵入其境諸部落相繼來降拔悉密吐屯肥羅察降以其地置新黎州二月丙戌置瑶池都督府􅀠安西都護戊子以左衛將軍阿史那賀魯為瑶池都督三月丙辰置豐州都督府使燕然都護李素立兼都督去冬旱至是始雨辛酉上力疾至顯道門外赦天下丁卯敕太子於金液門聽政夏四月乙亥上行幸翠微宫上謂太子曰李丗勣才智有餘然汝與之無恩恐不能懐服我今黜之若其即行俟我死汝於後用為僕射親任之若徘徊顧望當殺之耳五月戊午以同中書門下三品李丗勣為疊州都督丗勣受詔不至家而去辛酉開府儀同三司衛景武公李靖薨上苦利增劇太子晝夜不離側或累日不食髮有變白者上泣曰汝能孝愛如此吾死何恨丁卯疾篤召長孫无忌入含風殿上卧引手捫无忌頥无忌哭悲不自勝上竟不得有所言因令无忌出己巳復召无忌及禇遂良入卧內謂之曰朕今悉以後事付公軰太子仁孝公軰所知善輔導之謂太子曰无忌遂良在汝勿憂天下又謂遂良曰无忌盡忠於我我有天下多其力也我死勿令讒人間之仍令遂良草遺詔有頃上崩太子擁无忌頸號慟將絶无忌攬涕請處分衆事以安內外太子哀號不已无忌曰主上以宗廟社稷付殿下豈得効匹夫唯哭泣乎乃秘不發喪庚午无忌等請太子先還飛騎勁兵及舊將皆從辛未太子入京城大行御馬輿侍衛如平日繼太子而至頓於兩儀殿以太子左庶子于志寧爲侍中少詹事張行成兼侍中以檢校刑部尚書右庶子兼吏部侍郎髙季輔兼中書令壬申􅀤䘮於太極殿宣遺詔太子即位軍國大事不可停闕平常細務委之有司諸王爲都督刺史者並聽奔喪濮王泰不在來限罷遼東之役及諸土木之功四夷之人入仕於朝及來朝貢者數百人聞喪皆慟哭翦髪􅋇面割耳流血灑地六月甲戌朔髙宗即位赦天下丁丑以疊州都督李勣爲特進檢校洛州刺史洛陽宫留守先是太宗二名令天下不連言者勿避至是始改官名犯先帝諱者癸未以長孫无忌爲太尉兼檢校中書令知尚書門下二省事无忌固辭知尚書省事帝許之仍令以太尉同中書門下三品癸巳以李勣為開府儀同三司同中書門下三品阿史那社爾之破􅀛茲也行軍長史薛萬備請因兵威說于闐王伏闍信入朝社爾從之秋七月己酉伏闍信隨萬備入朝詔入謁梓宫八月癸酉夜地震晉州尤甚壓殺五千餘人庚寅􅁙文皇帝于昭陵廟號太宗阿史那社爾契苾何力請殺身殉葬上遣人諭以先㫖不許蠻夷君長為先帝所擒服者頡利等十四人皆琢石為其像刻名列於北司馬門內丁酉禮部尚書許敬宗奏弘農府君廟應毁請藏主於西夾室從之九月乙卯以李勣為左僕射冬十月以突厥諸部置舍利等五州􅀠雲中都督府蘇農等六州􅀠定襄都督府乙亥上問大理卿唐臨繋囚之數對曰見囚五十餘人唯二人應死上恱上嘗録繫囚前卿所處者多號呼稱寃臨所處者獨無言上怪問其故囚曰唐卿所處本自無寃上歎息良乆曰治獄者不當如是邪上以吐蕃賛普弄讃為駙馬都尉封西海郡王賛普致書于長孫无忌等云天子初即位臣下有不忠者當勒兵赴國討除之十二月詔濮王泰開府置僚屬車服珍膳特加優異髙宗天皇大聖大弘孝皇帝上之上永徽元年春正月辛丑朔改元丙午立妃王氏為皇后后思政之孫也以后父仁祐為特進魏國公己未以張行成為侍中辛酉上召朝集使謂曰朕初即位事有不便於百姓者悉宜陳不盡者更封奏自是日引刺史十人入閤問以百姓疾苦及其政治有洛陽人李弘泰誣告長孫无忌謀反上命立斬之无忌與褚遂良同心輔政上亦尊禮二人恭已以聽之故永徽之政百姓阜安有貞觀之遺風太宗女衡山公主應適長孫氏有司以為服既公除欲以今秋成昏于志寧上言漢文立制本為天下百姓公主服本斬衰縱使服隨例除豈可情隨例改請俟三年喪畢成昬上從之二月辛卯立皇子孝為許王上金為杞王素節為雍王夏五月壬戌吐蕃賛普弄讃卒其嫡子早死立其孫為賛普賛普㓜弱政事皆决於國相禄東賛禄東賛性明達嚴重行兵有法吐蕃所以彊大威服氐羌皆其謀也六月髙侃擊突厥至阿息山車鼻可汗召諸部兵皆不赴與數百騎遁去侃帥精騎追至金山擒之以歸其衆皆降􅀄阿史那社爾虜􅀛茲王布失畢立其弟為王唐兵既還其酋長爭立更相攻擊秋八月壬午詔復以布失畢為􅀛茲王遣歸國撫其衆九月庚子髙侃執車鼻可汗至京師釋之拜左武衛將軍處其餘衆於鬱督軍山置狼山都督府以統之以髙侃為衛將軍於是突厥盡為封內之臣分置單于瀚海二都護府單于領狼山雲中桑乾三都督蘇農等一十四州瀚海領瀚海金徽新梨等七都督仙蕚等八州各以其酋長為都督剌史癸亥上出畋遇雨問諌議大夫昌樂谷那律曰油衣若為則不漏對曰以瓦為之必不漏上恱為之罷獵李勣固求解職冬十月戊辰解勣左僕射以開府儀同三司同中書門下三品己未監察御史陽武韋思謙劾奏中書令禇遂良抑買中書譯語人地大理少卿張叡冊以為准估無罪思謙奏曰估價之設備國家所須臣下交易豈得准估為定叡冊舞文附下罔上罪當誅是日左遷遂良為同州刺史叡冊循州刺史思謙名仁約以字行十二月庚午梓州都督謝萬歲兖州都督謝灋興與黔州都督李孟嘗討琰州叛獠萬歳灋興入洞招慰爲獠所殺二年春正月乙巳以黄門侍郎宇文節中書侍郎柳奭並同中書門下三品奭亨之兄子王皇后之舅也左驍衛將軍瑶池都督阿史那賀魯招集離散廬帳漸盛聞太宗崩謀襲取西庭二州庭州刺史駱弘義知其謀表言之上遣通事舍人橋寳明馳往慰撫寳明說賀魯令長子咥運入宿衛授右驍衛中郎將尋復遣歸咥運乃說其父擁衆西走擊破乙毗射匱可汗併其衆建牙于雙河及千泉自號沙鉢羅可汗咄陸五啜努失畢五俟斤皆歸之勝兵數十萬與乙毗咄陸可汗連兵處月處密及西域諸國多附之以咥運爲莫賀咄葉護焉耆王婆伽利卒國人表請復立故王突騎支夏四月詔加突騎攴右武衛將軍遣還國金州刺史滕王元嬰驕奢縱逸居亮隂中畋遊無節數夜開城門勞擾百姓或引彈彈人或埋人雪中以戲笑上賜書切讓之且曰取適之方亦應多緒晉靈荒君何足為則朕以王至親不能致王於法今書王下上考以愧王心元嬰與蔣王惲皆好聚歛上嘗賜諸王帛各五百叚獨不及二王敕曰滕叔蔣兄自能經紀不須賜物給麻兩車以為錢貫二王大慙秋七月西突厥沙鉢羅可汗寇庭州攻陷金嶺城及蒲類縣殺略數千人詔左武候大將軍梁建方右驍衛大將軍契苾何力為弓月道行軍揔管右驍衛將軍髙德逸右武候將軍薛孤吳仁為副發秦成岐雍府兵三萬人及回紇五萬騎以討之癸巳詔諸禮官學士議明堂制度以髙祖配五天帝太宗配五人帝八月己巳以于志寧為左僕射張行成為右僕射髙季輔為侍中志寧行成仍同中書門下三品己卯郎州白水蠻反寇麻州遣左領軍將軍趙孝祖等發兵討之九月癸巳廢玉華宫為佛寺戊戌更命九成宫為萬年宫庚戌左武候引駕盧文操踰垣盗左藏物上以引駕職在紏繩乃自為盗命誅之諌議大夫蕭鈞諫曰文操情實難原然灋不至死上乃免文操死顧侍臣曰此眞諫議也閏月長孫无忌等上所刪定律令式甲戌詔頒之四方上謂宰相曰聞所在官司行事猶互觀顔面多不盡公長孫无忌對曰此豈敢言無然肆情曲灋實亦不敢至於小小収取人情恐陛下尚不能免无忌以元舅輔政凡有所言上無不嘉納冬十一月辛酉上祀􅀯郊癸酉詔自今京官及外州有獻鷹隼及犬馬者罪之戊寅特浪羌酋董悉奉求辟惠羌酋卜檐莫各帥種落萬餘户詣茂州内附竇州義州蠻酋李寳誠等反桂州都督劉伯英討平之郎州道揔管趙孝祖討白水蠻蠻酋秃磨蒲及儉彌于帥衆據險拒戰孝祖皆擊斬之會大雪蠻飢凍死亡略盡孝祖奏言貞觀中討昆州烏蠻始開青蛉弄棟為州縣弄棟之西有小勃弄大勃弄二川􅁪扇誘弄棟欲使之反其勃弄以西與黄􅀲葉榆西洱河相接人衆殷實多於蜀川無大酋長好結讎怨今因破白水之兵請隨便西討撫而安之敕許之十二月壬子處月朱邪孤注殺招慰使單道惠與突厥賀魯相結是歲百濟遣使入貢上戒之使勿與新羅髙麗相攻不然吾將􅀤兵討汝矣三年春正月己未朔吐谷渾新羅髙麗百濟並遣使入貢癸亥梁建方契苾何力等大破處月朱邪孤注於牢山孤注夜遁建方使副揔管髙德逸輕騎追之行五百餘里生擒孤注斬首九千級軍還御史劾奏梁建方兵力足以追討而逗留不進髙德逸敕令市馬自取駿者上以建方等有功釋不問大理卿李道􅁉奏言德逸所取之馬筋力異常請實中廐上謂侍臣曰道􅁉灋官進馬非其本職妄希我意豈朕行事不為臣下所信邪朕方自咎故不復黜道􅁉耳己巳以同州刺史褚遂良為吏部尚書同中書門下三品丙子上饗太廟丁亥饗先農躬耕籍田二月甲寅上御安褔門樓觀百戲乙卯上謂侍臣曰昨登樓欲以觀人情及風俗奢儉非為聲樂朕聞胡人善為擊鞠之戲嘗一觀之昨􅀄升樓即有羣胡擊鞠意謂朕篤好之也帝王所為豈宜容易朕已焚此鞠兾杜胡人窺望之情亦因以自誡三月辛巳以宇文節為侍中柳奭為中書令以兵部侍郎三原韓瑗守黄門侍郎同中書門下三品夏四月趙孝祖大破西南蠻斬小勃弄酋長歿盛擒大勃弄酋長楊承顚自餘皆屯聚保險大者有衆數萬小者數千人孝祖皆破降之西􅀯蠻遂定甲午澧州刺史彭思王元則薨六月戊申遣兵部尚書崔敦禮等將并汾歩騎萬人往茂州發薛延陀餘衆度河置祁連州以處之秋七月丁巳立陳王忠爲皇太子赦天下王皇后無子柳奭爲后謀以忠母劉氏微賤勸后立忠爲太子兾其親已外則諷長孫无忌等使請於上上從之乙丑以于志寧兼太子少師張行成兼少􅀓髙季輔兼少保丁丑上問户部尚書髙履行去年進户多少履行奏去年進户揔一十五萬因問隋代及今日見户履行奏隋開皇中户八百七十萬即今户三百八十萬履行士廉之子也九月守中書侍郎來濟同中書門下三品冬十一月庚寅弘化長公主自吐谷渾來朝癸巳濮恭王泰薨於均州散騎常侍房遺愛尚太宗女髙陽公主公主驕恣甚房玄齡薨公主教遺愛與兄遺直異財既而反譖遺直遺直自言太宗深責讓主由是寵衰主怏怏不恱㑹御史劾盗得浮屠辯機寳枕云主所賜主與辯機私通餉遺億計更以二女子侍遺愛太宗怒腰斬辯機殺奴婢十餘人主益怨望太宗崩無戚容上即位主又令遺愛與遺直更相訟遺愛坐出為房州刺史遺直為隰州刺史又浮屠智朂等數人私侍主主使掖廷令陳玄運伺宫省禨祥先是駙馬都尉薛萬徹坐事除名徙寧州刺史入朝與遺愛􅅃昵對遺愛有怨望語且曰今雖病足坐置京師䑕輩猶不敢動因與遺愛謀若國家有變當奉司徒荆王元景為主元景女適遺愛弟遺則由是與遺愛往來元景嘗自言夢手把日月駙馬都尉柴令武紹之子也尚巴陵公主除衛州刺史託以主疾留京師求醫因與遺愛謀議相結髙陽公主謀黜遺直奪其封爵使人誣告遺直无禮於己遺直亦言遺愛及主罪云罪盈惡稔恐累臣私門上令長孫无忌鞠之更獲遺愛及主反狀司空安州都督吳王恪母隋煬帝女也恪有文武才太宗常以為類已欲立為太子无忌固爭而止由是與无忌相惡恪名望素髙為物情所向无忌深忌之欲因事誅恪以絶衆望遺愛知之因言與恪同謀兾如紇干承基得免死四年春二月甲申詔遺愛萬徹令武皆斬元景恪髙陽巴陵公主並賜自盡上泣謂侍臣曰荆王朕之叔父吳王朕兄欲匄其死可乎兵部尚書崔敦禮以為不可乃殺之萬徹臨刑大言曰薛萬徹大健兒留為國家効死力豈不佳乃坐房遺愛殺之乎吳王恪且死罵曰長孫无忌竊弄威權構害良善宗社有靈當族滅不乆乙酉侍中兼太子詹事宇文節特進太常卿江夏王道宗左驍衛大將軍駙馬都尉執失思力並坐與房遺愛交通流嶺表節與遺愛親善及遺愛下獄節頗左右之江夏王道宗素與長孫无忌褚遂良不恊故皆得罪戊子廢恪母弟蜀王愔為庶人置巴州房遺直貶春州銅陵尉萬徹弟萬備流交州罷房玄齡配饗開府儀同三司李勣為司空初林邑王范頭利卒子眞龍立大臣伽獨弑之盡滅范氏伽獨自立國人弗從乃立頭利之壻婆羅門為王國人咸思范氏復廢婆羅門立頭利之女為王女不能治國有諸葛地者頭利之姑子也父為頭利所殺􅀯奔眞臘大臣可倫翁定遣使迎而立之妻以女王衆然後定夏四月戊子遣使入貢秋九月壬戌右僕射北平定公張行成薨甲戌以褚遂良為右僕射同中書門下三品如故仍知選事冬十月庚子上幸驪山温湯乙巳還宫初睦州女子陳碩眞以妖言惑衆與妹夫章叔胤舉兵反自稱文佳皇帝以叔胤為僕射甲子夜叔胤帥衆攻桐廬陷之碩眞撞鍾焚香引兵二千攻陷睦州及於潛進攻歙州不克敕􅀭州刺史房仁裕􅀤兵討之碩眞遣其黨童文寳將四千人寇婺州刺史崔義玄發兵拒之民間訛言碩眞有神犯其兵者必滅族士衆兇懼司功參軍崔玄籍曰起兵仗順猶且無成況慿妖妄其能乆乎義玄以玄籍為前鋒自將州兵繼之至下淮戍遇賊與戰左右以楯蔽義玄義玄曰刺史避箭人誰致死命撤之於是士卒齊奮賊衆大潰斬首數千級聼其餘衆歸首進至睦州境降者萬計十一月庚戌房仁􅁉軍合獲碩眞叔胤斬之餘黨悉平義玄以功拜御史大夫癸丑以兵部尚書崔敦禮為侍中十二月庚子侍中蓨憲公髙季輔薨是歲西突厥乙毗咄陸可汗卒其子頡苾逹度設號眞珠葉護始與沙鉢羅可汗有隙與五弩失畢共撃沙鉢羅破之斬首千餘級五年春正月壬戌羌酋凍就內附以其地置劒州三月戊午上行幸萬年宫庚申加贈武德功臣屈突通等十三人官􅀄王皇后無子蕭淑妃有寵王后疾之上之為太子也入侍太宗見才人武氏而恱之太宗崩武氏隨衆感業寺為尼忌日上詣寺行香見之武氏泣上亦泣王后聞之隂令武氏長髪勸上內之後宫欲以間淑妃之寵武氏巧慧多權數􅀄入宫卑辭屈體以事后后愛之數稱其美於上未幾大幸拜為昭儀后及淑妃寵皆衰更相與共譛之上皆不納昭儀欲追贈其父而無名故託以褒賞功臣徧贈屈突通等而武士彠預焉乙丑上幸鳯泉湯巳巳還萬年宫夏四月大食發兵擊波斯殺波斯王伊嗣矦伊嗣矦之子卑路斯奔吐火羅大食兵去吐火羅發兵立卑路斯為波斯王而還閏月丙子以處月部置金滿州丁丑夜大雨山水漲溢衝玄武門宿衛士皆散走右領軍郎將薛仁貴曰安有宿衛之士天子有急而敢畏死乎乃登門桄大呼以警宫内上遽出乗髙俄而水入寢殿水漂溺衛士及麟遊居人死者三千餘人壬辰新羅女王金眞德卒詔立其弟春秋為新羅王六月丙午􅁪州大水呼沱溢漂溺五千三百家中書令柳奭以王皇后寵衰內不自安請解政事癸亥罷為吏部尚書秋七月丁酉車駕至京師戊戌上謂五品以上曰頃在先帝左右見五品以上論事或仗下面陳或退上封事終日不絶豈今日獨無事邪何公等皆不言也冬十月雇雍州四萬一千人築長安外郭三旬而畢癸丑雍州參軍薛景宣上封事言漢惠帝城長安尋晏駕今復城之必有大咎于志寧等以景宣言渉不順請誅之上曰景宣雖狂妄􅀂因上封事得罪恐絶言路遂赦之髙麗遣其將安固將髙麗靺鞨兵擊契丹松漠都督李窟哥禦之大敗髙麗於新城是歲大稔洛州粟米斗两錢半秔米斗十一錢王皇后蕭淑妃與武昭儀更相譛訴上不信后淑妃之語獨信昭儀后不能曲事上左右母魏國夫人柳氏及舅中書令柳奭入見六宫又不爲禮武昭儀伺后所不敬者必傾心與相結所得賞賜分與之由是后及淑妃動静昭儀必知之皆以聞於上后寵雖衰然上未有意廢也㑹昭儀生女后憐而弄之后出昭儀潛扼殺之覆之以被上至昭儀陽歡笑發被觀之女已死矣即驚啼問左右左右皆曰皇后適來此上大怒曰后殺吾女昭儀因泣數其罪后無以自明上由是有廢立之志又畏大臣不從乃與昭儀幸太尉長孫无忌第酣飲極驩席上拜无忌寵􅁎子三人皆為朝散大夫仍載金寳繒錦十車以賜无忌上因從容言皇后無子以諷无忌无忌對以佗語竟不順旨上及昭儀皆不恱而罷昭儀又令母楊氏詣无忌第屢有祈請无忌終不許禮部尚書許敬宗亦數勸无忌无忌厲色折之六年春正月壬申朔上謁昭陵甲戌還宫己丑嶲州道行軍揔管曹繼叔破胡叢顯養車魯等蠻於斜山拔十餘城庚寅立皇子弘為代王賢為潞王髙麗與百濟靺鞨連兵侵新羅北境取三十三城新羅王春秋遣使求援二月乙丑遣營州都督程名振左衛中郎將蘇定方發兵擊髙麗夏五月壬午名振等度遼水髙麗見其兵少開門度貴端水逆戰名振等奮擊大破之殺獲千餘人焚其外郭及村落而還癸未以左屯衛大將軍程知節為葱山道行軍大揔管以討西突厥沙鉢羅可汗壬辰以韓瑗為侍中來濟為中書令六月武昭儀誣王后與其母魏國夫人柳氏為厭勝敕禁后母柳氏不得入宫秋七月戊寅貶吏部尚書柳奭爲遂州剌史奭行至扶風岐州長史于承素希旨奏奭漏洩禁中語復貶榮州刺史唐因隋制後宫有貴妃淑妃德妃賢妃皆視一品上欲特置宸妃以武昭儀為之韓瑗來濟諫以為故事無之乃止中書舍人饒陽李義府為長孫无忌所惡左遷壁州司馬敕未至門下義府密知之問計於中書舍人幽州王德儉德儉曰上欲立武昭儀為后猶豫未決者直恐宰臣異議耳君能建策立之則轉禍為福矣義府然之是日代德儉直宿叩閤上表請廢皇后王氏立武昭儀以厭兆庶之心上恱召見與語賜珠一斗留居舊職昭儀又密遣使勞勉之尋超拜中書侍郎於是衛尉卿許敬宗御史大夫崔義玄中丞袁公瑜皆潛布腹心於武昭儀矣乙酉以侍中崔敦禮為中書令八月尚藥奉御蔣孝璋員外特置仍同正員員外同正自孝璋始長安令裴行儉聞將立武昭儀為后以國家之禮必由此始與長孫无忌褚遂良私議其事袁公瑜聞之以告昭儀母楊氏行儉坐左遷西州都督府長史行儉仁基之子也九月戊辰以許敬宗為禮部尚書上一日退朝召長孫无忌李勣于志寧褚遂良入内殿遂良曰今日之召多為中宫上意既決逆之必死太尉元舅司空功臣不可使上有殺元舅及功臣之名遂良起於草茅無汗馬之勞致位至此且受顧託不以死爭之何以下見先帝勣稱疾不入无忌等至内殿上顧謂无忌曰皇后無子武昭儀有子今欲立昭儀為后何如遂良對曰皇后名家先帝為陛下所娶先帝臨崩執陛下手謂臣曰朕佳兒佳婦今以付卿此陛下所聞言猶在耳皇后未聞有過豈可輕廢臣不敢曲從陛下上違先帝之命上不恱而罷明日又言之遂良曰陛下必欲易皇后伏請妙擇天下令族何必武氏武氏經事先帝衆所共知天下耳目安可蔽也萬代之後謂陛下為如何願留三思臣今忤陛下意罪當死因置笏於殿階解巾叩頭流血曰還陛下笏乞放歸田里上大怒命引出昭儀在簾中大言曰何不撲殺此獠无忌曰遂良受先朝顧命有罪不可加刑于志寧不敢言韓瑗因間奏事涕泣極諫上不納明日又諫悲不自勝上命引出瑗又上䟽諌曰匹夫匹婦猶相選擇況天子乎皇后母儀萬國善惡由之故嫫母輔佐黄帝妲己傾覆殷王詩云赫赫宗周襃姒滅之毎覽前古常興歎息不謂今日塵黷聖代作而不灋後嗣何觀願陛下詳之无為後人所笑使臣有以益國葅醢之戮臣之分也昔吳王不用子胥之言而麋鹿遊於姑蘇臣恐海內失望棘荆生於闕庭宗廟不血食期有日矣來濟上表諫曰王者立后上灋乾坤必擇禮教名家幽閑令淑副四海之望稱神祗之意是故周文造舟以迎太姒而興關雎之化百姓蒙祚孝成縱欲以婢為后使皇統亡絶社稷傾淪有周之隆既如彼大漢之禍又如此惟陛下詳察上皆不納它日李勣入見上問之曰朕欲立武昭儀為后遂良固執以為不可遂良既顧命大臣事當且己乎對曰此陛下家事何必更問外人上意遂決許敬宗宣言於朝曰田舍翁多収十斛麥尚欲易婦況天子立一后何豫諸人事而妄生異議乎昭儀令左右以聞庚午貶遂良為潭州都督資治通鑑卷第一百九十九
