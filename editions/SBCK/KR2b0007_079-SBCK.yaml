body:
  text: 丙午立皇后􅀪農楊氏后魏通事郎文宗之女也羣臣奏五帝即天帝也王氣時異故名號有五自今明堂南郊宐除五帝座從之帝王肅外孫也故郊祀之禮有司多從肅議二月除漢宗室禁錮三月戊戌吳遣大鴻臚張儼五官中郎將丁忠來弔祭吳散騎常侍廬江王蕃體氣高亮不能承顔順指吳主不恱散騎常侍萬彧中書丞陳聲從而譛之丁忠使還吳主大㑹羣臣蕃沈醉頓伏吳主疑其詐轝蕃出外頃之召還蕃好治威儀行止自若吳主大怒呵左右於殿下斬之出登來山使親近擲蕃首作虎跳狼爭咋齧之首皆碎壞丁忠説吳主曰北方無守戰之僃弋陽可襲而取吳主以問羣臣鎮西大将軍陸凱曰北方新并巴蜀遣使求和非求援於我也欲蓄力以俟時耳敵埶方彊而欲徼幸求勝未見其利也吳主雖不出兵然遂與晉絶凱遜之族子也夏五月壬子博陵元公王沈卒六月丙午晦日有食之文帝之䘮臣民皆從權制三日除服既葬帝亦除之然猶素冠䟽食哀毁如居喪者秋八月帝將謁崇陽陵羣臣奏言秋暑未平恐帝悲感摧傷帝曰朕得奉瞻山陵體氣自佳耳又詔曰漢文不使天下盡哀亦帝王至謙之志當見山陵何心無服其議以衰絰從行羣臣自依舊制尚書令裴秀奏曰陛下既除而復服義無所依若君服而臣不服亦未之敢安也詔曰患情不能􅉥及耳衣服何在諸君勤勤之至豈茍相違遂止中軍将軍羊祜謂傅􅀇曰三年之䘮雖貴遂服禮也而漢文除之毁禮傷義今主上至孝雖奪其服實行喪禮若因此復先王之灋不亦善乎􅀇曰以日易月已數百年一旦復古難行也祜曰不能使天下如禮且使主上遂服不猶愈乎􅀇曰主上不除而天下除之此為但有父子無復君臣也乃止戊辰羣臣奏請易服復膳詔曰每感念幽􅁳而不得終苴絰之禮以為沈痛况當食稻衣錦乎適足激切其心非所以相解也朕本諸生家傳禮來乆何至一旦便易此情於所天相從已多可試省孔子荅宰我之言無事紛紜也遂以䟽素終三年臣光曰三年之喪自天子逹于庶人此先王禮經百世不易者也漢文師心不學變古壞禮絶父子之恩虧君臣之義後世帝王不能篤於哀戚之情而羣臣謟䛕莫肯釐正至於晉武獨以天性矯而行之可謂不世之賢君而裴傅之徒固陋庸臣習常玩故不能將順其美惜哉吳改元寶鼎吳主以陸凱為左丞相萬彧為右丞相吳主惡人視已羣臣侍見莫敢舉目陸凱曰君臣無不相識之道若猝有不虞不知所赴吳主乃聽凱自視而它人如故吳主居武昌揚州之民泝流供給甚苦之又奢侈無度公私窮匱凱上䟽曰今四邊無事當務養民豐財而更窮奢極欲無災而民命盡無為而國財空臣竊痛之昔漢室既衰三家鼎立今曹劉失道皆為晉有此目前之明驗也臣愚但為陛下惜國家耳武昌土地危險塉确非王者之都且童謠云寜飲建業水不食武昌魚寧還建業死不止武昌居以此觀之足明民心與天意矣今國無一年之蓄民有離散之怨國有露根之漸而官吏務為苛急莫之或恤大帝時後宫列女及諸織絡數不滿百景帝以來乃有千數此耗財之甚者也又左右之臣率非其人羣黨相扶害忠隱賢此皆蠹政病民者也臣願陛下省息百役罷去苛擾料出宫女清選百官則天恱民附國家永安矣吳主雖不恱以其㝛望特優容之九月詔自今雖詔有所欲及已奏得可而於事不便者皆不可隱情戊戍有司奏大晉受禪於魏宐一用前代正朔服色如虞遵唐故事從之冬十月丙午朔日有食之永安山賊施但因民勞怨聚衆數千人刼吳主庶弟永安侯謙作亂比至建業衆萬餘人未至三十里住擇吉日入城遣使以謙命召丁固諸葛靚固靚斬其使發兵逆戰於牛屯但兵皆無甲胄即時敗散謙獨坐車中生獲之固不敢殺以狀白吳主吳主并其母及弟俊皆殺之初望氣者云荆州有王氣當破揚州故吳主徙都武昌及但反自以為得計遣數百人鼓譟入建業殺但妻子云天子使荆州兵來破揚州賊十一月初并圓丘方丘之祀於南北郊罷山陽公國督軍除其禁制十二月吳主還都建業使后父衛將軍錄尚書事滕牧留鎮武昌朝士以牧尊戚頗推令諫爭滕后之寵由是漸衰更遣牧居蒼梧雖爵位不奪其實遷也在道以憂死何太后常保佑滕后太史又言中宫不可易吳主信巫覡故得不廢常供養升平宫不復進見諸姬佩皇后璽紱者甚衆滕后受朝賀表䟽而已吳主使黄門徧行州郡料取将吏家女其二千石大臣子女皆歳歳言名年十五六一簡閲簡閲不中乃得出嫁後宫以千數而採擇無已三年春正月丁卯立子衷為皇太子詔以近世每立太子必有赦今世運將平當示之以好惡使百姓絶多幸之望曲惠小人朕無取焉遂不赦司􅀠校尉上黨李憙劾奏故立進令劉友前尚書山濤中山王睦尚書僕射武陔各占官稻田請免濤睦等官陔已亡請貶其謚詔曰友侵剥百姓以謬惑朝士其考竟以懲邪佞濤等不貳其過皆勿有所問憙亢志在公當官而行可謂邦之司直矣光武有云貴戚且歛手以避二鮑其申敕羣寮各慎所司寛宥之恩不可數遇也睦宣帝之弟子也臣光曰政之大本在於刑賞刑賞不明政何以成晉武帝赦山濤而褒李憙其於刑賞兩失之使憙所言為是則濤不可赦所言為非則憙不足褒褒之使言言而不用怨結於下威玩於上将安用之且四臣同罪劉友伏誅而濤等不問避貴施賤可謂政乎創業之初而政本不立將以垂統後世不亦難乎帝以李憙為太子太傅徴犍為李密為洗馬密以祖母老固辭許之密與人交每公議其得失而切責之常言吾獨立於世顧影無儔然而不懼者以無彼此於人故也吳大赦以右丞相萬彧鎮巴丘夏六月吳主作昭明宫二千石以下皆自入山督伐木大開苑囿起土山樓觀窮極伎巧功役之費以億萬計陸凱諫不聽中書丞華覈上䟽曰漢文之世九州晏然賈誼獨以為如抱火厝於積薪之下而寢其上今大敵據九州之地有太半之衆欲與國家為相吞之計非徒漢之淮南濟北而已也比於賈􅁩之世孰為緩急今倉庫空匱編戶失業而北方積榖養民専心東向又交趾淪没嶺表動揺胷背有嫌首尾多難乃國朝之厄會也若舍此急務盡力功作卒有風塵不虞之變當委版築而應烽燧驅怨民而赴白刃此乃大敵所因以為資者也時吳俗奢侈覈又上䟽曰今事多而役繁民貧而俗奢百工作無用之器婦人為綺靡之飾轉相倣效恥獨無有兵民之家猶復逐俗内無甔石之儲而出有綾綺之服上無尊卑等級之差下有耗財費力之損求其富給庸可得乎吳主皆不聽秋七月王祥以睢陵公罷九月甲申詔増吏俸以何曾為太保義陽王望為太尉荀顗為司徒禁星氣䜟緯之學吳主以孟仁守丞相奉灋駕東迎其父文帝神於明陵中使相繼奉問起居巫覡言見文帝被服顔色如平生吳主悲喜迎拜於東門之外既入廟比七日三祭設諸倡􅇊晝夜娛樂是歳遣鮮卑拓䟦沙漠汗歸其國四年春正月丙戌賈充等上所刋修律令帝親自臨講使尚書郎裴楷執讀楷秀之從弟也侍中盧珽中書侍郎范陽張華請抄新律死罪條目懸之亭傳以示民從之又詔河南尹杜預為黜陟之課預奏古者黜陟擬議於心不泥於灋末世不能紀逺而專求密微疑心而信耳目疑耳目而信簡書簡書愈繁官方愈偽魏氏考課即京房之遺意其文可謂至密然失於苛細以違本體故歷代不能通也豈若申唐堯之舊制取大捨小去密就簡俾之易從也夫曲盡物理神而明之存乎其人去人而任灋則以文傷理莫若委任逹官各考所統歳第其人言其優劣如此六載主者㧾集採案其言六優者超擢六劣者廢免優多劣少者平叙劣多優少者左遷其閒所對不鈞品有難易主者固當凖量輕重㣲加降殺不足曲以灋盡也其有優劣徇情不叶公論者當委監司隨而彈之若令上下公相容過此為清議大頽雖有考課之灋亦無益也事竟不行丁亥帝耕籍田於洛水之北戊子大赦二月吳主以左御史大夫丁固為司徒右御史大夫孟仁為司空三月戊子皇太后王氏殂帝居䘮之制一遵古禮夏四月戊戍睢陵元公王祥卒門無雜弔之賔其族孫戎歎曰太保當正始之世不在能言之流及間與之言理致清逺豈非以徳掩其言乎己亥葬文明皇后有司又奏既虞除衰服詔曰受終身之愛而無數年之報情所不忍也有司固請詔曰患在不能篤孝勿以毁傷為憂前代禮典質文不同何必限以近制使逹䘮闕然乎羣臣請不已乃許之然猶素冠䟽食以終三年如文帝之䘮秋七月衆星西流如雨而隕己卯帝謁崇陽陵九月青徐兖豫四州大水大司馬石苞乆在淮南威惠甚著淮北監軍王琛惡之密表苞與吳人交通㑹吳人將入宼苞築壘遏水以自固帝疑之羊祜深為帝言苞必不然帝不信乃下詔以苞不料賊埶築壘遏水勞擾百姓䇿免其官遣義陽王望帥大軍以徴之苞辟河内孫鑠為掾鑠先與汝隂王駿善駿時鎮許昌鑠過見之駿知臺已遣軍襲苞私告之曰無與於禍鑠既出馳詣夀春勸苞放兵歩出都亭待罪苞從之帝聞之意解苞詣闕以樂陵公還第吳主出東關冬十月使其將施績入江夏萬彧宼襄陽詔義陽王望統中軍歩騎二萬屯龍陂為二方聲援㑹荆州刺史胡烈拒績破之望引兵還吳交州刺史劉俊大都督脩則將軍顧容前後三攻交趾交趾太守楊稷皆拒破之鬱林九真皆附於稷稷遣將軍毛炅董元攻合浦戰於古城大破吳兵殺劉俊脩則餘兵散還合浦稷表炅為鬱林太守元為九真太守十一月吳丁奉諸葛靚出芍陂攻合肥安東將軍汝隂王駿拒却之以義陽王望為大司馬荀顗為太尉石苞為司徒五年春正月吳王立子瑾為皇太子二月分雍涼梁州置秦州以胡烈爲刺史先是鄧艾納鮮卑降者數萬置於雍涼之間與民雜居朝廷恐其乆而為患以烈素著名於西方故使鎮撫之青徐兖三州大水帝有滅吳之志壬寅以尚書左僕射羊祜都督荆州諸軍事鎮襄陽征東大將軍衛瓘都督青州諸軍事鎮臨菑鎮東大將軍東莞王伷都督徐州諸軍事鎮下邳祜綏懷逺近甚得江漢之心與吳人開布大信降者欲去皆聽之減戍邏之卒以墾田八百餘頃其始至也軍無百日之糧及其季年乃有十年之積祜在軍常輕裘緩帶身不􅀍甲鈴閤之下侍衛不過十數人濟隂太守巴西文立上言故蜀之名臣子孫流徙中國者宐量才叙用以慰巴蜀之心傾吳人之望帝從之已未詔曰諸葛亮在蜀盡其心力其子瞻臨難而死義其孫京宐隨才署吏又詔曰蜀將傅僉父子死於其主天下之善一也豈由彼此以為異哉僉息著募没入奚官宐免為庶人帝以文立為散騎常侍漢故尚書犍為程瓊雅有徳業與立深交帝聞其名以問立對曰臣至知其人但年垂八十禀性謙退無復當時之望故不以上聞耳瓊聞之曰廣休可謂不黨矣此吾所以善夫人也秋九月有星孛于紫宫冬十月吳大赦改元建衡封皇子景度為城陽王初汝南何定嘗為吳大帝給使及吳主即位自表先帝舊人求還内侍吳主以爲樓下都尉典知酤糴事遂専為威福吳主信任之委以衆事左丞相陸凱面責定曰卿見前後事王不忠傾亂國政寧有得以夀終者邪何以専為姦邪塵穢天聽宐自改厲不然方見卿有不測之禍定大恨之凱竭心公家忠懇內發表䟽皆指事不飾及疾病吳主遣中書令董朝問所欲言凱陳何定不可信用宐授以外任奚熈小吏建起浦里田亦不可聽姚信樓􅀇賀邵張悌郭逴薛瑩滕脩及族弟喜抗或清曰忠勤或資才卓茂皆社稷之良輔願陛下重留神思訪以時務使各盡其忠拾遺萬一邵齊之孫瑩綜之子􅀇沛人脩南陽人也凱尋卒吳主素衘其切直且日聞何定之譖乆之竟徙凱家於建安吳主遣監軍虞汜威南将軍薛珝蒼梧太守丹陽陶璜從荆州道監軍李朂督軍徐存從建安海道皆㑹於合浦以擊交阯十二月有司奏東宫施敬二傅其儀不同帝曰夫崇敬師傅所以尊道重教也何言臣不臣乎其令太子申拜禮六年春正月吳丁奉入渦口揚州刺史牽􅀪擊走之吳萬彧自巴丘還建業夏四月吳左大司馬施績卒以鎮軍大將軍陸抗都督信陵西陵夷道樂鄉公安諸軍事治樂鄉抗以吳主政事多闕上䟽曰臣聞徳均則衆者勝寡力侔則安者制危此六國所以并於秦西楚所以屈於漢也今敵之所據非特關右之地鴻溝以西而國家外無連衡之援內非西楚之彊庶政陵遟黎民未叉議者所恃徒以長江峻山限帶封域此乃守國之末事非智者之所先也臣毎念及此中夜撫枕臨餐忘食夫事君之義犯而勿欺謹陳時宐十七條以聞吴主不納李朂以建安道不利殺導將馮斐引軍還初何定嘗為子求婚於勗勗不許乃白勗枉殺馮斐擅徹軍還誅勗及徐存并其家屬仍焚勗尸定又使諸將各上御犬一犬至直縑數十匹纓紲直錢一萬以捕兎供厨吴人皆歸罪於定而吳主以為忠勤賜爵列矦陸抗上䟽曰小人不明理道所見既淺雖使竭情盡節猶不足任況其姦心素篤而憎愛移易哉吳主不從六月戊午胡烈討鮮卑秃髪樹機能於萬斛堆兵敗被殺都督雍涼州諸軍事扶風王亮遣将軍劉旂救之旂觀望不進亮坐貶為平西将軍旂當斬亮上言節度之咎由亮而出乞丐旂死詔曰若罪不在旂當有所在乃免亮官遣尚書樂陵石鑒行安西将軍都督秦州諸軍事討樹機能樹機能兵盛鑒使秦州刺史杜預出兵擊之預以虜乘勝馬肥而官軍縣乏宜并力大運芻糧須春進討鑒奏預稽乏軍興檻車徴詣廷尉以贖論既而鑒討樹機能卒不能克秋七月乙巳城陽王景度卒丁未以汝隂王駿為鎮西大将軍都督雍涼等州諸軍事鎮關中冬十一月立皇子東為汝南王吳主從弟前将軍秀為夏口督吳主惡之民閒皆言秀當見圖㑹吴主遣何定将兵五千人獵夏口秀驚夜将妻子親兵數百人來犇十二月拜秀票騎將軍開府儀同三司封㑹稽公是歳吳大赦初魏人居南匈奴五部於并州諸郡與中國民雜居自謂其先漢氏外孫因改姓劉氏七年春正月匈奴右賢王劉猛叛出塞豫州刺史石鑒坐擊吳軍虛張首級詔曰鑒僃大臣吾所取信而乃下同為詐義得爾乎今遣歸田里終身不得復用吳人刀玄詐増䜟文云黄旗紫蓋見於東南終有天下者荆揚之君吳主信之是月晦大舉兵出華里載太后皇后及後宫數千人從牛渚西上東觀令華覈等固諫不聽行遇大雪道塗䧟壞兵士被甲持仗百人共引一車寒凍殆死皆曰若遇敵便當倒戈吳主聞之乃還帝遣義陽王望統中軍二萬騎三千屯夀春以僃之聞吳師退乃罷三月丙戍鉅鹿元公裴秀卒夏四月吳交州刺史陶璜襲九真太守董元殺之楊稷以其将王素代之北地胡宼金城凉州刺史牽􅀪討之衆胡皆內叛與樹機能共圍􅀪於青山􅀪軍敗而死初大司馬陳騫言於帝曰胡烈牽􅀪皆勇而無謀彊於自用非綏邊之材也将為國恥時􅀪為揚州刺史多不承順騫命帝以為騫與􅀪不恊而毁之於是徴􅀪既至尋復以為凉州刺史騫竊歎息以為必敗二人果失羗戎之和兵敗身没征討連年僅而能定帝乃悔之五月立皇子憲為城陽王辛丑義陽成王望卒侍中尚書令車騎将軍賈充自文帝時寵任用事帝之為太子充頗有力故益有寵於帝充為人巧謟與太尉行太子太傅荀顗侍中中書監荀勗越騎校尉安平馮紞相為黨友朝野惡之帝問侍中裴楷以方今得失對曰陛下受命四海承風所以未比徳於堯舜者但以賈充之徒尚在朝耳宐引天下賢人與􅀪政道不宐示人以私侍中樂安任愷河南尹潁川庾純皆與充不恊充欲解其近職乃薦愷忠貞宐在東宫帝以愷為太子少傅而侍中如故㑹樹機能亂秦雍帝以為憂愷曰宐得威望重臣有智畧者以鎮撫之帝曰誰可者愷因薦充純亦稱之秋七月癸酉以充為都督秦涼二州諸軍事侍中車騎将軍如故充患之吳大都督薛珝與陶璜等兵十萬共攻交趾城中糧盡援絶為吳所䧟虜揚稷毛炅等璜愛炅勇徤欲活之炅謀殺璜璜乃殺之脩則之子允生剖其腹割其肝曰復能作賊不炅猶罵曰恨不殺汝孫皓汝父何死狗也王素欲逃歸南中呉人獲之九真日南皆降於吳吳大赦以陶璜為交州牧璜討降夷獠州境皆平八月丙申城陽王憲卒分益州南中四郡置寧州九月吳司空孟仁卒冬十月丁丑朔日有食之十一月劉猛宼并州并州刺史劉欽等擊破之賈充将之鎮公卿餞於夕陽亭充私問計於荀勗勗曰公為宰相乃為一夫所制不亦鄙乎然是行也辭之實難獨有結婚太子可不辭而自留矣充曰然孰可寄懷勗曰勗請言之因謂馮紞曰賈公逺出吾等失埶太子婚尚未定何不勸帝納賈公之女乎紞亦然之初帝将納衛瓘女為太子妃充妻郭槐賂楊后左右使后説帝求納其女帝曰衛公女有五可賈公女有五不可衛氏種賢而多子羙而長白賈氏種妬而少子醜而短黒后固以為請荀顗荀勗馮紞皆稱充女絶美且有才徳帝遂從之留充復居舊任十二月以光禄大夫鄭袤為司空袤固辭不受是歳安樂思公劉禪卒吳以武昌都督廣陵范慎為太尉右将軍司馬丁奉卒吴改明年元曰鳯八年春正月監軍何楨討劉猛屢破之濳以利誘其左部帥李恪恪殺猛以降二月辛夘皇太子納賈妃妃年十五長於太子二歳妬忌多權詐太子嬖而畏之壬辰安平獻王孚卒年九十三孚性忠慎宣帝執政孚常自退損後逢廢立之際未嘗預謀景文二帝以孚屬尊亦不敢逼及帝即位恩禮尤重元㑹詔孚乗輿上殿帝於阼階迎拜既坐親奉觴上夀如家人禮帝每拜孚跪而止之孚雖見尊寵不以為榮常有憂色臨終遺令曰有魏貞士河内司馬孚字叔逹不伊不周不夷不惠立身行道終始若一當衣以時服歛以素棺詔賜東園温明祕器諸所施行皆依漢東平獻王故事其家遵孚遺㫖所給器物一不施用帝與右将軍皇甫陶論事陶與帝爭言散騎常侍鄭徽表請罪之帝曰忠讜之言唯患不聞徽越職妄奏豈朕之意遂免徽官夏汶山白馬胡侵掠諸種益州刺史皇甫晏欲討之典學從事蜀郡何玈等諫曰胡夷相殘固其常性未為大患今盛夏出軍水潦將降必有疾疫宐須秋冬圖之晏不聽胡康木子燒香言軍出必敗晏以為沮衆斬之軍至觀阪牙門張􅀪等以汶山道險且畏胡衆因夜作亂殺晏軍中驚擾兵曹從事犍為楊倉勒兵力戰而死􅀪遂誣晏云率已共反故殺之傳首京師晏主簿蜀郡何攀方居母喪聞之詣洛證晏不反􅀪等縱兵抄掠廣漢主簿李毅言於太守弘農王濬曰皇甫侯起自諸生何求而反且廣漢與成都密邇而統於梁州者朝廷欲以制益州之衿領正防今日之變也今益州有亂乃此郡之憂也張􅀪小豎衆所不與宐即時赴討不可失也濬欲先上請毅曰殺主之賊為惡尤大當不拘常制何請之有濬乃發兵討弘詔以濬為益州刺史濬擊􅀪斬之夷三族封濬關内侯初濬為羊祜參軍祜深知之祜兄子暨白濬為人志大奢侈不可專任宐有以裁之祜曰濬有大才将以濟其所欲必可用也更轉為車騎從事中郎濬在益州明立威信蠻夷多歸附之俄遷大司農時帝與羊祜隂謀伐吳祜以為伐吳宐藉上流之埶密表留濬復為益州刺史使治水軍㝷加龍驤将軍監益梁諸軍事詔濬罷屯田兵大作舟艦别駕何攀以為屯田兵不過五六百人作船不能猝辦後者未成前者已腐宐召諸郡兵合萬餘人造之嵗終可成濬欲先上須報攀曰朝廷猝聞召萬兵必不聽不如輙召設當見却功夫已成埶不得止濬從之令攀典造舟艦器仗於是作大艦長百二十歩受二千餘人以木為城起樓櫓開四出門其上皆得馳馬往來時作船木􅏄蔽江而下吳建平太守吳郡吾彦取流􅏄以白吳主曰晉必有攻吳之計宐增建平兵以塞其衝要吳主不從彥乃為鐵鎻横斷江路王濬雖受中制募兵而無虎符廣漢太守敦煌張斆收濬從事列上帝召斆還責曰何不宻啟而便収從事斆曰蜀漢絶逺劉僃嘗用之矣輙収臣猶以為輕帝善之壬辰大赦秋七月以賈充為司空侍中尚書令領兵如故充與侍中任愷皆為帝所寵任充欲専名埶而忌愷於是朝士各有所附朋黨紛然帝知之召充愷宴於式乾殿而謂之曰朝廷宜一大臣當和充愷各拜謝既而充愷以帝已知而不責愈無所憚外相崇重内怨益深充乃薦愷為吏部尚書愷侍覲轉希充因與荀勗馮紞承間共譖之愷由是得罪廢於家八月吳主徴昭武将軍西陵督歩闡闡世在西陵猝被徴自以失職且懼有讒九月據城來降遣兄子璣璿詣洛陽為任詔以闡為都督西陵諸軍事衛将軍開府儀同三司侍中領交州牧封宜都公冬十月辛未朔日有食之敦煌太守尹璩卒涼州刺史楊欣表敦煌令梁澄領太守功曹宋質輒廢澄表議郎令狐豐為太守楊欣遣兵擊之為質所敗吳陸抗聞歩闡叛亟遣将軍左弈吾彦等討之帝遣荆州刺史楊肇迎闡於西陵車騎将軍羊祜帥歩軍出江陵巴東監軍徐􅅌帥水軍擊建平以救闡陸抗敕西陵諸軍築嚴圍自赤谿至于故市内以圍闡外以禦晉兵晝夜催切如敵已至衆甚苦之諸将諫曰今宜及三軍之鋭急攻闡比晉救至必可拔也何事於圍以敝士民之力抗曰此城處勢既固糧榖又足且凡備禦之具皆抗所宿規今反攻之不可猝㧞北兵至而無僃表裏受難何以禦之諸将皆欲攻闡抗欲服衆心聽令一攻果無利圍僃始合而羊祜兵五萬至江陵諸将咸以抗不宜上抗曰江陵城固兵足無可憂者假令敵得江陵必不能守所損者小若晉據西陵則南山羣夷皆當擾動其患不可量也乃自帥衆赴西陵初抗以江陵之北道路平易敕江陵督張咸作大堰遏水漸漬平土以絶宼叛羊祜欲因所遏水以船運糧揚聲将破堰以通歩軍抗聞之使咸亟破之諸将皆惑屢諫不聽祜至當陽聞堰敗乃改船以車運糧大費功力十一月楊肇至西陵陸抗令公安督孫遵循南岸禦羊祜水軍督留慮拒徐􅅌抗自将大軍慿圍對肇将軍朱喬營都督俞贊亡請肇抗曰贊軍中舊吏知吾虛實吾常慮夷兵素不簡練若敵攻圍必先此處即夜易夷兵皆以精兵守之明日肇果攻故夷兵處抗命擊之矢石雨下肇衆傷死者相屬十二月肇計屈夜遁抗欲追之而慮歩闡畜力伺間兵不足分於是但鳴鼔戒衆若将追者肈衆匈懼悉解甲挺走抗使輕兵躡之肇兵大敗祜等皆引軍還抗遂㧞西陵誅闡及同謀将吏數十人皆夷三族自餘所請赦者數萬口東還樂鄉貌無矜色謙冲如常吳主加抗都䕶羊祜坐貶平南将軍楊肇免為庶人吳主既克西陵自謂得天助志益張大使術士尚廣筮取天下對曰吉庚子歳青蓋當入洛陽吳主喜不脩徳政専為兼并之計賈充與朝士宴飲河南尹庾純醉與充爭言充曰父老不歸供養卿為無天地純曰高貴鄉公何在充慙怒上表解職純亦上表自劾詔免純官仍下五府正其臧否石苞以為純榮官忘親當除名齊王攸等以為純於禮律未有違詔從攸議復以純為國子祭酒吳主之游華里也右丞相萬彧與右大司馬丁奉左将軍留平宻謀曰若至華里不歸社稷事重不得不自還吳主頗聞之以彧等舊臣隱忍不發是歳吳主因㑹以毒酒飲彧傳酒人私减之又飲留平平覺之服他藥以解得不死彧自殺平憂懣月餘亦死徙彧子弟於廬陵初彧請選忠清之士以補近職吳主以大司農樓􅀇為宫下鎮主殿中事􅀇正身帥衆奉灋而行應對切直吳主浸不悦中書令領太子太傅賀邵上疏諫曰自頃年以來朝列紛錯真偽相貿忠良排墜信臣被害是以正士摧方而庸臣茍媚先意承指各希時趣人執反理之評士吐詭道之論遂使清流變濁忠臣結舌陛下處九天之上隱百里之室言出風靡令行景從親洽寵媚之臣日聞順意之辭将謂此輩實賢而天下已平也臣聞興國之君樂聞其過荒亂之主樂聞其譽聞其過者過日消而福臻聞其譽者譽日損而禍至陛下嚴刑灋以禁直辭黜善士以逆諫口杯酒造次死生不保仕者以退為幸居者以出為福誠非所以保光洪緒熈隆道化也何定本僕􅀠小人身無行能而陛下愛其佞媚假以威福夫小人求入必進姦利定間者妄興事役發江邉戍兵以驅麋鹿老弱饑凍大小怨歎傳曰國之興也視民如赤子其亡也以民為草芥今灋禁轉苛賦調益繁中官近臣所在興事而長吏畏罪苦民求辦是以人力不堪家戸離散呼嗟之聲感傷和氣今國無一年之儲家無經月之蓄而後宫之中坐食者萬冇餘人又北敵注目伺國盛衰長江之限不可乆恃茍我不能守一葦可杭也願陛下豐基彊本割情從道則成康之治興聖祖之祚隆矣吳主深恨之於是左右共誣樓􅀇賀邵相逢駐共耳語大笑謗訕政事俱被詰責送􅀇付廣州邵原復職既而復徙􅀇於交趾竟殺之乆之何定姦穢發聞亦伏誅羊祜歸自江陵務修徳信以懷吳人每交兵刻日方戰不為掩襲之計将帥有欲進譎計者輙飲以醇酒使不得言祜出軍行吳境刈榖為糧皆計所侵送絹償之每㑹衆江沔遊獵常止晉地若禽獸先為吳人所傷而為晉兵所得者皆送還之於是吳邉人皆悦服祜與陸抗對境使命常通抗遺祜酒祜飲之不疑抗疾求藥於祜祜以成藥與之抗即服之人多諫抗抗曰豈有酖人羊叔子哉抗告其邊戍曰彼專為徳我專為暴是不戰而自服也各保分界而已無求細利吳主聞二境交和以詰抗抗曰一邑一鄉不可以無信義况大國乎臣不如此正是彰其徳於祜無傷也吳主用諸将之謀數侵盜晉邉陸抗上䟽曰昔有夏多罪而殷湯用師紂作淫虐而周武授鉞茍無其時雖復大聖亦宜養威自保不可輕動也今不務力農富國審官任能明黜陟慎刑賞訓諸司以德撫百姓以仁而聽諸将徇名窮兵黷武動費萬計士卒彫瘁冦不為衰而我已大病矣今爭帝王之資而昧十百之利此人臣之姦便非國家之良䇿也昔齊魯三戰魯人再克而亡不旋踵何則大小之埶異也況今師所克獲不補所喪乎吳主不從羊祜不附結中朝權貴荀勗馮紞之徒皆惡之從甥王衍嘗詣祜陳事辭甚清辯祜不然之衍拂衣去祜顧謂賔客曰王夷甫方當以盛名處大位然敗俗傷化必此人也及攻江陵祜以軍灋将斬王戎衍戎之從弟也故二人皆憾之言論多毁祜時人為之語曰二王當國羊公無徳資治通鑑卷第七十九
