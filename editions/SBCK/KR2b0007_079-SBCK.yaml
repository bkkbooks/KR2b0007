front:
  text: 國晉王九月乙未大赦戊子以魏司徒何曾為晉丞相癸亥以票騎将軍司馬望為司徒乙亥葬文王于崇陽陵冬吳西陵督歩闡表請吳主徙都武昌吳主從之使御史大夫丁固右将軍諸葛靚守建業闡騭之子也十二月壬戌魏帝禪位于晉甲子出舍于金墉城太傅司馬孚拜辭執帝手流涕歔欷不自勝曰臣死之日固大魏之純臣也丙寅王即皇帝位大赦改元丁卯奉魏帝為陳留王即宫于鄴優崇之禮皆倣魏初故事魏氏諸王皆降為侯追尊宣王為宣皇帝景王為景皇帝文王為文皇帝尊王太后曰皇太后封皇叔祖父孚為安平王叔父幹為平原王亮為扶風王伷為東莞王駿為汝隂王肜為梁王倫為琅邪王弟攸為齊王鑒為樂安王機為燕王又封羣從司徒望等十七人皆為王以石苞為大司馬鄭冲為太傅王祥為太保何曾為太尉賈充為車騎將軍王沈為驃騎將軍其餘文武增位進爵有差乙亥以安平王孚為太宰都督中外諸軍事未幾又以車騎将軍陳騫為大將軍與司徒義陽王望司空荀顗凡八公同時並置帝懲魏氏孤立之敝故大封宗室授以職任又詔諸王皆得自選國中長吏衛将軍齊王攸獨不敢皆令上請詔除魏宗室禁錮罷部曲将及長吏納質任帝承魏氏刻薄奢侈之後欲矯以仁儉太常丞許竒允之子也帝将有事於太廟朝議以竒父受誅不宐接近左右請出為外官帝乃追述允之夙望稱竒之才擢為祠部郎有司言御牛青􅁝紖斷詔以青麻代之初置諫官以散騎常侍􅀓􅀇皇甫陶為之􅀇幹之子也􅀇以魏末士風頽敝上䟽曰臣聞先王之御天下敎化隆於上清議行於下近者魏武好灋術而天下貴刑名魏文慕通逹而天下賤守節其後綱維不攝放誕盈朝遂使天下無復清議陛下龍興受禪􅀪堯舜之化惟未舉清逺有禮之臣以敦風節未退虚鄙之士以懲不恪臣是以猶敢有言上嘉納其言使􅀇草詔進之然亦不能革也初漢征西將軍司馬鈞生豫章太守量量生潁川太守雋雋生京兆尹防防生宣帝二年春正月丁亥即用魏廟祭征西府君以下并景帝凡七室辛丑尊景帝夫人羊氏曰景皇后居􅀪訓宫
