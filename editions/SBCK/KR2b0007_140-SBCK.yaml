front:
  text: 爲豫州刺史劉昶性褊躁御軍嚴暴人莫敢言灋曹行參軍北平陽固苦諫昶怒欲斬之使當攻道固志意閑雅臨敵勇决昶始竒之丁酉中外纂嚴以太尉陳顯達爲使持節都督西北討諸軍事往來新亭白下以張聲埶己亥魏主濟淮二月至夀陽衆號三十萬鐡騎彌望甲辰魏主登八公山賦詩道遇甚雨命去葢見軍士病者親撫慰之魏主遣使呼城中人豐城公遥昌使參軍崔慶逺出應之慶逺問師故魏主曰固當有故卿欲我斥言之乎欲我含垢依違乎慶遠曰未承來命無所含垢魏主曰齊主何故廢立慶逺曰廢昏立明古今非一未審何疑魏主曰武帝子孫今皆安在慶逺曰七王同惡已伏管蔡之誅其餘二十餘王或内列清要或外典方牧魏主曰卿主若不忘忠義何以不立近親如周公之輔成王而自取之乎慶逺曰成王有亞聖之徳故周公得而相之今近親皆非成王之比故不可立且霍光亦捨武帝近親而立宣帝唯其賢也魏主曰霍光何以不自立慶逺曰非其類也主上正可比宣帝安得比霍光若爾武王伐紂不立微子而輔之亦為茍貪天下乎魏主大笑曰朕來問罪如卿之言便可釋然慶逺曰見可而進知難而退聖人之師也魏主曰卿欲吾和親為不欲乎慶逺曰和親則二國交歡生民䝉福否則二國交惡生民塗炭和親與否裁自聖衷魏主賜慶逺酒殽衣服而遣之戊申魏主循淮而東民皆安堵租運屬路丙辰至鍾離上遣左衞將軍崔慧景寧朔將軍裴叔業救鍾離劉昶王肅衆號二十萬塹柵三重并力攻義陽城中負楯而立王廣之引兵救義陽去城百餘里畏魏彊不敢進城中益急黃門侍郎蕭衍請先進廣之分麾下精兵配之衍間道夜發與太子右率蕭誄等徑上賢首山去魏軍數里魏人出不意未測多少不敢逼黎明城中望見援軍至蕭誕遣長史王伯瑜出攻魏柵因風縱火衍等衆軍自外擊之魏不能支解圍去己未誕等追擊破之誄諶之弟也先是上以義陽危急詔都督青冀二州諸軍事張冲出軍攻魏以分其兵埶冲遣軍主桑係祖攻魏建陵驛馬厚丘三城又遣軍主杜僧護攻魏虎阬馮時即丘三城皆拔之青冀二州刺史王洪範遣軍主崔延襲魏紀城據之魏主欲南臨江水辛酉􅀤鍾離司徒長樂元懿公馮誕病不能從魏主與之泣訣行五十里聞誕卒時崔慧景等軍去魏主營不過百里魏主輕將數千人夜還鍾離拊尸而哭達旦聲淚不絶壬戌敕諸軍罷臨江之行葬誕依晉齊獻王故事誕與帝同年幼同硯席尚帝妹樂安長公主雖無學術而資性淳篤故特有寵丁卯魏主遣使臨江數上罪惡魏久攻鍾離不克士卒多死三月戊寅魏主如邵陽築城於洲上柵斷水路夾築二城蕭坦之遣軍主裴叔業攻二城拔之魏王欲築城置戍於淮南以撫新附之民賜相州刺史髙閭璽書具論其狀閭上表以為兵灋十則圍之五則攻之曏者國家止為受降之計發兵不多東西遼闊難以成功今又欲置戍淮南招撫新附昔世祖以回山倒海之威步騎數十萬南臨瓜步諸郡盡降而盱眙小城攻之不克班師之日兵不戍一城土不闢一㕓夫豈無人以為大鎮未平不可守小故也夫壅水者先塞其原伐木者先斷其本本原尚在而攻其末流終無益也夀陽盱眙淮陰淮南之本原也三鎮不克其一而留守孤城其不能自全明矣敵之大鎮逼其外長淮隔其内少置兵則不足以自固多置兵則糧運難通大軍既還士心孤怯夏水盛漲救援甚難以新擊舊以勞禦逸若果如此必為敵擒雖忠勇奮發終何益哉且安土戀本人之常情昔彭城之役既克大鎮城戍已定而不服思叛者猶踰數萬角城蕞爾處在淮北去淮陽十八里五固之役攻圍歴時卒不能克以今凖昔事兼數倍天時尚熱雨水方降願陛下踵世祖之成規旋轅返斾經營洛邑蓄力觀釁布徳行化中國既和逺人自服矣尚書令陸叡上表以為長江浩蕩彼之巨防又南土昏霧暑氣鬱蒸師人經夏必多疾病而遷鼎草創庶事甫爾臺省無論政之館府寺靡聽治之所百僚居止事等行路沈雨炎陽自成癘疫且兵徭並舉聖王所難今介胄之士外攻冦讐羸弱之夫内勤土木運給之費日損千金驅罷弊之兵討堅城之虜將何以取勝乎陛下去冬之舉正欲曜武江漢耳今自春幾夏理宜釋甲願早還洛邑使根本深固聖懐無内顧之憂兆民休斤板之役然後命將出師何憂不服魏主納其言崔慧景以魏人城邵陽患之張欣泰曰彼有去志所以築城者外自誇大懼我躡其後耳今若說之以兩願罷兵彼無不聽矣慧景從之使欣泰詣城下語魏人魏主乃還濟淮餘五將未濟齊人據渚邀斷津路魏主募能破中渚兵者以為直閤將軍軍主代人奚康生應募縳筏積柴因風縱火燒齊船艦依煙直進飛刀亂斫中渚兵遂潰魏主假康生直閤將軍魏主使前將軍楊播將步卒三千騎五百為殿時春水方長齊兵大至戰艦塞川播結陳於南岸以禦之諸軍盡濟齊兵四集圍播播為圓陳以禦之身自􅅮戰所殺甚衆相拒再宿軍中食盡圍兵愈急魏主在北岸望之以水盛不能救既而水稍減播引精騎三百歴齊艦大呼曰我今欲渡能戰者來遂擁衆而濟播椿之兄也魏軍既退邵陽洲上餘兵萬人求輸馬五百匹假道以歸崔慧景欲斷路攻之張欣泰曰歸師勿遏古人畏之兵在死地不可輕也今勝之不足為武不勝徒喪前功不如許之慧景從之蕭坦之還言於上曰邵陽洲有死賊萬人慧景欣泰縱而不取由是皆不加賞甲申解嚴初上聞魏主欲飲馬於江懼敕廣陵太守行南兖州事蕭穎胄移居民入城民驚恐欲席卷南渡頴胄以魏寇尚逺不即施行魏兵竟不至頴胄太祖之從子也上遣尚書右僕射沈文季助豐城公遥昌守夀陽文季入城止游兵不聽出洞開城門嚴加守備魏兵尋退魏之入寇也盧昶等猶在建康齊人恨之飼以蒸豆昶怖懼食之淚汗交横謁者張思寧辭氣不屈死於館下及還魏主讓昶曰人誰不死何至自同牛馬屈身辱國縱不逺慙蘇武獨不近愧思寧乎乃黜為民戊子魏太師京兆武公馮熈卒千平城乙未魏主如下邳夏四月庚子如彭城辛丑為馮熈舉哀太傅録尚書事平陽公丕不樂南遷與陸叡表請魏主還臨熈葬帝曰開闢以來安有天子逺奔舅喪者乎今經始洛邑豈宜妄相誘引陷君不義令僕以下可付灋官貶之仍詔迎熈及博陵長公主之柩南葬洛陽禮如晉安平獻王故事魏主之在鍾離也仇池鎮都大將梁州刺史拓跋英請以州兵㑹劉藻擊漢中魏主許之梁州刺史蕭懿遣部將尹紹祖梁季羣等將兵二萬據險立五柵以拒之英曰彼帥賤莫相統壹我選精卒并攻一營彼必不相救若克一營四營皆走矣乃引兵急攻一營拔之四營俱潰生擒梁季羣斬三千餘級俘七百餘人乘勝長驅進逼南鄭懿又遣其將姜脩擊英英掩擊盡獲之將還懿别軍繼至將士皆已疲不意其至大懼欲走英故緩轡徐行神色自若登髙望敵東西指麾狀若處分然後整列而前懿軍疑有伏兵遷延引退英追擊破之遂圍南鄭禁將士毋得侵暴逺近恱附爭供租運懿嬰城自守軍主范絜先將三千餘人在外還救南鄭英掩擊盡獲之圍城數十日城中恟懼録事參軍新野庾域封題空倉數十指示将士曰此中粟皆滿足支二年但努力堅守衆心乃安㑹魏主召英還英使老弱先行自将精兵為後拒遣使與懿告别懿以為詐英去一日猶不開門二日乃遣將追之英與士卒下馬交戰懿兵不敢逼行四日四夜懿兵乃返英入斜谷㑹天大雨士卒截竹貯米執炬火於馬上炊之先是懿遣人誘說仇池諸氐使起兵斷英運道及歸路英勒兵奮擊且戰且前矢中英頰卒全軍還仇池討叛氐平之英楨之子懿衍之兄也英之攻南鄭也魏主詔雍涇岐三州發兵六千人戍南鄭俟克城則遣之侍中兼左僕射李冲表諫曰秦川險阨地接羌夷自西師出後餉援連續加氐胡叛逆所在奔命運糧擐甲迄兹未已今復豫差戍卒懸擬山外雖加優復恐猶驚駭脱終攻不克徒動民情連胡結夷事或難測輒依㫖宻下刺史待軍克鄭城然後差遣如臣愚見猶謂未足何者西道險阨單徑千里今欲深戍絶界之外孤據羣賊之中敵攻不可猝援食盡不可運糧古人有言雖鞭之長不及馬腹南鄭於國實為馬腹也且魏境所掩九州過八民人所臣十分而九所未民者唯漠北之與江外耳羈之在近豈汲汲於今日也宜待疆宇既廣糧食既足然後置邦樹將為吞并之舉今鍾離夀陽宻邇未拔赭城新野跬步弗降東道既未可以近力守西藩寧可以逺兵固若果欲置者臣恐終以資敵也又建都土中地接寇壤方須大收死士平蕩江㑹若輕遣單寡弃令陷没恐後舉之日衆以留守致懼求其死効未易可獲推此而論不戍為上魏主從之癸丑魏主如小沛己未如瑕丘庚申如魯城親祠孔子辛酉拜孔氏四人顔氏二人官仍選諸孔宗子一人封崇聖侯奉孔子祀命兖州修孔子墓更建碑銘戊辰魏主如碻磝命謁者僕射成淹具舟楫欲自泗入河泝流還洛淹諫以為河流悍猛非萬乗所宜乗帝曰我以平城無漕運之路故京邑民貧今遷都洛陽欲通四方之運而民猶憚河流之險故朕有此行所以開百姓之心也魏城陽王鸞等攻赭陽諸將不相統壹圍守百餘日諸將欲案甲不戰以疲之李佐獨晝夜攻擊士卒死者甚衆帝遣太子右衞率垣歴生救之諸將以衆寡不敵欲退佐獨帥騎二千逆戰而敗盧淵等引去歴生追擊大破之歷生榮祖之從弟也南陽太守房伯玉等又敗薛真度於沙堨鸞等見魏主於瑕丘魏主責之曰卿等沮辱威靈罪當大辟朕以新遷洛邑特從寛典五月己巳降封鸞為定襄縣王削户五百盧淵李佐韋珍皆削官爵為民佐仍徙瀛州以薛真度與其從兄安都有開徐方之功聽存其爵及荆州刺史餘皆削奪曰進足明功退足彰罪矣
