body:
  text: 魏廣川剛王諧卒諧略之子也魏主曰古者大臣之喪有三臨之禮魏晉以來王公之喪哭於東堂自今諸王之喪期親三臨大功再臨小功緦麻一臨罷東堂之哭廣川王於朕大功也將大斂素服深衣往哭之甲戌魏主如滑臺丙子舎于石濟庚辰太子出迎於平桃城趙郡王幹在洛陽貪淫不灋御史中尉李彪私戒之且曰殿下不悛不敢不以聞幹悠然不以為意彪表彈之魏主詔幹與北海王詳俱從太子詣行在既至見詳而不見幹陰使左右察其意色知無憂悔乃親數其罪杖之一百免官還第癸未魏主還洛陽告于太廟甲申減冗官之禄以助軍國之用乙酉行飲至之禮班賞有差甲午魏太子冠於廟魏主欲變北俗引見羣臣謂曰卿等欲朕逺追商周為欲不及漢晉邪咸陽王禧對曰羣臣願陛下度越前王耳帝曰然則當變風易俗當因循守故邪對曰願聖政日新帝曰為止於一身為欲傳之子孫邪對曰願傳之百世帝曰然則必當改作卿等不得違也對曰上令下從其誰敢違帝曰夫名不正言不順則禮樂不可興今欲斷諸北語一從正音其年三十已上習性已久容不可猝革三十已下見在朝廷之人語音不聽仍舊若有故為當加降黜各宜深戒王公卿士以為然不對曰實如聖㫖帝曰朕嘗與李冲論此冲曰四方之語竟知誰是帝者言之即為正矣冲之此言其罪當死因顧冲曰卿負社稷當令御史牽下冲免冠頓首謝又責留守之官曰昨望見婦女猶服夾領小袖卿等何為不遵前詔皆謝罪帝曰朕言非是卿等當庭爭如何入則順旨退則不從乎六月己亥下詔不得為北俗之語於朝廷違者免所居官癸卯魏主使太子如平城赴太師熈之喪癸丑魏詔求遺書袐閣所無有益時用者加以優賞魏有司奏廣川王妃葬於代都未審以新尊從舊卑以舊卑就新尊魏主曰代人遷洛者宜悉葬邙山其先有夫死於代者聽妻還葬夫死於洛者不得還代就妻其餘州之人自聽從便丙辰詔遷洛之民死葬河南不得還北於是代人南遷者悉為河南洛陽人戊午魏改用長尺大斗其法依漢志為之上之廢鬱林王也許蕭諶以揚州既而除領軍將軍南徐州刺史諶恚曰見炊飯推以與人諶恃功頗干預朝政所欲選用輙命尚書使為申論上聞而忌之以蕭誕蕭誄方將兵拒魏隱忍不􅀤壬戍上遊華林園與諶及尚書令王晏等數人宴盡歡坐罷留諶晩出至華林閤仗身執還入省上遣左右莫智明數諶曰隆昌之際非卿無有今日今一門二州兄弟三封朝廷相報正可極此卿恒懐怨望乃云炊飯已熟合甑與人邪今賜卿死遂殺之并其弟誄以黃門郎蕭衍為司州别駕往執誕殺之諶好術數吳興沈文猷常語之曰君相不減髙帝諶死文猷亦伏誅諶死之日上又殺西陽王子明南海王子罕邵陵王子貞乙丑以右衞將軍蕭坦之為領軍將軍魏髙閭上言鄴城宻皇后廟頽圯請更葺治若謂已配饗太廟即宜罷毁詔罷之魏拓拔英之寇漢中也沮水氐楊馥之為齊擊武興氐楊集始破之秋七月辛卯以馥之為北秦州刺史仇池公八月乙巳魏選武勇之士十五萬人為羽林虎賁以充宿衞魏金墉宫成立國子太學四門小學於洛陽魏髙祖遊華林園觀故景陽山黃門侍郎郭祚曰山水者仁智之所樂宜復修之帝曰魏明帝以奢失之於前朕豈可襲之於後乎帝好讀書手不釋卷在輿據鞍不忘講道善屬文多於馬上口占既成不更一字自太和十年以後詔策皆自為之好賢樂善情如飢渴所與遊接常寄以布素之意如李冲李彪髙閭王蕭郭祚宋弁劉芳崔光邢蠻之徒皆以文雅見親貴顯用事制禮作樂鬱然可觀有太平之風焉治書侍御史薛聰辯之曾孫也彈劾不避彊禦帝或欲寛貸者聰輒爭之帝每日朕見薛聰不能不憚何况諸人也自是貴戚斂手累遷直閤將軍兼給事黃門侍郎散騎常侍帝外以徳器遇之内以心膂爲寄親衞禁兵悉聦管領故終太和之世􅁪帶直閤將軍羣臣罷朝之後聰􅁪陪侍帷幄言兼晝夜時政得失動輙匡諫事多聽允而重厚沈宻外莫窺其際帝欲進以名位輙苦讓不受帝亦雅相體悉謂之曰卿天爵自髙固非人爵之所能榮也九月庚午魏六宫文武悉還于洛陽丙戌魏主如鄴屢至相州刺史髙閭之館美其治效賞賜甚厚閭數請本州詔曰閭以懸車之年方求衣錦知進忘退有塵謙徳可降號平北將軍朝之老成宜遂情願徙授幽州刺史令存勸兩脩恩法並舉以髙陽王雍祀圜丘丙戌大赦十二月乙未朔魏主見羣臣於光極堂宣下品令為大選之始光禄勲于烈子登引例求遷官烈上表曰方今聖明之朝理應廉讓而臣子登引人求進是臣素無教訓乞行黜落魏王曰此乃有識之言不謂烈能辦此乃引見登謂曰朕將流化天下以卿父有謙遜之美直士之風故進卿為太子翊軍校尉又加烈散騎常侍封聊城縣子魏主謂羣臣曰國家從來有一事可歎臣下莫肯公言得失是也夫人君患不能納諫人臣患不能盡忠自今朕舉一人如有不可卿等直言其失若有才能而朕所不識卿等亦當舉之如是得人者有賞不言者有罪卿等當知之丁酉詔脩晉帝諸陵增置守衞甲子魏主引見羣臣於光極堂頒賜冠服先是魏人未嘗用錢魏主始命鑄太和五銖是嵗鼔鑄粗備詔公私用之魏以光城蠻帥田益光為南司州刺史所統守宰聽其銓置後更於新蔡立東豫州以益光為刺史氐王楊炅卒三年春正月丁卯以楊炅子崇祖為沙州刺史封陰平王魏主下詔以為北人謂上為拓后為跋魏之先出於黃帝以土徳王故為拓跋氏夫土者黄中之色萬物之元也宜改姓元氏諸功臣舊族自代來者姓或重複皆改之於是始改拔拔氏為長孫氏達奚氏為奚氏乙旃氏為叔孫氏丘穆陵氏為穆氏步六孤氏為陸氏賀賴氏為賀氏獨孤氏為劉氏賀樓氏為樓氏勿忸于氏為于氏尉遲氏為尉氏其餘所改不可勝紀魏主雅重門族以范陽盧敏清河崔宗伯滎陽鄭羲太原王瓊四姓衣冠所推咸納其女以充後宫隴西李冲以才識見任當朝貴重所結姻㜕莫非清望帝亦以其女為夫人詔黃門郎司徒左長史宋弁定諸州士族多所升降又詔以代人先無姓族雖功賢之胤無異寒賤故宦達者位極公卿其功衰之親仍居猥任其穆陸賀劉樓于嵇尉八姓自太祖已降勳著當世位盡王公灼然可知者且下司州吏部勿充猥官一同四姓自此以外應班士流者尋續别敕其舊為部落大人而皇始巳來三世官在給事已上及品登王公者為姓若本非大人而皇始已來三世官在尚書已上及品登王公者亦為姓其大人之後而官不顯者為族若本非大人而官顯者亦為族凡此姓族皆應審覈勿容偽冐令司空穆亮尚書陸琇等詳定務令平允琇馥之子也魏舊制王國舎人皆應娶八族及清脩之門咸陽王禧娶􅀠户為之帝深責之因下詔為六弟聘室前者所納可為妾媵咸陽王禧可聘故潁川太守隴西李輔女河南王幹可聘故中散代郡穆明樂女廣陵王羽可聘驃騎諮議參軍滎陽鄭平城女潁川王雍可聘故中書博士范陽盧神寳女始平王勰可聘廷尉卿隴西李冲女北海王祥可聘吏部郎中滎陽鄭懿女懿羲之子也時趙郡諸李人物尤多各盛家風故世之言髙華者以五姓為首衆議以薛氏為河東茂族帝曰薛氏蜀也豈可入郡姓直閤薛宗起執㦸在殿下出次對曰臣之先人漢末仕蜀二世復歸河東今六世相襲非蜀人也伏以陛下黃帝之􅅌受封北土豈可亦謂之胡邪今不預郡姓何以生為乃碎㦸於地帝徐曰然則朕甲卿乙乎乃入郡姓仍曰卿非宗起乃起宗也帝與羣臣論選調曰近世髙卑出身各有常分此果如何李冲對曰未審上古以來張官列位為膏粱子弟乎為致治乎帝曰欲為治耳冲曰然則陛下今日何為專取門品不拔才能乎帝曰茍有過人之才不患不知然君子之門借使無當世之用要自徳行純篤朕故用之冲曰􅀓說吕望豈可以門地得之帝曰非常之人曠世乃有一二耳祕書令李彪曰陛下若專取門地不審魯之三卿孰若四科著作佐郎韓顯宗曰陛下豈可以貴襲貴以賤襲賤帝曰必有髙明卓然出類拔萃者朕亦不拘此制頃之劉昶入朝帝謂昶曰或言唯能是寄不必拘門朕以為不爾何者清濁同流混齊一等君子小人名品無别此殊為不可我今八族以上士人品第有九九品之外小人之官復有七等若有其人可起家為三公正恐賢才難得不可止為一人渾我典制也臣光曰選舉之灋先門地而後賢才此魏晉之深弊而歷代相因莫之能改也夫君子小人不在於世禄與側微以今日視之愚智所同知也當是之時雖魏孝文之賢猶不免斯弊故夫明辨是非而不惑於世俗者誠鮮矣壬辰魏徙始平王勰為彭城王復定襄縣王鸞為城陽王二月壬寅魏詔羣臣自非金革聽終三年喪丙午魏詔畿内七十已上暮春赴京師行養老之禮三月丙寅宴羣臣及國老庶老於華林園詔國老黃耇已上假中散大夫郡守耆年已上假給事中縣令庶老直假郡縣各賜鳩杖衣裳丁丑魏詔諸州中正各舉其鄉之民望年五十已上守素衡門者授以令長壬午詔乘輿有金銀飾校者皆剔除之上志慕節儉太官嘗進裹蒸上曰我食此不盡可四破之餘充晩食又嘗用皁莢以餘濼授左右曰此可更用太官元日上夀有銀酒鎗上欲壞之王晏等咸稱盛徳衞尉蕭頴胄曰朝廷盛禮莫若三元此一器既是舊物不足爲侈上不恱後預曲宴銀器滿席頴胄曰陛下前欲壊酒鎗恐宜移在此器上甚慙上躬親細務綱目亦宻於是郡縣及六署九府常行職事莫不啟聞取决詔敇文武勲舊皆不歸選部親近憑勢戸相通進人君之務過繁密南康王侍郎潁川鍾嶸上書言古者明君揆才頒政量能授職三公坐而論道九卿作而成務天子唯恭已南面而已書奏上不懌謂太中大夫顧暠曰鍾嶸何人欲斷朕機務卿識之不對曰嶸雖位末名卑而所言或有可采且繁碎職事各有司存今人主揔而親之是人主愈勞而人臣愈逸所謂代庖人宰而為大匠斵也上不顧而言他夏四月甲辰魏廣州刺史薛灋護來降魏冦司州櫟城戍主魏僧珉拒破之五月丙戌魏營方澤於河陰又詔漢魏晉諸帝陵百步内禁樵蘇丁亥魏主有事於方澤秋七月魏廢皇后馮氏初文明太后欲其家貴重簡馮熈二女入掖庭其一早卒其一得幸於魏主未幾有疾還家為尼及太后殂帝立熈少女為皇后既而其姊疾愈帝思之復迎入宫拜左昭儀后寵浸衰昭儀自以年長且先入宫不率妾禮后頗愧恨昭儀因譛而廢之后素有徳操遂居瑤光寺為練行尼魏主以久旱自癸未不食至于乙酉羣臣皆詣中書省請見帝在崇虚樓遣舎人辭焉且問來故豫州刺史王肅對曰今四郊雨已霑洽獨京城微少庶民未乏一餐而陛下輟膳三日臣下惶惶無復情地帝使舎人應之曰朕不食數日猶無所感比來中外貴賤皆言四郊有雨朕疑其欲相寛勉未必有實方將遣使視之果如所言即當進膳如其不然朕何以生為當以身為萬民塞咎耳是夕大雨魏太子恂不好學體素肥大苦河南地熱常思北歸魏主賜之衣冠恂常私著胡服中庶子遼東髙道恱數切諫恂惡之八月戊戌帝如嵩髙恂與左右密謀召牧馬輕騎奔平城手刅道恱於禁中領軍元儼勒門防遏入夜乃定詰旦尚書陸琇馳以啟帝帝大駭祕其事仍至汴口而還甲寅入宫引見恂數其罪親與咸陽王禧等更代杖之百餘下扶曳出外囚於城西月餘乃能起丁巳魏相州刺史南安惠王禎卒九月戊辰魏主講武於小平津癸酉還宫冬十月戊戌魏詔軍士自代來者皆以為羽林虎賁司州民十二夫調一吏以供公私力役魏吐京胡反詔朔州刺史元彬行汾州事帥幷肆之衆以討之彬禎之子也彬遣統軍奚康生擊叛胡破之追至車突谷又破之俘雜畜以萬數詔以彬為汾州刺史胡去居等六百餘人保險不服彬請兵二萬以討之有司奏許之魏主大怒曰小冦何有發兵之理可隨宜討治若不能克必須大兵者則先斬刺史然後發兵彬大懼督帥州兵身先將士討去居平之魏主引見羣臣於清徽堂議廢太子恂太子太傅穆亮少保李冲免冠頓首謝帝曰卿所謝者私也我所議者國也大義㓕親古人所貴今恂欲違父逃叛跨據恒朔天下之惡孰大焉若不去之乃社稷之憂也閏月丙寅廢恂為庶人置於河陽無鼻城以兵守之服食所供粗免飢寒而已戊辰魏置常平倉戊寅太子寳卷冠初魏文明太后欲廢魏主穆泰切諫而止由是有寵及帝南遷洛陽所親任者多中州儒士宗室及代人往往不樂泰自尚書右僕射出為定州刺史自陳久病土温則甚乞為恒州帝為之徙恒州刺史陸叡為定州以泰代之泰至叡未􅀤遂相與謀作亂陰結鎮北大將軍樂陵王思譽安樂侯隆撫冥鎮將魯郡侯業驍騎將軍超等共推朔州刺史陽平王頥為主思譽天賜之子業丕之弟隆超皆丕之子也叡以為洛陽休明勸泰緩之泰由是未􅀤頥偽許泰等以安其意而宻以狀聞行吏部尚書任城王澄有疾帝召見於凝閑堂謂之曰穆泰謀為不軌扇誘宗室脫或必然今遷都甫爾北人戀舊南北紛擾朕洛陽不立也此國家大事非卿不能辦卿雖疾强為我北行審觀其埶儻其微弱直往擒之若已彊盛可承制發并肆兵擊之對曰泰等愚惑正由戀舊為此計耳非有深謀逺慮臣雖駑怯足以制之願陛下勿憂雖有犬馬之疾何敢辭也帝笑曰任城肯行朕復何憂遂授澄節銅虎竹使符御仗左右仍行􅁪州事行至鴈門鴈門太守夜告云泰已引兵西就陽平澄遽令進發右丞孟斌曰事未可量宜依敇召幷肆兵然後徐進澄曰泰既謀亂應據堅城而更迎陽平度其所爲當似勢弱泰既不相拒無故發兵非宜也但速往鎮之民心自定遂倍道兼行先遣治書侍御史李煥單騎入代出其不意曉諭泰黨示以禍福皆莫爲之用泰計無所岀帥麾下數百人攻煥不克走出城西追擒之澄亦尋至窮治黨與收陸叡等百餘人皆繫獄民間帖然澄具狀表聞帝喜召公卿以表示之曰任城可謂社稷臣也觀其獄辭正復臯陶何以過之顧謂咸陽王禧等曰汝曹當此不能辦也魏主謀入寇引見公卿於清徽堂曰朕卜宅土中綱條粗舉唯南寇未平安能效近世天子下帷於深宮之中乎朕今南征决矣但未知早晩之期比來術者皆云今往必克此國之大事宜君臣各盡所見勿以朕先言而依違於前同異於後也李冲對曰凡用兵之灋宜先論人事後察天道今卜筮雖吉而人事未備遷都尚新秋穀不稔未可以興師旅如臣所見宜俟來秋帝曰去十七年朕擁兵二十萬此人事之盛也而天時不利今天時既從復云人事未備如僕射之言是終無征伐之期也寇戎咫尺異日將為社稷之憂朕何敢自安若秋行不捷諸君當盡付司寇不可不盡懐也魏主以有罪徙邊者多逋亡乃制一人逋亡闔門充役光州刺史博陵崔挺上書諫曰天下善人少惡人多若一人有罪延及闔門則司馬牛受桓魋之罰栁下惠嬰盗跖之誅豈不哀哉帝善之遂除其制資治通鑑卷第一百四十
