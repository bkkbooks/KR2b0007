body:
  text: 臣司馬光奉勑編集唐紀四十六盡四月不滿一年起閼逢困敦二月徳宗神武聖文皇帝五興元元年二月戊申詔贈叚秀實太尉諡曰忠烈厚恤其家時賈隱林已卒贈左僕射賞其能直言也李希烈將兵五萬圍寧陵引水灌之濮州刺史劉昌以三千人守之滑州刺史李澄宻遣使請降上許以澄為汴滑節度使澄猶外事希烈希烈疑之遣養子六百人戍白馬召澄共攻寧陵澄至石柱使其衆陽驚燒營而遁又諷養子令剽掠澄悉收斬之以白希烈希烈無以罪也劉昌守寧陵凡四十五日不釋甲韓滉遣其將王梄曜將兵助劉洽拒希烈栖曜以彊弩數千游汴水夜入寧陵城明日從城上射希烈及其坐幄希烈驚曰宣潤弩手至矣遂解圍去朱泚旣自奉天敗歸李晟謀取長安劉徳信與晟俱屯東渭橋不受晟節制晟因徳信至營中數以滬澗之敗及所過剽掠之罪斬之因以數騎馳入徳信軍勞其衆無敢動者遂并將之軍勢益振李懷光既脅朝廷逐盧􅂎等内不自安遂有異志又惡李晟獨當一面恐其成功奏請與晟合軍詔許之晟與懷光㑹于咸陽西陳濤斜築壘未畢泚衆大至晟謂懷光曰賊若固守宫苑或曠日持久未易攻取今去其巢穴敢出求戰此天以賊賜明公不可失也懷光曰軍適至馬未秣士未飯豈可遽戰邪晟不得已乃就壁晟毎與懷光同出軍懷光軍士多掠人牛馬晟軍秋豪不犯懷光軍士惡其異已分所獲與之晟軍終不敢受懷光屯咸陽累月逗留不進上屢遣中使趣之辭以士卒疲弊且當休息觀釁諸將數勸之攻長安懷光不從宻與朱泚通謀事迹頗露李晟屢奏恐其有變為所併請移軍東渭橋上猶兾懷光革心收其力用寢晟奏不下懷光欲緩戰期且激怒諸軍奏言諸軍糧賜薄神䇿獨厚厚薄不均難以進戰上以財用方窘若糧賜皆比神䇿則無以給之不然又逆懷光意恐諸軍觖望乃遣陸䞇詣懷光營宣慰因召李晟參議其事懷光意欲晟自乞减損使失士心沮敗其功乃曰將士戰鬭同而糧賜異何以使之恊力贄未有言數顧晟晟曰公為元帥得專號令晟將一軍受指蹤而已至於增减衣食公當裁之懷光黙然又不欲自减之遂止時上遣崔漢衡詣吐蕃􅀤兵吐蕃相尚結賛言蕃法􅀤兵以主兵大臣為信今制書無懷光署名故不敢進上命陸贄諭懷光懷光固執以為不可曰若克京城吐蕃必縱兵焚掠誰能遏之此一害也前有敕㫖募士卒克城者人賞百緡彼􅀤兵五萬若援敕求賞五百萬緡何從可得此二害也虜騎雖來必不先進勒兵自固觀我兵勢勝則從而分功敗則從而圖變譎詐多端不可親信此三害也竟不肯署敕尚結賛亦不進軍陸贄自咸陽還上言賊泚稽誅保聚宫苑勢窮援絶引日偷生懷光揔仗順之師乘制勝之氣鼓行芟翦易若摧枯而乃冦奔不追師老不用諸帥毎欲進取懷光輒沮其謀據兹事情殊不可解陛下意在全䕶委曲聽從觀其所為亦未知感若不别務規略漸思制持唯以姑息求安終恐變故難測此誠事機危迫之秋也固不可以尋常容易處之今李晟奏請移軍適遇臣銜命宣慰懷光偶論此事臣遂汎問所宜懷光乃云李晟既欲别行某亦都不要藉臣猶慮有飜覆因美其軍盛彊懷光大自矜誇轉有輕晟之意臣又從容問云囘日或聖㫖顧問事之可否决定何如懷光已肆輕言不可中變遂云恩命許去事亦無妨要約再三非不詳審雖欲追悔固難為辭伏望即以李晟表出付中書敕下依奏别賜懷光手詔示以移軍事由其手詔大意云昨得李晟奏請移軍城東以分賊勢朕本欲委卿商量適㑹陸䞇廻奏云見卿語及於此仍言許去事亦無妨遂敕本軍允其所請如此則詞婉而直理順而明雖蓄異端何由起怨上從之晟自咸陽結陳而行歸東渭橋時鄜坊節度使李建徽神䇿行營節度使楊惠元猶與懷光聨營陸䞇復上奏曰懷光當管師徒足以獨制兇冦逗留未進抑有它由所患太彊不資傍助比者又遣李晟李建徽楊惠元三節度之衆附麗其營無益成功祗足生事何則四軍接壘羣帥異心論勢力則懸絶高卑據職名則不相統屬懷光輕晟等兵㣲位下而忿其制不從心晟等疑懷光養冦蓄姦而怨其事多陵已端居則互防飛謗欲戰則遞恐分功齟齬不和嫌釁遂構俾之同處必不兩全彊者惡積而後亡弱者勢危而先覆覆亡之禍翹足可期舊冦未平新患方起憂歎所切實堪疚心太上消慝於未萌其次救失於始兆况乎事情已露禍難垂成委而不謀何以寧亂李晟見機慮變先請移軍就東建徽惠元勢轉孤弱為其吞噬理在必然它日雖有良圖亦恐不能自㧞拯其危急唯在此時今因李晟願行便遣合軍同徃託言晟兵素少慮為賊泚所邀藉此兩軍迭為椅角仍先諭㫖密使促裝詔書至營即日進路懷光意雖不欲然亦計無所施是謂先人有奪人之心疾雷不及掩耳者也解鬭不可以不離救焚不可以不疾理盡於此惟陛下圖之上曰卿所料極善然李晟移軍懷光不免悵望若更遣建徽惠元就東恐因此生辭轉難調息且更俟旬時辛酉加王武俊同平章事兼幽州盧龍節度使李晟以為懷光反狀已明緩急宜有備蜀漢之路不可壅請以禆將趙光銑等為洋利劒三州刺史各將兵五百以防未然上疑未決欲親揔禁兵幸咸陽以慰撫為名趣諸將進討或謂懷光曰此漢祖遊雲夢之䇿也懷光大懼反謀益甚上垂欲行懷光辭益不遜上猶疑讒人間之甲子加懷光太尉增實食賜鐵劵遣神䇿右兵馬使李卞等徃諭㫖懷光對使者投鐵劵於地曰聖人疑懷光邪人臣反賜鐵劵懷光不反今賜鐵劵是使之反也辭氣甚悖朔方左兵馬使張名振當軍門大呼曰太尉視賊不許擊待天使不敬果欲反邪功高太山一旦弃之自取族滅富貴它人何益哉我今日必以死爭之懷光聞之謂曰我不反以賊方强故須蓄鋭俟時耳懷光又言天子所居必有城隍乃􅀤卒城咸陽未幾移軍據之張名振曰乃者言不反今日拔軍此來何也何不攻長安殺朱泚取富貴引軍還邠邪懷光曰名振病心矣命左右引去拉殺之右武鋒兵馬使石演芬本西域胡人懷光養以為子懷光潛與朱泚通謀演芬遣其客郜成義詣行在告之請罷其都統之權成義至奉天告懷光子璀璀宻白其父懷光召演芬責之曰我以爾為子柰何欲破我家今日負我死甘心乎演芬曰天子以太尉為股肱太尉以演芬為心腹太尉既負天子演芬安得不負太尉乎演芬胡人不能異心惟知事一人茍免賊名而死死甘心矣懷光使左右臠食之皆曰義士也可令快死以刀斷其喉而去李卞等還言懷光驕慢之狀於是行在始嚴門禁從臣皆宻裝以待乙丑加李晟河中同絳節度使上猶以為薄丙寅又加同平章事上將幸梁州山南節度使鹽亭嚴震聞之遣使詣奉天奉迎又遣大將張用誠將兵五千至􅉦厔以來迎衛用誠為懷光所誘隂與之通謀上聞而患之㑹震繼遣牙將馬勛奉表上語之故勛請亟詣梁州取嚴震符召用誠還府若不受召臣請殺之上喜曰卿何時復至此勛刻日時而去既得震符請壯士五人與之俱出駱谷用誠不知事泄以數百􅀐迎之勛與之俱入驛時天寒勛多然藁火於驛外軍士皆徃附火勛乃從容出懷中符以示用誠曰大夫召君用誠錯愕起走壯士自後執其手擒之用誠子在勛後斫傷勛首壯士格殺其子仆用誠於地跨其腹以刀擬其喉曰出聲則死勛入其營士卒已擐甲執兵矣勛大言曰汝曹父母妻子皆在漢中一朝弃之與張用誠同反於汝曹何利乎大夫令我取用誠不問汝曹無自取族滅衆皆讋服勛送用誠詣梁州震杖殺之命副將領其衆勛裹其首復命於行在愆期半日李懷光夜遣人襲奪李建徽楊惠元軍建徽走免惠元將奔奉天懷光遣兵追殺之懷光又宣言曰吾今與朱泚連和車駕且當逺避懷光以韓遊瓌朔方將也掌兵在奉天與遊瓌書約使為變遊瓌密奏之明日又以書趣之遊瓌又奏之上稱其忠義因問䇿安出對曰懷光揔諸道兵故敢恃衆為亂今邠寧有張昕靈武有寗景璿河中有吕鳴岳振武有杜從政潼闗有唐朝臣渭北有竇覦皆守將也陛下各以其衆及地授之尊懷光之官罷其權則行營諸將各受本府指麾矣懷光獨立安能為亂上曰罷懷光兵權若朱泚何對曰陛下既許將士以克城殊賞將士奉天子之命以討賊取富貴誰不願之邠府兵以萬數借使臣得而將之足以誅泚况諸道必有杖義之臣泚不足憂也上然之丁邜懷光遣其將趙昇鸞入奉天約其夕使别將逹奚小俊燒乾陵令昇鸞為内應以驚脅乘輿昇鸞詣渾瑊自言瑊遽以聞且請决幸梁州上命瑊戒嚴瑊出部勒未畢上已出城西命戴休顔守奉天朝臣將士狼狽扈從戴休顔徇於軍中曰懷光已反遂乘城拒守朱泚之稱帝也兵部侍郎劉廼卧病在家泚召之不起使蔣鎮自徃説之凡再徃知不可誘脅乃歎曰鎮亦忝列曹不能捨生以至於此豈可復以己之腥臊汚漫賢者乎歔欷而返廼聞上幸山南􅅮膺大呼自投于牀不食數日而卒太子少師喬琳從上至􅉦厔稱老疾不堪山險削髪為僧匿於仙遊寺泚聞之召至長安以為吏部尚書於是朝士之竄匿者多出仕泚矣懷光遣其將孟保惠靜壽孫福逹將精騎趣南山邀車駕遇諸軍糧料使張增於盩厔三將曰彼使我為不臣我以追不及報之不過不使我將耳因目增曰軍士未朝食如何增紿其衆曰此東數里有佛祠吾貯糧焉三將帥衆而東縱之剽掠由是百官從行者皆得入駱谷以追不及還報懷光皆黜之河東將王權馬彚引兵歸太原李晟得除官制拜哭受命謂將佐曰長安宗廟所在天下根本若諸將皆從行誰當滅賊者乃治城隍繕甲兵為復京城之計先是東渭橋有粟十餘萬斛度支給李懷光軍幾盡是時懷光朱泚連兵聲勢甚盛車駕南幸人情擾擾晟以孤軍處二彊寇之間内無資糧外無救援徒以忠義感激將士故其衆雖單弱而鋭氣不衰又以書遺懷光辭禮卑遜雖示尊崇而諭以禍福勸之立功補過故懷光慙恧未忍擊之晟曰畿内雖兵荒之餘猶可賦斂宿兵飬寇患莫大焉乃以判官張彧假京兆尹擇四十餘人假官以督渭北諸縣芻粟不旬日皆充羨乃流涕誓衆决志平賊田悦用兵數敗士卒死者什六七其下皆厭苦之上以給事中孔巢父為魏博宣慰使巢父性辯博至魏州對其衆為陳逆順禍福悦及將士皆喜兵馬使田緒承嗣之子也凶險多過失悦不忍殺杖而拘之悦既歸國内外撤警備三月壬申朔悦與孔巢父宴飲緒對弟姪有怨言其姪止之緒怒殺姪既而悔之曰僕射必殺我既夕悦醉歸寢緒與左右密穿後垣入殺悦及其母妻等十餘人即帥左右執刀立於中門之内夾道將旦以悦命召行軍司馬扈㠋判官許士則都虞候蔡濟議事府署深邃外不知有變士則濟先至召入亂斫殺之緒恐旣明事泄乃出門遇悦親將劉忠信方排牙緒疾呼謂衆曰劉忠信與扈㠋謀反昨夜刺殺僕射衆大驚諠譁忠信未及自辯衆分裂殺之扈㠋來及㦸門遇亂招諭將士將士從之者三分之一緒懼登城而立大呼謂衆曰緒先相公之子諸君受先相公恩若能立緒兵馬使賞緡錢二千大將半之下至士卒人賞百緡竭公私之貨五日取辦於是將士囘首殺扈㠋皆歸緒軍府乃安因請命於孔巢父巢父命緒權知軍府後數日衆乃知緒殺其兄雖悔怒而緒已立無如之何緒又殺悦親將薛有倫等二十餘人李抱眞王武俊引兵將救貝州聞亂不敢進朱滔聞悦死喜曰悦負恩天假手於緒也即遣其執憲大夫鄭景濟等將歩騎五千助馬寔合兵萬二千攻魏州寔軍王莽河縱騎兵及囘紇四出剽掠滔别遣人入城説緒許以本道節度使緒方危迫遣隨軍矦臧詣貝州送􅅃於滔滔喜遣臧還報使亟定盟約時緒部署城内已定李抱眞王武俊又遣使詣緒許以赴援如悦存日之約緒召將佐議之幕僚曾穆盧南史曰用兵雖尚威武亦本仁義然後有功今幽陵之兵恣行殺掠白骨蔽野雖先僕射背徳其民何罪今雖盛彊其亡可跂立而待也况昭義恒兾方相與攻之柰何以目前之急欲從人為反逆乎不若歸命朝廷天子方䝉塵於外聞魏博使至必喜官爵旋踵而至矣緒從之遣使奉表詣行在城守以俟命上之􅀤奉天也韓遊瓌帥其麾下八百餘人還邠州李懷光以李晟軍浸盛惡之欲引軍自咸陽襲東渭橋三令其衆衆不應竊相謂曰若與我曹擊朱泚惟力是視若欲反我曹有死不能從也懷光知衆不可强問計於賔佐節度廵官良鄉李景略曰取長安殺朱泚散軍還諸道單騎詣行在如此臣節亦未虧功名猶可保也頓首懇請至于流涕懷光許之都虞候閻晏等勸懷光東保河中徐圖去就懷光乃説其衆曰今且屯涇陽召妻孥於邠俟至與之俱往河中春裝既辦還攻長安未晩也東方諸縣皆富實軍發之日聽爾曹俘掠衆許之懷光乃謂景略曰曏者之議軍衆不從子宜速去不且見害遣數􅀐送之景略出軍門慟哭曰不意此軍一旦陷於不義懷光遣使詣邠州令留後張昕悉􅀤所留兵萬餘人及行營將士家屬㑹涇陽仍遣其將劉禮等將三千餘􅀐脅遷之韓遊瓌説昕曰李太尉功高自弃巳蹈禍機中丞今日可以自求富貴遊瓌請帥麾下以從昕曰昕微賤頼李太尉得至此不忍負也遊瓌乃謝病不出隂與諸將高固楊懷賔等相結時崔漢衡以吐蕃兵營于邠南高固曰昕以衆去則邠城空矣乃詐為渾瑊書召吐蕃使稍逼邠城昕等懼竟不敢出昕等謀殺諸將之不從者遊瓌知之先與高固等舉兵殺昕遣楊懷賔奉表以聞且遣人告崔漢衡漢衡矯詔以遊瓌知軍府事軍中大喜懷光子旻在邠遊瓌遣之或曰不殺旻何以自明遊瓌曰殺旻則懷光怒其衆必至不如釋旻以走之時楊懷賔子朝晟在懷光軍中為右廂兵馬使聞之泣白懷光曰父立功於國子當誅夷不可典兵懷光囚之於是遊瓌屯邠寧戴休顔屯奉天駱元光屯昭應尚可孤屯藍田皆受李晟節度晟軍聲大振始懷光方彊朱泚畏之與懷光書以兄事之約分帝闗中永為鄰國及懷光决反逼乘輿南幸其下多叛之勢益弱泚乃賜懷光詔書以臣禮待之且徵其兵懷光慙怒内憂麾下為變外恐李晟襲之遂燒營東走掠涇陽等十二縣雞犬無遺及富平大將孟渉叚威勇將數千人奔于李晟將士在道散亡相繼至河中或勸河中守將吕鳴岳焚橋拒之鳴岳以兵少恐不能支遂納之河中尹李齊運弃城走懷光遣其將趙貴先築壘于同州刺史李紓懼奔行在幕僚裴向攝州事詣貴先責以逆順之理貴先感寤遂請降同州由是獲全向遵慶之子也懷光使其將符嶠襲坊州據之渭北守將竇覦帥獵團七百圍之嶠請降詔以覦為渭北行軍司馬丁亥以李晟兼京畿渭北鄜坊丹延節度使庚寅車駕至城固唐安公主薨上長女也上在道民有獻􅀲果者上欲以散試官授之訪於陸贄贄上奏以為爵位恒宜慎惜不可輕用起端雖㣲流弊必大獻􅀲果者止可賜以錢帛不當酬以官上曰試官虛名無損於事贄又上奏其略曰自兵興以來財賦不足以供賜而職官之賞興焉青朱雜㳫於胥徒金紫普施於輿皁當今所病方在爵輕設法貴之猶恐不重若又自弃將何􅂆人夫誘人之方惟名與利名近虛而於教為重利近實而於徳為輕專實利而不濟之以虛則耗匱而物力不給專虛名而不副之以實則誕謾而人情不趨故國家命秩之制有職事官有散官有勲官有爵號然掌務而授俸者唯繫職事之一官此所謂施實利而寓虛名者也其勲散爵號三者所繫大抵止於服色資䕃而已此所謂假虛名而佐實利者也今之員外試官頗同勲散爵號雖則授無費禄受不占員然而突銛鋒排患難者則以是賞之竭筋力展勤效者又以是酬之若獻􅀲果者亦授試官則彼必相謂曰吾以忘軀命而獲官此以進􅀲果而獲官是乃國家以吾之軀命同於􅀲果矣視人如草木誰復為用哉今陛下既未有實利以敦勸又不重虛名而濫施人無藉焉則後之立功者將曷用為賞哉䞇在翰林為上所親信居艱難中雖有宰相大小之事上必與贄謀之故當時謂之内相上行止必與之俱梁洋道險嘗與䞇相失經夕不至上驚憂涕泣募得䞇者賞千金久之乃至上喜甚太子以下皆賀然贄數直諫迕上意盧􅂎雖貶官上心庇之䞇極言􅂎姦邪致亂上雖貎從心頗不悦故劉從一姜公輔皆自下陳登用贄恩遇雖隆未得為相壬辰車駕至梁州山南地薄民貧自安史以來盗賊攻剽戸口減耗太半雖節制十五州租賦不及中原數縣及大駕駐蹕糧用頗窘上欲西幸成都嚴震言於上曰山南地接京畿李晟方圖收復藉六軍以為聲援若幸西川則晟未有收復之期也衆議未决㑹李晟表至言陛下駐蹕漢中所以繫億兆之心成滅賊之勢若規小捨大遷都岷峨則士庶失望雖有猛將謀臣無所施矣上乃止嚴震百方以聚財賦民不至困窮而供億無乏牙將嚴礪震之從祖弟也震使堂轉餉事甚脩辦初奉天圍既解李楚琳遣使入貢上不得已除鳯翔節度使而心惡之議者言楚琳凶逆反覆若不隄防恐生窺伺由是楚琳使者數輩至上皆不引見留之不遣甫至漢中欲以渾瑊代楚琳鎮鳯翔陸䞇上奏以為楚琳殺帥助賊其罪固大但以乘輿未復大憝猶存勤王之師悉在畿内急宣速告晷刻是爭商嶺則道迃且遥駱谷復為盗所扼僅通王命唯在襃斜此路若又阻艱南北遂將夐絶以諸鎮危疑之勢居二逆誘脅之中洶洶羣情各懷向背儻或楚琳􅀤憾公肆猖狂南塞要衝東延巨猾則我咽㗋梗而心膂分矣今楚琳能兩端顧望乃是天誘其衷故通歸塗將濟大業陛下誠宜深以為念厚加撫循得其持疑便足集事必欲精求素行追抉宿疵則是改過不足以補愆自新不足以贖罪凡今將吏豈得盡無疵瑕人皆省思孰免疑畏又况阻命之輩脅從之流自知負恩安敢歸化斯釁非小所宜速圖伏願陛下思英主大略勿以小不忍虧橈興復之業也上釋然開寤善待楚琳使者優詔存慰之丁酉加宣武節度使劉洽同平章事己亥以行在都知兵馬使渾瑊同平章事兼朔方節度使朔方邠寧振武永平奉天行營兵馬副元帥庚子詔數李懷光罪惡叙朔方將士忠順功名猶以懷光舊勲曲加容貸其副元帥太尉中書令河中尹并朔方等諸道節度觀察等使宜並罷免授太子太保其所管兵馬委本軍自舉一人功高望重者便宜統領速具奏聞當授旌旄以從人欲夏四月壬寅以邠寧兵馬使韓遊瓌為邠寧節度使癸卯以奉天行營兵馬使戴休顔為奉天行營節度使靈武守將寗景璿為李懷光治第别將李如暹曰李太尉逐天子而景璿為之治第是亦反也攻而殺之甲辰加李晟鄜坊京畿渭北商華副元帥晟家百口及神䇿軍士家屬皆在長安朱泚善遇之軍中有言及家者晟泣曰天子何在敢言家乎泚使晟親近以家書遺晟曰公家無恙晟怒曰爾敢為賊為間立斬之軍士未授春衣盛夏猶衣裘褐終無叛志乙巳以陝虢防遏使唐朝臣為河中同終節度使前河中尹李齊運為京兆尹供晟軍糧役庚戌以魏博兵馬使田緒為魏博節度使渾瑊師諸軍出斜谷崔漢衡􅂆吐蕃出兵助之尚結賛曰邠軍不出將襲我後韓遊瓌聞之遣其將曹子逹將兵三千徃㑹瑊軍吐蕃遣其將論莽羅依將兵二萬從之李楚琳遣其將石鍠將卒七百從瑊㧞武功庚戌朱泚遣其將韓旻等攻武功鍠以其衆迎降瑊戰不利收兵登西原㑹曹子逹以吐蕃至擊旻大破之於武亭川斬首萬餘級旻僅以身免瑊遂引兵屯奉天與李晟東西相應以逼長安上欲為唐安公主造塔厚􅁙之諫議大夫同平章事姜公輔表諫以為山南非久安之地公主之􅁙㑹歸上都此宜儉薄以副軍須之急上使謂陸贄曰唐安造塔其費甚㣲非宰相所宜論公輔正欲指朕過失自求名耳相負如此當如何處之贄上奏以為公輔任居宰相遇事論諫不當罪之其略曰公輔頃與臣同在翰林臣今據理辨直則渉於私黨之嫌希㫖順成則違於匡輔之義渉嫌上貽於身患違義實玷於君恩徇身忘君臣之恥也又曰惟闇惑之主則怨讟溢於下國而耳不欲聞腥徳逹于上天而心不求寤迨乎顛覆猶未知非又曰當問理之是非豈論事之大小虞書曰兢兢業業一日二日萬機唐虞之際主聖臣賢慮事之㣲日至萬數然則㣲之不可不重也如此陛下又安可忽而勿念乎又曰若以諫爭為指過則剖心之主不宜見罪於哲王以諫爭為取名則匪躬之臣不應垂訓於聖典又曰假有意將指過諫以取名但能聞善而遷見諫不逆則所指者適足以彰陛下莫大之善所取者適足以資陛下無疆之休因而利焉所獲多矣儻或怒其指過而不改則陛下招惡直之譏黜其取名而不容則陛下被違諫之謗是乃掩己過而過彌著損彼名而名益彰果而行之所失大矣上意猶怒甲寅罷公輔爲左庻子加西川節度使張延賞同平章事賞其供億無乏故也朱泚姚令言數遣人誘涇原節度使馮河清河清皆斬其使者大將田希鑒密與泚通殺河清以軍府附於泚泚以希鑒為涇原節度使上問陸䞇近有卑官自山北來者率非良士有邢建者論説賊勢語最張皇察其事情頗似窺覘今已於一所安置如此之類更有數人若不追尋恐成姦計卿試思之如何為便䞇上奏以為今盗據宫闕有冐渉險逺來赴行在者當量加恩賞豈得復猜慮拘囚其略曰以一人之聽覽而欲窮宇宙之變態以一人之防慮而欲勝億兆之姦欺役智彌精失道彌逺項籍納秦降卒二十萬慮其懷詐復叛一舉而盡阬之其於防虞亦巳甚矣漢高豁逹大度天下之士至者納用不疑其於備慮可謂䟽矣然而項氏以滅劉氏以昌蓄疑之與推誠其效固不同也秦皇嚴粛雄猜而荆軻奮其隂計光武寛容博厚而馬援輸其􅅃誠豈不以虚懷待人人亦思附任數御物物終不親情思附則感而悦之雖冦讎化為心膂矣意不親則懼而阻之雖骨肉結為仇慝矣又曰陛下智出庶物有輕待人臣之心思周萬機有獨馭區㝢之意謀吞衆略有過慎之防明照羣情有先事之察嚴束百辟有任刑致理之規威制四方有以力勝殘之志由是才能者怨於不任忠藎者憂於見疑著勲業者懼於不容懷反側者迫於及討馴致離叛構成禍災天子所作天下式瞻小猶慎之矧又非小願陛下以覆車之轍為戒實宗社無疆之休丁巳以前山南東道節度使南皮賈耽為工部尚書先是耽使行軍司馬樊澤奏事行在澤既復命方大宴有急牒至以澤代耽為節度使耽内牒懷中宴飲如故顔色不改宴罷召澤告之且命將吏謁澤牙將張獻甫怒曰行軍為尚書問天子起居乃敢自圖節鉞奪尚書土地事人不忠衆心不服請殺之耽曰是何言也天子所命即為節度使矣即日離鎮以獻甫自隨軍府遂安左僕射李揆自吐蕃還甲子薨於鳯州韓遊瓌引兵㑹渾瑊於奉天丙寅加平盧節度使李納同平章事丁卯義王玼薨朱滔攻具州百餘日馬寔攻魏州亦踰四旬皆不能下賈林復為李抱真説王武俊曰朱滔志吞貝魏復值田悦被害儻旬日不救則魏博皆為滔有矣魏博既下則張孝忠必為之臣滔連三道之兵益以囘紇進臨常山明公欲保其宗族得乎常山不守則昭義退保西山河朔盡入於滔矣不若乘貝魏未下與昭義合兵救之滔既破亡則闗中䘮氣朱泚不日梟夷鑾輿反正諸將之功孰有居明公之右者哉武俊悦從之戊辰武俊軍于南宫東南抱真自臨洺引兵㑹之與武俊營相距十里兩軍尚相疑明日抱真以數騎詣武俊營賔客共諫止之抱真命行軍司馬盧􅀇卿勒兵以俟曰吾之此舉繫天下安危若其不還領軍事以聽朝命亦惟子勵將士以雪讎恥亦惟子言終遂行武俊嚴備以待之抱真見武俊敘國家禍難天子播遷持武俊哭流涕縱横武俊亦悲不自勝左右莫能仰視遂與武俊約為兄弟誓同滅賊武俊曰相公十兄名高四海曏䝉開諭得弃逆從順免葅醢之罪享王公之榮今又不間胡虜辱為兄弟武俊當何以為報乎滔所恃者囘紇耳不足畏也戰日願十兄按轡臨視武俊决為十兄破之抱真退入武俊帳中酣寢久之武俊感激待之益恭指心仰天曰此身已許十兄死矣遂連營而進山南地熱上以軍士未有春服亦自御裌衣資治通鑑卷第二百三十
