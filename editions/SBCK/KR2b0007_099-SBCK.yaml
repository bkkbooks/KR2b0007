body:
  text: 三月姚襄及趙汝陰王琨各引兵救襄國冉閔遣車􅀐將軍胡睦拒襄於長蘆將軍孫威拒琨於黄丘皆敗還士卒略盡閔欲自岀撃之衛將軍王泰諫曰今襄國未下外救雲集若我岀戰必覆背受敵此危道也不若固壘以挫其銳徐觀其釁而撃之且陛下親臨行陳如失萬全則大事去矣閔將止道士灋饒進曰陛下圍襄國經年無尺寸之功今賊至又避不撃將何以使將士乎且太白入昴當殺胡王百戰百克不可失也閔攘袂大言曰吾戰决矣敢沮衆者斬乃悉衆岀與襄琨戰恱綰適以燕兵至去魏兵數里䟽布騎卒曵柴揚塵魏人望之恟懼襄琨綰三面撃之趙王祗自後衝之魏兵大敗閔與十餘騎走還鄴降胡栗特康等執大單于胤及左僕射劉琦以降趙趙王祗殺之胡睦及司空石璞尚書令徐機中書監盧諶等并將士死者凡十餘萬人閔濳還人無知者鄴中震恐訛言閔巳􅃿射聲校尉張艾請閔親郊以安衆心閔從之訛言乃息閔支解灋饒父子贈韋謏大司徒姚襄還灄頭姚弋仲怒其不擒閔杖之一百初閔之爲趙相也悉散倉庫以樹私恩與羌胡相攻無月不戰趙所徙青雍幽荆四州之民及氐􅆧胡蠻數百萬口以趙灋禁不行各還本土道路交錯玄相殺掠其能逹者什有二三中原大亂因以饑疫人相食無復耕者趙王祗使其將劉顯帥衆七萬攻鄴軍于明光宫去鄴二十三里魏主閔恐召王泰欲與之謀泰恚前言之不從辭以瘡甚閔親臨問之泰固稱疾篤閔怒還宫謂左右曰巴奴乃公豈假汝爲命邪要將先滅羣胡却斬王泰乃悉衆岀戰大破顯軍追奔至陽平斬首三萬餘級顯懼密使請降求殺祗以自效閔乃引歸會有告王泰欲叛入秦者閔殺之夷其三族秦王健分遣使者問民疾苦搜羅儁異寛重斂之稅弛離宫之禁罷無用之器去侈靡之服凡趙之苛政不便於民者皆除之杜洪張琚遣使召梁州刺史司馬勲夏四月勲帥歩騎三萬赴之秦王健禦之於五丈原勲屢戰皆敗退歸南鄭健以中書令賈􅀇碩始者不上尊號銜之使人告􅀇碩與司馬勲通并其諸子皆殺之渤海人逄約因趙亂擁衆數千家附於魏魏以約爲渤海太守故太守劉準隗之兄子也土豪封放弈之從弟也别聚衆自守閔以準爲幽州刺史與約中分渤海燕王儁使封弈討約使昌􅀺太守高開討準放開瞻之子也弈引兵直抵約壘遣人謂約曰相與鄉里隔絶日乆會遇甚難時事利害人各有心非所論也願單岀一相見以寫佇結之情約素信重弈即岀見弈於門外各屏騎卒單馬交語弈與論叙平生畢因說之曰與君累世同鄉情相愛重誠欲君享祚無窮今旣獲展奉不可不盡所懐冉閔乗石氏之亂奄有成資是冝天下服其彊矣而禍亂方始固知天命不可力爭也燕王弈世載德奉義討亂所征無敵今巳都薊南臨趙魏逺近之民襁負歸之民厭荼毒咸思有道冉閔之亡匪朝伊夕成敗之形昭然易見且燕王肇開王業虛心賢儁君能翻然改圖則功參絳灌慶流苖裔孰與爲亡國將守孤城以待必至之禍哉約聞之悵然不言弈給使張安有勇力弈豫戒之俟約氣下安突前持其馬鞚因挾之而馳至營弈與坐謂曰君計不能自决故相為决之非欲取君以邀功乃欲全君以安民也高開至渤海準放迎降儁以放爲渤海太守準爲右司馬約參軍事以約誘於人而遇獲更其名曰釣劉顯弑趙王祗及其丞相樂安王炳太宰趙庻等十餘人傳首于鄴驃騎將軍石寜奔柏人魏主閔焚祗首于通衢拜顯上大將軍大單于冀州牧五月趙兖州刺史劉啓自鄄城來奔秋七月劉顯復引兵攻鄴魏主閔撃敗之顯還稱帝於襄國八月魏徐州刺史周成兖州刺史魏統荆州刺史樂弘豫州牧張遇以廩丘許昌等諸城來降平南將軍高崇征虜將軍吕䕶執洛州刺史鄭系以其地来降燕王儁遣慕容恪攻中山慕容評攻王午于魯口魏中山太守上谷侯龕閉城拒守恪南徇常山軍于九門魏趙郡太守遼西李邽舉郡降恪厚撫之將邽還圍中山矦龕乃降恪入中山遷其將帥土豪數十家詣薊餘皆安堵軍令嚴明秋豪不犯慕容評至南安王午遣其將鄭生拒戰評撃斬之恱綰還自襄國儁乃知張舉之妄而殺之常煒有四男二女在中山儁釋煒之囚使諸子就見之煒上䟽謝恩儁手令荅曰卿本不爲生計孤以州里相存耳今大亂之中諸子盡至豈非天所念邪天且念卿況於孤乎賜妾一人榖三百斛使居凡城以北平太守孫興爲中山太守興善於綏撫中山遂安庫傉官偉帥部衆自上黨降燕姚弋仲遣使来請降冬十一月以弋仲爲使持節六夷大都督督江北諸軍事騎大將軍開府儀同三司大單于高陵郡公又以其子襄爲持節平北將軍都督并州諸軍事并州刺史平鄉縣公逄釣亡歸勃海招集舊衆以叛燕樂陵太守賈堅使人告諭鄉人示以成敗釣部衆稍散遂來奔吐谷渾葉延卒子碎奚立初桓温聞石氏亂上䟽請岀師經略中原事乆不報温知朝廷杖殷浩以抗已甚忿之然素知浩之爲人亦不之憚也以國無他釁遂得相持彌年雖有君臣之跡羈縻而巳八州士衆資調殆不爲國家用屢求北伐詔書不聽十二月辛未温拜表輒行帥衆四五萬順流而下軍于武昌朝廷大懼殷浩欲去位以避温又欲以騶虞幡駐温軍吏部尚書王彪之言於會稽王昱曰此屬皆自為計非能保社稷為殿下計也若殷浩去職人情離駭天子獨坐當此之際必有任其責者非殿下而誰乎又謂浩曰彼若抗表問罪卿爲之首事任如此猜釁巳成欲作匹夫豈有全地邪且當靜以待之令相王與手書示以􅅃誠爲陳成敗彼必旋師若不從則遣中詔又不從乃當以正義相裁柰何無故忩忩先自猖蹶乎浩曰决大事正自難頃日來欲使人悶聞卿此謀意始得了彪之彬之子也撫軍司馬高崧言於昱曰王宜致書諭以禍福自當返斾如其不爾便六軍整駕逆順於兹判矣乃於坐爲昱草書曰宼難宜平時會宜接此實為國逺圗經略大筭能弘斯㑹非足下而誰但以比興師動衆要當以資實為本運轉之艱古人所難不可易之於始而不熟慮頃所以深用爲疑惟在此耳然異常之舉衆之所駭遊聲噂􅊱想足下亦少聞之茍患失之無所不至或能望風振擾一時崩散如此則望實並䘮社稷之事去矣皆由吾闇弱徳信不著不能鎮靜羣庶保固維城所以内愧于心外慙良友吾與足下雖職有内外安社稷保家國其致一也天下安危繫之明德當先思寜國而後圗其外使王基克隆大義弘著所望於足下區區誠懐豈可復顧嫌而不盡哉温即上䟽惶恐致謝回軍還鎮朝廷將行郊祀㑹稽王昱問於王彪之曰郊祀應有赦否彪之曰自中興以來郊祀往往有赦愚意常謂非宜凶愚之人以為郊必有赦將生心於徼幸矣昱從之燕王儁如龍城丁零翟䑕帥所部降燕封為歸義王八年春正月辛􅆗日有食之秦丞相雄等請秦王健正尊號依漢晉之舊不必效石氏之初健從之即皇帝位大赦諸公皆進爵為王且言單于所以統壹百蠻非天子所宜領以授太子萇司馬勲旣還漢中杜洪張琚屯宜秋洪自以右族輕琚琚遂殺洪自立爲秦王改元建昌劉顯攻常山魏主閔留大將軍蔣幹使輔太子智守鄴自將八千騎救之顯大司馬清河王寧以棗強降魏閔撃顯敗之追奔至襄國顯大將軍曹伏駒開門納閔閔殺顯及其公卿巳下百餘人焚襄國宫室遷其民於鄴趙汝隂王琨以其妻妾來奔斬於建康市石氏遂絶尚書左丞孔嚴言於殷浩曰比來衆情良可寒心不知使君當何以鎮之愚謂宜明受任之方韓彭專征伐蕭曹守管籥内外之任各有攸司深思廉藺屈身之義平勃交歡之謀令穆然無閒然後可以保大定功也觀頃日降附之徒皆人面獸心貪而無親恐難以義感也浩不從嚴愉之從子也浩上䟽請北岀許洛詔許之以安西將軍謝尚北中郎將荀羡爲督統進屯壽春謝尚不能撫尉張遇遇怒據許昌叛使其将上官恩據洛陽樂􅀪攻督䕶戴施於倉垣浩軍不能進三月命荀羡鎮淮隂尋加監青州諸軍事又領兖州刺史鎮下邳乙巳燕王儁還薊稍徙軍中文武兵民家屬於薊姚弋仲有子四十二人及病謂諸子曰石氏待吾厚吾本欲爲之盡力今石氏巳滅中原無主我死汝亟自歸於晉當固執臣節無爲不義也弋仲卒子襄秘不發䘮帥戸六萬南攻陽平元城發干破之屯于碻磝津以太原王亮為長史天水尹赤為司馬太原薛瓉略陽權翼為參軍襄與秦兵戰敗亡三萬餘戸南至滎陽始發䘮又與秦将高昌李歴戰于麻田馬中流矢而斃弟萇以馬授襄襄曰汝何以自免萇曰但令兄濟豎子必不敢害萇會敕至俱免尹赤奔秦秦以赤爲并州刺史鎮蒲阪襄遂帥衆歸晉送其五弟爲質詔襄屯譙城襄單騎渡淮見謝尚于壽春尚聞其名命去仗衛幅巾待之歡若平生襄愽學善談論江東人士皆重之魏主閔旣克襄國因遊食常山中山諸郡趙立義將軍叚勤聚胡羯萬餘人保據繹幕自稱趙帝夏四月甲子燕王儁遣慕容恪等擊魏慕容霸等擊勤魏主閔將與燕戰大將軍董閏車騎將軍張温諫曰鮮卑乗勝鋒銳且彼衆我寡請且避之俟其驕墯然後益兵以擊之閔怒曰吾欲以此衆平幽州斬慕容儁今遇恪而避之人謂我何司徒劉茂特進郎闓相謂曰吾君此行必不還矣吾等何為坐待戮辱皆自殺閔軍于安喜慕容恪引兵從之閔趣常山恪追之丙子及於魏昌之廉臺閔與燕兵十戰燕兵皆不勝閔素有勇名所將兵精銳燕人憚之慕容恪廵陳諭将士曰冉閔勇而無謀一夫敵耳其士卒飢疲甲兵雖精其實難用不足破也閔以所将多歩卒而燕皆騎兵引兵将趣林中恪參軍高開曰吾騎兵利平地若閔得入林不可復制宜亟遣輕騎邀之旣合而陽走誘致平地然後可擊也恪從之魏兵還就平地恪分軍為三部謂諸將曰閔性輕銳又自以衆少必致死於我我厚集中軍之陳以待之俟其合戰卿等從旁撃之無不克矣乃擇鮮卑善射者五千人以鐡鎻連其馬為方陳而前閔所乗駿馬曰朱龍日行千里閔左操雙刃矛右執鉤㦸以撃燕兵斬首三百餘級望見大幢知其為中軍直衝之燕兩軍從旁夾擊大破之圍閔數重閔潰圍東走二十餘里朱龍忽斃爲燕兵所執燕人殺魏僕射劉群執董閔張温及閔皆送於薊閔子操奔魯口高開􅀍創而卒慕容恪進屯常山儁命恪鎮中山己夘冉閔至薊儁大赦立閔而責之曰汝奴僕下才何得妄稱帝閔曰天下大亂爾曹夷狄禽獸之類猶稱帝況我中土英雄何爲不得稱帝邪儁怒鞭之三百送於龍城慕容霸軍至繹幕叚勤與弟思聦舉城降甲申儁遣慕容評及中尉矦龕帥精騎萬人攻鄴癸巳至鄴魏蔣幹及太子智閉城拒守城外皆降於燕劉寜及弟崇帥胡騎三千奔晉陽秦以張遇為征東大將軍豫州牧五月秦主健攻張琚於宜秋斬之鄴中大饑人相食故趙時宫人􅀍食略盡蔣幹遣侍中繆嵩詹事劉猗奉表請降且求救於謝尚庚寅燕王儁遣廣威將軍慕容軍殿中將軍慕輿根右司馬皇甫眞等帥歩騎二萬助慕容評攻鄴辛卯燕人斬冉閔於龍城會大旱蝗燕王雋謂閔爲祟遣使祀之謚曰悼武天王初謝尚使戴施據枋頭施聞蒋幹求救乃自倉垣徙屯棘津止幹使者求傳國璽劉猗使繆嵩還鄴白幹幹疑尚不能救沈吟未决六月施帥壮士百餘人入鄴助守三臺給之曰今燕寇在外道路不通璽未敢送也卿且岀以付我我當馳白天子天子聞璽在吾所信卿至誠必多發兵糧以相救餉幹以爲然岀璽付之施宣言使督䕶何融迎糧隂令懐璽送于枋頭甲子蔣幹帥鋭卒五千及晉兵岀戰慕容評大破之斬首四千級幹脫走入城甲申秦主健還長安謝尚姚襄共攻張遇于許昌秦主健遣丞相東海王雄衛大將軍平昌王菁略地關東帥歩騎二萬救之丁亥戰于潁水之誡橋尚等大敗死者萬五千人尚犇還淮南襄棄輜重送尚于芍陂尚悉以後事付襄殷浩聞尚敗退屯夀春秋七月秦丞相雄徙張遇及陳潁許洛之民五萬餘户於關中以右衛將軍楊群為豫州刺史鎮許昌謝尚降號建威將軍趙故西中郎將王擢遣使請降拜擢秦州刺史丁酉以武陵王晞為太宰丙辰燕王儁如中山王午聞魏敗時鄧恒巳死午自稱安國王八月戊辰燕王儁遣慕容恪封弈陽騖攻之午閉城自守送冉操詣燕軍燕人掠其禾稼而還􅁃午魏長水校尉馬願等開鄴城納燕兵戴施蒋幹懸縋而下犇于倉垣慕容評送魏后董氏太子智太尉申鍾司空條攸等及乗輿服御于薊尚書令王簡左僕射張乾右僕射郎肅皆自殺燕王儁詐云董氏得傳國璽獻之賜號奉璽君賜冉智爵海賔矦以申鍾爲大將軍右長史命慕容評鎮鄴桓温使司馬勲助周撫討蕭敬文於涪城斬之謝尚自枋頭迎傳國璽至建康百僚畢賀秦以雷弱兒爲大司馬毛貴爲太尉張遇爲司空殷浩之北伐也中軍将軍王羲之以書止之不聽旣而無功復謀再舉羲之遺浩書曰今以區區江左天下寒心固巳乆矣力爭武功非所當作自頃處内外之任者未有深謀逺慮而疲竭根本各從所志竟無一功可論遂令天下將有土崩之埶任其事者豈得辭四海之責哉今軍破於外資竭於内保淮之志非所復及莫若還保長江督將各復舊鎮自長江以外羈縻而巳引咎責躬更爲善治省其賦役與民更始庶可以救倒懸之急也使君起於布衣任天下之重當董統之任而敗䘮至此恐闔朝羣賢未有與人分其謗者若猶以前事爲未工故復求之於分外宇宙雖廣自容何所此愚智所不解也又與㑹稽王昱牋曰爲人臣者誰不願尊其主比隆前丗況遇難得之運哉顧力有所不及豈可不權輕重而處之也今雖有可喜之㑹内求諸已而所憂乃重於所喜功未可期遺黎殱盡勞役無時徵求日重以區區吳越經緯天下十分之九不亡何待而不度德量力不􅁦不已此封内所痛心歎悼而莫敢吐誠者也往者不可諫來者猶可追願殿下更垂三思先為不可勝之基須根立勢舉謀之未晩若改不行恐麋鹿之游將不止林藪而已願殿下蹔廢虛逺之懐以救倒懸之急可謂以亡為存轉禍為福也不從九月浩屯泗口遣河南太守戴施據石門滎陽太守劉遯戍倉垣浩以軍興罷遣太學生徒學校由此遂廢冬十月謝尚遣冠軍將軍王浹攻許昌克之秦豫州刺史楊群退屯弘農徵尚為給事中戍石頭丁卯燕王儁還薊故趙將擁兵據州郡者各遣使降燕燕王儁以王擢為益州刺史䕫逸為秦州刺史張平為并州刺史李歴為兖州刺史高昌爲安西將軍劉寜為車騎將軍慕容恪屯安平積糧治攻具將討王午丙戌中山蘇林起兵於無極自稱天子恪自魯口還討林閏月戊子燕王儁遣廣威將軍慕輿根助恪攻林斬之王午為其將秦興所殺吕䕶殺興復自稱安國王燕羣僚共上尊號於燕王儁儁許之十一月丁卯始置百官以國相封弈為太尉左長史陽騖為尚書令右司馬皇甫真為尚書左僕射典書令張悕為右僕射其餘文武拜授有差戊辰儁即皇帝位大赦自謂獲傳國璽改元元璽追尊武宣王為高祖武宣皇帝文明王為太祖文明皇帝時晉使適至燕儁謂曰汝還白汝天子我承人乏為中國所推巳為帝矣改司州為中州建留臺於龍都以玄菟太守乙逸爲尚書專委留務秦丞相雄攻王擢于隴西擢奔涼州雄還屯隴東張重華以擢為征虜將軍秦州刺史特寵待之九年春正月乙􅆗朔大赦二月庚子燕王儁立其妃可足渾氏為皇后世子曄為皇太子皆自龍城遷于薊宫張重華遣将軍張弘宋修㑹王擢帥歩騎萬五千伐秦秦丞相雄衛将軍菁拒之大敗涼兵於龍黎斬首萬二千級虜張弘宋修王擢棄秦州犇姑臧秦主健以領軍將軍苻願為秦州刺史鎮上邽三月交州刺史阮敷討林邑破五十餘壘趙故衛尉常山李犢聚衆數千人叛燕西域胡劉康詐稱劉曜子聚衆於平陽自稱晉王夏四月秦左衛將軍苻飛討擒之以安西將軍謝尚爲尚書僕射五月張重華復使王擢帥衆二萬伐上邽秦州郡縣多應之苻願戰敗奔長安重華因上䟽請伐秦詔進重華涼州牧燕主儁遣衛将軍恪討李犢犢降遂東擊吕䕶於魯口六月秦苻飛攻氐王楊􅀄於仇池為初所敗丞相雄平昌王菁帥歩騎四萬屯于隴東秦主健納張遇繼母韓氏爲昭儀數於衆中謂遇曰卿吾假子也遇恥之因雄等精兵在外隂結􅀜中豪傑欲㓕苻氏以其地來降秋七月遇與黄門劉晃謀夜襲健晃約開門以待之㑹健使晃岀外晃固辭不得巳而行遇不知引兵至門門不開事覺伏誅於是孔持起池陽劉珍夏矦顯起鄠喬秉起雍胡陽赤起司竹呼延毒起灞城衆數萬人各遣使來請兵秦以左僕射魚遵為司空九月秦丞相雄帥衆二萬還長安遣平昌王菁略定上洛置荆州于豐陽川以歩兵校尉金城郭敬為刺史雄與清河王灋苻飛分討孔持等姚襄屯歴陽以燕秦方彊未有北伐之志乃夾淮廣興屯田訓厲将士殷浩在夀春惡其彊盛囚襄諸弟屢遣刺客刺之刺客皆以情告襄安北將軍魏統卒弟憬代領部曲浩濳遣憬帥衆五千襲之襄斬憬并其衆浩愈惡之使龍驤將軍劉啓守譙遷襄于梁國蠡臺表授梁國内史魏憬子弟數往來夀春襄益疑懼遣參軍權翼使於浩浩曰身與姚平北共為王臣休戚同之平北毎舉動自專甚失輔車之理豈所望也翼曰平北英姿絶世擁兵數萬而逺歸晉室者以朝廷有道宰輔明哲故也今將軍輕信讒慝之言與平北有隙愚謂猜嫌之端在此不在彼也浩曰平北姿性豪邁生殺自由又縱小人掠奪吾馬王臣之體固若是乎翼曰平北歸命聖朝豈肯妄殺無辜姦宄之人亦王灋所不容也殺之何害浩曰然則掠馬何也翼曰將軍謂平北雄武難制終將討之故取馬欲以自衛耳浩笑曰何至是也初浩隂遣人誘秦梁安雷弱兒使殺秦主健許以關右之任弱兒等僞許之且請兵應接浩聞張遇作亂健兄子輔國將軍黄眉自洛陽西奔以為安等事巳成冬十月浩自壽春帥衆七萬北伐欲進據洛陽修復園陵吏部尚書王彪之上㑹稽王昱牋以爲弱兒等容有詐偽浩未應輕進不從浩以姚襄為前驅襄引兵北行度浩將至詐令部衆夜遁隂伏甲以邀之浩聞而追襄至山桑襄縱兵撃之浩大敗棄輜重走保譙城襄俘斬萬餘悉收其資仗使兄益守山桑襄復如淮南㑹稽王昱謂王彪之曰君言無不中張陳無以過也西平敬烈公張重華有疾子曜靈纔十歲立為世子赦其境内重華庶兄長寜矦祚有勇力吏幹而傾巧善事内外與重華嬖臣趙長尉緝等結異姓兄弟都尉常據請岀之重華曰吾方以祚為周公使輔幼子君是何言也謝艾以枹罕之功有寵於重華左右疾之譛艾岀為酒泉太守艾上䟽言權倖用事公室將危乞聽臣入侍且言長寜矦祚及趙長等将爲亂宜盡逐之十一月己未重華疾甚手令徵艾爲衛將軍監中外諸軍事輔政祚長等匿而不宣丁卯重華卒世子耀靈立稱大司馬凉州刺史西平公趙長等矯重華遺令以長寜矦祚為都督中外諸軍事撫軍大將軍輔政殷浩使部將劉啓王彬之攻姚益于山桑姚襄自淮南撃之啓彬之皆敗死襄進據芍陂趙末樂陵朱秃平原杜能清河丁嬈陽平孫元各擁兵分據城邑至是皆請降於燕燕主儁以秃爲青州刺史能爲平原太守嬈為立節将軍元爲兖州刺史各留撫其營秦丞相雄克池陽斬孔持十二月清河王灋苻飛克鄠斬劉珍夏矦顯姚襄濟淮屯盱眙招掠流民衆至七萬分置守宰勸課農桑遣使詣建康罪狀殷浩并自陳謝詔以謝尚都督江西淮南諸軍事豫州刺史鎮歴陽凉右長史趙長等建議以為時難未夷宜立長君曜靈冲幼請立長寜矦祚張祚先得幸於重華之母馬氏馬氏許之乃廢張曜靈為涼寜矦立祚為大都督大將軍凉州牧凉公祚旣得志恣為滛虐殺重華妃裴氏及謝艾燕衛將軍恪撫軍将軍軍左将軍彪等屢薦給事黄門侍郎霸有命世之才宜揔大任是歲燕主儁以霸為使持節安東将軍比冀州刺史鎮常山十年春正月張祚自稱凉王改建興四十二年為和平元年立妻辛氏為王后子太和為太子封弟天錫為長寜矦子庭堅為建康矦曜靈弟玄靚為凉武矦置百官郊祀天地用天子禮樂尚書馬岌切諫坐免官郎中丁琪復諫曰我自武公以來世守臣節抱忠履謙五十餘年故能以一州之衆抗舉世之虜師徒歲起民不告疲殿下勲德未高於先公而亟謀革命臣未見其可也彼士民所以用命四逺所以歸嚮者以吾能奉晉室故也今而自尊則中外離心安能以一隅之地拒天下之彊敵乎祚大怒斬之於闕下故魏降将周成反自宛襲洛陽辛酉河南太守戴施奔鮪渚秦丞相雄克司竹胡陽赤奔霸城依呼延毒中軍将軍揚州刺史殷浩連年北伐師徒屢敗糧械都盡征西将軍桓温因朝野之怨上䟽數浩之罪請廢之朝廷不得巳免浩為庶人徙東陽之信安自此内外大權一歸於温矣浩少與温齊名而心競不相下温常輕之浩旣廢黜雖愁怨不形辭色常書空作咄咄怪事字乆之温謂掾郗超曰浩有德有言嚮為令僕足以儀刑百揆朝廷用違其才耳將以浩爲尚書令以書告之浩欣然許焉將荅書慮有謬誤開閉者十數竟逹空凾温大怒由是遂絶卒於徙所以前㑹稽内史王述為揚州刺史二月乙丑桓温統歩騎四萬發江陵水軍自襄陽入均口至南鄉歩兵自淅川趣武關命司馬勲岀子午道以伐秦燕衞將軍恪圍魯口三月㧞之吕䕶奔野王遣弟奉表謝罪於燕燕以䕶爲河内太守姚襄遣使降燕燕主雋以慕容評為鎭南將軍都督秦雍益梁江楊荆徐兖豫十州諸軍事權鎭洛水以慕容彊為前鋒都督督荆徐二州縁淮諸軍事進據河南桓温别將攻上洛獲秦荆州刺史郭敬進撃青泥破之司馬勲掠秦西鄙涼秦州刺史王擢攻陳倉以應温秦主健遣太子萇丞相雄淮南王生平昌王菁北平王碩帥衆五萬軍于嶢柳以拒温夏四月己亥温與秦兵戰于藍田秦淮南王生單騎突陳岀入以十數殺傷晉將士甚衆温督衆力戰秦兵大敗將軍桓冲又敗秦丞相雄于白鹿原冲温之弟也温轉戰而前壬寅進至灞上秦太子萇等退屯城南秦主健與老弱六千固守長安小城悉發精兵三萬遣大司馬雷弱兒等與萇合兵以拒温三輔郡縣皆來降温撫諭居民使安堵復業民爭持牛酒迎勞男女夾路觀之􅂄老有垂泣者曰不圗今日復覩官軍秦丞相雄帥􅀐七千襲司馬勲于子午谷破之勲退屯女媧堡戊申燕主雋封撫軍將軍軍為襄陽王左將軍彭為武昌王以衛將軍恪為大司馬侍中大都督録尚書事封太原王鎭南將軍評為司徒驃騎將軍封上庸王封安東將軍霸為吳王左賢王友為范陽王散騎常侍厲為下邳王散騎常侍宜為廬江王寜北將軍度爲樂浪王又封弟桓為宜都王逮為臨賀王徽為河間王龍為歷陽王納為北海王秀為蘭陵王嶽為安豐王德為梁公黙為始安公僂為南康公子咸為樂安王亮為勃海王温為帶方王渉為漁陽王暐為中山王以尚書令陽騖為司空仍守尚書令命冀州刺史吳王霸徙治信都初燕王皝奇霸之才故名之曰霸將以為世子羣臣諫而止然寵遇猶踰於世子由是雋惡之以其甞墜馬折齒更名曰􅆙尋以其應䜟文更名曰垂遷侍中録留臺事徙鎭龍城垂大得東北之和雋愈惡之復召還五月江西流民郭敞等千餘人執陳留内史劉仕降於姚襄建康震駭以吏部尚書周閔為中軍將軍屯中堂豫州刺史謝尚自歷陽還衛京師固江備守王擢㧞陳倉殺秦扶風内史毛難北海王猛少好學倜儻有大志不屑細務人皆輕之猛悠然自得隱居華隂聞桓温入􅀜披褐詣之捫虱而談當世之務旁若無人温異之問曰吾奉天子之命將銳兵十萬為百姓除殘賊而三秦豪傑未有至者何也猛曰公不逺數千里深入敵境今長安咫尺而不度灞水百姓未知公心所以不至温嘿然無以應徐曰江東無卿比也乃署猛軍謀􅀕酒温與秦丞相雄等戰于白鹿原温兵不利死者萬餘人初温指秦麥以為糧旣而秦人悉芟麥清野以待之温軍乏食六月丁丑徙􅀜中三千餘戸而歸以王猛為高官督䕶欲與俱還猛辭不就呼延毒帥衆一萬從温還秦太子萇等隨温撃之比至潼􅀜温軍屢敗失亡以萬數温之屯灞上也順陽太守薛珍勸温徑進逼長安温弗從珍以偏師獨濟頗有所獲及温退乃還顯言於衆自矜其勇而咎温之持重温殺之秦丞相雄撃司馬勲王擢於陳倉勲奔漢中擢奔略陽秦以光禄大夫趙俱為洛州刺史鎮宜陽秦東海敬武王雄攻喬秉于雍丙申卒秦王健哭之嘔血曰天不欲吾平四海邪何奪吾元才之速也贈魏王葬禮依晉安平獻王故事雄以佐命元勲位兼將相權侔人主而謙恭汎愛遵奉灋度故健重之常曰元才吾之周公也子堅襲爵堅性至孝幼有志度愽學多能交結英豪吕婆樓彊汪及略陽梁平老皆與之善燕樂陵太守慕容鉤翰之子也與青州刺史朱禿共治厭次鉤自恃宗室毎陵侮禿禿不勝忿秋七月襲鉤殺之南奔叚龕秦太子萇攻喬秉于雍八月斬之􅀜中悉平秦主健賞拒桓温之功以雷弱兒為丞相毛貴為太傅魚遵為太尉淮南王生為中軍大将軍平昌王菁為司空健勤於政事數延公卿咨講治道承趙人苛虐奢侈之後易以寛簡節儉崇儒禮士由是秦人恱之燕大調兵衆因發詔之日號曰丙戌舉九月桓温還自伐秦帝遣侍中黄門勞温于襄陽或告燕黄門侍郎宋斌等謀奉冉智為主而反皆伏誅斌燭之子也秦太子萇之拒桓温也為流矢所中冬十月卒謚曰獻哀燕王雋如龍城桓温之入􅀜也王擢遣使告凉王祚言温善用兵其志難測祚懼且畏擢之叛已遣人刺之事泄祚益懼大發兵聲言東伐實欲西保敦煌㑹温還而止旣而遣秦州刺史午霸等帥兵三千擊擢破之十一月擢帥衆降秦秦以擢為尚書以上将軍啖鐵為秦州刺史秦王健叔父武都王安自晉還為姚襄所虜以為洛州刺史十二月安亡歸秦健以安為大司馬驃騎大將軍并州刺史鎮蒲坂是歲秦大饑米一升直布一匹資治通鑑卷第九十九
