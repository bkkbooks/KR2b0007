front:
  text: 帝廟號太祖立妻强氏爲天王后子萇爲太子靚爲平原公生爲淮南公覿爲長樂公方爲高陽公碩爲北平公騰爲淮陽公柳爲晉公桐爲汝南公廋爲魏公武爲燕公㓜爲趙公以苻雄爲都督中外諸軍事丞相領車騎大將軍雍州牧東海公苻菁爲衛大將軍平昌公宿衛二宫雷弱兒爲太尉毛貴爲司空略陽姜伯周爲尚書令梁楞爲左僕射王墮爲右僕射魚遵爲太子太師强平爲太傅叚純爲太保吕婆樓爲散騎常侍伯周健之舅平王后之弟婆樓本略陽氐酋也叚龕請以青州内附二月戊寅以龕爲鎮北將軍封齊公魏主閔攻圍襄國百餘日趙主祇危急乃去皇帝之號稱趙王遣太尉張舉乞師於燕許送傳國璽中軍將軍張春乞師於姚弋仲弋仲遣其子襄帥騎二萬八千救趙誡之曰冉閔棄仁背義屠滅石氏我受人厚遇當爲復讎老病不能自行汝才十倍於閔若不梟擒以來不必復見我也弋仲亦遣使告於燕燕王儁遣禦難將軍恱綰將兵三萬往㑹之冉閔聞儁欲救趙遣大司馬從事中郎廣寗常煒使於燕儁使封􅁉詰之曰冉閔石氏養息負恩作逆何敢􅂺稱大號煒曰湯放桀武王伐紂以興商周之業曹孟德養於宦官莫知所岀卒立魏氏之基苟非天命安能成功推此而言何必致問􅁉曰人言冉閔初立鑄金爲已像以卜成敗而像不成信乎煒曰不聞􅁉曰南來者皆云如是何故隱之煒曰姦僞之人欲矯天命以惑人者乃假符瑞託蓍􅀛以自重魏主握符璽據中州受命何疑而更反真爲僞取决於金像乎􅁉曰傳國璽果安在煒曰在鄴􅁉曰張舉言在襄國煒曰殺胡之日在鄴者殆無子遺時有迸漏者皆潛伏溝瀆中耳彼安知璽之所在乎彼求救者爲妄誕之辭無所不可况一璽乎儁猶以張舉之言爲信乃積柴其旁使􅁉以其私誘之曰君更熟思無爲徒取灰㓕煒正色曰石氏貪􅁀親帥大兵攻燕國都雖不克而返然志在必取故運資糧聚器械於東北者非以相資乃欲相滅也魏主誅翦石氏雖不爲燕臣子之心聞仇讎之㓕義當如何而更爲彼責我不亦異乎吾聞死者骨肉下于士精䰟升于天蒙君之惠速益薪縱火使僕得上訴於帝足矣左右請殺之儁曰彼不憚殺身以徇其主忠臣也且冉閔有罪使臣何預焉使岀就館夜使其鄉人趙瞻往勞之且曰君何不以實言王怒欲處君於遼碣之表奈何煒曰吾結髪以來尚不欺布衣況人主乎曲意茍合性所不能直情盡言雖沈東海不敢避也遂卧向壁不復與瞻言瞻具以白儁儁乃囚煒於龍城趙并州刺史張平遣使降秦秦王以平爲大將軍冀州牧燕王儁還薊
