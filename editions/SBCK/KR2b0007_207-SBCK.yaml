body:
  text: 臣司馬光奉勑編集唐紀二十三太荒落正月凡四年有竒起上章困敦七月盡旃䝉則天順聖皇后下久視元年秋七月獻俘於含樞殿太后以楷固為左玉鈐衛大將軍燕國公賜姓武氏召公卿合宴舉觴屬仁傑曰公之功也將賞之對曰此乃陛下威靈將帥盡力臣何功之有固辭不受閏月戊寅車駕還宫己丑以天官侍郎張錫為鳯閣侍郎同平章事鸞臺侍郎同平章事李嶠罷為成均祭酒錫嶠之舅也故罷嶠政事丁酉吐蕃將麴莽布支寇凉州圍昌松隴右諸軍大使唐休璟與戰於洪源谷麴莽布支兵甲鮮華休璟詣諸將曰諸論既死麴莽布支新為將不習軍事諸貴臣子弟皆從之望之雖如精鋭實易與耳請為諸君破之乃被甲先陷陳六戰皆㨗吐蕃大奔斬首二千五百級獲二禆將而還司府少卿楊元亨尚食奉御楊元禧皆􅀪武之子也元禧嘗忤張易之易之言於太后元禧楊素之族素父子隋之逆臣子孫不應供奉太后從之壬寅制楊素及其兄弟子孫皆不得任京官左遷元亨睦州刺史元禧貝州刺史庚戌以魏元忠為隴右諸軍大使撃吐蕃庚申太后欲造大像使天下僧尼日出一錢以助其功狄仁傑上䟽諫其略曰今之伽藍制過宫闕功不使鬼止在役人物不天來終湏地出不損百姓將何以求又曰游僧皆託佛法詿誤生人里陌動有經坊闤闠亦立精舍化誘所急切於官徴法事所須嚴於制敕又曰梁武簡文捨施無限及三淮沸浪五嶺騰煙列刹盈衢無救危亡之禍緇衣蔽路豈有勤王之師又曰雖斂僧錢百未支一尊容既廣不可露居覆以百層尚憂未遍自餘廊宇不得全無如來設敎以慈悲為主豈欲勞人以存虚飾又曰比來水旱不節當今邊境未寧若費官財又盡人力一隅有難將何以救之太后曰公敎朕為善何得相違遂罷其役阿悉吉薄露叛遣左金吾將軍田揚名殿中侍御史封思業討之軍至碎葉薄露夜於城傍剽掠而去思業將騎追之反為所敗􅀭名引西突厥斛瑟羅之衆攻其城旬餘不克九月薄露詐降思業誘而斬之遂俘其衆太后信重内史梁文惠公狄仁傑羣臣莫及常謂之國老而不名仁傑好面引廷爭太后毎屈意從之嘗從太后遊幸遇風吹仁傑巾墜而馬驚不能止太后命太子追執其鞚而繫之仁傑屢以老疾乞骸骨太后不許入見常止其拜曰毎見公拜朕亦身痛仍免其宿直戒其同僚曰自非軍國大事勿以煩公辛丑薨太后泣曰朝堂空矣自是朝廷有大事衆或不能决太后輒歎曰天奪吾國老何太早邪太后嘗問仁傑朕欲得一佳士用之誰可者仁傑曰未審陛下欲何所用之太后曰欲用為將相仁傑對曰文學緼藉則蘇味道李嶠固其選矣必欲取卓犖竒才則有荆州長史張柬之其人雖老宰相才也太后擢東之為洛州司馬數日又問仁傑對曰前薦柬之尚未用也太后曰已遷矣對曰臣所薦者可為宰相非司馬也乃遷秋官侍郎久之卒用為相仁傑又嘗薦夏官侍郎姚元崇監察御史曲阿桓彦範太州刺史敬暉等數十人率為名臣或謂仁傑曰天下桃李悉在公門矣仁傑曰薦賢為國非為私也初仁傑為魏州刺史有惠政百姓為之立生祠後其子景暉為魏州司功參軍貪暴為人患人遂毁其像焉冬十月辛亥以魏元忠為蕭闗道大揔管以備突厥甲寅制復以正月為十一月一月為正月赦天下丁巳納言韋巨源罷以文昌右丞韋安石為鸞臺侍郎同平章事安石津之孫也時武三思張易之兄弟用事安石數面折之嘗侍宴禁中易之引蜀啇宋霸子等數人在座同博安石跪奏曰啇賈賤類不應得預此㑹顧左右逐出之座中皆失色太后以其言直勞勉之同列皆歡服丁卯太后幸新安壬申還宫十二月甲寅突厥掠隴右諸監馬萬餘匹而去時屠禁尚未解鳯閣舍人全節崔融上言以為割烹犧牲弋獵禽獸聖人著之典禮不可廢闕又江南食魚河西食肉一日不可無冨者未革貧者難堪况貧賤之人仰屠為生日戮一人終不能絶但資恐喝徒長姦欺為政者茍順月令合禮經自然物遂其生人得其性矣戊午復開屠禁祠祭用牲牢如故長安元年春正月丁丑以成州言佛迹見改元大足二月己酉以鸞臺侍郎柏人李懐遠同平章事三月鳳閣侍郎同平章事張錫坐知選漏􅂥禁中語贓滿數萬當斬臨刑釋之流循州時蘇味道亦坐事與錫俱下司刑獄錫乘馬氣色自􅀂舍于三品院帷屏食飲無異平居味道歩至繫所席地而卧蔬食而巳太后聞之赦味道復其位是月大雪蘇味道以為瑞帥百官入賀殿中侍御史王求禮止之曰三月雪為瑞雪臘月雷為瑞雷乎味道不從既入求禮獨不賀進言曰今陽和布氣草木發榮而寒雪為災豈得誣以為瑞賀者皆諂䛕之士也太后為之罷朝時又有獻三足牛者宰相復賀求禮颺言曰凡物反常皆為妖此鼎足非其人政敎不行之象也太后為之愀然夏五月乙亥太后幸三陽宫以魏元忠為靈武道行軍大揔管以備突厥天官侍郎鹽官顧琮同平章事六月庚申以夏官尚書李逈秀同平章事逈秀性至孝其母本㣲賤妻崔氏常叱媵婢毋聞之不悦逈秀即時出之或曰賢室雖不避嫌疑然過非七出何遽如是逈秀曰娶妻本以養親今乃違忤顔色安敢留也竟出之秋七月甲戌太后還宫甲申李懐遠罷為秋官尚書八月突厥黙啜寇邊命安北大都䕶相王為天兵道元帥統諸軍撃之未行而虜退丙寅武邑人蘇安恒上疏曰陛下欽先聖之顧托受嗣子之推讓敬天順人二十年矣豈不聞帝舜褰裳周公復辟舜之於禹事秖族親旦與成王不離叔父族親何如子之愛叔父何如母之恩今太子孝敬是崇春秋既壯若使統臨宸極何異陛下之身陛下年徳既尊寳位將倦機務繁重浩蕩心神何不禪位東宫自怡聖體自昔理天下者不見二姓而俱王也當今梁定河内建昌諸王承陛下之䕃覆並得封王臣謂千秋萬嵗之後於事非便臣請黜為公侯任以閑􅂤臣又聞陛下有二十餘孫今無尺寸之封此非長久之計也臣請分土而王之擇立師傅教其孝敬之道以夾輔周室屏藩皇家斯為羙矣疏奏太后召見賜食慰諭而遣之太后春秋髙政事多委張易之兄弟邵王重潤與其妹永泰郡主主壻魏王武延基竊議其事易之訴於太后九月壬申太后皆逼令自殺延基承嗣之子也丙申以相王知左右羽林衛大將軍事冬十月壬寅太后西入闗辛酉至京師赦天下改元十一月戊寅改含元宫為大明宫天官侍郎安平崔􅀇暐性介直未嘗請謁執政惡之攺文昌左丞月餘太后謂玄暐曰自卿改官以來聞令史設齋自慶此欲盛為姦貪耳今還卿舊任乃復拜天官侍郎仍賜綵七十叚以主客郎中郭元振為凉州都督隴右將軍大使先是凉州南北境不過四百餘里突厥吐蕃頻嵗奄至城下百姓苦之元振始於南境硤口置和戎城北境磧中置白亭軍控其衝要拓州境千五百里自是寇不復至城下元振又令甘州刺史李漢通開置屯田盡水陸之利舊凉州粟麥斛至數千及漢通收率之後一縑糴數十斛積軍糧支數十年元振善於撫御在凉州五年夷夏畏慕令行禁止牛羊被野路不拾遺二年春正月乙酉初設武舉突厥寇塩夏二州三月庚寅突厥破石嶺寇并州以雍州長史薛季昶攝右臺大夫充山東防禦軍大使滄瀛幽易恒定等州諸軍皆受季昶節度夏四月以幽州刺史張仁愿專知幽平媯檀防禦仍與季昶相知以拒突厥五月壬申蘇安恒復上疏曰臣聞天下者神堯文武之天下也陛下雖居正統實因唐氏舊基當今太子追迴年徳俱盛陛下貪其寳位而忘母子深恩將何聖顔以見唐家宗廟將何誥命以謁大帝墳陵陛下何故日夜積憂不知鍾鳴漏盡臣愚以為天意人事還歸李家陛下雖安天位殊不知物極則反器滿則傾臣何惜一朝之命而不安萬乘之國哉太后亦不之罪乙未以相王為并州牧充安北道行軍元帥以魏元忠為之副六月壬戌召神都留守韋巨源詣京師以副留守李嶠代之秋七月甲午突厥寇代州司僕卿張昌宗兄弟貴盛勢傾朝野八月戊午太子相王太平公主上表請封昌宗為王制不許壬戌又請乃賜爵鄴國公敕自今有告言楊州及豫博餘黨一無所問内外官司無得為理九月乙丑朔日有食之不盡如鉤神都見其既壬申突厥寇忻州己卯吐蕃遣其臣論彌薩來求和庚辰以太子賓客武三思為大谷道大揔管洛州長史敬暉為副辛巳又以相王旦為并州道元帥三思與武攸宜魏元忠為之副姚元崇為長史司禮少卿鄭杲為司馬然竟不行癸未宴論彌薩於麟徳殿時涼州都督唐休璟入朝亦預宴彌薩屢窺之太后問其故對曰洪源之戰此將軍猛厲無敵故欲識之太后擢休璟為右武威金吾二衛大將軍休璟練習邊事自碣石以西踰四鎮綿亘萬里山川要害皆能記之冬十月甲辰天官侍郎同平章事顧琮薨戊申吐蕃賛普將萬餘人寇茂州都督陳大慈與之四戰皆破之斬首千餘級十一月辛未監察御史魏靖上䟽以為陛下既知來俊臣之姦處以極法乞詳覆俊臣等所推大獄伸其枉濫太后乃命監察御史蘇頲桉覆俊臣等舊獄由是雪免者甚衆頲䕫之曾孫也戊子太后祀南郊赦天下十二月甲午以魏元忠為安東道安撫大使羽林衛大將軍李多祚檢校幽州都督右羽林衛將軍薛訥左武衛將軍駱務整為之副戊申置北庭都䕶府於庭州侍御史張循憲為河東采訪使有疑事不能决病之問侍吏曰此有佳客可與議事者乎吏言前平鄉尉猗氏張嘉貞有異才循憲召見詢以事嘉貞為條析理分莫不洗然循憲因請為奏皆意所未及循憲還見太后太后善其奏循憲具言嘉貞所為且請以己之官授之太后曰朕寧無一官自進賢邪因召嘉貞入見内殿與語大悦即拜監察御史擢循憲司勲郎中賞其得人也三年春三月壬戌朔日有食之夏四月吐蕃遣使獻馬千匹金二千兩以求昏閏月丁丑命韋安石留守神都己􅆗改文昌臺為中䑓以中臺左丞李嶠知納言事新羅王金理洪卒遣使立其弟崇基為王六月辛酉突厥黙啜遣其臣莫賀干來請以女妻皇太子之子寧州大水溺殺二千餘人秋七月癸􅆗以正諫大夫朱敬則同平章事戊申以并州牧相王旦為雍州牧庚戌以夏官尚書檢校凉州都督唐休璟同鳯閣鸞䑓三品時突騎施酋長烏質勒與西突厥諸部相攻安西道絶太后命休璟與諸宰相議其事頃之奏上太后即依其議施行後十餘日安西諸州請兵應接程期一如休璟所畫太后謂休璟曰恨用卿晩謂諸宰相曰休璟練習邊事卿曹十不當一時西突厥可汗斛瑟羅用刑殘酷諸部不服烏質勒本􅀠斛瑟羅號莫賀逹干能撫其衆諸部歸之斛瑟羅不能制烏質勒置都督二十員各將兵七千人屯碎葉西北後攻陷碎葉徙其牙帳居之斛瑟羅部衆離散因入朝不敢復還烏質勒悉併其地九月庚寅朔日有食之既初左臺大夫同鳯閣鸞臺三品魏元忠爲洛州長史洛陽令張昌儀恃諸兄之勢每牙直上長史聽事元忠到官叱下之張易之奴暴亂都市元忠杖殺之及爲相太后召易之弟岐州刺史昌期欲以爲雍州長史對仗問宰相曰誰堪雍州者元忠對曰今之朝臣無以易薛季昶太后曰季昶久任京府朕欲别除一官昌期何如諸相皆曰陛下得人矣元忠獨曰昌期不堪太后問其故元忠曰昌期少年不閑吏事曏在岐州戸口逃亡且盡雍州帝京事務繁劇不若季昶彊幹習事太后黙然而止元忠又嘗面奏臣自先帝以來䝉被恩渥今承乏宰相不能盡忠死節使小人在側臣之罪也太后不悦由是諸張深怨之司禮丞髙戩太平公主之所愛也㑹太后不豫張昌宗恐太后一日晏駕為元忠所誅乃􅉲元忠與戩私議云太后老矣不若挾太子為久長太后怒下元忠戩獄將使與昌宗廷辨之昌宗宻引鳯閣舍人張説賂以羙官使證元忠説許之明日太后召太子相王及諸宰相使元忠與昌宗參對往復不决昌宗曰張説聞元忠言請召問之太后召説説將入鳯閣舍人南和宋璟謂説曰名義至重鬼神難欺不可黨邪陷正以求茍免若獲罪流竄其榮多矣若事有不測璟當叩閤力爭與子同死努力為之萬代瞻仰在此舉也殿中侍御史濟源張廷珪曰朝聞道夕死可矣左史劉知幾曰無汚青史為子孫累及入太后問之説未對元忠懼謂説曰張説欲與昌宗共羅織魏元忠邪説叱之曰元忠為宰相何乃效委巷小人之言昌宗從旁廹趣説使速言説曰陛下視之在陛下前猶逼臣如是况在外乎臣今對廣朝不敢不以實對臣實不聞元忠有是言但昌宗逼臣使誣證之耳易之昌宗遽呼曰張説與魏元忠同反太后問其狀對曰説嘗謂元忠為伊周伊尹放太甲周公攝王位非欲反而何説曰易之兄弟小人徒聞伊周之語安知伊周之道日者元忠初衣紫臣以郎官往賀元忠語客曰無功受寵不勝慙懼臣實言曰明公居伊周之任何愧三品彼伊尹周公皆為臣至忠古今慕仰陛下用宰相不使學伊周當使學誰邪且臣豈不知今日附昌宗立取台衡附元忠立致族滅但臣畏元忠寃䰟不敢誣之耳太后曰張説反覆小人宜并繫治之它日更引問説對如前太后怒命宰相與河内王武懿宗共鞫之説所執如初朱敬則抗疏理之曰元忠素稱忠正張說所坐無名􅀂令抵罪失天下望蘇安恒亦上䟽以爲陛下革命之初人以爲納諫之主暮年以來人以爲受佞之主自元忠下獄里巷忷忷皆以爲陛下委信姦宄斥逐賢良忠臣烈士皆撫髀於私室而箝口於公朝畏迕易之等意徒取死而無益方今賦役煩重百姓彫弊重以讒慝專恣刑賞失中竊恐人心不安别生它變爭鋒於朱雀門內問鼎於大明殿前陛下將何以謝之何以禦之易之等見其䟽大怒欲殺之賴朱敬則及鳯閣舍人桓彦範著作郎陸澤魏知古保救得免丁酉貶元忠爲髙要尉戩說皆流嶺表元忠辭日言於太后曰臣老矣今向嶺南十死一生陛下它日必有思臣之時太后問其故時易之昌宗皆侍側元忠指之曰此二小兒終為亂階易之等下殿叩膺自擲稱寃太后曰元忠去矣殿中侍御史景城王睃復奏申理元忠宋璟謂之曰魏公幸已得全今子復冒威怒得無狼狽乎睃曰魏公以忠獲罪睃為義所激顛沛無恨璟歎曰璟不能申魏公之枉深負朝廷矣太子僕崔貞慎等八人餞元忠於郊外易之詐為告宻人柴明狀稱貞慎等與元忠謀反太后使監察御史丹徒馬懐素鞫之謂懷素曰兹事皆實略問速以聞頃之中使督趣者數四曰反狀皎然何稽留如此懷素請柴明對質太后曰我自不知柴明處但據狀鞫之安用告者懷素據實以聞太后怒曰卿欲縱反者邪對曰臣不敢縱反者元忠以宰相謫官貞慎等以親故追送若誣以為反臣實不敢昔欒布奏事彭越頭下漢祖不以為罪况元忠之刑未如彭越而陛下欲誅其送者乎且陛下操生殺之柄欲加之罪取决聖衷可矣若命臣推鞫臣敢不以實聞太后曰汝欲全不罪邪對曰臣智識愚淺實不見其罪太后意解貞慎等由是獲免太后嘗命朝貴宴集易之兄弟皆位在宋璟上易之素憚璟欲悦其意虚位揖之曰公方今第一人何乃下坐璟曰才劣位卑張卿以為第一何也天官侍郎鄭杲謂璟曰中丞奈何卿五郎璟曰以官言之正當為卿足下非張卿家奴何郎之有舉坐悚惕時自武三思以下皆謹事易之兄弟璟獨不為之禮諸張積怒常欲中傷之太后知之故得免丁未以左武衛大將軍武攸宜充西京留守冬十月丙寅車駕發西京乙酉至神都十一月己丑突厥遣使謝許昏丙申宴於宿羽臺太子預焉宫尹崔神慶上疏以為今五品以上所以佩􅀛者為别敕徴召恐有詐妄内出􅀛合然後應命况太子國本古來徴召皆用玉契此誠重慎之極也昨縁突厥使見太子應預朝參直有文符下宫曽不降敕處分臣愚謂太子非朔望朝參應别召者望降墨敕及玉契太后甚然之始安獠歐陽倩擁衆數萬攻陷州縣朝廷思得良吏以鎮之朱敬則稱司封郎中裴懷古有文武才制以懷古為桂州都督仍充招慰討撃使懷古纔及嶺上飛書示以禍福倩等迎降且言為吏所侵逼故舉兵自救耳懐古輕騎赴之左右曰夷獠無信不可忽也懷古曰吾仗忠信可通神明而况人乎遂詣其營賊衆大喜歸所掠貨財諸洞酋長素持兩端者皆來欵附嶺外悉定是嵗分命使者以六條察州縣吐蕃南境諸部皆叛贊普器弩悉弄自將撃之卒於軍中諸子爭立久之國人立其子弃􅀠蹜贊為贊普生七年矣四年春正月丙申冊拜右武衛將軍阿史那懷道為西突厥十姓可汗懷道斛瑟羅之子也丁未毁三陽宫以其材作興泰宫於萬安山二宫皆武三思建議為之請太后每嵗臨幸功費甚廣百姓苦之左拾遺盧藏用上疏以為左右近臣多以順意為忠朝廷具僚皆以犯忤為戒致陛下不知百姓失業傷陛下之仁陛下誠能以勞人為辭發制罷之則天下皆知陛下苦已而愛人也不從藏用承慶之弟孫也壬子以天官侍郎韋嗣立為鳯閣侍郎同平章事􅊨夏官侍郎同鳯閣鸞臺三品李逈秀頗受賄賂監察御史馬懷素劾奏之二月癸亥逈秀貶廬州刺史􅊨壬申正諫大夫同平章事朱敬則以老疾致仕敬則為相以用人為先自餘細務不之視太后嘗與宰相議及刺史縣令三月己丑李嶠唐休璟等奏竊見朝廷物議遠近人情莫不重内官輕外職每除授牧伯皆再三披訴比來所遣外任多是貶累之人風俗不澄寔由於此望於臺閣寺監妙􅂤賢良分典大州共康庶績臣等請輟近侍率先具僚太后命書名探之得韋嗣立及御史大夫楊再思等二十人癸巳制各以本官檢校刺史嗣立為汴州刺史其後政迹可稱者唯常州刺史薛謙光徐州刺史司馬鍠而已丁亥徙平恩王重福為譙王以夏官侍郎宗楚客同平章事鳯閣侍郎同鳯閣鸞臺三品蘇味道謁歸葬其父制州縣供􅁙事味道因之侵毁鄉人墓田役使過度監察御史蕭至忠劾奏之左遷坊州刺史至忠引之玄孫也夏四月壬戌同鳯閣鸞臺三品韋安石知納言李嶠知内史事太后幸興泰宫太后復税天下僧尼作大像於白司馬阪令春官尚書武攸寧檢校糜費巨億李嶠上疏以為天下編户貧弱者衆造像錢見有一十七萬餘緡若將散施人與一千濟得一十七萬餘户拯饑寒之􅁦省勞役之勤順諸佛慈悲之心霑聖君亭育之意人神胥悦功徳無窮方作過後因縁豈如見在果報監察御史張廷珪上疏諫曰臣以時政論之則宜先邊境蓄府庫養人力以釋教論之則宜救苦厄滅諸相崇無為伏願陛下察臣之愚行佛之意務以理為上不以人廢言太后為之罷役仍召見廷珪深賞慰之鳯閣侍郎同鳯閣鸞臺三品姚元崇以母老固請歸侍六月辛酉以元崇行相王府長史秩位並同三品乙丑以天官侍郎崔􅀇暐同平章事召鳯閣侍郎同平章事檢校汴州刺史韋嗣立赴興泰宫丁丑以李嶠同鳯閣鸞臺三品嶠自請觧内史壬午以相王府長史姚元崇兼知夏官尚書同鳯閣鸞臺三品秋七月丙戌以神都副留守楊再思爲内史再思爲相專以諂媚取容司禮少卿張同休易之之兄也嘗召公卿宴集酒酣戯再思曰楊内史面似髙麗再思欣然即翦紙帖巾反披紫袍爲髙麗舞舉坐大笑時人或譽張昌宗之羙曰六郎面似蓮花再思獨曰不然昌宗問其故再思曰乃蓮花似六郎耳甲午太后還宫乙未司禮少卿張同休汴州刺史張昌期尚方少監張昌儀皆坐贓下獄命左右臺共鞫之丙申敕張易之昌宗作威作福亦命同鞫辛丑司刑正賈敬言奏張昌宗强市人田應徴銅二十斤制可乙巳御史大夫李承嘉中丞桓彦範奏張同休兄弟贓共四千餘緡張昌宗法應免官昌宗奏臣有功於國所犯不至免官太后問諸宰相昌宗有功乎楊再思曰昌宗合神丹聖躬服之有驗此莫大之功太后悦赦昌宗罪復其官左補闕戴令言作兩足狐賦以譏再思再思出令言為長社令丙午夏官侍郎同平章事宗楚客有罪左遷原州都督充靈武道行軍大緫管癸丑張同休貶岐山丞張昌儀貶博望丞鸞臺侍郎知納言事同鳯閣鸞臺三品韋安石舉奏張易之等罪敕付安石及右庶子同鳯閣鸞臺三品唐休璟鞫之未竟而事變八月甲寅以安石兼檢校楊州長史庚申以休璟兼幽營都督安東都䕶休璟將行宻言於太子曰二張恃寵不臣必將為亂殿下宜備之相王府長史兼知夏官尚書事同鳯閣鸞臺三品姚元崇上言臣事相王不宜典兵馬臣不敢愛死恐不益於王辛酉改春官尚書餘如故元崇字元之時突厥叱列元崇反太后命元崇以字行突厥黙啜既和親戊寅始遣淮陽王武延秀還九月壬子以姚元之充靈武道行軍大揔管辛酉以元之為靈武道安撫大使元之將行太后令舉外司堪為宰相者對曰張柬之沈厚有謀能斷大事且其人已老惟陛下急用之冬十月甲戌以秋官侍郎張柬之同平章事時年且八十矣乙亥以韋嗣立檢校魏州刺史餘如故壬午以懷州長史河南房融同平章事太后命宰相各舉堪為員外郎者韋嗣立薦廣武令岺羲曰但恨其伯父長倩為累太后曰茍或有才此何所累遂拜天官員外郎由是諸縁坐者始得進用十一月丁亥以天官侍郎韋承慶為鳯閣侍郎同平章事癸卯成均祭酒同鳯閣鸞臺三品李嶠罷為地官尚書十二月甲寅敕大足已來新置官並停丙辰鳯閣侍郎同平章事韋嗣立罷為成均祭酒檢校魏州刺史如故以兄承慶入相故也太后寢疾居長生院宰相不得見者累月惟張易之昌宗侍側疾少間崔玄暐奏言皇太子相王仁明孝友足侍湯藥宫禁事重伏願不令異姓出入太后曰徳卿厚意易之昌宗見太后疾篤恐禍及已引用黨援隂為之備屢有人為飛書及牓其書於通衢云易之兄弟謀反太后皆不問辛未許州人楊元嗣告昌宗嘗召術士李弘泰占相弘㤗言昌宗有天子相勸於定州造佛寺則天下歸心太后命韋承慶及司刑卿崔神慶御史中丞宋璟鞫之神慶神基之弟也承慶神慶奏言昌宗􅅃稱弘㤗之語尋已奏聞準法首原弘泰妖言請收行法璟與大理丞封全禎奏昌宗寵榮如是復召術士占相志欲何求􅀪泰稱筮得純乾天子之卦昌宗儻以􅀪泰為妖妄何不即執送有司雖云奏聞終是包藏禍心法當處斬破家請收付獄窮理其罪太后久之不應璟又曰儻不即收繫恐其揺動衆心太后曰卿且停推俟更檢詳文狀璟退左拾遺江都李邕進曰向觀宋璟所奏志安社稷非為身謀願陛下可其奏太后不聽尋敕璟楊州推按又敕璟按幽州都督屈突仲翔贓汚又敕璟副李嶠安撫隴蜀璟皆不肯行奏曰故事州縣官有罪品髙則侍御史卑則監察御史按之中丞非軍國大事不當出使今隴蜀無變不識陛下遣臣出外何也臣皆不敢奉制司刑少卿桓彦範上疏以為昌宗無功荷寵而包藏禍心自招其咎此乃皇天降怒陛下不忍加誅則違天不祥且昌宗既云奏訖則不當更與􅀪泰往還使之求福禳災是則初無悔心所以奏者擬事發則云先已奏陳不發則俟時為逆此乃姧臣詭計若云可捨誰為可刑况事已再發陛下皆釋不問使昌宗益自負得計天下亦以為天命不死此乃陛下養成其亂也茍逆臣不誅社稷亡矣請付鸞臺鳯閣三司考竟其罪疏奏不報崔􅀇暐亦屢以為言太后令法司議其罪􅀇暐弟司刑少卿昪處以大辟宋璟復奏収昌宗下獄太后曰昌宗已自奏聞對曰昌宗為飛書所逼窮而自陳勢非得已且謀反大逆無容首免若昌宗不伏大刑安用國法太后温言解之璟聲色逾厲曰昌宗分外承恩臣知言出禍從然義激於心雖死不恨太后不悅楊再思恐其忤㫖遽宣敕令出璟曰聖主在此不煩宰相擅宣敕命太后乃可其奏遣昌宗詣臺璟庭立而桉之事未畢太后遣中使召昌宗特敕赦之璟歎曰不先擊小子腦裂負此恨矣太后乃使昌宗詣璟謝璟拒不見左臺中丞桓彦範右臺中丞東光袁恕己共薦詹事司直陽嶠為御史楊再思曰嶠不樂搏擊之任如何彦範曰為官擇人豈必待其所欲所不欲者尤須與之所以長難進之風抑躁求之路乃擢為右䑓侍御史嶠休之之􅀇孫也先是李嶠崔􅀇暐奏往屬革命之時人多逆節遂致刻薄之吏恣行酷法其周興等所劾破家者並請雪免司刑少卿桓彦範又奏陳之表疏前後十上太后乃從之中宗大和大聖大昭孝皇帝上神龍元年春正月壬午朔赦天下改元自文明以來得罪者非楊豫博三州及諸反逆魁首咸赦除之一太后疾甚麟臺監張易之春官侍郎張昌宗居中用事張東之崔􅀇暐與中臺右丞敬暉司刑少卿桓彦範相王府司馬袁怒己謀誅之柬之謂右羽林衛大將軍李多祚曰將軍今日富貴誰所致也多祚泣曰大帝也柬之曰今大帝之子為二豎所危將軍不思報大帝之徳乎多祚曰茍利國家惟相公處分不敢顧身及妻子因指天地以自誓遂與定謀初柬之與荆府長史閺鄉楊元琰相代同泛江至中流語及太后革命事元琰慨然有匡復之志及柬之為相引元琰為右羽林將軍謂曰君頗記江中之言乎今日非輕授也柬之又用彦範暉及右散騎侍郎李湛皆為左右羽林將軍委以禁兵易之等疑懼乃更以其黨武攸宜為右羽林大將軍易之等乃安俄而姚元之自靈武至都柬之彦範相謂曰事濟矣遂以其謀告之彦範以事白其母母曰忠孝不兩全先國後家可也時太子於北門起居彦範暉謁見密陳其䇿太子許之癸夘柬之􅀇暐彦範與左威衛將軍薛思行等帥左右羽林兵五百餘人至􅀇武門遣多祚湛及内直郎駙馬都尉安陽王同皎詣東宫迎太子太子疑不出同皎曰先帝以神器付殿下横遭幽廢人神同憤二十三年矣今天誘其衷北門南牙同心協力以今日誅㐫豎復李氏社稷願陛下蹔至􅀇武門以副衆望太子曰㐫豎誠當夷滅然上體不安得無驚怛諸公更為後圗李湛曰諸將相不顧家族以徇社稷殿下奈何欲納之鼎鑊乎請殿下自出止之太子乃出同皎扶抱太子上馬從至􅀇武門斬闗而入太后在迎仙宫東之等斬易之昌宗於廡下進至太后所寢長生殿環繞侍衛太后驚起問曰亂者誰邪對曰張易之昌宗謀反臣等奉太子令誅之恐有漏洩故不敢以聞稱兵宫禁罪當萬死太后見太子曰乃汝邪小子既誅可還東宫彦範進曰太子安得更歸昔天皇以愛子託陛下今年齒已長久居東宫天意人心久思李氏羣臣不忘太宗天皇之徳故奉太子誅賊臣願陛下傳位太子以順天人之望李湛義府之子也太后見之謂曰汝亦為誅易之將軍邪我於汝父子不薄乃有今日湛慙不能對又謂崔􅀇暐曰它人皆因人以進惟卿朕所自擢亦在此邪對曰此乃所以報陛下之大徳於是收張昌期同休昌儀等皆斬之與易之昌宗梟首天津南是日袁恕己從相王統南牙兵以備非常收韋承慶房融及司禮卿崔神慶繫獄皆易之之黨也初昌儀新作第甚羙逾於王主或夜書其門曰一日絲能作幾日絡滅去復書之如是六七昌儀取筆注其下曰一日亦足乃止甲辰制太子監國赦天下以袁恕己為鳯閣侍郎同平章事分遣十使齎璽書宣慰諸州乙巳太后傳位於太子丙午中宗即位赦天下惟張易之黨不原其為周興等所枉者咸令清雪子女配沒者皆免之相王加號安國相王拜太尉同鳯閣鸞臺三品太平公主加號鎮國太平公主皇族先配沒者子孫皆復屬籍仍量叙官爵丁未太后徙居上陽宫李湛留宿衛戊申帝帥百官詣上陽宫上太后尊號曰則天大聖皇帝庚戌以張柬之為夏官尚書同鳯閣鸞臺三品崔玄暐為内史袁恕己同鳯閣鸞臺三品敬暉桓彦範皆為納言並賜爵郡公李多祚賜爵遼陽郡王王同皎為右千牛將軍琅邪郡公李湛為右羽林大將軍趙國公自餘官賞有差張柬之等之討張易之也殿中監田歸道將千騎宿玄武門敬暉遣使就索千騎歸道先不預謀拒而不與事寧暉欲誅之歸道以理自陳乃免歸私第帝嘉其忠壯召拜太僕少卿資治通鑑卷第二百七
