body:
  text: 臣司馬光奉勑編集唐紀十一章困敦凡三年有竒起強圉作噩五月盡上太宗文武大聖大廣孝皇帝中之上貞觀十一年五月壬申魏徴上䟽以為陛下欲善之志不及於昔時聞過必改少虧於曩日譴罰積多威怒㣲厲乃知貴不期驕富不期侈非虚言也且以隋之府庫倉廪户口甲兵之盛考之今日安得擬倫然隋以富彊動之而危我以寡弱静之而安安危之理皎然在目昔隋之未亂也自謂必無亂其未亡也自謂必無亡故賦役無窮征伐不息以至禍將及身而尚未之寤也夫鑒形莫如止水鑒敗莫如亡國伏願取鑒於隋去奢從約親忠逺佞以當今之無事行疇昔之恭儉則盡善盡羙固無得而稱焉夫取之實難守之甚易陛下能得其所難豈不能保其所易乎六月右僕射虞恭公温彦博薨彦博乆掌機務知無不為上謂侍臣曰彦博以憂國之故精神耗竭我見其不逮已二年矣恨不縱其安逸竟夭天年丁巳上幸明徳宫己未詔荆州都督荆王元景等二十一王所任刺史咸令子孫世襲戊辰又以功臣長孫無忌等十四人為刺史亦令世襲非有大故無得黜免己巳徙許王元祥為江王秋七月癸未大雨榖洛溢入洛陽宫壊官寺民居溺死者六千餘人魏徴上䟽以爲文子曰同言而信信在言前同令而行誠在令外自王道休明十有餘年然而徳化未洽者由待下之情未盡誠信故也今立政致治必委之君子事有得失或訪之小人其待君子也敬而踈遇小人也輕而狎狎則言無不盡踈則情不上通夫中智之人豈無小慧然才非經國慮不及逺雖竭力盡誠猶未免有敗况内懐姦宄其禍豈不深乎夫雖君子不能無小過茍不害於正道斯可略矣既謂之君子而復疑其不信何異立直木而疑其影之曲乎陛下誠能慎選君子以禮信用之何憂不治不然危亡之期未可保也上賜手詔褒羙曰昔晉武帝平吳之後志意驕怠何曽位極台司不能直諫乃私語子孫自矜明智此不忠之大者也得公之諫朕知過矣當置之几案以比􅁌韋乙未車駕還洛陽詔洛陽宫為水所毁者少加修繕纔令可居自外衆材給城中壊廬舍者令百官各上封事極言朕過壬寅廢明徳宫及飛山宫之􅀇圃院給遭水者八月甲子上謂侍臣曰上封事者皆言朕游獵太頻今天下無事武備不可忘朕時與左右獵於後苑無一事煩民夫亦何傷魏徴曰先王惟恐不聞其過陛下既使之上封事止得恣其陳述茍其言可取固有益於國若其無取亦無所損上曰公言是也皆勞而遣之侍御史馬周上䟽以為三代及漢厯年多者八百少者不減四百良以恩結人心人不能忘故也自是以降多者六十年少者纔二十餘年皆無恩於人本根不固故也陛下當隆禹湯文武之業為子孫立萬代之基豈得但持當年而已今之户口不及隋之什一而給役者兄去弟還道路相繼陛下雖加恩詔使之裁損然營繕不休民安得息故有司徒行文書曽無事實昔漢之文景恭儉養民武帝承其豐富之資故能窮奢極欲而不至於亂曏使髙祖之後即傳武帝漢室安得乆存乎又京師及四方所造乘輿器用及諸王妃主服飾議者皆不以為儉夫昧旦丕顯後世猶怠陛下少居民間知民疾苦尚復如此况皇太子生長深宫不更外事萬歳之後固聖慮所當憂也臣觀自古以來百姓愁怨聚為盗賊其國未有不亡者人主雖欲追改不能復全故當脩於可脩之時不可悔之於己失之後也蓋幽厲嘗笑桀紂矣煬帝亦笑周齊矣不可使後之笑今如今之笑煬帝也貞觀之初天下饑歉斗米直匹絹而百姓不怨者知陛下憂念不忘故也今比年豐穰匹絹得粟十餘斛而百姓怨咨者知陛下不復念之多營不急之務故也自古以來國之興亡不以蓄積多少在於百姓苦樂且以近事驗之隋貯洛口倉而李密因之東都積布帛而世充資之西京府庫亦為國家之用至今未盡夫畜積固不可無要當人有餘力然後收之不可强歛以資㓂敵也夫儉以息人陛下已於貞觀之初親所履行在於今日為之固不難也陛下必欲為乆長之謀不必逺求上古但如貞觀之初則天下幸甚陛下寵遇諸王頗有過厚者萬代之後不可不深思也且魏武帝愛陳思王及文帝即位囚禁諸王但無縲絏耳然則武帝愛之適所以苦之也又百姓所以治安唯在刺史縣令茍選用得人則陛下可以端拱無為今朝廷唯重内官而輕州縣之選刺史多用武人或京官不稱職始補外任邊逺之處用人更輕所以百姓未安殆由於此䟽奏上稱善乆之謂侍臣曰刺史朕當自選縣令宜詔京官五品已上各舉一人冬十月癸丑詔勲戚亡者皆陪葬山陵上獵於洛陽苑有羣豕突出林中上引弓四發殪四豕有豕突前及馬鐙民部尚書唐儉投馬摶之上拔劎斬豕顧笑曰天䇿長史不見上將撃賊邪何懼之甚對曰漢祖以馬上得之不以馬上治之陛下以神武定四方豈復逞雄心於一獸上恱為之罷獵尋加光禄大夫安州都督吳王恪數出畋獵頗損居人侍御史柳範奏彈之丁丑恪坐免官削户三百上曰長史權萬紀事吾兒不能匡正罪當死柳範曰房􅀇齡事陛下猶不能止畋獵豈得獨罪萬紀上大怒拂衣而入乆之獨引範謂曰何面折我對曰陛下仁明臣不敢不盡愚直上恱十一月辛卯上幸懐州丙午還洛陽宫故荆州都督武士彠女年十四上聞其羙召入後宫為才人十二年春正月乙未禮部尚書王珪奏三品已上遇親王於路皆降乘非禮上曰卿輩茍自崇貴輕我諸子特進魏徴曰諸王位次三公今三品皆九卿八座為王降乘誠非所宜當上曰人生壽夭難期萬一太子不幸安知諸王它日不為公輩之主何得輕之對曰自周以來皆子孫相繼不立兄弟所以絶庶孽之窺窬塞禍亂之源本此為國者所深戒也上乃從珪奏吏部尚書髙士亷黄門侍郎韋挺禮部侍郎令狐徳棻中書侍郎岑文本撰氏族志成上之先是山東人士崔盧李鄭諸族好自矜地望雖累葉陵夷茍它族欲與為昏姻必多責財幣或捨其鄉里而妄稱名族或兄弟齊列而更以妻族相陵上惡之命士亷等徧責天下譜諜質諸史籍考其真偽辦其昭穆第其甲乙褒進忠賢貶退姦逆分為九等士亷等以黄門侍郎崔民幹為第一上曰漢髙祖與蕭曹樊灌皆起閭閻布衣卿輩至今推仰以為英賢豈在世禄乎髙氏偏據山東梁陳僻在江南雖有人物盖何足言况其子孫才行衰薄官爵陵替而猶卬然以門地自負販鬻松檟依託富貴棄亷忘恥不知世人何為貴之今三品以上或以徳行或以勲勞或以文學致位貴顯彼衰世舊門誠何足慕而求與為昏雖多輸金帛猶為彼所偃蹇我不知其觧何也今欲釐正訛謬捨名取實而卿曹猶以崔民幹為第一是輕我官爵而徇流俗之情也乃更命刋定專以今朝品秩為髙下於是以皇族為首外戚次之降崔民幹為第三凡二百九十三姓千六百五十一家頒於天下二月乙卯車駕西還癸亥幸河北觀砥柱甲子巫州獠反䕫州都督齊善行敗之俘男女三千餘口乙丑上祀禹廟丁卯至柳谷觀鹽池庚午至蒲州刺史趙元楷課父老服黄紗單衣迎車駕盛飾廨舍樓觀又飼羊百餘頭魚數百頭以饋貴戚上數之曰朕廵省河洛凡有所須皆資庫物卿所為乃亡隋之􅁦俗也甲戌幸長春宫戊寅詔曰隋故鷹撃郎將堯君素雖桀犬吠堯有乖倒戈之志而疾風勁草實表歳寒之心可贈蒲州刺史仍訪其子孫以聞閏月庚辰朔日有食之丁未車駕至京師三月辛亥著作佐郎鄧世隆表請集上文章上曰朕之辭令有益於民者史皆書之足爲不朽若其無益集之何用梁武帝父子陳後主隋煬帝皆有文集行於世何救於亡爲人主患無徳政文章何爲遂不許丙子以皇孫生宴五品以上於東宫上曰貞觀之前從朕經營天下玄齡之功也貞觀以來繩愆紏繆魏徴之功也皆賜之佩刀上謂徴曰朕政事何如往年對曰威徳所加比貞觀之初則逺矣人恱服則不逮也上曰逺方畏威慕徳故來服若其不逮何以致之對曰陛下往以未治為憂故徳義日新今以既治為安故不逮上曰今所為猶往年也何以異對曰陛下貞觀之初恐人不諌常導之使言中間恱而從之今則不然雖勉從之猶有難色所以異也上曰其事可聞歟對曰陛下昔欲殺元律師孫伏伽以為法不當死陛下賜以蘭陵公主園直百萬或云賞太厚陛下云朕即位以來未有諌者故賞之此導之使言也司户柳雄妄訴隋資陛下欲誅之納戴胄之諌而止是恱而從之也近皇甫徳參上書諌修洛陽宫陛下恚之雖以臣言而罷勉從之也上曰非公不能及此人苦不自知耳夏五月壬申􅀪文館學士永興文懿公虞世南卒上哭之慟世南外和柔而内忠直上嘗稱世南有五絶一徳行二忠直三博學四文辭五書翰秋七月癸酉以吏部尚書髙士亷為右僕射乙亥吐蕃㓂􅀪州八月霸州山獠反燒殺刺史向邵陵及吏民百餘家初上遣使者馮徳遐撫慰吐蕃吐蕃聞突厥吐谷渾皆尚公主遣使隨徳遐入朝多齎金寳奉表求婚上未之許使者還言於賛普棄宗弄讚曰臣初至唐唐待我甚厚許尚公主㑹吐谷渾王入朝相離間唐禮遂衰亦不許㛰弄讚遂發兵撃吐谷渾吐谷渾不能支遁於青海之北民畜多為吐蕃所掠吐蕃進破党項白蘭諸羌帥衆二十餘萬屯松州西境遣使貢金帛云來迎公主尋進攻松州敗都督韓威羌酋閣州刺史别叢臥施諾州刺史把利歩利並以州叛歸之連兵不息其大臣諫不聼而自縊者凡八輩壬寅以吏部尚書侯君集為當彌道行軍大揔管甲辰以右領軍大將軍執失思力為白蘭道左武衛將軍牛進逹為闊水道左領軍將軍劉簡為洮河道行軍揔管督歩騎五萬撃之吐蕃攻城十餘日進逹為先鋒九月辛亥掩其不備敗吐蕃於松州城下斬首千餘級弄讚懼引兵退遣使謝罪因復請婚上許之甲寅上問侍臣帝王創業與守成孰難房􅀇齡曰草昧之初與羣雄並起角力而後臣之創業難矣魏徴曰自古帝王莫不得之於艱難失之於安逸守成難矣上曰􅀇齡與吾共取天下出百死得一生故知創業之難徴與吾共安天下常恐驕奢生於富貴禍亂生於所忽故知守成之難然創業之難既已往矣守成之難方當與諸公慎之􅀇齡等拜曰陛下及此言四海之褔也初突厥頡利既亡北方空虛薛延陁真珠可汗帥其部落建庭於都尉揵山北獨邏水南勝兵二十萬立其二子拔酌頡利苾主南北部上以其彊盛恐後難制癸亥拜其二子皆為小可汗各賜鼓纛外示優崇實分其勢冬十月乙亥巴州獠反己卯畋于始平乙未還京師鈞州獠反遣桂州都督張寳徳討平之十一月丁未初置左右屯營飛騎於􅀇武門以諸將軍領之又簡飛騎才力驍健善騎射者號百騎衣五色袍乘駿馬以虎皮爲韀凡遊幸則從焉己巳明州獠反遣交州都督李道彦討平之十二月辛巳右武候將軍上官懐仁擊反獠於壁州大破之虜男女萬餘口是歳以給事中馬周爲中書舍人周有機辯中書侍郎岑文本常稱馬君論事援引事類掦􅅦古今舉要刪煩㑹文切理一字不可増亦不可減聼之靡靡令人忘倦霍王元軌好讀書恭謹自守舉措不妄爲徐州刺史與處士劉􅀇平爲布衣交人問􅀇平王所長􅀇平曰無長問者怪之􅀇平曰夫人有所短乃見所長至於霍王無所短吾何以稱其長哉初西突厥咥利失可汗分其國為十部毎部有酋長一人仍各賜一箭謂之十箭又分左右廂左廂號五咄陸置五大啜居碎葉以東右廂號五弩失畢置五大俟斤居碎葉以西通謂之十姓咥利失失衆心為其臣統吐屯所襲咥利失兵敗與其弟歩利設走保焉耆統吐屯等將立欲谷設為大可汗㑹統吐屯為人所殺欲谷設兵亦敗咥利失復得故地至是西部竟立欲谷設為乙毗咄陸可汗乙毗咄陸既立與咥利失大戰殺傷甚衆因中分其地自伊列水以西屬乙毗咄陸以東屬咥利失處月處宻與髙昌共攻抜焉耆五城掠男女一千五百人焚其廬舍而去十三年春正月乙巳車駕謁獻陵丁未還宫戊午加左僕射房􅀇齡太子少師􅀇齡自以居端揆十五年男遺愛尚上女髙陽公主女為韓王妃深畏滿盈上表請解機務上不許􅀇齡固請不已詔斷表乃就職太子欲拜􅀇齡設儀衛待之􅀇齡不敢謁見而歸時人美其有讓􅀇齡以度支繫天下利害嘗有闕求其人未得乃自領之禮部尚書永寧懿公王珪薨珪性寛裕自奉飬甚薄於令三品已上皆立家廟珪通貴已乆獨祭於寢為法司所劾上不問命有司為之立廟以愧之二月庚辰以光禄大夫尉遲敬徳為鄜州都督上嘗謂敬徳曰人或言卿反何也對曰臣反是實臣從陛下征伐四方身經百戰今之存者皆鋒鏑之餘也天下已定乃更疑臣反乎因解衣投地出其瘢痍上爲之流涕曰卿復服朕不疑卿故語卿何更恨邪上又嘗謂敬徳曰朕欲以女妻卿何如敬徳叩頭謝曰臣妻雖鄙陋相與共貧賤乆矣臣雖不學聞古人富不易妻此非臣所願也上乃止戊戌尚書奏近世掖庭之選或微賤之族禮訓蔑聞或刑戮之家憂怨所積請自今後宫及東宫内職有闕皆選良家有才行者充以禮聘納其沒宫口及素微賤之人皆不得補用上從之上既詔宗室羣臣襲封刺史左庶子于志寧以爲古今事殊恐非乆安之道上䟽争之侍御史馬周亦上䟽以爲堯舜之父猶有朱均之子儻有孩童嗣職萬一驕愚兆庶被其殃而國家受其敗正欲絶之也則子文之治猶在正欲留之也而欒黶之惡已彰與其毒害於見存之百姓則寧使割恩於已亡之一臣明矣然則向所謂愛之者乃適所以傷之也臣謂宜賦以茅土疇其户邑必有材行隨器授官使其人得奉大恩而子孫終其褔禄㑹司空趙州刺史長孫無忌等皆不願之國上表固讓稱承恩以來形影相弔若履春冰宗族憂虞如寘湯火緬惟三代封建蓋由力不能制因而利之禮樂節文多非已出兩漢罷矦置守蠲除曩弊深恊事宜今因臣等復有變更恐紊聖朝綱紀且後世愚㓜不肖之嗣或抵冐邦憲自取誅夷更因延世之賞致成勦絶之禍良可哀愍願停渙汗之㫖賜其性命之恩無忌又因子婦長樂公主固請於上且言臣披荆棘事陛下今海内寧一奈何棄之外州與遷徙何異上曰割地以封功臣古今通義意欲公之後嗣輔朕子孫共傳永乆而公等乃復發言怨望朕豈强公等以茅土邪庚子詔停世封刺史髙昌王麴文泰多遏絶西域朝貢伊吾先臣西突厥既而内屬文泰與西突厥共擊之上下書切責徴其大臣阿史那矩欲與議事文泰不遣遣其長史麴雍來謝罪頡利之亡也中國人在突厥者或奔髙昌詔文泰歸之文泰蔽匿不遣又與西突厥共擊破焉耆焉耆訴之上遣虞部郎中李道裕往問狀且謂其使者曰髙昌數年以來朝貢脱略無藩臣禮所置官號皆凖天朝築城掘溝預備攻討我使者至彼文泰語之云鷹飛于天雉伏于蒿猫遊于堂䑕噍于穴各得其所豈不能自生邪又遣使謂薛延陀云既為可汗則與天子匹敵何為拜其使者事人無禮又間鄰國為惡不誅善何以勸明年當發兵擊汝三月薛延陀可汗遣使上言奴受恩思報請發所部為軍導以擊髙昌上遣民部尚書唐儉右領軍大將軍執失思力齎繒帛賜薛延陀與謀進取夏四月戊寅上幸九成宫初突厥突利可汗之弟結社率從突利入朝厯位中郎將居家無頼怨突利斥之乃誣告其謀反上由是薄之乆不進秩結社率隂結故部落得四十餘人謀因晉王治四鼓出官開門辟仗馳入宫門直指御帳可有大功甲申擁突利之子賀邏鶻夜伏於宫外㑹大風晉王未出結社率恐曉遂犯行宫踰四重幕弓矢亂發衛士死者數十人折衝孫武開等帥衆奮擊乆之乃退馳入御廐盗馬二十餘匹北走度渭欲奔其部落追獲斬之原賀邏鶻投于嶺表庚寅遣武候將軍上官懐仁擊巴壁洋集四州反獠平之虜男女六千餘口五月旱甲寅詔五品以上上封事魏徴上䟽以為陛下志業比貞觀之初漸不克終者凡十條其間一條以為頃年以來輕用民力乃云百姓無事則驕逸勞役則易使自古未有因百姓逸而敗勞而安者也此恐非興邦之至言上深加奬歎云已列諸屏障朝夕聸仰并録付史官仍賜徴黄金十斤廐馬二匹六月渝州人侯􅀪仁自牂柯開道經西趙出邕州以通交桂蠻俚降者二萬八千餘户丙申立皇弟元嬰為滕王自結社率之反言事者多云突厥留河南不便秋七月庚戍詔右武矦大將軍化州都督懐化郡王李思摩為乙彌泥孰俟利苾可汗賜之鼓纛突厥及胡在諸州安置者並令度河還其舊部俾世作藩屏長保邊塞突厥咸憚薛延陀不肯出塞上遣司農卿郭嗣本賜薛延陀璽書言頡利既敗其部落咸來歸化我略其舊過嘉其後善待其逹官皆如吾百寮部落皆如吾百姓中國貴尚禮義不滅人國前破突厥止為頡利一人為百姓害實不貪其土地利其人畜恒欲更立可汗故置所降部落於河南任其畜牧今户口蕃滋吾心甚喜既許立之不可失信秋中將遣突厥度河復其故國爾薛延陀受册在前突厥受册在後後者為小前者為大爾在磧北突厥在磧南各守土疆鎮撫部落其踰分故相抄掠我則發兵各問其罪薛延陀奉詔於是遣思摩帥所部建牙於河北上御齊政殿餞之思摩涕泣奉觴上壽曰奴等破亡之餘分為灰壤陛下存其骸骨復立為可汗願萬世子孫恒事陛下又遣禮部尚書趙郡王孝恭等齎册書就其種落築壇於河上而立之上謂侍臣曰中國根榦也四夷枝葉也割根榦以奉枝葉木安得滋榮朕不用魏徴言㡬致狼狽又以左屯衛將軍阿史那忠為左賢王左武衛將軍阿失那泥孰為右賢王忠蘇尼失之子也上遇之甚厚妻以宗女及出塞懐慕中國見使者必泣涕請入待詔許之八月辛未朔日有食之詔以身體髮膚不敢毁傷比來訴訟者或自毁耳目自今有犯先笞四十然後依法冬十月甲申車駕還京師十一月辛亥以侍中楊師道為中書令戊辰尚書左丞劉洎為黄門侍郎叅知政事上猶冀髙昌王文泰悔過復下璽書示以禍褔徴之入朝文泰竟稱疾不至十二月壬申遣交河行軍大揔管吏部尚書侯君集副揔管兼左屯衛大將軍薛萬均等將兵擊之乙亥立皇子褔為趙王己丑吐谷渾王諾曷鉢來朝以宗女為􅀪化公主妻之壬辰上畋於咸陽癸巳還宫太子承乾頗以遊畋廢學右庶子張􅀇素諌不聼是歲天下州府凡三百五十八縣一千五百一十一太史令傳奕精究術數之書而終不之信遇病不呼醫餌藥有僧自西域來善呪術能令人立死復呪之使蘇上擇飛騎中壯者試之皆如其言以告奕奕曰此邪術也臣聞邪不干正請使呪臣必不能行上命僧呪奕奕初無所覺須㬰僧忽僵什若為物所擊遂不復蘇又有婆羅門僧言得佛齒所擊前無堅物長安士女輻湊如市弈時卧疾謂其子曰吾聞有金剛石者性至堅物莫能傷唯羚羊角能破之汝往試焉其子往見佛齒出角叩之應手而碎觀者乃止弈臨終戒其子無得學佛書時年八十五又集魏晉以來駁佛教者爲髙識傳十卷行於世西突厥咥利失可汗之臣俟利發與乙毗咄陸可汗通謀作亂咥利失窮蹙逃奔鏺汗而死弩失畢部落迎其弟子薄布特勒立之是爲乙毗沙鉢羅葉䕶可汗沙鉢羅葉䕶既立建庭於雖合水北謂之南庭自􅀛茲鄯善且末吐火羅焉耆石史何穆康等國皆附之咄陸建庭於鏃曷山西謂之北庭自厥越失拔悉彌駁馬結骨火燖觸水昆等國皆附之以伊列水為境十四年春正月甲寅上幸魏王泰第赦雍州長安繫囚大辟以下免延康里今年租賦賜泰府僚屬及同里老人有差二月丁丑上幸國子監觀釋奠命祭酒孔頴逹講孝經賜祭酒以下至諸生髙第帛有差是時上大徴天下名儒為學官數幸國子監使之講論學生能明一大經已上皆得補官増築學舍千二百間増學生滿三千二百六十員自屯營飛騎亦給博士使授以經有能通經者聼得貢舉於是四方學者雲集京師乃至髙麗百濟新羅髙昌吐蕃諸酋長亦遣子弟請入國學升講筵者至八千餘人上以師說多門章句繁雜命孔頴達與諸儒撰定五經䟽謂之正義令學者習之壬午上幸驪山温湯辛卯還宫乙未詔求近世名儒梁皇甫侃禇仲都周熊安生沈重陳沈文阿周􅀪正張譏隋何妥劉炫等子孫以聞當加引擢三月竇州道行軍揔管党仁􅀪擊羅竇反獠破之俘七千餘口辛丑流鬼國遣使入貢去京師萬五千里濵於北海南鄰靺鞨未嘗通中國重三譯而來上以其使者佘志為騎都尉丙辰置寧朔大使以䕶突厥夏五月壬寅徙燕王靈䕫為魯王上將幸洛陽命將作大匠閻立徳行清暑之地秋八月庚午作襄城宫於汝州西山立徳立本之兄也髙昌王文泰聞唐兵起謂其國人曰唐去我七千里沙磧居其二千里地無水草寒風如刀熱風如燒安能致大軍乎往吾入朝見秦隴之北城邑蕭條非復有隋之北今來伐我發兵多則糧運不給三萬已下吾力能制之當以逸待勞坐收其弊若頓兵城下不過二十日食盡必走然後從而虜之何足憂也及聞唐兵臨磧口憂懼不知所為發疾卒子智盛立軍至柳谷詗者言文泰刻日將葬國人咸集於彼諸將請襲之候君集曰不可天子以髙昌無禮故使吾討之今襲人於墟墓之間非問罪之師也於是鼓行而進至田城諭之不下詰朝攻之及午而克虜男女七千餘口以中郎將辛獠兒為前鋒夜趨其都城髙昌逆戰而敗大軍繼至抵其城下智盛致書於君集曰得罪於天子者先王也天罰所加身已物故智盛襲位未㡬惟尚書憐察君集報曰茍能悔過當束手軍門智盛猶不出君集命填塹攻之飛石雨下城中人皆室處又為巢車髙十丈俯瞰城中有行人及飛石所中皆唱言之先是文泰與西突厥可汗相結約有急相助可汗遣其葉䕶屯可汗浮圖城為文泰聲援及君集至可汗懼而西走千餘里葉䕶以城降智盛窮蹙癸酉開門出降君集分兵略地下其二十二城户八千四十六口一萬七千七百地東西八百里南北五百里上欲以髙昌為州縣魏徴諌曰陛下初即位文㤗夫婦首來朝其後稍驕倨故王誅加之罪止文泰可矣宜撫其百姓存其社稷復立其子則威徳被於遐荒四夷皆恱服矣今若利其土地以為州縣則常須千餘人鎮守數年一易往來死者什有三四供辦衣資違離親戚十年之後隴右虚耗矣陛下終不得髙昌撮粟尺帛以佐中國所謂散有用以事無用臣未見其可上不從九月以其地為西州以可汗浮圖城為庭州各置屬縣乙卯置安西都䕶府於交河城留兵鎮之君集虜髙昌王智盛及其羣臣豪傑而還於是唐地東極于海西至焉耆南盡林邑北抵大漠皆為州縣凡東西九千五百一十里南北一萬九百一十八里侯君集之討髙昌也遣使約焉耆與之合勢焉耆喜聼命及髙昌破焉耆王詣軍門謁見君集且言焉耆三城先為髙昌所奪君集奏并髙昌所掠焉耆民悉歸之冬十月甲戌荆王元景等復表請封禪上不許初陳倉折衝都尉魯寧坐事繫獄自恃髙班慢罵陳倉尉尉氏劉仁軌仁軌杖殺之州司以聞上怒命斬之怒猶不解曰何物縣尉敢殺吾折衝命追至長安面詰之仁軌曰魯寧對臣百姓辱臣如此臣實忿而殺之辭色自若魏徴侍側曰陛下知隋之所以亡乎上曰何也徴曰隋末百姓彊而陵官吏如魯寧之比是也上恱擢仁軌為櫟陽丞上將幸同州校獵仁軌上言今秋大稔民收穫者什纔一二使之供承獵事治道葺橋動費一二萬功實妨農事願少停鑾輿旬日俟其畢務則公私俱濟上賜璽書嘉納之尋遷新安令閏月乙未行幸同州庚戌還宫丙辰吐蕃賛普遣其相禄東賛獻金五千兩及珍玩數百以請昏上許以文成公主妻之十一月甲子朔冬至上祀南郊時戊寅曆以癸亥為朔宣義郎李淳風表稱古曆分日起於子半今歲甲子朔冬至而故太史令傅仁均減餘稍多子初為朔遂差三刻用乖天正請更加考定衆議以仁均定朔㣲差淳風推校精密請如淳風議從之丁卯禮官奏請加髙袓父母服齊衰五月嫡子婦服朞嫂叔弟妻夫兄舅皆服小功從之丙子百官復表請封禪詔許之更命諸儒詳定儀注以太常卿韋挺等為封禪使司門員外郎韋元方給給使過所稽緩給使奏之上怒出元方為華隂令魏徴諌曰帝王震怒不可妄發前為給使遂夜出敕書事如軍機誰不驚駭况宦者之徒古來難飬輕為言語易生患害獨行逺使深非事宜漸不可長所宜深慎上納其言尚書左丞韋悰句司農木橦價貴於民間奏其隐沒上召大理卿孫伏伽書司農罪伏伽曰司農無罪上怪問其故對曰只為官橦貴所以私橦賤向使官橦賤私橦無由賤矣但見司農識大體不知其過也上悟屢稱其善顧謂韋悰曰卿識用不逮伏伽逺矣十二月丁酉侯君集獻俘于觀徳殿行飲至禮大酺三日㝷以智盛爲左武衞將軍金城郡公上得髙昌樂工以付太常増九部樂為十部君集之破髙昌也私取其珍寳將士知之競為盗竊君集不能禁為有司所劾詔下君集等獄中書侍郎岑文本上疏以為髙昌昏迷陛下命君集等討而克之不踰旬日並付大理雖君集等自掛網羅恐海内之人疑陛下唯録其過而遺其功也臣聞命將出師主於克敵茍能克敵雖貪可賞若其敗績雖亷可誅是以漢之李廣利陳湯晉之王濬隋之韓擒虎皆負罪譴人主以其有功咸受封賞由是觀之將帥之臣亷慎者寡貪求者衆是以黄石公軍􅀔曰使智使勇使貪使愚故智者樂立其功勇者好行其志貪者急趨其利愚者不計其死伏願録其㣲勞忘其大過使君集重升朝列復僃驅馳雖非清貞之臣猶得貪愚之將斯則陛下雖屈法而徳彌顯君集等雖蒙宥而過更彰矣上乃釋之又有告薛萬均私通髙昌婦女者萬均不服内出髙昌婦女付大理與萬均對辯魏徴諌曰臣聞君使臣以禮臣事君以忠今遣大將軍與亡國婦女對辨帷箔之私實則所得者輕虚則所失者重昔秦穆飲盗馬之士楚莊赦絶纓之罪况陛下道髙堯舜而曽二君之不逮乎上遽釋之矦君集馬病蚛顙行軍揔管趙元楷親以指霑其膿而齅之御史劾奏其諂左遷括州刺史髙昌之平也諸將皆即受賞行軍揔管阿史那社爾以無敕㫖獨不受及别敇既下乃受之所取唯老弱故弊而已上嘉其亷慎以髙昌所得寳刀及雜綵千叚賜之癸卯上獵於樊川乙巳還宫魏徴上䟽以為在朝羣臣當樞機之寄者任之雖重信之未篤是以人或自疑心懐茍且陛下寛於大事急於小罪臨時責怒未免愛憎夫委大臣以大體責小臣以小事為治之道也今委之以職則重大臣而輕小臣至於有事則信小臣而疑大臣信其所輕疑其所重將求致治其可得乎若任以大官求其細過刀筆之吏順㫖成風舞文弄法曲成其罪自陳也則以為心不伏辜不言也則以為所犯皆實進退維谷莫能自明則茍求免禍矯偽成俗矣上納之上謂侍臣曰朕雖平定天下其守之甚難魏徴對曰臣聞戰勝易守勝難陛下之及此言宗廟社稷之褔也上聞右庶子張􅀇素在東宫數諌爭擢為銀青光禄大夫行左庶子太子嘗於宫中擊鼓􅀇素叩閤切諌太子出其鼓對􅀇素毁之太子乆不出見官屬􅀇素諌曰朝廷選俊賢以輔至徳今動經時月不見宫臣將何以裨益萬一且宫中唯有婦人不知有能如樊姬者乎太子不聼􅀇素少為刑部令史上嘗對朝臣問之曰卿在隋何官對曰縣尉又問未為尉時何官對曰流外又問何曹􅀇素耻之出閤殆不能歩色如死灰諌議大夫褚遂良上䟽以為君能禮其臣乃能盡其力􅀇素雖出寒㣲陛下重其才擢至三品翼賛皇儲豈可復對羣臣窮其門户棄宿昔之恩成一朝之耻使之鬰結於懐何以責其伏節死義乎上曰朕亦悔此問卿䟽深㑹我心遂良亮之子也孫伏伽與􅀇素在隋皆為令史伏伽或於廣坐自陳往事一無所隠戴州刺史賈崇以所部有犯十惡者御史劾之上曰昔唐虞大聖貴為天子不能化其子况崇為刺史獨能使其民比屋為善乎若坐是貶黜則州縣互相掩蔽縱捨罪人自今諸州有犯十惡者勿劾刺史但令明加紏察如法施罪庶以肅清姦惡耳上自臨治兵以部陳不整命大將軍張士貴杖中郎將等怒其杖輕下士貴吏魏徴諌曰將軍之職為國爪牙使之執杖已非後法况以杖輕下吏乎上亟釋之言事者多請上親覽表奏以防壅蔽上以問魏徴對曰斯人不知大體必使陛下一一親之豈惟朝堂州縣之事亦當親之矣資治通鑑卷第一百九十五
