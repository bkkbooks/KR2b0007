body:
  text: 癸夘以安成王秀為荆州刺史先是巴陵馬營蠻縁江為冦州郡不能討秀遣防閤文熾帥衆燔其林木蠻失其險州境無冦秋七月甲午魏立髙貴嬪為皇后尚書令髙肇益貴重用事肇多變更先朝舊制減削封秩抑黜勲人由是怨聲盈路羣臣宗室皆卑下之唯度支尚書元匡與肇抗衡先是造棺置聴事欲輿棺詣闕論肇罪惡自殺以切諫肇聞而惡之會匡與太常劉芳議權量事肇主芳議匡遂與肇喧競表肇指鹿為馬御史中尉王顯奏彈匡誣毁宰相有司處匡死刑詔恕死降為光禄大夫八月癸丑竟陵壯公曹景宗卒初魏主為京兆王愉納于后之妹為妃愉不愛愛妾李氏生子寶月于后召李氏入宫捶之愉驕奢貪縱所為多不灋帝召愉入禁中推案杖愉五十出為冀州刺史愉自以年長而勢位不及二弟潛懐愧恨又身與妾屢被頓辱髙肇數譖愉兄弟愉不勝忿癸亥殺長史羊靈引司馬李遵詐稱得清河王懌密疏云髙肇弑逆遂為壇於信都之南即皇帝位大赦改元建平立李氏為皇后灋曹參軍崔伯驥不從愉殺之在北州鎮皆疑魏朝有變定州刺史安樂王詮具以狀告之州鎮乃安乙丑魏以尚書李平為都督北討諸軍行冀州事以討愉平崇之從父弟也丁夘魏大赦改元永平魏京兆王愉遣使説平原太守清河房亮亮斬其使愉遣其将張靈和擊之為亮所敗李平軍至經縣諸軍大集夜有蠻兵數千斫平營矢及平帳平堅卧不動俄而自定九月辛巳朔愉逆戰於城南草橋平奮擊大破之愉脱身走入城平進圍之壬辰安樂王詮破愉兵於城北癸巳立皇子績為南康王魏髙后之立也彭城武宣王􅎰固諫魏主不聴髙肇由是怨之數譖􅎰於魏主魏主不之信􅎰薦其舅潘僧固為長樂太守京兆王愉之反脅僧固與之同肇因誣􅎰北與愉通南招蠻賊彭城郎中令魏偃前防閤髙祖珍希肇提擢構成其事肇令侍中元暉以聞暉不從又令左衛元珍言之帝以問暉暉明􅎰不然又以問肇肇引魏偃髙祖珍為證帝乃信之戊戌召􅎰及髙陽王雍廣陽王嘉清河王懌廣平王懐髙肇俱入宴􅎰妃李氏方産固辭不赴中使相繼召之不得已與妃訣而登車入東掖門度小橋牛不肯進擊之良久更有使者責􅎰來遲乃去牛人挽而進宴於禁中至夜皆醉各就别所消息俄而元珍引武士齎毒酒而至􅎰曰吾無罪願一見至尊死無恨元珍曰至尊何可復見􅎰曰至尊聖明不應無事殺我乞與告者一對曲直武士以刀鐶築之􅎰大言曰寃哉皇天忠而見殺武士又築之􅎰乃飲毒酒武士就殺之向晨以褥裹尸載歸其第云王因醉而薨李妃號哭大言曰髙肇枉理殺人天道有靈汝安得良死魏主舉哀於東堂贈官􅁙禮皆優厚加等在朝貴賤莫不喪氣行路士女皆流涕曰髙令公枉殺賢王由是中外惡之益甚京兆王愉不能守信都癸夘燒門攜李氏及其四子從百餘騎突走李平入信都斬愉所置冀州牧韋超等遣統軍叔孫頭追執愉置信都以聞羣臣請誅愉魏主弗許命鎖送洛陽申以家人之訓行至野王髙肇密使人殺之諸子至洛魏主皆赦之魏主将屠李氏中書令崔光諫曰李氏方姙刑至刳胎乃桀紂所為酷而非灋請俟産畢然後行刑從之李平捕愉餘黨千餘人将盡殺之録事參軍髙顥曰此皆脅從前既許之原免矣宜為表陳平從之皆得免死顥祐之孫也濟州刺史髙植帥州軍擊愉有功當封植不受曰家荷重恩為國致效乃其常節何敢求賞植肇之子也如李平散騎常侍髙肇及中尉王顯素惡平顯彈平在冀州隠截官口肇奏除平名初顯祖之世柔然萬餘户降魏置之髙平薄骨律二鎮及太和之末叛走略盡唯千餘戸在太中大夫王通請徙置淮北以絶其叛詔太僕卿楊椿持節往徙之椿上言先朝處之邊徼所以招附殊俗且别異華戎也今新附之戸甚衆若舊者見徙新者必不自安是驅之使叛也且此屬衣毛食肉樂冬便寒南上濕熱往必殱盡進失歸附之心退無藩衛之益置之中夏或生後患非良䇿也不從遂徙於濟州縁河處之及京兆王愉之亂皆浮河赴愉所在鈔掠如椿之言庚子魏郢州司馬彭珍等叛魏潛引梁兵趨義陽三闗戍主矦登等以城來降郢州刺史婁悦嬰城自守魏以中山王英都督南征諸軍事将步騎三萬出汝南以救之冬十月魏懸瓠軍主白早生殺豫州刺史司馬悦自號平北将軍求援於司州刺史馬仙琕時荆州刺史安成王秀為都督仙琕籖求應赴參佐咸謂宜待臺報秀曰彼待我以自存援之宜速待敕雖舊非應急也即遣兵赴之上亦詔仙琕救早生仙琕進頓楚王城遣副将齊茍兒以兵二千助守懸瓠詔以早生為司州刺史丙寅以吳興太守張稷為尚書左僕射魏以尚書邢巒行豫州事将兵擊白早生魏主問之曰卿言早生走也守也何時可平對曰早生非有深謀大智正以司馬悦暴虐乗衆怒而作亂民迫於凶威不得已而從之縱使梁兵入城水路不通糧運不繼亦成禽耳早生得梁之援溺於利欲必守而不走若臨以王師士民必翻然歸順不出今年當傳首京師魏主悦命巒先發使中山王英繼之巒帥騎八百倍道兼行五日至鮑口丙子早生遣其大将胡孝智将兵七千離城二百里逆戰巒奮擊大破之乗勝長驅至懸瓠早生出城逆戰又破之因渡汝水圍其城詔加巒都督南討諸軍事丁丑魏鎮東參軍成景雋殺宿豫戍主嚴仲賢以城來降時魏郢豫二州自懸瓠以南至于安陸諸城皆沒唯義陽一城爲魏堅守蠻帥田益宗帥羣蠻以附魏魏以爲東豫州刺史上以車騎大将軍開府儀同三司五千戸郡公招之益宗不從十一月庚寅魏遣安東将軍楊椿将兵四萬攻宿豫魏主聞邢巒屢捷命中山王英趣義陽英以衆少累表請兵弗許英至懸瓠輒與巒共攻之十二月己未齊茍兒等開門出降斬白早生及其黨數十人英乃引兵前趨義陽寧朔将軍張道凝先屯楚王城癸亥弃城走英追擊斬之魏義陽太守狄道辛祥與婁悦共守義陽将軍胡武城陶平虜攻之祥夜出襲其營擒平虜斬武城由是州境獲全論功當賞婁悦恥功出其下間之於執政賞遂不行壬申魏東荆州表􅁊暉之弟叔興前後招撫太陽蠻歸附者萬餘户請置郡十六縣五十詔前鎮東府長史酈道元案行置之道元範之子也是嵗柔然佗汗可汗復遣紇奚勿六跋獻貂裘於魏魏主弗受報之如前初髙車侯倍窮奇為嚈噠所殺執其子彌俄突而去其衆分散或犇魏或犇柔然魏主遣羽林監河南孟威撫納降户置於髙平鎮髙車王阿伏至羅殘暴國人殺之立其宗人跋利延嚈噠奉彌俄突以伐髙車國人殺跋利延迎彌俄突而立之彌俄突與佗汗可汗戰于蒲類海不勝西走三百餘里佗汗軍於伊吾北山會髙昌王麴嘉求内徙於魏時孟威為龍驤将軍魏主遣威發凉州兵三千人迎之至伊吾佗汗見威軍怖而遁去彌俄突聞其離駭追擊大破之殺佗汗於蒲類海北割其髮送於威且遣使入貢於魏魏主使東城子于亮報之賜遺甚厚髙昌王嘉失期不至威引兵還沱汗可汗子醜奴立號豆羅伏跋豆伐可汗改元建昌宋齊舊儀祀天皆服衮冕兼著作郎髙陽許懋請造大裘從之上将有事太廟詔以齋日不樂自今輿駕始出鼓吹從而不作還宫如常儀八年春正月辛巳上祀南郊大赦時有請封會稽禪國山者上命諸儒草封禪儀欲行之許懋建議以為舜柴岱宗是為廵狩而鄭引孝經鉤命决云封于太山考績柴燎禪乎梁甫刻石紀號此緯書之曲説非正經之通義也舜五載一廵狩春夏秋冬周徧四嶽若為封禪何其數也又如管夷吾所説七十二君燧人之前世質民淳安得泥金檢玉結繩而治安得鐫文告成夷吾又云惟受命之君然後得封禪周成王非受命之君云何得封太山禪社首神農即炎帝也而夷吾分為二人妄亦甚矣若聖主不須封禪若凡主不應封禪蓋齊桓公欲行此事夷吾知其不可故舉怪物以屈之秦始皇嘗封太山孫皓嘗遣兼司空董朝至陽羨封禪國山皆非盛徳之事不足為灋然則封禪之禮皆道聴所説失其本文由主好名於上而臣阿㫖於下也古者祀天祭地禮有常數誠敬之道盡此而備至於封禪非所敢聞上嘉納之因推演懋議稱制㫖以荅請者由是遂止魏中山王英至義陽将取三闗先策之曰三闗相須如左右手若克一闗兩闗不待攻而破攻難不如攻易宜先攻東闗又恐其并力於東乃使長史李華帥五統向西闗以分其兵勢自督諸軍向東闗先是馬仙琕使雲騎将軍馬廣屯長薄軍主胡文超屯松峴丙申英至長薄戊戌長薄潰馬廣遁入武陽英進圍之上遣冠軍将軍彭甕生驃騎将軍徐元季将兵援武陽英故縱之使入城曰吾觀此城形勢易取甕生等既入英促兵攻之六日而拔虜三将及士卒七千餘人進攻廣峴太子左衛率李元履弃城走又攻西闗馬仙琕亦弃城走上使南郡太守韋叡将兵救仙琕叡至安陸増築城二丈餘更開大塹起髙樓衆頗譏其怯叡曰不然為将當有怯時不可専勇中山王英急追馬仙琕将復邵陽之恥聞叡至乃退上亦有詔罷兵初魏主遣中書舍人鮦陽董紹慰勞叛城白早生襲而囚之送於建康魏主既克懸瓠命於齊茍兒等四将之中分遣二人敕楊州為移以易紹及司馬悦首移書未至領軍将軍吕僧珍與紹言愛其文義言於上上遣主書霍靈超謂紹曰今聴卿還令卿通兩家之好彼此息民豈不善也因召見賜衣物令舍人周捨慰勞之且曰戰争多年民物塗炭吾是以不恥先言與魏朝通好比亦有書全無報者卿宜備申此意今遣􅀓詔霍靈秀送卿至國遲有嘉問又謂紹曰卿知所以得不死不今者獲卿乃天意也夫立君以為民也凡在民上豈可不思此乎若欲通好今以宿豫還彼彼當以漢中見歸紹還魏言之魏主不從三月魏荆州刺史元志将兵七萬冦潺溝驅廹羣蠻羣蠻悉渡漢水來降雍州刺史吳平矦昺納之綱紀皆以蠻累為邊患不如因此除之昺曰窮來歸我誅之不祥且魏人來侵吾得蠻以為屏蔽不亦善乎乃開樊城受其降命司馬朱思逺等擊志於潺溝大破之斬首萬餘級志齊之孫也夏四月戊申以臨川王宏為司空加車騎将軍王茂開府儀同三司丁夘魏楚王城主李國興以城降秋七月癸巳巴陵王蕭寶義卒九月辛巳魏封故北海主詳子顥為北海王魏公孫崇造樂尺以十二黍為寸劉芳非之更以十黍為寸尚書令髙肇等奏崇所造八音之器及度量皆與經􅀓不同詰其所以然云必依經文聲則不恊請更令芳依周禮造樂器俟成集議竝呈從其善者詔從之冬十月癸丑魏以司空廣陽王嘉爲司徒十一月己丑魏主於式乾殿爲諸僧及朝臣講維摩詰經時魏主専尚釋氏不事經籍中書侍郎河東裴延雋上疏以爲漢光武魏武帝雖在戎馬之間未嘗廢書先帝遷都行師手不釋卷良以學問多益不可暫輟故也陛下升灋座親講大覺凡在瞻聴塵蔽俱開然五經治世之模楷應務之所先伏願經書互覽孔釋兼存則内外俱周真俗斯暢矣時佛教盛於洛陽中國沙門之外自西域來者三千餘人魏主别爲之立永明寺千餘間以處之處士南陽馮亮有巧思魏主使與河南尹甄琛沙門統僧暹擇嵩山形勝之地立閑居寺極巖壑土木之美由是逺近承風無不事佛比及延昌州郡共有一萬三千餘寺是嵗魏宗正卿元樹來犇賜爵鄴王樹翼之弟也時翼為青冀二州刺史鎮郁洲久之翼謀舉州降魏事泄而死九年春正月乙亥以尚書令沈約為左光禄大夫右光禄大夫王瑩為尚書令約文學髙一時而貪冒榮利用事十餘年政之得失唯唯而已自以久居端揆有志台司論者亦以為宐而上終不用乃求外出又不許徐勉為之請三司之儀上不許庚寅新作縁淮塘北岸起石頭迄東冶南岸起後渚籬門迄三橋三月丙戌魏皇子詡生大赦詡母胡充華臨涇人父國珍襲武始伯充華初選入掖庭同列以故事祝之曰願生諸王公主勿生太子充華曰妾之志異於諸人柰何畏一身之死而使國家無嗣乎及有娠同列勸去之充華不可私自誓曰若幸而生男次第當長男生身死所不憾也既而生詡先是魏主頻喪皇子年漸長深加慎䕶擇良家宜子者以為乳保養於别宫皇后充華皆不得近己丑上幸國子學親臨講肄乙未詔皇太子以下及王矦之子年可從師者皆入學舊制尚書五都令史皆用寒流夏四月丁巳詔曰尚書五都職參政要非但揔領衆局亦乃方軌二丞可革用士流秉此羣目於是以都令史視奉朝請用太學博士劉納兼殿中都司空灋曹參軍劉顯兼吏部都太學博士孔䖍孫兼金部都司空灋曹參軍蕭軌兼左右户都宣毅墨曹參軍王顒兼中兵都竝以才地兼美首膺其選六月宣城郡吏吳承伯挾妖術聚衆癸丑攻郡殺太守朱僧勇轉屠旁縣閏月己丑承伯踰山奄至吳興東土人素不習兵吏民恇擾犇散或勸太守蔡撙避之撙不可募勇敢閉門拒守承伯盡鋭攻之撙帥衆出戰大破之臨陳斬承伯撙興宗之子也承伯餘黨入新安攻陷黟歙諸縣太守謝覽遣兵拒之不勝逃奔會稽臺軍討賊平之覽瀹之子也冬十月魏中山獻武王英卒上即位之三年詔定新曆員外散騎侍郎祖暅奏其父冲之考古灋為正曆不可改至八年詔太史課新舊二曆新曆密舊曆疎是嵗始行冲之大明曆魏劉芳等奏所造樂器及教文武二舞登歌鼓吹曲等已成乞如前敕集公卿羣儒議定與舊樂參呈若臣等所造形制合古擊拊會節請於來年元會用之詔舞可用新餘且仍舊十年春正月辛丑上祀南郊大赦尚書左僕射張稷自謂功大賞薄嘗侍宴樂夀殿酒酣怨望形於辭色上曰卿兄殺郡守弟殺其君有何名稱稷曰臣乃無名稱至於陛下不得言無勲東昏暴虐義師亦來伐之豈在臣而已上捋其須曰張公可畏人稷既懼且恨乃求出外癸夘以稷為青冀二州刺史王珍國亦怨望罷梁秦二州刺史還酒後於坐啓云臣近入梁山便哭上大驚曰卿若哭東昏則已晩若哭我我復未死珍國起拜謝竟不荅坐即散因此疎退久之除都官尚書丁巳魏汾州山胡劉龍駒聚衆反侵擾夏州詔諫議大夫薛和􅀤東秦汾華夏四州之衆以討之辛酉上祀明堂三月琅邪民王萬夀殺東莞琅邪二郡太守劉晣據朐山召魏軍壬戌魏廣陽懿烈王嘉卒魏徐州刺史盧昶遣郯城戍副張天惠琅邪戍主傅文驥相繼赴朐山青冀二州刺史張稷遣兵拒之不勝夏四月文驥等據朐山詔振逺将軍馬仙琕擊之魏又遣假安南将軍蕭寳寅假平東将軍天水趙遐将兵據朐山受盧昶節度甲戌魏薛和破劉龍駒悉平其黨表置東夏州五月丙辰魏禁天文學以國子祭酒張充為尚書左僕射充緒之子也馬仙琕圍朐山張稷權頓六里以督饋運上數發兵助之秋魏盧昶上表請益兵六千米十萬石魏王以兵四千給之冬十一月己亥魏主詔揚州刺史李崇等治兵夀陽以分朐山之勢盧昶本儒生不習軍旅朐山城中糧樵俱竭􅀓文驥以城降十二月庚辰昶引兵先遁諸軍相繼皆潰會大雪軍士凍死及墮手足者三分之二仙琕追擊大破之二百里間僵尸相屬魏兵免者什一二收其糧畜器械不可勝數昶單騎而走弃其節傳儀衛俱盡至郯城借趙遐節以為軍威魏主命黄門侍郎甄琛馳馹鎻昶窮其敗狀及趙遐皆免官唯蕭寶寅全軍而歸盧昶之在朐山也御史中尉游肇言於魏主曰朐山蕞爾僻在海濵卑濕難居於我非急於賊為利為利故必致死而争之非急故不得已而戰以不得已之衆擊必死之師恐稽延嵗月所費甚大假令得朐山徒致交争終難全守所謂無用之田也聞賊屢以宿豫求易朐山若必如此持此無用之地復彼舊有之疆兵役時解其利為大魏主将從之會昶敗遷肇侍中肇明根之子也馬仙琕為将能與士卒同勞逸所衣不過布帛所居無幃幕衾屏飲食與厮養最下者同其在邊境常單身潛入敵境伺知壁壘村落險要處所攻戰多捷士卒亦樂為之用魏以甄琛為河南尹琛表曰國家居代患多盜竊世祖􅀤憤廣置主司里宰皆以下代令長及五等散男有經略者乃得為之又多置吏士為其羽翼崇而重之始得禁止今遷都已來天下轉廣四逺赴會事過代都五方雜沓冦盜公行里正職輕任碎多是下才人懐茍且不能督察請取武官八品将軍已下幹用貞濟者以本官俸恤領里尉之任髙者領六部尉中者領經途尉下者領里正不爾請少髙里尉之品選下品中應遷者進而為之督責有所輦轂可清詔曰里正可進至勲品經途從九品六部尉正九品諸職中簡取不必武人琛又奏以羽林為遊軍於諸坊巷司察盜賊於是洛城清静後常踵焉是嵗梁之境内有州二十三郡三百五十縣千二十二是後州名浸多廢置離合不可勝記魏朝亦然上敦睦九族優借朝士有犯罪者皆屈灋申之百姓有罪則案之如灋其縁坐則老㓜不免一人亡逃舉家質作民既窮窘姦宄益深嘗因郊祀有秣陵老人遮車駕言曰陛下為灋急於庶民緩於權貴非長久之道誠能反是天下幸甚上於是思有以寛之十一年春正月壬辰詔自今逋讁之家及罪應質作若年有老小可停将送以臨川王宏為太尉驃騎将軍王茂為司空尚書令丙辰魏以車騎大将軍尚書令髙肇為司徒清河王懌為司空廣平王懐進號驃騎大将軍加儀同三司肇雖登三司猶自以去要任怏怏形於言色見者嗤之尚書右丞髙綽國子博士封軌素以方直自業及肇為司徒綽送迎往來軌竟不詣肇綽顧不見軌乃遽歸嘆曰吾平生自謂不失規矩今日舉措不如封生逺矣綽允之孫軌懿之族孫也清河王懌有才學聞望懲彭城之禍因待宴謂肇曰天子兄弟詎有幾人而翦之幾盡昔王莽頭秃藉渭陽之資遂簒漢室今君身曲亦恐終成亂階會大旱肇擅録囚徒欲以收衆心懌言於魏主曰昔季氏旅於泰山孔子疾之誠以君臣之分宐防微杜漸不可瀆也減膳録囚乃陛下之事今司徒行之豈人臣之義乎明君失之於上姦臣竊之於下禍亂之基於此在矣帝笑而不應夏四月魏詔尚書與羣司鞫理獄訟令飢民就穀燕恒二州及六鎮乙酉魏大赦改元延昌冬十月乙亥魏立皇子詡為太子始不殺其母以尚書右僕射郭祚領太子少師祚嘗從魏主幸東宫懐黄㼐以奉太子時應詔左右趙桃弓深為帝所信任祚私事之時人謂之桃弓僕射黄㼐少師十一月乙未以吳郡太守袁昂兼尚書右僕射初齊太子步兵校尉平昌伏曼容表求制一代禮樂世祖詔選學士十人修五禮丹楊尹王儉揔之儉卒以事付國子祭酒何胤胤還東山齊明帝敕尚書令徐孝嗣掌之孝嗣誅率多散逸詔驃騎将軍何佟之掌之經齊末兵火僅有在者帝即位佟之啓審省置之宜敕使外詳時尚書以為庶務權輿宜俟隆平欲且省禮局併還尚書儀曹詔曰禮壊樂缺實宜以時修定但頃之修撰不得其人所以歴年不就有名無實此既經國所先可即撰次於是尚書僕射沈約等奏請五禮各置舊學士一人令自舉學古一人相助抄撰其中疑者依石渠白虎故事請制㫖斷决乃以右軍記室參軍明山賔等分掌五禮佟之揔其事佟之卒以鎮北諮議參軍伏暅代之暅曼容之子也至是五禮成列上之合八千一十九條詔有司遵行己酉臨川王宏以公事左遷驃騎大将軍是嵗魏以桓叔興為南荆州刺史治安昌􅀠東荆州十二年春正月辛夘上祀南郊大赦二月辛酉以兼尚書右僕射袁昂為右僕射己夘魏髙陽王雍進位太保鬱洲迫近魏境其民多私與魏人交市朐山之亂或隂與魏通朐山平心不自安青冀二州刺史張稷不得志政令寛㢮僚吏頗多侵漁庚辰鬱洲民徐道角等夜襲州城殺稷送其首降魏魏遣前南兖州刺史樊魯将兵赴之於是魏飢民餓死者數萬侍中游肇諫以為朐山濵海卑濕難居鬱洲又在海中得之尤為無用其地於賊要近去此閑逺以閑逺之兵攻要近之衆不可敵也方今年飢民困唯宜安静而復勞以軍旅費以饋運臣見其損未見其益魏主不從復遣平西将軍奚康生将兵逆之未發北兖州刺史康絢遣司馬霍奉伯討平之辛巳新作太極殿上嘗與侍中太子少傅建昌矦沈約各疏栗事約少上三事出謂人曰此公䕶前不則羞死上聞之怒欲治其罪徐勉固諫而止上有憾於張稷從容與約語及之約曰左僕射出作邊州已徃之事何足復論上以爲約與稷昏家相為怒曰卿言如此是忠臣邪乃輦歸内殿約懼不覺上起猶坐如初及還未至牀而憑空頓於戸下因病夢齊和帝以劒斷其舌乃呼道士奏赤章於天稱禪代之事不由己出上遣主書黄穆之視疾夕還増損不即啓聞懼罪乃白赤章事上大怒中使譴責者數四約益懼閏月乙丑卒有司諡曰文上曰情懐不盡曰隠改諡隠矦夏五月夀陽久雨大水入城廬舍皆沒魏揚州刺史李崇勒兵泊於城上水増未已乃乗船附於女牆城不沒者二板将佐勸崇弃夀陽保北山崇曰吾忝守藩岳徳薄致災淮南萬里繫于吾身一旦動足百姓瓦解揚州之地恐非國物吾豈愛一身取愧王尊但憐此士民無辜同死可結筏隨髙人規自脱吾必與此城俱沒幸諸君勿言揚州治中裴絢帥城南民數千家汎舟南走避水髙原謂崇還北因自稱豫州刺史與别駕鄭祖起等送任子來請降馬仙琕遣兵赴之崇聞絢叛未測虚實遣國侍郎韓方興單舸召之絢聞崇在悵然驚恨報曰比因大水顛狽為衆所推今大計已爾勢不可追恐民非公民吏非公吏願公早行無犯将士崇遣從弟寧朔将軍神等将水軍討之絢戰敗神追拔其營絢走為村民所執還至尉升湖曰吾何靣見李公乎乃投水死絢叔業之兄孫也鄭祖起等皆伏誅崇上表以水災求解州任魏主不許崇沈深寛厚有方略得士衆心在夀春十年常養壯士數千人冦來無不摧破鄰敵謂之卧虎上屢設反間以疑之又授崇車騎大将軍開府儀同三司萬戸郡公諸子皆為縣矦而魏主素知其忠篤委信不疑六月癸巳新作太廟秋八月戊午以臨川王宏為司空魏恒肆二州地震山鳴踰年不已民覆壓死傷甚衆魏主幸東宫以中書監崔光為太子少傅命太子拜之光辭不敢當帝不許太子南靣再拜詹事王顯啓請從太子拜於是宫臣皆拜光北靣立不敢荅唯西靣拜謝而出十三年春二月丁亥上耕藉田大赦宋齊藉田皆用正月至是始用二月及致齋祀先農魏東豫州刺史田益宗衰老與諸子孫聚歛無厭部内若之咸言欲叛魏主遣中書舍人劉桃符慰勞益宗桃符還啓益宗侵擾之狀魏主賜詔曰桃符聞卿息魯生在淮南貪暴為爾不已損卿誠効可令魯生赴闕當加任使魯生久未至詔徙益宗為鎮東将軍濟州刺史又慮其不受代遣後将軍李世哲與桃符帥衆襲之奄入廣陵魯生與其弟魯賢超秀皆犇闗南招引梁兵攻取光城已南諸戍上以魯生為北司州刺史魯賢為北豫州刺史超秀為定州刺史三月魏李世哲擊魯生等破之復置郡戍以益宗還洛陽授征南将軍金紫光禄大夫益宗上表稱為桃符所讒及言魯生等為桃符逼逐使叛乞攝桃符與臣對辨虚實詔不許曰既經大宥不容方更為獄秋七月乙亥立皇子綸為邵陵王繹為湘東王紀為武陵王冬十月庚辰魏主遣驍騎将軍馬義舒慰諭柔然魏王足之入冦也上命寧州刺史涪人李略禦之許事平用為益州足退上不用略怨望有異謀上殺之其兄子苗犇魏步兵校尉泰山淳于誕嘗為益州主簿自漢中入魏二人共説魏主以取蜀之策魏主信之辛亥以司徒髙肇為大将軍平蜀大都督将步騎十五萬冦益州命益州刺史傅豎眼出巴北梁州刺史羊祉出涪城安西将軍奚康生出綿竹撫軍将軍甄琛出劒閣乙夘以中䕶軍元遥為征南将軍都督鎮遏梁楚游肇諫以為今頻年水旱百姓不宜勞役徃昔開拓皆因城主歸欵故有征無戰今之陳計者真偽難分或有怨於彼不可全信蜀地險隘鎮戍無隙豈得虚承浮説而動大軍舉不慎始悔将何及不從以淳于誕為驍騎将軍假李苗龍驤将軍皆領鄉導統軍魏降人王足陳計求堰淮水以灌夀陽上以為然使水工陳承伯材官将軍祖暅視地形咸謂淮内沙土漂輕不堅實功不可就上弗聴發徐揚民率二十戸取五丁以築之假太子右衛率康絢都督淮上諸軍事并䕶堰作於鍾離役人及戰士合二十萬南起浮山北抵巉石依岸築土合脊於中流魏以前定州刺史楊津為華州刺史津椿之弟也先是官受調絹尺度特長任事因縁共相進退百姓苦之津令悉依公尺其輸物尤善者賜以杯酒所輸少劣亦為受之但無酒以示恥於是人競相勸官調更勝舊日魏太子尚㓜每出入東宫左右乳母而已宫臣皆不之知詹事楊昱上言乞自今召太子必降手敕令臣等翼從魏主從之命宫臣在直者從至萬嵗門魏御史中尉王顯問治書侍御史陽固曰吾作太府卿府庫充實卿以為何如固曰公收百官之禄四分之一州郡贓贖悉輸京師以此充府未足為多且有聚歛之臣寧有盜臣可不戒哉顯不悦因事奏免固官資治通鑑卷第一百四十七
