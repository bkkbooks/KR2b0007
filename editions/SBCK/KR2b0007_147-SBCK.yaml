front:
  text: 吕僧珍爲領軍將軍領軍掌中外兵要宋孝建以來制局用事與領軍分兵權典事以上皆得呈奏領軍拱手而已及呉平矦昺在職峻切官曹肅然制局監皆近倖頗不堪命以是不得乆留中丙子岀爲雍州刺史三月戊子魏皇子昌卒侍御師王顯失於療治時人皆以為承髙肇之意也夏四月乙夘皇太子納妃大赦五月己亥詔復置宗正太僕大匠鴻臚又増太府太舟仍先為十二卿
