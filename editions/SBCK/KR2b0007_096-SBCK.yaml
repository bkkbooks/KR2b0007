seq: 96
front:
  text: 攻掠令支以北諸城叚遼將追之慕容翰曰今趙兵在南當并力禦之而更與燕鬭燕王自將而來其士卒精鋭若萬一失利將何以禦南敵乎叚蘭怒曰吾前為卿所誤以成今日之患吾不復墮卿計中矣乃悉將見衆追之皝設伏以待之大破蘭兵斬首數千級掠五千户及畜産萬計以歸趙王虎進屯金臺支雄長驅入薊叚遼所署漁陽上谷代郡守相皆降取四十餘城北平相陽裕帥其民數千家登燕山以自固諸將恐其為後患欲攻之虎曰裕儒生矜惜名節恥於迎降耳無能為也遂過之至徐無叚遼以弟蘭既敗不敢復戰帥妻子宗族豪大千餘家棄令支奔密雲山將行執慕容翰手泣曰不用卿言自取敗亡我固甘心令卿失所深以為愧翰北奔宇文氏遼左右長史劉羣盧諶崔恱等封府庫請降虎遣將軍郭太麻秋帥輕騎二萬追遼至密雲山獲其母妻斬首三千級遼單騎走險遣其子乞特真奉表及獻名馬於趙虎受之虎入令支宫論功封賞各有差徙叚國民二萬餘户於司雍兖豫四州士大夫之有才行者皆擢叙之陽裕詣軍門降虎讓之曰卿昔為奴虜走今為士人來豈識知天命將逃匿無地邪對曰臣昔事王公不能匡濟逃于叚氏復不能全今陛下天網髙張籠絡四海幽冀豪傑莫不風從如臣比肩無所獨愧生死之命惟陛下制之虎悅即拜北平太守夏四月癸丑以慕容皝為征北大將軍幽州牧領平州刺史
  hash: sha256:953c1436e8d5aa2e301c414253f046378e709ccc182867a4c4dbb4a27b525319
body:
  text: 成主期驕虐日甚多所誅殺而籍沒其資財婦女由是大臣多不自安漢王壽素貴重有威名期及建寧王越等皆忌之壽懼不免每當入朝常詐為邊書辭以警急初巴西處士龔壯父叔皆為李特所殺壯欲報仇積年不除喪壽數以禮辟之壯不應而往見壽壽密問壯以自安之策壯曰巴蜀之民本皆晉臣節下若能發兵西取成都稱藩於晉誰不爭為節下奮臂前驅者如此則福流子孫名垂不朽豈徒脫今日之禍而已壽然之陰與長史畧陽羅恒巴西解思明謀攻成都期頗聞之數遣許涪至壽所伺其動靜又鴆殺壽養弟安北將軍攸壽乃詐為妹夫任調書云期當取壽其衆信之遂帥步騎萬餘人自涪襲成都許賞以城中財物以其將李弈為前鋒期不意其至初不設備壽世子勢為翊軍校尉開門納之遂克成都屯兵宫門期遣侍中勞壽壽奏建寧王越景騫田褒姚華許涪及征西將軍李遐將軍李西等懷姦亂政皆收殺之縱兵大掠數日乃定壽矯以太后任氏令廢期為卭都縣公幽之别宫追謚戾太子曰哀皇帝羅恒解思明李弈等勸壽稱鎮西將軍益州牧成都王稱藩於晉送卭都公於建康任調及司馬蔡興侍中李豔等勸壽自稱帝壽命筮之占者曰可數年天子調喜曰一日尚足況數年乎思明曰數年天子孰與百世諸侯壽曰朝聞道夕死可矣遂即皇帝位改國號曰漢大赦改元漢興以安車束帛徵龔壯爲太師壯誓不仕壽所贈遺一無所受壽改立宗廟追尊父驤曰獻皇帝母昝氏爲皇太后立妃閻氏爲皇后世子勢爲皇太子更以舊廟爲大成廟凡諸制度多所改易以董皎爲相國羅恒爲尚書令解思明爲廣漢太守任調爲鎮北將軍梁州刺史李弈爲西夷校尉從子權爲寧州刺史公卿州郡悉用其僚佐代之成氏舊臣近親及六郡士人皆見踈斥卭都公期歎曰天下主乃爲小縣公不如死五月縊而卒壽謚曰幽公􅁙以王禮趙王虎以燕王皝不㑹趙兵攻叚遼而自專其利欲伐之太史令趙攬諫曰歳星守燕分師必無功虎怒鞭之皝聞之嚴兵設備罷六卿納言常伯冗騎常侍官趙戎卒數十萬燕人震恐皝謂内史高詡曰將若之何對曰趙兵雖彊然不足憂但堅守以拒之無能為也虎遣使四出招誘民夷燕成周内史崔燾居就令游􅇦武原令常霸東夷校尉封抽䕶軍宋晃等皆應之凡得三十六城􅇦䆳之兄子也冀陽流寓之士共殺太守宋燭以降於趙燭晃之從兄也營丘内史鮮于屈亦遣使降趙武寧令廣平孫興曉諭吏民共收屈數其罪而殺之閉城拒守朝鮮令昌黎孫泳帥衆拒趙大姓王清等密謀應趙泳收斬之同謀數百人惶怖請罪泳皆釋之與同拒守樂浪太守鞠彭以境内皆叛選鄉里壯士二百餘人共還棘城戊子趙兵進逼棘城燕王皝欲出亡帳下將慕輿根諫曰趙彊我弱大王一舉足則趙之氣勢遂成使趙人收畧國民兵彊穀足不可復敵􅀼意趙人正欲大王如此耳奈何入其計中乎今固守堅城其勢百倍縱其急攻猶足枝持觀形察變閒出求利如事之不濟不失於走奈何望風委去為必亡之理乎皝乃止然猶懼形於色􅀇菟太守河閒劉佩曰今彊寇在外衆心恟懼事之安危繫於一人大王此際無所推委當自強以厲將士不宜示弱事急矣臣請出擊之縱無大捷足以安衆乃將敢死數百騎出衝趙兵所向披靡斬獲而還於是士氣自倍皝問計於封弈對曰石虎凶虐已甚民神共疾禍敗之至其何日之有今空國逺來攻守勢異戎馬雖彊無能為患頓兵積日釁隙自生但堅守以俟之耳皝意乃安或說皝降皝曰孤方取天下何謂降也趙兵四面蟻附緣城慕輿根等晝夜力戰凡十餘日趙兵不能克壬辰引退皝遣其子恪帥二千騎追擊之趙兵大敗斬獲三萬餘級趙諸軍皆棄甲逃潰惟游擊將軍石閔一軍獨全閔父瞻内黄人本姓冉趙主勒破陳午獲之命虎養以為子閔驍勇善戰多策畧虎愛之比於諸孫虎還鄴以劉羣為中書令盧諶為中書侍郎蒲洪以功拜使持節都督六夷諸軍事冠軍大將軍封西平郡公石閔言於虎曰蒲洪雄儁得將士死力諸子皆有非常之才且握彊兵五萬屯據近畿宜密除之以安社稷虎曰吾方倚其父子以取吳蜀奈何殺之待之愈厚燕王皝分兵討諸叛城皆下之拓境至凡城崔燾常霸奔鄴封抽宋晃游􅇦奔高句麗皝賞鞠彭慕輿根等而治諸叛者誅滅甚衆功曹劉翔爲之申理多所全活趙之攻棘城也燕右司馬李洪之弟普以爲棘城必敗勸洪出避禍洪曰天道幽逺人事難知且當委仼勿輕動取悔普固請不已洪曰卿意見明審者當自行之吾受慕容氏大恩義無去就當效死於此耳與普流涕而訣普遂降趙從趙軍南歸死於䘮亂洪由是以忠篤著名趙王虎遣渡遼將軍曹伏將青州之衆戍海島運穀三百萬斛以給之又以船三百艘運穀三十萬斛詣髙句麗使典農中郎將王典帥衆萬餘屯田海濱又令青州造船千艘以謀擊燕趙太子宣帥步騎二萬擊朔方鮮卑斛摩頭破之斬首四萬餘級冀州八郡大蝗趙司隸請坐守宰趙王虎曰此朕失政所致而欲委咎守宰豈罪已之意邪司隸不進讜言佐朕不逮而欲妄陷無辜可白衣領職虎使襄城公涉歸上庸公日歸帥衆戍長安二歸告鎮西將軍石廣私樹恩澤潛謀不軌虎追廣至鄴殺之乙未以司徒導為太傅都督中外諸軍事郗鍳為太尉庾亮為司空六月以導為丞相罷司徒官以并丞相府導性寬厚委任諸將趙􅅌賈寧等多不奉法大臣患之庾亮與郗鑒牋曰主上自八九嵗以及成人入則在宫人之手出則唯武官小人讀書無從受音句顧問未嘗遇君子秦政欲愚其黔首天下猶知不可況欲愚其主哉人主春秋既盛宜復子明辟不稽首歸政甫居師傅之尊多養無賴之士公與下官並荷託付之重大姦不掃何以見先帝於地下乎欲共起兵廢導鑒不聽南蠻校尉陶稱侃之子也以亮謀語導或勸導密為之備導曰吾與元規休戚是同悠悠之談宜絶智者之口即如君言元規若來吾便角巾還第復何懼哉又與稱書以為庾公帝之元舅宜善事之征西參軍孫盛密諫亮曰王公常有世外之懷豈肯為凡人事邪此必佞邪之徒欲閒内外耳亮乃止盛楚之孫也是時亮雖居外鎮而遥執朝廷之權既據上流擁彊兵趣勢者多歸之導内不能平常遇西風塵起舉扇自蔽徐曰元規塵汚人導以江夏李充為丞相掾充以時俗崇尚浮虚乃著學箴以為老子云絶仁棄義民復孝慈豈仁義之道絶然後孝慈乃生哉蓋患乎情仁義者寡而利仁義者衆將寄責於聖人而遣累乎陳迹也凡人見形者衆及道者鮮逐迹逾篤離本逾逺故作學箴以祛其蔽曰名之攸彰道之攸廢乃損所隆乃崇所替非仁無以長物非義無以齊恥仁義固不可逺去其害仁義者而已漢李弈從兄廣漢太守乾告大臣謀廢立秋七月漢主壽使其子廣與大臣盟于前殿徙乾為漢嘉太守以李閎為荆州刺史鎮巴郡閎恭之子也八月蜀中久雨百姓饑疫壽命羣臣極言得失龔壯上封事稱陛下起兵之初上指星辰昭告天地歃血盟衆舉國稱藩天應人恱大功克集而論者未諭權宜稱制今淫雨百日饑疫並臻天其或者將以監示陛下故也愚謂宜遵前盟推奉建康彼必不愛髙爵重位以報大功雖降階一等而子孫無窮永保福祚不亦休哉論者或言二州附晉則榮六郡人事之不便昔公孫述在蜀羇客用事劉備在蜀楚士多貴及吳鄧西伐舉國屠滅寧分客主論者不達安固之基茍惜名位以為劉氏守令方仕州郡曾不知彼乃國亡主易豈同今日義舉主榮臣顯哉論者又謂臣當為法正臣蒙陛下大恩恣臣所安至於榮祿無問漢晉臣皆不處復何為效法正乎壽省書内慙祕而不宣九月漢僕射任顔謀反誅顔任太后之弟也漢主壽因盡誅成主雄諸子冬十月光祿勲顔含以老遜位論者以王導帝之師傅名位隆重百僚宜為降禮太常馮懷以問含含曰王公雖貴重理無偏敬降禮之言或是諸君事宜鄙人老矣不識時務既而告人曰吾聞伐國不問仁人向馮祖思問佞於我我豈有邪徳乎郭璞嘗遇含欲為之筮含曰年在天位在人脩已而天不與者命也守道而人不知者性也自有性命無勞􅆱􅀛致仕二十餘年年九十三而卒代王翳槐之弟什翼犍質於趙翳槐疾病命諸大人立之翳槐卒諸大人梁蓋等以新有大故什翼犍在逺來未可必比其至恐有變亂謀更立君而翳槐次弟屈剛猛多詐不如屈弟孤仁厚乃相與殺屈而立孤孤不可自詣鄴迎什翼犍請身留為質趙王虎義而俱遣之十一月什翼犍即代王位於繁畤北改元曰建國分國之半以與孤初代王猗盧既卒國多内難部落離散拓跋氏寖衰及什翼犍立雄勇有智畧能修祖業國人附之始置百官分掌衆務以代人燕鳳為長史許謙為郎中令始制反逆殺人姦盜之法號令明白政事清簡無繫訊連逮之頃百姓安之於是東自濊貃西及破落那􅀯距陰山北盡沙漠率皆歸服有衆數十萬人十二月叚遼自密雲山遣使求迎于趙既而中悔復遣使求迎于燕趙王虎遣征東將軍麻秋帥衆三萬迎之敕秋曰受降如受敵不可輕也以尚書左丞陽裕遼之故臣使為秋司馬燕王皝自帥諸軍迎遼遼密與燕謀覆趙軍皝遣慕容恪伏精􅀐七千於密雲山大敗麻秋於三藏口死者什六七秋步走得免陽裕為燕所執趙將軍范陽鮮于亮失馬步緣山不能進因止端坐燕兵環之叱令起亮曰身是貴人義不為小人所屈汝曹能殺亟殺不能則去亮儀觀豐偉聲氣雄厲燕兵憚之不敢殺以白皝皝以馬迎之與語大恱用爲左常侍以崔毖之女妻之皝盡得叚遼之衆待遼以上賓之禮以陽裕爲郎中令趙王虎聞麻秋敗怒削其官爵五年春正月辛丑大赦三月乙丑廣州刺史鄧岳將兵擊漢寧州漢建寧太守孟彦執其刺史霍彪以降征西將軍庾亮欲開復中原表桓宣爲都督沔北前鋒諸軍事司州刺史鎮襄陽又表其弟臨川太守懌爲監梁雍二州諸軍事梁州刺史鎮魏興西陽太守翼爲南蠻校尉領南郡太守鎮江陵皆假節又請解豫州以授征虜將軍毛寶詔以寶監揚州之江西諸軍事豫州刺史與西陽太守樊峻帥精兵萬人戍邾城以建威將軍陶稱為南中郎將江夏相入沔中稱將二百人下見亮亮素惡稱輕狡數稱前後罪惡收而斬之後以魏興險逺命庾懌徙屯半洲更以武昌太守陳嚻為梁州刺史趣漢中遣參軍李松攻漢巴郡江陽夏四月執漢荆州刺史李閎巴郡太守黄植送建康漢主壽以李奕為鎮東將軍代閎守巴郡庾亮上䟽言蜀甚弱而胡尚彊欲帥大衆十萬移鎮石城遣諸軍羅布江沔為伐趙之規帝下其議丞相導請許之太尉鑒議以為資用未備不可大舉太常蔡謨議以為時有否泰道有屈伸茍不計彊弱而輕動則亡不終日何功之有為今之計莫若養威以俟時時之可否繫胡之彊弱胡之彊弱繫石虎之能否自石勒舉事虎常為爪牙百戰百勝遂定中原所據之地同於魏世勒死之後虎挾嗣君誅將相内難既平剪削外寇一舉而拔金墉再戰而禽石生誅石聰如拾遺取郭權如振槁四境之内不失尺土以是觀之虎為能乎將不能也論者以胡前攻襄陽不能拔謂之無能為夫百戰百勝之彊而以不拔一城為劣譬諸射者百發百中而一失可以謂之拙乎且石遇偏師也桓平北邊將也所爭者彊埸之􅁟利則進否則退非所急也今征西以重鎮名賢自將大軍欲席卷河􅀯虎必自帥一國之衆來决勝負豈得以襄陽為比哉今征西欲與之戰何如石生若欲城守何如金墉欲阻沔水何如大江欲拒石虎何如蘇峻几此數者宜詳校之石生猛將關中精兵征西之戰殆不能勝也金墉險固劉曜十萬衆不能拔征西之守殆不能勝也又當是時洛陽關中皆舉兵擊虎今此三鎮反為其用方之於前倍半之勢也石生不能敵其半而征西欲當其倍愚所疑也蘇峻之彊不及石虎沔水之險不及大江大江不能禦蘇峻而欲以沔水禦石虎又所疑也昔祖士稚在譙佃於城北界胡來攻豫置軍屯以禦其外穀將熟胡果至丁夫戰於外老弱穫於内多持炬火急則燒穀而走如此數年竟不得其利當是時胡唯據河北方之於今四分之一耳士稚不能捍其一而征西欲以禦其四又所疑也然此但論征西既至之後耳尚未論道路之慮也自沔以西水急岸髙魚貫泝流首尾百里若胡無宋襄之義及我未陣而擊之將如之何今王土與胡水陸異勢便習不同胡若送死則敵之有餘若棄江逺進以我所短擊彼所長懼非廟勝之筭也朝議多與謨同乃詔亮不聽移鎮燕前軍師慕容評廣威將軍慕容軍折衝將軍慕輿根蕩寇將軍慕輿埿襲趙遼西俘獲千餘家而去趙鎮逺將軍石成積弩將軍呼延晃建威將軍張支等追之評等與戰斬晃支首叚遼謀反於燕燕人殺遼及其黨與數十人送遼首於趙五月代王什翼犍㑹諸大人於參合陂議都灅源川其母王氏曰吾自先世以來以遷徙為業今國家多難若城郭而居一旦寇來無所避之乃止代人謂它國之民來附者皆為烏桓什翼犍分之為二部各置大人以監之弟孤監其北子寔君監其􅀯什翼犍求昏於燕燕王皝以其妹妻之秋七月趙王虎以太子宣為大單于建天子旌旗庚申始興文獻公王導薨喪􅁙之禮視漢博陸侯及安平獻王故事參用天子之禮導簡素寡欲善因事就功雖無日用之益而嵗計有餘輔相三世倉無儲穀衣不重帛初導與庾亮共薦丹揚尹何充於帝請以為已副且曰臣死之日願引充内侍則社稷無虞矣由是加吏部尚書及導薨徵庾亮為丞相揚州刺史錄尚書事亮固辭辛酉以充為䕶軍將軍亮弟㑹稽内史冰為中書監揚州刺史參錄尚書事冰既當重任經綸時務不捨晝夜賓禮朝賢升擢後進由是朝野翕然稱之以為賢相初王導輔政每從寬恕冰頗任威刑丹楊尹殷融諫之冰曰前相之賢猶不堪其􅀪況如吾者哉范汪謂冰曰頃天文錯度足下宜盡消禦之道冰曰􅀇象豈吾所測正當勤盡人事耳又隠實户口料出無名萬餘人以充軍實冰好為糾察近於繁細後益矯違復存寬縱踈密自由律令無用矣八月壬午復改丞相為司徒􅀯昌文成公郗鑒疾篤以府事付長史劉遐上䟽乞骸骨且曰臣所統錯雜率多北人或逼遷徙或是新附百姓懷土皆有歸本之心臣宣國恩示以好惡處與田宅漸得少安聞臣疾篤衆情駭動若當北渡必啓寇心太常臣謨平簡貞正素望所歸謂可以為都督徐州刺史詔以蔡謨為太尉軍司加侍中辛酉鑒薨即以謨為征北將軍都督徐兖青三州諸軍事領徐州刺史假節時左衞將軍陳光請伐趙詔遣光攻夀陽謨上䟽曰壽陽城小而固自壽陽至琅邪城壁相望一城見攻衆城必救又王師在路五十餘日前驅未至聲息久聞賊之郵驛一日千里河北之騎足以來赴夫以白起韓信頃籍之勇猶發梁焚舟背水而陣今欲停􅂳水渚引兵造城前對堅敵顧臨歸路此兵法之所誡若進攻未拔胡騎猝至懼桓子不知所為而舟中之指可掬也今光所將皆殿中精兵宜令所向有征無戰而頓之堅城之下以國之爪士擊寇之下邑得之則利薄而不足損敵失之則害重而足以益寇懼非䇿之長者也乃止初陶侃在武昌議者以江北有邾城宜分兵戍之侃每不荅而言者不已侃乃渡水獵引將佐語之曰我所以設險而禦寇者正以長江耳邾城隔在江北内無所倚外接羣夷夷中利深晉人貪利夷不堪命必引虜入寇此乃致禍之由非禦寇也且吳時戍此城用三萬兵今縱有兵守之亦無益於江南若羯虜有可乘之㑹此又非所資也及􅁃亮鎮武昌卒使毛寶樊峻戍邾城趙王虎惡之以䕫安為大都督帥石鑒石閔李農張貉李菟等五將軍兵五萬人寇荆揚北鄙二萬騎攻邾城毛寳求救於庾亮亮以城固不時遣兵九月石閔敗晉兵於沔陰殺將軍蔡懷䕫安李農陷沔􅀯朱保敗晉兵於白石殺鄭豹等五將軍張貉陷邾城死者六千人毛寳樊峻突圍出走赴江溺死䕫安進據胡亭寇江夏義陽將軍黄冲義陽太守鄭進皆降於趙安進圍石城竟陵太守李陽拒戰破之斬首五千餘級安乃退遂掠漢東擁七千餘户遷于幽冀是時庾亮猶上䟽欲遷鎮石城聞邾城陷乃止上表陳謝自貶三等行安西將軍有詔復位以輔國將軍􅁃懌為豫州刺史監宣城廬江歴陽安豐四郡諸軍事假節鎮蕪湖趙主虎患貴戚豪恣乃擢殿中御史李巨為御史中丞特加親任中外肅然虎曰朕聞良臣如猛虎高步曠野而豺狼避路信哉虎以撫軍將軍李農為使持節監遼西北平諸軍事征東將軍營州牧鎮令支農帥衆三萬與征北大將軍張舉攻燕凡城燕王皝以榼盧城大恱綰為禦難將軍授兵一千使守凡城及趙兵至將吏皆恐欲棄城走綰曰受命禦寇死生以之且慿城堅守一可敵百有敢妄言惑衆者斬衆然後定綰身先士卒親冒矢石舉等攻之經旬不能克乃退虎以遼西迫近燕境數遭攻襲乃悉徙其民於冀州之南漢主壽疾病羅恒解思明復議奉晉壽不從李演復上書言之壽怒殺演壽常慕漢武魏明之為人恥聞父兄時事上書者不得言先世政教自以為勝之也舍人杜襲作詩十篇託言應璩以諷諌壽報曰省詩知意若今人所作乃賢哲之話言若古人所作則死鬼之常辭耳燕王皝自以稱王未受晉命冬遣長史劉翔參軍鞠運來獻捷論功且言權假之意并請刻期大舉共平中原皝擊髙句麗兵及新城髙句麗王釗乞盟乃還又使其子恪霸擊宇文别部霸年十三勇冠三軍張駿立辟雍明堂以行禮十一月以世子重華行凉州事十二月丁丑趙大保桃豹卒丙戌以驃騎將軍琅邪王岳為侍中司徒漢李弈寇巴東守將勞楊敗死六年春正月庚子朔都亭文康侯庾亮薨以䕶軍將軍錄尚書何充為中書令庚戌以南郡太守庾翼為都督江荆司雍梁益六州諸軍事安西將軍荆州刺史假節代亮鎮武昌時人疑翼年少不能繼其兄翼悉心為治戎政嚴明數年之閒公私充實人皆稱其才辛亥以左光禄大夫陸玩為侍中司空宇文逸豆歸忌慕容翰才名翰乃陽狂酣飲或卧自便利或被髪歌呼拜跪乞食宇文舉國賤之不復省錄以故得行來自遂山川形便皆黙記之燕王皝以翰初非叛亂以猜嫌出奔雖在它國常潛為燕計乃遣商人王車通市於宇文部以窺翰翰見車無言撫膺頷之而已皝曰翰欲來也復使車迎之翰彎弓三石餘矢尤長大皝為之造可手弓矢使車埋於道旁而密告之二月翰竊逸豆歸名馬擕其二子過取弓矢逃歸逸豆歸使驍騎百餘追之翰曰吾久客思歸既得上馬無復還理吾曏日陽愚以誑汝吾之故藝猶在無為相逼自取死也追騎輕之直突而前翰曰吾居汝國久恨恨不欲殺汝汝去我百步立汝刀吾射之一發中者汝可還不中者可來前追騎解刀立之一發正中其環追騎散走皝聞翰至大喜恩遇甚厚庚辰有星孛于太微三月丁卯大赦漢人攻拔丹川守將孟彦劉齊李秋皆死代王什翼犍始都雲中之盛樂宫趙王虎遺漢主壽書欲與之連兵入寇約中分江􅀯壽大喜遣散騎常侍王嘏中常侍王廣使于趙龔壯諌不聽夀大脩􅂳艦繕兵聚糧秋九月以尚書令馬當為六軍都督徵集士卒七萬餘人為舟師大閲於成都鼓譟盈江壽登城觀之有吞噬江南之志解思明諌曰我國小兵弱吳㑹險逺圖之未易壽乃命羣臣大議利害龔壯曰陛下與胡通孰若與晉通胡豺狼也既滅晉不得不北面事之若與之爭天下則彊弱不敵危亡之勢也虞虢之事已然之戒願陛下熟慮之羣臣皆以壯言為然叩頭泣諌壽乃止士卒咸稱萬嵗龔壯以為人之行莫大於忠孝既報父叔之仇又欲使壽事晉壽不從乃詐稱耳聾手不制物辭歸以文籍自娛終身不復至成都趙尚書令䕫安卒趙王虎命司冀青徐幽并雍七州之民五丁取三四丁取二合鄴城舊兵滿五十萬具船萬艘自河通海運穀千一百萬斛于樂安城徙遼西北平漁陽萬餘户于兖豫雍洛四州之地自幽州以東至白狼大興屯田悉括取民馬有敢私匿者􅆎斬凡得四萬餘匹大閲於宛陽欲以擊燕燕王皝謂諸將曰石虎自以樂安城防守重複薊城􅀯北必不設備今若詭路出其不意可盡破也冬皝帥諸軍入自蠮螉塞襲趙戍將當道者皆擒之直抵薊城趙幽州刺史石光擁兵數萬閉城不敢出燕兵進破武遂津入髙陽所至焚燒積聚略三萬餘家而去石光坐懦弱徵還趙王虎以秦公韜為太尉與太子宣迭日省可尚書奏事專决賞刑不復啓白司徒申鍾諌曰賞刑者人君之大柄不可以假人所以防微杜漸消逆亂於未然也太子職在視膳不當豫政庶人䆳以豫政致敗覆車未逺也且二政分權鮮不階禍愛之不以道適所以害之也虎不聽中謁者令申扁以慧悟辯給有寵於虎宣亦昵之使典機密虎既不省事而宣韜皆好酣飲畋獵由是除拜生殺皆决於扁自九卿已下率皆望塵而拜太子詹事孫珍病目求方於侍中崔約約戲之曰溺中則愈珍曰目何可溺約曰卿目睕睕正耐溺中珍恨之以白宣宣於兄弟中最胡狀目深聞之怒誅約父子於是公卿以下畏珍側目燕公斌督邊州亦好畋獵常懸管而入征北將軍張賀度每裁諌之斌怒辱賀度虎聞之使主書禮儀持節監之斌殺儀又欲殺賀度賀度嚴衞馳白之虎遣尚書張離帥騎追斌鞭之三百免官歸第誅其親信十餘人張駿遣别駕馬詵入貢于趙表辭蹇傲趙王虎怒欲斬詵侍中石璞諫曰今國家所當先除者遺晉也河西僻陋不足為意今斬馬詵必征張駿則兵力分而為二建康復延數年之命矣乃止璞苞之曾孫也初漢將李閎為晉所獲逃奔于趙漢主壽致書於趙王虎以請之署曰趙王石君虎不恱付外議之中書監王波曰今李閎以死自誓曰茍得歸骨於蜀當糾帥宗族混同王化若其信也則不煩一旅坐定梁益若有前却不過失一亡命之人於趙何損李壽既僭大號今以制詔與之彼必酬返不若復為書與之㑹挹婁國獻楛矢石砮於趙波因請以遺漢曰使其知我能服逺方也虎從之遣李閎歸厚為之禮閎至成都壽下詔曰羯使來庭貢其楛矢虎聞之怒黜王波以白衣領職七年春正月燕王皝使唐國内史陽裕等築城於柳城之北龍山之西立宗廟宫闕命曰龍城二月甲子朔日有食之劉翔至建康帝引見問慕容鎮軍平安對曰臣受遣之日朝服拜章翔為燕王皝求大將軍燕王章璽朝議以為故事大將軍不處邊自漢魏以來不封異姓為王所求不可許翔曰自劉石構亂長江以北翦為戎藪未聞中華公卿之胄有一人能攘臂揮戈摧破凶逆者也獨慕容鎮軍父子竭力心存本朝以寡擊衆屢殄彊敵使石虎畏懼悉徙邊陲之民散居三魏蹙國千里以薊城為北境功烈如此而惜海北之地不以為封邑何哉昔漢髙祖不愛王爵於韓彭故能成其帝業項羽玩印不忍授卒用危亡吾之至心非茍欲尊其所事竊惜聖朝踈忠義之國使四海無所勸慕耳尚書諸葛恢翔之姊夫也獨主異議以為夷狄相攻中國之利惟器與名不可輕許乃謂翔曰借使慕容鎮軍能除石虎乃是復得一石虎也朝廷何賴焉翔曰嫠婦猶知恤宗周之隕今晉室阽危君位侔元凱曽無憂國之心邪嚮使靡鬲之功不立則少康何以祀夏桓文之戰不捷則周人皆為左祍矣慕容鎮軍枕戈待旦志殄凶逆而君更唱邪惑之言忌閒忠臣四海所以未壹良由君輩耳翔留建康嵗餘衆議終不决翔乃說中常侍彧􅀪曰石虎苞八州之地帶甲百萬志吞江漢自索頭宇文暨諸小國無不臣服惟慕容鎮軍翼戴天子精貫白日而更不獲殊禮之命竊恐天下移心解體無復􅀯向者矣公孫淵無尺寸之益於吳吳主封為燕王加以九錫今慕容鎮軍屢摧賊鋒威振秦隴虎比遣重使甘言厚幣欲授以曜威大將軍遼西王慕容鎮軍惡其非正却而不受今朝廷乃矜惜虛名阻抑忠順豈社稷之長計乎後雖悔之恐無及巳􅀪為之入言於帝帝意亦欲許之㑹皝上表稱庾氏兄弟擅權召亂宜加斥退以安社稷又與庾冰書責其當國秉權不能為國雪恥冰甚懼以其絶逺非所能制乃與何充奏從其請乙卯以慕容皝為使持節大將軍都督河北諸軍事幽州牧大單于燕王備物典䇿皆從殊禮又以其世子儁為假節安北將軍東夷校尉左賢王賜軍資器械以千萬計又封諸功臣百餘人以劉翔為代郡太守封臨泉鄉侯加員外散騎常侍翔固辭不受翔疾江􅀯士大夫以驕奢酣縱相尚嘗因朝貴宴集謂何充等曰四海板蕩奄踰三紀宗社為墟黎民塗炭斯乃廟堂焦慮之時忠臣畢命之秋也而諸君宴安江沱肆情縱欲以奢靡為榮以傲誕為賢謇諤之言不聞征伐之功不立將何以尊主濟民乎充等甚慙詔遣兼大鴻臚郭悕持節詣棘城冊命燕王與翔等偕北公卿餞于江上翔謂諸公曰昔少康資一旅以滅有窮句踐慿㑹稽以報彊吳蔓草猶宜早除況寇讎乎今石虎李壽志相吞噬王師縱未能澄清北方且當從事巴蜀一旦石虎先人舉事併壽而有之據形便之地以臨東􅀯雖有智者不能善其後矣中護軍謝廣曰是吾心也三月戊戌皇后杜氏崩夏四月丁卯􅁙恭皇后于興平陵詔實王公以下至庶人皆正土斷白籍秋七月郭悕劉翔等至燕燕王皝以翔為東夷護軍領大將軍長史以唐國内史陽裕為左司馬典書令李洪為右司馬中尉鄭林為軍諮祭酒八月辛酉東海哀王沖薨九月代王什翼犍築盛樂城於故城􅀯八里代王妃慕容氏卒冬十月匈奴劉虎寇代西部代王什翼犍遣軍逆擊大破之虎卒子務桓立遣使求和於代什翼犍以女妻之務桓又朝貢於趙趙以務桓為平北將軍左賢王趙横海將軍王華帥舟師自海道襲燕安平破之燕王皝以慕容恪為渡遼將軍鎮平郭自慕容翰慕容仁之後諸將無能繼者及恪至平郭撫舊懷新屢破髙句麗兵髙句麗畏之不敢入境十二月興平康伯陸玩薨漢主壽以其太子勢領大將軍錄尚書事初成主雄以儉約寬惠得蜀人心及李閎王嘏還自鄴盛稱鄴中繁庶宫殿壯麗且言趙王虎以刑殺御下故能控制境内壽慕之徙旁郡民三丁以上者以實成都大脩宫室治器玩人有小過輙殺以立威左僕射蔡興右僕射李嶷皆坐直諌死民疲於賦役吁嗟滿道思亂者衆矣資治通鑑卷第九十六
