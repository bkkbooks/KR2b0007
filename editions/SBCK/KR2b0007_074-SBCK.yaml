front:
  text: 資治通鑑卷第七十四
  hash: sha256:7a853fb389a22dbb06b71211e6c79cec06c042e955b30e3b8ffbf26180a95a16
body:
  text: 臣司馬光奉勑編集魏紀六䝉赤奮若凡八年起著雍敦牂盡旃烈祖明皇帝下景初二年春正月帝召司馬懿於長安使將兵四萬討遼東議臣或以為四萬兵多役費難供帝曰四千里征伐雖云用竒亦當任力不當稍計役費也帝謂懿曰公孫淵將何計以待君對曰淵棄城豫走上計也據遼東拒大軍其次也坐守襄平此成禽耳帝曰然則三者何出對曰唯明智能審量彼我乃豫有所割棄此既非淵所及又謂今往孤逺不能支久必先拒遼水後守襄平也帝曰還往幾日對曰往百日攻百日還百日以六十日為休息如此一年足矣公孫淵聞之復遣使稱臣求救於吳吳人欲戮其使羊衜曰不可是肆匹夫之怒而捐霸王之計也不如因而厚之遣竒兵潛往以要其成若魏代不克而我軍逺赴是恩結遐夷義形萬里若兵連不解首尾離隔則我虜其傍郡驅略而歸亦足以致天之罰報雪曩事矣吳主曰善乃大勒兵謂淵使曰請俟後問當從簡書必與弟同休戚又曰司馬懿所向無前深為弟憂之帝問於䕶軍將軍蔣濟曰孫權其救遼東乎濟曰彼知官備已固利不可得深入則非力所及淺入則勞而無獲權雖子弟在危猶將不動况異域之人兼以往者之辱乎今所以外揚此聲者譎其行人疑之於我我之不克冀其折節事已耳然沓渚之間去淵尚逺若大軍相守事不速决則權之淺規或得輕兵掩襲未可測也帝問吏部尚書盧毓誰可為司徒者毓薦處士管寧帝不能用更問其次對曰敦篤至行則太中大夫韓暨亮直清方則司􅀠校尉崔林貞固純粹則太常常林二月癸卯以韓暨為司徒漢主立皇后張氏前后之妹也立王貴人子璿為皇太子瑶為安定王大司農河南孟光問太子讀書及情性好尚於祕書郎卻正正曰奉親䖍恭夙夜匪懈有古世子之風接待羣僚舉動出於仁恕光曰如君所道皆家户所有耳吾今所問欲知其權略智謀何如也正曰世子之道在於承志竭歡既不得妄有施為智調藏於胷懐權略應時而發此之有無焉可豫知也光知正慎宜不為放談乃曰吾好直言無所回避今天下未定智意為先智意自然不可力彊致也儲君讀書寧當傚吾等竭力博識以待訪問如博士探策講試以求爵位邪當務其急者正深謂光言為然正儉之孫也吳人鑄當千大錢夏四月庚子南鄉恭侯韓暨卒庚戌大赦六月司馬懿軍至遼東公孫淵使大將軍卑衍楊祚將歩騎數萬屯遼隧圍塹二十餘里諸將欲擊之懿曰賊所以堅壁欲老吾兵也今攻之正墯其計且賊大衆在此其巢窟空虚直指襄平破之必矣乃多張旗幟欲出其南衍等盡銳趣之懿潛濟水出其北直趣襄平衍等恐引兵夜走諸軍進至首山淵復使衍等逆戰懿擊大破之遂進圍襄平秋七月大霖雨遼水暴漲運船自遼口徑至城下雨月餘不止平地水數尺三軍恐欲移營懿令軍申敢有言徙者斬都督令史張静犯令斬之軍中乃定賊恃水樵牧自若諸將欲取之懿皆不聽司馬陳珪曰昔攻上庸八部並進晝夜不息故能一旬之半拔堅城斬孟達今者逺來而更安緩愚竊惑焉懿曰孟達衆少而食支一年將士四倍於達而糧不淹月以一月圖一年安可不速以四擊一正令失半而克猶當為之是以不計死傷與糧競也今賊衆我寡賊飢我飽水􅀨乃爾功力不設雖當促之亦何所為自發京師不憂賊攻但恐賊走今賊糧垂盡而圍落未合掠其牛馬抄其樵采此故驅之走也夫兵者詭道善因事變賊憑衆恃雨故雖飢困未肯束手當示無能以安之取小利以驚之非計也朝廷聞師遇雨咸欲罷兵帝曰司馬懿臨危制變禽淵可計日待也雨霽懿乃合圍作土山地道楯櫓鉤衝晝夜攻之矢石如雨淵窘急糧盡人相食死者甚多其將楊祚等降八月淵使相國王建御史大夫柳甫請解圍却兵當君臣面縛懿命斬之檄告淵曰楚鄭列國而鄭伯猶肉袒牽羊迎之孤天子上公而建等欲孤解圍退舍豈得禮邪二人老耄􅀓言失指已相為斬之若意有未已可更遣年少有明决者來淵復遣侍中衛演乞克日送任懿謂演曰軍事大要有五能戰當戰不能戰當守不能守當走餘二事惟有降與死耳汝不肯面􅅞此為决就死也不須送任壬午襄平潰淵與子脩將數百騎突圍東􅀯走大兵急擊之斬淵父子於梁水之上懿既入城誅其公卿以下及兵民七千餘人築為京觀遼東帶方樂浪􅀇菟四郡皆平淵之將反也將軍綸直賈範等苦諫淵皆殺之懿乃封直等之墓顯其遺嗣釋淵叔父恭之囚中國人欲還舊鄉者恣聽之遂班師初淵兄晃為恭任子在洛陽先淵未反數陳其變欲令國家討淵及淵謀逆帝不忍市斬欲就獄殺之廷尉髙柔上疏曰臣竊聞晃先數自歸陳淵禍萌雖為凶族原心可恕夫仲尼亮司馬牛之憂祁奚明叔向之過在昔之美義也臣以為晃信有言宜貸其死茍自無言便當市斬今進不赦其命退不彰其罪閉著囹圄使自引分四方觀國或疑此舉也帝不聽竟遣使齎金屑飲晃及其妻子賜以棺衣殯歛於宅九月吳改元赤烏呉歩夫人卒初呉主爲討虜將軍在呉娶吳郡徐氏太子登所生庶賤吳主令徐氏母養之徐氏妬故無寵及吳主西徙徐氏留處吳而臨淮步夫人寵冠後庭吳主欲立為皇后而羣臣議在徐氏吳主依違者十餘年㑹步氏卒羣臣奏追贈皇后印綬徐氏竟廢卒於吳吳主使中書郎吕壹典校諸官府及州郡文書壹因此漸作威福深文巧詆排陷無辜毁短大臣纎介必聞太子登數諫吳主不聽羣臣莫敢復言皆畏之側目壹誣白故江夏太守刁嘉謗訕國政吳主怒收嘉繫獄驗問時同坐人皆怖畏壹並言聞之侍中北海是儀獨云無聞遂見窮詰累日詔㫖轉厲羣臣為之屏息儀曰今刀鋸已在臣頸臣何敢為嘉隠諱自取夷滅為不忠之鬼顧以聞知當有本末據實答問辭不傾移吳主遂舍之嘉亦得免上大將軍陸遜太常潘濬憂壹亂國每言之輒流涕壹白丞相顧雍過失呉主怒詰責雍黄門侍郎謝厷語次問壹顧公事何如壹曰不能佳厷又問若此公免退誰當代之壹未答厷曰得無潘太常得之乎壹良乆曰君語近之也厷曰潘太常常切齒於君但道無因耳今日代顧公恐明日便擊君矣壹大懼遂解散雍事潘濬求朝詣建業欲盡辭極諫至聞太子登已數言之而不見從濬乃大請百寮欲因㑹手刃殺壹以身當之為國除患壹宻聞知稱疾不行西陵督步隲上疏曰顧雍陸遜潘濬志在竭誠寑食不寧念欲安國利民建乆長之計可謂心膂股肱社稷之臣矣宜各委任不使他官監其所司課其殿最此三臣思慮不到則已豈敢欺負所天乎左將軍朱據部曲應受三萬緡工王遂詐而受之壹疑據實取考問主者死於杖下據哀其無辜厚棺歛之壹又表據吏為據隠故厚其殯吳主數責問據據無以自明藉草待罪數日典軍吏劉助覺言王遂所取吳主大感寤曰朱據見枉况吏民乎乃窮治壹罪賞助百萬丞相雍至廷尉斷獄壹以囚見雍和顔色問其辭狀臨出又謂壹曰君意得無欲有所道乎壹叩頭無言時尚書郎懐叙面詈辱壹雍責敘曰官有正灋何至於此有司奏壹大辟或以為宜加焚裂用彰元惡吳主以訪中書令㑹稽闞澤澤曰盛明之世不宜復有此刑吳主從之壹既伏誅吳主使中書郎袁禮告謝諸大將因問時事所當損益禮還復有詔責諸葛瑾步隲朱然吕岱等曰袁禮還云與子瑜子山義封定公相見並咨以時事當有所先後各自以不掌民事不肯便有所陳悉推之伯言承明伯言承明見禮泣涕懇惻辭㫖辛苦至乃懐執危怖有不自安之心聞之悵然深自刻怪何者夫惟聖人能無過行明者能自見耳人之舉厝何能悉中獨當已有以傷拒衆意忽不自覺故諸君有嫌難耳不爾何縁乃至於此乎與諸君從事自少至長髪有二色以謂表裏足以明露公私分計足用相保義雖君臣恩猶骨肉榮福喜戚相與共之忠不匿情智無遺計事統是非諸君豈得從容而已哉同船濟水將誰與易齊桓有善管子未嘗不歎有過未嘗不諫諫而不得終諫不止今孤自省無桓公之德而諸君諫諍未出於口仍執嫌難以此言之孤於齊桓良優未知諸君於管子何如耳冬十一月壬午以司空衛臻為司徒司􅀠校尉崔林為司空十二月漢蔣琬出屯漢中乙丑帝不豫辛巳立郭夫人為皇后初太祖為魏公以贊令劉放參軍事孫資皆為祕書郎文帝即位更名祕書曰中書以放為監資為令遂掌機宻帝即位尤見寵任皆加侍中光禄大夫封本縣侯是時帝親覽萬機數興軍旅腹心之任皆二人管之每有大事朝臣㑹議常令决其是非擇而行之中䕶軍蔣濟上疏曰臣聞大臣太重者國危左右太親者身蔽古之至戒也往者大臣秉事外内扇動陛下卓然自覽萬機莫不祗肅夫大臣非不忠也然威權在下則衆心慢上埶之常也陛下既已察之於大臣願無忘之於左右左右忠正逺慮未必賢於大臣至於便辟取合或能工之今外所言輙云中書雖使恭慎不敢外交但有此名猶惑世俗况實握事要日在目前儻因疲倦之間有所割制衆臣見其能推移於事即亦因時而向之一有此端私招朋援臧否毁譽必有所興功負賞罰必有所易直道而上者或壅曲附左右者反達因微而入縁形而出意所狎信不復猜覺此宜聖智所當早聞外以經意則形際自見或恐朝臣畏言不合而受左右之怨莫適以聞臣竊亮陛下潛神黙思公聽並觀若事有未盡於理而物有未周於用將改曲易調逺與黃唐角功近昭武文之績豈牽近習而已哉然人君不可悉任天下之事必當有所付若委之一臣自非周公旦之忠管夷吾之公則有弄機敗官之敝當今柱石之士雖少至於行稱一州智效一官忠信竭命各奉其職可並驅䇿不使聖明之朝有專吏之名也帝不聽及寢疾深念後事乃以武帝子燕王宇為大將軍與領軍將軍夏侯獻武衛將軍曹爽屯騎校尉曹肈驍騎將軍秦朗等對輔政爽真之子肈休之子也帝少與燕王宇善故以後事屬之劉放孫資乆典機任獻肈心内不平殿中有鷄棲樹二人相謂曰此亦乆矣其能復幾放資懼有後害隂圖間之燕王性恭良陳誠固辭帝引放資入卧内問曰燕王正爾為對曰燕王實自知不堪大任故耳帝曰誰可任者時惟曹爽獨在帝側放資因薦爽且言宜召司馬懿與相參帝曰爽堪其事不爽流汗不能對放躡其足耳之曰臣以死奉社稷帝從放資言欲用爽懿既而中變敕停前命放資復入見說帝帝又從之放曰宜為手詔帝曰我困篤不能放即上牀執帝手強作之遂齎出大言曰有詔免燕王宇等官不得停省中皆流涕而出甲申以曹爽為大將軍帝嫌爽才弱復拜尚書孫禮為大將軍長史以佐之是時司馬懿在汲帝令給使辟邪齎手詔召之先是燕王為帝畫計以為闗中事重宜遣懿便道自軹闗西還長安事已施行懿斯須得二詔前後相違疑京師有變乃疾驅入朝三年春正月懿至入見帝執其手曰吾以後事屬君君與曹爽輔少子死乃可忍吾忍死待君得相見無所復恨矣乃召齊秦二王以示懿别指齊王芳謂懿曰此是也君諦視之勿誤也入教齊王令前抱懿頸懿頓首流涕是日立齊王為皇太子帝尋殂帝沈毅明敏任心而行料簡功能屏絶浮偽行師動衆論决大事謀臣將相咸服帝之大略性特彊識雖左右小臣官簿性行名跡所履及其父兄子弟一經耳目終不遺忘孫盛論曰聞之長老魏明帝天姿秀出立髪垂地口吃少言而沈毅好斷初諸公受遺輔導帝皆以方任處之政自已出優禮大臣開容善直雖犯顔極諫無所摧戮其君人之量如此其偉也然不思建德垂風不固維城之基至使大權偏據社稷無衛悲夫太子即位年八嵗大赦尊皇后曰皇太后加曹爽司馬懿侍中假節􅃏都督中外諸軍録尚書事諸所興作宫室之役皆以遺詔罷之爽懿各領兵三千人更宿殿内爽以懿年位素髙常父事之每事諮訪不敢専行初并州刺史東平畢軌及鄧颺李勝何晏丁謐皆有才名而急於富貴趨時附埶明帝惡其浮華皆抑而不用曹爽素與親善及輔政驟加引擢以為腹心晏進之孫謐斐之子也晏等咸共推戴爽以為重權不可委之於人丁謐為爽畫策使爽白天子發詔轉司馬懿為太傅外以名號尊之内欲令尚書奏事先來由己得制其輕重也爽從之二月丁丑以司馬懿為太傅以爽弟羲為中領軍訓為武衛將軍彦為散騎常侍侍講其餘諸弟皆以列侯侍從出入禁闥貴寵莫盛焉爽事太傅禮貌雖存而諸所興造希復由之爽徙吏部尚書盧毓為僕射而以何晏代之以鄧颺丁謐為尚書畢軌為司􅀠校尉晏等依埶用事附㑹者升進違忤者罷退内外望風莫敢忤㫖黃門侍郎􅀓嘏謂爽弟羲曰何平叔外静而内躁銛巧好利不念務本吾恐必先惑子兄弟仁人將逺而朝政廢矣晏等遂與嘏不平因微事免嘏官又出盧毓為廷尉畢􅁤復枉奏毓免官衆論多訟之乃復以為光禄勲孫禮亮直不撓爽心不便出為揚州刺史三月以征東將軍滿寵為太尉夏四月吳督軍使者羊衜擊遼東守將俘人民而去漢蔣琬為大司馬東曹掾犍為楊戲素性簡略琬與言論時不應答或謂琬曰公與戲言而不應其慢甚矣琬曰人心不同各如其面面從後言古人所誡戲欲賛吾是邪則非其本心欲反吾言則顯吾之非是以黙然是戲之快也又督農楊敏嘗毁琬曰作事憒憒誠不及前人或以白琬主者請推治敏琬曰吾實不如前人無可推也主者乞問其憒憒之狀琬曰茍其不如則事不理事不理則憒憒矣後敏坐事繫獄衆人猶懼其必死琬心無適莫敏得免重罪秋七月帝始親臨朝八月大赦冬十月吳太常潘濬卒吳主以鎮南將軍吕岱代濬與陸遜共領荆州文書岱時年已八十體素精勤躬親王事與遜同心協規有善相讓􅀯土稱之十二月吳將廖式殺臨賀太守嚴綱等自稱平􅀯將軍攻零陵桂陽揺動交州諸郡衆數萬人吕岱自表輙行星夜兼路吳主遣使追拜交州牧及遣諸將唐咨等絡繹相繼攻討一年破之斬式及其支黨郡縣悉平岱復還武昌吳都鄉侯周􅅌將兵千人屯公安有罪徙廬陵諸葛瑾步隲為之請吳主曰昔􅅌年少初無功勞橫受精兵爵以侯將蓋念公瑾以及於􅅌也而􅅌恃此酗滛自恣前後告諭曽無悛改孤於公瑾義猶二君樂􅅌成就豈有已哉迫􅅌罪惡未宜便還且欲苦之使自知耳以公瑾之子而二君在中間茍使能改亦何患乎瑜兄子偏將軍峻卒全琮請使峻子䕶領其兵吳主曰昔走曹操拓有荆州皆是公瑾常不忘之初聞峻亡仍欲用䕶聞䕶性行危險用之適為作禍故更止之孤念公瑾豈有已哉十二月詔復以建寅之月為正邵陵厲公上正始元年春旱越嶲蠻夷數叛漢殺太守是後太守不敢之郡寄治安定縣去郡八百餘里漢主以巴西張嶷爲越嶲太守嶷招慰新附誅討彊猾蠻夷畏服郡界悉平復還舊治冬吳饑二年春吳人將伐魏零陵太守殷札言於吳主曰今天棄曹氏喪誅累見虎爭之際而㓜童涖事陛下身自御戎取亂侮亡宜滌荆揚之地舉彊羸之數使彊者執㦸羸者轉運西命益州軍于隴右授諸葛瑾朱然大衆直指襄陽陸遜朱桓别征夀春大駕入淮陽歴青徐襄陽夀春困於受敵長安以西務禦蜀軍許洛之衆埶必分離掎角並進民必内應將帥對向或失便宜一軍敗績則三軍離心便當秣馬脂車陵蹈城邑乗勝逐北以定華夏若不悉軍動衆循前輕舉則不足大用易於屢退民疲威消時往力竭非上策也吳主不能用夏四月吳全琮略淮􅀯决芍陂諸葛恪攻六安朱然圍樊諸葛瑾攻柤中征東將軍王凌揚州刺史孫禮與全琮戰於芍陂琮敗走荆州刺史胡質以輕兵救樊或曰賊盛不可迫質曰樊城卑兵少故當進軍爲之外援不然危矣遂勒兵臨圍城中乃安五月吳太子登卒吳兵猶在荆州太傅懿曰柤中民夷十萬隔在水南流離無主樊城被攻歴月不解此危事也請自討之六月太傅懿督諸軍救樊吳軍聞之夜遁追至三州口大獲而還閏月吳大將軍諸葛瑾卒瑾長于恪先已封侯吳主以恪弟融襲爵攝兵業駐公安漢大司馬蔣琬以諸葛亮數出秦川道險運糧難卒無成功乃多作舟船欲乘漢沔東下襲魏興上庸㑹舊疾連動未時得行漢人咸以為事有不捷還路甚難非長策也漢主遣尚書令費禕中監軍姜維等喻指琬乃上言今魏跨帶九州根蔕滋蔓平除未易若東西并力首尾掎角雖未能速得如志且當分裂蠶食先摧其支黨然吳期二三連不克果輒與費禕等議以涼州胡塞之要進退有資且羗胡乃心思漢如渇冝以姜維為涼州刺史若維征行衘制河右臣當帥軍為維鎭繼今涪水陸四通惟急是應若東北有虞赴之不難請徙屯涪漢主從之朝廷欲廣田畜榖於楊豫之間使尚書郎汝􅀯鄧艾行陳項已東至夀春艾以為昔太祖破黃巾因為屯田積榖許都以制四方今三隅已定事在淮􅀯每大軍出征運兵過半功費巨億陳蔡之間上下田良可省許昌左右諸稻田并水東下令淮北屯二萬人淮南三萬人什二分休常有四萬人且田且守益開河渠以増溉灌通漕運計除衆費嵗完五百萬斛以為軍資六七年間可積三千萬斛於淮上此則十萬之衆五年食也以此乗吳無不克矣太傅懿善之是嵗始開廣漕渠每東􅀯有事大興軍衆汎舟而下達于江淮資食有儲而無水害管寧卒寧名行髙㓗人望之者邈然若不可及即之熈熈和易能因事導人於善人無不化服及卒天下知與不知聞之無不嗟嘆三年春正月漢姜維率偏軍自漢中還住涪吳主立其子和爲太子大赦三月昌邑景侯滿寵卒秋七月乙酉以領軍將軍蔣濟爲太尉吳主遣將軍聶友校尉陸凱將兵三萬擊儋耳珠崖八月吳主封子霸爲魯王霸和母弟也寵愛崇特與和無殊尚書僕射是儀領魯王􅀓上疏諫曰臣竊以魯王天挺懿德兼資文武當今之宜宜鎮四方爲國藩輔宣揚德美廣耀威靈乃國家之良規海内所瞻望且二宫宜有降殺以正上下之序明教化之本書三四上吳主不聽四年春正月帝加元服吳諸葛恪襲六安掩其人民而去夏四月立皇后甄氏大赦后文昭皇后兄儼之孫也五月朔日有食之既冬十月漢蔣琬自漢中還住涪疾益甚以漢中太守王平為前監軍鎮北大將軍督漢中十一月漢主以尚書令費禕為大將軍録尚書事吳丞相顧雍卒吳諸葛恪逺遣諜人觀相徑要欲圖夀春太傅懿將兵入舒欲以攻恪吳主徙恪屯於柴桑步隲朱然各上疏於吳主曰自蜀還者咸言蜀欲背盟與魏交通多作舟船繕治城郭又蔣琬守漢中聞司馬懿南向不出兵乗虚以掎角之反委漢中還近成都事已彰灼無所復疑宜為之備吳主答曰吾待蜀不薄聘享盟誓無所負之何以致此司馬懿前來入舒旬日便退蜀在萬里何知緩急而便出兵乎昔魏欲入漢川此閒始嚴亦未舉動㑹聞魏還而止蜀寧可復以此有疑邪人言苦不可信朕為諸君破家保之征東將軍都督揚豫諸軍事王昶上言地有常險守無常埶今屯宛去襄陽三百餘里有急不足相赴遂徙屯新野宗室曹冏上書曰古之王者必建同姓以明親親必樹異姓以明賢賢親親之道專用則其漸也微弱賢賢之道偏任則其敝也劫奪先聖知其然也故博求親疎而並用之故能保其社稷歴紀長久今魏尊尊之灋雖明親親之道未備或任而不重或釋而不任臣竊惟此寑不安席謹撰合所聞論其成敗曰昔夏商周歴世數十而秦二世而亡何則三代之君與天下共其民故天下同其憂秦王獨制其民故傾危而莫救也秦觀周之敝以為小弱見奪於是廢五等之爵立郡縣之官内無宗子以自毗輔外無諸侯以為藩衛譬猶芟刈股肱獨任胷腹觀者為之寒心而始皇晏然自以為子孫帝王萬世之業也豈不悖哉故漢祖奮三尺之劒驅烏集之衆五年之中遂成帝業何則伐深根者難為功摧枯朽者易為力理埶然也漢監秦之失封殖子弟及諸吕擅權圖危劉氏而天下所以不傾動者徒以諸侯彊大磐石膠固故也然髙祖封建地過古制故賈誼以為欲天下之治安莫若衆建諸侯而少其力文帝不從至於孝景猥用鼂錯之計削黜諸侯遂有七國之患蓋兆發髙帝釁鍾文景由寛之過制急之不漸故也所謂末大必折尾大難掉尾同於體猶或不從况乎非體之尾其可掉哉武帝從主父之策下推恩之令自是之後遂以陵夷子孫微弱衣食租稅不預政事至于哀平王氏秉權假周公之事而為田常之亂宗室諸侯或乃為之符命頌莽恩德豈不哀哉由斯言之非宗子獨忠孝於恵文之閒而叛逆於哀平之際也徒權輕埶弱不能有定耳賴光武皇帝挺不世之姿擒王莽於已成紹漢嗣於既絶斯豈非宗子之力也而曽不監秦之失策襲周之舊制至于桓靈閹宦用事君孤立於上臣弄權於下由是天下鼎沸姦宄並争宗廟焚為灰燼宫室變為榛藪太祖皇帝龍飛鳯翔掃除㐫逆大魏之興于今二十有四年矣觀五代之存亡而不用其長策覩前車之傾覆而不改於轍迹子弟王空虚之地君有不使之民宗室竄於閭閻不聞邦國之政權均匹夫埶齊凡庶内無深根不拔之固外無盤石宗盟之助非所以安社稷為萬世之業也且今之州牧郡守古之方伯諸侯皆跨有千里之土兼軍武之任或比國數人或兄弟並據而宗室子弟曽無一人閒厠其閒與相維制非所以彊幹弱枝備萬一之虞也今之用賢或超為名都之主或為偏師之帥而宗室有文者必限小縣之宰有武者必致百人之上非所以勸進賢能襃異宗室之禮也語曰百足之蟲至死不僵以其扶之者衆也此言雖小可以譬大是以聖王安不忘危存不忘亡故天下有變而無傾危之患矣冏冀以此論感寤曹爽爽不能用五年春正月吳主以上大將軍陸遜為丞相其州牧都䕶領武昌事如故征西將軍都督雍凉諸軍事夏侯􅀇大將軍爽之姑子也􅀇辟李勝為長史勝及尚書鄧颺欲令爽立威名於天下勸使伐蜀太傅懿止之不能得三月爽西至長安發卒十餘萬人與􅀇自駱口入漢中漢中守兵不滿三萬諸將皆恐欲守城不出以待涪兵王平曰漢中去涪垂千里賊若得闗便為深禍今宜先遣劉䕶軍據興埶平為後拒若賊分向黃金平率千人下自臨之比爾閒涪軍亦至此計之上也諸將皆疑唯䕶軍劉敏與平意同遂帥所領據興埶多張旗幟彌亘百餘里閏月漢主遣大將軍費禕督諸軍救漢中將行光禄大夫來敏詣禕别求共圍棊于時羽檄交至人馬擐甲嚴駕已訖禕與敏對戲色無厭倦敏曰向聊觀試君耳君信可人必能辨賊者也夏四月丙辰朔日有食之大將軍爽兵距興埶不得進闗中及氐羗轉輸不能供牛馬騾驢多死民夷號泣道路涪軍及費禕兵繼至參軍楊偉為爽陳形埶宜急還不然將敗鄧颺李勝與偉爭於爽前偉曰颺勝將敗國家事可斬也爽不恱太傅懿與夏侯􅀇書曰春秋責大德重昔武皇帝再入漢中幾至大敗君所知也今興埶至險蜀已先據若進不獲戰退見邀絶覆軍必矣將何以任其責􅀇懼言於爽五月引軍還費禕進據三嶺以截爽爽爭險苦戰僅乃得過失亡甚衆闗中爲之虚耗秋八月秦王詢卒冬十二月安陽孝侯崔林卒是嵗漢大司馬琬以病固讓州職於大將軍禕漢主乃以禕爲益州刺史以侍中董允守尚書令爲禕之副時戰國多事公務煩猥禕爲尚書令識悟過人每省讀文書舉目暫視已究其意㫖其速數倍於人終亦不忘常以朝晡聽事其閒接納賔客飲食嬉戲加之博弈毎盡人之歡事亦不廢及董允代禕欲斆禕之所行旬日之中事多愆滯允乃歎曰人才力相逺若此非吾之所及也乃聽事終日而猶有不暇焉六年春正月以票騎將軍趙儼為司空吳太子和與魯王同宫禮秩如一羣臣多以為言吳主乃命分宫别僚二子由是有隙衛將軍全琮遣其子寄事魯王以書告丞相陸遜遜報曰子弟茍有才不憂不用不宜私出以要榮利若其不佳終為取禍且聞二宫勢敵必有彼此此古人之厚忌也寄果阿附魯王輕為交􅌟遜書與琮曰卿不師日磾而宿留阿寄終為足下門户致禍矣琮旣不納遜言更以致隙魯王曲意交結當時名士偏將軍朱績以膽力稱主自至其廨就之坐欲與結好績下地住立辭而不當績然之子也於是自侍御賔客造為二端􅄷黨疑貳滋延大臣舉國中分吳主聞之假以精學禁斷賔客往來督軍使者羊衜上疏曰聞明詔省奪二宫備衛抑絶賔客使四方禮敬不復得通逺近悚然大小失望或謂二宫不遵典式就如所嫌猶宜􅀘察密加斟酌不使逺近得容異言臣懼積疑成謗乆將宣流而西北二隅去國不逺將謂二宫有不順之愆不審陛下何以解之吳主長女魯班適左護軍全琮少女小虎適驃騎將軍朱據全公主與太子母王夫人有隙吳主欲立王夫人為后公主阻之恐太子立怨已心不自安數譖毁太子吳主寢疾遣太子禱於長沙桓王廟太子妃叔父張休居近廟邀太子過所居全公主使人覘視因言太子不在廟中專就妃家計議又言王夫人見上寢疾有喜色吳主由是發怒夫人以憂死太子寵益衰魯王之黨楊笁全寄吳安孫竒等共譖毁太子吳主惑焉陸遜上疏諫曰太子正統宜有盤石之固魯王藩臣當使寵秩有差彼此得所上下獲安書三四上辭情危切又欲詣都口陳嫡庶之義吳主不恱太常顧譚遜之甥也亦上疏曰臣聞有國有家者必明嫡庶之端異尊卑之禮使髙下有差等級踰邈如此則骨肉之恩全覬覦之望絶昔賈誼陳治安之計論諸侯之埶以為埶重雖親必有逆節之累埶輕雖疏必有保全之祚故淮南親弟不終饗國失之於勢重也吳芮疏臣􅀓祚長沙得之於勢輕也昔漢文帝使慎夫人與皇后同席袁盎退夫人之位帝有怒色及盎辨上下之義陳人彘之戒帝既恱懌夫人亦悟今臣所陳非有所偏誠欲以安太子而便魯王也由是魯王與譚有隙芍陂之役譚弟承及張休皆有功全琮子端緒與之爭功譖承休於吳主吳主徙譚承休於交州又追賜休死太子太傅吾粲請使魯王出鎮夏口出楊笁等不得令在京師又數以消息語陸遜魯王與楊笁共譖之吳主怒收粲下獄誅數遣中使責問陸遜遜憤恚而卒其子抗為建武校尉代領遜衆送葬東還吳主以楊笁所白遜二十事問抗抗事事條答吳主意乃稍解夏六月都鄉穆侯趙儼卒秋七月吳將軍馬茂謀殺吳主及大臣以應魏事泄并黨與皆族誅八月以太常髙柔為司空漢甘太后殂吳主遣校尉陳勲將屯田及作士三萬人鑿句容中道自小其至雲陽西城通㑹市作邸閣冬十一月漢大司馬琬卒十二月漢費禕至漢中行圍守漢尚書令董允卒以尚書吕乂為尚書令董允秉心公亮獻可替否備盡忠益漢主甚嚴憚之宦人黃皓便僻佞慧漢主愛之允上則正色規主下則數責於皓皓畏允不敢為非終允之世皓位不過黃門丞費禕以選曹郎汝􅀯陳祗代允為侍中祗矜厲有威容多技藝挾智數故禕以為賢越次而用之祗與皓相表裏皓始預政累遷至中常侍操弄威柄終以覆國自陳祗有寵而漢主追怨董允日深謂為自輕由祗阿意迎合而皓浸潤構閒故也資治通鑑卷第七十四
