front:
  text: 資治通鑑卷第三十
  hash: sha256:b825602caacf54172f32dd2e93446f7736b74ff35fd71743cb6e161b09778d93
body:
  text: 臣司馬光奉勑編集漢紀二十二著雍閹茂凡十年起屠維赤奮若盡孝成皇帝上之上建始元年春正月乙丑悼考廟災石顯遷長信中太僕秩中二千石顯旣失倚離權於是丞相御史條奏顯舊惡及其黨牢梁陳順皆免官顯與妻子徙歸故郡憂懣不食道死諸所交結以顯為官者皆廢罷少府五鹿充宗左遷玄菟太守御史中丞伊嘉為鴈門都尉司􅀠校尉涿郡王尊劾奏丞相衡御史大夫譚知顯等顓權擅執大作威福為海内患害不以時白奏行罰而阿䛕曲從附下罔上懷邪迷國無大臣輔政之義皆不道在赦令前赦後衡譚舉奏顯不自陳不忠之罪而反揚著先帝任用傾覆之徒妄言百官畏之甚於主上卑君尊臣非所宜稱失大臣體於是衡慙懼免冠謝罪上丞相矦印綬天子以新即位重傷大臣乃左遷尊為髙陵令然羣下多是尊者衡嘿嘿不自安每有水旱連乞骸骨讓位上輙以詔書慰撫不許立故河間王元弟上郡庫令良為河間王有星孛于營室赦天下壬子封舅諸吏光禄大夫關内矦王崇為安成矦賜舅譚商立根逢時爵􅀜内矦夏四月黃霧四塞詔博問公卿大夫無有所諱諌大夫楊興博士駟勝等對皆以為隂盛侵陽之氣也髙祖之約非功臣不侯今太后諸弟皆以無功為侯外戚未曽有也故天為見異於是大将軍鳳懼上書乞骸骨辭職上優詔不許御史中丞東海薛宣上䟽曰陛下至徳仁厚而嘉氣尚凝隂陽不和殆吏多苛政部刺史或不循守條職舉錯各以其意多與郡縣事至開私門聽讒佞以求吏民過譴呵及細㣲責義不量力郡縣相迫促亦内相刻流至衆庶是故鄉黨闕於嘉賔之懽九族忘其親親之恩飲食周急之厚彌衰送往勞來之禮不行夫人道不通則隂陽否隔和氣不興未必不由此也詩云民之失徳乾餱以愆鄙語曰苛政不親煩苦傷恩方刺史奏事時宜明申敕使昭然知本朝之要務上嘉納之八月有兩月相承晨見東方冬十二月作長安南北郊罷甘泉汾陰祠及紫壇僞飾女樂鸞路騂駒龍馬石壇之屬二年春正月罷雍五畤及陳寳祠皆從匡衡之請也辛巳上始郊祀長安南郊赦奉郊縣及中都官耐罪徒減天下賦錢筭四十閏月以渭城延陵亭部爲初陵三月辛丑上始祠后土于北郊丙午立皇后許氏后車騎將軍嘉之女也元帝傷母恭哀后居位日淺而遭霍氏之辜故選嘉女以配太子上自爲太子時以好色聞及即位皇太后詔采良家女以僃後宮大將軍武軍令杜欽説王鳳曰禮一娶九女所以廣嗣重祖也娣姪雖缺不復補所以養夀塞争也故后妃有貞淑之行則􅅌嗣有賢聖之君制度有威儀之節則人君有夀考之福廢而不由則女徳不厭女徳不厭則夀命不究於髙年男子五十好色未衰婦人四十容貌改前以改前之容侍於未衰之年而不以禮為制則其原不可救而後徠異態後徠異態則正后自疑而支庶有閒適之心是以晉獻被納讒之謗申生䝉無罪之辜今聖主富於春秋未有適嗣方鄉術入學未親后妃之議將軍輔政宜因始初之隆建九女之制詳擇有行義之家求淑女之質毋必有聲色抜能為萬世大灋夫少戒之在色小卞之作可為寒心唯將軍常以為憂鳳白之太后太后以為故事無有鳳不能自立灋度循故事而巳鳳素重欽故置之莫府國家政謀常與欽慮之數稱逹名士裨正闕失當世善政多出於欽者夏大旱匈奴呼韓邪單于嬖左伊秩訾兄女二人長女顓渠閼氏生二子長曰且莫車次曰囊知牙斯少女為大閼氏生四子長曰雕陶莫臯次曰且麋胥皆長於且莫車少子咸樂二人皆小於囊知牙斯又它閼氏子十餘人顓渠閼氏貴且莫車愛呼韓邪病且死欲立且莫車顓渠閼氏曰匈奴亂十餘年不絶如髮賴䝉漢力故得復安今平定未乆人民創艾戰鬬且莫車年少百姓未附恐復危國我與大閼氏一家共子不如立雕陶莫臯大閼氏曰且莫車雖少大臣共持國事今舎貴立賤後世必亂單于卒從顓渠閼氏計立雕陶莫臯約令􅀓國與弟呼韓邪死雕陶莫臯立為復株累若鞮單于復株累若鞮單于以且麋胥為左賢王且莫車為左谷蠡王囊知牙斯為右賢王復株累單于復妻王昭君生二女長女云為湏卜居次小女為當于居次三年春三月赦天下徒秋􅀜内大雨四十餘日京師民相驚言大水至百姓犇走相蹂躪老弱號呼長安中大亂天子親御前殿召公卿議大將軍鳳以為太后與上及後宫可御船令吏民上長安城以避水羣臣皆從鳳議左將軍王啇獨曰自古無道之國水猶不冒城郭今政治和平世無兵革上下相安何因當有大水一日暴至此必訛言也不宜令上城重驚百姓上乃止有頃長安中稍定問之果訛言上於是美壯商之固守數稱其議而鳳大慙自恨失言上欲専委任王鳳八月䇿免車騎將軍許嘉以特進矦就朝位張譚坐選舉不實免冬十月光禄大夫尹忠為御史大夫十二月戊申朔日有食之其夜地震未央宫殿中詔舉賢良方正能直言極諫之士杜欽及太常丞谷永上對皆以爲後宫女寵太盛嫉妬専上將害繼嗣之咎越巂山崩丁丑匡衡坐多取封邑四百頃監臨盜所主守直十金以上免為庶人四年春正月癸卯隕石于毫四隕于肥累二罷中書宦官初置尚書員五人三月甲申以左將軍樂昌矦王商為丞相夏上悉召前所舉直言之士詣白虎殿對䇿是時上委政王鳳議者多歸咎焉谷永知鳳方見柄用隂欲自託乃曰方今四夷賔服皆為臣妾北無薫粥冒頓之患南無趙佗呂嘉之難三垂晏然靡有兵革之警諸矦大者乃食數縣漢吏制其權柄不得有為無吴楚燕梁之埶百官盤互親疏相錯骨肉大臣有申伯之忠洞洞屬屬小心畏忌無重合安陽博陸之亂三者無毛髮之辜竊恐陛下舎昭昭之白過忽天地之明戒聽晻昧之瞽説歸咎乎無辜倚異乎政事重失天心不可之大者也陛下誠深察愚臣之言抗湛溺之意解偏駮之愛奮乾剛之威平天覆之施使列妾得人人更進益納宜子婦人毋擇好醜毋避甞字毋論年齒推灋言之陛下得繼嗣於微賤之閒乃反為福得繼嗣而巳毋非有賤也後宫女史使令有直意者廣求於㣲賤之閒以遇天所開右慰釋皇太后之憂愠解謝上帝之譴怒則繼嗣蕃滋災異訖息杜欽亦倣此意上皆以其書示後宫擢永為光禄大夫夏四月雨雪秋桃李實大雨水十餘日河決東郡金隄先是清河都尉馮逡奏言郡承河下流土壤輕脆易傷頃所以闊無大害者以屯氏河通兩川分流也今屯氏河塞靈鳴犢口又益不利獨一川兼受數河之任雖髙増隄防終不能泄如有霖雨旬日不霽必盈溢九河故迹今旣滅難明屯氏河新絶未乆其處易浚又其口所居髙於以分殺水力道里便宜可復浚以助大河泄暴水僃非常不豫修治北決病四五郡南決病十餘郡然後憂之晚矣事下丞相御史白遣博士許商行視以爲方用度不足可且勿浚後三嵗河果決於館陶及東郡金隄泛濫兖豫入平原千乗濟南凡灌四郡三十二縣水居地十五萬餘頃深者三丈壞敗官亭室廬且四萬所冬十一月御史大夫尹忠以對方略䟽闊上切責其不憂職自殺遣大司農非調調均錢穀河決所灌之郡謁者二人發河南以東船五百㮴徙民避水居丘陵九萬七千餘口壬戌以少府張忠為御史大夫南山羣盗傰宗等數百人為吏民害詔發兵千人逐捕嵗餘不能禽或説大將軍鳳以賊數百人在轂下討不能得難以示四夷獨選賢京兆尹乃可於是鳳薦故髙陵令王尊徵為諌大夫守京輔都尉行京兆尹事旬月閒盜賊清後拜為京兆尹上即位之初丞相匡衡復奏射聲校尉陳湯以吏二千石奉使顓命蠻夷中不正身以先下而盗所收康居財物戒官屬曰絶域事不覆校雖在赦前不宜處位湯坐免後湯上言康居王侍子非王子按驗實王子也湯下獄當死太中大夫谷永上䟽訟湯曰臣聞楚有子玉得臣文公為之仄席而坐趙有亷頗馬服彊秦不敢窺兵井陘近漢有郅都魏尚匈奴不敢南鄉沙幕由是言之戰克之將國之爪牙不可不重也蓋君子聞鼓鼙之聲則思將帥之臣竊見􅀜内侯陳湯前斬郅支威震百蠻武暢西海漢元以來征伐方外之將未甞有也今湯坐言事非是幽囚久繫歴時不決執憲之吏欲致之大辟昔白起為秦將南拔郢都北阬趙括以纎介之過賜死杜郵秦民憐之莫不隕涕今湯親秉鉞席卷喋血萬里之外薦功祖廟告類上帝介胄之士靡不慕義以言事為罪無赫赫之惡周書曰記人之功忘人之過宜為君者也夫犬馬有勞於人尚加帷蓋之報況國之功臣者哉竊恐陛下忽於鼙鼔之聲不察周書之意而忘帷蓋之施庸臣遇湯卒從吏議使百姓介然有秦民之恨非所以厲死難之臣也書奏天子出湯奪爵為士伍㑹西域都護段㑹宗為烏孫兵所圍驛騎上書願發城郭燉煌兵以自救丞相商大將軍鳳及百寮議數日不決鳳言陳湯多籌䇿習外國事可問上召湯見宣室湯擊郅支時中寒病兩臂不屈申湯入見有詔毋拜示以㑹宗奏湯對曰臣以為此必無可憂也上曰何以言之湯曰夫胡兵五而當漢兵一何者兵刃朴鈍弓弩不利今聞頗得漢巧然猶三而當一又兵灋曰客倍而主人半然後敵今圍㑹宗者人衆不足以勝㑹宗唯陛下勿憂且兵輕行五十里重行三十里今㑹宗欲發城郭燉煌歴時乃至所謂報讎之兵非救急之用也上曰柰何其解可必乎度何時解湯知烏孫瓦合不能乆攻故事不過數日因對曰巳解矣屈指計其日曰不出五日當有吉語聞居四日軍書到言已解大將軍鳳奏以為從事中郎莫府事壹決於湯河平元年春杜欽薦犍為王延世於王鳳使塞決河鳳以延世為河隄使者延世以竹落長四丈大九圍盛以小石兩船夾載而下之三十六日河隄成三月詔以延世為光禄大夫秩中二千石賜爵關内矦黄金百斤夏四月己亥晦日有食之詔公卿百僚陳過失無有所諱大赦天下光禄大夫劉向對曰四月交於五月月同孝恵日同孝昭其占恐害繼嗣是時許皇后專寵後宫希得進見中外皆憂上無繼嗣故杜欽谷永及向所對皆及之上於是減省椒房掖廷用度服御輿駕所發諸官署及所造作遺賜外家羣臣妾皆如竟寧以前故事皇后上䟽自陳以為時世異制長短相補不出漢制而已纎微之閒未必可同若竟寧前與黄龍前豈相放哉家吏不曉今壹受詔如此且使妾揺手不得設妾欲作某屏風張於某所曰故事無有或不能得則必繩妾以詔書矣此誠不可行唯陛下省察故事以特牛祠大父母戴矦敬矦皆得䝉恩以太牢祠今當率如故事唯陛下哀之今吏甫受詔讀記直豫言使后知之非可復若私府有所取也其萌牙所以約制妾者恐失人理唯陛下深察焉上於是采谷永劉向所言災異咎驗皆在後宫之意以報之且曰吏拘於灋亦安足過蓋矯枉者過直古今同之且財幣之省特牛之祠其於皇后所以扶助徳美為華寵也咎根不除災變相襲祖宗且不血食何戴矦也􅀓不云乎以約失之者鮮審皇后欲從其奢與朕亦當灋孝武皇帝也如此則甘泉建章可復興矣孝文皇帝朕之師也皇太后皇后成灋也假使太后在彼時不如職今見親厚又惡可以踰乎皇后其刻心秉德謙約爲右垂則列妾使有灋焉給事中平陵平當上言太上皇漢之始祖廢其寑廟園非是上亦以無繼嗣遂納當言秋九月復太上皇寑廟園詔曰今大辟之刑千有餘條律令煩多百有餘萬言竒請它比日以益滋自明習者不知所由欲以曉喻衆庶不亦難乎於以羅元元之民夭絶亡辜豈不哀哉其議減死刑及可蠲除約省者令較然易知條奏時有司不能廣宣上意徒鉤摭微細毛舉數事以塞詔而已匈奴單于遣右皐林王伊邪莫演等奉獻朝正月二年春伊邪莫演罷歸自言欲降即不受我我自殺終不敢還歸使者以聞下公卿議議者或言宜如故事受其降光禄大夫谷永議郎杜欽以為漢興匈奴數為邊害故設金爵之賞以待降者今單于屈體稱臣列為北藩遣使朝賀無有二心漢家接之宜異於往時今旣享單于聘貢之質而更受其逋逃之臣是貪一夫之得而失一國之心擁有罪之臣而絶慕義之君也假令單于初立欲委身中國未知利害私使伊邪莫演詐降以卜吉凶受之虧徳沮善令單于自䟽不親邊吏或者設為反閒欲因以生隙受之適合其䇿使得歸曲而責直此誠邊境安危之原師旅動静之首不可不詳也不如勿受以昭日月之信抑詐諼之謀懷附親之心便對奏天子從之遣中郎將王舜往問降狀伊邪莫演曰我病狂妄言耳遣去歸到官位如故不肯令見漢使夏四月楚國雨雹大如釜徙山陽王康為定陶王六月上悉封諸舅王譚為平阿矦商為成都侯立為紅陽侯根為曲陽侯逢時為髙平侯五人同日封故世謂之五侯太后母李氏更嫁為河内茍賔妻生子參太后欲以田蚡為比而封之上曰封田氏非正也以參為侍中水衡都尉御史大夫張忠奏京兆尹王尊暴虐倨慢尊坐免官吏民多稱惜之湖三老公乗興等上書訟尊治京兆撥劇整亂誅暴禁邪皆前所稀有名將所不及雖拜為真未有殊絶襃賞加於尊身今御史大夫奏尊傷害隂陽為國家憂無承用詔書意靖言庸違象龔滔天源其所以出御史丞楊輔素與尊有私怨外依公事建畫為此議傅致奏文浸潤加誣臣等竊痛傷尊修身潔己砥節首公刺譏不憚將相誅惡不避豪彊誅不制之賊解國家之憂功著職修威信不廢誠國家爪牙之吏折衝之臣今一旦無辜制於仇人之手傷於詆欺之文上不得以功除罪下不得䝉棘木之聽獨掩怨讎之偏奏被共工之大惡無所陳寃愬罪尊以京師廢亂羣盜並興選賢徵用起家為卿賊亂既除豪猾伏辜即以佞巧廢黜一尊之身三期之閒乍賢乍佞豈不甚哉孔子曰愛之欲其生惡之欲其死是惑也浸潤之譖不行焉可謂明矣願下公卿大夫博士議郎定尊素行夫人臣而傷害隂陽死誅之罪也靖言庸違放殛之刑也審如御史章尊乃當伏觀闕之誅放於無人之域不得茍免及任舉尊者當獲選舉之辜不可但巳即不如章飾文深詆以愬無罪亦宜有誅以懲讒賊之口絶詐欺之路唯明主參詳使白黑分别書奏天子復以尊為徐州刺史夜郎王興鉤町王禹漏卧矦俞更舉兵相攻䍧柯太守請發兵誅興等議者以為道逺不可擊乃遣太中大夫蜀郡張匡持節和解興等不從命刻木象漢吏立道旁射之杜欽説大將軍王鳳曰蠻夷王矦輕易漢使不憚國威恐議者選耎復守和解太守察動静有變乃以聞如此則復曠一時王矦得收獵其衆申固其謀黨助衆多各不勝忿必相殄滅自知罪成狂犯守尉逺臧温暑毒草之地雖有孫吴將賁育士若入水火往必焦没智勇亡所施屯田守之費不可勝量宜因其罪惡未成未疑漢家加誅隂敕旁郡守尉練士馬大司農豫調穀積要害處選任職太守往以秋涼時入誅其王侯尤不軌者即以爲不毛之地無用之民聖王不以勞中國宜罷郡放棄其民絶其王侯勿復通如以先帝所立累世之功不可墮壊亦宜因其萌牙早斷絶之及巳成形然後戰師則萬姓被害大將軍鳳於是薦金城司馬臨卭陳立爲䍧柯太守立至䍧柯諭告夜郎王興興不從命立請誅之未報乃從吏數十人出行縣至興國且同亭召興興將數千人住至亭從邑君數十人入見立立數責因斷頭邑君曰将軍誅無狀為民除害願出曉士衆以興頭示之皆釋兵降鉤町王禹漏卧侯俞震恐入粟千斛牛羊勞吏士立還歸郡興妻父翁指與子邪務收餘兵廹脅旁二十二邑反至冬立奏募諸夷與都尉長史分將攻翁指等翁指據阸為壘立使竒兵絶其饟道縱反閒以誘其衆都尉萬年曰兵乆不決費不可共引兵獨進敗走趨立營立怒叱戲下令格之都尉復還戰立救之時天大旱立攻絶其水道蠻夷共斬翁指持首岀降西夷遂平三年春正月楚王囂來朝二月乙亥詔以囂素行純茂特加顯異封其子勲為廣戚侯丙戌犍為地震山崩壅江水水逆流秋八月乙卯晦日有食之上以中袐書頗散亡使謁者陳農求遺書於天下詔光禄大夫劉向校經傳諸子詩賦歩兵校尉任宏校兵書太史令尹咸校數術侍醫李柱國校方技毎一書巳向輒條其篇目撮其指意録而奏之劉向以王氏權位太盛而上方嚮詩書古文向乃因尚書洪範集合上古以來歴春秋六國至秦漢符瑞災異之記推迹行事連傅禍福著其占驗比類相從各有條目凡十一篇號曰洪範五行傳論奏之天子心知向忠精故爲鳳兄弟起此論也然終不能奪王氏權河復決平原流入濟南千乗所壊敗者半建始時復遣王延世與丞相史楊焉及將作大匠許商諫大夫乗馬延年同作治六月乃成復賜延世黄金百斤治河卒非受平賈者爲著外繇六月四年春正月匈奴單于來朝赦天下徒三月癸丑朔日有食之琅邪太守楊肜與王鳳連昬其郡有災害丞相王商按問之鳳以爲請商不聽竟奏免肜奏果寑不下鳳以是怨商隂求其短使頻陽耿定上書言商與父􅀓婢通及女弟淫亂奴殺其私夫疑商教使天子以爲暗昧之過不足以傷大臣鳳固爭下其事司􅀠太中大夫蜀郡張匡素佞巧復上書極言詆毀商有司奏請召商詣詔獄上素重商知匡言多險制曰勿治鳳固争之夏四月壬寅詔收商丞相印綬商免相三日發病歐血薨諡曰戾侯而商子弟親屬爲駙馬都尉侍中中常侍諸曹大夫郎吏者皆出補吏莫得留給事宿衞者有司奏請除國邑有詔長子安嗣爵爲樂昌侯上之爲太子也受論語於蓮勺張禹及即位賜爵関内侯拜爲諸吏光禄大夫秩中二千石給事中領尚書事禹與王鳳並領尚書内不自安數病上書乞骸骨欲退避鳳上不許撫待愈厚六月丙戌以禹爲丞相封安昌侯庚戌楚孝王囂薨初武帝通西域罽賔自以絶逺漢兵不能至獨不服數剽殺漢使乆之漢使者文忠與容屈王子隂末赴合謀攻殺其王立隂末赴爲罽賔王後軍侯趙德使罽賔與隂末赴相失隂末赴鎻琅當德殺副已下七十餘人遣使者上書謝孝元帝以絶域不録放其使者於縣度絶而不通及帝即位復遣使獻謝罪漢欲遣使者報送其使杜欽説王鳳曰前罽賔王隂末赴本漢所立後卒畔逆夫德莫大於有國子民罪莫大於執殺使者所以不報恩不懼誅者自知絶逺兵不至也有求則卑辭無欲則驕嫚終不可懷服凡中國所以為通厚蠻夷㥦快其求者為壤比而為寇今縣度之阸非罽賔所能越也其鄉慕不足以安西域雖不附不能危城郭前親逆節惡暴西域故絶而不通今悔過來而無親屬貴人奉獻者皆行賈賤人欲通貨市買以獻為名故煩使者送至縣度恐失實見欺凡遣使送客者欲為防護寇害也起皮山南更不屬漢之國四五斥􅀱士百餘人五分夜擊刁斗自守尚時為所侵盜驢畜負糧須諸國稟食得以自贍國或貧小不能食或桀黠不肯給擁彊漢之節餒山谷之間乞匄無所得離一二旬則人畜棄捐曠野而不反又歴大頭痛小頭痛之山赤土身熱之阪令人身熱無色頭痛嘔吐驢畜盡然又有三池盤石阪道陿者尺六七寸長者徑三十里臨峥嶸不測之深行者騎歩相持繩索相引二千餘里乃到縣度畜墜未半阬谷盡靡碎人墮勢不得相􅀵視險阻危害不可勝言聖王分九州制五服務盛内不求外今遣使者承至尊之命送蠻夷之賈勞吏士之衆渉危難之路罷敝所恃以事無用非乆長計也使者業巳受節可至皮山而還於是鳳白從欽言罽賔實利賞賜賈市其使數年而壹至云陽朔元年春二月丁未晦日有食之三月赦天下徒冬京兆尹泰山王章下獄死時大將軍鳳用事上謙讓無所顓左右甞薦光禄大夫劉向少子歆通逹有異材上召見歆誦讀詩賦甚悦之欲以為中常侍召取衣冠臨當拜左右皆曰未曉大將軍上曰此小事何須􅀜大將軍左右叩頭争之上於是語鳳鳳以為不可乃止王氏子弟皆卿大夫侍中諸曹分據埶官滿朝廷杜欽見鳳專政泰重戒之曰願將軍由周公之謙懼損穰矦之威放武安之欲毋使范雎之徒得間其説鳳不聽時上無繼嗣體常不平定陶共王來朝太后與上承先帝意遇共王甚厚賞賜十倍於它王不以往事為纎介留之京師不遣歸國上謂共王我未有子人命不諱一朝有它且不復相見爾長留侍我矣其後天子疾益有瘳共王因留國邸旦夕侍上上甚親重之大將軍鳳心不便共王在京師㑹日食鳳因言日食隂盛之象定陶王雖親於禮當奉藩在國今留侍京師詭正非常故天見戒宜遣王之國上不得已於鳳而許之共王辭去上與相封涕泣而決王章素剛直敢言雖為鳳所舉非鳳專權不親附鳳乃奏封事言日食之咎皆鳳専權蔽主之過上召見章延問以事章對曰天道聦明佑善而災惡以瑞異爲符效今陛下以未有繼嗣引近定陶王所以承宗廟重社稷上順天心下安百姓此正議善事當有祥瑞何故致災異災異之發爲大臣顓政者也今聞大將軍猥歸日食之咎於定陶王建遣之國苟欲使天子孤立於上顓擅朝事以便其私非忠臣也且日食隂侵陽臣顓君之咎今政事大小皆自鳳出天子曽不壹舉手鳳不内省責反歸咎善人推逺定陶王且鳳誣罔不忠非一事也前丞相樂昌矦商本以先帝外屬内行篤有威重位歴將相國家柱石臣也其人守正不肯屈節隨鳳委曲卒用閨門之事為鳳所罷身以憂死衆庶愍之又鳳知其小婦弟張美人巳甞適人於禮不宜配御至尊託以為宜子内之後宫茍以私其妻弟聞張美人未甞任身就館也且羌胡尚殺首子以盪腸正世況於天子而近巳出之女也此三者皆大事陛下所自見足以知其餘及它所不見者鳳不可令乆典事宜退使就第選忠賢以代之自鳳之白罷商後遣定陶王也上不能平及聞章言天子感寤納之謂章曰㣲京兆尹直言吾不聞社稷計且唯賢知賢君試為朕求可以自輔者於是章奏封事薦信都王舅琅邪太守馮野王忠信質直知謀有餘以王舅岀以賢復入明聖主樂進賢也上自為太子時數聞野王先帝名卿聲譽岀鳳逺甚方倚欲以代鳳章每召見上輒辟左右時太后從弟子侍中音獨側聽具知章言以語鳳鳳聞之甚憂懼杜欽令鳳稱病出就第上䟽乞骸骨其辭指甚哀太后聞之為垂涕不御食上少而親倚鳳弗忍廢乃優詔報鳳彊起之於是鳳起視事上使尚書劾奏章知野王前以王舅出補吏而私薦之欲令在朝阿附諸侯又知張美人體御至尊而妄稱引羌胡殺子盪腸非所宜言下章吏廷尉致其大逆罪以爲比上夷狄欲絶繼嗣之端背畔天子私為定陶王章竟死獄中妻子徙合浦自是公卿見鳳側目而視馮野王懼不自安遂病滿三月賜告與妻子歸杜陵就醫藥大将軍鳳風御史中丞劾奏野王賜告養病而私自便持虎符出界歸家奉詔不敬杜欽奏記於鳳曰二千石病賜告得歸有故事不得去郡亡著令傳曰賞疑從予所以廣恩勸功也罰疑從去所以慎刑闕難知也今釋令與故事而假不敬之灋甚違闕疑從去之意即以二千石守千里之地任兵馬之重不宜去郡将以制刑爲後灋者則野王之罪在未制令前也刑賞大信不可不慎鳳不聽竟免野王官時衆庶多寃王章譏朝廷者欽欲救其過復説鳳曰京兆尹章所坐事密自京師不曉況於逺方恐天下不知章實有罪而以爲坐言事如是塞争引之原損寛明之德欽愚以爲宜因章事舉直言極諌並見郎従官展盡其意加於往前以明示四方使天下咸知主上聖明不以言罪下也若此則流言消釋疑惑著明鳳白行其䇿焉是嵗陳留太守薛宣為左馮翊宣為郡所至有聲迹宣子恵為彭城令宣甞過其縣心知恵不能不問以吏事或問宣何不敎戒恵以吏職宣笑曰吏道以灋令為師可問而知及能與不能自有資材何可學也衆人傳稱以宣言為然二年春三月大赦天下御史大夫張忠卒夏四月丁卯以侍中太僕王音為御史大夫於是王氏愈盛郡國守相刺史皆出其門下五侯羣弟争為奢侈賂遺珍寳四面而至皆通敏人事好士養賢傾財施予以相髙尚賔客滿門競為之聲譽劉向謂陳湯曰今災異如此而外家日盛其漸必危劉氏吾幸得以同姓末屬累世䝉漢厚恩身為宗室遺老歴事三主上以我先帝舊臣每進見常加優禮吾而不言孰當言者遂上封事極諫曰臣聞人君莫不欲安然而常危莫不欲存然而常亡失御臣之術也夫大臣操權柄持國政未有不為害者也故書曰臣之有作威作福害于而家凶于而國孔子曰禄去公室政逮大夫危亡之兆也今王氏一姓乗朱輪華轂者二十三人青紫貂蟬充盈幄内魚鱗左右大将軍秉事用權五侯驕奢僣盛並作威福擊斷自恣行汙而寄治身私而託公依東宫之尊假甥舅之親以為威重尚書九卿州牧郡守皆出其門筦執樞機朋黨比周稱譽者登進忤恨者誅傷游談者助之説執政者為之言排擯宗室孤弱公族其有智能者尤非毀而不進逺絶宗室之任不令得給事朝省恐其與巳分權數稱燕王蓋主以疑上心避諱吕霍而弗肯稱内有管蔡之萌外假周公之論兄弟據重宗族磐互歴上古至秦漢外戚僣貴未有如王氏者也物盛必有非常之變先見為其人㣲象孝昭帝時冠石立於泰山仆柳起於上林而孝宣帝即位今王氏先祖墳墓在濟南者其梓柱生枝葉扶䟽上出屋根兩地中雖立石起栁無以過此之明也事埶不兩大王氏與劉氏亦且不並立如下有泰山之安則上有累卵之危陛下為人子孫守持宗廟而令國祚移於外親降為皁􅀠縦不為身柰宗廟何婦人内夫家而外父母家此亦非皇太后之福也孝宣皇帝不與舅平昌矦權所以全安之也夫明者起福於無形銷患於未然宜發明詔吐徳音援近宗室親而納信黜逺外戚毋授以政皆罷令就弟以則效先帝之所行厚安外戚全其宗族誠東宫之意外家之福也王氏永存保其爵禄劉氏長安不失社稷所以襃睦外内之姓子子孫孫無疆之計也如不行此䇿田氏復見於今六卿必起於漢為後嗣憂昭昭甚明唯陛下深留聖思書奏天子召見向歎息悲傷其意謂曰君且休矣吾将思之然終不能用其言秋􅀜東大水八月甲申定陶共王康薨是嵗徙信都王興爲中山王資治通鑑卷第三十
