body:
  text: 臣司馬光奉勑編集後􅀳紀四執徐正月凡二年有竒起􅀇黓攝提格盡閼逢髙祖聖文章武明德孝皇帝下天福七年春正月丁巳鎮州牙將自西郭水碾門導官軍入城殺守陴民二萬人執安重榮斬之杜重威殺導者自以為功庚申重榮首至鄴都帝命漆之函送契丹癸亥攺鎮州為恒州成德軍為順國軍丙寅以門下侍郎同平章事趙瑩為侍中以杜重威為順國節度使兼侍中安重榮私財及恒州府庫重威盡有之帝知而不問又表衞尉少卿范陽王瑜爲副使瑜爲之重斂於民恒人不勝其苦張式父鐸詣闕訟􅁈壬午以河陽節度使王周爲彰義節度使代張彦澤閩主曦立皇后李氏同平章事真之女也􅄝酒剛愎曦寵而憚之彰武節度使丁審琪養部曲千人縱之爲暴於境内軍校賀行政與諸胡相結爲亂攻延州帝遣曹州防禦使何重建將兵救之同鄜援兵繼至乃得免二月癸巳以重建爲彰武留後召審琪歸朝重建雲朔間胡人也唐左丞相宋齊丘固求豫政事唐主聽入中書又求領尚書省乃罷侍中壽王景遂判尚書省更領中書門下省以齊丘知尚書省事其三省事並取齊王璟參決齊丘視事數月親吏夏昌圖盗官錢三千緡齊丘判貸其死唐主大怒斬昌圖齊丘稱疾請罷省事從之涇州奏遣押牙陳延暉持敕書詣涼州州中將吏請延暉為節度使三月閩主曦立長樂王亞澄為閩王張彦澤在涇州擅發兵擊諸胡兵皆敗沒調民馬千餘匹以􅀘之還至陜獲亡將楊洪乗醉斷其手足而斬之王周奏彦澤在鎮貪殘不法二十六條民散亡者五千餘戸彦澤旣至帝以其有軍功又與楊光逺連姻釋不問夏四月己未右諌議大夫鄭受益上言楊洪所以被屠由陛下去􅀊送張式與彦澤使之逞志致彦澤敢肆凶殘無所忌憚見聞之人無不切齒而陛下曽不動心一無詰讓淑慝莫辨賞罰無章中外皆言陛下受彦澤所獻馬百匹聽其如是臣竊為陛下惜此惡名乞正彦澤罪法以湔洗聖德䟽奏留中受益從讜之兄子也庚申刑部郎中李濤等伏閤極論彦澤之罪語甚切至辛酉敕張彦澤削一階降爵一級張式父及子弟皆拜官涇州民復業者減其徭賦癸亥李濤復與兩省及御史臺官伏閤奏彦澤罰大輕請論如法帝召濤靣諭之濤端笏前迫殿陛論辨聲色俱厲帝怒連叱之濤不退帝曰朕巳許彦澤不死濤曰陛下許彦澤不死不可負不知范延光鐵劵安在帝拂衣起入禁中丙寅以彦澤為左龍武大將軍漢髙祖寢疾以其子秦王弘度晉王弘熈皆驕恣少子越王弘昌孝謹有智識與右僕射兼西御院使王翻謀出弘度鎮邕州弘熈鎮容州而立弘昌制命將行㑹崇文使蕭益入問疾以其事訪之益曰立嫡以長違之必亂乃止丁丑髙祖殂髙祖為人辨察多權數好自矜大常謂中國天子為洛州刺史嶺南珍異所聚毎窮奢極麗宫殿悉以金玉珠翠為飾用刑慘酷有灌鼻割舌支解刳剔炮炙烹蒸之法或聚毒蛇水中以罪人投之謂之水獄同平章事楊洞潜諌不聽末年尤猜忌以士人多為子孫計故專任宦者由是其國中宦者大盛秦王弘度即皇帝位更名玢以弘熈輔政攺元光天尊母趙昭儀曰皇太妃契丹以晉招納吐谷渾遣使來讓帝憂悒不知爲計五月巳亥始有疾乙巳尊太妃劉氏為皇太后太后帝之庶母也唐丞相太保宋齊丘旣罷尚書省不復朝謁唐主遣壽王景遂勞問許鎮洪州始入朝唐主與之宴酒酣齊丘曰陛下中興臣之力也柰何忘之唐主怒曰公以遊客干朕今為三公亦足矣乃與人言朕鳥喙如句踐難與共安樂有之乎齊丘曰臣實有此言臣為遊客時陛下乃偏禆耳今日殺臣可矣明日唐主手詔謝之曰朕之褊性子嵩平昔所知少相親老相怨可乎丙午以齊丘為鎮南節度使帝寢疾一旦馮道獨對帝命㓜子重睿出拜之又令宦者抱重睿置道懷中其意蓋欲道輔立之六月乙丑帝殂道與天平節度使侍衛馬歩都虞候景延廣議以國家多難宜立長君乃奉廣晉尹齊王重貴為嗣是日齊王即皇帝位延廣以為已功始用事禁都下人母得偶語初高祖疾亟有旨召河東節度使劉知逺入輔政齊王寢之知逺由是怨齊王丁卯尊皇太后曰太皇太后皇后曰皇太后閩富沙王延政圍汀州閩主曦發漳泉兵五千救之又遣其將林守亮入尤溪大明宫使黄敬忠屯尤口欲乗虚襲建州國計使黃紹頗將歩卒八千為二軍聲援秋七月壬辰太皇太后劉氏殂閩富沙王延政攻汀州四十二戰不克而歸其將包洪實陳望將水軍以禦福州之師丁酉遇於尢口黄敬忠將戰占者言時刻未利按兵不動洪實等引兵登岸水陸夾攻之殺敬忠俘斬二千級林守亮黄紹頗皆遁歸庚子大赦癸卯加景延廣同平章事兼侍衛馬歩都指揮使勲舊皆欲復置樞密使馮道等三表請以樞密舊職讓之帝不許有神降於􅀶羅縣民家與人言而不見其形閭閻人往占吉凶多驗縣吏張遇賢事之甚謹時循州盜賊羣起莫相統一賊帥共禱于神神大言曰張遇賢當為汝主於是羣帥共奉遇賢稱中天八國王攺元永樂置百官攻掠海隅遇賢年少無它方略諸將但告進退而已漢主以越王弘昌為都統循王弘杲為副以討之戰于錢帛館漢兵不利二王皆為賊所圍指揮使陳道庠等力戰救之得免東方州縣多為遇賢所䧟道庠端州人也高行周圍襄州踰年不下城中食盡奉國軍都虞候曲周王清言於行周曰賊城已危我師已老民力已困不早迫之尚何俟乎與奉國都指揮使元城劉詞帥衆先登八月拔之安從進舉族自焚甲子以趙瑩為中書令閩主曦遣使以手詔及金器九百錢萬緡將吏敕吿六百四十通求和於富沙王延政延政不受丙寅閩主曦宴羣臣於九龍殿從子繼柔不能飲強之繼柔私減其酒曦怒并客將斬之閩人鑄永隆通寶大鐵錢一當鈆錢百漢葬天皇大帝于康陵廟號髙祖唐主自為吴相興利除害變更舊法甚多及即位命法官及尚書刪定為昇元條三十卷庚寅行之閩主曦以同平章事候官余廷英為泉州刺史廷英貪􅁾掠人女子詐稱受詔采擇以備後宫事覺曦遣御史按之廷英懼詣福州自歸曦詰責將以屬吏廷英退獻買宴錢萬緡曦恱明日召見謂曰宴已買矣皇后貢物安在廷英復獻錢於李后乃遣歸泉州自是諸州皆别貢皇后物未幾復召廷英為相冬十月丙子張遇賢陷循州殺漢刺史劉傳楚王希範作天䇿府極棟宇之盛戸牖欄檻皆飾以金玉塗壁用丹砂數十萬斤地衣春夏用角簟秋冬用木綿與子弟僚屬遊宴其閒十一月庚寅葬聖文章武明德孝皇帝于顯陵廟號髙祖先是河南北諸州官自賣海鹽歳收緍錢十七萬又散蠶鹽歛民錢言事者稱民坐私販鹽抵罪者衆不􅀂聽民自販而嵗以官所賣錢直斂於民謂之食鹽錢髙祖從之俄而鹽價頓賤毎斤至十錢至是三司使董遇欲増求羡利而難於驟變前法乃重征鹽啇過者七錢留賣者十錢由是鹽啇殆絶而官復自賣其食鹽錢至今歛之如故閩鹽鐵使右僕射李仁遇敏之子閩主曦之甥也年少美姿容得幸於曦十二月以仁遇為左僕射兼中書侍郎翰林學士吏部侍郎李光準為中書侍郎兼户部尚書並同平章事曦荒淫無度甞夜宴光準醉忤㫖命執送都市斬之吏不敢殺繫獄中明日視朝召復其位是夕又宴收翰林學士周維岳下獄吏拂榻待之曰相公昨夜宿此尚書勿憂醒而釋之它日又宴侍臣皆以醉去獨維岳在曦曰維岳身甚小何飲酒之多左右或曰酒有别腸不必長大曦欣然命捽維岳下殿欲剖視其酒腸或曰殺維岳無人復能侍陛下劇飲者乃捨之帝之􅀄即位也大臣議奉表稱臣告哀於契丹景延廣請致書稱孫而不稱臣李崧曰屈身以為社稷何恥之有陛下如此它日必躬擐甲胄與契丹戰於時悔無益矣延廣固爭馮道依違其閒帝卒從延廣議契丹大怒遣使來責讓且言何得不先承禀遽即帝位延廣復以不遜語荅之契丹盧龍節度使趙延壽欲代晉帝中國屢說契丹擊晉契丹主頗然之齊王上天福八年春正月癸卯蜀主以宣徽使兼宫􅁐使田敬全領永平節度使敬全宦者也引前蜀王承休為比而命之國人非之帝聞契丹將入宼二月己未發鄴都乙丑至東京然猶與契丹問遺相往來無虛月唐宣城王景逹剛毅開爽烈祖愛之屢欲以為嗣宋齊丘亟稱其才唐主以齊王璟年長而止璟以是怨齊丘唐主幼子景逷母种氏有寵齊王璟母宋皇后稀得進見唐主如璟宫遇璟親調樂器大怒誚讓者數日种氏乗間言景逷雖㓜而慧可以為嗣唐主怒曰子有過父訓之常事也國家大計女子何得預知即命嫁之唐主甞夢吞靈丹旦而方士史守沖獻丹方以為神而餌之浸成躁急左右諫不聽甞以藥賜李建勲建勲曰臣餌之數日已覺躁􅀬況多餌乎唐主曰朕服之乆矣羣臣奏事往往暴怒然或有正色論辯中理者亦歛容慰謝而從之唐主問道士王栖霞何道可致太平對曰王者治心治身乃治家國今陛下尚未能去飢嗔飽喜何論太平宋后自簾中稱嘆以為至言凡唐主所賜予栖霞皆不受栖霞常為人奏章唐主欲為之築壇辭曰國用方乏何暇及此俟焚章不化乃當奏請耳駕部郎中馮延巳為齊王元帥府掌書記性傾巧與宋齊丘及宣徽副使陳覺相結同府在己上者延巳稍以計逐之延巳甞戲謂中書侍郎孫晟曰公有何能為中書郎晟曰晟山東鄙儒文章不如公詼諧不如公諂詐不如公然主上使公與齊王遊處蓋欲以仁義輔導之也豈但為聲色狗馬之友邪晟誠無能如公之能適足為國家之禍耳延巳歙州人也又有魏岑者亦在齊王府給事中常夢錫屢言陳覺馮延巳魏岑皆佞邪小人不宜侍東宫司門郎中判大理寺蕭儼表稱陳覺姦回亂政唐主頗感悟未及去㑹疽發背祕不令人知密令醫治之聽政如故庚午疾亟太醫吴廷裕遣親信召齊王璟入侍疾唐主謂璟曰吾餌金石始欲益壽乃更傷生汝宜戒之是夕殂祕不發喪下制以齊王監國大赦孫晟恐馮延巳等用事欲稱遺詔令太后臨朝稱制翰林學士李貽業曰先帝甞云婦人預政亂之本也安肻自為厲階此必近習姦人之詐也且嗣君春秋已長明德著聞公何得遽為亡國之言若果宣行吾必對百官毁之晟懼而止貽業蔚之從曽孫也丙子始宣遺制烈祖末年卞急近臣多罹譴罰陳覺稱疾累月不入及宣遺詔乃出蕭儼劾奏覺端居私室以俟升遐請按其罪齊王不許自烈祖相吴禁壓良為賤令買奴婢者通官作劵馮延巳及弟禮部貟外郎延魯俱在元帥府草遺詔聽民賣男女意欲自買姬妾蕭儼駮曰此必延巳等所為非大行之命也昔延魯為東都判官已有此請先帝訪臣臣對曰陛下昔為吴相民有鬻男女者為出府金贖而歸之故逺近歸心今即位而反之使貧人之子為富人厮役可乎先帝以為然將治延魯罪臣以為延魯愚無足責先帝斜封延魯章抹三筆持入宫請求諸宫中必尚在齊王命取先帝時留中章奏得千餘道皆斜封一抹果得延魯䟽然以遺詔已行竟不之改閩富沙王延政稱帝於建州國號大殷大赦改元天徳以將樂縣為鏞州延平鎮為鐔州立皇后張氏以節度判官潘氶祐為吏部尚書節度巡官建陽楊思恭為兵部尚書未幾以氶祐同平章事思恭遷僕射録軍國事延政服赭袍視事然牙參及接鄰國使者猶如藩鎮禮殷國小民貧軍旅不息楊思㳟以善聚歛得幸増田畒山澤之税至於魚鹽􅂼果無不倍征國人謂之楊剥皮三月己卯朔以中書令趙瑩為晉昌節度使兼中書令以晉昌節度使兼侍中桑維翰為侍中唐元宗即位大赦改元保大祕書郎韓熈載請俟踰年改元不從尊皇后曰皇太后立妃鍾氏為皇后唐主未聽政馮延巳屢入白事一日至數四唐主曰書記有常職何為如是其煩也唐主為人謙謹􅀄即位不名大臣數延公卿論政體李建勲謂人曰主上寛仁大度優於先帝但性習未定茍旁無正人但恐不能守先帝之業耳唐主以鎮南節度使宋齊丘為太保兼中書令奉化節度使周宗為侍中唐主以齊丘宗先朝勲舊故順人望召為相政事皆自決之徙壽王景遂為燕王宣城王景逹為鄂王􅀄唐主為齊王知政事每有過失常夢錫常直言規正始雖忿懟終以諒直多之及即位許以為翰林學士齊丘之黨疾之坐封駮制書貶池州判官池州多遷客節度使上蔡王彦儔防制過甚幾不聊生惟事夢錫如在朝廷宋齊丘待陳覺素厚唐主亦以覺為有才遂委任之馮延巳延魯魏岑雖齊邸舊僚皆依附覺與休寧查文徽更相汲引侵蠧政事唐人謂覺等為五􅀑延魯自禮部貟外郎遷中書舎人勤政殿學士江州觀察使杜昌業聞之歎曰國家所以驅駕羣臣在官爵而已若一言稱旨遽躋通顯後有立功功者何以賞之未幾唐主以岑及文徽皆為樞密副使岑旣得志㑹覺遭母䘮岑即暴揚覺過惡擯斥之唐置定逺軍於濠州漢殤帝驕奢不親政事高祖在殯作樂酣飲夜與倡婦微行倮男女而􅀚之左右忤意輒死無敢諌者惟越王弘昌及内常侍畨禺吳懐恩屢諌不聽常猜忌諸弟每宴集令䆠者守門羣臣宗室皆露索然後入晉王弘熈欲圖之乃盛飾聲伎娱恱其意以成其惡漢主好手搏弘熈令指揮使陳道庠引力士劉思潮譚令禋林少強林少良何昌廷等五人習手搏於􅀳府漢主聞而恱之丙戌與諸王宴于長春宫觀手搏至夕罷宴漢主大醉弘熈使道庠思潮等掖漢主因拉殺之盡殺其左右明旦百官諸王莫敢入宫越王弘昌帥諸弟臨於寢殿迎弘熈即皇帝位更名晟改元應乾以弘昌為太尉兼中書令諸道兵馬都元帥知政事循王弘杲為副元帥參預政事陳道庠及劉思潮等皆受賞賜甚厚閩主曦納金吾使尚保殷之女立為賢妃妃有殊色曦嬖之醉中妃所欲殺則殺之所欲宥則宥之夏四月戊申朔日有食之唐以中書侍郎同平章事李建勲為昭武節度使鎮撫州殷將陳望等攻閩福州入其西郛旣而敗歸五月殷吏部尚書同平章事潘承祐上書陳十事大指言兄弟相攻逆傷天理一也賦歛煩重力役无節二也發民為兵羇旅愁怨三也楊思㳟奪人衣食使歸怨於上羣臣莫敢言四也疆土狹隘多置州縣増吏困民五也除道裹糧將攻臨汀曽不憂金陵錢塘乗虛相襲六也括髙貲戸財多者􅀘官逋負者被刑七也延平諸津征果菜魚米獲利至微斂怨甚大八也與唐吴越為隣即位以來未甞通使九也宫室臺榭崇飾無度十也殷王延政大怒削氶祐官爵勒歸私第漢中宗既立國中議論詾詾循王弘杲請斬劉思潮等以謝中外漢主不從思潮等聞之譛弘杲謀反漢主令思潮等伺之弘杲方宴客思潮與譚令禋帥衞兵突入斬弘杲於是漢主謀盡誅諸弟以越王弘昌賢而得衆尤忌之雄武節度使齊王弘弼自以居大鎭懼禍求入朝許之􅀄閩主曦侍康宗宴㑹新羅獻寶劔康宗舉以示同平章事王倓曰此何所施倓對曰斬為臣不忠者時曦已蓄異志凛然變色至是宴羣臣復有獻劔者曦命發倓冢斬其尸校書郎陳光逸謂其友曰主上失徳亡無日矣吾欲死諌其友止之不從上書陳曦大惡五十事曦怒命衞士鞭之數百不死以繩繫其頸懸諸庭樹乆之乃絶秋七月己丑詔以年饑國用不足分遣使者六十餘人於諸道括民穀吴越王弘佐􅀄立上統軍使闞璠彊戾排斥異已弘佐不能制内牙上都監使章徳安數與之爭右都監使李文慶不附於璠乙巳貶徳安於處州文慶于睦州璠與右統軍使胡進思益專横璠明州人文慶睦州人進思湖州人也唐主縁烈祖意以天雄節度使兼中書令金陵尹燕王景遂為諸道兵馬元帥徙封齊王居東宫天平節度使守侍中東都留守鄂王景逹為副元帥徙封燕王宣告中外約以傳位立長子弘兾為南昌王景遂景逹固辭不許景遂自誓必不敢為嗣更其字曰退身漢指揮使萬景忻敗張遇賢於循州遇賢吿于神神曰取䖍州則大事可成遇賢帥衆踰嶺趣䖍州唐百勝節度使賈匡浩不為僃遇賢衆十餘萬攻陷諸縣再敗州兵城門晝閉遇賢作宫室營署于白雲洞遣將四出剽掠匡浩公鐸之子也八月乙卯唐主立弟景逷為保寧王宋太后怨种夫人屢欲害景逷唐主力保全之夏州牙内指揮使拓跋崇斌謀作亂綏州刺史李􅂜敏將助之事覺辛未彞敏弃州與其弟􅂜俊等五人奔延州九月尊帝母秦國夫人安氏為皇太妃妃代北人也帝事太后太妃甚謹多待食於其宫待諸弟亦友愛初河陽牙將喬榮從趙延壽入契丹契丹以為回圖使往來販易於晉置邸大梁及契丹與晉有隙景延廣說帝囚榮於獄悉取邸中之貨凡契丹之人販易在晉境者皆殺之奪其貨大臣皆言契丹有大功於晉不可負戊子釋榮慰賜而歸之榮辭延廣延廣大言曰歸語而主先帝為北朝所立故稱臣奉表今上乃中國所立所以降志於北朝者正以不敢忘先帝盟約故耳為鄰稱孫足矣無稱臣之理北朝皇帝勿信趙延壽誑誘輕侮中國中國士馬爾所目睹翁怒則來戰孫有十萬横磨劔足以相待它日為孫所敗取笑天下毋悔也榮自以亡失貨財恐歸獲罪且欲為異時據驗乃曰公所言頗多懼有遺忘願記之紙墨延廣命吏書其語以授之榮具以白契丹主契丹主大怒入寇之志始決晉使如契丹者皆縶之幽州不得見桑維翰屢請遜辭以謝契丹每為延廣所沮帝以延廣爲有定䇿功故寵冠羣臣又緫宿衞兵故大臣莫能與之爭河東節度使劉知逺知延廣必致寇而畏其方用事不敢言但益募兵奏置興捷武節等十餘軍以備契丹甲午定難節度使李􅂜殷奏李􅂜敏作亂之狀詔執􅂜敏送夏州斬之冬十月戊申立吴國夫人馮氏為皇后􅀄高祖愛少弟重胤養以為子及留守鄴都娶副留守安喜馮濛女為其婦重胤早卒馮夫人寡居有美色帝見而恱之高祖崩梓宫在殯帝遂納之羣臣皆賀帝謂馮道等曰皇太后之命與卿等不任大慶羣臣出帝與夫人酣飲過梓宫前醊而告曰皇太后之命與先帝不任太慶左右失笑帝亦自笑顧謂左右曰我今日作新婿何如夫人與左右皆大笑太后雖恚而無如之何旣正位中宫頗預政事后兄玉時為禮部郎中鹽鐵判官帝驟擢用至端明殿學士户部侍郎與議政事漢主命韶王弘雅致仕唐主遣洪州營屯都虞􅃸嚴恩將兵討張遇賢以通事舎人金陵邉鎬為監軍鎬用䖍州人白昌裕為謀主擊張遇賢屢破之遇賢禱於神神不復言其徒大懼昌裕勸鎬伐木開道出其營後襲之遇賢弃衆奔别將李台台知神無驗執遇賢以降斬於金陵市十一月丁亥漢主祀南郊大赦改元乾和戊子吴越王弘佐納妃仰氏仁詮之女也初高祖以馬三百借平盧節度使楊光逺景延廣以詔命取之光逺怒曰是疑我也密召其子單州刺史承祚戊戌承祚稱母病夜開門奔青州庚子以左飛龍使金城何超權知單州遣内班賜光逺玉帶御馬金帛以安其意壬寅遣侍衞歩軍都指揮使郭謹將兵戍鄆州唐葬光文肅武孝高皇帝于永陵廟號烈祖十二月乙巳朔遣左領軍衞將軍蔡行遇將兵戍鄆州楊光逺遣􅀐兵入淄州劫刺史翟進宗歸于青州甲寅徙楊承祚為登州刺史以從其便光逺益驕密告契丹以晉主負徳違盟境内大饑公私困竭乗此際攻之一舉可取趙延壽亦勸之契丹主乃集山後及盧龍兵合五萬人使延壽將之委延壽經略中國曰若得之當立汝為帝又常指延壽謂􅀳人曰此汝主也延壽信之由是為契丹盡力畫取中國之䇿朝廷頗聞其謀丙辰遣使城南樂及徳清軍徴近道兵以備之唐侍中周宗年老恭謹自守中書令宋齊丘廣樹朋黨百計傾之宗泣訴於唐主唐主由是薄齊丘旣而陳覺被踈乃出齊丘為鎮海節度使齊丘忿懟表乞歸九華舊隱唐主知其詐一表即從之賜書曰今日之行昔時相許朕實知公故不奪公志仍賜號九華先生封青陽公食一縣租税齊丘乃治大第於青陽服御將吏皆如王公而憤邑尤甚寧州酋長莫彦殊以所部温那等十八州附于楚其州無官府惟立牌於岡阜略以恩威羈縻而已是嵗春夏旱秋冬水蝗大起東自海壖西距隴坻南踰江湖北抵幽薊原野山谷城郭廬舎皆滿竹木葉俱盡重以官括民穀使者督責嚴急至封碓磑不留其食有坐匿穀抵死者縣令往往以督趣不辦納印自劾去民餒死者數十萬口流亡不可勝數於是留守節度使下至將軍各獻馬金帛芻粟以助國朝廷以恒定饑甚獨不括民穀順國節度使杜威奏稱軍食不足請如諸州例許之威用判官王緒謀檢索殆盡得百萬斛威止奏三十萬斛餘皆入其家又令判官李沼稱貸於民復滿百萬斛來春糶之得緡錢二百萬闔境苦之定州吏欲援例為奏義武節度使馬全節不許曰吾為觀察使職在養民豈忍効彼所為乎楚地多産金銀茶利尤厚由是財貨豐殖而楚王希範奢欲無厭喜自誇大為長槍大槊飾之以金可執而不可用募富民年少肥澤者八千人為銀槍都宫室園囿服用之物務窮侈靡作九龍殿刻沈香為八龍飾以金寶長十餘丈抱柱相向希範居其中自為一龍其襆頭脚長丈餘以象龍角用度不足重為賦歛毎遣使者行田專以増頃畒為功民不勝租賦而逃王曰但令田在何憂無榖命營田使鄧懿文籍逃田募民耕藝出租民捨故從新僅能自存自西徂東各失其業又聽人入財拜官以財多少為官髙卑之差富商大賈布在列位外官還者必責貢獻民有罪則富者輸財強者為兵惟貧弱受刑又置函使人投匿名書相告訐至有滅族者是嵗用孔目官周陟議令常税之外大縣貢米二千斛中千斛小七百斛無米者輸布帛天䇿學士拓跋恒上書曰殿下長􅀷宫之中藉巳成之業身不知稼穡之勞耳不聞鼓鼙之音馳騁遨遊雕墻玉食府庫盡矣而浮費益甚百姓困矣而厚歛不息今淮南為仇讎之國畨禺懐吞噬之志荆渚日圖窺伺溪洞待我姑息諺曰足寒傷心民怨傷國願罷輸米之令誅周陟以謝郡縣去不急之務減興作之役無令一旦禍敗為四方所笑王大怒它日恒請見辭以晝寢恒謂客將區弘練曰王逞欲而愎諌吾見其千口飄零無日矣王益怒遂終身不復見之閩主曦嫁其女取班簿閲視之朝士有不賀者十二人皆杖之於朝堂以御史中丞劉賛不舉劾亦將杖之賛義不受辱欲自殺諫議大夫鄭元弼諌曰古者刑不上大夫中丞儀刑百僚豈宜加之箠楚曦正色曰卿欲效魏徴邪元弼曰臣以陛下為唐太宗故敢效魏徴曦怒稍解乃釋賛賛竟以憂卒開運元年春正月乙亥邊藩馳告契丹前鋒將趙延壽趙延照將兵五萬入寇逼貝州延照思温之子也先是朝廷以貝州水陸要衝多聚芻粟為大軍數年之儲以備契丹軍校邵珂性凶悖永清節度使王令温黜之珂怨望密遣人亡入契丹言貝州粟多而兵弱易取也㑹令温入朝執政以前復州防禦使吴巒權知州事巒旣至推誠撫士㑹契丹入寇巒書生無爪牙珂自請願効死巒使將兵守南門巒自守東門契丹主自攻貝州巒悉力拒之燒其攻具殆盡己卯契丹復攻城珂引契丹自南門入巒赴井死契丹遂陷貝州所殺且萬人庚辰以歸徳節度使髙行周為北面行營都部署以河陽節度使符彦卿為馬軍左廂排陳使以右神武統軍皇甫遇為馬軍右廂排陳使以陜府節度使王周為歩軍左廂排陳使以左羽林將軍潘環為歩軍右廂排陳使太原奏契丹入鴈門關恒邢滄皆奏契丹入寇成徳節度使杜威遣幕僚曹光裔詣楊光逺為陳禍福光逺遣光裔入奏稱承祚逃歸母疾故爾旣􅂪恩宥闔族荷恩朝廷信其言遣使與光裔復往慰諭之唐以侍中周宗為鎮南節度使左僕射兼門下侍郎同平章事張居詠為鎮海節度使唐主決欲傳位於齊燕二王翰林學士馮延巳等因之欲隔絶中外以擅權辛巳敕齊王景遂參決庶政百官惟樞密副使魏岑查文徽得白事餘非召對不得見國人大駭給事中蕭儼上䟽極論不報侍衛都虞候賈崇叩閤求見曰臣事先帝三十年觀其延接踈逺孜孜不怠下情猶有不通者陛下新即位所任者何人而頓與羣臣謝絶臣老矣不復得奉顔色因涕泗嗚咽唐主感悟遽收前敕唐主於宫中作髙樓召侍臣觀之衆皆歎美蕭儼曰恨樓下無井唐主問其故對曰以此不及景陽樓耳唐主怒貶於舒州觀察使孫晟遣兵防之儼曰儼以諌諍得罪非有它志昔顧命之際君幾危社稷其罪顧不重於儼乎今日反見防邪晟慙懼遽罷之帝遣使持書遺契丹契丹已屯鄴都不得通而返壬午以侍衞馬歩都指揮使景延廣為御營使前静難節度使李周為東京留守是日髙行周以前軍先發時用兵方略號令皆出延廣宰相以下皆無所預延廣乗􅀔使氣陵侮諸將雖天子亦不能制乙酉帝發東京丁亥滑州奏契丹至黎陽戊子帝至澶州契丹主屯元城趙延壽屯南樂以延壽為魏􅀶節度使封魏王契丹寇太原劉知逺與白承福合兵二萬擊之甲午以知逺為幽州道行營招討使杜威為副使馬全節為都虞候丙申遣右武衞上將軍張彦澤等將兵拒契丹於黎陽戊戌蜀主復以將相遥領節度使帝復遣譯者孟守忠致書於契丹求修舊好契丹主復書曰已成之􅀔不可改也辛丑太原奏破契丹偉王於秀容斬首三千級契丹自鴉鳴谷遁去殷鑄天徳通寶大鐵錢一當百唐主遣使遺閩主曦及殷主延政書責以兄弟尋戈曦復書引周公誅管蔡唐太宗誅建成元吉為比延政復書斥唐主奪楊氏國唐主怒遂與殷絶天平節度副使知鄆州顔衎遣觀察判官竇儀奏愽州刺史周儒以城降契丹又與楊光逺通使往還引契丹自馬家口濟河擒左武衞將軍蔡行遇儀謂景延廣曰虜若濟河與光逺合則河南危矣延廣然之儀薊州人也資治通鑑卷第二百八十三
