front:
  text: 資治通鑑卷第二百一十四
  hash: sha256:e1936f230d09ccea92a52ff578b39d65ea38eb123a38451762ef5df20804a63b
body:
  text: 臣司馬光奉勑編集唐紀三十光大荒落凡八年起閼逢閹茂盡重􅀇宗至道大聖大明孝皇帝中之中開元二十二年春正月己巳上發西京己丑至東都張九齡自韶州入見求終喪不許二月壬寅秦州地連震壞公私屋殆盡吏民壓死者四千餘人命左丞相蕭嵩賑恤方士張果自言有神仙術誑人云堯時爲侍中於今數千嵗多往來􅁪山中則天以來屢徴不至相州刺史韋濟薦之上遣中書舍人徐嶠齎璽書迎之庚寅至東都肩輿入宫恩禮甚厚張九齡請不禁鑄錢三月庚辰敕百官議之裴耀卿等皆曰一啓此門恐小人弃農逐利而濫惡更甚祕書監崔沔曰若稅銅折役則官冶可成計估度庸則私鑄無利易而可乆簡而難誣且夫錢之爲物貴以通貨利不在多何待私鑄然後足用也右監門録事參軍劉秩曰夫人富則不可以賞勸貧則不可以威禁若許其私鑄貧者必不能爲之臣恐貧者益貧而役於富富者益富而逞其欲漢文帝時吳王濞富埓天子鑄錢所致也上乃止秩子􅀇之子也夏四月壬辰以朔方節度使信安王禕兼􅀜内道采訪處置使増領涇原等十二州吏部侍郎李林甫柔佞多狡數深結宦官及妃嬪家伺􅇋上動靜無不知之由是每奏對常稱旨上恱之時武惠妃寵幸傾後宫生夀王清諸子莫得爲比太子浸踈薄林甫乃因宦官言於惠妃願盡力保䕶夀王惠妃徳之隂爲内助由是擢黄門侍郎五月戊子以裴耀卿爲侍中張九齡爲中書令林甫爲禮部尚書同中書門下三品上種麥於苑中帥太子以下親往芟之謂曰此所以薦宗廟故不敢不親且欲使汝曹知稼穡艱難耳又徧以賜侍臣曰比遣人視田中稼多不得實故自種以觀之六月壬辰幽州節度使張守珪大破契丹遣使獻㨗薛王業疾病上憂之容髪爲變七月己巳薨贈謚惠宣太子上以裴耀卿爲江淮河南轉運使於河口置輸場八月壬寅於輸場東置河隂倉西置栢崖倉三門東置集津倉西置鹽倉鑿漕渠十八里以避三門之險先是舟運江淮之米至東都含嘉倉僦車陸運三百里至陜率兩斛用十錢耀卿令江淮舟運悉輸河隂倉更用河舟運至含嘉倉及太原倉自太原倉入渭輸關中凡三歳運米七百萬斛省僦車錢三十萬緡或説耀卿獻所省錢耀卿曰此公家贏縮之利耳柰何以之市寵乎悉奏以爲市糴錢張果固請歸􅁪山制以爲銀青光禄大夫號通􅀇先生厚賜而遣之後卒好異者奏以爲尸解上由是頗信神仙冬十二月戊子朔日有食之乙巳幽州節度使張守珪斬契丹王屈烈及可突干傳首時可突干連年爲邊患趙含章薛楚玉皆不能討守珪到官屢擊破之可突干因迫遣使詐降守珪使管記王悔就撫之悔至其牙帳察契丹上下初無降意但稍徙營帳近西北密遣人引突厥謀殺悔以叛悔知之牙官李過折與可突干分典兵馬爭權不叶悔説過折使圖之過折夜勒兵斬屈烈及可突干盡誅其黨帥餘衆來降守珪出師紫䝉川大閱以鎮撫之梟屈烈可突干首于天津之南突厥毗伽可汗爲其大臣梅録啜所毒未死討誅梅録啜及其族黨既卒子伊然可汗立尋卒弟登利可汗立庚戌來告喪禁京城匄者置病坊以􅅒之二十三年春正月契丹知兵馬中郎李過折來獻㨗制以過折爲北平王檢校松漠州都督乙亥上耕藉田九推乃止公卿以下皆終􅅿赦天下都城酺三日上御五鳯樓酺宴觀者諠隘樂不得奏金吾白梃如雨不能遏上患之髙力士奏河南丞嚴安之爲理嚴爲人所畏請使止之上從之安之至以手板繞場畫地曰犯此者死於是盡三日人指其畫以相戒無敢犯者時命三百里内刺史縣令各帥所部音樂集於樓下各較勝負懷州刺史以車載樂工數百皆衣文繡服箱之牛皆爲虎豹犀象之狀魯山令元徳秀惟遣樂工數人連袂歌于蔿上曰懷州之人其塗炭乎立以刺史爲散官徳秀性介㓗質樸士大夫皆服其髙上美張守珪之功欲以爲相張九齡諫曰宰相者代天理物非賞功之官也上曰假以其名而不使任其職可乎對曰不可惟名與器不可以假人君之所司也且守珪纔破契丹陛下即以爲宰相若盡滅奚厥將以何官賞之上乃止二月守珪詣東都獻㨗拜右羽林大將軍兼御史大夫賜二子官賞賚甚厚初殿中侍御史楊汪旣殺張審素更名萬頃審素二子瑝琇皆㓜坐流嶺表尋逃歸謀伺便復讎三月丁夘手殺萬頃於都城擊表於斧言父冤狀欲之江外殺與萬頃同謀陷其父者至汜水爲有司所得議者多言二子父死非罪穉年孝烈能復父讎宜加矜宥張九齡亦欲活之裴耀卿李林甫以爲如此壞國灋上亦以爲然謂九齡曰孝子之情義不顧死然殺人而赦之此塗不可啓也乃下敕曰國家設灋期於止殺各伸爲子之志誰非徇孝之人展轉相讎何有限極咎繇作士灋在必行曾參殺人亦不可恕宜付河南府杖殺士民皆憐之爲作哀誄牓於衢路市人斂錢葬之於北邙恐萬頃家發之仍爲作疑冢凡數處唐初公主實封止三百户中宗時太平公主至五千户率以七丁爲限開元以來皇妹止千户皇女又半之皆以三丁爲限駙馬皆除三品員外官而不任以職事公主邑入少至不能具車服左右或言其太薄上曰百姓租賦非我所有戰士出死力賞不過束帛女子何功而享多户邪且欲使之知儉嗇耳秋七月咸宜公主將下嫁始加實封至千户公主武惠妃之女也於是諸公主皆加至千户冬十月戊申突騎施宼北庭及安西撥换城閏月壬午朔日有食之十二月乙亥冊故蜀州司户楊􅀇琰女爲壽王妃􅀇琰汪之曾孫也是歳契丹王過折爲其臣􅄺禮所殺并其諸子一子刺乾奔安東得免􅄺禮上言過折用刑殘虐衆情不安故殺之上赦其罪因以􅄺禮爲松漠都督且賜書責之曰卿之蕃灋多無義於君長自昔如此朕亦知之然過折是卿之王有惡輒殺之爲此王者不亦難乎但恐卿今爲王後人亦爾常不自保誰願作王亦應防慮後事豈得取快目前突厥尋引兵東侵奚契丹􅄺禮與奚王李歸國共擊破之二十四年春正月庚寅敕天下逃户聽盡今年内自首有舊産者令還本貫無者别俟進止踰限不首當命專使搜求散配諸軍北庭都䕶蓋嘉運擊突騎施大破之二月甲寅宴新除縣令於朝堂上作令長新戒一篇賜天下縣令庚午更皇子名鴻曰瑛潭曰琮浚曰璵洽曰琰㳙曰瑶滉曰琬涺曰琚濰曰璲澐曰璬澤曰璘清曰瑁洄曰玢沐曰琦溢曰環沔曰理泚曰玼漼曰珪澄曰珙潓曰瑱從曰璿滔曰璥舊制考功貟外郎掌試貢舉人有進士李權陵侮貟外郎李昻議者以員外郎位卑不能服衆三月壬辰敕自今委禮部侍郎試貢舉人張守珪使平盧討擊使左驍衛將軍安禄山討奚契丹叛者禄山恃勇輕進爲虜所敗夏四月辛亥守珪奏請斬之禄山臨刑呼曰大夫不欲滅奚契丹邪奈何殺禄山守珪亦惜其驍勇欲活之乃更執送京師張九齡批曰昔穰苴誅莊賈孫武斬宫嬪守珪軍令若行禄山不宜免死上惜其才敕令免官以白衣將領九齡固爭曰禄山失律喪師於灋不可不誅且臣觀其貌有反相不殺必爲後患上曰卿勿以王夷甫識石勒枉害忠良竟赦之安禄山者本營州雜胡初名阿犖山其母巫也父死母擕之再適突厥安延偃㑹其部落破散與延偃兄子思順俱逃來故冒姓安氏名禄山又有史窣干者與禄山同里閈先後一日生及長相親愛皆爲互市牙郎以驍勇聞張守珪以禄山爲捉生將禄山每與數騎出輒擒契丹數十人而返狡􅃛善揣人情守珪愛之養以爲子窣干嘗負官債亡入奚中爲奚遊弈所得欲殺之窣干紿曰我唐之和親使也汝殺我禍且及汝國遊弈信之送詣牙帳窣干見奚王長揖不拜奚王雖怒而畏唐不敢殺以客禮館之使百人隨窣干入朝窣干謂奚王曰王所遣人雖多觀其才皆不足以見天子聞王有良將瑣髙者何不使之入朝奚王即命瑣髙與牙下三百人隨窣干入朝窣干將至平盧先使人謂軍使裴休子曰奚使􅃈髙與精鋭俱來聲云入朝實欲襲軍城宜謹爲之僃先事圖之休子乃具軍容出迎至館悉阬殺其從兵執瑣髙送幽州張守珪以窣干爲有功奏爲果毅累遷將軍後入奏事上與語恱之賜名思明故連州司馬武攸望之子温眘坐交通權貴杖死乙丑朔方河東節度使信安王禕貶衢州刺史廣武王承宏貶房州别駕涇州刺史薛自勸貶澧州别駕皆坐與温眘交遊故也承宏守禮之子也辛未蒲州刺史王琚貶通州刺史坐與禕交書也五月醴泉妖人劉志誠作亂驅掠路人將􅃐咸陽村民走告縣官焚橋斷路以拒之其衆遂潰數日悉擒斬之六月初分月給百官俸錢初上因藉田赦命有司議増宗廟籩豆之薦及服紀未通者太常卿韋縚奏請宗廟每坐籩豆十二兵部侍郎張均職方郎中韋述議曰聖人知孝子之情深而物類之無限故爲之節制人之􅄝好本無慿準宴私之饌與時遷移故聖人一切同歸於古屈到􅄝芰屈建不以薦以爲不以私欲干國之典今欲取甘旨肥濃皆充祭用茍踰舊制其何限焉書曰􅁰稷非馨明徳惟馨若以今之珍饌平生所習求神無方何必泥古則簠簋可去而盤盂盃桉當在御矣韶濩可息而箜􅔃箏笛當在奏矣旣非正物後嗣何觀夫神以精明臨人者也不求豐大茍失於禮雖多何爲豈可廢弃禮經以從流俗且君子愛人以禮不求茍合况在宗廟敢忘舊章太子賔客崔沔議曰祭祀之興肇於太古茹毛飲血則有毛血之薦未有麴糵則有􅀇酒之奠施及後王禮物漸僃然以神道致敬不敢廢也籩豆簠簋樽罍之實皆周人之時饌也其用通於宴饗賔客而周公制禮與毛血􅀇酒同薦鬼神國家由禮立訓因時制範清廟時饗禮饌必陳用周制也園寢上食時膳具設遵漢灋也職貢來祭致逺物也有新必薦順時令也苑囿之内躬稼所收蒐狩之時親發所中莫不薦而後食盡誠敬也若此至矣復何加焉伹當申敕有司無或簡怠則鮮美肥濃盡在是矣不必加籩豆之數也上固欲量加品味縚又奏每室加籩豆各六四時各實以新果珍羞從之縚又奏䘮服舅緦麻三月從母外祖父母皆小功五月外祖至尊同於從母之服姨舅一等服則輕重有殊堂姨舅親即未䟱恩絶不相爲服舅母來承外族不如同㸑之禮竊以古意猶有所未暢者也請加外祖父母爲大功九月姨舅皆小功五月堂舅堂姨舅母並加至􅃝免崔沔議曰正家之道不可以貳揔一定義理歸本宗是以内有齊斬外皆緦麻尊名所加不過一等此先王不易之道也願守八年明㫖一依古禮以爲萬代成法韋述議曰䘮服傳曰禽獸知母而不知父野人曰父母何筭焉都邑之士則知尊禰矣大夫及學士則知尊祖矣聖人究天道而厚於祖禰繫族姓而親其子孫母黨比於本族不可同貫明矣今若外祖及舅加服一等堂舅及姨列於服紀則中外之制相去幾何廢禮徇情所務者末古之制作者知人情之易揺恐失禮之將漸别其同異輕重相懸欲使後來之人永不相雜微旨斯在豈徒然哉茍可加也亦可減也往聖可得而非則禮經可得而隳矣先王之制謂之彞倫奉以周旋猶恐失墜一紊其叙庸可止乎請依儀禮喪服爲定禮部員外郎楊仲昌議曰鄭文貞公魏徵始加舅服至小功五月雖文貞賢也而周孔聖也以賢改聖後學何從竊恐内外乖序親踈奪倫情之所㳂何所不至昔子路有姊之喪而不除孔子曰先王制禮行道之人皆不忍也子路除之此則聖人援事抑情之明例也記曰無輕議禮明其蟠於天地並彼日月賢者由之安敢損益也敕姨舅既服小功舅母不得全降宜服緦麻堂姨舅宜服袒免均説之子也秋八月壬子千秋節羣臣皆獻寳鏡張九齡以爲以鏡自照見形容以人自照見吉凶乃述前世興廢之源爲書五卷謂之千秋金鏡録上之上賜書襃美甲寅突騎施遣其大臣胡禄逹干來請降許之御史大夫李適之承乾之孫也以才幹得幸於上數爲承乾論辯甲戌追贈承乾􅁪山愍王乙亥汴哀王璥薨冬十月戊申車駕發東都先是敕以來年二月二日行幸西京㑹宫中有恠明日上召宰相即議西還裴耀卿張九齡曰今農收未畢請俟仲冬李林甫潜知上指二相退林甫獨留言於上曰長安洛陽陛下東西宫耳往來行幸何更擇時借使妨於農收但應蠲所過租税而已臣請宣示百司即日西行上恱從之過陜州以刺史盧奐有善政題贊於其聽事而去奐懷慎之子也丁卯至西京朔方節度使牛仙客前在河西能節用度勤職業倉庫充實器械精利上聞而嘉之欲加尚書張九齡曰不可尚書古之納言唐興以來惟舊相及掦歴中外有徳望者乃爲之仙客本河湟使典今驟居清要恐羞朝廷上曰然則但加實封可乎對曰不可封爵所以勸有功也邊將實倉庫修器械乃常務耳不足爲功陛下賞其勤賜之金帛可也裂土封之恐非其宜上黙然李林甫言於上曰仙客宰相才也何有於尚書九齡書生不逹大體上恱明日復以仙客實封爲言九齡固執如初上怒變色曰事皆由卿邪九齡頓首謝曰陛下不知臣愚使待罪宰相事有未允臣不敢不盡言上曰卿嫌仙客寒㣲如卿有何閥閲九齡曰臣嶺海孤賤不如仙客生於中華然臣出入臺閣典司誥命有年矣仙客邊隅小吏目不知書若大任之恐不愜衆望林甫退而言曰茍有才識何必辭學天子用人何有不可十一月戊戌賜仙客爵隴西縣公食實封三百户初上欲以李林甫爲相問於中書令張九齡九齡對曰宰相繫國安危陛下相林甫臣恐異日爲廟社之憂上不從時九齡方以文學爲上所重林甫雖恨猶曲意事之侍中裴耀卿與九齡善林甫并疾之是時上在位嵗久漸肆奢欲怠於政事而九齡遇事無細大皆力爭林甫巧伺上意日思所以中傷之上之爲臨淄王也趙麗妃皇甫徳儀劉才人皆有寵麗妃生太子瑛徳儀生鄂王瑶才人生光王琚及即位幸武專妃麗妃等愛皆弛專妃生夀王瑁寵冠諸子太子與瑶琚㑹於内第各以母失職有怨望語駙馬都尉楊洄尚咸宜公主常伺三子過失以告惠妃惠妃泣訴於上曰太子隂結黨與將害妾母子亦指斥至尊上大怒以語宰相欲皆廢之九齡曰陛下踐䟭垂三十年太子諸王不離深宫日受聖訓天下之人皆慶陛下享國久長子孫蕃昌今三子皆已成人不聞大過陛下奈何一旦以無根之語喜怒之際盡廢之乎且太子天下本不可輕揺昔晉獻公聽驪姬之讒殺申生三世大亂漢武帝信江充之誣罪戾太子京城流血晉惠帝用賈后之讚廢愍懷太子中原塗炭隋文帝納獨孤后之言黜太子勇立煬帝遂失天下由此觀之不可不慎陛下必欲爲此臣不敢奉詔上不恱林甫初無所言退而私謂宦官之貴幸者曰此主上家事何必問外人上猶豫未决惠妃密使官奴牛貴兒謂九齡曰有廢必有興公爲之援宰相可長處九齡叱之以其語白上上爲之動色故訖九齡罷相太子得無動林甫日夜短九齡於上上浸踈之林甫引蕭炅爲户部侍郎炅素不學嘗對中書侍郎嚴挺之讀伏臘爲伏獵挺之言於九齡曰省中豈容有伏獵侍郎由是出炅爲􅄮州刺史故林甫怨挺之九齡與挺之善欲引以爲相嘗謂之曰李尚書方承恩足下宜一造門與之􅅃暱挺之素負氣薄林甫爲人竟不之詣林甫恨之益深挺之先娶妻出之更嫁蔚州刺史王元琰元琰坐贓罪下三司桉鞫挺之爲之營解林甫因左右使於禁中白上上謂宰相曰挺之爲罪人請屬所由九齡曰此乃挺之出妻不宜有情上曰雖離乃復有私於是上積前事以耀卿九齡爲阿黨壬寅以耀卿爲左丞相九齡爲右丞相並罷政事以林甫兼中書令仙客爲工部尚書同中書門下三品領朔方節度如故嚴挺之貶洺州刺史王元琰流嶺南上即位以來所用之相姚崇尚通宋璟尚灋張嘉貞尚吏張說尚文李元紘杜暹尚儉韓休張九齡尚直各其所長也九齡既得罪自是朝廷之士皆容身保位無復直言李林甫欲蔽塞人主視聽自専大權明召諸諫官謂曰今明主在上羣臣將順之不暇烏用多言諸君不見立仗馬乎食三品料一鳴輒斥去悔之何及補闕杜璡嘗上書言事明日黜爲下邽令自是諫争路絶矣牛仙客既爲林甫所引進専給唯諾而已然二人皆謹守格式百官遷除各有常度雖竒才異行不免終老常調其以巧謟邪險自進者則超騰不次自有它蹊矣林甫城府深密人莫窺其際好以甘言㗖人而隂中傷之不露辭色凡爲上所厚者始則親結之及位勢稍逼輒以計去之雖老姦巨猾無能逃其術者二十五年春正月初置􅀇學博士每嵗依明經舉二月敕曰進士以聲韵爲學多昧古今明經以帖誦爲功罕窮㫖趣自今明經問大義十條對時務策三首進士試大經十帖戊辰新羅王興光卒子承慶襲位乙酉幽州節度使張守珪破契丹於捺禄山己亥河西節度使崔希逸襲吐蕃破之於青海西初希逸遣使謂吐蕃邊將乞力徐曰兩國通好今爲一家何必更置兵守捉妨人耕牧請皆罷之乞力徐曰常侍忠厚言必不欺然朝廷未必専以邊事相委萬一有姦人交鬬其間掩吾不僃悔之何及希逸固請乃刑白狗爲盟各去守僃於是吐蕃畜牧被野時吐蕃西擊勃律勃律來告急上命吐蕃罷兵吐蕃不奉詔遂破勃律上甚怒㑹希逸傔人孫誨入奏事自欲求功奏稱吐蕃無備請掩擊必大獲上命内給事趙惠琮與誨偕往審察事宜惠琮等至則矯詔令希逸襲之希逸不得已發兵自涼州南入吐蕃境二千餘里至青海西與吐蕃戰大破之斬首二千餘級乞力徐脱身走惠琮誨皆受厚賞自是吐蕃復絶朝貢夏四月辛酉監察御史周子諒彈牛仙客非才引䜟書爲證上怒甚命左右㩧於殿庭絶而復蘇仍杖之朝堂流瀼州至藍田而死李林甫言子諒張九齡所薦也甲子貶九齡荆州長史楊洄又譖太子瑛鄂王瑶光王琚云與太子妃兄駙馬薛鏽潜構異謀上召宰相謀之李林甫對曰此陛下家事非臣等所宜豫上意乃决乙丑使宦者宣制於宫中廢瑛瑶琚爲庶人流鏽於瀼州瑛瑶琚尋賜死城東驛鏽賜死於藍田瑶琚皆好學有才識死不以罪人皆惜之丙寅瑛舅家趙氏妃家薛氏瑶舅家皇甫氏坐流貶者數十人惟瑶妃家韋氏以妃賢得免五月夷州刺史楊濬坐贓當死上命杖之六十流古州左丞相裴耀卿上䟽以爲决杖贖死恩則甚優解體受笞事頗爲辱止可施之徒􅀠不當及於士人上從之癸未敕以方隅厎定令中書門下與諸道節度使量軍鎮閑劇利害審計兵防定額於諸色征人及客户中召募丁壯長充邊軍増給田宅務加優恤辛丑上命有司選宗子有才者授以臺省及灋官京縣官敇曰違道慢常義無私於王灋修身効節恩豈薄於它人期於帥先勵我風俗秋七月己夘大理少卿徐嶠奏今歳天下斷死刑五十八大理獄院由來相傳殺氣大盛鳥雀不梄今有鵲巢其樹於是百官以幾致刑措上表稱賀上歸功宰輔庚辰賜李林甫爵晉國公牛仙客􅃎國公上命李林甫牛仙客與灋官刪修律令格式成九月壬申頒行之先是西北邊數十州多宿重兵地租營田皆不能贍始用和糴之灋有彭果者因牛仙客獻策請行糴灋於關中戊子敕以歳稔榖賤傷農命増時價什二三和糴東西畿粟各數百萬斛停今年江淮所運租自是關中蓄積羡溢車駕不復幸東都矣癸巳敕河南北租應輸含嘉太原倉者皆留輸本州太常博士王璵上䟽請立青帝壇以迎春從之冬十月辛丑制自今立春親迎春於東郊時上頗好祀神鬼故璵專習祠祭之禮以干時上恱之以爲侍御史領祠祭使璵祈禱或焚紙錢類巫覡習禮者羞之壬申上幸驪山温泉乙酉還宫己丑開府儀同三司廣平文貞公宋璟薨十二月丙午惠妃武氏薨贈謚貞順皇后是歳命將作大匠康諐素之東都毁明堂諐素上言毁之勞人請去上層卑於舊九十五尺仍舊爲乾元殿從之初令庸調租資課皆以土物輸京都二十六年春正月乙亥以牛仙客爲侍中丁丑上迎氣於滻水之東制邊地長征兵召募向足自今鎮兵勿復遣在彼者縱還令天下州縣里别置學壬辰以李林甫領隴右節度副大使以鄯州都督杜希望知留後二月乙夘以牛仙客兼河東節度副大使己未葬貞順皇后于敬陵壬戊敇河曲六州胡坐康侍賔散􅀠諸州者聽還故土於鹽夏之間置宥州以處之三月吐蕃宼河西節度使崔希逸擊破之鄯州都督知隴右留後杜希望攻吐蕃新城拔之以其地爲威戎軍置兵一千戌之夏五月乙酉李林甫兼河西節度使丙申以崔希逸爲河南尹希逸自念失信於吐蕃内懷愧恨未幾而卒太子瑛既死李林甫數勸上立夀王瑁上以忠王璵年長且仁孝恭謹又好學意欲立之猶豫歳餘不决自念春秋浸髙三子同日誅死繼嗣未定常忽忽不樂寢膳爲之減髙力士乗間請其故上曰汝我家老奴豈不能揣我意力士曰得非以郎君未定邪上曰然對曰大家何必如此虚勞聖心但推長而立誰敢復爭上曰汝言是也汝言是也由是遂定六月庚子立璵爲太子辛丑以岐州刺史蕭炅爲河西節度使揔留後事鄯州都督杜希望爲隴右節度使太僕卿主昱爲劒南節度使分道經略吐蕃仍毁所立赤嶺碑突騎施可汗蘇禄素廉儉毎攻戰所得輒與諸部分之不留私蓄由是衆樂爲用既尚唐公主又潜通突厥及吐蕃突厥吐蕃各以女妻之蘇禄以三國女爲可敦又立數子爲葉䕶用度浸廣由是攻戰所得不復更分晚年病風一手攣縮諸部離心酋長莫賀逹干都摩度兩部最彊其部落又分爲黄姓黑姓互相乖阻於是莫賀逹干勒兵夜襲蘇禄殺之都摩度初與莫賀逹干連謀既而復與之異立蘇禄之子骨啜爲吐火仙可汗以收其餘衆與莫賀逹干相攻莫賀逹干遣使告磧西節度使蓋嘉運上命嘉運招集突騎施拔汗那以西諸國吐火仙與都摩度據碎葉城黑姓可汗爾微特勒據怛邏斯城相與連兵以拒唐太子將受冊命儀注有中嚴外辦及絳紗袍太子嫌與至尊同稱表請易之左丞相裴耀卿奏停中嚴改外辦曰外僃改絳紗袍爲朱明服秋七月己巳上御宣政殿冊太子故事太子乗輅至殿門至是太子不就輅自其宫歩入是日赦天下己夘冊忠王妃韋氏爲太子妃杜希望將鄯州之衆奪吐蕃河橋築鹽泉城於河左吐蕃發兵三萬逆戰希望衆少不敵將卒皆懼左威衛郎將王忠嗣帥所部先犯其陳所向闢易殺數百人虜陳亂希望縱兵乗之虜遂大敗置鎮西軍於鹽泉忠嗣以功遷左金吾將軍八月辛巳勃海王武藝卒子欽茂立九月丙申朔日有食之初儀鳯中吐蕃䧟安戎城而據之其地險要唐屢攻之不克劒南節度使王昱築兩城於其側頓軍蒲婆嶺下運資糧以逼之吐蕃大發兵救安戎城昱衆大敗死者數千人昱脱身走糧仗軍資皆弃之貶昱括州刺史再貶髙要尉而死戊午冊南詔䝉歸義爲雲南王歸義之先本哀牢夷地居姚州之西東南接交趾西北接吐蕃蠻語謂王曰詔先有六詔曰䝉舍曰䝉越曰越折曰浪穹曰様備曰越澹兵刀相埒莫能相壹歷代因之以分其勢䝉舍最在南故謂之南詔髙宗時䝉舍細奴邏初入朝細奴邏生邏盛邏盛生盛邏皮盛邏皮生皮邏閣皮邏閣浸彊大而五詔微弱㑹有破渳河蠻之功乃賂王昱求合六詔爲一昱爲之奏請朝廷許之仍賜名歸義於是以兵威脅服羣蠻不從者滅之遂擊破吐蕃徙居大和城其後卒爲邊患冬十月戊寅上幸驪山温泉壬辰上還宫是嵗於西京東都往來之路作行宫千餘間分左右羽林置龍武軍以萬騎營􅀠焉潤州刺史齊澣奏舊自􅀲歩濟江迂六十里請自京口埭下直濟江穿伊婁河二十五里即逹楊子縣立伊婁埭從之二十七年春正月壬寅命隴右節度大使榮王琬自至本道廵桉處置諸軍選募關内河東壯士三五萬人詣隴右防遏至秋末無宼聽還羣臣請加尊號曰聖文二月己巳許之因赦天下免百姓今年田租夏四月癸酉敕諸隂陽術數自非昬喪卜擇皆禁之己丑以牛仙客爲兵部尚書兼侍中李林甫爲吏部尚書兼中書令揔文武選事六月癸酉以御史大夫李適之兼幽州節度使幽州將趙堪白真陁羅矯節度使張守珪之命使平盧軍使烏知義邀擊叛奚餘黨於横水之北知義不從白真陁羅矯稱制指以迫之知義不得已出師與虜遇先勝後敗守珪隱其敗狀以克獲聞事頗泄上令内謁者監牛仙童往察之守珪重賂仙童歸罪於白真陁羅逼令自縊死仙童有寵於上衆宦官疾之共發其事上怒甲戌命楊思朂杖殺之思勗􅅞格杖之數百刳取其心割其肉㗖之守珪坐貶括州刺史太子太師蕭嵩嘗賂仙童以城南良田數頃李林甫發之嵩坐貶青州刺史秋八月乙亥磧西節度使蓋嘉運擒突騎施可汗吐火仙嘉運攻碎葉城吐火仙出戰敗走擒之於賀邏嶺分遣踈勒鎮守使夫蒙靈詧與拔汗那王阿悉爛逹干潜引兵突入怛邏斯城擒黑姓可汗爾微遂入曳建城取交河公主悉收散髪之民數萬以與㧞汗那王威震西陲壬午吐蕃宼白草安人等軍隴右節度使蕭炅擊破之甲申追謚孔子爲文宣王先是祀先聖先師周公南向孔子東向坐制自今孔子南向坐被王者之服釋奠用宫懸追贈弟子皆爲公矦伯九月戊午處木昆鼠尼施弓月等諸部先􅀠突騎施者皆帥衆内附仍請徙居安西管内太子更名紹冬十月辛巳改修東都明堂丙戌上幸驪山温泉十一月辛丑還宫甲辰明堂成劒南節度使張宥文吏不習軍旅悉以軍政委團練副使章仇兼瓊兼瓊入奏事盛言安戎城可取上恱之丁巳以宥爲光禄卿十二月以兼瓊爲劒南節度使初睿宗喪既除祫于太廟自是三年一祫五年一禘是歳夏既禘冬又當祫太常議以爲祭數則凟請停今年祫祭自是通計五年一祫一禘從之二十八年春正月癸巳上幸驪山温泉庚子還宫二月荆州長史張九齡卒上雖以九齡忤㫖逐之然終愛重其人每宰相薦士輙問曰風度得如九齡不三月丁亥朔日有食之章仇兼瓊濳與安戎城中吐蕃翟都􅈰及維州别駕董承晏結謀使􅈰開門引内唐兵盡殺吐蕃將卒使監察御史許逺將兵守之逺敬宗之曾孫也甲寅蓋嘉運入獻㨗上赦吐火仙罪以爲左金吾大將軍嘉運請立阿史那懷道之子昕爲十姓可汗從之夏四月辛未以昕妻李氏爲交河公主六月吐蕃圍安戎城上嘉蓋嘉運之功以爲河西隴右節度使使之經略吐蕃嘉運恃恩流連不時發左丞相裴耀卿上䟽以爲臣近與嘉運同班觀其舉措誠勇烈有餘然言氣矜誇恐難成事昔莫敖忸於蒲騷之役卒喪楚師今嘉運有驕敵之色臣竊憂之况防秋非逺未言發日若臨事始去則吏卒尚未相識何以制敵且將軍受命鑿凶門而出今乃酣宴朝夕殆非憂國愛人之心若不可改易宜速遣進塗仍乞聖恩嚴加訓勵上乃趣嘉運行已而嘉運竟無功秋八月甲戌幽州奏破奚契丹冬十月甲子上幸驪山温泉辛巳還宫吐蕃宼安戎城及維州發關中彊騎救之吐蕃引去更命安戎城曰平戎十一月罷牛仙客朔方河東節度使突騎施莫賀逹干聞阿史那昕爲可汗怒曰首誅蘇禄我之謀也今立史昕何以賞我遂帥諸部叛上乃立莫賀逹干爲可汗使統突騎施之衆命蓋嘉運招諭之十二月乙夘莫賀逹干降金城公主薨吐蕃告喪且請和上不許是歳天下縣千五百七十三户八百四十一萬二千八百七十一口四千八百一十四萬三千六百九西京東都米斛直錢不滿二百絹匹亦如之海内富安行者雖萬里不持寸兵二十九年春正月癸巳上幸驪山温泉丁酉制承前諸州饑饉皆待奏報然始開倉賑給道路悠逺何救懸絶自今委州縣長官與采訪使量事給訖奏聞庚子上還宫上夢􅀇元皇帝告云吾有像在京城西南百餘里汝遣人求之吾當與汝興慶宫相見上遣使求得之於盩厔樓觀山間夏閏四月迎置興慶宫五月命畫􅀇元真容分置諸州開元觀六月吐蕃四十萬衆入宼至安仁軍渾崖峰騎將臧希液帥衆五千擊破之秋七月丙寅突厥遣使來告登利可汗之喪初登利從叔二人分典兵馬號左右殺登利患兩殺之專與其母謀誘右殺斬之自將其衆左殺判闕特勒勒兵攻登利殺之立毗伽可汗之子爲可汗俄爲骨咄葉䕶所殺更立其弟尋又殺之骨咄葉䕶自立爲可汗上以突厥内亂癸酉命左羽林將軍孫老奴招諭回紇葛邏禄㧞悉宻等部落乙亥東都洛水溢溺死者千餘人平盧兵馬使安禄山傾巧善事人人多譽之上左右至平盧者禄山皆厚賂之由是上益以爲賢御史中丞張利貞爲河北采訪使至平盧禄山曲事利貞乃至左右皆有賂利貞入奏盛稱禄山之美八月乙未以禄山爲營州都督充平盧軍使兩蕃渤海黑水四府經略使冬十月丙申上幸驪山温泉壬寅分北庭安西爲二節度十一月庚戌司空邠王守禮薨守禮庸鄙無才識毎天將雨及霽守禮必先言之已而皆驗􅄮薛諸王言於上曰邠兄有術上問其故對曰臣無術則天時以章懷之故幽閉宫中十餘年歳賜敕杖者數四背瘢甚厚將雨則沈悶將霽則輕爽臣以此知之耳因流涕霑襟上亦爲之慘然辛酉上還宫辛未太尉寧王憲薨上哀惋特甚曰天下兄之天下也兄固讓於我爲唐太伯常名不足以處之乃謚曰讓皇帝其子汝陽王璡上表追述先志謙冲不敢當帝號上不許斂日内出服以手書致於靈座書稱隆基白又名其基曰惠陵追謚其妃元氏曰㳟皇后祔葬焉十二月乙巳吐蕃屠逹化縣䧟石堡城蓋嘉運不能禦卷第二百一十四終
