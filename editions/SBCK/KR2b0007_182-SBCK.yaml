body:
  text: 臣司馬光奉勑編集隋紀六䝉大淵獻凡三年起昭陽作噩盡旃煬皇帝中大業九年春正月丁丑詔徴天下兵集涿郡始募民為驍果修遼東古城以貯軍糧靈武賊帥白瑜娑劫掠牧馬北連突厥隴右多被其患謂之奴賊戊戌赦天下己亥命刑部尚書衛文昇等輔代王侑留守西京二月壬午詔宇文述以兵糧不繼遂陷王師乃軍吏失於支料非述之罪宜復其官爵尋又加開府儀同三司帝謂侍臣曰髙麗小虜侮慢上國今抜海移山猶望克果况此虜乎乃復議伐髙麗左光祿大夫郭榮諫曰戎狄失禮臣下之事千鈞之弩不爲鼷䑕發機柰何親辱萬乘以敵小冦乎帝不聽三月丙子濟隂孟海公起爲盗保據周橋衆至數萬見人稱引書史輙殺之丁丑發丁男十萬城大興戊寅帝幸遼東命民部尚書樊子蓋等輔越王侗留守東都時所在盗起齊郡王薄孟讓北海郭方預清河張金稱平原郝孝徳河間格謙勃海孫宣雅各聚衆攻剽多者十餘萬少者數萬人山東苦之天下承平日乆人不習兵郡縣吏每與賊戰望風沮敗唯齊郡丞閺鄉張須陀得士衆心勇决善戰將郡兵擊王薄於泰山下薄恃其驟勝不設備須陀掩擊大破之薄收餘兵將北度河須陀追擊於臨邑又破之薄北連孫宣雅郝孝徳等十餘萬攻章丘須陀帥歩騎二萬擊之賊衆大敗賊帥裴長才等衆二萬掩至城下大掠須陀未暇集兵帥五騎與戰賊競赴之圍百餘重身中數創勇氣彌厲㑹城中兵至賊稍却須陀督衆擊之長才等敗走庚子郭方預等合軍攻陷北海大掠而去須陀謂官屬曰賊恃其彊謂我不能救吾今速行破之必矣乃簡精兵倍道進擊大破之斬數萬級前後獲賊輜重不可勝計歴城羅士信年十四從須陀擊賊於濰水上賊始布陳士信馳至陳前刺殺數人斬一人首擲空中以稍盛之掲以略陳賊徒愕眙莫敢近須陀因引兵奮擊賊衆大潰士信逐北每殺一人劓其鼻懐之還以驗殺賊之數須陀歎賞引置左右每戰須陀先登士信為副帝遣使慰諭并畫須陀士信戰陳之狀而觀之夏四月庚午車駕度遼壬申遣宇文述與上大將軍楊義臣趣平壤左光祿大夫王仁恭出扶餘道仁恭進軍至新城髙麗兵數萬拒戰仁恭帥勁騎一千擊破之髙麗嬰城固守帝命諸將攻遼東聽以便宐從事飛樓橦雲梯地道四面俱進晝夜不息而髙麗應變拒之二十餘日不拔主客死者甚衆衝梯竿長十五丈驍果吳興沈光升其端臨城與髙麗戰短兵接殺十數人髙麗競擊之而墜未及地適遇竿有垂絙光接而復上帝望見壯之即拜朝散大夫恒置左右禮部尚書楊􅀇感驍勇便騎射好讀書喜賔客海内知名之士多與之遊與蒲山公李密善密弼之曾孫也少有才略志氣雄遠輕財好士為左親侍帝見之謂宇文述曰向者左仗下黑色小兒聸視異常勿令宿衛述乃諷密使稱病自免密遂屏人事專務讀書嘗乘黄牛讀漢書楊素遇而異之因召至家與語大悦謂其子􅀇感等曰李密識度如此汝等不及也由是􅀇感與為深交時或侮之密曰人言當指實寧可面諛若决機兩陳之間喑嗚咄嗟使敵人震懾密不如公驅䇿天下賢俊各申其用公不如密豈可以階級稍崇而輕天下士大夫邪􅀇感笑而服之素恃功驕倨朝宴之際或失臣禮帝心銜而不言素亦覺之及素薨帝謂近臣曰使素不死終當族滅􅀇感頗知之且自以累世貴顯在朝文武多父之故吏見朝政日紊而帝多猜忌内不自安乃與諸弟濳謀作亂帝方事征伐􅀇感自言世荷國恩願為將領帝喜曰將門必有將相門必有相固不虚也由是寵遇日隆頗預朝政帝伐髙麗命􅀇感於黎陽督運遂與虎賁郎將王仲伯汲郡賛治趙懐義等謀故逗遛漕運不時進發欲令度遼諸軍乏食帝遣使者促之􅀇感揚言水路多盗不可前後而發􅀇感弟虎賁郎將􅀇縱鷹揚郎將萬石並從幸遼東􅀇感濳遣人召之二人皆亡還萬石至髙陽為監事許華所執斬於涿郡時右驍衛大將軍來䕶兒以舟師自東萊將入海趣平壤􅀇感遣家奴偽為使者從東方來詐稱䕶兒反六月乙巳􅀇感入黎陽縣閉城大索男夫取㠶布為牟甲署官屬皆凖開皇之舊移書傍郡以討䕶兒為名各令發兵㑹於倉所郡縣官有幹用者􅀇感皆以運糧追集之以趙懐義為衛州刺史東光尉元務本為黎州刺史河内郡主簿唐禕為懐州刺史治書侍御史游元督運在黎陽􅀇感謂曰獨矢肆虐陷身絶域此天亡之時也我今親帥義兵以誅無道卿意如何元正色曰尊公荷國寵靈近古無比公之弟兄青紫交映當謂竭誠盡節上荅鴻恩豈意墳土未乾親圖反噬僕有死而已不敢聞命􅀇感怒而囚之屢脅以兵不能屈乃殺之元明根之孫也􅀇感選運夫少壯者得五千餘人丹陽宣城篙梢三千餘人刑三牲誓衆且諭之曰主上無道不以百姓為念天下騷擾死遼東者以萬計今與君等起兵以救兆民之弊何如衆皆踊躍稱萬嵗乃勒兵部分唐禕自􅀇感所逃歸河内先是􅀇感隂遣家僮至長安召李密及弟􅀇挺赴黎陽及舉兵密適至􅀇感大喜以為謀主謂密曰子常以濟物為己任今其時矣計將安出密曰天子岀征逺在遼外去幽州猶隔千里南有巨海北有彊胡中閒一道理極艱危公擁兵出其不意長驅入薊據臨渝之險扼其咽喉歸路既絶髙麗聞之必躡其後不過旬月資糧皆盡其衆不降則潰可不戰而擒此上計也􅀇感曰更言其次密曰關中四塞天府之國雖有衛文昇不足為意今帥衆鼓行而西經城勿攻直取長安收其豪傑撫其士民據險而守之天子雖還失其根本可徐圖也􅀇感曰更言其次密曰簡精鋭晝夜倍道襲取東都以號令四方但恐唐禕告之先已固守若引兵攻之百日不克天下之兵四面而至非僕所知也􅀇感曰不然今百官家口並在東都若先取之足以動其心且經城不拔何以示威公之下計乃上䇿也遂引兵向洛陽遣楊􅀇挺將驍勇千人為前鋒先取河内唐禕據城拒守􅀇挺無所獲禕又使人告東都越王侗與樊子蓋等勒兵為備脩武民相帥守臨清關􅀇感不得度乃於汲郡南度河從之者如市使弟積善將兵三千自偃師南緣洛水西入􅀇挺自白司馬坂逾邙山南入􅀇感將三千餘人隨其後相去十里許自稱大軍其兵皆執單刀栁楯無弓矢甲胄東都遣河南令達奚善意將精兵五千人拒積善將作監河南賛治裴􅀪䇿將八千人拒􅀇挺善意度洛南營於漢王寺明日積善兵至不戰自潰鎧仗皆為積善所取􅀪䇿出至白司馬坂一戰敗走弃鎧仗者太半􅀇挺亦不追􅀪䇿退三四里收散兵復結陳以待之􅀇挺徐至坐息良乆忽起擊之􅀪䇿又敗如是五戰丙辰􅀇挺直抵太陽門􅀪䇿將十餘騎馳入宫城自餘無一人返者皆歸於􅀇感􅀇感屯上春門每誓衆曰我身為上柱國家累鉅萬金至於富貴無所求也今不顧滅族者但為天下解倒懸之急耳衆皆悦父老爭獻牛酒子弟詣軍門請自効者日以千數内史舍人韋福嗣洸之兄子也從軍出拒􅀇感為􅀇感所獲􅀇感厚禮之使與其黨胡師耽共掌文翰􅀇感令福嗣為書遺樊子蓋數帝罪惡云今欲廢昬立明願勿拒小禮自貽伊戚樊子蓋新自外藩入為京官東都舊官多慢之至於部分軍事未甚承稟裴􅀪䇿與子蓋同班前出討賊失利子蓋更使出戰不肯行子蓋命引出斬之以徇國子祭酒河東楊汪小有不恭子蓋又將斬之汪頓首流血乃得免於是將吏震肅無敢仰視令行禁止􅀇感盡鋭攻城子蓋隨方拒守􅀇感不能克然達官子弟應募從軍者聞􅀪䇿死皆不敢入城韓擒虎子世咢觀王雄子恭道虞世基子柔來䕶兒子淵裴藴子爽大理卿鄭善果子儼周羅㬋子仲等四十餘人皆降於􅀇感􅀇感悉以親要重任委之善果譯之兄子也􅀇感收兵得五萬餘人分五千人守慈磵道五千守伊闕道遣韓世咢將三千人圍滎陽顧覺將五千人取虎牢虎牢降以覺為鄭州刺史鎮虎牢代王侑使刑部尚書衛文昇帥兵四萬救東都文昇至華隂掘楊素冢焚其骸骨示士卒以必死遂鼓行出崤澠直趨東都城北玄感逆拒之文昇且戰且行屯於金谷遼東城乆不拔帝遣造布囊百餘萬口滿貯土欲積爲魚梁大道闊三十歩髙與城齊使戰士登而攻之又作八輪樓車髙出於城夾魚梁道欲俯射城内指期將攻城内危蹙㑹楊玄感反書至帝大懼引納言蘇威入帳中謂曰此兒聦明得無爲患威曰夫識是非審成敗乃謂之聦明􅀇感麤踈必無所慮但恐因此寖成亂階耳帝又聞達官子弟皆在玄感所益憂之兵部侍郎斛斯政素與玄感善玄感之反政與之通謀􅀇縱兄弟亡歸政濳遣之帝將窮治􅀇縱等黨與政内不自安戊辰亡奔髙麗庚午夜二更帝密召諸將使引軍還軍資器械攻具積如丘山營壘帳幕案堵不動皆弃之而去衆心恼懼無復部分諸道分散髙麗即時覺之然不敢出但於城内鼓譟至來日午時方漸出外四遠覘偵猶疑隋軍詐之經二日乃出數千兵追躡畏隋軍之衆不敢逼常相去八九十里將至遼水知御營畢度乃敢逼後軍時後軍猶數萬人髙麗隨而抄擊最後羸弱數千人為所殺略初帝再征髙麗復問太史令庾質曰今叚何如對曰臣實愚迷猶執前見陛下若親動萬乘勞費實多帝怒曰我自行猶不克直遣人去安得有功及還謂質曰卿前不欲我行當為此耳􅀇感其有成乎質曰􅀇感地勢雖隆素非人望因百姓之勞兾幸成功今天下一家未易可動帝遣虎賁郎將陳稜攻元務本於黎陽又遣左翊衛大將軍宇文述左候衛將軍屈突通乘傳發兵以討􅀇感來䕶兒至東萊聞􅀇感圍東都召諸將議旋軍救之諸將咸以無敕不宐擅還固執不從䕶兒厲聲曰洛陽被圍心腹之疾髙麗逆命猶疥癬耳公家之事知無不為專擅在吾不關諸人有沮議者軍灋從事即日廻軍令子􅀪整馳驛奏聞帝時還至涿郡已敕䕶兒救東都見􅀪整甚悦賜䕶兒璽書曰公旋師之時是朕敕公之日君臣意合遠同符契先是右武候大將軍李子雄坐事除名令從軍自効從來䕶兒在東萊帝疑之詔鎻子雄送行在所子雄殺使者逃奔􅀇感衛文昇以歩騎二萬度瀍水與􅀇感戰􅀇感屢破之􅀇感每戰身先士卒所向摧陷又善撫悦其下皆樂為致死由是每戰多捷衆益盛至十萬人文昇衆寡不敵死傷太半且盡乃更進屯邙山之陽與􅀇感决戰一日十餘合㑹楊􅀇挺中流矢死􅀇感軍乃稍却秋七月癸未餘抗民劉元進起兵以應􅀇感元進手長尺餘臂垂過膝自以相表非常隂有異志㑹帝再發三吳兵征髙麗三吳兵皆相謂曰往嵗天下全盛吾輩父兄征髙麗者猶太半不返今已罷弊復為此行吾屬無遺類矣由是多亡命郡縣捕之急聞元進舉兵亡命者雲集旬月閒衆至數萬始楊􅀇感至東都自謂天下響應功在朝夕得韋福嗣委以心膂不復專任李密福嗣每畫䇿皆持兩端密揣知其意謂􅀇感曰福嗣元非同盟實懐觀望明公初起大事而姦人在側聽其是非必為所誤請斬之􅀇感曰何至於此密退謂所親曰楚公好反而不欲勝吾屬今為虜矣李子雄勸􅀇感速稱尊號􅀇感以問密密曰昔陳勝自欲稱王張耳諫而被外魏武將求九錫荀彧止而見誅今者密欲正言還恐追蹤二子阿䛕順意又非密之本圖何者兵起以來雖復頻捷至於郡縣未有從者東都守禦尚彊天下救兵益至公當挺身力戰早定關中廼亟欲自尊何示人不廣也􅀇感笑而止屈突通引軍屯河陽宇文述繼之􅀇感問計於李子雄子雄曰通曉習兵事若一得度河則勝負難决不如分兵拒之通不能濟則樊衛失援􅀇感然之將拒通樊子蓋知其謀數擊其營􅀇感不得往通濟河軍於破陵􅀇感分為兩軍西抗文昇東拒通子蓋復出兵大戰􅀇感軍屢敗與其黨謀之李子雄曰東都援軍益至我軍數敗不可乆留不如直入闗中開永豐倉以振貧乏三輔可指麾而定據有府庫東面而爭天下亦霸王之業也李密曰􅀪化留守元􅀪嗣握彊兵在隴右可聲言其反遣使迎公因此入關可以紿衆㑹華隂諸楊請為鄉導壬辰􅀇感解東都圍引兵西趣潼闗宣言我已破東都取闗西矣宇文述等諸軍躡之至􅀪農宫父老遮説􅀇感曰宫城空虚又多積粟攻之易下􅀇感以為然􅀪農太守蔡王智積謂官屬曰􅀇感聞大軍將至欲西圖關中若成其計則難克也當以計縻之使不得進不出一旬可以成擒及􅀇感軍至城下智積登陴詈之􅀇感怒留攻之李密諫曰公今詐衆西入軍事貴速况乃追兵將至安可稽留若前不得據關退無所守大衆一散何以自全􅀇感不從遂攻之燒其城門智積於内益火􅀇感兵不得入三日不拔乃引而西至閺鄉宇文述衛文昇來䕶兒屈突通等軍追及之於皇天原􅀇感上槃豆布陳亘五十里且戰且行􅀇感一日三敗八月壬寅􅀇感陳於董杜原諸軍擊之􅀇感大敗獨與十餘騎奔上洛追騎至􅀇感叱之皆反走至葭蘆戍獨與弟積善徒步走自度不免謂積善曰我不能受人戮辱汝可殺我積善抽刀斫殺之因自刺不死為追兵所執與􅀇感首俱送行在所磔􅀇感尸於東都市三日復臠而焚之􅀇感弟􅀇奬為義陽太守將赴􅀇感為郡丞周旋玉所殺仁行為朝請大夫伏誅於長安􅀇感之圍東都也梁郡民韓相國舉兵應之􅀇感以為河南道元帥旬月閒衆十餘萬攻剽郡縣至襄城聞􅀇感敗衆稍散為吏所獲傳首東都帝以元􅀪嗣斛斯政之親也留守􅀪化郡遣衛尉少卿李淵馳徃執之因代為留守關右十三郡兵皆受徴發淵御衆寛簡人多附之帝以淵相表竒異又名應圖䜟忌之未幾徴詣行在所淵遇疾未謁其甥王氏在後宫帝問曰汝舅來何遲王氏以疾對帝曰可得死否淵聞之懼因縱酒納賂以自晦癸夘吳郡朱爕晉陵管崇聚衆冦掠江左爕本還俗道人渉獵經史頗知兵法形容眇小為崑山縣慱士與數十學生起兵民苦役者赴之如歸崇長大美姿容志氣倜儻隠居常孰自言有王者相故羣盗相與奉之時帝在涿郡命虎牙郎將趙六兒將兵萬人屯楊子分為五營以備南賊崇遣其將陸顗度江夜襲六兒破其兩營收其器械軍資而去衆益盛至十萬辛酉司農卿雲陽趙元淑坐楊􅀇感黨伏誅帝使大理卿鄭善果御史大夫裴藴刑部侍郎骨儀與留守樊子蓋推􅀇感黨與儀本天竺胡人也帝謂藴曰􅀇感一呼而從者十萬益知天下人不欲多多即相聚為盗耳不盡加誅無以懲後子蓋性既殘酷藴復受此㫖由是峻法治之所殺三萬餘人皆籍没其家枉死者太半流徙者六千餘人􅀇感之圍東都也開倉賑給百姓凡受米者皆阬之於都城之南􅀇感所善文士㑹稽虞綽琅邪王胄俱坐徙邊綽胄亡命捕得誅之帝善屬文不欲人出其右薛道衡死帝曰更能作空梁落燕泥否王胄死帝誦其佳句曰庭草無人隨意綠復能作此語邪帝自負才學每驕天下之士嘗謂侍臣曰天下皆謂朕承籍緒餘而有四海設令朕與士大夫髙選亦當爲天子矣帝從容謂祕書郎虞丗南曰我性不喜人諫若位望通顯而諫以求名者彌所不耐至於卑賤之士雖少寛假然卒不置之地上汝其知之丗南丗基之弟也帝使裴矩安集隴右因之㑹寧存問曷薩那可汗部落遣闕逹度設冦掠吐谷渾以自富還而奏狀帝大賞之九月己夘東海民彭孝才起爲盗有衆數萬甲午車駕至上谷以供費不給免太守虞荷等官閏月己巳幸博陵冬十月丁丑賊帥吕明星圍東郡虎賁郎將費青奴擊破之劉元進帥其衆將度江㑹楊􅀇感敗朱燮管崇共迎元進推以為主據吳郡稱天子燮崇俱為尚書僕射署置百官毗陵東陽㑹稽建安豪傑多執長吏以應之帝遣左屯衛大將軍代人吐萬緒光祿大夫下邽魚俱羅將兵討之十一月己酉右候衛將軍馮孝慈討張金稱於清河孝慈敗死楊􅀇感之西也韋福嗣亡詣東都歸首是時如其比者皆不問樊子蓋收􅀇感文簿得其書草封以呈帝帝命執送行在李密亡命為人所獲亦送東都樊子蓋鎻送福嗣密及楊積善王仲伯等十餘人詣髙陽密與王仲伯等竊謀亡去悉使出其所齎金以示使者曰吾等死日此金並留付公幸用相瘞其餘即皆報徳使者利其金許諾防禁漸弛密請通市酒食每宴飲諠譁竟夕使者不以為意行至魏郡石梁驛飲防守者皆醉穿墻而逸密呼韋福嗣同去福嗣曰我無罪天子不過一面責我耳至髙陽帝以書草示福嗣收付大理宇文述奏凶逆之徒臣下所當同疾若不為重法無以肅將來帝曰聽公所為十二月甲申述就野外縛諸應刑者於格上以車輪括其頸使文武九品以上皆持兵斫射亂發矢如蝟毛支體糜碎猶在車輪中積善福嗣仍加車裂皆焚而揚之積善自言手殺􅀇感兾得免死帝曰然則梟類耳因更其姓曰梟氏唐縣人宋子賢善幻術能變佛形自稱彌勒出世遠近信惑遂謀因無遮大㑹舉兵襲乘輿事泄伏誅并誅黨與千餘家扶風桑門向海明亦自稱彌勒出世人有歸心者輙獲吉夢由是三輔人翕然奉之因舉兵反衆至數萬丁亥海明自稱皇帝改元白烏詔太僕卿楊義臣擊破之帝召衛文昇樊子蓋詣行在慰勞之賞賜極厚遣還所任劉元進攻丹陽吐萬緒濟江擊破之元進解圍去緒進屯曲阿元進結栅拒緒相持百餘日緒擊之賊衆大潰死者以萬數元進挺身夜遁保其壘朱燮管崇等屯毗陵連營百餘里緒乘勝進擊復破之賊退保黄山緒圍之元進燮僅以身免於陳斬崇及其將卒五千餘人收其子女三萬餘口進解㑹稽圍魚俱羅與緒偕行戰無不捷然百姓從亂者如歸市賊敗而復聚其勢益盛元進退據建安帝令緒進討緒以士卒疲弊請息甲待來春帝不悦俱羅亦以賊非嵗月可平諸子在洛京濳遣家僕迎之帝怒有司希㫖奏緒怯懦俱羅敗衂俱羅坐斬徴緒詣行在緒憂憤道卒帝更遣江都丞王世充發淮南兵數萬人討元進世充度江頻戰皆捷元進燮敗死於吳其餘衆或降或散世充召先降者於通􅀇寺瑞像前焚香為誓約降者不殺散者始欲入海為盗聞之旬日之間歸首略盡世充悉阬之於黄亭澗死者三萬餘人由是餘黨復相聚為盗官軍不能討以至隋亡帝以世充有將帥才益加寵任是嵗詔為盗者籍没其家時羣盗所在皆滿郡縣官因之各專威福生殺任情矣章丘杜伏威與臨濟輔公祏為刎頸交俱亡命為羣盗伏威年十六每出則居前入則殿後由是其徒推以為帥下邳苗海潮亦聚衆為盗伏威使公祏謂之曰今我與君同苦隋政各舉大義力分勢弱常恐被擒若合而為一則足以敵隋矣君能為主吾當敬從自揆不堪宐來聴命不則一戰以决雌雄海潮懼即帥其衆降之伏威轉掠淮南自稱將軍江都留守遣校尉宋顥討之伏威與戰陽為不勝引顥衆入葭葦中因從上風縱火顥衆皆燒死海陵賊帥趙破陳以伏威兵少輕之召與并力伏威使公祏嚴兵居外自與左右十人齎牛酒入謁於座殺破陳并其衆十年春二月辛未詔百僚議伐髙麗數日無敢言者戊子詔復徴天下兵百道俱進丁酉扶風賊帥唐弼立李􅀪芝為天子有衆十萬自稱唐王三月壬子帝行幸涿郡士卒在道亡者相繼癸亥至臨渝宫禡祭黄帝斬叛軍者以釁鼓亡者亦不止夏四月榆林太守成紀董純與彭城賊帥張大虎戰於昌慮大破之斬首萬餘級甲午車駕至北平五月庚申延安賊帥劉迦論自稱皇王建元大世有衆十萬與稽胡相表裏爲宼詔以左驍衛大將軍屈突通爲􅀜内討捕大使發兵擊之戰於上郡斬迦論并將卒萬餘級虜男女數萬口而還秋七月癸丑車駕次懷逺鎮時天下已亂所徴兵多失期不至髙麗亦困弊來䕶兒至卑奢城髙麗舉兵逆戰䕶兒擊破之將趣平壤髙麗王元懼甲子遣使乞降囚送斛斯政帝大悦遣使持節召䕶兒還䕶兒集衆曰大軍三出未能平賊此還不可復來勞而無功吾竊恥之今髙麗實困以此衆擊之不日可克吾欲進兵徑圍平壤取髙元獻捷而歸不亦善乎荅表請行不肯奉詔長吏崔君肅固爭䕶兒不可曰賊勢破矣獨以相任自足辦之吾在閫外事當專决寧得髙元還而獲譴捨此成功所不能矣君肅告衆曰若從元帥違拒詔書必當聞奏皆應獲罪諸將懼俱請還乃始奉詔八月己巳帝自懐遠鎮班師邯鄲賊帥楊公卿帥其黨八千人抄駕後第八隊得飛黄上廐馬四十二匹而去冬十月丁夘上至東都己丑還西京以髙麗使者及斛斯政告太廟仍徴髙麗王元入朝元竟不至敕將帥嚴裝更圖後舉竟不果行初開皇之末國家殷盛朝野皆以髙麗為意劉炫獨以為不可作撫夷論以刺之至是其言始驗十一月丙申殺斛斯政於金光門外如楊積善之灋仍烹其肉使百官噉之佞者或噉之至飽收其餘骨焚而揚之乙巳有事于南郊上不齋于次詰朝備法駕至即行禮是日大風上獨獻上帝三公分獻五帝禮畢御馬疾驅而歸乙夘離石胡劉苗王反自稱天子衆至數萬將軍潘長文討之不克汲郡賊帥王徳仁擁衆數萬保林慮山為盗帝將如東都太史令庾質諫曰比嵗伐遼民實勞弊陛下宐鎮撫關中使百姓盡力農桑三五年間四海稍豐實然後廵省於事為宜帝不悦質辭疾不從帝怒下質獄竟死獄中十二月壬申帝如東都赦天下戊子入東都東海賊帥彭孝才轉掠沂水彭城留守董純討擒之純戰雖屢㨗而盗賊日滋或譖純怯懦帝怒鎻純詣東都誅之孟讓自長白山冦掠諸郡至盱眙衆十餘萬據都梁宫阻淮為固江都丞王世充將兵拒之為五栅以塞險要羸形示弱讓笑曰世充文法小吏安能將兵吾今生縳取鼓行入江都耳時民皆結堡自固野無所掠賊衆漸餒乃少留兵圍五栅分人於南方抄掠世充伺其懈縱兵出擊大破之讓以數十騎遁去斬首萬餘級齊郡賊帥左孝友衆十萬屯蹲狗山郡丞張湏陀列營逼之孝友窘迫出降須陁威振東夏以功遷齊郡通守領河南道十二郡黜陟討捕大使涿郡賊帥盧明月衆十餘萬軍祝阿須陁將萬人邀之相持十餘日糧盡將退謂將士曰賊見吾退必悉衆來追若以千人襲據其營可有大利此誠危事誰能往者衆莫對唯羅士信及歷城秦叔寶請行於是須陁委栅而遁使二人分將千兵伏葭葦中明月悉衆追之士信叔寶馳至其栅柵門閉二人超升其樓各殺數人營中大亂二人斬關以納外兵因縱火焚其三十餘栅煙熖漲天明月奔還須陁回軍奮擊大破之明月以數百騎遁去所俘斬無筭叔寶名瓊以字行十一年春正月增秘書省官百二十員並以學士補之帝好讀書著述自為楊州揔管置王府學士至百人常令修撰以至為帝前後近二十載修撰未嘗暫停自經術文章兵農地理醫卜釋道乃至蒱博鷹狗皆為新書無不精洽共成三十一部萬七千餘卷初西京嘉則殿有書三十七萬卷帝命秘書監栁顧言等詮次除其複重猥雜得正御本三萬七千餘卷納於東都修文殿又寫五十副本簡為三品分置西京東都宫省官府其正御書皆裝翦華淨寶軸錦褾於觀文殿前為書室十四間䆫户牀褥厨幔咸極珍麗每三間開方户垂錦幔上有二飛仙户外地中施機發帝幸書室有宫人執香爐前行踐機則飛仙下收幔而上户扉及厨扉皆自啓帝出則垂閉復故帝以户口逃亡盗賊繁多二月庚午詔民悉城居田隨近給郡縣驛亭村塢皆築城上谷賊帥王須拔自稱漫天王國號燕賊帥魏刀兒自稱歷山飛衆各十餘萬北連突厥南冦燕趙初髙祖夢洪水没都城意惡之故遷都大興申明公李穆薨孫筠襲爵叔父渾忿其吝嗇使兄子善衡賊殺之而證其從父弟瞿曇使之償死渾謂其妻兄左衛率宇文述曰若得紹封當嵗奉國賦之半述為之言於太子奏髙祖以渾為穆嗣二嵗之後不復以國賦與述述大恨之帝即位渾累官至右驍衛大將軍改封郕公帝以其門族彊盛忌之㑹有方士安伽陁言李氏當為天子勸帝盡誅海内凡李姓者渾從子將作監敏小名洪兒帝疑其名應䜟常面告之兾其引决敏大懼數與渾及善衡屏人私語述譖之於帝仍遣虎賁郎將河東裴仁基表告渾反帝收渾等家遣尚書左丞元文都御史大夫裴藴雜治之案問數日不得反狀以實奏聞帝更遣述窮治之述誘教敏妻宇文氏為表誣告渾謀因度遼與其家子弟為將領者共襲取御營立敏為天子述持入奏之帝泣曰吾宗社幾傾賴公獲全耳三月丁酉殺渾敏善衡及宗族三十二人自三從以上皆徙邊徼後數月敏妻亦鴆死有二孔雀自西苑飛集寶城朝堂前親衛校尉髙徳儒等十餘人見之奏以為鸞時孔雀已飛去無可得驗於是百官稱賀詔以徳儒誠心􅁳㑹肇見嘉祥擢拜朝散大夫賜物百叚餘人皆賜束帛仍於其地造儀鸞殿己酉帝行幸太原夏四月幸汾陽宫避暑宫城迫隘百官士卒布散山谷間結草為營而居之以衛尉少卿李淵爲山西河東撫慰大使承制黜陟選補郡縣文武官仍發河東兵討捕羣盗淵行至龍門擊賊帥母端兒破之秋八月乙丑帝廵北塞􅀄裴矩以突厥始畢可汗部衆漸盛獻策分其勢欲以宗女嫁其弟叱吉設拜爲南面可汗叱吉不敢受始畢聞而漸怨突厥之臣史蜀胡悉多謀略爲始畢所寵任矩詐與爲互市誘至馬邑下殺之遣使詔始畢曰史蜀胡悉叛可汗來降我已相爲斬之始畢知其狀由是不朝戊辰始畢帥騎數十萬謀襲乘輿義成公主先遣使者告變壬申車駕馳入鴈門齊王暕以後軍保崞縣癸酉突厥圍鴈門上下惶怖撤民屋以爲守禦之具城中兵民十五萬口食僅可支二旬鴈門四十一城突厥克其三十九唯鴈門崞不下突厥急攻鴈門矢及御前上大懼抱趙王杲而泣目盡腫左衛大將軍宇文􅄒勸帝􅂤精銳數千􅀐潰圍而岀納言蘇威曰城守則我有餘力輕􅀐乃彼之所長陛下萬乘之主豈宐輕動民部尚書樊子蓋曰陛下乘危徼幸一朝狼狽悔之何及不若據堅城以挫其鋭坐徴四方兵使入援陛下親撫循士卒諭以不復征遼厚為勲格必人人自奮何憂不濟内史侍郎蕭瑀以為突厥之俗可賀敦預知軍謀且義成公主以帝女嫁外夷必恃大國之援若使一介告之借使無益庸有何損又將士之意恐陛下既免突厥之患還事髙麗若發明詔諭以赦髙麗專討突厥則衆心皆安人自爲戰矣瑀皇后之弟也虞世基亦勸帝重爲賞格下詔停遼東之役帝從之帝親廵將士謂之曰弩力擊賊苟能保全凡在行陳勿憂富貴必不使有司弄刀筆破汝勲勞乃下令守城有功者無官直除六品賜物百段有官以次增益使者慰勞相望於道於是衆皆踊躍晝夜拒戰死傷甚衆甲申詔天下募兵守令競來赴難李淵之子世民年十六應募􅀠屯衛將軍雲定興説定興多齎旗鼓為疑兵曰始畢敢舉兵圍天子必謂我倉猝不能赴援故也宐晝則引旌旗令數十里不絶夜則鉦鼓相應虜必謂救兵大至望風遁去不然彼衆我寡若悉軍來戰必不能支定興從之帝遣間使求救於義成公主公主遣使告始畢云北邊有急東都及諸郡援兵亦至忻口九月甲辰始畢解圍去帝使人出偵山谷皆空無胡馬乃遣二千騎追躡至馬邑得突厥老弱二千餘人而還丁未車駕還至太原蘇威言於帝曰今盗賊不息士馬疲弊願陛下亟還西京深根固本為社稷計帝初然之宇文述曰從官妻子多在東都宜便道向洛陽自潼關而入帝從之冬十月壬戌帝至東都顧眄街衢謂侍臣曰猶大有人在意謂曏日平楊􅀇感殺人尚少故也蘇威追論勲格太重宜加斟酌樊子蓋固請以為不宜失信帝曰公欲收物情邪子蓋懼不敢對帝性吝官賞初平楊􅀇感應授勲者多乃更置戎秩建節尉為正六品次奮武宣惠綏徳懐仁秉義奉誠立信等尉遞降一階將士守鴈門者萬七千人至是得勲者纔千五百人皆凖平􅀇感勲一戰得第一勲者進一階其先無戎秩者止得立信尉三戰得第一勲者至秉義尉其在行陳而無勲者四戰進一階亦無賜㑹仍議伐髙麗由是將士無不憤怨初蕭瑀以外戚有才行嘗事帝於東宫累遷至内史侍郎委以機務瑀性剛鯁數言事忤㫖帝漸疎之及鴈門圍解帝謂羣臣曰突厥狂悖勢何能為少時未散蕭瑀遽相恐動情不可恕出為河池郡守即日遣之候衛將軍楊子崇從帝在汾陽宫知突厥必為冦屢請早還京師帝不納及解圍帝怒之曰子崇怯懦驚動衆心不可居爪牙之官出為離石郡守子崇髙祖之族弟也楊􅀇感之亂龍舟水殿皆為所焚詔江都更造凡數千艘制度仍大於舊者壬申盧明月帥衆十萬冦陳汝東海李子通有勇力先依長白山賊帥左才相羣盗皆殘忍而子通獨寛仁由是人多歸之未半嵗有衆萬人才相忌之子通引去度淮與杜伏威合伏威選軍中壯士養為假子凡三十餘人濟隂王雄誕臨濟闞稜為之冠既而李子通謀殺伏威遣兵襲之伏威被重創墜馬雄誕負之逃葭葦中收散兵復振將軍來整擊伏威破之其將西門君儀之妻王氏勇而多力負伏威以逃雄誕帥壯士十餘人衛之與隋兵力戰由是得免來整又擊李子通破之子通帥其餘衆奔海陵復收兵得二萬人自稱將軍城父朱粲始為縣佐史從軍遂亡命聚衆為盗謂之可達寒賊自稱迦樓羅王衆至十餘萬引兵轉掠荆沔及山南郡縣所過噍類無遺十二月庚寅詔民部尚書樊子蓋發關中兵數萬擊絳賊敬盤陁等子蓋不分臧否自汾水之北村塢盡焚之賊有降者皆阬之百姓怨憤益相聚為盗詔以李淵代之有降者淵引置左右由是賊衆多降前後數萬人餘黨散入它郡資治通鑑卷第一百八十二
