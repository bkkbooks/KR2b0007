body:
  text: 冬十月秦陽平公融等攻夀陽癸酉克之執平虜將軍徐元喜等融以其參軍河南郭褒為淮南太守慕容垂拔鄖城胡彬聞夀陽陷退保硤石融進攻之秦衛將軍梁成等帥衆五萬屯于洛澗柵淮以遏東兵謝石謝􅀇等去洛澗二十五里而軍憚成不敢進胡彬粮盡潜遣使告石等曰今賊盛粮盡恐不復見大軍秦人獲之送於陽平公融融馳使白秦王堅曰賊少易擒但恐逃去宜速赴之堅乃留大軍於項城引輕騎八千兼道就融於夀陽遣尚書朱序來􅀃謝石等以彊弱異勢不如速降序私謂石等曰若秦百萬之衆盡至誠難與為敵今乗諸軍未集宜速擊之若敗其前鋒則彼已奪氣可遂破也石聞堅在夀陽甚懼欲不戰以老秦師謝琰勸石從序言十一月謝􅀇遣廣陵相劉牢之帥精兵五千人趣洛澗未至十里梁成阻澗為陳以待之牢之直前渡水撃成大破之斬成及弋陽太守王詠又分兵断其歸津秦步騎崩潰爭赴淮水士卒死者萬五千人執秦揚州剌史王顯等尽收其器械軍實於是謝石等諸軍水陸繼進秦王堅與陽平公融登壽陽城望之見晉兵部陣嚴整又望見八公山上草木皆以為晉兵顧謂融曰此亦勍敵何謂弱也憮然始有懼色秦兵逼淝水而陳晋兵不得渡謝􅀇遣使謂陽平公融曰君懸軍深入而置陳逼水此乃持久之計非欲速戰者也若移陳小却使晉兵得渡以决勝負不亦善乎秦諸將皆曰我衆彼寡不如遏之使不得上可以萬全堅曰但引兵少却使之半渡我以鐵騎蹙而殺之蔑不勝矣融亦以為然遂麾兵使却秦兵遂退不可復止謝􅀇謝琰􅁊伊等引兵渡水撃之融馳騎略陳欲以帥退者馬倒為晉兵所殺秦兵遂潰􅀇等乗勝追擊至于青岡秦兵大敗自相蹈藉而死者蔽野塞川其走者聞風聲鶴唳皆以為晉兵且至晝夜不敢息草行露宿重以飢凍死者什七八初秦兵少却朱序在陳後呼曰秦兵敗矣衆遂大奔序因與張天錫徐元喜皆来奔􅀗秦王堅所乗雲母車及儀服器械軍資珍寳畜産不可勝計復取夀陽執其淮南太守郭褒堅中流矢單騎走至淮北飢甚民有進壺飱豚髀者堅食之賜帛十疋綿十斤辭曰陛下厭苦安樂自取危困臣為陛下子陛下為臣父安有子飼其父而求報乎弗顧而去堅謂張夫人曰吾今復何靣目治天下乎澘然流涕是時諸軍皆潰惟慕容垂所將三萬人獨全堅以千餘騎赴之世子寳言於垂曰家國傾覆天命人心皆歸至尊但時運未至故晦迹自藏耳今秦主兵敗委身於我是天借之便以復燕祚此時不可失也願不以意氣微恩忘社稷之重垂曰汝言是也然彼以赤心投命於我若之何害之天苟弃之不患不亡不若保護其危以報徳徐俟其釁而圖之既不負宿心且可以義取天下奮威將軍慕容徳曰秦彊而并燕秦弱而圖之此為報仇雪耻非負宿心也兄柰何得而不取釋數萬之衆以授人乎垂曰吾昔為太傅所不容置身無所逃死于秦秦主以國士遇我恩禮備至後復為王猛所賣無以自明秦主獨能明之此恩何可忘也若氐運必窮吾當懐集闗東以復先業耳闗西㑹非吾有也冠軍行參軍趙秋曰明公當紹復燕祚著於圖䜟今天時已至尚復何待若殺秦主據鄴都鼔行而西三秦亦非符氏之有也垂親黨多勸垂殺堅垂皆不從悉以兵授堅平南將軍慕容暐屯鄖城聞堅敗棄其衆遁去至滎陽慕容徳復説暐起兵以復燕祚暐不從謝安得驛書知秦兵已敗時方與客圍棊攝書置牀上了無喜色圍棊如故客問之徐荅曰小兒輩遂已破賊既罷還内過戸限不覺屐齒之折丁亥謝石等歸建康得秦樂工能習舊聲於是宗廟始備金石之樂乙未以張天錫爲散騎常侍朱序為琅邪内史秦王堅收集離散比至洛陽衆十餘萬百官儀物軍容粗僃慕容農謂慕容垂曰尊不迫人於險其義聲足以感動天地農聞祕記曰燕復興當在河陽夫取果於未熟與自落不過晚旬日之間然其難易美惡相去逺矣垂心善其言行至澠池言於堅曰北鄙之民聞王師不利輕相扇動臣請奉詔書以鎮慰安集之因過謁陵廟堅許之􅁠翼諌曰囯兵新破四方皆有離心宜徵集名將置之京師以固根本鎮枝葉垂勇略過人世豪東夏頃以避禍而來其心豈止欲作冠軍而已哉譬如養鷹飢則附人每聞風飊之起常有陵霄之志正宜謹其絛籠豈可解縦任其所欲哉堅曰卿言是也然朕已許之匹夫猶不食言况萬乗乎若天命有廢興固非智力所能移也翼曰陛下重小信而輕社稷臣見其往而不返関東之亂自此始矣堅不聽遣將軍李蠻閔亮尹囯帥衆三千送垂又遣驍騎將軍石越帥精卒三千戍鄴驃騎將軍張蚝帥羽林五千戍并州鎮軍將軍毛當帥衆四千戍洛陽􅁠翼宻遣壯士邀垂於河橋南空倉中垂疑之自涼馬臺結草筏以渡使典軍程同衣已衣乗已馬與僮僕趣河橋伏兵發同馳馬獲免十二月秦王堅至長安哭陽平公融而後入謚曰哀公大赦復死事者家庚午大赦以謝石為尚書令進謝􅀇號前將軍固讓不受謝安壻王國寳坦之之子也安惡其為人每抑而不用以為尚書郎囯寳自以望族故事唯作吏部不為餘曹固辭不拜由是怨安國寳從妹為㑹稽王道子妃帝與道子皆嗜酒狎昵邪謟國寳乃譛安於道子使離間之於帝安功名既盛而險詖求進之徒多毀短安帝由是稍踈忌之初開酒禁増民税米口五石秦呂光行越流沙三百餘里焉耆等諸國皆降惟􅀛兹王帛純拒之嬰城固守光進軍攻之秦王堅之入寇也以乞伏國仁為前將軍領先鋒騎㑹國仁叔父步頽反於隴西堅遣國仁還討之步頽聞之大喜迎國仁於路國仁置酒大言曰苻氏疲民逞兵殆將亡矣吾當與諸君共建一方之業及堅敗國仁遂迫脅諸部有不從者撃而併之衆至十餘萬慕容垂至安陽遣參軍田山修牋於長樂公丕丕聞垂北来疑其欲為亂然猶身自迎之趙秋􅂆垂於座取丕因據鄴起兵垂不從丕謀襲撃垂侍郎天水姜讓諌曰垂反形未著而明公擅殺之非臣子之義不如待以上賓之禮嚴兵衛之宻表情狀聽敕而後圖之丕從之館垂於鄴西垂潜與燕之故臣謀復燕祚㑹丁零翟斌起兵叛秦謀攻豫州牧平原公暉於洛陽秦王堅驛書使垂將兵討之石越言於丕曰王師新敗民心未安負罪亡匿之徒思亂者衆故丁零一唱旬日之中衆已數千此其驗也慕容垂燕之宿望有興復舊業之心今復資之以兵爲此虎傅翼也丕曰垂在鄴如藉虎寢蛟常恐為肘腋之變今逺之於外不猶愈乎且翟斌凶悖必不肯為垂下使兩虎相斃吾從而制之此卞莊子之術也乃以羸兵二千及鎧仗之獘者給垂又遣廣武將軍苻飛龍帥氐騎一千為垂之副宻戒飛龍曰垂為三軍之帥卿為謀垂之將行矣勉之垂請入鄴城拜廟丕弗許乃潜服而入亭吏禁之垂怒斬吏燒亭而去石越言於丕曰垂敢輕侮方鎮殺吏燒亭反形已露可因此除之丕曰淮南之敗垂侍衛乗輿此功不可忘也越曰垂尚不忠於燕安能盡忠於我失今不取必為後患丕不從越退告人曰公父子好為小仁不顧大計終當為人擒耳垂留慕容農慕容楷慕容紹於鄴行至安陽之湯池閔亮李毗自鄴來以丕與苻飛龍所謀告垂垂因激怒其衆曰吾尽忠於苻氏而彼專欲圖我父子吾雖欲巳得乎乃託言兵少停河内募兵旬日間有衆八千平原公暉遣使讓垂趣使進兵垂謂飛龍曰今宼賊不逺當晝止夜行襲其不意飛龍以為然壬午夜垂遣世子寳將兵居前少子隆勒兵從已令氐兵五人為伍隂與寳約聞鼓聲前後合擊氐兵及飛龍盡殺之參佐家在西者皆遣還并以書遺秦王堅言所以殺飛龍之故初垂從堅入鄴以其子麟屢嘗告變於燕立殺其母然猶不忍殺麟置之外舍希得侍見及殺苻飛龍麟屢進䇿畫啟發垂意垂更竒之寵待與諸子均矣慕容鳳及燕故臣之子燕郡王騰遼西段延等聞翟斌起兵各帥部曲歸之平原公暉使武平武矦毛當討斌慕容鳳曰鳳今將雪先王之恥請為將軍斬此氐奴乃擐甲直進丁零之衆隨之大敗秦兵斬毛當遂進攻陵雲臺戍克之收萬餘人甲仗癸未慕容垂濟河焚橋有衆三萬留遼東鮮卑可足渾譚集兵於河内之沙城垂遣田山如鄴宻告慕容農等使起兵相應時日已暮農與慕容楷留宿鄴中慕容紹先出至蒲池盜丕駿馬數百疋以待農楷甲申晦農楷將數十騎㣲服出鄴遂同奔列人九年春正月乙酉朔秦長樂公丕大㑹賓客請慕容農不得始覺有變遣人四出求之三日乃知其在列人已起兵矣慕容鳳王騰叚延皆勸翟斌奉慕容垂為盟主斌從之垂欲襲洛陽且未知斌之誠偽乃拒之曰吾來救豫州不來赴君君既建大事成享其福敗受其禍吾無預焉丙戌垂至洛陽平原公暉聞其殺苻飛龍閉門拒之翟斌復遣長史郭通往説垂垂猶未許通曰將軍所以拒通者豈非以翟斌兄弟山野異類無竒才逺略必無所成故邪獨不念將軍今日慿之可以濟大業乎垂乃許之於是斌帥其衆來與垂㑹勸垂稱尊號垂曰新興矦吾主也當迎歸返正耳垂以洛陽四面受敵欲取鄴而據之乃引兵而東故扶餘王餘蔚為滎陽太守及昌􅀺鮮卑衛駒各帥其衆降垂垂至滎陽羣下固請上尊號垂乃依晉中宗故事稱大將軍大都督燕王承制行事謂之統府羣下稱臣文表奏誥封拜官爵皆如王者以弟德為車騎大將軍封范陽王兄子楷為征西大將軍封太原王翟斌為建義大將軍封河南王餘蔚為征東將軍統府左司馬封扶餘王衞駒為鷹揚將軍慕容鳳為建䇿將軍帥衆二十餘萬自石門濟河長驅向鄴慕容農之奔列人也止於烏􅁊魯利家利為之置饌農笑而不食利謂其妻曰惡奴郎貴人家貧無以饌之柰何妻曰郎有雄才大志今無故而至必將有異非為飲食來也君亟出逺望以備非常利從之農謂利曰吾欲集兵列人以圖興復卿䏻從我乎利曰死生唯郎是從農乃詣烏桓張驤説之曰家王已舉大事翟斌等咸相推奉逺近響應故來相告耳驤再拜曰得舊主而奉之敢不盡死於是農驅列人居民為士卒斬桑榆為兵裂䄡裳為旗使趙秋􅀃屠各畢聦聦與屠各卜勝張延李白郭超及東夷餘和敕勒易陽烏􅁊劉大各帥部衆數千赴之農假張驤輔國將軍劉大安逺將軍魯利建威將軍農自將攻破館陶收其軍資器械遣蘭汗段讃趙秋慕輿悕略取康臺牧馬數千匹汗燕王垂之從舅讃聦之子也於是步􅀐雲集衆至數萬驤等共推農為使持節都督河北諸軍事驃􅀐大將軍監統諸將隨才部署上下肅然農以燕王垂未至不敢封賞將士趙秋曰軍無賞士不往今之來者皆欲建一時之功規萬世之利宐承制封拜以廣中興之基農從之於是赴者相繼垂聞而善之農西招庫傉官偉於上黨東引乞特歸於東阿北召光烈將軍平叡及叡兄汝陽太守幼於燕國偉等皆應之又遣蘭汗等攻頓丘克之農號令整肅軍無私掠士女喜恱長樂公丕使石越將歩􅀐萬餘討之農曰越有智勇之名今不南拒大軍而來此是畏王而陵我也必不設備可以計取之衆請治列人城農曰善用兵者結士以心不以異物今起義兵唯敵是求當以山河為城池何列人之足治也辛卯越至列人西農使趙秋及叅軍綦母滕撃越前鋒破之叅軍太原趙謙言於農曰越甲仗雖精人心危駭易破也宐急撃之農曰彼甲在外我甲在心晝戰則士卒見其外貌而憚之不如待暮撃之可以必克令軍士嚴僃以待毋得妄動越立栅自固農笑謂諸將曰越兵精士衆不乗其初至之鋭以撃我方更立柵吾知其無䏻為也向暮農鼔譟出陳于城西牙門劉木請先攻越柵農笑曰凡人見美食誰不欲之何得獨請然汝猛鋭可嘉當以先鋒惠汝木乃帥壯士四百騰栅而入秦兵披靡農督大衆随之大敗秦兵斬越送首於垂越與毛當皆秦之驍將也故秦王堅使助二子鎭守既而相繼敗沒人情騷動所在盗賊群起庚戌燕王垂至鄴改秦建元二十年為燕元年服色朝儀皆如舊章以前岷山公庫傉官偉為左長史前尚書叚崇為右長史滎陽鄭豁等為從事中郎慕容農引兵㑹垂於鄴垂因其所稱之官而授之立世子寳爲太子封從弟拔等十七人及甥宇文輸舅子蘭審皆為王其餘宗族及功臣封公者三十七人矦伯子男者八十九人可足渾譚集兵得二萬餘人攻野王拔之引兵㑹攻鄴平㓜及弟叡規亦帥衆數萬㑹垂於鄴長樂公丕使姜讓誚讓燕王垂且􅀃之曰過而䏻改今猶未晚也垂曰􅀌受主上不世之恩故欲安全長樂公使盡衆赴京師然後修復國家之業與秦永為鄰好何故闇於機運不以鄴城見歸若迷而不復當窮極兵勢恐單馬求生亦不可得也讓厲色責之曰將軍不容於家國投命聖朝燕之尺土將軍豈有分乎主上與將軍風殊類别一見傾心親如宗戚寵踰勲舊自古君臣際遇有如是之厚者乎一旦因王師小敗遽有異圖長樂公主上元子受分陜之任寧可束手輸將軍以百城之地乎將軍欲裂冠毀冕自可極其兵勢奚更云云但惜將軍以七十之年懸首白旗髙世之忠更為逆鬼耳垂黙然左右請殺之垂曰彼各為其主耳何罪禮而歸之遺丕書及上秦王堅表陳述利害請送丕歸長安堅及丕怒復書切責之鷹揚將軍劉牢之攻秦譙城拔之􅁊冲遣上庸太守郭寳攻秦魏興上庸新城三郡坺之將軍楊佺期進據成固撃秦梁州刺史潘猛走之佺期亮之子也壬子燕王垂攻鄴拔其外郭長樂公丕退守中城闗東六州郡縣多送任請降於燕癸丑垂以陳留王紹行冀州刺史屯廣阿豐城宣穆公􅁊沖聞謝􅀇等有功自以失言慙恨成疾二月辛巳卒朝議欲以謝􅀇為荆江二州刺史謝安自以父子名位太盛又懼􅁊氏失職怨望乃以梁郡太守􅁊石民為荆州刺史河東太守􅁊石䖍為豫州刺史豫州刺史􅁊伊為江州刺史燕王垂引丁零烏􅁊之衆二十餘萬為飛梯地道以攻鄴不拔乃築長圍守之分處老弱於肥鄉築新興城以置輜重秦征東府官屬疑參軍髙㤗燕之舊臣有貳心泰懼與同郡虞曹從事吳韶逃歸勃海韶曰燕軍近在肥鄉宐從之泰曰吾以避禍耳去一君事一君吾所不為也申紹見而歎曰去就以道可謂君子矣燕范陽王徳撃秦枋頭取之置戍而還東胡王晏據館陶為鄴中聲援鮮卑烏􅁊及郡縣民據塢壁不從燕者尚衆燕王垂遣太原王楷與鎮南將軍陳留王紹討之楷謂紹曰鮮卑烏􅁊及冀州之民本皆燕臣今大業始爾人心未洽所以小異唯宐綏之以徳不可震之以威吾當止一處為軍聲之本汝巡撫民夷示以大義彼必當聽從楷乃屯于辟陽紹帥騎數百往􅀃王晏為陳禍福晏隨紹詣楷降於是鮮卑烏􅁊及塢民降者數十萬口楷留其老弱置守宰以撫之發其丁壯十餘萬與王晏詣鄴垂大恱曰汝兄弟才兼文武足以繼先王矣三月以衛將軍謝安為太保秦北地長史慕容􅇦聞燕王垂攻鄴亡奔關東收集鮮卑衆至數千還屯華隂敗秦將軍強永其衆遂盛自稱都督陜西諸軍事大將軍雍州牧濟北王推垂為丞相都督陜東諸軍事領大司馬冀州牧吳王秦王堅謂權翼曰不用卿言使鮮卑至此闗東之地吾不復與之爭將若􅇦何乃以廣平公熈為雍州刺史鎮蒲坂徵雍州牧鉅鹿公叡為都督中外諸軍事衛大將軍録尚書事配兵五萬以左將軍竇衝為長史龍驤將軍姚萇為司馬以討􅇦平陽太守慕容沖亦起兵於平陽有衆二萬進攻蒲坂堅使竇衝討之庫傉官偉帥營部數萬至鄴燕王垂封偉為安定王秦冀州刺史阜城矦定守信都髙城男紹在其國髙邑矦亮重合矦謨守常山固安矦鑒守中山燕王垂遣前將軍樂浪王温督諸軍攻信都不克夏四月丙辰遣撫軍大將軍麟益兵助之定鑒秦王堅之從叔紹謨從弟亮從子也温燕王垂之弟子也慕容􅇦聞秦兵且至懼帥衆將奔閞東秦鉅鹿愍公叡麄猛輕敵欲馳兵邀之姚萇諫曰鮮卑皆有思歸之志故起而為亂宐驅令出關不可遏也夫執鼷䑕之尾猶能反噬於人彼自知困窮致死於我萬一失利悔將何及但可鳴皷隨之彼將奔敗不暇矣叡弗從戰于華澤叡兵敗為泓所殺萇遣龍驤長史趙都參軍姜協詣秦王堅謝罪堅怒殺之萇懼奔渭北馬牧於是天水尹緯尹詳南安龎演等紏扇羌豪帥其户口歸萇者五萬餘家推萇為盟主萇自稱大將軍大單于萬年秦王大赦改元白雀以尹詳龐演為左右長史南安姚晃及尹緯為左右司馬天水狄伯支等為從事中郎􅆧訓等為掾屬王據等為叅軍王欽盧姚方成等為將帥秦竇衝撃慕容沖于河東大破之沖帥鮮卑騎八千奔慕容􅇦􅇦衆至十餘萬遣使謂秦王堅曰吳王已定闗東可速資僃大駕奉送家兄皇帝􅇦當帥闗中燕人翼衛乗輿還返鄴都與秦以虎牢為界永為鄰好堅大怒召慕容暐責之曰今泓書如此卿欲去者朕當相資卿之宗族可謂人面獸心不可以國士期也暐叩頭流血涕泣陳謝堅乆之曰此自三豎所爲非卿之過復其位待之如初命暐以書招諭泓沖及垂暐宻遣使謂泓曰吾籠中之人必無還理且燕室之罪人也不足復顧汝勉建大業以吳王為相國中山王為太宰領大司馬汝可為大將軍領司徒承制封拜聽吾死問汝便即尊位泓於是進向長安改元燕興燕王垂以鄴城猶固㑹寮佐議之右司馬封衡請引漳水灌之從之垂行圍因飲於華林園秦人宻出兵掩之矢下如雨垂幾不得出冠軍大將軍隆將騎衝之垂僅而得免竟陵太守趙統攻襄陽秦荆州刺史都貴奔魯陽五月秦洛州刺史張五虎據豐陽來降梁州刺史楊亮帥衆五萬伐蜀遣巴西太守費統等將水陸兵三萬為前鋒亮屯巴郡秦益州刺史王廣遣巴西太守康回等拒之秦苻定苻紹皆降於燕燕慕容麟引兵西攻常山後秦王萇進屯北地秦華隂北地新平安定羌胡降之者十餘萬六月癸丑朔崇德太后褚氏崩秦王堅自帥歩騎二萬以撃後秦軍于趙氏塢使護軍將軍楊璧等分道攻之後秦兵屢敗斬後秦王萇之弟鎭軍將軍尹買後秦軍中無井秦人塞安公谷堰同官水以困之後秦人恟懼有渴死者會天大雨後秦營中水三尺繞營百步之外寸餘而已後秦軍復振秦王堅歎曰天亦佑賊乎慕容泓謀臣髙蓋等以泓德望不如慕容沖且持法苛峻乃殺泓立沖為皇太弟承制行事置百官以蓋為尚書令後秦王萇遣其子嵩為質於沖以請和將軍劉春攻魯陽都貴奔還長安後秦王萇帥衆七萬撃秦秦王堅遣楊璧等拒之為萇所敗獲楊璧及右將軍徐成鎭軍將軍毛盛等將吏數十人萇皆禮而遣之燕慕容麟拔常山秦苻亮苻謨皆降麟進圍中山秋七月克之執苻鍳麟威聲大振留屯中山秦幽州刺史王永平州刺史苻沖帥二州之衆以撃燕燕王垂遣寧朔將軍平規撃永永遣昌黎太守宋敞逆戰於范陽敞兵敗規進據薊南秦平原公暉帥洛陽陜城之衆七萬歸於長安益州刺史王廣遣將軍王虬帥蜀漢之衆三萬北救長安秦王堅聞慕容沖去長安浸近乃引兵歸遣撫軍大將軍髙陽公方戍驪山拜平原公暉為都督中外諸軍事車騎大將軍錄尚書事配兵五萬以拒沖沖與暉戰於鄭西大破之堅又遣前將軍姜宇與少子河閒公琳帥衆三萬拒沖於灞上琳宇皆敗死沖遂據阿房城秦康回兵數敗退還成都梓潼太守壘襲以涪城來降荆州刺史桓石民據魯陽遣河南太守髙茂北戍洛陽己酉􅁙康獻皇后于崇平陵燕翟斌恃功驕縱邀求無厭又以鄴城乆不下潜有貳心太子寳請除之燕王垂曰河南之盟不可負也若其為難罪由於斌今事未有形而殺之人必謂我忌憚其功能吾方収􅄃豪傑以隆大業不可示人以狹失天下之望也藉彼有謀吾以智防之無能為也范陽王德陳留王紹驃騎大將軍農皆曰翟斌兄弟恃功而驕必為國患垂曰驕則速敗焉能為患彼有大功當聽其自斃耳禮遇彌重斌諷丁零及其黨請斌為尚書令垂曰翟王之功宐居上輔但臺既未建此官不可遽置耳斌怒宻與前秦長樂公丕通謀使丁零決隄潰水事覺垂殺斌及其弟檀敏餘皆赦之斌兄子眞夜將營衆北奔邯鄲引兵還向鄴圍欲與丕内外相應太子寳與冠軍大將軍隆撃破之眞還走邯鄲太原王楷陳留王紹言於垂曰丁零非有大志但寵過為亂耳今急之則屯聚為寇緩之則自散散而撃之無不克矣垂從之􅀛兹王帛純窘急重賂獪胡以求救獪胡王遣其弟呐龍矦將馗帥騎二十餘萬并引温㝛尉頭等諸國兵合七十餘萬以救􅀛兹秦吕光與戰于城西大破之帛純出走王矦降者三十餘國光入其城城如長安市邑宮室甚盛光撫寧西域威恩甚著逺方諸國前世所不能服者皆來歸附上漢所賜節傳光皆表而易之立帛純弟震為􅀛兹王八月翟眞自邯鄲北走燕王垂遣太原王楷驃騎大將軍農帥騎追之甲寅及於下邑楷欲戰農曰士卒饑倦且視賊營不見丁壯殆有他伏楷不從進戰燕兵大敗眞北趨中山屯于承營鄴中芻粮俱盡削松木以飼馬燕王垂謂諸將曰苻丕窮寇必無降理不如退屯新城開丕西歸之路以謝秦王疇昔之恩且為討翟眞之計丙寅夜垂解圍趨新城遣慕容農徇清河平原徴督租賦農明立約束均適有無軍令嚴整無所侵􅁀由是榖帛屬路軍資豐給戊寅南昌文穆公郗愔薨太保安奏請乗苻氏傾敗開拓中原以徐兖二州刺史謝玄為前鋒都督帥豫州刺史桓石䖍等伐秦玄至下邳秦徐州刺史趙遷棄彭城走玄進據彭城秦王堅聞吕光平西域以光爲都督玉門以西諸軍事西域校尉道絶不通秦幽州刺史王永求救於振威将軍劉庫仁庫仁遣其妻兄公孫希帥騎三千救之大破平規於薊南乗勝長驅進據唐城與慕容麟相持九月謝玄使彭城内史劉牢之攻秦兖州刺史張崇辛卯崇弃鄄城奔燕牢之據鄄城河南城堡皆來歸附太保安上䟽自求北征甲午加安都督揚江等十五州諸軍事加黄􅃏慕容沖進逼長安秦王堅登城觀之歎曰此虜何從出哉大呼責沖曰奴何苦來送死沖曰奴猒奴苦欲取汝爲代耳沖少有寵於堅堅遣使以錦袍稱詔遺之沖遣詹事稱皇太弟令荅之曰􅀌今心在天下豈顧一袍小惠苟能知命君臣束手早送皇帝自當寛貸苻氏以酬曩好堅大怒曰吾不用王㬌略陽平公之言使白虜敢至於此冬十月辛亥朔日有食之乙丑大赦謝玄遣隂陵太守髙素攻秦青州刺史符朗軍至琅邪朗來降朗堅之從子也翟真在承營與公孫希宋敞遥相首尾長樂公丕遣宦者穴從僕射清河光祚將兵數百赴中山與眞相結又遣陽平太守邵興將數千騎招集冀州故郡縣與祚期㑹襄國是時燕軍疲弊秦􅀔復振冀州郡縣皆􅀚望成敗趙郡人趙粟等起兵柏鄉以應興燕王垂遣冠軍大將軍隆龍驤將軍張崇將兵邀擊興命驃騎大將軍農自清河引兵㑹之隆與興戰於襄國大破之興走至廣阿遇慕容農執之光祚聞之循西山走歸鄴隆遂撃趙粟等皆破之冀州郡縣復從燕劉庫仁聞公孫希已破平規欲大舉兵以救長樂公丕發鴈門上谷代郡兵屯繁畤燕太子太保慕輿句之子文零陵公慕輿䖍之子常時在庫仁所知三郡兵不樂逺征因作亂夜攻庫仁殺之竊其駿馬奔燕公孫希之衆聞亂自潰希奔翟眞庫仁弟頭眷代領庫仁部衆秦長樂公丕遣光祚及參軍封孚召驃騎將軍張蚝并州刺史王騰於晉陽以自救蚝騰以衆少不能赴丕進退路窮謀於僚佐司馬楊膺請自歸於晉丕未許㑹謝􅀇遣龍驤將軍劉牢之等據碻磝濟陽太守郭滿據滑臺將軍顔肱劉襲軍于河北丕遣將軍桑據屯黎陽以拒之劉襲夜襲據走之遂克黎陽丕懼乃遣從弟就與叅軍焦逵請救於玄致書稱欲假途求粮西赴國難須援軍既接以鄴與之若西路不通長安䧟沒請帥所領保守鄴城逵與叅軍姜讓宻謂楊膺曰今喪敗如此長安阻絶存亡不可知屈節竭誠以求粮援猶懼不獲而公豪氣不除方設兩端事必無成宐正書為表許以王師之至當致身南歸如其不從可逼縳與之膺自以力能制丕乃改書而遣之謝􅀇遣晉陵太守滕恬之渡河守黎陽恬之脩之曽孫也朝廷以兖青司豫既平加玄都督徐兖青司冀幽并七州諸軍事後秦王萇聞慕容沖攻長安㑹羣僚議進止皆曰大王宐先取長安建立根本然後經營四方萇曰不然燕人因其衆有思歸之心以起兵若得其志必不乆留闗中吾當移屯嶺北廣収資實以待秦亡燕去然後拱手取之耳乃留其長子興守北地使寧北將軍姚穆守同官川自將其衆攻新平初新平人殺其郡將秦王堅缺其城角以恥之新平民望深以為病欲立忠義以雪之及後秦王萇至新平新平太守南安苟輔欲降之郡人遼西太守馮傑蓮勺令馮羽尚書郎趙義汶山太守馮苗諫曰昔田單以一城存齊今秦之州鎭猶連城過百柰何遽為叛臣乎輔喜曰此吾志也但恐乆而無救郡人横被無辜諸君能爾吾豈顧生哉於是慿城固守後秦爲土山地道輔亦於内為之或戰地下或戰山上後秦之衆死者萬餘人輔詐降以誘萇萇將入城覺之而返輔伏兵邀撃幾獲之又殺萬餘人隴西處士王嘉隠居倒虎山有異術䏻知未然秦人神之秦王堅後秦王萇及慕容沖皆遣使迎之十一月嘉入長安衆聞之以為堅有福故聖人助之三輔堡壁及四山氏羌歸堅者四萬餘人堅置嘉及沙門道安於外殿動静咨之燕慕容農自信都西撃丁零翟遼於魯口破之遼退屯無極農屯藁城以逼之遼眞之從兄也鮮卑在長安城中者猶千餘人慕容紹之兄肅與慕容暐隂謀結鮮卑為亂十二月暐白堅以其子新昏請堅幸其家置酒欲伏兵殺之堅許之㑹天大雨不果往事覺堅召暐及肅肅曰事必洩矣入則俱死今城內已嚴不如殺使者馳出旣得出門大衆便集暐不從遂俱入堅曰吾相待何如而起此意暐飾辭以對肅曰家國事重何論意氣堅先殺肅乃殺暐及其宗族城内鮮卑無少長男女皆殺之燕王垂幼子柔養於宦者宋牙家為牙子故得不坐與太子寳之子盛乗閒得出奔慕容沖燕慕容麟慕容農合兵襲翟遼大破之遼單騎奔翟眞燕王垂以秦長樂公丕猶據鄴不去乃更引兵圍鄴開其西走之路焦逵見謝玄玄欲徵丕任子然後出兵逵固陳丕􅅃誠并述楊膺之意玄乃遣劉牢之􅅬恬之等帥衆二萬救鄴丕告饑􅀇水陸運米二千斛以饋之秦梁州刺史潘猛棄漢中奔長安資治通鑑卷第一百五
