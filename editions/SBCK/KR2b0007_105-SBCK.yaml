front:
  text: 襄陽兖州刺史張崇救武當後將軍張蚝步兵校尉姚萇救涪城叡軍于新野垂軍于鄧城􅁊沖退屯沔南秋七月郭銓及冠軍將軍􅁊石䖍敗張崇于武當掠二千戸以歸鉅鹿公叡遣慕容垂爲前鋒進臨沔水垂夜命軍士人持十炬繫于樹枝光照數十里沖懼退還上明張蚝出斜谷楊亮引兵還沖表其兄子石民領襄城太守戍夏口沖自求領江州刺史詔許之秦王堅下詔大舉入寇民每十丁遣一兵其良家子年二十已下有材勇者皆拜羽林郎又曰其以司馬昌明爲尚書左僕射謝安爲吏部尚書􅁊冲爲侍中勢還不逺可先爲起第良家子至者三萬餘騎拜秦州主簿金城趙盛之爲少年都統是時朝臣皆不欲堅行獨慕容垂姚萇及良家子勸之陽平公融言於堅曰鮮卑􅆧虜我之仇讎常思風塵之變以逞其志所陳䇿畫何可從也良家少年皆富饒子弟不閑軍旅苟為謟䛕之言以㑹陛下之意耳今陛下信而用之輕舉大事臣恐功既不成仍有後患悔无及也堅不聽八月戊午堅遣陽平公融督張蚝慕容垂等歩騎二十五萬為前鋒以兖州刺史姚萇為龍驤將軍督益梁州諸軍事堅謂萇曰昔朕以龍驤建業未甞輕以授人卿其勉之左將軍竇衝曰王者無戲言此不祥之徵也堅黙然慕容楷慕容紹言於慕容垂曰主上驕矜已甚叔父建中興之業在此行也垂曰然非汝誰與成之甲子堅發長安戎卒六十餘萬騎二十七萬旗皷相望前後千里九月堅至項城涼州之兵始達咸陽蜀漢之兵方順流而下幽冀之兵至于彭城東西萬里水陸齊進運漕萬艘陽平公融等兵三十萬先至潁口詔以尚書僕射謝石為征虜將軍征討大都督以徐兖二州刺史謝􅀇為前鋒都督與輔國將軍謝琰西中郎將􅁊伊等衆共八萬拒之使龍驤將軍胡彬以水軍五千援夀陽琰安之子也是時秦兵既盛都下震恐謝􅀇入問計於謝安安夷然荅曰已别有㫖既而寂然􅀇不敢復言乃令張􅀇重請安遂命駕出逰山墅親朋畢集與􅀇圍棊賭墅安棊常劣於􅀇是日􅀇懼便為敵手而又不勝安遂游陟至夜乃還桓冲深以根本為憂遣精鋭三千入援京師謝安固却之曰朝廷處分已定兵甲無闕西藩宜留以為防沖對佐吏歎曰謝安石有廟堂之量不閑將略今大敵垂至方遊談不暇遣諸不經事少年拒之衆又寡弱天下事已可知吾其左衽矣以琅邪王道子録尚書六條事
