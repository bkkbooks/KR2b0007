body:
  text: 臣司馬光奉勑編集後唐紀八䝉恊洽凡一年有竒起閼逢敦牂二月盡旃潞王下清泰元年二月癸酉蜀主以武泰節度使趙季良為司空兼門下侍郎同平章事領節度使如故吳人多不欲遷都者都押牙周宗言於徐知誥曰主上西遷公復須東行不惟勞費甚大且違衆心丙子吳主遣宋齊丘如金陵諭知誥罷遷都先是知誥久有傳禪之志以吳主無失徳恐衆心不恱欲待嗣君宋齊丘亦以為然一旦知誥臨鏡鑷白髭歎曰國家安而吾老矣奈何周宗知其意請如江都微以傳禪諷吳主且告齊丘齊丘以宗先己心疾之遣使馳詣金陵手書切諌以爲天時人事未可知誥愕然後數日齊丘至請斬宗以謝呉主乃黜宗爲池州副使久之節度副使李建勲行軍司馬徐玠等屢陳知誥功業宜早從民望召宗復爲都押牙知誥由是踈齊丘朱􅀪昭馮贇不欲石敬瑭久在太原且欲召孟漢瓊己卯徙成徳節度使范延光爲天雄節度使代漢瓊徙潞王從珂爲河東節度使兼北都留守徙石敬瑭爲成徳節度使皆不降制書但各遣使臣持宣監送赴鎭呉主詔徐知詔還府舍甲申金陵大火乙酉又火知誥疑有變勒兵自衞己丑復入府舎潞王既與朝廷猜阻朝廷又命洋王從璋權知鳯翔從璋性麤率樂禍前代安重誨鎭河中手殺之潞王聞其來尤惡之欲拒命則兵弱糧少不知所為謀於將佐皆曰主上富於春秋政事出於朱馮大王功名震主離鎭必無全理不可受也王問觀察判官滴河馬㣧孫曰今道過京師當何向爲便對曰君命召不俟駕臨喪赴鎭又何疑焉諸人凶謀不可從也衆哂之王乃移檄鄰道言朱􅀪昭等乗先帝疾亟殺長立少專制朝權别踈骨肉動揺藩垣懼傾覆社稷今從珂將入朝以清君側之惡而力不能獨辦願乞靈鄰藩以濟之潞王以西都留守王思同當東出之道尤欲與之相結遣推官郝詡押牙朱廷乂等相繼詣長安說以利害餌以美妓不從則令就圖之思同謂將吏曰吾受明宗大恩今與鳯翔同反借使事成而榮猶為一時之叛臣况事敗而辱流千古之醜跡乎遂執詡等以狀聞時潞王使者多為鄰道所執不則依阿操兩端惟隴州防禦使相里金傾心附之遣判官薛文遇往來計事金并州人也朝廷議討鳯翔康義誠不欲出外恐失軍權請以王思同為統帥以羽林都指揮使侯益為行營馬歩都虞􅀱益知軍情將變辭疾不行執政怒之出為啇州刺史辛卯以王思同為西面行營馬歩軍都部署前静難節度使藥彦稠副之前絳州刺史萇從簡為馬歩都虞候嚴衛歩軍左廂指揮使尹暉羽林指揮使楊思權等皆為偏禆暉魏州人也蜀主以中門使王處回為樞密使丁酉加王思同同平章事知鳯翔行府以䕶國節度使安彦威為西面行營都監思同雖有忠義之志而御軍無法潞王老於行陳將士徼幸富貴者心皆向之詔遣殿直楚匡祚執亳州團練使李重吉幽於宋州洋王從璋行至關西聞鳯翔拒命而還一三月安彦威與山南西道張䖍釗武定孫漢韶彰義張從賔静難康福等五節度使奏合兵討鳯翔漢韶李存進之子也乙卯諸道兵大集於鳯翔城下攻之克東西關城城中死者甚衆丙辰復進攻城期於必取鳯翔城塹卑淺守備俱乏衆心危急潞王登城泣謂外軍曰吾未冠從先帝百戰出入生死金創滿身以立今日之社稷汝曹從我目睹其事今朝廷信任讒臣猜忌骨肉我何罪而受誅乎因慟哭聞者哀之張䖍釗性􅄶急主攻城西南以白刃驅士卒登城士卒怒大詬反攻之䖍釗躍馬走免楊思權因大呼曰大相公吾主也遂帥諸軍解甲投兵請降於潞王自西門入以幅紙進潞王曰願王克京城日以臣為節度使勿以為防團潞王即書思權可邠寧節度使授之王思同猶未之知趣士卒登城尹暉大呼曰城西軍巳入城受賞矣衆争弃甲投兵而降其聲震地日中亂兵悉入外軍亦潰思同等六節度使皆遁去潞王悉斂城中將吏士民之財以犒軍至於鼎釜皆估直以給之丁巳王思同藥彦稠等走至長安西京副留守劉遂雍閉門不内乃趣潼關遂雍鄩之子也潞王建大將旗鼓整衆而東以孔目官虞城劉延㓪爲腹心潞王始憂王思同等併力據長安拒守至􅄮山聞劉遂雍不内思同甚喜遣使慰撫之遂雍悉出府庫之財於外軍士前至者即給賞令過比潞王至前軍賞遍皆不入城庚申潞王至長安遂雍迎謁率民財以充賞是日西面歩軍都監王景從等自軍前奔還中外大駭帝不知所為謂康義誠等曰先帝弃萬國朕外守藩方當是之時為嗣者在諸公所取耳朕實無心與人爭國既承大業年在幼沖國事皆委諸公朕於兄弟間不至榛梗諸公以社稷大計見告朕何敢違軍興之初皆自夸大以爲宼不足平今事至於此何方可以轉禍朕欲自迎潞王以大位讓之若不免於罪亦所甘心朱弘昭馮贇大懼不敢對義誠欲悉以宿衛兵迎降爲己功乃曰西師驚潰蓋主將失策耳今侍衛諸軍尚多臣請自往扼其衝要招集離散以圖後効幸陛下勿爲過憂帝遣使召石敬瑭欲令將兵拒之義誠固請自行帝乃召將士慰諭空府庫以勞之許以平鳯翔人更賞二百緡府庫不足當以宫中服玩繼之軍士益驕無所畏忌負賜物揚言於路曰至鳯翔更請一分遣楚匡祚殺李重吉於宋州匡祚榜棰重􅁻責其家財又殺尼惠明初馬軍都指揮使朱洪實爲秦王從榮所厚及朱弘昭爲樞密使洪實以宗兄事之從榮勒兵天津橋洪實首爲孟漢瓊擊從榮康義誠由是恨之辛酉帝親至左藏給將士金帛義誠洪實共論用兵利害洪實欲以禁軍固守洛陽曰如此彼亦未敢徑前然後徐圖進取可以萬全義誠怒曰洪實為此言欲反邪洪實曰公自欲反乃謂誰反其聲漸厲帝聞召而訊之二人訟於帝前帝不能辨其是非遂斬洪實軍士益憤怒壬戌潞王至昭應聞前軍獲王思同王曰思同雖失計然盡心所奉亦可嘉也癸亥至靈口前軍執思同以至王責讓之對曰思同起行間先帝擢之位至節將常愧無功以報大恩非不知附大王立得富貴助朝廷自取禍殃但恐死之日無面目見先帝於泉下耳敗而釁鼓固其所也請早就死王為之改容曰公且休矣王欲宥之而楊思權之徒恥見其面王之過長安尹暉盡取思同家資及妓妾屢言於劉延㓪曰若留思同慮失士心屬王醉不待報擅殺思同及其妻子王醒怒延㓪嗟惜者累日癸亥制以康義誠爲鳯翔行營都招討使以王思同副之甲子潞王至華州獲藥彦稠囚之乙丑至閿郷朝廷前後所發諸軍遇西軍皆迎降無一人戰者丙寅康義誠引侍衛兵發洛陽詔以侍衛馬軍指揮使安從進為京城巡檢從進巳受潞王書潜布腹心矣是日潞王至靈寳䕶國節度使安彦威匡國節度使安重霸皆降惟保義節度使康思立謀固守陜城以俟康義誠先是捧聖五百騎戍陜西為潞王前鋒至城下呼城上人曰禁軍十萬巳奉新帝爾輩數人奚為徒累一城人塗地耳於是捧聖卒爭出迎思立不能禁不得巳亦出迎丁卯潞王至陜僚佐説王曰今大王將及京畿傳聞乗輿已播遷大王宜少留於此先移書慰安京城士庶王從之移書諭洛陽文武士庶惟朱弘昭馮贇兩族不赦外自餘勿有憂疑康義誠軍至新安所部將士自相結百什為羣弃甲兵争先詣陜降纍纍不絶義誠至乾壕麾下纔數十人遇潞王候騎十餘人義誠觧所佩弓劒為信因候騎請降於潞王戊辰閔帝聞潞王至陝義誠軍潰憂駭不知所為急遣使召朱弘昭謀所向弘昭曰急召我欲罪之也赴井死安從進聞弘昭死殺馮贇於第滅其族傳弘昭贇首於潞王帝欲奔魏州召孟漢瓊使詣魏州為先置漢瓊不應召單騎奔陜初帝在藩鎭愛信牙將慕容遷及即位以為控鶴指揮使帝將北度河密與之謀使帥部兵守玄武門是夕帝以五十騎出玄武門謂遷曰朕且幸魏州徐圖興復汝帥有馬控鶴從我遷曰生死從大家乃陽為團結帝旣出即闔門不行己巳馮道等入朝及端門聞朱馮死帝巳北走道及劉煦欲歸李愚曰天子之出吾輩不預謀今太后在宫吾輩當至中書遣小黄門取太后進止然後歸第人臣之義也道曰主上失守社稷人臣惟君是奉無君而入宫城恐非所宜潞王巳處處張牓不若歸俟教令乃歸至天宮寺安從進遣人語之曰潞王倍道而來且至矣相公宜帥百官至榖水奉迎乃止於寺中召百官中書舍人盧導至馮道曰俟舍人久矣所急者勸進文書宜速具草導曰潞王入朝百官班迎可也設有廢立當俟太后敎令豈可遽議勸進乎道曰事當務實導曰安有天子在外人臣遽以大位勸人者邪若潞王守節北面以大義見責將何辭以對公不如帥百官詣宫門進名問安取太后進止則去就善矣道未及對從進屢遣人趣之曰潞王至矣太后太妃巳遣中使迎勞矣安得百官無班道等即紛然而去旣而潞王未至三相息於上陽門外盧導過於前道復召而語之導對如初李愚曰舍人之言是也吾輩之罪擢髪不足數康義誠至陜待罪潞王責之曰先帝晏駕立嗣在諸公今上亮隂政事出諸公何為不能終始䧟吾弟至此乎義誠大懼叩頭請死王素惡其為人未欲遽誅且宥之馬歩都虞候萇從簡左龍武統軍王景戡皆為部下所執降於潞王東軍盡降潞王上牋於太后取進止遂自陜而東夏四月庚午朔未明閔帝至衛州東數里遇石敬瑭帝大喜問以社稷大計敬瑭曰聞康義誠西討何如陛下何為至此帝曰義誠亦叛去矣敬瑭俛首長歎數四曰衛州刺史王弘䞇宿將習事請與圖之乃往見弘䞇問之弘贄曰前代天子播遷多矣然皆有將相侍衛府庫法物使羣下有所瞻仰今皆無之獨以五十騎自隨雖有忠義之心將若之何敬瑭還見帝於衞州驛以弘䞇之言告弓箭庫使沙守榮奔洪進前責敬瑭曰公明宗愛壻富貴相與共之憂患亦宜相恤今天子播越委計於公兾圖興復乃以此四者為辭是直欲附賊賣天子耳守榮抽佩刀欲刺之敬瑭親將陳暉救之守榮與暉鬭死洪進亦自刎敬瑭牙内指揮使劉知逺引兵入盡殺帝左右及從騎獨置帝而去敬瑭遂趣洛陽是日太后令内諸司至乾壕迎潞王王亟遣還洛陽初潞王罷河中歸私第王淑妃數遣孟漢瓊存撫之漢瓊自謂於王有舊恩至澠池西見王大哭欲有所陳王曰諸事不言可知仍自預從臣之列王即命斬於路隅山南西道節度使張䖍釗之討鳯翔也留武定節度使孫漢韶守興元䖍釗旣敗奔歸興元與漢韶舉兩鎭之地降于蜀蜀主命奉鸞肅衛馬歩都指揮使昭武節度使李肇將兵五千還利州右匡聖馬歩都指揮使寧江節度使張業將兵一萬屯大漫天以迎之壬申潞王至蔣橋百官班迎於路傳教以未拜梓宫未可相見馮道等皆上牋勸進王入謁太后太妃詣西宮伏梓宫慟哭自陳詣闕之由馮道帥百官班見拜王荅拜道等復上牋勸進王立謂道等曰予之此行事非獲巳俟皇帝歸闕園寢禮終當還守藩服羣公遽言及此甚無謂也癸酉太后下令廢少帝為鄂王以潞王知軍國事權以書詔印施行百官詣至徳宫門待罪王命各復其位甲戌太后令潞王宜即皇帝位乙亥即位於柩前帝之發鳯翔也許軍士以入洛人賞錢百緡旣至問三司使王玫以府庫之實對有數百萬在旣而閱實金帛不過三萬兩匹而賞軍之費計應用五十萬緡帝怒玫請率京城民財以足之數日僅得數萬緡帝謂執政曰軍不可不賞人不可不恤今將柰何執政請據屋為率無問士庶自居及僦者預借五月僦直從之王弘䞇遷閔帝於州廨帝遣􅀪贄之子殿直巒往酖之戊寅巒至衛州謁見閔帝問來故不對􅀪䞇數進酒閔帝知其有毒不飲巒縊殺之閔帝性仁厚於兄弟敦睦雖遭秦王忌疾閔帝坦懐待之卒免於患及嗣位於潞王亦無嫌而朱􅀪昭孟漢瓊之徒横生猜間閔帝不能違以至禍敗焉孔妃尚在宫中王巒旣還潞王使人謂之曰重􅁻輩何在遂殺妃并其四子閔帝之在衛州也惟磁州刺史宋令詢遣使問起居聞其遇害慟哭半日自經死己卯石敬瑭入朝庚辰以劉煦判三司辛巳蜀大赦改元明徳帝之起鳯翔也召興州刺史劉遂清遲疑不至聞帝入洛乃悉集三泉西縣金牛桑林戍兵以歸自散關以南城鎭悉弃之皆為蜀人所有癸未入朝帝欲治其罪以其能自歸乃赦之遂清鄩之姪也甲申蜀將張業將兵入興元洋州乙酉改元大赦丁亥以宣徽南院使郝瓊權判樞密院前三司使王玫為宣徽北院使鳯翔節度判官韓昭㣧為左諌議大夫充端明殿學士戊子斬河陽節度使判六軍諸衛兼侍中康義誠滅其族己丑誅藥彦稠庚寅釋王景戡萇從簡有司百方斂民財僅得六萬帝怒下軍巡使獄晝夜督責囚繫滿獄貧者至自經赴井而軍士遊市肆皆有驕色市人聚詬之曰汝曹為主力戰立功良苦反使我輩鞭胷杖背出財為賞汝曹猶揚揚自得不愧天地乎是時竭左藏舊物及諸道貢獻乃至太后太妃噐服簮珥皆出之纔及二十萬緡帝患之李專美夜直帝讓之曰卿名有才不能為我謀此留才安所施乎專美謝曰臣駑劣陛下擢任過分然軍賞不給非臣之責也竊思自長興之季賞賚亟行卒以是驕繼以山陵及出師帑藏遂涸雖有無窮之財終不能滿驕卒之心故陛下拱手於危困之中而得天下夫國之存亡不專繫於厚賞亦在修法度立紀綱陛下苟不改覆車之轍臣恐徒困百姓存亡未可知也今財力盡於此矣宜據所有均給之何必踐初言乎帝以為然壬辰詔禁軍在鳯翔歸命者自楊思權尹暉等各賜二馬一駝錢七十緡下至軍人錢二十緡其在京者各十緡軍士無厭猶怨望為謡言曰除去菩薩扶立生鐵以閔帝仁弱帝剛嚴有悔心故也丙申葬聖徳和武欽孝皇帝于徽陵廟號明宗帝衰絰䕶從至陵所宿焉五月丙午以韓昭㣧為樞密使以莊宅使劉延朗為樞密副使權知樞密院房暠為宣徽北院使暠長安人也帝與石敬瑭皆以勇力善鬬事明宗為左右然心競素不相恱帝即位敬瑭不得巳入朝山陵旣畢不敢言歸時敬瑭久病羸瘠太后及魏國公主屢為之言而鳯翔舊將佐多勸帝留之惟韓昭㣧李專美以為趙延壽在汴不宜猜忌敬瑭帝亦見其骨立不以為虞乃曰石郎不惟密親兼自少與吾同艱難今我為天子非石郎尚誰託哉乃復以為河東節度使戊午以隴州防禦使相里金為保義節度使丁未階州刺史趙澄降蜀戊申以羽林軍使楊思權為静難節度使己酉張䖍釗孫漢韶舉族遷于成都庚戌以司空兼門下侍郎同平章事馮道同平章事充匡國節度使以天雄節度使兼侍中范延光為樞密使帝之起鳯翔也悉取天平節度使李從曮家財甲兵以供軍將行鳯翔之民遮馬請復以從曮鎭鳯翔帝許之至是徙從曮為鳯翔節度使初明宗為北面招討使平盧節度使房知温為副都部署帝以别將事之甞被酒忿爭拔刃相擬及帝舉兵入洛知温密與行軍司馬李冲謀拒之沖請先奉表以觀形􅀔還言洛中巳安定知温懼壬戌入朝謝罪帝優禮之知温貢獻甚厚呉鎭南節度使守中書令東海康王徐知詢卒蜀人取成州六月甲戌以皇子左衛上將軍重美為成徳節度使同平章事兼河南尹判六軍諸衛事文州都指揮使成延􅀛舉州附蜀呉徐知誥將受禪忌昭武節度使兼中書令臨川王濛遣人告濛藏匿亡命擅造兵器丙子降封歷陽公幽于和州命控鶴軍使王宏將兵二百衛之劉煦與馮道昬姻煦性苛察李愚剛􅄶道旣出鎭二人論議多不合事有應改者愚謂煦曰此賢親家所為更之不亦便乎煦恨之由是動成忿争至相詬罵各欲非時求見事多凝滯帝患之欲更命相問所親信以朝臣聞望宜為相者皆以尚書左丞姚顗太常卿盧文紀祕書監崔居儉對論其才行互有優劣帝不能決乃寘其名於琉璃瓶夜焚香祝天且以筯挾之首得文紀次得顗秋七月辛亥以文紀為中書侍郎同平章事居儉蕘之子也帝欲殺楚匡祚韓昭㣧曰陛下為天下父天下之人皆陛下子用法宜存至公匡祚受詔撿校重􅁻家財不得不爾今族匡祚無益死者恐不厭衆心乙卯長流匡祚於登州丁巳立沛國夫人劉氏為皇后回鶻入貢者多為河西雜虜所掠詔將軍牛知柔帥禁兵衛送與邠州兵共討之呉徐知誥召右僕射兼中書侍郎同平章事宋齊丘還金陵以為諸道都統判官加司空於事皆無所關預齊丘屢請退居知誥以南園給之護國節度使洋王從璋歸徳節度使涇王從敏皆罷鎭居洛陽私第帝待之甚薄從敏在宋州預殺重吉帝尤惡之甞侍宴禁中酒酣顧二王曰爾等皆何物輒據雄藩二王大懼太后叱之曰帝醉矣爾曹速去蜀置永平軍於雅州以孫漢韶為節度使復以張䖍釗為山南西道節度使同平章事䖍釗固辭不行蜀主得風疾踰年至是増劇甲子立子東川節度使同平章事親衛馬歩都指揮使仁賛為太子仍監國召司空同平章事趙季良武信節度使李仁罕保寧節度使趙廷隱樞密使王處回捧聖控鶴都指揮使張公鐸奉鑾肅衛指揮副使矦弘實受遺詔輔政是夕殂祕不發喪王處回夜啓義興門告趙季良處回泣不已季良正色曰今彊將握兵專伺時變宜速立嗣君以絶覬覦豈可但相泣邪處回收淚謝之季良教處回見李仁罕審其詞旨然後告之處回至仁罕第仁罕設備而出遂不以實告丙寅宣遺制命太子仁賛更名昶丁卯即皇帝位初帝以王玫對左藏見財失實故以劉煦代判三司煦命判官髙延賞鉤考窮覈皆積年逋欠之數姦吏利其徵責匄取故存之煦具奏其狀且請察其可徵者急督之必無可償者悉蠲之韓昭􅅌極言其便八月庚午詔長興以前戸部及諸道逋租三百三十八萬虛煩簿籍咸蠲免勿徵貧民大恱而三司吏怨之辛未以姚顗為中書侍郎同平章事右龍武統軍索自通以河中之隙心不自安戊子退朝過洛自投于水而卒帝聞之大驚贈太尉丙申以前安國節度使同平章事趙鳯為太子太保九月癸卯詔鳯翔益兵守東安鎭以備蜀蜀衛聖諸軍都指揮使武信節度使李仁罕自恃宿將有功復受顧託求判六軍令進奏吏宋從㑹以意諭樞密院又至學士院偵草麻蜀主不得已甲寅加仁罕兼中書令判六軍事以左匡聖都指揮使保寧節度使趙廷隱兼侍中為之副己未雲州奏契丹入宼北面招討使石敬瑭奏自將兵屯百井以備契丹辛酉敬瑭奏振武節度使楊檀擊契丹於境上却之蜀奉鑾肅衛都指揮使昭武節度使兼侍中李肇聞蜀主即位顧望不時入朝至漢州留與親戚燕飲踰旬冬十月庚午始至成都稱足疾扶杖入朝見蜀主不拜戊寅左僕射門下侍郎同平章事李愚罷守本官吏部尚書兼門下侍郎同平章事判三司劉煦罷為右僕射三司吏聞煦罷相皆相賀無一人從歸第者蜀棒聖控鶴都指揮使張公鐸與醫官使韓繼勲豐徳庫使韓保貞茶酒庫使安思謙等皆事蜀主於藩邸素怨李仁罕共譛之云仁罕有異志蜀主令繼勲等與趙季良李廷隱謀因仁罕入朝命武士執而殺之癸未下詔暴其罪并其子繼宏及宋從㑹等數人皆伏誅是日李肇釋杖而拜蜀渠州都押牙文景琛據城叛果州刺史李延厚討平之蜀主左右以李肇倨慢請誅之戊子以肇為太子少傅致仕徙邛州呉主加徐知誥大丞相尚父嗣齊王九錫辭不受雄武節度使張延朗將兵圍文州階州刺史郭知瓊拔尖石寨蜀李延厚將果州兵屯興州遣先登指揮使范延暉將兵救文州延朗解圍而歸興州刺史馮暉自乾渠引戌兵歸鳯翔十一月徐知誥召其子司徒同平章事景通還金陵為鎭海寧國節度副大使諸道副都統判中外諸軍事以次子牙内馬歩都指揮使海州團練使景遷為左右軍都軍使左僕射叅政事留江都輔政十二月己巳以易州刺史安叔千為振武節度使齊州防禦使尹暉為彰國節度使叔千沙陀人也壬申石敬瑭奏契丹引去罷兵歸乙亥徵雄武節度使張延朗為中書侍郎同平章事判三司辛巳漢皇后馬氏殂甲申蜀葬文武聖徳英烈明孝皇帝于和陵廟號髙祖乙酉葬鄂王于徽陵城南封纔數尺觀者悲之是歳秋冬旱民多流亡同華蒲絳尤甚漢主命判六軍秦王弘度募宿衛兵千人皆市井無賴子弟弘度昵之同平章事楊洞潜諌曰秦王國之冢嫡宜親端士使之治軍巳過矣況昵羣小乎漢主曰小兒教以戎事過煩公憂終不戒弘度洞潜出見衛士掠啇人金帛啇人不敢訴歎曰政亂如此安用宰相因謝病歸第久之不召遂卒二年春正月丙申朔閩大赦改元永和二月丙寅朔蜀大赦甲戌以樞密使天雄節度使兼侍中范延光為宣武節度使兼中書令丁丑夏州節度使李彞超上言疾病以兄行軍司馬彞殷權知軍州事彞超尋卒戊寅蜀主尊母李氏為皇太后太后太原人本莊宗後宫也以賜蜀髙祖己丑追尊帝母魯囯夫人魏氏曰宣憲皇太后閩主立淑妃陳氏為皇后初閩主兩娶劉氏皆士族美而無寵陳后本閩太祖侍婢金鳯也陋而淫閩主嬖之以其族人守恩匡勝為殿使三月辛丑以前宣武節度使兼侍中趙延壽為忠武節度使兼樞密使以李彞殷為定難節度使己酉贈吴越王元瓘母陳氏為晉國太夫人元瓘性孝尊禮母黨厚加賜與而未甞遷官授以重任壬戌以彰聖都指揮使安審􅄾領順化節度使審琦金全之子也太常丞史在徳性狂狷上書歷詆内外文武之士請徧加考試黜陟能否執政及朝士大怒盧文紀及補闕劉濤楊昭儉等皆請加罪帝謂學士馬㣧孫曰朕新臨天下宜開言路若朝士以言獲罪誰敢言者卿為朕作詔書宣朕意乃下詔略曰昔魏徵請賞皇甫徳參今濤等請黜史在徳事同言異何其逺哉在徳情在傾輸安可責也昭儉嗣復之曽孫也呉加徐景遷同平章事知左右軍事徐知誥令尚書郎陳覺輔之謂覺曰吾少時與宋子嵩論議好相詰難或吾捨子嵩還家或子嵩拂衣而起子嵩携衣笥望秦淮門欲去者數矣吾常戒門者止之吾今老矣猶未徧逹時事況景遷年少當國故屈吾子以誨之耳夏四月庚午蜀以御史中丞龍門母昭裔為中書侍郎同平章事癸未加樞密使刑部尚書韓昭㣧中書侍郎同平章事辛卯以宣徽南院使劉延皓為刑部尚書充樞密使延皓皇后之弟也癸巳以左領軍衞大將軍劉延朗為本衛上將軍充宣徽北院使兼樞密副使五月丙申契丹寇新州及振武庚戌賜振武節度使楊檀名光逺六月吴徳勝節度使兼中書令柴再用卒先是史官王振甞詢其戰功再用曰鷹犬微効皆社稷之靈再用何功之有竟不報契丹寇應州河東節度使北面緫管石敬瑭既還鎭隂為自全之計帝好咨訪外事常命端明殿學士李專美翰林學士李崧知制誥呂琦薛文遇翰林天文趙延乂等更直於中興殿庭與語或至夜分時敬瑭二子為内使曹太后則晉國長公主之母也敬瑭賂太后左右令伺帝之密謀事無巨細皆知之敬瑭多於賓客前自稱羸瘠不堪為帥兾朝廷不之忌時契丹屢寇北邊禁軍多在幽并敬瑭與趙徳鈞求益兵運糧朝夕相繼甲申詔借河東人有蓄積者菽粟乙酉詔鎭州輸絹五萬匹於緫管府糴軍糧率鎭兾人車千五百乗運糧於代州又詔魏􅀶市糴時水旱民饑敬瑭遣使督趣嚴急山東之民流散亂始兆矣敬瑭將大軍屯忻州朝廷遣使賜軍士夏衣傳詔撫諭軍士呼萬歲者數四敬瑭懼幕僚河内段希堯請誅其唱首者敬瑭命都押衙劉知逺斬挾馬都將李暉等三十六人以徇希堯懐州人也帝聞之益疑敬瑭壬辰詔竊盜不計贓多少并縱火彊盜並行極法閩福王繼鵬私於宮人李春鷰繼鵬請之於陳后后白閩主而賜之秋七月以樞密使劉延皓為天雄節度使乙巳以武寧節度使張敬逹為北面行營副緫管將兵屯代州以分石敬瑭之權帝深以時事為憂甞從容讓盧文紀等以無所規賛丁巳文紀等上言臣等每五日起居與兩班旅見暫獲對揚侍衛滿前雖有愚慮不敢敷陳竊見前朝自上元以來置延英殿或宰相欲有奏論天子欲有咨度皆非時召對旁無侍衛故人得盡言望復此故事惟聽機要之臣侍側詔以舊制五日起居百僚俱退宰相獨升若常事自可敷奏或事應嚴密不以其日或異日聽於閤門奏牓子當盡屏侍臣於便殿相待何必襲延英之名也呉潤州團練使徐知諤狎昵小人游燕廢務作列肆於牙城西躬自貿易徐知誥聞之怒召知諤左右詰責知諤懼或謂知誥曰忠武王最愛知諤而以後事傳於公往年知詢失守論議至今未息借使知諤治有能名訓兵養民於公何利知誥感悟待之加厚九月丙申呉大赦改元天祚己酉以宣徽南院使房暠為刑部尚書充樞密使宣徽北院使劉延朗為南院使仍兼樞密副使於是延朗及樞密直學士薛文遇等居中用事暠與趙延壽雖為使長其聴用之言什不三四暠隨􅀔可否不為事先每幽并遣使入奏樞密諸人環坐議之暠多俛首而寐比覺引頸振衣則使者去矣啔奏除授一歸延朗諸方鎭刺史自外入者必先賂延朗後議貢獻賂厚者先得内地賂薄者晩得邊陲由是諸將帥皆怨憤帝不能察蜀金州防禦使全師郁寇金州拔水寨城中兵纔千人都監陳知隱託它事將兵三百㳂流遁去防禦使馬全節罄私財以給軍出竒死戰蜀兵乃退戊寅詔斬知隱初閩主有幸臣曰歸守明出入卧内閩主晩年得風疾陳后與守明及百工院使李可殷私通國人皆惡之莫敢言可殷嘗譛皇城使李倣於閩主后族陳匡勝無禮於福王繼鵬倣及繼鵬皆恨之閩主疾甚繼鵬有喜色倣以閩主為必不起冬十月己卯使壯士數人持白梃擊李可殷殺之中外震驚庚辰閩主疾少間陳后訴之閩主力疾視朝詰可殷死状倣懼而出俄頃引部兵鼓譟入宫閩主聞變匿於九龍帳下亂兵刺之而出閩主宛轉未絶宫人不忍其苦為絶之倣與繼鵬殺陳后陳守恩陳匡勝歸守明及繼鵬弟繼韜繼韜素與繼鵬相惡故也辛巳繼鵬稱皇太后令監國是日即皇帝位更名昶謚其父曰齊肅明孝皇帝廟號惠宗既而自稱權知福建節度事遣使奉表於唐大赦境内立李春鷰為賢妃初閩惠宗娶漢主女清逺公主使宦者閩清林延遇置邸於番禺專掌國信漢主賜以大第稟賜甚厚數問以閩事延遇不對退謂人曰去閩語閩去越語越處人宫禁可如是乎漢主聞而賢之以為内常侍使鉤校諸司事延遇聞惠宗遇弑求歸不許素服向其國三日哭荆南節度使高從誨性明逹親禮賢士委任梁震以兄事之震常謂從誨為郎君楚王希範好奢靡游談者共誇其盛從誨謂僚佐曰如馬王可謂大丈夫矣孫光憲對曰天子諸侯禮有等差彼乳臭子驕侈僣忲取快一時不為逺慮危亡無日又足慕乎從誨久而悟曰公言是也它日謂梁震曰吾自念平生奉養固巳過矣乃􅂢去玩好以經史自娛省刑薄賦境内以安梁震曰先王待我如布衣交以嗣王屬我今嗣王能自立不墜其業吾老矣不復事人矣遂固請退居從誨不能留乃為之築室於土洲震披鶴氅自稱荆臺隠士每詣府跨黄牛至聴事從誨時過其家四時賜與甚厚自是悉以政事屬孫光憲臣光曰孫光憲見㣲而能諌髙從誨聞善而能徙梁震成功而能退自古有國家者能如是夫何亡國敗家喪身之有吳加中書令徐知誥尚父太師大丞相大元帥進封齊王備殊禮以昇潤宣池歙常江饒信海十州為齊國知誥辭尚父丞相殊禮不受閩皇城使判六軍諸衛李倣專制朝政陰養死士閩主昶與拱宸指揮使林延皓等圖之延皓等詐親附倣倣待之不疑十一月壬子倣入朝延皓等伏衛士數百於内殿執斬之梟首朝門倣部兵千餘持白梃攻應天門不克焚啓聖門奪倣首奔吳越詔暴倣弑君及殺繼韜等罪告諭中外以建王繼嚴權判六軍諸衛以六軍判官永泰葉翹為内宣徽使參政事翹博學質直閩惠宗擢為福王友昶以師傅禮待之多所禆益宫中謂之國翁昶既嗣位驕縱不與翹議國事一旦昶方視事翹衣道士服過庭中趨出昶召還拜之曰軍國事殷久不接對孤之過也翹頓首曰老臣輔導無状致陛下即位以來無一善可稱願乞骸骨昶曰先帝以孤屬公政今不善公當極言柰何弃孤去厚賜金帛慰諭令復位昶元妃梁國夫人李氏同平章事敏之女昶嬖李春鷰待夫人甚薄翹諌曰夫人先帝之甥聘之以禮奈何以新愛而弃之昶不悦由是踈之未㡬復上書言事昶批其紙尾曰一葉隨風落御溝遂放歸永泰以壽終帝嘉馬全節之功召詣闕劉延朗求賂全節無以與之延朗欲除全節絳州刺史羣議沸騰帝聞之乙卯以全節為横海留後十二月壬申以中書侍郎同平章事充樞密使韓昭㣧同平章事充䕶國節度使乙酉以前匡國節度使同平章事馮道為司空時久無正拜三公者朝議疑其職事盧文紀欲令掌祭祀掃除道聞之曰司空掃除職也吾何憚焉既而文紀自知不可乃止閩主賜洞眞先生陳守元號天師信重之乃至更易將相刑罰選舉皆與之議守元受賂請託言無不從其門如市資治通鑑巻第二百七十九
