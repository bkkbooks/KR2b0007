front:
  text: 進後宫無序矣聦置丞相等七公又置輔漢等十六大將軍各配兵二千以諸子爲之又置左右司􅀠各領户二十餘萬萬户置一内史單于左右輔各主六夷十萬落萬落置一都尉左右選曹尚書竝典選舉自司􅀠以下六官皆位亞僕射以其子粲爲丞相領大將軍録尚書事進封晉王江都王延年録尚書六條事汝隂王景爲太師王育爲太傅任顗爲太保馬景爲大司徒朱紀爲大司空中山王曜爲大司馬壬辰王子春等及王浚使者至襄國石勒匿其勁卒精甲羸師虛府以示之北面拜使者而受書浚遺勒麈尾勒陽不敢執懸之於壁朝夕拜之曰我不得見王公見其所賜如見公也復遣董肇奉表于浚期以三月中旬親詣幽州奉上尊號亦脩牋于棗嵩求并州牧廣平公勒問浚之政事於王子春子春曰幽州去嵗大水人不粒食浚積粟百萬不能賑贍刑政苛酷賦役殷煩忠賢内離夷狄外叛人皆知其將亡而浚意氣自若曽無懼心方更置立臺閣布列百官自謂漢高魏武不足比也勒撫几笑曰王彭祖眞可擒也浚使者還薊具言石勒形勢寡弱款誠無二浚大恱益驕怠不復設備楊虎掠漢中吏民以犇成梁州人張咸等起兵逐楊難敵難敵去咸以其地歸成於是漢嘉涪陵漢中之地皆為成有成主雄以李鳳為梁州刺史任囘為寧州刺史李恭為荆州刺史雄虛已好賢隨才授任命太傅驤養民於内李鳳等招懐於外刑政寛簡獄無滯囚興學校置史官其賦民男丁嵗榖三斛女丁半之疾病又半之户調絹不過數丈綿數兩事少役希民多富實新附者皆給復除是時天下大亂而蜀獨無事年榖屢熟乃至閭門不閉路不拾遺漢嘉夷王冲歸朱提審炤建寧爨畺皆歸之巴郡嘗告急云有晉兵雄曰吾常憂琅邪微弱遂為石勒所滅以為耿耿不圖乃能舉兵使人欣然然雄朝無儀品爵位濫溢吏無禄秩取給於民軍無部伍號令不肅此其所短也二月壬寅以張軌為太尉涼州牧封西平郡公王浚為大司馬都督幽冀諸軍事荀組為司空領尚書左僕射兼司􅀠校尉行留臺事劉琨為大將軍都督并州諸軍事朝廷以張軌老病拜其子寔為副刺史石勒纂嚴將襲王浚而猶豫未發張賓曰夫襲人者當出其不意今軍嚴經曰而不行豈非畏劉琨及鮮卑烏􅁊為吾後患乎勒曰然為之柰何賔曰彼三方智勇無及將軍者將軍雖逺出彼必不敢動且彼未謂將軍便能懸軍千里取幽州也輕軍往返不出二旬藉使彼雖有心比其謀議出師吾已還矣且劉琨王浚雖同名晉臣實為仇敵若脩牋于琨送質請和琨必喜我之服而快浚之亡終不救浚而襲我也用兵貴神速勿後時也勒曰吾所未了右矦已了之吾復何疑遂以火宵行至栢人殺主簿游綸以其兄統在范陽恐泄軍謀故也遣使奉牋送質于劉琨自陳罪惡請討浚以自效琨大喜移檄州郡稱已與猗盧方議討勒勒走伏無地求抜幽都以贖罪今便當遣六脩南襲平陽除僭偽之逆類降知死之逋羯順天副民翼奉皇家斯乃曩年積誠靈祐之所致也三月勒軍達易水王浚督䕶孫緯馳遣白浚將勤兵拒之游統禁之浚將佐皆曰胡貪而無信必有詭計請擊之浚怒曰石公來正欲奉戴我耳敢言擊者斬衆不敢復言浚設饗以待之壬申勒晨至薊叱門者開門猶疑有伏兵先驅牛羊數千頭聲言上禮實欲塞諸街巷浚始懼或坐或起勒旣入城縱兵大掠浚左右請禦之浚猶不許勒升其聽事浚乃走出堂皇勒衆執之勒召浚妻與之竝坐執浚立於前浚罵曰胡奴調乃公何凶逆如此勒曰公位冠元台手握彊兵坐觀本朝傾覆曽不救援乃欲自尊為天子非凶逆乎又委任姦貪殘虐百姓賊害忠良毒徧燕土此誰之罪也使其將王洛生以五百騎先送浚于襄國浚自投于水束而出之斬于襄國市勒殺浚麾下精兵萬人浚將佐等爭詣軍門謝罪饋賂交錯前尚書裴憲從事中郎荀綽獨不至勒召而讓之曰王浚暴虗􅀌討而誅之諸人皆來慶謝二君獨與之同惡將何以逃其戮乎對曰憲等世仕晉朝荷其榮禄浚雖凶麤猶是晉之藩臣故憲等從之不敢有貳明公苟不脩德義專事威刑則憲等死自其分又何逃乎請就死不拜而出勒召而謝之待以客禮綽朂之孫也勒數朱碩棗嵩等以納賄亂政為幽州患責游統以不忠所事皆斬之籍浚將佐親戚家貲皆至巨萬惟裴憲荀綽止有書百餘􅐆鹽米各十餘斛而已勒曰吾不喜得幽州喜得二子以憲為從事中郎綽為參軍分遣流民各還鄉里勒停薊二日焚浚宫殿以故尚書燕國劉翰行幽州刺史戍薊置守宰而還孫緯遮擊之勒僅而得免勒至襄國遣使奉王浚首獻捷于漢漢以勒為大都督督陜東諸軍事驃騎大將軍東單于増封十二郡勒固辭受二郡而已劉琨請兵於拓跋猗盧以擊漢㑹猗盧所部雜胡萬餘家謀應石勒猗盧悉誅之不果赴琨約琨知石勒無降意乃大懼上表曰東北八州勒滅其七先朝所授存者惟臣勒據襄國與臣隔山朝發夕至城塢駭懼雖懐忠憤力不從願耳劉翰不欲從石勒乃歸段匹磾匹磾遂據薊城王浚從事中郎陽裕躭之兄子也逃犇令支依叚疾陸眷㑹稽朱左車魯國孔纂㤗山胡母翼自薊逃犇昌黎依慕容廆是時中國流民歸廆者數萬家廆以冀州人為冀陽郡豫州人為成周郡青州人為營丘郡并州人為唐國郡初王浚以邵續為樂陵太守屯厭次浚敗續附於石勒勒以續子乂為督䕶浚所署勃海太守東萊劉胤弃郡依續謂續曰凡立大功必杖大義君晉之忠臣柰何從賊以自汙乎㑹段匹磾以書邀續同歸左丞相睿續從之其人皆曰今棄勒歸匹磾其如乂何續泣曰我豈得顧子而為叛臣哉殺異議者數人勒聞之殺乂續遣劉􅅌使江東睿以胤為參軍以續為平原太守石勒遣兵圍續匹磾使其弟文鴦救之勒引去
