body:
  text: 襄國大饑榖二升直銀一斤肉一斤直銀一兩杜弢將王眞襲陶侃於休障侃犇灄中周訪救侃擊弢兵破之夏五月西平武穆公張軌寢疾遺令文武將佐務安百姓上思報國下以寧家己丑軌薨長史張璽等表丗子寔攝父位漢中山王曜趙染冦長安六月曜屯渭汭染屯新豐索綝將兵出拒之染有輕綝之色長史魯徽曰晉之君臣自知强弱不敵將致死於我不可輕也染曰以司馬模之彊吾取之如拉朽索綝小豎豈能汙吾馬蹄刀刃邪晨帥輕騎數百逆之曰要當獲綝而後食綝與戰于城西染兵敗而歸悔曰吾不用魯徽之言以至此何面目見之先命斬徽徽曰將軍愚愎以取敗乃復忌前害勝誅忠良以逞忿猶有天地將軍其得死於枕席乎詔加索綝驃騎大將軍尚書左僕射録尚書承制行事曜染復與將軍殷凱帥衆數萬向長安麴允逆戰於馮翊允敗收兵夜襲凱營凱敗死曜乃還攻河内太守郭黙于懷列三屯圍之黙食盡送妻子為質請糴於曜糴畢復嬰城固守曜怒沈黙妻子于河而攻之黙欲投李矩於新鄭矩使其甥郭誦迎之兵少不敢進㑹劉琨遣參軍張肇帥鮮卑五百餘騎詣長安道阻不通還過矩營矩說肈使擊漢兵漢兵望見鮮卑不戰而走黙遂帥衆歸矩漢主聦召曜還屯蒲阪秋趙染攻北地麴允拒之染中弩而死石勒始命州郡閱實户口户出帛二匹􅂖二斛冬十月以張寔為都督涼州諸軍事涼州刺史西平公十一月漢主聦以晉王粲為相國大單于揔百揆粲少有儁才自為宰相驕奢專恣逺賢親佞嚴刻愎諫國人始惡之周勰以其父遺言因呉人之怨謀作亂使呉興功曹徐馥矯稱叔父丞相從事中郎札之命收合徒衆以討王導刁協豪傑翕然附之孫皓族人弼亦起兵於廣德以應之三年春正月徐馥殺呉興太守袁琇有衆數千欲奉周札為主札聞之大驚以告義興太守孔侃勰知札意不同不敢發馥黨懼攻馥殺之孫弼亦死札子續亦聚衆應馥左丞相睿議發兵討之王導曰今少發兵則不足以平冦多發兵則根本空虛續族弟黄門侍郎莚忠果有謀請獨使莚往足以誅續睿從之莚晝夜兼行至郡將入遇續於門謂續曰當與君共詣孔府君有所論續不肯入莚牽逼與俱坐定莚謂孔侃曰府君何以置賊在坐續衣中常置刀即操刀逼莚莚叱郡傳教呉曽格殺之莚因欲誅勰札不聽委罪於從兄邵而誅之莚不歸家省母遂長驅而去母狼狽追之睿以札為呉興太守莚為太子右衛率以周氏呉之豪望故不窮治撫勰如舊詔平東將軍宋哲屯華隂成主雄立后任氏二月丙子以琅邪王睿為丞相大都督督中外諸軍事南陽王保為相國荀組為太尉領豫州牧劉琨為司空都督并冀幽三州諸軍事琨辭司空不受南陽王模之敗也都尉陳安往歸世子保於秦州保命安將千餘人討叛羌寵待甚厚保將張春疾之譖安云有異志請除之保不許春輒伏刺客以刺安安被創馳還隴城遣使詣保貢獻不絶詔進拓跋猗盧爵為代王置官屬食代常山二郡猗盧請并州從事鴈門莫含於劉琨琨遣之含不欲行琨曰以并州單弱吾之不材而能自存於胡羯之間者代王之力也吾傾身竭貲以長子為質而奉之者庶㡬為朝廷雪大耻也卿欲為忠臣奈何惜共事之小誠而忘徇國之大節乎往事大王為之腹心乃一州之所賴也含遂行猗盧甚重之常與參大計倚盧用灋嚴國人犯灋者或舉部就誅老㓜相攜而行人問何之曰往就死無一人敢逃匿者王敦遣陶侃甘卓等討杜弢前後數十戰弢將士多死乃請降於丞相睿睿不許弢遺南平太守應詹書自陳昔與詹共討樂鄉本同休戚後在湘中懼死求生遂相結聚儻以舊交之情為明枉直使得輸誠盟府厠列義徒或北清中原或西取李雄以贖前愆雖死之日猶生之年也詹為啓呈其書且言弢益州秀才素有清望為鄉人所逼今悔惡歸善宐命使撫納以息江湘之民睿乃使前南海太守王運受弢降赦其反逆之罪以弢為巴東監軍弢既受命諸將猶攻之不已弢不勝憤怒遂殺運復反遣其將杜􅀪張彦殺臨川内史謝摛遂䧟豫章三月周訪擊彦斬之弘犇臨賀漢大赦改元建元兩血於漢東宫延明殿太弟义惡之以問太傅崔瑋太保許遐瑋遐說义曰主上往日以殿下為太弟者欲以安衆心耳其志在晉王久矣王公已下莫不希㫖附之今復以晉王為相國羽儀威重踰於東宫萬機之事無不由之諸王皆置營兵以為羽翼事勢已去殿下非徒不得立也朝夕且有不測之危不如早為之計今四衛精兵不減五千相國輕佻正煩一刺客耳大將軍無日不出其營可襲而取餘王竝㓜固易奪也茍殿下有意二萬精兵指顧可得鼓行入雲龍門宿衛之士孰不倒戈以迎殿下者大司馬不慮其為異也乂弗從東宫舎人荀裕告瑋遐勸乂謀反漢主聦收瑋遐於詔獄假以他事殺之使冠威將軍卜抽將兵監守東宫禁乂不聽朝㑹乂憂懼不知所為上表乞為庶人并除諸子之封褒羙晉王請以為嗣抽抑而弗通漢青州刺史曹嶷盡得齊魯間郡縣自鎭臨淄有衆十餘萬臨河置戌石勒表稱嶷有專據東方之志請討之漢主聦恐勒滅嶷不可復制弗許聦納中䕶軍靳凖二女月光月華立月光為上皇后劉貴妃為左皇后月華為右皇后左司􅀠陳元達極諫以為竝立三后非禮也聦不悅以元達為右光禄大夫外示優崇實奪其權於是太尉范隆等皆請以位讓元達聦乃復以元達為御史大夫儀同三司月光有穢行元達奏之聦不得已廢之月光慙恚自殺聦恨元達夏四月大赦六月盜發漢霸杜二陵及薄太后陵得金帛甚多朝廷以用度不足詔收其餘以實内府辛巳大赦漢大司馬曜攻上黨八月癸亥敗劉琨之衆於襄垣曜欲進攻陽曲漢主聦遣使謂之曰長安未平宐以為先曜乃還屯蒲阪陶侃與杜弢相攻弢使王貢出挑戰侃遥謂之曰杜弢為益州小吏盜用庫錢父死不犇䘮卿本佳人何為隨之天下寧有白頭賊邪貢初横脚馬上聞侃言歛容下脚侃知可動復遣使諭之截髪為信貢遂降於侃弢衆潰遁走道死侃與南平太守應詹進克長沙湘州悉平丞相睿承制赦其所部進王敦鎮東大將軍加都督江楊荆湘交廣六州諸軍事江州刺史敦始自選置刺史以下寖益驕横初王如之降也敦從弟稜愛如驍勇請敦配已麾下敦曰此輩險悍難畜汝性狷急不能容養更成禍端稜固請乃與之稜置左右甚加寵遇如數與敦諸將角射爭鬬稜杖之如深以為恥及敦潜畜異志稜每諫之敦怒其異已密使人激如令殺稜如因閑宴請劒舞為歡稜許之如舞劒漸前稜惡而呵之如直前殺稜敦聞之陽驚亦捕如誅之初朝廷聞張光死以侍中第五猗為安南將軍監荆梁益寧四州諸軍事荆州刺史自武關出杜曾迎猗於襄陽為兄子娶猗女遂聚兵萬人與猗分據漢沔陶侃既破杜弢乗勝進擊曾有輕曾之志司馬魯恬諫曰凡戰當先料其將今使君諸將無及曽者未易可逼也侃不從進圍曾於石城曾軍多騎兵密開門突侃陳出其後反擊之侃兵死者數百人曾將趨順陽下馬拜侃告辭而去時荀崧都督荆州江北諸軍事屯宛曾引兵圍之崧兵少食盡欲求救於故吏襄城太守石覽崧小女灌年十三帥勇士數十人踰城突圍夜出且戰且前遂達覽所又為崧書求救於南中郎將周訪訪遣子撫帥兵三千與覽共救崧曽乃遁去曾復致牋於崧求討丹水賊以自效崧許之陶侃遺崧書曰杜曽凶狡所謂鴟梟食母之物此人不死州土未寧足下當識吾言崧以宛中兵少藉曾為外援不從曾復帥流亡二千餘人圍襄陽數日不克而還王敦嬖人呉興錢鳳疾陶侃之功屢毁之侃將還江陵欲詣敦自陳朱伺及安定皇甫方回諫曰公入必不出侃不從既至敦留侃不遣左轉廣州刺史以其從弟丞相軍諮祭酒廙為荆州刺史荆州將吏鄭攀馬雋等詣敦上書留侃敦怒不許攀等以侃始滅大賊而更被黜衆情憤惋又以廙忌戾難事遂帥其徒二千人屯溳口西迎杜曾廙為攀等所襲犇于江安杜曾與攀等北迎第五猗以拒廙廙督諸軍討曾復為曽所敗敦意攀承侃風㫖被甲持矛將殺侃出而復還者數四侃正色曰使君雄斷當裁天下何此不决乎因起如厠諮議參軍梅陶長史陳頒言於敦曰周訪與侃親姻如左右手安有斷人左手而右手不應者乎敦意解乃設盛饌以餞之侃便夜發敦引其子瞻為參軍初交州刺史顧祕卒州人以祕子壽領州事帳下督梁碩起兵攻壽殺之碩遂專制交州王機自以盜據廣州恐王敦討之更求交州㑹杜弘詣機降敦欲因機以討碩乃以降杜弘為機功轉交州刺史機至鬱林碩迎前刺史脩則子湛行州事以拒之機不得進乃更與杜弘及廣州將温邵交州秀才劉沈謀復還據廣州陶侃至始興州人皆言宐觀察形勢不可輕進侃不聽直至廣州諸郡縣皆已迎機矣杜􅀪遣使偽降侃知其謀進擊􅀪破之遂執劉沈於小桂遣督䕶許高討王機走之機病死于道高掘其尸斬之諸將皆請乗勝擊温邵侃笑曰吾威名已著何事遣兵但一函紙自定耳乃下書諭之邵懼而走追獲於始興杜􅀪詣王敦降廣州遂平侃在廣州無事輒朝運百甓於齋外暮運於齋内人問其故答曰吾方致力中原過爾優逸恐不堪事故自勞耳王敦以杜􅀪為將寵任之九月漢主聦使大鴻臚賜石勒弓矢䇿命勒為陜東伯得專征伐拜刺史將軍守宰封列矦嵗盡集上漢大司馬曜冦北地詔以麴允為大都督驃騎將軍以禦之冬十月以索綝為尚書僕射都督宫城諸軍事曜進㧞馮翊太守梁肅犇萬年曜轉寇上郡麴允去黄白城軍于靈武以兵弱不敢進帝屢徴兵於丞相保保左右皆曰蝮虵螫手壯士斷腕今胡寇方盛且宐斷隴道以觀其變從事中郎裴詵曰今虵已螫頭頭可斷乎保乃以鎮軍將軍胡崧行前鋒都督須諸軍集乃發麴允欲奉帝往就保索綝曰保得天子必逞其私志乃止於是自長安以西不復貢奉朝廷百官饑乏採稆以自存涼州軍士張冰得璽文曰皇帝行璽獻於張寔僚屬皆賀寔曰是非人臣所得留遣使歸於長安四年春正月司徒梁芬議追尊呉王晏右僕射索綝等引魏明帝詔以為不可乃贈太保謚曰孝漢中常侍王沈宣懐中宫僕射郭猗等皆寵幸用事漢主聦游宴後宫或三日不醒或百日不出自去冬不視朝政事一委相國粲唯殺生除拜乃使沈等入白之沈等多不白而自以其私意决之故勲舊或不叙而姦佞小人有數日至二千石者軍旅嵗起將士無錢帛之賞而後宫之家賜及僮僕動至數千萬沈等車服第舎踰於諸王子弟中表為守令者三十餘人皆貪殘為民害靳凖闔宗謟事之郭猗與凖皆有怨於太弟义猗謂相國粲曰殿下光文帝之世孫主上之嫡子四海莫不屬心奈何欲以天下與太弟乎且臣聞太弟與大將軍謀因三月上已大宴作亂事成許以主上為太上皇大將軍為皇太子又許衛軍為大單于三王處不疑之地竝握重兵以此舉事無不成者然二王貪一時之利不顧父兄事成之後主上豈有全理殿下兄弟固不待言東宫相國單于當在武陵兄弟何肯與人也今禍期甚迫宐早圖之臣屢言於主上主上篤於友愛以臣刀鋸之餘終不之信願殿下勿泄密表其狀殿下儻不信臣言可召大將軍從事中郎王皮衛軍司馬劉惇假之恩意許其歸首以問之必可知也粲許之猗宻謂皮惇曰二王逆狀主上及相國具知之矣卿同之乎二人驚曰無之猗曰兹事已决吾憐卿親舊并見族耳因歔欷流涕二人大懼叩頭求哀猗曰吾為卿計卿能用之乎相國問卿卿但云有之若責卿不先啓卿即云臣誠負死罪然仰惟主上寛仁殿下敦睦茍言不見信則陷於誣譖不測之誅故不敢言也皮惇許諾粲召問之二人至不同時而其辭若一粲以為信然靳凖復説粲曰殿下宐自居東宫以領相國使天下早有所繫今道路之言皆云大將軍衛將軍欲奉太弟為變期以季春若使大弟得天下殿下無容足之地矣粲曰為之奈何凖曰人告太弟為變主上必不信宐緩東宫之禁使賔客得往來太弟雅好待士必不以此為嫌輕薄小人不能無迎合太弟之意為之謀者然後下官為殿下露表其罪殿下收其賓客與太弟交通者考問之獄辭既具則主上無不信之理也粲乃命卜抽引兵去東宫少府陳休左衛將軍卜崇為人清直素惡沈等雖在公座未嘗與語沈等深疾之侍中卜幹謂休崇曰王沈等勢力足以囘天地卿輩自料親賢孰與竇武陳蕃休崇曰吾輩年踰五十職位已崇唯欠一死耳死於忠義乃為得所安能俛首伭眉以事閹豎乎去矣卜公勿復有言二月漢主聦出臨上秋閤命收陳休卜崇及特進綦毋達太中大夫公師彧尚書王琰田歆大司農朱諧竝誅之皆宦官所惡也卜幹泣諫曰陛下方側席求賢而一旦戮卿大夫七人皆國之忠良無乃不可乎藉使休等有罪陛下不下之有司暴明其狀天下何從知之詔尚在臣所未敢宣露願陛下熟思之因叩頭流血王沈叱幹曰卜侍中欲拒詔乎聦拂衣而入免幹為庶人太宰河間王易大將軍勃海王敷御史大夫陳元達金紫光禄大夫西河王延等皆詣闕表諫曰王沈等矯弄詔㫖欺誣日月内諂陛下外佞相國威權之重侔於人主多樹姦黨毒流海内知休等忠臣為國盡節恐發其姦狀故巧為誣陷陛下不察遽加極刑痛徹天地賢愚傷懼今遺晉未殄巴蜀不賔石勒謀據趙魏曹嶷欲王全齊陛下心腹四支何處無患乃復以沈等助亂誅巫咸戮扁鵲臣恐遂成膏肓之疾後雖救之不可及已請免沈等官付有司治罪聦以表示沈等笑曰羣兒為元達所引遂成癡也沈等頓首泣曰臣等小人過䝉陛下識抜得洒掃閨閤而王公朝士疾臣等如讎又深恨陛下願以臣等膏鼎鑊則朝廷自然雍穆矣聦曰此等狂言常然卿何足恨乎聦問沈等於相國粲粲盛稱沈等忠清聦恱封沈等為列矦太宰易又詣闕上䟽極諫聦大怒手壞其䟽三月易忿恚而卒易素忠直陳元達倚之為援得盡諫諍及卒元達哭之慟曰人之云亡邦國殄悴吾既不復能言安用黙黙茍生乎歸而自殺初代王猗盧愛其少子比延欲以為嗣使長子六脩出居新平城而黜其母六脩有駿馬日行五百里猗盧奪之以與比延六脩來朝猗盧使拜比延六脩不從猗盧乃坐比延於其步輦使人導從出遊六脩望見以為猗盧伏謁路左至乃比延六脩慙怒而去猗盧召之不至大怒帥衆討之為六脩所敗猗盧微服逃民閒有賤婦人識之遂為六脩所弑拓跋普根先守外境聞難來赴攻六脩滅之普根代立國中大亂新舊猜嫌迭相誅滅左將軍衛雄信義將軍箕澹乆佐猗盧為衆所附謀歸劉琨乃言於衆曰聞舊人忌新人悍戰欲盡殺之將奈何晉人及烏桓皆驚懼曰死生隨二將軍乃與琨質子遵帥晉人及烏桓三萬家馬牛羊十萬頭歸于琨琨大喜親詣平城撫納之琨兵由是復振夏四月普根卒其子始生普根母惟氏立之張寔下令所部吏民有能舉其過者賞以布帛羊米賊曹佐高昌隗瑾曰今明公為政事無巨細皆自决之或興師發令府朝不知萬一違失謗無所分羣下畏威受成而已如此雖賞之千金終不敢言也謂宐少損聦明凡百政事皆延訪羣下使各盡所懷然後采而行之則嘉言自至何必賞也寔恱從之増瑾位三等寔遣將軍王該帥步騎五千入援長安且送諸郡貢計詔拜寔都督陜西諸軍事以寔弟茂為秦州刺史石勒使石虎攻劉演于廩丘幽州刺史段匹磾使其弟文鴦救之虎抜廩丘演犇文鴦軍虎獲演弟啓以歸寧州刺史王遜嚴猛喜誅殺五月平夷太守雷炤平樂太守董霸帥三千餘家叛降於成六月丁巳朔日有食之秋七月漢大司馬曜圍北地太守麴昌大都督麴允將步騎三萬救之曜繞城縱火煙起蔽天使反間紿允曰郡城已陷往無及也衆懼而潰曜追敗允於磻石谷允犇還靈武曜遂取北地允性仁厚無威斷喜以爵位恱人新平太守笁恢始平太守楊像扶風太守笁爽安定太守焦嵩皆領征鎮杖節加侍中常侍村塢主帥小者猶假銀青將軍之號然恩不及下故諸將驕恣而士卒離怨關中危亂允告急於焦嵩嵩素侮允曰須允困當救之曜進至涇陽渭北諸城悉潰曜獲建威將軍魯充散騎常侍梁緯少府皇甫陽曜素聞充賢募生致之既見賜之酒曰吾得子天下不足定也充曰身為晉將國家䘮敗不敢求生若䝉公恩速死為幸曜曰義士也賜之劒令自殺梁緯妻辛氏美色曜召見將妻之辛氏大哭曰妾夫已死義不獨生且一婦人而事二夫明公又安用之曜曰貞女也亦聽自殺皆以禮葬之漢主聦立故張后侍婢樊氏為上皇后三后之外佩皇后璽綬者復有七人嬖寵用事刑賞紊亂大將軍敷數涕泣切諫聦怒曰汝欲乃公速死邪何以朝夕生來哭人敷憂憤發病卒河東平陽大蝗民流殍者什五六石勒遣其將石越帥騎二萬屯并州招納流民民歸之者二十萬户聦遣使讓勒勒不受命潛與曹嶷相結八月漢大司馬曜逼長安九月漢主宴羣臣於光極殿引見太弟义义容貌憔悴鬢髪蒼然涕泣陳謝聦亦為之慟哭乃縱酒極歡待之如初焦嵩笁恢宋哲皆引兵救長安散騎常侍華輯監京兆馮翊􅀪農上洛四郡兵屯霸上皆畏漢兵彊不敢進相國保遣胡崧將兵入援擊漢大司馬曜於靈臺破之崧恐國威復振則麴索勢盛乃帥城西諸郡兵屯渭北不進遂還槐里曜攻陷長安外城麴允索綝退守小城以自固内外斷絶城中饑甚米斗直金二兩人相食死者太半亡逃不可制唯涼州義衆千人守死不移太倉有麴數十䴵麴允屑之為粥以供帝既而亦盡冬十一月帝泣謂允曰今窮厄如此外無救援當忍恥出降以活士民因歎曰誤我事者麴索二公也使侍中宗敞送降牋於曜索綝潛留敞使其子說曜曰今城中食猶足支一年未易克也若許綝以車騎儀同萬户郡公者請以城降曜斬而送之曰帝王之師以義行也孤將兵十五年未嘗以詭計敗人必窮兵極勢然後取之今索綝所言如此天下之惡一也輙相為戮之若兵食審未盡者便可勉强固守如其糧竭兵微亦宐早寤天命甲午宗敞至曜營乙未帝乗羊車肉袒銜璧輿櫬出東門降羣臣號泣攀車執帝手帝亦悲不自勝御史中丞馮翊吉朗歎曰吾智不能謀勇不能死何忍君臣相隨北面事賊虜乎乃自殺曜焚櫬受璧使宗敞奉帝還宫丁酉遷帝及公卿以下於其營辛丑送至平陽壬寅漢主聦臨光極殿帝稽首於前麴允伏地慟哭扶不能起聦怒囚之允自殺聦以帝為光禄大夫封懷安矦以大司馬曜為假黄鉞大都督督陜西諸軍事太宰封秦王大赦改元麟嘉以麴允忠烈贈車騎將軍諡節愍矦以索綝不忠斬于都市尚書梁允侍中梁濬等及諸郡守皆為曜所殺華輯犇南山干寶論曰昔高祖宣皇帝以雄才碩量應時而起性深阻有若城府而能寛綽以容納行數術以御物而知人善采抜於是百姓與能大象始構世宗承基太祖繼業咸黜異圖用融前烈至于世祖遂享皇極仁以厚下儉以足用和而不弛寛而能斷掩唐虞之舊域班正朔於八荒于時有天下無窮人之諺雖太平未洽亦足以明民樂其生矣武皇既崩山陵未乾而變難繼起宗子無維城之助師尹無具瞻之貴朝為伊周夕成桀跖國政迭移於亂人禁兵外散於四方方岳無鈞石之鎮關門無結草之固戎羯稱制二帝失尊何哉樹立失權託付非才四維不張而茍且之政多也夫基廣則難傾根深則難抜理節則不亂膠結則不遷昔之有天下者所以能長乆用此道也周自后稷愛民十六王而武始君之其積基樹本如此其固今晉之興也其創基立本固異於先代矣加以朝寡純徳之人鄉乏不二之老風俗淫僻恥尚失所學者以莊老為宗而黜六經談者以虚蕩為辯而賤名檢行身者以放濁為通而狹節信進仕者以茍得為貴而鄙居正當官者以望空為高而笑勤恪是以劉頌屢言治道傳咸每糾邪正皆謂之俗吏其倚杖虛曠依阿無心者皆名重海内若夫文王日􆄮不暇食仲山甫夙夜匪懈者蓋共嗤點以為灰塵矣由是毁譽亂於善惡之實情慝犇於貨欲之塗選者為人擇官官者為身擇利世族貴戚之子弟陵邁超越不拘資次悠悠風塵皆犇競之士列官千百無譲賢之舉子眞著崇讓而莫之省子雅制九班而不得用其婦女不知女工任情而動有逆于舅姑有殺戮妾媵父兄弗之罪也天下莫之非也禮法刑政於此太壞國之將亡本必先顛其此之謂乎故觀阮藉之行而覺禮教崩弛之所由察庾純賈充之爭而見師尹之多僻考平呉之功而知將帥之不讓思郭欽之謀而寤戎狄之有釁覽傅玄劉毅之言而得百官之邪核傅咸之奏錢神之論而覩寵賂之彰民風國勢既已如此雖以中庸之才守文之主治之猶懼致亂況我惠帝以放蕩之徳臨之哉懷帝承亂得位羈於彊臣愍帝犇播之後徒守虛名天下之勢既去非命世之雄才不能復取之矣石勒圍樂平太守韓據于坫城據請救於劉琨琨新得拓跋猗盧之衆欲因其鋭氣以討勒箕澹衛雄諫曰此雖晉民久淪異域未習明公之恩信恐其難用不若且内收鮮卑之餘榖外抄胡賊之牛羊閉關守險務農息兵待其服化感義然後用之則功無不濟矣琨不從悉發其衆命澹帥步騎二萬為前驅琨屯廣牧為之聲援石勒聞澹至將逆擊之或曰澹士馬精彊其鋒不可當不若且引兵避之深溝高壘以挫其銳必獲萬全勒曰澹兵雖衆逺來疲弊號令不從何精彊之有今冦敵垂至何可捨去大軍一動豈易中還若澹乗我之退而逼之顧逃潰不暇焉得深溝高壘乎此自亡之道也立斬言者以孔萇為前鋒都督令三軍後出者斬勒據險要設疑兵於山上前設二伏出輕騎與澹戰陽為不勝而走澹縱兵追之入伏中勒前後夾擊澹軍大破之獲鎧馬萬計澹雄帥騎千餘犇代郡韓據棄城走并土震駭十二月乙夘朔日有食之司空長史李弘以并州降石勒劉琨進退失據不知所為段匹磾遣信邀之己未琨帥衆從飛狐犇薊匹磾見琨甚相親重與之結婚約為兄弟勒分徙陽曲樂平民于襄國置守宰而還孔萇攻箕澹于代郡殺之萇等攻賊帥馬嚴馮䐗久而不克司冀并兖流民數萬户在遼西迭相招引民不安業勒問計於濮陽矦張賓賓曰嚴䐗本非公之深仇流民皆有戀本之志今班師振旅選良牧守使招懐之則幽冀之冦可不日而清遼西流民將相帥而至矣勒乃召萇等歸以武遂令李回為易北督䕶兼高陽太守馬嚴士卒素服回威德多叛嚴歸之嚴懼而出走赴水死馮䐗帥其衆降回徙居易京流民歸之者相繼於道勒喜封回為弋陽子增張賔邑千户進位前將軍賓固辭不受丞相睿聞長安不守出師露次躬擐甲冑移檄四方刻日北征以漕運稽期丙寅斬督運令史淳于伯刑者以刀拭柱血逆流上至柱末二丈餘而下觀者咸以為寃丞相司直劉隗上言伯罪不至死請免從事中郎周莚等官於是右將軍王導等上䟽引咎請解職睿曰政刑失中皆吾闇塞所致一無所問隗性剛訐當時名士多被彈劾睿率皆容貸由是衆怨皆歸之南中郎將王含敦之兄也以族彊位顯驕傲自恣一請參佐及守長至二十許人多非其才隗劾奏含文致甚苦事雖被寢而王氏深忌疾之丞相睿以邵續為冀州刺史續女壻廣平劉遐聚衆河濟之間睿以遐為平原内史托跋普根之子又卒國人立其從父鬱律資治通鑑卷第八十九
