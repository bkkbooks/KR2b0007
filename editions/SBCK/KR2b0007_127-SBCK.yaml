body:
  text: 臣司馬光奉勑編集宋紀九落一年昭陽大荒太祖文皇帝下之下元嘉三十年春正月戊寅以南譙王義宣爲司徒楊州刺史蕭道成等帥氐羌攻魏武都魏髙平鎮將茍莫于將突􅀐二千救之道成等引還南鄭壬午以征北將軍始興王濬爲荆州刺史帝怒未解故濬久留京口既除荆州乃聽入朝戊子詔江州刺史武陵王駿統諸軍討西陽蠻軍于五洲嚴道育之亡命也上分遣使者搜捕甚急道育變服爲尼匿於東宫又隨始興王濬至京口或出上民張旿家濬入朝復載還東宫欲與俱往江陵丁巳上臨軒濬入受拜是日有告道育在張旿家者上遣掩捕得其二婢云道育隨征北還都上謂濬與太子劭已斥遣道育而聞其猶與往來惆悵惋駭乃命京口送二婢須至檢覆乃治劭濬之罪潘淑妃抱濬泣曰汝前祝詛事􅀤猶冀能刻意思愆何意更藏嚴道育上怒甚我叩頭乞恩不能解今何用生爲可送藥來當先自取盡不忍見汝禍敗也濬奮衣起曰天下事尋自當判願小寛慮必不上累己未魏京兆王杜元寳坐謀反誅建寧王崇及其子濟南王麗皆爲元寳所引賜死帝欲廢太子劭賜始興王濬死先與侍中王僧綽謀之使僧綽尋漢魏以來廢太子諸王典故送尚書僕射徐湛之及吏部尚書江湛武陵王駿素無寵故屢出外藩不得留建康􅀯平王鑠建平王宏皆爲帝所愛鑠妃江湛之妹隨王誕妃徐湛之之女也湛勸帝立鑠湛之意欲立誕僧綽曰建立之事仰由聖懐臣謂唯宜速斷不可稽緩當斷不斷反受其亂願以義割恩略小不忍不爾便應坦懐如􅀄無煩疑論事機雖宻易致宣廣不可使難生慮表取笑千載帝曰卿可謂能斷大事然此事至重不可不慇懃三思且彭城始亡人將謂我無復慈愛之道僧綽曰臣恐千載之後言陛下唯能裁弟不能裁兒帝黙然江湛同侍坐出閤謂僧綽曰卿向言將不太傷切直僧綽曰弟亦恨君不直鑠自壽陽入朝既至失旨帝欲立宏嫌其非次是以議久不決毎夜與湛之屏人語或連日累夕常使湛之自秉燭繞壁檢行慮有竊聽者帝以其謀告潘淑妃淑妃以告濬濬馳報劭劭乃宻與腹心隊主陳叔兒齋帥張超之等謀爲逆􅀄帝以宗室彊盛慮有内難特加東宫兵使與羽林相􅀂至有實甲萬人劭性黠而剛猛帝深􅀝之及將作亂毎夜饗將士或親自行酒王僧綽宻以啟聞㑹嚴道育婢將至癸亥夜劭詐爲帝詔云魯秀謀反汝可平明守闕帥衆入因使張超之等集素所畜養兵士二千餘人皆被甲召内外幢隊主副豫加部勒云有所討夜呼前中庶子右軍長史蕭斌左衞率袁淑中舍人殷仲素左積弩將軍王正見並入宫劭流涕謂曰主上信䜛將見罪廢内省無過不能受枉明旦當行大事望相與戮力因起徧拜之衆驚愕莫能對乆之淑斌皆曰自古無此願加善思劭怒變色斌懼與衆俱曰當竭身奉令淑叱之曰卿便謂殿下真有是邪殿下幼嘗患風或是疾動耳劭愈怒因眄淑曰事當克不淑曰居不疑之地何患不克但既克之後不爲天地所容大禍亦旋至耳假有此謀猶將可息左右引淑出曰此何事而云可罷乎淑還省繞牀行至四更乃寢甲子宫門未開劭以朱衣加戎服上乗畫輪車與蕭斌同載衞從如常入朝之儀呼袁淑甚急淑眠不起劭停車奉化門催之相續淑徐起至車後劭使登車又辭不上劭命左右殺之守門開從萬春門入舊制東宫隊不得入城劭以僞詔示門衞曰受敕有所收討令後隊速來張超之等數十人馳入雲龍門及齋閣抜刃徑上合殿帝其夜與徐湛之屛人語至旦燭猶未滅門階戸席直衞兵尚寢未起帝見超之入舉几捍之五指皆落遂弑之湛之驚起趣北戸未及開兵人殺之劭進至合殿中閤聞帝巳殂出坐東堂蕭斌執刀侍直呼中書舍人顧嘏嘏震懼不時出既至問曰欲共見廢何不早啓嘏未及荅即於前斬之江湛直上省聞喧譟聲歎曰不用王僧綽言以至於此乃匿傍小屋中劭遣兵就殺之宿衞舊將羅訓徐罕皆望風屈附左細仗主廣威將軍吳興卜天與不暇被甲執刀持弓疾呼左右出戰徐罕曰殿下入汝欲何爲天與罵曰殿下常來云何於今乃作此語只汝是賊手射劭於東堂幾中之劭黨擊之斷臂而死隊將張泓之朱道欽陳滿與天與俱戰死左衞將軍尹弘惶怖通啟求受處分劭使人從東閤入殺潘淑妃及太祖親信左右數十人急召始興王濬使帥衆屯中堂濬時在西州府舍人朱灋瑜奔告濬曰臺内喧噪宫門皆閉道上傳太子反未測禍變所至濬陽驚曰今當奈何灋瑜勸入據石頭濬未得劭信不知事之濟不騷擾不知所爲將軍王慶曰今宫内有變未知主上安危凡在臣子當投􅃑赴難慿城自守非臣節也濬不聽乃從南門出徑向石頭文武從者千餘人時南平王鑠戍石頭兵士亦千餘人俄而劭遣張超之馳馬召濬濬屏人問狀即戎服乗馬而去朱灋瑜固止濬濬不從出中門王慶又諌曰太子反逆天下怨憤明公但當堅閉城門坐食積粟不過三日凶黨自離公情事如此今豈宜去濬曰皇太子令敢有復言者斬既入見劭劭謂濬曰潘淑妃遂爲亂兵所害濬曰此是下情由來所願劭詐以太祖詔召大將軍義恭尚書令何尚之入拘於内并召百宫至者纔數十人劭遽即位下詔曰徐湛之江湛弑逆無狀吾勒兵入殿已無所及號惋崩衂肝心破裂今罪人斯得元凶克殄可大赦改元太􅀄即位畢亟稱疾還永福省不敢臨䘮以白刃自守夜則列燈以防左右以蕭斌爲尚書僕射領軍將軍以何尚之爲司空前右衞率檀和之戍石頭征虜將軍營道侯義綦鎮京口義綦義慶之弟也乙丑悉收先給諸處兵還武庫殺江徐親黨尚書左丞荀赤松右丞臧凝之等凝之燾之孫也以殷仲素爲黄門侍郎王正見爲左軍將軍張超之陳叔兒等皆拜官賞賜有差輔國將軍魯秀在建康劭謂秀曰徐湛之常欲相危我已爲卿除之矣使秀與屯􅀐校尉龐秀之對掌軍隊劭不知王僧綽之謀以僧綽爲吏部尚書司徒左長史何偃爲侍中武陵王駿屯五洲沈慶之自巴水來咨受軍略三月乙亥典籖董元嗣自建康至五洲具言太子殺逆駿使元嗣以告僚佐沈慶之密謂腹心曰蕭斌婦人其餘將帥皆易與耳東宫同惡不過三十人此外屈逼必不爲用今輔順討逆不憂不濟也壬午魏尊保太后爲皇太后追贈祖考官爵兄弟皆如外戚太子劭分浙東五郡爲㑹州省楊州立司􅀠校尉以其妃父殷沖爲司􅀠校尉沖融之曽孫也以大將軍義恭爲太保荆州刺史南譙王義宣爲太尉始興王濬爲驃􅀐將軍雍州刺史臧質爲丹楊尹㑹稽太守隨王誕爲㑹州刺史劭料檢文帝巾箱及江湛家書䟽得王僧綽所啟饗士并前代故事甲申收僧綽殺之僧綽弟僧䖍爲司徒左西屬所親咸勸之逃僧䖍泣曰吾兄奉國以忠貞撫我以慈愛今日之事苦不見及耳􅀂得同歸九泉猶羽化也劭因誣北第諸王侯云與僧綽謀反殺長沙悼王瑾瑾弟楷臨川哀王爗桂陽孝侯覬新渝懐侯玠皆劭素所惡也瑾義欣之子㷸義慶之子覬玠義慶之弟子也劭密與沈慶之手書令殺武陵王駿慶之求見王王懼辭以疾慶之突入以劭書示王王泣求入内與母訣慶之曰下官受先帝厚恩今日之事唯力是視殿下何見疑之深王起再拜曰家國安危皆在將軍慶之即命内外勒兵府主簿顔竣曰今四方未知義師之舉劭據有天府􅀂首尾不相應此危道也宜待諸鎮恊謀然後舉事慶之厲聲曰今舉大事而黃頭小兒皆得參預何得不敗宜斬以徇衆王令竣拜謝慶之慶之曰君但當知筆札事耳於是專委慶之處分旬日之閒内外整辦人以爲神兵竣延之之子也庚寅武陵王戒嚴誓衆以沈慶之領府司馬襄陽太守柳元景隨郡太守宗慤爲諮議參軍領中兵江夏内史朱脩之行平東將軍記室參軍顔竣爲諮議參軍領録事兼揔内外以諮議參軍劉延孫爲長史尋陽太守行留府事延孫道産之子也南譙王義宣及臧質皆不受劭命與司州刺史魯爽同舉兵以應駿質爽俱詣江陵見義宣且遣使勸進於王辛卯臧質子敦等在建康者聞質舉兵皆逃亡劭欲相慰恱下詔曰臧質國戚勲臣方賛翼京輦而子弟波迸良可怪歎可遣宣譬令還咸復本位劭尋録得敦使大將軍義恭行訓杖三十厚給賜之癸巳劭葬太祖于長寧陵諡曰景皇帝廟號中宗乙未武陵王發西陽丁酉至尋陽庚子王命顔竣移檄四方使共討劭州郡承檄翕然響應南譙王義宣遣臧質引兵詣尋陽與駿同下留魯爽於江陵劭以兖冀二州刺史蕭思話爲徐兖二州刺史起張永爲青州刺史思話自歴城引部曲還平城起兵以應尋陽建武將軍垣護之在歴城亦帥所領赴之南譙王義宣板張永爲冀州刺史永遣司馬崔勲之等將兵赴義宣義宣慮蕭思話與永不釋前憾自爲書與思話使長史張暢爲書與永勸使相與坦懐隨王誕將受劭命參軍事沈正說司馬顧琛曰國家此禍開闢未聞今以江東驍銳之衆唱大義於天下其誰不響應豈可使殿下北面凶逆受其僞寵乎琛曰江東忘戰日久雖逆順不同然彊弱亦異當須四方有義舉者然後應之不爲晚也正曰天下未嘗有無父無君之國寧可自安讎恥而責義於餘方乎今正以弑逆寃醜義不同天舉兵之日豈求必全邪馮衍有言大漢之貴臣將不如荆齊之賤士乎況殿下義兼臣子事實國家者哉琛乃與正共入說誕誕從之正田子之兄子也劭自謂素習武事語朝士曰卿等但助我理文書勿措意戎旅􅀂有宼難吾自當之但恐賊虜不敢動耳及聞四方兵起始憂懼戒嚴悉召下番將吏遷淮南岸居民於北岸盡聚諸王及大臣於城内移江夏王義恭處尚書下舍分義恭諸子處侍中下省夏四月癸卯朔柳元景統寧朔將軍薛安都等十二軍發湓口司空中兵參軍徐遺寶以荆州之衆繼之丁未武陵王發尋陽沈慶之揔中軍以從劭立妃殷氏爲皇后庚戍武陵王檄書至建康劭以示太常顔延之曰彼誰筆也延之曰竣之筆也劭曰言辭何至於是延之曰竣尚不顧老臣安能顧陛下劭怒稍解悉拘武陵王子於侍中下省南譙王義宣子於太倉空舍劭欲盡殺三鎮士民家口江夏王義恭何尚之皆曰凡舉大事者不顧家且多是驅逼今忽誅其室累正足堅彼意耳劭以爲然乃下書一無所問劭疑朝廷舊臣皆不爲己用乃厚撫魯秀及右軍參軍王羅漢悉以軍事委之以蕭斌爲謀主殷沖掌文符蕭斌勸劭勒水軍自上決戰不爾則保據梁山江夏王義恭以南軍倉猝船舫陋小不利水戰乃進䇿曰賊駿小年未習軍旅逺來疲弊宜以逸待之今逺出梁山則京都空弱東軍乗虛或能爲患􅀂分力兩赴則兵散勢離不如養銳待期坐而觀舋割棄南岸柵斷石頭此先朝舊灋不憂賊不破也劭善之斌厲色曰南中郎二十年少能建如此大事豈復可量三方同惡勢據上流沈慶之甚練軍事栁元景宗慤屢嘗立功形勢如此實非小敵唯宜及人情未離尚可決力一戰端坐臺城何由得乆今主相咸無戰意豈非天也劭不聽或勸劭保石頭城劭曰昔人所以固石頭城者俟諸侯勤王耳我􅀂守此誰當見救唯應力戰決之不然不克日日自出行軍慰勞將士親督都水治船艦壬子焚淮南岸室屋淮内船舫悉驅民家度水北立子偉之爲皇太子以始興王濬妃父禇湛之爲丹楊尹湛之􅁉之之兄子也濬爲侍中中書監司徒録尚書六條事加南平王鑠開府儀同三司以南兖州刺史建平王宏爲江州刺史太尉司馬龐秀之自石頭先衆南奔人情由是大震以營道侯義綦爲湘州刺史檀和之爲雍州刺史癸丑武陵王軍于鵲頭宣城太守王僧逹得武陵王檄未知所從客說之曰方今舋逆滔天古今未有爲君計莫若承義師之檄移告傍郡苟在有心誰不響應此上䇿也如其不能可躬帥向義之徒詳擇水陸之便致身南歸亦其次也僧達乃自候道南奔逢武陵王於鵲頭王即以為長史僧達弘之子也王􅀄發尋陽沈慶之謂人曰王僧逹必來赴義人問其故慶之曰吾見其在先帝前議論開張執意明決以此言之其至必也柳元景以舟艦不堅憚於水戰乃倍道兼行丙辰至江寧歩上使薛安都帥鐵􅀐曜兵於淮上移書朝士爲陳逆順劭加吳興太守汝南周嶠冠軍將軍隨王誕檄亦至嶠素恇怯回惑不知所從府司馬丘珍孫殺之舉郡應誕戊午武陵王至南洲降者相屬己未軍于漂洲王自發尋陽有疾不能見將佐唯顔竣出入卧内擁王於膝親視起居疾屢危篤不任咨禀竣皆專決軍政之外閒以文教書檄應接遐邇昏曉臨哭􅀂出一人如是累旬自舟中甲士亦不知王之危疾也癸亥栁元景潜至新亭依山爲壘新降者皆勸元景速進元景曰不然理順難恃同惡相濟輕進無防實啓宼心元景營未立劭龍驤將軍詹叔兒覘知之勸劭出戰劭不許甲子劭使蕭斌統歩軍禇湛之統水軍與魯秀王羅漢劉簡之等精兵合萬人攻新亭壘劭自登朱雀門督戰元景宿令軍中曰鼓繁氣易衰呌數力易竭但衘枚疾戰一聽吾鼓聲劭將士懐劭重賞皆殊死戰元景水陸受敵意氣彌彊麾下勇士悉遣出鬬左右唯留數人宣傳劭兵勢垂克魯秀擊退鼓劭衆遽止元景乃開壘鼓譟以乗之劭衆大潰墜淮死者甚多劭更帥餘衆自來攻壘元景復大破之所殺傷過於前戰士卒爭赴死馬㵎㵎爲之溢劭手斬退者不能禁劉􅂤之死蕭斌被創劭僅以身免走還宫魯秀禇湛之檀和之皆南奔丙寅武陵王至江寧丁卯江夏王義恭單􅀐南奔劭殺義恭十二子劭濬憂迫無計以輦迎蔣侯神像置宫中稽顙乞恩拜爲大司馬封鍾山王拜蘇侯神爲驃􅀐將軍以濬爲南徐州刺史與南平王鑠並録尚書事戊辰武陵王軍于新亭大將軍義恭上表勸進散􅀐侍郎徐爰在殿中誑劭云自追義恭遂歸武陵王時王軍府草創不曉朝章爰素所諳練乃以爰兼太常丞撰即位儀注己巳王即皇帝位大赦文武賜爵一等從軍者二等改諡大行皇帝曰文廟號太祖以大將軍義恭爲太尉録尚書六條事南徐州刺史是日劭亦臨軒拜太子偉之大赦唯劉駿義恭義宣誕不在原例庚子以南譙王義宣爲中書監丞相録尚書六條事楊州剌史隨王誕爲衞將軍開府儀同三司荆州刺史臧質爲車􅀐將軍開府儀同三司江州刺史沈慶之爲領軍將軍蕭思話為尚書左僕射壬申以王僧達爲右僕射栁元景爲侍中左衞將軍宗慤爲右衞將軍張暢爲吏部尚書劉延孫顔竣並爲侍中五月癸酉朔臧質以雍州兵二萬至新亭豫州刺史劉遵考遣其將夏侯獻之帥歩􅀐五千軍于􅀲歩先是丗祖遣寧朔將軍顧彬之將兵東入受隨王誕節度誕遣參軍劉季之將兵與彬之俱向建康誕自頓西陵爲之後繼劭遣殿中將軍燕欽等拒之相遇於曲阿奔牛塘欽等大敗劭於是縁淮樹柵以自守又決破崗方山埭以絶東軍時男丁既盡召婦女供役甲戌魯秀等募勇士攻大航克之王羅漢聞官軍已度即放仗降縁渚幢隊以次奔散器仗鼔蓋充塞路衢是夜劭閉守六門於門内鑿塹立柵城中沸亂丹楊尹尹弘等文武將吏爭踰城出降劭燒輦及衮冕服于宫庭蕭斌宣令所統皆使解甲自石頭戴白幡來降詔斬斌於軍門濬勸劭載寳貨逃入海劭以人情離散不果行乙亥輔國將軍朱脩之克東府丙子諸軍克臺城各由諸門入㑹于殿庭獲王正見斬之張超之走至合殿御牀之所爲軍士所殺刳腸割心諸將臠其肉生噉之建平等七王號哭俱出劭穿西垣入武庫井中隊副髙禽執之劭曰天子何在禽曰近在新亭至殿前臧質見之慟哭劭曰天地所不覆載文人何爲見哭又謂質曰可得爲啓乞逺徙不質曰主上近在航南自當有處分縛劭於馬上防送軍門時不見傳國璽以問劭劭曰在嚴道育處就取得之斬劭及四子於牙下濬帥左右數十人挾南平王鑠南走遇江夏王義恭於越城濬下馬曰南中郎今何所作義恭曰上已君臨萬國又曰虎頭來得無晚乎義恭曰殊當恨晚又曰故當不死邪義恭曰可詣行闕請罪又曰未審猶能賜一職自効不義恭又曰此未可量勒與俱歸於道斬之及其三子劭濬父子首並梟於大航暴尸於市劭妃殷氏及劭濬諸女妾媵皆賜死於獄汙瀦劭所居齋殷氏且死謂獄丞江恪曰汝家骨肉相殘何以枉殺無罪人恪曰受拜皇后非罪而何殷氏曰此權時耳當以鸚鵡爲后禇湛之之南奔也濬即與禇妃離絶故免於誅嚴道育王鸚鵡並都街鞭殺焚尸揚灰於江殷冲尹弘王羅漢及淮南太守沈璞皆伏誅庚辰解嚴辛巳帝如東府百官請罪詔釋之甲申尊帝母路淑媛爲皇太后太后丹楊人也乙酉立妃王氏爲皇后后父偃導之玄孫也戊子以栁元景爲雍州刺史辛卯追贈袁淑爲太尉諡忠憲公徐湛之爲司空諡忠烈公江湛爲開府儀同三司諡忠簡公王僧綽爲金紫光禄大夫諡簡侯壬辰以太尉義恭爲揚南徐二州刺史進位大傅領大司馬􅀄劭以尚書令何尚之爲司空領尚書令子征北長史偃爲侍中父子並居權要及劭敗尚之左右皆散自洗黄閤殷沖等既誅人爲之寒心帝以尚之偃素有令譽且居劭朝用智將迎時有全脫故特免之復以尚之爲尚書令偃爲大司馬長史任遇無改甲午帝謁􅀄寧長寧陵追贈卜天與益州刺史諡壯侯與袁叔等四家長給稟禄張泓之等各贈郡守戊戌以南平王鑠爲司空建平王宏爲尚書左僕射蕭思話爲中書令丹楊尹六月丙午帝還宫􅀄帝之討西陽蠻也臧質使柳元景將兵㑹之及質起兵欲奉南譙王義宣爲主潛使元景帥所領西還元景即以質書呈帝語其信曰臧冠軍當是未知殿下義舉耳方應伐逆不容西還質以此恨之及元景爲雍州質慮其爲荆江後患建議元景當爲􅀲牙不宜逺出帝重違其言戊申以元景爲護軍將軍領石頭戍事己酉以司州刺史魯爽爲南豫州刺史庚戌以衞軍司馬徐遺寳爲兖州刺史庚申詔有司論功行賞封顔竣等爲公侯辛未徙南譙王義宣爲南郡王隨王誕爲竟陵王立義宣次子宜陽矦愷爲南譙王閏月壬申以領軍將軍沈慶之爲南兖州刺史鎮盱眙癸酉以柳元景爲領軍將軍乙亥魏太皇太后赫連氏殂丞相義宣固辭内任及子愷王爵甲午更以義宣爲荆湘二州刺史愷爲宜陽縣王將佐以下並加賞秩以竟陵王誕爲揚州刺史秋七月辛丑朔日有食之甲寅詔求直言辛酉詔省細作并尚方彫文塗飾貴戚競利悉皆禁絶中軍録事參軍周朗上䟽以爲毒之在體必割其緩處歴下泗閒不足戍守議者必以爲胡衰不足避而不知我之病甚於胡矣今空守􅀌城徒費財役使虜但發輕􅀐三千更玄出入春來犯麥秋至侵禾水陸漕輸居然復絶於賊不勞而邊已困不至二年卒散民盡可蹻足而待也今人知不以羊追狼蟹捕鼠而令重車弱卒與肥馬悍胡相逐其不能濟固宜矣又三年之喪天下之逹䘮漢氏節其臣則可矣薄其子則亂也凡灋有變於古而刻於情則莫能順焉至乎敗於禮而安於身必遽而奉之今陛下以大孝始基宜反斯謬又舉天下以奉一君何患不給一體炫金不及百兩一嵗美衣不過數襲而必收寳連櫝集服累笥目豈常視身未時親是櫝帶寳笥著衣也何糜蠧之劇惑鄙之甚邪且細作始并以爲儉節而市造華怪即傳於民如此則遷也非罷也凡厥庶民制度日侈見車馬不辨貴賤視冠服不知尊卑尚方今造一物小民明已䁹睨宫中朝制一衣庶家晩已裁學侈麗之源實先宫閫又設官者宜官稱事立人稱官置王侯識未堪務不應強仕且帝子未官人誰謂賤但宜詳置賓友茂擇正人亦何必列長史參軍别駕從事然後爲貴哉又俗好以毁沈人不知察其所以致毁以譽進人不知測其所以致譽毁徒皆鄙則宜擢其毁者譽黨悉庸則宜退其譽者如此則毁譽不妄善惡分矣凡無丗不有言事無時不有下令然升平不至昏危相繼何哉設令之本非實故也書奏忤㫖自解去職朗嶠之弟也侍中謝莊上言詔云貴戚競利悉皆禁絶此實允愜民聽􅀂有犯違則應依制裁紏若廢灋申恩便爲明詔既下而聲實乖爽也臣愚謂大臣在禄位者尤不宜與民爭利不審可得在此詔不莊弘微之子也上多變易太祖之制郡縣以三周爲滿宋之善政於是乎衰乙丑魏濮陽王閭􅀂文征西大將軍永昌王仁皆坐謀叛仁賜死於長安􅀂文伏誅南平穆王鑠素負才能意常輕上又爲太子劭所任出降最晩上潜使人毒之己巳鑠卒贈司徒以商臣之諡諡之南海太守蕭簡據廣州反簡斌之弟也詔新南海太守南昌鄧琬始興太守沈灋系討之灋系慶之之從弟也簡誑其衆曰臺軍是賊劭所遣衆信之爲之固守琬先至止爲一攻道灋系至曰宜四面並攻􅀂守一道何時可㧞琬不從灋系曰更相申五十日日盡又不克乃從之八道俱攻一日即破之九月丁卯斬簡廣州平灋系封府庫付琬而還冬十一月丙午以左軍將軍魯秀爲司州刺史辛酉魏主如信都中山十二月癸未以將置東宫省太子率更令等官中庶子等各減舊貟之半甲午魏主還平城資治通鑑卷第一百二十七
