front:
  text: 資治通鑑卷第二百九十
  hash: sha256:9ced79b5284a67c0334de8c012dc8fb9bf719af4cb0fff08ca0471d177866223
body:
  text: 臣司馬光奉勑編集後周紀一困敦八月凡一年有竒起重光大淵獻盡玄􅘬太祖聖神恭肅文孝皇帝上廣順元年春正月丁卯漢太后下誥授􅁥國符寳即皇帝位􅁥國自臯門入宫即位於崇元殿制曰朕周室之裔虢叔之後國號宜曰周改元大赦楊邠史弘肈王章等皆贈官官爲斂葬仍訪其子孫叙用之凡倉􅂣庫務掌納官吏無得收斗餘稱耗舊所進羡餘物悉罷之犯竊盜及姦者並依晉天福元年以前刑名罪人非反逆無得誅及親族籍沒家貲唐莊宗明宗晉髙祖各置守陵十戸漢髙祖陵職貟宫人時月薦享及守陵户並如故初唐衰多盗不用律文更定峻法竊盗贓三匹者死晉天福中加至五匹姦有夫婦人無問強和男女並死漢法竊盗一錢以上皆死又罪非反逆往往族誅籍沒故帝即位首革其弊􅀄楊邠以功臣國戚爲方鎭者多不閑吏事乃以三司軍將􅀘都押牙孔目官內知客其人自恃敇􅀘多專横節度使不能制至是悉罷之帝命史弘肈親吏上黨李崇矩訪弘肈親族崇矩言弘肈弟弘福今存􅀄弘肈使崇矩掌其家貲之籍由是盡得其產皆以授弘福帝賢之使􅀠皇子榮帳下戊辰以前復州防禦使王彦超權武寜節度使漢李太后遷居西宫己巳上尊號曰昭聖皇太后開封尹兼中書令劉勲卒癸酉加王峻同平章事以衞尉卿劉皥主漢隱帝之喪初河東節度使兼中書令劉崇聞隱帝遇害欲起兵南向聞迎立湘隂公乃止曰吾兒爲帝吾又何求太原少尹李驤隂􅀃崇曰觀郭公之心終欲自取公不如疾引兵逾太行據孟津俟徐州相公即位然後還鎭則郭公不敢動矣不然且爲所賣崇怒曰腐儒欲離間吾父子命左右曵出斬之驤呼曰吾負經濟之才而爲愚人謀事死固甘心家有老妻願與之同死崇并其妻殺之且奏於朝廷示無二心及贇廢崇乃遣使請贇歸晉陽詔報以湘隂公比在宋州今方取歸京師必令得所公勿以爲憂公能同力相輔當加王爵永鎭河東鞏廷美楊温聞湘隂公贇失位奉贇妃董氏據徐州拒守以俟河東援兵帝使贇以書諭之廷美温欲降而懼死帝復遺贇書曰爰念斯人盡心於主足以賞其忠義何由責以悔尤俟新節度使入城當各除刺史公可更以委曲示之契丹之攻內丘也死傷頗多又值月食軍中多妖異契丹主懼不敢深入引兵還遣使請和於漢㑹漢亡安國節度使劉詞送其使者詣大梁帝遣左千牛衞將軍朱憲報聘且敘革命之由以金器玉帶贈之帝以鄴都鎭撫河北控制契丹欲以腹心處之乙亥以寜江節度使侍衞親軍都指揮使王殷爲鄴都留守天雄節度使同平章事領軍如故仍以侍衞司從赴鎭丙子帝帥百官詣西宫爲漢隱帝舉哀成服皆如天子禮慕容彦超遣使入貢帝慮其疑懼賜詔慰安之曰今兄事已至此言不欲繁望弟扶持同安億兆戊寅殺湘隂公於宋州是日劉崇即皇帝位於晉陽仍用乾祐年號所有者并汾忻代嵐憲隆蔚沁遼麟石十二州之地以節度判官鄭珙爲中書侍郎觀察判官滎陽趙華爲戸部侍郎並同平章事以次子承鈞爲侍衞親軍都指揮使太原尹以節度副使李存瓌爲代州防禦使禆将武安張元徽爲馬歩軍都指揮使陳光􅁉爲宣徽使北漢主謂李存瓌張元徽曰朕以髙祖之業一朝墜地今日位號不得已而稱之顧我是何天子汝曹是何節度使邪由是不建宗廟祭祀如家人宰相俸錢月止百緡節度使止三十緡自餘薄有資給而已故其國中少廉吏客省使河南李光美甞爲直省官頗諳故事北漢朝廷制度皆出於光美北漢主聞湘隂公死哭曰吾不用忠臣之言以至於此爲李驤立祠歳時祭之己卯以太師馮道爲中書令加竇貞固侍中蘇禹珪司空王彦超奏遣使齎敕詣徐州鞏廷美等猶豫不肯啓關詔進兵攻之帝謂王峻曰朕起於寒微備甞艱苦遭時喪亂一旦爲帝王豈敢厚自奉養以病下民乎命峻䟽四方貢獻珍美食物庚辰下詔悉罷之其詔略曰所奉止於朕躬所損􅀍於甿庻又曰積於有司之中甚爲無用之物又詔曰朕生長軍旅不親學問未知治天下之道文武官有益國利民之術各具封事以聞咸宜直書勿事辭藻帝以蘇逢吉之第賜王峻峻曰是逢吉所以族李崧也辭而不處􅀄契丹主北歸横海節度使潘聿撚弃鎭隨之契丹主以聿撚爲西南路招討使及北漢主立契丹主使聿撚遺劉承鈞書北漢主使承鈞復書稱本朝淪亡紹襲帝位欲循晉室故事求援北朝契丹主大喜北漢主發兵屯隂地黄澤團栢丁亥以承鈞爲招討使與副招討使白從暉都􅁥李存瓌將歩􅀐萬人寇晉州從暉吐谷渾人也郭崇威更名崇曹威更名英二月丁酉以皇子天雄牙內都指揮使榮爲鎭寜節度使選朝士爲之僚佐以侍御史王敏爲節度判官右補闕崔頌爲觀察判官校書郎王朴爲掌書記頌協之子朴東平人也戊戌北漢兵五道攻晉州節度使王晏閉城不出劉承鈞以爲怯蟻附登城晏伏兵􅁬擊北漢兵死傷者千餘人承鈞遣副兵馬使安元寶焚晉州西城元寳來降承鈞乃移軍攻隰州癸卯隰州刺史許遷遣歩軍都指揮使孫繼業迎擊北漢兵於長壽村執其將程筠等殺之未幾北漢兵攻州城數日不克死傷甚衆乃引去遷鄆州人也甲辰楚王希萼遣掌書記劉光輔入貢于唐帝悉出漢宫中寶玉器數十碎之於庭曰凡爲帝王安用此物聞漢隱帝日與嬖寵於禁中嬉戲珍玩不離側兹事不逺宜以爲鑑仍戒左右自今珍華恱目之物無得入宫丁未契丹主遣其臣裊骨支與朱憲偕來賀即位戊申敕前資官各聽自便居外州陳思讓未至湖南馬希萼巳克長沙思讓留屯郢州敇召令還丁巳遣尚書左丞田敏使契丹北漢主遣通事舎人李􅈯使于契丹乞兵爲援詔加泰寧節度使慕容彦超中書令遣翰林學士魚崇諒詣兖州諭指崇諒即崇逺也彦超上表謝三月壬戌朔詔報之曰向以前朝失德少主用䜛倉猝之間召卿赴闕卿即奔馳應命信宿至京救國難而不顧身聞君召而不俟駕以至天亡漢祚兵散梁郊降將敗軍相繼而至卿即便回馬首徑返􅀛隂爲主爲時有終有始所謂危亂見忠臣之節疾風知勁草之心若使爲臣者皆能如兹則有國者誰不欲用所言朕濳龍河朔之際平難浚郊之時縁不奉示諭之言亦不得差人至行闕且事主之道何必如斯若或二三於漢朝又安肯忠信於周室以此爲懼不亦過乎卿但悉力推心安民體國事朕之節如事故君不惟黎庶獲安抑亦社稷是賴但堅表率未議替移由衷之誠言盡於此唐以楚王希萼爲天策上將軍武安武平靜江寧逺節度使兼中書令楚王以右僕射孫忌客省使姚鳯爲􅁽禮使丙寅遣前湽州刺史陳思讓將兵戍磁州扼黄澤路楚王希萼旣得志多思舊怨殺戮無度晝夜縱酒荒􅁋悉以軍府事委馬希崇希崇復多私曲政刑紊亂府庫旣盡於亂兵籍民財以賞賚士卒或封其門而取之士卒猶以不均怨望雖朗州舊將佐從希萼來者亦皆不恱有離心劉光輔之入貢于唐也唐主待之厚光輔密言湖南民疲主驕可取也唐主乃以營屯都虞候邊鎬爲信州剌史將兵屯􅀽州潜圖進取小門使謝彦顒本希萼家奴以首面有寵於希萼至與妻妾雜坐恃恩專横常肩隨希崇或拊其背希崇衘之故事府宴小門使執兵在門外希萼使彦顒預坐或居諸將之上諸將皆恥之希萼以府舎焚蕩命朗州靜江指揮使王逵副使周行逢帥所部兵千餘人治之執役甚勞又無犒賜士卒皆怨竊言曰囚免死則役作之我軰從大王出萬死取湖南何罪而囚役之且大王終日酣歌豈知我輩之勞苦乎逵行逢聞之相謂曰衆怨深矣不早爲計禍及吾曹壬申旦帥其衆各執長柯斧白梃逃歸朗州時希萼醉未醒左右不敢白癸酉始白之希萼遣湖南指揮使唐師翥將千餘人追之不及直抵朗州逵等乗其疲乏伏兵縱擊士卒死傷殆盡師翥脫歸逵等黜留後馬光賛更以希萼兄子光惠知州事光惠希振之子也尋奉光惠爲節度使逵等與何敬眞及諸軍指揮使張倣參決軍府事希萼具以狀言於唐唐主遣使以厚賞招諭之逵等納其賞縱其使不荅其詔唐亦不敢詰也王彦超奏克徐州殺鞏廷美等北漢李􅙒至契丹契丹主使拽剌梅里報之丙子敕朝廷與唐本無仇怨縁淮軍鎭各守疆域無得縱兵民擅入唐境商旅往來無得禁止己卯潞州送渉縣所獲北漢將卒二百六十餘人各賜衫袴巾履遣還加呉越王弘俶諸道兵馬都元帥夏四月壬辰朔濵淮州鎭上言淮南饑民過淮糴榖未敢禁止詔曰彼之生民與此何異宜令州縣津鋪無得禁止蜀通奏使髙延昭固辭知樞密院丁未以前雲安搉鹽使太原伊審徴爲通奏使知樞密院事審徴蜀髙祖妹襃國公主之子也少與蜀主相親狎及知樞密政之大小悉以咨之審徴亦以經濟爲己任而貪侈回邪與王昭逺相表裏蜀政由是浸衰呉越王弘俶徙廢王弘倧居東府爲築宫室治園圃娯恱之歳時供饋甚厚契丹主遣使如北漢告以周使田敏來約歳輸錢十萬緡北漢主使鄭珙以厚賂謝契丹自稱姪皇帝致書於叔天授皇帝請行􅁽禮五月己巳遣左金吾將軍姚漢英等使于契丹契丹留之辛未北漢禮部侍郎同平章事鄭珙卒于契丹甲戌義武節度使孫方簡避皇考諱更名方諌定難節度李彞殷遣使奉表于北漢六月辛亥以樞密使同平章事王峻爲左僕射兼門下侍郎樞密副使兵部侍郎范質户部侍郎判三司李榖爲中書侍郎並同平章事榖仍判三司司徒兼侍中竇貞固司空兼中書侍郎同平章事蘇禹珪並罷守本官癸丑范質參知樞密院事丁巳以宣徽北院使翟光鄴兼樞密副使初帝討河中巳爲人望所屬李榖時爲轉運使帝數以微言諷之榖但以人臣盡節爲對帝以是賢之即位首用爲相時國家新造四方多故王峻夙夜盡心知無不爲軍旅之謀多所禆益范質明敏強記謹守法度李榖沈毅有器略在帝前論議辭氣忼􅁣善譬諭以開主意武平節度使馬光惠愚懦􅄝酒不能服諸將王逵周行逢何敬真謀以辰州刺史廬陵劉言驍勇得蠻夷心欲迎以爲副使言知逵等難制曰不往將攻我乃單􅀐赴之旣至衆廢光惠送于唐推言權武平留後表求旄節於唐唐人未許亦稱藩于周呉越王弘俶以前內外馬歩都統軍使仁俊無罪復其官爵契丹遣燕王述軋等􅁽命北漢王爲大漢神武皇帝妃爲皇后北漢主更名旻秋七月北漢主遣翰林學士博興衞融等詣契丹謝􅁽禮且請兵八月壬戌葬漢隱帝于潁陵義武節度使孫方諌入朝壬子徙鎭國節度使以其弟易州刺史行友爲義武留後又徙建雄節度使王晏鎭徐州以武寧節度使王彦超代之戊午追立故夫人柴氏爲皇后九月北漢主遣招討使李存瓌將兵自團栢入寇契丹欲引兵㑹之與酋長議於九十九泉諸部皆不欲南寇契丹主强之癸亥行至新州之西火神淀燕王述軋及偉王之子太寧王漚僧作亂弑契丹主而立述軋契丹主德光之子齊王述律逃入南山諸部奉述律以攻述軋漚僧殺之并其族黨立述律爲帝改元應曆自火神淀入幽州遣使告于北漢北漢主遣樞密直學士上黨王得中如契丹賀即位復以叔父事之請兵以擊晉州契丹主年少好遊戲不親國事毎夜酣飲逹旦乃寐日中方起國人謂之睡王後更名眀壬申蜀以吏部尚書御史中丞范仁恕爲中書侍郎兼吏部尚書同平章事楚王希萼旣克長沙不賞許可瓊疑可瓊怨望出爲蒙州刺史遣馬歩都指揮使徐威左右軍馬歩使陳敬遷水軍都指揮使魯公綰牙內侍衞指揮使陸孟俊帥部兵立寨于城西北隅以備朗兵不存撫役者將卒皆怨怒謀作亂希崇知其謀戊寅希萼宴將吏徐威等不預希崇亦辭疾不至威等使人先驅踶齧馬十餘入府自帥其徒執斧斤白梃聲言縶馬奄至座上縱横擊人顚踣滿地希萼踰垣走威等執囚之執謝彦顒自頂及踵剉之立希崇爲武安留後縱兵大掠幽希萼於衡山縣劉言聞希崇立遣兵􅃐潭州聲言討其簒奪之罪壬午軍于益陽之西希崇懼癸未發兵二千拒之又遣使如朗州求和請爲鄰藩掌書記桂林李觀象􅀃言曰希萼舊將佐猶在長沙此必不欲與公為鄰不若先檄希崇取其首然後圖湖南可兼有也言從之希崇畏言即斷都軍判官楊仲敏掌書記劉光輔牙内指揮使魏師進都押牙黄勍等十餘人首遣前辰陽縣令李翊齎送朗州至則腐敗言與王逵等皆以爲非仲敏等首怒責翊翊惶恐自殺希崇旣襲位亦縱酒荒淫爲政不公語多矯妄國人不附初馬希萼入長沙彭師暠雖免死猶杖背黜爲民希崇以爲師暠必怨之使送希萼于衡山實欲師暠殺之師暠曰欲使我為弑君之人乎奉事逾謹丙戌至衡山衡山指揮使廖偃匡圖之子也與其季父節度廵官匡凝謀曰吾家丗受馬氏恩今希萼長而􅀍黜必不免禍盍相與輔之於是帥莊戸及郷人悉爲兵與師暠共立希萼爲衡山王以縣爲行府斷江爲柵編竹爲戰艦以師暠爲武清節度使召募徒衆數日至萬餘人州縣多應之遣判官劉虛已求援于唐徐威等見希崇所爲知必無成又畏朗州衡山之逼恐一朝䘮敗俱及禍欲殺希崇以自解希崇微覺之大懼密遣客將范守牧奉表請兵于唐唐主命邊鎬自􅀽州將兵萬人西趣長沙冬十月辛卯潞州廵檢陳思讓敗北漢兵於虒亭唐邊鎬引兵入醴陵癸巳楚王希崇遣使犒軍壬寅遣天策府學士拓跋恒奉牋詣鎬請降恒歎曰吾乆不死乃爲小兒送降狀癸卯希崇帥弟姪迎鎬望塵而拜鎬下馬稱詔勞之甲辰希崇等從鎬入城鎬舎於瀏陽門樓湖南將吏畢賀鎬皆厚賜之時湖南饑饉鎬大發馬氏倉粟賑之楚人大恱契丹遣彰國節度使蕭禹厥將奚契丹五萬㑹北漢兵入寇北漢主自將兵二萬自隂地􅀜寇晉州丁未軍于城北三面置寨晝夜攻之遊兵至絳州時王晏已離鎮王彦超未至巡檢使王萬敢權知晉州與龍捷都指揮使史彦超虎㨗指揮使何徽共拒之史彦超雲州人也癸丑唐武昌節度使劉仁贍帥戰艦二百取岳州撫納降附人忘其亡仁贍金之子也唐百官共賀湖南平起居郎髙逺曰我乗楚亂取之甚易觀諸將之才但恐守之難耳逺幽州人也司徒致仕李建勲曰禍其始於此乎唐主自即位以來未甞親祠郊廟禮官以爲請唐主曰俟天下一家然後告謝及一舉取楚謂諸國指麾可定魏岑侍宴言臣少遊元城樂其風土俟陛下定中原乞魏􅀶節度使唐主許之岑趨下拜謝其主驕臣佞如此馬希萼望唐人立己爲潭帥而潭人惡希萼共請邊鎬爲帥唐主乃以鎬爲武安節度使王峻有故人曰申師厚甞爲兖州牙將失職飢寒望峻馬拜謁於道㑹涼州留後折逋嘉施上表請帥於朝廷帝以絶域非人所欲募率府供奉官願行者月餘無人應募峻薦師厚於帝丁巳以師厚爲河西節度使唐邊鎬趣馬希崇帥其族入朝馬氏聚族相泣欲重賂鎬奏乞留居長沙鎬微哂曰國家與公家世爲仇敵殆六十年然未甞敢有意窺公之國今公兄弟􅃲䦧困窮自歸若復二三恐有不測之憂希崇無以應十一月辛酉與宗族及將佐千餘人號慟登舟送者皆哭響振川谷帝以北漢契丹之兵猶在晉州甲子以王峻爲行營都部署將兵救之詔諸軍皆受峻節度聽以便宜從事得自選擇將吏乙丑峻行帝自至城西餞之楚靜江節度副使知桂州馬希隱武穆王殷之少子也楚王希廣希萼兄弟爭國南漢主以內侍使呉懐恩爲西北招討使將兵屯境上伺間密謀進取希廣遣指揮使彭彦暉將兵屯龍峒以備之希萼自衡山遣使以彦暉爲桂州都􅁥在城外内巡檢使判軍府事希隱惡之濳遣人告蒙州刺史許可瓊可瓊方畏南漢之逼即棄蒙州引兵􅃐桂州與彦暉戰於城中彦暉敗奔衡山可瓊留屯桂州呉懐恩據蒙州進兵侵掠桂管大擾希隱可瓊不知所爲但相與飲酒對泣南漢主遺希隱書言武穆王奄有全楚富彊安靖五十餘年正由三十五舅三十舅兄弟尋戈自相魚肉舉先人基業北面􅄷讎今聞唐兵已據長沙竊計桂林繼爲所取當朝丗爲與國重以昬姻覩兹傾危忍不赴救已發大軍水陸俱進當令相公舅永擁節旄常居方面希隱得書與僚佐議降之支使潘玄珪以爲不可丙寅呉懷恩引兵奄至城下希隱可瓊帥其衆夜斬􅀜奔全州桂州遂潰懷恩因以兵略定宜連梧嚴富昭柳象龔等州南漢始盡有嶺南之地􅊨辛未唐邊鎬遣先鋒指揮使李承戩將兵如衡山趣馬希萼入朝庚辰希萼與將佐士卒萬餘人自潭州東下王峻留陜州旬日帝以北漢攻晉州急憂其不守議自將由澤州路與峻㑹兵救之且遣使諭峻十二月戊子朔下詔以三日西征使者至陜峻因使者言於帝曰晉州城堅未易可拔劉崇兵鋒方銳不可力爭所以駐兵待其氣衰耳非臣怯也陛下新即位不宜輕動若車駕出汜水則慕容彦超引兵入汴大事去矣帝聞之自以手提耳曰幾敗吾事庚寅敇罷親征初泰寧節度使兼中書令慕容彦超聞徐州平疑懼愈甚乃招納亡命蓄聚薪糧濳以書結北漢吏獲其書以聞又遣人詐爲商人求援於唐帝遣通事舍人鄭好謙就申慰諭與之爲誓彦超益不自安屢遣都押牙鄭麟詣闕僞輸誠􅍁實覘機事又獻天平節度使髙行周書其言皆謗毀朝廷與彦超相結之意帝笑曰此彦超之詐也以書示行周行周上表謝恩旣而彦超反跡益露丙申遣閤門使張凝將兵赴鄆州巡檢以備之庚子王峻至絳州乙巳引兵趣晉州晉州南有蒙阬最爲險要峻憂北漢兵據之是日聞前鋒已度蒙阬喜曰吾事濟矣慕容彦超奏請入朝帝知其詐即許之旣而復稱境內多盜未敢離鎭北漢王攻晉州乆不克㑹大雪民相聚保山寨野無所掠軍乏食契丹思歸聞王峻至蒙阬燒營夜遁峻入晉州諸將請亟追之峻猶豫未決明日乃遣行營馬軍都指揮使仇弘超都排陳使藥元福左廂排陳使陳思讓康延沼將􅀐兵追之及於霍邑縱兵􅁬擊北漢兵墜崖谷死者甚衆霍邑道隘延沼畏懦不急追由是北漢兵得度藥元福曰劉崇悉發其衆挾胡􅀐而來志吞晉絳今氣衰力憊狼狽而遁不乗此翦撲必爲後患諸將不欲進王峻復遣使止之遂還契丹比至晉陽士馬什䘮三四蕭禹厥恥無功釘大酋長一人於市旬餘而斬之北漢主始息意於進取北漢土瘠民貧內供軍國外奉契丹賦繁役重民不聊生逃入周境者甚衆唐主以鎭南節度使兼中書令宋齊丘爲太􅀓以馬希萼爲江南西道觀察使守中書令鎭洪州仍賜爵楚王以馬希崇爲永泰節度使兼侍中鎭舒州湖南將吏位髙者拜刺史將軍卿􅁥卑者以次拜官唐主嘉廖偃彭師暠之忠以偃爲左殿直軍使萊州刺史師暠爲殿直都虞候賜予甚厚湖南刺史皆入朝于唐永州刺史王贇獨後至唐主毒殺之南漢主遣內侍省丞潘崇徹將軍謝貫將兵攻郴州唐邊鎬發兵救之崇徹敗唐兵於義章遂取郴州邊鎬請除全道二州刺史以備南漢丙辰唐主以廖偃爲道州刺史以黒雲指揮使張巒知全州是歳唐主以安化節度使鄱陽王王延政爲山南西道節度使更賜爵光山王初蒙城鎭將咸師朗將部兵降唐唐主以其兵爲奉節都從邊鎬平湖南唐悉收湖南金帛珍玩倉粟乃至舟艦亭館花果之美者皆徙於金陵遣都官郎中楊繼勲等收湖南租賦以贍戌兵繼勲等務爲苛刻湖南人失望行營糧料使王紹顔減士卒糧賜奉節指揮使孫朗曹進怒曰昔吾從咸公降唐唐待我豈如今日湖南將士之厚哉今有功不増禄賜又減之不如殺紹顔及鎬據湖南歸中原富貴可圖也二年春正月庚申夜孫朗曹進帥其徒作亂束藁濳燒府門火不然邊鎬覺之出兵格􅃲且命鳴鼔角朗進等以爲將曉斬􅀜奔朗州王逵問朗曰吾昔從武穆王與淮南戰屢㨗淮南兵易與耳今欲以朗州之衆復取湖南可乎朗曰朗在金陵數年備見其政事朝無賢臣軍無良將忠佞無别賞罰不當如此得國存幸矣何暇兼人朗請爲公前驅取湖南如拾芥耳逵恱厚遇之壬戌發開封府民夫五萬修大梁城旬日而罷慕容彦超發郷兵入城引泗水注壕中爲戰守之僃又多以旗幟授諸鎭將令募羣盗剽掠鄰境所在奏其反狀甲子敕沂密二州不復􅊢泰寧軍以侍衞歩軍都指揮使昭武節度使曹英爲都部署討彦超齊州防禦使史延超爲副部署皇城使河內向訓爲都􅁥陳州防禦使藥元福爲行營馬歩都虞候帝以元福宿將命英訓無得以軍禮見之二人皆父事之唐主發兵五千軍于下邳以援彦超聞周兵將至退屯沭陽徐州巡檢使張令彬擊之大破唐兵殺溺死者千餘人獲其將燕敬權初彦超以周室新造謂其易揺故北召北漢及契丹南誘唐人使侵邊鄙兾朝廷奔命不暇然後乗間而動及北漢契丹自晉州北走唐兵敗於沭陽彦超之勢遂沮永興節度使李洪信自以漢室近親心不自安城中兵不滿千人王峻在陜以救晉州爲名發其數百及北漢兵遁去遣禁兵千餘人戍長安洪信懼遂入朝壬申王峻自晉州還入見曹英等至兖州設長圍慕容彦超屢出戰藥元福皆擊敗之彦超不敢出十餘日長圍合遂進攻之初彦超將反判官崔周度諌曰魯詩書之國自伯禽以來不能霸諸矦然以禮義守之可以長丗公於國家非有私憾胡爲自疑況主上開諭勤至茍撤備歸誠則坐享泰山之安矣獨不見杜中令安襄陽李河中竟何所成乎彦超怒及官軍圍城彦超括士民之財以贍軍坐匿財死者甚衆前陜州司馬閻弘魯寳之子也畏彦超之􅁀傾家爲獻彦超猶以爲有所匿命周度索其家周度謂弘魯曰君之死生繫財之豐約宜無所愛弘魯泣拜其妻妾曰悉出所有以救吾死皆曰竭矣周度以白彦超彦超不信收弘魯夫妻繫獄有乳母於泥中掊得金纒臂獻之兾以贖其主彦超曰果然所匿必猶多榜掠弘魯夫妻肉潰而死以周度爲阿庇斬於市北漢遣兵寇府州防禦使折德扆敗之殺二千餘人二月庚子德扆奏攻拔北漢岢嵐軍以兵戍之甲辰帝釋燕敬權等使歸唐謂唐主曰叛臣天下所共疾也不意唐主助之得無非計乎唐主大慙先所得中國人皆禮而歸之唐之言事者猶獻取中原之䇿中書舎人韓熈載曰郭氏有國雖淺爲治已固我兵輕動必有害無益唐自烈祖以來常遣使泛海與契丹相結欲與之共制中國更相饋遺約爲兄弟然契丹利其貨徒以虚語往來實不爲唐用也唐主好文學故熈載與馮延己延魯江文蔚潘佑徐鉉之徒皆至美官佑幽州人也當時唐之文雅於諸國爲盛然未甞設科舉多因上書言事拜官至是始命翰林學士江文蔚知貢舉進士廬陵王克貞等三人及第唐主問文蔚卿取士何如前朝對曰前朝公舉私謁相半臣專任至公耳唐主恱中書舎人張緯前朝登第聞而銜之時執政皆不由科第相與沮毀竟罷貢舉三月戊辰以內客省使恩州團練使晉陽鄭仁誨爲樞密副使甲戌改威勝軍曰武勝軍唐主以太弟太保昭義節度使馮延巳爲左僕射前鎮海節度使徐景運爲中書侍郎及右僕射孫晟皆同平章事旣宣制户部尚書常夢錫衆中大言曰白麻甚佳但不及江文蔚䟽耳晟素輕延巳謂人曰金盃玉乃貯狗矢乎延巳言於唐主曰陛下躬親庶務故宰相不得盡其才此治道所以未成也唐主乃悉以政事委之奏可而已旣而延巳不能勤事文書皆仰成胥史軍旅則委之邊將頃之事益不治唐主乃復自覽之大理卿蕭儼惡延巳爲人數上䟽攻之㑹儼坐失入人死罪鍾謨李德明輩必欲殺之延巳曰儼誤殺一婦人諸君以爲當死儼九卿也可誤殺乎獨上言儼素有直聲今所坐巳㑹赦宜從寛宥儼由是得免人亦以此多之景運尋罷爲太子少傅夏四月丙戌朔日有食之帝以曹英等攻兖州乆未克乙卯下詔親征以李榖權東京留守兼判開封府鄭仁誨權大内都􅀧檢又以侍衞馬軍都指揮使郭崇充在京都巡檢唐主既克湖南遣其將李建期屯益陽以圖朗州以知全州張巒兼桂州招討使以圖桂州乆之未有功唐主謂馮延巳孫晟曰楚人求息肩於我我未有以撫其瘡痍而虐用其力非所以副來蘇之望吾欲罷桂林之役歛益陽之戍以旌節授劉言何如晟以爲宜然延巳曰吾出偏將舉湖南逺近震驚一旦三分喪二人將輕我請委邊將察其形勢唐主乃遣統軍使矦訓將兵五千自􅁻州路􅃐全州與張巒合兵攻桂州南漢伏兵於山谷巒等始至城下罷乏伏兵四起城中出兵夾擊之唐兵大敗訓死巒收散卒數百奔歸全州五月庚申帝發大梁戊辰至兖州己巳帝使人招諭慕容彦超城上人語不遜庚午命諸軍進攻先是術者紿彦超云鎮星行至角亢角亢兖州之分其下有福彦超乃立祠而禱之令民家皆立黄幡彦超性貪吝官軍攻城急猶瘞藏珍寳由是人無􅃲志將卒相繼有出降者乙亥官軍克城彦超方禱鎮星祠帥衆力戰不勝乃焚鎭星祠與妻赴井死子繼勲出走追獲殺之官軍大掠城中死者近萬人􅀄彦超將反募羣盗置帳下至者二千餘人皆山林獷悍竟不爲用帝欲悉誅兖州將吏翰林學士竇儀見馮道范質與之共白帝曰彼皆脅從耳乃赦之丁丑以端明殿學士顔衎權知兖州事壬午赦兖州管內彦超黨與逃匿者期一月聽自首前已伏誅者赦其親戚癸未降泰寧軍爲防禦州唐司徒致仕李建勲卒且死戒家人曰時事如此吾得良死幸矣勿封土立碑聽人耕種於其上免爲它日開發之標及江南之亡也諸貴人髙大之􅃁無不發者惟建勲冢莫知其處六月乙酉朔帝如曲阜謁孔子祠旣奠將拜左右曰孔子陪臣也不當以天子拜之帝曰孔子百世帝王之師敢不敬乎遂拜之又拜孔子墓命葺孔子祠禁孔林樵採訪孔子顔淵之後以爲曲阜令及主簿丙戌帝發兖州乙未呉越順德太夫人呉氏卒丁酉蜀大水入成都漂沒千餘家溺死五千餘人壞太廟四室戊戌蜀大赦賑水災之家己亥帝至大梁朔方節度使兼中書令陳留王馮暉卒其子牙内都虞􅃸繼業殺其兄繼勲自知軍府事太子賔客李濤之弟澣在契丹爲勤政殿學士與幽州節度使蕭海真善海真契丹主兀欲之妻弟也澣􅀃海真內附海真欣然許之澣因定州諜者田重霸齎絹表以聞且與濤書言契丹主童騃專事宴遊無逺志非前人之比朝廷若能用兵必克不然與和必得二者皆利於速度其情勢它日終不能力助河東者也壬寅重霸至大梁㑹中國多事不果從辛亥以馮繼業爲朔方留後樞密使王峻性輕躁多計數好權利喜人附已自以天下爲己任每言事帝從之則喜或時未允輒愠懟往往發不遜語帝以其故舊且有佐命功又素知其爲人每優容之峻年長於帝帝即位猶以兄呼之或稱其字峻以是益驕副使鄭仁誨皇城使向訓恩州團練使李重進皆帝在藩鎭時腹心將佐也帝即位稍稍進用峻心嫉之累表稱疾求解機務以詗帝意帝屢遣左右敦諭峻對使者辭氣亢厲又遺諸道節度使書求保證諸道各獻其書帝驚駭乆之復遣左右慰勉令視事且曰卿儻不來朕且自往猶不至帝知樞密直學士陳觀與峻親善令往諭指觀曰陛下但聲言臨幸其第嚴駕以待之峻必不敢不來從之秋七月戊子峻入朝帝慰勞令視事重進滄州人其母即帝妹福慶長公主也李榖足跌傷右臂在告月餘帝以榖職業繁劇趣令入朝辭以未任趨拜癸巳詔免朝參但令視事蜀工部尚書判武德軍邵延鈞不禮於􅁥押王承丕承丕謀作亂辛丑左奉聖都指揮使安次孫欽當以部兵戍邊往辭承丕承丕邀與俱見府公欽不知其謀從之承丕至則令左右擊殺延鈞屠其家稱奉詔處置軍府即開府庫賞士卒出繫囚發屯戍將吏畢集欽謂承丕曰今延鈞已伏辜公宜出詔書以示衆承丕曰我能致公富貴勿問詔書欽始知承丕反因紿曰今內外未安我請以部兵爲公巡察即躍馬而出承丕連呼之不止欽至營曉諭其衆帥以入府攻承丕承丕左右欲拒戰欽叱之皆棄兵走遂執承丕斬之并其親黨傳首成都天平節度使守中書令髙行周卒行周有勇而知義功髙而不矜策馬臨敵叱咤風生平居與賔僚宴集􅋲􅋲和易人以是重之癸卯蜀主遣客省使趙季札如梓州慰撫吏民漢法犯私鹽麴無問多少抵死鄭州民有以屋稅受鹽於官過州城吏以爲私鹽執而殺之其妻訟􅁈癸丑始詔犯鹽麴者以斤兩定刑有差卷終
