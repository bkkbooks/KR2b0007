front:
  text: 資治通鑑卷第一百九十八
  hash: sha256:85e03803604ff5fb442671b02901409788b939f9253490638f32c81f83ac7afa
body:
  text: 臣司馬光奉勑編集唐紀十四雍涒灘三月凡二年有竒起旃蒙大荒落六月盡著太宗文武大聖大廣孝皇帝下之上貞觀十九年六月丁酉李丗勣攻白巖城西􅀯上臨其西北城主孫代音濳遣腹心請降臨城投刀鉞為信且曰奴願降城中有不從者上以唐幟與其使曰必降者宜建之城上代音建幟城中人以為唐兵已登城皆從之上之克遼東也白巖城請降既而中悔上怒其反覆令軍中曰得城當悉以人物賞戰士李丗勣見上將受其降帥甲士數十人請曰士卒所以爭冒矢石不顧其死者貪虜獲耳今城垂拔柰何更受其降孤戰士之心上下馬謝曰將軍言是也然縱兵殺人而虜其妻孥朕所不忍將軍麾下有功者朕以庫物賞之庶因將軍贖此一城丗勣乃退得城中男女萬餘口上臨水設幄受其降仍賜之食八十以上賜帛有差它城之兵在白巖者悉慰諭給糧仗任其所之先是遼東城長史為部下所殺其省事奉其妻子奔白巖上憐其有義賜帛五匹為長史造靈輿歸之平壤以白巖城為巖州以孫代音為刺史契苾何力瘡重上自為傅藥推求得刺何力者髙突勃付何力使自殺之何力奏稱彼為其主冐白刃刺臣乃忠勇之士也與之􅀄不相識非有怨讎遂捨之􅀄莫離支遣加尸城七百人戍蓋牟城李丗勣盡虜之其人請從軍自效上曰汝家皆在加尸汝為我戰莫離支必殺汝妻子得一人之力而滅一家吾不忍也戊戌皆廩賜遣之己亥以蓋牟城為蓋州丁未車駕發遼東丙辰至安市城進兵攻之丁巳髙麗北部耨薩延壽惠眞帥髙麗靺鞨兵十五萬救安市上謂侍臣曰今為延壽䇿有三引兵直前連安市城為壘據髙山之險食城中之粟縱靺鞨掠吾牛馬攻之不可猝下欲歸則泥潦為阻坐困吾軍上䇿也拔城中之衆與之宵遁中䇿也不度智能來與吾戰下䇿也卿曹觀之彼必出下䇿成擒在吾目中矣髙麗有對盧年老習事謂延壽曰秦王内芟羣雄外服戎狄獨立為帝此命丗之材今舉海內之衆而來不可敵也為吾計者莫若頓兵不戰曠日持乆分遣竒兵斷其運道糧食既盡求戰不得欲歸無路乃可勝也延壽不從引軍直進去安市城四十里上猶恐其低徊不至命左衛大將軍阿史那社爾將突厥千騎以誘之兵始交而偽走髙麗相謂曰易與耳競進乗之至安市城東􅀯八里依山而陳上悉召諸將問計長孫无忌對曰臣聞臨敵將戰必先觀士卒之情臣適行經諸營見士卒聞髙麗至皆拔刀結斾喜形於色此必勝之兵也陛下未冠身親行陳凡出竒制勝皆上禀聖謀諸將奉成筭而已今日之事乞陛下指蹤上笑曰諸公以此見讓朕當爲諸公商度乃與无忌等從數百騎乘髙望之觀山川形勢可以伏兵及出入之所髙麗靺鞨合兵爲陳長四十里江夏王道宗曰髙麗傾國以拒王師平壤之守必弱願假臣精卒五千覆其本根則數十萬之衆可不戰而降上不應遣使紿延壽曰我以爾國彊臣弑其主故來問罪至於交戰非吾本心入爾境芻粟不給故取爾數城俟爾國修臣禮則所失必復矣延壽信之不復設備上夜召文武計事命李丗勣將歩騎萬五千陳於西嶺長孫无忌將精兵萬一千爲竒兵自山北出於狹谷以衝其後上自將歩騎四千挾鼓角偃旗幟登北山上敕諸軍聞鼔角齊出奮擊因命有司張受降幕於朝堂之側戊午延壽等獨見李丗勣布陳勒兵欲戰上望見无忌軍塵起命作鼔角舉旗幟諸軍鼔譟並進延壽等大懼欲分兵禦之而其陳已亂㑹有雷電龍門人薛仁貴著竒服大呼陷陳所向無敵髙麗兵披靡大軍乗之髙麗兵大潰斬首二萬餘級上望見仁貴召見拜游擊將軍仁貴安都之六丗孫名禮以字行延壽等將餘衆依山自固上命諸軍圍之長孫无忌悉撤橋梁斷其歸路己未延壽惠眞帥其衆三萬六千八百人請降入軍門膝行而前拜伏請命上語之曰東夷少年跳梁海曲至於摧堅決勝故當不及老人自今復敢與天子戰乎皆伏地不能對上簡耨薩巳下酋長三千五百人授以戎秩遷之内地餘皆縱之使還平壤皆䨇舉手以顙頓地歡呼聞數十里外収靺鞨三千三百人悉阬之獲馬五萬匹牛五萬頭鐵甲萬領佗器械稱是髙麗舉國大駭後黄城銀城皆自拔遁去數百里無復人煙上驛書報太子仍與髙士廉等書曰朕為將如此何如更名所幸山曰駐蹕山秋七月辛未上徙營安市城東嶺己卯詔標識戰死者尸俟軍還與之俱歸戊子以髙延壽為鴻臚卿髙惠眞為司農卿張亮軍過建安城下壁壘未固士卒多岀樵牧髙麗兵奄至軍中駭擾亮素怯踞胡床直視不言將士見之更以為勇揔管張金樹等鳴鼔勒兵擊髙麗破之八月甲辰候騎獲莫離支諜者髙竹離反接詣軍門上召見解縳問曰何瘦之甚對曰竊道閒行不食數日矣命賜之食謂曰爾為諜冝速反命為我寄語莫離支欲知軍中消息可遣人徑詣吾所何必間行辛苦也竹離徒跣上賜屩而遣之丙午徙營於安市城南上在遼外凡置營但明斥候不為塹壘雖逼其城髙麗終不敢出為宼抄軍士單行野宿如中國焉上之將伐髙麗也薛延陀遣使入貢上謂之曰語爾可汗今我父子東征髙麗汝能為宼冝亟來眞珠可汗惶恐遣使致謝且請發兵助軍上不許及髙麗敗於駐蹕山莫離支使靺鞨說眞珠啗以厚利眞珠懾服不敢動九月壬申眞珠卒上為之發哀初眞珠請以其庶長子曵莽為突利失可汗居東方統雜種嫡子拔灼為肆葉護可汗居西方統薛延陀詔許之皆以禮冊命曵莾性躁擾輕用兵與拔灼不恊眞珠卒來㑹䘮既葬曵莾恐拔灼圖已先還所部拔灼追襲殺之自立為頡利俱利薛沙多彌可汗上之克白巖也謂李丗勣曰吾聞安市城險而兵精其城主材勇莫離支之亂城守不服莫離支擊之不能下因而與之建安兵弱而糧少若出其不意攻之必克公可先攻建安建安下則安市在吾腹中此兵法所謂城有所不攻者也對曰建安在􅀯安市在北吾軍糧皆在遼東今踰安市而攻建安若賊斷吾運道將􅀂之何不如先攻安市安市下則鼔行而取建安耳上曰以公為將安得不用公䇿勿誤吾事丗勣遂攻安市安市人望見上旗蓋輒乗城鼔譟上怒丗勣請克城之日男女皆阬之安市人聞之益堅守攻乆不下髙延壽髙惠眞請於上曰奴既委身大國不敢不獻其誠欲天子早成大功奴得與妻子相見安市人顧惜其家人自為戰未易猝拔今奴以髙麗十餘萬衆望旗沮潰國人膽破烏骨城耨薩老耄不能堅守移兵臨之期至夕克其餘當道小城必望風奔潰然後収其資糧鼔行而前平壤必不守矣羣臣亦言張亮兵在沙城召之信宿可至乗髙麗兇懼併力拔烏骨城度鴨緑水直取平壤在此舉矣上將從之獨長孫无忌以爲天子親征異於諸將不可乗危徼幸今建安新城之虜衆猶十萬若向烏骨皆躡吾後不如先破安市取建安然後長驅而進此萬全之䇿也上乃止諸軍急攻安市上聞城中雞􅇾聲謂李丗勣曰圍城積乆城中煙火日微今雞彘甚喧此必饗士欲夜出襲我冝嚴兵備之是夜髙麗數百人縋城而下上聞之自至城下召兵急擊斬首數十級髙麗退走江夏王道宗督衆築土山於城東􅀯隅浸逼其城城中亦増髙其城以拒之士卒分畨交戰日六七合衝車礮石壊其樓堞城中隨立木栅以塞其缺道宗傷足上親爲之針築山晝夜不息凡六旬用功五十萬山頂去城數丈下臨城中道宗使果毅􅀓伏愛將兵屯山頂以備敵山頽壓城城崩㑹伏愛私離所部髙麗數百人從城缺出戰遂奪據土山塹而守之上怒斬伏愛以徇命諸將攻之三日不能克道宗徒跣詣旗下請罪上曰汝罪當死但朕以漢武殺王恢不如秦穆用孟明且有破蓋牟遼東之功故特赦汝耳上以遼左早寒草枯水凍士馬難乆留且糧食將盡癸未敕班師先拔遼蓋二州户口渡遼乃耀兵於安市城下而旋城中皆屏跡不出城主登城拜辭上嘉其固守賜縑百匹以勵事君命李丗勣江夏王道宗將歩騎四萬為殿乙酉至遼東丙戌渡遼水遼澤泥潦車馬不通命長孫無忌將萬人翦草塡道水深處以車為梁上自繫薪於馬鞘以助役冬十月丙申朔上至蒲溝駐馬督填道諸軍度渤錯水暴風雪士卒沾濕多死者敕然火於道以待之凡征髙麗拔玄菟横山蓋牟磨米遼東白巖卑沙麥谷銀山後黄十城徙遼蓋巖三州户口入中國者七萬人新城建安駐蹕三大戰斬首四萬餘級戰士死者幾二千人戰馬死者什七八上以不能成功􅀷悔之歎曰魏徴􅀂在不使我有是行也命馳驛祀徴以少牢復立所製碑召其妻子詣行在勞賜之丙午至營州詔遼東戰亡士卒骸骨並集柳城東􅀯命有司設太牢上自作文以祭之臨哭盡哀其父母聞之曰吾兒死而天子哭之死何所恨上謂薛仁貴曰朕諸將皆老思得新進驍勇者將之無如卿者朕不喜得遼東喜得卿也丙辰上聞太子奉迎將至從飛騎三千人馳入臨渝闗道逢太子上之發定州也指所御􅄄􅂁謂太子曰俟見汝乃易此袍耳在遼左雖盛暑流汗弗之易及秋穿敗左右請易之上曰軍士衣多弊吾獨御新衣可乎至是太子進新衣乃易之諸軍所虜髙麗民萬四千口先集幽州將以賞軍士上愍其父子夫婦離散命有司平其直悉以錢布贖為民歡呼之聲三日不息十一月辛未車駕至幽州髙麗民迎於城東拜舞號呼宛轉於地塵埃彌望庚辰過易州境司馬陳元璹使民於地室蓄火種􅂼而進之上惡其諂免元璹官丙戌車駕至定州丁亥吏部尚書楊師道坐所署用多非其才左遷工部尚書壬辰車駕發定州十二月辛丑上病癰御歩輦而行戊申至并州太子為上吮癰扶輦歩從者數日辛亥上疾瘳百官皆賀上之征髙麗也使右領軍大將軍執失思力將突厥屯夏州之北以備薛延陀薛延陀多彌可汗既立以上出征未還引兵寇河􅀯上遣左武候中郎將長安田仁㑹與思力合兵擊之思力羸形偽退誘之深入及夏州之境整陳以待之薛延陀大敗追奔六百餘里耀威磧北而還多彌復發兵宼夏州己未敕禮部尚書江夏王道宗發朔并汾箕嵐代忻蔚雲九州兵鎮朔州右衛大將軍代州都督薛萬徹左驍衛大將軍阿史那社爾發勝夏銀綏丹延鄜坊石隰十州兵鎮勝州勝州都督宋君明左武候將軍薛孤吳發靈原寧鹽慶五州兵鎭靈州又令執失思力發靈勝二州突厥兵與道宗等相應薛延陀至塞下知有備不敢進􅀄上留侍中劉洎輔皇太子於定州仍兼左庶子檢校民部尚書揔吏禮户部三尚書事上將行謂洎曰我今逺征爾輔太子安危所寄宜深識我意對曰願陛下無憂大臣有罪者臣謹即行誅上以其言妄發頗怪之戒曰卿性踈而太健必以此敗深宜愼之及上不豫洎從内出色甚悲懼謂同列曰疾勢如此聖躬可憂或􅉲於上曰洎言國家事不足憂但當輔㓜主行伊霍故事大臣有異志者誅之自定矣上以為然庚申下詔稱洎與人竊議窺窬萬一謀執朝衡自處伊霍猜忌大臣皆欲夷戮冝賜自盡免其妻孥中書令馬周攝吏部尚書以四時選為勞請復以十一月選至三月畢從之是歲右親衛中郎將裴行方討茂州叛羌黄郎弄大破之窮其餘黨西至乞習山臨弱水而歸二十年春正月辛未夏州都督喬師望右領軍大將軍執失思力等擊薛延陀大破之虜獲二千餘人多彌可汗輕騎遁去部内騷然矣丁丑遣大理卿孫伏伽等二十二人以六條廵察四方剌史縣令以下多所貶黜其人詣闕稱寃者前後相屬上令褚遂良類狀以聞上親臨决以能進擢者二十人以罪死者七人流以下除免者數百千人二月乙未上發并州三月己巳車駕還京師上謂李靖曰吾以天下之衆困於小夷何也靖曰此道宗所解上顧問江夏王道宗具陳在駐蹕時乗虚取平壤之言上悵然曰當時怱怱吾不憶也上疾未全平欲專保養庚午詔軍國機務並委皇太子處決於是太子閒日聽政於東宫既罷則入侍藥膳不離左右上命太子蹔出遊觀太子辭不願出上乃置别院於寢殿側使太子居之禇遂良請遣太子旬日一還東宫與師傅講道義從之上嘗幸未央宫辟仗已過忽於草中見一人帶横刀詰之曰聞辟仗至懼不敢出辟仗者不見遂伏不敢動上遽引還顧謂太子茲事行之則數人當死汝於後速縱遣之又嘗乗腰輿有三衛誤拂御衣其人懼色變上曰此間無御史吾不汝罪也陜人常德玄告刑部尚書張亮養假子五百人與術士公孫常語云名應圖䜟又問術士程公頴云吾臂有龍鱗起欲舉大事可乎上命馬周等按其事亮辭不服上曰亮有假子五百人養此輩何爲正欲反耳命百官議其獄皆言亮反當誅獨將作少匠李道􅁉言亮反形未具罪不當死上遣長孫无忌房玄齡就獄與亮訣曰法者天下之平與公共之公自不謹與凶人往還陷入於法今將柰何公好去己丑亮與公頴俱斬西市籍沒其家歲餘刑部侍郎缺上命執政妙擇其人擬數人皆不稱㫖既而曰朕得其人矣往者李道􅁉議張亮獄云反形未具此言當矣朕雖不從至今悔之遂以道􅁉為刑部侍郎閏月癸巳朔日有食之戊戌罷遼州都督府及巖州夏四月甲子太子太保蕭瑀解太保仍同中書門下三品五月甲寅髙麗王藏及莫離支蓋金遣使謝罪并獻二美女上還之金即蘇文也六月丁卯西突厥乙毗射匱可汗遣使入貢且請昬上許之且使割􅀛兹于闐踈勒朱俱波葱嶺五國以為聘禮薛延陀多彌可汗性􅄶急猜忌無恩廢弃父時貴臣專用已所親昵國人不附多彌多所誅殺人不自安回紇酋長吐迷度與僕骨同羅共擊之多彌大敗乙亥詔以江夏王道宗左衛大將軍阿史那社爾為瀚海安撫大使又遣右領衛大將軍執失思力將突厥兵右驍衛大將軍契苾何力將涼州及胡兵代州都督薛萬徹營州都督張儉各將所部兵分道並進以擊薛延陀上遣校尉宇文法詣烏羅護靺鞨遇薛延陀阿波設之兵於東境法帥靺鞨擊破之薛延陀國中驚擾曰唐兵至矣諸部大亂多彌引數千騎奔阿史德時健部落廻紇攻而殺之并其宗族殆盡遂據其地諸俟斤互相攻擊爭遣使來歸命薛延陀餘衆西走猶七萬餘口共立眞珠可汗兄子咄摩支為伊特勿失可汗歸其故地尋去可汗之號遣使奉表請居欝督軍山之北使兵部尚書崔敦禮就安集之敕勒九姓酋長以其部落素服薛延陀種聞咄摩支來皆恐懼朝議恐其為磧北之患乃更遣李丗勣與九姓敕勒共圖之上戒丗勣曰降則撫之叛則討之己丑上手詔以薛延陀破滅其敕勒諸部或來降附或未歸服令不乗機恐貽後悔朕當自詣靈州招撫其去歲征遼東兵皆不調發時太子當從行少詹事張行成上䟽以為皇太子從幸靈州不若使之監國接對百寮明習庶政既為京師重鎭且示四方盛德宜割私愛俯從公道上以為忠進位銀青光禄大夫李丗勣至􅉱督軍山其酋長梯眞逹官帥衆來降薛延陀咄摩支􅀯奔荒谷丗勣遣通事舍人蕭嗣業往招慰咄摩支詣嗣業降其部落猶持兩端丗勣縱兵追擊前後斬五千餘級虜男女三萬餘人秋七月咄摩支至京師拜右武衛大將軍八月甲子立皇孫忠爲陳王己巳上行幸靈州江夏王道宗兵既渡磧遇薛延陀阿波逹官衆數萬拒戰道宗擊破之斬首千餘級追奔二百里道宗與薛萬徹各遣使招諭敕勒諸部其酋長皆喜頓首請入朝庚午車駕至浮陽廻紇拔野古同羅僕骨多濫葛思結阿跌契苾跌結渾斛薛等十一姓各遣使入貢稱薛延陀不事大國暴虐無道不能與奴等爲主自取敗死部落鳥散不知所之奴等各有分地不從薛延陀去歸命天子願賜哀憐乞置官司養育奴等上大喜辛未詔廻紇等使者宴樂頒賚拜官賜其酋長璽書遣右領軍中郎將安永壽報使壬申上幸漢故甘泉宫詔以戎狄與天地俱生上皇並列流殃構禍乃自運􅀄朕聊命偏師遂擒頡利始弘廟略已滅延陀鐵勒百餘萬户散處北溟逺遣使人委身內屬請同編列並為州郡混元以降殊未前聞宜備禮告廟仍頒示普天庚辰至涇州丙戌踰隴山至西瓦亭觀馬牧九月上至靈州敕勒諸部俟斤遣使相繼詣靈州者數千人咸云願得天至尊爲奴等爲可汗子子孫孫常為天至尊奴死無所恨甲辰上為詩序其事曰雪恥酬百王除凶報千古公卿請勒石於靈州從之特進同中書門下三品宋公蕭瑀性狷介與同僚多不合嘗言於上曰房玄齡與中書門下衆臣朋黨不忠執權膠固陛下不詳知但未反耳上曰卿言得無太甚人君選賢才以為股肱心膂當推誠任之人不可以求備必捨其所短取其所長朕雖不能聦明何至頓迷臧否乃至於是瑀內不自得既數忤㫖上亦銜之但以其忠直居多未忍廢也上嘗謂張亮曰卿既事佛何不出家瑀因自請出家上曰亦知公雅好桑門今不違公意瑀須臾復進曰臣適思之不能出家上以瑀對羣臣發言反覆尤不能平㑹稱足疾不朝或至朝堂而不入見上知瑀意終怏怏冬十月手詔數其罪曰朕於佛教非意所遵求其道者未驗福於將來修其教者翻受辜於既徃至若梁武窮心於釋氏簡文銳意於法門傾帑藏以給僧祗殫人力以供塔廟及乎三淮沸浪五嶺騰煙假餘息於熊蹯引殘魂於雀􅑹子孫覆亡而不暇社稷俄頃而爲墟報施之徵何其謬也瑀踐覆車之餘軌襲亡國之遺風弃公就私未明隱顯之際身俗口道莫辨邪正之心修累葉之殃源祈一躬之福本上以違忤君主下則扇習浮華自請出家尋復違異一廻一惑在於瞬息之間自可自否變於帷扆之所乖棟梁之體豈具瞻之量乎朕隱忍至今瑀全無悛改可商州刺史仍除其封上自髙麗還蓋蘇文益驕恣雖遣使奉表其言率皆詭誕又待唐使者倨慢常窺伺邊隙屢敕令勿攻新羅而侵陵不止壬申詔勿受其朝貢更議討之丙戌車駕還京師冬十月己丑上以幸靈州往還冒寒疲頓欲於歲前專事保攝十一月己丑詔祭祀表䟽胡客兵馬宿衛行魚契給驛授五品以上官及除解決死罪皆以聞餘並取皇太子處分十二月己丑羣臣累請封禪從之詔造羽衛送洛陽宫戊寅廻紇俟利發吐迷度僕骨俟利發歌濫拔延多濫葛俟斤末拔野古俟利發屈利失同羅俟利發時健啜思結酋長烏碎及渾斛薛奚結阿跌契苾白霫酋長皆來朝庚辰上賜宴於芳蘭殿命有司厚加給待每五日一會癸未上謂長孫无忌等曰今日吾生日丗俗皆為樂在朕飜成傷感今君臨天下冨有四海而承歡膝下永不可得此子路所以有負米之恨也詩云哀哀父母生我劬勞柰何以劬勞之日更為宴樂乎因泣數行下左右皆悲房玄齡嘗以微譴歸第禇遂良上䟽以為玄齡自義旗之始翼賛聖功武德之季冒死決䇿貞觀之􅀄選賢立政人臣之勤玄齡為最自非有罪在不赦搢紳同尤不可遐弃陛下若以其衰老亦當諷諭使之致仕退之以禮不可以淺鮮之過弃數十年之勲舊上遽召出之頃之玄齡復避位還家乆之上幸芙蓉園玄齡敕子弟汛掃門庭曰乗輿且至有頃上果幸其第因載玄齡還宫二十一年春正月開府儀同三司申文獻公髙士廉疾篤辛卯上幸其第流涕與訣壬辰薨上將往哭之房􅀇齡以上疾新愈固諌上曰髙公非徒君臣兼以故舊姻戚豈得聞其喪不往哭乎公勿復言帥左右自興安門出長孫无忌在士廉䘮所聞上將至輟哭迎諌於馬首曰陛下餌金石於方不得臨䘮柰何不為宗廟蒼生自重且臣舅臨終遺言深不欲以北首夷衾輒屈鑾駕上不聽无忌中道伏卧流涕固諫上乃還入東苑􅀯望而哭涕下如雨及柩出横橋上登長安故城西北樓望之慟哭丙申詔以廻紇部為瀚海府僕骨為金微府多濫葛為燕然府拔野古為幽陵府同羅為􅀛林府思結為盧山府渾為臯蘭州斛薛為髙闕州奚結為雞鹿州阿跌為雞田州契苾為榆溪州思結别部為蹛林州白霫為窴顔州各以其酋長為都督刺史各賜金銀繒帛及錦􅂁敕勒大喜捧戴歡呼拜舞宛轉塵中及還上御天成殿宴設十部樂而遣之諸酋長奏稱臣等既為唐民往來天至尊所如詣父母請於回紇以􅀯突厥以北開一道謂之參天可汗道置六十八驛各有馬及酒肉以供過使歲貢貂皮以充租賦仍請能屬文人使為表䟽上皆許之於是北荒悉平然廻紇吐迷度己私自稱可汗官號皆如突厥故事丁酉詔以明年仲春有事泰山禪社首餘並依十五年議二月丁丑太子釋奠于國學上將復伐髙麗朝議以爲髙麗依山爲城攻之不可猝拔前大駕親征國人不得耕種所克之城悉收其榖繼以旱災民太半乏食今若數遣偏師更迭擾其疆埸使彼疲於奔命釋耒入堡數年之間千里蕭條則人心自離鴨緑之北可不戰而取矣上從之三月以左武衛大將軍牛進逹爲青丘道行軍大揔管右武候將軍李海岸副之發兵萬餘人乗樓舩自萊州汎海而入又以太子詹事李丗勣爲遼東道行軍大揔管右武衛將軍孫貳朗等副之將兵三千人因營州都督府兵自新城道入兩軍皆選習水善戰者配之辛卯上曰朕於戎狄所以能取古人所不能取臣古人所不能臣者皆順衆人之所欲故也昔禹帥九州之民鑿山槎木䟽百川注之海其勞甚矣而民不怨者因人之心順地之勢與民同利故也是月上得風疾苦京師盛暑夏四月乙丑命修終􅀯山太和廢宫為翠微宫丙寅置燕然都護府統瀚海等六都督臯蘭等七州以楊州都督府司馬李素立為之素立撫以恩信夷落懐之共率馬牛為獻素立唯受其酒一盃餘悉還之五月戊子上幸翠微宫冀州進士張昌齡獻翠微宫頌上愛其文命於通事舍人裏供奉􅀄昌齡與進士王公治皆善屬文名振京師考功貟外郎王師旦知貢舉黜之舉朝莫曉其故及奏第上怪無二人名詰之師旦對曰二人雖有辭華然其體輕薄終不成令器若置之髙第恐後進效之傷陛下雅道上善其言壬辰詔百司依舊啓事皇太子庚辰上御翠微殿問侍臣曰自古帝王雖平定中夏不能服戎狄朕才不逮古人而成功過之自不諭其故諸公各帥意以實言之羣臣皆稱陛下功德如天地萬物不得而名言上曰不然朕所以能及此者止由五事耳自古帝王多疾勝己者朕見人之善􅀂己有之人之行能不能兼備朕常弃其所短取其所長人主往往進賢則欲寘諸懐退不肖則欲推諸壑朕見賢者則敬之不肖者則憐之賢不肖各得其所人主多惡正直隂誅顯戮無代無之朕踐祚以來正直之士比肩於朝未嘗黜責一人自古皆貴中華賤夷狄朕獨愛之如一故其種落皆依朕如父母此五者朕所以成今日之功也顧謂褚遂良曰公嘗為史官如朕言得其實乎對曰陛下盛德不可勝載獨以此五者自與蓋謙謙之志耳李丗勣軍既度遼歷􅀯蘇等數城髙麗多背城拒戰丗勣擊破其兵焚其羅郭而還六月癸亥以司徒長孫无忌領􅀭州都督實不之任丁丑詔以隋末䘮亂邊民多為戎狄所掠令鐵勒歸化宜遣使詣燕然等州與都督相知訪求沒落之人贖以貨財給糧遞還本貫其室韋烏羅護靺鞨三部人爲薛延陁所掠者亦令贖還癸未以司農卿李緯爲户部尚書時房玄齡留守京師有自京師來者上問玄齡何言對曰玄齡聞李緯拜尚書但云李緯美髭鬢帝遽改除緯洛州刺史秋七月牛進逹李海岸入髙麗境凡百餘戰無不捷攻石城拔之進至積利城下髙麗兵萬餘人出戰海岸擊破之斬首二千級上以翠微宫險隘不能容百官庚子詔更營玉華宫於宜君之鳯皇谷庚戌車駕還宫八月壬戌詔以薛延陀新降土功屢興加以河北水災停明年封禪辛未骨利幹遣使入貢丙戌以骨利幹爲玄闕州拜其俟斤爲刺史骨利幹於鐵勒諸部爲最逺晝長夜短日沒後天色正曛煑羊胛適熟日已復出矣己丑齊州人叚志沖上封事請上致政於皇太子太子聞之憂形於色發言流涕長孫无忌等請誅志沖上手詔曰五岳陵霄四海亘地納汙藏疾無損髙深志沖欲以匹夫解位天子朕若有罪是其直也若其無罪是其狂也譬如尺霧障天不虧於大寸雲㸃日何損於明丁酉立皇子明為曹王明母楊氏巢刺王之妃也有寵於上文德皇后之崩也欲立為皇后魏徴諌曰陛下方比德唐虞柰何以辰嬴自累乃止尋以明繼元吉後戊戌敕宋州剌史王波利等發江􅀯十二州工人造大船數百艘欲以征髙麗冬十月庚辰奴刺啜匐俟犮帥其所部萬餘人內附十一月突厥車鼻可汗遣使入貢車鼻名斛勃本突厥同族丗為小可汗頡利之敗突厥餘衆欲奉以為大可汗時薛延陀方彊車鼻不敢當帥其衆歸之或說薛延陀車鼻貴種有勇略為衆所附恐為後患不如殺之車鼻知之逃去薛延陀遣數千騎追之車鼻勒兵與戰大破之乃建牙於金山之北自稱乙注車鼻可汗突厥餘衆稍稍歸之數年閒勝兵三萬人時出抄掠薛延陀及薛延陀敗車鼻􅀔益張遣其子沙鉢羅特勒入見又請身自入朝詔遣將軍郭廣敬徴之車鼻特為好言初無來意竟不至癸卯徙順陽王泰為濮王壬子上疾愈三日一視朝十二月壬申西趙酋長趙磨帥萬餘户内附以其地為明州􅀛茲王伐疊卒弟訶黎布失畢立浸失臣禮侵漁鄰國上怒戊寅詔使持節崑丘道行軍大揔管左驍衛大將軍阿史那社爾副大揔管左驍衛大將軍契苾何力安西都護郭孝恪等將兵擊之仍命鐵勒十三州突厥吐蕃吐谷渾連兵進討髙麗王使其子莫離攴任武入謝罪上許之二十二年春正月己丑上作帝範十二篇以賜太子曰君體建親求賢審官納諌去䜛戒盈崇儉賞罰務農閲武崇文且曰修身治國備在其中一旦不諱更無所言矣又曰汝當更求古之哲王以為師如吾不足法也夫取法於上僅得其中取法於中不免為下吾居位已來不善多矣錦繡珠玉不絶於前宫室臺榭屢有興作犬馬鷹隼無逺不致行遊四方供頓煩勞此皆吾之深過勿以為是而法之顧我弘濟蒼生其益多肇造區夏其功大益多損少故人不怨功大過微故業不墮然比之盡美盡善固多愧矣汝無我之功勤而承我之富貴竭力為善則國家僅安驕惰奢縱則一身不保且成遲敗速者國也失易得難者位也可不惜哉可不愼哉中書令兼右庶子馬周病上親為調藥使太子臨問庚寅薨戊戌上幸驪山温湯己亥以中書舍人崔仁師為中書侍郎參知機務新羅王金善德卒以善德妹眞德為柱國封樂浪郡王遣使冊命丙午詔以右武衛大將軍薛萬徹為青丘道行軍大揔管右衛將軍裴行方副之將兵三萬餘人及樓舩戰艦自萊州泛海以擊髙麗長孫无忌檢校中書令知尚書門下省事戊申上還宫結骨自古未通中國聞鐵勒諸部皆服二月其俟利發失鉢屈阿棧入朝其國人皆長大赤髪緑睛有黒髪者以為不祥上宴之於天成殿謂侍臣曰昔渭橋斬三突厥首自謂功多今斯人在席更不以為怪邪失鉢屈阿棧請除一官執笏而歸誠百丗之幸戊午以結骨為堅昆都督府以失鉢屈阿棧為右屯衛大將軍堅昆都督􅀠燕然都護又以阿史德時健俟斤部落置祁連州􅀠靈州都督是時四夷大小君長爭遣使入獻見道路不絶每元正朝賀常數百千人辛酉上引見諸胡使者謂侍臣曰漢武帝窮兵三十餘年疲􅁦中國所獲無幾豈如今日綏之以德使窮髪之地盡為編户乎上營玉華宫務令儉約惟所居殿覆以瓦餘皆茅茨然備設太子宫百司苞山絡野所費已巨億計乙亥上行幸玉華宫己卯畋于華原中書侍郎崔仁師坐有伏閤自訴者仁師不奏除名流連州三月己丑分瀚海都督俱羅勃部置燭龍州甲午上謂侍臣曰朕少長兵間頗能料敵今崑丘行師處月處宻二部及􅀛茲用事者羯獵顚那利每懐首䑕必先授首弩失畢其次也庚子隋蕭后卒詔復其位號謚曰愍使三品護􅁙備鹵簿儀衛送至江都與􅌆帝合􅁙充容長城徐惠以上東征髙麗西討􅀛茲翠微玉華營繕相繼又服玩頗華靡上䟽諫其略曰以有盡之農功填無窮之巨浪圖未獲之他衆䘮已成之我軍昔秦皇并吞六國反速危亡之基晉武奄有三方翻成覆敗之業豈非矜功恃大弃德輕邦圖利忘危肆情縱欲之所致乎是知地廣非常安之術人勞乃易亂之源也又曰雖復茅茨示約猶興木石之疲和雇取人不無煩擾之弊又曰珍玩􅇊巧乃䘮國之斧斤珠玉錦繡寔迷心之酖毒又曰作法於儉猶恐其奢作法於者何以制後上善其言甚禮重之卷終
