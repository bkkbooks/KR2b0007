body:
  text: 臣司馬光奉勑編集魏紀七􅀇黓涒灘凡七年起柔兆攝提格盡邵陵厲公中正始七年春二月吳車騎將軍朱然宼柤中殺略數千人而去幽州刺史母丘儉以髙句驪王位宫數為侵叛督諸軍討之位宫敗走儉遂屠丸都斬獲首虜以千數句驪之臣得來數諫位宫位宫不從得來歎曰立見此地將生蓬蒿遂不食而死儉令諸軍不壊其墓不伐其樹得其妻子皆放遣之位宫單將妻子逃竄儉引軍還未幾復擊之位宫遂犇買溝儉遣􅀇莬太守王頎追之過沃沮千有餘里至肅慎氏南界刻石紀功而還所誅納八千餘口論功受賞侯者百餘人秋九月吳主以驃騎將軍步隲為丞相車騎將軍朱然為左大司馬衛將軍全琮為右大司馬分荆州為二部以鎮南將軍吕岱為上大將軍督右部自武昌以西至蒲圻以威北將軍諸葛恪為大將軍督左部代陸遜鎮武昌漢大赦大司農河南孟光於衆中貴費禕曰夫赦者偏枯之物非明世所宜有也衰敝窮極必不得已然後乃可權而行之耳今主上仁賢百僚稱職何有旦夕之急而數施非常之恩以恵姦宄之惡乎禕但顧謝踧踖而已初丞相亮時有言公惜赦者亮答曰治世以大德不以小恵故匡衡吳漢不願為赦先帝亦言吾周旋陳元方鄭康成閒每見啟告治亂之道悉矣曽不語赦也若劉景升季玉父子嵗嵗赦宥何益於治由是蜀人稱亮之賢知禕不及焉陳夀評曰諸葛亮為政軍旅數興而赦不妄下不亦卓乎吳人不便大錢乃罷之漢主以凉州刺史姜維為衛將軍與大將軍費禕並録尚書事汶山平康夷反維討平之漢主數出逰觀増廣聲樂太子家令巴西譙周上疏諫曰昔王莽之敗豪桀竝起以爭神器才智之士思望所歸未必以其勢之廣陿惟其德之厚薄也於時更始公孫述等多已廣大然莫不快情恣欲怠於為善世祖初入河北馮異等勸之曰當行人所不能為者遂務理􅁈獄崇節儉北州歌歎聲布四逺於是鄧禹自􅀯陽追之吳漢宼恂素未之識舉兵助之其餘望風慕德邳肜耿純劉植之徒至于輿病齎棺襁負而至不可勝數故能以弱為彊而成帝業及在洛陽嘗欲小出銚期進諫即時還車及潁川盜起宼恂請世祖身往臨賊聞言即行故非急務欲小出不敢至於急務欲自安不為帝者之欲善也如此故傳曰百姓不徒附誠以德先之也今漢遭厄運天下三分雄哲之士思望之時也臣願陛下復行人所不能為者以副人望且承事宗廟所以率民尊上也今四時之祀或有不臨而池苑之觀或有仍出臣之愚滯私不自安夫憂責在身者不暇盡樂先帝之志堂構未成誠非盡樂之時願省減樂官後宫凡所増造但奉脩先帝所施下為子孫節儉之教漢主不聽八年春正月吳全琮卒二月日有食之時尚書何晏等朋附曹爽好變改灋度太尉蔣濟上疏曰昔大舜佐治戒在比周周公輔政慎於其朋夫為國灋度惟命世大才乃能張其綱維以垂于後豈中下之吏所宐改易哉終無益於治適足傷民宜使文武之臣各守其職率以清平則和氣祥瑞可感而致也吳主詔徙武昌宫材瓦繕脩建業宫有司奏言武昌宫已二十八嵗恐不堪用宜下所在通更伐致吳主曰大禹以卑宫為羙今軍事未巳所在賦歛若更通伐妨損農桑徙武昌材瓦自可用也乃徙居南宫三月改作太初宫令諸將及州郡皆義作大將軍爽用何晏鄧颺丁謐之謀遷太后於永寧宫專擅朝政多樹親黨屢改制度太傅懿不能禁與爽有隙五月懿始稱疾不與政事吳丞相步騭卒帝好䙝近羣小逰宴後園秋七月尚書何晏上言自今御幸式乾殿及游豫後園宜皆從大臣詢謀政事講論經義為萬世灋冬十二月散騎常侍諫議大夫孔乂上言今天下已平陛下可絶後園習騎乗馬岀必御輦乗車天下之福臣子之願也帝皆不聽吳主大發衆集建業揚聲欲入冦揚州刺史諸葛誕使安豐太守王基策之基曰今陸遜等已死孫權年老内無賢嗣中無謀主權自出則懼内釁卒起癰疽發潰遣將則舊將已盡新將未信此不過欲􅀘䘺支黨還自保䕶耳已而吳果不出是嵗雍涼羌胡叛降漢漢姜維將兵出隴右以應之與雍州刺史郭淮討蜀䕶軍夏侯霸戰於洮西胡王白虎文治無戴等率部落降維維徙之入蜀淮進擊羌胡餘黨皆平之九年春二月中書令孫資癸巳中書監劉放三月甲午司馬衛臻各遜位以侯就第位特進夏四月以司空髙柔爲司徒光禄大夫徐邈爲司空邈嘆曰三公論道之官無其人則缺豈可以老病忝之哉遂固辭不受五月漢費禕出屯漢中自蔣琬及禕雖身居於外慶賞威刑皆遥先諮斷然後乃行禕雅性謙素當國功名略與琬比秋九月以車騎將軍王凌為司空陪陵夷反漢車騎將軍鄧芝討平之大將軍爽驕奢無度飲食衣服擬於乗輿尚方珍玩充牣其家又私取先帝才人以為伎樂作窟室綺疏四周數與其黨何晏等縱酒其中弟羲深以為憂數涕泣諫止之爽不聽爽兄弟數俱出逰司農沛國桓範謂曰揔萬機典禁兵不宜竝出若有閉城門誰復内人者爽曰誰敢爾邪初清河平原爭界八年不能决冀州刺史孫禮請天府所藏烈祖封平原時圖以决之爽信清河之訴云圖不可用禮上疏自辨辭頗剛切爽大怒劾禮怨望結刑五嵗久之復為并州刺史往見太傅懿有忿色而無言懿曰卿得并州少邪恚理分界失分乎禮曰何明公言之乖也禮雖不德豈以官位往事為意邪本謂明公齊蹤伊吕匡輔魏室上報明帝之託下建萬世之勲今社稷將危天下兇兇此禮之所以不恱也因涕泣橫流懿曰且止忍不可忍冬河南尹李勝出為荆州刺史過辭太傅懿懿令兩婢侍持衣衣落指口言渇婢進粥懿不持杯而飲粥皆流出霑胷勝曰衆情謂明公舊風發動何意尊體乃爾懿使聲氣纔屬說年老枕疾死在旦夕君當屈并州并州近胡好為之備恐不復相見以子師昭兄弟為託勝曰當還忝本州非并州懿乃錯亂其辭曰君方到并州勝復曰當忝荆州懿曰年老意荒不解君言今還為本州盛德壯烈好建功勲勝退告爽曰司馬公尸居餘氣形神已離不足慮矣他日又向爽等垂泣曰太傅病不可復濟令人愴然故爽等不復設備何晏聞平原管輅明於術數請與相見十二月丙戌輅往詣晏晏與之論易時鄧颺在坐謂輅曰君自謂善易而語初不及易中辭義何也輅曰夫善易者不言易也晏含笑賛之曰可謂要言不煩也因謂輅曰試為作一卦知位當至三公不又問連夢見青蠅數十來集鼻上驅之不去何也輅曰昔元凱輔舜周公佐周皆以和恵謙恭享有多福此非卜筮所能明也今君侯位尊埶重而懐德者鮮畏威者衆殆非小心求福之道也又鼻者天中之山髙而不危所以長守貴今青蠅臭惡而集之位峻者顛輕豪者亡不可不深思也願君侯裒多益寡非禮不履然後三公可至青蠅可驅也颺曰此老生之常譚輅曰夫老生者見不生常譚者見不譚輅還邑舍具以語其舅舅責輅言太切至輅曰與死人語何所畏邪舅大怒以輅為狂吳交趾九真夷賊攻沒城邑交部騷動吳主以衡陽督軍都尉陸􅅌為交州刺史安南校尉􅅌入境喻以恩信降者五萬餘家州境復清太傅懿隂與其子中䕶軍師散騎常侍昭謀誅曹爽嘉平元年春正月甲午帝謁髙平陵大將軍爽與弟中領軍羲武衛將軍訓散騎常侍彦皆從太傅懿以皇太后令閉諸城門勒兵據武庫授兵出屯洛水浮橋召司徒髙柔假節行大將軍事據爽營太僕王觀行中領軍事據羲營因奏爽罪惡於帝曰臣昔從遼東還先帝詔陛下秦王及臣升御床把臣臂深以後事為念臣言太祖髙祖亦屬臣以後事此自陛下所見無所憂苦萬一有不如意臣當以死奉明詔今大將軍爽背棄顧命敗亂國典内則僭擬外則専權破壊諸營盡據禁兵羣官要職皆置所親殿中宿衛易以私人根據槃互縱恣日甚又以黃門張當為都監伺察至尊離閒二宫傷害骨肉天下洶洶人懐危懼陛下便為寄坐豈得久安此非先帝詔陛下及臣升御牀之本意也臣雖朽邁敢忘往言太尉臣濟等皆以爽為有無君之心兄弟不宐典兵宿衛奏永寧宫皇太后令敕臣如奏施行臣輙敕主者及黃門令罷爽羲訓吏兵以侯就第不得逗留以稽車駕敢有稽留便以軍灋從事臣輙力疾將兵屯洛水浮橋伺察非常爽得懿奏事不通迫窘不知所為留車駕宿伊水􅀯伐木為鹿角發屯田兵數千人以為衛懿使侍中髙陽許允及尚書陳泰說爽宜早自歸罪又使爽所信殿中校尉尹大目謂爽唯免官而已以洛水為誓泰羣之子也初爽以桓範鄉里老宿於九卿中特禮之然不甚親也及懿起兵以太后令召範欲使行中領軍範欲應命其子止之曰車駕在外不如南出範乃出至平昌城門城門已閉門􅀱司蕃故範舉吏也範舉手中版以示之矯曰有詔召我卿促開門蕃欲求見詔書範呵之曰卿非我故吏邪何以敢爾乃開之範出城顧謂蕃曰太傅圖逆卿從我去蕃徒行不能及遂避側懿謂蔣濟曰智囊往矣濟曰範則智矣然駑馬戀棧豆爽必不能用也範至勸爽兄弟以天子詣許昌發四方兵以自輔爽疑未决範謂羲曰此事昭然卿用讀書何為邪於今日卿等門户求貧賤復可得乎且匹夫質一人尚欲望活卿與天子相隨令於天下誰敢不應也俱不言範又謂羲曰卿别營近在闕南洛陽典農治在城外呼召如意今詣許昌不過中宿許昌别庫足相被假所憂當在榖食而大司農印章在我身羲兄弟黙然不從自甲夜至五鼓爽乃投刀於地曰我亦不失作富家翁範哭曰曹子丹佳人生汝兄弟㹠犢耳何圖今日坐汝等族滅也爽乃通懿奏事白帝下詔免已官奉帝還宫爽兄弟歸家懿發洛陽吏卒圍守之四角作髙樓令人在樓上察視爽兄弟舉動爽挾彈到後園中樓上人便唱言故大將軍東􅀯行爽愁悶不知為計戊戌有司奏黃門張當私以所擇才人與爽疑有姦收當付廷尉考實辭云爽與尚書何晏鄧颺丁謐司􅀠校尉畢軌荆州刺史李勝等隂謀反逆須三月中發於是收爽羲訓晏颺謐􅁤勝并桓範皆下獄劾以大逆不道與張當俱夷三族初爽之出也司馬魯芝留在府聞有變將營騎斫津門出赴爽及爽解印綬將出主簿楊綜止之曰公挾主握權捨此以至東市乎有司奏收芝綜治罪太傅懿曰彼各為其主也宥之頃之以芝為御史中丞綜為尚書􅀰魯芝將出呼參軍辛敞欲與俱去敞毗之子也其姊憲英為太常羊耽妻敞與之謀曰天子在外太傅閉城門人云將不利國家於事可得爾乎憲英曰以吾度之太傅此舉不過以誅曹爽耳敞曰然則事就乎憲英曰得無殆就爽之才非太傅之偶也敞曰然則敞可以無出乎憲英曰安可以不出職守人之大義也凡人在難猶或䘏之為人執鞭而棄其事不祥莫大焉且為人任為人死親昵之職也從衆而已敞遂出事定之後敞歎曰吾不謀於姊幾不獲於義先是爽辟王沈及泰山羊祜沈勸祜應命祜曰委質事人復何容易沈遂行及爽敗沈以故吏免乃謂祜曰吾不忘卿前語祜曰此非始慮所及也爽從弟文叔妻夏侯令女早寡而無子其父文寧欲嫁之令女刀截兩耳以自誓居常依爽爽誅其家上書絶昬強迎以歸復將嫁之令女竊入寑室引刀自断其鼻其家驚惋謂之曰人生世間如輕塵棲弱草耳何至自苦乃爾且夫家夷滅已盡守此欲誰為哉令女曰吾聞仁者不以盛衰改節義者不以存亡易心曹氏前盛之時尚欲保終况今衰亡何忍棄之此禽獸之行吾豈為乎司馬懿聞而賢之聽使乞子字養為曹氏後何晏等方用事自以為一時才傑人莫能及晏嘗為名士品目曰唯深也故能通天下之志夏侯泰初是也唯幾也故能成天下之務司馬子元是也惟神也不疾而速不行而至吾聞其語未見其人蓋欲以神况諸已也選部郎劉陶曄之子也少有口辯鄧颺之徒稱之以為伊吕陶嘗謂傅􅀇曰仲尼不聖何以知之智者於羣愚如弄一丸於掌中而不能得天下何以爲聖玄不復難但語之曰天下之變無常也今見卿窮及曹爽敗陶退居里舍乃謝其言之過管輅之舅謂輅曰爾前何以知何鄧之敗輅曰鄧之行步筋不束骨脉不制肉起立傾倚若無手足此為鬼躁何之視􅃸則魂不守宅血不華色精爽煙浮容若槁木此為鬼幽二者皆非遐福之象也何晏性自喜粉白不去手行歩顧影尤好老莊之書與夏侯􅀇荀粲及山陽王弼之徒競為清談祖尚虚無謂六經為聖人糟粕由是天下士大夫爭慕效之遂成風流不可復制焉粲彧之子也丙午大赦丁未以太傅懿為丞相加九錫懿固辭不受初右將軍夏侯霸為曹爽所厚以其父淵死於蜀常切齒有報仇之志為討蜀䕶軍屯於隴西統屬征西征西將軍夏侯􅀇霸之從子爽之外弟也爽既誅司馬懿召􅀇詣京師以雍州刺史郭淮代之霸素與淮不叶以為禍必相及大懼遂犇漢漢主謂曰卿父自遇害於行間耳非我先人之手刃也遇之甚厚姜維問於霸曰司馬懿既得彼政當復有征伐之志不霸曰彼方營立家門未遑外事有鍾士季者其人雖少若管朝政吳蜀之憂也士季者鍾繇之子尚書郎㑹也三月吳左大司馬朱然卒然長不盈七尺氣􅇋分明内行脩㓗終日欽欽常若在戰場臨急膽定過絶於人雖世無事每朝夕嚴鼓兵在營者咸行裝就隊以此玩敵使不知所備故出輙有功然寑疾増篤吳主晝為減膳夜為不寐中使醫藥口食之物相望於道然毎遣使表疾病消息吳主輙召見口自問訊入賜酒食出賜布帛及卒吳主為之哀慟夏四月乙丑改元曹爽之在伊南也昌陵景侯蔣濟與之書言太傅之㫖不過免官而已爽誅濟進封都鄉侯上疏固辭不許濟病其言之失遂􅀤病丙子卒秋漢衛將軍姜維宼雍州依麴山築二城使牙門將句安李歆等守之聚羌胡質任侵偪諸郡征西將軍郭淮與雍州刺史陳泰禦之泰曰麴城雖固去蜀險逺當湏運糧羌夷患維勞役必未肯附今圍而取之可不血刃而拔其城雖其有救山道阻險非行兵之地也淮乃使泰率討蜀䕶軍徐質南安太守鄧艾進兵圍麴城斷其運道及城外流水安等挑戰不許將士困窘分糧聚雪以引日月維引兵救之出自牛頭山與泰相對泰曰兵灋貴在不戰而屈人今絶牛頭維無反道則我之禽也敕諸軍各堅壘勿與戰遣使白淮使淮趣牛頭截其還路淮從之進軍洮水維懼遁走安等􅀌絶遂降淮因西擊諸羌鄧艾曰賊去未逺或能復還宜分諸軍以備不虞於是留艾屯白水北三日維遣其將廖化自白水南向艾結營艾謂諸將曰維今卒還吾軍人少灋當來渡而不作橋此維使化持吾令不得還維必自東襲取洮城洮城在水北去艾屯六十里艾即夜潛軍徑到維果來渡而艾先至據城得以不敗漢軍遂還兖州刺史令狐愚司空王淩之甥也屯於平阿甥舅竝典重兵専淮南之任凌與愚隂謀以帝闇弱制於彊臣聞楚王彪有智勇欲共立之迎都許昌九月愚遣其將張式至白馬與楚王相聞淩又遣舍人勞精詣洛陽語其子廣廣曰凡舉大事應本人情曹爽以驕奢失民何平叔虚華不治丁畢桓鄧雖竝有宿望皆専競於世加變易朝典政令數改所存雖髙而事不下接民習於舊衆莫之從故雖埶傾四海聲震天下同日斬戮名士減半而百姓安之莫之或哀失民故也今司馬懿情雖難量事未有逆而擢用賢能廣樹勝已脩先朝之政令副衆心之所求爽之所以為惡者彼莫不必改夙夜匪懈以恤民為先父子兄弟竝握兵要未易亡也淩不從冬十一月令狐愚復遣張式詣楚王未還㑹愚病卒十二月辛卯即拜王淩為太尉庚子以司􅀠校尉孫禮為司空光禄大夫徐邈卒邈以清節著名盧欽嘗著書稱邈曰徐公志髙行㓗才博氣猛其施之也髙而不狷㓗而不介博而守約猛而能寛聖人以清為難而徐公之所易也或問欽徐公當武帝之時人以為通自為涼州刺史及還京師人以為介何也欽答曰往者毛孝先崔季珪用事貴清素之士于時皆變易車服以求名髙而徐公不改其常故人以為通比來天下奢靡轉相倣傚而徐公雅尚自若不與俗同故前日之通乃今日之介也是世人之無常而徐公之有常也欽毓之子也二年夏五月以征西將軍郭淮為車騎將軍初會稽潘夫人有寵於吳主生少子亮吳主愛之全公主既與太子和有隙欲豫自結數稱亮美以其夫之兄子尚女妻之吳主以魯王霸結朋黨以害其兄心亦惡之謂侍中孫峻曰子弟不睦臣下分部將有袁氏之敗為天下笑若使一人立者安得不亂乎遂有廢和立亮之意然猶沈吟者歴年峻靜之曽孫也秋吳主遂幽太子和驃騎將軍朱據諫曰太子國之本根加以雅性仁孝天下歸心昔晉獻用驪姬而申生不存漢武信江充而戾太子􅁈死臣竊懼太子不堪其憂雖立思子之宫無所復及矣吳主不聽據與尚書僕射屈晃率諸將吏泥頭自縛連日詣闕請和吳主登白爵觀見甚惡之敕據晃等無事怱怱無難督陳正五營督陳象各上書切諫據晃亦固諫不已吳主大怒族誅正象牽據晃入殿據晃猶口諫叩頭流血辭氣不撓吳主杖之各一百左遷據為新都郡丞晃斥歸田里羣司坐諫誅放者以十數遂廢太子和為庶人徙故鄣賜魯王霸死殺楊笁流其尸於江又誅全寄吳安孫竒皆以其黨霸譖和故也初楊笁少獲聲名而陸遜謂之終敗勸笁兄穆令與之别族及笁敗穆以數諫戒笁得免死朱據未至官中書令孫弘以詔書追賜死冬十月廬江太守譙郡文欽偽叛以誘吳偏將軍朱異欲使異自將兵迎已異知其詐表吳主以為欽不可迎吳主曰方今北土未一欽欲歸命宜且迎之若嫌其有譎者但當設計網以羅之盛重兵以防之耳乃遣偏將軍吕據督二萬人與異并力至北界欽果不降異桓之子據範之子也十一月大利景侯孫禮卒吳主立子亮為太子吳主遣軍十萬作堂邑塗塘以淹北道十二月甲辰東海定王霖卒征南將軍王昶上言孫權流放良臣適庶分爭可乗釁擊吳朝廷從之遣新城太守南陽州泰襲巫秭歸荆州刺史王基向夷陵昶向江陵昶引竹絙爲橋渡水擊之呉大將施績夜遁入江陵昶欲引致平地與戰乃先遣五軍案大道發還使吳望見而喜又以所獲鎧馬甲首環城以怒之設伏兵以待之績果來追昶與戰大破之斬其將鍾離茂許旻漢姜維復宼西平不克三年春正月王基州泰擊吳兵皆破之降者數千口三月以尚書令司馬孚為司空夏四月甲申以王昶為征南大將軍壬辰大赦太尉王淩聞吳人塞涂水欲因此發兵大嚴諸軍表求討賊詔報不聽淩遣將軍楊􅀪以廢立事告兖州刺史黃華華􅀪連名以白司馬懿懿將中軍乗水道討淩先下赦赦淩罪又為書諭淩已而大軍掩至百尺淩自知埶窮乃乗􅂳單岀迎懿遣掾王彧謝罪送印綬節鉞懿軍到丘頭淩面􅅞水次懿承詔遣主簿解其􅅞淩既䝉赦加恃舊好不復自疑徑乗小船欲趨懿懿使人逆止之住船淮中相去十餘丈淩知見外乃遥謂懿曰卿直以折簡召我我當敢不至邪而乃引軍來乎懿曰以卿非肯逐折簡者故也淩曰卿負我懿曰我寧負卿不負國家遂遣步騎六百送淩西詣京師淩試索棺釘以觀懿意懿命給之五月甲寅淩行到項遂飲藥死懿進至夀春張式等皆自首懿窮治其事諸相連者悉夷三族發淩愚家剖棺暴尸於所近市三日燒其印綬朝服親土埋之初令狐愚為白衣時常有髙志衆人謂愚必興令狐氏族父􅀪農太守邵獨以為愚性倜儻不脩德而願大必滅我宗愚聞之心甚不平及邵為虎賁中郎將而愚仕進已多所更歴所在有名稱愚從容謂邵曰先時聞大人謂愚為不繼今竟云何邪邵熟視而不答私謂妻子曰公治性度猶如故也以吾觀之終當敗滅但不知我乆當坐之不邪將逮汝曹耳邵沒後十餘年而愚族滅愚在兖州辟山陽單固為别駕與治中楊康竝為愚腹心及愚卒康應司徒辟至洛陽露愚隂事愚由是敗懿至夀春見單固問曰令狐反乎曰無有楊康白事事與固連遂收捕固及家屬皆繫廷尉考實數十固固云無有懿録楊康與固對相詰固辭窮乃罵康曰老傭既負使君又滅我族顧汝當活邪康初自冀封侯後以辭頗參錯亦并斬之臨刑俱出獄固又罵康曰老奴汝死自分耳若令死者有知汝何面目以行地下乎詔以揚州刺史諸葛誕為鎮東將軍都督揚州諸軍事吳主立潘夫人為皇后大赦改元太元六月賜楚王彪死盡録諸王公置鄴使有司察之不得與人交闗秋七月壬戌皇后甄氏殂辛未以司馬孚為太尉八月戊寅舞陽宣文侯司馬懿卒詔以其子衛將軍師為撫軍大將軍録尚書事初􅀯匈奴自謂其先本漢室之甥因冒姓劉氏太祖留單于呼厨泉於鄴分其衆為五部居并州境内左賢王豹單于於扶羅之子也為左部帥部族最彊城陽太守鄧艾上言單于在内羌夷失統合散無主今單于之尊日疏而外土之威日重則胡虜不可不深備也聞劉豹部有叛胡可因叛割為二國以分其埶去卑功顯前朝而子不繼業宜加其子顯號使居鴈門離國弱冦追録舊勲此御邊長計也又陳羌胡與民同處者宐以漸出之使居民表以崇亷恥之教塞姦宄之路司馬師皆從之吳立節中郎將陸抗屯柴桑詣建業治病病差當還吳主涕泣與别謂曰吾前聽用讒言與汝父太義不篤以此負汝前後所問一焚滅之莫令人見也是時吳主頗寤太子和之無罪冬十一月吳主祀南郊還得風疾欲召和還全公主及侍中孫峻中書令孫􅀪固爭之乃止吳主以太子亮㓜少議所付託孫峻薦大將軍諸葛恪可付大事吳主嫌恪剛狠自用峻曰當今朝臣之才無及恪者乃召恪於武昌恪將行上大將軍吕岱戒之曰世方多難子每事必十思恪曰昔季文子三思而後行夫子曰再思可矣今君令恪十思明恪之劣也岱無以答時咸謂之失言虞喜論曰夫託以天下至重也以人臣行主威至難也兼二至而管萬機能勝之者鮮矣吕侯國之元耆志度經逺甫以十思戒之而便以示劣見拒此元遜之疏機神不俱者也若因十思之義廣諮當世之務聞善速於雷動從諫急於風移豈得隕首殿堂死於凶豎之刃世人竒其英辯造次可觀而哂吕侯無對為陋不思安危終始之慮是樂春藻之繁華而忘秋實之甘口也昔魏人伐蜀蜀人禦之精嚴垂發而費禕方與來敏對棊意無厭倦敏以為必能辦賊言其明略内定貌無憂色也况長寧以為君子臨事而懼好謀而成蜀為蕞爾之國而方向大敵所規所圖唯守與戰何可矜已有餘晏然無戚斯乃禕性之寛簡不防細微卒為降人郭循所害豈非兆見於彼而禍成於此哉往聞長寧之甄文偉今覩元遜之逆吕侯二事體同皆足以為世鑒也恪至建業見吳主於卧内受詔牀下以大將軍領太子太傅孫􅀪領少傅詔有司諸事一統於恪惟殺生大事然後以聞為制羣官百司拜揖之儀各有品序又以㑹稽太守北海滕􅅌為太常􅅌吳主壻也十二月以光禄勲滎陽鄭沖為司空漢費禕還成都望氣者云都邑無宰相位乃復北屯漢夀是嵗漢尚書令吕乂卒以侍中陳祗守尚書令四年春正月癸卯以司馬師為大將軍吳主立故太子和為南陽王使居長沙仲姬子奮為齊王居武昌王夫人子休為琅邪王居虎林二月立皇后張氏大赦后故涼州刺史既之孫東莞太守緝之女也召緝拜光禄大夫吳人改元神鳳大赦吳潘后性剛戾吳主疾病后使人問孫􅀪以吕后稱制故事左右不勝其虐伺其昏睡縊殺之託言中惡後事泄坐死者六七人呉主病困召諸葛恪孫􅀪滕􅅌及將軍吕據侍中孫峻入卧内屬以後事夏四月吳主殂孫􅀪素與諸葛恪不平懼為恪所治祕不發喪欲矯詔誅恪孫峻以告恪恪請􅀪咨事於坐中殺之乃發喪諡吳主曰大皇帝太子亮即位大赦改元建興閏月以諸葛恪為太傅滕􅅌為衛將軍吕岱為大司馬恪乃命罷視聽息校官原逋責除闗稅崇恩澤衆莫不恱恪每出入百姓延頸思見其狀恪不欲諸王處濵江兵馬之地乃徙齊王奮於豫章琅邪王休於丹陽奮不肯徙又數越灋度恪為牋以遺奮曰帝王之尊與天同位是以家天下臣父兄􅄷讎有善不得不舉親戚有惡不得不誅所以承天理物先國後身蓋聖人立制百代不易之道也昔漢初興多王子弟至於太彊輙為不􅁤上則幾危社稷下則骨肉相殘其後懲戒以為大諱自光武以來諸王有制惟得自娛於宫内不得臨民干與政事其與交通皆有重禁遂以全安各保福祚此則前世得失之驗也大行皇帝覽古戒今防牙遏萌慮於千載是以寑疾之日分遣諸王各早就國詔策勤渠科禁嚴峻其所戒敕無所不至誠欲上安宗廟下全諸王使百丗國承無㐫國害家之悔也大王宐上惟太伯順父之志中念河閒獻王東海王彊恭順之節下存前世驕恣荒亂之王以為警戒而聞頃至武昌以來多違詔敕不拘制度擅發諸將兵治護宫室又左右常從有罪過者當以表聞公付有司而擅私殺事不明白中書楊融親受詔敕所當恭肅乃云正自不聽禁當如我何聞此之日小大驚怪莫不寒心里語曰明鑑所以照形古事所以知今大王宐深以魯王為戒改易其行戰戰兢兢盡禮朝廷如此則無求不得若棄忘先帝灋教懐輕慢之心臣下寧負大王不敢負先帝遺詔寧為大王所怨疾豈敢忘尊主之威而令詔敕不行於藩臣邪向使魯王早納忠直之言懐驚懼之慮則享祚無窮豈有滅亡之禍哉夫良藥苦口唯病者能甘之忠言逆耳唯達者能受之今者恪等慺慺欲為大王除危殆於萌牙廣福慶之基原是以不自知言至願䝉三思王得牋懼遂移南昌初吳大帝築東興隄以遏巢湖其後入宼淮南敗以内船遂廢不復治冬十月太傅恪㑹衆於東興更作大隄左右結山俠築兩城各留千人使將軍全端守西城都尉留略守東城引軍而還鎮東將軍諸葛誕言於大將軍師曰今因吳内侵使文舒逼江陵仲恭向武昌以羈吳之上流然後簡精卒攻其兩城比救至可大獲也是時征南大將軍王昶征東將軍胡遵鎮南將軍毌丘儉等各獻征吳之計朝廷以三征計異詔問尚書傅嘏嘏對曰議者或欲汎舟徑濟橫行江表或欲四道竝進攻其城壘或欲大佃疆場觀釁而動誠皆取賊之常計也然自治兵以來出入三載非掩襲之軍也賊之為宼幾六十年矣君臣相保吉凶共患又喪其元帥上下憂危設令列船津要堅城據險橫行之計其殆難捷今邊壤之守與賊相逺賊設羅落又特重宻閒諜不行耳目無聞夫軍無耳目校察未詳而舉大衆以臨巨險此為希幸徼功先戰而後求勝非全軍之長策也唯有進軍大佃最差完牢可詔昶遵等擇地居險審所錯置及令三方一時前守奪其肥壤使還塉土一也兵出民表冦鈔不犯二也招懐近路降附日至三也羅落逺設閒構不來四也賊退其守羅落必淺佃作易立五也坐食積榖士不運輸六也釁隙時聞討襲速决七也凡此七者軍事之急務也不據則賊擅便資據之則利歸於國不可不察也夫屯壘相偪形勢已交智勇得陳巧拙得用策之而知得失之計角之而知有餘不足虜之情偽將焉所逃夫以小敵大則役煩力竭以貧敵富則歛重財匱故曰敵逸能勞之飽能饑之此之謂也司馬師不從十一月詔王昶等三道擊吳十二月王昶攻南郡毌丘儉向武昌胡遵諸葛誕率衆七萬攻東興甲寅吳太傅恪將兵四萬晨夜兼行救東興胡遵等敕諸軍作浮橋以度陳於坻上分兵攻兩城城在髙峻不可卒拔諸葛恪使冠軍將軍丁奉與吕據留賛唐咨為前部從山西上奉謂諸將曰今諸軍行緩若賊據便地則難以爭鋒我請趨之乃辟諸軍使下道奉自率麾下三千人徑進時北風奉舉㠶二日即至東闗遂據徐塘時天雪寒胡遵等方置酒髙㑹奉見其前部兵少謂其下曰取封侯爵賞正在今日乃使兵皆解鎧去矛㦸但兠鍪刀楯倮身縁堨魏人望見大笑之不即嚴兵吳兵得上便鼓譟斫破魏前屯吕據等繼至魏軍驚擾散走爭渡浮橋橋壊絶自投於水更相蹈藉前部督韓綜樂安太守桓嘉等皆沒死者數萬綜故吳叛將數為吳害吳大帝常切齒恨之諸葛恪命送其首以白大帝廟獲車乘牛馬騾驢各以千數資器山積振旅而歸初漢姜維宼西平獲中郎郭偱漢人以為左將軍偱欲刺漢主不得親近每因上夀且拜且前為左右所遏事輙不果資治通鑑卷第七十五
