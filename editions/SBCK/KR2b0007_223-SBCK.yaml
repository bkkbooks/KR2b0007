body:
  text: 臣司馬光奉敇編集唐紀三十九大荒落十月凡二年有竒起昭陽單閼七月盡旃蒙代宗睿文孝武皇帝上之下廣徳元年秋七月壬寅羣臣上尊號曰寳應元聖文武孝皇帝壬子赦天下改元諸將討史朝義者進官階加爵邑有差冊回紇可汗為頡咄登蜜施合俱錄英義建功毗伽可汗可敦為娑墨光親麗華毗伽可敦左右殺以下皆加封賞戊辰楊綰上貢舉條目秀才問經義二十條對策五道國子監舉人令博士薦於祭酒祭酒試通者升之於省如鄉貢法明法委刑部考試或以為明經進士行之已久不可遽改事雖不行識者是之以僕固瑒為朔方行營節度使吐蕃入大震闗陷蘭廓河鄯洮岷秦成渭等州盡取河西隴右之地唐自武徳以來開拓邊境地連西域皆置都督府州縣開元中置朔方隴右河西安西北庭諸節度使以統之歲發山東丁壯為戍卒繒帛為軍資開屯田供糗糧設監牧畜馬牛軍城戍邏萬里相望及安祿山反邉兵精銳者皆徴發入援謂之行營所留兵單弱胡虜稍蠶食之數年間西北數十州相繼淪沒自鳯翔以西邠州以北皆為左袵矣初僕固懐恩受詔與回紇可汗相見於太原河東節度使辛雲京以可汗乃懐恩婿恐其合謀襲軍府閉城自守亦不犒帥及史朝義既平詔懐恩送可汗出塞往來過太原雲京亦閉城不與相聞懐恩怒具表其狀不報懐恩將朔方兵數萬屯汾州使其子御史大夫瑒將萬人屯榆次禆將李光逸等屯祁縣李懐光等屯晉州張維嶽等屯沁州懐光本勃海靺鞨也姓茹為朔方將以功賜姓中使駱奉仙至太原雲京厚結之為言懐恩與回紇連謀反狀已露奉仙還過懐恩懐恩與飲於母前母數讓奉仙曰汝與吾兒約為兄弟今又親雲京何兩面也酒酣懐恩起舞奉仙贈以纒頭綵懐恩欲酬之曰來日端午當更樂飲一日奉仙固請行懐恩匿其馬奉仙謂左右曰朝來責我又匿我馬將殺我也夜踰垣而走懐恩驚遽以其馬追還之八月癸未奉仙至長安奏懐恩謀反懐恩亦具奏其狀請誅雲京奉仙上兩無所問優詔和解之懐恩自以兵興以來所在力戰一門死王事者四十六人女嫁絶域說諭回紇再收兩京平定河南北功無與比而為人搆陷憤怨殊深上書自訟以為臣昨奉詔送可汗歸國傾竭家貲俾之上道行至山北雲京奉仙閉城不出祗迎仍令潜行竊盗回紇怨怒亟欲縱兵臣力為彌縫方得出塞雲京奉仙恐臣先有奏論遂復妄稱設備與李抱玉共相組織臣静而思之其罪有六昔同羅叛亂臣為先帝掃清河曲一也臣男玢為同羅所虜得閒亡歸臣斬之以令衆士二也臣有二女逺嫁外夷為國和親蕩平冦敵三也臣與男瑒不顧死亡為國效命四也河北新附節度使皆握強兵臣撫綏以安反側五也臣說諭回紇使赴急難天下既平送之歸國六也臣既負六罪誠合萬誅惟當吞恨九泉衘寃千古復何訴哉臣受恩至重夙夜思奉天顔但以來瑱受誅朝廷不示其罪諸道節度誰不疑懼近聞詔追數人盡皆不至實畏中官讒口虚受陛下誅夷豈唯羣臣不忠正為回邪在側且臣前後所奏駱奉仙詞情非不摭實陛下竟無處置寵任彌深皆由同類比周蒙蔽聖聽竊聞四方遣人奏事陛下皆云與驃騎議之曾不委宰相可否或稽留數月不還逺近益加疑阻如臣朔方將士功効最高為先帝中興主人乃陛下䝉塵故吏曽不别加優奬反信讒嫉之詞子儀先已被猜臣今又遭詆毁弓藏鳥盡信匪虚言陛下信其矯誣何殊指鹿為馬儻不納愚懇且貴因循臣實不敢保家陛下豈能安國忠言利行惟陛下圗之臣欲公然入朝恐將士留沮今託廵晉絳於彼遷延乞陛下特遣一介至絳州問臣臣即與之同發九月壬戌上遣裴遵慶詣懐恩諭㫖且察其去就懐恩見遵慶抱其足號泣訴寃遵慶為言聖恩優厚諷令入朝懐恩許諾副將范志誠以為不可曰公信其甘言入則為來瑱不復還矣明日懐恩見遵慶以懼死為辭請令一子入朝志誠又以為不可遵慶乃還御史大夫王翊使回紇還懐恩先與可汗往來恐翊洩其事遂留之吐蕃之􅀄入冦也邉將告急程元振皆不以聞冬十月吐蕃冦涇州刺史髙暉以城降之遂為之鄉導引吐蕃深入過邠州上始聞之辛未冦奉天武功京師震駭詔以雍王适為闗内元帥郭子儀為副元帥出鎮咸陽以禦之子儀閑廢日久部曲離散至是召募得二十騎而行至咸陽吐蕃帥吐谷渾党項氏羌二十餘萬衆彌漫數十里已自司竹園度渭循山而東子儀使判官中書舍人王延昌入奏請益兵程元振遏之竟不召見癸酉渭北行營兵馬使吕月將將精卒二千破吐蕃于盩厔之西乙亥吐蕃冦盩厔月將復與力戰兵盡為虜所擒上方治兵而吐蕃已度便橋倉猝不知所為丙子出幸陜州官吏藏竄六軍逃散郭子儀聞之遽自咸陽歸長安比至車駕已去上纔出苑門度滻水射生將王獻忠擁四百騎叛還長安脅豐王珙等十王西迎吐蕃遇子儀於開逺門内子儀叱之獻忠下馬謂子儀曰今主上東遷社稷無主令公身為元帥廢立在一言耳子儀未應珙越次言曰公何不言子儀責譲之以兵援送行在丁丑車駕至華州官吏奔散無復供擬扈從將士不免凍餒㑹觀軍容使魚朝恩將神策軍自陜來迎上乃幸朝恩營豐王珙見上於潼闗上不之責退至幕中有不遜語羣臣奏請誅之乃賜死戊寅吐蕃入長安髙暉與吐蕃大將馬重英等立故邠王守禮之孫廣武王承宏為帝改元置百官以前翰林學士于可封等為相吐蕃剽掠府庫市里焚閭舍長安中蕭然一空苖晉卿病卧家遣人輿入廹脅之晉卿閉口不言虜不敢殺於是六軍散者所在剽掠士民避亂皆入山谷辛巳上至陜百官稍有至者郭子儀引三十騎自御宿川循山而東謂王延昌曰六軍將士逃潰者多在啇州今速往收之并發武闗防兵數日間北出藍田以向長安吐蕃必遁過藍田遇元帥都虞侯臧希譲鳯翔節度使髙昇得兵近千人子儀與延昌謀曰潰兵至啇州官吏必逃匿而人亂使延昌自直徑入啇州撫諭之諸將方縱兵暴掠聞子儀至皆大喜聽命子儀恐吐蕃逼乗輿留軍七盤三日乃行比至啇州行收兵并武闗防兵合四千人軍勢稍振子儀乃泣諭將士以共雪國恥取長安皆感激受約束子儀請太子賔客第五琦為糧料使給軍食上賜子儀詔恐吐蕃東出潼闗徴子儀詣行在子儀表稱臣不收京城無以見陛下若出兵藍田虜必不敢東向上許之鄜坊節度判官叚秀實說節度使白孝徳引兵赴難孝徳即日大舉南趣京畿與蒲陜商華合勢進擊吐蕃既立廣武王承宏欲掠城中士女百工整衆歸國子儀使左羽林大將軍長孫全緒將二百騎出藍田觀虜勢令第五琦攝京兆尹與之偕行又令寳應軍使張知節將兵繼之全緒至韓公堆晝則擊鼔張旗幟夜則多然火以疑吐蕃前光禄卿殷仲卿聚衆近千人保藍田與全緒相表裏帥二百餘騎直度滻水吐蕃懼百姓又紿之曰郭令公自啇州將大軍不知其數至矣虜以為然稍稍引軍去全緒又使射生將王甫入城隂結少年數百夜擊鼔大呼於朱雀街吐蕃惶駭庚寅悉衆遁去高暉聞之帥麾下三百餘騎東走至潼闗守將李日越擒而殺之壬辰詔以元載判元帥行軍司馬以第五琦為京兆尹癸巳以郭子儀為西京留守甲午子儀發啇州己亥以魚朝恩部將皇甫溫為陜州刺史周智光為華州刺史驃騎大將軍判元帥行軍司馬程元振專權自恣人畏之甚於李輔國諸將有大功者元振皆忌疾欲害之吐蕃入冦元振不以時奏致上狼狽出幸上發詔徴諸道兵李光弼等皆忌元振居中莫有至者中外咸切齒而莫敢發言太常博士栁伉上疏以為犬戎犯闗度隴不血刃而入京師劫宫闈焚陵寢武士無一人力戰者此將帥叛陛下也陛下疏元功委近習日引月長以成大禍羣臣在廷無一人犯顔回慮者此公卿叛陛下也陛下始出都百姓填然奪府庫相殺戮此三輔叛陛下也自十月朔召諸道兵盡四十日無隻輪入闗此四方叛陛下也内外離叛陛下以今日之勢為安邪危邪若以為危豈得髙枕不為天下討罪人乎臣聞良醫療疾當病飲藥藥不當病猶無益也陛下視今日之病何繇至此乎必欲存宗廟社稷獨斬元振首馳告天下悉出内使􅀠諸州持神策兵付大臣然後削尊號下詔引咎曰天下其許朕自新改過宜即募士西赴朝廷若以朕惡未悛則帝王大器敢妨聖賢其聽天下所往如此而兵不至人不感天下不服臣請闔門寸斬以謝陛下上以元振嘗有保䕶功十一月辛丑削元振官爵放歸田里王甫自稱京兆尹聚衆二千餘人署置官屬暴横長安中壬寅郭子儀至滻水西甫按兵不出或謂子儀城不可入子儀不聽引三十騎徐進使人傳呼召甫甫失據出迎拜伏子儀斬之其兵盡散白孝徳與邠寜節度使張藴琦將兵屯畿縣子儀召之入城京畿遂安宦官廣州市舶使吕太一發兵作亂節度使張休弃城奔端州太一縱兵焚掠官軍討平之吐蕃還至鳯翔節度使孫志直閉城拒守吐蕃圍之數日鎮西節度使馬璘聞車駕幸陜將精騎千餘自河西入赴難轉鬬至鳯翔值吐蕃圍城璘帥衆持滿外向突入城中不解甲背城出戰單騎先士卒奮擊俘斬千計而歸明日虜復逼城請戰璘開懸門以待之虜引退曰此將軍不惜死宜避之遂去居於原㑹成渭之地十二月丁亥車駕發陜州左丞顔真卿請上先謁陵廟然後還宫元載不從真卿怒曰朝廷豈堪相公再壊邪載由是衘之甲午上至長安郭子儀帥城中百官及諸軍迎於滻水東伏地待罪上勞之曰用卿不早故及於此以魚朝恩為天下觀軍容宣慰處置使揔禁兵權寵無比築城於鄠縣及中渭橋屯兵以備吐蕃以駱奉仙為鄠縣築城使遂將其兵乙未以苖晉卿為太保裴遵慶為太子少傅並罷政事以宗正卿李峴為黄門侍郎同平章事遵慶既去元載權益盛以貨結内侍董秀使主書卓英倩潜與往來上意所屬載必先知之承意探微言無不合上以是愈愛之英倩金州人也吐蕃既去廣武王承宏逃匿草野上赦不誅丙申放之於華州程元振既得罪歸三原聞上還宫衣婦人服私入長安復規任用京兆府擒之以聞吐蕃陷松維保三州及雲山新築二城西川節度使髙適不能救於是劒南西山諸州亦入於吐蕃矣二年春正月壬寅敇稱程元振變服潜行將圗不軌長流溱州上念元振之功尋復令於江陵安置癸卯合劒南東西川為一道以黃門侍郎嚴武為節度使丙午遣檢校刑部尚書顔真卿宣慰朔方行營上之在陜也真卿請奉詔召僕固懐恩上不許至是上命真卿說諭懐恩入朝對曰陛下在陜臣往以忠義責之使之赴難彼猶有可來之理今陛下還宫彼進不成勤王退不能釋衆召之庸肯至乎且言懐恩反者獨辛雲京駱奉仙李抱玉魚朝恩四人耳自外羣臣皆言其枉陛下不若以郭子儀代懐恩可不戰而服也時汾州别駕李抱真抱玉之從父弟也知懐恩有異志脫身歸京師上方以懐恩為憂召見抱真問計對曰此不足憂也朔方將士思郭子儀如子弟之思父兄懐恩欺其衆云郭子儀已為魚朝恩所殺衆信之故為其用耳陛下誠以子儀領朔方彼皆不召而來耳上然之甲寅禮儀使杜鴻漸奏自今祀圎丘方丘請以太祖配祈榖以髙祖配太雩以太宗配明堂以肅宗配從之乙卯立雍王适為太子吐蕃之入長安也諸軍亡卒及鄉曲無頼子弟相聚為盗吐蕃既去猶竄伏南山子午等五谷所在為患丁巳以太子賔客薛景仙為南山五谷防禦使以討之魏博節度使田承嗣奏名所管曰天雄軍從之僕固懐恩既不為朝廷所用遂與河東都將李竭誠潜謀取太原辛雲京覺之殺竭誠乗城設備懐恩使其子瑒將兵攻之雲京出與戰瑒大敗而還遂引兵圍榆次上謂郭子儀曰懐恩父子負朕實深聞朔方將士思公如枯旱之望雨公為朕鎮撫河東汾上之師必不為變戊午以子儀為闗内河東副元帥河中節度等使懐恩將士聞之皆曰吾輩從懐恩為不義何面目見汾陽王癸亥以劉晏爲太子賔客李峴爲詹事並罷政事晏坐與程元振交通元振獲罪峴有力焉由是爲宦官所疾故與晏皆罷以右散騎常侍王縉爲黃門侍郎太常卿杜鴻漸爲兵部侍郎並同平章事丁卯以郭子儀爲朔方節度大使二月子儀至河中雲南子弟萬人戍河中將貪卒暴爲一府患子儀斬十四人杖三十人府中遂安癸酉上朝獻太清宫甲戌享太廟乙亥祀昊天上帝於圎丘僕固瑒圍榆次旬餘不㧞遣使急發祁縣兵李光逸盡與之士卒未食行不能前十將白玉焦暉以鳴鏑射其後者軍士曰將軍何乃射人玉曰今從人反終不免死死一也射之何傷至榆次瑒責其遲胡人曰我乗馬乃漢卒不行耳瑒捶漢卒卒皆怨怒曰節度使黨胡人其夕焦暉白玉帥衆攻瑒殺之僕固懐恩聞之入告其母母曰吾語汝勿反國家待汝不薄今衆心既變禍必及我將如之何懐恩不對再拜而出母提刀逐之曰吾為國家殺此賊取其心以謝三軍懐恩疾走得免遂與麾下三百度河北走時朔方將渾釋之守靈州懐恩檄至云全軍歸鎮釋之曰不然此必衆潰矣將拒之其甥張韶曰彼或翻然改圗以衆歸鎮何可不納也釋之疑未决懐恩行速先􅀱者而至釋之不得已納之張韶以其謀告懐恩懐恩以韶為閒殺釋之而收其軍使韶主之既而曰釋之舅也彼尚負之安有忠於我哉他日以事杖之折其脛寘於彌峩城而死都虞侯張維嶽在沁州聞懐恩去乗傳至汾州撫定其衆殺焦暉白玉而竊其功以告郭子儀子儀使牙官盧諒至汾州維嶽賂諒使實其言子儀奏維嶽殺瑒傳首詣闕羣臣入賀上惨然不恱曰朕信不及人致勲臣顛越深用為愧又何賀焉命輦懐恩母至長安給待優厚月餘以壽終以禮葬之功臣皆感歎戊寅郭子儀如汾州懐恩之衆數萬悉歸之咸鼔舞涕泣喜其來而悲其晩也子儀知盧諒之詐杖殺之上以李抱真言有驗遷殿中少監上之幸陜也李光弼竟遷延不至上恐遂成嫌隙其母在河中數遣中使存問之吐蕃退除光弼東都留守以察其去就光弼辭以就江淮糧運引兵歸徐州上迎其母至長安厚加供給使其弟光進掌禁兵遇之加厚戊子赦天下自䘮亂以來汴水堙廢漕運者自江漢抵梁洋迃險勞費三月已酉以太子賔客劉晏為河南江淮以來轉運使議開汴水庚戌又命晏與諸道節度使均節賦役聽從便宜行畢以聞時兵火之後中外艱食關中米斗千錢百姓挼穗以給禁軍宫厨無兼時之積晏乃疏浚汴水遺元載書具陳漕運利病令中外相應自是每歲運米數十萬石以給闗中唐世稱漕運之能者推晏為首後來者皆遵其法度云甲子盛王琦薨党項冦同州郭子儀使開府儀同三司李國臣擊之曰虜得閒則出掠官軍至則逃入山宜使羸師居前以誘之勁騎居後以覆之國臣與戰於澄城北大破之斬首捕虜千餘人夏五月癸丑初行五紀曆庚申禮部侍郎楊綰奏歲貢孝弟力田無實狀及童子科皆僥倖悉罷之郭子儀以安史昔據洛陽故諸道置節度使以制其要衝今大盗已平而所在聚兵耗蠧百姓表請罷之仍自河中爲始六月庚辰敇罷河中節度及耀徳軍子儀復請罷闗内副元帥不許僕固懐恩至靈武收合散亡其衆復振上厚撫其家癸未下詔稱其勲勞著於帝室及於天下疑隙之端起自羣小察其深􅂨本無它志君臣之義情實如初但以河北既平朔方已有所屬宜解河北副元帥朔方節度等使其太保兼中書令大寜郡王如故但當詣闕更勿有疑懐恩竟不從秋七月庚子稅天下青苖錢以給百官俸太尉兼侍中河南副元帥臨淮武穆王李光弼治軍嚴重指顧號令諸將莫敢仰視謀定而後戰能以少制衆與郭子儀齊名及在徐州擁兵不朝諸將田神功等不復禀畏光弼愧恨成疾己酉薨八月丙寅以王縉代光弼都綂河南淮西山南東道諸行營郭子儀自河中入朝㑹涇原奏僕固懐恩引回紇吐蕃十萬衆將入冦京師震駭詔子儀帥諸將出鎮奉天上召問方略對曰懐恩無能為也上曰何故對曰懐恩勇而少恩士心不附所以能入宼者因思歸之士耳懐恩本臣偏禆其麾下皆臣部曲必不忍以鋒刃相向以此知其無能為也辛巳子儀發赴奉天甲午加王縉東都留守河中尹兼節度副使崔寓發鎮兵西禦吐蕃為法不一九月丙申鎮兵作亂掠官府及居民終夕乃定丙午加河東節度使辛雲京同平章事辛亥以郭子儀充北道邠寜涇原河西以來通和吐蕃使以陳鄭澤潞節度使李抱玉充南道通和吐蕃使子儀聞吐蕃逼邠州甲寅遣其子朔方兵馬使晞將兵萬人救之己未劒南節度使嚴武破吐蕃七萬衆㧞當狗城闗中蟲蝗霖雨米斗千餘錢僕固懐恩前軍至宜禄郭子儀使右兵馬使李國臣將兵為郭晞後繼邠寜節度使白孝徳敗吐蕃于宜禄冬十月懐恩引回紇吐蕃至邠州白孝徳郭晞閉城拒守庚午嚴武㧞吐蕃鹽川城僕固懐恩與回紇吐蕃進逼奉天京師戒嚴諸將請戰郭子儀不許曰虜深入吾地利於速戰吾堅壁以待之彼以吾為怯必不戒乃可破也若遽戰而不利則衆心離矣敢言戰者斬辛未夜子儀出陳於乾陵之南壬申未明虜衆大至虜始以子儀為無備欲襲之忽見大軍驚愕遂不戰而退子儀使禆將李懐光等將五千騎追虜至麻亭而還虜至邠州丁丑攻之不克乙酉虜涉涇而遁懐恩之南冦也河西節度使楊志烈發卒五千謂監軍柏文達曰河西銳卒盡於此矣君將之以攻靈武則懐恩有返顧之慮此亦救京師之一奇也文達遂將其衆擊摧砂堡靈武縣皆下之進攻靈州懐恩聞之自永夀遽歸使蕃渾二千騎夜襲文達大破之士卒死者殆半文逹將餘衆歸凉州哭而入志烈迎之曰此行有安京室之功卒死何傷士卒怨其言未幾吐蕃圍涼州士卒不為用志烈奔甘州為沙陁所殺涼州遂陷沙陁者姓朱耶世居沙陁磧因以為名十一月丁未郭子儀自行營入朝郭晞在邠州縱士卒為暴節度使白孝徳患之以子儀故不敢言涇州刺史叚秀實自請補都虞候孝徳從之既署一月晞軍士十七人入市取酒以刃刺酒翁壊釀器秀實列卒取十七人首庄槊上植市門晞一營大譟盡甲孝徳震恐召秀實曰奈何秀實曰無傷也請往解之孝徳使數十人從行秀實盡辭去選老躄者一人持馬至晞門下甲者出秀實笑且入曰殺一老卒何甲也吾戴吾頭來矣甲者愕因諭曰尚書負若屬邪副元帥負若屬邪奈何欲以亂敗郭氏晞出秀實讓之曰副元帥勲塞天地當念始終今尚書恣卒為暴行且致亂亂則罪及副元帥亂由尚書出然則郭氏功名其存者幾何言未畢晞再拜曰公幸教晞以道恩甚大敢不從命顧叱左右皆解甲散還火伍中敢譁者死秀實因留宿軍中晞通夕不解衣戒候卒擊柝衛秀實旦俱至孝徳所謝不能請改邠州由是無患五谷防禦使薛景仙討南山羣盗連月不克上命李抱玉討之賊帥高玉最彊抱玉遣兵馬使李崇客將四百騎自洋州入襲之於桃虢川大破之玉走成固庚申山南西道節度使張獻誠擒玉獻之餘盗皆平十二月乙丑加郭子儀尚書令子儀以為自太宗為此官累聖不復置近皇太子亦嘗為之非微臣所宜當固辭不受還鎮河中是歲户部奏户二百九十餘萬口一千六百九十餘萬上遣于闐王勝還國勝固請留宿衛以國授其弟曜上許之加勝開府儀同三司賜爵武都王永泰元年春正月癸卯朔改元赦天下戊申加東鄭澤潞節度使李抱玉鳯翔隴右節度使以其從弟殿中少監抱真為澤潞節度副使抱真以山東有變上黨為兵衝而荒亂之餘土瘠民困無以贍軍乃籍民每三丁選一壯者免其租徭給弓矢使農隙習射歲暮都試行其賞罰比三年得精兵二萬既不費廪給府庫充實遂雄視山東由是天下稱澤潞步兵為諸道最二月戊寅党項冦富平焚定陵殿庚辰儀王璲薨三月壬辰朔命左僕射裴冕右僕射郭英乂等文武之臣十三人於集賢殿待制左拾遺洛陽獨孤及上疏曰陛下召冕等待制以備詢問此五帝盛徳也頃者陛下雖容其直而不録其言有容下之名無聽諫之實遂使諫者稍稍鉗口飽食相招爲禄仕此忠鯁之人所以竊歎而臣亦恥之今師興不息十年矣人之生産空於杼軸擁兵者第館亘街陌奴婢厭酒肉而貧人羸餓就役剥膚及髓長安城中白晝椎剽吏不敢詰官亂職廢將墮卒暴百揆隳刺如沸粥紛麻民不敢訴於有司有司不敢聞於陛下茹毒飲痛窮而無告陛下不以此時思所以救之之術臣實懼焉今天下惟朔方隴西有吐蕃僕固之虞邠涇鳯翔之兵足以當之矣自此而往東洎海南至畨禺西盡巴蜀無鼠竊之盗而兵不爲解傾天下之貨竭天下之榖以給不用之軍臣不知其故假令居安思危自可扼要害之地俾置屯禦悉休其餘以糧儲屝屨之資充疲人貢賦歲可減國租之半陛下豈可持疑於改作使率土之患日甚一日乎上不能用丙午以李抱玉同平章事鎮鳯翔如故庚戌吐蕃遣使請和詔元載杜鴻漸與盟於興唐寺上問郭子儀吐蕃請盟何如對曰吐蕃利我不虞若不虞而來國不可守矣乃相繼遣河中兵戍奉天又遣兵廵涇原以覘之是春不雨米斗千錢夏四月丁丑命御史大夫王翊充諸道稅錢使河東道租庸鹽鐵使裴諝入奏事上問􅅦酤之利歲入幾何諝久之不對上復問之對曰臣自河東來所過見菽粟未種農夫愁怨臣以為陛下見臣必先問人之疾苦乃責臣以營利臣是以未敢對也上謝之拜左司郎中諝寛之子也辛卯劒南節度使嚴武薨武三鎮劒南厚賦歛以窮奢侈梓州刺史章彛小不副意召而杖殺之然吐蕃畏之不敢犯其境母數戒其驕暴武不從及死母曰吾今始免為官婢矣五月癸丑以右僕射郭英乂為劒南節度使畿内麥稔京兆尹第五琦請稅百姓田十畒收其一曰此古什一之法也上從之平盧節度使侯希逸鎮淄青好游畋營塔寺軍州苦之兵馬使李懐玉得衆心希逸忌之因事解其軍職希逸與巫宿於城外軍士閉門不納奉懐玉為帥希逸奔滑州上表待罪詔赦之召還京師秋七月壬辰以鄭王邈為平盧淄青節度大使以懐玉知留後賜名正已時成徳節度使李寳臣魏博節度使田承嗣相衛節度使薛嵩盧龍節度使李懐仙收安史餘黨各擁勁卒數萬治兵完城自署文武將吏不供貢賦與山南東道節度使梁崇義及正已皆結為昬姻互相表裏朝廷專事姑息不能復制雖名藩臣羈縻而已甲午以上女昇平公主嫁郭子儀之子曖太子母沈氏呉興人也安禄山之陷長安也掠送洛陽宫上克洛陽見之未及迎歸長安㑹史思明再陷洛陽遂失所在上即位遣使散求之不獲己亥夀州崇善寺尼廣澄詐稱太子母按驗乃故少陽院乳母也鞭殺之九月庚寅朔置百高座於資聖西明兩寺講仁王經内出經二寳輿以人為菩薩鬼神之狀導以音樂鹵簿百官迎於光順門外從至寺僕固懐恩誘回紇吐蕃吐谷渾党項奴刺數十萬衆俱入宼令吐蕃大將尚結悉賛磨馬重英等自北道趣奉天党項帥任敷鄭庭郝徳等自東道趣同州吐谷渾奴刺之衆自西道趣盩厔回紇繼吐蕃之後懐恩又以朔方兵繼之郭子儀使行軍司馬趙復入奏曰虜皆騎兵其來如飛不可易也請使諸道節度使鳯翔李抱玉滑濮李光庭邠寜白孝徳鎮西馬璘河南郝庭玉淮西李忠臣各出兵以阨其衝要上從之諸道多不時出兵李忠臣方與諸將擊毬得詔亟命治行諸將及監軍皆曰師行必擇日忠臣怒曰父母有急豈可擇日而後救邪即日勒兵就道懐恩中塗遇暴疾而歸丁酉死於鳴沙大將張韶代領其衆别將徐璜玉殺之范志誠又殺璜玉而領其衆懐恩拒命三年再引胡冦為國大患上猶為之隠前後制敕未嘗言其反及聞其死憫然曰懐恩不反為左右所誤耳吐蕃至邠州白孝徳嬰城自守甲辰上命宰相及諸司長官於西明寺行香設素饌奏樂是日吐蕃十萬衆至奉天京城震恐朔方兵馬使渾瑊討擊使白元光先戍奉天虜始列營瑊帥驍騎二百直衝之身先士卒虜衆披靡瑊挾虜將一人躍馬而還從騎無中鋒鏑者城上士卒望之勇氣始振乙巳吐蕃進攻之虜死傷甚衆數日斂衆還營瑊夜引兵襲之殺千餘人前後與虜戰二百餘合斬首五千級丙午罷百高座講召郭子儀於河中使屯涇陽己酉命李忠臣屯東渭橋李光進屯雲陽馬璘郝庭玉屯便橋李抱玉屯鳯翔内侍駱奉仙將軍李日越屯盩厔同華節度使周智光屯同州鄜坊節度使杜冕屯坊州上自將六軍屯苑中庚戌下制親征辛亥魚朝恩請索城中括士民私馬令城中男子皆衣皁團結為兵城門皆塞二開一士民大駭踰垣鑿竇而逃者甚衆吏不能禁朝恩欲奉上幸河中以避吐蕃恐羣臣論議不一一旦百官入朝立班久之閤門不開朝恩忽從禁軍十餘人操白刃而出宣言吐蕃數犯郊畿車駕欲幸河中何如公卿皆錯愕不知所對有劉給事者獨出班抗聲曰敕使反邪今屯軍如雲不勠力扞冦而遽欲脅天子弃宗廟社稷而去非反而何朝恩驚沮而退事遂寢自丙午至甲寅大雨不止故虜不能進吐蕃移兵攻醴泉党項西掠白水東侵蒲津丁巳吐蕃大掠男女數萬而去所過焚廬舍蹂禾稼殆盡周智光引兵邀擊破之於澄城因逐北至鄜州智光素與杜冕不協遂殺鄜州刺史張麟阬冕家屬八十一人焚坊州廬舍三千餘家冬十月己未復講經於資聖寺吐蕃退至邠州遇回紇復相與入冦辛酉至奉天癸亥党項焚同州官廨民居而去丙寅回紇吐蕃合兵圍涇陽子儀命諸將嚴設守備而不戰及暮二虜退屯北原丁卯復至城下是時回紇與吐蕃聞僕固懐恩死已争長不相睦分營而居子儀知之回紇在城西子儀使牙將李光瓚等往說之欲與之共擊吐蕃回紇不信曰郭公固在此乎汝紿我耳若果在此可得見乎光瓚還報子儀曰今衆寡不敵難以力勝昔與回紇契約甚厚不若挺身往說之可不戰而下也諸將請選鐵騎五百為衛從子儀曰此適足為害也郭晞扣馬諫曰彼虎狼也大人國之元帥奈何以身為虜餌子儀曰今戰則父子俱死而國家危往以至誠與之言或幸而見從則四海之福也不然則身沒而家全以鞭擊其手曰去遂與數騎開門而出使人傳呼曰令公來回紇大驚其大帥合胡禄都督藥葛羅可汗之弟也執弓注矢立於陣前子儀免胄釋甲投槍而進回紇諸酋長相顧曰是也皆下馬羅拜子儀亦下馬前執藥葛羅手讓之曰汝回紇有大功於唐唐之報汝亦不薄奈何負約深入吾地侵逼畿縣弃前功結怨仇背恩徳而助叛臣何其愚也且懐恩叛君弃母於汝國何有今吾挺身而來聽汝執我殺之我之將士必致死與汝戰矣藥葛羅曰懐恩欺我言天可汗已晏駕令公亦捐館中國無主我是以敢與之來今知天可汗在上都令公復揔兵於此懐恩又為天所殺我曹豈肯與令公戰乎子儀因說之曰吐蕃無道乗我國有亂不顧舅甥之親吞噬我邊鄙焚蕩我畿甸其所掠之財不可勝載馬牛雜畜長數百里彌漫在野此天以賜汝也全師而繼好破敵以取富為汝計孰便於此不可失也藥葛羅曰吾為懐恩所誤負公誠深今請為公盡力擊吐蕃以謝過然懐恩之子可敦兄弟也願捨之勿殺子儀許之回紇觀者左右為兩翼稍前子儀麾下亦進子儀揮手却之因取酒與其酋長共飲藥葛羅使子儀先執酒為誓子儀酹地曰大唐天子萬歲回紇可汗亦萬歲兩國將相亦萬歲有負約者身隕陳前家族滅絶盃至藥葛羅亦酹地曰如令公誓於是諸酋長皆大喜曰曏以二巫師從軍巫言此行甚安隠不與唐戰見一大人而還今果然矣子儀遺之綵三千匹酋長分以賞巫子儀竟與定約而還吐蕃聞之夜引兵遁去回紇遣其酋長石野那等六人入見天子藥葛羅帥衆追吐蕃子儀使白元光帥精騎與之俱癸酉戰於靈臺西原大破之殺吐蕃萬計得所掠士女四千人丙子又破之於涇州東丁丑僕固懐恩將張休藏等降辛巳詔罷親征京城解嚴初肅宗以陜西節度使郭英乂領神策軍使内侍魚朝恩監其軍英乂入為僕射朝恩專將之及上幸陜朝恩舉在陜兵與神策軍迎扈悉號神策軍天子幸其營及京師平朝恩遂以軍歸禁中自將之然尚未得與北軍齒至是朝恩以神策軍從上屯苑中其勢寖盛分為左右廂居北軍之右矣郭子儀以僕固名臣李建忠等皆懐恩驍將恐逃入外夷請招之名臣懐恩之姪也時在回紇營上敕并舊將有功者皆赦其罪令回紇送之壬午名臣以千餘騎來降子儀使開府儀同三司慕容休貞以書諭党項帥鄭庭郝徳等皆詣鳯翔降甲申周智光詣闕獻㨗再宿歸鎮智光負專殺之罪未治上既遣而悔之乙酉回紇胡禄都督等二百餘人入見前後贈賚繒帛十萬匹府藏空竭稅百官俸以給之資治通鑑卷第二百二十三
