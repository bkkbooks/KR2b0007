front:
  text: 司索牧犍家得所匿物魏主大怒賜沮渠昭儀死并誅其宗族唯沮渠祖以先降得免又有告牧犍猶與故臣民交通謀反者三月魏主遣崔浩就第賜牧犍死諡曰哀王魏人徙定州丁零三千家於平城六月魏西征諸將扶風公處真等八人坐盗没軍資及虜掠􅂍各千萬計並斬之初上以貨重物輕改鑄四銖錢民多翦鑿古錢取銅盜鑄上患之録尚書事江夏王義恭建議請以大錢一當兩右僕射何尚之議曰夫泉貝之興以估貨爲本事存交易豈假多鑄數少則弊重數多則物重多少雖異濟用不殊況復以一當兩徒崇虛價者邪􅀂今制遂行富人之貲自倍貧者彌増其困懼非所以使之均壹也上卒從義恭議秋八月乙未徐州刺史衡陽文王義季卒義季自彭城王義康之貶遂縱酒不事事帝以書誚責且戒之義季猶酣飲自􅀂以至成疾而終魏樂安宣王範卒冬十月壬午胡藩之子誕丗殺豫章太守􅁊隆之據郡反欲奉前彭城王義康爲主前交州刺史檀和之去官歸過豫章擊斬之十一月甲寅封皇子渾爲汝隂王十二月魏晉王伏羅卒楊文德據葭蘆城招誘氐羌武都等五郡氐皆應之二十五年春正月魏仇池鎮將皮豹子帥諸軍擊之文德兵敗弃城奔漢中豹子収其妻子僚屬軍資及楊保宗所尚魏公主而還初保宗將叛公主勸之或曰奈何叛父母之國公主曰事成爲一國之母豈比小縣公主哉魏主賜之死楊文德坐失守免官削爵土二月癸卯魏主如定州罷塞圍役者遂如上黨誅潞縣叛民二千餘家徙河西離石民五千餘家于平城閏月己酉帝大蒐于宣武􅂣􅀄劉湛既誅􅁃炳之遂見寵任累遷吏部尚書勢傾朝野炳之無文學性彊急輕淺既居選部好詬詈賔客且多納貨賂士大夫皆惡之炳之留令史二人宿於私宅爲有司所糾上薄其過欲不問僕射何尚之因極陳炳之之短曰炳之見人有燭盤佳驢無不乞匄選用不平不可一二交結朋黨構扇是非亂俗傷風過於范曄所少賊一事耳縱不加罪故宜出之上欲以炳之爲丹楊尹尚之曰炳之蹈罪負恩方復有尹京赫赫之授乃更成其形勢也古人云無賞無罰雖堯舜不能爲治臣昔啟范曄亦懼犯顔苟曰愚懐九死不悔歴觀古今未有衆過藉藉受貨數百萬更得髙官厚禄如炳之者也上乃免炳之官以徐湛之爲丹楊尹
