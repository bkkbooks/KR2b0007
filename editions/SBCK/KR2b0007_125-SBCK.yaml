body:
  text: 彭城太守王玄謨上言彭城要兼水陸請以皇子撫臨州事夏四月乙卯以武陵王駿爲安比將軍徐州剌史五月甲戌魏以交阯公韓拔爲鄯善王鎮鄯善賦役其民比之郡縣當兩大錢行之經時公私不以爲便己卯罷之六月丙寅荆州刺史南譙王義宣進位司空辛酉魏主如廣德宫秋八月甲子封皇子彧爲淮陽王西域般恱國去平城萬有餘里遣使詣魏請與魏東西合擊柔然魏主許之中外戒嚴九月辛未以尚書右僕射何尚之爲左僕射領軍將軍沈演之爲吏部尚書丙戌魏主如隂山魏成周公萬度歸擊焉耆大破之焉耆王鳩尸卑那奔􅀛兹魏主詔唐和與前部王車伊洛帥所部兵㑹度歸討西域和說降柳驢等六城因共擊波居羅城拔之冬十月辛丑魏弘農昭王奚斤卒子它觀襲魏主曰斤闗西之敗罪固當死朕以斤佐命先朝復其爵邑使得終天年君臣之分亦足矣乃降它觀爵爲公癸亥魏大赦十二月魏萬度歸自焉耆西討􅀛兹留唐和鎮焉耆桞驢戍主乙直伽謀叛和擊斬之由是諸胡咸附西域復平魏太子朝于行宫遂從伐柔然至受降城不見柔然因積糧於城内置戍而還二十六年春正月戊辰朔魏主饗群臣於漠南甲戌復伐柔然髙凉王那出東道略陽王羯兒出西道魏主與太子出涿邪山行數千里柔然處羅可汗恐懼逺遁二月己亥上如丹徒謁京陵三月丁巳大赦募諸州樂移者數千家以實京口庚寅魏主還平城夏五月壬午帝還建康庚寅魏主如隂山帝欲經略中原羣臣爭獻䇿以迎合取寵彭城太守王玄謨尤好進言帝謂侍臣曰觀玄謨所陳令人有封狼居須意御史中丞袁淑言於上曰陛下今當席卷趙魏檢玉岱宗臣逢千載之㑹願上封禪書上恱淑耽之曽孫也秋七月辛未以廣陵王誕爲雍州刺史上以襄陽外接関河欲廣其資力乃罷江州軍府文武悉配雍州湘州入臺租稅悉給襄陽九月魏主伐柔然髙凉王那出東道略陽王羯兒出中道柔然處羅可汗悉國内精兵圍那數十里那掘塹堅守相持數日處羅數挑戰輒爲那所敗以那衆少而堅疑大軍將至解圍夜去那引兵追之九日九夜處羅益懼棄輜重踰穹隆嶺逺遁那収其輜重引軍還與魏主㑹於廣澤略陽王羯兒収柔然民畜凡百餘萬自是柔然衰弱屏跡不敢犯魏塞冬十二月戊申魏主還平城沔北諸山蠻宼雍州建威將軍沈慶之帥後軍中兵參軍柳元景隨郡太守宗慤等二萬人討之八道俱進先是諸將討蠻者皆營於山下以迫之蠻得據山發矢石以擊官軍多不利慶之曰去嵗蠻田大稔積穀重巖不可與之曠日相守也不􅀂出其不意衝其腹心破之必矣乃命諸軍斬木登山鼓譟而前群蠻震恐因其恐而擊之所向奔潰二十七年春正月乙酉魏主如洛陽沈慶之自冬至春屢破雍州蠻因蠻所聚穀以充軍食前後斬首三千級虜二萬八千餘口降者二萬五千餘戸幸諸山大羊蠻慿險築城守禦甚固慶之擊之命諸軍連營於山中開門相通各穿池於營内朝夕不外汲頃之風甚蠻潜兵夜來燒營諸軍以池水沃火多出弓弩夾射之蠻兵散走蠻所據險固不可攻慶之乃置六戍以守之久之蠻食盡稍稍請降悉遷於建康以爲營戸魏主將入宼二月甲午大獵於梁川帝聞之敕淮泗諸郡􅀂魏宼小至則各堅守大至則拔民歸壽陽邉戍偵候不明辛亥魏主自將歩􅀐十萬奄至南頓太守鄭琨潁川太守郭道隠並弃城走是時豫州刺史南平王鑠鎮壽陽遣左軍行參軍陳憲行汝南郡事守懸瓠城中戰士不滿千人魏主圍之三月以軍興減内外百官俸三分之一魏人晝夜攻懸瓠多作髙樓臨城以射之矢下如雨城中負戸以汲施大鉤於衝車之端以牽樓堞壊其南城陳憲内設女墻外立木柵以拒之魏人填塹肉薄登城憲督厲將士苦戰積尸與城等魏人乗尸上城短兵相接憲銳氣愈奮戰士無不一當百殺傷萬計城中死者亦過半魏主遣永昌王仁將歩􅀐萬餘驅所掠六郡生口北屯汝陽時徐州刺史武陵王駿鎮彭城帝遣間使命駿發􅀐齎三日糧襲之駿􅀤百里内馬得千五百匹分爲五軍遣參軍劉泰之帥安北􅀐兵行參軍垣謙之田曹行參軍臧肇之集曹行叅軍尹定武陵左常侍杜幼文殿中將軍程天祚等將之直趨汝陽魏人唯慮救兵自壽陽來不備彭城丁酉泰之等潜進擊之殺三千餘人燒其輜重魏人奔散諸生口悉得東走魏人偵知泰之等兵無後繼復引兵擊之垣謙之先退士卒驚亂棄仗走泰之爲魏人所殺肇之溺死天祚爲魏所擒謙之定幼文及士卒免者九百餘人馬還者四百匹魏主攻懸瓠四十二日帝遣南平内史臧質詣壽陽與安蠻司馬劉康祖共將兵救懸瓠魏主遣殿中尚書任城公乞地眞逆拒之質等擊斬乞地眞康祖道錫之從兄也夏四月魏主引兵還癸卯至平城壬子安北將軍武陵王駿降號鎮軍將軍垣謙之伏誅尹定杜幼文付尚方以陳憲爲龍驤將軍汝南新蔡二郡太守魏主遺帝書曰前蓋吴反逆扇動闗隴彼復使人就而誘之丈夫遺以弓矢婦人遺以環釧是曹正欲譎誑取賂豈有逺相服從之理爲大丈夫何不自來取之而以貨誘我邉民募往者復除七年是賞姦也我今來至此土所得多少孰與彼前後得我民邪彼􅀂欲存劉氏血食者當割江以北輸之攝守南度如此當釋江南使彼居之不然可善敕方鎮刺史守宰嚴供帳之具來秋當往取楊州大勢已至終不相縱彼往日北通蠕蠕西結赫連沮渠吐谷渾東連馮弘髙麗凡此數國我皆滅之以此而觀彼豈能獨立蠕蠕吴提吐賀真皆已死我今北征先除有足之宼彼􅀂不從命來秋當復往取之以彼無足故不先討耳我往之日彼作何計為掘塹自守爲築垣以自障也我當顯然往取楊州不􅀂彼翳行竊歩也彼來偵諜我已擒之復縱還其人目所盡見委曲善問之彼前使裴方明取仇池既得之疾其勇功已不能容有臣如此尚殺之烏得與我校邪彼非我敵也彼常欲與我一交戰我亦不癡復非符堅何時與彼交戰晝則遣􅀐圍遶夜則離彼百里外宿吴人正有斫營伎彼募人以來不過行五十里天已明矣彼募人之首豈得不爲我有哉彼公時舊臣雖老猶有智䇿知今已殺盡豈非天資我邪取彼亦不須我兵刃此有善呪婆羅門當使􅀑縛以來耳侍中左衞將軍江湛遷吏部尚書湛性公廉與僕射徐湛之並爲上所寵信時稱江徐魏司徒崔浩自恃才略及魏主所寵任專制朝權嘗薦冀定相幽并五州之士數十人皆起家爲郡守太守晃曰先徴之人亦州郡之選也在職已久勤勞未荅宜先􅀘郡縣以新徴者代爲郎吏且守令治民宜得更事者浩固爭而遣之中書侍郎領著作郎髙允聞之謂東宫愽士管恬曰崔公其不免乎苟遂其非而校勝於上將何以堪之魏主以浩監袐書事使與髙允等共譔國記曰務從實録著作令史閔湛郗標性巧佞爲浩所寵信浩嘗注易及論語詩書湛標上䟽言馬鄭王賈不如浩之精微乞收境内諸書班浩所注令天下習業并求敕浩注禮傳令後生得觀正義浩亦薦湛標有著述才湛標又勸浩刋所譔國史于石以彰直筆髙允聞之謂著作郎宗欽曰湛標所營分寸之閒恐爲崔門萬丗之禍吾徒亦無噍類矣浩竟用湛標議刋石立於郊壇東方百歩用功三百萬浩書魏之先丗事皆詳實列於衢路往來見者咸以爲言北人無不忿恚相與譛浩於帝以爲暴揚國惡帝大怒使有司案浩及袐書郎吏等罪狀初遼東公翟黒子有寵於帝奉使并州受布千匹事覺黒子謀於髙允曰主上問我當以實告爲當諱之允曰公帷幄寵臣有罪首實庶或見原不可重爲欺罔也中書侍郎崔覽公孫質曰􅀂首實罪不可測不如諱之黒子怨允曰君奈何誘人就死地入見帝不以實對帝怒殺之帝使允授太子經及崔浩被收太子召允至東宫因留宿明旦與俱入朝至宫門謂允曰入見至尊吾自導卿脫至尊有問但依吾語允曰爲何等事也太子曰入自知之太子見帝言髙允小心慎宻且微賤制由崔浩請赦其死帝召允問曰國書皆浩所爲乎對曰太祖記前著作郎鄧淵所爲先帝記及今記臣與浩共爲之然浩所領事多揔裁而已至於著述臣多於浩帝怒曰允罪甚於浩何以得生太子懼曰天威嚴重允小臣迷亂失次耳臣曏問皆云浩所爲帝問允信如東宫所言乎對曰臣罪當滅族不敢虚妄殿下以臣侍講日久哀臣欲匄其生耳實不問臣臣亦無此言不敢迷亂帝顧謂太子曰直哉此人情所難而允能爲之臨死不易辭信也爲臣不欺君貞也宜特除其罪以旌之遂赦之於是召浩前臨誥之浩惶惑不能對允事事申明皆有條理帝命允爲詔誅浩及僚屬宗欽叚承根等下至僮吏凡百二十八人皆夷五族允持疑不爲帝頻使催切允乞更一見然後爲詔帝引使前允曰浩之所坐􅀂更有餘舋非臣敢知若直以觸犯罪不至死帝怒命武士執允太子爲之拜請帝意解乃曰無斯人當更有數千口死矣六月己亥詔誅清河崔氏與浩同宗者無逺近及浩姻家范陽盧氏太原郭氏河東柳氏並夷其族餘皆止誅其身縶浩置檻内送城南衞士數十人溲其上呼聲嗷嗷聞於行路宗欽臨刑歎曰髙允其殆聖乎它日大子讓允曰人亦當知機吾欲爲卿脫死既開端緒而卿終不從激怒帝如此毎念之使人心悸允曰夫史者所以記人主善惡爲將來勸戒故人主有所畏忌慎其舉措崔浩孤負聖恩以私欲没其廉絜愛憎蔽其公直此浩之責也至於書朝廷起居言國家得失此爲史之大體未爲多違臣與浩實同其事死生榮辱義無獨殊誠荷殿下再造之慈違心茍免非臣所願也太子動容稱歎允退謂人曰我不奉東宫指導者恐負翟黒子故也初冀州刺史崔賾武城男崔模與浩同宗而别族浩常輕侮之由是不睦及浩誅二家獨得免賾逞之子也辛丑魏主北廵隂山魏主既誅崔浩而悔之㑹北部尚書宣城公李孝伯病篤或傳已卒魏主悼之曰李宣城可惜既而曰朕失言崔司徒可惜李宣城可哀孝伯順之從父弟也自浩之誅軍國謀議皆出孝伯寵眷亞於浩初車師大帥車伊洛丗服於魏魏拜伊洛平西將軍封前部王伊洛將入朝沮渠無諱斷其路伊洛屢與無諱戰破之無諱卒弟安周奪其子乾壽兵伊洛遣人說乾壽乾壽遂帥其民五百餘家奔魏伊洛又說李寳弟欽等五十餘人下之皆送于魏伊洛西擊焉􅂄留其子歇守城沮渠安周引柔然兵閒道襲之攻拔其城歇走就伊洛共收餘衆保焉耆鎮遣使上書於魏主言爲沮渠氏所攻首尾八年百姓飢窮無以自存臣今棄國出奔得免者纔三分之一已至焉耆東境乞垂賑救魏主詔開焉耆倉以賑之吐谷渾王慕利延爲魏所逼上表求入保越嶲上許之慕利延竟不至上欲伐魏丹陽尹徐湛之吏部尚書江湛彭城太守王玄謨等並勸之左軍將軍劉康祖以爲嵗月已晚請待明年上曰北方苦虜虐政義徒並起頓兵一周沮向義之心不可太子歩兵校尉沈慶之諫曰我歩彼騎其勢不敵檀道濟再行無功到彦之失利而返今料王玄謨等未踰兩將六軍之盛不過往時恐重辱王師上曰王師再屈别自有由道濟養宼自資彦之中塗疾動虜所恃者唯馬今夏水浩汗河道流通㲹舟北下碻磝必走滑臺小戍易可覆拔克此二城館穀弔民虎牢洛陽自然不固比及冬初城守相接虜馬過河即成擒也慶之又固陳不可上使徐湛之江湛難之慶之曰治國譬如治家耕當問奴織當訪婢陛下今欲伐國而與白面書生輩謀之事何由濟上大笑太子劭及護軍將軍蕭思話亦諫上皆不從魏主聞上將北伐復與上書曰彼此和好日久而彼志無厭誘我邉民今春南廵聊省我民驅之使還今聞彼欲自來設能至中山及桑乾川随意而行來亦不迎去亦不送􅀂厭其區宇者可來平城居我亦徃楊州相與易地彼年已五十未嘗出戸雖自力而來如三嵗嬰兒與我鮮卑生長馬上者果如何哉更無餘物可以相與今送獵馬十二匹并氊藥等物彼來道逺馬力不足可乗或不服水土藥可自療也秋七月庚午詔曰虜近雖摧挫獸心靡革比得河朔秦雍華戎表䟽歸訴困棘跋望綏拯潜相糾結以候王師芮芮亦遣閒使逺輸誠􅅃誓爲掎角經略之㑹實在兹日可遣寧朔將軍王玄謨帥太子歩兵校尉沈慶之鎮軍諮議參軍申坦水軍入河受督於青冀二州刺史蕭斌太子左衞率臧質驍􅀐將軍王方回徑造許洛徐兖二州剌史武陵王駿豫州剌史南平王鑠各勒所部東西齊舉梁南北秦三州刺史劉秀之震盪汧隴太尉江夏王義恭出次彭城爲衆軍節度坦鍾之曽孫也是時軍旅大起王公妃主及朝士牧守下至富民各獻金帛雜物以助國用又以兵力不足悉發青冀徐豫二兖六州三五民丁倩使蹔行符到十日裝束縁江五郡集廣陵縁淮三郡集盱眙又募中外有馬歩衆藝武力之士應科者皆加厚賞有司又奏軍用不充楊南徐兖江四州富民家貲滿五十萬僧尼滿二十萬並四分借一事息即還建武司馬申元吉引兵趣碻磝乙亥魏濟州刺史王買德棄城走蕭斌遣將軍崔猛攻樂安魏青州刺史張淮之亦棄城走斌與沈慶之留守碻磝使王玄謨進圍滑臺雍州刺史隨王誕遣中兵參軍柳元景振威將軍尹顯祖奮武將軍曾方平建武將軍薛安都略陽太守龎法起將兵出弘農後軍外兵參軍龐季明年七十餘自以闗中豪右請入長安招合夷夏誕許之乃自貲谷入盧氏盧氏民趙難納之季明遂誘說士民應之者甚衆安都等因之自熊耳山出元景引兵繼進豫州刺史南平王鑠遣中兵參軍胡盛之出汝南梁坦出上蔡向長社魏荆州刺史魯爽鎮長社棄城走爽軌之子也幢主王陽兒擊魏豫州刺史僕蘭破之僕蘭奔虎牢鑠又遣安蠻司馬劉康祖將兵助坦進逼虎牢魏羣臣初聞有宋師言於魏主請遣兵救縁河穀帛魏主曰馬今未肥夭時尚􅀬􅄩岀必無功若兵來不止且還隂山避之國人本著羊皮袴何用綿帛展至十月吾無憂矣九月辛卯魏主引兵南救滑臺命太子晃屯漠南以備柔然吳王余守平城庚子魏􅀤州郡兵五萬分給諸軍王玄謨士衆甚盛噐械精嚴而玄謨貪愎好殺初圍滑臺城中多茅屋衆請以火箭燒之玄謨曰彼吾財也何遽燒之城中即撤屋穴處時河洛之民競出租穀操兵來赴者日以千數玄謨不即其長帥而以配私暱家付匹布責大梨八百由是衆心失望攻城數月不下聞魏救將至衆請􅀤車爲營玄謨不從冬十月癸亥魏主至枋頭使闗内矦代人陸真夜與數人犯圍潜入滑臺撫慰城中且登城視玄謨營囬折還報乙丑魏王渡河衆號百萬鞞鼔之聲震動天地玄謨懼退走魏人追擊之死者萬餘人麾下散亡略盡委棄軍資器械山積先是玄謨遣鍾離太守垣護之以百舸為前鋒據石濟在滑臺西南百二十里護之聞魏兵將至馳書勸玄謨急攻曰昔武皇攻廣固死没者甚衆況今事迫於曩日豈得計士衆傷疲願以屠城爲急玄謨不從及玄謨敗退不暇報護之魏人以所得玄謨戰艦連以鐡鎻三重斷河以絶護之還路河水迅急護之中流而下毎至鐡鎖以長柯斧斷之魏不能禁唯失一舸餘皆完僃而返蕭斌遣沈慶之將五千人救玄謨慶之曰玄謨士衆疲老宼虜已逼得數萬人乃可進小軍輕往無益也斌固遣之㑹玄謨遁還斌將斬之慶之固諌曰佛狸威震天下控弦百萬豈玄謨所能當且殺戰將以自弱非良計也斌乃止斌欲固守碻磝慶之曰今青冀虚弱而坐守窮城􅀂虜衆東過清東非國家有也碻磝孤絶復作未脩之滑臺耳會詔使至不聽斌等退師斌復召諸將議之並謂宜留慶之曰閫外之事將軍得以專之詔從逺來不知事勢節下有一范曾不能用空議何施斌及坐者並笑曰沈公乃更學問慶之厲聲曰衆人雖知古今不如下官耳學也斌乃使王玄謨戍碻磝申坦垣護之據清口自帥諸軍還歴城閏月龐法起等諸軍入盧氏斬縣令李封以趙難爲盧氏令使帥其衆爲鄉導栁元景自百丈崖從諸軍於盧氏法起等進攻弘農辛未拔之擒魏弘農太守李初古拔薛安都留屯弘農丙戌龐法起進向潼闗魏主命諸將分道並進永昌王仁自洛陽趣夀陽尚書長孫真趣馬頭楚王建趣鍾離髙涼王那自青州趣下邳魏主自東平趣鄒山十一月辛卯魏主至鄒山魯郡太守崔邪利爲魏所擒魏主見秦始皇石刻使人排而仆之以太牢祠孔子楚王建自清西進屯蕭城歩尼公自清東進屯留城武陵王駿遣參軍馬文恭將兵向蕭城江夏王義恭遣軍主嵇玄敬將兵向留城文恭爲魏所敗歩尼公遇玄敬引兵趣苞橋欲渡清西沛縣民燒苞橋夜於林中擊鼓魏爲宋兵大至爭渡苞水溺死者殆半詔以栁元景爲弘農太守元景使薛安都尹顯祖先引兵就龐法起等於陜元景於後督租陜城險固諸軍攻之不拔魏洛州刺史張是連提帥衆二萬度崤救陜安都等與戰於城南魏人縱突􅀐諸軍不能敵安都怒脫兠鍪解鎧唯著絳納兩當衫馬亦去具裝瞋目横矛單􅀐突陳所向無前魏人夾射不能中如是數四殺傷不可勝數㑹日暮别將魯元保引兵自函谷闗至魏兵乃退元景遣軍副栁元怙將歩􅀐二千救安都等夜至魏人不之知明日安都等陳於城西南曽方平謂安都曰今勍敵在前堅城在後是吾取死之日卿􅀂不進我當斬卿我􅀂不進卿斬我也安都曰善卿言是也遂合戰元怙引兵自南門鼓譟直出旌旗甚盛魏衆驚駭安都挺身奮擊流血凝肘矛折易之更入諸軍齊奮自旦至日昃魏衆大潰斬張是連提及將卒三千餘級其餘赴河塹死者甚衆生降二千餘人明日元景至讓降者曰汝輩本中國民今爲虜盡力力屈乃降何也皆曰虜驅民使戰後出者滅族以􅀐蹙歩未戰先死此將軍所親見也諸將欲盡殺之元景曰今王旗北指當令仁聲先路盡釋而遣之皆稱萬嵗而去甲午克陜城龐法起等進攻潼闗魏戍主婁須棄城走法起等據之􅀜中豪桀所在蠭起及四山羌胡皆來送款上以王玄謨敗退魏兵深入栁元景等不宜獨進皆召還元景使薛安都斷後引兵歸襄陽詔以元景爲襄陽太守魏永昌王仁攻懸瓠項城拔之帝恐魏兵至夀陽召劉康祖使還癸卯仁將八萬􅀐追及康祖於尉武康祖有衆八千人軍副胡盛之欲依山險閒行取至康祖怒曰臨河求敵遂無所見幸其自送奈何避之乃結車營而進下令軍中曰顧望者斬首轉歩者斬足魏人四面攻之將士皆殊死戰自旦至晡殺魏兵萬餘人流血没踝康祖身被十創意氣彌厲魏分其衆爲三且休且戰㑹日暮風急魏以􅀐負草燒車營康祖隨補其闕有流矢貫康祖頸墜馬死餘衆不能戰遂潰魏人掩殺殆盡南平王鑠使左軍行參軍王羅漢以三百人戍尉武魏兵至衆欲南依卑林以自固羅漢以受命居此不去魏人攻而擒之鎻其頸使三郎將掌之羅漢夜斷三郎將首抱鎻亡奔盱眙魏永昌王仁進逼夀陽焚掠馬頭鍾離南平王鑠嬰城固守魏兵在蕭城去彭城十餘里彭城兵雖多而食少太尉江夏王義恭欲棄彭城南歸安北中兵參軍沈慶之以爲歴城兵少食多欲爲函箱車陳以精兵爲外翼奉二王及妃女直趨歴城分兵配護軍蕭思話使留守彭城太尉長史何朂欲席卷奔鬱洲自海道還京師義恭去意已判唯二議彌日未決安北長史沛郡太守張暢曰􅀂歴城鬱洲有可至之理下官敢不髙賛今城中乏食百姓咸有走志但以闗扄嚴固欲去莫從耳一旦動足則各自逃散欲至所在何由可得今軍食雖寡朝夕猶未窘罄豈有捨萬安之術而就危亡之道若此計必行下官請以頸血汚公馬蹄武陵王駿謂義㳟曰阿父既爲揔統去留非所敢干道民沗爲城主而委鎮奔逃實無顔復奉朝廷必與此城共其存没張長史言不可異也義恭乃止壬子魏主至彭城立氊屋於戲馬臺以望城中馬文恭之敗也隊主蒯應没於魏魏主遣應至小市門求酒及甘蔗武陵王駿與之仍就求槖駝明日魏主使尚書李孝伯至南門餉義恭貂裘餉駿槖駝及騾且曰魏主致意安北可蹔出見我我亦不攻此城何爲勞苦將士僃守如此駿使張暢開門出見之曰安北致意魏主常遲面寫但以人臣無境外之交恨不蹔悉僃守乃邉鎮之常恱以使之則勞而無怨耳魏主求甘橘及借博具皆與之復餉氊及九種鹽胡䜴又借樂噐義恭應之曰受任戎行不齎樂具孝伯問暢何爲怱怱閉門絶橋暢曰二王以魏主營壘未立將士疲勞此精甲十萬恐輕相陵踐故閉城耳待休息士馬然後共治戰場刻日交戲孝伯曰賔有禮主則擇之暢曰昨見衆賔至門未爲有禮魏主使人來言曰致意太尉安北何不遣人來至我所彼此之情雖不可盡要須見我小大知我老小觀我爲人􅀂諸佐不可遣亦可使僮幹來暢以二王命對曰魏主形狀才力乆爲來往所具李尚書親自衘命不患彼此不盡故不復遣使孝伯又曰王玄謨亦常才耳南國何意作如此任使以致奔敗自入此境七百餘里主人竟不能一相拒逆鄒山之險君家所慿前鋒始接崔邪利遽藏入穴諸將倒曵出之魏主賜其餘生今從在此暢曰王玄謨南土偏將不謂爲才伹以之爲前驅大軍未至河氷向合玄謨因夜還軍致戎馬小亂耳崔邪利陷没何損於國魏主自以數十萬衆制一崔邪利乃足言邪知入境七百里無相拒者此自太尉神筭鎮軍聖略用兵有機不用相語孝伯曰魏主當不圍此城自帥衆軍直造􅀲歩南事􅀂辦彭城不待圍􅀂其不捷彭城亦非所須也我今當南飲江湖以療渴耳暢曰去留之事自適彼懐􅀂虜馬遂得飲江便爲無復天道先是童謡云虜馬飲江水佛狸死卯年故暢云然暢音容雅麗孝伯與左右皆歎息孝伯亦辯贍且去謂暢曰長史深自愛相去歩武恨不執手暢曰君善自愛冀蕩定有期相見無逺君􅀂得還宋朝今爲相識之始上起楊文德爲輔國將軍引兵自漢中西入揺動汧隴文德宗人楊髙帥隂平平武羣氐拒之文德擊髙斬之隂平平武悉平梁南秦二州刺史劉秀之遣文德伐啖提氐不克執送荆州使文德從祖兄頭戍葭蘆丁未大赦魏主攻彭城不克十二月丙辰朔引兵南下使中書郎魯秀岀廣陵髙涼王那岀山陽永昌王仁出横江所過無不殘滅城邑皆望風奔潰戊午建康纂嚴己未魏兵至淮上上使輔國將軍臧質將萬人救彭城至盱眙魏主已過淮質使冗從僕射胡崇之積弩將軍臧澄之營東山建威將軍毛熈祚據前浦質營於城南乙丑魏燕王譚攻崇之等三營皆敗没質案兵不敢救澄之燾之孫熈祚脩之之兄子也是夕質軍亦潰質棄輜重器械單將士百人赴城初盱眙太守沈璞到官王玄謨猶在滑臺江淮無警璞以郡當衝要乃繕城浚隍積財穀儲矢石爲城守之僃僚屬皆非之朝廷亦以爲過及魏兵南向守宰多棄城走或勸璞宣還建康璞曰虜􅀂以城小不顧夫復何懼􅀂肉薄來攻此乃吾報國之秋諸君封矦之日也奈何去之諸君嘗見數十萬人聚於小城之下而不敗者乎昆陽合肥前事之明驗也衆心稍定璞收集得二千精兵曰足矣及臧質向城衆謂璞曰虜􅀂不攻城則無所事衆􅀂其攻城則城中止可容見力耳地狹人多鮮不爲患且敵衆我寡人所共知􅀂以質衆能退敵完城者則全功不在我若避罪歸都㑹資舟楫必更相蹂踐正足爲患不􅀂閉門勿受璞歎曰虜必不能登城敢爲諸君保之舟楫之計固已久息虜之殘害古今未有屠剝之苦衆所共見其中幸者不過得驅還北國作奴婢耳彼雖烏合寧不憚此邪所謂同舟而濟胡越一心者也今兵多則虜退速少則退緩吾寧可欲專功而留虜乎乃開門納質質見城中豐實大喜衆皆稱萬嵗因與璞共守魏人之南宼也不齎糧用唯以抄掠爲資及過淮民多竄匿抄掠無所得人馬飢乏聞盱眙有積粟欲以爲北歸之資既破崇之等一攻城不拔即留其將韓元興以數千人守盱眙自帥大衆南向由是盱眙得益完守備庚午魏主至􅀲歩壊民廬舍及伐葦爲筏聲言欲渡江建康震懼民皆荷擔而立壬午内外戒嚴丹楊統内盡户發丁王公以下子弟皆從役命領軍將軍劉遵考等將兵分守津要遊邏上接于湖下至蔡洲陳艦列營周亘江濵自採石至于暨陽六七百里太子劭出鎮石頭揔統水軍丹楊尹徐湛之守石頭倉城吏部尚書江湛兼領軍軍事處置悉以委焉上登石頭城有憂色謂江湛曰北伐之計同議者少今日士民勞怨不得無慙貽大夫之憂予之過也又曰檀道濟􅀂在豈使胡馬至此上又登莫府山觀望形勢購魏主及王公首許以封爵金帛又募人齎野葛酒置空村中欲以毒魏人竟不能傷魏主鑿􅀲歩山爲蟠道於其上設氊屋魏主不飲河南水以槖駝負河北水自隨餉上橐駝名馬并求和請婚上遣奉朝請田竒餉以珍羞異味魏主得黃甘即噉之并大進酃酒左右有附耳語者疑食中有毒魏主不應舉手指天以其孫示竒曰吾逺來至此非欲爲功名實欲繼好息民永結姻援宋若能以女妻此孫我以女妻武陵王自今匹馬不復南顧竒還上召太子劭及羣臣議之衆並謂宜許江湛曰戎狄無親許之無益劭怒謂湛曰今三王在阨詎宜茍執異議聲色甚厲坐散俱出劭使班劔及左右排湛湛幾至僵仆劭又言於上曰北伐敗辱數州淪破獨有斬江湛徐湛之可以謝天下上曰北伐自是我意江徐但不異耳由是太子與江徐不平魏亦竟不成㛰資治通鑑卷第一百二十五
