front:
  text: 于關中處烏桓于馮翊北地丁零翟斌于新安澠池諸因亂流移欲還舊業者悉聽之二月秦以魏郡太守韋鍾為青州刺史中壘將軍梁成為兖州刺史射聲校尉徐成為并州刺史武衛將軍王鑒為豫州刺史左將軍彭越為徐州刺史太尉司馬皇甫覆爲荆州刺史屯騎校尉天水姜宇為涼州刺史扶風内史王統爲益州刺史秦州刺史西縣矦雅爲使持節都督秦晉凉雍州諸軍事秦州牧吏部尚書楊安為使持節都督益梁州諸軍事梁州刺史復置雍州治蒲阪以長樂公丕爲使持節征東大將軍雍州刺史成平老之子統擢之子也堅以關東初平守令宜得人命王猛以便宜簡召英俊補六州守令授訖言臺除正
  hash: sha256:e737e5417e62c80e7ed2bcf8df1d3e30e3b96f38d345adc39a95c892dd73b0f1
body:
  text: 三月壬辰益州刺史建成定公周楚卒秦後將軍金城俱難攻蘭陵太守張閔子于桃山大司馬温遣兵擊却之秦西縣矦雅楊安王統徐成及羽林左監朱肜揚武將軍姚萇帥步騎七萬伐仇池公楊纂代將長孫斤謀弑代王什翼犍世子寔格之傷脇遂執斤殺之夏四月戊午大赦秦兵至鷲峽楊纂帥衆五萬拒之梁州刺史弘農楊亮遣督䕶郭寳卜靖帥千餘騎助纂與秦兵戰于峽中纂兵大敗死者什三四寳等亦沒纂收散兵遁還西縣矦雅進攻仇池楊統帥武都之衆降秦纂懼面縛出降雅送纂于長安以統為南秦州刺史加楊安都督南秦州諸軍事鎮仇池王猛之破張天錫於枹罕也獲其將敦煌陰據及甲士五千人秦王堅既克楊纂遣據帥其甲士還凉州使著作郎梁殊閻負送之因命王猛爲書諭天錫曰昔貴先公稱藩劉石者惟審於彊弱也今論凉土之力則損於往時語大秦之徳則非二趙之匹而將軍翻然自絶無乃非宗廟之福也歟以秦之威旁振無外可以囘弱水使東流返江河使西注關東旣平將移兵河右恐非六郡士民所能抗也劉表謂漢南可保將軍謂西河可全吉凶在身元龜不逺宜深筭妙慮以求多福無使六世之業一旦而墜地也天錫大懼遣使謝罪稱藩堅拜天錫使持節都督河右諸軍事驃騎大將軍開府儀同三司凉州刺史西平公吐谷渾王辟奚聞楊纂敗五月遣使獻馬千匹金銀五百斤于秦秦以辟奚爲安逺將軍漒川矦辟奚葉延之子也好學仁厚而無威斷三弟專恣國人患之長史鍾惡地西漒羌豪也謂司馬乞宿雲曰三弟縱横勢出王右㡬亡國矣吾二人位爲元輔豈得坐而視之詰朝月望文武並會吾將討焉王之左右皆吾羌子轉目一顧立可擒也宿雲請先白王惡地曰王仁而無斷白之必不從萬一事泄吾屬無類矣事已出口何可中變遂於坐收三弟殺之辟奚驚怖自投床下惡地宿雲趨而扶之曰臣昨夢先王刺臣云三弟將為逆不可不討故誅之耳辟奚由是發病恍惚命世子視連曰吾禍及同生何以見之於地下國事大小任汝治之吾餘年殘命寄食而已遂以憂卒視連立不飲酒遊畋者七年軍國之事委之將佐鍾惡地諫以爲人主當自娛樂建威布徳視連泣曰孤自先世以來以仁孝忠恕相承先王念友愛之不終悲憤而亡孤雖纂業尸存而已聲色遊娯豈所安也威徳之建當付之將來耳代世子寔病傷而卒秋七月秦王堅如洛陽代世子寔娶東部大人賀野千之女有遺腹子甲戌生男代王什翼犍爲之赦境内名曰涉圭大司馬温以梁益多寇周氏世有威名八月以寧州刺史周仲孫監益梁二州諸軍事領益州刺史仲孫光之子也秦以光禄勲李儼為河州刺史鎮武始王猛以潞川之功請以鄧羌為司􅀠秦王堅下詔曰司􅀠校尉董牧皇畿吏責甚重非所以優禮名將光武不以吏事處功臣實貴之也羌有亷李之才朕方委以征伐之事北平匈奴南蕩揚越羌之任也司􅀠何足以嬰之其進號鎮軍將軍位特進九月秦王堅還長安歸安元矦李儼卒于上邽堅復以儼子辯爲河州刺史冬十月秦王堅如鄴獵于西山旬餘忘返伶人王洛叩馬諫曰陛下羣生所繫今久獵不歸一旦患生不虞奈太后天下何堅爲之罷獵還宮王猛因進言曰畋獵誠非急務王洛之言不可忘也堅賜洛帛百匹拜官箴左右自是不復獵大司馬温恃其材略位望陰蓄不臣之志嘗撫枕歎曰男子不能流芳百世亦當遺臭萬年術士杜炅能知人貴賤温問炅以己禄位所至炅曰明公勲格宇宙位極人臣温不悦温欲先立功河朔以收時望還受九錫及枋頭之敗威名頓挫旣克壽春謂參軍郗超曰足以雪枋頭之恥乎超曰未也久之超就温宿中夜謂温曰明公都無所慮乎温曰卿欲有言邪超曰明公當天下重任今以六十之年敗於大舉不建不世之勲不足以鎭愜民望温曰然則奈何超曰明公不爲伊霍之舉者無以立大威權鎭壓四海温素有心深以爲然遂與之定議以帝素謹無過而床第易誣乃言帝早有痿疾嬖人相龍計好朱靈寳等參侍内寢二美人田氏孟氏生三男將建儲立王傾移皇基密播此言於民間時人莫能審其虛實十一月癸卯温自廣陵將還姑孰屯于白石丁未詣建康諷褚太后請廢帝立丞相會稽王昱并作令草呈之太后方在佛屋燒香内侍啟云外有急奏太后出倚户視奏數行乃曰我本自疑此至半便止索筆益之曰未亡人不幸罹此百憂感念存沒心焉如割己酉温集百官於朝堂廢立旣曠代所無莫有識其故典者百官震慄温亦色動不知所爲尚書僕射王彪之知事不可止乃謂温曰公阿衡皇家當􅀝傍先代乃命取霍光傳禮度儀制定於湏臾彪之朝服當階神彩毅然曾無懼容文武儀準莫不取定朝廷以此服之於是宣太后令廢帝爲東海王以丞相録尚書事㑹稽王昱統承皇極百官入太極前殿温使督䕶笁瑶散騎侍郎劉亨收帝璽綬帝著白帢單衣步下西堂乗犢車出神虎門羣臣拜辭莫不歔欷侍御史殿中監將兵百人衛送東海第温帥百官具乗輿灋駕迎會稽王于會稽邸王於朝堂變服著平巾幘單衣東向流涕拜受璽綬是日即皇帝位改元温出次中堂分兵屯衛温有足疾詔乗輿入殿温撰辭欲陳述廢立本意帝引見便泣下數十行温兢懼竟不能一言而出太宰武陵王晞好習武事爲温所忌欲廢之以事示王彪之彪之曰武陵親尊未有顯罪不可以猜嫌之閒便相廢徙公建立聖明當崇奬王室與伊周同美此大事宜更深詳温曰此已成事卿勿復言乙卯温表晞聚納輕剽息綜矜忍袁眞叛逆事相連染頃日猜懼將成亂階請免晞官以王歸蕃從之并免其世子綜梁王㻱等官温使魏郡太守毛安之帥所領宿衞殿中安之虎生之弟也庚戌尊褚太后曰崇徳太后初殷浩卒大司馬温使人齎書弔之浩子㳙不荅亦不詣温而與武陵王晞遊廣州刺史庾藴希之弟也素與温有隙温惡殷庾宗彊欲去之辛亥使其弟祕逼新蔡王晃詣西堂叩頭自列稱與晞及子綜著作郎殷㳙太宰長史庾倩掾曹秀舎人劉彊散騎常侍庾柔等謀反帝對之流涕温皆收付廷尉倩柔皆藴之弟也癸丑温殺東海王三子及其母甲寅御史中丞譙王恬承温㫖請依律誅武陵王晞詔曰悲惋惶怛非所忍聞況言之哉其更詳議恬承之孫也乙卯温重表固請誅晞詞甚酷切帝乃賜温手詔曰若晉祚靈長公便宜奉行前詔如其大運去矣請避賢路温覽之流汙變色乃奏廢晞及三子家屬皆徙新安郡丙辰免新蔡王晃爲庶人徙衡陽殷㳙庾倩曹秀劉彊庾柔皆族誅庾藴飲酖死藴兄東陽太守友子婦桓豁之女也故温特赦之庾希聞難與弟會稽王參軍邈及子攸之逃于海陵陂澤中温既誅殷庾威埶翕赫侍中謝安見温遥拜温驚曰安石卿何事乃爾安曰未有君拜於前臣揖於後戊午大赦增文武位二等己未温如白石上書求歸姑孰庚申詔進温丞相大司馬如故留京師輔政温固辭仍請還鎮辛酉温自白石還姑孰秦王堅聞温廢立謂羣臣曰温前敗灞上後敗枋頭不能思愆自貶以謝百姓方更廢君以自説六十之叟舉動如此將何以自容於四海乎諺曰怒其室而作色於父其桓温之謂矣秦車騎大將軍王猛以六州任重言於秦王堅請改授親賢及府選便宜輒已停寢别乞一州自效堅報曰朕之於卿義則君臣親踰骨肉雖復桓昭之有管樂玄徳之有孔明自謂踰之夫人主勞於求才逸於得士旣以六州相委則朕無東顧之憂非所以爲優崇乃朕自求安逸也夫取之不易守之亦難茍任非其人患生慮表豈獨朕之憂亦卿之責也故虛位台鼎而以分陜爲先卿未照朕心殊乖素望新政俟才宜速銓補俟東方化洽當衮衣西歸仍遣侍中梁讜詣鄴諭㫖猛乃視事如故十二月大司馬温奏廢放之人屏之以逺不可以臨黎元東海王宜依昌邑故事築第吳郡太后詔曰使爲庶人情有不忍可特封王温又奏可封海西縣矦庚寅封海西縣公温威振内外帝雖處尊位拱黙而已常懼廢黜先是熒惑守太㣲端門踰月而海西廢辛卯熒惑逆行入太㣲帝甚惡之中書侍郎郗超在直帝謂超曰命之脩短本所不計故當無復近日事邪超曰大司馬臣温方内固社稷外恢經略非常之事臣以百口保之及超請急省其父帝曰致意尊公家國之事遂至於此由吾不能以道匡衛愧歎之深言何能諭因詠庾闡詩云志士痛朝危忠臣哀主辱遂泣下霑襟帝羙風儀善容止留心典籍凝塵滿席湛如也雖神識恬暢然無濟世大略謝安以爲惠帝之流但清談差勝耳郗超以温故朝中皆畏事之謝安嘗與左衛將軍王坦之共詣超日旰未得前坦之欲去安曰獨不能爲性命忍須㬰邪秦以河州刺史李辯領興晉太守還鎭枹罕徙涼州治金城張天錫聞秦有兼并之志大懼立壇於姑臧南刑三牲帥其官屬遥與晉三公盟遣從事中郎韓愽奉表送盟文并獻書於大司馬温期以明年夏同大舉會于上邽是嵗秦益州刺史王統攻隴西鮮卑乞伏司繁於度堅山司繁帥騎三萬拒統于苑川統潜襲度堅山司繁部落五萬餘皆降於統其衆聞妻子已降秦不戰而潰司繁無所歸亦詣統降秦王堅以司繁爲南單于留之長安以司繁從叔吐雷為勇士護軍撫其部衆二年春二月秦以清河房曠爲尚書左丞徵曠兄黙及淸河崔逞燕國韓㣧爲尚書郎北平陽陟田勰陽瑶爲著作佐郭郝略爲清河相皆關東士望王猛所薦也瑶騖之子也冠軍將軍慕容垂言於秦王堅曰臣叔父評燕之惡來輩也不宜復汚聖朝願陛下爲燕戮之堅乃出評爲范陽太守燕之諸王悉補邊郡臣光曰古之人滅人之國而人悦何哉爲人除害故也彼慕容評者蔽君專政忌賢疾功愚闇貪虐以喪其國國亡不死逃遁見擒秦王堅不以爲誅首又從而寵秩之是愛一人而不愛一國之人也其失人心多矣是以施恩於人而人莫之恩盡誠於人而人莫之誠卒於功名不遂容身無所由不得其道故也三月戊午遣侍中王坦之徵大司馬温入輔温復辭秦王堅詔關東之民學通一經才成一藝者在所郡縣以禮送之在官百石以上學不通一經才不成一藝者罷遣還民夏四月徙海西公於吳縣西柴里敕吳國内史刁彞防衛又遣御史顧允監察之彞恊之子也六月癸酉秦以王猛爲丞相中書監尚書令太子太傅司􅀠校尉特進常侍持節將軍矦如故陽平公融爲使持節都督六州諸軍事鎭東大將軍冀州牧􅁃希庾邈與故青州刺史武沈之子遵聚衆夜入京口城晉陵太守卞眈踰城奔曲阿希詐稱受海西公密㫖誅大司馬温建康震擾内外戒嚴卞眈發諸縣兵二千人擊希希敗閉城自守温遣東海内史周少孫討之秋七月壬辰拔其城擒希邈及其親黨皆斬之眈壼之子也甲寅帝不䂊急召大司馬温入輔一日一夜發四詔温辭不至初帝爲會稽王娶王述從妹爲妃生世子道生及弟俞生道生踈躁無行母子皆以幽廢死餘三子郁朱生天流皆早夭諸姬絶孕將十年王使善相者視之皆曰非其人又使視諸婢媵有李陵容者在織坊中黑而長宮人謂之崑崙相者驚曰此其人也王召之侍寢生子昌明及道子己未立昌明爲皇太子生十年矣以道子爲琅邪王領會稽國以奉帝母鄭太妃之祀遺詔大司馬温依周公居攝故事又曰少子可輔者輔之如不可君自取之侍中王坦之自持詔入於帝前毁之帝曰天下儻來之運卿何所嫌坦之曰天下宣元之天下陛下何得專之帝乃使坦之改詔曰家國事一禀大司馬如諸葛武矦王丞相故事是日帝崩羣臣疑惑未敢立嗣或曰當須大司馬處分尚書僕射王彪之正色曰天子崩太子代立大司馬何容得異若先面諮必反爲所責朝議乃定太子即皇帝位大赦崇徳太后令以帝沖㓜加在諒闇令温依周公居攝故事事已施行王彪之曰此異常大事大司馬必當固讓使萬機停滯稽廢山陵未敢奉令謹具封還事遂不行温望􅂤文臨終禪位於已不爾便當居攝既不副所望甚憤怨與弟沖書曰遺詔使吾依武矦王公故事耳温疑王坦之謝安所爲心銜之詔謝安徵温入輔温又辭八月秦丞相猛至長安復加都督中外諸軍事猛辭曰元相之重儲傅之尊端右務繁京牧任大緫督戎機出納帝命文武兩寄巨細並關以伊呂蕭鄧之賢尚不能兼況臣猛之無似章三四上秦主堅不許曰朕方混壹四海非卿誰可委者卿之不得辭宰相猶朕不得辭天下也猛爲相堅端拱於上百官緫已於下軍國内外之事無不由之猛剛明清肅善惡著白放黜尸素顯拔幽滯勸課農桑練習軍旅官必當才刑必當罪由是國富兵彊戰無不克秦國大治堅敕太子宏及長樂公丕等曰汝事王公如事我也陽平公融在冀州髙選綱紀以尚書郎房黙河閒相申紹爲治中别駕清河崔宏爲州從事管記室融年少爲政好新竒貴苛察申紹數規正導以寛和融雖敬之未能盡從後紹出爲濟北太守融屢以過失聞數致譴讓乃自恨不用紹言融嘗坐擅起學舎爲有司所糾遣主簿李纂詣長安自理纂憂懼道卒融問申紹誰可使者紹曰燕尚書郎髙泰清辯有膽智可使也先是丞相猛及融屢辟泰泰不起至是融謂泰曰君子救人之急卿不得復辭泰乃從命至長安丞相猛見之笑曰髙子伯於今乃來何其遲也泰曰罪人來就刑何問遲速猛曰何謂也泰曰昔魯僖公以泮宫發頌齊宣王以稷下垂聲今陽平公開建學宫追蹤齊魯未聞明詔褒美乃更煩有司舉劾明公阿衡聖朝懲勸如此下吏何所逃其罪乎猛曰是吾過也事遂得釋猛因歎曰髙子伯豈陽平所宜吏乎言於秦王堅堅召見悦之問以爲治之本對曰治本在得人得人在審舉審舉在核眞未有官得其人而國家不治者也堅曰可謂辭􅂤而理博矣以爲尚書郎泰固請還州堅許之九月甲寅追尊故會稽王妃王氏曰順皇后尊帝母李氏爲淑妃冬十月丁卯葬􅂤文帝于髙平陵彭城妖人盧悚自稱大道祭酒事之者八百餘家十一月遣弟子許龍如吳晨到海西公門稱太后密詔奉迎興復公初欲從之納保母諫而止龍曰大事垂捷焉用兒女子言乎公曰我得罪於此幸蒙寛宥豈敢妄動且太后有詔便應官屬來何獨使汝也汝必爲亂因叱左右縛之龍懼而走甲午悚帥衆三百人晨攻廣莫門詐稱海西公還由雲龍門突入殿庭略取武庫甲仗門下吏士駭愕不知所爲游擊將軍毛安之聞難帥衆直入雲龍門手自奮擊左衛將軍殷康中領軍桓祕入止車門與安之并力討誅之并黨與死者數百人海西公深慮横禍專飲酒恣聲色有子不育時人憐之朝廷以其安於屈辱故不復爲虞秦都督北蕃諸軍事鎭北大將軍開府儀同三司朔方桓矦梁平老卒平老在鎭十餘年鮮卑匈奴憚而愛之三吳大旱饑人多餓死烈宗孝武皇帝上之上寧康元年春正月己丑朔大赦改元二月大司馬温來朝辛巳詔吏部尚書謝安侍中王坦之迎于新亭是時都下人情恟恟或云欲誅王謝因移晉室坦之甚懼安神色不變曰晉祚存亡決於此行温既至百官拜於道側温大陳兵衛延見朝士有位望者皆戰慴失色坦之流汗沾衣倒執手版安從容就席坐定謂温曰安閒諸矦有道守在四隣明公何須壁後置人邪温笑曰正自不能不爾遂命左右撤之與安笑語移日郗超常爲温謀主安與坦之見温温使超卧帳中聽其言風動帳開安笑曰郗生可謂入幕之賔矣時天子㓜弱外有彊臣安與坦之盡忠輔衛卒安晉室温治盧悚入宮事収尚書陸始付廷尉免桓祕官連坐者甚衆遷毛安之爲右衛將軍桓祕由是怨温三月温有疾停建康十四日甲午還姑孰夏代王什翼犍使燕鳯入貢于秦秋七月己亥南郡宣武公桓温薨初温疾篤諷朝廷求九錫屢使人趣之謝安王坦之故緩其事使袁宏具草宏以示王彪之彪之歎其文辭之美因曰卿固大才安可以此示人謝安見其草輙改之由是歷旬不就宏密謀於彪之彪之曰聞彼病日増亦當不復支乆自可更小遲迴宏從之温弟江州刺史沖問温以謝安王坦之所任温曰渠等不爲汝所處分其意以爲已存彼必不敢立異死則非沖所制若害之無益於沖更失時望故也温以世子熈才弱使沖領其衆於是桓祕與熈弟濟謀共殺沖沖密知之不敢入俄頃温薨沖先遣力士拘録熙濟而後臨喪祕遂被廢棄熙濟俱徙長沙詔葬温依漢霍光及安平獻王故事沖稱温遺命以少子玄爲嗣時方五嵗襲封南郡公庚戍加右將軍荆州刺史桓豁征西將軍督荆揚雍交廣五州諸軍事以江州刺史􅁊沖為中軍將軍都督揚豫江三州諸軍事揚豫二州刺史鎮姑孰竟陵太守桓石秀為寧逺將軍江州刺史鎭潯陽石秀豁之子也沖既代温居任盡忠王室或勸沖誅除時望専執時權冲不從始温在鎭死罪皆專決不請冲以為生殺之重當歸朝廷凡大辟皆先上須報然後行之謝安以天子幼沖新喪元輔欲請崇徳太后臨朝王彪之曰前世人主㓜在襁褓母子一體故可臨朝太后亦不能決事要須顧問大臣今上年出十歳垂及冠婚反令從嫂臨朝示人君㓜弱豈所以光揚聖徳乎諸公必欲行此豈僕所制所惜者大體耳安不欲委任桓沖故使太后臨朝已得以專獻替裁決遂不從彪之之言八月壬子太后復臨朝攝政梁州刺史楊亮遣其子廣襲仇池與秦梁州刺史楊安戰廣兵敗沮水諸戍皆委城奔潰亮懼退守磬險九月安進攻漢川丙申以王彪之爲尚書令謝安爲僕射領吏部共掌朝政安每嘆曰朝廷大事衆所不能決者以諮王公無不立決以吳國内史刀彞爲徐兖二州刺史鎭廣陵冬秦王堅使益州刺史王統祕書監朱肜帥卒二萬出漢川前禁將軍毛當鷹揚將軍徐成帥卒三萬出劔門入冦梁益梁州刺史楊亮帥巴獠萬餘拒之戰于青谷亮兵敗奔固西城肜遂拔漢中徐成攻劔門克之楊安進攻梓潼梓潼太守周虓固守涪城遣步騎數千送母妻自漢水趣江陵朱肜邀而獲之虓遂降於安十一月安克梓潼荆州刺史桓豁遣江夏相笁瑶救梁益瑶聞廣漢太守趙長戰死引兵退益州刺史周仲孫勒兵拒朱肜于緜竹聞毛當將至成都仲孫帥騎五千奔于南中秦遂取梁益二州卭莋夜郎皆附於秦秦王堅以楊安爲益州牧鎭成都毛當爲梁州刺史鎭漢中姚萇爲寧州刺史屯墊江王統爲南秦州刺史鎭仇池秦王堅欲以周虓爲尚書郎虓曰蒙晉厚恩但老母見獲失節於此母子獲全秦之惠也雖公矦之貴不以為榮况郎官乎遂不仕每見堅或箕踞而坐呼爲氐賊嘗值元會儀衛甚盛堅問之曰晉朝元會與此何如虓攘袂厲聲曰犬羊相聚何敢比擬天朝秦人以虓不遜屢請殺之堅待之彌厚周仲孫坐失守免官桓沖以冠軍將軍毛虎生爲益州刺史領建平太守以虎生子球爲梓潼太守虎生與球伐秦至巴西以糧乏退屯巴東以侍中王坦之爲中書令領丹楊尹是歳鮮卑勃寒宼掠隴右秦王堅使乞伏司繁討之勃寒請降遂使司繁鎭勇士川有彗星出于尾箕長十餘丈經太㣲掃東井自四月始見及秋冬不滅秦太史令張孟言於秦王堅曰尾箕燕分東井秦分也今彗起尾箕而掃東井十年之後燕當滅秦二十年之後代當滅燕慕容暐父子兄弟我之仇敵而布列朝廷貴盛莫二臣竊憂之宜剪其魁桀者以消天變堅不聽陽平公融上䟽曰東胡跨據六州南面稱帝陛下勞師累年然後得之本非慕義而來今陛下親而幸之使其父子兄弟森然滿朝執權履職􅀔傾勲舊臣愚以爲狼虎之心終不可養星變如此願少留意堅報曰朕方混六合爲一家視夷狄爲赤子汝宜息慮勿懐耿介夫惟修徳可以禳災苟能内求諸已何懼外患乎二年春正月癸未朔大赦己酉刁彞卒二月癸丑以王坦之爲都督徐兖青三州諸軍事徐兖二州刺史鎭廣陵詔謝安揔中書安好聲律朞功之慘不廢絲竹士大夫效之遂以成俗王坦之屢以書苦諫之曰天下之寳當爲天下惜之安不能從三月秦太尉建寧烈公李威卒夏五月蜀人張育楊光起兵擊秦有衆二萬遣使來請兵秦王堅遣鎭軍將軍鄧羌帥甲士五萬討之益州刺史笁瑤威逺將軍桓石䖍帥衆三萬攻墊江姚萇兵敗退屯五城瑶石虔屯巴東張育自號蜀王與巴獠酋帥張重尹萬等五萬餘人進圍成都六月育改元黒龍秋七月張育與張重等爭權舉兵相攻秦楊安鄧羌襲育敗之育與楊光退屯緜竹八月鄧羌敗晉兵于涪西九月楊安敗張重尹萬于成都南重死斬首二萬三千級鄧羌撃張育楊光于綿竹皆斬之益州復入于秦冬十二月有人入秦明光殿大呼曰甲申乙酉魚羊食人悲哉無復遺秦王堅命執之不獲祕書監朱肜祕書侍郎略陽趙整固請誅諸鮮卑堅不聽整宦官也博聞彊記能屬文好直言上書及面諫前後五十餘事慕容垂夫人得幸於堅堅與之同輦遊于後庭整歌曰不見雀來入鷰室但見浮雲蔽白日堅改容謝之命夫人下輦是歳代王什翼犍擊劉衞辰南走三年春正月辛亥大赦夏五月丙午藍田獻矦王坦之卒臨終與謝安桓沖書惟以國家爲憂言不及私桓沖以謝安素有重望欲以揚州讓之自求外出桓氏族黨皆以爲非計莫不扼腕苦諫郗超亦深止之沖皆不聽處之澹然甲寅詔以沖都督徐豫兖青揚五州諸軍事徐州刺史鎭京口以安領揚州刺史並加侍中六月秦清河武矦王猛寢疾秦王堅親爲之祈南北郊及宗廟社稷分遣侍臣徧禱河嶽諸神猛疾少瘳爲之赦殊死以下猛上䟽曰不圖陛下以臣之命而虧天地之徳開闢以來未之有也臣聞報徳莫如盡言謹以垂沒之命竊獻遺欵伏惟陛下威烈振乎八荒聲敎光乎六合九州百郡十居其七平燕定蜀有如拾芥夫善作者不必善成善始者不必善終是以古先哲王知功業之不易戰戰兢兢如臨深谷伏惟陛下追蹤前聖天下幸甚堅覽之悲慟秋七月堅親至猛第視疾訪以後事猛曰晉雖僻處江南然正朔相承上下安和臣没之後願勿以晉爲圖鮮卑西羌我之仇敵終爲人患宜漸除之以便社稷言終而卒堅比歛三臨哭謂太子宏曰天不欲使吾平壹六合耶何奪吾景略之速也葬之如漢霍光故事八月癸巳立皇后王氏大赦后濛之孫也以后父晉陵太守藴爲光禄大夫領五兵尚書封建昌縣矦藴固辭不受九月帝講孝經始覽典籍延儒士謝安薦東莞徐邈補中書舎人毎被顧問多所匡益帝或宴集酣樂之後好爲手詔詩章以賜侍臣或文詞率爾所言穢雜邈應時収歛還省刋削皆使可觀經帝重覽然後出之時議以此多邈冬十月癸酉朔日有食之秦王堅下詔曰新喪賢輔百司或未稱朕心可置聽訟觀於未央南朕五日一臨以求民隠今天下雖未大定權可偃武脩文以稱武矦雅㫖其增崇儒敎禁老莊圖䜟之學犯者棄市妙簡學生太子及公矦百僚之子皆就學受業中外四禁二衛四軍長上將士皆令受學二十人給一經生教讀音句後宫置典學以教掖庭選閹人及女􅀠敏慧者詣博士授經尚書郎王佩讀䜟
