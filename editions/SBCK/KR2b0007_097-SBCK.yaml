body:
  text: 趙王虎作臺觀四十餘所於鄴又營長安洛陽二宫作者四十餘萬人又欲自鄴起閣道至襄國敕河􅀯四州治􅀯伐之僃并朔秦雍嚴西討之資青冀幽州爲東征之計皆三五發卒諸州軍造甲者五十餘萬人舩夫十七萬人爲水所没虎狼所食者三分居一加之公矦牧宰競營私利百姓失業愁困貝丘人李弘因衆心之怨自言姓名應䜟連結黨與署置百寮事發誅之連坐者數千家虎畋獵無度晨出夜歸又多微行躬察作役侍中京兆韋謏諌曰陛下忽天下之重輕行斤斧之間猝有狂夫之變雖有智勇將安所施又興役無時廢民耘穫吁嗟盈路殆非仁聖之所忍爲也虎賜謏榖帛而興繕滋繁游察自􅀂秦公韜有寵於虎太子宣惡之右僕射張離領五兵尚書欲求媚於宣說之曰今諸矦吏兵過限宜漸裁省以壯本根宣使離爲奏秦燕義陽樂平四公聽置吏一百九十七人帳下兵二百人自是以下三分置一餘兵五萬悉配東宫於是諸公咸怨嫌釁益深矣青州上言濟􅀯平陵城北石虎一夕移於城東􅀯有狼狐千餘迹隨之迹皆成蹊虎喜曰石虎者朕也自西北徙而東􅀯者天意欲使朕平蕩江􅀯也其敕諸州兵明年悉集朕當親董六師以奉天命羣臣皆賀上皇德頌者一百七人制征士五人出車一乗牛二頭米十五斛絹十匹調不辦者斬民至鬻子以供軍須猶不能給自經於道樹者相望康皇帝建元元年春二月髙句麗王釗遣其弟稱臣入朝於燕貢珍異以千數燕王皝乃還其父尸猶留其母爲質宇文逸豆歸遣其相莫淺渾將兵擊燕諸將爭欲擊之燕王皝不許莫淺渾以爲皝畏之酣飲縱獵不復設僃皝使慕容翰出擊之莫淺渾大敗僅以身免盡俘其衆􅁃翼爲人慷􅁣喜功名不尚浮華琅邪内史􅁊温彛之子也尚􅀯康公主豪爽有風槩翼與之友善相期以寧濟海内翼甞薦温於成帝曰􅁊温有英雄之才願陛下勿以常人遇之常壻畜之宜委以方卲之任必有弘濟艱難之勲時杜乂殷浩並才名冠丗翼獨弗之重也曰此輩宜束之髙閣俟天下太平然後徐議其任耳浩累辭徴辟屏居墓所幾將十年時人擬之管􅁑江夏相謝尚長山令王濛常伺其出處以卜江左興亡甞相與省之知浩有確然之志旣返相謂曰深源不起當如蒼生何尚鯤之子也翼請浩爲司馬詔除侍中安西軍司浩不應翼遺浩書曰王夷甫立名非眞雖云談道實長華競明德君子遇㑹處際寧可然乎浩猶不起殷羡爲長沙相在郡貪殘􅁃冰與翼書屬之翼報曰殷君驕豪亦似由有佳兒弟故小令物情容之大較江東之政以嫗喣豪彊常爲民蠧時有行灋輒施之寒劣如往年偷石頭倉米一百萬斛皆是豪將輩而直殺倉督監以塞責山遐爲餘姚長爲官出豪彊所藏二千戸而衆共驅之令遐不得安席雖皆前宰之惛謬江東事去寔此之由兄弟不幸横䧟此中自不能拔足於風塵之外當共明目而治之荆州所統二十餘郡唯長沙最惡惡而不黜與殺督監者復何異邪遐簡之子也翼以滅胡取蜀爲巳任遣使東約燕王皝西約張駿刻期大舉朝議多以爲難唯􅁃冰意與之同而􅁊温譙王無忌皆賛成之無忌承之子也秋七月趙汝􅀯太守戴開帥數千人詣翼降丁巳下詔議經略中原翼欲悉所部之衆北伐表􅁊宣爲都督司雍梁三州荆州之四郡諸軍事梁州剌史前趣丹水􅁊温爲前鋒小督假節帥衆入臨淮並發所統六州奴及車牛驢馬百姓嗟怨代王什翼犍復求婚於燕燕王皝使納馬千匹爲禮什翼犍不與又倨慢無子壻禮八月皝遣丗子儁帥前軍師評等擊代什翼犍帥衆避去燕人無所見而還漢主壽卒謚曰昭文廟號中宗太子勢即位大赦趙太子宣擊鮮卑斛榖提大破之斬首三萬級宇文逸豆歸執段遼弟蘭送於趙并獻駿馬萬匹趙王虎命蘭帥所從鮮卑五千人屯令支􅁃翼欲移鎭襄陽恐朝廷不許乃奏云移鎭安陸帝及朝士皆遣使譬止翼翼遂違詔北行至夏口復上表請鎭襄陽翼時有衆四萬詔加翼都督征討諸軍事先是車􅀐將軍揚州剌史􅁃冰屢求出外辛巳以冰都督荆江寧益梁交廣七州豫州之四郡諸軍事領江州剌史假節鎮武昌以爲翼繼援徴徐州刺史何充爲都督揚豫徐州之琅邪諸軍事領揚州剌史録尚書事輔政以琅邪内史􅁊温爲都督青徐兖三州諸軍事徐州剌史徴江州剌史褚裒爲衛將軍領中書令冬十一月已巳大赦二年春正月趙王虎享羣臣於太武殿有白鴈百餘集馬道之􅀯虎命射之皆不獲時諸州兵集者百餘萬太史令趙攬密言於虎曰白鴈集庭宫室將空之象不宜􅀯行虎信之乃臨宣武觀大閱而罷漢主勢攺元太和尊母閻氏爲皇太后立妻李氏爲皇后燕王皝與左司馬髙詡謀伐宇文逸豆歸詡曰宇文強盛今不取必爲國患伐之必克然不利於將出而告人曰吾往必不返然忠臣不避也於是皝自將伐逸豆歸以慕容翰爲前鋒將軍劉佩副之分命慕容軍慕容恪慕容霸及折衝將軍慕輿根將兵三道並進髙詡將發不見其妻使人語以家事而行逸豆歸遣南羅大涉夜干將精兵逆戰皝遣人馳謂慕容翰曰涉夜干勇冠三軍宜小避之翰曰逸豆歸掃其國内精兵以屬涉夜干涉夜干素有勇名一國所頼也今我克之其國不攻自潰矣且吾孰知涉夜干之爲人雖有虚名實易與耳不宜避之以挫吾兵氣遂進戰翰自出衝陳涉夜干出應之慕容霸從傍邀擊遂斬涉夜干宇文士卒見涉夜干死不戰而潰燕兵乗勝逐之遂克其都城逸豆歸走死漠北宇文氏由是散亡皝悉収其畜産資貨徙其部衆五千餘落於昌􅀺闢地千餘里更命涉夜干所居城曰威德城使弟彪戍之而還髙詡劉佩皆中流矢卒詡善天文皝甞謂曰卿有佳書而不見與何以爲忠盡詡曰臣聞人君執要人臣執職執要者逸執職者勞是以后稷播種堯不預焉占􅃸天文晨夜甚苦非至尊之所宜親殿下將安用之皝黙然初逸豆歸事趙甚謹貢獻屬路及燕人伐逸豆歸趙王虎使右將軍白勝并州剌史王霸自甘松出救之比至宇文氏巳亡因攻威德城不克而還慕容彪追擊破之慕容翰之與宇文氏戰也爲流矢所中卧病積時不出後漸差於其家試騁馬或告翰稱病而私習騎乗疑欲爲變燕王皝雖藉翰勇略然中心終忌之乃賜翰死翰曰吾負罪出奔旣而復還今日死巳晚矣然羯賊跨據中原吾不自量欲爲國家蕩壹區夏此志不遂􅃿有遺恨命矣夫飲藥而卒代王什翼犍遣其大人長孫秩迎婦於燕夏四月涼州將張瓘敗趙將王擢于三交城初趙領軍王朗言於趙王虎曰盛冬雪寒而皇太子使人伐宫材引於漳水役者數萬吁嗟滿道陛下宜因出游罷之虎從之太子宣怒㑹熒惑守房宣使太史令趙攬言於虎曰房爲天王今熒惑守之其殃不細宜以貴臣王姓者當之虎曰誰可者攬曰無貴於王領軍虎意惜朗使攬更言其次攬無以對因曰其次唯中書監王波耳虎乃下詔追罪波前議楛矢事􅆎斬之及其四子投尸漳水旣而愍其無罪追贈司空封其孫爲矦趙平北將軍尹農攻燕凡城不克而還漢太史令韓皓上言熒惑守心乃宗廟不修之譴漢主勢命羣臣議之相國董皎侍中王嘏以爲景武創業獻文承基至親不逺無宜踈絶勢乃更命祀成始祖太宗皆謂之漢征西將軍􅁃翼使梁州剌史􅁊宣擊趙將李羆於丹水爲羆所敗翼貶宣爲建威將軍宣慙憤成疾秋八月庚辰卒翼以長子方之爲義城太守代領宣衆又以司馬應誕爲襄陽太守參軍司馬勲爲梁州剌史戍西城中書令褚裒固辭樞要閏月丁巳以裒爲左將軍都督兖州徐州之琅邪諸軍事兖州刺史鎭金城帝疾篤􅁃冰􅁃翼欲立會稽王昱爲嗣中書監何充建議立皇子聃帝從之九月丙申立聃爲皇太子戊戍帝崩于式乾殿已亥何充以遺旨奉太子即位大赦由是冰翼深恨充尊皇后褚氏爲皇太后時穆帝方二嵗太后臨朝稱制何充加中書監録尚書事充自陳旣録尚書不冝復監中書許之復加侍中充以左將軍褚裒太后之父宜綜朝政上䟽薦裒參録尚書乃以裒爲侍中衛將軍録尚書事持節督剌史如故裒以近戚懼獲譏嫌上䟽固請居藩攺授都督徐兖青三州揚州之二郡諸軍事衛將軍徐兖二州剌史鎭京口尚書奏裒見太后在公庭則如臣禮私覿則嚴父從之冬十月乙丑葬康帝于崇平陵江州剌史􅁃冰有疾太后徴冰輔政冰辭十一月􅁃辰卒􅁃翼以家國情事留子方之為建武將軍戍襄陽方之年少以參軍毛穆之為建武司馬以輔之穆之寳之子也翼還鎮夏口詔翼復督江州又領豫州刺史翼辭豫州復欲移鎮樂鄉詔不許翼仍繕修軍器大佃積榖以圖後舉趙王虎作河橋於靈昌津采石為中濟石下輒隨流用功五百餘萬而橋不成虎怒斬匠而罷孝宗穆皇帝上之上永和元年春正月甲戌朔皇太后設白紗帷於太極殿抱帝臨軒趙義陽公鑒鎮闗中役煩賦重文武有長髮者輙㧞為冠纓餘以給宮人長史取髪白趙王虎虎徴鑒還鄴以樂平公苞代鎮長安發雍洛秦并州十六萬人治長安未央宮虎好獵晚嵗體重不能跨馬乃造獵車千乗刻期校獵自靈昌津南至滎陽東極陽都為獵場使御史監察其中禽獸有犯者罪至大辟民有美女佳牛馬御史求之不得皆誣以犯獸論死者百餘人發諸州二十六萬人修洛陽宮發百姓牛二萬頭配朔州牧官増置女官二十四等東宮十二等公矦七十餘國皆九等大發民女三萬餘人料為三等以配之太子諸公私令采發者又將萬人郡縣務求美色多强奪人妻殺其夫及夫自殺者三千餘人至鄴虎臨軒簡第以使者為能封矦者十二人荆楚揚徐之民流叛略盡守令坐不能綏懐下獄誅者五十餘人金紫光禄大夫逯明因侍切諫虎大怒使龍騰拉殺之燕王皝以牛假貧民使佃苑中稅其什之八自有牛者稅其七記室參軍封裕上書諫以為古者什一而稅天下之中正也降及魏晉仁政衰薄假官田官牛者不過稅其什六自有牛者中分之猶不取其七八也自永嘉以來海内蕩析武宣王綏之以徳華夷之民萬里輻湊襁負而歸之者若赤子之歸父母是以戸口十倍於舊無田者什有三四及殿下繼統南摧彊趙東兼高句麗北取宇文拓地三千里増民十萬户是宜悉罷苑囿以賦新民無牛者官賜之牛不當更収重稅也且以殿下之民用殿下之牛牛非殿下之有將何在哉如此則戎旗南指之日民誰不簞食壺漿以迎王師石虎誰與處矣川瀆溝渠有廢塞者皆應通利旱則灌溉潦則䟽泄一夫不耕或受之飢况游食數萬何以得家給人足乎今官司猥多虚費廩禄茍才不周用皆宜澄汰工啇末利宜立常員學生三年無成徒塞英儁之路皆當歸之於農殿下聖徳寛明愽采芻蕘參軍王憲大夫劉明並以言事忤旨主者處以大辟殿下雖恕其死猶免官禁錮夫求諌諍而罪直言是猶適越而北行必不獲其所志矣右長史宋該等阿媚苟容輕劾諫士已無骨鯁嫉人有之掩蔽耳目不忠之甚者也皝乃下令稱覽封記室之諫孤實懼焉國以民為本民以穀為命可悉罷苑囿以給民之無田者實貧者官與之牛力有餘願得官牛者並依魏晉舊灋溝瀆果有益者令以時修治今戎事方興勲伐既多官未可減俟中原平壹徐更議之工啇學生皆當裁擇夫人臣關言於人主至難也雖有狂妄當擇其善者而從之王憲劉明雖罪應廢黜亦由孤之無大量也可悉復本官仍居諫司封生蹇蹇深得王臣之體其賜錢五萬宣示内外有欲陳孤過者不拘貴賤勿有所諱皝雅好文學常親臨庠序講授考校學徒至千餘人頗有妄濫者故封裕及之詔徴衛將軍褚裒欲以為揚州刺史錄尚書事吏部尚書劉遐長史王胡之說裒曰㑹稽王令徳雅望國之周公也足下宜以大政授之裒乃固辭歸藩壬戍以㑹稽王昱為撫軍大將軍錄尚書六條事昱清虛寡欲尤善玄言常以劉惔王濛及潁川韓伯為談客又辟郗超為撫軍掾謝萬為從事中郎超鑒之孫也少卓犖不羈父愔簡黙沖退而嗇於財積錢至數千萬甞開庫任超所取超散施親故一日都盡萬安之弟也清曠秀邁亦有時名燕有黒龍白龍見于龍山交首遊戲解角而去燕王皝親祀以太牢赦其境内命所居新宮曰和龍都亭肅侯􅁃翼疽發于背表子爰之行輔國將軍荆州刺史委以後任司馬義陽朱燾為南蠻校尉以千人守巴陵秋七月庚午卒翼部將干瓉等作亂殺冠軍將軍曹據朱燾與安西長史江虨建武司馬毛穆之將軍袁真等共誅之虨統之子也八月豫州刺史路永叛奔趙趙王虎使永屯壽春􅁃翼既卒朝議皆以諸􅁃世在西藩人情所安宜依翼所請以􅁃爰之代其任何充曰荆楚國之西門戸口百萬北帶彊胡西隣勁蜀地勢險阻周旋萬里得人則中原可定失人則社稷可憂陸抗所謂存則吴存亡則呉亡者也豈可以白面少年當之哉桓温英略過人有文武器幹西夏之任無出温者議者又曰􅁃爰之肯避温乎如令阻兵恥懼不淺充曰温足以制之諸君勿憂丹楊尹劉惔每奇温才然知其有不臣之志謂㑹稽王昱曰温不可使居形勝之地其位號常宜抑之勸昱自鎮上流以已為軍司昱不聴又請自行亦不聴庚辰以徐州刺史桓温為安西將軍持節都督荆司雍益梁寧六州諸軍事領䕶南蠻校尉荆州刺史爰之果不敢争又以劉惔監沔中諸軍事領義成太守代􅁃方之徙方之爰之于豫章桓温甞乗雪欲獵先過劉惔惔見其裝束甚嚴謂之曰老賊欲持此何為温笑曰我不為此卿安得坐談乎漢主勢之弟大將軍廣以勢無子求為太弟勢不許馬當解思明諫曰陛下兄弟不多若復有所廢將益孤危固請許之勢疑其與廣有謀収當思明斬之夷其三族遣太保李弈襲廣於涪城貶廣為臨卭侯廣自殺思明被収歎曰國之不亡以我數人在也今其殆矣言笑自若而死思明有智略敢諫諍馬當素得人心及其死士民無不哀之冬十月燕王皝使慕容恪攻高句麗㧞南蘇置戍而還十二月張駿伐焉􅂄降之是嵗駿分武威等十一郡為涼州以世子重華為刺史分興晉等八郡為河州以寧戎校尉張瓘為刺史分敦煌等三郡及西域都䕶等三營為沙州以西胡校尉楊宣為刺史駿自稱大都督大將軍假涼王督攝三州始置祭酒郎中大夫舎人謁者等官官號皆倣天朝而微變其名車服旌旗擬於王者趙王虎以冠軍將軍姚弋仲為持節十郡六夷大都督冠軍大將軍弋仲清儉鯁直不治威儀言無畏避虎甚重之朝之大議毎與參决公卿皆憚而下之武城左尉虎寵􅁎之弟也甞入弋仲營侵擾其部衆弋仲執而數之曰尓爲禁尉迫脅小民我為大臣目所親見不可縱也命左右斬之尉叩頭流血左右固諌乃止燕王皝以為古者諸侯即位各稱元年於是始不用晉年號自稱十二年趙王虎使征東將軍鄧恒將兵數萬屯樂安治攻具為取燕之計燕王皝以慕容霸為平狄將軍戍徒河恒畏之不敢犯二年春正月丙寅大赦己卯都鄉文穆矦何充卒充有器局臨朝正色以社稷為己任所選用皆以功效不私親舊初夫餘居于鹿山為百濟所侵部落衰散西徙近燕而不設僃燕王皝遣世子儁帥慕容軍慕容恪慕輿根三將軍萬七千􅀐襲夫餘雋居中指授軍事皆以任恪遂㧞夫餘虜其王玄及部落五萬餘口而還皝以玄為鎮軍將軍妻以女二月癸丑以左光禄大夫蔡謨領司徒與會稽王昱同輔政褚裒薦前光禄大夫顧和前司徒左長史殷浩三月丙子以和為尚書令浩為建武將軍揚州刺史和有母喪固辭不起謂所親曰古人有釋衰絰從王事者以其才足幹時故也如和者正足以虧孝道傷風俗耳識者美之浩亦固辭㑹稽王昱與浩書曰屬當厄運危弊理極足下沈識淹長足以經濟若復深存挹退茍遂本懐吾恐天下之事於此去矣足下去就即時之廢興則家國不異足下宜深思之浩乃就職夏四月己酉朔日有食之五月丙戌西平忠成公張駿薨官屬上世子重華為使持節大都督太尉䕶羌校尉涼州牧西平公假涼王赦其境内尊嫡母嚴氏為大王太后母馬氏為王太后趙中黄門嚴生惡尚書朱軌㑹久雨生譖軌不脩道路又謗訕朝政趙王虎囚之蒲洪諫曰陛下既有襄國鄴宮又修長安洛陽宮殿將以何用作獵車千乗環數千里以養禽獸奪人妻女十萬餘口以實後宮聖帝明王之所為固若是乎今又以道路不修欲殺尚書陛下徳政不修天降滛雨七旬乃霽霽方二日雖有鬼兵百萬亦未能去道路之塗潦而況人乎政刑如此其如四海何其如後代何願止作徒罷苑囿出宮女赦朱軌以副衆望虎雖不悅亦不之罪為之罷長安洛陽作役而竟誅朱軌又立私論朝政之灋聴吏告其君奴告其主公卿以下朝覲以目相顧不敢復相過從談語趙將軍王擢擊張重華襲武街執䕶軍曹權胡宣徙七千餘户于雍州涼州刺史麻秋將軍孫伏都攻金城太守張沖請降涼州震動重華悉發境内兵使征南將軍裴恒將之以禦趙恒壁於廣武久而不戰涼州司馬張躭言於重華曰國之存亡在兵兵之勝敗在將今議者舉將多推宿舊夫韓信之舉非舊徳也蓋明主之舉舉無常人才之所堪則授以大事今彊㓂在境諸將不進人情危懼主簿謝艾兼資文武可用以禦趙重華召艾問以方略艾願請兵七千人必破趙以報重華拜艾中堅將軍給步騎五千使擊秋艾引兵出振武夜有二梟鳴于牙中艾曰六愽得梟者勝今梟鳴牙中克敵之兆也進與趙戰大破之斬首五千級重華封艾為福禄伯麻秋之克金城也縣令敦煌車濟不降伏劒而死秋又攻大夏䕶軍梁式執太守宋晏以城應秋秋遣晏以書誘致宛戍都尉敦煌宋矩矩曰為人臣功既不成唯有死節耳先殺妻子而後自刎秋曰皆義士也収而葬之冬漢太保李弈自晉壽舉兵反蜀人多從之衆至數萬漢主勢登城拒戰弈單騎突門門者射而殺之其衆皆潰勢大赦境内改年嘉寧勢驕滛不恤國事多居禁中罕接公卿踈忌舊臣信任左右讒諂並進刑罰苛濫由是中外離心蜀土先無獠至是始從山出自巴西至犍為梓潼布滿山谷十餘萬落不可禁制大為民患加以饑饉四境之内遂至蕭條安西將軍桓温將伐漢將佐皆以為不可江夏相袁喬勸之曰夫經略大事固非常情所及智者了於胷中不必待衆言皆合也今為天下之患者胡蜀二冦而巳蜀雖險固比胡為弱將欲除之宜先其易者李勢無道臣民不附且恃其險逺不修戰備宜以精卒萬人輕齎疾趨比其覺之我巳出其險要可一戰擒也蜀地富饒戸口繁庶諸葛武矦用之抗衡中夏若得而有之國家之大利也論者恐大軍既西胡必闚覦此似是而非胡聞我萬里逺征以為内有重僃必不敢動縱有侵軼縁江諸軍足以拒守必無憂也温從之喬􅉞之子也十一月辛未温帥益州刺史周撫南郡太守譙王無忌伐漢拜表即行委安西長史范汪以留事加撫督梁州之四郡諸軍事使袁喬帥二千人為前鋒朝廷以蜀道險逺温衆少而深入皆以為憂惟劉惔以為必克或問其故惔曰以愽知之温善愽者也不必得則不為但恐克蜀之後温終專制朝廷耳三年春二月􅁊温軍至青衣漢主勢大發兵遣叔父右衛將軍福從兄鎮南將軍權前將軍昝堅等將之自山陽趣合水諸將欲設伏於江南以待晉兵昝堅不從引兵自江北鴛鴦碕渡向犍為三月温至彭模議者欲分為兩軍異道俱進以分漢兵之􅀔袁喬曰今懸軍深入萬里之外勝則大功可立不勝則噍類無遺當合􅀔齊力以取一戰之捷若分兩軍則衆心不一萬一偏敗大事去矣不如全軍而進棄去釡甑齎三日糧以示無還心勝可必也温從之留參軍孫盛周楚將羸兵守輜重温自將步卒直指成都楚撫之子也李福進攻彭模孫盛等􅁬擊走之温進遇李權三戰三捷漢兵散走歸成都鎮東將軍李位都迎詣温降昝堅至犍為乃知與温異道還自沙頭津濟比至温巳軍於成都之十里陌堅衆自潰勢悉衆出戰于笮橋温前鋒不利參軍龔䕶戰死矢及温馬首衆懼欲退而鼓吏誤鳴進鼓袁喬㧞劒督士卒力戰遂大破之温乘勝長驅至成都縱火燒其城門漢人惶懼無復闘志勢夜開東門走至葭萌使散騎常侍王㓜送降文於温自稱略陽李勢叩頭死罪尋輿襯面縳詣軍門温解縳焚襯送勢及宗室十餘人於建康引漢司空譙獻之等以為參佐舉賢旌善蜀人悅之日南太守夏侯覽貪縱侵刻胡商又科調船材云欲有所討由是諸國恚憤林邑王文攻陷日南將士死者五六千殺覽以尸祭天檄交州刺史朱蕃請以郡北横山為界文既去蕃使督䕶劉雄戍日南漢故尚書僕射王誓鎮東將軍鄧定平南將軍王􅃳將軍隗文等皆舉兵反衆各萬餘􅁊温自擊定使袁喬擊文皆破之温命益州剌史周撫鎮彭模斬王誓王潤温留成都三十日振旅還江陵李勢至建康封歸義矦夏四月丁巳鄧定隗文等入據成都征虜將軍楊謙棄涪城退保德陽趙涼州刺史麻秋攻枹罕晉昌太守郎坦以城大難守欲棄外城武成太守張悛曰棄外城則動衆心大事去矣寧戎校尉張璩從悛言固守大城秋帥衆八萬圍壍數重雲梯地突百道皆進城中禦之秋衆死傷數萬趙王虎復遣其將劉渾等帥步騎二萬㑹之郎坦恨言不用教軍士李嘉濳引趙兵千餘人登城璩督諸將力戰殺二百餘人趙兵乃退璩燒其攻具秋退保大夏虎以中書監石寧為征西將軍帥并司州兵二萬餘人為秋等後繼張重華將宋秦等帥戸二萬降于趙重華以謝艾為使持節軍師將軍帥步騎三萬進軍臨河艾乗軺車戴白幍鳴鼓而行秋望見怒曰艾年少書生冠服如此輕我也命黑矟龍驤三千人馳擊之艾左右大擾或勸艾宜乗馬艾不從下車踞胡床指麾處分趙人以為有伏兵懼不敢進别將張􅈘自間道引兵截趙軍後趙軍退艾乗勢進擊大破之斬其將杜勲汲魚獲首虜一萬三千級秋單馬奔大夏五月秋與石寧復帥衆十二萬進屯河南劉寧王擢略地晉興廣武武街至于曲栁張重華使將軍牛旋禦之退守枹罕姑臧大震重華欲親出拒之謝艾固諫别駕從事索遐曰君者一國之鎮不可輕動乃以艾為使持節都督征討諸軍事行衛將軍遐為軍正將軍帥步騎二萬拒之别將楊康敗劉寧于沙阜寧退屯金城六月辛酉大赦秋七月林邑復䧟日南殺督䕶劉雄隗文鄧定等立故國師范長生之子賁為帝而奉之以妖異惑衆蜀人多歸之趙王虎復遣征西將軍孫伏都將軍劉渾帥步騎二萬㑹麻秋軍長驅濟河擊張重華遂城長最謝艾建牙誓衆有風吹旌旗東南指索遐曰風為號令今旌旗指敵天所賛也艾軍于神鳥王擢與艾前鋒戰敗走還河南八月戊午艾進擊秋大破之秋遁歸金城虎聞之歎曰吾以偏師定九州今以九州之力困於枹罕彼有人焉未可圖也艾還討叛虜斯骨真等萬餘落皆破平之趙王虎據十州之地聚歛金帛及外國所獻珍異府庫財物不可勝紀猶自以為不足悉發前代陵墓取其金寶沙門呉進言於虎曰胡運將衰晉當復興宜苦役晉人以厭其氣虎使尚書張羣發近郡男女十六萬人車十萬乗運土築華林苑及長牆于鄴北廣袤數十里申鐘石璞趙攬等上䟽陳天文錯亂百姓彫弊虎大怒曰使苑牆朝成吾夕􅃿無恨矣促張羣使然燭夜作暴風大雨死者數萬人郡國前後送蒼麟十六白鹿七虎命司虞張曷柱調之以駕芝蓋大朝會列於殿庭九月命太子宣出祈福于山川因行遊獵宣乗大輅羽葆華蓋建天子旌旗十有六軍戎卒十八萬出自金明門虎從其後宫升陵霄觀望之笑曰我家父子如是自非天崩地陷當復何愁但抱子弄孫日為樂耳宣所舎輙列人為長圍四面各百里驅禽獸至暮皆集其所使文武跪立重行圍守炬火如晝命勁騎百餘馳射其中宣與􅁎妾乗輦臨觀獸盡而止或獸有迸逸當圍守者有爵則奪馬步驅一日無爵則鞭之一百士卒饑凍死者萬有餘人所過三州十五郡資儲皆無孑遺虎復命秦公韜繼出自并州至于秦雍亦如之宣怒其與已鈞敵愈嫉之宦者趙生得幸於宣無寵於韜微勸宣除之於是始有殺韜之謀矣趙麻秋又襲張重華將張瑁敗之斬首三千餘級枹罕䕶軍李逵帥衆七千降于趙自河以南氐羌皆附於趙冬十月乙丑遣侍御史俞歸至涼州授張重華侍中大都督督隴右闗中諸軍事大將軍涼州刺史西平公歸至姑臧重華欲稱涼王未肯受詔使所親沈猛私謂歸曰主公弈丗為晉忠臣今曽不如鮮卑何也朝廷封慕容皝為燕王而主公纔為大將何以襃􅂆忠賢乎明臺宜移河右共􅂆州主為涼王人臣出使茍利社稷專之可也歸曰吾子失言昔三代之王也爵之貴者莫􅀂上公及周之衰呉楚始僭號稱王而諸矦亦不之非蓋以蠻夷畜之也借使齊魯稱王諸矦豈不四面攻之乎漢高祖封韓彭為王尋皆誅滅蓋權時之宜非厚之也聖上以貴公忠賢故爵以上公任以方伯寵榮極矣豈鮮卑夷狄所可比哉且吾聞之功有大小賞有重輕今貴公始繼丗而為王􅀂帥河右之衆東平胡羯脩復陵廟迎天子返洛陽將何以加之乎重華乃止武都氐王楊初遣使來稱藩詔以初為使持節征南將軍雍州剌史仇池公十二月振威䕶軍蕭敬文殺征虜將軍楊謙攻涪城陷之自稱益州牧遂取巴西通于漢中資治通鑑卷第九十七
