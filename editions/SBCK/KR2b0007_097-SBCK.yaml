seq: 97
front:
  text: 立城壁公私勞擾又江州當泝流數千里供給軍府力役増倍且武昌實江東鎭戍之中非但扞禦上流而巳緩急赴告駿奔不難􅀂移樂鄉逺在西陲一朝江渚有虞不相接救方嶽重將固當居要害之地爲内外形勢使闚􅎿之心不知所向昔秦忌亡胡之䜟卒爲劉項之資周惡檿弧之謡而成襃姒之亂是以逹人君子直道而行禳避之道皆所不取正當擇人事之勝理思社稷之長計耳朝議亦以爲然翼乃止夏五月乙卯帝不豫六月庚寅疾篤或詐爲尚書符敕宫門無得内宰相衆皆失色􅁃冰曰此必詐也推問果然帝二子丕弈皆在襁褓􅁃冰自以兄弟秉權日乆恐易丗之後親屬愈踈爲它人所間每說帝以國有彊敵宜立長君請以母弟琅邪王岳爲嗣帝許之中書令何充曰父子相傳先王舊典易之者鮮不致亂故武王不授聖弟非不愛也今琅邪踐阼將如孺子何冰不聽下詔以岳爲嗣并以弈繼琅邪哀王壬辰冰充及武陵王晞㑹稽王昱尚書令諸葛恢並受顧命癸巳帝崩帝幼沖嗣位不親庶政及長頗有勤儉之德甲午琅邪王即皇帝位大赦己亥封成帝子丕爲琅邪王弈爲東海王康帝亮隂不言委政於􅁃冰何充秋七月丙辰葬成帝于興平陵帝徒行送喪至閶闔門乃升素輿至陵所旣葬帝臨軒􅁃冰何充侍坐帝曰朕嗣鴻業二君之力也充曰陛下龍飛臣冰之力也􅀂如臣議不覩升平之丗帝有慙色已未以充爲驃騎將軍都督徐州揚州之晉陵諸軍事領徐州剌史鎭京口避諸􅁃也冬十月燕王皝遷都龍城赦其境内建威將軍翰言於皝曰宇文彊盛日乆屢爲國患今逸豆歸簒竊得國羣情不附加之性識庸闇將帥非才國無防衛軍無部伍臣乆在其國悉其地形雖逺附彊羯聲勢不接無益救援今􅀂擊之百舉百克然高句麗去國密邇常有闚􅎿之志彼知宇文旣亡禍將及已必乗虚深入掩吾不備􅀂少留兵則不足以守多留兵則不足以行此心腹之患也宐先除之觀其勢力一舉可克宇文自守之虜必不能逺來爭利旣取髙句麗還取宇文如返手耳二國旣平利盡東海國富兵彊無返顧之憂然後中原可圗也皝曰善將擊髙句麗髙句麗有二道其北道平闊􅀯道險狹衆欲從北道翰曰虜以常情料之必謂大軍從北道當重北而輕􅀯王宜帥銳兵從􅀯道擊之出其不意九都不足取也别遣偏師岀北道縱有蹉跌其腹心巳潰四支無能爲也皝從之十一月皝自將勁兵四萬出􅀯道以慕容翰慕容霸爲前鋒别遣長史王㝢等將兵萬五千出北道以伐髙句麗髙句麗王釗果遣弟武帥精兵五萬拒北道自帥羸兵以僃􅀯道慕容翰等先至與釗合戰皝以大衆繼之左常侍鮮于亮曰臣以俘虜蒙王國士之恩不可以不報今日臣死日也獨與數騎先犯髙句麗陳所嚮摧䧟髙句麗陳動大衆因而乗之髙句麗兵大敗左長史韓壽斬髙句麗將阿佛和度加諸軍乗勝追之遂入丸都釗單􅀐走輕車將軍慕輿埿追獲其母周氏及妻而還會王㝢等戰於北道皆敗没由是皝不復窮追遣使招釗釗不出皝將還韓壽曰髙句麗之地不可戍守今其主亡民散潜伏山谷大軍旣去必復鳩聚􅀵其餘燼猶足爲患請載其父尸囚其生母而歸俟其束身自歸然後返之撫以恩信䇿之上也皝從之發釗父乙弗利墓載其尸收其府庫累丗之寶虜男女五萬餘口燒其宫室毀丸都城而還十二月壬子立妃褚氏爲皇后徴豫章太守褚裒爲侍中尚書裒自以后父不願居中任事苦求外出乃除建威將軍江州剌史鎭半洲
