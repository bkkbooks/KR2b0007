seq: 38
front:
  text: 斬侍子登及諸貴人從者喪單于遣云當子男大且渠奢等至塞迎之咸到單于庭陳莽威德莽亦多遺單于金珍因諭說改其號號匃奴曰恭奴單于曰善于賜印綬封骨都矦當爲後安公當子男奢爲後安矦單于貪莽金幣故曲聽之然㓂盜如故莽意以爲制定則天下自平故銳思於地理制禮作樂講合六經之􅀃公卿旦入暮出論議連年不決不暇省獄訟􅁈結民之急務縣宰缺者數年守兼一切貪殘日甚中郎將繡衣執法在郡國者並乗權勢傳相舉奏又十一公士分布勸農桑班時令按諸章冠蓋相望交錯道路召㑹吏民逮捕證左郡縣賦斂遞相賕賂白黒紛然守闕告訴者多莽自見前顓權以得漢政故務自攬衆事有司受成茍免諸寶物名帑藏錢榖官皆宦者領之吏民上封事宦官左右開發尚書不得知其畏僃臣下如此又好變改制度政令煩多當奉行者輙質問乃以從事前後相乗憒眊不渫莽常御燈火至明猶不能勝尚書因是爲姦寢事上書待報者連年不得去拘繫郡縣者逢赦而後出衞卒不交代者至三歲榖糴常貴邊兵二十餘萬人仰衣食縣官五原代郡尤被其毒起爲盜賊數千人爲輩轉入旁郡莽遣捕盜將軍孔仁將兵與郡縣合擊歲餘乃定
  hash: sha256:76f5e49117276cdd81d276da635b3f8bd7e74039c9bfd24b3597a217ed9a384d
body:
  text: 邯鄲以北大雨水出深者數丈流殺數千人三年春二月乙酉地震大雨雪關東尤甚深者一丈竹柏或枯大司空王邑上書以地震乞骸骨莽不許曰夫地有動有震震者有害動者不害春秋記地震易繫坤動動靜辟翕萬物生焉其好自誣飾皆此類也先是莽以制作未定上自公矦下至小吏皆不得俸禄夏五月莽下書曰予遭陽九之阨百六之㑹國用不足民人騷動自公卿以下一月之禄十緵布二匹或帛一匹予毎念之未嘗不戚焉今阨㑹已度府帑雖未能充略頗稍給其以六月朔庚寅始賦吏禄皆如制度四輔公卿大夫士下至輿僚凡十五等僚禄一歲六十六斛稍以差增上至四輔而爲萬斛云莽又曰古者歲豐穰則充其禮有災害則有所損與百姓同憂喜也其用上計時通計天下幸無災害者太官膳羞僃其品矣即有災害以什率多少而損膳焉自十一公六司六卿以下各分州郡國邑保其災害亦以十率多少而損其禄郎從官中都官吏食禄都内之委者以太官膳羞僃損而爲節冀上下同心勸進農業安元元焉莽之制度煩碎如此課計不可理吏終不得禄各因官職爲姦受取賕賂以自共給焉戊辰長平館西岸崩壅涇水不流毁而北行羣臣上夀以爲河圖所謂以土填水匈奴滅亡之祥也莽乃遣并州牧宋弘游擊都尉任萌等將兵擊匈奴至邊上屯秋七月辛酉霸城門災戊子晦日有食之大赦天下平蠻將軍馮茂擊句町士卒疾疫死者什六七賦斂民財什取五益州虚耗而不克徴還下獄死冬更遣寧始將軍廉丹與庸部牧史熊大發天水隴西􅀐士廣漢巴蜀犍爲吏民十萬人轉輸者合二十萬人擊之始至頗斬首數千其後軍糧前後不相及士卒飢疫莽徴丹熊丹熊願益調度必克乃還復大賦斂就都大尹馮英不肯給上言自西南夷反叛以來積且十年郡縣距擊不已續用馮茂茍施一切之政僰道以南山險髙深茂多敺衆逺居費以億計吏士罹毒氣死者什七今丹熊懼於自詭期㑹調發諸郡兵榖復訾民取其什四空破梁州功終不遂宜罷兵屯田明設購賞莽怒免英官後頗覺寤曰英亦未可厚非復以英爲長沙連率粤嶲蠻夷任貴亦殺太守枚根自立爲卭榖王翟義黨王孫慶捕得莽使太醫尚方與巧屠共刳剥之量度五臧以竹筳導其脉知所終始云可以治病是􅀊遣大使五威將王駿西域都護李崇戊巳校尉郭欽出西域諸國皆郊迎送兵榖駿欲襲擊之焉􅂄詐降而聚兵自僃駿等將莎車􅀛兹兵七千餘人分爲數部命郭欽及佐帥何封别將居後駿等入焉􅂄焉􅂄伏兵要遮駿及姑墨封犂危須國兵爲反閒還共襲駿等皆殺之欽封後至焉􅂄焉􅂄兵未還欽襲擊殺其老弱從車師還入塞莽拜欽爲填外將軍封劋胡子何封爲集胡男李崇收餘士還保􅀛兹及莽敗崇没西域遂絶四年夏六月莽更授諸矦茅土於明堂親設文石之平陳菁茅四色之土告於岱宗泰社后土先祖先妣以班授之莽好空言慕古灋多封爵人性實吝嗇託以地理未定故且先賦茅土用慰喜封者秋八月莽親之南郊鑄作威斗以五石銅爲之若北斗長二尺五寸欲以厭勝衆兵旣成令司命負之莽出在前入在御旁莽置羲和命士以督五均六筦郡有數人皆用富賈爲之乗傳求利交錯天下因與郡縣通姦多張空簿府藏不實百姓愈病是歲莽復下詔申明六筦每一筦爲設科條防禁犯者罪至死姦吏猾民並侵衆庶各不安生又一切調上公以下諸有奴婢者率一口出錢三千六百天下愈愁納言馮常以六筦諫莽大怒免常官灋令煩苛民揺手觸禁不得耕桑繇役煩劇而枯旱蝗蟲相因獄訟不決吏用苛暴立威旁縁莽禁侵刻小民富者不自保貧者無以自存於是並起爲盜賊依阻山澤吏不能禽而覆蔽之浸淫日廣臨淮􅀲田儀等依阻㑹稽長州琅邪吕母聚黨數千人殺海曲宰入海中爲盜其衆浸多至萬數荆州饑饉民衆入野澤掘鳬茈而食之更相侵奪新市人王厈王鳳爲平理諍訟遂推爲渠帥衆數百人於是諸亡命者南陽馬武潁川王常成丹等皆往從之共攻離郷聚臧於緑林山中數月閒至七八千人又有南郡張霸江夏羊牧等與王厈俱起衆皆萬人莽遣使者即赦盜賊還言盜賊解􅂺復合問其故皆曰愁法禁煩苛不得舉手力作所得不足以給貢稅閉門自守又坐鄰伍鑄錢挾銅姦吏因以愁民民窮悉起爲盜賊莽大怒免之其或順指言民驕􅃛當誅及言時運適然且滅不乆莽􅀃輒遷官五年春正月朔北軍南門災以大司馬司允費興爲荆州牧見問到部方略興對曰荆楊之民率依阻山澤以漁采爲業間者國張六筦稅山澤妨奪民之利連年乆旱百姓饑窮故爲盜賊興到部欲令明曉告盜賊歸田里假貸犁牛種食闊其租賦冀可以解釋安集莽怒免興官天下吏以不得俸禄並爲姦利郡尹縣宰家累千金莽乃考始建國二年胡虜猾夏以來諸軍吏及縁邊吏大夫以上爲姦利増産致富者收其家所有財産五分之四以助邊急公府士馳傳天下考覆貪饕􅀜吏告其將奴婢告其主冀以禁姦而姦愈甚莽孫功崇公宗坐自畫容貌被服天子衣冠刻三印發覺自殺宗姉妨爲衞將軍王興夫人坐祝詛姑殺婢以絶口與興皆自殺是歲揚雄卒􅀄成帝之世雄爲郎給事黄門與莽及劉秀並列哀帝之􅀄又與董賢同官莽賢爲三公權傾人主所薦莫不拔擢而雄三世不徙官及莽簒位雄以􅂄老乆次轉爲大夫恬於埶利好古樂道欲以文章成名於後世乃作太􅀇以綜天地人之道又見諸子各以其智舛馳大抵詆訾聖人即爲怪迂析辯詭辭以撓世事雖小辯終破大道而惑衆使溺於所聞而不自知其非也故人時有問雄者常用法應之號曰法言用心於内不求於外於時人皆忽之唯劉秀及范逡敬焉而􅁊譚以爲絶倫鉅鹿矦芭師事焉大司空王邑納言嚴尤聞雄死謂􅁊譚曰子常稱揚雄書豈能傳於後世乎譚曰必傳顧君與譚不及見也凡人賤近而貴逺親見揚子雲禄位容貌不能動人故輕其書昔老聃著虚無之言兩篇薄仁義非禮學然後好之者尚以爲過於五經自漢文景之君及司馬遷皆有是言今揚子之書文義至深而論不詭於聖人則必度越諸子矣琅邪樊崇起兵於莒衆百餘人轉入太山羣盜以崇勇猛皆附之一歲閒至萬餘人崇同郡人逄安東海人徐宣謝禄楊音各起兵合數萬人復引從崇共還攻莒不能下轉掠青徐閒又有東海刁子都亦起兵鈔擊徐兖莽遣使者發郡國兵擊之不能克烏累單于死弟左賢王輿立爲呼都而尸道臯若鞮單于輿旣立貪利賞賜遣大且渠奢與伊墨居次云女弟之子醯櫝王俱奉獻至長安莽遣和親矦歙與奢等俱至制虜塞下與云及須卜當㑹因以兵迫脅云當將至長安云當小男從塞下得脫歸匈奴當至長安莽拜爲須卜單于欲出大兵以輔立之兵調度亦不合而匈奴愈怒並入北邊爲㓂六年春莽見盜賊多乃令太史推三萬六千歲歷紀六歲一改元布天下下書自言己當如黄帝僊升天欲以誑燿百姓銷解盜賊衆皆笑之初獻新樂於明堂太廟更始將軍廉丹擊益州不能克益州夷棟􅁞若豆等起兵殺郡守越嶲夷人大牟亦叛殺略吏人莽召丹還更遣大司馬護軍郭興庸部牧李曅擊蠻夷若豆等大傅羲叔士孫喜清潔江湖之盜賊而匈奴㓂邊甚莽乃大募天下丁男及死罪囚吏民奴名曰豬突豨勇以爲銳卒一切稅天下吏民訾三十取一縑帛皆輸長安令公卿以下至郡縣黄綬皆保養軍馬多少各以秩爲差吏盡復以與民又博募有竒技術可以攻匈奴者將待以不次之位言便宜者以萬數或言能度水不用舟楫連馬接􅀐濟百萬師或言不持斗糧服食藥物三軍不饑或言能飛一日千里可窺匈奴莽輒試之取大鳥翮爲兩翼頭與身皆著毛通引環紐飛數百歩墯莽知其不可用茍欲獲其名皆拜爲理軍賜以車馬待發初莽之欲誘迎須卜當也大司馬嚴尤諌曰當在匈奴右部兵不侵邊單于動靜輒語中國此方面之大助也于今迎當置長安槀街一胡人耳不如在匈奴有益莽不聽旣得當欲遣尤與廉丹擊匈奴皆賜姓徴氏號二徴將軍令誅單于輿而立當代之出車城西横廐未發尤素有智略非莽攻伐四夷數諫不從及當出廷議尤固言匈奴可且以爲後先憂山東盜賊莽大怒䇿免尤大司空議曹史代郡范升奏記王邑曰升聞子以人不間於其父母爲孝臣以下不非其君上爲忠今衆人咸稱朝聖皆曰公明蓋明者無不見聖者無不聞今天下之事昭昭於日月震震於靁霆而朝云不見公云不聞則元元焉所呼天公以爲是而不言則過小矣知而從令則過大矣二者於公無可以免宜乎天下歸怨於公矣朝以逺者不服爲至念升以近者不恱爲重憂今動與時戾事與道反馳騖覆車之轍踵循敗事之後後出益可怪晚發愈可懼耳方春歲首而動發逺役藜藿不充田荒不耕榖價騰躍斛至數千吏民䧟於湯火之中非國家之民也如此則胡貊守闕青徐之㓂在於帷帳矣升有一言可以解天下倒縣免元元之急不可書傳願蒙引見極陳所懷邑不聽翼平連率田況奏郡縣訾民不實莽復三十取一以況忠言憂國進爵爲伯賜錢二百萬衆庶皆詈之青徐民多棄郷里流亡老弱死道路壯者入賊中夙夜連率韓博上言有竒士長丈大十圍來至臣府曰欲奮擊胡虜自謂巨母霸出於蓬萊東南五城西北昭如海瀕軺車不能載三馬不能勝即日以大車四馬建虎旗載霸詣闕霸卧則枕鼓以鐵箸食此皇天所以輔新室也願陛下作大甲髙車賁育之衣遣大將一人與虎賁百人迎之於道京師門户不容者開髙大之以示百蠻鎮安天下博意欲以風莽莽聞惡之留霸在所新豐更其姓曰巨母氏謂因文母太后而霸王符也徴博下獄以非所宜言棄市關東饑旱連年刁子都等黨衆寖多至六七萬地皇元年春正月乙未赦天下改元曰地皇從三萬六千歲歷號也莽下書曰方出軍行師敢有趨讙犯灋者輙論斬母須時於是春夏斬人都市百姓震懼道路以目莽見四方盜賊多復欲厭之又下書曰予之皇初祖考黄帝定天下將兵爲上將軍内設大將外置大司馬五人大將軍至士吏凡七十三萬八千九百人士千三百五十萬人予受符命之文稽前人將條僃焉於是置前後左右中大司馬之位賜諸州牧至縣宰皆有大將軍偏裨校尉之號焉乘傳使者經歷郡國日且十輩倉無見榖以給傳車馬不能足賦取道中車馬取辦於民秋七月大風毁王路堂莽下書曰乃壬午餔時有烈風靁雨發屋折木之變予甚恐焉伏念一旬迷乃解矣昔符命文立安爲新遷王臨國洛陽爲統義陽王議者皆曰臨國洛陽爲統謂據土中爲新室統也宜爲皇太子自此後臨乆病雖瘳不平臨有兄而稱太子名不正惟即位以來隂陽未和榖稼鮮耗蠻夷猾夏㓂賊姦宄人民征營無所錯手足深惟厥咎在名不正焉其立安爲新遷王臨爲統義陽王莽又下書曰寳黄厮赤其令郎從官皆衣絳望氣爲數者多言有土功象九月甲申莽起九廟於長安城南黄帝廟方四十丈髙十七丈餘廟半之制度甚盛博徴天下工匠及吏民以義入錢榖助作者駱驛道路窮極百工之巧功費數百餘萬卒徒死者萬數是月大雨六十餘日鉅鹿男子馬適求等謀舉燕趙兵以誅莽大司空士王丹發覺以聞莽遣三公大夫逮治黨與連及郡國豪桀數千人皆誅死封丹爲輔國矦莽以私鑄錢死及非沮寶貨投四裔犯灋者多不可勝行乃更輕其灋私鑄作泉布者與妻子沒入爲官奴婢吏及比伍知而不舉告與同罪非沮寶貨民罰作一歲吏免官太傅平晏死以予虞唐尊爲太傅尊曰國虛民貧咎在奢泰乃身短衣小褏乘牝馬柴車藉槀以瓦器飲食又以歴遺公卿出見男女不異路者尊自下車以象刑赭幡汚染其衣莽聞而􅀃之下詔申敕公卿思與厥齊封尊爲平化矦汝南郅惲明天文歷數以爲漢必再受命上書􅀃莽曰上天垂戒欲悟陛下令就臣位取之以天還之以天可謂知命矣莽大怒繋惲詔獄踰冬㑹赦得出二年春正月莽妻死謚曰孝睦皇后􅀄莽妻以莽數殺其子涕泣失明莽令太子臨居中養焉莽妻旁侍者原碧莽幸之後臨亦通焉恐事泄謀共殺莽臨妻愔國師公女能爲星語臨宫中且有白衣㑹臨喜以爲所謀且成後貶爲統義陽王出在外第愈憂恐㑹莽妻病困臨予書曰上於子孫至嚴前長孫中孫年俱三十而死今臣臨復適三十誠恐一旦不保中室則不知死命所在莽􅇋妻疾見其書大怒疑臨有惡意不令得㑹喪旣葬収原碧等考問具服姦謀殺狀莽欲祕之使殺案事使者司命從事埋獄中冢不知所在賜臨藥臨不肯飲自刺死又詔國師公臨本不知星事從愔起愔亦自殺是月新遷王安病死初莽為矦就國時幸侍者増秩懷能生子興匡皆留新都國以其不明故也及安死莽乃以王車遣使者迎興匡封興為功脩公匡為功建公卜者王況謂魏成大尹李焉曰漢家當復興李氏爲輔因爲焉作䜟書合十餘萬言事發莽皆殺之莽遣太師羲仲景尚更始將軍護軍王黨將兵擊青徐賊國師和仲曹放助郭興擊句町皆不能克軍師放縱百姓重困莽又轉天下榖帛詣西河五原朔方漁陽毎一郡以百萬數欲以擊匈奴須卜當病死莽以庶女妻其子後安公奢所以尊寵之甚厚終爲欲出兵立之者㑹莽敗云奢亦死秋隕霜殺菽關東大饑蝗莽既輕私鑄錢之灋犯者愈衆及伍人相坐沒入爲官奴婢其男子檻車女子歩以鐵􅃈琅當其頸傳詣長安鍾官以十萬數到者易其夫婦愁苦死者什六七上谷儲夏自請􅀃􅀲田儀降之儀未出而死莽求其尸葬之爲起􅃁祠室謚曰􅀲寜殤男閏月丙辰大赦郎陽成脩獻符命言繼立民母又曰黄帝以百二十女致神僊莽於是遣中散大夫謁者各四十五人分行天下博采鄉里所髙有淑女者上名莽惡漢髙廟神靈遣虎賁武士入髙廟拔劒四面提擊斧壞户牖桃湯赭鞭鞭灑屋壁令輕車校尉居其中是歲南郡秦豐聚衆且萬人平原女子遲昭平亦聚數千人在河阻中莽召問羣臣禽賊方略皆曰此天囚行尸命在漏刻故左將軍公孫禄徴來與議禄曰太史令宗宣典星歷􅇋氣變以凶爲吉亂天文誤朝廷太傅平化矦尊飾虚僞以媮名位賊夫人之子國師嘉信公秀顛倒五經毁師灋令學士疑惑明學男張邯地理矦孫陽造井田使民棄土業羲和魯厈設六筦以窮工商􅀃符矦崔發阿䛕取容令下情不上通宜誅此數子以慰天下又言匈奴不可攻當與和親臣恐新室憂不在匈奴而在封域之中也莽怒使虎賁扶禄出然頗采其言左遷魯厈爲五原卒正以百姓怨誹故也六筦非厈所獨造莽厭衆意而出之􅀄四方皆以饑寒窮愁起爲盗賊稍稍羣聚常思歲熟得歸鄉里衆雖萬數不敢略有城邑轉掠求食日闋而已諸長吏牧守皆自亂􅃲中兵而死賊非敢欲殺之也而莽終不諭其故是歲荆州牧發犇命二萬人討緑林賊賊帥王厈等相率迎擊於雲杜大破牧軍殺數千人盡獲輜重牧欲北歸賊馬武等復遮擊之鉤牧車屏泥刺殺其驂乗然終不敢殺牧賊遂攻拔竟陵轉撃雲杜安陸多略婦女還入緑林中至有五萬餘口州郡不能制又大司馬士按章豫州爲賊所獲賊送付縣士還上書具言狀莽大怒下獄以爲誣罔因下書責七公曰夫吏者理也宣德明恩以牧養民仁之道也抑彊督姦捕誅盜賊義之節也今則不然盜發不輒得至成羣黨遮略乗傳宰士士得脫者又妄自言我責數賊何故爲是賊曰以貧窮故耳賊護出我今俗人議者率多若此惟貧困饑寒犯灋爲非大者羣盜小者偷穴不過二科今乃結謀連黨以千百數是逆亂之大者豈饑寒之謂邪七公其嚴敕卿大夫卒正連率庶尹謹牧養善民急捕殄盗賊有不同心并力疾惡􅃛賊而妄曰饑寒所爲輒捕繫請其罪於是羣下愈恐莫敢言賊情者州郡又不得擅發兵賊由是遂不制唯翼平連率田況素果敢發民年十八以上四萬餘人授以庫兵與刻石爲約樊崇等聞之不敢入界況自劾奏莽讓況未賜虎符而擅發兵此弄兵也厥罪乏興以況自詭必禽滅賊故且勿治後況自請出界擊賊所嚮皆破莽以璽書令況領青徐二州牧事況上言盜賊始發其原甚微部吏伍人所能禽也咎在長吏不爲意縣欺其郡郡欺朝廷實百言十實千言百朝廷忽略不輒督責遂至延蔓連州乃遣將帥多使者傳相監􅃐郡縣力事上官應塞詰對共酒食具資用以救斷斬不暇復憂盜賊治官事將帥又不能躬率吏士戰則爲賊所破吏氣寖傷徒費百姓前幸蒙赦令賊欲解散或反遮擊恐入山谷轉相告語故郡縣降賊皆更驚駭恐見詐滅因饑饉易動旬日之閒更十餘萬人此盜賊所以多之故也今洛陽以東米石二千竊見詔書欲遣太師更始將軍二人爪牙重臣多從人衆道上空竭少則無以威示逺方宜急選牧尹以下明其賞罰收合離鄉小國無城郭者徙其老弱置大城中積臧榖食并力固守賊來攻城則不能下所過無食埶不得羣聚如此招之必降擊之則滅今空復多出將帥郡縣苦之反甚於賊宜盡徴還乗傳諸使者以休息郡縣委任臣況以二州盜賊必平定之莽畏惡況隂爲發代遣使者賜況璽書使者至見況因令代監其兵遣况西詣長安拜爲師尉大夫況去齊地遂敗三年春正月九廟成納神主莽謁見大駕乗六馬以五采毛爲龍文衣著角長三尺又造華蓋九重髙八丈一尺載以四輪車輓者皆呼登仙莽出令在前百官竊言此似輀車非僊物也二月樊崇等殺景尚關東人相食夏四月遣太師王匡更始將軍廉丹東討衆賊初樊崇等衆既寖盛乃相與爲約殺人者死傷人者償創其中最尊號三老次從事次卒史及聞太師更始將討之恐其衆與莽兵亂乃皆朱其眉以相識别由是號曰赤眉匡丹合將銳士十餘萬人所過放縱東方爲之語曰寧逢赤眉不逢太師太師尚可更始殺我卒如田況之言莽又多遣大夫謁者分教民煑草木爲酪酪不可食重爲煩費緑林賊遇疾疫死者且半乃各分散引去王常成丹西入南郡號下江兵王匡王鳯馬武及其支黨朱鮪張卬等北入南陽號新市兵皆自稱將軍莽遣司命大將軍孔仁部豫州納言大將軍嚴尤秩宗大將軍陳茂擊荆州各從吏士百餘人乗傳到部募士尤謂茂曰遣將不與兵符必先請而後動是猶紲韓盧而責之獲也蝗從東方來飛蔽天流民入關者數十萬人乃置養贍官廩食之使者監領與小吏共盜其廩饑死者什七八先是莽使中黄門王業領長安市買賤取於民民甚患之業以省費爲功賜爵附城莽聞城中饑饉以問業業曰皆流民也乃市所賣梁飯肉羹持入示莽曰居民食咸如此莽信之秋七月新市賊王匡等進攻隨平林人陳牧廖湛復聚衆千餘人號平林兵以應之莽詔書讓廉丹曰倉廩盡矣府庫空矣可以怒矣可以戰矣將軍受國重任不捐身於中野無以報恩塞責丹惶恐夜召其􅁺馮􅄛以書示之􅄛因􅀃丹曰張良以五世相韓椎秦始皇博浪之中將軍之先爲漢信臣新室之興英俊不附今海内潰亂人懐漢德甚於周人思召公也人所歌舞天必從之方今爲將軍計莫若屯據大郡鎭撫吏士砥厲其節納雄桀之士詢忠智之謀興社稷之利除萬人之害則福禄流於無窮功烈著於不滅何與軍覆於中原身膏於草野功敗名喪恥及先􅀄哉丹不聽衍左將軍奉世曾孫也冬無鹽索盧恢等舉兵反城附賊廉丹王匡攻㧞之斬首萬餘級莽遣中郎將奉璽書勞丹匡進爵爲公封吏士有功者十餘人赤眉别校董憲等衆數萬人在梁郡王匡欲進擊之廉丹以爲新抜城罷勞當且休士養威匡不聽引兵獨進丹隨之合戰成昌兵敗匡走丹使吏持其印韍節付匡曰小兒可走吾不可遂止戰死校尉汝雲王隆等二十餘人别􅃲聞之皆曰廉公已死吾誰爲生馳犇賊皆戰死國將哀章自請願平山東莽遣章馳東與太師匡并力又遣大將軍楊浚守敖倉司徒王尋將十餘萬屯洛陽鎭南宫大司馬董忠養士習射中軍北壘大司空王邑兼三公之職初長沙定王發生舂陵節矦買買生戴矦熊渠熊渠生考矦仁仁以南方卑濕徙封南陽之白水鄉與宗族往家焉仁卒子敞嗣值莽簒位國除節矦少子外爲鬱林太守外生鉅鹿都尉回回生南頓令欽欽娶湖陽樊重女生三男縯仲秀兄弟早孤養於叔父良縯性剛毅慷慨有大節自莽簒漢常憤憤懐復社稷之慮不事家人居業傾身破産交結天下雄俊秀隆準日角性勤稼穡縯常非笑之比於高祖兄仲秀姉元爲新野鄧晨妻秀嘗與晨俱過穰人蔡少公少公頗學圗讖言劉秀當爲天子或曰是國師公劉秀乎秀戯曰何用知非僕邪坐者皆大笑晨心獨喜宛人李守好星歷䜟記爲莽宗卿師嘗謂其子通曰劉氏當興李氏爲輔及新市平林兵起南陽騷動通從弟軼謂通曰今四方擾亂漢當復興南陽宗室獨劉伯升兄弟汎愛容衆可與謀大事通笑曰吾意也㑹秀賣榖於宛通遣軼往迎秀與相見因具言䜟文事與相約結定謀議通欲以立秋材官都試􅀐士日劫前隊大夫甄阜及屬正梁丘賜因以號令大衆使軼與秀歸舂陵舉兵以相應於是縯召諸豪桀計議曰王莽暴虐百姓分崩今枯旱連年兵革並起此亦天亡之時復髙祖之業定萬世之秋也衆皆然之於是分遣親客於諸縣起兵縯自發舂陵子弟諸家子弟恐懼皆亡匿曰伯升殺我及見秀絳衣大􅃣皆驚曰謹厚者亦復爲之乃稍自安凡得子弟七八千人部署賔客自稱柱天都部秀時年二十八李通未發事覺亡走父守及家屬坐死者六十四人縯使族人嘉招􅀃新市平林兵與其帥王鳳陳牧西擊長聚進屠唐子鄉又殺湖陽尉軍中分財物不均衆恚恨欲反攻諸劉秀斂宗人所得物悉以與之衆乃恱進㧞􅁄陽李軼鄧晨皆將賔客來㑹嚴尤陳茂破下江兵成丹王常張卬等收散卒入蔞谿略鍾龍閒衆復振引軍與荆州牧戰於上唐大破之十一月有星孛于張劉縯欲進攻宛至小長安聚與甄阜梁丘賜戰時天密霧漢軍大敗秀單馬走遇女弟伯􅁎與共􅀐而犇前行復見姉元􅃐令上馬元以手揮曰行矣不能相救無爲兩沒也㑹追兵至元及三女皆死縯弟仲及宗從死者數十人縯復収㑹兵衆還保棘陽阜賜乘勝留輜重於藍鄉引精兵十萬南度潢淳臨泚水阻兩川閒爲營絶後橋示無還心新市平林見漢兵數敗阜賜軍大至各欲解去縯甚患之㑹下江兵五十餘人至宜秋縯即與秀及李通俱造其壁曰願見下江一賢將議大事衆推王常縯見常􅀃以合從之利常大悟曰王莽殘虐百姓思漢今劉氏復興即眞主也誠思出身爲用輔成大功縯曰如事成豈敢獨饗之哉遂與常深相結而去常還具爲餘將成丹張卬言之丹卬負其衆曰大丈夫既起當各自爲主何故受人制乎常乃徐曉說其將帥曰王莽苛酷積失百姓之心民之謳吟思漢非一日也故使吾屬因此得起夫民所怨者天所去也民所思者天所與也舉大事必當下順民心上合天意功乃可成若負彊恃勇觸情恣欲雖得天下必復失之以秦項之勢尚至夷覆況今布衣相聚草澤以此行之滅亡之道也今南陽諸劉舉宗起兵觀其來議者皆有深計大慮王公之才與之并合必成大功此天所以祐吾屬也下江諸將雖屈彊少識然素敬常乃皆謝曰無王將軍吾屬㡬䧟於不義即引兵與漢軍及新市平林合於是諸部齊心同力銳氣益壯縯大饗軍士設盟約休卒三日分爲六部十二月晦潛師夜起襲取藍鄉盡獲其輜重資治通鑑卷第三十八
