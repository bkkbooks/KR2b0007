front:
  text: 資治通鑑卷第二百九十四
  hash: sha256:5487df756743d7438fbbe6ba9fc828248edf5da1a9680a94dee7de2911752d37
body:
  text: 臣司馬光奉勑編集後周紀五維協洽凡二年起著雍敦牂盡屠丗宗睿武孝文皇帝下顯徳五年春正月乙酉廢匡國軍唐攺元中興丁亥右龍武將軍王漢璋奏克海州己丑以侍衛馬軍都指揮使韓令坤權揚州軍府事上欲引戰艦自淮入江阻北神堰不得度欲鑿楚州西北鸛水以通其道遣使行視還言地形不便計功甚多上自往視之授以規畫發楚州民夫浚之旬日而成用功甚省巨艦數百艘皆達于江唐人大驚以為神壬辰抜靜海軍始通呉越之路先是帝遣左諌議大夫長安尹日就等使呉越語之曰卿今去雖汎海比還淮􅀯已平當陸歸耳已而果然甲辰蜀右補闕章九齡見蜀主言政事不治由姧佞在朝蜀主問姧佞為誰指李昊王昭逺以對蜀主怒以九齡為毁斥大臣貶維州録事參軍周兵攻楚州踰四旬唐楚州防禦使張彦卿固守不下乙巳帝自督諸將攻之宿於城下丁未克之彦卿與都監鄭昭業猶帥衆拒戰矢刃皆盡彦卿舉繩牀以鬭而死所部千餘人至死無一人降者髙保融遣指揮使魏璘將戰船百艘東下㑹伐唐至于鄂州庚戌蜀置永寧軍於果州以通州􅀠之唐以天長為雄州以建武軍使易文贇為刺史二月甲寅文贇舉城降戊午帝發楚州丁卯至揚州命韓令坤發丁夫萬餘築故城之東􅀯隅為小城以治之乙亥黄州刺史司超奏與控鶴右廂都指揮使王審􅄾攻唐舒州擒其刺史施仁望丙子建雄節度使眞定楊廷璋奏敗北漢兵於隰州城下時隰州刺史孫議暴卒廷璋謂都監閑廐使李謙溥曰今大駕􅀯征澤州無守將河東必生心若奏請待報則孤城危矣即牒謙溥權隰州事謙溥至則修守備未幾北漢兵果至諸將請速救之廷璋曰隰州城堅將良未易克也北漢攻城乆不下廷璋度其疲困無備濳與謙溥約各募死士百餘夜襲其營北漢兵驚潰斬首千餘級北漢兵遂解去三月壬午朔帝如泰州丁亥唐大赦改元交泰唐太弟景遂前後凡十表辭位且言今國危不能扶請出就藩鎭燕王􅀪兾嫡長有軍功宜為嗣謹奏上太弟寳冊齊王景逹亦以敗軍辭元帥唐主乃立景遂為晉王加天䇿上將軍江􅀯西道兵馬元帥洪州大都督太尉尚書令以景逹為浙西道元帥潤州大都督景逹以浙西方用兵固辭攺撫州大都督立􅀪兾為皇太子參決庶政􅀪兾為人猜忌嚴刻景遂左右有未出東宫者立斥逐之其弟安定公從嘉畏之不敢預事専以經籍自娯辛卯上如迎鑾鎭屢至江口遣水軍擊唐兵破之上聞唐戰艦數百艘泊東㳍州將􅃐海口扼蘇杭路遣殿前都虞􅃸慕容延釗將歩􅀐右神武統軍宋延渥將水軍循江而下甲午延釗奏大破唐兵於東㳍州上遣李重進將兵􅃐廬州唐主聞上在江上恐遂南度又恥降號稱藩乃遣兵部侍郎陳覺奉表請傳位於太子􅀪兾使聴命於中國時淮南惟廬舒蘄黄未下丙申覺至迎鑾見周兵之盛白上請遣人度江取表獻四州之地畫江為境以求息兵辭指甚哀上曰朕本興師止取江北今爾主能舉國内附朕復何求覺拜謝而退丁酉覺請遣其屬閤門承旨劉承遇如金陵上賜唐主書稱皇帝恭問江南國主慰納之戊戌呉越奏遣上直都指揮使處州刺史邵可遷秀州刺史路彦銖以戰艦四百艘士卒萬七千人屯通州南岸唐主復遣劉承遇奉表稱唐國主請獻江北四州嵗輸貢物數十萬於是江北悉平得州十四縣六十庚子上賜唐主書諭以縁江諸軍及兩浙湖南荆南兵並當罷歸其廬蘄黄三道亦令歛兵近外俟彼將士及家屬皆就道可遣人召將校以城邑付之江中舟艦有須往來者並令就北岸引之辛丑陳覺辭行又賜唐主書諭以不必傳位於子壬寅上自迎鑾復如揚州癸卯詔呉越荆南軍各歸本道賜錢􅀪俶犒軍帛三萬匹髙保融一萬匹甲辰置保信軍於廬州以右龍武統軍趙匡賛為節度使丙午唐主遣馮延己獻銀絹錢茶榖共百萬以犒軍己酉命宋延渥將水軍三千泝江廵警庚戍敇故淮南節度使楊行密故昇府節度使徐温等墓並量給守户其江南羣臣墓在江北者亦委長吏以時檢校辛亥唐主遣其臨汝公徐遼代己來上夀是月浚汴口導河流逹于淮於是江淮舟檝始通夏四月乙卯帝自揚州北還新作太廟成庚申神主入廟辛酉夜錢塘城南火延及内城官府廬舎幾盡壬戍旦火將及鎭國倉呉越王弘俶乆疾自强出救火火止謂左右曰吾疾因災而愈衆心稍安帝之南征也契丹乗虚入宼壬申帝至大梁命鎭寧節度使張永徳將兵備禦北邊五月辛己朔日有食之詔賞勞南征士卒及淮南新附之民辛卯以太祖皇帝領忠武節度使徙安審􅄾為平盧節度使成徳節度使郭崇攻契丹東城拔之以報其入宼也唐主避周諱更名景下令去帝號稱國主凡天子儀制皆有降損去年號用周正朔仍告于太廟左僕射同平章事馮延己罷為太子太傅門下侍郎同平章事嚴續罷為少傅樞密使兵部侍郎陳覺罷守本官初馮延己以取中原之策說唐主由是有寵延已常笑烈祖戢兵為齷齪曰安陸所喪纔數千兵為之輟食咨嗟者旬日此田舎翁識量耳安足與成大事豈如今上暴師數萬於外而擊毬宴樂無異平日眞英主也延己與其黨談論常以天下為己任更相唱和翰林學士常夢錫屢言延己等浮誕不可信唐主不聽夢錫曰姧言似忠陛下不悟國必亡矣及臣服於周延己之黨相與言有謂周為大朝者夢錫大笑曰諸公常欲致君堯舜何意今日自為小朝邪衆黙然自唐主内附帝止因其使者賜書未甞遣使至其國己酉始命太府卿馮延魯衛尉少卿鍾謨使于唐賜以御衣玉帶等及犒軍帛十萬并今年欽天曆劉承遇之還自金陵也唐主使陳覺白帝以江南無鹵田願得海陵鹽監南屬以贍軍帝曰海陵在江北難以交居當别有處分至是詔歳支鹽三十萬斛以給江南所俘獲江南士卒稍稍歸之六月壬子昭義節度使李筠奏擊北漢石㑹關抜其六寨乙卯晉州奏都監李謙溥擊北漢破孝義髙保融遣使勸蜀主稱藩于周蜀主報以前歳遣胡立致書于周而不荅秋七月丙戌初行大周刑統帝欲均田租丁亥以元稹均田圖徧賜諸道閏月唐清源節度使兼中書令留從效遣牙將蔡仲贇衣商人服以絹表置革帶中間道來稱藩唐江西元帥晉王景遂之赴洪州也以時方用兵啓求大臣以自副唐主以樞密副使工部侍郎李徴古為鎭南節度副使徴古傲很専恣景遂雖寛厚乆而不能堪常欲斬徴古自拘於有司左右諌而止景遂忽忽不樂太子􅀪冀在東宫多不法唐主怒甞以毬杖擊之曰吾當復召景遂昭慶宫使􅀽從範從景遂為洪州都押牙或譖從範之子於景遂景遂欲殺之從範由是怨望􅀪兾聞之密遣從範毒之八月庚辰景遂擊毬渇甚從範進漿景遂飲之而卒未殯體已潰唐主不之知贈皇太弟謚曰文成辛巳南漢中宗殂長子衛王繼興即帝位更名鋹攺元大寶鋹年十六國事皆決於宦官玉清宫使龔澄樞及女侍中盧瓊仙等臺省官備位而已甲申唐始置進奏院於大梁壬辰命西上閤門使靈夀曹彬使于呉越賜呉越王􅀪俶􅀐軍鋼甲二百歩軍甲五千及它兵器彬事畢亟返不受饋遺呉越人以輕舟追與之至於數四彬曰吾終不受是竊名也盡籍其數歸而獻之帝曰曏之奉使者乞匄無厭使四方輕朝命卿能如是甚善然彼以遺卿卿自取之彬始拜受悉以散於親識家無留者辛丑馮延魯鍾謨來自唐唐主手表謝恩其略曰天地之恩厚矣父母之恩深矣子不謝父人何報天惟有赤心可酬大造又乞比藩方賜詔書又稱有情事令鍾謨上奏乞令早還唐主復令謨白帝欲傳位太子九月丁巳以延魯爲刑部侍郎謨爲給事中己未先遣謨還賜書諭以未可傳位之意唐主復遣吏部尚書知樞密院殷崇義來賀天清節帝謀伐蜀冬十月己卯以户部侍郎髙防爲西南面水陸制置使右賛善大夫李玉為判官甲午帝歸馮延魯及左監門衛上將軍許文稹右千牛衛上將軍邊鎬衛尉卿周廷構于唐唐主以文稹等皆敗軍之俘弃不復用髙保融再遺蜀主書勸稱臣於周蜀主集將相議之李昊曰從之則君父之辱違之則周師必至諸將能拒周乎諸將皆曰以陛下聖明江山險固豈可望風屈服秣馬勵兵正為今日臣等請以死衛社稷丁酉蜀主命昊草書極言拒絶之詔左散􅀐常侍須城艾潁等三十四人分行諸州均定田租庚子詔諸州併鄉村率以百户為團團置耆長三人帝留心農事常刻木為耕夫蠶婦置之殿庭命武勝節度使宋延渥以水軍廵江髙保融奏聞王師將伐蜀請以水軍􅃐三峽詔褒之十一月庚戌敇竇儼編集大周通禮大周正樂辛亥􅀯漢葬文武光明孝皇帝于昭陵廟號中宗乙丑唐主復遣禮部侍郎鍾謨入見李玉至長安或言蜀歸安鎭在長安南三百餘里可襲取也玉信之牒永興節度使王彦超索兵二百彦超以為歸安道阻隘難取玉曰吾自奉密旨彦超不得已與之玉將以往十二月蜀歸安鎭遏使李承勲據險邀之斬玉其衆皆沒乙酉蜀主以右衛聖歩軍都指揮使趙崇韜為北面招討使丙戍以奉鑾肅衛都指揮使武信節度使兼中書令孟貽業為昭武文州都招討使左衛聖馬軍都指揮使趙思進爲東面招討使山􅀯西道節度使韓保貞爲北面都招討使將兵六萬分屯要害以備周丙戍詔凡諸色課户及俸户並勒歸州縣其幕職州縣官自今並支俸錢及米麥初唐太傅兼中書令楚公宋齊丘多樹朋黨欲以専固朝權躁進之士爭附之推奬以爲國之元老樞密使陳覺副使李徴古恃齊丘之勢尤驕慢及許文稹等敗於紫金山覺與齊丘景逹自濠州遁歸國人忷懼唐主甞歎曰吾國家一朝至此因泣下徴古曰陛下當治兵以扞敵涕泣何爲豈飲酒過量邪將乳母不至邪唐主色變而徴古舉止自若㑹司天奏天文有變人主宜避位禳災唐主乃曰禍難方殷吾欲釋去萬機棲心沖寂誰可以託國者徴古曰宋公造國手也陛下如厭萬㡬何不舉國授之覺曰陛下深居禁中國事皆委宋公先行後聞臣等時入侍談釋老而已唐主心愠即命中書舎人豫章陳喬草詔行之喬惶恐請見曰陛下一署此詔臣不復得見矣因極言其不可唐主笑曰爾亦知其非邪乃止由是因晉王出鎭以徴古爲之副覺自周還亦罷近職鍾謨素與李德明善以德明之死怨齊丘及奉使歸唐言於唐主曰齊丘乗國之危遽謀簒竊陳覺李徴古爲之羽翼理不可容陳覺之自周還矯以帝命謂唐主曰聞江􅀯連歳拒命皆宰相嚴續之謀當爲我斬之唐主知覺素與續有隙固未之信鍾謨請覆之於周唐主乃因謨復命上言乆拒王師皆臣愚迷非續之罪帝聞之大驚曰審如此則續乃忠臣朕為天下主豈教人殺忠臣乎謨還以白唐主唐主欲誅齊丘等復遣謨入禀於帝帝以異國之臣無所可否己亥唐主命知樞密院殷崇義草詔暴齊丘覺徴古罪惡聽齊丘歸九華山舊隱官爵悉如故覺責授國子博士宣州安置徴古削奪官爵賜自盡黨與皆不問遣使告于周丙午蜀以峽路廵檢制置使髙彦儔為招討使平盧節度使太師中書令陳王安審􅄾僕夫安友進與其嬖妾通妾恐事泄與友進謀殺審􅄾友進不可妾曰不然我當反告汝友進懼而從之六年春正月癸丑審􅄾醉熟寢妾取審􅄾所枕劒授友進而殺之仍盡殺侍婢在帳下者以滅口後數日其子守忠始知之執友進等另之初有司將立正仗宿設樂縣於殿庭帝觀之見鍾磬有設而不擊者問樂工皆不能對乃命竇儼討論古今考正雅樂王朴素曉音律帝以樂事詢之朴上䟽以為禮以檢形樂以治心形順於外心和於内然而天下不治未之有也是以禮樂修於上而萬國化於下聖人之教不肅而成其政不嚴而治用此道也夫樂生於人心而聲成於物物聲既成復能感人之心昔者黄帝吹九寸之管得黄鍾正聲半之為清聲倍之為緩聲三分損益之以生十二律十二律旋相為宮以生七調為一均凡十二均八十四調而大備遭秦滅學歷代治樂者罕能用之唐太宗之丗祖孝孫張文收考正大樂備八十四調安史之亂器與工什亡八九至于黄巢蕩盡無遺時有太常博士殷盈孫按考工記鑄鎛鍾十二編鍾二百四十處士蕭承訓校定石磬今之在縣者是也雖有鍾磬之狀殊無相應之和其鎛鍾不問音律但循環而擊編鍾編磬徒懸而已絲竹匏土僅有七聲名為黄鍾之宫其存者九曲考之三曲協律六曲參渉諸調葢樂之廢缺無甚於今陛下武功既著垂意禮樂以臣甞學律吕宣示古今樂録命臣討論臣謹如古法以秬黍定尺長九寸徑三分為黄鍾之管與今黄鍾之聲相應因而推之得十二律以為衆管互吹用聲不便乃作律凖十有三􅁌其長九尺皆應黄鍾之聲以次設柱為十一律及黄鍾清聲旋用七律以為一均為均之主者宫也徴商羽角變宫變徴次焉發其均主之聲歸乎本音之律迭應不亂乃成其調凡八十一調此法乆絶出臣獨見乞集百官校其得失詔從之百官皆以為然乃行之唐宋齊丘至九華山唐主命鎻其第穴牆給飲食齊丘歎曰吾昔獻謀幽讓皇帝族於泰州宜其及此乃縊而死謚曰醜繆初翰林學士常夢錫知宣政院參預機政深疾齊丘之黨數言於唐主曰不去此屬國必危亡與馮延己魏岑之徒日有爭論乆之罷宣政院夢錫鬱鬱不得志不復預事日縱酒成疾而卒及齊丘死唐主曰常夢錫平生欲殺齊丘恨不使見之贈夢錫左僕射二月丙子朔命王朴如河隂按行河隄立斗門於汴口壬午命侍衛都指揮使韓通宣徽南院使呉廷祚發徐宿宋單等州丁夫數萬浚汴水甲申命馬軍都指揮使韓令坤自大梁城東導汴水入于蔡水以通陳潁之漕命歩軍都指揮使􅀽彦浚五文渠東過曹濟梁山泊以通青鄆之漕發畿内及滑亳等州丁夫數千以供其役􅊨丁亥開封府奏田稅舊一十萬二千餘頃今按行得羡田四萬二千餘頃敇減三萬八千頃諸州行田使還所奏羡田減之倣此淮南饑上命以米貸之或曰民貧恐不能償上曰民吾子也安有子倒懸而父不為之解哉安在責其必償也庚申樞密使王朴卒上臨其喪以玉􅃏卓地慟哭數四不能自止朴性剛而銳敏智略過人上以是惜之甲子詔以北鄙未復將幸滄州命義武節度使孫行友扞西山路以宣徽南院使呉廷祚權東京留守判開封府事三司使張美權大内都部署丁卯命侍衞親軍都虞􅃸韓通等將水陸軍先發甲戍上發大梁夏四月庚寅韓通奏自滄州治水道入契丹境柵於乾寧軍南補壞防開游口三十六遂通瀛莫辛卯上至滄州即日帥歩􅀐數萬發滄州直趨契丹之境河北州縣非車駕所過民間皆不之知壬辰上至乾寕軍契丹寕州刺史王洪舉城降乙未大治水軍分命諸將水陸俱下以韓通爲陸路都部署太祖皇帝為水路都部署丁酉上御龍舟􅆓流而北舳艫相連數十里己亥至獨流口泝流而西辛丑至益津關契丹守將終廷暉以城降自是以西水路漸隘不能勝巨艦乃捨之壬寅上登陸而西宿於野次侍衛之士不及一旅從官皆恐懼胡􅀐連羣出其左右不敢逼癸卯太祖皇帝先至瓦橋關契丹守將姚内斌舉城降上入瓦橋關内斌平州人也甲辰契丹莫州刺史劉楚信舉城降五月乙巳朔侍衛親軍都指揮使天平節度使李重進等始引兵繼至契丹瀛州刺史髙彦暉舉城降彦暉薊州人也於是闗南悉平丙午宴諸將於行宫議取幽州諸將以爲陛下離京四十二日兵不血刃取燕南之地此不丗之功也今虜􅀐皆聚幽州之北未宜深入上不悅是日趣先鋒都指揮使劉重進先發據固安上自至安陽水命作橋㑹日暮還宿瓦橋是夕上不豫而止契丹主遣使者日馳七百里詣晉陽命北漢主發兵撓周邊聞上南歸乃罷兵戊申孫行友奏抜易州擒契丹刺史李在欽獻之斬於軍市己酉以瓦橋關爲雄州割容城歸義二縣􅀠之以益津關爲霸州割文安大城二縣􅀠之發濵棣丁夫數千城霸州命韓通董其役庚戌命李重進將兵出土門擊北漢辛亥以侍衛馬歩都指揮使韓令坤為霸州都部署義成節度留後陳思讓為雄州都部署各將部兵以戍之壬子上自雄州南還己巳李重進奏敗北漢兵於百井斬首二千餘級甲戌上至大梁六月乙亥朔昭義節度使李筠奏擊北漢抜遼州獲其刺史張丕丙子鄭州奏河決原武命宣徽南院使呉延祚發近縣二萬餘夫塞之唐清源節度使留從効遣使入貢請置進奏院於京師直􅀠中朝戊寅詔報以江南近服方務綏懷卿乆奉金陵未可攺圖若置邸上都與彼抗衡受而有之罪在於朕卿逺修職貢足表忠勤勉事舊君且宜如故如此則於卿篤始終之義於朕盡柔逺之宜惟乃通方諒逹予意唐主遣其子紀公從善與鍾謨俱入貢上問謨曰江南亦治兵修守備乎對曰既臣事大國不敢復爾上曰不然曏時則為仇敵今日則為一家吾與汝國大義已定保無它虞然人生難期至于後丗則事不可知歸語汝主可及吾時完城郭繕甲兵據守要害為子孫計謨歸以告唐主唐主乃城金陵凡諸州城之不完者葺之戍兵少者益之臣光曰或問臣五代帝王唐莊宗周丗宗皆稱英武二主孰賢臣應之曰夫天子所以統治萬國討其不服撫其微弱行其號令壹其法度敦明信義以兼愛兆民者也莊宗既滅梁海内震動湖南馬氏遣子希範入貢莊宗曰比聞馬氏之業終為髙郁所奪今有兒如此郁豈能得之哉郁馬氏之良佐也希範兄希聲聞莊宗言卒矯其父命而殺之此乃市道商賈之所為豈帝王之體哉葢莊宗善戰者也故能以弱晉勝彊梁既得之曽不數年外内離叛置身無所誠由知用兵之術不知為天下之道故也丗宗以信令御羣臣以正義責諸國王環以不降受賞劉仁贍以堅守蒙襃嚴續以盡忠獲存蜀兵以反覆就誅馮道以失節被弃張美以私恩見疎江南未服則親犯矢石期於必克既服則愛之如子推誠盡言為之逺慮其宏規大度豈得與莊宗同日語哉書曰無偏無黨王道蕩蕩又曰大邦畏其力小邦懷其德丗宗近之矣辛巳建雄節度使楊廷璋奏擊北漢降堡寨一十三癸未立皇后符氏宣懿皇后之女弟也立皇子宗訓為梁王領左衛上將軍宗讓為燕公領左驍衛上將軍上欲相樞密使魏仁浦議者以仁浦不由科第不可為相上曰自古用文武才略為輔佐者豈盡由科第邪己丑加王溥門下侍郎與范質皆參知樞密院事以仁浦為中書侍郎同平章事樞密使如故仁浦雖處權要而能謙謹上性嚴急近職有忤旨者仁浦多引罪歸已以救之所全活什七八故雖起刀筆吏致位宰相時人不以為沗又以宣徽南院使呉延祚為左驍衛上將軍充樞密使加歸德節度使侍衛親軍都虞􅃸韓通鎭寕節度使兼殿前都㸃檢張永德並同平章事仍以通充侍衛親軍副都指揮使以太祖皇帝兼殿前都㸃檢上甞問大臣可為相者於兵部尚書張昭昭薦李濤上愕然曰濤輕薄無大臣體朕問相而卿首薦之何也對曰陛下所責者細行也臣所舉者大節也昔晉髙祖之丗張彦澤虐殺不辜濤累䟽請誅之以為不殺必為國患漢隱帝之丗濤亦上䟽請解先帝兵權夫國家安危未形而能見之此眞宰相器也臣是以薦之上曰卿言甚善且至公然如濤者終不可置之中書濤喜詼諧不修邊幅與弟澣俱以文學著名雖甚友愛而多謔浪無長㓜體上以是薄之上以翰林學士單父王著幕府舊僚屢欲相之以其嗜酒無檢而罷癸巳大漸召范質等入受顧命上曰王著藩邸故人朕若不起當相之質等出相謂曰著終日遊醉鄉豈堪爲相愼毋泄此言是日上殂上在藩多務韜晦及即位破髙平之宼人始服其英武其御軍號令嚴明人莫敢犯攻城對敵矢石落其左右人皆失色而上略不動容應機決策出人意表又勤於爲治百司簿籍過目無所忘發姦擿伏聦察如神閑暇則召儒者讀前史商確大義性不好絲竹珍玩之物常言太祖養成王峻王殷之惡致君臣之分不終故羣臣有過則面質責之服則赦之有功則厚賞之文武參用各盡其能人無不畏其明而懷其惠故能破敵廣地所向無前然用法太嚴羣臣職事小有不舉往往寘之極刑雖素有才幹聲名無所開宥尋亦悔之末年寖寛登遐之日逺邇哀慕焉甲午宣遺詔命梁王宗訓即皇帝位生七年矣秋七月壬戍以侍衛親軍都指揮使李重進領淮南節度使副都指揮使韓通領天平節度使太祖皇帝領歸徳節度使以山南東道節度使同平章事向拱為西京留守庚申加拱兼侍中拱即向訓也避恭帝名改焉丙寅大赦唐主以金陵去周境纔隔一水洪州險固居上游集羣臣議徙都之羣臣多不欲徙惟樞密副使給事中唐鎬勸之乃命經營豫章為都城之制唐自淮上用兵及割江北臣事於周歳時貢獻府藏空竭錢益少物價騰貴禮部侍郎鍾謨請鑄大錢一當五十中書舎人韓熙載請鑄鐡錢唐主始皆不從謨陳請不已乃從之是月始鑄當十大錢文曰永通泉貨又鑄當二錢文曰唐國通寶與開元錢並行八月戊子蜀主以李昊領武信節度使右補闕李起上言故事宰相無領方鎭者蜀主曰昊家多宂費以厚禄優之耳起卭州人性婞直李昊甞語之曰以子之才茍能愼黙當為翰林學士起曰俟無舌乃不言耳庚寅立皇弟宗讓為曹王更名熙讓熙謹為紀王熙誨為蘄王九月丙午唐太子􅀪兾卒有司引浙西之功謚曰武宣句容尉全椒張洎上言太子之徳主於孝敬今謚以武功非所以防微而愼徳也乃更謚曰文獻擢洎為上元尉唐禮部侍郎知尚書省事鍾謨數奉使入周傳丗宗命於唐主丗宗及唐主皆厚待之恃此驕横於其國三省之事皆預焉文獻太子緫朝政謨求兼東宫官不得乃薦其所善閻式為司議郎掌百司關啓李德明之死也唐鎬預其謀謨聞鎬受賕甞面詰之鎬甚懼謨與天威都虞􅃸張巒善數於私第屏人語至夜分鎬譖諸唐主曰謨與巒氣類不同而過相親狎謨屢使上國巒北人恐其有異謀又言永通大錢民多盜鑄犯法者衆及文獻太子卒唐主欲立其母弟鄭王從嘉謨甞與紀公從善同奉使于周相厚善言於唐主曰從嘉德輕志懦又酷信釋氏非人主才從善果敢凝重宜為嗣唐主由是怒尋徙從嘉為呉王尚書令知政事居東宫冬十月謨請令張巒以所部兵廵徼都城唐主乃下詔暴謨侵官之罪貶國子司業流饒州貶張巒為宣州副使未幾皆殺之廢永通錢十一月壬寅朔葬睿武孝文皇帝于慶陵廟號丗宗南漢主以中書舎人鍾允章藩府舊僚擢為尚書右丞參政事甚委任之允章請誅亂法者數人以正綱紀南漢主不能從宦官聞而惡之南漢主將祀圓丘前三日允章帥禮官登壇四顧指揮設神位内侍監許彦眞望之曰此謀反也即帶劔登壇允章叱之彦眞馳入宫告允章欲於郊祀日作亂南漢主曰朕待允章厚豈有此邪玉清宫使龔澄樞内侍監李托等共證之以彦眞言為然乃收允章繫含章樓下命宦者與禮部尚書薛用丕雜治之用丕素與允章善告以必不免允章執用丕手泣曰老夫今日猶机上肉耳分為仇人所烹但恨邕昌㓜不知吾寃及其長也公為我語之彦眞聞之罵曰反賊欲使其子報仇邪復曰南主允章與二子共登壇濳有所禱俱斬之自是宦官益横李托封州人也辛亥南漢主祀圓丘大赦未幾以龔澄樞為左龍虎觀軍容使内太師軍國之事皆取決焉凡羣臣有才能及進士狀頭或僧道可與談者皆先下蠶室然後得進亦有自宫以求進者亦有免死而宫者由是宦者近二萬人貴顯用事之人大抵皆宦者也謂士人為門外人不得預事卒以此亡國唐更命洪州曰南昌府建南都以武清節度使何敬洙為南都留守以兵部尚書陳繼善為南昌尹周人之攻秦鳳也蜀中忷懼都官郎中徐及甫自負才略仕不得志隂結黨與謀奉前蜀髙祖之孫少府少監王令儀為主以作亂㑹周兵退而止至是其黨有告者收捕之及甫自殺十二月甲午賜令儀死端明殿學士兵部侍郎竇儀使於唐天雨雪唐主欲受詔於廡下儀曰使者奉詔而來不敢失舊禮若雪霑服請俟它日唐主乃拜詔於庭契丹主遣其舅使於唐泰州團練使荆罕儒募剌客使殺之唐人夜宴契丹使者於清風驛酒酣起更衣乆不返視之失其首矣自是契丹與唐絶罕儒冀州人也資治通鑑卷第二百九十四終
