body:
  text: 臣司馬光奉勑編集後晉紀一灘一年柔兆涒髙祖聖文章武明徳孝皇帝上之上天福元年春正月吳徐知誥始建大元帥府以幕職分判吏户禮兵刑工部及鹽鐡丁未唐主立子重美為雍王癸丑唐主以千春節置酒晉國長公主上壽畢辭歸晉陽帝醉曰何不且留遽歸欲與石郎反邪石敬瑭聞之益懼三月丙午以翰林學士禮部侍郎馬􅅌孫為中書侍郎同平章事􅅌孫性謹懦中書事多凝滯又罕接賔客時人目為三不開謂口印門也石敬瑭盡收其貨之在洛陽及諸道者歸晉陽託言以助軍費人皆知其有異志唐主夜與近臣從容語曰石郎於朕至親無可疑者但流言不息萬一失歡何以解之皆不對端明殿學士給事中李崧退謂同僚吕琦曰吾輩受恩深厚豈得自同衆人一槩觀望邪計將安出琦曰河東若有異謀必結契丹為援契丹母以賛華在中國屢求和親但求萴剌等未獲故和未成耳今誠歸萴剌等與之和歲以禮幣約直十餘萬緡遺之彼必驩然承命如此則河東雖欲陸梁無能為矣崧曰此吾志也然錢糓皆出三司宜更與張相謀之遂告張延朗延朗曰如學士計不惟可以制河東亦省邊費之什九計無便於此者若主上聴從但責辦於老夫請於軍財之外捃拾以供之它夕二人密言於帝帝大喜稱其忠二人私草遺契丹書以俟命久之帝以其謀告樞密直學士薛文遇文遇對曰以天子之尊屈身奉夷狄不亦辱乎又虜若循故事求尚公主何以拒之因誦戎昱昭君詩曰安危託婦人帝意遂變一日急召崧琦至後樓盛怒責之曰卿輩皆知古今欲佐人主致太平今乃為謀如是朕一女尚乳臭卿欲弃之沙漠邪且欲以養士之財輸之虜庭其意安在二人懼汗流浹背曰臣等志在竭愚以報國非為虜計也願陛下察之拜謝無數帝詬責不巳吕琦氣竭拜少止帝曰吕琦强項肯視朕為人主邪琦曰臣等為謀不臧願陛下治其罪多拜何為帝怒稍解止其拜各賜巵酒罷之自是羣臣不敢復言和親之䇿丁巳以琦為御史中丞蓋踈之也吴徐知誥以其子副都景統通為太尉副元帥都統判官宋齊丘行軍司馬徐玠為元帥府左右司馬閩主昶改元通文立賢妃李氏為皇后尊皇太后曰太皇太后靜江節度使同平章事馬希杲有善政監軍裴仁煦譛之於楚王希範言其收衆心希範疑之夏四月漢將孫徳威侵􅂪桂二州希範命其弟武安節度副使希廣權知軍府事自將歩騎五千如桂州希杲懼其母華夫人逆希範於全義嶺謝以希杲為治無状致寇戎入境煩殿下親渉險阻皆妾之罪也願削封邑灑掃掖廷以贖希杲罪希範曰吾久不見希杲聞其治行尤異故來省之無它也漢兵自䝉州引去徙希杲知朗州髙從誨遣使奉牋於徐知誥勸即帝位初石敬瑭欲嘗唐主之意累表自陳羸疾乞解兵柄移它鎭帝與執政議從其請移鎭鄆州房暠李崧吕琦等皆力諌以為不可帝猶豫久之五月庚寅夜李崧請急在外薛文遇獨直帝與之議河東事文遇曰諺有之當道築室三年不成兹事斷自聖志群臣各為身謀安肻盡言以臣觀之河東移亦反不移亦反在旦暮耳不若先事圖之先是術者言國家今年應得賢佐出竒謀定天下帝意文遇當之聞其言大喜曰卿言殊豁吾意成敗吾決行之即為除目付學士院使草制辛卯以敬瑭為天平節度使以馬軍都指揮使河陽節度使宋審䖍為河東節度使制出兩班聞呼敬瑭名相顧失色甲午以建雄節度使張敬逹為西北蕃漢馬步都部署趣敬瑭之鄆州敬瑭疑懼謀於將佐曰吾之再來河東也主上面許終身不除代今忽有是命得非如今年千春節與公主所言乎我不興亂朝廷發之安能束手死於道路乎今且發表稱疾以觀其意若其寛我我當事之若加兵於我我則改圖耳幕僚段希堯極言拒之敬瑭以其朴直不責也節度判官華陰趙瑩勸敬瑭赴鄆州觀察判官平遥薛融曰融書生不習軍旅都押牙劉知逺曰明公久將兵得士卒心今據形勝之地士馬精彊若稱兵傳檄帝業可成奈何以一紙制書自投虎口乎掌書記洛陽桑維翰曰主上初即位明公入朝主上豈不知蛟龍不可縱之深淵邪然卒以河東復授公此乃天意假公以利器也明宗遺愛在人主上以庶孽代之羣情不附公明宗之愛壻今主上以反逆見待此非首謝可免但力為自全之計契丹主素與明宗約為兄弟今部落近在雲應公誠能推心屈節事之萬一有急朝呼夕至何患無成敬瑭意遂決先是朝廷疑敬瑭以羽林將軍寳鼎楊彦詢為北京副留守敬瑭將舉事亦以情告之彦詢曰不知河東兵糧幾何能敵朝廷乎左右請殺彦詢敬瑭曰惟副使一人我自保之汝輩勿言也戊戌昭義節度使皇甫立奏敬瑭反敬瑭表帝養子不應承祀請傳位許王帝手裂其表抵地以詔荅之曰卿於卾王固非踈逺衛州之事天下皆知許王之言何人肯信壬寅制削奪敬瑭官爵乙巳以張敬逹兼太原四面排陳使河陽節度使張彦琪為馬歩軍都指揮使以安國節度使安審琦為馬軍都指揮使以保義節度使相里金為歩軍都指揮使以右監門上將軍武廷翰為壕寨使丙午以張敬逹為太原四面兵馬都部署以義武節度使楊光逺為副部署丁未又以張敬逹知太原行府事以前彰武節度使髙行周為太原四面招撫排陳等使光逺既行定州軍亂牙將千乗方太討平之張敬逹將兵三萬營於晉安郷戊申敬逹奏西北先鋒馬軍都指揮使安審信叛奔晉陽審信金全之弟子也敬瑭與之有舊先是雄義都指揮使馬邑安元信將所部六百餘人戍代州代州刺史張朗善遇之元信密説朗曰吾觀石令公長者舉事必成公何不潜遣人通意可以自全朗不從由是互相猜忌元信謀殺朗不克帥其衆奔審信審信遂帥麾下數百騎與元信掠百井奔晉陽敬瑭謂元信曰汝見何利害捨彊而歸弱對曰元信非知星識氣顧以人事決之耳夫帝王所以御天下莫重於信今主上失大信於令公親而貴者且不自保況踈賤乎其亡可翹足而待何彊之有敬瑭悦委以軍事振武西北巡檢使安重榮戍代北帥歩騎五百奔晉陽重榮朔州人也以宋審䖍為寧國節度使充侍衛馬軍都指揮使天雄節度使劉延皓恃后族之勢驕縱奪人財産減將士給賜宴飲無度捧聖都虞候張令昭因衆心怨怒謀以魏愽應河東癸丑未明帥衆攻牙城克之延皓脱身走亂兵大掠令昭奏延皓失於撫御以致軍亂臣以撫安士卒權領軍府乞賜旌節延皓至洛陽唐主怒命逺貶皇后為之請六月庚申止削延皓官爵歸私第辛酉吳太保同平章事徐景遷以疾罷以其弟景遂代為門下侍郎參政事癸亥唐主以張令昭為右千牛衛將軍權知天雄軍府事令昭以調發未集且受新命尋有詔徙齊州防禦使令昭託以士卒所留實俟河東之成敗唐主遣使諭之令昭殺使者甲戌以宣武節度使兼中書令范延光為天雄軍四面行營招討使知魏愽行府事以張敬逹充太原四面招討使以楊光逺為副使丙子以西京留守李周為天雄軍四面行營副招討使石敬瑭之子右衛上將軍重殷皇城副使重裔聞敬瑭舉兵匿於民間井中弟沂州都指揮使敬徳殺其妻女而逃尋捕得死獄中從弟彰聖都指揮使敬威自殺秋七月戊子獲重殷重裔誅之并族所匿之家庚寅楚王希範自桂州北還雲州歩軍指揮使桑遷奏應州節度使尹暉逐雲州節度使沙彦珣收其兵應河東丁酉彦珣表遷謀叛應河東引兵圍子城彦珣犯圍走出西山據雷公口明日收兵入城擊亂兵遷敗走軍城復安是日尹暉執遷送洛陽斬之丁未范延光拔魏州斬張令昭詔悉誅其黨七指揮張敬逹發懐州彰聖軍戍虎北口其指揮使張萬迪將五百騎奔河東丙辰詔盡誅其家石敬瑭遣間使求救於契丹令桑維翰草表稱臣於契丹主且請以父禮事之約事㨗之日割盧龍一道及鴈門関以北諸州與之劉知逺諌曰稱臣可矣以父事之太過厚以金帛賂之自足致其兵不必許以土田恐異日大為中國之患悔之無及敬瑭不從表至契丹契丹主大喜白其母曰兒比夢石郎遣使來今果然此天意也乃為復書許俟仲秋傾國赴援八月己未以范延光為天雄節度使李周為宣武節度使同平章事癸亥應州言契丹三千騎攻城張敬逹築長圍以攻晉陽石敬瑭以劉知逺為馬歩都指揮使安重榮張萬迪降兵皆􅀠焉知逺用法無私撫之如一由是人無貳心敬瑭親乗城坐卧矢石下知逺曰觀敬逹輩高壘深壍欲為持久之計無它竒䇿不足慮也願明公四出間使經略外事守城至易知逺獨能辦之敬瑭執知逺手撫其背而賞之戊寅以成徳節度使董温琪為東北面副招討使以佐盧龍節度使趙徳鈞唐主使端明殿學士吕琦至河東行營犒軍楊光逺謂琦曰願附奏陛下幸寛宵旰賊若無援旦夕當平若引契丹當縱之令入可一戰破也帝甚悦帝聞契丹許石敬瑭以仲秋赴援屢督張敬逹急攻晉陽不能下每有營構多值風雨長圍復為水潦所壊竟不能合晉陽城中日窘糧儲浸乏九月契丹主將五萬騎號三十萬自揚武谷而南旌旗不絶五十餘里代州刺史張朗忻州刺史丁審琦嬰城自守虜騎過城下亦不誘脅審琦洺州人也辛丑契丹主至晉陽陳於汾北之虎北口先遣人謂敬瑭曰吾欲今日即破賊可乎敬瑭遣人馳告曰南軍甚厚不可輕請俟明日議戰未晩也使者未至契丹巳與唐騎將髙行周符彦卿合戰敬瑭乃遣劉知逺出兵助之張敬逹楊光逺安審琦以歩兵陳於城西北山下契丹遣輕騎三千不被甲直犯其陳唐兵見其羸爭逐之至汾曲契丹渉水而去唐兵循岸而進契丹伏兵自東北起衝唐兵斷而為二歩兵在北者多為契丹所殺騎兵在南者引歸晉安寨契丹縱兵乗之唐兵大敗歩兵死者近萬人騎兵獨全敬逹等收餘衆保晉安契丹亦引兵歸虎北口敬瑭得唐降兵千餘人劉知逺勸敬瑭盡殺之是夕敬瑭出北門見契丹主契丹主執敬瑭手恨相見之晩敬瑭問曰皇帝逺來士馬疲倦遽與唐戰而大勝何也契丹主曰始吾自北來謂唐必斷鴈門諸路伏兵險要則吾不可得進矣使人偵視皆無之吾是以長驅深入知大事必濟也兵既相接我氣方鋭彼氣方沮若不乗此急擊之曠日持久則勝負未可知矣此吾所以亟戰而勝不可以勞逸常理論也敬瑭甚歎伏壬寅敬瑭引兵㑹契丹圍晉安寨置營於晉安之南長百餘里厚五十里多設鈴索吠犬人跬歩不能過敬逹等士卒猶五萬人馬萬匹四顧無所之甲辰敬逹遣使告敗於唐自是聲問不復通唐主大懼遣彰聖都指揮使符彦饒將洛陽歩騎兵屯河陽詔天雄節度使兼中書令范延光將魏州兵二萬由青山趣榆次盧龍節度使東北面招討使兼中書令北平王趙徳鈞將幽州兵由飛狐出契丹軍後耀州防禦使潘環糺合西路戍兵由晉絳兩乳嶺出慈隰共救晉安寨契丹主移帳於柳林遊騎過石㑹闗不見唐兵丁未唐主下詔親征雍王重美曰陛下目疾未平不可逺渉風沙臣雖童稚願代陛下北行帝意本不欲行聞之頗悦張延朗劉延皓及宣徽南院使劉延朗皆勸帝行帝不得巳戊申發洛陽謂盧文紀曰朕雅聞卿有相業故排衆議首用卿今禍難如此卿嘉謀皆安在乎文紀但拜謝不能對己酉遣劉延朗監侍衛歩軍都指揮使符彦饒軍赴潞州爲大軍後援諸軍自鳯翔推戴以來驕悍不為用彦饒恐其為亂不敢束之以法帝至河陽心憚北行召宰相樞密使議進取方略盧文紀希帝㫖言國家根本太半在河南胡兵倐來忽往不能久留晉安大寨甚固況巳發三道兵救之河陽天下津要車駕宜留此鎭撫南北且遣近臣徃督戰茍不能解圍進亦未晩張延朗欲因事令趙延壽得解樞務因曰文紀言是也帝訪於餘人無敢異言者澤州刺史劉遂凝鄩之子也潜自通於石敬瑭表稱車駕不可踰太行帝議近臣可使北行者張延朗與翰林學士須昌和凝等皆曰趙延壽父徳鈞以盧龍兵來赴難宜遣延壽㑹之庚戌遣樞密使忠武節度使隨駕諸軍都部署兼侍中趙延壽將兵二萬如潞州辛亥帝如懐州以右神武統軍康思立為北面行營馬軍都指揮使帥扈從騎兵赴􅇛柏谷思立晉陽胡人也帝以晉安為憂問䇿於羣臣吏部侍郎永清龍敏請立李賛華為契丹主令天雄盧龍二鎭分兵送之自幽州趣西樓朝廷露檄言之契丹主必有内顧之憂然後選募軍中精鋭以擊之此亦解圍之一䇿也帝深以為然而執政恐其無成議竟不決帝憂沮形於神色但日夕酣飲悲歌羣臣或勸其北行則曰卿勿言石郎使我心膽墮地冬十月壬戌詔大括天下將吏及民間馬又發民為兵每七户出征夫一人自備鎧仗謂之義軍期以十一月俱集命陳州刺史郎萬金教以戰陳用張延朗之謀也凡得馬二千餘匹征夫五千人實無益於用而民間大擾初趙徳鈞陰蓄異志欲因亂取中原自請救晉安寨唐主命自飛狐踵契丹後鈔其部落徳鈞請將銀鞍契丹直三千騎由土門路西入帝許之趙州刺史北面行營都指揮使劉在明先將兵戍易州徳鈞過易州命在明以其衆自隨在明幽州人也徳鈞至鎭州以董温琪領招討副使邀與偕行又表稱兵少須合澤潞兵乃自吳兒谷趣潞州癸酉至亂柳時范延光受詔將部兵二萬屯遼州徳鈞又請與魏􅀶軍合延光知徳鈞合諸軍志趣難測表稱魏􅀶兵巳入賊境無容南行數百里與徳鈞合乃止漢主以宗正卿兼工部侍郎劉濬爲中書侍郎同平章事濬崇望之子也十一月戊子以趙徳鈞爲諸道行營都統依前東北面行營招討使以趙延壽爲河東道南面行營招討使以翰林學士張礪爲判官庚寅以范延光爲河東道東南面行營招討使以宣武節度使同平章事李周副之辛卯以劉延朗爲河東道南面行營招討副使趙延壽遇趙徳鈞於西湯悉以兵屬徳鈞唐主遣吕琦賜徳鈞敕告且犒軍徳鈞志在併范延光軍逗留不進詔書屢趣之徳鈞乃引兵北屯􅇛柏谷口癸巳吳主詔齊主徐知誥置百官以金陵府爲西都前坊州刺史劉景巖延州人也多財而喜俠交結豪傑家有丁夫兵仗人服其彊􅀔傾州縣彰武節度使楊漢章無政失夷夏心㑹括馬及義軍漢章帥歩騎數千人將赴軍期閲之于野景巖潜使人撓之曰契丹彊盛汝曹有去無歸衆懼殺漢章奉景巖為留後唐主不獲巳丁酉以景巖為彰武留後契丹主謂石敬瑭曰吾三千里來赴難必有成功觀汝氣貌識量眞中原之主也吾欲立汝為天子敬瑭辭讓數四將吏復勸進乃許之契丹主作冊書命敬瑭為大晉皇帝自解衣冠授之築壇於柳林是日即皇帝位割幽薊瀛莫涿檀順新嬀儒武雲應寰朔蔚十六州以與契丹仍許歲輸帛三十萬匹己亥制改長興七年為天福元年大赦敕命法制皆遵明宗之舊以節度判官趙瑩為翰林學士承㫖户部侍郎知河東軍府事掌書記桑維翰為翰林學士禮部侍郎權知樞密使事觀察判官薛融為侍御史知雜事節度推官白水竇貞固為翰林學士軍城都巡撿使劉知逺為侍衛馬軍都指揮使客將景延廣為歩軍都指揮使延廣陜州人也立晉國長公主為皇后契丹主雖軍柳林其輜重老弱皆在虎北口每日暝輒結束以備倉猝遁逃而趙徳鈞欲倚契丹取中國至團柏踰月按兵不戰去晉安纔百里聲問不能相通徳鈞累表為延壽求成徳節度使曰臣今逺征幽州􅀔孤欲使延壽在鎭州左右便於應接唐主曰延壽方擊賊何暇往鎭州俟賊平當如所請徳鈞求之不巳唐主怒曰趙氏父子堅欲得鎭州何意也茍能却胡寇雖欲代吾位吾亦甘心若玩寇邀君但恐犬兎俱斃耳徳鈞聞之不悦閏月趙延壽獻契丹主所賜詔及甲馬弓劒詐云徳鈞遣使致書於契丹主為唐結好説令引兵歸國其實别為密書厚以金帛賂契丹主云若立己為帝請即以見兵南平洛陽與契丹為兄弟之國仍許石氏常鎮河東契丹主自以深入敵境晉安未下徳鈞兵尚彊范延光在其東又恐山北諸州邀其歸路欲許徳鈞之請帝聞之大懼亟使桑維翰見契丹主説之曰大國舉義兵以救孤危一戰而唐兵瓦解退守一柵食盡力窮趙北平父子不忠不信畏大國之彊且素蓄異志按兵觀變非以死徇國之人何足可畏而信其誕妄之辭貪豪末之利弃垂成之功乎且使晉得天下將竭中國之財以奉大國豈此小利之比乎契丹主曰爾見捕䑕者乎不備之猶或齧傷其手况大敵乎對曰今大國巳扼其㗋安能齧人乎契丹主曰吾非有渝前約也但兵家權謀不得不爾對曰皇帝以信義救人之急四海之人俱屬耳目柰何一旦二三其命使大義不終臣竊為皇帝不取也跪於帳前自旦至暮涕泣争之契丹主乃從之指帳前石謂徳鈞使者曰我巳許石郎此石爛可改矣龍敏謂前鄭州防禦使李懿曰君國之近親今社稷之危翹足可待君獨無憂乎懿為言趙徳鈞必能破敵之状敏曰我燕人也知徳鈞之為人怯而無謀但於守城差長耳况今内蓄姦謀豈可恃乎僕有狂䇿但恐朝廷不肯為耳今從駕兵尚萬餘人馬近五千匹若選精騎一千使僕與郎萬金將之自介休山路夜冒虜騎入晉安寨但使其半得入則事濟矣張敬逹等陷於重圍不知朝廷聲問若知大軍近在團柏雖有鐵障可衝陷况虜騎乎懿以白唐主唐曰主龍敏之志極壮用之晩矣丹州義軍作亂逐刺史康承詢承詢奔鄜州晉安寨被圍數月髙行周符彦卿數引騎兵出戰衆寡不敵皆無功芻糧俱竭削􅏄淘糞以飼馬馬相啗尾鬛皆秃死則將士分食之援兵竟不至張敬逹性剛時謂之張生鐵楊光逺安審琦勸敬逹降於契丹敬逹曰吾受明宗及今上厚恩為元帥而敗軍其罪巳大况降敵乎今援兵旦暮至且當俟之必若力盡􅀔窮則諸軍斬我首攜之出降自求多福未為晩也光逺目審琦欲殺敬逹審琦未忍髙行周知光逺欲圖敬逹常引壮騎尾而衛之敬逹不知其故謂人曰行周每踵余後何意也行周乃不敢隨之諸將每旦集於招討使營甲子髙行周符彦卿未至光逺乗其無備斬敬逹首帥諸將上表降於契丹契丹主素聞諸將名皆慰勞賜以裘帽因戲之曰汝輩亦大惡漢不用鹽酪啗戰馬萬匹光逺等大慙契丹主嘉張敬逹之忠命收葬而祭之謂其下及晉諸將曰汝曹為人臣當效敬逹也時晉安寨馬猶近五千鎧仗五萬契丹悉取以歸其國悉以唐之將卒授帝語之曰勉事而主馬軍都指揮使康思立憤惋而死帝以晉安巳降遣使諭諸州代州刺史張朗斬其使吕琦奉唐主詔勞北軍至忻州遇晉使亦斬之謂刺史丁審琦曰虜過城下而不顧其心可見還日必無全理不若早帥兵民自五臺奔鎭州將行審琦悔之閉牙城不從州兵欲攻之琦曰家國如此何為復相屠滅乃帥州兵趣鎭州審琦遂降契丹契丹主謂帝曰桑維翰盡忠於汝宜以為相丙寅以趙瑩為門下侍郎桑維翰為中書侍郎並同平章事維翰仍權知樞密使事以楊光逺爲侍衛馬歩軍都指揮使以劉知逺爲保義節度使侍衛馬歩軍都虞候帝與契丹主將引兵而南欲留一子守河東咨於契丹主契丹主令帝盡出諸子自擇之帝兄子重貴父敬儒早卒帝養以爲子貌類帝而短小契丹主指之曰此大目者可也乃以重貴爲北京留守太原尹河東節度使契丹以其將髙謨翰爲前鋒與降卒偕進丁卯至團柏與唐兵戰趙徳鈞趙延壽先遁符彦饒張彦琦劉延朗劉在明繼之士卒大潰相騰踐死者萬計己巳延朗在明至懐州唐主始知帝即位楊光逺降衆議以天雄軍府尚完契丹必憚山東未敢南下車駕宜幸魏州唐主以李崧素與范延光善召崧謀之薛文遇不知而繼至唐主怒變色崧躡文遇足文遇乃去唐主曰我見此物肉顫適㡬欲抽佩刀刺之崧曰文遇小人淺謀誤國刺之益醜崧因勸唐主南還唐主從之洛陽聞北軍敗衆心大震居人四出逃竄山谷門者請禁之河南尹雍王重美曰國家多難未能為百姓主又禁其求生徒増惡名耳不若聽其自便事寧自還乃出令任從所適衆心差安壬申唐主還至河陽命諸將分守南北城張延朗請幸滑州庶與魏􅀶聲勢相接唐主不能決趙徳鈞趙延壽南奔潞州唐敗兵稍稍從之其將時賽帥盧龍輕騎東還漁陽帝先遣昭義節度使髙行周還具食至城下見徳鈞父子在城上行周曰僕與大王鄉曲敢不忠告城中無斗粟可守不若速迎車駕甲戌帝與契丹主至潞州徳鈞父子迎謁於髙河契丹主慰諭之父子拜帝於馬首進曰别後安否帝不顧亦不與之言契丹主問徳鈞曰汝在幽州所置銀鞍契丹直何在徳鈞指示之契丹主命盡殺之於西郊凡三千人遂􅃈徳鈞延壽送歸其國徳鈞見述律太后悉以所齎寳貨并籍其田宅獻之太后問曰汝近者何為徃太原徳鈞曰奉唐主之命太后指天曰汝從吾兒求為天子何妄語邪又自指其心曰此不可欺也又曰吾兒將行吾戒之云趙大王若引兵北向渝闗亟須引歸太原不可救也汝欲為天子何不先擊退吾兒徐圖亦未晩汝為人臣既負其主不能擊敵又欲乗亂邀利所為如此何靣目復求生乎徳鈞俛首不能對又問器玩在此田宅何在徳鈞曰在幽州太后曰幽州今屬誰德鈞曰屬太后太后曰然則又何獻焉徳鈞益慙自是鬱鬱不多食踰年而卒張礪與延壽俱入契丹契丹主復以為翰林學士帝將發上黨契丹主舉酒屬帝曰余逺來徇義今大事已成我若南向河南之人必大驚駭汝宜自引漢兵南下人必不甚懼我令太相温將五千騎衛送汝至河梁欲與之渡河者多少隨意余且留此俟汝音問有急則下山救汝若洛陽既定吾即北返矣與帝執手相泣久之不能别解白貂裘以衣帝贈良馬二十匹戰馬千二百匹曰世世子孫勿相忘又曰劉知逺趙瑩桑維翰皆創業功臣無大故勿弃也初張敬逹既出師唐主遣左金吾大將軍歴山髙漢筠守晉州敬逹死建雄節度副使田承肈帥衆攻漢筠於府署漢筠開門延承肇入從容謂曰僕與公俱受朝寄何相迫如此承肇曰欲奉公為節度使漢筠曰僕老矣義不為亂首死生惟公所處承肈目左右欲殺之軍士投刃於地曰髙金吾累朝宿徳奈何害之承肈乃謝曰與公戲耳聴漢筠歸洛陽帝遇諸塗曰朕憂卿為亂兵所傷今見卿甚喜符彦饒張彦琪至河陽密言於唐主曰今胡兵大下河水復淺人心巳離此不可守丁丑唐主命河陽節度使萇從簡與趙州刺史劉在明守河陽南城遂斷浮梁歸洛陽遣䆠者秦繼旻皇城使李彦紳殺昭信節度使李賛華於其第己卯帝至河陽萇從簡迎降舟楫巳具彰聖軍執劉在明以降帝釋之使復其所唐主命馬軍都指揮使宋審䖍歩軍都指揮使符彦饒河陽節度使張彦琪宣徽南院使劉延朗將千餘騎至白馬阪行戰地有五十餘騎度河奔于北軍諸將謂審䖍曰何地不可戰誰肯立於此乃還庚辰唐主又與四將議復向河陽而将校皆巳飛状迎帝帝慮唐主西奔遣契丹千騎扼澠池辛巳唐主與曹太后劉皇后雍王重美及宋審䖍等攜傳國寳登玄武樓自焚皇后積薪欲燒宫室重美諌曰新天子至必不露居它日重勞民力死而遺怨將安用之乃止王淑妃謂太后曰事急矣宜且避匿以俟姑夫太后曰吾子孫婦女一朝至此何忍獨生妹自勉之淑妃乃與許王從益匿於毬􅂣獲免是日晩帝入洛陽止于舊第唐兵皆解甲待罪帝慰而釋之帝命劉知逺部署京城知逺分漢軍使還營館契丹於天宫寺城中肅然無敢犯令士民避亂竄匿者數日皆還復業初帝在河東為唐朝所忌中書侍郎同平章事判三司張延朗不欲河東多蓄積凡財賦應留使之外盡收取之帝以是恨之壬午百官入見獨收延朗付御史臺餘皆謝恩甲申車駕入宫大赦應中外官吏一切不問惟賊臣張延朗劉延皓劉延朗姦邪貪猥罪難容貸中書侍郎平章事馬􅅌孫樞密使房暠宣徽使李專美河中節度使韓昭􅅌等雖居重位不務詭隨並釋罪除名中外臣僚先歸順者委中書門下别加任使劉延皓匿於龍門數日自經死劉延朗將奔南山捕得殺之斬張延朗既而選三司使難其人帝甚悔之閩人聞唐主之亡歎曰潞王之罪天下未之聞也將如吾君何十二月乙酉朔帝如河陽餞太相温及契丹兵歸國追廢唐主為庶人丁亥以馮道兼門下侍郎同平章事曹州刺史鄭阮貪暴指揮使石重立因亂殺之族其家辛卯以唐中書侍郎同平章事姚顗為刑部尚書初朔方節度使張希崇為政有威信民夷愛之興屯田以省漕運在鎮五年求内徙唐潞王以為靜難節度使帝與契丹修好恐其復取靈武癸巳復以希崇為朔方節度使初成徳節度使董温琪貪暴積貨巨萬以牙内都虞候平山祕瓊為腹心温琪與趙徳鈞俱没於契丹瓊盡殺温琪家人瘞於一坎而取其貨自稱留後表稱軍亂同州小校門鐸殺節度使楊漢賔焚掠州城詔贈李賛華燕王遣使送其喪歸國張朗將其衆入朝庚子以唐中書侍郎同平章事盧文紀為吏部尚書以皇城使晉陽周瓌為大將軍充三司使瓌辭曰臣自知才不稱職寧以避事見弃猶勝冒寵獲辜帝許之帝聞平盧節度使房知温卒遣天平節度使王建立將兵廵撫青州改興唐府曰廣晉府安逺節度使盧文進聞帝為契丹所立自以本契丹叛將辛丑弃鎮奔吳所過鎮戍召其主將告之故皆拜辭而退徐知誥以鎮南節度使太尉兼中書令李徳誠徳勝節度使兼中書令周本位望隆重欲使之帥衆推戴本曰我受先王大恩自徐温父子用事恨不能救楊氏之危又使我為此可乎其子弘祚强之不得巳與徳誠帥諸將詣江都表吳主陳知誥功徳請行册命又詣金陵勸進宋齊丘謂徳誠之子建勲曰尊公太祖元勲今日掃地矣於是吳宫多妖吳主曰吳祚其終乎左右曰此乃天意非人事也髙麗王建用兵擊破新羅百濟於是東夷諸國皆附之有二京六府九節度百二十郡資治通鑑巻第二百八十
