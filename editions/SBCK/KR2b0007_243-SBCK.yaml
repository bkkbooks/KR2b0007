body:
  text: 臣司馬光奉勑編集唐紀五十九雍涒灘凡六年起昭陽單閼盡著穆宗睿聖文惠孝皇帝下長慶三年春正月癸未賜兩軍中尉以下錢二月辛卯賜統軍軍使等綿綵銀器各有差户部侍郎牛僧孺素為上所厚初韓􅀪之子右驍衞將軍公武為其父謀以財結中外及公武卒􅀪繼薨稺孫紹宗嗣主藏奴與吏訟於御史府上憐之盡取􅀪財簿自閱視凡中外主權多納􅀪貨獨朱句細字曰某年月日送户部牛侍郎錢千萬不納上大喜以示左右曰果然吾不繆知人三月壬戌以僧孺爲中書侍郎同平章事時僧孺與李德裕皆有入相之望德裕出爲浙西觀察使八年不遷以爲李逢吉排已引僧孺爲相由是牛李之怨愈深夏四月甲午安南奏陸州獠攻掠州縣丙申賜宣徽院供奉官錢紫衣者百二十緡下至承㫖各有差初翼城人鄭注眇小目下視而巧譎傾謟善揣人意以醫遊四方羇貧甚甞以藥術干徐州牙將牙將恱之薦於節度使李愬愬餌其藥頗驗遂有寵署爲牙推浸預軍政妄作威福軍府患之監軍王守澄以衆情白愬請去之愬曰注雖如是然竒才也將軍試與之語茍無可取去之未晩乃使注往謁守澄守澄初有難色不得已見之坐語未乆守澄大喜延之中堂促􅂰笑語恨相見之晩明日謂愬曰鄭生誠如公言自是又有寵於守澄權勢益張愬署為廵官列於賓席注既用事恐牙將薦己者泄其本末密以它罪譛之於愬愬殺之及守澄入知樞密挈注以西為立居宅贍給之遂薦於上上亦厚遇之自上有疾守澄專制國事勢傾中外注日夜出入其家與之謀議語必通夕關通賂遺人莫能窺其迹始則有微賤巧宦之士或因以求進數年之後逹官車馬滿其門矣工部尚書鄭權家多姬妾祿薄不能贍因注通於守澄以求節鎭己酉以權為嶺南節度使五月壬申以尚書左丞栁公綽為山南東道節度使公綽過鄧縣有二吏一犯􅂍一舞文衆謂公綽必殺犯􅂍者公綽判曰􅂍吏犯法法在姦吏亂法法亡竟誅舞文者丙子以晉慈二州為保義軍以觀察使李寰為節度使六月己丑以吏部侍郎韓愈為京兆尹六軍不敢犯法私相謂曰是尚欲燒佛骨何可犯也秋七月癸亥嶺南奏黄洞蠻寇邕州破左江鎭丙寅邕州奏黄洞蠻破欽州千金鎭刺史楊嶼奔石南砦南詔勸利卒國人請立其弟豐祐豐祐勇敢善用其衆始慕中國不與父連名八月癸巳邕管奏破黄洞蠻丙申上自複道幸興慶宫至通化門樓投絹二百匹施山僧上之濫賜皆此類不可悉紀癸夘以左僕射裴度為司空山南西道節度使不兼平章事李逢吉惡度右補闕張又新等附逢吉競流謗毁傷度竟出之又新薦之子也九月丙辰加昭義節度使劉悟同平章事李逢吉為相内結知樞密王守澄勢傾朝野惟翰林學士李紳每承顧問常排抑之擬狀至内庭紳多所臧否逢吉患之而上待遇方厚不能逺也㑹御史中丞缺逢吉薦紳清直宜居風憲之地上以中丞亦次對官不疑而可之㑹紳與京兆尹兼御史大夫韓愈争臺㕘及它職事文移往來辭語不遜逢吉奏二人不協冬十月丙戌以愈為兵部侍郎紳為江西觀察使己丑以中書侍郎同平章事杜元頴同平章事充西川節度使辛夘安南奏黄洞蠻為寇韓愈李紳入謝上各令自叙其事乃深寤壬辰復以愈為吏部侍郎紳為户部侍郎四年春正月辛亥朔上始御含元殿朝㑹初栁泌等既誅方士稍復因左右以進上餌其金石之藥有處士張臯者上䟽以為神慮澹則血氣和嗜欲勝則疾疹作藥以攻疾無疾不可餌也昔孫思邈有言藥勢有所偏助令人藏氣不平借使有疾用藥猶須重愼庶人尚爾况於天子先帝信方士妄言餌藥致疾此陛下所詳知也豈得復循其覆轍乎今朝野之人紛紜竊議但畏忤㫖莫敢進言臣生長蓬艾麋鹿與遊無所邀求但粗知忠義欲裨萬一耳上甚善其言使求之不獲丁夘嶺南奏黄洞蠻寇欽州殺將吏庚午上疾復作壬申大漸命太子監國宦官欲請郭太后臨朝稱制太后曰昔武后稱制㡬傾社稷我家世守忠義非武氏之比也太子雖少但得賢宰相輔之卿輩勿預朝政何患國家不安自古豈有女子為天下主而能致唐虞之理乎取制書手裂之太后兄太常卿釗聞有是議密上牋曰若果徇其請臣請先帥諸子納官爵歸田里太后泣曰祖考之慶鍾於吾兄是夕上崩于寢殿癸酉以李逢吉攝冢宰丙子敬宗即位于太極東序初穆宗之立神䇿軍士人賜錢五十千宰相議以太厚難繼乃下詔稱宿衞之勤誠宜厚賞屬頻年旱歉御府空虚邉兵尚未給衣霑䘏期於均濟神䇿軍士人賜絹十匹錢十千畿内諸鎭又減五千仍出内庫綾二百萬匹付度支充邉軍春衣時人善之自戊寅至庚辰上賜宦官服色及錦綵金銀甚衆或今日賜綠明日賜緋初穆宗既留李紳李逢吉愈忌之紳族子虞頗以文學知名自言不樂仕進隠居華陽川及從父耆為左拾遺虞與耆書求薦誤逹於紳紳以書誚之且以語於衆人虞深怨之乃詣逢吉悉以紳平日密論逢吉之語告之逢吉益怒使虞與補闕張又新及從子前河陽掌書記仲言等伺求紳短揚之於士大夫間且言紳潛察士大夫有羣居議論者輒指為朋黨白之於上由是士大夫多忌之及敬宗即位逢吉與其黨快紳失勢又恐上復用之日夜謀議思所以害紳者楚州刺史蘇遇謂逢吉之黨曰主上初聽政必開延英有次對官惟此可防其黨以為然亟白逢吉曰事迫矣若俟聽政悔不可追逢吉乃令王守澄言於上曰陛下所以為儲貳臣備知之皆逢吉之力也如杜元潁李紳輩皆欲立深王度支員外郎李續之等繼上章言之上時年十六疑未信會逢吉亦有奏言紳謀不利於上請加貶謫上猶再三覆問然後從之二月癸未貶紳為端州司馬逢吉仍帥百官表賀既退百官復詣中書賀逢吉方與張又新語門者弗内良乆又新揮汗而出旅揖百官曰端溪之事又新不敢多讓衆駭愕辟易憚之右拾遺内供奉吳思獨不賀逢吉怒以思為吐蕃告哀使丙戌貶翰林學士龎嚴為信州刺史蔣防為汀州刺史嚴夀州人與防皆紳所引也給事中于敖素與嚴善封還敕書人為之懼曰于給事為龎蔣直寃犯宰相怒誠所難也及奏下乃言貶之太輕逢吉由是奬之張又新等猶忌紳日上書言貶紳太輕上許為殺之朝臣莫敢言獨翰林侍讀學士韋處厚上䟽指述紳為逢吉之黨所讒人情歎駭紳蒙先朝奬用借使有罪猶宜容假以成三年無改之孝况無罪乎於是上稍開寤會閱禁中文書有穆宗所封一篋􅀤之得裴度杜元潁李紳䟽請立上為太子上乃嗟歎悉焚人所上譖紳書雖未即召還後有言者不復聽矣己亥尊郭太后為太皇太后乙巳尊上母王妃為皇太后太后越州人也丁未上幸中和殿擊毬自是數遊宴擊毬奏樂賞賜宦官樂人不可悉紀三月壬子赦天下諸道常貢之外毋得進奉甲寅上始對宰相於延英殿初牛元翼在襄陽數賂王庭湊以請其家庭湊不與聞元翼薨甲子盡殺之上視朝每晏戊辰日絶髙尚未坐百官班於紫宸門外老病者㡬至僵踣諫議大夫李渤白宰相曰昨日䟽論坐晩今晨愈甚請出閤待罪於金吾仗既坐班退左拾遺劉栖楚獨留進言曰憲宗及先帝皆長君四方猶多叛亂陛下富於春秋嗣位之初當宵衣求理而嗜寢樂色日晏方起梓宫在殯鼓吹日喧令聞未彰惡聲遐布臣恐福祚之不長請碎首玉階以謝諫職之曠遂以額叩龍墀見血不已響聞閤外李逢吉宣曰劉栖楚休叩頭俟進止栖楚捧首而起更論宦官事上連揮令出栖楚曰不用臣言請繼以死牛僧孺宣曰所奏知門外俟進止栖楚乃出待罪金吾仗於是宰相賛成其言上命中使就仗并李渤宣慰令歸尋擢栖楚為起居舍人仍賜緋栖楚辭疾不拜歸東都庚午賜内教坊錢萬緡以備行幸夏四月甲午淮南節度使王播罷鹽鐵轉運使乙未以布衣姜洽為補闕試大理評事陸洿布衣李虞劉堅爲拾遺時李逢吉用事所親厚者張又新李仲言李續之李虞劉栖楚姜洽及拾遺張權輿程昔範又有從而附麗之者時人惡逢吉者目之爲八關十六子卜者􅂫玄明與染坊供人張韶善玄明謂韶曰我爲子卜當升殿坐與我共食今主上晝夜毬獵多不在宫中大事可圖也韶以爲然乃與玄明謀結染工無頼者百餘人丙申匿兵於紫草車載以入銀臺門伺夜作亂未逹所詣有疑其重載而詰之者韶急即殺詰者與其徒易服揮兵大呼趣禁庭上時在清思殿擊毬諸宦者見之驚駭急入閉門走白上盜尋斬關而入先是右神䇿中尉梁守謙有寵於上每兩軍角伎藝上常佑右軍至是上狼狽欲幸右軍左右曰右軍逺恐遇盗不若幸左軍近上從之左神䇿中尉河中馬存亮聞上至走出迎捧上足涕泣自負上入軍中遣大將康藝全將騎卒入宫討賊上憂二太后隔絶存亮復以五百騎迎二太后至軍張韶升清思殿坐御榻與蘇􅀇明同食曰果如子言􅀇明驚曰事止此邪韶懼而走㑹康藝全與右軍兵馬使尚國忠引兵至合擊之殺韶􅀇明及其黨死者狼藉逮夜始定餘黨猶散匿禁苑中明日悉擒獲之時宫門皆閉上宿於左軍中外不知上所在人情恇駭丁酉上還宫宰相帥百官詣延英門賀來者不過數十人盗所歴諸門監門宦者三十五人法當死己亥詔並杖之仍不改職任壬寅厚賞兩軍立功將士五月乙夘以吏部侍郎李程户部侍郎判度支竇易直並同平章事上問相於李逢吉逢吉列上當時大臣有資望者程為之首故用之上好治宫室欲營别殿制度甚廣李程諫請以所具木石囘奉山陵上即從之六月己夘朔以左神䇿大將軍康藝全為鄜坊節度使上聞王庭湊屠牛元翼家歎宰輔非才使凶賊縱暴翰林學士韋處厚因上䟽言裴度勲髙中夏聲播外夷若置之巖廊委其參决河北山東必禀朝筭管仲曰人離而聽之則愚合而聽之則聖理亂之本非有它術順人則理違人則亂伏承陛下當食歎息恨無蕭曹今有一裴度尚不能留此馮唐所以謂漢文得廉頗李牧不能用也夫御宰相當委之信之親之禮之於事不效於國無勞則置之散寮黜之逺郡如此則在位者不敢不厲將進者不敢茍求臣與逢吉素無私嫌甞為裴度無辜貶官今之所陳上答聖明下逹羣議耳上見度奏狀無平章事以問處厚處厚具言李逢吉排沮之狀上曰何至是邪李程亦勸上加禮於度丙申加度同平章事張韶之亂馬存亮功為多存亮不自矜委權求出秋七月以存亮為淮南監軍使夏綏節度使李祐入為左金吾大將軍壬申進馬百五十匹上却之甲戌侍御史温造於閤内奏彈祐違敕進奉請論如法詔釋之祐謂人曰吾夜半入蔡州城取吳元濟未甞心動今日膽落於温御史矣八月丁夘朔安南奏黄蠻入寇龍州刺史尉遲鋭上言牛心山素稱神異有掘斷處請加補塞從之役數萬人於絶險之地東川為之疲弊九月丁未波斯李蘇沙獻沉香亭子材左拾遺李漢上言此何異瑶臺瓊室上雖怒亦優容之漢道明之六世孫也冬十月戊戌翰林學士韋處厚諫上宴遊曰先帝以酒色致疾損夀臣是時不死諫者以陛下年已十五故也今皇子纔一歲臣安敢畏死而不諫乎上感其言賜錦綵百匹銀器四十一月戊午安南奏黄蠻與環王合兵攻䧟陸州殺刺史葛維庚申葬睿聖文惠孝皇帝于光陵廟號穆宗王播以錢十萬緡賂王守澄求復領利權十二月癸未諫議大夫獨孤朗張仲方起居郎桞公權起居舍人宋由錫拾遺李景讓薛廷老等請開延英論其姧邪上問前廷争者不在中邪即日除劉栖楚諫議大夫景讓憕之曾孫廷老河中人也十二月庚寅加天平節度使烏重􅅌同平章事乙未徐泗觀察使王智興以上生日請於泗州置戒壇度僧尼以資福許之自元和以來敕禁此弊智興欲聚貨首請置之於是四方輻湊江淮尤甚智興家貲由此累鉅萬浙西觀察使李德裕上言若不鈐制至降誕日方停計兩浙福建當失六十萬丁奏至即日罷之是歲囘鶻崇德可汗卒弟曷薩特勒立敬宗睿武昭愍孝皇帝寳曆元年春正月辛亥上祀南郊還御丹鳳樓赦天下改元先是鄠令崔􅀤聞外喧囂問之曰五坊人􅇌百姓􅀤怒命擒以入曵之於庭時已昏黑良乆詰之乃中使也上怒收􅀤繫御史臺是日􅀤與諸囚立金雞下忽有品官數十人執挺亂捶􅀤破靣折齒絶氣乃去數刻而蘇復有繼來求擊之者臺吏以席蔽之僅免上命復繫􅀤於臺獄而釋諸囚中書侍郎同平章事牛僧孺以上荒淫嬖幸用事又畏罪不敢言但累表求出乙夘升鄂岳為武昌軍以僧孺同平章事充武昌節度使中㫖復以王播兼鹽鐵轉運使諫官屢爭之上皆不納牛僧孺過襄陽山南東道節度使栁公綽服櫜鞬候於館舍將佐諌曰襄陽地髙於夏口此禮太過公綽曰竒章公甫離台席方鎭重宰相所以尊朝廷也竟行之上遊幸無常昵比羣小視朝月不再三大臣罕得進見二月壬午浙西􅀚察使李德裕獻丹扆六箴一曰宵衣以諷視朝稀晩二曰正服以諷服御乖異三曰罷獻以諷徴求玩好四曰納誨以諷侮弃讜言五曰辨邪以諷信任羣小六曰防微以諷輕出遊幸其納誨箴略曰漢驁流􅊺舉白浮鍾魏叡侈汰陵霄作宫忠雖不忤善亦不從以規爲瑱是謂塞聦防微箴略曰亂臣猖蹶非可遽數􅀇服莫辨觸瑟始仆柏谷微行犲豕塞路覩貎獻餐斯可戒懼上優詔答之上既復繫崔􅀤於獄給事中李渤上言縣令不應曵中人中人不應􅇌御囚其罪一也然縣令所犯在赦前中人所犯在赦後中人横暴一至於此若不早正刑書臣恐四夷藩鎭聞之則慢易之心生矣諫議大夫張仲方上言略曰鴻恩將布於天下而不行御前霈澤徧被於昆蟲而獨遺崔􅀤自餘諫官論奏甚衆上皆不聽戊子李逢吉等從容言於上曰崔􅀤輒曵中人誠大不敬然其母故相韋貫之之姊也年垂八十自􅀤下獄積憂成疾陛下方以孝理天下此所宜矜念上乃愍然曰比諫官但言􅀤寃未甞言其不敬亦不言有老母如卿所言朕何為不赦之即命中使釋其罪送歸家仍慰勞其母母對中使杖􅀤四十三月辛酉遣司門郎中于人文冊囘鶻曷薩特勒為愛登里囉汨没密於合毗伽昭禮可汗夏四月癸巳羣臣上尊號曰文武大聖廣孝皇帝赦天下赦文但云左降官已經量移者宜與量移不言未量移者翰林學士韋處厚上言逢吉恐李紳量移故有此處置如此則應近年流貶官因李紳一人皆不得量移也上即追赦文改之紳由是得移江州長史秋七月甲辰鹽鐵使王播進羡餘絹百萬匹播領鹽鐵誅求嚴急正入不充而羡餘相繼己未詔王播造競渡船二十艘運材於京師造之計用轉運半年之費諫議大夫張仲方等力諫乃減其半諫官言京兆尹崔元略以諸父事内常侍崔潭峻丁夘元略遷户部侍郎昭義節度使劉悟之去鄆州也以鄆兵二千自隨為親兵八月庚戌悟暴疾薨子將作監主簿從諫匿其喪與大將劉武德及親兵謀以悟遺表求知留後司馬賈直言入責從諫曰爾父提十二州地歸朝廷其功非細秪以張汶之故自謂不潔淋頭竟至羞死爾孺子何敢如此父死不哭何以為人從諫恐悚不能對乃􅀤喪初陳留人武昭罷石州刺史為袁王府長史鬱鬱怨執政李逢吉與李程不相恱水部郎中李仍叔程之族人激怒之云程欲與昭官為逢吉所沮昭因酒酣對左金吾兵曹茅彚言欲刺逢吉為人所告九月庚辰詔三司鞫之前河陽掌書記李仲言謂彚曰君言李程與昭謀則生不然必死彚曰寃死甘心誣人自全彚不為也獄成冬十月甲子武昭杖死李仍叔貶道州司馬李仲言流象州茅彚流崖州上欲幸驪山温湯左僕射李絳諫議大夫張仲方等屢諫不聽拾遺張權輿伏紫宸殿下叩頭諫曰昔周幽王幸驪山為大戎所殺秦始皇葬驪山國亡􅀇宗宫驪山而祿山亂先帝幸驪山而享年不長上曰驪山若此之凶邪我宜一往以驗彼言十一月庚寅幸温湯即日還宫謂左右曰彼叩頭者之言安足信哉丙申立皇子普為晉王朝廷得劉悟遺表議者多言上黨内鎭與河朔異不可許左僕射李絳上䟽以為兵機尚速威斷貴定人情未一乃可伐謀劉悟死已數月朝廷尚未處分中外人意共惜事機今昭義兵衆必不盡與從諫同謀縱使其半叶同尚有其半效順從諫未甞乆典兵馬威惠未加於人又此道素貧非時必無優賞今朝廷但速除近澤潞一將充昭義節度使令兼程赴鎭從諫未及布置新使已至潞州所謂先人奪人之心也新使既至軍心自有所繫從諫無位何名主張設使謀撓朝命其將士必不肯從今朝廷乆無處分彼軍不曉朝廷之意欲效順則恐忽授從諫欲同惡則恐别更除人猶豫之間若有姦人為之畫䇿虚張賞設錢數軍士覬望尤難指揮伏望速賜裁斷仍先下明敕宣示軍衆奬其從來忠節賜新使繒五十萬匹使之賞設續除劉從諫一刺史從諫既粗有所得必且擇利而行萬無違拒設不從命臣亦以為不假攻討何則臣聞從諫已禁山東三州軍士不許自畜兵刀足明羣心殊未得一帳下之事亦在不疑熟計利害决無即授從諫之理時李逢吉王守澄計議已定竟不用絳等謀十二月辛丑以從諫為昭義留後劉悟煩苛從諫濟以寛厚衆頗附之李絳好直言李逢吉惡之故事僕射上日宰相送之百官立班中丞列位於廷尚書以下每月當牙元和中伊愼為僕射太常博士韋謙上言舊儀太重削去之御史中丞王播恃逢吉之勢與絳相遇於塗不之避絳引故事上言僕射國初為正宰相禮數至重儻人才黍位自宜别授賢良若朝命守官豈得有虧法制乞下百官詳定議者多從絳議上聽行舊儀甲子以絳有足疾除太子少師分司言事者多稱裴度賢不宜弃之藩鎭上數遣使至興元勞問度密示以還期度因求入朝逢吉之黨大懼二年春正月壬辰裴度自興元入朝李逢吉之黨百計毁之先是民間謡云緋衣小兒坦其腹天上有口被驅逐又長安城中有横亘六岡如乾象度宅偶居第五岡張權輿上言度名應圖䜟宅占岡原不召而來其旨可見上雖年少悉察其誣謗待度益厚度􅀄至京師朝士塡門度留客飲京兆尹劉栖楚附度耳語侍御史崔咸舉觴罰度曰丞相不應許所由官呫囁耳語度笑而飲之栖楚不自安趨出二月丁未以度爲司空同平章事度在中書左右忽白失印聞者失色度飲酒自如頃之左右白復於故處得印度不應或問其故度曰此必吏人盗之以印書劵耳急之則投諸水火緩之則復還故處人服其識量上自即位以來欲幸東都宰相及朝臣諌者甚衆上皆不聽決意必行巳令度支員外郎盧貞按視修東都宫闕及道中行宫裴度從容言於上曰國家本設兩都以僃廵幸自多難以來兹事遂廢今宫闕營壘百司廨舍率已荒阤陛下儻欲行幸宜命有司歲月間徐加完葺然後可往上曰從來言事者皆云不當往如卿所言不往亦可㑹朱克融王庭湊皆請以兵匠助修東都三月丁亥敕以修東都煩擾罷之召盧貞還先是朝廷遣中使賜朱克融時服克融以為踈惡執留敕使又奏當道今歲將士春衣不足乞度支給三十萬端匹又奏欲將兵馬及丁匠五千助修宫闕上患之以問宰相欲遣重臣宣慰仍索敕使裴度對曰克融無禮已甚殆將斃矣譬如猛獸自於山林中咆哮跳踉乆當自困必不敢輒離巢穴願陛下勿遣宣慰亦勿索敕使旬日之後徐賜詔書云聞中官至彼稍失去就俟還朕自有處分時服有司製造不謹朕甚欲知之已令區處其將士春衣從來非朝廷徴􅀤皆本道自備朕不愛數十萬匹物但素無此例不可獨與范陽所稱助修宮闕皆是虚語若欲直挫其姦宜云丁匠宜速遣來已令所在排比供擬彼得此詔必蒼黄失圖若且示含容則云修宫闕事在有司不假丁匠逺來如是而已不足勞聖慮也上恱從之立才人郭氏為貴妃妃晉王普之母也横海節度使李全略薨其子副大使同㨗擅領留後重賂鄰道以求承繼夏四月戊申以昭義留後劉從諫為節度使五月幽州軍亂殺朱克融及其子延齡軍中立其少子延嗣主軍務六月甲子上御三殿令左右軍教坊内園為擊毬手搏雜戲戲酣有斷臂碎首者夜漏數刻乃罷己夘上幸興福寺觀沙門文溆俗講癸未衡王絢薨壬辰宣索左藏見在銀十萬兩金七千兩悉貯内藏以便賜與道士趙歸真說上以神仙僧惟貞齊賢正簡說上以禱祠求福皆出入宫禁上信用其言山人杜景先請徧歷江嶺求訪異人有潤州人周息元自言夀數百歲上遣中使迎之八月乙巳息元至京師上館之禁中山亭朱延嗣既得幽州虐用其人都知兵馬使李載義與弟牙内兵馬使載寜共殺延嗣并屠其家三百餘人載義權知留後九月數廷嗣之罪以聞載義承乾之後也庚申魏博節度使史憲誠妄奏李同㨗為軍士所逐走歸本道請束身歸朝尋奏同㨗復歸滄州壬申以中書侍郎同平章事李程同平章事充河東節度使冬十月己亥以李載義為盧龍節度使十一月甲申以門下侍郎同平章事李逢吉同平章事充山南東道節度使上遊戲無度狎暱羣小善擊毬好手搏禁軍及諸道争獻力士又以錢萬緡付内園令召募力士晝夜不離側又好深夜自捕狐狸性復褊急力士或恃恩不遜輙配流籍没宦官小過動遭捶撻皆怨且懼十二月辛丑上夜獵還宫與宦官劉克明田務澄許文端及擊毬軍將蘇佐明王嘉憲石從寛閻惟直等二十八人飲酒上酒酣入室更衣殿上燭怱滅蘇佐明等弑上於室内劉克明等矯稱上旨命翰林學士路隋草遺制以絳王悟權句當軍國事壬寅宣遺制絳王見宰相百官於紫宸外廡克明等欲易置内侍之執權者於是樞密使王守澄楊承和中尉魏從簡梁守謙定議以衞兵迎江王涵入宫􅀤左右神䇿飛龍兵進討賊黨盡斬之克明赴井出而斬之絳王為亂兵所害時事起蒼猝守澄等以翰林學士韋處厚博通古今一夕處置皆與之共議守澄等欲號令中外而疑所以為辭處厚曰正名討罪於義何嫌安可依違有所諱避又問江王當如何踐阼處厚曰詰朝當以王教布告中外以己平内難然後羣臣三表勸進以太皇太后令冊命即皇帝位當時皆從其言時不暇復問有司凡百儀法皆出於處厚無不叶宜癸夘以裴度攝冡宰百官謁見江王於紫宸外廡王素服涕泣甲辰見諸軍使於少陽院趙歸真等諸術士及敬宗時佞幸者皆流嶺南或邊地乙巳文宗即位更名昻戊申尊母蕭氏為皇太后王太后為寳曆太后是時郭太后居興慶宫王太后居義安殿蕭太后居大内上性孝謹事三宫如一每得珍異之物先薦郊廟次奉三宫然後進御蕭太后閩人也庚戌以翰林學士韋處厚為中書侍郎同平章事上自為諸王深知兩朝之弊及即位勵精求治去奢從儉詔宫女非有職掌者皆出之出三千餘人五坊鷹犬準元和故事量留校獵外悉放之有司供宫禁年支物並凖貞元故事省教坊翰林揔監冗食千二百餘貟停諸司新加衣糧御馬坊塲及近歲别貯錢榖所占陂田悉歸之有司先宣索組繡彫鏤之物悉罷之敬宗之丗每月視朝不過一二上始復舊制每竒日未甞不視朝對宰相羣臣延訪政事乆之方罷待制官舊雖設之未嘗召對至是屢蒙延問其輟朝放朝皆用偶日中外翕然相賀以爲太平可冀文宗元聖昭獻孝皇帝上之上太和元年春二月乙巳赦天下改元李同捷擅據滄景朝廷經歲不問同捷冀易世之後或加恩貸三月壬戍朔遣掌書記崔從長奉表與其弟同志同巽俱入見請遵朝㫖上雖虚懷聽納而不能堅决與宰相議事已定尋復中變夏四月丙辰韋處厚於延英極論之因請避位上再三慰勞之忠武節度使王沛薨庚申以太僕卿髙瑀為忠武節度使自大曆以來節度使多出禁軍其禁軍大將資髙者皆以倍稱之息貸錢於富室以賂中尉動踰億萬然後得之未嘗由執政至鎮則重斂以償所負及沛薨裴度韋處厚始奏以瑀代之中外相賀曰自今債帥鮮矣五月丙子以天平節度使烏重􅅌為横海節度使以前横海節度副使李同㨗為兖海節度使朝廷猶慮河南北節度使構扇同㨗使拒命乃加魏博史憲誠同平章事丁丑加盧龍李載義平盧康志睦成德王庭湊檢校官鹽鐵使王播自淮南入朝力圖大用所獻銀器以千計綾絹以十萬計六月癸巳以播為左僕射同平章事秋七月癸酉葬睿武昭愍孝皇帝于莊陵廟號敬宗李同㨗託為將士所留不受詔乙酉武寜節度使王智興奏請將本軍三萬人自備五月糧以討同㨗許之八月庚子削同㨗官爵命烏重􅅌王智興康志睦史憲誠李載義與義成節度使李聽義武節度使張播各帥本軍討之同㨗遣其子弟以珍玩女妓賂河北諸鎮戊午李載義執其姪并所賂獻之史憲誠與李全略為婚姻及同㨗叛密以糧助之裴度不知其所為謂憲誠無貳心憲誠遣親吏至中書請事韋處厚謂曰晉公於上前以百口保爾使主處厚則不然但仰俟所為自有朝典耳憲誠懼不敢復與同㨗通王庭湊為同㨗求節鉞不獲乃助之為亂出兵境上以擾魏師又遣使厚賂沙陀酋長朱邪執宜欲與之連兵執宜拒不受冬十月天平横海節度使烏重􅅌擊同㨗屢破之十一月丙寅重􅅌薨庚辰以保義節度使李寰為横海節度使從王智興之請也十二月庚戌加王智興同平章事二年春三月己夘王智興攻棣州焚其三門自元和之末宦官益横建置天子在其掌握威權出人主之右人莫敢言辛巳上親䇿制舉人賢良方正昌平劉蕡對䇿極言其禍其略曰陛下宜先憂者宫闈將變社稷將危天下將傾海内將亂又曰陛下將杜篡弑之漸則居正位而近正人逺刀鋸之賤親骨鯁之直輔相得以專其任庶職得以守其官柰何以䙝近五六人揔天下大政禍稔蕭牆姦生帷幄臣恐曹節侯覽復生於今日又曰忠賢無腹心之寄閫寺持廢立之權陷先君不得正其終致陛下不得正其始又曰威柄陵夷藩臣跋扈或有不逹人臣之節首亂者以安君為名不究春秋之微稱兵者以逐惡為義則政刑不由乎天子征伐必自於諸侯又曰陛下何不塞隂邪之路屏䙝狎之臣制侵陵迫脅之心復門户掃除之役戒其所宜戒憂其所宜憂既不能治於前當治於後既不能正其始當正其終則可以䖍奉典謨克承丕構矣昔秦之亡也失於彊暴漢之亡也失於微弱彊暴則賊臣畏死而害上微弱則姦臣竊權而震主伏見敬宗皇帝不虞亡秦之禍不翦其萌伏惟陛下深軫亡漢之憂以杜其漸則祖宗之鴻業可紹三五之遐軌可追矣又曰臣聞昔漢元帝即位之初更制七十餘事其心甚誠其稱甚美然而紀綱日紊國祚日衰姦宄日彊黎元日困者以其不能擇賢明而任之失其操柄也又曰陛下誠能揭國權以歸相持兵柄以歸將則心無不達行無不孚矣又曰法宜畫一官宜正名今分外官中官之員立南司北司之局或犯禁于南則亡命于北或正刑于外則破律於中法出多門人無所措實由兵農勢異而中外法殊也又曰今夏官不知兵籍止於奉朝請六軍不主兵事止於養勲階軍容合中官之政戎律附内臣之職首一戴武弁疾文吏如仇讎足一蹈軍門視農夫如草芥謀不足以翦除兇逆而詐足以抑揚威福勇不足以鎮衞社稷而暴足以侵軼里閭羈絏藩臣干陵宰輔隳裂王度汨亂朝經張武夫之威上以制君父假天子之命下以御英豪有藏姦觀釁之心無伏節死難之義豈先王經文緯武之㫖邪又曰臣非不知言􅀤而禍應計行而身戮蓋痛社稷之危哀生人之困豈忍姑息時忌竊陛下一命之寵哉閏月丙戌朔史憲誠奏遣其子副大使唐都知兵馬使开志紹將兵二萬五千趣德州討李同㨗時憲誠欲助同㨗唐泣諫且請􅀤兵討之憲誠不能違甲午賢良方正裴休李郃李甘杜牧馬植崔璵王式崔慎由等二十二人中第皆除官考官左散騎常侍馮宿等見劉蕡䇿皆歎服而畏宦官不敢取詔下物論囂然稱屈諫官御史欲論奏執政抑之李郃曰劉蕡下第我輩登科能無厚顔乃上䟽以為蕡所對䇿漢魏以來無與為比今有司以蕡指切左右不敢以聞恐忠良道窮綱紀遂絶况臣所對不及蕡逺甚乞回臣所授以旌蕡直不報蕡由是不得仕於朝終於使府御史牧佑之孫植勛之子式起之子慎由融之玄孫也夏六月晉王普薨辛酉贈悼懷太子初蕭太后㓜去鄉里有弟一人上即位命福建觀察使求訪莫知所在有茶綱役人蕭洪自言有姊流落商人趙縝引之見太后近親吕璋之妻亦不能辨與之俱見太后上以爲得真舅甲子以為太子洗馬峯州刺史王升朝叛庚辰安南都護武陵韓約討斬之王庭湊隂以兵及鹽粮助李同捷上欲討之秋七月甲辰詔中書集百官議其事宰相以下莫敢違衞尉卿殷侑獨以爲廷湊雖附凶徒事未甚露宜且含容專討同捷己巳下詔罪狀庭湊命鄰道各嚴兵守僃聽其自新九月丁亥王智興奏拔棣州李寰自晉州引兵赴鎮不戢士卒所過殘暴至則擁兵不進但坐索供饋庚寅以寰為夏綏節度使甲午詔削奪王庭湊官爵命諸軍四面進討加王智興守司徒以前夏綏節度使傅良弼為横海節度使岳王緄薨庚戌容管奏安南軍亂逐都䕶韓約冬十月洋王忻薨魏博敗横海兵於平原遂拔之十一月癸未朔易定節度使栁公濟奏攻李同㨗堅固寨拔之又破其兵於寨東時河南北諸軍討同㨗乆未成功每有小勝則虚張首虜以邀厚賞朝廷竭力奉之江淮為之耗弊傅良弼至陜而薨乙酉以左金吾大將軍李祐為横海節度使甲辰禁中昭德寺火延及宫人所居燒死者數百人十二月丁巳王智興奏兵馬使李君謀將兵濟河破無棣壬申中書侍郎同平章事韋處厚薨李同㨗軍勢日蹙王庭湊不能救乃遣人説魏博大將开志紹使殺史憲誠父子取魏博志紹遂作亂引所部兵二萬人還逼魏州丁丑命諫議大夫柏耆宣慰魏博且􅀤義成河陽兵以討志紹戊寅以翰林學士路隋為中書侍郎同平章事辛巳史憲誠奏开志紹兵屯永濟告急求援詔義成節度使李聽帥滄州行營諸軍以討志紹資治通鑑卷第二百四十三
