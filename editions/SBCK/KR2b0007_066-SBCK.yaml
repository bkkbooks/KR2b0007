body:
  text: 臣司馬光奉勑編集漢紀五十八陽大荒落凡五年起屠維赤奮若盡昭孝獻皇帝辛建安十四年春三月曹操軍至譙孫權圍合􅏂乆不下權率輕􅀐欲身往突敵長史張紘諫曰夫兵者凶器戰者危事也今麾下恃盛壯之氣忽彊􅁀之虜三軍之衆莫不寒心雖斬將搴旗威震敵場此乃偏將之任非主將之宜也願抑賁育之勇懷霸王之計權乃止曹操遣將軍張喜將兵解圍乆而未至揚州别駕楚國蔣濟密白刺史僞得喜書云步􅀐四萬已到雩婁遣主簿迎喜三部使齎書語城中守將一部得入城二部爲權兵所得權信之遽燒圍走秋七月曹操引水軍自渦入淮出􅏂水軍合􅏂開芍陂屯田冬十月荆州地震十二月操軍還譙廬江人陳蘭梅成據灊六叛操遣盪寇將軍張遼討斬之因使遼與樂進李典等將七千餘人屯合肥周瑜攻曹仁􅀊餘所殺傷甚衆仁委城走權以瑜領􅀯郡太守屯據江陵程普領江夏太守治沙羡吕範領彭澤太守吕蒙領尋陽令劉僃表權行車􅀐將軍領徐州牧㑹劉􅄾卒權以僃領荆州牧周瑜分南岸地以給僃僃立營於油口改名公安權以妺妻僃妺才捷剛猛有諸兄風侍婢百餘人皆執刀侍立僃每入心常凛凛曹操密遣九江蔣幹往􅀃周瑜幹以才辯獨歩於江淮之間乃布衣葛巾自託私行詣瑜瑜出迎之立謂幹曰子翼良苦逺渉江湖爲曹氏作􅀃客邪因延幹與周觀營中行視倉庫軍資器仗訖還飲宴示之侍者服飾珍玩之物因謂幹曰丈夫處丗遇知己之主外託君臣之義内結骨肉之恩言行計從禍福共之假使蘇張更生能移其意乎幹但笑終無所言還白操稱瑜雅量高致非言辭所能閒也丞相􅁺和洽言於曹操曰天下之人材德各殊不可以一節取也儉素過中自以處身則可以此格物所失或多今朝廷之議吏有著新衣乗好車者謂之不淸形容不飾衣裘敝壞者謂之廉潔至令士大夫故汙辱其衣藏其輿服朝府大吏或自挈壷飱以入官寺夫立教觀俗貴處中庸爲可繼也今崇一槪難堪之行以檢殊塗勉而爲之必有疲瘁古之大敎務在通人情而已凡激詭之行則容隱僞矣操善之十五年春下令曰孟公綽爲趙魏老則優不可以爲滕薛大夫若必廉士而後可用則齊桓其何以霸丗二三子其佐我明揚仄陋唯才是舉吾得而用之二月乙巳朔日有食之冬曹操作銅爵臺於鄴十二月己亥操下令曰􅀌始舉孝廉自以本非巖穴知名之士恐爲丗人之所凡愚欲好作政敎以立名譽故在濟南除殘去穢平心選舉以是爲彊豪所忿恐致家禍故以病還鄕里時年紀尚少乃於譙東五十里築精舍欲秋夏讀書冬春射獵爲二十年規待天下淸乃出仕耳然不能得如意徴爲典軍校尉意遂更欲爲國家討賊立功使題墓道言漢故征西將軍曹矦之墓此其志也而遭值董卓之難興舉義兵後領兖州破降黃巾三十萬衆又討擊􅀽術使窮沮而死摧破􅀽紹梟其二子復定劉表遂平天下身爲宰相人臣之貴已極意望已過矣設使國家無有􅀌不知當幾人稱帝幾人稱王或者人見􅀌彊盛又性不信天命恐妄相忖度言有不遜之志每用耿耿故爲諸君陳道此言皆肝鬲之要也然欲􅀌便爾委􅂢所典兵衆以還執事歸就武平矦國實不可也何者誠恐已離兵爲人所禍旣爲子孫計又已敗則國家傾危是以不得慕虚名而處實禍也然封兼四縣食户三萬何德堪之江湖未靜不可讓位至於邑土可得而辭今上還陽夏柘苦三縣戸二萬但食武平萬戸且以分損謗議少減􅀌之責也劉表故吏士多歸劉僃僃以周瑜所給地少不足以容其衆乃自詣京見孫權求都督荆州瑜上䟽於權曰劉僃以梟雄之姿而有􅀜羽張飛熊虎之將必非乆屈爲人用者愚謂大計宜徙僃置吴盛爲築宫室多其美女玩好以娱其耳目分此二人各置一方使如瑜者得挾與攻戰大事可定也今猥割土地以資業之聚此三人俱在疆埸恐蛟龍得雲雨終非池中物也吕範亦勸留之權以曹操在北方當廣擥英雄不從僃還公安乆乃聞之歎曰天下智謀之士所見略同時孔明諫􅀌莫行其意亦慮此也􅀌方危急不得不往此誠險塗殆不免周瑜之手周瑜詣京見權曰今曹操新敗憂在腹心未能與將軍連兵相事也乞與奮威俱進取蜀而并張魯因留奮威固守其地與馬超結援瑜還與將軍據襄陽以䠞操北方可圖也權許之奮威者孫堅弟子奮威將軍丹陽太守瑜也周瑜還江陵爲行裝於道病困與權牋曰脩短命矣誠不足惜但恨微志未展不復奉敎命耳方今曹操在北疆場未靜劉僃􅀉寓有似養虎天下之事未知終始此朝士旰食之秋至尊垂慮之日也魯肅忠烈臨事不苟可以代瑜儻所言可采瑜死不朽矣卒於巴丘權聞之哀慟曰公瑾有王佐之資今忽短命􅀌何頼哉自迎其喪於蕪湖瑜有一女二男權爲長子登娶其女以其男循爲􅀐都尉妻以女胤爲興業都尉妻以宗女初瑜見友於孫䇿太夫人又使權以兄奉之是時權位爲將軍諸將賔客爲禮尚簡而瑜獨先盡敬便執臣節程普頗以年長數陵侮瑜瑜折節下之終不與校普後自敬服而親重之乃告人曰與周公瑾交若飲醇醪不􅁴自醉權以魯肅爲奮武校尉代瑜領兵令程普領南郡太守魯肅勸權以荆州借劉僃與共拒曹操權從之乃分豫章爲番陽郡分長沙爲漢昌郡復以程普領江夏太守魯肅爲漢昌太守屯陸口初權謂吕蒙曰卿今當塗掌事不可不學蒙辭以軍中多務權曰􅀌豈欲卿治經爲博士邪但當渉獵見往事耳卿言多務孰若􅀌􅀌常讀書自以爲大有所益蒙乃始就學及魯肅過尋陽與蒙論議大驚曰卿今者才畧非復吴下阿蒙蒙曰士别三日即更刮目相待大兄何見事之晚乎肅遂拜蒙母結友而别劉僃以從事龎統守耒陽令在縣不治免官魯肅遺僃書曰龐士元非百里才也使處治中别駕之任始當展其驥足耳諸葛亮亦言之僃見統與善譚大器之遂用統爲治中親待亞於諸葛亮與亮並爲軍師中郎將初蒼梧士夑爲交阯太守交州刺史朱符爲夷賊所殺州郡擾亂夑表其弟壹領合浦太守䵋領九眞太守武領􅀯海太守夑體器寛厚中國士人多往依之雄長一州偏在萬里威尊無上出入儀衛甚盛震服百蠻朝廷遣南陽張津爲交州刺史津好􅀑神事常著絳帕頭鼓琴燒香讀道書云可以助化爲其將區景所殺劉表遣零陵頼恭代津爲刺史是時蒼梧太守史璜死表又遣吳巨代之朝廷賜燮璽書以燮為綏南中郎將董督七郡領交阯太守如故後巨與恭相失巨舉兵逐恭恭走還零陵孫權以番陽太守臨淮歩騭爲交州刺史士燮率兄弟奉承節度吳巨外附内違騭誘而斬之威聲大震權加燮左將軍燮遣子入質由是嶺􅀯始服屬於權十六年春正月以曹操世子丕爲五官中郎將置官屬爲丞相副三月操遣司􅀠校尉鍾繇討張魯使征西護軍夏矦淵等將兵出河東與繇㑹倉曹屬髙柔諌曰大兵西出韓遂馬超疑爲襲已必相扇動宜先招集三輔三輔苟平漢中可傳檄而定也操不從􅀜中諸將果疑之馬超韓遂矦選程銀楊秋李堪張橫梁興成宜馬玩等十部皆反其衆十萬屯據潼􅀜操遣安西將軍曹仁督諸將拒之敕令堅壁勿與戰命五官將丕留守鄴以奮武將軍程昱參丕軍事門下督廣陵徐宣爲左護軍留統諸軍樂安國淵爲居府長史統留事秋七月操自將擊超等議者多言􅀜西兵習長矛非精選前鋒不可當也操曰戰在我非在賊也賊雖習長矛將使不得以刺諸君但觀之八月操至潼關與超等夾􅀜而軍操急持之而濳遣徐晃朱靈以歩􅀐四千人渡蒲阪津據河西爲營閏月操自潼􅀜北渡河兵衆先渡操獨與虎士百餘人留南岸斷後馬超將步􅀐萬餘人攻之矢下如雨操猶據胡牀不動許禇扶操上船船工中流矢死禇左手舉馬鞌以蔽操右手刺船校尉丁斐放牛馬以餌賊賊亂取牛馬操乃得渡遂自蒲阪渡西河循河爲甬道而􅀯超等退拒渭口操乃多設疑兵濳以舟載兵入渭爲浮橋夜分兵結營於渭􅀯超等夜攻營伏兵擊破之超等屯渭􅀯遣信求割河以西請和操不許九月操進軍悉渡渭超等數挑戰又不許固請割地求送任子賈詡以爲可僞許之操復問計䇿詡曰離之而已操曰解韓遂請與操相見操與遂有舊於是交馬語移時不及軍事但􅀃京都舊故拊手歡笑時秦胡觀者前後重沓操笑謂之曰爾欲觀曹公邪亦猶人也非有四目兩口但多智耳旣罷超等問遂公何言遂曰無所言也超等疑之他日操又與遂書多所􅀧竄如遂改定者超等愈疑遂操乃與克日㑹戰先以輕兵挑之戰良乆乃縱虎􅀐夾擊大破之斬成宜李堪等遂超犇凉州楊秋犇安定諸將問操曰初賊守潼􅀜渭北道缺不從河東擊馮翊而反守潼􅀜引日而後北渡何也操曰賊守潼關若吾入河東賊必引守諸津則西河未可渡吾故盛兵向潼􅀜賊悉衆􅀯守西河之僃虚故二將得擅取西河然後引軍北渡賊不能與吾爭西河者以二將之軍也連車樹柵爲甬道而􅀯旣爲不可勝且以示弱渡渭爲堅壘虜至不出所以驕之也故賊不爲營壘而求割地吾順言許之所以從其意使自安而不爲僃因畜士卒之力一旦擊之所謂疾雷不及掩耳兵之變化固非一道也始􅀜中諸將每一部到操輒有喜色諸將問其故操曰􅀜中長逺若賊各依險阻征之不一二年不可定也今皆來集其衆雖多莫相歸服軍無􅃴主一舉可滅爲功差易吾是以喜冬十月操自長安北征楊秋圍安定秋降復其爵位使留撫其民十二月操自安定還留夏矦淵屯長安以議郎張旣爲京兆尹旣招懷流民興復縣邑百姓懷之遂超之叛也弘農馮翊縣邑多應之河東民獨無異心操與超等夾渭爲軍軍食一仰河東及超等破餘畜尚二十餘萬斛操乃增河東太守杜畿秩中二千石扶風灋正爲劉璋軍議校尉璋不能用又爲其州里俱僑客者所鄙正邑邑不得志益州别駕張松與正善自􅀒其才忖璋不足與有爲常竊歎息松勸璋結劉僃璋曰誰可使者松乃舉正璋使正往正辭謝佯爲不得已而行還爲松􅀃僃有雄略密謀奉戴以爲州主㑹曹操遣鍾繇向漢中璋聞之内懷恐懼松因􅀃璋曰曹公兵無敵於天下若因張魯之資以取蜀土誰能禦之劉豫州使君之宗室而曹公之深讎也善用兵若使之討魯魯必破矣魯破則益州彊曹公雖來無能爲也今州中諸將龐羲李異等皆恃功驕豪欲有外意不得豫州則敵攻其外民攻其内必敗之道也璋然之遣灋正將四千人迎僃主簿巴西黃權諌曰劉左將軍有驍名今請到欲以部曲遇之則不滿其心欲以賔客禮待則一國不容二君若客有泰山之安則主有累卵之危不若閉境以待時淸璋不聽出權爲廣漢長從事廣漢王累自倒懸於州門以諌璋一無所納灋正至荆州隂獻策於劉僃曰以明將軍之英才乗劉牧之懦弱張松州之股肱響應於内以取益州猶反掌也僃疑未決龐統言於僃曰荆州荒殘人物殫盡東有孫車􅀐北有曹操難以得志今益州戸口百萬土沃財富誠得以爲資大業可成也僃曰今指與吾爲水火者曹操也操以急吾以寛操以暴吾以仁操以譎吾以忠每與操反事乃可成耳今以小利而失信義於天下奈何統曰亂離之時固非一道所能定也且兼弱攻昧逆取順守古人所貴若事定之後封以大國何負於信今日不取終爲人利耳僃以爲然乃留諸葛亮􅀜羽等守荆州以趙雲領留營司馬僃將歩卒數萬人入益州孫權聞僃西上遣舟船迎妹而夫人欲將僃子禪還吳張飛趙雲勒兵截江乃得禪還劉璋敕在所供奉僃僃入境如歸前後贈遺以巨億計僃至巴郡巴郡太守嚴顔拊心歎曰此所謂獨坐窮山放虎自衛者也僃自江州北由墊江水詣涪璋率歩􅀐三萬餘人車乗帳幔精光耀日往㑹之張松令灋正白僃便於㑹襲璋僃曰此事不可倉猝龐統曰今因㑹執之則將軍無用兵之勞而坐定一州也僃曰初入他國恩信未著此不可也璋推僃行大司馬領司隷校尉僃亦推璋行鎭西大將軍領益州牧所將將士更相之􅃴歡飲百餘日璋増僃兵厚加資給使擊張魯又令督白水軍僃并軍三萬餘人車甲器械資貨甚盛璋還成都僃北到葭萌未即討魯厚樹恩德以收衆心十七年春正月曹操還鄴詔操賛拜不名入朝不趨劒履上殿如蕭何故事操之西征也河間民田銀蘇伯反扇動幽冀五官將丕欲自討之功曹常林曰北方吏民樂安厭亂服化已乆守善者多銀伯犬羊相聚不能爲害方今大軍在逺外有彊敵將軍爲天下之鎭輕動逺舉雖克不武乃遣將軍賈信討之應時克㓕餘賊千餘人請降議者皆曰公有舊灋圍而後降者不赦程昱曰此乃擾攘之際權時之宜今天下略定不可誅之縱誅之宜先啟聞議者皆曰軍事有專無請昱曰凡專命者謂有臨時之急耳今此賊制在賈信之手故老臣不願將軍行之也丕曰善即白操操果不誅旣而聞昱之謀甚恱曰君非徒明於軍計又善處人父子之間故事破賊文書以一爲十國淵上首級皆如其實數操問其故淵曰夫征討外寇多其斬獲之數者欲以大武功聳民聽也河間在封域之内銀等叛逆雖克捷有功淵竊恥之操大恱夏五月癸未誅衛尉馬騰夷三族六月庚寅晦日有食之秋七月螟馬超等餘衆屯藍田夏矦淵擊平之鄜賊梁興寇略馮翊諸縣恐懼皆􅀉治郡下議者以爲當移就險阻左馮翊鄭渾曰興等破散藏竄山谷雖有隨者率脅從耳今當廣開降路宣喻威信而保險自守此示弱也乃聚吏民治城郭爲守僃募民逐賊得其財物婦女十以七賞民大恱皆願捕賊賊之失妻子者皆還求降渾責其得他婦女然後還之於是轉相寇盜黨與離散又遣吏民有恩信者分布山谷告諭之出者相繼乃使諸縣長吏各還本治以安集之興等懼將餘衆聚鄜城操使夏矦淵助渾討之遂斬興餘黨悉平渾泰之弟也九月庚戌立皇子熈爲濟隂王懿爲山陽王邈爲濟北王敦爲東海王初張紘以秣陵山川形勝勸孫權以爲治所及劉僃東過秣陵亦勸權居之權於是作石頭城徙治秣陵改秣陵爲建業吕蒙聞曹操欲東兵􅀃孫權夾濡須水口立塢諸將皆曰上岸擊賊洗足入船何用塢爲蒙曰兵有利鈍戰無百勝如有邂逅敵歩􅀐蹙人不暇及水其得入船乎權曰善遂作濡須塢冬十月曹操東擊孫權董昭言於曹操曰自古以來人臣匡丗未有今日之功有今日之功未有乆處人臣之埶者也今明公恥有慙德樂保名節然處大臣之埶使人以大事疑已誠不可不重慮也乃與列矦諸將議以丞相宜進爵國公九錫僃物以彰殊勲荀彧以爲曹公本興義兵以匡朝寧國秉忠貞之誠守退讓之實君子愛人以德不宜如此操由是不恱及擊孫權表請彧勞軍于譙因輒留彧以侍中光禄大夫持節參丞相軍事操軍向濡須彧以疾留壽春飲藥而卒彧行義脩整而有智謀好推賢進士故時人皆惜之臣光曰孔子之言仁也重矣自子路冉求公西赤門人之高第令尹子文陳文子諸矦之賢大夫皆不足以當之而獨稱管仲之仁豈非以其輔佐齊桓大濟生民乎齊􅁊之行若狗彘管仲不羞而相之其志蓋以非􅁊公則生民不可得而濟也漢末大亂羣生塗炭自非高世之才不能濟也然則荀彧捨魏武將誰事哉齊􅁊之時周室雖衰未􅀂建安之􅀄也建安之初四海蕩覆尺土一民皆非漢有荀彧佐魏武而興之舉賢用能訓卒厲兵決機發策征伐四克遂能以弱爲彊化亂爲治十分天下而有其八其功豈在管仲之後乎管仲不死子糾而荀彧死漢室其仁復居管仲之先矣而杜牧乃以爲彧之勸魏武取兖州則比之髙光官渡不令還許則比之楚漢及事就功畢乃欲邀名於漢代譬之敎盜穴牆發匱而不與同挈得不爲盜乎臣以爲孔子稱文勝質則史凡爲史者記人之言必有以文之然則比魏武於高光楚漢者史氏之文也豈皆彧口所言邪用是貶彧非其罪矣且使魏武爲帝則彧爲佐命元功與蕭何同賞矣彧不利此而利於殺身以邀名豈人情乎十二月有星孛于五諸矦劉僃在葭萌龐統言於僃曰今隂選精兵晝夜兼道徑襲成都劉璋旣不武又素無豫僃大軍卒至一舉便定此上計也楊懷髙沛璋之名將各仗彊兵據守􅀜頭聞數有牋諫璋使發遣將軍還荆州將軍遣與相聞􅀃荆州有急欲還救之並使裝束外作歸形此二子旣服將軍英名又喜將軍之去計必乗輕􅀐來見將軍因此執之進取其兵乃向成都此中計也退還白帝連引荆州徐還圖之此下計也若沈吟不去將致大困不可乆矣僃然其中計及曹操攻孫權權呼僃自救僃貽璋書曰孫氏與􅀌本爲脣齒而􅀜羽兵弱今不往救則曹操必取荆州轉侵州界其憂甚於張魯魯自守之賊不足慮也因求益萬兵及資糧璋但許兵四千其餘皆給半僃因激怒其衆曰吾爲益州征彊敵師徒勤瘁而積財吝賞何以使士大夫死戰乎張松書與僃及灋正曰今大事垂立如何釋此去乎松兄廣漢太守肅恐禍及已因發其謀於是璋收斬松敕􅀜戍諸將文書皆勿復得與僃􅀜通僃大怒召璋白水軍督楊懷高沛責以無禮斬之勒兵徑至􅀜頭并其兵進據涪城十八年春正月曹操進軍濡須口號歩􅀐四十萬攻破孫權江西營獲其都督公孫陽權率衆七萬禦之相守月餘操見其舟船器仗軍伍整肅歎曰生子當如孫仲謀如劉景升兒子豚犬耳權爲牋與操􅀃春水方生公宜速去別􅁓言足下不死􅀌不得安操語諸將曰孫權不欺􅀌乃徹軍還庚寅詔并十四州復爲九州夏四月曹操至鄴初曹操在譙恐濵江郡縣爲孫權所略欲徙令近内以問揚州別駕蔣濟曰昔􅀌與􅀽本初對軍官渡徙燕白馬民民不得走賊亦不敢鈔今欲徙淮􅀯民何如對曰是時兵弱賊彊不徙必失之自破􅀽紹以來明公威震天下民無他志人情懷土實不樂徙懼必不安操不從旣而民轉相驚自廬江九江蘄春廣陵户十餘萬皆東渡江江西遂虛合淝以南惟有皖城濟後奉使詣鄴操迎見大笑曰本但欲使避賊乃更驅盡之拜濟丹陽太守五月丙申以冀州十郡封曹操爲魏公以丞相領冀州牧如故又加九錫大輅戎輅各一玄牡二駟衮冕之服赤舄副焉軒縣之樂六佾之舞朱户以居納陛以登虎賁之士三百人鈇􅃏各一彤弓一彤矢百玈弓十玈矢千秬鬯一卣珪瓉副焉大雨水益州從事廣漢鄭度聞劉僃舉兵謂劉璋曰左將軍懸軍襲我兵不滿萬士衆未附軍無輜重野榖是資其計莫若盡驅巴西梓潼民内涪水以西其倉廩野榖一皆燒除高壘深溝靜以待之彼至請戰勿許乆無所資不過百日必將自走走而擊之此必禽耳劉僃聞而惡之以問灋正正曰璋終不能用無憂也璋果謂其羣下曰吾聞拒敵以安民未聞動民以避敵也不用度計璋遣其將劉璝泠苞張任鄧賢吳懿等拒僃皆敗退保緜竹懿詣軍降璋復遣護軍􅀯陽李嚴江夏費􅀚督緜竹諸軍嚴􅀚亦率其衆降於僃僃軍益彊分遣諸將平下屬縣劉璝張任與璋子循退守雒城僃進軍圍之任勒兵出戰於鴈橋軍敗任死秋七月魏始建社稷宗廟魏公操納三女爲貴人初魏公操追馬超至安定聞田銀蘇伯反引軍還參凉州軍事楊阜言於操曰超有信布之勇甚得羌胡心若大軍還不設僃隴上諸郡非國家之有也操還超果率羌胡擊隴上諸郡縣郡縣皆應之惟冀城奉州郡以固守超盡兼隴右之衆張魯復遣大將楊昻助之凡萬餘人攻冀城自正月至八月救兵不至刺史韋康遣别駕閻温出告急於夏矦淵外圍數重温夜從水中濳出明日超兵見其迹遣追獲之超載温詣城下使告城中云東方無救温向城大呼曰大軍不過三日至勉之城中皆泣稱萬歳超雖怒猶以攻城乆不下徐徐更誘温冀其改意温曰事君有死無二而卿乃欲令長者出不義之言乎超遂殺之已而外救不至韋康及太守欲降楊阜號哭諫曰阜等率父兄子弟以義相勵有死無二以爲使君守此城今柰何棄垂成之功陷不義之名乎刺史太守不聽開城門迎超超入遂殺刺史太守自稱征西將軍領并州牧督凉州軍事魏公操使夏矦淵救冀未到而冀敗淵去冀二百餘里超來逆戰淵軍不利氐王千萬反應超屯興國淵引軍還㑹楊阜喪妻就超求假以葬之阜外兄天水姜叙爲撫夷將軍擁兵屯歷城阜見叙及其母歔欷悲甚叙曰何爲乃爾阜曰守城不能完君亡不能死亦何面目以視息於天下馬超背父叛君虐殺州將豈獨阜之憂責一州士大夫皆蒙其恥君擁兵專制而無討賊心此趙盾所以書弑君也超彊而無義多釁易圖耳叙母􅁣然曰咄伯奕韋使君遇難亦汝之􅀒豈獨義山哉人誰不死死於忠義得其所也但當速發勿復顧我我自爲汝當之不以餘年累汝也叙乃與同郡趙昂尹奉武都李俊等合謀討超又使人至冀結安定梁寛南安趙衢使爲内應超取趙昂子月爲質昂謂妻異曰吾謀如是事必萬全當柰月何異厲聲應曰雪君父之大恥喪元不足爲重況一子哉九月阜與叙進兵入鹵城昻奉據祁山以討超超聞之大怒趙衢因譎􅀃超使自出擊之超出衢與梁寛閉冀城門盡殺超妻子超進退失據乃襲歷城得叙母叙母罵之曰汝背父之逆子殺君之桀賊天地豈乆容汝而不早死敢以面目視人乎超殺之又殺趙昂之子月楊阜與超戰身被五創超兵敗遂􅀯犇張魯魯以超爲都講􅀕酒欲妻之以女或謂魯曰有人􅀂此不愛其親焉能愛人魯乃止操封討超之功矦者十一人賜楊阜爵關内矦冬十一月魏初置尚書侍中六卿以荀攸爲尚書令凉茂爲僕射毛玠崔琰常林徐弈何䕫爲尚書王粲杜襲衛覬和洽爲侍中鍾繇爲大理王脩爲大司農􅀽渙爲郎中令行御史大夫事陳羣爲御史中丞􅀽渙得賞賜皆散之家無所儲乏則取之於人不爲皦察之行然時人皆服其清時有傳劉僃死者羣臣皆賀唯渙獨否魏公操欲復肉刑令曰昔陳鴻臚以爲死刑有可加於仁恩者御史中丞能申其父之論乎陳羣對曰臣父紀以爲漢除􅁏刑而増加於笞本興仁惻而死者更衆所謂名輕而實重者也名輕則易犯實重則傷民且殺人償死合於古制至於傷人或殘毁其體而裁剪毛髮非其理也若用古刑使淫者下蠶室盜者刖其足則永無淫放穿窬之姦矣夫三千之屬雖未可悉復若斯數者時之所患宜先施用漢律所殺殊死之罪仁所不及也其餘逮死者可易以肉刑如此則所刑之與所生足以相貿矣今以笞死之灋易不殺之刑是重人支體而輕人軀命也當時議者唯鍾繇與羣議同餘皆以爲未可行操以軍事未罷顧衆議而止資治通鑑卷第六十六
