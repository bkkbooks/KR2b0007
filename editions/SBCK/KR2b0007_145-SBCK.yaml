body:
  text: 魯陽蠻魯北鷰等起兵攻魏潁州夏四月辛酉宣徳太后令曰西詔至帝憲章前代敬禪神器于梁明可臨軒遣使恭授璽紱未亡人歸于别宫壬戍􅀤䇿遣兼太保尚書令亮等奉皇帝璽綬詣梁宫丙寅梁王即皇帝位于南郊大赦改元是日追增兄懿為丞相封長沙王諡曰宣武葬禮依晉安平獻王故事丁卯奉和帝為巴陵王宫于姑孰優崇之禮皆倣齊初奉宣徳太后為齊文帝妃王皇后為巴陵王妃齊世王矦封爵悉從降省唯宋汝陰王不在除例追尊皇考為文皇帝廟號太祖皇妣為獻皇后追諡妃郗氏爲徳皇后封文武功臣車騎將軍夏矦詳等十五人為公矦立皇弟中䕶軍宏為臨川王南徐州刺史秀為安成王雍州刺史偉為建安王左衞將軍恢為鄱陽王荆州刺史憺為始興王以宏為揚州刺史丁卯以中書監王亮為尚書令相國左長史王瑩為中書監吏部尚書沈約為尚書僕射長兼侍中范雲為散騎常侍吏部尚書詔凡後宫樂府西解暴室諸婦女一皆放遣戊辰巴陵王卒時上欲以南海郡為巴陵國徙王居之沈約曰古今殊事魏武所云不可慕虚名而受實禍上頷之乃遣所親鄭伯禽詣姑孰以生金進王王曰我死不須金醇酒足矣乃飲沈醉伯禽就摺殺之王之鎮荆州也琅邪顔見逺為録事參軍及即帝位為治書侍御史兼中丞既禪位見逺不食數日而卒上聞之曰我自應天從人何預天下士大夫事而顔見逺乃至於此庚午詔有司依周漢故事議贖刑條格凡在官身犯鞭杖之罪悉入贖停罰其臺省令史士卒欲贖者聽之以謝沐縣公寳義為巴陵王奉齊祀寳義幼有廢疾不能言故獨得全齊南康矦子恪及弟祁陽矦子範甞因事入見上從容謂曰天下公器非可力取茍無期運雖項籍之力終亦敗亡宋孝武性猜忌兄弟粗有令名者皆鴆之朝臣以疑似枉死者相繼然或疑而不能去或不疑而卒為患如卿祖以材略見疑而無如之何湘東以庸愚不疑而子孫皆死其手我於時已生彼豈知我應有今日固知有天命者非人所害我初平建康人皆勸我除去卿軰以壹物心我於時依而行之誰謂不可正以江左以來代謝之際必相屠滅感傷和氣所以國祚不長又齊梁雖云革命事異前世我與卿兄弟雖復絶服宗屬未逺齊業之初亦共甘苦情同一家豈可遽如行路之人卿兄弟果有天命非我所殺若無天命何忽行此適足示無度量耳且建武塗炭卿門我起義兵非惟自雪門恥亦為卿兄弟報仇卿若能在建武永元之世撥亂反正我豈得不釋戈推奉邪我自取天下於明帝家非取之於卿家也昔劉子輿自稱成帝子光武言假使成帝更生天下亦不復可得况子輿乎曹志魏武帝之孫為晉忠臣况卿今日猶是宗室我方坦然相期卿無復懐自外之意小待自當知我寸心子恪兄弟凡十六人皆仕梁子恪子範子質子顯子雲子暉並以才能知名歴官清顯各以夀終詔徵謝朏為左光禄大夫開府儀同三司何胤為右光禄大夫何㸃為侍中胤㸃終不就癸酉詔公車府謗木肺石傍各置一函若肉食莫言欲有橫議投謗木函若有功勞才器寃沈莫達者投肺石函上身服浣濯之衣常膳唯以菜蔬每簡長吏務選㢘平皆召見於前勗以政道擢尚書殿中郎到溉為建安内史左户侍郎劉鬷為晉安太守二人皆以㢘絜著稱溉彦之曾孫也又著令小縣令有能遷大縣大縣有能遷二千石以山陰令丘仲孚為長沙内史武康令東海何逺為宣城太守由是㢘能莫不知勸魯陽蠻圍魏湖陽撫軍將軍李崇將兵擊破之斬魯北鷰徙萬餘戶於幽并諸州及六鎮尋叛南走所在追討比及河殺之皆盡閏月丁巳魏頓丘匡公穆亮卒齊東昏矦嬖臣孫文明等雖經赦令猶不自安五月乙亥夜帥其徒數百人因運荻炬束仗入南北掖作亂燒神虎門總章觀入衞尉府殺衞尉洮陽愍矦張􅀪䇿前軍司馬吕僧珍直殿内以宿衞兵拒之不能却上戎服御前殿曰賊夜來是其衆少曉則走矣命擊五鼓領軍將軍王茂驍騎將軍張惠紹聞難引兵赴救盗乃散走討捕悉誅之江州刺史陳伯之目不識書得文牒辭訟惟作大諾而已有事典籖傳口語與奪决於主者豫章人鄧繕永興人戴永忠有舊恩於伯之伯之以繕為别駕永忠為記室參軍河南禇緭居建康素薄行仕宦不得志頻造尚書范雲雲不禮之緭怒私謂所親曰建武以後草澤下族悉化成貴人吾何罪而見棄今天下草創饑饉不已喪亂未可知陳伯之擁彊兵在江州非主上舊臣有自疑之意且熒惑守南斗詎非為我出邪今者一行事若無成入魏不失作河南郡守遂投伯之大見親狎伯之又以鄉人朱龍符為長流參軍並乘伯之愚闇恣為姦利上聞之使陳虎牙私戒伯之又遣人代鄧繕為别駕伯之並不受命表云龍符驍勇鄧繕有績効臺所遣别駕請以為治中繕於是日夜說伯之云臺家府藏空竭復無器仗三倉無米東境飢流此萬世一時也機不可失緭永忠等共贊成之伯之謂繕今啓卿若復不得即與卿共反上敕伯之以部内一郡處繕於是伯之集府州僚佐謂曰奉齊建安王教帥江北義勇十萬已次六合見使以江州見力運糧速下我荷明帝厚恩誓死以報即命纂嚴使緭詐為蕭寳寅書以示僚佐於聽事前為壇歃血共盟緭說伯之曰今舉大事宜引衆望長史程元沖不與人同心臨川内史王觀僧䖍之孫人身不惡可召為長史以代元沖伯之從之仍以緭為尋陽太守永忠為輔義將軍龍符為豫州刺史觀不應命豫章太守鄭伯倫起郡兵拒守程元冲既失職於家合帥數百人乘伯之無備突入至聽事前伯之自出格鬭元冲不勝逃入廬山伯之宻遣信報虎牙兄弟皆逃奔盱眙戊子詔以領軍將軍王茂為征南將軍江州刺史帥衆討之魏揚州小峴戍主党法宗襲大峴戍破之虜龍驤將軍邾菩薩陳伯之聞王茂來謂禇緭等曰王觀既不就命鄭伯倫又不肯從便應空手受困今先平豫章開通南路多發丁力益運資糧然後席卷北向以撲飢疲之衆不憂不濟六月留鄉人唐蓋人守城引兵趣豫章攻伯倫不能下王茂軍至伯之表裏受敵遂敗走間道渡江與虎牙等及禇緭俱奔魏上遣左右陳建孫送劉季連子弟三人入蜀使諭㫖慰勞季連受命飭還装益州刺史鄧元起始得之官初季連為南郡太守不禮於元起都録朱道琛有罪季連欲殺之逃匿得免至是道琛為元起典籖說元起曰益州亂離已久公私虛耗劉益州臨歸豈辦逺遣迎候道琛請先使檢校縁路奉迎不然萬里資糧未易可得元起許之道琛既至言語不恭又歴造府州人士見器物輒奪之有不獲者語曰㑹當屬人何須苦惜於是軍府大懼謂元起至必誅季連禍及黨與競言之於季連季連亦以爲然且懼昔之不禮於元起乃召兵筭之有精甲十萬歎曰據天險之地握此彊兵進可以匡社稷退不失作劉備捨此安之遂召佐史矯稱齊宣徳太后令聚兵復反收朱道琛殺之召巴西太守朱士略及涪令李膺並不受命是月元起至巴西士略開門納之先是蜀民多逃亡聞元起至爭出投附皆稱起義兵應朝廷軍士新故三萬餘人元起在道久糧食乏絶或說之曰蜀土政慢民多詐疾若檢巴西一郡籍注因而罰之所獲必厚元起然之李膺諫曰使君前有嚴敵後無繼援山民始附於我觀徳若糾以刻薄民必不堪衆心一離雖悔無及何必起疾可以濟師膺請出圖之不患資糧不足也元起曰善一以委卿膺退帥富民上軍資米得三萬斛秋八月丁未命尚書刪定郎濟陽蔡法度損益王植之集註舊律為梁律仍命與尚書令王亮侍中王瑩尚書僕射沈約吏部尚書范雲等九人同議定上素善鍾律欲釐正雅樂乃自制四器名之為通每通施三絃黃鍾絃用二百七十絲長九尺應鍾絃用一百四十二絲長四尺七寸四分差彊中間十律以是為差因以通聲轉推月氣悉無差違而還得相中又制十二笛黃鍾笛長三尺八寸應鍾笛長二尺三寸中間十律以是為差以寫通聲飲古鍾玉律並皆不差於是被以八音施以七聲莫不和韻先是宫懸止有四鎛鍾雜以編鍾編磬衡鍾凡十六虡上始命設十二鎛鍾各有編鍾編磬凡三十六虡而去衡鍾四隅植建鼔魏髙祖之喪前太傅平陽公丕自晉陽來赴遂留洛陽丕年八十餘歴事六世位極公輔而還為庶人魏主以其宗室耆舊矜而禮之乙夘以丕為三老魏揚州刺史任城王澄表請攻鍾離魏主使羽林監敦煌范紹詣夀陽共量進止澄曰當用兵十萬往來百日乞朝廷速辦糧仗紹曰今秋已向末方欲調發兵仗可集糧何由致有兵無糧何以克敵澄沈思良久曰實如卿言乃止九月丁巳魏主如鄴冬十月庚子還至懐與宗室近侍射逺帝射三百五十餘步羣臣刻銘以美之甲辰還洛陽十一月己未立小廟以祭太祖之母每祭太廟畢以一太牢祭之甲子立皇子統為太子魏洛陽宫室始成十二月將軍張􅅝之侵魏淮南取木陵戍魏任城王澄遣輔國將軍成興擊之甲辰􅅝之敗走魏復取木陵劉季連遣其將李奉伯等拒鄧元起元起與戰互有勝負久之奉伯等敗還成都元起進屯西平季連驅略居民閉城固守元起進屯蔣橋去成都二十里留輜重於郫奉伯等間道襲郫陷之軍備盡没元起捨郫徑圍州城城局參軍江希之謀以城降不克而死魏陳留公主寡居僕射髙肇秦州刺史張彛皆欲尚之公主許彛而不許肇肇怒譖彛於魏主彞坐沈廢累年是嵗江東大旱米斗五千民多餓死二年春正月乙夘以尚書僕射沈約爲左僕射吏部尚書范雲爲右僕射尚書令王亮爲左光禄大夫丙辰亮坐正旦詐疾不登殿削爵廢爲庶人乙亥魏主耕籍田魏梁州氐楊㑹叛行梁州事楊椿等討之成都城中食盡升米三千人相食劉季連食粥累月計無所出上遣主書趙景恱宣詔受季連降季連肉􅃝請罪鄧元起遷季連于城外俄而造焉待之以禮季連謝曰早知如此豈有前日之事郫城亦降元起誅李奉伯等送季連詣建康初元起在道懼事不集無以為賞士之至者皆許以辟命於是受别駕治中檄者將二千人季連至建康入東掖門數步一稽顙以至上前上笑曰卿欲慕劉備而曾不及公孫述豈無卧龍之臣邪赦為庶人三月己巳魏皇后蠶於北郊庚辰魏楊州刺史任城王澄遣長風戍主竒道顯入寇取陰山白藁二戍蕭寶寅伏於魏闕之下請兵伐梁雖暴風大雨終不蹔移㑹陳伯之降魏亦請兵自效魏主乃引八坐門下入定議夏四月癸未朔以寳寅為都督東楊等三州諸軍事鎮東將軍楊州刺史丹楊公齊王禮賜甚厚配兵一萬令屯東城以伯之為都督淮南諸軍事平南將軍江州刺史屯陽石俟秋冬大舉寳寅明當拜命其夜慟哭至晨魏人又聽寳寅募四方壯勇得數千人以顔文智華文榮等六人皆為將軍軍主寳寅志性雅重過基猶絶酒肉慘形悴色蔬食麤衣未嘗嬉笑癸卯蔡法度上梁律二十卷令三十卷科四十卷詔班行之五月丁巳霄城文矦范雲卒雲盡心事上知無不為臨繁處劇精力過人及卒衆謂沈約宜當樞管上以約輕易不如尚書左丞徐勉乃以勉及右衞將軍汝南周捨同參國政捨雅量不及勉而清簡過之兩人俱稱賢相常留省内罕得休下勉或時還宅羣犬驚吠每有表奏輒焚其藁捨豫機宻二十餘年未嘗離左右國史詔誥儀體法律軍旅謀謨皆掌之與人言謔終日不絶而竟不漏泄機事衆尤服之壬申斷諸郡縣獻奉二宫惟諸州及會稽許貢任土若非地産亦不得貢甲戌魏楊椿等大破叛氐斬首數千級六月壬午朔魏立皇弟恱為汝南王魏楊州刺史任城王澄表稱蕭衍頻斷東􅀜欲令漅湖汎溢以灌淮南諸戍吳楚便水且灌且掠淮南之地將非國有夀陽去江五百餘里衆庶惶惶並懼水害脫乘民之願攻敵之虚豫勒諸州纂集士馬首秋大集應機經略雖混壹不能必果江西自是無虞矣丙戌魏發冀定瀛相并濟六州二萬人馬一千五百匹令仲秋之中畢㑹淮南并夀陽先兵三萬委澄經略蕭寳寅陳伯之皆受澄節度謝朏輕舟出詣闕詔以為侍中司徒尚書令朏辭脚疾不堪拜謁角巾自輿詣雲龍門謝詔見於華林園乘小車就席明旦上幸朏宅宴語盡懽朏固陳本志不許因請自還東迎母許之臨發上復臨幸賦詩餞别王人送迎相望於道及還詔起府於舊宅禮遇優異朏素憚煩不省職事衆頗失望甲午以中書監王瑩為尚書右僕射秋七月乙卯魏平陽平公丕卒魏既罷鹽池之禁而其利皆為富彊所專庚午復收鹽池利入公辛未魏以彭城王􅎰為太師􅎰固辭魏主賜詔敦諭又為家人書祈請懇至􅎰不得已受命八月庚子魏以鎮南將軍元英都督征義陽諸軍事司州刺史蔡道恭聞魏軍將至遣驍騎將軍楊由帥城外居民三千餘家保賢首山為三柵冬十月元英勒諸軍圍賢首柵柵民任馬駒斬由降魏任城王澄命統軍党法宗傅豎眼太原王神念等分兵寇東􅀜大峴淮陵九山髙祖珍將三千騎為遊軍澄以大軍繼其後豎眼靈越之子也魏人拔􅀜要潁川大峴三城白塔牽城清溪皆潰徐州刺史司馬明素將兵三千救九山徐州長史潘伯鄰據淮陵寧朔將軍王爕保焦城党法宗等進拔焦城破淮陵十一月壬午擒明素斬伯鄰先是南梁太守馮道根戍阜陵初到修城隍逺斥􅃸如敵將至衆頗笑之道根曰怯防勇戰此之謂也城未畢党法宗等衆二萬奄至城下衆皆失色道根命大開門緩服登城選精銳二百人出與魏兵戰破之魏人見其意思閑暇戰又不利遂引去道根將百騎擊髙祖珍破之魏諸軍糧運絶引退以道根為豫州刺史武興安王楊集始卒己未魏立其世子紹先為武興王紹先幼國事决於二叔父集起集義乙亥尚書左僕射沈約以母憂去職魏既遷洛陽北邊荒逺因以飢饉百姓困弊魏主加尚書左僕射源懐侍中行臺使持節廵行北邊六鎮恒燕朔三州賑給貧乏考論殿最事之得失皆先决後聞懐通濟有無飢民頼之沃野鎮將于祚皇后之世父與壊通婚時于勁方用事勢傾朝野􅍈頗有受納懐將入鎮祚郊迎道左懐不與語即劾奏免官懐朔鎮將元尼須與懐舊交貪穢狼籍置酒請懐謂懐曰命之長短繫卿之口豈可不相寛貸懐曰今日源懐與故人飲酒之坐非鞫獄之所也明日公庭始為使者檢鎮將罪狀之處耳尼須揮淚無以對竟案劾抵罪懐又奏邊鎮事少而置官猥多沃野一鎮自將以下八百餘人請一切五分損二魏主從之乙酉將軍吳子陽與魏元英戰於曰沙子陽敗績魏東荆州蠻樊素安作亂乙酉以左衞將軍李崇為鎮南將軍都督征蠻諸軍事將步騎討之馮翊吉翂父為原鄉令為姦吏所誣逮詣廷尉罪當死翂年十五檛登聞鼔乞代父命上以其幼疑人教之使廷尉卿蔡法度嚴加誘脅取其款實法度盛陳拷訊之具詰翂曰爾求代父敕已相許審能死不且爾童騃若爲人所教亦聽悔異翂曰囚雖愚幼豈不知死之可憚顧不忍見父極刑故求代之此非細故柰何受人教邪明詔聽代不異登仙豈有回貳法度乃更和顔誘之曰主上知尊矦無罪行當得釋觀君足爲佳童今若轉辭幸可父子同濟翂曰父挂深劾必正刑書囚瞑目引領唯聽大戮無言復對時翂備加杻械法度愍之命更著小者翂弗聽曰死罪之囚唯宜益械豈可减乎竟不脱法度具以聞上乃宥其父罪丹楊尹王志求其在廷尉事并問鄉里欲於嵗首舉充純孝翂曰異哉王尹何量翂之薄乎父辱子死道固當然若翂當此舉乃是因父取名何辱如之固拒而止魏主納髙肇兄偃之女為貴嬪魏散騎常侍趙脩寒賤暴貴恃寵驕恣陵轢王公為衆所疾魏主為脩治第舎擬於諸王鄰居獻地者或超補大郡脩請告歸葬其父凡財役所須並從官給脩在道􅁋縱左右乘其出外頗發其罪惡及還舊寵小衰髙肇宻構成其罪侍中領御史中尉甄琛黄門郎李憑廷尉卿陽平王顯素皆諂附於脩至是懼相連及爭助肇攻之帝命尚書元紹檢訊下詔暴其姦惡免死鞭一百徙敦煌為兵而脩愚疎初不之知方在領軍于勁第摴蒲羽林數人稱詔呼之送詣領軍府甄琛王顯監罰先具問事有力者五人迭鞭之欲令必死脩素肥壯堪忍楚毒密加鞭至三百不死即召驛馬促之上道出城不自勝舉縛置鞍中急驅之行八十里乃死帝聞之責元紹不重聞紹曰脩之佞幸為國深蠧臣不因舋除之恐陛下受萬世之謗帝以其言正不罪也紹出廣平王懐拜之曰翁之直過於汲黯紹曰但恨戮之稍晩以為愧耳紹素之孫也明日甄琛李慿以脩黨皆坐免官左右與脩連坐死黜者二十餘人散騎常侍髙聰與脩素親狎而又以宗人諂事髙肇故獨得免三年春正月庚戌征虜將軍趙祖恱與魏江州刺史陳伯之戰於東闗祖悦敗績癸丑以尚書右僕射王瑩為左僕射太子詹事栁惔為右僕射丙辰魏東荆州刺史楊大眼擊叛蠻樊季安等大破之季安素安之弟也丙寅魏大赦改元正始蕭寳寅行及汝陰東城已為梁所取乃屯夀陽棲賢寺二月戊子將軍姜慶真乘魏任城王澄在外襲夀陽據其外郭長史韋纘倉猝失圖任城太妃孟氏勒兵登陴先守要便激厲文武安慰新舊勸以賞罰將士咸有奮志太妃親廵城守不避矢石蕭寳寅引兵至與州軍合擊之自四鼓戰至下晡慶真敗走韋纘坐免官任城王澄攻鍾離上遣冠軍將軍張惠紹等將兵五千送糧詣鍾離澄遣平逺將軍劉思祖等邀之丁酉戰于邵陽大敗梁兵俘惠紹等十將殺虜士卒殆盡思祖芳之從子也尚書論思祖功應封千户矦侍中領右衞將軍元暉求二婢於思祖不得事遂寢暉素之孫也上遣平西將軍曹景宗後軍王僧炳等帥步騎三萬救義陽僧炳將二萬人據鑿峴景宗將萬人為後繼元英遣冠軍將軍元逞等據樊城以拒之三月壬申大破僧炳於樊城俘斬四千餘人魏詔任城王澄以四月淮水將漲舟行無礙南軍得時勿昧利以取後悔㑹大雨淮水暴漲澄引兵還夀陽魏軍還既狼狽失亡四千餘人中書侍郎齊郡賈思伯為澄軍司居後為殿澄以其儒者謂之必死及至大喜曰仁者必有勇於軍司見之矣思伯託以失道不伐其功有司奏奪澄開府仍降三階上以所獲魏將士請易張惠紹于魏魏人歸之魏太傅領司徒録尚書北海王詳驕奢好聲色貪冒無厭廣營第舎奪人居室嬖昵左右所在請託中外嗟怨魏主以其尊親恩禮無替軍國大事皆與參决所奏請無不開允魏主之初親政也以兵召諸叔詳與咸陽彭城王共車而入防衞嚴固髙太妃大懼乘車隨而哭之既得免謂詳曰自今不願冨貴但使母子相保與汝掃市為生耳及詳再執政太妃不復念前事專助詳為貪虐冠軍將軍茹皓以巧思有寵於帝常在左右傳可門下奏事弄權納賄朝野憚之詳亦附焉皓娶尚書令髙肇從妹皓妻之姊為詳從父安定王燮之妃詳烝於燮妃由是與皓益相昵狎直閤將軍劉胄本詳所引薦殿中將軍常季賢以善養馬陳掃靜掌櫛皆得幸於帝與皓相表裏賣權勢髙肇本出髙麗時望輕之帝既黜六輔誅咸陽王禧專委事於肇肇以在朝親族至少乃邀結朋援附之者旬月超擢不附者陷以大辠尤忌諸王以詳位居其上欲去之獨執朝政乃譛之於帝云詳與皓胄季賢掃靜謀為逆亂夏四月帝夜召中尉崔亮入禁中使彈奏詳貪淫奢縱及皓等四人怙權貪橫收皓等擊南臺遣虎賁百人圍守詳第又慮詳驚懼逃逸遣左右郭翼開金墉門馳出諭㫖示以中尉彈狀詳曰審如中尉所糾何憂也正恐更有大罪橫至耳人與我物我實受之詰朝有司奏處皓等罪皆賜死帝引髙陽王雍等五王入議詳罪詳單車防衞送華林園母妻隨入給小奴弱婢數圍守甚嚴内外不通五月丁未朔下詔宥詳死免為庶人頃之徙詳於太府寺圍禁彌急母妻皆還南第五日一來視之初詳娶宋王劉昶女待之疎薄詳既被禁髙太妃乃知安定髙妃事大怒曰汝妻妾盛多如此安用彼髙麗婢陷罪至此杖之百餘被創膿潰旬餘乃能立又杖劉妃數十曰婦人皆妬何獨不妬劉妃笑而受罰卒無所言詳家奴數人陰結黨軰欲劫出詳宻書姓名託侍婢通於詳詳始得執省而門防主司遥見突入就詳手中攬得奏之詳慟哭數聲暴卒詔有司以禮殯葬先是典事史元顯獻雞雛四翼四足詔以問侍中崔光光上表曰漢元帝初元中丞相府史家雌雞伏子漸化為雄冠距鳴將永光中有獻雄雞生角劉向以為雞者小畜主司時起居人小臣執事為政之象也竟寧元年石顯伏辜此其効也靈帝光和元年南宫寺雌雞欲化為雄但頭冠未變詔以問議郎蔡邕對曰頭為元首人君之象也今雞一身已變未至於頭而上知之是將有其事而不遂成之象也若應之不精政無所改頭冠或成為患滋大是後黄巾破壊四方天下遂大亂今之雞狀雖與漢不同而其應頗相類誠可畏也臣以向邕言推之翼足衆多亦羣下相扇助之象雛而未大足羽差小亦其勢尚㣲易制御也臣聞災異之見皆所以示吉㐫明君覩之而懼乃能致福闇主覩之而慢所以致禍或者今亦有自賤而貴闗預政事如前世石顯之比者邪願陛下進賢黜佞則妖弭慶集矣後數日皓等伏誅帝愈重光髙肈說帝使宿衛隊主帥羽林虎賁守諸王第殆同幽禁彭城王􅎰切諫不聽􅎰志尚髙邁不樂榮勢避事家居而出無山水之適處無知己之遊獨對妻子甞鬱鬱不樂魏人圍義陽城中兵不滿五千人食纔支半嵗魏軍攻之晝夜不息刺史蔡道恭隨方抗禦皆應手摧却相持百餘日前後斬獲不可勝計魏軍憚之將退㑹道恭疾篤乃呼從弟驍騎將軍靈恩兄子尚書郎僧􅎰及諸將佐謂曰吾受國厚恩不能攘滅冦賊今所苦轉篤勢不支久汝等當以死固節無令吾没有遺恨衆皆流涕道恭卒靈恩攝行州事代之城守六月癸未大赦魏大旱散騎常侍兼尚書邢蠻奏稱昔者明王重粟帛輕金玉何則粟帛飬民而安國金玉無用而敗徳故也先帝深鑒奢泰務崇節儉至以紙絹為帳扆銅鐡為轡勒府藏之金裁給而已不復買積以費國資逮景明之初承􅂛平之業四境清晏逺邇來同於是貢篚相繼商估交入諸所獻納倍多於常金玉常有餘國用恒不足苟非爲之分限但恐歳計不充自今請非要須者一切不受魏主納之秋七月癸丑角城戍主柴慶宗以城降魏魏徐州刺史元鑒遣淮陽太守吳秦生將千餘人赴之淮陰援軍斷其路秦生屢戰破之遂取角城甲子立皇子綜為豫章王魏李崇破東荆叛蠻生擒樊素安進討西荆諸蠻悉降之魏人聞蔡道恭卒攻義陽益急短兵日接曹景宗頓鑿峴不進但耀兵遊獵而已上復遣寧朔將軍馬仙琕救義陽仙琕轉戰而前兵勢甚銳元英結壘於士雅山分命諸將伏於四山示之以弱仙琕乘勝直抵長圍掩英營英偽北以誘之至平地縱兵擊之統軍􅀓永擐甲執槊單騎先入唯軍主蔡三虎副之突陳橫過梁兵射永洞其左股永拔箭復入仙琕大敗一子戰死仙琕退走英謂永曰公傷矣且還營永曰昔漢祖捫足不欲人知下官雖微國家一將柰何使賊有傷將之名遂與諸軍追之盡夜而返時年七十餘矣軍中莫不壯之仙琕復帥萬餘人進擊英英又破之殺將軍陳秀之仙琕知義陽危急盡銳决戰一日三交皆大敗而返蔡靈恩勢窮八月乙酉降於魏三闗戍將聞之辛酉亦棄城走英使司馬陸希道為露板嫌其不精命傅永改之永不增文彩直為之陳列軍事處置形要而已英深賞之曰觀此經筭雖有金城湯池不能守矣初南安惠王以預穆泰之謀追奪爵邑及英克義陽乃復立英為中山王御史中丞任昉奏彈曹景宗上以其功臣寢而不治衞尉鄭紹叔忠於事上外所聞知纎豪無隱每為上言事善則推功於上不善則引咎歸己上以是親之詔於南義陽置司州移鎮闗南以紹叔為刺史紹叔立城隍繕器械廣田積穀招集流散百姓安之魏置郢州於義陽以司馬恱為刺史上遣馬仙琕築竹敦麻陽二城於三闗南司馬恱遣兵攻竹敦拔之九月壬子以吐谷渾王伏連籌為西秦河二州刺史河南王柔然侵魏之沃野及懐朔鎮詔車騎大將軍源懐出行北邉指授規略隨須徵發皆以便宜從事懐至雲中柔然遁去懐以為用夏制夷莫如城郭還至恒代案視諸鎮左右要害之地可以築城置戍之處欲東西為九城及儲糧積仗之宜犬牙相救之勢凡五十八條表上之曰今定鼎成周去北遥逺代表諸國頗或外叛仍遭旱飢戎馬甲兵十分闕八謂宜準舊鎮東西相望令形勢相接築城置戍分兵要害勸農積粟警急之日隨便翦討彼遊騎之寇終不敢攻城亦不敢越城南出如此北方無憂矣魏主從之魏之太和十六年髙祖詔中書監髙閭與給事中公孫崇考定雅樂久之未就㑹髙祖殂髙閭卒景明中崇為太樂令上所調金石及書至是世宗始命八座已下議之冬十一月戊午魏詔營繕國學時魏平寧日乆學業大盛燕齊趙魏之間敎授者不可勝數弟子著録多者千餘人少者猶數百州舉茂異郡貢孝廉每年逾衆甲子除以金贖罪之科十二月丙子魏詔殿中郎陳郡袁飜等議立律令彭城王􅎰等監之己亥魏主幸伊闕上雅好儒術以東晉宋齊雖開置國學不及十年輒廢之其存亦文具而已無講授之實資治通鑑卷第一百四十五
