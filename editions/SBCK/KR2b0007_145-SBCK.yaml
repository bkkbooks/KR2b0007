front:
  text: 長史王亮為中書監兼尚書令初大司馬與黃門侍郎范雲南清河太守沈約司徒右長史任昉同在竟陵王西邸意好敦宻至是引雲為大司馬諮議參軍領録事約為驃騎司馬昉為記室參軍與參謀議前吳興太守謝朏國子祭酒何胤先皆棄官家居衍奏徵為軍諮祭酒朏胤皆不至大司馬内有受禪之志沈約微扣其端大司馬不應它日又進曰今與古異不可以淳風期物士大夫攀龍附鳯者皆望有尺寸之功今童兒牧豎皆知齊祚已終明公當承其運天文䜟記又復炳然天心不可違人情不可失苟厯數所在雖欲謙光亦不可得已大司馬曰吾方思之約曰公初建牙樊沔此時應思今王業已成何所復思若不早定大業脫有一人立異即損威徳且人非金玉時事難保豈可以建安之封遺之子孫若天子還都公卿在位則君臣分定無復異心君明於上臣忠於下豈復有人方更同公作賊大司馬然之約出大司馬召范雲告之雲對略同約㫖大司馬曰智者乃爾暗同卿明早將休文更來雲出語約約曰卿必待我雲許諾而約先期入大司馬命草具其事約乃出懷中詔書并諸選置大司馬初無所改俄而雲自外來至殿門不得入徘徊夀光閤外但云咄咄約出問曰何以見處約舉手向左雲笑曰不乖所望有頃大司馬召雲入嘆約才智縱橫且曰我起兵於今二年矣功臣諸將實有其勞然成帝業者卿二人也甲寅詔進大司馬位相國揔百揆揚州牧封十郡為梁公備九錫之禮置梁百司去録尚書之號驃騎大將軍如故二月辛酉梁公始受命齊湘東王寳晊安陸王緬之子也頗好文學東昏矦死寳晊望物情歸已坐待法駕既而王珍國等送首梁公梁公以寳晊為太常寳晊心不自安壬戌梁公稱寳晊謀反并其弟江陵公寳覽汝南公寳宏皆殺之丙寅詔梁國選諸要職悉依天朝之制於是以沈約為吏部尚書兼右僕射范雲為侍中梁公納東昏余妃頗妨政事范雲以為言梁公未之從雲與侍中領軍將軍王茂同入見雲曰昔沛公入闗婦女無所幸此范增所以畏其志大也今明公始定建康海内相望風聲奈何襲亂亡之迹以女徳為累乎王茂起拜曰范雲言是也公必以天下為念無宜留此梁公黙然雲即請以余氏賚王茂梁公賢其意而許之明日賜雲茂錢各百萬丙戌詔梁公增封十郡進爵為王癸巳受命赦國内及府州所統殊死以下辛丑殺齊邵陵王寳攸晉熈王寳嵩桂陽王寳貞梁王將殺齊諸王防守猶未急鄱陽王寳寅家閹人顔文智與左右麻拱等宻謀穿牆夜出寳寅具小船於江岸著烏布􅃭腰繋千許錢濳赴江側躡屩徒步足無完膚防守者至明追之寳寅詐為釣者隨流上下十餘里追者不疑待散乃度西岸投民華文榮家文榮與其族人天龍惠連棄家將寳寅遁匿山澗賃驢乗之晝伏宵行抵夀陽之東城魏戍主杜元倫馳告揚州刺史任城王澄以車馬侍衞迎之寳寅時年十六徒步憔悴見者以為掠賣生口澄待以客禮寳寅請喪君斬衰之服澄遣人曉示情禮以喪兄齊衰之服給之澄帥官僚赴弔寳寅居處有禮一同極哀之節夀陽多其故義皆受慰喭唯不見夏矦一族以夏矦詳從梁王故也澄深器重之齊和帝東歸以蕭憺為都督荆湘等六州諸軍事荆州刺史荆州軍旅之後公私空乏憺厲精為治廣屯田省力役存問兵死之家供其乏困自以少年居重任謂佐吏曰政之不臧士君子所宜共惜吾今開懐卿其無隱於是人人得盡意民有訟者皆立前待符教决於俄頃曹無留事荆人大恱齊和帝至姑孰丙辰下詔禪位于梁丁巳廬陵王寳源卒
