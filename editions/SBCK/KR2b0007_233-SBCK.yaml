front:
  text: 資治通鑑卷第二百三十三
  hash: sha256:ea714e37a708b4030f2a399df6708847600418f32f115178afa5bd3e0029fda4
body:
  text: 臣司馬光奉勑編集唐紀四十九光協洽凡四年有奇起強圉單閼八月盡重德宗神武聖文皇帝八貞元三年八月辛巳朔日有食之吐蕃尚結賛遣五騎送崔漢衡歸且上表求和至潘原李觀語之以有詔不納吐蕃使者受其表而却其人初兵部侍郎同平章事柳渾與張延賞俱爲相渾議事數異同延賞使所親謂曰相公舊德但節言於廟堂則重位可久渾曰爲吾謝張公柳渾頭可斷舌不可禁由是交惡上好文雅緼藉而渾質直輕侻無威儀於上前時發俚語上不恱欲黜爲王府長史李泌言渾褊直無它故事罷相無爲長史者又欲以爲王􅀓泌請以為常侍上曰茍得罷之無不可者己丑渾罷爲左散騎常侍初郜國大長公主適駙馬都尉蕭升升復之從兄弟也公主不謹詹事李昇蜀州别駕蕭鼎彭州司馬李萬豐陽令韋恪皆出入主第主女爲太子妃始者上恩禮甚厚主常直乗肩輿抵東宫宗戚皆疾之或告主淫亂且為厭禱上大怒幽主於禁中切責太子太子不知所對請與蕭妃離昬上召李泌告之且曰舒王近已長立孝友温仁泌曰何至於是陛下惟有一子奈何一旦疑之欲廢之而立姪得無失計乎上勃然怒曰卿何得間人父子誰語卿舒王爲姪者對曰陛下自言之大歴初陛下語臣今日得數子臣請其故陛下言昭靖諸子主上令吾子之今陛下所生之子猶疑之何有於姪舒王雖孝自今陛下宜努力勿復望其孝矣上曰卿不愛家族乎對曰臣惟愛家族故不敢不盡言若畏陛下盛怒而爲曲從陛下明日悔之必尤臣云吾獨任汝爲相不力諫使至此必復殺而子臣老矣餘年不足惜若寃殺臣子使臣以姪爲嗣臣未知得歆其祀乎因嗚咽流涕上亦泣曰事已如此使朕如何而可對曰此大事願陛下審圖之臣始謂陛下聖德當使海外蠻夷皆戴之如父母豈謂自有子而疑之至此乎臣今盡言不敢避忌諱自古父子相疑未有不亡國覆家者陛下記昔在彭原建寜何故而誅上曰建寜叔實寃肅宗性急譛之者深耳泌曰臣昔以建寜之故固辭官爵誓不近天子左右不幸今日復爲陛下相又覩茲事臣在彭原承恩無比竟不敢言建寜之寃及臨辭乃言之肅宗亦悔而泣先帝自建寜之死常懷危懼臣亦爲先帝誦黄臺瓜辭以防讒構之端上曰朕固知之意色稍解乃曰貞觀開元皆易太子何故不亡對曰臣方欲言之昔承乾屢嘗監國託附者衆東宫甲士甚多與宰相侯君集謀反事覺太宗使其舅長孫無忌與朝臣數十人鞫之事狀顯白然後集百官而議之當時言者猶云願陛下不失爲慈父使太子得終天年太宗從之并廢魏王泰陛下旣知肅宗急以建寜爲寃臣不勝慶幸願陛下戒覆車之失從容三日䆒其端緒而思之陛下必釋然知太子之無它矣若果有其迹當召大臣知義理者二十人與臣鞫其左右必有實狀願陛下如貞觀之法行之并廢舒王而立皇孫則百代之後有天下者猶陛下子孫也至於開元之時武惠妃譖太子瑛兄弟殺之海内寃憤此乃百代所當戒又可法乎且陛下昔嘗令太子見臣於蓬萊池觀其容表非有蠭目犲聲商臣之相也正恐失於柔仁耳又太子自貞元以來常居少陽院在寢殿之側未嘗接外人預外事安有異謀乎彼譖人者巧詐百端雖有手書如晉愍懷􅂨甲如太子瑛猶未可信况但以妻母有罪爲累乎幸頼陛下語臣臣敢以家族保太子必不知謀曏使楊素許敬宗李林甫之徒承此㫖已就舒王圖定策之功矣上曰此朕家事何豫於卿而力爭如此對曰天子以四海爲家臣今獨任宰相之重四海之内一物失所責歸於臣况坐視太子寃横而不言臣罪大矣上曰爲卿遷延至明日思之泌抽笏叩頭而泣曰如此臣知陛下父子慈孝如初矣然陛下還宮當自審思勿露此意於左右露之則彼皆欲樹功於舒王太子危矣上曰具曉卿意泌歸謂子弟曰吾本不樂富貴而命與願違今累汝曹矣太子遣人謝泌曰若必不可救欲先自仰藥何如泌曰必無此慮願太子起敬起孝茍泌身不存則事不可知耳閒一日上開延英殿獨召泌流涕闌干撫其背曰非卿切言朕今日悔無及矣皆如卿言太子仁孝實無它也自今軍國及朕家事皆當謀於卿矣泌拜賀因曰陛下聖明察太子無罪臣報國畢矣臣前日驚悸亡魂不可復用願乞骸骨上曰朕父子頼卿得全方屬子孫使卿代代富貴以報德何為出此言乎甲午詔李萬不知避宗宜杖死李昇等及公主五子皆流嶺南及逺州戊申吐蕃帥􅆧渾之衆冦隴州連營數十里京城震恐九月丁卯遣神策將石季章戍武功决勝軍使唐良臣戍百里城丁巳吐蕃大掠汧陽吳山華亭老弱者殺之或斷手鑿目弃之而去驅丁壯萬餘口悉送安化峽西將分􅀠􅆧渾乃告之曰聽爾東向哭辭鄉國衆大哭赴崖谷死傷者千餘人未幾吐蕃之衆復至圍隴州刺史韓清􅃆與神策副將蘇太平夜出兵擊却之上謂李泌曰每嵗諸道貢獻共直錢五十萬緡今嵗僅得三十萬緡言此誠知失體然宫中用度殊不足泌曰古者天子不私求財今請歳􅉆宫中錢百萬緡願陛下不受諸道貢獻及罷宣索必有所須請降敕折税不使姦吏因緣誅剝上從之回紇合骨咄祿可汗屢求和親且請昬上未之許㑹邉將告乏馬無以給之李泌言於上曰陛下誠用臣策數年之後馬賤於今十倍矣上曰何故對曰願陛下推至公之心屈己徇人爲社稷大計臣乃敢言上曰卿何自疑若是對曰臣願陛下北和回紇南通雲南西結大食天竺如此則吐蕃自困馬亦易致矣上曰三國當如卿言至於回紇則不可泌曰臣固知陛下如此所以不敢早言爲今之計當以回紇爲先三國差緩耳上曰唯回紇卿勿言泌曰臣備位宰相事有可否在陛下何至不許臣言上曰朕於卿言皆聽之矣至於和回紇宜待子孫於朕之時則固不可泌曰豈非以陜州之恥邪上曰然韋少華等以朕之故受辱而死朕豈能忘之屬國家多難未暇報之和則決不可卿勿更言泌曰害少華等乃牟羽可汗陛下即位舉兵入㓂未出其境今合骨咄祿可汗殺之然則今可汗乃有功於陛下宜受封賞又何怨邪其後張光晟殺突董等九百餘人合骨咄祿竟不敢殺朝廷使者然則合骨咄祿固無罪矣上曰卿以和回紇爲是則朕固非邪對曰臣爲社稷計而言若茍合取容何以見肅宗代宗於天上上曰容朕徐思之自是泌凡十五餘對未嘗不論回紇事上終不許泌曰陛下既不許回紇和親願賜臣骸骨上曰朕非拒諫但欲與卿較理耳何至遽欲去朕邪對曰陛下許臣言理此固天下之福也上曰朕不惜屈己與之和但不能負少華輩對曰以臣觀之少華輩負陛下非陛下負之也上曰何故對曰昔回紇葉䕶將兵助討安慶緒肅宗但令臣宴勞之於元帥府先帝未嘗見也葉䕶固邀臣至其營肅宗猶不許及大軍將發先帝始與相見所以然者彼戎狄犲狼也舉兵入中國之腹不得不過爲之防也陛下在陜富於春秋少華輩不能深慮以萬乗元子徑造其營又不先與之議相見之儀使彼得肆其桀驁豈非少華輩負陛下邪死不足償責矣且香積之捷葉䕶欲引兵掠長安先帝親拜之於馬前以止之葉䕶遂不敢入城當時觀者十萬餘人皆歎息曰廣平王眞華夷主也然則先帝所屈者少所伸者多矣葉䕶乃牟羽之叔父也牟羽身爲可汗舉全國之兵赴中原之難故其志氣驕矜敢責禮於陛下陛下天資神武不爲之屈當是之時臣不敢言其它若可汗留陛下於營中歡飲十日天下豈得不寒心哉而天威所臨犲狼馴擾可汗母捧陛下於貂裘叱退左右親送陛下乗馬而歸陛下以香積之事觀之則屈己爲是乎不屈爲是乎陛下屈於牟羽乎牟羽屈於陛下乎上謂李晟馬燧曰故舊不宜相逢朕素怨回紇今聞泌言香積之事朕自覺少理卿二人以爲何如對曰果如泌所言則回紇似可恕上曰卿二人復不與朕朕當柰何泌曰臣以爲回紇不足怨曏來宰相乃可怨耳今回紇可汗殺牟羽其國人有再復京城之勲夫何罪乎吐蕃幸國之災陷河隴數千里之地又引兵入京城使先帝䝉塵於陜此乃百代必報之讐况其賛普至今尚存宰相不爲陛下别白言此乃欲和吐蕃以攻回紇此爲可怨耳上曰朕與之爲怨已久又聞吐蕃刼盟今往與之和得無復拒我爲夷狄之笑乎對曰不然臣曩在彭原今可汗爲胡祿都督與今國相白婆帝皆從葉䕶而來臣待之頗親厚故聞臣爲相而求和安有復相拒乎臣今請以書與之約稱臣爲陛下子每使來不過二百人印馬不過千匹無得􅂝中國人及商胡出塞五者皆能如約則主上必許和親如此威加北荒旁讋吐蕃足以快陛下平昔之心矣上曰自至德以來與爲兄弟之國今一旦欲臣之彼安肯和乎對曰彼思與中國和親久矣其可汗國相素信臣言若其未諧但應再發一書耳上從之既而回紇可汗遣使上表稱兒及臣凡泌所與約五事一皆聽命上大喜謂泌曰回紇何畏服卿如此對曰此乃陛下威靈臣何力焉上曰回紇則既和矣所以招雲南大食天竺奈何對曰回紇和則吐蕃已不敢輕犯塞矣次招雲南則是斷吐蕃之右臂也雲南自漢以來臣屬中國楊國忠無故擾之使叛臣于吐蕃苦於吐蕃賦役重未嘗一日不思復爲唐臣也大食在西域爲最彊自葱嶺盡西海地幾半天下與天竺皆慕中國代與吐蕃爲仇臣故知其可招也癸亥遣回紇使者合闕將軍歸許以咸安公主妻可汗歸其馬價絹五萬疋吐蕃㓂華亭及連雲堡皆陷之甲戍吐蕃驅二城之民數千人及邠涇人畜萬計而去寘之彈筝峽西涇州恃連雲爲斥􅀱連雲既陷西門不開門外皆爲虜境樵采路絶每収穫必陳兵以扞之多失時得空穗而已由是涇州常苦乏食冬十月甲申吐蕃㓂豐義城前鋒至大回原邠寜節度使韓遊瓌擊却之乙酉復㓂長武城又城故原州而屯之妖僧李軟奴自言本皇族見嶽瀆神命己爲天子結殿前射生將韓欽緒等謀作亂丙戍其黨告之上命捕送内侍省推之李晟聞之遽仆於地曰晟族滅矣李泌問其故晟曰晟新罹謗毁中外有家人千餘若有一人在其黨中則兄亦不能救矣泌乃宻奏大獄一起所連引必多外間人情恟懼請出付臺推上從之欽緒逰瓌之子也亡抵邠州逰瓌出屯長武城留後械送京師壬辰腰斬軟奴等八人北軍之士坐死者八百餘人而朝廷之臣無連及者韓逰瓌委軍詣闕謝上遣使止之委任如初逰瓌又械送欽緒二子上亦宥之吐蕃以苦寒不入宼而糧運不繼十一月詔渾瑊歸河中李元諒歸華州劉昌分其衆五千歸汴州自餘防秋兵退屯鳳翔京兆諸縣以就食十二月韓逰瓌入朝自興元以來至是歳最為豐稔米斗直錢百五十粟八十詔所在和糴庚辰上畋於新店入民趙光奇家問百姓樂乎對曰不樂上曰今嵗頗稔何爲不樂對曰詔令不信前云兩税之外悉無他徭今非税而誅求者殆過於税後又云和糴而實强取之曾不識一錢始云所糴粟麥納於道次今則遣致京西行營動數百里車摧牛斃破産不能支愁苦如此何樂之有每有詔書優恤徒空文耳恐聖主深居九重皆未知之也上命復其家臣光曰甚矣唐德宗之難寤也自古所患者人君之澤壅而不下逹小民之情鬱而不上通故君勤恤於上而民不懷民愁怨於下而君不知以至於離叛危亡凡以此也德宗幸以逰獵得至民家值光奇敢言而知民疾苦此乃千載之遇也固當按有司之廢格詔書殘虐下民橫增賦斂盗匿公財及左右謟諛日稱民間豐樂者而誅之然後洗心易慮一新其政屏浮飾廢虛文謹號令敦誠信察眞偽辨忠邪矜困窮伸寃滯則太平之業可致矣釋此不爲乃復光奇之家夫以四海之廣兆民之衆又安得人人自言於天子而戸戸復其徭賦乎李泌以李軟奴之黨猶有在北軍未􅀤者請大赦以安之四年春正月庚戍朔赦天下詔兩税等第自今三年一定李泌奏京官俸太薄請自三師以下悉倍其俸從之壬申以宣武行營節度使劉昌爲涇原節度使甲戍以鎭國節度使李元諒爲隴右節度使昌元諒皆帥卒力田數年軍食充羨涇隴稍安韓逰瓌之入朝也軍中以爲必不返餞送甚薄遊瓌見上盛陳築豐義城可以制吐蕃上悦遣還鎭軍中憂懼者衆遊瓌忌都虞􅀱虞鄉范希朝有功名得衆心求其罪將殺之希朝奔鳳翔上召之寘於左神策軍遊瓌帥衆築豐義城二版而潰二月元友直運淮南錢帛二十萬至長安李泌悉輸之大盈庫然上猶數有宣索仍敕諸道勿令宰相知泌聞之惆悵而不敢言臣光曰王者以天下爲家天下之財皆其有也阜天下之財以養天下之民已必豫焉或乃更爲私藏此匹夫之鄙志也古人有言曰貧不學儉夫多財者奢欲之所自來也李泌欲弭德宗之欲而豐其私財財豐則欲滋矣財不稱欲能無求乎是猶啓其門而禁其出也雖德宗之多僻亦泌所以相之者非其道故也咸陽人或上言臣見白起令臣奏云請爲國家扞禦西陲正月吐蕃必大下當爲朝廷破之以取信既而吐蕃入冦邉將敗之不能深入上以爲信然欲於京城立廟贈司徒李泌曰臣聞國將興聽於人今將帥立功而陛下襃賞白起臣恐邉臣解體矣若立廟京城盛爲祈禱流聞四方將長巫風今杜郵有舊祠請敇府縣葺之則不至驚人耳目矣且白起列國之將贈三公太重請贈兵部尚書可矣上笑曰卿於白起亦惜官乎對曰人神一也陛下儻不之惜則神亦不以爲榮矣上從之泌自陳衰老獨任宰相精力耗竭既未聽其去乞更除一相上曰朕深知卿勞苦但未得其人耳上從容與泌論即位以來宰相曰盧􅂎忠清彊介人言􅂎姦邪朕殊不覺其然泌曰人言杞姦邪而陛下獨不覺其姦邪此乃杞之所以爲姦邪也儻陛下覺之豈有建中之亂乎杞以私隙殺楊炎擠顔眞卿於死地激李懷光使叛頼陛下聖明竄逐之人心頓喜天亦悔禍不然亂何由弭上曰楊炎以童子視朕每論事朕可其奏則悦與之往復問難即怒而辭位觀其意以朕爲不足與言故也以是乆不可忍非由􅂎也建中之亂術士豫請城奉天此蓋天命非􅂎所能致也泌曰天命他人皆可以言之惟君相不可言蓋君相所以造命也若言命則禮樂政刑皆無所用矣紂曰我生不有命在天此商之所以亡也上曰朕好與人較量理體崔祐甫性褊躁朕難之則應對失次朕常知其短而䕶之楊炎論事亦有可采而氣色麤傲難之輒勃然怒無復君臣之禮所以每見令人忿發餘人則不敢復言盧􅂎小心朕所言無不從又無學不能與朕往復故朕所懷常不盡也對曰􅂎言無不從豈忠臣乎夫言而莫予違此孔子所謂一言喪邦者也上曰惟卿則異彼三人者朕言當卿常有喜色不當常有憂色雖時有逆耳之言如曏來紂及喪邦之類朕細思之皆卿先事而言如此則理安如彼則危亂言雖深切而氣色和順無楊炎之陵傲朕問難往復卿辭理不屈又無好勝之志直使朕中懷已盡而屈服不能不從此朕所以私喜於得卿也泌曰陛下所用相尚多今皆不論何也上曰彼皆非所謂相也凡相者必委以政事如􅀇宗時牛仙客陳希烈可以謂之相乎如肅宗代宗之任卿雖不受其名乃眞相耳必以官至平章事爲相則王武俊之徒皆相也劉昌復築連雲堡夏四月乙未更命殿前左右射生曰神威軍與左右羽林龍武神武神策號曰十軍神䇿尤盛多戍京西散屯畿甸福建觀察使吳詵輕其軍士脆弱苦役之軍士作亂殺詵腹心十餘人逼詵牒大將郝誡溢掌留務誡溢上表請罪上遣中使就赦以安之乙未隴右節度使李元諒築良原故城而鎮之雲南王異牟尋欲内附未敢自遣使先遣其東蠻鬼主驃旁苴夢衝苴烏星入見五月乙卯宴之於麟徳殿賜賚甚厚封王給印而遣之辛未以太子賔客吳湊爲福建觀察使貶吳詵爲涪州刺史吐蕃三萬餘騎冦涇邠寧慶鄜等州先是吐蕃常以秋冬入㓂及春多病疫而退至是得唐人質其妻子遣其將將之盛夏入冦諸州皆城守無敢與戰者吐蕃俘掠人畜萬計而去夏縣人陽城以學行著聞隱居柳谷之北李泌薦之六月徵拜諫議大夫韓遊瓌以吐蕃犯塞自戍寧州病求代歸秋七月庚戍加渾瑊邠寜副元帥以左金吾將軍張獻甫爲邠寧節度使陳許兵馬使韓全義爲長武城行營節度使獻甫未至壬子夜遊瓌不告於衆輕騎歸朝戍卒裴滿等憚獻甫之嚴乗無師之際癸丑帥其徒作亂曰張公不出本軍我必拒之因剽掠城市圍監軍楊明義所居使奏請范希朝爲節度使都虞􅀱楊朝晟避亂出城聞之復入曰所請甚契我心我來賀也亂卒稍安朝晟潜與諸將謀晨勒兵召亂卒謂曰所請不行張公已至邠州汝曹作亂當死不可盡殺宜自推列唱帥者遂斬二百餘人帥衆迎獻甫上聞軍衆欲得范希朝將授之希朝辭曰臣畏遊瓌之禍而來今往代之非所以防窺覦安反仄也上嘉之擢爲寧州刺史以副獻甫遊瓌至京師除右龍武統軍􅊨振武節度使唐朝臣不嚴斥候己未奚室韋冦振武執宣慰中使二人大掠人畜而去時回紇之衆逆公主者在振武朝臣遣七百騎與回紇數百騎追之回紇使者爲奚室韋所殺九月庚申吐蕃尚志董星冦寧州張獻甫擊却之吐蕃轉掠鄜坊而去元友直句檢諸道税外物悉輸户部遂為定制歳於税外輸百餘萬緡斛民不堪命諸道多自訴於上上意寤詔今年巳入在官者輸京師未入者悉以與民明年以後悉免之於是東南之民復安其業􅊨回紇合骨咄祿可汗得唐許昬甚喜遣其妹骨咄祿毗伽公主及大臣妻并國相􅎤跌都督以下千餘人來迎可敦辭禮甚恭曰昔爲兄弟今爲子壻半子也若吐蕃爲患子當爲父除之因詈辱吐蕃使者以絶之冬十月戊子回紇至長安可汗仍表請改回紇爲回鶻許之吐蕃􅀤兵十萬將冦西川亦發雲南兵雲南内雖附唐外未敢叛吐蕃亦􅀤兵數萬屯於瀘北韋臯知雲南計方猶豫乃爲書遺雲南王敘其叛吐蕃歸化之誠貯以銀函使東蠻轉致吐蕃吐蕃始疑雲南遣兵二萬屯㑹川以塞雲南趣蜀之路雲南怒引兵歸國由是雲南與吐蕃大相猜阻歸唐之志益堅吐蕃失雲南之助兵勢始弱矣然吐蕃業已入冦遂分兵四萬攻兩林驃旁三萬攻東蠻七千冦清溪闗五千冦銅山臯遣黎州刺史韋晉等與東蠻連兵禦之破吐蕃於清溪闗外庚子册命咸安公主加回鶻可汗號長夀天親可汗十一月以刑部尚書闗播爲送咸安公主兼册回鶻可汗使吐蕃恥前日之敗復以衆二萬冦清溪闗一萬攻東蠻韋臯命韋晉鎭要衝城督諸軍以禦之嶲州經略使劉朝彩等出闗連戰自乙卯至癸亥大破之李泌言於上曰江淮漕運自淮入汴以甬橋爲咽喉地屬徐州鄰於李納刺史髙明應年少不習事若李納一旦復有異圖竊據徐州是失江淮也國用何從而致請徙夀廬濠都團練使張建封鎭徐州割濠泗以􅀠之復以廬夀歸淮南則淄青惕息而運路常通江淮安矣及今明應㓜騃可代宜徴爲金吾將軍萬一使它人得之則不可復制矣上從之以建封爲徐泗濠節度使建封爲政寛厚而有綱紀不貸人以法故其下無不畏而恱之横海節度使程日華薨子懐直自知留後吐蕃屢遣人誘脅雲南五年春二月丁亥韋臯遺異牟尋書稱回鶻屢請佐天子共滅吐蕃王不早定計一且爲回鶻所先則王累代功名虛弃矣且雲南久爲吐蕃屈辱今不乗此時依大國之勢以復怨雪恥後悔無及矣戊戍以横海留後程懷直爲滄州觀察使懷直請分景城弓高爲景州仍請朝廷除刺史上喜曰三十年無此事矣乃以貟外郎徐伸爲景州刺史中書侍郎同平章事李泌屢乞更命相上欲用户部侍郎班宏泌言宏雖清彊而性多凝滯乃薦竇參通敏可兼度支鹽鐵董晉方正可處門下上皆以爲不可參誕之􅀇孫也時爲御史中丞兼户部侍郎晉爲太常卿至是泌疾甚復薦二人庚子以董晉爲門下侍郎竇參爲中書侍郎兼度支轉運使並同平章事以班宏爲尚書依前度支轉運副使參爲人剛果峭刻無學術多權數每奏事諸相出參獨居後以奏度支事爲辭實專大政多引親黨置要地使爲耳目董晉充位而已然晉爲人重愼所言於上前者未嘗泄於人子弟或問之晉曰欲知宰相能否視天下安危所謀議於上前者不足道也三月甲辰李泌薨泌有謀畧而好談神仙詭誕故爲世所輕初上思李懷光之功欲宥其一子而子孫皆已伏誅戊辰詔以懷光外孫燕八八爲懷光後賜姓名李承緒除左衛率胄曹參軍賜錢千緡使養懷光妻王氏及守其墓祀冬十月韋臯遣其將王有道將兵與東蠻兩林蠻及吐蕃青海臘城二節度戰于嶲州臺登谷大破之斬首二千級投崖及溺死者不可勝數殺其大兵馬使乞藏遮遮乞藏􅃒遮虜之驍將也既死臯所攻城栅無不下數年盡復嶲州之境易定節度使張孝忠興兵襲蔚州驅掠人畜詔書責之踰旬還鎭瓊州自乾封中爲山賊所陷至是嶺南節度使李復遣判官姜孟京與崖州刺史張少遷攻拔之十二月庚午聞回鶻天親可汗薨戊寅遣鴻臚卿郭鋒册命其子爲登里羅没宻施俱錄忠貞毗伽可汗先是安西北庭皆假道於回鶻以奏事故與之連和北庭去回鶻尤近回鶻誅求無厭又有沙陁六千餘帳與北庭相依及三葛祿白服突厥皆附於回鶻回鶻數侵掠之吐蕃因葛祿白服之衆以攻北庭回鶻大相頡干迦斯將兵救之雲南雖貳於吐蕃亦未敢顯與之絶壬辰韋臯復以書招諭之六年春詔出岐山無憂王寺佛指骨迎置禁中又送諸寺以示衆傾都瞻禮施財巨萬二月乙亥遣中使復葬故處初朱滔敗於貝州其棣州刺史趙鎬以州降於王武俊既而得罪於武俊召之不至田緒殘忍其兄朝仕李納爲齊州刺史或言納欲納朝於魏緒懼判官孫光佐等爲緒謀厚賂納且説納招趙鎬取棣州以悦之因請送朝於京師納從之丁酉鎬以棣州降于納三月武俊使其子士眞擊之不克回鶻忠貞可汗之弟弑忠貞而自立其大相頡干迦斯西擊吐蕃未還夏四月次相帥國人殺簒者而立忠貞之子阿啜爲可汗年十五五月王武俊屯冀州將擊趙鎬鎬帥其屬奔鄆州李納分兵據之田緒使孫光佐如鄆州矯詔以棣州􅀠納武俊怒遣其子士清伐貝州取經城等四縣回鶻頡干迦斯與吐蕃戰不利吐蕃急攻北庭北庭人苦於回鶻誅求與沙陁酋長朱邪盡忠皆降於吐蕃節度使楊襲古帥麾下二千人奔西州六月頡干迦斯引兵還國次相恐其有廢立與可汗皆出郊迎俯伏自陳擅立之狀曰今日惟大相死生之盛陳郭鋒所齎國信悉以遺之可汗拜且泣曰兒愚㓜若幸而得立惟仰食於阿爹國政不敢豫也虜謂父爲阿爹頡干迦斯感其卑屈持之而哭遂執臣禮悉以所遺頒從行者已無所受國中由是稍安秋頡干迦斯悉舉國兵數萬召楊襲古將復北庭又爲吐蕃所敗死者大半襲古収餘衆數百將還西州頡干迦斯紿之曰且與我同至牙帳當送君還朝既而留不遣竟殺之安西由是遂絶莫知存亡而西州猶爲唐固守葛祿乗勝取回鶻之浮圖川回鶻震恐悉遷西北部落於牙帳之南以避之遣逹北特勒梅錄隨郭鋒偕來告忠貞可汗之䘮且求册命先是回鶻使者入中國禮容驕慢刺史皆與之鈞禮梅錄至豐州刺史李景略欲以氣加之謂梅錄曰聞可汗新没欲申弔禮景略先據高壟而坐梅錄俯僂前哭景略撫之曰可汗弃代助爾哀慕梅錄驕容猛氣索然俱盡自是回鶻使至皆拜景略於庭威名聞塞外冬十月辛亥郭鋒始自回鶻還十一月庚午上祀圓丘上屢詔李納以棣州歸王武俊納百方遷延請以海州易之於朝廷上不許乃請詔武俊先歸田緒四縣上從之十二月納始以棣州歸武俊七年春正月己巳襄王僙薨二月癸卯遣鴻臚少卿庾鋋冊回鶻奉誠可汗戊戍詔涇原節度使劉昌築平凉故城以扼彈筝峽口浹辰而畢分兵戍之昌又築朝谷堡甲子詔名其堡曰彰信涇原稍安初上還長安以神䇿等軍有衛從之勞皆賜名興元元從奉天定難功臣以官領之撫恤優厚禁軍恃恩驕横侵暴百姓陵忽府縣至詬辱官吏毁裂案牘府縣官有不勝忿而刑之者朝笞一人夕貶萬里由是府縣雖有公嚴之官莫得舉其職市井富民往往行賂寄名軍籍則府縣不能制辛巳詔神威六軍吏士與百姓訟者委之府縣小事牒本軍大事奏聞若軍士陵忽府縣禁身以聞委御史臺推覆縣吏輒敢笞辱必從貶謫癸未易定節度使張孝忠薨安南都䕶高正平重賦斂夏四月羣蠻酋長杜英翰等起兵圍都䕶府正平以憂死羣蠻聞之皆降五月辛巳置柔逺軍於安南端王遇薨韋臯比年致書招雲南王異牟尋終未獲報然吐蕃屢發雲南兵雲南與之益少臯知異牟尋心附於唐討擊副使叚忠義本閤羅鳳使者也六月丙申臯遣忠義還雲南并致書敦諭之秋七月戊寅以定州刺史張昇雲為義武留後庚辰以䖍州刺史趙昌爲安南都䕶羣蠻遂安八月丙午以翰林學士陸贄爲兵部侍郎餘職皆解竇參惡之也吐蕃攻靈州爲回鶻所敗夜遁九月回鶻遣使來獻俘冬十二月甲午又遣使獻所獲吐蕃酋長尚結心福建觀察使吳湊爲治有聲竇參以私憾毁之且言其病風上召至京師使之歩以察之知參之誣由是始惡參丁酉以湊爲陜虢觀察使以代參黨李翼睦王述薨吐蕃知韋臯使者在雲南遣使讓之雲南王異牟尋紿之曰唐使本蠻也臯聽其歸耳無它謀也因執以送吐蕃吐蕃多取其大臣之子爲質雲南愈怨勿鄧酋長苴夢衝濳通吐蕃扇誘羣蠻隔絶雲南使者韋臯遣三部落揔管蘓峞將兵至琵琶川資治通鑑卷第二百三十三
