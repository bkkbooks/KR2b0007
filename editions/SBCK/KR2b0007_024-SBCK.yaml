body:
  text: 中宗孝宣皇帝上之上本始元年春詔有司論定䇿安宗廟功大將軍光益封萬七千戸與故所食凡二萬戸車􅀐將軍富平矦安丗以下益封者十人封矦者五人賜爵􅀜内侯者八人大將軍光稽首歸政上謙讓不受諸事皆先關白光然後奏御自昭帝時光子禹及兄孫雲皆爲中郎將雲弟山奉車都尉侍中領胡越兵光兩女壻爲東西宫衞尉昆弟諸壻外孫皆奉朝請爲諸曹大夫􅀐都尉給事中黨親連體根據於朝廷及昌邑王廢光權益重毎朝見上虚已斂容禮下之已甚夏四月庚午地震五月鳯皇集膠東千乗赦天下勿收田租賦六月詔曰故皇太子在湖未有號謚􅀊時祠其議謚置園邑有司奏請禮爲人後者爲之子也故降其父母不得祭尊祖之義也陛下爲孝昭帝後承祖宗之祀愚以為親謚宜曰悼母曰悼后故皇太子謚曰戾史良娣曰戾夫人皆攺葬焉秋七月詔立燕刺王太子建爲廣陽王立廣陵王胥少子􅀪爲髙密王初上官桀與霍光爭權光旣誅桀遂遵武帝法度以刑罰痛繩羣下由是俗吏皆尚嚴酷以爲能而河南太守丞淮陽黄霸獨用寛和爲名上在民間時知百姓苦吏急也聞霸持法平乃召以爲廷尉正數決疑獄庭中稱平二年春大司農田延年有罪自殺昭帝之喪大司農僦民車延年詐増僦直盜取錢三千萬為怨家所告霍將軍召問延年欲為道地延年抵曰無有是事光曰即無事當窮竟御史大夫田廣明謂太僕杜延年曰春秋之義以功覆過當廢昌邑王時非田子賔之言大事不成今縣官出三千萬自乞之何哉願以愚言白大將軍延年言之大將軍大將軍曰誠然實勇士也當發大議時震動朝廷光因舉手自撫心曰使我至今病悸謝田大夫曉大司農通徃就獄得公議之田大夫使人語延年延年曰幸縣官寛我耳何面目入牢獄使衆人指􅀏我卒徒唾吾背乎即閉閤獨居齋舎偏袒持刀東西歩數日使者召延年詣廷尉聞鼓聲自刎死夏五月詔曰孝武皇帝躬仁誼厲威武功德茂盛而廟樂未稱朕甚悼焉其與列矦二千石博士議於是羣臣大議庭中皆曰宜如詔書長信少府夏矦勝獨曰武帝雖有攘四夷廣土境之功然多殺士衆竭民財力奢泰無度天下虚耗百姓流離物故者半蝗蟲大起赤地數千里或人民相食畜積至今未復無德澤於民不宜為立廟樂公卿共難勝曰此詔書也勝曰詔書不可用也人臣之誼宜直言正論非苟阿意順指議已出口雖死不悔於是丞相御史劾奏勝非議詔書毀先帝不道及丞相長史黄霸阿縱勝不舉劾俱下獄有司遂請尊孝武帝廟爲丗宗廟奏盛德文始五行之舞武帝廵狩所幸郡國皆立廟如髙祖太宗焉夏矦勝黄霸旣乆繫霸欲從勝受尚書勝辭以罪死霸曰朝聞道夕死可矣勝賢其言遂授之擊再更冬講論不怠初烏孫公主死漢復以楚王戊之孫解憂為公主妻岑娶岑娶胡婦子泥靡尚小岑娶且死以國與季父大禄子翁歸靡曰泥靡大以國歸之翁歸靡旣立號肥王復尚楚主生三男兩女長男曰元貴靡次曰萬年次曰大樂昭帝時公主上書言匈奴與車師共侵烏孫唯天子幸救之漢養士馬議擊匈奴㑹昭帝崩上遣光禄大夫常惠使烏孫烏孫公主及昆彌皆遣使上書言匈奴復連發大兵侵擊烏孫使使謂烏孫趣持公主來欲隔絶漢昆彌願發國精兵五萬􅀐盡力擊匈奴唯天子出兵以救公主昆彌先是匈奴數侵漢邊漢亦欲討之秋大發兵遣御史大夫田廣明為祁連將軍四萬餘􅀐出西河度遼將軍范明友三萬餘􅀐出張掖前將軍韓增三萬餘􅀐出雲中後將軍趙充國為蒲􅀋將軍三萬餘􅀐出酒泉雲中太守田順為虎牙將軍三萬餘􅀐出五原期以出塞各二千餘里以常惠為校尉持節䕶烏孫兵共擊匈奴三年春正月癸亥㳟哀許皇后崩時霍光夫人顯欲貴其小女成君道無從㑹許后當娠病女醫淳于衍者霍氏所愛嘗入宫侍皇后疾衍夫賞為掖庭戸衞謂衍可過辭霍夫人行爲我求安池􅁥衍如言報顯顯因生心辟左右字謂衍曰少夫幸報我以事我亦欲報少夫可乎衍曰夫人所言何等不可者顯曰將軍素愛小女成君欲竒貴之願以累少夫衍曰何謂邪顯曰婦人免乳大故十死一生今皇后當免身可因投毒藥去也成君即爲皇后矣如蒙力事成富貴與少夫共之衍曰藥雜治當先嘗安可顯曰在少夫爲之耳將軍領天下誰敢言者緩急相護但恐少夫無意耳衍良乆曰願盡力即擣附子齎入長定宫皇后免身後衍取附子并合太醫大丸以飲皇后有頃曰我頭岑岑也藥中得無有毒對曰無有遂加煩懣崩衍出過見􅂋相勞問亦未敢重謝衍後人有上書告諸醫侍疾無狀者皆收繫詔獄劾不道􅂋恐急即以狀具語光因曰旣失計為之無令吏急衍光大驚欲自發舉不忍猶與㑹奏上光署衍勿論顯因勸光内其女入宫戊辰五將軍發長安匈奴聞漢兵大出老弱犇走歐畜産逺遁逃是以五將少所得夏五月軍罷度遼將軍出塞千二百餘里至蒲離􅀱水斬首捕虜七百餘級前將軍出塞千二百餘里至烏貟斬首捕虜百餘級蒲􅀋將軍出塞千八百餘里西去􅀱山斬首捕虜得單于使者蒲隂王以下三百餘級聞虜已引去皆不至期還天子薄其過寛而不罪祁連將軍出塞千六百里至雞秩山斬首捕虜十九級逢漢使匈奴還者冉弘等言雞秩山西有虜衆祁連即戒弘使言無虜欲還兵御史屬公孫益壽諌以為不可祁連不聽遂引兵還虎牙將軍出塞八百餘里至丹餘吾水上即止兵不進斬首捕虜千九百餘級引兵還上以虎牙將軍不至期詐增鹵獲而祁連知虜在前逗遛不進皆下吏自殺擢公孫益夀為侍御史烏孫昆彌自將五萬􅀐與校尉常惠從西方入至右谷蠡王庭獲單于父行及嫂居次名王犁汙都尉千長􅀐將以下四萬級馬牛羊驢橐佗七十餘萬頭烏孫皆自取所虜獲上以五將皆無功獨惠奉使克獲封惠為長羅矦然匈奴民衆傷而去者及畜産逺移死亡不可勝數於是匈奴遂衰耗怨烏孫上復遣常惠持金幣還賜烏孫貴人有功者惠因奏請􅀛兹國嘗殺校尉頼丹未伏誅請便道擊之帝不許大將軍霍光風惠以便宜從事惠與吏士五百人俱至烏孫還過發西國兵二萬人令副使發􅀛兹東國二萬人烏孫兵七千人從三面攻􅀛兹兵未合先遣人責其王以前殺漢使狀王謝曰乃我先王時為貴人姑翼所誤耳我無罪惠曰即如此􅅞姑翼來吾置王王執姑翼詣惠惠斬之而還大旱六月己丑陽平節矦蔡義薨甲辰長信少府韋賢為丞相大司農魏相為御史大夫冬匈奴單于自將數萬􅀐擊烏孫頗得老弱欲還㑹天大雨雪一日深丈餘人民畜産凍死還者不能什一於是丁令乗弱攻其北烏􅁊入其東烏孫擊其西凡三國所殺數萬級馬數萬匹牛羊甚衆又重以餓死人民死者什三畜産什五匈奴大虚弱諸國覊屬者皆瓦解攻盜不能理其後漢出三千餘􅀐爲三道並入匈奴捕虜得數千人還匈奴終不敢取當滋欲郷和親而邊境少事矣是嵗潁川太守趙廣漢爲京兆尹潁川俗豪傑相朋黨廣漢爲缿筩受吏民投書使相告訐於是更相怨咎姦黨散落盗賊不得發匈奴降者言匈奴中皆聞廣漢名由是入爲京兆尹廣漢遇吏殷勤甚僃事推功善歸之於下行之發於至誠吏咸願爲用僵仆無所避廣漢聦明皆知其能之所宜盡力與否其或負者輙收捕之無所逃案之罪立具即時㐲辜尤善為鉤距以得事情閭里銖兩之姦皆知之長安少年數人㑹窮里空舎謀共劫人坐語未訖廣漢使吏捕治具服其發姦擿伏如神京兆政清吏民稱之不容口長老傳以為自漢興治京兆者莫能及四年春三月乙卯立霍光女為皇后赦天下初許后起微賤登至尊日淺從官車服甚節儉及霍后立轝駕侍從益盛賞賜官屬以千萬計與許后時縣絶矣夏四月壬寅郡國四十九同日地震或山崩壊城郭室屋殺六千餘人北海琅邪壊祖宗廟詔丞相御史與列矦中二千石博問經學之士有以應變母有所諱令三輔太常内郡國舉賢良方正各一人大赦天下上素服避正殿五日釋夏矦勝黄霸以勝為諌大夫給事中霸為揚州刺史勝為人質樸守正簡易無威儀或時謂上為君誤相字於前上亦以是親信之嘗見出道上語上聞而讓勝勝曰陛下所言善臣故揚之堯言布於天下至今見誦臣以為可傳故傳耳朝廷每有大議上知勝素直謂曰先生建正言無懲前事勝復為長信少府後遷太子太傅年九十卒太后賜錢二百萬為勝素服五日以報師傅之恩儒者以為榮五月鳳皇集北海安丘淳于廣川王去坐殺其師及姬妾十餘人或銷鈆錫灌口中或支解并毒藥煑之令糜盡廢徙上庸自殺地節元年春正月有星孛于西方楚王延壽以廣陵王胥武帝子天下有變必得立隂附助之為其後母弟趙何齊取廣陵王女為妻因使何齊奉書遺廣陵王曰願長耳目母後人有天下何齊父長年上書告之事下有司考驗辭服冬十一月延壽自殺胥勿治十二月癸亥晦日有食之是嵗于定國為廷尉定國決疑平法務在哀鰥寡罪疑從輕加審愼之心朝廷稱之曰張釋之為廷尉天下無􅁈民于定國為廷尉民自以不􅁈二年春霍光病篤車駕自臨問上為之涕泣光上書謝恩願分國邑三千戸以封兄孫奉車都尉山為列矦奉兄去病祀即日拜光子禹為右將軍三月庚午光薨上及皇太后親臨光喪中二千石治冡賜梓宫葬具皆如乗輿制度謚曰宣成矦發三河卒穿復土置園邑三百家長丞奉守下詔復其後丗疇其爵邑丗丗無有所與御史大夫魏相上封事曰國家新失大將軍宜顯明功臣以塡藩國母空大位以塞爭權宜以車􅀐將軍安世為大將軍母令領光禄勲事以其子延壽為光禄勲上亦欲用之夏四月戊申以安丗為大司馬車􅀐將軍領尚書事鳳皇集魯羣鳥從之大赦天下上思報大將軍德乃封光兄孫山為樂平矦使以奉車都尉領尚書事魏相因昌成君許廣漢奏封事言春秋譏丗卿惡宋三丗為大夫及魯季孫之専權皆危亂國家自後元以來禄去王室政由冢宰今光死子復為右將軍兄子秉樞機昆弟諸壻據權勢在兵官光夫人顯及諸女皆通籍長信宫或夜詔門出入驕奢放縱恐寖不制宜有以損奪其權破散隂謀以固萬丗之基全功臣之丗又故事諸上書者皆為二封署其一曰副領尚書者先發副封所言不善屏去不奏相復因許伯白去副封以防壅蔽帝善之詔相給事中皆從其議􅊨帝興于閭閻知民事之囏難霍光旣薨始親政事厲精為治五日一聽事自丞相巳下各奉職奏事敷奏其言考試功能侍中尚書功勞當遷及有異善厚加賞賜至于子孫終不攺易樞機周密品式僃具上下相安莫有苟且之意及拜刺史守相輙親見問觀其所由退而考察所行以質其言有名實不相應必知其所以然常稱曰庶民所以安其田里而亡歎息愁恨之心者政平訟理也與我共此者其唯良二千石乎以為太守吏民之本數變易則下不安民知其將乆不可欺罔乃服從其教化故二千石有治理效輒以璽書勉厲增秩賜金或爵至􅀜内矦公卿缺則選諸所表以次用之是故漢丗良吏於是為盛稱中興焉匈奴壷衍鞮單于死弟左賢王立為虚閭權渠單于以右大將女為大閼氏而黜前單于所幸顓渠閼氏顓渠閼氏父左大且渠怨望是時漢以匈奴不能為邊宼罷塞外諸城以休百姓單于聞之喜召貴人謀欲與漢和親左大且渠心害其事曰前漢使來兵隨其後今亦效漢發兵先使使者入乃自請與呼盧訾王各將萬􅀐南旁塞獵相逢俱入行未到㑹三􅀐亡降漢言匈奴欲為宼於是天子詔發邊􅀐屯要害處使大將軍軍監治衆等四人將五千􅀐分三隊出塞各數百里捕得虜各數十人而還時匈奴亡其三􅀐不敢入即引去是嵗匈奴饑人民畜産死什六七又發兩屯各萬􅀐以僃漢其秋匈奴前所得西嗕居左地者其君長以下數千人皆驅畜産行與甌脫戰所殺傷甚衆遂南降漢資治通鑑卷第二十四
