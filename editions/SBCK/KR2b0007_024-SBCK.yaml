seq: 24
front:
  text: 郎爲九江太守即日承皇后詔遣行大鴻臚事少府樂成宗正德光禄大夫吉中郎將利漢迎昌邑王賀乗七乗傳詣長安邸光又白皇后徙右將軍安丗爲車􅀐將軍賀昌邑哀王之子也在國素狂縱動作無節武帝之喪賀游獵不止嘗游方與不半日馳二百里中尉琅邪王吉上䟽諌曰大王不好書術而樂逸游馮式撙銜馳騁不止口倦虖叱咤手苦於箠轡身勞虖車輿朝則冒霧露晝則􅀍塵埃夏則爲大暑之所㬥炙冬則爲風寒之所匽薄數以耎脆之玊體犯勤勞之煩毒非所以全壽命之宗也又非所以進仁義之隆也夫廣厦之下細旃之上明師居前􅂆誦在後上論唐虞之際下及殷周之盛考仁聖之風習治國之道訢訢焉發憤忘食日新厥德其樂豈銜橛之間哉休則俛仰屈伸以利形進退歩趨以實下吸新吐故以練臧專意積精以適神於以養生豈不長哉大王誠留意如此則心有堯舜之志體有喬松之壽美聲廣譽登而上聞則福禄其臻而社稷安矣皇帝仁聖至今思慕未怠於宫館囿池弋獵之樂未有所幸大王宜夙夜念此以承聖意諸矦骨肉莫親大王大王於屬則子也於位則臣也一身而二任之責加焉恩愛行義􅏽介有不具者於以上聞非饗國之福也王乃下令曰寡人造行不能無惰中尉甚忠數輔吾過使謁者千秋賜中尉牛肉五百斤酒五石脯五束其後復放縱自若郎中令山陽龔遂忠厚剛毅有大節内諫爭於王外責􅀓相引經義陳禍福至於涕泣蹇蹇亡巳面刺王過王至掩耳起走曰郎中令善媿人王嘗乆與騶奴宰人游戯飲食賞賜無度遂入見王涕泣䣛行左右侍御皆出涕王曰郎中令何爲哭遂曰臣痛社稷危也願賜清閒竭愚王辟左右遂曰大王知膠西王所以爲無道亡乎王曰不知也曰臣聞膠西王有䛕臣矦得王所爲儗於桀紂也得以爲堯舜也王􅀃其謟䛕常與寑處唯得所言以至於是今大王親近羣小漸漬邪惡所習存亡之機不可不愼也臣請選郎通經有行義者與王起居坐則誦詩書立則習禮容宜有益王許之遂乃選郎中張安等十人侍王居數日王皆逐去安等王嘗見大白犬頸以下似人冠方山冠而無尾以問龔遂遂曰此天戒言在側者盡冠狗也去之則存不去則亡矣後又聞人聲曰熊視而見大熊左右莫見以問遂遂曰熊山野之獸而來入宫室王獨見之此天戒大王恐宫室將空危亡象也王仰天而嘆曰不祥何爲數來遂叩頭曰臣不敢隱忠數言危亡之戒大王不􅀃夫國之存亡豈在臣言哉願王内自揆度大王誦詩三百五篇人事浹王道僃王之所行中詩一篇何等也大王位爲諸矦王行汙於庶人以存難以亡易宜深察之後又血汙王坐席王問遂遂呌然號曰宫空不乆妖祥數至血者隂憂象也宜畏愼自省王終不攺節及徴書至夜漏未盡一刻以火發書其日中王發晡時至定陶行百三十五里侍從者馬死相望於道王吉奏書戒王曰臣聞髙宗諒闇三年不言今大王以喪事徴宜日夜哭泣悲哀而巳愼母有所發大將軍仁愛勇智忠信之德天下莫不聞事孝武皇帝二十餘年未嘗有過先帝棄羣臣屬以天下􅀉㓜􅀌焉大將軍抱持幼君襁緥之中布政施教海内晏然雖周公伊尹無以加也今帝崩無嗣大將軍惟思可以奉宗廟者攀援而立大王其仁厚豈有量哉臣願大王事之敬之政事壹聽之大王垂拱南面而巳願留意常以爲念王至濟陽求長鳴雞道買積竹杖過弘農使大奴善以衣車載女子至湖使者以讓相安樂安樂告龔遂遂入問王王曰無有遂曰即無有何愛一善以毁行義請收屬吏以湔洒大王即捽善屬衞士長行法王到覇上大鴻臚郊迎騶奉乗輿車王使壽成御郎中令遂參乗且至廣明東都門遂曰禮犇喪望見國都哭此長安東郭門也王曰我嗌痛不能哭至城門遂復言王曰城門與郭門等耳且至未央宫東闕遂曰昌邑帳在是闕外馳道北未至帳所有南北行道馬足未至數歩大王宜下車郷闕西面伏哭盡哀止王曰諾到哭如儀六月丙寅王受皇帝璽綬襲尊號尊皇后曰皇太后壬申葬孝昭皇帝于平陵昌邑王旣立淫戲無度昌邑官屬皆徴至長安往往超擢拜官相安樂遷長樂衞尉龔遂見安樂流涕謂曰王立爲天子日益驕溢諌之不復聽今哀痛未盡日與近臣飲食作樂􅃲虎豹召皮軒車九旒驅馳東西所爲誖道古制寛大臣有隱退今去不得陽狂恐知身死爲丗戮柰何君陛下故相宜極諌爭王夢青蠅之矢積西階東可五六石以屋版瓦覆之以問遂遂曰陛下之詩不云乎營營青蠅止于藩愷悌君子母信讒言陛下左側讒人衆多如是青蠅惡矣宜進先帝大臣子孫親近以爲左右如不忍昌邑故人信用讒䛕必有凶咎願詭禍爲福皆放逐之臣當先逐矣王不聽太僕丞河東張敞上書諌曰孝昭皇帝蚤崩無嗣大臣憂懼選賢聖氶宗廟東迎之日唯恐屬車之行遲今天子以盛年初即位天下莫不拭目傾耳觀化聽風國輔大臣未褒而昌邑小輩先遷此過之大者也王不聽大將軍光憂懣獨以問所親故吏大司農田延年延年曰將軍爲國柱石審此人不可何不建白太后更選賢而立之光曰今欲如是於古嘗有此不延年曰伊尹相殷廢太甲以安宗廟後丗稱其忠將軍􅀂能行此亦漢之伊尹也光乃引延年給事中隂與車􅀐將軍張安丗圖計王出遊光禄大夫魯國夏矦勝當乗輿前諌曰天乆隂而不雨臣下有謀上者陛下出欲何之王怒謂勝爲祅言縛以屬吏吏白霍光光不舉法光讓安丗以爲泄語安丗實不言乃召問勝勝對言在鴻範傳曰皇之不極厥罰常隂時則下人有伐上者􅁖察察言故云臣下有謀光安丗大驚以此益重經術士侍中傅嘉數進諌王亦縛嘉繫獄光安丗旣定議乃使田延年報丞相楊敞敞驚懼不知所言汗出洽背徒唯唯而巳延年起至更衣敞夫人遽從東廂謂敞曰此國大事今大將軍議巳定使九卿來報君矦君矦不疾應與大將軍同心猶與無决先事誅矣延年從更衣還敞夫人與延年參語許諾請奉大將軍教令癸巳光召丞相御史將軍列矦中二千石大夫愽士㑹議未央宫光曰昌邑王行昬亂恐危社稷如何群臣皆驚鄂失色莫敢發言但唯唯而已田延年前離席按劒曰先帝屬將軍以㓜孤􅀉將軍以天下以將軍忠賢能安劉氏也今羣下鼎沸社稷將傾且漢之傳謚常爲孝者以長有天下令宗廟血食也妒漢家絶祀將軍雖死何靣目見先帝於地下乎今日之議不得旋踵羣臣後應者臣請劒斬之光謝曰九卿責光是也天下匈匈不安光當受難於是議者皆叩頭曰萬姓之命在於將軍唯大將軍令光即與群臣俱見白太后具陳昌邑王不可以承宗廟狀皇太后乃車駕幸未央氶明殿詔諸禁門母内昌邑群臣王入朝太后還乗輦欲歸温室中黃門宦者各持門扇王入門閉昌邑群臣不得入王曰何爲大將軍跪曰有皇太后詔母内昌邑群臣王曰徐之何乃驚人如是光使盡驅出昌邑群臣置金馬門外車􅀐將軍安丗將羽林騎收縳二百餘人皆送廷尉詔獄令故昭帝侍中中臣侍守玉光勑左右謹宿衞卒有物故自裁令我􅀒天下有殺主名王尚未自知當廢謂左右我故群臣從官安得罪而大將軍盡繫之乎頃之有太后詔召王王聞召意恐乃曰我安得罪而召我哉太后􅀍珠襦盛服坐武帳中侍御數百人皆持兵期門武士陛㦸陳列殿下群臣以次上殿召昌邑王伏前聽詔光與羣臣連名奏王尚書令讀奏曰丞相臣敞等昩死言皇太后陛下孝昭皇帝早棄天下遣使徴昌邑王典喪服斬衰無悲哀之心廢禮誼居道上不素食使從官略女子載衣車内所居傳舎始至謁見立爲皇太子常私買雞豚以食受皇帝信璽行璽大行前就次發璽不封從官更持節引内昌邑從官騶宰官奴二百餘人常與居禁闥内敖戯爲書曰皇帝問侍中君卿使中御府令髙昌奉黃金千斤賜君卿取十妻大行在前殿發樂府樂器引内昌邑樂人擊皷歌吹作俳倡召内泰壹宗廟樂人悉奏衆樂駕法駕驅馳北宫桂宫弄彘􅃲虎召皇太后御小馬車使官奴􅀐乗遊戯掖庭中與孝昭皇帝宫人䝉等淫亂詔掖庭令敢泄言要斬太后曰止爲人臣子當悖亂如是邪王離席伏尚書令復讀曰取諸矦王列矦二千石綬及墨綬黄綬以并佩昌邑郎官者免奴發御府金錢刀劒玉器采繒賞賜所與遊戲者與從官官奴夜飲湛沔於酒獨夜設九賔温室延見姊夫昌邑關内矦祖宗廟祠未舉爲璽書使使者持節以三太牢祠昌邑哀王園廟稱嗣子皇帝受璽以來二十七日使者旁午持節詔諸官署徴發凡一千一百二十七事荒淫迷惑失帝王禮誼亂漢制度臣敞等數進諌不變更日以益甚恐危社稷天下不安臣敞等謹與博士議皆曰今陛下嗣孝昭皇帝後行淫辟不軌五辟之屬莫大不孝周襄王不能事母春秋曰天王出居于鄭由不孝出之絶之於天下也宗廟重於君陛下不可以承天序奉祖宗廟子萬姓當廢臣請有司以一太牢具告祠髙廟皇太后詔曰可光令王起拜受詔王曰聞天子有爭臣七人雖亡道不失天下光曰皇太后詔廢安得稱天子乃即持其手解脫其璽組奉上太后扶王下殿出金馬門羣臣隨送王西面拜曰愚戇不任漢事起就乗輿副車大將軍光送至昌邑邸光謝曰王行自絶於天臣寧􅀒王不敢負社稷願王自愛臣長不復左右光涕泣而去羣臣奏言古者廢放之人屏於逺方不及以政請徙王賀漢中房陵縣太后詔歸賀昌邑賜湯沐邑二千户故王家財物皆與賀及哀王女四人各賜湯沐邑千户國除爲山陽郡昌邑羣臣坐在國時不舉奏王罪過令漢朝不聞知又不能輔道䧟王大惡皆下獄誅殺二百餘人唯中尉吉郎中令遂以忠直數諌正得减死髠爲城旦師王式繫獄當死治事使者責問曰師何以無諌書式對曰臣以詩三百五篇朝夕授王至於忠臣孝子之篇未嘗不爲王反復誦之也至於危亡失道之君未嘗不流涕爲王深陳之也臣以三百五篇諫是以無諌書使者以聞亦得減死論霍光以羣臣奏事東宫太后省政宜知經術白令夏矦勝用尚書授太后遷勝長信少府賜爵􅀜内矦初衞太子納魯國史良娣生子進號史皇孫皇孫納涿郡王夫人生子病巳號皇曾孫皇曾孫生數月遭巫蠱事太子三男一女及諸妻妾皆遇害獨皇曾孫在亦坐收繫郡邸獄故廷尉監魯國丙吉受詔治巫蠱獄吉心知太子無事實重哀皇曾孫無辜擇謹厚女徒渭城胡組淮陽郭徴卿令乳養曾孫置閒燥處吉日再省視巫蠱事連嵗不決武帝疾徃來長楊五柞宫望氣者言長安獄中有天子氣於是武帝遣使者分條中都官詔獄繫者無輕重一切皆殺之内謁者令郭穰夜到郡邸獄吉閉門拒使者不納曰皇曾孫在他人無辜死者猶不可況親曾孫乎相守至天明不得入穰還以聞因劾奏吉武帝亦寤曰天使之也因赦天下郡邸獄繫者獨頼吉得生旣而吉謂守丞誰如皇孫不當在官使誰如移書京兆尹遣與胡組俱送京兆尹不受復還及組日滿當去皇孫思慕吉以私錢雇組令留與郭徴卿並養數月乃遣組去後少内嗇夫白吉曰食皇孫無詔令時吉得食米肉月月以給皇曾孫曾孫病幾不全者數焉吉數敕保養乳母加致醫藥視遇甚有恩惠吉聞史良娣有母貞君及兄恭乃載皇曾孫以付之貞君年老見孫􅀌甚哀之自養視焉後有詔掖庭養視上屬籍宗正時掖庭令張賀嘗事戾太子思顧舊恩哀曾孫奉養甚謹以私錢供給教書旣壯賀欲以女孫妻之是時昭帝始冠長八尺二寸賀弟安丗爲右將軍輔政聞賀稱譽皇曾孫欲妻以女怒曰曾孫乃衞太子後也幸得以庶人衣食縣官足矣勿復言予女事於是賀止時暴室嗇夫許廣漢有女賀乃置酒請廣漢酒酣爲言曾孫體近下乃關内矦可妻也廣漢許諾明日嫗聞之怒廣漢重令人爲介遂與曾孫賀以家財聘之曾孫因依􅀝廣漢兄弟及祖母家史氏受詩於東海澓中翁髙材好學然亦喜游俠􅃲雞走馬以是具知閭里姦邪吏治得失數上下諸陵周徧三輔嘗困於蓮勺鹵中尤樂杜鄠之間率常在下杜時㑹朝請舎長安尚冠里及昌邑王廢霍光與張安丗諸大臣議所立未定丙吉奏記光曰將軍事孝武皇帝受襁褓之屬任天下之􅀉孝昭皇帝早崩亡嗣海内憂懼欲亟聞嗣主發喪之日以大誼立後所立非其人復以大誼廢之天下莫不服焉方今社稷宗廟羣生之命在將軍之壹舉竊伏聽於衆庶察其所言諸矦宗室在列位者未有所聞於民間也而遺詔所養武帝曾孫名病已在掖庭外家者吉前使居郡邸時見其㓜少至今十八九矣通經術有美材行安而節和願將軍詳大義參以􅆱􅀛豈宜襃顯先使入侍令天下昭然知之然後決定大䇿天下幸甚杜延年亦知曾孫德美勸光安丗立焉秋七月光坐庭中㑹丞相以下議定所立遂復與丞相敞等上奏曰孝武皇帝曾孫病已年十八師受詩論語孝經躬行節儉慈仁愛人可以嗣孝昭皇帝後奉承祖宗廟子萬姓臣昧死以聞皇太后詔曰可光遣宗正德至曾孫家尚冠里洗沐賜御衣太僕以軨獵車迎曾孫就齋宗正府庚申入未央宫見皇太后封爲陽武矦已而羣臣奏上璽綬即皇帝位謁髙廟尊皇太后爲太皇太后侍御史嚴延年劾奏大將軍光擅廢立主無人臣禮不道奏雖寑然朝廷肅然敬憚之八月己巳安平敬矦楊敞薨九月大赦天下戊寅蔡義爲丞相初許廣漢女適皇曾孫一嵗生子奭數月曾孫立爲帝許氏爲倢伃是時霍將軍有小女與皇太后親公卿議更立皇后皆心擬霍將軍女亦未有言上乃詔求微時故劒大臣知指白立許倢伃爲皇后十一月壬子立皇后許氏霍光以后父廣漢刑人不宜君國嵗餘乃封爲昌成君太皇太后歸長樂宫長樂宫􅀄置屯衞
