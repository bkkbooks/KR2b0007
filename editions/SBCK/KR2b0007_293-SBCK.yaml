front:
  text: 資治通鑑卷第二百九十三
  hash: sha256:96e17a07462a2aa1ddfd8c1be98d0beb1d1a5d94667e642d199975862c54ac30
body:
  text: 臣司馬光奉勑編集後周紀四圉大荒落凡一年有竒起柔兆執徐三月盡強丗宗睿武孝武皇帝中顯徳三年三月甲午朔上行視水寨至淝橋自取一石馬上持之至寨以供礮從官過橋者人齎一石太祖皇帝乗皮船入夀春壕中城上發連弩射之矢大如屋椽牙將館陶張瓊遽以身蔽之矢中瓊髀死而復蘇鏃着骨不可出瓊飲酒一大巵令人破骨出之流血數升神色自若唐主復以右僕射孫晟為司空遣與禮部尚書王崇質奉表入見稱自天祐以來海内分崩或跨據一方或遷革異代臣紹襲先業奄有江表顧以瞻烏未定附鳳何從今天命有歸聲教逺被願比兩浙湖南仰奉正朔謹守土疆乞收薄伐之威赦其後服之罪首於下國俾作外臣則柔逺之徳云誰不服又獻金千兩銀十萬兩羅綺二千匹晟謂馮延己曰此行當在左相晟若辭之則負先帝既行知不免中夜歎息謂崇質曰君家百口宜自為謀吾思之熟矣終不負永陵一抔土餘無所知􅀯漢甘泉宫使林延遇隂險多計數南漢主􅀝信之誅滅諸弟皆延遇之謀也乙未卒國人相賀延遇病甚薦内給事龔澄樞自代􅀯漢主即日擢澄樞知承宣院及内侍省澄樞番禺人也光舒黄招安廵檢使行光州刺史何超以安隨申蔡四州兵數萬攻光州丙申超奏唐光州刺史張紹弃城走都監張承翰以城降丁酉行舒州刺史郭令圖拔舒州唐蘄州將李福殺其知州王承㑺舉州來降遣六宅使齊藏珍攻黄州彰武留後李彦頵性貪虐部民與羌胡作亂攻之上召彦頵還朝秦鳳之平也上赦所俘蜀兵以􅀠軍籍從征淮􅀯復亡降于唐癸卯唐主表獻百五十人上悉命斬之舒州人逐郭令圖鐡􅀐都指揮使洛陽王審􅄾選輕􅀐夜襲舒州復取之令圖乃得歸馬希崇及王延政之子繼沂皆在揚州招撫存之丙午孫晟等至上所庚戌上遣中使以孫晟詣夀春城下示劉仁贍且招諭之仁贍見晟戎服拜於城上晟謂仁贍曰君受國厚恩不可開門納宼上聞之甚怒晟曰臣為唐宰相豈可教節度使外叛邪上乃釋之唐主使李德明孫晟言於上請去帝號割夀濠泗楚光海六州之地仍歳輸金帛百萬以求罷兵上以淮􅀯之地已半為周有諸將捷奏日至欲盡得江北之地不許德明見周兵日進奏稱唐主不知陛下兵力如此之盛願寛臣五日之誅得歸白唐主盡獻江北之地上乃許之晟因奏遣王崇質與德明俱歸上遣供奉官安􅀪道送德明等歸金陵賜唐主詔書其略曰但存帝號何爽歳寒儻堅事大之心終不廹人于險又曰俟諸郡之悉來即大軍之立罷言盡於此更不煩云茍曰未然請從茲絶又賜其將相書使熟議而來唐主復上表謝李徳明盛稱上威徳及甲兵之彊勸唐主割江北之地唐主不悅宋齊丘以割地為無益德明輕佻言多過實國人亦不之信樞密使陳覺副使李徴古素惡德明及孫晟使王崇質異其言因譖德明於唐主曰德明賣國求利唐主大怒斬德明於市呉程攻常州破其外郭執唐常州團練使趙仁澤送于錢塘仁澤見呉越王􅀪俶不拜責以負約􅀪俶怒抉其口至耳元德昭憐其忠為傅良藥得不死唐主以呉越兵在常州恐其侵逼潤州以宣􅃳大都督燕王弘兾年少恐其不習兵徴還金陵部將趙鐸言於弘兾曰大王元帥衆心所恃逆自退歸所部必亂弘兾然之辭不就徴部分諸將為戰守之備龍武都虞􅃸柴克宏再用之子也沈黙好施不事家産雖典宿衞日與賔客博奕飲酒未甞言兵時人以為非將帥才至是有言克宏乆不遷官者唐主以為撫州刺史克宏請效死行陳其母亦表稱克宏有父風可為將茍不勝任分甘孥戮唐主乃以克宏為右武衛將軍使將兵㑹􅀽州刺史陸孟俊救常州時唐精兵悉在江北克宏所將數千人皆羸老樞密使李徴古復以鎧仗之朽蠧者給之克宏訴於徴古徴古慢罵之衆皆憤恚克宏怡然至潤州徴古遣使召還以神衛統軍朱匡業代之燕王􅀪兾謂克宏君但前戰吾當論奏乃表克宏才略可以成功常州危在旦莫不宜中易主將克宏引兵徑􅃐常州徴古復遣使召之克宏曰吾計日破賊汝來召吾必姧人也命斬之使者曰受李樞密命而來克宏曰李樞密來吾亦斬之初鮑修讓羅晟在福州與呉程有隙至是程抑挫之二人皆怨先是唐主遣中書舎人喬匡舜使於呉越壬子柴克宏至常州蒙其船以幕匿甲士於其中聲言迎匡舜呉越邏者以告程曰兵交使在其間不可妄以為疑唐兵登岸徑薄呉越營羅晟不力戰縱之使􅃐程悵程僅以身免克宏大破呉越兵斬首萬級朱匡業至行營克宏事之甚謹呉程至錢塘呉越王弘俶悉奪其官甲寅蜀主以捧聖控鶴都指揮使李廷珪為左右衛聖諸軍馬歩都指揮使仍分衛聖匡聖歩􅀐為左右十軍以武定節度使吕彦􅄾等為使廷珪緫之如趙廷隱之任初柴克宏為宣州廵檢使始至城塹不修器械皆闕吏云自田頵王茂章李遇相繼叛後人無敢治之者克宏曰時移事異安有此理悉繕完之由是路彦銖攻之不克聞呉程敗乙卯引歸唐主以克宏為奉化節度使克宏復請將兵救夀州未至而卒河陽節度使白重賛以天子南征慮北漢乗虚入宼繕完守備且請兵於西京西京留守王晏初不之與又慮事出非常乃自將兵赴之重賛以晏不奉詔而來拒不納遣人謂之曰令公昔在陜服巳立大功河陽小城不煩枉駕晏慙怍而還孟洛之民數日驚擾唐主命諸道兵馬元帥齊王景達將兵拒周以陳覺爲監軍使前武安節度使邊鎬為應援都軍使中書舎人韓熙載上書曰信莫信於親王重莫重於元帥安用監軍使為唐主不從遣鴻臚卿潘承祐詣泉建召募驍勇承祐薦前永安節度使許文稹靜江指揮使陳德誠建州人鄭彦華林仁肇唐主以文稹爲西面行營應援使彦華仁肈皆為將仁肈仁翰之弟也夏四月甲子以侍衛親軍都指揮使歸徳節度使李重進為廬夀等州招討使以武寜節度使武行德為濠州城下都部署唐右衛將軍陸孟俊自常州將兵萬餘人􅃐泰州周兵遁去孟俊復取之遣陳德誠戍泰州孟俊進攻掦州屯于蜀岡韓令坤弃掦州走帝遣張永德將兵救之令坤復入掦州帝又遣太祖皇帝將兵屯六合太祖皇帝令曰掦州兵有過六合者折其足令坤始有固守之志帝自至夀春以來命諸軍晝夜攻城乆不克㑹大雨營中水深數尺攻具及士卒失亡頗多糧運不繼李德明失期不至乃議旋師或勸帝東幸濠州聲言夀州已破從之己巳帝自夀春循淮而東乙亥至濠州韓令坤敗唐兵於城東擒陸孟俊初孟俊之廢馬希蕚立希崇也滅故舒州刺史楊昭惲之族而取其財楊氏有女美獻於希崇令坤入掦州希崇以楊氏遺令坤令坤嬖之既獲孟俊將械送帝所楊氏在簾下忽撫膺慟哭令坤驚問之對曰孟俊昔在潭州殺妾家二百口今見之請復其􅁈令坤乃殺之唐齊王景達將兵二萬自􅀲歩濟江距六合二十餘里設柵不進諸將欲擊之太祖皇帝曰彼設柵自固懼我也今吾衆不滿二千若往擊之則彼見吾衆寡矣不如俟其來而擊之破之必矣居數日唐出兵􅃐六合太祖皇帝奮擊大破之殺獲近五千人餘衆尚萬餘走度江爭舟溺死者甚衆於是唐之精卒盡矣是戰也士卒有不致力者太祖皇帝陽為督戰以劔斫其皮笠明日徧閱其笠有劒跡者數十人皆斬之由是部兵莫敢不盡死先是唐主聞掦州失守命四旁發兵取之己卯韓令坤奏敗楚州兵萬餘人於灣頭堰獲漣州刺史秦進崇張永德奏敗泗州兵萬餘人於曲溪堰丙戍以宣徽南院使向訓為淮南節度使兼􅆓江招討使渦口奏新作浮梁成丁亥帝自濠州如渦口帝銳於進取欲自至掦州范質等以兵疲食少泣諫而止帝甞怒翰林學士竇儀欲殺之范質入救之帝望見知其意即起避之質趨前伏地叩頭諫曰儀罪不至死臣為宰相致陛下枉殺近臣罪皆在臣繼之以泣帝意解乃釋之北漢葬神武帝於交城北山廟號丗祖五月壬辰朔以渦口為鎭淮軍丙申唐永安節度使陳誨敗福州兵於南臺江俘斬千餘級唐主更命永安曰忠義軍誨德誠之父也戊戍帝留侍衛親軍都指揮使李重進等圍夀州自渦口北歸乙卯至大梁六月壬申赦淮南諸州繫囚除李氏非理賦役事有不便於民者委長吏以聞侍衛歩軍都指揮使彰信節度使李繼勲營於夀州城南唐劉仁贍伺繼勲無備出兵擊之殺士卒數百人焚其攻具唐駕部員外郎朱元因奏事論用兵方略唐主以為能命將兵復江北諸州秋七月辛卯朔以周行逢為武平節度使制置武安靜江等軍事行逢既兼緫湖湘乃矯前人之弊留心民事悉除馬氏横賦貪吏猾民為民害者皆去之擇亷平吏為刺史縣令朗州民夷雜居劉言王逵舊將卒多驕横行逢壹以法治之無所寛假衆怨懟且懼有大將與其黨十餘人謀作亂行逢知之大㑹諸將於座中擒之數曰吾惡衣糲食充實府庫正為汝曹何負而反今日之㑹與汝訣也立撾殺之座上股栗行逢曰諸君無罪皆宜自安樂飲而罷行逢多計數善發隱伏將卒有謀亂及叛亡者行逢必先覺擒殺之所部凛然然性猜忍常散遣人密詗諸州事其之邵州者無事可復命但言刺史劉光委多宴飲行逢曰光委數聚飲欲謀我邪即召還殺之親衛指揮使衡州刺史張文表恐獲罪求歸治所行逢許之文表歳時饋獻甚厚及謹事左右由是得免行逢妻鄖國夫人鄧氏陋而剛決善治生甞諌行逢用法太嚴人無親附者行逢怒曰汝婦人何知鄧氏不悅因請之村墅視田園遂不復歸府舎行逢屢遣人迎之不至一旦自帥僮僕來輸稅行逢就見之曰吾為節度使夫人何自苦如此鄧氏曰稅官物也公為節度使不先輸稅何以率下且獨不記為里正代人輸稅以免楚撻時邪行逢欲與之歸不可曰公誅殺太過常恐一旦有變村墅易為逃匿耳行逢慙怒其僚屬曰夫人言直公宜納之行逢壻唐德求􅀘吏行逢曰汝才不堪為吏吾今私汝則可矣汝居官無狀吾不敢以法貸汝則親戚之恩絶矣與之耕牛農具而遣之行逢少時常坐事黥􅀠辰州銅阬或說行逢公靣有文恐為朝廷使者所嗤請以藥滅之行逢曰吾聞漢有黥布不害為英雄吾何恥焉自劉言王逵以來屢舉兵將吏積功及所羈縻蠻夷檢校官至三公者以千數前天策府學士徐仲雅自馬希廣之廢杜門不仕行逢慕之署節度判官仲雅曰行逢昔趨事我柰何為之幕吏辭疾不至行逢迫脅固召之面授文牒終辭不取行逢怒放之邵州既而召還㑹行逢生日諸道各遣使致賀行逢有矜色謂仲雅曰自吾兼鎭三府四鄰亦畏我乎仲雅曰侍中境内彌天太保徧地司空四隣那得不畏行逢復放之邵州竟不能屈有僧仁及為行逢所信任軍府事皆預之亦加檢校司空娶數妻出入導從如王公辛亥宣懿皇后符氏殂唐將朱元取舒州刺史郭令圖弃城走李平取蘄州唐主以元為舒州團練使平為蘄州刺史元又取和州初唐人以茶鹽强民而徴其粟帛謂之博徴又興營田於淮南民甚苦之及周師至爭奉牛酒迎勞而將帥不之恤専事俘掠視民如土芥民皆失望相聚山澤立堡壁自固操農器為兵積紙為甲時人謂之白甲軍周兵討之屢為所敗先所得唐諸州多復為唐有唐之援兵營於紫金山與夀州城中烽火相應淮南節度使向訓奏請以廣陵之兵併力攻夀春俟克城更圖進取詔許之訓封府庫以授揚州主者命揚州牙將分部按行城中秋毫不犯揚州民感悅軍還或負糗糒以送之滁州守將亦弃城去皆引兵趣夀春唐諸將請據險以邀周師宋齊丘曰如此則怨益深不如緃之以德於敵則兵易解也乃命諸將各自守毋得擅出擊周兵由是夀春之圍益急齊王景逹軍于濠州遥為夀州聲援軍政皆出於陳覺景逹署紙尾而已擁兵五萬無決戰意將吏畏覺無敢言者八月戊辰端明殿學士王朴司天少監王處訥撰顯德欽天曆上之詔自來歳行之殿前都指揮使義成節度使張永德屯下蔡唐將林仁肇等以水陸軍援夀春永德與之戰仁肈以船實薪芻因風縱火欲焚下蔡浮梁俄而風回唐兵敗退永德為鐡綆千餘尺距浮梁十餘歩横絶淮流繫以巨木由是唐兵不能近九月丙午以端明殿學士左散􅀐常侍權知開封府事王朴為户部侍郎充樞密副使冬十月癸酉李重進奏唐人宼盛唐鐡􅀐都指揮使王彦昇等擊破之斬首三千餘級彦昇蜀人也丙子上謂侍臣近朝徴歛榖帛多不俟收穫紡績之畢乃詔三司自今夏稅以六月秋稅以十月起徴民閒便之山南東道節度使守太尉兼中書令安審􅄾鎭襄州十餘年至是入朝除守太師遣還鎭既行上問宰相卿曹送之乎對曰送至城􅀯審􅄾深感聖恩上曰近朝多不以誠信待諸矦諸矦雖有欲効忠節者其道無由王者但能母失其信何患諸矦不歸心哉壬午張永德奏敗唐兵於下蔡是時唐復以水軍攻永德永德夜令善游者沒其船下縻以鐵鎻縱兵擊之船不得進退溺死者甚衆永德解金帶以賞善游者甲申以太祖皇帝為定國節度使兼殿前都指揮使太祖皇帝表渭州軍事判官趙普為節度推官張永德與李重進不相悅永德密表重進有二心帝不之信時二將各擁重兵衆心憂恐重進一日單􅀐詣永德營從容宴飲謂永德曰吾與公幸以肺腑俱為將帥奚相疑若此之深邪永德意乃解衆心亦安唐主聞之以蠟書遺重進誘以厚利其書皆謗毁及反間之語重進奏之初唐使者孫晟鍾謨從帝至大梁帝待之甚厚每朝㑹班於中書省官之後時召見飲以醇酒問以唐事晟但言唐主畏陛下神武事陛下無二心及得唐蠟書帝大怒召晟責以所對不實晟正色抗辭請死而已問以唐虚實黙不對十一月乙巳帝命都承旨曹翰送晟於右軍廵院更以帝意問之翰與之飲酒數行從容問之晟終不言翰乃謂曰有敇賜相公死晟神色怡然索靴笏整衣冠􅀯向拜曰臣謹以死報國乃就刑并從者百餘人皆殺之貶鍾謨耀州司馬既而帝憐晟忠節悔殺之召謨拜衛尉少卿帝召華山隱士眞源陳摶問以飛升黄白之術對曰陛下為天子當以治天下為務安用此為戊申遣還山詔州縣長吏常存問之十二月壬申以張永德為殿前都㸃檢分命中使發陳蔡宋亳潁兖曹單等州丁夫數萬城下蔡是嵗唐主詔淮􅀯營田害民尤甚者罷之遣兵部郎中陳處堯持重幣浮海如契丹乞兵契丹不能為之出兵而留處堯不遣處堯剛直有口辯乆之忿懟數面責契丹主契丹主亦不之罪也蜀陵榮州獠叛弓箭庫使趙季文討平之呉越王􅀪俶括境内民兵勞擾頗多判明州錢􅀪億手䟽切諌罷之四年春正月己丑朔北漢大赦攺元天㑹以翰林學士衛融為中書侍郎同平章事内客省使叚恒為樞密使宰相屢請立皇子為王上曰諸子皆幼且功臣之子皆未加恩而獨先朕子能自安乎周兵圍夀春連年未下城中食盡齊王景逹自濠州遣應援使永安節度使許文稹都軍使邊鎬北面招討使朱元將兵數萬泝淮救之軍於紫金山列十餘寨如連珠與城中烽火晨夕相應又築甬道抵夀春欲運糧以饋之綿亘數十里將及夀春李重進邀擊大破之死者五千人奪其二寨丁未重進以聞戊申詔以來月幸淮上劉仁贍請以邊鎬守城自帥衆決戰齊王景逹不許仁贍憤邑成疾其幼子崇諌夜泛舟度淮北為小校所執仁贍命􅆎斬之左右莫敢救監軍使周廷構哭於中門以救之仁贍不許廷構復使求救於夫人夫人曰妾於崇諌非不愛也然軍法不可私名節不可虧若貸之則劉氏為不忠之門妾與公何面目見將士乎􅃐命斬之然後成喪將士皆感泣議者以唐援兵尚彊多請罷兵帝疑之李榖寢疾在第二月丙寅帝使范質王溥就與之謀榖上䟽以為夀春危困破在旦夕若鑾駕親征則將士爭奮援兵震恐城中知亡必可下矣上悅庚午詔有司更造祭器祭玉等命國子博士聶崇義討論制度為之圖甲戍以王朴權東京留守兼判開封府事以三司使張美為大内都廵檢以侍衛都虞􅃸韓通為京城内外都廵檢乙亥帝發大梁先是周與唐戰唐水軍銳敏周人無以敵之帝每以為恨返自夀春於大梁城西汴水側造戰艦數百艘命唐降卒教北人水戰數月之後縱横出没殆勝唐兵至是命右驍衛大將軍王環將水軍數千自閔河􅆓潁入淮唐人見之大驚乙酉帝至下蔡三月己丑夜帝度淮抵夀春城下庚寅旦躬擐甲胄軍於紫金山南命太祖皇帝擊唐先鋒寨及山北一寨皆破之斬獲三千餘級斷其甬道由是唐兵首尾不能相救至暮帝分兵守諸寨還下蔡唐朱元恃功頗違元帥節度陳覺與元有隙屢表元反覆不可將兵唐主以武昌節度使楊守忠代之守忠至濠州覺以齊王景達之命召元詣濠州計事將奪其兵元聞之憤怒欲自殺門下客宋垍說元曰大丈夫何往不富貴何必為妻子死乎辛卯夜元與先鋒壕寨使朱仁裕等舉寨萬餘人降禆將時厚卿不從元殺之帝慮其餘衆㳂流東潰遽命虎捷左廂都指揮使趙晁將水軍數千㳂淮而下壬辰旦帝軍于趙歩諸將擊唐紫金山寨大破之殺獲萬餘人擒許文稹邊鎬楊守忠餘衆果㳂淮東走帝自趙歩將􅀐數百循北岸追之諸將以步􅀐循南岸追之水軍自中流而下唐兵戰溺死及降者殆四萬人獲船艦糧仗以十萬數晡時帝馳至荆山洪距趙歩二百餘里是夜宿鎭淮軍癸酉從官始至劉仁贍聞援兵敗扼吭歎息甲午發近縣丁夫數千城鎭淮軍為二城夾淮水徙下蔡浮梁於其間扼濠夀應援之路㑹淮水漲唐濠州都監彭城郭廷謂以水軍泝淮欲掩不備焚浮梁右龍武統軍趙匡賛覘知之伏兵邀擊破之唐齊王景逹及陳覺皆自濠州奔歸金陵惟靜江指揮使陳徳誠全軍而還戊戍以淮南節度使向訓為武寕節度使淮南道行營都監將兵戍鎭淮軍己亥上自鎭淮軍復如下蔡庚子賜劉仁贍詔使自擇禍福唐主議自督諸將拒周中書舎人喬匡舜上䟽切諌唐主以為沮衆流撫州唐主問神衛統軍朱匡業劉存忠以守禦方略匡業誦羅隱詩曰時來天地皆同力運去英雄不自由存忠以匡業言為然唐主怒貶匡業撫州副使流存忠於饒州既而竟不敢自岀甲辰帝耀兵于夀春城北唐清淮節度使兼侍中劉仁贍病甚不知人丙午監軍使周廷構營田副使孫羽等作仁贍表遣使奉之來降丁未帝賜仁贍詔遣閤門使萬年張保續入城宣諭仁贍子崇讓復出謝罪戊申帝大陳甲兵受降於夀春城北廷構等舁仁贍出城仁贍卧不能起帝慰勞賜賚復令入城養疾庚戍徙夀州治下蔡赦州境死罪以下州民受唐文書聚山林者並召令復業勿問罪有甞爲其殺傷者毋得讎訟曏日政令有不便於民者令本州條奏辛亥劉仁贍爲天平節度使兼中書令制辭略曰盡忠所事抗節無虧前代名臣幾人堪比朕之伐叛得爾爲多是日卒追賜爵彭城郡王唐主聞之亦贈太師帝復以清淮軍爲忠正軍以旌仁贍之節以右羽林統軍楊信爲忠正節度使同平章事前許州司馬韓倫侍衛馬軍都指揮使令坤之父也令坤領鎭安節度使倫居于陳州干預政事貪汚不法爲公私患爲人所訟令坤屢爲之泣請癸丑詔免倫死流沙門島倫後得赦還居洛陽與光禄卿致仕柴守禮及當時將相王􅄎王晏王彦超之父遊處恃勢恣横洛陽人畏之謂之十阿父帝既為太祖嗣人無敢言守禮子者但以元舅處之優其俸給未甞至大梁甞以小忿殺人有司不敢詰帝知而不問詔開夀州倉振飢民丙辰帝北還夏四月己巳至大梁詔修永福殿命宦官孫延希董其役丁丑帝至其所見役徒有削柹為匕瓦中噉飯者大怒斬延希於市帝之克秦鳳也以蜀兵數千人為懷恩軍乙亥遣懷恩指揮使蕭知逺等將士八百餘人西還壬午李榖扶疾入見帝命不拜坐於御坐之側榖懇辭禄位不許甲申分江南降卒為六軍三十指揮號懷德軍乙酉詔䟽汴水北入五丈河自是齊魯舟楫皆逹於大梁五月丁酉以太祖皇帝領義成節度使詔以律令文古難知格敇煩雜不壹命侍御史知雜事張湜等訓釋删定為刑統唐郭廷謂將水軍㫁渦口浮梁又襲敗武寕節度使武行德于定逺行德僅以身免唐主以廷謂為滁州團練使充上淮水陸應援使蜀人多言左右衛聖馬歩都指揮使保寕節度使同平章事李廷珪為將敗覆不應復典兵廷珪亦自請罷去六月乙丑蜀主加廷珪檢校太尉罷軍職李太后以典兵者多非其人謂蜀主曰吾昔見莊宗跨河與梁戰及先帝在太原平二蜀諸將非有大功無得典兵故士卒畏服今王昭逺出於廝養伊審徴韓保貞趙崇韜皆膏粱乳臭子素不習兵徒以舊恩寘於人上平時誰敢言者一旦疆場有事安能禦大敵乎以吾觀之惟髙彦儔太原舊人終不負汝自餘無足任者蜀主不能從丁丑以前華州刺史王祚為潁州團練使祚溥之父也溥為宰相祚有賔客溥常朝服侍立客坐不安席祚曰㹠犬不足為起秋七月丁亥上治定逺軍及夀春城南之敗以武寕節度使兼中書令武行德為左衛上將軍河陽節度使李繼勲為右衛大將軍北漢主初立七廟司空兼門下侍郎同平章事李榖臥疾二年凡九表辭位八月乙亥罷守本官令每月肩輿一詣便殿議政事以樞密副使户部侍郎王朴檢校太保充樞密使懷恩軍至成都蜀主遣梓州别駕胡立等八十人東還且致書為謝請通好癸未立等至大梁帝以蜀主抗禮不之荅蜀主聞之怒曰朕為天子郊祀天地時爾猶作賊何敢如是九月中書舎人竇儼上䟽請令有司討論古今禮儀作大周通禮考正鍾律作大周正樂又以為政之本莫大擇人擇人之重莫先宰相自有唐之末輕用名器始為輔弼即兼三公僕射之官故其未得之也則以趨競為心既得之也則以容黙為事但思解密勿之務守崇重之官逍遥林亭保安宗族乞令即日宰相於􅀯宫三品兩省給舎以上各舉所知若陛下素知其賢自可登庸若其未也且令以本官權知政事朞歳之間察其職業若果能堪稱其官已髙則除平章事未髙則稍更遷官權知如故若有不稱則罷其政事責其舉者又班行之中有員無職者太半乞量其才器授以外任試之於事還則以舊官登叙考其治狀能者進之否者黜之又請令盜賊自相糾告以其所告貲産之半賞之或親戚為之首則論其徒侣而赦其所首者如此則盗不能聚矣又新鄭鄉村團為義營各立將佐一户為盜累其一村一户被盜罪其一將每有盜發則鳴鼓舉火丁壯雲集盜少民多無能脫者由是鄰縣充斥而一境獨清請令它縣皆効之亦止盜之一術也又累朝已來屢下詔書聽民多種廣耕止輸舊稅及其既種則有司履􅅿而増之故民皆疑懼而田不加闢夫為政之先莫如敦信信茍著矣則田無不廣田廣則榖多榖多則藏之民猶藏之官也又言陛下􅀯征江淮一舉而得八州再駕而平夀春威靈所加前無彊敵今以衆擊寡以治伐亂勢無不克但行之貴速則彼民免俘馘之災此民息轉輸之困矣帝覽而善之儼儀之弟也冬十月戊午設賢良方正直言極諌經學優深可為師法詳閑吏理逹於教化等科癸亥北漢麟州刺史楊重訓舉城降以為麟州防禦使己巳以王朴東京留守聽以便宜從事以三司使張美充大内都㸃檢壬申帝發大梁十一月丙戌至鎭淮軍是夜五鼔濟淮丁亥至濠州城西濠州東北十八里有灘唐人柵於其上環水自固謂周兵必不能涉戊子帝自攻之命内殿直康保裔帥甲士數百乗槖駝渉水太祖皇帝帥􅀐兵繼之遂抜之李重進破濠州􅀯關城癸巳帝自攻濠州王審􅄾抜其水寨唐人屯戰船數百於城北植巨木於淮水以限周兵帝命水軍攻之抜其木焚戰船七十餘艘斬首二千餘級又攻抜其羊馬城城中震恐丙申夜唐濠州團練使郭廷謂上表言臣家在江􅀯今若遽降恐為唐所種族請先遣使詣金陵禀命然後出降帝許之辛丑帝聞唐有戰船數百艘在泗水東欲救濠州自將兵夜發水陸擊之癸卯大破唐兵於洞口斬首五千餘級降卒二千餘人因鼔行而東所至皆下乙巳至泗州城下太祖皇帝先攻其南因焚城門破水寨及月城帝居于月城樓督將士攻城北漢主自即位以來方安集境内未遑外略是月契丹遣其大同節度使侍中崔勲將兵來㑹北漢欲同入宼北漢主遣其忠武節度使同平章事李存瓌將兵㑹之􅀯侵潞州至其城下而還北漢主知契丹不足恃而不敢遽與之絶贈送勲甚厚十二月乙卯唐泗州守將范再遇舉城降以再遇為宿州團練使上自至泗州城下禁軍中芻蕘者毋得犯民田民皆感悅爭獻芻粟既克泗州無一卒敢擅入城者帝聞唐戰船數百艘泊洞口遣􅀐詗之唐兵退保清口戊午旦上自將親軍自淮北進命太祖皇帝將歩􅀐自淮南進諸將以水軍自中流進共追唐兵時淮濵乆無行人葭葦如織多泥淖溝塹士卒乗勝氣茇渉爭進皆忘其勞庚申追及唐兵且戰且行金鼔聲聞數十里辛酉至楚州西北大破之唐兵有㳂淮東下者帝自追之太祖皇帝爲前鋒行六十里擒其保義節度使濠泗楚海都應援使陳承昭以歸所獲戰船燒沈之餘得三百餘艘士卒殺溺之餘得七千餘人唐之戰船在淮上者於是盡矣郭廷謂使者自金陵還知唐不能救命録事參軍鄱陽李延鄒草降表延鄒責以忠義廷謂以兵臨之延鄒擲筆曰大丈夫終不負國為叛臣作降表廷謂斬之舉濠州降得兵萬人糧數萬斛唐主賞李延鄒之子以官壬戌帝濟淮至楚州營于城西北乙丑唐雄武軍使知漣水縣事崔萬迪降丙寅以郭廷謂為亳州防禦使戊辰帝攻楚州克其月城庚午郭廷謂見於行宫帝曰朕南征以來江南諸將敗亡相繼獨卿能斷渦口浮梁破定逺寨所以報國足矣濠州小城使李璟自守能守之乎使將濠州兵攻天長帝遣鐡􅀐左廂都指揮使武守􅄾將􅀐數百􅃐揚州至髙郵唐人悉焚揚州官府民居驅其人南渡江後數日周兵至城中餘癃病十餘人而已癸酉守􅄾以聞帝聞泰州無備遣兵襲之丁丑抜泰州南漢中書侍郎同平章事盧膺卒南漢主聞唐屢敗憂形於色遣使入貢于周為湖南所閉乃治戰艦修武備既而縱酒酣飲曰吾身得免幸矣何暇慮後丗哉唐使者陳處堯在契丹白契丹主請遊太原北漢主厚禮之留數日北還竟卒於契丹資治通鑑卷第二百九十三
