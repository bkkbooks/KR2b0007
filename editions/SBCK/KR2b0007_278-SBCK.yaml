body:
  text: 臣司馬光奉勑編集後唐紀七敦牂閏正月凡一年有竒起􅀇黓執徐七月盡閼逢明宗聖德和武欽孝皇帝下長興三年秋七月朔方奏夏州党項入寇擊敗之追至賀蘭山己丑加鎮海鎮東節度使錢元瓘守中書令庚寅李存瓌至成都孟知祥拜泣受詔武安靜江節度使馬希聲以湖南比年大旱命閉南嶽及境内諸神祠門竟不雨辛卯希聲卒六軍使袁詮潘約等迎鎮南節度使希範於朗州而立之乙未孟知祥遣李存瓌還上表謝罪且告福慶公主之喪自是復稱藩然益驕倨矣庚子以西京留守同平章事李從珂為鳳翔節度使廢武興軍復以鳳興文三州􅀠山南西道丁未以門下侍郎同平章事趙鳳同平章事充安國節度使八月庚申馬希範至長沙辛酉襲位甲子孟知祥令李昊為武泰趙季良等五留後草表請以知祥為蜀王行墨制仍自求旌節昊曰比者諸將攻取方鎮即有其地今又自求朝廷節􅃏及明公封爵然則輕重之權皆在羣下矣借使明公自請豈不可邪知祥大悟更令昊為己草表請行墨制補兩川刺史巳下又表請以季良等五留後為節度使初安重誨欲圖兩川自知祥殺李嚴每除刺史皆以東兵衞送之小州不減五百人夏魯竒李仁矩武䖍裕各數千人皆以牙隊為名及知祥克遂閬利夔黔梓六鎮得東兵無慮三萬人恐朝廷徴還表請其妻子吳徐知誥廣金陵城周圍二十里初契丹既彊寇抄盧龍諸州皆徧幽州城門之外虜騎充斥每自涿州運糧入幽州虜多伏兵於閻溝掠取之及趙德鈞為節度使城閻溝而戍之為良鄉縣糧道稍通幽州東十里之外人不敢樵牧德鈞於州東五十里城潞縣而戍之近州之民始得稼穡至是又於州東北百餘里城三河縣以通薊州運路虜騎來爭德鈞擊却之九月庚辰朔奏城三河畢邊人頼之壬午以鎮南節度使馬希範為武安節度使兼侍中孟知祥命其子仁賛攝行軍司馬兼都緫轄兩川牙内馬步都軍事冬十月己酉朔帝復遣李存瓌如成都凡劒南自節度使刺史以下官聽知祥差署訖奏聞朝廷更不除人唯不遣戍兵妻子然其兵亦不復徴也秦王從榮喜為詩聚浮華之士髙輦等於幕府與相唱和頗自矜伐每置酒輒令僚屬賦詩有不如意者面毁裂抵弃壬子從榮入謁帝語之曰吾雖不知書然喜聞儒生講經義開益人智思吾見莊宗好為詩將家子文非素習徒取人竊笑汝勿效也丙辰幽州奏契丹屯捺剌泊前彰義節度使李金全屢獻馬上不受曰卿在鎮為治何如勿但以獻馬為事金全吐谷渾人也壬申大理少卿康澄上䟽曰臣聞童謡非禍福之本祅祥豈隆替之源故雊雉升鼎而桑榖生朝不能止殷宗之盛神馬長嘶而玉􅀛告兆不能延晉祚之長是知國家有不足懼者五有深可畏者六隂陽不調不足懼三辰失行不足懼小人訛言不足懼山崩川涸不足懼蟊賊傷稼不足懼賢人藏匿深可畏四民遷業深可畏上下相徇深可畏亷耻道消深可畏毁譽亂真深可畏直言蔑聞深可畏不足懼者願陛下存而勿論深可畏者願陛下修而靡忒優詔奬之秦王從榮為人鷹視輕佻峻急既判六軍諸衞事復參朝政多驕縱不法初安重誨為樞密使上專屬任之從榮及宋王從厚自襁褓與之親狎雖典兵常為重誨所制畏事之重誨死王淑妃與宣徽使孟漢瓊宣傳帝命范延光趙延壽為樞密使從榮皆輕侮之河陽節度使同平章事石敬瑭兼六軍諸衞副使其妻永寧公主與從榮異母素相憎疾從榮以從厚聲名出已右尤忌之從厚善以卑弱奉之故嫌隙不外見石敬塘不欲與從榮共事常思外補以避之范延光趙延壽亦慮及禍屢辭機要請與舊臣迭為之上不許㑹契丹欲入寇上命擇帥臣鎮河東延光延壽皆曰當今帥臣可往者獨石敬瑭康義誠耳敬瑭亦願行上即命除之既受詔不落六軍副使敬瑭復辭上乃以宣徽使朱􅀪昭知山南東道代義誠詣闕十一月辛巳以三司使孟鵠為忠武節度使以忠武節度使馮贇充宣徽南院使判三司鵠本刀筆吏與范延光鄉里厚善數年間引擢至節度使上雖知其太速然不能違也乙酉上以胡寇浸逼北邊命趣議河東帥石敬瑭欲之而范延光趙延壽欲用康義誠議久不决樞密直學士李崧以為非石太尉不可延光曰僕亦累奏用之上欲留之宿衞耳㑹上遣中使趣之衆乃從崧議丁亥以石敬瑭為北京留守河東節度使兼大同振武彰國威塞等軍蕃漢馬步緫管加兼侍中己丑加樞密使趙延壽同平章事吳以諸道都統徐知誥為大丞相太師加領德勝節度使知誥辭丞相太師大同節度使張敬達聚兵要害契丹竟不敢南下而還敬達代州人也蔚州刺史張彦超本沙陀人嘗為帝養子與石敬瑭有隙聞敬瑭為緫管舉城附於契丹契丹以為大同節度使石敬瑭至晉陽以部將劉知逺周瓌為都押衙委以心腹軍事委知逺帑藏委瓌瓌晉陽人也十二月戊午以康義誠為河陽節度使兼侍衞親軍馬步都指揮使以朱􅀪昭為山南東道節度使是嵗漢主立其子耀樞為雍王􅀛圖為康王􅀪度為賔王􅀪熈為晉王􅀪昌為越王􅀪弼為齊王􅀪雅為韶王􅀪澤為鎮王􅀪操為萬王􅀪杲為循王􅀪暐為思王􅀪邈為髙王􅀪簡為同王弘建為益王弘濟為辯王弘道為貴王弘昭為宜王弘政為通王弘益為定王未幾徙弘度為秦王四年春正月戊子加秦王從榮守尚書令兼侍中庚寅以端明殿學士歸義劉昫為中書侍郎同平章事閩人有言真封宅龍見者閩王延鈞更命其宅曰龍躍宫遂詣寶皇宫受冊備儀衞入府即皇帝位國號大閩大赦改元龍啟更名璘追尊父祖立五廟以其僚屬李敏為左僕射門下侍郎其子節度副使繼鵬為右僕射中書侍郎並同平章事以親吏吴朂為樞密使唐冊禮使裴傑程􅋲適至海門閩主以傑為如京使􅋲固求北還不許閩主自以國小地僻常謹事四鄰由是境内差安二月戊申孟知祥墨制以趙季良等為五鎮節度使涼州大將拓跋承謙及耆老上表請以權知留後孫超為節度使上問使者超為何人對曰張義潮在河西朝廷以天平軍二千五百人戍涼州自黄巢之亂涼州爲党項所隔鄆人稍稍物故皆盡超及城中之人皆其子孫也乙卯以馬希範為武安武平節度使兼中書令戊午定難節度使李仁福卒庚申軍中立其子彞超為留後癸亥以孟知祥為東西川節度使蜀王先是河西諸鎮皆言李仁福潛通契丹朝廷恐其與契丹連兵併吞河右南侵闗中㑹仁福卒三月癸未以其子彞超為彰武留後徙彰武節度使安從進為定難留後仍命靜難節度使藥彦稠將兵五萬以宫宛使安重益為監軍送從進赴鎮從進索葛人也乙酉始下制除趙季良等為五鎮節度使丁亥敕諭夏銀綏宥將士吏民以夏州窮邊李彞超年少未能扞禦故徙之延安從命則有李從曮髙允韜富貴之福違命則有王都李賔覆族之禍夏四月彞超上言為軍士百姓擁留未得赴鎮詔遣使趣之言事者請為親王置師傅宰相畏秦王從榮不敢除人請令王自擇秦王府判官太子詹事王居敏薦兵部侍郎劉瓉於從榮從榮表請之癸丑以瓉為祕書監秦王傅前襄州支使山陽魚崇逺為記室瓉自以左遷泣訴不得免王府參佐皆新進少年輕脱諂䛕瓉獨從容規諷從榮不悦瓉雖為傅從榮一槩以僚屬待之瓉有難色從榮覺之自是戒門者勿為通月聽一至府或竟日不召亦不得食李彞超不奉詔遣其兄阿囉王守青嶺門集境内党項諸胡以自救藥彦稠等進屯蘆闗彞超遣党項抄糧運及攻具官軍自蘆闗退保金明閩主璘立子繼鵬為福王充寶皇宫使五月戊寅立皇子從珂為潞王從益為許王從子天平節度使從温為兖王䕶國節度使從璋為洋王成德節度使從敏為涇王庚辰閩地震閩主璘避位脩道命福王繼鵬權緫萬機初閩王審知性節儉府舍皆庳陋至是大作宫殿極土木之盛甲申帝暴得風疾庚寅小愈見羣臣於文明殿壬辰夜夏州城上舉火比明􅄂虜數千騎救之安從進遣先鋒使宋温擊走之吳宋齊丘勸徐知誥徙吳主都金陵知誥乃營宫城於金陵帝旬日不見羣臣都人忷懼或潜竄山野或寓止軍營秋七月庚辰帝力疾御廣壽殿人情始安安從進攻夏州州城赫連勃勃所築堅如鐵石斸鑿不能入又党項萬餘騎徜徉四野抄掠糧餉官軍無所芻牧山路險狹闗中民輸斗粟束藳費錢數緍民間困竭不能供李彞超兄弟登城謂從進曰夏州貧瘠非有珍寶蓄積可以充朝廷貢賦也但以祖父世守此土不欲失之蕞爾孤城勝之不武何足煩國家勞費如此幸為表聞若許其自新或使之征伐願為衆先上聞之壬午命從進引兵還其後有知李仁福隂事者云仁福畏朝廷除移揚言結契丹為援契丹實不與之通也致朝廷誤興是役無功而還自是夏州輕朝廷每有叛臣必隂與之連以邀賂遺上疾久未平征夏州無功軍士頗有流言乙酉賜在京諸軍優給有差既賞賚無名士卒由是益驕丁亥賜錢元瓘爵吳王元瓘於兄弟甚厚其兄中吳建武節度使元璙自蘇州入見元瓘以家人禮事之奉觴為壽曰此兄之位也而小子居之兄之賜也元璙曰先王擇賢而立之君臣位定元璙知忠順而已因相與對泣戊子閩主璘復位初福建中軍使薛文傑性巧佞璘喜奢侈文傑以聚歛求媚璘以為國計使親任之文傑隂求富民之罪籍没其財被榜捶者胷背分受仍以銅斗火熨之建州土豪吳光入朝文傑利其財求其罪將治之光怨怒帥其衆且萬人叛奔吳帝以工部尚書盧文紀禮部郎中吕琦為蜀王冊禮使并賜蜀王一品朝服知祥自作九旒冕九章衣車服旌旗皆擬王者八月乙巳朔文紀等至成都戊申知祥服衮冕備儀衞詣驛降階北面受冊升玉輅至府門乗步輦以歸文紀簡求之孫也戊申羣臣上尊號曰聖明神武廣道法天文德恭孝皇帝大赦在京及諸道將士各等第優給時一月之間再行優給由是用度益窘太僕少卿致仕何澤見上寢疾秦王從榮權勢方盛兾已復進用表請立從榮爲太子上覽表泣下私謂左右曰羣臣請立太子朕當歸老太原舊第耳不得已丙戌詔宰相樞密使議之丁卯從榮見上言曰竊聞有姦人請立臣爲太子臣㓜少且願學治軍民不願當此名上曰羣臣所欲也從榮退見范延光趙延壽曰執政欲以吾爲太子是欲奪我兵柄幽之東宫耳延光等知上意且懼從榮之言即具以白上辛未制以從榮爲天下兵馬大元帥九月甲戌朔吳主立德妃王氏爲皇后戊寅加范延光趙延壽兼侍中癸未中書奏節度使見元帥儀雖帶平章事亦以軍禮廷參從之帝欲加宣徽使判三司馮贇同平章事贇父名章執政誤引故事庚寅加贇同中書門下二品充三司使秦王從榮請嚴衞捧聖步騎兩指揮為牙兵每入朝從數百騎張弓挾矢馳騁衢路令文士試草檄淮南書陳已將廓清海内之意從榮不快於執政私謂所親曰吾一旦南面必族之范延光趙延壽懼屢求外補以避之上以為見己病而求去甚怒曰欲去自去奚用表為齊國公主復為延壽言於禁中云延壽實有疾不堪機務丙申二人復言於上曰臣等非敢憚勞願與勲舊迭為之亦不敢俱去願聽一人先出若新人不稱職復召臣臣即至矣上乃許之戊戌以延壽為宣武節度使以山南東道節度使朱􅀪昭為樞密使同平章事制下􅀪昭復辭上叱之曰汝輩皆不欲在吾側吾蓄養汝輩何為􅀪昭乃不敢言吏部侍郎張文寶泛海使杭州船壞水工以小舟濟之風飄至天長從者二百人所存者五人吳主厚禮之資以從者儀服錢幣數萬仍為之牒錢氏使於境上迎候文寶獨受飲食餘皆辭之曰本朝與吳久不通問今既非君臣又非賔主若受兹物何辭以謝吳主嘉之竟達命於杭州而還庚子以前義成節度使李賛華為昭信節度使留洛陽食其俸辛丑詔大元帥從榮位在宰相上吳徐知誥以國中水火屢為災曰兵民困苦吾安可獨樂悉縱遣侍妓取樂器焚之閩内樞密使薛文傑説閩主抑挫諸宗室從子繼圖不勝忿謀反坐誅連坐者千餘人冬十月乙卯范延光馮贇奏西北諸胡賣馬者往來如織日用絹無慮五千匹計耗國用什之七請委縁邊鎮戍擇諸胡所賣馬良者給劵具數以聞從之戊午以前武興節度使孫岳為三司使范延光屢因孟漢瓊王淑妃以求出庚申以延光為成德節度使以馮贇為樞密使帝以親軍都指揮使河陽節度使同平章事康義誠為朴忠親任之時要近之官多求出以避秦王之禍義誠度不能自脱乃令其子事秦王務以恭順持兩端兾得自全權知夏州事李彞超上表謝罪求昭雪壬戌以彞超為定難節度使十一月甲戌上餞范延光酒罷上曰卿今逺去事宜盡言對曰朝廷大事願陛下與内外輔臣㕘決勿聽羣小之言遂相泣而别時孟漢瓊用事附之者共爲朋黨以蔽惑上聽故延光言及之庚辰改慎州懐化軍置保順軍於洮州領洮鄯等州戊子帝疾復作己丑大漸秦王從榮入問疾帝俛首不能舉王淑妃曰從榮在此帝不應從榮出聞宫中皆哭從榮意帝已殂明旦稱疾不入是夕帝實小愈而從榮不知從榮自知不爲時論所與恐不得爲嗣與其黨謀欲以兵入侍先制權臣辛卯從榮遣都押牙馬處鈞謂朱􅀪昭馮贇曰吾欲帥牙兵入宫中侍疾且備非常當止於何所二人曰王自擇之既而私於處鈞曰主上萬福王宜竭心忠孝不可妄信人浮言從榮怒復遣處鈞謂二人曰公輩殊不愛家族邪何敢拒我二人患之入告王淑妃及宣徽使孟漢瓊咸曰茲事不得康義誠不可濟乃召義誠謀之義誠竟無言但曰義誠將校耳不敢預議惟相公所使􅀪昭疑義誠不欲衆中言之夜邀至私第問之其對如初壬辰從榮自河南府常服將步騎千人陳於天津橋是日黎明從榮遣馬處鈞至馮贇第語之曰吾今曰决入且居興聖宫公輩各有宗族處事亦宜詳允禍福在須臾耳又遣處鈞詣康義誠義誠曰王來則奉迎贇馳入右掖門見􅀪昭義誠漢瓊及三司使孫岳方聚謀於中興殿門外贇具道處鈞之言因讓義誠曰秦王言禍福在須􅁷其事可知公勿以兒在秦府左右顧望主上拔擢吾輩自布衣至將相苟使秦王兵得入此門置主上何地吾輩尚有遺種乎義誠未及對監門白秦王已將兵至端門外漢瓊拂衣起曰今日之事危及君父公猶顧望擇利邪吾何愛餘生當自帥兵拒之耳即入殿門弘昭贇隨之義誠不得已亦隨之入漢瓊見帝曰從榮反兵已攻端門須􅁷入宫則大亂矣宫中相顧號哭帝曰從榮何苦乃爾問弘昭等有諸對曰有之適已令門者闔門矣帝指天泣下謂義誠曰卿自處置勿驚百姓控鶴指揮使李重吉從珂之子也時侍側帝曰吾與爾父冒矢石定天下數脱吾於厄從榮輩得何力今乃為人所教為此悖逆我固知此曹不足付大事當呼爾父授以兵柄耳汝為我部閉諸門重吉即帥控鶴兵守宫門孟漢瓊被甲乗馬召馬軍都指揮使朱洪實使將五百騎討從榮從榮方據胡床坐橋上遣左右召康義誠端門已閉叩左掖門從門隙中窺之見朱洪實引騎兵北來走白從榮從榮大驚命取鐵掩心擐之坐調弓矢俄而騎兵大至從榮走歸府僚佐皆竄匿牙兵掠嘉善坊潰去從榮與妃劉氏匿牀下皇城使安從益就斬之并殺其子以其首獻初孫岳頗得豫内廷密謀馮朱患從榮狼伉岳嘗為之極言禍福之歸康義誠恨之至是乗亂密遣騎士射殺之帝聞從榮死悲駭幾落御榻絶而復蘇者再由是疾復劇從榮一子尚幼養宫中諸將請除之帝泣曰此何罪不得已竟與之癸巳馮道帥羣臣入見帝於雍和殿帝雨泣嗚咽曰吾家事至此慙見郷等宋王從厚為天雄節度使甲午遣孟漢瓊徴從厚且權知天雄軍府事丙申追廢從榮為庶人執政共議從榮官屬之罪馮道曰從榮所親者髙輦劉陟王説而已任賛到官纔半月王居敏司徒詡在病告已半年豈豫其謀居敏尤為從榮所惡昨舉兵向闕之際與輦陟並轡而行指日景曰來日及今已誅王詹事矣自非與之同謀者豈得一切誅之乎朱􅀪昭曰使從榮得入光政門賛等當如何任使而吾輩猶有種乎且首從差一等耳今首巳孥戮而從皆不問主上能不以吾輩為庇姦人乎馮贇力爭之始議流貶時諮議髙輦巳伏誅丁酉元帥府判官兵部侍郎任賛祕書監兼王傅劉瓉友蘇瓉記室魚崇逺河南少尹劉陟判官司徒詡推官王説等八人並長流河南巡官李澣江文蔚等六人勒歸田里六軍判官太子詹事王居敏推官郭晙並貶官澣回之族曽孫詡具州人文蔚建安人也文蔚奔吳徐知誥厚禮之初從榮失道六軍判官司諌郎中趙逺諌曰大王地居上嗣當勤修令德柰何所為如是勿謂父子至親為可恃獨不見恭世子戾太子乎從榮怒出為涇州判官及從榮敗逺以是知名逺字上交幽州人也戊戌帝殂帝性不猜忌與物無競登極之年已踰六十每夕於宫中焚香祝天曰某胡人因亂為衆所推願天早生聖人為生民主在位年榖屢豐兵革罕用校於五代粗為小康辛丑宋王至洛陽閩主尊魯國太夫人黄氏為皇太后閩主好鬼神巫盛韜等皆有寵薛文傑言於閩主曰陛下左右多姦臣非質諸鬼神不能知也盛韜善視鬼宜使察之閩主從之文傑惡樞密使吳朂朂有疾文傑省之曰主上以公久疾欲罷公近密僕言公但小苦頭痛耳將愈矣主上或遣使來問慎勿以它疾對也朂許諾明日文傑使韜言於閩主曰適見北廟崇順王訊吳朂謀反以銅釘釘其腦金椎擊之閩主以告文傑文傑曰未可信也宜遣使問之果以頭痛對即收下獄遣文傑及獄吏􅄂治之朂自誣服并其妻子誅之由是國人益怒吳光請兵於吳吳信州刺史蔣延徽不俟朝命引兵㑹光攻建州閩主遣使求救於吳越十二月癸卯朔始發明宗喪宋王即皇帝位秦王從榮既死朱洪實妻入宫司衣王氏與之語及秦王王氏曰秦王為人子不在左右侍疾致人歸禍是其罪也若云大逆則厚誣矣朱司徒最受王恩當時不為之辨惜哉洪實聞之大懼與康義誠以其語白閔帝且言王氏私於從榮為之詗宫中事辛亥賜王氏死事連王淑妃淑妃素厚於從榮帝由是疑之丙辰以天雄左都押牙宋令詢爲磁州刺史朱􅀪昭以誅秦王立帝爲己功欲專朝政令詢侍帝左右最久雅爲帝所親信􅀪昭不欲舊人在帝側故出之帝不悦而無如之何孟知祥聞明宗殂謂僚佐曰宋王幼弱爲政者皆胥吏小人其亂可坐俟也辛未帝始御中興殿帝自終易月之制即召學士讀貞觀政要太宗實録有致治之志然不知其要寛柔少斷李愚私謂同列曰吾君延訪鮮及吾輩位髙責重事亦堪憂衆惕息不敢應順化節度使同平章事判明州錢元珦驕縱不法每請事於王府不獲輒上書悖慢嘗怒一吏置鐵牀炙之臭滿城郭吳王元瓘遣牙將仰仁詮詣明州召之仁詮左右慮元珦難制勸為之備仁詮不從常服徑造聽事元珦見仁詮至股慄遂還錢塘幽於别第仁詮湖州人也閩主改福州為長樂府親從都指揮使王仁達有擒王延稟之功性慷慨言事無所避閩主惡之嘗私謂左右曰仁達智有餘吾猶能御之非少主臣也至是竟誣叛族誅之初馬希聲希範同日生希聲母曰袁德妃希範母曰陳氏希範怨希聲先立不讓及嗣位不禮於袁德妃希聲母弟希旺為親從都指揮使希範多譴責之袁德妃請納希旺官為道士不許解其軍職使居竹屋草門不得預兄弟燕集德妃卒希旺憂憤而卒潞王上清泰元年春正月戊寅閔帝大赦改元應順壬午加河陽節度使兼侍衞都指揮使康義誠兼侍中判六軍諸衞事朱􅀪昭馮贇忌侍衞馬軍都指揮使安彦威侍衞步軍都指揮使忠正節度使張從賔甲申出彦威為護國節度使以捧聖馬軍都指揮使朱洪實代之出從賔為彰義節度使以嚴衞步軍都指揮使皇甫遇代之彦威崞人遇真定人也戊子樞密使同平章事朱􅀪昭同中書門下二品馮贇河東節度使兼侍中石敬瑭並兼中書令贇以超遷太過堅辭不受己丑改兼侍中壬辰以荆南節度使髙從誨為南平王武安武平節度使馬希範為楚王甲午以鎮海鎮東節度使吳王元瓘為吳越王吳徐知誥别治私第於金陵乙未遷居私第虛府舍以待吳主鳳翔節度使兼侍中潞王從珂與石敬瑭少從明帝征伐有功名得衆心朱􅀪昭馮贇位望素出二人下逺甚一旦執朝政皆忌之明宗有疾潞王屢遣其夫人入省侍及明宗殂潞王辭疾不來使臣至鳳翔者或自言伺得潞王隂事時潞王長子重吉為控鶴都指揮使朱馮不欲其典禁兵己亥出為亳州團練使潞王有女惠明為尼在洛陽亦召入禁中潞王由是疑懼吳蔣延徽敗閩兵於浦城遂圍建州閩主璘遣上軍使張彦柔驃騎大將軍王延宗將兵萬人救建州延宗軍及中途士卒不進曰不得薛文傑不能討賊延宗馳使以聞國人震恐太后及福王繼鵬泣謂璘曰文傑盜弄國權枉害無辜上下怨怒久矣今吳兵深入士卒不進社稷一旦傾覆留文傑何益文傑亦在側互陳利害璘曰吾無如卿何卿自為謀文傑出繼鵬伺之於啟聖門外以笏擊之仆地檻車送軍前市人爭持瓦礫擊之文傑善術數自云過三日則無患部送者聞之倍道兼行二日而至士卒見之踊躍臠食之閩主亟遣赦之不及初文傑以古制檻車踈闊更為之形如木匱攅以鐵鋩内向動輒觸之車成文傑首自入焉并誅盛韜蔣延徽攻建州垂克徐知誥以延徽吳太祖之壻與臨川王濛素善恐其克建州奉濛以圖興復遣使召之延徽亦聞閩兵及吳越兵將至引兵歸閩人追擊敗之士卒死亡甚衆歸罪於都虞候張重進斬之知誥貶延徽為右威衞將軍遣使求好于閩閏月以左諌議大夫唐汭膳部郎中知制誥陳乂皆爲給事中充樞密直學士汭以文學從帝歷三鎮在幕府及即位將佐之有才者朱馮皆斥逐之汭性迂踈朱馮恐帝含怒有時而發乃引汭於密近以其黨陳乂監之丙午尊皇后為皇太后安逺節度使符彦超奴王希全任賀兒見朝廷多事謀殺彦超據安州附於吳夜叩門稱有急遞彦超出至聽事二奴殺之因以彦超之命召諸將有不從己者輒殺之己酉旦副使李端帥州兵討誅之并其黨甲寅以王淑妃為太妃蜀將吏勸蜀王知祥稱帝己巳知祥即皇帝位于成都資治通鑑巻第二百七十八
