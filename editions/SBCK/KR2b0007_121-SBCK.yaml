front:
  text: 代濬帥􅀐三千討之二月嵩爲吐谷渾元緒所執魏改元神䴥
  hash: sha256:ef77a1edea88f04f09c7ee63704e8231f05a3e18c73ab6c78d5fc9afe59a700e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0007_SBCK_120-22b}
body:
  text: 魏平北將軍尉眷攻夏主於上邽夏主退屯平涼奚斤進軍安定與丘堆娥青軍合斤馬多疫死士卒乏糧乃深壘自固遣丘堆督租於民間士卒􅁀掠不設儆備夏主襲之堆兵敗以數百􅀐還城夏主乗勝日來城下鈔掠不得芻牧諸將患之監軍侍御史安頡曰受詔滅賊今更爲賊所困退守窮城􅀂不爲賊殺當坐灋誅進退皆無生理而諸王公晏然曾不爲計乎斤曰今軍士無馬以歩擊􅀐必無勝理當須京師救􅀐至合撃之頡曰今猛㓂遊逸於外吾兵疲食盡不一決戰則死在旦夕救􅀐何可待乎等於就死死戰不亦可乎斤又以馬少爲辭頡曰今歛諸將所乗馬可得二百匹頡請募敢死之士出擊之就不能破敵亦可以折其鋭且赫連昌狷而無謀好勇而輕毎自出挑戰衆皆識之􅀂伏兵掩擊昌可擒也斤猶難之頡乃隂與尉眷等謀選􅀐待之旣而夏主來攻城頡出應之夏主自出陳前􅅮戰軍士識其貌爭赴之㑹天大風揚塵晝昏夏主敗走頡追之夏主馬蹶而墜遂擒之頡同之子也夏大將軍領司徒平原王定收其餘衆數萬奔還平涼即皇帝位大赦改元勝光三月辛巳赫連昌至平城魏主館之於西宫門内器用皆給乗輿之副又以妹始平公主妻之假常忠將軍賜爵㑹稽公以安頡爲建節將軍賜爵西平公尉眷爲寧北將軍進爵漁陽公魏主常使赫連昌侍從左右與之單􅀐共逐鹿深入山澗昌素有勇名諸將咸以爲不可魏主曰天命有在亦何所懼親遇如􅀄奚斤自以爲元帥而昌爲偏禆所擒深恥之乃捨輜重齎三日糧追夏主於平涼娥清欲循水而往斤不從自北道邀其走路至馬髦嶺夏軍將遁㑹魏小將有罪亡歸於夏告以魏軍食少無水夏主乃分兵邀斤前後夾撃之魏兵大潰斤及娥清劉拔皆爲夏所擒士卒死者六七千人丘堆守輜重在安定聞斤敗棄輜重奔長安與髙涼王禮偕奔蒲阪夏人復取長安魏主大怒命安頡斬丘堆代將其衆鎭蒲坂以拒之夏四月夏主遣使請和於魏魏主以詔諭之使降壬子魏主西巡戊午畋于河西大赦五月秦文昭王熾磐卒太子暮末即位大赦改元永弘平陸令河南成粲復勸王弘遜位弘從之累表陳請帝不得巳六月庚戍以弘爲衞將軍開府儀同三司甲寅魏主如長川葬秦文昭王于武平陵廟號太祖秦王暮末以右丞相元基爲侍中相國都督中外諸軍録尚書事以鎭軍大將軍河州牧謙屯爲驃􅀐大將軍徴安北將軍涼州刺史叚暉爲輔國大將軍御史大夫叔父右禁將軍千年爲鎭北將軍涼州牧鎭湟河以征北將軍木弈干爲尚書令車􅀐大將軍以征南將軍吉毗爲尚書僕射衞大將軍河西王蒙遜因秦喪伐秦西平西平太守麴承謂之曰殿下若先取樂都則西平必爲殿下之有西平苟望風請服亦明主之所疾也蒙遜乃釋西平攻樂都相國元基帥􅀐三千救樂都甫入城而河西兵至攻其外城克之絶其水道城中飢渇死者太半東羗乞提從元基救樂都隂與河西通謀下繩引内其兵登城者百餘人鼔譟燒門元基帥左右奮擊河西兵乃退初文昭王疾病謂暮末曰吾死之後汝能保境則善矣沮渠成都爲蒙遜所親重汝宜歸之至是暮末遣使詣蒙遜許歸成都以求和蒙遜引兵還遣使入秦弔祭暮末厚資送成都遣將軍王伐送之蒙遜猶疑之使恢武將軍沮渠竒珍伏兵於捫天嶺執伐并其􅀐士三百人以歸旣而遣尚書郎王杼送伐還秦并遺暮末馬千匹及錦􅄢銀繒秋七月暮末遣記室郎中馬艾如河西報聘魏主還宫八月復如廣􅑔􅀚温泉柔然紇升蓋可汗遣其子將萬餘􅀐寇魏邊魏主自廣􅑔還追之不及九月還宫冬十月甲辰魏主北巡壬子畋于牛川秦涼州牧乞伏千年􅄝酒殘虐不恤政事秦王暮末遣使讓之千年懼奔河西暮末以叔父光禄大夫沃陵爲涼州牧鎭湟河徐州剌史王仲德遣歩􅀐二千伐魏濟陽陳留魏主還宫魏定州丁零鮮于臺陽等二千餘家叛入西山州郡不能討閏月魏主遣鎭南將軍叔孫建討之十一月乙未朔日有食之魏主如西河校獵十二月甲申還宫河西王蒙遜伐秦至磐夷秦相國元基等將􅀐萬五千拒之蒙遜還攻西平征虜將軍出連輔政等將􅀐二千救之祕書監謝靈運自以名軰才能應參時政上唯接以文義毎侍宴談賞而已王曇首王華殷景仁名位素出靈運下並見任遇靈運意甚不平多稱疾不朝直或出郭遊行且二百里經旬不歸旣無表聞又不請急上不欲傷大臣意諷令自解靈運乃上表陳疾上賜假令還㑹稽而靈運遊飲自若爲灋司所紏坐免官是歳師子王刹利摩訶及天笁迦毗􅀺王月愛皆遣使奉表入貢表辭皆如浮屠之言魏鎭逺將軍平舒矦燕鳳卒六年春正月王弘上表乞解州録以授彭城王義康帝優詔不許癸丑以義康爲侍中都督楊南徐兖三州諸軍事司徒録尚書事領南徐州刺史􅀪與義康二府並置佐領兵共輔朝政弘旣多疾且欲委逺大權毎事推讓義康由是義康專揔内外之務又以撫軍將軍江夏王義恭爲都督荆湘等八州諸軍事荆州刺史以侍中劉湛爲南蠻校尉行府州事帝與義恭書誡之曰天下艱難家國事重雖曰守成實亦未易隆替安危在吾曹耳豈可不感尋王業大懼負荷汝性􅄶急志之所滯其欲必行意所不存從物回改此最弊事宜念裁抑衞青遇士大夫以禮與小人有恩西門安于矯性齊美􅀜羽張飛任偏同弊行已舉事深宜鑒此若事異今日嗣子㓜蒙司徒當周公之事汝不可不盡祇順之理爾時天下安危決汝二人耳汝一月自用錢不可過三十萬􅀂能省此益美西楚府舍略所諳究計當不須改作日求新異凡訊獄多決當時難可逆慮此實爲難至訊日虚懐博盡愼無以喜怒加人能擇善者而從之美自歸巳不可專意自決以矜獨斷之明也名器深宜愼惜不可妄以假人昵近爵賜尤應裁量吾於左右雖爲少恩如聞外論不以爲非也以貴凌物物不服以威加人人不厭此易逹事耳聲樂嬉遊不宜令過蒲酒漁獵一切勿為供用奉身皆有節度竒服異器不宜興長又宜數引見佐史相見不數則彼我不親不親無因得盡人情人情不盡復何由知衆事也夏酒泉公雋自平涼奔魏丁零鮮于臺陽等請降於魏魏主赦之秦出連輔政等未至西平河西王蒙遜拔西平執太守麴承二月秦王暮末立妃梁氏爲皇后子萬載爲太子三月丁巳立皇子劭爲太子戊午大赦辛酉以左衞將軍殷景仁爲中領軍帝以章太后早亡奉太后所生蘇氏甚謹蘇氏卒帝往臨哭欲追加封爵使羣臣議之景仁以爲古典無之乃止􅀄秦尚書隴西辛進從文昭王遊陵霄觀彈飛鳥誤中秦王暮末之毋傷其面及暮末即位問毋面傷之由毋以狀告暮末怒殺進并其五族二十七人夏四月癸亥以尚書左僕射王敬􅀪為尚書令臨川王義慶為左僕射吏部尚書濟陽江夷爲右僕射初魏太祖命尚書郎鄧淵撰國記十餘卷未成而止世祖更命崔浩與中書侍郎鄧頴等續成之爲國書三十卷頴淵之子也魏主將擊柔然治兵於南郊先祭天然後部勒行陳内外羣臣皆不欲行保太后固止之獨崔浩􅂆之尚書令劉絜等共推太史令張淵徐辯使言於魏主曰今兹巳巳三隂之歳歳星襲月太白在西方不可舉兵北伐必敗雖克不利於上羣臣因共賛之曰淵等少時嘗諫苻堅南伐堅不從而敗所言無不中不可違也魏主意不決詔浩與淵辯論難於前浩詰淵辯曰陽爲德隂爲刑故日食脩德月食脩刑夫王者用刑小則肆諸市朝大則陳諸原野今出兵以討有罪乃所以脩刑也臣竊􅀚天文比年以來月行掩昴至今猶然其占三年天子大破旄頭之國蠕蠕髙車旄頭之衆也願陛下勿疑淵辯復曰蠕蠕荒外無用之物得其地不可耕而食得其民不可臣而使輕疾無常難得而制有何汲汲而勞士馬以伐之浩曰淵辯言天道猶是其職至於人事形勢尤非其所知此乃漢丗常談施之於今殊不合事宜何則蠕蠕本國家北邊之臣中間叛去今誅其元惡收其良民令復舊役非無用也丗人皆謂淵辯通解數術明決成敗臣請試問之屬者統萬未亡之前有無敗徴􅀂其不知是無術也知而不言是不忠也時赫連昌在坐淵等自以未甞有言慙不能對魏主大恱旣罷公卿或尤浩曰今南宼方伺國隙而捨之北伐􅀂蠕蠕逺遁前無所獲後有彊宼將何以待之浩曰不然今不先破蠕蠕則無以待南宼南人聞國家克統萬以來内懐恐懼故揚聲動衆以衞淮北比吾破蠕蠕往還之間南宼必不動也且彼歩我􅀐彼能北來我亦南往在彼甚困於我未勞況南北殊俗水陸異宜設使國家與之河南彼亦不能守也何以言之以劉􅁉之雄傑吞併􅀜中留其愛子輔以良將精兵數萬猶不能守全軍覆没號哭之聲至今未巳況義隆今日君臣非􅁉時之比主上英武士馬精彊彼􅀂果來譬如以駒犢􅃲虎狼也何懼之有蠕蠕恃其絶逺謂國家力不能制自寛日乆故夏則散衆放畜秋肥乃聚背寒向温南來宼抄今掩其不備必望塵駭散牡馬護牝牝馬戀駒驅馳難制不得水草不過數日必聚而困弊可一舉而滅也蹔勞永逸時不可失患在上無此意今上意巳決柰何止之宼謙之謂浩曰蠕蠕果可克乎浩曰必克但恐諸將􅃈􅃈前後顧慮不能乗勝深入使不全舉耳先是帝因魏使者還告魏主曰汝趣歸我河南地不然將盡我將士之力魏主方議伐柔然聞之大笑謂公卿曰􅀛鼈小豎自救不暇夫何能爲就使能來􅀂不先滅蠕蠕乃是坐待宼至腹背受敵非良䇿也吾行決矣庚寅魏主發平城使北平王長孫嵩廣陵公樓伏連居守魏主自東道向黑山使平陽王長孫翰自西道向大娥山同㑹柔然之庭五月壬辰朔日有食之王敬弘固讓尚書令表求還東癸巳更以敬弘爲侍中特進左光禄大夫聽其東歸丁未魏主至漠南捨輜重帥輕􅀐兼馬襲撃柔然至栗水柔然紇升蓋可汗先不設備民畜滿野驚怖散去莫相收攝紇升蓋燒廬舍絶迹西走莫知所之其弟匹􅀺先主東部聞有魏宼帥衆欲就其兄遇長孫翰翰邀擊大破之殺其大人數百夏主欲復取統萬引兵東至矦尼城不敢進而還河西王蒙遜伐秦秦王暮末留相國元基守枹罕遷保定連南安太守翟承伯等據罕开谷以應河西暮末擊破之進至治城西安太守莫者幼眷據汧川以叛暮末討之爲幼眷所敗還于定連蒙遜至枹罕遣丗子興國進攻定連六月暮末逆撃興國於治城擒之追撃蒙遜至譚郊吐谷渾王慕璝遣其弟没利延將􅀐五千㑹蒙遜伐秦暮末遣輔國大將軍叚暉等邀撃大破之柔然紇升蓋可汗旣走部落四散􅇡伏山谷雜畜布野無人收視魏主循栗水西行至菟園水分軍搜討東西五千里南北三千里俘斬甚衆髙車諸部乗魏兵勢鈔掠柔然柔然種􅀋前後降魏者三十餘萬落獲戎馬百餘萬匹畜産車廬彌漫山澤亡慮數百萬魏主循弱水西行至涿邪山諸將慮深入有伏兵勸魏主留止宼謙之以崔浩之言告魏主魏主不從秋七月引兵東還至黑山以所獲班賜將士有差旣而得降人言可汗先􅀍病聞魏兵至不知所爲乃焚穹廬以車自載將數百人入南山民畜窘聚方六十里無人統領相去百八十里追兵不至乃徐西遁唯此得免後聞涼州賈胡言􅀂復前行二日則盡滅之矣魏主􅀷悔之紇升蓋可汗憤悒而卒子吴提立號敇連可汗武都孝昭王揚玄疾病欲以國授其弟難當難當固辭請立玄子保宗而輔之玄許之玄卒保宗立難當妻姚氏勸難當自立難當乃廢保宗自稱都督雍涼秦三州諸軍事征西大將軍開府儀同三司秦州刺史武都王河西王蒙遜遣使送榖三十萬斛以贖丗子興國于秦秦王暮末不許蒙遜乃立興國母弟菩提爲世子暮末以興國爲散􅀐常侍以其妹平昌公主妻之八月魏主至漠南聞髙車東部屯巳尼陂人畜甚衆去魏軍千餘里遣左僕射安原等將萬􅀐擊之髙車諸部迎降者數十萬落獲馬牛羊百餘萬冬十月魏主還平城徙柔然髙車降附之民於漠南東至濡源西曁五原隂山三千里中使之耕牧而收其貢賦命長孫翰劉絜安原及侍中代人古弼同鎭撫之自是魏之民閒馬牛羊及氊皮爲之價賤魏主加崔浩侍中特進撫軍大將軍以賞其謀畫之功浩善占天文常置銅鋌於酢器中夜有所見即以鋌畫紙作字以記其異魏主毎如浩家問以災異或倉猝不及束帶奉進䟽食不暇精美魏主必爲之舉筯或立甞而還魏主嘗引浩出入卧内從容謂浩曰卿才智淵博事朕祖考著忠三丗故朕引卿以自近卿宜盡忠規諫勿有所隱朕雖或時忿恚不從卿言然終乆深思卿言也甞指浩以示新降髙車渠帥曰汝曹視此人尫纎懦弱不能彎弓持矛然其胷中所懐乃過於兵甲朕雖有征伐之志而不能自決前後有功皆此人所教也又敇尚書曰凡軍國大計汝曹所不能決者皆當咨浩然後施行秦王暮末之弟軻殊羅烝於文昭王左夫人秃髪氏暮末知而禁之軻殊羅懼與叔父什寅謀殺暮末奉沮渠興國以奔河西使秃髪氏盜門鑰鑰誤門者以告暮末暮末悉收其黨殺之而赦軻殊羅執什寅鞭之什寅曰我負汝死不負汝鞭暮末怒刳其腹投尸于河夏主少凶暴無賴不爲丗祖所知是月畋于隂槃登苛藍山望統萬城泣曰先帝􅀂以朕承大業者豈有今日之事乎十一月己丑朔日有食之不盡如鉤星晝見至晡方没河北地闇魏主西廵至柞山十二月河西王蒙遜吐谷渾王慕璝皆遣使入貢是歳魏内都大官中山文懿公李先青冀二州刺史安同皆卒先年九十五秦地震野草皆自反七年春正月癸巳以吐谷渾王慕璝爲征西將軍沙州刺史隴西公庚子魏主還宫壬寅大赦癸卯復如廣􅇞臨温泉二月丁卯魏平陽威王長孫翰卒戊辰魏主還宫帝自踐位以來有恢復河南之志三月戊子詔簡甲卒五萬給右將軍到彦之統安北將軍王仲徳兖州刺史笁靈秀舟師入河又使驍􅀐將軍叚宏將精􅀐八千直指虎牢豫州刺史劉德武將兵一萬繼進後將軍長沙王義欣將兵三萬監征討諸軍事義欣道憐之子也先遣殿中將軍田竒使於魏告魏主曰河南舊是宋土中爲彼所侵今當脩復舊境不􅀜河北魏主大怒曰我生髪未燥巳聞河南是我地此豈可得必􅀂進軍今當􅁠歛戍相避須冬寒地浄河冰堅合自更取之甲午以前南廣平太守尹冲爲司州刺史長沙王義欣出鎭彭城爲衆軍聲援以游擊將軍胡藩戍廣陵行府州事壬寅魏封赫連昌爲秦王魏有新徙敇勒千餘家苦於將吏侵漁出怨言期以草生牛馬肥亡歸漠北尚書令劉絜左僕射安原奏請及河冰未解徙之河西向春冰解使不得北遁魏主曰此曹習俗放散日乆譬如囿中之鹿急則奔突緩之自定吾區處自有道不煩徙也絜等固請不巳乃聽分徙三萬餘落於河西西至白鹽池敇勒皆驚駭曰圈我於河西欲殺我也謀西奔涼州劉絜屯五原河北安原屯恱拔城以備之癸夘敇勒數千􅀐叛北走絜追討之走者無食相枕而死魏南邊諸將表稱宋人大嚴將入宼請兵三萬先其未􅀤逆擊之足以挫其鋭氣使不敢深入因請悉誅河北流民在境上者以絶其郷導魏主使公卿議之皆以爲當然崔浩曰不可南方下濕入夏之後水潦方降草木蒙密地氣鬱蒸易生疾癘不可行師且彼旣嚴備則城守必固留屯乆攻則糧運不繼分軍四掠則衆力單寡無以應敵以今擊之未見其利彼􅀂果能北來宜待其勞倦秋涼馬肥因敵取食徐徃擊之此萬全之計也朝廷羣臣及西北守將從陛下征伐西平赫連北破蠕蠕多獲美女珍寶牛馬成羣南邊諸將聞而慕之亦欲南鈔以取資財皆營私計爲國生事不可從也魏主乃止諸將復表南宼已至所部兵少乞簡幽州以南勁兵助巳戍守及就漳水造船嚴備以拒之公卿皆以爲宜如所請并署司馬楚之魯軌韓延之等爲將帥使招誘南人浩曰非長策也楚之等皆彼所畏忌今聞國家悉􅀤幽州以南精兵大造舟艦隨以輕􅀐謂國家欲存立司馬氏誅除劉宗必舉國震駭懼於滅亡當悉􅀤精鋭并心竭力以死爭之則我南邊諸將無以禦之今公卿欲以威力却敵乃所以速之也張虚聲而召實害此之謂矣故楚之之徒往則彼來止則彼息其勢然也且楚之等皆纎利小才止能招合輕薄無賴而不能成大功徒使國家兵連禍結而巳昔魯軌説姚興以取荆州至則敗散爲蠻人掠賣爲奴終於禍及姚􅇦此巳然之效也魏主未以爲然浩乃復陳天時以爲南方舉兵必不利曰今兹害氣在楊州一也庚午自刑先􅀤者傷二也日食晝晦宿值斗牛三也熒惑伏於翼軫主亂及喪四也太白未出進兵者敗五也夫興國之君先脩人事次盡地利後觀天時故萬舉萬全今劉義隆新造之國人事未洽災變屢見天時不協舟行水涸地利不盡三者無一可而義隆行之必敗無疑魏主不能違衆言乃詔冀定相三州造船三千艘簡幽州以南戍兵集河上以備之秦乞伏什寅母弟前將軍白養鎭衞將軍去列以什寅之死有怨言秦王暮末皆殺之夏四月甲子魏王如雲中敕勒萬餘落復叛走魏主使尚書封鐵追討滅之六月巳卯以氐王楊難當爲冠軍將軍秦州刺史武都王魏主使平南大將軍丹楊王大毗屯河上以司馬楚之爲安南大將軍荆州剌史封琅邪王屯潁川以備宋吐谷渾王慕璝將其衆萬八千襲秦定連秦輔國大將軍叚暉等擊走之到彦之自淮入泗水滲日行纔十里自四月至秋七月始至須昌乃泝河西上魏主以河南四鎭兵少命諸軍悉收衆北渡戊子魏碻磝戍兵棄城去戊戌滑臺戍兵亦去庚子魏主以大鴻臚陽平公杜超爲都督冀定相三州諸軍事太宰進爵陽平王鎭鄴爲諸軍節度超宻太后之兄也庚戌魏洛陽虎牢戍兵皆棄城去到彥之留朱脩之守滑臺尹冲守虎牢建武將軍杜驥守金墉驥預之玄孫也諸軍進屯靈昌津列守南岸至于潼􅀜於是司兖旣平諸軍皆喜王仲德獨有憂色曰諸賢不諳北土情偽必墯其計胡虜雖仁義不足而凶狡有餘今歛戍北歸必并力完聚􅀂河冰旣合將復南來豈可不以爲憂乎甲寅林邑王范陽邁遣使入貢自陳與交州不睦乞蒙恕宥八月魏主遣冠軍將軍安頡督䕶諸軍擊到彦之丙寅彦之遣禆將呉興姚聳夫渡河攻冶坂與頡戰聳夫兵敗死者甚衆戊寅魏主遣征西大將軍長孫道生㑹丹楊王大毗屯河上以禦彦之燕太祖寢疾召中書監申秀侍中陽哲於内殿屬以後事九月病甚輦而臨軒命太子翼攝國事勒兵聽政以備非常宋夫人欲立其子受居惡翼聽政謂翼曰上疾將瘳柰何遽欲代父臨天下乎翼性仁弱遂還東宫日三往省疾宋夫人矯詔絶内外遣閽寺傳問而巳翼及諸子大臣並不得見唯中給事胡福獨得出入專掌禁衞福慮宋夫人遂成其謀乃言於司徒録尚書事中山公􅀪􅀪與壯士數十人被甲入禁中􅀫衞皆不戰而散宋夫人命閉東閤􅀪家僮庫斗頭勁捷有勇力踰閤而入至于皇堂射殺女御一人太祖驚懼而殂􅀪遂即天王位遣人巡城告曰天降凶禍大行崩背太子不侍疾羣公不奔喪疑有逆謀社稷將危吾備介弟之親遂攝大位以寧國家百官叩門入者進陛二等太子翼帥東宫兵出戰而敗兵皆潰去弘遣使賜翼死太祖有子百餘人弘皆殺之諡太祖曰文成皇帝葬長谷陵已丑夏主遣其弟謂以代伐魏鄜城魏平西將軍始平公隗歸等擊之殺萬餘人謂以代遁去夏主自將數萬人邀擊隗歸於鄜城東留其弟上谷公社干廣陽公度洛孤守平涼遣使來求和約合兵滅魏遥分河北自􅁪山以東屬宋以西屬夏魏主聞之治兵將伐夏羣臣咸曰劉義隆兵猶在河中捨之西行前宼未可必克而義隆乘虚濟河則失山東矣魏主以問崔浩對曰義隆與赫連定遙相招引以虚聲唱和共窺大國義隆望定進定待義隆前皆莫敢先入譬如連雞不得俱飛無能爲害也臣始謂義隆軍來當屯止河中兩道北上東道向冀州西道衝鄴如此則陛下當自討之不得徐行今則不然東西列兵徑二千里一處不過數千形分勢弱以此觀之儜兒情見此不過欲固河自守無北度意也赫連定殘根易摧擬之必仆克定之後東出潼􅀜席卷而前則威震南極江淮以北無立草矣聖策獨發非愚近所及願陛下勿疑甲辰魏主如統萬謀襲平涼以衞兵將軍王斤鎭蒲坂斤建之子也秦自正月不􅀨至于九月民流叛者甚衆冬十月以竟陵王義宣爲南徐州刺史獨戍石頭戊午立錢署鑄四銖錢到彦之王仲德㳂河置守還保東平乙亥魏安頡自委粟津濟河攻金墉金墉城不治旣乆又無糧食杜驥欲棄城走恐獲罪􅀄髙祖滅秦遷其鍾虡於江南有大鍾沒於洛水帝使姚聳夫將千五百人往取之驥紿之曰金墉城巳修完糧食亦足所乏者人耳今虜􅀐南渡當相與併力禦之大功旣立牽鍾未晩聳夫從之旣至見城不可守乃引去驥遂南遁丙子安頡拔洛陽殺將士五千餘人杜驥歸言於帝曰本􅁒以死固守姚聳夫及城遽走人情沮敗不可復禁上大怒誅聳夫於夀陽聳夫勇健諸偏禆莫及也魏河北諸軍㑹於七女津到彦之恐其南渡遣禆將王蟠龍泝流奪其船杜超等擊斬之安頡與龍驤將軍陸俟進攻虎牢辛巳拔之尹沖及滎陽太守清河崔模降魏秦王暮末爲河西所逼遣其臣王愷烏訥闐請迎於魏魏人許以平涼安定封之暮末乃焚城邑毀寳器帥戸萬五千東如上邽至髙田谷給事黄門侍郎郭恒謀劫沮渠興國以叛事覺暮末殺之夏主聞暮末將至􅀤兵拒之暮末留保南安其故地皆入於吐谷渾十一月乙酉魏主至平涼夏上谷公社干等嬰城固守魏主使赫連昌招之不下乃使安西將軍古弼等將軍兵趣安定夏主自鄜城還安定將步􅀐二萬北救平涼與弼遇弼偽退以誘之夏主追之魏主使髙車馳擊之夏兵大敗斬首數千級夏主還走登鶉觚原爲方陳以自固魏兵就圍之壬辰加征南大將軍檀道濟都督征討諸軍事帥衆伐魏甲午魏夀光矦叔孫建汝隂公長孫道生濟河而南到彦之聞洛陽虎牢不守諸軍相繼奔敗􅁒引兵還殿中將軍垣䕶之以書諫之以爲宜使竺靈秀助朱脩之守滑臺自帥大軍進擬河北且曰昔人有連年攻戰失衆乏糧猶張膽爭前莫肯輕退况今青州豐穰濟漕流通士馬飽逸威力無􅂢􅀂空棄滑臺坐喪成業豈朝廷受任之㫖邪彦之不從護之苗之子也彥之􅁒焚舟歩走王仲德曰洛陽旣陷虎牢不守自然之勢也今虜去我猶千里滑臺尚有彊兵􅀂遽捨舟南走士卒必散當引舟入濟至馬耳谷口更詳所宜彦之先有目疾至是大動且將士疾疫乃引兵自清入濟南至歷城焚舟棄甲歩趨彭城竺靈秀棄須昌南奔湖陸青兖大擾長沙王義欣在彭城將佐恐魏兵大至勸義欣委鎮還都義欣不從魏兵攻濟南濟南太守武進蕭承之帥數百人拒之魏衆大集承之使偃兵開城門衆曰賊衆我寡柰何輕敵之甚承之曰今懸守窮城事巳危急􅀂復示弱必爲所屠唯當見彊以待之耳魏人疑有伏兵遂引去魏軍圍夏主數日斷其水草人馬飢渇丁酉夏主引衆下鶉觚原魏武衞將軍丘眷擊之夏衆大潰死者萬餘人夏主中重創單􅀐走收其餘衆驅民五萬西保上邽魏人獲夏主之弟丹楊公烏視拔武陵公秃骨及公矦以下百餘人是日魏兵乗勝進攻安定夏東平公乙斗乗城奔長安驅略數千家西奔上邽戊戌魏叔孫建攻竺靈秀於湖陸靈秀大敗死者五千餘人建還屯范城巳亥魏主如安定庚子還臨平涼掘塹圍之安慰􅀄附赦秦雍之民賜復七年夏隴西守將降魏辛丑魏安頡督諸軍攻滑臺河西王􅀩遜遣尚書郎宗舒等入貢于魏魏主與之宴執崔浩之手以示舒等曰汝所聞崔公此則是也才略之美於今無比朕動止咨之豫陳成敗􅀂合符契未甞失也魏以叔孫建都督冀青等四州諸軍事魏尚書庫結帥􅀐五千迎秦王暮末秦衞將軍吉毗以爲不宜内徙暮末從之庫結引還南安諸羗萬餘人叛秦推安南將軍督八郡諸軍事廣甯太守焦遺爲主遺不從乃劫遺族子長城護軍亮爲主帥衆攻南安暮末請救於氐王楊難當難當遣將軍符獻帥􅀐三千救之暮末與之合擊諸羗諸羗潰亮奔還廣􅇞暮末進軍攻之以手令與焦遺使取亮十二月遣斬亮首岀降暮末進遺號鎭國將軍秦略陽太守􅀪農楊顯以郡降夏辛酉以長沙王義欣爲豫州刺史鎭夀陽夀陽土荒民散城郭頽敗盗賊公行義欣隨宜經理境内安業道不拾遺城府完實遂爲盛藩芍陂乆廢義欣修治隄防引河水入陂溉田萬餘頃無復旱災丁卯夏上谷公社干廣陽公度洛孤出降魏克平涼􅀜中矦豆代田得奚斤娥清等獻於魏主魏主以夏主之后賜代田命斤膝行執酒以奉代田謂斤曰全汝生者代田也賜代田爵井陘矦加散􅀐常侍右衞將軍領内都幢將夏長安臨􅀳武功守將皆走􅀜中悉入於魏魏主留巴東公延普鎭安定以鎭西將軍王斤鎭長安壬申魏主東還以奚斤爲宰士使負酒食以從王斤驕矜不灋信用左右調役百姓民不堪命南奔漢川者數千家魏主案治得實斬斤以徇右將軍到彦之安北將軍王仲德皆下獄兑官兖州刺史竺靈秀坐棄軍伏誅上見垣護之書而善之以爲北高平太守彥之之北伐也甲兵資實甚盛及敗還委棄盪盡府藏武庫爲之空虛它日上與羣臣宴有荒外降人在坐上問尚書庫部郎顧琛庫中仗猶有幾許琛詭對有十萬人仗上旣問而悔之得琛對甚喜琛和之曾孫也彭城王義康與王弘並録尚書義康意猶怏怏欲得楊州形於辭旨以弘弟曇首居中爲上所親委愈不恱弘以老病屢乞骸骨曇首自求吴郡上皆不許義康謂人曰王公乆病不起神州詎宜卧治曇首勸弘減府中文武之半以授義康上聽割二千人義康乃恱資治通鑑卷第一百二十一
