front:
  text: 海公珍嶺北諸城悉降之甲寅秦王堅與西燕主冲戰于仇班渠大破之乙卯戰于雀桑又破之甲子戰于白渠秦兵大敗西燕兵圍秦王堅殿中將軍鄧邁等力戰却之堅乃得免壬申冲遣尚書令髙蓋夜襲長安入其南城左將軍竇衝前禁將軍李辯等擊破之斬首八百級分其屍而食之乙亥髙蓋引兵攻渭北諸壘太子宏與戰於成貳壁大破之斬首三萬燕帶方王佐與寕朔將軍平規共攻薊王永兵屢敗二月永使宋敞燒和龍及薊城宫室帥衆三萬奔壺闗佐等入薊慕容農引兵㑹慕容麟於中山與共攻翟真麟農先帥數千騎至承營􅀚察形勢翟眞望見陳兵而出諸將欲退農曰丁零非不勁勇而翟眞懦弱今簡精鋭望眞所在而衝之眞走衆必散矣乃邀門而蹙之可盡殺也使驍騎將軍慕容國帥百餘􅀐衝之眞走其衆爭門自相蹈藉死者太半遂拔承營外郭癸未秦王堅與西燕主沖戰於城西大破之追奔至阿城諸將請乘勝入城堅恐爲沖所掩引兵還
