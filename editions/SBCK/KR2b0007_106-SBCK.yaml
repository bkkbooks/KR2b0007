body:
  text: 乙酉秦益州刺史王廣以蜀人江陽太守李丕為益州刺史守成都己丑廣帥所部奔還隴西依其兄秦州刺史統蜀人隨之者三萬餘人劉牢之至枋頭楊膺姜讓謀泄長樂公丕収殺之牢之聞之盤􅁊不進秦平原悼公暉數為西燕主沖所敗秦王堅讓之曰汝吾之才子也擁大衆與白虜小兒戰而屢敗何用生為三月暉憤恚自殺前禁將軍李辯都水使者隴西彭和正恐長安不守召集西州人屯于韮園堅召之不至西燕主冲攻秦髙陽愍公方於驪山殺之執秦尚書韋鍾以其子謙為馮翊太守使招集三輔之民馮翊壘主邵安民等責謙曰君雍州望族今乃從賊與之為不忠不義何面目以行於世乎謙以告鍾鍾自殺謙來奔秦左將軍苟池右將軍俱石子與西燕主沖戰於驪山兵敗西燕將軍慕容永斬苟池俱石子奔鄴永廆弟運之孫石子難之弟也秦王堅遣領軍將軍楊定擊沖大破之虜鮮卑萬餘人而還悉阬之定佛奴之孫堅之壻也滎陽人鄭燮以郡來降燕王垂攻鄴久不下將北詣冀州乃命撫軍大將軍麟屯信都樂浪王温屯中山召驃騎大將軍農還鄴於是逺近聞之以燕為不振頗懐去就農至髙邑遣從事中郎眭邃近出違期不還長史張攀言於農曰邃目下參佐敢欺罔不還請回軍討之農不應敕僃假板以邃為髙陽太守參佐家在趙北者悉假署遣歸凡舉補太守三人長史二十餘人退謂攀曰君所見殊誤當今豈可自相魚肉俟吾北還邃等自當迎於道左君但觀之樂浪王温在中山兵力甚弱丁零四布分據諸城温謂諸將曰以吾之衆攻則不足守則有餘驃騎撫軍首尾連兵㑹須滅賊但應聚粮厲兵以俟時耳於是撫舊招新勸課農桑民歸附者相繼郡縣壁壘争送軍粮倉庫充溢翟真夜襲中山温擊破之自是不敢復至温乃遣兵一萬運粮以餉垂且營中山宫室劉牢之攻燕黎陽太守劉撫于孫就柵燕王垂留慕容農守鄴圍自引兵救之秦長樂公丕聞之出兵乘虚夜襲燕營農擊敗之劉牢之與垂戰不勝退屯黎陽垂復還鄴吕光以龜兹饒樂欲留居之天竺沙門鳩摩羅什謂光曰此㐫亡之地不足留也將軍但東歸中道自有福地可居光乃大饗將士議進止衆皆欲還乃以駝二萬餘頭載外國珍寳竒玩驅駿馬萬餘匹而還夏四月劉牢之進兵至鄴燕王垂逆戰而敗遂撤圍退屯新城乙卯自新城北遁牢之不告秦長樂公丕即引兵追之丕聞之發兵繼進庚申牢之追及垂於董唐淵垂曰秦晉瓦合相待為彊一勝則俱豪一失則俱潰非同心也今兩軍相繼勢既未合宐急擊之牢之軍疾趨二百里至五橋澤争燕輜重垂邀撃大破之斬首數千級牢之單馬走㑹秦救至得免燕冠軍將軍宐都王鳳每戰奮不顧身前後大小二百五十七戰未嘗無功垂戒之曰今大業甫濟汝當先自愛使為車騎將軍徳之副以抑其鋭鄴中饑甚秦長樂公丕帥衆就晉榖於枋頭劉牢之入屯鄴城收集亡散兵復少振坐軍敗徴還燕秦相持經年幽冀大饑人相食邑落蕭條燕之軍士多餓死燕王垂禁民養􅅙以桑椹為軍粮垂將北趣中山以驃騎大將軍農為前驅前所假授吏眭邃等皆來迎候上下如初李攀乃服農之智略㑹稽王道子好專權復為姦謟者所構扇與太保安有隙安欲避之㑹秦王堅來求救安乃請自將救之壬戌出鎭廣陵之步丘築壘曰新城而居之蜀郡太守任權攻拔成都斬秦益州刺史李丕復取益州新平粮竭矢盡外救不至後秦王萇使人謂苟輔曰吾方以義取天下豈讎忠臣邪卿但帥城中之人還長安吾正欲得此城耳輔以為然帥民五千口出城萇圍而阬之男女無遺獨馮傑子終得脱奔長安秦王堅追贈輔等官爵皆謚曰節愍矦以終為新平太守翟眞自承營徙屯行唐眞司馬鮮于乞殺眞及諸翟自立為趙王營人共殺乞立真從弟成為主其衆多降於燕五月西燕主沖攻長安秦王堅身自督戰飛矢滿體流血淋漓沖縱兵􅁀掠闗中士民流散道路斷絶千里無煙有堡壁三十餘推平逺將軍趙敖為主相與結盟冒難遣兵粮助堅多為西燕兵所殺堅謂之曰聞來者率不善逹此誠忠臣之義然今寇難殷繁非一人之力所能濟也徒相隨入虎口何益汝曹宐為囯自愛畜粮厉兵以俟天時庶幾善不終否有時而泰也三輔之民為沖所略者遣人宻告堅請遣兵攻沖欲縱火為内應堅曰甚哀諸卿忠誠然吾猛士如虎豹利兵如霜雪困於烏合之虜豈非天乎恐徒使諸卿坐自夷滅吾不忍也其人固請不已乃遣七百騎赴之冲營縱火者反為風火所燒其得免者什一二堅祭而哭之衛將軍楊定與沖戰於城西為沖所擒定秦之驍將也堅大懼以䜟書云帝出五將久長得乃留太子宏守長安謂之曰天其或者欲導予出外汝善守城勿與賊争利吾當出隴収兵運粮以給汝遂帥騎數百與張夫人及中山公詵二女寳錦出奔五將山宣告州郡期以孟冬救長安堅過襲韮園李辯奔燕彭和正慙自殺閏月以廣州刺史羅友為益州刺史鎭成都庚戌燕王垂至常山圍翟成於行唐命帶方王佐鎭龍城六月髙句麗寇遼東佐遣司馬郝景將兵救之為髙句麗所敗髙句麗遂陷遼東􅀇菟秦太子宏不能守長安將數千騎與母妻宗室西奔下辨百官逃散司吏校尉權翼等數百人奔後秦西燕主沖入據長安縱兵大掠死者不可勝計秋七月旱饑井皆竭後秦王萇自故縣如新平秦王堅至王將山後秦王萇遣驍騎將軍吳忠帥騎圍之秦兵皆散走獨侍御十數人在側堅神色自若坐而待之召宰人進食俄而忠至執之送詣新平幽於别室太子宏至下辨南秦州刺史楊璧拒之璧妻堅之女順陽公主也弃其夫從宏宏奔武都投氐豪强熈假道來奔詔處之江州長樂公丕帥衆三萬自枋頭將歸鄴城龍驤將軍檀玄擊之戰于谷口􅀇兵敗丕復入鄴城燕建節將軍餘巖叛自武邑北趣幽州燕王垂馳使敕幽州將平規曰固守勿戰俟吾破丁零自討之規出戰為巖所敗巖入薊掠千餘户而去遂據令支癸酉翟成長史鮮于得斬成出降垂屠行唐盡阬成衆太保安有疾求還詔許之八月安至建康甲午大赦丁酉建昌文靖公謝安薨詔加殊禮如大司馬温故事庚子以司徒琅琊王道子領揚州刺史録尚書都督中外諸軍事以尚書令謝石為衛將軍後秦王萇使求傳國璽於秦王堅曰萇次應歷數可以為惠堅瞋目叱之曰小羗敢逼天子五胡次序無汝羗名璽已送晉不可得也萇復遣右司馬尹緯説堅求為禪代堅曰禪代聖賢之事姚萇叛賊何得為之堅與緯語問緯在朕朝何官緯曰尚書令史堅歎曰卿王景略之儔宰相才也而朕不知卿宐其亡也堅自以平生遇萇有恩尤忿之數罵萇求死謂張夫人曰豈可令羗奴辱吾兒乃先殺寳錦辛丑萇遣人縊堅於新平佛寺張夫人中山公詵皆自殺後秦將士皆為之哀慟萇欲隠其名謚堅曰壯烈天王臣光曰論者皆以為秦王堅之亡由不殺慕容垂姚萇故也臣獨以為不然許劭謂魏武帝治世之能臣亂世之姦雄使堅治國無失其道則垂萇皆秦之能臣也烏能為亂哉堅之所以亡由驟勝而驕故也魏文矦問李克吳之所以亡對曰數戰數勝文矦曰數戰數勝國之福也何故亡對曰數戰則民疲數勝則主驕以驕主御疲民未有不亡者也秦王堅似之矣長樂公丕在鄴將西赴長安幽州刺史王永在壺闗遣使招丕丕乃帥鄴中男女六萬餘口西如潞川驃騎將軍張蚝并州刺史王騰迎之入晉陽王永留平州剌史苻沖守壷關自帥􅀐一萬㑹丕于晉陽丕始知長安不守堅已死乃發喪即皇帝位追謚堅曰宣昭皇帝廟號世祖大赦改元大安燕王垂以魯王和為南中郎將鎮鄴遣慕容農出蠮螉塞歷凡城趣龍城㑹兵討餘巖慕容麟慕容隆自信都徇勃海清河麟擊勃海太守封懿執之因屯歷口懿放之子也鮮卑劉頭眷擊破賀蘭部於善無又破柔然於意親山頭眷子羅辰言於頭眷曰比來行兵所向無敵然心腹之疾願早圖之頭眷曰誰也羅辰曰從兄顯忍人也必將為亂頭眷不聽顯庫仁之子也頃之顯果殺頭眷自立又將殺拓跋珪顯弟亢埿妻珪之姑也以告珪母賀氏顯謀主梁六眷代王什翼犍之甥也亦使其部人穆崇奚牧密告珪且以其愛妻駿馬付崇曰事泄當以此自明賀氏夜飲顯酒令醉使珪隂與舊臣長孫犍元他羅結輕騎亡去向晨賀氏故驚廐中羣馬使顯起視之賀氏哭曰吾子適在此今皆不見汝等誰殺之邪顯以故不急追珪遂奔賀蘭部依其舅賀訥驚喜曰復國之後當念老臣珪笑曰誠如舅言不敢忘也顯疑梁六眷泄其謀將囚之穆崇宣言曰六眷不顧恩義助顯為逆我掠得其妻馬足以解忿顯乃捨之賀氏從弟外朝大人賀恱舉所部以奉珪顯怒將殺賀氏賀氏奔亢埿家匿神車中三日元埿舉家為之請乃得免故南部大人長孫嵩帥所部七百餘家叛顯將奔五原時拓跋寔君之子渥亦聚衆自立嵩欲歸之烏渥謂嵩曰逆父之子不足從也不如歸珪嵩從之乆之劉顯所部有亂故中部大人􅁃和辰奉賀氏奔珪賀訥弟染干以珪得衆心忌之使其黨矦引七突殺珪代人尉古真知之以告珪矦引七突不敢發染干疑古真泄其謀執而訊之以兩車軸夾其頭傷一目不伏乃免之染干遂舉兵圍珪賀氏出謂染干曰汝等欲於何置我而殺吾子乎染干慙而去九月秦主丕以張蚝爲侍中司空王永爲侍中都督中外諸軍事車騎大將軍尚書令王騰爲中軍大將軍司􅀠校尉苻冲爲尚書左僕射封西平王又以左長史楊輔爲右僕射右長史王亮爲護軍將軍立妃楊氏爲皇后子寧爲皇太子夀爲長樂王鏘爲平原王懿爲勃海王昶爲濟北王吕光自􅀛兹還至宐禾秦涼州刺史梁熈謀閉境拒之髙昌太守楊翰言於熈曰吕光新破西域兵彊氣鋭聞中原喪亂必有異圖河西地方萬里帶甲十萬足以自保若光出流沙其勢難敵髙梧谷口險阻之要宜先守之而奪其水彼既窮渇可以坐制如以為逺伊吾闗亦可拒也度此二阨雖有子房之䇿無所施矣熈弗聽美水令犍為張統謂熙曰今闗中大亂京師存亡不可知吕光之來其志難測將軍何以拒之熙曰憂之未知所出統曰光智略過人今擁思歸之士乘戰勝之氣其鋒未易當也將軍世受大恩忠誠夙著立勲王室宜在今日行唐公洛上之從弟勇冠一時為將軍計莫若奉為盟主以收衆望推忠義以帥羣豪則光雖至不敢有異心也資其精鋭東兼毛興連王統楊璧合四州之衆掃􅇯逆寧王室此桓文之舉也熈又弗聽殺洛于西海光聞楊翰之謀懼不敢進在進曰梁熈文雅有餘機鑒不足終不能用翰之謀不足憂也宐及其上下離心速進以取之光從之進至髙昌楊翰以郡迎降至玉門熈移檄責光擅命還師以子􅅌為鷹揚將軍與振威將軍南安姚皓别駕衛翰帥衆五萬拒光于酒泉敦煌太守姚静晉昌太守李純以郡降光光報檄凉州責熈無赴難之志五遏歸國之衆遣彭晃杜進姜飛為前鋒與胤戰于安彌大破擒之於是四山胡夷皆附於光武威太守彭濟執熈以降光殺之光入姑臧自領涼州刺史表杜進為武威太守自餘將佐各受職位凉州郡縣皆降於光獨酒泉太守宋皓西郡太守索泮城守不下光攻而執之讓泮曰吾受詔平西域而梁熈絶我歸路此朝廷之罪人卿何為附之泮曰將軍受詔平西域不受詔亂涼州梁公何罪而將軍殺之泮但苦力不足不能報君父之讎耳豈肯如逆氐彭濟之所為乎主滅臣死固其常也光殺泮及皓主簿尉祐姦佞傾險與彭濟同執梁熈光寵信之祐􅉲殺名士姚皓等十餘人涼州人由是不恱光以祐為金城太守祐至允吾襲據其城以叛姜飛擊破之祐奔據興城乞伏國仁自稱大都督大將軍單于領秦河二州牧改元建義以乙􅏧童埿為左相屋引出支為右相獨孤匹蹄為左輔武羣勇士為右輔弟乾歸為上將軍分其地置武城等十二郡築勇士城而都之秦尚書令魏昌公纂自闗中奔晉陽秦主丕拜纂太尉封東海王冬十月西燕主沖遣尚書令髙蓋帥衆五萬伐後秦戰于新平南蓋大敗降於後秦初蓋以楊定爲子及蓋敗定亡奔隴右復收集其舊衆苻定苻紹苻謨苻亮聞秦主丕即位皆自河北遣使謝罪中山太守王兖本新平氐也固守􅀶陵爲秦拒燕十一月丕以兖爲平州刺史定爲冀州牧紹爲冀州都督謨爲幽州牧亮爲幽平二州都督並進爵郡公左將軍竇衝據兹川有衆數萬與秦州刺史王統河州刺史毛興益州刺史王廣南秦州刺史楊璧衛將軍楊定皆自隴右遣使邀丕共擊後秦丕以定爲雍州牧衝爲梁州牧加統鎭西大將軍興車騎大將軍璧征南大將軍並開府儀同三司加廣安西將軍皆進位州牧楊定尋徙治歷城置儲蓄於百湏自稱龍驤將軍仇池公遣使來稱藩詔因其所號假之其後又取天水略陽之地自稱秦州刺史隴西王繹幕人蔡匡據城以叛燕燕慕容麟慕容隆共攻之泰山太守任泰潛師救匡至匡壘南八里燕人乃覺之諸將以匡未下而外敵奄至甚患之隆曰匡恃外救故不時下今計泰之兵不過數千人及其未合擊之泰敗匡自降矣乃釋匡擊泰大破之斬首千餘級匡遂降燕主垂殺之且屠其壘慕容農至龍城休士馬十餘日諸將皆曰殿下之來取道甚速今至此久留不進何也農曰吾來速者恐餘巖過山鈔盗侵擾良民耳巖才不踰人誑誘饑兒烏集為羣非有綱紀吾已扼其㗋乆將離散無能為也今此田善熟未収而行徒自耗損當俟収畢往則梟之亦不出旬日耳頃之農將步騎三萬至令支巖衆震駭稍稍踰城歸農巖計窮出降農斬之進擊髙句麗復遼東玄菟二郡還至龍城上䟽請繕脩陵廟燕王垂以農為使持節都督幽平二州北狄諸軍事幽州牧鎭龍城徙平州刺史帶方王佐鎭平郭農於是創立法制事從寛簡清刑獄省賦役􅂆課農桑居民富贍四方流民至者前後數萬口先是幽冀流民多入髙句麗農以驃騎司馬范陽龐淵爲遼東太守招撫之慕容麟攻王兖于博陵城中糧竭矢盡功曹張猗踰城出聚衆以應麟兖臨城數之曰卿是秦民吾是卿君卿起兵應賊自號義兵何名實之相違也古人求忠臣必於孝子之門卿母在城棄而不顧吾何有焉今人取卿一切之功則可矣寧能忘卿不忠不孝之事乎不意中州禮義之􅀖乃有如卿者也十二月麟拔􅀶陵執兖及苻鑑殺之昌黎太守宋敞帥烏􅁊索頭之衆救兖不及而還秦主丕以敞為平州刺史燕王垂北如中山謂諸將曰樂浪王招流散實倉廩外給軍糧内營宫室雖蕭何何以加之丙申垂始定都中山秦苻定據信都以拒燕燕王垂以從弟北地王精爲冀州刺史將兵攻之拓跋珪從曾祖紇羅與其弟建及諸部大人共請賀訥推珪爲主十一年春正月戊申拓跋珪大㑹於牛川即代王位改元登國以長孫嵩爲南部大人叔孫普洛爲北部大人分治其衆以上谷張衮爲左長史許謙爲古司馬廣寗王建代人和跋叔孫建􅁃岳等為外朝大人奚牧爲治民長皆掌宿衞及參軍國謀議長孫道生賀毗等侍從左右出納教命王建娶代王什翼犍之女岳和辰之弟道生嵩之從子也燕王垂即皇帝位後秦王萇如安定南安祕宐帥羗胡五萬餘人攻乞伏國仁國仁將兵五千逆擊大破之宐奔還南安鮮于乞之殺翟眞也翟遼奔􅀺陽􅀺陽太守􅅬恬之甚愛信之恬之喜畋獵不愛士卒遼潛施姦惠以収衆心恬之南攻鹿鳴城遼於後閉門拒之恬之東奔鄄城遼追執之遂據􅀺陽豫州刺史朱序遣將軍秦膺童斌與淮泗諸郡共討之秦益州牧王廣自隴右引兵攻河州牧毛興於枹罕興遣建節將軍衞平帥其宗人一千七百夜襲廣大破之二月秦州牧王統遣兵助廣攻興興嬰城自守燕大赦改元建興置公卿尚書百官繕宗廟社稷西燕主沖樂在長安且畏燕主垂之彊不敢東歸課農築室爲乆安之計鮮卑咸怨之左將軍韓延因衆心不恱攻沖殺之立沖將叚隨爲燕王改元昌平􅀄張天錫之南奔也秦長水校尉王穆匿其丗子大豫與俱奔河西依秃髪思復鞬思復鞬送於魏安魏安人焦松齊肅張濟等聚兵數千人迎大豫爲主攻吕光昌松郡拔之執太守王丗強光使輔國將軍杜進擊之進兵敗大豫進逼姑臧王穆諌曰光糧豐城固甲兵精銳逼之非利不如席卷嶺西礪兵積粟然後東向與之爭不及朞年光可取也大豫不從自號撫軍將軍涼州牧改元鳳凰以王穆爲長史傳檄郡縣使穆􅀃諭嶺西諸郡建康太守李隰祁連都尉嚴純皆起兵應之有衆三萬保壉楊塢代王珪徙居定襄之盛樂務農息民國人恱之三月大赦㤗山太守張願以郡叛降翟遼􅀄謝玄欲使朱序屯梁國玄自屯彭城以北固河上西援洛陽朝議以征役既乆欲令玄置戍而還㑹翟遼張願繼叛北方騷動玄謝罪乞解職詔慰諭令還淮隂燕主垂追尊母蘭氏爲文昭皇后欲遷文明叚后以蘭氏配享太祖詔百官議之皆以爲當然慱士劉詳董謐以爲堯母爲帝嚳妃位第三不以貴陵姜原明聖之道以至公為先文昭后宐立别廟垂怒逼之詳謐曰上所欲爲無問於臣臣案經奉禮不敢有貳垂乃不復問諸儒卒遷叚后以蘭后代之又以景昭可足渾后傾覆社稷追廢之尊烈祖昭儀叚氏爲景德皇后配享烈祖崔鴻曰齊􅁊公命諸矦無以妾為妻夫之於妻猶不可以妾代之况子而易其母乎春秋所稱母以子貴者君母旣沒得以妾母爲小君也至於享祀宗廟則成風終不得配莊公也君父之所爲臣子必習而效之猶形聲之於影響也寳之逼殺其母由垂爲之漸也堯舜之讓猶爲之噲之禍況違禮而縱私者乎昔文姜得罪於􅁊公春秋不之廢可足渾氏雖有罪於前朝然小君之禮成矣垂以私憾廢之又立兄妾之無子者皆非禮也劉顯自善無南走馬邑其族人奴眞帥所部降於代奴眞有兄犍先居賀蘭部奴眞言於代王珪請召犍而以所部讓之珪許之犍旣領部遣弟去斤遺賀訥金馬賀染干謂去斤曰我待汝兄弟厚汝今領部宐來從我去斤許之奴眞怒曰我祖父以來丗爲代忠臣故我以部讓汝等欲爲義也今汝等無狀乃謀叛國義於何在遂殺犍及去斤染干聞之引兵攻奴眞奴眞奔代珪遣使責染干染干乃止西燕左僕射慕容􅁪尚書慕容永襲叚隨殺之立宐都王子顗爲燕王改元建明帥鮮卑男女四十餘万口去長安而東􅁪弟護軍將軍韜誘顗殺之於臨晉􅁪怒捨韜去永與武衞將軍刁雲帥衆攻韜韜敗奔􅁪營􅁪立西燕主沖之子瑶爲帝改元建平謚沖曰威皇帝衆皆去瑶奔永永執瑶殺之立慕容泓子忠爲帝改元建武忠以永爲太尉守尚書令封河東公永持灋寛平鮮卑安之至聞喜聞燕主垂已称尊號不敢進築燕熈城而居之鮮卑旣東長安空虚前滎陽太守髙陵趙榖等招杏城盧水胡郝奴帥户四千入千長安渭北皆應之以榖爲丞相扶風王驎有衆數千保據馬嵬奴遣弟多攻之夏四月後秦王萇自安定伐之麟奔漢中萇執多而進奴懼請降拜鎭北將軍六谷大都督癸巳以尚書僕射陸納爲左僕射譙王恬爲右僕射納玩之子也毛興襲擊王廣敗之廣奔秦州隴西鮮卑匹蘭執廣送於後秦興復欲攻王統於上邽枹罕諸氐皆厭苦兵事乃共殺興推衛平爲河州刺史遣使請命于秦燕主垂封其子農爲遼西王麟爲趙王隆爲髙陽王代王珪􅀄改稱魏王張大豫自楊塢進屯姑臧城西王穆及秃髮思復鞬子奚于帥衆三萬屯于城南吕光出擊大破之斬奚于等二萬餘級秦大赦以衞平爲撫軍將軍河州刺史吕光爲車􅀐大將軍涼州牧使者皆没於後秦不能逹燕主垂以范陽王德爲尚書令太原王楷爲左僕射樂浪王温爲司􅀠校尉後秦王萇即皇帝位于長安大赦改元建初國號大秦追尊其父弋仲爲景元皇帝立妻地氏爲皇后子興爲皇太子置百官萇與羣臣宴酒酣言曰諸卿皆與朕北面秦朝今忽爲君臣得無恥乎趙遷曰天不恥以陛下爲子臣等何恥爲臣萇大笑魏王珪東如陵石護佛矦部帥矦辰乙佛部帥代題皆叛走諸將請追之珪曰矦辰等累丗服役有罪且當忍之方今國家草創人情未壹愚者固宐前却不足追也六月庚寅以前輔囯將軍楊亮爲雍州刺史鎭衛山陵荆州刺史􅁊石民遣將軍晏謙擊弘農下之􅀄置湖陜二戍西燕刁雲等殺西燕主忠推慕容永爲使持節大都督中外諸軍事大將軍大單于雍秦梁涼四州牧録尚書事河東王称藩于燕燕主垂遣太原王楷趙王麟陳留王紹章武王宙攻秦苻定苻紹苻謨苻亮等楷先以書與之爲陳禍福定等皆降垂封定等爲矦曰以酬秦主之徳秦主丕以都督中外諸軍事司徒録尚書事王永爲左丞相太尉東海王纂爲大司馬司空張蚝爲太尉尚書令咸陽徐義爲司空司􅀠校尉王騰為驃騎大將軍儀同三司永傳檄四方公矦牧守壘主民豪共討姚萇慕容垂令各帥所統以孟冬上旬㑹大駕于臨晉於是天水姜延馮翊寇明河東王昭新平張晏京兆杜敏扶風馬㓪建忠將軍髙平牧官都尉扶風王敏等咸承檄起兵各有衆數万遣使詣秦丕皆就拜將軍郡守封列矦冠軍將軍鄧景擁衆五千據彭池與竇衝爲首尾以擊後秦丕以景爲京兆尹景羗之子也後秦主萇徙安定五千餘户于長安秋七月秦平涼太守金熈安定都尉沒弈干與後秦左將軍姚方成戰于孫丘谷方成兵敗後秦主萇以其弟征虜將軍緒爲司􅀠校尉鎭長安自將至安定擊熈等大破之金熈本東胡之種没弈于鮮卑多蘭部帥也枹罕諸氐以衛平㐮老難爲成功議廢之而憚其宗彊累日不决氐啖青謂諸將曰大事宐時定不然變生諸君但請衛公爲㑹觀我所爲㑹七夕大宴青抽劒而前曰今天下大亂吾曹休戚同之非賢主不可以濟大事衛公老宐返初服以避賢路狄道長苻登雖王室踈屬志畧雄明請共立之以赴大駕諸君有不同者即下異議乃奮劒攘􅃑將斬異已者衆皆從之莫敢仰視於是推登爲使持節都督隴右諸軍事撫軍大將軍雍河二州牧畧陽公帥衆五萬東下隴攻南安拔之馳使請命于秦登秦主丕族子也祕宐與莫矦悌眷帥其衆三萬餘户降于乞伏國仁國仁拜宜東秦州刺史悌眷梁州刺史己酉魏王珪還盛樂代題復以部落來降十餘日又奔劉顯珪使其孫倍斥代領其衆劉顯弟肺泥帥衆降魏八月燕主垂留太子寳守中山以趙王麟爲尚書右僕射録留臺庚午自帥范陽王德等南畧地使髙陽王隆東徇平原丁零鮮于乞保曲陽西山聞垂南伐出營望都剽掠居民趙王麟自出討之諸將皆曰殿下虚鎭逺征萬一無功而反􅃜損威重不如遣諸將討之麟曰乞聞大駕在外無所畏忌必不設僃一舉可取不足憂也乃聲言至魯口夜囬趣乞比明至其營掩擊擒之翟遼寇譙朱序擊走之秦主丕以苻登爲征西大將軍開府儀同三司南安王持節州牧都督皆因其所稱而授之又以徐義爲右丞相留王騰守晉陽右僕射楊輔戍壺關帥衆四萬進屯平陽􅀄後秦主萇之弟碩德統所部羗居隴上聞萇起兵自稱征西將軍聚衆於冀城以應之以兄孫詳爲安逺將軍據隴城從孫訓爲安西將軍據南安之赤亭與秦秦州刺史王統相持萇自安定引兵㑹碩德攻統天水屠各略陽羗胡應之者一萬餘户秦畧陽太守王皮降之初秦滅代遷代王什翼揵少子窟咄于長安從慕容永東徙永以窟咄爲新興太守劉顯遣其弟亢埿迎窟咄以兵隨之逼魏南境諸部騷動魏王珪左右于􅁊等與部人謀執珪以應窟咄幢將代人莫題等亦潜與窟咄交通􅁊舅穆崇告之珪誅桓等五人莫題等七姓悉原不問珪懼内難北踰隂山復依賀蘭部遣外朝大人遼東安同求救於燕燕主垂遣趙王麟救之九月王統以秦州降于後秦後秦主萇以姚碩德爲使持節都督隴右諸軍事秦州刺史鎮上邽吕光得秦王堅凶問舉軍縞素謚曰文昭皇帝冬十月大赦改元大安西燕慕容永遣使詣秦王丕求假道東歸丕弗許與永􅀾於襄陵秦兵大敗左丞相王永衛大將軍俱石子皆死初東海王纂自長安來麾下壯士三千餘人丕忌之旣敗懼爲纂所殺帥􅀐数千南奔東垣謀襲洛陽揚威將軍馮該自陜邀擊之殺丕執其太子寧長樂王壽送建康詔赦不誅以付苻宏纂與其弟尚書永平矦師奴帥秦衆數萬走據杏城其餘王公百官皆没於永永遂進據長子即皇帝位改元中興將以秦后楊氏爲上夫人楊氏引剱刺永爲永所殺甲申海西公弈薨於吳燕寺人呉深據清河反燕主垂攻之不克後秦主萇還安定秦南安王登旣克南安夷夏歸之者三萬餘户遂進攻姚碩德于秦州後秦主萇自往救之登與萇戰于胡奴阜大破之斬首二萬餘級將軍啖青射萇中之萇創重走保上邽姚碩德代之統衆燕趙王麟軍未至魏拓拔窟咄稍前逼魏王珪賀染于侵魏北部以應之魏衆驚擾北部大人叔孫普洛亡奔劉衞辰麟聞之遽遣安同等歸魏人知燕軍在近衆心少安窟咄進屯髙栁珪引兵與麟㑹擊之窟咄大敗奔劉衞辰衞辰殺之珪悉収其衆以代人庫狄干爲北部大人麟引兵還中山劉衞辰居朔方士馬甚盛後秦主萇以衞辰爲大將軍大單于河西王幽州牧西燕主永以衞辰爲大將軍朔州牧十一月秦尚書寇遺奉勃海王懿濟北王昶自杏城奔南安南安王登發喪行服謚秦主丕曰哀平皇帝登議立懿為主衆曰勃海王雖先帝之子然年在㓜沖未堪多難今三虜窺覦宐立長君非大王不可登乃爲壇於隴東即皇帝位大赦改元太􅀄置百官慕容柔慕容盛及盛弟㑹皆在長子盛謂柔㑹曰主上已中興幽冀東西未壹吾屬居嫌疑之地爲智爲愚皆將不免不若以時東歸無爲坐待魚肉也遂相與亡歸燕後嵗餘西燕主永悉誅燕主儁及燕主垂之子孫男女無遺張大豫自西郡入臨洮掠民五千餘户保據俱城十二月吕光自稱使持節侍中中外大都督督隴右河西諸軍事大將軍涼州牧酒泉公秦主登立丗祖神主於軍中載以輜軿建黄旗青蓋以虎賁三百人衞之凡所欲爲必啟主而後行引兵五萬東擊後秦將士皆刻鉾鎧爲死休字每戰以剱矟爲方圎大陣知有厚薄從中分配故人自爲戰所向無前􅀄長安之將敗也中壘將軍徐嵩屯騎校尉胡空各聚衆五千結壘自固旣而受後秦官爵後秦主萇以王禮葬秦主堅於二壘之間及登至嵩空以衆降之登拜嵩雍州刺史空京兆尹改葬堅以天子之禮乙酉燕主垂攻呉深壘拔之深單馬走垂進屯聊城之逢關陂􅀄燕太子洗馬太原温詳來奔以爲濟北太守屯東阿燕主垂遣范陽王德髙陽王隆攻之詳遣從弟攀守河南岸子楷守碻磝以拒之燕主垂以魏王珪爲西單于封上谷王珪不受資治通鑑卷第一百六
