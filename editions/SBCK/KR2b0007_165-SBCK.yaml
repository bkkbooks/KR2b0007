front:
  text: 資治通鑑卷第一百六十五
  hash: sha256:ad97a8c79454c09bd4b6bde95495a8346362e5b20534902b1df95e87dbe61077
body:
  text: 臣司馬光奉勑編集梁紀二十一逢閹茂凡二年起昭陽作噩盡閼丗祖孝元皇帝下承聖二年春正月王僧辯發建康承制使陳霸先代鎭揚州丙子山胡圍齊離石戊寅齊主討之未至胡巳走因廵三堆大獵而歸以吏部尚書王褒爲左僕射己丑齊改鑄錢文曰常平五銖二月庚子李洪雅力屈以空雲城降陸納納囚洪雅殺丁道貴納以沙門寶誌詩䜟有十八子以爲李氏當王甲辰推洪雅爲主號大將軍使乗平肩輿列鼔吹納帥衆數千左右翼從魏太師泰去丞相大行臺爲都督中外諸軍事王雄至東梁州黃衆寶帥衆降太師泰赦之遷其豪帥於雍州齊主送柔然可汗鐵伐之父登注及兄庫提還其國鐵伐尋爲契丹所殺國人立登注爲可汗登注復爲其大人阿富提所殺國人立庫提突厥伊利可汗卒子科羅立號乙息記可汗三月遣使獻馬五萬于魏柔然别部又立阿那瓌叔父鄧叔子爲可汗乙息記擊破鄧叔子於沃野北木賴山乙息記卒捨其子攝圖而立其弟俟斤號木杆可汗木杆狀貌竒異性剛勇多智略善用兵鄰國畏之上聞武陵王紀東下使方士畫版爲紀像親釘支體以厭之又執矦景之俘以報紀􅀄紀之舉兵皆太子圎照之謀也圎照時鎭巴東執留使者啓紀云矦景未平宐急進討巳聞荆鎭爲景所破紀信之趣兵東下上甚懼與魏書曰子糾親也請君討之太師泰曰取蜀制梁在兹一舉諸將咸難之大將軍代人尉遟迥泰之甥也獨以爲可克泰問以方略逈曰蜀與中國隔絶百有餘年恃其險逺不虞我至􅀂以鐵􅀐兼行襲之無不克矣泰乃遣㢠督開府儀同三司原珍等六軍甲士萬二千􅀐萬匹自散􅀜伐蜀陸納遣其將呉藏潘烏黒李賢明等下據車輪王僧辯至巴陵宐豐矦循讓都督於僧辯僧辯弗受上乃以僧辯循爲東西都督夏四月丙申僧辯軍于車輪吐谷渾可汗夸吕雖通使於魏而宼抄不息宇文泰將􅀐三萬踰隴至姑臧討之夸吕懼請服旣而復通使於齊涼州刺史史寧覘知其還襲之於赤泉獲其僕射乞伏觸狀陸納夾岸爲城以拒王僧辯納士卒皆百戰之餘僧辯憚之不敢輕進稍作連城以逼之納以僧辯爲怯不設僃五月甲子僧辯命諸軍水陸齊進急攻之僧辯親執旗鼔宐豐矦循身受矢石拔其二城納衆大敗歩走保長沙乙丑僧辯進圍之僧辯坐壟上視築圍壘呉藏李賢明帥銳卒千人開門突出􅂪楯直進趨僧辯時杜崱杜龕並侍左右甲士衛者止百餘人力戰拒之僧辯據胡牀不動裴之横從旁擊藏等藏等敗退賢明死藏脫走入城武陵王紀至巴郡聞有魏兵遣前梁州刺史巴西譙淹還軍救蜀初楊乾運求爲梁州刺史紀以爲潼州楊灋琛求􅀺州刺史以爲沙州二人皆不悅乾運兄子略􅀃乾運曰今矦景初平宐同心戮力保國寧民而兄弟尋戈此自亡之道也夫木朽不雕丗衰難佐不如送􅅃關中可以功名兩全乾運然之令略將二千人鎭劒閣又遣其壻樂廣鎭安州與灋琛皆濳通於魏魏太師泰密賜乾運鐵劵授驃􅀐大將軍開府儀同三司梁州刺史尉遟迥以開府儀同三司矦吕陵始爲前軍至劒閣略退就樂廣翻城應始始入據安州甲戌迥至涪水乾運以州降迥分軍守之進襲成都時成都見兵不滿萬人倉庫空竭永豐矦撝嬰城自守迥圍之譙淹遣江州刺史景欣幽州刺史趙拔扈援成都迥使原珍等擊走之武陵王紀至巴東知矦景巳平乃自悔召太子圎照責之對曰矦景雖平江陵未服紀亦以旣稱尊號不可復爲人下欲遂東進將卒日夜思歸其江州刺史王開業以爲宐還救根本更思後圖諸將皆以爲然圎照及劉孝勝固言不可紀從之宣言於衆曰敢諫者死已丑紀至西陵軍勢甚盛舳艫翳川護軍陸灋和築二城於硤口兩岸運石塡江鐵鎖斷之帝拔任約於獄以爲􅀳安王司馬使助灋和拒紀謂之曰汝罪不容誅我不殺汝本爲今日因撤禁兵以配之仍許妻以廬陵王續之女使宣猛將軍劉棻與之俱庚辰巴州刺史余孝頃將兵萬人㑹王僧辯於長沙豫章太守觀寧矦永昬而少斷左右武蠻奴用事軍主文重疾之永將兵討陸納至宫亭湖重殺蠻奴永軍潰奔江陵重將其衆奔開建矦蕃蕃殺之而有其衆六月壬辰武陵王紀築連城攻絶鐵鎖陸灋和告急相繼上復㧞謝荅仁於獄以爲歩兵校尉配兵使助灋和又遣使送王琳令􅀃諭陸納乙未琳至長沙僧辯使送示之納衆悉拜且泣使謂僧辯曰朝廷􅀂赦王郎乞聽入城僧辯不許復送江陵陸灋和求救不巳上欲召長沙兵恐失陸納乃復遣琳許其入城琳旣入納遂降湘州平上復琳官爵使將兵西援峽口甲辰齊章武景王庫狄干卒武陵王紀遣將軍矦叡將衆七千築壘與陸灋和相拒上遣使與紀書許其還蜀專制一方紀不從報書如家人禮陸納旣平湘州諸軍相繼西上上復與紀書曰吾年爲一日之長屬有平亂之功膺此樂推事歸當璧儻遣使乎良所遟也如曰不然於此投筆友于兄弟分形共氣兄肥弟瘦無復相見之期讓􅀥推梨永罷懽愉之日心乎愛矣書不盡言紀頓兵日乆頻戰不利又聞魏宼深入成都􅀌危憂懣不知所爲乃遣其度支尚書樂奉業詣江陵求和請依前旨還蜀奉業知紀必敗啓上曰蜀軍乏糧士卒多死危亡可待上遂不許其和紀以黃金一斤爲餅餅百爲篋至有百篋銀五倍於金錦􅄢繒綵稱是每戰懸示將士不以爲賞寧州刺史陳智祖請散之以募勇士弗聽智祖哭而死有請事者紀辭疾不見由是將卒解體秋七月辛未巴東民符昇等斬峽口城主公孫晃降於王琳謝荅仁任約進攻矦叡破之拔其三壘於是兩岸十四城俱降紀不獲退順流東下遊擊將軍南陽樊猛追擊之紀衆大潰赴水死者八千餘人猛圍而守之上密敕猛曰生還不成功也猛引兵至紀所紀在舟中繞牀而走以金囊擲猛曰以此雇卿送我一見七官猛曰天子何由可見殺足下金將安之遂斬紀及其幼子圎滿陸灋和收太子圎照兄弟三人送江陵上絶紀屬籍賜姓饕餮氏下劉孝勝獄已而釋之上使謂江安矦圎正曰西軍已敗汝父不知存亡意欲使其自裁圎正聞之號哭稱丗子不絶聲上頻使覘之知不能死移送廷尉獄見圎照曰兄何乃亂人骨肉使痛酷如此圎照唯云計誤上並命絶食於獄至齧臂啖之十三日而死逺近聞而悲之乙未王僧辯還江陵詔諸軍各還所鎭魏尉遟迥圍成都五旬永豐矦撝屢岀戰皆敗乃請降諸將欲不許迥曰降之則將士全逺人恱攻之則將士傷逺人懼遂受之八月戊戌撝與宐都王圎肅帥文武詣軍門降迥以禮接之與盟於益州城北吏民皆復其業唯收奴婢及儲積以賞將士軍無私焉魏以撝及圎肅並爲開府儀同三司以迥爲大都督益潼等十二州諸軍事益州刺史庚子下詔將還建康領軍將軍胡僧祐太府卿黃羅漢吏部尚書宗懔御史中丞劉㲄諫曰建業王氣巳盡與虜正隔一江􅀂有不虞悔無及也且古老相承云荆州洲數滿百當出天子今枝江生洲百數巳滿陛下龍飛是其應也上令朝臣議之黃門侍郎周􅀪正尚書右僕射王襃曰今百姓未見輿駕入建康謂是列國諸王願陛下從四海之望時羣臣多荆州人皆曰􅀪正等東人也志願東下恐非良計􅀪正靣折之曰東人勸東謂非良計君等西人欲西豈成長策上􅀏又議於後堂㑹者五百人上問之曰吾欲還建康諸卿以爲如何衆莫敢先對上曰勸吾去者左􅃝左􅃝者過半武昌太守朱買臣言於上曰建康舊都山陵所在荆鎭邊疆非王者之宅願陛下勿疑以致後悔臣家在荆州豈不願陛下居此但恐是臣富貴非陛下富貴耳上使術士杜景豪􅁲之不吉對上曰未去退而言曰此兆爲􅀑賊所留也上以建康彫殘江陵全盛意亦安之卒從僧祐等議以湘州刺史王琳爲衡州刺史九月庚午詔王僧辯還鎭建康陳霸先復還京口丙子以護軍將軍陸灋和爲郢州刺史灋和爲政不用刑獄專以沙門灋及西域幻術敎化部曲數千人通謂之弟子契丹宼齊邊壬午齊主北廵兾定幽安遂伐契丹齊主使郭元建治水軍二萬餘人於合肥將襲建康納湘潭矦退又遣將軍邢景逺歩大汗薩帥衆繼之陳霸先在建康聞之白上上詔王僧辯鎭姑孰以禦之冬十月丁酉齊主至平州從西道趣長塹使司徒潘相樂帥精􅀐五千自東道趣青山辛丑至白狼城壬寅至昌􅀺城使安德王韓軌帥精􅀐四千東斷契丹走路癸卯至陽師水倍道兼行掩襲契丹齊主露髻肉􅃝晝夜不息行千餘里踰越山嶺爲士卒先唯食肉飲水壯氣彌厲甲辰與契丹遇奮擊大破之虜獲十萬餘口雜畜數百萬頭潘相樂又於青山破契丹别部丁未齊主還至營州己酉王僧辯至姑孰遣婺州刺史矦瑱呉郡太守張彪呉興太守裴之横築壘東􅀜以待齊師丁巳齊主登碣石山臨滄海遂如􅀳陽以肆州刺史斛律金爲太師召還􅀳陽拜其子豐樂爲武衛大將軍命其孫武都尚義寧公主寵待之厚羣臣莫及閠月丁丑南豫州刺史矦瑱與郭元建戰於東􅀜齊師大敗溺死者萬計湘潭矦退復歸于鄴王僧辯還建康呉州刺史開建矦蕃恃其兵疆貢獻不入上密令其將徐佛受圖之佛受使其徒詐爲訟者詣蕃遂執之上以佛受爲建安太守以侍中王質爲呉州刺史質至鄱陽佛受置之金城自據羅城掌門管繕治舟艦甲兵質不敢與爭故開建矦部曲數千人攻佛受佛受奔南豫州矦瑱殺之質始得行州事十一月戊戌以尚書右僕射王襃爲左僕射湘東太守張綰爲右僕射己未突厥復攻柔然柔然舉國奔齊癸亥齊主自􅀳陽北擊突厥迎納柔然廢其可汗庫提立阿那瓌子菴羅辰爲可汗置之馬邑川給其廩餼繒帛親追突厥於朔州突厥請降許之而還自是貢獻相繼魏尚書元烈謀殺宇文泰事泄泰殺之丙寅上使侍中王琛使於魏太師泰隂有圖江陵之志梁王詧聞之益重其貢獻十二月齊宿預民東方白額以城降江西州郡皆起兵應之三年春正月癸巳齊主自離石道討山胡遣斛律金從顯州道常山王演從􅀳州道夾攻大破之男子十三以上皆斬女子及㓜弱以賞軍遂平石樓石樓絶險自魏丗所不能至於是逺近山胡莫不懾服有都督戰傷其什長路暉禮不能救帝命刳其五藏令九人食之肉及穢惡皆盡自是始爲威虐陳霸先自丹徒濟江圍齊廣陵秦州刺史嚴超達自秦郡進圍涇州南豫州刺史矦瑱呉郡太守張彪皆出石梁爲之聲援辛丑使􅀳陵太守杜僧明帥三千人助東方白額魏太師泰始作九命之典以叙内外官爵攺流外品爲九秩魏主自元烈之死有怨言密謀誅大師泰臨淮王育廣平王賛垂涕切諌不聽泰諸子皆幼兄子章武公導中山公護皆出鎭唯以諸壻爲心膂大都督清河公李基義城公李暉常山公于翼俱爲武衛將軍分掌禁兵基逺之子暉弼之子翼謹之子也由是魏主謀泄泰廢魏主置之雍州立其弟齊王廓去年號稱元年復姓拓跋氏九十九姓攺爲單者皆復其舊魏􅀄統國三十六大姓九十九後多滅絶泰乃以諸將功髙者爲三十六國次者爲九十九姓所將士卒亦攺從其姓三月丁亥長沙王韶取巴郡甲辰以王僧辯爲太尉車􅀐大將軍丁未齊將王球攻􅀫預杜僧明出擊大破之球歸彭城郢州刺史陸灋和上啓自稱司徒上怪之王褒曰灋和旣有道術容或先知戊申上就拜灋和爲司徒己酉魏侍中宇文仁恕來聘㑹齊使者亦至江陵帝接仁恕不及齊使仁恕歸以告太師泰帝又請據舊圗定疆境辭頗不遜泰曰古人有言天之所弃誰能興之其蕭繹之謂乎荆州刺史長孫儉屢陳攻取之策泰徵儉入朝問以經略復命還鎭密爲之僃馬伯符密使告帝帝弗之信柔然可汗菴羅辰叛齊齊主自將出擊大破之菴羅辰父子北走太保安定王賀拔仁獻馬不甚駿齊主怒拔其髮免爲庶人輸􅀳陽􅀒炭齊中書令魏收撰魏書頗用愛憎爲褒貶毎謂人曰何物小子敢與魏收作色舉之則使升天按之則使入地旣成中書舎人盧潜奏收誣罔一代罪當誅尚書左丞盧斐頓丘李庶皆言魏史不直收啓齊主云臣旣結怨疆宗將爲刺客所殺帝怒於是斐庶及尚書郎中王松年皆坐謗史鞭二百配甲坊斐庶死於獄中潜亦坐繫獄然時人終不服謂之穢史潜度丗之曾孫斐同之子松年遵業之子也夏四月柔然宼齊肆州齊主自􅀳陽討之至􅁪州柔然散走帝以二千餘􅀐爲殿􅀫黃􅀲堆柔然别部數萬􅀐奄至帝安卧平明乃起神色自􅀂指畫形勢縱兵奮擊柔然披靡因潰圍而出柔然走追擊之伏尸二十餘里獲菴羅辰妻子虜三萬餘口令都督善無髙阿那肱帥􅀐數千塞其走路時柔然軍猶盛阿那肱以兵少請益帝更減其半阿那肱奮擊大破之菴羅辰超越巖谷僅以身免丙寅上使散􅀐常侍􅁃信等聘於魏癸酉以陳霸先爲司空丁未齊主復自擊柔然大破之庚戌魏太師泰酖殺廢帝五月魏直州人樂熾洋州人黃國等作亂開府儀同三司髙平田弘河南賀􅀂敦討之不克太師泰命車􅀐大將軍李遷哲與敦共討熾等平之仍與敦南出狥地至巴州巴州刺史牟安民降之巴濮之民皆附於魏蠻酋向五子王等䧟白帝遷哲擊之五子王等遁去遷哲追擊破之泰以遷哲爲信州刺史鎭白帝信州先無儲蓄遷哲與軍士共采􅁑根爲糧時有異味輒分甞之軍士感恱屢擊叛蠻破之羣蠻懾服皆送糧餼遣子弟入質由是州境安息軍儲亦贍柔然乙旃達官宼魏廣武柱國李弼追擊破之廣州刺史曲江矦勃自以非上所授内不自安上亦疑之勃啓求入朝五月乙巳上以王琳爲廣州刺史勃爲􅀳州刺史上以琳部衆彊盛又得衆心故欲逺之琳與主書廣漢李膺厚善私謂膺曰琳小人也􅂪官拔擢至此今天下未定遷琳嶺南如有不虞安得琳力竊揆官意不過疑琳琳分望有限豈與官爭爲帝乎何不以琳爲雍州刺史鎭武寧琳自放兵作田爲國禦捍膺然其言而弗敢啓散􅀐郎新野􅁃季才言於上曰去年八月丙申月犯心中星今月丙戌赤氣干北斗心爲天王丙主楚分臣恐建子之月有大兵入江陵陛下宐留重臣鎭江陵整斾還都以避其患假令魏虜侵蹙止失荆湘在於社稷猶得無慮上亦曉天文知楚有災歎曰禍福在天避之何益六月壬午齊歩大汗薩將兵四萬趣涇州王僧辯使矦瑱張彪自石梁引兵助嚴超達拒之瑱彪遟留不進將軍尹令思將萬餘人謀襲盱眙齊兾州剌史叚韶將兵討東方白額於􅀫預廣陵涇州皆來告急諸將患之韶曰梁氏喪亂國無定主人懷去就彊者從之霸先等外託同德内有離心諸君不足憂吾揣之熟矣乃留儀同三司敬顯携等圍􅀫預自引兵倍道趣涇州塗出盱眙令思不意齊兵猝至望風退走韶進擊超達破之囘趣廣陵陳霸先解圍走杜僧明還丹徒矦瑱張彪還秦郡呉明徹圍海西鎭將中山郎基固守削木爲箭翦紙爲羽圍之十旬卒不能克而還柔然帥餘衆東徙且欲南宼齊主帥輕􅀐邀之於金川柔然聞之逺遁營州刺史靈丘王峻設伏擊之獲其名王數十人鄧至􅏔檐桁失國奔魏太師泰使秦州刺史宇文導將兵納之齊叚韶還至􅀫預使辯士􅀃東方白額白額開門請盟因執而斬之秋七月庚戌齊主還鄴魏太師泰西廵至原州八月壬辰齊以司州牧清河王岳爲太保司空尉粲爲司徒太子太師矦莫陳相爲司空尚書令平陽王淹録尚書事常山王演爲尚書令中書令上黨王渙爲左僕射乙亥齊儀同三司元旭坐事賜死丁丑齊主如􅀳陽齊主之未爲魏相也太保録尚書事平原王髙隆之常侮之及將受禪隆之復以爲不可齊主由是銜之崔季舒譛隆之毎見訴訟者輒加哀矝之意以示非巳能裁帝禁之尚書省隆之甞與元旭飲謂旭曰與王交當生死不相負人有密言之者帝由是發怒令壯士築百餘拳而捨之辛巳卒於路乆之帝追忿隆之執其子慧登等二十人於前帝以鞭叩鞌一時頭絶並投尸漳水又發隆之􅃁出其尸斬截骸骨焚之弃於漳水齊主使常山王演上黨王渙清河王岳平原王叚韶帥衆於洛陽西南築伐惡城新城嚴城河南城九月齊主廵四城欲以致魏師魏師不出乃如􅀳陽魏宇文泰命侍中崔猷開回車路以通漢中帝好玄談辛卯於龍光殿講老子曲江矦勃遷居始興王琳使副將孫㻛先行據畨禺乙巳魏遣柱國常山公于謹中山公宇文護大將軍楊忠將兵五萬入宼冬十月壬戌發長安長孫儉問謹曰爲蕭繹之計將如何謹曰耀兵漢􅃆席卷度江直據丹楊上策也移郭内居民退保子城峻其陴堞以待援軍中策也􅀂難於移動據守羅郭下策也儉曰揣繹定出何策謹曰下策儉曰何故謹曰蕭氏保據江南綿歷數紀屬中原多故未遑外略又以我有齊氏之患必謂力不能分且繹懦而無謀多疑少斷愚民難與慮始皆戀邑居所以知其用下策也癸亥武寧太守宗均告魏兵且至帝召公鄕議之領軍胡僧祐太府鄕黃羅漢曰二國通好未有嫌隙必應不爾侍中王琛曰臣揣宇文容色必無此理乃復使琛使魏丙寅于謹至樊鄧梁王詧帥衆㑹之丁卯帝停講内外戒嚴王琛至石梵未見魏軍馳書報黃羅漢曰吾至石梵境上帖然前言皆兒戲耳帝聞而疑之庚午復講百官戎服以聽辛未帝使主書李膺至建康徵王僧辯爲大都督荆州刺史命陳霸先徙鎭楊州僧辯遣豫州刺史矦瑱帥程靈洗等爲前軍兖州刺史杜僧明帥呉明徹等爲後軍甲戍帝夜登鳯皇閣徙􅀝歎息曰客星入翼軫今必敗矣嬪御皆泣陸灋和聞魏師至自郢州入漢口將赴江陵帝使逆之曰此自能破賊但鎭郢州不須動也灋和還州堊其城門著衰絰坐葦席終日乃脫之十一月帝大閱於津陽門外遇北風暴雨輕輦還宫癸未魏軍濟漢于謹令宇文護楊忠帥精􅀐先據江津斷東路甲申護克武寧執宗均是日帝乗馬出城行栅揷木爲之周圍六十餘里以領軍將軍胡僧祐都督城東諸軍事尚書右僕射張綰爲之副左僕射王褒都督城西諸軍事四廂領直元景亮爲之副王公巳下各有所守丙戌命太子廵行城樓令居人助運木石夜魏軍至黃華去江陵四十里丁亥至柵下戊子嶲州刺史裴畿畿弟新興太守機武昌太守朱買臣衡陽太守謝荅仁開枇杷門出戰裴機殺魏儀同三司胡文伐畿之髙之子也帝徴廣州刺史王琳爲湘州刺史使引兵入援丁酉栅内火焚數千家及城樓二十五帝臨所焚樓望魏軍濟江四顧歎息是夜遂止宫外􅀫民家己亥移居祇洹寺于謹令築長圍中外信命始絶庚子信州刺史徐丗譜􅀳安王司馬任約等築壘於馬頭遥爲聲援是夜帝廵城猶口占爲詩羣臣亦有和者帝裂帛爲書趣王僧辯曰吾忍死待公可以至矣壬寅還宫癸卯出長沙寺戊申王褒胡僧祐朱買臣謝荅仁等開門出戰皆敗還己酉帝移居天居寺癸丑移居長沙寺朱買臣按劒進曰唯斬宗懔黃羅漢可以謝天下帝曰曩實吾意宗黃何罪二人退入衆中王琳軍至長沙鎭南府長史裴政請間道先報江陵至百里洲爲魏人所獲梁王詧謂政曰我武皇帝之孫也不可爲爾君乎􅀂從我計貴及子孫如或不然􅆎領分矣政詭曰唯命詧鎖之至城下使言曰王僧辯聞臺城被圍巳自爲帝王琳孤弱不復能來政告城中曰援兵大至各思自勉吾以間使􅀍擒當碎身報國監者擊其口詧怒命速殺之西中郎參軍蔡大業諫曰此民望也殺之則荆州不可下矣乃釋之政之禮之子大業大寳之弟也時徴兵四方皆未至甲寅魏人百道攻城城中負户􅂪楯胡僧祐親當矢石晝夜督戰􅅄勵將士明行賞罸衆咸致死所向摧殄魏不得前俄而僧祐中流矢死内外大駭魏悉衆攻栅反者開西門納魏師帝與太子王褒謝荅仁朱買臣退保金城令汝南王大封􅀳熈王大圎質於于謹以請和魏軍之初至也衆以王僧辯子侍中顗可爲都督帝不用更奪其兵使與左右十人入守殿中及胡僧祐死乃用爲都督城中諸軍事裴畿裴機歷陽矦峻皆出降于謹以機手殺胡文伐并畿殺之峻淵猷之子也時城南雖破而城北諸將猶苦戰日瞑聞城䧟乃散帝入東閤竹殿命舎人髙善寶焚古今圖書十四萬卷將自赴火宫人左右共止之又以寶劒斫柱令折歎曰文武之道今夜盡矣乃使御史中丞王孝祀作降文謝荅仁朱買臣諫曰城中兵衆猶彊乗闇突圍而出賊必驚因而薄之可度江就任約帝素不便走馬曰事必無成秖增辱耳荅仁求自扶帝以問王褒褒曰荅仁矦景之黨豈足可信成彼之勲不如降也荅仁又請守子城收兵可得五千人帝然之即授城中大都督配以公主旣而召王褒謀之以爲不可荅仁請入不得歐血而去于謹徵太子爲質帝使王褒送之謹子以褒善書給之紙筆褒乃書曰柱國常山公家奴王褒有頃黃門郎裴政犯門而出帝遂去羽儀文物白馬素衣出東門抽劒擊闔曰蕭丗誠一至此乎魏軍士度塹牽其轡至白馬寺北奪其所乗駿馬以駑馬代之遣長壯胡人手扼其背以行逢于謹胡人牽帝使拜梁王詧使鐵􅀐擁帝入營囚于烏幔之下甚爲詧所詰辱乙卯于謹令開府儀同三司長孫儉入據金城帝紿儉云城中埋金千斤欲以相贈儉乃將帝入城帝因述詧見辱之狀謂儉曰向聊相紿欲言此耳豈有天子自埋金乎儉乃留帝於主衣厙帝性殘忍且懲髙祖寛縱之弊故爲政尚嚴及魏師圍城獄中死囚且數千人有司請釋之以充戰士帝不許悉令棓殺之事未成而城䧟中書郎殷不害先於别所督戰城陷失其母時氷雪交積凍死者填滿溝塹不害行哭於道求其母尸無所不至見溝中死人輙投下捧視舉體凍濕水漿不入口號泣不輟聲如是七日乃得之十二月丙辰徐丗譜任約退戍巴陵于謹逼帝使爲書召王僧辯帝不可使者曰王今豈得自由帝曰我旣不自由僧辯亦不由我又從長孫儉求宫人王氏茍氏及幼子犀首儉並還之或問何意焚書帝曰讀書萬卷猶有今日故焚之庚申齊主北廵至達速嶺行視山川險要將起長城辛未帝爲魏人所殺梁王詧遣尚書傅凖監刑以土囊隕之詧使以布帊纏尸歛以蒲席束以白茅葬於津陽門外并殺愍懷太子元良始安王方略桂陽王大成等丗祖性好書常令左右讀書晝夜不絶雖熟睡卷猶不釋或差誤及欺之帝輙驚寤作文章援筆立就常言我韜於文士愧於武夫論者以爲得言魏立梁王詧爲梁主資以荆州之地延袤三百里仍取其雍州之地詧居江陵東城魏置防主將兵居西城名曰助防外示助詧僃禦内實防之以前儀同三司王恱留鎭江陵于謹收府庫珍寳及宋渾天儀梁銅晷表大玉徑四尺及諸灋物盡俘王公以下及選百姓男女數萬口爲奴婢分賞三軍驅歸長安小弱者皆殺之得免者三百餘家而人馬所踐及凍死者什二三魏師之在江陵也梁王詧將尹德毅􅀃詧曰魏虜貪惏肆其殘忍殺掠士民不可勝紀江東之人塗炭至此咸謂殿下爲之殿下旣殺人父兄􅀌人子弟人盡讎也誰與爲國今魏之精銳盡萃於此􅀂殿下爲設享㑹請于謹等爲歡預伏武士因而斃之分命諸將掩其營壘大殱羣醜俾無遺類收江陵百姓撫而安之文武羣寮隨材銓授魏人懾息未敢送死王僧辯之徒折簡可致然後朝服濟江入踐皇極晷刻之間大功可立古人云天與不取反受其咎願殿下恢弘逺略勿懐匹夫之行詧曰鄕此策非不善也然魏人待我厚未可背德􅀂遽爲卿計人將不食吾餘旣而闔城老幼􅀍虜又失襄陽詧乃歎曰恨不用尹德毅之言王僧辯陳霸先等共奉江州刺史􅀳王安方智爲太宰承制王襃王克劉㲄宗懔殷不害及尚書右丞呉興沈烱至長安太師㤗皆厚禮之泰親至于謹第宴勞極歡賞謹奴婢千口及梁之寶物并雅樂一部别封新野公謹固辭不許謹自以乆居重任功名旣立欲保優閑乃上先所乗駿馬及所著鎧甲等泰識其意曰今巨猾未平公豈得遽爾獨善遂不受是歳魏秦州刺史章武孝公宇文導卒魏加益州刺史尉遟㢠督六州通前十八州自劒閣以南得承制封拜及黜陟㢠明賞罰布威恩綏輯新民經略末附華夷懷之資治通鑑卷第一百六十五
