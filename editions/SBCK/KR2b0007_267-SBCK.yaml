  text: 資治通鑑卷第二百六十七
  hash: sha256:0dad11bb0337306b6df525d6573dad2d6f65e0cf6f892cd3358de69512cef199
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0007_SBCK_267-1a}
body:
  text: 臣司馬光奉勑編集後梁紀二協洽二月凡二年有奇起著雍執徐八月盡重光太祖神武元聖孝皇帝中開平二年八月吳越王鏐遣寧國節度使王景仁奉表詣大梁陳取淮南之䇿景仁即茂章也避梁諱改焉淮南遣步軍都指揮使周本南面統軍使吕師造擊吳越九月圍蘇州吳越將張仁保攻常州之東洲拔之淮南兵死者萬餘人淮南以池州團練使陳璋為水陸行營都招討使帥柴再用等諸將救東洲大破仁保於魚蕩復取東洲柴再用方戰舟壞長矟浮之僅而得濟家人為之飯僧千人再用悉取其食以犒部兵曰士卒濟我僧何力焉丙子蜀立皇后周氏后許州人也晉周德威李嗣昭將兵三萬出隂地關攻晉州刺史徐懐玉拒守帝自將救之丁丑發大梁乙酉至陜州戊子岐王所署延州節度使胡敬璋冦上平關劉知俊擊破之周德威等聞帝將至乙未退保隰州荆南節度使高季昌遣兵屯漢口絶楚朝貢之路楚王殷遣其將許德勲將水軍擊之至沙頭季昌懼而請和殷又遣步軍都指揮使吕師周將兵擊嶺南與清海節度使劉隱十餘戰取昭賀梧䝉龔富六州殷土宇旣廣乃養士息民湖南遂安冬十月蜀主立後宫張氏為貴妃徐氏為賢妃其妹為德妃張氏郪人宗懿之母也二徐耕之女也華原賊帥温韜聚衆嵯峨山􅁀掠雍州諸縣唐帝諸陵發之殆徧庚戌蜀主講武於星宿山步騎三十萬丁巳帝還大梁辛酉以劉隱為清海靜海節度使以膳部郎中趙光裔右補闕李殷衡充官告使隱皆留之光裔光逢之弟殷衡德裕之孫也依政進士梁震唐末登第至是歸蜀過江陵高季昌愛其才識留之欲奏為判官震恥之欲去恐及禍乃曰震素不慕榮宦明公不以震為愚必欲使之參謀議但以白衣侍樽俎可也何必在幕府季昌許之震終身止稱前進士不受高氏辟署季昌甚重之以為謀主呼曰先輩帝從吳越王鏐之請以毫州團練使寇彦卿為東南靣行營都指揮使擊淮南十一月彦卿帥衆二千襲霍丘為土豪朱景所敗又攻廬壽二州皆不勝淮南遣滁州刺史史儼拒之彦卿引歸定難節度使李思諫卒甲戌其子彞昌目為留後劉守文舉滄德兵攻幽州劉守光求救於晉晉王遣兵五千助之丁亥守文兵至盧臺軍為守光所敗又戰玉田亦敗守文乃還癸巳中書侍郎同平章事張策以刑部尚書致仕以左僕射楊涉同平章事保塞節度使胡敬璋卒靜難節度使李繼徽以其將劉萬子代鎮延州是歲􅀪農王遣軍將萬全感齎書間道詣晉及岐告以嗣位帝將遷都洛陽三年春正月己巳遷太廟神主於洛陽甲戌帝發大梁壬申以愽王友文為東都留守己卯帝至洛陽庚寅饗太廟辛卯祀圓丘大赦丙申以用度稍充初給百官全俸二月丁酉朔日有食之保塞節度使劉萬子􅁀虐失衆心且謀貳於梁李繼徽使延州牙將李延實圖之延實因萬子葬胡敬璋攻而殺之遂據延州馬軍都指揮使河西高萬興與弟萬金聞變以其衆數千人詣劉知俊降岐王置翟州於鄜城其守將亦降三月甲戌帝發洛陽以山南東道節度使楊師厚兼潞州行營四靣招討使庚辰帝至河中發步騎㑹高萬興兵取丹延丙戌以朔方節度使兼中書令韓遜為潁川王遜本靈州牙校唐末據本鎮朝廷因而授以節􅃏辛卯丹州刺史崔公實請降徐温以金陵形勝戰艦所聚乃自以淮南行軍副使領昇州刺史留廣陵以其假子元從指揮使知誥為昇州防遏兼樓船副使往治之夏四月丙申朔劉知俊移軍攻延州李延實嬰城自守知俊遣白水鎮使劉儒分兵圍坊州庚子以王審知為閩王劉隱為南平王劉知俊克延州李延實降淮南兵圍蘇州推洞屋攻城吳越將臨海孫琰置輪於竿首垂絙投錐以揭之攻者盡露礮至則張網以拒之淮南人不能克吳越王鏐遣牙内指揮使錢鏢行軍副使杜建徽等將兵救之蘇州有水通城中淮南張網綴鈴懸水中魚鼈過皆知之吳越遊奕都虞候司馬福欲潛行入城故以竿觸網敵聞鈴聲舉網福因得過凡居水中三日乃得入城由是城中號令與援兵相應敵以為神吳越王鏐嘗遊府園見園卒陸仁章樹蓺有智而志之及蘇州被圍使仁章通信入城果得報而返鏐以諸孫畜之累遷兩府軍糧都監使卒獲其用仁章睦州人也辛亥吳越兵内外合擊淮南兵大破之擒其將何朗等三十餘人奪戰艦二百艘周本夜遁又追敗之於皇天蕩鍾泰章將精兵二百為殿多樹旗幟於菰蔣中追兵不敢進而還岐王所署保大節度使李彥博坊州刺史李彥昱皆弃城奔鳳翔鄜州都將嚴􅀪倚舉城降己未以高萬興為保塞節度使以絳州刺史牛存節為保大節度使淮南初置選舉以駱知祥掌之五月丁卯帝命劉知俊乗勝取邠州知俊難之辭以闕食乃召還佑國節度使王重師鎮長安數年帝在河中怒其貢奉不時己巳召重師入朝以左龍虎統軍劉捍為佑國留後癸酉帝發河中己卯至洛陽劉捍至長安王重師不為禮捍譛之於帝云重師潛與邠岐通甲申貶重師溪州刺史尋賜自盡夷其族劉守文頻年攻劉守光不克力大發兵以重賂招契丹吐谷渾之衆合四萬屯薊州守光逆戰於雞蘇為守文所敗守丈單馬立於陳前泣謂其衆曰勿殺吾弟守光將元行欽識之直前擒之滄德兵皆潰守光囚之别室栫以藂棘乗勝進攻滄州滄州節度判官吕兖孫鶴推守文子延祚為帥乘城拒守兖安次人也忠武節度使兼侍中劉知俊功名浸盛以帝猜忍日甚内不自安及王重師誅知俊益懼帝將伐河東急徵知俊入朝欲以為河東西面行營都統且以知俊有丹延之功厚賜之知俊弟右保勝指揮使知浣從帝在洛陽密使人語知俊云入必死又白帝請帥弟姪往迎知俊帝許之六月乙未朔知俊奏稱爲軍民所留遂以同州附於岐執監軍及將佐之不從者皆械送於岐遣兵襲華州逐刺史蔡敬思以兵守潼關濳遣人以重利㗖長安諸將執劉捍送於岐殺之知俊遣使請兵於岐亦遣使請晉人出兵攻晉絳遺晉王書曰不過旬日可取兩京復唐社稷丁未朔方節度使韓遜奏克鹽州斬岐所署刺史李繼直帝遣近臣諭劉知俊曰朕待卿甚厚何忽相負對曰臣不背德但畏族滅如王重師耳帝復使謂之曰劉捍言重師隂結邠岐朕今悔之無及捍死不足塞責知俊不報庚戌詔削知俊官爵以山南東道節度使楊師厚為西路行營招討使帥侍衛馬步軍都指揮使劉鄩等討之辛亥帝發洛陽劉鄩至潼關東獲劉知俊伏路兵藺如海等三十人釋之使為前導劉知浣迷失道盤􅁊數日乃至關下關吏納之如海等繼至關吏不知其已被擒亦納之鄩兵乗門開直進遂克潼關追及知浣擒之癸丑帝至陜丹州馬軍都頭王行思等作亂刺史宋知誨逃歸帝遣劉知俊姪嗣業持詔詣同州招諭知俊知俊欲輕騎詣行在謝罪弟知偃止之楊師厚等至華州知俊將聶賞開門降知俊聞潼關不守官軍繼至蒼黃失圖乙卯夜舉族奔岐楊師厚至長安岐兵已據城師厚以竒兵並南山急趨自西門入遂克之庚申以劉鄩權佑國留後歧王厚禮劉知俊以為中書令地狹無藩鎮處之但厚給俸祿而已劉守光遣使上表告捷且言俟滄德事畢為陛下掃除并冦亦致書晉王云欲與之同破偽梁撫州刺史危全諷自稱鎮南節度使帥撫信袁吉之兵號十萬攻洪州淮南守兵纔千人將吏皆懼節度使劉威密遣使告急於廣陵日召僚佐宴飲全諷聞之屯象牙潭不敢進請兵於楚楚王殷遣指揮使苑政㑹袁州刺史彭彥章圍高安以助全諷玫蔡州人彥章玕之兄也徐温問將於嚴可求可求薦薦周本乃以本為西南面行營招討應援使將兵七千救高安本以前攻蘇州無功稱疾不出可求即其臥内强起之本曰蘇州之役敵不能勝我但主將權輕耳今必見用願無置副貳乃可可求許之本曰楚人為全諷聲援耳非欲取高安也吾敗全諷援兵必還乃疾趣象牙潭過洪州劉威欲犒軍本不肯留或曰全諷兵彊君宜觀形勢然後進本曰賊衆十倍於我我軍聞之必懼不若乗其鋭而用之秋七月甲子以劉守光為燕王梁兵克丹州擒王行思商州刺史李稠驅士民西走將吏追斬之推都押牙李玫主州事庚午改佑國軍曰永平河東兵冦晉州抄掠至堯祠而去癸酉帝發陜州乙亥至洛陽寢疾初帝召山南東道節度使楊師厚欲使督諸將攻潞州以前兖海留後王班為留後鎮襄州師厚屢為班言牙兵王求等凶悍宜備之班自恃左右有壯士不以為意每衆辱之戊寅讁求戍西境是夕作亂殺班推都指揮使雍丘劉玘為留後玘偽從之明日與指揮使王延順逃詣帝所亂兵奉平淮指揮使李洪為留後附于蜀未幾房州刺史楊虔亦叛附于蜀危全諷在象牙潭營柵臨溪亘數十里庚辰周本隔溪布陳先使羸兵嘗敵全諷兵涉溪追之本乗其半濟縱兵擊之全諷兵大潰自相蹂藉溺水死者甚衆本分兵斷其歸路擒全諷及將士五千人乗勝克袁州執刺史彭彥章進攻吉州歙州刺史陶雅使其子敬昭及都指揮使徐章將兵襲饒信信州刺史危仔倡請降饒州刺史唐寶弃城走行營都指揮使米志誠都尉吕師造等敗苑玫於上高吉州刺史彭玕帥衆數千人奔楚楚王殷表玕為郴州刺史為子希範娶其女淮南以左先鋒指揮使張景思知信州遣行營都虞候骨言將兵五千送之危仔倡聞兵至奔吳越吳越王鏐以仔倡為淮南節度副使更其姓曰元氏危全諷至廣陵􅀪農王以其嘗有德於武忠王釋之資給甚厚八月䖍州刺史盧光稠以州附于淮南於是江西之地盡入于楊氏光稠亦遣使附於梁甲寅上疾小瘳始復視朝以鎮國節度使康懷貞為西路行營副招討使蜀主命太子宗懿判六軍開永和府妙選朝士為僚屬辛酉均州刺史張敬方奏克房州岐王欲遣劉知俊將兵攻靈夏且約晉王使攻晉絳晉王引兵南下先遣周德威等將兵出隂地關攻晉州刺史邊繼威悉力固守晉兵穿地道陷城二十餘步城中血戰拒之一夕城復成詔楊師厚將兵救晉州周德威以騎扼䝉阬之險師厚擊破之進抵晉州晉兵解圍遁去李洪冦荆南高季昌遣其將倪可福擊敗之詔馬步都指揮使陳暉將兵㑹荆南兵討洪蜀主以御史中丞王鍇為中書侍郎同平章事陳暉軍至襄州李洪逆戰大敗王求死九月丁酉拔其城斬叛兵千人執李洪楊虔等送洛陽斬之丁未以保義節度使王檀為潞州東面行營招討使劉守光奏遣其子中軍兵馬使繼威安撫滄州吏民戊申以繼威為義昌留後辛亥侍中韓建罷守太保左僕射同平章事楊涉罷守本官以太常卿趙光逢為中書侍郎翰林奉㫖工部侍郎杜曉為户部侍郎並同平章事曉讓能之子也淮南遣使者張知逺脩好於福建知逺倨慢閩王審知斬之表上其書始與淮南絶審知性儉約常躡麻屨府舍卑陋未嘗營葺寛刑薄賦公私富實境内以安嵗自海道登萊入貢没溺者什四五冬十月甲子蜀司天監胡秀林獻永昌曆行之湖州刺史高灃性凶忍嘗召州吏議曰吾欲盡殺百姓可乎吏曰如此則租賦何從出當擇可殺者殺之耳時灃糾民為兵有言其咨怨者灃悉集民兵于開元寺紿云犒享入則殺之死者踰半在外者覺之縱火作亂灃閉城大索凡殺三千人吳越王鏐欲誅之戊辰灃以州叛附於淮南舉兵焚義和臨平鎮鏐命指揮使錢鏢討之十一月甲午帝告謝于圓丘戊戌大赦鄴王羅紹威得風痺病上表稱魏故大鎮多外兵願得有功重臣鎮之臣乞骸骨歸第帝聞之撫案動容己亥以其子周翰為天雄節度副使知府事謂使者曰亟歸語而主為我彊飯如有不可諱當世世貴爾子孫以相報也今使周翰領軍府尚冀爾復愈耳岐王欲取靈州以處劉知俊且以為牧馬之地使知俊自將兵攻之朔方節度使韓遜遣使告急詔鎮國節度使康懐貞感化節度使冦彥卿將兵攻邠寧以救之懐貞等所向皆捷克寧衍二州拔慶州南城刺史李彥廣出降遊兵侵掠及涇州之境劉知俊聞之十二月己丑解靈州圍引兵還帝急召懐貞等還遣兵迎援於三原青谷懐貞等還至三水知俊遣兵據險邀之左龍驤軍使壽張王彥章力戰懐貞等乃得過懐貞與禆將李德遇許從實王審權分道而行皆與援兵不相值至昇平劉知俊伏兵山口懐貞大敗僅以身免德遇等軍皆沒岐王以知俊為彰義節度使鎮涇州王彥章驍勇絶倫每戰用二鐵槍皆重百斤一置鞍中一在手所向無前時人謂之王鐵槍蜀蜀州刺史王宗弁稱疾罷歸成都杜門不出蜀主疑其矜功怨望加檢校太保固辭不受謂人曰廉者足而不憂貪者憂而不足吾小人致位至此足矣豈可求進不已乎蜀主嘉其志而許之賜與有加劉守光圍滄州久不下執劉守文至城下示之猶固守城中食盡民食堇泥軍士食人驢馬相噉騣尾吕兖選男女羸弱者飼以麴麫而烹之以給軍食謂之宰殺務四年春正月乙未劉延祚力盡出降時劉繼威尚幼守光使大將張萬進周知裕輔之鎮滄州以延祚及其將佐歸幽州族吕兖而釋孫鶴兖子琦年十五門下客趙玉紿監刑者曰此吾弟也勿妄殺監刑者信之遂挈以逃琦足痛不能行玉負之變姓名乞食於路僅而得免琦感家門殄滅力學自立晉王聞其名署代州判官辛丑以盧光稠為鎮南留後劉守光為其父仁恭請致仕丙午以仁恭為太師致仕守光尋使人濳殺其兄守文歸罪於殺者而誅之二月萬全感自岐歸廣陵岐王承制加􅀪農王兼中書令嗣吳王於是吳王赦其境内高灃求救於吳吳常州刺史李簡等將兵應之湖州將盛師友沈行思閉城不内灃帥麾下五千人奔吳三月癸巳吳越王鏐廵湖州以錢鏢為刺史蜀太子宗懿驕暴好陵傲舊臣内樞密使唐道襲蜀主之嬖臣也太子屢謔之於朝由是有隙互相訴於蜀主蜀主恐其交惡以道襲為山南西道節度使同平章事道襲薦宣徽北院使鄭頊為内樞密使頊受命之日即欲按道襲昆弟盜用内庫金帛道襲懼奏頊褊急不可大任丙午出頊為果州刺史以宣徽南院使潘炕為内樞密使夏州都指揮使高宗益作亂殺節度使李彞昌將吏共誅宗益推彞昌族父蕃漢都指揮使李仁福為帥癸丑仁福以聞夏四月甲子以仁福為定難節度使丁卯宋州節度使衡王友諒獻瑞麥一莖三穗帝曰豐年為上瑞今宋州大水安用此為詔除本縣令名遣使詰責友諒以兖海留後惠王友能代為宋州留後友諒友能皆全昱子也帝以晉州刺史下邑華温琪拒晉兵有功欲賞之㑹護國節度使冀王友謙上言晉絳邊河東乞别建節鎮壬申以晉絳沁三州為定昌軍以温琪為節度使左金吾大將軍冦彥卿入朝至天津橋有民不避道投諸欄外而死彥卿自首於帝帝以彥卿才幹有功久在左右命以私財遺死者家以贖罪御史司憲崔沂劾奏彥卿殺人闕下請論如灋帝命彥卿分析彥卿對令從者舉置欄外不意誤死帝欲以過失論沂奏在灋以勢力使令為首下手為從不得歸罪從者不鬬而故敺傷人加傷罪一等不得為過失辛巳責授彥卿遊擊將軍左衛中郎將彥卿揚言有得崔沂首者賞錢萬緡沂以白帝帝使人謂彥卿崔沂有毫髪傷我當族汝時功臣驕横由是稍肅沂沆之弟也五月吳徐温母周氏卒將吏致祭為偶人高數尺衣以羅錦温曰此皆出民力奈何施於此而焚之冝解以衣貧者未幾起復為内外馬步都軍使領潤州觀察使岐王屢求貨於蜀蜀主皆與之又求巴劒二州蜀主曰吾奉茂貞勤亦至矣若與之地是弃民也寧多與之貨乃復以絲茶布帛七萬遺之己亥以劉繼威為義昌節度使癸丑天雄節度使兼中書令鄴貞莊王羅紹威卒詔以其子周翰為天雄留後匡國節度使長樂忠敬王馮行襲疾篤表請代者許州牙兵二千皆秦宗權餘黨帝深以為憂六月庚戌命崇政院直學士李珽馳往視行襲病曰善諭朕意勿使亂我近鎮珽至許州謂將吏曰天子握百萬兵去此數舍耳馮公忠純勿使上有所疑汝曹赤心奉國何憂不富貴由是衆莫敢異議行襲欲使人代受詔珽曰東首加朝服禮也乃即臥内宣詔謂行襲曰公善自輔養勿視事此子孫之福也行襲泣謝遂解兩使印授珽使代掌軍府帝聞之曰予固知珽能辦事馮族亦不亡矣庚辰行襲卒甲申以李珽權知匡國留後悉以行襲兵分􅀠諸校冒馮姓者皆還宗楚王殷求為天䇿上將詔加天䇿上將軍殷始開天䇿府以弟賨為左相存為右相殷遣將侵荆南軍于油口高季昌擊破之斬首五千級逐北至白田而還吳水軍指揮使敖駢圍吉州刺史彭玗弟瑊於赤石楚兵救瑊虜駢以歸秋七月戊子朔蜀門下侍郎兼吏部尚書同平章事韋莊卒吳越王鏐表宦者周延誥等二十五人唐末避禍至此非劉韓之黨乞原之上曰此屬吾知其無罪但今革弊之初不欲置之禁掖可且留於彼諭以此意岐王與邠涇二帥各遣使告晉請合兵攻定難節度使李仁福晉王遣振武節度使周德威將兵㑹之合五萬衆圍夏州仁福嬰城拒守八月以劉守光兼義昌節度使鎮定自帝踐祚以來雖不輸常賦而貢獻甚勤㑹趙王鎔母何氏卒庚申遣使弔之且授起復官時鄰道弔客皆在館使者見晉使歸言於帝曰鎔濳與晉通鎮定勢彊終恐難制帝深然之壬戌李仁福來告急甲子以河南尹兼中書令張宗奭為西京留守帝恐晉兵襲西京以宣化留後李思安為東北面行營都指揮使將兵萬人屯河陽丙寅帝發洛陽己巳至陜辛未以鎮國節度使楊師厚為西路行營招討使㑹感化節度使康懐貞將兵三萬屯三原帝憂晉兵出澤州逼懐州旣而聞其在綏銀磧中曰無足慮也甲申遣夾馬指揮使李遇劉綰自鄜延趨銀夏邀其歸路吳越王鏐築捍海石唐廣杭州城大脩臺館由是錢塘富庶盛於東南九月己丑上發陜甲午至洛陽疾復作李遇等至夏州岐晉兵皆解去冬十月遣鎮國節度使楊師厚相州刺史李思安將兵屯澤州以圖上黨吳越王鏐之廵湖州也留沈行思為廵檢使與盛師友俱歸行思謂同列陳瓌曰王若以師友為刺史何以處我時瓌已得鏐密㫖遣行思詣府乃紿之曰何不自詣王所論之行思從之旣至數日瓌送其家亦至行思恨瓌賣己璆自衣錦軍歸將吏迎謁行思取鍛鎚擊瓌殺之因詣鏐與師友論功奪左右槊欲刺師友衆執之鏐斬行思以師友為婺州刺史十一月己丑以寧國節度使同平章事王景仁充北面行營都指揮招討使潞州副招討使韓勍副之以李思安為先鋒將趣上黨尋遣景仁等屯魏州楊師厚還陜蜀主更太子宗懿名曰元坦庚戌立假子宗裕為通王宗範為䕫王宗鐬為昌王宗壽為嘉王宗翰為集王立其子宗仁為普王宗輅為雅王宗紀為襃王宗智為榮王宗澤為興王宗鼎為彭王宗傑為信王宗衍為鄭王初唐末宦官典兵者多養軍中壯士為子以自彊由是諸將亦効之而蜀主尤多惟宗懿等九人及宗特宗平真其子宗裕宗鐬宗壽皆其族人宗翰姓孟蜀主之姉子宗範姓張其母周氏為蜀主妾自餘假子百二十人皆功臣雖冒姓連名而不禁昏姻上疾小愈辛亥校獵於伊洛之間上疑趙王鎔貳於晉且欲因鄴王紹威卒除移鎮定㑹燕王守光發兵屯淶水欲侵定州上遣供奉官杜廷隱丁延徽監魏愽兵三千分屯深冀聲言恐燕兵南冦助趙守禦又云分兵就食趙將石公立戍深州白趙王鎔請拒之鎔遽命開門移公立於外以避之公立出門指城而泣曰朱氏滅唐社稷三尺童子知其為人而我王猶恃姻好以長者期之此所謂開門揖盜者也惜乎此城之人今為虜矣梁人有亡奔真定以其謀告鎔者鎔大懼又不敢先自絶但遣使詣洛陽訴稱燕兵已還與定州講和如故深冀民見魏愽兵入奔走驚駭乞召兵還上遣使詣真定慰諭之未幾廷隱等閉門盡殺趙戍兵乘城拒守鎔始命石公立攻之不克乃遣使求援於燕晉鎔使者至晉陽義武節度使王處直使者亦至欲共推晉王為盟主合兵攻梁晉王㑹將佐謀之皆曰鎔久臣朱温嵗輸重賂結以昏姻其交深矣此必詐也宜徐觀之王曰彼亦擇利害而為之耳王氏在唐世猶或臣或叛况肯終為朱氏之臣乎彼朱温之女何如壽安公主今救死不贍何顧昏姻我若疑而不救正墮朱氏計中宜趣發兵赴之晉趙叶力破梁必矣乃發兵遣周德威將之出井陘屯趙州鎔使者至幽州燕王守光方獵幕僚孫鶴馳詣野謂守光曰趙人來乞師此天欲成王之功業也守光曰何故對曰比常患其與朱温膠固温之志非盡吞河朔不已今彼自為讎敵王若與之并力破梁則鎮定皆斂衽而朝燕矣王不早出師但恐晉人先我矣守光曰王鎔數負約今使之與梁自相弊吾可以坐承其利又何救焉趙使者交錯於路守光竟不為出兵自是鎮定復稱唐天祐年號復以武順為成德軍司天言來月太隂虧不利宿兵於外上召王景仁等還洛陽十二月己未上聞趙與晉合晉兵巳屯趙州乃命王景仁等將兵擊之庚申景仁等自河陽度河㑹羅周翰兵合四萬軍于邢洺䖍州刺史盧光稠疾病欲以位授譚全播全播不受光稠卒其子韶州刺史延昌來奔喪全播立而事之吳遣使拜延昌䖍州刺史延昌受之亦因楚王殷通密表於梁曰我受淮南官以緩其謀耳必為朝廷經略江西丙寅以延昌為鎮南留後延昌表其將廖爽為韶州刺史爽贑人也吳淮南節度判官嚴可求請置制置使於新淦縣遣兵戍之以圖䖍州每更代輒濳益其兵䖍人不之覺也庚午蜀主以御史中丞周庠戸部侍郎判度支庾傳素並為中書侍郎同平章事太常卿李燕等刋定梁律令格式癸酉行之丁丑王景仁等進軍柏鄉辛巳蜀大赦改明年元曰永平趙王鎔復告急於晉晉王以蕃漢副總管李存審守晉陽自將兵自贊皇東下王處直遣將將兵五千以從辛巳晉王至趙州與周德威合獲梁芻蕘者二百人問之曰初發洛陽梁主有何號令對曰梁主戒上將云鎮州反覆終為子孫之患今悉以精兵付汝鎮州雖以鐵為城必為我取之晉王命送於趙壬午晉王進軍距柏鄉三十里遣周德威等以胡騎迫梁營挑戰梁兵不出癸未復進距柏鄉五里營於野河之北又遣胡騎廹梁營馳射且詬之梁將韓勍等將步騎三萬分三道追之鎧胄皆被繒綺鏤金銀光彩􅋑耀晉人望之奪氣周德威謂李存璋曰梁人志不在戰徒欲曜兵耳不挫其鋭則吾軍不振乃徇于軍曰彼皆汴州天武軍屠酤傭販之徒耳衣鎧雖鮮十不能當汝一擒獲一夫足以自富此乃竒貨不可失也德威自帥精騎千餘擊其兩端左馳右突出入數四俘獲百餘人且戰且却距野河而止梁兵亦退德威言於晉王曰賊勢甚盛宜按兵以待其衰王曰吾孤軍逺來救人之急三鎮烏合利於速戰公乃欲按兵持重何也德威日鎮定之兵長於守城短於野戰且吾所恃者騎兵利於平原廣野可以馳突今壓賊壘門騎無所展其足且衆寡不敵使彼知吾虛實則事危矣王不悦退卧帳中諸將莫敢言德威往見張承業曰大王驟勝而輕敵不量力而務速戰今去賊咫尺所限者一水耳彼若造橋以薄我我衆立盡矣不若退軍高邑誘賊離營彼出則歸彼歸則出别以輕騎掠其饋餉不過踰月破之必矣承業入褰帳撫王曰此豈王安寢時邪周德威老將知兵其言不可忽也王蹶然而興曰予方思之時梁兵閉壘不出有降者詰之曰景仁方多造浮橋王謂德威曰果如公言是日拔營退保高邑辰州蠻酋宋鄴漵州蠻酋潘金盛恃其所居深險數擾楚邊至是鄴冦湘鄉金盛冦武岡楚王殷遣昭州刺史吕師周將衡山兵五千討之寧逺節度使龐巨昭高州防禦使劉昌魯皆唐官也黃巢之冦嶺南也巨昭為容管觀察使昌魯為高州刺史帥羣蠻據險以拒之巢衆不敢入境唐嘉其功置寧逺軍於容州以巨昭為節度使以昌魯為高州防禦使及劉隱據嶺南二州不從隱遣弟巖攻高州昌魯大破之又攻容州亦不克昌魯自度終非隱敵是嵗致書請自歸於楚楚王殷大喜遣横州刺史姚彥章將兵迎之彥章至容州禆將莫彥昭説巨昭曰湖南兵逺來疲乏宜撤儲偫弃城濳於山谷以待之彼必入城我以全軍掩之彼外無繼援可擒也巨昭曰馬氏方興今雖勝之後將何如不若具牛酒迎之彦昭不從巨昭殺之舉州迎降彥章進至高州以兵援送巨昭昌魯之族及士卒千餘人歸長沙楚王殷以彥章知容州事以昌魯為永順節度副使昌魯鄴人也乾化元年春正月丙戌朔日有食之柏鄉比不儲芻梁兵刈芻自給晉人以遊軍抄之梁兵不出周德威使胡騎環營馳射而詬之梁兵疑有伏愈不敢出剉屋茅坐席以飼馬馬多死丁亥周德威與别將史建瑭李嗣源將精騎三千壓梁壘門而詬之王景仁韓勍怒悉衆而出德威等轉戰而北至高邑南李存璋以步兵陳於野河之上梁兵横亘數里競前奪橋鎮定步兵禦之勢不能支晉王謂匡衛都指揮使李建及曰賊過橋則不可復制矣建及選卒二百援搶大譟力戰却之建及許州人姓王李罕之之假子也晉王登高丘以望曰梁兵爭進而囂我兵整而靜我必勝戰自己至午勝負未決晉王謂周德威曰兩軍已合勢不可離我之興亡在此一舉我為公先登公可繼之德威叩馬而諌曰觀梁兵之勢可以勞逸制之未易以力勝也彼去營三十餘里雖挾糗糧亦不暇食日昳之後飢渴内迫矢刃外交士卒勞倦必有退志當是時我以精騎乘之必大捷於今未可也王乃止時魏滑之兵陳於東宋汴之兵陳於西至晡梁軍未食士無鬬志景仁等引兵稍却周德威疾呼曰梁兵走矣晉兵大譟爭進魏滑兵先退李嗣源帥衆譟於西陳之前曰東陳已走爾何久留梁兵互相驚怖遂大潰李存璋引步兵乘之呼曰梁人亦吾人也父兄子弟餉軍者勿殺於是戰士悉解甲投兵而弃之囂聲動天地趙人以深兾之憾不顧剽掠但奮白刃追之梁之龍驤神捷精兵殆盡自野河至柏鄉僵尸蔽地王景仁韓勍李思安以數十騎走晉兵夜至柏鄉梁軍已去弃糧食資財器械不可勝計凡斬首二萬級李嗣源等追奔至邢州河朔大震保義節度使王檀嚴備然後開城納敗卒給以資糧散遣歸本道晉王收兵屯趙州杜廷隱等聞梁兵敗弃深冀而去悉驅二州丁壯為奴婢老弱者阬之城中存者壞垣而已癸巳復以楊師厚為北面都招討使將兵屯河陽收集散兵旬餘得萬人己亥晉王遣周德威史建瑭將三千騎趣澶魏張承業李存璋以步兵攻邢州自以大軍繼之移檄河北州縣諭以利害帝遣别將徐仁溥將兵千人自西山夜入邢州助王檀城守己酉罷王景仁招討使落平章事蜀主之女普慈公主嫁岐王從子秦州節度使繼崇公主遣宦者宋光嗣以絹書遺蜀主言繼崇驕矜嗜酒求歸成都蜀主召公主歸寧辛亥公主至成都蜀主留之以宋光嗣為閤門南院使岐王怒始與蜀絶光嗣福州人也吕師周引兵攀藤緣崖入飛山洞襲潘金盛擒送武岡斬之移兵擊宋鄴二月己未晉王至魏州攻之不克上以羅周翰年少且忌其舊將佐庚申以户部尚書李振為天雄節度副使命杜廷隱將兵千人衛之自楊劉濟河間道夜入魏州助周翰城守癸亥晉王觀河於黎陽梁兵萬餘將度河聞晉王至皆弃舟而去帝召蔡州刺史張慎思至洛陽久未除代蔡州右廂指揮使劉行琮作亂縱兵焚掠將奔淮南順化指揮使王存儼誅行琮撫遏其衆自領州事以衆情馳奏時東京留守博王友文不先請遽發兵討之兵至鄢陵帝曰存儼方懼若臨之以兵則飛去矣馳使召還甲子授存儼權知蔡州事乙丑周德威自臨清攻貝州拔夏津高唐攻博州拔東武朝城攻澶州刺史張可臻弃城走帝斬之德威進攻黎陽拔臨河淇門逼衛州掠新鄉共城庚午帝帥親軍屯白司馬阪以備之盧龍義昌節度使兼中書令燕王守光旣克滄州自謂得天助淫虐滋甚每刑人必置諸鐵籠以火逼之又為鐵刷刷人面聞梁兵敗於柏鄉使人謂趙王鎔及王處直曰聞二鎮與晉王破梁兵舉軍南下僕亦有精騎三萬欲自將之為諸公啓行然四鎮連兵必有盟主僕若至彼何以處之鎔患之遣使告于晉王晉王笑曰趙人告急守光不能出一卒以救之及吾成功乃復欲以兵威離間二鎮愚莫甚焉諸將曰雲代與燕接境彼若擾我城戍動搖人情吾千里出征緩急難應此亦腹心之患也不若先取守光然後可以專意南討王曰善㑹楊師厚自磁相引兵救邢魏壬申晉解圍去師厚追之逾漳水而還邢州圍亦解師厚留屯魏州趙王鎔自來謁晉王於趙州大犒將士自是遣其養子德明將三十七都常從晉王征討德明本姓張名文禮燕人也壬午晉王發趙州歸晉陽留周德威等將三千人戍趙州資治通鑑卷第二百六十七
