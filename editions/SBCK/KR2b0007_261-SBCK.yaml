front:
  text: 資治通鑑卷第二百六十一
  hash: sha256:df5bbd66cafcf00f8bca6738c978df68ed98e00d67cd4ebd105f66125a60cc9a
body:
  text: 臣司馬光奉勑編集唐紀七十七屠維協洽凡三年起強圉大荒落盡昭宗聖穆景文孝皇帝中之上乾寧四年春正月甲申韓建奏防城將張行思等告睦濟韶通彭韓儀陳八王謀殺臣劫車駕幸河中建惡諸王典兵故使行思等告之上大驚召建諭之建稱疾不入令諸王詣建自陳建表稱諸王忽詣臣理所不測事端臣詳酌事體不應與諸王相見又稱諸王當自避嫌疑不可輕爲舉措陛下若以友愛含容請依舊制令歸十六宅妙選師傅教以詩書不令典兵預政且曰乞散彼烏合之兵用光麟趾之化建慮上不從引麾下精兵圍行宫表䟽連上上不得巳是夕詔諸王所領軍士並縱歸田里諸王勒歸十六宅其甲兵並委韓建収掌建又奏陛下選賢任能足清禍亂何必别置殿後四軍緃有厚薄之恩乖無偏無黨之道且所聚皆坊市無賴姦猾之徒平居猶思禍變臨難必不爲用而使之張弓挾刃密邇皇輿臣竊寒心乞皆罷遣詔亦從之於是殿後四軍二萬餘人悉散天子之親軍盡矣捧日都頭李筠石門扈從功第一建復奏斬於大雲橋建又奏玄宗之末永王璘暫出江南遽謀不􅁤代宗時吐蕃入寇光啓中朱玫亂常皆援立宗支以繫人望今諸王衘命四方者乞皆召還又奏諸方士出入禁庭眩惑聖聽宜皆禁止無得入宫詔悉從之建既幽諸王於别第知上意不恱乃奏請立徳王爲太子欲以解之丁亥詔立徳王祐爲皇太子仍更名􅁉龐師古葛從周併兵攻鄆州朱瑄兵少食盡不復出戰但引水爲深壕以自固辛卯師古等營於水西􅀯命爲浮梁癸巳潛決濠水丙申浮梁成師古夜以中軍先濟瑄聞之弃城奔中都葛從周逐之野人執瑄及妻子以獻己亥罷孫偓鳯翔四面行營節度等使以副都統李思諌爲寧塞節度使錢鏐使行軍司馬杜稜救婺州安仁義移兵攻睦州不克而還朱全忠入鄆州以龐師古爲天平留後朱瑾留大將康懐貞守兖州與河東將史儼李承嗣掠徐州之境以給軍食全忠聞之遣葛從周將兵襲兖州懐貞聞鄆州巳失守汴兵奄至遂降二月戊申從周入兖州獲瑾妻子朱瑾還無所歸帥其衆趨沂州刺史尹處賔不納走保海州爲汴兵所逼與史儼李承嗣擁州民度淮奔楊行密行密逆之於髙郵表瑾領武寧節度使全忠納瑾之妻引兵還張夫人逆於封丘全忠以得瑾妻告之夫人請見之瑾妻拜夫人荅拜且泣曰兖鄆與司空同姓約爲兄弟以小故恨望起兵相攻使吾姒辱於此它日汴州失守吾亦如吾姒之今日乎全忠乃送瑾妻於佛寺爲尼斬朱瑄於汴橋於是鄆齊曹棣兖沂密徐􅀫陳許鄭滑濮皆入于全忠惟王師範保淄青一道亦服於全忠李存信在魏州聞兖鄆皆陷引兵還淮􅀯舊善水戰不知􅀐射及得河東兖鄆兵軍聲大振史儼李承嗣皆河東驍將李克用深惜之遣使閒道詣楊行密請之行密許之亦遣使詣克用修好戊午王建遣邛州刺史華洪彭州刺史王宗祐將兵五萬攻東川以戎州刺史王宗謹爲鳯翔西面行營先鋒使敗鳯翔將李繼徽等於玄武繼徽本姓楊名崇本茂貞之假子也己未赦天下上饗行廟庚申王建以决雲都知兵馬使王宗侃爲應援開峽都指揮使將兵八千趍渝州决勝都知兵馬使王宗阮爲開江防送進奉使將兵七千趨瀘州辛未宗侃取渝州降刺史牟崇厚癸酉宗阮拔瀘州斬刺史馬敬儒峽路始通鳯翔將李繼昭救梓州留偏將守劔門西川將王宗播擊擒之乙亥門下侍郎同平章事孫偓罷守本官中書侍郎同平章事朱朴罷爲祕書監朴既秉政所言皆不效外議沸騰太子詹事馬道殷以天文將作監許巖士以醫得幸於上韓建誣二人以罪而殺之且言偓朴與二人交通故罷相詔以楊行密爲江南諸道行營都統以討武昌節度使杜洪張佶克邵州擒蔣勛三月丙子朱全忠表曹州刺史葛從周爲泰寧留後朱友􅁉爲天平留後龐師古爲武寧留後保義節度使王珙攻護國節度使王珂珂求援於李克用珙求援於朱全忠宣武將張存敬楊師厚敗河中兵於猗氏􅀯河東將李嗣昭敗陜兵於猗氏又敗之於張店遂解河中之圍師厚斤溝人嗣昭克用弟克柔之假子也更名感義軍曰昭武治利州以前靜難節度使􅂫文建爲節度使夏四月以同州防禦使李繼瑭爲匡國節度使繼瑭茂貞之養子也以右諌議大夫李洵爲兩川宣諭使和解王建及顧彦暉辛亥錢鏐遣顧全武等將兵三千自海道救嘉興己未至城下擊淮􅀯兵大破之杜洪爲楊行密所攻求救於朱全忠全忠遣其將聶金掠泗州朱友恭攻黄州行密遣右黒雲都指揮使馬珣等救黄州黄州刺史瞿章聞友恭至弃城擁衆􅀯保武昌寨癸亥兩浙將顧全武等破淮􅀯十八營虜淮􅀯將士魏約等三千人淮􅀯將田頵屯驛亭埭兩浙兵乘勝逐之甲戍頵自湖州奔還兩浙兵追敗之頵衆死者千餘人韓建惡刑部尚書張禕等數人皆誣奏貶之五月加奉國節度使崔洪同平章事辛巳朱友恭爲浮梁於樊港進攻武昌寨壬午拔之執瞿章遂取黄州馬珣等皆敗走丙戌王建以節度副使張琳守成都自將兵五萬攻東川更華洪姓名曰王宗滌六月己酉錢鏐如越州受鎮東節􅃏李茂貞表王建攻東川連兵累歳不聽詔命甲寅貶建􅀯州刺史乙卯以茂貞爲西川節度使以覃王嗣周爲鳯翔節度使癸亥王建克梓州􅀯寨執其將李繼寧丙寅宣諭使李洵至梓州己巳見建于張杷砦建指執旗者曰戰士之情不可奪也覃王赴鎮李茂貞不受代圍覃王於奉天置寧逺軍於容州以李克用大將葢寓領節度使秋七月加荆􅀯節度使成汭兼侍中韓建移書李茂貞茂貞解奉天之圍覃王歸華州以天雄節度使李繼徽爲静難節度使庚戍錢鏐還杭州遣顧全武取􅂫州乙未拔松江戊戌拔無錫辛丑拔常熟華亭􅀄李克用取幽州表劉仁恭爲節度使留戍兵及腹心將十人典其機要租賦供軍之外悉輸晉陽及上幸華州克用徴兵於仁恭又遺成徳節度使王鎔義武節度使王郜書欲與之共定􅀜中奉天子還長安仁恭辭以契丹入寇須兵扞禦請俟虜退然後承命克用屢􅃐之使者相繼數月兵不出克用移書責之仁恭抵書於地慢罵囚其使者欲殺河東戍將戍將遁逃獲免克用大怒八月自將擊仁恭上欲幸奉天親討李茂貞令宰相議之宰相切諌乃止延王戒丕還晉陽韓建奏自陛下即位以來與近輔交惡皆因諸王典兵凶徒樂禍致鑾輿不安比者臣奏罷兵權實慮不測之變今聞延王覃王尚苞隂計願陛下聖斷不疑制於未亂則社稷之福上曰何至於是數日不報建乃與知樞密劉季述矯制發兵圍十六宅諸王􅀍髪或縁垣或登屋或升木呼曰宅家救兒建擁通儀睦濟韶彭韓陳覃延丹十一王至石隄谷盡殺之以謀反聞貶禮部尚書孫偓爲􅀯州司馬祕書監朱朴先貶夔州司馬再貶郴州司户朴之爲相何迎驟遷至右諌議大夫至是亦貶湖州司馬鍾傳欲討吉州刺史襄陽周琲琲帥其衆奔廣陵王建與顧彦暉五十餘戰九月癸酉朔圍梓州蜀州刺史周徳權言於建曰公與彦睴爭東川三年士卒疲於矢石百姓困於輸輓東川羣盜多據州縣彦暉懦而無謀欲爲偷安之計皆啗以厚利恃其救援故堅守不下今若遣人諭賊帥以禍福來者賞之以官不服者威之以兵則彼之所恃反爲我用矣建從之彦暉勢益孤徳權許州人也丁丑李克用至安塞軍辛巳攻之幽州將單可及引􅀐兵至克用方飲酒前鋒白賊至矣克用醉曰仁恭何在對曰但見可及輩克用瞋目曰可及輩何足爲敵亟命擊之是日大霧不辨人物幽州將楊師侃伏兵於木􅀲澗河東兵大敗失亡太半㑹大風雨震電幽州兵解去克用醒而後知敗責大將李存信等曰吾以醉廢事汝曹何不力爭湖州刺史李彦徽欲以州附於楊行密其衆不從彦徽奔廣陵都指揮使沈攸以州歸錢鏐以彰義節度使張璉爲鳯翔西北行營招討使以討李茂貞復以王建爲西川節度使同平章事加義武節度使王郜同平章事削奪新西川節度使李茂貞官爵復姓名宋文通朱全忠既得兖鄆甲兵益盛乃大舉擊楊行密遣龐師古以徐􅀫宋滑之兵七萬壁清口將􅃐楊州葛從周以兖鄆曹濮之兵壁安豐將趨壽州全忠自將屯宿州淮􅀯震恐匡國節度使李繼瑭聞朝廷討李茂貞而懼韓建復從而摇之繼瑭奔鳯翔冬十月以建爲鎮國匡國兩軍節度使壬子知遂州矦紹帥衆二萬乙卯知合州王仁威帥衆千人戊午鳯翔將李繼瑭以援兵二千皆降於王建建攻梓州益急庚申顧彦暉聚其宗族及假子共飲遣王宗弼自歸于建酒酣命其假子瑶殺已及同飲者然後自殺建入梓州城中兵尚七萬人建命王宗綰分兵徇昌普等州以王宗滌爲東川留後劉仁恭奏稱李克用無故稱兵見討本道大破其黨于木􅀲㵎請自爲統帥以討克用詔不許又遺朱全忠書全忠奏加仁恭同平章事朝廷從之仁恭又遣使謝克用陳去就不自安之意克用復書略曰今公仗􅃏控兵理民立法擢士則欲其報徳選將則望彼酬恩已尚不然人何足信僕料猜忌出於骨肉嫌忌生於屏帷持干將而不敢授人捧盟盤而何詞著誓甲子立皇子祕爲景王祚爲輝王祺爲祁王加彰義節度使張璉同平章事楊行密與朱瑾將兵三萬拒汴軍於楚州别將張訓自漣水引兵㑹之行密以爲前鋒龐師古營於清口或曰營地汙下不可乆處不聴師古恃衆輕敵居常弈碁朱瑾壅淮上流欲灌之或以告師古師古以爲惑衆斬之十一月癸酉瑾與淮南將矦瓉將五千􅀐潜度淮用汴人旗幟自北來􅃐其中軍張訓踰柵而入士卒蒼黄拒戰淮水大至汴軍駭亂行密引大軍濟淮與瑾等夾攻之汴軍大敗斬師古及將士首萬餘級餘衆皆潰葛從周屯於壽州西北壽州團練使朱延壽擊破之退屯濠州聞師古敗奔還行密瑾延壽乘勝追之及於渒水從周半濟淮南兵擊之殺溺殆盡從周走免遏後都指揮使牛存節弃馬步􅃲諸軍稍得濟淮凡四日不食㑹大雪汴卒縁道凍餒死還者不滿千人全忠聞敗亦奔還行密遺全忠書曰龐師古葛從周非敵也公冝自來淮上決戰行密大㑹諸將謂行軍副使李承嗣曰始吾欲先􅃐壽州副使云不如先向清口師古敗從周自走今果如所料賞之錢萬緡表承嗣領鎮海節度使行密待承嗣及史儼甚厚第舍姬妾咸選其尤者賜之故二人爲行密盡力屢立功竟卒於淮南行密由是遂保據江淮之間全忠不能與之爭戊寅立淑妃何氏爲皇后后東川人生徳王輝王威武節度使王潮弟審知爲觀察副使有過潮猶加捶撻審知無怨色潮寢疾捨其子延興延虹延豐延休命審知知軍府事十二月丁未潮薨審知以讓其兄泉州刺史審邽審邽以審知有功辭不受審知自稱福建留後表于朝廷壬戌王建自梓州還戊辰至成都是歳􅀯詔驃信舜化有上皇帝書函及督爽牒中書木夾年號中興朝廷欲以詔書報之王建上言􅀯詔小夷不足辱詔書臣在西􅀯彼必不敢犯塞從之黎雅閒有淺蠻曰劉王郝王楊王各有部落西川歳賜贈帛三千匹使覘􅀯詔亦受南詔賂詗成都虚實毎節度使到官三王帥酋長詣府節度使自謂威徳所致表于朝廷而三王隂與大將相表裏節度使或失大將心則敎諸蠻紛擾先是節度使多文臣不欲生事故大將常藉此以邀姑息而􅀯詔亦慿之屢爲邊患及王建鎮西川絶其舊賜斬都押牙山行章以懲之卭郲之􅀯不置鄣候不戍一卒蠻亦不敢侵盜其後遣王宗播擊南詔三王漏泄軍事召而斬之右拾遺張道古上䟽稱國家有五危二亂昔漢文帝即位未幾明習國家事今陛下登極巳十年而曽不知爲君馭臣之道太宗内安中原外開四夷海表之國莫不入臣今先朝封域日蹙幾盡臣雖微賤竊傷陛下朝廷社稷始爲姦臣所弄終爲賊臣所有也上怒貶道古施州司户仍下詔罪狀道古宣示諌官道古青州人也光化元年春正月两浙江西武昌淄青各遣使詣闕請以朱全忠爲都統討楊行密詔不許加平盧節度使王師範同平章事以兵部尚書劉崇望同平章事充東川節度使以昭信防禦使馮行襲爲昭信節度使上下詔罪已息兵復李茂貞姓名官爵應諸道討鳯翔兵皆罷之壬辰河中節度使王珂親迎於晉陽李克用遣其將李嗣昭守河中李茂貞韓建皆致書於李克用言大駕出幸累年乞修和好同奬王室兼乞丁匠助修宫室克用許之􅀄王建攻東川顧彦暉求救於李茂貞茂貞命將出兵救之不暇東逼乘輿詐稱攺過與韓建共翼戴天子又聞朱全忠營洛陽宫累表迎車駕茂貞韓建懼請修復宫闕奉上歸長安詔以韓建爲修宫闕使諸道皆助錢及工材建使都將蔡敬思督其役既成二月建自往視之錢鏐請徙鎮海軍於杭州從之復以李茂貞爲鳯翔節度使三月己丑以王審知充威武留後朱全忠遣副使萬年韋震入奏事求兼鎮天平朝廷未之許震力爭之朝廷不得巳以全忠爲宣武宣義天平三鎮節度使全忠以震爲天平留後以前台州刺史李振爲天平節度副使振抱真之曽孫也淮􅀯將周本救􅂫州兩浙將顧全武擊破之淮􅀯將秦裴以兵三千人拔崑山而戍之以潭州刺史判湖􅀯軍府事馬殷知武安留後時湖􅀯管内七州賊帥楊師逺據衡州唐丗旻據永州蔡結據道州陳彦謙據郴州魯景仁據連州殷所得惟潭邵二州而巳義昌節度使盧彦威性殘虐又不禮於鄰道與盧龍節度使劉仁恭爭鹽利仁恭遣其子守文將兵襲滄州彦威弃城挈家奔魏州羅弘信不納乃奔汴州仁恭遂取滄景徳三州以守文爲義昌留後仁恭兵勢益盛自謂得天助有併吞河朔之志爲守文請旌節朝廷未許㑹中使至范陽仁恭語之曰旌節吾自有之但欲得長安本色耳何爲累章見拒爲吾言之其悖慢如此朱全忠與劉仁恭修好㑹魏博兵擊李克用夏四月丁未全忠至鉅鹿城下敗河東兵萬餘人逐北至青山口以護國節度使王珂兼侍中丁卯朱全忠遣葛從周分兵攻洺州戊辰拔之斬刺史邢善益五月己巳朔赦天下葛從周攻邢州刺史馬師素弃城走辛未磁州刺史袁奉滔自剄全忠以從周爲昭義留後守邢洺磁三州而還以武定節度使李繼密爲山􅀯西道節度使朝廷聞王建已用王宗滌為東川留後乃召劉崇望還爲兵部尚書仍以宗滌爲留後湖􅀯將姚彦章言於馬殷請取衡永道連郴五州仍薦李瓊爲將殷以瓊及秦彦睴爲嶺北七州游奕使張圖英李唐副之將兵攻衡州斬楊師逺引兵􅃐永州圍之月餘唐丗旻走死殷以李唐爲永州刺史六月以濠州刺史趙珝爲忠武節度使珝犨之弟也秋七月加武貞節度使雷滿同平章事加鎮􅀯節度使鍾傳兼侍中忠義節度使趙匡凝聞朱全忠有清口之敗隂附於楊行密全忠遣􅀫州刺史尉氏氏叔琮將兵伐之丙申拔唐州擒隨州刺史趙匡璘敗襄州兵於鄧城八月庚戌攺華州爲興徳府戊午汴將康懐貞襲鄧州克之擒刺史國湘趙匡凝懼遣使請服於朱全忠全忠許之己未車駕發華州壬戌至長安甲子赦天下攺元上欲藩鎮相與輯睦以太子賔客張有孚爲河東汴州宣慰使賜李克用朱全忠詔又令宰相與之書使之和解克用欲奉詔而恥於先自屈乃致書王鎔使通於全忠全忠不從九月乙亥加韓建守太􅀓興徳尹加王鎔兼中書令羅弘信守侍中己丑東川留後王宗滌言於王建以東川封疆五千里文移往還動踰數月請分遂合瀘渝昌五州别爲一鎮建表言之顧全武攻􅂫州城中及援兵食皆盡甲申淮􅀯所署􅂫州刺史臺濛弃城走援兵亦遁全武克􅂫州追敗周本等于望亭獨秦裴守崑山不下全武帥萬餘人攻之裴屢出戰使病者􅀍甲執矛壯者彀弓弩全武每爲之却全武檄裴令降全武甞爲僧裴封函納款全武喜召諸將發函乃佛經一卷全武大慙曰裴不憂死何暇戲予益兵攻城引水灌之城壊食盡裴乃降錢鏐設千人饌以待之及出羸兵不滿百人鏐怒曰單弱如此何敢乆爲旅拒對曰裴義不負楊公今力屈而降耳非心降也鏐善其言顧全武亦勸鏐宥之鏐從之時人稱全武長者魏博節度使羅弘信薨軍中推其子節度副使紹威知留後汴將朱友恭將兵還自江淮過安州或告刺史武瑜潛與淮􅀯通謀取汴軍冬十月己亥友恭攻而殺之李克用遣其將李嗣昭周徳威將步􅀐二萬出青山將復山東三州壬寅進攻邢州葛從周出戰大破之嗣昭等引兵退入青山從周追之將扼其歸路步兵自潰嗣昭不能制㑹横衝都將李嗣源以所部兵至謂嗣昭曰吾輩亦去則勢不可支矣我試爲公擊之嗣昭曰善我請從公後嗣源乃解鞍厲鏃臨髙布陳左右指畫邢人莫之測嗣源直前奮擊嗣昭繼之從周乃退徳威馬邑人也癸卯以威武留後王審知爲節度使以羅紹威知魏博留後丁巳以東川留後王宗滌爲節度使加佑國節度使張全義兼侍中王珙引汴兵寇河中王珂告急於李克用克用遣李嗣昭救之敗汴兵於胡壁汴人走前常州刺史王柷性剛介有時望詔徴之時人以爲且入相過陜王珙延奉甚至請叙子姪之禮拜之柷固辭不受珙怒使送者殺之并其家人悉投諸河掠其資裝以覆舟聞朝廷不敢詰閏月錢鏐以其將曹圭爲􅂫州制置使遣王球攻婺州十一月甲寅立皇子禎爲雅王祥爲瓊王以魏博留後羅紹威爲節度使衢州刺史陳岌請降于楊行密錢鏐使顧全武討之朱全忠以奉國節度使崔洪與楊行密交通遣其將張存敬攻之洪懼請以弟都指揮使賢爲質且言將士頑悍不受節制請追二千人詣麾下從征伐全忠許之召存敬還存敬曹州人也十二月昭義節度使薛志勤薨李克用之平王行瑜也李罕之求邠寧於克用克用曰行瑜恃功邀君故吾與公討而誅之昨破賊之日吾首奏􅃐􅂫文建赴鎮今纔逹天聴遽復二三朝野之論必喧然謂吾輩復如行瑜所爲也吾與公情如同體固無所愛俟還鎮當更爲公論功賞耳罕之不恱而退私於葢寓曰罕之自河陽失守依託大庇嵗時巳深比來衰老倦於軍旅若蒙吾王與太傅哀愍賜一小鎮使數年之閒休兵養疾然後歸老閭閻幸矣寓爲之言克用不應毎藩鎮缺議不及罕之罕之甚鬱鬱寓恐其有它志亟爲之言克用曰吾於罕之豈愛一鎮但罕之鷹也飢則爲用飽則背飛及志勤薨旬日無帥罕之擅引澤州兵夜入潞州據之以􅃺白克用曰薛鐵山死州民無主慮不逞者爲變故罕之專命鎮撫取王裁㫖克用怒遣人讓之罕之遂遣其子顥請降於朱全忠執河東將馬溉等及沁州刺史傳瑤送汴州克用遣李嗣昭將兵討之嗣昭先取澤州收罕之家屬送晉陽楊行密遣成及等歸兩浙以易魏約等錢鏐許之韶州刺史曽衮舉兵攻廣州州將王瓌帥戰艦應之清海行軍司馬劉隠一戰破之韶州將劉潼復據湞涻隠討斬之二年春正月丁未中書侍郎兼吏部尚書同平章事崔㣧罷守本官以兵部尚書陸扆同平章事朱全忠表李罕之爲昭義節度使又表權知河陽留後丁㑹武寧留後王敬蕘彰義留後張珂並爲節度使楊行密與朱瑾將兵數萬攻徐州軍于吕梁朱全忠遣􅀐將張歸厚救之劉仁恭發幽滄等十二州兵十萬欲兼河朔攻貝州拔之城中萬餘户盡屠之投尸清水由是諸城各堅守不下仁恭進攻魏州營于城北魏博節度使羅紹威求救於朱全忠朱全忠遣崔賢還蔡州發其兵二千詣大梁二月蔡將崔景思等殺賢劫崔洪悉驅兵民度淮奔楊行密兵民稍稍遁歸至廣陵者不滿二千人全忠命許州刺史朱友􅁉守蔡州朱全忠自將救徐州楊行密聞之引兵去汴人追及之於下邳殺千餘人全忠行至輝州聞淮􅀯兵巳退乃還三月朱全忠遣其將李思安張存敬將兵救魏博屯于内黄癸卯全忠以中軍軍于滑州劉仁恭謂其子守文曰汝勇十倍於思安當先虜鼠輩後擒紹威耳乃遣守文及其妹壻單可及將精兵五萬擊思安於内黄丁未思安使其將袁象先伏兵於清水之右思安逆戰於繁陽陽不勝而却守文逐之及内黄之北思安勒兵還戰伏兵發夾擊之幽州兵大敗斬可及殺獲三萬人守文僅以身免可及幽州驍將號單無敵燕軍失之喪氣思安陳留人也時葛從周自邢州將精􅀐八百巳入魏州戊申仁恭攻上水􅀜館陶門從周與宣義牙將賀徳倫出戰顧門者曰前有大敵不可返顧命闔其扉從周等殊死戰仁恭復大敗擒其將薛突厥王鄶郎明日汴魏乘勝合兵擊仁恭破其八寨仁恭父子燒營而遁汴魏之人長驅追之至臨清擁其衆入永濟渠殺溺不可勝紀鎮人亦出兵邀擊於東境自魏至滄五百里閒僵尸相枕仁恭自是不振而全忠益横矣徳倫河西胡人也劉仁恭之攻魏州也羅紹威遣使修好於河東且求救壬午李克用遣李嗣昭將兵救之㑹仁恭巳爲汴兵所敗紹威復與河東絶嗣昭引還葛從周乘破幽州之勢自土門攻河東拔承天軍别將氏叔琮自馬嶺入拔遼州樂平進軍榆次李克用遣内牙軍副周徳威擊之叔琮有驍將陳章號陳夜义爲前鋒請於叔琮曰河東所恃者周楊五請擒之求一州爲賞克用聞之以戒徳威徳威曰彼大言耳戰于洞渦徳威微服往挑戰謂其屬曰汝見陳夜义即走章果逐之徳威奮鐵檛擊之墜馬生擒以獻因擊叔琮大破之斬首三千級叔琮弃營走徳威追之出石㑹􅀜又斬千餘級從周亦引還丁巳朱全忠遣河陽節度使丁㑹攻澤州下之婺州刺史王壇爲兩浙所圍求救於宣歙觀察使田頵夏四月頵遣行營都指揮使康儒等救之五月甲午置武信軍於遂州以遂合等五州􅀠之李克用遣蕃漢馬步都指揮使李君慶將兵攻李罕之己亥圍潞州朱全忠出屯河陽辛丑遣其將張存敬救之壬寅又遣丁㑹將兵繼之大破河東兵君慶解圍去克用誅君慶及其禆將伊審李弘襲以李嗣昭爲蕃漢馬步都指揮使代之攻潞州庚戌康儒等敗兩浙兵於龍丘擒其將王球等遂取婺州六月乙丑李罕之疾亟丁卯全忠表罕之爲河陽節度使以丁㑹爲昭義節度使未幾又以其將張歸霸守邢州遣葛從周代㑹守潞州以西川大將王宗佶爲武信節度使宗佶本姓甘洪州人也丁丑李罕之薨于懐州保義節度使王珙性猜忍雖妻子親近常不自保至是軍亂爲麾下所殺推都將李璠爲留後秋七月朱全忠海州戍將陳漢賔請降于楊行密淮海遊奕使張訓以漢賔心未可知與漣水防遏使廬江王綰將兵二千直􅃐海州遂據其城加荆􅀯節度使成汭兼中書令馬殷遣其將李唐攻道州蔡結聚羣蠻伏兵于隘以擊之大破唐兵唐曰蠻所恃者山林耳若戰平地安能敗我乃命因風燔林火燭天地羣蠻驚遁遂拔道州擒結斬之朱全忠召葛從周於潞州使賀徳倫守之八月丙寅李嗣昭引兵至潞州城下分兵攻澤州己巳汴將劉玘棄澤州走河東兵進拔天井􅀜以李孝璋爲澤州刺史賀徳倫閉城不出李嗣昭曰以鐵􅀐環其城捕芻牧者附城三十里禾黍皆刈之乙酉徳倫等棄城宵遁􅃐壷􅀜河東將李存審伏兵邀擊之殺獲甚衆葛從周以援兵至聞徳倫等巳敗乃還九月癸卯以鳯翔節度使李茂貞爲鳯翔彰義節度使李克用表汾州刺史孟遷爲昭義留後淄青節度使王師範以沂密内叛乞師于楊行密冬十月行密遣海州刺史臺濛副使王綰將兵助之拔密州歸于師範將攻沂州先使覘之曰城中皆偃旗息鼔綰曰此必有備而救兵近不可擊也諸將曰密巳下矣沂何能爲綰不能止乃伏兵林中以待之諸將攻沂州不克救兵至引退州兵乘之綰發伏擊敗之十一月陜州都將朱簡殺李璠自稱留後附朱全忠仍請更名友謙預於子姪加忠義節度使趙匡凝兼中書令馬殷遣其將李瓊攻郴州執陳彦謙斬之進攻連州魯景仁自殺湖􅀯皆平十二月加魏博節度使羅紹威同平章事資治通鑑卷第二百六十一
