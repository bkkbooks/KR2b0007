body:
  text: 漢主聰封其子敷為渤海王驥為濟南王鸞為燕王鴻為楚王勱為齊王權為秦王操為魏王持為趙王聦以魚蟹不供斬左都水使者襄陵王攄作温明徽光二殿未成斬將作大匠望都公靳陵觀漁於汾水昬夜不歸中軍大將軍王彰諌曰比觀陛下所為臣實痛心疾首今愚民歸漢之志未專思晉之心猶盛劉琨咫尺刺客縱横帝王輕出一夫敵耳願陛下改往修來則億兆幸甚聦大怒命斬之王夫人叩頭乞哀乃囚之太后張氏以聦刑罰過差三日不食太弟义單于粲輿櫬切諫聦怒曰吾豈桀紂而汝軰生來哭人太宰延年太保殷等公卿列矦百餘人皆免冠涕泣曰陛下功高徳厚曠世少比往也唐虞今則陛下而頃來以小小不供亟斬王公直言迕㫖遽囚大將此臣等竊所未解故相與憂之忘寢與食聰慨然曰朕昨大醉非其本心微公等言之朕不聞過各賜帛百匹使侍中持節赦彰曰先帝頼君如左右手君著勲再世朕敢忘之此段之過希君蕩然君能盡懷憂國朕所望也今進君驃騎將軍定襄郡公後有不逮幸數匡之王彌既死漢安北將軍趙固平北將軍王桑恐為石勒所并欲引兵歸平陽軍中乏糧士卒相食乃自䂭磽津西渡攻掠河北郡縣劉琨以其兄子演為魏郡太守鎮鄴固桑恐演邀之遣長史臨深為質於琨琨以固為雍州刺史桑為豫州刺史賈疋等圍長安數月漢中山王曜連戰皆敗驅掠士女八萬餘口奔于平陽秦王業自雍入于長安五月漢主聰貶曜為龍驤大將軍行大司馬聰使河内王粲攻傅祗於三渚右將軍劉參攻郭黙於懐㑹祗病薨城陷粲遷祇子孫并其士民二萬餘户于平陽六月漢主聰欲立責嬪劉英為皇后張太后欲立貴人張徽光聰不得已許之英尋卒漢大昌文獻公劉殷卒殷為相不犯顔忤㫖然因事進規􅀘益甚多漢主聰每與羣臣議政事殷無所是非羣臣出殷獨留為聰敷暢條理啇榷事宐聰未嘗不從之殷常戒子孫曰事君當務㡬諫凡人尚不可面斥其過况萬乘乎夫㡬諫之功無異犯顔但不彰君之過所以為優耳官至侍中太保録尚書賜劒履上殿入朝不趨乘輿入殿然殷在公卿間常恂恂有卑讓之色故能處驕暴之國保其富貴不失令名以壽考自終漢主聰以河間王易為車騎將車彭城王翼為衛將軍並典兵宿衛高平王悝為征南將軍鎮離石濟南王驥為征西將軍築西平城以居之魏王操為征東將軍鎮蒲子趙固王桑自懐求迎於漢漢主聰遣鎮逺將軍梁伏疵將兵迎之未至長史臨深將軍牟穆帥衆一萬叛歸劉演固隨疵而西桑引其衆東奔青州固遣兵追殺之於曲梁桑將張鳳帥其餘衆歸演聰以固為荆州刺史領河南太守鎮洛陽石勒自葛陂北行所過皆堅壁清野虜掠無所獲軍中飢甚士卒相食至東燕聞汲郡向氷聚衆數千壁枋頭勒將濟河恐冰邀之張賓曰聞冰船盡在瀆中未上宐遣輕兵間道襲取以濟大軍大軍既濟冰必可擒也秋七月勒使支雄孔萇自文石津􅅞筏潛渡取其船勒引兵自棘津濟河擊冰大破之盡得其資儲軍􅀔復振遂長驅至鄴劉演保三臺以自固臨深牟穆等復帥其衆降於勒諸將欲攻三臺張賔曰演雖弱衆猶數千三臺險固攻之未易猝拔捨而去之彼將自潰方今王彭祖劉越石公之大敵也宐先取之演不足顧也且天下饑亂明公雖擁大兵遊行羇旅人無定志非所以保萬全制四方也不若擇便地而據之廣聚糧儲西稟平陽以圖幽并此霸王之業也邯鄲襄國形勝之地請擇一而都之勒曰右矦之計是也遂進據襄國賓復言於勒曰今吾居此彭祖越石所深忌也恐城塹未固資儲未廣二冦交至宐亟収野榖且遣使至平陽具陳鎮此之意勒從之分命諸將攻冀州郡縣壁壘多降運其榖以輸襄國且表於漢主聰聰以勒為都督冀幽并營四州諸軍事冀州牧進封上黨公劉琨移檄州郡期以十月㑹平陽擊漢琨素奢豪喜聲色河南徐潤以音律得幸於琨琨以為晉陽令潤驕恣干預政事䕶軍令狐盛數以為言且勸琨殺之琨不從潤譖盛於琨琨収盛殺之琨母曰汝不能駕御豪傑以恢逺略而專除勝已禍必及我盛子泥奔漢具言虛實漢主聰大喜遣河内王粲中山王曜將兵冦并州以令狐泥爲鄉導琨聞之東出收兵於常山及中山使其將郝詵張喬將兵拒粲且遣使求救於代公猗盧詵喬俱敗死粲曜乗虛襲晉陽太原太守高喬并州别駕郝聿以晉陽降漢八月庚戍琨還救晉陽不及帥左右數十騎奔常山辛亥粲曜入晉陽壬子令狐泥殺琨父母粲曜送尚書盧志侍中許遐太子右衛率崔瑋于平陽聰復以曜爲車騎大將軍以前將軍劉豊爲并州刺史鎮晉陽九月聰以盧志爲太弟太師崔瑋爲太傅謝遐爲太保高喬令狐泥皆爲武衛將軍己卯漢衛尉梁芬奔長安辛巳賈疋等奉秦王業為皇太子建行臺於長安登壇告類建宗廟社稷大赦以閻鼎為太子詹事揔攝百揆加賈疋征西大將軍以秦州刺史南陽王保為大司馬命司空荀藩督攝逺近光禄大夫荀組領司􅀠校尉行豫州刺史與藩共保開封秦州刺史裴苞據險以拒涼州兵張寔宋配等擊破之苞奔柔凶塢冬十月漢主聦封其子􅁪為代王逞為呉王朗為潁川王臯為零陵王旭為丹楊王京為蜀王坦為九江王晃為臨川王以王育為太保王彰為太尉任顗為司徒馬景爲司空朱紀爲尚書令范隆為左僕射呼延晏為右僕射代公猗盧遣其子六脩及兄子普根將軍衛雄范班箕澹帥衆數萬爲前鋒以攻晉陽猗盧自帥衆二十萬繼之劉琨収散卒數千為之鄉導六脩與漢中山王曜戰於汾東曜兵敗墜馬中􅎅創討虜將軍傅虎以馬授曜曜不受曰卿當乘以自免吾創已重自分死此虎泣曰虎䝉大王識拔至此常思効命今其時矣且漢室􅀄基天下可無虎不可無大王也乃扶曜上馬驅令渡汾自還戰死曜入晉陽夜與大將軍粲鎮北大將軍豐掠晉陽之民踰䝉山而歸十一月猗盧追之戰於藍谷漢兵大敗擒劉豐斬邢延等三千餘級㐲尸數百里猗盧因大獵壽陽山陳閱皮肉山為之赤劉琨自營門步入拜謝固請進軍猗盧曰吾不早來致卿父母見害誠以相愧今卿已復州境吾逺來士馬疲􅁦且待後舉劉聰未可滅也遺琨馬牛羊各千餘疋車百乗而還留其將箕澹段繁等戍晉陽琨徙居陽曲招集亡散盧諶為劉粲參軍亡歸琨漢人殺其父志及弟謐詵贈傅虎幽州刺史十二月漢主聰立皇后張氏以其父寔為左光禄大夫彭仲蕩之子天䕶帥群胡攻賈疋天䕶陽不勝而走疋追之夜墜澗中天䕶執而殺之漢以天䕶為涼州刺史衆推始平太守麴允領雍州刺史閻鼎與京兆太守梁綜爭權鼎遂殺綜麴允與撫夷䕶軍索綝馮翊太守梁肅合兵攻鼎鼎出奔雍為氐竇首所殺廣平㳺綸張豺擁衆數萬據苑鄉受王浚假署石勒遣䕫安支雄等七將攻之破其外壘浚遣督䕶王昌帥諸軍及遼西公段疾陸眷疾陸眷弟匹磾文鴦從弟末柸部衆五萬攻勒於襄國疾陸眷屯于渚陽勒遣諸將出戰皆爲疾陸眷所敗疾陸眷大造攻具將攻城勒衆甚懼勒召將佐謀之曰今城塹未固糧儲不多彼衆我寡外無救援吾欲悉衆與之决戰何如諸將皆曰不如堅守以疲敵待其退而擊之張賓孔萇曰鮮卑之種段氏最爲勇悍而末柸尤甚其銳卒皆在末柸所今聞疾陸眷刻日攻北城其大衆逺來戰鬬連日謂我孤弱不敢出戰意必懈惰宐且勿出示之以怯鑿北城爲突門二十餘道俟其來至列守未定出其不意直衝末柸帳彼必震駭不暇爲計破之必矣末柸敗則其餘不攻而潰矣勒從之宻為突門既而疾陸眷攻北城勒登城望之見其將士或釋仗而寢乃命孔萇督銳卒自突門出擊之城上鼓譟以助其勢萇攻末柸帳不能克而退末柸逐之入其壘門為勒衆所獲疾陸眷等軍皆退走萇乘勝追擊枕尸三十餘里獲鎧馬五千匹疾陸眷収其餘衆還屯渚陽勒質末柸遣使求和於疾陸眷疾陸眷許之文鴦諫曰今以末柸一人之故而縱垂亡之虜得無為王彭祖所怨招後患乎疾陸眷不從復以鎧馬金銀賂勒且以末柸三弟為質而請末柸諸將皆勸勒殺末柸勒曰遼西鮮卑徤國也與我素無仇讎為王浚所使耳今殺一人而結一國之怨非計也歸之必深德我不復為浚用矣乃厚以金帛報之遣石虎與疾陸眷盟于渚陽結為兄弟疾陸眷引歸王昌等不能獨留亦引兵還薊勒召末柸與之燕飲誓為父子遣還遼西末柸在塗日南嚮而拜者三由是段氏專心附勒王浚之勢遂衰游綸張豺請降於勒勒攻信都殺冀州刺史王象浚復以邵舉行冀州刺史保信都是嵗大疫王澄少與兄衍名冠海内劉琨謂澄曰卿形雖散朗而内實動俠以此處世難得其死及在荆州悅成都内史王機謂為已亞使之内綜心膂外為爪牙澄屢為杜弢所敗望實俱損猶傲然自得無憂懼之意但與機日夜縱酒博弈由是上下離心南平太守應詹屢諫不聽澄自出軍擊杜弢軍于作塘故山簡參軍王冲擁衆迎應詹為刺史詹以冲無頼棄之還南平冲乃自稱刺史澄懼使其將杜㽔守江陵徙治孱陵尋又奔沓中别駕郭舒諫曰使君臨州雖無異政然一州人心所繫今西収華容之兵足以擒此小醜柰何自棄遽為奔亡乎澄不從欲將舒東下舒曰舒為萬里紀綱不能匡正令使君奔亡誠不忍渡江乃留屯沌口琅邪王睿聞之召澄為軍諮祭酒以軍諮祭酒周顗代之澄乃赴召顗始至州建平流民傅宻等叛迎杜弢弢别將王真襲􅃆陽顗狼狽失據征討都督王敦遣武昌太守陶侃尋陽太守周訪厯陽内史甘卓共擊弢郭進屯豫章為諸軍繼援王澄過詣敦自以名聲素出敦右猶以舊意侮敦敦怒誣其與杜弢通信遣壯士搤殺之王機聞澄死懼禍以其父毅兄矩皆嘗為廣州刺史就敦求廣州敦不許㑹廣州將温邵等叛刺史郭訥迎機為刺史機遂將奴客門生千餘人入廣州訥遣兵拒之將士皆機父兄時部曲不戰迎降訥乃避位以州授之王如軍中飢乏官軍討之其黨多降如計窮遂降於王敦鎮東軍司顧榮前太子洗馬衛玠皆卒玠瓘之孫也美風神善清談常以為人有不及可以情恕非意相干可以理遣故終身不見喜愠之色江陽太守張啟殺行益州刺史王異而代之啟翼之孫也尋病卒三府文武共表涪陵太守向沈行西夷校尉南保涪陵􅊨南安赤亭􅆧姚弋仲東徙榆眉戎夏襁負隨之者數萬自稱䕶􅆧校尉雍州刺史扶風公孝愍皇帝上建興元年春正月丁丑朔漢主聰宴群臣於光極殿使懐帝著青衣行酒庾珉王儁等不勝悲憤因號哭聰惡之有告珉等謀以平陽應劉琨者二月丁未聰殺珉儁等故晉臣十餘人懷帝亦遇害大赦復以㑹稽劉夫人為貴人苟崧曰懐帝天姿清劭少著英猷若遇承平足為守文佳主而繼惠帝擾亂之後東海專政故無幽厲之釁而有流亡之禍矣乙亥漢太后張氏卒謚曰光獻張后不勝哀丁丑亦卒謚曰武孝己夘漢定襄忠穆公王彰卒三月漢主聦立貴嬪劉娥為皇后為之起䳨儀殿廷尉陳元達切諫以為天生民而樹之君使司牧之非以兆民之命窮一人之欲也晉氏失徳大漢受之蒼生引領庶幾息肩是以光文皇帝身衣大布居無重茵后妃不衣錦綺乘輿馬不食粟愛民故也陛下踐阼以來已作殿觀四十餘所加之軍旅數興餽運不息饑饉疾疫死亡相繼而益思營繕豈為民父母之意乎今有晉遺類西據闗中南擅江表李雄奄有巴蜀王浚劉琨窺窬肘腋石勒曹嶷貢禀漸踈陛下釋此不憂乃更為中宫作殿豈目前之所急乎昔太宗居治安之世粟帛流衍猶愛百金之費息露臺之役陛下承荒亂之餘所有之地不過太宗之二郡戰守之備非特匈奴南越而已而宫室之侈乃至於此臣所以不敢不冒死而言也聰大怒曰朕為天子營一殿何問汝鼠子乎乃敢妄言沮衆不殺此鼠子朕殿不成命左右曵出斬之并其妻子同梟首東市使羣鼠共穴時聰在逍遥園李中堂元達先鎻􅆎而入即以鎻鎻堂下樹呼曰臣所言者社稷之計而陛下殺臣朱雲有言臣得與龍逢比干遊足矣左右曵之不能動大司徒任顗光禄大夫朱紀范隆驃騎大將軍河閒王易等叩頭出血曰元達為先帝所知受命之初即引置門下盡忠竭慮知無不言臣等竊禄偷安毎見之未嘗不發愧今所言雖狂直願陛下容之因諫諍而斬列卿其如後世何聰黙然劉后聞之密敕左右停刑手䟽上言今宫室已備無煩更營四海未壹宐愛民力廷尉之言社稷之福也陛下宐加封賞而更誅之四海謂陛下何如哉夫忠臣進諫者固不顧其身也而人主拒諫者亦不顧其身也陛下爲妾營殿而殺諫臣使忠良結舌者由妾逺近怨怒者由妾公私困􅁦者由妾社稷阽危者由妾天下之罪皆萃於妾妾何以當之妾觀自古敗國䘮家未始不由婦人心常疾之不意今日身自爲之使後世視妾由妾之視昔人也妾誠無面目復奉巾櫛願賜死此堂以塞陛下之過聰覽之變色任顗等叩頭流涕不已聰徐曰朕比年已來微得風疾喜怒過差不復自制元達忠臣也朕未之察諸公乃能破首明之誠得輔弼之義也朕愧戢于心何敢忘之命顗等冠履就坐引元達上以劉氏表示之曰外輔如公内輔如后朕復何憂賜顗等榖帛各有差更命逍遥園曰納賢園李中堂曰愧賢堂聰謂元達曰卿當畏朕而反使朕畏卿邪西夷校尉向沈卒衆推汶山太守蘭維為西夷校尉維帥吏民北出欲向巴東成將李恭費黒邀擊獲之夏四月丙午懐帝凶問至長安皇太子舉哀因加元服壬申即皇帝位大赦改元以衛將軍梁芬為司徒雍州刺史麴允為尚書左僕射録尚書事京兆太守索綝為尚書右僕射領吏部京兆尹是時長安城中户不盈百蒿棘成林公􅀻有車四乗百官無章服印綬唯桑版署號而已尋以索綝為衛將軍領太尉軍國之事悉以委之漢中山王曜司􅈻校尉喬智明冦長安平西將軍趙染帥衆赴之詔麴允屯黄白城以拒之石勒使石虎攻鄴鄴潰劉演奔􅅒丘三臺流民皆降於勒勒以桃豹為魏郡太守以撫之久之以石虎代豹鎮鄴初劉琨用陳留太守焦求為兖州刺史荀藩又用李述為兖州刺史述欲攻求琨召求還及鄴城失守琨復以劉演爲兖州刺史鎭􅅒丘前中書侍郎郗鑒少以清節著名帥高平千餘家避亂保嶧山琅邪王睿就用鑒為兖州刺史鎮鄒山三人各屯一郡兖州吏民莫知所從琅邪王睿以前廬江内史華譚為軍諮祭酒譚嘗在壽春依周馥睿謂譚曰周祖宣何故反譚曰周馥雖死天下尚有直言之士馥見冦賊滋蔓欲移都以紓國難執政不悅興兵討之馥死未踰時而洛都淪没若謂之反不亦誣乎睿曰馥位為征鎮握彊兵召之不入危而不持亦天下之罪人也譚曰然危而不持當與天下共受其責非但馥也睿參佐多避事自逸録事參軍陳頵言於睿曰洛中承平之時朝士以小心恭恪為凡俗以偃蹇倨肆為優雅流風相染以至敗國今僚屬皆承西臺餘􅁦飬望自高是前車已覆而後車又將尋之也請自今臨使稱疾者皆免官睿不從三王之誅趙王倫也制己亥格以賞功自是循而用之頵上言昔趙王簒逆惠皇失位三王起兵討之故厚賞以懷嚮義之心今功無大小皆以格斷乃至金紫佩士卒之身符䇿委僕􅀠之門非所以重名噐正紀綱也請一切停之頵出於寒微數為正論府中多惡之出頵為譙郡太守吴興太守周玘宗族彊盛琅邪王睿頗疑憚之睿左右用事者多中州亡官失守之士駕御吴人吴人頗怨玘自以失職又為刁恊所輕恥恚愈甚乃隂與其黨謀誅執政以諸南士代之事泄玘憂憤而卒將死謂其子勰曰殺我者諸傖子也能復之乃吾子也石勒攻李惲於上白斬之王浚復以薄盛為青州刺史王浚使棗嵩督諸軍屯易水召段疾陸眷欲與之共擊石勒疾陸眷不至浚怒以重幣賂拓拔猗盧并檄慕容廆等共討疾陸眷猗盧遣右賢王六修將兵㑹之為疾陸眷所敗廆遣慕容翰攻段氏取徒河新城至陽樂聞六脩敗而還翰因留鎮徒河壁青山初中國士民避亂者多北依王浚浚不能存撫又政灋不立士民往往復去之段氏兄弟專尚武勇不禮士大夫唯慕容廆政事脩明愛重人物故士民多歸之廆舉其英俊隨才授任以河東裴嶷北平陽躭廬江黄泓代郡魯昌為謀主廣平游邃北海逢羡北平西方䖍西河宋奭及封抽裴開為股肱平原宋該安定皇甫岌岌弟眞蘭陵繆愷昌黎劉斌及封弈封􅁉典機要􅁉抽之子也裴嶷清方有幹略為昌黎太守兄武為􅀇莬太守武卒嶷與武子開以其䘮歸過廆廆敬禮之及去厚加資送行及遼西道不通嶷欲還就廆開曰鄉里在南奈何北行且等為流寓叚氏彊慕容氏弱何必去此而就彼也嶷曰中國䘮亂今往就之是相帥而入虎口也且道逺何由可達若俟其清通又非嵗月可冀今欲求託足之地豈可不愼擇其人汝觀諸叚豈有逺略且能待國士乎慕容公修仁行義有霸王之志加以國豐民安今往從之高可以立功名下可以庇宗族汝何疑焉開乃從之既至廆大喜陽耽清直沈敏為遼西太守慕容翰破段氏於陽樂獲之廆禮而用之游邃逢羡宋奭皆嘗為昌黎太守與黄􅇦俱避地於薊後歸廆王浚屢以手書召邃兄暢暢欲赴之邃曰彭祖刑政不修華戎離叛以邃度之必不能久兄且磐􅁊以俟之暢曰彭祖忍而多疑頃者流民北來命所在追殺之今手書殷勤我稽留不往將累及卿且亂世宗族宐分以冀遺種遂從之卒與浚俱没宋該與平原杜群劉翔先依王浚又依段氏皆以為不足託帥諸流寓同歸於廆東夷校尉崔毖請皇甫岌為長史卑辭說諭終莫能致廆招之岌與弟真即時俱至遼東張綂據樂浪帶方二郡與高句麗王乙弗利相攻連年不解樂浪王遵說綂帥其民千餘家歸廆廆為之置樂浪郡以綂為太守遵參軍事王如餘黨涪陵李運巴西王建等自襄陽將三千餘家入漢中梁州刺史張光遣參軍晉邈將兵拒之邈受運建賂勸光納其降光從之使居成固既而邈見運建及其徒多珍寶欲盡取之復說光曰運建之徒不修農事專治器仗其意難測不如悉掩殺之不然必為亂光又從之五月邈將兵攻運建殺之建婿楊虎収餘衆擊光屯于厄水光遣其子孟萇討之不克壬辰以琅邪王睿為左丞相大都督督陜東諸軍事南陽王保為右丞相大都督督陜西諸軍事詔曰今當掃除鯨鯢奉迎梓宫令幽并兩州勒卒三十萬直造平陽右丞相宐帥秦涼梁雍之師三十萬徑詣長安左丞相帥所領精兵二十萬徑造洛陽同赴大期克成元勲漢中山王曜屯蒲坂石勒使孔萇擊定陵殺田徽薄盛帥所部降勒山東郡縣相繼為勒所取漢主聰以勒為侍中征東大將軍烏桓亦叛王浚潜附於勒六月劉琨與代公猗盧㑹于陘北謀擊漢秋七月琨進據藍谷猗盧遣拓跋普根屯于北屈琨遣監軍韓據自西河而南將攻西平漢主聰遣大將軍粲等拒琨驃騎將軍易等拒普根蕩晉將軍蘭陽等助守西平琨等聞之引兵還聰使諸軍仍屯所在為進取之計帝遣殿中都尉劉蜀詔左丞相睿以時進軍與乗輿㑹除中原八月癸亥蜀至建康睿辭以方平定江東未暇北伐以鎮東長史刁恊為丞相左長史從事中郎彭城劉隗為司直邵陵内史廣陵戴邈為軍諮祭酒參軍丹陽張闓為從事中郎尚書郎潁川鍾雅為記室參軍譙國􅁊宣為舎人豫章熊逺為主簿㑹稽孔愉為掾劉隗雅習文史善伺候睿意故睿特親愛之熊逺上書以為軍興以來處事不用律令競作新意臨事立制朝作夕改至於主者不敢任灋毎輒􅀜諮非為政之體也愚謂凢為駁議者皆當引律令經傳不得直以情言無所依凖以虧舊典若開塞隨宐權道制物此是人君之所得行非臣子所宐專用也睿以時方多事不能從初范陽祖逖少有大志與劉琨俱為司州主簿同寢中夜聞鷄鳴蹴琨覺曰此非惡聲也因起舞及渡江左丞相睿以為軍諮祭酒逖居京口糾合驍徤言於睿曰晉室之亂非上無道而下怨叛也由宗室爭權自相魚肉遂使戎狄乗隙毒流中土今遺民既遭殘賊人思自奮大王誠能命將出師使如逖者綂之以復中原郡國豪傑必有望風響應者矣睿素無北伐之志以逖為奮威將軍豫州刺史給千人廩布三千疋不給鎧仗使自召募逖將其部曲百餘家渡江中流擊楫而誓曰祖逖不能清中原而復濟者有如大江遂屯淮隂起冶鑄兵募得二千餘人而後進胡亢性猜忌殺其驍將數人杜曽懼潜引王冲之兵使攻亢亢悉精兵出拒之城中空虛曽因殺亢而并其衆周顗屯潯水城為杜弢所困陶侃使明威將軍朱伺救之弢退保泠口侃曰弢必步向武昌乃自徑道還郡以待之弢果來攻侃使朱伺逆擊大破之弢遁歸長沙周顗出潯水投王敦於豫章敦留之陶侃使參軍王貢告捷於敦敦曰若無陶矦便失荆州矣乃表侃為荆州刺史屯􅃆江左丞相睿召周顗復以為軍諮祭酒􅀄氐王楊􅌗捜之子難敵遣飬子販易於梁州私賣良人子一人張光鞭殺之難敵怨曰使君􅀄來大荒之後兵民之命仰我氐活氐有小罪不能貰也及光與楊虎相攻各求救於茂搜茂搜遣難敵救光難敵求貨於光光不與楊虎厚賂難敵且曰流民珍貨悉在光所今伐我不如伐光難敵大喜光與虎戰使張孟萇居前難敵繼後難敵與虎夾擊孟萇大破之孟萇及其弟援皆死光嬰城自守九月光憤激成疾僚屬勸光退據魏興光按劒曰吾受國重任不能討賊今得死如登仙何謂退也聲絶而卒州人推其少子邁領州事又與氐戰没衆推始平太守胡子序領梁州荀藩薨於開封漢中山王曜趙染攻麴允于黄白城允累戰皆敗詔以索綝為征東大將軍將兵助允王貢自王敦所還至竟陵矯陶侃之命以杜曽為前鋒大都督擊王冲斬之悉降其衆侃召曽曽不至貢恐以矯命獲罪遂與曾反擊侃冬十月侃兵大敗僅以身免敦表侃以白衣領職侃復帥周訪等進擊杜弢大破之敦乃奏復侃官漢趙染謂中山王曜曰麴允帥大衆在外長安空虛可襲也曜使染帥精騎五千襲長安庚寅夜入外城帝奔射鴈樓染焚龍尾及諸營殺掠千餘人辛夘旦退屯逍遥園壬辰將軍麴鑒自阿城帥衆五千救長安癸巳染引還鑒追之與曜遇於零武鑒兵大敗楊虎楊難敵急攻梁州胡子序棄城走難敵自稱刺史漢中山王曜恃勝而不設備十一月麴允引兵襲之漢兵大敗殺其冠軍將軍喬智明曜引歸平陽王浚以其父字處道自謂應當塗高之䜟謀稱尊號前勃海太守劉亮北海太守王摶司空掾高柔切諫浚皆殺之燕國霍原志節清高屢辭徴辟浚以尊號事問之原不荅浚誣原與羣盜通殺而梟其首於是士民駭怨而浚矜豪日甚不親政事所任皆苛刻小人棗嵩朱碩貪横尤甚北州謡曰府中赫赫朱丘伯十囊五囊入棗郎調發殷煩下不堪命多叛入鮮卑從事韓咸監䕶栁城盛稱慕容廆能接納士民欲以諷浚浚怒殺之浚始者唯恃鮮卑烏􅁊以為彊既而皆叛之加以蝗旱連年兵勢益弱石勒欲襲之未知虚實將遣使覘之參佐請用羊祜陸抗故事致書於浚勒以問張賔賔曰浚名為晉臣實欲廢晉自立但患四海英雄莫之從耳其欲得將軍猶項羽之欲得韓信也將軍威振天下今卑辭厚禮折節事之猶懼不信况為羊陸之亢敵乎夫謀人而使人覺其情難以得志矣勒曰善十二月勒遣舍人王子春董肇多齎珍寶奉表於浚曰勒本小胡遭世饑亂流離屯厄竄命冀州竊相保聚以救性命今晉祚淪夷中原無主殿下州鄉貴望四海所宗為帝王者非公復誰勒所以捐軀起兵誅討暴亂者正為殿下驅除爾伏願殿下應天順人早登皇祚勒奉戴殿下如天地父母殿下察勒微心亦當視之如子也又遺棗嵩書厚賂之浚以段疾陸眷新叛士民多棄已去聞勒欲附之甚喜謂子春曰石公一時英傑據有趙魏乃欲稱藩於孤其可信乎子春曰石將軍才力彊盛誠如聖㫖但以殿下中州貴望威行夷夏自古胡人為輔佐名臣則有矣未有為帝王者也石將軍非惡帝王不為而讓於殿下顧以帝王自有厯數非智力之所取雖強取之必不為天人之所與故也項羽雖彊終為漢有石將軍之比殿下猶隂精之與太陽是以逺鑒前事歸身殿下此乃石將軍之明識所以逺過於人也殿下又何怪乎浚大悅封子春肇皆為列矦遣使報聘以厚幣酬之游綸兄綂為浚司馬鎮范陽遣使私附於勒勒斬其使以送浚浚雖不罪綂益信勒為忠誠無復疑矣是嵗左丞相睿遣世子紹鎮廣陵以丞相掾蔡謨為叅軍謨克之子也漢中山王曜圍河南尹魏浚於石梁兖州刺史劉演河内太守郭黙遣兵救之曜分兵逆戰於河北敗之浚夜走獲而殺之代公猗盧城盛樂以為北都治故平城為南都又作新平城於灅水之陽使右賢王六脩鎮之綂領南部資治通鑑卷第八十八
