seq: 88
front:
  text: 康公之後與陛下殊源納之何害聰恱拜殷二女英娥為左右貴嬪位在昭儀上又納殷女孫四人皆為貴人位次貴妃於是六劉之寵傾後宫聦希復出外事皆中黄門奏决故新野王歆牙門將胡亢聚衆於竟陵自號楚公冦掠荆土以歆南蠻司馬新野杜曽為竟陵太守曽勇冠三軍能被甲游於水中二月壬子朔日有食之石勒築壘於葛陂課農造舟將攻建業琅邪王睿大集江南之衆於壽春以鎮東長史紀瞻為揚威將軍都督諸軍以討之㑹大雨三月不止勒軍中飢疫死者太半聞晉軍將至集將佐議之右長史刁膺請先送欵於睿求掃平河朔以自贖俟其軍退徐更圖之勒愀然長嘯中堅將軍䕫安請就高避水勒曰將軍何怯邪孔萇等三十餘將請各將兵分道夜攻壽春斬吴將頭據其城食其粟要以今年破丹楊定江南勒笑曰是勇將之計也各賜鎧馬一疋顧謂張賓曰於君意何如賓曰將軍攻陷京師囚執天子殺害王公妻略妃主擢將軍之髪不足以數將軍之罪柰何復相臣奉乎去年既殺王彌不當來此今天降霖雨於數百里中示將軍不應留此也鄴有三臺之固西接平陽山河四塞宐北徙據之以經營河北河北既定天下無處將軍之右者矣晉之保壽春畏將軍往攻之耳彼聞吾去喜於自全何暇追襲吾後為吾不利邪將軍宐使輜重從北道先發將軍引大兵向壽春輜重既逺大兵徐還何憂進退無地乎勒攘􅃑鼓髯曰張君計是也責刁膺曰君既相輔佐當共成大功奈何遽勸孤降此䇿應斬然素知君怯特相宥耳於是黜膺為將軍擢賓為右長史號曰右矦勒引兵發葛陂遣石虎帥騎二千向壽春遇晉運船虎將士爭取之為紀瞻所敗瞻追奔百里前及勒軍勒結陳待之瞻不敢擊退還壽春漢主聰封帝為㑹稽郡公加儀同三司聰從容謂帝曰卿昔為豫章王朕與王武子造卿武子稱朕於卿卿言聞其名久矣贈朕柘弓銀研卿頗記否帝曰臣安敢忘之但恨爾日不早識龍顔聰曰卿家骨肉何相殘如此帝曰大漢將應天受命故為陛下自相驅除此殆天意非人事也且臣家若能奉武皇帝之業九族敦睦陛下何由得之聰喜以小劉貴人妻帝曰此名公之孫也卿善遇之代公猗盧遣兵救晉陽三月乙未漢兵敗走卜珝之卒先奔靳沖擅収珝斬之聰大怒遣使持節斬冲聰納其舅子輔漢將軍張寔二女徽光麗光為貴人太后張氏之意也涼州主簿馬魴說張軌宐命將出師翼戴帝室軌從之馳檄關中共尊輔秦王且言今遣前鋒督䕶宋配帥步騎二萬徑趨長安西中郎將寔帥中軍三萬武威太守張琠帥胡騎二萬絡驛繼發夏四月丙寅征南將軍山􅂤卒
