body:
  text: 臣司馬光奉勑編集後唐紀五維赤奮若凡二年有竒起強圉大淵獻七月盡屠明宗聖德和武欽孝皇帝中之上天成二年秋七月以歸德節度使王晏球爲北面副招討使丙寅升夔州爲寧江軍以西方鄴爲節度使癸酉以與髙季興夔忠萬三州爲豆盧革韋說之罪皆賜死流段凝於遼州温韜於德州劉訓於濮州任圜請致仕居磁州許之八月己卯朔日有食之冊禮使至長沙楚王殷始建國立宫殿置百官皆如天子或微更其名翰林學士曰文苑學士知制誥曰知辭制樞密院曰左右機要司羣下稱之曰殿下令曰教以姚彦章爲左丞相許德勲爲右丞相李鐸爲司徒崔潁爲司空拓跋恒爲僕射張彦瑶張迎判機要司然管内官屬皆稱攝惟朗桂節度使先除後請命􅁪本姓元避殷父諱改焉九月帝謂安重誨曰從榮左右有矯宣朕㫖令勿接儒生恐弱人志氣者朕以從榮年少臨大藩故擇名儒使輔導之今姧人所言乃如此欲斬之重誨請嚴戒而已北都留守李彦超請復姓符從之丙寅以樞密使孔循兼東都留守壬申契丹來請修好遣使報之冬十月乙酉帝發洛陽將如汴州丁亥至滎陽民間訛言帝欲自擊呉又云欲制置東方諸侯宣武節度使檢校侍中朱守殷疑懼判官髙密孫晟勸守殷反守殷遂乗城拒守帝遣宣徽使范延光往諭之延光曰不早擊之則汴城堅矣願得五百􅀐與俱帝從之延光暮發未明行二百里抵大梁城下與汴人戰汴人大驚戊子帝至京水遣御營使石敬瑭將親軍倍道繼之或謂安重誨曰失職在外之人乗賊未破或能爲患不如除之重誨以爲然奏遣使賜任圜死端明殿學士趙鳳哭謂重誨曰任圜義士安肯爲逆公濫刑如此何以賛國使者至磁州圜聚其族酣飲然後死神情不撓己丑帝至大梁四面進攻吏民縋城出降者甚衆守殷知事不濟盡殺其族引頸命左右斬之乗城者望見乗輿相帥開門降孫晟奔呉徐知誥客之戊戌詔免三司逋負近二百萬緡辛丑呉大丞相都督中外諸軍事諸道都統鎭海寧國節度使兼中書令東海王徐温卒初温子行軍司馬忠義節度使同平章事知詢以其兄知誥非徐氏子數請代之執呉政温曰汝曹皆不如也嚴可求及行軍副使徐玠屢勸温以知詢代知誥温以知誥孝謹不忍也陳夫人曰知誥自我家貧賤時養之柰何富貴而弃之可求等言之不巳温欲帥諸藩鎭入朝勸呉王稱帝將行有疾乃遣知詢奉表勸進因留代知誥執政知誥草表欲求洪州節度使俟旦上之是夕温凶問至乃止知詢亟歸金陵呉王贈温齊王謚曰忠武山南西道節度使張筠乆疾將佐請見不許副使苻彦琳等疑其已死恐左右有姧謀請權交符印筠怒收彦琳及判官都指揮使下獄誣以謀反詔取彦琳等詣闕按之無狀釋之徙筠爲西都留守癸卯以保義節度使石敬瑭爲宣武節度使兼侍衞親軍馬步都指揮使十一月庚戌呉王即皇帝位追尊孝武王曰武皇帝景王曰景皇帝宣王曰宣皇帝安重誨議伐呉帝不許甲子呉大赦改元乾貞丙子呉主尊太妃王氏曰皇太后以徐知詢爲諸道副都統鎭海寧國節度使兼侍中加徐知誥都督中外諸軍事十二月戊寅朔孟知祥發民丁二十萬修成都城呉主立兄廬江公濛爲常山王弟鄱陽公澈爲平原王兄子南昌公珙爲建安王初晉陽相者周玄豹嘗言帝貴不可言帝即位欲召詣闕趙鳳曰玄豹言陛下當爲天子今已驗矣無所復詢若置之京師則輕躁狂險之人必輻湊其門爭問吉凶自古術士妄言致人族滅者多矣非所以靖國家也帝乃就除光禄卿致仕厚賜金帛而已中書舍人馬縞請用漢光武故事七廟之外别立親廟中書門下奏請如漢孝德孝仁皇例稱皇不稱帝帝欲兼稱帝羣臣乃引德明玄元興聖皇帝例請立廟京師帝令立於應州舊宅自髙祖考妣以下皆追謚曰皇帝皇后墓曰陵漢主如康州是嵗蔚代緣邊粟斗不過十錢三年春正月丁巳呉主立子璉爲江都王璘爲江夏王璆爲宜春王宣帝子廬陵公玢爲南陽王昭義節度使毛璋所爲驕僣時服赭􅂁縱酒爲戯左右有諌者剖其心而視之帝聞之徴爲右金吾衞上將軍契丹陷平州二月丁丑朔日有食之帝將如鄴都時扈駕諸軍家屬甫遷大梁又聞將如鄴都皆不􅀃詾詾有流言帝聞之不果行呉自莊宗滅梁以來使者往來不絶庚辰呉使者至安重誨以爲楊􅄎敢與朝廷抗禮遣使窺覘拒而不受自是遂與呉絶張筠至長安守兵閉門拒之筠單􅀐入朝以爲左衞上將軍壬辰寧江節度使西方鄴攻拔歸州未幾荆南復取之樞密使同平章事孔循性狡佞安重誨親信之帝欲爲皇子娶重誨女循謂重誨曰公職居近密不宜復與皇子爲昏重誨辭之乆之或謂重誨曰循善離間人不可置之密地循知之隂遣人結王德妃求納其女德妃請娶循女爲從厚婦帝許之重誨大怒乙未以循同平章事充忠武節度使兼東都留守重誨性强愎秦州節度使華温琪入朝請留闕下帝嘉之除左驍衞上將軍月别賜錢榖嵗餘帝謂重誨曰温琪舊人宜擇一重鎮處之重誨對以無闕它日帝屢言之重誨愠曰臣累奏無闕惟樞密使可代耳帝曰亦可重誨無以對温琪聞之懼數月不出重誨惡成德節度使同平章事王建立奏建立與王都交結有異志建立亦奏重誨專權求入朝靣言其狀帝召之旣至言重誨與宣徽使判三司張延朗結昏相表裏弄威福三月辛亥帝見重誨氣色甚怒謂曰今與卿一鎭自休息以王建立代卿張延朗亦除外官重誨曰臣披荆棘事陛下數十年值陛下龍飛承乏機密數年閒天下幸無事今一旦弃之外鎭臣願聞其罪帝不懌而起以語宣徽使朱弘昭弘昭曰陛下平日待重誨如左右手柰何以小忿弃之願垂三思帝尋召重誨慰撫之明日建立辭歸鎮帝曰卿比奏欲入分朕憂今復去何之㑹門下侍郎兼刑部尚書同平章事鄭珏請致仕己未以珏爲左僕射致仕癸亥以建立爲右僕射兼中書侍郎同平章事判三司孟知祥屢與董璋爭鹽利璋誘商旅販東川鹽入西川知祥患之乃於漢州置三場重征之歳得錢七萬緡商旅不復之東川楚王殷如岳州遣六軍使􅀽詮副使王環監軍馬希瞻將水軍擊荆南髙季興以水軍逆戰至劉郎洑希瞻夜匿戰艦數十艘於港中詰旦兩軍合戰希瞻出戰艦横擊之季興大敗俘斬以千數進逼江陵季興請和歸史光憲于楚軍還楚王殷讓環不遂取荆南環曰江陵在中朝及呉蜀之間四戰之地也宜存之以爲吾扞蔽殷恱環每戰身先士卒與衆同甘苦常置鍼藥於座右戰罷索傷者於帳前自􅀓治之士卒􅀠環麾下者相賀曰吾屬得死所矣故所向有功楚大舉水軍擊漢圍封州漢主以周易筮之遇大有於是大赦改元大有命左右街使蘇章將神弩三千戰艦百艘救封州章至賀江沈鐵絙於水兩岸作巨輪挽絙築長堤以隠之伏壯士於堤中章以輕舟逆戰陽不利楚人逐之入堤中挽輪舉絙楚艦不能進退以強弩夾水射之楚兵大敗解圍遁去漢主以章爲封州團練使夏四月以鄴都留守從榮爲河東節度使北都留守以客省使太原馮贇爲副留守夾馬都指揮使新平楊思權爲歩軍都指揮使以佐之戊寅以宣武節度使石敬瑭爲鄴都留守天雄節度使加同平章事以樞密使范延光爲成德節度使丙戌以樞密使安重誨兼河南尹以河南尹從厚爲宣武節度使仍判六軍諸衛事呉右雄武軍使苗璘静江統軍王彦章將水軍萬人攻楚岳州至君山楚王殷遣右丞相許德勲將戰艦千艘禦之德勲曰呉人掩吾不備見大軍必懼而走乃潛軍角子湖使王環夜帥戰艦三百屯楊林浦絶呉歸路遟明呉人進軍荆江口將㑹荆南兵攻岳州丁亥至道人磯德勲命戰棹都虞􅃸詹信以輕舟三百出呉軍後德勲以大軍當其前夾擊之呉軍大敗虜璘及彦章以歸初義武節度使兼中書令王都鎭易定十餘年自除刺史以下官租賦皆贍本軍及安重誨用事稍以法制裁之帝亦以都篡父位惡之時契丹數犯塞朝廷多屯兵於幽易間大將往來都隂爲之備浸成猜阻都恐朝廷移之它鎭腹心和昭訓勸都爲自全之計都乃求昏於盧龍節度使趙德鈞又知成德節度使王建立與安重誨有􅂩遣使結爲兄弟隂與之謀復河北故事建立陽許而密奏之都又以蠟書遺青徐潞益梓五帥離閒之又遣人􅀃北靣副招討使歸德節度使王晏球晏球不從乃以金遺晏球帳下使圖之不克癸巳晏球以都反狀聞詔宣徽使張延朗與北靣諸將議討之戊戌呉徙常山王濛爲臨川王庚子詔削奪王都官爵壬寅以王晏球爲北靣招討使權知定州行州事以横海節度使安審通爲副招討使以鄭州防禦使張䖍釗爲都監發諸道兵㑹討定州是日晏球攻定州拔其北關城都以重賂求救於奚酋秃餒五月秃餒以萬􅀐突入定州晏球退保曲陽都與秃餒就攻之晏球與戰於嘉山下大破之秃餒以二千􅀐奔還定州晏球追至城門因進攻之得其西闗城定州城堅不可攻晏球増修西闗城以爲行府使三州民輸稅供軍食而守之辛酉以天雄節度副使趙敬怡爲樞密使王晏球聞契丹發兵救定州將大軍趣望都遣張延朗分兵退保新樂延朗遂之眞定留趙州刺史朱建豐將兵修新樂城契丹巳自它道入定州與王都夜襲新樂破之殺建豐乙丑王晏球張延朗㑹於行唐丙寅至曲陽王都乗勝悉其衆與契丹五千􅀐合萬餘人邀晏球等於曲陽丁卯戰于城南晏球集諸將校令之曰王都輕而驕可一戰擒也今日諸君報國之時也悉去弓矢以短兵擊之回顧者斬於是􅀐兵先進奮撾揮劒直衝其陳大破之僵尸蔽野契丹死者過半餘衆北走都與秃餒得數􅀐僅免盧龍節度使趙德鈞邀擊契丹北走者殆無孑遺吳遣使求和於楚請苗璘王彦章楚王殷歸之使許德勲餞之德勲謂二人曰楚國雖小舊臣㝛將猶在願呉朝勿以措懷必俟衆駒爭皁棧然後可圖也時殷多内寵嫡庶無别諸子驕奢故德勲語及之六月辛巳髙季興復請稱藩于呉呉進季興爵秦王帝詔楚王殷討之殷遣許德勲將兵攻荆南以其子希範爲監軍次沙頭季興從子雲猛指揮使從嗣單􅀐造楚壁請與希範挑戰決勝副指揮使廖匡齊出與之闘拉殺之季興懼明日請和德勲還匡齊贛人也王晏球知定州有備未易急攻朱弘昭張䖍釗宣言大將畏怯有詔促令攻城晏球不得已乙未攻之殺傷將士三千人先是詔發西川兵戍夔州孟知祥遣左肅邊指揮使毛重威將三千人往頃之知祥奏夔忠萬三州已平請召戍兵還以省饋運帝不許知祥隂使人誘之重威帥其衆鼔譟逃歸帝命按其罪知祥請而免之陜州行軍司馬王宗壽表請葬故蜀主王􅄛秋七月乙巳贈􅄛順正公以諸矦禮葬之北靣招討使安審通卒東都民有犯私麴者留守孔循族之或請聽民造麴而於秋稅􅅿收五錢己未敇從之壬戌契丹復遣其酋長􅅥隱將七千􅀐救定州王晏球逆戰於唐河北大破之甲子追至易州時乆雨水漲契丹爲唐所俘斬及䧟溺死者不可勝數戊辰以威武節度使王延鈞爲閩王契丹北走道路泥濘人馬飢疲入幽州境八月甲戌趙德鈞遣牙將武從諌將精􅀐邀擊之分兵扼險要生擒惕隱等數百人餘衆散投村落村民以白梃擊之其得脱歸國者不過數十人自是契丹沮氣不敢輕犯塞初莊宗徇地河北獲小兒畜之宫中及長賜姓名曰李繼陶帝即位縱遣之王都得之使衣黄􅂁坐堞間謂王晏球曰此莊宗皇帝子也已即帝位公受先朝厚恩曽不念乎晏球曰公作此小數竟何益吾今教公二策不悉衆決戰則束手出降耳自餘無以求生也王建立以目不知書請罷判三司不許乙未吳大赦呉越王鏐欲立中子傳瓘爲嗣謂諸子曰各言汝功吾擇多者而立之傳瓘兄傳璹傳璙傳璟皆推傳瓘乃奏請以兩鎭授傳瓘閏月丁未詔以傳瓘爲鎮海鎭東節度使戊申趙德鈞獻契丹俘􅅥隱等諸將皆請誅之帝曰此曹皆虜中之驍將殺之則虜絶望不若存之以紓邊患乃赦􅅥隱等酋長五十人置之親衞餘六百人悉斬之契丹遣梅老季素等入貢初盧文進來降契丹以蕃漢都提舉使張希崇代之爲盧龍節度使守平州遣親將以三百􅀐監之希崇本書生爲幽州牙將没於契丹性和易契丹將稍親信之因與其部曲謀南歸部曲泣曰歸固寢食所不忘也然虜衆我寡柰何希崇曰吾誘其將殺之兵必潰去此去虜帳千餘里比其知而徴兵吾屬去逺矣衆曰善乃先爲穽實以石灰明日召虜將飲醉并從者殺之投諸穽中其營在城北亟發兵攻之契丹衆皆潰去希崇悉舉其所部二萬餘口來奔詔以爲汝州刺史呉王太后殂九月辛巳荆南敗楚兵于白田執楚岳州刺史李廷規歸于呉乙未敕以温韜發諸陵段疑反覆令所在賜死己亥以武寧節度使房知温兼荆南行營招討使知荆南行府事分遣中使發諸道兵赴襄陽以討髙季興辛丑徙慶州防禦使竇廷琬爲金州刺史冬十月廷琬據慶州拒命丙午以横海節度使李從敏兼北靣行營副招討使從敏帝之從子也戊申詔靜難節度使李敬周發兵討竇廷琬王都據定州守備固伺察嚴諸將屢有謀翻城應官軍皆不果帝遣使者促王晏球攻城晏球與使者聮􅀐廵城指之曰城髙峻如此借使主人聽外兵登城亦非梯衝所及徒多殺精兵無損於賊如此何爲不若食三州之租愛民養兵以俟之彼必内潰帝從之十一月有司請爲哀帝立廟詔立廟於曹州平盧節度使􅀳忠武公霍彦威卒忠州刺史王雅取歸州庚寅皇子從厚納孔循女爲妃循因之得之大梁厚結王德妃之黨乞留安重誨具奏其事力排之禮畢促令歸鎭甲午以中書侍郎同平章事王建立同平章事充平盧節度使丙申上問趙鳯帝王賜人鐵劵何也對曰與之立誓令其子孫長享爵禄耳上曰先朝受此賜者止三人崇韜繼麟尋皆族滅朕得脫如毫釐耳因歎息乆之趙鳯曰帝王心存大信固不必刻之金石也十二月甲辰李敬周奏拔慶州族竇廷琬荆南節度使髙季興寢疾命其子行軍司馬忠義節度使同平章事從誨權知軍府事丙辰季興卒呉主以從誨爲荆南節度使兼侍中史館修撰張昭逺上言臣竊見先朝時皇弟皇子皆喜俳優入則飾􅁎妾出則誇僕馬習尚如此何道能賢諸皇子宜精擇師傅令皇子屈身師事之講禮義之經論安危之理古者人君即位則建太子所以明嫡庶之分塞禍亂之源今卜嗣建儲臣未敢輕議至於恩澤賜與之閒昏姻省侍之際嫡庶長幼宜有所分示以等威絶其僥兾帝賞歎其言而不能用閩王延鈞度民二萬爲僧由是閩中多僧河東節度使北都留守從榮年少驕很不親政務帝遣左右素與從榮善者往與之處使從容諷導之其人私謂從榮曰河南相公恭謹好善親禮端士有老成之風相公齒長宜自策勵勿令聲問出河南之下從榮不悅退告步軍都指揮使楊思權曰朝廷之人皆推從厚而短我我其廢乎思權曰相公手握彊兵且有思權在何憂因勸從榮多募部曲繕甲兵隂爲自固之備又謂帝左右曰君每譽弟而抑其兄我輩豈不能助之邪其人懼以告副留守馮贇贇密奏之帝召思權詣闕以從榮故亦弗之罪也四年春正月馮贇入爲宣徽使謂執政曰從榮剛僻而輕易宜選重德輔之王都秃餒欲突圍走不得出二月癸丑定州都指揮使馬讓能開門納官軍都舉族自焚擒秃餒及契丹二千人辛亥以王晏球爲天平節度使與趙德鈞並加兼侍中秃餒至大梁斬於市樞密使趙敬怡卒甲子帝發大梁丁卯門下侍郎同平章事崔協卒於須水庚午帝至洛陽王晏球在定州城下日以私財饗士自始攻至克城未甞戮一卒三月辛巳晏球入朝帝美其功晏球謝乆煩饋運而已皇子右衞大將軍從璨性剛安重誨用事從璨不爲之屈帝東巡以從璨爲皇城使從璨與客宴於㑹節園酒酣戯登御榻重誨奏請誅之丙戌賜從璨死横山蠻寇邵州楚王殷命其子武安節度副使判長沙府希聲知政事揔録内外諸軍事自是國政先歷希聲乃聞於殷夏四月庚子朔禁鐵錫錢時湖南全用錫錢銅錢一直錫錢百流入中國法不能禁丙午楚六軍副使王環敗荆南兵于石首初令縁邊置􅂣市党項馬不令詣闕先是党項皆詣闕以貢馬爲名國家約其直酬之加以館榖賜與嵗費五十餘萬緡有司苦其秏蠹故止之壬子以皇子從榮爲河南尹判六軍諸衞事從厚爲河東節度使北都留守契丹寇雲州甲寅以端明殿學士兵部侍郎趙鳳爲門下侍郎同平章事五月乙酉中書言太常改謚哀帝曰昭宣光烈孝皇帝廟號景宗既稱宗則應入太廟在别廟則不應稱宗乃去廟號帝將祀南郊遣客省使李仁矩以詔諭兩川令西川獻錢一百萬緡東川五十萬緡皆辭以軍用不足西川獻五十萬緡東川獻十萬緡仁矩帝在藩鎭時客將也爲安重誨所厚恃恩驕慢至梓州董璋置宴召之日中不往方擁妓酣飲璋怒從卒徒執兵入驛立仁矩於階下而詬之曰公但聞西川斬李客省謂我獨不能邪仁矩流涕拜請僅而得免既而厚賂仁矩以謝之仁矩還言璋不法未幾帝復遣通事舍人李彦珣詣東川入境失小禮璋拘其從者彦珣奔還髙季興之叛也其子從誨切諌不聽從誨既襲位謂僚佐曰唐近而呉逺捨近臣逺非計也乃因楚王殷以謝罪於唐又遺山南東道節度使安元信書求保奏復修職貢丙申元信以從誨書聞帝許之契丹寇雲州六月戊申復以鄴都爲魏州留守皇城使並停庚申髙從誨自稱前荆南行軍司馬歸州刺史上表求内附秋七月甲申以從誨爲荆南節度使兼侍中己丑罷荆南招討使八月呉武昌節度使兼侍中李簡以疾求還江都癸丑卒于採石徐知詢簡壻也擅留簡親兵二千人于金陵表薦簡子彦忠代父鎭鄂州徐知誥以龍武統軍柴再用爲武昌節度使知詢怒曰劉崇俊兄之親三世爲濠州彦忠吾妻族獨不得邪初楚王殷用都軍判官髙郁爲謀主國賴以富彊鄰國皆疾之莊宗入洛殷遣其子希範入貢莊宗愛其警敏曰比聞馬氏當爲髙郁所奪今有子如此郁安能得之髙季興亦屢以流言間郁於殷殷不聽乃遣使遺節度副使知政事希聲書盛稱郁功名願爲兄弟使者言於希聲曰髙公常云馬氏政事皆出髙郁此子孫之憂也希聲信之行軍司馬楊昭遂希聲之妻族也謀代郁任曰譛之於希聲希聲屢言於殷稱郁奢僭且外交鄰藩請誅之殷日成吾功業皆郁力也汝勿爲此言希聲固請罷其兵柄乃左遷郁行軍司馬郁謂所親曰亟營西山吾將歸老猘子漸大能咋人矣希聲聞之益怒明日矯以殷命殺郁於府舍牓諭中外誣郁謀叛并誅其族黨至暮殷尚未知是日大霧殷謂左右曰吾昔從孫儒度淮每殺不辜多致茲異馬步院豈有寃死者乎明日吏以郁死告殷拊膺大慟曰吾老耄政非已出使我勲舊横罹寃酷既而顧左右曰吾亦何可乆處此乎九月上與馮道從容語及年榖屢登四方無事道曰臣常記昔在先皇幕府奉使中山歷井陘之險臣憂馬蹶執轡甚謹幸而無失逮至平路放轡自逸俄至顛隕凡爲天下者亦猶是也上深以爲然上又問道今嵗雖豐百姓贍足否道曰農家嵗凶則死於流殍嵗豐則傷於榖賤豐凶皆病者惟農家爲然臣記進士聶夷中詩云二月賣新絲五月糶新榖醫得眼下瘡剜却心頭肉語雖鄙俚曲盡田家之情狀農於四人之中最爲勤苦人主不可不知也上悅命左右録其詩常諷誦之鄜州兵戍東川者歸本道董璋擅留其壯者選羸老歸之仍收其甲兵癸巳西川右都押牙孟容弟爲資州税官坐自次抵死觀察判官馮瑑中門副使王處回爲之請孟知祥曰雖吾弟犯法亦不可貸況它人乎呉越王鏐居其國好自大朝廷使者曲意奉之則贈遺豐厚不然則禮遇踈薄甞遺安重誨書辭禮頗倨帝遣供奉官烏昭遇韓玫使呉越昭遇與玫有􅂩使還玫奏昭遇見鏐稱臣拜舞謂鏐爲殿下及私以國事告鏐安重誨奏賜昭遇死癸巳制鏐以太師致仕自餘官爵皆削之凡呉越進奏官使者綱吏令所在繫治之鏐令子傳瓘等上表訟寃皆不省初朔方節度使韓洙卒弟澄爲留後未幾定逺軍使李匡賔聚黨據保靜鎭作亂朔方不安冬十月丁酉韓澄遣使齎絹表乞朝廷命帥前磁州刺史康福善胡語上退朝多召入便殿訪以時事福以胡語對安重誨惡之常戒之曰康福汝但妄奏事㑹當斬汝福懼求外補重誨以靈州深入胡境爲帥者多遇害戊戌以福爲朔方河西節度使福見上涕泣辭之上命重誨爲福更它鎭重誨曰福自刺史無功建節尚復何求且成命已行難以復改上不得已謂福曰重誨不肯非朕意也福辭行上遣將軍牛知柔河中都指揮使衞審等將兵萬人衞送之審徐州人也辛亥割閬果二州置保寧軍壬子以内客省使李仁矩爲節度使先是西川常發芻糧饋峽路孟知祥辭以本道兵自多難以奉它鎮詔不許屢督之甲寅知祥奏稱財力乏不奉詔吳諸道副都統鎮海寧國節度使兼侍中徐知詢自以握兵據上流意輕徐知誥數與知誥爭權内相猜忌知誥患之内樞密使王令謀曰公輔政日乆挾天子以令境内誰敢不從知詢年少恩信未洽於人無能爲也知詢待諸弟薄諸弟皆怨之徐玠知知詢不可輔反持其短以附知誥呉越王鏐遺知詢金玉鞍勒器皿皆飾以龍鳳知詢不以爲嫌乗用之知詢典客周廷望􅀃知詢曰公誠能捐寶貨以結朝中勲舊使皆歸心於公則彼誰與處知詢從之使廷望如江都諭意廷望與知誥親吏周宗善密輸欵於知誥亦以知誥隂謀告知詢知詢召知誥詣金陵除父温喪知誥稱吳主之命不許周宗謂廷望曰人言侍中有不臣七事宜亟入謝廷望還以告知詢十一月知詢入朝知誥留知詢為統軍領鎮海節度使遣右雄武都指揮使柯厚徴金陵兵還江都知誥自是始專吳政知詢責知誥曰先王違世兄為人子初不臨喪可乎知誥曰爾挺劒待我我何敢往爾為人臣畜乗輿物亦可乎知詢又以廷望所言詰知誥知誥曰以爾所為告我者亦廷望也遂斬廷望􅊨壬辰吳主加尊號曰睿聖文明光孝皇帝大赦改元大和康福行至方渠羌胡出兵邀福福擊走之至青剛峽遇吐蕃野利大蟲二族數千帳皆不覺唐兵至福遣衞審掩擊大破之殺獲殆盡由是威聲大振遂進至靈州自是朔方始受代十二月吳加徐知誥兼中書令領寧國節度使知誥召徐知詢飲以金鍾酌酒賜之曰願弟壽千嵗知詢疑有毒引它器均之跽獻知誥曰願與兄各享五百嵗知誥變色左右顧不肯受知詢捧酒不退左右莫知所為伶人申漸髙徑前為詼諧語掠二酒合飲之懐金鍾趨出知誥密遣人以良藥解之己腦潰而卒奉國節度使知建州王延稟稱疾退居里第請以建州授其子繼雄庚子詔以繼雄為建州刺史安重誨既以李仁矩鎮閬州使與綿州刺史武䖍裕皆將兵赴治䖍裕帝之故吏重誨之外兄也重誨使仁矩詗董璋反狀仁矩増飾而奏之朝廷又使武信節度使夏魯竒治遂州城隍繕甲兵益兵戍之璋大懼時道路傳言又將割緜龍為節鎮孟知祥亦懼璋素與知祥有隙未嘗通問至是璋遣使詣成都請為其子娶知祥女知祥許之謀併力以拒朝廷資治通鑑巻第二百七十六
