front:
  text: 資治通鑑卷第二百八
  hash: sha256:a8760c26c1ee245ea7894b851e119d2bb97b547cb8231cf4a5efc0e2c1391d48
body:
  text: 臣司馬光奉勑編集唐紀二十四強圉協洽凡二年有竒起旃䝉大荒落二月盡中宗大和大聖大昭孝皇帝中神龍元年二月辛亥帝帥百官詣上陽宫問太后起居自是每十日一往甲寅復國號曰唐郊廟社稷陵寢百官旗幟服色文字皆如永淳以前故事復以神都為東都北都為并州老君為􅀇元皇帝乙夘鳯閣侍郎同平章事韋承慶貶髙要尉正諌大夫同平章事房融除名流髙州司禮卿崔神慶流欽州楊再思為户部尚書同中書門下三品西京留守太后之遷上陽宫也太僕卿同中書門下三品姚元之獨嗚咽流涕桓彦範張柬之謂曰今日豈公涕泣時邪恐公禍由此始元之曰元之事則天皇帝久乍此辭違悲不能忍且元之前日從公誅姦逆人臣之義也今日别舊君亦人臣之義也雖獲罪實所甘心是日出為亳州刺史甲子立妃韋氏為皇后赦天下追贈后父􅀇貞為上洛王母崔氏為妃左拾遺賈虚已上疏以為異姓不王古今通制今中興之始萬姓喁喁以觀陛下之政而先王后族非所以廣徳美於天下也且先朝增后父太原王殷鍳不遠須防其漸若以恩制已行宜令皇后固譲則益增謙冲之徳矣不聽初韋后生邵王重潤長寧安樂二公主上之遷房陵也安樂公主生於道中上特愛之上在房陵與后同幽閉備嘗艱危情愛甚篤上每聞敕使至輒惶恐欲自殺后止之曰禍福無常寧失一死何遽如是上嘗與后私誓曰異時幸復見天日當惟卿所欲不相禁禦及再為皇后遂干預朝政如武后在髙宗之世桓彦範上表以為易稱無攸遂在中饋貞吉書稱牝雞之辰惟家之索伏見陛下毎臨朝皇后必施帷幔坐殿上預聞政事臣竊觀自古帝王未有與婦人共政而不破國亡身者也且以隂乘陽違天也以婦陵夫違人也伏願陛下覽古今之戒以社稷蒼生為念令皇后專居中宫治隂敎勿出外朝干國政先是胡僧慧範以妖妄遊權貴之門與張易之兄弟善韋后亦重之及易之誅復稱慧範預其謀以功加銀青光禄大夫賜爵上庸縣公出入宫掖上數㣲行幸其舍彦範復表言慧範執左道以亂政請誅之上皆不聽初武后誅唐宗室有才徳者先死惟吴王恪之子鬰林侯千里􅄶躁無才又數獻符瑞故獨得免上即位立為成王拜左金吾大將軍武后所誅唐諸王妃主駙馬等皆無人􅁙埋子孫或流竄嶺表或拘囚歴年或逃匿民間為人傭保至是制州縣求訪其柩以禮改􅁙追復官爵召其子孫使之承襲無子孫者為擇後置之既而宗室子孫相繼而至皆召見涕泣舞蹈各以親疎襲爵拜官有差二張之誅也洛州長史薛季昶謂張柬之敬暉曰二凶雖除産禄猶在去草不去根終當復生二人曰大事已定彼猶机上肉耳夫何能為所誅已多不可復益也季昶歎曰吾不知死所矣朝邑尉武强劉幽求亦謂桓彦範敬暉曰武三思尚存公輩終無􅁙地若不早圖噬臍無及不從上女安樂公主適三思子崇訓上官婉兒者儀之女孫也儀死沒入掖庭辯慧善屬文明習吏事則天愛之自聖歷以後百司表奏多令叅决及上即位又使專掌制命益委任之拜為媫妤用事於中三思通焉故黨於武氏又薦三思於韋后引入禁中上遂與三思圖議政事張柬之等皆受制於三思矣上使韋后與三思䨇陸而自居旁為之㸃籌三思遂與后通由是武氏之勢復振張柬之等數勸上誅諸武上不聽柬之等曰革命之際宗室諸李誅夷略盡今頼天地之靈陛下返正而武氏濫官􅆫爵按堵如故豈遠近所望邪願頗抑損其禄位以慰天下又不聽柬之等或撫牀歎憤或彈指出血曰主上昔為英王時稱勇烈吾所以不誅諸武者欲使上自誅之以張天子之威耳今反如此事勢已去知復奈何上數㣲服幸武三思第監察御史清河崔皎宻疏諌曰國命初復則天皇帝在西宫人心猶有附㑹周之舊臣列居朝廷陛下柰何輕有外遊不察豫且之禍上洩之三思之黨切齒丙寅以太子賔客武三思為司空同中書門下三品左散騎常侍譙王重福上之庶子也其妃張易之之甥韋后惡之􅉲於上曰重潤之死重福為之也由是貶濮州員外刺史又改均州刺史常令州司防守之丁夘以右散騎常侍安定王武攸暨為司徒定王辛未相王固讓太尉及知政事許之又立為皇太弟相王固辭而止甲戌以國子祭酒始平祝欽明同中書門下三品黄門侍郎知侍中事韋安石為刑部尚書罷知政事丁丑武三思武攸暨固辭新官爵及政事許之並加開府儀同三司立皇子義興王重俊為衛王北海王重茂為温王仍以重俊為洛州牧三月甲申制文明已來破家子孫皆復舊資廕唯徐敬業裴炎不在免限丁亥制酷吏周興來俊臣等已死者追奪官爵存者皆流嶺南惡地己丑以袁恕己為中書令以安車徴安平王武攸緒於嵩山既至除太子賓客固請還山許之制梟氏蟒氏皆復舊姓術士鄭普思尚衣奉御葉静能皆以妖妄為上所信重夏四月墨敕以普思為祕書監静能為國子祭酒桓彦範崔􅀇暐固執不可上曰已用之無容遽改彦範曰陛下初即位下制云政令皆依貞觀故事貞觀中魏徴虞世南顔師古為祕書監孔穎逹為國子祭酒豈普思静能之比乎庚戌左拾遺李邕上疏以為詩三百一言以蔽之曰思無邪若有神仙能令人不死則秦始皇漢武帝得之矣佛能為人福利則梁武帝得之矣堯舜所以為帝王首者亦修人事而已尊寵此屬何補於國上皆不聽上即位之日驛召魏元忠於髙要丁夘至都拜衛尉卿同平章事甲戌以魏元忠為兵部尚書韋安石為吏部尚書李懷遠為右散騎常侍唐休璟為輔國大將軍崔􅀇暐檢校益府長史楊再思檢校楊府長史祝欽明為刑部尚書並同中書門下三品元忠等皆以東宫舊僚襃之也乙亥以張柬之為中書令戊寅追贈故邵王重潤為懿徳太子五月壬午遷周廟七主於西京崇尊廟制武氏三代諱奏事者皆不得犯乙酉立太廟社稷於東都以張柬之等及武攸暨武三思鄭普思等十六人皆為立功之人賜以鐡劵自非反逆各恕十死癸巳敬暉等帥百官上表以為五運迭興事不兩大天授革命之際宗室誅竄殆盡豈得與諸武並封今天命惟新而諸武封建如舊並居京師開闢以來未有斯理願陛下為社稷計順遐邇心降其王爵以安内外上不許敬暉等畏武三思之讒以考功員外郎崔湜為耳目伺其動静湜見上親三思而忌暉等乃悉以暉等謀告三思反為三思用三思引為中書舍人湜仁師之孫也先是殿中侍御史南皮鄭愔諂事二張二張敗貶宣州司士參軍坐贓亡入東都私謁武三思初見三思哭甚哀既而大笑三思素貴重甚恠之愔曰始見大王而哭哀大王將戮死而滅族也後乃大笑喜大王之得愔也大王雖得天子之意彼五人皆據將相之權膽略過人廢太后如反掌大王自視勢位與太后孰重彼五人日夜切齒欲噬大王之肉非盡大王之族不足以快其志大王不去此五人危如朝露而晏然尚自以為泰山之安此愔所以為大王寒心也三思大悦與之登樓問自安之䇿引為中書舍人與崔湜皆為三思謀主三思與韋后日夜􅉲暉等云恃功專權將不利於社稷上信之三思等因為上畫䇿不若封暉等為王罷其政事外不失尊寵功臣内實奪之權上以為然甲午以侍中齊公敬暉為平陽王譙公桓彦範為扶陽王中書令漢陽公張柬之為漢陽王南陽公袁恕己為南陽王特進同中書門下三品博陵公崔􅀇暐為博陵王罷知政事賜金帛鞍馬令朝朔望仍賜彦範姓韋氏與皇后同籍尋又以􅀇暐檢校益州長史知都督事又改梁州刺史三思令百官復修則天之政不附武氏者斥之為五王所逐者復之大權盡歸三思矣五王之請削武氏諸王也求人為表衆莫肯為中書舍人岑羲為之語甚激切中書舍人偃師畢􅌟次當讀表辭色明厲三思既得志羲改祕書少監出􅌟為潤州刺史易州刺史趙履温桓彦範之妻兄也彦範之誅二張稱履温預其謀召為司農少卿履温以二婢遺彦範及彦範罷政事履温復奪其婢上嘉宋璟忠直累遷黄門侍郎武三思嘗以事屬璟璟正色拒之曰今太后既復子明辟王當以侯就第何得尚干朝政獨不見産禄之事乎以韋安石兼檢校中書令魏元忠兼檢校侍中又以李湛為右散騎常侍趙承恩為光禄卿楊元琰為衛尉卿先是元琰知三思浸用事請弃官為僧上不許敬暉聞之笑曰使我早知勸上許之髠去胡頭豈不妙哉元琰多鬚類胡故暉戲之元琰曰功成名遂不退將危此乃由衷之請非徒然也暉知其意瞿然不悦及暉等得罪元琰獨免上官婕妤勸韋后襲則天故事上表請天下士庶為出母服喪三年又請百姓年二十三為丁五十九免役改易制度以收時望制皆許之癸夘制降諸武梁王三思為徳静王定王攸暨為樂夀王河內王懿宗等十二人皆降為公以厭人心甲辰以唐休璟為左僕射同中書門下三品如故豆盧欽望為右僕射六月壬子以左驍衛大將軍裴思說充靈武軍大揔管以僃突厥癸亥命右僕射豆盧欽望有軍國重事中書門下可共平章先是僕射為正宰相其後多兼中書門下之職午前決朝政午後決省事至是欽望專為僕射不敢預政事故有是命是後專拜僕射者不復為宰相矣又以韋安石為中書令魏元忠為侍中楊再思檢校中書令丁夘祔孝敬皇帝於太廟號義宗戊辰洛水溢流二千餘家秋七月辛巳以太子賓客韋巨源同中書門下三品西京留守如故特進漢陽王張柬之表請歸襄州養疾乙未以柬之為襄州刺史不知州事給全俸河南北十七州大水八月戊申以水災求直言右衛騎曹參軍西河宋務光上疏以為水隂類臣妾之象恐後庭有干外朝之政者宜杜絶其萌今霖雨不止乃閉坊門以禳之至使里巷謂坊門為宰相言朝廷使之燮理隂陽也又太子國本宜早擇賢能而立之又外戚太盛如武三思等宜解其機要厚以禄賜又鄭普思葉静能以小技竊大位亦朝政之蠧也疏奏不省壬戌追立妃趙氏為恭皇后孝敬皇帝妃裴氏為哀皇后九月壬午上祀昊天上帝皇地祗于明堂以髙宗配初上在房陵州司制約甚急刺史河東張知謇靈昌崔敬嗣獨待遇以禮供給豐贍上徳之擢知謇自貝州刺史為左衛將軍賜爵范陽公敬嗣已卒求得其子汪嗜酒不堪釐職除五品散官改􅁙上洛王韋􅀇貞其儀皆如太原王故事癸巳太子賓客同中書門下三品韋巨源罷為禮部尚書以其從父安石為中書令故也以左衛將軍上邽紀處訥兼檢校太府卿處訥娶武三思之妻姊故也冬十月命唐休璟留守京師癸亥上幸龍門乙丑獵於新安而還辛未以魏元忠為中書令楊再思為侍中十一月戊寅羣臣上皇帝尊號曰應天皇帝皇后曰順天皇后壬午上與后謁謝太廟赦天下相王太平公主加實封皆滿萬户己丑上御洛城南樓觀潑寒胡戯清源尉吕元泰上疏以為謀時寒若何必祼身揮水鼓舞衢路以索之疏奏不納壬寅則天崩於上陽宫年八十二遺制去帝號稱則天大聖皇后王蕭二族及禇遂良韓瑗栁奭親屬皆赦之上居諒隂以魏元忠攝冢宰三日元忠素負忠直之望中外頼之武三思憚之矯太后遺制慰諭元忠賜實封百户元忠捧制感咽涕泗見者曰事去矣十二月丁夘上始御同明殿見羣臣太后將合葬乾陵給事中嚴善思上疏以為乾陵􅀇宫以石為門鐡錮其縫今啟其門必須鐫鑿神明之道體尚幽􅀇動衆加功恐多驚黷况合􅁙非古漢時諸陵皇后多不合􅁙魏晉已降始有合者望於乾陵之傍更擇吉地為陵若神道有知幽塗自當通㑹若其無知合之何益不從是嵗戸部奏天下戸六百一十五萬口三千七百一十四萬有畸二年春正月戊戌以吏部尚書李嶠同中書門下三品中書侍郎于惟謙同平章事閏月丙午制太平長寧安樂宜城新都定安金城公主並開府置官屬武三思以敬暉桓彦範袁恕己尚在京師忌之乙夘出為滑洺豫三州刺史賜閺郷僧萬回號法雲公甲戌以突􅀐酋長烏質勒爲懷德郡王二月乙未以刑部尚書韋巨源同中書門下三品仍與皇后叙宗族丙申僧慧範等九人並加五品階賜爵郡縣公道士史崇恩等三人加五品階除國子􅀕酒同正葉靜能加金紫光禄大夫選左右臺及内外五品以上官二十人爲十道廵察使委之察吏撫人薦賢直獄二年一代考其功罪而進退之易州刺史魏人姜師度禮部貟外郎馬懷素殿中侍御史臨漳源乾曜監察御史靈昌盧懷慎衛尉少卿滏陽李傑皆預焉三月甲辰中書令韋安石罷為户部尚書戸部尚書蘓瓌為侍中西京留守瓌頲之父也唐休璟致仕初少府監丞􅀪農宋之問及弟兖州司倉之遜皆坐附㑹張易之貶嶺南逃歸東都匿於友人光禄卿駙馬都尉王同皎家同皎疾武三思及韋后所為毎與所親言之輒切齒之遜於簾下聞之宻遣其子曇及甥校書郎李悛告三思欲以自贖三思使曇悛及撫州司倉冉祖雍上書告同皎與洛陽人張仲之祖延慶武當丞夀春周憬等潜結壯士謀殺三思因勒兵詣闕廢皇后上命御史大夫李承嘉監察御史姚紹之按其事又命楊再思李嶠韋巨源參驗仲之言三思罪狀事連宫壼再思巨源陽寐不聽嶠與紹之命反接送獄仲之還顧言不已紹之命檛之折其臂仲之大呼曰吾已負汝死當訟汝於天庚戌同皎等皆坐斬籍沒其家周憬亡入比干廟中大言曰比干古之忠臣知吾此心三思與皇后淫亂傾危國家行當梟首都市恨不及見耳遂自剄之問之遜曇悛祖雍並除京官加朝散大夫武三思與韋后日夜􅉲敬暉等不已復左遷暉為朗州刺史崔􅀇暐為均州刺史桓彦範為亳州刺史袁恕己為郢州刺史與暉等同立功者薛思行等皆以為黨與坐貶大置員外官自京司及諸州凡二千餘人宦官超遷七品以上員外官者又將千人魏元忠自端州還為相不復彊諫惟與時俯仰中外失望酸棗尉袁楚客致書元忠以為主上新服厥命惟新厥徳當進君子退小人以興大化豈可安其榮寵循黙而已今不早建太子擇師傅而輔之一失也公主開府置僚屬二失也崇長緇衣使遊走權門借勢納賂三失也俳優小人盜竊品秩四失也有司選進賢才皆以貨取勢求五失也寵進宦者殆滿千人為長亂之階六失也王公貴戚賞賜無度競為侈靡七失也廣置員外官傷財害民八失也先朝宫女得自便居外出入無禁交通請謁九失也左道之人熒惑主聽盜竊禄位十失也凡此十失君侯不正誰正之哉元忠得書愧謝而已夏四月改贈后父韋􅀇貞為酆王后四弟皆贈郡王己丑左散騎常侍同中書門下三品李懷遠致仕處士京兆韋月將上書告武三思濳通宫掖必為逆亂上大怒命斬之黄門侍郎宋璟奏請推按上益怒不及整巾屣履出側門謂璟曰朕謂已斬乃猶未邪命趨斬之璟曰人言中宫私於三思陛下不問而誅之臣恐天下必有竊議固請按之上不許璟曰必欲斬月將請先斬臣不然臣終不敢奉詔上怒少解左御史大夫蘇珦給事中徐堅大理卿長安尹思貞皆以為方夏行戮有違時令上乃命與杖流嶺南過秋分一日平曉廣州都督周仁軌斬之御史大夫李承嘉附武三思詆尹思貞於朝思貞曰公附㑹姦臣將圖不軌先除忠臣邪承嘉怒劾奏思貞出為青州刺史或謂思貞曰公平日訥於言及廷折承嘉何其敏邪思貞曰物不能鳴者激之則鳴承嘉恃威權相陵僕義不受屈亦不知言之從何而至也武三思惡宋璟出之檢校貝州刺史五月庚申􅁙則天大聖皇后於乾陵武三思使鄭愔告朗州刺史敬暉亳州刺史韋彦範襄州刺史張柬之郢州刺史袁恕己均州刺史崔􅀇暐與王同皎通謀六月戊寅貶暉崖州司馬彦範瀧州司馬柬之新州司馬恕己竇州司馬􅀇暐白州司馬並員外置仍長任削其勲封復彦範姓桓氏初韋􅀇貞流欽州而卒蠻酋甯承基兄弟逼取其女妻崔氏不與承基等殺之及其四男洵浩洞泚上命廣州都督周仁軌使將兵二萬討之承基等亡入海仁軌追斬之以其首祭崔氏墓殺掠其部衆殆盡上喜加仁軌鎮國大將軍充五府大使賜爵汝南郡公韋后隔簾拜仁軌以父事之及韋后敗仁軌以黨與誅秋七月戊申立衛王重俊為皇太子太子性明果而官屬率貴遊子弟所為多不法左庶子姚珽屢諫不聽珽璹之弟也丙寅以李嶠為中書令上將還西京辛未左散騎常侍李懷遠同中書門下三品充東都留守武三思隂令人疏皇后穢行牓於天津橋請加廢黜上大怒命御史大夫李承嘉窮覈其事承嘉奏言敬暉桓彦範張柬之袁恕己崔􅀇暐使人為之雖云廢后實謀大逆請族誅之三思又使安樂公主􅉲之於内侍御史鄭愔言之於外上命法司結竟大理丞三原李朝隠奏稱暉等未經推鞫不可遽就誅夷大理丞裴談奏請暉等宜據制書處斬籍沒不應更加推鞫上以暉等嘗賜鐡劵許以不死乃長流暉於瓊州彦範於瀼州柬之於瀧州恕己於環州􅀇暐於古州子弟年十六以上皆流嶺外擢承嘉為金紫光禄大夫進爵襄武郡公談為刑部尚書出李朝隠為聞喜令三思又諷太子上表請夷暉等三族上不許中書舍人崔湜説三思曰暉等異日北歸終為後患不如遣使矯制殺之三思問誰可使者湜薦大理正周利用利用先為五王所惡貶嘉州司馬乃以利用攝右臺侍御史奉使嶺外比至柬之􅀇暐已死遇彦範於貴州令左右􅅞之曳於竹槎之上肉盡至骨然後杖殺得暉冎而殺之恕己素服黄金利用逼之使飲野葛汁盡數升不死不勝毒憤掊地爪甲殆盡仍捶殺之利用還擢拜御史中丞薛季昶累貶儋州司馬飲藥死三思既殺五王權傾人主常言我不知代間何者謂之善人何者謂之惡人但於我善者則為善人於我惡者則為惡人耳時兵部尚書宗楚客將作大匠宗晉卿大府卿紀處訥鴻臚卿甘元柬皆為三思羽翼御史中丞周利用侍御史冉祖雍太僕丞李俊光禄丞宋之遜監察御史姚紹之皆為三思耳目時人謂之五狗九月戊午左散騎常侍同中書門下三品李懷逺薨初李嶠為吏部侍郎欲樹私恩再求入相奏大置員外官廣引貴勢親識既而為相銓衡失序府庫減耗乃更表言濫官之􅁦且請遜位上慰諭不許冬十月己夘車駕發東都以前檢校并州長史張仁愿檢校左屯衛大將軍兼洛州長史戊戌車駕至西京十一月乙巳赦天下丙辰以蒲州刺史竇從一為雍州刺史從一徳􅀇之子也初名懷貞避皇后父諱更名從一多諂附權貴太平公主與僧寺爭碾磑雍州司戸李元紘判歸僧寺從一大懼亟命元紘改判元紘大署判後曰南山可移此判無動從一不能奪元紘道廣之子也初祕書監鄭普思納其女於後宫監察御史靈昌崔日用劾奏之上不聽普思聚黨於雍岐二州謀作亂事覺西京留守蘇瓌収繫窮治之普思妻第五氏以鬼道得幸於皇后上敕瓌勿治及車駕還西京瓌廷爭之上抑瓌而佑普思侍御史范獻忠進曰請斬蘇瓌上曰何故對曰瓌為留守大臣不能先斬普思然後奏聞使之熒惑聖聽其罪大矣且普思反狀明白而陛下曲為申理臣聞王者不死殆謂是乎臣願先賜死不能北面事普思魏元忠曰蘇瓌長者用刑不枉普思法當死上不得已戊午流普思於儋州餘黨皆伏誅十二月己夘突厥黙啜寇鳴沙靈武軍大揔管沙吒忠義與戰軍敗死者六千餘人丁巳突厥進寇原㑹等州掠隴右牧馬萬餘匹而去免忠義官安西大都䕶郭元振請突騎施烏質勒牙帳議軍事天大風雪元振立於帳前與烏質勒語久之雪深元振不移足烏質勒老不勝寒㑹罷而卒其子娑葛勒兵將攻元振副使御史中丞解琬知之勸元振夜逃去元振曰吾以誠心待人何所疑懼且深在寇庭逃將安適安卧不動明旦入哭甚哀娑葛感其義待元振如初戊戌以娑葛襲嗢鹿州都督懐徳王安樂公主恃寵驕恣賣官鬻獄勢傾朝野或自為制敕掩其文令上署之上笑而從之竟不視也自請為皇太女上雖不從亦不譴責景龍元年春正月庚戌制以突厥黙啜寇邊命内外官各進平突厥之䇿右補闕盧俌上疏以為郤縠悅禮樂敦詩書為晉元帥杜預射不穿札建平吴之勲是知中權制謀不取一夫之勇如沙吒忠義驍將之材本不足以當大任又鳴沙之役主將先逃宜正邦憲賞罰既明敵無不服又邊州刺史宜精擇其人使之蒐卒乘積資糧來則禦之去則備之去嵗四方旱災未易興師當理内以及外綏近以來遠俟倉廪實士卒練然後大舉以討之上善之二月丙戌上遣武攸暨武三思詣乾陵祈雨既而雨降上喜制復武氏崇恩廟及昊陵順陵因名酆王廟曰襃徳陵曰榮先又制崇恩廟齋郎取五品子充太常博士楊孚曰太廟皆取七品已下子為齋郎今崇恩廟取五品子未知太廟當如何上命太廟亦凖崇恩廟孚曰以臣凖君猶為僣逆况以君凖臣乎上乃止庚寅敕改諸州中興寺觀為龍興自今奏事不得言中興右􅀘闕權若訥上疏以為天地日月等字皆則天能事賊臣敬暉等輕紊前規今削之無益於淳化存之有光於孝理又神龍元年制書一事以上並依貞觀故事豈可近捨母儀遠尊祖徳䟽奏手制襃美三月庚子吐蕃遣其大臣悉薫熱入貢夏四月辛巳以上所養雍王守禮女金城公主妻吐蕃贊普五月戊戌以左屯衛大將軍張仁愿為朔方道大揔管以僃突厥上以歳旱榖貴召太府卿紀處訥謀之明日武三思使知太史事迦葉志忠奏是夜攝提入太㣲宫至帝座主大臣宴見納忠於天子上以為然敕稱處訥忠誠徹於􅀇象賜衣一襲帛六十段六月丁夘朔日有食之姚嶲道討擊使監察御史晉昌唐九徴擊姚州叛蠻破之斬獲三千餘人皇后以太子重俊非其所生惡之特進徳静王武三思尤忌太子上官婕妤以三思故每下制敕推尊武氏安樂公主與駙馬左衛將軍武崇訓常陵侮太子或呼為奴崇訓又教公主言於上請廢太子立己為皇太女太子積不能平秋七月辛丑太子與左羽林大將軍李多祚將軍李思冲李承况獨孤禕之沙吒忠義等矯制發羽林千騎兵三百餘人殺三思崇訓于其第并親黨十餘人又使左金吾大將軍成王千里及其子天水王禧分兵守宫城諸門太子與多祚引兵自肅章門斬闗而入叩閤索上官婕妤婕妤大言曰觀其意欲先索婉兒次索皇后次及大家上乃與韋后安樂公主上官婕妤登􅀇武門樓以避兵鋒使左羽林大將軍劉景仁帥飛騎百餘人屯於樓下以自衛楊再思蘇瓌李嶠與兵部尚書宗楚客左衛將軍紀處訥擁兵二千餘人屯太極殿前閉門自守多祚先至􅀇武樓下欲升樓宿衛拒之多祚與太子狐疑按兵不戰冀上問之宫闈令石城楊思朂在上側請擊之多祚壻羽林中郎將野呼利為前鋒揔管思朂挺刅斬之多祚軍奪氣上據檻俯謂多祚所將千騎曰汝輩皆朕宿衛之士何為從多祚反茍能斬反者勿患不富貴於是千騎斬多祚承况禕之忠義餘衆皆潰成王千里天水王禧攻右延明門將殺宗楚客紀處訥不克而死太子以百騎走終南山至鄠西能屬者纔數人憩於林下為左右所殺上以其首獻太廟及祭三思崇訓之柩然後梟之朝堂更成王千里姓曰蝮氏同黨皆伏誅東宫僚屬無敢近太子尸者唯永和縣丞􅑔嘉朂觧衣裹太子首號哭貶興平丞太子兵所經諸門守者皆坐流韋氏之黨奏請悉誅之上更命法司推斷大理卿宋城鄭惟忠曰大獄始决人心未安若復有改推則反仄者衆矣上乃止以楊思朂為銀青光禄大夫行内常侍癸夘赦天下贈武三思太尉梁宣王武崇訓開府儀同三司魯忠王安樂公主請用永泰公主故事以崇訓墓為陵給事中盧粲駮之以為永泰事出特恩今魯王主壻不可為比上手敕曰安樂與永泰無異同穴之義今古不殊粲又奏以爲陛下以膝下之愛施及其夫豈可使上下無辨君臣一貫哉上乃從之公主怒出粲為陳州刺史襄邑尉襄陽席豫聞安樂公主求為太女歎曰梅福譏切王氏獨何人哉乃上書請立太子言甚深切太平公主欲表為諫官豫恥之逃去八月戊寅皇后及王公已下表上尊號曰應天神龍皇帝改􅀇武門為神武門樓為制勝樓宗楚客又帥百官表請加皇后尊號曰順天翊聖皇后上並許之初右臺大夫蘇珦治太子重俊之黨囚有引相王者珦宻為之申理上乃不問自是安樂公主及兵部尚書宗楚客日夜謀􅉲相王使侍御史冉祖雍等誣奏相王及太平公主云與重俊通謀請收付制獄上召吏部侍郎兼御史中丞蕭至忠使鞫之至忠泣曰陛下富有四海不能容一弟一妹而使人羅織害之乎相王昔為皇嗣固請於則天以天下讓陛下累日不食此海内所知奈何以祖雍一言而疑之上素友愛遂寢其事右補闕浚儀吴兢聞祖雍之謀上疏以為自文明以來國之祚㣧不絶如綫陛下龍興恩及九族求之瘴海升之闕庭况相王同氣至親六合無貳而賊臣日夜連謀乃欲䧟之極法禍亂之根將由此始夫任以權則雖踈必重奪其勢則雖親必輕自古委信異姓猜忌骨肉以覆國亡家者幾何人矣况國家枝葉無幾陛下登極未久而一子以弄兵受誅一子以愆違遠竄惟餘一弟朝夕左右尺布斗粟之譏不可不慎青蝇之詩良可畏也相王寛厚恭謹安恬好讓故經武韋之世竟免於難初右僕射中書令魏元忠以武三思擅權意常憤鬱及太子重俊起兵遇元忠子太僕少卿升於永安門脅以自隨太子死升為亂兵所殺元忠揚言曰元惡已死雖鼎鑊何傷但惜太子隕沒耳上以其有功且為髙宗武后所重故釋不問兵部尚書宗楚客太府卿紀處訥等共證元忠云與太子通謀請夷其三族制不許元忠懼表請解官爵以散秩還第丙戌上手敕聽解僕射以特進齊公致仕仍朝朔望九月丁夘以吏部侍郎蕭至忠為黄門侍郎兵部尚書宗楚客為左衛將軍兼太府卿紀處訥為太府卿並同中書門下三品中書待郎同中書門下三品于惟謙罷為國子祭酒庚子赦天下改元宗楚客等引右衛郎將姚廷筠為御史中丞使劾奏魏元忠以為侯君集社稷元勲及其謀反太宗就羣臣乞其命而不得竟流涕斬之其後房遺愛薛萬徹齊王祐等為逆雖復懿親皆從國法元忠功不逮君集身又非國戚與李多祚等謀反男入逆徒是宜赤族汚宫但有朋黨飾辭營救以惑聖聽陛下仁恩欲掩其過臣所以犯龍鱗忤聖意者正以事闗宗社耳上頗然之元忠坐繫大理貶渠州司馬宗楚客令給事中冉祖雍奏言元忠既犯大逆不應出佐渠州楊再思李嶠亦賛之上謂再思等曰元忠驅使日久朕特矜容制命已行豈宜數改輕重之權應自朕出卿等頻奏殊非朕意再思等惶懼拜謝監察御史袁守一復表彈元忠曰重俊乃陛下之子猶加昭憲元忠非勲非戚焉得獨漏嚴刑甲辰又貶元忠務川尉頃之楚客又令袁守一奏言則天昔在三陽宫不豫狄仁傑奏請陛下監國元忠宻奏以為不可此則元忠懷逆日乆請加嚴誅上謂楊再思等曰以朕思之人臣事主必在一心豈有主上小疾遽請太子知事此乃仁傑欲樹私恩未見元忠有失守一欲借前事以陷元忠其可乎楚客乃止元忠行至涪陵而卒銀青光禄大夫上庸公聖善中天西明三寺主慧範於東都作聖善寺長樂坡作大像府庫為之虛耗上及韋后皆重之勢傾内外無敢指目者戊申侍御史魏傳弓發其姦贓四十餘萬請寘極法上欲宥之傳弓曰刑賞國之大事陛下賞已妄加豈宜刑所不及上乃削黜慧範放于家宦官左監門大將軍薛簡等有寵於安樂公主縱暴不法傳弓奏請誅之御史大夫竇從一懼固止之時宦官用事從一為雍州刺史及御史大夫誤見訟者無須必曲加承接以楊再思為中書令韋巨源紀處訥並為侍中壬戌改左右羽林千騎為萬騎冬十月丁丑命左屯衛將軍張仁愿充朔方道大揔管以擊突厥比至虜已退追擊大破之習藝館内教蘇安恒矜髙好竒太子重俊之誅武三思也安恒自言此我之謀太子敗或告之戊寅伏誅十二月乙丑朔日有食之是嵗上遣使者分道詣江淮贖生中書舍人房子李乂上疏諌曰江南鄉人采捕為業魚鼈之利黎元所資雖雲雨之私有霑於末􅀋而生成之惠未洽於平人何則江湖之饒生育無限府庫之用支供易殫費之若少則所濟何成用之儻多則常支有闕在於拯物豈若憂人且鬻生之徒唯利斯視錢刀日至網􅅈年滋施之一朝營之百倍未若迴救贖之錢物減貧無之徭賦活國愛人其福勝彼資治通鑑卷第二百八
