body:
  text: 唐紀四十八強圉單閼巳月凡二一起旃䝉赤奮若八月盡德宗神武聖文皇帝七貞元元年八月甲子詔凡不急之費及人冗食者皆罷之馬燧至行營與諸將謀曰長春宫不下則懷光不可得長春宫守備甚嚴攻之曠日持久我當身往諭之遂徑造城下呼懷光守將徐庭光庭光帥將士羅拜城上燧知其心屈徐謂之曰我自朝廷來可西向受命庭光等復西向拜燧曰汝曹自祿山已來徇國立功四十餘年何忽爲滅族之計從吾言非止免禍富貴可圖也衆不對燧披襟曰汝不信吾言何不射我將士皆伏泣燧曰此皆懷光所爲汝曹無罪第堅守勿出皆曰諾壬申燧與渾瑊韓遊瓌進軍逼河中至焦籬堡守將尉珪以七百人降是夕懷光舉火諸營不應駱元光在長春宫下使人招徐庭光庭光素輕元光遣卒罵之又爲優胡於城上以侮之且曰我降漢將耳元光使白燧燧還至城下庭光開門降燧以數騎入城慰撫其衆大呼曰吾輩復爲王人矣渾瑊謂僚佐曰始吾謂馬公用兵不吾逺也今乃知吾不逮多矣詔以庭光試殿中監兼御史大夫甲戍燧帥諸軍至河西河中軍士自相驚曰西城擐甲矣又曰東城娖隊矣須􅁷軍士皆易其號爲太平字懷光不知所爲乃縊而死初懷光之解奉天圍也上以其子璀爲監察御史寵待甚厚及懷光屯咸陽不進璀宻言於上曰臣父必負陛下願早爲之備臣聞君父一也但今日之勢陛下未能誅臣父而臣父足以危陛下陛下待臣厚臣胡人性直故不忍不言耳上驚曰知卿大臣愛子當爲朕委曲彌縫而宻奏之對曰臣父非不愛臣臣非不愛其父與宗族也顧臣力竭不能回耳上曰然則卿以何策自免對曰臣之進言非茍求生也臣父敗則臣與之俱死矣復有何策哉使臣賣父求生陛下亦安用之上曰卿勿死爲朕更至咸陽諭卿父使君臣父子俱全不亦善乎璀至咸陽而還曰無益也願陛下備之勿信人言臣今往説諭萬方臣父言汝小子何知主上無信吾非貪富貴也直畏死耳汝豈可陷吾入死地邪及李泌赴陜上謂之曰朕所以再三欲全懷光者誠惜璀也卿至陜試爲朕招之對曰陛下未幸梁洋懷光猶可降也今則不然豈有人臣迫逐其君而可復立於其朝乎縱彼顔厚無慙陛下每視朝何心見之臣得入陜借使懷光請降臣不敢受况招之乎李璀固賢者必與父俱死矣若其不死則亦無足貴也及懷光死璀先刄其二弟乃自殺朔方將牛名俊斷懷光首出降河中兵猶萬六千人燧斬其將閻晏等七人餘皆不問燧自辭行至河中平凡二十七日燧出髙郢李鄘於獄皆奏置幕下韓遊瓌之攻懷光也楊懷賔戰甚力上命特原其子朝晟遊瓌遂以朝晟爲都虞􅀱上使問陸贄河中既平復有何事所宜區處令悉條奏贄以河中既平慮必有希㫖生事之人以爲王師所向無敵請乗勝討淮西者李希烈必誘諭其所部及新附諸帥曰奉天息兵之㫖乃因窘急而言朝廷稍安必復誅伐如此則四方負罪者孰不自疑河朔青齊固當響應兵連禍結賦役繁興建中之憂行將復起乃上奏其略曰福不可以屢徼幸不可以常覬又曰臣姑以生禍爲憂而未敢以獲福爲賀又曰陛下懷悔過之深誠降非常之大號所在宣􅆒之際聞者莫不涕流假王叛換之夫削僞號以請罪觀釁首䑕之將一純誠以效勤又曰曩討之而愈叛今釋之而畢來曩以百萬之師而力殫今以咫尺之詔而化洽是則聖王之敷理道服暴人任德而不任兵明矣羣帥之悖臣禮拒天誅圖活而不圖王又明矣是則好生以及物者乃自生之方施安以及物者乃自安之術擠彼於死地而求此之久生也措彼於危地而求此之久安也從古及今未之有焉又曰一夫不率闔境罹殃一境不寜普天致擾又曰億兆汙人四三叛帥感陛下自新之㫖悦陛下盛德之言革面易辭且修臣禮其於深言宻議固亦未盡坦然必當聚心而謀傾耳而聽觀陛下所行之事考陛下所誓之言若言與事符則遷善之心漸固儻事與言背則慮禍之態復興又曰朱泚滅而懷光戮懷光戮而希烈征希烈儻平禍將次及則彼之蓄素疑而懷宿負者能不爲之動心哉又曰今皇運中興天禍將悔以逆泚之偷居上國以懷光之竊保中畿歳未再周相次梟殄實衆慝驚心之日羣生改觀之時威則已行惠猶未洽誠宜上副天眷下収物情布恤人之惠以濟威乗滅賊之威以行惠又曰臣所未敢保其必從唯希烈一人而已揆其私心非不願從也想其濳慮非不追悔也但以猖狂失計已竊大名雖荷陛下全宥之恩然不能不自靦於天地之間耳縱未順命斯爲獨夫内則無辭以起兵外則無類以求助其計不過厚撫部曲偷容嵗時心雖陸梁勢必不致陛下但敕諸鎮各守封疆彼既氣奪筭窮是乃狴牢之類不有人禍則當鬼誅古所謂不戰而屈人之兵者斯之謂歟丁卯詔以李懷光嘗有功宥其一男使續其後賜之田宅歸其首及尸使收葬加馬燧兼侍中渾瑊檢校司空餘將卒賞賚各有差諸道與淮西連接者宜各守封疆非彼侵軼不須進討李希烈若降當待以不死自餘將士百姓一無所問初李晟嘗將神策軍戍成都及還以營妓髙􅇝自隨西川節度使張延賞怒追而返之由是有隙至是劉從一有疾上召延賞入相晟表陳其過惡上重違其意以延賞爲左僕射駱元光將殺徐庭光謀於韓遊瓌曰庭光辱吾祖考吾欲殺之馬公必怒公能救其死乎遊瓌曰諾壬午遇庭光於軍門之外揖而數其罪命左右碎斬之入見馬燧頓首請罪燧大怒曰庭光已降受朝廷官爵公不告輒殺之是無統帥也欲斬之遊瓌曰元光殺禆將公猶怒如此公殺節度使天子其謂何燧黙然渾瑊亦為之請乃捨之渾瑊鎮河中盡得李懷光之衆朔方軍自是分居邠蒲矣盧龍節度使劉怦疾病九月己亥詔以其子行軍司馬濟權知節度事怦尋薨己未中書侍郎同平章事劉從一罷爲户部尚書庚申薨冬十月癸卯上祀圓丘赦天下十二月甲戍戶部奏今嵗入貢者凡百五十州于闐王曜上言兄勝讓國於臣今請復立勝子鋭上以鋭檢校光祿卿還其國勝固辭曰曜久行國事國人悅服銳生長京華不習其俗不可往上嘉之以鋭爲韶王諮議二年春正月壬寅以吏部侍郎劉滋為左散騎常侍與給事中崔造中書舍人齊映並同平章事滋子􅀇之孫也造少居上元與韓㑹盧東美張正則爲友以王佐自許時人謂之四䕫上以造在朝廷敢言故不次用之滋映多讓事於造造久在江外疾錢榖諸使罔上之弊奏罷水陸運使度支廵院江淮轉運使等諸道租賦悉委觀察使刺史遣官部送詣京師令宰相分判尚書六曹齊映判兵部李勉判刑部劉滋判吏部禮部造判户部工部又以户部侍郎元琇判諸道鹽鐵􅅦酒吉中孚判度支兩税李希烈將杜文朝㓂襄州二月癸亥山南東道節度使樊澤擊擒之崔造與元琇善故使判鹽鐵韓滉奏論鹽鐵過失甲戍以琇爲尚書右丞陜州水陸運使李泌奏自集津至三門鑿山開車道十八里以避底柱之險是月道成三月李希烈别將冦鄭州義成節度使李澄擊破之希烈兵勢日蹙㑹有疾夏四月丙寅大將陳仙奇使醫陳山甫毒殺之因以兵悉誅其兄弟妻子舉衆來降甲申以仙奇爲淮西節度使闗中倉廩竭禁軍或自脫巾呼於道曰拘吾於軍而不給糧吾罪人也上憂之甚㑹韓滉運米三萬斛至陜李泌即奏之上喜遽至東宫謂太子曰米已至陜吾父子得生矣時禁中不釀命於坊市取酒為樂又遣中使諭神策六軍軍士皆呼萬嵗時比嵗饑饉兵民率皆瘦黒至是麥始熟市有醉人當時以爲嘉瑞人乍飽食死者復伍之一數月人膚色乃復故以横海軍使程日華爲節度使秋七月淮西兵馬使吳少誠殺陳仙奇自爲留後少誠素狡險爲李希烈所寵任故為之報仇己酉以䖍王諒爲申光隨蔡節度大使以少誠爲留後以隴右行營節度使曲環爲陳許節度使陳許荒亂之餘户口流散曲環以勤儉率下政令寛簡賦役平均數年間流亡復業兵食皆足八月癸未義成節度使李澄薨其子克寜謀揔軍務祕不發䘮丙戍吐蕃尚結賛大舉㓂涇隴邠寜掠人畜芟禾稼西鄙騷然州縣各城守詔渾瑊將萬人駱元光將八千人屯咸陽以備之初上與常侍李泌議復府兵泌因爲上歴叙府兵自西魏以來興廢之由且言府兵平日皆安居田畆每府有折衝領之折衝以農隙教習戰陳國家有事徵發則以符契下其州及府參驗發之至所期處將帥按閱有教習不精者罪其折衝甚者罪及刺史軍還則賜勲加賞便道罷之行者近不踰時逺不經嵗高宗以劉仁軌爲洮河鎮守使以圖吐蕃於是始有久戍之役武后以來承平日久府兵浸墮爲人所賤百姓恥之至蒸熨手足以避其役又牛仙客以積財得宰相邉將效之山東戍卒多齎繒帛自隨邉將誘之寄於府庫晝則苦役夜縶地牢利其死而没入其財故自天寳以後山東戍卒還者什無二三其殘虐如此然未嘗有外叛内侮殺帥自擅者誠以顧戀田園恐累宗族故也自開元之末張説始募長征兵謂之彍騎其後益爲六軍及李林甫爲相奏諸軍皆募人爲之兵不土著又無宗族不自重惜忘身徇利禍亂遂生至今爲梗曏使府兵之法常存不廢安有如此下陵上替之患哉陛下思復府兵此乃社稷之福太平有日矣上曰俟平河中當與卿議之九月丁亥詔十六衛各置上將軍以寵功臣改神策左右廂爲左右神策軍殿前射生左右廂爲殿前左右射生軍各置大將軍二人將軍二人庚寅李克寜始發父澄之喪殺行軍司馬馬􅉗墨縗出視事增兵城門劉􅀇佐出師屯境上以制之且使告諭切至克寜廼不敢襲位丁酉以東都留守賈耽爲義成節度使克寜悉取府庫之財夜出軍士從而剽之比明殆盡淄青兵數千自行營歸過滑州將佐皆曰李納雖外奉朝命内蓄兼并之志請館其兵於城外賈耽曰柰何與人鄰道而野處其將士乎命館於城中耽時引百騎獵於納境納聞之大喜服其度量不敢犯也吐蕃逰騎及好畤乙巳京城戒嚴復遣左金吾將軍張獻甫屯咸陽民間傳言上復欲出幸以避吐蕃齊映見上言曰外間皆言陛下已理裝具糗糧人情恟懼夫大福不再陛下柰何不與臣等熟計之因伏地流涕上亦爲之動容李晟遣其將王佖將驍勇三千伏於汧城戒之曰虜過城下勿擊其首首雖敗彼全軍而至汝弗能當也不若俟前軍已過見五方旗虎豹衣乃其中軍也出其不意擊之必大㨗佖用其言尚結賛敗走軍士不識尚結賛僅而獲免尚結賛謂其徒曰唐之良將李晟馬燧渾瑊而已以計去之入鳳翔境内無所俘掠以兵二萬直抵城下曰李令公召我來何不出犒我經宿乃引退冬十月癸亥李晟遣蕃落使野詩良輔與王佖將歩騎五千襲吐蕃摧沙堡壬申遇吐蕃衆二萬與戰破之乘勝逐北至堡下攻拔之斬其將扈屈律悉䝉焚其蓄積而還尚結賛引兵自寜慶北去癸酉軍于合水之北邠寜節度使韓逰瓌遣其將史履程夜襲其營殺數百人吐蕃追之逰瓌陳于平川濳使人鼓於西山虜驚弃所掠而去十一月甲午立淑妃王氏爲皇后乙未韓滉入朝丁酉皇后崩辛丑吐蕃冦鹽州謂刺史杜彦光曰我欲得城聽爾率人去彦光悉衆奔鄜州吐蕃入據之劉􅀇佐在汴習鄰道故事久未入朝韓滉過汴􅀇佐重其才望以屬吏禮謁之滉相約爲兄弟請拜􅀇佐母其母喜置酒見之酒半滉曰弟何時入朝􅀇佐曰久欲入朝但力未辦耳滉曰滉力可及弟宜早入朝丈母垂白不可使更帥諸婦女往填宫也母悲泣不自勝滉乃遺􅀇佐錢二十萬緡備行裝滉留大梁三日大出金帛賞勞一軍爲之傾動􅀇佐驚服既而遣人宻聽之滉問孔目吏今日所費幾何詰責甚細􅀇佐笑曰吾知之矣壬寅􅀇佐與陳許節度使曲環俱入朝崔造改錢榖法事多不集諸使之職行之已久中外安之元琇既失職造憂懼成疾不視事既而江淮運米大至上嘉韓滉之功十二月丁巳以滉兼度支諸道鹽鐵轉運等使造所條奏皆改之吐蕃又㓂夏州亦令刺史托跋乾暉帥衆去遂據其城又冦銀州州素無城吏民皆潰吐蕃亦弃之又陷麟州韓滉屢短元琇於上庚申崔造罷爲右庶子琇貶雷州司户以吏部侍郎班宏爲戶部侍郎度支副使韓遊瓌奏請發兵攻鹽州吐蕃救之則使河東襲其背丙寅詔駱元光及陳許兵馬使韓全義將歩騎萬二千人㑹邠寧軍趣鹽州又命馬燧以河東軍擊吐蕃燧至石州河曲六胡州皆降遷於雲朔之間工部侍郎張彧李晟之壻也晟在鳳翔以女嫁幕客崔樞禮重樞過於彧彧怒遂附於張延賞給事中鄭雲逵嘗爲晟行軍司馬失晟意亦附延賞上亦忌晟功名㑹吐蕃有離間之言延賞等騰謗於朝無所不至晟聞之晝夜泣目爲之腫悉遣子弟詣長安表請削髮為僧上慰諭不許辛未入朝見上自陳足疾懇辭方鎮上不許韓滉素與晟善上命滉與劉􅀇佐諭㫖於晟使與延賞釋怨晟奉詔滉等引延賞詣晟第謝結爲兄弟因宴飲盡歡又宴於滉􅀇佐之第亦如之滉因使晟表薦延賞爲相三年春正月壬寅以左射僕張延賞同平章事李晟爲其子請昬於延賞延賞不許晟謂人曰武夫性快釋怨於杯酒間則不復貯胷中矣非如文士難犯外雖和解内蓄憾如故吾得無懼哉初李希烈據淮西選騎兵尤精者爲左右門槍奉國四將歩兵尤精者爲左右克平十將淮西少馬精兵皆乗騾謂之騾軍陳仙奇舉淮西降纔數月詔發其兵於京西防秋仙奇遣都知兵馬使蘇浦悉將淮西精兵五千人以行㑹仙奇爲吳少誠所殺少誠宻遣人召門槍兵馬使吳法超等使引兵歸浦不之知法超等引歩騎四千自鄜州叛歸渾瑊使其將白娑勒追之反爲所敗丙午上急遣中使敇陜虢觀察使李泌發兵防遏勿令濟河泌遣押牙唐英岸將兵趣靈寳淮西兵已陳於河南矣泌乃命靈寳給其食淮西兵亦不敢剽掠明日宿陜西七里泌不給其食遣將將選士四百人分爲二隊伏於太原倉之隘道令之曰賊十隊過東伏則大呼擊之西伏亦大呼應之勿遮道勿留行常讓以半道隨而擊之又遣虞候集近村少年各持弓刀瓦石躡賊後聞呼亦應而追之又遣唐英岸將千五百人夜出南門陳于澗北明日四鼓淮西兵起行入隘兩伏􅀤賊衆驚亂且戰且走死者四之一進遇唐英岸邀而擊之賊衆大敗擒其騾軍兵馬使張崇獻泌以賊必分兵自山路南遁又遣都將燕子楚將兵四百自炭竇谷趣長水賊二日不食屢戰皆敗英岸追至永寜東賊皆潰入山谷吳法超果帥其衆太半趣長水燕子楚擊之斬法超殺其士卒三分之二上以陜兵少􅀤神策軍歩騎五千往助泌至赤水聞賊已破而還上命劉􅀇佐乗驛歸汴以詔書緣道誘之得百三十餘人至汴州盡殺之其潰兵在道復爲村民所殺得至蔡者纔四十七人吳少誠以其少悉斬之以聞且遣使以幣謝李泌爲其破叛卒也泌執張崇獻等六十餘人送京師詔悉腰斬於鄜州軍門以令防秋之衆初雲南王閤羅鳳陷嶲州獲西瀘令鄭回回相州人通經術閤羅鳳愛重之其子鳳迦異及孫異牟尋曾孫尋夢湊皆師事之每授學回得撻之及異牟尋爲王以回爲清平官清平官者蠻相也凡有六人而國事專决於回五人者事回甚卑謹有過則回撻之雲南有衆數十萬吐蕃每入冦常以雲南爲前鋒賦斂重數又奪其險要地立城堡歳徴兵助防雲南苦之回因説異牟尋復自歸於唐曰中國尚禮義有惠澤無賦役異牟尋以爲然而無路自致凡十餘年及西川節度使韋臯至鎮招撫境上羣蠻異牟尋潜遣人因諸蠻求内附臯奏今吐蕃弃好暴亂鹽夏宜因雲南及八國生羌有歸化之心招納之以離吐蕃之黨分其勢上命臯先作邉將書以諭之㣲觀其趣張延賞與齊映有隙映在諸相中頗稱敢言上浸不悦延賞因言映非宰相器壬子映貶䕫州刺史劉滋罷為左散騎常侍以兵部侍郎柳渾同平章事韓滉性苛暴方為上所任言無不從它相充位而已百官羣吏救過不贍渾雖為滉所引薦正色讓之曰先相公以褊察爲相不滿歳而罷今公又甚焉奈何榜吏於省中至有死者且作福作威豈人臣所宜滉愧爲之少霽威嚴二月壬戍以檢校左庶子崔澣充入吐蕃使戊寅鎮海節度使同平章事充江淮轉運使韓滉薨滉久在二浙所辟僚佐各隨其長無不得人嘗有故人子謁之考其能一無所長滉與之宴竟席未嘗左右視及與並坐交言後數日署爲隨軍使監庫門其人終日危坐吏卒無敢妄出入者分浙江東西道為三浙西治潤州浙東治越州宣歙池治宣州各置觀察使以領之上以果州刺史白志貞爲浙西觀察使柳渾曰志貞憸人不可復用㑹渾疾不視事辛巳詔下用之渾疾間遂乞骸骨不許甲申葬昭德皇后于靖陵三月丁酉以左庶子李銛充入吐蕃使初吐蕃尚結賛得鹽夏州各留兵千餘人戍之退屯鳴沙自冬入春羊馬多死糧運不繼又聞李晟克摧沙馬燧渾瑊等各舉兵臨之大懼屢遣使求和上未之許乃遣使卑辭厚禮求和于馬燧且請修清水之盟而歸侵地使者相繼於路燧信其言留屯石州不復濟河爲之請於朝李晟曰戎狄無信不如擊之韓遊瓌曰吐蕃弱則求盟彊則入㓂今深入塞内而求盟此必詐也韓滉曰今兩河無虞若城原鄯洮渭四州使李晟劉􅀇佐之徒將十萬衆戍之河湟二十餘州可復也其資糧之費臣請主辦上由是不聽燧計趣使進兵燧請與吐蕃使論頰熱俱入朝論之㑹滉薨燧延賞皆與晟有隙欲反其謀争言和親便上亦恨回紇欲與吐蕃和共擊之得二人言正㑹己意計遂定延賞數言晟不宜久典兵請以鄭雲逵代之上曰當令自擇代者乃謂晟曰朕以百姓之故與吐蕃和親决矣大臣既與吐蕃有怨不可復之鳳翔宜留朝廷朝夕輔朕自擇一人可代鳳翔者晟薦都虞􅀱邢君牙君牙樂壽人也丙午以君牙為鳳翔尹兼團練使丁未加晟太尉中書令勲封如故餘悉罷之晟在鳳翔嘗謂僚佐曰魏徴好直諫素竊慕之行軍司馬李叔度曰此乃儒者所爲非勲德所宜晟斂容曰司馬失言晟任兼將相知朝廷得失不言何以為臣叔度慙而退及在朝廷上有所顧問極言無隱性沉宻未嘗泄於人辛亥馬燧入朝燧既來諸軍皆閉壁不戰尚結賛遽自鳴沙引歸其衆乏馬多徒行者崔澣見尚結賛責以負約尚結賛曰吐蕃破朱泚未獲賞是以來而諸州各城守無由自逹鹽夏守將以城授我而遁非我取之也今明公來欲踐修舊好固吐蕃之願也今吐蕃將相以下來者二十一人渾侍中嘗與之共事知其忠信靈州節度使杜希全涇原節度使李觀皆信厚聞於異域請使之主盟夏四月丙寅澣至長安辛未以澣為鴻臚卿復使入吐蕃語尚結賛曰希全守靈不可出境李觀已改官今遣渾瑊盟於清水且令先歸鹽夏二州五月甲申渾瑊自咸陽入朝以為清水㑹盟使戊子以兵部尚書崔漢衡為副使司封員外郎鄭叔矩為判官特進宋奉朝為都監己丑瑊將二萬餘人赴盟所乙巳尚結賛遣其屬論泣賛來言清水非吉地請盟於原州之土梨樹既盟而歸鹽夏二州上皆許之神策將馬有麟奏土梨樹多阻險恐吐蕃設伏兵不如平凉川坦夷時論泣賛已還丁未遣使追告之申蔡留後吳少誠繕兵完城欲拒朝命判官鄭常大將楊冀謀逐之詐為手詔賜諸將申州刺史張伯元等事泄少誠殺常冀伯元大將宋旻曹濟奔長安閏月己未韋臯復與東蠻和義王苴那時書使詗伺導達雲南庚申大省州縣官員収其祿以給戰士張延賞之謀也時新除官千五百人而當減者千餘人怨嗟盈路初韓滉薦劉玄佐可使將兵復河湟上以問玄佐玄佐亦賛成之滉薨玄佐奏言吐蕃方彊未可與爭上遣中使勞問玄佐玄佐臥而受命張延賞知玄佐不可用奏以河湟事委李抱真抱真亦固辭皆由延賞罷李晟兵柄故武臣皆憤怒解體不肯為用故也上以襄鄧扼淮西衝要癸亥以荆南節度使曹王臯為山南東道節度使以襄鄧復郢安隨唐七州􅀠之渾瑊之發長安也李晟深戒之以盟所為備不可不嚴張延賞言於上曰晟不欲盟好之成故戒瑊以嚴備我有疑彼之形則彼亦疑我矣盟何由成上乃召瑊切戒以推誠待虜勿自為猜貳以阻虜情瑊奏吐蕃决以辛未盟延賞集百官以瑊表稱詔示之曰李太尉謂吐蕃和好必不成此渾侍中表也盟日定矣晟聞之泣謂所親曰吾生長西陲備諳虜情所以論奏但恥朝廷為犬戎所侮耳上始命駱元光屯潘原韓遊瓌屯洛口以為瑊援元光謂瑊曰潘原距盟所且七十里公有急元光何從知之請與公俱瑊以詔指固止之元光不從與瑊連營相次距盟所三十餘里元光壕柵深固瑊壕柵皆可踰也元光伏兵於營西韓遊瓌亦遣五百騎伏於其側曰若有變則汝曹西趣柏泉以分其勢尚結賛與瑊約各以甲士三千人列於壇之東西常服者四百人從至壇下辛未將盟尚結賛又請各遣遊騎數十更相覘索瑊皆許之吐蕃伏精騎數萬於壇西遊騎貫穿唐軍出入無禁唐騎入虜軍悉為所擒瑊等皆不知入幕易禮服虜伐鼓三聲大譟而至殺宋奉朝等於幕中瑊自幕後出偶得它馬乗之伏鬛入其銜馳十餘里銜方及馬口故矢過其背而不傷唐將卒皆東走虜縱兵追擊或殺或擒之死者數百人擒者千餘人崔漢衡為虜騎所擒渾瑊至其營則將卒皆遁去營空矣駱元光發伏成陳以待之虜追騎愕眙瑊入元光營追騎顧見邠寜軍西馳乃還元光以輜重資瑊與瑊収散卒勒兵整陳而還是日上視朝謂諸相曰今日和戎息兵社稷之福馬燧曰然柳渾曰戎狄豺狼也非盟誓可結今日之事臣竊憂之李晟曰誠如渾言上變色曰柳渾書生不知邉計大臣亦為此言邪皆伏地頓首謝因罷朝是夕韓逰瓌表言虜刼盟者兵臨近鎮上大驚街遞其表以示渾明旦謂渾曰卿書生乃能料敵如此其審邪上欲出幸以避吐蕃大臣諫而止李晟大安園多竹復有為飛語者云晟伏兵大安亭謀因倉猝為變晟遂伐其竹癸酉上遣中使王子恒齎詔遺尚結賛至吐蕃境不納而還渾瑊留屯奉天甲戍尚結賛至故原州引見崔漢衡等曰吾飾金械欲械瑊以獻賛普今失瑊虛致公輩又謂馬燧之姪弇曰胡以馬為命吾在河曲春草未生馬不能舉足當是時侍中度河掩之吾全軍覆沒矣所以求和䝉侍中力今全軍得歸柰何拘其子孫命弇與宦官俱文珍渾瑊將馬寜俱歸分囚崔漢衡等於河廓鄯州上聞尚結賛之言由是惡馬燧六月丙戍以馬燧為司徒兼侍中罷其副元帥節度使初吐蕃尚結賛惡李晟馬燧渾瑊曰去三人則唐可圖也於是離間李晟因馬燧以求和欲執渾瑊以賣燧使并獲罪因縱兵直犯長安㑹失渾瑊而止張延賞慚懼謝病不視事以陜虢觀察使李泌為中書侍郎同平章事河東都虞􅀱李自良從馬燧入朝上欲以為河東節度使自良固辭曰臣事燧久不欲代之為帥乃以為右龍武大將軍明日自良入謝上謂之曰卿於馬燧存軍中事分誠爲得禮然北門之任非卿不可卒以自良為河東節度使吐蕃之戍鹽夏者饋運不繼人多病疫思歸尚結賛遣三千騎逆之悉焚其廬舍毁其城驅其民而去靈鹽節度使杜希全遣兵分守之韋臯以雲南頗知書壬辰自以書招諭之令趣遣使入見李泌初視事壬寅與李晟馬燧柳渾俱入見上謂泌曰卿昔在靈武已應爲此官卿自退讓朕今用卿欲與卿有約卿慎勿報仇有恩者朕當為卿報之對曰臣素奉道不與人爲仇李輔國元載皆害臣者今自斃矣素所善及有恩者率已顯達或多零落臣無可報也上曰雖然有小恩者亦當報之對曰臣今日亦願與陛下爲約可乎上曰何不可泌曰願陛下勿害功臣臣受陛下厚恩固無形迹李晟馬燧有大功於國聞有讒之者雖陛下必不聽然臣今日對二人言之欲其不自疑耳陛下萬一害之則宿衛之士方鎭之臣無不憤惋而反仄恐中外之變不日復生也人臣茍䝉人主愛信則幸矣官於何有臣在靈武之日未嘗有官而將相皆受臣指畫陛下以李懷光為太尉而懷光愈懼遂至於叛此皆陛下所親見也今晟燧富貴已足茍陛下坦然待之使其自保無虞國家有事則出從征伐無事則入奉朝請何樂如之故臣願陛下勿以二臣功大而忌之二臣勿以位髙而自疑則天下永無事矣上曰朕始聞卿言聳然不知所謂及聽卿剖析乃知社稷之至計也朕謹當書紳二大臣亦當共保之晟燧皆起泣謝上因謂泌曰自今凡軍旅糧儲事卿主之吏禮委延賞刑法委渾泌曰不可陛下不以臣不才使待罪宰相宰相之職不可分也非如給事則有吏過兵過舍人則有六押至於宰相天下之事咸共平章若各有所主是乃有司非宰相也上笑曰朕適失辭卿言是也泌請復所減州縣官上曰置吏以爲人也今户口減於承平之時三分之二而吏員更增可乎對曰戸口雖減而事多於承平且十倍吏得無增乎且所減皆有職事而冗官不減此所以爲未當也至德以來置額外官敵正官三分之一若聽使計日得資然後停加兩選授同類正貟官如此則不惟不怨兼使之喜矣又請諸王未出閤者不除府官上皆從之乙卯詔先所減官並宜復故初張延賞在西川與東川節度使李叔明有隙上入駱谷值霖雨道塗險滑衛士多亡歸朱泚叔明之子昇及郭子儀之子曙令狐彰之子建等六人恐有姧人危乗輿相與齧臂爲盟著行幐釘鞵更鞚上馬以至梁州它人皆不得近及還長安上皆以爲禁衛將軍寵遇甚厚張延賞知昇私出入郜國大長公主第密以白上上謂李泌曰郜國已老昇年少何爲如是殆必有故卿宜察之泌曰此必有欲動摇東宫者誰爲陛下言之上曰卿勿問第爲朕察之泌曰必延賞也上曰何以知之泌具爲上言二人之隙且曰昇承恩顧典禁兵延賞無以中傷而郜國乃太子蕭妃之母也故欲以此陷之耳上笑曰是也泌因請除昇它官勿令宿衛以逺嫌秋七月以昇爲詹事郜國肅宗之女也甲子割振武之綏銀二州以右羽林將軍韓潭爲夏綏銀節度使帥神策之士五千朔方河東之士三千鎭夏州時闗東防秋兵大集國用不充李泌奏自變兩税法以來藩鎭州縣多違法聚斂繼以朱泚之亂爭􅅦率徵罰以爲軍資㸃募自防泚既平自懼違法匿不敢言請遣使以詔㫖赦其罪但令革正自非於法應留使留州之外悉輸京師其官典逋負可徵者徵之難徵者釋之以示寛大敢有隠沒者重設告賞之科而罪之上喜曰卿策甚長然立法太寛恐所得無幾對曰兹事臣固熟思之寛則獲多而速急則獲少而遲蓋以寛則人喜於免罪而樂輸急則競爲蔽匿非推鞫不能得其實財不足濟今日之急而皆入於姦吏矣上曰善以度支貟外郎元友直爲河南江淮南句勘兩税錢帛使初河隴既沒於吐蕃自天寳以來安西北庭奏事及西域使人在長安者歸路既絶人馬皆仰給於鴻臚禮賔委府縣供之於度支受直度支不時付直長安市肆不勝其弊李泌知胡客留長安久者或四十餘年皆有妻子買田宅舉質取利安居不欲歸命檢括胡客有田宅者停其給凡得四千人將停其給胡客皆詣政府訴之泌曰此皆從來宰相之過豈有外國朝貢使者留京師數十年不聽歸乎今當假道於回紇或自海道各遣歸國有不願歸者當於鴻臚自陳授以職位給俸祿爲唐臣人生當乗時展用豈可終身客死邪於是胡客無一人願歸者泌皆分􅀠神策兩軍王子使者爲散兵馬使或押牙餘皆爲卒禁旅益壯鴻臚所給胡客纔十餘人嵗省度支錢五十萬緡市人皆喜上復問泌以復府兵之策對曰今嵗徵闗東卒戍京西者十七萬人計嵗食粟二百四萬斛今粟斗直錢百五十爲錢三百六萬緡國家比遭饑亂經費不充就使有錢亦無粟可糴未暇議復府兵也上曰然將奈何亟減戍卒歸之何如對曰陛下誠能用臣之言可以不減戍卒不擾百姓糧食皆足粟麥日賤府兵亦成上曰果能如是何爲不用對曰此須急爲之過旬日則不及矣今吐蕃久居原蘭之間以牛運糧糧盡牛無所用請發左藏惡繒染爲綵纈因党項以市之每頭不過二三匹計十八萬匹可致六萬餘頭又命諸冶鑄農器糴麥種分賜縁邉軍鎮募戍卒耕荒田而種之約明年麥熟倍償其種其餘據時價五分增一官爲糴之來春種禾亦如之闗中土沃而久荒所収必厚戍卒獲利耕者浸多邊地居人至少軍士月食官糧粟麥無所售其價必賤名爲增價實比今嵗所減多矣上曰善即命行之泌又言邉地官多闕請募人入粟以補之可足今嵗之糧上亦從之因問曰卿言府兵亦集如何對曰戍卒因屯田致富則安於其土不復思歸舊制戍卒三年而代及其將滿下令有願留者即以所開田為永業家人願來者本貫給長牒續食而遣之據應募之數移報本道雖河朔諸帥得免更代之煩亦喜聞矣不過數番則戍卒皆土著乃悉以府兵之法理之是變關中之疲弊爲富彊也上喜曰如此天下無復事矣泌曰未也臣能不用中國之兵使吐蕃自困上曰計將安出對曰臣未敢言之俟麥禾有效然後可議也上固問不對泌意欲結回紇大食雲南與共圖吐蕃令吐蕃所備者多知上素恨回紇恐聞之不悦并屯田之議不行故不肯言既而戍卒應募願耕屯田者什五六壬申賜駱元光姓名李元諒左僕射同平章事張延賞薨資治通鑑卷第二百三十二
