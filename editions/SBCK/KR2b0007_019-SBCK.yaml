front:
  text: 秦兼天下銷甲兵折鋒刃其後民以耰鉏箠挺相撻擊犯灋滋衆盗賊不勝卒以亂亡故聖王務教化而省禁防知其不足恃也禮曰男子生桑弧蓬矢以舉之明示有事也大射之禮自天子降及庶人三代之道也愚聞聖王合射以明教矣未聞弓矢之爲禁也且所爲禁者爲盗賊之以攻奪也攻奪之罪死然而不止者大姦之於重誅固不避也臣恐邪人挾之而吏不能止良民以自僃而抵灋禁是擅賊威而奪民救也竊以爲大不便書奏上以難弘弘詘服焉弘性意忌外寛内深諸嘗與弘有隙無近逺雖陽與善後竟報其過董仲舒爲人廉直以弘爲從諛弘嫉之膠西王端驕恣數犯灋所殺傷二千石甚衆􅀪乃薦仲舒為膠西相仲舒以病免汲黯常毁儒靣觸􅀪􅀪欲誅之以事乃言上曰右内史界部中多貴人宗室難治非素重臣不能任請徙黯為右内史上從之
