body:
  text: 春大旱匈奴右賢王數侵擾朔方天子令車騎将軍青将三萬騎出髙闕衛尉蘇建為游擊将軍左内史李沮為彊弩将軍太僕公孫賀為騎将軍代相李蔡為輕車将軍皆領屬車騎将軍俱出朔方大行李息岸頭侯張次公為将軍俱出右北平凡十餘萬人擊匈奴右賢王以為漢兵逺不能至飲酒醉衛青等兵出塞六七百里夜至圍右賢王右賢王驚夜逃獨與壮騎數百馳潰圍北去得右賢禆王十餘人衆男女萬五千餘人畜數十百萬於是引兵而還至塞天子使使者持大将軍印即軍中拜衛青為大将軍諸将皆屬焉夏四月乙未復益封青八千七百户封青三子伉不疑登皆為列侯青固謝曰臣幸得待罪行間賴陛下神靈軍大㨗皆諸校尉力戰之功也陛下幸已益封臣青臣青子在繦褓中未有勤勞上列地封為三侯非臣待罪行間所以勸士力戰之意也天子曰我非忘諸校尉功也乃封䕶軍都尉公孫敖為合騎侯都尉韓説為龍頟侯公孫賀為南窌侯李蔡為樂安侯校尉李朔為渉軹侯趙不虞為隨成侯公孫戎奴為從平侯李沮李息及校尉豆如意皆賜爵闗内侯於是青尊寵於群臣無二公卿以下皆卑奉之獨汲黯與亢禮人或説黯曰自天子欲羣臣下大将軍大将軍尊重君不可以不拜黯曰夫以大将軍有揖客反不重邪大将軍聞愈賢黯數請問國家朝廷所疑遇黯加於平日大将軍青雖貴有時侍中上踞厠而視之丞相􅀪燕見上或時不冠至如汲黯見上不冠不見也上嘗坐武帳中黯前奏事上不冠望見黯避帳中使人可其奏其見敬禮如此夏六月詔曰蓋聞導民以禮風之以樂今禮壊樂崩朕甚閔焉其令禮官勸學興禮以為天下先於是丞相􅀪等奏請為博士官置弟子五十人復其身第其髙下以補郎中文學掌故即有秀才異等輒以名聞其不事學若下材輒罷之又吏通一蓺以上者請皆選擇以補右職上從之自此公卿大夫士吏彬彬多文學之士矣秋匈奴萬騎入代殺都尉朱英略千餘人初淮南王安好讀書屬文喜立名譽招致賓客方術之士數千人其羣臣賓客多江淮間輕薄士常以厲王遷死感激安建元六年彗星見或説王曰先吳軍時彗星出長數尺然尚流血千里今彗星竟天天下兵當大起王心以為然乃益治攻戰具積金錢郎中雷被獲罪於太子遷時有詔欲從軍者輒詣長安被即願奮擊匈奴太子惡被於王斥免之欲以禁後是嵗被亡之長安上書自眀事下廷尉治蹤跡連王公卿請逮捕治王太子遷謀令人衣衛士衣持㦸居王旁漢使有非是者即刺殺之因發兵反天子使中尉宏即訊王王視中尉顔色和遂不發公卿奏安壅閼奮擊匈奴者格眀詔當棄市詔削二縣既而安自傷曰吾行仁義反見削地恥之於是為反謀益甚安與衡山王賜相責望禮節間不相能衡山王聞淮南王有反謀恐為所并亦結賓客為反具以為淮南已西欲發兵定江淮之間而有之衡山王后徐來譛太子爽於王欲廢之而立其弟孝王囚太子而佩孝以王印令招致賓客賓客來者㣲知淮南衡山有逆計日夜從容勸之王乃使孝客江都人枚赫陳喜作輣車鍜矢刻天子璽将相軍吏印秋衡山王當入朝過淮南淮南王乃昆弟語除前隙約束反具衡山王即上書謝病上賜書不朝六年春二月大将軍青出定襄擊匈奴以合騎侯公孫敖為中将軍太僕公孫賀為左将軍翕侯趙信為前将軍衛尉蘇建為右将軍郎中令李廣為後将軍左内史李沮為彊弩将軍咸屬大将軍斬首數千級而還休士馬于定襄雲中鴈門赦天下夏四月衛青復将六将軍出定襄擊匈奴斬首虜萬餘人右将軍建前将軍信并軍三千餘騎獨逢單于兵與戰一日餘漢兵且盡信故胡小王降漢漢封為翕侯及敗匈奴誘之遂将其餘騎可八百降匈奴建盡亡其軍脱身亡自歸大将軍議郎周霸曰自大将軍出未嘗斬裨将今建棄軍可斬以眀将軍之威軍正閎長史安曰不然兵灋小敵之堅大敵之禽也今建以數千當單于數萬力戰一日餘士盡不敢有二心自歸而斬之是示後無反意也不當斬大将軍曰青幸得以肺腑待罪行間不患無威而霸説我以眀威甚失臣意且使臣職雖當斬将以臣之尊寵而不敢自擅誅於境外而具歸天子天子自裁之於以見為人臣不敢専權不乃可乎軍吏皆曰善遂囚建詣行在所初平陽縣吏霍仲孺給事平陽侯家與青姊衛少兒私通生霍去病去病年十八為侍中善騎射再從大将軍擊匈奴為票姚校尉與輕勇騎八百直棄大軍數百里赴利斬捕首虜過當於是天子曰票姚校尉去病斬首虜二千餘級得相國當户斬單于大父行藉若侯産生捕季父羅姑比再冠軍封去病為冠軍侯上谷太守郝賢四從大将軍捕斬首虜二千餘級封賢為衆利侯是嵗失兩将軍亡翕侯軍功不多故大将軍不益封止賜千金右将軍建至天子不誅贖為庶人單于既得翕侯以為自次王用其姊妻之與謀漢信教單于益北絶幕以誘罷漢兵徼極而取之無近塞單于從其計是時漢比嵗發十餘萬衆擊胡斬捕首虜之士受賜黄金二十餘萬斤而漢軍士馬死者十餘萬兵甲轉漕之費不與焉於是大司農經用竭不足以奉戰士六月詔令民得買爵及贖禁錮免臧罪置賞官名曰武功爵級十七萬凡直三十餘萬金諸買武功爵至千夫者得先除為吏吏道雜而多端官職耗廢矣元狩元年冬十月上行幸雍祠五畤獲獸一角而足有五蹄有司言陛下肅祗郊祀上帝報享錫一角獸蓋麟云於是以慶五畤畤加一牛以燎久之有司又言元宜以天瑞命不宜以一二數一元曰建二元以長星曰光今元以郊得一角獸曰狩云於是濟北王以為天子且封禪上書獻太山及其旁邑天子以他縣償之淮南王安與賓客左吳等日夜為反謀案輿地圖部署兵所從入諸使者道長安來為妄言言上無男漢不治即喜即言漢廷治有男王怒以為妄言非也王召中郎伍被與謀反事被曰王安得此亡國之語乎㠯見宫中生荆棘露霑衣也王怒繫伍被父母囚之三月復召問之被曰昔秦為無道窮奢極虐百姓思亂者十家而六七髙皇帝起於行陳之中立為天子此所謂蹈瑕􅀱間因秦之亡而動者也今大王見髙皇帝得天下之易也獨不觀近世之吳楚乎夫吳王王四郡國冨民衆計定謀成舉兵而西然破於大梁犇走而東身死祀絶者何誠逆天道而不知時也方今大王之兵衆不能十分吳楚之一天下安寜萬倍吳楚之時大王不從臣之計今見大王棄千乘之君賜絶命之書為羣臣先死於東宫也王涕泣而起王有孽子不害最長王弗愛王后太子皆不以爲子兄數不害有子建材髙有氣常怨望太子隂使人告太子謀殺漢中尉事下廷尉治王患之欲發復問伍被曰公以爲吳興兵是邪非邪被曰非也臣聞吳王悔之甚願王無爲吳王之所悔王曰吳何知反漢將一日過成皐者四十餘人今我絶成皐之口據三川之險招山東之兵舉事如此左吳趙賢朱驕如皆以爲什事九成公獨以爲有禍無福何也必如公言不可徼幸邪被曰必不得已被有愚計當今諸矦無異心百姓無怨氣可僞爲丞相御史請書徙郡國豪桀髙貲於朔方益發甲卒急其㑹日又僞爲詔獄書逮諸矦太子幸臣如此則民怨諸矦懼即使辯士隨而説之儻可徼幸什得一乎王曰此可也雖然吾以為不至若此於是王乃作皇帝璽丞相御史大夫将軍軍吏中二千石及旁近郡太守都尉印漢使節欲使人偽得罪而西事大将軍一日發兵即刺殺大将軍且曰漢廷大臣獨汲黯好直諫守節死義難惑以非至如説丞相􅀪等如發䝉振落耳王欲發國中兵恐其相二千石不聽王乃與伍被謀先殺相二千石又欲令人衣求盗衣持羽檄從東方來呼曰南越兵入界欲因以發兵會廷尉逮捕淮南太子淮南王聞之與太子謀召相二千石欲殺而發兵召相相至内史中尉皆不至王念獨殺相無益也即罷相王猶豫計未决太子即自剄不殊伍被自詣吏告與淮南王謀反蹤跡如此吏因捕太子王后圍王宫盡求捕王所與謀反賓客在國中者索得反具以聞上下公卿治其黨與使宗正以符節治王未至十一月淮南王安自剄殺王后荼太子遷諸所與謀反者皆族天子以伍被雅辭多引漢之美欲勿誅廷尉湯曰被首為王畫反計罪不可赦乃誅被侍中荘助素與淮南王相結交私論議王厚賂遺助上薄其罪欲勿誅張湯争以為助出入禁門腹心之臣而外與諸侯交私如此不誅後不可治助竟棄市衡山王上書請廢太子爽立其弟孝為太子爽聞即遣所善白嬴之長安上書言孝作輣車鍜矢與王御者姦欲以敗孝會有司捕所與淮南謀反者得陳喜於衡山王子孝家吏劾孝首匿喜孝聞律先自告除其罪即先自告所與謀反者枚赫陳喜等公卿請逮捕衡山王治之王自剄死王后徐來太子爽及孝皆棄市所與謀反者皆族凡淮南衡山二獄所連引列侯二千石豪桀等死者數萬人夏四月赦天下丁卯立皇子據為太子年七嵗五月乙巳晦日有食之匈奴萬人入上谷殺數百人初張騫自月氏還具為天子言西域諸國風俗大宛在漢正西可萬里其俗土著耕田多善馬馬汗血有城郭室屋如中國其東北則烏孫東則于寘于寘之西則水皆西流注西海其東水東流注鹽澤鹽澤潜行地下其南則河源出焉鹽澤去長安可五千里匈奴右方居鹽澤以東至隴西長城南接羌鬲漢道焉烏孫康居奄蔡大月氏皆行國隨畜牧與匈奴同俗大夏在大宛西南與大宛同俗臣在大夏時見卭竹杖蜀布問曰安得此大夏國人曰吾賈人往市之身毒身毒在大夏東南可數千里其俗土著與大夏同以騫度之大夏去漢萬二千里居漢西南今身毒國又居大夏東南數千里有蜀物此其去蜀不逺矣今使大夏從􅆧中險􅆧人惡之少北則為匈奴所得從蜀宜徑又無寇天子既聞大宛及大夏安息之屬皆大國多竒物土著頗與中國同業而兵弱貴漢財物其北有大月氏康居之屬兵彊可以賂遺設利朝也誠得而以義屬之則廣地萬里重九譯致殊俗威德徧於四海欣然以騫言為然乃令騫因蜀犍為發間使王然于等四道並出出駹出冉出徙出卭僰指求身毒國各行一二千里其北方閉氐筰南方閉嶲昆眀昆眀之屬無君長善寇盗輒殺略漢使終莫得通於是漢以求身毒道始通滇國滇王當羌謂漢使者曰漢孰與我大及夜郎侯亦然以道不通故各自以為一州主不知漢廣大使者還因盛言滇大國足事親附天子注意焉乃復事西南夷二年冬十月上幸雍祠五畤三月戊寅平津獻侯公孫􅀪薨壬辰以御史大夫樂安侯李蔡為丞相廷尉張湯為御史大夫霍去病為票騎将軍将萬騎出隴西擊匈奴歴五王國轉戰六日過焉支山千餘里殺折蘭王斬盧侯王執渾邪王子及相國都尉獲首虜八千九百餘級收休屠王祭天金人詔益封去病二千户夏去病復與合騎侯公孫敖将數萬騎俱出北地異道衛尉張騫郎中令李廣俱出右北平異道廣将四千騎先行可數百里騫将萬騎在後匈奴左賢王将四萬騎圍廣廣軍士皆恐廣乃使其子敢獨與數十騎馳貫胡騎出其左右而還告廣曰胡虜易與耳軍士乃安廣為圜陳外嚮胡急擊之矢下如雨漢兵死者過半漢矢且盡廣乃令士持滿毋發而廣身自以大黄射其裨将殺數人胡虜益解會日暮吏士皆無人色而廣意氣自如益治軍軍中皆服其勇眀日復力戰死者過半所殺亦過當會博望侯軍亦至匈奴軍乃解去漢軍罷弗能追罷歸漢灋博望侯留遲後期當死贖為庶人廣軍功自如無賞而票騎将軍去病深入二千餘里與合騎侯失不相得票騎将軍踰居延過小月氏至祁連山得單桓酋涂王及相國都尉以衆降者二千五百人斬首虜三萬二百級獲裨小王七十餘人天子益封去病五千户封其裨将有功者鷹擊司馬趙破奴為從票侯校尉髙不識為冝冠侯校尉僕多為煇渠侯合騎侯敖坐行留不與票騎會當斬贖為庶人是時諸宿将所将士馬兵皆不如票騎票騎所将常選然亦敢深入常與壮騎先其大軍軍亦有天幸未嘗困絶也而諸宿將常留落不偶由此票騎日以親貴比大將軍矣匈奴入代鴈門殺略數百人江都王建與其父易王所幸淖􅁎等及女弟徴臣姦建游雷陂天大風建使郎二人乘小船入陂中船覆兩郎溺攀船乍見乍没建臨觀大笑令勿救皆死凡殺不辜三十五人専爲淫虐自知罪多恐誅與其后成光共使越婢下神祝詛上又聞淮南衡山隂謀建亦作兵器刻皇帝璽爲反具事發覺有司請捕誅建自殺后成光等皆棄市國除膠東康王寄薨秋匈奴渾邪王降是時單于怒渾邪王休屠王居西方為漢所殺虜數萬人欲召誅之渾邪王與休屠王恐謀降漢先遣使向邊境要遮漢人令報天子是時大行李息将城河上得渾邪王使即馳傳以聞天子聞之恐其以詐降而襲邊乃令票騎将軍将兵往迎之休屠王後悔渾邪王殺之并其衆票騎既渡河與渾邪王衆相望渾邪王禆将見漢軍而多不欲降者頗遁去票騎乃馳入得與渾邪王相見斬其欲亡者八千人遂獨遣渾邪王乘傳先詣行在所盡将其衆渡河降者四萬餘人號稱十萬既至長安天子所以賞賜者數十巨萬封渾邪王萬户為漯隂侯封其禆王呼毒尼等四人皆為列侯益封票騎千七百户渾邪之降也漢發車二萬乘以迎之縣官無錢從民貰馬民或匿馬馬不具上怒欲斬長安令右内史汲黯曰長安令無罪獨斬臣黯民乃肯出馬且匈奴畔其主而降漢漢徐以縣次傳之何至令天下騷動罷敝中國而以事夷狄之人乎上黙然及渾邪至賈人與市者坐當死五百餘人黯請間見髙門曰夫匈奴攻當路塞絶和親中國興兵誅之死傷者不可勝計而費以巨萬百數臣愚以為陛下得胡人皆以為奴婢以賜從軍死事者家所鹵獲因予之以謝天下之苦塞百姓之心今縱不能渾邪率數萬之衆來降虚府庫賞賜發良民侍養譬若奉驕子愚民安知市買長安中物而文吏繩以為闌出財物于邊闗乎陛下縱不能得匈奴之資以謝天下又以㣲文殺無知者五百餘人是所謂庇其葉而傷其枝者也臣竊為陛下不取也上黙然不許曰吾久不聞汲黯之言今又復妄發矣居頃之乃分徙降者邊五郡故塞外而皆在河南因其故俗為五屬國而金城河西西並南山至鹽澤空無匈奴匈奴時有􅀱者到而希矣休屠王太子日磾與母閼氏弟倫俱没入官輸黄門養馬久之帝游宴見馬後宫滿側日磾等數十人牽馬過殿下莫不竊視至日磾獨不敢日磾長八尺二寸容貌甚嚴馬又肥好上異而問之具以本状對上竒焉即日賜湯沐衣冠拜為馬監遷侍中駙馬都尉光禄大夫日磾既親近未嘗有過失上甚信愛之賞賜累千金出則驂乘入侍左右貴戚多竊怨曰陛下妄得一胡兒反貴重之上聞愈厚焉以休屠作金人為祭天主故賜日磾姓金氏三年春有星孛于東方夏五月赦天下淮南王之謀反也膠東康王寄㣲聞其事私作戰守僃及吏治淮南事辭出之寄母王夫人即皇太后之女弟也於上最親意自傷發病而死不敢置後上聞而憐之立其長子賢為膠東王又封其所愛少子慶為六安王王故衡山地秋匈奴入右北平定襄各數萬騎殺略千餘人山東大水民多飢乏天子遣使者虛郡國倉廥以振貧民猶不足又募豪冨吏民能假貸貧民者以名聞尚不能相救乃徙貧民於闗以西及充朔方以南新秦中七十餘萬口衣食皆仰給縣官數嵗假予産業使者分部䕶之冠蓋相望其費以億計不可勝數漢既得渾邪王地隴西北地上郡益少胡冦詔减三郡戍卒之半以寛天下之繇上将討昆眀以昆眀有滇池方三百里乃作昆眀池以習水戰是時灋既益嚴吏多廢免兵革數動民多買復及五大夫徴發之士益鮮於是除千夫五大夫為吏不欲者出馬以故吏弄灋皆謫令伐棘上林穿昆眀池是嵗得神馬於渥洼水中上方立樂府使司馬相如等造為詩賦以官者李延年為協律都尉佩二千石印絃次初詩以合八音之調詩多爾雅之文通一經之士不能獨知其辭必集會五經家相與共講習讀之乃能通知其意及得神馬次以為歌汲黯曰凡王者作樂上以承祖宗下以化兆民今陛下得馬詩以為歌協於宗廟先帝百姓豈能知其音邪上黙然不説上招延士大夫常如不足然性嚴峻羣臣雖素所愛信者或小有犯灋或欺罔輒桉誅之無所寛假汲黯諌曰陛下求賢甚勞未盡其用輒已殺之以有限之士恣無已之誅臣恐天下賢才将盡陛下誰與共為治乎黯言之甚怒上笑而諭之曰何世無才患人不能識之耳茍能識之何患無人夫所謂才者猶有用之器也有才而不肻盡用與無才同不殺何施黯曰臣雖不能以言屈陛下而心猶以為非願陛下自今改之無以臣為愚而不知理也上顧羣臣曰黯自言為便辟則不可自言為愚豈不信然乎四年冬有司言縣官用度大空而冨商大賈冶鑄煮鹽財或絫萬金不佐國家之急請更錢造幣以贍用而摧浮淫并兼之徒是時禁苑有白鹿而少府多銀錫乃以白鹿皮方尺縁以藻繢為皮幣直四十萬王侯宗室朝覲聘享必以皮幣薦璧然后得行又造銀錫為白金三品大者圜之其文龍直三千次方之其文馬直五百小者橢之其文􅀛直三百令縣官銷半兩錢更鑄三銖錢盗鑄諸金錢罪皆死而吏民之盗鑄白金者不可勝數於是以東郭咸陽孔僅為大農丞領鹽鐡事桑􅀪羊以計筭用事咸陽齊之大煑鹽僅南陽大冶皆致生絫千金弘羊洛陽賈人子以心計年十三侍中三人言利事析秋毫矣詔禁民敢私鑄鐡器煑鹽者􅎂左趾没入其器物公卿又請令諸賈人末作各以其物自占率緡錢二千而一筭及民有軺車若船五丈以上者皆有筭匿不自占占不悉戍邊一嵗没入緡錢有能告者以其半􅂌之其灋大抵出張湯湯每朝奏事語國家用日晏天子忘食丞相充位天下事皆决於湯百姓騷動不安其生咸指怨湯初河南人卜式數請輸財縣官以助邊天子使使問式欲官乎式曰臣少田牧不習仕宦不願也使者問曰家豈有􅁈欲言事乎式曰臣生與人無分争邑人貧者貸之不善者教之所居人皆從式式何故見寃於人無所欲言也使者曰茍如此子何欲而然式曰天子誅匈奴愚以為賢者宜死節於邊有財者宜輸委如此而匈奴可滅也上由是賢之欲尊顯以風百姓乃召拜式為中郎爵左庶長賜田十頃布告天下使眀知之未㡬又擢式為齊太傅春有星孛于東北夏有長星出于西北上與諸将議曰翕侯趙信為單于畫計常以為漢兵不能度幕輕留今大發士卒其勢必得所欲乃粟馬十萬令大将軍青票騎将軍去病各将五萬騎私負從馬復四萬匹歩兵轉者踵軍後又數十萬人而敢力戰深入之士皆屬票騎票騎始為出定襄當單于捕虜言單于東乃更令票騎出代郡令大将軍出定襄郎中令李廣數自請行天子以為老弗許良久乃許之以為前将軍太僕公孫賀為左将軍主爵都尉趙食其為右将軍平陽侯曹襄為後将軍皆屬大将軍趙信為單于謀曰漢兵既度幕人馬罷匈奴可坐收虜耳乃悉逺北其輜重以精兵待幕北大将軍靑既出塞捕虜知單于所居乃自以精兵走之而令前将軍廣并於右将軍軍出東道東道回逺而水草少廣自請曰臣部為前将軍今大将軍乃徙令臣出東道且臣結髮而與匈奴戰今乃一得當單于臣願居前先死單于大将軍亦隂受上誡以為李廣老數竒毋令當單于恐不得所欲而公孫敖新失侯大将軍亦欲使敖與俱當單于故徙前将軍廣廣知之固自辭於大将軍大将軍不聽廣不謝而起行意甚愠怒大将軍出塞千餘里度幕見單于兵陳而待於是大将軍令武剛車自環為營而縱五千騎往當匈奴匈奴亦縱可萬騎會日且入大風起砂礫擊面兩軍不相見漢益縱左右翼繞單于單于視漢兵多而士馬尚彊自度戰不能如漢兵單于遂乘六騾壮騎可數百直冒漢圍西北馳去時已昏漢匈奴相紛挐殺傷大當漢軍左校捕虜言單于未昏而去漢軍發輕騎夜追之大将軍軍因隨其後匈奴兵亦散走遲眀行二百餘里不得單于捕斬首虜萬九千級遂至寘顔山趙信城得匈奴積粟食軍留一日悉燒其城餘粟而歸前将軍廣與右将軍食其軍無導惑失道後大将軍不及單于戰大将軍引還過幕南乃遇二将軍大将軍使長史責問廣食其失道状急責廣之幕府對簿廣曰諸校尉無罪乃我自失道吾今自上簿至莫府廣謂其麾下曰廣結髪與匈奴大小七十餘戰今幸從大将軍出接單于兵而大将軍徙廣部行回逺而又迷失道豈非天哉且廣年六十餘矣終不能復對刀筆之吏遂引刀自剄廣為人㢘得賞賜輒分其麾下飲食與士共之為二千石四十餘年家無餘財猨臂善射度不中不發将兵乏絶之處見水士卒不盡飲廣不近水士卒不盡食廣不嘗食士以此愛樂為用及死一軍皆哭百姓聞之知與不知無老壮皆為垂涕而右将軍獨下吏當死贖為庶人單于之遁走其兵往往與漢兵相亂而隨單于單于久不與其大衆相得其右谷蠡王以為單于死乃自立為單于十餘日真單于復得其衆而右谷蠡王乃去其單于號票騎将軍騎兵車重與大将軍軍等而無裨将悉以李敢等為大校當裨将出代右北平二千餘里絶大幕直左方兵獲屯頭王韓王等三人将軍相國當户都尉八十三人封狼居胥山禪於姑衍登臨翰海鹵獲七萬四百四十三級天子以五千八百户益封票騎将軍又封其所部右北平太守路博德等四人為列侯從票侯破奴等二人益封校尉敢為闗内侯食邑軍吏卒為官賞賜甚多而大将軍不得益封軍吏卒皆無封侯者兩軍之出塞塞閱官及私馬凡十四萬匹而復入塞者不滿三萬匹乃益置大司馬位大将軍票騎将軍皆為大司馬定令令票騎将軍秩禄與大将軍等自是之後大将軍青日退而票騎日益貴大将軍故人門下士多去事票騎輒得官爵唯任安不肻票騎将軍為人少言不泄有氣敢往天子嘗欲教之孫吳兵灋對曰顧方略何如耳不至學古兵灋天子為治第令票騎視之對曰匈奴未滅無以家為也由此上益重愛之然少貴不省士其從軍天子為遣太官齎數十乘既還重車餘棄粱肉而士有飢者其在塞外卒乏糧或不能自振而票騎尚穿域蹋鞠事多此類大将軍為人仁喜士退讓以和柔自媚於上兩人志操如此是時漢所殺虜匈奴合八九萬而漢士卒物故亦數萬是後匈奴逺遁而幕南無王庭漢度河自朔方以西至令居往往通渠置田官吏卒五六萬人稍蠶食匈奴以北然亦以馬少不復大出擊匈奴矣匈奴用趙信計遣使於漢好辭請和親天子下其議或言和親或言遂臣之丞相長史任敞曰匈奴新破困宜可使為外臣朝請於邊漢使任敞於單于單于大怒留之不遣是時博士狄山議以為和親便上以問張湯湯曰此愚儒無知狄山曰臣固愚愚忠若御史大夫湯乃詐忠於是上作色曰吾使生居一郡能無使虜入盗乎曰不能曰居一縣對曰不能復曰居一障間山自度辯窮且下吏曰能於是上遣山乘障至月餘匈奴斬山頭而去自是之後羣臣震慴無敢忤湯者是嵗汲黯坐灋免以定襄太守義縱為右内史河内太守王温舒為中尉先是寗成為闗都尉吏民出入闗者號曰寜見乳虎無值寗成之怒及義縱為南陽太守至闗寗成側行送迎至郡遂按寗氏破碎其家南陽吏民重足一迹後徙定襄太守初至掩定襄獄中重罪輕繫二百餘人及賓客昆弟私入視亦二百餘人一捕鞠曰為死罪解脫是日皆報殺四百餘人其後郡中不寒而栗是時趙禹張􅣚以深刻爲九卿然其治尚輔灋而行縱専以鷹擊爲治王温舒始爲廣平都尉擇郡中豪敢往吏十餘人以爲爪牙皆把其隂重罪而縱使督盗賊快其意所欲得此人雖有百罪弗灋即有避因其事夷之亦滅宗以其故齊趙之郊盗賊不敢近廣平廣平聲爲道不拾遺遷河内太守以九月至令郡具私馬五十疋爲驛捕郡中豪猾相連坐千餘家上書請大者至族小者乃死家盡没入償臧奏行不過二三日得可事論報至流血十餘里河内皆怪其奏以爲神速盡十二月郡中毋聲毋敢夜行野無犬吠之盗其頗不得失之旁郡國追求會春温舒頓足歎曰嗟乎令冬月益展一月足吾事矣天子聞之皆以為能故擢為中二千石齊人少翁以鬼神方見上上有所幸王夫人卒少翁以方夜致鬼如王夫人之貌天子自帷中望見焉於是乃拜少翁為文成将軍賞賜甚多以客禮禮之文成又勸上作甘泉宫中為臺室畫天地太一諸鬼神而置祭具以致天神居嵗餘其方益衰神不至乃為帛書以飯牛佯不知言曰此牛腹中有竒殺視得書書言甚怪天子識其手書問其人果是偽書於是誅文成将軍而隠之資治通鑑卷第十九
