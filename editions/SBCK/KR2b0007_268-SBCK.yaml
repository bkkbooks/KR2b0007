body:
  text: 臣司馬光奉勑編集後梁紀三作噩十一月凡二年有竒起重光協洽三月盡昭陽太祖神武元聖孝皇帝下乾化元年三月乙酉朔以天雄留後羅周翰為節度使清海靜海節度使兼中書令南平襄王劉隱病亟表其弟節度副使巖權知留後丁亥卒巖襲位岐王聚兵臨蜀東鄙蜀主謂羣臣曰自茂貞為朱溫所困吾常振其乏絶今乃負恩為冦誰為吾擊之兼中書令王宗侃請行蜀主以宗侃為北路行營都統司天少監趙温珪諫曰茂貞未犯邊諸將貪功深入糧道阻逺恐非國家之利蜀主不聽以兼侍中王宗祐太子少師王宗賀山南節度使唐道襲爲三招討使左金吾大將軍王宗紹爲宗祐之副帥步騎十二萬代岐壬辰宗侃等發成都旌旗數百里岐王募華原賊帥温韜以爲假子以華原爲耀州美原爲鼎州置義勝軍以韜爲節度使使帥邠岐兵冦長安詔感化節度使康懐貞忠武節度使牛存節以同華河中兵討之己酉懷貞等奏擊韜於車度走之夏四月乙卯朔岐兵冦蜀興元唐道襲擊却之上以久疾五月甲申朔大赦甲辰以清海留後劉巖爲節度使巖多延中國士人置於幕府出爲刺史刺史無武人蜀主如利州命太子監國六月癸丑朔至利州燕王守光嘗衣赭袍顧謂將吏曰今天下大亂英雄角逐吾兵彊地險亦欲自帝何如孫鶴曰今内難新平公私困竭太原窺吾西契丹伺吾北遽謀自帝未見其可大王但養士愛民訓兵積榖德政旣修四方自服矣守光不恱又使人諷鎮定求尊已為尚父趙王鎔以告晉王晉王怒欲伐之諸將皆曰是為惡極矣行當族滅不若陽為推尊以稔之乃與鎔及義武王處直昭義李嗣昭振武周德威天德宋瑤六節度使共奉冊推守光為尚書令尚父守光不寤以為六鎮實畏已益驕乃具表其狀曰晉王等推臣臣荷陛下厚恩未之敢受竊思其宜不若陛下授臣河北都統則并鎮不足平矣上亦知其狂愚乃以守光為河北道採訪使遣閤門使王瞳受㫖史彥羣冊命之守光命僚屬草尚父采訪使受冊儀乙卯僚屬取唐冊太尉儀獻之守光視之問何得無郊天改元之事對曰尚父雖貴人臣也安有郊天改元者乎守光怒投之於地曰我地方二千里帶甲三十萬直作河北天子誰能禁我尚父何足為哉命趣具即帝位之儀械繫瞳彥羣及諸道使者於獄旣而皆釋之帝命楊師厚將兵三萬屯邢州蜀諸將擊岐兵屢破之秋七月蜀主西還留御營使昌王宗鐬屯利州辛丑帝避暑於張宗奭第亂其婦女殆徧宗奭子繼祚不勝憤恥欲弑之宗奭止之曰吾家頃在河陽為李罕之所圍啗木屑以度朝夕頼其救我得有今日此恩不可忘也乃止甲辰還宫趙王鎔以楊師厚在邢州甚懼㑹晉王于承天軍晉王謂鎔父友也事之甚恭鎔以梁冦為憂晉王曰朱温之惡極矣天將誅之雖有師厚輩不能救也脱有侵軼僕自帥衆當之叔父勿以為憂鎔捧巵為壽謂晉王為四十六舅鎔幼子昭誨從行晉王斷衿為盟許妻以女由是晉趙之交遂固八月庚申蜀主至成都燕王守光將稱帝將佐多竊議以為不可守光乃置斧質於庭曰敢諫者斬孫鶴曰滄州之破鶴分當死䝉王生全以至今日今日敢愛死而忘恩乎竊為今日之帝未可也守光怒伏諸質上令軍士冎而噉之鶴呼曰百日之外必有急兵守光命以土窒其口寸斬之甲子守光即皇帝位國號大燕改元應天以梁使王瞳為左相盧龍判官齊涉為右相史彦羣為御史大夫受冊之日契丹䧟平州燕人驚擾岐王使劉知俊李繼崇將兵擊蜀乙亥王宗侃王宗賀唐道襲王宗紹與之戰於青泥嶺蜀兵大敗馬步使王宗浩奔興州溺死於江道襲奔興元先是步軍都指揮使王宗綰城西縣號安逺軍宗侃宗賀等收散兵走保之知俊繼崇追圍之衆議欲弃興元道襲曰無興元則無安逺利州遂為敵境矣吾必以死守之蜀主以昌王宗鐬為應援招討使定戎團練使王宗播為四招討馬步都指揮使將兵救安逺軍壁於廉讓之間與唐道襲合擊岐兵大破之於明珠曲明日又戰於鳬口斬其成州刺史李彦琛九月帝疾稍愈聞晉趙謀入冦自將拒之戊戌以張宗奭為西都留守庚子帝發洛陽甲辰至衛州方食軍前奏晉軍已出井陘帝遽命輦北趣邢洺晝夜倍道兼行丙午至相州聞晉兵不出乃止相州刺史李思安不意帝猝至落然無具坐削官爵湖州刺史錢鏢酗酒役人恐吳越王鏐罪之冬十月辛亥朔殺都監潘長推官鍾安德奔于吳晉王聞燕王守光稱帝大笑曰俟彼卜年吾當問其鼎矣張承業請遣使致賀以驕之晉王遣太原少尹李承勲往承勲至幽州用鄰藩通使之禮燕之典客者曰吾主帝矣公當稱臣庭見承勲曰吾受命於唐朝為太原少尹燕王自可臣其境内豈可臣它國之使乎守光怒囚之數日出而問之曰臣我乎承勲曰燕王能臣我王則我請為臣不然有死而已守光竟不能屈蜀主如利州命太子監國決雲軍虞候王琮敗岐兵執其將李彦太俘斬三千五百級乙卯捉生將彭君集破岐二寨俘斬三千級王宗侃遣裨將林思諤自中巴間行至泥溪見蜀主告急蜀主命開道都指揮使王宗弼將兵救安逺及劉知俊戰于斜谷破之甲寅夜帝發相州乙卯至洹水是夜邊吏言晉趙兵南下帝即時進軍丙辰至魏縣或告云沙陀至矣士卒恟懼多逃亡嚴刑不能禁旣而復告云無冦上下始定戊午貝州奏晉兵冦東武尋引去帝以夾寨柏鄉屢失利故力疾北巡思一雪其恥意鬱鬱多躁忿功臣宿將往往以小過被誅衆心益懼旣而晉趙兵竟不出十一月壬午帝南還燕主守光集將吏謀攻易定幽州參軍景城馮道以為未可守光怒繫獄或救之得免道亡奔晉張承業薦於晉王以為掌書記丁亥王處直告難于晉懷州刺史開封段明逺妹為美人戊子帝至獲嘉明逺饋獻豐備帝悅庚寅保塞節度使高萬興奏遣都指揮使高萬金將兵攻鹽州刺史高行存降壬辰帝至洛陽疾復作蜀王宗弼敗岐兵於金牛拔十六寨俘斬六千餘級擒其將郭存等丙申王宗鐬王宗播敗􅄮兵於黄牛川擒其將蘇厚等丁酉蜀主自利州如興元援軍旣集安逺軍望其旗王宗侃等鼓譟而出與援軍夾攻岐兵大破之拔二十一寨斬其將李廷志等己亥岐兵解圍遁去唐道襲先伏兵於斜谷邀擊又破之庚子蜀主西還岐王左右石簡顒讒劉知俊於岐王王奪其兵李繼崇言於王曰知俊壯士窮來歸我不宜以讒廢之王為之誅簡顒以安之繼崇召知俊舉族居于秦州戊申燕主守光將兵二萬冦易定攻容城王處直告急于晉十二月乙卯以朗州留後馬賨為永順節度使同平章事鎮南留後盧延昌遊獵無度百勝軍指揮使黎球殺之自立將殺譚全播全播稱疾請老乃免丙辰以球為虔州防禦使未幾球卒牙將李彦圖代知州事全播愈稱疾篤劉巖聞全播病發兵攻韶州破之刺史廖爽奔楚楚王殷表為永州刺史丁巳蜀王至成都戊午以靜海留後曲美為節度使癸亥以靜江行軍司馬姚彥章為寧逺節度副使權知容州從楚王殷之請也劉巖遣兵攻容州殷遣都指揮使許德勲以桂州兵救之彦章不能守乃遷容州士民及其府藏奔長沙巖遂取容管及高州甲子晉王遣蕃漢馬步緫管周德威將兵三萬攻燕以救易定是嵗蜀王以内樞密使潘炕為武泰節度使炕從弟宣徽南院使峭為内樞密使二年春正月德威東出飛狐與趙王將王德明義武將程巖㑹于易水丙戌三鎮兵進攻燕祁溝關下之戊子圍涿州刺史劉知温城守劉守竒之客劉去非大呼於城下謂知温曰河東小劉郎來為父討賊何豫汝事而堅守邪守竒免胄勞之知温拜於城上遂降周德威疾守竒之功譛諸晉王王召之守奇恐獲罪與去非及進士趙鳳來奔上以守竒為博州刺史去非鳳皆幽州人也先是燕主守光籍境内丁壯悉文面為兵雖士人亦不免鳳詐為僧奔晉守奇客之丁酉德威至幽州城下守光來求救二月帝疾小愈議自將擊鎮定以救之帝聞岐蜀相攻辛酉遣光祿卿盧玭等使于蜀遺蜀主書呼之為兄甲子帝發洛陽從官以帝誅戮無常多憚行帝聞之益怒是日至白馬頓賜從官食多未至遣騎趣之於路左散騎常侍孫騭右諫議大夫張衍兵部郎中張儁最後至帝命撲殺之衍宗奭之姪也丙寅帝至武陟段明逺供饋有加於前丁卯至獲嘉帝追思李思安去嵗供饋有闕貶柳州司户告辭稱明逺之能曰觀明逺之忠勤如此見思安之悖慢何如尋長流思安於崖州賜死明逺後更名凝乙亥帝至魏州命都招討使宣義節度使楊師厚副使前河陽節度使李周彞圍棗强招討應接使平盧節度使賀德倫副使天平留後袁象先圍蓨縣德倫河西胡人象先下邑人也戊寅帝至具州辰州蠻酋宋鄴昌師益皆帥衆降於楚楚王殷以鄴為辰州刺史師益為溆州刺史帝晝夜兼行三月辛巳至下博南登觀津冢趙將符習引數百騎岀巡邏不知是帝遽前逼之或告曰晉兵大至矣帝弃行幄亟引兵趣棗强與楊師厚軍合習趙州人也棗强城小而堅趙人聚精兵數千守之師厚急攻之數日不下城壞復修死傷者以萬數城中矢石將竭謀出降有一卒奮曰賊自柏鄉䘮敗已來視我鎮人裂眥今往歸之如自投虎狼之口耳困窮如此何用身為我請獨往試之夜縋城出詣梁軍詐降李周彞召問城中之備對曰非半月未易下也因謀曰某旣歸命願得一劒効死先登取守城將首周彞不許使荷檐從軍卒得間舉檐擊周彞首踣地左右救至得免帝聞之愈怒命師厚晝夜急攻丙戌拔之無問老幼盡殺之流血盈城初帝引兵度河聲言五十萬晉忻州刺史李存審屯趙州患兵少裨將趙行實請入土門避之存審不可及賀德倫攻蓨縣存審謂史建瑭李嗣肱曰吾王方有事幽薊無兵此來南方之事委吾輩數人今蓨縣方急吾輩安得坐而視之使賊得蓨縣必西侵深兾患益深矣當與公等以竒計破之存審乃引兵扼下博橋使建瑭嗣肱分道擒生建瑭分其麾下為五隊隊各百人一之衡水一之南宫一之信都一之阜城自將一隊深入與嗣肱遇梁軍之樵芻者皆執之獲數百人明日㑹於下博橋皆殺之留數人斷臂縱去曰為我語朱公晉王大軍至矣時蓨縣未下帝引楊師厚兵五萬就賀德倫共攻之丁亥始至縣西未及置營建瑭嗣肱各將三百騎效梁軍旗幟服色與樵芻者雜行日且暮至德倫營門殺門者縱火大譟弓矢亂發左右馳突旣暝各斬馘執俘而去營中大擾不知所為斷臂者復來曰晉軍大至矣帝大駭燒營夜遁迷失道委曲行百五十里戊子旦乃至兾州蓨之耕者皆荷鉏奮梃逐之委弃軍資器械不可勝計旣而復遣騎覘之曰晉軍實未來此乃史先鋒遊騎耳帝不勝慙憤由是病增劇不能乗肩輿留貝州旬餘諸軍始集義昌節度使劉繼威年少淫虐類其父淫於都指揮使張萬進家萬進怒殺之詰旦召大將周知裕告其故萬進自稱留後以知裕為左都押牙庚子遣使奉表請降亦遣使降于晉晉王命周德威安撫之知裕心不自安求為景州刺史遂來奔帝為之置歸化軍以知裕為指揮使凡軍士自河朔來者皆􅀠之辛丑以萬進為義昌留後甲辰改義昌為順化軍以萬進為節度使乙巳帝發具州丁未至魏州戊申周德威遣禆將李存暉等攻瓦橋關其將吏及莫州刺史李嚴皆降嚴幽州人也涉獵書傳晉王使傅其子繼岌嚴固辭晉王怒將斬之教練使孟知祥徒跣入諫曰彊敵未滅大王豈宜以一怒戮嚮義之士乎乃免之知祥遷之弟子李克讓之壻也吳鎮南節度使劉威歙州觀察使陶雅宣州觀察使李遇常州刺史李簡皆武忠王舊將有大功以徐温自牙將秉政内不能平李遇尤甚常言徐温何人吾未嘗識面一旦乃當國邪館驛使徐玠使於吳越道過宣州温使玠説遇入見新王遇初許之玠曰公不爾人謂公反遇怒曰君言遇反殺侍中者非反邪侍中謂威王也温怒以淮南節度副使王檀為宣州制置使數遇不入朝之罪遣都指揮使柴再用帥昇潤池歙兵納檀于宣州昇州副使徐知誥為之副遇不受代再用攻宣州踰月不克夏四月癸丑以楚王殷為武安武昌靜江寧逺節度使洪鄂四面行營都統乙卯博王友文來朝請帝還東都丁巳發魏州己未至黎陽以疾淹留乙丑至滑州維州羌胡董琢反蜀主遣保鑾軍使趙綽討平之己巳帝至大梁帝聞嶺南與楚相攻甲戌以右散騎常侍韋戩等為潭廣和叶使往解之戊寅帝發大梁周德威白晉王以兵少不足攻城晉王遣李存審將吐谷渾契苾騎兵㑹之李嗣源攻瀛州刺史趙敬降五月甲申帝至洛陽疾甚司空門下侍郎同平章事薛貽矩卒燕主守光遣其將單廷珪將精兵萬人出戰與周德威遇於龍頭岡廷珪曰今日必擒周楊五以獻楊五德威小名也旣戰見德威於陳援槍單騎逐之槍及德威背德威側身避之奮檛反擊廷珪墜馬生擒置於軍門燕兵退走德威引騎乗之燕兵大敗斬首三千級廷珪燕驍將也燕人失之奪氣己丑蜀大赦李遇少子為淮南牙將遇最愛之徐温執之至宣州城下示之其子啼號求生遇由是不忍戰温使典客何蕘入城以吳王命説之曰公本志果反請斬蕘以徇不然隨蕘納款遇乃開門請降温使柴再用斬之夷其族於是諸將始畏温莫敢違其命徐知誥以功遷昇州刺史知誥事温甚謹安於勞辱或通夕不解帶温以是特愛之每謂諸子曰汝輩事我能如知誥乎時諸州長吏多武夫專以軍旅為務不恤民事知誥在昇州獨選用廉吏修明政教招延四方士大夫傾家貲無所愛洪州進士宋齊丘好縱横之術謁知誥知誥竒之辟為推官與判官王令謀參軍王翃專主謀議以牙吏馬仁裕周宗曹悰為腹心仁裕彭城人宗漣水人也閏月壬戌帝疾增甚謂近臣曰我經營天下三十年不意太原餘孽更昌熾如此吾觀其志不小天復奪我年我死諸兒非彼敵也吾無葬地矣因哽咽絶而復蘇高季昌濳有據荆南之志乃奏築江陵外郭增廣之丙寅蜀門下侍郎同平章事王鍇罷為兵部尚書帝長子郴王友裕早卒次假子博王友文帝特愛之常留守東都兼建昌宫使次郢王友珪其母亳州營倡也為左右控鶴都指揮使無寵次均王友貞為東都馬步都指揮使初元貞張皇后嚴整多智帝敬憚之后殂帝縱意聲色諸子雖在外常徵其婦入侍帝往往亂之友文婦王氏色美帝尤寵之雖未以友文為太子帝意常屬之友珪心不平友珪嘗有過帝撻之友珪益不自安帝疾甚命王氏召友文於東都欲與之訣且付以後事友珪婦張氏亦朝夕侍帝側知之密告友珪曰大家以傳國寶付王氏懷往東都吾屬死無日矣夫婦相泣左右或説之曰事急計生何不改圖時不可失六月丁丑朔帝命敬翔出友珪為萊州刺史即令之官已宣㫖未行勑時左遷者多追賜死友珪益恐戊寅友珪易服微行入左龍虎軍見統軍韓勍以情告之勍亦見功臣宿將多以小過被誅懼不自保遂相與合謀勍以牙兵五百人從友珪雜控鶴士入伏於禁中中夜斬關入至寢殿侍疾者皆散走帝驚起問反者為誰友珪曰非它人也帝曰我固疑此賊恨不早殺之汝悖逆如此天地豈容汝乎友珪曰老賊萬段友珪僕夫馮廷諤刺帝腹刃出於背友珪自以敗氊裹之瘞於寢殿祕不發䘮遣供奉官丁昭溥馳詣東都命均王友貞殺友文己卯矯詔稱博王友文謀逆遣兵突入殿中頼郢王友珪忠孝將兵誅之保全朕躬然疾因震驚彌致危殆宜令友珪權主軍國之務韓勍為友珪謀多出府庫金帛賜諸軍及百官以取恱辛巳丁昭溥還聞友文已死乃發䘮宣遺制友珪即皇帝位時朝廷新有内難中外人情忷忷許州軍士更相告變匡國節度使韓建皆不之省亦不為備丙申馬歩都指揮使張厚作亂殺建友珪不敢詰甲辰以厚為陳州刺史秋七月丁未大赦天雄節度使羅周翰幼弱軍府事皆决於牙内都指揮使潘晏北面都招討使宣義節度使楊師厚軍於魏州久欲圖之憚太祖威嚴不敢發至是師厚館於銅臺驛潘晏入謁執而殺之引兵入牙城據位視事壬子制以師厚為天雄節度使徙周翰為宣義節度使以侍衛諸軍使韓勍領匡國節度使甲寅加吳越王鏐尚父甲子以均王友貞為開封尹東都留守蜀太子元坦更名元膺丙寅廢建昌宫使以河南尹張宗奭為國計使凡天下金榖舊􅀠建昌宫者悉主之八月龍驤軍三千人戍懷州者潰亂東走所過剽掠戊子遣東京馬步軍都指揮使霍彦威左耀武指揮使杜晏球討之庚寅擊破亂軍執其都將劉重遇於鄢陵甲午斬之郢王友珪旣簒立諸宿將多憤怒雖曲加恩禮終不恱告哀使至河中護國節度使兾王朱友謙泣曰先帝數十年開創基業前日變起宫掖聲聞甚惡吾備位藩鎮心竊恥之友珪加友謙侍中中書令以詔書自辯且徵之友謙謂使者曰所立者為誰先帝晏駕不以理吾且至洛陽問罪何以徵為戊戌以侍衛諸軍使韓勍為西面行營招討使督諸軍討之友謙以河中附於晉以求救九月丁未以感化節度使康懷貞為河中都招討使更以韓勍副之友珪以兵部尚書知崇政院事敬翔太祖腹心恐其不利於己欲解其内職恐失人望庚午以翔為中書侍郎同平章事壬申以户部尚書李振充崇政院使翔多稱疾不預事康懷貞等與忠武節度使牛存節合兵五萬屯河中城西攻之甚急晉王遣其將李存審李嗣肱李嗣恩將兵救之敗梁軍于胡壁嗣恩本駱氏子也吳武忠王之疾病也周隱請召劉威威由是為帥府所忌或􅉲之於徐温温將討之威幕客黄訥説威曰公受謗雖深反本無狀若輕舟入覲則嫌疑皆亡矣威從之陶雅聞李遇敗亦懼與威偕詣廣陵温待之甚恭如事武忠王之禮優加官爵雅等恱服由是人皆重温訥蘇州人也温與威雅帥將吏請於李儼承制加嗣吳王隆演太師吳王以温領鎮海節度使同平章事淮南行軍司馬如故温遣威雅還鎮辛巳蜀改劒南東川曰武德軍朱犮謙復告急于晉冬十月晉王自將自澤潞而西遇康懷貞於解縣大破之斬首千級追至白徑嶺而還梁兵解圍退保陜州友謙身自至猗氏謝晉王從者數十人撤武備詣晉王帳拜之為舅晉王夜置酒張樂友謙大醉晉王留宿帳中友謙安寢鼾息自如明旦復置酒而罷楊師厚旣得魏愽之衆又兼都招討使宿衛勁兵多在麾下諸鎮兵皆得調發威勢甚重心輕郢王友珪遇事往往専行不顧友珪患之發詔召之云有北邊軍機欲與卿面議師厚將行其腹心皆諫曰往必不測師厚曰吾知其為人雖往如我何乃帥精兵萬人度河趣洛陽友珪大懼丁亥至都門留兵於外與十餘人入見友珪喜甘言遜詞以恱之賜與巨萬癸巳遣還十一月趙將王德明將兵三萬掠武城至于臨清攻宗城下之癸丑楊師厚伏兵唐店邀擊大破之斬首五千餘級甲寅葬神武元聖孝皇帝于宣陵廟號太祖吳淮南節度副使陳璋等將水軍襲楚岳州執刺史苑玫楚王殷遣水軍都指揮使楊定真救岳州璋等進攻荆南高季昌遣其將倪可福拒之吳恐楚人救荆南遣撫州刺史劉信帥江撫􅀽吉信五州兵屯吉州為璋聲援十二月戊寅蜀行營都指揮使王宗汾攻岐文州拔之守將李繼夔走是嵗隰州都將劉訓殺刺史以州降晉晉王以為瀛州刺史訓永和人也虔州防禦使李彦圖卒州人奉譚全播知州事遣使内附詔以全播為百勝防禦使虔韶二州節度開通使高季昌出兵聲言助梁伐晉進攻襄州山南東道節度使孔勍擊敗之自是朝貢路絶勍兖州人也均王上上乾化三年春正月丁巳晉周德威拔燕順州癸亥郢王友珪朝享太廟甲子祀圓丘大赦改元鳳歷吳陳璋攻荆南不克而還荆南兵與楚兵㑹於江口以邀之璋知之舟二百艘駢為一列夜過二鎮兵遽出追之不能及晉周德威拔燕安逺軍薊州將成行言等降于晉二月壬午蜀大赦郢王友珪旣得志遽為荒淫内外憤怒友珪雖啗以金繒終莫之附駙馬都尉趙巖犨之子太祖之壻也左龍虎統軍侍衛親軍都指揮使􅀽象先太祖之甥也巖奉使至大梁均王友貞密與之謀誅友珪巖曰此事成敗在招討楊令公耳得其一言諭禁軍吾事立辦均王乃遣腹心馬慎交之魏州説楊師厚曰郢王簒弑人望屬在大梁公若因而成之此不世之功也且許事成之日賜犒軍錢五十萬緡師厚與將佐謀之曰方郢王弑逆吾不能即討今君臣之分已定無故改圖可乎或曰郢王親弑君父賊也均王舉兵復讎義也奉義討賊何君臣之有彼若一朝破賊公將何以自處乎師厚驚曰吾幾誤計乃遣其將王舜賢至洛陽隂與􅀽象先謀遣招討馬步都虞候譙人朱漢賔將兵屯滑州為外應趙巖歸洛陽亦與象先密定計友珪治龍驤軍潰亂者搜捕其黨獲者族之經年不已時龍驤軍有戍大梁者友珪徵之均王因使人激怒其衆曰天子以懷州屯兵叛追汝輩欲盡阬之其衆皆懼莫知所為丙戌均王奏龍驤軍疑懼未肯前發戊子龍驤將校見均王泣請可生之路王曰先帝與汝輩三十餘年征戰經營王業今先帝尚為人所弑汝輩安所逃死乎因出太祖畫像示之而泣曰汝能自趣洛陽雪讎恥則轉禍為福矣衆皆踊躍呼萬嵗請兵仗王給之庚寅旦􅀽象先等帥禁兵數千人突入宫中友珪聞變與妻張氏及馮廷諤趨北垣樓下將踰城自度不免令廷諤先殺妻次殺已廷諤亦自剄諸軍十餘萬大掠都市百司逃散中書侍郎同平章事杜曉侍講學士李珽皆為亂兵所殺門下侍郎同平章事于兢宣政使李振被傷至晡乃定象遣光巖齎傳國寶詣大梁迎均王王曰大梁國家創業之地何必洛陽乃即帝位於大梁復稱乾化三年追廢友珪為庶人復愽王友文官爵丙申晉李存暉等攻燕檀州刺史陳確以城降蜀唐道襲自興元罷歸復為樞密使太子元膺廷䟽道襲過惡以為不應復典機要蜀主不恱庚子以道襲為太子太保三月甲辰朔晉周德威拔燕盧臺軍丁未帝更名鍠久之又名瑱庚戌加楊師厚兼中書令賜爵鄴王賜詔不名事無巨細必咨而後行帝遣使招撫朱友謙友謙復稱藩奉梁年號丙辰立皇弟友敬為康王乙丑晉將劉光濬克古北口燕居庸關使胡令圭等奔晉戊辰以保義留後戴思逺為節度使鎮邢州燕主守光命大將元行欽將騎七千牧馬於山北募山北兵以應契丹又以騎將高行珪為武州刺史以為外援晉李嗣源分兵徇山後八軍皆下之晉王以其弟存矩為新州刺史總之以燕納降軍使盧文進為裨將李嗣源進攻武州高行珪以城降元行欽聞之引兵攻行珪行珪使其弟行周爲質於晉軍以求救李嗣源引兵救之行欽解圍去嗣源與行周追至廣邊軍凡八戰行欽力屈而降嗣源愛其驍勇養以為子嗣源進攻儒州拔之以行珪為代州刺史行周留事嗣源常與嗣源假子從珂分將牙兵以從從珂母魏氏鎮州人先適王氏生從珂嗣源從晉王克用戰河北得魏氏以為妾故從珂為嗣源子及長以勇健善戰知名嗣源愛之吳行營招討使李濤帥衆二萬出千秋嶺攻吳越衣錦軍吳越王鏐以其子湖州刺史傳瓘為北面應援都指揮使以救之睦州刺史傳璙為招討收復都指揮使將水軍攻吳東洲以分其兵勢夏四月癸未以􅀽象先領鎮南節度使同平章事晉周德威進軍逼幽州南門壬辰燕主守光遣使致書於德威以請和語甚卑而哀德威曰大燕皇帝尚未郊天何雌伏如是邪予受命討有罪者結盟繼好非所聞也不答書守光懼復遣人祈哀德威乃以聞於晉王千秋嶺道險狹錢傳瓘使人伐木以斷吳軍之後而擊之吳軍大敗虜李濤及士卒三千餘人以歸己亥晉劉光濬拔燕平州執刺史張在吉五月光濬攻營州刺史楊靖降乙巳蜀主以兵部尚書王鍇為中書侍郎同平章事楊師厚與劉守竒將汴滑徐兖魏􅀶邢洺之兵十萬大掠趙境師厚自柏鄉入攻土門趣趙州安竒自貝州人趣兾州所過焚掠庚戌師厚至鎮州營於南門外潘其關城壬子師厚自九門退軍下􅀶守竒引兵與師厚㑹攻下􅀶拔之晉將李存審史建瑭戍趙州兵少趙王告急於周德威德威遣騎將李紹衡㑹趙將王德明同拒梁軍師厚守竒自弓高度御河而東逼滄州張萬進懼請遷于河南師厚表徙萬進鎮青州以守竒為順化節度使吳遣宣州副指揮使花虔將兵㑹廣德鎮遏使渦信屯廣德將復冦衣錦軍吳越錢傳瓘就攻之六月壬申朔晉王遣張承業詣幽州與周德威議軍事丙子蜀主以道士杜光庭為金紫光祿大夫左諫議大夫封蔡國公進號廣成先生光庭博學善屬文蜀主重之頗與議政事吳越錢傳瓘拔廣德虜花虔渦信以歸戊子以張萬進為平盧節度使辛卯燕主守光遣使詣張承業請以城降承業以其無信不許蜀太子元膺豭喙齙齒目視不正而警敏知書善騎射性狷急猜忍蜀主命杜光庭選純靜有德者使侍東宫光庭薦儒者許寂徐簡夫太子未嘗與之交言日與樂工羣小嬉戲無度僚屬莫敢諫秋七月蜀主將以七夕出遊丙午太子召諸王大臣宴飲集王宗翰内樞密使潘峭翰林學士承㫖高陽毛文錫不至太子怒曰集王不來必峭與文錫離間也大昌軍使徐瑶常謙素為太子所親信酒行屢目少保唐道襲道襲懼而起丁未旦太子入白蜀主曰潘峭毛文錫離間兄弟蜀主怒命貶逐峭文錫以前武㤗節度使兼侍中潘炕為内樞密使太子出道襲入蜀主以其事告之道襲曰太子謀作亂欲召諸將諸王以兵錮之然後舉事耳蜀主疑焉遂不出道襲請召屯營兵入宿衛許之内外戒嚴太子初不為備聞道襲召兵乃以天武甲士自衛捕潘峭毛文錫至檛之幾死囚諸東宫又捕成都尹潘嶠囚諸得賢門戊申徐瑤常謙與懷勝軍使嚴璘等各帥所部兵奉太子攻道襲至清風樓道襲引屯營兵出拒戰道襲中流矢逐至城西斬之殺屯營兵甚衆中外驚擾潘炕言於蜀主曰太子與唐道襲爭權耳無它志也陛下宜面諭大臣以安社稷蜀主乃召兼中書令王宗侃王宗賀前利州團練使王宗魯等使發兵討為亂者徐瑤常謙等宗侃等陳於西毬場門兼侍中王宗黯自大安門梯城而入與瑤謙戰於㑹同殿前殺數十人餘衆皆潰瑤死謙與太子奔龍躍池匿於艦中及暮稍定己酉旦太子出就舟人匄食舟人以告蜀主遣集王宗翰往慰撫之比至太子已為衛士所殺蜀王疑宗翰殺之大慟不已左右恐事變㑹張格呈慰諭軍民牓讀至不行斧鉞之誅將誤社稷之計蜀主收涕曰朕何敢以私害公於是下詔廢太子元膺為庶人宗翰奏誅手刃太子者元膺左右坐誅死者數十人貶竄者甚衆庚戌贈唐道襲太師諡忠壯復以潘峭為樞密使甲子晉五院軍使李信拔莫州擒燕將畢元福八月乙亥李信拔瀛州賜高季昌爵勃海王晉王與趙王鎔㑹于天長楚寧逺節度使姚彥章將水軍侵吳鄂州吳以池州團練使吕師造為水陸行營應援使未至楚兵引去九月甲辰以御史大夫姚洎為中書侍郎同平章事燕王守光引兵夜出復取順州吳越王鏐遣其子傳瓘傳璙及大同節度使傳瑛攻吳常州營於潘葑徐温曰浙人輕而怯帥諸將倍道赴之至無錫黒雲都將陳祐言於温曰彼謂吾逺來罷倦未能戰請以所部乗其無備擊之乃自它道出敵後温以大軍當其前夾攻之吳越大敗斬獲甚衆高季昌造戰艦五百艘治城塹繕器械為攻守之具招聚亡命交通吳蜀朝廷浸不能制冬十月己巳朔燕主守光帥衆五千夜出將入檀州庚午周德威自涿州引兵邀擊大破之守光以百餘騎逃歸幽州其將卒降者相繼蜀潘炕屢請立太子蜀主以雅王宗輅類已信王宗傑才敏欲擇一人立之鄭王宗衍最㓜其母徐賢妃有寵欲立其子使飛龍使唐文扆諷張格上表請立宗衍格夜以表示功臣王宗侃等詐云受密㫖衆皆署名蜀主令相者視諸子亦希㫖言鄭王相最貴蜀主以為衆人實欲立宗衍不得已許之曰宗衍幼懦能堪其任乎甲午立宗衍為太子受冊畢潘炕以朝廷無事稱疾請老蜀主不許涕泣固請乃許之國有大疑常遣使就第問之嶺南節度使劉巖求昏于楚楚王許以女妻之盧龍巡屬皆入于晉燕主守光獨守幽州城求援於契丹契丹以其無信竟不救守光屢請降於晉晉人疑其詐終不許至是守光登城謂周德威曰俟晉王至吾則開門泥首聽命德威使白晉王十一月甲辰晉王以監軍張承業權知軍府事自詣幽州辛酉單騎抵城下謂守光曰朱温簒逆余本與公合河朔五鎮之兵興復唐祚公謀之不臧乃效彼狂僭鎮定二帥皆俛首事公而公曾不之恤是以有今日之役丈夫成敗須決所向公將何如守光曰今日俎上肉耳惟王所裁王憫之與折弓矢為誓曰但出相見保無它也守光辭以他日先是守光愛將李小喜多賛成守光之惡言聽計從權傾境内至是守光將出降小喜止之是夕小喜踰城詣晉軍且言城中力竭壬戌晉王督諸軍四面攻城克之擒劉仁恭及其妻妾守光帥妻子亡去癸亥晉王入幽州以寧國節度使王景仁為淮南西北行營招討應接使將兵萬餘侵廬壽資治通鑑卷第二百六十八
