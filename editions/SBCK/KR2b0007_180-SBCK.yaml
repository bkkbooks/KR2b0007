front:
  text: 資治通鑑卷第一百八十
  hash: sha256:c6693da2ad5381fa0ee3d92aacc346b758038df2301524444ffbb4ec5eaf3da9
body:
  text: 臣司馬光奉勑編集隋紀四圉單閼凡四年起閼逢困敦盡強高祖文皇帝下仁壽四年春正月丙午赦天下帝將避暑於仁壽宫術士章􅄷太翼固諫不聽太翼曰是行恐鑾輿不返帝太怒繫之長安獄期還而斬之甲子幸仁壽宫乙丑詔賞賜支度事無巨細並付皇太子夏四月乙卯上不豫六月庚申赦天下秋七月甲辰上疾甚卧與百僚辭訣並握手歔欷命太子赦章􅄷太翼丁未崩於大寶殿高祖性嚴重令行禁止勤於政事每旦聽朝日昊忘倦雖嗇於財至於賞賜有功即無所愛將士戰没必加優賞仍遣使者勞問其家愛養百姓勸課農桑輕徭薄賦其自奉養務爲儉素乘輿御物故弊者隨令􅀘用自非享宴所食不過一肉後宫皆服澣濯之衣天下化之開皇仁壽之閒丈夫率衣絹布不服綾綺裝帶不過銅鐵骨角無金玉之飾故衣食滋殖倉庫盈溢受禪之初民户不滿四百萬末年踰八百九十萬獨兾州已一百萬户然猜忌苛察信受讒言功臣故舊無始終保全者乃至子弟皆如􅄷敵此其所短也初文獻皇后既崩宣華夫人陳氏容華夫人蔡氏皆有寵陳氏陳高宗之女蔡氏丹楊人也上寢疾於仁壽宫尚書左僕射楊素兵部尚書柳述黃門侍郎元巖皆入閤侍疾召皇太子入居大寶殿太子慮上有不諱須預防擬手自為書封出問素素條錄事狀以報太子宫人誤送上所上覽而大恚陳夫人平旦出更衣爲太子所逼夫人拒之得免歸於上所上怪其神色有異問其故夫人泫然曰太子無禮上恚抵牀曰畜生何足付大事獨􅀌誤我乃呼柳述元巖曰召我兒述等將呼太子上曰勇也述巖出閤爲敕書楊素聞之以白太子矯詔執述巖繫大理獄追東宫兵士帖上臺宿衞門禁出入並取宇文述郭衍節度令右庶子張衡入寢殿侍疾盡遣後宫出就别室俄而上崩故中外頗有異論陳夫人與後宫聞變相顧戰栗失色晡後太子遣使者齎小金合帖紙於際親署封字以賜夫人夫人見之惶懼以爲鴆毒不敢發使者促之乃發合中有同心結數枚宫人咸恱相謂曰得免死矣陳氏恚而却坐不肯致謝諸宫人共逼之乃拜使者其夜太子烝焉乙卯發喪太子即皇帝位㑹伊州刺史楊約來朝太子遣約入長安易留守者矯稱高祖之詔賜故太子勇死縊殺之然後陳兵集衆發高祖凶問煬帝聞之曰令兄之弟果堪大任追封勇爲房陵王不爲置嗣八月丁卯梓宫至自仁壽宫丙子殯于太興前殿柳述元巖並除名述徙龍川巖徙􅀯海帝令蘭陵公主與述離絶欲改嫁之公主以死自誓不復朝謁上表請與述同徙帝大怒公主憂憤而卒臨終上表請葬於柳氏帝愈怒竟不哭葬送甚薄太史令袁充奏言皇帝即位與堯受命年合諷百官表賀禮部侍郎許善心議以爲國哀甫爾不宜稱賀左衛大將軍宇文述素惡善心諷御史劾之左遷給事郎降品二等漢王諒有寵於高祖爲并州揔管自山以東至于滄海南距黃河五十二州皆􅀠焉特許以便宜從事不拘律令諒自以所居天下精兵處見太子勇以讒廢居常怏怏及蜀王秀得罪尤不自安隂蓄異圖言於高祖以突厥方彊宜修武備於是大發工役繕治器械招集亡命左右私人殆將數萬突厥甞宼邊髙祖使諒禦之爲突厥所敗其所領將帥坐除解者八十餘人皆配防嶺表諒以其宿舊奏請留之高祖怒曰爾爲藩王惟當敬依朝命何得私論宿舊廢國家憲法邪嗟乎小子爾一旦無我或欲妄動彼取爾如籠内鷄鶵耳何用腹心爲王頍者僧辯之子倜儻好竒略爲諒諮議參軍蕭摩訶陳氏舊將二人俱不得志每鬱鬱思亂皆爲諒所親善賛成其隂謀㑹熒惑守東井儀曹鄴人􅀓弈曉星厯諒問之曰是何祥也對曰天上東井黃道所經熒惑過之乃其常理􅀂入地上井則可怪耳諒不恱及高祖崩􅌆帝遣車􅀐將軍屈突通以高祖璽書徵之先是髙祖與諒密約􅀂璽書召汝敕字傍别加一􅀧又與玉麟符合者當就徴及發書無驗諒知有變詰通通占對不屈乃遣歸長安諒遂發兵反揔管司馬安定皇甫誕切諫諒不納誕流涕曰竊料大王兵資非京師之敵加以君臣位定逆順勢殊士馬雖精難以取勝一旦陷身叛逆絓於刑書雖欲爲布衣不可得也諒怒囚之嵐州刺史喬鍾葵將赴諒其司馬京兆陶模拒之曰漢王所圖不軌公荷國厚恩位爲方伯當竭誠効命豈得身爲厲階乎鍾葵失色曰司馬反邪臨之以兵辭氣不撓鍾葵義而釋之軍吏曰􅀂不斬模無以壓衆心乃囚之於是從諒反者凡十九州王頍說諒曰王所部將吏家屬盡在關西􅀂用此等則宜長驅深入直據京都所謂疾雷不及掩耳􅀂但欲割據舊齊之地宜任東人諒不能決乃兼用二䇿唱言楊素反將誅之揔管府兵曹聞喜裴文安說諒曰井陘以西在王掌握之内山東士馬亦爲我有宜悉發之分遣羸兵屯守要害仍令隨方略地帥其精銳直入蒲津文安請爲前鋒王以大軍繼後風行雷擊頓於霸上咸陽以東可指麾而定京師震擾兵不暇集上下相疑羣情離駭我陳兵號令誰敢不從旬日之間事可定矣諒大恱於是遣所署大將軍余公理出太谷趣河陽大將軍綦良出滏口趣黎陽大將軍劉建出井陘略燕趙柱國喬鍾葵出鴈門署文安爲柱國與柱國紇單貴王耼等直指京師帝以右武衛將軍洛陽丘和爲蒲州刺史鎮蒲津諒簡精銳數百騎戴䍦離詐稱諒宫人還長安門司弗覺徑入蒲州城中豪傑亦有應之者丘和覺其變踰城逃歸長安蒲州長史勃海高義明司馬北平榮毗皆爲反者所執裴文安等未至蒲津百餘里諒忽改圖令紇單貴斷河橋守蒲州而召文安還文安至謂諒曰兵機詭速本欲出其不意王既不行文安又返使彼計成大事去矣諒不對以王耼爲蒲州刺史裴文安爲晉州刺史薛粹爲絳州刺史梁菩薩爲潞州刺史韋道正爲韓州刺史張伯英爲澤州刺史代州揔管天水李景發兵拒諒諒遣其將劉暠襲景景擊斬之諒復遣喬鍾葵帥勁勇三萬攻之景戰士不過數千加以城池不固爲鍾葵所攻崩毁相繼景且戰且築士卒皆殊死鬬鍾葵屢敗司馬馮孝慈司法吕玉並驍勇善戰儀同三司侯莫陳乂多謀畫工拒守之術景知三人可用推誠任之已無所關預唯在閤持重時撫循而已楊素將輕􅀐五千襲王耼紇單貴於蒲州夜至河際收商賈船得數百艘船内多置草踐之無聲遂衘枚而濟遲明擊之紇單貴敗走耼懼以城降有詔徴素還初素將行計日破賊皆如所量於是以素爲并州道行軍揔管河北道安撫大使帥衆數萬以討諒諒之􅀄起兵也妃兄豆盧毓爲府主簿苦諫不從私謂其弟懿曰吾匹馬歸朝自得免禍此乃身計非爲國也不􅀂且偽從之徐伺其便毓勣之子也毓兄顯州刺史賢言於帝曰臣弟毓素懐志節必不從亂但逼兇威不能自遂臣請從軍與毓爲表裏諒不足圖也帝許之賢宻遣家人齎敕書至毓所與之計議諒出城將往介州令毓與揔管屬朱濤留守毓謂濤曰漢王構逆敗不旋踵吾屬豈可坐受夷滅􅀌負家國邪當與卿出兵拒之濤驚曰王以大事相付何得有是語因拂衣而去毓追斬之出皇甫誕於獄與之恊計及開府儀同三司宿勤武等閉城拒諒部分未定有人告諒諒襲擊之毓見諒至紿其衆曰此賊軍也諒攻城南門稽胡守南城不識諒射之矢下如雨諒移攻西門守兵識諒即開門納之毓誕皆死綦良攻慈州刺史上官政不克引兵攻行相州事薛胄又不克遂自滏口攻黎州塞白馬津余公理自大行下河内帝以右衛將軍史祥爲行軍揔管軍於河隂祥謂軍吏曰余公理輕而無謀恃衆而驕不足破也公理屯河陽祥具舟南岸公理聚兵當之祥簡精銳於下流濳濟公理聞之引兵拒之戰於須水公理未成列祥擊之公理大敗祥東􅃐黎陽綦良軍不戰而潰祥寜之子也帝將發幽州兵疑幽州揔管竇抗有貳心問可使取抗者於楊素素薦前江州刺史勃海李子雄授上大將軍拜廣州刺史又以左領軍將軍長孫晟爲相州刺史發山東兵與李子雄共經略之晟辭以男行布在諒所部帝曰公體國之深終不以兒害義朕今相委公其勿辭李子雄馳至幽州止傳舍召募得千餘人抗來詣子雄子雄伏甲擒之抗榮定之子也子雄遂發幽州兵步騎三萬自井陘西擊諒時劉建圍戍將京兆張祥於井陘子雄破建於抱犢山下建遁去李景被圍月餘詔朔州刺史代人楊義臣救之義臣帥馬步二萬夜出西陘喬鍾葵悉衆拒之義臣自以兵少悉取軍中牛驢得數千頭復令兵數百人人持一鼔濳驅之匿於澗谷閒晡後義臣復與鍾葵戰兵􅀄合命驅牛驢者疾進一時鳴鼔塵埃張天鍾葵軍不知以爲伏兵發因而奔潰義臣縱擊大破之晉絳吕三州皆爲諒城守楊素各以二千人縻之而去諒遣其將趙子開擁衆十餘萬栅絶徑路屯據高壁布陳五十里素令諸將以兵臨之自引奇兵濳入霍山縁崖谷而進素營於谷口自坐營外使軍司入營簡留三百人守營軍士憚北軍之彊不欲出戰多願守營因爾致遲素責所由軍司具對素即召所留三百人出營悉斬之更令簡留人皆無願留者素乃引軍馳進出北軍之北直指其營鳴鼔縱火北軍不知所爲自相蹂踐殺傷數萬諒所署介州刺史梁脩羅屯介休聞素至弃城走諒聞趙子開敗大懼自將衆且十萬拒素於蒿澤㑹天大雨諒欲引軍還王頍諌曰楊素懸軍深入士馬疲弊王以銳卒自將擊之其勢必克今望敵而退示人以怯沮戰士之心益西軍之氣願王勿還諒不從退守清源王頍謂其子曰氣候殊不佳兵必敗汝可隨我楊素進擊諒大破之擒蕭摩訶諒退保晉陽素進兵圍之諒窮蹙請降餘黨悉平帝遣楊約齎手詔勞素王頍將奔突厥至山中徑路斷絶知必不免謂其子曰吾之計數不減楊素但坐言不見從遂至於此不能坐受擒獲以成豎子名吾死之後汝慎勿過親故於是自殺瘞之石窟中其子數日不得食遂過其故人竟爲所擒并獲頍尸梟於晉陽羣臣奏漢王諒當死帝不許除名爲民絶其屬籍竟以幽死諒所部吏民坐諒死徙者二十餘萬家􅀄高祖與獨孤后甚相愛重誓無異生之子嘗謂羣臣曰前丗天子溺於嬖幸嫡庶分爭遂有廢立或至亡國朕旁無姬侍五子同母可謂真兄弟也豈有此憂邪帝又懲周室諸王微弱故使諸子分據大鎮專制方面權侔帝室及其晩節父子兄弟迭相猜忌五子皆不以壽終臣光曰昔辛伯諗周􅁊公曰内寵並后外寵貳政嬖子配嫡大都偶國亂之本也人主誠能慎此四者亂何自生哉隋髙祖徒知嫡庶之多爭􅀌弱之易摇曾不知勢鈞位逼雖同産至親不能無相傾奪考諸辛伯之言得其一而失其三乎冬十月己卯葬文皇帝於太陵廟號髙祖與文獻皇后同墳異穴詔除婦人及奴婢部曲之課男子二十二成丁章仇太翼言於帝曰陛下木命雍州爲破木之衝不可久居又䜟云脩治洛陽還晉家帝深以爲然十一月乙未幸洛陽留晉王昭守長安楊素以功拜其子萬石仁行姪玄挺皆爲儀同三司賚物五萬段綺羅千匹諒妓妾二十人丙申發丁男數十萬掘塹自龍門東接長平汲郡抵臨清關度河至浚儀襄城達於上洛以置關防壬子陳叔寶卒贈大將軍長城縣公謚曰煬癸丑下詔於伊洛營建東京仍曰宫室之制本以便生今所營構務從儉約蜀王秀之得罪也右衞大將軍元胄坐與交通除名久不得調時慈州刺史上官政坐事徙嶺南將軍丘和以蒲州失守除名胄與和有舊酒酣謂和曰上官政壯士也今徙嶺表得無大事乎因自拊腹曰􅀂是公者不徒然矣和奏之胄竟坐死於是徴政爲驍衞將軍以和爲代州刺史煬皇帝上之上大業元年春正月壬辰朔赦天下改元立妃蕭氏爲皇后廢諸州揔管府丙辰立晉王昭爲皇太子髙祖之末羣臣有言林邑多竒寶者時天下無事劉方新平交州乃授方驩州道行軍揔管經略林邑方遣欽州刺史􅇞長真等以步􅀐萬餘出越裳方親帥大將軍張愻等以舟師出比景是月軍至海口二月戊辰敕有司大陳金寶器物錦綵車馬引楊素及諸將討漢王諒有功者立於前使竒章公牛弘宣詔稱􅀭功伐賜賚各有差素等再拜舞蹈而出己卯以素爲尚書令詔天下公除惟帝服淺色黃衫鐵裝帶三月丁未詔楊素與納言楊逹將作大匠宇文愷營建東京每月役丁二百萬人徙洛州郭内居民及諸州富商大賈數萬户以實之廢二崤道開􅛟册道戊申詔曰聽採輿頌謀及庶民故能審刑政之得失今將廵歴淮海觀省風俗敕宇文愷與内史舍人封德彛等營顯仁宫南接皁澗北跨洛濵發大江之南五嶺以北竒材異石輸之洛陽又求海内嘉木異草珍禽竒獸以實園􅁐辛亥命尚書右丞皇甫議發河南淮北諸郡民前後百餘萬開通濟渠自西苑引穀洛水逹于河復自板渚引河歴滎澤入汴又自大梁之東引汴水入泗達于淮又發淮南民十餘萬開䢴溝自山陽至楊子入江渠廣四十步渠旁皆築御道樹以柳自長安至江都置離宫四十餘所庚申遣黃門侍郎王弘等往江南造龍舟及雜船數萬艘東京官吏督役嚴急役丁死者什四五所司以車載死丁東至城臯北至河陽相望於道又作天經宫於東京四時祭髙祖林邑王梵志遣兵守險劉方擊走之師度闍黎江林邑兵乗巨象四面而至方戰不利乃多掘小坑草覆其上以兵挑之既戰僞北林邑逐之象多陷地顛躓轉相驚駭軍遂亂方以弩射象象却走蹂其陳因以銳師繼之林邑大敗俘馘萬計方引兵追之屢戰皆捷過馬援銅柱南八日至其國都夏四月梵志弃城走入海方入城獲其廟主十八皆鑄金爲之刻石紀功而還士卒腫足死者什四五方亦得疾卒於道􅀄尚書右丞李綱數以異議忤楊素及蘇威素薦綱於高祖以爲方行軍司馬方承素意屈辱之幾死軍還久不得調威復遣綱詣􅀯海應接林邑久而不召綱自歸奏事威劾奏綱擅離所職下吏案問㑹赦免官屏居於鄠五月築西苑周二百里其内爲海周十餘里爲方丈蓬萊瀛洲諸山髙出水百餘尺臺觀宫殿羅絡山上向背如神海北有龍鱗渠縈紆注海内縁渠作十六院門皆臨渠每院以四品夫人主之堂殿樓觀窮極華麗宫樹秋冬彫落則剪綵爲華葉綴於枝條色渝則易以新者常如陽春沼内亦剪綵爲荷芰菱芡乘輿遊幸則去冰而布之十六院競以殽羞精麗相髙求市恩寵上好以月夜從宫女數千􅀐遊西苑作清夜遊曲於馬上奏之帝待諸王恩薄多所猜忌滕王綸衛王集內自憂懼呼術者問吉凶及章醮求福或告其怨望呪詛有司奏請誅之秋七月丙午詔除名爲民徙邊郡綸瓚之子集爽之子也八月壬寅上行幸江都發顯仁宫王弘遣龍舟奉迎乙巳上御小朱航自漕渠出洛口御龍舟龍舟四重髙四十五尺長二百尺上重有正殿内殿東西朝堂中二重有百二十房皆飾以金玉下重内侍處之皇后乘翔螭舟制度差小而裝飾無異别有浮景九艘三重皆水殿也又有漾彩朱鳥蒼螭白虎玄武飛羽青鳬陵波五樓道場玄壇樓船板黄篾等數千艘後宫諸王公主百官僧尼道士蕃客乘之及載内外百司供奉之物共用挽船士八萬餘人其挽漾彩以上者九千餘人謂之殿脚皆以錦綵爲􅂁又有平乘青龍艨艟艚八櫂艇舸等數千艘並十二衞兵乘之并載兵器帳幕兵士自引不給夫舳艫相接二百餘里照曜川陸􅀐兵翊兩岸而行旌旗蔽野所過州縣五百里内皆令獻食多者一州至百轝極水陸珍竒後宫厭飫將發之際多弃埋之契丹宼營州詔通事謁者韋雲起護突厥兵討之啟民可汗發􅀐二萬受其處分雲起分爲二十營四道俱引營相去一里不得交雜聞鼔聲而行聞角聲而止自非公使勿得走馬三令五申擊鼔而發有紇干犯約斬之持首以徇於是突厥將帥入謁皆膝行股栗莫敢仰視契丹本事突厥情無猜忌雲起既入其境使突厥詐云向柳城與髙麗交易敢漏泄事實者斬契丹不爲備去其營五十里馳進襲之盡獲其男女四萬口殺其男子以女子及畜産之半賜突厥餘皆收之以歸帝大喜集百官曰雲起用突厥平契丹才兼文武朕今自舉之擢爲治書侍御史􅀄西突厥阿波可汗爲葉護可汗所虜國人立鞅素特勒之子是爲泥利可汗泥利卒子達漫立號處羅可汗其母向氏本中國人更嫁泥利之弟婆實特勒開皇末婆實與向氏入朝遇逹頭之亂遂留長安舍於鴻臚寺處羅多居烏孫故地撫御失道國人多叛復爲鐵勒所困鐵勒者匈奴之遺種族類最多有僕骨同羅契苾薛延陀等部其酋長皆號俟斤族姓雖殊通謂之鐵勒大抵與突厥同俗以冦抄爲生無大君長分屬東西兩突厥是嵗處羅引兵擊鐵勒諸部厚稅其物又猜忌薛延陀恐其爲變集其酋長數百人盡殺之於是鐵勒皆叛立俟利發俟斤契苾歌楞爲莫何可汗又立薛延陀俟斤字也咥爲小可汗與處羅戰屢破之莫何勇毅絶倫甚得衆心爲鄰國所憚伊吾髙昌焉􅂄皆附之二年春正月辛酉東京成進將作大匠宇文愷位開府儀同三司丁卯遣十使併省州縣二月丙戌詔吏部尚書牛弘等議定輿服儀衞制度以開府儀同三司何稠爲太府少卿使之營造送江都稠智思精巧博覽圖籍參㑹古今多所損益衮冕畫日月星辰皮弁用漆紗爲之又作黄麾三萬六千人仗及輅輦車輿皇后鹵簿百官儀服務爲華盛以稱上意課州縣送羽毛民求捕之網羅􅀍水陸禽獸有堪氅眊之用者殆無遺類烏程有髙樹踰百尺旁無附枝上有鶴巢民欲取之不可上乃伐其根鶴恐殺其子自拔氅毛投於地時人或稱以爲瑞曰天子造羽儀鳥獸自獻毛羽所役工十萬餘人用金銀錢帛鉅億計帝每出遊幸羽儀填街溢路亘二十餘里三月庚午上發江都夏四月庚戌自伊闕陳法駕備千乘萬􅀐入東京辛亥御端門大赦免天下今年租賦制五品已上文官乘車在朝弁服佩玉武官馬加珂戴幘服袴褶文物之盛近丗莫及也六月壬子以楊素爲司徒進封豫章王􅌔爲齊王秋七月庚申制百官不得計考增級必有徳行功能灼然顯著者進擢之帝頗惜名位羣臣當進職者多令兼假而已雖有闕員留而不補時牛弘爲吏部尚書不得專行其職别敕納言蘇威左翊衞大將軍宇文述左驍衞大將軍張瑾内史侍郎虞丗基御史大夫裴藴黃門侍郎裴矩參掌選事時人謂之選曹七貴雖七人同在坐然與奪之筆虞丗基獨專之受納賄賂多者超越等倫無者注色而已藴邃之從曾孫也元徳太子昭自長安來朝數月將還欲乞少留帝不許拜請無數體素肥因致勞疾甲戌薨帝哭之數聲而止尋奏聲􅇊無異平日􅊨楚景武公楊素雖有大功特爲帝所猜忌外示殊禮内情甚薄太史言隋分野有大喪乃徙素爲楚公意言楚與隋同分欲以厭之素寢疾帝每令名醫診候賜以上藥然密問醫者􅁪恐不死素亦自知名位已極不肯餌藥亦不將慎謂弟約曰我豈湏更活邪乙亥素薨贈太尉公弘農等十郡太守葬送甚盛八月辛卯封皇孫倓爲燕王侗爲越王侑爲代王皆昭之子也九月乙丑立秦孝王子浩爲秦王帝以髙祖末年法令峻刻冬十月詔改修律令置洛口倉於鞏東南原上築倉城周回二十餘里穿三千窖窖容八千石以還置監官并鎮兵千人十二月置回洛倉於洛陽北七里倉城周回十里穿三百窖初齊温公之丗有魚龍山車等戲謂之散樂周宣帝時鄭譯奏徵之高祖受禪命牛􅀪定樂非正聲清商及九部四舞之色悉放遣之帝以啓民可汗將入朝欲以富樂誇之太常少卿裴藴希旨奏括天下周齊梁陳樂家子弟皆爲樂户其六品以下至庶人有善音樂者皆直太常帝從之於是四方散樂大集東京閲之於芳華苑積翠池側有舍利獸先來跳躍激水滿衢黿鼉􅀛鼈水人蟲魚徧覆于地又有鯨魚噴霧翳日倐忽化成黃龍長七八丈又二人戴竿上有舞者歘然騰過左右易處又有神鼇負山幻人吐火千變萬化伎人皆衣錦繡繒綵舞者鳴環佩綴花毦課京兆河南製其衣兩京錦綵爲之空竭帝多製豔篇令樂正白明逹造新聲播之音極哀怨帝甚恱謂明逹曰齊氏偏隅樂工曹妙達猶封王我今天下大同方且貴汝宜自修謹三年春正月朔旦大陳文物時突厥啓民可汗入朝見而慕之請襲冠帶帝不許明日又帥其屬上表固請帝大恱謂牛􅀪等曰今衣冠大備致單于解辮卿等功也各賜帛甚厚三月辛亥帝還長安癸丑帝使羽􅀐尉朱寛入海求訪異俗至流求國而還初雲定興閻毗坐媚事太子勇與妻子皆没官爲奴婢上即位多所營造聞其有巧思召之使典其事以毗爲朝請郎時宇文述用事定興以明珠絡帳賂述并以竒服新聲求媚於述述大喜兄事之上將有事四夷大造兵器述薦定興可使監造上從之述謂定興曰兄所作器仗並合上心而不得官者爲長寧兄弟猶未死耳定興曰此無用物何不勸上殺之述因奏房陵諸子年並成立今欲興兵征討􅀂使之從駕則守掌爲難􅀂留於一處又恐不可進退無用請早處分帝然之乃鴆殺長寧王儼分徙其七弟於嶺表仍遣間使於路盡殺之襄城王恪之妃柳氏自殺以從恪夏四月庚辰下詔欲安輯河北廵省趙魏牛􅀪等造新律成凡十八篇謂之大業律甲申始頒行之民久厭嚴刻喜於寛政其後征役繁興民不堪命有司臨時迫脅以求濟事不復用律令矣旅􅀐尉劉炫預修律令弘嘗從容問炫曰周禮士多而府史少今令史百倍於前減則不濟其故何也炫曰古人委任責成嵗終考其殿最案不重校文不繁悉府史之任掌要目而已今之文簿􅁪慮覆治􅀂鍜鍊不密則萬里追證百年舊案故諺云老吏抱案死事繁政弊職此之由也弘曰魏齊之時令史從容而已今則不遑寧處何故炫曰往者州唯置綱紀郡置守丞縣置令而已其餘具僚則長官自辟受詔赴任每州不過數十今則不然大小之官悉由吏部纎介之迹皆屬考功省官不如省事官事不省而望從容其可得乎弘善其言而不能用壬辰改州爲郡改度量權衡並依古式改上柱國以下官爲大夫置殿内省與尚書門下内史秘書爲五省增謁者司􅀠臺與御史爲三臺分太府寺置少府監與長秋國子將作都水爲五監又增改左右翊衞等爲十六府廢伯子男爵唯留王公侯三等丙寅車駕北廵己亥頓赤岸澤五月丁酉突厥啓民可汗遣其子拓特勒來朝戊午發河北十餘郡丁男鑿太行山逹于并州以通馳道丙寅啓民遣其兄子毗黎伽特勒來朝辛未啓民遣使請自入塞奉迎輿駕上不許􅀄高祖受禪唯立四親廟同殿異室而已帝即位命有司議七廟之制禮部侍郎攝太常少卿許善心等奏請爲太祖高祖各立一殿準周文武二祧與始祖而三餘並分室而祭從迭毁之法至是有司請如前議於東京建宗廟帝謂祕書監柳􅈯曰今始祖及二祧已具後丗子孫處朕何所六月丁亥詔爲高祖建别廟仍修月祭禮既而方事廵幸竟不果立帝過鴈門鴈門太守丘和獻食甚精至馬邑馬邑太守楊廓獨無所獻帝不恱以和爲博陵太守仍使廓至慱陵觀和爲式由是所至獻食競為豐侈戊子車駕頓榆林郡帝欲出塞耀兵徑突厥中指于涿郡恐啟民驚懼先遣武衞將軍長孫晟諭旨啟民奉詔因召所部諸國奚霫室韋等酋長數十人咸集晟見牙帳中草穢欲令啟民親除之示諸部落以明威重乃指帳前草曰此根大香啟民遽嗅之曰殊不香也晟曰天子行幸所在諸侯躬自灑掃耕除御路以表至敬之心今牙内蕪穢謂是留香草耳啟民乃悟曰奴之罪也奴之骨肉皆天子所賜得効筋力豈敢有辭特以邊人不知法耳頼將軍教之此將軍之惠奴之幸也遂拔所佩刀自芟庭草其貴人及諸部爭效之於是發榆林北境至其牙東達於薊長三千里廣百步舉國就役開為御道帝聞晟策益嘉之丁酉啟民及義成公主來朝行宫己亥吐谷渾高昌並遣使入貢甲辰上御北樓觀漁於河以宴百僚定襄太守周法尚朝于行宫太府卿元壽言於帝曰漢武出關旌旗千里今御營之外請分爲二十四軍日别遣一軍發相去三十里旗幟相望鉦鼔相聞首尾相屬千里不絶此亦出師之盛者也法尚曰不然兵亘千里動間山川猝有不虞四分五裂腹心有事首尾未知道路阻長難以相救雖有故事乃取敗之道也帝不懌曰卿意如何法尚曰結爲方陳四面外拒六宫及百官家屬並在其内􅀂有變起所當之靣即令抗拒内引竒兵出外奮擊車爲壁壘重設鈎陳此與據城理亦何異􅀂戰而捷抽騎追奔萬一不捷屯營自守臣謂此萬全之策也帝曰善因拜法尚左武衞將軍啟民可汗復上表以爲先帝可汗憐臣賜臣安義公主種種無乏臣兄弟嫉妬共欲殺臣臣當是時走無所適仰視唯天俯視唯地奉身委命依歸先帝先帝憐臣且死養而生之以臣爲大可汗還撫突厥之民至尊今御天下還如先帝養生臣及突厥之民種種無乏臣荷戴聖恩言不能盡臣今非昔日突厥可汗乃是至尊臣民願帥部落變改衣服一如華夏帝以爲不可秋七月辛亥陽啟民璽書諭以磧北未靜猶須征戰但存心恭順何必變服帝欲誇示突厥令宇文愷爲大帳其下可坐數千人甲寅帝於城東御大帳備儀衞宴啟民及其部落作散樂諸胡駭恱爭獻牛羊駝馬數千萬頭帝賜啟民帛二千萬段其下各有差又賜啟民路車乘馬鼔吹幡旗賛拜不名位在諸侯王上又詔發丁男百餘萬築長城西距榆林東至紫河尚書左僕射蘇威諌帝不聽築之二旬而畢帝之徴散樂也太常卿高熲諫不聽熲退謂太常丞李懿曰周天元以好樂而亡殷鑒不逺安可復爾熲又以帝遇啟民過厚謂太府卿何稠曰此虜頗知中國虚實山川險易恐爲後患又謂觀王雄曰近來朝廷殊無綱紀禮部尚書宇文㢸私謂熲曰天元之侈以今方之不亦甚乎又言長城之役幸非急務光祿大夫賀􅀂弼亦私議宴可汗太侈並爲人所奏帝以爲誹謗朝政丙子高熲宇文㢸賀􅀂弼皆坐誅熲諸子徙邊弼妻子没官為奴婢事連蘇威亦坐免官熲有文武大略明逹丗務自蒙寄任竭誠盡節進引貞良以天下爲己任蘇威楊素賀􅀂弼韓擒虎皆熲所推薦自餘立功立事者不可勝數當朝執政將二十年朝野推服物無異議海内冨庶熲之力也及死天下莫不傷之先是蕭琮以皇后故甚見親重爲内史令改封梁公宗族緦麻以上皆隨才擢用諸蕭昆弟布列朝廷悰性澹雅不以職務爲意身雖羇旅見北間豪貴無所降下與賀􅀂弼善弼既誅又有童謡曰蕭蕭亦復起帝由是忌之遂廢於家未幾而卒八月壬午車駕發榆林歴雲中泝金河時天下承平百物豐實甲士五十餘萬馬十萬匹旌旗輜重千里不絶令宇文愷等造觀風行殿上容侍衛者數百人離合爲之下施輪軸倐忽推移又作行城周二千步以板為榦衣之以布飾以丹青樓櫓悉備胡人驚以爲神每望御營十里之外屈膝稽顙無敢乘馬啟民奉廬帳以俟車駕乙酉帝幸其帳啟民奉觴上壽跪伏恭甚王侯以下􅃝割於帳前莫敢仰視帝大恱賦詩曰呼韓頓顙至屠耆接踵來何如漢天子空上單于臺皇后亦幸義成公主帳帝賜啟民及公主金甕各一并衣服被褥錦綵特勒以下受賜各有差帝還啟民從入塞己丑遣歸國癸巳入樓煩關壬寅至太原詔營晉陽宫帝謂御史大夫張衡曰朕欲過公宅可爲朕作主人衡乃先馳至河内具牛酒帝上太行開直道九十里九月己未至濟源幸衡宅帝恱其山泉留宴三日賜賚甚厚衡復獻食帝令頒賜公卿下至衞士無不霑洽己巳至東都壬申以齊王暕爲河南尹癸酉以民部尚書楊文思爲納言冬十月敕河北諸郡送一藝户陪東都三千餘家置十二坊於洛水南以處之西域諸胡多至張掖交市帝使吏部侍郎裴矩掌之矩知帝好逺略諸商胡至者矩誘訪諸國山川風俗王及庶人儀形服飾撰西域圖記三卷合四十四國入朝奏之仍别造地圖窮其要害從西傾以去縱橫所亘將二萬里發自敦煌至于西海凡爲三道北道從伊吾中道從高昌南道從鄯善揔湊敦煌且云以國家威德將士驍雄汎濛汜而越崑崙易如反掌但突厥吐渾分領羌胡之國爲其壅遏故朝貢不通今並因商人宻送誠􅅃引領翹首願爲臣妾若服而撫之務存安輯皇華遣使弗動兵車諸蕃旣從渾厥可滅混一戎夏其在兹乎帝大恱賜物五百段日引矩至御坐親問西域事矩盛言胡中多諸珍寶吐谷渾易可并吞帝於是慨然慕秦皇漢武之功甘心將通西域四夷經略咸以委之以矩爲黃門侍郎復使至張掖引致諸胡啗之以利勸令入朝自是西域諸胡往來相繼所經郡縣疲於送迎糜費以萬萬計卒令中國疲弊以至於亡皆矩之唱導也鐵勒冦邊帝遣將軍馮孝慈出敦煌擊之不利鐵勒尋遣使謝罪請降帝使裴矩慰撫之資治通鑑卷第一百八十
