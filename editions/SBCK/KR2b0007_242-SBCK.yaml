body:
  text: 臣司馬光奉勑編集唐紀五十八黓攝提格凡一年有竒起重光赤奮若七月盡玄穆宗睿聖文惠孝皇帝中長慶元年秋七月甲辰韋雍出逢小將策馬衝其前導雍命曳下欲於街中杖之河朔軍士不貫受杖不服雍以白弘靖弘靖命軍虞候繫治之是夕士卒連營呼譟作亂將校不能制遂入府舍掠弘靖貨財婦女囚弘靖於薊門館殺幕僚韋雍張宗元崔仲卿鄭塤都虞候劉操押牙張抱元明日軍士稍稍自悔悉詣館謝弘靖請改心事之凡三請􅀪靖不應軍士乃相謂曰相公無言是不赦吾曹軍中豈可一日無帥乃相與迎舊將朱洄奉以爲留後洄克融之父也時以疾廢卧家自辭老病請使克融爲之衆從之衆以判官張徹長者不殺徹罵曰汝何敢反行且族滅衆共殺之壬子羣臣上尊號曰文武孝徳皇帝赦天下甲寅幽州監軍奏軍亂丁巳貶張弘靖爲賔客分司己未再貶吉州刺史庚申以昭義節度使劉悟爲盧龍節度使悟以朱克融方彊奏請且授克融節􅃏徐圖之乃復以悟爲昭義節度使辛酉太和公主􅀤徳長安初田爲正受詔鎭成徳自以久與鎭人戰有父兄之仇乃以魏兵二千從赴鎭因留以自衛奏請度支供其糧賜户部侍郎判度支崔倰性剛褊無逺慮以爲魏鎭各自有兵恐開事例不肯給弘王四上表不報不得已遣魏兵歸倰沔之孫也弘正厚於骨肉兄弟子姪在兩都者數十人競爲侈靡日費約二十萬􅀪正輦魏鎭之貨以供之相屬於道河北將士頗不平詔以錢百萬緡賜成徳軍度支輦運不時至軍士益不悦都知兵馬使王庭湊本回鶻阿布思之種也性果悍隂狡潜謀作亂每抉其細故以激怒之尚以魏兵故不敢發及魏兵去壬戌夜庭湊結牙兵譟於府署殺􅀪正及僚佐元從將吏并家屬三百餘人廷湊自稱留後逼監軍宋惟澄奏求節鉞八月癸巳惟澄以聞朝廷震駭崔倰於崔植爲再從兄故時人莫敢言其罪初朝廷易置魏鎭帥臣左金吾將軍楊元卿上言以爲非便又詣宰相深陳利害及鎭州亂上賜元卿白玉帶辛未以元卿爲涇原節度使瀛莫將士家屬多在幽州壬申莫州都虞候張良佐潜引朱克融兵入城刺史吳暉不知所在癸酉王庭湊遣人殺冀州刺史王進岌分兵據其州魏博節度使李愬聞田弘正遇害素服令將士曰魏人所以得通聖化至今安寧富樂者田公之力也今鎭人不道輒敢害之是輕魏以爲無人也諸君受田公恩宜如何報之衆皆慟哭深州刺史牛元翼成徳良將也愬使以寳劒玉帶遺之曰昔吾先人以此劒立大勲吾又以之平蔡州今以授公努力翦庭湊元翼以劒帶徇于軍報曰願盡死愬將出兵㑹疾作不果元翼趙州人也乙亥起復前涇原節度使田布爲魏博節度使令乗驛之鎭布固辭不獲與妻子賔客訣曰吾不還矣悉屏去旌節導從而行未至魏州三十里被髮徒跣號哭而入居于堊室月俸千緡一無所取賣舊産得錢十餘萬緡皆以頒士卒舊將老者兄事之丙子瀛州軍亂執觀察使盧士玫及監軍僚佐送幽州囚於客館王庭湊遣其將王立攻深州不克丁丑詔魏博横海昭義河東義武諸軍各出兵臨成徳之境若王庭湊執迷不復宜即進討成徳大將王儉等五人謀殺王庭湊事泄并部兵三千人皆死己卯以深州刺史牛元翼爲深冀節度使丁亥以殿中侍御史温造爲起居舍人充鎭州四面諸軍宣慰使歴澤潞河東魏博横海深冀易定等道諭以軍期造大雅之五世孫也己丑以裴度爲幽鎭兩道招撫使癸巳王庭湊引幽州兵圍深州九月乙巳相州軍亂殺刺史邢濋吐蕃遣其禮部尚書論訥羅來求盟庚戌以大理卿劉元鼎爲吐蕃㑹盟使壬子朱克融焚掠易州淶水遂城滿城自定兩税法以來錢日重物日輕民所輸三倍其初詔百官議革其弊户部尚書楊於陵以爲錢者所以權百貨貿遷有無所宜流散不應蓄聚今税百姓錢藏之公府又開元中天下鑄錢七十餘爐歳入百萬今纔十餘爐歳入十五萬又積於商賈之室及流入四夷又大曆以前淄青太原魏􅀶貿易雜用鈆鐵嶺南雜用金銀丹砂象齒今一用錢如此則錢焉得不重物焉得不輕今冝使天下輸税課者皆用穀帛廣鑄錢而禁滯積及出塞者則錢日滋矣朝廷從之始令兩税皆輸布絲纊獨鹽酒課用錢冬十月丙寅以鹽鐵轉運使刑部尚書王播爲中書侍郎同平章事使職如故播爲相專以承迎爲事未嘗言國家安危以裴度爲鎭州四面行營都招討使左領軍大將軍杜叔良以善事權倖得進時幽鎭兵勢方盛諸道兵未敢進上欲功速成宦官薦叔良以爲深州諸道行營節度使以牛元翼爲成徳節度使癸酉命宰相及大臣凡十七人與吐蕃論訥羅盟于城西遣劉元鼎與訥羅入吐蕃亦與其宰相以下盟乙亥以沂州刺史王智興爲武寧節度副使先是副使皆以文吏爲之上聞智興有勇略欲用之於河北故是以寵之丁丑裴度自將兵出承天軍故􅀜以討王庭湊朱克融遣兵宼蔚州戊寅王庭湊遣兵宼貝州己卯易州刺史柳公濟敗幽州兵於白石嶺殺千餘人庚辰横海軍節度使烏重㣧奏敗成徳兵於饒陽辛巳魏博節度使田布將全軍三萬人討王庭湊屯於南宫之南拔其二柵翰林學士元稹與知樞密魏弘簡深相結求爲宰相由是有寵於上毎事咨訪焉稹無怨於裴度但以度先達重望恐其復有功大用妨已進取故度所奏畫軍事多與弘簡從中沮壞之度乃上表極陳其朋比姧蠧之狀以爲逆豎構亂震驚山東姦臣作朋撓敗國政陛下欲掃蕩幽鎭先宜肅清朝廷何者爲患有大小議事有先後河朔逆賊秖亂山東禁闈姦臣必亂天下是則河朔患小禁闈患大小者臣與諸將必能翦減大者非陛下覺寤制斷無以驅除今文武百寮中外萬品有心者無不憤忿有口者無不咨嗟直以奬用方深不敢抵觸恐事未行而禍已及不爲國計且爲身謀臣自兵興以來所陳章䟽事皆要切所奉書詔多有參差䝉陛下委付之意不輕遭姦臣抑損之事不少臣素與佞倖亦無讎嫌正以臣前請乗傳詣闕面陳軍事姦臣最所畏憚恐臣􅀤其過惡百討止臣臣又請與諸軍齊進隨便攻討姦臣恐臣或有成功曲加阻礙逗遛日時進退皆受羈牽意見悉遭蔽塞伹欲令臣失所臣無成則天下理亂山東勝負悉不顧矣爲臣事君一至於此若朝中姦臣盡去則河朔逆賊不討自平若朝中姦臣尚存則逆賊縱平無益陛下儻未信臣言乞出臣表使百官集議彼不受責臣當伏辜表三上上雖不悦以度大臣不得巳癸未以弘簡爲弓箭庫使稹爲工部侍郎稹雖解翰林恩遇如故宿州刺史李直臣坐􅂍當死宦官受其賂爲之請御史中丞牛僧孺固請誅之曰直臣有才可惜僧孺對曰彼不才者無温衣飽食以足妻子安足慮本設法令所以擒制有才之人安禄山朱泚皆才過於人法不能制者也上從之横海節度使烏重㣧將全軍救深州諸軍倚重㣧獨當幽鎭東南重􅏷宿將知賊未可破按兵觀釁上怒丙戌以杜叔良爲横海節度使徙重㣧為山南西道節度使靈武節度使李進誠奏敗吐蕃三千騎於大石山下十一月辛酉淄青節度使薛平奏突將馬廷崟作亂伏誅時幽鎮兵攻棣州平遣大將李叔佐將兵救之刺史王稷供饋稍薄軍士怨怒宵潰推廷崟爲主行且收兵至七千餘人徑逼青州城中兵少不敵平悉􅀤府庫及家財召募得精兵二千人逆戰大破之斬廷崟其黨死者數千人横海節度使杜叔良將諸道兵與鎭人戰遇敵輒北鎭人知其無勇常先犯之十二月庚午監軍謝良通奏叔良大敗於博野失亡七千餘人叔良脱身還營䘮其旌節丁丑義武節度使陳楚奏敗朱克融兵於望都及北平斬獲萬餘人戊寅以鳳翔節度使李光顔爲忠武節度使兼深州行營節度使代杜叔良自憲宗征伐四方國用已虚上即位賞賜左右及宿衛諸軍無節及幽鎭用兵久無功府藏空竭勢不能支執政乃議王庭湊殺田弘正而朱克融全張弘靖罪有重輕請赦克融專討庭湊上從之乙酉以朱克融爲平盧節度使戊子義武奏破莫州青源等三柵斬獲千餘人二年春正月丁酉幽州兵陷弓髙先是弓髙守備甚嚴有中使夜至守將不内旦乃得入中使大詬怒賊諜知之他日僞遣人爲中使投夜至城下守將遽内之賊衆隨之遂陷弓髙又圍下博中書舍人白居易上言以爲自幽鎭逆命朝廷徵諸道兵計十七八萬四面攻圍已踰半年王師無功賊勢猶盛弓髙既陷糧道不通下博深州飢窮日急蓋由節將太衆其心不齊莫肯率先遞相顧望又朝廷賞罰近日不行未立功者或已拜官已敗衂者不聞得罪既無懲勸以至遷延若不改張必無所望請令李光顔將諸道勁兵約三四萬人從東速進開弓髙粮路合下博諸軍解深邢重圍與元翼合勢令裴度將太原全軍兼招討舊職西面壓境觀釁而動若乗虛得便即令同力翦除若戰勝賊窮亦許受降納􅅃如此則夾攻以分其力招諭以動其心必未及誅夷自生變故又請詔光顔選諸道兵精鋭者留之其餘不可用者悉遣歸本道自守土疆蓋兵多而不精豈唯虛費資粮兼恐撓敗軍陳故也今旣秪留東西二帥請各置都監一人諸道監軍一時停罷如此則衆齊令一必有成功又朝廷本用田布令報父讎今領全師出界供給度支數月已來都不進討非田布固欲如此抑有其由聞魏博一軍累經優賞兵驕將富莫肯爲用况其軍一月之費計實錢近二十八萬緡若更遷延將何供給此尤宜早令退軍者也若兩道止共留兵六萬所費無多既易支持自然豐足今事宜日急其間變故逺不可知茍兵數不抽軍費不減食既不足衆何以安不安之中何事不有况有司迫於供軍百端歛率不許即用度交闕盡許則人心無憀自古安危皆繫於此伏乞聖慮察而念之䟽奏不省己亥度支饋滄州糧車六百乗至下愽盡爲成徳兵所掠時諸軍匱乏供軍院所運衣糧往往不得至院在塗爲諸軍邀奪其懸軍深入者皆凍餒無所得初田布從其父弘正在魏善視牙將史憲誠屢稱薦至右職及爲節度使遂寄以腹心以爲先鋒兵馬使軍中精鋭悉以委之憲誠之先奚人也世爲魏將魏與幽鎭本相表裏及幽鎭叛魏人固揺心布以魏兵討鎭軍于南宫上屢遣中使督戰而將士驕惰無闘志又屬大雪度支饋運不繼布發六州租賦以供軍將士不悦曰故事軍出境皆給朝廷今尚書刮六州肌肉以奉軍雖尚書瘠已肥國六州之人何罪乎憲誠隂蓄異志因衆心不悦離間鼓扇之㑹有詔分魏博軍與李光顔使救深州庚子布軍大潰多歸憲誠布獨與中軍八千人還魏壬寅至魏州癸卯布復召諸將議出兵諸將益偃蹇曰尚書能行河朔舊事則死生以之若使復戰則不能也布無如之何歎曰功不成矣即日作遺表具其狀略曰臣觀衆意終負國恩臣既無功敢忘即死伏願陛下速救光顔元翼不然者義士忠臣皆爲河朔屠害矣奉表號哭拜授幕僚李石乃入啓父靈抽刀而言曰上以謝君父下以示三軍遂刺心而死憲誠聞布已死乃諭其衆遵河北舊事衆悦擁憲誠還魏奉爲留後戊申魏州奏布自殺己酉以憲誠爲魏博節度使憲誠雖喜得旄鉞外奉朝廷然内實與幽鎭連結庚戌以徳州刺史王日簡爲横海節度使日簡本成徳牙將也壬子貶杜叔良爲歸州刺史王庭湊圍牛元翼於深州官軍三面救之皆以乏糧不能進雖李光顔亦閉壁自守而巳軍士自采薪芻日給不過陳米一勺深州圍益急朝廷不得巳二月甲子以庭湊爲成徳節度使軍中將士官爵皆復其舊以兵部侍郎韓愈爲宣慰使上之初即位也两河略定蕭俛叚文昌以爲天下已太平漸宜消兵請密詔天下軍鎮有兵處每嵗百人之中限八人逃死上方荒宴不以國事爲意遂可其奏軍士落籍者衆皆聚山澤爲盜及朱克融王庭湊作亂一呼而亡卒皆集詔徵諸道兵討之諸道兵既少皆臨時召募烏合之衆又諸節度既有監軍其領偏師者亦置中使監陳主將不得專號令戰小勝則飛驛奏捷自以爲功不勝則迫脅主將以罪歸之悉擇軍中驍勇以自衛遣羸懦者就戰故每戰多敗又凡用兵舉動皆自禁中授以方略朝令夕改不知所從不度可否惟督令速戰中使道路如織驛馬不足掠行人馬以繼之人不敢由驛路行故雖以諸道十五萬之衆裴度元臣宿望烏重㣧李光顔皆當時名將討幽鎭萬餘之衆屯守踰年竟無成功財竭力盡崔植杜元穎王播爲相皆庸才無逺略史憲誠既逼殺田布朝廷不能討遂并朱克融王庭湊以節鉞授之由是再失河朔迄于唐亡不能復取朱克融既得旌節乃出張弘靖及盧士玫丙寅以牛元翼爲山南東道節度使以左神策行營樂壽鎮兵馬使清河傅良弼爲沂州刺史以瀛州博野鎮遏使李寰爲忻州刺史良弼寰所戍在幽鎭之間朱克融王庭湊互加誘脅良弼寰不従各以其衆堅壁賊竟不能取故賞之丙子賜横海節度使王日簡姓名爲李全略辛巳中書侍郎同平章事崔植罷爲刑部尚書以工部侍郎元稹同平章事癸未加李光顔横海節度滄景觀察使其忠武深州行營節度如故以横海節度使李全略爲徳棣節度使時朝廷以光顔懸軍深入饋運難通故割滄景以􅀠之王庭湊雖受旌節不解深州之圍丙戌以知制誥東陽馮宿爲山南東道節度副使權知留後仍遣中使入深州督牛元翼赴鎭裴度亦與幽鎭書責以大義朱克融即解圍去王庭湊雖引兵少退猶守之不去元稹怨裴度欲解其兵柄故勸上雪王庭湊而罷兵丁亥以度爲司空東都留守平章事如故諫官爭上言時未偃兵度有將相全才不宜置之散地上乃命度入朝然後赴東都以靈武節度使李聴爲河東節度使初聽爲羽林將軍有良馬上爲太子遣左右諷求之聽以職揔親軍不敢獻及河東缺帥上曰李聽不與朕馬是必可任遂用之昭義監軍劉承偕恃恩陵轢節度使劉悟數衆辱之又縦其下亂法隂與磁州刺史張汶謀􅅞悟送闕下以汶代之悟知之諷其軍士作亂殺汶圍承偕欲殺之幕僚賈直言入責悟曰公所爲如是欲効李司空邪此軍中安知無如公者使李司空有知得無笑公於地下乎悟遂謝直言救免承偕囚之府舍初上在東宫聞天下厭苦憲宗用兵故即位務優假將卒以求姑息三月壬辰朔詔神策六軍使及南牙常參武官具由歴功績牒送中書量加奨擢其諸道大將久次及有功者悉奏聞與除官應天下諸軍各委本道據守舊額不得輒有減省於是商賈胥吏爭賂藩鎭牒補列將而薦之即升朝藉奏章委積士大夫皆扼腕歎息武寧節度副使王智興將軍中精兵三千討幽鎮節度使崔羣忌之奏請即用智興爲節度使不則召詣闕除以它官事未報智興亦自疑㑹有詔赦王庭湊諸道皆罷兵智興引兵先期入境羣懼遣使迎勞且使軍士釋甲而入智興不從乙巳引兵直進徐人開門待之智興殺不同己者十餘人乃入府牙見羣及監軍拜伏曰軍衆之情不可如何爲羣及判官從吏具人馬及治裝皆素所辨也遣兵衞從羣至埇橋而返遂掠鹽鐵院錢帛及諸道進奉在汴中者并商旅之物皆三分取二丙午加朱克融王庭湊檢校工部尚書上聞其解深州之圍故襃之然庭湊之兵實猶在深州城下韓愈既行衆皆危之詔愈至境更觀事勢勿遽入愈曰止君之仁死臣之義遂往至鎭庭湊拔刃􅁌弓以逆之及館甲士羅於庭庭湊言曰所以紛紛者乃此曹所爲非庭湊心愈厲聲曰天子以尚書有將帥材故賜之節鉞不知尚書乃不能與健兒語邪甲士前曰先太師爲國擊走朱滔血衣猶在此軍何負朝廷乃以爲賊乎愈曰汝曹尚能記先太師則善矣夫逆順之爲禍福豈逺邪自禄山思明以來至元濟師道其子孫有今尚存仕宦者乎田令公以魏博歸朝廷子孫雖在孩提皆爲美官王承元以此軍歸朝廷弱冠爲節度使劉悟李祐今皆爲節度使汝曹亦聞之乎庭湊恐衆心動麾之使出謂愈曰侍郎來欲使庭湊何爲愈曰神策六軍之將如牛元翼者不少但朝廷顧大體不可弃之耳尚書何爲圍之不置庭湊曰即當出之因與愈宴禮而歸之未幾牛元翼將十騎突圍出深州大將臧平等舉城降庭湊責其久堅守殺平等將吏百八十餘人戊申裴度至長安見上謝討賊無功先是上詔劉悟送劉承偕詣京師悟託以軍情不時奉詔上問度宜如何處置度對曰承偕在昭義驕縦不法臣盡知之悟在行營與臣書具論其事時有中使趙弘亮在臣軍中持悟書去云欲自奏之不知嘗奏不上曰朕殊不知也且悟大臣何不自奏對曰悟武臣不知事體然今事狀藉藉如此臣等面論陛下猶不能决况悟當日單辭豈能動聖聽哉上曰前事勿論直言此時如何處置對曰陛下必欲收天下心止應下半紙詔書具陳承偕驕縱之罪令悟集將士斬之則藩鎭之臣孰不思爲陛下效死非獨悟也上俛首良久曰朕不惜承偕然太后以爲養子今兹囚縶太后尚未知之况殺之乎卿更思其次度乃與王播等奏請流承偕於逺州必得出上從之後月餘悟乃釋承偕李光顔所將兵聞當留滄景皆大呼西走光顔不能制因驚懼成疾己酉上表固辭横海節乞歸許州許之壬子以裴度爲淮南節度使餘如故加劉悟檢校司徒餘如故自是悟浸驕欲效河北三鎮招聚不逞章表多不遜裴度之討幽鎮也回鶻請以兵從朝議以爲不可遣中使止之回鶻遣其臣李義節將三千人已至豐州北却之不從詔􅀤繒帛七萬匹以賜之甲寅始還王智興遣輕兵二千襲濠州丙辰刺史矦弘度弃城奔壽州言事者皆謂裴度不宜出外上亦自重之戊午制留度輔政以中書侍郎同平章事王播同平章事代度鎭淮南仍兼諸道鹽鐵轉運使李寰帥其衆三千出博野王庭湊遣兵追之寰與戰殺三百餘人庭湊兵乃還餘衆二千猶固守博野朝廷以新罷兵力不能討徐州己未以王智興爲武寧節度使復以徳棣節度使李全略爲横海節度使夏四月辛酉朔日有食之甲戌以􅀓良弼李寰爲神策都知兵馬使户部侍郎判度支張平叔上言官自糶鹽可以獲利一倍又請令所由將鹽就村糶易又乞令宰相領鹽鐵使又請以糶鹽多少爲刺史縣令殿最又乞檢責所在實户據口團保給一年鹽使其四季輸價又行此策後富商大賈或行財賄邀截喧訴其爲首者所在杖殺連狀人皆杖脊詔百官議其可否兵部侍郎韓愈上言以爲城郭之外少有見錢糴鹽多用雜物貿易鹽商則無物不取或賖貸徐還用此取濟兩得利便今令人吏坐鋪自糶非得見錢必不敢受如此貧者無從得鹽自然坐失常課如何更有倍利又若令人吏將鹽家至户到而糶之必索百姓供應騷擾極多又刺史縣令職在分憂豈可惟以鹽利多少爲之升黜不復考其理行又貧家食鹽至少或有淡食動經旬月若據户給鹽依時徵價官吏畏罪必用威刑臣恐因此所在不安此尤不可之大者也中書舍人韋處厚議以爲宰相處論道之地雜以鹺務實非所宜竇參皇甫鎛皆以錢穀爲相名利難兼卒蹈禍敗又欲以重法禁人喧訴夫强人之所不能事必不立禁人之所必犯法必不行矣事遂寢平叔又奏徵逺年逋欠江州刺史李渤上言度支徵當州貞元二年逃户所欠錢四千餘緡當州今嵗旱災田損什九陛下奈何於大旱中徵三十六年前逋負詔悉免之邕州人不樂屬容管刺史李元宗以吏人狀授御史使奏之容管經略使嚴公素聞之遣吏按元宗擅以羅陽縣歸蠻酋黄少度五月壬寅元宗將兵百人并州印奔黄洞王庭湊之圍牛元翼也和王傅于方欲以竒策干進言於元稹請遣客王昭于友明間説賊黨使出元翼仍賂兵吏部令史偽出告身二十通令以便宜給賜稹皆然之有李賞者知其謀乃告裴度云方為稹結客刺度度隠而不􅀤賞詣左神策告其事丁巳詔左僕射韓臯等鞫之戊午幽州節度使朱克融進馬萬匹羊十萬口而表云先請其直充犒賞三司按于方刺裴度事皆無驗六月甲子度及元稹皆罷相度爲右僕射稹爲同州刺史以兵部尚書李逢吉為門下侍郎同平章事党項宼靈州渭北掠官馬諫官上言裴度無罪不當免相元稹與于方爲邪謀責之太輕上不得已壬申削稹長春宫使吐蕃宼靈武庚辰鹽州奏党項都督抜䟦萬誠請降壬午吐蕃宼鹽州戊子復置邕管經略使初張弘靖爲宣武節度使屢賞以悦軍士府庫虚竭李愿繼之性奢侈賞勞既薄於弘靖時又峻威刑軍士不悦愿以其妻弟竇瑗典宿直兵瑗驕貪軍中惡之牙將李臣則等作亂秋七月壬辰夜即帳中斬瑗頭因大呼府中響應愿與一子踰城奔鄭州亂兵殺其妻推都押牙李㝏爲留後丙申宋王結薨戊戌宣武監軍奏軍亂庚子李㝏自奏已權知留後乙巳詔三省官與宰相議汴州事皆以爲宜如河北故事授李㝏節李逢吉曰河北之事蓋非獲已今若并汴州弃之則是江淮以南皆非國家有也杜元穎張平叔争之曰柰何惜數尺之節不愛一方之死乎議未決㑹宋亳潁三州剌史各上奏請别命帥上大喜以逢吉議為然遣中使詣三州宣慰逢吉因請以將軍徵㝏入朝以義成節度使韓充鎭宣武充弘之弟素寛厚得衆心脱㝏旅拒則命徐許兩軍攻其左右而滑軍蹙其北充必得入矣上皆從之丙午貶李愿爲隨州刺史以韓充爲宣武節度兼義成節度使徵李㝏爲右金吾將軍㝏不奉詔宋州刺史髙承􅂤斬其使者㝏遣兵二千攻之陷寧陵襄邑宋州有三城賊已陷其南城承􅂤保北二城與賊十餘戰癸丑忠武節度使李光顔將兵二萬五千討李㝏屯尉氏兖海節度使曹華聞㝏作亂不俟詔即􅀤兵討之㝏遣兵三千人攻宋州適至城下丙辰華逆擊破之丁巳李光顔敗宣武兵於尉氏斬獲二千餘人八月辛酉大理卿劉元鼎自吐蕃還甲子韓充入汴境軍于千塔武寧節度使王智興與髙承簡共破宣武兵斬首千餘級餘衆遁去壬申韓充敗宣武兵於郭橋斬首千餘級進軍萬勝初李㝏既爲留後以都知兵馬使李質爲腹心及㝏除將軍不奉詔質屢諫不聽㑹㝏疽􅀤於首遣李臣則等將兵拒李光顔於尉氏既而官軍四集兵屢敗㝏疾甚悉以軍事屬李質卧於家丙子質與監軍姚文壽擒㝏殺之詐爲㝏牒追臣則等至皆斬之執㝏四子送京師韓充未至質權知軍務時牙兵三千人日給酒食物力不能支質曰若韓公始至而罷之則人情大去矣不可留此弊以遺吾帥即命罷給而後迎充丁丑充入汴癸未以韓充專爲宣武節度使以曹華爲義成節度使髙承簡爲兖海沂密節度使加李光顔兼侍中以李質爲右金吾將軍韓充既視事人心粗定乃密籍軍中爲惡者千餘人一朝并父母妻子悉逐之曰敢少留境内者斬於是軍政大治九月戊子朔浙西觀察使京兆竇易直奏大將王國清作亂伏誅初易直聞汴州亂而懼欲散金帛以賞軍士或曰賞之無名恐益生疑乃止而外已有知之者故國清作亂易直討擒之并殺其黨二百餘人徳州刺史王稷承父鍔餘貲家富厚横海節度使李景略利其財丙申密敎軍士殺稷屠其家納其女爲妾以軍亂聞朝廷之討李㝏也遣司門郎中韋文恪宣慰魏􅀶史憲誠表請授㝏旌節又於黎陽築馬頭爲度河之勢見文恪辭禮倨慢及聞㝏死辭禮頓恭曰憲誠胡人譬如狗雖被捶擊終不離主耳冬十一月庚午皇太后幸華清宫辛未上自複道幸華清宫遂畋于驪山即日還宫太后數日乃返丙子集王緗薨庚辰上與宦者擊毬於禁中有宦者墜馬上驚因得風疾不能履地自是人不聞上起居宰相屢乞入見不報裴度三上䟽請立太子旦請入見十二月辛卯上見羣臣於紫宸殿御大繩牀悉去左右衛官獨宦者十餘人侍側人情稍安李逢吉進言景王已長請立爲太子裴度請速下詔副天下望上無言既而兩省官亦繼有請立太子者癸巳詔立景王湛爲皇太子上疾浸瘳是嵗初行宣明曆資治通鑑卷第二百四十二
