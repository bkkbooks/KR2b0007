body:
  text: 姚襄所部多勸襄北還襄從之五月襄攻冠軍將軍髙季於外黄㑹季卒襄進據許昌六月丙子秦主健寢疾庚辰平昌王菁勒兵入東宫將殺太子生而自立時生侍疾西宫菁以為健巳卒攻東掖門健聞變登端門陳兵自衛衆見健惶懼皆捨仗逃散健執菁數而殺之餘無所問壬午以大司馬武都王安都督中外諸軍事甲申健引太師魚遵丞相雷弱兒太傅毛貴司空王墮尚書令梁楞左㒒射梁安右僕射叚純吏部尚書辛牢等受遺詔輔政健謂太子生曰六夷酋帥及大臣執權者若不從汝命宜漸除之臣光曰顧命大臣所以輔導嗣子為之羽翼也為之羽翼而教使翦之能無斃乎知其不忠則勿任而已矣任以大柄又從而猜之鮮有不召亂者也乙酉健卒謚曰景明皇帝廟號髙祖丙戌太子生即位大赦改元夀光羣臣奏曰未踰年而改元非禮也生怒窮推議主得右僕射叚純殺之秋七月以吏部尚書周閔爲左僕射或告㑹稽王昱曰武陵王第中大脩器仗將謀非常昱以告太常王彪之彪之曰武陵王之志盡於馳騁畋獵而已耳深願靜之以安異同之論勿復以爲言昱善之秦主生尊母彊氏曰皇太后立妃梁氏爲皇后梁氏安之女也以其嬖臣太子門大夫南安趙韶爲右僕射太子舎人趙誨爲中䕶軍著作郎董榮爲尚書涼王祚􅁋虐無道上下怨憤祚惡河州刺史張瓘之彊遣張掖太守索孚代瓘守枹罕使瓘討叛胡又遣其將易揣張玲帥歩騎萬三千以襲瓘張掖人王鸞知術數言於祚曰此軍出必不還涼國將危并陳祚三不道祚大怒以鸞為祅言斬以徇鸞臨刑曰我死軍敗於外王死於内必矣祚族㓕之瓘聞之斬孚起兵擊祚傳檄州郡廢祚以矦還第復立涼寧矦曜靈易揣張玲軍始濟河瓘擊破之揣等單騎奔還瓘軍躡之姑臧振恐驍騎將軍敦煌宋混兄脩與祚有隙懼禍八月混與弟澄西走合衆萬餘人以應瓘還向姑臧祚遣楊秋胡將曜靈於東苑拉其􅆎而殺之埋於沙阬謚曰哀公秦主生封衛大將軍黄眉為廣平王前將軍飛為新興王皆素所善也徴大司馬武都王安領太尉以晉王栁為征東大將軍并州牧鎮蒲坂魏王廋為鎮東大將軍豫州牧鎮陜城中書監胡文中書令王魚言於生曰比有星孛于大角熒惑入東井大角帝坐東井秦分於占不出三年國有大喪大臣戮死願陛下脩德以禳之生曰皇后與朕對臨天下可以應大喪矣毛太傅梁車騎梁僕射受遺輔政可以應大臣矣九月生殺梁后及毛貴梁楞梁安貴后之舅也右僕射趙韶中護軍趙誨皆洛州刺史俱之從弟也有寵於生乃以俱為尚書令俱固辭以疾謂韶誨曰汝等不復顧祖宗欲為㓕門之事毛梁何罪而誅之吾何功而代之汝等可自為吾其死矣遂以憂卒涼宋混軍于武始大澤為曜靈發哀閏月混軍至姑臧涼王祚收張瓘弟琚及子嵩將殺之琚嵩聞之募市人數百揚言張祚無道我兄大軍巳至城東敢舉手者誅三族遂􅄏西門納混兵領軍將軍趙長等懼罪入閤呼張重華母馬氏出殿立凉武矦玄靚為主易揣等引兵入殿収長等殺之祚案劔殿上大呼叱左右力戰祚素失衆心莫肯為之鬭者遂為兵人所殺混等梟其首宣示内外􅁀尸道左城内咸稱萬歲以庻人禮葬之并殺其二子混琚上玄靚為大將軍凉州牧西平公赦境内復稱建興四十三年時玄靚始七歲張瓘至姑臧推玄靚為凉王自為使持節都督中外諸軍事尚書令凉州牧張掖郡公以宋混爲尚書僕射隴西人李儼據郡不受瓘命用江東年號衆多歸之瓘遣其將牛霸討之未至西平人衛綝亦據郡叛霸兵潰奔還瓘遣弟琚擊綝敗之酒泉太守馬基起兵以應綝瓘遣司馬張姚王國擊斬之冬十月以豫州刺史謝尚督并冀幽三州鎭壽春鎭北將軍叚龕與燕主雋書抗中表之儀非其稱帝雋怒十一月以太原王恪爲大都督撫軍將軍陽騖副之以擊龕秦以辛牢守尚書令趙韶爲左僕射尚書董榮爲右僕射中䕶軍趙誨爲司􅀠校尉十二月髙句麗王釗遣使詣燕納質修貢以請其母燕主雋許之遣殿中將軍刁龕送釗母周氏歸其國以釗為征東大將軍營州刺史封樂浪公王如故上黨人馮鴦逐燕太守叚剛據安民城自稱太守遣使來降秦丞相雷弱兒性剛直以趙韶董榮亂政每公言於朝見之常切齒韶榮譛之於秦主生生殺弱兒及其九子二十七孫於是諸羌皆有離心生雖在諒隂遊飲自若彎弓露刃以見朝臣錘鉗鋸鑿可以害人之具備置左右即位未㡬后妃公卿巳下至于僕􅀠凡殺五百餘人截脛拉脅鋸項刳胎者比比有之燕主雋以叚龕方彊謂太原王恪曰若龕遣軍拒河不得渡者可直取吕䕶而還恪分遣輕軍先至河上具舟楫以觀龕志趣龕弟羆驍勇有智謀言於龕曰慕容恪善用兵加之衆盛若聽其濟河進至城下恐雖乞降不可得也請兄固守羆帥精銳拒之於河幸而戰捷兄帥大衆繼之必有大功若其不㨗不若早降猶不失為千戸矦也龕不從羆固請不巳龕怒殺之十二年春正月燕太原王恪引兵濟河未至廣固百餘里叚龕帥衆三萬逆戰丙申恪大破龕於淄水執其弟欽斬右長史袁範等齊王友辟閭蔚被創恪聞其賢遣人求之蔚巳死士卒降者數千人龕脫走還城固守恪進軍圍之秦司空王墮性剛峻右僕射董榮侍中强國皆以佞幸進墮疾之如讎每朝見榮未甞與之言或謂墮曰董君貴幸無比公宜小降意接之墮曰董龍是何雞狗而令國士與之言乎㑹有天變榮與强國言於秦主生曰今天譴甚重宜以貴臣應之生曰貴臣唯有大司馬及司空耳榮國曰大司馬國之懿親不可殺也乃殺王墮將刑榮謂之曰今日復敢比董龍於雞狗乎墮瞋目叱之洛州刺史杜郁墮之甥也左僕射趙韶惡之譛於生以為貳於晉而殺之壬戌生宴羣臣於太極殿以尚書令辛牢為酒監酒酣生怒曰何不彊人酒而猶有坐者引弓射牢殺之羣臣懼莫敢不醉偃仆失冠生乃恱匈奴大人劉務桓卒弟閼頭立將貳於代二月代王什翼犍引兵西巡臨河閼頭懼請降燕太原王恪招撫叚龕諸城己丑龕所署徐州刺史陽都公王騰舉衆降恪命騰以故職還屯陽都秦征東大將軍晉王柳遣參軍閻負梁殊使於涼以書說凉王􅀇靚負殊至姑臧張瓘見之曰我晉臣也臣無境外之交二君何以來辱負殊曰晉王與君鄰藩雖山河阻絶風通道㑹故來修好君何怪焉瓘曰吾盡忠事晉於今六世矣若與苻征東通使是上違先君之志下隳士民之節其可乎負殊曰晉室衰㣲墜失天命固巳乆矣是以涼之先王北面二趙唯知機也今大秦威德方盛涼王若欲自帝河右則非秦之敵欲以小事大則曷若捨晉事秦長保福禄乎瓘曰中州好食言嚮者石氏使車適返而戎騎巳至吾不敢信也負殊曰自古帝王居中州者政化各殊趙為姦詐秦敦信義豈得一槩待之乎張先楊初皆阻兵不服先帝討而擒之赦其罪戾寵以爵秩固非石氏之比也瓘曰必如君言秦之威德無敵何不先取江南則天下盡為秦有征東何辱命焉負殊曰江南文身之俗道汚先叛化隆後服主上以為江南必須兵服河右可以義懐故遣行人先申大好若君不達天命則江南得延數年之命而河右恐非君之土也瓘曰我跨據三州帶甲十萬西苞葱嶺東距大河伐人有餘況於自守何畏於秦負殊曰貴州山河之固孰若崤函民物之饒孰若秦雍杜洪張琚因趙氏成資兵彊財富有囊括關中席卷四海之志先帝戎旗西指冰消雲散旬月之間不覺易主主上若以貴州不服赫然奮怒控弦百萬皷行而西未知貴州將何以待之瓘笑曰兹事當決之於王非身所了負殊曰凉王雖英睿夙成然年在幼沖君居伊霍之任國家安危繫君一舉耳瓘懼乃以􅀇靚之命遣使稱藩於秦秦因玄靚所稱官爵而授之將軍劉度攻秦青州刺史王朗于盧氏燕將軍慕輿長卿入軹闗攻秦幽州刺史彊哲于裴氏堡秦主生遣前將軍新興王飛拒度建節將軍鄧羌拒長卿飛未至而度退羌與長卿戰大破之獲長卿及甲首二千餘級桓温請移都洛陽修復園陵章十餘上不許拜温征討大都督督司冀二州諸軍事以討姚襄三月秦主生發三輔民治渭橋金紫光禄大夫程肱諫以為妨農生殺之夏四月長安大風發屋拔木秦宫中驚擾或稱賊至宫門晝閉五日乃止秦主生推告賊者刳出其心左光禄大夫强平諫曰天降災異陛下當愛民事神緩刑崇德以應之乃可弭也生怒鑿其頂而殺之衛將軍廣平王黄眉前將軍新興王飛建節將軍鄧羌以平太后之弟叩頭固諫生弗聽出黄眉為左馮翊飛為右扶風羌行咸陽太守猶惜其驍勇故皆弗殺五月太后強氏以憂恨卒謚曰明德姚襄自許昌攻周成于洛陽六月秦主生下詔曰朕受皇天之命君臨萬􅀖嗣統巳来有何不善而謗讟之音扇蒲天下殺不過千而謂之殘虐行者比肩未足爲希方當峻刑極罰復如朕何自去春以來潼關之西至于長安虎狼爲􅁀晝則繼道夜則發屋不食六畜專務食人凡殺七百餘人民廢耕桑相聚邑居而爲害不息秋七月秦群臣奏請禳災生曰野獸飢則食人飽當自止何禳之有且天豈不愛民哉正以犯罪者多故助朕殺之耳丙子燕獻懐太子曄卒姚襄攻洛陽踰月不克長史王亮諫曰明公英名蓋世兵彊民附今頓兵堅城之下力屈威挫或爲它寇所乗此危亡之道也襄不從桓温自江陵北伐遣督䕶髙武據魯陽輔國將軍戴施屯河上自帥大兵繼進與寮屬登平乗樓望中原歎曰遂使神州陸沉百年丘墟王夷甫諸人不得不任其責記室陳郡袁宏曰運有興廢豈必諸人之過温作色曰昔劉景升有千斤大牛噉芻豆十倍於常牛負重致逺曽不若一羸㹀魏武入荆州殺以享軍八月己亥温至伊水姚襄撤圍拒之匿精銳於水北林中遣使謂温曰承親帥王師以來襄今奉身歸命願敕三軍小却當拜伏路左温曰我自開復中原展敬山陵無豫君事欲來者便前相見在近何煩使人襄拒水而戰温結陳而前親被甲督戰襄衆大敗死者數千人襄帥麾下數千騎奔于洛陽北山其夜民棄妻子隨襄者五千餘人襄勇而愛人雖戰屢敗民知襄所在輙扶老􅂝幼奔馳而赴之温軍中傳言襄病創巳死許洛士女為温所得者無不北望而泣襄西走温追之不及弘農楊亮自襄所来奔温問襄之為人亮曰襄神明器宇孫策之儔而雄武過之周成帥衆出降温屯故太極殿前旣而徙屯金墉城己丑謁諸陵有毀壊者修復之各置陵令表鎭西將軍謝尚都督司州諸軍事鎭洛陽以尚未至留潁川太守毛穆之督䕶陳午河南太守戴施以二千人戍洛陽衛山陵徙降民三千餘家於江漢之間執周成以歸姚襄奔平陽秦并州刺史尹赤復以衆降襄襄遂據襄陵秦大將軍張平擊之襄為平所敗乃與平約為兄弟各罷兵叚龕遣其屬叚蕰來求救詔徐州刺史荀羡將兵隨蕰救之羡至琅邪憚燕兵之彊不敢進王騰寇鄄城羡進攻陽都㑹霖雨城壊獲騰斬之冬十月癸巳朔日有食之秦主生夜食棗多旦而有疾召太醫令程延使診之延曰陛下無它疾食棗多耳生怒曰汝非聖人安知吾食棗遂斬之燕大司馬恪圍叚龕於廣固諸將請急攻之恪曰用兵之勢有宜緩者有宜急者不可不察若彼我勢敵外有彊援恐有腹背之患則攻之不可不急若我彊彼弱無援於外力足制之者當羈縻守之以待其斃兵法十圍五攻正謂此也龕兵尚衆未有離心濟南之戰非不銳也但龕用之無術以取敗耳今慿阻堅城上下戮力我盡銳攻之計數旬可拔然殺吾士卒必多矣自有事中原兵不蹔息吾每念之夜而忘寐柰何輕用其死乎要在取之不必求功之速也諸將皆曰非所及也軍中聞之人人感恱於是為髙牆深塹以守之齊民争運糧以饋燕軍龕嬰城自守樵采路絶城中人相食龕悉衆出戰恪破之於圍裏先分騎屯諸門龕身自衝盪僅而得入餘兵皆沒於是城中氣沮莫有固志十一月丙子龕面􅅞出降并執朱秃送薊恪撫安新民悉定齊地徙鮮卑胡羯三千餘戸于薊燕主雋具朱禿五刑以叚龕為伏順將軍恪留慕容塵鎮廣固以尚書左丞鞠殷為東萊太守章武太守鮮于亮為齊郡太守乃還殷彭之子也彭時為燕大長秋以書戒殷曰王彌曹嶷必有子孫汝善招撫勿尋舊怨以長亂源殷推求得彌從子立嶷孫巖於山中請與相見深結意分彭復遣使遺以車馬衣服郡民由是大和荀羡聞叚龕巳敗退還下邳留將軍諸葛攸髙平太守劉莊將三千人守琅邪參軍譙國戴􅋟等將二千人守㤗山燕將慕容蘭屯汴城羡擊斬之詔遣兼司空散騎常侍車灌等持節如洛陽修五陵十二月庚戌帝及羣臣皆服緦臨於太極殿三日司州都督謝尚以疾不行以丹楊尹王胡之代之未行而卒胡之廙之子也是歲仇池公楊國從父俊殺國自立以俊為仇池公國子安奔秦升平元年春正月壬戌朔帝加元服太后詔歸政大赦改元太后徙居崇德宫燕主雋徴幽州刺史乙逸為左光禄大夫逸夫婦共載鹿車子璋從數十騎服飾甚麗奉迎於道逸大怒閉車不與言到城深責之璋猶不悛逸常憂其敗而璋更被擢任歷中書令御史中丞逸乃歎曰吾少自修立克已守道僅能免罪璋不治節檢專為奢縦而更居清顯此豈唯璋之忝幸實時世之陵夷也二月癸丑燕主雋立其子中山王暐為太子大赦改元光夀太白入東井秦有司奏太白罰星東井秦分必有􅁀兵起京師秦主生曰太白入井自為渴耳何所怪乎姚襄將圖關中夏四月自北屈進屯杏城遣輔國將軍姚蘭略地敷城曜武將軍姚益生左將軍王欽盧各將兵招納諸羌胡蘭襄之從兄益生襄之兄也羌胡及秦民歸之者五萬餘戸秦將苻飛龍擊蘭擒之襄引兵進據黄落秦主生遣衛大將軍廣平王黄眉平北將軍苻道龍驤將軍東海王堅建節將軍鄧羌將歩騎萬五千以禦之襄堅壁不戰羌謂黄眉曰襄為桓温張平所敗銳氣喪矣然其為人彊狠若鼓譟揚旗直壓其壘彼必忿恚而出可一戰擒也五月羌帥騎三千壓其壘門而陳襄怒悉衆出戰羌陽不勝而走襄追之至于三原羌廻騎擊之黄眉等以大衆繼至襄兵大敗襄所乗駿馬曰䵩眉騧馬倒秦兵擒而斬之弟萇帥其衆降襄載其父弋仲之柩在軍中秦主生以王禮葬弋仲於孤磐亦以公禮葬襄廣平王黄眉等還長安生不之賞數衆辱黄眉黄眉怒謀弑生發覺伏誅事連王公親戚死者甚衆戊寅燕主雋遣撫軍將軍垂中軍將軍䖍䕶軍將軍平熈帥歩騎八萬攻敕勒於塞北大破之俘斬十餘萬獲馬十三萬匹牛羊億萬頭匈奴單于賀賴頭帥部落三萬五千口降燕燕人處之代郡平舒城秦主生夢大魚食蒲又長安謡曰東海大魚化為龍男皆為王女為公生乃誅太師録尚書事廣寗公魚遵并其七子十孫金紫光禄大夫牛夷懼禍求為荆州生不許以爲中軍將軍引見調之曰牛性遲重善持轅軛雖無驥足動負百石夷曰雖服大車未經峻壁願試重載乃知勲績生笑曰何其快也公嫌所載輕乎朕將以魚公爵位處公夷懼歸而自殺生飲酒無晝夜或連月不出奏事不省往往寢落或醉中決事左右因以為姦賞罰無準或至申酉乃出視朝乗醉多所殺戮自以眇目諱言殘缺偏隻少無不具之類誤犯而死者不可勝數好生剥牛羊驢馬燖雞豚鵝鴨縦之殿前數十為羣或剥人面皮使之歌舞臨觀以為樂甞問左右曰自吾臨天下汝外間何所聞或對曰聖明宰世賞罰明當天下唯歌太平怒曰汝媚我也引出斬之它日又問或對曰陛下刑罰㣲過又怒曰汝謗我也亦斬之勲舊親戚誅之殆盡羣臣得保一日如度十年東海王堅素有時譽與故姚襄參軍薛讃權翼善讃翼密說堅曰主上猜忍􅁀虐中外離心方今宜主秦祀者非殿下而誰願早為計勿使它姓得之堅以問尚書吕婆樓婆樓曰僕刀鐶上人耳不足以辦大事僕里舎有王猛者其人謀略不世出殿下冝請而咨之堅因婆樓以招猛一見如舊友語及時事堅大恱自謂如劉玄徳之遇諸葛孔明也六月太史令康權言於秦主生曰昨夜三月並出孛星入太㣲連東井自去月上旬沈隂不雨以至于今將有下人謀上之禍生怒以為妖言撲殺之特進領御史中丞梁平老等謂堅曰主上失徳上下嗷嗷人懐異志燕晉二方伺隙而動恐禍發之日家國俱亡此殿下之事也冝早圖之堅心然之畏生趫勇未敢發生夜對侍婢言曰阿灋兄弟亦不可信明當除之婢以告堅及堅兄清河王灋灋與梁平老及特進光禄大夫强汪帥壯士數百潜入雲龍門堅與吕婆樓帥麾下三百人鼓譟繼進宿衛將士皆舎仗歸堅生猶醉寐堅兵至生驚問左右曰此輩何人左右曰賊也生曰何不拜之堅兵皆笑生又大言何不速拜不拜者斬之堅兵引生置别室廢為越王尋殺之謚曰厲王堅以位讓灋灋曰汝嫡嗣且賢宜立堅曰兄年長宜立堅母茍氏泣謂羣臣曰社稷重事小兒自知不能它日有悔失在諸君羣臣皆頓首請立堅堅乃去皇帝之號稱大秦天王即位於太極殿誅生倖臣中書監董榮左僕射趙韶等二十餘人大赦改元永興追尊父雄為文桓皇帝母茍氏為皇太后妃茍氏為皇后世子宏為皇太子以清河王灋為都督中外諸軍事丞相録尚書事東海公諸王皆降爵為公以從祖右光禄大夫永安公矦為太尉晉公柳為車騎大將軍尚書令封弟融為陽平公雙為河南公子丕為長樂公暉為平原公熈為廣平公叡為鉅鹿公以漢陽李威為左僕射梁平老為右僕射强汪為領軍將軍吕婆樓為司􅀠校尉王猛為中書侍郎融好文學明辯過人耳聞則誦過目不忘力敵百夫善騎射擊刺少有令譽堅愛重之常與共議國事融經綜内外刑政修明薦才揚滯補益弘多丕亦有文武才幹治民斷獄皆亞於融威茍太后之姑子也素與魏王雄友善生屢欲殺堅賴威營救得免威得幸於茍太后堅事之如父威知王猛之賢常勸堅以國事任之堅謂猛曰李公知君猶鮑叔牙之知管仲也猛以兄事之燕主雋殺叚龕阬其徒三千餘人秋七月秦大將軍冀州牧張平遣使請降拜并州刺史八月丁未立皇后何氏后故散騎侍郎廬江何準之女也禮如咸康而不賀秦王堅以權翼為給事黄門侍郎薛讃為中書侍郎與王猛並掌機密九月追復太師魚遵等官以禮改葬子孫存者皆隨才擢叙張平據新興鴈門西河太原上黨上郡之地壁壘三百餘夷夏十餘萬戸拜置征鎭欲與燕秦為敵國冬十月平寇略秦境秦王堅以晉公柳都督并冀州諸軍事加并州牧鎮蒲阪以禦之十一月癸酉燕主雋自薊徙都鄴秦太后茍氏遊宣明臺見東海公灋之第門車馬輻湊恐終不利於秦王堅乃與李威謀賜灋死堅與灋訣於東堂慟哭歐血謚曰獻哀公封其子陽為東海公敷為清河公十二月乙巳燕主雋入鄴宫大赦復作銅雀臺以太常王彪之為左僕射秦王堅行至尚書以文案不治免左丞程卓官以王猛代之堅舉異才修廢職課農桑恤困窮禮百神立學校旌節義繼絶世秦民大恱二年春正月司徒昱稽首歸政帝不許初馮鴦旣以上黨來降又附於張平又自歸於燕旣而復叛燕二月燕司徒上庸王評討之不克秦王堅自將討張平以鄧羌為前鋒督䕶帥騎五千軍于汾上平使養子蚝禦之蚝多力趫捷能曵牛却走城無髙下皆可超越與羌相持旬餘莫能相勝三月堅至銅壁平盡衆出戰蚝單馬大呼出入秦陳者四五堅募人生致之鷹揚將軍吕光刺蚝中之鄧羌擒蚝以獻平衆大潰平懼請降堅拜平右將軍以蚝為虎賁中郎將蚝本姓弓上黨人也堅寵待甚厚常置左右秦人稱鄧羌張蚝皆萬人敵光婆樓之子也堅徙張平部民三千餘戸于長安甲戌燕主雋遣領軍將軍慕輿根將兵助司徒評攻馮鴦根欲急攻之評曰鴦壁堅不如緩之根曰不然公至城下經月未甞交鋒賊謂家國力止於此遂相固結冀幸萬一今根兵初至形勢方振賊衆恐懼皆有離心計慮未定從而攻之無不克者遂急攻之鴦與其黨果相猜忌鴦奔野王依吕䕶其黨盡降夏四月秦王堅如雍祠五畤六月如河東祀后土秋八月豫州刺史謝弈卒弈安之兄也司徒昱以建武將軍桓雲代之雲温之弟也訪於僕射王彪之彪之曰雲非不才然温居上流巳割天下之半其弟復處西藩兵權萃於一門非深根固蔕之宜人才非可豫量但當令不與殿下作異者耳昱頷之曰君言是也壬申以呉興太守謝萬為西中郎將監司豫冀并四州諸軍事豫州刺史王羲之與桓温牋曰謝萬才流經通使之處廊廟固是後來之秀今以之俯順荒餘近是違才易務矣又遺萬書曰以君邁往不屑之韻而俯同羣碎誠難為意也然所謂通識正當隨事行藏耳願君每與士卒之下者同甘苦則盡善矣萬不能用徐兖二州刺史荀羡有疾以御史中丞郗曇為羡軍司曇鑒之子也九月庚辰秦王堅還長安以太尉矦守尚書令於是秦大旱堅減膳徹樂命后妃以下悉去羅紈開山澤之利公私共之息兵養民旱不爲災王猛日親幸用事宗親勲舊多疾之特進姑臧矦樊世本氐豪佐秦主健定關中謂猛曰吾輩耕之君食之邪猛曰非徒使君耕之又將使君炊之世大怒曰要當懸汝頭於長安城門不然吾不處世猛以白堅堅曰必殺此老氐然後百寮可肅㑹世入言事與猛爭論於堅前世欲起擊猛堅怒斬之於是羣臣見猛皆屏息趙之亡也其將張平李歷髙昌皆遣使降燕巳而降晉又降秦各受爵位欲中立以自固燕主雋使司徒評討張平於并州司空陽騖討髙昌於東燕樂安王臧討李歷於濮陽騖攻昌别將於􅀺陽不㧞歴奔滎陽其衆皆降并州壁壘百餘降於燕雋以右僕射恱綰為并州刺史以撫之平所署征西將軍諸葛驤等帥壁壘百三十八降於燕雋皆復其官爵平帥衆三千奔平陽復請降於燕冬十月泰山太守諸葛攸攻燕東郡入武陽燕主儁遣大司馬恪統陽騖及樂安王臧之兵以擊之攸敗走還㤗山恪遂度河略地河南分置守宰燕主雋欲經營秦晋十二月令州郡校實見丁戶留一丁餘悉發為兵欲使歩卒滿一百五十萬期來春大集洛陽武邑劉貴上書極陳百姓彫弊發兵非灋必致土崩之變儁善之乃更令三五發兵寛其期日以來冬集鄴時燕調發繁數官司各遣使者道路旁午郡縣苦之太尉領中書監封弈奏請自今非軍期嚴急不得遣使自餘賦發皆責成州郡其羣司所遣彈督先在外者一切攝還儁從之燕㤗山太守賈堅屯山茌荀羡引兵擊之堅所將纔七百餘人羡兵十倍於堅堅將出戰諸將皆曰衆少不如固守堅曰固守亦不能免不如戰也遂出戰身先士卒殺羡兵千餘人復還入城羡進攻之堅歎曰吾自結髪志立功名而每值窮阨豈非命乎與其屈辱而生不若守節而死乃謂將士曰今危困計無所設卿等可去吾將止死將士皆泣曰府君不出衆亦俱死耳乃扶堅上馬堅曰我如欲逃必不相遣今當為卿曹决􅃲若勢不能支卿等可趣去勿復顧我也乃開門直岀羡兵四集堅立馬橋上左右射之皆應弦而倒羡兵衆多從塹下斫橋堅人馬俱陷生擒之遂拔山茌羡謂堅曰君父祖世為晉臣奈何背本不降堅曰晉自棄中華非吾叛也民旣無主彊則託命旣巳事人安可改節吾束脩自立渉趙歷燕未甞易志君何怱怱相謂降乎羡復責之堅罵曰豎子兒女御乃公羡怒執置雨中數日堅憤惋而卒燕青州刺史慕容塵遣司馬恱明救㤗山羡兵大敗燕復取山荏燕主雋以賈堅子活為任城太守荀羨疾篤徴還以郗曇為北中郎將都督徐兖青冀幽五州諸軍事徐兖二州刺史鎮下邳燕呉王垂娶叚末柸女生子令寳叚氏才髙性烈自以貴姓不尊事可足渾后可足渾氏衘之燕主雋素不快於垂中常侍湼皓因希旨告叚氏及吴國典書令遼東髙弼為巫蠱欲以連汙垂雋收叚氏及弼下大長秋廷尉考驗叚氏及弼志氣確然終無橈辭掠治日急垂愍之私使人謂叚氏曰人生㑹當一死何堪楚毒如此不若引服叚氏歎曰吾豈愛死者邪若自誣以惡逆上辱祖宗下累於王固不為也辨荅益明故垂得免禍而叚氏竟死於獄中出垂為平州刺史鎮遼東垂以叚氏女弟為繼室可足渾氏黜之以其妹長安君妻垂垂不恱由是益惡之匈奴劉閼頭部落多叛懼而東走乗冰度河半度而冰解後衆盡歸劉悉勿祈閼頭奔代悉勿祈務桓之子也三年春二月燕主雋立子泓為濟北王冲為中山王燕人殺叚勤勤弟思來奔燕主雋宴群臣于蒲池語及周太子晋潜然流涕曰才子難得自景先之亡吾􅁂髪中白卿等謂景先何如司徒左長史李績對曰獻懐太子之在東宫臣為中庻子太子志業敢不知之太子大徳有八至孝一也聦敏二也沈毅三也疾䛕喜直四也好學五也多藝六也謙恭七也好施八也雋曰卿譽之雖過然此兒在吾死無憂矣景茂何如時太子暐侍側績曰皇太子天資岐嶷雖八徳巳聞然二闕未補好遊畋而樂絲竹此其所以爲損也雋顧謂暐曰伯陽之言藥石之惠也汝冝誡之暐甚不平雋夢趙主虎齧其臂乃發虎墓求尸不獲購以百金鄴女子李菟知而告之得尸於東明觀下僵而不腐雋蹋而罵之曰死胡何敢怖生天子數其殘暴之罪而鞭之投於漳水尸倚橋柱不流及秦滅燕王猛為之誅李莬收而葬之秦平羌䕶軍髙離據略陽叛永安威公矦討之未克而卒夏四月驍騎將軍鄧羌秦州刺史啖鐵討平之匈奴劉悉勿祈卒弟衛辰殺其子而代之五月秦王堅如河東六月大赦改元甘露凉州牧張瓘猜忌苛虐専以愛憎為賞罰郎中殷郇諫之瓘曰虎生三日自能食肉不須人教也由是人情不附輔國將軍宋混性忠鯁瓘憚之欲殺混及弟澄因廢凉王玄靚而代之徴兵數萬集姑臧混知之與澄帥壯士楊和等四十餘騎奄入南城宣告諸營曰張瓘謀逆被太后令誅之俄而衆至二千瓘帥衆出戰混擊破之瓘麾下玄臚刺混不能穿甲混擒之瓘衆悉降瓘與弟琚皆自殺混夷其宗族玄靚以混為使持節都督中外諸軍事驃騎大將軍酒泉郡矦代瓘輔政混乃請玄靚去凉王之號復稱凉州牧混謂玄臚曰卿刺我幸而不傷今我輔政卿其懼乎臚曰臚受瓘恩惟恨刺節下不深耳竊無所懼混義之任為心膂髙昌不能拒燕秋七月自白馬奔滎陽秦王堅自河東還以驍騎將軍鄧羌為御史中丞八月以咸陽内史王猛為侍中中書令領京兆尹特進光禄大夫彊徳太后之弟也酗酒豪横掠人財貨子女為百姓患猛下車收徳奏未及報巳陳尸於市堅馳使赦之不及與鄧羌同志疾惡紏案無所顧忌數旬之間權豪貴戚殺戮刑免者二十餘人朝廷震栗姦猾屏氣路不拾遺堅歎曰吾始今知天下之有灋也㤗山太守諸葛攸將水陸二萬擊燕入自石門屯于河渚燕上庸王評長樂太守傅顔帥歩騎五萬與攸戰于東阿攸兵大敗冬十月詔謝萬軍下蔡郗曇軍髙平以擊燕萬矜豪傲物但以嘯詠自髙未甞撫衆兄安深憂之謂萬曰汝為元帥冝數接對諸將以恱其心豈有傲誕如此而能濟事也萬乃召集諸將一無所言直以如意指四坐云諸將皆勁卒諸將益恨之安慮萬不免乃自隊帥以下無不親造厚相親託旣而萬帥衆入渦潁以援洛陽郗曇以病退屯彭城萬以為燕兵大盛故曇退即引兵還衆遂驚潰萬狼狽單歸軍士欲因其敗而圖之以安故而止旣至詔廢萬為庻人降曇號建武將軍於是許昌潁川譙沛諸城相次皆沒於燕秦王堅以王猛為吏部尚書尋遷太子詹事十一月為左僕射餘官如故十一月封武陵王晞子㻱為梁王大旱辛酉燕主雋寢疾謂大司馬太原王恪曰吾病必不濟今二方未平景茂冲幼國家多難吾欲效宋宣公以社稷屬汝何如恪曰太子雖幼勝殘致治之主也臣實何人敢干正統雋怒曰兄弟之間豈虛飾邪恪曰陛下若以臣能荷天下之任者豈不能輔少主乎雋喜曰汝能為周公吾復何憂李績清方忠亮汝善遇之召呉王垂還鄴秦王堅以王猛為輔國將軍司􅀠校尉居中宿衛僕射詹事侍中中書令領選如故猛上䟽辭讓因薦散騎常侍陽平公融光禄散騎西河任群處士京兆朱彤自代堅不許而以融為侍中中書監左僕射任群為光禄大夫領太子家令朱彤為尚書侍郎領太子庶子猛時年三十六歲中五遷權傾内外人有毀之者堅輙罪之於是羣臣莫敢復言以左僕射李威領䕶軍右僕射梁平老為使持節都督北垂諸軍事鎮北大將軍戍朔方之西丞相司馬賈雍為雲中䕶軍戍雲中之南燕所徴郡國兵悉集鄴城資治通鑑卷第一百
