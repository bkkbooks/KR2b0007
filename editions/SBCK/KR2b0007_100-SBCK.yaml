front:
  text: 當自定不足討也蘭陵太守孫黑濟北太守髙柱建興太守髙瓫及秦河内太守王㑹黎陽太守韓髙皆以郡降燕秦淮南王生幼無一目性麤暴其祖父洪甞戲之曰吾聞瞎兒一淚信乎生怒引佩刀自刺出血曰此亦一涙也洪大驚鞭之生曰性耐刀槊不堪鞭棰洪謂其父健曰此兒狂悖冝早除之不然必破人家健將殺之健弟雄止之曰兒長自應改何可遽爾及長力舉千鈞手格猛獸走及奔馬擊刺騎射冠絶一時獻哀太子卒彊后欲立少子晉王柳秦主健以䜟文有三羊五眼乃立生為太子以司空平昌王菁為太尉尚書令王墮為司空司􅀠校尉梁楞為尚書令
