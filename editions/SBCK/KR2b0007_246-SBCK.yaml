front:
  text: 資治通鑑卷第二百四十六
  hash: sha256:c774805dec2e9eb3fc10259f8dc132658ae2483d307d814383fbabeedc36e83b
body:
  text: 臣司馬光奉勑編集唐紀六十二黓閹茂凡五年起著雍敦牂盡玄文宗元聖昭獻孝皇帝下開成三年春正月甲子李石入朝中塗有盜射之微傷左右奔散石馬驚馳歸第又有盜邀擊於坊門斷其馬尾僅而得免上聞之大驚命神䇿六軍遣兵防衛敕中外捕盜甚急竟無所獲乙丑百官入朝者九人而已京城數日方安丁卯追贈故齊王湊為懷懿太子戊申以鹽鐵轉運使户部尚書楊嗣復户部侍郎判户部李􅑻並同平章事判使如故嗣復於陵之子也中書侍郎同平章事李石承甘露之亂人情危懼宦官恣横忘身徇國故紀綱粗立仇士良深惡之潛遣盜殺之不果石懼累表稱疾辭位上深知其故而無如之何丙子以石同平章事充荆南節度使陳夷行性介直惡楊嗣復爲人每議政事多相詆斥壬辰夷行以足疾辭位不許上命起居舎人魏謩獻其祖文貞公笏鄭覃曰在人不在笏上曰亦甘棠之比也楊嗣復欲援進李宗閔恐爲鄭覃所沮乃先令宦官諷上上臨朝謂宰相曰宗閔積年在外宜與一官鄭覃曰陛下若憐宗閔之逺止可移近北數百里不宜再用用之臣請先避位陳夷行曰宗閔曏以朋黨亂政陛下何愛此纖人楊嗣復曰事貴得中不可但徇愛憎上曰可與一州覃曰與州太優止可洪州司馬耳因與嗣復互相詆訐以為黨上曰與一州無傷覃等退上謂起居郎周敬復舎人魏謩曰宰相諠爭如此可乎對曰誠為不可然覃等盡忠憤激不自覺耳丁酉以衡州司馬李宗閔為杭州刺史李固言與楊嗣復李􅑻善故引居大政以排鄭覃陳夷行每議政之際是非鋒起上不能决也三月牂柯寇涪州清溪鎭鎭兵擊却之初大和之末杜悰為鳯翔節度使有詔沙汰僧尼時有五色雲見于岐山近灋門寺民閒訛言佛骨降祥以僧尼不安之故監軍欲奏之悰曰雲物變色何常之有佛若果愛僧尼當見於京師未幾獲白兎監軍又欲奏之曰此西方之瑞也悰曰野獸未馴且宜畜之旬日而斃監軍不悦以為掩蔽聖徳獨畫圖獻之及鄭汪代悰鎭鳯翔奏紫雲見又獻白雉是嵗八月有甘露降於紫宸殿前櫻桃之上上親采而甞之百官稱賀其十一月遂有金吾甘露之變及悰為工部尚書判度支河中奏騶虞見百官稱賀上謂悰曰李訓鄭注皆因瑞以售其亂乃知瑞物非國之慶卿前在鳯翔不奏白兔眞先覺也對曰昔河出圖伏羲以畫八卦洛出書大禹以敘九疇皆有益於人故足尚也至於禽獸草木之瑞何時無之劉聦桀逆黄龍三見石季龍暴虐得蒼麟十六白鹿七以駕芝蓋以是觀之瑞豈在徳玄宗甞為潞州别駕及即位潞州奏十九瑞玄宗曰朕在潞州惟知勤職業此等瑞物皆不知也願陛下專以百姓富安為國慶自餘不足取也上善之它日謂宰相曰時和年豐是為上瑞嘉禾靈芝誠何益於事宰相因言春秋記災異以儆人君而不書祥瑞用此故也夏五月乙亥詔諸道有瑞皆無得以聞亦勿申牒所司其臘饗太廟及饗太清宫元日受朝奏祥瑞皆停初靈武節度使王晏平自盜贓七千餘緡上以其父智興有功免死長流康州晏平密請於魏鎭幽三節度使使上表雪已上不得已六月壬寅改永州司户八月己亥嘉王運薨太子永之母王徳妃無寵為楊賢妃所譖而死太子頗好遊宴昵近小人賢妃日夜毁之九月壬戌上開延英召宰相及兩省御史郎官䟽太子過惡議廢之曰是宜為天子乎羣臣皆言太子年少容有改過國本至重豈可輕動御史中丞狄兼謩論之尤切至於涕泣給事中韋温曰陛下惟一子不教陷之至是豈獨太子之過乎癸亥翰林學士六人神䇿六軍軍使十六人復上表論之上意稍解是夕太子始得歸少陽院如京使王少華等及宦官宫人坐流死者數十人義武節度使張璠在鎭十五年為幽鎭所憚及有疾請入朝朝廷未及制置疾甚戒其子元益舉族歸朝毋得效河北故事及薨軍中欲立元益觀察留後李士季不可衆殺之又殺大將十餘人壬申以易州刺史李仲遷為義武節度使義武馬軍都虞矦何清朝自拔歸朝癸酉以為儀州刺史朝廷以義昌節度使李彦佐在鎭乆甲戌以徳州刺史劉約為節度副使欲以代之開成以來神策將吏遷官多不聞奏直牒中書令覆奏施行遷改殆無虛日癸未始詔神策將吏改官皆先奏聞狀至中書然後檢勘施行冬十月易定監軍奏軍中不納李仲遷請以張元益為留後太子永猶不悛庚子暴薨謚曰莊恪乙巳以左金吾大將軍郭旼為邠寧節度使宰相議􅀤兵討易定上曰易定地狹人貧軍資半仰度支急之則靡所不為緩之則自生變但謹備四境以俟之乃除張元益代州刺史頃之軍中果有異議乃上表以不便李仲遷為辭朝廷為之罷仲遷十一月壬戍詔俟元益出定州其義武將士始謀立元益者皆赦不問以義昌節度使李彦佐為天平節度使以劉約為義昌節度使丁卯張元益出定州庚午上問翰林學士栁公權以外議對曰郭􅌈除邠寧外閒頗以為疑上曰旼尚父之姪太后叔父在官無過自金吾作小鎭外閒何尤焉對曰非謂旼不應為節度使也聞陛下近取旼二女入宫有之乎上曰然入參太皇太后耳公權曰外間不知皆云旼納女後宫故得方鎭上俛首良乆曰然則奈何對曰獨有自南内遣歸其家則外議自息矣是日太皇太后遣中使送二女還旼家上好詩甞欲置詩學士李􅑻曰今之詩人浮薄無益於理乃止甲戌以蔡州刺史韓威為義武節度使河東節度使司徒中書令裴度以疾求歸東都十二月辛丑詔度入知政事遣中使敦諭上道鄭覃累表辭位丙午詔三五日一入中書是嵗吐蕃彛泰賛普卒弟達磨立彛泰多病委政大臣由是僅能自守乆不為邊患達磨荒􅁋殘虐國人不附災異相繼吐蕃益衰四年春閏正月己亥裴度至京師以疾歸第不能入見上勞問賜賚使者旁午三月丙戌薨謚曰文忠上怪度無遺表問其家得半藁以儲嗣未定為憂言不及私度身貌不踰中人而威望逺達四夷四夷見唐使輒問度老少用捨以身繫國家輕重如郭子儀者二十餘年夏四月戊辰上稱判度支杜悰之才楊嗣復李珏因請除悰户部尚書陳夷行曰恩㫖當由上出自古失其國者未始不由權在臣下也􅑻曰陛下甞語臣云人主當擇宰相不當疑宰相五月丁亥上與宰相論政事陳夷行復言不宜使威權在下李􅑻曰夷行意疑宰相中有弄陛下威權者耳臣屢求退茍得王􅀓臣之幸也鄭覃曰陛下開成元年二年政事殊美三年四年漸不如前楊嗣復曰元年二年鄭覃夷行用事三年四年臣與李􅑻同之罪皆在臣因叩頭曰臣不敢更入中書遂趨出上遣中使召還勞之曰鄭覃失言卿何遽爾覃起謝曰臣愚拙意亦不屬嗣復而遽如是乃嗣復不容臣耳嗣復曰覃言政事一年不如一年非獨臣應得罪亦上累聖徳退三上表辭位上遣中使召出之癸巳始入朝丙申門下侍郎同平章事鄭覃罷為右僕射陳夷行罷為吏部侍郎覃性清儉夷行亦耿介故嗣復等深疾之上以鹽鐵推官檢校禮部貟外郎姚朂能鞠疑獄命權知職方貟外郎右丞韋温不聽上奏稱郎官朝廷清選不宜以賞能吏上乃以朂檢校禮部郎中依前鹽鐵推官六月丁丑上以其事問宰相楊嗣復對曰温志在澄清流品若有吏能者皆不得清流則天下之事孰爲陛下理之恐似衰晉之風然上素重温終不奪其所守秋七月癸未以張元益爲左驍衛將軍以其母矦莫陳氏爲趙國太夫人賜絹二百匹易定之亂矦莫陳氏説諭將士且戒元益以順朝命故賞之甲辰以太常卿崔鄲同中書門下平章事鄲郾之弟也八月辛亥鄜王憬薨癸酉昭義節度使劉從諌上言蕭本詐稱太后弟上下皆稱蕭弘是眞以本來自左軍故弘爲臺司所抑今弘詣臣求臣上聞乞追弘赴闕與本對推以正眞僞詔三司鞫之冬十月乙卯上就起居舍人魏謩取記注觀之謩不可曰記注兼書善惡所以儆戒人君陛下但力為善不必觀史上曰朕曏甞觀之對曰此曏日史官之罪也若陛下自觀史則史官必有所諱避何以取信於後上乃止楊妃請立皇弟安王溶為嗣上謀於宰相李􅑻非之丙寅立敬宗少子陳王成美為皇太子丁卯上幸㑹寧殿作樂有童子緣橦一夫來往走其下如狂上怪之左右曰其父也上泫然流涕曰朕貴為天子不能全一子召教坊劉楚材等四人宫人張十十等十人責之曰構害太子皆爾曹也今更立太子復欲爾邪執以付吏己巳皆殺之上因是感傷舊疾遂増十一月三司桉蕭本蕭弘皆非眞太后弟本除名流愛州弘流儋州而太后眞弟在閩中終不能自達乙亥上疾少閒坐思政殿召當直學士周墀賜之酒因問曰朕可方前代何主對曰陛下堯舜之主也上曰朕豈敢比堯舜所以問卿者何如周赧漢獻耳墀驚曰彼亡國之主豈可比聖徳上曰赧獻受制於彊諸矦今朕受制於家奴以此言之朕殆不如因泣下霑襟墀伏地流涕自是不復視朝是嵗天下户四百九十九萬六千七百五十二回鶻相安允合特勒柴革謀作亂彰信可汗殺之相掘羅勿將兵在外以馬三百賂沙陀朱邪赤心借其兵共攻可汗可汗兵敗自殺國人立㕎馺特勒為可汗㑹嵗疫大雪羊馬多死回鶻遂衰赤心執宜之子也五年春正月己卯詔立潁王瀍為皇太弟應軍國事權令句當且言太子成美年尚冲幼未漸師資可復封陳王時上疾甚命知樞宻劉􅀪逸薛季稜引楊嗣復李􅑻至禁中欲奉太子監國中尉仇士良魚弘志以太子之立功不在已乃言太子幼且有疾更議所立李􅑻曰太子位已定豈得中變士良弘志遂矯詔立􅈆為太弟是日士良弘志將兵詣十六宅迎潁王至少陽院百官謁見於思賢殿瀍沈毅有断喜愠不形於色與安王溶皆素為上所厚異於諸王辛巳上崩於太和殿以楊嗣復攝冢宰癸未仇士良説太弟賜楊賢妃安王溶陳王成美死敕大行以十四日殯成服諫議大夫裴夷直上言期日太逺不聽時仇士良等追怨文宗凡樂工及内侍得幸於文宗者誅貶相繼夷直復上言陛下自藩維繼統是宜儼然在疚以哀慕為心速行喪禮早議大政以慰天下而未及數日屢誅戮先帝近臣驚率土之視聽傷先帝之神靈人情何瞻國體至重若使此輩無罪固不可刑若其有罪彼已在天網之内無所逃伏旬日之外行之何晚不聽辛卯文宗始大斂武宗即位甲午追尊上母韋妃為皇太后二月乙卯赦天下丙寅諡韋太后曰宣懿夏五月己卯門下侍郎同平章事楊嗣復罷為吏部尚書以刑部尚書崔珙同平章事兼鹽鐵轉運使秋八月壬戌葬元聖昭獻孝皇帝于章陵廟號文宗庚午門下侍郎同平章事李􅑻坐為山陵使龍輴陷罷為太常卿貶京兆尹敬昕為郴州司馬義武軍亂逐節度使陳君賞君賞募勇士數百復入軍城誅亂者初上之立非宰相意故楊嗣復李􅑻相繼罷去召淮南節度使李徳裕入朝九月甲戌朔至京師丁丑以徳裕為門下侍郎同平章事庚辰徳裕入謝言於上曰致理之要在於辨羣臣之邪正夫邪正二者勢不相容正人指邪人為邪邪人亦指正人為邪人主辨之甚難臣以為正人如松栢特立不倚邪人如藤蘿非附它物不能自起故正人一心事君而邪人競為朋黨先帝深知朋黨之患然所用卒皆朋黨之人良由執心不定故姧邪得乗間而入也夫宰相不能人人忠良或爲欺罔主心始疑於是旁詢小臣以察執政如徳宗末年所聽任者惟裴延齡輩宰相署敕而巳此政事所以日亂也陛下誠能愼擇賢才以爲宰相有姧罔者立黜去之常令政事皆出中書推心委任堅定不移則天下何憂不理哉又曰先帝於大臣好爲形迹小過皆含容不言日累月積以至禍敗兹事大誤願陛下以爲戒臣等有罪陛下當靣詰之事茍無實得以辨明若其有實辭理自窮小過則容其悛改大罪則加之誅譴如此君臣之際無疑間矣上嘉納之初徳裕在淮南敕召監軍楊欽義人皆言必知樞密徳􅁉待之無加禮欽義心銜之一旦獨延欽義置酒中堂情禮極厚陳珍玩數牀罷酒皆以贈之欽義大喜過望行至汴州敕復還淮南欽義盡以所餉㱕之徳裕曰此何直卒以與之其後欽義竟知樞密徳裕柄用欽義頗有力焉初伊吾之西焉耆之北有􅃛戞斯部落即古之堅昆唐初結骨也後更號黠戞斯乾元中爲回鶻所破自是隔閡不通中國其君長曰阿熱建牙青山去回鶻牙槖駝行四十日其人悍勇吐蕃回鶻常賂遺之假以官號回鶻既衰阿熱始自稱可汗回鶻遣相國將兵擊之連兵二十餘年數爲􅃛戞斯所敗詈回鶻曰汝運盡矣我必取汝金帳金帳者回鶻可汗所居帳也及掘羅勿殺彰信可汗立㕎馺回鶻别將句錄莫賀引􅃛戞斯十萬騎攻回鶻大破之殺㕎馺及掘羅勿焚其牙帳蕩盡回鶻諸部逃散其相馺職特勒厖等十五部西奔葛邏祿一支奔吐蕃一支奔安西可汗兄弟嗢没斯等及其相赤心僕固特勒那頡啜各帥其衆抵天徳塞下就雜虜貿易榖食旦求内附冬十月丙辰天徳軍使温徳彝奏回鶻潰兵侵逼西城亘六十里不見其後邊人以回鶻猥至恐懼不安詔振武節度使劉沔屯雲迦闗以僃之魏博節度使何進滔薨軍中推其子都知兵馬使重順知留後蕭太后徙居興慶宫積慶殿號積慶太后十一月癸酉朔上幸雲陽校獵故事新天子即位兩省官同署名上之即位也諫議大夫裴夷直漏名由是出爲杭州刺史開府儀同三司左衛上將軍兼内謁者監仇士良請以開府䕃其子爲千牛給事中李中敏判云開府階誠宜䕃子謁者監何由有兒士良慙恚李徳裕亦以中敏爲楊嗣復之黨惡之出為婺州刺史十二月庚申以何重順知魏博留後事立皇子峻爲􅂎王武宗至道昭肅孝皇帝上㑹昌元年春正月辛巳上祀圓丘赦天下改元劉沔奏回鶻已退詔沔還鎭二月回鶻十三部近牙帳者立烏希特勒為烏介可汗南保錯子山三月甲戌以御史大夫陳夷行為門下侍郎同平章事初知樞密劉弘逸薛季稜有寵於文宗仇士良惡之上之立非二人及宰相意故楊嗣復出爲湖南觀察使李􅑻出爲桂管觀察使士良屢譛弘逸等於上勸上除之乙未賜弘逸季稜死遣中使就潭桂州誅嗣復及􅑻户部尚書杜悰奔馬見李徳􅁉曰天子年少新即位兹事不宜手滑丙申徳􅁉與崔珙崔鄲陳夷行三上奏又邀樞密使至中書使入奏以爲徳宗疑劉晏動揺東宫而殺之中外咸以爲寃兩河不臣者由兹恐懼得以爲辭徳宗後悔錄其子孫文宗疑宋申錫交通藩邸竄謫至死既而追悔爲之出涕嗣復􅑻等若有罪惡乞更加重貶必不可容亦當先行訊鞫俟罪狀著白誅之未晩今不謀於臣等遽遣使誅之人情莫不震駭願開延英賜對至晡時開延英召徳裕等入徳裕等泣涕極言陛下宜重愼此舉母致後悔上曰朕不悔三命之坐徳裕等曰臣等願陛下免二人於死勿使既死而衆以爲寃今未奉聖㫖臣等不敢坐乆之上乃曰特爲卿等釋之徳裕等躍下階舞蹈上召升坐歎曰朕嗣位之際宰相何甞比數李􅑻季稜志在陳王嗣復弘逸志在安王陳王猶是文宗遺意安王則專附楊妃嗣復仍與妃書云姑何不效則天臨朝曏使安王得志朕那復有今日徳裕等曰兹事曖昧虛實難知上曰楊妃甞有疾文宗聽其弟玄思入侍月餘以此得通意指朕細詢内人情狀皎然非虛也遂追還二使更貶嗣復為潮州刺史李􅑻為昭州刺史裴夷直爲驩州司户夏六月乙巳詔自今臣下論人罪惡並應請付御史臺桉問母得乞留中以杜讒邪以魏博留後何重順爲節度使上命道士趙歸眞等於三殿建九天道塲親授灋籙右拾遺王哲上䟽切諫坐貶河南府士曹秋八月加仇士良觀軍容使天徳軍使田牟監軍韋仲平欲擊回鶻以求功奏稱回鶻叛將嗢沒斯等侵逼塞下吐谷渾沙陀党項皆丗與爲仇請自出兵驅逐上命朝臣議之議者皆以爲嗢沒斯等叛可汗而來不可受宜如牟等所請擊之便上以問宰相李徳裕以爲窮鳥入懷猶當活之况回鶻屢建大功今為鄰國所破部落離散窮無所歸逺依天子無秋毫犯塞柰何乗其困而擊之宜遣使者鎭撫運糧食以賜之此漢宣帝所以服呼韓邪也陳夷行曰此所謂借冦兵資盜糧也不如擊之徳裕曰彼吐谷渾等各有部落見利則鋭敏爭進不利則鳥驚魚散各走巢穴安肯守死爲國家用今天徳城兵纔千餘若戰不利城陷必矣不若以恩義撫而安之必不爲患縱使侵暴邊境亦須俟徴諸道大兵討之豈可獨使天徳擊之乎時詔以鴻臚卿張賈爲巡邊使使察回鶻情偽未還上問徳裕曰嗢沒斯等請降可保信乎對曰朝中之人臣不敢保况敢保數千里外戎狄之心乎然謂之叛將則恐不可若可汗在國嗢沒斯等帥衆而來則於體固不可受今聞其國敗亂無主將相逃散或奔吐蕃或奔葛邏祿惟此一支逺依大國觀其表辭危迫懇切豈可謂之叛將乎况嗢沒斯等自去年九月至天徳今年二月始立烏介自無君臣之分願且詔河東振武嚴兵保境以僃之俟其攻犯城鎭然後以武力驅除或於吐谷渾等部中小有鈔掠聽自讎報亦未可助以官軍仍詔田牟仲平毋得邀功生事常令不失大信懷柔得宜彼雖戎狄必知感恩辛酉詔田牟約勒將士及雜虜毋得先犯回鶻九月戊辰朔詔河東振武嚴兵以僃之牟布之弟也癸巳盧龍軍亂殺節度使史元忠推牙將陳行泰主留務李徳􅁉請遣使慰撫回鶻且運糧三萬斛以賜之上以爲疑閏月己亥開延英召宰相議之陳夷行於􅇋對之所屢言資盜糧不可徳裕曰今徴兵未集天徳孤危儻不以此糧噉飢虜且使安靜萬一天徳陷沒咎將誰歸夷行至上前遂不敢言上乃許以榖二萬斛賑之以前山南東道節度使同平章事牛僧孺爲太子太師先是漢水溢壞襄州民居故李徳裕以爲僧孺罪而廢之盧龍軍復亂殺陳行泰立牙將張絳初陳行泰逐史元忠遣監軍傔以軍中大將表來求節鉞李徳裕曰河朔事勢臣所熟諳比來朝廷遣使賜詔常太速故軍情遂固若置之數月不問必自生變今請留監軍傔勿遣使以觀之既而軍中果殺行泰立張絳復求節鉞朝廷亦不問㑹雄武軍使張仲武起兵擊絳且遣軍吏呉仲舒奉表詣京師稱絳慘虐請以本軍討之冬十月仲舒至京師詔宰相問狀仲舒言行泰絳皆遊客故人心不附仲武幽州舊將性忠義通書習戎事人心向之曏者張絳初殺行泰召仲武欲以留務讓之牙中一二百人不可仲武行至昌平絳復却之今計仲武纔􅀤雄武軍中已逐絳矣李徳裕問雄武士卒幾何對曰軍士八百外有上團五百人徳裕曰兵少何以立功對曰在得人心茍人心不從兵三萬何益徳裕又問萬一不克如何對曰幽州糧食皆在媯州及北邊七鎭萬一未能入則據居庸􅀜絶其糧道幽州自困矣徳裕奏行泰絳皆使大將上表脅朝廷邀節􅃏故不可與今仲武先自表請􅀤兵為朝廷討亂與之則似有名乃以仲武知盧龍留後仲武尋克幽州上校獵咸陽十一月李徳裕上言今回鶻破亡太和公主未知所在若不遣使訪問則戎狄必謂國家降主虜庭本非愛惜既負公主又傷虜情請遣通事舎人苖縝齎詔詣嗢沒斯令轉達公主兼可卜嗢沒斯逆順之情從之上頗好畋獵及武戲五坊小兒得出入禁中賞賜甚厚甞謁郭太后從容問為天子之道太后勸以納諫上退悉取諫䟽閱之多諫遊獵自是上出畋稍希五坊無復横賜癸亥以中書侍郎同平章事崔鄲同平章事充西川節度使初􅃛戞斯既破回鶻得太和公主自謂李陵之後與唐同姓遣達干十人奉公主歸之於唐回鶻烏介可汗引兵邀擊達干盡殺之質公主南度磧屯天徳軍境上公主遣使上表言可汗已立求冊命烏介又使其相頡干伽斯等上表借振武一城以居公主可汗十二月庚辰制遣右金吾大將軍王㑹等慰問回鶻仍賑米二萬斛又賜烏介可汗敕書諭以宜帥部衆漸復舊疆漂寓塞垣殊非良計又云欲借振武一城前代未有此比或欲别遷善地求大國聲援亦須且於漠南駐止朕當許公主入覲親問事宜儻須應接必無所吝二年春正月以張仲武爲盧龍節度使朝廷以回鶻屯天徳振武北境以兵部郎中李拭爲巡邊使察將帥能否拭鄘之子也二月淮南節度使李紳入朝丁丑以紳爲中書侍郎同平章事判度支河東節度使苻澈修杷頭烽舊戍以僃回鶻李徳􅁉奏請増兵鎭守及修東中二受降城以壯天徳形勢從之右散􅀐常侍栁公權素與李徳􅁉善崔珙奏爲集賢學士判院事德􅁉以恩非已出因事左遷公權爲太子詹事回鶻復奏求糧及尋勘吐谷渾党項所掠又借振武城詔遣內使楊觀賜可汗書諭以城不可借餘當應接處置三月戊申李拭巡邊還稱振武節度使劉沔有威略可任大事時河東節度使苻澈疾病庚申以沔代之以金吾上將軍李忠順為振武節度使遣將作少監苗縝冊命烏介可汗使徐行駐於河東俟可汗位定然後進既而可汗屢侵擾邉境縝竟不行回鶻嗢沒斯以赤心桀􅃛難知先告田牟云赤心謀犯塞乃誘赤心并僕固殺之那頡啜収赤心之衆七千帳東走河東奏回鶻兵至横水殺掠兵民今退屯釋迦泊東李徳裕上言釋迦泊西距可汗帳三百里未知此兵為那頡所部為可汗遣來宜且指此兵云不受可汗指揮擅掠邊鄙密詔劉沔武仲先經略此兵如可以討逐事亦有名摧此一支可汗必自知懼夏四月庚辰天徳都防禦使田牟奏回鶻侵擾不已不俟朝㫖已出兵三千拒之壬午李徳裕奏田牟殊不知兵戎狄長於野戰短於攻城牟但應堅守以待諸道兵集今全軍出戰萬一失利城中空虛何以自固望亟遣中使止之如已交鋒即詔雲朔天徳以來羗渾各出兵奮擊回鶻凡所虜獲並令自取回鶻羇旅二年糧食乏絶人心易動宜詔田牟招誘降者給糧轉致太原不可留於天徳嗢沒斯誠偽雖未可知然要早加官賞縱使不誠亦足為反閒且欲奬其忠義為討伐之名令逺近諸蕃知但責可汗犯順非欲盡滅回鶻石雄善戰無敵請以為天徳都團練副使佐田牟用兵上皆從其言初大和中河西党項擾邊文宗召石雄於白州􅀠振武軍爲禆將屢立戰功以王智興故未甚進擢至是徳裕舉用之甲申嗢沒斯帥其國特勒宰相等二千二百餘人來降上信任李徳裕觀軍容使仇士良惡之㑹上將受尊號御丹鳯樓宣赦或告士良宰相與度支議草制減禁軍衣糧及馬芻粟士良楊言於衆曰如此至日軍士必於樓前諠譁徳裕聞之乙酉乞開延英自訴上怒遽遣中使宣諭兩軍赦書初無此事且赦書皆出朕意非由宰相爾安得此言士良乃惶愧稱謝丁亥羣臣上尊號曰仁聖文武至神大孝皇帝赦天下五月戊申遣鴻臚卿張賈安撫嗢沒斯等以嗢沒斯爲左金吾大將軍懷化郡王其次酋長官賞有差賜其部衆米五千斛絹三千匹那頡啜帥其衆自振武大同東因室韋黒沙南趣雄武軍窺幽州盧龍節度使張仲武遣其弟仲至將兵三萬迎擊大破之斬首捕虜不可勝計悉収降其七千帳分配諸道那頡啜走烏介可汗獲而殺之時烏介衆雖衰減尚號十萬駐牙於大同軍北閭門山楊觀自回鶻還可汗表求糧食牛羊且請執送嗢沒斯等詔報以糧食聽自以馬價於振武糴三千石牛稼穡之資中國禁人屠宰羊中國所鮮出於北邊雜虜國家未甞科調嗢沒斯自本國初破先投塞下不隨可汗巳及二年慮彼猜嫌窮迫歸命前可汗正以猜虐無親致内離外叛今可汗失地逺客尤宜深矯前非若復骨肉相殘則可汗左右信臣誰敢自保朕務在兼愛已受其降於可汗不失恩慈於朝廷免虧信義豈不兩全事體深叶良圖嗢沒斯入朝六月甲申以嗢沒斯所部爲歸義軍以嗢沒斯爲左金吾大將軍充軍使門下侍郎同平章事陳夷行罷爲左僕射秋七月以尚書右丞李讓夷為中書侍郎同平章事嵐州人田滿川據州城作亂劉沔討誅之嗢沒斯請置家太原與諸弟竭力扞邊詔劉沔存撫其家烏介可汗復遣其相上表借兵助復國又借天徳城詔不許初可汗往來天徳振武之閒剽掠羌渾又屯杷頭烽北朝廷屢遣使諭之使還漠南可汗不奉詔李徳裕以爲那頡啜屯於山北烏介恐其與奚契丹連謀邀遮故不敢逺離塞下望敕張仲武諭奚契丹與回鶻共滅那頡啜使得北還及那頡啜死可汗猶不去議者又以爲回鶻待馬價詔盡以馬價給之又不去八月可汗帥衆過杷頭烽南突入大同川驅掠河東雜虜牛馬數萬轉鬭至雲州城門刺史張獻節閉城自守吐谷渾党項皆挈家入山避之庚午詔􅀤陳許徐汝襄陽等兵屯太原及振武大徳俟來春驅逐回鶻丁丑賜嗢沒斯與其弟阿歴支習勿啜烏羅思皆姓李氏名思忠思貞思義思禮國相愛邪勿姓愛名􅀪順仍以􅀪順爲歸義軍副使上遣回鶻石戒直還其國賜可汗書諭以自彼國爲紇吃斯所破來投邊境撫納無所不至今可汗尚此近塞未議還蕃或侵掠雲朔等州或鈔擊羌渾諸部遥揣深意似恃姻好之情每觀蹤由實懷馳突之計中外將相咸請誅翦朕情深屈己未忍幸災可汗宜速擇良圖無貽後悔上又命李徳裕代劉沔荅回鶻相頡干迦斯書以為回鶻逺來依投當效呼韓邪遣子入侍身自入朝及令大和公主入謁太皇太后求哀乞憐則我之救䘏無所愧懷而乃睥睨邊城桀驁自若邀求過望如在本蕃又深入邊境侵暴不已求援繼好豈宜如是來書又云胡人易動難安若令忿怒不可復制回鶻爲紇吃斯所破舉國將相遺骸弃於草莽累代可汗墳墓隔在天涯回鶻忿怒之心不施於彼而蔑弃仁義逞志中華天地神祇豈容如此事昔郅支不事大漢竟自夷滅往事之戒得不在懷戊子李徳􅁉等上言若如前詔河東等三道嚴兵守僃俟來春驅逐乗回鶻人困馬羸之時又官軍免盛寒之苦則幽州兵宜令止屯本道以俟詔命若慮河冰既合回鶻復有馳突須早驅逐則當及天時未寒決䇿於數日之閒以河朔兵益河東兵必令収功於兩月之内今聞外議紛紜互有異同儻不一詢羣情終爲浮辭所橈望令公卿集議詔從之時議者多以爲宜俟來春九月以劉沔兼招撫回鶻使如須驅逐其諸道行營兵權令指揮以張仲武爲東面招撫回鶻使其當道行營兵及奚契丹室韋等並自指揮以李思忠為河西党項都將回鶻西南面招討使皆㑹軍于太原令沔屯鴈門􅀜初奚契丹羈屬回鶻各有監使嵗督其貢賦且詗唐事張仲武遣牙將石公緒統二部盡殺回鶻監使等八百餘人仲武破那頡啜得室韋酋長妻子室韋以金帛羊馬贖之仲武不受曰但殺回鶻監使則歸之癸卯李徳裕等奏河東奏事官孫儔適至云回鶻移營近南四十里劉沔以為此必契丹不與之同恐為其掩襲故也據此事勢正堪驅除臣等問孫儔若與幽州合勢迫逐回鶻更須益幾兵儔言不須多益兵惟大同兵少得易定千人助之足矣上皆從之詔河東幽州振武天徳各出大兵移營稍前以迫回鶻上聞太子少傅白居易名欲相之以問李徳裕徳裕素惡居易乃言居易衰病不任朝謁其從父弟左司貟外郎敏中辭學不減居易且有器識甲辰以敏中為翰林學士李思忠請與契苾沙陀吐谷渾六千騎合勢擊回鶻乙巳以銀州刺史何清朝蔚州刺史契苾通分將河東蕃兵詣振武受李思忠指揮通何力之五丗孫冬十月丁卯立皇子峴為益王岐為兖王􅃛戞斯遣將軍踏布合祖等至天徳軍言先遣都吕施合等奉公主歸之大唐至今無聲問不知得達或為姧人所隔今出兵求索上天入地期於必得又言將徙就合羅川居回鶻故國兼已得安西北庭達靼等五部落十一月辛卯朔昭義節度使劉從諫上言請出部兵五千討回鶻詔不許上遣使賜太和公主冬衣命李徳􅁉為書賜公主略曰先朝割愛降㛰義寧家國謂回鶻必能禦侮安靜塞垣今回鶻所為甚不循理每馬首南向姑得不畏髙祖太宗之威靈欲侵擾邊疆豈不思太皇太后之慈愛為其國母足得指揮若回鶻不能稟命則是弃絶姻好今日巳後不得以姑為詞上幸涇陽校獵乙卯諫議大夫髙少逸鄭朗於閤中諫曰陛下比來遊獵稍頻出城太逺侵星夜歸萬機曠廢上改容謝之少逸等出上謂宰相曰本置諫官使之論事朕欲時時聞之宰相皆賀己未以少逸為給事中㓪為左諫議大夫劉沔張仲武固稱盛寒未可進兵請待嵗首李忠順獨請與李思忠俱進十二月丙寅李徳裕奏請遣思忠進屯保大柵從之丁卯吐蕃遣其臣論普熱來告達磨賛普之喪命將作少監李璟為弔祭使劉沔奏移軍雲州李忠順奏擊回鶻破之丙戌立皇子嶧為徳王嵯為昌王初吐蕃達磨賛普有佞幸之臣以為相達磨卒無子佞相立其妃綝氏兄尚延力之子乞離胡為賛普纔三嵗佞相與妃共制國事吐蕃老臣數十人皆不得豫政事首相結都那見乞離胡不拜曰賛普宗族甚多而立綝氏子國人誰服其令鬼神誰饗其祀國必亡矣比年災異之多乃為此也老夫無權不得正其亂以報先賛普之徳有死而已拔刀􅋇面慟哭而出佞相殺之滅其族國人憤怒又不遣使詣唐求冊立洛門川討擊使論恐熱性悍忍多詐謀乃屬其徒告之曰賊捨國族立綝氏專害忠良以脅衆臣且無大唐冊命何名賛普吾當與汝屬舉義兵入誅綝妃及用事者以正國家天道助順功無不成遂說三部落得萬騎是嵗與青海節度使同盟舉兵自稱國相至渭州遇國相尚思羅屯薄寒山恐熱擊之思羅弃輜重西奔松州恐熱遂屠渭州思羅􅀤蘇毗吐谷渾羊同等兵合八萬保洮水焚橋拒之恐熱至隔水語蘇毗等曰賊臣亂國天遣我來誅之汝曹奈何助逆我今已為宰相國内兵我皆得制之汝不從將滅汝部落蘇毗等疑不戰恐熱引驍騎涉水蘇毗等皆降思羅西走追獲殺之恐熱盡併其衆合十餘萬自渭州至松州所過殘滅尸相枕藉資治通鑑卷第二百四十六
