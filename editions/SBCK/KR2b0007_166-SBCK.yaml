front:
  text: 資治通鑑卷第一百六十六
  hash: sha256:ccbe4db8cd3a9edceccd93e2b21085b5d1f62ef0e6e0e7235947b40237c187e6
body:
  text: 臣司馬光奉勑編集梁紀二十二柔兆困敦凢二年起旃􅂪大淵獻盡敬皇帝紹泰元年春正月壬午朔邵陵太守劉棻將兵援江陵至三百里灘部曲宋文徹殺之帥其衆還據邵陵梁王詧即皇帝位於江陵改元大定追尊昭明太子爲昭明皇帝廟號髙宗妃蔡氏爲昭德皇后尊其母龔氏爲皇太后立妻王氏爲皇后子巋爲皇太子賞刑制度並同王者唯上䟽於魏則稱臣奉其正朔至於官爵其下亦依梁氏之舊其勲級則兼用柱國等名以諮議參軍蔡大寳爲侍中尚書令參掌選事外兵參軍太原王操爲五兵尚書大寳嚴整有智謀雅逹政事文辭贍速後梁主推心任之以爲謀主比之諸葛孔明操亦亞之追贈邵陵王綸太宰謚曰壯武河東王譽丞相謚曰武桓以莫勇爲武州刺史魏永夀爲巴州刺史湘州刺史王琳將兵自小桂北下至蒸城聞江陵已陷爲丗祖發哀三軍縞素遣别將侯平帥舟師攻後梁琳屯兵長沙傳檄州郡爲進取之計長沙王韶及上游諸將皆推琳爲盟主齊主使清河王岳將兵攻魏安州以敕江陵岳至義陽江陵䧟因進軍臨江郢州刺史陸法和及儀同三司宋蒞舉州降之長史江夏太守王珉不從殺之甲午齊召岳還使儀同三司清都慕容儼戍郢州王僧辯遣江州刺史侯瑱攻郢州任約徐丗譜宜豐侯循皆引兵㑹之辛丑齊立貞陽侯淵明爲梁主使其上黨王渙將兵送之徐陵湛海珍等皆聽從淵明歸二月癸丑晋安王至自尋陽入居朝堂即梁王位時年十三以太尉王僧辯爲中書監録尚書驃􅀐大將軍都督中外諸軍事加陳霸先征西大將軍以􅀯豫州刺史侯瑱爲江州刺史湘州刺史蕭循爲太尉廣州刺史蕭勃爲司徒鎮東將軍張彪爲郢州刺史齊主先使殿中尚書邢子才馳傳詣建康與王僧辯書以爲嗣主沖藐未堪負荷彼貞陽侯梁武猶子長沙之胤以年以望堪保金陵故置爲梁主納於彼國卿宜部分舟艫迎接今主并心一力善建良圗乙夘貞陽侯淵明亦與僧辯書求迎僧辯復書曰嗣主體自宸極受於文祖明公儻能入朝同􅅄王室伊吕之任僉曰仰歸意在主盟不敢聞命甲子齊以陸法和爲都督荆雍等十州諸軍事太尉大都督西􅀯道大行臺又以宋蒞爲郢州刺史蒞弟簉爲湘州刺史甲戌上黨王渙克譙郡己夘淵明又與僧辯書僧辯不從魏以右僕射申徽爲㐮州刺史侯平攻後梁巴武二州故劉棻主帥趙朗殺宋文徹以邵陵歸于王琳三月貞陽侯淵明至東􅀜散􅀐常侍裴之横禦之齊軍司尉瑾儀同三司蕭􅁤􅀯侵皎城晋州刺史蕭惠以州降之齊改晋熈爲江州以尉瑾爲刺史丙戍齊克東􅀜斬裴之横俘數千人王僧辯大懼出屯姑孰謀納淵明丙申齊主還鄴封丗宗二子孝珩爲廣寧王延宗爲安德王孫㻛聞江陵䧟棄廣州還曲江侯勃復據有之魏太師泰遣王克沈烱等還江􅀯泰得􅁃季才厚遇之令參掌太史季才散私財購親舊之爲奴婢者泰問何能如是對曰僕聞克國禮賢古之道也今郢都覆没其君信有罪矣搢紳何咎皆爲皁􅀠鄙人覊旅不敢獻言誠切哀之故私購之耳泰乃悟曰吾之過也微君遂失天下之望因出令免梁俘爲奴婢者數千口夏四月庚申齊主如晋陽五月庚辰侯平等擒莫勇魏永夀江陵之䧟也永嘉王莊生七年矣尼法慕匿之王琳迎莊送之建康庚寅齊主還鄴王僧辯遣使奉啓於貞陽侯淵明定君臣之禮又遣别使奉表於齊以子顯及顯母劉氏弟子丗珍爲質於淵明遣左民尚書周弘正至歴陽奉迎因求以晋安王爲皇太子淵明許之淵明求度衛士三千僧辯慮其爲變止受散卒千人庚子遣龍舟法駕迎之淵明與齊上黨王渙盟於江北辛丑自采石濟江於是梁輿􅀯度齊師北返僧辯疑齊擁檝中流不敢就西岸齊侍中裴英起衛送淵明與僧辯㑹于江寕癸夘淵明入建康望朱雀門而哭道逆者以哭對丙午即皇帝位改元天成以晋安王爲皇太子王僧辯爲大司馬陳霸先爲侍中六月庚戌朔齊發民一百八十萬築長城自幽州夏口西至􅁪州九百餘里命定州刺史趙郡王叡將兵監之叡琛之子也齊慕容儼始入郢州而侯瑱等奄至城下儼隨方備禦瑱等不能克乗間出擊填等軍大破之城中食盡煑草木根葉及靴皮帶角食之與士卒分甘共苦堅守半􅀊人無異志貞陽侯淵明立乃命瑱等解圍瑱還鎮豫章齊人以城在江外難守因割以還梁儼歸望齊主悲不自勝齊主呼前執其手脫帽看髮歎息乆之呉興太守杜龕王僧辯之壻也僧辯以呉興爲震州用龕爲刺史又以其弟侍中僧愔爲豫章太守壬子齊主以梁國稱藩詔凢梁民悉遣􅀯還丁卯齊主如晋陽壬申自將擊柔然秋七月己卯至白道留輜重帥輕􅀐五千追柔然壬午及之於懷朔鎮齊主親犯矢石頻戰大破之至于沃野􅀗其酋長及生口二萬餘牛羊數十萬壬辰還晋陽八月辛巳王琳自蒸城還長沙齊主還鄴以佛道二敎不同欲去其一集二家學者論難於前遂敕道士皆剃髮爲沙門有不從者殺四人乃奉命於是齊境皆無道士􅀄王僧辯與陳霸先共㓕侯景情好甚篤僧辯爲子頠娶霸先女㑹僧辯有母䘮未成昏僧辯居石頭城霸先在京口僧辯推心待之頠兄顗屢諌不聽及僧辯納貞陽侯淵明霸先遣使苦爭之往返數四僧辯不從霸先切歎謂所親曰武帝子孫甚多唯孝元能復讎雪耻其子何罪而忽廢之吾與王公並處託􅀌之地而王公一旦改圗外依戎狄援立非次其志欲何所爲乎乃宻具􅂁數千領及錦綵金銀爲賞賜之具㑹有吿齊師大舉至壽春將入冦者僧辯遣記室江旰告霸先使爲之備霸先因是留旰於京口舉兵襲僧辯九月壬寅召部將侯安都周文育及安陸徐度錢塘杜稜謀之稜以爲難霸先懼其謀泄以手巾絞稜悶絶于地因閉於别室部分將士分賜金帛以弟子著作郎曇朗鎮京口知留府事使徐度侯安都帥水軍趨石頭霸先帥馬歩自江乗羅落㑹之是夜皆發召杜稜與同行知其謀者唯安都等四將外人皆以爲江旰徵兵禦齊不之怪也甲辰安都引舟艦將趨石頭霸先控馬未進安都大懼追霸先罵曰今日作賊事勢已成生死湏决在後欲何所望􅀂敗俱死後期得免斫頭邪霸先曰安都嗔我乃進安都至石頭城北棄舟登岸石頭城北接岡阜不甚危峻安都􅀍甲帶長刀軍人捧之投於女垣内衆隨而入進及僧辯卧室霸先兵亦自􅀯門入僧辯方視事外白有兵俄而兵自内出僧辯遽走遇子頠與俱出閤帥左右數十人苦戰于㕔事前力不敵走登􅀯門樓拜請求哀霸先欲縱火焚之僧辯與頠俱下就執霸先曰我有何辜公欲與齊師賜討且曰何意全無備僧辯曰委公北門何謂無備是夜霸先縊殺僧辯父子旣而竟無齊兵亦非霸先之譎也前青州刺史新安程靈洗帥所領救僧辯力戰於石頭西門軍敗霸先遣使招諭乆之乃降霸先義之以爲蘭陵太守使助防京口乙巳霸先爲檄布告中外列僧辯罪狀且曰資斧所指唯王僧辯父子兄弟其餘親黨一無所問丙午貞陽侯淵明遜位出就邸百僚上晋安王表􅂆進冬十月己酉晋安王即皇帝位大赦改元中外文武賜位一等以貞陽侯淵明爲司徒封建安公告齊云僧辯隂圗簒逆故誅之仍請稱臣於齊永爲藩國齊遣行臺司馬恭與梁人盟于歴陽辛亥齊主如晋陽壬子加陳霸先尚書令都督中外諸軍事車􅀐將軍揚􅀯徐二州刺史癸丑以宜豐侯循爲太保建安公淵明爲太􅀓曲江侯勃爲太尉王琳爲車􅀐將軍開府儀同三司戊午尊帝所生夏貴妃爲皇太后立妃王氏爲皇后杜龕恃王僧辯之􅀔素不禮於陳霸先在呉興每以法繩其宗族霸先深怨之及將圗僧辯宻使兄子蒨還長城立柵以備龕僧辯死龕據呉興拒霸先義興太守韋載以郡應之呉郡太守王僧智僧辯之弟也亦據城守陳蒨至長城収兵􅂊數百人杜龕遣其將杜泰將精兵五千奄至將士相視失色蒨言􅀏自􅀂部分益明衆心乃定泰日夜苦攻數旬不克而退霸先使周文育攻義興義興屬縣卒皆霸先舊兵善用弩韋載收得數十人繫以長鎖命所親􅁥之使射文育軍約曰十發不两中者死故每發輒斃一人文育軍稍却載因於城外據水立栅相持數旬杜龕遣其從弟北叟將兵拒戰北叟敗歸于義興霸先聞文育軍不利幸未自表東討留髙州刺史侯安都石州刺史杜稜􅀫衛臺省甲戌軍至義興丙子拔其水柵譙秦二州刺史徐嗣徽從弟嗣先僧辯之甥也僧辯死嗣先亡就嗣徽嗣徽以州入于齊及陳霸先東討義興嗣徽密結南豫州刺史任約將精兵五千乗虚襲建康是日入據石頭遊􅀐至闕下侯安都閉門藏旗幟示之以弱令城中曰登陴闚賊者斬及夕嗣徽等收兵還石頭安都夜爲戰備將旦嗣徽等又至安都帥甲士三百開東西掖門出戰大破之嗣徽等奔還石頭不敢復逼臺城陳霸先遣韋載族弟翽齎書諭載丁丑載及杜北叟皆降霸先厚撫之以翽監義興郡引載置左右與之謀議霸先卷甲還建康使周文育討杜龕救長城將軍黄他攻王僧智於吴郡不克覇先使寧遠將軍裴忌助之忌選所部精兵輕行倍道自錢塘直􅃐吴郡夜至城下鼔譟薄之僧智以爲大軍至輕舟奔吴興忌入據吴郡因以忌爲太守十一月己卯齊遣兵五千度江據姑孰以應徐嗣徽任約陳覇先使合州刺史徐度立柵於冶城庚辰齊又遣安州刺史翟子崇楚州刺史劉士榮淮州刺史柳逹摩將兵萬人於胡墅度米三萬石馬千匹入石頭覇先問計於韋載載曰齊師􅀂分兵先據三吴之路畧地東境則時事去矣今可急於淮􅀯因侯景故壘築城以通東道轉輸分兵絶彼之糧運使進無所資則齊將之首旬日可致覇先從之癸未使侯安都夜襲胡墅燒齊船千餘艘仁威將軍周鐡虎斷齊運輸擒其北徐州刺史張領州仍遣韋載於大航築侯景故壘使杜稜守之齊人於倉門水􅀯立二柵與梁兵相拒壬辰齊大都督蕭􅁤將兵屯江北􅀄齊平秦王歸彦㓜􅀌髙祖令清河昭武王岳養之岳情禮甚薄歸彦心衘之及顯祖即位歸彦爲領軍大將軍大􅀍寵遇岳謂其德已更􅀝賴之岳屢將兵立功有威名而性豪侈好酒色起第於城􅀯㕔事後開巷歸彦譛之於帝曰清河僣擬宫禁制爲永巷但無闕耳帝由是惡之帝納倡婦薛氏於後宫岳先甞因其姊迎之至第帝夜遊於薛氏家其姊爲父乞司徒帝大怒縣其姊鋸殺之譲岳以姦岳不服帝益怒乙亥使歸彦鴆岳岳自訴無罪歸彦曰飲之則家全飲之而卒葬贈如禮薛嬪有寵於帝乆之帝忽思其與岳通無故斬首藏之於懷出東山宴飲􅂆酬始合忽􅊥出其首投於柈上支解其尸弄其髀爲琵琶一座太驚帝方収取對之流涕曰佳人難再得載尸以出􅀍髮歩哭而隨之甲辰徐嗣徽等攻冶城柵陳覇先將精甲自西明門出擊之嗣徽等大敗留柳逹摩等守城自徃采石迎齊援以郢州刺史宜豐侯循爲太保廣州刺史曲江侯勃爲司空并徵入侍循受太保而辭不入勃方謀舉兵遂不受命鎮􅀯將軍王琳侵魏魏大將軍豆盧寧禦之十二月癸丑侯安都襲秦郡破徐嗣徽柵俘數百人収其家得其琵琶及鷹遣使送之曰昨至弟處得此今以相還嗣徽大懼丙辰陳覇先對冶城立航悉度衆軍攻其水􅀯二柵栁逹摩等度淮置陳覇先督兵疾戰縱火燒柵齊兵大敗爭舟相擠溺水者以千數呼聲震天地盡収其舡艦是日嗣徽與任約引齊兵水歩萬餘人還據石頭覇先遣兵詣江寕據險要嗣徽等水歩不敢進頓江寕浦口覇先遣侯安都將水軍襲破之嗣徽等單舸脫走盡収其軍資器械已未覇先四面攻石頭城中無水升水直絹一匹庚申逹摩遣使請和於覇先且求質子時建康虚弱糧運不繼朝臣皆欲與齊和請以覇先從子曇朗爲質覇先曰今在位諸賢欲息肩於齊若違衆議謂􅀌愛曇朗不恤國家今决遣曇朗棄之冦庭齊人無信謂我微弱必當背盟齊冦􅀂來諸君湏爲􅀌力鬬也乃以曇朗及永嘉王莊丹陽尹王沖之子珉爲質與齊人盟於城外將士恣其􅀯北辛酉覇先陳兵石頭􅀯門送齊人歸北徐嗣徽任約皆奔齊収齊馬仗船米不可勝計齊主誅栁逹摩壬戌齊和州長史烏丸逺自􅀯州奔還歴陽江寧令陳嗣黄門侍郎曹朗據姑孰反覇先命侯安都等討平之覇先恐陳曇朗亡竄自帥歩􅀐至京口迎之交州刺史劉元偃帥其屬數千人歸王琳魏以侍中李逺爲尚書左僕射魏益州刺史宇文貴使譙淹從子子嗣誘􅀃淹以爲大將軍淹不從斬子嗣貴怒攻之淹自東遂寧徙屯墊江􅀄晋安民陳羽丗爲閩中豪姓其子寳應多權詐郡中畏服侯景之亂晋安太守賔化侯雲以郡譲羽羽老但治郡事令寳應典兵時東境荒饉而晋安獨豐衍寳應數自海道岀寇抄臨安永嘉㑹稽或載米粟與之貿易由是能致冨彊侯景平丗祖因以羽爲晋安太守及陳覇先輔政羽求傳位於寳應覇先許之是􅀊魏宇文泰諷淮安王育上表請如古制降爵爲公於是宗室諸王皆降爲公突厥木杆可汗擊柔然主鄧叔子㓕之叔子収其餘燼奔魏木杆西破嚈噠東走契丹北并契骨威服塞外諸國其地東自遼海西至西海長萬里􅀯自沙漠以北五六千里皆屬焉木杆恃其彊請盡誅鄧叔子等於魏使者相繼於道太師泰収叔子以下三千餘人付其使者盡殺之於青門外􅀄魏太師泰以漢魏官繁命蘇綽及尚書令盧辯依周禮更定六官太平元年春正月丁丑魏􅀄建六官以宇文泰爲太師大􅃁宰柱國李弼爲太􅀓大司徒趙貴爲太保大宗伯獨􅀌信爲大司馬于謹爲大司冦侯莫陳崇爲大司空自餘百官皆倣周禮戊寅大赦其與任約徐嗣徽同謀者一無所問癸未陳覇先使從事中郎江旰􅀃徐嗣徽使􅀯歸嗣徽執旰送齊陳蒨周文育合軍攻杜龕於呉興龕勇而無謀􅄝酒常醉其將杜泰隂與蒨等通龕與蒨等戰敗泰因􅀃龕使降龕然之其妻王氏曰霸先讎隙如此何可求和因出私財賞募復擊蒨等大破之旣而杜泰降於蒨龕尚醉未覺蒨遣人負出於項王寺前斬之王僧智與其弟豫章太守僧愔俱奔齊東揚州刺史張彪素爲王僧辯所厚不附覇先二月庚戌陳蒨周文育輕兵襲㑹稽彪兵敗走入􅀂邪山中蒨遣其將呉興章昭逺追斬之東陽太守留異饋蒨糧食覇先以異爲縉州刺史江州刺史侯瑱本事王僧辯亦擁兵據豫章及江州不附覇先覇先以周文育爲􅀯豫州刺史使將兵擊湓城庚申又遣侯安都周鐡虎將舟師立柵於梁山以備江州癸亥徐嗣徽任約襲采石執戍主明州刺史張懷鈞送於齊後梁主擊侯平於公安平與長沙王韶引兵還長沙王琳遣平鎮巴州三月壬午詔雜用古今錢戊戌齊遣儀同三司蕭軌庫狄伏連堯難宗東方老等與任約徐嗣徽合兵十萬入㓂出柵口向梁山陳覇先帳内盪主黄叢逆擊破之齊師退保蕪湖覇先遣定州刺史沈泰等就侯安都共據梁山以禦之周文育攻湓城未克召之還夏四月丁巳覇先如梁山廵撫諸軍乙丑齊儀同三司婁叡討魯陽蠻破之侯安都輕兵襲齊行臺司馬恭於歴陽大破之俘獲萬計魏太師泰尚孝武妹馮翊公主生略陽公覺姚夫人生寧都公􅗱􅗱於諸子最長娶大司馬獨􅀌信女㤗將立嗣謂公卿曰􅀌欲立子以嫡恐大司馬有疑如何衆黙然未有言者尚書左僕射李逺曰夫立子以嫡不以長略陽公爲丗子公何所疑􅀂以信爲嫌請先斬之遂拔刀而起泰亦起曰何至於是信又自陳解逺乃止於是群公並從逺議逺出外拜謝信曰臨大事不得不爾信亦謝逺曰今日頼公决此大議遂立覺爲丗子太師泰北廵五月齊人召建公安淵明詐許退師陳覇先具舟送之癸未淵明疽發背卒甲申齊兵發蕪湖庚寅入丹陽縣丙申至秣陵故治陳覇先遣周文育屯方山徐度頓馬牧杜稜頓大航􅀯以禦之齊漢陽敬懷王洽卒辛丑齊人跨淮立橋柵度兵夜至方山徐嗣徽等列艦於青墩至于七磯以斷周文育歸路文育鼔譟而發嗣徽等不能制至旦反攻嗣徽嗣徽驍將鮑砰獨以小艦殿軍文育乗單舴艋與戰跳入艦中斬砰仍牽其艦而還嗣徽衆大駭因留船蕪湖自丹陽歩上陳覇先追侯安都徐度皆還癸夘齊兵自方山進及兒塘游􅀐至臺建康震駭帝緫禁兵出頓長樂寺内外纂嚴覇先拒嗣徽等於白城適與周文育㑹將戰風急覇先曰兵不逆風文育曰事急矣何用古法抽槊上馬先進衆軍從之風亦尋轉殺傷数百人侯安都與嗣徽等戰於耕壇南安都帥十二􅀐突其陳破之生擒齊儀同三司乞伏無勞覇先潜撤精卒三千配沈泰度江襲齊行臺趙彦深於􅀲歩􅀗艦百餘艘粟萬斛六月甲辰齊兵潜至鍾山侯安都與齊將王敬寳戰于龍尾軍主張纂戰死丁未齊師至幕府山覇先遣别將錢明將水軍出江乗邀擊齊人糧運盡􅀗其船米齊軍乏食殺馬驢食之庚戌齊軍踰鍾山覇先與衆軍分頓樂遊􅁐東及覆舟山北斷其衝要壬子齊軍至玄武湖西北將據北郊壇衆軍自覆舟東移頓壇北與齊人相對㑹連日大雨平地水丈餘齊軍晝夜坐立泥中足指皆爛懸鬲以㸑而臺中及潮溝北路燥梁軍每得畨易時四方壅隔糧運不至建康戸口流散徵求無所甲寅少霽覇先將戰調市人得麥飯分給軍士士皆飢疲㑹陳蒨饋米三千斛鴨千頭覇先命炊米煑鴨人人以荷葉褁飯婫以鴨肉數臠乙夘未明蓐食比曉覇先帥麾下出莫府山侯安都謂其部將蕭摩訶曰卿驍勇有名千聞不如一見摩訶對曰今日令公見之及戰安都墜馬齊人圍之摩訶單􅀐大呼直衝齊軍齊軍披靡安都乃免霸先與呉明徹沈泰等衆軍首尾齊舉縱兵大戰安都自白下引兵横出其後齊師大潰斬􅀗數千人相蹂藉而死者不可勝計生擒徐嗣徽及其弟嗣宗斬之以徇追奔至于臨沂其江乗攝山鍾山等諸軍相次克捷虜蕭􅁤東方老王敬寳等將帥凢四十六人其軍士得竄至江者縛荻筏以濟中江而溺流尸至京口翳水彌岸唯任約王僧愔得免丁巳衆軍出南州燒齊舟艦戊午大赦己未解嚴軍士以賞俘貿酒一人裁得一醉庚申斬齊將蕭􅁤等齊人聞之亦殺陳曇朗霸先啓解南徐州以授侯安都侯平頻破後梁軍以王琳兵威不接更不受指麾琳遣將討之平殺巴州助防吕旬収其衆奔江州侯瑱與之結爲兄弟琳軍􅀔益衰乙丑遣使奉表詣齊并獻馴象江陵之䧟也琳妻蔡氏丗子毅皆没于魏琳又獻􅅃于魏以求妻子亦稱臣于梁齊發丁匠三十餘萬脩廣三臺宫殿齊顯祖之􅀄立也留心政術務存簡靖坦於任使人得盡力又能以法馭下或有違犯不容勲戚内外莫不肅然至於軍國機䇿獨决懷抱每臨行陳親當矢石所向有功數年之後漸以功業自矜遂􅄝酒滛泆肆行狂􅁀或身自􅁔舞盡日通宵或散髮胡服雜衣錦綵或􅃝露形體塗􅀓粉黛或乗牛驢橐駞白象不施鞍勒或令崔季舒劉桃枝負之而行擔胡鼔拍之勲戚之第朝夕臨幸游行市里街坐巷􅀫或盛夏日中􅁀身或隆冬去衣馳走從者不堪帝居之自􅀂三臺構木髙二十七丈兩棟相距二百餘尺工匠危怯皆繫繩自防帝登脊疾走殊無怖畏時復雅儛折旋中節傍人見者莫不寒心嘗於道上問婦人曰天子何如曰顛顛癡癡何成天子帝殺之婁太后以帝酒狂舉杖擊之曰如此父生如此兒帝曰即當嫁此老母與胡太后大怒遂不言笑帝欲太后􅀏自匍匐以身舉牀墜太后於地頗有所傷旣醒大慚恨使積柴熾火欲入其中太后驚懼親自持挽強爲之􅀏曰曏汝醉耳帝乃設地席命平秦王歸彦執杖口自責數脫背就罰謂歸彦曰杖不出血當斬汝太后前自抱之帝流涕苦請乃笞脚五十然後衣冠拜謝悲不自勝因是戒酒一旬又復如􅀄帝幸李后家以鳴鏑射后母崔氏罵曰吾醉時尚不識太后老婢何事馬鞭亂擊一百有餘雖以楊愔爲宰相使進厠籌以馬鞭鞭其背流血浹􅂁嘗欲以小刀􅋇其腹崔季舒託俳言曰老小公子惡戯因掣刀去之又置愔於棺中載以轜車又嘗持槊走馬以擬左丞相斛律金之胷者三金立不動乃賜帛千叚髙氏婦女不問親踈多與之亂或以賜左右又多方苦辱之彭城王浟太妃爾朱氏魏敬宗之后也帝欲蒸之不從手刃殺之故魏樂安王元昂李后之姊壻也其妻有色帝數幸之欲納爲昭儀召昻令伏以鳴鏑射之百餘下凝血垂將一石竟至於死后啼不食乞讓位於姊太后又以爲言帝乃止又嘗於衆中召都督韓哲無罪斬之作大鑊長鋸剉碓之屬陳之於庭每醉輒手殺人以爲戯樂所殺者多令支解或焚之於火或投之於水楊愔乃簡鄴下死囚置之仗内謂之供御囚帝欲殺人輒執以應命三月不殺則宥之開府參軍裴謂之上書極諌帝謂楊愔曰此愚人何敢如是對曰彼欲陛下殺之以成名於後丗耳帝曰小人我且不殺爾焉得名帝與左右飲曰樂哉都督王紘曰有大樂亦有大苦帝曰何謂也對曰長夜之飲不寤國亡身隕所謂大苦帝􅅞紘欲斬之思其有救丗宗之功乃捨之帝遊宴東山以􅀜隴未平投盃震怒召魏收於前立爲詔書宣示逺近將事西行魏人震恐常爲度隴之計然實未行一日泣謂群臣曰黒􅆩不受我命柰何都督劉桃枝曰臣得三千􅀐請就長安擒之以來帝壯之賜帛千匹趙道德進曰東西􅀯國彊弱力均彼可擒之以來此亦可擒之以徃桃枝妄言應誅陛下柰何濫賞帝曰道徳言是回縜賜之帝乗馬欲下峻岸入于漳道德􅄃轡回之帝怒將斬之道德曰臣死不恨當於地下啓先帝論此兒酣酗顛狂不可敎訓帝黙然而止它日帝謂道德曰我飲酒過須痛杖我道德抶之帝走道德逐之曰何物人爲此舉止典御丞李集面諌比帝於桀紂帝令􅅞置流中沉没乆之復令引出謂曰吾何如桀紂集曰向來彌不及矣帝又令沉之引出更問如此數四集對如􅀄帝大笑曰天下有如此癡人方知龍逄比干未是俊物遂釋之頃之又􅀍引入見似有所諌帝令將出要斬其或斬或赦莫能測焉内外􅉃􅉃各懷怨毒而素能黙識彊記加以嚴断群下戰慄不敢爲非又能委政楊愔愔緫攝機衡百度修敕故時人皆言主昏於上政清於下愔風表鍳裁爲朝野所重少歷屯阨及得志有一餐之惠者必重報之雖先嘗欲殺已者亦不問典選二十餘年以􅅄抜賢才爲己任性復彊記一見皆不忘其姓名選人魯漫漢自言猥賤獨不見識愔曰卿前在元子思坊乗短尾牝驢見我不下以方麴障面我何爲不識卿漫漢驚服秋七月甲戌前天門太守樊毅襲武陵殺武州刺史衡陽王護王琳使司馬潘忠擊之執毅以歸護暢之孫也丙子以陳霸先爲中書監司徒楊州刺史進爵長城公餘如故􅀄余孝頃爲豫章太守侯瑱鎮豫章孝頃於新呉縣别立城栅與瑱相距瑱使其從弟奫守豫章悉衆攻孝頃乆不克築長圍守之癸酉侯平發兵攻奫大掠豫章焚之奔于建康瑱衆潰奔湓城依其將焦僧度僧度􅂆之奔齊㑹霸先使記室濟陽蔡景歷􅀯上􅀃瑱令降瑱乃詣闕歸罪霸先爲之誅侯平丁亥以瑱爲司空􅀯昌民熊曇朗丗爲郡著姓曇朗有勇力侯景之亂聚衆據豐城爲柵丗祖以爲巴山太守江陵䧟曇朗兵力浸彊侵掠鄰縣侯瑱在豫章曇朗外示服從而隂圖之及瑱敗走曇朗􅀗其馬仗己亥齊大赦魏太師㤗遣安州長史鉗耳康買使于王琳琳遣長史席豁報之且請歸丗祖及愍懷太子之柩㤗許之八月己酉鄱陽王循卒于江夏弟豐城侯㤗監郢州事王琳使兖州刺史呉藏攻江夏不克而死魏太師㤗北度河魏以王琳爲大將軍長沙郡公魏江州刺史陸騰討陵州叛獠獠因山爲城攻之難拔騰乃陳􅇊樂於城下一面獠弃兵􅂝妻子臨城觀之騰潜師三面俱上斬首萬五千級遂平之騰俟之玄孫也庚申齊主將西廵百官辭於紫陌帝使矟􅀐圍之曰我舉鞭即殺之日晏帝醉不能起黄門郎是連子暢曰陛下如此群臣不勝恐怖帝曰大怖邪􅀂然勿殺遂如晋陽九月壬寅改元大赦以陳霸先爲丞相録尚書事鎮衛大將軍揚州牧義興公以吏部尚書王通爲右僕射突厥木杆可汗假道於涼州以襲吐谷渾魏太師㤗使涼州刺史史寧帥􅀐隨之至畨禾吐谷渾覺之奔􅀯山木杆將分兵追之寧曰樹敦賀真二城吐谷渾之巢穴也拔其本根餘衆自散木杆從之木杆從北道􅃐賀真寧從􅀯道􅃐樹敦吐谷渾可汗夸吕在賀真使其征􅀯王將数千人守樹敦木杆破賀真􅀗夸吕妻子寧破樹敦虜征􅀯王還與木杆㑹于青海木杆歎寧勇决贈遺甚厚甲子王琳以舟師襲江夏冬十月壬申豐城侯㤗以州降之齊發山東寡婦二千六百人以配軍有夫而濫奪者什二三魏安定文公宇文㤗還至牽屯山而病驛召中山公護護至涇州見㤗㤗謂護曰吾諸子皆幼外宼方彊天下之事屬之於汝宜努力以成吾志乙亥卒於雲陽護還長安發䘮㤗能駕御英豪得其力用性好質素不尚虚飾明逹政事崇儒好古凢所施設皆依倣三代而爲之丙子丗子覺嗣位爲大師柱國太冡宰出鎮同州時年十五中山公護名位素卑雖爲㤗所屬而群公各圖執政莫肯服從護問計於大司㓂于謹謹曰謹早􅂪先公非常之知㤙深骨肉今日之事必以死爭之􅀂對衆定策公必不得讓明日群公㑹議謹曰昔帝室傾危非安定公無復今日今公一旦違丗嗣子雖㓜中山公親其兄子兼受顧託軍國之事理湏歸之辭色抗厲衆皆悚動護曰此乃家事護雖庸昧何敢有辭謹素與泰等夷䕶常拜之至是謹起而言曰公若統理軍國謹等皆有所依遂再拜群公廹於謹亦再拜於是衆議始定護綱紀内外撫循文武人心遂安十一月辛丑豐城侯㤗奔齊齊以爲永州刺史詔徵王琳爲司空琳辭不至留其將潘純陀監郢州身還長沙魏人歸其妻子壬子齊主詔以魏末豪傑糾合郷部因縁請託各立州郡離大合小公私煩費丁口减於疇日守令倍於昔時且要荒向化舊多浮僞百室之邑遽立州名三户之民空張郡目循名督實事歸焉有於是併省三州一百五十三郡五百八十九縣三鎮二十六戍詔分江州四郡置髙州以明威將軍黄法􅉤爲刺史鎮巴山十二月壬申以曲江侯勃爲太保甲申魏葬安定文公丁亥以􅄮陽之地封丗子覺爲周公􅀄侯景之亂臨川民周續起兵郡中始興王毅以郡譲之而去續部將皆郡中豪族多驕横續裁制之諸將皆怨相與殺之續宗人廸勇冠軍中衆推爲主廸素寒微恐郡人不服以同郡周敷族望髙顯折節交之敷亦事廸甚謹廸據上塘敷據故郡朝廷以廸爲衡州刺史領臨川内史時民遭侯景之亂皆弃農業群聚爲盗唯廸所部獨務農桑各有贏儲政敎嚴明徵歛必至餘郡乏絶者皆仰以取給廸性質朴不事威儀居常徒跣雖外列兵衛内有女􅇊挼繩破篾傍􅀂無人訥於言語而襟懷信實臨川人皆附之齊自西河緫秦戍築長城東至於海前後所築三千餘里率十里一戍其要害置州鎮凢二十五所魏宇文護以周公㓜弱欲早使正位以定人心庚子以魏恭帝詔禪位于周使大宗伯趙貴持節奉冊濟北公廸致皇帝璽紱恭帝出居大司馬府資治通鑑卷第一百六十六
