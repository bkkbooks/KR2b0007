front:
  text: 資治通鑑卷第二百四
  hash: sha256:97245f15b147a2ece82bd98c6fc8c9a69d1d84a7ef3ad7e63c3251724bd92046
body:
  text: 臣司馬光奉勑編集唐紀二十重光單閼凡五年起強圉大淵獻盡則天順聖皇后上之下垂拱三年春閏正月丁卯封皇子成美爲恒王隆基爲楚王隆範爲衛王隆業爲趙王二月丙辰突厥骨篤禄等寇昌平命左鷹􅀭大將軍黒齒常之帥諸軍討之三月乙丑納言韋思謙以太中大夫致仕夏四月命蘇良嗣留守西京時尚方監裴匪躬檢校京􅁐將鬻􅁐中􅂼果以収其利良嗣曰昔公儀休相魯猶能㧞葵去織婦未聞萬乗之主鬻􅂼果也乃止壬戌裴居道爲納言五月丙寅夏官侍郎京兆張光輔爲鳯閣侍郎同平章事鳯閣侍郎同鳯閣鸞臺三品劉褘之竊謂鳯閣舍人永年賈大隱曰太后既廢昬立明安用臨朝稱制不如返政以安天下之心大隱密奏之太后不恱謂左右曰禕之我所引乃復叛我或誣褘之受歸州都督孫萬榮金又與許敬宗妾有私太后命肅州剌史王本立推之本立宣敕示之褘之曰不經鳯閣鸞臺何名爲敕太后大怒以爲拒捍制使庚午賜死于家褘之初下獄睿宗爲之上䟽申理親友皆賀之褘之曰此乃所以速吾死也臨刑沐浴神色自若自草謝表立成數紙麟臺郎郭翰太子文學周思鈞稱歎其文太后聞之左遷翰巫州司法思鈞播州司倉秋七月壬辰魏玄同檢校納言嶺南俚户舊輸半課交趾都護劉延祐使之全輸俚户不從延祐誅其魁首其黨李思慎等作亂攻破安南府城殺延祐桂州司馬曹玄静將兵討思慎等斬之突厥骨篤禄元珍寇朔州遣燕然道大揔管黒齒常之擊之以右鷹􅀭大將軍李多祚爲之副大破突厥於黄花堆追奔四十餘里突厥皆散走磧北多祚丗爲靺鞨酋長以軍功得入􅀫衛黒齒常之每得賞賜皆分將士有善馬爲軍士所損官屬請笞之常之曰柰何以私馬笞官兵乎卒不問九月己卯虢州人楊初成詐稱郎將矯制於都市募人迎廬陵王於房州事覺伏誅冬十月庚子右監門衛中郎將㸑寳璧與突厥骨篤禄元珍戰全軍皆没寳璧輕􅀐遁歸寳璧見黒齒常之有功表請窮追餘宼詔與常之計議遥爲聲援寳璧欲專其功不待常之引精兵萬三千人先行出塞二千餘里掩擊其部落既至又先遣人告之使得嚴備與戰遂敗太后誅寳璧攺骨篤禄曰不卒禄命魏玄同留守西京武承嗣又使人誣李孝逸自云名中有兎兎月中物當有天分太后以孝逸有功十一月戊寅減死除名流儋州而卒太后欲遣韋待價將兵擊吐蕃鳯閣侍郎韋方質奏請如舊制遣御史監軍太后曰古者明君遣將閫外之事悉以委之比聞御史監軍軍中事無大小皆須承禀以下制上非令典也且何以責其有功遂罷之是􅀊天下大饑山東關內尤甚四年春正月甲子於神都立髙祖太宗髙宗三廟四時享祀如西廟之儀又立崇先廟以享武氏祖考太后命有司議崇先廟室數司禮博士周悰請爲七室又减唐太廟爲五室春官侍郎賈大隱奏禮天子七廟諸矦五廟百王不易之義今周悰别引浮議廣述異文直崇臨朝權儀不依國家常度皇太后親承顧託光顯大猷其崇先廟室應如諸矦之數國家宗廟不應輒有變移太后乃止太宗髙宗之丗屢欲立明堂諸儒議其制度不決而止及太后稱制獨與北門學士議其制不問諸儒諸儒以爲明堂當在國陽丙巳之地三里之外七里之內太后以爲去宫太逺二月庚午毀乾元殿於其地作明堂以僧懐義爲之使凡役數萬人夏四月戊戌殺太子通事舍人郝象賢象賢處俊之孫也初太后有憾於處俊㑹奴誣告象賢反太后命周興鞫之致象賢族罪象賢家人詣朝堂訟寃於監察御史樂安任玄殖玄殖奏象賢無反狀玄殖坐免官象賢臨刑極口罵太后發揚宫中隱慝奪市人柴以擊刑者金吾兵共格殺之太后命攴解其尸發其父祖墳毀棺焚尸自是終太后之丗法官毎刑人先以木丸塞其口武承嗣使鑿白石爲文曰聖母臨人永昌帝業末紫石雜藥物填之庚午使雍州人唐同泰奉表獻之稱􅀗之於洛水太后喜命其石曰寳圗擢同泰爲遊擊將軍五月戊辰詔當親拜洛受寳圗有事􅀯郊告謝昊天禮畢御明堂朝羣臣命諸州都督剌史及宗室外戚以拜洛前十日集神都乙亥太后加尊號爲聖母神皇六月丁亥朔日有食之壬寅作神皇三璽東陽大長公主削封邑并二子徙巫州公主適髙履行太后以髙氏長孫無忌之舅族故惡之河􅀯道廵撫大使冬官侍郎狄仁傑以呉楚多淫祠奏焚其一千七百餘所獨留夏禹呉太伯季札伍貟四祠秋七月丁巳赦天下更命寳圖爲天授聖圖洛水爲永昌洛水封其神爲顯聖矦加特進禁漁釣祭祀比四瀆名圖所出曰聖圖泉泉側置永昌縣又攺嵩山爲神嶽封其神爲天中王拜太師使持節神嶽大都督禁芻牧又以先於汜水得瑞石攺汜水爲廣武太后潛謀革命稍除宗室絳州刺史韓王元嘉青州剌史霍王元􅁤邢州剌史魯王靈䕫豫州刺史越王貞及元嘉子通州剌史黄公譔元􅁤子金州剌史江都王緒虢王鳯子申州剌史東莞公融靈䕫子范陽王藹貞子博州刺史琅邪王沖在宗室中皆以才行有美名太后尤忌之元嘉等內不自安密有匡復之志譔謬爲書與貞云内人病浸重當速療之若至今冬恐成痼疾及太后召宗室朝明堂諸王因遞相驚曰神皇欲於大饗之際使人告密盡収宗室誅之無遺類譔詐爲皇帝璽書與沖云朕遭幽縶諸王冝各發兵救我沖又詐爲皇帝璽書云神皇欲移李氏社稷以授武氏八月壬寅沖召長史蕭德琮等令募兵分告韓霍魯越及貝州剌史紀王慎各令起兵共趣神都太后聞之以左金吾將軍丘神勣爲清平道行軍大揔管以討之沖募兵得五千餘人欲度河取濟州先擊武水武水令郭務悌詣魏州求救莘令馬玄素將兵千七百人中道邀冲恐力不敵入武水閉門拒守沖推草車塞其􅀯門因風縱火焚之欲乗火突入火作而風回沖軍不得進由是氣沮堂邑董玄寂爲沖將兵擊武水謂人曰琅邪王與國家交戰此乃反也冲聞之斬玄寂以徇衆懼而散入草澤不可禁止惟家僮左右數十人在冲還走博州戊申至城門爲守門者所殺凡起兵七日而敗丘神勣至博州官吏素服出迎神勣揮刃盡殺之凡破千餘家越王貞聞沖起亦舉兵於豫州遣兵陷上蔡九月丙辰命左豹韜大將軍麴崇􅁉爲中軍大揔管岑長倩爲後軍大揔管將兵十萬以討之又命張光輔爲諸軍節度削貞冲屬籍更姓虺氏貞聞沖敗欲自鏁詣闕謝罪㑹所署新蔡令傅延慶募得勇士二千餘人貞乃宣言於衆曰琅邪巳破魏相數州有兵二十萬朝夕至矣發屬縣兵共得五千分爲五營使汝陽縣丞裴守德等將之署九品以上官五百餘人所署官皆受迫脅莫有􅃲志惟守德與之同謀貞以其女妻之署大將軍委以腹心貞使道士及僧誦經以求事成左右及戰士皆帶辟兵符麴崇􅁉等軍至豫州城東四十里貞遣少子規及裴守德拒戰兵潰而歸貞大懼閉閤自守崇􅁉等至城下左右謂貞曰王豈可坐待戮辱貞規守德及其妻皆自殺與沖皆梟首東都闕下􅀄范陽王藹遣使語貞及沖曰若四方諸王一時並起事無不濟諸王往來相約結未定而沖先發惟貞狼狽應之諸王皆不敢發故敗貞之將起兵也遣使告壽州剌史趙瓌瓌妻常樂長公主謂使者曰爲我語越王昔隋文帝將􅆲周室尉遲迥周之甥也猶能舉兵匡救社稷功雖不成威震海內足爲忠烈况汝諸王先帝之子豈得不以社稷爲心今李氏危若朝露汝諸王不捨生取義尚猶豫不發欲何須邪禍且至矣大丈夫當爲忠義􅀑無爲徒死也及貞敗太后欲悉誅韓魯等諸王命監察御史藍田蘇珦桉其密狀珦訊問皆無明驗或告珦與韓魯通謀太后召珦詰之珦抗論不回太后曰卿大雅之士朕當别有任使此獄不必卿也乃命珦於河西監軍更使周興等按之於是収韓王元嘉魯王靈䕫黄公譔常樂公主於東都迫脅皆自殺更其姓曰虺親黨皆誅以文昌左丞狄仁傑爲豫州剌史時治越王貞黨與當坐者六七百家籍没者五千口司刑趣使行刑仁傑密奏彼皆詿誤臣欲顯奏似爲逆人申理知而不言恐乖陛下仁恤之㫖太后特原之皆流豐州道過寧州寧州父老迎勞之曰我狄使君活汝邪相􅂝哭於德政碑下設齋三日而後行時張光輔尚在豫州將士恃功多所求取仁傑不之應光輔怒曰州將輕元帥邪仁傑曰亂河􅀯者一越王貞耳今一貞死萬貞生光輔詰其語仁傑曰明公緫兵三十萬所誅者止於越王貞城中聞官軍至踰城出降者四面成蹊明公縱將士暴掠殺巳降以爲功流血丹野非萬貞而何恨不得尚方斬馬劒加於明公之頸雖死如歸耳光輔不能詰歸奏仁傑不遜左遷復州剌史丁卯左肅政大夫騫味道夏官侍郎王本立並同平章事太后之召宗室朝明堂也東莞公融密遣使問成均助教髙子貢子貢曰來必死融乃稱疾不赴越王貞起兵遣使約融融蒼猝不能應爲官屬所逼執使者以聞擢拜右賛善大夫未幾爲攴黨所引冬十月己亥戮於市籍没其家髙子貢亦坐誅濟州剌史薛顗顗弟緒緒弟駙馬都尉紹皆與琅邪王沖通謀顗聞沖起兵作兵器募人沖敗殺録事參軍髙纂以滅口十一月辛酉顗緒伏誅紹以太平公主故杖一百餓死於獄十二月乙酉司徒青州刺史霍王元􅁤坐與越王連謀廢徙黔州載以檻車行至陳倉而死江都王緒殿中監郕公裴承先皆戮於市承先寂之孫也命裴居道留守西京左肅政大夫同平章事騫味道素不禮於殿中待御史周矩屢言其不能了事㑹有羅告味道者敕矩按之矩謂味道曰公常責矩不了事今日爲公了之乙亥味道及其子辭玉皆伏誅己酉太后拜洛受圖皇帝皇太子皆從内外文武百官蠻夷酋長各依方叙立珍禽竒獸雜寳列於壇前文物鹵簿之盛唐興以來未之有也辛亥明堂成髙二百九十四尺方三百尺凡三層下層法四時各隨方色中層法十二辰上爲圎蓋九龍捧之上層法二十四氣亦爲圓蓋上施鐵鳯髙一丈飾以黄金中有巨木十圍上下通貫栭櫨橕㮰藉以爲本下施鐵渠爲辟雍之象號曰萬象神宫宴賜羣臣赦天下縱民入觀攺河􅀯爲合宫縣又於明堂北起天堂五級以貯大像至三級則俯視明堂矣僧懐義以功拜左威衛大將軍梁國公侍御史王求禮上書曰古之明堂茅茨不翦采椽不斵今者飾以珠玉圖以丹青鐵鷟入雲金龍隱霧昔殷辛瓊臺夏癸瑶室無以加也太后不報太后欲發梁鳯巴蜑自雅州開山通道出擊生羌因襲吐蕃正字陳子昂上書以爲雅州邊羌自國初以來未嘗爲盜今一旦無罪戮之其怨必甚且懼誅滅必蜂起爲盗西山盜起則蜀之邊邑不得不連兵備守兵乆不解臣愚以爲西蜀之禍自此結矣臣聞吐蕃愛蜀富饒欲盗之乆矣徒以山川阻絶障隘不通􅀔不能動今國家乃亂邊羌開隘道使其収奔亡之種爲郷導以攻邊是借寇兵而爲賊除道舉全蜀以遺之也蜀者國家之寳庫可以兼濟中國今執事者乃圗僥倖之利以事西羌得其地不足以稼穡財不足以富國徒爲糜費無益聖德况其成敗未可知哉夫蜀之所恃者險也人之所以安者無役也今國家乃開其險役其人險開則便寇人役則傷財臣恐未見羌戎巳有姦盗在其中矣且蜀人尫劣不習兵戰山川阻曠去中夏逺今無故生西羌吐蕃之患臣見其不及百年蜀爲戎矣國家近廢安北拔單于弃􅀛兹放踈勒天下翕然謂之盛德者蓋以陛下務在養人不在廣地也今山東飢􅀜隴弊而徇貪夫之議謀動甲兵興大役自古國亡家敗未嘗不由黷兵願陛下熟計之既而役不果興永昌元年春正月乙卯朔大饗萬象神宫太后服兖冕搢大珪執鎮珪爲􅀄獻皇帝爲亞獻太子爲終獻先詣昊天上帝座次高祖太宗高宗次魏國先王次五方帝座太后御則天門赦天下攺元丁巳太后御明堂受朝賀戊午布政于明堂頒九條以訓百官己未御明堂饗羣臣二月丁酉尊魏忠孝王曰周忠孝太皇妣曰忠孝太后文水陵曰章德陵咸陽陵曰明義陵置崇先府官戊戌尊魯公曰太原靖王北平王曰趙肅恭王金城王曰魏義康王太原王曰周安成王三月甲子張光輔守納言壬申太后問正字陳子昂當今爲政之要子昂退上䟽以爲宜緩刑崇德息兵革省賦役撫慰宗室各使自安辭婉意切其論甚美幾三千言癸酉以天官尚書武承嗣爲納言張光輔守内史夏四月甲辰殺辰州别駕汝南王煒連州别駕鄱陽公諲等宗室十二人徙其家於嶲州煒惲之子諲元慶之子也己酉殺天官侍郎藍田鄧玄挺玄挺女爲諲妻又與煒善諲謀迎中宗於廬陵以問玄挺煒又嘗謂玄挺曰欲爲急計何如玄挺皆不應故坐知反不告同誅五月丙辰命文昌右相韋待價爲安息道行軍大揔管擊吐蕃浪穹州蠻酋傍時昔等二十五部先附吐蕃至是來降以傍時昔爲浪穹州刺史令統其衆己巳以僧懐義爲新平軍大揔管北討突厥行至紫河不見虜於單于臺刻石紀功而還諸王之起兵也貝州剌史紀王慎獨不預謀亦坐繫獄秋七月丁巳檻車徙巴州更姓虺氏行及蒲州而卒八男徐州剌史東平王續等相繼􅀍誅家徙嶺􅀯女東光縣主楚媛㓜以孝謹稱適司議郎裴仲將相敬如賔姑有疾親嘗藥膳接遇娣姒皆得歡心時宗室諸女皆以驕奢相尚誚楚媛獨儉素曰所貴於冨貴者得適志也今獨守勤苦將以何求楚媛曰幼而好禮今而行之非適志歟觀自古女子皆以恭儉爲美縱侈爲惡辱親是懼何所求乎富貴儻來之物何足驕人衆皆慙服及慎凶問至楚媛號慟嘔血數升免喪不御膏沐者垂二十年韋待價軍至寅識迦河與吐蕃戰大敗㑹大雪糧運不繼待價既無將領之才狼狽失據士卒凍餒死亡甚衆乃引軍還太后大怒丙子待價除名流繡州斬副大揔管安西大都護閻温古安西副都護唐休璟収其餘衆撫安西土太后以休璟爲西州都督戊寅以王本立同鳯閣鸞臺三品徐敬業之敗也弟敬真流繡州逃歸將奔突厥過洛陽洛州司馬弓嗣業洛陽令張嗣明資遣之至定州爲吏所􅀗嗣業縊死嗣明敬真多引海內知識云有異圖冀以免死於是朝野之士爲所連引坐死者甚衆嗣明誣内史張光輔云征豫州日私論圖䜟天文隂懐兩端八月甲申光輔與敬真嗣明等同誅籍没其家乙未秋官尚書太原張楚金陜州刺史郭正一鳯閣侍郎元萬頃洛陽令魏元忠並免死流嶺􅀯楚金等皆爲敬真所引云與敬業通謀臨刑太后使鳯閣舍人王隱客馳􅀐傳聲赦之聲逹於市當刑者皆喜躍讙呼宛轉不巳元忠獨安坐自如或使之起元忠曰虚實未知隱客至又使起元忠曰俟宣敕巳既宣敕乃徐起舞蹈再拜竟無憂喜之色是日隂雲四塞既釋楚金等天氣晴霽九月壬子以僧懐義爲新平道行軍大揔管將兵二十萬以討突厥骨篤禄􅀄髙宗之丗周興以河陽令召見上欲加擢用或奏以非清流罷之興不知數於明堂俟命諸相皆無言地官尚書檢校納言魏玄同時同平章事謂之曰周明府可去矣興以爲玄同沮已銜之玄同素與裴炎善時人以其終始不渝謂之耐乆朋周興奏誣玄同言太后老矣不若奉嗣君爲耐乆太后怒閏月甲午賜死于家監刑御史房濟謂玄同曰丈人何不告密冀得召見可以自直玄同歎曰人殺􅀑殺亦復何殊豈能作告密人邪乃就死又殺夏官侍郎崔詧於隱處自餘內外大臣坐死及流貶甚衆彭州長史劉易從亦爲徐敬真所引戊申就州誅之易從爲人仁孝忠謹將刑於市吏民憐其無辜逺近奔赴競解衣投地曰爲長史求􅁳福有司平凖直十餘萬周興等誣右武衛大將軍燕公黒齒常之謀反徵下獄冬十月戊午常之縊死己未殺宗室鄂州刺史嗣鄭王璥等六人庚申嗣滕王脩􅄾等六人免死流嶺􅀯丁卯春官尚書范履冰鳯閣侍郎邢文偉並同平章事己卯詔太穆神皇后文德聖皇后宜配皇地祗忠孝太后從配右衛胄曹參軍陳子昂上䟽以爲周頌成康漢稱文景皆以能措刑故也今陛下之政雖盡善矣然太平之朝上下樂化不宜有亂臣賊子日犯天誅比者大獄増多逆徒滋廣愚臣頑昧􅀄謂皆實乃去月十五日陛下特察繫囚李珍等無罪百僚慶恱皆賀聖明臣乃知亦有無罪之人挂於踈網者陛下務在寛典獄官務在急刑以傷陛下之仁以誣太平之政臣竊恨之又九月二十一日敕免楚金等死􅀄有風雨變爲景雲臣聞隂慘者刑也陽舒者德也聖人法天天亦助聖天意如此陛下豈可不承順之哉今又隂雨臣恐過在獄官凡繫獄之囚多在極法道路之議或是或非陛下何不悉召見之自詰其罪罪有實者顯示明刑濫者嚴懲獄吏使天下咸服人知政刑豈非至德克明哉天授元年十一月庚辰朔日􅀯至太后享萬象神宫赦天下始用周正攺永昌元年十一月爲載􅀄元年正月以十二月爲臘月夏正月爲一月以周漢之後爲二王後舜禹成湯之後爲三恪周隋之嗣同列國鳯閣侍郎河東宗秦客攺造天地等十二字以獻丁亥行之太后自名曌攺詔曰制秦客太后從父姊之子也乙未司刑少卿周興奏除唐親屬籍臘月辛未以僧懐義爲右衛大將軍賜爵鄂國公春一月戊子武承嗣遷文昌左相岑長倩遷文昌右相同鳯閣鸞臺三品鳯閣侍郎武攸寧爲納言邢文偉守内史左肅政大夫同鳯閣鸞臺三品王本立罷爲地官尚書攸寕士彠之兄孫也時武承嗣三思用事宰相皆下之地官尚書同鳯閣鸞臺三品韋方質有疾承嗣三思往問之方質據牀不爲禮或諌之方質曰死生有命大丈夫安能曲事近戚以求苟免乎尋爲周興等所􅌟甲午流儋州籍没其家二月辛酉太后䇿貢士於洛城殿貢士殿試自此始丁卯地官尚書王本立薨三月丁亥特進同鳯閣鸞臺三品蘇良嗣薨夏四月丁巳春官尚書同平章事范履冰坐嘗舉犯逆者下獄死醴泉人矦思止始以賣餅爲業後事游擊將軍髙元禮爲僕素詭譎無賴恒州刺史裴貞杖一判司判司使思止告貞與舒王元名謀反秋七月辛巳元名坐廢徙和州壬午殺其子豫章王亶貞亦族㓕擢思止爲游擊將軍時吿密者往往得五品思止求爲御史大后曰卿不識字豈堪御史對曰獬豸何嘗識字但能觸邪耳太后恱即以爲朝散大夫侍御史它日太后以先所籍没宅賜之思止不受曰臣惡反逆之人不願居其宅太后益賞之衡水人王弘義素無行嘗從鄰舍乞􅀲不與乃告縣官􅀲田中有白兎縣官使人搜捕蹂踐􅀲田立盡又遊趙貝見閭里􅂄老作邑齋遂告以謀反殺二百餘人擢授游擊將軍俄遷殿中侍御史或告勝州都督王安仁謀反敕弘義按之安仁不服弘義即於枷上刎其首又捕其子適至亦刎其首函之以歸道過汾州司馬毛公與之對食須􅁷叱毛公下階斬之槍揭其首入洛見者無不震栗時置制獄於麗景門內入是獄者非死不出弘義戲呼爲例竟門朝士人人自危相見莫敢交言道路以目或因入朝密遭掩捕每朝輒與家人訣曰未知復相見否時法官競爲深酷唯司刑丞徐有功杜景儉獨存平恕被告者皆曰遇來矦必死遇徐杜必生有功文逺之孫也名弘敏以字行初爲蒲州司法以寛爲治不施敲扑吏相約有犯徐司法杖者衆共斥之迨官滿不杖一人職事亦修累遷司刑丞酷吏所誣􅌟者有功皆爲直之前後所活數十百家嘗廷爭獄事太后厲色詰之左右爲戰栗有功神色不撓爭之彌切太后雖好殺知有功正直甚敬憚之景儉武邑人也司刑丞榮陽李日知亦尚平恕少卿胡元禮欲殺一囚日知以爲不可往復數四元禮怒曰元禮不離刑曹此囚終無生理日知曰日知不離刑曹此囚終無死法竟以兩狀列上日知果直東魏國寺僧法明等撰大雲經四卷表上之言太后乃彌勒佛下生當代唐爲閻浮提主制頒於天下武承嗣使周興羅告隋州刺史澤王上金舒州剌史許王素節謀反徵詣行在素節發舒州聞遭喪哭者歎曰病死何可得乃更哭邪丁亥至龍門縊殺之上金自殺悉誅其諸子及攴黨太后欲以太平公主妻其伯父士讓之孫攸暨攸暨時爲右衛中郎將太后潜使人殺其妻而妻之公主方額廣頥多權略太后以爲類已寵愛特厚常與密議天下事舊制食邑諸王不過千户公主不過三百五十户太平食邑獨累加至三千户八月甲寅殺太子少保納言裴居道癸亥殺尚書左丞張行廉辛未殺􅀯安王潁等宗室十二人又鞭殺故太子賢二子唐之宗室於是殆盡矣其㓜弱存者亦流嶺􅀯又誅其親黨數百家惟千金長公主以巧媚得全自請爲太后女仍攺姓武氏太后愛之更號延安大長公主九月丙子侍御史汲人􅀓遊藝帥􅀜中百姓九百餘人詣闕上表請攺國號曰周賜皇帝姓武氏太后不許擢遊藝爲給事中於是百官及帝室宗戚逺近百姓四夷酋長沙門道士合六萬餘人俱上表如遊藝所請皇帝亦上表自請賜姓武氏戊寅羣臣上言有鳯皇自明堂飛入上陽宫還集左臺梧桐之上乆之飛東􅀯去及赤雀数萬集朝堂庚辰太后可皇帝及羣臣之請壬午御則天樓赦天下以唐爲周攺元乙酉上尊號曰聖神皇帝以皇帝爲皇嗣賜姓武氏以皇太子爲皇孫丙戌立武氏七廟于神都追尊周文王曰始祖文皇帝妣姒氏曰文定皇后平王少子武曰睿神康皇帝妣姜氏曰康惠皇后太原靖王曰嚴祖成皇帝妣曰成莊皇后趙肅恭王曰肅祖章敬皇帝魏義康王曰烈祖昭安皇帝周安成王曰顯祖文穆皇帝忠孝太皇曰太祖孝明髙皇帝妣皆如考謚稱皇后立武承嗣爲魏王三思爲梁王攸寧爲建昌王士彠兄孫攸歸重規載德攸暨懿宗嗣宗攸冝攸望攸緒攸止皆爲郡王諸姑姊皆爲長公主又以司賔卿溧陽史務滋爲納言鳯閣侍郎宗秦客檢校内史給事中􅀓遊藝爲鸞臺侍郎平章事遊藝與岑長倩右玉鈐衛大將軍張䖍勗左金吾大將軍丘神勣侍御史來子珣等並賜姓武秦客潛勸太后革命故首爲内史遊藝朞年之中歴衣青緑朱紫時人謂之四時仕宦敕攺州爲郡或謂太后曰陛下始革命而廢州不祥太后遽追止之命史務滋等十人存撫諸道癸卯太后立兄孫延基等六人爲郡王冬十月甲子檢校内史宗秦客坐􅂍貶遵化尉弟楚客􅀳卿亦以姦􅂍流嶺外丁卯殺流人韋方質辛未內史邢文偉坐附㑹宗秦客貶珍州剌史頃之有制使至州文偉以爲誅巳遽自縊死壬申敕兩京諸州各置大雲寺一區藏大雲經使僧升髙座講解其撰䟽僧雲宣等九人皆賜爵縣公仍賜紫袈裟銀􅀛袋制天下武氏咸蠲課役西突厥十姓自垂拱以來爲東突厥所侵掠散亡略盡濛池都護繼往絶可汗斛瑟羅収其餘衆六七萬人入居內地拜左衛大將軍攺號竭忠事主可汗道州剌史李行襃兄弟爲酷吏所陷當族秋官郎中徐有功固爭不能得秋官侍郎周興奏有功故出反囚當斬太后雖不許亦免有功官然太后雅重有功乆之復起爲侍御史有功伏地流涕固辭曰臣聞鹿走山林而命懸庖厨􅀔使之然也陛下以臣爲法官臣不敢枉陛下法必死是官矣太后固授之逺近聞者相賀是􅀊以右衛大將軍泉獻誠爲左衛大將軍太后出金寳命選􅀯北牙善射者五人賭之獻誠第一以讓右玉鈐衛大將軍薛咄摩咄摩復讓獻誠獻誠乃奏言陛下令選善射者今多非漢官竊恐四夷輕漢請停此射太后善而從之二年正月癸酉朔太后始受尊號于萬象神宫旗幟尚赤甲戌攺置社稷於神都辛巳納武氏神主于太廟唐太廟之在長安者更命曰享德廟四時唯享髙祖巳下三廟餘四室皆閉不享又攺長安崇先廟爲崇尊廟乙酉日􅀯至大享明堂祀昊天上帝百神從祀武氏祖宗配享唐三帝亦同配御史中丞知大夫事李嗣真以酷吏縱横上䟽以爲今告事紛紜虚多實少恐有凶慝隂謀離間陛下君臣古者獄成公卿參聽王必三宥然後行刑比日獄官單車奉使推鞫既定法家依斷不令重推或臨時專決不復聞奏如此則權由臣下非審慎之法儻有寃濫何由可知况以九品之官專命推覆操殺生之柄竊人主之威案覆既不在秋官省審復不由門下國之利器輕以假人恐爲社稷之禍太后不聽饒陽尉姚貞亮等數百人表請上尊號曰上聖大神皇帝不許侍御史來子珣誣尚衣奉御劉行感兄弟謀反皆坐誅春一月地官尚書武思文及朝集使二千八百人表請封中嶽己亥廢唐興寧永康隱陵署官唯量置守户左金吾大將軍丘神勣以罪誅納言史務滋與來俊臣同鞫劉行感獄俊臣奏務滋與行感親密意欲寢其反狀太后命俊臣并推之庚子務滋恐懼自殺或告文昌右丞周興與丘神勣通謀太后命來俊臣鞫之俊臣與興方推事對食謂興曰囚多不承當爲何法興曰此甚易耳取大甕以炭四周炙之令囚入中何事不承俊臣乃索大甕火圍如興法因起謂興曰有內狀推兄請兄入此甕興惶恐叩頭服罪法當死太后原之二月流興嶺􅀯在道爲仇家所殺興與索元禮來俊臣競爲暴刻興元禮所殺各數千人俊臣所破千餘家元禮殘酷尤甚太后亦殺之以慰人望徙左衛大將軍千乗王武攸暨爲定王立故太子賢之子光順爲義豐王甲子太后命始祖墓曰德陵睿祖墓曰喬陵嚴祖墓曰節陵肅祖墓曰簡陵烈祖墓曰靖陵顯祖墓曰永陵攺章德陵爲昊陵顯義陵爲順陵追復李君羡官爵夏四月壬寅朔日有食之癸卯制以釋教開革命之階升於道教之上命建安王攸宜留守長安丙辰鑄大鍾置北闕五月以岑長倩爲武威道行軍大揔管擊吐蕃中道召還軍竟不出六月以左肅政大夫格輔元爲地官尚書與鸞臺侍郎樂思晦鳯閣侍郎任知古並同平章事思晦彦瑋之子也秋七月徙􅀜內户數十萬以實洛陽八月戊申納言武攸寧罷爲左羽林大將軍夏官尚書歐陽通爲司禮卿兼判納言事庚申殺玉鈐衛大將軍張䖍勗來俊臣鞫䖍勗獄䖍勗自訟於徐有功俊臣怒命衛士以刀亂斫殺之梟首于市義豐王光順嗣雍王守禮永安王守義長信縣主等皆賜姓武氏與睿宗諸子皆幽閉宫中不出門庭者十餘年守禮守義光順之弟也或告地官尚書武思文􅀄與徐敬業通謀甲子流思文於嶺南復姓徐氏九月乙亥殺岐州剌史雲弘嗣來俊臣鞫之不問二欵先斷其首乃僞立案奏之其殺張䖍勗亦然敕㫖皆依海內鉗口鸞臺侍郎同平章事􅀓遊藝夢登湛露殿以語所親所親告之壬辰下獄自殺癸巳以左羽林衛大將軍建昌王武攸寧爲納言洛州司馬狄仁傑爲地官侍郎與冬官侍郎裴行本並同平章事太后謂仁傑曰卿在汝􅀯甚有善政卿欲知譛卿者名乎仁傑謝曰陛下以臣爲過臣請攺之知臣無過臣之幸也不願知譛者名太后深歎美之先是鳯閣舍人脩武張嘉福使洛陽人王慶之等數百人上表請立武承嗣爲皇太子文昌右相同鳯閣鸞臺三品岑長倩以皇嗣在東宫不宜有此議奏請切上書者告示令散太后又問地官尚書同平章事格輔元輔元固稱不可由是大忤諸武意故斥長倩令西征吐蕃未至徵還下制獄承嗣又譛輔元來俊臣又脅長倩子靈原令引司禮卿兼判納言事歐陽通等數十人皆云同反通爲俊臣所訊五毒僃至終無異詞俊臣乃詐爲通欵冬十月己酉長倩輔元通等皆坐誅王慶之見太后太后曰皇嗣我子柰何廢之對曰神不歆非類民不祀非族今誰有天下而以李氏爲嗣乎太后諭遣之慶之伏地以死泣請不去太后乃以印紙遺之曰欲見我以此示門者自是慶之屢求見太后頗怒之命鳯閣侍郎李昭德賜慶之杖昭德引出光政門外以示朝士曰此賊欲廢我皇嗣立武承嗣命撲之耳目皆血出然後杖殺之其黨乃散昭德因言於太后曰天皇陛下之夫皇嗣陛下之子陛下身有天下當傳之子孫爲萬代業豈得以姪爲嗣乎自古未聞姪爲天子而爲姑立廟者也且陛下受天皇顧託若以天下與承嗣則天皇不血食矣太后亦以爲然昭德乾祐之子也壬辰殺鸞臺侍郎同平章事樂思晦右衛將軍李安靜安靜綱之孫也太后將革命王公百官皆上表勸進安靜獨正色拒之及下制獄來俊臣詰其反狀安靜曰以我唐家老臣須殺即殺若問謀反實無可對俊臣竟殺之太學生王循之上表乞假還郷太后許之狄仁傑曰臣聞君人者唯殺生之柄不假人自餘皆歸之有司故左右丞徒以下不句左右相流以上乃判爲其漸貴故也彼學生求假丞簿事耳若天子爲之發敕則天下之事幾敕可盡乎必欲不違其願請普爲立制而巳太后善之資治通鑑卷第二百四
