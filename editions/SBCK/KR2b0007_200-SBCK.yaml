front:
  text: 資治通鑑卷第二百
  hash: sha256:4a6c322342c79ebb922f4cf14b488fb5084c8d6b1f7c44d89f8b29e014e86937
body:
  text: 臣司馬光奉勑編集唐紀十六閹茂七月凡六年有奇起旃䝉單閼十月盡􅀇黓高宗天皇大聖大􅀪孝皇帝上之下永徽六年冬十月己酉下詔稱王皇后蕭淑妃謀行鴆毒廢爲庶人母及兄弟並除名流嶺南許敬宗奏故特進贈司空王仁祐告身尚存使逆亂餘孽猶得爲䕃並請除削從之乙卯百官上表請立中宫乃下詔曰武氏門著勲庸地華纓黻往以才行選入後庭譽重椒闈德光蘭掖朕昔在儲貳特荷先慈常得侍從弗離朝夕宫壼之内恒自飭躬嬪嬙之間未曾迕目聖情鑒悉毎垂賞歎遂以武氏賜朕事同政君可立爲皇后丁巳赦天下是日皇后上表稱陛下前以妾爲宸妃韓瑗來濟面折庭爭此既事之極難豈非深情爲國乞加襃賞上以表示瑗等瑗等彌憂懼屢請去位上不許十一月丁卯朔臨軒命司空李勣齎璽綬冊皇后武氏是日百官朝皇后於肅義門故后王氏淑妃蕭氏並囚於别院上嘗念之閒行至其所見其室封閉極宻惟竅壁以通食器惻然傷之呼曰皇后淑妃安在王氏泣對曰妾等得罪爲宫婢何得更有尊稱又曰至尊若念疇昔使妾等再見日月乞名此院爲囘心院上曰朕即有處置武后聞之大怒遣人杖王氏及蕭氏各一百斷去手足投酒甕中曰令二嫗骨醉數日而死又斬之王氏初聞宣敕再拜曰願大家萬歲昭儀承恩死自吾分淑妃罵曰阿武妖猾乃至於此願它生我爲猫阿武爲鼠生生扼其喉由是宫中不畜猫尋又改王氏姓爲蟒氏蕭氏爲梟氏武后數見王蕭爲祟被髪瀝血如死時狀後徙居蓬萊宫復見之故多在洛陽終身不歸長安己巳許敬宗奏曰永徽爰始國本未生權引彗星越升明兩近者元妃載誕正胤降神重光日融爝暉宜息安可反植枝幹久易位於天庭倒襲裳衣使違方於震位又父子之際人所難言事或犯鱗必嬰嚴憲煎膏染鼎臣亦甘心上召見問之對曰皇太子國之本也本猶未正萬國無所係心且在東宫者所出本微今知國家已有正嫡必不自安竊位而懐自疑恐非宗廟之福願陛下熟計之上曰忠已自讓對曰能為太伯願速從之西突厥頡苾達度設數遣使請兵討沙鉢羅可汗甲戌遣豐州都督元禮臣冊拜頡苾達度設為可汗禮臣至碎葉城沙鉢羅發兵拒之不得前頡苾逹度設部落多為沙鉢羅所併餘衆寡弱不為諸姓所附禮臣竟不冊拜而歸中書侍郎李義府參知政事義府容貎温恭與人語必嬉怡微笑而狡險忌克故時人謂義府笑中有刀又以其柔而害物謂之李猫顯慶元年春正月辛未以皇太子忠為梁王梁州刺史立皇后子代王弘為皇太子生四年矣忠既廢官屬皆懼罪亡匿無敢見者右庶子李安仁獨侯忠泣涕拜辭而去安仁綱之孫也壬申赦天下改元二月辛亥贈武士彠司徒賜爵周國公三月以度支侍郎杜正倫為黄門侍郎同三品夏四月壬子矩州人謝無靈舉兵反黔州都督李子和討平之己未上謂侍臣曰朕思養人之道未得其要公等為朕陳之來濟對曰昔齊桓公出遊見老而飢寒者命賜之食老人曰願賜一國之飢者賜之衣曰願賜一國之寒者公曰寡人之廩府安足以周一國之飢寒老人曰君不奪農時則國人皆有餘食矣不奪蠶要則國人皆有餘衣矣故人君之養人在省其征役而已今山東役丁歲别數萬役之則人大勞取庸則人大費臣願陛下量公家所須外餘悉免之上從之六月辛亥禮官奏停太祖世祖配祀以高祖配昊天於圓丘太宗配五帝於明堂從之秋七月乙丑西洱蠻酋長楊棟附顯和蠻酋長王羅祁郎昆棃盤四州酋長王伽衝等帥衆内附癸未以中書令崔敦禮爲太子少師同中書門下三品八月丙申固安昭公崔敦禮薨辛丑葱山道行軍揔管程知節擊西突厥與歌邏禄處月二部戰於榆慕谷大破之斬首千餘級副揔管周智度攻突騎施處木昆等部於咽城拔之斬首三萬級乙巳􅀛兹王布失畢入朝李義府恃寵用事洛州婦人淳于氏美色繫大理獄義府屬大理寺丞畢正義柱法出之將納爲妾大理卿段寳玄疑而奏之上命給事中劉仁軌等鞫之義府恐事洩逼正義自縊於獄中上知之原義府罪不問侍御史漣水王義方欲奏彈之先白其母曰義方爲御史視姦臣不糾則不忠糾之則身危而憂及於親爲不孝二者不能自决柰何母曰昔王陵之母殺身以成子之名汝能盡忠以事君吾死不恨義方乃奏稱義府於輦轂之下擅殺六品寺丞就云正義自殺亦由畏義府威殺身以滅口如此則生殺之威不由上出漸不可長請更加勘當於是對仗叱義府令下義府顧望不退義方三叱上既無言義府始趨出義方乃讀彈文上釋義府不問而謂義方毀辱大臣言詞不遜貶萊州司戸九月庚辰括州暴風海溢溺四千餘家冬十一月丙寅生羌酋長浪我利波等帥衆内附以其地置柘栱二州十二月程知節引軍至鷹娑川遇西突厥二萬騎别部䑕尼施等二萬餘騎繼至前軍揔管蘇定方帥五百騎馳往擊之西突厥大敗追奔二十里殺獲千五百餘人獲馬及器械綿亘山野不可勝計副大揔管王文度害其功言於知節曰今兹雖云破賊官軍亦有死傷乗危輕脫乃成敗之灋耳何急而爲此自今當結方陳置輜重在内遇賊則戰此萬全䇿也又矯稱别得㫖以知節恃勇輕敵委文度爲之節制遂収軍不許深入士卒終日跨馬被甲結陳不勝疲頓馬多瘦死定方言於知節曰出師欲以討賊今乃自守坐自困敝若遇賊必敗懦怯如此何以立功且主上以公爲大將豈可更遣軍副専其號令事必不然請囚文度飛表以聞知節不從至􅁪篤城有羣胡歸附文度曰此屬伺我旋師還復爲賊不如盡殺之取其資財定方曰如此乃自爲賊耳何名伐叛文度竟殺之分其財獨定方不受師旋文度坐矯詔當死特除名知節亦坐逗遛追賊不及減死免官是歲以太常卿駙馬都尉高履行爲益州長史韓瑗上䟽爲褚遂良訟寃曰遂良體國忘家捐身徇物風霜其操鐵石其心社稷之舊臣陛下之賢佐無聞罪状斥去朝廷内外甿黎咸嗟舉措臣聞晉武弘裕不貽劉毅之誅漢祖深仁無恚周昌之直而遂良被遷已經寒暑違忤陛下其罰塞焉伏願緬鑒無辜稍寛非罪俯矜微􅅃以順人情上謂瑗曰遂良之情朕亦知之然其悖戾好犯上故以此責之卿何言之深也對曰遂良社稷忠臣爲讒䛕所毀昔微子去而殷國以亡張華存而綱紀不亂陛下無故弃逐舊臣恐非國家之福上不納瑗以言不用乞歸田里上不許劉洎之子訟其父寃稱貞觀之末爲禇遂良所譛而死李義府復助之上以問近臣衆希義府之㫖皆言其枉給事中長安樂彥瑋獨曰劉洎大臣人主暫有不豫豈得遽自比伊霍今雪洎之罪謂先帝用刑不當乎上然其言遂寢其事二年春正月癸巳分哥羅祿部置隂山大漠二都督府閏月壬寅上行幸洛陽庚戍以右屯衛將軍蘇定方爲伊麗道行軍揔管帥燕然都䕶渭􅀯任雅相副都䕶蕭嗣業發回紇等兵自北道討西突厥沙鉢羅可汗嗣業鉅之子也初右衛大將軍阿史那彌射及族兄左屯衛大將軍步眞皆西突厥酋長太宗之世帥衆來降至是詔以彌射步眞爲流沙安撫大使自南道招集舊衆二月辛酉車駕至洛陽宫庚午立皇子顯爲周王壬申徙雍王素節爲郇王三月甲辰以潭州都督禇遂良爲桂州都督癸丑以李義府兼中書令夏五月丙申上幸明德宫避暑上自即位毎日視事庚子宰相奏天下無虞請隔日視事許之秋七月丁亥朔上還洛陽宫王玄策之破天笁也得方士那羅邇娑婆寐以歸自言有長生之術太宗頗信之深加禮敬使合長生藥發使四方求奇藥異石又發使詣婆羅門諸國采藥其言率皆迃誕無實茍欲以延歲月藥竟不就乃放還上即位復詣長安又遣歸玄策時爲道王友辛亥奏言此婆羅門實能合長年藥自詭必成今遣歸可惜失之玄策退上謂侍臣曰自古安有神仙秦始皇漢武帝求之疲弊生民卒無所成果有不死之人今皆安在李勣對曰誠如聖言此婆羅門今兹再來容髪衰白已改於前何能長生陛下遣之内外皆喜娑婆寐竟死於長安許敬宗李義府希皇后㫖誣奏侍中韓瑗中書令來濟與禇遂良潛謀不軌以桂州用武之地授遂良桂州都督欲以爲外援八月丁卯瑗坐貶振州刺史濟貶台州刺史終身不聽朝覲又貶禇遂良爲愛州刺史榮州刺史柳奭爲象州刺史遂良至愛州上表自陳往者濮王承乾交爭之際臣不顧死亡歸心陛下時岑文本劉洎奏稱承乾惡狀已彰身在别所其於東宮不可少時虚曠請且遣濮王往居東宫臣又抗言固爭皆陛下所見卒與无忌等四人共定大策及先朝大漸獨臣與无忌同受遺詔陛下在草土之辰不勝哀慟臣以社稷寛譬陛下手抱臣頸臣與无忌區處衆事咸無廢闕數日之間内外寜謐力小任重動罹愆過螻蟻餘齒乞陛下哀憐表奏不省己巳禮官奏四郊迎氣存太微五帝之祀南郊明堂廢緯書六天之義其方丘祭地之外别有神州亦請合爲一祀從之辛未以禮部尚書許敬宗爲侍中兼度支尚書杜正倫爲兼中書令冬十月戊戌上行幸許州乙巳畋于滍水之南壬子至汜水曲十二月乙卯朔車駕還洛陽宫蘇定方擊西突厥沙鉢羅可汗至金山北先擊處木昆部大破之其俟斤嬾獨祿等帥萬餘帳來降定方撫之發其千騎與俱右領軍郎將薛仁貴上言泥孰部素不伏賀魯爲賀魯所破虜其妻子今唐兵有破賀魯諸部得泥孰妻子者宜歸之仍加賜賚使彼明知賀魯爲賊而大唐爲之父母則人致其死不遺力矣上從之泥孰喜請從軍共擊賀魯定方至曵咥河西沙鉢羅帥十姓兵且十萬來拒戰定方將唐兵及回紇萬餘人擊之沙鉢羅輕定方兵少直進圍之定方令步兵據南原攅矟外向自將騎兵陳於北原沙鉢羅先攻步軍三衝不動定方引騎兵擊之沙鉢羅大敗追奔三十里斬獲數萬人明日勒兵復進於是胡禄屋等五弩失畢悉衆來降沙鉢羅獨與處木昆屈律啜數百騎西走時阿史那步眞出南道五咄陸部落聞沙鉢羅敗皆詣步眞降定方乃命蕭嗣業回紇婆閏將胡兵趨邪羅斯川追沙鉢羅定方與任雅相將新附之衆繼之㑹大雪平地二尺軍中咸請俟晴而行定方曰虜恃雪深謂我不能進必休息士馬亟追之可及若緩之彼遁逃浸逺不可復追省日兼功在此時矣乃蹋雪晝夜兼行所過収其部衆至䨇河與彌射步眞兵合去沙鉢羅所居二百里布陳長驅徑至其牙帳沙鉢羅與其徒將獵定方掩其不備縱兵擊之斬獲數萬人得其鼔纛沙鉢羅與其子咥運壻閻啜等脱走趣石國定方於是息兵諸部各歸所居通道路置郵驛掩骸骨問疾苦畫疆場復生業凡爲沙鉢羅所掠者悉括還之十姓安堵如故乃命蕭嗣業將兵追沙鉢羅定方引軍還沙鉢羅至石國西北蘇咄城人馬飢乏遣人齎珍寳入城市馬城主伊沮達官詐以酒食出迎誘之入閉門執之送于石國蕭嗣業至石國石國人以沙鉢羅授之乙丑分西突厥地置濛池崑陵二都䕶府以阿史那彌射爲左衛大將軍崑陵都䕶興昔亡可汗押五咄陸部落阿史那步眞爲左衛大將軍濛池都䕶繼往絶可汗押五弩失畢部落遣光祿卿盧承慶持節冊命仍命彌射步眞與承慶據諸姓降者凖其部落大小位望髙下授刺史以下官丁卯以洛陽宫爲東都洛州官吏員品並如雍州是歲詔自今僧尼不得受父母及尊者禮拜所司明有法制禁斷以吏部侍郎劉祥道爲黄門侍郎仍知吏部選事祥道以爲今選司取士傷濫每年入流之數過一千四百雜色入流曾不銓簡即日内外文武官一品至九品凡萬三千四百六十五員約凖三十年則萬三千餘人略盡矣若年别入流者五百人足充所須之數望有釐革既而杜正倫亦言入流人太多上命正倫與祥道詳議而大臣憚於改作事遂寢祥道林甫之子也三年春正月戊子長孫无忌等上所修新禮詔中外行之先是議者謂貞觀禮節文未備故命无忌等修之時許敬宗李義府用事所損益多希㫖學者非之太常博士蕭楚材等以爲豫備凶事非臣子所宜言敬宗義府深然之遂焚國恤一篇由是凶禮遂闕初􅀛兹王布失畢妻阿史那氏與其相那利私通布失畢不能禁由是君臣猜阻各有黨與互來告難上兩召之既至囚那利遣左領軍郎將雷文成送布失畢歸國至􅀛兹東境泥師城􅀛兹大將羯獵顚發衆拒之仍遣使降於西突厥沙鉢羅可汗布失畢據城自守不敢進詔左屯衛大將軍楊冑發兵討之㑹布失畢病卒冑與羯獵顚戰大破之擒羯獵顚及其黨盡誅之乃以其地爲􅀛兹都督府戊申立布失畢之子素稽爲􅀛兹王兼都督二月丁巳上發東都甲戍至京師夏五月癸未徙安西都䕶府於􅀛兹以舊安西復爲西州都督府鎮高昌故地六月營州都督兼東夷都䕶程名振右領軍中郎將薛仁貴將兵攻高麗之赤烽鎮拔之斬首四百餘級捕虜百餘人高麗遣其大將豆方婁帥衆三萬拒之名振以契丹逆擊大破之斬首二千五百級秋八月甲寅播羅哀獠酋長多胡桑等帥衆内附冬十月庚申吐蕃賛普來請婚中書令李義府有寵於上諸子孩抱者並列清貴而義府貪冒無厭母妻及諸子女壻賣官鬻獄其門如市多樹朋黨傾動朝野中書令杜正倫毎以先進自處義府恃恩不爲之下由是有隙與義府訟於上前上以大臣不和兩責之十一月乙酉貶正倫横州刺史義府普州刺史正倫尋卒於横州阿史那賀魯既被擒謂蕭嗣業曰我本亡虜爲先帝所存先帝遇我厚而我負之今日之敗天所怒也吾聞中國刑人必於市願刑我於昭陵之前以謝先帝上聞而憐之賀魯至京師甲午獻于昭陵敕免其死分其種落爲六都督府其所役屬諸國皆置州府西盡波斯並􅀠安西都䕶府賀魯尋死葬於頡利墓側戊戌以許敬宗爲中書令大理卿辛茂將爲兼侍中開府儀同三司鄂忠武公尉遲敬德薨敬德晚年閑居學延年術修飾池臺奏清商樂以自奉養不交通賓客凡十六年年七十四以病終朝廷恩禮甚厚是歳愛州刺史禇遂良卒雍州司士許禕與來濟善侍御史張倫與李義府有怨吏部尚書唐臨奏以禕爲江南道巡察使倫爲劒南道巡察使是時義府雖在外皇后常保䕶之以臨爲挾私選授四年春二月乙丑免臨官三月壬午西突厥興昔亡可汗與眞珠葉䕶戰于䨇河斬眞珠葉䕶夏四月丙辰以于志寧爲太子太師同中書門下三品乙丑以黄門侍郎許圉師參知政事武后以太尉趙公長孫无忌受重賜而不助已深怨之及議廢王后燕公于志寧中立不言武后亦不悅許敬宗屢以利害說无忌无忌毎面折之敬宗亦怨武后既立无忌内不自安后令敬宗伺其隙而陷之㑹洛陽人李奉節告太子洗馬韋季方監察御史李巢朋黨事敕敬宗與辛茂將鞫之敬宗按之急季方自刺不死敬宗因誣奏季方欲與无忌構陷忠臣近戚使權歸无忌伺隙謀反今事覺故自殺上驚曰豈有此邪舅爲小人所間小生疑阻則有之何至於反敬宗曰臣始末推究反狀已露陛下猶以爲疑恐非社稷之福上泣曰我家不幸親戚間屢有異志往年髙陽公主與房遺愛謀反今元舅復然使朕慙見天下之人兹事若實如之何對曰遺愛乳臭兒與一女子謀反勢何所成无忌與先帝謀取天下天下服其智爲宰相三十年天下畏其威若一旦竊發陛下遣誰當之今賴宗廟之靈皇天疾惡因按小事乃得大姦實天下之慶也臣竊恐无忌知季方自刺窘急發謀攘袂一呼同惡雲集必爲宗廟之憂臣昔見宇文化及父述爲煬帝所親任結以昬姻委以朝政述卒化及復典禁兵一夕於江都作亂先殺不附己者臣家亦豫其禍於是大臣蘇威裴矩之徒皆舞蹈馬首惟恐不及黎明遂傾隋室前事不逺願陛下速决之上命敬宗更加審察明日敬宗復奏曰去夜季方已承與无忌同反臣又問季方无忌與國至親累朝寵任何恨而反季方答云韓瑗嘗語无忌云柳奭禇遂良勸公立梁王爲太子今梁王既廢上亦疑公故出高履行於外自此无忌憂恐漸爲自安之計後見長孫祥又出韓瑗得罪日夜與季方等謀反臣參驗辭狀咸相符合請収捕準灋上又泣曰舅若果爾朕决不忍殺之若殺之天下將謂朕何後世將謂朕何敬宗對曰薄昭漢文帝之舅也文帝從代來昭亦有功所坐止於殺人文帝遣百官素服哭而殺之至今天下以文帝爲明主今无忌忘兩朝之大恩謀移社稷其罪與薄昭不可同年而語也幸而姦狀自發逆徒引服陛下何疑猶不早决古人有言當斷不斷反受其亂安危之機間不容髮无忌今之姦雄王莽司馬懿之流也陛下少更遷延臣恐變生肘腋悔無及矣上以爲然竟不引問无忌戊辰下詔削无忌太尉及封邑以爲揚州都督於黔州安置凖一品供給祥无忌之從父兄子也前此自工部尚書出爲荆州長史故敬宗以此誣之敬宗又奏无忌謀逆由禇遂良柳奭韓瑗構扇而成奭仍潛通宫掖謀行鴆毒于志寕亦黨附无忌於是詔追削遂良官爵除奭瑗名免志寕官遣使發道次兵援送无忌詣黔州无忌子祕書監駙馬都尉冲等皆除名流嶺表遂良子彥甫彥冲流愛州於道殺之益州長史高履行累貶洪州都督五月丙申兵部尚書任雅相度支尚書盧承慶並參知政事承慶思道之孫也凉州刺史趙持滿多力善射喜任俠其從母爲韓瑗妻其舅駙馬都尉長孫銓无忌之族弟也銓坐无忌流嶲州許敬宗恐持滿作難誣云无忌同反驛召至京師下獄訊掠備至終無異辭曰身可殺也辭不可更吏無如之何乃代爲獄辭結奏戊戌誅之尸於城西親戚莫敢視友人王方翼歎曰欒布哭彭越義也文王葬枯骨仁也下不失義上不失仁不亦可乎乃収而葬之上聞之不罪也方翼廢后之從祖兄也長孫銓至流所縣令希㫖杖殺之六月丁卯詔改氏族志爲姓氏錄初太宗命高士廉等修氏族志升降去取時稱允當至是許敬宗等以其書不叙武氏本望奏請改之乃命禮部郎中孔志約等比類升降以后族爲第一等其餘悉以仕唐官品髙下爲凖凡九等於是士卒以軍功致位五品者豫士流時人謂之勲格許敬宗議封禪儀巳巳奏請以高祖太宗俱配昊天上帝太穆文德二皇后俱配皇地祗從之秋七月命御史往高州追長孫恩象州追柳奭振州追韓瑗並枷鏁詣京師仍命州縣簿錄其家恩无忌之族弟也壬寅命李勣許敬宗辛茂將與任雅相盧承慶更共覆按无忌事許敬宗又遣中書舍人袁公瑜等詣黔州再鞫无忌反狀至則逼无忌令自縊詔柳奭韓瑗所至斬決使者殺柳奭于象州韓瑗巳死發驗而還籍没三家近親皆流嶺􅀯爲奴婢常州刺史長孫祥坐與无忌通書處絞長孫恩流檀州八月壬子以普州刺史李義府兼吏部尚書同中書門下三品義府既貴自言本出趙郡與諸李叙昭穆無頼之徒藉其權勢拜伏爲兄叔者甚衆給事中李崇德初與同譜及義府出爲普州即除之義府聞而銜之及復爲相使人誣構其罪下獄自殺乙卯長孫氏柳氏縁无忌奭貶降者十三人高履行貶永州刺史于志寜貶榮州刺史于氏貶者九人自是政歸中宫矣九月詔以石米史大安小安曹拔汗那北拔汗那悒怛踈勒朱駒半等國置州縣府百二十七冬十月丙午太子加元服赦天下初太宗疾山東士人自矜門地昏姻多責資財命修氏族志例降一等王妃主壻皆取􅈴臣家不議山東之族而魏徴房玄齡李勣家皆盛與爲昏常左右之由是舊望不減或一姓之中更分某房某眷高下懸隔李義府爲其子求昏不獲恨之故以先帝之㫖勸上矯其弊壬戌詔後魏隴西李寳太原王瓊滎陽鄭温范陽盧子遷盧渾盧輔清河崔宗伯崔元孫前燕博陵崔懿晉趙郡李楷等子孫不得自爲昬姻仍定天下嫁女受財之數毋得受陪門財然族望爲時俗所尚終不能禁或載女竊送夫家或女老不嫁終不與異姓爲昏其衰宗落譜昭穆所不齒者往往反自稱禁昏家益增厚價閏月戊寅上發京師留太子監國太子思慕不已上聞之遽召赴行在戊戌車駕至東都十一月丙午以許圉師爲散騎常侍檢校侍中戊午侍中兼左庶子辛茂將薨思結俟斤都曼帥踈勒朱俱謁般陁三國反擊破于闐癸亥以左驍衞大將軍蘇定方爲安撫大使以討之以盧承慶同中書門下三品右領軍中郎將薛仁貴等與高麗將温沙門戰於横山破之蘇定方軍至業葉水思結保馬頭川定方選精兵萬人騎三千匹馳往襲之一日一夜行三百里詰旦至城下都曼大驚戰於城外都曼敗退保其城及暮諸軍繼至遂圍之都曼懼而出降五年春正月定方獻俘於乾陽殿灋司請誅都曼定方請曰臣許以不死故都曼出降願匄其餘生上曰朕屈灋以全卿之信乃免之甲子上發東都二月辛巳至并州三月丙午皇后宴親戚故舊鄰里於朝堂婦人於内殿班賜有差詔并州婦人年八十以上皆版授郡君百濟恃高麗之援數侵新羅新羅王春秋上表求救辛亥以左武衞大將軍蘇定方爲神丘道行軍大揔管帥左驍衛將軍劉伯英等水陸十萬以伐百濟以春秋爲嵎夷道行軍揔管將新羅之衆與之合勢夏四月戊寅上發并州癸巳至東都五月作合璧宫壬戌上幸合璧宫戊辰以定襄都督阿史德樞賔左武􅀱將軍延陁梯眞居延州都督李合珠並爲冷岍道行軍揔管各將所部兵以討叛奚仍命尚書右丞崔餘慶充使揔䕶三部兵奚尋遣使降更以樞賔等爲沙磚道行軍揔管以討契丹擒契丹松漠都督阿卜固送東都六月庚午朔日有食之甲午車駕還洛陽宫房州刺史梁王忠年浸長頗不自安或私衣婦人服以備刺客又數自占吉凶或告其事秋七月乙巳廢忠爲庶人徙黔州囚於承乾故宅丁卯度支尚書同中書門下三品盧承慶坐科調失所免官八月吐蕃禄東賛遣其子起政將兵擊吐谷渾以吐谷渾内附故也蘇定方引軍自成山濟海百濟據熊津江口以拒之定方進擊破之百濟死者數千人餘皆潰走定方水陸齊進直趣其都城未至二十餘里百濟傾國來戰大破之殺萬餘人追奔入其郭百濟王義慈及太子隆逃于北境定方進圍其城義慈次子泰自立爲王帥衆固守隆子文思曰王與太子皆在而叔遽擁兵自王借使能却唐兵我父子必不全矣遂帥左右踰城來降百姓皆從之泰不能止定方命軍士登城立幟泰窘迫開門請命於是義慈隆及諸城主皆降百濟故有五部分統三十七郡二百城七十六萬戸詔以其地置熊津等五都督府以其酋長爲都督刺史壬午左武衞大將軍鄭仁泰將兵討思結抜也固僕骨同羅四部三戰皆捷追奔百餘里斬其酋長而還冬十月上初苦風􅅭頭重目不能視百司奏事上或使皇后决之后性明敏涉獵文史處事皆稱㫖由是始委以政事權與人主侔矣十一月戊戌朔上御則天門樓受百濟俘自其王義慈以下皆釋之蘇定方前後滅三國皆生擒其主赦天下甲寅上幸許州十二月辛未畋於長社己卯還東都壬午以左驍衞大將軍契苾何力爲浿江道行軍大揔管左武衞大將軍蘇定方爲遼東道行軍大揔管左驍衞將軍劉伯英爲平壤道行軍大揔管蒲州刺史程名振爲鏤方道揔管將兵分道擊高麗青州刺史劉仁軌坐督海運覆船以白衣從軍自効龍朔元年春正月乙卯募河南北淮南六十七州兵得四萬四千餘人詣平壤鏤方行營戊午以鴻臚卿蕭嗣業爲扶餘道行軍揔管帥回紇等諸部兵詣平壤二月乙未晦改元三月丙申朔上與羣臣及外夷宴於洛城門觀屯營新教之舞謂之一戎大定樂時上欲親征高麗以象用武之勢也初蘇定方既平百濟留郎將劉仁願鎮守百濟府城又以左衞中郎將王文度爲熊津都督撫其餘衆文度濟海而卒百濟僧道琛故將福信聚衆據周留城迎故王子豐於倭國而立之引兵圍仁願於府城詔起劉仁軌檢校帶方州刺史將王文度之衆便道發新羅兵以救仁願仁軌喜曰天將富貴此翁矣於州司請唐曆及廟諱而行曰吾欲掃平東夷頒大唐正朔於海表仁軌御軍嚴整轉鬬而前所向皆下百濟立兩柵於熊津江口仁軌與新羅兵合擊破之殺溺死者萬餘人道琛等乃釋府城之圍退保任存城新羅糧盡引還道琛自稱領軍將軍福信自稱霜岑將軍招集徒衆其勢益張仁軌衆少與仁願合軍休息士卒上表詔新羅出兵新羅王春秋奉詔遣其將金欽將兵救仁軌等至古泗福信邀擊敗之欽自葛嶺道遁還新羅不敢復出福信尋殺道琛專揔國兵夏四月丁卯上幸合璧宫庚辰以任雅相爲浿江道行軍揔管契苾何力爲遼東道行軍揔管蘇定方爲平壤道行軍揔管與蕭嗣業及諸胡兵凡三十五軍水陸分道並進上欲自將大軍繼之癸巳皇后抗表諌親征高麗詔從之六月癸未以吐火羅嚈噠􅄢賔波斯等十六國置都督府八州七十六縣一百一十軍府一百二十六並􅀠安西都䕶府秋七月甲戌蘇定方破高麗於浿江屢戰皆㨗遂圍平壤城九月癸巳朔特進新羅王春秋卒以其子灋敏爲樂浪郡王新羅王壬子徙潞王賢爲沛王賢聞王勃善屬文召爲修撰勃通之孫也時諸王鬬雞勃戲爲檄周王雞文上見之怒曰此乃交構之漸斥勃出沛府高麗蓋蘇文遣其子男生以精兵數萬守鴨緑水諸軍不得度契苾何力至值氷大合何力引衆乗氷度水鼓譟而進高麗大潰追奔數十里斬首三萬級餘衆悉降男生僅以身免會有詔班師乃還冬十月丁卯上畋于陸渾戊申又畋于非山癸酉還宫回紇酋長婆閏卒姪比粟毒代領其衆與同羅僕固犯邊詔左武衞大將軍鄭仁泰爲鐵勒道行軍大揔管燕然都䕶劉審禮左武衞將軍薛仁貴爲副鴻臚卿蕭嗣業爲仙蕚道行軍揔管右屯衞將軍孫仁師爲副將兵討之審禮德威之子也二年春正月辛亥立波斯都督卑路斯爲波斯王二月甲子改百官名以門下省爲東臺中書省爲西臺尚書省爲中臺侍中爲左相中書令爲右相僕射爲匡政左右丞爲肅機尚書爲大常伯侍郎爲少常伯其餘二十四司御史臺九寺七監十六衞並以義訓更其名而職任如故甲戌浿江道大揔管任雅相薨于軍雅相爲將未嘗奏親戚故吏從軍皆移所司補授謂人曰官無大小皆國家公器豈可茍便其私由是軍中賞罰皆平人服其公戊寅左驍衞將軍白州刺史沃沮道揔管龎孝泰與高麗戰於蛇水之上軍敗與其子十三人皆戰死蘇定方圍平壤久不下㑹大雪解圍而還三月鄭仁泰等敗鐵勒於天山鐵勒九姓聞唐兵將至合衆十餘萬以拒之選驍健者數十人挑戰薛仁貴發三矢殺三人餘皆下馬請降仁貴悉阬之度磧北擊其餘衆獲葉䕶兄弟三人而還軍中歌之曰將軍三箭定天山戰士長歌入漢關思結多濫葛等部落先保天山聞仁泰等將至皆迎降仁泰等縱兵擊之掠其家以賞軍士虜相帥逺遁將軍楊志追之爲虜所敗􅀱騎告仁泰虜輜重在近往可取也仁泰將輕騎萬四千倍道赴之遂踰大磧至仙蕚河不見虜糧盡而還值大雪士卒飢凍弃捐甲兵殺馬食之馬盡人自相食比入塞餘兵纔八百人軍還司憲大夫楊德裔劾奏文泰等誅殺已降使虜逃散不撫士卒不計資糧遂使骸骨蔽野弃甲資宼自聖朝開創以來未有如今日之䘮敗者仁貴於所監臨貪淫自恣雖矜所得不補所䘮並請付灋司推科詔以功贖罪皆釋之以右驍衞大將軍契苾何力為鐵勒道安撫使左衞將軍姜恪副之以安輯其餘衆何力簡精騎五百馳入九姓中虜大驚何力乃謂曰國家知汝皆脅從赦汝之罪罪在酋長得之則己其部落大喜共執其葉䕶及設特勒等二百餘人以授何力何力數其罪而斬之九姓遂定甲午車駕發東都辛亥幸蒲州夏四月庚申朔至京師辛巳作蓬萊宫五月丙申以許圉師爲左相六月乙丑初令僧尼道士女官致敬父母秋七月戊子朔赦天下丁巳熊津都督劉仁願帶方州刺史劉仁軌大破百濟於熊津之東拔眞峴城初仁願仁軌等屯熊津城上與之敕書以平壤軍回一城不可獨固宜拔就新羅若金灋敏藉卿留鎭宜且停彼若其不須即宜泛海還也將士咸欲西歸仁軌曰人臣徇公家之利有死無貳豈得先念其私主上欲滅高麗故先誅百濟留兵守之制其心腹雖餘宼充斥而守備甚嚴宜礪兵秣馬擊其不意理無不克既㨗之後士卒心安然後分兵據險開張形勢飛表以聞更求益兵朝廷知其有成必命將出師聲援纔接凶醜自殱非直不弃成功實亦永清海表今平壤之軍既還熊津又抜則百濟餘燼不日更興高麗逋宼何時可滅且今以一城之地居敵中央茍或動足即爲擒虜縱入新羅亦爲羇客脱不如意悔不可追况福信凶悖殘虐君臣猜離行相屠戮正宜堅守觀變乗便取之不可動也衆從之時百濟王豐與福信等以仁願等孤城無援遣使謂之曰大使等何時西還當遣相送仁願仁􅁤知其無備忽出擊之抜其支羅城及尹城大山沙井等柵殺獲甚衆分兵守之福信等以眞峴城險要加兵守之仁軌伺其稍懈引新羅兵夜􅀓城下攀草而上比明入據其城遂通新羅運糧之路仁願乃奏請益兵詔發淄青萊海之兵七千人以赴熊津福信專權與百濟王豐浸相猜忌福信稱疾卧於窟室欲俟豐問疾而殺之豐知之帥親信襲殺福信遣使詣高麗倭國乞師以拒唐兵資治通鑑卷第二百
