body:
  text: 臣司馬光奉勑編集後周紀二攝提格四月凡一年有竒起􅀇黓困敦九月盡閼逢太祖聖神恭肅文武孝皇帝中廣順二年九月甲寅朔呉越丞相裴堅卒以台州刺史呉延福同參相府事庚午敇北邊吏民毋得入契丹境俘掠契丹將髙謨翰以葦栰度胡盧河入宼至兾州成徳節度使何福進遣龍㨗都指揮使劉誠誨等屯貝州以拒之契丹聞之遽引兵北度所掠兾州丁壯數百人望見官軍爭鼔譟欲攻契丹官軍不敢應契丹盡殺之蜀山南西道節度使李廷珪奏周人聚兵闗中請益兵爲備蜀主遣奉鑾肅衛都虞候趙進將兵趣利州既而聞周人聚兵以備壮漢乃引還唐武安節度使邊鎬昏懦無㫁在湖南政出多門不合衆心吉水人歐陽廣上書言鎬非將帥才必喪湖南宜别擇良帥益兵以救其敗不報唐主使鎬經略朗州有自朗州來者多言劉言忠順鎬由是不爲備唐主召劉言入朝言不行謂王逵曰唐必伐我柰何逵曰武陵負江湖之險帶甲數萬安能拱手受制於人邊鎬撫馭無方士民不附可一戰擒也言猶豫未决周行逢曰機事貴速緩則彼爲之備不可圖也言乃以逵行逢及牙將何敬眞張倣蒲公益朱全琇宇文瓊彭萬和潘叔嗣張文表十人皆為指揮使部分發兵叔嗣文表皆朗州人也行逢能謀文表善戰叔嗣果敢三人多相須成功情􅅃甚昵諸將欲召溆州酋長苻彦通為援行逢曰蠻貪而無義前年從馬希萼入潭州焚掠無遺吾兵以義舉往無不克烏用此物使暴殄百姓哉乃止然亦畏彦通為後患以蠻酋土團都指揮使劉瑫為羣蠻所憚補西境鎭遏使以備之冬十月逵等將兵分道趣長沙以孫朗曹進為先鋒使邊鎬遣指揮使郭再誠等將兵屯益陽以拒之戊子逵等克沅江執都監劉承遇禆將李師徳帥衆五百降之壬辰逵等命軍士舉小舟自蔽直造益陽四面斧寨而入遂克之殺戍兵二千人邊鎬告急於唐甲午逵等克橋口及湘隂乙未至潭州邊鎬嬰城自守救兵未至城中兵少丙申夜鎬弃城走吏民俱潰醴陵門橋折死者萬餘人道州刺史廖偃為亂兵所殺丁酉旦王逵入城自稱武平節度副使權知軍府事以何敬眞為行軍司馬遣敬眞等追鎬不及斬首五百級蒲公益攻岳州唐岳州刺史宋徳權走劉言以公益權知岳州唐將守湖􅀯諸州者聞長沙陷相繼遁去劉言盡復馬氏嶺北故地惟郴連入于南漢契丹瀛莫幽州大水流民入塞散居河北者數十萬口契丹州縣亦不之禁詔所在賑給存處之中國民先為所掠得歸者什五六丁未榖以病臂乆未愈三表辭位帝遣中使諭指曰卿所掌至重朕難其人茍事功克集何必朝禮朕今於便殿待卿可暫入相見榖入見千金祥殿面陳悃􅅃帝不許榖不得已復視事榖未能執筆詔以三司務繁令刻名印用之辛亥敇民有訴訟必先歷縣州及觀察使處決不直乃聽詣臺省或自不能書牒倩人書者必書所倩姓名居處若無可倩聽執素紙所訴必須已事毋得挾私客訴慶州刺史郭彦欽性貪野雞族多羊馬彦欽故擾之以求賂野雞族遂反剽掠綱商帝命寕環二州合兵討之劉言遣使奉表來告稱湖南丗事朝廷不幸為鄰宼所陷臣雖不奉詔輙紏合義兵削平舊國唐主削邊鎬官爵流饒州初鎬以都虞候從查文徽克建州凡所俘獲皆全之建人謂之邊佛子及克潭州市不易肆潭人謂之邊菩薩既而為節度使政無綱紀惟日設齋供盛修佛事潭人失望謂之邊和尚矣左僕射同平章事馮延己右僕射同平章事孫晟上表請罪皆釋之晟陳請不已乃與延己皆罷守本官唐主以比年出師無功乃議休兵息民或曰願陛下數十年不用兵可小康矣唐主曰將終身不用何數十年之有唐主思歐陽廣之言拜本縣令十一月辛未徙保義節度使折從阮為靜難節度使討野雞族癸酉敇約每嵗民間所輸牛皮三分減二計田十頃稅取一皮餘聽民自用及賣買惟禁賣於敵國先是兵興以來禁民私賣買牛皮悉令輸宫受直唐明宗之丗有司止償以鹽晉天福中并鹽不給漢法犯私牛皮一寸抵死然民閒日用實不可無帝素知其􅁦至是李榖建議均於田畒公私便之十二月丙戌河決鄭滑遣使行視修塞甲午前靜難節度使侯章獻買宴絹千匹銀五百兩帝不受曰諸侯入覲天子宜有宴犒豈待買邪自今如此比者皆勿受王逵將兵及洞蠻五萬攻郴州南漢將潘崇徹救之遇于蠔石崇徹登髙望湖南兵曰疲而不整可破也縱擊大破之伏尸八十里翰林學士徐台符請誅誣告李崧者延葛遇及李澄馮道以為屢更赦不許王峻嘉台符之義白於帝癸卯収延遇澄誅之劉言表稱潭州殘破乞移使府治朗州且請貢獻賣茶悉如馬氏故事許之唐江西觀察使楚王馬希萼入朝唐主留之後數年卒於金陵諡曰恭孝初麟州土豪楊信自為刺史受命于周信卒子重訓嗣以州降北漢至是為羣羌所圍復歸款求救于夏府二州三年春正月丙辰以武平留後劉言為武平節度使制置武安靜江等軍事同平章事以王逵為武安節度使何敬眞為靜江節度使周行逢為武安行軍司馬詔折從阮野雞族能改過者拜官賜金帛不則進兵討之壬戍從阮奏酋長李萬全等受詔立誓外自餘猶不服方討之前丗屯田皆在邊地使戍兵佃之唐末中原宿兵所在皆置營田以耕曠土其後又募髙貲户使輸課佃之户部别置官司緫領不􅀠州縣或丁多無役或容庇姧盜州縣不能詰梁太祖擊淮􅀯掠得牛以千萬計給東􅀯諸州農民使嵗輸租自是歷數十年牛死而租不除民甚苦之帝素知其􅁦㑹閤門使知青州張凝上便宜請罷營田務李榖亦以為言乙丑敕悉罷户部營田務以其民􅀠州縣其田廬牛農器並賜見佃者為永業悉除租牛課是嵗户部増三萬餘户民既得為永業始敢葺屋植木獲地利數倍或言營田其肥饒者不若鬻之可得錢數十萬緡以資國帝曰利在於民猶在國也朕用此錢何為萊州剌史葉仁魯帝之故吏也坐贓絹萬五千匹錢千緡庚午賜死帝遣中使賜以酒食曰汝自抵國法吾無如之何當存恤汝母仁魯感泣帝以河決為憂王峻請自往行視許之鎭寕節度使榮屢求入朝峻忌其英烈每沮止之閏月榮復求入朝㑹峻在河上帝乃許之契丹宼定州圍義豐軍定和都指揮使楊􅀪裕夜擊其營大獲契丹遁去又宼鎭州本道兵擊走之丙申鎭寕節度使榮入朝故李守貞􅀐士馬全乂從榮入朝帝召見補殿前指揮使謂左右曰全乂忠於所事昔在河中屢挫吾軍汝軰宜効之王峻聞榮入朝遽自河上歸戊戍至大梁雄武節度使髙允權卒其子牙内指揮使紹基謀襲父位詐稱允權疾病表已知軍府事觀察判官李彬切諌紹基怒斬之辛丑以彬謀反聞王峻固求領藩鎮帝不得已壬寅以峻兼平盧節度使髙紹基屢奏雜虜犯邊冀得承襲帝遣六宅使張仁謙詣延州巡檢紹基不能匿始發父喪戊申折從阮奏降野雞二十一族唐草澤邵棠上言近游淮上聞周主恭儉増修徳政吾兵新破於潭朗恐其有南征之志宜為之備初王逵既克潭州以指揮使何敬眞為靜江節度副使朱全琇為武安節度副使張文表為武平節度副使周行逢為武安行軍司馬敬眞全琇各置牙兵與逵分㕔視事吏民莫知所從每宴集諸將使酒紛拏如市無復上下之分惟行逢文表事逵盡禮逵親愛之敬眞與逵不恊辭歸朗州又不能事劉言與全琇謀作亂言素忌逵之彊疑逵使敬眞伺已將討之逵聞之甚懼行逢曰劉言素不與吾軰同心何敬眞朱全琇恥在公下公宜早圖之逵喜曰與公共除凶黨同治潭朗夫復何憂㑹南漢宼全道永州行逢請身至朗州􅀃言遣敬眞全琇南討俟至長沙以計取之如掌中物耳逵從之行逢至朗州言以敬眞為南面行營招討使全琇為先鋒使將牙兵百餘人㑹潭州兵以禦南漢二人至長沙逵出郊迎相見甚歡宴飲連日多以美妓餌之敬眞因淹留不進朗州指揮使李仲遷部兵三千人乆戍潭州敬眞使之先發趣嶺北都頭符㑹等因士卒思歸劫仲遷擅還朗州逵乗敬眞醉使人詐為言使者責敬眞以南宼深侵不亟捍禦而専務荒宴太師命械公歸西府因收繫獄全琇逃去遣兵追捕之二月辛亥朔斬敬眞以徇未幾獲全琇及其黨十餘人皆斬之癸丑鎮寜節度使榮歸澶州初契丹主徳光北還以晉傳國寶自隨至是更以玉作二寶王逵遣使以斬何敬眞告劉言言不得己庚申斬符㑹等數人樞密使平盧節度使同平章事王峻晚節益狂躁奏請以端明殿學士顔衎樞密直學士陳觀代范質李榖為相帝曰進退宰輔不可倉猝俟朕更思之峻力論列語浸不遜日向中帝尚未食峻爭之不已帝曰今方寒食俟假開如卿所奏峻乃退癸亥帝亟召宰相樞密使入幽峻於别所帝見馮道等泣曰王峻陵朕太甚欲盡逐大臣翦朕羽翼朕惟一子專務間阻暫令詣闕已懷怨望豈有身典樞機復兼宰相又求重鎭觀其志趣殊未盈厭無君如此誰則堪之甲子貶峻商州司馬制辭略曰􅁏視羣后孩撫朕躬帝慮鄴都留守王殷不自安命殷子尚食使承誨詣殷諭以峻得罪之狀峻至商州得腹疾帝猶愍之命其妻往視之未幾而卒帝命折從阮分兵屯延州髙紹基始懼屢有貢獻又命供奉官張懷貞將禁兵兩指揮屯鄜延紹基乃悉以軍府事授副使張匡圖甲戍以客省使向訓權知延州三月甲申以鎭寕節度使榮為開封尹􅀳王丙戍以樞密副使鄭仁誨為鎭寜節度使初殺牛族與野雞族有隙聞官軍討野雞饋餉迎奉官軍利其財畜而掠之殺牛族反與野雞合敗寜州刺史張建武于包山帝以郭彦欽擾羣胡致其作亂黜廢於家初解州刺史浚儀郭元昭與􅅦鹽使李温玉有隙温玉壻魏仁浦為樞密主事元昭疑仁浦庇之㑹李守貞反温玉有子在河中元昭收繫温玉奏言其叛事連仁浦帝時為樞密使知其誣釋不問至是仁浦為樞密承旨元昭代歸甚懼過洛陽以告仁浦弟仁滌仁滌曰吾兄平生不與人為怨况肯以私害公乎既至丁亥仁浦白帝以元昭為慶州刺史己丑以棣州團練使太原王仁鎬為宣徽北院使兼樞密副使唐主復以左僕射馮延己同平章事周行逢惡武平節度副使張倣言於王逵曰何敬眞倣之親戚臨刑以後事屬倣公宜備之夏四月庚申逵召倣飲醉而殺之丙寅歸徳節度使兼侍中常思入朝戊辰徙平盧節度使將行奏曰臣在宋州舉絲四萬餘兩在民間謹以上進請徴之帝頷之五月丁亥敕牓宋州凡常思所舉絲悉蠲之巳輸者復歸之思亦無怍色自唐末以來所在學校廢絶蜀母昭裔出私財百萬營學館且請刻板印九經蜀主從之由是蜀中文學復盛六月壬子滄州奏契丹知盧臺軍事范陽張藏英來降初唐明宗之丗宰相馮道李愚請令判國子監田敏校正九經刻板印賣朝廷從之丁巳板成獻之由是雖亂丗九經傳布甚廣王逵以周行逢知潭州自將兵襲朗州克之殺指揮使鄭珓執武安節度使同平章事劉言幽于别館秋七月王殷三表請入朝帝疑其不誠遣使止之唐大旱井泉涸淮水可涉饑民度淮而北者相繼濠夀發兵禦之民與兵鬬而北來帝聞之曰彼我之民一也聽糴米過淮唐人遂築倉多糴以供軍八月己未詔唐民以人畜負米者聽之以舟車運載者勿予王逵遣使上表誣劉言謀以朗州降唐又欲攻潭州其衆不從廢而囚之臣已至朗州撫安軍府訖且請復移使府洽潭州甲戌遣通事舎人翟光裔詣湖南宣撫從其所請逵還長沙以周行逢知朗州事又遣潘叔嗣殺劉言於朗州九月己亥武成節度使白重贊奏塞決河契丹宼樂夀齊州戍兵右保寜都頭劉彦章殺都監杜延熙謀應契丹不克并其黨伏誅南漢主立其子繼興為衛王璇興為桂王慶興為荆王保興為禎王崇興為梅王東自青徐南至安復西至丹慈北至貝鎭皆大水帝自入秋得風痺疾害於食飲及步趨術者言宜散財以禳之帝欲祀南郊又以自梁以來郊祀常在洛陽疑之執政曰天子所都則可以祀百神何必洛陽於是始築圓丘社稷壇作太廟於大梁癸亥遣馮道迎太廟社稷神主于洛陽南漢大赦冬十一月己丑太常請凖洛陽築四郊諸壇從之十二月丁未朔神主至大梁帝迎于西郊祔享于太廟鄴都留守天雄節度使兼侍衛親軍都指揮使同平章事王殷恃功専横凡河北鎭戍兵應用敇處分者殷即以帖行之又多掊斂民財帝聞之不悅使人謂曰卿與國同體鄴都帑庾甚豐卿欲用則取之何患無財成徳節度使何福進素惡殷甲子福進入朝密以殷隂事白帝帝由是疑之乙丑殷入朝詔留殷充京城内外巡檢戊辰府州防禦使折徳扆奏北漢將喬贇入宼擊走之王殷每出入從者常數百人殷請量給鎧仗以備巡邏帝難之時帝體不平將行郊祀而殷挾震主之勢在左右衆心忌之壬申帝力疾御滋徳殿殷入起居遂執之下制誣殷謀以郊祀日作亂流登州出城殺之命鎭寧節度使鄭仁誨詣鄴都安撫仁誨利殷家財擅殺殷子遷其家屬於登州唐祠部郎中知制誥徐鉉言貢舉初設不宜遽罷乃復行之先是楚州刺史田敬洙請修白水塘溉田以實邊馮延己以爲便李徳明因請大闢曠土爲屯田修復所在渠塘堙廢者吏因縁侵擾大興力役奪民田甚衆民愁怨無訴徐􅉗以白唐主唐主命鉉按視之鉉籍民田悉歸其主或譛鉉擅作威福唐主怒流鉉舒州然白水塘竟不成唐主又命少府監馮延魯廵撫諸州右拾遺徐鍇表延魯無才多罪舉措輕淺不宜奉使唐主怒貶鍇校書郎分司東都鍇􅉗之弟也道州盤容洞蠻酋盤崇聚衆自稱盤容州都統屢宼郴道州乙亥帝朝享太廟被衮冕左右掖以登堦纔及一室酌獻俛首不能拜而退命晉王榮終禮是夕宿南郊疾尤劇幾不救夜分小愈顯徳元年春正月丙子朔帝祀圓丘僅能瞻仰致敬而已進爵奠幣皆有司代之大赦攺元聽蜀境通商戊寅罷鄴都但爲天雄軍庚辰加晉王榮兼侍中判内外兵馬事時羣臣希得見帝中外恐懼聞晉王典兵人心稍安軍士有流言郊賞薄於唐明宗時者帝聞之壬午召諸將至寢殿讓之曰朕自即位以來惡衣菲食專以贍軍爲念府庫蓄積四方貢獻贍軍之外鮮有嬴餘汝軰豈不知之今乃縱凶徒騰口不顧人主之勤儉察國之貧乏又不思已有何功而受賞惟知怨望於汝軰安乎皆惶恐謝罪退索不逞者戮之流言乃息初帝在鄴都竒愛小吏曹翰之才使之事晉王榮榮鎭澶州以爲牙將榮入爲開封尹未别召翰翰自至榮怪之翰請間言曰大王國之儲嗣今主上寢疾大王當入侍醫藥柰何猶決事於外邪榮感悟即日入止禁中丙戍帝疾篤停諸司細務皆勿奏有大事則晉王榮禀進止宣行之以鎭寧節度使鄭仁誨爲樞密使同平章事戊子以義武留後孫行友保義留後韓通朔方留後馮繼業皆爲節度使通太原人也帝屢戒晉王曰昔吾西征見唐十八陵無不發掘者此無它惟多藏金玉故也我死當衣以紙衣歛以瓦棺速營葬勿乆留宫中壙中無用石以甓代之工人役徒皆和雇勿以煩民葬畢募近陵民三十户蠲其雜徭使之守視勿修下宫勿置守陵宫人勿作石羊虎人馬惟刻石置陵前云周天子平生好儉約遺令用􅁓衣瓦棺嗣天子不敢違也汝或吾違吾不福汝又曰李洪義當與節􅃏魏仁浦勿使離樞密院庚寅詔前登州刺史周訓等塞決河先是河決靈河魚池酸棗陽武常樂驛河隂六名鎭原武凡八口至是分遣使者塞之帝命趣草制以端明殿學士户部侍郎王溥爲中書侍郎同平章事壬辰宣制畢左右以聞帝曰吾無恨矣以樞密副使王仁鎬爲永興節度使以殿前都指揮使李重進領武信節度使馬軍都指揮使樊愛能領武定節度使歩軍都指揮使何徽領昭武節度使重進年長於晉王榮帝召入禁中屬以後事仍命拜榮以定君臣之分是日帝殂于滋徳殿袐不發喪乙未宣遺制丙申晉王即皇帝位初靜海節度使吳權卒子昌岌立昌岌卒弟昌文立是月始請命於南漢南漢以昌文爲靜海節度使兼安南都䕶北漢主聞太祖晏駕甚喜謀大舉入宼遣使請兵于契丹二月契丹遣其武定節度使政事令楊衮將萬餘􅀐如晉陽北漢主自將兵三萬以義成節度使白從暉爲行軍都部署武寧節度使張元徽爲前鋒都指揮使與契丹自團栢南趣潞州蜀左匡聖馬步都指揮使保寧節度使安思謙譖殺張業廢趙廷隠蜀人皆惡之蜀主使將兵救王景崇思謙逗撓無功内慙懼不自安自張業之誅宫門守衛加嚴思謙以爲疑已言多不遜思謙典宿衛多殺士卒以立威蜀主閲衛士有年尚壯而爲思謙所斥者復留􅀠籍思謙殺之蜀主不能平思謙三子扆嗣裔􅀝父勢暴横爲國人患翰林使王藻屢言思謙怨望將反丁巳思謙入朝蜀主命壯士擊殺之及其三子藻亦坐擅啓邊奏并誅之北漢兵屯梁侯驛昭義節度使李筠遣其將穆令均將歩􅀐二千逆戰筠自將大軍壁於太平驛張元徽與令均戰陽不勝而北令均逐之伏發殺令均俘斬士卒千餘人筠遁歸上黨嬰城自守筠即李榮也避上名攺焉丗宗聞北漢主入宼欲自將兵禦之羣臣皆曰劉崇自平陽遁走以來勢蹙氣沮必不敢自來陛下新即位山陵有日人心易摇不宜輕動宜命將禦之帝曰崇幸我大喪輕朕年少新立有吞天下之心此必自來朕不可不往馮道固爭之帝曰昔唐太宗定天下未嘗不自行朕何敢偷安道曰未審陛下能爲唐太宗否帝曰以吾兵力之彊破劉崇如山壓卵耳道曰未審陛下能爲山否帝不悅惟王溥勸行帝從之三月乙亥朔蜀主加捧聖控鶴都指揮使兼中書令孫漢韶武信節度使賜爵樂安郡王罷軍職蜀主懲安思謙之跋扈命山南西道節度使李廷珪等十人分典禁兵北漢乗勝進逼潞州丁丑詔天雄節度使符彦卿引兵自磁州固鎭出北漢軍後以鎭寧節度使郭崇副之又詔河中節度使王彦超引兵自晉州東出邀北漢軍以保義節度使韓通副之又命馬軍都指揮使寧江節度使樊愛能歩軍都指揮使清淮節度使何徽義成節度使白重賛鄭州防禦使史彦超前耀州團練使符彦能將兵先趣澤州宣徽使向訓監之重賛憲州人也辛巳大赦癸未帝命馮道奉梓宫赴山陵以鄭仁誨爲東京留守乙酉帝發大梁庚寅至懐州帝欲兼行速進控鶴都指揮使眞定趙晁私謂通事舎人鄭好謙曰賊勢方盛冝持重以挫之好謙言於帝帝怒曰汝安得此言必爲人所使言其人則生不然必死好謙以實對帝命并晁械於州獄壬辰帝過澤州宿於州東北北漢主不知帝至過潞州不攻引兵而南是夕軍於高平之南癸巳前鋒與北漢兵遇擊之北漢兵却帝慮其遁去趣諸軍亟進北漢主以中軍陳於巴公原張元徽軍其東楊衮軍其西衆頗嚴整時河陽節度使劉詞將後軍未至衆心危懼而帝志氣益銳命白重賛與侍衛馬歩都虞候李重進將左軍居西樊愛能何徽將右軍居東向訓史彦超將精􅀐居中央殿前都指揮使張永德將禁兵衛帝帝介馬自臨陳督戰北漢主見周軍少悔召契丹謂諸將曰吾自用漢軍可破也何必契丹今日不惟克周亦可使契丹心服諸將皆以爲然楊衮策馬前望周軍退謂北漢主曰勍敵也未可輕進北漢主奮􅐖曰時不可失請公勿言試觀我戰衮黙然不悅時東北風方盛俄而忽轉南風北漢副樞密使王延嗣使司天監李義白北漢主云時可戰矣北漢主從之樞密直學士王得中扣馬諌曰義可斬也風勢如此豈助我者邪北漢主曰吾計已決老書生勿妄言且斬汝麾東軍先進張元徽將千􅀐擊周右軍合戰未幾樊愛能何徽引􅀐兵先遁右軍潰歩兵千餘人解甲呼萬歳降于北漢帝見軍勢危自引親兵犯矢石督戰太祖皇帝時爲宿衛將謂同列曰主危如此吾屬何得不致死又謂張永徳曰賊氣驕力戰可破也公麾下多能左射者請引兵乗高西出爲左翼我引兵爲右翼以擊之國家安危在此一舉永徳從之各將二千人進戰太祖皇帝身先士卒馳犯其鋒士卒死戰無不一當百北漢兵披靡内殿直夏津馬仁瑀謂衆曰使乗輿受敵安用我軰躍馬引弓大呼連斃數十人士氣益振殿前右番行首馬全乂言於帝曰賊勢極矣將爲我擒願陛下按轡勿動徐觀諸將破之即引數百騎進陷陳北漢主知帝自臨陳褒賞張元徽趣使乗勝進兵元徽前略陳馬倒爲周兵所殺元徽北漢之驍將也北軍由是奪氣時南風益盛周兵爭奮北漢兵大敗北漢主自舉赤幟以收兵不能止楊衮畏周兵之彊不敢救且恨北漢主之語全軍而退樊愛能何徽引數千􅀐南走控􅁌露刃剽掠輜重役徒驚走失亡甚多帝遣近臣及親軍校追諭止之莫肯奉詔使者或爲軍士所殺揚言契丹大至官軍敗績餘衆已降虜矣劉詞遇愛能等於塗愛能等止之詞不從引兵而北時北漢主尚有餘衆萬餘人阻澗而陳薄暮詞至復與諸軍擊之北漢兵又敗殺王延嗣追至高平僵尸滿山谷委弃御物及輜重器械雜畜不可勝紀是夕帝宿於野次得步兵之降敵者皆殺之樊愛能等聞周兵大㨗與士卒稍稍復還有逹曙不至者甲午休兵于高平選北漢降卒數千人爲効順指揮命前武勝行軍司馬唐景思將之使戍淮上餘二千餘人賜貲裝縱遣之李穀爲亂兵所迫潛竄山谷數日乃出丁酉帝至潞州北漢主自高平被褐戴笠乗契丹所贈黄騮帥百餘􅀐由雕窠嶺遁歸宵迷俘村民爲導誤之晉州行百餘里乃覺之殺導者晝夜北走所至得食未舉筯或傳周兵至輒蒼黄而去北漢主衰老力憊伏於馬上晝夜馳驟殆不能支僅得入晉陽帝欲誅樊愛能等以肅軍政猶豫未決己亥晝卧行宫帳中張永德侍側帝以其事訪之對曰愛能等素無大功忝冒節􅃏望敵先逃死未塞責且陛下方欲削平四海茍軍法不立雖有熊羆之士百萬之衆安得而用之帝擲枕於地大呼稱善即收愛能徽及所部軍使以上七十餘人責之曰汝軰皆累朝宿將非不能戰今望風奔遁者無它正欲以朕爲竒貨賣與劉崇耳悉斬之帝以何徽先守晉州有功欲免之既而以法不可廢遂并誅之而給槥車歸葬自是驕將惰卒始知所懼不行姑息之政矣庚子賞高平之功以李重進兼忠武節度使向訓兼義成節度使張永徳兼武信節度使史彦超爲鎭國節度使張永徳盛稱太祖皇帝之智勇帝擢太祖皇帝爲殿前都虞􅃸領嚴州刺史以馬仁瑀爲控鶴弓箭直指揮使馬全乂爲散貟指揮使自餘將校遷拜者凡數十人士卒有自行間擢主軍廂者釋趙晁之囚北漢主收散卒繕甲兵完城塹以備周楊衮將其衆北屯代州北漢主遣王得中送衮因求救於契丹契丹主遣得中還報許發兵救晉陽壬寅以符彦卿爲河東行營都部署兼知太原行府事以郭崇副之向訓爲都監李重進爲馬步都虞􅃸史彦超爲先鋒都指揮使將歩􅀐二萬發潞州仍詔王彦超韓通自隂地闗入與彦卿合軍而進又以劉詞爲隨駕部署保大節度使白重賛副之漢昭聖皇太后李氏殂于西宫夏四月北漢盂縣降符彦卿軍晉陽城下王彦超攻汾州北漢防禦使董希顔降帝遣萊州防禦使康延沼攻遼州密州防禦使田瓊攻沁州皆不下供備庫副使太原李謙溥單􅀐􅀃遼州刺史張漢超漢超即降乙卯葬聖神恭肅文武孝皇帝于嵩陵廟號太祖南漢主以高王􅀪邈爲雄武節度使鎭邕州􅀪邈以齊鎭二王相繼死於邕州固辭求宿衛不許至鎭委政僚佐日飲酒禱鬼神或上書誣􅀪邈謀作亂戊午南漢主遣甘泉宫使林延遇賜酖殺之初帝遣符彦卿等北征但欲耀兵於晉陽城下未議攻取既入北漢境其民爭以食物迎周師泣訴劉氏賦役之重願供軍須助攻晉陽北漢州縣繼有降者帝聞之始有兼并之意遣使往與諸將議之諸將皆言芻糧不足請且班師以俟再舉帝不聽既而諸軍數十萬聚於太原城下軍士不免剽掠北漢民失望稍稍保山谷自固帝聞之馳詔禁止剽掠安撫農民止徵今嵗租稅及募民入粟拜官有差仍發澤潞晉絳慈隰及山東近便諸州民運粮以饋軍己未遣李穀詣太原計度芻糧庚申太師中書令瀛文懿王馮道卒道少以孝謹知名唐莊宗丗始貴顯自是累朝不離將相三公三師之位爲人清儉寛􅀪人莫測其喜愠滑稽多智浮沈取容嘗著長樂老敘自述累朝榮遇之狀時人往往以德量推之歐陽脩論曰禮義廉恥國之四維四維不張國乃滅亡禮義治人之大法廉恥立人之大節況爲大臣而無廉恥天下其有不亂國家其有不亡者乎予讀馮道長樂老叙見其自述以爲榮其可謂無廉恥者矣則天下國家可從而知也予於五代得全節之士三死事之臣十有五皆武夫戰卒豈於儒者果無其人哉得非高節之士惡時之亂薄其丗而不肯出歟抑君天下者不足顧而莫能致之歟予嘗聞五代時有王凝者家青齊之間爲虢州司户參軍以疾卒于官凝家素貧一子尚㓜妻李氏携其子負其遺骸以歸東過開封止於旅舍主人不納李氏顧天已暮不肯去主人牽其臂而出之李氏仰天慟曰我爲婦人不能守節而此手爲人所執邪即引斧自斷其臂見者爲之嗟泣開封尹聞之白其事於朝厚䘏李氏而笞其主人嗚呼士不自愛其身而忍恥以偷生者聞李氏之風冝少知愧哉臣光曰天地設位聖人則之以制禮立法内有夫婦外有君臣婦之從夫終身不攺臣之事君有死無貳此人道之大倫也茍或廢之亂莫大焉范質稱馮道厚徳稽古宏才偉量雖朝代遷貿人無間言屹若巨山不可轉也臣愚以爲正女不從二夫忠臣不事二君爲女不正雖復華色之美織絍之巧不足賢矣爲臣不忠雖復材智之多治行之優不足貴矣何則大節已虧故也道之為相歷五朝八姓若逆旅之視過客朝為仇敵暮為君臣易靣變辭曽無愧怍大節如此雖有小善庸足稱乎或以爲自唐室之亡羣雄力爭帝王興廢逺者十餘年近者四三年雖有忠智將若之何當是之時失臣節者非道一人豈得獨罪道哉臣愚以爲忠臣憂公如家見危致命君有過則強諌力爭國敗亡則竭節致死智士􅀖有道則見􅀖無道則隠或滅迹山林或優遊下僚今道尊寵則冠三師權任則首諸相國存則依違拱嘿竊位素餐國亡則圖全茍免迎謁勸進君則興亡接踵道則富貴自如兹乃姧臣之尤安得與它人爲比哉或謂道能全身逺害於亂丗斯亦賢已臣謂君子有殺身成仁無求生害仁豈專以全身逺害為賢哉然則盜跖病終而子路􅊽果誰賢乎抑此非特道之愆也時君亦有責焉何則不正之女中士羞以爲家不忠之人中君羞以爲臣彼相前朝語其忠則反君事讎語其智則社稷為墟後來之君不誅不弃乃復用以爲相彼又安肯忠於我而能獲其用乎故曰非特道之愆亦時君之責也辛酉符彦卿奏北漢憲州刺史太原韓光愿嵐州刺史郭言皆舉城降初符彦卿有女適李守貞之子崇訓相者言其貴當爲天下母守貞喜曰吾婦猶母天下况我乎反意遂決及敗崇訓先自刃其弟妹次及符氏符氏匿幃下崇訓倉猝求之不獲遂自剄亂兵既入符氏安坐堂上叱亂兵曰吾父與郭公爲昆弟汝曹勿無禮太祖遣使歸之於彦卿及帝鎭澶州太祖為帝娶之壬戍立爲皇后后性和惠而明決帝甚重之王彦超韓通攻石州克之執刺史安彦進癸亥沁州刺史李廷誨降庚午帝發潞州趣晉陽癸酉北漢忻州監軍李勍殺刺史趙臯及契丹通事楊耨姑舉城降以勍爲忻州刺史王逵表請復徙使府治朗州資治通鑑卷第二百九十一
