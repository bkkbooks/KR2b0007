body:
  text: 臣司馬光奉勑編集漢紀十八􅘬閹茂凡三年起上章涒灘盡􅀇中宗孝宣皇帝中神爵元年春正月上始行幸甘泉郊㤗畤三月行幸河東祠后土上頗脩武帝故事謹齋祀之禮以方士言增置神祠聞益州有金馬碧雞之神可醮祭而致於是遣諫大夫蜀郡王襃使持節而求之初上聞襃有俊才召見使為聖主得賢臣頌其辭曰夫賢者國家之器用也所任賢則趨舎省而功施普器用利則用力少而就效衆故工人之用鈍器也勞筋苦骨終日矻矻及至巧冶鑄干將使離婁督繩公輸削墨雖崇臺五層延袤百丈而不溷者工用相得也庸人之御駑馬亦傷吻敝䇿而不進於行及至駕齧厀驂乗旦王良執靶韓哀附輿周流八極萬里一息何其遼哉人馬相得也故服絺綌之涼者不苦盛暑之鬱燠襲貂狐之煗者不憂至寒之悽愴何則有其具者易其僃賢人君子亦聖王之所以易海内也昔周公躬吐捉之勞故有圉空之隆齊桓設庭燎之禮故有匡合之功由此觀之君人者勤於求賢而逸於得人人臣亦然昔賢者之未遭遇也圖事揆䇿則君不用其謀陳見悃誠則上不然其信進仕不得施効斥逐又非其愆是故伊尹勤於鼎爼太公困於鼔刀百里自鬻寗子飯牛離此患也及其遇明君遭聖主也運籌合上意諌諍即見聽進退得􅀜其忠任職得行其術剖符錫壤而光祖考故丗必有聖知之君而後有賢明之臣故虎嘯而風冽龍興而致雲蟋蟀竢秋唫蜉蝤出以隂易曰飛龍在天利見大人詩曰思皇多士生此王國故丗平主聖俊又將自至明明在朝穆穆布列聚精㑹神相得益章雖伯牙操遞鍾逢門子彎烏號猶未足以喻其意也故聖主必待賢臣而􅀪功業俊士亦俟明主以顯其德上下俱欲驩然交欣千載壹合論說無疑翼乎如鴻毛遇順風沛乎如巨魚縱大壑其得意􅀂此則胡禁不止􅂚令不行化溢四表橫被無窮是以聖王不徧窺望而視已明不殫傾耳而聽已聦太平之責塞優游之望得休徴自至壽考無疆何必偃仰屈伸􅀂彭祖呴嘘呼吸如僑松眇然絶俗離丗哉是時上頗好神僊故襃對及之京兆尹張敞亦上䟽諌曰願明主時忘車馬之好斥逺方士之虚語游心帝王之術太平庶幾可興也上由是悉罷尚方待詔初趙廣漢死後為京兆尹者皆不稱職唯敞能繼其迹其方略耳目不及廣漢然頗以經術儒雅文之上頗脩飾宫室車服盛於昭帝時外戚許史王氏貴寵諌大夫王吉上䟽曰陛下躬聖質緫萬方惟思丗務將興太平詔書每下民欣然􅀂更生臣伏而思之可謂至恩未可謂本務也欲治之主不丗出公卿幸得遭遇其時言聽諌從然未有建萬丗之長策舉明主於三代之隆也其務在於期㑹簿書斷獄聽訟而已此非太平之基也臣聞民者弱而不可勝愚而不可欺也聖主獨行於深宫得則天下稱誦之失則天下咸言之故宜謹選左右審擇所使左右所以正身所使所以宣德此其本也孔子曰安上治民莫善於禮非空言也王者未制禮之時引先王禮宜於今者而用之臣願陛下承天心發大業與公卿大臣延及儒生述舊禮明王制􅛷一丗之民躋之仁壽之域則俗何以不􅀂成康壽何以不􅀂髙宗竊見當丗趨務不合於道者謹條奏唯陛下財擇焉吉意以爲丗俗聘妻送女無節則貧人不及故不舉子又漢家列矦尚公主諸矦則國人承翁主使男事女夫屈於婦逆隂陽之位故多女亂古者衣服車馬貴賤有章今上下僭差人人自制是以貪財誅利不畏死亡周之所以能致治刑措而不用者以其禁邪於冥冥絶惡於未萌也又言舜湯不用三公九卿之丗而舉臯陶伊尹不仁者逺今使俗吏得任子弟率多驕驁不通古今無益於民宜明選求賢除任子之令外家及故人可厚以財不宜居位去角抵減樂府省尚方明示天下以儉古者工不造琱瑑商不通侈靡非工商之獨賢政敎使之然也上以其言為迂濶不甚寵異也吉遂謝病歸義渠安國至羌中召先零諸豪三十餘人以尤桀黠者皆斬之縱兵擊其種人斬首千餘級於是諸降羌及歸義羌矦楊玉等怨怒無所信鄕遂劫略小種背畔犯塞攻城邑殺長吏安國以􅀐都尉將􅀐三千屯僃羌至浩亹為虜所擊失亡車重兵器甚衆安國引還至令居以聞時趙充國年七十餘上老之使丙吉問誰可將者充國對曰無踰於老臣者矣上遣問焉曰將軍度羌虜何如當用幾人充國曰百聞不如一見兵難隃度臣願馳至金城圖上方略羌戎小夷逆天背畔滅亡不乆願陛下以屬老臣勿以為憂上笑曰諾乃大發兵詣金城夏四月遣充國將之以擊西羌六月有星孛于東方趙充國至金城須兵滿萬􅀐欲度河恐爲虜所遮即夜遣三校衘枚先度度輒營陳㑹明畢遂以次盡度虜數十百􅀐來出入軍傍充國曰吾士馬新倦不可馳逐此皆驍􅀐難制又恐其爲誘兵也擊虜以殄滅爲期小利不足貪令軍勿擊遣􅀐􅇋四望陿中無虜夜引兵上至落都召諸校司馬謂曰吾知羌虜不能爲兵矣使虜發數千人守杜四望陿中兵豈得入哉充國常以逺斥􅇋爲務行必爲戰僃止必堅營壁尤能持重愛士卒先計而後戰遂西至西部都尉府日饗軍士士皆欲爲用虜數挑戰充國堅守捕得生口言羌豪相數責曰語汝無反今天子遣趙將軍來年八九十矣善為兵今請欲壹􅃲而死可得邪初䍐开豪靡當兒使弟雕庫來告都尉曰先零欲反後數日果反雕庫種人頗在先零中都尉即留雕庫為質充國以為無罪乃遣歸告種豪大兵誅有罪者明白自别母取并滅天子告諸羌人犯灋者能相捕斬除罪仍以功大小賜錢有差又以其所捕妻子財物盡與之充國計欲以威信招降䍐开及劫略者解散虜謀徼其疲劇乃擊之時上已發内郡兵屯邊者合六萬人矣酒泉太守辛武賢奏言郡兵皆屯備南山北邊空虚􅀔不可乆􅀂至秋冬乃進兵此虜在境外之􅁽今虜朝夕為寇土地寒苦漢馬不耐冬不如以七月上旬齎三十日糧分兵出張掖酒泉合擊䍐开在鮮水上者雖不能盡誅但奪其畜産虜其妻子復引兵還冬復擊之大兵仍出虜必震壊天子下其書充國令議之充國以為一馬自􅀒三十日食為米二斛四斗麥八斛又有衣裝兵器難以追逐虜必商軍進退稍引去逐水草入山林隨而深入虜即據前險守後阨以絶糧道必有傷危之憂為夷狄笑千載不可復而武賢以為可奪其畜産虜其妻子此殆空言非至計也先零首為畔逆它種劫略故臣愚􅁽欲􅂢䍐开闇昧之過隱而勿章先行先零之誅以震動之宜悔過反善因赦其罪選擇良吏知其俗者拊循和輯此全師保勝安邊之􅁽天子下其書公卿議者咸以為先零兵盛而負䍐开之助不先破䍐开則先零未可圖也上乃拜侍中許延壽為彊弩將軍即拜酒泉太守武賢為破羌將軍賜璽書嘉納其􅁽以書敕讓充國曰今轉輸並起百姓煩擾將軍將萬餘之衆不早及秋共水草之利爭其畜食欲至冬虜皆當畜食多臧匿山中依險阻將軍士寒手足皸􅏿寧有利哉將軍不念中國之費欲以歳數而勝敵將軍誰不樂此者今詔破羌將軍武賢等將兵以七月擊䍐羌將軍其引兵並進勿復有疑充國上書曰陛下前幸賜書欲使人諭䍐以大軍當至漢不誅䍐以解其謀臣故遣开豪雕庫宣天子至德䍐开之屬皆聞知明詔今先零羌楊玉阻石山木􅇋便為寇䍐羌未有所犯乃置先零先擊䍐釋有罪誅無辜起壹難就兩害誠非陛下本計也臣聞兵灋攻不足者守有餘又曰善戰者致人不致於人今䍐羌欲為敦煌酒泉寇宜飭兵馬練戰士以須其至坐得致敵之術以逸擊勞取勝之道也今恐二郡兵少不足以守而發之行攻釋致虜之術而從為虜所致之道臣愚以為不便先零羌虜欲為背畔故與䍐开解仇結約然其私心不能無恐漢兵至而䍐开背之也臣愚以為其計常欲先赴䍐开之急以堅其約先擊䍐羌先零必助之今虜馬肥糧食方饒擊之恐不能傷害適使先零得施德於䍐羌堅其約合其黨虜交堅黨合精兵二萬餘人迫脅諸小種附著者稍衆莫須之屬不輕得離也如是虜兵寖多誅之用力數倍臣恐國家憂累由十年數不二三歲而已於臣之計先誅先零已則䍐开之屬不煩兵而服矣先零已誅而䍐开不服渉正月擊之得計之理又其時也以今進兵誠不見其利戊申充國上奏秋七月甲寅璽書報從充國計焉充國乃引兵至先零在所虜乆屯聚懈弛望見大軍棄車重欲度湟水道阨陿充國徐行驅之或曰逐利行遟充國曰此窮寇不可迫也緩之則走不顧急之則還致死諸校皆曰善虜赴水溺死者數百降及斬首五百餘人虜馬牛羊十萬餘頭車四千餘兩兵至䍐地令軍母燔聚落芻牧田中䍐羌聞之喜曰漢果不擊我矣豪靡忘使人來言願得還復故地充國以聞未報靡忘來自歸充國賜飲食遣還諭種人護軍以下皆爭之曰此反虜不可擅遣充國曰諸君但欲便文自營非爲公家忠計也語未卒璽書報令靡忘以贖論後䍐竟不煩兵而下上詔破羌彊弩將軍詣屯所以十二月與充國合進擊先零時羌降者萬餘人矣充國度其必壞欲罷􅀐兵屯田以待其敝作奏未上㑹得進兵璽書充國子中郎將卬懼使客諫充國曰誠令兵出破軍殺將以傾國家將軍守之可也即利與病又何足爭一旦不合上意遣繡衣來責將軍將軍之身不能自保何國家之安充國歎曰是何言之不忠也本用吾言羌虜得至是邪往者舉可先行羌者吾舉辛武賢丞相御史復白遣義渠安國竟沮敗羌金城湟中榖斛八錢吾謂耿中丞糴三百萬斛榖羌人不敢動矣耿中丞請糴百萬斛乃得四十萬斛耳義渠再使且費其半失此二􅁽羌人致敢為逆失之豪􅁵差以千里是旣然矣今兵乆不決四夷卒有動揺相因而起雖有知者不能善其後羌獨足憂邪吾固以死守之明主可為忠言遂上屯田奏曰臣所將吏士馬牛食所用糧榖茭槀調度甚廣難乆不解傜役不息恐生它變為明主憂誠非素定廟勝之􅁽且羌易以計破難用兵碎也故臣愚心以為擊之不便計度臨羌東至浩亹羌虜故田及公田民所未墾可二千頃以上其閒郵亭多壞敗者臣前部士入山伐林木六萬餘枚在水次臣願罷􅀐兵留歩兵萬二百八十一人分屯要害處氷解漕下繕鄕亭浚溝渠治湟陿以西道橋七十所令可至鮮水左右田事出賦人二十畮至四月草生發郡􅀐及屬國胡􅀐各千就草為田者遊兵以充入金城郡益積畜省大費今大司農所轉榖至者足支萬人一歳食謹上田處及器用簿上報曰即如將軍之計虜當何時伏誅兵當何時得決孰計其便復奏充國上狀曰臣聞帝王之兵以全取勝是以貴謀而賤戰百戰而百勝非善之善者也故先為不可勝以待敵之可勝蠻夷習俗雖殊於禮義之國然其欲避害就利愛親戚畏死亡一也今虜亡其美地薦草愁於􅀉託逺遯骨肉心離人有畔志而明主班師罷兵萬人留田順天時因地利以待可勝之虜雖未即伏辜兵決可朞月而望羌虜瓦解前後降者萬七百餘人及受言去者凡七十軰此坐支解羌虜之具也臣謹條不出兵留田便宜十二事歩兵九校吏士萬人留屯以為武僃因田致榖威德並行一也又因排折羌虜令不得歸肥饒之地貧破其衆以成羌虜相畔之漸二也居民得並田作不失農業三也軍馬一月之食度支田士一歳罷􅀐兵以省大費四也至春省甲士卒循河湟漕榖至臨羌以示羌虜揚威武傳丗折衝之具五也以閒暇時下先所伐材繕治郵亭充入金城六也兵出乗危徼幸不出令反畔之虜竄於風寒之地離霜露疾疫􅏿墯之患坐得必勝之道七也無經阻逺追死傷之害八也内不損威武之重外不令虜得乗閒之埶九也又亡驚動河南大开使生它變之憂十也治湟陿中道橋令可至鮮水以制西域伸威千里從枕席上過師十一也大費旣省繇役豫息以戒不虞十二也留屯田得十二便出兵失十二利唯明詔采擇上復賜報曰兵決可期月而望者謂今冬邪謂何時也將軍獨不計虜聞兵頗罷且丁壯相聚攻擾田者及道上屯兵復殺略人民將何以止之將軍孰計復奏充國奏曰臣聞兵以計為本故多筭勝少筭先零羌精兵今餘不過七八千人失地逺客分散飢凍畔還者不絶臣愚以爲虜破壊可日月冀逺在來春故曰兵決可期月而望竊見北邊自燉煌至遼東萬一千五百餘里乗塞列地有吏卒數千人虜數以大衆攻之而不能害今􅀐兵雖罷虜見屯田之士精兵萬人從今盡三月虜馬羸瘦必不敢捐其妻子於它種中逺渉河山而來爲寇亦不敢將其累重還歸故地是臣之愚計所以度虜且必瓦解其處不戰而自破之􅁽也至於虜小寇盜時殺人民其原未可卒禁臣聞戰不必勝不苟接刃攻不必取不苟勞衆誠令兵出雖不能滅先零但能令虜絶不為小寇則出兵可也即今同是而釋坐勝之道從乗危之埶往終不見利空内自罷敝貶重而自損非所以示蠻夷也又大兵一出還不可復留湟中亦未可空如是徭役復更發也臣愚以為不便臣竊自惟念奉詔出塞引軍逺擊窮天子之精兵散車甲於山野雖亡尺寸之功媮得避嫌之便而亡後咎餘責此人臣不忠之利非明主社稷之福也充國奏每上輙下公卿議臣初是充國計者什三中什五最後什八有詔詰前言不便者皆頓首服魏相曰臣愚不習兵事利害後將軍數畫軍􅁽其言常是臣任其計可必用也上於是報充國嘉納之亦以破羌彊弩將軍數言當擊於是兩從其計詔兩將軍與中郎將卬出擊彊弩出降四千餘人破羌斬首二千級中郎將卬斬首降者亦二千餘級而充國所降復得五千餘人詔罷兵獨充國留屯田大司農朱邑卒上以其循吏閔惜之詔賜其子黃金百斤以奉其祭祀是歳前將軍龍􅋕矦韓増爲大司馬車􅀐將軍丁令比三歳鈔盜匈奴殺略數千人匈奴遣萬餘􅀐往擊之無所得二年春二月以鳯皇甘露降集京師赦天下夏五月趙充國奏言羌本可五萬人軍凡斬首七千六百級降者三萬一千二百人溺河湟饑餓死者五六千人定計遺脫與煎鞏黃羝俱亡者不過四千人羌靡忘等自詭必得請罷屯兵奏可充國振旅而還所善浩星賜迎說充國曰衆人皆以破羌彊弩出擊多斬首生降虜以破壞然有識者以為虜埶窮困兵雖不出必自服矣將軍即見宜歸功於二將軍出擊非愚臣所及如此將軍計未失也充國曰吾年老矣爵位已極豈嫌伐一時事以欺明主哉兵埶國之大事當為後灋老臣不以餘命壹為陛下明言兵之利害卒死誰當復言之者卒以其意對上然其計罷遣辛武賢歸酒泉太守官充國復為後將軍秋羌若零離留且種兒庫共斬先零大豪猶非楊玉首及諸豪弟澤陽雕良兒靡忘皆帥煎鞏黃羝之屬四千餘人降漢封若零弟澤二人為帥衆王餘皆為矦為君初置金城屬國以處降羌詔舉可護羌校尉者時充國病四府舉辛武賢小弟湯充國遽起奏湯使酒不可典蠻夷不如湯兄臨衆時湯已拜受節有詔更用臨衆後臨衆病免五府復舉湯湯數醉䣱羌人羌人反畔卒如充國之言辛武賢深恨充國上書告中郎將卬泄省中語下吏自殺司􅀠校尉魏郡蓋寛饒剛直公清數干犯上意時上方用刑灋任中書官寛饒奏封事曰方今聖道浸微儒術不行以刑餘為周召以灋律為詩書又引易傳言五帝官天下三王家天下家以傳子孫官以傳賢聖書奏上以為寛饒怨謗下其書中二千石時執金吾議以為寛饒旨意欲求禪大逆不道諌大夫鄭昌愍傷寛饒忠直憂國以言事不當意而為文吏所詆挫上書訟寛饒曰臣聞山有猛獸藜藿爲之不采國有忠臣姦邪爲之不起司􅀠校尉寛饒居不求安食不求飽進有憂國之心退有死節之義上無許史之屬下無金張之託職在司察直道而行多仇少與上書陳國事有司劾以大辟臣幸得從大夫之後官以諌爲名不敢不言上不聽九月下寛饒吏寛饒引佩刀自剄北闕下衆莫不憐之匈奴虛閭權渠單于將十餘萬􅀐旁塞獵欲入邊爲冦未至㑹其民題除渠堂亡降漢言狀漢以爲言兵鹿奚盧矦而遣後將軍趙充國將兵四萬餘􅀐屯縁邊九郡僃虜月餘單于病歐血因不敢入還去即罷兵乃使題王都犁胡次等入漢請和親未報㑹單于死虛閭權渠單于始立而黜顓渠閼氏顓渠閼氏即與右賢王屠􅂄堂私通右賢王㑹龍城而去顓渠閼氏語以單于病甚且勿逺後數日單于死用事貴人郝宿王刑未央使人召諸王未至顓渠閼氏與其弟左大且渠都隆竒謀立右賢王爲握􅄛朐鞮單于握􅄛朐鞮單于者烏維單于耳孫也握􅄛朐鞮單于立凶惡殺刑未央等而任用都隆竒又盡免虛閭權渠子弟近親而自以其子弟代之虚閭權渠單于子稽矦㹪旣不得立亡歸妻父烏禪幕烏禪幕者本烏孫康居閒小國數見侵􅁀率其衆數千人降匈奴狐鹿姑單于以其弟子日逐王姊妻之使長其衆居右地日逐王先賢撣其父左賢王當為單于讓狐鹿姑單于狐鹿姑單于許立之國人以故頗言日逐王當為單于日逐王素與握􅄛朐鞮單于有隙即率其衆欲降漢使人至渠犁與􅀐都尉鄭吉相聞吉發渠犁龜兹諸國五萬人迎日逐王口萬二千人小王將十二人隨吉至河曲頗有亡者吉追斬之遂將詣京師漢封日逐王為歸徳矦吉旣破車師降日逐威震西域遂并護車師以西北道故號都護都護之置自吉始焉上封吉為安逺矦吉於是中西域而立莫府治烏壘城去陽􅀜二千七百餘里匈奴益弱不敢爭西域僮僕都尉由此罷都護督察烏孫康居等三十六國動静有變以聞可安輯安輯之不可者誅伐之漢之號令班西域矣握衍朐鞮單于更立其從兄薄胥堂為日逐王烏孫昆彌翁歸靡因長羅矦常惠上書願以漢外孫元貴靡為嗣得令復尚漢公主結㛰重親畔絶匈奴詔下公卿議大鴻臚蕭望之以為烏孫絶域變故難保不可許上美烏孫新立大功又重絶故業乃以烏孫主解憂弟相夫為公主盛為資送而遣之使常惠送之至燉煌未出塞聞翁歸靡死烏孫貴人共從本約立岑娶子􅅺靡為昆彌號狂王常惠上書願留少主燉煌惠馳至烏孫責讓不立元貴靡為昆彌還迎少主事下公卿望之復以爲烏孫持兩端難約結今少主以元貴靡不立而還信無負於夷狄中國之福也少主不止繇役將興天子從之徴還少主三年春三月丙辰髙平憲矦魏相薨夏四月戊辰丙吉爲丞相吉上寛大好禮讓不親小事時人以為知大體秋七月甲子大鴻臚蕭望之爲御史大夫八月詔曰吏不廉平則治道衰今小吏皆勤事而俸禄薄欲無侵漁百姓難矣其益吏百石已下俸十五是歳東郡太守韓延壽為左馮翊始延壽為潁川太守潁川承趙廣漢構㑹吏民之後俗多怨讎延壽改更敎以禮讓召故老與議定嫁娶喪祭儀品略依古禮不得過灋百姓遵用其敎賣偶車馬下里偽物者棄之市道黄霸代延壽居潁川霸因其迹而大治延壽為吏上禮義好古教化所至必聘其賢士以禮待用廣謀議納諌爭表孝弟有行修治學官春秋鄕射陳鍾鼔管􅁌盛升降揖讓及都試講武設斧鉞旌旗習射御之事治城郭收賦租先明布告其日以期會為大事吏民敬畏趨鄕之又置正五長相率以孝弟不得舎姦人閭里阡陌有非常吏輒聞知姦人莫敢入界其始若煩後吏無追捕之苦民無箠楚之憂皆便安之接待下吏恩施甚厚而約誓明或欺負之者延壽痛自刻責豈其負之何以至此吏聞者自傷悔其縣尉至自刺死及門下􅁺自剄人救不殊延壽涕泣遣吏醫治視厚復其家在東郡三歳令行禁止斷獄大減由是入為馮翊延壽出行縣至髙陵民有昆弟相與訟田自言延壽大傷之曰幸得僃位為郡表率不能宣明敎化至令民有骨肉爭訟旣傷風化重使賢長吏嗇夫三老孝弟受其恥咎在馮翊當先退是日移病不聽事因入卧傳舍閉閤思過一縣莫知所為令丞嗇夫三老亦皆自繫待罪於是訟者宗族傳相責讓此兩昆弟深自悔皆自髠肉袒謝願以田相移終死不敢復爭郡中歙然莫不傳相敕厲不敢犯延壽恩信周徧二十四縣莫敢以辭訟自言者推其至誠吏民不忍欺紿􅊨匈奴單于又殺先賢撣兩弟烏禪幕請之不聽心恚其後左奥鞬王死單于自立其小子為奥鞬王留庭奥鞬貴人共立故奥鞬王子為王與俱東徙單于遣
