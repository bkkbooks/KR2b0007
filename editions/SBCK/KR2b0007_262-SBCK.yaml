body:
  text: 臣司馬光奉勑編集唐紀七十八光作噩凡二年起上章涒灘盡重昭宗聖穆景文孝皇帝中之中光化三年春正月宣州將康儒攻睦州錢鏐使其從弟銶拒之二月庚申以西川節度使王建兼中書令壬申加威武節度使王審知同平章事壬午以吏部尚書崔㣧同平章事充清海節度使李克用大發軍民治晉陽城塹押牙劉延業諌曰大王聲振華夷宜揚兵以嚴四境不當近治城塹損威望而啓寇心克用謝之賞以金帛夏四月加定難節度使李承慶同平章事朱全忠遣葛從周帥兖鄆滑魏四鎮兵十萬擊劉仁恭五月庚寅拔徳州斬刺史􅀓公和己亥圍劉守文於滄州仁恭復遣使卑辭厚禮求救於河東李克用遣周徳威將五千􅀐出黄澤攻邢洺以救之邕州軍亂逐節度使李鐬鐬借兵鄰道討平之六月癸亥加東川節度使王宗滌同平章事司空門下侍郎同平章事王摶明達有度量時稱良相上素疾宦官樞密使宋道弼景務修專横崔㣧日與上謀去宦官宦官知之由是􅀯北司益相憎疾各結藩鎮爲援以相傾奪摶恐其致亂從容言於上曰人君當務明大體無所偏私宦官擅權之弊誰不知之顧其勢未可猝除宜俟多難漸平以道消息願陛下言勿輕泄以速姦變㣧聞之譛摶於上曰王摶姦邪巳爲道弼輩外應上疑之及㣧罷相意摶排巳愈恨之及出鎮廣州遺朱全忠書具道摶語令全忠表論之全忠上言㣧不可離輔弼之地摶與㩽使相表裏同危社稷表連上不巳上雖察其情迫於全忠不得已㣧至湖􅀯復召還丁卯以㣧爲司空門下侍郎同平章事摶罷爲工部侍郎以道弼監荆􅀯軍務脩監青州軍戊辰貶摶溪州刺史己巳又貶崖州司户道弼長流驩州務修長流愛州是日皆賜自盡摶死於藍田驛道弼務修死於霸橋驛於是㣧專制朝政勢震中外宦官皆側目不勝其憤劉仁恭將幽州兵五萬救滄州營於乾寧軍葛從周留張存敬氏叔琮守滄州寨自將精兵逆戰於老鵶隄大破仁恭斬首三萬級仁恭走保瓦橋秋七月李克用復遣都指揮使李嗣昭將兵五萬攻邢洺以救仁恭敗汴軍於内丘王鎔遣使和解幽汴㑹乆雨朱全忠召從周還庚戌以昭義留後孟遷爲節度使甲寅以西川節度使王建兼東川信武軍兩道都指揮制置等使八月李嗣昭又敗汴軍于沙門河攻洺州乙丑朱全忠引兵救之未至嗣昭拔洺州擒刺史朱紹宗全忠命葛從周將兵擊嗣昭宣州將康儒食盡自清溪遁歸九月葛從周自鄴縣度漳水營於黄龍鎮朱全忠自將中軍三萬涉洺水置營李嗣昭弃城走從周設伏於青山口邀擊大破之崔㣧以太保門下侍郎同平章事徐彦若位在巳上惡之彦若亦自求引去時藩鎮皆爲彊臣所據惟嗣薛王知柔在廣州乃求代之乙巳以彦若同平章事充清海節度使􅀄荆􅀯節度成汭以澧朗本其巡屬爲雷滿所據屢求割􅀠荆􅀯朝廷不許汭頗怨望及彦若過荆􅀯汭置酒從容以爲言彦若曰令公位尊方面自比􅁊文雷滿小盜不能取乃怨朝廷乎汭甚慙丙午中書侍郎兼吏部尚書同平章事崔逺罷守本官以刑部尚書裴贄爲中書侍郎同平章事贄坦之弟子也升桂管爲靜江軍以經略使劉士政爲節度使朱全忠以王鎔與李克用交通移兵伐之下臨城踰滹沱攻鎮州􅀯門焚其關城全忠自至元氏鎔懼遣判官周式詣全忠請和全忠盛怒謂式曰僕屢以書諭王公竟不之聴今兵巳至此期於無捨式曰鎮州密邇太原困於侵暴四鄰各自保莫相救恤王公與之連和乃爲百姓故也今明公果能爲人除害則天下誰不聴命豈惟鎮州明公爲唐􅁊文當崇禮義以成霸業若但窮威武則鎮州雖小城堅食足明公雖有十萬之衆未易攻也况王氏秉旄五代時推忠孝人人欲爲之死庸可兾乎全忠笑􅄃式􅃑延之帳中曰與公戯耳乃遣客將開封劉捍入見鎔鎔以其子節度副使昭祚及大將子弟爲質以文繒二十萬犒軍全忠引還以女妻昭祚成徳判官張澤言於王鎔曰河東勍敵也今雖有朱氏之援譬如火發於家安能俟逺水乎彼幽滄易定猶附河東不若説朱公乗勝兼服之使河北諸鎮合而爲一則可以制河東矣鎔復遣周式往説全忠全忠喜遣張存敬㑹魏博兵擊劉仁恭甲寅拔瀛州冬十月丙辰拔景州執刺史劉仁霸辛酉拔莫州靜江節度使劉士政聞馬殷悉平嶺北大懼遣副使陳可璠屯全義嶺以備之殷遣使修好於士政可璠拒之殷遣其將秦彦暉李瓊等將兵七千擊士政湖􅀯軍至全義士政又遣指揮使王建武屯秦城可璠掠縣民耕牛以犒軍縣民怨之請爲湖􅀯郷導曰此西􅀯有小徑距秦城纔五十里僅通單􅀐彦暉遣李瓊將􅀐六十步兵三百襲秦城中宵踰垣而入擒王建武比明復還􅖞之以練造可璠壁下示之可璠猶未之信斬其首投壁中桂人震恐瓊因勒兵擊之擒可璠降其將士二千皆殺之引兵􅃐桂州自秦城以􅀯二十餘壁皆望風奔潰遂圍桂州數日士政出降桂宜巖栁象五州皆降於湖􅀯馬殷以李瓊爲桂州刺史未幾表爲靜江節度使張存敬攻劉仁恭下二十城將自瓦橋􅃐幽州道濘不能進乃引兵西攻易定辛巳拔祁州殺刺史楊約癸未以保義留後朱友謙爲節度使張存敬攻定州義武節度使王郜遣後院都知兵馬使王處直將兵數萬拒之處直請依城爲柵俟其師老而擊之孔目官梁汶曰昔幽鎮合兵三十萬攻我于時我軍不滿五千一戰敗之今存敬兵不過三萬我軍十倍於昔柰何示怯欲依城自固乎郜乃遣處直逆戰于沙河易定兵大敗死者過半餘衆擁處直奔還甲申王郜弃城奔晉陽軍中推處直爲留後存敬進圍定州丙申朱全忠至城下處直登城呼曰本道事朝廷盡忠於公未甞相犯何爲見攻全忠曰何故附河東對曰吾兄與晉王同時立勲封疆密邇且昬姻也修好往來乃常理耳請從茲攺圖全忠許之乃歸罪於梁汶而族之以謝全忠以繒帛十萬犒師全忠乃還仍爲處直表求節􅃏處直處存之母弟也劉仁恭遣其子守光將兵救定州軍於易水之上全忠遣張存敬襲之殺六萬餘人由是河北諸鎮皆服於全忠先是王郜告急於河東李克用遣李嗣昭將步􅀐三萬下太行攻懐州拔之進攻河陽河陽留後矦言不意其至狼狽失據嗣昭壊其羊馬城㑹佑國軍將閻寳引兵救之力戰於壕外河東兵乃退寳鄆州人也􅀄崔㣧與上密謀盡誅宦官及宋道弼景務脩死宦官益懼上自華州還忽忽不樂多縱酒喜怒不常左右尤自危於是左軍中尉劉季述右軍中尉王仲先樞密使王彦範薛齊偓等隂相與謀曰主上輕佻多變詐難奉事專聽任􅀯司吾輩終罹其禍不若奉太子立之尊主上爲太上皇引歧華兵爲援控制諸藩誰能害我哉十一月上獵􅁐中因置酒夜醉歸手殺黄門侍女數人明旦日加辰巳宫門不開季述詣中書白崔㣧曰宫中必有變我内臣也得以便宜從事請入視之乃帥禁兵千人破門而入訪問具得其狀出謂㣧曰主上所爲如是豈可理天下廢昬立明自古有之爲社稷大計非不順也㣧畏死不敢違庚寅季述召百官陳兵殿庭作㣧等連名狀請太子監國以示之使署名㣧及百官不得巳皆署之上在乞巧樓季述仲先伏將士千人於門外與宣武進奏官程巖等十餘人入請對季述仲先甫登殿將士大呼突入宣化門至思政殿前逢宫人輒殺之上見兵入驚墯牀下起將走季述仲先掖之令坐宫人走白皇后后趨至拜請曰軍容勿驚宅家有事取軍容商量季述等乃出百官狀白上曰陛下厭倦大寳中外羣情願太子監國請陛下保頥東宫上曰昨與卿曹樂飲不覺太過何至於是對曰此非臣等所爲皆􅀯司衆情不可遏也願陛下且之東宫待事小定復迎歸大内耳后曰宅家􅃐依軍容語即取傳國寳以授季述宦官扶上與后同輦嬪御侍從者纔十餘人適少陽院季述以銀檛畫地數上曰某時某事汝不從我言其罪一也如此數十不止乃手鎖其門鎔鐵錮之遣左軍副使李師䖍將兵圍之上動靜輒白季述穴牆以通飲食凡兵器針刀皆不得入上求錢帛俱不得求紙筆亦不與時大寒嬪御公主無衣衾號哭聞於外季述等矯詔令太子監國迎太子入宫辛卯矯詔令太子嗣位更名縝以上爲太上皇皇后爲太上皇后甲午太子即皇帝位更名少陽院曰問安宫季述加百官爵秩與將士皆受優賞欲以求媚於衆殺睦王􅀝凡宫人左右方士僧道爲上所寵信者皆榜殺之每夜殺人晝以十車載尸出一車或止一兩尸欲以立威將殺司天監胡秀林秀林曰軍容幽囚君父更欲多殺無辜乎季述憚其言正而止季述等欲殺崔㣧而憚朱全忠但解其度支鹽鐵轉運使而巳崔㣧密致書全忠使興兵圗返正左僕射致仕張濬在長水見張全義於洛陽勸之匡復又與諸藩鎮書勸之進士無棣李愚客游華州上韓建書略曰僕每讀書見君臣父子之際有傷教害義者恨不得肆之市朝明公居近関重鎮君父幽辱月餘坐視凶逆而忘勤王之舉僕所未諭也僕竊計中朝輔弼雖有志而無權外鎮諸矦雖有權而無志惟明公忠義社禝是依往年車輅播遷號泣奉迎累歲供饋再復廟朝義感人心至今謌詠此時事勢尤異前日明公地處要衝位兼將相自宫闈變故巳涉旬時若不號令率先以圖反正遲疑未決一朝山東矦伯唱義連衡鼔行而西明公求欲自安其可得乎此必然之勢也不如馳檄四方諭以逆順軍聲一振則元凶破膽旬浹之間二豎之首傳於天下計無便於此者建雖不能用厚待之愚堅辭而去朱全忠在定州行營聞亂丁未􅀯還十二月戊辰至大梁季述遣其養子希度詣全忠許以唐社稷輸之又遣供奉官李奉本以太上皇誥示全忠全忠猶豫未決㑹僚佐議之或曰朝廷大事非藩鎮所宜預知天平節度副使李振獨曰王室有難此霸者之資也今公爲唐􅁊文安危所屬季述一䆠豎耳乃敢囚廢天子公不能討何以復令諸矦且㓜主位定則天下之權盡歸宦官矣是以太阿之柄授人也全忠大悟即囚希度奉本追振如京師詗事既還又遣親吏蔣玄暉如京師與崔㣧謀之又召程巖赴大梁清海節度使薛王知柔薨是歲加楊行密兼侍中睦州刺史陳晟卒弟詢自稱刺史太子即位累旬藩鎮牋表多不至王仲先性苛察素知左右軍多積弊及爲中尉鉤校軍中錢榖得隱没爲姦者痛捶之急徴所負將士頗不安有鹽州雄毅軍使孫徳昭爲左神䇿指揮使自劉季述等廢立常憤惋不平崔㣧聞之遣判官石戩與之遊徳昭每酒酣必泣戩知其誠乃密以㣧意説之曰自上皇幽閉中外大臣至於行間士卒孰不切齒今反者獨季述仲先耳公誠能誅此二人迎上皇復位則冨貴窮一時忠義流千古苟狐疑不決則功落它人之手矣徳昭謝曰徳昭小校國家大事安敢專之苟相公有命不敢愛死戩以白㣧㣧割衣帶手書以授之徳昭復結右軍清逺都將董彦弼周承誨謀以除夜伏兵安福門外以俟之天復元年春正月乙酉朔王仲先入朝至安福門孫徳昭擒斬之馳詣少陽院叩門呼曰逆賊巳誅請陛下出勞將士何后不信曰果爾以其首來徳昭獻其首上乃與后毁扉而出崔㣧迎上御長樂門樓帥百官稱賀周承誨擒劉季述王彦範繼至方詰責巳爲亂梃所斃薛齊偓赴井死出而斬之滅四人之族并誅其黨二十餘人䆠官奉太子匿於左軍獻傳國寳上曰􅁉㓜弱爲凶豎所立非其罪也命還東宫黜爲徳王復名􅁉丙戌以孫徳昭同平章事充静海節度使賜姓名李繼昭丁亥崔㣧進位司徒㣧固辭上寵待㣧益厚己丑朱全忠聞劉季述等誅折程巖足械送京師并劉希度李奉本等皆斬於都市由是益重李振庚寅以周承誨爲嶺􅀯西道節度使賜姓名李繼誨董彦弼爲寧逺節度使賜姓李並同平章事與李繼昭俱留􅀫衞十日乃出還家賞賜傾府庫時人謂之三使相癸巳進朱全忠爵東平王丙午㩽近年宰臣延英奏事樞密使侍側爭論紛然既出又稱上㫖未允復有攺易橈權亂政自今並依大中舊制俟宰臣奏事畢方得升殿承受公事賜兩軍副使李師䖍徐彦孫自盡皆劉季述之黨也鳯翔彰義節度使李茂貞來朝加茂貞守尚書令兼侍中進爵岐王劉季述王仲先既死崔㣧陸扆上言禍亂之興皆由中官典兵乞令㣧主左軍扆主右軍則諸矦不敢侵陵王室尊矣上猶豫兩日未決李茂貞聞之怒曰崔㣧奪軍權未得巳欲翦滅諸矦上召李繼昭李繼誨李彦弼謀之皆曰臣等累丗在軍中未聞書生爲軍主若屬􅀯司必多所變更不若歸之北司爲便上乃謂㣧扆曰將士意不欲屬文臣卿曹勿堅求於是以樞密使韓全誨鳯翔監軍使張彦弘爲左右中尉全誨亦前鳯翔監軍也又徴前樞密使致仕嚴遵美爲兩軍中尉觀軍容處置使遵美曰一軍猶不可爲况兩軍乎固辭不起以袁易簡周敬容爲樞密使李茂貞辭還鎮崔㣧以宦官典兵終爲肘腋之患欲以外兵制之諷茂貞留兵三千於京師充宿衛以茂貞假子繼筠將之左諌議大夫萬年韓偓以爲不可㣧曰兵自不肯去非留之也偓曰始者何爲召之邪㣧無以應偓曰留此兵則家國兩危不留則家國兩安㣧不從朱全忠既服河北欲先取河中以制河東己亥召諸將謂曰王珂駑材恃太原自驕汰吾今斷長蛇之腰諸君爲我以一繩縛之庚子遣張存敬將兵三萬自汜水度河出舍山路以襲之全忠以中軍繼其後戊申存敬至絳州晉絳不意其至皆無守備庚戌絳州刺史陶建釗降之壬子晉州刺史張漢瑜降之全忠遣其將矦言守晉州何絪守絳州屯兵二萬以扼河東援兵之路朝廷恐全忠西入􅀜急賜詔和解之全忠不從珂遣閒使告急於李克用道路相繼克用以汴人先據晉絳兵不得進珂妻遺克用書曰兒旦暮爲俘虜大人何忍不救克用報曰今賊兵塞晉絳衆寡不敵進則與汝兩亡不若與王郎舉族歸朝珂又遺李茂貞書言天子新返正詔藩鎮無得相攻同㢡王室今諸公不顧詔命首興兵相加其心可見河中若亡則同華邠􅄮俱不自保天子神器拱手授人其勢必然矣公宜亟帥􅀜中諸鎮兵固守潼􅀜赴救河中僕自知不武願於公西偏授一小鎮此地請公有之􅀜中安危國祚脩短繫公此舉願審思之茂貞素無逺圖不報二月甲寅朔河東將李嗣昭攻澤州拔之乙卯張存敬引兵發晉州己未至河中遂圍之王珂勢窮將奔京師而人心離貳㑹浮梁壊流澌塞河舟行甚難珂挈其族數百人欲夜登舟親諭守城者皆不應牙將劉訓曰今人情擾擾若夜出涉河必爭舟紛亂一夫作難事不可知不若且送款存敬徐圖向背珂從之壬戌珂植白幡於城隅遣使以牌印請降於存敬存敬請開城珂曰吾於朱公有家丗事分請公退舍俟朱公至吾自以城授之存敬從之且使走白全忠乙丑全忠至洛陽聞之喜馳往赴之戊辰至虞郷先哭於重榮之墓盡哀河中人皆恱珂欲面縛牽羊出迎全忠遽使止之曰大師舅之恩何可忘若郎君如此使僕異日何以見舅於九泉乃以常禮出迎握手歔欷聮轡入城全忠表張存敬為護國軍留後王珂舉族遷于大梁其後全忠遣珂入朝遣人殺之於華州全忠聞張夫人疾亟遽自河中東歸李克用遣使以重幣請修好於全忠全忠雖遣使報之而忿其書辭蹇傲決欲攻之以翰林學士户部侍郎王溥爲中書侍郎同平章事以吏部侍郎裴樞爲户部侍郎同平章事溥正雅之從孫也常在崔㣧幕府故㣧引之贈謚故睦王􅀝曰恭哀太子加幽州節度使劉仁恭魏愽節度使羅紹威並兼侍中三月癸未朔朱全忠至大梁癸卯遣氏叔琮等將兵五萬攻李克用入自太行魏愽都將張文恭入自磁州新口葛從周以兖鄆兵㑹成徳兵入自土門洺州刺史張歸厚入自馬嶺義武節度使王處直入自飛狐權知晉州矦言以慈隰晉絳兵入自隂地叔琮入天井􅀜進軍昻車辛亥沁州刺史蔡訓以城降河東都將葢瑋詣矦言降即令權知沁州壬子叔琮拔澤州剌史李存璋弃城走叔琮進攻潞州昭義節度使孟遷降之河東屯將李審建王周將步軍一萬􅀐二千詣叔琮降叔琮進趣晉陽夏四月乙卯叔琮出石㑹􅀜營於洞渦驛張歸厚引兵至遼州丁巳遼州刺史張鄂降别將白奉國㑹成徳兵自井陘入己未拔承天軍與叔琮烽火相應甲戌上謁太廟丁丑赦天下攺元雪王涯等十七家􅀄楊復恭爲中尉借度支賣麴之利一年以贍兩軍自是不肯復歸至是崔㣧草赦欲抑䆠官聴酤者自造麴但月輸􅅦酤錢兩軍先所造麴􅃐令減價賣之過七月無得復賣東川節度使王宗滌以疾求代王建表馬步使王宗􅁉爲留後氏叔琮等引兵抵晉陽城下數挑戰城中大恐李克用登城備禦不遑飲食時大雨積旬城多頽壊隨加完􅀘河東將李嗣昭李嗣源鑿暗門夜出攻汴壘屢有殺獲李存進敗汴軍於洞渦時汴軍既衆芻糧不給乆雨士卒瘧利全忠乃召兵還五月叔琮等自石㑹􅀜歸諸道軍亦退河東將周徳威李嗣昭以精􅀐五千躡之殺獲甚衆先是汾州刺史李瑭舉州附於汴軍克用遣其將李存審攻之三日而拔執瑭斬之氏叔琮過上黨孟遷挈族隨之􅀯徙朱全忠遣丁㑹代守潞州朱全忠奏乞除河中節度使而諷吏民請巳爲帥癸卯以全忠爲宣武宣義天平護國四鎮節度使己酉加鎮海鎮東節度使錢鏐守侍中崔㣧之罷兩軍賣麴也并近鎮亦禁之李茂貞惜其利表乞入朝論奏韓全誨請許之茂貞至京師全誨深與相結崔㣧始懼隂厚朱全忠益甚與茂貞爲仇敵矣以佑國節度使張全義兼中書令六月癸亥朱全忠如河中上之返正也中書舍人令狐渙給事中韓偓皆預其謀故擢爲翰林學士數召對訪以機密渙綯之子也時上悉以軍國事委崔㣧每奏事上與之從容或至然燭宦官畏之側目事無大小皆咨㣧而後行㣧志欲盡除之韓偓屢諌曰事禁太甚此輩亦不可全無恐其黨迫切更生他變㣧不從丁卯上獨召偓問曰敕使中爲惡者如林何以處之對曰東内之難敕使誰非同惡處之當在正旦今巳失其時矣上曰當是時卿何不爲崔㣧言之對曰臣見陛下詔書云自劉季述等四家之外其餘一無所問夫人主所重莫大於信既下此詔則守之宜堅若復戮一人則人人懼死矣然後來所去者巳爲不少此其所以忷忷不安也陛下不若擇其尤無良者數人明示其罪寘之於法然後撫諭其餘曰吾恐爾曹謂吾心有所貯自今可無疑矣乃擇其忠厚者使爲之長其徒有善則奬之有罪則懲之咸自安矣今此曹在公私者以萬數豈可盡誅邪夫帝王之道當以重厚鎮之公正御之至於瑣細機巧此機生則彼機應矣終不能成大功所謂理絲而棼之者也况今朝廷之權散在四方苟能先收此權則事無不可爲者矣上深以爲然曰此事終以屬卿李克用遣其將李嗣昭周徳威將兵出隂地􅀜攻隰州刺史唐禮降之進攻慈州刺史張瓌降之閏月以河陽節度使丁㑹爲昭義節度使孟遷爲河陽節度使從朱全忠之請也道士杜從法以妖妄誘昌普合三州民作亂王建遣行營兵馬使王宗黯將兵三萬㑹東川武信兵討之宗黯即吉諌也崔㣧請上盡誅宦官但以宫人掌内諸司事宦官屬耳頗聞之韓全誨等涕泣求哀於上上乃令㣧有事封䟽以聞勿口奏宦官求羙女知書者數人内之宫中隂令詗察其事盡得㣧密謀上不之覺也全誨等大懼每宴聚流涕相訣别日夜謀所以去㣧之術㣧時領三司使全誨等教禁軍對上諠譟訴㣧減損冬衣上不得已解㣧鹽鐵使時朱全忠李茂貞各有挾天子令諸矦之意全忠欲上幸東都茂貞欲上幸鳯翔㣧知謀泄事急遺朱全忠書稱􅀍密詔令全忠以兵迎車駕且言昨者返正皆令公良圖而鳯翔先入朝抄取其功今不速來必成罪人豈惟功爲它人所有且見征討矣全忠得書秋七月甲寅遽歸大梁發兵西川龍臺鎭使王宗侃等討杜從法平之八月甲申上問韓偓曰聞陸扆不樂吾返正正旦易服乘小馬出啓夏門有諸對曰返正之謀獨臣與崔㣧輩數人知之扆不知也一旦忽聞宫中有變人情能不驚駭易服逃避何妨有之陛下責其爲宰相無死難之志則可也至於不樂返正恐出於䜛人之口願陛下察之上乃止韓全誨等懼誅謀以兵制上乃與李繼昭李繼誨李彦弼李繼筠深相結繼昭獨不肯從它日上問韓偓外間何所聞對曰惟聞㩽使憂懼與功臣及繼筠交結將致不安亦未知其果然不耳上曰是不虚矣比日繼誨彦弼輩語漸倔强令人難耐令狐渙欲令朕召崔㣧及全誨等於内殿置酒和解之何如對曰如此則彼凶悖益甚上曰爲之奈何對曰獨有顯罪數人速加􅇡逐餘者許其自新庻幾可息若一無所問彼必知陛下心有所貯益不自安事終未了耳上曰善既而宦官自恃黨援巳成稍不遵㩽㫖上或出之使監軍或黜守諸陵皆不行上無如之何或告楊行密云錢鏐爲盜所殺行密遣步軍都指揮使李神福等將兵取杭州兩浙將顧全武等列八寨以拒之九月癸丑上急召韓偓謂曰聞全忠欲來除君側之惡大是盡忠然須令與茂貞共其功若兩帥交爭則事危矣卿爲我語崔㣧速飛書兩鎮使相與合謀則善矣壬戌上又謂偓曰繼誨彦弼輩驕横益甚累日前與繼筠同入輒於殿東令小兒歌以侑酒令人驚駭對曰臣必知其然兹事失之於􅀄當正旦立功之時但應以官爵田宅金帛酬之不應聴其恣出入禁中此輩素無知識數求入對或妄論朝政或僭易薦人稍有不從則生怨望况惟知嗜利爲㩽使以厚利雇之令其如此耳崔㣧本留衞兵欲以制㩽使也今㩽使衞兵相與爲一將若之何汴兵若來必與歧兵􅃲於闕下臣竊寒心上但愀然憂沮而巳冬十月戊戌朱全忠大舉兵發大梁李神福與顧全武相拒乆之神福􅀗杭俘使出入卧内神福謂諸將曰杭兵尚彊我師且當夜還杭俘走告全武神福命勿追暮遣羸兵先行神福爲殿使行營都尉吕師造伏兵青山下全武素輕神福出兵追之神福師造夾擊大破之斬首五千級生擒全武錢鏐聞之驚泣曰喪我良將神福進攻臨安兩浙將秦昶帥衆三千降之韓全誨聞朱全忠將至丁酉令李繼誨李彦弼等勒兵劫上請幸鳯翔宫禁諸門皆増兵防守人及文書出入搜閲甚嚴上遣人宻賜崔㣧御札言皆悽愴末云我爲宗社大計勢須西行卿等但東行也惆悵惆悵戊戌上遣趙國夫人出語韓偓朝來彦弼輩無禮極甚欲召卿對其勢未可且言上與皇后但涕泣相向自是學士不復得對矣癸卯全誨等令上入閤召百官追寢正月丙午㩽書悉如咸通以來近例是日開延英全誨等即侍側同議政事丁未神䇿都指揮使李繼筠遣部兵掠内庫寳貨帷帳法物韓全誨遣人密送諸王宫人先之鳯翔戊申朱全忠至河中表請車駕幸東都京城大駭士民亡􅇡山谷是日百官皆不入朝闕前寂無人十一月己酉朔李繼筠等勒兵闕下禁人出入諸軍大掠士民衣紙及布襦者滿街極目韓建以幕僚司馬鄴知匡國留後朱全忠引四鎮兵七萬􅃐同州鄴迎降韓全誨等以李繼昭不與之同遏絶不令見上時崔㣧居第在開化坊繼昭帥所部六十餘人及􅀜東諸道兵在京師者共守衞之百官及士民避亂者皆往依之庚戌上遣供奉官張紹孫召百官崔㣧等皆表辭不至壬子韓全誨等陳兵殿前言於上曰全忠以大兵逼京師欲劫天子幸洛陽求傳禪臣等請奉陛下幸鳯翔收兵拒之上不許杖劒登乞巧樓全誨等逼上下樓上行纔及壽春殿李彦弼巳於御院縱火是日冬至上獨坐思政殿翹一足一足蹋䦨干庭無羣臣旁無侍者頃之不得巳與皇后妃嬪諸王百餘人皆上馬慟哭聲不絶出門回顧禁中火巳赫然是夕􅀫鄠縣朱全忠遣司馬鄴入華州謂韓建曰公不早知過自歸又煩此軍少留城下矣是日全忠自故市引兵􅀯度渭韓建遣節度副使李巨川請降獻銀三萬兩助軍全忠乃西􅀯􅃐赤水癸丑李茂貞迎車駕於田家磑上下馬慰接之甲寅車駕至盩厔乙卯留一日朱全忠至零口西聞車駕西幸與僚佐議復引兵還赤水左僕射致仕張濬説全忠曰韓建茂貞之黨不先取之必爲後患全忠聞建有表勸天子幸鳯翔乃引兵逼其城建單􅀐迎謁全忠責之對曰建目不知書凡表章書檄皆李巨川所爲全忠以巨川常爲建畫策斬之軍門謂建曰公許人可即往衣錦丁巳以建爲忠武節度使理陳州以兵援送之以前商州刺史李存權知華州徙忠武節度使趙珝爲匡國節度使車駕之在華州也商賈輻湊韓建重征之二年得錢九百萬緡至是全忠盡取之是時京師無天子行在無宰相崔㣧使太子太師盧偓等二百餘人列狀請朱全忠西迎車駕又使王溥至赤水見全忠計事全忠復書曰進則懼脅君之謗退則懐負國之慙然不敢不勉戊午全忠發赤水辛酉以兵部侍郎盧光啓權句當中書事車駕留岐山三日壬戌至鳯翔朱全忠至長安宰相帥百官班迎於長樂坡明日行復班辭於臨臯驛全忠賞李繼昭之功􅀄令權知匡國留後復留爲兩街制置使賜與甚厚繼昭盡獻其兵八千人全忠使判官李擇裴鑄入奏事稱奉密詔及得崔㣧書令臣將兵入朝韓全誨等矯詔荅以朕避災至此非宦官所劫密詔皆崔㣧詐爲之卿宜歛兵歸保土宇茂貞遣其將符道昭屯武功以拒全忠癸亥全忠將康懐貞擊破之丁卯以盧光啓爲右諌議大夫參知機務戊辰朱全忠至鳯翔軍於城東李茂貞登城謂曰天子避災非臣下無禮讒人誤公至此全忠報曰韓全誨劫遷天子今來問罪迎扈還宫岐王苟不預謀何煩陳諭上屢詔全忠還鎮全忠乃拜表奉辭辛未移兵北􅃐邠州甲戌制守司空兼門下侍郎同平章事崔㣧責授工部尚書户部侍郎同平章事裴樞罷守本官乙亥朱全忠攻邠州丁丑靜難節度使李繼徽請降復姓名楊崇本全忠質其妻於河中令崇本仍鎮邠州全忠之西入􅀜也韓全誨李茂貞以詔命徴兵河東茂貞仍以書求援於李克用克用遣李嗣昭將五千􅀐自沁州􅃐晉州與汴兵戰於平陽北破之乙亥全忠發邠州戊寅次三原十二月癸未崔㣧至三原見全忠􅃐之迎駕己丑全忠遣朱友寧攻盩厔不下戊戌全忠自往督戰盩厔降屠之全忠令崔㣧帥百官及京城居民悉遷于華州詔以裴贄充大明宫留守清海節度使徐彦若薨遺表薦行軍司馬劉隱權留後李神福知錢鏐定不死而臨安城堅乆攻不拔欲歸恐爲鏐所邀乃遣人守衞鏐祖考丘壟禁樵采文使顧全武通家信鏐遣使謝之神福於要路多張旗幟爲虚寨鏐以爲淮􅀯兵大至遂請和神福受其犒賂而還朱全忠之入􅀜也戎昭節度使馮行襲遣副使魯崇矩聽命於全忠韓全誨遣中使二十餘人分道徴江淮兵屯金州以脅全忠行襲盡殺中使收其詔㩽送全忠又遣中使徴兵於王建朱全忠亦遣使乞師於建建外修好於全忠罪狀李茂貞而隂勸茂貞堅守許之救援以武信節度使王宗佶前東川節度使王宗滌等爲扈駕指揮使將兵五萬聲言迎車駕其實襲茂貞山􅀯諸州江西節度使鍾傳將兵圍撫州刺史危全諷天火燒其城士民讙驚諸將請急攻之傳曰乗人之危非仁也乃祝曰全諷之罪無爲害民火尋止全諷聞之謝罪聴命以女妻傳子匡時傳少時甞獵醉遇虎與􅃲虎􅅮其肩而傳亦持虎腰不置旁人共殺虎乃得免既貴悔之常戒諸子曰士處丗貴智謀勿效吾暴虎也武貞節度使雷滿薨子彦威自稱留後資治通鑑卷第二百六十二
