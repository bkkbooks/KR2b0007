body:
  text: 臣司馬光奉勑編集唐紀十九兆閹茂凡五年起玄黓敦牂盡柔髙宗天皇大聖大弘孝皇帝下永淳元年春二月作萬泉宫於藍田癸未攺元赦天下戊午立皇孫重照爲皇太孫上欲令開府置僚屬問吏部郎中王方慶對曰􅀳及齊皆嘗立太孫其太子官屬即爲太孫官屬未聞太子在東宫而更立太孫者也上曰自我作古可乎對曰三王不相襲禮何爲不可乃奏置師􅀓等官既而上疑其非法竟不􅀘授方慶裒之曾孫也名綝以字行西突厥阿史那車簿帥十姓反夏四月甲子朔日有食之上以􅀜中饑饉米斗三百將幸東都丙寅發京師留太子監國使劉仁􅁤裴炎薛元超輔之時出幸倉猝扈從之士有餓死於中道者上慮道路多草竊命監察御史魏元忠檢校車駕前後元忠受詔即閱視赤縣獄得盗一人神采語言異於衆命釋桎梏襲冠帶乘驛以從與之共食宿託以詰盗其人笑許諾比及東都士馬萬數不亡一錢辛未以禮部尚書聞喜憲公裴行儉爲金牙道行軍大㧾管帥右金吾將軍閻懐旦等三揔管分道討西突厥師未行行儉薨行儉有知人之鑒􅀄爲吏部侍郎前進士王勮咸陽尉欒城蘇味道皆未知名行儉一見謂之曰二君後當相次掌銓衡僕有弱息願以爲託是時勮弟勃與華隂楊烱范陽盧照鄰義烏駱賔王皆以文章有盛名司列少常伯李敬玄尤重之以爲必顯逹行儉曰士之致逺者當先器識而後才藝勃等雖有文華而浮躁淺露豈享爵禄之器邪楊子稍沈靜應至令長餘得令終幸矣既而勃度海堕水烱終於盈川令照鄰惡疾不愈赴水死賔王反誅勮味道皆典選如行儉言行儉爲將帥所引偏禆如程務挺張䖍勗王方翼劉敬同李多祚黒齒常之後多爲名將行儉嘗命左右取犀角麝香而失之又敕賜馬及鞍令史輒馳驟馬倒鞍破二人皆逃去行儉使人召還謂曰爾曹皆誤耳何相輕之甚邪待之如故破阿史那都攴得馬腦盤廣二尺餘以示將士軍吏王休烈捧盤升階跌而碎之惶恐叩頭流血行儉笑曰爾非故為何至於是不復有追惜之色詔賜都支等資産金器三千餘物雜畜稱是並分給親故及偏禆數日而盡阿史那車薄圍弓月城安西都護王方翼引軍救之破虜衆於伊麗水斬首千餘級俄而三姓咽麫與車薄合兵拒方翼方翼與戰於􅀬海流矢貫方翼臂方翼以佩刀截之左右不知所將胡兵謀執方翼以應車薄方翼知之悉召㑹議陽出軍資賜之以次引出斬之㑹大風方翼振金鼔以亂其聲誅七十餘人其徒莫之覺既而分遣禆將襲車薄咽麫大破之擒其酋長三百人西突厥遂平閻懐旦等竟不行方翼尋遷夏州都督徵入議邊事上見方翼衣有血漬問之方翼具對􅀬海苦戰之狀上視瘡歎息竟以廢后近屬不得用而歸乙酉車駕至東都丁亥以黄門侍郎潁川郭待舉兵部侍郎岑長倩祕書貟外少監檢校中書侍郎鼔城郭正一吏部侍郎鼔城魏玄同並與中書門下同承受進止平章事上欲用待舉等謂崔知温曰待舉等資任尚淺且令預聞政事未可與卿等同名自是外司四品巳下知政事者始以平章事爲名長倩文本之兄子也先是玄同爲吏部侍郎上言銓選之弊以爲人君之體當委任而責成功所委者當則所用者自精矣故周穆王命伯囧爲太僕正曰慎簡乃僚是使羣司各自求其小者而天子命其大者也乃至漢氏得人皆自州縣􅀘署五府辟召然後升於天朝自魏􅀳以來始專委選部夫以天下之大士人之衆而委之數人之手用刀筆以量才案簿書而察行借使平如權衡明如水鏡猶力有所極照有所窮况所委非人而有愚闇阿私之弊乎願略依周漢之規以救魏􅀳之失䟽奏不納五月丙午東都霖雨乙卯洛水溢溺民居千餘家􅀜中先水後旱蝗繼以疾疫米斗四百兩京間死者相枕於路人相食上既封泰山欲遍封五嶽秋七月作奉天宫於嵩山􅀯監察御史裏行李善感諌曰陛下封泰山告太平致羣瑞與三皇五帝比隆矣數年巳來菽粟不稔餓殍相望四夷交侵兵車歳駕陛下宜恭黙思道以禳災譴乃更廣營宫室勞役不休天下莫不失望臣忝備國家耳目竊以此爲憂上雖不納亦優容之自褚遂良韓瑗之死中外以言爲諱無敢逆意直諫幾二十年及善感始諫天下皆喜謂之鳯鳴朝陽上遣宦者縁江徙異竹欲植􅁐中宦者科舟載竹所在縱暴過荆州荆州長史蘇良嗣囚之上䟽切諫以爲致逺方異物煩擾道路恐非聖人愛人之意又小人竊㺯威福虧損皇明上謂天后曰吾約束不嚴果爲良嗣所怪手詔慰諭良嗣令弃竹江中良嗣丗長之子也黔州都督謝祐希天后意逼零陵王明令自殺上深惜之黔府官屬皆坐免官祐後寢於平閣與婢妾十餘人共處夜失其首垂拱中明子零陵王俊黎國公傑爲天后所殺有司籍其家得祐首漆爲穢器題云謝祐乃知明子使刺客取之也太子留守京師頗事遊畋薛元超上䟽規諫上聞之遣使者慰勞元超仍召赴東都吐蕃將論欽陵寇拓松翼等州詔左驍衛郎將李孝逸右衛郎將衛蒲山發秦渭等州兵分道禦之冬十月丙寅黄門侍郎劉景先同中書門下平章事是歳突厥餘黨阿史那骨篤禄阿史德元珍等招集亡散據黒沙城反入寇并州及單于府之北境殺嵐州刺史王德茂右領軍衛將軍檢校代州都督薛仁貴將兵擊元珍於雲州虜問唐大將爲誰應之曰薛仁貴虜曰吾聞仁貴流象州死乆矣何以紿我仁貴免胄示之面虜相顧失色下馬列拜稍稍引去仁貴因奮擊大破之斬首萬餘級捕虜二萬餘人吐蕃入寇河源軍軍使婁師德將兵擊之於白水澗八戰八捷上以師德爲比部貟外郎左驍衛郎將河源軍經略副使曰卿有文武材勿辭也弘道元年春正月甲午朔上行幸奉天宫二月庚午突厥寇定州刺史霍王元􅁤擊却之乙亥復冦嬀州三月庚寅阿史那骨篤禄阿史德元珍圍單于都護府執司馬張行師殺之遣勝州都督王本立夏州都督李崇義將兵分道救之太子右庶子同中書門下三品李義琰攺葬父母使其舅氏遷舊墓上聞之怒曰義琰􅀝􅀔乃陵其舅家不可復知政事義琰聞之不自安以足疾乞骸骨庚子以義琰爲銀青光禄大夫致仕癸丑守中書令崔知温薨夏四月己未車駕還東都綏州步落稽白鐵余埋銅佛於地中乆之草生其上紿其郷人曰吾於此數見佛光擇日集衆掘地果得之因曰得見聖佛者百疾皆愈逺近赴之鐵余以雜色囊盛之數十重得厚施乃去一囊數年間歸信者衆遂謀作亂據城平縣自稱光明聖皇帝置百官進攻綏息大斌二縣殺官吏焚民居遣右武衛將軍程務挺與夏州都督王方翼討之甲申攻拔其城擒鐵余餘黨悉平五月庚寅上幸芳桂宫至合璧宫遇大雨而還乙巳突厥阿史那骨篤禄等寇蔚州殺刺史李思儉豐州都督崔智辯將兵邀之於朝那山北兵敗爲虜所擒朝議欲廢豐州遷其百姓於靈夏豐州司馬唐休璟上言以爲豐州阻河爲固居賊衝要自秦漢巳來列爲郡縣土宜耕牧隋季喪亂遷百姓於寧慶二州致胡虜深侵以靈夏爲邊境貞觀之末募人實之西北始安今廢之則河濵之地復爲賊有靈夏等州人不安業非國家之利也乃止六月突厥别部寇掠嵐州偏將楊玄基擊走之秋七月己丑立皇孫重福爲唐昌王庚辰詔以今年十月有事於嵩山尋以上不豫攺用來年正月甲辰徙相王輪爲豫王更名旦中書令兼太子左庶子薛元超病瘖乞骸骨許之八月己丑以將封嵩山召太子赴東都留唐昌王重福守京師以劉仁􅁤爲之副冬十月己卯太子至東都癸亥車駕幸奉天宫十一月丙戌詔罷來年封嵩山上疾甚故也上苦頭重不能視召侍醫秦鳴鶴診之鳴鶴請刺頭出血可愈天后在簾中不欲上疾愈怒曰此可斬也乃欲於天子頭刺血鳴鶴叩頭請命上曰但刺之未必不佳乃刺百㑹腦户二穴上曰吾目似明矣后舉手加額曰天賜也自負綵百匹以賜鳴鶴戊戌以右武衛將軍程務挺爲單于道安撫大使招討阿史那骨篤禄等詔太子監國以裴炎劉景先郭正一兼東宫平章事上自奉天宫疾甚宰相皆不得見丁未還東都百官見於天津橋南十二月丁巳攺元赦天下上欲御則天門樓宣赦氣逆不能乘馬乃召百姓入殿前宣之是夜召裴炎入受遺詔輔政上崩於貞觀殿遺詔太子柩前即位軍國大事有不决者兼取天后進止廢萬泉芳桂奉天等宫庚申裴炎奏太子未即位未應宣敕有要速處分望宣天后令於中書門下施行甲子中宗即位尊天后爲皇太后政事咸取决焉太后以澤州刺史韓王元嘉等地尊望重恐其爲變並加三公等官以慰其心甲戌以劉仁􅁤爲左僕射裴炎爲中書令戊寅以劉景先爲侍中故事宰相於門下省議事謂之政事堂故長孫无忌爲司空房玄齡爲僕射魏徵爲太子太師皆知門下省事及裴炎遷中書令始遷政事堂於中書省壬午遣左威衛將軍王果左監門將軍令狐智通右金吾將軍楊玄儉右千牛將軍郭齊宗分往并益荆楊四大都督府與府司相知鎮守中書侍郎同平章事郭正一爲國子祭酒罷政事則天順聖皇后上之上光宅元年春正月甲申朔攺元嗣聖赦天下立太子妃韋氏爲皇后擢后父玄貞自普州參軍爲豫州刺史癸巳以左散􅀐常侍杜陵韋弘敏爲太府卿同中書門下三品中宗欲以韋玄貞爲侍中又欲授乳母之子五品官裴炎固爭中宗怒曰我以天下與韋玄貞何不可而惜侍中邪炎懼白太后密謀廢立二月戊午太后集百官於乾元殿裴炎與中書侍郎劉禕之羽林將軍程務挺張䖍勗勒兵入宫宣太后令廢中宗爲廬陵王扶下殿中宗曰我何罪太后曰汝欲以天下與韋玄貞何得無罪乃幽于別所己未立雍州牧豫王旦爲皇帝政事决於太后居睿宗於别殿不得有所預立豫王妃劉氏爲皇后后德威之孫也有飛􅀐十餘人飲於坊曲一人言曏知别無勲賞不若奉廬陵一人起出詣北門告之座未散皆捕得繫羽林獄言者斬餘以知反不告皆絞告者除五品官告密之端自此興矣壬子以永平郡王成器爲皇太子睿宗之長子也赦天下攺元文明庚申廢皇太孫重照爲庶人命劉仁􅁤專知西京留守事流韋玄貞於欽州太后與劉仁􅁤書曰昔漢以􅀜中之事委蕭何今託公亦猶是矣仁􅁤上䟽辭以衰老不堪居守因陳吕后禍敗之事以申規戒太后使祕書監武承嗣齎璽書慰諭之曰今以皇帝諒闇不言眇身且代親政逺勞勸戒復辭衰疾又云吕氏見嗤於後代禄産貽禍於漢朝引喻良深愧慰交集公忠貞之操終始不渝勁直之風古今罕比􅀄聞此語能不罔然靜而思之是爲􅀛鏡况公先朝舊德遐邇具瞻願以匡救爲懐無以暮年致請辛酉太后命左金吾將軍丘神勣詣巴州檢校故太子賢宅以備外虞其實風使殺之神勣行恭之子也甲子太后御武成殿皇帝帥王公以下上尊號丁卯太后臨軒遣禮部尚書武承嗣冊嗣皇帝自是太后常御紫宸殿施慘紫帳以視朝丁丑以太常卿檢校豫王府長史王德真爲侍中中書侍郎檢校豫王府司馬劉禕之同中書門下三品三月丁亥徙杞王上金爲畢王鄱陽王素節爲葛王丘神勣至巴州幽故太子賢於别室逼令自殺太后乃歸罪於神勣戊戌舉哀於顯福門貶神勣爲疊州刺史己亥追封賢爲雍王神勣尋復入爲左金吾將軍夏四月開府儀同三司梁州都督滕王元嬰薨辛酉徙畢王上金爲澤王拜蘇州刺史葛王素節爲許王拜絳州刺史癸酉遷廬陵王于房州丁丑又遷于均州故濮王宅五月丙申髙宗靈駕西還閏月以禮部尚書武承嗣爲太常卿同中書門下三品秋七月戊午廣州都督路元叡爲崑崙所殺元叡闇懦僚屬恣横有商舶至僚屬侵漁不巳商胡訴於元叡元叡索枷欲繫治之羣胡怒有崑崙䄂劒直登聽事殺元叡及左右十餘人而去無敢近者登舟入海追之不及温州大水流四千餘家突厥阿史那骨篤禄等冦朔州八月庚寅葬天皇大帝于乾陵廟號髙宗􅀄尚書左丞馮元常爲髙宗所委髙宗晩年多疾百司奏事毎曰朕體中不佳可與元常平章以聞元常嘗宻言中宫威權太重宜稍抑損髙宗雖不能用深以其言爲然及太后稱制四方爭言符瑞嵩陽令樊文獻瑞石太后命於朝堂示百官元常奏言狀涉謟詐不可誣罔天下太后不恱出爲隴州刺史元常子琮之曾孫也丙午太常卿同中書門下三品武承嗣罷爲禮部尚書括州大水流二千餘家九月甲寅赦天下攺元旗幟皆從金色八品以下舊服青者更服碧攺東都爲神都宫名太􅀄又攺尚書省爲文昌臺左右僕射爲左右相六曹爲天地四時六官門下省爲鸞臺中書省爲鳯閣侍中爲納言中書令爲内史御史臺爲左肅政臺増置右肅政臺其餘省寺監率之名悉以義類攺之以左武衛大將軍程務挺爲單于道安撫大使以備突厥武承嗣請太后追王其祖立武氏七廟太后從之裴炎諫曰太后母臨天下當示至公不可私於所親獨不見吕氏之敗乎太后曰吕后以權委生者故及於敗今吾追尊亡者何傷乎對曰事當防微杜漸不可長耳太后不從巳巳追尊太后五代祖克巳爲魯靖公妣爲夫人髙祖居常爲太尉北平恭肅王曾祖儉爲太尉金城義康王祖華爲太尉太原安成王考士彠爲太師魏定王祖妣皆爲妃裴炎由是得罪又作五代祠堂於文水時諸武用事唐宗室人人自危衆心憤惋㑹眉州刺史英公李敬業及弟盩厔令敬猷給事中唐之竒長安主簿駱賔王詹事司直杜求仁皆坐事敬業貶柳州司馬敬猷免官之竒貶括蒼令賔王貶臨海丞求仁貶黟令求仁正倫之姪也盩厔尉魏思温嘗爲御史復􅀍黜皆㑹於楊州各自以失職怨望乃謀作亂以匡復廬陵王爲辭思温爲之謀主使其黨監察御史薛仲璋求奉使江都令雍州人韋超詣仲璋告變云楊州長史陳敬之謀反仲璋収敬之繫獄居數日敬業乘傳而至矯稱楊州司馬來之官云奉密㫖以髙州酋長馮子猷謀反發兵討之於是開府庫令士曹參軍李宗臣就錢坊驅囚徒工匠數百授以甲斬敬之於繫所録事參軍孫處行拒之亦斬以徇僚吏無敢動者遂起一州之兵復稱嗣聖元年開三府一曰匡復府二曰英公府三曰楊州大都督府敬業自稱匡復府上將領楊州大都督以之竒求仁爲左右長史宗臣仲璋爲左右司馬思温爲軍師賔王爲記室旬日間得勝兵十餘萬移檄州縣略曰僞臨朝武氏者人非温順地實寒微昔充太宗下陳嘗以更衣入侍洎乎晩節穢亂春宫密隠先帝之私隂圖後庭之嬖踐元后於翬翟陷吾君於聚麀又曰殺姊屠兄弑君鴆母人神之所同嫉天地之所不容又曰包藏禍心竊窺神器君之愛子幽之於别宫賊之宗盟委之以重任又曰一抔之土未乾六尺之孤何在又曰試觀今日之域中竟是誰家之天下太后見檄問曰誰所爲或對曰駱賔王太后曰宰相之過也人有如此才而使之流落不偶乎敬業求得人貌類故太子賢者紿衆云賢不死亡在此城中令吾屬舉兵因奉以號令楚州司馬李崇福帥所部三縣應敬業盱眙人劉行舉獨據縣不從敬業遣其將尉遲昭攻盱眙行舉拒却之詔以行舉爲遊擊將軍以其弟行實爲楚州刺史甲申以左玉鈐衛大將軍李孝逸爲楊州道大揔管將兵三十萬以將軍李知十馬敬臣爲之副以討李敬業武承嗣與從父弟右衛將軍三思以韓王元嘉魯王靈䕫屬尊位重屢勸太后因事誅之太后謀於執政劉禕之韋思謙皆無言内史裴炎獨固爭太后愈不恱三思元慶之子也及李敬業舉兵薛仲璋炎之甥也炎欲示閑暇不汲汲議誅討太后問計於炎對曰皇帝年長不親政事故豎子得以爲辭若太后返政則不討自平矣監察御史藍田崔詧聞之上言炎受顧託大權在己若無異圖何故請太后歸政太后命左肅政大夫金城騫味道侍御史櫟陽魚承曄鞫之収炎下獄炎􅀍収辭氣不屈或勸炎遜辭以免炎曰宰相下獄安有全理鳯閣舍人李景諶證炎必反劉景先及鳯閣侍郎義陽胡元範皆曰炎社稷元臣有功於國悉心奉上天下所知臣敢明其不反太后曰炎反有端顧卿不知耳對曰若裴炎爲反則臣等亦反也太后曰朕知裴炎反知卿等不反文武間證炎不反者甚衆太后皆不聽俄并景先元範下獄丁亥以騫味道檢校内史同鳯閣鸞臺三品李景諶同鳯閣鸞臺平章事魏思温說李敬業曰明公以匡復爲辭宜帥大衆鼔行而進直指洛陽則天下知公志在勤王四面響應矣薛仲璋曰金陵有王氣且大江天險足以爲固不如先取常潤爲定霸之基然後北向以圖中原進無不利退有所歸此良䇿也思温曰山東豪傑以武氏專制憤惋不平聞公舉事皆自蒸麥飯爲糧伸鋤爲兵以俟􅀯軍之至不乗此􅀔以立大功乃更蓄縮欲自謀巢穴逺近聞之其誰不解體敬業不從使唐之竒守江都將兵度江攻潤州思温謂杜求仁曰兵􅀔合則彊分則弱敬業不并力度淮収山東之衆以取洛陽敗在眼中矣壬辰敬業陷潤州執刺史李思文以李宗臣代之思文敬業之叔父也知敬業之謀先遣使間道上變爲敬業所攻拒守乆之力屈而陷思温請斬以徇敬業不許謂思文曰叔黨於武氏宜攺姓武潤州司馬劉延嗣不降敬業將斬之思温救之得免與思文皆囚於獄中延嗣審禮從父弟也曲阿令河間尹元貞引兵救潤州戰敗爲敬業所擒臨以白刃不屈而死丙申斬裴炎于都亭炎將死顧兄弟曰兄弟官皆自致炎無分毫之力今坐炎流竄不亦悲乎籍没其家無甔石之儲劉景先貶普州刺史又貶辰州剌史胡元範流瓊州而死裴炎弟子太僕寺丞伷先年十七上封事請見言事太后召見詰之曰汝伯父謀反尚何言伷先對曰臣爲陛下畫計耳安敢訴寃陛下爲李氏婦先帝弃天下遽攬朝政變易嗣子踈斥李氏封崇諸武臣伯父忠於社稷反誣以罪戮及子孫陛下所爲如是臣實惜之陛下早宜復子明辟髙枕深居則宗族可全不然天下一變不可復救矣太后怒曰胡白小子敢發此言命引出伷先反顧曰今用臣言猶未晩如是者三太后命於朝堂杖之一百長流瀼州炎之下獄也郎將姜嗣宗使至長安劉仁􅁤問以東都事嗣宗曰嗣宗覺裴炎有異於常乆矣仁􅁤曰使人覺之邪嗣宗曰然仁􅁤曰仁軌有奏事願附使人以聞嗣宗曰諾明日受仁􅁤表而還表言嗣宗知裴炎反不言太后覽之命拉嗣宗於殿庭絞於都亭丁酉追削李敬業祖考官爵發􅃁斵棺復姓徐氏李景諶罷爲司賔少卿以右史武康沈君諒著作郎崔詧爲正諌大夫同平章事徐敬業聞李孝逸將至自潤州回軍拒之屯髙郵之下阿溪使徐敬猷逼淮隂别將韋超尉遲昭屯都梁山李孝逸軍至臨淮偏將雷仁智與敬業戰不利孝逸懼按兵不進監軍殿中侍御史魏元忠謂孝逸曰天下安危在兹一舉四方承平日乆忽聞狂狡注心傾耳以俟其誅今大軍乆留不進逺近失望萬一朝廷更命它將以代將軍將軍何辭以逃逗撓之罪乎孝逸乃引軍而前壬寅馬敬臣擊斬尉遲昭於都梁山十一月辛亥以左鷹揚大將軍黒齒常之爲江􅀯道大揔管討敬業韋超擁衆據都梁山諸將皆曰超憑險自固士無所施其勇􅀐無所展其足且窮冦死戰攻之多殺士卒不如分兵守之大軍直趣江都覆其巢穴支度使薛克􅌟曰超雖據險其衆非多今多留兵則前軍􅀔分少留兵則終爲後患不如先擊之其勢必舉舉都梁則淮隂高郵望風瓦解矣魏元忠請先擊徐敬猷諸將曰不如先攻敬業敬業敗則敬猷不戰自擒矣若擊敬猷則敬業引兵救之是腹背受敵也元忠曰不然賊之精兵盡在下阿烏合而來利在一決萬一失利大事去矣敬猷出於博徒不習軍事其衆單弱人情易揺大軍臨之駐馬可克敬業雖欲救之計程必不能及我克敬猷乗勝而進雖有韓白不能當其鋒矣今不先取弱者而遽攻其彊非計也孝逸從之引兵擊超超夜遁進擊敬猷敬猷脱身走庚申敬業勒兵阻溪拒守後軍揔管蘇孝祥夜將五千人以小舟度溪先擊之兵敗孝祥死士卒赴溪溺死者過半左豹韜衛果毅漁陽成三朗爲敬業所擒唐之竒紿其衆曰此李孝逸也將斬之三朗大呼曰我果毅成三朗非李將軍也官軍今大至矣爾曹破在朝夕我死妻子受榮爾死妻子籍没爾終不及我也遂斬之孝逸等諸軍繼至戰數不利孝逸懼欲引退魏元忠與行軍管記劉知柔言於孝逸曰風順荻乾此火攻之利固請决戰敬業置陳既乆士卒多疲倦顧望陳不能整孝逸進擊之因風縱火敬業大敗斬首七千級溺死者不可勝紀敬業等輕􅀐走入江都挈妻子奔潤州將入海奔髙麗孝逸進屯江都分遣諸將追之乙丑敬業至海陵界阻風其將王那相斬敬業敬猷及駱賔王首來降餘黨唐之竒魏思温等皆捕得傳首神都楊潤楚三州平陳嶽論曰敬業苟能用魏思温之䇿直指河洛專以匡復爲事縱軍敗身戮亦忠義在焉而妄希金陵王氣是真爲叛逆不敗何待敬業之起也使敬猷將兵五千循江西上略地和州前弘文館直學士歴陽髙子貢帥郷里數百人拒之敬猷不能西以功拜朝散大夫成均助教丁卯郭待舉罷爲左庶子以鸞臺侍郎韋方質爲鳯閣侍郎同平章事方質雲起之孫也十二月劉景先又貶吉州貟外長史郭待舉貶岳州刺史初裴炎下獄單于道安撫大使左武衛大將軍程務挺密表申理由是忤㫖務挺素與唐之竒杜求仁善或譛之曰務挺與裴炎徐敬業通謀癸卯遣左鷹􅀭將軍裴紹業即軍中斬之籍没其家突厥聞務挺死所在宴飲相慶又爲務挺立祠每出師必禱之太后以夏州都督王方翼與務挺連職素相親善且廢后近屬徵下獄流崖州而死垂拱元年春正月丁未朔赦天下攺元太后以徐思文爲忠特免縁坐拜司僕少卿謂曰敬業攺卿姓武朕今不復奪也庚戌以騫味道守內史戊辰文昌左相同鳯閣鸞臺三品樂城文獻公劉仁􅁤薨二月癸未制朝堂所置登聞鼓及肺石不須防守有撾鼔立石者令御史受狀以聞乙巳以春官尚書武承嗣秋官尚書裴居道右肅政大夫韋思謙並同鳯閣鸞臺三品突厥阿史那骨篤禄等數冦邊以左玉鈐衛中郎將淳于處平爲陽曲道行軍揔管擊之正諫大夫同平章事沈君諒罷三月正諌大夫同平章事崔詧罷丙辰遷廬陵王于房州辛酉武承嗣罷辛未頒垂拱格朝士有左遷詣宰相自訴者內史騫味道曰此太后處分同中書門下三品劉禕之曰縁坐攺官由臣下奏請太后聞之夏四月丙子貶味道爲青州刺史加禕之太中大夫謂侍臣曰君臣同體豈得歸惡於君引善自取乎癸未突厥寇代州淳于處平引兵救之至忻州爲突厥所敗死者五千餘人五月丙午以裴居道爲内史納言王德真流象州己酉以冬官尚書蘇良嗣爲納言壬戌制內外九品以上及百姓咸令自舉壬申韋方質同鳯閣鸞臺三品六月天官尚書韋待價同鳯閣鸞臺三品待價萬石之兄也同羅僕固等諸部叛遣左豹韜衛將軍劉敬同發河西􅀐士出居延海以討之同羅僕固等皆敗散敇僑置安北都護府於同城以納降者秋七月己酉以文昌左丞魏玄同爲鸞臺侍郎同鳯閣鸞臺三品詔自今祀天地髙祖太宗髙宗皆配坐用鳯閣舍人元萬頃等之議也九月丁卯廣州都督王果討反獠平之冬十一月癸卯命天官尚書韋待價爲燕然道行軍大揔管以討吐蕃初西突厥興昔亡繼往絶可汗既死十姓無主部落多散亡太后乃擢興昔亡之子左豹韜衛翊府中郎將元慶爲左玉鈐衛將軍兼崑陵都護襲興昔亡可汗押五咄陸部落麟臺正字射洪陳子昂上疏以爲朝廷遣使廵察四方不可任非其人及刺史縣令不可不擇比年百姓疲於軍旅不可不安其略曰夫使不擇人則黜陟不明刑罰不中朋黨者進貞直者退徒使百姓修飾道路送往迎來無所益也諺曰欲知其人觀其所使不可不慎也又曰宰相陛下之腹心刺史縣令陛下之手足未有無腹心手足而能獨理者也又曰天下有危機禍福因之而生機靜則有福機動則有禍百姓是也百姓安則樂其生不安則輕其死輕其死則無所不至祅逆乗釁天下亂矣又曰隋􅌆帝不知天下有危機而信貪佞之臣冀収夷狄之利卒以滅亡其爲殷鑒豈不大哉太后修故白馬寺以僧懐義爲寺主懐義鄠人本姓馮名小寳賣藥洛陽市因千金公主以進得幸於太后太后欲令出入禁中乃度爲僧名懐義又以其家寒微令與駙馬都尉薛紹合族命紹以季父事之出入乗御馬宦者十餘人侍從士民遇之皆奔避有近之者輒檛其首流血委之而去任其生死見道士則極意敺之仍髠其髮而去朝貴皆匍匐禮謁武承嗣武三思皆執僮僕之禮以事之爲之執轡懐義視之若無人多聚無頼少年度爲僧縱横犯法人莫敢言右臺御史馮思勗屢以法繩之懐義遇思勗於途令從者敺之幾死二年春正月太后下詔復政於皇帝睿宗知太后非誠心奉表固讓太后復臨朝稱制辛酉赦天下二月辛未朔日有食之右衛大將軍李孝逸既克徐敬業聲望甚重武承嗣等惡之數譛於太后左遷施州剌史三月戊申太后命鑄銅爲匭置之朝堂以受天下表䟽銘其東曰延恩獻賦頌求仕進者投之􅀯曰招諌言朝政得失者投之西曰伸寃有寃抑者投之北曰通玄言天象災變及軍機祕計者投之命正諌􅀘闕拾遺一人掌之先責識官乃聽投表䟽徐敬業之反也侍御史魚承曄之子保家教敬業作刀車及弩敬業敗僅得免太后欲周知人間事保家上書請鑄銅爲匭以受天下密奏其器共爲一室中有四隔上各有竅以受表䟽可入不可出太后善之未幾其怨家投匭告保家爲敬業作兵器殺傷官軍甚衆遂伏誅太后自徐敬業之反疑天下人多圗已又自以乆專國事且內行不正知宗室大臣怨望心不服欲大誅殺以威之乃盛開告密之門有告密者臣下不得問皆給驛馬供五品食使詣行在雖農夫樵人皆得召見廩於客館所言或稱㫖則不次除官無實者不問於是四方告密者蜂起人皆重足屏息有胡人索元禮知太后意因告密召見擢爲游擊將軍令案制獄元禮性殘忍推一人必令引數十百人太后數召見賞賜以張其權於是尚書都事長安周興萬年人來俊臣之徒效之紛紛繼起興累遷至秋官侍郎俊臣累遷至御史中丞相與私畜無賴數百人專以告密爲事欲陷一人輒令數處俱告事狀如一俊臣與司刑評事洛陽萬國俊共撰羅織經數千言教其徒網羅無辜織成反狀構造布置皆有攴節太后得告密者輒令元禮等推之競爲訊囚酷法作大枷有定百脉突地吼死豬愁求破家反是實等名號或以椽關手足而轉之謂之鳯皇曬翅或以物絆其腰引枷向前謂之驢駒㧞撅或使跪捧枷累甓其上謂之仙人獻果或使立髙木之上引枷尾向後謂之玉女登梯或倒縣石縋其首或以醋灌鼻或以鐵圏轂其首而加楔至有腦裂髓出者每得囚輒先陳其械具以示之皆戰栗流汗望風自誣每有赦令俊臣輒令獄卒先殺重囚然後宣示太后以爲忠益寵任之中外畏此數人甚於虎狼麟臺正字陳子昂上䟽以爲執事者疾徐敬業首亂唱禍將息姦源窮其黨與遂使陛下大開詔獄重設嚴刑有迹涉嫌疑辭相逮引莫不窮捕考案至有姦人熒惑乗險相誣紏告疑似冀圖爵賞恐非伐罪弔人之意也臣竊觀當今天下百姓思安乆矣故楊州􅌟逆殆有五旬而海內晏然纎塵不動陛下不務玄黙以救疲人而反任威刑以失其望臣愚暗昧竊有大惑伏見諸方告密囚累百千輩及其窮竟百無一實陛下仁恕又屈法容之遂使姦惡之黨快意相讎睚眦之嫌即稱有密一人􅀍訟百人滿獄使者推捕冠蓋如市或謂陛下愛一人而害百人天下喁喁莫知寧所臣聞隋之末代天下猶平楊玄感作亂不踰月而敗天下之弊未至土崩蒸人之心猶望樂業􅌆帝不悟遂使兵部尚書樊子蓋專行屠戮大窮黨與海內豪士無不罹殃遂至殺人如麻流血成澤天下靡然始思爲亂於是雄傑並起而隋族亡矣夫大獄一起不能無濫寃人吁嗟感傷和氣羣生疠疫水旱隨之人既失業則禍亂之心怵然而生矣古者明王重慎刑罰蓋懼此也昔漢武帝時巫蠱獄起使太子奔走兵交宫闕無辜􅀍害者以千萬數宗廟幾覆賴武帝得壷􅀜三老書廓然感悟夷江充三族餘獄不論天下以安爾古人云前事之不忘後事之師伏願陛下念之太后不聽夏四月太后鑄大儀置北闕以岑長倩爲内史六月辛未以蘇良嗣爲左相同鳯閣鸞臺三品韋待價爲右相己卯以韋思謙爲納言蘇良嗣遇僧懐義於朝堂懐義偃蹇不爲禮良嗣大怒命左右捽曵批其頰數十懐義訴於太后太后曰阿師當於北門出入􅀯牙宰相所往來勿犯也太后託言懐義有巧思故使入禁營造􅀘闕長社王求禮上表以爲太宗時有羅黒黒善彈琵琶太宗閹爲給使使教宫人陛下若以懐義有巧性欲宫中驅使者臣請閹之庶不亂宫闈表寢不出秋九月丁未以西突厥繼往絶可汗之子斛瑟羅爲右玉鈐衛將軍襲繼往絶可汗押五弩失畢部落己巳雍州言新豐縣東􅀯有山踊出攺新豐爲慶山縣四方畢賀江陵人俞文俊上書天氣不和而寒暑併人氣不和而疣贅生地氣不和而塠阜出今陛下以女主處陽位反易剛柔故地氣塞隔而山變爲災陛下謂之慶山臣以爲非慶也臣愚以爲宜側身脩德以荅天譴不然殃禍至矣太后怒流於嶺外後爲六道使所殺突厥入宼左鷹揚衛大將軍黒齒常之拒之至兩井遇突厥三千餘人見唐兵皆下馬擐甲常之以二百餘􅀐衝之皆弃甲走日暮突厥大至常之令營中然火東􅀯又有火起虜疑有兵相應遂夜遁狄仁傑爲寧州刺史右臺監察御史􅀳陵郭翰廵察隴右所至多所按劾入寕州境􅂄老歌剌史德美者盈路翰薦之於朝徵爲冬官侍郎資治通鑑卷第二百三
