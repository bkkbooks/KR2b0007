front:
  text: 邑得王永之子憲喜曰王景略之孫也以為本州中正領選曹事兼掌門下至鄴置行臺以龍驤將軍曰南公和䟦為尚書與左丞賈彞帥吏兵五千人鎮鄴珪自鄴還中山將北歸發卒萬人直道自望都鑿恒嶺至代五百餘里珪恐已既去山東有變復置行臺於中山命衛王儀鎮之以撫軍大將軍略陽公遵為尚書左僕射鎮勃海之合口右將軍尹國督租干冀州聞珪將北還謀襲信都安南將軍長孫嵩執國斬之燕啟倫還至龍城言中山已䧟燕主寳命罷兵遼西王農言於寳曰今遷都尚新未可南征宜因成師襲庫莫奚取其牛馬以充軍資更審虚實俟明年而議之寳從之己未北行庚申渡澆洛水㑹南燕王德遣侍郎李延詣寳言涉珪西上中國空虚延追寳及之寳大喜即日引還辛酉魏王珪發中山徙山東六州吏民雜夷十餘萬口以實代博陵勃海章武羣盗並起略陽公遵等討平之廣川太守賀賴盧性豪健恥居冀州刺史王輔之下襲輔殺之驅勒守兵掠陽平頓丘諸郡南渡河奔南燕南燕王徳以賴盧為并州刺史封廣甯王西秦王乾歸遣乞伏益州攻凉支陽鸇武允吾三城克之虜萬餘人而去
