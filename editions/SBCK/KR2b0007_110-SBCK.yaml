body:
  text: 燕主寳還龍城宮詔諸軍就頓不聴罷散文武將士皆以家屬隨駕遼西王農長樂王盛切諫以為兵疲力弱魏新得志未可與敵宜且養兵觀釁寳將從之撫軍將軍慕輿騰曰百姓可與樂成難與圖始今師衆已集宜獨决聖心乘機進取不宜廣采異同以沮大計寳乃曰吾計决矣敢諫者斬二月乙亥寳出就頓留盛統後事已夘燕軍發龍城慕輿騰為前軍司空農為中軍寳為後軍相去各一頓連營百里壬午寳至乙連長上叚速骨宋赤眉等因衆心之憚征役遂作亂速骨等皆髙陽王隆舊隊共逼立隆子髙陽王崇為主殺樂浪威王宙中牟熙公叚誼及宗室諸王河間王熙素與崇善崇擁佑之故獨得免燕主寳將十餘􅀐奔司空農營農將岀迎左右抱其腰止之曰宜小清澄不可便出農引刀將斫之遂出見寳又馳信追慕輿騰癸未寳農引兵還趣大營討速骨等農營兵亦厭征役皆棄仗走騰營亦潰寳農奔還龍城長樂王盛聞亂引兵出迎寳農僅而得免會稽王道子忌王殷之逼以譙王尚之及弟休之有才略引為腹心尚之説道子曰今方鎮彊盛宰相權輕宜宻樹腹心於外以自藩衛道子從之以其司馬王愉為江州刺史都督江州及豫州之四郡軍事用為形援日夜與尚之謀議以伺四方之隙魏王珪如繁畤宮給新徙民田及牛珪畋於白登山見熊將數子謂冠軍將軍于栗磾曰卿名勇健能搏此乎對曰獸賤人貴若搏而不勝豈不虚斃一壯士乎乃驅致珪前盡射而獲之珪顧謝之秀容川酋長爾朱羽健從珪攻晉陽中山有功拜散騎常侍環其所居割地三百里以封之柔然數侵魏邉尚書中兵郎李先請擊之珪從之大破柔然而還楊􅁤以其司馬郭緯為西平相帥步騎二萬北赴郭黁秃髪獨孤遣其弟車騎將軍傉檀帥騎一萬助􅁤􅁤至姑臧營于城北燕尚書頓丘王蘭汗隂與叚速骨等通謀引兵營龍城之東城中留守兵至少長樂王盛徙内近城之民得丁夫萬餘乘城以禦之速骨等同謀纔百餘人餘皆為所驅脅莫有鬬志三月甲午速骨等將攻城遼西桓烈王農恐不能守且為蘭汗所誘夜潜出赴之冀以自全明旦速骨等攻城城上拒戰甚力速骨之衆死者以百數速骨乃將農循城農素有忠節威名城中之衆恃以為彊忽見在城下無不驚愕喪氣遂皆逃潰速骨入城縱兵殺掠死者狼藉寳盛與慕輿騰餘崇張真李旱趙恩等輕騎南走速骨幽農於殿内長上阿交羅速骨之謀主也以髙陽王崇㓜弱更欲立農崇親信鬷讓出力犍等聞之丁酉殺羅及農速骨即為之誅讓等農故吏左衛將軍宇文㧞亡奔遼西庚子蘭汗襲擊速骨并其黨盡殺之廢崇奉太子策承制大赦遣使迎寳從於薊城寳欲還長樂王盛等皆曰汗之忠詐未可知今單騎赴之萬一汗有異志悔之無及不如南就范陽王合衆以取冀州若其不捷收南方之衆徐歸龍都亦未晚也寳從之離石胡帥呼延鐵西河胡帥張崇等不樂徙代聚衆叛魏魏安逺將軍􅁃岳討平之魏王珪召衛王儀入輔以略陽公遵代鎮中山夏四月壬戌以征虜將軍穆崇為太尉安南將軍長孫嵩為司徒燕主寳從間道過鄴鄴人請留寳不許南至黎陽伏於河西遣中黄門令趙思告北地王鍾曰上以二月得丞相表即時南征至乙連會長上作亂失據來此王亟白丞相奉迎鍾德之從弟也首勸德稱尊號聞而惡之執思付獄以狀白南燕王德德謂羣下曰卿等以社稷大計勸吾攝政吾亦以嗣帝播越民神乏主故權順羣議以繫衆心今天方悔禍嗣帝得還吾將具法駕奉迎謝罪行闕何如黄門侍郎張華曰今天下大亂非雄才無以寧濟羣生嗣帝闇懦不能紹隆先統陛下若蹈匹夫之節捨天授之業威權一去身首不保況社稷其得血食乎慕輿䕶曰嗣帝不逹時冝委棄國都自取敗亡不堪多難亦已明矣昔蒯瞶出奔衞輒不納春秋是之以子拒父猶可況以父拒子乎今趙思之言未明虚實臣請為陛下馳往詷之德流涕遣之䕶帥壯士數百人隨思而北聲言迎衞其實圖之寳既遣思詣鍾於後得樵者言德已稱制懼而北走䕶至無所見執思以還德以思練習典故欲留而用之思曰犬馬猶知戀主思雖刑臣乞還就上德固留之思怒曰周室東遷晉鄭是依殿下親則叔父位為上公不能帥先羣后以匡帝室而幸本根之傾為趙王倫之事思雖不能如申包胥之存楚猶慕龔君賔不偷生於莽世也德斬之寳遣扶風忠公慕輿騰與長樂王盛收兵冀州盛以騰素暴横為民所怨乃殺之行至鉅鹿長樂説諸豪傑皆願起兵奉寳寳以蘭汗祀燕宗廟所為似順意欲還龍城不肯留冀州乃北行至建安抵民張曹家曹素武健請為寳合衆盛亦勸寳宜且駐留察汗情狀寳乃遣冗從僕射李旱先往見汗寳留頓石城會汗遣左將軍蘇超奉迎陳汗忠欵寳以汗燕主垂之舅盛之妃父也謂必無它不待旱返遂行盛流涕固諫寳不聽留盛在後盛與將軍張真下道避匿丁亥寶至索莫汗陘去龍城四十里城中皆喜汗惶怖欲自出請罪兄弟共諫止之汗乃遣弟加難帥五百騎出迎又遣兄堤閉門止仗禁人出入城中皆知其將為變而無如之何加難見寳於陘北拜謁已從寳俱進頴隂烈公餘崇宻言於寳曰觀加難形色禍變甚逼宜留三思奈何徑前寳不從行數里加難先執崇崇大呼罵曰汝家幸緣肺腑䝉國寵榮覆宗不足以報今乃敢謀簒逆此天地所不容計旦暮即屠滅但恨我不得手膾汝曹耳加難殺之引寳入龍城外邸弑之汗諡寳曰靈帝殺獻哀太子策及王公卿士百餘人自稱大都督大將軍大單于昌黎王改元青龍以堤為太尉加難為車騎將軍封河間王熙爲遼東公如􅂎宋故事長樂王盛聞之馳欲赴哀張真止之盛曰我今以窮歸汗汗性愚淺必念婚姻不忍殺我旬月之間足以展吾情志遂往見汗汗妻乙氏及盛妃皆泣涕請盛於汗盛妃復頓頭於諸兄弟汗惻然哀之乃舍盛於宮中以為侍中左光祿大夫親待如舊堤加難屢請殺盛汗不從堤驕狠荒淫事汗多無禮盛因而間之由是汗兄弟浸相嫌忌涼太原公纂將兵擊楊軌郭黁救之纂敗還叚業使沮渠蒙遜攻西郡執太守呂純以歸純光之弟子也於是晉昌太守王德敦煌太守趙郡孟敏皆以郡降業業封蒙遜爲臨池矦以德爲酒泉太守敏為沙州刺史六月丙子魏王珪命羣臣議國號皆曰周秦以前皆自諸侯升為天子因以其國爲天下號漢氏以來皆無尺土之資我國家百世相承開基代北遂撫有方夏今宜以代為號黄門侍郎崔宏曰昔商人不常厥居故兩稱殷商代雖舊邦其命惟新登國之初已更曰魏夫魏者大名神州之上國也冝稱魏如故珪從之楊􅁤自恃其衆欲與涼王光决戰郭黁每以天道抑止之凉常山公􅀪鎮張掖叚業使沮渠男成及王德攻之光使太原公纂將兵迎之楊􅁤曰呂􅀪精兵一萬若與光合則姑臧益彊不可取矣乃與秃髪利鹿孤共邀擊纂纂與戰大破之軌奔王乞基黁性褊急殘忍不為士民所附聞􅁤敗走降西秦西秦王乾歸以為建忠將軍散騎常侍􅀪引兵棄張掖東走叚業徙治張掖將追擊􅀪沮渠蒙遜諫曰歸師勿遏窮寇勿追此兵家之戒也業不從大敗而還頼蒙遜以免業城西安以其將臧莫孩為太守蒙遜曰莫孩勇而無謀知進不知退此乃為之築冢非築城也業不從莫孩尋為呂纂所破燕太原王竒楷之子蘭汗之外孫也汗亦不殺以為征南將軍得入見長樂王盛盛潜使竒逃出起兵竒起兵於建安衆至數千汗遣蘭堤討之盛謂汗曰善駒小兒未能辦此豈非有假託其名欲為内應者乎太尉素驕難信不宜委以大衆汗然之罷堤兵更遣撫軍將軍仇尼慕將兵討竒於是龍城自夏不􅀨至于秋七月汗日詣燕諸廟及寳神座頓首禱請委罪於蘭加難堤及加難聞之怒且懼誅乙巳相與帥所部襲仇尼慕軍敗之汗大懼遣太子穆將兵討之穆謂汗曰慕容盛我之仇讎必與竒相表裏此乃腹心之疾不可養也宜先除之汗欲殺盛先引見察之盛妃知之宻以告盛盛稱疾不出汗亦止不殺李旱衞雙劉忠張豪張真皆盛素所厚也而穆引以為腹心旱雙得出入至盛所潜與盛結謀丁未穆擊堤加難等破之庚戌饗將士汗穆皆醉盛夜如厠因踰垣入于東宮與旱等共殺穆時軍未解嚴皆聚在穆舎聞盛得出呼躍爭先攻汗斬之汗子魯公和陳公揚分屯令支白狼盛遣旱真襲誅之堤加難亡匿捕得斬之於是内外帖然士女相慶宇文㧞帥壯士數百來赴盛拜㧞為大宗正辛亥告于太廟令曰賴五祖之休文武之力宗廟社稷幽而復顯不獨孤以眇眇之身免不同天之責凡在臣民皆得明目當世因大赦改元建平盛謙不敢稱尊號以長樂王攝行統制諸王皆降稱公以東陽公根為尚書左僕射衞倫陽璆魯恭王騰為尚書悦真為侍中陽哲為中書監張通為中領軍自餘文武各復舊位改諡寳曰惠閔皇帝廟號烈宗初太原王竒舉兵建安南北之民翕然從之蘭汗遣其兄子全討竒竒擊滅之匹馬不返進屯乙連盛既誅汗命竒罷兵竒用丁零嚴生烏桓王龍之謀遂不受命甲寅勒兵三萬餘人進至横溝去龍城十里盛出擊大破之執竒而還斬其黨百餘人賜竒死􅁊王之嗣遂絶羣臣固請上尊號盛弗許魏王珪遷都平城始營宮室建宗廟立社稷宗廟歳五祭用分至及臘􅁊􅀇求為廣州會稽王道子忌玄不欲使居荆州因其所欲以􅀇為督交廣二州軍事廣州刺史玄受命而不行豫州刺史􅁃楷以道子割其四郡使王愉督之上䟽言江州内地而西府北帶寇戎不應使愉分督朝廷不許楷怒遣其子鴻説王恭曰尚之兄弟復秉機權過於國寳欲假朝威削弱方鎮懲艾前事為禍不測今及其謀議未成宜早圖之恭以為然以告殷仲堪􅁊玄仲堪􅀇許之推恭為盟主刻期同趣京師時内外疑阻津邏嚴急仲堪以斜絹為書内箭簳中合鏑􅃮之因􅁃楷以送恭恭發書絹文角戾不復能辨仲堪手書疑楷詐為之且謂仲堪去年已違期不赴今必不動乃先期舉兵司馬劉牢之諫曰將軍國之元舅㑹稽王天子叔父也會稽王又當國秉政曏為將軍戮其所愛王國寳王緒又送王廞書其深伏將軍已多矣頃所授任雖未允愜亦非大失割庾楷四郡以配王愉於將軍何損晉陽之甲豈可數興乎恭不從上表請討王愉司馬尚之兄弟道子使人説楷曰昔我與卿恩如骨肉帳中之飲結帶之言可謂親矣卿今棄舊交結新援忘王恭疇昔陵侮之恥乎若欲委體而臣之使恭得志必以卿為反覆之人安肯深相親信首身且不可保況富貴乎楷怒曰王恭昔赴山陵相王憂懼無計我知事急尋勒兵而至恭不敢發去年之事我亦俟命而動我事相王無相負者相王不能拒恭反殺國寳及緒自爾巳來誰敢復為相王盡力者􅁃揩實不能以百口助人屠滅時楷已應恭檄正徵士馬信返朝廷憂懼内外戒嚴會稽世子元顯言於道子曰前不討王恭故有今日之難今若復從其欲則太宰之禍至矣道子不知所為悉以事委元顯日飲醇酒而已元顯聦警頗渉文義志氣果銳以安危爲已任附㑹之者謂元顯神武有明帝之風殷仲堪聞恭舉兵自以去歳後期乃勒兵趣發仲堪素不習為將悉以軍事委南郡相楊佺期兄弟使佺期帥舟師五千為前鋒桓玄次之仲堪帥兵二萬相繼而下佺期自以其先漢太尉震至父亮九世皆以才德著名矜其門地謂江左莫及有以比王珣者佺期猶恚恨而時流以其晩過江婚宦失類佺期及兄廣弟思平從弟孜敬皆麄獷每排抑之佺期常慷慨切齒欲因事際以逞其志故亦賛成仲堪之謀八月佺期玄奄至湓口王愉無僃惶遽奔臨川玄遣偏軍追獲之燕以河間公熈為侍中車騎大將軍中領軍司􅀠校尉城陽公元為衞將軍元寳之子也又以劉忠為左將軍張豪爲後將軍並賜姓慕容氏李旱為中常侍輔國將軍衞雙為前將軍張順為鎮西將軍昌黎尹張真為右將軍皆封公乙亥燕步兵校尉馬勤等謀反伏誅事連驃騎將軍髙陽公崇崇弟東平公澄皆賜死寧朔將軍鄧啓方南陽太守閭丘羨將兵二萬擊南燕與南燕中軍將軍法撫軍將軍和戰於管城啓方等兵敗單騎走免魏王珪命有司正封畿標道里平權衡審度量遣使循行郡國舉奏守宰不法者親考察黜陟之九月辛卯加會稽王道子黄鉞以世子元顯為征討都督遣衞將軍王珣右將軍謝琰將兵討王恭譙王尚之將兵討庾楷乙未燕以東陽公根為尚書令張通為左僕射衞倫為右僕射慕容豪為幽州刺史鎮肥如己亥譙王尚之大破庾楷於牛渚楷單騎奔桓玄會稽王道子以尚之為豫州刺史弟恢之為驃騎司馬丹楊尹允之為吳國内史休之為襄城太守各擁兵馬以為已援乙巳桓玄大破官軍於白石玄與楊佺期進至横江尚之退走恢之所領水軍皆沒丙午道子屯中堂元顯守石頭己酉王珣守北郊謝琰屯宣陽門以備之王恭素以才地陵物既殺王國寳自謂威無不行仗劉牢之為爪牙而但以部曲將遇之牢之負其才深懐恥恨元顯知之遣廬江太守髙素説牢之使叛恭許事成即以恭位號授之又以道子書遺牢之為陳禍福牢之謂其子敬宣曰王恭昔受先帝大恩今為帝舅不能翼戴王室數舉兵向京師吾不能審恭之志事捷之日必能為天子相王之下乎吾欲奉國威靈以順討逆何如敬宣曰朝廷雖無成康之美亦無幽厲之惡而恭恃其兵威􅁀蔑王室大人親非骨肉義非君臣雖共事少時意好不恊今日討之於情義何有恭參軍何澹之知其謀以告恭恭以澹之素與牢之有隙不信乃置酒請牢之於衆中拜之為兄精兵堅甲悉以配之使帥帳下督顔延為前鋒牢之至竹里斬延以降遣敬宣及其壻東莞太守髙雅之還襲恭恭方出城曜兵敬宣縱騎横擊之恭兵皆潰恭將入城雅之已閉城門恭單騎奔曲阿素不習馬髀中生瘡曲阿人殷確恭故吏也以船載恭將奔桓玄至長塘湖為人所告獲之送京師斬於倪塘恭臨刑猶理須􅁂神色自若謂監刑者曰我闇於信人所以至此原其本心豈不忠於社稷邪但令百世之下知有王恭耳并其子弟黨與皆死以劉牢之為都督兖青兾幽并徐楊州晉陵諸軍事以代恭俄而楊佺期桓玄至石頭殷仲堪至蕪湖元顯自竹里馳還京師遣丹楊尹王愷等發京邑士民數萬人據石頭以拒之佺期玄等上表理王恭求誅劉牢之牢之帥北府之衆馳赴京師軍于新亭佺期玄見之失色回軍蔡洲朝廷未知西軍虛實仲堪等擁衆數萬充斥郊畿内外憂逼左衞將軍桓脩冲之子也言於道子曰西軍可説而解也脩知其情矣殷􅁊之下專恃王恭恭既破滅西軍沮恐今若以重利啗玄及佺期二人必内喜玄能制仲堪佺期可使倒戈取仲堪矣道子納之以玄為江州刺史召郗恢為尚書以佺期代恢為都督梁雍秦三州諸軍事雍州刺史以脩為荆州刺史權領左衞文武之鎮又令劉牢之以千人送之黜仲堪為廣州刺史遣仲堪叔父大常茂宣詔敇仲堪回軍張驤子超收合三千餘家據南皮自號烏􅁊王抄掠諸郡魏王珪命􅁃岳討之楊􅁤屯廉川收集夷夏衆至萬餘王乞基謂軌曰秃髪氏才髙而兵盛且乞基之主也不如歸之􅁤乃遣使降於西平王烏孤􅁤尋為羌酋梁飢所敗西奔海襲乙弗鮮卑而據其地烏孤謂羣臣曰楊軌王乞基歸誠於我卿等不速救使為羌人所覆孤甚愧之平西將軍渾屯曰梁飢無經逺大略可一戰擒也飢進攻西平西平人田玄明執太守郭倖而代之以拒飢遣子為質於烏孤烏孤欲救之羣臣憚飢兵彊多以為疑左司馬趙振曰楊軌新敗呂氏方彊洪池以北未可冀也嶺南五郡庶幾可取大王若無開拓之志振不敢言若欲經營四方此機不可失也使羌得西平華夷震動非我之利也烏􅀌喜曰吾亦欲乘時立功安能坐守窮谷乎乃謂羣臣曰梁飢若得西平保據山河不可復制飢雖驍猛軍令不整易破也遂進擊飢大破之飢退屯龍支堡烏孤進攻㧞之飢單騎奔澆河俘斬數萬以田玄明爲四平内史樂都太守田瑶湟河太守張裯澆河太守王稚皆以郡降嶺南羌胡數萬落皆附於烏孤西秦王乾歸遣秦州牧益州武衞將軍慕兀冠軍將軍翟瑥帥騎二萬伐吐谷渾冬十月癸酉燕羣臣復上尊號丙子長樂王盛始即皇帝位大赦尊皇后叚氏曰皇太后太妃丁氏曰獻莊皇后初蘭汗之當國也盛從燕主寳出亡蘭妃奉事丁后愈謹及汗誅盛以妃當從坐欲殺之丁后以妃有保全之功固爭之得免然終不爲后大赦殷仲堪得詔書大怒趣桓玄楊佺期進軍玄等喜於朝命欲受之猶豫未决仲堪聞之遽自蕪湖南歸遣使告諭蔡洲軍士曰汝輩不各自散歸吾至江陵盡誅汝餘口佺期部將劉系帥二千人先歸玄等大懼狼狽西還追仲堪至尋陽及之仲堪既失職倚玄等為援玄等亦資仲堪兵雖内相疑阻勢不得不合乃以子弟交質壬午盟于尋陽俱不受朝命連名上䟽申理王恭求誅劉牢之及譙王尚之并訴仲堪無罪獨被降黜朝廷深憚之内外騷然乃復罷桓脩以荆州還仲堪優詔慰諭以求和解仲堪等乃受詔御史中丞江績劾奏桓脩專為身計疑誤朝廷詔免脩官􅀄􅁊玄在荆州所爲豪縱仲堪親黨皆勸仲堪殺之仲堪不聽及在尋陽資其聲地推玄為盟主玄愈自矜倨楊佺期為人驕悍玄每以寒士裁之佺期甚恨宻說仲堪以玄終為患請於壇所襲之仲堪忌佺期兄弟勇健恐既殺玄不可復制苦禁之於是各還所鎮玄亦知佺期之謀隂有取佺期之志乃屯於夏口引始安太守濟隂卞範之為長史以為謀主是時詔書獨不赦􅁃楷玄以楷為武昌太守初郗恢為朝廷拒西軍玄未得江州欲奪恢雍州以恢為廣州恢聞之懼詢於衆衆皆曰楊佺期來者誰不戮力若桓玄來恐難與為敵既而聞佺期代已乃與閭丘羡謀阻兵拒之佺期聞之聲言玄來入沔以佺期為前驅恢衆信之望風皆潰恢請降佺期入府斬閭丘羡放恢還都至楊口殷仲堪隂使人殺之及其四子託言羣蠻所殺西秦乞伏益州與吐谷渾王視羆戰於度周川視羆大敗走保白蘭山遣子宕豈為質於西秦以請和西秦王乾歸以宗女妻之凉建武將軍李鸞以興城降于秃髪烏孤十一月以琅邪王德文為衞將軍開府儀同三司征虜將軍元顯為中領軍領軍將軍王雅爲尚書左僕射辛亥魏王珪命尚書吏部郎鄧淵立官制恊音律儀曹郎清河董謐制禮儀三公郎王德定律令太史令鼂崇考天象吏部尚書崔宏揔而裁之以為永式淵羌之孫也楊􅁤王乞基帥戸數千自歸於西平王烏孤十二月己丑魏王珪即皇帝位大赦改元天興命朝野皆束髪加帽追尊逺祖毛以下二十七人皆爲皇帝諡六世祖力微曰神元皇帝廟號始祖祖什翼犍曰昭成皇帝廟號髙祖父寔曰獻明皇帝魏之舊俗孟夏祀天及東廟季夏帥衆却霜於隂山孟秋祀天於西郊至是始依倣古制定郊廟朝饗禮樂然惟孟夏祀天親行其餘多有司攝事又用崔宏議自謂黄帝之後以土德王徙六州二十二郡守宰豪傑二千家于代都東至代郡西及善無南極隂館北盡參合皆爲畿内其外四方四維置八部師以監之己亥燕幽州刺史慕容豪尚書左僕射張通昌黎尹張順坐謀反誅初琅邪人孫泰學妖術於錢唐杜子恭士民多奉之王珣惡之流泰於廣州王雅薦泰於孝武帝云知養性之方召還累官至新安太守泰知晉祚將終因王恭之亂以討恭為名收合兵衆聚貨鉅億三吳之人多從之識者皆憂其為亂以中領軍元顕與之善無敢言者會稽内史謝輶發其謀己酉會稽王道子使元顕誘而斬之并其六子兄子恩逃入海愚民猶以爲泰蟬蜕不死就海中資給恩恩乃聚合亡命得百餘人以謀復讎西平王秃髪烏孤更稱武威王是歳楊盛遣使附魏魏以盛為仇池王資治通鑑卷第一百一十
