front:
  text: 弟子推爲京兆王竟陵王誕知上意忌之亦濳爲之備因魏人入冦修城浚隍聚糧治仗誕記室參軍江智淵知誕有異志請假先還建康上以爲中書侍郎智淵夷之弟子也少有操行沈懷文每稱之曰人所應有盡有人所應無盡無者其唯江智淵乎是時道路皆云誕反㑹呉郡民劉成上書稱息道龍昔事誕見誕在石頭城修乘輿法物習唱警蹕道龍憂懼私與伴侶言之誕殺道龍又豫章民陳談之上書稱弟詠之在誕左右見誕䟽陛下年紀姓諱往巫鄭師憐家祝詛詠之密以啓聞誕誣詠之乘酒罵詈殺之上乃令有司奏誕罪惡請收付廷尉治罪乙邜詔貶誕爵爲侯遣之國詔書未下先以羽林禁兵配兖州刺史垣閬使以之鎮為名與給事中戴明寳襲誕閬至廣陵誕未悟也明寳夜報誕典籖蔣成使明晨開門為内應成以告府舍人許宗之宗之入告誕誕驚起呼左右及素所畜養數百人執蔣成勒兵自衞天將曉明寳與閬帥精兵數百人猝至而門不開誕已列兵登陴自在門上斬蔣成赦作徒繫囚開門擊閬殺之明寳從間道逃還詔内外纂嚴以始興公沈慶之為車騎大將軍開府儀同三司南兖州刺史將兵討誕甲子上親揔禁兵頓宣武堂司州刺史劉季之誕故將也素與都督宗慤有隙聞誕反恐為慤所害委官間道自歸朝廷至盱眙盱眙太守鄭瑗疑季之與誕同謀邀殺之沈慶之至歐陽誕遣慶之宗人沈道愍齎書説慶之餉以玉環刀慶之遣道愍返數以罪惡誕焚郭邑驅居民悉使入城閉門自守分遣書檄邀結逺近時山陽内史梁曠家在廣陵誕執其妻子遣使邀曠曠斬使拒之誕怒滅其家誕奉表投之城外曰陛下信用讒言遂令無名小人來相掩襲不任枉酷即加誅翦雀䑕貪生仰違詔敇今親勒部曲鎮扞徐兖先經何福同生皇家今有何愆便成胡越陵鋒奮戈萬没豈顧盪定之期冀在旦夕又曰陛下宮帷之醜豈可三緘上大怒凡誕左右腹心同籍朞親在建康者並誅之死者以千數或有家人已死方自城内出奔者慶之至城下誕登樓謂之曰沈公垂白之年何苦來此慶之曰朝廷以君狂愚不足勞少壯故耳上慮誕奔魏使慶之斷其走路慶之移營白土去城十八里又進軍新亭豫州刺史宗慤徐州刺史劉道隆並帥衆來㑹兖州刺史沈僧明慶之兄子也亦遣兵助慶之先是誕誑其衆云宗慤助我慤至繞城曜馬呼曰我宗慤也誕見諸軍大集欲棄城北走留中兵參軍申靈賜守廣陵自將步騎數百人親信並自隨聲云出戰邪趨海陵道慶之遣龍驤將軍武念追之誕行十餘里衆皆不欲去互請誕還城誕曰我還易耳卿能為我盡力乎衆皆許諾誕乃復還築壇㰱血以誓衆凡府州文武皆加秩以主簿劉琨之為中兵參軍琨之遵考之子也辭曰忠孝不得並琨之老父在不敢承命誕囚之十餘日終不受乃殺之右衞將軍垣護之虎賁中郎將殷孝祖等擊魏還至廣陵上並使受慶之節度慶之進營逼廣陵城誕餉慶之食提挈者百餘人出自北門慶之不開視悉焚之誕於城上授函表請慶之為送慶之曰我受詔討賊不得為汝送表汝必欲歸死朝廷自應開門遣使吾為汝護送東楊州刺史顔竣遭母憂送喪還都上恩待猶厚竣時對親舊有怨言或語及朝廷得失㑹王僧逹得罪疑竣譖之將死具陳竣前後怨望誹謗之語上乃使御史中丞庾徽之劾奏免竣官竣愈懼上啓陳謝且請生命上益怒詔答曰卿訕訐怨憤已孤本望乃復過煩思慮懼不自全豈為下事上誠節之至邪及竟陵王誕反上遂誣竣與誕通謀五月收竣付廷尉先折其足然後賜死妻予徙交州至宫亭湖復沉其男口
