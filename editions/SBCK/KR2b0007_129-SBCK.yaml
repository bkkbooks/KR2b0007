body:
  text: 六月戊申魏主如隂山上命沈慶之為三烽於桑里若克外城舉一烽克内城舉兩烽擒劉誕舉三烽璽書督趣前後相繼慶之焚其東門塞塹造攻道立行樓圡山并諸攻具值久雨不得攻城上使御史中丞庾徽之奏免慶之官詔勿問以激之自四月至于秋七月雨止城猶未㧞上怒命太史擇日將自濟江討誕太宰義恭固諫乃止誕初閉城拒使者記室參軍山隂賀弼固諫誕怒抽刀向之乃止誕遣兵出戰屢敗將佐多踰城出降或勸弼宜早出弼曰公舉兵向朝廷此事既不可從荷公厚恩又義無違背唯當以死明心耳乃飲藥自殺參軍何康之等謀開門納官軍不果斬關出降誕為髙樓置康之母於其上􅁀露之不與食母呼康之數日而死誕以中軍長濮陽范義為左司馬義母妻子皆在城内或謂義曰事必不振子其行乎義曰吾人吏也子不可以棄母吏不可以叛君必若何康之而活吾弗為也沈慶之帥衆攻城身先士卒親犯矢石乙巳克其外城乘勝而進又克小城誕聞兵入走趨後園隊主沈􅅌之等追及之擊傷誕墜水引出斬之誕母妻皆自殺上聞廣陵平出宣陽門敇左右皆呼萬歲侍中蔡興宗陪輦上顧曰卿何獨不呼興宗正色曰陛下今日正應涕泣行誅豈得皆稱萬歲上不悦詔貶誕姓留氏廣陵城中士民無大小悉命殺之沈慶之請自五尺以下全之其餘男子皆死女子以為軍賞猶殺三千餘口長水校尉宗越臨决皆先刳腸抉眼或笞靣鞭腹苦酒灌創然後斬之越對之欣欣若有所得上聚其首於石頭南岸為京觀侍中沈懷文諫不聽初誕自知將敗使黄門吕曇濟與左右素所信者將世子景粹匿於民間謂曰事若不濟思相全脱如其不免可深理之各分以金寳齎送既出門並散走唯曇濟不去攜負景粹十餘日捕得斬之臨川内史羊璿坐與誕素善下獄死擢梁曠為後將軍贈劉琨之給事黄門侍郎蔡興宗奉㫖慰勞廣陵興宗與范義素善收歛其尸送喪歸豫章上謂曰卿何敢故觸王憲興宗抗言對曰陛下自殺賊臣自葬故交何不可之有上有慙色宗越治軍嚴善為營陳每數萬人止頓越自騎馬行前使軍人隨其後馬止營合未嘗參差辛未大赦丙子以丹楊尹劉秀之為尚書右僕射丙戌以南兖州刺史沈慶之為司空刺史如故八月庚戌魏主如雲中壬戌還平城九月壬辰築上林苑於􅀇武湖北初晉人築南郊壇於已位尚書右丞徐爰以為非禮詔徙於牛頭山西直宫城之午位及廢帝即位以舊地為吉復還故處帝又命尚書左丞荀萬秋造五路依金根車加羽葆蓋四年春正月甲子朔魏大赦改元和平乙亥上耕籍田大赦己卯詔祀郊廟初乘玉路庚寅立皇子子勛為晉安王子房為尋陽王子頊為歷陽王子鸞為襄陽王魏散騎侍郎馮闡來聘二月魏衛將軍樂安王良討河西叛胡三月魏人宼北隂平朱提太守楊歸子擊破之甲申皇后親桑于西郊皇太后觀禮夏四月魏太后常氏殂五月癸丑魏葬昭太后於鳴雞山丙戌尚書左僕射禇湛之卒吐谷渾王拾寅兩受宋魏爵命居止出入擬於王者魏人忿之定陽侯曹安表拾寅今保白蘭若分軍出其左右必走保南山不過十日人畜乏食可一舉而定六月甲午魏遣征西大將軍陽平王新成等督統萬髙平諸軍出南道南郡公中山李惠等督凉州諸軍出北道以擊吐谷渾魏崔浩之誅也史官遂廢至是復置河西叛胡詣長安首罪魏遣使者安慰之秋七月遣使如魏甲戌開府儀同三司何尚之卒壬午魏主如河西魏軍至西平吐谷渾王拾寅走保南山九月魏軍濟河追之㑹疾疫引還獲雜畜二十餘萬庚午魏主還平城丁亥徙襄陽王子鸞為新安王冬十月庚寅詔沈慶之討縁江蠻前廬陵内史周朗言事切直上衘之使有司奏朗居母喪不如禮傳送寧州於道殺之朗之行也侍中蔡興宗方在直請與朗别坐白衣領職十一月魏散騎侍郎盧度世等來聘是歲上徴青冀二州刺史顔師伯為侍中師伯以諂佞被親任羣臣莫及多納貨賄家累千金上嘗與之樗蒲上擲得雉自謂必勝師伯次擲得盧上失色師伯遽歛手曰幾作盧是日師伯一輸百萬柔然攻髙昌殺沮渠安周滅沮渠氏以闞伯周為高昌王髙昌稱王自此始五年春正月戊午朔朝賀雪落太宰義恭衣有六出義恭奏以為瑞上悦義恭以上猜暴懼不自容每卑辭遜色曲意祗奉由是終上之世得免於禍二月辛卯魏主如中山丙午至鄴遂如信都三月遣使如魏魏主發并肆州民五千人治河西獵道辛巳還平城夏四月癸巳更以西陽王子尚為豫章王庚子詔經始明堂直作大殿於丙巳之地制如太廟唯十有二閒為異雍州刺史海陵王休茂年十七司馬新野庾深之行府事休茂性急欲自專處决深之及主帥每禁之常懷忿恨左右張伯超有寵多罪惡主帥屢責之伯超懼説休茂曰主帥密䟽官過失欲以啓聞如此恐無好休茂曰為之奈何伯超曰唯有殺行事及主帥舉兵自衛此去都數千里縱大事不成不失入虜中為王休茂從之丙午夜休茂與伯超等帥夾轂隊殺典籖楊慶於城中出金城殺深之及典籖戴䨇徵集兵衆建牙馳檄使佐吏上已為車騎大將軍開府儀同三司加黄鉞侍讀博士荀詵諫休茂殺之伯超專任軍政生殺在已休茂左右曹萬期挺身斫休茂不克而死休茂出城行營諮議參軍沈暢之等帥衆閉門拒之休茂馳還不得入義成太守薛繼考為休茂盡力攻城克之斬暢之及同謀數十人其日參軍尹􅀇慶復起兵攻休茂生擒斬之母妻皆自殺同黨伏誅城中擾亂莫相統攝中兵參軍劉恭之秀之之弟也衆共推行府州事繼考以兵脅恭之使作啓事言繼考立義自乘驛還都上以為北中郎諮議參軍賜爵冠軍侯事尋泄伏誅以􅀇慶為射聲校尉上自即位以來抑黜諸弟既克廣陵欲更峻其科沈懷文曰漢明不使其子比光武之子前史以為美談陛下既明管蔡之誅願崇唐衞之寄及襄陽平太宰義恭探知上旨復上表請裁抑諸王不使任邊州及悉輸器甲禁絶賔客沈懷文固諫以為不可乃止上畋遊無度嘗出夜還敇開門侍中謝莊居守以棨信或虛執不奉旨須墨敕乃開上後因燕飲從容曰卿欲效郅君章邪對曰臣聞王者祭祀畋遊出入有節今陛下晨往宵歸臣恐不逞之徒妄生矯詐是以伏須神筆乃敢開門耳魏大旱詔州郡境内神無大小悉灑掃致禱俟豐登各以其秩祭之於是群祀之廢者皆復其舊秋七月戊寅魏主立其弟小新成為濟陽王加征東大將軍鎮平原天賜為汝隂王加征南大將軍鎮虎牢萬壽為樂浪王加征北大將軍鎮和龍洛侯為廣平王壬午魏主巡山北八月丁丑還平城戊子立皇子子仁為永嘉王子真為始安王九月甲寅朔日有食之沈慶之固讓司空柳元景固讓開府儀同三司詔許之仍命慶之朝㑹位次司空俸禄依三司元景在從公之上慶之目不知書家素富産業累萬金童奴千計再獻錢千萬榖萬斛先有四宅又有園舍在婁湖慶之一夕攜子孫及中表親戚徙居婁湖以四宅輸官慶之多蓄妓妾優游無事盡意歡娯非朝賀不出門車馬率素從者不過三五人遇之者不知其三公也甲戌移南豫州治于湖丁丑以潯陽王子房為南豫州刺史閏月戊子皇太子妃何氏卒謚曰獻妃壬寅更以歷陽王子頊為臨海王冬十月甲寅以南徐州刺史劉延孫為尚書左僕射右僕射劉秀之為雍州刺史乙卯以新安王子鸞為南徐州刺史子鸞母殷淑儀寵傾後宫子鸞愛冠諸子凡為上所眄遇者莫不入子鸞之府及為南徐州割呉郡以屬之初巴陵王休若為北徐州刺史以山隂令張岱為諮議參軍行府州國事後臨海王子頊為廣州豫章王子尚為楊州晉安王子勛為南兖州岱歷為三府諮議三王行事與典籖主帥共事事舉而情不相失或謂岱曰主王既㓜執事多門而每能緝和公私云何致此岱曰古人言一心可以事百君我為政端平待物以禮悔吝之事無由而及明闇短長更是才用之多少耳及子鸞為南徐州復以岱為别駕行事岱永之弟也魏員外散騎常侍游明根等來聘明根雅之從祖弟也魏廣平王洛侯卒十二月壬申以領軍將軍劉遵考為尚書右僕射甲戌制民戸歲輸布四匹是歲詔士族雜婚者皆補將吏士族多避役逃亡乃嚴為之制捕得即斬之往往奔竄湖山為盗賊沈懷文諫不聽六年春正月癸未魏樂浪王萬壽卒辛卯上初祀五帝於明堂大赦丁未策秀孝于中堂楊州秀才顧灋對策曰源清則流潔神聖則刑全躬化易於上風體訓速於草偃上覽之惡其諒也投策於地二月乙卯復百官禄三月庚寅立皇子子元為邵陵王初侍中沈懷文數以直諫忤㫖懷文素與顔竣周朗善上謂懷文曰竣若知我殺之亦當不敢如此懷文嘿然侍中王彧言次稱竣朗人才之美懷文與相酬和顔師伯以白上上益不悦上嘗出射雉風雨驟至懷文與王彧江智淵約相與諫㑹召入雉場懷文曰風雨如此非聖躬所宜冒彧曰懷文所啓宜從智淵未及言上注弩作色曰卿欲效顔竣邪何以恒知人事又曰顔竣小子恨不先鞭其靣每上燕集在坐者皆令沉醉嘲謔無度懷文素不飲酒又不好戲調上謂故欲異已謝莊嘗戒懷文曰卿每與人異亦何可久懷文曰吾少來如此豈可一朝而變非欲異物性所得耳上乃出懷文為晉安王子勛征虜長史領廣陵太守懷文詣建康朝正事畢遣還以女病求申期至是猶未發爲有司所糾免官禁錮十年懷文賣宅欲還東上聞之大怒收付廷尉丁未賜懷文死懷文三子澹淵冲行哭為懷文請命見者傷之柳元景欲救懷文言於上曰沈懷文三子塗炭不可見願陛下速正其罪上竟殺之夏四月淑儀殷氏卒追拜貴妃諡曰宣上痛悼不已精神為之罔罔頗廢政事五月壬寅太宰義恭解領司徒六月辛酉東昌文穆公劉延孫卒庚午魏主如隂山魏石樓胡賀畧孫反長安鎮將陸真討平之魏主命真城長蛇鎮氐豪仇傉檀反真討平之卒城而還秋七月壬寅魏主如河西乙未立皇子子雲為晉陵王是日卒諡曰孝初晉庾冰議使沙門敬王者桓􅀇復述其議並不果行至是上使有司奏曰儒灋枝􅂀名墨條分至於崇親嚴上厥猷靡爽唯浮圖為教反經提傳拘文蔽道在末彌扇夫佛以謙卑自牧忠䖍為道寧有屈膝四軰而簡禮二親稽顙耆臘而直體萬乘者哉臣等參議以為沙門接見比當盡䖍禮敬之容依其本俗九月戊寅制沙門致敬人主及廢帝即位復舊乙未以尚書右僕射劉遵考為左僕射丹楊尹王僧朗為右僕射僧朗彧之父也冬十月壬寅葬宣貴妃於龍山鑿岡通道數十里民不堪役死亡甚衆自江南葬埋之盛未之有也又為之别立廟魏員外散騎常侍游明根等來聘辛巳加尚書令柳元景司空壬寅魏主還平城南徐州從事史范陽祖冲之上言何承天元嘉厯踈舛猶多更造新厯以為舊法冬至日有定處未盈百載輙差二度今令冬至日度歲歲微差將來久用無煩屢改又子為辰首位在正北虛為北方列宿之中今曆上元日度發自虛一又日辰之號甲子為先今曆上元歲在甲子又承天法日月五星各自有元今法交㑹遟疾悉以上元歲首為始上令善曆者難之不能屈㑹上晏駕不果施行七年春正月丁亥以尚書右僕射王僧朗為太常衛將軍顔師伯為尚書僕射上每因宴集好使羣臣自相謿訐以為樂吏部郎江智淵素恬雅漸不㑹㫖嘗使智淵以王僧朗戲其子彧智淵正色曰恐不宜有此戲上怒曰江僧安癡人癡人自相惜僧安智淵之父也智淵伏席流涕由此恩寵大衰又議殷貴妃諡曰懷上以為不盡美甚衘之它日與羣臣乘馬至貴妃墓舉鞭指墓前石柱謂智淵曰此上不容有懷字智淵益懼竟以憂卒己丑以尚書令柳元景為驃騎大將軍開府儀同三司二月甲寅上巡南豫南兖二州丁卯校獵於烏江壬戌大赦甲子如􅀲步山壬申還建康夏四月甲子詔自非臨軍戰陳並不得專殺其罪應重辟者皆先上須報違犯者以殺人論五月丙子詔曰自今刺史守宰動民興軍皆須手詔施行唯邊隅外警及姦舋内發變起倉猝者不從此例戊辰以左民尚書蔡興宗左衛將軍袁粲為吏部尚書粲淑之兄子也上好狎侮羣臣自太宰義恭以下不免穢辱常呼金紫光禄大夫王􅀇謨為老傖僕射劉秀之為老慳顔師伯為齴其餘短長肥瘦皆有稱目黄門侍郎宗靈秀體肥拜起不便每至集㑹多所賜與欲其瞻謝傾踣以為歡笑又寵一崑崙奴令以杖擊羣臣尚書令柳元景以下皆不能免唯憚蔡興宗方嚴不敢侵媟顔師伯謂儀曹郎王耽之曰蔡尚書常免昵戲去人實遠耽之曰蔡豫章昔在相府亦以方嚴不狎武帝宴私之日未嘗相召蔡尚書今日可謂能負荷矣壬寅魏主如隂山六月戊辰以秦郡太守劉德願為豫州刺史德願懷慎之子也上既葬殷貴妃數與羣臣至其墓謂德願曰卿哭貴妃悲者當厚賞德願應聲慟哭撫膺擗踊涕泗交流上甚悦故用豫州刺史以賞之上又今醫術人羊志哭貴妃志亦嗚咽極悲佗日有問志者曰卿那得此副急淚志曰我爾日自哭亡妾耳上為人機警勇决學問博洽文章華敏省讀書奏能七行俱下又善騎射而奢欲無度自晉氏渡江以來宮室草創朝晏所臨東西二堂而已晉孝武末始作清暑殿宋興無所增改上始大修宫室土木被錦繡嬖妾幸臣賞賜傾府藏壞髙祖所居隂室於其處起玉燭殿與羣臣觀之牀頭有土障壁上挂葛燈籠麻蠅拂侍中袁顗因盛稱高祖儉素之德上不答獨曰田舍公得此已為過矣顗淑之兄子也秋八月乙丑立皇子子孟為淮南王子産為臨賀王丙寅魏主畋于河西九月辛巳還平城庚寅以新安王子鸞兼司徒丙申立皇子子嗣為東平王冬十月癸亥以東海王禕為司空己巳上校獵姑孰魏員外散騎常侍游明根等來聘明根奉使三返上以其長者禮之有加十一月癸巳上習水軍於梁山十二月丙午如歷陽甲寅大赦己未太宰義恭加尚書令癸亥上還建康八年春正月丁亥魏主立其弟雲為任城王戊子以徐州刺史新安王子鸞領司徒夏閏五月壬寅太宰義恭領太尉上末年尤貪財利刺史二千石罷還必限使獻奉又以蒲戲取之要令罄盡乃止終日酣飲少有醒時常憑儿昏睡或外有奏事即肅然整容無復酒態由是内外畏之莫敢弛惰庚申上殂於玉燭殿遺詔太宰義恭解尚書令加中書監以驃騎將軍南兖州刺史柳元景領尚書令入居城内事無巨細悉關二公大事與始興公沈慶之參决若有軍旅悉委慶之尚書中事委僕射顔師伯外監所統委領軍將軍王􅀇謨是日太子即皇帝位年十六大赦吏部尚書蔡興宗親奉璽綬太子受之傲惰無戚容興宗出告人曰昔魯昭不戚叔孫知其不終家國之禍其在此乎甲子詔復以太宰義恭録尚書事柳元景如開府儀同三司領丹楊尹解南兖州六月丁亥魏主如隂山秋七月己亥以晉安王子勛為江州刺史柔然處羅可汗卒子予成立號曰受羅部真可汗改元永康部真帥衆侵魏辛丑魏北鎮遊軍擊破之壬寅魏主如河西髙車五部相聚祭天衆至數萬魏主親往臨視之髙車大喜丙午􅁙孝武皇帝于景寧陵廟號世祖庚戌尊皇太后曰太皇太后皇后曰皇太后乙夘罷南北二馳道及孝建以來所改制度還依元嘉尚書蔡興宗於都座慨然謂顔師伯曰先帝雖非盛德之主要以道始終三年無改古典所貴今殯宫始撤山陵未遠而凡諸制度興造不論是非一皆刋削雖復禪代亦不至爾天下有識當以此窺人師伯不從太宰義恭素畏戴法興巢尚之等雖受遺輔政而引身避事由是政歸近習法興等專制朝權威行近遠詔敇皆出其手尚書事無大小咸取决焉義恭與顔師伯但守空名而已蔡興宗自以職管銓衡每至上朝輒為義恭陳登賢進士之意又箴規得失博論朝政義恭性恇撓阿順法興恒慮失㫖聞興宗言輒戰懼無答興宗每奏選事法興尚之等輒㸃定回換僅有在者興宗於朝堂謂義恭師伯曰主上諒闇不親萬幾而選舉密事多被删改復非公筆亦不知是何天子意數與義恭等爭選事往復論執義恭法興皆惡之左遷興宗新昌太守既而以其人望復留之建康丙辰追立何妃曰獻皇后乙丑新安王子鸞解領司徒戴法興等惡王􅀇謨剛嚴八月丁卯以􅀇謨為南徐州刺史王太后疾篤使呼廢帝帝曰病人閒多鬼那可往太后怒謂侍者取刀來割我腹那得生寕馨兒己丑太后殂九月辛丑魏主還平城癸卯以尚書左僕射劉遵考為特進右光禄大夫乙卯葬文穆皇后于景寧陵冬十二月壬辰以王畿諸郡為楊州以楊州為東楊州癸巳以豫章王子尚為司徒楊州刺史是嵗青州移治東陽宋之境内凡有州二十二郡二百七十四縣千二百九十九户九十四萬有竒東方諸郡連歳旱饑米一升錢數百建康亦至百餘錢餓死者什六七資治通鑑卷第一百二十九
