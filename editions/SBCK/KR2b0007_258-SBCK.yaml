front:
  text: 資治通鑑卷第二百五十八
  hash: sha256:8347adaa5bae3efc66ac0ee82ef51e13b4683c766e9fefb3ab64e4dde3de7f37
body:
  text: 臣司馬光奉勑編集唐紀七十四光大淵獻凡三起屠維作噩盡重昭宗聖穆景文孝皇帝上之上龍紀元年春正月癸巳朔赦天下改元以翰林學士承㫖兵部侍郎劉崇望同平章事汴將龐師古拔宿遷軍于吕梁時􅄎逆戰大敗還保彭城壬子蔡將郭璠殺申叢送秦宗權於汴告朱全忠云叢謀復立宗權全忠以璠爲淮西留後戊申王建大破山行章於新繁殺獲近萬人行章僅以身免楊晟懼徙屯三交行章屯濛陽與建相持二月朱全忠送秦宗權至京師斬于獨栁京兆尹孫揆監刑宗權於檻車中引首謂揆曰尚書察宗權豈反者邪但輸忠不效耳觀者皆笑揆逖之族孫也三月加朱全忠兼中書令進爵東平郡王全忠既克蔡州軍勢益盛加奉國節度使趙徳諲中書令加蔡州節度使趙犨同平章事充忠武節度使以陳州爲治所㑹犨有疾悉以軍府事授其弟昶表乞骸骨詔以昶代爲忠武節度使未幾犨薨丙申錢銖拔蘇州徐約亡入海而死錢鏐以海昌都將沈粲權知蘇州夏四月賜陝虢軍號保義五月甲辰潤州制置使阮結卒錢鏐以静江都將成及代之李克用大發兵遣李罕之李存孝攻孟方立六月拔磁洺二州方立遣大將馬溉􅀽奉韜將兵數萬拒之戰於琉璃陂方立兵大敗二將皆爲所擒克用乗勝進攻邢州方立性猜忌諸將多怨至是皆不爲方立用方立慙懼飲藥死弟攝洺州刺史遷素得士心衆奉之爲留後求援於朱全忠全忠假道於魏博羅弘信不許全忠乃遣大將王䖍裕將精甲數百間道入邢州共守楊行密圍宣州城中食盡人相啗指揮使周進思據城逐趙鍠鍠將奔廣陵田頵追擒之未幾城中執進思以降行密入宣州諸將争取金帛徐温獨據米囷爲粥以食餓者温朐山人也鍠將宿松周本勇冠軍中行密獲而釋之以爲禆將鍠既敗左右皆散惟李徳誠從鍠不去行密以宗女妻之徳誠西華人也行密表言於朝詔以行密爲宣歙觀察使朱全忠與趙鍠有舊遣使求之行密謀於􅀽襲襲曰不若斬首以遺之行密從之未幾襲卒行密哭之曰天不欲成吾大功邪何爲折吾股肱也吾好寛而襲每勸我以殺此其所以不夀與孫儒遣兵攻廬州蔡儔以州降之朱珍拔蕭縣據之與時溥相拒朱全忠欲自往臨之珍命諸軍皆葺馬廏李唐賓部將嚴郊獨惰慢軍吏責之唐賔怒見珍訴之珍亦怒以唐賔爲無禮拔劒斬之遣􅀐白全忠云唐賓謀叛淮南左司馬敬翔恐全忠乗怒倉猝處置違宜故留使者逮夜然後從容白之全忠果大驚翔因爲畫策詐收唐賓妻子繫獄遣騎往慰撫全忠從之軍中始安秋七月全忠如蕭縣未至珍出迎命武士執之責以專殺而誅之諸將霍存等數十人叩頭爲之請全忠怒以牀擲之乃退丁未至蕭縣以龐師古代珍爲都指揮使八月丙子全忠進攻時溥壁㑹大雨引兵還冬十月平盧節度使王敬武薨子師範年十六軍中推爲留後棣州刺史張蟾不從詔以太子少師崔安潜兼侍中充平盧節度使蟾迎安濳至州與之共討師範以給事中杜孺休爲蘇州刺史錢鏐不悅以知州事沈粲爲制置指揮使楊行密遣馬步都虞候田頵等攻常州十一月上改名曄上將祀圓丘故事中尉樞密皆䙆衫侍從僖宗之世已具襴笏至是又令有司制法服孔緯及諫官禮官皆以爲不可上出手札諭之曰卿等所論至當事有從權勿以小瑕遂妨大禮於是宦官始服劒佩侍祠己酉祀圓丘赦天下上在藩邸素疾宦官及即位楊復㳟恃援立功所爲多不法上意不平政事多謀於宰相孔緯張濬􅂆上舉大中故事抑宦者􅁠復恭常乗肩輿至太極殿它日上與宰相言及四方反者孔緯曰陛下左右有將反者况四方乎上矍然問之緯指復恭曰復恭陛下家奴乃肩輿造前殿多養壯士爲假子使典禁兵或爲方鎮非反而何復恭曰子壯士欲以收士心衛國家豈反邪上曰卿欲衛國家何不使姓李而姓楊乎復恭無以對復恭假子天威軍使楊守立本姓胡名弘立勇冠六軍人皆畏之上欲討復恭恐守立作亂謂復恭曰朕欲得卿胡子在左右復恭見守立於上上賜姓名李順節使掌六軍管鑰不期年擢至天武都頭領鎮海節度使俄加平章事及謝日臺吏申請班見百僚孔緯判不集順節至中書色不悅它日語微及之緯曰宰相師長百僚故有班見相公職爲都頭而於政事堂班見百僚於意安乎順節不敢復言朱全忠求領鹽鐵孔緯獨執以爲不可謂進奏吏曰朱公湏此職非興兵不可全忠乃止田頵攻常州爲地道入城中宵旌旗甲兵出於制置使杜稜之寢室遂虜之以兵三萬戍常州朱全忠遣龐師古將兵自潁上趨淮南撃孫儒十二月甲子王建敗山行章及西川騎將宋行能於廣都行能奔還成都行章退守眉州壬申行章請降於建戊寅孫儒自廣陵引兵度江壬午逐田頵取常州以劉建鋒守之儒還廣陵建鋒又逐成及取潤州前山南東道節度使劉巨容之在襄陽也有申屠生教之燒藥爲黄金田令孜之弟過襄陽巨容出金示之及寓居成都令孜求其方不與恨之是嵗令孜殺巨容滅其族大順元年春正月戊子朔羣臣上尊號曰聖文睿徳光武弘孝皇帝改元李克用急攻邢州孟遷食竭力盡執王䖍裕及汴兵以降克用以安金俊爲邢洺􅇛練使壬寅王建攻邛州陳敬瑄遣其大將彭城楊儒將兵三千助刺史毛湘守之湘出戰屢敗楊儒登城見建兵盛歎曰唐祚盡矣王公治衆嚴而不殘殆可以疪民乎遂帥所部出降建養以爲子更其姓名曰王宗儒乙巳建留永平節度判官張琳爲邛南招安使引兵還成都琳許州人也陳敬瑄分兵布寨於犀浦郫導江等縣發城中民户一丁晝則穿重壕採竹木運塼石夜則登城擊柝廵警無休息韋昭度營於唐橋王建營於東閶門外建事昭度甚謹辛亥簡州將杜有遷執刺史貟䖍嵩降於建建以有遷知州事汴將龐師古等衆號十萬度淮聲言救楊行密攻下天長壬子下高郵二月己未資州將矦元綽執刺史楊戡降於王建建以元綽知州事乙丑加朱全忠守中書令龐師古引兵深入淮南己巳與孫儒戰於陵亭師古兵敗而還楊行密遣其將馬敬言將兵五千乗虚襲據潤州李友將兵二萬屯青城將攻常州安仁義劉威田頵敗劉建鋒於武進敬言仁義頵屯潤州友合肥人威慎縣人也李克用將兵攻雲州防禦使赫連鐸克其東城鐸求救於盧龍節度使李匡威匡威將兵三萬赴之丙子邢洺􅇛練使安金俊中流矢死河東以勝軍申信叛降於鐸㑹幽州軍至克用引還時􅄎求救於河東李克用遣其將石君和將五百騎赴之李克用巡潞州以供具不厚怒昭義節度使李克脩詬而笞之克脩慙憤成疾三月薨克用表其弟決勝軍使克恭爲昭義留後賜宣歙軍號寜國以楊行密爲節度使夏四月宿州將張筠逐刺史張紹光附于時􅄎朱全忠帥諸軍討之􅄎出兵掠碭山全忠遣牙内都指揮使朱友裕擊之殺三千餘人擒石君和友裕全忠之子也乙丑陳敬瑄遣蜀州刺史任從海將兵二萬救邛州戰敗欲以蜀州降王建敬瑄殺之以徐公鈢代爲蜀州刺史丙寅嘉州刺史朱實舉州降于建丙子僰道土豪文武堅執戎州刺史謝承恩降于建赫連鐸李匡威請討李克用朱全忠亦上言克用終爲國患今因其敗臣請帥汴滑孟三軍與河北三鎮共除之乞朝廷命大臣爲統帥初張濬因楊復恭以進復恭中廢更附田令孜而薄復恭及復恭再用事深恨之上知濬與復恭有隙特親倚之濬亦以功名爲己任每自比謝安裴度克用之討黄巢屯河中也濬爲都統判官克用薄其爲人聞其作相私謂詔使曰張公好虚談而無實用傾覆之士也主上采其名而用之它日交亂天下必是人也濬聞而銜之上從容與濬論古今治亂濬曰陛下英睿如此而中外制於彊臣此臣日夜所痛心疾首也上問以當今所急對曰莫若彊兵以服天下上於是廣募兵於京帥至十萬人及全忠等請討克用上命三省御史臺四品以上議之以爲不可者什六七杜讓能劉崇望亦以爲不可濬欲􅀝外勢以擠楊復恭乃曰先帝再幸山南沙陀所爲也臣常慮其與河朔相表裏致朝廷不能制今兩河藩鎮共請討之此千載一時但乞陛下付臣兵柄旬月可平失今不取後悔無及孔緯曰濬言是也復恭曰先朝播遷雖藩鎮跋扈亦由居中之臣措置未得其宜今宗廟甫安不冝更造兵端上曰克用有興復大功今乗其危而攻之天下其謂我何緯曰陛下所言一時之體也張濬所言萬世之利也昨計用兵饋運犒賞之費一二年閒未至匱乏在陛下斷志行之耳上以二相言叶僶俛從之曰兹事今付卿二人無貽朕羞五月詔削奪克用官爵属籍以濬爲河東行營都招討制置宣慰使京兆尹孫揆副之以鎮國節度使韓建爲都虞候兼供軍粮料使以朱全忠爲南面招討使王鎔爲東面招討使李匡威爲北面招討使赫連鐸副之濬奏給事中牛徽爲行營判官徽曰國家以喪亂之餘欲爲英武之舉横挑彊宼離諸侯心吾見其顛沛也遂以衰疾固辭徽僧孺之孫也李克恭驕恣不曉軍事潞人素樂李克脩之簡儉且死非其罪潞人憐之由是將士離心􅀄潞人叛孟氏牙將安居受等召河東兵以取潞州及孟遷以邢洺磁州歸李克用克用寵任之以遷爲軍城都虞候羣從皆􅀘右職居受等咸怨且懼昭義有精兵號後院將克用既得三州將圖河朔令李克恭選後院將尤驍勇者五百人送晉陽潞人惜之克恭遣牙將李元審及小校馮霸部送晉陽至銅鞮霸劫其衆以叛循山而南至于沁水衆已三千人李元審擊之爲霸所傷歸于潞庚子克恭就元審所館視之安居受帥其黨作亂攻而焚之克恭元審皆死衆推居受爲留後附于朱全忠居受使召馮霸不至居受懼出走爲野人所殺霸引兵入潞自爲留後時朝廷方討克用聞克恭死朝臣皆賀全忠遣河陽留後朱崇節將兵入潞州權知留後克用遣康君立李存孝將兵圍之壬子張濬帥諸軍五十二都及邠寜鄜夏雜虜合五萬人發京師上御安喜樓餞之濬屏左右言於上曰俟臣先除外憂然後爲陛下除内患楊復恭􅀼聽聞之兩軍中尉餞濬於長樂坂復恭屬濬酒濬辭以醉復恭戲之曰相公杖鉞專征作態邪濬曰俟平賊還方見作態耳復恭益忌之癸丑削奪李罕之官爵六月以孫揆爲昭義節度使充招討副使丁巳茂州刺史李繼昌帥衆救成都己未王建擊斬之辛酉資簡都制置應援使謝從本殺雅州刺史張承簡舉城降建孫儒求好於朱全忠全忠表爲淮南節度使未幾全忠殺其使者遂復爲仇敵光啓末徳州刺史盧彦威逐義昌節度使楊全玫自稱留後求旌節朝廷未許至是王鎔羅弘信因張濬用兵爲之請乃以彦威爲義昌節度使張濬㑹宣武鎮國静難鳳翔保大定難諸軍於晉州更名義成軍曰宣義辛未以朱全忠爲宣武宣義節度使全忠以方有事徐楊徴兵遣戍殊爲遼闊乃辭宣義請以胡眞爲節度使從之然兵賦出入皆制於全忠一如巡屬及胡眞入爲統軍竟以全忠爲兩鎮節度使罷淮南不領焉秋七月官軍至隂地闗朱全忠遣驍將葛從周將千騎潛自壺闗夜抵潞州犯圍入城又遣别將李讜李重胤鄧季筠將兵攻李罕之於澤州又遣張全義朱友裕軍於澤州之北爲從周應援季筠下邑人也全忠奏臣已遣兵守潞州請孫揆赴鎮張濬亦恐昭義遂爲汴人所據分兵二千使揆將之趣潞州八月乙丑揆發晉州李存孝聞之以三百騎伏於長子西谷中揆建牙杖節褒衣大蓋擁衆而行存孝突出擒揆及賜旌節中使韓歸範牙兵五百餘人追擊餘衆於刁黄嶺盡殺之存孝械揆及歸範􅖞以素練徇於潞州城下曰朝廷以孫尚書爲潞帥命韓天使賜旌節葛僕射可速歸大梁令尚書視事遂􅖞以獻於克用克用囚之既而使人誘之欲以爲河東副使揆曰吾天子大臣兵敗而死分也豈能復事鎮使邪克用怒命以鋸鋸之鋸不能入揆罵曰死狗奴鋸人當用板夾汝豈知邪乃以板夾之至死罵不絶聲丙寅孫儒攻潤州蘇州刺史杜孺休到官錢鏐密使沈粲害之㑹楊行密將李友拔蘇州粲歸杭州鏐欲歸罪於粲而殺之粲奔孫儒王建退屯漢州陳敬瑄括富民財以供軍置徴督院逼以桎梏捶楚使各自占凡有財者如匿􅂍虚占急徴咸不聊生李罕之告急於李克用克用遣李存孝將五千騎救之九月壬寅朱全忠軍于河陽汴軍之初圍澤州也呼李罕之曰相公毎恃河東輕絶當道今張相公圍太原葛僕射入潞府旬日之間沙陀無穴自藏相公何路求生邪及李存孝至選精騎五百繞汴寨呼曰我沙陀之求穴者也欲得爾肉以飽士卒可令肥者出闘汴將鄧季筠亦驍將也引兵出戰存孝生擒之是夕李讜李重胤收衆遁去存孝罕之隨而擊之至馬牢山大破之斬獲萬計追至懷州而還存孝復引兵攻潞州葛從周朱崇節弃潞州而歸戊申全忠庭責諸將撓敗之罪斬李讜李重胤而還李克用以康君立爲昭義留後李存孝爲汾州刺史存孝自謂擒孫揆功大當鎮昭義而君立得之憤恚不食者數日縱意刑殺始有叛克用之志李匡威攻蔚州虜其刺史邢善益赫連鐸引吐蕃黠戛斯衆數萬攻遮虜平殺其軍使劉胡子克用遣其將李存信擊之不勝更命李嗣源爲存信之副遂破之克用以大軍繼其後匡威鐸皆敗走獲匡威之子武州刺史仁宗及鐸之壻俘斬萬計李嗣源性謹重亷儉諸將相㑹各自詫勇略嗣源獨黙然徐曰諸君喜以口擊賊嗣源但以手擊賊耳衆慙而止楊行密以其將張行周爲常州制置使閏月孫儒遣劉建鋒攻拔常州殺行周遂圍蘇州卭州刺史毛湘本田令孜親吏王建攻之急食盡救兵不至壬戌湘謂都知兵馬使任可知曰吾不忍負田軍容吏民何罪爾可持吾頭歸王建乃沐浴以俟刃可知斬湘及二子降於建士民皆泣甲戌建持永平旌節入邛州以節度判官張琳知留後繕完城隍撫安夷獠經營蜀雅冬十月癸未朔建引兵還成都蜀州將李行周逐徐公鈢舉城降建乙酉朱全忠自河陽如滑州視事遣使者請糧馬及假道于魏以伐河東羅弘信不許又請於鎮鎮人亦不許全忠乃自黎陽濟河撃魏加邠寜節度使王行瑜侍中佑國節度使張全義同平章事官軍出隂地􅀜遊兵至于汾州李克用遣薛志勤李承嗣將􅀐三千營于洪洞李存孝將兵五千營于趙城鎮國節度使韓建以壯士三百夜襲存孝營存孝知之設伏以待之建兵不利靜難鳳翔之兵不戰而走禁軍自潰河東乗兵勝逐北抵晉州西門張濬出戰又敗官軍死者近三千人靜難鳳翔保大定難之軍先度河西歸濬獨有禁軍及宣武軍合萬人與韓建閉城拒守自是不敢復出存孝引兵攻絳州十一月刺史張行恭弃城走存孝進攻晉州三日與其衆謀曰張濬宰相俘之無益天子禁兵不宜加害乃退五十里而軍濬建自含口遁去存孝取晉絳二州大掠慈隰之境先是克用遣韓歸範歸朝附表訟寃言臣父子三代受恩四朝破寵勛翦黄巢黜襄王存易定致陛下今日冠通天之冠佩白玉之璽未必非臣之力也若以攻雲州爲臣罪則拓跋思恭之取鄜延朱全忠之侵徐鄆何獨不討賞彼誅此臣豈無辭且朝廷當阽危之時則譽臣爲韓彭伊吕及既安之後則罵臣爲戎羯胡夷今天下握兵立功之臣獨不懼陛下它日之罵乎況臣果有大罪六師征之自有典刑何必幸臣之弱而後取之邪今張濬既出師則固難束手已集蕃漢兵五十萬欲直抵蒲潼與濬格闘若其不勝甘從削奪不然方且輕騎呌閽頓首丹陛訴姦回於陛下之扆座納制敕於先帝之廟庭然後自拘司敗恭俟鈇鑕表至濬己敗朝廷震恐濬與韓建踰王屋至河陽撤民屋爲栰以濟河師徒失亡殆盡是役也朝廷倚朱全忠及河朔三鎮及濬至晉州全忠方連兵徐鄆雖遣將攻澤州而身不至行營乃求兵糧於鎮魏鎮魏倚河東爲扞蔽皆不出兵惟華邠鳳翔鄄夏之兵㑹之兵未交而孫揆被擒幽雲俱敗楊復恭復從中沮之故濬軍望風自潰十二月己丑孫儒拔蘇州殺李友安仁義等聞之焚潤州廬舍夜遁儒使沈粲守蘇州又遣其將歸傳道守潤州辛丑汴將丁㑹葛從周擊魏度河取黎陽臨河龐師古霍存下淇門衛縣朱全忠自以大軍繼之是嵗置昇州於上元縣以張雄爲刺史二年春正月羅弘信軍于内黄丙辰朱全忠擊之五戰皆捷至永定橋斬首萬餘級弘信懼遣使厚幣請和全忠命止焚掠歸其俘還軍河上魏􅀶自是服於汴庚申制以太保門下侍郎同平章事孔緯爲荆南節度使中書侍郎同平章事張濬爲鄂岳觀察使以翰林學士承㫖兵部侍郎崔昭緯同平章事御史中丞徐彦若爲户部侍郎同平章事昭緯慎由從子彦若商之子也楊復恭使人劫孔緯於長樂坡斬其旌節資裝俱盡緯僅能自免李克用復遣使上表曰張濬以陛下萬代之業邀自已一時之功知臣與朱温深仇私相連結臣今身無官爵名是罪人不敢歸陛下藩方且欲於河中寄寓進退行止伏俟指麾詔再貶孔緯均州刺史張濬連州刺史賜克用詔悉復其官爵使歸晉陽孫儒盡舉淮蔡之兵濟江癸酉自潤州轉戰而南田頵安仁義屢敗退楊行密城戍皆望風奔潰儒將李從立奄至宣州東溪行密守僃尚未固衆心危懼夜使其將合肥臺濛將五百人屯溪西濛使士卒傳呼往返數四從立以爲大衆繼至遽引去儒前軍至溧水行密使都指揮使李神福拒之神福陽退以示怯儒軍不設僃神福夜帥精兵襲之俘斬千人二月加李克用守中書令復李罕之官爵再貶張濬繡州司户韋昭度將諸道兵十餘萬討陳敬瑄三年不能克饋運不繼朝議欲息兵三月乙亥制復敬瑄官爵令顧彦朗王建各帥衆歸鎮王師範遣都指揮使盧弘擊棣州刺史張蟾弘引兵還攻師範師範使人以重賂迎之曰師範童騃不堪重任願得避位使保首領公之仁也弘以師範年少信之不設僃師範密謂小校安丘劉鄩曰汝能殺弘吾以汝爲大將弘入城師範伏甲而享之鄩殺弘於座及其黨數人師範慰諭士卒厚賞重誓自將以攻棣州執張蟾斬之崔安潛逃歸京師師範以鄩爲馬步副都指揮使詔以師範爲平廬節度使師範和謹好學毎本縣令到官師範輒僃儀衛往謁之令不敢當師範命客將挾持令坐於聽事自稱百姓王師範拜之於庭僚佐或諫師範曰吾敬桑梓所以教子孫不忘本也張濬至藍田逃奔華州依韓建與孔緯密求救於朱全忠全忠上表爲緯濬訟寃朝廷不得已並聽自便緯至商州而還亦寓居華州邢洺節度使安知建潛通朱全忠李克用表以李存孝代之知建懼奔青州朝廷以知建爲神武統軍知建帥麾下三千人將詣京師過鄆州朱瑄與克用方睦伏兵河上斬之傳首晉陽夏四月有彗星見于三台東行入太微長十丈餘甲申赦天下成都城中乏食棄兒滿路民有潛入行營販米入城者邏者得之以白韋昭度昭度曰滿城飢甚忍不救之釋勿問亦有白陳敬瑄者敬瑄曰吾恨無術以救餓者彼能如是勿禁也由是販者浸多然所致不過斗升截筒徑寸半深五分量米而鬻之毎筒百餘錢餓殍狼藉軍民彊弱相陵將吏斬之不能禁乃更爲酷法或斷􅆎或斜劈死者相繼而爲者不止人耳目既熟不以爲懼吏民日窘多謀出降敬瑄悉捕其族黨殺之􅃤毒僃至内外都指揮使眉州刺史成都徐耕性仁恕所全活數千人田令孜曰公掌生殺而不刑一人有異志邪耕懼夜取俘囚戮於市王建見罷兵制書曰大功垂成柰何棄之謀於周庠庠勸建請韋公還朝獨攻成都克而有之建表稱陳敬瑄田令孜罪不可赦願畢命以圖成功昭度無如之何由是未能東還建說昭度曰今􅀜東藩鎮迭相吞噬此腹心之疾也相公宜早歸廟堂與天子謀之敬瑄疥㿅耳當以日月制之責建可辦也昭度猶豫未决庚子建陰令東川將唐友通等擒昭度親吏駱保於行府門臠食之云其盗軍糧昭度大懼遽稱疾以印節授建牒建知三使留後兼行營招討使即日東還建送至新都跪觴馬前泣拜而別昭度甫出劒門即以兵守之不復內東軍昭度至京師除東郡留守建急攻成都環城烽塹亘五十里有狗屠王鷂請詐得罪亡入城說之使上下離心建遣之鷂入見陳敬瑄田令孜則言建兵疲食盡將遁矣出則鬻茶於市陰爲吏民稱建英武軍勢彊盛田是敬瑄等懈於守僃而衆心危懼建又遣其將京兆鄭渥詐降以覘之敬瑄以爲將使乗城既而復以詐得歸建由是悉知城中虚實以渥爲親從都指揮使更姓名曰王宗渥以武安節度使周岳爲嶺南西道節度使李克用大舉擊赫連鐸敗其兵於河上進圍雲州楊行密遣其將劉威朱延夀將兵三萬擊孫儒于黄池威等大敗延夀舒城人也孫儒軍于黄池五月大水諸營皆没乃還楊州使其將康暀據和州安景思據滁州丙午立皇子祐爲徳王楊行密遣其將李神福攻和滁康暀降安景思走秋七月李克用急攻雲州赫連鐸食盡奔吐谷渾部既而歸於幽州克用表大將石善友爲大同防禦使朱全忠遣使與楊行密約共攻孫儒儒恃其兵彊欲先滅行密後敵全忠移牒藩鎮數行密全忠之罪且曰俟平宣汴當引兵入朝除君側之惡於是悉焚揚州廬舍盡驅丁壯及婦女度江殺老弱以充食行密將張訓李徳誠潛入揚州滅餘火得穀數十萬斛以賑飢民泗州刺史張諫貸數萬斛以給軍訓以行密之命饋之諫由是徳行密邢洺節度使李存孝勸李克用攻鎮州克用從之八月克用南廵澤潞遂涉懷孟之境朱全忠遣其將丁㑹攻宿州克其外城乙未孫儒自蘇州出屯廣徳楊行密引兵拒之儒圍其寨行密將上蔡李簡帥百餘人力戰破寨拔行密出之王建攻陳敬瑄益急敬瑄出戰輒敗巡内州縣率爲建所取威戎節度使楊晟時饋之食建以兵據新都彭州道絶敬瑄出慰勉士卒皆不應辛丑田令孜登城謂建曰老夫曏於公甚厚何見困如是建曰父子之恩豈敢忘但朝廷命建討不受代者不得不然儻太師改圖建復何求是夕令孜自􅂝西川印節詣建營授之將士皆呼萬嵗建泣謝請復爲父子如初先是建常誘其將士曰成都城中繁盛如花錦一朝得之金帛子女恣汝曹所取節度使與汝曹迭日爲之耳壬寅敬瑄開城迎建建署其將張勍爲馬步斬斫使使先入城乃謂將士曰吾與汝曹三年百戰今始得城汝曹不憂不富貴慎勿焚掠坊市吾己委張勍䕶之矣彼幸執而白我我猶得赦之若先斬而後白吾亦不能救也既而士卒有犯令者勍執百餘人皆捶其胷而殺之積尸於市衆莫敢犯故時人謂勍爲張打胷癸卯建入城自稱西川留後小校韓武數於使㕔上馬牙司止之武怒曰司徒許我迭日爲節度使上馬何爲建密遣人刺殺之初陳敬瑄之拒朝命也田令孜欲盗其軍政謂敬瑄曰三兄尊重軍務煩勞不若盡以相付日具記事咨呈兄但高居自逸而已敬瑄素無智能忻然許之自是軍事皆不由己以至於亡建表敬瑄子陶爲雅州刺史使隨陶之宫明年罷歸寓居新津以一縣租賦贍之癸丑建分遣士卒就食諸州更文武堅姓名曰王宗阮謝從本曰王宗本陳敬瑄將佐有器幹者建皆禮而用之六軍十二衛觀軍容使左軍中尉楊復恭揔宿衛兵專制朝政諸假子皆爲節度使刺史又養宦官子六百人皆爲監軍假子龍劒節度使守貞武定節度使守忠不輸貢賦上表訕薄朝廷上舅王瓌求節度使上訪於復恭復恭以爲不可瓌怒詬之瓌出入禁中頗用事復恭惡之奏以爲黔南節度使至吉柏津令山南西道節度使楊守亮覆諸江中宗族賓客皆死以舟敗聞上知復恭所爲深恨之李順節既寵貴與復恭争權盡以復恭陰事告上上乃出復恭爲鳳翔監軍復恭愠懟不肯行稱疾求致仕九月乙卯以復恭爲上將軍致仕賜以几杖使者致詔命還復恭潛遣腹心張綰刺殺之加䕶國節度使王重盈兼中書令東川節度使顧彦朗薨軍中推其弟彦暉知留後冬十月壬午宿州刺史張筠降于丁㑹癸未以永平節度使王建爲西川節度使甲申廢永平軍建既得西川留心政事容納直言好施樂士用人各盡其才謙恭儉素然多忌好殺諸將有功名者多因事誅之楊復恭居第近玉山營假子守信爲玉山軍使數往省之咸告復恭與守信謀反乙酉上御安喜門陳兵自衛命天威都將李順節神策軍使李守節將兵攻其弟張綰帥家衆拒戰守信引兵助之順節等不能克丙戌禁軍守含光門俟其開欲出掠兩市遇劉崇望立馬諭之曰天子親在街東督戰汝曹皆宿衛之士當於樓前殺賊立功勿貪小利自取惡名衆皆曰諾遂從崇望而東守信之衆望見兵來遂潰走守信與復恭挈其族自通化門出趣興元永安都頭權安追之擒張綰斬之復恭至興元楊守亮楊守忠楊守貞及綿州刺史楊守厚同舉兵拒朝廷以討李順節爲名守厚亦復恭假子也李克用攻王鎔大破鎮兵於龍尾崗斬獲萬計遂拔臨城攻元氏柏郷李匡威引幽州兵救之克用大掠而還軍于邢州十一月曹州都將郭銖殺刺史郭詞降於朱全忠泰寜節度使朱瑾將萬餘人攻單州乙丑時􅄎將劉知俊帥衆二千降於全忠知俊沛人徐之驍將也􅄎軍自是不振全忠以知俊爲左右開道指揮使辛未夀州將劉弘鄂惡孫儒殘暴舉州降朱全忠十二月乙酉汴將丁㑹張歸霸與朱瑾戰金鄉大破之殺獲殆盡瑾單騎走免天威都將李順節恃恩驕横出入常以兵自隨兩軍中尉劉景宣西門君遂惡之白上恐其作亂戊子二人以詔召順節順節入至銀臺門二人邀順節於仗舍坐語供奉官似先知自後斬其首從者大譟而出於是天威捧日登封三都大掠永寜坊至暮乃定百官表賀孫儒焚掠蘇常引兵逼宣州錢鏐復遣兵據蘇州儒屢破楊行密之兵旌旗輜重亘百餘里行密求救于錢鏐鏐以兵食助之以顧彦暉爲東川節度使遣中使宋道弼賜旌節楊守亮使楊守厚囚道弼奪其旌節發兵攻梓州癸卯彦暉求救於王建甲辰建遣其將華洪李簡王宗侃王宗弼救東川建密謂諸將曰爾等破賊彦暉必犒師汝曹於行營報宴因而執之無煩再舉宗侃破守厚七砦守厚走歸綿州彦暉具犒禮諸將報宴宗弼以建謀告之彦暉乃以疾辭初李茂貞養子繼臻據金州均州刺史馮行襲攻下之詔以行襲爲昭信防禦使治金州楊守亮欲自金商襲京師行襲逆撃大破之是嵗賜涇原軍號曰彰義增領渭武二州福建觀察使陳巖疾病遣使以書召泉州刺史王潮欲授以軍政未至而巖卒巖妻弟都將范暉諷將士推已爲留後發兵拒潮資治通鑑卷第二百五十八
