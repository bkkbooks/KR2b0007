seq: 161
front:
  text: 之曰跛奴欲何爲邪景怒破城殺詬者而去晝夜兼行追軍不敢逼使謂紹宗曰景􅀂就擒公復何用紹宗乃縱之
  hash: sha256:e0a87d4f1409e8f75470007d78791b1059b066d516b421a1b57660905593b248
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0007_SBCK_161-1a}
body:
  text: 辛丑以尚書僕射謝舉爲尚書令守吏部尚書王克爲僕射甲辰豫州刺史羊鴉仁以東魏軍漸逼稱糧運不繼弃懸瓠還義陽殷州刺史羊思逹亦弃項城走東魏人皆據之上怒責讓鴉仁鴉仁懼啓申後期頓軍淮上矦景旣敗不知所適時鄱陽王範除南豫州刺史未至馬頭戍主劉神茂素爲監州事韋黯所不容聞景至故往􅀱之景問曰壽陽去此不逺城池險固欲往投之韋黯其納我乎神茂曰黯雖據城是監州耳王若馳至近郊彼必出迎因而執之可以集事得城之後徐以啓聞朝廷喜王南歸必不責也景執其手曰天教也神茂請帥步􅀐百人先爲郷導壬子景夜至壽陽城下韋黯以爲賊也授甲登陴景遣其徒告曰河南王戰敗來投此鎭願速開門黯曰旣不奉敇不敢聞命景謂神茂曰事不諧矣神茂曰黯懦而寡智可説下也乃遣壽陽徐思玉入見黯曰河南王爲朝廷所重君所知也今失利來投何得不受黯曰吾之受命唯知守城河南自敗何預吾事思王曰國家付君以閫外之略今君不肯開城􅀂魏追兵來至河南爲魏所殺君豈能獨存縱使或存何顔以見朝廷黯然之思王出報景大悦曰活我者卿也癸丑黯開門納景景遣其將分守四門詰責黯將斬之旣而撫手大笑置酒極歡黯叡之子也朝廷聞景敗未得審問或云景與將士盡没上下咸以爲憂侍中太子詹事何敬容詣東宫太子曰淮北始更有信矦景定得身免不如所傳敬容對曰得景遂死深爲朝廷之福太子失色問其故敬容曰景翻覆叛臣終當亂國太子於􅀇圃自講老莊敬容謂學士吳孜曰昔西􅀳祖尚􅀇虚使中原淪於胡羯今東宫復爾江南亦將爲戎乎甲寅景遣儀同三司于子悦馳以敗聞并自求貶削優詔不許景復求資給上以景兵新破未忍移易乙卯即以景爲南豫州牧本官如故更以鄱陽王範爲合州刺史鎭合肥光禄大夫蕭介上表諌曰竊聞矦景以渦陽敗績隻馬歸命陛下不悔前禍復敇容納臣聞凶人之性不移天下之惡一也昔吕布殺丁原以事董卓終誅董而爲賊劉牢反王恭以歸􅀳還背􅀳以構妖何者狼子野心終無馴狎之性養虎之喻必見飢噬之禍矦景以凶狡之才荷髙歡卵翼之遇位忝台司任居方伯然而髙歡墳土未乾即還反噬逆力不逮乃復逃死關西宇文不容故復投身於我陛下前者所以不逆細流正欲比屬國降胡以討匈奴兾􅀗一戰之效耳今旣亡師失地直是境上之匹夫陛下愛匹夫而弃與國臣竊不取也􅀂國家猶待其更鳴之晨歳暮之效臣竊惟矦景必非嵗暮之臣弃郷國如脱屣背君親如遺芥豈知逺慕聖德爲江淮之純臣乎事迹顯然無可致惑臣朽老疾侵不應干預朝政但楚囊將死有城郢之忠衞魚臨亡亦有尸諌之節臣忝爲宗室遺老敢忘劉向之心歎息其忠然不能用介思話之孫也己未東魏大將軍澄朝于鄴魏以開府儀同三司趙貴爲司空魏皇孫生大赦二月東魏殺其南兖州刺史石長宣討矦景之黨也其餘爲景所脅從者皆赦之東魏旣得懸瓠項城悉復舊境大將軍澄數遣書移復求通好朝廷未之許澄謂貞陽矦淵明曰先王與梁主和好十有餘年聞彼禮佛文云奉爲魏主并及先王此乃梁主厚意不謂一朝失信致此紛擾知非梁主本心當是矦景扇動耳宜遣使諮論􅀂梁王不忘舊好吾亦不敢違先王之意諸人並即遣還矦景家屬亦當同遣淵明乃遣省事夏矦僧辯奉啓於上稱勃海王弘厚長者􅀂更通好當聽淵明還上得啓流涕與朝臣議之右衞將軍朱异御史中丞張綰等皆曰静寇息民和實爲便司農卿􅀓􅄮獨曰髙澄何事須和必是設閒故命貞陽遣使欲令矦景自疑景意不安必圖禍亂􅀂許通好正墮其計中异等固執冝和上亦厭用兵乃從异言賜淵明書曰知髙大將軍禮汝不薄省啓甚以慰懷當别遣行人重敦鄰睦僧辯還過壽陽矦景竊訪知之攝問具服乃寫荅淵明之書陳啓於上曰髙氏心懐鴆毒怨盈北土人願天從歡身殞越子澄嗣惡計滅待時所以昧此一勝者蓋天蕩澄心以盈凶毒耳澄苟行合天心腹心無疾又何急急奉壁求和豈不以秦兵扼其喉胡􅀐迫其背故甘辭厚幣取安大國臣聞一日縱敵數丗之患何惜髙澄一豎以弃億兆之心竊以北魏安彊莫過天監之始鍾離之役匹馬不歸當其彊也陛下尚伐而取之及其弱也反慮而和之舎巳成之功縱垂死之虜使其假命彊梁以遺後丗非直愚臣扼腕實亦志士痛心昔伍相奔吳楚􅀖卒滅陳平去項劉氏用興臣雖才劣古人心同往事誠知髙澄忌賈在翟惡㑹居秦求盟請和兾除其患􅀂臣死有益萬殞無辭唯恐千載有穢良史㬌又致書於朱异餉金三百兩异納金而不通其啓已卯上遣使弔澄景又啓曰臣與髙氏舋隙巳􅀷仰慿威靈期雪讎恥今陛下復與髙氏連和使臣何地自處乞申後戰宣暢皇威上報之曰朕與公大義巳定豈有成而相納敗而相弃乎今髙氏有使求和朕亦更思偃武進退之宜國有常制公但清静自居無勞慮也景又啓曰臣今蓄糧聚衆秣馬潜戈指日計期克清趙魏不容軍出無名故願以陛下爲主耳今陛下弃臣遐外南北復通將恐微臣之身不免髙氏之手上又報曰朕爲萬乗之主豈可失信於一物想公深得此心不勞復有啓也景乃詐爲鄴中書求以貞陽矦易景上將許之舎人􅀓岐曰矦景以窮歸義弃之不祥且百戰之餘寧肯束手受縶謝舉朱异曰景奔敗之將一使之力耳上從之復書曰貞陽旦至矦景夕返景謂左右曰我固知呉老公薄心腸王偉説景曰今坐聽亦死舉大事亦死唯王圖之於是始爲反計屬城居民悉召募爲軍士輒停責市估及田租百姓子女悉以配將士三月癸巳東魏以太尉襄城王旭爲大司馬開府儀同三司髙岳爲太尉辛亥大將軍澄南臨黎陽自虎牢濟河至洛陽魏同軌防長史裴寛與東魏將彭樂等戰爲樂所擒澄禮遇甚厚寛得閒逃歸澄由太行返􅀳陽屈獠洞斬李賁傳首建康賁兄天寳遁入九眞收餘兵二萬圍愛州交州司馬陳霸先帥衆討平之詔以霸先爲西江督護髙要太守督七郡諸軍事夏四月甲子東魏吏部令史張永和等僞假人官事覺紏檢首者六萬餘人甲戍東魏遣太尉髙岳行臺慕容紹宗大都督劉豐生等將步􅀐十萬攻魏王思政於潁川思政命卧鼔偃旗􅀂無人者岳恃其衆四面陵城思政選驍勇開門出戰岳兵敗走岳更築土山晝夜攻之思政隨方拒守奪其土山置樓堞以助防守五月魏以丞相㤗爲太師廣陵王欣爲太􅀓李弼爲大宗伯趙貴爲大司寇于謹爲大司空太師㤗奉太子巡撫西境登隴至原州歷北長城東趣五原至蒲州聞魏主不豫而還及至巳愈泰還華州上遣建康令謝挺散􅀐常侍徐陵聘于東魏復脩前好陵摛之子也六月東魏大將軍澄巡北邊秋七月庚寅朔日有食之乙卯東魏大將軍澄朝于鄴以道士多僞濫始罷南郊道壇八月庚寅澄還􅀳陽遣尚書辛術帥諸將略江淮之北几􅀗二十三州矦景自至壽陽徴求無巳朝廷未甞拒絶景請娶於王謝上曰王謝門髙非偶可於朱張以下訪之景恚曰㑹将吳兒女配奴又啓求錦萬匹爲軍人作袍中領軍朱异議以青布給之又以臺所給仗多不能精啓請東冶鍜工欲更營造敕並給之景以安北將軍夏矦䕫之子譒爲長史徐思玉爲司馬譒遂去夏稱矦託爲族子上旣不用景言與東魏和親是後景表䟽稍稍悖慢又聞徐陵等使魏反謀益甚元貞知景有異志累啓還朝景謂曰河北事雖不果江南何慮失之何不小忍貞懼逃歸建康具以事聞上以貞爲始興内史亦不問景臨賀王正德所至貪暴不法屢得罪於上由是憤恨隂養死士儲米積貨幸國家有變景知之正徳在北與徐思玉相知景遣思玉致牋於正徳曰今天子年尊姦臣亂國以景觀之計日禍敗大王屬當儲貳中􅀍廢黜四海業業歸心大王景雖不敏實思自效願王允副蒼生鑒斯誠款正徳大喜曰矦公之意闇與吾同天授我也報之曰朝廷之事如公所言僕之有心爲日乆矣今僕爲其内公爲其外何有不濟機事在速今其時矣鄱陽王範密啓景謀反時上以邊事專委朱异動静皆關之异以爲必無此理上報範曰景孤危􅀉命譬如嬰兒仰人乳哺以此事􅀔安能反乎範重陳之曰不早翦撲禍及生民上曰朝廷自有處分不須汝􅀷憂也範復請自以合肥之衆討之上不許朱异謂範使曰鄱陽王遂不許朝廷有一客自是範啓异不復爲通景邀羊鴉仁同反鴉仁執其使以聞异曰景數百叛虜何能爲敕以使者付建康獄俄解遣之景益無所憚啓上曰􅀂臣事是實應罹國憲如蒙照察請戮鴉仁景又上言髙澄狡猾寧可全信陛下納其詭語求與連和臣亦竊所笑也臣寧堪粉骨投命讎門乞江西一境受臣控督如其不許即帥甲􅀐臨江上向閩越非唯朝廷自恥亦是三公旰食上使朱异宣語荅景使曰譬如貧家畜十客五客尚能得意朕唯有一客致有忿言亦朕之失也益加賞賜錦綵錢布信使相望戊戌景反於壽陽以誅中領軍朱异少府卿徐驎太子右衞率陸驗制局監周石珍爲名异等皆以姦侫驕貪蔽主弄權爲時人所疾故景託以興兵驎驗吳郡人石珍丹楊人驎驗迭爲少府丞以苛刻爲務百賈怨之异尤與之暱丗人謂之三蠧司農卿傅岐梗直士也甞謂异曰卿任參國鈞榮寵如此比日所聞鄙穢狼藉􅀂使聖主發悟欲免得乎异曰外閒謗讟知之乆矣心苟無媿何䘏人言岐謂人曰朱彦和將死矣恃謟以求容肆辯以拒諌聞難而不懼知惡而不攺天奪其鑒其能乆乎景西攻馬頭遣其將宋子仙東攻木柵執戍主曹璆等上聞之笑曰是何能爲吾折箠笞之敇購斬景者封三千户公除州刺史甲辰詔以合州刺史鄱陽王範爲南道都督北徐州刺史封山矦正表爲北道都督司州刺史柳仲禮爲西道都督通直散􅀐常侍裴之髙爲東道都督以侍中開府儀同三司邵陵王綸持節董督衆軍以討景正表宏之子仲禮慶逺之孫之髙邃之兄子也九月東魏濮陽武公婁昭卒矦景聞臺軍討之問策於王偉偉曰邵陵􅀂至彼衆我寡必爲所困不如弃淮南決志東向帥輕􅀐直掩建康臨賀反其内大王攻其外天下不足定也兵貴拙速宜即進路景乃留外弟中軍大都督王顯貴守壽陽癸未詐稱遊獵出壽陽人不之覺冬十月庚寅景揚聲趣合肥而實襲譙州助防董紹先開城降之執刺史豐城矦泰泰範之弟也先爲中書舎人傾財以事時要超授譙州刺史至州徧發民丁使擔腰輿扇繖等物不限士庶恥爲之者重加杖責多輸財者即縱免之由是人皆思亂及矦景至人無戰心故敗庚子詔遣寧逺將軍王質帥衆三千巡江防遏景攻歷陽太守莊鐵丁未鐵以城降因説景曰國家承平歳乆人不習戰聞大王舉兵内外震駭宜乗此際速趨建康可兵不血刃而成大功􅀂使朝廷徐得爲備内外小安遣羸兵千人直據采石大王雖有精甲百萬不得濟矣景乃留儀同三司田英郭駱守歷陽以鐵爲導引兵臨江江上鎭戍相次啓聞上問討景之策於都官尚書羊􅋲􅋲請以二千人急據采石令邵陵王襲取壽陽使景進不得前退失巢穴烏合之衆自然瓦解朱异曰景必無度江之志遂寢其議􅋲曰仐兹敗矣戊申以臨賀王正徳爲平北將軍都督京師諸軍事屯丹陽郡正德遣大船數十艘詐稱載荻密以濟景景將濟慮王質爲梗使諜視之㑹臨川太守陳昕啓稱采石急須重鎭王質水軍輕弱恐不能濟上以昕爲雲旗將軍代質戍采石徴質知丹楊尹事昕慶之子之也質去采石而昕猶未下渚諜告景云質巳退景使折江東樹枝爲驗諜如言而返景大喜曰吾事辦矣己酉自横江濟于采石有馬數百匹兵八千人是夕朝廷始命戒嚴景分兵襲姑孰執淮南太守文成矦寧南津校尉江子一帥舟師千餘人欲於下流邀景其副董桃生家在江北與其徒先潰走子一收餘衆歩還建康子一子四之兄也太子見事急戎服入見上禀受方略上曰此自汝事何更問爲内外軍悉以付汝太子乃停中書省指授軍事物情惶駭莫有應募者朝廷猶不知臨賀王正德之情命正德屯朱雀門寧國公大臨屯新亭大府卿韋黯屯六門繕脩宫城爲受敵之備大臨大器之弟也己酉景至慈湖建康大駭御街人更相劫掠不復通行赦東西冶尚方錢署及建康繫囚以楊州刺史宣城王大器都督城内諸軍事以羊侃爲軍師將軍副之南浦矦推守東府西豐公大春守石頭輕車長史謝禧始興太守元貞守白下韋黯與右衞將軍柳津等分守宫城諸門及朝堂推秀之子大春大臨之弟津仲禮之父也擔諸寺庫公藏錢聚之德陽堂以充軍實庚戍矦景至板橋遣徐思玉來求見上實欲觀城中虚實上召問之思玉詐稱叛景請閒陳事上將屏左右舎人髙善寳曰思玉從賊中來情僞難測安可使獨在殿上朱异侍坐曰徐思玉豈刺客邪思玉出景啓言异等弄權乞帶甲入朝除君側之惡异甚慚悚景又請遣了事舎人出相領解上遣中書舎人賀季主書郭寶亮隨思玉勞景于板橋景北面受敇季曰今者之舉何名景曰欲爲帝也王偉進曰朱异等亂政除姦臣耳景旣出惡言遂留季獨遣寶亮還宫百姓聞景至競入城公私混亂無復次第羊􅋲區分防擬皆以宗室閒之軍人爭入武庫自取器甲所司不能禁􅋲命斬數人方止是時梁興四十七年境内無事公卿在位及閭里士大夫罕見兵甲賊至猝迫公私駭震宿將已盡後進少年並出在外軍旅指撝一決於􅋲􅋲膽力俱壯太子􅀷仗之辛亥景至朱雀桁南太子以臨賀王正德守宣陽門東宫學士新野庾信守朱雀門帥宫中文武三千餘人營桁北太子命信開大桁以挫其鋒正德曰百姓見開桁必大驚駭可且安物情太子從之俄而景至信帥衆開桁始除一舶見景軍皆著鐵面退隱于門信方食甘蔗有飛箭中門柱信手甘蔗應弦而落遂弃軍走南塘遊軍沈子睦臨賀王正德之黨也復閉桁度景太子使王質將精兵三千援信至領軍府遇賊未陳而走正徳帥衆於張矦橋迎景馬上交揖旣入宣陽門望闕而拜歔欷流涕隨景度淮景軍皆著青􅂁正德軍並著絳􅂁碧裏旣與景合悉反其袍景乗勝至闕下城中恟懼羊􅋲詐稱得射書云邵陵王西昌矦援兵巳至近路衆乃少安西豐公大春弃石頭奔京口謝禧元貞弃白下走津主彭文粲等以石頭城降景景遣其儀同三司于子恱守之壬子景列兵繞臺城旛旗皆黑射啓於城中曰朱异等蔑弄朝權輕作威福臣爲所䧟欲加屠戮陛下若誅朱异等臣則斂轡北歸上問太子有是乎對曰然上將誅之太子曰賊以异等爲名耳今日殺之無救於急適足貽笑將來俟賊平誅之未晚上乃止景繞城旣帀百道俱攻鳴鼓吹脣喧聲震地縱火燒大司馬東西華諸門羊􅋲使鑿門上爲竅下水沃火太子自捧銀鞍往賞戰士直閤將軍朱思帥戰士數人踰城出外灑水乆之方滅賊又以長柯斧斫東掖門門將開羊􅋲鑿扇爲孔以槊刺殺二人斫者乃退景據公車府正德據左衞府景黨宋子仙據東宫范桃棒據同泰寺景取東宫妓數百分給軍士東宫近城景衆登其牆射城内至夜景於東宫置酒奏樂太子遣人焚之臺殿及所聚圖書皆盡景又燒乗黄廏士林館太府寺癸丑景作木驢數百攻城城上投石碎之景更作尖項木驢石不能破羊􅋲使作雉尾炬灌以膏蠟叢擲焚之俄盡景又作登城樓髙十餘丈欲臨射城中􅋲曰車髙塹虚彼來必倒可卧而觀之及車動果倒景攻旣不克士卒死傷多乃築長圍以絶内外又啓求誅朱异等城中亦射賞格出外曰有能送景首者授以景位并錢一億萬布絹各萬匹朱异張綰議出兵擊之上問羊侃侃曰不可今出人􅀂少不足破賊徒挫鋭氣􅀂多則一旦失利門隘橋小必大致失亡异等不從使千餘人出戰鋒未及交退走爭橋赴水死者太半侃子鷟爲景所􅀗執至城下以示侃侃曰我傾宗報主猶恨不足豈計一子幸早殺之數日復持來侃謂鷟曰乆以汝爲死矣猶在邪引弓射之景以其忠義亦不之殺莊鐵慮景不克託稱迎母與左右數十人趣歷陽先遣書紿田英郭駱曰矦王巳爲臺軍所殺國家使我歸鎭駱等大懼弃城奔壽陽鐵入城不敢守奉其母奔尋陽十一月戊午朔刑白馬祀蚩尤於太極殿前臨賀王正徳即帝位於儀賢堂下詔稱普通已來姦邪亂政上乆不豫社稷將危河南王景釋位來朝猥用朕躬紹兹寳位可大赦攺元正平立其世子見理爲皇太子以景爲丞相妻以女并出家之寳貨悉助軍費於是景營於闕前分其兵二千人攻東府南浦矦推拒之三日不克景自往攻之矢石雨下宣城王防閤許伯衆潛引景衆登城辛酉克之殺南浦矦推及城中戰士三千人載其尸聚於杜姥宅遥語城中人曰􅀂不早降正當如此景聲言上巳晏駕雖城中亦以爲然壬戌太子請上廵城上幸大司馬門城上聞蹕聲皆鼔譟流涕衆心粗安江子一之敗還也上責之子一拜謝曰臣以身許國常恐不得其死今所部皆弃臣去臣以一夫安能擊賊􅀂賊遂能至此臣誓當碎身以贖前罪不死闕前當死闕後癸亥子一啓太子與弟尚書左丞子四東宫主帥子五帥所領百餘人開承明門出戰子一直抵賊營賊伏兵不動子一呼曰賊輩何不速出乆之賊􅀐出夾攻之子一徑前引槊刺賊從者莫敢繼賊解其肩而死子四子五相謂曰與兄俱岀何面獨旋皆免胄赴賊子四中矟洞胷而死子五傷脰還至塹一慟而絶景􅀄至建康謂朝夕可拔號令嚴整士卒不敢侵􅁀及屢攻不克人心離沮景恐援兵四集一旦潰去又食石頭常平諸倉旣盡軍中乏食乃縱士卒掠奪民米及金帛子女是後米一升直七八萬錢人相食餓死者什五六乙丑景於城東西起土山驅迫士民不限貴賤亂加敺捶疲羸者因殺以填山號哭動地民不敢竄匿並出從之旬日間衆至數萬城中亦築土山以應之太子宣城王巳下皆親負土執畚鍤於山上起芙蓉層樓髙四丈飾以錦􅄢募敢死士二千人厚衣袍鎧謂之僧騰客分配二山晝夜交戰不息㑹大雨城内土山崩賊乗之垂入苦戰不能禁羊􅋲令多擲火爲火城以斷其路徐於内築城賊不能進景募人奴降者悉免爲良得朱异奴以爲儀同三司异家資産悉與之奴乗良馬衣錦􅂁於城下仰詬异曰汝五十年仕宦方得中領軍我始事矦王巳爲儀同矣於是三日之中羣奴出就景者以千數景皆厚撫以配軍人人感恩爲之致死荆州刺史湘東王繹聞景圍臺城丙寅戒嚴移檄所督湘州刺史河東王譽雍州刺史岳陽王詧江州刺史當陽公大心郢州刺史南平王恪等發兵入援大心大器之弟恪偉之子也朱异遺景書爲陳禍福景報書并告城中士民以爲爲梁自近嵗以來權倖用事割剥齊民以供嗜欲如曰不然公等試觀今日國家池苑王公第宅僧尼寺塔及在位庶僚姬姜百室僕從數千不耕不織錦衣玉食不奪百姓從何得之僕所以趨赴闕庭指誅權倿非傾社稷今城中指望四方入援吾觀王矦諸將志在全身誰能竭力致死與吾爭勝負哉長江天險二曹所歎吾一葦航之日明氣淨自非天人允恊何能如是幸各三思自求元吉景又奉啓於東魏主稱臣進取壽春暫欲停憩而蕭衍識此運終自辭寶位臣軍未入其國巳投同泰捨身去月二十九日届此建康江海未蘇干戈暫止永言故郷人馬同戀尋當整轡以奉聖顔臣之母弟乆謂屠滅近奉明敇始承猶在斯乃陛下寛仁大將軍恩念臣之弱劣知何仰報今輒齎啟迎臣母弟妻兒伏願聖慈特賜裁放己巳湘東王繹遣司馬吴曅天門太守樊文皎等將兵發江陵陳昕爲景所擒景與之極飲使昕收集部曲欲用之昕不可景使其儀同三司范桃棒囚之昕因説桃棒使帥所部襲殺王偉宋子仙詣城降桃棒從之潜遣昕夜縋入城上大喜敇鐫銀劵賜桃棒曰事定之日封汝河南王即有景衆并給金帛女樂太子恐其詐猶豫不決上怒曰受降常理何忽致疑太子召公卿㑹議朱异􅀓岐曰桃棒降必非謬桃棒旣降賊景必驚乗此擊之可大破也太子曰吾堅城自守以俟外援援兵旣至賊豈足平此萬全策也今開門納桃棒桃棒之情何易可知萬一爲變悔無所及社稷事重須更詳之异曰殿下􅀂以社稷之急宜納桃棒如其猶䂊非异所知太子終不能決桃棒又使昕啓曰今止將所領五百人􅀂至城門皆自脱甲乞朝廷開門賜容事濟之後保擒矦景太子見其懇切愈疑之朱异拊膺曰失此社稷事去矣俄而桃棒爲部下所告景拉殺之陳昕不知如期而出景邀得之逼使射書城中曰桃棒且輕將數十人先入景欲􅂨甲隨之昕不肯期以必死乃殺之景使蕭見理與儀同三司盧暉略戍東府見理凶險夜與羣盗剽劫於大桁中流矢而死邵陵王綸行至鍾離聞矦景巳度采石綸晝夜兼道旋軍入援濟江中流風起人馬溺者什一二遂帥寧逺將軍西豐公大春新淦公大成永安矦確南安矦駿前譙州刺史趙伯超武州刺史蕭弄璋等歩􅀐三萬自京口西上大成大春之第確綸之子駿懿之孫也景遣軍至江乗拒綸軍趙伯超曰􅀂從黄城大路必與賊遇不如徑指鍾山突㨿廣莫門出賊不意城圍必解矣綸從之夜行失道迂二十餘里庚辰旦營于蔣山景見之大駭悉送所掠婦女珍貨於石頭具舟欲走分兵三道攻綸綸與戰破之時山巔寒雪乃引軍下愛敬寺景陳兵於覆舟山北乙酉綸進軍玄武湖側與景對陳不戰至暮景更約明日㑹戰綸許之安南矦駿見景軍退以爲走即與壯士逐之景旋軍擊之駿敗走趣綸軍趙伯超望見亦引兵走景乗勝追撃之諸軍皆潰綸收餘兵近千人入天保寺景追之縱火燒寺綸奔朱方士卒踐冰雪往往墮足景悉收綸輜重生擒西豐公大春安前司馬莊丘慧主帥霍俊等而還丙戍景陳所獲綸軍首虜鎧仗及大春等於城下使言曰邵陵王巳爲亂兵所殺霍俊獨曰王小失利巳全軍還京口城中但堅守援軍尋至賊以刀敺其背俊辭色彌厲景義而釋之臨賀王正德殺之是日晚鄱陽王範遣其丗子嗣與西豫州刺史裴之髙建安太守趙鳳舉各將兵入援軍于蔡洲以待上流諸軍範以之髙督江右援軍事景悉驅南岸居民於水北焚其廬舍大街巳西掃地俱盡北徐州刺史封山矦正表鎭鍾離上召之入援正表託以船糧未集不進景以正表爲南兖州刺史封南郡王正表乃於歐陽立柵以斷援軍帥衆一萬聲言入援實欲襲廣陵密書誘廣陵令劉詢使燒城爲應詢以告南兖州刺史南康王㑹理十二月㑹理使詢帥步􅀐千人夜襲正表大破之正表走還鍾離詢收其兵糧歸就㑹理與之入援癸巳侍中都官尚書羊􅋲卒城中益懼矦景大造攻具陳於闕前大車髙數丈一車二十輪丁酉復進攻城以蝦蟇車運土填塹湘東王繹遣丗子方等將歩􅀐一萬入援建康庚子發公安繹又遣竟陵太守王僧辯將舟師萬人出自漢川載糧東下方等有俊才善􅀐射毎戰親犯矢石以死節自任壬寅矦景以火車焚臺城東南樓材官吳景有巧思於城内構地爲樓火纔㓕新樓即立賊以爲神景因火起潜遣人於其下穿城城將崩乃覺之吳景於城内更築迃城狀如却月以擬之兼擲火焚其攻具賊乃退走太子遣洗馬元孟恭將千人自大司馬門出盪孟恭與左右奔降於景己酉景土山稍逼城樓栁津命作地道以取其土外山崩壓賊且盡又於城内作飛橋懸罩二土山上景衆見飛橋逈出崩騰而走城内擲雉尾炬焚其東山樓柵蕩盡賊積死於城下乃弃土山不復修自焚其攻具材官將軍宋嶷降於景教之引玄武湖水以灌臺城闕前皆爲洪流上徴衡州刺史韋粲爲散􅀐常侍以都督長沙歐陽頠監州事粲放之子也還至廬陵聞矦景亂粲簡閲部下得精兵五千倍道赴援至豫章聞景巳出横江粲就内史劉孝儀謀之孝儀曰必如此當有敇豈可輕信人言妄相驚動或恐不然時孝儀置酒粲怒以杯抵地曰賊巳度江便逼宫闕水陸俱斷何暇有報假令無敇豈得自安韋粲今日何情飲酒即馳馬出部分將發㑹江州刺史當陽公大心遣使邀粲粲乃馳往見大心曰上游藩鎭江州去京最近殿下情計誠宜在前但中流任重當須應接不可闕鎭今宜且張聲􅀔移鎮湓城遣偏將賜隨於事便足大心然之遣中兵柳昕帥兵二千人隨粲粲至南洲外弟司州刺史栁仲禮亦帥步􅀐萬餘人至横江粲即送糧仗贍給之并散私金帛以賞其戰士西豫州刺史裴之髙自張公洲遣船度仲禮丙辰夜粲仲禮及宣猛將軍李孝欽前司州刺史羊鴉仁南陵太守陳文徹合軍屯新林王遊苑粲議推仲禮爲大都督報下流衆軍裴之髙自以年位恥居其下議累日不決粲抗言於衆曰今者同赴國難義在除賊所以推柳司州者正以乆捍邊疆先爲侯景所憚且士馬精銳無出其前若論位次柳在粲下語其年齒亦少於粲直以社稷之計不得復論今日形􅀔貴在將和􅀂人心不同大事去矣裴公朝之舊德豈應復挾私情以沮大計粲請爲諸軍解之乃單舸至之髙營切讓之曰今二宫危逼猾㓂滔天臣子當勠力同心豈可自相矛楯豫州必欲立異鋒鏑便有所歸之髙垂泣致謝遂推仲禮爲大都督宣城内史楊白華遣其子雄將郡兵繼至援軍大集衆十餘萬縁淮樹柵景亦於北岸樹柵以應之裴之髙與弟之横以舟師一萬屯張公洲景囚之髙弟姪子孫臨水陳兵連鏁列於陳前以鼎鑊刀鋸隨其後謂曰裴公不降今即烹之之髙召善射者使射其子再發皆不中景帥步騎萬人於後渚挑戰仲禮欲出擊之韋粲曰日晚我勞未可戰也仲禮乃堅壁不出景亦引退湘東王繹將鋭卒三萬發江陵留其子綏寧矦方諸居守諮議參軍劉之迡等三上牋請留荅教不許鄱陽王範遣其將梅伯龍攻王顯貴於壽陽克其羅城攻中城不克而退範益其衆使復攻之東魏大將軍澄患民錢濫惡議不禁民私鑄但懸稱市門錢不重五銖毋得入市朝議以爲年榖不登請俟它年乃止魏太師泰殺安定國臣王茂而非其罪尚書左丞柳慶諫泰怒曰郷黨罪人亦當坐執慶於前慶辭色不撓曰慶聞君蔽於事爲不明臣知而不爭爲不忠慶旣竭忠不敢愛死但懼公爲不明耳泰寤亟使赦茂不及乃賜茂家錢帛曰以旌吾過丙辰晦柳仲禮夜入韋粲營部分衆軍旦日㑹戰諸將各有據守令粲頓青塘粲以青塘當石頭中路賊必爭之頗憚之仲禮曰青塘要地非兄不可􅀂疑兵少當更遣軍相助乃使直閤將軍劉叔胤助之資治通鑑卷第一百六十一
