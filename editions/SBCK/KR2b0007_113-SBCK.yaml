front:
  text: 資治通鑑卷第一百一十三
  hash: sha256:fd98399f62be20b7359d119ffc25b27f6d136da8ca5004fbb14a3dc81643d430
body:
  text: 臣司馬光奉勑編集晉紀三十五逢執徐凡二年起昭陽單閼盡閼安皇帝戊元興二年春正月盧循使司馬徐道覆寇東陽二月辛丑建武將軍劉􅁉擊破之道覆循之姊夫也乙卯以太尉玄爲大將軍丁巳玄殺冀州刺史孫無終玄上表請帥諸軍掃平􅀜洛既而諷朝廷下詔不許乃云奉詔故止玄􅀄欲飭裝先命作輕舸載服玩書畫或問其故玄曰兵凶戰危脱有意外當使輕而易運衆皆􅀏之夏四月癸巳朔日有食之南燕主僃徳故吏趙融自長安來始得母兄凶問僃徳號慟吐血因而寢疾司􅀠校尉慕容逹謀反遣牙門皇璆帥衆攻端門殿中帥矦赤眉開門應之中黄門孫進扶僃徳踰城匿於進舎叚宏等聞宫中有變勒兵屯四門僃徳入宫誅赤眉等逹出犇魏僃徳優遷徙之民使之長復不役民縁此迭相䕃冒或百室合户或千丁共籍以避課役尚書韓􅒲請加隱覈僃徳從之使􅒲廵行郡縣得䕃户五萬八千泰山賊正始聚衆數萬自稱太平皇帝署置公卿南燕桂林王鎭討禽之臨刑或問其父及兄弟安在始曰太上皇䝉塵于外征東征西爲亂兵所害其妻怒之曰君正坐此口奈何尚爾始曰皇后不知自古豈有不亡之國朕則崩矣終不攺號五月燕王熙作龍騰苑方十餘里􅃥徒二萬人築景雲山於苑內基廣五百步峯髙十七丈秋七月戊子魏王珪北巡作離宫於豺山平原太守和跋奢豪喜名珪惡而殺之使其弟毗等就與訣跋曰灅北土瘠可遷水南勉爲生計且使之背己曰汝何忍視吾之死也毗等諭其意詐稱使者逃入秦珪怒滅其家中壘將軍鄧淵從弟尚書暉與跋善或譛諸珪曰毗之出亡暉實送之珪疑淵知其謀賜淵死􅀯凉王傉檀及沮渠䝉遜互出兵攻吕隆隆患之秦之謀臣言於秦王興曰隆藉先丗之資專制河外今雖飢窘尚能自支若將來豐贍終不爲吾有涼州險絶土田饒沃不如因其危而取之興乃遣使徴吕超入侍隆念姑臧終無以自存乃因超謀迎于秦興遣尚書左僕射齊難鎮西將軍姚詰左賢王乞伏乾歸鎮逺將軍趙曜帥步􅀐四萬迎隆于河西凉王傉檀攝昌松魏安二戍以避之八月齊難等至姑臧隆素車白馬迎于道旁隆勸難擊沮渠䝉遜䝉遜使臧莫孩拒之敗其前軍難乃與䝉遜結盟䝉遜遣弟挐入貢于秦難以司馬王尚行涼州刺史配兵三千鎮姑臧以將軍閻松爲倉松太守郭將爲番禾太守分戍二城徙隆宗族僚屬及民萬户于長安興以隆爲散􅀐常侍超爲安定太守自餘文武隨才擢叙􅀄郭黁常言代吕者王故其起兵先推王詳後推王乞基及隆東遷王尚卒代之黁從乞伏乾歸降秦以爲滅秦者晉也遂來犇秦人追得殺之沮渠䝉遜伯父中田護軍親信臨松太守孔篤皆驕恣爲民患䝉遜曰亂吾法者二伯父也皆逼之使自殺秦遣使者梁構至張掖䝉遜問曰秃髪傉檀爲公而身爲矦何也構曰傉檀凶狡款誠未著故朝廷以重爵虚名羈縻之將軍忠貫白日當入賛帝室豈可以不信相待也聖朝爵必稱功如尹緯姚晃佐命之臣齊難徐洛一時猛將爵皆不過矦伯將軍何以先之乎昔竇融殷勤固讓不欲居舊臣之右不意將軍忽有此問蒙遜曰朝廷何不即封張掖而更逺封西海邪構曰張掖將軍己自有之所以逺授西海者欲廣大將軍之國耳䝉遜恱乃受命荆州刺史􅁊偉卒大將軍玄以􅁊修代之從事中郎曹靖之説玄曰謙修兄弟專據内外權勢大重玄乃以南郡相􅁊石康爲荆州刺史石康豁之子也劉􅁉破盧循於永嘉追至晉安屢破之循浮海南走何無忌潜詣􅁉勸􅁉於山隂起兵討􅁊玄􅁉謀於土豪孔靖靖曰山隂去都道逺舉事難成且玄未簒位不如待其巳簒於京口圖之􅁉從之靖愉之孫也九月魏主珪如南平城規度灅南將建新都侍中殷仲文散􅀐常侍卞範之勸大將軍玄早受禪隂撰九錫文及冊命以􅁊謙爲侍中開府録尚書事王謐爲中書監領司徒􅁊㣧爲中書令加􅁊修撫軍大將軍㣧沖之孫也丙子冊命玄爲相國揔百揆封十郡爲楚王加九錫楚國置丞相以下官􅁊謙私問彭城内史劉􅁉曰楚王勲徳隆重朝廷之情咸謂宜有揖讓卿以爲何如􅁉曰楚王宣武之子勲徳蓋丗晉室微弱民望乆移乘運禪代有何不可謙喜曰卿謂之可即可耳新野人􅁃庂殷仲堪之黨也聞􅁊偉死石康未至乃起兵襲雍州刺史馮該於襄陽走之庂有衆七千設壇祭七廟云欲討􅁊玄江陵震動石康至州發兵攻襄陽庂敗犇秦髙雅之表南燕主僃徳請伐􅁊玄曰縦未能廓清呉㑹亦可収江北之地中書侍郎韓範亦上䟽曰今晉室衰亂江淮南北户口無㡬戎馬單弱重以􅁊玄悖逆上下離心以陛下神武發步􅀐一萬臨之彼必土崩瓦解兵不留行矣得而有之秦魏不足敵也拓地定功正在今日失時不取彼之豪傑誅滅􅁊玄更修德政豈惟建康不可得江北亦無望矣僃德曰朕以舊􅀖覆􅃿欲先定中原乃平蕩荆揚故未南征耳其令公卿議之因講武城西步卒三十七萬人􅀐五萬三千匹車萬七千乗公卿皆以爲玄新得志未可圖乃止冬十月楚王玄上表請歸藩使帝作手詔固留之又詐言錢塘臨平湖開江州甘露降使百僚集賀用爲已受命之符又以前丗皆有隱士恥於己時獨無求得西朝隱士安定皇甫謐六丗孫希之給其資用使隱居山林徴爲著作郎使希之固辭不就然後下詔旌禮號曰髙士時人謂之充隱又欲廢錢用榖帛及復肉刑制作紛紜志無一定變更回復卒無所施行性復貪鄙人士有法書好畫及佳園宅必假蒲博而取之尤愛珠玉未甞離手乙卯魏主珪立其子嗣爲齊王加位相國紹爲清河王加征南大將軍熙爲陽平王曜爲河南王丁巳魏將軍伊謂帥􅀐二萬襲髙車餘種􅀽紇烏頻十一月庚午大破之詔楚王玄行天子禮樂妃爲王后丗子爲太子丁丑卞範之爲禪詔使臨川王寳逼帝書之寳晞之曽孫也庚辰帝臨軒遣兼太保領司徒王謐奉璽綬禪位于楚壬午帝出居永安宫癸未遷太廟神主于琅邪國穆章何皇后及琅邪王徳文皆徙居司徒府百官詣姑孰勸進十二月庚寅朔玄築壇於九井山北壬辰即皇帝位冊文多非薄晉室或諌之玄曰揖讓之文正可陳之於下民耳豈可欺上帝乎大赦攺元永始以南康之平固縣封帝爲平固王降何后爲零陵縣君琅邪王徳文爲石陽縣公武陵王遵爲彭澤縣矦追尊父温爲宣武皇帝廟號太祖南康公主爲宣皇后封子昇爲豫章王以㑹稽內史王愉爲尚書僕射愉子相國左長史綏爲中書令綏􅁊氏之甥也戊戌玄入建康宫登御坐而床忽䧟羣下失色殷仲文曰將由聖徳􅀷厚地不能載玄大恱梁王珍之國臣孔樸奉珍之犇壽陽珍之晞之曽孫也戊申燕王熙尊燕主垂之貴嬪叚氏爲皇太后叚氏熙之慈母也己酉立苻貴嬪爲皇后大赦辛亥􅁊玄遷帝於尋陽燕以衛尉恱真爲青州刺史鎮新城光禄大夫衛駒爲并州刺史鎮凡城癸丑納􅁊温神主于太廟􅁊玄臨聽訟􅀚閲囚徒罪無輕重多得原放有干輿乞者時或䘏之其好行小恵如此是歳魏主珪始命有司制冠服以品秩爲差然法度草創多不稽古三年春正月􅁊玄立其妻劉氏爲皇后劉氏喬之曽孫也玄以其祖彞以上名位不顯不復追尊立廟散􅀐常侍徐廣曰敬其父則子恱請依故事立七廟玄曰禮太祖東向左昭右穆晉立七廟宣帝不得正東向之位何足法也祕書監卞承之謂廣曰若宗廟之祭果不及祖有以知楚徳之不長矣廣邈之弟也玄自即位心常不自安二月己丑朔夜濤水入石頭流殺人甚多讙譁震天玄聞之懼曰奴輩作矣玄性苛細好自矜伐主者奏事或一字不體或片辭之謬必加糾擿以示聰明尚書荅詔誤書春蒐爲春莵自左丞王納之以下凡所􅀜署皆􅀍降黜或手注直官或自用令史詔令紛紜有司奉荅不暇而紀綱不治奏案停積不能知也又性好遊畋或一日數出遷居東宫更繕宫室土木並興督迫􅃊促朝野騷然思亂者衆玄遣使加益州刺史毛璩散􅀐常侍左將軍璩執留玄使不受其命璩寳之孫也玄以􅁊希爲梁州刺史分命諸將戍三巴以僃之璩傳檄逺近列玄罪狀遺巴東太守柳約之建平太守羅述征虜司馬甄季之擊破希等仍帥衆進屯白帝劉􅁉從徐兖二州刺史安成王􅁊脩入朝玄謂王謐曰􅁉風骨不常葢人傑也每遊集必引接殷勤贈賜甚厚玄后劉氏有智鍳謂玄曰劉􅁉龍行虎步視瞻不凡恐終不爲人下不如早除之玄曰我方平蕩中原非􅁉莫可用者俟􅀜河平定然後别議之耳玄以􅁊弘爲青州刺史鎭廣陵刀逵爲豫州刺史鎮歴陽弘脩之弟逵彞之子也劉􅁉與何無忌同舟還京口密謀興復晉室劉邁弟毅家於京口亦與無忌謀討玄無忌曰􅁊氏彊盛其可圖乎毅曰天下自有彊弱苟爲失道雖彊易弱正患事主難得耳無忌曰天下草澤之中非無英雄也毅曰所見唯有劉下邳無忌􅀏而不荅還以告􅁉遂與毅定謀􅀄太原王元徳及弟仲徳爲苻氏起兵攻燕主垂不克來犇朝廷以元徳爲弘農太守仲徳見􅁊玄稱帝謂人曰自古革命誠非一族然今之起者恐不足以成大事平昌孟昶爲青州主簿􅁊弘使昶至建康玄見而恱之謂劉邁曰素士中得一尚書郎卿與其州里寧相識否邁素與昶不善對曰臣在京口不聞昶有異能唯聞父子紛紛更相贈詩耳玄笑而止昶聞而恨之既還京口􅁉謂昶曰草間當有英雄起卿頗聞乎昶曰今日英雄有誰正當是卿耳於是􅁉毅無忌元徳仲徳昶及􅁉弟道規任城魏詠之髙平檀憑之琅邪諸葛長民河內太守隴西辛扈興振威將軍東莞童厚之相與合謀起兵道規爲􅁊弘中兵參軍􅁉使毅就道規及昶於江北共殺弘據廣陵長民爲刁逵參軍使長民殺逵據歴陽元徳扈興厚之在建康使之聚衆攻玄爲内應刻期齊發孟昶妻周氏冨於財昶謂之曰劉邁毁我於􅁊公使我一生淪陷我決當作賊卿幸早離絶脱得富貴相迎不晚也周氏曰君父母在堂欲建非常之謀豈婦人所能諌事之不成當於奚官中奉養大家義無歸志也昶愴然乆之而起周氏追昶坐曰觀君舉措非謀及婦人者不過欲得財物耳因指懐中兒示之曰此児可賣亦當不惜遂傾貲以給之昶弟顗妻周氏之從妹也周氏紿之曰昨夜夢殊不祥門内絳色物冝悉取以爲厭勝妹信而與之遂盡縫以爲軍士􅂁何無忌夜於屏風裏草檄文其母劉牢之姊也登橙密窺之泣曰吾不及東海吕母明矣汝能如此吾復何恨問所與同謀者曰劉􅁉母尤喜因爲言玄必敗舉事必成之理以勸之乙卯􅁉託以遊獵與無忌収合徒衆得百餘人丙辰詰旦京口城開無忌著傳詔服稱敕使居前徒衆隨之齊入即斬􅁊脩以徇脩司馬刁弘帥文武佐吏來赴􅁉登城謂之曰郭江州巳奉乗輿返正於尋陽我等並􅀍密詔誅除逆黨今日賊玄之首巳當梟於大航矣諸君非大晉之臣乎今來欲何爲弘等信之収衆而退􅁉問無忌曰今急須一府主簿何由得之無忌曰無過劉道民道民者東莞劉穆之也􅁉曰吾亦識之即馳信召焉時穆之聞京口讙噪聲晨起出陌頭屬與信㑹穆之直視不言者乆之既而返室壊布裳爲袴往見􅁉􅁉曰始舉大義方造艱難須一軍吏甚急卿謂誰堪其選穆之曰貴府始建軍吏實須其才倉猝之際略當無見踰者􅁉笑曰卿能自屈吾事濟矣即於坐署主簿孟昶勸􅁊弘其日出獵天未明開門出獵人昶與劉毅劉道規帥壯士數十人直入弘方噉粥即斬之因収衆濟江􅁉使毅誅刁弘先是􅁉遣同謀周安穆入建康報劉邁邁雖酬許意甚惶懼安穆慮事泄乃馳歸玄以邁爲竟陵太守邁欲亟之郡是夜玄與邁書曰北府人情云何卿近見劉􅁉何所道邁謂玄巳知其謀晨起白之玄大驚封邁爲重安矦既而嫌邁不執安穆使得逃去乃殺之悉誅元徳扈興厚之等衆推劉􅁉爲盟主揔督徐州事以孟昶爲長史守京口檀憑之爲司馬彭城人應募者􅁉悉使郡主簿劉鍾統之丁巳􅁉帥二州之衆千七百人軍于竹里移檄逺近聲言益州刺史毛璩巳定荆楚江州刺史郭昶之奉迎主上返正於尋陽鎮北參軍王元徳等並帥部曲保據石頭揚武將軍諸葛長民巳據歴陽玄移還上宫召侍官皆入止省中加楊州刺史新安王􅁊謙征討都督以殷仲文代􅁊脩爲徐兖二州刺史謙等請亟遣兵擊􅁉玄曰彼兵鋭甚計出萬死若有蹉跌則彼氣成而吾事去矣不如屯大衆於覆舟山以待之彼空行二百里無所得鋭氣巳挫忽見大軍必驚愕我案兵堅陣勿與交鋒彼求戰不得自然散走此策之上也謙等固請擊之乃遣頓丘太守呉甫之右衛將軍皇甫敷相繼北上玄憂懼特甚或曰􅁉等烏合微弱勢必無成陛下何慮之深玄曰劉􅁉足爲一世之雄劉毅家無擔石之儲摴蒲一擲百萬何無忌酷似其舅共舉大事何謂無成􅀯涼王傉檀畏秦之彊乃去年號罷尚書丞郎官遣參軍􅀜尚使于秦秦王興曰車騎獻􅅃稱藩而擅興兵造大城豈爲臣之道乎尚曰王公設險以守其國先王之制也車􅀐僻在遐藩宻邇勍寇蓋爲國家重門之防不圖陛下忽以爲嫌興善之傉檀求領涼州興不許􅀄袁真殺朱憲憲弟綽逃犇􅁊温温克壽陽綽輒發真棺戮其尸温怒將殺之􅁊沖請而免之綽事沖如父沖薨綽嘔血而卒劉􅁉克京口以綽子齡石爲建武參軍三月戊午朔􅁉軍與呉甫之遇於江乗將戰齡石言於􅁉曰齡石丗受􅁊氏厚恩不欲以兵刃相向乞在軍後􅁉義而許之甫之玄驍將也其兵甚鋭􅁉手執長刀大呼以衝之衆皆披靡即斬甫之進至羅落橋皇甫敷帥數千人逆戰寧逺將軍檀慿之敗死􅁉進戰彌厲敷圍之數重􅁉􅀝大樹挺戰敷曰汝欲作何死拔㦸將刺之􅁉瞋目叱之敷辟易􅁉黨俄至射敷中額而踣􅁉援刀直進敷曰君有天命以子孫爲託􅁉斬之厚撫其孤􅁉以檀慿之所領兵配參軍檀祗祗憑之之從子也玄聞二將死大懼召諸道術人推筭及爲猒勝問羣臣曰朕其敗乎吏部郎曹靖之對曰民怨神怒臣實懼焉玄曰民或可怨神何爲怒對曰晉氏宗廟飄泊江濵大楚之祭上不及祖此其所以怒也玄曰卿何不諌對曰輦上君子皆以爲堯舜之丗臣何敢言玄黙然使􅁊謙及遊擊將軍何澹之屯東陵侍中後將軍卞範之屯覆舟山西衆合二萬己未􅁉軍食畢悉棄其餘糧進至覆舟山東使羸弱登山張旗幟爲疑兵數道並前布滿山谷玄偵􅇋者還云􅁉軍四塞不知多少玄益憂恐遣武衛將軍􅁃賾之帥精卒副援諸軍謙等士卒多北府人素畏伏􅁉莫有闘志􅁉與劉毅等分爲數隊進突謙陳􅁉以身先之將士皆殊死戰無不一當百呼聲動天地時東北風急因縦火焚之煙炎熛天皷噪之音震動京邑謙等諸軍大潰玄時雖遣軍拒􅁉而走意巳決潜使領軍將軍殷仲文具舟於石頭聞謙等敗帥親信數千人聲言赴戰遂將其子昇兄子濬出􅀯掖門遇前相國參軍胡藩執馬鞚諌曰今羽林射手猶有八百皆是義故西人受累丗之恩不驅令一戰一旦捨此欲安之乎玄不對但舉策指天因鞭馬而走西趨石頭與仲文等浮江􅀯走經日不食左右進粗飯玄咽不能下昇抱其胷而撫之玄悲不自勝􅁉入建康王仲徳抱元徳子方回出􅇋􅁉􅁉於馬上抱方回與仲徳對哭追贈元徳給事中以仲徳爲中兵參軍􅁉止􅁊謙故營遣劉鍾據東府庚申􅁉屯石頭城立留臺百官焚􅁊温神主於宣陽門外造晉新主納于太廟遣諸將追玄尚書王嘏帥百官奉迎乗輿誅玄宗族在建康者􅁉使臧熹入宫収圖書器物封閉府庫有金飾樂器􅁉問熹卿得無欲此乎熹正色曰皇上幽逼播越非所將軍首建大義劬勞王家雖復不肖實無情於樂􅁉笑曰聊以戲卿耳熹燾之弟也壬戌玄司徒王謐與衆議推􅁉領楊州􅁉固辭乃以謐爲侍中領司徒楊州刺史録尚書事謐推􅁉爲使持節都督楊徐兖豫青冀幽并八州諸軍事徐州刺史劉毅爲青州刺史何無忌爲琅邪内史孟昶爲丹楊尹劉道規爲義昌太守􅁉始至建康諸大處分皆委於劉穆之倉猝立定無不允愜􅁉遂託以腹心動止諮焉穆之亦竭節盡誠無所遺隱時晉政寛㢮綱紀不立豪族陵縦小民窮蹙重以司馬元顯政令違舛􅁊玄雖欲釐整而科條繁密衆莫之從穆之斟酌時冝隨方矯正􅁉以身範物先以威禁內外百官皆肅然奉職不盈旬日風俗頓攺􅀄諸葛長民至豫州失期不得發刁逵執長民檻車送􅁊玄至當利而玄敗送人共破檻出長民還趣歷陽逵棄城走爲其下所執斬於石頭子姪無少長皆死唯赦其季弟給事中騁逵故吏匿其弟子雍送洛陽秦王興以爲太子中庶子􅁉以魏詠之爲豫州刺史鎮歷陽諸葛長民爲宣城內史􅀄􅁉名微位薄輕狡無行盛流皆不與相知惟王謐獨竒貴之謂􅁉曰卿當爲一代英雄􅁉甞與刁逵摴蒲不時輸直逵縛之馬抑謐見之責逵而釋之代之還直由是􅁉深憾逵而徳謐蕭方等曰夫蛟龍潜伏魚蝦褻之是以漢髙赦雍齒魏武免梁鵠安可以布衣之嫌而成萬乗之隙也今王謐爲公刁逵亡族醻恩報怨何其狹哉尚書左僕射王愉及子荆州刺史綏謀襲􅁉事泄族誅綏弟子慧龍爲僧彬所匿得免魏以中􅁟蕭條詔縣户不滿百者罷之丁卯劉􅁉還鎮東府􅁊玄至尋陽郭昶之給其器用兵力辛未玄逼帝西上劉毅帥何無忌劉道規等諸軍追之玄留龍驤將軍何澹之前將軍郭銓與郭昶之守湓口玄於道自作起居注叙討劉􅁉事自謂經略舉無遺策諸軍違節度以致犇敗專覃思著述不暇與羣下議時事起居注既成宣示逺近丙戌劉􅁉稱受帝密詔以武陵王遵承制揔百官行事加侍中大將軍因大赦惟􅁊玄一族不宥劉敬宣髙雅之結青州大姓及鮮卑豪帥謀殺南燕主僃德推司馬休之爲主僃徳以劉􅁤爲司空甚寵信之雅之欲邀􅁤同謀敬宣曰劉公衰老有安齊之志不可告也雅之卒告之􅁤不從謀頗泄敬宣等南走南燕人収􅁤殺之追及雅之又殺之敬宣休之至淮泗間聞􅁊玄敗遂來歸劉􅁉以敬宣爲晉陵太守南燕主僃徳聞􅁊玄敗命北地王鍾等將兵欲取江南㑹僃德有疾而止夏四月己丑武陵王遵入居東宫內外畢敬遷除百官稱制書教稱令書以司馬休之監荆益梁寧秦雍六州諸軍事領荆州刺史庚寅􅁊玄挾帝至江陵􅁊石康納之玄更署置百官以卞範之爲尚書僕射自以犇敗之後恐威令不行乃更増峻刑罰衆益離怨殷仲文諌玄怒曰今以諸將失律天文不利故還都舊楚而羣小紛紛妄興異議方當糾之以猛未可施之以寛也荆江諸郡聞玄播越有上表犇問起居者玄皆不受更令所在賀遷新都􅀄王謐爲玄佐命元臣玄之受禪謐手解帝璽綬及玄敗衆謂謐冝誅劉􅁉特保全之劉毅甞因朝㑹問謐璽綬所在謐內不自安逃犇曲阿􅁉牋白武陵王迎還復位􅁊玄兄子歆引氐帥楊秋寇歷陽魏詠之帥諸葛長民劉敬宣劉鍾共擊破之斬楊秋於練固玄使武衛將軍􅁃稚祖江夏太守􅁊道恭帥數千人就何澹之等共守湓口何無忌劉道規至桑落洲庚戌澹之等引舟師逆戰澹之常所乘舫羽儀旗幟甚盛無忌曰賊帥必不居此欲詐我耳宜亟攻之衆曰澹之不在其中得之無益無忌曰今衆寡不敵戰無全勝澹之既不居此舫戰士必弱我以勁兵攻之必得之得之則彼勢沮而我氣倍因而薄之破賊必矣道規曰善遂往攻而得之因傳呼曰巳得何澹之矣澹之軍中驚擾無忌之衆亦以爲然乗勝進攻澹之等大破之無忌等克湓口進據尋陽遣使奉送宗廟主祏還京師加劉􅁉都督江州諸軍事桑落之戰胡藩所乗艦爲官軍所燒藩全鎧入水潜行三十許步乃得登岸時江陵路巳絶乃還豫章劉􅁉素聞藩爲人忠直引參領軍軍事􅁊玄収集荆州兵曽未三旬有衆二萬樓船器械甚盛甲寅玄復帥諸軍挾帝東下以苻宏領梁州刺史為前鋒又使散騎常侍徐放先行説劉裕等曰若能旋軍散甲當與之更始各授位任令不失分劉􅁉以諸葛長民都督淮北諸軍事鎮山陽以劉敬宣爲江州刺史柔然可汗社崘從弟恱代大郍謀殺社崘不克犇魏燕王熙於龍騰苑起逍遥宫連房數百鑿曲光海盛夏士卒不得休息暍死者大半西凉丗子譚卒劉毅何無忌劉道規下邳太守平昌孟懐玉帥衆自尋陽西上五月癸酉與􅁊玄遇於峥嶸洲毅等兵不滿萬人而玄戰士數萬衆憚之欲退還尋陽道規曰不可彼衆我寡彊弱異勢今若畏懦不進必爲所乗雖至尋陽豈能自固玄雖竊名雄豪内實恇怯加之巳經犇敗衆無固心決機兩陣將雄者克不在衆也因麾衆先進毅等從之玄常漾舸於舫側以僃敗走由是衆莫有􅃲心毅等乗風縦火盡鋭爭先玄衆大潰燒輜重夜遁郭銓詣毅降玄故將劉統馮稚等聚黨四百人襲破尋陽城毅遣建威將軍劉懐肅討平之懐肅懐敬之弟也玄挾帝單舸西走留永安何皇后及王皇后於巴陵殷仲文時在玄艦求出别船収集散卒因叛玄奉二后犇夏口遂還建康己卯玄與帝入江陵馮該勸使更下戰玄不從欲犇漢中就􅁊希而人情乖沮號令不行庚辰夜中處分欲發城内巳亂乃與親近腹心百餘人乗馬出城西走至城門左右於闇中斫玄不中其徒更相殺害前後交横玄僅得至船左右分散惟卞範之在側辛巳荆州别駕王康産奉帝入􅀯郡府舍太守王騰之帥文武爲侍衛玄將之漢中屯􅀐校尉毛脩之璩之弟子也誘玄入蜀玄從之寧州刺史毛璠璩之弟也卒於官璩使其兄孫祐之及參軍費恬帥數百人送璠䘮歸江陵壬午遇玄於枚回洲祐之恬迎擊玄矢下如雨玄嬖人丁仙期萬蓋等以身蔽玄皆死益州督護漢嘉馮遷抽刀前欲擊玄玄拔頭上玉導與之曰汝何人敢殺天子遷曰我殺天子之賊耳遂斬之又斬􅁊石康􅁊濬􅁃賾之執􅁊昇送江陵斬於市乗輿返正於江陵以毛脩之爲驍􅀐將軍甲申大赦諸以畏逼從逆者一無所問戊寅奉神主于太廟劉毅等傳送玄首梟于大桁毅等既戰勝以爲大事巳定不急追躡又遇風船未能進玄死幾一旬諸軍猶未至時􅁊謙匿於沮中揚武將軍􅁊振匿於華容浦玄故將王稚徽戍巴陵遣人報振云􅁊歆巳克京邑馮稚復克尋陽劉毅諸軍並中路敗退振大喜聚黨得二百人襲江陵􅁊謙亦聚衆應之閏月己丑復陷江陵殺王康産王騰之振見帝於行宫躍馬奮戈直至階下問􅁊昇所在聞其巳死瞋目謂帝曰臣門户何負國家而屠滅若是琅邪王徳文下牀謂曰此豈我兄弟意邪振欲殺帝謙苦禁之乃下馬歛容致拜而出壬辰振爲玄舉哀立喪庭謚曰武悼皇帝癸巳謙等帥羣臣奉璽綬於帝曰主上法堯禪舜今楚祚不終百姓之心復歸於晉矣以琅邪王徳文領徐州刺史振爲都督八州諸軍事荆州刺史謙復爲侍中衛將軍加江豫二州刺史帝侍御左右皆振之腹心振少薄行玄不以子妷齒之至是歎曰公昔不早用我遂致此敗若使公在我爲前鋒天下不足定也今獨作此安歸乎遂縱意酒色肆行誅殺謙勸振引兵下戰己守江陵振素輕謙不從其言劉毅至巴陵誅王稚徽何無忌劉道規進攻􅁊謙於馬頭􅁊蔚於龍泉皆破之蔚祕之子也無忌欲乗勝直趣江陵道規曰兵法屈申有時不可苟進諸􅁊丗居西楚羣小皆爲竭力振勇冠三軍難與爭鋒且可息兵養鋭徐以計策縻之不憂不克無忌不從振逆戰於靈溪馮該以兵㑹之無忌等大敗死者千餘人退還尋陽與劉毅等上牋請罪劉􅁉以毅節度諸軍免其青州刺史􅁊振以􅁊蔚爲雍州刺史鎮襄陽栁約之羅述甄季之聞􅁊玄死自白帝進軍至枝江聞何無忌等敗於靈溪亦引兵退俄而述季之皆病約之詣􅁊振僞降欲謀襲振事泄振殺之約之司馬時延祖涪陵太守文處茂収其餘衆保涪陵六月毛璩遣將攻漢中斬􅁊希璩自領梁州秋七月戊申永安皇后何氏崩燕苻昭儀有疾龍城人王榮自言能療之昭儀卒燕王熙立榮於公車門支解而焚之八月癸酉葬穆章皇后于永平陵魏置六謁官凖古六卿九月刁騁謀反伏誅刁氏遂亡刁氏素冨奴客縦横專固山澤爲京口之患劉􅁉散其資蓄令民稱力而取之彌日不盡時州郡饑弊民頼之以濟乞伏乾歸及楊盛戰于竹嶺爲盛所敗西涼公暠立子歆爲世子魏主珪臨昭陽殿攺􅀘百官引朝臣文武親加銓擇隨才授任列爵四等王封大郡公封小郡矦封大縣伯封小縣其品第一至第四舊臣有功無爵者追封之宗室䟽逺及異姓襲封者降爵有差又置散官五等其品第五至第九文官造士才能秀異武官堪爲將帥者其品亦比第五至第九百官有闕則取於其中以􅀘之其官名多不用漢魏之舊倣上古龍官鳥官謂諸曹之使爲鳬鴨取其飛之迅疾也謂􅇋官伺察者爲白鷺取其延頸逺望也餘皆類此盧循寇南海攻番禺廣州刺史濮陽呉隱之拒守百餘日冬十月壬戌循夜襲城而䧟之燒府舍民室俱盡執呉隱之循自稱平􅀯將軍攝廣州事聚燒骨爲共冢葬於洲上得髑髏三萬餘枚又使徐道覆攻始興執始興相阮腆之劉􅁉領青州刺史劉敬宣在尋陽聚糧繕船未甞無僃故何無忌等雖敗退頼以復振􅁊玄兄子亮自稱江州刺史寇豫章敬宣擊破之劉毅何無忌劉道規復自尋陽西上至夏口􅁊振遣鎮東將軍馮該守東岸楊武將軍孟山圖據魯山城輔國將軍􅁊仙客守偃月壘衆合萬人水陸相援毅攻魯山城道規攻偃月壘無忌遏中流自辰至午二城俱潰生禽山圖仙客該走石城辛巳魏大赦攺元天賜築西宫十一月魏主珪如西宫命宗室置宗師八國置大師小師州郡亦各置師以辨宗黨舉才行如魏晉中正之職燕王熙與符后遊畋北登白鹿山東踰青嶺􅀯臨滄海而還士卒爲虎狼所殺及凍死者五千餘人十二月劉毅等進克巴陵毅號令嚴整所過百姓安恱劉􅁉復以毅爲兖州刺史􅁊振以􅁊放之爲益州刺史屯西陵文處茂擊破之放之走還江陵髙句麗侵燕戊辰魏主珪如犲山宫是歳晉民避亂襁負之淮北者道路相屬資治通鑑卷第一百一十三
