body:
  text: 夏四月魯元公主薨封公主子張偃爲魯王謚公主曰魯元太后辛卯封所名孝惠子山爲襄城矦朝爲軹矦武爲壷􅀜矦太后欲王吕氏乃先立所名孝惠子彊爲淮陽王不疑爲􅁪山王使大謁者張釋風大臣大臣乃請立悼武王長子酈矦台爲吕王割齊之濟南郡爲吕國五月丙申趙王宫叢臺災秋桃李華二年冬十一月吕肅王台薨春正月乙卯地震羌道武都道山崩夏五月丙申封楚元王子郢客爲上邳矦齊悼惠王子章爲朱虚矦令入宿衛又以吕禄女妻章六月丙戌晦日有食之秋七月􅁪山哀王不疑薨行八銖錢癸丑立襄成矦山爲􅁪山王更名義三年夏江水漢水溢流四千餘家秋星晝見伊水洛水溢流千六百餘家汝水溢流八百餘家四年春二月癸未立所名孝惠子太爲昌平矦夏四月丙申太后封女弟􅎐爲臨光矦少帝寖長自知非皇后子乃出言曰后安能殺吾母而名我我壯即爲變太后聞之幽之永巷中言帝病左右莫得見太后語羣臣曰今皇帝病乆不已失惑昬亂不能繼嗣治天下其代之羣臣皆頓首言皇太后爲天下齊民計所以安宗廟社稷甚深羣臣頓首奉詔遂廢帝幽殺之五月丙辰立恒山王義爲帝更名曰弘不稱元年以太后制天下事故也以軹矦朝爲恒山王是􅀊以平陽矦曹窋爲御史大夫有司請禁南越􅀜市鐵器南越王佗曰髙帝立我通使物今髙后聽䜛臣别異蠻夷隔絶器物此必長沙王計欲􅀝中國擊滅南越而并王之自爲功也五年春佗自稱南越武帝發兵攻長沙敗數縣而去秋八月淮陽懷王彊薨以壷􅀜矦武爲淮陽王九月發河東上黨􅀐屯北地初令戍卒嵗更六年冬十月太后以吕王嘉居處驕恣廢之十一月立肅王弟産爲吕王春星晝見夏四月丁酉赦天下封朱虚矦章弟興居爲東牟矦亦入宿衞匈奴寇狄道攻阿陽行五分錢宣平矦張敖卒賜謚曰魯元王七年冬十二月匈奴寇狄道略二千餘人春正月太后召趙幽王友友以諸吕女爲后弗愛愛他􅁎諸吕女怒去䜛之於太后曰王言吕氏安得王太后百嵗後吾必擊之太后以故召趙王趙王至置邸不得見令衞圍守之弗與食其羣臣或竊饋輒捕論之丁丑趙王餓死以民禮葬之長安民􅃁次己丑日食晝晦太后惡之謂左右曰此爲我也二月徙梁王恢爲趙王吕王産爲梁王梁王不之國爲帝太傅秋七月丁巳立平昌矦太爲濟川王吕􅎐女爲將軍營陵矦劉澤妻澤者髙祖從祖昆弟也齊人田生爲之􅀃大謁者張卿曰諸吕之王也諸大臣未大服今營陵矦澤諸劉最長今卿言太后王之吕氏王益固矣張卿入言太后太后然之乃割齊之琅邪郡封澤爲琅邪王趙王恢之徙趙心懐不樂太后以吕産女爲王后王后從官皆諸吕擅權微伺趙王趙王不得自恣王有所愛􅁎王后使人酖殺之六月王不勝悲憤自殺太后聞之以爲王用婦人棄宗廟禮廢其嗣是時諸吕擅權用事朱虚矦章年二十有氣力忿劉氏不得職嘗入侍太后燕飲太后令章為酒吏章自請曰臣將種也請得以軍法行酒太后曰可酒酣章請爲耕田歌太后許之章曰深耕穊種立苗欲䟽非其種者鋤而去之太后黙然頃之諸吕有一人醉亡酒章追拔劒斬之而還報曰有亡酒一人臣謹行法斬之太后左右皆大驚業已許其軍法無以罪也因罷自是之後諸吕憚朱虚矦雖大臣皆依朱虚矦劉氏爲益彊陳平患諸吕力不能制恐禍及已嘗燕居深念陸賈徃直入坐而陳丞相不見陸生曰何念之深也陳平曰生揣我何念陸生曰足下極富貴無欲矣然有憂念不過患諸吕少主耳陳平曰然爲之柰何陸生曰天下安注意相天下危注意將將相和調則士豫附天下雖有變權不分爲社稷計在兩君掌握耳臣常欲謂太尉絳矦絳矦與我戲易吾言君何不交驩太尉深相結因爲陳平畫吕氏數事陳平用其計乃以五百金爲絳矦壽厚具樂飲太尉報亦如之兩人深相結吕氏謀益衰陳平以奴婢百人車馬五十乗錢五百萬遺陸生爲飲食費太后使使吿代王欲徙王趙代王謝之願守代邊太后乃立兄子吕禄爲趙王追尊禄父建成康矦釋之爲趙昭王九月燕靈王建薨有美人子太后使人殺之國除遣隆慮矦周竈將兵擊南越八年冬十月辛丑立吕肅王子東平矦通爲燕王封通弟莊爲東平矦三月太后祓還過軹道見物如蒼犬撠太后掖忽不復見卜之云趙王如意爲祟太后遂病掖傷太后爲外孫魯王偃年少􅀌弱夏四月丁酉封張敖前􅁎兩子侈爲新都矦壽爲樂昌矦以輔魯王又封中大謁者張釋爲建陵矦以其勸王諸吕賞之也江漢水溢流萬餘家秋七月太后病甚乃令趙王禄爲上將軍居北軍吕王産居南軍太后誡産禄曰吕氏之王大臣弗平我即崩帝年少大臣恐爲變必據兵衛宫愼母送喪爲人所制辛巳太后崩遺詔大赦天下以吕王產爲相國以吕禄女爲帝后髙后已葬以左丞相審食其爲帝太傅諸吕欲爲亂畏大臣絳灌等未敢發朱虚矦以吕禄女爲婦故知其謀乃隂令人吿其兄齊王欲令發兵西朱虚矦東牟矦爲内應以誅諸吕立齊王爲帝齊王乃與其舅駟鈞郎中令祝午中尉魏勃隂謀發兵齊相召平弗聽八月丙午齊王欲使人誅相相聞之乃發卒衞王宫魏勃紿召平曰王欲發兵非有漢虎符驗也而相君圍王固善勃請為君將兵衛王召平信之勃既將兵遂圍相府召平自殺於是齊王以駟鈞爲相魏勃爲將軍祝午爲内史悉發國中兵使祝午東詐琅邪王曰吕氏作亂齊王發兵欲西誅之齊王自以年少不習兵革之事願舉國委大王大王自髙帝將也請大王幸之臨葘見齊王計事琅邪王信之西馳見齊王齊王因留琅邪王而使祝午盡發琅邪國兵并將之琅邪王􅀃齊王曰大王髙皇帝適長孫也當立今諸大臣狐疑未有所定而澤於劉氏最爲長年大臣固待澤決計令大王留臣無爲也不如使我入􅀜計事齊王以爲然乃益具車送琅邪王琅邪王旣行齊遂舉兵西攻濟南遺諸矦王書陳諸吕之罪欲舉兵誅之相國吕産等聞之乃遣潁隂矦灌嬰將兵擊之灌嬰至滎陽謀曰諸吕擁兵􅀜中欲危劉氏而自立今我破齊還報此益吕氏之資也乃留屯滎陽使使諭齊王及諸矦與連和以待吕氏變共誅之齊王聞之乃還兵西界待約吕禄吕産欲作亂内憚絳矦朱虚等外畏齊楚兵又恐灌嬰畔之欲待灌嬰兵與齊合而發猶豫未決當是時濟川王太淮陽王武常山王朝及魯王張偃皆年少未之國居長安趙王禄梁王産各將兵居南北軍皆吕氏之人也列矦羣臣莫自堅其命太尉絳矦勃不得主兵曲周矦酈商老病其子􅀉與吕禄善絳矦乃與丞相陳平謀使人劫酈商令其子􅀉往紿􅀃吕禄曰髙帝與吕后共定天下劉氏所立九王吕氏所立三王皆大臣之議事已布吿諸矦諸矦皆以爲宜今太后崩帝少而足下佩趙王印不急之國守藩乃爲上將將兵留此爲大臣諸矦所疑足下何不歸將印以兵屬太尉請梁王歸相國印與大臣盟而之國齊兵必罷大臣得安足下髙枕而王千里此萬丗之利也吕禄信然其計欲以兵屬太尉使人報吕産及諸吕老人或以爲便或曰不便計猶豫未有所決吕禄信酈􅀉時與出游獵過其姑吕􅎐􅎐大怒曰若爲將而棄軍吕氏今無處矣乃悉出珠玉寶器散堂下曰毋爲他人守也九月庚申旦平陽矦窋行御史大夫事見相國產計事郎中令賈夀使從齊來因數産曰王不早之國今雖欲行尚可得邪具以灌嬰與齊楚合從欲誅諸吕吿產且趣產急入宫平陽矦頗聞其語馳吿丞相太尉太尉欲入北軍不得入襄平矦紀通尚符節乃令持節矯内太尉北軍太尉復令酈􅀉與典客劉揭先􅀃吕禄曰帝使太尉守北軍欲足下之國急歸將印辭去不然禍且起吕禄以爲酈況不欺已遂解印屬典客而以兵授太尉太尉至軍吕禄已去太尉入軍門行令軍中曰爲吕氏右􅃝爲劉氏左袒軍中皆左袒太尉遂將北軍然尚有南軍丞相平乃召朱虚矦章佐太尉太尉令朱虚矦監軍門令平陽矦吿衞尉毋入相國産殿門吕産不知吕禄已去北軍乃入未央宫欲爲亂至殿門弗得入徘徊往來平陽矦恐弗勝馳語太尉太尉尚恐不勝諸吕未敢公言誅之乃謂朱虚矦曰急入宫衞帝朱虚矦請卒太尉予卒千餘人入未央宫門見産廷中日餔時遂擊産産走天風大起以故其從官亂莫敢􅃲逐産殺之郎中府吏厠中朱虚矦已殺産帝命謁者持節勞朱虚矦朱虚矦欲奪其節謁者不肯朱虚矦則從與載因節信馳走斬長樂衞尉吕更始還馳入北軍報太尉太尉起拜賀朱虚矦曰所患獨吕産今已誅天下定矣遂遣人分部悉捕諸吕男女無少長皆斬之辛酉捕斬吕禄而笞殺吕􅎐使人誅燕王吕通而廢魯王張偃戊辰徙濟川王王梁遣朱虚矦章以誅諸吕事吿齊王令罷兵灌嬰在滎陽聞魏勃本教齊王舉兵使使召魏勃至責問之勃曰失火之家豈暇先言丈人而後救火乎因退立股戰而栗恐不能言者終無他語灌將軍熟視笑曰人謂魏勃勇妄庸人耳何能爲乎乃罷魏勃灌嬰兵亦罷滎陽歸班固贊曰孝文時天下以酈􅀉爲賣友夫賣友者謂見利而忘義也若􅀉父爲功臣而又執劫雖摧吕禄以安社稷誼存君親可也諸大臣相與隂謀曰少帝及梁淮陽􅁪山王皆非眞孝惠子也吕后以計詐名他人子殺其母養後宫令孝惠子之立以爲後及諸王以彊吕氏今皆已夷滅諸吕而所立即長用事吾屬無類矣不如視諸王最賢者立之或言齊王髙帝長孫可立也大臣皆曰吕氏以外家惡而幾危宗廟亂功臣今齊王舅駟鈞虎而冠即立齊王復爲吕氏矣代王方今髙帝見子最長仁孝寛厚太后家薄氏謹良且立長固順況以仁孝聞天下乎乃相與共隂使人召代王代王問左右郎中令張武等曰漢大臣皆故髙帝時大將習兵多謀詐此其屬意非止此也特畏髙帝吕太后威耳今已誅諸吕新啑血京師此以迎大王爲名實不可信願大王稱疾母往以觀其變中尉宋昌進曰羣臣之議皆非也夫秦失其政諸矦豪桀並起人人自以爲得之者以萬數然卒踐天子之位者劉氏也天下絶望一矣髙帝封王子弟地犬牙相制此所謂磐石之宗也天下服其彊二矣漢興除秦苛政約法令施德惠人人自安難動搖三矣夫以吕太后之嚴立諸吕爲三王擅權專制然而太尉以一節入北軍一呼士皆左袒爲劉氏叛諸吕卒以滅之此乃天授非人力也今大臣雖欲爲變百姓弗爲使其黨寜能專一邪方今內有朱虚東牟之親外畏吴楚淮陽琅邪齊代之彊方今髙帝子獨淮南王與大王大王又長賢聖仁孝聞於天下故大臣因天下之心而欲迎立大王大王勿疑也代王報太后計之猶豫未定卜之兆得大横占曰大横庚庚余爲天王夏啓以光代王曰寡人固已爲主矣又何王卜人曰所謂天王者乃天子也於是代王遣太后弟薄昭往見絳矦絳矦等具爲昭言所以迎立王意薄昭還報曰信矣無可疑者代王乃笑謂宋昌曰果如公言乃命宋昌參乗張武等六人乗傳從詣長安至髙陵休止而使宋昌先馳之長安觀變昌至渭橋丞相以下皆迎昌還報代王馳至渭橋羣臣拜謁稱臣代王下車荅拜太尉勃進曰願請間宋昌曰所言公公言之所言私王者無私太尉乃跪上天子璽符代王謝曰至代邸而議之後九月己酉晦代王至長安舍代邸羣臣從至邸丞相陳平等皆再拜言曰子弘等皆非孝惠帝子不當奉宗廟大王髙帝長子宜爲嗣願大王即天子位代王西郷讓者三南鄉讓者再遂即天子位羣臣以禮次侍東牟矦興居曰誅吕氏臣無功請得除宫乃與太僕汝隂矦滕公入宫前謂少帝曰足下非劉氏子不當立乃顧麾左右執㦸者掊兵罷去有數人不肯去兵宦者令張釋諭吿亦去兵滕公乃召乗輿車載少帝出少帝曰欲將我安之乎滕公曰出就舎舎少府乃奉天子法駕迎代王於邸報曰宫謹除代王即夕入未央宫有謁者十人持㦸衞端門曰天子在也足下何爲者而入代王乃謂太尉太尉往諭謁者十人皆掊兵而去代王遂入夜拜宋昌爲衞將軍鎭撫南北軍以張武爲郎中令行殿中有司分部誅滅梁淮陽􅁪山王及少帝於邸文帝還坐前殿夜下詔書赦天下太宗孝文皇帝上元年冬十月庚戌徙琅邪王澤爲燕王封趙幽王子遂爲趙王陳平謝病上問之平曰髙祖時勃功不如臣及誅諸吕臣功亦不如勃願以右丞相讓勃十一月辛巳上徙平爲左丞相太尉勃爲右丞相大將軍灌嬰爲太尉諸吕所奪齊楚故地皆復與之論誅諸吕功右丞相勃以下益户賜金各有差絳矦朝罷趨出意得甚上禮之恭常目送之郎中安陵􅀽盎諫曰諸吕悖逆大臣相與共誅之是時丞相爲太尉本兵柄適㑹其成功今丞相如有驕主色陛下謙讓臣主失禮竊爲陛下弗取也後朝上益莊丞相益畏十二月詔曰法者治之正也今犯法已論而使無罪之父母妻子同産坐之及爲收帑朕甚不取其除收帑諸相坐律令春正月有司請蚤建太子上曰朕旣不德縱不能博求天下賢聖有德之人而禪天下焉而曰豫建太子是重吾不德也其安之有司曰豫建太子所以重宗廟社稷不忘天下也上曰楚王季父也吴王兄也淮南王弟也豈不豫哉今不選舉焉而曰必子人其以朕爲忘賢有德者而專於子非所以憂天下也有司固請曰古者殷周有國治安皆千餘嵗用此道也立嗣必子所從来逺矣髙帝平天下爲太祖子孫繼嗣丗丗不絶今釋宜建而更選於諸矦及宗室非髙帝之志也更議不宜子啓最長純厚慈仁請建以爲太子上乃許之三月立太子母竇氏爲皇后皇后清河觀津人有弟廣國字少君幼爲人所略賣傳十餘家聞竇后立乃上書自陳召見驗問得實乃厚賜田宅金錢與兄長君家於長安絳矦灌將軍等曰吾屬不死命乃且縣此兩人兩人所出微不可不爲擇師傅賔客又復效吕氏大事也於是乃選士之有節行者與居竇長君少君由此爲退讓君子不敢以尊貴驕人詔振貸鰥寡􅀌獨窮困之人又令八十已上月賜米肉酒九十已上加賜帛絮賜物當稟鬻米者長吏閱視丞若尉致不滿九十嗇夫令史致二千石遣都吏循行不稱者督之楚元王交薨夏四月齊楚地震二十九山同日崩大水潰出時有獻千里馬者帝曰鸞旗在前屬車在後吉行日五十里師行三十里朕乗千里馬獨先安之於是還其馬與道里費而下詔曰朕不受獻也其令四方毋求來獻帝旣施惠天下諸矦四夷逺近驩洽乃脩代來功封宋昌爲壯武矦帝益明習國家事朝而問右丞相勃曰天下一嵗決獄幾何勃謝不知又問一嵗錢穀入出幾何勃又謝不知惶愧汗出沾背上問左丞相平平曰有主者上曰主者謂誰平曰陛下即問決獄責廷尉問錢榖責治粟内史上曰苟各有主者而君所主者何事也平謝曰陛下不知其駑下使待罪宰相宰相者上佐天子理隂陽順四時下遂萬物之宜外鎭撫四夷諸矦内親附百姓使卿大夫各得任其職焉帝乃稱善右丞相大慙出而讓陳平曰君獨不素教我對陳平笑曰君居其位不知其任邪且陛下即問長安中盜賊數君欲彊封邪於是絳矦自知其能不如平逺矣居頃之人或􅀃勃曰君旣誅諸吕立代王威震天下而君受厚賞處尊位乆之即禍及身矣勃亦自危乃謝病請歸相印上許之秋八月辛未右丞相勃免左丞相平專爲丞相初隆慮侯竈擊南越㑹暑濕士卒大疫兵不能隃領嵗餘髙后崩即罷兵趙佗因此以兵威財物賂遺閩越西甌駱役屬焉東西萬餘里乗黄屋左纛稱制與中國侔帝乃爲佗親􅃁在眞定者置守邑嵗時奉祀召其昆弟尊官厚賜寵之復使陸賈使南越賜佗書曰朕髙皇帝側室之子也棄外奉北藩于代道里遼逺壅蔽撲愚未嘗致書髙皇帝棄羣臣孝惠皇帝即世髙后自臨事不幸有疾諸吕爲變頼功臣之力誅之已畢朕以王矦吏不釋之故不得不立今即位乃者聞王遺將軍隆慮矦書求親昆弟請罷長沙兩將軍朕以王書罷將軍博陽矦親昆弟在眞定者已遣人存問脩治先人冢前日聞王發兵於邊爲寇災不止當其時長沙苦之南郡尤甚雖王之國庸獨利乎必多殺士卒傷良將吏寡人之妻􅀌人之子獨人父母得一亡十朕不忍爲也朕欲定地犬牙相入者以問吏吏曰髙皇帝所以介長沙土也朕不得擅變焉今得王之地不足以爲大得王之財不足以爲冨服領以南王自治之雖然王之號爲帝兩帝並立亡一乗之使以通其道是爭也爭而不讓仁者不爲也願與王分棄前惡終今以來通使如故賈至南越南越王恐頓首謝罪願奉明詔長爲藩臣奉貢職於是下令國中曰吾聞兩雄不俱立兩賢不並丗漢皇帝賢天子自今以來去帝制黄屋左纛因爲書稱蠻夷大長老夫臣佗昧死再拜上書皇帝陛下老夫故越吏也髙皇帝幸賜臣佗璽以爲南越王孝惠皇帝即位義不忍絶所以賜老夫者甚厚髙后用事别異蠻夷出令曰毋與蠻夷越金鐵田器馬牛羊即予予牡毋與牝老夫處僻馬牛羊齒已長自以祭祀不脩有死罪使內史藩中尉髙御史平凡三輩上書謝過皆不反又風聞老夫父母墳墓已壊削兄弟宗族已誅論吏相與議曰今內不得振於漢外無以自髙異故更號爲帝自帝其國非敢有害於天下髙皇后聞之大怒削去南越之籍使使不通老夫竊疑長沙王䜛臣故發兵以伐其邊老夫處越四十九年于今抱孫焉然夙興夜寐寑不安席食不甘味目不視靡曼之色耳不聽鍾鼓之音者以不得事漢也今陛下幸哀憐復故號通使漢如故老夫死骨不腐改號不敢為帝矣齊哀王襄薨上聞河南守吳公治平為天下第一召以為廷尉呉公薦洛陽人賈誼帝召以爲博士是時賈生年二十餘帝愛其辭博一嵗中超遷至太中大夫賈生請改正朔易服色定官名興禮樂以立漢制更秦法帝謙讓未遑也二年冬十月曲逆獻矦陳平薨詔列矦各之國爲吏及詔所止者遣太子十一月乙亥周勃復爲丞相癸卯晦日有食之詔羣臣悉思朕之過失及知見之所不及匄以啓告朕及舉賢良方正能直言極諫者以匡朕之不逮因各敕以職任務省繇費以便民罷衛將軍太僕見馬遺財足餘皆以給傳置潁隂矦􅀐賈山上書言治亂之道曰臣聞雷霆之所擊無不摧折者萬鈞之所壓無不糜滅者今人主之威非特雷霆也執重非特萬鈞也開道而求諫和顔色而受之用其言而顯其身士猶恐懼而不敢自盡又況於縱欲恣暴惡聞其過乎震之以威壓之以重雖有堯舜之智孟賁之勇豈有不摧折者哉如此則人主不得聞其過社稷危矣昔者周蓋千八百國以九州之民養千八百國之君君有餘財民有餘力而頌聲作秦皇帝以千八百國之民自養力罷不能勝其役財盡不能勝其求一君之身耳所自養者馳騁弋獵之娛天下弗能供也􅁗皇帝計其功德度其後嗣丗丗無窮然身死􅂊數月耳天下四靣而攻之宗廟滅絶矣秦皇帝居滅絶之中而不自知者何也天下莫敢告也其所以莫敢告者何也亡養老之義亡輔弼之臣退誹謗之人殺直諫之士是以道䛕媮合苟容比其德則賢於堯舜課其功則賢於湯武天下已潰而莫之告也今陛下使天下舉賢良方正之士天下皆訢訢焉曰將興堯舜之道三王之功矣天下之士莫不精白以承休德今方正之士皆在朝廷矣又選其賢者使爲常侍諸吏與之馳驅射獵一日再三出臣恐朝廷之解弛百官之墮於事也陛下即位親自勉以厚天下節用愛民平獄緩刑天下莫不􅀃喜臣聞山東吏布詔令民雖老羸􅽉疾扶杖而往聽之願少須􅁷毋死思見德化之成也今功業方就名聞方昭四方鄉風而從豪俊之臣方正之士直與之日日獵射擊兎伐狐以傷大業絶天下之望臣竊悼之古者大臣不得與宴游使皆務其方以髙其節則羣臣莫敢不正身脩行盡心以稱大禮夫士脩之於家而壞之於天子之廷臣竊愍之陛下與衆臣宴游與大臣方正朝廷論議游不失樂朝不失禮議不失計􅁤事之大者也上嘉納其言上每朝郎從官上書䟽未嘗不止輦受其言言不可用置之言可用采之未嘗不稱善帝從霸陵上欲西馳下峻阪中郎將􅀽盎􅀐並車擥轡上曰將軍怯邪盎曰臣聞千金之子坐不垂堂聖主不乗危不徼幸今陛下騁六飛馳下峻山有如馬驚車敗陛下縱自輕柰髙廟太后何上乃止上所幸愼夫人在禁中常與皇后同席坐及坐郎署􅀽盎引郤愼夫人坐愼夫人怒不肯坐上亦怒起入禁中盎因前􅀃曰臣聞尊卑有序則上下和今陛下旣已立后愼夫人乃妾妾主豈可與同坐哉且陛下幸之即厚賜之陛下所以爲愼夫人適所以禍之也陛下獨不見人彘乎於是上乃􅀃召語愼夫人愼夫人賜盎金五十斤賈誼􅀃上曰管子曰倉稟實而知禮節衣食足而知榮辱民不足而可治者自古及今未之嘗聞古之人曰一夫不耕或受之飢一女不織或受之寒生之有時而用之亡度則物力必屈古之治天下至纎至悉故其畜積足恃今背本而趨末者甚衆是天下之大殘也淫侈之俗日日以長是天下之大賊也殘賊公行莫之或止大命將泛莫之振救生之者甚少而靡之者甚多天下財産何得不蹷漢之爲漢幾四十年矣公私之積猶可哀痛失時不雨民且狼顧嵗惡不入請賣爵子旣聞耳矣安有爲天下阽危者若是而上不驚者丗之有饑穰天之行也禹湯被之矣即不幸有方二三千里之旱國胡以相恤卒然邊境有急數十百萬之衆國胡以餽之兵旱相乗天下大屈有勇力者聚徒而衡擊罷夫羸老易子齩其骨政治未畢通也逺方之能僭擬者並舉而爭起矣乃駭而圖之豈將有及乎夫積貯者天下之大命也苟粟多而財有餘何爲而不成以攻則取以守則固以戰則勝懐敵附逺何招而不至今敺民而歸之農皆著於本使天下各食其力末技游食之民轉而緣南畮則畜積足而人樂其所矣可以爲富安天下而直爲此廪廪也竊爲陛下惜之上感誼言春正月丁亥詔開藉田上親耕以率天下之民三月有司請立皇子爲諸矦王詔先立趙幽王少子辟疆爲河間王朱虚矦章爲城陽王東牟矦興居爲濟北王然後立皇子武爲代王參爲太原王揖爲梁王五月詔曰古之治天下朝有進善之旌誹謗之木所以通治道而來諌者也今法有誹謗訞言之罪是使衆臣不敢盡情而上無由聞過失也將何以來逺方之賢良其除之九月詔曰農天下之大本也民所恃以生也而民或不務本而事末故生不遂朕憂其然故今兹親率羣臣農以勸之其賜天下民今年田租之半燕敬王澤薨資治通鑑卷第十三
