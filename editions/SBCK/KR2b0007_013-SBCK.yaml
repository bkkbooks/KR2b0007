front:
  text: 髙帝於地下乎陳平絳矦曰於今面折廷爭臣不如君全社稷定劉氏之後君亦不如臣陵無以應之十一月甲子太后以王陵爲帝太傅實奪之相權陵遂病免歸乃以左丞相平爲右丞相以辟陽矦審食其爲左丞相不治事令監宫中如郎中令食其故得幸於太后公卿皆因而決事太后怨趙堯爲趙隱王謀乃抵堯罪上黨守任敖嘗爲沛獄吏有德於太后乃以爲御史大夫太后又追尊其父臨泗矦吕公爲宣王兄周吕令武矦澤爲悼武王欲以王諸吕爲漸春正月除三族罪妖言令
