front:
  text: 資治通鑑卷第二百五十
  hash: sha256:848aecf93a75f6b0936f1dbd371a14291e0afc73ccdff286216b87e656647763
body:
  text: 臣司馬光奉勑編集唐紀六十六圉大淵獻凡八年起上章執徐盡強懿宗昭聖恭惠孝皇帝上咸通元年春正月乙卯浙東軍與裘甫戰於桐柏觀前范居植死劉勍僅以身免乙丑甫帥其徒千餘人陷剡縣開府庫募壯士衆至數千人越州大恐時二浙久安人不習戰甲兵朽鈍見卒不滿三百鄭祗徳更募新卒以益之軍吏受賂率皆得孱弱者祗徳遣子將沈君縱副將張公署望海鎭將李珪將新卒五百擊裘甫二月辛卯與甫戰於剡西賊設伏於三溪之南而陳於三溪之北壅溪上流使可涉既戰陽敗走官軍追之半涉决壅水大至官軍大敗三將皆死官軍幾盡於是山海諸盜及它道無賴亡命之徒四面雲集衆至三萬分為三十二隊其小帥有謀略者推劉暀勇力推劉慶劉從簡羣盜皆遙通書幣求屬麾下甫自稱天下都知兵馬使改元羅平鑄印曰天平大聚資糧購良工治器械聲震中原丙申葬聖武獻文孝皇帝于貞陵廟號宣宗丙午白敏中入朝墜陛傷腰肩輿以歸鄭祗徳累表告急且求救於鄰道浙西遣牙將凌茂貞將四百人宣歙遣牙將白琮將三百人赴之祗徳始令屯郭門及東小江尋復召還府中以自衛祗徳饋之比度支常饋多十三倍而宣潤將士猶以為不足宣潤將士請土軍為導以與賊戰諸將或稱病或陽墜馬其肯行者必先邀職級竟不果遣賊遊騎至平水東小江城中士民儲舟裹糧夜坐待旦各謀逃潰朝廷知祗徳懦怯議選武將代之夏侯孜曰浙東山海幽阻可以計取難以力攻西班中無可語者前安南都䕶王式雖儒家子在安南威服華夷名聞逺近可任也諸相皆以為然遂以式為浙東觀察使徴祗徳為賔客三月辛亥朔式入對上問以討賊方略對曰但得兵賊必可破有宦官侍側曰發兵所費甚大式曰臣為國家惜費則不然兵多賊速破其費省矣若兵少不能勝賊延引嵗月賊勢益張則江淮羣盜將蜂起應之國家用度盡仰江淮若阻絶不通則上自九廟下及十軍皆無以供給其費豈可勝計哉上顧宦官曰當與之兵乃詔發忠武義成淮南等諸道兵授之裘甫分兵掠衢婺州婺州押牙房郅散將樓曾衢州十將方景深將兵拒險賊不得入又分兵掠明州明州之民相與謀曰賊若入城妻子皆為葅醢况貨財能保之乎乃自相帥出財募勇士治器械樹栅浚溝斷橋為固守之備賊又遣兵掠台州破唐興己巳甫自將萬餘人掠上虞焚之癸酉入餘姚殺丞尉東破慈溪入奉化抵寧海殺其令而據之分兵圍象山所過俘其少壯餘老弱者蹂踐殺之及王式除書下浙東人心稍安裘甫方與其徒飲酒聞之不樂劉暀歎曰有如此之衆而䇿畫未定良可惜也今朝廷遣王中丞將兵來聞其人智勇無敵不四十日必至兵馬使宜急引兵取越州慿城郭據府庫遣兵五千守西陵循浙江築壘以拒之大集舟艦得間則長驅進取浙西過大江掠揚州貨財以自實還修石頭城而守之宣歙江西必有響應者遣劉從簡以萬人循海而南襲取福建如此則國家貢賦之地盡入於我矣但恐子孫不能守耳終吾身保無憂也甫曰醉矣明日議之暀以甫不用其言怒陽醉而出有進士王輅在賊中賊客之輅説甫曰如劉副使之謀乃孫權所為也彼乘天下大亂故能據有江東今中國無事此功未易成也不如擁衆據險自守陸耕海漁急則逃入海島此萬全䇿也甫畏式猶豫未决夏四月式行至柿口義成軍不整式欲斬其將久乃釋之自是軍所過若無人至西陵裘甫遣使請降式曰是必無降心直欲窺吾所為且欲使吾驕怠耳乃謂使者曰甫面縛以來當免而死乙未式入越州既交政為鄭祗徳置酒曰式主軍政不可以飲監軍但與衆賔盡醉迨夜繼以燭曰式在此賊安能妨人樂飲丙申餞祗徳于逺郊復樂飲而歸於是始修軍令告饋餉不足者息矣稱疾卧家者起矣先求遷職者默矣賊别帥洪師簡許㑹能帥所部降式曰汝降是也當立効以自異使帥其徒為前鋒與賊戰有功乃奏以官先是賊諜入越州軍吏匿而飲食之文武將吏往往潛與賊通求城破之日免死及全妻子或詐引賊將來降實窺虚實城中密謀屏語賊皆知之式隂察知悉捕索斬之刑將吏尤横猾者嚴門禁無驗者不得出入警夜周宻賊始不知我所為矣式命諸縣開倉廩以賑貧乏或曰賊未滅軍食方急不可散也式曰非汝所知官軍少騎卒式曰吐蕃回鶻比配江淮者其人習險阻便鞍馬可用也舉籍府中得驍健者百餘人虜久羇旅所部遇之無狀困餧甚式既犒飲又賙其父母妻子皆泣拜讙呼願效死悉以為騎卒使騎將石宗本將之凡在管内者皆視此籍之又奏得龍陂監馬二百匹於是􅀐兵足矣或請爲烽燧以詗賊逺近衆寡式笑而不應選懦卒使乗健馬少給之兵以爲候􅀐衆怪之不敢問於是閱諸營見卒及土團子弟得四千人使導軍分路討賊府下無守兵更籍土團千人以補之乃命宣歙將白琮浙西將凌茂貞帥本軍北來將韓宗政等帥土團合千人石宗本帥􅀐兵爲前鋒自上虞趨奉化解象山之圍號東路軍又以義成將白宗建忠將游君楚淮南將萬璘帥本軍與台州唐興軍合號南路軍令之曰毋爭險易毋焚廬舍毋殺平民以増首級平民脅從者募降之得賊金帛官無所問俘獲者皆越人也釋之癸卯南路軍拔賊沃洲寨甲辰拔新昌寨破賊將毛應天進抵唐興白敏中三表辭位上不許右補闕王譜上疏以為陛下致理之初乃宰相盡心之日不可暫闕敏中自正月卧疾今四月矣陛下雖與它相坐語未嘗三刻天下之事陛下嘗暇與之講論乎願聼敏中罷去延訪碩徳以資聰明己酉貶譜為陽翟令譜珪之六世孫也五月庚戌朔給事中鄭公輿封還貶譜敕書上令宰相議之宰相以為譜侵敏中竟貶之辛亥浙東東路軍破賊將孫馬騎於寧海戊午南路軍大破賊將劉暀毛應天於唐興南谷斬應天先是王式以兵少奏更發忠武義成軍及請昭義軍詔從之三道軍至越州式命忠武將張茵將三百人屯唐興斷賊南出之道義成將高羅鋭將三百人益以台州土軍徑趨寧海攻賊巢穴昭義將􅎤跌戣將四百人益東路軍斷賊入明州之道庚申南路軍大破賊於海遊鎭賊入甬溪洞戊辰官軍屯於洞口賊出洞戰又破之己巳高羅鋭襲賊别師劉平天寨破之自是諸軍與賊十九戰賊連敗劉暀謂裘甫曰曏從吾謀入越州寧有此困邪王輅等進士數人在賊中皆衣緑暀悉収斬之曰亂我謀者此青蟲也高羅鋭克寧海收其逃散之民得七千餘人王式曰賊窘且饑必逃入海入海則嵗月間未可擒也命羅鋭軍海口以拒之又命望海鎭將雲思益浙西將王克容將水軍巡海澨思益等遇賊將劉簡於寧海東賊不虞水軍遽至皆弃船走山谷得其船十七盡焚之式曰賊無所逃矣惟黃罕嶺可入剡恨無兵以守之雖然亦成擒矣裘甫既失寧海乃帥其徒屯南陳館下衆尚萬餘人辛未東路軍破賊將孫馬騎於上疁村賊將王臯懼請降壬申右拾遺内供奉薛調上言以為兵興以來賦歛無度所在羣盜半是逃戸固須翦滅亦可閔傷望敕州縣税外毋得科率仍敕長吏嚴加糾察從之袁王紳薨戊寅浙東東路軍大破裘甫於南陳館斬首數千級賊委弃繒帛盈路以緩追者􅎤跌戣令士卒敢顧者斬毋敢犯者賊果自黄罕嶺遁去六月甲申復入剡諸軍失甫不知所在義成將張茵在唐興獲俘將苦之俘曰賊入剡矣茍捨我我請為軍導從之茵後甫一日至剡壁其東南府中聞甫入剡復大恐王式曰賊來就擒耳命趣東南兩路軍會於剡辛卯圍之賊城守甚堅攻之不能拔諸將議絶溪水以渴之賊知之乃出戰三日凡八十三戰賊雖敗官軍亦疲賊請降諸將以白式式曰賊欲少休耳益謹備之功垂成矣賊果復出又三戰庚子夜裘甫劉暀劉慶從百餘人出降遙與諸將語離城數十步官軍疾趨斷其後遂擒之壬寅甫等至越州式腰斬暀慶等二十餘人械甫送京師剡城猶未下諸將已擒甫不復設備劉從簡帥壯士五百突圍走諸將追至大蘭山從簡據險自守秋七月丁巳諸將共攻克之台州刺史李師望募賊相捕斬之以自贖所降數百人得從簡首獻之諸將還越式大置酒諸將乃請曰某等生長軍中久更行陳今年得從公破賊然私有所不諭者敢問公之始至軍食方急而遽散以賑貧乏何也式曰此易知耳賊聚穀以誘饑人吾給之食則彼不為盜矣且諸縣無守兵賊至則倉穀適足資之耳又問不置烽燧何也式曰烽燧所以趣救兵也兵盡行城中無兵以継之徒驚士民使自潰亂耳又問使懦卒為候騎而少給兵何也式曰彼勇卒操利兵遇敵且不量力而鬭鬬死則賊至不知矣皆拜曰非所及也封憲宗子􅣼為信王八月裘甫至京師斬于東市加王式檢校右散騎常侍諸將官賞各有差先是上毎以越盜為憂夏侯孜曰王式才有餘不日告捷矣孜與式書曰公專以執裘甫為事軍須細大此期悉力故式所奏求無不從由是能成其功衞王灌薨九月白敏中五上表辭位辛亥以敏中為司徒中書令癸酉右拾遺句容劉鄴上言李徳裕父子為相有聲迹功効竄逐以來血屬將盡生涯已空宜賜哀閔贈以一官冬十月丁亥敕復李徳裕太子少保衞國公贈左僕射己亥以門下侍郎同平章事夏侯孜同平章事充西川節度使以户部尚書判度支畢諴為禮部尚書同平章事安南都䕶李鄠復取播州十一月丁丑上祀圓丘赦改元十二月戊申安南土蠻引南詔兵合三萬餘人乗虚攻交趾陷之都䕶李鄠與監軍奔武州二年春正月詔發邕管及鄰道兵救安南擊南蠻二月以中書令白敏中兼中書令充鳯翔節度使以左僕射判度支杜悰兼門下侍郎同平章事一日兩樞宻使詣中書宣徽使楊公慶継至獨揖悰受宣三相起避之西軒公慶出斜封文書以授悰發之乃宣宗大漸時官官請鄆王監國奏也且曰當時宰相無名者當以反法處之悰反復讀良久曰聖主登極萬方欣戴令日此文書非臣下所宜窺復封以授公慶曰主上欲罪宰相當於延英面示聖㫖明行誅譴公慶去悰復與兩樞宻坐謂曰内外之臣事猶一體宰相樞宻共參國政今主上新踐阼未熟萬機資内外裨補固當以仁愛為先刑殺為後豈得遽賛成殺宰相事若主上習以性成則中尉樞宻權重禁闈豈得不自憂乎悰受恩六朝所望致君堯舜不欲朝廷以愛憎行法兩樞宻相顧默然徐曰當具以公言白至尊非公重徳無人及此慙悚而退三相復來見悰微請宣意悰無言三相惶怖乞存家族悰曰勿為它慮既而寂然無復宣命及延英開上色甚悦是時士大夫深疾宦官事有小相涉則衆共弃之建州進士葉京嘗預宣武軍宴識監軍之面既而及第在長安與同年出遊遇之於塗馬上相揖因之謗議諠然遂沈廢終身其不相悦如此福王綰薨夏六月癸丑以鹽州防禦使王寛爲安南經略使時李鄠自武州収集土軍攻羣蠻復取安南朝廷責其失守貶儋州司戸鄠初至安南殺蠻酋杜守澄其宗黨遂誘道羣蠻陷交趾朝廷以杜氏彊盛務在姑息兾收其力用乃贈守澄父存誠金吾將軍再舉鄠殺守澄之罪長流崖州秋七月南蠻攻邕州陷之先是廣桂容三道共發兵三千人戍邕州三年一代經略使段文楚請以三道衣糧自募土軍以代之朝廷許之所募纔得五百許人文楚入爲金吾將軍經略使李蒙利其闕額衣糧以自入悉罷遣三道戍卒止以所募兵戍守左右江比舊什減七八故蠻人乗虚入寇時蒙已卒經略使李弘源至鎮纔十日無兵以禦之城陷弘源與監軍脱身奔蠻州二十餘日蠻去乃還弘源坐貶建州司户文楚時爲殿中監復以爲邕管經略使至鎭城邑居人什不存一文楚秀實之孫也杜悰上言南詔向化七十年蜀中寢兵無事羣蠻率服今西川兵食單寡未可輕與之絶且應遣使弔祭曉諭清平官等以新王名犯廟諱故未行􅁽命待其更名謝恩然後遣使􅁽命庶全大體上從之命左司郎中孟穆爲弔祭使未發㑹南詔寇嶲州攻卭峽関穆遂不行冬十月以御史大夫鄭涯爲山南東道節度使十一月加同平章事三年春正月庚寅朔羣臣上尊號曰睿文明聖孝徳皇帝赦天下以中書侍郎同平章事蔣伸同平章事充河中節度使二月棣王惴薨南詔復冦安南經略使王寛數來告急朝廷以前湖南觀察使蔡襲代之仍發許滑徐汴荆襄潭鄂等道兵各三萬人授襲以禦之兵勢既盛蠻遂引去邕管經略使段文楚坐變更舊制左遷威衞將軍分司左庶子蔡京性貪虐多詐時相以為有吏才奏遣制置嶺南事三月京還奏事稱㫖復以京權知太僕卿充荆襄以南宣慰安撫使夏四月己亥朔敕於兩街四寺各置戒壇度人三七日上奉佛太過怠於政事嘗於咸泰殿築壇為内寺尼受戒兩街僧尼皆入預又於禁中設講席自唱經手録梵夾又數幸諸寺施與無度吏部侍郎蕭倣上疏以為􅀇祖之道慈儉為先素王之風仁義為首垂範百代必不可加佛者弃位出家割愛中之至難取滅後之殊勝非帝王所宜慕也願陛下時開延英接對四輔力求人瘼䖍奉宗祧思繆賞與濫刑其殃必至知勝殘而去殺得福甚多罷去講筵躬勤政事上雖嘉奬竟不能從嶺南舊分五管廣桂邕容安南皆􅀠嶺南節度使蔡京奏請分嶺南為兩道節度從之五月敕以廣州為東道邕州為西道又割桂管龔象二州容管藤巖二州􅀠邕管尋以嶺南節度使韋宙爲東道節度使以蔡京爲西道節度使蔡襲將諸道軍在安南蔡京忌之恐其立功奏稱南蠻逺遁邊徼無虞武夫邀功妄占戍兵虚費餽運蓋以荒陬路逺難於覆驗故得肆其姧詐請罷戍兵各還本道朝廷從之襲累奏稱羣蠻伺隙日久不可無備乞留戍兵五千人不聽襲以蠻寇必至交趾兵食皆闕謀力兩窮作十必死狀申中書時相信京之言終不之省秋七月徐州軍亂逐節度使溫璋初王智興既得徐州募勇悍之士二千人號銀刀雕旗門槍挾馬等七軍常以三百餘人自衞露刃坐於兩廡夾幕之下每月一更其後節度使多儒臣其兵浸驕小不如意一夫大呼其衆和之節度使輒自後門逃去前節度使田牟至與之雜坐飲酒把臂拊背或為之執板唱歌犒賜之費日以萬計風雨寒暑復加勞來猶時喧譁邀求不已牟薨璋代之驕兵素聞璋性嚴憚之璋開懷慰撫而驕兵終懷猜忌賜酒食皆不歴口一旦竟聚譟而逐之朝廷知璋無辜乙亥以璋為邠寧節度使以浙東觀察使王式為武寧節度使以前西川節度使同平章事夏侯孜為左僕射同平章事忠武義成兩軍從王式討裘甫者猶在浙東詔式帥以赴徐州驕兵聞之甚懼八月式至大彭館始出迎謁式視事三日饗兩鎭將士遣還既擐甲執兵命圍驕兵盡殺之銀刀都將邵澤等數千人皆死甲子敕以徐州先􅀠淄青道李洧自歸始置徐海使額及張建封以威名寵任特帖濠泗二州當時本以控扼淄青光蔡自寇孽消弭而武寧一道職為亂階今改為徐州團練使􅀠兖海節度復以濠州歸淮南道更於宿州置宿泗都團練觀察使留將士二千人守徐州餘皆分􅀠兖宿且以王式為武寧節度使兼徐泗濠宿制置使委式與監軍楊􅀇質分配將士赴諸道訖然後將忠武義成兩道兵至汴滑各遣歸本道身詣京師其銀刀等軍逃匿將士聽一月内自首一切勿問嶺南西道節度使蔡京為政苛慘設炮烙之刑闔境怨之遂為邕州軍士所逐奔藤州詐為敕書及攻討使印募鄉丁及旁側土軍以攻邕州衆既烏合動輒潰敗往依桂州桂州人怨其分裂不納京無所自容敕貶崖州司户不肯之官還至零陵敕賜自盡以桂管觀察使鄭愚為嶺南西道節度使冬十月丙申朔立皇子佾為魏王侹為凉王佶為蜀王十一月立順宗子緝為蘄王憲宗子憤為榮王南詔帥羣蠻五萬寇安南都䕶蔡襲告急敕發荆南湖南兩道兵二千桂管義征子弟三千詣邕州受鄭愚節度嶺南東道節度使韋宙奏蠻㓂必向邕州若不先保䕶遽欲逺征恐蠻於後乗虚扼絶餉道乃敕蔡襲屯海門鄭愚分兵備禦十二月襲又求益兵敕山南東道發弩手千人赴之時南詔已圍交趾襲嬰城固守救兵不得至翼王繟薨是歳嗢末始入貢嗢末者吐蕃之奴號也吐蕃每發兵其冨室多以奴從往往一家至十數人由是吐蕃之衆多及論恐熱作亂奴多無主遂相糾合為部落散在甘肅􅀲沙河渭岷廓疊宕之間吐蕃微弱者反依附之四年春正月庚午上祀圓丘赦天下是日南詔陷交趾蔡襲左右皆盡徒步力戰身集十矢欲趣監軍船船已離岸遂溺海死幕僚樊綽􅂝其印浮度江荆南江西鄂岳襄州將士四百餘人走至城東水際荆南虞候元惟徳等謂衆曰吾輩無船入水則死不若還向城與蠻鬭人以一身易二蠻亦為有利遂還向城入東羅門蠻不為備惟德等縱兵殺蠻二千餘人逮夜蠻將楊思縉始自子城岀救之惟徳等皆死南詔兩陷交趾所殺虜且十五萬人留兵二萬使思縉據交趾城谿洞夷獠無遠近皆降之詔諸道兵赴安南者悉召還分保嶺南東西道􅊨上遊宴無節左拾遺劉蜕上疏曰今西凉築城應接未决於與奪南蠻侵軼干戈悉在於道塗旬月以來不為無事陛下不形憂閔以示逺近則何以責其死力望節娛遊以待逺人乂安未晩弗聽二月甲午朔上歴拜十六陵􅊨置天雄軍於秦州以成河渭三州􅀠焉以前左金吾將軍王晏實為天雄觀察使三月歸義節度使張義潮奏自將蕃漢兵七千克復凉州南蠻寇左右江浸逼邕州鄭愚懼自言儒臣無將略請任武臣朝廷召義武節度使康承訓詣闕欲使之代愚仍詔選軍校數人士卒數百人自隨中書侍郎同平章事畢諴以同列多徇私不法稱疾辭位夏四月罷爲兵部尚書庚戌羣盜入徐州殺官吏刺史曹慶討平之康承訓至京師以爲嶺南西道節度使發荆襄洪鄂四道兵萬人與之俱五月戊辰以翰林學士承旨兵部侍郎楊収同平章事收發之弟也與左軍中尉楊玄价敘同宗相結故得爲相乙亥廢容管􅀠嶺南西道以供軍食復以龔象二州􅀠桂管戊子以門下侍郎同平章事杜審權同平章事充鎮海節度使六月廢安南都䕶府置行交州於海門鎮以右監門將軍宋戎為行交州刺史以康承訓兼領安南及諸軍行營閏月以門下侍郎同平章事杜悰同平章事充鳯翔節度使以兵部侍郎判度支河南曹確同平章事秋七月辛卯朔日有食之復置安南都䕶府於行交州以宋戎為經略使發山東兵萬人鎭之時諸道兵援安南者屯聚嶺南江西湖南江西湖南餽運者皆泝湘江入澪渠灕水勞費艱澁諸軍乏食潤州人陳磻石上言請造千斛大舟自福建運米泛海不一月至廣州從之軍食以足然有司以和雇為名奪商人舟委其貨於岸側舟入海或遇風濤沒溺有司囚繫綱吏舟人使償其米人頗苦之八月嶺南東道節度使韋宙奏蠻寇必向邕州請分兵屯容藤州䕫王滋薨敕以閤門使吳徳應等爲館驛使臺諫上言故事御史巡驛不應忽以内臣代之上諭以敕命已行不可復改左拾遺劉蜕上言昔楚子縣陳得申叔一言而復封之太宗發卒修乾元殿聞張􅀇素諫即日罷之自古明君所尚者從諫如流豈有已行而不改且敕自陛下岀之自陛下改之何爲不可弗聽􅃛戞斯遣其臣合伊難支表求經籍及每年遣使走馬請厯又欲討回鶻使安西以來悉歸唐不許冬十月甲戌以長安尉集賢校理令狐滈爲左拾遺乙亥左拾遺劉蜕上言滈專家無子弟之法布衣行公相之權起居郎張雲言滈父綯用李涿為安南致南蠻至今為梗由滈納賄陷父於惡十一月丁酉雲復上言滈父綯執政之時人號白衣宰相滈亦上表引避乃改詹事府司直辛巳廢宿泗觀察使復以徐州為觀察府以濠泗􅀠焉十二月南詔寇西川昭義節度使沈詢奴歸秦與詢侍婢通詢欲殺之未果乙酉歸秦結牙將作亂攻府第殺詢五年春正月以京兆尹李蠙為昭義節度使取歸秦心肝以祭沈詢淮南節度使令狐綯為其子滈訟寃貶張雲興元少尹劉蜕華隂令敕曰雖嘉蹇諤之忠難逃疎易之責丙午西川奏南詔寇嶲州刺史喻士珍破之獲千餘人詔發右神䇿兵五千及諸道兵戍之忠武大將顔慶復請築新安遏戎二城從之以容管經略使張茵兼句當交州事益海門鎮兵滿二萬五千人令茵進取安南二月己巳以刑部尚書鹽鐵轉運使李福同平章事充西川節度使甲申前西川節度使蕭鄴左遷山南西道觀察使三月丁酉彗星岀於婁長三尺己亥司天監奏按星經是名舍譽瑞星也主大喜請宣示中外編諸史䇿從之康承訓至邕州蠻寇益熾詔發許滑青汴兖鄆宣潤八道兵以授之承訓不設斥候南詔帥羣蠻近六万冦邕州將入境承訓乃遣六道兵凡万人拒之以獠為導紿之敵至不設備五道兵八千人皆沒惟天平軍後一日至得免承訓聞之惶怖不知所為節度副使李行素帥衆治壕栅甫畢蠻軍已合圍留四日治攻具將就諸將請夜分道斫蠻營承訓不許有天平小校再三力爭乃許之小校將勇士三百夜縋而岀散燒蠻營斬五百餘級蠻大驚間一日解圍去承訓乃遣諸軍數千追之所殺虜不滿三百級皆溪獠脅從者承訓騰奏告捷云大破蠻賊中外皆賀之夏四月以兵部侍郎判戶部蕭寘同平章事寘復之孫也加康承訓檢校右僕射賞破蠻之功也自餘奏功受賞者皆承訓子弟親昵燒營小校不遷一級由是軍中怨怒聲流道路五月敕徐州土風雄勁甲士精彊比因罷節頗多逃匿宜令徐泗團練使選募軍士三千人赴邕州防戍待嶺外事寧即與代歸秋七月西川奏兩林鬼主邀南詔蠻敗之殺獲甚衆保塞城使杜守連不從南詔帥衆詣黎州降嶺南東道節度使韋宙具知康承訓所為以書白宰相承訓亦自疑懼累表辭疾乃以承訓為右武衞大將軍分司以容管經略使張茵為嶺南西道節度使復以容管四州别為經略使時南詔知邕州空竭不復入寇茵久之不敢進軍取安南夏侯孜薦驍衞將軍高駢代之乃以駢為安南都䕶本管經略招討使茵所將兵悉以授之駢崇文之孫也世在禁軍駢頗讀書好談今古兩軍宦官多譽之累遷右神䇿都虞候党項叛將禁兵萬人戍長武屢有功遷秦州防禦使復有功故委以安南冬十一月以門下侍郎同平章事夏侯孜同平章事充河東節度使壬寅以翰林學士承㫖兵部侍郎路巖同平章事時年三十六六年春正月丁巳始以懿安皇后配饗憲宗室時王皥復為禮院檢討官更申前議朝廷竟從之諸道進私白者閩中為多故宦官多閩人福建觀察使杜宣猷每寒食遣吏分祭其先壟宦官德之庚申以宣猷為宣歙觀察使時人謂之敕使墓户三月中書侍郎同平章事蕭寘薨夏四月以前東川節度使高璩為兵部侍郎同平章事璩元裕之子也楊收建議以蠻寇積年未平兩河兵戍嶺南冒瘴霧物故者什六七請於江西積粟募彊弩三萬人以應接嶺南道近便仍建節以重其權從之五月辛丑置鎮南軍於洪州嶲州刺史喻士珍貪獪掠兩林蠻以易金南詔復寇嶲州兩林蠻開門納之南詔盡殺戍卒士珍降之壬寅以桂管觀察使嚴譔爲鎮南節度使譔震之從孫也六月高璩薨以御史大夫徐啇爲兵部侍郎同平章事秋七月立皇子侃爲郢王儼爲普王高駢治兵於海門未進監軍李維周惡駢欲去之屢趣駢使進軍駢以五千人先濟約維周發兵應援駢既行維周擁餘衆不發一卒以繼之九月駢至南定峯州蠻衆近五萬方穫田駢掩擊大破之收其所穫以食軍冬十二月壬子太皇太后鄭氏崩七年春二月歸義節度使張義潮奏北庭回鶻固俊克西州北庭輪臺清鎭等城論恐熱寓居廓州糾合旁側諸部欲為邊患皆不從所向盡為仇敵無所自容仇人以告拓䟦懷光於鄯州懷光引兵擊破之三月戊寅以河東節度使劉潼為西川節度使初南詔圍嶲州東蠻浪稽部竭力助之遂屠其城卑籠部怨南詔殺其父兄導忠武戍兵襲浪稽滅之南詔由是怨唐南詔遣清平官董成等詣成都節度使李福盛儀衞以見之故事南詔使見節度使拜伏於庭成等曰驃信已應天順人我見節度使當抗禮傳言往返自旦至日中不决將士皆憤怒福乃命捽而毆之因械繫於獄劉潼至鎮釋之奏遣還國詔召成等至京師見於别殿厚賜勞而遣之成徳節度使王紹懿在鎭十年為政寛簡軍民便之疾病召兄紹鼎之子都知兵馬使景崇而告之曰吾兄以汝之幼以軍政授我今汝長矣我復以軍政歸汝努力為之上忠朝廷下和鄰藩勿墜吾兄之業汝之功也言竟而薨閏月吐蕃寇邠寧節度使薛􅀪宗拒却之夏四月辛巳貶前西川節度使李福為蘄王傅五月葬孝明皇后於景陵之側主祔别廟六月魏博節度使何􅀪敬薨軍中立其子左司馬全皥為留後以王景崇為成徳留後南詔酋龍遣善闡節度使楊緝思助安南節度使段酋遷守交趾以范昵些為安南都統趙諾眉為扶邪都統監陳敕使韋仲宰將七千人至峯州高駢得以益其軍進擊南詔屢破之捷奏至海門李維周皆匿之數月無聲問上怪之以問維周維周奏駢駐軍峯州玩軍不進上怒以右武衞將軍王晏權代駢鎮安南召駢詣闕欲重貶之晏權智興之從子也是月駢大破南詔蠻於交趾殺獲甚衆遂圍交趾城秋七月以何全皥為魏博留後冬十月甲申以門下侍郎同平章事楊收為宣歙觀察使收性侈靡門吏僮奴多倚為姦利楊􅀇价兄弟受方鎮之賂屢有請託收不能盡從􅀇价怒以為叛已故岀之拓跋懷光以五百騎入廓州生擒論恐熱先刖其足數而斬之傳首京師其部衆東奔秦州尚延心邀擊破之悉奏遷於嶺南吐蕃自是衰絶乞離胡君臣不知所終高駢圍交趾十餘日蠻困蹙甚城且下㑹得王晏權牒已與李維周將大軍發海門駢即以軍事授韋仲宰與麾下百餘人北歸先是仲宰遣小使王惠賛駢遣小校曾衮入告交趾之捷至海中望見旌旗東來問遊船云新經略使與監軍也二人謀曰維周必奪表留我乃匿於島間維周過即馳詣京師上得奏大喜即加駢檢校工部尚書復鎮安南駢至海門而還王晏權闇懦動稟李維周之命維周凶貪諸將不為之用遂解重圍蠻遁去者太半駢至復督勵將士攻城遂克之殺段酋遷及土蠻為南詔鄉導者朱道古斬首三萬餘級南詔遁去駢又破土蠻附南詔者二洞誅其酋長土蠻帥衆歸附者萬七千人十一月壬子赦天下詔安南邕州西川諸軍各保疆域勿復進攻南詔委劉潼曉諭如能更修舊好一切不問置静海軍於安南以高駢為節度使自李涿侵擾羣蠻為安南患殆將十年至是始平駢築安南城周三千步造屋四十餘萬閒十二月􅃛戞斯遣將軍乙支連幾入貢奏遣鞍馬迎册立使及請亥年曆日以成徳留後王景崇為節度使上好音樂宴遊殿前供奉樂工常近五伯人毎月宴設不減十餘水陸皆備聼樂觀優不知厭倦賜與動及千緡曲江昆明霸滻南宮北苑昭應咸陽所欲遊幸即行不待供置有司常具音樂飲食幄弈諸王立馬以備陪從毎行幸内外諸司扈從十餘萬人所費不可勝紀八年春正月以魏博留後何全皥為節度使二月歸義節度使張義潮入朝以為右神武統軍命其族子惟深守歸義自安南至邕廣海路多潜石覆舟靜海節度使高駢募工鑿之漕運無滯西川近邊六姓蠻常持兩端無寇則稱效順有寇必為前鋒卑籠部獨盡心於唐與羣蠻為讎朝廷賜姓李除為刺史節度使劉潼遣將將兵助之討六姓蠻焚其部落斬首五千餘級樂工李可及善為新聲三月上以可及為左威衞將軍曹確諫曰太宗定文武官六百餘員謂房􅀇齡曰朕以待天下賢士工啇雜流不可處也大和中文宗欲以樂工尉遲璋為王府率拾遺竇洵直諫即改光州長史乞以兩朝故事别除可及官不從夏四月上不豫羣臣希進見五月丙辰疎理天下繫囚非巨蠧不可赦者皆逓降一等秋七月壬寅蘄王緝薨懷州民訴旱刺史劉仁規揭牓禁之民怒相與作亂逐仁規仁規逃匿村舍民入州宅掠其家貲登樓擊鼓久之乃定甲子以兵部侍郎充諸道鹽鐵轉運等使駙馬都尉于琮同平章事宣歙觀察使楊収過華嶽廟施衣物使巫祈禱縣令誣以爲収罪右拾遺韋保衡復言収前爲相除嚴譔江西節度使受錢百萬又置造􅂳務人訟其侵隠八月庚寅貶収端州司馬九月上疾瘳冬十二月信王􅣼薨加嶺南東道節度使韋宙同平章事資治通鑑卷第二百五十
