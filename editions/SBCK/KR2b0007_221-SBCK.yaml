body:
  text: 臣司馬光奉敕編集唐紀三十七上章困敦凡二年起屠維大淵獻盡肅宗文明武徳大聖大宣孝皇帝下之上乾元二年春正月己巳朔史思明築壇於魏州城北自稱大聖燕王以周摯為行軍司馬李光弼曰思明得魏州而按兵不進此欲使我懈惰而精銳掩吾不備也請與朔方軍同逼魏城求與之戰彼懲嘉山之敗必不敢輕出得曠日引久則鄴城必㧞矣慶緒已死彼則無辭以用其衆也魚朝恩以為不可乃止戊寅上祀九宫貴神用王璵之言也乙卯耕藉田鎮西節度使李嗣業攻鄴城為流矢所中丙申薨兵馬使荔非元禮代將其衆初嗣業表叚秀實為懐州長史知留後事時諸軍屯戍日久財竭糧盡秀實獨運芻粟募兵市馬以奉鎮西行營相繼於道二月壬子月食旣先是百官請加皇后尊號曰輔聖上以問中書舍人李揆對曰自古皇后無尊號惟韋后有之豈足為灋上驚曰庸人幾誤我㑹月食事遂寝后與李輔國相表裏横於禁中干豫政事請託無窮上頗不恱而無如之何郭子儀等九節度使圍鄴城築壘再重穿塹三重壅漳水灌之城中井泉皆溢搆棧而居自冬涉春安慶緒堅守以待史思明食盡一䑕直錢四千淘牆䴰及馬矢以食馬人皆以為克在朝夕而諸軍既無統帥進退無所禀城中人欲降者礙水深不得出城久不下上下解體思明乃自魏州引兵趣鄴使諸將去城各五十里為營每營擊鼓三百面遥脅之又每營選精騎五百日於城下抄掠官軍出即散歸其營諸軍人馬牛車日有所失樵采甚艱晝備之則夜至夜備之則晝至時天下饑饉轉餉者南自江淮西自并汾舟車相繼思明多遣壯士竊官軍装號督趣運者責其稽緩妄殺戮人運者駭懼舟車所聚則密縱火焚之往復聚散自相辨識而官軍邏捕不能察也由是諸軍乏食人思自潰思明乃引大軍直抵城下官軍與之刻日决戰三月壬申官軍步騎六十萬陳於安陽河北思明自將精兵五萬敵之諸軍望之以為遊軍未介意思明直前􅁬擊李光弼王思禮許叔冀魯炅先與之戰殺傷相半魯炅中流矢郭子儀承其後未及布陳大風忽起吹沙㧞木天地晝晦咫尺不相辨兩軍大驚官軍潰而南賊潰而北弃甲仗輜重委積於路子儀以朔方軍斷河陽橋保東京戰馬萬匹惟存三千甲仗十萬遺弃殆盡東京士民驚駭散奔山谷留守崔圎河南尹蘇震等官吏南奔襄鄧諸節度各潰歸本鎮士卒所過剽掠吏不能止旬日方定惟李光弼王思禮整勒部伍全軍以歸子儀至河陽將謀城守師人相驚又奔缺門諸將繼至衆及數萬議捐東京退保蒲陜都虞侯張用濟曰蒲陜荐飢不如守河陽賊至併力拒之子儀從之使都游弈使靈武韓遊瓌將五百騎前趣河陽用濟以步卒五千繼之周摯引兵争河陽後至不得入而去用濟役所部兵築南北兩城而守之叚秀實帥將士妻子及公私輜重自野戍度河待命於河清之南岸荔非元禮至而軍焉諸將各上表請罪上皆不問惟削崔圎階封貶蘇震為濟王府長史削銀青階史思明審知官軍潰去自沙河收整士衆還屯鄴城南安慶緒收子儀等營中糧得六七萬石與孫孝哲崔乾祐謀閉門更拒思明諸將曰今日豈可復背史王乎思明不與慶緒相聞又不南追官軍但日於軍中饗士張通儒高尚等言於慶緒曰史王逺來臣等皆應迎謝慶緒曰任公蹔往思明見之涕泣厚禮而歸之經三日慶緒不至思明密召安太清令誘之慶緒窘蹙不知所爲乃遣太清上表稱臣於思明請待解甲入城奉上璽綬思明省表曰何至如此因出表徧示將士咸稱萬歲乃手䟽唁慶緒而不稱臣且曰願爲兄弟之國更作藩籬之援鼎足而立猶或庶幾北面之禮固不敢受并封表還之慶緒大恱因請歃血同盟思明許之慶緒以三百騎詣思明營思明令軍士擐甲執兵以待之引慶緒及諸弟入至庭下慶緒再拜稽首曰臣不克荷負弃失兩都久陷重圍不意大王以太上皇之故逺垂救援使臣應死復生摩頂至踵無以報徳思明忽震怒曰弃失兩都亦何足言爾為人子殺父奪其位天地所不容吾為太上皇討賊豈受爾佞媚乎即命左右牽出并其四弟及高尚孫孝哲崔乾祐皆殺之張通儒李庭望等悉授以官思明勒兵入鄴城収其士馬以府庫賞將士慶緒先所有州縣及兵皆歸於思明遣安太清將兵五千取懐州因留鎮之思明欲遂西略慮根本未固乃留其子朝義守相州引兵還范陽甲申回紇骨啜特勒帝徳等十五人自相州奔還西京上宴之於紫宸殿賞賜有差庚寅骨啜特勒等辭還行營辛卯以荔非元禮為懐州刺史權知鎮西北庭行營節度使元禮復以叚秀實為節度判官甲午以兵部侍郎吕諲同平章事乙未以中書侍郎同平章事苖晉卿為太子太􅀓王璵為刑部尚書皆罷政事以京兆尹李峴行吏部尚書中書舎人兼禮部侍郎李揆為中書侍郎及户部侍郎第五琦並同平章事上於峴恩意尤厚峴亦以經濟為己任軍國大事多獨决於峴於是京師多盗李輔國請選羽林騎士五百以備廵邏李揆上䟽曰昔西漢以南北軍相制故周勃因南軍入北軍遂安劉氏皇朝置南北牙文武區分以相伺察今以羽林代金吾警夜忽有非常之變將何以制之乃止丙申以郭子儀為東畿山東河東諸道元帥權知東京留守以河西節度使來瑱行陜州刺史充陜虢華州節度使夏四月庚子澤潞節度使王思禮破史思明將楊旻於潞城東太子詹事李輔國自上在靈武判元帥行軍司馬事侍直帷幄宣傳詔命四方文奏寳印符契晨夕軍號一以委之及還京師專掌禁兵常居内宅制敕必經輔國押署然後施行宰相百司非時奏事皆因輔國􅀜白承旨常於銀臺門决天下事事無大小輔國口為制敕寫付外施行事畢聞奏又置察事數十人潛令於人閒聽察細事即行推按有所追索諸司無敢拒者御史臺大理寺重囚或推斷未畢輔國追詣銀臺一時縱之三司府縣鞫獄皆先詣輔國咨禀輕重隨意稱制敇行之莫敢違者宦官不敢斥其官皆謂之五郎李揆山東甲族見輔國執子弟禮謂之五父及李峴爲相於上前叩頭論制敇皆應由中書出具陳輔國專權亂政之狀上感寤賞其正直輔國所行事多所變更罷其察事輔國由是讓行軍司馬請歸本官上不許壬寅制比緣軍國務殷或宣口敇處分諸色取索及杖配囚徒自今一切並停如非正宣並不得行中外諸務各歸有司英武軍虞候及六軍諸使諸司等比來或因論競懸自追攝自今一切須經臺府如所由處斷不平聽具狀奏聞諸律令除十惡殺人姦盗造偽外餘煩冗一切刪除仍委中書門下與灋官詳定聞奏輔國由是忌峴甲辰置鄭陳亳節度使以鄧州刺史魯炅為之以徐州刺史尚衡為青密等七州節度使以興平軍節度使李奐兼豫許汝三州節度使仍各於境上守捉防禦九節度之潰於相州也魯炅所部兵剽掠尤甚聞郭子儀退屯河上李光弼還太原炅慙懼飲藥而死史思明自稱大燕皇帝改元順天立其妻辛氏為皇后子朝義為懐王以周摯為相李歸仁為將改范陽為燕京諸州為郡戊申以鴻臚卿李抱玉為鄭陳潁亳節度使抱玉安興貴之後也為李光弼禆將屢有戰功自陳恥與安禄山同姓故賜姓李氏回紇毗伽闕可汗卒長子葉䕶先遇殺國人立其少子是為登里可汗回紇欲以寜國公主為殉公主曰回紇慕中國之俗故娶中國女為婦若欲從其本俗何必結昏萬里之外邪然亦為之􅋇面而哭鳯翔馬坊押官為劫天興尉謝夷甫捕殺之其妻訟寃李輔國素出飛龍廐敇監察御史孫鎣鞫之無寃又使御史中丞崔伯陽刑部侍郎李曄大理卿權獻鞫之與鎣同妻猶不服又使侍御史太平毛若虚鞫之若虚傾巧士希輔國意歸罪夷甫伯陽怒召若虚詰責欲劾奏之若虚先自歸於上上匿若虚於􅄕下伯陽尋至言若虚附㑹中人鞫獄不直上怒叱出之伯陽貶髙要尉獻貶桂陽尉曄與鳯翔尹嚴向皆貶嶺下尉鎣除名長流播州吏部尚書同平章事李峴奏伯陽等無罪責之太重上以為朋黨五月辛巳貶峴蜀州刺史右散騎常侍韓擇木入對上謂之曰李峴欲專權今貶蜀州朕自覺用灋太寛對曰李峴言直非專權陛下寛之秪益聖徳耳若虚尋除御史中丞威振朝廷壬午以滑濮節度使許叔冀為汴州刺史充滑汴等七州節度使以試汝州刺史劉展為滑州刺史充副使六月丁巳分朔方置邠寜等九州節度使觀軍容使魚朝恩惡郭子儀因其敗短之於上秋七月上召子儀還京師以李光弼代為朔方節度使兵馬元帥士卒涕泣􅃒中使請留子儀子儀紿之曰我餞中使耳未行也因躍馬而去光弼願得親王為之副辛巳以趙王係為天下兵馬元帥光弼副之仍以光弼知諸節度行營光弼以河東騎五百馳赴東都夜入其軍光弼治軍嚴整始至號令一施士卒壁壘旌旗精彩皆變是時朔方將士樂子儀之寛憚光弼之嚴左廂兵馬使張用濟屯河陽光弼以檄召之用濟曰朔方非叛軍也乗夜而入何見疑之甚邪與諸將謀以精銳突入東京逐光弼請子儀命其士皆被甲上馬銜枚以待都知兵馬使僕固懐恩曰鄴城之潰郭公先去朝廷責帥故罷其兵柄今逐李公而彊請之違拒朝命是反也其可乎右武鋒使康元寳曰君以兵請郭公朝廷必疑郭公諷君為之是破其家也郭公百口何負於君乎用濟乃止光弼以數千騎東出汜水用濟單騎來謁光弼責用濟召不時至斬之命部將辛京杲代領其衆僕固懐恩繼至光弼引坐與語須􅁷閽者白蕃渾五百騎至矣光弼變色懐恩走出召麾下將陽責之曰語汝勿來何得固違光弼曰士卒隨將亦復何罪命給牛酒􅊨丁亥以潞沁節度使王思禮兼太原尹充北京留守河東節度使初潼闗之敗思禮馬中矢而斃有騎卒盩厔張光晟下馬授之問其姓名不告而去思禮隂識其狀貌求之不獲及至河東或譛代州刺史河西辛雲京思禮怒之雲京懼不知所出光晟時在雲京麾下曰光晟甞有徳於王公從來不敢言者恥以此取賞耳今使君有急光晟請往見王公必為使君解之雲京喜即遣之光晟謁思禮未及言思禮識之曰噫子非吾故人乎何相見之晚邪光晟以實告思禮大喜執其手流涕曰吾之有今日皆子力也吾求子久矣引與同榻坐約為兄弟光晟因從容言雲京之寃思禮曰雲京過亦不細今日特為故人捨之即日擢光晟為兵馬使贈金帛田宅甚厚辛卯以朔方節度副使殿中監僕固懐恩兼太常卿進爵大寜郡王懐恩從郭子儀為前鋒勇冠三軍前後戰功居多故賞之八月乙巳襄州將康楚元張嘉延據州作亂刺史王政奔荆楚元自稱南楚覇王回紇以寜國公主無子聽歸丙辰至京師戊午上使將軍曹日昇往襄州慰喻康楚元貶王政為饒州長史以司農少卿張光奇為襄州刺史楚元不從壬戌以李光弼為幽州長史河北節度等使九月甲午張嘉延襲破荆州荆南節度使杜鴻漸弃城走澧朗郢峽歸等州官吏聞之争潛竄山谷戊辰更令綘州鑄乾元重寳大錢加以重輪一當五十在京百官先以軍旅皆無俸祿宜以新錢給其冬料丁亥以太子少保崔光逺為荆襄招討使充山南東道處置兵馬都使以陳潁亳申節度使王仲昇為申沔等五州節度使知淮南西道行軍兵馬史思明使其子朝清守范陽命諸郡太守各將兵三千從己向河南分為四道使其將令狐彰將兵五千自黎陽濟河取滑州思明自濮陽史朝義自白臯周摯自胡良濟河㑹于汴州李光弼方廵河上諸營聞之還入汴州謂汴滑節度使許叔冀曰大夫能守汴州十五日我則將兵來救叔冀許諾光弼還東京思明至汴州叔冀與戰不勝遂與濮州刺史董秦及其將梁浦劉從諫田神功等降之思明以叔冀爲中書令與其將李詳守汴州厚待董秦收其妻子置長蘆爲質使其將南徳信與梁浦劉從諫田神功等數十人徇江淮神功南宫人也思明以爲平盧兵馬使頃之神功襲徳信斬之從諫脫身走神功將其衆來降思明乗勝西攻鄭州光弼整衆徐行至洛陽謂留守韋陟曰賊乗勝而來利在按兵不利速戰洛城不可守於公計何如陟請留兵於陜退守潼闗據險以挫其銳光弼曰兩敵相當貴進忌退今無故弃五百里地則賊勢益張矣不若移軍河陽北連澤潞利則進取不利則退守表裏相應使賊不敢西侵此猿臂之勢也夫辨朝廷之禮光弼不如公論軍旅之事公不如光弼陟無以應判官韋損曰東京帝宅侍中柰何不守光弼曰守之則氾水崿嶺龍門皆應置兵子為兵馬判官能守之乎遂移牒留守韋陟使帥東京官屬西入闗牒河南尹李若幽使帥吏民出城避賊空其城光弼帥軍士運油鐵諸物詣河陽為守備光弼以五百騎殿時思明逰兵已至石橋諸將請曰今自洛城而北乎當石橋而進乎光弼曰當石橋而進及日暮光弼秉炬徐行部曲堅重賊引兵躡之不敢逼光弼夜至河陽有兵二萬糧纔支十日光弼按閱守備部分士卒無不嚴辦庚寅思明入洛陽城空無所得畏光弼掎其後不敢入宫退屯白馬寺南築月城於河陽南以拒光弼於是鄭滑等州相繼陷沒韋陟李若幽皆寓治於陜冬十月丁酉下制親征史思明羣臣上表諫乃止史思明引兵攻河陽使驍將劉龍仙詣城下挑戰龍仙恃勇舉右足加馬鬛上慢罵光弼光弼顧諸將曰誰能取彼者僕固懐恩請行光弼曰此非大將所為左右言禆將白孝徳可往光弼召問之孝徳請行光弼問須幾何兵對曰請挺身取之光弼壯其志然固問所須對曰願選五十騎出壘門為後繼兼請大軍助鼔譟以増氣光弼撫其背而遣之孝徳挾二矛策馬亂流而進半涉懐恩賀曰克矣光弼曰鋒未交何以知之懐恩曰觀其攬轡安閑知其萬全龍仙見其獨來甚易之稍近將動孝徳揺手示之若非來為敵者龍仙不測而止去之十步乃與之言龍仙慢罵如初孝徳息馬良久因瞋目謂曰賊識我乎龍仙曰誰也曰我白孝徳也龍仙曰是何狗彘孝徳大呼運矛躍馬􅅮之城上鼔譟五十騎繼進龍仙矢不及發環走堤上孝徳追及斬首􅂝之以歸賊衆大駭孝徳本安西胡人也思明有良馬千餘匹每日出於河南渚思明復攻河陽光弼謂鄭陳節度使李抱玉曰將軍能為我守南城二日乎抱玉曰過期何如光弼曰過期救不至任弃之抱玉許諾勒兵拒守城且陷抱玉紿之曰吾糧盡明旦當降賊喜歛軍以待之抱玉繕完成備明日復請戰賊怒急攻之抱玉出奇兵表裏夾擊殺傷甚衆董秦從思明宼河陽夜帥其衆五百㧞柵突圍降于光弼時光弼自將屯中潬城外置柵柵外穿壍深廣二丈乙巳賊將周摯捨南城併力攻中潬光弼命荔非元禮出勁卒於羊馬城以拒賊光弼自於城東北隅建小朱旗以望賊賊恃其衆直進逼城以車載攻具自隨督衆填壍三面各八道以過兵又開柵為門光弼望賊逼城使問元禮曰中丞視賊填壍開柵過兵晏然不動何也元禮曰司空欲守乎戰乎光弼曰欲戰元禮曰欲戰則賊為吾填壍何為禁之光弼曰善吾所不及勉之元禮俟柵開帥敢死士突出擊賊却走數百步元禮度賊陳堅未易摧陷乃復引退須其怠而擊之光弼望見元禮退怒遣左右召欲斬之元禮曰戰正急召何為乃退入柵中賊亦不敢逼良久鼔譟出柵門􅁬擊破之周摯復收兵趣北城光弼遽帥衆入北城登城望賊曰賊兵雖多囂而不整不足畏也不過日中保為諸軍破之乃命諸將出戰及期不决召諸將問曰向來賊陳何方最堅曰西北隅光弼命其將郝廷玉當之廷玉請􅀐兵五浴之循環不休以示多光弼命索軍中牝馬得五百匹縶其駒於城内俟思明馬至水際盡出之馬嘶不巳思明馬悉浮渡河一時驅之入城思明怒列戰船數百艘泛火船於前而隨之欲乗流燒浮橋光弼先貯百尺長竿數百枚以巨木承其根氊裹鐡叉置其首以迎火船而叉之船不得進須􅁷自焚盡又以叉拒戰船於橋上發礮石擊之中者皆沉沒賊不勝而去思明見兵於河清欲絶光弼糧道光弼軍于野水度以備之旣夕還河陽留兵千人使部將雍希顥守其柵曰賊將高庭暉李日越喻文景皆萬人敵也思明必使一人來劫我我且去之汝待於此若賊至勿與之戰降則與之俱來諸將莫諭其意皆竊笑之既而思明果謂李日越曰李光弼長於憑城今出在野此成擒矣汝以鐵騎宵濟為我取之不得則勿返日越將五百騎晨至柵下希顥阻壕休卒吟嘯相視日越怪之問曰司空在乎曰夜去矣兵幾何曰千人將誰曰雍希顥日越黙計久之謂其下曰今失李光弼得希顥而歸吾死必矣不如降也遂請降希顥與之俱見光弼光弼厚待之任以心腹高庭暉聞之亦降或問光弼降二將何易也光弼曰此人情耳思明常恨不得野戰聞我在外以為必可取日越不獲我勢不敢歸庭暉才勇過於日越聞日越被寵任必思奪之矣庭暉時為五臺府果毅己亥以庭暉為右武衛大將軍百與之三百又問其次堅者曰東南隅光弼命其將論惟貞當之惟貞請鐵騎三百與之二百光弼令諸將曰爾輩望吾旗而戰吾颭旗緩任爾擇利而戰吾急颭旗三至地則萬衆齊入死生以之少退者斬又以短刀置鞾中曰戰危事吾國之三公不可死賊手萬一戰不利諸君前死於敵我自剄於此不令諸君獨死也諸將出戰頃之廷玉奔還光弼望之驚曰廷玉退吾事危矣命左右取廷玉首廷玉曰馬中箭非敢退也使者馳報光弼令易馬遣之僕固懐恩及其子開府儀同三司瑒戰小却光弼又命取其首懐恩父子顧見使者提刀馳來更前决戰光弼連颭其旗諸將齊進致死呼聲動天地賊衆大潰斬首千餘級捕虜五百人溺死者千餘人周摯以數騎遁去擒其大將徐璜玉李秦授其河南節度使安太清走保懐州思明不知摯敗尚攻南城光弼驅俘囚臨河示之乃遁丁巳以李日越為右金吾大將軍卭簡嘉眉瀘戎等州蠻反十一月甲子以殿中監董秦為陜西神策兩軍兵馬使賜姓李名忠臣康楚元等衆至萬餘人商州刺史充荆襄等道租庸使韋倫發兵討之駐於鄧之境招諭降者厚撫之伺其稍怠進軍擊之生擒楚元其衆遂潰得其所掠租庸二百萬緡荆襄皆平倫見素之從祖弟也發安西北庭兵屯陜以備史思明第五琦作乾元錢重輪錢與開元錢三品並行民争盗鑄貨輕物重榖價騰踊餓殍相望上言者皆歸咎於琦庚午貶琦忠州長史御史大夫賀蘭進明貶溱州貟外司馬坐琦黨也十二月甲午吕諲領度支使乙巳韋倫送康楚元詣闕斬之史思明遣其將李歸仁將鐵騎五千冦陜州神策兵馬使衛伯玉以數百騎擊破之於礓子坂得馬六百匹歸仁走以伯玉為鎮西四鎮行營節度使李忠臣與歸仁等戰於永寜莎柵之閒屢破之上元元年春正月辛巳以李光弼為太尉兼中書令餘如故丙戍以于闐王勝之弟曜同四鎮節度副使權知本國事党項等羌吞噬邊鄙將逼京畿乃分邠寜等州節度為鄜坊丹延節度亦謂之渭北節度以邠州刺史桑如珪領邠寧鄜州刺史杜冕領鄜坊節度副使分道招討戊子以郭子儀領兩道節度使留京師假其威名以鎮之上祀九宫貴神二月李光弼攻懐州史思明救之癸卯光弼逆戰於沁水之上破之斬首三千餘級忠州長史第五琦既行或告琦受人金二百兩遣御史劉期光追按之琦曰琦備位宰相二百兩金不可手挈若付受有憑請準律科罪期光即奏琦已服罪庚戍琦坐除名長流夷州三月甲申改蒲州為河中府庚寅李光弼破安太清於懐州城下夏四月壬辰破史思明於河陽西渚斬首千五百餘級襄州將張維瑾曹玠殺節度使史翽據州反制以隴州刺史韋倫為山南東道節度使時李輔國用事節度使皆出其門倫既朝廷所除又不謁輔國尋改秦州防禦使己未以陜西節度使來瑱為山南東道節度使瑱至襄州張維瑾等皆降閏月丁夘加河東節度使王思禮為司空自武徳以來思禮始不為宰相而拜三公甲戍徙趙王係為越王己卯赦天下改元追謚太公望為武成王選歷代名將為亞聖十哲其中祀下祀并雜祀一切並停是日史思明入東京五月丙午以太子太􅀓苖晉卿行侍中晉卿練達吏事而謹身固位時人比之胡廣宦者馬上言受賂為人求官於兵部侍郎同中書門下三品吕諲諲為之􅀘官事覺上言杖死壬子諲罷為太子賔客癸丑以京兆尹南華劉晏為户部侍郎充度支鑄錢鹽鐵等使晏善治財利故用之六月甲子桂州經略使邢濟奏破西原蠻二十萬衆斬其帥黄乾曜等乙丑鳯翔節度使崔光逺奏破涇隴羌渾十餘萬衆三品錢行浸久屬歲荒米斗至七千錢人相食京兆尹鄭叔清捕私鑄錢者數月閒榜死者八百餘人不能禁乃敇京畿開元錢與乾元小錢皆當十其重輪錢當三十諸州更俟進止是時史思明亦鑄順天得一錢一當開元錢百賊中物價尤貴甲申興王佋薨佋張后長子也幼曰定王侗張后以故數欲危太子太子常以恭遜取容㑹佋薨侗尚幼太子位遂定乙酉鳯翔節度使崔光逺破党項於普閏平盧兵馬使田神功奏破史思明之兵於鄭州上皇愛興慶宫自蜀歸即居之上時自夾城往起居上皇亦間至大明宫左龍武大將軍陳玄禮内侍監高力士久侍衛上皇上又命玉真公主如仙媛内侍王承恩魏恱及梨園弟子常娯侍左右上皇多御長慶樓父老過者往往瞻拜呼萬歲上皇常於樓下置酒食賜之又甞召將軍郭英乂等上樓賜宴有劒南奏事官過樓下拜舞上皇命玉真公主如仙媛為之作主人李輔國素微賤雖暴貴用事上皇左右皆輕之輔國意恨且欲立奇功以固其寵乃言於上曰上皇居興慶宫日與外人交通陳玄禮髙力士謀不利於陛下今六軍將士盡靈武勲臣皆反仄不安臣曉諭不能解不敢不以聞上泣曰聖皇慈仁豈容有此對曰上皇固無此意其如羣小何陛下為天下主當為社稷大計消亂於未萌豈得徇匹夫之孝且興慶宫與閭閻相参垣墉淺露非至尊所宜居大内深嚴奉迎居之與彼何殊又得杜絶小人熒惑聖聽如此上皇享萬歲之安陛下有三朝之樂庸何傷乎上不聽興慶宫先有馬三百匹輔國矯敇取之纔留十匹上皇謂髙力士曰吾兒為輔國所惑不得終孝矣輔國又令六軍將士號哭叩頭請迎上皇居西内上泣不應輔國懼㑹上不豫秋七月丁未輔國矯稱上語迎上皇逰西内至睿武門輔國將射生五百騎露刃遮道奏曰皇帝以興慶宫湫隘迎上皇遷居大内上皇驚幾墜高力士曰李輔國何得無禮叱令下馬輔國不得已而下力士因宣上皇誥曰諸將士各好在將士皆納刃再拜萬歲力士又叱輔國與己共執上皇馬鞚侍衛如西内居甘露殿輔國帥衆而退所留侍衛兵纔尪老數十人陳玄禮高力士及舊宫人皆不得留左右上皇曰興慶宫吾之王地吾數以讓皇帝皇帝不受今日之徙亦吾志也是日輔國與六軍大將素服見上請罪上又廹於諸將乃勞之曰南宫西内亦復何殊卿等恐小人熒惑防㣲杜漸以安社稷何所懼也刑部尚書顔真卿首帥百寮上表請問上皇起居輔國惡之奏貶蓬州長史癸丑敕天下重稜錢皆當三十如畿内丙辰高力士流巫州王承恩流播州魏恱流溱州陳玄禮勒致仕置如仙媛於歸州玉真公主出居玉真觀上更選後宫百餘人置西内備灑掃令萬安咸宜二公主視服膳四方所獻珍異先薦上皇然上皇日以不懌因不茹葷辟榖浸以成疾上初猶往問安既而上亦有疾但遣人起居其後上稍悔寤惡輔國欲誅之畏其握兵竟猶豫不能决初哥舒翰破吐蕃於臨洮西闗磨環川於其地置神策軍及安祿山反軍使成如璆遣其將衛伯玉將千人赴難既而軍地淪入吐蕃伯玉留屯於陜累官至右羽林大將軍八月庚午以伯玉為神策軍節度使丁亥贈謚興王佋曰恭懿太子九月甲午置南都於荆州以荆州為江陵府仍置永平軍團練兵三千人以扼呉蜀之衝從節度使吕諲之請也或上言天下未平不宜置郭子儀於散地乙未命子儀出鎮邠州党項遁去戊申制子儀統諸道兵自朔方直取范陽還定河北發射生英武等禁軍及朔方鄜坊邠寜涇原諸道蕃漢兵共七萬人皆受子儀節度制下旬日復為魚朝恩所沮事竟不行冬十月丙子置青沂等五州節度使十一月壬辰涇州破党項御史中丞李銑宋州刺史劉展皆領淮西節度副使銑貪暴不灋展剛彊自用故為其上者多惡之節度使王仲昇先奏銑罪而誅之時有謡言曰手執金刀起東方仲昇使監軍使内左常侍邢延恩入奏展倔彊不受命姓名應謡䜟請除之延恩因說上曰展與李銑一體之人今銑誅展不自安茍不去之恐其為亂然展方握彊兵宜以計去之請除展江淮都統代李峘俟其釋兵赴鎮中道執之此一夫力耳上從之以展為都統淮南東江南西浙西三道節度使密敇舊都統李峘及淮南東道節度使鄧景山圗之延恩以制書授展展疑之曰展自陳留參軍數年至刺史可謂暴貴矣江淮租賦所出今之重任展無勲勞又非親賢一旦恩命寵擢如此得非有䜛人間之乎因泣下延恩懼曰公素有才望主上以江淮為憂故不次用公公反以為疑何哉展曰事茍不欺印節可先得乎延恩曰可乃馳詣廣陵與峘謀解峘印節以授展展得印節乃上表謝恩牒追江淮親舊置之心膂三道官屬遣使迎賀申圗籍相望於道展悉舉宋州兵七千趣廣陵延恩知展已得其情還奔廣陵與李峘鄧景山􅀤兵拒之移檄州縣言展反展亦移檄言峘反州縣莫知所從峘引兵度江與副使潤州刺史韋儇浙西節度使矦令儀屯京口鄧景山將萬人屯徐城展素有威名御軍嚴整江淮人望風畏之展倍道先期至使人問景山曰吾奉詔書赴鎮此何兵也景山不應展使人呼於陳前曰汝曹皆吾民也勿干吾旗鼔使其將孫待封張灋雷擊之景山衆潰與延恩奔夀州展引兵入廣陵遣其將屈突孝摽將兵三千徇濠楚王暅將兵四千略淮西李峘闢北固為兵場挿木以塞江口展軍於白沙設疑兵於􅀲洲多張火鼔若將趣北固者如是累日峘悉銳兵守京口以待之展乃自上流濟襲下蜀峘軍聞之自潰峘奔宣城甲午展陷潤州昇州軍士萬五千人謀應展攻金陵城不克而遁矦令儀懼以後事授兵馬使姜昌羣弃城走昌羣遣其將宗犀詣展降丙申展陷昇州以宗犀為潤州司馬丹陽軍使使昌羣領昇州以從子伯瑛佐之李光弼攻懐州百餘日乃㧞之生擒安太清史思明遣其將田承嗣將兵五千徇淮西王同芝將兵三千人徇陳許敬江將二千人徇兖鄆薛鄂將五千人徇曹州十二月丙子党項冦美原華原同官大掠而去賊帥郭愔等引諸羌胡敗秦隴防禦使韋倫殺監軍使兖鄆節度使能元皓擊史思明兵破之李峘之去潤州也副使李蔵用謂峘曰處人尊位食人重祿臨難而逃之非忠也以數十州之兵食三江五湖之險固不發一矢而弃之非勇也失忠與勇何以事君蔵用請收餘兵竭力以拒之峘乃悉以後事授蔵用藏用收散卒得七百人東至蘇州募壯士得二千人立柵以拒劉展展遣其將傅子昻宗犀攻宣州宣歙節度使鄭炅之弃城走李峘奔洪州李藏用與展將張景超孫待封戰於郁墅兵敗奔杭州景超遂據蘇州待封進陷湖州展以其將許嶧為潤州刺史李可封為常州刺史揚持璧蘇州刺史待封領湖州事景超進逼杭州藏用使其將温晁屯餘杭展以李晃為泗州刺史宗犀為宣州刺史􅀓子昻屯南陵將下江州徇江西於是屈突孝摽陷濠楚州王暅陷舒和滁廬等州所向無不摧靡聚兵萬人騎三千横行江淮閒壽州刺史崔昭發兵拒之由是暅不得西止屯廬州初上命平盧都知兵馬使田神功將所部精兵三千屯任城鄧景山既敗與邢延恩奏乞敕神功救淮南未報景山遣人趣之且許以淮南金帛子女為賂神功及所部皆喜悉衆南下及彭城敇神功討展展聞之始有懼色自廣陵將兵八千拒之選精兵二千度淮擊神功於都梁山展敗走至天長以五百騎據橋拒戰又敗展獨與一騎亡度江神功入廣陵及楚州大掠殺啇胡以千數城中地穿掘略徧是歲吐蕃陷廓州資治通鑑卷第二百二十一
