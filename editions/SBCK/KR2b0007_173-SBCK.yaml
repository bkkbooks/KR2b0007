front:
  text: 資治通鑑巻第一百七十三
  hash: sha256:cee10561e9557440d586e712666d0edd0fa111c7328106adec3510ed9edf4bac
body:
  text: 臣司馬光奉勑編集陳紀七維大淵獻凡三年起強圉作噩盡屠髙宗宣皇帝中之下太建九年春正月乙亥朔齊太子􅁪即皇帝位生八年矣改元承光大赦尊齊主為太上皇帝皇太后為太皇太后皇后為太上皇后以廣寧王孝珩為太宰司徒莫多婁敬顯領軍大將軍尉相願謀伏兵千秋門斬髙阿那肱立廣寧王孝珩㑹阿那肱自它路入朝不果孝珩求拒周師謂阿那肱等曰朝廷不賜遣擊賊豈不畏孝珩反邪孝珩若破宇文邕遂至長安反亦何預國家事以今日之急猶如此猜忌邪髙韓恐其爲變出孝珩爲滄州刺史相願拔佩刀斫柱歎曰大事去矣知復何言齊主使長樂王尉丗辯帥千餘騎覘周師出􅇭口登髙阜西望遥見羣烏飛起謂是西軍旗幟即馳還比至紫陌橋不敢回顧丗辯粲之子也於是黃門侍郎顔之推中書侍郎薛道衡侍中陳徳信等勸上皇往河外募兵更爲經略若不濟南投陳國從之道衡孝通之子也丁丑太皇太后太上皇后自鄴先趣濟州癸未㓜主亦自鄴東行己丑周師至紫陌橋辛卯上祭北郊壬辰周師至鄴城下癸巳圍之燒城西門齊人出戰周師奮擊大破之齊上皇從百騎東走使武衛大將軍慕容三藏守鄴宫周師入鄴齊王公以下皆降三藏猶拒戰周主引見禮之拜儀同大將軍三藏紹宗之子也領軍大將軍漁陽鮮于世榮齊髙祖舊將也周主先以馬腦酒鍾遺之世榮得即碎之周師入鄴世榮在三臺前鳴鼓不輟周人執之世榮不屈乃殺之周主執莫多婁敬顯數之曰汝有死罪三前自晉陽走鄴􅂝妾弃母不孝也外為偽朝勠力内實通啓於朕不忠也送款之後猶持兩端不信也用心如此不死何待遂斬之使將軍尉遲勤追齊主甲午周主入鄴齊國子博士長樂熊安生博通五經聞周主入鄴遽令掃門家人怪而問之安生曰周帝重道尊儒必將見我俄而周主幸其家不聽拜親執其手引與同坐賞賜甚厚給安車駟馬以自隨又遣小司馬唐道和就中書侍郎李徳林宅宣㫖慰諭曰平齊之利唯在於爾引入宫使内史宇文昂訪問齊朝風俗政教人物善惡即留内省三宿乃歸乙未齊上皇度河入濟州是日㓜主禪位於大丞相任城王湝又為湝詔尊上皇為無上皇糿主為宋國天王令侍中斛律孝卿送禪文及璽紱於瀛州孝卿即詣鄴周主詔去年大赦所未及之處皆從赦例齊洛州刺史獨孤永業有甲士三萬聞晉州敗請出兵擊周奏寢不報永業憤慨又聞并州陷乃遣子須逹請降於周周以永業為上柱國封應公丙申周以越王盛為相州揔管齊上皇留胡太后於濟州使髙阿那肱守濟州關覘候周師自與穆后馮淑妃㓜主韓長鸞鄧長顒等數十人奔青州使内參田鵬鸞西出參伺動静周師獲之問齊主何在紿云已去計當出境周人疑其不信捶之每折一支辭色愈厲竟折四支而死上皇至青州即欲入陳而髙阿那肱密召周師約生致齊主屢啓云周師尚逺已令燒斷橋路上皇由是淹留自寛周師至關阿那肱即降之周師奄至青州上皇囊金繫於鞍後與后妃㓜主等十餘騎南走己亥至南鄧村尉遲勤追及盡擒之并胡太后送鄴庚子周主詔故斛律光崔季舒等宜追加贈諡并為改葬子孫各隨䕃叙錄家口田宅沒官者並還之周主指斛律光名曰此人在朕安得至鄴辛丑詔齊之東山南園三臺並可毁撤瓦木諸物可用者悉以賜民山園之田各還其主二月壬午上耕籍田丙午周主宴從官將士於齊太極殿頒賞有差丁未高緯至鄴周主降階以賔禮見之齊廣寧王孝珩至滄州以五千人㑹任城王湝於信都共謀匡復召募得四萬餘人周主使齊王憲柱國楊堅擊之令髙緯為手書招湝湝不從憲軍至趙州湝遣二諜覘之候騎執以白憲憲集齊舊將遍示之謂曰吾所争者大不在汝曹今縱汝還仍充吾使乃與湝書曰足下諜者為候騎所拘軍中情實具諸執事戰非上計無待卜疑守乃下䇿或未相許已勒諸軍分道並進相望非逺憑軾有期不俟終日所望知機也憲至信都湝陳於城南以拒之湝所署領軍尉相願詐出略陳遂以衆降相願湝心腹也衆皆駭懼湝殺相願妻子明日復戰憲擊破之俘斬三萬人執湝及廣寧王孝珩憲謂湝曰任城王何苦至此湝曰下官神武皇帝之子兄弟十五人幸而獨存逄宗社顚覆今日得死無愧墳陵憲壯之命歸其妻子又親為孝珩洗瘡傅藥禮遇甚厚孝珩歎曰自神武皇帝以外吾諸父兄弟無一人至四十者命也嗣君無獨見之明宰相非柱石之寄恨不得握兵符受斧􅃏展我心力耳齊王憲善用兵多謀略得將士心齊人憚其威聲皆望風沮潰芻牧不擾軍無私焉周主以齊降將封輔相為北朔州揔管北朔州齊之重鎭士卒驍勇前長史趙穆等謀執輔相迎任城王湝於瀛州不果乃迎定州刺史范陽王紹義紹義至馬邑自肆州以北二百八十餘城皆應之紹義與靈州刺史袁洪猛引兵南出欲取并州至新興而肆州已為周守前隊二儀同以所部降周周兵擊顯州執刺史陸瓊復攻㧞諸城紹義還保北朔州周東平公神舉將兵逼馬邑紹義戰敗北奔突厥猶有衆三千人紹義令曰欲還者從其意於是辭去者太半突厥佗鉢可汗常謂齊顯祖為英雄天子以紹義重踝似之甚見愛重凡齊人在北者悉以􅀠之於是齊之行臺州鎮唯東雍州行臺傅伏營州刺史髙寳寧不下其餘皆入於周凡得州五十郡一百六十二縣三百八十戸三百三萬二千五百髙寳寧者齊之踈屬有勇略乆鎭和龍甚得夷夏之心周主於河陽幽青南兖豫徐北朔定置揔管府相并二州各置宫及六府官周師之克晉陽也齊使開府儀同三司紇奚永安求救於突厥比至齊已亡佗鉢可汗處永安於吐谷渾使者之下永安言於佗鉢曰今齊國旣亡永安何用餘生欲閉氣自絶恐天下謂大齊無死節之臣乞賜一刀以顯示逺近佗鉢嘉之贈馬七十匹而歸之梁主入朝于鄴自秦兼天下無朝覲之禮至是始命有司草具其事致積致餼設九儐九介受享於廟三公三孤六卿致食勞賔還贄致享皆如古禮周主與梁主宴酒酣周主自彈琵琶梁王起舞曰陛下既親撫五絃臣何敢不同百獸周主大悦賜賚甚厚乙卯周主自鄴西還三月壬午周詔山東諸軍各舉明經幹治者二人若竒才異術卓爾不羣者不拘此數周主之檎尉相貴也招齊東雍州刺史傅伏伏不從齊人以伏爲行臺右僕射周主既克并州復遣韋孝寛招之令其子以上大將軍武鄉公告身及金馬腦二酒鍾賜伏爲信伏不受謂孝寛曰事君有死無貳此兒爲臣不能竭忠爲子不能盡孝人所讎疾願速斬之以令天下周主自鄴還至晉州遣髙阿那肱等百餘人臨汾水召伏伏出軍隔水見之問至尊今何在阿那肱曰已被擒矣伏仰天大哭帥衆入城於聽事前北靣哀號良久然後降周主見之曰何不早下伏流涕對曰臣三世為齊臣食齊禄不能自死羞見天地周主執其手曰為臣當如此乃以所食羊肋骨賜伏曰骨親肉踈所以相付遂引使宿衛授上儀同大將軍敕之曰若亟與公高官恐歸附者心動努力事朕勿憂富貴佗日又問前救河隂得何賞對曰蒙一轉授特進永昌郡公周主謂髙緯曰朕三年教戰决取河隂正為傳伏善守城不可動遂歛軍而退公當時賞功何其薄也夏四月乙巳周主至長安置髙緯於前列其王公等於後車輿旗幟器物以次陳之備大駕布六軍奏凱樂獻俘於太廟觀者皆稱萬歳戊申封髙緯為温公齊之諸王三十餘人皆受封爵周主與齊君臣飲酒令温公起舞髙延宗悲不自持屢欲仰藥其􅀓婢禁止之周主以李德林為内史上士自是詔誥格式及用山東人物並以委之帝從容謂羣臣曰我常日唯聞李徳林名復見其為齊朝作詔書移檄正謂是天上人豈言今日得其驅使神武公紇豆陵毅對曰臣聞麒麟鳯皇為王者瑞可以德感不可力致麒麟鳯皇得之無用豈如徳林為瑞且有用哉帝大笑曰誠如公言己巳周主享太廟五月丁丑周以譙王儉為大冡宰庚辰以􅂎公亮為大司徒鄭公逹奚震為大宗伯梁公矦莫陳芮為大司馬應公獨孤永業為大司㓂鄭公韋孝寛為大司空己丑周主祭方丘詔以路寢㑹義崇信含仁雲和思齊諸殿皆晉公䕶專政時所為事窮壯麗有踰清廟悉可毁撤彫斵之物並賜貧民繕造之宜務從卑朴戊戊又詔并鄴諸堂殿壯麗者凖此臣光曰周髙祖可謂善處勝矣佗人勝則益奢髙祖勝而愈儉六月丁卯周主東廵秋七月丙戍幸洛州八月壬寅議定權衡度量頒於四方初魏虜西凉之人沒為􅀠戸齊氏因之仍供厮役周主滅齊欲施寛惠詔曰罪不及嗣古有定科雜役之徒獨異常憲一從罪配百代不免罰既無窮刑何以措凡諸雜戸悉放為民自是無復雜戸甲子鄭州獲九尾狐已死獻其骨周主曰瑞應之來必彰有徳若五品時叙四海和平乃能致此今無其時恐非實録命焚之九月戊寅周制庶人已上唯聽衣綢綿綢絲布絹綾紗絹綃葛布等九種餘悉禁之朝祭之服不拘此制冬十月戊申周主如鄴上聞周人滅齊欲争徐兖詔南兖州刺史司空吳明徹督諸軍伐之以其世子戎昭將軍惠覺攝行州事明徹軍至呂梁周徐州揔管梁士彦帥衆拒戰戊午明徹擊破之士彦嬰城自守明徹圍之帝鋭意以為河南指麾可定中書通事舎人蔡景歴諫曰師老將驕不宜過窮逺略帝怒以爲沮衆出為豫章内史未行有飛章劾景厯在省贓汙狼籍坐免官削爵土周改葬徳皇帝於冀州周主服縗哭於太極殿百官素服周人誣温公髙緯與宜州刺史穆提婆謀反并其宗族皆賜死衆人多自陳無之髙延宗獨攘袂泣而不言以椒塞口而死唯緯弟仁英以清狂仁雅以瘖疾得免徙於蜀其餘親屬不殺者散配西土皆死於邊裔周主以高湝妻盧氏賜其將斛斯徴盧氏蓬首垢面長齋不言笑徴放之乃為尼齊后妃貧者至以賣燭為業十一月壬申周立皇子衍為道王兊為蔡王癸酉周遣上大將軍王軌將兵救徐州初周人敗齊師於晉州乗勝逐北齊人所弃甲仗未暇收歛稽胡乗閒竊出並盜而有之仍立劉蠡升之孫沒鐸爲主號聖武皇帝改元石平周人既克關東將討稽胡議欲窮其巢穴齊王憲曰歩落稽種類既多又山谷險絶王師一舉未可盡除且當翦其魁首餘加慰撫周主從之以憲爲行軍元帥督諸軍討之至馬邑分道俱進沒鐸分遣其黨天柱守河東穆支守河西據險以拒之憲命譙王儉撃天柱滕王逌擊穆支並破之斬首萬餘級趙王招撃沒鐸擒之餘衆皆降周詔自永熈三年以來東土之民掠爲奴婢及克江陵之日良人沒爲奴婢者並放爲良又詔後宫唯置妃二人丗婦三人御妻三人此外皆減之周主性節儉常服布袍寢布被後宫不過十餘人每行兵親在行陳歩渉山谷人所不堪撫將士有恩而明察果斷用法嚴峻由是將士畏威而樂為之死己亥晦日有食之周初行刑書要制羣盗贓一匹及正長隱五丁若地頃以上皆死十二月戊申新作東宫成太子徙居之庚申周主如并州移并州軍民四萬戸於關中戊辰廢并州宫及六府髙寳寧自黄龍上表勸進於髙紹義紹義遂稱皇帝改元武平以寳寧為丞相突厥佗鉢可汗舉兵助之十年春正月壬午周主幸鄴辛卯幸懷州癸巳幸洛州置懷州宫二月甲辰周譙孝王儉卒丁巳周主還長安吳明徹圍周彭城環列舟艦於城下攻之甚急王軌引兵輕行據淮口結長圍以鐵鎻貫車輪數百沈之清水以遏陳船歸路軍中忷懼譙州刺史蕭摩訶言於明徹曰聞王軌始鎻下流其兩端築城今尚未立公若見遣擊之彼必不敢相拒水路未斷賊勢不堅彼城若立則吾屬必為虜矣明徹奮髯曰塞旗陷陳將軍事也長筭逺略老夫事也摩訶失色而退一旬之間水路遂斷周兵益至諸將議破堰㧞軍以舫載馬而去馬主裴子烈曰若決堰下船船必傾倒不如前遣馬出時明徹苦背疾甚篤蕭摩訶復請曰今求戰不得進退無路若濳軍突圍未足為恥願公帥歩卒乗馬轝徐行摩訶領鐵騎數千驅馳前後必當使公安逹京邑明徹曰弟之此䇿乃良圖也然歩軍既多吾為揔督必須身居其後相帥兼行弟馬軍宜須在前不可遲緩摩訶因帥馬軍夜發甲子明徹决堰乗水勢退軍冀以入淮至清口水勢漸微舟艦並礙車輪不復得過王軌引兵圍而蹙之衆潰明徹為周人所執將士三萬并器械輜重皆沒於周蕭摩訶以精騎八千居前突圍衆騎繼之比旦逹淮南與將軍任忠周羅􅙖獨全軍得還初帝謀取彭汴以問五兵尚書毛喜對曰淮左新平邊民未輯周氏始吞齊國難與爭鋒且弃舟艥之工踐車騎之地去長就短非吳人所便臣愚以為不若安民保境寢兵結好斯久長之術也及明徹敗帝謂喜曰卿言驗於今矣即日召蔡景厯復以為征南諮議參軍周主封吳明徹為懷徳公位大將軍明徹憂憤而卒乙丑周以越王盛為大冢宰三月戊辰周於蒲州置宫廢同州及長春二宫甲戍周主初服常冠以皁紗全幅向後襆髪仍裁為四脚丙子命中軍大將軍開府儀同三司淳于量為大都督揔水陸諸軍事鎭西將軍孫瑒都督荆郢諸軍平北將軍樊毅都督清口上至荆山緣淮諸軍寧逺將軍任忠都督壽陽新蔡霍州諸軍以備周乙酉大赦壬辰周改元宣政夏四月庚申突厥寇周幽州殺掠吏民戊午樊毅遣軍度淮北對清口築城壬戍清口城不守五月己丑周髙祖帥諸軍伐突厥遣柱國原公姬願東平公神舉等將兵五道俱入癸巳帝不豫留止雲陽宫丙申詔停諸軍驛召宗師宇文孝伯赴行在所帝執其手曰吾自量必無濟理以後事付君是夜授孝伯司衛上大夫揔宿衛兵又令馳驛入京鎭守以備非常六月丁酉朔帝疾甚還長安是夕殂年三十六戊戍太子即位尊皇后阿史那氏為皇太后宣帝始立即逞奢欲大行在殯曽無戚容捫其杖痕大罵曰死晚矣閲視高祖宫人逼為淫欲超拜吏部下大夫鄭譯為開府儀同大將軍内史中大夫委以朝政己未葬武皇帝於孝陵廟號髙祖既葬詔内外公除帝及六宫皆議即吉京兆郡丞樂運上䟽以為葬期既促事訖即除太為汲汲帝不從帝以齊煬王憲屬尊望重忌之謂宇文孝伯曰公能為朕圖齊王當以其官相授孝伯叩頭曰先帝遺詔不許濫誅骨肉齊王陛下之叔父功髙徳茂社稷重臣陛下若無故害之臣又順㫖曲從則臣為不忠之臣陛下為不孝之子矣帝不懌由是踈之乃與開府儀同大將軍于智鄭譯等密謀之使智就宅􅀱憲因告憲有異謀甲子帝遣宇文孝伯語憲欲以憲為太師憲辭讓又使孝伯召憲曰晩與諸王俱入既至殿門憲獨被引進帝先伏壯士於别室至即執之憲自辨理帝使于智證憲憲目光如炬與智相質或謂憲曰以王今日事勢何用多言憲曰死生有命寧復圖存但老母在堂恐留兹恨耳因擲笏於地遂縊之帝召憲僚屬使證成憲罪參軍勃海李綱誓之以死終無撓辭有司以露車載憲尸而出故吏皆㪚唯李綱撫棺號慟躬自瘞之哭拜而去又殺上大將軍王興上開府儀同大將軍獨孤熊開府儀同大將軍豆盧紹皆素與憲親善者也帝既誅憲而無名乃云與興等謀反時人謂之伴死以于智爲柱國封齊公以賞之閏月乙亥周主立妃楊氏爲皇后辛巳周以趙王招爲太師陳王純爲太傅齊范陽王紹義聞周髙祖殂以爲得天助幽州人盧昌期起兵據范陽迎紹義紹義引突厥兵赴之周遣柱國東平公神舉將兵討昌期紹義聞幽州揔管出兵在外欲乗虛襲葪神舉遣大將軍宇文恩將四千人救之半為紹義所殺㑹神舉克范陽擒昌期紹義聞之素衣舉哀還入突厥髙寳寧帥夷夏數萬騎救范陽至潞水聞昌期死還據和龍秋七月周主享太廟丙午祀圜丘庚戍周以小宗伯斛律徴為大宗伯壬戍以亳州揔管楊堅為上柱國大司馬癸亥周主尊所生母李氏為帝太后八月丙寅周主祀西郊壬申如同州以大司徒􅂎公亮為安州揔管上柱國長孫覽為大司徒楊公王誼為大司空丙戍以柱國永昌公椿爲大司㓂九月乙巳立方明壇於婁湖戊申以楊州刺史始興王叔陵為王官伯臨盟百官庚戍周主封其弟元爲荆王周主詔諸應拜者皆以三拜成禮甲寅上幸婁湖誓衆乙卯分遣大使以盟誓班下四方上下相警戒冬十月癸酉周主還長安以大司空王誼為襄州揔管戊子以尚書左僕射陸繕為尚書僕射十一月突厥㓂周邊圍酒泉殺掠吏民十二月甲子周以畢王賢為大司空己丑周以河陽揔管滕王逌為行軍元帥帥衆入寇十一年春正月癸巳周主受朝於露門始與羣臣服漢魏衣冠大赦改元大成置四輔官以大冢宰越王盛爲大前疑相州揔管蜀公尉遲迥爲大右弼申公李穆爲大左輔大司馬隨公楊堅為大後承周主之初立也以髙祖刑書要制為太重而除之又數行赦宥京兆郡丞樂運上䟽以為虞書所稱眚災肆赦謂過誤為害當緩赦之呂刑云五刑之疑有赦謂刑疑從罰罰疑從免也謹尋經典未有罪無輕重溥天大赦之文大尊豈可數施非常之惠以肆姦宄之惡乎帝不納既而民輕犯法又自以奢淫多過失惡人規諫欲為威虐懾服羣下乃更為刑經聖制用法益深大醮於正武殿告天而行之密令左右伺察羣臣小有過失輒行誅譴又居䘮纔踰年即恣聲樂魚龍百戲常陳殿前累日繼夜不知休息多聚羙女以實後宫增置位號不可詳録遊宴沈􅊺或旬日不出羣臣請事者皆因宦者奏之於是樂運輿襯詣朝堂陳帝八失其一以為大尊比來事多獨斷不參諸宰輔與衆共之其二搜羙女以實後宫儀同以上女不許輒嫁貴賤同怨其三大尊一入後宫數日不出所須聞奏多附宦者其四下詔寛刑未及半年更嚴前制其五髙祖斵雕為朴崩未踰年而遽窮奢麗其六徭賦下民以奉俳優角抵其七上書字誤者即治其罪杜獻書之路其八玄象垂誡不能諮諏善道脩布徳政若不革兹八事臣見周廟不血食矣帝大怒將殺之朝臣恐懼莫有救者内史中大夫洛陽元巖歎曰臧洪同死人猶願之况比干乎若樂運不免吾將與之俱斃乃詣閤請見曰樂運不顧其死欲以求名陛下不如勞而遣之以廣聖度帝頗感悟明日召運謂曰朕昨夜思卿所奏實為忠臣賜御食而罷之癸卯周立皇子闡為魯王甲辰周主東廵丙午以許公宇文善為大宗伯戊午周主至洛陽立魯王闡為皇太子二月癸亥上耕藉田周下詔以洛陽為東京發山東諸州兵治洛陽宫常役四萬人徙相州六府於洛陽周徐州揔管王軌聞鄭譯用事自知及禍謂所親曰吾昔在先朝寔申社稷至計今日之事斷可知矣此州控帶淮南鄰接彊冦欲為身計易如反掌但忠義之節不可虧違况荷先帝厚恩豈可以獲罪於嗣主遽忘之邪止可於此待死冀千載之後知吾此心耳周主從容問譯曰我脚杖痕誰所爲也對曰事由烏丸軌宇文孝伯因言軌捋須事帝使内史杜慶信就州殺軌元巖不肯署詔御正中大夫顔之儀切諫帝不聽巖進繼之脱巾頓顙三拜三進帝曰汝欲黨烏丸軌邪巖曰臣非黨軌正恐濫誅失天下之望帝怒使閹豎摶其靣軌遂死巖亦廢于家逺近知與不知皆爲軌流涕之儀之推之弟也周主之爲太子也上柱國尉遲運爲宫正數進諫不用又與王軌宇文孝伯宇文神舉皆爲髙祖所親待太子疑其同毁已及軌死運懼私謂孝伯曰吾徒必不免禍爲之柰何孝伯曰今堂上有老母地下有武帝爲臣爲子知欲何之且委質事人本徇名義諌而不入死焉可逃足下若爲身計宜且逺之於是運求出為秦州揔管它日帝託以齊王憲事讓孝伯曰公知齊王謀反何以不言對曰臣知齊王忠於社稷為羣小所譛言必不用所以不言且先帝付囑微臣唯令輔導陛下今諫而不從寔負顧託以此為罪是所甘心帝大慙俛首不語命將出賜死于家時宇文神舉為并州刺史帝遣使就州酖殺之尉遲運至秦州亦以憂死周罷南伐諸軍突厥佗鉢可汗請和於周周主以趙王招女為千金公主妻之且命執送髙紹義佗鉢不從辛巳周宣帝傳位於太子闡大赦改元大象自稱天元皇帝所居稱天臺冕二十四旒車服旂鼓皆倍於前王之數皇帝稱正陽宫置納言御正諸衛等官皆準天臺尊皇太后為天元皇太后天元既傳位驕侈彌甚務自尊大無所顧憚國之儀典率情變更每對臣下自稱為天用樽彛珪瓚以飲食令羣臣朝天臺者致齋三日清身一日既自比上帝不欲羣臣同已常自帶綬及冠通天冠加金附蟬顧見侍臣弁上有金蟬及王公有綬者並令去之不聽人有天髙上大之稱官名有犯皆改之改姓髙者為姜九族稱髙祖者為長祖又令天下車皆以渾木為輪禁天下婦人不得施粉黛自非宫人皆黄眉墨糚每召侍臣論議唯欲興造變革未甞言及政事游戲無常岀入不節羽儀仗衛晨出夜還陪侍之官皆不堪命自公卿以下常被楚撻每捶人皆以百二十為度謂之天杖其後又加至二百四十宫人内職亦如之后妃嬪御雖被寵幸亦多杖背於是内外恐怖人不自安皆求茍免莫有固志重足累息以逮於終戊子周以越王盛為太保尉遲迴為大前疑代王逹為大右弼辛卯徙鄴城石經於洛陽詔河陽幽相豫亳青徐七揔管並受東京六府處分三月庚申天元還長安大陳軍伍親擐甲胄入自青門靜帝備法駕以從夏四月壬戍朔立妃朱氏為天元帝后后吴人本出寒㣲生靜帝長於天元十餘歲踈賤無寵以靜帝故特尊之乙巳周主祠太廟壬午大醮於正武殿五月辛亥以襄國郡為趙國濟南郡為陳國武當安富二郡為越國上黨郡爲代國新野郡為滕國邑各萬戸令趙王招陳王純越王盛代王逹滕王逌並之國隨公楊堅私謂大將軍汝南公慶曰天元實無積德視其相貎壽亦不長又諸藩㣲弱各令就國曽無深根固本之計羽翮既翦何能及逺哉慶神舉之弟也突厥㓂周并州六月周發山東諸民脩長城秋七月庚寅周以楊堅為大前疑柱國司馬消難為大後承辛卯初用大貨六銖錢丙申周納司馬消難女為正陽宫皇后己酉周尊天元帝太后李氏為天皇太后壬子改天元皇后朱氏為天皇后立妃元氏為天右皇后陳氏為天左皇后凡四后云元氏開府儀同大將軍晟之女陳氏大將軍山提之女也八月庚申天元如同州丁卯上閱武於大壯􅀚命都督任忠帥歩騎十萬陳於玄武湖都督陳景帥樓艦五百出􅀲歩江振旅而還壬申周天元還長安甲戍以陳山提元晟並為上柱國戊寅上還宫豫章内史南康王方㤗在郡秩滿縱火延燒邑居因行暴掠驅錄富人徴求財賄上閲武方㤗當從啟稱母疾不行而㣲服往民間淫人妻為州所錄又帥人仗抗拒傷禁司為有司所奏上大怒下方泰獄免官削爵土尋而復舊壬午周以上柱國畢王賢為太師郇公韓業為大左輔九月乙卯以酆王貞為大冢宰以鄖公韋孝寛為行軍元帥帥行軍揔管􅂎公亮郕公梁士彦冦淮南仍遣御正杜杲禮部薛舒來聘冬十月壬戌周天元幸道㑹苑大醮以高祖配醮初復佛像及天尊像天元與二像俱南面坐大陳雜戲令長安士民縱觀甲戌以尚書僕射陸繕爲尚書左僕射十一月辛卯大赦周韋孝寛分遣􅂎公亮自安陸攻黄城梁士彦攻廣陵甲午士彦至肥口乙未周天元如温湯戊戌周軍進圍壽陽周天元如同州詔開府儀同三司南兖州刺史淳于量爲上流水軍都督中領軍樊毅都督北討諸軍事左衛將軍任忠都督北討前軍事前豐州刺史臯文奏帥歩騎三千趣陽平郡壬寅周天元還長安癸卯任忠帥歩騎七千趣秦郡丙午仁威將軍魯廣逹帥衆入淮是日樊毅將水軍二萬自東關入焦湖武毅將軍蕭摩訶帥歩騎趣厯陽戊申韋孝寛㧞壽陽􅂎公亮拔黃城梁士彦拔廣陵辛亥又取霍州癸丑以揚州刺史始興王叔陵為大都督揔水歩衆軍丁巳周鑄永通萬國錢一當千與五行大布並行十二月戊午周天元以災異屢見舍仗衛如天興宫百官上表勸復寢膳甲子還宫御正武殿集百官及宫人外命婦大列妓樂初作乞寒胡戲乙丑南北兖晉三州及盱眙山陽陽平馬頭秦厯陽沛北譙南梁等九郡民並自拔還江南周又取譙北徐州自是江北之地盡沒于周周天元如洛陽親御驛馬日行三百里四皇后及文武侍衛數百人並乗馹以從仍令四后方駕齊驅或有先後輒加譴責人馬頓仆相及於道癸酉遣平北將軍沈恪電威將軍裴子烈鎮南徐州開逺將軍徐道奴鎭柵口前信州刺史楊寳安鎭白下戊寅以中領軍樊毅都督荆郢巴武四州水陸諸軍事己卯周天元還長安貞毅將軍汝南周法尚與長沙王叔堅不相能叔堅譖之於上云其欲反上執其兄定州刺史法僧發兵將擊法尚法尚奔周周天元以為開府儀同大將軍順州刺史上遣將軍樊猛濟江擊之法尚遣部曲督韓朗詐降於猛曰法尚部兵不願降北人皆竊議欲叛還若得軍來自當倒戈猛以為然引兵急趨之法尚
