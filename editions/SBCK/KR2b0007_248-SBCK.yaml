front:
  text: 資治通鑑卷第二百四十八
  hash: sha256:3104a31c7bcbbe8cdd41d068130125647f335704e9f5fb2883de93bcee7fc6c2
body:
  text: 臣司馬光奉勑編集唐紀六十四維大荒落凡五年有竒起閼逢困敦閏月盡屠武宗至道昭肅孝皇帝下㑹昌四年閏月壬戌以中書侍郎同平章事李紳同平章事充淮南節度使李徳裕奏鎭州奏事官髙迪密陳意見二事其一以為賊中好為偷兵術潜抽諸處兵聚於一處官軍多就廹逐以致失利經一兩月又偷兵詣它處官軍須知此情自非來攻城柵愼勿與戰彼淹留不過三日須散歸舊屯如此數四空歸自然喪氣官軍密遣諜者詗其抽兵之處乗虛襲之無不捷矣其二鎭魏屯兵雖多終不能分賊勢何則下營不離故處每三兩月一深入燒掠而去賊但固守城柵城外百姓賊亦不惜宜令進營據其要害以漸逼之若止如今日賊中殊不以為懼望詔諸將各使知之劉稹腹心將髙文端降言賊中乏食令婦人挼穗舂之以給軍徳裕訪文端破賊之䇿文端以為官軍今直攻澤州恐多殺士卒城未易得澤州兵約萬五千人賊常分兵太半潛伏山谷伺官軍攻城疲弊則四集救之官軍必失利今請令陳許軍過乾河立寨自寨城連延築為夾城環繞澤州日遣大軍布陳於外以扞救兵賊見圍城將合必出大戰待其敗北然後乗勢可取徳裕奏請詔示王宰文端又言固鎭寨四崖懸絶勢不可攻然寨中無水皆飲澗水在寨東南約一里許冝令王逢進兵逼之絶其水道不過三日賊必弃寨遁去官軍即可追躡前十五里至青龍寨亦四崖懸絶水在寨外可以前法取也其東十五里則沁州城徳裕奏請詔示王逢文端又言都頭王釗將萬兵戍洺州劉稹既族薛茂卿又誅邢洺救援兵馬使談朝義兄弟三人釗自是疑懼稹遣使召之釗不肯入士卒皆譁譟釗必不為稹用但釗及士卒家屬皆在潞州又士卒恐己降為官軍所殺招之必不肯來惟有諭意於釗使引兵入潞州取稹事成之日許除别道節度使仍厚有賜與庶幾肯從徳裕奏請詔何弘敬潛遣人諭以此意劉稹年少懦弱押牙王協宅内兵馬使李士貴用事專聚貨財府庫充溢而將士有功無賞由是人心離怨劉從諫妻裴氏冕之支孫也憂稹將敗其弟問典兵在山東欲召之使掌軍政士貴恐問至奪已權且泄其姧狀乃曰山東之事仰成於五舅若召之是無三州也乃止王協薦王釗為洺州都知兵馬使釗得衆心而多不遵使府約束同列髙元武安玉言其有貳心稹召之釗辭以到洺州未立少功實所慙恨乞留數月然後詣府許之王協請稅商人每州遣軍將一人主之名為稅商實藉編户家貲至於什器無所遺皆估為絹匹十分取其二率髙其估民竭浮財及糗糧輸之不能充皆忷忷不安軍將劉溪尤貪殘劉從諌弃不用溪厚賂王協協以邢州富商最多命溪主之裴問所將兵號夜飛多富商子弟溪至悉拘其父兄軍士訴於問問為之請溪不許以不遜語荅之問怒密與麾下謀殺溪歸國并告刺史崔嘏嘏從之丙子嘏問閉城斬城中大將四人請降於王元逵時髙元武在党山聞之亦降先是使府賜洺州軍士布人一端尋有帖以折冬賜㑹稅商軍將至洺州王釗因人不安謂軍士曰留後年少政非已出今倉庫充實足支十年豈可不少散之以慰勞苦之士使帖不可用也乃擅開倉庫給士卒人絹一匹榖十二石士卒大喜釗遂閉城請降於何弘敬安玉在磁州聞二州降亦降於弘敬堯山都知兵馬使魏元談等降於王元逵元逵以其乆不下皆殺之八月辛卯鎭魏奏邢洺磁三州降宰相入賀李徳􅁉曰昭義根本盡在山東三州降則上黨不日有變矣上曰郭􅁩必梟劉稹以自贖徳􅁉曰誠如聖料上曰於今所冝先處者何事徳裕請以給事中盧弘止爲三州留後曰萬一鎭魏請占三州朝廷難於可否上從之詔山南東道兼昭義節度使盧鈞乗驛赴鎭潞人聞三州降大懼郭誼王恊謀殺劉稹以自贖稹再從兄中軍使匡周兼押牙誼患之言於稹曰十三郎在牙院諸將皆莫敢言事恐爲十三郎所疑而獲罪以此失山東今誠得十三郎不入則諸將始敢盡言采於衆人必獲長䇿稹召匡周諭之使稱疾不入匡周怒曰我在院中故諸將不敢有異圖我出院家必滅矣稹固請之匡周不得已彈指而出誼令稹所親董可武說稹曰山東之叛事由五舅城中人人誰敢相保留後今欲何如稹曰今城中尚有五萬人且當閉門堅守耳可武曰非良䇿也留後不若束身歸朝如張元益不失作刺史且以郭誼為留後俟得節之日徐奉太夫人及室家金帛歸之東都不亦善乎稹曰誼安肯如是可武曰可武已與之重誓必不負也乃引誼入稹與之密約既定乃白其母母曰歸朝誠為佳事但恨已晩吾有弟不能保安能保郭誼汝自圖之稹乃素服出門以母命署誼都知兵馬使王協已戒諸將列於外㕔誼拜謝稹已出見諸將稹治裝於内㕔李士貴聞之帥後院兵數千攻誼誼叱之曰何不自取賞物乃欲與李士貴同死乎軍士乃退共殺士貴誼易置將吏部署軍士一夕俱定明日使董可武入謁稹曰請議公事稹曰何不言之可武曰恐驚太夫人乃引稹步出牙門至北宅置酒作樂酒酣乃言今日之事欲全太尉一家須留後自圖去就則朝廷必垂矜閔稹曰如所言稹之心也可武遂前執其手崔玄度自後斬之因收稹宗族匡周以下至襁褓中子盡殺之又殺劉從諫父子所厚善者張谷陳􅀭庭李仲京郭台王羽韓茂章茂實王渥賈庠等凡十二家并其子姪甥壻無遺仲京訓之兄台行餘之子羽涯之從孫茂章茂實約之子渥璠之子庠餗之子也甘露之亂仲京等亡歸從諫從諫撫養之凡軍中有小嫌者誼日有所誅流血成泥乃函稹首遣使奉表及書降於王宰首過澤州劉公直舉營慟哭亦降於宰乙未宰以狀聞丙申宰相入賀李徳裕奏今不須復置邢洺磁留後但遣盧弘止宣慰三州及成徳魏博兩道上曰郭誼宜如何處之徳裕對曰劉稹騃孺子耳阻兵拒命皆誼為之謀主及勢孤力屈又賣稹以求賞此而不誅何以懲惡宜及諸軍在境并誼等誅之上曰朕意亦以為然乃詔石雄將七千人入潞州以應謡言杜悰以饋運不給謂誼等可赦上熟視不應徳裕曰今春澤潞未平太原復擾自非聖斷堅定二寇何由可平外議以為若在先朝赦之乆矣上曰卿不知文宗心地不與卿合安能議乎罷盧鈞山南東道專為昭義節度使戊戌劉稹傳首至京師詔昭義五州給復一年軍行所過州縣免今年秋稅昭義自劉從諫以來横増賦歛悉從蠲免所籍土團並縱遣歸農諸道將士有功者等級加賞郭誼既殺劉稹日望旌節既乆不聞問乃曰必移它鎭於是閱鞍馬治行裝及聞石雄將至懼失色雄至誼等參賀畢敕使張仲清曰郭都知告身來日當至諸髙班告身在此晩牙來受之乃以河中兵環毬􅂣晩牙誼等至唱名引入凡諸將桀􅃛拒官軍者悉執送京師加何弘敬同平章事丁未詔􅀤劉從諫尸暴於潞州市三日石雄取其尸置毬塲斬剉之戊申加李徳裕太尉趙國公徳裕固辭上曰恨無官賞卿耳卿若不應得朕必不與卿初李徳裕以韓全義以來將帥出征屢敗其弊有三一者詔令下軍前者日有三四宰相多不預聞二者監軍各以意見指揮軍事將帥不得專進退三者毎軍各有宦者為監使悉選軍中驍勇數百為牙隊其在陣戰鬭者皆怯弱之士每戰監使自有信旗乗髙立馬以牙隊自衛視軍勢小却輒引旗先走陳從而潰徳裕乃與樞密使楊欽義劉行深議約敕監軍不得預軍政每兵千人聽監使取十人自衛有功隨例霑賞二樞密皆以為然白上行之自禦回鶻至澤潞罷兵皆守此制自非中書進詔意更無它詔自中出者號令既簡將帥得以施其謀略故所向有功自用兵以來河北三鎭每遣使者至京師李徳裕常面諭之曰河朔兵力雖彊不能自立須藉朝廷官爵威命以安軍情歸語汝使與其使大將邀宣慰敕使以求官爵何如自奮忠義立功立事結知明主使恩出朝廷不亦榮乎且以耳目所及者言之李載義在幽州為國家盡忠平滄景及為軍中所逐不失作節度使後鎭太原位至宰相楊志誠遣大將遮敕使馬求官及為軍中所逐朝廷竟不赦其罪此二人禍福足以觀矣徳裕復以其言白上上曰要當如此明告之由是三鎭不敢有異志九月詔以澤州􅀠河陽節度丁巳盧鈞入潞州鈞素寛厚愛人劉稹未平鈞已領昭義節度襄州士卒在行營者與潞人戰常對陳􅀭鈞之美及赴鎭入天井闗昭義散卒歸之者鈞皆厚撫之人情大洽昭義遂安劉稹將郭誼王協劉公直安全慶李道徳李佐堯劉武徳董可武等至京師皆斬之臣光曰董重質之在淮西郭誼之在昭義呉元濟劉稹如木偶人在伎兒之手耳彼二人者始則勸人為亂終則賣主規利其死固有餘罪然憲宗用之於前武宗誅之於後臣愚以為皆失之何則賞姦非義也殺降非信也失義與信何以為國昔漢光武待王郎劉盆子止於不死知其非力竭則不降故也樊崇徐宣王元牛邯之徒豈非助亂之人乎而光武弗殺蓋以既受其降則不可復誅故也若既赦而復逃亡叛亂則其死固無辭矣如誼等免死流之逺方沒齒不還可矣殺之非也王羽賈庠等已為誼所殺李徳裕復下詔稱逆賊王涯賈餗等已就昭義誅其子孫宣告中外識者非之劉從諫妻裴氏亦賜死又令昭義降將李丕髙文端王釗等䟽昭義將士與劉稹同惡者悉誅之死者甚衆盧鈞疑其枉濫奏請寛之不從昭義屬城有甞無禮於王元逵者元逵推求得二十餘人斬之餘衆懼復閉城自守戊辰李徳裕等奏寇孽既平盡為國家城鎭豈可令元逵窮兵攻討望遣中使賜城内將士敕招安之仍詔元逵引兵歸鎭并詔盧鈞自遣使安撫從之乙亥李徳裕等請上尊號且言自古帝王成大功必告天地父宣懿太后祔廟陛下未甞親謁上瞿然曰郊廟之禮誠宜亟行至於徽稱非所敢當凡五上表乃許之李徳裕奏據幽州奏事官言詗知回鶻上下離心可汗欲之安西其部落言親戚皆在唐不如歸唐又與室韋已相失計其不日來降或自相殘滅望遣識事中使賜仲武詔諭以鎭魏已平昭義惟回鶻未滅仲武猶帶北面招討使宜早思立功李徳􅁉怨太子太傅東都留守牛僧孺湖州刺史李宗閔言於上曰劉從諌據上黨十年太和中入朝僧孺宗閔執政不留之加宰相縱去以成今日之患竭天下力乃能取之皆二人之罪也徳裕又使人於潞州求僧孺宗閔與從諫交通書䟽無所得乃令孔目官鄭慶言從諌每得僧孺宗閔書䟽皆自焚毁詔追慶下御史臺按問中丞李回知雜鄭亞以為信然河南少尹呂述與徳􅁉書言稹破報至僧孺出聲歎恨徳裕奏述書上大怒以僧孺爲太子少保分司宗閔爲漳州刺史戊子再貶僧孺汀州刺史宗閔漳州長史上幸鄠校獵十一月復貶牛僧孺循州長史李宗閔長流封州十二月以忠武節度使王宰為河東節度使河中節度使石雄為河陽節度使上幸雲陽校獵五年春正月己酉朔羣臣上尊號曰仁聖文武章天成功神徳明道大孝皇帝尊號始無道字中㫖令加之庚戌上謁太廟辛亥祀昊天上帝赦天下築望仙臺於南郊庚申義安太后王氏崩以祕書監盧弘宣為義武節度使弘宣性寛厚而難犯為政簡易其下便之河北之法軍中偶語者斬弘宣至除其法詔賜粟三十萬斛在飛狐西計運致之費踰於粟價弘宣遣吏守之㑹春旱弘宣命軍民隨意自往取之粟皆入境約秋稔償之時成徳魏愽皆饑獨易定之境無害淮南節度使李紳按江都令呉湘盜用程糧錢强娶所部百姓顔恱女估其資裝為贓罪當死湘武陵之兄子也李徳裕素惡武陵議者多言其寃諫官請覆按詔遣監察御史崔元藻李稠覆之還言湘盜程糧錢有實顔恱本衢州人甞為青州牙推妻亦士族與前獄異徳裕以為無與奪二月貶元藻端州司户稠汀州司户不復更推亦不付法司詳斷即如紳奏處湘死諫議大夫栁仲郢敬晦皆上䟽爭之不納稠晉江人晦昕之弟也李徳裕以栁仲郢為京兆尹素與牛僧孺善謝徳裕曰不意太尉恩奬及此仰報厚徳敢不如竒章公門館徳裕不以為嫌夏四月壬寅以陜虢觀察使李拭為冊􅃛戞斯可汗使五月壬戌葬恭僖皇后于光陵栢城之外門下侍郎同平章事杜悰罷為右僕射中書侍郎同平章事崔鉉罷為户部尚書乙丑以户部侍郎李回為中書侍郎同平章事判户部如故祠部奏括天下寺四千六百蘭若四萬僧尼二十六萬五百􅁽􅃛戞斯可汗為宗英雄武誠明可汗秋七月丙午朔日有食之上惡僧尼耗蠧天下欲去之道士趙歸眞等復勸之乃先毁山野招提蘭若至是敕上都東都兩街各留二寺每寺留僧三十人天下節度觀察使治所及同華商汝州各留一寺分為三等上等留僧二十人中等留十人下等五人餘僧及尼并大秦穆護祅僧皆勒歸俗寺非應留者立期令所在毁撤仍遣御史分道督之財貨田産並沒官寺材以葺公廨驛舍銅像鍾磬以鑄錢以山南東道節度使鄭肅撿校右僕射同平章事詔􅀤昭義騎兵五百步兵千五百戍振武節度使盧鈞出至裴村餞之潞卒素驕憚於逺戍乗醉回旗入城閉門大譟鈞奔潞城以避之監軍王惟直自出曉諭亂兵擊之傷旬日而卒李徳裕奏請詔河東節度使王宰以步騎一千守石㑹関三千自儀州路據武安以斷邢洺之路又令河陽節度使石雄引兵守澤州河中節度使韋恭甫發步騎千人戍晉州如此賊必無能為皆從之八月李徳裕等奏東都九廟神主二十六今貯於太微宫小屋請以廢寺材復修太廟壬午詔陳釋教之弊宣告中外凡天下所毁寺四千六百餘區歸俗僧尼二十六萬五百人大秦穆護祅僧二千餘人毁招提蘭若四萬餘區收良田數千萬頃奴婢十五萬人所留僧皆􅀠主客不􅀠祠部百官奉表稱賀尋又詔東都止留僧二十人諸道留二十人者減其半留十人者減三人留五人者更不留五臺僧多亡奔幽州李徳裕召進奏官謂曰汝趣白本使五臺僧為將必不如幽州將為卒必不如幽州卒何為虛取容納之名染於人口獨不見近日劉從諫招聚無筭閑人竟有何益張仲武乃封二刀付居庸闗曰有遊僧入境則斬之主客郎中韋博以為事不宜太過李徳裕惡之出為靈武節度副使昭義亂兵奉都將李文矩為帥文矩不從亂兵亦不敢害文矩稍以禍福諭之亂兵漸聽命乃遣人謝盧鈞於潞城鈞還入上黨復遣之戍振武行一驛乃潜選兵追之明日及於太平驛盡殺之具以狀聞且請罷河東河陽兵在境上者從之九月詔修東都太廟李徳裕請置僃邊庫令户部嵗入錢帛十二萬緍匹度支鹽鐡嵗入錢帛十三萬緍匹明年減其三之一凡諸道所進助軍財貨皆入焉以度支郎中判之王才人寵冠後庭上欲立以為后李徳裕以才人寒族且無子恐不厭天下之望乃止上餌方士金丹性加躁急喜怒不常冬十月上問李徳裕以外事對曰陛下威斷不測外人頗驚懼曏者寇逆暴横固宜以威制之今天下既平願陛下以寛理之但使得罪者無怨為善者不驚則為寛矣以衡山道士劉玄靜為銀青光祿大夫崇玄館學士賜號廣成先生為之治崇玄館置吏鑄印玄靜固辭乞還山許之李徳裕秉政日乆好徇愛憎人多怨之自杜悰崔鉉罷相宦官左右言其太專上亦不恱給事中韋弘質上䟽言宰相權重不應更領三司錢榖徳裕奏稱制置職業人主之柄弘質受人教導所謂賤人圖柄臣非所宜言十二月弘質坐貶官由是衆怒愈甚上自秋冬以來覺有疾而道士以爲換骨上祕其事外人但怪上希復遊獵宰相奏事者亦不敢乆留詔罷來年正旦朝㑹吐蕃論恐熱復紏合諸部擊尚婢婢婢婢遣厖結藏將兵五千拒之恐熱大敗與數十􅀐遁去婢婢傳檄河湟數恐熱殘虐之罪曰汝輩本唐人吐蕃無主則相與歸唐毋爲恐熱所獵如狐免也於是諸部從恐熱者稍稍引去是歳天下户四百九十五萬五千一百五十一朝廷雖爲党項置使党項侵盜不已攻陷邠寧鹽州界城堡屯叱利寨宰相請遣使宣慰上決意討之六年春二月庚辰以夏州節度使米暨爲東北道招討党項使上疾乆未平以爲漢火徳改洛爲雒唐土徳不可以王氣勝君名三月下詔改名炎上自正月乙卯不視朝宰相請見不許中外憂懼初憲宗納李錡妾鄭氏生光王怡怡幼時宫中皆以爲不慧太和以後益自韜匿羣居遊處未甞􅀤言文宗幸十六宅宴集好誘其言以爲戲笑號曰光叔上性豪邁尢所不禮及上疾篤旬日不能言諸宦官密於禁中定䇿辛酉下詔稱皇子冲幼須選賢徳光王怡可立爲皇太叔更名忱應軍國政事令權句當太叔見百官哀戚滿容裁决庶務咸當於理人始知有隠徳焉甲子上崩以李徳裕攝冢宰丁卯宣宗即位宣宗素惡徳裕之專即位之日徳裕奉冊既罷謂左右曰適近我者非太尉邪毎顧我使我毛髮洒浙夏四月辛未朔上始聽政尊母鄭氏爲皇太后壬申以門下侍郎同平章事李徳裕同平章事充荆南節度使徳裕秉權日乆位重有功衆不謂其遽罷聞之莫不驚駭甲戌貶工部尚書判鹽鐵轉運使薛元賞爲忠州刺史弟京兆少尹權知府事元􅀛爲崖州司户皆徳裕之黨也杖殺道士趙歸眞等數人流羅浮山人軒轅集于嶺南五月乙巳赦天下上京兩街先聽留兩寺外更各増置八寺僧尼依前􅀠功徳使不􅀠主客所度僧尼仍令祠部給牒以翰林學士兵部侍郎白敏中同平章事辛酉立皇子温爲鄆王渼爲雍王涇爲雅王滋爲䕫王沂爲慶王六月禮儀使奏請復代宗神主於太廟以敬宗文宗武宗同爲一代於廟東増置兩室爲九代十一室從之秋七月壬寅淮南節度使李紳薨回鶻烏介可汗之衆稍稍降散及凍餒死所餘不及三千人國相逸隠啜殺烏介於金山立其弟特勒遏捻爲可汗八月壬申葬至道昭肅孝皇帝于端陵廟號武宗初武宗疾困顧王才人曰我死汝當如何對曰願從陛下於九泉武宗以巾授之武宗崩才人即縊上聞而矜之贈貴妃葬於端陵柏城之内以循州司馬牛僧孺爲衡州長史封州流人李宗閔爲郴州司馬恩州司馬崔珙爲安州長史潮州刺史楊嗣復爲江州刺史昭州刺史李􅑻爲郴州刺史僧孺等五相皆武宗所貶逐至是同日北遷宗閔未離封州而卒九月以荆南節度使李徳裕爲東都留守解平章事以中書侍郎同平章事鄭肅同平章事充荆南節度使以兵部侍郎判度支盧商爲中書侍郎同平章事商翰之族孫也冊􅃛戞斯可汗使者以國喪未行或以爲僻逺小國不足與之抗衡回鶻未平不應遽有建置詔百官集議事遂􅃦蠻寇安南經略使裴元裕帥鄰道兵討之以右常侍李景讓爲浙西觀察使初景讓母鄭氏性嚴明早寡家貧居於東都諸子皆幼母自教之宅後古牆因雨隤陷得錢盈船奴婢喜走告母母往焚香祝之曰吾聞無勞而獲身之災也天必以先君餘慶矜其貧而賜之則願諸孤它日學問有成乃其志也此不敢取遽命掩而築之三子景讓景温景莊皆舉進士及第景讓宦達髮已斑白小有過不免捶楚景讓在浙西有左都押牙迕景讓意景讓杖之而斃軍中憤怒將爲變母聞之景讓方視事母出坐聽事立景讓於庭而責之曰天子付汝以方面國家刑法豈得以爲汝喜怒之資妄殺無罪之人乎萬一致一方不寧豈惟上負朝廷使垂年之母銜羞入地何以見汝之先人乎命左右褫其衣坐之將撻其背將佐皆爲之請拜且泣乆乃釋之軍中由是遂安景莊老於􅂣屋每被黜母輙撻景讓然景讓終不肯屬主司曰朝廷取士自有公道豈敢效人求闗節乎乆之宰相謂主司曰李景莊今嵗不可不收可憐彼翁每嵗受撻由是始及第冬十月禮院奏禘祭祝文於穆敬文武四室但稱嗣皇帝臣某昭告從之甲申上受三洞法籙於衡山道士劉玄靜十二月戊辰朔日有食之宣宗元聖至明成武獻文睿智章仁神聰懿道大孝皇帝上大中元年春正月甲寅上祀圎丘赦天下改元二月庚午加盧龍節度使張仲武同平章事賞其屢破回鶻也癸未上以旱故減膳徹樂出宫女縱鷹隼止營繕命中書侍郎同平章事盧商與御史中丞封敖踈理京城繫囚大理卿馬植奏稱盧商等務行寛宥凡抵極法者一切免死彼官典犯贓及故殺人平日大赦所不免今因踈理而原之使貪吏無所懲畏死者衘冤無告恐非所以消旱災致和氣也昔周饑克殷而年豐衛旱討邢而雨降是則誅罪戮姦式合天意雪冤决滯乃副聖心也乞再加裁定詔兩省五品以上議之􅀄李徳􅁉執政引白敏中爲翰林學士及武宗崩徳􅁉失勢敏中乗上下之怒竭力排之使其黨李咸訟徳􅁉罪徳􅁉由是自東都留守以太子少保分司左諌議大夫張鷺等上言陛下以旱理繫囚慮有冤滯今所原死罪無冤可雪恐凶險僥幸之徒常思水旱爲災宜如馬植所奏詔從之皆論如法以植為刑部侍郎充鹽鐵轉運使植素以文學政事有名於時李徳裕不之重及白敏中秉政凡徳裕所薄者皆不次用之以盧商爲武昌節度使以刑部尚書判度支崔元式爲門下侍郎翰林學士户部侍郎韋琮爲中書侍郎並同平章事閏月敕應㑹昌五年所廢寺有僧能營葺者聽自居之有司毋得禁止是時君相務反㑹昌之政故僧尼之弊皆復其舊己酉積慶太后蕭氏崩五月幽州節度使張仲武大破諸奚吐蕃論恐熱乗武宗之喪誘党項及回鶻餘衆寇河西詔河東節度使王宰將代北諸軍擊之宰以沙陀朱邪赤心爲前鋒自麟州濟河與恐熱戰於鹽州破走之六月以鴻臚卿李業爲冊􅃛戞斯英武誠明可汗使上謂白敏中曰朕昔從憲宗之喪道遇風雨百官六宫四散避去惟山陵使長而多髯攀靈駕不去誰也對曰令狐楚上曰有子乎對曰長子緒今爲隨州刺史上曰堪爲相乎對曰緒少病風痺次子綯前湖州刺史有才器上即擢爲考功郎中知制誥綯入謝上問以元和故事綯條對甚悉上恱遂有大用之意秋八月丙申以門下侍郎同平章事李回同平章事充西川節度使葬貞獻皇后于光陵之側上敦睦兄弟作雍和殿於十六宅數臨幸置酒作樂擊毬盡歡諸王有疾常親至卧内存問憂形於色突厥掠漕米及行商振武節度使史憲忠擊破之九月丁卯以金吾大將軍鄭光爲平盧節度使光潤州人太后之弟也乙酉前永寧尉呉汝納訟其弟湘罪不至死李紳與李徳裕相表裏欺罔武宗枉殺臣弟乞召江州司户崔元藻等對辨丁亥敕御史臺鞠實以聞冬十二月庚戌御史臺奏據崔元藻所列呉湘寃狀如呉汝納之言戊午貶太子少保分司李徳裕爲潮州司馬吏部奏㑹昌四年所減州縣官内復増三百八十三貟二年正月甲子羣臣上尊號曰聖敬文思和武光孝皇帝赦天下初李徳裕執政有薦丁柔立清直可任諫官者徳裕不能用上即位柔立爲右補闕徳裕貶潮州柔立上䟽訟其冤丙寅坐阿附貶南陽尉西川節度使李回桂管觀察使鄭亞坐前不能直呉湘冤乙酉回左遷湖南觀察使亞貶循州刺史李紳追奪三任告身中書舎人崔嘏坐草李徳裕制不盡言其罪己丑貶端州刺史回鶻遏捻可汗仰給於奚王石舎㓪及張仲武大破奚衆回鶻無所得食日益耗散至是所存貴臣以下不滿五百人依於室韋使者入賀正過幽州張仲武使歸取遏捻等遏捻聞之夜與妻葛禄子特勒毒斯等九騎西走餘衆追之不及相與大哭室韋分回鶻餘衆爲七七姓共分之居二日􅃛戞斯遣其相阿播帥諸胡兵號七萬來取回鶻大破室韋悉收回鶻餘衆歸磧北猶有數帳潛竄山林鈔盜諸胡其别部厖勒先在安西亦自稱可汗居甘州緫磧西諸城種落微弱時入獻見二月庚子以知制誥令狐綯爲翰林學士上甞以太宗所撰金鏡授綯使讀之至亂未甞不任不肖至治未甞不任忠賢上止之曰凡求致太平當以此言爲首又書貞觀政要於屏風每正色拱手而讀之上欲知百官名數令狐綯曰六品已下官卑數多皆吏部注擬五品以上則政府制授各有籍命曰具貟上命宰相作具貟御覽五卷上之常寘於案上立皇子澤爲濮王上欲作五王院於大明宫以處皇子之幼者召術士柴嶽明使相其地嶽明對曰臣庶之家遷徙不常故有自陽宅入隂宅隂宅入陽宅刑克禍福師有其說今陛下深拱法宫萬神擁衛隂陽書本不言帝王家上善其言賜束帛遣之夏五月己未朔日有食之門下侍郎同平章事崔元式罷爲户部尚書以兵部侍郎判度支户部周墀刑部侍郎盬鐵轉運使馬植并同平章事初墀爲義成節度使辟韋澳爲判官及爲相謂澳曰力小任重何以相助澳曰願相公無權墀愕然不知所謂澳曰官賞刑罰與天下共其可否勿以己之愛憎喜怒移之天下自理何權之有墀深然之澳貫之之子也己卯太皇太后郭氏崩于興慶宫六月禮院檢討官王皥貶句容令􅀄憲宗之崩上疑郭太后預其謀又鄭太后本郭太后侍兒有宿怨故上即位待郭太后禮殊薄郭太后意怏怏一日登勤政樓欲自隕上聞之大怒是夕崩外人頗有異論上以鄭太后故不欲以郭后祔憲宗有司請葬景陵外園皥奏宜合葬景陵神主配憲宗室奏入上大怒白敏中召皥詰之皥曰太皇太后汾陽王之孫憲宗在東宫爲正妃逮事順宗爲婦憲宗厭代之夕事出曖昧太皇太后母天下歴五朝豈得以曖昧之事遽廢正嫡之禮乎敏中怒甚皥辭氣愈厲諸相㑹食周墀立於敏中之門以俟之敏中使謝曰方爲一書生所苦公弟先行墀入至敏中㕔問其事見皥爭辨方急墀舉手加顙歎皥孤直明日皥坐貶官秋九月甲子再貶潮州司馬李徳裕爲崖州司户湖南觀察使李回爲賀州刺史前鳯翔節度使石雄詣政府自陳黑山烏嶺之功求一鎭以終老執政以雄李徳裕所薦曰曏日之功朝廷以蒲孟歧三鎭酬之足矣除左神武統軍雄怏怏而薨十一月庚午萬夀公主適起居郎鄭顥顥絪之孫登進士第爲校書郎右拾遺内供奉以文雅著稱公主上之愛女故選顥尚之有司循舊制請用銀裝車上曰吾欲以儉約化天下當自親者始令依外命婦以銅裝車詔公主執婦禮皆如臣庶之法戒以毋得輕夫族毋得預時事又申以手詔曰茍違吾戒必有太平安樂之禍顥弟顗甞得危疾上遣使視之還問公主何在曰在慈恩寺觀戯􅂣上怒歎曰我怪士大夫家不欲與我家爲昏良有以也亟命召公主入宫立之階下不之視公主懼涕泣謝罪上責之曰豈有小郎病不往省視乃觀戯乎遣歸鄭氏由是終上之丗貴戚皆兢兢守禮法如山東衣冠之族壬午葬懿安皇后於景陵之側以中書侍郎同平章事韋琮爲太子賔客分司十二月鳯翔節度使崔珙奏破吐蕃克清水清水先􅀠秦州詔以本州未復權􅀠鳯翔上見憲宗朝公卿子孫多擢用之刑部貟外郎杜勝次對上問其家丗對曰臣父黄裳首請憲宗監國即除給事中翰林學士裴諗度之子也上幸翰林面除承㫖吐蕃論恐熱遣其將恭羅急藏將兵二萬略地西鄙尚婢婢遣其將拓拔懷光擊之於南谷大破之急藏降三年春正月上與宰相論元和循吏孰爲第一周墀曰臣甞守土江西聞觀察使韋丹功徳被於八州沒四十年老稚歌思如丹尚存乙亥舘史詔修撰杜牧撰丹遺愛碑以紀之仍擢其子河陽觀察判官宙爲御史二月吐蕃論恐熱軍于河州尚婢婢軍于河源軍婢婢諸將欲擊恐熱婢婢曰不可我軍驟勝而輕敵彼窮困而致死戰必不利諸將不從婢婢知其必敗據河橋以待之諸將果敗婢婢收餘衆焚橋歸鄯州吐蕃秦原安樂三州及石門等七闗來降以太僕卿陸耽爲宣諭使詔涇原靈武鳯翔邠寧振武皆出兵應接河東節度使王宰入朝以貨結貴倖求以使相領宣武刑部尚書同平章事周墀上䟽論之宰遂還鎭駙馬都尉韋讓求爲京兆尹墀言京兆尹非才望不可爲讓議竟寢墀又諫上開邊由是忤㫖夏四月以墀爲東川節度使以御史大夫崔鉉爲中書侍郎同平章事兵部侍郎判户部魏扶同平章事癸巳盧龍奏節度使張仲武薨軍中立其子節度押牙直方翰林學士鄭顥言於上曰周墀以直言入相亦以直言罷相上深感悟甲午墀入謝加撿校右僕射戊戌以張直方爲盧龍留後五月徐州軍亂逐節度使李廓廓程之子也在鎭不治右補闕鄭魯上言其狀且曰臣恐新麥未登徐師必亂速命良帥救此一方上未之省徐州果亂上思魯言擢爲起居舍人以義成節度使盧弘止爲武寧節度使武寧士卒素驕有銀刀都尤甚屢逐主帥弘止至鎭都虞􅀱胡慶方復謀作亂弘止誅之撫循其餘訓以忠義軍府由是獲安六月戊申以張直方爲盧龍節度使涇原節度使康季榮取原州及石門驛藏木峽制勝六磐石峽六関秋七月丁巳靈武節度使朱叔明取長樂州甲子邠寧節度使張君緒取蕭関甲戌鳯翔節度使李玭取秦州詔邠寧節度權移軍於寧州以應接河西八月乙酉改長樂州爲威州河隴老幼千餘人詣闕己丑上御延喜門樓見之歡呼舞躍解胡服襲冠帶觀者皆呼萬嵗詔募百姓墾闢三州七関土田五年不租稅自今京城罪人應配流者皆配十處四道將吏能於鎭戍之地爲營田者官給牛及種糧温池鹽利可贍邊陲委度支制置其三州七関鎭戍之卒皆倍給衣糧仍二年一代道路建置堡柵有商旅往來販易及戍卒子弟通傳家信関鎭毋得留難其山南劔南邊境有沒蕃州縣亦令量力収復冬十月改備邊庫爲延資庫西川節度使杜悰奏取維州閏十一月丁酉宰相以克復河湟請上尊號上曰憲宗常有志復河湟以中原方用兵未遂而崩今乃克成先志耳其議加順憲二廟尊謚以昭功烈盧龍節度使張直方暴忍喜遊獵軍中將作亂直方知之託言出獵遂舉族逃歸京師軍中推牙將周綝爲留後直方至京師拜金吾大將軍甲戌追上順宗謚曰至徳弘道大聖大安孝皇帝憲宗謚曰昭文章武大聖至神孝皇帝仍改題神主己未崖州司户李徳裕卒山南西道節度使鄭涯奏取扶州資治通鑑卷第二百四十八
