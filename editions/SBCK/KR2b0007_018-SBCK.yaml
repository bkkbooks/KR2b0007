body:
  text: 九月以中尉張歐為御史大夫韓安國疾愈復為中尉河間王德脩學好古實事求是以金帛招求四方善書得書多與漢朝等是時淮南王安亦好書所招致率多浮辯獻王所得書皆古文先秦舊書采禮樂古事稍稍増輯至五百餘篇被服造次必於儒者山東諸儒多從之遊五年冬十月河間王來朝獻雅樂對三雍宫及詔策所問三十餘事其對推道術而言得事之中文約指明天子下太樂官常存肄河間王所獻雅聲嵗時以備數然不常御也春正月河間王薨中尉常麗以聞曰王身端行治温仁恭儉篤敬愛下明知深察惠于鰥寡大行令奏諡法聦明睿知曰獻諡曰獻王班固贊曰昔魯哀公有言寡人生於深宫之中長於婦人之手未嘗知憂未嘗知懼信哉斯言也雖欲不危亡不可得已是故古人以宴安為鴆毒無德而富貴謂之不幸漢興至于孝平諸侯王以百數率多驕淫失道何則沈溺放恣之中居埶使然也自凡人猶繫于習俗而况哀公之倫乎夫唯大雅卓爾不羣河間獻王近之矣初王恢之討東越也使番陽令唐䝉風曉南越南越食䝉以蜀枸醤䝉問所從來曰道西北牂柯江牂柯江廣數里出番禺城下䝉歸至長安問蜀賈人賈人曰獨蜀出枸醤多持竊出市夜郎夜郎者臨牂柯江江廣百餘歩足以行船南越以財物役屬夜郎西至桐師然亦不能臣使也䝉乃上書説上曰南越王黄屋左纛地東西萬餘里名為外臣實一州主也今以長沙豫章往水道多絶難行竊聞夜郎所有精兵可得十餘萬浮船牂柯江出其不意此制越一奇也誠以漢之彊巴蜀之饒通夜郎道為置吏甚易上許之乃拜䝉為中郎将将千人食重萬餘人從巴蜀筰闗入遂見夜郎侯多同䝉厚賜喻以威德約為置吏使其子為令夜郎旁小邑皆貪漢繒帛以為漢道險終不能有也乃且聽䝉約還報上以為犍為郡發巴蜀卒治道自僰道指牂柯江作者數萬人士卒多物故有逃亡者用軍興法誅其渠率巴蜀民大驚恐上聞之使司馬相如責唐䝉等因諭告巴蜀民以非上意相如還報是時卭筰之君長聞南夷與漢通得賞賜多多欲願為内臣妾請吏比南夷天子問相如相如曰卭筰冉駹者近蜀道亦易通秦時嘗通為郡縣至漢興而罷今誠復通為置郡縣愈於南夷天子以為然乃拜相如為中郎将建節往使及副使王然于等乘傳因巴蜀吏幣物以賂西夷卭筰冉駹斯榆之君皆請為内臣除邊闗闗益斥西至沬若水南至牂柯為徼通零闗道橋孫水以通邛都為置一都尉十餘縣屬蜀天子大説詔發卒萬人治鴈門阻險秋七月大風㧞木女巫楚服等教陳皇后祠祭厭勝挾婦人媚道事覺上使御史張湯窮治之湯深竟黨與相連及誅者三百餘人楚服梟首於市乙巳賜皇后册收其璽綬罷退居長門宫竇太主慙懼稽顙謝上上曰皇后所為不軌於大義不得不廢主當信道以自慰勿受妄言以生嫌懼后雖廢供奉如法長門無異上宫也初上嘗置酒竇太主家主見所幸賣珠兒董偃上賜之衣冠尊而不名稱為主人翁使之侍飲由是董君貴寵天下莫不聞常從游戲北宫馳逐平樂觀雞鞠之㑹角狗馬之足上大歡樂之上為竇太主置酒宣室使謁者引内董君是時中郎東方朔陛㦸殿下辟㦸而前曰董偃有斬罪三安得入乎上曰何謂也朔曰偃以人臣私侍公主其罪一也敗男女之化而亂婚姻之禮傷王制其罪二也陛下冨於春秋方積思於六經偃不遵經勸學反以靡麗爲右奢侈爲務盡狗馬之樂極耳目之欲是乃國家之大賊人主之大蜮其罪三也上黙然不應良久曰吾業已設飲後而自改朔曰不可夫宣室者先帝之正處也非法度之政不得入焉故淫亂之漸其變爲簒是以豎貂爲淫而易牙作患慶父死而魯國全上曰善有詔止更置酒北宫引董君從東司馬門入賜朔黄金三十斤董君之寵由是日衰是後公主貴人多踰禮制矣上以張湯爲太中大夫與趙禹共定諸律令務在深文拘守職之吏作見知法吏傳相監司用法益刻自此始八月螟是嵗徴吏民有明當世之務習先聖之術者縣次續食令與計偕甾川人公孫􅀪對策曰臣聞上古堯舜之時不貴爵賞而民勸善不重刑罰而民不犯躬率以正而遇民信也末世貴爵厚賞而民不勸深刑重罰而姦不止其上不正遇民不信也夫厚賞重刑未足以勸善而禁非必信而已矣是故因能任官則分職治去無用之言則事情得不作無用之器則賦歛省不奪民時不妨民力則百姓富有德者進無德者退則朝廷尊有功者上無功者下則羣臣逡罰當罪則姦邪止賞當賢則臣下勸凡此八者治之本也故民者業之則不争理得則不怨有禮則不暴愛之則親上此有天下之急者也禮義者民之所服也而賞罰順之則民不犯禁矣臣聞之氣同則從聲比則應今人主和德於上百姓和合於下故心和則氣和氣和則形和形和則聲和聲和則天地之和應矣故隂陽和風雨時甘露降五榖登六畜蕃嘉禾興朱草生山不童澤不涸此和之至也時對者百餘人太常奏􅀪第居下策奏天子擢􅀪對為第一拜為博士待詔金馬門齊人轅固年九十餘亦以賢良徴公孫􅀪仄目而事固固曰公孫子務正學以言無曲學以阿世諸儒多疾毁固者固遂以老罷歸是時巴蜀四郡鑿山通西南夷道千餘里戍轉相餉數嵗道不通士罷餓離暑濕死者甚衆西南夷又數反發兵興擊費以鉅萬計而無功上患之詔使公孫􅀪視焉還奏事盛毁西南夷無所用上不聽􅀪每朝㑹議開陳其端使人主自擇不肯面折廷争於是上察其行慎厚辯論有餘習文法吏事緣飾以儒術大説之一嵗中遷至左内史􅀪奏事有不可不廷辨常與汲黯請間黯先發之􅀪推其後天子常説所言皆聽以此日益親貴􅀪嘗與公卿約議至上前皆倍其約以順上㫖汲黯廷詰􅀪曰齊人多詐而無情實始與臣等建此議今皆倍之不忠上問􅀪􅀪謝曰夫知臣者以臣為忠不知臣者以臣為不忠上然􅀪言左右幸臣每毁􅀪上益厚遇之六年冬初筭商車大司農鄭當時言穿渭為渠下至河漕闗東粟徑易又可以溉渠下民田萬餘頃春詔發卒數萬人穿渠如當時策三嵗而通人以為便匈奴入上谷殺略吏民遣車騎将軍衛青出上谷騎将軍公孫敖出代輕車将軍公孫賀出雲中驍騎将軍李廣出鴈門各萬騎撃胡闗市下衛青至龍城得胡首虜七百人公孫賀無所得公孫敖為胡所敗亡七千騎李廣亦為胡所敗胡生得廣置兩馬間絡而盛臥行十餘里廣佯死暫騰而上胡兒馬上奪其弓鞭馬南馳遂得脱歸漢下敖廣吏當斬贖為庶人唯青賜爵闗内侯青雖出於奴虜然善騎射材力絶人遇士大夫以禮與士卒有恩衆樂為用有将帥材故每出輒有功天下由此服上之知人夏大旱蝗六月上行幸雍秋匈奴數盗邊漁陽尤甚以衛尉韓安國為材官将軍屯漁陽元朔元年冬十一月詔曰朕深詔執事興亷舉孝庶幾成風紹休聖緒夫十室之邑必有忠信三人並行厥有我師今或至闔郡而不薦一人是化不下究而積行之君子壅於上聞也且進賢受上賞蔽賢䝉顯戮古之道也其議二千石不舉者罪有司奏不舉孝不奉詔當以不敬論不察亷不勝任也當免奏可十二月江都易王非薨皇子據生衛夫人之子也三月甲子立衛夫人為皇后赦天下秋匈奴二萬騎入漢殺遼西太守略二千餘人圍韓安國壁又入漁陽鴈門各殺略千餘人安國益東徙屯北平數月病死天子乃復召李廣拜為右北平太守匈奴號曰漢之飛将軍避之數嵗不敢入右北平車騎将軍衛青将三萬騎出鴈門将軍李息出代青斬首虜數千人東夷薉君南閭等口二十八萬人降為蒼海郡人徒之費擬於南夷燕齊之間靡然騷動是嵗魯共王餘長沙定王發皆薨臨菑人主父􅅯嚴安無終人徐樂皆上書言事始偃遊齊燕趙皆莫能厚遇諸生相與排擯不容家貧假貸無所得乃西入闗上書闕下朝奏暮召入所言九事其八事為律令一事諫伐匈奴其辭曰司馬灋曰國雖大好戰必亡天下雖平忘戰必危夫怒者逆德也兵者凶器也争者末節也夫務戰勝窮武事者未有不悔者也昔秦皇帝并吞戰國務勝不休欲攻匈奴李斯諫曰不可夫匈奴無城郭之居委積之守遷徙鳥舉難得而制也輕兵深入糧食必絶踵糧以行重不及事得其地不足以為利也得其民不可調而守也勝必殺之非民父母也靡敝中國快心匈奴非長䇿也秦皇帝不聽遂使䝉恬将兵攻胡辟地千里以河為境地固沮澤鹹鹵不生五穀然後發天下丁男以守北河暴兵露師十有餘年死者不可勝數終不能踰河而北是豈人衆不足兵革不備哉其勢不可也又使天下蜚芻輓粟起於東腄琅邪負海之郡轉輸北河率三十鍾而致一石男子疾耕不足於糧餉女子紡績不足於帷幕百姓靡敝孤寡老弱不能相養道路死者相望蓋天下始畔秦也及至髙皇帝定天下略地於邊聞匈奴聚於代谷之外而欲擊之御史成進諌曰不可夫匈奴之性獸聚而鳥散從之如搏影今以陛下盛德攻匈奴臣竊危之髙帝不聽遂北至於代谷果有平城之圍髙皇帝蓋悔之甚乃使劉敬往結和親之約然後天下忘干戈之事夫匈奴難得而制非一世也行盜侵驅所以爲業也天性固然上及虞夏殷周固弗程督禽獸畜之不屬爲人夫上不觀虞夏殷周之統而下循近世之失此臣之所大憂百姓之所疾苦也嚴安上書曰今天下人民用財侈靡車馬衣裘宫室皆競修飾調五聲使有節族雜五色使有文章重五味方丈於前以觀欲天下彼民之情見美則願之是教民以侈也侈而無節則不可贍民離本而儌末矣末不可徒得故搢紳者不憚為詐帯劒者夸殺人以矯奪而世不知媿是以犯灋者衆臣願為民制度以防其淫使貧富不相燿以和其心心志定則盗賊消刑罰少隂陽和萬物蕃也昔秦王意廣心逸欲威海外使䝉恬将兵以北攻胡又使尉屠雎将樓船之士以攻越當是時秦禍北構於胡南挂於越宿兵於無用之地進而不得退行十餘年丁男被甲丁女轉輸苦不聊生自經於道樹死者相望及秦皇帝崩天下大畔滅世絶祀窮兵之禍也故周失之弱秦失之彊不變之患也今徇南夷朝夜郎降羌僰略薉州建城邑深入匈奴燔其龍城議者美之此人臣之利非天下之長䇿也徐樂上書曰臣聞天下之患在於土崩不在瓦解古今一也何謂土崩秦之末世是也陳渉無千乘之尊疆土之地身非王公大人名族之後郷曲之譽非有孔曾墨子之賢陶朱猗頓之富也然起窮巷奮棘矜偏袒大呼天下從風此其故何也由民困而主不恤下怨而上不知俗已亂而政不脩此三者陳渉之所以為資也此之謂土崩故曰天下之患在乎土崩何謂瓦解吳楚齊趙之兵是也七國謀為大逆號皆稱萬乘之君帯甲數十萬威足以嚴其境内財足以勸其士民然不能西攘尺寸之地而身為禽於中原者此其故何也非權輕於匹夫而兵弱於陳渉也當是之時先帝之德未衰而安土樂俗之民衆故諸侯無竟外之助此之謂瓦解故曰天下之患不在瓦解此二體者安危之眀要賢主之所宜留意而深察也間者闗東五榖數不登年嵗未復民多窮困重之以邊境之事推數循理而觀之民宜有不安其處者矣不安故易動易動者土崩之埶也故賢主獨觀萬化之原眀於安危之機脩之廟堂之上而銷未形之患也其要期使天下無土崩之埶而已矣書奏天子召見三人謂曰公等皆安在何相見之晚也皆拜爲郎中主父偃尤親幸一嵗中凡四遷爲中大夫大臣畏其口賂遺累千金或謂偃曰太横矣偃曰吾生不五鼎食死即五鼎烹耳二年冬賜淮南王几杖毋朝主父偃説上曰古者諸矦不過百里彊弱之形易制今諸矦或連城數十地方千里緩則驕奢易為淫亂急則阻其彊而合從以逆京師以法割削之則逆節萌起前日鼂錯是也今諸矦子弟或十數而適嗣代立餘雖骨肉無尺地之封則仁孝之道不宣願陛下令諸矦得推恩分子弟以地矦之彼人人喜得所願上以德施實分其國不削而稍弱矣上從之春正月詔曰諸矦王或欲推私恩分子弟邑者令各條上朕且臨定其號名於是藩國始分而子弟畢矦矣匈奴入上谷漁陽殺略吏民千餘人遣衛青李息出雲中以西至隴西擊胡之樓煩白羊王於河南得胡首虜數千牛羊百餘萬走白羊樓煩王遂取河南地詔封青為長平矦青校尉蘇建張次公皆有功封建為平陵矦次公為岸頭侯主父偃言河南地肥饒外阻河䝉恬城之以逐匈奴内省轉輸戍漕廣中國滅胡之本也上下公卿議皆言不便上竟用偃計立朔方郡使蘇建興十餘萬人築朔方城復繕故秦時䝉恬所為塞因河為固轉漕甚逺自山東咸被其勞費數十百鉅萬府庫並虚漢亦棄上谷之斗辟縣造陽地以予胡三月乙亥晦日有食之夏募民徙朔方十萬口主父偃説上曰茂陵初立天下豪桀并兼之家亂衆之民皆可徙茂陵内實京師外銷姦猾此所謂不誅而害除上從之徙郡國豪傑及訾三百萬以上于茂陵軹人郭解闗東大俠也亦在徙中衛将軍為言郭解家貧不中徙上曰解布衣權至使将軍為言此其家不貧卒徙解家解平生睚眦殺人甚衆上聞之下吏捕治解所殺皆在赦前軹有儒生侍使者坐客譽郭解生曰解専以姦犯公法何謂賢解客聞殺此生斷其舌吏以此責解解實不知殺者殺者亦竟絶莫知為誰吏奏解無罪公孫􅀪議曰解布衣為任俠行權以睚眦殺人解雖弗知此罪甚於解殺之當大逆無道遂族郭解班固曰古者天子建國諸侯立家自卿大夫以至于庶人各有等差是以民服事其上而下無覬覦周室既㣲禮樂征伐自諸矦出􅁊文之後大夫世權陪臣執命陵夷至於戰國合從連衡繇是列國公子魏有信陵趙有平原齊有孟嘗楚有春申皆藉王公之埶競爲游俠雞鳴狗盜無不賔禮而趙相虞卿棄國捐君以周窮交魏齊之厄信陵無忌竊符矯命戮將専師以赴平原之急皆以取重諸矦顯名天下搤腕而游談者以四豪爲稱首於是背公死黨之議成守職奉上之義廢矣及至漢興禁網䟽闊未知匡改也是故代相陳豨從車千乘而吳濞淮南皆招賔客以千數外戚大臣魏其武安之屬競逐於京師布衣游俠劇孟郭解之徒馳驁於閭閻權行州域力折公侯衆庶榮其名迹覬而慕之雖其陷於刑辟自與殺身成名若季路仇牧死而不悔故曽子曰上失其道民散久矣非眀王在上示之以好惡齊之以禮法民曷由知禁而反正乎古之正法五伯三王之罪人也而六國五伯之罪人也夫四豪者又六國之罪人也况於郭解之倫以匹夫之細竊殺生之權其罪已不容於誅矣觀其温良泛愛振窮周急謙退不伐亦皆有絶異之姿惜乎不入於道德茍放縱於末流殺身亡宗非不幸也荀悦論曰世有三遊德之賊也一曰遊俠二曰遊説三曰遊行立氣勢作威福結私交以立强於世者謂之遊俠飾辯辭設詐謀馳逐於天下以要時勢者謂之遊説色取仁以合時好連黨類立虚譽以為權利者謂之遊行此三者亂之所由生也傷道害德敗灋惑世先王之所慎也國有四民各修其業不由四民之業者謂之姦民姦民不生王道乃成凡此三遊之作生於季世周秦之末尤甚焉上不眀下不正制度不立綱紀㢮廢以毁譽為滎辱不核其真以愛憎為利害不論其實以喜怒為賞罰不察其理上下相冒萬事乖錯是以言論者計薄厚而吐辭選舉者度親疎而舉筆善惡謬於衆聲功罪亂於王灋然則利不可以義求害不可以道避也是以君子犯禮小人犯灋犇走馳騁越職僣度飾華廢實競趣時利簡父兄之尊而崇賓客之禮薄骨肉之恩而篤朋友之愛忘脩身之道而求衆人之譽割衣食之業以供饗宴之好苞苴盈於門庭聘問交於道路書記繁於公文私務衆於官事於是流俗成而正道壊矣是以聖王在上經國序民正其制度善惡要於功罪而不淫於毁譽聽其言而責其事舉其名而指其實故實不應其聲者謂之虚情不覆其貌者謂之偽毁譽失其真者謂之誣言事失其類者謂之罔虚偽之行不得設誣罔之辭不得行有罪惡者無僥倖無罪過者不憂懼請謁無所行貨賂無所用息華文去浮辭禁偽辯絶淫智放百家之紛亂壹聖人之至道養之以仁惠文之以禮樂則風俗定而大化成矣燕王定國與父康王姬姦奪弟妻為姬殺肥如令郢人郢人兄弟上書告之主父偃從中發其事公卿請誅定國上許之定國自殺國除齊厲王次昌亦與其姊紀翁主通主父偃欲納其女於齊王齊紀太后不許偃因言於上曰齊臨菑十萬户市租千金人衆殷冨鉅於長安非天子親弟愛子不得王此今齊王於親屬益疏又聞與其姊亂請治之於是帝拜偃為齊相且正其事偃至齊急治王後宫宦者辭及王王懼飲藥自殺偃少時遊齊及燕趙及貴連敗燕齊趙王彭祖懼上書告主父偃受諸侯金以故諸侯子弟多以得封者及齊王自殺上聞大怒以為偃劫其王令自殺乃徵下吏治偃服受諸侯金實不劫王令自殺上欲勿誅公孫􅀪曰齊王自殺無後國除為郡入漢主父偃本首惡陛下不誅偃無以謝天下乃遂族主父偃張歐免上欲以蓼矦孔臧為御史大夫臧辭曰臣世以經學為業乞為太常典臣家業與從弟侍中安國綱紀古訓使永垂來嗣上乃以臧為太常其禮賜如三公三年冬匈奴軍臣單于死其弟左谷蠡王伊稚斜自立為單于攻破軍臣單于太子於單於單亡降漢􅊨以公孫􅀪為御史大夫是時方通西南夷東置蒼海北築朔方之郡公孫􅀪數諌以為罷敝中國以奉無用之地願罷之天子使朱買臣等難以置朔方之便發十䇿􅀪不得一􅀪乃謝曰山東鄙人不知其便若是願罷西南夷蒼海而専奉朔方上乃許之春罷蒼海郡􅀪為布被食不重肉汲黯曰􅀪位在三公奉禄甚多然為布被此詐也上問􅀪􅀪謝曰有之夫九卿與臣善者無過黯然今日廷詰􅀪誠中􅀪之病夫以三公為布被與小吏無差誠飾詐欲以釣名如汲黯言且無汲黯忠陛下安得聞此言天子以為謙讓愈益厚之三月赦天下夏四月丙子封匈奴太子於單為渉安侯數月而卒初匈奴降者言月氏故居敦煌祁連間為彊國匈奴冒頓攻破之老上單于殺月氏王以其頭為飲器餘衆遁逃逺去怨匈奴無與共擊之上募能通使月氏者漢中張騫以郎應募出隴西徑匈奴中單于得之留騫十餘嵗騫得間亡鄉月氏西走數十日至大宛大宛聞漢之饒財欲通不得見騫喜為發導譯抵康居傳致大月氏大月氏太子為王既擊大夏分其地而居之地肥饒少寇殊無報胡之心騫留嵗餘竟不能得月氏要領乃還並南山欲從羌中歸復為匈奴所得留嵗餘會伊稺斜逐於單匈奴國内亂騫乃與堂邑氏奴甘父逃歸上拜騫為太中大夫甘父為奉使君騫初行時百餘人去十三嵗唯二人得還匈奴數萬騎入塞殺代郡太守恭及略千餘人六月庚午皇太后崩秋罷西夷獨置南夷夜郎兩縣一都尉稍令犍為自葆就専力城朔方匈奴又入鴈門殺略千餘人是嵗中大夫張湯為廷尉湯爲人多詐舞智以御人時上方鄉文學湯陽浮慕事董仲舒公孫􅀪等以千乘兒寛爲奏讞掾以古灋義决疑獄所治即上意所欲罪與監史深禍者即上意所欲釋與監史輕平者上由是悦之湯於故人子弟調䕶之尤厚其造請諸公不避寒暑是以湯雖文深意忌不専平然得此聲譽汲黯數質責湯於上前曰公爲正卿上不能褒先帝之功業下不能抑天下之邪心安國富民使囹圄空虚何空取髙皇帝約束紛更之爲而公以此無種矣黯時與湯論議湯辯常在文深小苛黯伉厲守髙不能屈忿發罵曰天下謂刀筆吏不可以爲公卿果然必湯也令天下重足而立側目而視矣四年冬上行幸甘泉夏匈奴入代郡定襄上郡各三萬騎殺略數千人資治通鑑卷第十八
