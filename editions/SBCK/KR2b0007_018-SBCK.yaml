front:
  text: 父游射處老人為兒時從其大父識其處一坐盡驚少君言上曰祠竈則致物致物而丹沙可化為黄金壽可益蓬萊僊者可見見之以封禪則不死黃帝是也臣嘗游海上見安期生食臣棗大如瓜安期生僊者通蓬萊中合則見人不合則隱於是天子始親祠竈遣方士入海求蓬萊安期生之屬而事化丹沙諸藥齊為黃金矣居乆之李少君病死天子以為化去不死而海上燕齊怪迂之方士多更來言神事矣亳人謬忌奏祠太一方曰天神貴者太一太一佐曰五帝於是天子立其祠長安東南郊鴈門馬邑豪聶壹因大行王恢言匈奴初和親親信邊可誘以利致之伏兵襲擊必破之道也上召問公卿王恢曰臣聞全代之時北有彊胡之敵内連中國之兵然尚得養老長幼種樹以時倉廪常實匈奴不輕侵也今以陛下之威海内為一然匈奴侵盗不已者無它以不恐之故耳臣竊以為擊之便韓安國曰臣聞高皇帝嘗圍於平城七日不食及解圍反位而無忿怒之心夫聖人以天下為度者也不以己私怒傷天下之功故遣劉敬結和親至今為五世利臣竊以為勿擊便恢曰不然高帝身被堅執鋭行幾十年所以不報平城之怨者非力不能所以休天下之心也今邊境數驚士卒傷死中國槥車相望此仁人之所隠也故曰擊之便安國曰不然臣聞用兵者以飽待飢正治以待其亂定舍以待其勞故接兵覆衆伐國墮城常坐而役敵國此聖人之兵也今将卷甲輕舉深入長敺難以爲功從行則廹脅衡行則中絶疾則糧乏徐則後利不至千里人馬乏食兵法曰遺人獲也臣故曰勿擊便恢曰不然臣今言擊之者固非發而深入也將順因單于之欲誘而致之邊吾選梟騎壯士隂伏而處以爲之僃審遮險阻以爲其戒吾埶已定或營其左或營其右或當其前或絶其後單于可禽百全必取上從恢議夏六月以御史大夫韓安國爲護軍將軍衞尉李廣爲驍􅀐將軍太僕公孫賀爲輕車將軍大行王恢爲將屯將軍太中大夫李息爲材官將軍將車􅀐材官三十餘萬匿馬邑旁谷中約單于入馬邑縱兵隂使聶壹為間亡入匈奴謂單于曰吾能斬馬邑令丞以城降財物可盡得單于愛信以為然而許之聶壹乃詐斬死罪囚縣其頭馬邑城下示單于使者為信曰馬邑長吏已死可急來於是單于穿塞将十萬騎入武州塞未至馬邑百餘里見畜布野而無人牧者怪之乃攻亭得鴈門尉史欲殺之尉史乃告單于漢兵所居單于大驚曰吾固疑之乃引兵還出曰吾得尉史天也以尉史為天王塞下傳言單于已去漢兵追至塞度弗及乃皆罷兵王恢主别從代出擊胡輜重聞單于還兵多亦不敢出上怒恢恢曰始約為入馬邑城兵與單于接而臣擊其輜重可得利今單于不至而還臣以三萬人衆不敵祗取辱固知還而斬然完陛下士三萬人於是下恢廷尉廷尉當恢逗橈當斬恢行千金丞相蚡蚡不敢言上而言於太后曰王恢首為馬邑事今不成而誅恢是為匈奴報仇也上朝太后太后以蚡言告上上曰首為馬邑事者恢故發天下兵數十萬從其言為此且縱單于不可得恢所部擊其輜重猶頗可得以尉士大夫心今不誅恢無以謝天下於是恢聞乃自殺自是之後匈奴絶和親攻當路塞往往入盗於漢邊不可勝數然尚貪樂闗市嗜漢財物漢亦闗市不絶以中其意三年春河水徙從頓丘東南流夏五月丙子復決濮陽瓠子注鉅野通淮泗汎郡十六天子使汲黯鄭當時發卒十萬塞之輙復壊是時田蚡奉邑食鄃鄃居河北河決而南則鄃無水災邑收多蚡言於上曰江河之決皆天事未易以人力彊塞塞之未必應天而望氣用數者亦以為然於是天子久之不復事塞也初孝景時魏其矦竇嬰為大将軍武安矦田蚡乃為諸郎侍酒跪起如子姪已而蚡日益貴幸為丞相魏其失埶賔客益衰獨故燕相潁隂灌夫不去嬰乃厚遇夫相為引重其游如父子然夫為人剛直使酒諸有埶在己之右者必陵之數因醉忤丞相丞相乃奏案灌夫家屬横潁川民苦之收繫夫及支屬皆得棄市罪魏其上書論救灌夫上令與武安東朝廷辨之魏其武安因互相詆訐上問朝臣兩人孰是唯汲黯是魏其韓安國兩以為是鄭當時是魏其後不敢堅上怒當時曰吾并斬若屬矣即罷起入上食太后太后怒不食曰今我在也而人皆藉吾弟令我百嵗後皆魚肉之乎上不得已遂族灌夫使有司案治魏其得棄市罪四年冬十二月晦論殺魏其於渭城春三月乙夘武安侯蚡亦薨及淮南王安敗上聞蚡受安金有不順語曰使武安侯在者族矣夏四月隕霜殺草御史大夫安國行丞相事引墯車蹇五月丁巳以平棘侯薛澤為丞相安國病免地震赦天下
