body:
  text: 臣司馬光奉勑編集後梁紀五維單閼九月凢二年有奇起强圉赤奮若七月盡屠均王中貞明三年秋七月庚戌蜀主以桑􅀪志為西北面第一招討王宗宏為東北面第二招討己未以兼中書令王宗侃為東北面都招討武信節度使劉知俊為西北面都招討晉王以李嗣源閻寶兵少未足以敵契丹辛未更命李存審將兵益之蜀飛龍使唐文扆居中用事張格附之與司徒判樞密院事毛文錫争權文錫將以女適左僕射兼中書侍郎同平章事庾傳素之子㑹親族於樞密院用樂不先表聞蜀主聞樂聲怪之文扆從而譖之八月庚寅貶文錫茂州司馬其子司封員外郎詢流維州籍没其家貶文錫弟翰林學士文晏為榮經尉傳素罷為工部尚書以翰林學士承㫖庾凝績權判内樞密院事凝績傳素之再從弟也癸巳清海建武節度使劉巖即皇帝位於畨禺國號大越大赦改元乾亨以梁使趙光裔為兵部尚書節度副使楊洞濳為兵部侍郎節度判官李殷衡為禮部侍郎並同平章事建三廟追尊祖安仁曰太祖文皇帝父謙曰代祖聖武皇帝兄隱曰烈宗㐮皇帝以廣州為興王府契丹圍幽州且二百日城中危困李嗣源閻寶李存審步騎七萬㑹于易州存審曰虜衆吾寡虜多騎吾多步若平原相遇虜以萬騎蹂吾陳吾無遺類矣嗣源曰虜無輜重吾行必載糧食自隨若平原相遇虜抄吾糧吾不戰自潰矣不若自山中濳行趣幽州與城中合勢若中道遇虜則據險拒之甲午自易州北行庚子踰大房嶺循澗而東嗣源與養子從珂將三千騎為前鋒距幽州六十里與契丹遇契丹驚却晉兵翼而隨之契丹行山上晉兵行澗下每至谷口契丹輒邀之嗣源父子力戰乃得進至山口契丹以萬餘騎遮其前將士失色嗣源以百餘騎先進免胄揚鞭胡語謂契丹曰汝無故犯我疆埸晉王命我將百萬衆直抵西樓滅汝種族因躍馬奮檛三入其陳斬契丹酋長一人後軍齊進契丹兵却晉兵始得出李存審命步兵伐木為鹿角人持一枝止則成寨契丹騎環寨而過寨中發萬弩射之流矢蔽日契丹人馬死傷塞路將至幽州契丹列陳待之存審命步兵陳於其後戒勿動先令羸兵曳柴然草而進煙塵蔽天契丹莫測其多少因鼔譟合戰存審乃趣後陳起乗之契丹大敗席卷其衆自北山去委弃車帳鎧仗羊馬滿野晉兵追之俘斬萬計辛丑嗣源等入幽州周德威見之握手流涕契丹以盧文進為幽州留後其後又以為盧龍節度使文進常居平州帥奚騎嵗入北邊殺掠吏民晉人自瓦橋運糧輸薊城雖以兵援之不免抄掠契丹每入冦則文進帥漢卒為鄉導盧龍巡屬諸州為之殘弊劉鄩自滑州入朝朝議以河朔失守責之九月落鄩平章事左遷亳州團練使冬十月己亥加吳越王鏐天下兵馬元帥晉王還晉陽王連嵗出征凡軍府政事一委監軍使張承業承業勸課農桑畜積金榖收市兵馬徵租行法不寛貴戚由是軍城肅清饋餉不乏王或時須錢蒲愽及給賜伶人而承業靳之錢不可得王乃置酒錢庫令其子繼岌為承業舞承業以寶帶及幣馬贈之王指錢積呼繼岌小名謂承業曰和哥乏錢七哥宜以錢一積與之帶馬未為厚也承業曰郎君纒頭皆出承業俸祿此錢大王所以養戰士也承業不敢以公物為私禮王不恱憑酒以語侵之承業怒曰僕老敕使耳非為子孫計惜此庫錢所以佐王成霸業也不然王自取用之何問僕為不過財盡民散一無所成耳王怒顧李紹榮索劒承業起挽王衣泣曰僕受先王顧託之命誓為國家誅汴賊若以惜庫物死於王手僕下見先王無愧矣今日就王請死閻寶從旁解承業手令退承業奮拳敺寶踣地罵曰閻寶朱温之黨受晉大恩曽不盡忠為報顧欲以謟媚自容邪曹太夫人聞之遽令召王王惶恐叩頭謝承業曰吾以酒失忤七哥必且得罪於太夫人七哥為吾痛飲以分其過王連飲四巵承業竟不肯飲王入宫太夫人使人謝承業曰小兒忤特進適已笞之矣明日太夫人與王俱至承業第謝之未幾承制授承業開府儀同三司左衛上將軍燕國公承業固辭不受但稱唐官以至終身掌書記盧質嗜酒輕傲嘗呼王諸弟為豚犬王衘之承業恐其及禍乗間言曰盧質數無禮請為大王殺之王曰吾方招納賢才以就功業七哥何言之過也承業起立賀曰王能如此何憂不得天下質由是獲免晉王元妃衛國韓夫人次燕國伊夫人次魏國劉夫人劉夫人最有寵其父成安人以醫卜為業夫人㓜時晉將􅀽建豐掠得之入于王宫性狡悍淫妬從王在魏父聞其貴詣魏宫上謁王召􅀽建豐示之建豐曰始得夫人時有黄鬚丈人護之此是也王以語夫人夫人方與諸夫人爭寵以門地相高恥其家寒微大怒曰妾去鄉時略可記憶妾父不幸死亂兵妾守尸哭之而去今何物田舍翁敢至此命笞劉叟于宫門越主巖遣客省使劉瑭使於吳告即位且勸吳王稱帝閏月戊申蜀主以判内樞密院庾凝績為吏部尚書内樞密使十一月丙子朔日南至蜀主祀圓丘晉王聞河冰合曰用兵數嵗限一水不得度今冰自合天賛我也亟如魏州蜀主以劉知俊為都招討使諸將皆舊功臣多不用其命且疾之故無成功唐文扆數毁之蜀主亦忌其才嘗謂所親曰吾老矣知俊非爾輩所能馭也十二月辛亥收知俊稱其謀叛斬於炭市癸丑蜀大赦改明年元曰光天壬戌以張宗奭為天下兵馬副元帥帝論平慶州功丁卯以左龍虎統軍賀瓌為宣義節度使同平章事尋以為北面行營招討使戊辰晉王畋于朝城是日大寒晉王視河冰巳堅引步騎稍度梁甲士三千戍楊劉城緣河數十里列柵相望晉王急攻皆䧟之進攻楊劉城使步卒斬其鹿角負葭葦塞塹四面進攻即日拔之獲其守將安彦之先是租庸使户部尚書趙巖言於帝曰陛下踐阼以來尚未南郊議者以為無異藩矦為四方所輕請幸西都行郊禮遂謁宣陵敬翔諌曰自劉鄩失利以來公私困竭人心惴恐今展禮圎丘必行賞賚是慕虛名而受實弊也且勍敵近在河上乗輿豈宜輕動俟北方旣平報本未晚帝不聽己巳如洛陽閲車服飾宫闕郊祀有日聞楊劉失守道路訛言晉軍已入大梁扼汜水矣從官皆憂其家相顧涕泣帝惶駭失圖遂罷郊祀奔歸大梁甲戌以河南尹張宗奭為西都留守是嵗閩王審知為其子牙内都指揮使延鈞娶越主巖之女四年春正月乙亥朔蜀大赦復國號曰蜀帝至大梁晉兵侵掠至鄆濮而還敬翔上䟽曰國家連年䘮師疆土日蹙陛下居深宫之中所與計事者皆左右近習豈能量敵國之勝負乎先帝之時奄有河北親御豪傑之將猶不得志今敵至鄆州陛下不能留意臣聞李亞子繼位以來于今十年攻城野戰無不親當矢石近者攻楊劉身負束薪為士卒先一鼓拔之陛下儒雅守文晏安自若使賀瓌輩敵之而望攘逐冦讎非臣所知也陛下宜詢訪黎老别求異䇿不然憂未艾也臣雖駑怯受國重恩陛下必若乏才乞於邊垂自効䟽奏趙張之徒言翔怨望帝遂不用吳以右都押牙王祺為虔州行營都指揮使將洪撫􅀽吉之兵擊譚全播嚴可求以厚利募贑石水工故吳兵奄至虔州城下虔人始知之蜀太子衍好酒色樂遊戯蜀主嘗自夾城過聞太子與諸王鬭雞擊毬喧呼之聲歎曰吾百戰以立基業此輩其能守之乎由是惡張格而徐賢妃為之内主竟不能去也信王宗傑有才略屢陳時政蜀主賢之有廢立意二月癸亥宗傑暴卒蜀主深疑之河陽節度使北面行營排陳使謝彦章將兵數萬攻楊劉城甲子晉王自魏州輕騎詣河上彦章築壘自固决河水瀰浸數里以限晉兵晉兵不得進彦章許州人也安彦之散卒多聚於兖鄆山谷為群盜以觀二國成敗晉王招募之多降於晉己亥蜀主以東面招討使王宗侃為東西兩路諸軍都統三月吳越王鏐初立元帥府置官屬夏四月癸卯朔蜀主立子宗平為忠王宗特為資王岐王復遣使求好于蜀己酉以吏部侍郎蕭頃為中書侍郎同平章事保大節度使高萬金卒癸亥以忠義節度使高萬興兼保大節度使并鎮鄜延司空兼門下侍郎同平章事趙光逢告老己巳以司徒致仕蜀主自永平末得疾昏瞀至是增劇以北面行營招討使兼中書令王宗弼沈静有謀五月召還以為馬步都指揮使乙亥召大臣入寢殿告之曰太子仁弱朕不能違諸公之請踰次而立之若其不堪大業可寘諸别宫幸勿殺之但王氏子弟諸公擇而輔之徐妃兄弟止可優其祿位慎勿使之掌兵預政以全其宗族内飛龍使唐文扆久典禁兵參預機密欲去諸大臣遣人守宫門王宗弼三十餘人日至朝堂不得入見文扆屢以蜀主之命慰撫之伺蜀主殂即作難遣其黨内皇城使潘在迎偵察外事在迎以其謀告宗弼等宗弼等排闥入言文扆之罪以天冊府掌書記崔延昌權判六軍事召太子入侍疾丙子貶唐文扆為眉州刺史翰林學士承㫖王保晦坐附㑹文扆削官爵流瀘州在迎炕之子也丙申蜀主詔中外財賦中書除授諸司刑獄案牘専委庾凝績都城及行營軍旅之事委宣徽南院使宋光嗣丁酉削唐文扆官爵流雅州辛丑以宋光嗣為内樞密使與兼中書令王宗弼宗瑶宗綰宗䕫並受遺詔輔政初蜀主雖因唐制置樞密使専用士人及唐文扆得罪蜀主以諸將多許州故人恐其不為幼主用故以光嗣代之自是䆠者始用事六月壬寅朔蜀主殂癸卯太子即皇帝位尊徐賢妃為太后徐淑妃為太妃以宋光嗣判六軍諸衛事乙卯殺唐文扆王保晦命西面招討副使王宗昱殺天雄節度使唐文裔於秦州免左保勝軍使領右街使唐道崇官吳内外馬步都軍使昌化節度使同平章事徐知訓驕倨淫㬥威武節度使知撫州李德誠有家妓數十知訓求之德誠遣使謝曰家之所有皆長年或有子不足以侍貴人當更為公求少而美者知訓怒謂使者曰㑹當殺德誠并其妻取之知訓狎侮吳王無復君臣之禮嘗與王為優自為參軍使王為蒼鶻緫角弊衣執帽以從又嘗泛舟濁河王先起知訓以彈彈之又嘗賞花於襌智寺知訓使酒悖慢王懼而泣四座股栗左右扶王登舟知訓乗輕舟逐之不及以鐵檛殺王親吏將佐無敢言者父温皆不之知知訓及弟知詢皆不禮於徐知誥獨季弟知諫以兄事禮之知訓嘗召兄弟飲知誥不至知訓怒曰乞子不欲酒欲劒乎又甞與知誥飲伏甲欲殺之知諫躡知誥足知誥陽起如厠遁去知訓以劒授左右刁彦能使追殺之彦能馳騎及於中塗舉劒示知誥而還以不及告平盧節度使同平章事諸道副都統朱瑾遣家妓通候問於知訓知訓强欲私之瑾已不平知訓惡瑾位加已上置靜淮軍於泗州出瑾為靜淮節度使瑾益恨之然外事知訓愈謹瑾有所愛馬冬貯於幄夏貯於幬寵妓有絶色知訓過别瑾瑾置酒自捧觴出寵妓使歌以所愛馬為壽知訓大喜瑾因延之中堂伏壯士於户内出妻陶氏拜之知訓荅拜瑾以笏自後擊之踣地呼壯士出斬之瑾先繫二悍馬於廡下將圖知訓密令人解縱之馬相蹄齧聲甚厲以是外人莫之聞瑾提知訓首出知訓從者數百人皆散走瑾馳入府以首示吴王曰僕巳為大王除害王懼以衣鄣面走入内曰舅自為之我不敢知瑾曰婢子不足與成大事以知訓首擊柱挺劒將出子城使翟䖍等巳闔府門勒兵討之乃自後踰城墜而折足顧追者曰吾為萬人除害以一身任患遂自剄徐知誥在潤州聞難用宋齊丘䇿即日引兵濟江瑾已死因撫定軍府時徐温諸子皆弱温乃以知誥代知訓執吳政沈朱瑾尸於雷塘而滅其族瑾之殺知訓也泰寧節度使米志誠從十餘騎問瑾所向聞其已死乃歸宣諭使李儼貧困寓居海陵温疑其與瑾通謀皆殺之嚴可求恐志誠不受命詐稱􅀽州大破楚兵將吏皆入賀伏壯士於㦸門擒志誠斬之并其諸子壬戌晉王自魏州勞軍於楊劉自泛舟測河水其深沒槍王謂諸將曰梁軍非有戰意但欲阻水以老我師當涉水攻之甲子王引親軍先涉諸軍隨之褰甲横槍結陳而進是日水落深纔及膝匡國節度使北面行營排陳使謝彦章帥衆臨岸拒之晉兵不得進乃稍引却梁兵從之及中流鼓譟復進彦章不能支稍退登岸晉兵因而乗之梁兵大敗死傷不可勝紀河水為之赤彦章僅以身免是日晉人遂䧟濵河四寨蜀唐文扆旣死太傅門下侍郎同平章事張格内不自安或勸格稱疾俟命禮部尚書楊玢自恐失勢謂格曰公有援立大功不足憂也庚午貶格為茂州刺史玢為榮經尉吏部侍郎許寂户部侍郎潘嶠皆坐格黨貶官格尋再貶維州司户庾凝績又奏徙格於合水鎮令茂州刺史顧承郾伺格隂事王宗侃妻以格同姓欲全之謂承郾母曰戒汝子勿為人報仇他日將歸罪於汝承郾從之凝績怒因公事抵承郾罪秋七月壬申朔蜀主以兼中書令王宗弼為鉅鹿王宗瑤為臨淄王宗綰為臨洮王宗播為臨潁王宗裔宗䕫及兼侍中宗黯皆為琅邪郡王甲戌以王宗侃為樂安王丙子以兵部尚書庾傳素為太子少保兼中書侍郎同平章事蜀主不親政事内外遷除皆出於王宗弼宗弼納賄多私上下咨怨宋光嗣通敏善希合蜀主寵任之蜀由是遂衰吳徐温入朝于廣陵疑諸將皆預朱瑾之謀欲大行誅戮徐知誥嚴可求具陳徐知訓過惡所以致禍之由温怒稍解乃命網瑾骨於雷塘而葬之責知訓將佐不能匡救皆抵罪獨刁彦能屢有諫書温賞之戊戌以知誥為淮南節度行軍副使内外馬步都軍副使通判府事兼江州團練使以徐知諫權潤州團練事温還鎮金陵揔吳朝大綱自餘庶政皆決於知誥知誥悉反知訓所為事吳王盡恭接士大夫以謙御衆以寛約身以儉以吳王之命悉蠲天祐十三年以前逋税餘俟豐年乃輸之求賢才納規諫除姧猾杜請託於是士民翕然歸心雖宿將悍夫無不悦服以宋齊丘為謀主先是吳有丁口錢又計畝輸錢錢重物輕民甚苦之齊丘説知誥以為錢非耕桑所得今使民輸錢是教民弃本逐末也請蠲丁口錢自餘稅悉輸榖帛紬絹匹直千錢者當稅三千或曰如此縣官嵗失錢億萬計齊丘曰安有民富而國家貧者邪知誥從之由是江淮間曠土盡闢桑柘滿野國以富彊知誥欲進用齊丘而徐温惡之以為殿直軍判官知誥每夜引齊丘於水亭屏語常至夜分或居高堂悉去屏障獨置大爐相向坐不言以鐵筯畫灰為字隨以匙滅去之故其所謀人莫得而知也虔州險固吳軍攻之久不下軍中大疫王祺病吳以鎮南節度使劉信為虔州行營招討使未幾祺卒譚全播求救於吳越閩楚吳越王鏐以統軍使傳球為西南面行營應援使將兵二萬攻信州楚將張可求將萬人屯古亭閩兵屯鄠都以救之信州兵纔數百逆戰不利吳越兵圍其城刺史周本啓關張虛幕於門内召僚佐登城樓作樂宴飲飛矢雨集安坐不動吳越疑有伏兵中夜解圍去吳以前舒州刺史陳璋為東南面應援招討使將兵侵蘇湖錢傳球自信州南屯汀州晉王遣間使持帛書㑹兵於吳吳人辭以虔州之難晉王謀大舉入冦周德威將幽州步騎三萬李存審將滄景步騎萬人李嗣源將邢洺步騎萬人王處直遣將將易定步騎萬人及麟勝雲蔚新武等州諸部落奚契丹室韋吐谷渾皆以兵㑹之八月并河東魏愽之兵大閲於魏州蜀諸王皆領軍使彭王宗鼎謂其昆弟曰親王典兵禍亂之本今主少臣彊讒間將興繕甲訓士非吾輩所宜為也因固辭軍使蜀主許之但營書舍植松竹自娛而已泰寧節度使張萬進輕險好亂時嬖倖用事多求賂於萬進萬進聞晉兵將出己酉遣使附于晉且求援以亳州團練使劉鄩為兖州安撫制置使將兵討之甲子蜀順德皇后周氏殂乙丑蜀主以内給事王廷紹歐陽晃李周輅宋光葆宋承蕰田魯儔等為將軍及軍使皆干預政事驕縱貪暴大為蜀患周庠切諌不聽晃患所居之隘夜因風縱火焚西鄰軍營數百間明旦召匠廣其居蜀主亦不之問光葆光嗣之從弟也晉王自魏州如楊劉引兵略鄆濮而還循河而上軍於麻家渡賀瓌謝彦章將梁兵屯濮州北行臺村相持不戰晉王好自引輕騎迫敵營挑戰危窘者數四賴李紹榮力戰翼衛之得免趙王鎔及王處直皆遣使致書曰元元之命繫於王本朝中興繫於王柰何自輕如此王笑謂使者曰定天下者非百戰何由得之安可但深居帷房以自肥乎一旦王將出營都營使李存審扣馬泣諌曰大王當為天下自重彼先登䧟陳將士之職也存審輩宜為之非大王之事也王為之攬轡而還它日伺存審不在䇿馬急出顧謂左右曰老子妨人戲王以數百騎抵梁營謝彦章伏精甲五千於隄下王引十餘騎發隄伏兵發圍王數十重王力戰於中後騎繼至者攻之於外僅得出㑹李存審救至梁兵乃退王始以存審之言為忠吳劉信遣其將張宣等夜將兵三千襲楚將張可求於古亭破之又遣梁詮等將兵擊吳越及閩兵二國聞楚兵敗俱引歸梅山蠻冦邵州楚將樊須擊走之九月壬午蜀内樞密使宋光嗣以判六軍讓兼中書令王宗弼蜀主許之吳劉信書夜急攻虔州斬首數千級不能克使人説譚全播取質納賂而還徐温大怒杖信使者信子英彦典親兵温授英彦兵三千曰汝父據上游之地將十倍之衆不能下一城是反也汝可以此兵往與父同反又使昇州牙内指揮使朱景瑜與之俱曰全播守卒皆農夫飢窘踰年妻子在外重圍旣解相賀而去聞大兵再往必皆逃遁全播所守者空城耳往必克之冬十一月壬申蜀葬神武聖文孝德明惠皇帝于永陵廟號高祖越主巖祀南郊大赦改國號曰漢劉信聞徐温之言大懼引兵還擊虔州先鋒始至虔兵皆潰譚全播奔雩都追執之吳以全播為右威衛將軍領百勝節度使先是吳越王鏐常自虔州入貢至是道絶始自海道出登萊抵大梁初吳徐温自以權重而位卑説吳王曰今大王與諸將皆為節度使雖有都統之名不足相臨制請建吳國稱帝而治王不許嚴可求屢勸温以次子知詢代徐知誥知吳政知誥與駱知祥謀出可求為楚州刺史可求旣受命至金陵見温説之曰吾奉唐正朔常以興復為辭今朱李方爭朱氏日衰李氏日熾一旦李氏有天下吾能北面為之臣乎不若先建吳國以繫民望温大恱復留可求參緫庶政使草具禮儀知誥知可求不可去乃以女妻其子續晉王欲趣大梁而梁軍扼其前堅壁不戰百餘日十二月庚子朔晉王進兵距梁軍十里而舍初北面行營招討使賀瓌善將步兵排陳使謝彦章善將騎兵瓌惡其與已齊名一日瓌與彦章治兵於野瓌指一高地曰此可以立柵至是晉軍適置柵於其上瓌疑彦章與晉通謀瓌屢欲戰謂彦章曰主上悉以國兵授吾二人社稷是頼今彊冦壓吾門而逗留不戰可乎彦章曰彊冦憑陵利在速戰今深溝高壘據其津要彼安敢深入若輕與之戰萬一蹉跌則大事去矣瓌益疑之密譛之於帝與行營馬步都虞􅇋曹州刺史朱珪謀因享士伏甲殺彦章及濮州刺史孟審澄别將侯温裕以謀叛聞審澄温裕亦騎將之良者也丁未以朱珪為匡國留後癸丑又以為平盧節度使兼行營馬步副指揮使以賞之晉王聞彦章死喜曰彼將帥自相魚肉亡無日矣賀瓌殘虐失士卒心我若引軍直指其國都彼安得堅壁不動幸而一與之戰蔑不勝矣王欲自將萬騎直趣大梁周德威曰梁人雖屠上將其軍尚全輕行儌利未見其福不從戊午下令軍中老弱悉歸魏州起師趨汴庚申毁營而進衆號十萬辛酉蜀改明年元曰乾德賀瓌聞晉王已西亦棄營而踵之晉王發魏博白丁三萬從軍以供營柵之役所至營柵立成壬戌至胡柳陂癸亥旦􅇋者言梁兵自後至矣周德威曰賊倍道而來未有所舍我營柵已固守備有餘旣深入敵境動須萬全不可輕發此去大梁至近梁兵各念其家内懐憤激不以方略制之恐難得志王宜按兵勿戰德威請以騎兵擾之使彼不得休息至暮營壘未立樵爨未具乗其疲乏可一舉滅也王曰前在河上恨不見賊今賊至不擊尚復何待公何怯也顧李存審曰敕輜重先發吾為爾殿後破賊而去即以親軍先出德威不得已引幽州兵從之謂其子曰吾無死所矣賀瓌結陳而至横亘數十里王帥銀槍都䧟其陳衝盪擊斬往返十餘里行營左廂馬軍都指揮使鄭州防禦使王彦章軍先敗西走趣濮陽晉輜重在陳西望見梁旗幟驚潰入幽州陳幽州兵亦擾亂自相蹈藉周德威不能制父子皆戰死魏博節度副使王緘與輜重俱行亦死晉兵無復部伍梁兵四集勢甚盛晉王據高丘收散兵至日中軍復振陂中有土山賀瓌引兵據之晉王謂將士曰今日得此山者勝吾與汝曹奪之即引騎兵先登李從珂與銀槍大將王建及以步卒繼之梁兵紛紛而下遂奪其山日向晡賀瓌陳於山西晉兵望之有懼色諸將以為諸軍未盡集不若歛兵還營詰朝復戰天平節度使東南面招討使閻寶曰王彦章騎兵已入濮陽山下惟步卒向晚皆有歸志我乗高趣下擊之破之必矣今王深入敵境偏師不利若復引退必為所乗諸軍未集者聞梁再克必不戰自潰凡決勝料敵惟觀情勢情勢巳得斷在不疑王之成敗在此一戰若不決力取勝縱收餘衆北歸河朔非王有也昭義節度使李嗣昭曰賊無營壘日晚思歸但以精騎擾之使不得夕食俟其引退追擊可破也我若歛兵還營彼歸整衆復來勝負未可知也王建及擐甲横槊而進曰賊大將巳遁王之騎軍一無所失今擊此疲乏之衆如拉朽耳王但登山觀臣為王破賊王愕然曰非公等言吾幾誤計嗣昭建及以騎兵大呼䧟陳諸軍繼之梁兵大敗元城令吴瓊貴鄉令胡裝各帥白丁萬人於山下曳柴揚塵鼓譟以助其勢梁兵自相騰藉弃甲山積死亡者幾三萬人裝証之曽孫也是日兩軍所䘮士卒各三之二皆不能振晉王還營聞周德威父子死哭之慟曰䘮吾良將是吾罪也以其子幽州中軍兵馬使光輔為嵐州刺史李嗣源與李從珂相失見晉軍撓敗不知王所之或曰王已北度河矣嗣源遂乗冰北度將之相州是日從珂從王奪山晚戰皆有功甲子晉王進攻濮陽拔之李嗣源知晉軍之捷復來見王於濮陽王不恱曰公以吾為死邪度河安之嗣源頓首謝罪王以從珂有功但賜大鍾酒以罰之然自是待嗣源稍薄初契丹主之弟撒刺阿撥號北大王謀作亂於其國事覺契丹主數之曰汝與吾如手足而汝興此心我若殺汝則與汝何異乃囚之朞年而釋之撒刺阿撥帥其衆奔晉晉王厚遇之養為假子任為刺史胡柳之戰以其妻子來奔晉軍至德勝渡王彦章敗卒有走至大梁者曰晉人戰勝將至矣頃之晉兵有先至大梁問次舍者京城大恐帝驅市人登城又欲奔洛陽遇夜而止敗卒至者不滿千人傷夷逃散各歸鄉里月餘僅能成軍五年春正月辛巳蜀主祀南郊大赦晉李存審於德勝南北夾河築兩城而守之晉王以存審代周德威為内外蕃漢馬步總管晉王還魏州遣李嗣昭權知幽州軍府事漢主巖立越國夫人馬氏為皇后殷之女也三月丙戌蜀北路行營都招討武德節度使王宗播等自散關擊岐度渭水破岐將孟鐵山㑹大雨而還分兵戍興元鳳州及威武城戊子天雄節度使同平章事王宗昱攻隴州不克蜀主奢縱無度日與太后太妃遊宴於貴臣之家及遊近郡名山飲酒賦詩所費不可勝紀仗内教坊使嚴旭强取士民女子内宫中或得厚賂而免之以是累遷至蓬州刺史太后太妃各出教令賣刺史令録等官每一官闕數人爭納賂賂多者得之晉王自領盧龍節度使以中門使李紹宏提舉軍府事代李嗣昭紹宏宦者也本姓馬晉王賜姓名使與知嵐州事孟知祥俱為河東魏愽中門使知祥又薦教練使鴈門郭崇韜能治劇王以為中門副使崇韜倜儻有智略臨事敢決王寵待日隆先是中門使吳珪張虔厚相繼獲罪及紹宏出幽州知祥懼禍稱疾辭位王乃以知祥為河東馬步都虞􅇋自是崇韜專典機密詔吳越王鏐大舉討淮南鏐以節度副大使傳瓘為諸軍都指揮使帥戰艦五百艘自東洲擊吳吳遣舒州刺史彭彦章及裨將陳汾拒之吳徐温帥將吏藩鎮請吳王稱帝吳王不許夏四月戊戌朔即吳國王位大赦改元武義建宗廟社稷置百官宫殿文物皆用天子禮以金繼土臘用丑改諡武忠王曰孝武王廟號太祖威王曰景王尊母為太妃以徐温為大丞相都督中外諸軍事諸道都統鎮海寧國節度使守太尉兼中書令東海郡王以徐知誥為左僕射參政事兼知内外諸軍事仍領江州團練使以揚府左司馬王令謀為内樞使營田副使嚴可求為門下侍郎鹽鐵判官駱知祥為中書侍郎前中書舍人盧擇為吏部尚書兼太常卿掌書記殷文圭為翰林學士館驛巡官游㳟為知制誥前駕部員外郎楊迢為給事中擇醴泉人迢敬之之孫也錢傳瓘與彭彦章遇傳瓘命每船皆載灰豆及沙乙巳戰于狼山江吳船乗風而進傳瓘引舟避之旣過自後隨之吳囬船與戰傳瓘使順風揚灰吳人不能開目及船舷相接傳瓘使散沙於己船而散豆於吳船豆為戰血所漬吳人踐之皆僵仆傳瓘因縱火焚吳船吳兵大敗彦章戰甚力兵盡繼之以木身被數十創陳汾按兵不救彦章知不免遂自殺傳瓘俘吳禆將七十人斬首千餘級焚戰艦四百艘吳人誅汾籍沒家貲以其半賜彦章家稟其妻子終身賀瓌攻德勝南城百道俱進以竹笮聨艨艟十餘艘䝉以牛革設睥睨戰格如城狀横於河流以斷晉之救兵使不得度晉王自引兵馳往救之陳於北岸不能進遣善游者馬破龍入南城見守將氏延賞延賞言矢石將盡陷在頃刻晉王積金帛于軍門募能破艨艟者衆莫知為計親將李建及曰賀瓌悉衆而來冀此一舉若我軍不度則彼為得計今日之事建及請以死決之乃選効節敢死士得三百人被鎧操斧帥之乗舟而進將至艨艟流矢雨集建及使操斧者入艨艟間斧其竹笮又以木甖載薪沃油然火於上流縱之隨以巨艦實甲士鼓譟攻之艨艟旣斷隨流而下梁兵焚溺者殆半晉兵乃得度瓌解圍走晉兵逐之至濮州而還瓌退屯行臺村蜀主命天策府諸將無得擅離屯戍五月丁卯朔左散旗軍使王承諤承勲承㑹違命蜀主皆原之自是禁令不行楚人攻荆南高季昌求救于吳吳命鎮南節度使劉信等帥洪吉撫信步兵自瀏陽趣潭州武昌節度使李簡等帥水軍攻復州信等至潭州東境楚兵釋荆南引歸簡等入復州執其知州鮑唐六月吳人敗吳越兵于沙山秋七月吳越王鏐遣錢傳瓘將兵三萬攻吳常州徐温帥諸將拒之右雄武統軍陳璋以水軍下海門出其後壬申戰于無錫㑹温病熱不能治軍吳越攻中軍飛矢雨集鎮海節度判官陳彦謙遷中軍旗鼓于左取貎類温者擐甲胄號令軍事温得少息俄頃疾稍間出拒之時久旱草枯吳人乗風縱火吳越兵亂遂大敗殺其將何逢吳建斬首萬級傳瓘遁去追至山南復敗之陳璋敗吳越于香彎温募生獲叛將陳紹者賞錢百萬指揮使崔彦章獲之紹勇而多謀温復使之典兵初錦衣之役吳馬軍指揮曹筠叛奔吳越徐温赦其妻子厚遇之遣使告之曰使汝不得志而去吾之過也汝無以妻子為念及是役筠復奔吳温自數昔日不用筠言者三而不問筠去來之罪歸其田宅復其軍職筠内愧而卒知誥請帥步卒二千易吳越旗幟鎧仗躡敗卒而東襲取蘇州温曰爾䇿固善然吾且求息兵未暇如汝言也諸將皆以為吳越所恃者舟楫今大旱水道涸此天亡之時也宜盡步騎之勢一舉滅之温歎曰天下離亂久矣民困已甚錢公亦未易可輕若連兵不解方為諸君之憂今戰勝以懼之戢兵以懷之使兩地之民各安其業君臣高枕豈不樂哉多殺何為遂引還吳越王鏐見何逢馬悲不自勝故將士心附之寵姬鄭氏父犯法當死左右為之請鏐曰豈可以一婦人亂我法出其女而斬之鏐自少在軍中夜未嘗寐倦極則就圎木小枕或枕大鈴寐熟輒欹而寤名曰警枕置粉盤于卧内有所記則書盤中比老不倦或寢方酣外有白事者令侍女振紙即寤時彈銅丸于樓牆之外以警直更者嘗微行夜叩北城門吏不肯啓關曰雖大王來亦不可啓乃自佗門入明日召北門吏厚賜之丙戌吳王立其弟濛為廬江郡公溥為丹陽郡公潯為新安郡公澈為鄱陽郡公子繼明為廬陵郡公晉王歸晉陽以巡官馮道為掌書記中門使郭崇韜以諸將陪食者衆請省其數王怒曰孤為効死者設食亦不得専可令軍中别擇河北帥孤自歸太原即召馮道令草詞以示衆道執筆逡巡不為曰大王方平河南定天下崇韜所請未至大過大王不從可矣何必以此驚動逺近使敵國聞之謂大王君臣不和非所以隆威望也㑹崇韜入謝王乃止初唐滅高麗天祐初高麗石窟寺眇僧躬乂聚衆據開州稱王號大封國至是遣佐良尉金立竒入貢于吳八月乙未朔宣義節度使賀瓌卒以開封尹王瓉為北面行營招討使瓉將兵五萬自黎陽度河掩擊澶魏至頓丘遇晉兵而旋瓉為治嚴令行禁止據晉人上游十八里楊村夾河築壘運洛陽竹木造浮橋自滑州饋運相繼晉蕃漢馬步副揔管振武節度使李存進亦造浮梁於德勝或曰浮梁須竹笮鐵牛石囷我皆無之何以能成存進不聽以葦笮維巨艦繫於土山巨木踰月而成人服其智吳徐温遣使以吳王書歸無錫之俘於吳越吳越王鏐亦遣使請和於吳自是吳國休兵息民三十餘州民樂業者二十餘年吳王及徐温屢遺吳越王鏐書勸鏐自王其國鏐不從九月丙寅詔削劉巖官爵命吳越王鏐討之鏐雖受命竟不行吳廬江公濛有材氣常歎曰我國家而爲它人所有可乎徐温聞而惡之資治通鑑卷第二百七十
