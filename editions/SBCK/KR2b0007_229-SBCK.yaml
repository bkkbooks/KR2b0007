body:
  text: 臣司馬光奉勑編集唐紀四十五閼逢困敦正月不滿一年起昭陽大淵獻十一月盡徳宗神武聖文皇帝四建中四年十一月乙亥以隴州為奉義軍擢臯為節度使泚又使中使劉海廣許臯鳯翔節度使臯斬之靈武留後杜希全鹽州刺史戴休顔夏州刺史時常春㑹渭北節度使李建徽合兵萬人入援將至奉天上召將相議道所從出闗播渾瑊曰漠谷道險狹恐為賊所邀不若自乾陵北過附柏城而行營於城東北雞子堆與城中掎角相應且分賊勢盧􅂎曰漠谷路近若為賊所邀則城中出兵應接可也儻出乾陵恐驚陵寢瑊曰自泚圍城斬乾陵松栢以夜繼晝其驚多矣今城中危急諸道救兵未至惟希全等來所繫非輕若得營據要地則泚可破也􅂎曰陛下行師豈比逆賊若令希全等過之是自驚陵寢上乃命希全等自漠谷進丙子希全等軍至漠谷果為賊所邀乘高以大弩巨石擊之死傷甚衆城中出兵應接為賊所敗是夕四軍潰退保邠州泚閲其輜重於城下從官相視失色休顔夏州人也泚攻城益急穿塹環之泚移帳於乾陵下視城中動静皆見之時遣使環城招誘士民笑其不識天命神䇿河北行營節度使李晟疾愈聞上幸奉天帥衆將奔命張孝忠迫於朱滔王武俊倚晟為援不欲晟行數沮止之晟乃留其子慿使娶孝忠女為婦又解玉帶賂孝忠親信使説之孝忠乃聽晟西歸遣大將楊榮國將鋭兵六百與晟俱晟引兵出飛狐道晝夜兼行至代州丁丑加晟神䇿行營節度使王武俊馬寔攻趙州不克辛巳寔歸瀛州武俊送之五里犒贈甚厚武俊亦歸恒州上之出幸奉天也陜虢觀察使姚明􅆒以軍事委都防禦副使張勸去詣行在勸募兵得數萬人甲申以勸為陜虢節度使朱泚攻圍奉天經月城中資糧俱盡上嘗遣健歩山城覘賊其人懇以苦寒為辭跪奏乞一􅃭袴上為之尋求不獲竟憫黙而遣之時供御纔有糲米二斛毎伺賊之休息夜縋人於城外采蕪菁根而進之上召公卿將吏謂曰朕以不德自䧟危亡固其宜也公輩無罪宜早降以救室家羣臣皆頓首流涕期盡死力故將士雖困急而鋭氣不衰上之幸奉天也糧料使崔縱勸李懷光令入援懷光從之縱悉斂軍資與懷光偕來懷光晝夜倍道至河中力疲休兵三日河中尹李齊運傾力犒宴軍士尚欲遷延崔縱先輦貨財度河謂衆曰至河西悉以分賜衆利之西屯蒲城有衆五萬齊運惲之孫也李晟行且收兵亦自蒲津濟軍於東渭橋其始有卒四千晟善於撫御與士卒同甘苦人樂從之旬月間至萬餘人神䇿兵馬使尚可孤討李希烈將三千人在襄陽自武闗入援軍于七盤敗泚將仇敬遂取藍田可孤宇文部之别種也鎮國軍副使駱元光其先安息人駱奉先養以為子將兵守潼闗近十年為衆所服朱泚遣其將何望之襲華州刺史董晉弃州走行在望之據其城將聚兵以絶東道元光引闗下兵襲望之走還長安元光遂軍華州召募士卒數日得萬餘人泚數遣兵攻元光元光皆擊却之賊由是不能東出上即以元光為鎮國軍節度使元光乃將兵二千西屯昭應馬燧遣其行軍司馬王權及其子彚將兵五千人入援屯中渭橋於是泚黨所據惟長安而已援軍遊騎時至望春樓下李忠臣等屢出兵皆敗求救於泚泚恐民間乘弊抄之所遣兵皆晝伏夜行泚内以長安為憂乃急攻奉天使僧法堅造雲梯高廣各數丈裹以兕革下施巨輪上容壯士五百人城中望之忷懼上以問羣臣渾瑊矦仲莊對曰臣觀雲梯勢甚重重則易陷臣請迎其所來鑿地道積薪蓄火以待之神武軍使韓澄曰雲梯小伎不足上勞聖慮臣請禦之乃度梯之所傃廣城東北隅三十歩多儲膏油松脂薪葦於其上丁亥泚盛兵鼓譟攻南城韓遊瓌曰此欲分吾力也乃引兵嚴備東北戊子北風甚迅泚推雲梯上施濕氊懸水囊載壯士攻城翼以轒輼置人其下抱薪負土填塹而前矢石火炬所不能傷賊併兵攻城東北隅矢石如雨城中死傷者不可勝數賊已有登城者上與渾瑊對泣羣臣惟仰首祝天上以無名告身自御史大夫實食五百户以下千餘通授瑊使募敢死士禦之仍賜御筆使視其功之大小書名給之告身不足則書其身且曰今便與卿别瑊俯伏流涕上拊其背歔欷不自勝時士卒凍餒又乏甲胄瑊撫諭激以忠義皆鼓譟力戰瑊中流矢進戰不輟初不言痛㑹雲梯輾地道一輪偏陷不能前却火從地中出風勢亦回城上人投葦炬散松脂沃以膏油讙呼震地須臾雲梯及梯上皆人為灰燼臭聞數里賊乃引退於是三門皆出兵太子親督戰賊徒大敗死者數千人將士傷者太子親為裹瘡入夜泚復來攻城矢及御前三歩而墜上大驚李懷光自蒲城引兵趣涇陽並北山而西先遣兵馬使張韶㣲服間行詣行在藏表於蠟丸韶至奉天值賊方攻城見韶以為賤人驅之使與民俱填塹韶得間踰塹抵城下呼曰我朔方軍使者也城上人下繩引之比登身中數十矢得表於衣中而進之上大喜舁韶以徇城四隅歡聲如雷癸巳懷光敗泚兵於醴泉泚聞之懼引兵遁歸長安衆以為懷光復三日不至則城不守矣泚旣退從臣皆賀汴滑行營兵馬使賈隱林進言曰陛下性太急不能容物若此性未改雖朱泚敗亡憂未艾也上不以為忤甚稱之侍御史萬俟著開金商運路重圍既解諸道貢賦繼至用度始振朱泚至長安但為城守之計時遣人自城外來周走呼曰奉天破矣欲以惑衆泚旣據府庫之冨不愛金帛以悅將士公卿家屬在城者皆給月俸神䇿及六軍從車駕及哥舒曜李晟者泚皆給其家糧加以繕完器械日費甚廣及長安平府庫尚有餘蓄見者皆追怨有司之暴斂焉或謂泚曰陛下旣受命唐之陵廟不宜復存泚曰朕嘗北靣事唐豈忍為此又曰百官多缺請以兵脅士人補之泚曰强授之則人懼但欲仕者則與之何必叩戸拜官邪泚所用者惟范陽神䇿團練兵涇原卒驕皆不為用但守其所掠資貨不肯出戰又宻謀殺泚不果而止李懷光性粗疎自山東來赴難數與人言盧􅂎趙賛白志貞之姦佞且曰天下之亂皆此曹所為也吾見上當請誅之旣解奉天之圍自矜其功謂上必接以殊禮或説王翃趙賛曰懷光縁道憤歎以為宰相謀議乖方度支賦斂煩重京尹犒賜刻薄致乘輿播遷者三臣之罪也今懷光新立大功上必披襟布誠詢訪得失使其言入豈不殆哉翃賛以告盧􅂎􅂎懼從容言於上曰懷光勲業社稷是賴賊徒破膽皆無守心若使之乘勝取長安則一舉可以滅賊此破竹之勢也今聽其入朝必當賜宴留連累日使賊入京城得從容成備恐難圖矣上以為然詔懷光直引軍屯便橋與李建徽李晟及神䇿兵馬使楊惠元刻期共取長安懷光自以數千里竭誠赴難破朱泚解重圍而咫尺不得見天子意殊怏怏曰吾今已為姦臣所排事可知矣遂引兵去至魯店留二日乃行劒南西山兵馬使張朏以所部兵作亂入成都西川節度使張延賞弃城奔漢州鹿頭戍將叱千遂等討之斬朏及其黨延賞復歸成都淮南節度使陳少遊將兵討李希烈屯盱眙聞朱泚作亂歸廣陵修塹壘繕甲兵浙江東西節度使韓滉閉闗梁禁馬牛出境築石頭城穿井近百所繕舘第數十修塢壁起建業抵京峴樓堞相屬以備車駕度江且自固也少遊􅀤兵三千大閲於江北滉亦􅀤舟師三千曜武於京江以應之鹽鐵使包佶有錢帛八百萬將輸京師陳少遊以為賊據長安未期收復欲强取之佶不可少遊欲殺之佶懼匿妻子於案牘中急濟江少遊悉收其錢帛佶有守財卒三千少遊亦奪之佶纔與數十人俱至上元復為韓滉所奪時南方藩鎮各閉境自守惟曹王臯數遣使開道貢獻李希烈攻逼汴鄭江淮路絶朝貢皆自宣饒荆襄趣武闗臯治郵驛平道路由是往來之使通行無阻上問陸䞇以當今切務䞇以曏日致亂由上下之情不通勸上接下從諫乃上䟽其略曰臣謂當今急務在於審察羣情若羣情之所甚欲者陛下先行之所甚惡者陛下先去之欲惡與天下同而天下不歸者自古及今未之有也夫理亂之本繫於人心况乎當變故動揺之時在危疑向背之際人之所歸則植人之所去則傾陛下安可不審察羣情同其欲惡使億兆歸趣以靖邦家乎此誠當今之所急也又曰頃者竊聞輿議頗究羣情四方則患於中外意乖百辟又患於君臣道隔郡國之志不逹於朝廷朝廷之誠不升於軒陛上澤闕於下布下情壅於上聞實事不必知知事不必實上下否隔於其際眞偽雜糅於其間聚怨囂囂騰謗籍籍欲無疑阻其可得乎又曰揔天下之智以助聰明順天下之心以施教令則君臣同志何有不從逺邇歸心孰與為亂又曰慮有愚而近道事有要而似迃䟽奏旬日上無所施行亦不詰問䞇又上䟽其略曰臣聞立國之本在乎得衆得衆之要在乎見情故仲尼以謂人情者聖王之田言理道所生也又曰易乾下坤上曰泰坤下乾上曰否損上益下曰益損下益上曰損夫天在下而地處上於位乖矣而反謂之泰者上下交故也君在上而臣處下於義順矣而反謂之否者上下不交故也上約已而裕於人人必悅而奉上矣豈不謂之益乎上蔑人而肆諸己人必怨而叛上矣豈不謂之損乎又曰舟即君道水即人情舟順水之道乃浮違則没君得人之情乃固失則危是以古先聖王之居人上也必以其欲從天下之心而不敢以天下之人從其欲又曰陛下憤習俗以妨理任削平而在躬以明威照臨以嚴法制斷流弊自久浚恒太深逺者驚疑而阻命逃死之亂作近者畏懾而偷容避罪之態生君臣意乖上下情隔君務致理而下防誅夷臣將納忠又上慮欺誕故睿誠不布於羣物物情不逹於睿聰臣於往年曾任御史獲奉朝謁僅欲半年陛下嚴邃高居未嘗降㫖臨問羣臣跼蹐趨退亦不列事奏陳軒墀之間且未相諭宇宙之廣何由自通雖復例對使臣别延宰輔既殊師錫且異公言未行者則戒以樞宻勿論己行者又謂之遂事不諫漸生拘礙動渉猜嫌由是人各隱情以言為諱至於變亂將起億兆同憂獨陛下恬然不知方謂太平可致陛下以今日之所覩驗往時之所聞孰眞孰虛何得何失則事之通塞備詳之矣人之情偽盡知之矣上乃遣中使諭之曰朕本性甚好推誠亦能納諫將謂君臣一體全不隄防縁推誠信不疑多被姦人賣弄今所致患害朕思亦無它其失反在推誠又諫官論事少能慎宻例自矜􅃷歸過於朕以自取名朕從卽位以來見奏對論事者甚多大抵皆是雷同道聽塗説試加質問遽即辭窮若有竒才異能在朕豈惜㧞擢朕見從前已來事秖如此所以近來不多取次對人亦非倦於接納卿宜深悉此意贄以人君臨下當以誠信為本諫者雖辭情鄙拙亦當優容以開言路若震之以威折之以辯則臣下何敢盡言乃復上疏其略曰天子之道與天同方天不以地有惡木而廢􅀤生天子不以時有小人而廢聽納又曰唯信與誠有失無補一不誠則心莫之保一不信則言莫之行陛下所謂失於誠信以致患害者臣竊以斯言為過矣又曰馭之以智則人詐示之以疑則人偷上行之則下從之上施之則下報之若誠不盡於己而望盡於人衆必怠而不從矣不誠於前而曰誠於後衆必疑而不信矣是知誠信之道不可斯須而去身願陛下慎守而行之有加恐非所以為悔者也又曰臣聞仲虺賛􅀭成湯不稱其無過而稱其改過吉甫歌誦周宣不美其無闕而美其補闕是則聖賢之意較然著明唯以改過為能不以無過為貴蓋為人之行己必有過差上智下愚俱所不免智者改過而遷善愚者恥過而遂非遷善則其徳日新遂非則其惡彌積又曰諫官不宻自矜信非忠厚其於聖徳固亦無虧陛下若納諫不違則傳之適足增美陛下若違諫不納又安能禁之勿傳又曰侈言無驗不必用質言當理不必違辭拙而效速者不必愚言甘而利重者不必智是皆考之以實慮之以終其用無它唯善所在又曰陛下所謂比見奏對論事皆是雷同道聽塗説者臣竊以衆多之議足見人情必有可行亦有可畏恐不宜一槩輕侮而莫之省納也陛下又謂試加質問即便辭窮者臣但以陛下雖窮其辭而未窮其理能服其口而未服其心又曰為下者莫不願忠為上者莫不求理然而下毎苦上之不理上每苦下之不忠若是者何兩情不通故也下之情莫不願逹於上上之情莫不求知於下然而下恒苦上之難逹上恒苦下之難知若是者何九弊不去故也所謂九弊者上有其六而下有其三好勝人恥聞過騁辯給􅅭聦明厲威嚴恣彊愎此六者君上之弊也諂諛顧望畏愞此三者臣下之弊也上好勝必甘於佞辭上恥過必忌於直諫如是則下之諂諛者順旨而忠實之語不聞矣上騁辯必勦説而折人以言上眩明必臆度而虞人以詐如是則下之顧望者自便而切磨之辭不盡矣上厲威必不能降情以接物上恣愎必不能引咎以受規如是則下之畏愞者避辜而情理之説不申矣夫以區域之廣大生靈之衆多宫闕之重深高卑之限隔自黎獻而上獲覩至尊之光景者踰億兆而無一焉就獲覩之中得接言議者又千萬不一幸而得接者猶有九弊居其間則上下之情所通鮮矣上情不通於下則人惑下情不通於上則君疑疑則不納其誠惑則不從其令誠而不見納則應之以悖令而不見從則加之以刑下悖上刑不敗何待是使亂多理少從古以然又曰昔趙武呐呐而為晉賢臣絳矦木訥而為漢元輔然則口給者事或非信辭屈者理或未窮人之難知堯舜所病胡可以一詶一詰而謂盡其能哉以此察天下之情固多失實以此輕天下之士必有遺才又曰諫者多表我之能好諫者直示我之能賢諫者之狂誣明我之能恕諫者之漏泄彰我之能從有一于斯皆爲盛德是則人君之與諫者交相益之道也諫者有爵賞之利君亦有理安之利諫者得獻替之名君亦得采納之名然猶諫者有失中而君無不美唯恐讜言之不切天下之不聞如此則納諫之徳光矣上頗采用其言李懷光頓兵不進數上表暴楊盧􅂎等罪惡衆論諠騰亦咎􅂎等上不得已十二月壬戌貶􅂎爲新州司馬白志貞爲恩州司馬趙贊爲播州司馬宦官翟文秀上所信任也懷光又言其罪上亦爲殺之乙丑以翰林學士祠部員外郎陸䞇為考功郎中金部員外郎吴通㣲為職方郎中䞇上奏辭以初到奉天扈從將吏例加兩階今翰林獨遷官夫行罰先貴近而後卑逺則令不犯行賞先卑逺而後貴近則功不遺望先録大勞次徧羣品則臣亦不敢獨辭上不許上在奉天使人説田悦王武俊李納赦其罪厚賂以官爵悦等皆密歸欵而猶未敢絶朱滔各稱王如故滔使其虎牙將軍王郅説悦曰日者八郎有急淊與趙王不敢愛其死竭力赴救幸而解圍今太尉三兄受命闗中淊欲與回紇共徃助之願八郎治兵與淊度河共取大梁悦心不欲行而未忍絶滔乃許之淊復遣其内史舍人李琯見悦審其可否悦猶豫不决宻召扈㠋等議之司武侍郎許士則曰朱淊昔事李懷仙為牙將與兄泚及朱希彩共殺懷仙而立希彩希彩所以寵信其兄弟至矣淊又與判官李子瑗謀殺希彩而立泚泚旣為帥淊乃勸泚入朝而自為留後雖勸以忠義實奪之權也平生與之同謀共功如李子瑗之徒負而殺之者二十餘人今又與泚東西相應使滔得志泚亦不為所容况同盟乎滔為人如此大王何從得其肺腑而信之邪彼引幽陵回紇十萬之兵屯於郊坰大王出迎則成擒矣彼囚大王兼魏國之兵南向度河與闗中相應天下其孰能當之大王於時悔之無及為大王計不若陽許偕行而隂為之備厚加迎勞至則託以它故遣將分兵而隨之如此大王外不失報徳之名而内無倉猝之憂矣扈㠋等皆以為然王武俊聞李琯適魏遣其司刑員外郎田秀馳見悦曰武俊曏以宰相處事失宜恐禍及身又八郎困於重圍故與滔合兵救之今天子方在隱憂以徳綏我我曹何得不悔過而歸之邪捨九葉天子不事而事泚及滔乎且泚未稱帝之時滔與我曹比肩為王固巳輕我曹矣况使之南平汴洛與泚連衡吾屬皆為虜矣八郎慎勿與之俱南但閉城拒守武俊請伺其隙連昭義之兵擊而滅之與八郎再清河朔復為節度使共事天子不亦善乎悦意遂决紿滔云從行必如前約丁卯滔將范陽歩騎五萬人私從者復萬餘人回紇三千人􅀤河間而南輜重首尾四十里李希烈攻李勉於汴州驅民運土木築壘道以攻城忿其未就并人填之謂之濕薪勉城守累月外救不至將其衆萬餘人奔宋州庚午希烈䧟大梁滑州刺史李澄以城降希烈希烈以澄爲尚書令兼永平節度使勉上表請罪上謂其使者曰朕猶失守宗廟勉宜自安待之如初劉洽遣其將髙翼將精兵五千保襄邑希烈攻拔之翼赴水死希烈乘勝攻寧陵江淮大震陳少遊遣參謀温述送􅅃於希烈曰濠壽舒廬已令弛備韜戈卷甲伏俟指麾又遣廵官趙詵結李納於鄆州中書侍郎同平章事關播罷為刑部尚書以給事中孔巢父為淄青宣慰使國子祭酒董晉為河北宣慰使陸䞇言於上曰今盗遍天下輿駕播遷陛下宜痛自引過以感人心昔成湯以罪已勃興楚昭以善言復國陛下誠能不吝改過以言謝天下使書詔無所避忌臣雖愚陋可以仰副聖情庶令反側之徒革心向化上然之故奉天所下書詔雖驕將悍卒聞之無不感激揮涕術者上言國家厄運宜有變更以應時數羣臣請更加尊號一二字上以問陸䞇贄上奏以為不可其略曰尊號之興本非古制行於安泰之日已累謙冲襲乎䘮亂之時尤傷事體又曰嬴秦徳衰兼皇與帝始揔稱之流及後代昏僻之君乃有聖劉天元之號是知人主輕重不在名稱損之有謙光稽古之善崇之獲矜能納謟之譏又曰必也俯稽術數須有變更與其增美稱而失人心不若黜舊號以祗天戒上納其言但改年號而已上又以中書所撰赦文示䞇䞇上言以為動人以言所感己淺言又不切人誰肯懷今兹徳音悔過之意不得不深引咎之辭不得不盡洗刷疵垢宣暢鬱堙使人人各得所欲則何有不從者乎應須改革事條謹具别狀同進捨此之外尚有所虞竊以知過非難改過為難言善非難行善為難假使赦文至精止於知過言善猶願聖慮更思所難上然之興元元年春正月癸酉朔赦天下改元制曰致理興化必在推誠忘巳濟人不吝改過朕嗣服丕構君臨万􅀖失守宗祧越在草莽不念率徳誠莫追於既往永言思咎期有復於將來明徵其義以示天下小子懼徳不嗣罔敢怠荒然以長于深宫之中暗於經國之務積習易溺居安忘危不知稼穡之艱難不恤征戍之勞苦澤靡下究情未上通事既擁隔人懷疑阻猶昩省已遂用興戎徵師四方轉餉千里賦車籍馬逺近騷然行齎居送衆庶勞止或一日屢交鋒刃或連年不解甲胄祀奠乏主室家靡依死生流離怨氣凝結力役不息田萊多荒暴令峻於誅求疲甿空於杼軸轉死溝壑離去鄉閭邑里丘墟人煙斷絶天譴於上而朕不寤人怨於下而朕不知馴致亂階變興都邑萬品失序九廟震驚上累于祖宗下負于蒸庶痛心􅌤皃罪實在予永言愧悼若墜泉谷自今中外所上書奏不得更言聖神文武之號李希烈田悦王武俊李納等咸以勲舊各守藩維朕撫馭乖方致其疑懼皆由上失其道而下罹其災朕實不君人則何罪宜并所管將吏等一切待之如初朱滔雖縁朱泚連坐路逺必不同謀念其舊勲務在􅀪貸如能效順亦與惟新宋泚反易天常盗竊名器暴犯陵寢所不忍言獲罪祖宗朕不敢赦其脅從將吏百姓等但官軍未到京城以前去逆效順并散歸本道本軍者並從赦例諸軍諸道應赴奉天及進收京城將士並賜名奉天定難功臣其所加墊陌錢税間架竹木茶漆􅅦鐵之類悉宜停罷赦下四方人心大悦及上還長安明年李抱眞入朝為上言山東宣布赦書士卒皆感泣臣見人情如此知賊不足平也命兵部員外郎李充為恒冀宣慰使朱泚更國號曰漢自稱漢元天皇改元天皇王武俊田悦李納見赦令皆去王號上表謝罪惟李希烈自恃兵彊財富遂謀稱帝遣人問儀於顔眞卿眞卿曰老夫嘗為禮官所記惟諸矦朝天子禮耳希烈遂即皇帝位國號大楚改元武成置百官以其黨鄭賁為侍中孫廣為中書令李緩李元平同平章事以汴州為大梁府分其境内為四節度希烈遣其將辛景臻謂顔眞卿曰不能屈節當自焚積薪灌油於其庭眞卿趨赴火景臻遽止之希烈又遣其將楊峯齎赦賜陳少遊及夀州刺史張建封建封執峯徇於軍腰斬於市少遊聞之駭懼建封具以少遊與希烈交通之狀聞上悦以建封為濠壽廬三州都團練使希烈乃以其將杜少誠為淮南節度使使將歩騎萬餘人先取壽州後之江都建封遣其將賀蘭元均邵怡守霍丘秋柵少誠竟不能過遂南㓂蘄黄欲斷江路時上命包佶自督江淮財賦泝江詣行在至蘄口遇少誠入冦曹王臯遣蘄州刺史伊慎將兵七千拒之戰於永安戍大破之少誠脱身走斬首萬級包佶乃得前後佶入朝具奏陳少遊奪財賦事少遊懼厚斂所部以償之李希烈以夏口上流要地使其驍將董侍募死士七千人襲卾州刺史李兼偃旗卧鼓閉門以待之侍撤屋材以焚門兼帥士卒出戰大破之上以兼為鄂岳沔都團練使於是希烈東畏曹王臯西畏李兼不敢復有窺江淮之志矣朱滔引兵入趙境王武俊大具犒享入魏境田悦供承倍豐使者迎候相望於道丁丑滔至永濟遣王郅見悦約㑹館陶偕行度河悦見郅曰悦固願從五兄南行昨日將出軍將士勒兵不聽悦出曰國兵新破戰守踰年資儲竭矣今將士不免凍餒何以全軍逺征大王日自撫循猶不能安若捨城邑而去朝出暮必有變悦之志非敢有貳也如將士何已令孟祐備歩騎五千從五兄供芻牧之役因遣其司禮侍郎裴抗等徃謝滔滔聞之大怒曰田悦逆賊曏在重圍命如絲髪使我叛君弃兄􅀤兵晝夜赴之幸而得存許我貝州我辭不取尊我爲天子我辭不受今乃負恩誤我逺來飾辭不出即日遣馬寔攻宗城經城楊榮國攻冠氏皆拔之又縱囘紇掠館陶頓幄奕器皿車牛以去悦閉城自守壬午滔遣裴抗等還分兵置吏守平恩永濟丙戌以吏部侍郎盧翰爲兵部侍郎同平章事翰義僖之七世孫也朱滔引兵北圍貝州引水環之刺史邢曹俊嬰城拒守縱范陽及囘紇兵大掠諸縣又拔武城通徳棣二州使給軍食遣馬寔將歩騎五千屯冠氏以逼魏州以給事中杜黄裳為江淮宣慰副使上於行宫廡下貯諸道貢獻之物牓曰瓊林大盈庫陸䞇以為戰守之功賞賚未行而遽私别庫則士卒怨望無復闘志上疏諫其略曰天子與天同徳以四海為家何必橈廢公方崇聚私貨降至尊而代有司之守辱萬乘以效匹夫之藏虧法失人誘姦聚怨以斯制事豈不過哉又曰頃者六師初降百物無儲外扞兇徒内防危堞晝夜不息殆將五旬凍餒交侵死傷相枕畢命同力竟夷大艱良以陛下不厚其身不私其欲絶甘以同卒伍輟食以㗖功勞無猛制而人不擕懷所感也無厚賞而人不怨悉所無也今者攻圍已解衣食已豐而謡讟方興軍情稍阻豈不以勇夫恒性嗜利矜功其患難既與之同憂而好樂不與之同利茍異恬黙能無怨咨又曰陛下誠能近想重圍之殷憂追戒平居之專欲凡在二庫貨賄盡令出賜有功毎獲珍華先給軍賞如此則亂必靖賊必平徐駕六龍旋復都邑天子之貴豈當憂貧是乃散其小儲而成其大儲損其小寶而固其大寶也上即命去其牓蕭復嘗言於上曰宦官自艱難以來多為監軍恃恩縱横此屬但應掌宫掖之事不宜委以兵權國政上不悦又嘗言陛下踐阼之初聖徳光被自用楊炎盧􅂎黷亂朝政以致今日陛下誠能變更睿志臣敢不竭力儻使臣依阿茍免臣實不能又嘗與盧􅂎同奏事􅂎順上㫖復正色曰盧􅂎言不正上愕然退謂左右曰蕭復輕朕戊子命復充山南東西荆湖淮南江西鄂岳浙江東西福建嶺南等道宣慰安撫使實踈之也既而劉從一及朝士徃徃奏留復上謂陸䞇曰朕思遷幸以來江淮逺方或傳聞過實欲遣重臣宣慰謀於宰相及朝士僉謂宜然今乃反覆如是朕為之悵恨累日意復悔行使之論奏邪卿知蕭復如何人其不欲行意趣安在䞇上奏以為復痛自脩勵慕為清貞用雖不周行則可保至於輕詐如此復必不為借使復欲逗留從一安肯附㑹今所言矛楯願陛下明加辨詰若蕭復有所請求則從一何容為隱若從一自有囘互則蕭復不當受疑陛下何憚而不辨明乃直為此悵恨也夫明則罔惑辯則罔寃惑莫甚於逆詐而不與明寃莫痛於見疑而不與辯是使情偽相糅忠邪靡分兹實居上御下之要樞惟陛下留意上亦竟不復辯也辛卯以王武俊為恒兾深趙節度使壬辰加李抱眞張孝忠並同平章事丙申加田悦檢校右僕射以山南東道行軍司馬樊澤為本道節度使前深趙觀察使康日知為同州刺史奉誠軍節度使曹州刺史李納為鄆州刺史平盧節度使戊戌加劉洽汴滑宋亳都統副使知都統事李勉悉以其衆授之辛丑六軍各置統軍秩從二品以寵勲臣吐蕃尚結贊請出兵助唐收京城庚子遣祕書監崔漢衡使吐蕃發其兵資治通鑑卷第二百二十九
