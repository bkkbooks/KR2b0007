body:
  text: 臣司馬光奉勑編集唐紀七十六兆執徐凡二年起旃䝉單閼盡昭宗聖穆景文孝皇帝上之下乾寧二年春正月辛酉幽州軍民數萬以麾蓋歌鼓迎李克用入府舍克用命苻存審劉仁恭將兵略定廵屬癸未朱全忠遣其將朱友恭圍兖州朱瑄自鄆以兵糧救之友恭設伏敗之於髙梧盡奪其餉擒河東將安福順安福慶己巳以給事中陸希聲爲户部侍郎同平章事希聲元方五世孫也壬申䕶國節度使王重盈薨軍中請以重榮子行軍司馬珂知留後事珂重盈兄重簡之子也重榮養以爲子楊行密表朱全忠罪惡請㑹易定兖鄆河東兵討之董昌將稱帝集將佐議之節度副使黄碣曰今唐室雖微天人未厭齊桓晉文皆翼戴周室以成霸業大王興於畎􅅿受朝廷厚恩位至將相富貴極矣柰何一旦忽爲族滅之計乎碣寕死爲忠臣不生爲叛逆昌怒以爲惑衆斬之投其首於厠中罵之曰奴賊負我好聖明時三公不能待而先求死也并殺其家八十口同坎瘞之又問㑹稽令吳鐐對曰大王不爲真諸侯以傳子孫乃欲假天子以取滅亡邪昌亦族誅之又謂山隂令張遜曰汝有能政吾深知之俟吾爲帝命汝知御史臺遜曰大王起石鏡鎮建節浙東榮貴近二十年何苦效李錡劉闢之所爲乎浙東僻處海隅巡屬雖有六州大王若稱帝彼必不從徒守􅀌城爲天下笑耳昌又殺之謂人曰無此三人者則人莫我違矣二月辛卯昌被衮冕登子城門樓即皇帝位悉陳瑞物於庭以示衆先是咸通末吳越間訛言山中有大鳥四目三足聲云羅平天冊見者有殃民間多畫像以祀之及昌將僭號曰此吾鸑鷟也乃自稱大越羅平國改元順天署城樓曰天冊之樓令羣下謂已曰聖人以前杭州刺史李邈前婺州刺史蔣瓌兩浙鹽鐵副使杜郢前屯田郎中李瑜爲相又以吳瑤等皆爲翰林學士李暢之等皆爲大將軍昌移書錢鏐告以權即羅平國位以鏐爲兩浙都指揮使鏐遺昌書曰與其閉門作天子與九族百姓俱陷塗炭豈若開門作節度使終身富貴邪及今悛悔尚可及也昌不聴鏐乃將兵三萬詣越州城下至迎恩門見昌再拜言曰大王位兼將相柰何捨安就危鏐將兵此來以俟大王改過耳若天子命將岀師縱大王不自惜鄉里士民何罪隨大王族滅乎昌懼致犒軍錢二百萬執首謀者吳瑤及巫覡數人送於鏐且請待罪天子鏐引兵還以狀聞王重盈之子保義節度使珙晉州刺史瑤舉兵擊王珂表言珂非王氏子與朱全忠書言珂本吾家蒼頭不應爲嗣珂上表自陳且求援於李克用上遣中使諭解之上重李谿文學乙未復以谿爲户部侍郎同平章事己酉朱全忠軍于單父爲朱友恭聲援李克用表劉仁恭爲盧龍留後留兵戍之壬子還晉陽嬀州人髙思繼兄弟有武幹爲燕人所服克用皆以爲都將分掌幽州兵部下士卒皆山北之豪也仁恭憚之久之河東兵戍幽州者暴横思繼兄弟以法裁之所誅殺甚多克用怒以讓仁恭仁恭訴稱髙氏兄弟所爲克用俱殺之仁恭欲収燕人心復引其諸子置帳下厚撫之崔昭緯與李茂貞王行瑜深相結得天子過失朝廷機事悉以告之邠寧節度副使崔鋋昭緯之族也李谿再入相昭緯使鋋告行瑜曰曏者尚書令之命巳行矣而韋昭度沮之今又引李谿爲同列相與熒惑聖聴恐復有杜太尉之事行瑜乃與茂貞表稱谿姦邪昭度無相業冝罷居散秩上報曰軍旅之事朕則與藩鎮圖之至於命相當出朕懐行瑜等論列不已三月谿復罷爲太子少師王珙王瑤請朝廷命河中帥詔以中書侍郎同平章事崔㣧同平章事充護國節度使以户部侍郎判户部王摶爲中書侍郎同平章事王珂李克用之壻也克用表重榮有功於國請賜其子珂節􅃏王珙厚結王行瑜李茂貞韓建三帥更上表稱珂非王氏子請以珂爲陜州珙爲河中上諭以先已允克用之奏不許加王鎔兼侍中楊行密浮淮至泗州防禦使臺濛盛飾供帳行密不悦既行濛於卧内得􅀘綻衣馳使歸之行密笑曰吾少貧賤不敢忘本濛甚慙行密攻濠州拔之執刺史張璲行密軍士掠得徐州人李氏之子生八年矣行密養以爲子行密長子渥憎之行密謂其將徐温曰此兒質狀性識頗異於人吾度渥必不能容今賜汝爲子温名之曰知誥知誥事温勤孝過於諸子嘗得罪於温温笞而逐之及歸知誥迎拜於門温問何故猶在此知誥泣對曰人子捨父母將何之父怒而歸母人情之常也温以是益愛之使掌家事家人無違言及長喜書善射識度英偉行密常謂温曰知誥俊傑諸將子皆不及也丁亥行密圍夀州上以郊畿多盗至有踰垣入宫或侵犯陵寢者欲令宗室諸王將兵廵警又欲使之四方撫慰藩鎮南北司用事之臣恐其不利於已交章論諫上不得已夏四月下詔悉罷之朝廷以董昌有貢輸之勤今日所爲類得心疾詔釋其罪縱歸田里户部侍郎同平章事陸希聲罷爲太子少師楊行密圍夀州不克將還庚寅其將朱延夀請試往更攻一鼓拔之執刺史江從朂行密以延夀權知夀州團練使未幾汴兵數萬攻夀州州兵少吏民忷懼延夀制軍中每旗二十五騎命黒雲隊長李厚將十旗擊汴兵不勝延夀將斬之厚稱衆寡不敵願益兵更往不勝則死都押牙汝陽柴再用亦爲之請乃益以五旗厚殊死戰再用助之延夀悉衆乗之汴兵敗走厚蔡州人也行密又遣兵襲漣水抜之錢鏐表董昌僭逆不可赦請以本道兵討之太􅀓門下侍郎同平章事韋昭度以太保致仕戊戌以劉建鋒爲武安節度使建鋒以馬殷爲内外馬步軍都指揮使楊行密遣使詣錢鏐言董昌已改過冝釋之亦遣詣昌使􅃐朝貢河東遣其將史儼李承嗣以萬騎馳入于鄆朱友恭退歸于汴五月詔削董昌官爵委錢鏐討之初王行瑜求尚書令不獲由是怨朝廷畿内有八鎮兵􅀠左右軍郃陽鎮近華州韓建求之良原鎮近邠州王行瑜求之宦官曰此天子禁軍何可得也王珂王珙争河中行瑜建及李茂貞皆爲珙請不能得恥之珙使人語三帥曰珂不受代而與河東昬姻必爲諸公不利請討之行瑜使其弟匡國節度使行約攻河中珂求救於李克用行瑜乃與茂貞建各將精兵數千入朝甲子至京師坊市民皆􅇡匿上御安福門以待之三帥盛陳甲兵拜伏舞蹈於門下上臨軒親詰之曰卿輩不奏請俟報輒稱兵入京城其志欲何爲乎若不能事朕今日請避賢路行瑜茂貞流汗不能言獨韓建粗述入朝之由上與三帥宴三帥奏稱南北司互有朋黨墮紊朝政韋昭度討西川失䇿李谿作相不合衆心請誅之上未之許是日行瑜等殺昭度谿於都亭驛又殺樞密使康尚弼及宦官數人又言王珂王珙嫡庶不分請除王珙河中徙王行約於陜王珂於同州上皆許之始三帥謀廢上立吉王保至是聞李克用已起兵於河東行瑜茂貞各留兵二千人宿衞京師與建皆辭還鎮貶户部尚書楊堪爲雅州刺史堪虞卿之子昭度之舅也初崔胤除河中節度使河東進奏官薛志勤揚言曰崔公雖重徳以之代王珂不若光徳劉公於我公厚也光徳劉公者太常卿劉崇望也及三帥入朝聞志勤之言貶崇望昭州司馬李克用聞三鎮兵犯闕即日遣使十三輩發北部兵期以來月度河入闗六月庚寅以錢鏐爲浙東招討使鏐復發兵擊董昌辛卯以前均州刺史孔緯繡州司户張濬並爲太子賔客壬辰以緯爲吏部尚書復其階爵癸巳拜司空兼門下侍郎同平章事以張濬爲兵部尚書諸道租庸使時緯居華州濬居長水上以崔昭緯等外交藩鎮朋黨相傾思得骨鯁之士故驟用緯濬緯以有疾扶輿至京師見上涕泣固辭上不許李克用大舉蕃漢兵南下上表稱王行瑜李茂貞韓建稱兵犯闕賊害大臣請討之又移檄三鎮行瑜等大懼克用軍至絳州刺史王瑤閉城拒之克用進攻旬日拔之斬瑤於軍門殺城中違拒者千餘人秋七月丙辰朔克用至河中王珂迎謁于路匡國節度使王行約敗於朝邑戊午行約弃同州走己未至京師行約弟行實時爲左軍指揮使帥衆與行約大掠西市行實奏稱同華已􅃿沙陁將至請車駕幸邠州庚申樞密使駱全瓘奏請車駕幸鳯翔上曰朕得克用表尚駐軍河中就使沙陁至此朕自有以枝梧卿等但各撫本軍勿令搖動右軍指揮使李繼鵬茂貞假子也本姓名閻珪與駱全瓘謀劫上幸鳯翔中尉劉景宣與王行實知之欲劫上幸邠州孔緯面折景宣以爲不可輕離宫闕向晚繼鵬連奏請車駕出幸於是王行約引左軍攻右軍鼔譟震地上聞亂登承天樓欲諭止之捧日都頭李筠將本軍於樓前侍衞李繼鵬以鳯翔兵攻筠矢拂御衣著于樓桷左右扶上下樓繼鵬復縱火焚宫門煙炎蔽天時有鹽州六都兵屯京師素爲兩軍所憚上急召令入衛既至兩軍退走各歸邠州及鳯翔城中大亂互相剽掠上與諸王及親近幸李筠營䕶蹕都頭李居實帥衆繼至或傳王行瑜李茂貞欲自來迎車駕上懼爲所迫辛酉以筠居實兩都兵自衛出啓夏門􅃐南山宿莎城鎮士民追從車駕者數十萬人比至谷口暍死者三之一夜復爲盜所掠哭聲震山谷時百官多扈從不及户部尚書判度支及鹽鐵轉運使薛王知柔獨先至上命權知中書事及置頓使壬戌李克用入同州崔昭緯徐彦若王摶至莎城甲子上徙幸石門鎮命薛王知柔與知樞密院劉光裕還京城制置守衛宫禁丙寅李克用遣節度判官王瓌奉表問起居丁卯上遣内侍郗廷昱齎詔詣李克用軍令與王珂各發萬騎同赴新平又詔彰義節度使張鐇以涇原兵控扼鳯翔李克用遣兵攻華州韓建登城呼曰僕於李公未嘗失禮何爲見攻克用使謂之曰公爲人臣逼逐天子公爲有禮孰爲無禮者乎㑹郗廷昱至言李茂貞將兵三萬至盩厔王行瑜將兵至興平皆欲迎車駕克用乃釋華州之圍移兵營渭橋以薛王知柔爲清海節度使同平章事仍權知京兆尹判度支充鹽鐵轉運使俟反正日赴鎮上在南山旬餘士民從車駕避亂者日相驚曰邠􅄮兵至矣上遣延王戒丕詣河中􅃐李克用令進兵壬午克用發河中八月上遣供奉官張承業詣克用軍承業同州人屢奉使於克用因留監其軍己丑克用進軍渭橋遣其將李存貞爲前鋒辛卯拔永夀又遣史儼將三千騎詣石門侍衛癸巳遣李存信李存審㑹保大節度使李思孝攻王行瑜梨園寨擒其將王令陶等獻於行在思孝本姓拓跋思恭之弟也李茂貞懼斬李繼鵬傳首行在上表請罪且遣使求和於克用上復遣延王戒丕丹王允諭克用令且赦茂貞併力討行瑜俟其殄平當更與卿議之且命二王拜克用爲兄以前河中節度使崔胤爲中書侍郎同平章事戊戌削奪王行瑜官爵癸卯以李克用爲邠寧四靣行營都招討使保大節度使李思孝爲北面招討使定難節度使李思諫爲東面招討使彰義節度使張鐇爲西面招討使克用遣其子存朂詣行在年十一上竒其狀貌撫之曰兒方爲國之棟梁它日冝盡忠於吾家克用表請上還京上許之令克用遣騎三千駐三橋爲僃禦辛亥車駕還京師壬子司空兼門下侍郎平章事崔昭緯罷爲右僕射以護國留後王珂盧龍留後劉仁恭各爲本鎮節度使時宫室焚毁未暇完葺上寓居尚書省百官往往無袍笏僕馬以李克用爲行營都統九月癸亥司空兼門下侍郎同平章事孔緯薨辛未朱全忠自將擊朱瑄戰於梁山瑄敗走還鄆李克用急攻梨園王行瑜求救於李茂貞茂貞遣兵萬人屯龍泉鎮自將兵三萬屯咸陽之旁克用請詔茂貞歸鎮仍削奪其官爵欲分兵討之上以茂貞自誅繼鵬前已赦宥不可復削奪誅討但詔歸鎮仍令克用與之和解以昭義節度使李罕之檢校侍中充邠寧四面行營副都統史儼敗邠寧兵於雲陽擒雲陽鎮使王令誨等獻之王建遣簡州刺史王宗瑤等將兵赴難甲戌軍于綿州董昌求救於楊行密行密遣泗州防禦使臺濛攻蘇州以救之且表昌引咎願修職貢請復官爵又遺錢鏐書稱昌狂疾自立已畏兵諫執送同惡不當復伐之冬十月丙戌河東將李存貞敗邠寧軍於梨園北殺千餘人自是梨園閉壁不敢出貶右僕射崔昭緯爲梧州司馬魏國夫人陳氏才色冠後宫戊子上以賜李克用克用令李罕之李存信等急攻梨園城中食盡弃城走罕之等邀擊之所殺萬餘人克梨園等三寨獲王行瑜子知進及大將李元福等克用進屯梨園庚寅王行約王行實燒寧州遁去克用奏請以匡國節度使蘇文建爲静難節度使􅃐令赴鎮且理寧州招撫降人上遷居大内朱全忠遣都將葛從周擊兖州自以大軍繼之癸卯圍兖州楊行密遣寧國節度使田頵潤州團練使安仁義攻杭州鎮戍以救董昌昌使湖州將徐淑㑹淮南將魏約共圍嘉興錢鏐遣武勇都指揮使顧全武救嘉興破烏墩光福二寨淮南將柯厚破蘇州水柵全武餘姚人也義武節度使王處存薨軍中推其子節度副使郜爲留後以京兆尹武邑孫偓爲兵部侍郎同平章事王行瑜以精甲五千守龍泉寨李克用攻之李茂貞以兵五千救之營於鎮西李罕之擊鳯翔兵走之十一月丁巳拔龍泉寨行瑜走入邠州遣使請降於克用齊州刺史朱瓊舉州降於朱全忠瓊瑾之從父兄也衢州刺史陳儒卒弟岌代之李克用引兵逼邠州王行瑜登城號哭謂克用曰行瑜無罪迫脅乘輿皆李茂貞及李繼鵬所爲請移兵問鳯翔行瑜願束身歸朝克用曰王尚父何恭之甚僕受詔討三賊臣公預其一束身歸朝非僕所得專也丁卯行瑜挈族弃城走克用入邠州封府軍撫居人命指揮使髙爽㩲巡撫軍城奏趣􅂫文建赴鎮行瑜走至慶州境部下斬行瑜傳首朱瑄遣其將賀瓌柳存及河東將何懐寳將兵萬餘人襲曹州以解兖州之圍瓌濮陽人也丁卯全忠自中都引兵夜追之比明至鉅野南及之屠殺殆盡生擒瓌存懐寳俘士卒三千餘人是日晡後大風沙塵晦􅁳全忠曰此殺人未足耳下令所得之俘盡殺之庚午􅅞瓌等狥於兖州城下謂朱瑾曰卿兄已敗何不早降丁丑雅州刺史王宗侃攻拔利州執刺史李繼顒斬之朱瑾僞遣使請降於朱全忠全忠自就延夀門下與瑾語瑾曰欲送符印願使兄瓊來領之辛巳全忠使瓊往瑾立馬橋上伏驍果董懐進於橋下瓊至懐進突出擒之以入須㬰擲首城外全忠乃引兵還以瓊弟玭爲齊州防禦使殺柳存何懐寳聞賀瓌名釋而用之李克用旋軍渭北加静難節度使蘇文建同平章事蔣勛求爲邵州刺史劉建鋒不許勛乃與鄧繼崇起兵連飛山梅山蠻冦湘潭據邵州使其將申徳昌屯定勝鎮以扼潭人十二月甲申閬州防禦使李繼雍蓬州刺史費存渠州刺史陳璠各帥所部兵奔王建乙酉李克用軍于雲陽王建奏東川節度使顧彦暉不發兵赴難而掠奪輜重遣瀘州刺史馬敬儒㫁峽路請興兵討之戊子華洪大破東川兵於楸林俘斬數萬拔楸林寨乙未進李克用爵晉王加李罕之兼侍中以河東大將蓋寓領容管觀察使自餘克用將佐子孫並進官爵克用性嚴急左右小有過輒死無敢違忤惟蓋寓敏慧能揣其意婉辭禆益無不從者克用或以非罪怒將吏寓必陽助之怒克用常釋之有所諫諍必徴近事爲喻由是克用愛信之境内無不依附權與克用侔朝廷及鄰道遣使至河東其賞賜賂遺先入克用次及寓家朱全忠數使人間之及揚言云蓋寓已代克用而克用待之益厚丙申王建攻東川别將王宗弼爲東川兵所擒顧彦暉畜以爲子戊戌通州刺史李彦昭將部兵二千降於建李克用遣掌書記李襲吉入謝恩密言於上曰比年以來闗輔不寧乘此勝勢遂取鳯翔一勞永逸時不可失臣屯軍渭北專俟進止上謀於貴近或曰茂貞復滅則沙陀大盛朝廷危矣上乃賜克用詔襃其忠款而言不臣之狀行瑜爲甚自朕出幸以來茂貞韓建自知其罪不忘國恩職貢相繼且當休兵息民克用奉詔而止既而私於詔使曰觀朝廷之意似疑克用有異心也然不去茂貞闗中無安寧之日又詔免克用入朝將佐或言今密邇闕廷豈可不入見天子克用猶豫未决蓋寓言於克用曰曏者王行瑜輩縱兵狂悖致鑾輿播越百姓奔散今天子還未安席人心尚危大王若引兵度渭竊恐復驚駭都邑人臣盡忠在於勤王不在入覲願熟圖之克用笑曰蓋寓尚不欲吾入朝况天下之人乎乃表稱臣緫帥大軍不敢徑入朝覲且懼部落士卒侵擾渭北居人辛亥引兵東歸表至京師上下始安詔賜河東士卒錢三十萬緡克用既去李茂貞驕横如故河西州縣多爲茂貞所據以其將胡敬璋爲河西節度使朱全忠之去兖州也留葛從周將兵守之朱瑾閉城不復出從周將還乃揚言天平河東救兵至引兵西北邀之夜半潛歸故寨瑾以從周精兵悉出果出兵攻寨從周突出􅁬擊殺千餘人擒其都將孫漢筠而還加鎮海節度使錢鏐兼侍中彰義節度使張鐇薨以其子璉權知留後朱瑄朱瑾屢爲朱全忠所攻民失耕稼財力俱弊告急於河東李克用遣大將史儼李承嗣將數千騎假道于魏以救之安州防禦使家晟與朱全忠親吏蔣玄暉有隙恐及禍與指揮使劉士政兵馬監押陳可璠將兵三千襲桂州殺經略使周元静而代之晟醉侮可璠可璠手刃之推士政知軍府事可璠自爲副使詔即以士政爲桂管經略使玄暉吳人也三年春正月西川將王宗䕫攻拔龍州殺刺史田昉丁巳劉建鋒遣都指揮使馬殷將兵討蔣勛攻定勝寨破之辛未安仁義以舟師至湖州欲度江應董昌錢鏐遣武勇都指揮使顧全武都知兵馬使許再思守西陵仁義不能度昌遣其將湯臼守石城􅀽邠守餘姚閏月克用遣蕃漢都指揮使李存信將萬騎假道于魏以救兖鄆軍于莘縣朱全忠使人謂羅弘信曰克用志吞河朔師還之日貴道可憂存信戢衆不嚴侵暴魏人弘信怒發兵三萬夜襲之存信軍潰退保洺州喪士卒什二三委棄資糧兵械萬數史儼李承嗣之軍隔絶不得還弘信自是與河東絶專志於汴全忠方圖兖鄆畏弘信議其後弘信每有贈遺全忠必對使者北向拜授之曰六兄於予倍年以長固非諸鄰之比弘信信之全忠以是得專意東方丁亥果州刺史張雄降于王建二月戊辰顧全武許再思敗湯臼於石城上用楊行密之請赦董昌復其官爵錢鏐不從以通王滋判侍衞諸將事朱全忠薦兵部尚書張濬上欲復相之李克用表請發兵擊全忠且言濬朝爲相臣則夕至闕廷京師震懼上下詔和解之三月以天雄留後李繼徽爲節度使保大節度使李思孝表請致仕薦弟思敬自代詔以思孝爲太師致仕思敬爲保大留後朱全忠遣龐師古將兵伐鄆州敗鄆兵於馬頰遂抵其城下己酉顧全武等攻餘姚明州刺史黄晟遣兵助之董昌遣其將徐章救餘姚全武擊擒之夏四月辛酉河漲將毁滑州城朱全忠命决爲二河夾滑城而東爲害滋甚李克用擊羅弘信攻洹水殺魏兵萬餘進攻魏州武安節度使劉建鋒既得志嗜酒不親政事長直兵陳贍妻羙建鋒私之贍䄂鐵檛擊殺建鋒諸將殺贍迎行軍司馬張佶爲留後佶將入府馬忽踶齧傷左髀時馬殷攻邵州未下佶謝諸將曰馬公勇而有謀寛厚樂善吾所不及真乃主也乃以牒召之殷猶豫未行聽直軍將汝南姚彦章説殷曰公與劉龍驤張司馬一體人也今龍驤遇禍司馬傷髀天命人望捨公尚誰屬哉殷乃使親從都副指揮使李瓊留攻邵州徑詣長沙淮南兵與鎮海兵戰于皇天蕩鎮海兵不利楊行密遂圍􅂫州錢鏐鍾傳杜洪畏楊行密之彊皆求援於朱全忠全忠遣許州刺史朱友恭將兵萬人度淮聽以便宜從事董昌使人覘錢鏐兵有言其彊盛者輒怒斬之言兵疲食盡則賞之戊寅袁邠以餘姚降於鏐顧全武許再思進兵至越州城下五月昌出戰而敗嬰城自守全武等圍之昌始懼去帝號復稱節度使馬殷至長沙張佶肩輿入府坐受殷拜謁已乃命殷升聽事以留後讓之即趨下帥將吏拜賀復爲行軍司馬代殷將兵攻邵州癸未蘇州常熟鎮使陸郢以州城應楊行密虜刺史成及行密閲及家所蓄惟圖書藥物賢之歸署行軍司馬及拜且泣曰及百口在錢公所失蘇州不能死敢求富貴願以一身易百口之死引佩刀欲自刺行密遽執其手止之館於府舍其室中亦有兵仗行密每單衣詣之與之共飲膳無所疑錢鏐聞蘇州陷急召顧全武使趨西陵僃行密全武曰越州賊之根本柰何垂克而弃之請先取越州後復蘇州鏐從之淮南將朱延夀奄至蘄州圍其城大將賈公鐸方獵不得還伏兵林中命勇士二人衣羊皮夜入延夀所掠羊羣潛入城約夜半開門舉火爲應復衣皮返命公鐸如期引兵至城南門中火舉力戰突圍而入延夀驚曰吾常恐其潰圍而出反潰圍而入如此城安可猝拔乃白行密求軍中與公鐸有舊者持誓書金帛往説之許以昬夀州團練副使柴再用請行臨城與語爲陳利害數日公鐸及刺史馮敬章請降以敬章爲左都押牙公鐸爲右監門衛將軍延夀進抜光州殺刺史劉存丙戌上遣中使詣梓州和解兩川王建雖奉詔還成都然猶連兵未解崔昭緯復求救於朱全忠戊子遣中使賜昭緯死行至荆南追及斬之中外咸以爲快荆南節度使成汭與其將許存泝江略地盡取濵江州縣武泰節度使王建肇弃黔州収餘衆保豐都存又引兵西取渝涪二州汭以其將趙武爲黔中留後存爲萬州刺史汭知存不得志使人詗之曰存不治州事日出蹴踘汭曰存將逃先匀足力也遣兵襲之存弃城走其衆稍稍歸之屯于茅垻趙武數攻豐都王建肇不能守與存皆降于王建建忌存勇略欲殺之掌書記髙燭曰公方揔攬英雄以圖霸業彼窮來歸我奈何殺之建使戍蜀州隂使知蜀州王宗綰察之宗綰密言存忠勇謙厚有良將才建乃捨之更其姓名曰王宗播而宗綰竟不使宗播知其免已也宗播元從孔目官柳修業每勸宗播慎静以免禍其後宗播爲建將遇彊敵諸將所憚者以身先之及有功輒稱病不自伐由是得以功名終甲午夜顧全武急攻越州乙未旦克其外郭董昌猶據牙城拒之戊戌鏐遣昌故將駱團紿昌云奉詔令大王致仕歸臨安昌乃送牌印出居清道坊己亥全武遣武勇都監使吳璋以舟載昌如杭州至小江南斬之并其家三百餘人宰相李邈蔣瓌以下百餘人昌在圍城中貪吝益甚口率民間錢帛減戰士糧及城破庫有金帛雜貨五百間倉有糧三百萬斛錢鏐傳昌首於京師散金帛以賞將士開倉以振貧乏李克用攻魏博侵掠徧六州朱全忠召葛從周於鄆州使將兵營洹水以救魏博留龐師古攻鄆州六月克用引兵擊從周汴人多鑿坎於陳前戰方酣克用之子鐵林指揮使落落馬遇坎而躓汴人生擒之克用自往救之馬亦躓幾爲汴人所獲克用顧射汴將一人斃之乃得免克用請修好以贖落落全忠不許以與羅弘信使殺之克用引軍還葛從周自洹水引兵濟河屯于楊劉復擊鄆及兖鄆河東之兵戰于故樂亭破之兖鄆屬城皆爲汴人所據屢求救於李克用克用發兵赴之爲羅弘信所拒不得前兖鄆由是不振初李克用屯渭北李茂貞韓建憚之事朝廷禮甚恭克用去二鎮貢獻漸疎表章驕慢上自石門還於神䇿兩軍之外更置安聖捧宸保寕宣化等軍選補數万人使諸王將之嗣延王戒丕嗣覃王嗣周又自募麾下數千人茂貞以爲欲討己語多怨望嫌隙日構茂貞亦勒兵揚言欲詣闕訟寃京師士民争亡匿山谷上命通王滋及嗣周戒丕分將諸軍以衛近畿戒丕屯三橋茂貞遂表言延王無故稱兵討臣臣今勒兵入朝請罪上遽遣使告急於河東丙寅茂貞引兵逼京畿覃王與戰於婁館官軍敗績秋七月茂貞進逼京師延王戒丕曰今闗中藩鎮無可依者不若自鄜州濟河幸太原臣請先往告之辛卯詔幸鄜州壬辰上出至渭北韓建遣其子從允奉表請幸華州上不許以建爲京畿都指揮安撫制置及開通四面道路催促諸道綱運等使而建奉表相繼上及從官亦憚逺去癸巳至富平遣宣徽使元公訊召建面議去留甲午建詣富平見上頓首涕泣言方今藩臣跋扈者非止茂貞陛下若去宗廟園陵逺廵邊鄙臣恐車駕濟河無復還期今華州兵力雖微控帶闗輔亦足自固臣積聚訓厲十五年矣西距長安不逺願陛下臨之以圖興復上乃從之乙未宿下邽丙申至華州以府署爲行宫建視事於龍興寺茂貞遂入長安自中和以來所葺宫室市肆燔燒俱盡乙巳以中書侍郎同平章事崔胤同平章事充武安節度使上以胤崔昭緯之黨也故出之丙午以翰林學士承㫖尚書左丞陸扆爲户部侍郎同平章事扆陜人也水部郎中何迎表薦國子毛詩博士襄陽朱朴才如謝安道士許巖士亦薦朴有經濟才上連日召對朴有口辯上恱之曰朕雖非太宗得卿如魏徴矣賜以金帛并賜何迎以徐彦若爲大明宫留守兼京畿安撫制置等使楊行密表請上遷都江淮王建請上幸成都宰相畏韓建不敢專決政事八月丙辰詔建闗議朝政建上表固辭乃上韓建移檄諸道令共輸資糧詣行在李克用聞之歎曰去嵗從余言豈有今日之患又曰韓建天下癡物為賊臣弱帝室是不為李茂貞所擒則為朱全忠所虜耳因奏將與鄰道發兵入援加錢鏐兼中書令癸丑以王建為鳯翔西面行營招討使甲寅以門下侍郎同平章事王摶同平章事充威勝節度使上憤天下之亂思得竒傑之士不次用之國子博士朱朴自言得為宰相月餘可致太平上以為然乙丑以朴為左諫議大夫同平章事朴為人庸鄙迂僻無它長制出中外大驚丙寅加韓建兼中書令九月庚辰升福建為威武軍以觀察使王潮為節度使以湖南留後馬殷判湖南軍府事殷以髙郁為謀主郁揚州人也殷畏楊行密成汭之彊議以金帛結之髙郁曰成汭不足畏也行密公之讎雖以萬金賂之安肯爲吾援乎不若上奉天子下撫士民訓卒厲兵以修霸業則誰與爲敵矣殷從之崔胤出鎮湖南韓建之志也􅅌密求援於朱全忠且教之營東都宫闕表迎車駕全忠與河南尹張全義表請上遷都洛陽全忠仍請以兵二萬迎車駕且言崔胤忠臣不宣出外韓建懼復奏召胤爲相遣使諭全忠以且宜安静全忠乃止乙未復以胤爲中書侍郎同平章事以翰林學士承㫖兵部侍郎崔逺同平章事逺珙弟璵之孫也丁酉貶中書侍郎同平章事陸扆爲硤州刺史崔胤恨扆代已誣扆云黨於李茂貞而貶之己亥以朱朴兼判户部凡軍旅財賦之事上一以委之以孫偓爲鳯翔四面行營都統又以前定難節度使李思諫爲静難節度使兼副都統以保大留後李思敬爲節度使河東將李存信攻臨清敗汴將葛從周於宗城北乘勝至魏州北門冬十月壬子加孫偓行營節度招討處置等使丁巳以韓建權知京兆尹兼把截使戊午李茂貞上表請罪願得自新仍獻助修宫室錢韓建復佐佑之竟不出師錢鏐令兩浙吏民上表請以鏐兼領浙東朝廷不得已復以王摶爲吏部尚書同平章事以鏐爲鎮海威勝兩軍節度使丙子更名威勝曰鎮東軍李克用自將攻魏州敗魏兵於白龍潭追至觀音門朱全忠復遣葛從周救之屯于洹水全忠以大軍繼之克用乃還加河中節度使王珂同平章事十一月朱全忠還大梁復遣葛從周東㑹龐師古攻鄆州湖州刺史李師恱求旌節詔置忠國軍於湖州以師悦爲節度使賜告身旌節者未入境戊子師恱卒楊行密表師恱子前綿州刺史彦徽知州事淮南將安仁義攻婺州十二月東川兵焚掠漢眉資簡之境清海節度使薛王知柔行至湖南廣州牙將盧琚譚弘玘據境拒之使弘玘守端州弘玘結封州刺史劉隠許妻以女隠僞許之託言親迎伏甲舟中夜入端州斬弘玘遂襲廣州斬琚具軍容迎知柔入視事知柔表隠爲行軍司馬資治通鑑卷第二百六十
