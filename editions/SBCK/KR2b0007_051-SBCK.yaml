body:
  text: 議郎陳禪以為閻太后與帝無母子恩宜徙别館絶朝見羣臣議者咸以為宜司徒掾汝南周舉謂李郃曰昔瞽瞍常欲殺舜舜事之逾謹鄭武姜謀殺莊公莊公誓之黄泉秦始皇怨母失行乆而隔絶後感潁考叔茅焦之言復脩子道書傳美之今諸閻新誅太后幽在離宫若悲愁生疾一旦不虞主上將何以令於天下如從禪議後世歸咎明公宜宻表朝廷令奉太后率羣臣朝覲如舊以厭天心以荅人望郃即上䟽陳之漢孝順皇帝上永建元年春正月帝朝太后於東宫太后意乃安甲寅赦天下辛未皇太后閻氏崩辛巳太傅馮石太尉劉熹以阿黨權貴免司徒李郃罷二月甲申葬安思皇后丙戌以太常桓焉為太傅大鴻臚京兆朱寵為太尉參録尚書事長樂少府朱倀為司徒封尚書郭鎮為定潁矦隴西鍾羌反校尉馬賢擊之戰於臨洮斬首千餘級羌衆皆降由是涼州復定六月己亥封濟南簡王錯子顯為濟南王秋七月庚午以衛尉來歷為車騎將軍八月鮮卑冦代郡太守李超戰歿司􅀠校尉虞詡到官數月奏馮石劉熹免之又劾奏中常侍程璜陳秉孟生李閏等百官側目號為苛刻三公劾奏詡盛夏多拘繫無辜為吏民患詡上書自訟曰灋禁者俗之隄防刑罰者民之衘轡今州曰任郡郡曰任縣更相委逺百姓怨窮以茍容為賢盡節為愚臣所發舉臧罪非一三府恐為臣所奏遂加誣罪臣將從史魚死即以尸諌耳帝省其章乃不罪詡中常侍張防賣弄權埶請託受取詡案之屢寑不報詡不勝其憤乃自繫廷尉奏言曰昔孝安皇帝任用樊豐交亂嫡統幾亡社稷今者張防復弄威柄國家之禍將重至矣臣不忍與防同朝謹自繫以聞無令臣襲楊震之跡書奏防流涕訴帝詡坐論輸左校防必欲害之二日之中傳考四獄獄吏勸詡自引詡曰寧伏歐刀以示逺近喑嗚自殺是非孰辨邪浮陽矦孫程祝阿矦張賢相率乞見程曰陛下始與臣等造事之時常疾姦臣知其傾國今者即位而復自為何以非先帝乎司􅀠校尉虞詡為陛下盡忠而更被拘繫常侍張防臧罪明正反構忠良今客星守羽林其占宫中有姦臣宜急收防送獄以塞天變時防立在帝後程叱防曰姦臣張防何不下殿防不得已趨就東箱程曰陛下急收防無令從阿母求請帝問諸尚書尚書賈㓪素與防善證詡之罪帝疑焉謂程曰且出吾方思之於是詡子顗與門生百餘人舉幡􅇋中常侍高梵車叩頭流血訴言枉狀梵入言之防坐徙邊賈朗等六人或死或黜即日赦出詡程復上書陳詡有大功語甚切激帝感悟復徴拜議郎數日遷尚書僕射詡上䟽薦議郎南陽左雄曰臣見方今公卿以下類多拱黙以樹恩為賢盡節為愚至相戒曰白璧不可為容容多後福伏見議郎左雄有王臣蹇蹇之節宜擢在㗋舌之官必有匡弼之益由是拜雄尚書浮陽矦孫程等懐表上殿争功帝怒有司劾奏程等干亂悖逆王國等皆與程黨乆留京都益其驕恣帝乃免程等官悉徙封逺縣因遣十九矦就國敇洛陽令促期發遣司徒掾周舉説朱倀曰朝廷在西鍾下時非孫程等豈立今忘其大徳録其小過如道路夭折帝有殺功臣之譏及令未去宜急表之倀曰今詔指方怒吾獨表此必致罪譴舉曰明公年過八十位為台輔不於今時竭忠報國惜身安寵欲以何求禄位雖全必䧟佞邪之譏諫而獲罪猶有忠貞之名若舉言不足採請從此辭倀乃表諌帝果從之程徙封宜城矦到國怨恨恚懟封還印綬符䇿亡歸京師往來山中詔書追求復故爵土賜車馬衣物遣還國冬十月丁亥司空陶敦免朔方以西障塞多壞鮮卑因此數侵南匈奴單于憂恐上書乞脩復障塞庚寅詔黎陽營兵出屯中山北界令縁邊郡增置歩兵列屯塞下教習戰射以廷尉張皓為司空班勇更立車師後部故王子加特奴為王勇又使别校誅斬東且彌王亦更立其種人為王於是車師六國悉平勇遂發諸國兵擊匈奴呼􅄛王亡走其衆二萬餘人皆降生得單于從兄勇使加特奴手斬之以結車師匈奴之隙北單于自將萬餘騎入後部至金且谷勇使假司馬曹俊救之單于引去俊追斬其貴人骨都矦於是呼􅄛王遂徙居枯梧河上是後車師無復虜跡二年春正月中郎將張國以南單于兵擊鮮卑其至鞬破之二月遼東鮮卑宼遼東玄菟烏􅁊校尉耿曅發緣邊諸郡兵及烏􅁊出塞擊之斬獲甚衆鮮卑三萬人詣遼東降三月旱初帝母李氏瘞在洛陽北帝初不知至是左右白之帝乃發哀親到瘞所更以禮殯六月乙酉追諡為㳟愍皇后葬于恭陵之北西域城郭諸國皆服於漢唯焉􅂄王元孟未降班勇奏請攻之於是遣敦煌太守張朗將河西四郡兵三千人配勇因發諸國兵四萬餘人分為兩道擊之勇從南道朗從北道約期俱至焉􅂄而朗先有罪欲徼功自贖遂先期至爵離關遣司馬將兵前戰獲首虜二千餘人元孟懼誅逆遣使乞降張朗徑入焉􅂄受降而還朗得免誅勇以後期徴下獄免秋七月甲戌朔日有食之壬午太尉朱寵司徒朱倀免庚子以太常劉光為太尉録尚書事光禄勲汝南許敬為司徒光矩之弟也敬仕於和安之閒當竇鄧閻氏之盛無所屈撓三家既敗士大夫多染汚者獨無謗言及於敬當世以此貴之初南陽樊英少有學行名著海内隠於壺山之陽州郡前後禮請不應公卿舉賢良方正有道皆不行安帝賜䇿書徴之不赴是嵗帝復以䇿書􅀇纁僃禮徴英英固辭疾篤詔切責郡縣駕載上道英不得已到京稱疾不肯起彊輿入殿猶不能屈帝使出就太醫養疾月致羊酒其後帝乃為英設壇令公車令導尚書奉引賜几杖待以師傅之禮延問得失拜五官中郎將數月英稱疾篤詔以為光禄大夫賜告歸令所在送榖以嵗時致牛酒英辭位不受有詔譬㫖勿聽英初被詔命衆皆以為必不降志南郡王逸素與英善因與其書多引古譬諭勸使就聘英順逸議而至及後應對無竒謀深䇿談者以為失望河南張楷與英俱徴謂英曰天下有二道出與處也吾前以子之出能輔是君也濟斯民也而子始以不訾之身怒萬乘之主及其享受爵禄又不聞匡救之術進退無所據矣臣光曰古之君子邦有道則仕邦無道則隠隠非君子之所欲也人莫已知而道不得行羣邪共處而害將及身故深藏以避之王者舉逸民􅀭仄陋固為其有益於國家非以徇世俗之耳目也是故有道徳足以尊主智能足以庇民被褐懐玉深藏不市則王者當盡禮以致之屈體以下之虛心以訪之克己以從之然後能利澤施于四表功烈格于上下蓋取其道不取其人務其實不務其名也其或禮僃而不至意勤而不起則姑内自循省而不敢彊致其人曰豈吾徳之薄而不足慕乎政之亂而不可輔乎羣小在朝而不敢進乎誠心不至而憂其言之不用乎何賢者之不我從也茍其德已厚矣政已治矣羣小逺矣誠心至矣彼將叩閽而自售又安有勤求而不至者哉荀子曰耀蟬者務在明其火振其木而已火不明雖振其木無益也今人主有能明其德則天下歸之若蟬之歸明火也或者人主恥不能致乃至誘之以高位脅之以嚴刑使彼誠君子邪則位非所貪刑非所畏終不可得而致也可致者皆貪位畏刑之人也烏足貴哉若乃孝弟箸於家庭行誼隆於鄉曲利不苟取仕不苟進潔已安分優遊卒歲雖不足以尊主庇民是亦清脩之吉士也王者當襃優安養㑭遂其志若孝昭之待韓福光武之遇周黨以勵廉恥美風俗斯亦可矣固不當如范升之詆毁又不可如張楷之責望也至于飾偽以邀譽釣竒以驚俗不食君祿而争屠沽之利不受小官而規卿相之位名與實反心與迹違斯乃華士少正卯之流其得免於聖王之誅幸矣尚何聘召之有哉時又徴廣漢楊厚江夏黄瓊瓊香之子也厚既至豫陳漢有三百五十年之戹以為戒拜議郎瓊將至李固以書逆遺之曰君子謂伯夷隘栁下惠不恭不夷不惠可否之閒聖賢居身之所珍也誠遂欲枕山棲谷擬迹巢由斯則可矣若當輔政濟民今其時也自生民以來善政少而亂俗多必待堯舜之君此爲士行其志終無時矣常聞語曰嶢嶢者易缺皦皦者易汙盛名之下其實難副近魯陽樊君被徴初至朝廷設壇席猶待神明雖無大異而言行所守亦無所缺而毁謗布流應時折減者豈非觀聽望深聲名太盛乎是故俗論皆言處士純盗虚聲願先生􅀪此逺謨令衆人歎服一雪此言耳瓊至拜議郎稍遷尚書僕射瓊昔隨父在臺閣習見故事及後居職達練官曹争議朝堂莫能抗奪數上䟽言事上頗采用之李固郃之子也少好學常改易姓名杖策驅驢負笈從師不逺千里遂究覽墳籍為世大儒毎到太學宻入公府定省父母不令同業諸生知其為郃子也三年春正月丙子京師地震夏六月旱秋七月丁酉茂陵園寑災九月鮮卑冦漁陽冬十二月己亥太傅桓焉免車騎將軍來歷罷南單于㧞死弟休利立為去特若尸逐就單于帝悉召孫程等還京師四年春正月丙寅赦天下丙子帝加元服夏五月壬辰詔曰海内頗有災異朝廷修政太官減膳珍玩不御而桂陽太守文礱不惟竭忠宣暢本朝而逺獻大珠以求幸媚今封以還之五州雨水秋八月丁巳太尉劉光司空張皓免尚書僕射虞詡上言安定北地上郡山川險阨沃野千里土宜畜牧水可溉漕頃遭元元之災衆羌内潰郡縣兵荒二十餘年夫棄沃壤之饒捐自然之財不可謂利離河山之阻守無險之處難以為固今三郡未復園陵單外而公卿選懦容頭過身張解設難但計所費不圖其安宜開聖聽考行所長九月詔復安定北地上郡歸舊土癸酉以大鴻臚龎參為太尉録尚書事太常王龔為司空冬十一月庚辰司徒許敬免鮮卑冦朔方十二月乙卯以宗正􅀪農劉﨑為司徒是嵗于窴王放前殺拘彌王興自立其子為拘彌王而遣使者貢獻敦煌太守徐由上求討之帝赦于窴罪令歸拘彌國放前不肯五年夏四月京師旱京師及郡國十二蝗定逺矦班超之孫始尚帝姑隂城公主主驕淫無道始積憤怒伏刃殺主冬十月乙亥始坐腰斬同産皆棄市六年春二月庚午河閒孝王開薨子政嗣政慠很不奉灋帝以侍御史呉郡沈景有彊能擢為河閒相景到國謁王王不正服箕踞殿上侍郎贊拜景峙不為禮問王所在虎賁曰是非王邪景曰王不正服常人何别今相謁王豈謁無禮者邪王慙而更服景然後拜出住宫門外請王傅責之曰前發京師陛見受詔以王不㳟使相檢督諸君空受爵禄曾無訓導之義因奏治其罪詔書讓政而詰責􅀓景因捕諸姦人奏案其罪殺戮尤惡者數十人出冤獄百餘人政遂為改節悔過自脩帝以伊吾膏􅃾之地傍近西域匈奴資之以為鈔暴三月辛亥復令開設屯田如永元時事置伊吾司馬一人初安帝薄於蓺文博士不復講習朋徒相視怠散學舎頽敝鞠為園􅂼或牧兒蕘豎薪刈其下將作大匠翟酺上䟽請更脩繕誘進後學帝從之秋九月繕起太學凡所造構二百四十房千八百五十室護烏桓校尉耿曄遣兵擊鮮卑破之護羌校尉韓皓轉湟中屯田置兩河閒以逼羣羌皓坐事徴以張掖太守馬續代為校尉兩河閒羌以屯田近之恐必見圖乃解仇詛盟各自儆僃續上移屯田還湟中羌意乃安帝欲立皇后而貴人人有寵者四人莫知所建議欲探籌以神定選尚書僕射南郡胡廣與尚書馮翊郭䖍史敞上䟽諌曰竊見詔書以立后事大謙不自專欲假之籌䇿决疑靈神篇籍所記祖宗典故未甞有也恃神任筮既不必當賢就值其人猶非德選夫歧嶷形於自然俔天必有異表宜參良家􅂤求有徳徳同以年年鈞以貌稽之典經斷之聖慮帝從之恭懐皇后弟子乘氏矦商之女選入掖庭為貴人常特被引御從容辭曰夫陽以博施為徳隂以不專為義螽斯則百福之所由興也願陛下思雲雨之均澤小妾得免於罪帝由是賢之陽嘉元年春正月乙巳立貴人梁氏為皇后京師旱三月􅀭州六郡妖賊章河等冦四十九縣殺傷長吏庚寅赦天下改元夏四月梁商加位特進頃之拜執金吾冬耿曄遣烏桓戎末廆等鈔擊鮮卑大獲而還鮮卑復寇遼東屬國耿曄移屯遼東無慮城以拒之尚書令左雄上䟽曰昔宣帝以為吏數變易則下不安業乆於其事則民服教化其有政治者輒以璽書勉勵增秩賜金公卿缺則以次用之是以吏稱其職民安其業漢世良吏於兹為盛今典城百里轉動無常各懐一切莫慮長乆謂殺害不辜為威風聚斂整辦為賢能以治已安民為劣弱奉灋循理為不治髠鉗之戮生於睚眥覆尸之禍成於喜怒視民如冦讎税之如犲虎監司項背相望與同疾疢見非不舉聞惡不察觀政於亭傳責成於朞月言善不稱徳論功不據實虛誕者獲譽拘檢者離毁或因罪而引髙或色斯以求名州宰不覆競共辟召踴躍升騰超等踰匹或考奏捕案而亡不受罪㑹赦行賂復見洗滌朱紫同色清濁不分故使姦猾枉濫輕忽去就拜除如流缺動百數鄉官部吏職賤禄薄車馬衣服一出於民廉者取足貪者充家特選横調紛紛不絶送迎煩費損政傷民和氣未洽災眚不消咎皆在此臣愚以為守相長吏惠和有顯效者可就增秩勿移徙非父母䘮不得去官其不從灋禁不式王命錮之終身雖㑹赦令不得齒列若被劾奏亡不就灋者徙家邊郡以懲其後其鄉部親民之吏皆用儒生清白任從政者寛其負筭增其秩禄吏職滿嵗宰府州郡乃得辟舉如此威福之路塞虚偽之端絶送迎之役損賦斂之源息循理之吏得成其化率土之民各寧其所矣帝感其言復申無故去官之禁又下有司考吏治眞偽詳所施行而宦官不便終不能行雄又上言孔子曰四十不惑禮稱彊仕請自今孝廉年不滿四十不得察舉皆先詣公府諸生試家灋文吏課牋奏副之端門練其虚實以觀異能以美風俗有不承科令者正其罪灋若有茂材異行自可不拘年齒帝從之胡廣郭䖍史敞上書駮之曰凡選舉因才無拘定制六竒之策不出經學鄭阿之政非必章奏甘竒顯用年乖彊仕終賈􅀭聲亦在弱冠前世以來貢舉之制莫或回革今以一臣之言剗戾舊章便利未明衆心不猒矯枉變常政之所重而不訪台司不謀卿士若事下之後議者剝異異之則朝失其便同之則王言已行臣愚以為可宣下百官參其同異然後覽擇勝否詳采厥􅂨帝不從辛卯初令郡國舉孝廉限年四十以上諸生通章句文吏能牋奏乃得應選其有茂才異行若顔淵子竒不拘年齒乆之廣陵所舉孝廉徐淑年未四十臺郎詰之對曰詔書曰有如顔回子竒不拘年齒是故本郡以臣充選郎不能屈左雄詰之曰昔顔回聞一知十孝廉聞一知幾邪淑無以對乃罷却之郡守坐免袁宏論曰夫謀事作制以經世訓物必使可爲也古者四十而仕非謂彈冠之㑹必將是年也以爲可事之時在於彊盛故舉其大限以爲民􅂨且顔淵子竒曠代一有而欲以斯爲格豈不偏乎然雄公直精明能審覈眞僞決志行之頃之胡廣出爲濟隂太守與諸郡守十餘人皆坐謬舉免黜唯汝南陳蕃潁川李膺下邳陳球等三十餘人得拜郎中自是牧守畏慄莫敢輕舉迄于永嘉察選清平多得其人閏月庚子恭陵百丈廡災上聞北海郎顗精於隂陽之學二年春正月詔公車徴顗問以災異顗上章曰三公上應台階下同元首政失其道則寒隂反節今之在位競託髙虛納累鍾之奉亡天下之憂棲遲􅅯仰寑疾自逸被策文得賜錢即復起矣何疾之易而愈之速以此消伏災眚興致升平其可得乎今選牧守委任三府長吏不良既咎州郡州郡有失豈得不歸責舉者而陛下崇之彌優自下慢事愈甚所謂大網䟽小網數三公非臣之仇臣非狂夫之作所以發憤忘食懇懇不已者誠念朝廷欲致興平臣書不擇言死不敢恨因條便宜七事一園陵火災宜念百姓之勞罷繕脩之役二立春以後隂寒失節宜采納良臣以助聖化三今年少陽之嵗春當旱夏必有水宜遵前典惟節惟約四去年八月熒惑出入軒轅宜簡出宫女恣其姻嫁五去年閏十月有白氣從西方天苑趨參左足入玉井恐立秋以後將有羌宼畔戾之患宜豫宣告諸郡嚴為僃禦六今月十四日乙卯白虹貫日宜令中外官司並須立秋然後考事七漢興以來三百三十九歳於詩三朞宜大蠲灋令有所變更王者隨天譬猶自春徂夏改青服絳也自文帝省刑適三百年而輕微之禁漸已殷積王者之灋譬猶江河當使易避而難犯也二月顗復上書薦黄瓊李固以為宜加擢用又言自冬涉春訖無嘉澤數有西風反逆時節朝廷勞心廣為禱祈薦祭山川􅁀龍移市臣聞皇天感物不為僞動災變應人要在責已若令雨可請降水可攘止則嵗無隔并太平可待然而災害不息者患不在此也書奏特拜郎中辭病不就三月使匈奴中郎將趙稠遣從事將南匈奴兵出塞擊鮮卑破之初帝之立也乳母宋娥與其謀帝封娥為山陽君又封執金吾梁商子冀為襄邑矦尚書令左雄上封事曰高皇帝約非劉氏不王非有功不矦孝安皇帝封江京王聖等遂致地震之異永建二年封隂謀之功又有日食之變數術之士咸歸咎於封爵今青州饑虚盜賊未息誠不宜追録小恩虧失大典帝不聽雄復諫曰臣聞人君莫不好忠正而惡䜛䛕然而歷世之患莫不以忠正得罪讒䛕蒙倖者蓋聽忠難從䛕易也夫刑罪人情之所甚惡貴寵人情之所甚欲是以時俗為忠者少而習䛕者多故令人主數聞其美稀知其過迷而不悟以至於危亡臣伏見詔書顧念阿母舊德宿恩欲特加顯賞案尚書故事無乳母爵邑之制唯先帝時阿母王聖為野王君聖造生讒賊廢立之禍生為天下所咀嚼死為海内所歡快桀紂貴為天子而庸僕羞與為比者以其無義也夷齊賤為匹夫而王矦争與為伍者以其有徳也今阿母躬蹈儉約以身率下羣僚蒸庶莫不向風而與王聖並同爵號懼違本操失其常願臣愚以為凡人之心理不相逺其所不安古今一也百姓深懲王聖傾覆之禍民萌之命危於累卵常懼時世復有此類怵惕之念未離於心恐懼之言未絶乎口乞如前議嵗以千萬給奉阿母内足以盡恩愛之歡外可不為吏民所怪梁冀之封事非機急宜過災戹之運然後平議可否於是冀父商讓還冀封書十餘上帝乃從之夏四月己亥京師地震五月庚子詔羣公卿士各直言厥咎仍各舉敦樸士一人左雄復上䟽曰先帝封野王君漢陽地震今封山陽君而京城復震專政在隂其災尤大臣前後瞽言封爵至重王者可私人以財不可以官宜還阿母之封以塞災異今冀已高讓山陽君亦宜崇其本節雄言切至娥亦畏懼辭讓而帝戀戀不能已卒封之是時大司農劉據以職事被譴召詣尚書傳呼促歩又加以捶樸雄上言九卿位亞三事班在大臣行有佩玉之節動有庠序之儀孝明皇帝始有撲罸皆非古典帝納之是後九卿無復捶撲者戊午司空王龔免六月辛未以太常魯國孔扶為司空丁丑洛陽宣徳亭地拆長八十五丈帝引公卿所舉敦樸之士使之對䇿及特問以當世之敝為政所宜李固對曰前孝安皇帝變亂舊典封爵阿母因造妖孽改亂嫡嗣至令聖躬狼狽親遇其艱既㧞自困殆龍興即位天下喁喁屬望風政積敝之後易致中興誠當沛然思惟善道而論者猶云方今之事復同於前臣伏在草澤痛心傷臆實以漢興以來三百餘年賢聖相繼十有八主豈無阿乳之恩豈忘貴爵之寵然上畏夭威俯案經典知義不可故不封也今宋阿母雖有大功勤謹之徳但加賞賜足以酬其勞苦至於裂土開國實乖舊典聞阿母體性謙虚必有遜讓陛下宜許其辭國之高使成萬安之福夫妃后之家所以少完全者豈天性當然但以爵位尊顯顓揔權柄天道惡盈不知自損故至顛仆先帝寵遇閻氏位號太疾故其受禍曾不旋時老子曰其進鋭者其退速也今梁氏戚為椒房禮所不臣尊以高爵尚可然也而子弟羣從榮顯兼加永平建初故事殆不如此宜令歩兵校尉冀及諸侍中還居黄門之官使權去外戚政歸國家豈不休乎又詔書所以禁侍中尚書中臣子弟不得為吏察孝廉者以其秉威權容請託故也而中常侍在日月之側聲埶振天下子弟禄任曾無限極雖外託謙黙不干州郡而謟僞之徒望風進舉今可為設常禁同之中臣昔館陶公主為子求郎明帝不許賜錢千萬所以輕厚賜重薄位者為官人失才害及百姓也竊聞長水司馬武宣開陽城門􅇋羊迪等無它功徳初拜便真此雖小失而漸壞舊章先聖灋度所宜堅守故政教一跌百年不復詩云上帝板板下民卒癉刺周王變祖灋度故使下民將盡病也今陛下之有尚書猶天之有北斗也斗為天㗋舌尚書亦為陛下㗋舌斗斟酌元氣運乎四時尚書出納王命賦政四海權尊埶重責之所歸若不平心災眚必至誠宜審擇其人以毗聖政今與陛下共理天下者外則公卿尚書内則常侍黄門譬猶一門之内一家之事安則共其福慶危則通其禍敗刺史二千石外統職事内受灋則夫表曲者景必邪源清者流必潔猶叩樹本百枝皆動也由此言之本朝號令豈可蹉跌天下之紀綱當今之急務也夫人君之有政猶水之有隄防隄防完全雖遭雨水霖潦不能為變政教一立蹔遭凶年不足為憂誠令隄防穿漏萬夫同力不能復救政教一壞賢智馳騖不能復還今隄防雖堅漸有孔穴譬之一人之身本朝者心腹也州郡者四支也心腹痛則四支不舉故臣之所憂在腹心之疾非四支之患也苟堅隄防務政教先安心腹整理本朝雖有冦賊水旱之變不足介意也誠令隄防壞漏心腹有疾雖無水旱之災天下固可以憂矣又宜罷退宦官去其權重裁置常侍二人方直有德者省事左右小黄門五人才智閑雅者給事殿中如此則論者厭塞升平可致也扶風功曹馬融對曰今科條品制四時禁令所以承天順民者僃矣悉矣不可加矣然而天猶有不平之效民猶有咨嗟之怨者百姓屢聞恩澤之聲而未見惠和之實也古之足民者非能家贍而人足之量其財用為之制度故嫁娶之禮儉則㛰者以時矣䘮制之禮約則終者掩藏矣不奪其時則農夫利矣夫妻子以累其心産業以重其志舎此而為非者有必不多矣太史令南陽張衡對曰自初舉孝廉迄今二百嵗矣皆先孝行行有餘力始學文灋辛卯詔書以能章句奏案為限雖有至孝猶不應科此棄本而取末曾子長於孝然實魯鈍文學不若游夏政事不若冉季今欲使一人兼之茍外有可觀内必有闕則違選舉孝廉之志矣且郡國守相剖符寜境為國大臣一旦免黜十有餘人吏民罷於送迎之役新故交際公私放濫或臨政為百姓所便而以小過免之是為奪民父母使嗟號也易不逺復論不憚改朋友交接且不宿過沉於帝王承天理物以天下為公者乎中間以來妖星見於上震裂著於下天誡詳矣可爲寒心明者消禍於未萌今既見矣脩政恐懼則禍轉為福矣上覽衆對以李固為第一即時出阿母還舎諸常侍悉叩頭謝罪朝廷肅然以固為議郎而阿母宦者皆疾之詐為飛章以陷其罪事從中下大司農南郡黄尚等請之於梁商僕射黄瓊復救明其事乆乃得釋出為洛令固棄官歸漢中融博通經籍美文辭對奏亦拜議郎衡善屬文通貫六蓺雖才高於世而無驕尚之情善機巧尤致思於天文隂陽歷筭作渾天儀著靈憲性恬憺不慕當世所居之官輒積年不徙太尉龐參在三公中最名忠直數為左右所毁㑹所舉用忤帝㫖司隷承風案之時當㑹茂才孝廉參以被奏稱疾不㑹廣漢上計􅁺叚恭因㑹上䟽曰伏見道路行人農夫織婦皆曰太尉參竭忠盡節徒以直道不能曲心􅀌立羣邪之間自處中傷之地夫以讒佞傷毁忠正此天地之大禁人主之至誡也昔白起賜死諸矦酌酒相賀季子來歸魯人喜其紓難夫國以賢治君以忠安今天下咸欣陛下有此忠賢願卒寵任以安社稷書奏詔即遣小黄門視參疾太醫致羊酒後參夫人疾前妻子投於井而殺之雒陽令祝良奏參罪秋七月己未參竟以災異免八月己巳以大鴻臚施延為太尉鮮卑冦馬城代郡太守擊之不克頃之其至鞬死鮮卑由是抄盜差稀資治通鑑卷第五十一
