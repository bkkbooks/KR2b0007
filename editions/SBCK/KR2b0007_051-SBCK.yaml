front:
  text: 熹詣郊廟社稷告天請命其夕發䘮尊皇后曰皇太后太后臨朝以顯為車騎將軍儀同三司太后欲乆專國政貪立㓜年與顯等定策禁中迎濟北惠王子北鄉矦懿為嗣濟隂王以廢黜不得上殿親臨梓宫悲號不食内外羣僚莫不哀之甲戌濟南孝王香薨無子國絶乙酉北鄉矦即皇帝位夏四月丁酉太尉馮石為太傅司徒劉熹為太尉參録尚書事前司空李郃為司徒閻顯忌大將軍耿寶位尊權重威行前朝乃風有司奏寶及其黨與中常侍樊豐虎賁中郎將謝惲侍中周廣野王君王聖聖女永等更相阿黨互作威福皆大不道辛卯豐惲廣皆下獄死家屬徙比景貶寶及弟子林慮矦承皆為亭矦遣就國寶於道自殺王聖母子徙鴈門於是以閻景為衛尉耀為城門校尉晏為執金吾兄弟並處權要威福自由己酉葬孝安皇帝于㳟陵廟曰恭宗六月乙巳赦天下秋七月西域長史班勇發敦煌張掖酒泉六千騎及鄯善䟽勒車師前部兵擊後部王軍就大破之獲首虜八千餘人生得軍就及匈奴持節使者將至索班沒處斬之傳首京師冬十月丙午越嶲山崩北鄉矦病篤中常侍孫程謂濟隂王謁者長興渠曰王以嫡統本無失德先帝用讒遂至廢黜若北鄉矦不起相與共斷江京閻顯事無不成者渠然之又中黄門南陽王康先為太子府史及長樂太官丞京兆王國等並附同於程江京謂閻顯曰北鄉矦病不解國嗣宜以時定何不早徴諸王子簡所置乎顯以為然辛亥北鄉矦薨顯白太后祕不發䘮而更徴諸王子閉宫門屯兵自守十一月乙卯孫程王康王國與中黄門黄龍彭愷孟叔李建王成張賢史汎馬國王道李元楊佗陳予趙封李剛魏猛苗光等聚謀於西鍾下皆截單衣為誓丁巳京師及郡國十六地震是夜程等共㑹崇徳殿上因入章臺門時江京劉安及李閏陳逹等俱坐省門下程與王康共就斬京安逹以李閏權埶積為省内所服欲引為主因舉刃脅閏曰今當立濟隂王無得搖動閏曰諾於是扶閏起俱於西鍾下迎濟隂王即皇帝位時年十一召尚書令僕射以下從輦幸南宫程等留守省門遮扞内外帝登雲臺召公郷百僚使虎賁羽林士屯南北宫諸門閻顯時在禁中憂迫不知所為小黄門樊登勸顯以太后詔召越騎校尉馮詩虎賁中郎將閻崇將兵屯平朔門以禦程等顯誘詩入省謂曰濟隂王立非皇太后意璽綬在此茍盡力効功封矦可得太后使授之印曰能得濟隂王者封萬户矦得李閏者五千户矦詩等皆許諾辭以卒被召所將衆少顯使與登迎吏士于左掖門外詩因格殺登歸營屯守顯弟衛尉景遽從省中還外府收兵至盛德門孫程􅀓召諸尚書使收景尚書郭鎮時卧病聞之即率直宿羽林出南止車門逢景從吏士㧞白刃呼曰無干兵鎮即下車持節詔之景曰何等詔因斫鎮不中鎮引劒擊景墯車左右以㦸义其胷遂禽之送廷尉獄即夜死戊午遣使者入省奪得璽綬帝乃幸嘉徳殿遣侍御史持節收閻顯及其弟城門校尉耀執金吾晏並下獄誅家屬皆徙比景遷太后於離宫己未開門罷屯兵壬戌詔司􅀠校尉惟閻顯江京近親當伏辜誅其餘務崇寛貸封孫程等皆為列矦程食邑萬户王康王國食九千户黄龍食五千户彭愷孟叔李建食四千二百户王成張賢史汎馬國王道李元楊佗陳予趙封李剛食四千户魏猛食二千户苗光食千户是為十九矦加賜車馬金銀錢帛各有差李閏以先不豫謀故不封擢孫程爲騎都尉初程等入章臺門苖光獨不入詔書録功臣令王康䟽名康詐䟽光入章臺門光未受符䇿心不自安詣黄門令自告有司奏康光欺詐主上詔書勿問以將作大匠來歷爲衛尉祋諷劉瑋閭丘􅀪等先卒皆拜其子爲郎朱倀施延陳光趙代皆見拔用後至公卿徴王男邴吉家屬還京師厚加賞賜帝之見廢也監太子家小黄門籍建􅀓高梵長秋長趙熹丞良賀藥長夏珍皆坐徙朔方帝即位並擢爲中常侍初閻顯辟崔駰之子瑗爲吏瑗以北鄉矦立不以正知顯將敗欲􅀃令廢立而顯日沈醉不能得見乃謂長史陳禪曰中常侍江京等惑蠱先帝廢黜正統扶立踈孽少帝即位發病廟中周勃之徴於斯復見今欲與君共求見􅀃將軍白太后收京等廢少帝引立濟隂王必上當天心下合人望伊霍之功不下席而立則將軍兄弟傳􅍈於無窮若拒違天意乆曠神器則將以無罪并辜元惡此所謂禍福之㑹分功之時也禪猶豫未敢從㑹顯敗瑗坐被斥門生蘇祗欲上書言狀瑗遽止之時陳禪為司隷校尉召瑗謂曰弟聽祗上書禪請為之證瑗曰此譬猶兒妾屏語耳願使君勿復出口遂辭歸不復應州郡命己卯以諸王禮葬北鄉矦司空劉授以阿附惡逆辟召非其人策免十二月甲申以少府河南陶敦為司空楊震門生虞放陳翼詣闕追訟震事詔除震二子為郎贈錢百萬以禮改葬於華隂潼亭逺近畢至有大鳥高丈餘集震䘮前郡以狀上帝感震忠直詔復以中牢具祠之
