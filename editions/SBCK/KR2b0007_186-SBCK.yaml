front:
  text: 資治通鑑卷第一百八十六
  hash: sha256:06296b157cff9dd34cb19a85bd8970e438e0a949bcc0aa0b8efc308549a805b8
body:
  text: 臣司馬光奉勑編集唐紀二盡十二月不滿一年起著雍攝提格八月髙祖神堯大聖光孝皇帝上之中武徳元年八月薛舉遣其子仁杲進圍寜州刺史胡演撃却之郝瑗言於舉曰今唐兵新破關中騷動宜乘勝直取長安舉然之會有疾而止辛巳舉卒太子仁杲立居於折墌城謚舉曰武帝上欲與李軌共圖秦隴遣使濳詣涼州招撫之與之書謂之從弟􅁤大喜遣其弟懋入貢上以懋爲大將軍命鴻臚少卿張俟徳冊拜􅁤為涼州揔管封涼王初朝廷以安陽令吕珉為相州刺史更以相州刺史王德仁為巖州刺史徳仁由是怨憤甲申誘山東大使宇文明逹入林慮山而殺之叛歸王丗充己丑以秦王丗民為元帥撃薛仁果丁酉臨洮等四郡來降隋江都太守陳稜求得煬帝之柩取宇文化及所留輦輅鼓吹粗備天子儀衛攺葬於江都宫西吳公臺下其王公以下皆列瘞於帝塋之側宇文化及之發江都也以杜伏威為歴陽太守伏威不受仍上表於隋皇㤗主拜伏威為東道大揔管封楚王沈法興亦上表於皇㤗主自稱大司馬録尚書事天門公承制置百官以陳杲仁為司徒孫士漢爲司空蔣元超爲左僕射殷芊爲左丞徐令言爲右丞劉子翼爲選部侍郎李百藥爲府􅁺百藥徳林之子也九月隋襄國通守陳君賔來降拜邢州刺史君賔伯山之子也虞州刺史韋義節攻隋河東通守堯君素乆不下軍數不利壬子以工部尚書獨孤懷恩代之初李密既殺翟讓頗自驕矜不恤士衆倉粟雖多無府庫錢帛戰士有功無以爲賞又厚撫初附之人衆心頗怨徐丗勣甞因宴會刺譏其短密不懌使丗勣出鎮􅀺陽雖名委任實亦踈之密開洛口倉散米無防守典當者又無文劵取之者隨意多少或離倉之後力不能致委弃衢路自倉城至郭門米厚數寸爲車馬所轥踐群盜來就食者并家屬近百萬口無甕盎織荆筐淘米洛水兩岸十里之間望之皆如白沙密喜謂賈閏甫曰此可謂足食矣閏甫對曰國以民為本民以食為天今民所以襁負如流而至者以所天在此故也而有司曾無愛吝屑越如此竊恐一旦米盡民散明公孰與成大業哉密謝之即以閏甫判司倉參軍事密以東都兵數敗微弱而將相自相屠滅謂朝夕可平王丗充既專大權厚賞將士繕治器械亦隂圖取密時隋軍乏食而密軍少衣丗充請交易密難之長史邴元真等各求私利勸密許之先是東都人歸密者日以百數既得食降者益少密悔而止密破宇文化及還其勁卒良馬多死士卒疲病丗充欲乗其􅁦撃之恐人心不壹乃詐稱左軍衛士張永通三夢周公令宣意於丗充當勒兵相助擊賊乃為周公立廟每出兵輙先祈禱丗充令巫宣言周公欲令僕射急討李密當有大功不即兵皆疫死丗充兵多楚人信妖言皆請戰丗充簡練精鋭得二萬餘人馬二千餘匹壬子出師擊密旗幡之上皆書永通字軍容甚盛癸丑至偃師營於通濟渠南作三橋於渠上密留王伯當守金墉自引精兵出偃師北阻邙山以待之密召諸將會議裴仁基曰丗充悉衆而至洛下必虚可分兵守其要路令不得東簡精兵三萬傍河西出以逼東都丗充還我且按甲丗充再出我又逼之如此則我有餘力彼勞奔命破之必矣密曰公言大善今東都兵有三不可當兵仗精銳一也決計􅀷入二也食盡求戰三也我但乘城固守蓄力以待之彼欲鬬不得求走無路不過十日丗充之頭可致麾下陳智略樊文超單雄信皆曰計丗充戰卒甚少屢經摧破悉已喪膽兵法曰倍則戰況不啻倍哉且江淮新附之士望因此機展其勲效及其鋒而用之可以得志於是諸將喧然欲戰者什七八密惑於衆議而從之仁基苦爭不得撃地歎曰公後必悔之魏徴言於長史鄭頲曰魏公雖驟勝而驍將銳卒多死戰士心怠此二者難以應敵且丗充乏食志在死戰難與爭鋒未若􅀷溝髙壘以拒之不過旬月丗充糧盡必自退追而擊之蔑不勝矣頲曰此老生之常談耳徴曰此乃竒䇿何謂常談拂衣而起程知節將内馬軍與密同營在北邙山上單雄信將外馬軍營於偃師城北丗充遣數百􅀐度通濟渠攻雄信營密遣裴行儼與知節助之行儼先馳赴敵中流矢墜於地知節救之殺數人丗充軍披靡乃抱行儼重􅀐而還為丗充􅀐所逐刺槊洞過知節廻身捩折其槊兼斬追者與行儼俱免㑹日暮各歛兵還營密驍將孫長樂等十許人皆被重創宻新破宇文化及有輕丗充之心不設壁壘丗充夜遣二百餘􅀐潜入北山伏谿谷中命軍士皆秣馬蓐食甲寅旦將戰丗充誓衆曰今日之戰非直爭勝負死生之分在此一舉若其捷也富貴固所不論若其不捷必無一人獲免所爭者死非獨為國各宜勉之遲明引兵薄密密出兵應之未及成列丗充縱兵擊之丗充士卒皆江淮剽勇出入如飛丗充先索得一人貌類密者縳而匿之戰方酣使牽以過陳前譟曰已獲李密矣士卒皆呼萬歲其伏兵發乗髙而下馳壓密營縱火焚其廬舍密衆大潰其將張童仁陳智略皆降密與萬餘人馳向洛口丗充夜圍偃師鄭頲守偃師其部下翻城納丗充初丗充家屬在江都隨宇文化及至滑臺又隨王􅁤入李密密留於偃師欲以招丗充及偃師破丗充得其兄丗偉子玄應䖍恕瓊等又獲密將佐裴仁基鄭頲祖君彦等數十人丗充於是整兵向洛口得邴元真妻子鄭䖍象母及密諸將子弟皆撫慰之令濳呼其父兄初邴元真為縣吏坐贓亡命從翟讓於瓦岡讓以其甞為吏使掌書記及密開幕府妙選時英讓薦元真為長史密不得已用之行軍謀畫未甞參預密西拒丗充留元真守洛口倉元真性貪鄙宇文温謂密曰不殺元真必為公患密不應元真知之隂謀叛密楊慶聞之以告密密固疑焉至是密將入洛口城元真已遣人濳引丗充矣密知而不發因與衆謀待丗充兵半濟洛水然後擊之丗充軍至密􅀱􅀐不時覺比將出戰丗充軍悉已濟矣單雄信等又勒兵自據密自度不能支帥麾下輕􅀐奔虎牢元真遂以城降初雄信驍捷善用馬槊名冠諸軍軍中號曰飛將彦藻以雄信輕於去就勸密除之密愛其才不忍也及密失利雄信遂以所部降丗充密將如􅀺陽或曰殺翟讓之際徐丗勣㡬死今失利而就之安可保乎時王伯當弃金墉保河陽密自虎牢歸之引諸將共議密欲南阻河北守太行東連􅀺陽以圖進取諸將皆曰今兵新失利衆心危懼若更停留恐叛亡不日而盡又人情不願難以成功密曰孤所恃者衆也衆既不願孤道窮矣欲自刎以謝衆伯當抱密號絶衆皆悲泣密復曰諸君幸不相弃當共歸関中密身雖無功諸君必保富貴府掾柳爕曰明公與唐公同族兼有疇昔之好雖不陪起兵然阻東都斷隋歸路使唐公不戰而據長安此亦公之功也衆咸曰然密又謂王伯當曰將軍室家重大豈復與孤俱行哉伯當曰昔蕭何盡帥子弟以從漢王伯當恨不兄弟俱從豈以公今日失利遂輕去就乎縱身分原野亦所甘心左右莫不感激從密入關者凡二萬人於是密之將帥州縣多降於隋朱粲亦遣使降隋皇㤗主以粲爲楚王甲寅秦州揔管竇􅁤擊薛仁杲不利驃􅀐將軍劉感鎮涇州仁杲圍之城中糧盡感殺所乗馬以分將士感一無所噉唯煑馬骨取汁和木屑食之城垂䧟者數矣㑹長平王叔良將士至涇州仁杲乃􅀭言食盡引兵南去乙卯又遣髙墌人僞以城降叔良遣感帥衆赴之己未至城下叩門城中人曰賊已去可踰城入感命燒其門城上下水灌之感知其詐遣歩兵先還自帥精兵為殿俄而城上舉三烽仁杲兵自􅀯原大下戰於百里細川唐軍大敗感為仁杲所擒仁杲復圍涇州令感語城中云援軍已敗不如早降感許之至城下大呼曰逆賊飢餒亡在朝夕秦王帥數十萬衆四面俱集城中勿憂勉之仁杲怒執感於城旁埋之至􅂰馳􅀐射之至死聲色逾厲叔良嬰城固守僅能自全感豐生之孫也庚申隴州刺史陜人常逹擊薛仁杲於宜祿川斬首千餘級上遣從子襄武公琛太常卿鄭元璹以女妓遺突厥始畢可汗壬戌始畢復遣骨咄祿特勒來癸亥白馬道士傅仁均造戊寅暦成奏上行之薛仁杲屢攻常逹不能克乃遣其將仵士政以數百人詐降逹厚撫之乙丑士政伺隙以其徒劫逹擁城中二千人降於仁杲達見仁杲辤色不屈仁杲壯而釋之奴賊帥張貴謂達曰汝識我乎達曰汝逃死奴賊耳貴怒欲殺之人救之獲免辛未追諡隋太上皇為􅌆帝宇文化及至魏縣張愷等謀去之事覺化及殺之腹心稍盡兵勢日蹙兄弟更無他計但相聚酣宴奏女樂化及醉尤智及曰我初不知由汝為計强來立我今所向無成士馬日㪚負弑君之名天下所不容今者滅族豈不由汝乎持其兩子而泣智及怒曰事捷之日初不賜尤及其將敗乃欲歸罪何不殺我以降竇建徳數相鬭鬩言無長幼醒而復飲以此為􅁪其衆多亡化及自知必敗嘆曰人生固當死豈不一日為帝乎於是鴆殺秦王浩即皇帝位於魏縣國號許改元天壽署置百官冬十月壬申朔日有食之戊寅宴突厥骨咄祿引骨咄祿升御坐以寵之李密將至上遣使迎勞相望於道密大喜謂其徒曰我擁衆百萬一朝解甲歸唐山東連城數百知我在此遣使招之亦當盡至比於竇融功亦不細豈不以一台司見處乎己卯至長安有司供待稍薄所部兵累日不得食衆心頗怨既而以密為光祿卿上柱國賜爵邢國公密既不滿望朝臣又多輕之執政者或來求賄意甚不平獨上親禮之常呼為弟以舅子獨孤氏妻之庚辰詔右翊衛大將軍淮安王神通為山東道安撫大使山東諸軍並受節度以黄門侍郎崔民幹為副鄧州刺史吕子臧與撫慰使馬元規擊朱粲破之子臧言於元規曰粲新敗上下危懼請併力擊之一舉可滅若復遷延其徒稍集力彊食盡致死於我為患方深元規不從子臧請獨以所部兵擊之元規不許既而粲収集餘衆兵復大振自稱楚帝於冠軍攺元昌達進攻鄧州子臧撫膺謂元規曰老夫今坐公死矣粲圍南陽會霖雨城壞所親勸子臧降子臧曰安有天子方伯降賊者乎帥麾下赴敵而死俄而城陷元規亦死癸未王丗充収李密美人珍寶及將卒十餘萬人還東都陳於闕下乙酉皇泰主大赦丙戌以丗充為太尉尚書令内外諸軍事仍使之開太尉府備置官屬妙選人物丗充以裴仁基父子驍勇深禮之徐文逺復入東都見丗充必先拜或問曰君倨見李密而敬王公何也文逺曰魏公君子也能容賢士王公小人也能殺故人吾何敢不拜李密揔管李育徳以武陟來降拜陟州刺史育徳諤之孫也其餘將佐劉徳威賈閏甫高季輔等或以城邑或帥衆相繼來降初北海賊帥綦公順帥其徒三萬攻郡城已克其外郭進攻子城城中食盡公順自謂克在旦夕不為備明經劉蘭成紏合城中驍健百餘人襲擊之城中見兵繼之公順大敗棄營走郡城獲全於是郡官及望族分城中民爲六軍各將之蘭成亦將一軍有宋書佐者離間諸軍曰蘭成得衆心必爲諸人不利不如殺之衆不忍殺但奪其兵以授宋書佐蘭成恐終及禍亡奔公順公順軍中喜譟欲奉以爲主固辭乃以爲長史軍事咸聽焉居五十餘日蘭成簡軍中驍健者百五十人往抄北海距城四十里留十人使多芟草分爲百許積二十里又留二十人各執大旗五六里又留三十人伏險要蘭成自將十人夜距城一里許潛伏餘八十人分置便處約聞鼓聲即抄取人畜亟去仍一時焚積草明晨城中逺望無煙塵皆出樵牧日向中蘭成以十人直抵城門城上鉦鼔亂發伏兵四出抄掠雜畜千餘頭及樵牧者而去蘭成度抄者已逺徐步而還城中雖出兵恐有伏兵不敢急追又見前有旌旗煙火遂不敢進而還既而城中知蘭成前者衆少悔不窮追居月餘蘭成謀取郡城更以二十人直抵城門城中人競出逐之行未十里公順將大軍揔至郡兵奔馳還城公順進兵圍之蘭成一言招諭城中人爭出降蘭成撫存老幼禮遇郡官見宋書佐亦禮之如舊仍資送出境内外安堵時海陵賊帥臧君相聞公順據北海帥其衆五萬來爭之公順衆少聞之大懼蘭成爲公順畫策曰君相今去此尚逺必不爲僃請將軍倍道襲擊其營公順從之自將驍勇五千人齎熟食倍道襲之將至蘭成與敢死士二十人前行距君相營五十里見其抄者負擔向營蘭成亦與其徒負擔􅂼米燒器詐為抄者擇空而行聽察得其號及主將姓名至暮與賊比肩而入負擔巡營知其虚實得其更號乃於空地燃火營食至三鼔忽於主將幕前交刀亂下殺百餘人賊衆驚擾公順兵亦至急攻之君相僅以身免俘斬數千收其資糧甲仗以還由是公順黨衆大盛及李密據洛口公順以衆附之密敗亦來降隋末羣盜起冠軍司兵李襲譽􅀃西京留守隂丗師遣兵據永豐倉發粟以賑窮乏出庫物賞戰士移檄郡縣同心討賊丗師不能用乃求募兵山南丗師許之上克長安自漢中召還為太府少卿乙未附襲譽籍於宗正襲譽襲志之弟也丙申朱粲冦淅州遣太常卿鄭元璹帥歩􅀐一萬擊之是月納言竇抗罷為左武候大將軍十一月乙巳涼王李􅁤即皇帝位攺元安樂戊申王􅁤以滑州來降薛仁杲之為太子也與諸將多有隙及即位衆心猜懼郝瑗哭舉得疾遂不起由是國勢浸弱秦王丗民至高墌仁杲使宗羅㬋將兵拒之羅㬋數挑戰丗民堅壁不出諸將咸請戰丗民曰我軍新敗士氣沮喪賊恃勝而驕有輕我心宜閉壘以待之彼驕我奮可一戰而克也乃令軍中曰敢言戰者斬相持六十餘日仁杲糧盡其將梁胡郎等帥所部來降丗民知仁杲將士離心命行軍揔管梁實營於淺水原以誘之羅㬋大喜盡銳攻之梁實守險不出營中無水人馬不飲者數日羅㬋攻之甚急丗民度賊已疲謂諸將曰可以戰矣遟明使右武候大將軍龎玉陳於淺水原南羅㬋併兵擊之玉戰㡬不能支丗民引大軍自原北出其不意羅㬋引兵還戰丗民帥驍􅀐數十先陷陳唐兵表裏奮擊呼聲動地羅㬋士卒大潰斬首數千級丗民帥二千餘􅀐追之竇􅁤叩馬苦諫曰仁杲猶據堅城雖破羅㬋未可輕進請且按兵以觀之丗民曰吾慮之乆矣破竹之勢不可失也舅勿復言遂進仁杲陳於城下丗民據涇水臨之仁杲驍將渾幹等數人臨陳來降仁杲懼引兵入城拒守日向暮大軍繼至遂圍之夜半守城者爭自投下仁杲計窮己酉出降得其精兵萬餘人男女五萬口諸將皆賀因問曰大王一戰而勝遽捨歩兵又無攻具輕􅀐直造城下衆皆以為不克而卒取之何也丗民曰羅㬋所將皆隴外之人將驍卒悍吾特出其不意而破之斬獲不多若緩之則皆入城仁杲撫而用之未易克也急之則散歸隴外折墌虛弱仁杲破膽不暇為謀此吾所以克也衆皆悅服世民所得降卒悉使仁果兄弟及宗羅㬋翟長孫等將之與之射獵無所疑間賊畏威銜恩皆願效死丗民聞禇亮名求訪獲之禮遇甚厚引為王府文學上遣使謂丗民曰薛舉父子多殺我士卒必盡誅其黨以謝􅁈䰟李密諌曰薛舉虐殺不辜此其所以亡也陛下何怨焉懷服之民不可不撫乃命戮其謀首餘皆赦之上使李密迎秦王丗民於􅃎州密自恃智略功名見上猶有傲色及見丗民不覺驚服私謂殷開山曰真英主也不如是何以定禍亂乎詔以員外散􅀐常侍姜謩為秦州刺史謩撫以恩信盜賊悉歸首士民安之徐丗勣據李密舊境未有所屬魏徵隨密至長安乆不爲朝廷所知乃自請安集山東上以為祕書丞乗傳至黎陽遺徐丗勣書勸之早降丗勣遂決計西向謂長史陽翟郭孝恪曰此民衆土地皆魏公有也吾若上表獻之是利主之敗自為功以邀富貴也吾實恥之今宜籍郡縣戸口士馬之數以啟魏公使自獻之乃遣孝恪詣長安又運糧以餉淮安王神通上聞丗勣使者至無表止有啟與密甚怪之孝恪具言丗勣意上乃嘆曰徐丗勣不背德不邀功眞純臣也賜姓李以孝恪為宋州刺史使與丗勣經營虎牢以東所得州縣委之選補癸丑獨孤懷恩攻堯君素於蒲反行軍揔管趙慈景尚帝女桂陽公主為君素所擒梟首城外以示無降意癸亥秦王丗民至長安斬薛仁杲於市上賜常逹帛三百段贈劉感平原郡公謚忠壯撲殺仵士政於殿庭以張貴尤淫暴􅆎斬之上享勞將士因謂羣臣曰諸公共相翊戴以成帝業若天下承平可共保富貴使王丗充得志公輩豈有種乎如薛仁杲君臣豈可不以為前鑑也己巳以劉文靜為戸部尚書領陜東道行臺左僕射復殷開山爵位李密驕貴日乆又自負歸國之功朝廷待之不副本望鬱鬱不樂甞遇大朝會密為光祿卿當進食深以為恥退以告左武衛大將軍王伯當伯當心亦怏怏因謂密曰天下事在公度内耳今東海公在􅀺陽襄陽公在羅口河南兵馬屈指可計豈得乆如此也密大喜乃獻策於上曰臣虛䝉榮寵安坐京師曾無報效山東之衆皆臣故時麾下請往収而撫之慿藉國威取王丗充如拾地芥耳上聞密故將士多不附丗充亦欲遣密往収之羣臣多諫曰李密狡猾好反今遣之如投魚於泉放虎於山必不反矣上曰帝王自有天命非小子所能取借使叛去如以蒿箭射蒿中耳今使二賊交鬭吾可以坐収其弊辛未遣密詣山東収其餘衆之未下者密請與賈閏甫偕行上許之命密及閏甫同升御榻賜食傳飲巵酒曰吾三人同飲是酒以明同心善建功名以副朕意丈夫一言許人千金不易有人確執不欲弟行朕推赤心於弟非佗人所能間也密閏甫再拜受命上又以王伯當爲密副而遣之􅊨有大鳥五集于樂壽羣鳥數萬從之經日乃去竇建德以爲已瑞攺元五鳯宗城人有得玄圭獻於建德者宋正本及景城丞會稽孔德紹皆曰此天所以賜大禹也請攺國號曰夏建德從之以正本為納言德紹為内史侍郎初王須拔掠幽州中流矢死其將魏刀兒代領其衆據深澤掠冀定之間衆至十萬自稱魏帝建德偽與連和刀兒弛備建德襲擊破之遂圍深澤其徒執刀兒降建德斬之盡幷其衆易定等州皆降唯冀州刺史麴稜不下稜壻崔履行暹之孫也自言有竒術可使攻者自敗稜信之履行命守城者皆坐毋得妄鬭曰賊雖登城汝曹勿怖吾將使賊自縛於是為壇夜設章醮然後自衣衰絰杖竹登北樓慟哭又令婦女升屋四向振裙建德攻之急稜將戰履行固止之俄而城陷履行哭猶未已建德見稜曰卿忠臣也厚禮之以為内史令十二月壬申詔以秦王丗民為太尉使持節陜東道大行臺其蒲州河北諸府兵馬並受節度癸酉西突厥曷娑那可汗自宇文化及所來降隋將堯君素守河東上遣吕紹宗韋義節獨孤懷恩相繼攻之俱不下時外圍嚴急君素為木鵝置表於頸具論事勢浮之於河河陽守者得之逹於東都皇泰主見而歎息拜君素金紫光祿大夫龎玉皇甫無逸自東都來降上悉遣詣城下為陳利害君素不從又賜金劵許以不死其妻又至城下謂之曰隋室巳亡君何自苦君素曰天下名義非婦人所知引弓射之應􅁌而倒君素亦自知不濟然志在守死每言及國家未甞不歔欷謂將士曰吾昔事主上於藩邸大義不得不死必若隋祚永終天命有屬自當斷頭以付諸君聽君等持取冨貴今城池甚固倉儲豐備大事猶未可知不可横生心也君素性嚴明善御衆下莫敢叛乆之倉粟盡人相食又獲外人微知江都傾覆丙子君素左右薛宗李楚客殺君素以降傳首長安君素遣朝散大夫解人王行本將精兵七百在它所聞之赴救不及因捕殺君素者黨與數百人悉誅之復乗城拒守獨孤懷恩引兵圍之丁丑隋襄平太守鄧暠以柳城北平二郡來降以暠爲營州揔管辛巳太常卿鄭元璹擊朱粲於商州破之初宇文化及遣使招羅藝藝曰我隋臣也斬其使者為煬帝發喪臨三日竇建德高開道各遣使招之藝曰建德開道皆劇賊耳吾聞唐公已定關中人望歸之此眞吾主也吾將從之敢沮議者斬會張道源慰撫山東藝遂奉表與漁陽上谷等諸郡皆來降癸未詔以藝為幽州揔管薛萬均丗雄之子也與弟萬徹俱以勇略為藝所親待詔以萬均為上柱國永安郡公萬徹為車􅀐將軍武安縣公竇建德既克冀州兵威益盛帥衆十萬冦幽州藝將逆戰萬均曰彼衆我寡出戰必敗不若使羸兵背城阻水為陳彼必度水擊我萬均請以精騎百人伏於城旁俟其半度擊之蔑不勝矣藝從之建德果引兵度水萬均邀擊大破之建德竟不能至其城下乃分兵掠霍堡及雍奴等縣藝復邀擊敗之凡相距百餘日建德不能克乃還樂壽藝得隋通直謁者温彦博以為司馬藝以幽州歸國彦博賛成之詔以彦博為幽州揔管府長史未㡬徵為中書侍郎兄大雅時為黄門侍郎與彦博對居近密時人榮之以西突厥曷娑那可汗為歸義王曷娑那獻大珠上曰珠誠至寳然朕寳王赤心珠無所用竟還之乙酉車駕幸周氏陂過故墅丁亥還宫初羌豪旁企地以所部附薛舉及薛仁杲敗企地來降留長安企地不樂帥其衆數千叛入南山出漢川所過殺掠武候大將軍龐玉擊之為仚地所敗行至始州掠女子王氏與俱醉卧野外王氏拔其佩刀斬首送梁州其衆遂潰詔賜王氏號崇義夫人壬辰王丗充帥衆三萬圍穀州刺史任瓌拒却之上使李密分其麾下之半留華州將其半出關長史張寶德預在行中恐密亡去罪相及上封事言其必叛上意乃中變又恐密驚駭乃降敕書勞來令密留所部徐行單騎入朝更受節度密至稠桑得敕謂賈閏甫曰敕遣我去無故復召我還天子曏云有人確執不許此譛行矣吾今若還無復生理不若破桃林縣收其兵糧北走度河比信達熊州吾已逺矣茍得至黎陽大事必成公意如何閏甫曰主上待明公甚厚況國家姓名著在圖䜟天下終當一統明公既已委質復生異圖任瓌史萬寶據熊穀二州此事朝舉彼兵夕至雖克桃林兵豈暇集一稱叛逆誰復容人為明公計不若且應朝命以明元無異心自然浸潤不行更欲出就山東徐思其便可也密怒曰唐使吾與絳灌同列何以堪之且䜟文之應彼我所共今不殺我聽使東行足明王者不死縱使唐遂定關中山東終為我有天與不取乃欲束手投人公吾之心腹何意如是若不同心當斬而後行閏甫泣曰明公雖云應䜟近察天人稍已相違今海内分崩人思自擅强者為雄明公奔亡甫爾誰相聽受且自翟讓受戮之後人皆謂明公棄恩忘本今日誰肯復以所有之兵束手委公乎彼必慮公見奪逆相拒抗一朝失勢豈有容足之地哉自非荷恩殊厚者詎能深言不諱乎願明公孰思之但恐大福不再茍明公有所措身閏甫亦何辭就戮密大怒揮刃欲擊之王伯當等固請乃釋之閏甫奔熊州伯當亦止密以爲未可密不從伯當乃曰義士之志不以存亡易心公必不聽伯當與公同死耳然終恐無益也密因執使者斬之庚子旦密紿桃林縣官曰奉詔蹔還京師家人請寄縣舍乃簡驍勇數十人着婦人衣戴羃䍦藏刀裙下詐爲妻妾自帥之入縣舎須㬰變服突出因據縣城驅掠徒衆直趣南山乗險而東遣人馳告故將伊州刺史襄城張善相令以兵應接右翊衛將軍史萬寶鎭熊州謂行軍揔管盛彦師曰李密驍賊也又輔以王伯當今決策而叛殆不可當也彦師笑曰請以數千之衆邀之必梟其首萬寶曰公以何策能爾彦師曰兵法尚詐不可為公言之即帥衆踰熊耳山南據要道令弓弩夾路乗高刀楯伏於溪谷令之曰俟賊半度一時俱發或問曰聞李密欲向洛州而公入山何也彦師曰密聲言向洛實欲出人不意走襄城就張善相耳若賊入谷口我自後追之山路險隘無所施力一夫殿後必不能制今吾先得入谷擒之必矣李密既度陜以為餘不足慮遂擁衆徐行果踰山南出彦師擊之密衆首尾斷絶不得相救遂斬密及伯當俱傳首長安盛彦師以功陽爵葛國公拜武衛將軍仍領熊州李丗勣在黎陽上遣使以密首示之告以反狀丗勣北靣拜伏號慟表請收葬詔歸其尸丗勣為之行服備君臣之禮大具儀衛舉軍縞素葬密于黎陽山南密素得士心哭者多歐血隋右武衛大將軍李景守北平高開道圍之嵗餘不能克遼西太守鄧暠將兵救之景帥其衆遷于柳城後將還幽州於道為盜所殺開道遂取北平進䧟漁陽郡有馬數千匹衆且萬自稱燕王攺元始興都漁陽懷戎沙門高曇晟因縣令設齋士民大集曇晟與僧五千人擁齋衆而反殺縣令及鎭將自稱大乗皇帝立尼靜宣為邪輸皇后攺元法輪遣使招開道立為齊王開道帥衆五千人歸之居數月襲殺曇晟悉并其衆有犯法不至死者上特命殺之監察御史李素立諌曰三尺法王者所與天下共也法一動揺人無所措手足陛下甫創鴻業奈何弃法臣沗法司不敢奉詔上從之自是特承恩遇命所司授以七品清要官所司擬雍州司戸上曰此官要而不清又擬祕書郎上曰此官清而不要遂擢授侍御史素立義􅀷之曾孫也上以舞􅀷安叱奴為散􅀐侍郎禮部尚書李綱諌曰古者樂工不與士齒雖賢如子野師襄皆終身繼丗不易其業唯齊末封曹妙逹為王安馬駒為開府有國家者以為殷鑑今天下新定建義功臣行賞未遍高才碩學猶滯草萊而先擢舞胡為五品使鳴玉曳組趨翔廊廟非所以規模後丗也上不從曰吾業已授之不可追也陳嶽論曰受命之主發號施令為子孫法一不中理則為厲階今高祖曰業已授之不可追茍授之而是則已授之而非胡不可追歟君人之道不得不以業已授之為誡哉李軌吏部尚書梁碩有智略軌常􅀝之以為謀主碩見諸胡浸盛隂勸軌宜加防察由是與戸部尚書安脩仁有隙􅁤子仲琰甞詣碩碩不為禮乃與脩仁共讃碩於軌誣以謀反軌酖碩殺之有胡巫謂軌曰上帝當遣玉女自天而降軌信之發民築臺以候玉女勞費其廣河右饑人相食軌傾家財以賑之不足欲發倉粟召羣臣議之曹珍等皆曰國以民為本豈可愛倉粟而坐視其死乎謝統師等皆故隋官心終不服密與羣胡為黨排軌故人乃詬珍曰百姓餓者自是羸弱勇壯之士終不至此國家倉粟以備不虞豈可散之以飼羸弱僕射茍悅人情不為國計非忠臣也軌以為然由是士民離怨資治通鑑卷第一百八十六
