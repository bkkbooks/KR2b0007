seq: 83
front:
  text: 其巳然之效也是以有道之君牧夷狄也惟以待之有僃禦之有常雖稽顙執贄而邉城不弛固守彊暴爲寇而兵甲不加逺征期令境内獲安彊埸不侵而已及至周室失統諸矦專征封疆不固而利害異心戎狄乗閒得入中國或招誘安撫以爲已用自是四夷交侵與中國錯居及秦始皇并天下兵威旁達攘胡走越當是時中國無復四夷也漢建武中馬援領隴西太守討叛羗徙其餘種於關中居馮翊河東空地數嵗之後族類蕃息既恃其肥彊且苦漢人侵之永初之元羣羗叛亂覆没將守屠破城邑鄧騭敗北侵及河内十年之中夷夏俱敝任尚馬賢僅乃克之自此之後餘燼不盡小有際㑹輒復侵叛中世之寇惟此爲大魏興之初與蜀分隔疆埸之戎一彼一此武帝徙武都氐於秦州欲以弱冦彊國扞禦蜀虜此蓋權宐之計非萬世之利也今者當之已受其敝矣夫關中土沃物豐帝王所居未聞戎狄宐在此土也非我族類其心必異而因其衰敝遷之畿服士庶翫習侮其輕弱使其怨恨之氣毒於骨髓至於蕃育衆盛則坐生其心以貪悍之性挾憤怒之情􅇋隙乗便輒爲横逆而居封域之内無障塞之隔掩不僃之人收散野之積故能爲禍滋蔓暴害不測此必然之埶已驗之事也當今之宐宐及兵威方盛衆事未罷徙馮翊北地新平安定界内諸羌著先零罕开析支之地徙扶風始平京兆之氐出還隴右著隂平武都之界廩其道路之糧令足自致各附本種反其舊土使屬國撫夷就安集之戎晉不雜並得其所縱有猾夏之心風塵之警則絶逺中國隔閡山河雖爲寇暴所害不廣矣難者曰氐寇新平關中饑疫百姓愁苦咸望寧息而欲使疲悴之衆徙自猜之寇恐埶盡力屈緒業不卒前害未及弭而後變復横出矣荅曰子以今者羣氐爲尚挾餘資悔惡反善懷我德惠而來柔附乎將埶窮道盡智力俱困懼我兵誅以至於此乎曰無有餘力勢窮道盡故也然則我能制其短長之命而令其進退由已矣夫樂其業者不易事安其居者無遷志方其自疑危懼畏怖促遽故可制以兵威使之左右無違也迨其死亡散流離逷未鳩與關中之人户皆爲讎故可遐遷逺處令其心不懷土也夫聖賢之謀事也爲之於未有治之於未亂道不著而平德不顯而成其次則能轉禍爲福因敗爲功值困必濟遇否能通今子遭敝事之終而不圖更制之始愛易轍之勤而遵覆車之􅁤何哉且關中之人百餘萬口率其少多戎狄居半處之與遷必須口實若有窮乏糝粒不繼者故當傾關中之榖以全其生生之計必無擠於溝壑而不爲侵掠之害也今我遷之傳食而至附其種族自使相贍而秦地之人得其半榖此爲濟行者以廩糧遺居者以積倉寛關中之逼去盜賊之原除旦夕之損建終年之益若憚蹔舉之小勞而忘永逸之弘䇿惜日月之煩苦而遺累世之寇敵非所謂能創業垂統謀及子孫者也并州之胡本實匈奴桀惡之寇也建安中使右賢王去卑誘質呼厨泉聽其部落散居六郡咸熈之際以一部太彊分爲三率泰始之初又増爲四於是劉猛内叛連結外虜近者郝散之變發於榖逺今五部之衆户至數萬人口之盛過於西戎其天性驍勇弓馬便利倍於氐羌若有不虞風塵之慮則并州之域可爲寒心正始中毌丘儉討句驪徙其餘種於滎陽始徙之時户落百數子孫孳息今以千計數世之後必至殷熾今百姓失職猶或亡叛犬馬肥充則有噬齧況於夷狄能不爲變但顧其微弱埶力不逮耳夫爲邦者憂不在寡而在不安以四海之廣士民之富豈須夷虜在内然後取足哉此等皆可申諭發遣還其本域慰彼羈旅懷土之思釋我華夏纎介之憂惠此中國以綏四方德施永世於計爲長也朝廷不能用散騎常侍賈謐侍講東宫對太子倨傲成都王頴見而叱之謐怒言於賈后出頴爲平北將軍鎭鄴徴梁王肜爲大將軍録尚書事以河閒王顒爲鎭西將軍鎮關中初武帝作石函之制非至親不得鎭關中顒輕財愛士朝廷以爲賢故用之
