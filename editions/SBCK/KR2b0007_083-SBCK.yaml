body:
  text: 夏六月戊戌高密文獻王泰薨賈后淫虐日甚私於太醫令程據等又以簏箱載道上年少入宫復恐其漏泄往往殺之賈模恐禍及已甚憂之裴頠與模及張華議廢后更立謝淑妃模華皆曰主上自無廢黜之意而吾等專行之儻上心不以爲然將若之何且諸王方彊朋黨各異恐一旦禍起身死國危無益社稷頠曰誠如公言然中宫逞其昬虐亂可立待也華曰卿二人於中宫皆親戚言或見信宐數爲陳禍福之戒庶無大悖則天下尚未至於亂吾曹得以優游卒嵗而已頠旦夕説其從母廣城君令戒諭賈后以親厚太子賈模亦數爲后言禍福后不能用反以模爲毁已而疎之模不得志憂憤而卒秋八月以裴頠爲尚書僕射頠雖賈后親屬然雅望素隆四海唯恐其不居權位尋詔頠專任門下事頠上表固辭以賈模適亡復以臣代之崇外戚之望彰偏私之舉爲聖朝累不聽或謂頠曰君可以言當盡言於中宫言而不從當逺引而去儻二者不立雖有十表難以免矣頠慨然久之竟不能從帝爲人戇騃嘗在華林園聞蝦蟆謂左右曰此鳴者爲官乎爲私乎時天下荒饉百姓餓死帝聞之曰何不食肉糜由是權在羣下政出多門埶位之家更相薦託有如互市賈郭恣横貨賂公行南陽魯襃作錢神論以譏之曰錢之爲體有乾坤之象親之如兄字曰孔方無德而尊無埶而熱排金門入紫闥危可使安死可使活貴可使賤生可使殺是故忿爭非錢不勝幽滯非錢不抜怨讎非錢不解令聞非錢不發洛中朱衣當塗之士愛我家兄皆無己已執我之手抱我終始凡今之人惟錢而已又朝臣務以苛察相高每有疑議羣下各立私意刑法不壹獄訟䌓滋裴頠上表曰先王刑賞相稱輕重無二故下聽有常羣吏安業去元康四年大風廟闕屋瓦有數枚傾落免太常荀㝢事輕責重有違常典五年二月有大風蘭臺主者懲懼前事求索阿棟之閒得瓦小邪十五處遂禁止太常復興刑獄今年八月陵上荆一枝圍七寸二分者被斫司徒太常犇走道路雖知事小而案劾難測搔擾驅馳各競免負于今太常禁止未解夫刑書之文有限而舛違之故無方故有臨時議處之制誠不能皆得循常也至於此等皆爲過當恐姦吏因縁得爲淺深也既而曲議猶不止三公尚書劉頌復上疏曰自近世以來法漸多門令甚不一吏不知所守下不知所避姦僞者因以售其情居上者難以檢其下事同議異獄犴不平夫君臣之分各有所司灋欲必奉故令主者守文理有窮塞故使大臣釋滯事有時宐故人主權斷主者守文若釋之執犯蹕之平也大臣釋滯若公孫弘斷郭解之獄也人主權斷若漢祖戮丁公之爲也天下萬事自非此類不得出意妄議皆以律令從事然後法信於下人聽不惑吏不容姦可以言政矣乃下詔郎令史復岀灋駮案者隨事以聞然亦不能革也頌遷吏部尚書建九班之制欲令百官居職希遷考課能否明其賞罰賈郭用權仕者欲速事竟不行裴頠薦平陽韋忠於張華華辟之忠辭疾不起人問其故忠曰張茂先華而不實裴逸民慾而無厭棄典禮而附賊后此豈大丈夫之所爲哉逸民每有心託我我常恐其溺於深淵而餘波及我況可褰裳而就之哉關内矦敦煌索靖知天下將亂指洛陽宫門銅駝歎曰㑹見汝在荆棘中耳冬十一月甲子朔日有食之初廣城君郭槐以賈后無子常勸后使慈愛太子賈謐驕縱數無禮於太子廣城君􅁪切責之廣城君欲以韓壽女爲太子妃太子亦欲㛰韓氏以自固壽妻賈午及后皆不聽而爲太子聘王衍少女太子聞衍長女美而后爲賈謐聘之心不能平頗以爲言及廣城君病臨終執后手令盡心於太子言甚切至又曰趙粲賈午必亂汝家事我死後勿復聽入深記吾言后不從更與粲午謀害太子太子幼有令名及長不好學惟與左右嬉戲賈后復使黄門軰誘之爲奢靡威虐由是名譽浸減驕慢益彰或廢朝侍而縱遊逸於宫中爲市使人屠酤手揣斤兩輕重不差其母本屠家女也故太子好之東宫月俸錢五十萬太子常探取二月用之猶不足又令西園賣葵菜藍子雞麵等物而收其利又好隂陽小數多所拘忌洗馬江統上書陳五事一曰雖有微苦宐力疾朝侍二曰宐勤見保傅咨詢善道三曰畫室之功可且減省後園刻鏤雜作一皆罷遣四曰西園賣葵藍之屬虧敗國體貶損令聞五曰繕牆正瓦不必拘攣小忌太子皆不從中舍人杜錫恐太子不得安其位每盡忠諫勸太子修德業保令名言辭懇切太子患之置針著錫常所坐氊中刺之流血錫預之子也太子性剛知賈謐恃中宫驕貴不能假借之謐時爲侍中至東宫或捨之於後庭游戲詹事裴權諫曰謐后所親昵一旦交構則事危矣不從謐譛太子於后曰太子多畜私財以結小人者爲賈氏故也若宫車晏駕彼居大位依楊氏故事誅臣等廢后於金墉如反手耳不如早圖之更立慈順者可以自安后納其言乃宣揚太子之短布於逺近又詐爲有娠内藁物産具取妹夫韓壽子慰祖養之欲以代太子于時朝野咸知賈后有害太子之意中䕶軍趙俊請太子廢后太子不聽左衛率東平劉卞以賈后之謀問張華華曰不聞卞曰卞自須昌小吏受公成抜以至今日士感知己是以盡言而公更有疑於卞邪華曰假令有此君欲如何卞曰東宫俊乂如林四率精兵萬人公居阿衡之任若得公命皇太子因朝入録尚書事廢賈后於金墉城兩黄門力耳華曰今天子當陽太子人子也吾又不受阿衡之命忽相與行此是無君父而以不孝示天下也雖能有成猶不免罪況權戚滿朝威柄不一成可必乎賈后常使親黨㣲服聽察於外頗聞卞言乃遷卞爲雍州刺史卞知言泄飲藥而死十二月太子長子虨病太子爲虨求王爵不許虨疾篤太子爲之禱祀求福賈后聞之乃詐稱帝不豫召太子入朝既至后不見置于别室遣婢陳舞以帝命賜太子酒三升使盡飲之太子辭以不能飲三升舞逼之曰不孝邪天賜汝酒而不飲酒中有惡物邪太子不得已強飲至盡遂大醉后使黄門侍郎潘岳作書草令小婢承福以紙筆及草因太子醉稱詔使書之文曰陛下宐自了不自了吾當入了之中宫又宜速自了不自了吾當手了之并與謝妃共要刻期兩發勿疑猶豫以致後患茹毛飲血於三辰之下皇天許當掃除患害立道文爲王蔣氏爲内主願成當三牲祠北君太子醉迷不覺遂依而寫之其字半不成后補成之以呈帝壬戍帝幸式乾殿召公卿入使黄門令董猛以太子書及青紙詔示之曰遹書如此今賜死徧示諸公王莫有言者張華曰此國之大禍自古以來常因廢黜正嫡以致䘮亂且國家有天下日淺願陛下詳之裴頠以爲宐先檢校傳書者又請比校太子手書不然恐有詐妄賈后乃出太子啟事十餘紙衆人比視亦無敢言非者賈后使董猛矯以長廣公主辭白帝曰事宐速决而羣臣各不同其不從詔者宐以軍灋從事議至日西不决后見華等意堅懼事變乃表免太子爲庶人詔許之於是使尚書和郁等持節詣東宫廢太子爲庶人太子改服出再拜受詔步出承華門乗麤犢車東武公澹以兵仗送太子及妃王氏三子虨臧尚同幽于金墉城王衍自表離婚許之妃慟哭而歸殺太子母謝淑媛及虨母保林蔣俊永康元年春正月癸亥朔赦天下改元西戎校尉司馬閻纘輿棺詣闕上書以爲漢戾太子稱兵拒命言者猶曰罪當笞耳今遹受罪之日不敢失道猶爲輕於戾太子宐重選師傅先加嚴誨若不悛改棄之未晩也書奏不省纘圃之孫也賈后使黄門自首欲與太子爲逆詔以黄門首辭班示公卿遣東武公澹以千兵防衛太子幽于許昌宫令持書御史劉振持節守之詔宫臣不得辭送洗馬江統潘滔舍人王敦杜􅅋魯瑶等冒禁至伊水拜辭涕泣司􅀠校尉滿奮收􅅞統等送獄其繫河南獄者樂廣悉解遣之繫洛陽縣獄者猶未釋都官從事孫琰說賈謐曰所以廢徙太子以其爲惡故耳今宫臣冒罪拜辭而加以重辟流聞四方乃更彰太子之德也不如釋之謐乃語洛陽令曹攄使釋之廣亦不坐敦覽之孫攄肇之孫也太子至許遺王妃書自陳誣枉妃父衍不敢以聞丙子皇孫虨卒三月尉氏雨血妖星見南方太白晝見中台星拆張華少子韙勸華遜位華不從曰天道幽逺不如靜以待之太子旣廢衆情憤怒有衛督司馬雅常從督許超皆嘗給事東宫與殿中郎士猗等謀廢賈后復太子以張華裴頠安常保位難與行權右軍將軍趙王倫執兵柄性貪冒可假以濟事乃說孫秀曰中宫凶妬無道與賈謐等共誣廢太子今國無嫡嗣社稷將危大臣將起大事而公名奉事中宫與賈郭親善太子之廢皆云豫知一朝事起禍必相及何不先謀之乎秀許諾言於倫倫納焉遂告通事令史張林及省事張衡等使爲内應事將起孫秀言於倫曰太子聦明剛猛若還東宫必不受制於人明公素黨於賈后道路皆知之今雖建大功於太子太子謂公特逼於百姓之望翻覆以免罪耳雖含忍宿忿必不能深德明公若有瑕釁猶不免誅不若遷延緩期賈后必害太子然後廢賈后爲太子報讎豈徒免禍而已乃更可以得志倫然之秀因使人行反閒言殿中人欲廢皇后迎太子賈后數遣宫婢微服於民閒聽察聞之甚懼倫秀因勸謐等早除太子以絶衆望癸未賈后使太醫令程據和毒藥矯詔使黄門孫慮至許昌毒太子太子自廢黜恐被毒常自煑食於前慮以告劉振振乃徙太子於小坊中絶其食宫人猶竊於牆上過食與之慮逼太子以藥太子不肯服慮以藥杵椎殺之有司請以庶人禮葬賈后表請以廣陵王禮葬之夏四月辛卯朔日有食之趙王倫孫秀將討賈后告右衞佽飛督閭和和從之期以癸巳丙夜一籌以鼓聲爲應癸巳秀使司馬雅告張華曰趙王欲與公共匡社稷爲天下除害使雅以告華拒之雅怒曰刃將在頸猶爲是言邪不顧而出及期倫矯詔敇三部司馬曰中宫與賈謐等殺吾太子今使車騎入廢中宫汝等皆當從命事畢賜爵關中矦不從者誅三族衆皆從之又矯詔開門夜入陳兵道南遣翊軍校尉齊王囧將百人排閤而入華林令駱休爲内應迎帝幸東堂以詔召賈謐於殿前將誅之謐走入西鍾下呼曰阿后救我就斬之賈后見齊王冏驚曰卿何爲來囧曰有詔收后后曰詔當從我出何詔也后至上閤遥呼帝曰陛下有婦使人廢之亦行自廢矣是時梁王肜亦預其謀后問囧曰起事者誰囧曰梁趙后曰繫狗當繫頸反繫其尾何得不然遂廢后爲庶人幽之於建始殿收趙粲賈午等付暴室考竟詔尚書收捕賈氏親黨召中書監侍中黄門侍郎八座皆夜入殿尚書始疑詔有詐郎師景露版奏請手詔倫等斬之以徇倫隂與秀謀簒位欲先除朝望且報宿怨乃執張華裴頠解系解結等於殿前華謂張林曰卿欲害忠臣邪林稱詔詰之曰卿爲宰相太子之廢不能死節何也華曰式乾之議臣諫事具存可覆按也林曰諫而不從何不去位華無以對遂皆斬之仍夷三族解結女適裴氏明日當嫁而禍起裴氏欲認活之女曰家既若此我何以活爲亦坐死朝廷由是議革舊制女不從死甲午倫坐端門遣尚書和郁持節送賈庶人于金墉誅劉振董猛孫慮程據等司徒王戎及内外官坐張裴親黨黜免者甚衆閻纉撫張華尸慟哭曰早語君遜位而不肯今果不免命也於是趙王倫稱詔赦天下自爲使持節都督中外諸軍事相國侍中一依宣文輔魏故事置府兵萬人以其世子散騎常侍荂領宂從僕射子馥爲前將軍封濟陽王䖍爲黄門郎封汝隂王詡爲散騎侍郎封霸城矦孫秀等皆封大郡並據兵權文武官封矦者數千人百官緫己以聽於倫倫素庸愚復受制於孫秀秀爲中書令威權振朝廷天下皆事秀而無求於倫詔追復故太子遹位號使尚書和郁帥東宫官屬迎太子䘮於許昌追封遹子虨爲南陽王封虨弟臧爲臨淮王尚爲襄陽王有司奏尚書令王衍備位大臣太子被誣志在茍免請禁錮終身從之相國倫欲收人望選用海内名德之士以前平陽太守李重滎陽太守荀組爲左右長史東平王堪沛國劉謨爲左右司馬尚書郎陽平束晳爲記室淮南王文學荀崧殿中郎陸機爲參軍組朂之子崧彧之玄孫也李重知倫有異志辭疾不就倫逼之不已憂憤成疾扶曵受拜數日而卒丁酉以梁王肜爲太宰左光禄大夫何劭爲司徒右光禄大夫劉寔爲司空太子遹之廢也將立淮南王允爲太弟議者不合㑹趙王倫廢賈后乃以允爲驃騎將軍開府儀同三司領中䕶軍己亥相國倫矯詔遣尚書劉􅀪齎金屑酒賜賈后死于金墉城五月己巳詔立臨淮王臧爲皇太孫還妃王氏以母之太子官屬即轉爲太孫官屬相國倫行太孫太傅己卯謚故太子曰愍懷六月壬寅葬于顯平陵清河康王遐薨中䕶軍淮南王允性沈毅宿衛將士皆畏服之允知相國倫及孫秀有異志隂養死士謀討之倫秀深憚之秋八月轉允爲太尉外示優崇實奪其兵權允稱疾不拜秀遣御史劉機逼允收其官屬以下劾以拒詔大逆不敬允視詔乃秀手書也大怒收御史將斬之御史走免斬其令史二人厲色謂左右曰趙王欲破我家遂帥國兵及帳下七百人直出大呼曰趙王反我將討之從我者左􅃝於是歸之者甚衆允將赴宫尚書左丞王輿閉掖門允不得入遂圍相府允所將兵皆精銳倫與戰屢敗死者千餘人太子左率陳徽勒東宫兵鼓譟於内以應允允結陳於承華門前弓弩齊發射倫飛矢雨下主書司馬眭祕以身蔽倫箭中其背而死倫官屬皆隱樹而立每樹輒中數百箭自辰至未中書令陳淮徽之兄也欲應允言於帝曰宐遣白虎幡以解􅃲乃使司馬督䕶伏㣧將騎四百持幡從宫中出侍中汝隂王䖍在門下省隂與㣧誓曰富貴當與卿共之胤乃懷空板出詐言有詔助淮南王允不之覺開陣内之下車受詔㣧因殺之并殺允子秦王郁漢王廸坐允夷滅者數千人曲赦洛陽初孫秀嘗爲小吏事黄門郎潘岳岳屢撻之衛尉石崇之甥歐陽建素與相國倫有隙崇有愛妾曰緑珠孫秀使求之崇不與及淮南王允敗秀因稱石崇潘岳歐陽建奉允爲亂收之崇歎曰奴輩利吾財耳收者曰知財爲禍何不早散之崇不能荅初潘岳母常誚責岳曰汝當知足而乾没不已乎及敗岳謝母曰負阿母遂與崇建皆族誅籍没崇家相國倫收淮南王母弟呉王晏欲殺之光禄大夫傅祗爭之於朝堂衆皆諫止倫倫乃貶晏爲賓徒縣王齊王囧以功遷游擊將軍囧意不滿有恨色孫秀覺之且憚其在内乃出爲平東將軍鎮許昌以光禄大夫陳準爲太尉録尚書事未㡬薨孫秀議加相國倫九錫百官莫敢異議吏部尚書劉頌曰昔漢之錫魏魏之錫晉皆一時之用非可通行周勃霍光其功至大皆不聞有九錫之命也張林積忿不已以頌爲張華之黨將殺之孫秀曰殺張裴已傷時望不可復殺頌林乃止以頌爲光禄大夫遂下詔加倫九錫復加其子荂撫軍將軍䖍中軍將軍詡爲侍中又加孫秀侍中輔國將軍相國司馬右率如故張林等並居顯要増相府兵爲二萬人與宿衞同并所隱匿之兵數踰三萬九月改司徒爲丞相以梁王肜爲之肜固辭不受倫及諸子皆頑鄙無識秀狡黠貪淫所與共事者皆邪佞之士惟競榮利無深謀逺略志趣乖異互相憎嫉秀子㑹爲射聲校尉形貌短陋如奴僕之下者秀使尚帝女河東公主冬十一月甲子立皇后羊氏赦天下后尚書郎泰山羊玄之之女也外祖平南將軍樂安孫旂與孫秀善故秀立之拜玄之光禄大夫特進散騎常侍封興晉矦詔徴益州刺史趙廞爲大長秋以成都内史中山耿滕爲益州刺史廞賈后之姻親也聞徴甚懼且以晉室衰亂隂有據蜀之志乃傾倉廩賑流民以收衆心以李特兄弟材武其黨類皆巴西人與廞同郡厚遇之以爲爪牙特等慿恃廞埶專聚衆爲盜蜀人患之滕數宻表流民剛剽蜀人愞弱主不能制客必爲亂階宐使還本居若留之險地恐秦雍之禍更移於梁益矣廞聞而惡之州被詔書遣文武千餘人迎滕是時成都治少城益州治太城廞猶在太城未去滕欲入州功曹陳恂諫曰今州郡構怨日深入城必有大禍不如留少城以觀其變檄諸縣合村保以僃秦氐陳西夷行至且當待之不然退保犍爲西渡江源以防非常滕不從是月帥衆入州廞遣兵逆之戰于西門滕敗死郡吏皆􅇡走惟陳恂面􅅞詣廞請滕䘮廞義而許之廞又遣兵逆西夷校尉陳揔揔至江陽聞廞有異志主簿蜀郡趙模曰今州郡不恊必生大變當速行赴之府是兵要助順討逆誰敢動者揔更縁道停留比至南安魚涪津已遇廞軍模白揔散財募士以拒戰若克州軍則州可得不克順流而退必無害也揔曰趙益州忿耿矦故殺之與吾無嫌何爲如此模曰今州起事必當殺君以立威雖不戰無益也言至垂涕揔不聽衆遂自潰揔逃草中模著揔服格戰廞兵殺模見其非是更搜求得揔殺之廞自稱大都督大將軍益州牧署置僚屬改易守令王官被召無敢不往李庠帥妹壻李含天水任回上官晶扶風李攀始平費他氐符成隗伯等四千騎歸廞廞以庠爲威寇將軍封陽泉亭矦委以心膂使招合六郡壯勇至萬餘人以斷北道資治通鑑卷第八十三
