front:
  text: 資治通鑑卷第一百九十六
  hash: sha256:f9193db49dc05f334ed073a405cbc9b315c78572507e426a3da2d012110c92c6
body:
  text: 臣司馬光奉勑編集唐紀十二單閼三月凡二年有竒起重光赤奮若盡昭陽太宗文武大聖大廣孝皇帝中之中貞觀十五年春正月甲戍以吐蕃禄東賛為右衛大將軍上嘉禄東賛善應對以瑯邪公主外孫叚氏妻之辭曰臣國中自有婦父母所聘不可棄也且贊普未得謁公主陪臣何敢先娶上益賢之然欲撫以厚恩竟不從其志丁丑命禮部尚書江夏王道宗持節送文成公主于吐蕃贊普大喜見道宗盡子壻禮慕中國衣服儀衛之羙為公主别築城郭宫室而處之自服紈綺以見公主其國人皆以赭塗面公主惡之賛普下令禁之亦漸革其猜暴之性遣子弟入國學受詩書乙亥突厥􅀱利苾可汗始帥部落濟河建牙於故定襄城有户三萬勝兵四萬馬九萬匹仍奏言臣非分蒙恩為部落之長願子子孫孫為國家一犬守吠北門若薛延陀侵逼請徙家屬入長城詔許之上將幸洛陽命皇太子監國留右僕射髙士亷輔之辛巳行及温湯衛士崔卿刁文懿憚於行役冀上驚而止乃夜射行宫矢及寢庭者五皆以大逆論三月戊辰幸襄城宫地既煩熱復多毒蛇庚午罷襄城宫分賜百姓免閻立徳官夏四月辛卯朔詔以來年二月有事于泰山上以近世隂陽雜書訛偽尤多命太常博士吕才與諸術士刋定可行者凡四十七卷己酉書成上之才皆爲之敘質以經史其序宅經以爲近世巫覡妄分五姓如張王爲商武庾爲羽似取諧韻至於以柳爲宫以趙爲角又復不類或同出一姓分屬宫商或複姓數字莫辨徴羽此則事不稽古義理乖僻者也敘禄命以爲禄命之書多言或中人乃信之然長平阬卒未聞共犯三刑南陽貴士何必俱當六合今亦有同年同禄而貴賤懸殊共命共胎而夭壽更異按魯莊公法應貧賤又尫弱短陋惟得長壽秦始皇法無官爵縱得禄少奴婢爲人無始有終漢武帝後魏孝文帝皆法無官爵宋武帝禄與命並當空亡唯宜長子雖有次子法當早夭此皆禄命不驗之著明者也其叙葬以為孝經云卜其宅兆而安厝之蓋以窀穸既終永安體魄而朝市遷變泉石交侵不可前知故謀之􅀛筮近代或選年月或相墓田以為一事失所禍及死生按禮天子諸侯大夫葬皆有月數是古人不擇年月也春秋九月丁巳葬定公雨不克葬戊午日下昊乃克葬是不擇日也鄭葬簡公司墓之室當路毁之則朝而窆不毁則日中而窆子産不毁是不擇時也古之葬者皆於國都之北兆域有常處是不擇地也今葬書以為子孫富貴貧賤壽夭皆因卜葬所致夫子文為令尹而三已柳下惠為士師而三黜計其丘隴未嘗改移而野俗無識妖巫妄言遂於擗踊之際擇葬地以希官爵荼毒之秋選葬時以規財利或云辰日不可哭泣遂莞爾而對弔客或云同属忌於臨壙遂吉服不送其親傷教敗禮莫斯為甚術士皆惡其言而識者以為確論丁巳果毅都尉席君買帥精騎百二十襲擊吐谷渾丞相宣王破之斬其兄弟三人初丞相宣王專國政隂謀襲􅀪化公主劫其王諾曷鉢奔吐蕃諾曷鉢聞之輕騎奔鄯善城其臣威信王以兵迎之故君買為之討誅宣王國人猶驚擾遣户部尚書唐儉等慰撫之五月壬申并州父老詣闕請上封泰山畢還幸晉陽上許之丙子百濟來告其王扶餘璋之䘮遣使冊命其嗣子義慈己酉有星孛于太微太史令薛頥上言未可東封辛亥起居郎褚遂良亦言之丙辰詔罷封襌太子詹事于志寧遭母䘮尋起復就職太子治宫室妨農功又好鄭衛之樂志寧諌不聼又寵昵宦官常在左右志寧上書以為自易牙以來宦官覆亡國家者非一今殿下親寵此属使陵易衣冠不可長也大子役使司馭等半歲不許分畨又私引突厥逹哥友入宫志寧上書切諌太子大怒遣刺客張思政紇干承基殺之二人入其第見志寧寢處苫塊意不忍殺而止西突厥沙鉢羅葉䕶可汗數遣使入貢秋七月甲戍命左領軍將軍張大師持節即其所號立為可汗賜以鼓纛上又命使者多齎金帛厯諸國市良馬魏徴諌曰可汗位未定而先市馬彼必以為陛下志在市馬以立可汗為名耳使可汗得立荷徳必淺若不得立為怨實深諸國聞之亦輕中國市或不得得亦非羙茍能使彼安寧則諸國之馬不求自至矣上欣然止之乙毗咄陸可汗與沙鉢羅葉䕶互相攻乙毗咄陸浸彊大西域諸國多附之未㡬乙毗咄陸使石國吐屯擊沙鉢羅葉䕶擒之以歸殺之丙子上指殿屋謂侍臣曰治天下如建此屋營構既成勿數改移苟易一榱正一瓦踐履動揺必有所損若慕竒功變法度不恒其徳勞擾實多上遣職方郎中陳大徳使髙麗八月己亥自髙麗還大徳初入其境欲知山川風俗所至城邑以綾綺遺其守者曰吾雅好山水此有勝處吾欲觀之守者喜導之遊歷無所不至往往見中國人自云家在某郡隋末從軍沒於髙麗髙麗妻以遊女與髙麗錯居殆將半矣因問親戚存沒大徳紿之曰皆無恙咸涕泣相告數日後隋人望之而哭者徧於郊野大徳言於上曰其國聞髙昌亡大懼館候之勤加於常數上曰髙麗本四郡地耳吾發卒數萬攻遼東彼必傾國救之别遣舟師出東萊自海道趨平壤水陸合􅀔取之不難但山東州縣彫瘵未復吾不欲勞之耳乙巳上謂侍臣曰朕有二喜一懼比年豐稔長安斗粟直三四錢一喜也北虜乆服邊鄙無虞二喜也治安則驕侈易生驕侈則危亡立至此一懼也冬十月辛卯上校獵伊闕壬辰幸嵩陽辛丑還宫并州大都督長史李世勣在州十六年令行禁止民夷懐服上曰隋􅌆帝勞百姓築長城以備突厥卒無所益朕唯置李世勣於晉陽而邊塵不驚其為長城豈不壯哉十一月庚申以世勣為兵部尚書壬申車駕西歸長安薛延陀真珠可汗聞上將東封謂其下曰天子封泰山士馬皆從邊境必虛我以此時取思摩如拉朽耳乃命其子大度設發同羅僕骨廻紇靺鞨霫等兵合二十萬度漠南屯白道川據善陽嶺以擊突厥候利苾可汗不能禦帥部落入長城保朔州遣使告急癸酉上命營州都督張儉帥所部騎兵及奚霫契丹壓其東境以兵部尚書李世勣為朔州道行軍揔管將兵六萬騎千二百屯羽方右衛大將軍李大亮為靈州道行軍揔管將兵四萬騎五千屯靈武右屯衛大將軍張士貴將兵一萬七千為慶州道行軍揔管出雲中凉州都督李襲譽為凉州道行軍揔管出其西諸將辭行上戒之曰薛延陀負其彊盛踰漠而南行數千里馬已疲瘦凡用兵之道見利速進不利速退薛延陀不能掩思摩不備急擊之思摩入長城又不速退吾已敇思摩燒薙秋草彼糧糗日盡野無所獲頃偵者來云其馬齧林木枝皮略盡卿等當與思摩共爲掎角不須速戰俟其將退一時奮擊破之必矣十二月戊子車駕至京師己亥薛延陀遣使入見請與突厥和親甲辰李世勣敗薛延陀於諾真水初薛延陀擊西突厥沙鉢羅及阿史那社爾皆以歩戰取勝及將入冦乃大教歩戰使五人爲伍一人執馬四人前戰戰勝則授以馬追奔於是大度設將三萬騎逼長城欲擊突厥而思摩已走知不可得遣人登城罵之㑹李世勣引唐兵至塵埃漲天大度設懼將其衆自赤柯濼北走世勣選麾下及突厥精騎六千自直道邀之踰白道川追及於青山大度設走累日至諾真水勒兵還戰陳亘十里突厥先與之戰不勝還走大度設乘勝追之遇唐兵薛延陀萬矢俱發唐馬多死世勣命士卒皆下馬執長矟直前衝之薛延陀衆潰副揔管薛萬徹以數千騎收其執馬者薛延陀失馬不知所為唐兵縱擊斬首三千餘級捕虜五萬餘人大度設脱身走萬徹追之不及其衆至漠北值大雪人畜凍死者什八九李世勣還軍定襄突厥思結部居五臺者叛走州兵追之㑹世勣軍還夾擊悉誅之丙子薛延陀使者辭還上謂之曰吾約汝與突厥以大漠為界有相侵者我則討之汝自恃其彊踰漠攻突厥李世勣所將纔數千騎耳汝已狼狽如此歸語可汗凡舉措利害可善擇其宜上問魏徴比來朝臣何殊不論事對曰陛下虛心采納必有言者凡臣徇國者寡愛身者多彼畏罪故不言耳上曰然人臣闗説忤㫖動及刑誅與夫蹈湯火冐白刃者亦何異哉是以禹拜昌言良為此也房􅀇齡髙士亷遇少府少監竇徳素於路問北門近何營繕徳素奏之上怒讓􅀇齡等曰君但知南牙政事北門小營繕何預君事玄齡等拜謝魏徴進曰臣不知陛下何以責􅀇齡等而􅀇齡等亦何所謝􅀇齡等為陛下股肱耳目於中外事豈有不應知者使所營為是當助陛下成之為非當請陛下罷之問於有司理則宜然不知何罪而責亦何罪而謝也上甚愧之上嘗臨朝謂侍臣曰朕為人主常兼將相之事給事中張行成退而上書以為禹不矜伐而天下莫與之爭陛下撥亂反正羣臣誠不足望清光然不必臨朝言之以萬乘之尊乃與羣臣校功爭能臣竊為陛下不取上甚善之十六年春正月乙丑魏王泰上括地志泰好學司馬蘇朂説泰以古之賢王皆招士著書故泰奏請修之於是大開館舍廣延時俊人物輻湊門庭如市泰月給踰於太子諌議大夫褚遂良上疏以為聖人制禮尊嫡卑庶世子服物不㑹與王者共之庶子雖愛不得踰嫡所以塞嫌疑之漸除禍亂之源也若當親者疎當尊者卑則佞巧之姦乘機而動矣昔漢竇太后寵梁孝王卒以憂死宣帝寵淮陽憲王亦幾至於敗今魏王新出閤宜示以禮則訓以謙儉乃為良器此所謂聖人之教不肅而成者也上從之上又令泰徙居武徳殿魏徴上䟽以為陛下愛魏王常欲使之安全宜毎抑其驕奢不處嫌疑之地今移居此殿乃在東宫之西海陵昔嘗居之時人不以為可雖時異事異然亦恐魏王之心不敢安息也上曰㡬致此誤遽遣泰歸第辛未徙死罪者實西州其犯流徒則充戍各以罪輕重為年限敕天下括浮遊無籍者限來年末附畢以兼中書侍郎岑文本為中書侍郎專知機宻夏四月壬子上謂諌議大夫褚遂良曰卿猶知起居注所書可得觀乎對曰史官書人君言動備記善惡庶幾人君不敢為非未聞自取而觀之也上曰朕有不善卿亦記之邪對曰臣職當載筆不敢不記黄門侍郎劉洎曰借使遂良不記天下亦皆記之上曰誠然六月庚寅詔息隱王可追復皇太子海陵刺王元吉追封巢王謚並依舊甲辰詔自今皇太子出用庫物所司勿為限制於是太子發取無度左庶子張􅀇素上書以為周武帝平定山東隋文帝混一江南勤儉愛民皆為令主有子不肖卒亡宗祀聖上以殿下親則父子事兼家國所應用物不為節限恩㫖未踰六旬用物已過七萬驕奢之極孰云過此况宫臣正士未嘗在側羣邪淫巧昵近深宫在外瞻仰已有此失居中隐宻寧可勝計苦藥利病苦言利行伏惟居安思危日慎一日太子惡其書令户奴伺􅀇素早朝宻以大馬箠擊之㡬斃秋七月戊子以長孫無忌為司徒房􅀇齡為司空庚申制自今有自傷殘者據法加罪仍從賦役隋末賦役重數人徃徃自折支體謂之褔手褔足至是遺風猶存故禁之特進魏徴有疾上手詔問之且言不見數日朕過多矣今欲自徃恐益為勞若有聞見可封狀進來徴上言比者弟子陵師奴婢忽主下多輕上皆有為而然漸不可長又言陛下臨朝常以至公為言退而行之未免私僻或畏人知横加威怒欲蓋彌彰竟有何益徴宅無堂上命輟小殿之材以構之五日而成仍賜以素屏風素褥几杖等以遂其所尚徴上表謝上手詔稱處卿至此蓋為黎元與國家豈為一人何事過謝八月丁酉上曰當今國家何事最急諌議大夫褚遂良曰今四方無虞唯太子諸王宜有定分最急上曰此言是也時太子承乾失徳魏王泰有寵羣臣日有疑議上聞而惡之謂侍臣曰方今羣臣忠直無踰魏徴我遣傳太子用絶天下之疑九月丁巳以魏徴為太子太師徴疾少愈詣朝堂表辭上手詔諭以周幽晉獻廢嫡立庶危國亡家漢髙袓㡬廢太子賴四皓然後安我今賴公即其義也知公疾病可臥䕶之徴乃受詔癸亥薛延陀真珠可汗遣其叔父沙鉢羅泥熟俟斤來請昬獻馬三千貂皮三萬八千馬腦鏡一癸酉以凉州都督郭孝恪行安西都䕶西州刺史髙昌舊民與鎮兵及謫徙者雜居西州孝恪推誠撫御咸得其歡心西突厥乙毗咄陸可汗既殺沙鉢羅葉䕶并其衆又擊吐火羅滅之自恃彊大遂驕倨拘留唐使者侵暴西域遣兵㓂伊州郭孝恪將輕騎二千自烏骨邀擊敗之乙毗咄陸又遣處月處宻二部圍天山孝恪擊走之乘勝進㧞處月俟斤所居城追奔至遏索山降處宻之衆而歸初髙昌既平歲發兵千餘人戍守其地褚遂良上䟽以爲聖王爲治先華夏而後夷狄陛下興兵取髙昌數郡蕭然累年不復歲調千餘人屯戍逺去鄉里破産辦裝又謫徙罪人皆無賴子弟適足騷擾邊鄙豈能有益行陳所遣多復逃亡徒煩追捕加以道塗所經沙磧千里冬風如割夏風如焚行人徃來遇之多死設使張掖酒泉有烽燧之警陛下豈得髙昌一夫斗粟之用終當發隴右諸州兵食以赴之耳然則河西者中國之心腹髙昌者它人之手足奈何糜弊本根以事無用之土乎且陛下得突厥吐谷渾皆不有其地為之立君長以撫之髙昌獨不得與為比乎叛而執之服而封之刑莫威焉徳莫厚焉願更擇髙昌子弟可立者使君其國子子孫孫負荷大恩永為唐室藩輔内安外寧不亦善乎上弗聼及西突厥入㓂上悔之曰魏徴褚遂良勸我復立髙昌吾不用其言今方自咎耳乙毗咄陸西擊康居道過米國破之虜獲甚多不分與其下其將泥孰啜輙奪取之乙毗咄陸怒斬泥孰啜以徇衆皆憤怨泥孰啜部將胡禄屋襲擊之乙毗咄陸衆散走保白水胡城於是弩失畢諸部及乙毗咄陸所部屋利啜等遣使詣闕請廢乙毗咄陸更立可汗上遣使齎璽書立莫賀咄之子為乙毗射匱可汗乙毗射匱既立悉禮遣乙毗咄陸所留唐使者帥諸部擊乙毗咄陸於白水胡城乙毗咄陸出兵擊之乙毗射匱大敗乙毗咄陸遣使招其故部落故部落皆曰使我千人戰死一人獨存亦不汝從乙毗咄陸自知不為衆所附乃西奔吐火羅冬十月丙申殿中監郢縱公宇文士及卒上嘗止樹下愛之士及從而譽之不已上正色曰魏徴常勸我逺佞人我不知佞人為誰意疑是汝今果不謬士及叩頭謝上謂侍臣曰薛延陀屈强漠北今御之止有二䇿茍非發兵殄滅之則與之婚姻以撫之耳二者何從房􅀇齡對曰中國新定兵凶戰危臣以為和親便上曰然朕為民父母茍可利之何愛一女先是左領軍將軍契苾何力母姑臧夫人及弟賀蘭州都督沙門皆在凉州上遣何力歸覲且撫其部落時薛延陀方彊契苾部落皆欲歸之何力大驚曰主上厚恩如是奈何遽為叛逆其徒曰夫人都督先已詣彼若之何不徃何力曰沙門孝於親我忠於君必不汝從其徒執之詣薛延陀置真珠牙帳前何力箕倨㧞佩刀東向大呼曰豈有唐烈士而受屈虜庭天地日月願知我心因割左耳以誓真珠欲殺之其妻諌而止上聞契苾叛曰必非何力之意左右曰戎狄氣類相親何力入薛延陀猶魚趨水耳上曰不然何力心如鐡石必不叛我㑹有使者自薛延陀來具言其狀上為之下泣謂左右曰何力果如何即命兵部侍郎崔敦禮持節薛延陀以新興公主妻之以求何力何力由是得還拜右驍衛大將軍十一月丙辰上校獵於武功丁巳營州都督張儉奏髙麗東部大人泉蓋蘇文弑其王武蓋蘇文凶􅁀多不法其王及大臣議誅之蓋蘇文宻知之悉集部兵若校閲者并盛陳酒饌於城南召諸大臣共臨視勒兵盡殺之死者百餘人因馳入宫手弑其王斷為數叚棄溝中立王弟子藏為王自為莫離支其官如中國吏部兼兵部尚書也於是號令逺近專制國事蓋蘇文狀貌雄偉意氣豪逸身佩五刀左右莫敢仰視毎上下馬常令貴人武將伏地而履之出行必整隊伍前導者長呼則人皆奔迸不避阬谷路絶行者國人甚苦之壬戍上校獵于岐陽因幸慶善宫召武功故老宴賜極歡而罷庚午還京師壬申上曰朕為兆民之主皆欲使之富貴若教以禮義使之少敬長婦敬夫則皆貴矣輕徭薄歛使之各治生業則皆富矣若家給人足朕雖不聼管􅃶樂在其中矣亳州刺史裴思荘奏請伐髙麗上曰髙麗王武職貢不絶爲賊臣所弑朕哀之甚深固不忘也但因䘮乘亂而取之雖得之不貴且山東彫弊吾未忍言用兵也髙袓之入闗也隋武勇郎将馮翊党仁弘將兵二千餘人歸髙袓於蒲反從平京城尋除陜州揔管大軍東討仁弘轉餉不絶歷南寧戎廣州都督仁弘有才略所至著聲迹上甚器之然性貪罷廣州爲人所訟贓百餘萬罪當死上謂侍臣曰吾昨見大理五奏誅仁弘哀其白首就戮方晡食遂命撤案然爲之求生理終不可得今欲曲法就公等乞之十二月壬午朔上復召五品已上集太極殿前謂曰法者人君所受於天不可以私而失信今朕私党仁弘而欲赦之是亂其法上負於天欲席藁於南郊日一進蔬食以謝罪於天三日房􅀇齡等皆曰生殺之柄人主所得專也何至自貶責如此上不許羣臣頓首固請於庭自旦至日昊上乃降手詔自稱朕有三罪知人不明一也以私亂法二也善善未賞惡惡未誅三也以公等固諌且依來請於是黜仁􅀪為庶人徙欽州癸卯上幸驪山温湯甲辰獵于驪山上登山見圍有斷處顧謂左右曰吾見其不整而不刑則墮軍法刑之則是吾登髙臨下以求人之過也乃託以道險引轡入谷以避之乙巳還宫刑部以反逆縁坐律兄弟沒官為輕請改從死敕八座議之議者皆以為秦漢魏晉之法反者皆夷三族今宜如刑部請為是給事中崔仁師駁曰古者父子兄弟罪不相及奈何以亡秦酷法變隆周中典且誅其父子足累其心此而不顧何愛兄弟上從之上問侍臣曰自古或君亂而臣治或君治而臣亂二者孰愈魏徴對曰君治則善惡賞罰當臣安得而亂之茍為不治縱暴愎諌雖有良臣將安所施上曰齊文宣得楊遵彦非君亂而臣治乎對曰彼纔能救亡耳烏足為治哉十七年春正月丙寅上謂羣臣曰聞外間士人以太子有足疾魏王頴悟多從遊幸遽生異議徼幸之徒已有附㑹者太子雖病足不廢歩履且禮嫡子死立嫡孫太子男已五歲朕終不以孽代宗啟窺窬之源也鄭文貞公魏徴寝疾上遣使者問訊賜以藥餌相望於道又遣中郎將李安儼宿其第動静以聞上復與太子同至其第指衡山公主欲以妻其子叔玉戊辰徴薨命百官九品以上皆赴䘮給羽葆鼓吹陪葬昭陵其妻裴氏曰徴平生儉素今葬以一品羽儀非亡者之志悉辭不受以布車載柩而葬上登苑西樓望哭盡哀上自製碑文并為書石上思徴不已謂侍臣曰人以銅為鏡可以正衣冠以古為鏡可以見興替以人為鏡可以知得失魏徴沒朕亡一鏡矣鄠尉游文芝告代州都督劉蘭成謀反戊申蘭成坐腰斬右武候將軍丘行恭探蘭成心肝食之上聞而讓之曰蘭成謀反國有常刑何至如是若以為忠孝則太子諸王先食之矣豈至卿邪行恭慙而拜謝二月壬午上問諌議大夫褚遂良曰舜造漆器諌者十餘人此何足諌對曰奢侈者危亡之本漆器不已將以金玉為之忠臣愛君必防其漸若禍亂已成無所復諌矣上曰然朕有過卿亦當諌其漸朕見前世帝王拒諌者多云業已為之或云業已許之終不為改如此欲无危亡得乎時皇子為都督刺史者多㓜稺遂良上䟽以為漢宣帝云與我共治天下者其惟良二千石乎今皇子㓜稚未知從政不若且留京師教以經術俟其長而遣之上以為然壬辰以太子詹事張亮為洛州都督侯君集自以有功而下吏怨望有異志亮出為洛州君集激之曰何人相排亮曰非公而誰君集曰我平一國來逢嗔如屋大安能仰排因攘袂曰鬱鬱殊不聊生公能反乎與公反亮宻以聞上曰卿與君集皆功臣語時旁无它人若下吏君集必不服如此事未可知卿且勿言待君集如故鄜州都督尉遲敬徳表乞骸骨乙巳以敬徳為開府儀同三司五日一參丁未上曰人主惟有一心而攻之者甚衆或以勇力或以辯口或以諂諛或以姦詐或以嗜欲輻湊攻之各求自售以取寵禄人主少懈而受其一則危亡隨之此其所以難也戊申上命圖畵功臣趙公長孫无忌趙郡元王孝恭萊成公杜如晦鄭文貞公魏徴梁公房􅀇齡申公髙士亷鄂公尉遲敬徳衛公李靖宋公蕭瑀褒忠壮公叚志􅀇䕫公劉􅀪基蔣忠公屈突通鄖節公殷開山譙襄公柴紹邳襄公長孫順徳鄖公張亮陳公侯君集郯襄公張公謹盧公程知節永興文懿公虞世南渝襄公劉政㑹莒公唐儉英公李世勣胡壯公秦叔寳等於凌煙閣齊州都督齊王祐性輕躁其舅尚乘直長隂􅀪智説之曰王兄弟既多陛下千秋萬歲後宜得壯士以自衛祐以為然􅀪智因薦妻兄燕􅀪信祐恱之厚賜金玉使隂募死士上選剛直之士以輔諸王為長史司馬諸王有過以聞祐昵近羣小好畋獵長史權萬紀驟諌不聴壯士昝君謩梁猛彪得幸於祐萬紀皆劾逐之祐濳召還寵之逾厚上數以書切責祐萬紀恐并獲罪謂祐曰王審能自新萬紀請入朝言之乃條祐過失迫令表首祐懼而從之萬紀至京師言祐必能悛改上甚喜勉萬紀而數祐前過以敕書戒之祐聞之大怒曰長史賣我勸我而自以爲功必殺之上以校尉京兆韋文振謹直用爲祐府典軍文振數諌祐亦惡之萬紀性褊專以刻急拘持祐城門外不聽出悉解縱鷹犬斥君謩猛彪不得見祐㑹萬紀宅中有塊夜落萬紀以為君謩猛彪謀殺已悉收繫發驛以聞并劾與祐同爲非者數十人上遣刑部尚書劉徳威徃按之事頗有驗詔祐與萬紀俱入朝祐既積忿遂與燕􅀪信兄􅀪亮等謀殺萬紀萬紀奉詔先行祐遣􅀪亮等二十餘騎追射殺之祐黨共逼韋文振欲與同謀文振不從馳走數里追及殺之寮屬股慄稽首伏地莫敢仰視祐因私署上柱國開府等官開庫物行賞驅民入城繕甲兵樓堞置拓東王拓西王等官吏民棄妻子夜縋出亡者相繼祐不能禁三月丙辰詔兵部尚書李世勣等發懐洛汴宋潞滑濟鄆海九州兵討之上賜祐手敕曰吾常戒汝勿近小人正為此耳祐召燕􅀪亮等五人宿於臥内餘黨分統士衆廵城自守祐毎夜與􅀪亮等對妃宴飲以為得志戲笑之際語及官軍􅀪亮等曰王不須憂􅀪亮等右手持酒巵左手為王揮刀拂之祐喜以為信然傳檄諸縣皆莫肯從事李世勣兵未至而青淄等數州兵已集其境齊府兵曹杜行敏等隂謀執祐祐左右及吏民非同謀者無不響應庚申夜四面鼓譟聲聞數十里祐黨有居外者衆皆攢刃殺之祐問何聲左右紿云英公統飛騎已登城矣行敏分兵鑿垣而入祐與􅀪亮等被甲執兵入室閉扉拒戰行敏等千餘人圍之自旦至日中不克行敏謂祐曰王昔為帝子今乃國賊不速降立為煨燼矣因命積薪欲焚之祐自牖間謂行敏曰即啟扉獨慮燕􅀪亮兄弟死耳行敏曰必相全祐等乃出或抉􅀪亮目投睛於地餘皆撾折其股而殺之執祐出牙前示吏民還鏁之於東廂齊州悉平乙丑敕李世勣等罷兵祐至京師賜死於内侍省同黨誅者四十四人餘皆不問祐之初反也齊州人羅石頭面數其罪援槍前欲刺之為燕􅀪亮所殺祐引騎擊髙村村人髙君狀遥責祐曰主上提三尺劒取天下億兆蒙徳仰之如天王忽驅城中數百人欲為逆亂以犯君父無異一手揺泰山何不自量之甚也祐縱擊虜之慙不能殺敕贈石頭亳州刺史以君狀為榆社令以杜行敏為巴州刺史封南陽郡公其同謀執祐者官賞有差上檢祐家文䟽得記室郟城孫處約諌書嗟賞之累遷中書舍人庚午贈權萬紀齊州都督賜爵武都郡公謚曰敬韋文振左武衛將軍賜爵襄陽縣公初太子承乾喜聲色及畋獵所為奢靡畏上知之對宫臣常論忠孝或至於涕泣退歸宫中則與羣小相䙝狎宫臣有欲諌者太子先揣知其意輙迎拜歛容危坐引咎自責言辭辯給宫臣拜答不暇宫省袐宻外人莫知故時論初皆稱賢太子作八尺銅鑪六隔大鼎募亡奴盗民間馬牛親臨烹煑與所幸厮役共食之又好效突厥語及其服飾選左右貌類突厥者五人為一落辮髪羊裘而牧羊作五狼頭纛及幡旗設穹廬太子自處其中歛羊而烹之抽佩刀割肉相啗又嘗謂左右曰我試作可汗死汝曹效其䘮儀因僵臥於地衆悉號哭跨馬環走臨其身􅋇面良乆太子欻起曰一朝有天下當帥數萬騎獵於金城西然後解髪為突厥委身思摩若當一設不居人後矣左庶子于志寧右庶子孔頴逹數諌太子上嘉之賜二人金帛以風勵太子仍遷志寧為詹事志寧與左庶子張􅀇素數上書切諌太子隂使人殺之不果漢王元昌所為多不法上數譴責之由是怨望太子與之親善朝夕同遊戲分左右為二隊太子與元昌各統其一被氊甲操竹矟布陳大呼交戰擊刺流血以為娛樂有不用命者􅀍樹撾之至有死者且曰使我今日作天子明日於苑中置萬人營與漢王分將觀其戰鬬豈不樂哉又曰我為天子極情縱􅁒有諌者輙殺之不過殺數百人衆自定矣魏王泰多藝能有寵於上見太子有足疾濳有奪嫡之志折節下士以求聲譽上命黄門侍郎韋挺攝泰府事後命工部尚書杜楚客代之二人俱為泰要結朝士楚客或懐金以賂權貴因説以魏王聰明宜為上嗣文武之臣各有附託濳為朋黨太子畏其逼遣人詐為泰府典籖上封事其中皆言泰罪惡敕捕之不獲太子私幸太常樂童稱心與同臥起道士秦英韋靈符挾左道得幸太子上聞之大怒悉收稱心等殺之連坐死者數人誚讓太子甚至太子意泰告之怨怒愈甚思念稱心不已於宫中構室立其像朝夕奠祭徘徊流涕又於苑中作冡私贈官樹碑上意浸不懌太子亦知之稱疾不朝謁者動渉數月隂養刺客紇干承基等及壯士百餘人謀殺魏王泰吏部尚書侯君集之壻賀蘭楚石為東宫千牛太子知君集怨望數令楚石引君集入東宫問以自安之術君集以太子暗劣􅁒乘釁圖之因勸之反舉手謂太子曰此好手當為殿下用之又曰魏王為上所愛恐殿下有庶人勇之禍若有敕召宜宻為之備太子大然之太子厚賂君集及左屯衛中郎將頓丘李安儼使詗上意動静相語安儼先事隱太子隱太子敗安儼為之力戰上以為忠故親任之使典宿衛安儼深自託於太子漢王元昌亦勸太子反且曰比見上側有羙人善彈琵琶事成願以垂賜太子許之洋州刺史開化公趙節慈景之子也母曰長廣公主駙馬都尉杜荷如晦之子也尚城陽公主皆為太子所親暱預其反謀凡同謀者皆割臂以帛拭血燒灰和酒飲之誓同生死濳謀引兵入西宫杜荷謂太子曰天文有變當速發以應之殿下但稱暴疾危篤主上必親臨視因茲可以得志太子聞齊王祐反於齊州謂紇干承基等曰我宫西牆去大内正可二十歩耳與卿為大事豈比齊王乎㑹治祐反事連承基承基坐繫大理獄當死資治通鑑卷第一百九十六
