body:
  text: 臣司馬光奉勑編集漢紀五十四雍攝提格凡三年起柔兆困敦盡著孝獻皇帝丁建安元年春正月癸酉大赦改元董承張楊欲以天子還雒陽楊奉李樂不欲由是諸將更相疑貳二月韓暹攻董承承奔野王韓暹屯聞喜胡才楊奉之塢鄉胡才欲攻韓暹上使人諭止之汝南潁川黄巾何儀等擁衆附袁術曹操擊破之張楊使董承先繕脩雒陽宫太僕趙岐為承説劉表使遣兵詣雒陽助脩宫室軍資委輸前後不絶夏五月丙寅帝遣使至楊奉李樂韓暹營求送至雒陽奉等從詔六月乙未車駕幸聞喜袁術攻劉備以争徐州備使司馬張飛守下邳自將拒術於盱眙淮陰相持經月更有勝負下邳相曹豹陶謙故將也與張飛相失飛殺之城中乖亂袁術與吕布書勸令襲下邳許助以軍糧布大喜引軍水陸東下備中郎將丹陽許耽開門迎之張飛敗走布虜備妻子及將吏家口備聞之引還比至下邳兵潰備収餘兵東取廣陵與􅀽術戰又敗屯於海西饑餓困踧吏士相食從事東海糜笁以家財助軍備請降於布布亦忿袁術運糧不繼乃召備復以為豫州刺史與并埶擊術使屯小沛布自稱徐州牧布將河内郝萌夜攻布布科頭􅃝衣走詣都督髙順營順即嚴兵入府討之萌敗走比明萌將曹性擊斬萌庚子楊奉韓暹奉帝東還張楊以糧迎道路秋七月甲子車駕至雒陽幸故中常侍趙忠宅丁丑大赦八月辛丑幸南宫楊安殿張楊以為已功故名其殿曰楊安楊謂諸將曰天子當與天下共之朝廷自有公卿大臣楊當出扞外難遂還野王楊奉亦出屯梁韓暹董承並留宿衛癸夘以安國將軍張楊為大司馬楊奉為車騎將軍韓暹為大將軍領司􅀠校尉皆假節鉞是時宫室燒盡百官披荆棘依墻壁閒州郡各擁彊兵委輸不至羣僚飢乏尚書郎以下自出採稆或飢死牆壁閒或為兵士所殺袁術以䜟言代漢者當塗髙自云名字應之又以袁氏出陳為舜後以黄代赤徳運之次遂有僭逆之謀聞孫堅得􅀓國璽拘堅妻而奪之及聞天子敗於曹陽乃會羣下議稱尊號衆莫敢對主簿閻象進曰昔周自后稷至于文王積徳累功參分天下有其二猶服事殷明公雖奕世克昌未若有周之盛漢室雖微未若殷紂之暴也術黙然術聘處士張範範不往使其弟承謝之術謂承曰孤以土地之廣士民之衆欲徼福齊桓擬迹髙祖何如承曰在徳不在彊夫用徳以同天下之欲雖由匹夫之資而興霸王之功不足為難若茍欲僭擬干時而動衆之所棄誰能興之術不悦孫䇿聞之與術書曰成湯討桀稱有夏多罪武王伐紂曰殷有重罰此二主者雖有聖徳假使時無失道之過無由逼而取也今主上非有惡於天下徒以㓜小脅於彊臣異於湯武之時也且董卓貪滛驕陵志無紀極至於廢主自興亦猶未也而天下同心疾之况效尤而甚焉者乎又聞㓜主明智聰敏有夙成之徳天下雖未被其恩咸歸心焉使君五世相承為漢宰輔榮寵之盛莫與為比宜效忠守節以報王室則旦奭之美率土所望也時人多惑圖緯之言妄牽非類之文茍以悦主為美不顧成敗之計古今所慎可不孰慮忠言逆耳駮議致憎茍有益於尊明無所敢辭術始自以為有淮南之衆料䇿必與己合及得其書愁沮發疾既不納其言䇿遂與之絶曹操在許謀迎天子衆以為山東未定韓暹楊奉負功恣睢未可卒制荀彧曰昔晉文公納周襄王而諸矦景從漢髙祖爲義帝縞素而天下歸心自天子蒙塵將軍首唱義兵徒以山東擾亂未遑逺赴今鑾駕旋軫東京榛蕪義士有存本之思兆民懐感舊之哀誠因此時奉主上以從人望大順也秉至公以服天下大畧也扶􅀪義以致英俊大徳也四方雖有逆節其何能為韓暹楊奉安足恤哉若不時定使豪傑生心後雖為慮亦無及矣操乃遣楊武中郎將曹洪將兵西迎天子董承等據險拒之洪不得進議郎董昭以楊奉兵馬最彊而少黨援作操書與奉曰吾與將軍聞名慕義便推赤心今將軍㧞萬乘之艱難反之舊都翼佐之功超世無疇何其休哉方今羣凶猾夏四海未寧神器至重事在維輔必湏衆賢以清王軌誠非一人所能獨建心腹四支實相恃賴一物不備則有闕焉將軍當為内主吾為外援今吾有糧將軍有兵有無相通足以相濟死生契闊相與共之奉得書喜悦語諸將軍曰兖州諸軍近在許耳有兵有糧國家所當依仰也遂共表操為鎮東將軍襲父爵費亭侯韓暹矜功專恣董承患之因濳召操操乃將兵詣雒陽既至奏韓暹張楊之罪暹懼誅單騎奔楊奉帝以暹楊有翼車駕之功詔一切勿問辛亥以曹操領司􅀠校尉録尚書事操於是誅尚書馮碩等三人討有罪也封衛將軍董承等十三人為列侯賞有功也贈射聲校尉沮儁為􅀪農太守矜死節也操引董昭並坐問曰今孤來此當施何計昭曰將軍興義兵以誅􅁀亂入朝天子輔翼王室此五伯之功也此下諸將人殊意異未必服從今留匡弼事埶不便惟有移駕幸許耳然朝廷播越新還舊京逺近跂望冀一朝獲安今復徙駕不厭衆心夫行非常之事乃有非常之功願將軍筭其多者操曰此􅀌本志也楊奉近在梁耳聞其兵精得無為􅀌累乎昭曰奉少黨援心相慿結鎮東費亭之事皆奉所定宜時遣使厚遺答謝以安其意説京都無糧欲車駕暫幸魯陽魯陽近許轉運稍易可無縣乏之憂奉為人勇而寡慮必不見疑比使往來足以定計奉何能為累操曰善即遣使詣奉庚申車駕出轘轅而東遂遷都許巳已幸曹操營以操為大將軍封武平侯始立宗廟社稷於許孫䇿將取會稽呉人嚴白虎等衆各萬餘人處處屯聚諸將欲先擊白虎等䇿曰白虎等羣盜非有大志此成禽耳遂引兵渡浙江會稽功曹虞翻説大守王朗曰䇿善用兵不如避之朗不從發兵拒䇿於固陵䇿數渡水戰不能克䇿叔父静說䇿曰朗負阻城守難可卒拔查瀆南去此數十里宜從彼據其内所謂攻其無備出其不意者也䇿從之夜多然火為疑兵分軍投查瀆道襲高遷屯朗大驚遣故丹陽大守周昕等帥兵逆戰䇿破昕等斬之朗遁走虞翻追隨營䕶朗浮海至東冶䇿追擊大破之朗乃詣䇿降䇿自領會稽太守復命虞翻為功曹待以交友之禮䇿好游獵翻諫曰明府喜輕出微行從官不暇嚴吏卒常苦之夫君人者不重則不威故白龍魚服困於豫且白虵自放劉季害之願少留意䇿曰君言是也然不能改九月司徒淳于嘉太尉楊彪司空張喜皆罷車駕之東遷也楊奉自梁欲邀之不及冬十月曹操征奉奉南犇袁術遂攻其梁屯㧞之詔書下袁紹責以地廣兵多而專自樹黨不聞勤王之師但擅相討伐紹上書深自陳愬戊辰以紹為太尉封鄴侯紹耻班在曹操下怒曰曹操當死數矣我輙救存之今乃挾天子以令我乎表辭不受操懼請以大將軍譲紹丙戍以操為司空行車騎將軍事操以荀彧為侍中守尚書令操問彧以䇿謀之士彧薦其從子蜀郡太守攸及潁川郭嘉操徴攸為尚書與語大悦曰公逹非常人也吾得與之計事天下當何憂哉以為軍師初郭嘉往見袁紹紹甚敬禮之居數十日謂紹謀臣辛評郭圖曰夫智者審於量主故百全而功名可立袁公徒欲效周公之下士而不知用人之機多端寡要好謀無決欲與共濟天下大難定覇王之業難矣吾將更舉而求主子盍去乎二人曰袁氏有恩徳於天下人多歸之且今最强去將何之嘉知其不寤不復言遂去之操召見與論天下事喜曰使孤成大業者必此人也嘉出亦喜曰真吾主也操表嘉為司空祭酒操以山陽滿寵為許令操從弟洪有賔客在許界數犯法寵収治之洪書報寵寵不聼洪以白操操召許主者寵知將欲原客乃速殺之操喜曰當事不當爾邪北海太守孔融負其髙氣志在靖難而才踈意廣訖無成功髙談清教盈溢官曹辭氣温雅可玩而誦論事考實難可悉行但能張磔網羅而目理甚踈造次能得人心乆乆亦不願附也其所任用好竒取異多剽輕小才至於尊事名儒鄭􅀇執子孫禮易其鄉名曰鄭公鄉及清儁之士左承祖劉義遜等皆備在座席而已不與論政事曰此民望不可失也黄巾來冦融戰敗走保都昌時袁曹公孫首尾相連融兵弱糧寡孤立一隅不與相通左承祖勸融宜自託彊國融不聼而殺之劉義遜棄去青州刺史袁譚攻融自春至夏戰士所餘裁數百人流矢交集而融猶隠几讀書談笑自若城夜陷乃犇東山妻子為譚所虜曹操與融有舊徴為將作大匠袁譚初至青州其土自河而西不過平原譚北排田楷東破孔融威惠甚著其後信任羣小肆志奢淫聲望遂衰中平以來天下亂離民棄農業諸軍並起率乏糧榖無終歳之計饑則宼略飽則棄餘瓦解流離無敵自破者不可勝數袁紹在河北軍人仰食桑椹袁術在江淮取給蒲蠃民多相食州里蕭條羽林監棗袛請建置屯田曹操從之以袛為屯田都尉以騎都尉任峻為典農中郎將募民屯田許下得穀百萬斛於是州郡例置田官所在積穀倉廪皆滿故操征伐四方無運糧之勞遂能兼并羣雄軍國之饒起於袛而成於峻袁術畏吕布為己害乃為子求婚布復許之術遣將紀靈等歩騎三萬攻劉備備求救於布諸將謂布曰將軍常欲殺劉備今可假手於術布曰不然術若破備則北連泰山諸將吾為在術圍中不得不救也便率歩騎千餘馳往赴之靈等聞布至皆歛兵而止布屯沛城西南遣鈴下請靈等靈等亦請布布往就之與備共飲食布謂靈等曰􅀇徳布弟也為諸君所困故來救之布性不喜合鬭喜解鬭耳乃令軍􅀱植㦸於營門布彎弓顧曰諸君觀布射㦸小支中者當各解兵不中可留决鬭布即一發正中㦸支靈等皆驚言將軍天威也明日復歡會然後各罷備合兵得萬餘人布惡之自出兵攻備備敗走歸曹操操厚遇之以為豫州牧或謂操日備有英雄之志今不早圖後必為患操以問郭嘉嘉曰有是然公起義兵為百姓除暴推誠杖信以招俊傑猶懼其未也今備有英雄名以窮歸已而害之是以害賢為名也如此則智士將自疑回心擇主公誰與定天下乎夫除一人之患以沮四海之望安危之機也不可不察操笑曰君得之矣遂益其兵給糧食使東至沛収散兵以圖吕布初僃在豫州舉陳郡袁渙為茂才渙為吕布所留布欲使渙作書罵辱僃渙不可再三彊之不許布大怒以兵脅渙曰為之則生不為則死渙顔色不變笑而應之曰渙聞唯徳可以辱人不聞以罵使彼固君子邪且不恥將軍之言彼誠小人邪將復將軍之意則辱在此不在於彼且渙他日之事劉將軍猶今日之事將軍也如一旦去此復罵將軍可乎布慙而止張濟自闗中引兵入荆州界攻穣城為流矢所中死荆州官屬皆賀劉表曰濟以窮來主人無禮至於交鋒此非牧意牧受弔不受賀也使人納其衆衆聞之喜皆歸心焉濟族子建忠將軍繡代領其衆屯宛初帝既出長安宣威將軍賈詡上還印綬往依叚煨于華隂詡素知名為煨軍所望煨禮奉甚備詡潜謀歸張繡或曰煨待君厚矣君去安之詡曰煨性多疑有忌詡意禮雖厚不可恃乆將為所圖我去必喜又望吾結大援於外必厚吾妻子繡無謀主亦願得詡則家與身必俱全矣詡遂往繡執子孫禮煨果善視其家詡説繡附於劉表繡從之詡往見表表以客禮待之詡曰表平世三公才也不見事變多疑無决無能為也劉表愛民養士從容自保境内無事關西兖豫學士歸之者以千數表乃起立學校講明經術命故雅樂郎河南杜䕫作雅樂樂備表欲庭觀之䕫曰今將軍號不為天子合樂而庭作之無乃不可乎表乃止平原禰衡少有才辯而尚氣剛傲孔融薦之於曹操衡罵辱操操怒謂融曰禰衡豎子孤殺之猶雀䑕耳顧此人素有虛名逺近將謂孤不能容之乃送與劉表表延禮以為上賔衡稱表之美盈口而好譏貶其左右於是左右因形而譖之曰衡稱將軍之仁西伯不過也唯以為不能斷終不濟者必由此也其言實指表短而非衡所言也表由是怒以江夏太守黄祖性急送衡與之祖亦善待焉後衡衆辱祖祖殺之二年春正月曹操討張繡軍于淯水繡舉衆降操納張濟之妻繡恨之又以金與繡驍將胡車兒繡聞而疑懼襲擊操軍殺操長子昂操中流矢敗走校尉典韋與繡力戰左右死傷略盡韋被數十創繡兵前搏之韋雙挾兩人擊殺之瞋目大罵而死操収散兵還住舞隂繡率騎來追操擊破之繡走還穰復與劉表合是時諸軍大亂平虜校尉泰山于禁獨整衆而還道逢青州兵劫掠人禁數其罪而擊之青州兵走詣操禁既至先立營壘不時謁操或謂禁青州兵已訴君矣宜促詣公辨之禁曰今賊在後追至無時不先為備何以待敵且公聰明譖訴何縁得行徐鑿塹安營訖乃入謁具陳其狀操悦謂禁曰淯水之難吾猶狼狽將軍在亂能整討暴堅壘有不可動之節雖古名將何以加之於是録禁前後功封益壽亭侯操引軍還許袁紹與操書辭語驕慢操謂荀彧郭嘉曰今將討不義而力不敵何如對曰劉項之不敵公所知也漢祖唯智勝項羽故羽雖彊終為所禽今紹有十敗公有十勝紹雖彊無能為也紹繁禮多儀公體任自然此道勝也紹以逆動公奉順以率天下此義勝也桓靈以来政失於寛紹以寛濟寛故不攝公紏之以猛而上下知制此治勝也紹外寛内忌用人而疑之所任唯親戚子弟公外易簡而内機明用人無疑唯才所宜不閒逺近此度勝也紹多謀少决失在後事公得䇿輙行應變無窮此謀勝也紹髙議揖讓以収名譽士之好言飾外者多歸之公以至心待人不爲虚美士之忠正逺見而有實者皆願爲用此德勝也紹見人飢寒恤念之形於顔色其所不見慮或不及公於目前小事時有所忽至於大事與四海接恩之所加皆過其望雖所不見慮無不周此仁勝也紹大臣爭權讒言惑亂公御下以道浸潤不行此明勝也紹是非不可知公所是進之以禮所不是正之以灋此文勝也紹好爲虚埶不知兵要公以少克衆用兵如神軍人恃之敵人畏之此武勝也操笑曰如卿所言孤何德以堪之嘉又曰紹方北擊公孫瓉可因其逺征東取吕布若紹爲寇布爲之援此深害也彧曰不先取吕布河北未易圖也操曰然吾所惑者又恐紹侵擾關中西亂羌胡南誘蜀漢是我獨以兖豫抗天下六分之五也為將奈何彧曰關中將帥以十數莫能相一唯韓遂馬騰最彊彼見山東方爭必各擁衆自保今若撫以恩徳遣使連和雖不能乆安比公安定山東足以不動侍中尚書僕射鍾繇有智謀若屬以西事公無憂矣操乃表繇以侍中守司隸校尉持節督關中諸軍特使不拘科制繇至長安移書騰遂等為陳禍福騰遂各遣子入侍袁術稱帝於壽春自稱仲家以九江太守為淮南尹置公卿百官郊祀天地沛相陳珪球弟子也少與術遊術以書召珪又劫質其子期必致珪珪荅書曰曹將軍興復典刑將撥平凶慝以為足下當戮力同心匡翼漢室而隂謀不軌以身試禍欲吾營私阿附有死不能也術欲以故兖州刺史金尚為太尉尚不許而逃去術殺之三月詔將作大匠孔融持節拜袁紹大將軍兼督冀青幽并四州夏五月蝗袁術遣使者韓􅅌以稱帝事告吕布因求迎婦布遣女隨之陳珪恐徐揚合從為難未已往説布曰曹公奉迎天子輔賛國政將軍宜與協同䇿謀共存大計今與袁術結昬必受不義之名將有累卵之危矣布亦怨術初不已受也女已在塗乃追還絶昬械送韓􅅌梟首許市陳珪欲使子登詣曹操布固不肯會詔以布為左將軍操復遺布手書深加尉納布大喜即遣登奉章謝恩并荅操書登見操因陳布勇而無謀輕於去就宜早圖之操曰布狼子野心誠難乆養非卿莫䆒其情偽即增珪秩中二千石拜登廣陵太守臨别操執登手曰東方之事便以相付令隂合部衆以為内應始布因登求徐州牧不得登還布怒㧞㦸斫几曰卿父勸吾協同曹操絶㛰公路今吾所求無獲而卿父子並顯重但為卿所賣耳登不為動容徐對之曰登見曹公言養將軍譬如養虎當飽其肉不飽則將噬人公曰不如卿言譬如養鷹飢即為用飽則颺去其言如此布意乃解袁術遣其大將張勲橋㽔等與韓暹楊奉連埶歩騎數萬趣下祁七道攻布布時有兵三千馬四百匹懼其不敵謂陳珪曰今致術軍卿之由也爲之奈何珪曰暹奉與術卒合之師耳謀無素定不能相維子登䇿之比於連雞埶不俱棲立可離也布用珪䇿與暹奉書曰二將軍親㧞大駕而布手殺董卓俱立功名今奈何與袁術同爲賊乎不如相與并力破術爲國除害且許悉以術軍資與之暹奉大喜即回計從布布進軍去勲營百歩暹奉兵同時叫呼並到勲營勲等散走布兵追擊斬其將十人首所殺傷墯水死者殆盡布因與暹奉合軍向壽春水陸並進到鍾離所過虜略還渡淮北留書辱術術自將歩騎五千􅀭兵淮上布騎皆於水北大咍笑之而還泰山賊帥臧覇襲琅邪相蕭建於莒破之覇得建資實許以賂布而未送布自往求之其督將高順諫曰將軍威名宣播逺近所畏何求不得而自行求賂萬一不克豈不損邪布不從既至莒霸等不測往意固守拒之無獲而還順為人清白有威嚴少言辭所將七百餘兵號令整齊每戰必克名陷陳營布後踈順以魏續有内外之親奪其兵以與續及當攻戰則復令順將順亦終無恨意布性决易所為無常順每諫曰將軍舉動不肯詳思忽有失得動輙言誤誤豈可數乎布知其忠而不能從曹操遣議郎王誧以詔書拜孫䇿為騎都尉襲爵烏程侯領會稽太守使與吕布及呉郡太守陳瑀共討袁術䇿欲得將軍號以自重誧便承制假䇿明漢將軍䇿治嚴行到錢唐瑀隂圖襲䇿濳結祖郎嚴白虎等使為内應䇿覺之遣其將吕範徐逸攻瑀於海西瑀敗單騎犇袁紹初陳王寵有勇善弩射黄巾賊起寵治兵自守國人畏之不敢離叛國相會稽駱俊素有威恩是時王侯無復租禄而數見虜奪或并日而食轉死溝壑而陳獨富彊鄰郡人多歸之有衆十餘萬及州郡兵起寵率衆屯陽夏自稱輔漢大將軍袁術求糧於陳駱俊拒絶之術忿恚遣客詐殺俊及寵陳由是破敗秋九月司空曹操東征袁術術聞操來棄軍走留其將橋㽔等於蘄陽以拒操操擊破㽔等皆斬之術走渡淮時天旱歳荒士民凍餒術由是遂衰操辟陳國何䕫為掾問以袁術何如對曰天之所助者順人之所助者信術無信順之實而望天人之助其可得乎操曰為國失賢則亡君不為術所用亡不亦宜乎操性嚴掾屬公事往往加杖䕫常蓄毒藥誓死無辱是以終不見及沛國許褚勇力絶人聚少年及宗族數千家堅壁以禦外冦淮汝陳梁閒皆畏憚之操徇淮汝褚以衆歸操操曰此吾樊噲也即日拜都尉引入宿衛諸從禇俠客皆以為虎士焉故太尉楊彪與袁術昏姻曹操惡之誣云欲圖廢立奏収下獄劾以大逆將作大匠孔融聞之不及朝服往見操曰楊公四世清徳海内所瞻周書父子兄弟罪不相及况以袁氏歸罪楊公乎操曰此國家之意融曰假使成王殺召公周公可得言不知邪操使許令滿寵按彪獄融與尚書令荀彧皆屬寵曰但當受辭勿加考掠寵一無所報考訊如灋數日求見操言之曰楊彪考訊無他辭語此人有名海内若罪不明白必大失民望竊為明公惜之操即日赦出彪初彧融聞寵考掠彪皆怒及因此得出乃更善寵彪見漢室衰微政在曹氏遂稱腳攣積十餘年不行由是得免於禍馬日磾喪至京師朝廷議欲加禮孔融曰日磾以上公之尊秉髦節之使而曲媚姦臣為所牽率王室大臣豈得以見脇為辭聖上哀矜舊臣未忍追案不宜加禮朝廷從之金尚䘮至京師詔百官弔祭拜其子瑋為郎中冬十一月曹操復攻張繡㧞湖陽禽劉表將鄧濟又攻舞陰下之韓暹楊奉在下邳冦掠徐楊閒軍飢餓辭吕布欲詣荆州布不聽奉知劉備與布有宿憾私與備相聞欲共擊布備陽許之奉引軍詣沛備請奉入城飲食未半於座上􅅞奉斬之暹失奉孤特與十餘騎歸并州為抒秋令張宣所殺胡才李樂留河東才為怨家所殺樂自病死郭汜為其將伍習所殺潁川杜襲趙儼繁欽避亂荆州劉表俱待以賓禮欽數見竒於表襲喻之曰吾所以與子俱來者徒欲全身以待時耳豈謂劉牧當為撥亂之主而規長者委身哉子若見能不已非吾徒也吾與子絶矣欽慨然曰請敬受命及曹操迎天子都許儼謂欽曰曹鎮東必能匡濟華夏吾知歸矣遂還詣操操以儼為朗陵長陽安都尉江夏李通妻伯父犯灋儼収治致之大辟時殺生之柄决於牧守通妻子號泣以請其命通曰方與曹公勠力義不以私廢公嘉儼執憲不阿與為親交三年春正月曹操還許三月將復擊張繡荀攸曰繡與劉表相恃為彊然繡以遊軍仰食於表表不能供也埶必乖離不如緩軍以待之可誘而致也若急之其埶必相救操不從圍繡於穰夏四月使謁者僕射裴茂詔關中諸將叚煨等討李傕夷其三族以煨為安南將軍封閺鄉矦初􅀽紹每得詔書患其有不便於己者欲移天子自近使説曹操以許下埤溼雒陽殘破宜徙都鄄城以就全實操拒之田豐説紹曰徙都之計既不克從宜早圖許奉迎天子動託詔書號令海内此筭之上者不爾終為人所禽雖悔無益也紹不從㑹紹亡卒詣操云田豐勸紹襲許操解穰圍而還張繡率衆追之五月劉表遣兵救繡屯於安衆守險以絶軍後操與荀彧書曰吾到安衆破繡必矣及到安衆操軍前後受敵操乃夜鑿險偽遁表繡悉軍來追操縱竒兵歩騎夾攻大破之它日彧問操前策賊必破何也操曰虜遏吾歸師而與吾死地吾是以知勝矣繡之追操也賈詡止之曰不可追也追必敗繡不聽進兵交戰大敗而還詡登城謂繡曰促更追之更戰必勝繡謝曰不用公言以至於此今已敗奈何復追詡曰兵埶有變促追之繡素信詡言遂收散卒更追合戰果以勝還乃問詡曰繡以精兵追退軍而公曰必敗以敗卒擊勝兵而公曰必克悉如公言何也詡曰此易知耳將軍雖善用兵非曹公敵也曹公軍新退必自斷後故知必敗曹公攻將軍既無失策力未盡而一朝引退必國内有故也已破將軍必輕軍速進留諸將斷後諸將雖勇非將軍敵故雖用敗兵而戰必勝也繡乃服吕布復與袁術通遣其中郎將高順及北地太守鴈門張遼攻劉備曹操遣將軍夏侯惇救之爲順等所敗秋九月順等破沛城虜備妻子備單身走曹操欲自擊布諸將皆曰劉表張繡在後而遠襲吕布其危必也荀攸曰表繡新破埶不敢動布驍猛又恃袁術若從横淮泗間豪傑必應之今乘其初叛衆心未一往可破也操曰善比行泰山屯帥臧覇孫觀吳敦尹禮昌狶等皆附於布操與劉備遇於梁進至彭城陳宫謂布宜逆擊之以逸擊勞無不克也布曰不如待其來攻蹙著泗水中冬十月操屠彭城廣陵太守陳登率郡兵為操先驅進至下邳布自將屢與操戰皆大敗還保城不敢出操遺布書為陳禍福布懼欲降陳宫曰曹操遠來埶不能乆將軍若以歩騎出屯於外宫將餘衆閉守於内若向將軍宫引兵而攻其背若但攻城則將軍救於外不過旬月操軍食盡擊之可破也布然之欲使宫與高順守城自將騎斷操糧道布妻謂布曰宫順素不和將軍一出宫順必不同心共城守也如有蹉跌將軍當於何自立乎且曹氏待公臺如赤子猶舍而歸我今將軍厚公臺不過曹氏而欲委全城捐妻子孤軍遠出若一旦有變妾豈得復為將軍妻哉布乃止濳遣其官屬許汜王楷求救於袁術術曰布不與我女理自當敗何為復來汜楷曰明上今不救布為自敗耳布破明上亦破也術乃嚴兵為布作聲援布恐術為女不至故不遣救兵以緜纒女身縳著馬上夜自送女出與操守兵相觸格射不得過復還河内太守張楊素與布善欲救之不能乃出兵東市遥為之埶十一月楊將楊醜殺楊以應操别將眭固復殺醜將其衆北合袁紹楊性仁和無威刑下人謀反發覺對之涕泣輙原不問故及於難操掘塹圍下邳積久士卒疲敝欲還荀攸郭嘉曰吕布勇而無謀今屢戰皆北鋭氣衰矣三軍以將為主主衰則軍無奮意陳宫有智而遲今及布氣之未復宫謀之未定急攻之布可㧞也乃引沂泗灌城月餘布益困廹臨城謂操軍士曰卿曹無相困我當自首於明公陳宫曰逆賊曹操何等明公今日降之若卵投石豈可得全也布將侯成亡其名馬已而復得之諸將合禮以賀成成分酒肉先入獻布布怒曰布禁酒而卿等醖釀為欲因酒共謀布邪成忿懼十二月癸酉成與諸將宋憲魏續等共執陳宫高順率其衆降布與麾下登白門樓兵圍之急布令左右取其首詣操左右不忍乃下降布見操曰今日已往天下定矣操曰何以言之布曰明公之所患不過於布今已服矣若令布將騎明公將歩天下不足定也顧謂劉僃曰玄德卿為坐上客我為降虜繩縛我急獨不可一言邪操笑曰􅅞虎不得不急乃命緩布縛劉僃曰不可明公不見吕布事丁建陽董太師乎操頷之布目僃曰大耳兒最叵信操謂陳宫曰公臺平生自謂智有餘今竟何如宮指布曰是子不用宫言以至於此若其見從亦未必為禽也操曰奈卿老母何宫曰宫聞以孝治天下者不害人之親老母存否在明公不在宫也操曰奈卿妻子何宫曰宫聞施仁政於天下者不絶人之祀妻子存否在明公不在宫也操未復言宫請就刑遂出不顧操為之泣涕并布順皆縊殺之傳首許市操召陳宫之母養之終其身嫁宫女撫視其家皆厚於初前尚書令陳紀紀子羣在布軍中操皆禮用而之張遼將其衆降拜中郎將臧覇自亡匿操募索得之使覇招吳敦尹禮孫觀等皆詣操降操乃分琅邪東海為城陽利城昌慮郡悉以覇等為守相初操在兖州以徐翕毛暉為將及兖州亂翕暉皆叛兖州既定翕暉亡命投覇操語劉備令覇送二首霸謂備曰霸所以能自立者以不爲此也霸受主公生全之恩不敢違命然王覇之君可以義告願將軍為之辭備以覇言白操操歎息謂覇曰此古人之事而君能行之孤之願也皆以翕暉為郡守陳登以功加伏波將軍劉表與袁紹深相結約治中鄧羲諌表表曰内不失貢職外不背盟主此天下之逹義也治中獨何怪乎羲乃辭疾而退長沙太守張羡性屈強表不禮焉郡人桓階説羡舉長沙零陵桂陽三郡以拒表遣使附於曹操羡從之孫䇿遣其正議校尉張紘獻方物曹操欲撫納之表䇿為討逆將軍封吳侯以弟女配䇿弟匡又為子彰取孫賁女禮辟䇿弟權翊以張紘為侍御史袁術以周瑜為居巢長以臨淮魯肅為東城長瑜肅知術終無所成皆棄官渡江從孫䇿策以瑜為建威中郎將肅因家於曲阿曹操表徴王朗策遣朗還操以朗為諌議大夫叅司空軍事袁術遣閒使齎印綬與丹陽宗帥祖郎等使激動山越共圖孫策劉繇之犇豫章也太史慈遁於蕪湖山中自稱丹陽太守䇿已定宣城以東惟涇以西六縣未服慈因進住涇縣大為山越所附於是䇿自將討祖郎於陵陽禽之䇿謂郎曰爾昔襲孤斫孤馬鞍今創軍立事除棄宿恨惟取能用與天下通耳非但汝汝勿恐怖郎叩頭謝罪即破械署門下賊曹又討太史慈於勇里禽之解􅅞捉其手曰寧識神亭時邪若卿爾時得我云何慈曰未可量也䇿大笑曰今日之事當與卿共之聞卿有烈義天下智士也但所託未得其人耳孤是卿知己勿憂不如意也即署門下督軍還祖郎太史慈俱在前導軍人以為榮會劉繇卒於豫章士衆萬餘人欲奉豫章太守華歆為主歆以為因時擅命非人臣所宜衆守之連月卒謝遣之其衆未有所附䇿命太史慈往撫安之謂慈曰劉牧往責吾為袁氏攻廬江吾先君兵數千人盡在公路許吾志在立事安得不屈意於公路以求之乎其後不遵臣節諌之不從丈夫義交茍有大故不得不離吾交求公路及絶之本末如此恨不及其生時與共論辨也今兒子在豫章卿往視之并宣孤意於其部曲部曲樂來者與俱來不樂來者且安慰之并觀華子魚所以牧御方規何如卿須幾兵多少隨意慈曰慈有不赦之罪將軍量同桓文當盡死以報德今並息兵兵不宜多將數十人足矣左右皆曰慈必北去不還策曰子義捨我當復從誰餞送昌門把腕别曰何時能還荅曰不過六十日慈行議者猶紛紜言遣之非計策曰諸君勿復言孤斷之詳矣太史子義雖氣勇有膽烈然非縱横之人其心秉道義重然諾一以意許知已死亡不相負諸君勿憂也慈果如期而反謂策曰華子魚良德也然無他方規自守而已又丹陽僮芝自擅廬陵番陽民帥别立宗部言我已别立郡海昏上繚不受發召子魚但覩視之而已策拊掌大笑遂有兼并之志袁紹連年攻公孫瓚不能克以書諭之欲相與釋憾連和瓚不答而増脩守備謂長史太原關靖曰當今四方虎爭無有能坐吾城下相守經年者明矣袁本初其若我何紹於是大興兵以攻瓚先是瓚别將有為敵所圍者瓚不救曰救一人使後將恃救不肯力戰及紹來攻瓚南界别營自度守則不能自固又知必不見救或降或潰紹軍徑至其門瓚遣子續請救於黑山諸帥而欲自將突騎出傍西山擁黑山之衆侵掠冀州横斷紹後關靖諫曰今將軍將士莫不懷瓦觧之心所以猶能相守者顧戀其居處老小而恃將軍為主故耳堅守曠日或可使紹自退若舍之而出後無鎮重易京之危可立待也瓚乃止紹漸相攻逼瓚衆日䠞資治通鑑卷第六十二
