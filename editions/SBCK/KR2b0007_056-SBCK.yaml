body:
  text: 十二月壬申復廮陶王悝為勃海王丁丑帝崩于德陽前殿戊寅尊皇后曰皇太后太后臨朝初竇后既立御見甚稀唯采女田聖等有寵后素忌忍帝梓宫尚在前殿遂殺田聖城門校尉竇武議立嗣召侍御史河間劉儵問以國中宗室之賢者鯈稱解瀆亭侯宏宏者河間孝王之曾孫也祖淑父萇世封解瀆亭矦武乃入白太后定策禁中以鯈守光祿大夫與中常侍曹節並持節將中黄門虎賁羽林千人奉迎宏時年十二孝靈皇帝上之上建寧元年春正月壬午以城門校尉竇武為大將軍前太尉陳蕃為太傅與武及司徒胡廣參録尚書事時新遭大喪國嗣未立諸尚書畏懼多託病不朝陳蕃移書責之曰古人立節事亡如存今帝祚未立政事日蹙諸君奈何委荼蓼之苦息偃在牀於義安乎諸尚書惶怖皆起視事己亥解瀆亭侯至夏門亭使竇武持節以王青蓋車迎入殿中庚子即皇帝位改元二月辛酉葬孝桓皇帝于宣陵廟曰威宗辛未赦天下初護羗校尉段熲既定西羗而東羗先零等種猶未服度遼將軍皇甫規中郎將張奐招之連年既降又叛桓帝詔問熲曰先零東羗造惡反逆而皇甫規張奐各擁强衆不時輯定欲令熲移兵東討未識其宜可參思術畧熲上言曰臣伏見先零東羗雖數叛逆而降於皇甫規者已二萬許落善惡既分餘寇無幾今張奐躊躇久不進者當慮外離内合兵往必驚且自冬踐春屯結不散人畜疲羸有自亡之埶欲更招降坐制强敵耳臣以為狼子野心難以恩納埶窮雖服兵去復動唯當長矛挾脅白刃加頸耳計東種所餘三萬餘落近居塞内路無險所非有燕齊秦趙從横之埶而久亂并凉累侵三輔西河上郡已各内徙安定北地復至單危自雲中五原西至漢陽二千餘里匈奴諸羌並擅其地是為癰疽伏疾留滯脇下如不加誅轉就滋大若以騎五千步萬人車三千兩三冬二夏足以破定無慮用費為錢五十四億如此則可令羣羌破盡匈奴長服内徙郡縣得反本土伏計永初中諸羌反叛十有四年用二百四十億永和之末復經七年用八十餘億費耗若此猶不誅盡餘孽復起于兹作害今不暫疲民則永寧無期臣庶竭駑劣伏待節度帝許之悉聽如所上熲於是將兵萬餘人齎十五日糧從彭陽直指髙平與先零諸種戰於逢義山虜兵盛熲衆皆恐熲乃令軍中長鏃利刅長矛三重挾以强弩列輕騎為左右翼謂將士曰今去家數千里進則事成走必盡死努力共功名因大呼衆皆應聲騰赴馳騎於傍突而擊之虜衆大潰斬首八千餘級太后賜詔書褒美曰須東羗盡定當并録功勤今且賜熲錢二十萬以家一人為郎中敇中藏府調金錢綵物增助軍費拜熲破羗將軍閏月甲午追尊皇祖為孝元皇夫人夏氏為孝元后考為孝仁皇尊帝母董氏為慎園貴人夏四月戊辰太尉周景薨司空宣酆免以長樂衞尉王暢爲司空五月丁未朔日有食之以太中太夫劉矩為太尉六月京師大水癸巳録定策功封竇武為聞喜侯武子機為渭陽侯兄子紹為鄠侯靖為西鄉侯中常侍曹節為長安鄉侯侯者凡十一人涿郡盧植上書説武曰足下之於漢朝猶旦奭之在周室建立聖主四海有繫論者以為吾子之功於斯為重今同宗相後披圖案牒以次建之何勲之有豈可横叨天功以為已力乎宜辭大賞以全身名武不能用植身長八尺二寸音聲如鍾性剛毅有大節少事馬融融性豪侈多列女倡歌舞於前植侍講積年未嘗轉眄融以是敬之太后以陳蕃舊德特封髙陽鄉侯蕃上疏讓曰臣聞割地之封功德是為臣雖無素潔之行竊慕君子不以其道得之不居也若受爵不讓掩面就之使皇天振怒災流下民於臣之身亦何所寄太后不許蕃固讓章前後十上竟不受封段熲將輕兵追羌出橋門晨夜兼行與戰於奢延澤落川令鮮水上連破之又戰於靈武谷羌遂大敗秋七月熲至涇陽餘冦四千落悉散入漢陽山谷間䕶匈奴中郎將張奐上言東羌雖破餘種難盡段熲性輕果慮負敗難常宜且以恩降可無後悔詔書下熲熲復上言臣本知東羌雖衆而輭弱易制所以比陳愚慮思為永寧之筭而中郎將張奐説虜强難破宜用招降聖朝明監信納瞽言故臣謀得行奐計不用事埶相反遂懷猜恨信叛羌之訴飾潤辭意云臣兵累見折衂又言羌一氣所生不可誅盡山谷廣大不可空靜血流汙野傷和致災臣伏念周秦之際戎狄為害中興以來羌冦最盛誅之不盡雖降復叛今先零雜種累以反覆攻没縣邑剽略人物發冢露尸禍及生死上天震怒假手行誅昔邢爲無道衛國伐之師興而雨臣動兵涉夏連獲甘澍歲時豐稔人無疵疫上占天心不為災傷下察人事衆和師克自橋門以西落川以東故宫縣邑更相通屬非爲深險絕域之地車騎安行無應折衂案奐為漢吏身當武職駐軍二年不能平冦虛欲修文戢戈招降獷敵誕辭空説僭而無徵何以言之昔先零作冦趙充國徙令居内煎當亂邊馬援遷之三輔始服終叛至今爲鯁故逺識之士以爲深憂今傍郡户口單少數爲羌所創毒而欲令降徒與之雜居是猶種枳棘於良田養虺蛇於室内也故臣奉大漢之威建長久之策欲絶其本根不使能殖本規三歲之費用五十四億今適朞年所秏未半而餘寇殘燼將向殄滅臣每奉詔書軍不内御願卒斯言一以任臣臨時量宜不失權便八月司空王暢免宗正劉寵為司空初竇太后之立也陳蕃有力焉及臨朝政無大小皆委於蕃蕃與竇武同心戮力以奬王室徵天下名賢李膺杜密尹勲劉瑜等皆列於朝廷與共參政事於是天下之士莫不延頸想望太平而帝乳母趙嬈及諸女尚書旦夕在太后側中常侍曹節王甫等共相朋結諂事太后太后信之數出詔命有所封拜蕃武疾之嘗共㑹朝堂蕃私謂武曰曹節王甫等自先帝時操弄國權濁亂海内今不誅之後必難圖武深然之蕃大喜以手推席而起武於是引同志尚書令尹勲等共定計策㑹有日食之變蕃謂武曰昔蕭望之困一石顯况今石顯數十輩乎蕃以八十之年欲為將軍除害今可因日食斥罷宦官以塞天變武乃白太后曰故事黄門常侍但當給事省内門户主近署財物耳今乃使與政事任重權子弟布列專為貪暴天下匈匈正以此故宜悉誅廢以清朝廷太后曰漢元以來故事世有宦官但當誅其有罪者豈可盡廢邪時中常侍管霸頗有才畧專制省内武先白收霸及中常侍蘇康等皆坐死武復數白誅曹節等太后冘豫未忍故事久不發蕃上疏曰今京師嚻嚻道路諠譁言侯覽曹節公乘昕王甫鄭颯等與趙夫人諸尚書並亂天下附從者升進忤逆者中傷一朝羣臣如河中木耳汎汎東西耽禄畏害陛下今不急誅此曹必生變亂傾危社稷其禍難量願出臣章宣示左右并令天下諸姦知臣疾之太后不納是月太白犯房之上將入太微侍中劉瑜素善天官惡之上書皇太后曰案占書宫門當閉將相不利姦人在主傍願急防之又與武蕃書以星辰錯繆不利大臣宜速斷大計於是武蕃以朱㝢為司􅀠校尉劉祐為河南尹虞祁為雒陽令武奏免黄門令魏彪以所親小黄門山氷代之使氷奏收長樂尚書鄭颯送北寺獄蕃謂武曰此曹子便當收殺何復考為武不從令氷與尹勲侍御史祝瑨雜考颯辭連及曹節王甫勲氷即奏收節等使劉瑜内奏九月辛亥武出宿歸府典中書者先以告長樂五官史朱瑀瑀盜發武奏罵曰中官放縱者自可誅耳我曹何罪而當盡見族滅因大呼曰陳蕃竇武奏白太后廢帝為大逆乃夜召素所親壯健者長樂從官史共普張亮等十七人喢血共盟謀誅武等曹節白帝曰外間切切請出御德陽前殿令帝拔劔踊躍使乳母趙嬈等擁衛左右取棨信閉諸禁門召尚書官屬脅以白刄使作詔板拜王甫為黄門令持節至北寺獄收尹勲山氷氷疑不受詔甫格殺之并殺勲出鄭颯還兵劫太后奪璽綬令中謁者守南官閉門絶複道使鄭颯等持節及侍御史謁者捕收武等武不受詔馳入步兵營與其兄子步兵校尉紹共射殺使者召㑹北軍五校士數千人屯都亭下令軍士曰黄門常侍反盡力者封侯重賞陳蕃聞難將官屬諸生八十餘人並拔刄突入承明門到尚書門攘臂呼曰大將軍忠以衛國黄門反逆何云竇氏不道邪王甫時出與蕃相遇適聞其言而讓蕃曰先帝新棄天下山陵未成武有何功兄弟父子並封三矦又設樂飲讌多取掖庭宫人旬日之閒貲財巨萬大臣若此為是道邪公為宰輔茍相阿黨復何求賊使劔士收蕃蕃拔劔叱甫辭色逾厲遂執蕃送北寺獄黄門從官騶蹋踧蕃曰死老魅復能損我曹員數奪我曹稟假不即日殺之時護匈奴中郎將張奐徵還京師曹節等以奐新至不知本謀矯制以少府周靖行車騎將軍加節與奐率五營士討武夜漏盡王甫將虎賁羽林等合千餘人出屯朱雀掖門與奐等合已而悉軍闕下與武對陳甫兵漸盛使其士大呼武軍曰竇武反汝皆禁兵當宿衛宫省何故隨反者乎先降有賞營府素畏服中官於是武軍稍稍歸甫自旦至食時兵降畧盡武紹走諸軍追圍之皆自殺梟首雒陽都亭收捕宗親賔客姻屬悉誅之及侍中劉瑜屯騎校尉馮述皆夷其族宦官又譖虎賁中郎將河間劉淑故尚書㑹稽魏朗云與武等通謀皆自殺遷皇太后於南宫徙武家屬於日南自公卿以下嘗爲蕃武所舉者及門生故吏皆免官禁錮議郎勃海巴肅始與武等同謀曹節等不知但坐禁錮後乃知而收之肅自載詣縣縣令見肅入閤解印綬欲與俱去肅曰爲人臣者有謀不敢隱有罪不逃刑既不隱其謀矣又敢逃其刑乎遂被誅曹節遷長樂衛尉封育陽侯王甫遷中常侍黄門令如故朱瑀共普張亮等六人皆爲列侯十一人爲闗内侯於是羣小得志士大夫皆喪氣蕃友人陳留朱震收葬蕃尸匿其子逸事覺繫獄合門桎捁震受考掠誓死不言逸由是得免武府掾桂陽胡騰殯歛武尸行喪坐以禁錮武孫輔年二歲騰詐以為已子與令史南陽張敞共匿之於零陵界中亦得免張奐遷大司農以功封侯奐深病為曹節等所賣固辭不受以司徒胡廣為太傅録尚書事司空劉寵為司徒大鴻臚許栩為司空冬十月甲辰晦日有食之十一月太尉劉矩免以太僕沛國聞人襲為太尉十二月鮮卑及濊貊冦幽并二州是歲疏勒王季父和得殺其王自立烏桓大人上谷難樓有衆九千餘落遼西丘力居有衆五千餘落自稱王遼東蘇僕延有衆千餘落自稱峭王右北平烏延有衆八百餘落自稱汗魯王二年春正月丁丑赦天下帝迎董貴人於河閒三月乙巳尊爲孝仁皇后居永樂宫拜其兄寵爲執金吾兄子重為五官中郎將夏四月壬辰有青蛇見於御坐上癸巳大風雨雹霹靂拔大木百餘詔公卿以下各上封事大司農張奐上䟽曰昔周公葬不如禮天乃動威今竇武陳蕃忠貞未被明宥妖眚之來皆爲此也宜急為攺葬徙還家屬其從坐禁錮一切蠲除又皇太后雖居南宫而恩禮不接朝臣莫言逺近失望宜思大義顧復之報上深嘉奐言以問諸常侍左右皆惡之帝不得自從奐又與尚書劉猛等共薦王暢李膺可參三公之選曹節等彌疾其言遂下詔切責之奐等皆自囚廷尉數日乃得出並以三月俸贖罪郎中東郡謝弼上封事曰臣聞惟虺惟蛇女子之祥伏惟皇太后定策宫闥援立聖明書云父子兄弟罪不相及竇氏之誅豈宜咎延太后幽隔空宫愁感天心如有霧露之疾陛下當何面目以見天下孝和皇帝不絶竇氏之恩前世以為美談禮為人後者為之子今以桓帝為父豈得不以太后為母哉願陛下仰慕有虞蒸蒸之化俯思凱風慰母之念臣又聞開國承家小人勿用今功臣久外未䝉爵秩阿母寵私乃享大封大風雨雹亦由於兹又故太傅陳蕃勤身王室而見陷羣邪一旦誅滅其為酷濫駭動天下而門生故吏並離徙錮蕃身已往人百何贖宜還其家屬解除禁網夫台宰重器國命所繫今之四公唯司空劉寵斷斷守善餘皆素餐致冦之人必有折足覆餗之凶可因災異並加罷黜徵故司空王暢長樂少府李膺並居政事庶災變可消國祚惟永左右惡其言出爲廣陵府丞去官歸家曹節從子紹爲東郡太守以它罪收弼掠死於獄帝以蛇妖問光禄勲楊賜賜上封事曰夫善不妄來災不空發王者心有所想雖未形顔色而五星以之推移隂陽爲其變度夫皇極不建則有龍蛇之孽詩云惟虺惟蛇女子之祥惟陛下思乾剛之道别内外之宜抑皇甫之權割艶妻之愛則蛇變可消禎祥立應賜秉之子也五月太尉聞人襲司空許栩免六月以司徒劉寵爲太尉太常汝南許訓爲司徒太僕長沙劉囂為司空囂素附諸常侍故致位公輔詔遣謁者馮禪説降漢陽散羌段熲以春農百姓布野羌雖暫降而縣官無廩必當復為盜賊不如乘虛放兵埶必殄滅熲於是自進營去羌所屯凡亭山四五十里遣騎司馬田晏假司馬夏育將五千人先進擊破之羌衆潰東犇復聚射虎谷分兵守谷上下門熲規一舉滅之不欲復令散走秋七月熲遣千人於西縣結木為柵廣二十步長四十里􅃒之分遣晏育等將七千人銜枚夜上西山結營穿塹去虜一里許又遣司馬張愷等將三千人上東山虜乃覺之熲因與愷等夾東西山縱兵奮擊破之追至谷上下門窮山深谷之中處處破之斬其渠帥以下萬九千級馮禪等所招降四千人分置安定漢陽隴西三郡於是東羌悉平熲凡百八十戰斬三萬八千餘級獲雜畜四十二萬七千餘頭費用四十四億軍士死者四百餘人更封新豐縣侯邑萬户臣光曰書稱天地萬物父母惟人萬物之靈亶聰明作元后元后作民父母夫蠻夷戎狄氣類雖殊其就利避害樂生惡死亦與人同耳御之得其道則附順服從失其道則離叛侵擾固其宜也是以先王之政叛則討之服則懷之處之四裔不使亂禮義之邦而已若乃視之如草木禽獸不分臧否不辨去來悉艾殺之豈作民父母之意哉且夫羌之所以叛者為郡縣所侵寃故也叛而不即誅者將帥非其人故也茍使良將驅而出之塞外擇良吏而牧之則疆埸之臣也豈得專以多殺為快邪夫御之不得其道雖華夏之民亦將蠭起而為冦又可盡誅邪然則段紀明之為將雖克㨗有功君子所不與也九月江夏蠻反州郡討平之丹楊山越圍太守陳夤夤擊破之初李膺等雖廢錮天下士大夫皆髙尚其道而汙穢朝廷希之者唯恐不及更共相標榜為之稱號以竇武陳蕃劉淑為三君君者言一世之所宗也李膺荀翌杜密王暢劉祐魏朗趙典朱㝢為八俊俊者言人之英也郭泰范滂尹勲巴肅及南陽宗慈陳留夏馥汝南蔡衍泰山羊陟為八顧顧者言能以德行引人者也張儉翟超岑晊苑康及山陽劉表汝南陳翔魯國孔昱山陽檀敷為八及及者言其能導人追宗者也度尚及東平張邈王孝東郡劉儒泰山胡母班陳留秦周魯國蕃嚮東萊王章為八厨厨者言能以財救人者也及陳竇用事復舉拔膺等陳竇誅膺等復廢宦官疾惡膺等每下詔書輒申黨人之禁侯覽怨張險尤甚覽鄉人朱並素佞邪為儉所棄承覽意指上書告儉與同鄉二十四人别相署號共為部黨圖危社稷而儉為之魁詔刋章捕儉等冬十月大長秋曹節因此諷有司奏諸鉤黨者故司空虞放及李膺杜密朱㝢荀翌翟超劉儒范滂等請下州郡考治是時上年十四問節等曰何以為鉤黨對曰鉤黨者即黨人也上曰黨人何用為惡而欲誅之邪對曰皆相舉羣輩欲為不軌上曰不軌欲如何對曰欲圖社稷上乃可其奏或謂李膺曰可去矣對曰事不辭難罪不逃刑臣之節也吾年已六十死生有命去將安之乃詣詔獄考死門生故吏並被禁錮侍御史蜀郡景毅子顧為膺門徒未有録牒不及於譴毅慨然曰本謂膺賢遣子師之豈可以漏脱名籍茍安而已遂自表免歸汝南督郵吳導受詔捕范滂至征羌抱詔書閉傳舍伏牀而泣一縣不知所為滂聞之曰必為我也即自詣獄縣令郭揖大驚出解印綬引與俱亡曰天下大矣子何為在此滂曰滂死則禍塞何敢以罪累君又令老母流離乎其母就與之訣滂白母曰仲博孝敬足以供養滂從龍舒君歸黄泉存亡各得其所惟大人割不可忍之恩勿增感戚仲愽者滂弟也龍舒君者滂父龍舒侯相顯也母曰汝今得與李杜齊名死亦何恨既有令名復求夀考可兼得乎滂跪受教再拜而辭顧其子曰吾欲使汝爲惡惡不可為使汝為善則我不為惡行路聞之莫不流涕凡黨人死者百餘人妻子皆徙邊天下豪桀及儒學有行義者宦官一切指為黨人有怨隙者因相陷害睚眦之忿濫入黨中州郡承㫖或有未嘗交闗亦離禍毒其死徙廢禁者又六七百人郭泰聞黨人之死私為之慟曰詩云人之云亡邦國殄瘁漢室滅矣但未知瞻烏爰止于誰之屋耳泰雖好臧否人倫而不為危言覈論故能處濁世而怨禍不及焉張儉亡命困迫望門投止莫不重其名行破家相容後流轉東萊止李篤家外黄令毛欽操兵到門篤引欽就席曰張儉負罪亡命篤豈得藏之若審在此此人名士明廷寧宜執之乎欽因起撫篤曰蘧伯玉恥獨為君子足下如何專取仁義篤曰今欲分之明廷載半去矣欽歎息而去篤導儉經比海戲子然家遂入漁陽出塞其所經歴伏重誅者以十數連引收考者布徧天下宗親並皆殄滅郡縣為之殘破儉與魯國孔襃有舊亡抵襃不遇襃弟融年十六匿之後事泄儉得亡走國相收襃融送獄未知所坐融曰保納舍藏者融也當坐襃曰彼來求我非弟之過吏問其母母曰家事任長妾當其辜一門爭死郡縣疑不能决乃上讞之詔書竟坐襃及黨禁解儉乃還鄉里後爲衛尉卒年八十四夏馥聞張儉亡命歎曰孽自已作空汙良善一人逃死禍及萬家何以生爲乃自翦須變形入林慮山中隱姓名爲冶家傭親突煙炭形貌毁瘁積二三年人無知者馥弟靜載縑帛追求餉之馥不受曰弟奈何載禍相餉乎黨禁未解而卒初中常侍張讓父死歸葬潁川雖一郡畢至而名士無往者讓甚恥之陳寔獨弔焉及誅黨人讓以寔故多所全宥南陽何顒素與陳蕃李膺善亦被收捕乃變名姓匿汝南閒與袁紹為犇走之交常私入雒陽從紹計議為諸名士罹黨事者求救援設權計使得逃隱所全免甚衆初太尉袁湯三子成逢隗成生紹逢生術逢隗皆有名稱少歴顯官時中常侍袁赦以逢隗宰相家與之同姓推崇以為外援故袁氏貴寵於世富奢甚不與它公族同紹壯健有威容愛士養名賔客輻湊歸之輜軿柴轂填接街陌術亦以俠氣聞逢從兄子閎少有操行以耕學為業逢隗數餽之無所受閎見時方險亂而家門富盛常對兄弟歎曰吾先公福祚後世不能以德守之而競為驕奢與亂世爭權此即晉之三郤矣及黨事起閎欲投迹深林以母老不宜逺遁乃築土室四周於庭不為户自牖納飲食母思閎時往就視母去便自掩閉兄弟妻子莫得見也潛身十八年卒於土室初范滂等非訐朝政自公卿以下皆折節下之太學生爭慕其風以為文學將興處士復用申屠蟠獨歎曰昔戰國之世處士横議列國之王至為擁篲先驅卒有坑儒燒書之禍今之謂矣乃絶迹於梁碭之閒因樹為屋自同傭人居二年滂等果罹黨錮之禍唯蟠超然免於評論臣光曰天下有道君子揚于王庭以正小人之罪而莫敢不服天下無道君子囊括不言以避小人之禍而猶或不免黨人生昬亂之丗不在其位四海横流而欲以口舌救之臧否人物激濁揚清撩虺蛇之頭踐虎狼之尾以至身被淫刑禍及朋友士類殱滅而國隨以亡不亦悲乎夫唯郭泰既明且哲以保其身申屠蟠見幾而作不俟終日卓乎其不可及巳庚子晦日有食之十一月太尉劉寵免太僕扶溝郭禧為太尉鮮卑冦并州長樂太僕曹節病困詔拜車騎將軍有頃疾瘳上印綬復為中常侍位特進秩中二千石髙句驪王伯固冦遼東􅀇菟太守耿臨討降之三年春三月丙寅晦日有食之徵段熲還京師拜侍中熲在邊十餘年未嘗一日蓐寢與將士同甘苦故皆樂為死戰所嚮有功夏四月太尉郭禧罷以太中大夫聞人襲為太尉秋七月司空劉囂罷八月以大鴻臚梁國橋􅀇為司空九月執金吾董寵坐矯永樂太后屬請下獄死冬鬱林太守谷永以恩信招降烏滸人十餘萬皆内屬受冠帶開置七縣凉州刺史扶風孟佗遣從事任涉將敦煌兵五百人與戊巳司馬曹寛西域長史張宴將焉耆􅀛兹車師前後部合三萬餘人討疏勒攻楨中城四十餘日不能下引去其後疏勒王連相殺害朝庭亦不能復治初中常侍張讓有監奴典任家事威形諠赫孟佗資産饒贍與奴朋結傾竭饋問無所遺愛奴咸德之問其所欲佗曰吾望汝曹為我一拜耳時賔客求謁讓者車常數百千兩佗詣讓後至不得進監奴乃率諸倉頭迎拜於路遂共轝車入門賔客於前曹節王甫疾之誣萌以謗訕永樂宫下獄死鮮卑冦并州資治通鑑卷第五十六
