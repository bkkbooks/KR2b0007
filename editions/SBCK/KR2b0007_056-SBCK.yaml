seq: 56
front:
  text: 郡霍諝等使訟之武上疏曰陛下即位以來未聞善政常侍黄門競作譎詐妄爵非人伏尋西京佞臣執政終喪天下今不慮前事之失復循覆車之軌臣恐二世之難必將復及趙髙之變不朝則夕近者姦臣牢脩造設黨議遂收前司隷校尉李膺等逮考連及數百人曠年拘録事無效驗臣惟膺等忠心抗節志經王室此誠陛下稷卨伊吕之佐而虚為姦臣賊子之所誣枉天下寒心四海失望惟陛下留神澄省時見理出以厭人鬼喁喁之心今臺閣近臣尚書朱㝢荀鯤劉祐魏朗劉矩尹􅈴等皆國之貞士朝之良佐尚書郎張陵嬀皓苑康楊喬邊韶戴恢等文質彬彬明達國典内外之職羣才並列而陛下委任近習專樹饕餮外典州郡内幹心膂宜以次貶黜案罪糾罰信任忠良平决臧否使邪正毁譽各得其所寶愛天官唯善是授如此咎徵可消天應可待間者有嘉禾芝草黄龍之見夫瑞生必於嘉士福至實由善人在德為瑞無德為災陛下所行不合天意不宜稱慶書奏因以病上還城門校尉槐里侯印綬霍諝亦為表請帝意稍解使中常侍王甫就獄訊黨人范滂等皆三木囊頭暴於階下甫以次辯詰曰卿等更相拔舉迭為脣齒其意如何滂曰仲尼之言見善如不及見惡如探湯滂欲使善善同其清惡惡同其汙謂王政之所願聞不悟更以為黨古之脩善自求多福今之脩善身陷大戮身死之日願埋滂於首陽山側上不負皇天下不愧夷齊甫愍然為之改容乃得並解桎梏李膺等又多引宦官子弟宦官懼請帝以天時宜赦六月庚申赦天下改元黨人二百餘人皆歸田里書名三府禁錮終身范滂往候霍諝而不謝或讓之滂曰昔叔向不見祁奚吾何謝焉滂南歸汝南南陽士大夫迎之者車數千兩鄉人殷陶黄穆侍衛於旁應對賔客滂謂陶等曰今子相隨是重吾禍也遂遁還鄉里初詔書下舉鈎黨郡國所奏相連及者多至百數唯平原相史弼獨無所上詔書前後迫切州郡髠笞掾史從事坐傳舍責曰詔書疾惡黨人㫖意懇惻青州六郡其五有黨平原何治而得獨無弼曰先王疆理天下畫界分境水土異齊風俗不同它郡自有平原自無胡可相比若承望上司誣陷良善淫刑濫罰以逞非理則平原之人户可為黨相有死而已所不能也從事大怒即收郡僚職送獄遂舉奏弼㑹黨禁中解弼以俸贖罪所脱者甚衆竇武所薦朱㝢沛人苑康勃海人楊喬㑹稽人邊韶陳留人喬容儀偉麗數上言政事帝愛其才貌欲妻以公主喬固辭不聽遂閉口不食七日而死秋八月巴郡言黄龍見初郡人欲就池浴見池水濁因戲相恐此中有黄龍語遂行民間太守欲以為美故上之郡吏傅堅諫曰此走卒戲語耳太守不聽六月大水勃海溢冬十月先零羗冦三輔張奐遣司馬尹端董卓拒擊大破之斬其酋豪首虜萬餘人三州清定奐論功當封以不事宦官故不果封唯賜錢二十萬除家一人爲郎奐辭不受請徙屬弘農舊制邊人不得内徙詔以奐有功特許之拜董卓為郎中卓隴西人性粗猛有謀羗胡畏之
