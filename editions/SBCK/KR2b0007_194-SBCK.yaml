front:
  text: 資治通鑑卷第一百九十四
  hash: sha256:32dc26e1dd1525e67c2f541324dcc2a7b2378f076fe6dc496ef90b099c151489
body:
  text: 臣司馬光奉勑編集唐紀十噩四月凡五年有竒起􅀇黓執徐盡強圉作太宗文武大聖大廣孝皇帝上之下貞觀六年春正月乙卯朔日有食之癸酉靜州獠反將軍李子和討平之文武官復請封禪上曰卿輩皆以封禪為帝王盛事朕意不然若天下乂安家給人足雖不封禪庸何傷乎昔秦始皇封禪而漢文帝不封禪後世豈以文帝之賢不及始皇邪且事天掃地而祭何必登泰山之巔封數尺之土然後可以展其誠敬乎羣臣猶請之不已上亦欲從之魏徵獨以爲不可上曰公不欲朕封禪者以功未髙邪曰髙矣德未厚邪曰厚矣中國未安邪曰安矣四夷未服邪曰服矣年穀未豐邪曰豐矣符瑞未至邪曰至矣然則何爲不可封禪對曰陛下雖有此六者然承隋末大亂之後户口未復倉廩尚虚而車駕東巡千乘萬騎其供頓勞費未易任也且陛下封禪則萬國咸集逺夷君長皆當扈從今自伊洛以東至于海岱煙火尚希灌莽極目此乃引戎狄入腹中示之以虚弱也况賞賚不貲未厭逺人之望給復連年不償百姓之勞崇虚名而受實害陛下將焉用之㑹河南北數州大水事遂寢上將幸九成宫通直散騎常侍姚思亷諫上曰朕有氣疾暑輒頓劇往避之耳賜思廉絹五十匹監察御史馬周上疏以為東宫在宫城之中而大安宫乃在宫城之西制度比於宸居尚為卑小於四方觀聽有所不足宜增修髙大以稱中外之望又太上皇春秋已髙陛下宜朝夕視膳今九成宫去京師三百餘里太上皇或時思念陛下陛下何以赴之又車駕此行欲以避暑太上皇尚留暑中而陛下獨居涼處温凊之禮竊所未安今行計已成不可復止願速示返期以解衆惑又王長通白明達皆樂工韋槃提斛斯正止能調馬縱使技能出衆正可賚之金帛豈得超授官爵鳴玉曳履與士君子比肩而立同坐而食臣竊恥之上深納之上以新令無三師官二月丙戌詔特置之三月戊辰上幸九成宮庚午吐谷渾寇蘭州州兵擊走之長樂公主將出降上以公主皇后所生特愛之勑有司資送倍於永嘉長公主魏徵諫曰昔漢明帝欲封皇子曰我子豈得與先帝子比皆令半楚淮陽今資送公主倍於長主得無異於明帝之意乎上然其言入告皇后后歎曰妾亟聞陛下稱重魏徵不知其故今觀其引禮義以抑人主之情乃知真社稷之臣也妾與陛下結髮為夫婦曲承恩禮每言必先候顔色不敢輕犯威嚴況以人臣之踈逺乃能抗言如是陛下不可不從也因請遣中使齎錢四百緍絹四百匹以賜徴且語之曰聞公正直乃今見之故以相賞公宜常秉此心勿轉移也上嘗罷朝怒曰㑹須殺此田舍翁后問為誰上曰魏徵毎廷辱我后退具朝服立于庭上驚問其故后曰妾聞主明臣直今魏徵直由陛下之明故也妾敢不賀上乃悅夏四月辛卯襄州都督鄒襄公張公謹卒明日上出次發哀有司奏辰日忌哭上曰君之於臣猶父子也情發於衷安避辰日遂哭之六月己亥金州刺史酆悼王元亨薨辛亥江王囂薨秋七月丙辰焉耆王突騎支遣使入貢初焉耆入中國由磧路隋末閉塞道由髙昌突騎支請復開磧路以便往來上許之由是髙昌恨之遣兵襲焉耆大掠而去辛未宴三品已上於丹霄殿上從容言曰中外乂安皆公卿之力然隋煬帝威加夷夏頡利跨有北荒統葉䕶雄據西域今皆覆亡此乃朕與公等所親見勿矜彊盛以自滿也西突厥肆葉䕶可汗發兵擊薛延陀為薛延陀所敗肆葉䕶性猜狠信讒有乙利可汗功最多肆葉護以非其族類誅滅之由是諸部皆不自保肆葉䕶又忌莫賀設之子泥孰陰欲圖之泥孰奔焉耆設卑達官與弩失畢二部攻之肆葉䕶輕騎奔康居尋卒國人迎泥孰於焉耆而立之是為咄陸可汗遣使内附丁酉遣鴻臚少卿劉善因立咄陸為奚利邲咄陸可汗閏月乙卯上宴近臣於丹霄殿長孫無忌曰王珪魏徵昔為仇讎不謂今日得同北宴上曰徵珪盡心所事故我用之然徵每諫我不從我與之言輒不應何也魏徵對曰臣以事為不可故諫若陛下不從而臣應之則事遂施行故不敢應上曰且應而復諫庸何傷對曰昔舜戒羣臣爾無面從退有後言臣心知其非而口應陛下乃面從也豈稷契事舜之意邪上大笑曰人言魏徵舉止踈慢我視之更覺娬媚正為此耳徵起拜謝曰陛下開臣使言故臣得盡其愚若陛下拒而不受臣何敢數犯顔色乎戊辰秘書少監虞世南上聖德論上賜手詔稱卿論太髙朕何敢擬上古但比近世差勝耳然卿適覩其始未知其終若朕能慎終如始則此論可傳如或不然恐徒使後世笑卿也九月己酉幸慶善宫上生時故宅也因與貴人宴賦詩起居郎清平吕才被之管􅃶命曰功成慶善樂使童子八佾為九功之舞大宴㑹與破陳舞偕奏於庭同州刺史尉遲敬德預宴有班在其上者敬德怒曰汝何功坐我上任城王道宗次其下諭解之敬德拳毆道宗目幾眇上不懌而罷謂敬德曰朕見漢髙祖誅滅功臣意常尤之故欲與卿等共保富貴令子孫不絶然卿居官數犯法乃知韓彭葅醢非髙祖之罪也國家綱紀唯賞與罰非分之恩不可數得勉自修飭無貽後悔敬德由是始懼而自戢冬十月乙卯車駕還京師帝侍上皇宴於大安宫帝與皇后更獻飲膳及服御之物夜久乃罷帝親為上皇捧輿至殿門上皇不許命太子代之突厥頡利可汗鬱鬱不得意數與家人相對悲泣容貌羸憊上見而憐之以虢州地多麋鹿可以遊獵乃以頡利為虢州刺史頡利辭不願往癸未復以為右衞大將軍十一月辛巳契苾酋長何力帥部落六千餘家詣沙州降詔處之於甘涼之間以何力為左領軍將軍庚寅以左光祿大夫陳叔達為禮部尚書帝謂叔達曰卿武德中有讜言故以此官相報對曰臣見隋室父子相殘以取亂亡當日之言非為陛下乃社稷之計耳十二月癸丑帝與侍臣論安危之本中書令温彦博曰伏願陛下常如貞觀初則善矣帝曰朕比來怠於為政乎魏徵曰貞觀之初陛下志在節儉求諫不倦比來營繕微多諫者頗有忤旨此其所以異耳帝拊掌大笑曰誠有是事辛未帝親錄繫囚見應死者閔之縱使歸家期以來秋來就死仍敕天下死囚皆縱遣使至期來詣京師是歲党項等羌前後内屬者三十萬口公卿以下請封禪者首尾相屬上諭以舊有氣疾恐登髙增劇公等勿復言上謂侍臣曰朕比來決事或不能皆如律令公輩以為事小不復執奏夫事無不由小而致大此乃危亡之端也昔關龍逢忠諫而死朕毎痛之煬帝驕暴而亡公輩所親見也公輩常宜為朕思煬帝之亡朕常為公輩念關龍逢之死何患君臣不相保乎上謂魏徵曰為官擇人不可造次用一君子則君子皆至用一小人則小人競進矣對曰然天下未定則專取其才不考其行喪亂既平則非才行兼備不可用也七年春正月更名破陳樂曰七德舞癸巳宴三品已上及州牧蠻夷酋長於􅀇武門奏七德九功之舞太常卿蕭瑀上言七德舞形容聖功有所未盡請寫劉武周薛仁果竇建德王世充等擒獲之狀上曰彼皆一時英雄今朝廷之臣往往嘗北面事之若覩其故主屈辱之狀能不傷其心乎瑀謝曰此非臣愚慮所及魏徵欲上偃武修文毎侍宴見七德舞輒俛首不視見九功舞則諦觀之三月戊子侍中王珪坐漏泄禁中語左遷同州刺史庚寅以祕書監魏徵為侍中直太史雍人李淳風奏靈臺候儀制度踈畧但有赤道請更造渾天黄道儀許之癸巳成而奏之夏五月癸未上幸九成宫雅州道行軍揔管張士貴擊反獠破之秋八月乙丑左屯衞大將軍譙敬公周範卒上行幸常令範與房􅀇齡居守範為人忠篤嚴正疾甚不肯出外竟終於内省與􅀇齡相抱而訣曰所恨不獲再奉聖顔辛未以張士貴為龔州道行軍揔管使擊反獠九月山東河南四十餘州水遣使賑之去歳所縱天下死囚凡三百九十人無人督帥皆如期自詣朝堂無一人亡匿者上皆赦之冬十月庚申上還京師十一月壬辰以開府儀同三司長孫無忌為司空無忌固辭曰臣忝預外戚恐天下謂陛下為私上不許曰吾為官擇人惟才是與茍或不才雖親不用襄邑王神符是也如其有才雖讎不棄魏徵等是也今日之舉非私親也十二月甲寅帝幸芙蓉園丙辰校獵少陵原戊午還宫從上皇置酒故漢未央宫上皇命突厥頡利可汗起舞又命南蠻酋長馮智戴詠詩既而笑曰胡越一家自古未有也帝奉觴上夀曰今四夷入臣皆陛下教誨非臣智力所及昔漢髙祖亦從太上皇置酒此宫妄自矜大臣所不取也上皇大悅殿上皆呼萬歲帝謂左庶子于志寧右庶子杜正倫曰朕年十八猶在民間民之疾苦情偽無不知之及居大位區處世務猶有差失况太子生長深宫百姓艱難耳目所未涉能無驕逸乎卿等不可不極諫太子好嬉戲頗虧禮法志寧與右庶子孔頴達數直諫上聞而嘉之各賜金一斤帛五百匹工部尚書叚綸奏徵巧工楊思齊上令試之綸使先造傀儡上曰得巧工庶供國事卿令先造戲具豈百工相戒無作淫巧之意邪乃削綸階嘉陵州獠反命邗江府統軍牛進達擊破之上問魏徵曰羣臣上書可采及召對多失次何也對曰臣􅀚百司奏常事數日思之及至上前三分不能道一况諫者怫意觸忌非陛下借之辭色豈敢盡其情哉上由是接羣臣辭色愈温嘗曰煬帝多猜忌臨朝對羣臣多不語朕則不然與羣臣相親如一體耳八年春正月癸未突厥頡利可汗卒命國人從其俗焚尸葬之辛丑行軍揔管張士貴討東西王洞反獠平之上欲分遣大臣為諸道黜陟大使未得其人李靖薦魏徵上曰徵箴規朕失不可一日離左右乃命靖與太常卿蕭瑀等凡十三人分行天下察長吏賢不肖問民間疾苦禮髙年賑窮乏襃善良起滯淹俾使者所至如朕親覩三月庚辰上幸九成宫夏五月辛未朔日有食之初吐谷渾可汗伏允遣使入貢未返大掠鄯州而去上遣使讓之徴伏允入朝稱疾不至仍爲其子尊王求昏上許之令其親迎尊王又不至乃絶昏伏允復遣兵寇蘭廓二州伏允年老信其臣天柱王之謀數犯邊又執唐使者趙德楷上遣使諭之十返又引其使者臨軒親諭以禍福伏允終無悛心六月遣左驍衞大將軍段志􅀇為西海道行軍揔管左驍衞將軍樊興為赤水道行軍揔管將邊兵及契苾党項之衆以擊之秋七月山東河南淮海之間大水上屢請上皇避暑九成宫上皇以隋文帝終於彼惡之冬十月營大明宫以為上皇清暑之所未成而上皇寢疾不果居辛丑段志􅀇擊吐谷渾破之追奔八百餘里去青海三十餘里吐谷渾驅牧馬而遁甲子上還京師右僕射李靖以疾遜位許之十一月辛未以靖為特進封爵如故祿賜吏卒並依舊給俟疾小瘳每三兩日至門下中書平章政事甲申吐蕃贊普棄宗弄讚遣使入貢仍請昏吐蕃在吐谷渾西南近世浸彊蠶食他國土宇廣大勝兵數十萬然未嘗通中國其王稱贊普俗不言姓王族皆曰論宦族皆曰尚棄宗弄讚有勇畧四鄰畏之上遣使者馮德遐往慰撫之丁亥吐谷渾寇涼州己丑下詔大舉討吐谷渾上欲得李靖為將為其老重勞之靖聞之請行上大悦十二月辛丑以靖為西海道行軍大揔管節度諸軍兵部尚書侯君集為積石道刑部尚書任城王道宗為鄯善道涼州都督李大亮為且末道岷州都督李道彦為赤水道利州刺史髙甑生為鹽澤道行軍揔管并突厥契苾之衆擊吐谷渾帝聘隋通事舍人鄭仁基女為充華詔已行冊使將發魏徵聞其嘗許嫁士人陸爽遽上表諫帝聞之大驚手詔深自克責命停册使房􅀇齡等奏稱許嫁陸氏無顯狀大禮既行不可中止爽亦表言初無昏姻之議帝謂徵曰羣臣或容希合爽亦自陳何也對曰彼以陛下爲外雖捨之或陰加罪譴故不得不然帝笑曰外人意或當如是朕之言未能使人必信如此邪中牟丞皇甫德參上言修洛陽宫勞人収地租厚斂俗好髙髻蓋宫中所化上怒謂房􅀇齡等曰德參欲國家不役一人不収斗租宫人皆無髮乃可其意邪欲治其謗訕之罪魏徵諫曰賈誼當漢文帝時上書云可為痛哭者一可為流涕者二自古上書不激切不能動人主之心所謂狂夫之言聖人擇焉唯陛下裁察上曰朕罪斯人則誰敢復言乃賜絹二十匹佗日徵奏言陛下近日不好直言雖勉强含容非曩時之豁如上乃更加優賜拜監察御史中書舍人髙季輔上言外官卑品猶未得祿飢寒切身難保清白今倉廩浸實宜量加優給然後可責以不貪嚴設科禁又密王元曉等皆陛下之弟比見帝子拜諸叔叔皆答拜紊亂昭穆宜訓之以禮書奏上善之西突厥咄陸可汗卒其弟同娥設立是為沙鉢羅咥利失可汗九年春正月党項先内屬者皆叛歸吐谷渾三月庚辰洮州羌叛入吐谷渾殺刺史孔長秀壬辰赦天下乙酉鹽澤道行軍揔管髙甑生擊叛羌破之庚寅詔民貲分三等未盡其詳宜分九等上謂魏徵曰齊後主周天元皆重斂百姓厚自奉養力竭而亡譬如饞人自噉其肉肉盡而斃何其愚也然二主孰為優劣對曰齊後主懦弱政出多門周天元驕暴威福在己雖同為亡國齊主尤劣也夏閏四月癸酉任城王道宗敗吐谷渾於庫山吐谷渾可汗伏允悉燒野草輕兵走入磧諸將以為馬無草疲瘦未可深入侯君集曰不然曏者段志􅀇軍還纔及鄯州虜已至其城下蓋虜猶完實衆為之用故也今一敗之後䑕逃鳥散斥候亦絶君臣攜離父子相失取之易於拾芥此而不乘後必悔之李靖從之中分其軍為兩道靖與薛萬均李大亮由北道君集與任城王道宗由南道戊子靖部將薛孤兒敗吐谷渾於曼頭山斬其名王大獲雜畜以充軍食癸巳靖等敗吐谷渾於牛心堆又敗諸赤水源侯君集任城王道宗引兵行無人之境二千餘里盛夏降霜經破邏真谷其地無水人齕冰馬噉雪五月追及伏允於烏海與戰大破之獲其名王薛萬均薛萬徹又敗天柱王於赤海上皇自去秋得風疾庚子崩於垂拱殿甲辰羣臣請上準遺誥視軍國大事上不許乙巳詔太子承乾於東宫平決庶政赤水之戰薛萬均薛萬徹輕騎先進為吐谷渾所圍兄弟皆中槍失馬步鬭從騎死者什六七左領軍將軍契苾何力將數百騎救之竭力奮擊所向披靡萬均萬徹由是得免李大亮敗吐谷渾於蜀渾山獲其名王二十人將軍執失思力敗吐谷渾於居茹川李靖督諸軍經積石山河源至且末窮其西境聞伏允在突倫川將奔于闐契苾何力欲追襲之薛萬均懲其前敗固言不可何力曰虜非有城郭隨水草遷徙若不因其聚居襲取之一朝雲散豈得復傾其巢穴邪自選驍騎千餘直趣突倫川萬均乃引兵從之磧中乏水將士刺馬血飲之襲破伏允牙帳斬首數千級獲雜畜二十餘萬伏允脫身走俘其妻子侯君集等進逾星宿川至柏海還與李靖軍合大寧王順隋氏之甥伏允之嫡子也為侍中於隋久不得歸伏允立侍子為太子及歸意常怏怏㑹李靖破其國國人窮蹙怨天柱王順因衆心斬天柱王舉國請降伏允帥千餘騎逃磧中十餘日衆散稍盡為左右所殺國人立順為可汗壬子李靖奏平吐谷渾乙卯詔復其國以慕容順為西平郡王趉故吕烏甘豆可汗上慮順未能服其衆仍命李大亮將精兵數千為其聲援六月己丑羣臣復請聽政上許之其細務仍委太子太子頗能聽斷是後上每出行幸常令居守監國秋七月庚子鹽澤道行軍副揔管劉德敏擊叛羌破之丁巳詔山陵依漢長陵故事務存隆厚期限既促功不能及祕書監虞世南上疏以爲聖人薄葬其親非不孝也深思逺慮以厚葬適足爲親之累故不爲耳昔張釋之言使其中有可欲雖錮南山猶有隙劉向言死者無終極而國家有廢興釋之之言爲無窮計也其言深切誠合至理伏惟陛下聖德度越唐虞而厚葬其親乃以秦漢爲法臣竊爲陛下不取雖復不藏金玉後世但見丘壟如此其大安知其中無金玉邪且今釋服已依霸陵而丘壟之制獨依長陵恐非所宜伏願依白虎通爲三仞之墳器物制度率皆節損仍刻石立之陵旁别書一通藏之宗廟用為子孫永久之灋疏奏不報世南復上疏以為漢天子即位即營山陵逺者五十餘年今以數月之間為數十年之功恐於人力有所不逮上乃以世南疏授有司令詳處其宜房􅀇齡等議以為漢長陵髙九丈原陵髙六丈今九丈則太崇三仭則太卑請依原陵之制從之辛亥詔國初草創宗廟之制未備今將遷祔宜令禮官詳議諫議大夫朱子奢請立三昭三穆而虚太祖之位於是增修太廟祔􅀪農府君及髙祖并舊神主四為六室房􅀇齡等議以涼武昭王為始祖左庶子于志寧議以為武昭王非王業所因不可為始祖上從之党項寇疊州李靖之擊吐谷渾也厚賂党項使為鄉導党項酋長拓跋赤辭來謂諸將曰隋人無信喜暴掠我今諸軍茍無異心我請供其資糧如或不然我將據險以塞諸軍之道諸將與之盟而遣之赤水道行軍揔管李道彦行至闊水見赤辭無備襲之獲牛羊數千頭於是羣羌怨怒屯野狐峽道彦不得進赤辭擊之道彦大敗死者數萬退保松州左驍衞將軍樊興逗遛失軍期士卒失亡多乙卯道彦興皆坐減死徙邊上遣使勞諸將於大斗拔谷薛萬均排毁契苾何力自稱已功何力不勝忿拔刀起欲殺萬均諸將救止之上聞之以讓何力何力具言其狀上怒欲解萬均官以授何力何力固辭曰陛下以臣之故解萬均官羣胡無知以陛下為重胡輕漢轉相誣告馳競必多且使胡人謂諸將皆如萬均將有輕漢之心上善之而止尋令宿衞北門檢校屯營事尚宗女臨洮縣主岷州都督鹽澤道行軍揔管髙甑生後軍期李靖按之甑生恨靖誣告靖謀反按驗無狀八月庚辰甑生坐減死徙邊或言甑生秦府功臣寛其罪上曰甑生違李靖節度又誣其反此而可寛法將安施且國家自起晉陽功臣多矣若甑生獲免則人人犯法安可復禁乎我於舊勲未嘗忘也為此不敢赦耳李靖自是闔門杜絶賓客雖親戚不得妄見也上欲自詣園陵羣臣以上哀毁羸瘠固諫而止冬十月乙亥處月初遣使入貢處月處密皆西突厥之别部也庚寅葬太武皇帝於獻陵廟號髙祖以穆皇后祔葬加號太穆皇后十一月庚戌詔議於太原立髙祖廟祕書監顔師古議以為寢廟應在京師漢世郡國立廟非禮乃止戊午以光祿大夫蕭瑀為特進復令參預政事上曰武德六年以後髙祖有廢立之心而未定我不為兄弟所容實有功髙不賞之懼斯人也不可以利誘不可以死脅真社稷臣也因賜瑀詩曰疾風知勁草版蕩識誠臣又謂瑀曰卿之忠直古人不過然善惡太明亦有時而失瑀再拜謝魏徵曰瑀違衆孤立唯陛下知其忠勁曏不遇聖明求免難矣特進李靖上書請依遺誥御常服臨正殿弗許吐谷渾甘豆可汗久質中國國人不附竟為其下所殺子燕王諾曷鉢立諾曷鉢幼大臣爭權國中大亂十二月詔兵部尚書侯君集等將兵援之先遣使者諭解有不奉詔者隨宜討之十年春正月甲午上始親聽政辛丑以突厥拓設阿史那社爾為左驍衞大將軍社爾處羅可汗之子也年十一以智略聞可汗以為拓設建牙於磧北與欲谷設分統敕勒諸部居官十年未嘗有所賦斂諸設或鄙其不能為富貴社爾曰部落茍豐於我足矣諸設慙服及薛延陀叛攻破欲谷設社爾兵亦敗將其餘衆走保西陲頡利可汗既亡西突厥亦亂咄陸可汗兄弟爭國社爾詐往降之引兵襲破西突厥取其地幾半有衆十餘萬自稱荅布可汗社爾乃謂諸部曰首爲亂破我國者薛延陀也我當爲先可汗報仇擊滅之諸部皆諫曰新得西方宜且留鎮撫今遽捨之逺去西突厥必來取其故地社爾不從擊薛延陀於磧北連兵百餘日㑹咥利失可汗立社爾之衆苦於乆役多弃社爾逃歸薛延陀縱兵擊之社爾大敗走保髙昌其舊兵在者纔萬餘家又畏西突厥之逼遂帥衆來降敕處其部落於靈州之北留社爾於長安尚皇妹南陽長公主典屯兵於苑内癸丑徙趙王元景爲荆王魯王元昌爲漢王鄭王元禮爲徐王徐王元嘉爲韓王荆王元則爲彭王滕王元懿為鄭王吳王元軌為霍王豳王元鳳為虢王陳王元慶為道王魏王靈虁為燕王蜀王恪為吳王越王泰為魏王燕王祐為齊王梁王愔為蜀王郯王惲為蔣王漢王貞為越王申王慎為紀王二月乙丑以元景為荆州都督元昌為梁州都督元禮為徐州都督元嘉為潞州都督元則為遂州都督靈蘷為幽州都督恪為潭州都督泰為相州都督祐為齊州都督愔為益州都督惲為安州都督貞為揚州都督泰不之官以金紫光祿大夫張亮爲長史行都督事上以泰好文學禮接士大夫特命於其府别置文學館聽自引召學士三月丁酉吐谷渾王諾􅂚鉢遣使請頒厯行年號遣子弟入侍並從之丁未以諾曷鉢為河源郡王烏地也拔勤豆可汗癸丑諸王之藩上與之别曰兄弟之情豈不欲常共處邪但以天下之重不得不爾諸子尚可復有兄弟不可復得因流涕嗚咽不能止夏六月壬申以温彦博為右僕射太常卿楊師道為侍中侍中魏徵屢以目疾求為散官上不得已以徵為特進仍知門下事朝章國典參議得失徒流以上罪詳事聞奏其祿賜及吏卒並同職事長孫皇后性仁孝儉素好讀書常與上從容商畧古事因而獻替裨益􅀪多上或以非罪譴怒宫人后亦陽怒請自推鞫因命囚繫候上怒息徐為申理由是宫壼之中刑無枉濫豫章公主早喪其母后収養之慈愛逾於所生妃嬪以下有疾后親撫視輟己之藥膳以資之宫中無不愛戴訓諸子常以謙儉為先太子乳母遂安夫人嘗白后以東宫器用少請奏益之后不許曰為太子患在德不立名不揚何患無器用邪上得疾累年不愈后侍奉晝夜不離側常繫毒藥於衣帶曰若有不諱義不獨生后素有氣疾前年從上幸九成宫柴紹等中夕告變上擐甲出閤問狀后扶疾以從左右止之后曰上既震驚吾何心自安由是疾遂甚太子言於后曰醫藥備盡而疾不瘳請奏赦罪人及度人入道庶獲㝠福后曰死生有命非智力所移若為善有福則吾不為惡如其不然妄求何益赦者國之大事不可數下道釋異端之教蠧國病民皆上素所不為奈何以吾一婦人使上為所不為乎必行汝言吾不如速死太子不敢奏私以語房􅀇齡􅀇齡白上上哀之欲為之赦后固止之及疾篤與上訣時房􅀇齡以譴歸第后言於上曰􅀇齡事陛下久小心慎密竒謀祕計未嘗宣泄茍無大故願勿棄之妾之本宗因緣葭莩以致祿位既非德舉易致顛危欲使其子孫保全慎勿處之權要但以外戚奉朝請足矣妾生無益於人不可以死害人願勿以丘壟勞費天下但因山為墳器用瓦木而已仍願陛下親君子逺小人納忠諫屏讒慝省作役止遊畋妾雖没於九泉誠無所恨兒女輩不必令來見其悲哀徒亂人意因取衣中毒藥以視上曰妾於陛下不豫之日誓以死從乘輿不能當吕后之地耳己卯崩于立政殿后嘗采自古婦人得失事為女則三十卷又嘗著論駮漢明德馬后以不能抑退外親使當朝貴盛徒戒其車如流水馬如龍是開其禍敗之源而防其末流也及崩宫司并女則奏之上覽之悲慟以示近臣曰皇后此書足以垂範百世朕非不知天命而為無益之悲但入宫不復聞規諫之言失一良佐故不能忘懷耳乃召房􅀇齡使復其位秋八月丙子上謂羣臣曰朕開直言之路以利國也而比來上封事者多訐人細事自今復有為是者朕當以讒人罪之冬十一月庚午葬文德皇后於昭陵將軍段志􅀇宇文士及分統士衆出肅章門帝夜使宫官至二人所士及開營内之志􅀇閉門不納曰軍門不可夜開使者曰此有手敕志􅀇曰夜中不辨真偽竟留使者至明帝聞而歎曰真將軍也帝復為文刻之石稱皇后節儉遺言薄葬以為盜賊之心止求珍貨既無珍貨復何所求朕之本志亦復如此王者以天下為家何必物在陵中乃為己有今因九嵕山為陵鑿石之工纔百餘人數十日而畢不藏金玉人馬器皿皆用土木形具而已庶幾姦盜息心存没無累當使百世子孫奉以為灋上念后不已於苑中作層觀以望昭陵嘗引魏徵同登使視之徵熟視之曰臣昏眊不能見上指示之徵曰臣以為陛下望獻陵若昭陵則臣固見之矣上泣為之毁觀十二月戊寅朱俱波甘棠遣使入貢朱俱波在葱嶺之北去􅀲州二千八百里甘棠在大海南上曰中國既安四夷自服然朕不能無懼昔秦始皇威振胡越二世而亡唯諸公匡其不逮耳魏王泰有寵於上或言三品以上多輕魏王上怒引三品以上作色讓之曰隋文帝時一品以下皆為諸王所顛躓彼豈非天子兒邪朕但不聽諸子縱横耳聞三品以上皆輕之我若縱之豈不能折辱公輩乎房􅀇齡等皆惶懼流汗拜謝魏徵獨正色曰臣竊計當今羣臣必無敢輕魏王者在禮臣子一也春秋王人雖微序於諸侯之上三品以上皆公卿陛下所尊禮若紀綱大壞固所不論聖明在上魏王必無頓辱羣臣之理隋文帝驕其諸子使多行無禮卒皆夷滅又足法乎上悅曰理到之語不得不服朕以私愛忘公義曏者之忿自謂不疑及聞徵言方知理屈人主發言何得容易乎上曰灋令不可數變數變則煩官長不能盡記又前後差違吏得以爲姦自今變灋皆宜詳慎而行之治書侍御史權萬紀上言宣饒二州銀大發采之歲可得數百萬緍上曰朕貴爲天子所乏者非財也但恨無嘉言可以利民耳與其多得數百萬緡何如得一賢才卿未嘗進一賢退一不肖而專言稅銀之利昔堯舜抵璧於山投珠於谷漢之􅁊靈乃聚錢爲私藏卿欲以􅁊靈俟我邪是日黜萬紀使還家是嵗更命統軍為折衝都尉别將為果毅都尉凡十道置府六百三十四而關内二百六十二皆􅀠諸衞及東宫六率凡上府兵千二百人中府千人下府八百人三百人為團團有校尉五十人為隊隊有正十人為火火有長毎人兵甲糧裝各有數皆自備輸之庫有征行則給之年二十為兵六十而免其能騎射者為越騎其餘為步兵每歲季冬折衝都尉帥其屬教戰當給馬者官予其直市之凡當宿衞者畨上兵部以逺近給畨逺疎近數皆一月而更十一年春正月徙鄶王元裕為鄧王譙王元名為舒王辛卯以吳王恪為安州都督晉王治為并州都督紀王慎為秦州都督將之官上賜書戒敕曰吾欲遺汝珍玩恐益驕奢不如得此一言耳上作飛山宫庚子特進魏徵上疏以為煬帝恃其富彊不虞後患窮奢極欲使百姓困窮以至身死人手社稷為墟陛下撥亂返正宜思隋之所以失我之所以得撤其峻宇安於卑宮若因基而增廣襲舊而加飾此則以亂易亂殃咎必至難得易失可不念哉房􅀇齡等先受詔定律令以為舊法兄弟異居蔭不相及而謀反連坐皆死祖孫有蔭而止應配流據禮論情深為未愜今定律祖孫與兄弟緣坐者俱配役從之自是比古死刑除其太半天下稱賴焉􅀇齡等定律五百條立刑名二十等比隋律減大辟九十二條減流入徒者七十一條凡削煩去蠧變重為輕者不可勝紀又定令一千五百九十餘條武德舊制釋奠於太學以周公為先聖孔子配饗􅀇齡等建議停祭周公以孔子為先聖顔囘配饗又刪武德以來敕格定留七百條至是頒行之又定枷杻鉗鏁杖笞皆有長短廣狹之制自張藴古之死法官以出罪為戒時有失入者又不加罪上嘗問大理卿劉德威曰近日刑網稍密何也對曰此在主上不在羣臣人主好寛則寛好急則急律文失入減三等失出減五等今失入無辜失出更獲大罪是以吏各自免競就深文非有教使之然畏罪故耳陛下儻一斷以律則此風立變矣上悦從之由是斷獄平允上以漢世豫作山陵免子孫蒼猝勞費又志在儉葬恐子孫從俗奢靡二月丁巳自為終制因山為陵容棺而已甲子上行幸洛陽宫上至顯仁宫官吏以闕儲偫有被譴者魏徵諫曰陛下以儲偫譴官吏臣恐承風相扇異日民不聊生殆非行幸之本意也昔煬帝諷郡縣獻食視其豐儉以為賞罰故海内叛之此陛下所親見奈何欲效之乎上驚曰非公不聞此言因謂長孫無忌等曰朕昔過此買飯而食僦舍而宿今供頓如此豈得猶嫌不足乎三月丙戌朔日有食之庚子上宴洛陽宫西苑泛積翠池顧謂侍臣曰煬帝作此宫苑結怨於民今悉為我有正由宇文述虞世基裴藴之徒内為諂諛外蔽聰明故也可不戒哉房􅀇齡魏徵上所定新禮一百三十八篇丙午詔行之以禮部尚書王珪為魏王泰師上謂泰曰汝事珪當如事我泰見珪輒先拜珪亦以師道自居珪子敬直尚南平公主先是公主下嫁皆不以婦禮事舅姑珪曰今主上欽明動循禮法吾受公主謁見豈為身榮所以成國家之美耳乃與其妻就席坐令公主執笄行盥饋之禮是後公主始行婦禮自珪始羣臣復請封禪上使秘書監顔師古等議其禮房􅀇齡裁定之夏四月己卯魏徵上疏以為人主善始者多克終者寡豈取之易而守之難乎蓋以殷憂則竭誠以盡下安逸則驕恣而輕物盡下則胡越同心輕物則六親離德雖震之以威怒亦皆貌從而心不服故也人主誠能見可欲則思知足將興繕則思知止處髙危則思謙降臨滿盈則思挹損遇逸樂則思撙節在宴安則思後患防壅蔽則思延納疾讒邪則思正己行爵賞則思因喜而僭施刑罰則思因怒而濫兼是十思而選賢任能固可以無為而治又何必勞神苦體以代百司之任哉資治通鑑卷第一百九十四
