  hash: sha256:5bd054fe152b4e652fd3540dd8cb48b7df0d5d62ba807169ad7488ba0a6b58af
body:
  text: 初孝文時吳太子入見得侍皇太子飲博吳太子博爭道不恭皇太子引博局提吳太子殺之遣其喪歸葬至吳吳王愠曰天下同宗死長安即葬長安何必來葬爲復遣喪之長安葬吳王由此稍失藩臣之禮稱疾不朝京師知其以子故繫治驗問吳使者吳王恐始有反謀後使人爲秋請文帝復問之使者對曰王實不病漢繫治使者數輩吳王恐以故遂稱病夫察見淵中魚不祥唯上棄前過與之更始於是文帝乃赦吳使者歸之而賜吳王几杖老不朝吳得釋其罪謀亦益解然其居國以銅鹽故百姓無賦卒踐更􅂺與平賈􅀊時存問茂材賞賜閭里佗郡國吏欲來捕亡人者公共禁弗予如此者四十餘年鼂錯數上書言吳過可削文帝寛不忍罰以此吳日益横及帝即位錯􅀃上曰昔髙帝初定天下昆弟少諸子弱大封同姓齊七十餘城楚四十餘城吳五十餘城封三庶孽分天下半今吳王前有太子之郤詐稱病不朝於古灋當誅文帝弗忍因賜几杖德至厚當改過自新反益驕溢即山鑄錢煑海水爲鹽誘天下亡人謀作亂今削之亦反不削亦反削之其反亟禍小不削反遲禍大上令公卿列矦宗室雜議莫敢難獨竇嬰爭之由此與錯有郤及楚王戊來朝錯因言戊往年爲薄太后服私姦服舎請誅之詔赦削東海郡及前年趙王有罪削其常山郡膠西王卬以賣爵事有姦削其六縣廷臣方議削吳吳王恐削地無巳因發謀舉事念諸矦無足與計者聞膠西王勇好兵諸矦皆畏憚之於是使中大夫應髙口􅀃膠西王曰今者主上任用邪臣聽信䜛賊侵削諸矦誅罰良重日以益甚語有之曰狧穅及米吳與膠西知名諸矦也一時見察不得安肆矣吳王身有內疾不能朝請二十餘年常患見疑無以自白脅肩累足猶懼不見釋竊聞大王以爵事有過所聞諸矦削地罪不至此此恐不止削地而巳王曰有之子將柰何髙曰吳王自以與大王同憂願因時循理棄軀以除患於天下意亦可乎膠西王瞿然駭曰寡人何敢如是主上雖急固有死耳安得不事髙曰御史大夫鼂錯營惑天子侵奪諸矦朝廷疾怨諸矦皆有背叛之意人事極矣彗星出蝗蟲起此萬丗一時而愁勞聖人所以起也吳王內以鼂錯爲誅外從大王後車方洋天下所向者降所指者下莫敢不服大王誠幸而許之一言則吳王率楚王略函谷􅀜守滎陽敖倉之粟距漢兵治次舎須大王大王幸而臨之則天下可并兩主分割不亦可乎王曰善歸報吳王吳王猶恐其不果乃身自爲使者至膠西面約之膠西羣臣或聞王謀諌曰諸矦地不能當漢十二爲叛逆以憂太后非計也今承一帝尚云不易假令事成兩主分爭患乃益生王不聽遂發使約齊菑川膠東濟南皆許諾初楚元王好書與魯申公穆生白生俱受詩於浮丘伯及王楚以三人爲中大夫穆生不􅂄酒元王毎置酒常爲穆生設醴及子夷王孫王戊即位常設後乃忘設焉穆生退曰可以逝矣醴酒不設王之意怠不去楚人將鉗我於市遂稱疾卧申公白生彊起之曰獨不念先王之德與今王一旦失小禮何足至此穆生曰易稱知幾其神乎幾者動之微吉凶之先見者也君子見幾而作不俟終日先王之所以禮吾三人者爲道存也今而忽之是忘道也忘道之人胡可與乆處豈爲區區之禮哉遂謝病去申公白生獨留王戊稍淫暴太傅韋孟作詩諷諌不聽亦去居於鄒戊因坐削地事遂與吳通謀申公白生諌戊戊胥靡之衣之赭衣使雅舂於市休矦富使人諌王王曰季父不吾與我起先取季父矣休矦懼乃與母太夫人犇京師及削吳㑹稽豫章郡書至吳王遂先起兵誅漢吏二千石以下膠西膠東菑川濟南楚趙亦皆反楚相張尚太傅趙夷吾諌王戊戊殺尚夷吾趙相建德內史王悍諌王遂遂燒殺建德悍齊王後悔背約城守濟北王城壊未完其郎中令劫守王不得發兵膠西王膠東王爲渠率與菑川濟南共攻齊圍臨菑趙王遂發兵住其西界欲待吳楚俱進北使匈奴與連兵吳王悉其士卒下令國中曰寡人年六十二身自將少子年十四亦爲士卒先諸年上與寡人同下與少子等皆發凡二十餘萬人南使閩東越閩東越亦發兵從吳王起兵於廣陵西渉淮因并楚兵發使遺諸矦書罪狀鼂錯欲合兵誅之吳楚共攻梁破棘壁殺數萬人乗勝而前銳甚梁孝王遣將軍擊之又敗梁兩軍士卒皆還走梁王城守睢陽􅀄文帝且崩戒太子曰即有緩急周亞夫真可任將兵及七國反書聞上乃拜中尉周亞夫爲太尉將三十六將軍往擊吳楚遣曲周矦酈􅀉擊趙將軍欒布擊齊復召竇嬰拜爲大將軍使屯滎陽監齊趙兵􅀄鼂錯所更令三十章諸矦讙譁錯父聞之從潁川來謂錯曰上􅀄即位公爲政用事侵削諸矦䟽人骨肉口語多怨公何爲也錯曰固也不如此天子不尊宗廟不安父曰劉氏安矣而鼂氏危吾去公歸矣遂飲藥死曰吾不忍見禍逮身後十餘日吳楚七國俱反以誅錯爲名上與錯議出軍事錯欲令上自將兵而身居守又言徐僮之旁吳所未下者可以予吳錯素與吳相􅀽盎不善錯所居坐盎輒避盎所居坐錯亦避兩人未常同堂語及錯爲御史大夫使吏按盎受吳王財物抵辠詔赦以爲庶人吳楚反錯謂丞史曰􅀽盎多受吳王金錢專爲蔽匿言不反今果反欲請治盎宜知其計謀丞史曰事未發治之有絶今兵西向治之何益且盎不宜有謀錯猶與未決人有告盎盎恐夜見竇嬰爲言吳所以反願至前口對狀嬰入言上乃召盎盎入見上方與錯調兵食上問盎今吳楚反於公意何如對曰不足憂也上曰吳王即山鑄錢煑海爲鹽誘天下豪傑白頭舉事此其計不百全豈發虖何以言其無能爲也對曰吳銅鹽之利則有之安得豪傑而誘之誠令吳得豪傑亦且輔而爲誼不反矣吳所誘皆亡頼子弟亡命鑄錢姦人故相誘以亂錯曰盎䇿之善上曰計安出盎對曰願屏左右上屏人獨錯在盎曰臣所言人臣不得知乃屏錯錯趨避東廂甚恨上卒問盎對曰吳楚相遺書言髙皇帝王子弟各有分地今賊臣鼂錯擅適諸矦削奪之地以故反欲西共誅錯復故地而罷方今計獨有斬錯發使赦吳楚七國復其故地則兵可毋血刃而俱罷於是上黙然良乆曰顧誠何如吾不愛一人以謝天下盎曰愚計岀此唯上孰計之乃拜盎爲太常密裝治行後十餘日上令丞相青中尉嘉廷尉歐劾奏錯不稱主上德信欲䟽羣臣百姓又欲以城邑予吳無臣子禮大逆無道錯當要斬父母妻子同産無少長皆棄市制曰可錯殊不知壬子上使中尉召錯紿載行市錯衣朝衣斬東市上乃使􅀽盎與吳王弟子宗正德矦通使吳謁者僕射鄧公爲校尉上書言軍事見上上問曰道軍所來聞鼂錯死吳楚罷不鄧公曰吳爲反數十􅀊矣發怒削地以誅錯爲名其意不在錯也且臣恐天下之士拑口不敢復言矣上曰何哉鄧公曰夫鼂錯患諸矦彊大不可制故請削之以尊京師萬丗之利也計畫始行卒受大戮內杜忠臣之口外爲諸矦報仇臣竊爲陛下不取也於是帝喟然長息曰公言善吾亦恨之􅀽盎劉通至吳吳楚兵巳攻梁壁矣宗正以親故先入見諭吳王令拜受詔吳王聞􅀽盎來知其欲􅀃笑而應曰我巳爲東帝尚誰拜不肯見盎而留軍中欲劫使將盎不肯使人圍守且殺之盎得閒脫亡歸報太尉亞夫言於上曰楚兵剽輕難與爭鋒願以梁委之絶其食道乃可制也上許之亞夫乗六乗傳將㑹兵滎陽發至霸上趙渉遮􅀃亞夫曰吳王素富懷輯死士乆矣此知將軍且行必置閒人於殽澠阸陿之閒且兵事上神密將軍何不從此右去走藍田出武􅀜抵洛陽閒不過差一二日直入武庫擊鳴鼓諸矦聞之以爲將軍從天而下也太尉如其計至洛陽喜曰七國反吾乗傳至此不自意全今吾據滎陽滎陽以東無足憂者使吏搜殽澠閒果得吳伏兵乃請趙涉爲護軍太尉引兵東北走昌邑吳攻梁急梁數使使條矦求救條矦不許又使使愬條矦於上上使告條矦救梁亞夫不奉詔堅壁不出而使弓髙矦等將輕􅀐兵出淮泗口絶吳楚兵後塞其饟道梁使中大夫韓安國及楚相張尚弟羽爲將軍羽力戰安國持重乃得頗敗吳兵吳兵欲西梁城守不敢西即走條矦軍㑹下邑欲戰條矦堅壁不肯戰吳糧絶卒飢數挑戰終不出條矦軍中夜驚內相攻擊擾亂至帳下亞夫堅卧不起頃之復定吴犇壁東南陬亞夫使僃西北已而其精兵果犇西北不得入吳楚士卒多飢死叛散乃引而去二月亞夫出精兵追擊大破之吳王濞棄其軍與壯士數千人夜亡走楚王戊自殺吳王之初發也吳臣田禄伯爲大將軍田禄伯曰兵屯聚而西無它竒道難以立功臣願得五萬人别循江淮而上收淮南長沙入武􅀜與大王㑹此亦一竒也吴王太子諫曰王以反爲名此兵難以借人人亦且反王柰何且擅兵而别多它利害徒自損耳吳王即不許田禄伯吳少將􅁊將軍􅀃王曰吳多歩兵歩兵利險漢多車􅀐車􅀐利平地願大王所過城不下直去疾西據洛陽武庫食敖倉粟阻山河之險以令諸矦雖無入􅀜天下固已定矣大王徐行留下城邑漢軍車􅀐至馳入梁楚之郊事敗矣吳王問諸老將老將曰此年少推鋒可耳安知大慮於是王不用􅁊將軍計王專并將兵兵未度淮諸賔客皆得爲將校尉􅇋司馬獨周丘不用周丘者下邳人亡命吳酤酒無行王薄之不任周丘乃上謁􅀃王曰臣以無能不得待罪行閒臣非敢求有所將也願請王一漢節必有以報王乃予之周丘得節夜馳入下邳下邳時聞吳反皆城守至傳舎召令入户使從者以罪斬令遂召昆弟所善豪吏告曰吳反兵且至屠下邳不過食頃今先下家室必完能者封矦矣出乃相告下邳皆下周丘一夜得三萬人使人報吳王遂將其兵北略城邑比至陽城兵十餘萬破陽城中尉軍聞吳王敗走自度無與共成功即引兵歸下邳未至疽發背死壬午晦日有食之吳王之棄軍亡也軍遂潰往往稍降太尉條矦及梁軍吳王度淮走丹徒保東越兵可萬餘人收聚亡卒漢使人以利㗖東越東越即紿吳王出勞軍使人鏦殺吳王盛其頭馳傳以聞吳太子駒亡走閩越吳楚反凡三月皆破滅於是諸將乃以太尉謀爲是然梁王由此與太尉有􅂩三王之圍臨菑也齊王使路中大夫吿於天子天子復令路中大夫還報告齊王堅守漢兵今破吳楚矣路中大夫至三國兵圍臨菑數重無從入三國將與路中大夫盟曰若反言漢巳破矣齊趣下三國不且見屠路中大夫旣許至城下望見齊王曰漢巳發兵百萬使太尉亞夫擊破吳楚方引兵救齊齊必堅守無下三國將誅路中大夫齊􅀄圍急隂與三國通謀約未定㑹路中大夫從漢來其大臣乃復勸王無下三國㑹漢將欒布平陽矦等兵至齊擊破三國兵解圍巳後聞齊􅀄與三國有謀將欲移兵伐齊齊孝王懼飲藥自殺膠西膠東菑川王各引兵歸國膠西王徒跣席槀飲水謝太后王太子德曰漢兵還臣觀之巳罷可襲願收王餘兵擊之不勝而逃入海未晚也王曰吾士卒皆巳壊不可用弓髙矦韓頽當遺膠西王書曰奉詔誅不義降者赦除其辠復故不降者滅之王何處須以從事王肉祖叩頭詣漢軍壁謁曰臣卬奉灋不謹驚駭百姓乃苦將軍逺道至于窮國敢請菹醢之罪弓髙矦執金皷見之曰王苦軍事願聞王發兵狀王頓首䣛行對曰今者鼂錯天子用事臣變更髙皇帝灋令侵奪諸矦地卯等以爲不義恐其敗亂天下七國發兵且誅錯今聞錯巳誅卬等謹巳罷兵歸將軍曰王苟以錯爲不善何不以聞及未有詔虎符擅發兵擊義國以此觀之意非徒欲誅錯也乃出詔書爲王讀之曰王其自圖王曰如卬等死有餘罪遂自殺太后太子皆死膠東王菑川王濟南王皆伏誅酈將軍兵至趙趙王引兵還邯鄲城守酈􅀉攻之七月不能下匈奴聞吳楚敗亦不肯入邊欒布破齊還并兵引水灌趙城城壊王遂自殺帝以齊首善以迫劫有謀非其辠也召立齊孝王太子壽是爲懿王濟北王亦欲自殺幸全其妻子齊人公孫玃謂濟北王曰臣請試爲大王明􅀃梁王通意天子􅀃而不用死未晚也公孫玃遂見梁王曰夫濟北之地東接彊齊南牽吳越北脅燕趙此四分五裂之國權不足以自守勁不足以扞寇又非有竒怪云以待難也雖墜言於吴非其正計也鄕使濟北見情實示不從之端則吳必先歴齊畢濟北招燕趙而緫之如此則山東之從結而無􅂩矣今吳王連諸矦之兵􅇌白徒之衆西與天子爭衡濟北獨底節不下使吳失與而無助跬歩獨進瓦解土崩破敗而不救者未必非濟北之力也夫以區區之濟北而與諸矦爭彊是以羔犢之弱而扞虎狼之敵也守職不橈可謂誠一矣功義如此尚見疑於上脅肩低首累足撫衿使有自悔不前之心非社稷之利也臣恐藩臣守職者疑之臣竊料之能歷西山徑長樂抵未央攘􅃑而正議者獨大王耳上有全亡之功下有安百姓之名德淪於骨髓恩加於無窮願大王留意詳惟之孝王大􅀃使人馳以聞濟北王得不坐徙封於菑川河間王太傅衞綰擊吳楚有功拜爲中尉綰以中郎將事文帝醇謹無它上爲太子時召文帝左右飲而綰稱病不行文帝且崩屬上曰綰長者善遇之故上亦寵任焉夏六月乙亥詔吏民爲吳王濞等所詿誤當坐及逋逃亡軍者皆赦之帝欲以吳王弟德哀矦廣之子續吳以楚元王子禮續楚竇太后曰吳王老人也宜爲宗室順善今乃首率七國紛亂天下柰何續其後不許吳許立楚後乙亥徙淮陽王餘爲魯王汝南王非爲江都王王故吳地立宗正禮爲楚王立皇子端爲膠西王勝爲中山王四年春復置􅀜用傳出入夏四月己巳立子榮爲皇太子徹爲膠東王六月赦天下秋七月臨江王閼薨冬十月戊戌晦日有食之初吳楚七國反吳使者至淮南淮南王欲發兵應之其相曰王必欲應吳臣願爲將王乃屬之相巳將兵因城守不聽王而爲漢漢亦使曲城矦將兵救淮南以故得完吳使者至廬江廬江王不應而往來使越至衡山衡山王堅守無二心及吳楚巳破衡山王入朝上以爲貞信勞苦之曰南方卑濕徙王王於濟北以襃之廬江王以邊越數使使相交徙爲衡山王王江北五年春正月作陽陵邑夏募民徙陽陵賜錢二十萬遣公主嫁匈奴單于徙廣川王彭祖爲趙王濟北貞王勃薨六年冬十二月雷霖雨初上爲太子薄太后以薄氏女爲妃及即位爲皇后無寵秋九月皇后薄氏廢楚文王禮薨初燕王臧茶有孫女曰臧兒嫁爲槐里王仲妻生男信與兩女而仲死更嫁長陵田氏生男蚡勝文帝時臧兒長女爲金王孫婦生女俗臧兒卜筮之曰兩女皆當貴臧兒乃奪金氏婦金氏怒不肯予決内之太子宫生男徹徹方在身時王夫人夢日入其懐及帝即位長男榮爲太子其母栗􅁎齊人也長公主嫖欲以女嫁太子栗􅁎以後宫諸美人皆因長公主見帝故怒而不許長公主欲予王夫人男徹王夫人許之由是長公主日䜛栗􅁎而譽王夫人男之美帝亦自賢之又有曩者所夢日符計未有所定王夫人知帝嗛栗􅁎因怒未解隂使人趣大行請立栗􅁎爲皇后帝怒曰是而所宜言邪遂按誅大行七年冬十一月己酉廢太子榮爲臨江王太子太傅竇嬰力爭不能得乃謝病免栗􅁎恚恨而死庚寅晦日有食之二月丞相陶青免乙巳太尉周亞夫爲丞相罷太尉官夏四月乙巳立皇后王氏丁巳立膠東王徹爲皇太子是􅀊以太僕劉舎爲御史大夫濟南太守郅都爲中尉始都爲中郎將敢直諫嘗從入上林賈􅁎如厠野彘卒來入厠上目都都不行上欲自持兵救賈􅁎都伏上前曰亡一􅁎復一􅁎進天下所少寧賈􅁎等乎陛下縱自輕奈宗廟太后何上乃還彘亦去太后聞之賜都金百斤曰此重都都爲人勇悍公廉不發私書問遺無所受請謁無所聽及爲中尉先嚴酷行灋不避貴戚列矦宗室見都側目而視號曰蒼鷹中元年夏四月乙巳赦天下地震衡山原都雨雹大者尺八寸二年春二月匈奴入燕三月臨江王榮坐侵太宗廟壖垣爲宫徴詣中尉府對簿臨江王欲得刀筆爲書謝上而中尉郅都禁吏不予魏其矦使人閒與臨江王臨江王旣爲書謝上因自殺竇太后聞之怒後竟以危灋中都而殺之夏四月有星孛于西北立皇子越爲廣川王􅀉爲膠東王秋九月甲戌晦日有食之初梁孝王以至親有功得賜天子旌旗從千乗萬􅀐出蹕入警王寵信羊勝公孫詭以詭爲中尉勝詭多竒邪計欲使王求爲漢嗣栗太子之廢也太后意欲以梁王爲嗣嘗因置酒謂帝曰安車大駕用梁王爲􅀉帝跪席舉身曰諾罷酒帝以訪諸大臣大臣􅀽盎等曰不可昔宋宣公不立子而立弟以生禍亂五丗不絶小不忍害大義故春秋大居正由是太后議格遂不復言王又嘗上書願賜容車之地徑至長樂宫自使梁國士衆築作甬道朝太后􅀽盎等皆建以爲不可梁王由此怨􅀽盎及議臣乃與羊勝公孫詭謀隂使人刺殺􅀽盎及他議臣十餘人賊未得也於是天子意梁逐賊果梁所爲上遣田叔吕季主往按梁事捕公孫詭羊勝詭勝匿王後宫使者十餘輩至梁責二千石急梁相軒丘豹及內史韓安國以下舉國大索月餘弗得安國聞詭勝匿王所乃入見王而泣曰主辱者臣死大王無良臣故紛紛至此今勝詭不得請辭賜死王曰何至此安國泣數行下曰大王自度於皇帝孰與臨江王親王曰弗如也安國曰臨江王適長太子以一言過廢王臨江用宫垣事卒自殺中尉府何者治天下終不用私亂公今大王列在諸矦訹邪臣浮􅀃犯上禁橈明灋天子以太后故不忍致灋於大王太后日夜涕泣幸大王自改大王終不覺寤有如太后宫車即晏駕大王尚誰攀乎語未卒王泣數行而下謝安國曰吾今出勝詭王乃令勝詭皆自殺出之上由此怨望梁王梁王恐使鄒陽入長安見皇后兄王信􅀃曰長君弟得幸於上後宫莫及而長君行迹多不循道理者今􅀽盎事即窮竟梁王伏誅太后無所發怒切齒側目於貴臣竊爲足下憂之長君曰爲之柰何陽曰長君誠能精爲上言之得毋竟梁事長君必固自結於太后太后厚德長君入於骨髓而長君之弟幸於兩宫金城之固也昔者舜之弟象日以殺舜爲事及舜立爲天子封之於有卑夫仁人之於兄弟無藏怒無宿怨厚親愛而巳是以後世稱之以是􅀃天子徼幸梁事不奏長君曰諾乗閒入言之帝怒稍解是時太后憂梁事不食日夜泣不止帝亦患之㑹田叔等按梁事來還至霸昌廏取火悉燒梁之獄辭空手來見帝帝曰梁有之乎叔對曰死罪有之上曰其事安在田叔曰上毋以梁事爲問也上曰何也曰今梁王不伏誅是漢灋不行也伏灋而太后食不甘味卧不安席此憂在陛下也上大然之使叔等謁太后且曰梁王不知也造爲之者獨在幸臣羊勝公孫詭之屬爲之耳謹巳伏誅死梁王無恙也太后聞之立起坐餐氣平復梁王因上書請朝旣至􅀜茅蘭􅀃王使乗布車從兩􅀐入匿於長公主園漢使使迎王王巳入􅀜車􅀐盡居外不知王處太后泣曰帝果殺吾子帝憂恐於是梁王伏斧質於闕下謝罪太后帝大喜相泣復如故悉召王從官入􅀜然帝益䟽王不與同車輦矣帝以田叔爲賢擢爲魯相三年冬十一月罷諸矦御史大夫官夏四月地震旱禁酤酒三月丁巳立皇子乗爲淸河王秋九月蝗有星孛于西北戊戌晦日有食之初上廢栗太子周亞夫固爭之不得上由此䟽之而梁孝王每朝常與太后言條矦之短竇太后曰皇后兄王信可矦也帝讓曰始南皮章武先帝不矦及臣即位乃矦之信未得封也竇太后曰人生各以時行耳自竇長君在時竟不得矦死後其子彭祖顧得矦吾甚恨之帝趣矦信也帝曰請得與丞相議之上與丞相議亞夫曰髙皇帝約非劉氏不得王非有功不得矦今信雖皇后兄無功矦之非約也帝黙然而止其後匈奴王徐盧等六人降帝欲矦之以勸後丞相亞夫曰彼背主降陛下陛下矦之則何以責人臣不守節者乎帝曰丞相議不可用乃悉封徐盧等爲列矦亞夫因謝病九月戊戌亞夫免以御史大夫桃矦劉舎爲丞相四年夏蝗冬十月戊午日有食之五年夏立皇子舜爲常山王六月丁巳赦天下大水秋八月己酉未央宫東闕災九月詔諸獄疑若雖文致於灋而於人心不厭者輒讞之地震六年冬十月梁王來朝上䟽欲留上弗許王歸國意忽忽不樂十二月改諸廷尉將作等官名春二月乙卯上行幸雍郊五畤三月雨雪夏四月梁孝王薨竇太后聞之哭極哀不食曰帝果殺吾子帝哀懼不知所爲與長公主計之乃分梁爲五國盡立孝王男五人爲王買爲梁王明爲濟川王彭離爲濟東王定爲山陽王不識爲濟隂王女五人皆食湯沐邑奏之太后太后乃􅀃爲帝加一餐孝王未死時財以巨萬計及死藏府餘黃金尚四十餘萬斤他物稱是上旣減笞灋笞者猶不全乃更減笞三百曰二百笞二百曰一百又定箠令箠長五尺其本大一寸竹也末薄半寸皆平其節當笞者笞臋畢一罪乃更人自是笞者得全然死刑旣重而生刑又輕民易犯之六月匈奴入鴈門至武泉入上郡取􅁐馬吏卒戰死者二千人隴西李廣爲上郡太守嘗從百􅀐出卒遇匈奴數千􅀐見廣以爲誘􅀐皆驚上山陳廣之百􅀐皆大恐欲馳還走廣曰吾去大軍數十里今如此以百􅀐走匈奴追射我立盡今我留匈奴必以我爲大軍之誘必不敢擊我廣令諸􅀐曰前未到匈奴陳二里所止令曰皆下馬解鞍其􅀐曰虜多且近即有急柰何廣曰彼虜以我爲走今皆解鞍以示不走用堅其意於是胡􅀐遂不敢擊有白馬將出護其兵李廣上馬與十餘􅀐犇射殺白馬將而復還至其􅀐中解鞍令士皆縱馬卧是時㑹暮胡兵終怪之不敢擊夜半時胡兵亦以爲漢有伏軍於旁欲夜取之胡皆引兵而去平旦李廣乃歸其大軍秋七月辛亥晦日有食之自郅都之死長安左右宗室多暴犯灋上乃召濟南都尉南陽寗成爲中尉其治效郅都其廉弗如然宗室豪桀皆人人惴恐城陽共王喜薨後元年春正月詔曰獄重事也人有智愚官有上下獄疑者讞有司有司所不能決移廷尉讞而後不當讞者不爲失欲令治獄者務先寛三月赦天下夏大酺五日民得酤酒五月丙戌地震上庸地震二十二日壊城垣秋七月丙午丞相舎免乙巳晦日有食之八月壬辰以御史大夫衞綰爲丞相衞尉南陽直不疑爲御史大夫􅀄不疑爲郎同舎有告歸誤持其同舍郎金去巳而同舎郎覺亡意不疑不疑謝有之買金償後告歸者至而歸金亡金郎大慙以此稱爲長者稍遷至中大夫人或廷毀不疑以爲盗嫂不疑聞曰我乃無兄然終不自明也帝居禁中召周亞夫賜食獨置大胾無切肉又不置箸亞夫心不平顧謂尚席取箸上視而笑曰此非不足君所乎亞夫免冠謝上上曰起亞夫因趨出上目送之曰此鞅鞅非少主臣也居無何亞夫子爲父買工官尚方甲楯五百􅀍可以葬者取庸苦之不與錢庸知其盗買縣官器怨而上變告子事連汙亞夫書旣聞上下吏吏簿責亞夫亞夫不對上罵之曰吾不用也召詣廷尉廷尉責問曰君矦欲反何亞夫曰臣所買器乃葬器也何謂反乎吏曰君縱不欲反地上即欲反地下耳吏侵之益急􅀄吏捕亞夫亞夫欲自殺其夫人止之以故不得死遂入廷尉因不食五日歐血而死是􅀊濟隂哀王不識薨二年春正月地一日三動三月匈奴入鴈門太守馮敬與戰死發車􅀐材官屯鴈門春以􅀊不登禁内郡食馬粟没入之夏四月詔曰雕文刻鏤傷農事者也錦繡纂組害女工者也農事傷則飢之本女工害則寒之原也夫飢寒並至而能亡爲非者寡矣朕親耕后親桑以奉宗廟粢盛祭服爲天下先不受獻減太官省繇賦欲天下務農􅁞素有蓄積以僃災害彊毋攘弱衆毋暴寡老􅂄以壽終幼􅀌得遂長今􅀊或不登民食頗寡其咎安在或詐僞爲吏以貨賂爲市漁奪百姓侵牟萬民縣丞長吏也姦灋與盜盜甚無謂也其令二千石各脩其職不事官職耗亂者丞相以聞請其罪布告天下使明知朕意五月詔貲筭四得官秋大旱三年冬十月日月皆食赤五日十二月晦雷日如紫五星逆行守太微月貫天廷中􅊨春正月詔曰農天下之本也黄金珠玉飢不可食寒不可衣以爲幣用不識其終始閒􅀊或不登意爲末者衆農民寡也其令郡國務勸農桑益種樹可得衣食物吏發民若取庸采黄金珠玉者坐贓爲盜二千石聽者與同罪甲寅皇太子冠甲子帝崩于未央宫太子即皇帝位年十六尊皇太后爲太皇太后皇后爲皇太后二月癸酉葬孝景皇帝于陽陵三月封皇太后同母弟田蚡爲武安矦勝爲周陽矦班固贊曰孔子稱斯民也三代之所以直道而行也信哉周秦之敝罔密文峻而姦軌不勝漢興掃除煩苛與民休息至于孝文加之以㳟儉孝景遵業五六十載之閒至於移風易俗黎民醇厚周云成康漢言文景美矣漢興接秦之弊作業劇而財匱自天子不能具鈞駟而將相或乗牛車齊民無藏蓋天下巳平髙祖乃令賈人不得衣􅁝乗車重租稅以困辱之孝惠髙后時爲天下初定復㢮商賈之律然市井之子孫亦不得仕宦爲吏量吏禄度官用以賦於民而山川園池市井租稅之入自天子以至于封君湯沐邑皆各爲私奉養焉不領於天子之經費漕轉山東粟以給中都官􅀊不過數十萬石繼以孝文孝景清淨㳟儉安養天下七十餘年之閒國家無事非遇水旱之災民則人給家足都鄙廩􅁃皆滿而府庫餘貨財京師之錢累巨萬貫朽而不可校太倉之粟陳陳相因充溢露積於外至腐敗不可食衆庶街巷有馬而阡陌之閒成羣乗字牝者擯而不得聚㑹守閭閻者食粱肉爲吏者長子孫居官者以爲姓號故人人自愛而重犯灋先行義而後詘辱焉當此之時罔䟽而民富役財驕溢或至兼并豪黨之徒以武斷於鄉曲宗室有土公卿大夫以下爭于奢侈室廬輿服􅆫于上無限度物盛而衰固其變也自是之後孝武內窮侈靡外攘夷狄天下蕭然財力耗矣資治通鑑卷第十六
