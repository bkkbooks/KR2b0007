seq: 138
front:
  text: 知之劉昶數泣訴於魏主乞處邊戍招集遺民以雪私耻魏主大㑹公卿於經武殿以議南伐於淮泗間大積馬芻上聞之以右衛將軍崔慧景爲豫州刺史以備之
  hash: sha256:5677d6bd48f59c63b9b4fc8b5a186f9374f267aa2758df81527b7a65b49b501c
body:
  text: 魏遣貟外散􅀐侍郎邢巒等來聘巒潁之孫也丙子文惠太子長懋卒太子風韻甚和上晩年好遊宴尚書曹事分送太子省之由是威加內外太子性奢靡治堂殿園囿過於上宫費以千萬計恐上望見之乃傍門列脩竹凡諸服玩率多僣侈啓於東田起小􅁐使東宫將吏更畨築役營城包巷彌亘華逺上性雖嚴多布耳目太子所爲人莫敢以聞上甞過太子東田見其壯麗大怒收監作主帥太子皆藏之由是大被誚責又使嬖人徐文景造輦及乗輿御物上嘗幸東宫怱怱不暇藏輦文景乃以佛像内輦中故上不疑文景父陶仁謂文景曰我正當掃墓待喪耳仍移家避之後文景竟賜死陶仁遂不哭及太子卒上履行東宫見其服玩大怒敕有司隨事毁除以竟陵王子良與太子善而不啓聞并責之太子素惡西昌矦鸞嘗謂子良曰我意中殊不喜此人不解其故當由其福薄故也子良爲之救解及鸞得政太子子孫無遺焉二月魏主始耕藉田於平城南雍州刺史王奐惡寜蠻長史劉興祖收繫獄誣其構扇山蠻欲爲亂敕送興祖下建康奐於獄中殺之詐云自經上大怒遣中書舎人吕文顯直閣將軍曹道剛將齊仗五百人收奐敕鎮西司馬曹虎從江陵步道㑹襄陽奐子彪素㐫險奐不能制長史殷叡奐之壻也謂奐曰曹吕來既不見真敕恐爲姦變正宜録取馳啓聞耳奐納之彪輒發州兵千餘人開庫配甲仗出南堂陳兵閉門拒守奐門生鄭羽叩頭啓奐乞出城迎臺使奐曰我不作賊欲先遣啓自申正恐曹吕輩小人相陵藉故且閉門自守耳彪遂出與虎軍戰兵敗走歸三月乙亥司馬黄瑶起寜蠻長史河東裴叔業於城内起兵攻奐斬之執彪及弟爽弼殷叡皆伏誅彪况融琛死於建康琛弟祕書丞肅獨得脱奔魏夏四月甲午立南郡王昭業爲皇太孫東宫文武悉攺爲太孫官屬以太子妃琅邪王氏爲皇太孫太妃南郡王妃何氏爲皇太孫妃妃戢之女也魏太尉丕等請建中宫戊戌立皇后馮氏后熈之女也魏主以白虎通云王者不臣妻之父母下詔令太師上書不稱臣入朝不拜熈固辭光城蠻帥征虜將軍田益宗帥部落四千餘户叛降于魏五月壬戌魏主宴四廟子孫於宣文堂親與之齒用家人禮甲子魏主臨朝堂引公卿以下決疑政録囚徒帝謂司空穆亮曰自今朝廷政事日中以前卿等先自論議日中以後朕與卿等共决之丙子以宜都王鏗爲􅀯豫州刺史先是廬陵王子卿爲􅀯豫州刺史之鎮道中戲部伍爲水軍上聞之大怒殺其典籖以鏗代之子卿還第上終身不與相見襄陽蠻首雷婆思等帥戸千餘求内徙於魏魏人處之􅃆北魏主以平城地寒六月雨雪風沙常起將遷都洛陽恐群臣不從乃議大舉伐齊欲以脅衆齋於明堂左个使太常卿王諶筮之遇革帝曰湯武革命順乎天而應乎人吉孰大焉羣臣莫敢言尚書任城王澄曰陛下弈葉重光帝有中土今出師以征未服而得湯武革命之象未爲全吉也帝厲聲曰繇云大人虎變何言不吉澄曰陛下龍興巳乆何得今乃虎變帝作色曰社稷我之社稷任城欲沮衆邪澄曰社稷雖爲陛下之有臣爲社稷之臣安可知危而不言帝乆之乃解曰各言其志夫亦何傷既還宫召澄入見逆謂之曰嚮者革卦今當更與卿論之明堂之忿恐人人競言沮我大計故以聲色怖文武耳想識朕意因屏人謂澄曰今日之舉誠爲不易但國家興自朔土徙居平城此乃用武之地非可文治今將移風易俗其道誠難朕欲因此遷宅中原卿以爲何如澄曰陛下欲卜宅中土以經略四海此周漢之所以興隆也帝曰北人習常戀故必將驚擾柰何澄曰非常之事故非常人之所及陛下斷自聖心彼亦何所能爲帝曰任城吾之子房也六月丙戌命作河橋欲以濟師祕書監盧淵上表以爲前丗承平之主未嘗親御六軍決勝行陳之間豈非勝之不足爲武不勝有虧威望乎昔魏武以弊卒一萬破􅀽紹謝玄以步兵三千摧符秦勝負之變决於須􅁷不在衆寡也詔報曰承平之主所以不親戎事者或以同􅁤無敵或以懦劣偷安今謂之同􅁤則未然比之懦劣則可耻必若王者不當親戎則先王制革輅何所施也魏武之勝蓋由仗順符氏之敗亦由失政豈寡必能勝衆弱必能制彊邪丁未魏主講武命尚書李沖典武選建康僧法智與徐州民周盤龍等作亂夜攻徐州城入之刺史王􅀇邈討誅之秋七月癸丑魏立皇子恂爲太子戊子魏中外戒嚴發露布及移書稱當􅀯伐詔發揚徐州民丁廣設召募以備之中書郎王融自恃人地三十内望爲公輔嘗夜直省中撫案歡曰爲爾寂寂鄧禹笑人行逢朱雀桁開喧湫不得進搥車壁歎曰車前無八騶何得稱丈夫竟陵王子良愛其文學特親厚之融見上有北伐之志數上書奬勸因大習􅀐射及魏將入寇子良於東府募兵板融寜朔將軍使典其事融傾意招納得江西傖楚數百人並有幹用㑹上不豫詔子良甲仗入延昌殿侍醫藥子良以蕭衍范雲等皆爲帳内軍主戊辰遣江州刺史陳顯逹鎮樊城上慮朝野憂遑力疾召樂府奏正聲伎子良日夜在内太孫閒日參承戊寅上疾亟蹔絶太孫未入内外惶懼百僚皆巳變服王融欲矯詔立子良詔草巳立蕭衍謂范雲曰道路籍籍皆云將有非常之舉王元長非濟丗才視其敗也雲曰憂國家者唯有王中書耳衍曰憂國欲爲周召欲爲豎刁邪雲不敢荅及太孫來王融戎服絳衫於中書省閤口斷東宫仗不得進頃之上復􅂫問太孫所在因召東宫器甲皆入以朝事委尚書左僕射西昌矦鸞俄而上殂融處分以子良兵禁諸門鸞聞之急馳至雲龍門不得進鸞曰有敕召我排之而入奉太孫登殿命左右扶出子良指麾部署音響如鍾殿中無不從命融知不遂釋服還省歎曰公誤我由是􅊊林王􅀷怨之遺詔曰太孫進德日茂社稷有􅀉子良善相毗輔思􅀪治道内外衆事無大小悉與鸞參懐共下意尚書中事職務根本悉委右僕射王晏吏部尚書徐孝嗣軍旅之略委王敬則陳顯逹王廣之王􅀇邈沈文季張瓌薛淵等丗祖留心政事務揔大體嚴明有斷郡縣乆於其職長吏犯法封刃行誅故永明之丗百姓豐樂賊盜屏息然頗好遊宴華靡之事常言恨之未能頓遣鬱林王之未立也衆皆疑立子良口語喧騰武陵王曅於衆中大言曰若立長則應在我立嫡則應在太孫由是帝􅀷慿賴之直閤周奉叔曹道剛素爲帝心膂並使監殿中直衞少日復以道剛爲黄門郎初西昌矦鸞爲太祖所愛鸞性儉素車服儀從同於素士所居官名爲嚴能故丗祖亦重之丗祖遺詔使竟陵王子良輔政鸞知尚書事子良素仁厚不樂丗務乃更推鸞故遺詔云事無大小悉與鸞參懐子良之志也帝少養於子良妃􅀽氏慈愛甚著及王融有謀遂深忌子良大行出太極殿子良居中書省帝使虎賁中郎將潘敞領二百人仗屯太極西階以防之既成服諸王皆出子良乞停至山陵不許壬午稱遺詔以武陵王曅爲衞將軍與征􅀯大將軍陳顯逹並開府儀同三司尚書左僕射西昌矦鸞爲尚書令太孫詹事沈文季爲護軍癸未以竟陵王子良爲太􅀓蠲除三調及衆逋省御府及無用池田邸治減􅀜市征稅先是蠲原之詔多無事實督責如故是時西昌矦鸞知政恩信兩行衆皆恱之魏山陽景􅁊公尉元卒魏主使録尚書事廣陵王羽持節安撫六鎮發其突􅀐丁亥魏主辭永固陵己丑發平城􅀯伐步􅀐三十餘萬使太尉丕與廣陵王羽留守平城並加使持節羽曰太尉宜專節度臣正可爲副魏主曰老者之智少者之決汝無辭也以河􅀯王幹爲車􅀐大將軍都督􅀜右諸軍事又以司空穆亮安􅀯將軍盧淵平􅀯將軍薛㣧皆爲幹副衆合七萬出子午谷㣧辯之曽孫也鬱林王性辯慧美容止善應對哀樂過人丗祖由是愛之而矯情飾詐隂懐鄙慝與左右羣小共衣食同卧起始爲南郡王從竟陵王子良在西州文惠太子每禁其起居節其用度王密就冨人求錢無敢不與别作鑰鉤夜開西州後閤與左右至諸營署中淫宴師史仁祖侍書胡天翼相謂曰若言之二宫則其事未易若於營署爲異人所敺及犬物所傷豈直罪止一身亦當盡室及禍年各七十餘生寜足吝邪數日閒二人相繼自殺二宫不知也所愛左右皆逆加官爵䟽於黄紙使嚢盛帶之許􅀯面之日依此施行侍太子疾及居喪憂容號毀見者嗚咽裁還私室即歡笑酣飲常令女巫楊氏禱祀速求天位及太子卒謂由楊氏之力倍加敬信既爲太孫丗祖有疾又令楊氏禱祀時何妃猶在西州丗祖疾稍危太孫與何妃書紙中央作一大喜字而作三十六小喜字繞之侍丗祖疾言發淚下丗祖以爲必能負荷大業謂曰五年中一委宰相汝勿措意五年外勿復委人若自作無成無所多恨臨終執其手曰若憶翁當好作遂殂大斂始畢悉呼丗祖諸伎備奏衆樂即位十餘日即收王融下廷尉使中丞孔稚珪奏融險躁輕狡招納不逞誹謗朝政融求援於竟陵王子良子良憂懼不敢救遂於獄賜死時年二十七􅀄融欲與東海徐勉相識每託人召之勉謂人曰王君名髙望促難可輕􅗓衣􅅂俄而融及禍勉由是知名太學生㑹稽魏凖以才學爲融所賞融欲立子良凖鼓成其事太學生虞羲丘國賔竊相謂曰竟陵才弱王中書無斷敗在眼中矣及融誅召準入舎人省詰問惶懼而死舉體皆青時人以爲膽破壬寅魏主至肆州見道路民有跛眇者停駕慰勞給衣食終身大司馬安定王休執軍士爲盗者三人以徇於軍將斬之魏主行軍遇之命赦之休不可曰陛下親御六師將逺清江表今始行至此而小人巳爲攘盜不斬之何以禁姦帝曰誠如卿言然王者之體時有非常之澤三人罪雖應死而因縁遇朕雖違軍法可特赦之既而謂司徒馮誕曰大司馬執法嚴諸君不可不慎於是軍中肅然臣光曰人主之於其國譬猶一身視逺如視邇在境如在庭舉賢才以任百官修政事以利百姓則封域之内無不得其所矣是以先王黈纊塞耳前旒蔽明欲其廢耳目之近用推聦明於四逺也彼廢疾者宜養當命有司均之於境內今獨施於道路之所遇則所遺者多矣其爲仁也不亦微乎况赦罪人以橈有司之法尤非人君之體也惜也孝文魏之賢君而猶有是乎戊申魏主至并州并州刺史王襲治有聲跡境内安静帝嘉之襲教民多立銘置道側虚稱其美帝聞而問之襲對不以實帝怒降襲號二等九月壬子魏遣兼貟外散􅀐常侍勃海髙聦等來聘丁巳魏主詔車駕所經傷民秋稼者畒給榖五斛辛酉追尊文惠太子爲文皇帝廟號丗宗丗祖梓宫下渚帝於端門内奉辭輼輬車未出端門亟稱疾還内裁入閤即於内奉胡伎鞞鐸之聲響震内外丙寅葬武皇帝於景安陵廟號丗祖戊辰魏主濟河庚午至洛陽壬申詣故太學觀石經乙亥鄧至王像舒彭遣其子舊朝于魏且請傳位於舊魏主許之魏主自發平城至洛陽霖雨不止丙子詔諸軍前發丁丑帝戎服執鞭乗馬而出羣臣稽顙於馬前帝曰廟筭已定大軍將進諸公更欲何云尚書李沖等曰今者之舉天下所不願唯陛下欲之臣不知陛下獨行竟何之也臣等有其意而無其辭敢以死請帝大怒曰吾方經營天下期於混壹而卿等儒生屢疑大計斧􅃏有常卿勿復言策馬將出於是安定王休等並慇勤泣諌帝乃諭群臣曰今者興發不小動而無成何以示後朕丗居幽朔欲􅀯遷中土苟不􅀯伐當遷都於此王公以爲何如欲遷者左不欲者右安定王休等相帥如右南安王楨進曰成大功者不謀於衆今陛下苟輟􅀯伐之謀遷都洛邑此臣等之願蒼生之幸也羣臣皆呼萬歳時舊人雖不􅂅内徙而憚於南伐無敢言者遂定遷都之計李沖言於上曰陛下將定鼎洛邑宗廟宫室非可馬上行遊以待之願陛下暫還代都俟羣臣經營畢功然後備文物鳴和鸞而臨之帝曰朕將巡省州郡至鄴小停春首即還未宜歸北乃遣任城王澄還平城諭留司百官以遷都之事曰今日真所謂革也王其勉之帝以羣臣意多異同謂衞尉卿鎮􅀯將軍于烈曰卿意如何烈曰陛下聖略淵逺非愚淺所測若隱心而言樂遷之與戀舊適中半耳帝曰卿既不唱異即是肯同深感不言之益使還鎮平城曰留臺庶政一以相委烈栗磾之孫也先是北地民支酉聚衆數千起兵於長安城北石山遣使告梁州刺史隂智伯秦州民王廣亦起兵應之攻執魏刺史劉藻秦雍閒七州民皆響震衆至十萬各守堡壁以待齊救魏河􅀯王幹引兵擊之幹兵大敗支酉進至咸陽北濁谷穆亮與戰又敗隂智伯遣軍主席德仁等將兵數千與相應接酉等進向長安盧淵薛㣧等拒擊大破之降者數萬口淵唯誅首惡餘悉不問獲酉廣並斬之冬十月戊寅朔魏主如金墉城徵穆亮使與尚書李沖將作大匠董爾經營洛都己卯如河􅀯城乙酉如豫州癸巳舍于石濟乙未魏解嚴設壇於滑臺城東告行廟以遷都之意大赦起滑臺宫任城王澄至平城衆始聞遷都莫不驚駭澄援引古今徐以曉之衆乃開伏澄還報於滑臺魏主喜曰非任城朕事不成壬寅尊皇太孫太妃爲皇太后立妃爲皇后癸卯魏主如鄴城王肅見魏主於鄴陳伐齊之䇿魏主與之言不覺促席移晷自是器遇日隆親舊貴臣莫能間也魏主或屏左右與肅語至夜分不罷自謂君臣相得之晩尋除輔國將軍大將軍長史時魏主方議興禮樂變華風凡威儀文物多肅所定乙巳魏主遣安定王休帥從官迎家於平城辛亥封皇弟昭文爲新安王昭秀爲臨海王昭粲爲永嘉王魏主築宫於鄴西十一月癸亥徙居之御史中丞江淹劾奏前益州刺史劉悛梁州刺史隂智伯􅂍貨巨萬皆抵罪􅀄悛罷廣司二州傾貲以獻丗祖家無留儲在益州作金浴盆餘物稱是及鬱林王即位悛所獻減少帝怒收悛付廷尉欲殺之西昌矦鸞救之得免猶禁錮終身悛勔之子也資治通鑑卷第一百三十八
