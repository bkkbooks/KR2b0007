front:
  text: 令也於是光等請太子止哭立於東序于忠與黄門郎元昭扶太子西面哭十餘聲止光攝太尉奉策進璽綬太子跪受服衮冕之服御太極殿即皇帝位光等與夜直羣官立庭中北面稽首稱萬嵗昭遵之曽孫也髙后欲殺胡貴嬪中給事譙郡劉騰以告矦剛剛以告于忠忠問計於崔光光使置貴嬪於别所嚴加守衛由是貴嬪深徳四人戊午魏大赦己未悉召西伐東防兵驃騎大将軍廣平王懐扶疾入臨徑至太極西廡哀慟呼侍中黄門領軍二衛云身欲上殿哭大行又須入見主上衆皆愕然相視無敢對者崔光攘衰振杖引漢光武崩趙熹扶諸王下殿故事辭色甚厲聞者莫不稱善懐聲淚俱止曰侍中以古義裁我我敢不服遂還仍頻遣左右致謝先是髙肇擅權尤忌宗室有時望者太子太保任城王澄數為肇所譖懼不自全乃終日酣飲所為如狂朝廷機要無所􅀜豫及世宗殂肇擁兵於外朝野不安于忠與門下議以肅宗幼未能親政宐使太保髙陽王雍入居西柏堂省決庶政以任城王澄為尚書令揔攝百揆奏皇后請即敕授王顯素有寵於世宗恃勢使威為世所疾恐不為澄等所容與中常侍孫伏連等密謀寢門下之奏矯皇后令以髙肇録尚書事以顯與勃海公髙猛同為侍中于忠等聞之託以侍療無效執顯於禁中下詔削爵任顯臨執呼寃直閤以刀鐶撞其掖下送右衛府一宿而死庚申下詔如門下所奏百官揔已聴於二王中外悦服二月庚辰尊皇后為皇太后魏主稱名為書告哀於髙肇且召之還肇承變憂懼朝夕哭泣至于羸悴歸至瀍澗家人迎之不與相見辛巳至闕下衰服號哭升太極殿盡哀髙陽王雍與于忠密謀伏直寢邢豹等十餘人於舍人省下肇哭畢引入西廡清河諸王皆竊言目之肇入省豹等搤殺之下詔暴其罪惡稱肇自盡自餘親黨悉無所問削除職爵葬以士禮逮昏於厠門出尸歸其家魏之伐蜀也軍至晉夀蜀人震恐傅豎眼将步兵三萬擊巴北上遣寧州刺史任太洪自隂平間道入其州招誘氐蜀絶魏運路㑹魏大軍北還太洪襲破魏東洛除口二戍聲言梁兵繼至氐蜀翕然從之太洪進圍闗城豎眼遣統軍姜喜等擊太洪大破之太洪弃闗城走還
