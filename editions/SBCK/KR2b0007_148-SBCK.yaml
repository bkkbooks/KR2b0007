body:
  text: 癸未魏以髙陽王雍為太傅領太尉清河王懌為司徒廣平王懐為司空甲午魏葬宣武皇帝于景陵廟號世宗己亥尊胡貴嬪為皇太妃三月甲辰朔以髙太后為尼徙居金墉瑶光寺非大節慶不得入宫魏左僕射郭祚表稱蕭衍狂悖謀斷川瀆役苦民勞危亡已兆宐命将出師長驅撲討魏詔平南将軍楊大眼督諸軍鎮荆山魏于忠既居門下又揔宿衛遂專朝政權傾一時初太和中軍國多事髙祖以用度不足百官之禄四分減一忠悉命歸所減之禄舊制民税絹一匹别輸綿八兩布一匹别輸麻十五斤忠悉罷之乙丑詔文武羣官各進位一級夏四月浮山堰成而復潰或言蛟龍能乗風雨破堰其性惡鐵乃運東西冶鐵器數千萬斤沈之亦不能合乃伐樹為井幹填以巨石加土其上縁淮百里内木石無巨細皆盡負檐者肩上皆穿夏日疾疫死者相枕蠅蟲晝夜聲合魏梁州刺史薛懐吉破叛氐於沮水懐吉真度之子也五月甲寅南秦州刺史崔暹又破叛氐解武興之圍六月魏冀州沙門灋慶以妖幻惑衆與勃海人李歸伯等作亂推灋慶為主灋慶以尼惠暉為妻以歸伯為十住菩薩平魔軍司定漢王自號大乗又合任藥令人服之父子兄弟不復相識唯以殺害為事刺史蕭寶寅遣兼長史崔伯驎擊之伯驎敗死賊衆益盛所在毁寺舍斬僧尼燒經像云新佛出世除去衆魔秋七月丁未詔假右光禄大夫元遥征北大将軍以討之魏尚書裴植自謂人門不後王肅以朝廷處之不髙意常怏怏表請解官隠嵩山世宗不許深怪之及為尚書志氣驕滿每謂人曰非我須尚書尚書亦須我每入參議論好面譏毁羣官又表征南将軍田益宗言華夷異類不應在百世衣冠之上于忠元昭見之切齒尚書左僕射郭祚冒進不已自以東宫師傅列辭尚書望封矦儀同詔以祚為都督雍岐華三州諸軍事征西将軍雍州刺史祚與植皆惡于忠專横密勸髙陽王雍使出之忠聞之大怒令有司誣奏其罪尚書奏羊祉告植姑子皇甫仲達云受植㫖詐稱被詔帥合部曲欲圖于忠臣等窮治辭不伏引然衆證明昞準律當死衆證雖不見植皆言仲達為植所使植召仲達責問而不告列推論情狀不同之理不可分明不得同之常獄有所降減計同仲達處植死刑植親帥城衆附從王化依律上議乞賜裁處忠矯詔曰凶謀既爾罪不當恕雖有歸化之誠無容上議亦不須待秋分八月己亥植與郭祚及都水使者杜陵韋儁皆賜死儁祚之昏家也忠又欲殺髙陽王雍崔光固執不從乃免雍官以王還第朝野􅁈憤莫不切齒丙子魏尊胡太妃爲皇太后居崇訓宫于忠領崇訓衛尉劉騰為崇訓太僕加侍中矦剛為侍中撫軍将軍又以太后父國珍為光禄大夫庚辰定州刺史田超秀帥衆三千降魏戊子魏大赦己丑魏清河王懌進位太傅領太尉廣平王懷為太保領司徒任城王澄為司空庚寅魏以車騎大将軍于忠為尚書令特進崔光為車騎大将軍並加儀同三司魏江陽王繼熙之曽孫也先為青州刺史坐以良人為婢奪爵繼子义娶胡太后妹壬辰詔復繼本封以义為通直散騎侍郎义妻為新平郡君仍拜女侍中羣臣奏請皇太后臨朝稱制九月乙未靈太后始臨朝聽政猶稱令以行事羣臣上書稱殿下太后聦悟頗好讀書屬文射能中針孔政事皆手筆自决加胡國珍侍中封安定公自郭祚等死詔令生殺皆出于忠王公畏之重足脅息太后既親政乃解忠侍中領軍崇訓衛尉止為儀同三司尚書令後旬餘太后引門下侍官於崇訓宫問曰忠在端右聲望何如咸曰不稱厥任乃出忠為都督冀定瀛三州諸軍事征北大将軍冀州刺史以司空澄領尚書令澄奏安定公宐出入禁中參諮大務詔從之甲寅魏元遥破大乗賊擒灋慶并渠帥百餘人傳首洛陽左遊擊将軍趙祖悦襲魏西硤石據之以逼夀陽更築外城徙縁淮之民以實城内将軍田道龍等散攻諸戍魏揚州刺史李崇分遣諸将拒之癸亥魏遣假鎮南将軍崔亮攻西硤石又遣鎮東将軍蕭寶寅决淮堰冬十月乙酉魏以胡國珍為中書監儀同三司侍中如故甲午􅀪化太守杜桂舉郡降魏初魏于忠用事自言世宗許其優轉太傅雍等皆不敢違加忠車騎大将軍忠又自謂新故之際有定社稷之功諷百僚令加己賞雍等議封忠常山郡公忠又難於獨受乃諷朝廷同在門下者皆加封邑雍等不得已復封崔光為博平縣公而尚書元昭等上訴不已太后敕公卿再議太傅懌等上言先帝升遐奉迎乗輿侍衛省闥乃臣子常職不容以此為功臣等前議授忠茅土正以畏其威權茍免暴戾故也若以功過相除悉不應賞請皆追奪崔光亦奉送章綬茅土表十餘上太后從之髙陽王雍上表自劾稱臣初入柏堂見詔㫖之行一由門下臣出君行深知不可而不能禁于忠專權生殺自恣而臣不能違忠規欲殺臣賴在事執拒臣欲出忠於外在心未行返為忠廢忝官尸禄孤負恩私請返私門伏聴司敗太后以忠有保䕶之功不問其罪十二月辛丑以雍為太師領司州牧尋復録尚書事與太傅懌太保懐侍中胡國珍入居門下同釐庶政己酉魏崔亮至硤石趙祖恱逆戰而敗閉城自守亮進圍之丁卯魏主及太后謁景陵是冬寒甚淮泗盡凍浮山堰士卒死者什七八魏益州刺史傅豎眼性清素民獠懐之龍驤将軍元灋僧代豎眼為益州刺史素無治幹加以貪殘王賈諸姓本州士族灋僧皆召為兵葭萌民任令宗因衆心之患魏也殺魏晉夀太守以城來降民獠多應之益州刺史鄱陽王恢遣巴西梓潼二郡太守張齊将兵三萬迎之灋僧熙之曽孫也魏岐州刺史趙王謐幹之子也為政暴虐一旦閉城門大索執人而掠之楚毒備至又無故斬六人闔城兇懼衆遂大呼屯門謐登樓毁梯以自固胡太后遣遊擊将軍王靖馳馹諭城人城人開門謝罪奉送管籥乃罷謐刺史謐妃太后從女也至洛除大司農卿太后以魏主尚幼未能親祭欲代行祭事禮官博議以為不可太后以問侍中崔光光引漢和熹鄧太后祭宗廟故事太后大悦遂攝行祭事魏南荆州刺史桓叔興表請不􅀠東荆州許之十五年春正月戊辰朔魏大赦改元熙平魏崔亮攻硤石未下與李崇約水陸並進崇屢違期不至胡太后以諸将不壹乃以吏部尚書李平為使持節鎮軍大将軍兼尚書右僕射将步騎二千赴夀陽别為行臺節度諸軍如有乖異以軍灋從事蕭寶寅遣輕車将軍劉智文等渡淮攻破三壘二月乙巳又敗將軍垣孟孫等於淮北李平至硤石督李崇崔亮等刻日水陸進攻無敢乖互戰屢有功上使左衛將軍昌義之將兵救浮山未至康絢已擊魏兵却之上使義之與直閤王神念泝淮救硤石崔亮遣将軍博陵崔延伯守下蔡延伯與别将伊甕生夾淮為營延伯取車輪去輞削鋭其輻兩兩接對揉竹為絙貫連相屬並十餘道横水為橋兩頭施大鹿盧出沒随意不可燒斫既斷趙祖恱走路又令戰艦不通義之神念屯梁城不得進李平部分水陸攻硤石克其外城乙丑祖悦出降斬之盡俘其衆胡太后賜崔亮書使乗勝深入平部分諸将水陸竝進攻浮山堰亮違平節度以疾請還隨表輒發平奏處亮死刑太后令曰亮去留自擅違我經略雖有小捷豈免大咎但吾攝御萬機庶幾惡殺可特聽以功補過魏師遂還魏中尉元匡奏彈于忠幸國大災專擅朝命裴郭受寃宰輔黜辱又自矯㫖為儀同三司尚書令領崇訓衛尉原其此意欲以無上自處既事在恩後宐加顯戮請遣御史一人就州行决自去嵗世宗晏駕以後皇太后未親覽以前諸不由階級或􅀤門下詔書或由中書宣敕擅相拜授者已經恩宥正可免罪竝宐追奪太后令曰忠已䝉特原無宐追罪餘如奏匡又彈侍中矦剛掠殺羽林剛本以善烹調為嘗食典御凡三十年以有徳於太后頗專恣用事王公皆畏附之廷尉處剛大辟太后曰剛因公事掠人邂逅致死於律不坐少卿陳郡􅀽飜曰邂逅謂情狀巳露隠避不引考訊以理者也今此羽林問則具首剛口唱打殺撾築非理安得謂之邂逅太后乃削剛戸三百解嘗食典御三月戊戌朔日有食之魏論西硤石之功辛未以李崇為驃騎将軍加儀同三司李平為尚書右僕射崔亮進號鎮北将軍亮與平争功於禁中太后以亮為殿中尚書魏蕭寶寅在淮堰上為手書誘之使襲彭城許送其國廟及室家諸從還北寶寅表上其書於魏朝夏四月淮堰成長九里下廣一百四十丈上廣四十五丈髙二十丈樹以􅂎栁軍壘列居其上或謂康絢曰四瀆天所以節宣其氣不可久塞若鑿湬東注則游波寛緩堰得不壊絢乃開湬東注又縱反間於魏曰梁人所懼開湬不畏野戰蕭寶寅信之鑿山深五丈開湬北注水日夜分流猶不減魏軍竟罷歸水之所及夾淮方數百里李崇作浮橋於硤石戍間又築魏昌城於八公山東南以備夀陽城壊居民散就岡壟其水清澈俯視廬舍冢墓了然在下初堰起於徐州境内刺史張豹子宣言謂己必掌其事既而康絢以他官來監作豹子甚慙俄而敕豹子受絢節度豹子遂譖絢與魏交通上雖不納猶以事畢徵絢還魏胡太后追思于忠之功曰豈宐以一謬弃其餘勲復封忠為靈夀縣公亦封崔光為平恩縣矦魏元灋僧遣其子景隆将兵拒張齊齊與戰於葭萌大破之屠十餘城遂圍武興灋僧嬰城自守境内皆叛灋僧遣使間道告急於魏魏驛徴鎮南軍司傅豎眼於淮南以為益州刺史西征都督将兵騎三千以赴之豎眼入境轉戰三日行二百餘里九遇皆捷五月豎眼擊殺梁州刺史任太洪民獠聞豎眼至皆喜迎拜於路者相繼張齊退保白水豎眼入州白水以東民皆安業魏梓潼太守茍金龍領闗城戍主梁兵至金龍疾病不堪部分其妻劉氏帥厲城民乗城拒戰百有餘日士卒死傷過半戍副髙景謀叛劉氏斬景及其黨與數千人自餘将士分衣減食勞逸必同莫不畏而懐之井在城外為梁兵所據會天大兩劉氏命出公私布絹及衣服懸之絞而取水城中所有雜物悉儲之豎眼至梁兵乃退魏人封其子為平昌縣子六月庚子以尚書令王瑩為左光禄大夫開府儀同三司尚書右僕射袁昂為左僕射吏部尚書王暕為右僕射暕儉之子也張齊數出白水侵魏葭萌傅豎眼遣虎威将軍强蚪攻信義将軍楊興起殺之復取白水寧朔将軍王光昭又敗於隂平張齊親帥驍勇工萬餘人與傅豎眼戰秋七月齊軍大敗走還小劒大劒諸戍皆弃城走東益州復入于魏八月乙巳魏以胡國珍為驃騎大将軍開府儀同三司雍州刺史國珍年老太后實不欲令出上欲示以方面之榮竟不行康絢既還張豹子不復修淮堰九月丁丑淮水暴漲堰壊其聲如雷聞三百里縁淮城戍村落十餘萬口皆漂入海初魏人患淮堰以任城王澄為大将軍大都督南討諸軍事勒衆十萬将出徐州來攻堰尚書右僕射李平以為不假兵力終當自壊及聞破太后大喜賞平甚厚澄遂不行壬辰大赦魏胡太后數幸宗戚勲貴之家侍中崔光表諫曰禮諸矦非問疾弔喪而入諸臣之家謂之君臣為謔不言王后夫人明無適臣家之義夫人父母在有歸寧沒則使卿寧漢上官皇后将廢昌邑霍光外祖也親為宰輔后猶御武帳以接羣臣示男女之别也今帝族方衍勲貴增遷祇請遂多将成彞式願陛下簡息遊幸則率土屬賴含生仰恱矣任城王澄以北邊鎮将選舉彌輕恐賊虜闚邉山陵危迫奏求重鎮将之選修警僃之嚴詔公卿議之廷尉少卿袁飜議以為比縁邊州郡官不擇人唯論資級或值貪汚之人廣開戍邏多置帥領或用其左右姻親或受人貨財請屬皆無防冦之心唯有聚歛之意其勇力之兵驅令抄掠若值彊敵即為奴虜如有執獲奪為己富其羸弱老小之輩微解金鐵之工少閑草木之作無不搜營窮壘苦役百端自餘或伐木深山或芸草平陸販貿徃還相望道路此等禄既不多貲亦有限皆收其實絹給其虚粟窮其力薄其衣用其功節其食綿冬歴夏加之疾苦死於溝瀆者什常七八是以鄰敵伺間擾我疆埸皆由邊任不得其人故也愚謂自今已後南北邊諸藩及所統郡縣府佐統軍至于戍主皆令朝臣王公己下各舉所知必選其才不拘階級若稱職及敗官并所舉之人随事賞罰太后不能用及正光之末北邊盜賊羣起遂逼舊都犯山陵如澄所慮冬十一月交州刺史李畟斬交州反者阮宗孝傳首建康初魏世宗作瑶光寺未就是嵗胡太后又作永寧寺皆在宫側又作石窟寺於伊闕口皆極土木之美而永寧尤盛有金像髙丈八尺者一如中人者十玉像二為九層浮圖掘地築基下及黄泉浮圖髙九十丈上刹復髙十丈每夜静鈴鐸聲聞十里佛殿如太極殿南門如端門僧房千間珠玉錦繡駭人心目自佛法入中國塔廟之盛未之有也楊州刺史李崇上表以為髙祖遷都垂三十年明堂未修太學荒廢城闕府寺頗亦頽壊非所以追隆堂構儀刑萬國者也今國子雖有學官之名而無教授之實何異兔絲鷰麥南箕北斗事不兩興須有進退宐罷尚方雕靡之作省永寧土木之功減瑶光材瓦之力分石窟鐫琢之勞及諸事役非急者於三時農隙修此數條使國容嚴顯禮化興行不亦休哉太后優令荅之而不用其言太后好事佛民多絶户為沙門髙陽王友李瑒上言三千之罪莫大於不孝不孝之大無過於絶祀豈得輕縱背禮之情肆其向法之意一身親老弃家絶養缺當丗之禮而求将來之益孔子云未知生焉知死安有弃堂堂之政而從鬼教乎又今南服未静衆役仍煩百姓之情實多避役若復聴之恐捐弃孝慈比屋皆為沙門矣都統僧暹等忿瑒謂之鬼教以為謗佛泣訴於太后太后責之瑒曰天曰神地曰祗人曰鬼傳曰明則有禮樂幽則有鬼神然則明者為堂堂幽者為鬼教佛本出於人名之為鬼愚謂非謗太后雖知瑒言為允難違暹等之意罰瑒金一兩魏征南大将軍田益宗求為東豫州刺史以招二子太后不許竟卒於洛陽柔然伏跋可汗壯健善用兵是嵗西擊髙車大破之執其王彌俄突繫其足於駑馬頓曳殺之漆其頭為飲器鄰國先羈屬柔然後叛去者伏跋皆擊滅之其國復彊十六年春正月辛未上祀南郊魏大乗餘賊復相聚突入瀛州刺史宇文福之子員外散騎侍郎延帥奴客拒之賊燒齋閤延突火抱福出外肌髮皆焦勒衆苦戰賊遂散走追討平之甲戌魏大赦魏初民間皆不用錢髙祖太和十九年始鑄太和五銖錢遣錢工在所鼓鑄民有欲鑄錢者聽就官鑪銅必精練無得殽雜世宗永平三年又鑄五銖錢禁天下用錢不依準式者既而洛陽及諸州鎮所用錢各不同商貨不通尚書令任城王澄上言以為不行之錢律有明式指謂雞眼鐶鑿更無餘禁計河西諸州今所行者悉非制限昔來繩禁愚竊惑焉又河北既無新錢復禁舊者專以單􅁝之縑踈縷之布狹幅促度不中常式裂匹為尺以濟有無徒成杼軸之勞不免飢寒之苦殆非所以救恤凍餒子育黎元之意也錢之為用貫繦相屬不假度量平均簡易濟世之宐謂為深允乞並下諸方州鎮其太和與新鑄五銖及古諸錢方俗所便用者但内外全好雖有大小之異並得通行貴賤之差自依鄉價庶貨環海内公私無壅其雞眼環鑿及盗鑄毁大為小生新巧偽不如法者據律罪之詔從之然河北少錢民猶用物交易錢不入市魏人多竊冒軍功尚書左丞盧同閲吏部勲書因加檢覈得竊階者三百餘人乃奏乞揔集吏部中兵二局勲簿對句奏案更造兩通一闗吏部一留兵局又在軍斬首成一階以上者即令行臺軍司給劵當中豎裂一支付勲人一支送門下以防偽巧太后從之同玄之族孫也中尉元匡奏請取景明元年已來内外考簿吏部除書中兵勲案并諸殿最欲以案校竊階盜官之人太后許之尚書令任城王澄表以為灋忌煩苛治貴清約御史之體風聞是司若聞有冒勲妄階止應攝其一簿研檢虚實繩以典刑豈有移一省之案尋兩紀之事如此求過誰堪其罪斯實聖朝所宐重慎也太后乃止又以匡所言數不從慮其辭解欲奨安之乃加鎮東将軍二月丁未立匡為東平王三月丙子敕織官文錦不得為仙人鳥獸之形為其裁剪有乖仁恕丁亥魏廣平文穆王懐卒夏四月戊申魏以中書監胡國珍為司徒詔以宗廟用牲牢有累冥道宐皆以麵為之於是朝野諠譁以為宗廟去牲乃是不復血食帝竟不從八坐乃議以大脯代一元大武秋八月丁未詔魏太師髙陽王雍入居門下參决尚書奏事冬十月詔以宗廟猶用脯脩更議代之於是以大餅代大脯其餘盡用蔬果又起至敬殿景陽臺置七廟座每月中再設浄饌乙夘魏詔北京士民未遷者悉聴留居為永業十一月甲子巴州刺史牟漢寵叛降魏十二月柔然伏跋可汗遣俟近尉比建等請和於魏用敵國之禮是嵗以右衛将軍馮道根為豫州刺史道根謹厚木訥行軍能檢敕士卒諸将争功道根獨黙然為政清簡吏民懐之上嘗歎曰道根所在令朝廷不復憶有一州魏尚書崔亮奏請於王屋等山採銅鑄錢從之是後民多私鑄錢稍薄小用之益輕十七年春正月甲子魏以氐酋楊定為隂平王魏秦州羌反二月癸巳安成康王秀卒秀雖與上布衣昆弟及為君臣小心畏敬過於踈賤上益以此賢之秀與弟始興王憺尤相友愛憺乆為荆州剌史常中分其禄以給秀秀稱心受之亦不辭多也甲辰大赦己酉魏大赦改元神􅀛魏東益州氐反魏主引見柔然使者讓之以藩禮不備議依漢待匈奴故事遣使報之司農少卿張倫上表以為太祖經啓帝圖日有不暇遂令豎子遊魂一方亦由中國多虞急諸華而緩夷狄也髙祖亦事南轅未遑北伐世宗述遵遺志虜使之來受而弗答以為大明臨御國富兵彊抗敵之禮何憚而為之何求而行之今虜雖慕徳而來亦欲觀我彊弱若使王人銜命虜庭與為昆弟恐非祖宗之意也茍事不獲已應為制詔示以上下之儀命宰臣致書諭以歸順之道觀其從違徐以恩威進退之則王者之體正矣豈可以戎狄兼并而遽虧典禮乎不從倫白澤之子也三月辛未魏壽靈武敬公于忠卒魏南秦州氐反遣龍驤将軍崔襲持節諭之夏四月丁酉魏秦文宣公胡國珍卒贈假黄鉞相國都督中外諸軍事太師號曰太上秦公加九鍚葬以殊禮贈禭儀衛事極優厚又迎太后母皇甫氏之柩與國珍合葬謂之太上秦孝穆君諫議大夫常山張普惠以為前世后父無稱太上者太上之名不可施於人臣詣闕上䟽陳之左右莫敢為通會胡氏穿壙下有磐石乃密表以為天無二日土無二王太上者因上而生名也皇太后稱令以繫敕下蓋取三從之道逺同文母列於十亂今司徒為太上恐乖繫敕之意孔子稱必也正名乎比克吉定兆而以淺改卜亦或天地神靈所以垂至戒啓聖情也伏願停逼上之號以邀謙光之福太后乃親至國珍宅召集五品以上愽議王公皆希太后意爭詰難普惠普惠應機辨析無能屈者太后使元义宣令於普惠曰朕之所行孝子之志卿之所陳忠臣之道羣公已有成議卿不得苦奪朕懐後有所見勿難言也太后為太上君造寺壯麗埒於永寧尚書奏復徵民綿麻之税張普惠上䟽以為髙祖廢大斗去長尺改重稱以愛民薄賦知軍國須綿麻之用故於絹増税綿八兩於布増税麻十五斤民以稱尺所減不啻綿麻故鼓舞供調自兹以降所税絹布浸復長濶百姓嗟怨聞於朝野宰輔不尋其本在於幅廣度長遽罷綿麻既而尚書以國用不足復欲徵歛去天下之大信弃巳行之成詔追前之非遂後之失不思庫中大有綿麻而羣臣共竊之也何則所輸之物或斤羨百銖未聞有司依律以罪州郡或小有濫惡則坐户主連及三長是以在庫絹布踰制者多羣臣受俸人求長濶厚重無復準極未聞以端幅有餘還求輸官者也今欲復調綿麻當先正稱尺明立嚴禁無得放溢使天下知二聖之心愛民惜灋如此則太和之政復見於神􅀛矣普惠又以魏主好遊騁苑囿不親視朝過崇佛灋郊廟之事多委有司上䟽切諫以為殖不思之􅄀業損巨費於生民減禄削力近供無事之僧崇飾雲殿逺邀未然之報昧爽之臣稽首於外玄寂之衆遨遊於内愆禮忤時人靈未穆愚謂修朝夕之因求祗劫之果未若收萬國之懽心以事其親使天下和平災害不生也伏願淑慎威儀為萬邦作式躬致郊廟之䖍親紆朔望之禮釋奠成均竭心千畒量撤僧寺不急之華還復百官乆折之秩已造者務令簡約速成未造者一切不復更為則孝悌可以通神明徳教可以光四海節用愛人灋俗俱賴矣尋敕外議釋奠之禮又自是每月一陛見羣臣皆用普惠之言也普惠復表論時政得失太后與帝引普惠於宣光殿隨事詰難臨川王宏妾弟吳灋夀殺人而匿於宏府中上敕宏出之即日伏辜南司奏免宏官上注曰愛宏者兄弟私親免宏者王者正灋所奏可五月戊寅司徒驃騎大将軍揚州刺史臨川王宏免宏自洛口之敗常懐愧憤都下每有竊􅀤輒以宏為名屢為有司所奏上每赦之上幸光宅寺有盜伏於驃騎航待上夜出上将行心動乃於朱雀航過事􅀤稱為宏所使上泣謂宏曰我人才勝汝百倍當此猶恐不堪汝何為者我非不能為漢文帝念汝愚耳宏頓首稱無之故因匿灋夀免宏官宏奢僣過度殖貨無厭庫屋垂百間在内堂之後闗籥甚嚴有疑是鎧仗者密以聞上於友愛甚厚殊不悦佗日送盛饌與宏愛妾江氏曰當來就汝懽宴獨攜故人射聲校尉丘佗卿徃與宏及江大飲半醉後謂曰我今欲履行汝後房即呼輿徑徃堂後宏恐上見其貨賄顔色怖懼上意益疑之於是屋屋檢視每錢百萬為一聚黄牓標之千萬為一庫懸一紫標如此三十餘間上與佗卿屈指計見錢三億餘萬餘屋貯布絹絲綿漆蜜紵蠟等雜貨但見滿庫不知多少上始知非仗大悦謂曰阿六汝生計大可乃更劇飲至夜舉燭而還兄弟方更敦睦宏都下有數十邸出懸錢立券每以田宅邸店懸上文契期訖便驅券主奪其宅都下東土百姓失業非一上後知之制懸券不得復驅奪自此始侍中領軍将軍吳平矦昺雅有風力為上所重軍國大事皆與議决以為安右将軍監揚州昺自以越親居揚州涕泣懇讓上不許在州尤稱明斷符教嚴整辛巳以宏為中軍将軍中書監六月乙酉又以本號行司徒臣光曰宏為将則覆三軍為臣則涉大逆髙祖貸其死罪可矣數旬之間還為三公於兄弟之恩誠厚矣王者之灋果安在哉初洛陽有漢所立三字石經雖屢經喪亂而初無損失及魏馮熙常伯夫相繼為洛州刺史毁取以建浮圖精舍遂大致頽落所存者委於榛莽道俗隨意取之侍中領國子祭酒崔光請遣官守視命國子愽士李郁等補其殘缺胡太后許之會元义劉騰作亂事遂寢秋七月魏河州羌却鐵忽反自稱水池王詔以主客郎源子恭為行臺以討之子恭至河州嚴勒州郡及諸軍母得犯民一物亦不得輕與賊戰然後示以威恩使知悔懼八月鐵忽等相帥詣子恭降首尾不及二旬子恭懐之子也魏宦者劉騰手不解書而多姦謀善揣人意胡太后以其保䕶之功累遷至侍中右光禄大夫遂干預政事納賂為人求官無不效者河間王琛簡之子也為定州刺史以貪縱著名及罷州還太后詔曰琛在定州唯不将中山宫來自餘無所不致何可更復叙用遂廢于家琛乃求為騰養息賂騰金寶巨萬計騰為之言於太后得兼都官尚書出為秦州刺史會騰疾篤太后欲及其生而貴之九月癸未朔以騰爲衛將軍加儀同三司魏胡太后以天文有變欲以崇憲髙太后當之戊申夜髙太后暴卒冬十月丁夘以尼禮葬於北邙諡曰順皇后百官單衣邪巾送至墓所事訖而除乙亥以臨川王宏為司徒魏胡太后遣使者宋雲與比丘惠生如西域求佛經司空任城王澄奏昔髙祖遷都制城内唯聴置僧尼寺各一餘皆置於城外蓋以道俗殊歸欲其浄居塵外故也正始三年沙門統惠深始違前禁自是卷詔不行私謁彌衆都城之中寺踰五百占奪民居三分且一屠沽塵穢連比雜居往者代北有灋秀之謀冀州有大乗之變太和景明之制非徒使緇素殊途蓋亦以防微杜漸昔如來闡教多依山林今此僧徒戀著城邑正以誘於利欲不能自已此乃釋氏之糟糠灋王之社鼠内戒所不容國典所共弃也臣謂都城内寺未成可徙者宐悉徙於郭外僧不滿五十者併小從大外州亦準此詔從之然卒不能行是嵗魏太師雍等奏鹽池天藏資育羣生先朝為之禁限亦非茍與細民爭利但利起天池取用無灋或豪貴封䕶或近民吝守貧弱逺來邈然絶望因置主司令其裁察彊弱相兼務令得所什一之税自古有之所務者逺近齊平公私兩宐耳及甄琛啟求罷禁乃為繞池之民尉保光等擅自固䕶語其障禁倍於官司取與自由貴賤任口請依先朝禁之為便詔從之資治通鑑卷第一百四十八
