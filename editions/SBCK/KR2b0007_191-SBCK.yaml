body:
  text: 臣司馬光奉勑編集唐紀七閹茂八月凡三年有竒起昭陽協洽六月盡柔兆髙祖神堯大聖光孝皇帝下之上武徳七年六月辛丑上幸仁智宫避暑辛亥瀧州扶州獠作亂遣南尹州都督李光度等擊平之丙辰吐谷渾寇扶州刺史蔣善合擊走之壬戌慶州都督楊文幹反初齊王元吉勸太子建成除秦王世民曰當為兄手刃之丗民從上幸元吉第元吉伏䕶軍宇文寶於寢内欲刺世民建成性頗仁厚遽止之元吉愠曰為兄計耳於我何有建成擅募長安及四方驍勇二千餘人爲東宫衛士分屯左右長林號長林兵又宻使右虞􅀱率可達志從燕王李藝發幽州突騎三百置宫東諸坊欲以補東宫長上爲人所告上召建成責之流可達志於巂州楊文幹嘗宿衞東宫建成與之親厚私使募壯士送長安上將幸仁智宫命建成居守丗民元吉皆從建成使元吉就圖世民曰安危之計决在今嵗又使郎將爾朱煥校尉橋公山以甲遺文幹二人至豳州上變告太子使文幹舉兵欲表裏相應又有寧州人杜鳳舉亦詣宫言狀上怒託他事手詔召建成令詣行在建成懼不敢赴太子舍人徐師謩勸之據城舉兵詹事主簿趙􅀪智勸之貶損軍服屏從者詣上謝罪建成乃詣仁智宫未至六十里悉留官屬於毛鴻賔堡以十餘騎往見上叩頭謝罪奮身自擲㡬至於絶上怒不解是夜置之幕下飼以麥飯使殿中監陳福防守遣司農卿宇文頴馳召文幹頴至慶州以情告之文幹遂舉兵反上遣左武衞將軍錢九隴與靈州都督楊師道擊之甲子上召秦王世民謀之世民曰文幹豎子敢為狂逆計府僚已應擒戮若不爾止應遣一將討之耳上曰不然文幹事連建成恐應之者衆汝宜自行還立汝為太子吾不能效隋文帝自誅其子當封建成為蜀王蜀兵脆弱它日茍能事汝汝宜全之不能事汝汝取之易耳上以仁智宫在山中恐盜兵猝發夜帥宿衞南出山外行數十里東宫官屬將卒繼至者皆令三十人為隊分兵圍守之明日復還仁智宫世民既行元吉與妃嬪更迭為建成請封徳彞復為之營解於外上意遂變復遣建成還京師居守惟責以兄弟不睦歸罪於太子中允王珪左衞率韋挺天策兵曹參軍杜淹並流於巂州挺沖之子也初洛陽既平杜淹久不得調欲求事建成房􅀇齡以淹多狡數恐其教導建成益為世民不利乃言於世民引入天策府突厥寇代州之武周城州兵擊破之秋七月己巳苑君璋以突厥寇朔州摠管秦武通擊却之楊文幹襲陷寧州驅掠吏民出據百家堡秦王世民軍至寧州其黨皆潰癸酉文幹為其麾下所殺傳首京師獲宇文頴誅之丁丑梁師都行臺白伏願來降戊寅突厥寇原州遣寧州刺史鹿大師救之又遣楊師道趨大木根山邀其歸路庚辰突厥寇隴州遣䕶軍尉遲敬徳擊之吐谷渾寇岷州辛巳吐谷渾党項寇松州癸未突厥寇隂盤甲申扶州刺史蔣善合擊吐谷渾於松州赤磨鎮破之己丑突厥吐利設與苑君璋寇并州甲子車駕還京師或説上曰突厥所以屢寇闗中者以子女玉帛皆在長安故也若焚長安而不都則胡寇自息矣上以為然遣中書侍郎宇文士及踰南山至樊鄧行可居之地將徙都之太子建成齊王元吉裴寂皆贊成其策蕭瑀等雖知其不可而不敢諫秦王世民諫曰戎狄為患自古有之陛下以聖武龍興光宅中夏精兵百萬所征無敵柰何以胡寇擾邊遽遷都以避之貽四海之羞為百世之笑乎彼霍去病漢廷一將猶志滅匈奴况臣忝備藩維願假數年之期請係頡利之頸致之闕下若其不効遷都未晚上曰善建成曰昔樊噲欲以十萬衆横行匈奴中秦王之言得無似之世民曰形勢各異用兵不同樊噲小豎何足道乎不出十年必定漠北非敢虛言也上乃止建成與妃嬪因共譖世民曰突厥雖屢為邊患得賄則退秦王外託禦寇之名内欲揔兵權成其簒奪之謀耳上校獵城南太子秦齊王皆從上命三子馳射角勝建成有胡馬肥壯而喜蹶以授世民曰此馬甚駿能超數丈澗弟善騎試乗之世民乗以逐鹿馬蹶世民躍立於數步之外馬起復乗之如是者三顧謂宇文士及曰彼欲以此見殺死生有命庸何傷乎建成聞之因令妃嬪譖之於上曰秦王自言我有天命方為天下主豈有浪死上大怒先召建成元吉然後召世民入責之曰天子自有天命非智力可求汝求之一何急邪世民免冠頓首請下灋司案驗上怒不解㑹有司奏突厥入寇上乃改容勞勉世民命之冠帶與謀突厥閏月己未詔世民元吉將兵出豳州以禦突厥上餞之於蘭池上每有宼盜輒命丗民討之事平之後猜嫌益甚初隋末京兆韋仁夀為蜀郡司灋書佐所論囚至市猶西向為仁夀禮佛然後死唐興爨􅀪達帥西南夷内附朝廷遣使撫之類皆貪縱逺民患之有叛者仁夀時為巂州都督長史上聞其名命檢校南寧州都督寄治越巂使之嵗一至其地慰撫之仁夀性寛厚有識度既受命將兵五百人至西洱河周厯數千里蠻夷豪帥皆望風歸附來見仁夀仁夀承制置七州十五縣各以其豪帥為刺史縣令灋令清肅蠻夷悦服將還豪帥皆曰天子遣公都督南寧何為遽去仁夀以城池未立為辭蠻夷即相帥為仁夀築城立廨舍旬日而就仁夀乃曰吾受詔但令巡撫不敢擅留蠻夷號泣送之因各遣子弟入貢壬戌仁夀還朝上大悦命仁夀徙鎮南寧以兵戍之苑君璋引突厥寇朔州八月戊辰突厥寇原州己巳吐谷渾寇鄯州壬申突厥寇忻州丙子寇并州京師戒嚴戊寅寇綏州刺史劉大俱擊却之是時頡利突利二可汗舉國入寇連營南上秦王世民引兵拒之㑹闗中久雨糧運阻絶士卒疲於征役器械頓弊朝廷及軍中咸以為憂世民與虜遇於豳州勒兵將戰己卯可汗帥萬餘騎奄至城西陳於五隴阪將士震恐世民謂元吉曰今虜騎憑陵不可示之以怯當與之一戰汝能與我俱乎元吉懼曰虜形勢如此奈何輕出萬一失利悔可及乎世民曰汝不敢出吾當獨往汝留此觀之世民乃帥騎馳詣虜陳吿之曰國家與可汗和親何為負約深入我地我秦王也可汗能鬭獨出與我鬭若以衆來我直以此百騎相當耳頡利不之測笑而不應世民又前遣騎吿突利曰爾往與我盟有急相救今乃引兵相攻何無香火之情也突利亦不應世民又前將渡溝水頡利見世民輕出又聞香火之言疑突利與世民有謀乃遣止世民曰王不須度我無它意更欲與王申固盟約耳乃引兵稍却是後霖雨益甚世民謂諸將曰虜所恃者弓矢耳今積雨彌時筋膠俱解弓不可用彼如飛鳥之折翼吾屋居火食刀槊犀利以逸制勞此而不乗將復何待乃潛師夜出冒雨而進突厥大驚世民又遣説突利以利害突利悦聴命頡利欲戰突利不可乃遣突利與其夾畢特勒阿史那思摩來見世民請和親世民許之思摩頡利之從叔也突利因自託於世民請結為兄弟世民亦以恩意撫之與盟而去庚寅岐州刺史柴紹破突厥於杜陽谷壬申突厥阿史那思摩入見上引升御榻慰勞之思摩貌類胡不類突厥故處羅疑其非阿史那種厯處羅頡利世常為夾畢特勒終不得典兵為設既入朝賜爵和順王丁酉遣左僕射裴寂使於突厥九月癸卯日南人姜子路反交州都督王志逺擊破之癸卯突厥寇綏州都督劉大俱擊破之獲特勒三人冬十月己巳突厥寇甘州辛未上校獵於鄠之南山癸酉幸終南吐谷渾及羌人寇疊州䧟合川丙子上幸樓觀謁老子祠癸未以太牢祭隋文帝陵十一月丁卯上幸龍躍宫庚午還宫太子詹事裴矩權檢校侍中八年春正月丙辰以夀州都督張鎮周為舒州都督鎮周以舒州本其鄉里到州就故宅多市酒肴召親戚故人與之酣宴散髮箕踞如為布衣時凡十日既而分贈金帛泣與之别曰今日張鎮周猶得與故人歡飲明日之後則舒州都督治百姓耳君民禮隔不得復為交遊自是親戚故人犯灋一無所縱境内肅然丁巳遣右武衛將軍段徳操徇夏州地吐谷渾寇疊州是月突厥吐谷渾各請互市詔皆許之先是中國喪亂民乏耕牛至是資於戎狄雜畜被野夏四月乙亥党項寇渭州甲申上幸鄠縣校獵于甘谷營太和宫於終南山丙戌還宫西突厥統葉䕶可汗遣使請昏上謂裴矩曰西突厥道逺緩急不能相助今求昏何如對曰今北宼方彊為國家今日計且當逺交而近攻臣謂宜許其昏以威頡利俟數年之後中國完實足抗北夷然後徐思其宜上從之遣髙平王道立至其國統葉䕶大喜道立上之從子也初上以天下大定罷十二軍既而突厥為寇不已辛亥復置十二軍以太常卿竇誕等為將軍簡練士馬議大舉擊突厥甲寅涼州胡睦伽陀引突厥襲都督府入子城長史劉君傑擊破之六月甲子上幸太和宫丙子遣燕郡王李藝屯華亭縣及彈箏峽水部郎中姜行本斷石嶺道以備突厥丙戌頡利可汗寇靈州丁亥以右衞大將軍張瑾為行軍揔管以禦之以中書侍郎温彦博為長史先是上與突厥書用敵國禮秋七月甲辰上謂侍臣曰突厥貪婪無厭朕將征之自今勿復為書皆用詔敕丙午車駕還宫己酉突厥頡利可汗寇相州睦伽陀攻武興丙辰代州都督藺謩與突厥戰於新城不利復命行軍揔管張瑾屯石嶺李髙遷趨大谷以禦之丁巳命秦王出屯蒲州以備突厥八月壬戌突厥踰石嶺寇并州癸亥寇靈州丁卯寇潞沁韓三州左武􅀱大將軍安修仁擊睦伽陀於且渠川破之詔安州大都督李靖出潞州道行軍揔管任瓌屯太行以禦突厥頡利可汗將兵十餘萬大掠朔州壬申并州道行軍揔管張瑾與突厥戰於太谷全軍皆没瑾脱身奔李靖行軍長史温彦博為虜所執虜以彦博職在機近問以國家兵糧虛實彦博不對虜遷之隂山庚辰突厥寇靈武甲申靈州都督任城王道宗擊破之丙戌突厥寇綏州丁亥頡利可汗遣使請和而退九月癸巳突厥没賀咄設陷并州一縣丙申代州都督藺謩擊破之癸卯初令太府檢校諸州權量丙午右領軍將軍王君廓破突厥於幽州俘斬二千餘人突厥寇藺州冬十月壬申吐谷渾寇疊州遣扶州刺史蔣善合救之戊寅突厥寇鄯州遣霍公柴紹救之十一月辛卯朔上幸宜州權檢校侍中裴矩罷判黄門侍郎戊戌突厥寇彭州庚子以天策司馬宇文士及權檢校侍中辛丑徙蜀王元軌為吳王漢王元慶為陳王癸卯加秦王世民中書令齊王元吉侍中丙午吐谷渾寇岷州戊申眉州山獠反十二月辛酉上還至京師庚辰上校獵於鳴犢泉辛巳還宫以襄邑王神符檢校楊州大都督始自丹楊徙州府及居民於江北九年春正月己亥詔太常少卿祖孝孫等更定雅樂甲寅以左僕射裴寂為司空日遣員外郎一人更直其第二月庚申以齊王元吉為司徒丙子初令州縣祀社稷又令士民里閈相從立社各申祈報用洽鄉黨之歡戊寅上祀社稷丁亥突厥寇原州遣折威將軍楊毛擊之三月庚寅上幸昆明池壬辰還宫癸巳吐谷渾党項寇岷州戊戌益州行臺尚書郭行方擊眉州叛獠破之壬寅梁師都寇邊陷靜難鎮丙午上幸周氏陂辛亥突厥寇靈州乙卯車駕還宫癸丑南海公歐陽􅏷奉使在突厥帥其徒五十人謀掩襲可汗牙帳事泄突厥囚之丁巳突厥宼涼州都督長樂王幼良擊走之戊午郭行方擊叛獠於洪雅二州大破之俘男女五千口夏四月丁卯突厥寇朔州庚午寇原州癸酉寇涇州戊寅安州大都督李靖與突厥頡利可汗戰於靈州之硤石自旦至申突厥乃退太史令傅奕上疏請除佛灋曰佛在西域言妖路逺漢譯胡書恣其假託使不忠不孝削髮而揖君親遊手遊食易服以逃租賦僞啓三塗謬張六道恐愒愚夫詐欺庸品乃追懴既往之罪虛規將來之福布施萬錢希萬倍之報持齋一日兾百日之糧遂使愚迷妄求功徳不憚科禁輕犯憲章有造爲惡逆身墜刑網方乃獄中禮佛規免其罪且生死夀夭由於自然刑徳威福闗之人主貧富貴賤功業所招而愚僧矯詐皆云由佛竊人主之權擅造化之力其為害政良可悲矣降自羲農至于有漢皆無佛灋君明臣忠祚長年久漢明帝始立胡神西域桑門自傳其灋西晉以上國有嚴科不許中國之人輒行髠髮之事洎于苻石羌胡亂華主庸臣佞政虐祚短梁武齊襄足為明鏡今天下僧尼數盈十萬翦刻繒綵裝束泥人競為厭魅迷惑萬姓請令匹配即成十萬餘户産育男女十年長養一紀教訓可以足兵四海免蠶食之殃百姓知威福所在則妖惑之風自革淳朴之化還興竊見齊朝章仇子佗表言僧尼徒衆糜損國家寺塔奢侈虛費金帛爲諸僧附㑹宰相對朝䜛毀諸尼依託妃主潛行謗讟子佗竟被囚縶刑於都市及周武平齊制封其墓臣雖不敏竊慕其蹤上詔百官議其事唯太僕卿張道源稱奕言合理蕭瑀曰佛聖人也而奕非之非聖人者無灋當治其罪弈曰人之大倫莫如君父佛以世嫡而叛其父以匹夫而抗天子蕭瑀不生於空桑乃遵無父之教非孝者無親瑀之謂矣瑀不能對但合手曰地獄之設正為是人上亦惡沙門道士茍避征徭不守戒律皆如奕言又寺觀隣接㕓邸溷雜屠沽辛巳下詔命有司沙汰天下僧尼道士女冠其精勤練行者遷居大寺觀給其衣食無令闕乏庸猥麤穢者悉令罷道勒還鄉里京師留寺三所觀二所諸州各留一所餘皆罷之傅弈性謹宻既職在占􅀱杜絶交遊所奏災異悉焚其藁人無知者癸未突厥寇西㑹州五月戊子䖍州胡成郎等殺長史叛歸梁師都都督劉旻追斬之壬辰党項寇廓州戊戌突厥寇秦州壬寅越州人盧南反殺刺史􅑔道明丙午吐谷渾党項寇河州突厥寇蘭州丙辰遣平道將軍柴紹將兵擊胡六月丁巳太白經天秦王世民既與太子建成齊王元吉有隙以洛陽形勝之地恐一朝有變欲出保之乃以行臺工部尚書温大雅鎮洛陽遣秦府車騎將軍滎陽張亮將左右王保等千餘人之洛陽隂結納山東豪傑以俟變多出金帛恣其所用元吉告亮謀不軌下吏考驗亮終無言乃釋之使還洛陽建成夜召世民飲酒而酖之世民暴心痛吐血數升淮安王神通扶之還西宫上幸西宫問世民疾敕建成曰秦王素不能飲自今無得復夜飲因謂世民曰首建大謀削平海内皆汝之功吾欲立汝為嗣汝固辭且建成年長為嗣日久吾不忍奪也觀汝兄弟似不相容同處京邑必有紛競當遣汝還行臺居洛陽自陜以東皆主之仍命汝建天子旌旗如漢梁孝王故事世民涕泣辭以不欲逺離膝下上曰天下一家東西兩都道路甚邇吾思汝即往母煩悲也將行建成元吉相與謀曰秦王若至洛陽有土地甲兵不可復制不如留之長安則一匹夫耳取之易矣乃宻令數人上封事言秦王左右聞往洛陽無不喜躍觀其志趣恐不復來又遣近幸之臣以利害説上上意遂移事復中止建成元吉與後宫日夜譖訴世民於上上信之將罪世民陳叔達諫曰秦王有大功於天下不可黜也且性剛烈若加挫抑恐不勝憂憤或有不測之疾陛下悔之何及上乃止元吉宻請殺秦王上曰彼有定天下之功罪狀未著何以為辭元吉曰秦王初平東都顧望不還散錢帛以樹私恩又違敕命非反而何但應速殺何患無辭上不應秦府僚屬皆憂懼不知所出行臺考功郎中房􅀇齡謂比部郎中長孫无忌曰今嫌隙已成一旦禍機竊發豈惟府朝塗地乃實社稷之憂莫若勸王行周公之事以安家國存亡之機間不容髮正在今日无忌曰吾懷此久矣不敢發口今吾子所言正合吾心謹當白之乃入言世民世民召􅀇齡謀之􅀇齡曰大王功蓋天地當承大業今日憂危乃天贊也願大王勿疑乃與府屬杜如晦共勸世民誅建成元吉建成元吉以秦府多驍將欲誘之使為己用宻以金銀器一車贈左二副䕶軍尉遲敬徳并以書招之曰願迃長者之眷以敦布衣之交敬徳辭曰敬徳蓬户甕牖之人遭隋末亂離久淪逆地罪不容誅秦王賜以更生之恩今又策名藩邸唯當殺身以為報於殿下無功不敢謬當重賜若私交殿下乃是貳心徇利忘忠殿下亦何所用建成怒遂與之絶敬徳以告世民世民曰公心如山嶽雖積金至斗知公不移相遺但受何所嫌也且得以知其隂計豈非良策不然禍將及公既而元吉使壯士夜刺敬徳敬徳知之洞開重門安卧不動刺客屢至其庭終不敢入元吉乃譖敬徳於上下詔獄訊治將殺之世民固請得免又譖左一馬軍揔管程知節出為康州刺史知節謂世民曰大王股肱羽翼盡矣身何能久知節以死不去願早决計又以金帛誘右二䕶軍段志􅀇志􅀇不從建成謂元吉曰秦府智畧之士可憚者獨房􅀇齡杜如晦耳皆譖之於上而逐之世民腹心唯長孫無忌尚在府中與其舅雍州治中髙士廉左候車騎將軍三水侯君集及尉遲敬徳等日夜勸世民誅建成元吉世民猶豫未决問於靈州大都督李靖靖辭問於行軍揔管李世勣世勣辭世民由是重二人㑹突厥郁射設將數萬騎屯河南入塞圍烏城建成薦元吉代世民督諸軍北征上從之命元吉督右武衞大將軍李藝天紀將軍張瑾等救烏城元吉請尉遲敬徳程知節叚志玄及秦府右三統軍秦叔寳等與之偕行簡閲秦王帳下精鋭之士以益元吉軍率更丞王晊宻告世民曰太子語齊王今汝得秦王驍將精兵擁數萬之衆吾與秦王餞汝於昆明池使壯士拉殺之於幕下奏云暴卒主上宜無不信吾當使人進説令授吾國事敬徳等既入汝手宜悉坑之孰敢不服世民以晊言告長孫无忌等无忌等勸世民先事圖之世民歎曰骨肉相殘古今大惡吾誠知禍在朝夕欲俟其發然後以義討之不亦可乎敬徳曰人情誰不愛其死今衆人以死奉王乃天授也禍機垂發而王猶晏然不以爲憂大王縱自輕如社稷宗廟何大王不用敬徳之言敬徳將􅇡身草澤不能留居大王左右交手受戮也无忌曰不從敬徳之言事今敗矣敬徳等必不爲王有无忌亦當相隨而去不能復事大王矣世民曰吾所言亦未可全弃公更圖之敬徳曰王今處事有疑非智也臨難不决非勇也且大王素所畜養勇士八百餘人在外者今已入宫擐甲執兵事勢已成大王安得已乎世民訪之府僚皆曰齊王凶戾終不肯事其兄比聞䕶軍薛實嘗謂齊王曰大王之名合之成唐字大王終主唐祀齊王喜曰但除秦王取東宫如反掌耳彼與太子謀亂未成已有取太子之心亂心無厭何所不為若使二人得志恐天下非復唐有以大王之賢取二人如拾地芥耳奈何徇匹夫之節忘社稷之計乎世民猶未决衆曰大王以舜為何如人曰聖人也衆曰使舜浚井不出則為井中之泥塗廪不下則為廪上之灰安能澤被天下灋施後世乎是以小杖則受大杖則走蓋所存者大故也丗民命卜之幕僚張公謹自外來見之取􅀛投地曰卜以决疑今事在不疑尚何卜乎卜而不吉庸得已乎於是定計世民令无忌宻召房􅀇齡等曰敕㫖不聴復事王今若私謁必坐死不敢奉教世民怒謂敬徳曰􅀇齡如晦豈叛我邪取所佩刀授敬徳曰公往觀之若無來心可斷其首以來敬徳往與无忌共諭之曰王已决計公宜速入共謀之吾屬四人不可羣行道中乃令􅀇齡如晦著道士服與无忌俱入敬徳自它道亦至己未太白復經天傅弈宻奏太白見秦分秦王當有天下上以其狀授世民於是世民宻奏建成元吉滛亂後宫且曰臣於兄弟無絲毫負今欲殺臣似為世充建徳報讐臣今枉死永違君親魂歸地下實恥見諸賊上省之愕然報曰明當鞫問汝宜早參庚申世民帥長孫无忌等入伏兵於􅀇武門張婕妤竊知世民表意馳語建成建成召元吉謀之元吉曰宜勒宫府兵託疾不朝以觀形勢建成曰兵備已嚴當與弟入參自問消息乃俱入趣􅀇武門上時已召裴寂蕭瑀陳叔達等欲按其事建成元吉至臨湖殿覺變即跋馬東歸宫府世民從而呼之元吉張弓射世民再三不彀世民射建成殺之尉遲敬徳將七十騎繼至左右射元吉墜馬世民馬逸入林下為木枝所絓墜不能起元吉遽至奪弓將扼之敬徳躍馬叱之元吉步欲趣武徳殿敬徳追射殺之翊衞車騎將軍馮翊馮立聞建成死歎曰豈有生受其恩而死逃其難乎乃與副䕶軍薛萬徹屈咥直府左車騎萬年謝叔方帥東宫齊府精兵二千馳趣􅀇武門張公謹多力獨閉闗以拒之不得入雲麾將軍敬君􅀪掌宿衞屯兵􅀇武門挺身出戰所親止之曰事未可知且徐觀變俟兵集成列而戰未晚也君􅀪不從與中郎將吕世衡大呼而進皆死之君􅀪顯儁之曽孫也守門兵與萬徹等力戰良久萬徹鼓譟欲攻秦府將士大懼尉遲敬徳持建成元吉首示之宫府兵遂潰萬徹與數十騎亡入終南山馮立既殺敬君􅀪謂其徒曰亦足以少報太子矣遂解兵逃於野上方泛舟海池世民使尉遲敬徳入宿衞敬徳擐甲持矛直至上所上大驚問曰今日亂者誰邪卿來此何為對曰秦王以太子齊王作亂舉兵誅之恐驚動陛下遣臣宿衞上謂裴寂等曰不圖今日乃見此事當如之何蕭瑀陳叔達曰建成元吉本不䂊義謀又無功於天下疾秦王功髙望重共為姦謀今秦王已討而誅之秦王功蓋宇宙率土歸心陛下若處以元良委之國務無復事矣上曰善此吾之夙心也時宿衞及秦府兵與二宫左右戰猶未已敬徳請降手敕令諸軍並受秦王處分上從之天策府司馬宇文士及自東上閤門出宣敕衆然後定上又使黄門侍郎裴矩至東宫曉諭諸將卒皆罷散上乃召世民撫之曰近日以來㡬有投杼之惑世民跪而吮上乳號慟久之建成子安陸王承道河東王承徳武安王承訓汝南王承明鉅鹿王承義元吉子梁郡王承業漁陽王承鸞普安王承奬江夏王承裕義陽王承度皆坐誅仍絶屬籍初建成許元吉以正位之後立為太弟故元吉為之盡死諸將欲盡誅建成元吉左右百餘人籍没其家尉遲敬徳固爭曰罪在二凶既伏其誅若及支黨非所以求安也乃止是日下詔赦天下凶逆之罪止於建成元吉自餘黨與一無所問其僧尼道士女冠並宜依舊國家庶事皆取秦王處分辛酉馮立謝叔方皆自出薛萬徹亡匿世民屢使諭之乃出世民曰此皆忠於所事義士也釋之癸亥立世民為皇太子又詔自今軍國庶事無大小悉委太子處决然後聞奏臣光曰立嫡以長禮之正也然髙祖所以有天下皆太宗之功隠太子以庸劣居其右地嫌勢逼必不相容曏使髙祖有文王之明隠太子有泰伯之賢太宗有子臧之節則亂何自而生矣既不能然太宗始欲俟其先發然後應之如此則事非獲已猶為愈也既而為羣下所迫遂至蹀血禁門推刃同氣貽譏千古惜哉夫創業垂統之君子孫之所儀刑也彼中明肅代之傳繼得非有所指擬以為口實乎戊辰以宇文士及爲太子詹事長孫无忌杜如晦爲左庶子髙士亷房􅀇齡為右庶子尉遲敬徳為左衞率程知節為右衞率虞世南為中舍人禇亮為舍人姚思廉爲洗馬悉以齊王國司金帛什器賜敬徳初洗馬魏徴常勸太子建成早除秦王及建成敗世民召徴謂曰汝何為離間我兄弟衆為之危懼徴舉止自若對曰先太子早從徴言必無今日之禍世民素重其才改容禮之引為詹事主簿亦召王珪韋挺於巂州皆以為諫議大夫世民命縱禁苑鷹犬罷四方貢獻聴百官各陳治道政令簡肅中外大恱以屈突通爲陜東大行臺左僕射鎭洛陽益州行臺僕射竇軌與行臺尚書韋雲起郭行方不協雲起弟慶儉及宗族多事太子建成建成死軌誣雲起與建成同反收斬之行方懼逃奔京師軌追之不及吐谷渾寇岷州突厥寇隴州辛未寇渭州遣右衞大將軍柴紹擊之廢益州大行臺置大都督府壬申上以手詔賜裴寂等曰朕當加尊號為太上皇辛巳幽州大都督廬江王瑗反右領軍將軍王君廓殺之傳首初上以瑗懦怯非將帥才使君廓佐之君廓故羣盜勇悍險詐瑗推心倚仗之許為昬姻太子建成謀害秦王宻與瑗相結建成死詔遣通事舍人崔敦禮馳驛召瑗瑗心不自安謀於君廓君廓欲取瑗以為功乃説曰大王若入必無全理今擁兵數萬奈何受單使之召自投罔罟乎因相與泣瑗曰我今以命託公舉事决矣乃劫敦禮問以京師機事敦禮不屈瑗囚之發驛徴兵且召燕州刺史王詵赴薊與之計事兵曹叅軍王利涉説瑗曰王君廓反覆不可委以機柄宜早除去以王詵代之瑗不能决君廓知之往見詵詵方沭握髮而出君廓手斬之持其首告衆曰李瑗與王詵同反囚執敕使擅自徴兵今詵已誅獨有李瑗無能為也汝寧隨瑗族滅乎欲從我以取富貴乎衆皆曰願從公討賊君廓乃帥其麾下千餘人踰西城而入瑗不之覺君廓入獄出敦禮瑗始知之遽帥左右數百人被甲而出遇君廓於門外君廓謂瑗衆曰李瑗為逆汝何為隨之入湯火乎衆皆弃兵而潰唯瑗獨存罵君廓曰小人賣我行自及矣遂執瑗縊之壬午以王君廓為左領軍大將軍兼幽州都督以瑗家口賜之敦禮仲方之孫也乙酉罷天策府秋七月己丑柴紹破突厥於秦州斬特勒一人士卒首千餘級以秦府䕶軍秦叔寳爲左衞大將軍又以程知節爲右武衞大將軍尉遲敬徳爲右武􅀱大將軍壬辰以髙士亷爲侍中房玄齡爲中書令蕭瑀爲左僕射長孫无忌爲吏部尚書杜如晦爲兵部尚書癸巳以宇文士及爲中書令封徳􅂜爲右僕射又以前天策府兵曹叅軍杜淹爲御史大夫中書舍人顔師古劉林甫爲中書侍郎左衞副率矦君集爲左衞將軍左虞􅀱叚志玄爲驍衞將軍副䕶軍薛萬徹爲右領軍將軍右内副率張公謹爲右武􅀱將軍右監門率長孫安業爲右監門將軍右内副率李客師爲領左右軍將軍安業无忌之兄客師靖之弟也太子建成齊王元吉之黨散亡在民間雖更赦令猶不自安徼幸者爭告捕以邀賞諫議大夫王珪以啟太子丙子太子下令六月四日已前事連東宫及齊王十七日前連李瑗者並不得相告言違者反坐丁酉遣諫議大夫魏徴宣慰山東聴以便宜從事徴至磁州遇州縣錮送前太子千牛李志安齊王䕶軍李師行詣京師徴曰吾受命之日前宫齊府左右皆赦不問今復送思行等則誰不自疑雖遣使者人誰信之吾不可以顧身嫌不為國慮且既䝉國士之遇敢不以國士報之乎遂皆解縱之太子聞之甚喜右衞率府鎧曹叅軍唐臨出為萬泉丞縣有繫囚十許人㑹春雨臨縱之使歸耕種皆如期而返臨令則之弟子也八月丙辰突厥遣使請和壬戌吐谷渾遣使請和癸亥詔傳位於太子太子固辭不許甲子太宗即皇帝位於東宫顯徳殿赦天下闗内及蒲芮虞㤗陜鼎六州免租調二年自餘給復一年癸未詔以宫女衆多幽閟可愍宜簡出之各歸親戚任其適人初稽胡酋長劉仚成帥衆降梁師都師都信讒殺之由是所部猜懼多來降者師都寖衰弱乃朝于突厥為之畫策勸令入寇於是頡利突利二可汗合兵十餘萬􅀐寇涇州進至武功京師戒嚴丙子立妃長孫氏為皇后后少好讀書造次必循禮灋上為秦王與太子建成齊王元吉有隙后奉事髙祖承順妃嬪彌縫其闕甚有内助及正位中宫務存節儉服御取給而已上深重之嘗與之議賞罰后辭曰牝雞之晨唯家之索妾婦人安敢豫聞政事固問之終不對己卯突厥進寇髙陵辛巳涇州道行軍揔管尉遲敬徳與突厥戰於涇陽大破之獲其俟斤阿史徳烏没啜斬首千餘級癸未頡利可汗進至渭水便橋之北遣其腹心執失思力入見以觀虚實思力盛稱頡利突利二可汗將兵百萬今至矣上讓之曰吾與汝可汗面結和親贈遺金帛前後無筭汝可汗自負盟約引兵深入於我無愧汝雖戎狄亦有人心何得全忘大恩自誇彊盛我今先斬汝矣思力懼而請命蕭瑀封徳彞請禮遣之上曰我今遣還虜謂我畏之愈肆憑陵乃囚思力於門下省上自出􅀇武門與髙士亷房􅀇齡等六騎徑詣渭水上與頡利隔水而語責以負約突厥大驚皆下馬羅拜俄而諸軍繼至旌甲蔽野頡利見執失思力不返而上挺身輕出軍容甚盛有懼色上麾諸軍使却而布陳獨留與頡利語蕭瑀以上輕敵叩馬固諫上曰吾籌之已熟非卿所知所以突厥敢傾國而來直抵郊甸者以我國内有難朕新即位謂我不能抗禦故也我若示之以弱閉門拒守虜必放兵大掠不可復制故朕輕騎獨出示若輕之又震曜軍容使之必戰出虜不意使之失圖虜入我地既深必有懼心故與戰則克與和則固矣制服突厥在此一舉卿第觀之是日頡利來請和詔許之上即日還宫乙酉又幸城西斬白馬與頡利盟于便橋之上突厥引兵退蕭瑀請於上曰突厥未和之時諸將爭戰陛下不許臣等亦以為疑既而虜自退其策安在上曰吾觀突厥之衆雖多而不整君臣之志唯賄是求當其請和之時可汗獨在水西達官皆來謁我我若醉而縛之因襲擊其衆勢如拉朽又命長孫无忌李靖伏兵於幽州以待之虜若奔歸伏兵邀其前大軍躡其後覆之如反掌耳所以不戰者吾即位日淺國家未安百姓未富且當靜以撫之一與虜戰所損甚多虜結怨既深懼而修備則吾未可以得志矣故巻甲韜戈啗以金帛彼既得所欲理當自退志意驕墯不復設備然後養威伺舋一舉可滅也將欲取之必固與之此之謂矣卿知之乎瑀再拜曰非所及也資治通鑑巻第一百九十一
