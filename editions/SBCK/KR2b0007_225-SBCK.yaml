body:
  text: 臣司馬光奉勑編集唐紀四十一協洽七月凡五年有可起閼逢攝提格盡屠維代宗睿文孝武皇帝中之下大曆九年春正月壬寅田神功薨於京師澧朗鎮遏使楊猷自澧州㳂江而下擅出境至鄂州詔聽入朝猷遂泝漢江而上復州郢州皆閉城自守山南東道節度使梁崇義􅀤兵備之二月辛未徐州軍亂刺史梁乘逾城走諫議大夫呉損使吐蕃留之累年竟病死虜中庚辰汴宋兵防秋者千五百人盜庫財潰歸田神功薨故也己丑以神功弟神玉知汴宋留後癸巳郭子儀入朝上言朔方國之北門中間戰士耗散什纔有一今吐蕃兼河隴之地雜羌渾之衆勢强十倍願更於諸道各􅀤精卒戍四五萬人則制勝之道必矣三月戊申以皇女永樂公主許妻魏博節度使田承嗣之子華上意欲固結其心而承嗣益驕慢戊午以澧朗鎮遏使楊猷爲洮州刺史隴右節度兵馬使夏四月甲申郭子儀辭還邠州復爲上言邊事至涕泗交流壬辰赦天下五月丙午楊猷自澧州入朝涇原節度使馬璘入朝諷將士爲已表求平章事丙寅以璘爲左僕射六月盧龍節度使朱泚遣弟滔奉表請入朝且請自將歩騎五千防秋上許之仍爲之先築大第於京師以待之癸未興善寺胡僧不空卒贈開府儀同三司司空賜爵肅國公謚曰大辯正廣智不空三藏和尚京師旱京兆尹黎幹作土龍祈雨自與巫覡更舞彌月不雨又禱於文宣王上聞之命撤土龍減膳節用秋七月戊午雨朱泚入朝至蔚州有疾諸將請還俟閒而行泚曰死則輿尸而前諸將不敢復言九月庚子至京師士民觀者如堵辛丑宴泚及將士於延英殿犒賞之盛近時未有壬寅回紇擅出鴻臚寺白晝殺人有司擒之上釋不問甲辰命郭子儀李抱玉馬璘朱泚分統諸道防秋之兵冬十月壬申信王瑝薨乙亥梁王璿薨魏博節度使田承嗣誘昭義將吏使作亂十年春正月丁酉昭義兵馬使裴志清逐留後薛㟧帥其衆歸承嗣承嗣聲言救援引兵襲相州取之㟧奔洺州上表請入朝許之辛丑郭子儀入朝壬寅壽王瑁薨乙巳朱泚表請留闕下以弟滔知幽州盧龍留後許之昭義禆將薛擇爲相州刺史薛雄爲衛州刺史薛堅爲洺州刺史皆薛嵩之族也戊申上命内侍孫知古如魏州諭田承嗣使各守封疆承嗣不奉詔癸丑遣大將盧子期取洺州楊光朝攻衛州乙卯西川節度使崔寧奏破吐蕃數萬於西山斬首萬級捕虜數千人丙辰詔諸道兵有逃亡者非承制敇無得輒召募二月乙丑田承嗣誘衛州刺史薛雄雄不從使盜殺之屠其家盡據相衛四州之地自置長吏掠其精兵良馬悉歸魏州逼孫知古與共廵磁相二州使其將士割耳􅋇面請承嗣爲帥辛未立皇子述爲睦王逾爲郴王連爲恩王遘爲鄜王迅爲隨王造爲忻王暹爲韶王運爲嘉王遇爲端王遹爲循王通爲恭王逵爲原王逸爲雅王丙子以華州刺史李承昭知昭義留後河陽三城使常休明苛刻少恩其軍士防秋者歸休明出勞之防秋兵與城内兵合謀攻之休明奔東都軍士奉兵馬使王惟恭爲帥大掠數日乃定上命監軍冉庭蘭慰撫之三月甲午朔陜州軍亂逐兵馬使趙令珍觀察使李國清不能禁卑辭徧拜將士乃得脱去軍士大掠庫物㑹淮西節度使李忠臣入朝過陜上命忠臣按之將士畏忠臣兵威不敢動忠臣設棘圍令軍士匿名投庫物一日獲萬緡盡以給其從兵爲賞乙巳薛㟧常休明皆詣闕請罪上釋不問初成徳節度使李寶臣淄清節度使李正巳皆爲田承嗣所輕寶臣弟寶正娶承嗣女在魏州與承嗣子維擊毬馬驚誤觸維死承嗣怒囚寶正以告寶臣寶臣謝教敕不謹封杖授承嗣使撻之承嗣遂杖殺寶正由是兩鎮交惡及承嗣拒命寶臣正巳皆上表請討之上亦欲因其隙討承嗣夏四月乙未敕貶承嗣爲永州刺史仍命河東成德幽州淄青淮西永平汴宋河陽澤潞諸道􅀤兵前臨魏博若承嗣尚或稽違即令進討罪止承嗣及其姪悦自餘將士弟姪茍能自㧞一切不問時朱滔方恭順與寶臣及河東節度使薛兼訓攻其北正已與淮西節度使李忠臣等攻其南五月乙未承嗣將霍榮國以磁州降丁未李正已攻徳州㧞之李忠臣統永平河陽懷澤歩騎四萬進攻衛州六月辛未田承嗣遣其將裴志清等攻冀州志清以其衆降李寳臣甲戌承嗣自將圍冀州寶臣使高陽軍使張孝忠將精騎四千禦之寶臣大軍繼至承嗣燒輜重而遁孝忠本奚也田承嗣以諸道兵四合部將多叛而懼秋八月遣使奉表請束身歸朝辛巳郭子儀還邠州子儀嘗奏除州縣官一人不報僚佐相謂曰以令公勲徳奏一屬吏而不從何宰相之不知體子儀聞之謂僚佐曰自兵興以來方鎮武臣多䟦扈凡有所求朝廷常委曲從之此無它乃疑之也今子儀所奏事人主以其不可行而置之是不以武臣相待而親厚之也諸君可賀矣又何恠焉聞者皆服己丑田承嗣遣其將盧子期寇磁州九月戊申回紇白晝刺市人腸出有司執之繫萬年獄其酋長赤心馳入縣獄斫傷獄吏劫囚而去上亦不問壬子吐蕃㓂臨涇癸丑冦隴州及普潤大掠人畜而去百官往往遣家屬出城竄匿丙辰鳯翔節度使李抱玉奏破吐蕃於義寧李寶臣李正已㑹于􅀥强進圍貝州田承嗣出兵救之兩軍各饗士卒成徳賞厚平盧賞薄既罷平盧士卒有怨言正已恐其爲變引兵退寶臣亦退李忠臣聞之釋衛州南度河屯陽武寶臣與朱滔攻滄州承嗣從父弟庭玠守之寶臣不能克吐蕃㓂涇州涇原節度使馬璘破之於百里城戊午命盧龍節度使朱泚出鎮奉天行營冬十月辛酉朔日有食之盧子期攻磁州城幾陷李寶臣與昭義留後李承昭共救之大破子期于清水擒子期送京師斬之河南諸將又大破田悦於陳留田承嗣懼初李正已遣使至魏州承嗣囚之至是禮而遣之遣使盡籍境内户口甲兵榖帛之數以與之曰承嗣今年八十有六溘死無日諸子不肖恱亦孱弱凡今日所有爲公守耳豈足以辱公之師旅乎立使者於廷南向拜而授書又圖正已之像焚香事之正己悦遂按兵不進於是河南諸道兵皆不敢進承嗣既無南顧之虞得專意北方上嘉李寶臣之功遣中使馬承倩齎詔勞之將還寶臣詣其舘遺之百縑承倩詬詈擲出道中寶臣慙其左右兵馬使王武俊説寶臣曰今公在軍中新立功豎子尚爾况冦平之後以一幅詔書召歸闕下一匹夫耳不如釋承嗣以爲已資寶臣遂有玩冦之志承嗣知范陽寶臣鄉里心常欲之因刻石作䜟云二帝同功勢萬全將田爲侣入幽燕密令瘞寶臣境内使望氣者言彼有王氣寳臣掘而得之又令客說之曰公與朱滔共取滄州得之則地歸國非公所有公能捨承嗣之罪請以滄州歸公仍願從公取范陽以自効公以精騎前驅承嗣以歩卒繼之蔑不克矣寳臣喜謂事合符䜟遂與承嗣通謀宻圖范陽承嗣亦陳兵境上寶臣謂滔使者曰聞朱公儀貌如神願得畫像觀之滔與之寶臣置於射堂命諸將共觀之曰眞神人也滔軍於瓦橋寶臣選精騎二千通夜馳三百里襲之戒曰取貌如射堂者時兩軍方睦滔不虞有變狼狽出戰而敗㑹衣它服得免寶臣欲乘勝取范陽滔使雄武軍使昌平劉怦守留府寶臣知有備不敢進承嗣聞幽􅁪兵交即引軍南還使謂寶臣曰河内有警不暇從公石上䜟文吾戲爲之耳寶臣慙怒而退寶臣旣與朱滔有隙以張孝忠爲易州刺史使將精騎七千以備之丙寅貴妃獨孤氏薨丁卯追謚貞懿皇后十一月丁酉田承嗣將吴希光以瀛州降嶺南節度使路嗣恭擢流人孟瑶敬冕爲將討哥舒晃瑶以大軍當其衝冕自間道輕入丁未克廣州斬哥舒晃及其黨萬餘人嗣恭之討晃也容管經略使王翃遣將將兵助之西原賊帥覃問乘虛襲容州翃伏兵擊擒之十二月回紇千騎㓂夏州州將梁榮宗破之於烏水郭子儀遣兵三千救夏州回紇遁去元載王縉奏魏州鹽貴請禁鹽入其境以困之上不許曰承嗣負朕百姓何罪田承嗣請入朝李正己屢爲之上表乞許其自新十一年春正月壬辰遣諫議大夫杜亞使魏州宣慰辛亥西川節度使崔寧奏破吐蕃四節度及突厥吐谷渾氐􅆧羣蠻衆二十餘萬斬首萬餘級二月庚辰田承嗣復遣使上表請入朝上乃下詔赦承嗣罪復其官爵聽與家屬入朝其所部拒朝命者一切不問辛巳增朔方五城戍兵以備回紇三月戊子河陽軍亂逐監軍冉庭蘭出城大掠三日庭蘭成備而入誅亂者數十人乃定五月汴宋留後田神玉卒都虞候李靈曜殺兵馬使濮州刺史孟鑒北結田承嗣爲援癸巳以永平節度使李勉兼汴宋等八州留後乙未以靈曜爲濮州刺史靈曜不受詔六月戊午以靈曜爲汴宋留後遣使宣慰秋七月田承嗣遣兵冦滑州敗李勉吐蕃冦石門入長澤川八月丙寅加盧龍節度使朱泚同平章事李靈曜既爲留後益驕慢悉以其黨爲管内八州刺史縣令欲效河北諸鎮甲申詔淮西節度使李忠臣永平節度使李勉河陽三城使馬燧討之淮南節度使陳少遊淄青節度使李正已皆進兵擊靈曜汴宋兵馬使攝節度副使李僧惠靈曜之謀主也宋州牙門將劉昌遣僧神表濳説僧惠僧惠召問計昌爲之泣陳逆順僧惠乃與汴宋牙將高慿石隱金遣神表奉表詣京師請討靈曜九月壬戌以僧惠爲宋州刺史憑爲曹州刺史隱金爲鄆州刺史乙丑李忠臣馬燧軍于鄭州靈曜引兵逆戰兩軍不意其至退軍滎澤淮西軍士潰去者什五六鄭州士民皆驚走入東都忠臣將歸淮西燧固執不可曰以順討逆何憂不克柰何自弃功名堅壁不動忠臣聞之稍收散卒數日皆集軍勢復振戊辰李正已奏克鄆濮二州壬申李僧惠敗靈曜兵於雍丘冬十月李忠臣馬燧進擊靈曜忠臣行汴南燧行汴北屢破靈曜兵壬寅與陳少遊前軍合與靈曜大戰於汴州城西靈曜敗入城固守癸卯忠臣等圍之田承嗣遣田恱將兵救靈曜敗永平淄青兵於匡城乘勝進軍汴州乙巳營於城北數里丙午忠臣遣禆將李重倩將輕騎數百夜入其營縱横貫穿斬數十人而還營中大駭忠臣燧因以大軍乗之鼓譟而入悦衆不戰而潰悦脱身北走將士死者相枕藉不可勝數靈曜聞之開門夜遁汴州平重倩本奚也丁未靈曜至韋城永平將杜如江擒之燧知忠臣暴戾以已功讓之不入汴城引軍西屯板橋忠臣入城果專其功宋州刺史李僧惠與之爭功忠臣因㑹擊殺之又欲殺劉昌昌遁逃得免甲寅李勉械送李靈曜至京師斬之十二月丁亥李正已李寶臣並加同平章事涇原節度使馬璘疾亟以行軍司馬叚秀實知節度事付以後事秀實嚴兵以備非常丙申璘薨軍中奔哭者數千人喧咽門屏秀實悉不聽入命押牙馬頔治䘮事於内李漢惠接賔客於外妻妾子孫位於堂宗族位於庭將佐位於前牙士卒哭於營伍百姓各守其家有離立偶語於衢路輒執而囚之非護䘮從行者無得逺送致祭拜哭皆有儀節送䘮近逺皆有定處違者以軍法從事都虞候史廷幹兵馬使崔珍十將張景華謀因䘮作亂秀實知之奏廷幹入宿衛徙珍屯靈臺補景華外職不戮一人軍府晏然璘家富有無筭治第京師甲於勲貴中堂費二十萬緡它室所減無幾其子弟無行家貲尋盡戊戌昭義節度使李承昭表稱疾篤以澤潞行軍司馬李抱眞兼知磁邪兩州留後庚戌加淮西節度使李忠臣同平章事仍領汴州刺史徙治汴州十二年春三月乙卯兵部尚書同平章事鳯翔懷澤潞秦隴節度使李抱玉薨弟抱真仍領懷澤潞留後癸亥以河東行軍司馬鮑防爲河東節度使防襄州人也田承嗣竟不入朝又助李靈曜上復命討之承嗣乃復上表謝罪上亦無如之何庚午悉復承嗣官爵仍令不必入朝中書侍郎同平章事元載專横黄門侍郎同平章事王縉附之二人俱貪載妻王氏及子伯和仲武縉弟妹及尼出入者爭納賄賂又以政事委羣吏士之求進者不結其子弟及主書卓英倩等無由自逹上含容累年載縉不悛上欲誅之恐左右漏泄無可與言者獨與左金吾大將軍吴湊謀之湊上之舅也㑹有告載縉夜醮圖爲不軌者庚辰上御延英殿命湊收載縉於政事堂又收仲武及卓英倩等繫獄命吏部尚書劉晏與御史大夫李涵等同鞫之問端皆出禁中仍遣中使詰以隂事載縉皆伏罪是日先杖殺左衛將軍知内省事董秀於禁中乃賜載自盡於萬年縣載請主者願得快死主者曰相公須受少汚辱勿恠乃脱穢韈塞其口而殺之王縉初亦賜自盡劉晏謂李涵等曰故事重刑覆奏况大臣乎且法有首從宜更禀進止涵等從之上乃貶縉括州刺史載妻王氏忠嗣之女也及子伯和仲武季能皆伏誅有司籍載家財胡椒至八百石它物稱是夏四月壬午以太常卿楊綰爲中書侍郎禮部侍郎常衮爲門下侍郎並同平章事綰性清簡儉素制下之日朝野相賀郭子儀方宴客聞之減坐中聲樂五分之四京兆尹黎幹騶從甚盛即日省之止存十騎中丞崔寛第舍宏侈亟毁撤之癸未貶吏部侍郎楊炎諫議大夫韓洄包佶起居舍人韓㑹等十餘人皆載黨也炎鳯翔人載常引有文學才望者一人親厚之異日欲以代已故炎及於貶洄滉之弟㑹南陽人也上初欲盡誅炎等吴湊諫救百端始貶官丁酉吐蕃冦黎雅州西川節度使崔寧擊破之元載以仕進者多樂京師惡其逼己乃制俸禄厚外官而薄京官京官不能自給常從外官乞貸楊綰常衮奏京官俸太薄己酉詔加京官俸嵗約十五萬六千餘緡五月辛亥詔自都團練使外悉罷諸州團練守捉使又令諸使非軍事要急無得擅召刺史及停其職務差人權攝又定諸州兵皆有常數其召募給家糧春冬衣者謂之官健差㸃土人春夏歸農秋冬追集給身糧醬菜者謂之團結自兵興以來州縣官俸給不一重以元載王縉隨情徇私刺史月給或至千緡或數十緡至是始定節度使以下至主簿尉俸禄掊多益寡上下有叙法制粗立庚午上遣中使發元載祖父墓斵棺弃尸毁其家廟焚其木主戊寅卓英倩等皆杖死英倩之用事也弟英璘横於鄉里及英倩下獄英璘遂據險作亂上􅀤禁兵討之乙巳金州刺史孫道平擊擒之上方倚楊綰使釐革弊政㑹綰有疾秋七月己巳薨上痛悼之甚謂羣臣曰天不欲朕致太平何奪朕楊綰之速八月癸未賜東川節度使鮮于叔明姓李氏元載王縉之爲相也上日賜以内厨御饌可食十人遂爲故事癸卯常衮與朱泚上言餐錢已多乞停賜饌許之衮又欲辭堂封同列不可而止時人譏衮以爲朝廷厚禄所以養賢不能當辭位不當辭禄臣光曰君子恥食浮於人衮之辭禄廉恥存焉與夫固位且貪禄者不猶愈乎詩云彼君子兮不素餐兮如衮者亦未可以深譏也楊綰常衮薦湖州刺史顔眞卿上即日召還甲辰以爲刑部尚書綰衮又薦淮南判官汲人闗播擢爲都官員外郎九月辛酉以四鎮北庭行營兼涇原鄭潁節度副使叚秀實爲節度使秀實軍令簡約有威惠奉身清儉室無姬妾非公㑹未嘗飲酒聽樂吐蕃八萬衆軍於原州北長澤監己巳破方渠入拔谷郭子儀使禆將李懷光救之吐蕃退庚午吐蕃冦坊州冬十月乙酉西川節度使崔寧奏大破吐蕃於望漢城先是秋霖河中府池鹽多敗户部侍郎判度支韓滉恐鹽户減税丁亥奏雨雖多不害鹽仍有瑞鹽生上疑其不然遣諫議大夫義興蔣鎮往視之吐蕃冦鹽夏州又冦長武郭子儀遣將拒却之以永平軍押牙匡城劉洽爲宋州刺史仍以宋泗二州􅀠永平軍京兆尹黎幹奏秋霖損稼韓滉奏幹不實上命御史按視丁未還奏所損凡三萬餘頃渭南令劉澡阿附度支稱縣境苗獨不損御史趙計奏與澡同上曰霖雨溥博豈得渭南獨無更命御史朱敖視之損三千餘頃上歎息久之曰縣令字人之官不損猶應言損乃不仁如是乎貶澡南浦尉計澧州司户而不問滉十一月壬子山南西道節度使張獻恭奏破吐蕃萬餘衆於岷州丙辰蔣鎮還奏瑞鹽實如韓滉所言仍上表賀請宣付史臣并置神祠錫以嘉名上從之賜號寶應靈慶池時人醜之十二月丙戌朱泚自涇州還京師丁亥崔寧奏破吐蕃十餘萬衆斬首八千餘級庚子以朱泚兼隴右節度使知河西澤潞行營平盧節度使李正已先有淄青齊海登萊沂宻徳棣十州之地及李靈曜之亂諸道合兵攻之所得之地各爲已有正已又得曹濮徐兖鄆五州因自青州徙治鄆州使其子前淄州刺史納守青州癸卯以納爲青州刺史正已用刑嚴峻所在不敢偶語然法令齊一賦均而輕擁兵十萬雄據東方鄰藩皆畏之是時田承嗣據魏博相衛洺貝澶七州李寶臣據恒易趙定深冀滄七州各擁衆五萬梁崇義據襄鄧均房復郢六州有衆二萬相與根據蟠結雖奉事朝廷而不用其法令官爵甲兵租賦刑殺皆自專之上寛仁一聽其所爲朝廷或完一城增一兵輒有怨言以爲猜貳常爲之罷役而自於境内築壘繕兵無虛日以是雖在中國名藩臣而實如蠻貊異域焉十三年春正月辛酉敇毁白渠支流碾磑以漑田昇平公主有二磑入見於上請存之上曰吾欲以利蒼主汝識吾意當爲衆先公主即日毁之戊辰回紇冦太原河東押牙泗水李自良曰回紇精鋭逺來求鬬難與爭鋒不如築二壘於歸路以兵戍之虜至堅壁勿與戰彼師老自歸乃出軍乗之二壘抗其前大軍蹙其後無不捷矣留後鮑防不從遣大將焦伯瑜等逆戰癸酉遇虜於陽曲大敗而還死者萬餘人回紇縱兵大掠二月代州都督張光晟擊破之於羊武谷乃引去上亦不問回紇入冦之故待之如初己亥吐蕃遣其將馬重英帥衆四萬冦靈州塞填漢御史尚書三渠水口以弊屯田三月甲戌回紇使還過河中朔方軍士掠其輜重因大掠坊市夏四月甲辰吐蕃冦靈州朔方留後常謙光擊破之六月戊戌隴右節度使朱泚獻猫䑕同乳不相害者以爲瑞常衮帥百官稱賀中書舍人崔祐甫獨不賀曰物反常爲妖猫捕䑕乃其職也今同乳妖也何乃賀爲宜戒法吏之不察姧邊吏之不禦冦者以承天意上嘉之祐甫沔之子也秋七月壬子以祐甫知吏部選事祐甫數以公事與常衮爭由是惡之戊午郭子儀奏以回紇猶在塞上邊人恐懼請遣邠州刺史渾瑊將兵鎭振武軍從之回紇始去辛未吐蕃將馬重英二萬衆冦鹽慶二州郭子儀遣河東朔方都虞候李懷光擊却之八月乙亥成徳節度使李寶臣請復姓張許之吐蕃二萬衆冦銀麟州略党項􅄂畜郭子儀遣李懷光等擊破之上悼念貞懿皇后不已殯於内殿累年不忍􅁙丁酉始葬于莊陵九月庚午吐蕃萬騎下青石嶺逼涇州詔郭子儀朱泚與叚秀實共却之冬十二月丙戌以吏部尚書轉運鹽鐵等使劉晏爲左僕射知三銓及使職如故郭子儀入朝命判官京兆杜黄裳主留務李懷光隂謀代子儀矯爲詔書欲誅大將温儒雅等黄裳察其詐以詰懷光懷光流汗伏罪於是諸將之難制者黄裳矯子儀之命皆出之於外軍府乃安以給事中杜亞爲江西觀察使上召江西判官李泌入見語以元載事曰與卿别八年乃能除此賊頼太子發其隂謀不然幾不見卿對曰臣昔日固嘗言之陛下知羣臣有不善則去之含容太過故至於此上曰事亦應十全不可輕發上因言朕面屬卿於路嗣恭而嗣恭取載意奏卿爲䖍州别駕嗣恭初平嶺南獻琉璃盤徑九寸朕以爲至寶及破載家得嗣恭所遺載琉璃盤徑尺俟其至當與卿議之泌曰嗣恭為人小心善事人畏權勢精勤吏事而不知大體昔為縣令有能名陛下未暇知之而為載所用故為之盡力陛下誠知而用之彼亦為陛下盡力矣䖍州别駕臣自欲之非其罪也且嗣恭新立大功陛下豈得以一琉璃盤罪之邪上意乃解以嗣恭為兵部尚書郭子儀以朔方節度副使張曇性剛率謂其以武人輕已銜之孔目官吴曜為子儀所任因而構之子儀怒誣奏曇扇動軍衆誅之掌書記高郢力爭之子儀不聽奏貶郢猗氏丞既而僚佐多以病求去子儀悔之悉薦之於朝曰吴曜誤我遂逐之常衮言於上曰陛下久欲用李泌昔漢宣帝欲用人為公卿必先試理人請且以為刺史使周知人間利病俟報政而用之十四年春正月壬戌以李泌為澧州刺史二月癸未魏博節度使田承嗣薨有子十一人以其姪中軍兵馬使悦為才使知軍事而諸子佐之甲申以悦為魏博留後淮西節度使李忠臣貪殘好色將吏妻女美者多逼淫之悉以軍政委妹婿節度副使張惠光惠光挾勢暴横軍州苦之忠臣復以惠光子為牙將暴横甚於其父左廂都虞候李希烈忠臣之族子也為衆所服希烈因衆心怨怒三月丁未與大將丁暠等殺惠光父子而逐忠臣忠臣單騎奔京師上以其有功使以檢校司空同平章事留京師以希烈為蔡州刺史淮西留後以永平節度使李勉兼汴州刺史增領汴潁二州徙鎭汴州辛酉以容管經略使王翃為河中少尹知府事河東副元帥留後部將凌正暴横翃抑之正與其徒乗夜作亂翃知之故縮漏水數刻以差其期賊驚潰走擒正誅之軍府乃安成徳節度使張寶臣既請復姓又不自安更請賜姓夏四月癸未復賜姓李五月癸卯上始有疾辛酉制皇太子監國是夕上崩于紫宸之内殿遺詔以郭子儀攝冢宰癸亥徳宗即位在諒隂中動遵禮法嘗召韓王迥食食馬齒羹不設鹽酪常衮性剛急為政苛細不合衆心時羣臣朝夕臨衮哭委頓從吏或扶之中書舍人崔祐甫指以示衆曰臣哭君前有扶禮乎衮聞益恨之㑹議羣臣䘮服衮以為禮臣為君斬衰三年漢文帝權制猶三十六日高宗以來皆遵漢制及􅀇宗肅宗之䘮始服二十七日今遺詔云天下吏人三日釋服古者卿大夫從君而服皇帝二十七日而除在朝羣臣亦當如之祐甫以為遺詔無朝臣庶人之别朝野中外莫非天下凡百執事孰非吏人皆應三日釋服相與力爭聲色陵厲衮不能堪乃奏祐甫率情變禮請貶潮州刺史上以為太重閏月壬申貶祐甫為河南少尹初肅宗之丗天下務殷宰相常有數人更直决事或休沐各歸私第詔直事者代署其名而奏之自是踵為故事時郭子儀朱泚雖以軍功為宰相皆不預朝政衮獨居政事堂代二人署名奏祐甫祐甫既貶二人表言其非罪上問卿曏言可貶今云非罪何也二人對初不知上初即位以衮為欺罔大駭甲戌百官衰絰序立於月華門有制貶衮為潮州刺史以祐甫為門下侍郎同平章事聞者震悚祐甫至昭應而還既而羣臣䘮服竟用衮議上時居諒隂庶政皆委於祐甫所言無不允初至徳以後天下用兵諸將競論功賞故官爵不能無濫及永泰以來天下稍平而元載王縉秉政四方以賄求官者相屬於門大者出於載縉小者出於卓英倩等皆如所欲而去及常衮為相思革其弊杜絶僥幸四方奏請一切不與而無所甄别賢愚同滯崔祐甫代之欲收時望推薦引㧞常無虛日作相未二百日除官八百人前後相矯終不得其適上嘗謂祐甫曰人或謗卿所用多渉親故何也對曰臣為陛下選擇百官不敢不詳慎茍平生未之識何以諳其才行而用之上以為然臣光曰臣聞用人者無親踈新故之殊惟賢不肖之為察其人未必賢也以親故而取之固非公也茍賢矣以親故而捨之亦非公也夫天下之賢固非一人所能盡也若必待素識熟其才行而用之所遺亦多矣古之為相者則不然舉之以衆取之以公衆曰賢矣己雖不知其詳姑用之待其無功然後退之有功則進之所舉得其人則賞之非其人則罰之進退賞罰皆衆人所共然也已不置豪髪之私於其間茍推是心以行之又何遺賢曠官之足病哉詔罷省四方貢獻之不急者又罷梨園使及樂工三百餘人所留者悉􅀠太常郭子儀以司徒中書令領河中尹靈州大都督單于鎮北大都護闗内河東副元帥朔方節度闗内支度鹽池六城水運大使押蕃部并營田及河陽道觀察等使權任既重功名復大性寛大政令頗不肅代宗欲分其權而難之久不决甲申詔尊子儀為尚父加太尉兼中書令增實封滿二千户月給千五百人糧二百馬食子弟諸壻遷官者十餘人所領副元帥諸使悉罷之以其禆將河東朔方都虞候李懷光為河中尹邠寧慶晉絳慈隰節度使以朔方留後兼靈州長史常謙光為靈州大都督西受降城定逺天徳鹽夏豐等軍州節度使振武軍使渾瑊為單于大都護東中二受降城振武鎭北綏銀麟勝等軍州節度使分領其任丙戌詔曰澤州刺史李鷃上慶雲圖朕以時和年豐為嘉祥以進賢顯忠為良瑞如卿雲靈芝珍禽竒獸怪草異木何益於人布告天下自今有此無得上獻内莊宅使上言諸州有官租萬四千餘斛上令分給所在充軍儲先是諸國累獻馴象凡四十有二上曰象費豢養而違物性將安用之命縱於荆山之陽及豹貀鬬雞獵犬之類悉縱之又出宫女數百人於是中外皆悅淄青軍士至投兵相顧曰明主出矣吾屬猶反乎戊子以淮西留後李希烈為節度使辛卯以河陽鎭遏使馬燧為河東節度使河東承百并之敗騎士單弱燧悉召牧馬厮役得數千人教之數月皆為精騎造甲必為長短三等稱其所衣以便進趨又造戰車行則載兵甲止則為營陳或塞險以遏奔衝器械無不精利居一年得選兵三萬辟兖州人張建封為判官署李自良代州刺史委任之兵部侍郎黎幹狡險䛕佞與宦官特進劉忠翼相親善忠翼本名清潭恃寵貪縱二人皆為衆所惡時人或言幹忠翼嘗勸代宗立獨孤貴妃為皇后妃子韓王迥為太子上即位幹宻乗轝詣忠翼謀事事覺丙申幹忠翼並除名長流至藍田賜死以户部侍郎判度支韓滉為太常卿以吏部尚書劉晏判度支先是晏滉分掌天下財賦晏掌河南山南江淮嶺南滉掌闗内河東劒南至是晏始兼之上素聞滉掊克過甚故罷其利權尋出為晉州刺史至徳初第五􅄾始􅅦鹽以佐軍用及劉晏代之法益精宻初嵗入錢六十萬緡末年所入逾十倍而人不厭苦大曆末計一嵗征賦所入揔一千二百萬緡而鹽利居其太半以鹽爲漕傭自江淮至渭橋率萬斛傭七千緡自淮以北列置廵院擇能吏主之不煩州縣而集事六月己亥朔赦天下西川節度使崔寧永平節度使李勉並同平章事詔天下寃滯州府不為理聽詣三司使以中丞舍人給事中各一人日於朝堂受詞推决尚未盡者聽檛登聞鼓自今無得復奏置寺觀及請度僧尼於是檛登聞鼓者甚衆右金吾將軍裴諝上䟽以為訟者所爭皆細故若天子一一親之則安用吏理乎上乃悉歸之有司制應山陵制度務從優厚當竭帑藏以供其費刑部員外郎令狐峘上䟽諫其略曰臣伏讀遺詔務從儉約若制度優厚豈顧命之意邪上荅詔略曰非唯中朕之病抑亦成朕之美敢不聞義而徙峘徳棻之玄孫也庚子立皇子誦為宣王謨為舒王諶為通王諒為䖍王詳為肅王乙巳立皇弟廼為益王傀爲蜀王丙午舉先天故事六品以上清望官雖非供奉侍衛之官日令二人更直待制以備顧問庚戌以朱泚為鳯翔尹代宗優寵宦官奉使四方者不禁其求取嘗遣中使賜妃族還問所得頗少代宗不悦以為輕我命妃懼遽以私物償之由是中使公求賂遺無所忌憚宰相常貯錢於閤中毎賜一物宣一㫖無徒還者出使所歷州縣移文取貨與賦税同皆重載而歸上素知其弊遣中使邵光超賜李希烈旌節希烈贈之僕馬及縑七百匹黄茗二百斤上聞之怒杖光超六十而流之於是中使之未歸者皆濳弃所得於山谷雖與之莫敢受甲子以神䇿都知兵馬使右領軍大將軍王駕鶴為東都園苑使以司農卿白琇珪代之更名志貞駕鶴典禁兵十餘年權行中外詔下上恐其生變崔祐甫召駕鶴與語留連久之琇珪巳視事矣李正已畏上威名表獻錢三十萬緡上欲受之恐見欺却之則無辭崔祐甫請遣使慰勞淄青將士因以正已所獻錢賜之使將士人人戴上恩又諸道聞之知朝廷不重貨財上悦從之正已大慙服天下以為太平之治庶幾可望焉秋七月戊辰朔日有食之禮儀使吏部尚書顔眞卿上言上元中政在宫壼始增祖宗之謚玄宗末姦臣竊命累聖之謚有加至十一字者按周之文武言文不稱武言武不稱文豈聖徳所不優乎蓋羣臣稱其至者故也故謚多不為襃少不為貶今累聖諡號太廣有踰古制請自中宗以上皆從初諡睿宗曰聖眞皇帝玄宗曰孝明皇帝肅宗曰宣皇帝以省文尚質正名敦本上命百官集議儒學之士皆從眞卿議獨兵部侍郎袁傪官以兵進奏言陵廟玉册木主皆已刋勒不可輕改事遂寢不知陵中玉册所刻乃初謚也初代宗之丗事多留滯四夷使者及四方奏計或連嵗不遣乃於右銀臺門置客省以處之及上書言事孟浪者失職未叙者亦寘其中動經十嵗常有數百人并部曲畜産動以千計度支廩給其費甚廣上悉命踈理拘者出之事竟者遣之當叙者任之嵗省榖萬九千二百斛壬申毁元載馬璘劉忠翼之第初天寶中貴戚第舍雖極奢麗而垣屋高下猶存制度然李靖家廟已為楊氏馬廐矣及安史亂後法度墮弛大臣將帥宦官競治第舍各窮其力而後止時人謂之木妖上素疾之故毁其尤者仍命馬氏獻其園􅀠宫司謂之奉成園癸丑減常貢宫中服用錦千匹服玩數千事庚辰詔回紇諸胡在京師者各服其服無得效華人先是回紇留京師者常千人商胡偽服而雜居者又倍之縣官日給饔餼殖貲産開第舍市肆美利皆歸之日縱􅁀横吏不敢問或衣華服誘取妻妾故禁之辛卯罷天下􅅦酒收利上之在東宫也國子博士河中張渉為侍讀即位之夕召渉入禁中事無大小皆咨之明日置於翰林為學士親重無比乙未以渉為右散騎常侍仍為學士第二百二十五卷終
