front:
  text: 資治通鑑卷第十一
  hash: sha256:2f547daed8f80f1053a3e62b75feadcf3b6d1aae05769f1c02b28f636d7f4f0c
body:
  text: 漢紀三光赤奮若凡三年起屠維大淵献盡重太祖高皇帝中五年冬十月漢王追項羽至固陵與齊王信魏相國越期㑹擊楚信越不至楚擊漢軍大破之漢王復堅壁自守謂張良曰諸侯不從柰何對曰楚兵且破二人未有分地其不至固宜君王能與共天下可立致也齊王信之立非君王意信亦不自堅彭越本定梁地始君王以魏豹故拜越爲相國今豹死越亦望王而君王不早定今能取睢陽以北至榖城皆以王彭越從陳以東傅海與韓王信信家在楚其意欲復得故邑能出􅂢此地以許兩人使各自為戰則楚易破也漢王從之於是韓信彭越皆引兵來十一月劉賈南渡淮圍夀春遣人誘楚大司馬周殷殷畔楚以舒屠六舉九江兵迎黥布並行屠城父隨劉賈皆㑹十二月項王至垓下兵少食盡與漢戰不勝入壁漢軍及諸侯兵圍之數重項王夜聞漢軍四靣皆楚歌乃大驚曰漢皆已得楚乎是何楚人之多也則夜起飲帳中悲歌忼慨泣數行下左右皆泣莫能仰視於是項王乗其駿馬名騅麾下壯士騎從者八百餘人直夜潰圍南出馳走平明漢軍乃覺之令騎將灌嬰以五千騎追之項王渡淮騎能屬者纔百餘人至隂陵迷失道問一田父田父紿曰左左乃䧟大澤中以故漢追及之項王乃復引兵而東至東城乃有二十八騎漢騎追者數千人項王自度不得脱謂其騎曰吾起兵至今八嵗矣身七十餘戰未嘗敗北遂霸有天下然今卒困於此此天之亡我非戰之罪也今日固決死願為諸君決戰必潰圍斬將刈旗三勝之令諸君知天亡我非戰之罪也乃分其騎以為四隊四鄉漢軍圍之數重項王謂其騎曰吾為公取彼一將令四靣騎馳下期山東為三處於是項王大呼馳下漢軍皆披靡遂斬漢一將是時郎中騎楊喜追項王項王瞋目而叱之喜人馬俱驚辟易數里項王與其騎㑹為三處漢軍不知項王所在乃分軍為三復圍之項王乃馳復斬漢一都尉殺數十百人復聚其騎亡其兩騎耳乃謂其騎曰何如騎皆伏曰如大王言於是項王欲東渡烏江烏江亭長檥船待謂項王曰江東雖小地方千里衆數十萬人亦足王也願大王急渡今獨臣有船漢軍至無以渡項王笑曰天之亡我我何渡為且籍與江東子弟八千人渡江而西今無一人還縱江東父兄憐而王我我何靣目見之縱彼不言籍獨不愧於心乎乃以其所乗騅馬賜亭長令騎皆下馬歩行持短兵接戰獨籍所殺漢軍數百人身亦被十餘創顧見漢騎司馬呂馬童曰若非吾故人乎馬童靣之指示中郎騎王翳曰此項王也項王乃曰吾聞漢購我頭千金邑萬戸吾為若徳乃刎而死王翳取其頭餘騎相蹂踐爭項王相殺者數十人最其後楊喜呂馬童及郎中呂勝楊武各得其一體五人共㑹其體皆是故分其户封五人皆為列侯楚地悉定獨魯不下漢王引天下兵欲屠之至其城下猶聞􅃶誦之聲為其守禮義之國為主死節乃持項王頭以示魯父兄魯乃降漢王以魯公禮􅁙項王於榖城親為發哀哭之而去諸項氏枝屬皆不誅封項伯等四人皆為列侯賜姓劉氏諸民略在楚者皆歸之太史公曰羽起隴畮之中三年遂將五諸矦滅秦分裂天下而封王矦政由羽出位雖不終近古以來未嘗有也及羽背闗懐楚放逐義帝而自立怨王侯叛已難矣自矜功伐奮其私智而不師古謂霸王之業欲以力征經營天下五年卒亡其國身死東城尚不覺寤而不自責乃引天亡我非用兵之罪也豈不謬哉􅊨􅊨揚子灋言或問楚敗垓下方死曰天也諒乎曰漢屈羣策羣䇿屈羣力楚憞羣䇿而自屈其力屈人者克自屈者負天曷故焉􅊨􅊨漢王還至定陶馳入齊王信壁奪其軍臨江王共尉不降遣盧綰劉賈擊虜之春正月更立齊王信為楚王王淮北都下邳封魏相國建城侯彭越為梁王王魏故地都定陶􅊨令曰兵不得休八年萬民與苦甚今天下事畢其赦天下殊死已下諸侯王皆上䟽請尊漢王為皇帝二月甲午王即皇帝位于汜水之陽更王后曰皇后太子曰皇太子追尊先媪曰昭靈夫人詔曰故衡山王吳芮從百粤之兵佐諸侯誅暴秦有大功諸侯立以為王項羽侵奪之地謂之番君其以芮為長沙王又曰故粤王無諸世奉粤祀秦侵奪其地使其社稷不得血食諸矦伐秦無諸身帥閩中兵以佐滅秦項羽廢而弗立今以為閩粤王王閩中地帝西都洛陽夏五月兵皆罷歸家詔民前或相聚保山澤不書名數今天下已定令各歸其縣復故爵田宅吏以文灋教訓辨告勿笞辱軍吏卒爵及七大夫以上皆令食邑非七大夫已下皆復其身及户勿事帝置酒洛陽南宮上曰徹侯諸將母敢隱朕皆言其情吾所以有天下者何項氏之所以失天下者何高起王陵對曰陛下使人攻城畧地因以與之與天下同其利項羽不然有功者害之賢者疑之此其所以失天下也上曰公知其一未知其二夫運籌帷幄之中決勝千里之外吾不如子房填國家撫百姓給餉餽不絶糧道吾不如蕭何連百萬之衆戰必勝攻必取吾不如韓信三者皆人傑吾能用之此吾所以取天下者也項羽有一范増而不能用此所以為我禽也羣臣説服韓信至楚召漂母賜千金召辱已少年令出跨下者以為中尉告諸將相曰此壯士也方辱我時我寜不能殺之邪殺之無名故忍而就此彭越既受漢封田横懼誅與其徒屬五百餘人入海居島中帝以田横兄弟本定齊地齊賢者多附焉今在海中不取後恐爲亂乃使使赦横罪召之横謝曰臣烹陛下之使酈生今聞其弟商爲漢將臣恐懼不敢奉詔請爲庶人守海島中使還報帝乃詔衞尉酈商曰齊王田横即至人馬從者敢動搖者致族夷乃復使使持節具告以詔商狀曰田横來大者王小者乃侯耳不來且舉兵加誅焉横乃與其客二人乗傳詣洛陽未至三十里至尸鄉廏置横謝使者曰人臣見天子當洗沐因止留謂其客曰横始與漢王俱南面稱孤今漢王爲天子而横乃為亡虜北面事之其恥固已甚矣且吾烹人之兄與其弟併肩而事主縱彼畏天子之詔不敢動我獨不媿於心乎且陛下所以欲見我者不過欲一見吾面貌耳今斬吾頭馳三十里間形容尚未能敗猶可觀也遂自剄令客奉其頭從使者馳奏之帝曰嗟乎起自布衣兄弟三人更王豈不賢哉為之流涕而拜其二客為都尉發卒二千人以王者禮􅁙之既􅁙二客穿其冢旁孔皆自剄下從之帝聞之大驚以横客皆賢餘五百人尚在海中使使召之至則聞田横死亦皆自殺初楚人季布為項籍將數窘辱帝項籍滅帝購求布千金敢有舍匿罪三族布乃髠鉗為奴自賣於魯朱家朱家心知其季布也買置田舍身之洛陽見滕公説曰季布何罪臣各為其主用職耳項氏臣豈可盡誅邪今上始得天下而以私怨求一人何示不廣也且以季布之賢漢求之急此不北走胡南走越耳夫忌壯士以資敵國此伍子胥所以鞭荆平之墓也君何不從容為上言之滕公待閒言於上如朱家指上乃赦布召拜郎中朱家遂不復見之布母弟丁公亦為項羽将逐窘帝彭城西短兵接帝急顧謂丁公曰兩賢豈相戹哉丁公引兵而還及項王滅丁公謁見帝以丁公徇軍中曰丁公為項王臣不忠使項王失天下者也遂斬之曰使後為人臣無傚丁公也臣光曰高祖起豐沛以來罔羅豪桀招亡納叛亦已多矣及即帝位而丁公獨以不忠受戮何哉夫進取之與守成其勢不同當羣雄角逐之際民無定主來者受之固其宜也及貴為天子四海之內無不為臣茍不明禮義以示之使為臣者人懐貳心以徼大利則國家其能久安乎是故斷以大義使天下曉然皆知為臣不忠者無所自容而懐私結恩者雖至於活已猶以義不與也戮一人而千萬人懼其慮事豈不深且逺哉子孫享有天禄四百餘年宜矣齊人婁敬戍隴西過洛陽脱輓輅衣羊裘因齊人虞將軍求見上虞將軍欲與之鮮衣婁敬曰臣衣帛衣帛見衣褐衣褐見終不敢易衣於是虞將軍入言上上召見問之婁敬曰陛下都洛陽豈欲與周室比隆哉上曰然婁敬曰陛下取天下與周異周之先自后稷封邰積徳絫善十有餘世至于太王王季文王武王而諸侯自歸之遂滅殷為天子及成王即位周公相焉乃營洛邑以為此天下之中也諸矦四方納貢職道里均矣有徳則易以王無徳則易以亡故周之盛時天下和洽諸侯四夷莫不賔服効其貢職及其衰也天下莫朝周不能制也非唯其徳薄也形勢弱也今陛下起豐沛卷蜀漢定三秦與項羽戰滎陽成臯之間大戰七十小戰四十使天下之民肝腦塗地父子暴骨中野不可勝數哭泣之聲未絶傷夷者未起而欲比隆於成康之時臣竊以為不侔也且夫秦地被山帶河四塞以為固卒然有急百萬之衆可立具也因秦之故資甚美膏腴之地此所謂天府者也陛下入闗而都之山東雖亂秦之故地可全而有也夫與人鬭不搤其亢拊其背未能全其勝也今陛下案秦之故地此亦搤天下之亢而拊其背也帝問羣臣羣臣皆山東人爭言周王數百年秦二世即亡洛陽東有成皐西有殽澠倍河鄉伊洛其固亦足恃也上問張良良曰洛陽雖有此固其中小不過數百里田地薄四靣受敵此非用武之國也闗中左殽函右隴蜀沃野千里南有巴蜀之饒北有胡苑之利阻三面而守獨以一面東制諸侯諸侯安定河渭漕輓天下西給京師諸侯有變順流而下足以委輸此所謂金城千里天府之國也婁敬説是也上即日車駕西都長安拜婁敬為郎中號曰奉春君賜姓劉氏張良素多病從上入闗即道引不食穀杜門不出曰家世相韓及韓滅不愛萬金之資為韓報讎彊秦天下振動今以三寸舌為帝者師封萬戸侯此布衣之極於良足矣願棄人間事欲從赤松子游耳臣光曰夫生之有死譬猶夜旦之必然自古及今固未嘗有超然而獨存者也以子房之明辨達理足以知神仙之為虛詭矣然其欲從赤松子游者其智可知也夫功名之際人臣之所難處如高帝所稱者三傑而已淮隂誅夷蕭何繫獄非以履盛滿而不止耶故子房託於神仙遺棄人間等功名於外物置榮利而不顧所謂明哲保身者子房有焉六月壬辰大赦天下秋七月燕王臧荼反上自将征之趙景王耳長沙文王芮皆薨九月虜臧荼壬子立太尉長安侯盧綰為燕王綰家與上同里閈綰生又與上同日上寵幸綰羣臣莫敢望故特王之項羽故將利幾反上自擊破之後九月治長樂宮項王将鍾離昧素與楚王信善項王死後亡歸信漢王怨昧聞其在楚詔楚捕昧信初之國行縣邑陳兵出入六年冬十月人有上書告楚王信反者帝以問諸將皆曰亟發兵阬豎子耳帝黙然又問陳平陳平曰人上書言信反信知之乎曰不知陳平曰陛下精兵孰與楚上曰不能過平曰陛下諸將用兵有能過韓信者乎上曰莫及也平曰今兵不如楚精而將不能及舉兵攻之是趣之戰也竊為陛下危之上曰為之柰何平曰古者天子有巡狩㑹諸侯陛下第出偽游雲夢㑹諸侯於陳陳楚之西界信聞天子以好出游其埶必無事而郊迎謁謁而陛下因禽之此特一力士之事耳帝以為然乃發使告諸侯㑹陳吾將南游雲夢上因隨以行楚王信聞之自疑懼不知所為或説信曰斬鍾離眛以謁上上必喜無患信從之十二月上㑹諸侯於陳信持眛首謁上上令武士縛信載後車信曰果若人言狡兎死走狗烹髙鳥盡良弓藏敵國破謀臣亡天下已定我固當烹上曰人告公反遂械繫信以歸因赦天下田肯賀上曰陛下得韓信又治秦中秦形勝之國也帶河阻山地埶便利其以下兵於諸侯譬猶居髙屋之上建瓴水也夫齊東有琅邪即墨之饒南有泰山之固西有濁河之限北有勃海之利地方二千里持㦸百萬此東西秦也非親子弟莫可使王齊百上曰善賜金五百斤上還至洛陽赦韓信封為淮隂侯信知漢王畏惡其能多稱病不朝從居常鞅鞅羞與絳灌等列嘗過樊將軍噲噲跪拜送迎言稱臣曰大王乃肯臨臣信出門笑曰生乃與噲等為伍上嘗從容與信言諸将能將兵多少上問曰如我能將㡬何信曰陛下不過能將十萬上曰於君何如曰臣多多而益善耳上笑曰多多益善何為為我禽信曰陛下不能將兵而善將將此乃信之所以為陛下禽也且陛下所謂天授非人力也甲申始剖符封諸功臣為徹侯蕭何封鄼侯所食邑獨多功臣皆曰臣等身被堅執鋭多者百餘戰少者數十合今蕭何未嘗有汗馬之勞徒持文墨議論顧反居臣等上何也帝曰諸君知獵乎夫獵追殺獸兎者狗也而發縱指示獸處者人也今諸君徒能得走獸耳功狗也至如蕭何發縱指示功人也羣臣皆莫敢言張良為謀臣亦無戰鬭功帝使自擇齊三萬戸良曰臣始起下邳與上㑹留此天以臣授陛下陛下用臣計幸而時中臣願封留足矣不敢當三萬户乃封張良為留侯封陳平為户牖侯平辭曰此非臣之功也上曰吾用先生謀計戰勝克敵非功而何平曰非魏無知臣安得進上曰若子可謂不背本矣乃復賞魏無知帝以天下初定子幼昆弟少懲秦孤立而亡欲大封同姓以填撫天下春正月丙午分楚王信地為二國以淮東五十三縣立從兄將軍賈為荆王以薛郡東海彭城三十六縣立弟文信君交為楚王壬子以雲中鴈門代郡五十三縣立兄宜信侯喜為代王以膠東膠西臨菑濟北愽陽城陽郡七十三縣立微時外婦之子肥為齊王諸民能齊言者皆以與齊上以韓王信材武所王北近鞏洛南迫宛葉東有淮陽皆天下勁兵處乃以太原郡三十一縣為韓國徙韓王信王太原以北僃禦胡都晉陽信上書曰國被邊匈奴數入寇晉陽去塞逺請治馬邑上許之上已封大功臣二十餘人其餘日夜爭功不決未得行封上在洛陽南宮從複道望見諸將往往相與坐沙中語上曰此何語留侯曰陛下不知乎此謀反耳上曰天下屬安定何故反乎留侯曰陛下起布衣以此屬取天下今陛下為天子而所封皆故人所親愛所誅皆生平所仇怨今軍吏計功以天下不足徧封此屬畏陛下不能盡封恐又見疑平生過失及誅故即相聚謀反耳上乃憂曰為之柰何留侯曰上平生所憎羣臣所共知誰最甚者上曰雍齒與我有故怨數甞窘辱我我欲殺之為其功多故不忍留侯曰今急先封雍齒則羣臣人人自堅矣於是上乃置酒封雍齒為什方侯而急趨丞相御史定功行封羣臣罷酒皆喜曰雍齒尚為侯我屬無患矣臣光曰張良為髙帝謀臣委以心腹宜其知無不言安有聞諸將謀反必待高帝目見偶語然後乃言之邪蓋以髙帝初得天下數用愛憎行誅賞或時害至公羣臣往往有觖望自危之心故良因事納忠以變移帝意使上無阿私之失下無猜懼之謀國家無虞利及後丗若良者可謂善諌矣列矦畢已受封詔定元功十八人位次皆曰平陽侯曹參身被七十創攻城畧地功最多宐第一謁者闗内侯鄂千秋進曰羣臣議皆誤夫曹參雖有野戰略地之功此特一時之事耳上與楚相距五嵗失軍亡衆跳身遁者數矣然蕭何常從闗中遣軍補其處非上所詔令召而數萬衆㑹上之乏絶者數矣又軍無見糧蕭何轉漕闗中給食不乏陛下雖數亡山東蕭何常全闗中以待陛下此萬世之功也今雖亡曹參等百數何缺於漢漢得之不必待以全柰何欲以一旦之功而加萬世之功哉蕭何第一曹參次之上曰善於是乃賜蕭何帶劒履上殿入朝不趨上曰吾聞進賢受上賞蕭何功雖髙得鄂君乃益明於是因鄂千秋故所食邑封為安平侯是日悉封何父子兄弟十餘人皆有食邑益封何二千戸上歸櫟陽夏五月丙午尊太公為太上皇初匈奴畏秦北徙十餘年及秦滅匈奴復稍南度河單于頭曼有太子曰冒頓後有所愛閼氏生少子頭曼欲立之是時東胡彊而月氏盛乃使冒頓質於月氏既而頭曼急擊月氏月氏欲殺冒頓冒頓盜其善馬騎之亡歸頭曼以為壯令將萬騎冒頓乃作鳴鏑習勒其騎射令曰鳴鏑所射而不悉射者斬之冒頓乃以鳴鏑自射其善馬旣又射其愛妻左右或不敢射者皆斬之最後以鳴鏑射單于善馬左右皆射之於是冒頓知其可用從頭曼獵以鳴鏑射頭曼其左右亦皆隨鳴鏑而射遂殺頭曼盡誅其後母與弟及大臣不聽從者冒頓自立為單予東胡聞冒頓立乃使使謂冒頓欲得頭曼時千里馬冒頓問羣臣羣臣皆曰此匈奴寳馬也勿與冒頓曰柰何與人鄰國而愛一馬乎遂與之居頃之東胡又使使謂冒頓欲得單于一閼氏冒頓復問左右左右皆怒曰東胡無道乃求閼氏請擊之冒頓曰柰何與人鄰國愛一女子乎遂取所愛閼氏予東胡東胡王愈益驕東胡與匈奴中間有棄地莫居千餘里各居其邊為甌脱東胡使使謂冒頓此棄地欲有之冒頓問羣臣羣臣或曰此棄地予之亦可勿與亦可於是冒頓大怒曰地者國之本也柰何予之諸言予之者皆斬之冒頓上馬令國中有後出者斬遂襲擊東胡東胡初輕冒頓不為僃冒頓遂滅東胡既歸又西擊走月氏南并樓煩白羊河南王遂侵燕代悉復收䝉恬所奪匈奴故地與漢闗故河南塞至朝那膚施是時漢兵方與項羽相距中國罷於兵革以故冒頓得自彊控􅁌之士三十餘萬威服諸國秋匈奴圍韓王信於馬邑信數使使胡求和解漢發兵救之疑信數間使有二心使人責讓信信恐誅九月以馬邑降匈奴匈奴冒頓因引兵南踰句注攻太原至晉陽帝悉去秦苛儀法為簡易羣臣飲酒爭功醉或妄呼拔劔擊柱帝益猒之叔孫通説上曰夫儒者難與進取可與守成臣願徵魯諸生與臣弟子共起朝儀帝曰得無難乎叔孫通曰五帝異樂三王不同禮禮者因時世人情為之節文者也臣願頗采古禮與秦儀雜就之上曰可試為之令易知度吾所能行者為之於是叔孫通使徵魯諸生三十餘人魯有兩生不肯行曰公所事者且十主皆面諛以得親貴今天下初定死者未􅁙傷者未起又欲起禮樂禮樂所由起積徳百年而後可興也吾不忍為公所為公去矣無汙我叔孫通笑曰若真鄙儒也不知時變遂與所徵三十人西及上左右為學者與其弟子百餘人為綿蕞野外習之月餘言於上曰可試觀矣上使行禮曰吾能為此乃令羣臣習肄七年冬十月長樂宮成諸侯羣臣皆朝賀先平明謁者治禮以次引入殿門陳東西鄉衛官俠陛及羅立廷中皆執兵張旗幟於是皇帝傳警輦出房引諸侯王以下至吏六百石以次奉賀莫不振恐肅敬至禮畢復置灋酒諸侍坐殿上皆伏抑首以尊卑次起上夀觴九行謁者言罷酒御史執法舉不如儀者輒引去竟朝置酒無敢讙譁失禮者於是帝曰吾乃今日知為皇帝之貴也乃拜叔孫通為太常賜金五百斤初秦有天下悉内六國禮儀釆擇其尊君抑臣者存之及通制禮頗有所增損大抵皆襲秦故自天子稱號下至佐僚及宫室官名少所變改其書後與律令同錄藏於理官法家又復不傳民臣莫有言者焉臣光曰禮之為物大矣用之於身則動静有法而百行僃焉用之於家則内外有别而九族睦焉用之於鄉則長幼有倫而俗化美焉用之於國則君臣有叙而政治成焉用之於天下則諸侯順服而紀綱正焉豈直几席之上戸庭之間得之而不亂哉夫以髙祖之明達聞陸賈之言而稱善睹叔孫通之儀而歎息然所以不能肩於三代之王者病於不學而已當是之時得大儒而佐之與之以禮為天下其功烈豈若是而止哉惜夫叔孫生之為器小也徒竊禮之糠粃以依世諧俗取寵而已遂使先王之禮淪没而不振以迄于今豈不痛甚矣哉是以揚子譏之曰昔者魯有大臣史失其名曰何如其大也曰叔孫通欲制君臣之儀召先生於魯所不能致者二人曰若是則仲尼之開迹諸侯也非邪曰仲尼開迹將以自用也如委已而從人雖有規矩凖繩焉得而用之善乎揚子之言也夫大儒者惡肯毀其規矩準繩以趨一時之功哉上自将擊韓王信破其軍於銅鞮斬其將王喜信亡走匈奴白土人曼丘臣王黄等立趙苗裔趙利為王復收信敗散兵與信及匈奴謀攻漢匈奴使左右賢王將萬餘騎與王黄等屯廣武以南至晉陽漢兵擊之匈奴輒敗走已復屯聚漢兵乗勝追之㑹天大寒雨雪士卒墮指者什二三上居晉陽聞冒頓居代谷欲擊之使人覘匈奴冒頓匿其壯士肥牛馬但見老弱及羸畜使者十輩來皆言匈奴可擊上復使劉敬徃使匈奴未還漢悉兵三十二萬北逐之踰句注劉敬還報曰兩國相擊此宐夸矜見所長今臣徃徒見羸瘠老弱此必欲見短伏竒兵以爭利愚以為匈奴不可擊也是時漢兵已業行上怒罵劉敬曰齊虜以口舌得官今乃妄言沮吾軍械繫敬廣武帝先至平城兵未盡到冒頓縱精兵四十萬騎圍帝於白登七日漢兵中外不得相救餉帝用陳平袐計使使間厚遺閼氏閼氏謂冒頓曰兩主不相困今得漢地而單于終非能居之也且漢主亦有神靈單于察之冒頓與王黄趙利期而黄利兵不來疑其與漢有謀乃解圍之一角㑹天大霧漢使人徃來匈奴不覺陳平請令彊弩傅兩矢外鄉從觧角直出帝出圍欲驅太僕滕公固徐行至平城漢大軍亦到胡􅀐遂解去漢亦罷兵歸令樊噲止定代地上至廣武赦劉敬曰吾不用公言以困平城吾皆已斬前使十輩矣乃封敬二千戸為闗内侯號為建信侯帝南過曲逆曰壯哉縣吾行天下獨見洛陽與是耳乃更封陳平為曲逆侯盡食之平從帝征伐凡六出竒計輒益封邑焉十二月上還過趙趙王敖執子壻禮甚卑上箕倨慢罵之趙相貫髙趙午等皆怒曰吾王孱王也乃説王曰天下豪桀並起能者先立今王事帝甚恭而帝無禮請為王殺之張敖齧其指出血曰君何言之誤先人亡國賴帝得復國徳流子孫秋豪皆帝力也願君無復出口貫髙趙午等皆相謂曰乃吾等非也吾王長者不倍徳且吾等義不辱今帝辱我王故欲殺之何洿王為事成歸王事敗獨身坐耳匈奴攻代代王喜棄國自歸赦為郃陽侯辛卯立皇子如意為代王春二月上至長安蕭何治未央宮上見其壯麗甚怒謂何曰天下匈匈苦戰數嵗成敗未可知是何治宫室過度也何曰天下方未定故可因以就宫室且夫天子以四海為家非壯麗無以重威且無令後世有以加也上説臣光曰王者以仁義為麗道徳為威未聞其以宮室填服天下也天下未定當克己節用以趨民之急而顧以宫室為先豈可謂之知所務哉昔禹卑宫室而桀為傾宫創業垂統之君躬行節儉以訓示子孫其末流猶入於淫靡況示之以侈乎乃云無令後世有以加豈不謬哉至于孝武卒以宮室罷敝天下未必不由鄼侯啓之也上自櫟陽徙都長安初置宗正官以序九族夏四月帝行如洛陽資治通鑑卷第十一
