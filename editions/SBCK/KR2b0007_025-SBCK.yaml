front:
  text: 奭爲皇太子以丙吉爲太傅太中大夫䟽廣爲少傅封太子外祖父許廣漢爲平恩矦又封霍光兄孫中郎將雲爲冠陽矦霍顯聞立太子怒恚不食歐血曰此乃民閒時子安得立即后有子反爲王邪復教皇后令毒太子皇后數召太子賜食保阿輙先甞之后挾毒不得行
