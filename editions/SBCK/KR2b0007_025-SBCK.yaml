body:
  text: 五月甲申丞相賢以老病乞骸骨賜黃金百斤安車駟馬罷就第丞相致仕自賢始六月壬辰以魏相爲丞相辛丑丙吉爲御史大夫䟽廣爲太子太傅廣兄子受爲少傅太子外祖父平恩矦許伯以爲太子少白使其弟中郎將舜監䕶太子家上以問廣廣對曰太子國儲副君師友必於天下英俊不宜獨親外家許氏且太子自有太傅少傅官屬已僃今復使舜護太子家示陋非所以廣太子德於天下也上善其言以語魏相相免冠謝曰此非臣等所能及廣由是見器重京師大雨雹大行丞東海蕭望之上䟽言大臣任政一姓專權之所致上素聞望之名拜為謁者時上博延賢俊民多上書言便宜輒下望之問狀髙者請丞相御史次者中二千石試事滿歳以狀聞下者報聞罷所白處奏皆可冬十月詔曰乃者九月壬申地震朕甚懼焉有能箴朕過失及賢良方正直言極諌之士以匡朕之不逮毋諱有司朕旣不德不能附逺是以邊境屯戍未息今復飭兵重屯乆勞百姓非所以綏天下也其罷車􅀐將軍右將軍屯兵又詔池籞未御幸者假與貧民郡國宫館勿復修治流民還歸者假公田貸種食且勿筭事霍氏驕侈縱橫太夫人顯廣治第室作乗輿輦加畫繡絪馮黃金塗韋絮薦輪侍婢以五采絲輓顯游戲第中與監奴馮子都亂而禹山亦並繕治第宅走馬馳逐平樂館雲當朝請數稱病私出多從賔客張圍獵黃山􅁐中使倉頭奴上朝謁莫敢譴者顯及諸女畫夜出入長信宫殿中亡期度帝自在民閒聞知霍氏尊盛日乆内不能善旣躬親朝政御史大夫魏相給事中顯謂禹雲山女曹不務奉大將軍餘業今大夫給事中他人壹閒女能復自救邪後兩家奴爭道霍氏奴入御史府欲躢大夫門單于死虚閭權渠單于始立而黜顓渠閼氏顓渠閼氏即與右賢王屠􅂄堂私通右賢王㑹龍城而去顓渠閼氏語以單于病甚且勿逺後數日單于死用事貴人郝宿王刑未央使人召諸王未至顓渠閼氏與其弟左大且渠都隆竒謀立右賢王為握􅄛朐鞮單于握􅄛朐鞮單于者烏維單于耳孫也握􅄛朐鞮單于立凶惡殺刑未央等而任用都隆竒又盡免虚閭權渠子弟近親而自以其子弟代之虚閭權渠單于子稽矦㹪旣不得立亡歸妻父烏禪幕烏禪幕者本烏孫康居閒小國數見侵􅁀率其衆數千人降匈奴狐鹿姑單于以其弟子日逐王姊妻之使長其衆居右地日逐王先賢撣其父左大司馬者又收范明友度遼將軍印綬但為光禄勲及光中女壻趙平為散􅀐都尉光禄大夫將屯兵又收平􅀐都尉印綬諸領胡越􅀐羽林及兩宫衞將屯兵悉易以所親信許史子弟代之初孝武之丗徴發煩數百姓貧耗窮民犯灋姦軌不勝於是使張湯趙禹之屬條定法令作見知故縱監臨部主之灋緩深故之罪急縱出之誅其後姦猾巧灋轉相比況禁罔寖密律令煩苛文書盈於几閣典者不能徧睹是以郡國承用者駮或罪同而論異姦吏因縁為市所欲活則􅀓生議所欲䧟則予死比議者咸􅁈傷之廷尉史鉅鹿路温舒上書曰臣聞齊有無知之禍而􅁊公以興晉有驪姬之難而文公用伯近丗趙王不終諸吕作亂而孝文為太宗繇是觀之禍亂之作將以開聖人也夫繼變亂之後必有異舊之恩此賢聖所以昭天命也往者昭帝即丗無嗣昌邑淫亂乃皇天所以開至聖也臣聞春秋正即位大一統而愼始也陛下初登至尊與天合符宜改前丗之失正始受命之統滌煩文除民疾以應天意臣聞秦有十失其一尚存治獄之吏是也夫獄者天下之大命也死者不可復生絶者不可復屬書曰與其殺不辜寧失不經今治獄吏則不然上下相􅇌以刻為明深者獲公名平者多後患故治獄之吏皆欲人死非憎人也自安之道在人之死是以死人之血流離於市被刑之徒比肩而立大辟之計歳以萬數此仁聖之所以傷也太平之未洽凡以此也夫人情安則樂生痛則思死棰楚之下何求而不得故囚人不勝痛則飾辭以示之吏治者利其然則指導以明之上奏畏卻則鍜練而周内之蓋奏當之成雖皐陶聽之猶以為死有餘辜何則成練者衆文致之罪明也故俗語曰畫地為獄議不入刻木為吏期不對此皆疾吏之風悲痛之辭也唯陛下省灋制寛刑罰則太平之風可興於丗上善其言十二月詔曰閒者吏用灋巧文􅎊深是朕之不德也夫決獄不當使有罪興邪不辜蒙戮父子悲恨朕甚傷之今遣廷史與郡鞠獄任輕禄薄其為置廷尉平秩六百石貟四人其務平之以稱朕意於是每季秋後請讞時上常幸宣室齋居而决事獄刑號為平矣涿郡太守鄭昌上䟽言今明主躬垂明聽雖不置廷平獄將自正􅀂開後嗣不􅀂刪定律令律令一定愚民知所避姦吏無所弄矣今不正其本而置廷平以理其末政衰聽怠則廷平將召權而為亂首矣昭帝時匈奴使四千􅀐田車師及五將軍擊匈奴車師田者驚去車師復通於漢匈奴怒召其太子軍􅀫欲以為質軍􅀫焉􅂄外孫不欲質匈奴亡走焉􅂄車師王更立子烏貴為太子及烏貴立為王與匈奴結㛰姻敎匈奴遮漢道通烏孫者是歲侍郎㑹稽鄭吉與校尉司馬憙將免刑罪人田渠犂積榖發城郭諸國兵萬餘人與所將田士千五百人共擊車師破之車師王請降匈奴發兵攻車師吉憙引兵北逢之匈奴不敢前吉憙即留一侯與卒二十人留守王􅁻等引兵歸渠犂車師王恐匈奴兵復至而見殺也廼輕􅀐奔烏孫吉即迎其妻子傳送長安匈奴更以車師王昆弟兠莫為車師王收其餘民東徙不敢居故地而鄭吉始使吏卒三百人往田車師地以實之上自初即位數遣使者求外家乆逺多似􅀋而非是是歳求得外祖母王媪及媪男無故武上賜無故武爵􅀜内矦旬日間賞賜以鉅萬計四年春二月賜外祖母號為博平君封舅無故為平昌矦武為樂昌矦夏五月山陽濟隂雹如雞子深二尺五寸殺二十餘人飛鳥皆死詔自今子有匿父母妻匿夫孫匿大父母皆勿治立廣川惠王孫文為廣川王霍顯及禹山雲自見日侵削數相對啼泣自怨山曰今丞相用事縣官信之盡變易大將軍時灋令發揚大將軍過失又諸儒生多寠人子逺客飢寒喜妄說狂言不避忌諱大將軍常讎之今陛下好與諸儒生語人人自書對事多言我家者甞有上書言我家昆弟驕恣其言絶痛山屏不奏後上書者益黠盡奏封事輒使中書令出取之不關尚書益不信人又聞民閒讙言霍氏毒殺許皇后寧有是邪顯恐急即具以實告禹山雲禹山雲驚曰如是何不早告禹等縣官離散斥逐諸壻用是故也此大事誅罰不小奈何於是始有邪謀矣雲舅李竟所善張赦見雲家卒卒謂竟曰今丞相與平恩矦用事可令太夫人言太后先誅此兩人移徙陛下在太后耳長安男子張章告之事下廷尉執金吾捕張赦等後有詔止勿捕山等愈恐相謂曰此縣官重太后故不竟也然惡端已見乆之猶發發即族矣不如先也遂令諸女各歸報其夫皆曰安所相避㑹李竟坐與諸矦王交通辭語及霍氏有詔雲山不宜宿衞免就第山陽太守張敞上封事曰臣聞公子季友有功於魯趙衰有功於晉田完有功於齊皆疇其庸延及子孫終後田氏􅆲齊趙氏分晉季氏顓曾哉仲尼作春秋迹盛衰譏丗卿最甚乃者大將軍決大計安宗廟定天下功亦不細矣夫周公七年耳而大將軍二十歲海内之命斷於掌握方其隆盛時感動天地侵迫隂陽朝臣宜有明言曰陛下襃寵故大將軍以報功德足矣閒者輔臣顓政貴戚大盛君臣之分不明請罷霍氏三矦皆就第及衞將軍張安丗宜賜几杖歸休時存問召見以列矦為天子師明詔以恩不聽羣臣以義固爭而後許之天下必以陛下為不忘功德而朝臣為知禮霍氏丗丗無所患苦今朝廷不聞直聲而令明詔自親其文非䇿之得者也今兩矦已出人情不相逺以臣心度之大司馬及其枝屬必有畏懼之心夫近臣自危非完計也臣敞願於廣朝白發其端直守逺郡其路無由唯陛下省察上甚善其計然不召也禹山等家數有妖怪舉家憂愁山曰丞相擅減宗廟羔莬鼃可以此罪也謀令太后為博平君置酒召丞相平恩矦以下使范明友鄧廣漢承太后制引斬之因廢天子而立禹約定未發雲拜為􅀇莬太守太中大夫任宣為代郡太守㑹事發覺秋七月雲山明友自殺顯禹廣漢等捕得禹要斬顯及諸女昆弟皆棄市與霍氏相連坐誅滅者數十家太僕杜延年以霍氏舊人亦坐免官八月己酉皇后霍氏廢處昭臺宮乙丑詔封告霍氏反謀者男子張章期門董忠左曹楊惲侍中金安上史髙皆為列矦惲丞相敞子安上車􅀐將軍日磾弟子髙史良娣兄子也初霍氏奢侈茂陵徐生曰霍氏必亡夫奢則不遜不遜必侮上侮上者逆道也在人之右衆必害之霍氏秉權日乆害之者多矣天下害之而又行以逆道不亡何待乃上䟽言霍氏㤗盛陛下即愛厚之宜以時抑制無使至亡書三上輒報聞其後霍氏誅滅而告霍氏者皆封人為徐生上書曰臣聞客有過主人者見其竈直突傍有積薪客謂主人更為曲突逺徙其薪不者且有火患主人嘿然不應俄而家果失火鄰里共救之幸而得息於是殺牛置酒謝其鄰人灼爛者在於上行餘各以功次坐而不録言曲突者人謂主人曰鄕使聽客之言不費牛酒終亡火患今論功而請賔曲突徙薪無恩澤燋頭爛額為上客邪主人乃寤而請之今茂陵徐福數上書言霍氏且有變宜防絶之鄕使福說得行則國無裂土出爵之費臣無逆亂誅滅之敗往事旣已而福獨不蒙其功唯陛下察之貴徙薪曲突之䇿使居焦髪灼爛之右上乃賜福帛十匹後以為郎帝初立謁見髙廟大將軍光驂乗上内嚴憚之􅀂有芒刺在背後車􅀐將軍張安世代光驂乗天子從容肆體甚安近焉及光身死而宗族竟誅故俗傳霍氏之禍萌於驂乗後十二歳霍后復徙雲林館乃自殺班固賛曰霍光受襁褓之託任漢室之􅀉匡國家安社稷擁昭立宣雖周公阿衡何以加此然光不學亡術闇於大理隂妻邪謀立女爲后湛溺􅄹溢之欲以增顚覆之禍死財三年宗族誅夷哀哉臣光曰霍光之輔漢室可謂忠矣然卒不能庇其宗何也夫威福者人君之器也人臣執之乆而不歸鮮不及矣以孝昭之明十四而知上官桀之詐固可以親政矣況孝宣十九即位聦明剛毅知民疾苦而光乆專大柄不知避去多置親黨充塞朝廷使人主蓄憤於上吏民積怨於下切齒側目待時而發其得免於身幸矣況子孫以驕侈趣之哉雖然曏使孝宣專以禄秩賞賜富其子孫使之食大縣奉朝請亦足以報盛德矣乃復任之以政授之以兵及事叢釁積更加裁奪遂至怨懼以生邪謀豈徒霍氏之自禍哉亦孝宣醖釀以成之也昔􅃲椒作亂於楚莊王滅其族而赦箴尹克黃以為子文無後何以勸善夫以顯禹雲山之罪雖應夷滅而光之忠勲不可不祀遂使家無噍􅀋孝宣亦少恩哉九月詔減天下鹽賈又令郡國歲上繫囚以掠笞􅀂痩死者所坐縣名爵里丞相御史課殿最以聞十二月清河王年坐内亂廢遷房陵是歲北海太守廬江朱邑以治行第一入為大司農勃海太守龔遂入為水衡都尉先是勃海左右郡歲饑盗賊竝起二千石不能禽制上選能治者丞相御史舉故昌邑郎中令龔遂上拜為勃海太守召見問何以治勃海息其盗賊對曰海瀕遐逺不霑聖化其民困於飢寒而吏不恤故使陛下赤子盜弄陛下之兵於潢池中耳今欲使臣勝之邪將安之也上曰選用賢良固欲安之也遂曰臣聞治亂民猶治亂繩不可急也唯緩之然後可治臣願丞相御史且無拘臣以文灋得一切便宜從事上許焉加賜黃金贈遣乗傳至勃海界郡聞新太守至發兵以迎遂皆遣還移書敕屬縣悉罷逐捕盗賊吏諸持鉏鉤田器者皆為良民吏毋得問持兵者乃為賊遂單車獨行至府盗賊聞遂敎令即時解散棄其兵弩而持鉤鉏於是悉平民安土樂業遂乃開倉廪假貧民選用良吏尉安牧養焉遂見齊俗奢侈好末技不田作乃躬率以儉約勸民務農桑各以口率種樹畜養民有帶持刀劒者使賣劒買牛賣刀買犢曰何為帶牛佩犢勞來循行郡中皆有畜積獄訟止息烏孫公主女為龜兹王絳賔夫人絳賔上書言得尚漢外孫願與公主女俱入朝元康元年春正月龜兹王及其夫人來朝皆賜印綬夫人號稱公主賞賜甚厚初作杜陵徙丞相將軍列矦吏二千石訾百萬者杜陵三月詔以鳯皇集泰山陳留甘露降未央宫赦天下有司復言悼園宜稱尊號曰皇考夏五月立皇考廟冬置建章衞尉趙廣漢好用丗吏子孫新進年少者專厲彊壯蠭氣見事風生無所回避率多果敢之計莫為持難終以此敗廣漢以私怨論殺男子榮畜人上書言之事下丞相御史按驗廣漢疑丞相夫人殺侍婢欲以此脅丞相丞相按之愈急廣漢乃將吏卒入丞相府召其夫人跪庭下受辭收奴婢十餘人去丞相上書自陳事下廷尉治實丞相自以過譴笞傅婢出至外第乃死不如廣漢言帝惡之下廣漢廷尉獄吏民守闕號泣者數萬人或言臣生無益縣官願代趙京兆死使牧養小民廣漢竟坐要斬廣漢為京兆尹廉明威制豪彊小民得職百姓追思歌之是歲少府宋疇坐議鳯皇下彭城未至京師不足美貶為泗水太傅上選博士諫大夫通政事者補郡國守相以蕭望之為平原太守望之上䟽曰陛下哀愍百姓恐德之不究悉出諌官以補郡吏朝無爭臣則不知過所謂憂其末而忘其本者也上廼徴望之入守少府東海太守河東尹翁歸以治郡髙第入為右扶風翁歸為人公廉明察郡中吏民賢不肖及姦邪罪名盡知之縣縣各有記籍自聽其政有急名則少緩之吏民小解輒披籍取人必於秋冬課吏大㑹中及出行縣不以無事時其有所取也以一警百吏民皆服恐懼改行自新其為扶風選用廉平疾姦吏以為右職接待以禮好惡與同之其負翁歸罰亦必行然温良謙退不以行能驕人故尤得名譽於朝廷初烏孫公主少子萬年有寵於莎車王莎車王死而無子時萬年在漢莎車國人計欲自託於漢又欲得烏孫心上書請萬年爲莎車王漢許之遣使者奚充國送萬年萬年初立暴惡國人不說上令羣臣舉可使西域者前將軍韓增舉上黨馮奉丗以衞􅇋使持節送大宛諸國客至伊循城㑹故莎車王弟呼屠徴與旁國共殺其王萬年及漢使者奚充國自立爲王時匈奴又發兵攻車師城不能下而去莎車遣使揚言北道諸國已屬匈奴矣於是攻劫南道與歃盟畔漢從鄯善以西皆絶不通都護鄭吉校尉司馬憙皆在北道諸國閒奉丗與其副嚴昌計以爲不亟擊之則莎車日彊其埶難制必危西域遂以節諭告諸國王因發其兵南北道合萬五千人進擊莎車攻抜其城莎車王自殺傳其首詣長安更立它昆弟子為莎車王諸國悉平威振西域奉丗乃罷兵以聞帝召見韓増曰賀將軍所舉得其人奉丗遂西至大宛大宛聞其斬莎車王敬之異於它使得其名馬象龍而還上甚說議封奉丗丞相將軍皆以為可獨少府蕭望之以為奉丗奉使有指而擅矯制違命發諸國兵雖有功效不可以為後灋即封奉丗開後奉使者利以奉丗為比爭逐發兵要功萬里之外為國家生事於夷狄漸不可長奉丗不宜受封上善望之議以奉丗為光禄大夫二年春正月赦天下上欲立皇后時館陶主母華倢伃及淮陽憲王母張倢伃楚孝王母衞倢伃皆愛幸上欲立張倢伃為后乆之懲艾霍氏欲害皇太子乃更選後宫無子而謹愼者二月乙丑立長陵王倢伃為皇后令母養太子封其父奉光為卭成矦后無寵希得進見五月詔曰獄者萬民之命能使生者不怨死者不恨則可謂文吏矣今則不然用灋或持巧心析律貳端深淺不平奏不如實上亦亡由知四方黎民將何仰哉二千石各察官屬勿用此人吏或擅興徭役飾厨傳稱過使客越職踰灋以取名譽譬猶踐薄冰以待白日豈不殆哉今天下頗被疾疫之災朕甚愍之其令郡國被災甚者母出今年租賦又曰聞古天子之名難知而易諱也其更諱詢匈奴大臣皆以為車師地肥美近匈奴使漢得之多田積榖必害人國不可不爭由是數遣兵擊車師田者鄭吉將渠犂田卒七千餘人救之為匈奴所圍吉上言車師去渠犂千餘里漢兵在渠犁者少埶不能相救願益田卒上與後將軍趙充國等議欲因匈奴衰弱出兵擊其右地使不敢復擾西域魏相上書諫曰臣聞之救亂誅􅁀謂之義兵兵義者王敵加於己不得已而起者謂之應兵兵應者勝爭恨小故不忍憤怒者謂之忿兵兵忿者敗利人土地貨寶者謂之貪兵兵貪者破恃國家之大矜民人之衆欲見威於敵者謂之驕兵兵驕者滅此五者非但人事乃天道也閒者匈奴甞有善意所得漢民輒奉歸之未有犯於邊境雖爭屯田車師不足致意中今聞諸將軍欲興兵入其地臣愚不知此兵何名者也今邊郡困乏父子共犬羊之裘食草菜之實常恐不能自存難以動兵軍旅之後必有凶年言民以其愁苦之氣傷隂陽之和也出兵雖勝猶有後憂恐災害之變因此以生今郡國守相多不實選風俗尤薄水旱不時按今年計子弟殺父兄妻殺夫者凡二百二十二人臣愚以為此非小變也今左右不憂此乃欲發兵報纎介之忿於逺夷殆孔子所謂吾恐季孫之憂不在顓􅁷而在蕭墻之内也上從相言止遣長羅矦常惠將張掖酒泉􅀐往車師迎鄭吉及其吏士還渠犁召故車師太子軍宿在焉􅂄者立以為王盡徙車師國民令居渠犂遂以車師故地與匈奴以鄭吉為衞司馬使護鄯善以西南道魏相好觀漢故事及便宜章奏數條漢興已來國家便宜行事及賢臣賈誼鼂錯董仲舒等所言奏請施行之相敕􅁺史按事郡國及休告從家還至府輒白四方異聞或有逆賊風雨災變郡不上相輒奏言之與御史大夫丙吉同心輔政上皆重之丙吉為人深厚不伐善自曾孫遭遇吉絶口不道前恩故朝廷莫能明其功也㑹掖庭宫婢則令民夫上書自陳甞有阿保之功章下掖庭令考問則辭引使者丙吉知狀掖庭令將則詣御史府以視吉吉識謂則曰汝甞坐養皇曽孫不謹督笞汝汝安得有功獨渭城胡組淮陽郭徴卿有恩耳分别奏組等共養勞苦狀詔吉求組徴卿已死有子孫皆受厚賞詔免則為庶人賜錢十萬上親見問然後知吉有舊恩而終不言上大賢之帝以蕭望之經明持重論議有餘材任宰相欲詳試其政事復以為左馮翊望之從少府出為左遷恐有不合意即移病上聞之使侍中成都矦金安上諭意曰所用皆更治民以考功君前為平原太守日淺故復試之於三輔非有所聞也望之即起視事初掖庭令張賀數為弟車􅀐將軍安丗稱皇曽孫之材美及徴怪安丗輒絶止以爲少主在上不宜稱述曽孫及帝即位而賀已死上謂安丗曰掖庭令平生稱我將軍止之是也上追思賀恩欲封其􅃁爲恩德矦置守冢二百家賀有子蚤死子安丗小男彭祖彭祖又小與上同席研書指欲封之先賜爵􅀜内矦安丗深辭賀封又求損守冢戸數稍減至三十戸上曰吾自爲掖庭令非爲將軍也安丗乃止不敢復言上心忌故昌邑王賀賜山陽太守張敞璽書令謹僃盗賊察往來過客毋下所賜書敞於是條奏賀居處著其廢亡之效曰故昌邑王爲人靑黒色小目鼻末銳卑少須眉身體長大疾痿行歩不便臣敞甞與之言欲動觀其意即以惡鳥感之曰昌邑多梟故王應曰然前賀西至長安殊無梟復來東至濟陽乃復聞梟聲察故王衣服言語跪起清狂不惠臣敞前言哀王歌舞者張修等十人無子留守哀王園請罷歸故王聞之曰中人守園疾者當勿治相殺傷者當勿灋欲令亟死太守柰何而欲罷之其天資喜由亂亡終不見仁義如此上乃知賀不足忌也三年春三月詔封故昌邑王賀為海昬矦乙未詔曰朕微眇時御史大夫丙吉中郎將史曽史􅀇長樂衞尉許舜侍中光禄大夫許延壽皆與朕有舊恩及故掖庭令張賀輔導朕躬修文學經術恩惠卓異厥功茂焉詩不云乎無德不報封賀所子弟子侍中中郎將彭祖為陽都矦追賜賀謚曰陽都哀矦吉為博陽矦曽為將陵矦􅀇為平臺矦舜為博望矦延壽為樂成矦賀有􅀌孫霸年七歲拜為散􅀐中郎將賜爵􅀜内矦故人下至郡邸獄復作甞有阿保之功者皆受官禄田宅財物各以恩深淺報之吉臨當封病上憂其不起將使人就加印紼而封之及其生存也太子太傅夏矦勝曰此未死也臣聞有隂德者必饗其樂以及子孫今吉未獲報而疾甚非其死疾也後病果愈張安丗自以父子封矦在位太盛乃辭禄詔都内别藏張氏無名錢以百萬數安丗謹慎周密每定大政已决輒移病出聞有詔令乃驚使吏之丞相府問焉自朝迁大臣莫知其與議也甞有所薦其人來謝安丗大恨以為舉賢逹能豈有私謝邪絶弗復為通有郎功髙不調自言安丗安丗應曰君之功髙明主所知人臣執事何長短而自言乎絶不許已而郎果遷安丗自見父子尊顯懐不自安為子延壽求出􅀘吏上以為北地太守歲餘上閔安丗年老復徴延壽為左曹太僕夏四月丙子立皇子欽為淮陽王皇太子年十二通論語孝經太傅䟽廣謂少傅受曰吾聞知足不辱知止不殆今仕宦至二千石官成名立如此不去懼有後悔即日父子俱移病上䟽乞骸骨上皆許之加賜黄金二十斤皇太子贈以五十斤公卿故人設祖道供張東都門外送者車數百兩道路觀者皆曰賢哉二大夫或歎息為之下泣廣受歸鄕里日令其家賣金共具請族人故舊賔客與相娛樂或勸廣以其金為子孫頗立産業者廣曰吾豈老誖不念子孫哉顧自有舊田廬令子孫勤力其中足以共衣食與凡人齊今復増益之以為贏餘但教子孫怠墯耳賢而多財則損其志愚而多財則益其過且夫冨者衆之怨也吾旣無以敎化子孫不欲益其過而生怨又此金者聖主所以惠養老臣也故樂與鄕黨宗族共饗其賜以盡吾餘日不亦可乎於是族人恱服潁川太守黃霸使郵亭鄕官皆畜雞豚以贍鰥貧寡窮者然後為條敎置父老師帥伍長班行之於民間勸以為善防姦之意及務耕桑節用殖財種樹畜養去浮淫之費其治米鹽靡密初􅀂煩碎然霸精力能推行之吏民見者語次尋繹問它隂伏以相參考聦明識事吏民不知所出咸稱神明豪釐不敢有所欺姦人去入它郡盗賊日少霸力行敎化而後誅罰務在成就全安長吏許丞老病聾督郵白欲逐之霸曰許丞廉吏雖老尚能拜起送迎正頗重聽何傷且善助之毋失賢者意或問其故霸曰數易長吏送故迎新之費及姦吏因縁絶簿書盗財物公私費耗甚多皆當出於民所易新吏又未必賢或不如其故徒相益為亂凡治道去其泰甚者耳霸以外寛内明得吏民心戸口歲増治為天下第一徴守京兆尹頃之坐灋連貶秩有詔復歸潁川為太守以八百石居四年春正月詔年八十以上非誣告殺傷人它皆勿坐右扶風尹翁歸卒家無餘財秋八月詔曰翁歸廉平鄕正治民異等其賜翁歸子黃金百斤以奉祭祀上令有司求髙祖功臣子孫失矦者得槐里公乗周廣漢等百三十六人皆賜黃金二十斤復其家令奉祭祀丗丗勿絶丙寅冨平敬矦張安丗薨􅀄扶陽節矦韋賢薨長子􅀪有罪繫獄家人矯賢令以次子大河都尉􅀇成為後􅀇成深知其非賢雅意即陽為病狂卧便利妄笑語昬亂旣葬當襲爵以狂不應召大鴻臚奏狀章下丞相御史案驗案事丞相史廼與􅀇成書曰古之辭讓必有文義可觀故能垂榮於後今子獨壞容貌蒙恥辱為狂癡光曜晻而不宣微哉子之所託名也僕素愚陋過為宰相執事願少聞風聲不然恐子傷髙而僕為小人也􅀇成友人侍郎章亦上䟽言聖王貴以禮讓為國宜優養􅀇成勿枉其志使得自安衡門之下而丞相御史遂以􅀇成實不病劾奏之有詔勿劾引拜􅀇成不得已受爵帝髙其節以􅀇成為河南太守車師王烏貴之走烏孫也烏孫留不遣漢遣使責烏孫烏孫送烏貴詣闕初武帝開河西四郡隔絶羌與匈奴相通之路斥逐諸羌不使居湟中地及帝即位光禄大夫義渠安國使行諸羌先零豪言願時度湟水北逐民所不田處畜牧安國以聞後將軍趙充國劾安國奉使不敬是後羌人旁縁前言扺冒度湟水郡縣不能禁旣而先零與諸羌種豪二百餘人解仇交質盟詛上聞之以問趙充國對曰羌人所以易制者以其種自有豪數相攻擊埶不壹也往三十餘歳西羌反時亦先解仇合約攻令居與漢相距五六年乃定匈奴數誘羌人欲與之共擊張掖酒泉地使羌居之閒者匈奴困於西方疑其更遣使至羌中與相結臣恐羌變未止此且復結聮他種宜及未然爲之僃後月餘羌矦狼何果遣使至匈奴藉兵欲擊鄯善燉煌以絶漢道充國以爲狼何􅀔不能獨造此計疑匈奴使已至羌中先零䍐开乃解仇作約到秋馬肥變必起矣宜遣使者行邊兵豫為僃敕視諸羌母令解仇以發覺其謀於是兩府復白遣義渠安國行視諸羌分别善惡是時比年豐稔榖石五錢資治通鑑卷第二十五
