front:
  text: 空竭内外百官並斷俸祿而上奢費過度每所造器用必爲正御副御次副各三十枚嬖倖用事貨賂公行上素無子密取諸王􅁎有孕者内宫中生男則殺其母使寵􅁎子之至是寢疾以太子幼弱深忌諸弟南徐州刺史晉平刺王休祐前鎭江陵貪虐無度上不使之鎭留之建康遣上佐行府州事休祐性剛很前後忤上非一上積不能平且慮將來難制欲方便除之甲寅休祐從上於巖山射雉左右從者並在仗後日欲闇上遣左右壽寂之等數人逼休祐令墜馬因共敺拉殺之傳呼驃騎落馬上陽驚遣御醫絡驛就視比其左右至休祐已絶去車輪輿還第追贈司空葬之如禮建康民間訛言荆州刺史巴陵王休若有至貴之相上以此言報之休若憂懼戊午以休若代休祐為南徐州刺史休若腹心將佐皆謂休若還朝必不免禍中兵參軍京兆王敬先説休若曰今主上彌留政成省閤群豎恟恟欲悉去宗支以便其私殿下聲著海内受詔入朝必往而不返荆州帶甲十餘萬地方數千里上可以匡天子除姦臣下可以保境土全一身孰與賜劒邸第使臣妾飲泣而不敢葬乎休若素謹畏偽許之敬先出使人執之以白於上而誅之三月辛酉魏假員外散騎常侍邢祐來聘
  hash: sha256:cd0be3138b8279b7baccc84b453c978d93b0fcc9d01f087d3be296c46fc10502
body:
  text: 魏主使殿中尚書胡莫寒簡西部敕勒為殿中武士莫寒大納貨賂衆怒殺莫寒及高平假鎭將奚陵夏四月諸部敕勒皆叛魏主使汝隂王天賜將兵討之以給事中羅雲為前鋒敕勒詐降襲雲殺之天賜僅以身免晉平刺王旣死建安王休仁益不自安上與嬖臣楊運長等為身後之計運長等亦慮上晏駕後休仁秉政已軰不得專權彌贊成之上疾嘗􅁀甚内外莫不屬意於休仁主書以下皆往東府訪休仁所親信豫自結納其或在直不得出者皆恐懼上聞愈惡之五月戊午召休仁入見既而謂曰今夕停尚書下省宿明可早來其夜遣人齎藥賜死休仁罵曰上得天下誰之力邪孝武以誅鉏兄弟子孫㓕絶今復為爾宋祚其得乆乎上慮有變力疾乘輿出端門休仁死乃入下詔稱休仁規結禁兵謀為亂逆朕未忍明法申詔詰厲休仁慙恩懼罪遽自引决可宥其二子降為始安縣王聽其子伯融襲封上慮人情不悦乃與諸大臣及方鎭詔稱休仁與休祐深相親結語休祐云汝但作佞此法自足安身我從來頗得此力休祐之隕本欲為民除患而休仁從此日生嬈懼吾每呼令入省便入辭楊太妃吾春中多與之射雉或隂雨不出休仁輙語左右云我已復得今一日休仁既經南討與宿衛將帥經習狎共事吾前者積日失適休仁出入殿省無不和顔厚相撫勞如其意趣人莫能測事不獲已反覆思惟不得不有近日處分恐當不必即解故相報知上與休仁素厚雖殺之每謂人曰我與建安年時相鄰少便􅅃狎景和㤗始之間勲誠實重事計交切不得不相除痛念之至不能自已因流涕不自勝初上在藩與禇淵以風素相善及即位􅀷相委仗上寢疾淵為吳郡太守急召之既至入見上流涕曰吾近危篤故召卿欲使著黃􅘼耳黄􅘼者乳母服也上與淵謀誅建安王休仁淵以為不可上怒曰卿癡人不足與計事淵懼而從命復以淵為吏部尚書庚午以尚書右僕射袁粲為尚書令禇淵為左僕射上惡太子屯騎校尉壽寂之勇健會有司奏寂之擅殺邏將徙越州於道殺之丙戌追廢晉平王休祐為庶人巴陵王休若至京口聞建安王死益懼上以休若和厚能諧緝物情恐將來傾奪㓜主欲遣使殺之慮不奉詔欲徵入朝又恐猜駭六月丁酉以江州刺史桂陽王休範為南徐州刺史以休若為江州刺史手書殷勤召休若使赴七月七日宴丁未魏主如河西秋七月巴陵哀王休若至建康乙丑賜死於第贈侍中司空復以桂陽王休範為江州刺史時上諸弟俱盡唯休範以人才凡劣不為上所忌故得全沈約論曰聖人立法垂制所以必稱先王蓋由遺訓餘風足以貽之來世也太祖經國之義雖弘隆家之道不足彭城王照不窺古徒見昆弟之義未識君臣之禮冀以家情行之國道主猜而猶犯恩薄而未悟致以呵訓之微行遂成㓕親之大禍開端樹隙垂之後人大宗因易隙之情據已行之典翦落洪枝不待顧慮既而本根無庇㓜主孤立神器以勢弱傾移靈命隨樂推回改斯蓋履霜有漸堅氷自至所由遠矣裴子野論曰夫噬虎之獸知愛己子摶狸之鳥非䕶異巢太宗保字螟蛉剿拉同氣既迷在原之天屬未識父子之自然宋徳告終非天廢也夫危亡之君未嘗不先棄本枝嫗煦旁孽推誠嬖狎疾惡父兄前乘覆車後來并轡借使叔仲有國猶不失配天而它人入室將七廟絶祀曾是莫懷甘心揃落晉武背文明之託而覆中州者賈后太祖棄初寧之誓而登合殿者元凶禍福無門奚其豫擇友于兄弟不亦安乎丙寅魏主至隂山初吳喜之討會稽也言於上曰得尋陽王子房及諸賊帥皆即於東戮之既而生送子房釋顧琛等上以其新立大功不問而心銜之及克荆州剽掠贓以萬計壽寂之死喜為淮陵太守督豫州諸軍事聞之内懼啓乞中散大夫上尤疑駭或譛蕭道成在淮隂有貳心於魏上封銀壺酒使喜自持賜道成道成懼欲逃喜以情告道成且先爲之飲道成即飲之喜還朝保證道成或密以啓上上以喜多計數素得人情恐其不能事㓜主乃召喜入内殿與共言謔甚􅅃旣岀賜以名饌尋賜死然猶發詔􅐠賜又與劉勔等詔曰吴喜輕狡萬端苟取物情昔大明中黟歙有亡命數千人攻縣邑殺宫長劉子尚遣三千精甲討之再往失利孝武以喜將數十人至縣説誘群賊賊即歸降詭數幻惑乃能如此及泰始初東討止有三百人直造三吳凡再經薄戰而自破岡以東至海十郡無不清蕩百姓聞吳河東來便望風自退若非積取三吳人情何以得弭伏如此尋喜心迹豈可奉守文之主遭國家可乘之會邪譬如餌藥當人羸冷資散石以全身及熱勢發動去堅積以止患非忘其功勢不獲已耳戊寅以淮隂為北兖州徴蕭道成入朝道成所親以朝廷方誅大臣勸勿就徴道成曰諸卿殊不見事主上自以太子稚弱翦除諸弟何預它人今唯應速發淹留顧望必將見疑且骨肉相殘自非靈長之祚禍難將興方與卿等戮力耳既至拜散騎常侍太子左衛率八月丁亥魏主還平城戊子以皇子躋繼江夏文獻王義恭庚寅上疾有間大赦戊戌立皇子凖為安成王實桂陽王休範之子也魏顯祖聦睿夙成剛毅有斷而好黃老浮屠之學每引朝士及沙門共談玄理雅薄富貴常有遺世之心以叔父中都大官京兆王子推沈雅仁厚素有時譽欲禪以帝位時太尉源賀督諸軍屯漠􅀯馳傳召之既至㑹公卿大議皆莫敢先言任城王雲子推之弟也對曰陛下方隆太平臨覆四海豈得上違宗廟下棄兆民且父子相傳其來乆矣陛下必欲委棄塵務則皇太子冝承正統夫天下者祖宗之天下陛下若更授旁支恐非先聖之意啓姦亂之心斯乃禍福之原不可不愼也源賀曰陛下今欲禪位皇叔臣恐紊亂昭穆後世必有逆祀之譏願深思任城之言東陽公丕等曰皇太子雖聖徳早彰然實冲㓜陛下富於春秋始覽萬機柰何欲隆獨善不以天下為心其若宗廟何其若億兆何尚書陸馛曰陛下若捨皇太子更議諸王臣請刎頸殿庭不敢奉詔帝怒變色以問宦者選部尚書酒泉趙黒黒曰臣以死奉戴皇太子不知其它帝黙然時太子宏生五年矣帝以其㓜故欲傳位子推中書令高允曰臣不敢多言願陛下上思宗廟託付之重追念周公抱成王之事帝乃曰然則立太子群公輔之有何不可又曰陸馛直臣也必能保吾子乃以馛為太保與源賀持節奉皇帝璽紱傳位於太子丙午高祖即皇帝位大赦改元延興高祖㓜有至性前年顯祖病癰高祖親吮及受禪悲泣不自勝顯祖問其故對曰代親之感内切於心丁未顯祖下詔曰朕希心玄古志存澹泊爰命儲宫踐升大位朕得優遊恭已栖心浩然群臣奏曰昔漢高祖稱皇帝尊其父為太上皇明不統天下也今皇帝幼冲萬機大政猶宜陛下揔之謹上尊號曰太上皇帝顯祖從之己酉上皇徙居崇光宫采􅁺不斵土階而已國之大事咸以聞崇光宫在北􅁐中又建鹿野浮圖於􅁐中之西山與禪僧居之冬十月魏沃野統萬二鎭敕勒叛遣太尉源賀帥衆討之降二千餘落追擊餘黨至枹罕金城大破之斬首八千餘級虜男女萬餘口雜畜三萬餘頭詔賀都督三道諸軍屯于漠南先是魏每嵗秋冬􅀤軍三道並出以備柔然春中乃還賀以為往來疲勞不可支乆請募諸州鎭武健者三萬餘人築三城以處之使冬則講武春則耕種不從庚寅魏以南安王楨為都督凉州及西戎諸軍事領䕶西域校尉鎭凉州上命北琅邪蘭陵二郡太守垣崇祖經略淮北崇祖自郁洲將數百人入魏境七百里據䝉山十一月魏東兖州刺史于洛侯擊之崇祖引還上以故第為湘宫寺備極壯麗欲造十級浮圖而不能乃分為二新安太守巢尚之罷郡入見上謂曰卿至湘宫寺未此是我大功徳用錢不少通直散騎侍郎㑹稽虞愿侍側曰此皆百姓賣兒貼婦錢所為佛若有知當慈悲嗟愍罪高浮圖何功徳之有侍坐者失色上怒使人驅下殿愿徐去無異容上好圍棊棊甚拙與第一品彭城丞王抗圍棊抗每假借之曰皇帝飛棊臣抗不能斷上終不悟好之愈篤愿又曰堯以此教丹朱非人主所宜好也上雖怒甚以愿王國舊臣每優容之王景文常以盛滿爲憂屢辭位任上不許然中心以景文外戚貴盛張永累經軍旅疑其將來難信乃自為謡言曰一士不可親弓長射殺人景文彌懼自表解楊州情甚切至詔報曰人居貴要但問心若為耳大明之世巢徐二戴位不過執㦸權亢人主今袁粲作僕射領選而人往往不知有粲粲遷為令居之不疑人情向粲淡然亦復不改常日以此居貴位要任當有致憂競不夫貴高有危殆之懼卑賤有溝壑之憂有心於避禍不如無心於任運存亡之要巨細一揆耳㤗豫元年春正月甲寅朔上以疾乆不平改元戊午皇太子會四方朝賀者於東宮并受貢計大陽蠻酋桓誕擁沔水以北滍葉以南八萬餘落降於魏自云􅁊玄之子亡匿蠻中以智略為羣蠻所宗魏以誕為征南將軍東荆州刺史襄陽王聽自選郡縣吏使起部郎京兆韋珍與誕安集新民區置諸事皆得其所二月柔然侵魏上皇遣將擊之柔然走東部敕勒叛奔柔然上皇自將追之至石磧不及而還上疾篤慮晏駕之後皇后臨朝江安懿侯王景文以元舅之勢必為宰相門族彊盛或有異圖己未遣使齎藥賜景文死手敕曰與卿周旋欲全卿門戸故有此處分敕至景文正與客棊叩函看巳復置局下神色不變方與客思行爭劫局竟斂子内奩畢徐曰奉敕見賜以死方以敕示客中直兵焦度趙智略憤怒曰大丈夫安能坐受死州中文武數百足以一奮景文曰知卿至心若見念者為我百口計乃作墨啓荅敕致謝飲藥而卒贈開府儀同三司上夢有人告曰豫章太守劉愔反既寤遣人就郡殺之魏顯祖還平城庚午魏主耕藉田夏四月以垣崇祖行徐州事徙戍龍沮己亥上大漸以江州刺史桂陽王休範為司空又以尚書右僕射禇淵為䕶軍將軍加中領軍劉勔右僕射詔淵勔與尚書令袁粲荆州刺史蔡興宗郢州刺史沈攸之並受顧命禇淵素與蕭道成善引薦於上詔又以道成為右衛將軍領衛尉與袁粲等共掌機事是夕上殂庚子太子即皇帝位大赦時蒼梧王方十嵗袁粲禇淵秉政承太宗奢侈之後務弘節儉欲救其弊而阮佃夫王道隆等用事貨賂公行不能禁也乙巳以安成王凖為楊州刺史五月戊寅葬明皇帝于高寧陵廟號太宗六月乙巳尊皇后曰皇太后立妃江氏為皇后秋七月柔然部帥無盧眞將三萬騎㓂魏敦煌鎭將尉多矦擊走之多侯眷之子也又㓂晉昌守將薛奴擊走之戊午魏主如隂山戊辰尊帝母陳貴妃為皇太妃更以諸國太妃為太􅁎右軍將軍王道隆以蔡興宗彊直不欲使居上流閠月甲辰以興宗為中書監更以沈攸之為都督荆襄等八州諸軍事荆州刺史興宗辭中書監不拜王道隆每詣興宗躡履到前不敢就席良乆去竟不呼坐沈攸之自以才略過人自至夏口以來隂蓄異志及徙荆州擇郢州士馬器仗精者多以自隨到官以討蠻為名大􅀤兵力招聚才勇部勒嚴整常如敵至重賦斂以繕器甲舊應供臺者皆割留之飬馬至二千餘匹治戰艦近千艘倉廪府庫莫不充積士子商旅過荆州者多為所羈留四方亡命歸之者皆蔽匿擁䕶所部或有逃亡無遠近窮追必得而止舉錯專恣不復承用符敕朝廷疑而憚之為政刻􅁀或鞭撻士大夫上佐以下面加詈辱然吏事精明人不敢欺境内盗賊屏息夜戸不閉攸之賧罰群蠻太甚又禁五溪魚鹽蠻怨叛酉溪蠻王田頭擬死弟婁侯簒立其子田都走入獠中於是群蠻大亂掠抄至武陵城下武陵内史蕭嶷遣隊主張英兒擊破之誅婁侯立田都羣蠻乃定嶷􅄨之弟也八月戊午樂安宣穆公蔡興宗卒九月辛巳魏主還平城冬十月柔然侵魏及五原十一月上皇自將討之將度漠柔然北走數千里上皇乃還丁亥魏封上皇之弟略為廣川王己亥以郢州刺史劉秉為尚書左僕射秉道憐之孫也和弱無幹能以宗室清令故袁禇引之中書通事舍人阮佃夫加給事中輔國將軍權任轉重欲用其所親吳郡張澹為武陵郡袁粲等皆不同佃夫稱敕施行粲等不敢執魏有司奏諸祠祀合一千七十五所嵗用牲七萬五千五百上皇惡其多殺詔自今非天地宗廟社稷皆勿用牲薦以酒脯而已蒼梧王上元徽元年春正月戊寅朔改元大赦庚辰魏員外散騎常侍崔演來聘戊戌魏上皇還至雲中癸丑魏詔守令勸課農事同部之内貧富相通家有兼牛通借無者若不從詔一門終身不仕戊午魏上皇至平城甲戌魏詔縣令能靜一縣刼盗者兼治二縣即食其祿能靜二縣者兼治三縣三年遷為郡守二千石能靜二郡上至三郡亦如之三年遷為刺史桂陽王休範素凡訥少知解不為諸兄所齒遇物情亦不向之故太宗之末得免於禍及帝即位年在冲㓜素族秉政近習用權休範自謂尊親莫二應入為宰輔既不如志怨憤頗甚典籖新蔡許公輿為之謀主令休範折節下士厚相資給於是遠近赴之嵗中萬計收養勇士繕治器械朝廷知其有異志亦隂為之備會夏口闕鎭朝廷以其地居尋陽上流欲使腹心居之二月乙亥以晉熈王燮為郢州刺史燮始四嵗以黃門郎王奐為長史行府州事配以資力使鎭夏口復恐其過尋陽為休範所刼留使自太洑徑去休範聞之大怒密與許公輿謀襲建康表治城湟多解材板而蓄之奐景文之兄子也吐谷渾王拾寅㓂魏澆河夏四月戊申魏以司空長孫觀為大都督􅀤兵討之魏以孔子二十八世孫乘為崇聖大夫給十戸以供洒掃秋七月魏詔河南六州之民戸收絹一匹綿一斤租三十石乙亥魏主如隂山八月庚申魏上皇如河西長孫觀入吐谷渾境芻其秋稼吐谷渾王拾寅窘急請降遣子斤入侍自是嵗修職貢九月辛巳上皇還平城遣使如魏冬十月癸酉割南兖豫州之境置徐州治鐘離魏上皇將入㓂詔州郡之民十丁取一以充行戸收租五十石以備軍糧魏武都氐反攻仇池詔長孫觀回師討之武都王楊僧嗣卒於葭蘆從弟文度自立為武興王遣使降魏魏以文度為武興鎭將十一月丁丑尚書令􅀽粲以母憂去職癸巳魏上皇南廵至懷州枋頭鎭將代人薛虎子先為馮太后所黜為門士時山東饑盗賊競起相州民孫誨等五百人稱虎子在鎭境内清晏乞還虎子上皇復以虎子為枋頭鎭將即日之官數州盗賊皆息十二月癸卯朔日有食之乙巳江州刺史桂陽王休範進位大尉詔起袁粲以衛軍將軍攝職粲固辭壬子柔然侵魏柔玄鎭二部敕勒應之魏州鎭十一水旱相州民餓死者二千八百餘人是嵗魏妖人劉舉聚衆自稱天子齊州刺史武昌王平原討斬之平原提之子也二年春正月丁丑魏太尉源賀以疾罷二月甲辰魏上皇還平城三月丁亥魏員外散騎常侍許赤虎來聘夏五月壬午桂陽王休範反掠民船使軍隊稱力請受付以材板合手裝治數日即辦丙戌休範帥衆二萬騎五百發尋陽晝夜取道以書與諸執政稱楊運長王道隆蠱惑先帝使建安巴陵二王無罪被戮望執錄二豎以謝寃魂庚寅大雷戍主杜道欣馳下告變朝廷惶駭䕶軍褚淵征北將軍張永領軍劉勔僕射劉秉右衛將軍蕭道成游擊將軍戴明寶驍騎將軍阮佃夫右軍將軍王道隆中書舍人孫千齡員外郎楊運長集中書省計事莫有言者道成曰昔上流謀逆皆因淹緩至敗休範必遠懲前失輕兵急下乘我無備今應變之術不宜遠出若偏師失律則大沮衆心宜頓新亭白下堅守宫城東府石頭以待賊至千里孤軍後無委積求戰不得自然瓦解我請頓新亭以當其鋒征北守白下領軍屯宣陽門爲諸軍節度諸貴安坐殿中不須競出我自破賊必矣因索筆下議衆並注同孫千齡隂與休範通謀獨曰宜依舊遣軍據梁山道成正色曰賊今已近梁山豈可得至新亭既是兵衝所欲以死報國耳常時乃可屈曲相從今不得也坐起道成顧謂劉勔曰領軍已同鄙議不可改易袁粲聞難扶曵入殿即日内外戒嚴道成將前鋒兵出屯新亭張永屯白下前南兖州刺史沈懷明戍石頭袁粲禇淵入衛殿省時倉猝不暇授甲開南北二武庫隨將士意所取蕭道成至新亭治城壘未畢辛卯休範前軍已至新林道成方解衣髙卧以安衆心徐索白虎幡登西垣使寧朔將軍高道慶羽林監陳顯逹員外郎王敬則帥舟師與休範戰頗有殺􅀗壬辰休範自新林捨舟歩上其將丁文豪請休範直攻臺城休範遣文豪别將兵趣臺城自以大衆攻新亭壘道成帥將士悉力拒戰自己至午外勢愈盛衆皆失色道成曰賊雖多而亂尋當破矣休範白服乘肩輿自登城南臨滄觀以數十人自衛屯騎校尉黃回與越騎校尉張敬兒謀詐降以取之回謂敬兒曰卿可取之我誓不殺諸王敬兒以白道成道成曰卿能辦事當以本州相賞乃與回出城南放仗走大呼稱降休範喜召至輿側回陽致道成密意休範信之以二子徳宣徳嗣付道成為質二子至道成即斬之休範置囘敬兒於左右所親李恒鍾爽諌不聴時休範日飲醇酒回見休範無備目敬兒敬兒奪休範防身刀斬休範首左右皆散走敬兒馳馬持首歸新亭道成遣隊主陳靈寶送休範首還臺靈寳道逢休範兵弃首於水挺身得逹唱云已平而無以為驗衆莫之信休範將士亦不之知其將杜黒騾攻新亭甚急蕭道成在射堂司空主簿蕭惠㓪帥敢死士數十人突入東門至射堂下道成上馬帥麾下搏戰惠朗乃退道成復得保城惠朗惠開之弟也其姊為休範妃惠朗兄黃門郎惠明時為道成軍副在城内了不自疑道成與黒騾拒戰自晡逹旦矢石不息其夜大雨鼓呌不復相聞將士積日不得寢食軍中馬夜驚城内亂走道成秉燭正坐厲聲呵之如是者數四丁文豪破臺軍於皂莢橋直至朱雀桁南杜黒騾亦捨新亭北趣朱雀桁右軍將軍王道隆將羽林精兵在朱雀門内急召鄱陽忠昭公劉勔於石頭勔至命撤桁以折南軍之勢道隆怒曰賊至但當急擊寧可開桁自弱邪勔不敢復言道隆趣勔進戰勔度桁南戰敗而死黑騾等乘勝度淮道隆弃衆走還臺黒騾兵追殺之黃門侍郎王藴重傷踣於御溝之側或扶之以免藴景文之兄子也於是中外大震道路皆云臺城已陷白下石頭之衆皆潰張永沈懷明逃還宫中傳新亭亦䧟太后執帝手泣曰天下敗矣先是月犯右執法太白犯上將或勸劉勔解職勔曰吾執心行已無愧幽明若災眚必至避豈得免勔晩年頗慕高尚立園宅名為東山遺落世務罷遣部曲蕭道成謂勔曰將軍受顧命輔㓜主當此艱難之日而深尚從容廢省羽翼一朝事至悔可追乎勔不從而敗甲午撫軍長史禇澄開東府門納南軍擁安成王凖據東府稱桂陽王教曰安成王吾子也勿得侵犯澄淵之弟也杜黒騾徑進至杜姥宅中書舍人孫千齡開承明門出降宫省恇擾時府藏已竭皇太后太妃剔取宫中金銀器物以充賞衆莫有鬭志俄而丁文豪之衆知休範已死稍欲退散文豪厲聲曰我獨不能定天下邪許公輿詐稱桂陽王在新亭士民惶惑詣蕭道成壘投刺者以千數道成得皆焚之登北城謂曰劉休範父子昨已就戮尸在南岡下身是蕭平南諸君諦視之名刺皆已焚勿憂懼也道成遣陳顯逹張敬兒及輔師將軍任農夫馬軍王東平周盤龍等將兵自石頭濟淮從承明門入衛宫省袁粲慷慨謂諸將曰今㓂賊已逼而衆情離沮孤子受先帝付託不能綏靖國家請與諸君同死社稷被甲上馬將驅之於是陳顯逹等引兵出戰大破杜黒騾於杜姥宅飛矢貫顯逹目丙申張敬兒等又破黑騾等於宣陽門斬黑騾及丁文豪進克東府餘黨悉平蕭道成振旅還建康百姓緣道聚觀曰全國家者此公也道成與袁粲褚淵劉秉皆上表引咎解職不許丁酉解嚴大赦柔然遣使來聘六月庚子以平南將軍蕭道成為中領軍南兖州刺史留衛建康與袁粲褚淵劉秉更日入直决事號為四貴桂陽王休範之反也使道士陳公昭作天公書題云沈丞相付荆州刺史沈攸之門者攸之不開視推得公昭送之朝廷及休範反攸之謂僚佐曰桂陽必聲言我與之同若不顛沛勤王必增朝野之惑乃與南徐州刺史建平王景素郢州刺史晉熈王夑湘州刺史王僧虔雍州刺史張興世同舉兵討休範休範留中兵參軍毛惠連等守尋陽夑遣中兵參軍馮景祖襲之癸卯惠連等開門請降殺休範二子諸鎮皆罷兵景素宏之子也乙卯魏詔曰下民兇戾不顧親戚一人爲惡殃及闔門朕爲民父母深所愍悼自今非謀反大逆外叛罪止其身於是始罷門房之誅魏顯祖勤於為治賞罰嚴明愼擇牧守進廉退貪諸曹疑事舊多奏决又口傳詔敕或致矯擅上皇命事無大小皆據律正名不得為疑奏合則制可違則彈詰盡用墨詔由是事皆精審尤重刑罰大刑多令覆鞫或囚繫積年群臣頗以為言上皇曰滯獄誠非善治不猶愈於倉猝而濫乎夫人幽苦則思善故智者以囹圄爲福堂朕特苦之欲其改悔而加矜恕爾由是囚繫雖滯而所刑多得其宜又以赦令長姦故自延興以後不復有赦秋七月庚辰立皇弟友為邵陵王乙酉加荆州刺史沈攸之開府儀同三司攸之固辭執政欲徵攸之而憚於發命乃以太后令遣中使謂曰公乆勞于外宜還京師任寄實重未欲輕之進退可否在公所擇攸之曰臣無廊廟之資居中實非其才至於撲討蠻蜑克清江漢不敢有辭雖自上如此去留伏聽朝㫖乃止癸巳柔然㓂魏敦煌尉多矦擊破之尚書奏敦煌僻遠介居西北彊㓂之閒恐不能自固請内徙就涼州羣臣集議皆以為然給事中昌黎韓秀獨以為敦煌之置為日已乆雖逼彊寇人習戰鬬縱有草竊不為大害循常置戍足以自全而能隔閡西北二虜使不得相通今徙就涼州不唯有蹙國之名且姑臧去敦煌千有餘里防邏甚難二虜必有交通闚􅎿之志若騷動涼州則關中不得安枕又士民或安土重遷招引外㓂為國深患不可不慮也乃止九月丁酉以尚書令袁粲為中書監領司徒加禇淵尚書令劉秉丹陽尹粲固辭求反居墓所不許淵以禇澄為吳郡太守司徒左長史蕭惠明言於朝曰禇澄開門納賊更為股肱大郡王藴力戰㡬死棄而不收賞罰如此何憂不亂淵甚慙冬十月庚申以侍中王藴為湘州刺史十一月丙戌帝加元服大赦十二月癸亥立皇弟躋為江夏王贊為武陵王是嵗魏建安貞王陸馛卒三年春正月辛巳帝祀􅀯郊明堂蕭道成以襄陽重鎭張敬兒人位俱輕不欲使居之而敬兒求之不已謂道成曰沈攸之在荆州公知其欲何所作不出敬兒以表裏制之恐非公之利道成笑而無言三月己巳以驍騎將軍張敬兒為都督雍梁二州諸軍事雍州刺史沈攸之聞敬兒上恐其見襲隂為之備敬兒既至奉事攸之親敬甚至動輙咨禀信饋不絶攸之謂為誠然酬報款厚累書欲因遊獵㑹境上敬兒報以為心期有在影迹不宜過敦攸之益信之敬兒得其事迹皆密白道成道成與攸之書問張雍州遷代之日將欲誰擬攸之即以示敬兒欲以間之夏五月丙午魏主使員外散騎常侍許赤虎來聘丁未魏主如武州山辛酉如車輪山六月庚午魏初禁殺牛馬袁粲禇淵皆固讓新官秋七月庚戌復以粲為尚書令八月庚子加䕶軍將軍禇淵中書監冬十二月丙寅魏徙建昌王長樂為安樂王己丑魏城陽王長壽卒南徐州刺史建平王景素孝友清令服用儉素又好文學禮接士大夫由是有美譽太宗特愛之異其禮秩時太祖諸子俱盡諸孫唯景素為長帝凶狂失徳朝野皆屬意於景素帝外家陳氏深惡之楊運長阮佃夫等欲專權勢不利立長君亦欲除之其腹心將佐多勸景素舉兵鎭軍參軍濟陽江淹獨諌之景素不悦是嵗防閤將軍王季符得罪於景素單騎亡奔建康告景素謀反運長等即欲􅀤兵討之袁粲蕭道成以為不可景素亦遣世子延齡詣闕自陳乃徙季符於梁州奪景素征北將軍開府儀同三司資治通鑑卷第一百三十三
