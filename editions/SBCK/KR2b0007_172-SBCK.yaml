body:
  text: 臣司馬光奉勑編集陳紀六兆涒灘凡二年起旃䝉協洽盡柔高宗宣皇帝中之上太建七年春正月辛未上祀南郊癸酉周主如同州乙亥左衛將軍樊毅克潼州齊主還鄴辛巳上祀北郊二月丙戍朔日有食之戊申樊毅克下邳髙柵等六城齊主言語澁呐不喜見朝士自非寵私昵狎未嘗交語性懦不堪人視雖三公令録奏事莫得仰視皆略陳大指驚走而出承世祖奢㤗之餘以爲帝王當然後宫皆寳衣玉食一裙之費至直萬匹競爲新巧朝衣夕弊盛修宫苑窮極壯麗所好不常數毁又復百工土木無時休息夜則然火照作寒則以湯爲泥鑿晉陽西山爲大像一夜然油萬盆光照宫中每有災異宼盜不自貶損唯多設齋以爲脩徳好自彈琵琶爲無愁之曲近侍和之者以百數民閒謂之無愁天子於華林園立貧兒村帝自衣藍縷之服行乞其閒以爲樂又冩築西鄙諸城使人衣黒衣攻之帝自帥内參拒鬬寵任陸令萱穆提婆髙阿那肱韓長鸞等宰制朝政宦官鄧長顒陳徳信胡兒何洪珍等並參預機權各引親黨超居顯位官由財進獄以賄成競爲姦謟蠹政害民舊蒼頭劉桃枝等皆開府封王其餘宦官胡兒歌舞人見鬼人官奴婢等濫得富貴者殆將萬數庶姓封王者以百數開府千餘人儀同無數領軍一時至二十人侍中中常侍數十人乃至㣘馬及鷹亦有儀同郡君之號有鬬雞號開府皆食其幹禄諸嬖幸朝夕娛侍左右一戱之費動踰巨萬既而府藏空竭乃賜二三郡或六七縣使之賣官取直由是為守令者率皆富商大賈競為貪縱賦繁役重民不聊生周高祖謀伐齊命邊鎭益儲偫加戍卒齊人聞之亦増脩守禦柱國于翼諌曰疆􅂣相侵互有勝負徒損兵儲無益大計不如解嚴繼好使彼懈而無備然後乗閒出其不意一舉可取也周主從之韋孝寛上疏陳三䇿其一曰臣在邉積年頗見閒隙不因際㑹難以成功是以往歳出軍徒有勞費功績不立由失機㑹何者長淮之南舊為沃土陳氏以破亡餘燼猶能一舉平之齊人厯年赴救䘮敗而返内離外叛計盡力窮讎敵有舋不可失也今大軍若出軹關方軌而進兼與陳氏共為掎角并令廣州義旅出自三鵶又募山南驍鋭㳂河而下復遣北山稽胡絶其并晉之路凡此諸軍仍令各募􅀜河之外勁勇之士厚其爵賞使為前驅岳動川移雷駭電激百道俱進並趨虜庭必當望旗奔潰所向摧殄一戎大定實在此機其二曰若國家更為後圖未即大舉宐與陳人分其兵勢三鵶以北萬春以南廣事屯田預為貯積募其驍悍立為部伍彼既東南有敵戎馬相持我出竒兵破其疆場彼若興師赴援我則堅壁清野待其去逺還復出師常以邉外之軍引其腹心之衆我無宿舂之費彼有奔命之勞一二年中必自離叛且齊氏昏暴政出多門鬻獄賣官唯利是視荒淫酒色忌害忠良闔境嗷然不勝其􅁦以此而觀覆亡可待然後乗間電掃事等摧枯其三曰昔勾踐亡吳尚期十載武王取紂猶煩再舉今若更存遵養且復相時臣謂宐還崇鄰好申其盟約安民和衆通商惠工蓄鋭養威觀舋而動斯乃長䇿逺馭坐自兼并也書奏周主引開府儀同三司伊婁謙入内殿從容謂曰朕欲用兵何者為先對曰齊氏沈溺倡優耽昏麴糵其折衝之將斛律明月已斃於讒口上下離心道路以目此易取也帝大笑三月丙辰使謙與小司宼元衛聘於齊以觀舋丙寅周主還長安夏四月甲午上享太廟監豫州陳桃根得青牛獻之詔遣還民又表上織成羅文錦被各二百首詔於雲龍門外焚之庚子齊以中書監陽休之為尚書右僕射六月壬辰以尚書右僕射王瑒為左僕射甲戍齊主如晉陽秋七月丙戌周主如雲陽宮大將軍揚堅姿相竒偉畿伯下大夫長安來和嘗謂堅曰公眼如曙星無所不照當王有天下願忍誅殺周主待堅素厚齊王憲言於帝曰普六茹堅相貎非常臣每見之不覺自失恐非人下請早除之帝亦疑之以問來和和詭對曰隨公止是守節人可鎭一方若為將領陳無不破丁卯周主還長安先是周主獨與齊王憲及内史王誼謀伐齊又遣納言盧韞乗馹三詣安州揔管于翼問䇿餘人皆莫之知丙子始召大將軍以上於大徳殿告之丁丑下詔伐齊以柱國陳王純滎陽公司馬消難鄭公逹奚震為前三軍揔管越王盛周昌公矦莫陳崇趙王招為後三軍揔管齊王憲帥衆二萬趨黎陽隨公楊堅廣寧公薛逈將舟師三萬自渭入河梁公矦莫陳芮帥衆二萬守太行道申公李穆帥衆三萬守河陽道常山公于翼帥衆二萬岀陳汝􅁩盟之兄孫震武之子也周主將出河陽内史上士宇文㢸曰齊氏建國於今累世雖曰無道藩鎭之任尚有其人今之出師要須擇地河陽衝要精兵所聚盡力攻圍恐難得志如臣所見出於汾曲戍小山平攻之易㧞用武之地莫過於此民部中大夫天水趙煚曰河南洛陽四靣受敵縱得之不可以守請從河北直指太原傾其巢穴可一舉而定遂伯下大夫鮑宏曰我彊齊弱我治齊亂何憂不克但先帝往日屢出洛陽彼既有僃每有不㨗如臣計者進兵汾潞直掩晉陽出其不虞似為上䇿周主皆不從宏泉之弟也壬午周主帥衆六萬直指河隂楊素請帥其父麾下先驅周主許之八月癸卯周遣使來聘周師入齊境禁伐樹踐稼犯者皆斬丁未周主攻河隂大城拔之齊王憲拔武濟進圍洛口拔東西二城縱火船焚浮橋橋絶齊永橋大都督太安傅伏自永橋夜入中潬城周人既克南城圍中潬二旬不下洛州刺史獨孤永業守金墉周主自攻之不克永業通夜辦馬槽二千周人聞之以爲大軍且至而憚之九月齊右丞相高阿那肱自晉陽將兵拒周師至河陽㑹周主有疾辛酉夜引兵還水軍焚其舟艦傅伏謂行臺乞伏貴和曰周師疲弊願得精騎二千追擊之可破也貴和不許齊王憲于翼李穆所向克㨗降拔三十餘城皆弃而不守唯以王藥城要害令儀同三司韓正守之正尋以城降齊戊寅周主還長安庚辰齊以趙彦深為司徒斛阿列羅為司空閠月車騎大將軍吳明徹將兵擊齊彭城壬辰敗齊兵數萬於呂梁甲午周主如同州冬十月己巳立皇子叔齊為新蔡王叔文為晉熈王十二月辛亥朔日有食之壬戍以王瑒為尚書左僕射太子詹事吳郡陸繕為右僕射庚午周主還長安八年春正月癸未周主如同州辛卯如河東涑川甲午復還同州甲寅齊大赦乙卯齊主還鄴二月辛酉周主命太子廵撫西土因伐吐谷渾上開府儀同大將軍王軌宮正宇文孝伯從行軍中節度皆委二人太子仰成而已齊括雜戸女未嫁者悉集有隱匿者家長坐死壬申以開府儀同三司吴明徹為司空三月壬寅周主還長安夏四月乙卯復如同州己未上享太廟尚書左僕射王瑒卒五月壬辰周主還長安六月戊申朔日有食之辛亥周主享太廟初太子叔寳欲以左戸部尚書江揔為詹事令管記陸瑜言於吏部尚書孔奐奐謂瑜曰江有潘陸之華而無園綺之實輔弼儲宫竊有所難太子深以為恨自言於帝帝將許之奐奏曰江揔文華之士今皇太子文華不少豈藉於揔如臣愚見願選敦重之才以居輔導之職帝曰即如卿言誰當居此奐曰都官尚書王廓丗有㦤德識性敦敏可以居之太子時在側乃曰廓王泰之子不宐為太子詹事奐曰宋朝范曄即范㤗之子亦為太子詹事前代不疑太子固争之帝卒以揔為詹事揔斆之曽孫也甲寅以尚書右僕射陸繕為左僕射帝欲以孔奐代繕詔已出太子沮之而止更以晉陵太守王克為右僕射頃之揔與太子為長夜之飲養良娣陳氏為女太子亟微行遊揔家上怒免揔官周利州刺史紀王康驕矜無度繕脩戎器隂有異謀司録裴融諌止之康殺融丙辰賜康死丁巳周主如雲陽庚申齊宐陽王趙彦深卒彦深歷事累朝常參機近以温謹著稱旣卒朝貴與機密者唯侍中聞府歳同三司斛律孝卿一人而已其餘皆嬖倖也孝卿羌舉之子比於餘人差不貪穢秋八月乙卯周主還長安周太子伐吐谷渾至伏俟城而還宫尹鄭譯王端等皆有寵於太子太子在軍中多失徳譯等皆預焉軍還王軌等言之於周主周主怒杖太子及譯等仍除譯等名宫臣親幸者咸被譴太子復召譯戱狎如初譯因曰殿下何時可得據天下太子悦益昵之譯儼之兄孫也周主遇太子甚嚴每朝見進止與羣臣無異雖隆寒盛暑不得休息以其嗜酒禁酒不得至東宫有過輒加捶撻嘗謂之曰古來太子被廢者幾人餘兒豈不堪立邪乃敕東宫官屬録太子言語動作每月奏聞太子畏帝威嚴矯情脩飾由是過惡不上聞王軌嘗與小内史賀若弼言太子必不克負荷弼深以為然勸軌陳之軌後因侍坐言於帝曰皇太子仁孝無聞恐不了陛下家事愚臣短暗不足可信陛下􅁪以賀若弼有文武竒才亦常以此為憂帝以問弼對曰皇太子養徳春宫未聞有過既退軌讓弼曰平生言論無所不道今者對􅀭何得乃爾反覆弼曰此公之過也太子國之儲副豈易􅀤言事有蹉跌便至㓕族本謂公密陳臧否何得遂至昌言軌黙然乆之乃曰吾專心國家遂不存私計向者對衆良實非宐後軌因内宴上壽捋帝須曰可愛好老公伹恨後嗣弱耳先是帝問右宮伯宇文孝伯曰吾兒比來何如對曰太子比懼天威更無過失罷酒帝責孝伯曰公常語我云太子無過今軌有此言公為誑矣孝伯再拜曰臣聞父子之際人所難言臣知陛下不能割慈忍愛遂爾結舌帝知其意黙然乆之乃曰朕已委公矣公其勉之王軌驟言於帝曰皇太子非社稷主普六茹堅貎有反相帝不悦曰必天命有在將若之何楊堅聞之甚懼深自晦匿帝深以軌等言為然但漢王賛次長又不才餘子皆幼故得不廢丁卯以司空吳明徹為南兖州刺史齊主如晉陽營邯鄲宫九月戊戍以皇子叔彪為淮南王周主謂羣臣曰朕去歳屬有疾疹遂不得克平逋宼前入齊境備見其情彼之行師殆同兒戱况其朝廷昏亂政由羣小百姓嗷然朝不謀夕天與不取恐貽後悔前出河外直為拊背未扼其喉晉州本髙歡所起之地鎭攝要重今往攻之彼必來援吾嚴軍以待擊之必克然後乗破竹之勢鼓行而東足以窮其巢穴混同文軌諸將多不願行帝曰機不可失有沮吾軍者當以軍灋裁之冬十月己酉周主自將伐齊以越王盛􅂎公亮隨公楊堅為右三軍譙王儉大將軍竇泰廣化公丘崇為左三軍齊王憲陳王純為前軍亮導之子也丙辰齊主獵於祁連池癸亥還晉陽先是晉州行臺左丞張廷儁公直勤敏儲偫有備百姓安業疆場無虞諸嬖倖惡而代之由是公私煩擾周主至晉州軍于汾曲遣齊王憲將精騎二萬守雀䑕谷陳王純歩騎二萬守千里徑鄭公逹奚震歩騎一萬守統軍川大將軍韓明歩騎五千守齊子嶺焉氏公尹升歩騎五千守鼓鍾鎭凉城公辛韶歩騎五千守蒲津關趙王招歩騎一萬自華谷攻齊汾州諸城柱國宇文盛歩騎一萬守汾水關遣内史王誼監諸軍攻平陽城齊行臺僕射海昌王尉相貴嬰城拒守相貴相願之兄也甲子齊集兵晉祠庚午齊主自晉陽帥諸軍趣晉州周主日自汾曲至城下督戰城中窘急庚午行臺左丞矦子欽出降於周壬申􅀳州刺史崔景嵩守北城夜遣使請降於周王軌帥衆應之未明周將北海段文振杖槊與數十人先登與景嵩同至尉相貴所抜佩刀劫之城上鼓譟齊兵大潰遂克晉州虜相貴及甲士八千人齊主方與馮淑妃獵於天池晉州告急者自旦至午驛馬三至右丞相髙阿那肱曰大家正為樂邊鄙小小交兵乃是常事何急奏聞至暮使更至云平陽已陷乃奏之齊主將還淑妃請更殺一圍齊主從之周齊王憲攻抜洪洞永安二城更圗進取齊人焚橋守險軍不得進乃屯永安使永昌公椿屯鷄栖源伐栢為菴以立營椿廣之弟也癸酉齊主分軍萬人向千里徑又分軍出汾水􅀜自帥大軍上鷄栖原宇文盛遣人告急齊王憲自救之齊師退盛追擊破之俄而椿告齊師稍逼憲復還救之與齊對陳至夜不戰㑹周主召憲還憲引兵夜去齊人見栢菴在不之覺明日始知之齊主使髙阿那肱將前軍先進仍節度諸軍甲戍周以上開府儀同大將軍安定梁士彦為晉州刺史留精兵一萬鎭之十一月己卯齊主至平陽周主以齊兵新集聲勢甚盛且欲西還以避其鋒開府儀同大將軍宇文忻諫曰以陛下之聖武乗敵人之荒縱何患不克若使齊得令主君臣恊力雖湯武之勢未易平也今主暗臣愚士無鬬志雖有百萬之衆實為陛下奉耳軍正京兆王韶曰齊失紀綱於兹累世天奬周室一戰而扼其㗋取亂侮亡正在今日釋之而去臣所未諭周主雖善其言竟引軍還忻貴之子也周主留齊王憲為後拒齊師追之憲與宇文忻各將百騎與戰斬其驍將賀蘭豹子等齊師乃退憲引軍度汾追及周主於玉壁齊師遂圍平陽晝夜攻之城中危急樓堞皆盡所存之城尋仭而已或短兵相接或交馬出入外援不至衆皆震懼梁士彦忼慨自若謂將士曰死在今日吾為爾先於是勇烈齊奮呼聲動地無不一當百齊師少却乃令妻妾軍民婦女晝夜修城三日而就周主使齊王憲將兵六萬屯涷川遥為平陽聲援齊人作地道攻平陽城陷十餘歩將士乗勢欲入齊主敕且止召馮淑妃觀之淑妃糚㸃不時至周人以木拒塞之城遂不下舊俗相傳晉州城西石上有聖人跡淑妃欲往觀之齊主恐弩矢及橋乃抽攻城木造逺橋齊主與淑妃度橋橋壊至夜乃還癸巳周主還長安甲午復下詔以齊人圍晉州更帥諸軍擊之丙申縱齊降人使還丁酉周主發長安壬寅濟河與諸軍合十二月丁未周主至高顯遣齊王憲帥所部先向平陽戊申周主至平陽庚戍諸軍揔集凡八萬人稍進逼城置陳東西二十餘里先是齊人恐周師猝至於城南穿塹自喬山屬於汾水齊主大出兵陳於塹北周主命齊王憲馳往觀之憲復命曰易與耳請破之而後食周主悦曰如汝言吾無憂矣周主乗常御馬從數人廵陳所至輒呼主帥姓名慰勉之將士喜於見知咸思自奮將戰有司請換馬周主曰朕獨乗良馬欲何之周主欲薄齊師礙塹而止自旦至申相持不决齊主謂髙阿那肱曰戰是邪不戰是邪阿那肱曰吾兵雖多堪戰者不過十萬病傷及繞城樵㸑者復三分居一昔攻玉壁援軍來即退今日將士豈勝神武時邪不如勿戰却守髙梁橋安吐根曰一撮許賊馬上刺取擲著汾水中耳齊主意未决諸内參曰彼亦天子我亦天子彼尚能逺來我何為守塹示弱齊主曰此言是也於是塡塹南引周主大喜勒諸軍擊之兵纔合齊主與馮淑妃並騎觀戰東偏少却淑妃怖曰軍敗矣録尚書事城陽王穆提婆曰大家去大家去齊主即以淑妃奔髙梁橋開府儀同三司奚長諌曰半進半退戰之常體今兵衆全整未有虧傷陛下捨此安之馬足一動人情駭亂不可復振願速還安慰之武衛張常山自後至亦曰軍尋收訖甚完整圍城兵亦不動至尊宐回不信臣言乞將内參往視齊主將從之穆提婆引齊主肘曰此言難信齊主遂以淑妃北走齊師大潰死者萬餘人軍資器械數百里間委弃山積安德王延宗獨全軍而還齊主至洪洞淑妃方以粉鏡自玩後聲亂唱賊至於是復走先是齊主以淑妃爲有功勲將立爲左皇后遣内參詣晉陽取皇后服御禕翟等至是遇於中塗齊主爲按轡命淑妃著之然後去辛亥周主入平陽梁士彦見周主持周王須而泣曰臣幾不見陛下周主亦爲之流涕周主以將士疲倦欲引還士彦叩馬諫曰今齊師遁散衆心皆動因其懼而攻之其勢必舉周主從之執其手曰余得晉州為平齊之基若不固守則大事不成朕無前憂唯慮後變汝善為我守之遂帥諸將追齊師諸將固請西還周主曰縱敵患生卿等若疑朕將獨往諸將乃不敢言癸丑至汾水關齊主入晉陽憂懼不知所之甲寅齊大赦齊主問計於朝臣皆曰宜省賦息役以慰民心收遺兵背城死戰以安社稷齊主欲留安徳王延宗廣寕王孝珩守晉陽自向北朔州若晉陽不守則奔突厥羣臣皆以為不可帝不從開府儀同三司賀抜伏恩等宿衛近臣三十餘人西奔周軍周主封賞各有差髙阿那肱所部兵尚一萬守髙壁餘衆保洛女砦周主引軍向高壁阿那肱望風退走齊王憲攻洛女砦拔之有軍士告稱阿那肱遣臣招引西軍齊主令侍中斛律孝卿撿校孝卿以為妄還至晉陽阿那肱腹心復告阿那肱謀反又以為妄斬之乙卯齊主詔安徳王延宗廣寜王孝珩募兵延宗入見齊主告以欲向北朔州延宗泣諫不從密遣左右先选皇太后太子於北朔州丙辰周主與齊王憲㑹於介休齊開府儀同三司韓建業舉城降以為上柱國封郇公是夜齊主欲遁去諸將不從丁巳周師至晉陽齊主復大赦改元隆化以安徳王延宗為相國并州刺史揔山西兵謂曰并州兄自取之兒今去矣延宗曰陛下為社稷勿動臣為陛下出死力戰必能破之穆提婆曰至尊計已成王不得輒沮齊主乃夜斬五龍門而出欲奔突厥從官多㪚領軍梅勝郎叩馬諫乃回向鄴時唯髙阿那肱等十餘騎從廣寧王孝珩襄城王彦道繼至得數十人與俱穆提婆西奔周軍陸令萱自殺家屬皆誅沒周主以提婆為柱國宐州刺史下詔諭齊羣臣曰若妙盡人謀深逹天命官榮爵賞各有加隆或我之將卒逃逸彼朝無問貴賤皆從蕩滌自是齊臣降者相繼初齊高祖為魏丞相以唐邕典外兵曹太原白建典騎兵曹皆以善書計工簿帳受委任及齊受禪諸司咸歸尚書帷二曹不廢更名二省邕官至録尚書事建官至中書令常典二省世稱唐白邕兼領度支與髙阿那肱有隙阿那肱譖之齊主敕侍中斛律孝卿揔知騎兵度支孝卿事多專决不復詢禀邕自以宿舊習事為孝卿所輕意甚鬱鬱及齊主還鄴邕遂留晉陽并州將帥請於安徳王延宗曰王不為天子諸人實不能為王出死力延宗不得已戊午即皇帝位下詔曰武平孱弱政由宦豎斬􅀜夜遁莫知所之王公卿士猥見推逼今祗承寳位大赦改元徳昌以晉昌王唐邕為宰相齊昌王莫多婁敬顯沐陽王和阿干子右衛大將軍段暢開府儀同三司韓骨胡等為將帥敬顯貸文之子也衆聞之不召而至者前後相屬延宗發府藏及後宫羙女以賜將士籍没内參十餘家齊主聞之謂近臣曰我寧使周得并州不欲安徳得之左右曰理然延宗見士卒皆親執手稱名流涕嗚咽衆爭為死童兒女子亦乗屋攘􅃑投甎石以禦敵己未周主至晉陽庚申齊主入鄴周軍圍晉陽四合如黒雲安徳王延宗命莫多婁敬顯韓骨胡拒城南和阿干子段暢拒城東自帥衆拒齊王憲於城北延宗素肥前如偃後如伏人常笑之至是奮大矟往來督戰勁捷若飛所向無前和阿干子段暢以千騎奔周軍周主攻東門際昏遂入之進焚佛寺延宗敬顯自門入夾擊之周師大亂爭門相塡壓塞路不得進齊人從後斫刺死者二千餘人周主左右略盡自拔無路承御上士張壽牽馬首賀拔伏恩以鞭拂其後﨑嶇得出齊人奮擊幾中之城東道阨曲伏恩及降者皮子信導之僅得免時已四更延宗謂周主爲亂兵所殺使於積尸中求長鬛者不得時齊人既㨗入坊飲酒盡醉臥延宗不復能整周主出城飢甚欲遁去諸將亦多勸之還宇文忻勃然進曰陛下自克晉州乗勝至此今偽主奔波關東響振自古行兵未有若斯之盛昨日破城將士輕敵微有不利何足爲懐丈夫當死中求生敗中取勝今破竹之勢已成柰何弃之而去齊王憲柱國王誼亦以爲去必不免段暢等又盛言城内空虛周主乃駐馬鳴角收兵俄頃復振辛酉旦還攻東門克之延宗戰力屈走至城北周人擒之周主下馬執其手延宗辭曰死人手何敢廹至尊周主曰兩國天子非有怨惡直爲百姓來耳終不相害勿怖也使復衣帽而禮之唐邕等皆降於周獨莫多婁敬顯奔鄴齊主以爲司徒延宗初稱尊號遣使修啓於瀛州刺史任城王湝曰至尊出奔宗廟事重羣公勸廹權主號令事寧終歸叔父湝曰我人臣何容受此啓執使者送鄴壬戌周主大赦削除齊制收禮文武之士􅀄伊婁謙聘於齊其參軍髙遵以情輸於齊齊人拘之於􅀳陽周主旣克􅀳陽召謙勞之執遵付謙任其報復謙頓首請赦之周主曰卿可聚衆唾靣使其知愧謙曰以遵之罪又非唾靣可責帝善其言而止謙待遵如初臣光曰賞有功誅有罪此人君之任也髙遵奉使異國漏泄大謀斯叛臣也周髙祖不自行戮乃以賜謙使之復怨失政刑矣孔子謂以徳報怨者何以報徳為謙者宐辭而不受歸諸有司以正典刑乃請而赦之以成其私名美則美矣亦非公義也齊主命立重賞以募戰士而竟不出物廣寧王孝珩請使任城王湝將幽州道兵入土門􅀭聲趣并州獨孤永業將洛州道兵入潼闗揚聲趣長安臣請將京畿兵出滏口鼓行逆戰敵聞南北有兵自然逃潰又請出宫人珍寳賞將士齊主不悦斛律孝卿請齊主親勞將士為之撰辭且曰宐忼慨流涕以感激人心齊主既出臨衆將令之不復記所受言遂大笑左右亦笑將士怒曰身尚如此吾輩何急皆無戰心於是自大丞相已下太宰三師大司馬大將軍三公等官並増員而授或三或四不可勝數朔州行臺僕射髙勱將兵侍衛太后太子自土門道還鄴時宦官儀同三司茍子溢猶恃寵縱􅁀民閒雞彘縱鷹犬􅅮噬取之勱執以徇將斬之太后救之得免或謂勱曰子溢之徒言成禍福獨不慮後患邪勱攘􅃑曰今西㓂已據并州逹官率皆委叛正坐此輩濁亂朝廷若得今日斬之明日受誅亦無所恨勱岳之子也甲子齊太后至鄴丙寅周主出齊宫中珍寳服玩及宫女二千人班賜將士加立功者官爵各有差周主問髙延宗以取鄴之䇿辭曰此非亡國之臣所及强問之乃曰若任城王據鄴臣不能知若今主自守陛下兵不血刃癸酉周師趣鄴命齊王憲先驅以上柱國陳王純為并州揔􅃹齊主引諸貴臣入朱雀門賜酒食問以禦周之䇿人人異議齊主不知所從是時人情忷懼莫有闘心朝士出降晝夜相屬髙勱曰今之叛者多是貴人至於卒伍猶未離心請追五品以上家屬置之三臺因脅之以戰若不㨗則焚臺此曹顧惜妻子必當死戰且王師頻北賊徒輕我今背城一决理必破之齊主不能用望氣者言當有革易齊主引尚書令髙元海等議依天統故事禪位皇太子資治通鑑巻第一百七十二
