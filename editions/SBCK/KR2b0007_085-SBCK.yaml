body:
  text: 李雄攻殺汶山太守陳圗遂取郫城秋七月李流徙屯郫蜀民皆保險結塢或南入寧州或東下荆州城邑皆空野無煙火流虜掠無所得士衆飢乏唯涪陵千餘家依青城山處士范長生平西參軍涪陵徐轝說羅尚求為汶山太守邀結長生與共討流尚不許轝怒出降於流流以轝為安西將軍轝說長生使資給流軍糧長生從之流軍由是復振初李含以長沙王乂微弱必為齊王冏所殺因欲以為冏罪而討之遂廢帝立大將軍頴以河間王顒為宰相已得用事既而冏為乂所殺頴顒猶守藩不如所謀頴恃功驕奢百度弛廢甚於冏時猶嫌乂在内不得逞其欲欲去之時皇甫商復為乂參軍商兄重為秦州刺史含說顒曰商為乂所任重終不為人用宜早除之可表遷重爲内職因其過長安執之重知之露檄上尚書發隴上兵以討含乂以兵方少息遣使詔重罷兵徴含為河南尹含就徴而重不奉詔顒遣金城太守游楷隴西太守韓稚等合四郡兵攻之顒宻使含與侍中馮蓀中書令卞粹謀殺乂皇甫商以告乂收含蓀粹殺之驃騎從事琅邪諸葛玫前司徒長史武邑牽秀皆出奔鄴張昌黨石冰寇楊州敗刺史陳徽諸郡盡没又攻破江州别將陳貞等攻武陵零陵豫章武昌長沙皆陷之臨淮人封雲起兵冦徐州以應冰於是荆江揚豫徐五州之境多為昌所據昌更置牧守皆桀盜小人專以劫掠為務劉弘遣陶侃等攻昌於竟陵劉喬遣其將李楊等向江夏侃等屢與昌戰大破之前後斬首數萬級昌逃于下儁山其衆悉降初陶侃少孤貧為郡督郵長沙太守萬嗣過廬江見而異之命其子結友而去後察孝廉至洛陽豫章國郎中令楊􅷄薦之於顧榮侃由是知名既克張昌劉弘謂侃曰吾昔為羊公參軍謂吾後當居身處今觀卿必繼老夫矣弘之退屯於梁也征南將軍范陽王虓遣前長水校尉張奕領荆州弘至奕不受代舉兵拒弘弘討奕斬之時荆部守宰多缺弘請補選詔許之弘叙功銓德隨才授任人皆服其公當弘表皮初補襄陽太守朝廷以初雖有功而望淺更以弘壻前東平太守夏矦陟為襄陽太守弘下教曰夫治一國者宜以一國為心必若姻親然後可用則荆州十郡安得十女壻然後為政哉乃表陟姻親舊制不得相監皮初之勲宜見酬報詔聽之弘於是勸課農桑寛刑省賦公私給足百姓愛悅河間王顒聞李含等死即起兵討長沙王乂大將軍頴上表請討張昌許之聞昌已平因欲與顒共攻乂盧志諫曰公前有大功而委權辭寵時望美矣今宜頓軍關外文服入朝此霸主之事也參軍魏郡邵續曰人之有兄弟如左右手明公欲當天下之敵而先去其一手可乎頴皆不從八月顒頴共表乂論功不平與右僕射羊玄之左將軍皇甫商專擅朝政殺害忠良請誅􅀇之商遣乂還國詔曰顒敢舉大兵内向京輦吾當親帥六軍以誅姦逆其以乂為太尉都督中外諸軍事以禦之顒以張方為都督將精兵七萬自函谷東趨洛陽頴引兵屯朝歌以平原内史陸機為前將軍前鋒都督督北中郎將王粹冠軍將軍牽秀中䕶軍石超等軍二十餘萬南向洛陽機以羇旅事頴一旦頓居諸將之右王粹等心皆不服白沙督孫惠與機親厚勸機譲都督於粹機曰彼將謂吾首䑕兩端適所以速禍也遂行頴列軍自朝歌至河橋鼓聲聞數百里乙丑帝如十三里橋太尉乂使皇甫商將萬餘人拒張方於宜陽己巳帝還軍宣武場庚午舎于石樓九月丁丑屯于河橋壬子張方襲皇甫商敗之甲申帝軍于芒山丁亥幸偃師辛夘舎于豆田大將軍頴進屯河南阻清水為壘癸巳羊􅀇之憂懼而卒帝旋軍城東丙申幸􅚆氏擊牽秀走之大赦張方入京城大掠死者萬計李流疾篤謂諸將曰驍騎仁明固足以濟大事然前軍英武殆天所相可共受事於前軍流卒衆推李雄為大都督大將軍益州牧治郫城雄使武都朴泰紿羅尚使襲郫城云已為内應尚使隗伯將兵攻郫泰約舉火為應李驤伏兵於道泰出長梯於外隗伯兵見火起爭縁梯上驤縱兵擊大破之追犇夜至城下詐稱萬嵗曰已得郫城矣入少城尚乃覺之退保太城隗伯創甚雄生獲之赦不殺李驤攻犍為斷尚運道獲太守龔恢殺之石超進逼􅚆氏冬十月壬寅帝還宫丁未敗牽秀于東陽門外大將軍頴遣將軍馬咸助陸機戊申太尉乂奉帝與機戰于建春門乂司馬王瑚使數千騎繫㦸於馬以突咸陳咸軍亂執而斬之機軍大敗赴七里澗死者如積水為之不流斬其大將賈崇等十六人石超遁去初宦人孟玖有寵於大將軍頴玖欲用其父為邯鄲令左長史盧志等皆不敢違右司馬陸雲固執不許曰此縣公府掾資豈有黄門父居之邪玖深怨之玖弟超領萬人為小督未戰縱兵大掠陸機録其主者超將鐵騎百餘人直入機麾下奪之顧謂機曰貉奴能作督不機司馬呉郡孫拯勸機殺之機不能用超宣言於衆曰陸機將反又還書與玖言機持兩端故軍不速决及戰超不受機節度輕兵獨進敗没玖疑機殺之譖之於頴曰機有貳心於長沙牽秀素諂事玖將軍王闡郝昌帳下督陽平公師藩皆玖所引用相與共證之頴大怒使秀將兵收機參軍事王彰諫曰今日之舉彊弱異勢庸人猶知必克況機之明達乎但機呉人殿下用之太過北土舊將皆疾之耳頴不從機聞秀至釋戎服著白帢與秀相見為牋辭頴既而歎曰華亭鶴唳可復聞乎秀遂殺之頴又收機弟清河内史雲平東祭酒耽及孫拯皆下獄記室江統陳留蔡克頴川棗嵩等上疏以為陸機淺謀致敗殺之可也至於反逆則衆共知其不然宜先檢校機反狀若有徴驗誅雲等未晩也統等懇請不已頴遲迴者三日蔡克入至頴前叩頭流血曰雲為孟玖所怨逺近莫不聞今果見殺竊為明公惜之僚屬隨克入者數十人流涕固請頴惻然有宥雲之色孟玖扶頴入催令殺雲耽夷機三族獄吏考掠孫拯數百两踝骨見終言機寃吏知拯義烈謂拯曰二陸之枉誰不知之君可不愛身乎拯仰天歎曰陸君兄弟世之奇士吾䝉知愛今既不能救其死忍復從而誣之乎玖等知拯不可屈乃令獄吏詐為拯辭頴既殺機意常悔之及見拯辭大喜謂玖等曰非卿之忠不能窮此姦遂夷拯三族拯門人費慈宰意二人詣獄明拯寃拯譬遣之曰吾義不負二陸死自吾分卿何爲爾邪曰君既不負二陸僕又安可負君固言拯寃玖又殺之太尉乂奉帝攻張方方兵望見乗輿皆退走方遂大敗死者五千餘人方退屯十三里橋衆懼欲夜遁方曰勝負兵家之常善用兵者能因敗為成今我更前作壘出其不意此奇䇿也乃夜潜進逼洛城七里築壘數重外引廪榖以足軍食乂既戰勝以為方不足憂聞方壘成十一月引兵攻之不利朝議以乂頴兄弟可辭說而釋乃使中書令王衍等往說頴令與乂分陜而居頴不從乂因致書於頴為陳利害欲與之和解頴復書請斬皇甫商等首則引兵還鄴乂不可頴進兵逼京師張方决千金堨水碓皆涸乃發王公奴婢手舂給兵一品已下不從征者男子十三以上皆從役又發奴助兵公私窮踧米石萬錢詔命所行一城而已驃騎主簿范陽祖逖言於乂曰劉沈忠義果毅雍州兵力足制河間宜啓上為詔與沈使發兵襲顒顒窘急必召張方以自救此良策也乂從之沈奉詔馳檄四境諸郡多起兵應之沈合七郡之衆凡萬餘人趣長安乂又使皇甫商間行齎帝手詔命游楷等罷兵敕皇甫重進軍討顒商行至新平遇其從甥從甥素憎商以告顒顒捕商殺之十二月議郎周玘前南平内史長沙王矩起兵江東以討石冰推前呉興太守吳郡顧祕都督揚州九郡諸軍事傳檄州郡殺冰所署將吏於是前侍御史賀循起兵於㑹稽廬江内史廣陵華譚及丹陽葛洪甘卓皆起兵以應祕玘處之子循邵之子卓寧之曾孫也冰遣其將羌毒帥兵數萬拒玘玘擊斬之冰自臨淮退趨壽春征東將軍劉準聞冰至惶懼不知所為廣陵度支廬江陳敏統衆在壽春謂準曰此等本不樂逺戍逼迫成賊烏合之衆其勢易離敏請督帥運兵為公破之準乃益敏兵使擊之閏月李雄急攻羅尚尚軍無食留牙門張羅守城夜由牛鞞水東走羅開門降雄入成都軍士飢甚乃帥衆就榖於郪掘野芋而食之許雄坐討賊不進徴即罪安北將軍都督幽州諸軍事王浚以天下方亂欲結援夷狄乃以一女妻鮮卑段務勿塵一女妻素怒延又表以遼西郡封務勿塵為遼西公浚沈之子也毛詵之死也李叡犇五苓夷帥于陵丞于陵丞詣李毅為叡請命毅許之叡至毅殺之于陵丞怒帥諸夷反攻毅尚書令樂廣女為成都王妃或譖諸太尉乂乂以問廣廣神色不動徐曰廣豈以五男易一女哉乂猶疑之永興元年春正月丙午樂廣以憂卒長沙厲王乂屢與大將軍頴戰破之前後斬獲六七萬人而乂未嘗虧奉上之禮城中糧食日窘而士卒無離心張方以為洛陽未可克欲還長安而東海王越慮事不濟癸亥潛與殿中諸將夜収乂送别省甲子越啓帝下詔免乂官置金墉城大赦改元城旣開殿中將士見外兵不盛悔之更謀劫出乂以拒頴越懼欲殺乂以絶衆心黄門侍郎潘淊曰不可將自有靜之者乃遣人宻告張方丙寅方取乂於金墉城至營炙而殺之方軍士亦為之流涕公卿皆詣鄴謝罪大將軍頴入京師復還鎮于鄴詔以頴為丞相加東海王越守尚書令頴遣奮武將軍石超等帥兵五萬屯十二城門殿中宿所忌者頴皆殺之悉代去宿衛兵表盧志為中書監留鄴參署丞相府事河間王顒頓軍於鄭為東軍聲援聞劉沈兵起還鎮渭城遣督䕶虞䕫逆戰於好畤䕫兵敗顒懼退入長安急召張方方掠洛中官私奴婢萬餘人而西軍中乏食殺人􅄂牛馬肉食之劉沈渡渭而軍與顒戰顒屢敗沈使安定太守衙博功曹皇甫澹以精甲五千襲長安入其門力戰至顒帳下沈兵來遲馮翊太守張輔見其無繼引兵横擊之殺博及澹沈兵遂敗収餘卒而退張方遣其將敦偉夜擊之沈軍驚潰沈與麾下南走追獲之沈謂顒曰知己之惠輕君臣之義重沈不可以違天子之詔量彊弱以茍全投􅃑之日期之必死􅉁醢之戮其甘如薺顒怒鞭之而後􅆎斬新平太守江夏張光數為沈畫計顒執而詰之光曰劉雍州不用鄙計故令大王得有今日顒壯之引與歡宴表為右衛司馬羅尚逃至江陽遣使表狀詔尚權統巴東巴郡涪陵以供軍賦尚遣别駕李興詣鎮南將軍劉弘求糧弘綱紀以運道阻逺且荆州自空乏欲以零陵米五千斛與尚弘曰天下一家彼此無異吾今給之則無西顧之憂矣遂以三萬斛給之尚頼以自存李興願留為弘參軍弘奪其手版而遣之又遣治中何松領兵屯巴東為尚後繼于時流民在荆州者十餘萬户羈旅貧乏多為盜賊弘大給其田及種糧擢其賢才隨資叙用流民遂安二月乙酉丞相頴表廢皇后羊氏幽于金墉城廢皇太子覃為清河王陳敏與石冰戰數十合氷衆十倍於敏敏擊之所嚮皆捷遂與周玘合攻冰於建康三月冰北走投封雲雲司馬張統斬冰及雲以降楊徐二州平周玘賀循皆散衆還家不言功賞朝廷以陳敏為廣陵相河間王顒表請立丞相頴為太弟戊申詔以頴為皇太弟都督中外諸軍事丞相如故大赦乗輿服御皆遷于鄴制度一如魏武帝故事以顒為太宰大都督雍州牧前太傅劉寔為太尉寔以老固讓不拜太弟頴僣侈日甚嬖倖用事大失衆望司空東海王越與右衛將軍陳聄及長沙王故將上官已等謀討之秋七月丙申朔陳聄勒兵入雲龍門以詔召三公百僚入殿中戒嚴討頴石超犇鄴戊戌大赦復皇后羊氏及太子覃己亥越奉帝北征以越為大都督徴前侍中稽紹詣行在侍中秦凖謂紹曰今往安危難測卿有佳馬乎紹正色曰臣子扈衛乗輿死生以之佳馬何為越檄召四方兵赴者雲集比至安陽衆十餘萬鄴中震恐頴㑹羣僚問計東安王繇曰天子親征宜釋甲縞素出迎請罪頴不從遣石超帥衆五萬拒戰折衝將軍喬智明勸頴奉迎乗輿頴怒曰卿名曉事投身事􅀌今主上為羣小所逼卿奈何欲使􅀌束手就刑邪陳聄二弟匡規自鄴赴行在云鄴中皆已離散由是不甚設備己未石超軍奄至乗輿敗績於蕩隂帝傷頰中三矢百官侍御皆散嵇紹朝服下馬登輦以身衛帝兵人引紹於轅中斫之帝曰忠臣也勿殺對曰奉太弟令惟不犯陛下一人耳遂殺紹血濺帝衣帝墯於草中亡六璽石超奉帝幸其營帝餒甚超進水左右奉秋桃頴遣盧志迎帝庚申入鄴大赦改元曰建武左右欲浣帝衣帝曰嵇侍中血勿浣也陳聄上官已等奉太子覃守洛陽司空越犇下邳徐州都督東平王楙不納越徑還東海太弟頴以越兄弟宗室之望下令招之越不應命前奮威將軍孫惠上書勸越邀結藩方同奬王室越以惠為記室參軍與參謀議北軍中候茍晞奔范陽王虓虓承制以晞行兖州刺史初三王之起兵討趙王倫也王浚擁衆挾兩端禁所部士民不得赴三王召募太弟頴欲討之而未能浚心亦欲圖頴頴以右司馬和演為幽州刺史宻使殺浚演與烏桓單于審登謀與浚游薊城南清泉因而圖之㑹天暴雨兵器霑濕不果而還審登以爲浚得天助乃以演謀告浚浚與審登密嚴兵約并州刺史東嬴公騰共圍演殺之自領幽州營兵騰越之弟也太弟頴稱詔徴浚浚與鮮卑叚務勿塵烏􅁊羯朱及東嬴公騰同起兵討頴頴遣北中郎將王斌及石超擊之太弟頴怨東安王繇前議八月戊辰収繇殺之初繇兄琅邪恭王覲薨子睿嗣睿沈敏有度量為左將軍與東海參軍王導善導敦之從父弟也識量清逺以朝廷多故每勸睿之國及繇死睿從帝在鄴恐及禍將逃歸頴先敕諸關津無得出貴人睿至河陽為津吏所止從者宋興自後來以鞭拂睿而笑曰舎長官禁貴人汝亦被拘邪吏乃聽過至洛陽迎太妃夏矦氏俱歸國丞相從事中郎王澄發孟玖姦利事勸太弟頴誅之頴從之上官已在洛陽殘暴縱横守河南尹周馥浚之從父弟也與司􅀠滿奮等謀誅之事􅂥奮等死馥走得免司空越之討太弟頴也太宰顒遣右將軍馮翊太守張方將兵二萬救之聞帝已入鄴因命方鎮洛陽已與别將苗願拒之大敗而還太子覃夜襲已願已願出走方入洛陽覃於廣陽門迎方而拜方下車扶止之復廢覃及羊后􅀄太弟頴表匈奴左賢王劉淵為冠軍將軍監五部軍事使將兵在鄴淵子聰驍勇絶人博涉經史善屬文彎弓三百斤弱冠游京師名士莫不與交頴以聰為積弩將軍淵從祖右賢王宣謂其族人曰自漢亡以來我單于徒有虛號無復尺土自餘王矦降同編户今吾衆雖衰猶不減二萬奈何斂手受役奄過百年左賢王英武超世天茍不欲興匈奴必不虛生此人也今司馬氏骨肉相殘四海鼎沸復呼韓邪之業此其時矣乃相與謀推淵為大單于使其黨呼延攸詣鄴告之淵白頴請歸㑹葬頴弗許淵令攸先歸告宣等使招集五部及雜胡聲言助頴實欲叛之及王浚東嬴公騰起兵淵說頴曰今二鎮跋扈衆十餘萬恐非宿衛及近郡士衆所能禦也請為殿下還說五部以赴國難頴曰五部之衆果可發否就能發之鮮卑烏􅁊未易當也吾欲奉乗輿還洛陽以避其鋒徐傳檄天下以逆順制之君意何如淵曰殿下武皇帝之子有大勲於王室威恩逺著四海之内孰不願為殿下盡死力者何難發之有王浚豎子東嬴疎屬豈能與殿下爭衡邪殿下一發鄴宫示弱於人洛陽不可得至雖至洛陽威權不復在殿下也願殿下撫勉士衆靖以鎮之淵請為殿下以二部摧東嬴三部梟王浚二豎之首可指日而懸也頴悅拜淵為北單于參丞相軍事淵至左國城劉宣等上大單于之號二旬之間有衆五萬都於離石以聦為鹿蠡王遣左於陸王宏帥精騎五千㑹頴將王粹拒東嬴公騰粹已為騰所敗宏無及而歸王浚東嬴公騰合兵擊王斌大破之浚以主簿祁弘為前鋒敗石超於平棘乗勝進軍候騎至鄴鄴中大震百僚犇走士卒分散盧志勸頴奉帝還洛陽時甲士尚有萬五千人志夜部分至曉將發而程太妃戀鄴不欲去頴狐疑未決俄而衆潰頴遂將帳下數十騎與志奉帝御犢車南犇洛陽倉猝上下無齎中黄門被囊中齎私錢三千詔貸之於道中買飯夜則御中黄門布被食以瓦盆至温將謁陵帝䘮履納從者之履下拜流涕及濟河張方自洛陽遣其子羆帥騎三千以所乗車奉迎帝至芒山下方自帥萬餘騎迎帝方將拜謁帝下車自止之帝還宫犇散者稍還百官粗備辛已大赦王浚入鄴士衆暴掠死者甚衆使烏桓羯朱追太弟頴至朝歌不及浚還葪以鮮卑多掠人婦女命有敢挾藏者斬於是沈於易水者八千人東嬴公騰乞師於拓跋猗㐌以擊劉淵猗㐌與弟猗盧合兵擊淵於西河破之與騰盟于汾東而還劉淵聞太弟頴去鄴歎曰不用吾言逆自犇潰真奴才也然吾與之有言矣不可以不敕將發兵擊鮮卑烏􅁊劉宣等諫曰晉人奴􅀠御我今其骨肉相殘是天棄彼而使我復呼韓邪之業也鮮卑烏􅁊我之氣類可以為援柰何擊之淵曰善大丈夫當為漢高魏武呼韓邪何足効哉宣等稽首曰非所及也荆州兵擒斬張昌同黨皆夷三族李雄以范長生有名徳為蜀人所重欲迎以為君而臣之長生不可諸將固請雄即尊位冬十月雄即成都王位大赦改元曰建興除晉灋約灋七章以其叔父驤為太傅兄始為太保李離為太尉李雲為司徒李璜為司空李國為太宰閻式為尚書令楊褒為僕射尊母羅氏為王太后追尊父特為成都景王雄以李國李離有智謀凡事必咨而後行然國離事雄彌謹劉淵遷都左國城胡晉歸之者愈衆淵謂羣臣曰昔漢有天下久長恩結於民吾漢氏之甥約為兄弟兄亡弟紹不亦可乎乃建國號曰漢劉宣等請上尊號淵曰今四方未定且可依高祖稱漢王於是即漢王位大赦改元曰元熈追尊安樂公禪為孝懷皇帝作漢三祖五宗神主而祭之立其妻呼延氏為王后以右賢王宣為丞相崔游為御史大夫左於陸王宏為太尉范隆為大鴻臚朱紀為太常上黨崔懿之後部人陳元達皆為黄門郎族子曜為建武將軍游固辭不就元達少有志操淵嘗招之元達不荅及淵為漢王或謂元達曰君其懼乎元達笑曰吾知其人久矣彼亦亮吾之心但恐不過三二日驛書必至其暮淵果徴元達元達事淵屢進忠言退而削草雖子弟莫得知也曜生而眉白目有赤光幼聰慧有膽量早孤養於淵及長儀觀魁偉性拓落高亮與衆不羣好讀書善屬文鐵厚一寸射而洞之常自比樂毅及蕭曹時人莫之許也惟劉聰重之曰永明漢世祖魏武之流數公何足道哉帝既還洛陽張方擁兵專制朝政太弟頴不得復豫事豫州都督范陽王虓徐州都督東平王楙等上言頴弗克負荷宜降封一邑特全其命太宰宜委以闗右之任自州郡以下選舉授任一皆仰成朝之大事廢興損益每輒疇咨張方為國效節而不達變通未即西還宜遣還郡所加方官請悉如舊司徒戎司空越並忠國小心宜幹機事委以朝政王浚有定社稷之勲宜特崇重遂撫幽朔長為北藩臣等竭力扞城藩屏皇家則陛下垂拱四海自正矣張方在洛既久兵士剽掠殆竭衆情喧喧無復留意議欲奉帝遷都長安恐帝及公卿不從欲須帝出而劫之乃請帝謁廟帝不許十一月乙未方引兵入殿以所乗車迎帝帝馳避後園竹中軍人引帝出逼使上車帝垂泣從之方於馬上稽首曰今冦賊縱横宿衛單少願陛下幸臣壘臣盡死力以僃不虞時羣臣皆逃匿唯中書監盧志侍側曰陛下今日之事當一從右將軍帝遂幸方壘令方具車載宫人寶物軍人因妻略後宫分争府藏割流蘇武帳為馬帴魏晉以來蓄積掃地無遺方將焚宗廟宫室以絶人返顧之心盧志曰昔董卓無道焚燒洛陽怨毒之聲百年猶存何為襲之乃止帝停方壘三日方擁帝及太弟頴豫章王熾等趨長安王戎出犇郟太宰顒帥官屬步騎三萬迎于霸上顒前拜謁帝下車止之帝入長安以征西府為宫唯尚書僕射荀藩司隷劉暾河南尹周馥等在洛陽爲留臺承制行事號東西臺藩勗之子也丙午留臺大赦改元復爲永安辛丑復皇后羊氏羅尚移屯巴郡遣兵掠蜀中獲李驤妻昝氏及子壽十二月丁亥詔太弟頴以成都王還第更立豫章王熾為皇太弟帝兄弟二十五人時存者惟頴熾及呉王晏晏材質庸下熾冲素好學故太宰顒立之詔以司空越為太􅀓與顒夾輔帝室王戎參錄朝政又以光祿大夫王衍為尚書左僕射高宻王略為鎮南將軍領司􅀠校尉權鎮洛陽東中郎將模為寧北將軍都督冀州諸軍事鎮鄴百官各還本職令州郡蠲除苛政愛民務本清通之後當還東京大赦改元略模皆越之弟也王浚旣去鄴越使模鎭之顒以四方乖離禍難不已故下此詔和解之冀獲少安越辭太傅不受又詔以太宰顒都督中外諸軍事張方為中領軍錄尚書事領京兆太守東嬴公騰遣將軍聶􅀇擊漢王淵戰於大陵􅀇兵大敗淵遣劉曜冦太原取􅊄氏屯留長子中都又遣冠軍將軍喬晞冦西河取介休介休令賈渾不降晞殺之將納其妻宗氏宗氏罵晞而哭晞又殺之淵聞之大怒曰使天道有知喬晞望有種乎追還降秩四等収渾屍􅁙之資治通鑑卷第八十五
