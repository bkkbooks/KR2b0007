seq: 85
front:
  text: 虞又與特司馬上官惇書曰納絳如待敵不可易也前將軍雄亦以爲言特怒曰大事已定但當安民何爲更逆加疑忌使之離叛乎朝廷遣荆州刺史宗岱建平太守孫阜帥水軍三萬以救羅尚岱以阜爲前鋒進逼德陽特遣李蕩及蜀郡太守李璜就德陽太守任臧共拒之岱阜軍勢甚盛諸塢皆有貳志益州兵曹從事蜀郡任叡言於羅尚曰李特散衆就食驕怠無備此天亡之時也宜宻約諸塢刻期同發内外擊之破之必矣尚使叡夜縋出城宣㫖於諸塢期以二月十日同擊特叡因詣特詐降特問城中虛實叡曰粮儲將盡但餘貨帛耳叡求出省家特許之遂還報尚二月尚遣兵掩襲特營諸塢皆應之特兵大敗斬特及李輔李逺皆焚尸傳首洛陽流民大懼李流李蕩李雄收餘衆還保赤祖流自稱大將軍大都督益州牧保東營蕩雄保北營孫阜破德陽獲寋碩任臧退屯涪陵三月羅尚遣督䕶何冲常深等攻李流涪陵民藥紳等亦起兵攻流流與李驤拒深使李蕩李雄拒紳何冲乗虛攻北營氐苻成隗伯在營中叛應之蕩母羅氏擐甲拒戰伯手刃傷其目羅氏氣益壯營垂破㑹流等破深紳引兵還與冲等戰大破之成伯帥其黨突出詣尚流等乗勝進抵成都尚復閉城自守蕩馳馬逐北中矛而死朝廷遣侍中燕國劉沈假節統羅尚許雄等軍討李流行至長安河閒王顒留沈為軍師遣席薳代之李流以李特李蕩繼死宗岱孫阜將至甚懼李含勸流降流從之李驤李雄迭諫不納夏五月流遣其子世及含子胡為質於阜軍胡兄離為梓潼太守聞之自郡馳還欲諫不及退與雄謀襲阜軍雄曰為今計當如是而二翁不從柰何離曰當劫之耳雄大喜乃共說流民曰吾屬前已殘暴蜀民今一旦束手便為魚肉惟有同心襲阜以取富貴耳衆皆從之雄遂與離襲擊阜軍大破之㑹宗岱卒於墊江荆州軍遂退流甚慙由是奇雄才軍事悉以任之新野莊王歆為政嚴急失蠻夷心義陽蠻張昌聚黨數千人欲為亂荆州以壬午詔書發武勇赴益州討李流號壬午兵民憚逺征皆不欲行詔書督遣嚴急所經之界停留五日者二千石免官由是郡縣官長皆親出驅逐展轉不逺輒復屯聚為羣盜時江夏大稔民就食者數千口張昌因之誑惑百姓更姓名曰李辰募衆於安陸石巖山諸流民及避戍役者多往從之太守弓欽遣兵討之不勝昌遂攻郡欽兵敗與部將朱伺犇武昌歆遣騎督靳滿討之滿復敗走昌遂據江夏造妖言云當有聖人出為民主得山都縣吏丘沈更其姓名曰劉尼詐云漢後奉以為天子曰此聖人也昌自為相國詐作鳳皇玉璽之瑞建元神鳳郊祀服色悉依漢故事有不應募者族誅之士民莫敢不從又流言云江淮已南皆反官軍大起當悉誅之玄相扇動人情惶懼江沔間所在起兵以應昌旬月間衆至三萬皆著絳㡌以馬尾作髯詔遣監軍華宏討之敗于障山歆上言妖賊犬羊萬計絳頭毛面挑刀走㦸其鋒不可當請臺􅎁諸軍三道救助朝廷以屯騎校尉劉喬為豫州刺史寧朔將軍沛國劉弘為荆州刺史又詔河間王顒遣雍州刺史劉沈將州兵萬人并征西府五千人出藍田關以討昌顒不奉詔沈自領州兵至藍田顒又逼奪其衆於是劉喬屯汝南劉弘及前將軍趙驤平南將軍羊伊屯宛昌遣其將黄林帥二萬人向豫州劉喬擊却之初歆與齊王冏善冏敗歆懼自結於大將軍頴及張昌作亂歆表請討之時長沙王乂已與頴有隙疑歆與頴連謀不聽歆出兵昌衆日盛從事中郎孫洵謂歆曰公為岳牧受閫外之託拜表輒行有何不可而使姦凶滋蔓禍釁不測豈藩翰王室鎮靜方夏之義乎歆將出兵王綏曰昌等小賊偏禆自足制之何必違詔命親矢石也昌至樊城歆乃出拒之衆潰為昌所殺詔以劉弘代歆為鎮南將軍都督荆州諸軍事六月弘以南蠻長史廬江陶侃為大都䕶參軍蒯􅁪為義軍督䕶牙門將皮初為都戰帥進據襄陽張昌并軍圍宛敗趙驤軍殺羊伊劉弘退屯􅆝昌進攻襄陽不克
