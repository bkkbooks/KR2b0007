seq: 20
front:
  text: 禁闥補過拾遺臣之願也上曰君薄淮陽邪吾今召君矣顧淮陽吏民不相得吾徒得君之重卧而治之黯既辭行過大行李息曰黯棄逐居郡不得與朝廷議矣御史大夫湯智足以拒諌詐足以飾非務巧佞之語辯數之辭非肯正為天下言専阿主意主意所不欲因而毁之主意所欲因而譽之好興事舞文灋内懐詐以御主心外挾賊吏以為威重公列九卿不早言之公與之俱受其戮矣息畏湯終不敢言及湯敗上抵息罪使黯以諸侯相秩居淮陽十嵗而卒詔徙姦猾吏民於邊夏四月乙卯以太子少傅武彊侯荘青翟為丞相
  hash: sha256:27f2541169d96616466614ab234fc8ef977fc365b6833fbd5ab3f3247e291243
body:
  text: 天子病鼎湖甚巫醫無所不致不愈游水發根言上郡有巫病而鬼神下之上召置祠之甘泉及病使人問神君神君言曰天子無憂病病少愈彊與我會甘泉於是病愈遂起幸甘泉病良已置酒夀宫神君非可得見聞其言言與人音等時去時來來則風肅然居室帷中神君所言上使人受書其言命之曰畫灋其所語世俗之所知也無絶殊者而天子心獨喜其事祕世莫知也時上卒起幸甘泉過右内史界中道多不治上怒曰義縱以我為不復行此道乎銜之六年冬十月雨水無氷上既下緡錢令而尊卜式百姓終莫分財佐縣官於是楊可告緡錢縱矣義縱以為此亂民部吏捕其為可使者天子以縱為廢格沮事棄縱市郎中令李敢怨大将軍靑之恨其父乃擊傷大将軍大将軍匿諱之居無何敢從上雍至甘泉宫獵票騎将軍去病射殺敢去病時方貴幸上為諱云鹿觸殺之夏四月乙巳廟立皇子閎為齊王旦為燕王胥為廣陵王初作誥䇿自造白金五銖錢後吏民之坐盗鑄金錢死者數十萬人其不發覺者不可勝計天下大抵無慮皆鑄金錢矣犯者衆吏不能盡誅六月詔遣博士褚大徐偃等六人分循郡國舉兼并之徒及守相為吏有罪者秋九月冠軍景桓侯霍去病薨天子甚悼之為冡像祁連山初霍仲孺吏畢歸家娶婦生子光去病既壮大乃自知父為霍仲孺會為票騎将軍擊匈奴道出河東遣吏迎仲孺而見之大為買田宅奴婢而去及還因将光西至長安任以為郎稍遷至奉車都尉光禄大夫是嵗大農令顔異誅初異以㢘直稍遷至九卿上與張湯既造白鹿皮幣問異異曰今王侯朝賀以蒼璧直數千而其皮薦反四十萬本末不相稱天子不説張湯又與異有郤及人有告異以它事下張湯治異異與客語初令下有不便者異不應㣲反脣湯奏當異九卿見令不便不入言而腹誹論死自是之後有腹誹之灋比而公卿大夫多謟䛕取容矣元鼎元年夏五月赦天下濟東王彭離驕悍昬暮與其奴亡命少年數十人行剽殺人取財物以為好所殺發覺者百餘人坐廢徙上庸二年冬十一月張湯有罪自殺初御史中丞李文與湯有郤湯所厚吏魯謁居隂使人上變告文姦事事下湯治論殺之湯心知謁居為之上問變事蹤跡安起湯佯驚曰此殆文故人怨之謁居病湯親為之摩足趙王素怨湯上書告湯大臣乃與吏摩足疑與為大姦事下廷尉謁居病死事連其弟弟繫導官湯亦治他囚導官見謁居弟欲隂為之而佯不省謁居弟弗知怨湯使人上書告湯與謁居謀共變告李文事下減宣宣嘗與湯有郤及得此事窮竟其事未奏也會人有盜發孝文園瘞錢丞相青翟朝與湯約俱謝至前湯獨不謝上使御史案丞相湯欲致其文丞相見知丞相患之丞相長史朱買臣王朝邊通皆故九卿二千石仕宦絶在湯前湯數行丞相事知三長史素貴故陵折丞史遇之三長史皆怨恨欲死之乃與丞相謀使吏捕案賈人田信等曰湯且欲奏請信輒先知之居物致冨與湯分之事辭頗聞上問湯曰吾所為賈人輒先知之益居其物是類有以吾謀告之者湯不謝又佯驚曰固宜有減宣亦奏謁居等事天子以湯懐詐面欺使趙禹切責湯湯乃為書謝因曰陷臣者三長史也遂自殺湯既死家産直不過五百金昆弟諸子欲厚葬湯湯母曰湯為天子大臣被汙惡言而死何厚葬乎載以牛車有棺無椁天子聞之乃盡案誅三長史十二月壬辰丞相青翟下獄自殺春起柏梁臺作承露盤髙二十丈大七圍以銅爲之上有仙人掌以承露和玉屑飲之云可以長生宫室之脩自此日盛二月以太子太傅趙周爲丞相三月辛亥以太子太傅石慶爲御史大夫大雨雪夏大水􅀜東餓死者以千數是嵗孔僅爲大農令而桑弘羊爲大農中丞稍置均輸以通貨物白金稍賤民不寳用竟廢之於是悉禁郡國無鑄錢専令上林三官鑄錢令天下非三官錢不得行而民之鑄錢益少計其費不能相當唯眞工大姦乃盜爲之渾邪王既降漢漢兵擊逐匈奴於幕北自鹽澤以東空無匈奴西域道可通於是張騫建言烏孫王昆莫本為匈奴臣後兵稍彊不肯復朝事匈奴匈奴攻不勝而逺之今單于新困於漢而故渾邪地空無人蠻夷俗戀故地又貪漢財物今誠以此時厚幣賂烏孫招以益東居故渾邪之地與漢結昆弟其埶宜聽聽則是斷匈奴右臂也既連烏孫自其西大夏之屬皆可招來而為外臣天子以為然拜騫為中郎将将三百人馬各二匹牛羊以萬數齎金幣帛直數千巨萬多持節副使道可便遣之他旁國騫既至烏孫昆莫見騫禮節甚倨騫諭指曰烏孫能東居故地則漢遣公主為夫人結為兄弟共距匈奴匈奴不足破也烏孫自以逺漢未知其大小素服屬匈奴日久且又近之其大臣皆畏匈奴不欲移徙騫留久之不能得其要領因分遣副使使大宛康居大月氏大夏安息身毒于闐及諸旁國烏孫發譯道送騫還使數十人馬數十匹隨騫報謝因令窺漢大小是嵗騫還到拜為大行後嵗餘騫所遣使通大夏之屬者皆頗與其人俱來於是西域始通於漢矣西域凡三十六國南北有大山中央有河東西六千餘里南北千餘里東則接漢玉門陽闗西則限以葱嶺河有兩源一出葱嶺一出于闐合流東注鹽澤鹽澤去玉門陽闗三百餘里自玉門陽闗出西域有兩道從鄯善傍南山北循河西行至莎車為南道南道西踰葱嶺則出大月氏安息自車師前王廷隨北山循河西行至䟽勒為北道北道西踰葱嶺則出大宛康居奄蔡焉故皆役屬匈奴匈奴西邊日逐王置僮僕都尉使領西域常居焉耆危須尉黎間賦税諸國取冨給焉烏孫王既不肯東還漢乃於渾邪王故地置酒泉郡稍發徙民以充實之後又分置武威郡以絶匈奴與羌通之道天子得宛汗血馬愛之名曰天馬使者相望於道以求之諸使外國一輩大者數百少者百餘人人所齎操大放博望侯時其後益習而衰少焉漢率一嵗中使多者十餘少者五六輩逺者八九嵗近者數嵗而反三年冬徙函谷闗於新安春正月戊子陽陵園火夏四月雨雹闗東郡國十餘饑人相食常山憲王舜薨子勃嗣坐憲王病不侍疾及居喪無禮廢徙房陵後月餘天子更封憲王子平為真定王以常山為郡於是五嶽皆在天子之邦矣徙代王義為清河王是嵗匈奴伊稺斜單于死子烏維單于立四年冬十月上行幸雍祠五畤詔曰今上帝朕親郊而后土無祀則禮不荅也其令有司議立后土祠於澤中圜丘上遂自夏陽東幸汾隂是時天子始廵郡國河東守不意行至不辦自殺十一月甲子立后土祠於汾隂脽上上親望拜如上帝禮禮畢行幸滎陽還至洛陽封周後􅁎嘉為周子南君春二月中山靖王勝薨樂成侯丁義薦方士欒大云與文成将軍同師上方悔誅文成得欒大大説大先事膠東康王為人長美言多方略而敢為大言處之不疑大言曰臣常往來海中見安期羨門之屬顧以臣為賤不信臣又以為康王諸侯耳不足與方臣之師曰黄金可成而河决可塞不死之藥可得僊人可致也然臣恐效文成則方士皆掩口惡敢言方哉上曰文成食馬肝死耳子誠能脩其方我何愛乎大曰臣師非有求人人者求之陛下必欲致之則貴其使者令為親屬以客禮待之乃可使通言於神人於是上使驗小方鬬旗旗自相觸擊是時上方憂河決而黄金不就乃拜大為五利将軍又拜為天士将軍地士将軍大通将軍夏四月乙巳封大為樂通侯食邑二千户賜甲第僮千人乘輿斥車馬帷帳器物以充其家又以衛長公主妻之齎金十萬斤天子親如五利之第使者存問共給相屬於道自大主将相以下皆置酒其家獻遺之天子又刻玉印曰天道将軍使使衣羽衣夜立白茅上五利将軍亦衣羽衣立白茅上受印以示不臣大見數月佩六印貴震天下於是海上燕齊之間莫不搤腕自言有禁方能神僊矣六月汾隂巫錦得大鼎於魏脽后土營旁河東太守以聞天子使驗問巫得鼎無姦詐乃以禮祠迎鼎至甘泉從上行薦之宗廟及上帝藏於甘泉宫羣臣皆上夀賀秋立常山憲王子商為泗水王初條侯周亞夫為丞相趙禹為丞相史府中皆稱其㢘平然亞夫弗任曰極知禹無害然文深不可以居大府及禹為少府比九卿為酷急至晚節吏務為嚴峻而禹更名寛平中尉尹齊素以敢斬伐著名及為中尉吏民益彫敝是嵗齊坐不勝任抵罪上乃復以王温舒為中尉趙禹為廷尉後四年禹以老貶為燕相是時吏治皆以慘刻相尚獨左内史兒寛勸農業緩刑罰理獄訟務在得人心擇用仁厚士推情與下不求名聲吏民大信愛之收租税時裁闊狹與民相假貸以故租多不入後有軍發左内史以負租課殿當免民聞當免皆恐失之大家牛車小家擔負輸租繦屬不絶課更以最上由此愈竒寛初南越文王遣其子嬰齊入宿衛在長安取邯鄲樛氏女生子興文王薨嬰齊立乃蔵其先武帝璽上書請立樛氏女為后興為嗣漢數使使者風諭嬰齊入朝嬰齊尚樂擅殺生自恣懼入見要用漢灋比内諸侯固稱病遂不見嬰齊薨謚曰眀王太子興代立其母為太后太后自未為嬰齊姬時嘗與霸陵人安國少季通是嵗上使安國少季往諭王王太后以入朝比内諸侯令辯士諫大夫終軍等宣其辭勇士魏臣等輔其决衛尉路博德将兵屯桂陽待使者南越王年少太后中國人安國少季往復與私通國人頗知之多不附太后太后恐亂起亦欲倚漢威數勸王及羣臣求内屬即因使者上書請比内諸侯三嵗一朝除邊闗於是天子許之賜其丞相吕嘉銀印及内史中尉太傅印餘得自置除其故黥劓刑用漢灋比内諸侯使者皆留填撫之上行幸雍且郊或曰五帝泰一之佐也宜立泰一而上親郊上疑未定齊人公孫卿曰今年得寳鼎其冬辛巳朔旦冬至與黄帝時等卿有札書曰黄帝得寳鼎是嵗己酉朔旦冬至凡三百八十年黄帝僊登于天因嬖人奏之上大悦召問卿對曰受此書申公申公曰漢興復當黄帝之時漢之聖者在髙祖之孫且曾孫也寳鼎出而與神通黄帝接萬靈眀庭眀庭者甘泉也黄帝采首山銅鑄鼎於荆山下鼎既成有龍垂胡䫇下迎黄帝黄帝上騎龍與羣臣後宫七十餘人俱登天於是天子曰嗟乎誠得如黄帝吾視去妻子如脱屣耳拜卿爲郎使東侯神於太室五年冬十月上祠五畤於雍遂踰隴西登崆峒隴西守以行往卒天子從官不得食惶恐自殺於是上北出蕭􅀜從數萬騎獵新秦中以勒邊兵而歸新秦中或千里無亭徼於是誅北地太守以下上又幸甘泉立泰一祠壇所用祠具如雍一畤而有加焉五帝壇環居其下四方地爲醊食羣神從者及北斗云十一月辛巳朔冬至昧爽天子始郊拜泰一朝朝日夕夕月則揖其祠列火滿壇壇旁亨炊具有司云祠上有光又云晝有黄氣上屬天太史令談祠官寛舒等請三嵗天子一郊見詔從之南越王王太后飭治行裝重齎為入朝具其相吕嘉年長矣相三王宗族仕宦為長吏者七十餘人男盡尚王女女盡嫁王子弟宗室及蒼梧秦王有連其居國中甚重得衆心愈於王王之上書數諫止王王弗聽有畔心數稱病不見漢使者使者皆注意嘉勢未能誅王王太后亦恐嘉等先事發欲介漢使者權謀誅嘉等乃置酒請使者大臣皆侍坐飲嘉弟為将将卒居宫外酒行太后謂嘉曰南越内屬國之利也而相君苦不便者何也以激怒使者使者狐疑相杖遂莫敢發嘉見耳目非是即起而出太后怒欲鏦嘉以矛王止太后嘉遂出介其弟兵就舎稱病不肯見王及使者隂與大臣謀作亂王素無意誅嘉嘉知之以故數月不發天子聞嘉不聽命王王太后孤弱不能制使者怯無决又以為王王太后已附漢獨吕嘉為亂不足以興兵欲使荘參以二千人往使參曰以好往數人足矣以武往二千人無足以為也辭不可天子罷參郟壮士故濟北相韓千秋奮曰以區區之越又有王王太后應獨相吕嘉為害願得勇士三百人必斬嘉以報於是天子遣千秋與王太后弟樛樂将二千人往入越境吕嘉等乃遂反下令國中曰王年少太后中國人也又與使者亂専欲内屬盡持先王寳器入獻天子以自媚多從人行至長安虜賣以為僮僕取自脱一時之利無顧趙氏社稷為萬世慮計之意乃與其弟将卒攻殺王王太后及漢使者遣人告蒼梧秦王及其諸郡縣立眀王長男越妻子術陽侯建德為王而韓千秋兵入破數小邑其後越直開道給食未至番禺四十里越以兵擊千秋等遂滅之使人函封漢使者節置塞上好為謾辭謝罪發兵守要害處春三月壬午天子聞南越反曰韓千秋雖無功亦軍鋒之冠封其子延年為成侯樛樂姊為王太后首願屬漢封其子廣德為龍亢侯夏四月赦天下丁丑晦日有食之秋遣伏波将軍路博德出桂陽下湟水樓船将軍楊僕出豫章下湞水歸義越侯嚴為戈船将軍出零陵下離水甲為下瀨将軍下蒼梧皆将罪人江淮以南樓船十萬人越馳義侯遺别将巴蜀罪人發夜郎兵下牂柯江咸會畨禺齊相卜式上書請父子與齊習船者往死南越天子下詔襃美式賜爵闗内侯金六十斤田十頃布告天下天下莫應是時列侯以百數皆莫求從軍擊越㑹九月嘗酎祭宗廟列侯以令獻金助祭少府省金金有輕及色惡者上皆令劾以不敬奪爵者百六人辛巳丞相趙周坐知列侯酎金輕下獄自殺丙申以御史大夫石慶爲丞相封牧丘侯時國家多事桑􅀪羊等致利王温舒之屬峻灋而兒寛等推文學皆爲九卿更進用事事不闗决於丞相丞相慶醇謹而已五利将軍装治行東入海求其師既而不敢入海之太山祠上使人隨驗實無所見五利妄言見其師其方盡多不售坐誣罔􅆎斬樂成矦亦弃市西羌衆十萬人反與匈奴通使攻故安圍枹罕匈奴入五原殺太守六年冬發卒十萬人遣将軍李息郎中令徐自為征西羌平之樓船将軍楊僕入越地先陷尋陿破石門挫越鋒以數萬人待伏波将軍路博德至俱進樓船居前至畨禺南越王建德相吕嘉城守樓船居東南面伏波居西北面會暮樓船攻敗越人縱火燒城伏波為營遣使者招降者賜印綬復縱令相招樓船力攻燒敵驅而入伏波營中黎旦城中皆降建德嘉已夜亡入海伏波遣人追之校尉司馬蘇􅀪得建德越郎都稽得嘉戈船下瀨将軍兵及馳義侯所發夜郎兵未下南越已平矣遂以其地為南海蒼梧鬰林合浦交趾九真日南珠厓儋耳九郡師還上益封伏波封樓船為将梁侯蘇􅀪為海常侯都稽為臨蔡侯及越降将蒼梧王趙光等四人皆為侯公孫卿􅀱神河南言見僊人跡緱氏城上春天子親幸緱氏城視跡問卿得毋效文成五利乎卿曰僊者非有求人主人主者求之其道非寛假神不來言神事如迂誕積以嵗月乃可致也上信之於是郡國各除道繕治宫觀名山神祠以望幸焉賽南越祠太一后土始用樂舞馳義侯發南夷兵欲以擊南越且蘭君恐逺行旁國虜其老弱乃與其衆反殺使者及犍為太守漢乃發巴蜀罪人當擊南越者八校尉遣中郎将郭昌衛廣将而擊之誅且蘭及卭君莋侯遂平南夷為䍧柯郡夜郎侯始倚南越南越已滅夜郎遂入朝上以為夜郎王冉駹皆振恐請臣置吏乃以卭都為越嶲郡莋都為沈黎郡冉駹為汶山郡廣漢西白馬為武都郡初東越王餘善上書請以卒八千人從樓船擊吕嘉兵至掲揚以海風波為解不行持兩端隂使南越及漢破畨禺不至楊僕上書願便引兵擊東越上以士卒勞倦不許令諸校屯豫章梅嶺以待命餘善聞樓船請誅之漢兵臨境乃遂反發兵距漢道號将軍騶力等為吞漢将軍入白沙武林梅嶺殺漢三校尉是時漢使大農張成故山州侯齒将屯弗敢擊却就便處皆坐畏懦誅餘善自稱武帝上欲復使楊僕将為其伐前勞以書敕責之曰将軍之功獨有先破石門尋陿非有斬将搴旗之實也烏足以驕人哉前破畨禺捕降者以為虜掘死人以為獲是一過也使建德吕嘉得以東越為援是二過也士卒暴露連嵗将軍不念其勤勞而請乘傳行塞因用歸家懐銀黄垂三組夸郷里是三過也失期内顧以道惡為解是四過也問君蜀刀價而陽不知挾偽干君是五過也受詔不至蘭池眀日又不對假令将軍之吏問之不對令之不從其罪何如推此心在外江海之間可得信乎今東越深入将軍能率衆以掩過不僕惶恐對曰願盡死贖罪上乃遣横海將軍韓􅀃出句章浮海從東方往樓船將軍楊僕出武林中尉王温舒出梅嶺以越矦爲戈船下瀬將軍出若邪白沙以擊東越博望矦既以通西域尊貴其吏士爭上書言外國竒怪利害求使天子爲其絶逺非人所樂往聽其言予節募吏民毋問所從來爲具僃人衆遣之以廣其道來還不能毋侵盗幣物及使失指天子爲其習之輒覆桉致重罪以激怒令贖復求使使端無窮而輕犯灋其吏卒亦輒復盛推外國所有言大者予節言小者爲副故妄言無行之徒皆争效之其使皆貧人子私縣官齎物欲賤市以私其利外國亦厭漢使人人有言輕重度漢兵逺不能至而禁其食物以苦漢使漢使乏絶積怨至相攻擊而樓蘭車師小國當空道攻漢使王恢等尤甚而匈奴竒兵又時遮擊之使者争言西域皆有城邑兵弱易擊於是天子遣浮沮将軍公孫賀将萬五千騎出九原二千餘里至浮沮井而還匈河将軍趙破奴将萬餘騎岀令居數千里至匈河水而還以斥逐匈奴不使遮漢使皆不見匈奴一人乃分武威酒泉地置張掖敦煌郡徙民以實之是嵗齊相卜式為御史大夫式既在位乃言郡國多不便縣官作鹽鐵苦惡價貴或彊令民買之而船有筭商者少物貴上由是不悦卜式初司馬相如病且死有遺書頌功德言符瑞勸上封泰山上感其言會得寳鼎上乃與公卿諸生議封禪封禪用希曠絶莫知其儀而諸方士又言封禪者合不死之名也黄帝以上封禪皆致怪物與神通秦皇帝不得上封陛下必欲上稍上即無風雨遂上封矣上於是乃令諸儒采尚書周官王制之文草封禪儀數年不成上以問左内史兒寛寛曰封泰山禪梁父昭姓考瑞帝王之盛節也然享薦之義不著于經臣以為封禪告成合袪於天地神祗唯聖王所由制定其當非羣臣之所能列今将舉大事優游數年使羣臣得人人自盡終莫能成唯天子建中和之極兼緫條貫金聲而玉振之以順成天慶垂萬世之基上乃自制儀頗采儒術以文之上為封禪祠器以示羣儒或曰不與古同於是盡罷諸儒不用上又以古者先振兵釋旅然后封禪元封元年冬十月下詔曰南越東甌咸伏其辜西蠻北夷頗未輯睦朕将廵邊垂躬秉武節置十二部将軍親帥師焉乃行自雲陽北歴上郡西河五原出長城北登單于臺至朔方臨北河勒兵十八萬騎旌旗徑千餘里以見武節威匈奴遣使者郭吉告單于曰南越王頭已縣於漢北闕今單于能戰天子自将待邊不能即南面而臣於漢何徒逺走亡匿於幕北寒苦無水草之地毋爲也語卒而單于大怒立斬主客見者而留郭吉遷之北海上然匈奴亦讋終不敢出上乃還祭黄帝冢橋山釋兵須如上曰吾聞黄帝不死今有冢何也公孫卿曰黄帝已僊上天羣臣思慕葬其衣冠上歎曰吾後升天羣臣亦當葬吾衣冠於東陵乎乃還甘泉類祠太一上以卜式不習文章貶秩為太子太傅以兒寛代為御史大夫漢兵入東越境東越素發兵距險使徇北将軍守武林樓船将軍卒錢唐轅終古斬徇北将軍故越衍侯吳陽以其邑七百人反攻越軍於漢陽越建成侯敖與繇王居股殺餘善以其衆降上封終古為禦兒侯陽為卯石侯居股為東成侯敖為開陵侯又封横海将軍説為按道侯横海校尉福為繚嫈侯東越降将多軍為無錫矦上以閩地險阻數反覆終為後世患乃詔諸将悉徙其民於江淮之間遂虛其地春正月上行幸緱氏禮祭中嶽太室從官在山下聞若有言萬嵗者三詔祠官加贈太室祠禁無伐其草木以山下户三百為之奉邑上遂東廵海上行禮祠八神齊人之上䟽言神怪竒方者以萬數乃益發船令言海中神山者數千人求蓬萊神人公孫卿持節常先行􅀱名山至東萊言夜見大人長數丈就之則不見其迹甚大類禽獸云羣臣有言見一老父牽狗言吾欲見鉅公已忽不見上既見大迹未信及羣臣又言老父則大以為僊人也宿留海上與方士傳車及間使求神僊人以千數夏四月還至奉髙禮祠地主於梁父乙卯令侍中儒者皮弁搢紳射牛行事封泰山下東方如郊祠泰一之禮封廣丈二尺髙九尺其下則有玉牒書書祕禮畢天子獨與侍中奉車都尉霍子侯上泰山亦有封其事皆禁眀日下隂道丙辰禪泰山下阯東北肅然山如祭后土禮天子皆親拜見衣上黄而盡用樂焉江淮間茅三脊為神藉五色土益雜封其封禪祠夜若有光晝有白雲出封中天子從禪還坐眀堂羣臣更上夀頌功德詔曰朕以眇身承至尊兢兢焉惟德菲薄不眀于禮樂故用事八神遭天地况施著見景象屑然如有聞震于怪物欲止不敢遂登封泰山至于梁父然後升壇肅然自新嘉與士大夫更始其以十月為元封元年行所廵至博奉髙蛇丘歴城梁父民田租逋賦皆貸除之無出今年筭賜天下民爵一級又以五載一廵狩用事泰山令諸矦各治邸泰山下天子既已封泰山無風雨而方士更言蓬萊諸神若将可得於是上欣然庶㡬遇之復東至海上望焉上欲自浮海求蓬萊羣臣諌莫能止東方朔曰夫僊者得之自然不必躁求若其有道不憂不得若其無道雖至蓬萊見僊人亦無益也臣願陛下第還宫静處以須之僊人将自至上乃止會奉車霍子矦暴病一日死子矦去病子也上甚悼之乃遂去並海上北至碣石廵自遼西歴北邊至九原五月乃至甘泉凡周行萬八千里云先是桑􅀪羊為治粟都尉領太農盡管天下鹽鐵􅀪羊作平凖之灋令逺方各以其物如異時商賈所轉販者為賦而相灌輸置平凖于京師都受天下委輸大農諸官盡籠天下之貨物貴即賣之賤則買之欲使富商大賈無所牟大利而萬物不得騰踊至是天子廵狩郡縣所過賞賜用帛百餘萬匹錢金以巨萬計皆取足大農􅀪羊又請令吏得入粟補官及罪人贖罪山東漕粟益嵗六百萬石一嵗之中太倉甘泉倉滿邊餘榖諸物均輸帛五百萬匹民不益賦而天下用饒於是􅀪羊賜爵左庶長黄金再百斤焉是時小旱上令官求雨卜式言曰縣官當食租衣税而已今􅀪羊令吏坐市列肆販物求利烹􅀪羊天乃雨秋有星孛于東井後十餘日有星孛于三台望氣王朔言􅀱獨見填星出如瓜食頃復入有司皆曰陛下建漢家封禪天其報德星云齊懐王閎薨無子國除資治通鑑卷第二十
