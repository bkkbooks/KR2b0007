body:
  text: 臣司馬光奉勑編集晉紀三十七章閹茂凡二年起屠維作噩盡上安皇帝庚義熙五年春正月庚寅朔南燕主超朝會羣臣歎太樂不僃議掠晉人以補伎領軍將軍韓􅒲曰先帝以舊京傾覆戢翼三齊陛下不養士息民以伺魏釁恢復先業而更侵掠南鄰以廣讎敵可乎超曰我計巳定不與卿言辛卯大赦庚戌以劉毅爲衞將軍開府儀同三司毅愛才好士當丗名流莫不輻湊獨楊州主簿吴郡張邵不往或問之邵曰主公命丗人傑何煩多問秦王興遣其弟平北將軍沖征虜將軍狄伯支等帥􅀐四萬擊夏王勃勃沖至嶺北謀還襲長安伯支不從而止因酖殺伯支以滅口秦王興遣使册拜譙縱為大都督相國蜀王加九錫承制封拜悉如王者之儀二月南燕將慕容興宗斛榖提公孫歸等帥􅀐寇㝛豫拔之大掠而去簡男女二千五百付太樂教之歸五樓之兄也是時五樓爲侍中尚書領左衞將軍專揔朝政宗親並居顯要王公内外無不憚之南燕主超論㝛豫之功封斛榖提等並爲郡縣公桂林王鎮諌曰此數人者勤民頓兵爲國結怨何功而封超怒不荅尚書都令史王儼謟事五樓比嵗屢遷官至左丞國人爲之語曰欲得侯事五樓超又遣公孫歸等寇濟南俘男女千餘人而去自彭城以南民皆堡聚以自固詔并州刺史劉道憐鎮淮隂以備之乞伏熾磐入見秦太原公懿於上邽彭奚念乗虚伐之熾磐聞之怒不告懿而歸擊奚念破之遂圍枹罕乞伏乾歸從秦王興如平涼熾磐克枹罕遣人告乾歸乾歸逃還􅁐川馮翊人劉厥聚衆數千據萬年作亂秦太子泓遣鎮軍將軍彭白狼帥東宫禁兵討之斬厥赦其餘黨諸將請露布表言廣其首級泓不許曰主上委吾後事不能式遏寇逆當責躬請罪尚敢矜誕自爲功乎秦王興自平涼如朝那聞姚沖之謀賜沖死三月劉􅁉抗表伐南燕朝議皆以爲不可惟左僕射孟昶車􅀐司馬謝裕參軍臧熹以爲必克勸裕行􅁉以昶監中軍留府事謝􅁉安之兄孫也􅀄苻氏之敗也王猛之孫鎮惡來奔以爲臨澧令鎮惡􅀐乗非長􅀜􅃓甚弱而有謀略善果斷喜論軍國大事或薦鎮惡於劉􅁉􅁉與語說之因留㝛明旦謂參佐曰吾聞將門有將鎮惡信然即以爲中軍參軍􅁪山崩夏四月乞伏乾歸如枹罕留丗子熾磐鎮之收其衆得二萬徙都度堅山雷震魏天安殿東序魏主珪惡之命左校以衝車攻東西序皆毁之初珪服寒食散乆之藥發性多躁擾忿怒無常至是寖劇又災異數見占者多言當有急變生肘腋珪憂懣不安或數日不食或逹旦不寐追計平生成敗得失獨語不止疑羣臣左右皆不可信每百官奏事至前追記其舊惡輒殺之其餘或顔色變動或鼻息不調或步趨失節或言辭差繆皆以爲懷惡在心發形於外往往手擊殺之死者皆陳天安殿前朝廷人不自保百官苟免莫相督攝盗賊公行里巷之間人爲希少珪亦知之曰朕故縱之使然待過災年當更清治之耳是時羣臣畏罪多不敢求親近唯著作郎崔浩恭勤不懈或終日不歸浩吏部尚書宏之子也宏未甞忤旨亦不謟䛕故宏父子獨不被譴夏王勃勃帥􅀐二萬攻秦掠取平涼雜胡七千餘户進屯依力川己巳劉􅁉發建康帥舟師自淮入泗五月至下邳留船艦輜重步進至琅邪所過皆築城留兵守之或謂􅁉曰燕人若塞大峴之險或堅壁清野大軍深入不唯無功將不能自歸奈何裕曰吾慮之熟矣鮮卑貪婪不知逺計進利虜􅀗退惜禾苖謂我孤軍逺入不能持乆不過進據臨朐退守廣固必不能守險清野敢爲諸君保之南燕主超聞有晉師引羣臣㑹議征虜將軍公孫五樓曰吴兵輕果利在速戰不可爭鋒宐據大峴使不得入曠日延時沮其銳氣然後徐簡精􅀐二千循海而南絶其糧道别敕叚暉帥兖州之衆縁山東下腹背擊之此上策也各命守宰依險自固校其資儲之外餘悉焚蕩芟除禾苖使敵無所資彼僑軍無食求戰不得旬月之閒可以坐制此中策也縱賊入峴出城逆戰此下策也超曰今歳星居齊以天道推之不戰自克客主􅀔殊以人事言之彼逺来疲弊􅀔不能乆吾據五州之地擁富庶之民鐡􅀐萬羣麥禾布野柰何芟苖徙民先自蹙弱乎不如縱使入峴以精􅀐蹂之何憂不克輔國將軍廣寜王賀頼盧苦諌不從退謂五樓曰必若此亡無日矣太尉桂林王鎮曰陛下必以􅀐兵利平地者宐出峴逆戰戰而不勝猶可退守不宐縱敵入峴自棄險固也超不從鎮出謂韓􅒲曰主上既不能逆戰却敵又不肻徙民清野延敵入腹坐待攻圍酷似劉璋矣今年國滅吾必死之卿中華之士復爲文身矣超聞之大怒􅀵鎮下獄乃攝莒梁父二戍脩城隍簡士馬以待之劉􅁉過大峴燕兵不出􅁉舉手指天喜形于色左右曰公未見敵而先喜何也􅁉曰兵巳過險士有必死之志餘糧棲􅅿人無匱乏之憂虜巳入吾掌中矣六月巳巳􅁉至東莞超先遣公孫五樓賀頼盧及左將軍叚暉等將步􅀐五萬屯臨朐聞晉兵入峴自將步􅀐四萬往就之使五樓帥􅀐進據巨蔑水前鋒孟龍苻與戰破之五樓退走􅁉以車四千乗爲左右翼方軌徐進與燕兵戰於臨朐南日向昊勝負猶未決参軍胡藩言於􅁉曰燕悉兵出戰臨朐城中留守必寡願以竒兵從間道取其城此韓信所以破趙也裕遣藩及諮議參軍檀韶建威將軍河內向彌潛師出燕兵之後攻臨朐聲言輕兵自海道至矣向彌擐甲先登遂克之超大驚單􅀐就叚暉於城南􅁉因縱兵奮擊燕衆大敗斬叚暉等大將十餘人超遁還廣固獲其玉璽輦及豹尾􅁉乗勝逐北至廣固丙子克其大城超收衆入保小城􅁉築長圍守之圍髙三丈穿塹三重撫納降附采拔賢俊華夷大恱於是因齊地糧儲悉停江淮漕運超遣尚書郎張綱乞師於秦赦桂林王鎮以爲録尚書都督中外諸軍事引見謝之且問計焉鎮曰百姓之心係於一人今陛下親董六師奔敗而還羣臣離心士民喪氣聞秦人自有內患恐不暇分兵救人散卒還者尚有數萬宐悉出金帛以餌之更決一戰若天命助我必能破敵如其不然死亦爲美比於閉門待盡不猶愈乎司徒樂浪王恵曰不然晉兵乗勝氣􅀔百倍我以敗軍之卒當之不亦難乎秦雖與勃勃相持不足爲患且與我分據中原􅀔如脣齒安得不來相救但不遣大臣則不能得重兵尚書令韓範爲燕秦所重宐遣乞師超從之秋七月加劉􅁉北青冀二州刺史南燕尚書略陽垣尊及弟京兆太守苖踰城來降􅁉以爲行參軍尊苖皆超所委任以爲腹心者也或謂􅁉曰張綱有巧思若得綱使爲攻具廣固必可㧞也㑹綱自長安還太山太守申宣執之送於􅁉􅁉升綱於樓車使周城呼曰劉勃勃大破秦軍無兵相救城中莫不失色江南每發兵及遣使者至廣固裕輒潛遣兵夜迎之明日張旗鳴鼓而至北方之民執兵負糧歸􅁉者日以千數圍城益急張華封愷皆爲􅁉所獲超請割大峴以南地爲藩臣􅁉不許秦王興遣使謂􅁉曰慕容氏相與隣好今晉攻之急秦巳遣鐵􅀐十萬屯洛陽晉軍不還當長驅而進􅁉呼秦使者謂曰語汝姚興我克燕之後息兵三年當取􅀜洛今能自送便可速来劉穆之聞有秦使馳入見􅁉而秦使者巳去􅁉以所言告穆之穆之尤之曰常日事無大小必賜預謀此宐善詳云何遽爾荅之此語不足以威敵適足以怒之若廣固未下羗寇奄至不審何以待之􅁉笑曰此是兵機非卿所解故不相語耳夫兵貴神速彼若審能赴救必畏我知寧容先遣信命逆設此言是自張大之辭也晉師不出爲日乆矣羗見伐齊始將內懼自保不暇何能救人邪乞伏乾歸復即秦王位大赦攺元更始公卿以下皆復本位慕容氏在魏者百餘家謀逃去魏主珪盡殺之初魏太尉穆崇與衛王儀伏甲謀弑魏主珪不果珪惜崇儀之功袐而不問及珪有疾多殺大臣儀自疑而出亡追獲之八月賜儀死封融詣劉􅁉降九月加劉􅁉太尉􅁉固辭秦王興自將擊夏王勃勃至貳城遣安逺將軍姚詳等分督租運勃勃乗虚奄至興懼欲輕􅀐就詳等右僕射韋華曰若鑾輿一動衆心駭懼必不戰自潰詳營亦未必可至也興與勃勃戰秦兵大敗將軍姚榆生爲勃勃所禽左將軍姚文宗等力戰勃勃乃退興還長安勃勃復攻秦敕竒堡黄石固我羅城皆㧞之徙七千餘家於大城以其丞相右地代領幽州牧以鎮之初興遣衛將軍姚強帥步􅀐一萬隨韓範往就姚紹於洛陽并兵以救南燕及爲勃勃所敗追強兵還長安韓範歎曰天滅燕矣南燕尚書張俊自長安還降於劉􅁉因説􅁉曰燕人所恃者謂韓範必能致秦師也今得範以示之燕必降矣􅁉乃表範爲散􅀐常侍且以書招之長水校尉王蒲勸範奔秦範曰劉􅁉起布衣滅􅁊玄復晉室今興師伐燕所向崩潰此殆天授非人力也燕亡則秦爲之次矣吾不可以再辱遂降於􅁉􅁉將範循城城中人情離沮或勸燕主超誅範家超以範弟􅒲盡忠無貳并範家赦之冬十月叚宏自魏奔于裕張綱為裕造攻具盡諸竒巧超怒縣綱母於城上支解之西秦王乾歸立夫人邊氏爲王后丗子熾磐爲太子仍命熾磐都督中外諸軍録尚書事以屋引破光爲河州刺史鎮枹罕以南安焦遺爲太子太師與參軍國大謀乾歸曰焦生非特名儒乃王佐之才也謂熾磐曰汝事之當如事吾熾磐拜遺於牀下遺子華至孝乾歸欲以女妻之辭曰凡娶妻者欲與之共事二親也今以王姬之貴下嫁蓬茅之士誠非其匹臣懼其闕於中饋非所願也乾歸曰卿之所行古人之事孤女不足以強卿乃以爲尚書民部郎北燕王雲自以無功徳而居大位內懐危懼常畜養壯士以爲腹心爪牙寵臣離班桃仁專典禁衛賞賜以巨萬計衣食起居皆與之同而班仁志願無厭猶有怨憾戊辰雲臨東堂班仁懐劒執帋而入稱有所啟班抽劒擊雲雲以几扞之仁從旁擊雲弑之馮跋升洪光門以觀變帳下督張泰李桑言於跋曰此竪􅀔何所至請爲公斬之乃奮劒而下桑斬班于西門泰殺仁于庭中衆推跋爲主跋以讓其弟范陽公素弗素弗不可䟦乃即天王位於昌黎大赦詔曰陳氏代姜不攺齊國宐即國號曰燕攺元太平謚雲曰惠懿皇帝跋尊母張氏爲太后立妻孫氏爲王后子永爲太子以范陽公素弗爲車􅀐大將軍録尚書事孫護爲尚書令張興爲左僕射汲郡公弘爲右僕射廣川公萬􅅺爲幽平二州牧上谷公乳陳爲并青二州牧素弗少豪俠放蕩甞請㛰於尚書左丞韓業業拒之及爲宰輔待業尤厚好申拔舊門謙恭儉約以身帥下百僚憚之論者美其有宰相之度魏主珪將立齊王嗣爲太子魏故事凡立嗣子輒先殺其母乃賜嗣母劉貴人死珪召嗣諭之曰漢武帝殺鈎弋夫人以防母后預政外家爲亂也汝當繼統故吾逺迹古人爲國家長乆之計耳嗣性孝哀泣不自勝珪怒之嗣還舍日夜號泣珪知而復召之左右曰上怒甚入將不測不如且避之俟上怒解而入嗣乃逃匿於外帷帳下代人車路頭京兆王洛兒二人隨之初珪如賀蘭部見獻明賀太后之妹美言於賀太后請納之賀太后曰不可是過美必有不善且巳有夫不可奪也珪宻令人殺其夫而納之生清河王紹紹兇很無賴好輕遊里巷劫剥行人以爲樂珪怒之甞倒懸井中垂死乃出之齊王嗣屢誨責之紹由是與嗣不恊戊辰珪譴責賀夫人囚將殺之會日暮未決夫人密使告紹曰汝何以救我左右以珪殘忍人人危懼紹年十六夜與帳下及宦者宫人數人通謀踰垣入宫至天安殿左右呼曰賊至珪驚起求弓刀不獲遂弑之巳巳宫門至日中不開紹稱詔集百官於端門前北面立紹從門扉閒謂百官曰我有叔父亦有兄公卿欲從誰衆愕然失色莫有對者良乆南平公長孫嵩曰從王衆乃知宫車晏駕而不測其故莫敢出聲唯隂平公烈大哭而去烈儀之弟也於是朝野恟恟人懐異志肥如矦賀護舉烽於安陽城北賀蘭部人皆赴之其餘諸部亦各屯聚紹聞人情不安大出布帛賜王公已下崔宏獨不受齊王嗣聞變乃自外還晝伏匿山中夜宿王洛兒家洛兒鄰人李道潜奉給嗣民間頗知之喜而相告紹聞之收道斬之紹募人求訪嗣欲殺之獵郎叔孫俊與宗室踈屬拓䟦磨渾自云知嗣所在紹使帳下二人與之偕徃俊磨渾得出即執帳下詣嗣斬之俊建之子也王洛兒爲嗣徃來平城通問大臣夜告安逺將軍安同等衆聞之翕然響應爭出奉迎嗣至城西衛士執紹送之嗣殺紹及其母賀氏并誅紹帳下及宦官宫人爲內應者十餘人其先犯乗輿者群臣臠食之壬申嗣即皇帝位大赦攺元永興追尊劉貴人曰宣穆皇后公卿先罷歸第不預朝政者悉召用之詔長孫嵩與北新矦安同山陽矦奚斤白馬矦崔宏元城矦拓跋屈等八人坐止車門右共聽朝政時人謂之八公屈磨渾之父也嗣以尚書燕鳯逮事什翼犍使與都坐大官封懿等入侍講論出議政事以王洛兒車路頭爲散􅀐常侍叔孫俊爲衛將軍拓䟦磨渾爲尚書皆賜爵郡縣公嗣問舊臣爲先帝所親信者爲誰王洛兒言李先嗣召問先卿以何才何功爲先帝所知對曰臣不才無功但以忠直爲先帝所知耳詔以先爲安東將軍常宿於内以備顧問朱提王恱䖍之子也有罪自疑懼閏十一月丁亥恱懐匕首入侍將作亂叔孫俊覺其舉止有異引手掣之索懷中得匕首遂殺之十二月乙巳太白犯虚危南燕靈臺令張光勸南燕主超出降超手殺之柔然侵魏六年春正月甲寅朔南燕主超登天門朝羣臣於城上乙卯超與寵姬魏夫人登城見􅀳兵之盛握手對泣韓􅒲諫曰陛下遭堙厄之運正當努力自強以壯士民之志而更爲兒女子泣邪超拭目謝之尚書令董銑勸超降超怒囚之魏長孫嵩將兵伐柔然魏主嗣以郡縣豪右多爲民患悉以優詔徴之民戀土不樂内徙長吏逼遣之於是無賴少年逃亡相聚所在寇盜羣起嗣引八公議之曰朕欲爲民除蠧而守宰不能綏撫使之紛亂今犯者既衆不可盡誅吾欲大赦以安之何如元城矦屈曰民逃亡爲盜不罪而赦之是爲上者反求於下也不如誅其首惡赦其餘黨崔宏曰聖王之御民務在安之而巳不與之較勝負也夫赦雖非正可以行權屈欲先誅後赦要爲兩不能去曷若一赦而遂定乎赦而不從誅未晩也嗣從之二月癸未朔遣將軍于栗磾將􅀐一萬討不從命者所向皆平南燕賀賴盧公孫五樓為地道出擊晉兵不能却城乆閉城中男女病脚弱者太半出降者相繼超輦而登城尚書恱壽說超曰今天助寇爲虐戰士彫瘁獨守窮城絶望外援天時人事亦可知矣苟厯數有終堯舜避位陛下豈可不思變通之計乎超歎曰廢興命也吾寜奮劒而死不能衘璧而生丁亥劉裕悉衆攻城或曰今日徃亡不利行師􅁉曰我徃彼亡何爲不利四面急攻之恱壽開門納􅀳師超與左右數十􅀐踰城突圍出走追獲之裕數以不降之罪超神色自若一無所言惟以母託劉敬宣而巳􅁉忿廣固乆不下欲盡阮之以妻女賞將士韓範諌曰􅀳室南遷中原鼎沸士民無援強則附之既爲君臣必須爲之盡力彼皆衣冠舊族先帝遺民今王師弔伐而盡阮之使安所歸乎竊恐西北之人無復來蘇之望矣􅁉攺容謝之然猶斬王公以下三千人没入家口萬餘夷其城隍送超詣建康斬之臣光曰晉自濟江以來威靈不競戎狄横騖虎噬中原劉􅁉始以王師翦平東夏不於此時旌禮賢俊慰撫疲民宣愷悌之風滌殘穢之政使羣士嚮風遺黎企踵而更恣行屠戮以快忿心迹其施設曾符姚之不如宐其不能蕩壹四海成美大之業豈非雖有智勇而無仁義使之然哉初徐道覆聞劉􅁉北伐勸盧循乗虚襲建康循不從道覆自至番禺説循曰本住嶺外豈以理極於此傳之子孫邪正以劉􅁉難與爲敵故也今裕頓兵堅城之下未有還期我以此思歸死士掩擊何劉之徒如反掌耳不乗此機而苟求一日之安朝廷常以君爲腹心之疾若􅁉平齊之後息甲歳餘以璽書徴君􅁉自將屯豫章遣諸將帥鋭師過嶺雖復以將軍之神武恐必不能當也今日之機萬不可失若先克建康傾其根蔕􅁉雖南還無能爲也君若不同便當帥始興之衆直指尋陽循甚不樂此舉而無以奪其計乃從之初道覆使人伐船材於南康山至始興賤賣之居人爭市之舡材大積而人不疑至是悉取以裝艦旬日而辦循自始興寇長沙道覆寇南康廬陵豫章諸守相皆委任奔走道覆順流而下舟械甚盛時克燕之問未至朝廷急徴劉􅁉􅁉方議留鎮下邳經營司雍會得詔書乃以韓範爲都督八郡軍事燕郡太守封融爲勃海太守檀韶爲琅邪太守戊申引兵還韶祗之兄也乆之劉穆之稱範融謀反皆殺之安成忠肅公何無忌自尋陽引兵拒盧循長史鄧潜之諌曰國家安危在此一舉聞循兵艦大盛埶居上流宐決南塘守二城以待之彼必不敢捨我逺下蓄力養鋭俟其疲老然後擊之此萬全之䇿也今決成敗於一戰萬一失利悔將無及參軍殷闡曰循所將之衆皆三吴舊賊百戰餘勇始興溪子拳捷善􅃲未易輕也將軍宐留屯豫章徴兵屬城兵至合戰未爲晚也若以此衆輕進殆必有悔無忌不聴三月壬申與徐道覆遇於豫章賊令彊弩數百登西岸小山邀射之㑹西風暴急飄無忌所乗小艦向東岸賊乗風以大艦逼之衆遂奔潰無忌厲聲曰取我蘇武節來節至執以督戰賊衆雲集無忌辭色無撓握節而死於是中外震駭朝議欲奉乗輿北走就劉􅁉既而知賊未至乃止西秦王乾歸攻秦金城郡㧞之夏王勃勃遣尚書胡金纂攻平涼秦王興救平涼擊金纂殺之勃勃又遣兄子左將軍羅提攻拔定陽阮將士四千餘人秦將曹熾曹雲王肆佛等各將數千戸內徙興處之湟山及陳倉勃勃寇隴右破白崖堡遂趣清水略陽太守姚壽都棄城走勃勃徙其民萬六千戸於大城興自安定追之至壽渠川不及而還初南涼王傉檀遣左將軍枯木等伐沮渠蒙遜掠臨松千餘戸而還蒙遜伐南涼至顯美徙數千戸而去南涼太尉俱延復伐蒙遜大敗而歸是月傉檀自將五萬􅀐伐蒙遜戰于窮泉傉檀大敗單馬奔還蒙遜乗勝進圍姑臧姑臧人懲王鍾之誅皆驚潰夷夏萬餘户降于蒙遜傉檀懼遣司隷校尉敬歸及子佗爲質於蒙遜以請和蒙遜許之歸至胡阮逃還佗爲追兵所執蒙遜徙其衆八千餘戸而去右衞將軍折掘竒鎮據石驢山以叛傉檀畏蒙遜之逼且懼嶺南爲竒鎮所據乃遷于樂都留大司農成公緒守姑臧傉檀纔出城魏安人矦諶等閉門作亂收合三千餘家據南城推焦朗爲大都督龍驤大將軍諶自稱涼州刺史降于蒙遜劉􅁉至下邳以船載輜重自帥精鋭步歸至山陽聞何無忌敗死慮京邑失守卷甲兼行與數十人至淮上問行人以朝廷消息行人曰賊尚未至劉公若還便無所憂􅁉大喜將濟江風急衆咸難之裕曰若天命助國風當自息若其不然覆溺何害即命登舟舟移而風止過江至京口衆乃大安夏四月癸未􅁉至建康以江州覆没表送章綬詔不許青州刺史諸葛長民兖州刺史劉藩并州刺史劉道潾各將兵入衛建康藩豫州剌史毅之従弟也毅聞盧循入冦將拒之而疾作既瘳將行劉􅁉遺毅書曰吾徃習擊妖賊曉其變態賊新􅀗姦利其鋒不可輕今脩船垂畢當與弟同舉克平之日上流之任皆以相委又遣劉藩徃諭止之毅怒謂藩曰徃以一時之功相推耳汝便謂我真不及劉􅁉邪投書於地帥舟師二萬發姑孰循之初入寇也使徐道覆向尋陽循自將攻湘中諸郡荆州刺史劉道規遣軍逆戰敗於長沙循進至巴陵將向江陵徐道覆聞毅將至馳使報循曰毅兵甚盛成敗之事係之於此宐并力摧之若此克捷江陵不足憂也循即日發巴陵與道覆合兵而下五月戊午毅與循戰于桑落洲毅兵大敗棄船以數百人步走餘衆皆爲循所虜所棄輜重山積初循至尋陽聞􅁉巳還猶不信既破毅乃得審問與其黨相視失色循欲退還尋陽攻取江陵據二州以抗朝廷道覆謂宜乗勝徑進固爭之循猶豫累日乃從之巳未大赦􅁉募人爲兵賞之同京口赴義之科發民治石頭城議者謂宐分兵守諸津要􅁉曰賊衆我寡若分兵屯守則測人虚實且一處失利則沮三軍之心今聚衆石頭隨宐應赴既令彼無以測多少又於衆力不分若徒旅轉集徐更論之耳朝廷聞劉毅敗人情恟懼時北師始還將士多創病建康戰士不盈數千循既克二鎮戰士十餘萬舟車百里不絶樓船髙十二丈敗還者爭言其彊盛孟昶諸葛長民欲奉乗輿過江􅁉不聽初何無忌劉毅之南討也昶策其必敗巳而果然至是又謂􅁉必不能抗循衆頗信之爲龍驤將軍東海虞丘進廷折昶等以爲不然中兵參軍王仲徳言於􅁉曰明公命丗作輔新建大功威震六合妖賊乗虚入寇既聞凱還自當奔潰若先自遁逃則埶同匹夫匹夫號令何以威物此謀若立請從此辭􅁉甚恱昶固請不巳􅁉曰今重鎮外傾彊寇内逼人情危駭莫有固志若一旦遷動便自土崩瓦解江北亦豈可得至設令得至不過延日月耳今兵士雖少自足一戰若其克濟則臣主同休苟厄運必至我當横尸廟門遂其由來以身許國之志不能􅇡伏草間苟求存活也我計決矣卿勿復言昶恚其言不行旦以爲必敗因請死􅁉怒曰卿且申一戰死復何晚昶知􅁉終不用其言乃抗表自陳曰臣􅁉北討衆並不同唯臣贊􅁉行計致使彊賊乗閒社稷危逼臣之罪也謹引咎以謝天下封表畢仰藥而死乙丑盧循至淮口中外戒嚴琅邪王徳文都督宫城詣軍事屯中堂皇劉􅁉屯石頭諸將各有屯守􅁉子義隆始四歳􅁉使諮議參軍劉粹輔之鎮京口粹毅之族弟也􅁉見民臨水望賊怪之以問參軍張劭劭曰若節鉞未反民奔散之不暇亦何能觀望今當無復恐耳􅁉謂將佐曰賊若於新亭直進其鋒不可當宐且迴避勝負之事未可量也若廻泊西岸此成禽耳徐道覆請於新亭至白石焚舟而上數道攻􅁉循欲以萬全爲計謂道覆曰大軍未至孟昶便望風自裁以大􅀔言之自當計日潰亂今決勝負於一朝乾没求利既非必克之道且殺傷士卒不如案兵待之道覆以循多疑少決乃歎曰我終爲盧公所誤事必無成使我得爲英雄驅馳天下不足定也􅁉登石頭城望循軍初見引向新亭顧左右失色既而迴泊蔡洲乃恱於是衆軍轉集􅁉恐循侵軼用虞丘進計伐樹柵石頭淮口脩治越城築查浦藥園廷尉三壘皆以兵守之劉毅經涉蠻晉僅能自免從者飢疲死亡什七八丙寅至建康待罪􅁉慰勉之使知中外留事毅乞自貶詔降爲後將軍魏長孫嵩至漠北而還柔然追圍之於牛川壬申魏主嗣北擊柔然柔然可汗社崘聞之遁走道死其子度㧞尚幼部衆立社崘弟斛律號藹苦蓋可汗嗣引兵還参合陂盧循伏兵南岸使老弱乗舟向白石聲言悉衆自白石步上劉􅁉留參軍沈林子徐赤特戍南岸斷查浦戒令堅守勿動􅁉及劉毅諸葛長民北出拒之林子曰妖賊此言未必有實宐深爲之防􅁉曰石頭城險且淮柵甚固留卿在後足以守之林子穆夫之子也庚辰盧循焚查浦進至張矦橋徐赤特將擊之林子曰賊聲徃白石而屢來挑戰其情可知吾衆寡不敵不如守險以待大軍赤特不從遂出戰伏兵發赤特大敗單舸奔淮北林子及將軍劉鍾據柵力戰朱齡石救之賊乃退循引精兵大上至丹陽郡􅁉帥諸軍馳還石頭斬徐赤特解甲乆之乃出陳於南塘六月以劉􅁉爲太尉中書監加黄􅃏􅁉受黄􅃏餘固辭以車􅀐中軍司馬􅁃恱爲江州刺史恱準之子也司馬國璠及弟叔璠叔道奔秦秦王興曰劉􅁉方誅􅁊玄輔晉室卿何爲來對曰􅁉削弱王室臣宗族有自脩立者􅁉輒除之方爲國患甚於􅁊􅀇耳興以國璠爲楊州刺史叔道爲交州刺史盧循寇掠諸縣無所得謂徐道覆曰師老矣不如還尋陽并力取荆州據天下三分之二徐更與建康爭衡耳秋七月庚申循自蔡洲南還尋陽留其黨范崇民將五千人據南陵甲子􅁉使輔國將軍王仲徳廣川太守劉鍾河間內史蘭陵蒯恩中軍諮議參軍孟懐玉等帥衆追循乙丑魏主嗣還平城西秦王乾歸討越質屈機等十餘部降其衆二萬五千徙於􅁐川八月乾歸復都􅁐川沮渠蒙遜伐西涼敗西涼世子歆于馬廟禽其將朱元虎而還涼公暠以銀二千斤金二千兩贖元虎蒙遜歸之遂與暠結盟而還劉􅁉還東府大治水軍遣建威將軍㑹稽孫處振武將軍沈田子帥衆三千自海道襲番禺田子林子之兄也衆皆以爲海道艱逺必至爲難且分撤見力非目前之急􅁉不從敇處曰大軍十二月之交必破妖虜卿至時先傾其巢窟使彼走無所歸也譙縱遣侍中譙良等入見於秦請兵以伐晉縱以􅁊謙爲荆州刺史譙道福爲梁州刺史帥衆二萬冦荆州秦主興遣前將軍苟林帥􅀐兵會之江陵自盧循東下不得建康之問羣盜互起荆州刺史劉道規遣司馬王鎮之帥天門太守檀道濟廣武將軍彭城到彦之入援建康道濟祗之弟也鎮之至尋陽爲苟林所破盧循聞之以林爲􅀯蠻校尉分兵配之使乗勝伐江陵聲言徐道覆巳克建康􅁊謙於道召募義舊民投之者二萬人謙屯枝江林屯江津二寇交逼江陵士民多懐異心道規乃㑹將士告之曰􅁊謙今在近道聞諸長者頗有去就之計吾東來文武足以濟事若欲去者本不相禁因夜開城門逹曉不閉衆咸憚服莫有去者雍州刺史魯宗之帥衆數千自襄陽赴江陵或謂宗之情未可測道規單馬迎之宗之感恱道規使宗之居守委以腹心自帥諸軍攻謙諸將佐皆曰今逺出討謙其勝難必苟林近在江津伺人動静若來攻城宗之未必能固脱有蹉跌大事去矣道規曰苟林愚懦無他竒計以吾去未逺必不敢向城吾今取謙徃至便克沈疑之閒巳自還返謙敗則林破膽豈暇得來且宗之獨守何爲不支數日乃馳徃攻謙水陸齊進謙等大陳舟師兼以步􅀐戰於枝江檀道濟先進䧟陳謙等大敗謙單舸奔苟林道規追斬之還至涌口討林林走道規遣諮議參軍臨淮劉遵帥衆追之初謙至枝江江陵士民皆與謙書言城內虚實欲爲內應至是檢得之道規悉焚不視衆於是大安江州刺史􅁃恱以鄱陽太守虞丘進爲前驅屢破盧循兵進據豫章絶循糧道九月劉遵斬苟林于巴陵􅁊石綏因循入寇起兵洛口自號荆州刺史徴陽令王天恩自號梁州刺史襲據西城梁州刺史􅀓詔遣其子魏興太守弘之討石綏等皆斬之􅁊氏遂滅韶暢之孫也西秦王乾歸攻秦略陽南安隴西諸郡皆克之徙民二萬五千戸於􅁐川及枹罕甲寅葬魏主珪於盛樂金陵謚曰宣武廟號烈祖劉毅固求追討盧循長史王誕密言於劉􅁉曰毅既喪敗不宐復使立功􅁉從之冬十月􅁉帥兖州刺史劉藩寧朔將軍檀韶冠軍將軍劉敬宣等南擊盧循以劉毅監太尉留府後事皆委焉癸巳􅁉發建康徐道覆帥衆三萬趣江陵奄至破冢時魯宗之巳還襄陽追召不及人情大震或傳循巳平京邑遣道覆来爲刺史江漢士民感劉道規焚書之恩無復貳志道規使劉遵别爲遊軍自拒道覆於豫章口前驅失利遵自外横擊大破之斬首萬餘級赴水死者殆盡道覆單舸走還湓口初道規使遵爲遊軍衆咸以爲彊敵在前唯患衆少不應分割見力置無用之地及破道覆卒得遊軍之力衆心乃服鮮卑僕渾羌句豈輸報鄧若等帥戸二萬降于西秦王仲徳等聞劉􅁉大軍且至進攻范崇民於南陵崇民戰艦夾屯兩岸十一月劉鍾自行覘賊天霧賊鉤得其舸鍾因帥左右攻艦戸賊遽閉戸拒之鍾乃徐還與仲德共攻崇民崇民走癸丑益州刺史鮑陋卒譙道福陷巴東殺守將温祚時延祖盧循兵守廣州者不以海道爲虞庚戌孫處乘海奄至會大霧四面攻之即日拔其城處撫其舊民戮循親黨勒兵謹守分遣沈田子等擊嶺表諸郡劉􅁉軍雷池盧循楊聲不攻雷池當乗流徑下􅁉知其欲戰十二月己卯進軍大雷庚辰盧循徐道覆帥衆數萬塞江而下前後莫見舳艫之際􅁉悉出輕艦帥衆軍齊力擊之又分步􅀐屯於西岸先僃火具􅁉以勁弩射循軍因風水之􅀔以蹙之循艦悉泊西岸岸上軍投火焚之烟炎漲天循兵大敗走還尋陽將趣豫章乃悉力柵斷左里丙申􅁉軍至左里不得進􅁉麾兵將戰所埶麾竿折幡沈于水衆並怪懼􅁉笑曰往年覆舟之戰幡竿亦折今者復然賊必破矣即攻柵而進循兵雖殊死戰弗能禁循單舸走所殺及投水死者凡萬餘人納其降附宥其逼略遣劉藩孟懐玉輕軍追之循收散卒尚有數千人徑還番禺道覆走保始興􅁉板建威將軍禇􅁉之行廣州刺史􅁉之裒之曾孫也􅁉還建康劉毅惡劉穆之每從容與􅁉言穆之權太重􅁉益親任之燕廣川公萬􅅺上谷公乳陳自以宗室有大功謂當入爲公輔燕王跋以二藩任重乆而弗徴二人皆怨是歳乳陳密遣人告萬􅅺曰乳陳有至謀願與叔父圖之萬􅅺遂奔白狼與乳陳俱叛䟦遣汲郡公弘與張興將步􅀐二萬討之􅀪先遣使諭以禍福萬􅅺欲降乳陳不可興謂􅀪曰賊明日出戰今夜必來驚我營宐爲之僃􅀪乃密嚴人課草十束畜火伏兵以待之是夜乳陳果遣壯士千餘人來斫營衆火俱起伏兵邀擊俘斬無遺萬􅅺乳陳懼而出降􅀪皆斬之跋以范陽公素弗爲大司馬攺封遼西公􅀪爲驃􅀐大將軍攺封中山公資治通鑑卷第一百一十五
