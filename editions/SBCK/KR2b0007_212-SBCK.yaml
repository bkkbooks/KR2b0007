front:
  text: 資治通鑑卷第二百一十二
  hash: sha256:fcce1b9be1da4dffe3526aa4d0aa86df141f78a7c653b60ecc13bb648eab624f
body:
  text: 勑編集唐紀二十八䝉赤奮若凡八年起著雍敦牂盡㫋玄宗至道大聖大明孝皇帝上之下開元六年春正月辛丑突厥毗伽可汗來請和許之廣州吏民爲宋璟立遺愛碑璟上言臣在州無它異迹今以臣光寵成彼謟䛕欲革此風望自臣始請敕下禁止上從之於是它州皆不敢立辛酉敕禁惡錢重二銖四分以上乃得行歛人間惡錢鎔之更鑄如式錢於是京城紛然賣買殆絶宋璟蘇頲請出太府錢二萬緡置南北市以平價買百姓不售之物可充官用者及聽兩京百官豫假俸錢庶使良錢流布人閒從之二月戊子移蔚州横野軍於山北屯兵三萬爲九姓之援以拔曳固都督頡質略同羅都督毗伽末啜霫都督比言回紇都督夷健頡利發僕固都督曵勒歌等各出􅀐兵爲前後左右軍討擊大使皆受天兵軍節度有所討捕量宜追集無事各歸部落營生仍常加存撫三月乙巳徴嵩山處士盧鴻入見拜諫議大夫鴻固辭天兵軍使張嘉貞入朝有告其在軍奢僭及贓賄者按驗無狀上欲反坐吿者嘉貞奏曰今若罪之恐塞言路使天下之事無由上逹願特赦之其人遂得減死上由是以嘉貞爲忠有大用之意有薦山人范知璿文學者并獻其所爲文宋璟判之曰觀其良宰論頗渉佞䛕山人當極言讜議豈宜偷合苟容文章若髙自宜從選舉求試不可别奏夏四月戊子河南參軍鄭銑朱陽丞郭仙舟投匭獻詩敕曰觀其文理乃崇道法至於時用不切事情宜各從所好並罷官度爲道士五月辛亥以突􅀐施都督蘇禄爲左羽林大將軍順國公充金方道經略大使契丹王李失活卒癸巳以其弟娑固代之秋八月頒鄕飲酒禮於州縣令毎歳十二月行之唐初州縣官俸皆令富戸掌錢出息以給之息至倍稱多破産者祕書少監崔􅃆上言請計州縣官所得俸於百姓常賦之外微有所加以給之從之冬十一月辛卯車駕至西京戊辰􅄍蕃奉表請和乞舅甥親署誓文又令彼此宰相皆著名於其上宋璟奏括州貟外司馬李邕儀州司馬鄭勉並有才略文詞但性多異端好是非改變若全引進則咎悔必至若長弃捐則才用可惜請除渝硤二州刺史又奏大理卿元行沖素稱才行初用之時實允僉議當事之後頗非稱職請復以爲左散􅀐常侍以李朝隱代之陸象先閑於政體寛不容非請以爲河南尹從之七年春二月俱密王那羅延康王烏勒伽安王篤薩波提皆上表言爲大食所侵掠乞兵救援敇太府及府縣出粟十萬石糶之以斂人間惡錢送少府銷毁三月乙卯以左武衛大將軍檢校内外閑廏使苑内營田使王毛仲行太僕卿毛仲嚴察有幹力萬􅀐功臣閑廏官吏皆憚之苑内所收常豐溢上以爲能故有寵雖有外第常居閑廏側内宅上或時不見則悄然若有所失宦官楊思勗髙力士皆畏避之渤海王大祚榮卒丙辰命其子武藝襲位夏四月壬午開府儀同三司祁公王仁皎薨其子駙馬都尉守一請用竇孝諶例築墳髙五丈一尺上許之宋璟蘇頲固爭以爲準令一品墳髙一丈九尺其陪陵者髙出三丈而已竇太尉墳議者頗譏其髙大當時無人極言其失豈可今日復踵而爲之昔太宗嫁女資送過於長公主魏徴進諫太宗旣用其言文德皇后亦賞之豈若韋庶人崇其父墳號曰酆陵以自􅄩其禍乎夫以后父之尊欲髙大其墳何足爲難而臣等再三進言者蓋欲成中宫之美耳況今日所爲當傳無窮永以爲法可不愼乎上悅曰朕每欲正身率下況於妻子何敢私之然此乃人所難言卿能固守典禮以成朕美垂法將來誠所望也賜璟頲帛四百匹五月己丑朔日有食之上素服以俟變徹樂減膳命中書門下察繫囚賑饑乏勸農功辛夘宋璟等奏曰陛下勤恤人隱此誠蒼生之福然臣聞日食修德月食修刑親君子逺小人絶女謁除讒慝所謂修德也君子恥言浮於行茍推至誠以行之不必數下制書也六月戊辰吐蕃復遣使請上親署誓文上不許曰昔嵗誓約已定茍信不由􅂨亟誓何益秋閏七月右補闕盧履冰上言禮父在爲母服周年則天皇后改服齊衰三年請復其舊上下其議左散􅀐常侍禇无量以履冰議爲是諸人爭論連年不決八月辛夘敕自今五服並依喪服傳文然士大夫議論猶不息行之各從其意无量歎曰聖人豈不知母恩之厚乎厭降之禮所以明尊卑異戎狄也俗情膚淺不知聖人之心一紊其制誰能正之九月甲寅徙宋王憲爲寧王上嘗從複道中見衛士食畢弃餘食於竇中怒欲杖殺之左右莫敢言憲從容諫曰陛下從複道中窺人過失而殺之臣恐人人不自安且陛下惡弃食於地者爲食可以養人也今以餘食殺人無乃失其本乎上大悟蹶然起曰微兄幾至濫刑遽釋衛士是日上宴飲極歡自解紅玉帶并所乗馬以賜憲冬十月辛夘上幸驪山温湯癸夘還宫壬子冊拜突􅀐施蘇禄爲忠順可汗十一月壬申契丹王李娑固與公主入朝上以􅄮山令王仁琛藩邸故吏墨敇令與五品官宋璟奏故舊恩私則有大例除官資歷非無公道仁琛曏縁舊恩已獲優改今若再䝉超􅅄遂於諸人不類又是后族須杜輿言乞下吏部檢勘茍無負犯於格應留請依資稍優注擬從之選人宋元超於吏部自言侍中璟之叔父兾得饒假璟聞之牒吏部云元超璟之三從叔常在洛城不多參見旣不敢縁尊輒隱又不願以私害公向者無言自依大例旣有聲聽事須矯枉請放寧王憲奏選人薛嗣先請授微官事下中書門下璟奏嗣先兩選齋郎雖非灼然應留以懿親之故固應微假官資在景龍年中常有墨敇處分謂之斜封自大明臨御兹事杜絶行一賞命一官必是縁功與才皆歷中書門下至公之道唯聖能行嗣先幸預姻戚不爲屈法許臣等商量望付吏部知不出正敇從之先是朝集使往往齎貨入京師及春將還多遷官宋璟奏一切勒還以革其弊是嵗置劒南節度使領益彭等二十五州八年春正月丙辰左散􅀐常侍禇无量卒辛酉命右散􅀐常侍元行沖整比羣書侍中宋璟疾負罪而妄訴不已者悉付御史臺治之謂中丞李謹度曰服不更訴者出之尚訴未巳者且繫由是人多怨者㑹天旱有魃優人作魃狀戯於上前問魃何爲出對曰奉相公處分又問何故魃曰負冤者三百餘人相公悉以繫獄抑之故魃不得不出上心以爲然時璟與中書侍郎同平章事蘇頲建議嚴禁惡錢江淮閒惡錢尤甚璟以監察御史蕭隱之充使括惡錢隱之嚴急煩擾怨嗟盈路上於是貶隱之官辛巳罷璟爲開府儀同三司頲爲禮部尚書以京兆尹源乾曜爲黄門侍郎并州長史張嘉貞爲中書侍郎並同平章事於是弛錢禁惡錢復行矣二月戊戍皇子敏卒追立爲懷王謚曰哀壬子敇以役莫重於軍府一爲衛士六十乃免宜促其歳限使百姓更迭爲之夏四月丙午遣使賜烏長王骨咄王俱位王冊命三國皆在大食之西大食欲誘之叛唐三國不從故襃之五月辛酉復置十道按察使丁卯以源乾曜爲侍中張嘉貞爲中書令乾曜上言形要之家多任京官使俊乂之士沈廢於外臣三子皆在京請出其二人上從之因下制稱乾曜之公命文武官効之於是出者百餘人張嘉貞吏事彊敏而剛躁自用中書舍人苖延嗣吕太一考功貟外郎貟嘉靜殿中侍御史崔訓皆嘉貞所引進常與之議政事四人頗招權時人語曰令公四俊苖吕崔貟六月􅗉榖漲溢漂溺幾二千人突厥降户僕固都督勺磨及􅎤跌部落散居受降城側朔方大使王晙言其隂引突厥謀䧟軍城密奏請誅之誘勺磨等宴於受降城伏兵悉殺之河曲降户殆盡拔曵固同羅諸部在大同横野軍之側者聞之皆忷懼秋并州長史天兵節度大使張說引二十騎持節即其部落慰撫之因宿其帳下副使李憲以虜情難信馳書止之􅀃復書曰吾肉非黄羊必不畏食血非野馬必不畏刺士見危致命此吾效死之秋也拔曳固同羅由是遂安冬十月辛巳上行幸長春宫壬午畋于下邽上禁約諸王不使與羣臣交結光禄少卿駙馬都尉裴虚已與􅄮王範遊宴仍􅀻挾䜟緯戊子流虚已於新州離其公主萬年尉劉庭􅄾太􅀄張諤數與範飲酒賦詩貶庭􅄾雅州司户諤山荏丞然待範如故謂左右曰吾兄弟自無間但趨競之徒彊相託附耳吾終不以此責兄弟也上嘗不豫薛王業妃弟内直郎韋賔與殿中監皇甫恂私議休咎事覺賔杖死恂貶錦州刺史業與妃惶懼待罪上降階執業手曰吾若有心猜兄弟者天地實殛之即與之宴飲仍慰諭妃令復位十一月乙卯上還京師辛未突厥宼甘凉等州敗河西節度使楊敬述掠契苾部落而去先是朔方大揔管王晙奏請西發拔悉密東發奚契丹期以今秋掩毗伽牙帳於稽落水上毗伽聞之大懼暾欲谷曰不足畏也拔悉密在北庭與奚契丹相去絶逺勢不相及朔方兵計亦不能來此必若能來俟其垂至徙牙帳北行三日唐兵食盡自去矣且拔悉密輕而好利得王晙之約必喜而先至晙與張嘉貞不相恱奏請多不相應必不敢出兵晙兵不出拔悉密獨至擊而取之勢甚易耳旣而拔悉密果發兵逼突厥牙帳而朔方及奚契丹兵不至拔悉密懼引退毗伽欲擊之暾欲谷曰此屬去家千里將死戰未可擊也不如以兵躡之去北庭二百里暾欲谷分兵閒道先圍北庭因縱兵擊抜悉密大破之拔悉密衆潰走趨北庭不得入盡爲突厥所虜暾欲谷引兵還出赤亭掠涼州羊馬楊敬述遣禆將盧公利判官元澄將兵邀擊之暾欲谷謂其衆曰吾乗勝而來敬述出兵破之必矣公利等至刪丹與暾欲谷遇唐兵大敗公利澄脱身走毗伽由是大振盡有黙啜之衆契丹牙官可突干驍勇得衆心李娑固猜畏欲去之是歲可突干舉兵擊娑固娑固敗奔營州營州都督許欽澹遣安東都䕶薛泰帥驍勇五百與奚王李大酺奉娑固以討之戰敗娑固李大酺皆爲可突干所殺生擒薛泰營州震恐許欽澹移軍入渝關可突干立娑固從父弟鬱干爲主遣使請罪上赦可突干之罪以鬱干為松漠都督以李大酺之弟魯蘇為饒樂都督九年春正月制削楊敬述官爵以白衣檢校凉州都督仍充諸使丙辰改蒲州爲河中府置中都官僚一準京兆河南丙寅上幸驪山温湯乙亥還宫監察御史宇文融上言天下户口逃移巧僞甚衆請加檢括融㢸之玄孫也源乾曜素愛其才賛成之二月乙酉敇有司議招集流移按詰巧僞之法以聞丙戌突厥毗伽復使來求和上賜書諭以曩昔國家與突厥和親華夷安逸甲兵休息國家買突厥羊馬突厥受國家繒帛彼此豐給自數十年來不復如舊正由黙啜無信口和心叛數出盗兵宼抄邊鄙人怨神怒隕身䘮元吉凶之驗皆可汗所見今復蹈前迹掩襲甘涼隨遣使人更來求好國家如天之覆如海之容但取來情不追往咎可汗果有誠心則共保遐福不然無煩使者徒爾往來若其侵邉亦有以待可汗其審圖之丁亥制州縣逃亡户口聽百日自首或於所在附籍或牒歸故鄉各從所欲過期不首即加檢括謫徙邉州公私敢容庇者抵罪以宇文融充使括逃移户口及籍外田所獲巧僞甚衆遷兵部員外郎兼侍御史融奏置勸農判官十人並攝御史分行天下其新附客户免六年賦調使者競爲刻急州縣承風勞擾百姓苦之陽翟尉皇甫憬上疏言其狀上方任融貶憬盈川尉州縣希旨務於獲多虚張其數或以實户爲客凡得户八十餘萬田亦稱是蘭也州胡康待賔誘諸降户同反夏四月攻䧟六胡州有衆七萬進逼夏州命朔方大揔管王晙隴右節度使郭知運共討之戊戌敕京官五品以上外官刺史四府上佐各舉縣令一人視其政善惡爲舉者賞罰以太僕卿王毛仲爲朔方道防禦討擊大使使與王晙及天兵軍節度大使張説相知討康待賔六月己夘罷中都復爲蒲州蒲州刺史陸象先政尚寛簡吏民有罪多曉諭遣之州録事言於象先曰明公不施箠撻何以示威象先曰人情不逺此屬豈不解吾言邪必欲箠撻以示威當從汝始録事慙而退象先嘗謂人曰天下本無事但庸人擾之耳茍清其源何憂不治秋七月巳酉王晙大破康待賔生擒之殺叛胡萬五千人辛酉集四夷酋長􅆎斬康待賔於西市先是叛胡濳與党項通謀攻銀城連谷據其倉􅁃張説將歩􅀐萬人出合河關掩擊大破之追至駱駝堰党項乃更與胡戰胡衆潰西走入鐵建山説安集党項使復其居業討擊使阿史那獻以党項翻覆請并誅之説曰王者之師當伐叛柔服豈可殺已降邪因奏置麟州以鎮撫党項餘衆九月乙巳朔日有食之康待賔之反也詔郭知運與王晙相知討之晙上言朔方兵自有餘力請敕知運還本軍未報知運已至由是與晙不恊晙所招降者知運復縱兵擊之虜以晙爲賣已由是復叛上以晙不能遂定羣胡丙午貶晙爲梓州刺史丁未梁文獻公姚崇薨遺令佛以淸淨慈悲爲本而愚者寫經造像兾以求福昔周齊分據天下周則毁經像而修甲兵齊則崇塔廟而弛刑政一朝合戰齊滅周興近者諸武諸韋造寺度人不可勝紀無救族誅汝曹勿效兒女子終身不寤追薦􅄀福道士見僧獲利效其所爲尤不可延之於家當永爲後法癸亥以張􅀃爲兵部尚書同中書門下三品冬十月河西隴右節度大使郭知運卒知運與同縣右衛副率王君㚟皆以驍勇善􅀐射著名西陲爲虜所憚時人謂之王郭㚟遂自知運麾下代爲河西隴右節度使判涼州都督十一月丙辰國子祭酒元行冲上羣書四録凡書四萬八千一百六十九卷庚午赦天下十二月乙酉上幸驪山温湯壬辰還宫是􅀊諸王爲都督刺史者悉召還京師新作蒲津橋鎔鐵爲牛以繫絙安州别駕劉子玄卒子玄即知幾也避上嫌名以字行著作郎呉兢撰則天實録言宋璟激張􅀃使證魏元忠事􅀃修史見之知兢所爲謬曰劉五殊不相借兢起對曰此乃兢所爲史草具在不可使明公枉怨死者同僚皆失色其後􅀃隂祈兢改數字兢終不許曰若徇公請則此史不爲直筆何以取信於後太史上言麟德曆浸踈日食屢不効上命僧一行更造新曆率府兵曹梁令瓉造黃道遊儀以測􅇋七政置朔方節度使領單于都護府夏鹽等六州定逺豐安二軍三受降城十年春正月丁巳上行幸東都以刑部尚書王志愔爲西京留守癸亥命有司収公廨錢以稅錢充百官俸乙丑收職田􅅿率給倉粟二斗二月戊寅上至東都夏四月己亥以張􅀃兼知朔方軍節度使五月伊汝水溢漂溺數千家閠月壬申張􅀃如朔方廵邊己丑以餘姚縣主女慕容氏爲燕郡公主妻契丹王鬱干六月丁巳博州河決命按察使蕭嵩等治之嵩梁明帝之孫也己巳制増太廟爲九室遷中宗主還太廟秋八月癸卯武彊令裴景仙坐贓五千匹事覺亡命上怒命集衆斬之大理卿李朝隱奏景仙贓皆乞取罪不至死又其曽祖寂有建義大功載初中以非罪破家惟景仙獨存今爲承嫡宜宥其死投之荒逺其辭略曰十代宥賢功實宜録一門絶祀情或可哀制令杖殺朝隱又奏曰生殺之柄人主得專輕重有條臣下當守今􅀂乞取得罪便處斬刑後有枉法當科欲加何辟所以爲國惜法期守律文非敢以法隨人曲矜仙命又曰若寂勲都弃仙罪特加則叔向之賢何足稱者若敖之鬼不其餒而上乃許之杖景仙一百流嶺南惡處安南賊帥梅叔焉等攻圍州縣遣驃􅀐將軍兼内侍楊思勗討之思勗募羣蠻子弟得兵十餘萬襲擊大破之斬叔焉積尸爲京觀而還初上之誅韋氏也王皇后頗預密謀及即位數年色衰愛弛武惠妃有寵隂懷傾奪之志后心不平時對上有不遜語上愈不悅密與秘書監姜皎謀以后無子廢之皎泄其言嗣滕王嶠后之妹夫也奏之上怒張嘉貞希旨構成其罪云皎妄談休咎甲戍杖皎六十流欽州弟吏部侍郎晦貶春州司馬親黨坐流死者數人皎卒於道己亥敕宗室外戚駙馬非至親母得往還其卜相占􅇋之人皆不得出入百官之家己夘夜左領軍兵曹權楚璧與其黨李齊損等作亂立楚璧兄子梁山爲光帝詐稱襄王之子擁左屯營兵數百人入宫城求留守王志愔不獲比曉屯營兵自潰斬楚璧等傳首東都志愔驚怖而薨楚璧懷恩之姪齊損㢠秀之子也壬午遣河南尹王怡如京師按問宣慰癸未吐蕃圍小勃律王没謹忙謹忙求救于北庭節度使張嵩曰勃律唐之西門勃律亡則西域皆爲吐蕃矣嵩乃遣䟽勒副使張思禮將蕃漢歩􅀐四千人救之晝夜倍道與謹忙合擊吐蕃大破之斬獲數萬自是累嵗吐蕃不敢犯邊王怡治權楚璧獄連逮甚衆乆之不決上乃以開府儀同三司宋璟爲西京留守璟至止誅同謀數人餘皆奏原之康待賔餘黨康願子反自稱可汗張􅀃發兵追討擒之其黨悉平徙河曲六州殘胡五萬餘口於許汝唐鄧仙豫等州空河南朔方千里之地先是縁邊戍兵常六十餘萬􅀃以時無疆宼奏罷二十餘萬使還農上以爲疑􅀃曰臣乆在疆場具知其情將帥茍以自衛及役使營私而已若禦敵制勝不必多擁冗卒以妨農務陛下若以爲疑臣請以闔門百口保之上乃從之初諸衛府兵自成丁從軍六十而免其家又不免雜徭浸以貧弱逃亡略盡百姓苦之張􅀃建議請召募壯士充宿衛不問色役優爲之制逋逃者必爭出應募上從之旬日得精兵十三萬分􅀠諸衛更畨上下兵農之分自此始矣冬十月癸丑復以乾元殿爲明堂甲寅上幸夀安興泰宫獵於上宜川庚申還宫上欲耀兵北邊丁夘以秦州都督張守潔等爲諸衛將軍十一月乙未初令宰相共食實封三百户前廣州都督裴伷先下獄上與宰相議其罪張嘉貞請杖之張􅀃曰臣聞刑不上大夫爲其近於君且所以養亷恥也故士可殺不可辱臣曏廵北邊聞杖姜皎於朝堂皎官登三品亦有微功有罪應死則死應流則流奈何輕加笞辱以皁􅀠待之姜皎事往不可復追伷先據狀當流豈可復蹈前失上深然之嘉貞不悅退謂􅀃曰何論事之深也􅀃曰宰相時來則爲之若國之大臣皆可笞辱但恐行及吾軰吾此言非爲伷先乃爲天下士君子也嘉貞無以應十二月庚子以十姓可汗阿史那懷道女爲交河公主嫁突􅀐施可汗蘇禄上將幸晉陽因還長安張􅀃言於上曰汾隂脽上有漢家后土祠其禮乆廢陛下宜因廵幸修之爲農祈榖上從之上女永穆公主將下嫁敕資送如太平公主故事僧一行諫曰武后惟太平一女故資送特厚卒以驕敗奈何爲法上遽止之十一年春正月己巳車駕自東都北廵庚辰至潞州給復五年辛夘至并州置北都以并州爲太原府刺史爲尹二月戊申還至晉州張􅀃與張嘉貞不平㑹嘉貞弟金吾將軍嘉祐贓發􅀃勸嘉貞素服待罪於外己酉左遷嘉貞幽州刺史壬子祭后土于汾隂乙卯貶平遥令王同慶爲贛尉坐廣爲儲偫煩擾百姓也癸亥以張􅀃兼中書令己巳罷天兵大武等軍以大同軍爲太原以北節度使領太原遼石嵐汾代忻朔蔚雲十州三月庚午車駕至京師夏四月甲子以吏部尚書王晙爲兵部尚書同中書門下三品五月己丑以王晙兼朔方軍節度大使廵河西隴右河東河北諸軍上置麗正書院聚文學之士祕書監徐堅太常博士㑹稽賀知章監察御史皷城趙冬䂀等或修書或侍講以張􅀃爲修書使以緫之有司供給優厚中書舎人洛陽陸堅以爲此屬無益於國徒爲糜費欲悉奏罷之張􅀃曰自古帝王於國家無事之時莫不崇宫室廣聲色今天子獨延禮文儒發揮典籍所益者大所損者微陸子之言何不逹也上聞之重􅀃而薄堅秋八月癸卯敇前令檢括逃人慮成煩擾天下大同宜各從所樂令所在州縣安集遂其生業戊申尊宣皇帝廟號獻祖光皇帝廟號懿祖祔于太廟九室先是吐谷渾畏吐蕃之彊附之者數年九月壬申帥衆詣沙州降河西節度使張敬忠撫納之冬十月丁酉上幸驪山作温泉宫甲寅還宫十一月禮儀使張􅀃等奏以髙祖配昊天上帝罷三祖並配之禮戊寅上祀南郊赦天下戊子命尚書左丞蕭嵩與京兆蒲同􅄮華州長官選府兵及白丁一十二萬謂之長從宿衛一年兩畨州縣毋得雜役使十二月甲午上幸鳯泉湯戊申還宫庚申兵部尚書同中書門下三品王晙坐黨引踈族貶蘄州刺史是歳張􅀃奏改政事堂曰中書門下列五房於其後分掌庶政初監察御史濮陽杜暹因按事至突􅀐施突􅀐施饋之金暹固辭左右曰君􅀉身異域不宜逆其情乃受之埋於幕下出境移牒令取之虜大驚度磧追之不及及安西都䕶闕或薦暹往使安西人服其清愼時暹自給事中居母憂十二年春三月甲子起暹爲安西副大都護磧西節度等使神龍初追復澤王上金官爵求得庶子義珣於嶺南紹其故封許王素節之子瓘利其爵邑與弟璆謀使人告義珣非上金子妄冒襲封復流嶺南以璆繼上金後爲嗣澤王至是玉眞公主表義珣實上金子爲瓘兄弟所擯夏四月庚子復立義珣爲嗣澤王削璆爵貶瓘鄂州别駕壬寅敕宗室旁繼爲嗣王者並令歸宗壬子命太史監南宫􅀃等於河南北平地測日晷及極星夏至日中立八尺之表同時􅇋之陽城晷長一尺四寸八分弱夜視北極出地髙三十四度十分度之四浚儀岳臺晷長一尺五寸微強極髙三十四度八分南至朗州晷長七寸七分極髙二十九度半北至蔚州晷長二尺二寸九分極髙四十度南北相距三千六百八十八里九十歩晷差一尺五寸三分極差十度半又南至交州晷出表南三寸三分八月海中南望老人星下衆星粲然皆古所未名大率去南極二十度以上皆見五月丁亥停諸道按察使六月壬辰制聽逃户自首闢所在閑田隨宜収稅毋得差科征役租庸一皆蠲免仍以兵部員外郎兼侍御史宇文融爲勸農使廵行州縣與吏民議定賦役上以山東旱命選臺閣名臣以補刺史壬午以黄門侍郎王丘中書侍郎長安崔􅃆禮部侍郎知制誥韓休等五人出爲刺史丘同皎之從父兄子休大敏之孫也初張􅀃引崔􅃆爲中書侍郎故事承宣制皆出宰相侍郎署位而已􅃆曰設官分職上下相維各申所見事乃無失侍郎令之貳也豈得拱黙而已由是遇事多所異同􅀃不恱故因是出之秋七月突厥可汗遣其臣哥解頡利發來求昏溪州蠻覃行璋反以監門衛大將軍楊思勗爲黔中道招討使將兵擊之癸亥思勗生擒行璋斬首三萬級而歸加思勗輔國大將軍俸禄防閤皆依品給赦行璋以爲洵水府别駕姜皎旣得罪王皇后愈憂畏不安然待下有恩故無隨而譖之者上猶豫不決者累歳后兄太子少保守一以后無子使僧明悟爲后祭南北斗剖霹靂木書天地字及上名合而佩之祝曰佩此有子當如則天皇后事覺己卯廢爲庶人移别室安置貶守一潭州别駕中路賜死户部尚書張嘉貞坐與守一交通貶台州刺史八月丙申突厥哥解頡利發還其國以其使者輕禮數不備未許昏己亥以宇文融爲御史中丞融乗驛周流天下事無大小諸州先牒上勸農使後申中書省司亦待融指撝然後處决時上將大攘四夷急於用度州縣畏融多張虛數凡得客户八十餘萬田亦稱是歳終増緍錢數百萬悉進入宫由是有寵議者多言煩擾不利百姓上令集百寮於尚書省議之公卿已下畏融恩勢皆不敢立異惟户部侍郎楊瑒獨抗議以爲括客免税不利居人徵籍外田税使百姓困弊所得不補所失未幾瑒出爲華州刺史壬寅以開府儀同三司宋璟爲西京留守冬十月丁酉謝䫻王特勒遣使入奏稱去年五月金城公主遣使詣箇失密國云欲走歸汝箇失密王從臣國王借兵共拒吐蕃王遣臣入取進止上以爲然賜帛遣之廢后王氏卒後宫思慕后不已上亦悔之十一月庚午上幸東都戊寅至東都辛巳司徒申王撝薨贈謚惠莊太子羣臣屢上表請封禪閏月丁卯制以明年十一月十日有事于泰山時張􅀃首建封禪之議而源乾曜不欲爲之由是與􅀃不平是歳契丹王李鬱干卒弟吐干襲位十三年春二月庚申以御史中丞宇文融兼户部侍郎制以所得客户税錢均充所在常平倉本又委使司與州縣議作勸農社使貧冨相恤耕耘以時乙亥更命長從􅀫衛之士曰彍􅀐分􅀠十二衛揔十二萬人爲六畨上自選諸司長官有聲望者大理卿源光裕尚書左丞楊承令兵部侍郎宼泚等十一人爲刺史命宰相諸王及諸司長官臺郎御史餞於洛濵供張甚盛賜以御膳太常具樂内坊歌妓上自書十韻詩命將軍髙力士賜之光裕乾曜之從孫也三月甲午太子嗣謙更名鴻徙郯王嗣直爲慶王更名潭陜王嗣昇爲忠王更名浚鄫王嗣眞爲棣王更名洽鄂王嗣初更名溳鄄王嗣玄爲榮王更名滉又立子涺爲光王濰爲儀王澐爲潁王澤爲永王清爲壽王洄爲延王沐爲盛王溢爲濟王丙申御史大夫程行湛奏周朝酷吏來俊臣等二十三人情狀尤重子孫請皆禁錮􅀓遊藝等四人差輕子孫不聽近任從之汾州刺史楊承令不欲外補意怏怏自言吾出守有由上聞之怒壬寅貶睦州别駕張􅀃草封禪儀獻之夏四月丙辰上與中書門下及禮官學士宴於集仙殿上曰仙者慿虚之論朕所不取賢者濟理之具朕今與卿曹合宴宜更名曰集賢殿其書院官五品以上爲學士六品以下爲直學士以張􅀃知院事右散􅀐常侍徐堅副之上欲以􅀃爲大學士􅀃固辭而止􅀃以大駕東廵恐突厥乗閒入宼議加兵守邊召兵部郎中裴光庭謀之光庭曰封禪者告成功也今將升中于天而戎狄是懼非所以昭盛德也􅀃曰然則若之何光庭曰四夷之中突厥爲大比屢求和親而朝廷羈縻未决許也今遣一使徵其大臣從封泰山彼必欣然承命突厥來則戎狄君長無不皆來可以偃旗卧鼔髙枕有餘矣􅀃曰善􅀃所不及即奏行之光庭行御之子也上遣中書直省袁振攝鴻臚卿諭旨於突厥小殺與闕特勒暾欲谷環坐帳中置酒謂振曰吐蕃狗種奚契丹本突厥奴也皆得尚主突厥前後求昏獨不許何也且吾亦知入蕃公主皆非天子女今豈問真偽但屢請不獲愧見諸蕃耳振許為之奏請小殺乃遣其大臣阿史徳頡利發入貢因扈從東廵五月庚寅妖賊劉定髙帥衆夜犯通洛門悉捕斬之秋八月張說議封禪儀請以睿宗配皇地祇從之九月丙戌上謂宰臣曰春秋不書祥瑞惟記有年敕自今州縣毋得更奏祥瑞冬十月癸丑作水運渾天成上具列􅀫注水激輪令其自轉晝夜一周別置二輪絡在天外綴以日月逆天而行淹速合度置木匱爲地平令儀半在地下又立二木人毎刻擊鼔每辰擊鐘機械皆藏匱中辛酉車駕發東都百官貴戚四夷酋長從行每置頓數十里中人畜􅀍野有司輦載供具之物數百里不絶十一月丙戍至㤗山下己丑上僃法駕至山下御馬登山留從官於谷口獨與宰相及祠官俱登儀衛環列於山下百餘里上問禮部侍郎賀知章曰前代玉牒之文何故祕之對曰或密求神仙故不欲人見上曰吾爲蒼生祈福耳乃出玉牒宣示羣臣庚寅上祀昊天上帝於山上羣臣祀五帝百神於山下之壇其餘倣乾封故事辛卯祭皇地祇於社首壬辰上御帳殿受朝覲赦天下封泰山神爲天齊王禮秩加三公一等張說多引兩省吏及以所親攝官登山禮畢推恩往往加階超入五品而不及百官中書舍人張九齡諫不聽又扈從士卒但加勲而無賜物由是中外怨之初隋末國馬皆爲盗賊及戎狄所掠唐初纔得牝牡三千匹於赤岸澤徙之隴右命太僕張萬嵗掌之萬嵗善於其職自貞觀至麟徳馬蕃息及七十萬匹分爲八坊四十八監各置使以領之是時天下以一縑易一馬垂拱以後馬濳耗太半上初即位牧馬有二十四萬匹以太僕卿王毛仲爲内外閑廐使少卿張景順副之至是有馬四十三萬匹牛羊稱是上之東封以牧馬數萬匹從色别爲羣望之如雲錦上嘉毛仲之功癸巳加毛仲開府儀同三司甲午車駕發泰山庚申幸孔子宅致祭上還至宋州宴從官於樓上刺史宼泚預焉酒酣上謂張􅀃曰曏者屢遣使臣分廵諸道察吏善惡今因封禪歷諸州乃知使臣負我多矣懷州刺史王丘餼牽之外一無它獻魏州刺史崔􅃆供張無錦繡示我以儉濟州刺史裴耀卿表數百言莫非規諫且曰人或重擾則不足以告成朕常寘之坐隅且以戒左右如三人者不勞人以市恩眞良吏矣顧謂宼泚曰比亦屢有以酒饌不豐訴於朕者知卿不借譽於左右也自舉酒賜之宰臣帥羣臣起賀樓上皆稱萬歳由是以丘爲尚書左丞沔爲散􅀐侍郎耀卿爲定州刺史耀卿叔業之七世孫也十二月乙巳還東都突厥頡利發辭歸上厚賜而遣之竟不許昬王毛仲有寵於上百官附之者輻湊毛仲嫁女上問何須毛仲頓首對曰臣萬事已僃但未得客上曰張説源乾曜輩豈不可呼邪對曰此則得之上曰知汝所不能致者一人耳必宋璟也對曰然上笑曰朕明日爲汝召客明日上謂宰相朕奴毛仲有昬事卿等宜與諸逹官悉詣其第旣而日中衆客未敢舉筯待璟乆之方至先執酒西向拜謝飲不盡巵遽稱腹痛而歸璟之剛直老而彌篤先是契丹王李吐干與可突干復相猜忌􅂝公主來奔不敢復還更封遼陽王留宿衛可突干立李盡忠之弟邵固爲主車駕東廵邵固詣行在因從至泰山拜左羽林大將軍靜折軍經略大使上疑吏部選試不公時選期已迫御史中丞宇文融密奏請分吏部爲十銓甲戌以禮部尚書蘇頲等十人掌吏部選試判將畢遽召入禁中決定吏部尚書侍郎皆不得預左庶子呉兢上表以爲陛下曲受讒言不信有司非居上臨人推誠感物之道昔陳平邴吉漢之宰相尚不對錢榖之數不問鬬死之人況大唐萬乗之君豈得下行銓選之事乎凡選人書判並請委之有司停此十銓上雖不即從明年復故是嵗東都斗米十五錢青齊五錢粟三錢于闐王尉遲眺隂結突厥及諸胡謀叛安西副大都護杜暹發兵捕斬之更爲立王資治通鑑卷第二百一十二
