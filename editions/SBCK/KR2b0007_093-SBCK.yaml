body:
  text: 夏四月後趙將石瞻攻兖州刺史檀斌于鄒山殺之後趙西夷中郎將王騰襲殺并州刺史崔琨上黨内史王眘據并州降趙五月以陶侃為征西大將軍都督荆湘雍梁四州諸軍事荆州刺史荆州士女相慶侃性聰敏㳟勤終日斂膝危坐軍府衆事撿攝無遺未嘗少閑常語人曰大禹聖人乃惜寸隂至於衆人當惜分隂豈可但逸遊荒醉生無益於時死無聞於後是自棄也諸參佐或以談戲廢事者命取其酒器蒱博之具悉投之於江將吏則加鞭扑曰樗蒱者牧猪奴戲耳老莊浮華非先王之法言不益實用君子當正其威儀何有蓬頭跣足自謂宏達耶有奉饋者必問其所由若力作所致雖微必喜慰賜參倍若非理得之則切厲訶辱還其所饋嘗出遊見人持一把未熟稻侃問用此何為人云行道所見聊取之耳侃大怒曰汝既不佃而戲賊人稻執而鞭之是以百姓勤於農作家給人足嘗造船其木屑竹頭侃皆令籍而掌之人咸不解所以後正㑹積雪始晴聽事前餘雪猶濕乃以木屑布地及桓温伐蜀又以侃所貯竹頭作丁裝船其綜理微密皆此類也後趙將石生屯洛陽冦掠河南司州刺史李矩潁川太守郭黙軍數敗又乏食乃遣使附於趙趙主曜使中山王岳將兵萬五千人趣孟津鎮東將軍呼延謨帥荆司之衆自崤澠而東欲㑹矩黙共攻石生岳克孟津石梁二戍斬獲五千餘級進圍石生於金墉後趙中山公虎帥歩騎四萬入自成臯関與岳戰于洛西岳兵敗中流矢退保石梁虎作塹柵環之遏絶内外岳衆飢甚殺馬食之虎又擊呼延謨斬之曜自將兵救岳虎帥騎三萬逆戰趙前軍將軍劉黒擊虎將石聰於八特阪大破之曜屯于金谷夜軍中無故大驚士卒奔潰乃退屯澠池夜又驚潰遂歸長安六月虎㧞石梁禽岳及其將佐八十餘人氐羌三千餘人皆送襄國阬其士卒九千人遂攻王騰於并州執騰殺之阬其士卒七千餘人曜還長安素服郊次哭七日乃入城因憤恚成疾郭黙復為石聰所敗弃妻子南奔建康李矩將士隂謀叛降後趙矩不能討亦帥衆南歸衆皆道亡惟郭誦等百餘人隨之卒於魯陽矩長史崔宣帥其餘衆三千降于後趙於是司豫徐兖之地率皆入於後趙以淮為境矣趙主曜以永安王􅅌為大司馬大單于徙封南陽王置單于臺于渭城其左右賢王以下皆以胡羯鮮卑氐羌豪桀為之秋七月辛未以尚書令郗鑒為車騎將軍都督徐兖青三州諸軍事兖州刺史鎮廣陵閏月以尚書左僕射荀崧為光禄大夫録尚書事尚書鄧攸為左僕射右衛將軍虞􅅌元敬皇后之弟也與左衛將軍南頓王宗俱為帝所親任典禁兵直殿内多聚勇士以為羽翼王導庾亮皆忌之頗以為言帝待之愈厚宫門管鑰皆以委之帝寢疾亮夜有所表從宗求鑰宗不與叱亮使曰此汝家門戸邪亮益忿之及帝疾篤不欲見人羣臣無得進者亮疑宗􅅌及宗兄西陽王羕有異謀排闥入升御牀見帝流涕言羕與宗等謀廢大臣自求輔政請黜之帝不納壬午帝引太宰羕司徒導尚書令卞壼車騎將軍郗鑒䕶軍將軍庾亮領軍將軍陸曄丹楊尹温嶠並受遺詔輔太子更入殿將兵直宿復拜壼右將軍亮中書令曄録尚書事丁亥降遺詔戊子帝崩帝明敏有機斷故能以弱制彊誅翦逆臣克復大業己丑太子即皇帝位生五年矣羣臣進璽司徒導以疾不至卞壼正色於朝曰王公豈社稷之臣邪大行在殯嗣皇未立寜是人臣辭疾之時也導聞之輿疾而至大赦增文武位二等尊庾后為皇太后羣臣以帝幼冲奏請太后依漢和熹皇后故事太后辭讓數四乃從之秋九月癸夘太后臨朝稱制以司徒導録尚書事與中書令庾亮尚書令卞壼參輔朝政然事之大要皆决於亮加郗鑒車騎大將軍陸曄左光禄大夫皆開府儀同三司以南頓王宗為驃騎將軍虞􅅌為大宗正尚書召樂廣之子謨為郡中正庾珉族人怡為廷尉評謨怡各稱父命不就卞壼奏曰人無非父而生職無非事而立有父必有命居職必有悔有家各私其子則為王者無民君臣之道廢矣樂廣庾珉受寵聖世身非已有況及後嗣而可専哉所居之職若順夫羣心則戰戍者之父母皆當命子以不處也謨怡不得已各就職辛丑葬明帝于武平陵冬十一月癸巳朔日有食之慕容廆與段氏方睦為段牙謀使之徙都牙從之即去令支國人不樂叚疾陸眷之孫遼欲奪其位以徙都為牙罪十二月帥國人攻牙殺之自立叚氏自務勿塵以來日益彊盛其地西接漁陽東界遼水所統胡晉三萬餘戸控􅁌四五萬騎荆州刺史陶侃以寜州刺史王堅不能禦寇是嵗表零陵太守南陽尹奉為寜州刺史以代之先是王遜在寜州蠻酋梁水太守㸑量益州太守李逷皆叛附於成遜討之不能克奉至州重募徼外夷刺㸑量殺之諭降李逷州境遂安代王賀傉卒弟紇那立顯宗成皇帝上之上咸和元年春二月大赦改元趙以汝南王咸為太尉録尚書事光禄大夫劉綏為大司徒卜泰為大司空劉后疾病趙主曜問所欲言劉氏泣曰妾㓜鞠於叔父昶願陛下貴之叔父皚之女芳有徳色願以備後宫言終而卒曜以昶為侍中大司徒録尚書事立芳為皇后尋又以昶為太保三月後趙主勒夜微行檢察諸營衛齎金帛以賂門者求出永昌門􅀱王假欲收捕之從者至乃止旦召假以為振忠都尉爵関内侯勒召記室參軍徐光光醉不至黜為牙門光侍直有愠色勒怒并其妻子囚之夏四月後趙將石生冦汝南執内史祖濟六月癸亥泉陵公劉遐卒癸酉以車騎大將軍郗鑒領徐州刺史征虜將軍郭黙為北中郎將監淮北諸軍事領遐部曲遐子肇尚幼遐妹夫田防及故將史迭等不樂他屬共以肇襲遐故位而叛臨淮太守劉矯掩襲遐營斬防等遐妻邵續女也驍果有父風遐嘗為後趙所圍妻單將數騎拔遐出於萬衆之中及田防等欲作亂遐妻止之不從乃密起火燒甲仗都盡故防等卒敗詔以肇襲遐爵司徒導稱疾不朝而私送郗鑒卞壼奏導虧法從私無大臣之節請免官雖事寢不行舉朝憚之壼儉素廉絜裁斷切直當官幹實性不􅀪裕不肯茍同時好故為諸名士所少阮孚謂之曰卿常無閑泰如含瓦石不亦勞乎壼曰諸君子以道徳恢􅀪風流相尚執鄙吝者非壼而誰時貴游子弟多慕王澄謝鯤為放達壼厲色於朝曰悖禮傷教罪莫大焉中朝傾覆實由於此欲奏推之王導庾亮不聽乃止成人討越嶲斯叟破之秋七月癸丑觀陽烈侯應詹卒初王導輔政以寛和得衆及庾亮用事任法裁物頗失人心豫州刺史祖約自以名輩不後郗卞而不豫顧命又望開府復不得及諸表請多不見許遂懷怨望及遺詔褒進大臣又不及約與陶侃二人皆疑庾亮刪之歴陽内史蘇峻有功於國威望漸著有銳卒萬人器械甚精朝廷以江外寄之而峻頗懷驕溢有輕朝廷之志招納亡命衆力日多皆仰食縣官運漕相屬稍不如意輒肆忿言亮既疑峻約又畏侃之得衆八月以丹楊尹温嶠為都督江州諸軍事江州刺史鎮武昌尚書僕射王舒為㑹稽内史以廣聲援又修石頭以備之丹楊尹阮孚以太后臨朝政出舅族謂所親曰今江東創業尚淺主㓜時艱庾亮年少徳信未孚以吾觀之亂將作矣遂求出為廣州刺史爭咸之子也冬十月立帝母弟岳為吳王南頓王宗自以失職怨望又素與蘇峻善庾亮欲誅之宗亦欲廢執政御史中丞鍾雅劾宗謀反亮使右衞將軍趙􅅌收之宗以兵拒戰為􅅌所殺貶其族為馬氏三子綽超演皆廢為庶人免太宰西陽王羕降封弋陽縣王太宗正虞􅅌左遷桂陽太守宗宗室近屬羕先帝保傅亮一旦翦黜由是愈失逺近之心宗黨卞闡亡奔蘇峻亮符峻送闡峻保匿不與宗之死也帝不之知久之帝問亮曰常日白頭公何在亮對以謀反伏誅帝泣曰舅言人作賊便殺之人言舅作賊當如何亮懼變色趙將黄秀等冦鄼順陽太守魏該帥衆奔襄陽後趙王勒用程遐之謀營鄴宫使世子􅀪鎮鄴配禁兵萬人車騎所統五十四營悉配之以驍騎將軍領門臣祭酒王陽専統六夷以輔之中山公虎自以功多無去鄴之意及修二臺遷其家室虎由是怨程遐十一月後趙石聰攻夀春祖約屢表請救朝廷不為出兵聰遂進冦逡遒阜陵殺掠五千餘人建康大震詔加司徒導大司馬假黄鉞都督中外諸軍事以禦之軍于江寜蘇峻遣其將韓晃擊石聰走之導解大司馬朝議又欲作涂塘以遏胡冦祖約曰是弃我也益懷憤恚十二月濟岷太守劉闓等殺下邳内史夏侯嘉以下邳叛降于後趙石瞻攻河南太守王瞻于邾抜之彭城内史劉續復據蘭陵石城石瞻攻抜之後趙王勒以牙門將王波為記室參軍典定九流始立秀孝試經之制張駿畏趙人之逼是嵗徙隴西南安民二千餘家于姑臧又遣使脩好於成以書勸成主雄去尊號稱藩於晉雄復書曰吾過為士大夫所推然本無心於帝王思為晉室元功之臣掃除氛埃而晉室陵遲徳聲不振引領東望有年月矣㑹獲來貺情在闇至有何己巳自是聘使相繼二年春正月朱提太守楊術與成將羅恒戰于臺登兵敗術死夏五月甲申朔日有食之趙武衛將軍劉朗帥騎三萬襲楊難敵于仇池弗克掠三千餘戸而歸張駿聞趙兵為後趙所敗乃去趙官爵復稱晉大將軍凉州牧遣武威太守竇濤金城太守張閬武興太守辛巖揚烈將軍宋輯等帥衆數萬東㑹韓璞攻掠趙秦州諸郡趙南陽王􅅌將兵擊之屯狄道枹罕䕶軍辛晏告急秋駿使韓璞辛巖救之璞進度沃干嶺巖欲速戰璞曰夏末以來日星數有變不可輕動且曜與石勒相攻􅅌必不能久與我相守也與􅅌夾洮相持七十餘日冬十月璞遣辛巖督運於金城􅅌聞之曰韓璞之衆十倍於吾吾糧不多難以持久今虜分兵運糧天授我也若敗辛巖璞等自潰乃帥騎三千襲巖于沃干嶺敗之遂前逼璞營璞衆大潰􅅌乘勝追奔濟河攻抜令居斬首二萬級進據振武河西大駭張閬辛晏帥其衆數萬降趙駿遂失河南之地庾亮以蘇峻在歴陽終為禍亂欲下詔徵之訪於司徒導導曰峻猜險必不奉詔不若且苞容之亮言於朝曰峻狼子野心終必為亂今日徵之縱不順命為禍猶淺若復經年不可復制猶七國之於漢也朝臣無敢難者獨光禄大夫卞壼爭之曰峻擁彊兵逼近京邑路不終朝一旦有變易為蹉跌宐深思之亮不從壼知必敗與温嶠書曰元規召峻意定此國之大事峻已出狂意而召之是更速其禍也必縱毒蠚以向朝廷朝廷威力雖盛不知果可擒不王公亦同此情吾與之爭甚懇切不能如之何本出足下以為外援而今更恨足下在外不得相與共諌止之或當相從耳嶠亦累書止亮舉朝以為不可亮皆不聽峻聞之遣司馬何仍詣亮曰討賊外任逺近惟命至於内輔實非所堪亮不許召北中郎將郭黙為後將軍領屯騎校尉司徒右長史庾氷為吳國内史皆將兵以備峻氷亮之弟也於是下優詔徵峻為大司農加散騎常侍位特進以弟逸代領部曲峻上表曰昔明皇帝親執臣手使臣北討胡冦今中原未靖臣何敢即安乞補青州界一荒郡以展鷹犬之用復不許峻嚴裝將赴召猶豫未决參軍任讓謂峻曰將軍求處荒郡而不見許事勢如此恐無生路不如勒兵自守阜陵令匡術亦勸峻反峻遂不應命温嶠聞之即欲帥衆下衛建康三吳亦欲起義兵亮並不聽而報嶠書曰吾憂西陲過於歴陽足下無過雷池一歩也朝廷遣使諭峻峻曰臺下云我欲反豈得活邪我寜山頭望廷尉不能廷尉望山頭往者國家危如累卵非我不濟狡􅈷既死獵犬宐烹但當死報造謀者耳峻知祖約怨朝廷乃遣參軍徐㑹推崇約請共討庾亮約大喜其從子智衍並勸成之譙國内史桓宣謂智曰本以彊胡未滅將戮力討之使君若欲為雄霸何不助國討峻則威名自舉今乃與峻俱反此安得久乎智不從宣詣約請見約知其欲諌拒而不内宣遂絶約不與之同十一月約遣兄子沛内史渙女壻淮南太守許栁以兵㑹峻逖妻栁之姊也固諌不從詔復以卞壼為尚書令領右衛將軍以會稽内史王舒行揚州刺史事吳興太守虞潭督三吳等諸郡軍事尚書左丞孔坦司徒司馬丹楊陶回言於王導請及峻未至急斷阜陵守江西當利諸口彼少我衆一戰决矣若峻未來可往逼其城今不先往峻必先至峻至則人心危駭難與戰矣此時不可失也導然之庾亮不從十二月辛亥蘇峻使其將韓晃張徤等襲䧟姑孰取鹽米亮方悔之壬子彭城王雄章武王休叛奔峻雄釋之子也庚申京師戒嚴假庾亮節都督征討諸軍事以左衛將軍趙􅅌為歴陽太守使左將軍司馬流將兵據慈湖以拒峻以前射聲校尉劉超為左衛將軍侍中禇翜典征討軍事亮使弟翼以白衣領數百人備石頭丙寅徙琅邪王昱為㑹稽王吳王岳為琅邪王宣城内史桓彛欲起兵以赴朝廷其長史禆惠以郡兵寡弱山民易擾謂宐且案甲以待之彛厲色曰見無禮於其君者若鷹鸇之逐鳥雀今社稷危逼義無宴安辛未彛進屯蕪湖韓晃擊破之因進攻宣城彛退保廣徳晃大掠諸縣而還徐州刺史郗鑒欲帥所領赴難詔以北冦不許是嵗後趙中山公虎擊代王紇那戰于句注陘北紇那兵敗徙都大寗以避之代王鬱律之子翳槐居於其舅賀蘭部紇那遣使求之賀蘭大人藹頭擁䕶不遣紇那與宇文部共擊藹頭不克資治通鑑卷第九十三
