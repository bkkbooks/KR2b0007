seq: 93
front:
  text: 生矣石生冦許潁俘獲萬計攻郭誦于陽翟誦與戰大破之生退守康城後趙汲郡内史石聰聞生敗馳救之進攻司州刺史李矩潁川太守郭黙皆破之成主雄后任氏無子有妾子十餘人雄立其兄蕩之子班爲太子使任后母之羣臣請立諸子雄曰吾兄先帝之嫡統有竒才大功事垂克而早世朕常悼之且班仁孝好學必能負荷先烈太傅驤司徒王達諌曰先王立嗣必子者所以明定分而防簒奪也宋宣公吳餘祭足以觀矣雄不聽驤退而流涕曰亂自此始矣班爲人謙㳟下士動遵禮灋雄每有大議輒令豫之夏五月甲申張茂疾病執世子駿手泣曰吾家世以孝友忠順著稱今雖天下大亂汝奉承之不可失也且下令曰吾官非王命茍以集事豈敢榮之死之日當以白帢入棺勿以朝服斂是日薨愍帝使者史淑在姑臧左長史汜禕右長史馬謨等使淑拜駿大將軍凉州牧西平公赦其境内前趙主曜遣使贈茂太宰謚曰成烈王拜駿上大將軍凉州牧凉王王敦疾甚矯詔拜王應為武衛將軍以自副以王含為驃騎大將軍開府儀同三司錢鳳謂敦曰脫有不諱便當以後事付應邪敦曰非常之事非常人所能為且應年少豈堪大事我死之後莫若釋兵散衆歸身朝廷保全門戸上計也退還武昌收兵自守貢獻不廢中計也及吾尚存悉衆而下萬一僥倖下計也鳳謂其黨曰公之下計乃上䇿也遂與沈充定謀俟敦死即作亂又以宿衛尚多奏令三畨休二初帝親任中書令温嶠敦惡之請嶠為左司馬嶠乃繆為勤敬綜其府事時進密謀以附其欲深結錢鳳為之聲譽每曰錢世儀精神滿腹嶠素有藻鑑之名鳳甚恱深與嶠結好㑹丹楊尹缺嶠言於敦曰京尹咽喉之地公宐自選其才恐朝廷用人或不盡理敦然之問嶠誰可者嶠曰愚謂無如錢鳳鳳亦推嶠嶠偽辭之敦不聽六月表嶠為丹楊尹且使覘伺朝廷嶠恐既去而錢鳳於後間止之因敦餞别嶠起行酒至鳳鳳未及飲嶠偽醉以手版擊鳳幘墜作色曰錢鳳何人温太真行酒而敢不飲敦以為醉兩釋之嶠臨去與敦别涕泗横流出閣復入者再三行後鳳謂敦曰嶠於朝廷甚密而與庾亮深交未可信也敦曰太真昨醉小加聲色何得便爾相讒嶠至建康盡以敦逆謀告帝請先為之備又與庾亮共畫討敦之謀敦聞之大怒曰吾乃為小物所欺與司徒導書曰太真别來幾日作如此事當募人生致之自㧞其舌帝將討敦以問光禄勲應詹詹勸成之帝意遂决丁夘加司徒導大都督領楊州刺史以温嶠都督東安北部諸軍事與右將軍卞敦守石頭應詹為䕶軍將軍都督前鋒及朱雀橋南諸軍事郗鑒行衛將軍都督從駕諸軍事庾亮領左衛將軍以吏部尚書卞壼行中軍將軍郗鑒以為軍號無益事實固辭不受請召臨淮太守蘇峻兖州刺史劉遐同討敦詔徴峻遐及徐州刺史王邃豫州刺史祖約廣陵太守陶瞻等入衛京師帝屯于中堂司徒導聞敦疾篤帥子弟為敦發哀衆以為敦信死咸有奮志於是尚書騰詔下敦府列敦罪惡曰敦輒立兄息以自承代未有宰相繼體而不由王命者也頑凶相奬無所顧忌志騁凶醜以窺神器天不長姦敦以隕斃鳳承凶宄彌復煽逆今遣司徒導等虎旅三萬十道並進平西將軍邃等精鋭三萬水陸齊勢朕親統諸軍討鳳之罪有能殺鳳送首封五千戸侯諸文武為敦所授用者一無所問無或猜嫌以取誅滅敦之將士從敦彌年違離家室朕甚愍之其單丁在軍皆遣歸家終身不調其餘皆與假三年休訖還臺當與宿衛同例三畨敦見詔甚怒而病轉篤不能自將將舉兵伐京師使記室郭璞筮之璞曰無成敦素疑璞助温嶠庾亮及聞卦凶乃問璞曰卿更筮吾夀幾何璞曰思向卦明公起事必禍不久若住武昌夀不可測敦大怒曰卿夀幾何曰命盡今日日中敦乃收璞斬之敦使錢鳳及冠軍將軍鄧岳前將軍周撫等帥衆向京師王含謂敦曰此乃家事吾當自行於是以含為元帥鳳等問曰事克之日天子云何敦曰尚未南郊何得稱天子便盡卿兵勢保䕶東海王及裴妃而已乃上䟽以誅姦臣温嶠等為名秋七月壬申朔王含等水陸五萬奄至江寜南岸人情恟懼温嶠移屯水北燒朱雀桁以挫其鋒含等不得渡帝欲親將兵擊之聞橋已絶大怒嶠曰今宿衛寡弱徴兵未至若賊豕突危及社稷宗廟且恐不保何愛一橋乎司徒導遺含書曰近承大將軍困篤或云已有不諱尋知錢鳳大嚴欲肆姦逆謂兄當抑制不逞還藩武昌今乃與大羊俱下兄之此舉謂可得如大將軍昔年之事乎昔年佞臣亂朝人懷不寜如導之徒心思外濟今則不然大將軍來屯于湖漸失人心君子危怖百姓勞弊臨終之日委重安期安期斷乳幾日又於時望便可襲宰相之迹邪自開闢以來頗有宰相以孺子為之者乎諸有耳者皆知將為禪代非人臣之事也先帝中興遺愛在民聖主聰明徳洽朝野兄乃欲妄萌逆節凡在人臣誰不憤歎導門户小大受國厚恩今日之事明目張膽為六軍之首寜為忠臣而死不為無頼而生矣含不答或以為王含錢鳳衆力百倍苑城小而不固宜及軍勢未成大駕自出拒戰郗鑒曰羣逆縱逸勢不可當可以謀屈難以力競且含等號令不一抄盜相尋吏民懲往年暴掠皆人自為守乘逆順之勢何憂不克且賊無經畧逺圖惟恃豕突一戰曠日持久必啓義士之心令智力得展今以此弱力敵彼彊寇决勝負於一朝定成敗於呼吸萬一蹉跌雖有申胥之徒義存投袂何補於既往哉帝乃止帝帥諸軍出屯南皇堂癸酉夜募壯士遣將軍段秀中軍司馬曹渾等帥甲卒千人渡水掩其未備平旦戰於越城大破之斬其前鋒將何康秀匹磾之弟也敦聞含敗大怒曰我兄老婢耳門戸衰世事去矣顧謂參軍吕寶曰我當力行因作勢而起困乏復卧乃謂其舅少府羊鑒及王應曰我死應便即位先立朝廷百官然後營葬事敦尋卒應祕不發喪裹尸以席蠟塗其外埋於㕔事中與諸葛瑶等日夜縱酒淫樂帝使吳興沈楨說沈充許以為司空充曰三司具瞻之重豈吾所任幣厚言甘古人所畏也且丈夫共事終始當同豈可中道改易人誰容我乎遂舉兵趣建康宗正卿虞潭以疾歸㑹稽聞之起兵餘姚以討充帝以潭領㑹稽内史前安東將軍劉超宣城内史鍾雅皆起兵以討充義興人周蹇殺王敦所署太守劉芳平西將軍祖約逐敦所署淮南太守任台沈充帥衆萬餘人與王含軍合司馬顧颺說充曰今舉大事而天子已扼其咽喉鋒摧氣沮相持日久必致禍敗今若決破柵塘因湖水以灌京邑乘水勢縱舟師以攻之此上䇿也藉初至之銳并東西軍之力十道俱進衆寡過倍理必摧䧟中䇿也轉禍為福召錢鳳計事因斬之以降下䇿也充皆不能用颺逃歸于吳丁亥劉遐蘇峻等帥精卒萬人至帝夜見勞之賜將士各有差沈充錢鳳欲因北軍初到疲困擊之乙未夜充鳳從竹格渚渡淮䕶軍將軍應詹建威將軍趙􅅌等拒戰不利充鳳至宣陽門㧞柵將戰劉遐蘇峻自南塘横擊大破之赴水死者三千人遐又破沈充于青溪尋陽太守周光聞敦舉兵帥千餘人來赴既至求見敦王應辭以疾光退曰今我逺來而不得見公其死乎遽見其兄撫曰王公已死兄何為與錢鳳作賊衆皆愕然丙申王含等燒營夜遁丁酉帝還宫大赦惟敦黨不原命庾亮督蘇峻等追沈充於吳興温嶠督劉遐等追王含錢鳳於江寜分命諸將追其黨與劉遐軍人頗縱虜掠嶠責之曰天道助順故王含勦絶豈可因亂為亂也遐惶恐拜謝王含欲奔荆州王應曰不如江州含曰大將軍平素與江州云何而欲歸之應曰此乃所以宐歸也江州當人彊盛時能立同異此非常人所及今覩困厄必有愍惻之心荆州守文豈能意外行事邪含不從遂奔荆州王舒遣軍迎之沈含父子於江王彬聞應當來密具舟以待之不至深以為恨錢鳳走至闔廬洲周光斬之詣闕自贖沈充走失道誤入故將吳儒家儒誘充内重壁中因笑謂充曰三千戸侯矣充曰爾以義存我我家必厚報汝若以利殺我我死汝族滅矣儒遂殺之傳首建康敦黨悉平充子勁當坐誅鄉人錢舉匿之得免其後勁竟滅吳氏有司發王敦瘞出尸焚其衣冠跽而斬之與沈充首同懸于南桁郗鑒言於帝曰前朝誅楊駿等皆先極官刑後聽私殯臣以為王誅加於上私義行於下宐聽敦家收葬於義為􅀪帝許之司徒導等皆以討敦功受封賞周撫與鄧岳俱亡周光欲資給其兄而取岳撫怒曰我與伯山同亡何不先斬我㑹岳至撫出門遥謂之曰何不速去今骨肉尚欲相危況他人乎岳廻舟而走與撫共入西陽蠻中明年詔原敦黨撫岳出首得免死禁錮故吳内史張茂妻陸氏傾家産帥茂部曲為先登以討沈充報其夫仇充敗陸氏詣闕上書為茂謝不克之責詔贈茂太僕有司奏王彬等敦之親族皆當除名詔曰司徒導以大義滅親猶將百世宥之況彬等皆公之近親乎悉無所問有詔王敦綱紀除名參佐禁錮温嶠上䟽曰王敦剛愎不仁忍行殺戮朝廷所不能制骨肉所不能諌處其朝者恒懼危亡故人士結舌道路以目誠賢人君子道窮數盡遵養時晦之辰也原其私心豈遑晏處如陸玩劉􅅌郭璞之徒常與臣言備知之矣必其賛導凶悖自當正以典刑如其枉䧟姦黨謂宐施之寛貸臣以玩等之誠聞於聖聽當受同賊之責茍黙而不言實負其心惟陛下仁聖裁之郗鑒以為先王立君臣之教貴於仗節死義王敦佐吏雖多逼廹然進不能止其逆謀退不能脫身逺遁凖之前訓宐加義責帝卒從嶠議冬十月以司徒導為太保領司徒加殊禮西陽王羕領太尉應詹為江州刺史劉遐為徐州刺史代王邃鎮淮陰蘇峻為歴陽内史加庾亮䕶軍將軍温嶠前將軍導固辭不受應詹至江州吏民未安詹撫而懷之莫不恱服十二月凉州將辛晏據枹罕不服張駿將討之從事劉慶諌曰霸王之師必須天時人事相得然後乃起辛晏凶狂安忍其亡可必柰何以饑年大舉盛寒攻城乎駿乃止駿遣參軍王騭聘於趙趙主曜謂之曰貴州􅅃誠和好卿能保之乎騭曰不能侍中徐邈曰君來結好而云不能保何也騭曰齊桓貫澤之盟憂心兢兢諸侯不召自至葵丘之㑹振而矜之叛者九國趙國之化常如今日可也若政敎陵遲尚未能察邇者之變況鄙州乎曜曰此涼州之君子也擇使可謂得人矣厚禮而遣之是嵗代王賀傉始親國政以諸部多未服乃築城於東木根山徙居之三年春二月張駿承元帝凶問大臨三日㑹黄龍見嘉泉汜禕等請改年以章休祥駿不許辛晏以枹罕降駿復收河南之地贈故譙王承甘卓戴淵周顗虞望郭璞王澄等官周札故吏為札訟寃尚書卞壼議以為札守石頭開門延寇不當贈謚司徒導以爲往年之事敦姦逆未彰自臣等有識以上皆所未悟與札無異既悟其姦札便以身許國尋取梟夷臣謂宐與周戴同例郗鑒以為周戴死節周札延冦事異賞均何以勸沮如司徒議謂往年有識以上皆與札無異則譙王周戴皆應受責何贈謚之有今三臣既褒則札宐受貶明矣導曰札與譙王周戴雖所見有異同皆人臣之節也鑒曰敦之逆謀履霜日久縁札開門令王師不振若敦前者之舉義同桓文則先帝可為幽厲邪然卒用導議贈札衛尉後趙王勒加宇文乞得歸官爵使之擊慕容廆廆遣世子皝索頭段國共擊之以遼東相裴嶷為右翼慕容仁為左翼乞得歸據澆水以拒皝遣兄子悉㧞雄拒仁仁擊悉㧞雄斬之乗勝與皝攻乞得歸大破之乞得歸棄軍走皝仁進入其國城使輕兵追乞得歸過其國三百餘里而還盡獲其國重器畜産以百萬計民之降附者數萬三月叚末柸卒弟牙立戊辰立皇子衍為太子大赦趙主曜立皇后劉氏北羌王盆句除附於趙後趙將石佗自鴈門出上郡襲之俘三千餘落獲牛馬羊百餘萬而歸趙主曜遣中山王岳追之曜屯于富平為岳聲援岳與石佗戰於河濱斬之後趙兵死者六千餘人岳悉收所虜而歸楊難敵襲仇池克之執田崧立之於前左右令崧拜崧瞋目叱之曰氐狗安有天子牧伯而向賊拜乎難敵字謂之曰子岱吾當與子共定大業子忠於劉氏豈不能忠於我乎崧厲色大言曰賊氐汝本奴才何謂大業我寜為趙鬼不為汝臣顧排一人奪其劒前刺難敵不中難敵殺之都尉魯潛以許昌叛降于後趙
