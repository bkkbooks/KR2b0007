front:
  text: 王荆因梁松以縑帛請之衆曰太子儲君無外交之義漢有舊防蕃王不宜私通賔客松曰長者意不可逆衆曰犯禁觸罪不如守正而死遂不往及松敗賔客多坐之唯衆不染於辭于寘王廣徳將諸國兵三萬人攻莎車誘莎車王賢殺之并其國匈奴發諸國兵圍于窴廣徳請降匈奴立賢質子不居徵爲莎車王廣徳又攻殺之更立其弟齊黎爲莎車王東平王蒼自以至親輔政聲望日重意不自安前後累上䟽稱自漢興以來宗室子弟無得在公卿位者乞上驃騎將軍印綬退就蕃國辭甚懇切帝乃許蒼還國而不聽上將軍印綬五年春二月庚戍蒼罷歸藩帝以驃騎長史爲東平太傅掾為中大夫令史為王家郎加賜錢五千萬布十萬匹冬十月上行幸鄴是月還宮十一月北匈奴㓂五原十二月㓂雲中南單于擊却之是嵗發遣邊民在内郡者賜裝錢人二萬安豐戴矦竇融年老子孫縱誕多不法長子穆尚内黄公主矯稱隂太后詔令六安矦劉盱去婦以女妻之盱婦家上書言狀帝大怒盡免穆等官諸竇為郎吏者皆將家屬歸故郡獨留融京師融尋薨後數嵗穆等復坐事與子勲宣皆下獄死乆之詔還融夫人與小孫一人居雒陽六年春二月王雒山出寳鼎獻之夏四月甲子詔曰祥瑞之降以應有徳方今政化多僻何以致兹易曰鼎象三公豈公卿奉職得其理邪其賜三公帛五十匹九卿二千石半之先帝詔書禁人上事言聖而間者章奏頗多浮詞自今若有過稱虛譽尚書皆宜抑而不省示不為諂子蚩也冬十月上行幸魯十二月還幸陽城壬午還宫是嵗南單于適死單于莫之子蘇立為丘除車林鞮單于數月復死單于適之弟長立為湖邪尸逐矦鞮單于七年春正月癸卯皇太后隂氏崩二月庚申葬光烈皇后
