body:
  text: 北匈奴猶盛數㓂邊遣使求合市上冀其交通不復為㓂許之以東海相宋均為尚書令初均為九江太守五日一聽事悉省掾史閉督郵府内屬縣無事百姓安業九江舊多虎􅁀常募設檻穽而猶多傷害均下記屬縣曰夫江淮之有猛獸猶北土之有雞豚也今為民害咎在殘吏而勞勤張捕非憂恤之本也其務退姦貪思進忠善可一去檻穽除削課制其後無復虎患帝聞均名故任以樞機均謂人曰國家喜文法廉吏以為足止姦也然文吏習為欺謾而廉吏清在一已無益百姓流亡盜賊為害也均欲叩頭爭之時未可改也乆將自苦之乃可言耳未及言㑹遷司􅀠校尉後上聞其言追善之八年春正月己卯司徒范遷薨三月辛卯以太尉虞延為司徒衛尉趙憙行太尉事越騎司馬鄭衆使北匈奴單于欲令衆拜衆不為屈單于圍守閉之不與水火衆㧞刀自誓單于恐而止乃更發使隨衆還京師初大司農耿國上言宜置度遼將軍屯五原以防南匈奴逃亡朝廷不從南匈奴須卜骨都矦等知漢與北虜交使内懷嫌怨欲畔宻使人詣北虜令遣兵迎之鄭衆出塞疑有異伺􅇋果得須卜使人乃上言宜更置大將以防二虜交通由是始置度遼營以中郎將吳棠行度遼將軍事將黎陽虎牙營士屯五原曼柏秋郡國十四大水冬十月北宫成丙子募死罪繫囚詣度遼營有罪亡命者令贖罪各有差楚王英奉黄縑白紈詣國相曰託在蕃輔過惡果積歡喜大恩奉送縑帛以贖愆罪國相以聞詔報曰楚王誦黄老之㣲言尚浮屠之仁祠潔齊三月與神為誓何嫌何疑當有悔吝其還贖以助伊蒲塞桑門之盛饌初帝聞西域有神其名曰佛因遣使之天笁求其道得其書及沙門以來其書大抵以虚無為宗貴慈悲不殺以為人死精神不滅隨復受形生時所行善惡皆有報應故所貴修練精神以至為佛善為宏闊勝大之言以勸誘愚俗精於其道者號曰沙門於是中國始傳其術圗其形像而王公貴人獨楚王英最先好之壬寅晦日有食之旣詔羣司勉修職事極言無諱於是在位者皆上封事各言得失帝覽章深自引咎以所上班示百官詔曰羣僚所言皆朕之過民寃不能理吏黠不能禁而輕用民力繕修宫宇出入無節喜怒過差永覽前戒竦然兢懼徒恐薄徳乆而致怠耳北匈奴雖遣使入貢而㓂鈔不息邊城晝閉帝議遣使報其使者鄭衆上䟽諌曰臣聞北單于所以要致漢使者欲以離南單于之衆堅三十六國之心也又當􅀭漢和親誇示鄰敵令西域欲歸化者局足狐疑懷土之人絶望中國耳漢使旣到便偃蹇自信若復遣之虜必自謂得謀其羣臣駮議者不敢復言如是南庭動揺烏桓有離心矣南單于乆居漢地具知形埶萬分離析旋為邊害今幸有度遼之衆􅀭威北垂雖勿報荅不敢為患帝不從復遣衆往衆因上言臣前奉使不為匈奴拜單于恚恨遣兵圍臣今復衘命必見陵折臣誠不忍持大漢節對氈裘獨拜如令匈奴遂能服臣將有損大漢之彊帝不聽衆不得已旣行在路連上書固争之詔切責衆追還繋廷尉㑹赦歸家其後帝見匈奴來者聞衆與單于爭禮之狀乃復召衆為軍司馬九年夏四月甲辰詔司􅀠校尉部刺史嵗上墨綬長吏視事三嵗已上治狀尤異者各一人與計偕上及尤不治者亦以聞是嵗大有年賜皇子恭號曰靈夀王黨號曰重熹王未有國邑帝崇尚儒學自皇太子諸王矦及大臣子弟功臣子孫莫不受經又為外戚樊氏郭氏隂氏馬氏諸子立學於南宫號四姓小矦置五經師搜選髙能以授其業自期門羽林之士悉令通孝經章句匈奴亦遣子入學廣陵王荆復呼相工謂曰我貌類先帝先帝三十得天下我今亦三十可起兵未相者詣吏告之荆惶恐自繫獄帝加恩不考極其事詔不得臣屬吏民唯食租如故使相中尉謹宿衛之荆又使巫祭祀祝詛詔長水校尉樊鯈等雜治其獄事竟奏請誅荆帝怒曰諸卿以我弟故欲誅之即我子卿等敢爾邪鯈對曰天下者髙帝天下非陛下之天下也春秋之義君親無將將而必誅臣等以荆屬託母弟陛下留聖心加惻隠故敢請耳如令陛下子臣等專誅而已帝歎息善之鯈宏之子也十年春二月廣陵思王荆自殺國除夏四月戊子赦天下閏月甲午上幸南陽召校官弟子作雅樂奏鹿鳴帝自御塤箎和之以娛嘉賔還幸南頓冬十二月甲午還宫初陵陽矦丁綝卒子鴻當襲封上書稱病讓國於弟盛不報旣葬乃挂衰絰於􅃁廬而逃去友人九江鮑駿遇鴻於東海讓之曰昔伯夷吳札亂世權行故得申其志耳春秋之義不以家事廢王事今子以兄弟私恩而絶父不滅之基可乎鴻感悟垂涕乃還就國鮑駿因上書薦鴻經學至行上徴鴻為侍中十一年春正月東平王蒼與諸王俱來朝月餘還國帝臨送歸宫悽然懐思乃遣使手詔賜東平國中􅀓曰辭别之後獨坐不樂因就車歸伏軾而吟瞻望永懷實勞我心誦及采菽以増歎息日者問東平王處家何等最樂王言為善最樂其言甚大副是要腹矣今送列矦印十九枚諸王子年五嵗已上能趨拜者皆令帶之十二年春哀牢王栁貌率其民五萬餘户内附以其地置哀牢博南二縣始通博南山度蘭倉水行者苦之歌曰漢徳廣開不賔度蘭倉為它人初平帝時河汴決壞乆而不修建武十年光武欲修之浚儀令樂俊上言民新被兵革未宜興役乃止其後汴渠東侵日月彌廣兖豫百姓怨歎以為縣官恒興佗役不先民急㑹有薦樂浪王景能治水者夏四月詔發卒數十萬遣景與將作謁者王吳脩汴渠隄自滎陽東至千乗海口千餘里十里立一水門令更相洄注無復潰漏之患景雖􅂤省役費然猶以百億計焉秋七月乙亥司空伏恭罷乙未以大司農牟融爲司空是時天下安平人無傜役嵗比登稔百姓殷富粟斛三十牛羊被野十三年夏四月汴渠成河汴分流復其舊迹辛巳帝行幸滎陽廵行河渠遂度河登太行幸上黨壬寅還宫冬十月壬辰晦日有食之楚王英與方士作金􅀛玉鶴刻文字爲符瑞男子燕廣告英與漁陽王平顔忠等造作圗書有逆謀事下案驗有司奏英大逆不道請誅之帝以親親不忍十一月廢英徙丹陽涇縣賜湯沐邑五百戸男女為矦主者食邑如故許太后勿上璽綬留住楚宫先是有私以英謀告司徒虞延者延以英藩戚至親不然其言及英事覺詔書切讓延十四年春三月甲戍延自殺以太常周澤行司徒事頃之復為太常夏四月丁巳以鉅鹿太守南陽邢穆為司徒楚王英至丹陽自殺詔以諸矦禮葬於涇封燕廣為折姦矦是時窮治楚獄遂至累年其辭語相連自京師親戚諸矦州郡豪桀及考案吏阿附坐死徙者以千數而繫獄者尚數千人初樊鯈弟鮪為其子賞求楚王英女鯈聞而止之曰建武中吾家並受榮寵一宗五矦時特進一言女可以配王男可以尚主但以貴寵過盛即為禍患故不為也且爾一子柰何棄之於楚乎鮪不從及楚事覺鯈已卒上追念鯈謹恪故其諸子皆得不坐英隂䟽天下名士上得其錄有吳郡太守尹興名乃徴興及掾史五百餘人詣廷尉就考諸吏不勝掠治死者太半唯門下掾陸續主簿梁宏功曹史駟勲僃受五毒肌肉消爛終無異辭續母自吴來雒陽作食以饋續續雖見考辭色未嘗變而對食悲泣不自勝治獄使者問其故續曰母來不得見故悲耳問何以知之續曰母截肉未嘗不方斷葱以寸為度故知之使者以狀聞上乃赦興等禁錮終身顔忠王平辭引隧鄉矦耿建朗陵矦臧信護澤矦鄧鯉曲成矦劉建建等辭未甞與忠平相見是時上怒甚吏皆惶恐諸所連及率一切陷入無敢以情恕者侍御史寒朗心傷其寃試以建等物色獨問忠平而二人錯㦍不能對朗知其詐乃上言建等無姦專為忠平所誣疑天下無辜類多如此帝曰即如是忠平何故引之對曰忠平自知所犯不道故多有虚引冀以自明帝曰即如是何不早奏對曰臣恐海内别有發其姦者帝怒曰吏持兩端促提下捶之左右方引去朗曰願一言而死帝曰誰與共為章對曰臣獨作之上曰何以不與三府議對曰臣自知當必族滅不敢多汚染人上曰何故族滅對曰臣考事一年不能窮盡姦狀反為罪人訟寃故知當族滅然臣所以言者誠冀陛下一覺悟而已臣見考囚在事者咸共言妖惡大故臣子所宜同疾今出之不如入之可無後責是以考一連十考十連百又公卿朝㑹陛下問以得失皆長跪言舊制大罪禍及九族陛下大恩裁止於身天下幸甚及其歸舎口雖不言而仰屋竊歎莫不知其多寃無敢悟陛下言者臣今所陳誠死無悔帝意解詔遣朗出後二日車駕自幸洛陽獄錄囚徒理出千餘人時天旱即大雨馬后亦以楚獄多濫乗間為帝言之帝惻然感悟夜起彷徨由是多所降宥任城令汝南袁安遷楚郡太守到郡不入府先往案楚王英獄事理其無明驗者條上出之府丞掾史皆叩頭爭以為阿附反虜法與同罪不可安曰如有不合太守自當坐之不以相及也遂分别具奏帝感悟即報許得出者四百餘家夏五月封故廣陵王荆子元夀為廣陵矦食六縣又封竇融孫嘉為安豐矦初作夀陵制令流水而已無得起墳萬年之後埽地而祭杅水脯糒而已過百日唯四時設奠置吏卒數人供給灑埽敢有所興作者以擅議宗廟法從事十五年春二月庚子上東廵癸亥耕于下邳三月至魯幸孔子宅親御講堂命皇太子諸王説經又幸東平大梁夏四月庚子還宫封皇子恭為鉅鹿王黨為樂成王衍為下邳王暢為汝南王昞為常山王長為濟隂王帝親定其封域裁令半楚淮陽馬后曰諸子數縣於制不已儉乎帝曰我子豈宜與先帝子等嵗給二千萬足矣乙巳赦天下謁者僕射耿秉數上言請擊匈奴上以顯親矦竇固甞從其世父融在河西明習邊事乃使秉固與太僕祭肜虎賁中郎將馬廖下博矦劉張好畤矦耿忠等共議之耿秉曰昔者匈奴援引弓之類并左袵之屬故不可得而制孝武旣得河西四郡及居延朔方虜失其肥饒畜兵之地羌胡分離唯有西域俄復内屬故呼韓邪單于請事􅅃塞其勢易乗也今有南單于形勢相似然西域尚未内屬北虜未有舋作臣愚以為當先撃白山得伊吾破車師通使烏孫諸國以斷其右臂伊吾亦有匈奴南呼衍一部破此復為折其左角然後匈奴可撃也上善其言議者或以為今兵出白山匈奴必并兵相助又當分其東以離其衆上從之十二月以秉為駙馬都尉固為奉車都尉以騎都尉秦彭為秉副耿忠為固副皆置從事司馬出屯涼州秉國之子忠弇之子廖援之子也十六年春二月遣肜與度遼將軍吴棠將河東西河羌胡及南單于兵萬一千騎出髙闕塞竇固耿忠率酒泉敦煌張掖甲卒及盧水羌胡萬二千騎出酒泉塞耿秉秦彭率武威隴西天水募士及羌胡萬騎出張掖居延塞騎都尉來苖䕶烏桓校尉文穆將太原鴈門代郡上谷漁陽右北平定襄郡兵及烏􅁊鮮卑萬一千騎岀平城塞伐北匈奴竇固耿忠至天山撃呼􅄛王斬首千餘級追至蒲類海取伊吾盧地置宜禾都尉留吏士屯田伊吾盧城耿秉秦彭擊匈林王絶幕六百餘里至三木樓山而還來苖文穆至匈河水上虜皆犇走無所獲祭肜與南匈奴左賢王信不相得出髙闕塞九百餘里得小山信妄言以為涿邪山不見虜而還肜與呉棠坐逗留畏懦下獄免肜自恨無功出獄數日歐血死臨終謂其子曰吾蒙國厚恩奉使不稱身死誠慚恨義不可以無功受賞死後若悉簿上所得物身自詣兵屯效死前行以副吾心旣卒其子逢上䟽具陳遺言帝雅重肜方更任用聞之大驚嗟嘆良乆烏桓鮮卑每朝賀京師常過肜冢拜謁仰天號泣遼東吏民爲立祠四時奉祭焉竇固獨有功加位特進固使假司馬班超與從事郭恂俱使西域超行到鄯善鄯善王廣奉超禮敬甚備後忽更踈懈超謂其官屬曰寧覺廣禮意薄乎官屬曰胡人不能常乆無它故也超曰此必有北虜使來狐疑未知所從故也明者睹未萌況已著邪乃召侍胡詐之曰匈奴使來數日今安在乎侍胡惶恐曰到已三日去此三十里超乃閉侍胡悉㑹其吏士三十六人與共飲酒酣因激怒之曰卿曹與我俱在絶域今虜使到裁數日而王廣禮敬即廢如令鄯善收吾屬送匈奴骸骨長爲豺狼食矣爲之柰何官屬皆曰今在危亡之地死生從司馬超曰不入虎穴不得虎子當今之計獨有因夜以火攻虜使彼不知我多少必大震怖可殄盡也滅此虜則鄯善破膽功成事立矣衆曰當與從事議之超怒曰吉凶決於今日從事文俗吏聞此必恐而謀泄死無所名非壯士也衆曰善初夜超遂將吏士徃犇虜營㑹天大風超令十人持鼔藏虜舎後約曰見火然皆當鳴鼔大呼餘人悉持兵弩夾門而伏超乃順風縱火前後鼔噪虜衆驚亂超手格殺三人吏兵斬其使及從士三十餘級餘衆百許人悉燒死明日乃還告郭恂恂大驚旣而色動超知其意舉手曰掾雖不行班超何心獨擅之乎恂乃悦超於是召鄯善王廣以虜使首示之一國震怖超告以漢威徳自今以後勿復與北虜通廣叩頭願屬漢無二心遂納子為質還白竇固固大喜具上超功効并求更選使使西域帝曰吏如班超何故不遣而更選乎今以超為軍司馬令遂前功固復使超使于寘欲益其兵超願但將本所從三十六人曰于寘國大而遠今將數百人無益於彊如有不虞多益為累耳是時于寘王廣徳雄張南道而匈奴遣使監䕶其國超旣至于寘廣徳禮意甚踈且其俗信巫巫言神怒何故欲向漢漢使有騧馬急求取以祠我廣徳乃遣國相私來比就超請馬超宻知其狀報許之而令巫自來取馬有頃巫至超即斬其首收私來比鞭笞數百以巫首送廣德因責讓之廣徳素聞超在鄯善誅滅虜使大惶恐即殺匈奴使者而降超重賜其王以下因鎮撫焉於是諸國皆遣子入侍西域與漢絶六十五載至是乃復通焉超彪之子也淮陽王延性驕奢而遇下嚴烈有上書告延與姬兄謝弇及姊壻韓光招姦猾作圗䜟祠祭祝詛事下案驗五月癸丑弇光及司徒邢穆皆坐死所連及死徙者甚衆戊午晦日有食之六月丙寅以大司農西河王敏為司徒有司奏請誅淮陽王延上以延罪薄於楚王英秋七月徙延為阜陵王食二縣是嵗北匈奴大入雲中雲中太守廉范拒之吏以衆少欲移書傍郡求救范不許㑹日暮范令軍士各交􅅞兩炬三頭􅋹火營中星列虜謂漢兵救至大驚待旦將退范令軍中蓐食晨往赴之斬首數百級虜自相轔藉死者千餘人由此不敢復向雲中范丹之孫也十七年春正月上當謁原陵夜夢先帝太后如平生歡旣寤悲不能寐即案厯明旦日吉遂率百官上陵其日降甘露於陵樹帝令百官采取以薦㑹畢帝從席前伏御牀視太后鏡匳中物感動悲涕令易脂澤裝具左右皆泣莫能仰視北海敬王睦薨睦少好學光武及上皆愛之嘗遣中大夫詣京師朝賀召而謂之曰朝廷設問寡人大夫將何辭以對使者曰大王忠孝慈仁敬賢樂士臣敢不以實對睦曰吁子危我哉此乃孤幼時進趣之行也大夫其對以孤襲爵以來志意衰惰聲色是娛犬馬是好乃為相愛耳其智慮畏慎如此二月乙巳司徒王敏薨三月癸丑以汝南太守鮑昱為司徒昱永之子也益州刺史梁國朱輔宣示漢徳威懐遠夷自汶山以西前世所不至正朔所未加白狼槃木等百餘國皆舉種稱臣奉貢白狼王唐菆作詩三章歌頌漢徳輔使犍為郡掾由恭譯而獻之初􅀛兹王建為匈奴所立倚恃虜威據有北道攻殺䟽勒王立其臣兠題為䟽勒王班超從間道至䟽勒去兠題所居槃橐城九十里逆遣吏田慮先往降之敕慮曰兠題本非䟽勒種國人必不用命若不即降便可執之慮旣到兠題見慮輕弱殊無降意慮因其無備遂前劫􅅞兠題左右出其不意皆驚懼犇走慮馳報超超即赴之悉召䟽勒將吏説以􅀛兹無道之狀因立其故王兄子忠為王國人大悦超問忠及官屬當殺兠題邪生遣之邪咸曰當殺之超曰殺之無益於事當令􅀛兹知漢威徳遂解遣之夏五月戊子公卿百官以帝威徳懷遠祥物顯應並集朝堂奉觴上夀制曰天生神物以應王者遠人慕化實由有徳朕以虚薄何以享斯唯髙祖光武聖徳所被不敢有辭其敬舉觴太常擇吉日䇿告宗廟仍推恩賜民爵及粟有差冬十一月遣奉車都尉竇固駙馬都尉耿秉騎都尉劉張出敦煌昆侖塞撃西域秉張皆去符傳以屬固合兵萬四千騎撃破白山虜於蒲類海上遂進撃車師車師前王即後王之子也其廷相去五百餘里固以後王道遠山谷􅀷士卒寒苦欲攻前王秉以為先赴後王并力根本則前王自服固計未決秉奮身而起曰請行前乃上馬引兵北入衆軍不得已並進斬首數千級後王安得震怖走出門迎秉脱帽抱馬足降秉將以詣固其前王亦歸命遂定車師而還於是固奏復置西域都䕶及戊巳校尉以陳睦為都䕶司馬耿恭為戊校尉屯後王部金蒲城謁者關寵為己校尉屯前王部栁中城屯各置數百人恭況之孫也十八年春二月詔竇固等罷兵還京師北單于遣左鹿蠡王率二萬騎擊車師耿恭遣司馬將兵三百人救之皆爲所沒匈奴遂破殺車師後王安得而攻金蒲城恭以毒藥傅矢語匈奴曰漢家箭神其中瘡者必有異虜中矢者視創皆沸大驚㑹天暴風雨隨雨擊之殺傷甚衆匈奴震怖相謂曰漢兵神真可畏也遂解去夏六月己未有星孛於太微耿恭以䟽勒城傍有㵎水可固引兵據之秋七月匈奴復來攻擁絶㵎水恭於城中穿井十五丈不得水吏士渇乏至笮馬糞汁而飲之恭身自率士輓籠有頃水泉犇出衆皆稱萬嵗乃令吏士揚水以示虜虜出不意以爲神明遂引去八月壬子帝崩於東宫前殿年四十八遺詔無起寑廟藏主於光烈皇后更衣别室帝遵奉建武制度無所變更后妃之家不得封矦與政館陶公主為子求郎不許而賜錢千萬謂羣臣曰郎官上應列宿出宰百里茍非其人則民受其殃是以難之公車以反支日不受章奏帝聞而怪曰民廢農桑遠來詣闕而復拘以禁忌豈為政之意乎於是遂蠲其制尚書閻章二妹為貴人章精力曉舊典乆次當遷重職帝為後宫親屬竟不用是以吏得其人民樂其業遠近畏服户口滋殖焉太子即位年十八尊皇后曰皇太后明帝初崩馬氏兄弟爭欲入宫北宮衛士令楊仁被甲持㦸嚴勒門衛人莫敢輕進者諸馬乃共譛仁於章帝言其峻刻帝知其忠愈善之拜為什邡令壬戌葬孝明皇帝于顯節陵冬十月丁未赦天下詔以行太尉事節鄉矦憙為太傅司空融為太尉並錄尚書事十一月戊戌以蜀郡太守第五倫為司空倫在郡公清所舉吏多得其人故帝自遠郡用之焉耆􅀛兹攻没都䕶陳睦北匈奴圍關寵於栁中城㑹中國有大喪救兵不至車師復叛與匈奴共攻耿恭恭率厲士衆禦之數月食盡窮困乃煑鎧弩食其筋革恭與士卒推誠同死生故皆無二心而稍稍死亡餘數十人單于知㳟已困欲必降之遣使招恭曰若降者當封為白屋王妻以女子㳟誘其使上城手擊殺之炙諸城上單于大怒更益兵圍㳟不能下關寵上書求救詔公卿㑹議司空倫以為不宜救司徒鮑昱曰今使人於危難之地急而棄之外則縱蠻夷之􅁀内則傷死難之臣誠令權時後無邊事可也匈奴如復犯塞為冦陛下將何以使將又二部兵人裁各數十匈奴圍之歴旬不下是其寡弱力盡之効也可令敦煌酒泉太守各將精騎二千多其幡幟倍道兼行以赴其急匈奴疲極之兵必不敢當四十日間足還入塞帝然之乃遣征西將軍耿秉屯酒泉行太守事遣酒泉太守叚彭與謁者王䝉皇甫援發張掖酒泉敦煌三郡及鄯善兵合七千餘人以救之甲辰晦日有食之太后兄弟虎賁中郎廖及黄門郎防光終明帝世未嘗改官帝以廖爲衛尉防為中郎將光為越騎校尉廖等傾身交結冠蓋之士爭赴趣之第五倫上䟽曰臣聞書曰臣無作威作福其害于而家凶于而國近世光烈皇后雖友愛天至而抑損隂氏不假以權埶其後梁竇之家玄有非法明帝即位竟多誅之自是雒中無復權戚書記請託一皆斷絶又諭諸外戚曰苦身待士不如為國戴盆望天事不兩施今之議者復以馬氏為言竊聞衛尉廖以布三千匹城門校尉防以錢三百萬私贍三輔衣冠知與不知莫不畢給又聞臘日亦遺其在雒中者錢各五千越騎校尉光臘用羊三百頭米四百斛肉五千斤臣愚以為不應經義惶恐不敢不以聞陛下情欲厚之亦宜所以安之臣今言此誠欲上忠陛下下全后家也是嵗京師及兗豫徐州大旱資治通鑑巻第四十五
