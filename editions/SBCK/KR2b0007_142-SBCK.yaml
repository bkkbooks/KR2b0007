front:
  text: 婦人猶戴㡌著小襖何謂日新對曰著者少不著者多帝曰任城此何言也必欲使滿城盡著邪澄與留守官皆免冠謝甲辰魏大赦魏主之幸鄴也李彪迎拜於鄴南且謝罪帝曰朕欲用卿思李僕射而止慰而遣之會御史臺令史龍文觀告太子恂被收之日有手書自理彪不以聞尚書表收彪赴洛陽帝以為彪必不然以牛車散載詣洛陽會赦得免魏太保齊郡靈王簡卒二月辛亥魏以咸陽王禧為太尉魏主連年在外馮后私於宦官高菩薩及帝在懸瓠病篤后益肆意無所憚中常侍雙蒙等為之心腹彭城公主為宋王劉昶子婦寡居后為其母弟北平公馮夙求昏帝許之公主不願后強之公主密與家僮冐雨詣懸瓠訴於帝且具道后所為帝疑而秘之后聞之始懼隂與母常氏使女巫猒禱曰帝疾若不起一旦得如文明太后輔少主稱制者當賞報不貲帝還洛收高菩薩䨇䝉等案問具伏帝在含温室夜引后入賜坐東楹去御榻二丈餘命菩薩等陳狀既而召彭城王􅎰北海王詳入坐曰昔為汝嫂今是路人但入勿避又曰此嫗欲手刄吾脅吾以文明太后家女不能廢但虚置宫中有心庶能自死汝等勿謂吾猶有情也二王出賜后辭訣后再拜稽首涕泣入居後宫諸嬪御奉之猶如后禮唯命太子不復朝謁而已初馮熈以文明太后之兄尚恭宗女博陵長公主熈有三女二為皇后一為左昭儀由是馮氏貴寵冠羣臣賞賜累巨萬公主生二子誕脩熈為太保誕為司徒脩為侍中尚書庶子聿為黄門郎黄門侍郎崔光與聿同直謂聿曰君家富貴太盛終必衰敗聿曰我家何所負而君無故詛我光曰不然物盛必衰此天地之常理若以古事推之不可不慎後歲餘而脩敗脩性浮競誕屢戒之不悛乃白於太后及帝而杖之脩由是恨誕求藥使誕左右毒之事覺帝欲誅之誕自引咎懇乞其生帝亦以其父老杖脩百餘黜為平城民及誕熈繼卒幽后尋廢聿亦擯棄馮氏遂衰癸亥魏以彭城王􅎰為司徒陳顯逹與魏元英戰屢破之攻馬圈城四十日城中食盡噉死人肉及樹皮癸酉魏人突圍走斬獲千計顯逹入城將士競取城中絹遂不窮追顯逹又遣軍主莊丘黑進擊南鄉㧞之魏主謂任城王澄曰顯逹侵擾朕不親行無以制之三月庚辰魏主發洛陽命于烈居守以右衛將軍宋弁兼祠部尚書攝七兵事以佐之弁精勤吏治恩遇亞於李冲癸未魏主至梁城崔慧景攻魏順陽順陽太守清河張烈固守甲申魏主遣振威將軍慕容平城將騎五千救之自魏主有疾彭城王􅎰常居中侍醫藥晝夜不離左右飲食必先甞而後進蓬首垢面衣不觧帶帝久疾多忿近侍失指動欲誅斬􅎰承顏伺間多所匡救丙戌以􅎰為使持節都督中外諸軍事􅎰辭曰臣侍疾無暇安能治軍願更請一王使揔軍要臣得專心醫藥帝曰侍疾治軍皆慿於汝吾病如此深慮不濟安六軍保社禝者捨汝而誰何容方更請人以違心寄乎丁酉魏王至馬圈命荆州刺史廣陽王嘉斷均口邀齊兵歸路嘉建之子也陳顯逹引兵度水西據鷹子山築城人情沮恐與魏戰屢敗魏武衛將軍元嵩免胄陷陳將士隨之齊兵大敗嵩澄之弟也戊戌夜軍主崔恭祖胡松以烏布幔盛顯逹數人擔之間道自分磧山出均水口南走己亥魏收顯逹軍資億計班賜將士追奔至漢水而還左軍將軍張千戰死士卒死者三萬餘人顯逹之北伐軍入汋均口廣平馮道根說顯逹曰汋均水迅急易進難退魏若守隘則首尾俱急不如悉棄船於鄼城陸道歩進列營相次鼓行而前破之必矣顯逹不從道根以私屬從軍及顯逹夜走軍人不知山路道根每及險要輙停馬指示之衆頼以全詔以道根為汋均口戍副顯逹素有威名至是大損御史中丞范岫奏免顯逹官顯逹亦自表解職皆不許更以顯逹為江州刺史崔慧景亦棄順陽走還庚子魏主疾甚北還至穀塘原謂司徒􅎰曰後宫乆乖隂徳吾死之後可賜自盡葬以后禮庶免馮門之醜文曰吾病益惡殆必不起雖摧破顯達而天下未平嗣子㓜弱社稷所倚唯在於汝霍子孟諸葛孔明以異姓猶受顧託況汝親賢可不勉之􅎰泣曰布衣之士猶為知己畢命况臣託靈先帝依陛下之末光乎但臣以至親乆參機要寵靈輝赫海内莫及所以敢受而不辭正恃陛下日月之明恕臣忘退之過耳今復任以元宰揔握機要震王之聲取罪必矣昔周公大聖成王至明猶不免疑而况臣乎如此則陛下愛臣更為未盡始終之美帝黙然乆之曰詳思汝言理實難奪乃手詔太子曰汝叔父􅎰清規懋賞與白雲俱絜厭榮捨紱以松竹為心吾少與綢繆未忍暌離百年之後其聽􅎰辭蟬捨冕遂其冲挹之性以侍中䕶軍將軍北海王詳為司空鎮南將軍王肅為尚書令鎮南大將軍廣陽王嘉為左僕射尚書宋弁為吏部尚書與侍中太尉禧尚書右僕射澄等六人輔政夏四月丙午朔殂于穀塘原高祖友愛諸弟始終無間甞從容謂咸陽王禧等曰我後子孫邂逅不肖汝等觀望可輔則輔之不可輔則取之勿爲它人有也親任賢能從善如流精勤庶務朝夕不倦常曰人主患不能處心公平推誠於物能是二者則胡越之人皆可使如兄弟矣用法雖嚴於大臣無所容貸然人有小過常多闊略甞於食中得蟲又左右進羮誤傷帝手皆笑而赦之天地五郊宗廟二分之祭未甞不身親其禮毎出廵逰及用兵有司奏脩道路帝輙曰粗脩橋梁通車馬而已勿去草剗令平也在淮南行兵如在境内禁士卒無得踐傷粟稻或伐民樹以供軍用皆留絹償之宫室非不得已不修衣弊浣濯而服之鞌勒用鐵木而已幼多力善射能以指彈碎羊骨射禽獸無不命中及年十五遂不復畋獵常謂史官曰時事不可以不直書人君威福在已無能制之者若史䇿復不書其惡將何所畏忌邪彭城王􅎰與任城王澄謀以陳顯逹去尚未逺恐其覆相掩逼乃祕不發䘮徙御卧輿唯二王與左右數人知之􅎰出入神色無異奉膳進藥可决外奏一如平日數日至宛城夜進卧輿於郡聽事得加棺斂還載卧輿内外莫有知者遣中書舍人張儒奉詔徵太子密以凶問告留守于烈烈處分行留舉止無變太子至魯陽遇梓宮乃􅀤䘮丁巳即位大赦彭城王􅎰跪授遺敕數紙東宫官屬多疑􅎰有異志密防之而􅎰推誠盡禮卒無間隙咸陽王禧至魯陽留城外以察其變乆之乃入謂􅎰曰汝此行不唯勤勞亦實危險􅎰曰兄年長識高故知有夷險彥和握蛇騎虎不覺艱難禧曰汝恨吾後至耳􅎰等以高祖遺詔賜馮后死北海王詳使長秋卿白整入授后藥后走呼不肯飲曰官豈有此是諸王軰殺我耳整執持彊之乃飲藥而卒䘮至洛城南咸陽王禧等知后審死相視曰設無遺詔我兄弟亦當决策去之豈可令失行婦人宰制天下殺我軰也謚曰幽皇后
