body:
  text: 五月癸亥加撫軍大將軍始安王遥光開府儀同三司丙申魏􅁙孝文帝於長陵廟號高祖魏世宗欲以彭城王􅎰為相􅎰屢陳遺㫖請遂素懐帝對之悲慟􅎰懇請不已乃以􅎰為使持節侍中都督冀定等七州諸軍事驃騎大將軍開府儀同三司定州刺史􅎰猶固辭帝不許乃之官魏任城王澄以王肅羈旅位加已上意頗不平會齊人降者嚴叔懋告肅謀逃還江南澄輙禁止肅表稱謀叛案驗無實咸陽王禧等奏澄擅禁宰輔免官還第尋出為雍州刺史六月戊辰魏追尊皇妣高氏為文昭皇后配饗高祖增脩舊冢號終寧陵追賜后父颺爵勃海公謚曰敬以其嫡孫猛襲爵封后兄肇為平原公肇弟顯為澄城公三人同日受封魏主素未識諸舅始賜衣幘引見皆惶懼失措數日之間富貴赫弈秋八月戊申魏用高祖遺詔三夫人以下皆遣還家帝自在東宮不好學唯嬉戲無度性重澀少言及即位不與朝士相接專親信宦官及左右御刀應敕等是時揚州刺史始安王遥光尚書令徐孝嗣右僕射江袥右將軍蕭坦之侍中江祀衛尉劉暄更直内省分日帖敕雍州刺史蕭衍聞之謂從舅録事參軍范陽張􅀪䇿曰一國三公猶不堪况六貴同朝勢必相圖亂將作矣避禍圖福無如此州但諸弟在都恐罹世患當更與益州圖之耳乃密與􅀪䇿修武備它人皆不得預謀招聚驍勇以萬數多伐材竹沈之檀溪積茅如岡阜皆不之用中兵參軍東平呂僧珍覺其意亦私具櫓數百張先是僧珍為羽林監徐孝嗣欲引置其府僧珍知孝嗣不能乆固求從衍是時衍兄懿罷益州刺史還仍行郢州事衍使􅀪䇿説懿曰今六貴比肩人自畫敕爭權睚眦理相圖滅主上自東宮素無令譽媟近左右慓輕忍虐安肯委政諸公虛坐主諾嫌忌積乆必大行誅戮始安欲為趙王倫形迹已見然性猜量狹徒為禍階蕭坦之忌克陵人徐孝嗣聽人穿鼻江祏無斷劉暄闇弱一朝禍􅀤中外土崩吾兄弟幸守外藩宜為身計及今猜防未生當悉召諸弟恐異時㧞足無路矣郢州控帶荆湘雍州士馬精彊世治則竭誠本朝世亂則足以匡濟與時進退此萬全之䇿也若不早圖後悔無及􅀪䇿文自説懿曰以卿兄弟英武天下無敵據郢雍二州為百姓請命廢昏立明易於反掌此桓文之業也勿為豎子所欺取笑身後雍州揣之已熟願善圖之懿不從衍乃迎其弟驃騎外兵參軍偉及西中郎外兵參軍憺至襄陽初高宗雖顧命羣公而多寄腹心在江祏兄弟二江更直殿内動止闗之帝稍欲行意徐孝嗣不能奪蕭坦之時有異同而祏執制堅確帝深忿之帝左右會稽茹法珍吳興梅蟲兒等為帝所委任祏常裁折之法珍等切齒徐孝嗣謂祏曰主上稍有異同詎可盡相乖反祏曰但以見付必無所憂帝失徳寖彰祏議廢帝立江夏王寶􅀇劉暄嘗為寶􅀇郢州行事執事過刻有人獻馬寶􅀇欲觀之暄曰馬何用觀妃索煮肫帳下諮暄暄曰旦已煮鵝不煩復此寶􅀇恚曰舅殊無渭陽情暄由是忌寶􅀇不同祏議更欲立建安王寶寅祏密謀於始安王遥光遥光自以年長意欲自取以微㫖動祏祏弟祀亦以少主難保勸祏立遥光祏意回惑以問蕭坦之坦之時居母䘮起復為領軍將軍謂祏曰明帝立已非次天下至今不服若復為此恐四方瓦解我期不敢言耳遂還宅行䘮祏祀密謂吏部郎謝朓曰江夏年少脱不堪負荷豈可復行廢立始安年長入纂不乖物望非以此要富貴政是求安國家耳遥光又遣所親丹楊丞南陽劉渢密致意於朓欲引以為黨朓不荅頃之遥光以脁兼知衛尉事脁懼即以祏謀告太子右衛率左興盛興盛不敢發朓又説劉暄曰始安一旦南面則劉渢劉晏居卿今地但以卿為反覆人耳晏者遥光城局參軍也暄陽驚馳告遥光及祏遥光欲出脁為東陽郡脁常輕祏祏尉議除之遥光乃收朓付廷尉與孝嗣祏暄等連名啟朓扇動内外妄貶乗輿竊論宫禁間謗親賢輕議朝宰朓遂死獄中暄以遥光若立己失元舅之尊不肯同祏議故祏遲疑乆不决遥光大怒遣左右黄曇慶刺暄於青溪橋曇慶見暄部伍多不敢􅀤暄覺之遂􅀤祏謀帝命收祏兄弟時祀直内殿疑有異遣信報祏曰劉暄似有異謀今作何計祏曰政當靜以鎮之俄有詔召祏入見停中書省初袁文曠以斬王敬則功當封祏執不與帝使文曠取祏文曠以刀環築其心曰復能奪我封不并弟祀皆死劉暄聞祏等死眠中大驚投出户外問左右收至未良乆意定還坐大悲曰不念江行自痛也帝自是無所忌憚益得自恣日夜與近習於後堂皷叫戲馬常以五更就寢至晡乃起羣臣節朔朝見晡後方前或際闇遣出臺閣案奏月數十日乃報或不知所在宦者以裹魚肉還家並是五省黄案帝常習騎致適顧謂左右曰江祏常禁吾乗馬小子若在吾豈能得此因問祏親戚餘誰對曰江祥今在冶帝於馬上作敕賜祥死始安王遥光素有異志與其弟荆州刺史遥欣密謀舉兵據東府使遥欣自江陵引兵急下刻期將發而遥欣病卒江祏被誅帝召遥光入殿告以祏罪遥光懼還省即陽狂號哭遂稱疾不復入臺先是遥光弟豫州刺史遥昌卒其部曲皆歸遥光及遥欣䘮還停東府前渚荆州衆力送者甚盛帝既誅二江慮遥光不自安欲遷為司徒使還第召入諭㫖遥光恐見殺乙卯晡時收集二州部曲於東府東門召劉渢劉晏等謀舉兵以討劉暄為名夜遣數百人破東冶出囚於尚方取仗又召驍騎將軍垣歷生歷生隨信而至蕭坦之宅在東府城東遥光遣人掩取之坦之露􅃝踰墻走向臺道逢遊邏主顏端執之坦之告以遥光反不信自往詗問知實乃以馬與坦之相隨入臺遥光又掩取尚書左僕射沈文季於其宅欲以為都督會文季已入臺垣歷生説遥光帥城内兵夜攻臺輦荻燒城門曰公但乗轝隨後反掌可克遥光狐疑不敢出天稍曉遥光戎服出聽事命上仗登城行賞賜歷生復勸出軍遥光不肯冀臺中自有變及日出臺軍稍至臺中始聞亂衆情惶惑向曉有詔召徐孝嗣孝嗣入人心乃安左將軍沈約聞變馳入西掖門或勸戎服約曰臺中方擾攘見我戎服或者謂同遥光乃朱衣而入丙辰詔曲赦建康中外戒嚴徐孝嗣以下屯衛宫城蕭坦之帥臺軍討遥光孝嗣内自疑懼與沈文季戎服共坐南掖門上欲與之共論世事文季輒引以佗辭終不得及蕭坦之屯湘宫寺左興盛屯東籬門鎮軍司馬曹虎屯青溪大橋衆軍圍東城三面燒司徒府遥光遣垣歷生從西門出戰臺軍屢敗殺軍主桑天愛遥光之起兵也問諮議參軍蕭暢暢正色不從戊午暢與撫軍長史沈昭略潜自南門出詣臺自歸衆情大沮暢衍之弟昭略文季之兄子也己未垣歷生從南門出戰因棄矟降曹虎虎命斬之遥光大怒於牀上自踊使殺歷生子其晩臺軍以火箭燒東北角樓至夜城潰遥光還小齋帳中著衣帢坐秉燭自照令人反拒齋閤皆重闗左右並踰屋散出臺軍主劉國寶等先入遥光聞外兵至滅燭扶匐牀下軍人排閤入於暗中牽出斬之臺軍入城焚燒室屋且盡劉渢走還家為人所殺荆州將潘紹聞遥光作亂謀欲應之西中郎司馬夏侯詳呼紹議事因斬之州府以安己巳以徐孝嗣為司空加沈文季鎮軍將軍侍中僕射如故蕭坦之為尚書右僕射丹楊尹右將軍如故劉暄為領軍將軍曹虎為散騎常侍右衛將軍皆賞平始安之功也魏南徐州刺史沈陵来降陵文季之族子也時魏徐州刺史京兆王愉年少軍府事皆决於兼長史盧淵淵知陵將叛敕諸城潜為之僃屢以聞於魏朝魏朝不聽陵遂殺將佐帥宿預之衆来奔濵淮諸戍以有僃得全陵在邉歷年隂結邉州豪傑陵既叛郡縣多捕送陵黨淵皆撫而赦之唯歸罪於陵衆心乃安閏月丙子立江陵公寶覽為始安王奉靖王後以沈陵為北徐州刺史江祏等既敗帝左右捉刀應敕之徒皆恣横用事時人謂之刀敕蕭坦之剛很而專嬖倖畏而憎之遥光死二十餘日帝遣延明主帥黄文濟將兵圍坦之宅殺之并其子袐書郎賞坦之從兄翼宗為海陵太守未􅀤坦之謂文濟曰從兄海陵宅故應無它文濟曰海陵宅在何處坦之以告文濟白帝帝仍遣收之檢其家至貧唯有質錢帖數百還以啟帝原其死繫尚方茹法珍等譛劉暄有異志帝曰暄是我舅豈應有此直閤新蔡徐丗標曰明帝乃武帝同堂恩遇如此猶滅武帝之後舅焉可信邪遂殺之曹虎善於誘納日食荒客當數百人晩節吝嗇罷雍州有錢五千萬它物稱是帝疑虎舊將且利其財遂殺之坦之暄虎所新除官皆未及拜而死初高宗臨殂以隆昌事戒帝曰作事不可在人後故帝數與近習謀誅大臣皆􅀤於倉猝决意無疑於是大臣人人莫能自保九月丁未以豫州刺史裴叔業為南兖州刺史征虜長史張冲為豫州刺史壬戌以頻誅大臣大赦丙戌魏主謁長陵欲引白衣左右吳人茹皓同車皓奮衣將登給事黄門侍郎元匡進諫帝推之使下皓失色而退匡新城之子也益州刺史劉季連聞帝失徳遂自驕恣用刑嚴酷蜀人怨之是月遣兵襲中水不克於是蜀人趙續伯等皆起兵作亂季連不能制枝江文忠公徐孝嗣以文士不顯同異故名位雖重猶得乆存虎賁中郎將許凖為孝嗣陳説事機勸行廢立孝嗣遲疑乆之謂必無用于戈之理須帝出遊閉城門召百僚集議廢之雖有此懐終不能决諸嬖倖亦稍憎之西豐忠憲侯沈文季自託老病不䂊朝權侍中沈昭略謂文季曰叔父行年六十為貟外僕射欲求自免豈可得乎文季笑而不應冬十月乙未帝召孝嗣文季昭略入華林省文季登車顧曰此行恐往而不反帝使外監茹法珍賜以藥酒昭略怒罵孝嗣曰廢昏立明古今令典宰相無才致有今日以甌擲其面曰使作破面鬼孝嗣飲藥酒至斗餘乃卒孝嗣子演尚武康公主况尚山隂公主皆坐誅昭略弟昭光聞收至家人勸之逃昭光不忍捨其母入執母手悲泣收者殺之昭光兄子曇亮逃已得免聞昭光死歎曰家門屠滅何以生為絶吭而死初太尉陳顯逹自以高武舊將當高宗之世内懐危懼深自貶損常乗朽弊車道從鹵簿止用羸小者十數人嘗侍宴酒酣啟高宗借枕高宗令與之顯逹撫枕曰臣年衰老富貴已足唯欠枕枕死特就陛下乞之高宗失色曰公醉矣顯逹以年禮告退高宗不許及王敬則反時顯逹將兵拒魏始安王遥光疑之啟高宗欲追軍還會敬則平乃止及帝即位顯逹彌不樂在建康得江州甚喜嘗有疾不令治既而自愈意甚不恱聞帝屢誅大臣傳云當遣兵襲江州十一月丙辰顯逹舉兵於尋陽令長史庾􅀪逺等與朝貴書數帝罪惡云欲奉建安王為主須京塵一靜西迎大駕乙丑以護軍將軍崔慧景為平南將軍督衆軍擊顯逹後軍將軍胡松驍騎將軍李叔獻帥水軍據梁山左衛將軍左興盛督前鋒軍屯杜姥宅十二月癸未以前輔國將軍楊集始為秦州刺史陳顯逹發尋陽敗胡松於采石建康震恐甲申軍於新林左興盛帥諸軍拒之顯逹多置屯火於岸側潜軍夜渡襲宫城乙酉顯逹以數千人登落星岡新亭諸軍聞之奔還宫城大駭閉門設守顯逹執馬矟從歩兵數百於西州前與臺軍戰再合顯逹大勝手殺數人矟折臺軍繼至顯逹不能抗退走至西州後騎官趙潭汪刺顯逹墜馬斬之諸子皆伏誅長史庾􅀪遠炳之之子也斬於朱雀航將刑索帽著之曰子路結纓吾不可以不冠而死謂觀者曰吾非賊乃是義兵為諸軍請命耳陳公太輕事若用吾言天下將免塗炭􅀪逺子子曜抱父乞代命并殺之帝既誅顯逹益自驕恣漸出遊走又不欲人見之每出先驅斥所過人家唯置空宅尉司擊鼓蹋圍鼓聲所聞便應奔走不暇衣履犯禁者應手格殺一月凡二十餘出出輙不言定所東西南北無處不驅常以三四更中鼓聲四出火光照天幡㦸横路士民喧走相隨老小震驚啼號塞道處處禁斷不知所過四民廢業樵蘇路斷吉凶失時乳婦寄産或輿病棄尸不得殯􅁙巷陌懸幔為高鄣置仗人防守謂之屏除亦謂之長圍嘗至沈公城有一婦人臨産不去因剖腹視其男女又嘗至定林寺有沙門老病不能去藏革間命左右射之百箭俱􅀤帝有膂力牽弓至三斛五斗又好擔幢白虎幢高七丈五尺於齒上擔之折齒不倦自制擔幢校具伎衣飾以金玉侍衛滿側逞諸變態曾無愧色學乗馬於東冶營兵俞靈韻常著織成袴褶金薄㡌執七寶矟急裝縛袴凌冒雨雪不避阮穽馳騁渴乏輙下馬觧取腰邊蠡器酌水飲之復上馬馳去又選無賴小人善走者為逐馬左右五百人常以自隨或於市側過親幸家環回宛轉周徧城邑或出郊射雉置射雉場二百九十六處奔走往來略不暇息王肅為魏制官品百司皆如江南之制凡九品品各有二侍中郭祚兼吏部尚書祚清謹重惜官位毎有銓授雖得其人必徘徊乆之然後下筆曰此人便已貴矣人以是多怨之然所用者無不稱職資治通鑑卷第一百四十二
