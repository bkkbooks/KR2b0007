front:
  text: 不知長沙厲王及皇甫商已死重獲御史騶人問曰我弟將兵來欲至未騶人曰已為河間王所害重失色立殺騶人於是城中知無外救共殺重以降顒以馮翊太守張輔為秦州刺史六月甲子安豐元矦王戎薨于郟張輔至秦州殺天水太守封尚欲以立威又召隴西太守韓稚稚子朴勒兵擊輔輔軍敗死涼州司馬楊胤言於張軌曰韓稚擅殺刺史明公杖鉞一方不可以不討軌從之遣中督䕶汜瑗帥衆二萬討稚稚詣軌降未㡬鮮卑若羅拔能冦涼州軌遣司馬宋配擊之軌拔能俘十餘萬口威名大振
