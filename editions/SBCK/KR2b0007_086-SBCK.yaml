body:
  text: 漢王淵攻東嬴公騰騰復乞師於拓跋猗㐌衛操勸猗㐌助之猗㐌帥輕騎數千救騰斬漢將綦母豚詔假猗㐌大單于加操右將軍甲申猗㐌卒子普根代立東海中尉劉洽以張方劫遷車駕勸司空越起兵討之秋七月越傳檄山東征鎮州郡云欲糾帥義旅奉迎天子還復舊都東平王楙聞之懼長史王脩說楙曰東海宗室重望今興義兵公宜舉徐州以授之則免於難且有克讓之美矣楙從之越乃以司空領徐州都督楙自為兖州刺史詔即遣使者劉䖍授之是時越兄弟並據方任於是范陽王虓及王浚等共推越為盟主越輒選置刺史以下朝士多赴之成都王頴既廢河北人多憐之頴故將公師藩等自稱將軍起兵於趙魏衆至數萬初上黨武鄉羯人石勒有膽力善騎射并州大饑建威將軍閻粹說東嬴公騰執諸胡於山東賣充軍實勒亦被掠賣為茌平人師懽奴懽奇其狀貌而免之懽家鄰於馬牧勒乃與牧帥汲桑結壯士為群盜及公師藩起桑與勒帥數百騎赴之桑始命勒以石為姓勒為名藩攻陷郡縣殺二千石長史轉前攻鄴平昌公模甚懼范陽王虓遣其將茍晞救鄴與廣平太守譙國丁紹共擊藩走之八月辛丑大赦司空越以琅邪王睿為平東將軍監徐州諸軍事留守下邳睿請王導為司馬委以軍事越帥甲卒三萬西屯蕭縣范陽王虓自許屯于滎陽越承制以豫州刺史劉喬為冀州刺史以范陽王虓領豫州刺史喬以虓非天子命發兵拒之虓以劉琨為司馬越以劉蕃為淮北䕶軍劉輿為頴川太守喬上尚書列輿兄弟罪惡因引兵攻許遣其長子祐將兵拒越於蕭縣之靈壁越兵不能進東平王楙在兖州徴求不已郡縣不堪命范陽王虓遣茍晞還兖州徙楙都督青州楙不受命背山東諸矦與劉喬合太宰顒聞山東兵起甚懼以公師藩為成都王穎起兵壬午表穎為鎮軍大將軍都督河北諸軍事給兵千人以盧志為魏郡太守隨穎鎮鄴欲以撫安之又遣建武將軍吕朗屯洛陽顒發詔令東海王越等各就國越等不從㑹得劉喬上事冬十月丙子下詔稱劉輿迫脅范陽王虓造構凶逆其令鎮南大將軍劉弘平南將軍彭城王釋征東大將軍劉準各勒所統與劉喬并力以張方為大都督統精卒十萬與吕朗共㑹許昌誅輿兄弟釋宣帝弟子穆王權之孫也丁丑顒使成都王穎領將軍樓褒等前軍騎將軍石超領北中郎將王闡等據河橋為劉喬繼援進喬鎮東將軍假節劉弘遺喬及司空越書欲使之解怨釋兵同奬王室皆不聽弘又上表曰自頃兵戈紛亂猜禍鋒生疑隙構於羣王災難延于宗子今夕為忠明旦為逆翩其反而互為戎首載籍以來骨肉之禍未有如今者也臣竊悲之今邊陲無備豫之儲中華有杼軸之困而股肱之臣不惟國體職競尋常自相楚剝萬一四夷乗虛為變此亦猛虎交􅃲自效於卞莊者矣臣以為宜速發明詔詔越等令兩釋猜嫌各保分局自今以後其有不被詔書擅興兵馬者天下共伐之時太宰顒方拒􅀜東倚喬為助不納其言喬乗虛襲許破之劉琨將兵救許不及遂與兄輿及范陽王虓俱犇河北琨父母為喬所執劉弘以張方殘暴知顒必敗乃遣參軍劉盤為督護帥諸軍受司空越節度時天下大亂弘專督江漢威行南服謀事有成者則曰某人之功如有負敗則曰老子之罪每有興發手書守相丁寧欵宻所以人皆感悅争赴之咸曰得劉公一紙書賢於十部從事前廣漢太守辛冉說弘以從横之事弘怒斬之有星孛于北斗平昌公模遣將軍宋胄趣河橋十一月立節將軍周權詐被檄自稱平西將軍復立羊后洛陽令何喬攻權殺之復廢羊后太宰顒矯詔以羊后屢為姦人所立遣尚書田淑敕留臺賜后死詔書屢至司􅀠校尉劉暾等上奏固執以為羊庶人門户殘破廢放空宫門禁峻宻無緣得與姦人搆亂衆無愚智皆謂其冤今殺一枯窮之人而令天下傷慘何益於治顒怒遣吕朗收暾暾犇青州依高宻王略然羊后亦以是得免十二月吕朗等東屯滎陽成都王穎進據洛陽劉琨說冀州刺史太原温羡使讓位於范陽王虓虓領冀州遣琨詣幽州乞師於王浚浚以突騎資之擊王闡於河上殺之琨遂與虓引兵濟河斬石超於滎陽劉喬自考城引退虓遣琨及督䕶田徽東擊東平王楙於廩丘楙走還國琨徽引兵東迎越擊劉祐於譙祐敗死喬衆遂潰喬犇平氏司空越進屯陽武王浚遣其將祁弘帥突騎鮮卑烏桓為越先驅初陳敏既克石冰自謂勇略無敵有割據江東之志其父怒曰滅我門者必此兒也遂以憂卒敏以䘮去職司空越起敏為右將軍前鋒都督越為劉祐所敗敏請東歸收兵遂據歴陽叛呉王常侍甘卓棄官東歸至歴陽敏為子景娶卓女使卓假稱皇太弟令拜敏揚州刺史敏使弟恢及别將錢端等南略江州弟斌東略諸郡江州刺史應邈楊州刺史劉機丹楊太守王曠皆棄官走敏遂據有江東以顧榮為右將軍賀循為丹楊内史周玘為安豐太守凡江東豪傑名士咸加收禮為將軍郡守者四十餘人或有老疾就加秩命循詐為狂疾得免乃以榮領丹楊内史玘亦稱疾不之郡敏疑諸名士終不為己用欲盡誅之榮說敏曰中國䘮亂胡夷内侮觀今日之勢不能復振百姓將無遺種江南雖經石冰之亂人物尚全榮常憂無孫劉之主有以存之今將軍神武不世勲效已著帶甲數萬舳艫山積若能委信君子使各得盡懷散蔕芥之嫌塞讒諂之口則上方數州可傳檄而定不然終不濟也敏乃止敏命僚佐推己為都督江東諸軍事大司馬楚公加九錫列上尚書稱被中詔自江入沔漢奉迎鑾駕太宰顒以張光為順陽太守帥步騎五千詣荆州討敏劉弘遣江夏太守陶侃武陵太守苗光屯夏口又遣南平太守汝南應詹督水軍以繼之侃與敏同郡又同嵗舉吏隨郡内史扈懷言於弘曰侃居大郡統彊兵脫有異志則荆州無東門矣弘曰侃之忠能吾得之已久必無是也侃聞之遣子洪及兄子臻詣弘以自固弘引為參軍資而遣之曰賢叔征行君祖母年高便可歸也匹夫之交尚不負心況大丈夫乎敏以陳恢為荆州刺史冦武昌弘加侃前鋒督䕶以禦之侃以運船為戰艦或以為不可侃曰用官船擊官賊何為不可侃與恢戰屢破之又與皮初張光苗光共破錢端於長政南陽太守衛展說弘曰張光太宰腹心公既與東海宜斬光以明向背弘曰宰輔得失豈張光之罪危人自安君子弗為也乃表光殊勲乞加遷擢是嵗離石大饑漢王淵徙屯􅀺亭就邸閣榖留太尉宏守離石使大司農卜豫運糧以給之光熈元年春正月戊子朔日有食之初太弟中庶子蘭陵繆播有寵於司空越播從弟右衛率胤太宰顒前妃之弟也越之起兵遣播胤詣長安說顒令奉帝還洛約與顒分陜為伯顒素信重播兄弟即欲從之張方自以罪重恐為誅首謂顒曰今據形勝之地國富兵彊奉天子以號令誰敢不從柰何拱手受制於人顒乃止及劉喬敗顒懼欲罷兵與山東和解恐張方不從猶豫未决方素與長安富人郅輔親善以為帳下督顒參軍河間畢垣嘗為方所侮因說顒曰張方久屯霸上聞山東兵盛盤桓不進宜防其未萌其親信郅輔具知其謀繆播繆胤復說顒宜急斬方以謝山東可不勞而定顒使人召輔垣迎說輔曰張方欲反人謂卿知之王若問卿何辭以對輔驚曰實不聞方反為之柰何垣曰王若問卿但言爾爾不然必不免禍輔入顒問之曰張方反卿知之乎輔曰爾顒曰遣卿取之可乎又曰爾顒於是使輔送書於方因殺之輔既昵於方持刀而入守閤者不疑方火下發函輔斬其頭還報顒以輔為安定太守送方頭於司空越以請和越不許宋胄襲河橋樓褒西走平昌公模遣前鋒督䕶馮嵩㑹宋胄逼洛陽成都王穎西犇長安至華隂聞顒已與山東和親留不敢進吕朗屯滎陽劉琨以張方首示之遂降甲子司空越遣祁弘宋胄司馬纂帥鮮卑西迎車駕以周馥為司􅀠校尉假節都督諸軍屯澠池三月惤令劉柏根反衆以萬數自稱惤公王彌帥家僮從之柏根以彌為長史彌從父弟桑為東中郎將柏根宼臨淄青州都督高宻王略使劉暾將兵拒之暾兵敗犇洛陽略走保聊城王浚遣將討柏根斬之王彌亡入長廣山為羣盜寧州頻嵗饑疫死者以十萬計五苓夷彊盛州兵屢敗吏民流入交州者甚衆夷遂圍州城李毅疾病救援路絶乃上疏言不能式遏冦虐坐待殄斃若不垂矜恤乞降大使及臣尚存加臣重辟若臣已死陳尸為戮朝廷不報積數年子釗自洛往省之未至毅卒毅女秀明達有父風衆推秀領寧州事秀奬厲戰士嬰城固守城中糧盡炙鼠抜草而食之伺夷稍怠輒出兵掩擊破之范長生詣成都成都王雄門迎執板拜為丞相尊之曰范賢夏四月己巳司空越引兵屯温初太宰顒以為張方死東方兵必可解既而東方兵聞方死争入闗顒悔之乃斬郅輔遣弘農太守彭隨北地太守刁黙將兵拒祁弘等於湖五月壬辰弘等擊隨黙大破之遂西入闗又敗顒將馬瞻郭偉於霸水顒單馬逃入太白山弘等入長安所部鮮卑大掠殺二萬餘人百官犇散入山中拾橡實食之己亥弘等奉帝乗牛車東還以太弟太保梁栁為鎮西將軍守闗中六月丙辰朔帝至洛陽復羊后辛未大赦改元馬瞻等入長安殺梁栁與始平太守梁邁共迎太宰顒於南山弘農太守裴廙秦國内史賈龕安定太守賈疋等起兵擊顒斬馬瞻梁邁疋詡之曽孫也司空越遣督護糜晃將兵擊顒至鄭顒使平北將軍牽秀屯馮翊顒長史楊騰詐稱顒命使秀罷兵騰遂殺秀􅀜中皆服於越顒保城而已成都王雄即皇帝位大赦改元曰晏平國號大成追尊父特曰景皇帝廟號始祖尊王太后曰皇太后以范長生為天地太師復其部曲皆不豫征税諸將恃恩玄争班位尚書令閻式上疏請考漢晉故事立百官制度從之秋七月乙酉朔日有食之八月以司空越為太傅録尚書事范陽王虓為司空鎮鄴平昌公模為鎮東大將軍鎮許昌王浚為驃騎大將軍都督東夷河北諸軍事領幽州刺史越以吏部郎頴川􅁃敳為軍諮祭酒前太弟中庶子胡母輔之為從事中郎黄門侍郎河南郭象為主簿鴻臚丞阮脩為行參軍謝鯤為掾輔之薦樂安光逸於越越亦辟之敳等皆尚虛玄不以世務嬰心縱酒放誕敳殖貨無厭象薄行好招權越皆以其名重於世故辟之祁弘之入闗也成都王穎自武闗犇新野㑹新城元公劉弘卒司馬郭勱作亂欲迎穎為主治中順陽郭舒奉弘子璠以討勱斬之詔南中郎將劉陶收穎穎北渡河犇朝歌收故將士得數百人欲赴公師藩九月頓丘太守馮嵩執之送鄴范陽王虓不忍殺而幽之公師藩自白馬南渡河兖州刺史茍晞討斬之進東嬴公騰爵為東燕王平昌公模為南陽王冬十月范陽王虓薨長史劉輿以成都王穎素為鄴人所附祕不發䘮偽令人為臺使稱詔夜賜穎死并殺其二子穎官屬先皆逃散惟盧志隨從至死不怠收而殯之太傅越召志為軍諮祭酒越將召劉輿或曰輿猶膩也近則汚人及至越疎之輿宻視天下兵簿及倉庫牛馬器械水陸之形皆黙識之時軍國多事每㑹議自長史潘淊以下莫知所對輿應機辨畫越傾膝酬椄即以為左長史軍國之務悉以委之輿說越遣其弟琨鎮并州以為北面之重越表琨為并州刺史以東燕王騰為車騎將軍都督鄴城諸軍事鎮鄴十一月己巳夜帝食䴵中毒庚午崩于顯陽殿羊后自以於太弟熾為嫂恐不得為太后將立清河王覃侍中華混諫曰太弟在東宫已久民望素定今日寧可易乎即露板馳告太傅越召太弟入宫后已召覃至尚書閤疑變託疾而返癸酉太弟即皇帝位大赦尊皇后曰惠皇后居弘訓宫追尊母王才人曰皇太后立妃梁氏為皇后懷帝始遵舊制於東堂聽政每至宴㑹輒與羣官論衆務考經籍黄門侍郎傅宣歎曰今日復見武帝之世矣十二月壬午朔日有食之太傅越以詔書徴河間王顒為司徒顒乃就徴南陽王模遣其將梁臣邀之於新安車上扼殺之并殺其三子辛丑以中書監温羡為左光禄大夫領司徒尚書左僕射王衍為司空己酉葬惠帝于太陽陵劉琨至上黨東燕王騰即自井陘東下時并州饑饉數為胡冦所掠郡縣莫能自保州將田甄甄弟蘭任祉祁濟李惲薄盛等及吏民萬餘人悉隨騰就榖冀州號為乞活所餘之户不滿二萬冦賊縱横道路斷塞琨募兵上黨得五百人轉鬬而前至晉陽府寺焚毁邑野蕭條琨撫循勞徠流民稍集孝懷皇帝上永嘉元年春正月癸丑大赦改元吏部郎周穆太傅越之姑子也與其妹夫御史中丞諸葛玫說越曰主上之為太弟張方意也清河王本太子公宜立之越不許重言之越怒斬之二月王彌冦青徐二州自稱征東大將軍攻殺二千石太傅越以公車令東萊鞠羡為本郡太守以討彌彌擊殺之陳敏刑政無章不爲英俊所附子弟凶暴所在爲患顧榮周玘等憂之廬江内史華譚遺榮等書曰陳敏盜據呉㑹命危朝露諸君或剖符名郡或列為近臣而更辱身姦人之朝降節叛逆之黨不亦羞乎呉武烈父子皆以英傑之才繼承大業今以陳敏凶狡七弟頑宂欲躡桓王之高蹤蹈大皇之絶軌逺度諸賢猶當未許也皇輿東返俊彦盈朝將舉六師以清建業諸賢何顔復見中州之士邪榮等素有圖敏之心及得書甚慙宻遣使報征東大將軍劉凖使發兵臨江已為内應翦髪為信準遣揚州刺史劉機等出歴陽討敏敏使其弟廣武將軍昶將兵數萬屯烏江歴陽太守宏屯牛渚敏弟處知顧榮等有貳心勸敏殺之敏不從昶司馬錢廣周玘同郡人也玘密使廣殺昶因宣言州下已殺敏敢動者誅三族廣勒兵朱雀橋南敏遣甘卓討廣堅甲精兵盡委之顧榮慮敏疑之故往就敏敏曰卿當四出鎮衛豈得就我邪榮乃出與周玘共說甘卓曰若江東之事可濟當共成之然卿觀兹事勢當有濟理不敏既常才政令反覆計無所定其子弟各已驕矜其敗必矣而吾等安然受其官禄事敗之日使江西諸軍函首送洛題曰逆賊顧榮甘卓之首此萬世之辱也卓遂詐稱疾迎女斷橋收船南岸與玘榮及前松滋矦相丹楊紀瞻共攻敏敏自帥萬餘人討卓軍人隔水語敏衆曰本所以戮力陳公者正以顧丹楊周安豐耳今皆異矣汝等何爲敏衆狐疑未决榮以白羽扇麾之衆皆潰去敏單騎北走追獲之於江乗歎曰諸人誤我以至今日謂弟處曰我負卿卿不負我遂斬敏於建業夷三族於是㑹稽等郡盡殺敏諸弟時平東將軍周馥代劉凖鎮壽春三月己未朔馥傳敏首至京師詔徴顧榮為侍中紀瞻為尚書郎太傅越辟周玘為參軍陸玩為掾玩機之從弟也榮等至徐州聞北方愈亂疑不進越與徐州刺史裴盾書曰若榮等顧望以軍禮發遣榮等懼逃歸盾楷之兄子越妃兄也西陽夷冦江夏太守楊珉請督將議之諸將争獻方略騎督朱伺獨不言珉曰朱將軍何以不言伺曰諸人以舌擊賊伺惟以力耳珉又問將軍前後擊賊何以常勝伺曰兩敵共對惟當忍之彼不能忍我能忍是以勝耳珉善之詔追復楊太后尊號丁夘改􅁙之諡曰武悼庚午立清河王覃弟豫章王詮為皇太子辛未大赦帝觀覽大政留心庶事太傅越不恱固求出藩庚辰越出鎮許昌以高宻王略為征南大將軍都督荆州諸軍事鎮襄陽南陽王模為征西大將軍都督秦雍梁益四州諸軍事鎮長安東燕王騰為新蔡王都督司冀二州諸軍事仍鎮鄴公師藩既死汲桑逃還苑中更聚衆劫掠郡縣自稱大將軍聲言為成都王報仇以石勒為前驅所嚮輒克署勒掃虜將軍遂進攻鄴時鄴中府庫空竭而新蔡武哀王騰資用甚饒騰性吝嗇無所振惠臨急乃賜將士米各數􅂛帛各丈尺以是人不為用夏五月桑大破魏郡太守馮嵩長驅入鄴騰輕騎出犇為桑將李豐所殺桑出成都王穎棺載之車中每事啓而後行遂燒鄴宫火旬日不滅殺士民萬餘人大掠而去濟自延津南擊兖州太傅越大懼使苟晞及將軍王讃等討之秦州流民鄧定訇氐等據成固冦掠漢中梁州刺史張殷遣巴西太守張燕討之鄧定等飢窘詐降於燕且賂之燕為之緩師定宻遣訇氐求救於成成主雄遣太尉離司徒雲司空璜將兵二萬救定與燕戰大破之張殷及漢中太守杜孟治棄城走積十餘日離等引還盡徙漢中民於蜀漢中人句方白落帥吏民還守南鄭石勒與茍晞等相持於平原陽平間數月大小三十餘戰玄有勝負秋七月己酉朔太傅越屯官渡爲晞聲援己未以琅邪王睿爲安東將軍都督楊州江南諸軍事假節鎮建業八月己夘朔苟晞擊汲桑於東武陽大破之桑退保清淵分荆州江州八郡爲湘州九月戊申琅邪王睿至建業睿以安東司馬王導爲謀主推心親信每事咨焉睿名論素輕呉人不附居久之士大夫莫有至者導患之㑹睿出觀禊導使睿乗肩轝具威儀導與諸名勝皆騎從紀瞻顧榮等見之驚異相帥拜於道左導因說睿曰顧榮賀循此土之望宜引之以結人心二子既至則無不來矣睿乃使導躬造循榮二人皆應命而至以循爲呉國内史榮爲軍司加散騎常侍凡軍府政事皆與之謀議又以紀瞻為軍祭酒卞壼為從事中郎周玘為倉曹屬琅邪劉超為舎人張闓及魯國孔衍為參軍壼粹之子闓昭之曽孫也王導說睿謙以接士儉以足用以清靜為政撫綏新舊故江東歸心焉睿初至頗以酒廢事導以為言睿命酌引觴覆之於此遂絶茍晞追擊汲桑破其八壘死者萬餘人桑與石勒収餘衆將犇漢冀州刺史丁紹邀之於赤橋又破之桑犇馬牧勒犇樂平太傅越還許昌加茍晞撫軍將軍都督青兖諸軍事丁紹寧北將軍監冀州諸軍事皆假節晞屢破彊冦威名甚盛善治繁劇用灋嚴峻其從母依之晞奉養甚厚從母子求為將晞不許曰吾不以王灋貸人將無後悔邪固求之晞乃以為督䕶後犯灋晞杖節斬之從母叩頭救之不聽既而素服哭之曰殺卿者兖州刺史哭弟者茍道將也胡部大張㔨督馮莫突等擁衆數千壁于上黨石勒往從之因說㔨督等曰劉單于舉兵擊晉部大拒而不從自度終能獨立乎曰不能勒曰然則安可不早有所屬今部落皆已受單于賞募往往聚議欲叛部大而歸單于矣㔨督等以為然冬十月㔨督等隨勒單騎歸漢漢王淵署㔨督為親漢王莫突為都督部大以勒為輔漢將軍平晉王以統之烏桓張伏利度有衆二千壁于樂平淵屢招不能致勒僞獲罪於淵往犇伏利度伏利度喜結爲兄弟使勒帥諸胡寇掠所向無前諸胡畏服勒知衆心之附已乃因㑹執伏利度謂諸胡曰今起大事我與伏利度誰堪為主諸胡咸推勒勒於是釋伏利度帥其衆歸漢淵加勒督山東征討諸軍事以伏利度之衆配之十一月戊申朔日有食之甲寅以尚書右僕射和郁為征北將軍鎮鄴乙亥以王衍為司徒衍說太傅越曰朝廷危亂當頼方伯冝得文武兼資以任之乃以弟澄為荆州都督族弟敦為青州刺史語之曰荆州有江漢之固青州有負海之險卿二人在外而吾居中足以為三窟矣澄至鎮以郭舒為别駕委以府事澄日夜縱酒不親庶務雖冦戎交急不以為懷舒常切諫以為宜愛民養兵保全州境澄不從十二月戊寅乞活田甄田蘭薄盛等起兵爲新蔡王騰復讎斬汲桑于樂陵棄成都王穎棺於故井中穎故臣収􅁙之甲午以前太傅劉寔為太尉寔以老固辭不許庚子以光禄大夫高光為尚書令前北軍中侯吕雍度支校尉陳顔等謀立清河王覃為太子事覺太傅越矯詔囚覃於金墉城初太傅越與茍晞親善引升堂結為兄弟司馬潘滔說越曰兖州衝要魏武以之創業茍晞有大志非純臣也久令處之則患生心腹矣若遷于青州厚其名號晞必恱公自牧兖州經緯諸夏藩衛本朝此所謂為之於未亂者也越以為然癸夘越自為丞相領兖州牧都督兖豫司冀幽并諸軍事以晞為征東大將軍開府儀同三司加侍中假節都督青州諸軍事領青州刺史封東平郡公越晞由是有隙晞至青州以嚴刻立威日行斬戮州人謂之屠伯頓丘太守魏植為流民所逼衆五六萬大掠兖州晞出屯無鹽以討之以弟純領青州刑殺更甚於晞晞討植破之初陽平劉靈少貧賤力制犇牛走及犇馬時人雖異之莫能舉也靈撫膺歎曰天乎何當亂也及公師藩起靈自稱將軍冦掠趙魏㑹王彌為茍純所敗靈亦為王讚所敗遂俱遣使降漢漢拜彌鎮東大將軍青徐二州牧都督縁海諸軍事封東萊公以靈為平北將軍􅊨李釗至寧州州人奉釗領州事治中毛孟詣京師求刺史累上奏不見省孟曰君亡親䘮幽閉窮城萬里訴哀精誠無感生不如死欲自刎朝廷憐之以魏興太守王遜為寧州刺史仍詔交州出兵救李釗交州刺史吾彦遣其子咨將兵救之慕容廆自稱鮮卑大單于拓跋禄官卒弟猗盧惣攝三部與廆通好二年春正月丙午朔日有食之丁未大赦漢王淵遣撫軍將軍聰等十將南據太行輔漢將軍石勒等十將東下趙魏二月辛夘太傅越殺清河王覃庚子石勒冦常山王浚擊破之涼州刺史張軌病風口不能言使其子茂攝州事隴西内史晉昌張越涼州大族欲逐軌而代之與其兄酒泉大守鎭及西平太守曹袪謀遣使詣長安告南陽王模稱軌廢疾請以秦州刺史賈龕代之龕將受之其兄讓龕曰張涼州一時名士威著西州汝何徳以代之龕乃止鎮袪上疏更請刺史未報遂移檄廢軌以軍司杜耽攝州事使耽表越為刺史軌下教欲避位歸老宜陽長史王融叅軍孟暢蹋折鎮檄排閤入言曰晉室多故明公撫寧西夏張鎮兄弟敢肆凶逆當鳴皷誅之遂出戒嚴㑹軌長子寔自京師還乃以寔為中督䕶將兵討鎮遣鎮甥太府主簿令狐亞先往說鎮為陳利害鎮流涕曰人誤我乃詣寔歸罪寔南擊曹祛走之朝廷得鎮袪疏以待中袁瑜為涼州刺史治中楊澹馳詣長安割耳盤上訢軌之被誣南陽王模表請停瑜武威太守張琠亦上表留軌詔依模所表且命誅曹祛􅁤於是命寔帥步騎三萬討祛斬之張越犇鄴涼州乃定三月太傅越自許昌徙鎭鄄城王彌收集亡散兵復大振分遣諸將攻掠青徐兖豫四州所過攻陷郡縣多殺守令有衆數萬苟晞與之連戰不能克夏四月丁亥彌入許昌太傅越遣司馬王斌帥甲士五千人衛京師張􅁤亦遣督護北宫純將兵衛京師五月彌入自轘轅敗官軍于伊北京師大震宫城門晝閉壬戌彌至洛陽屯于津陽門詔以王衍都督征討諸軍事甲子衍與王斌等出戰北宫純募勇士百餘人突陳彌兵大敗乙丑彌燒建春門而東衍遣左衛將軍王秉追之戰于七里澗又敗之彌走渡河與王桑自軹闗如平陽漢王淵遣侍中兼御史大夫郊迎令曰孤親行將軍之館拂席洗爵敬待將軍及至拜司􅀠校尉加侍中特進以桑為散騎侍郎北宫純等與漢劉聰戰於河東敗之詔封張軌西平郡公軌辭不受時州郡之使莫有至者軌獨遣使貢獻嵗時不絶秋七月甲辰漢王淵寇平陽太守宋抽棄郡走河東太守路述戰死淵徙都蒲子上郡鮮卑陸逐延氐酋單徴並降於漢八月丁亥太傅越自鄄城徙屯濮陽未幾又徙屯滎陽九月漢王彌石勒寇鄴和郁棄城走詔豫州刺史裴憲屯白馬以拒彌車騎將軍王堪屯東燕以拒勒平北將軍曹武屯大陽以備蒲子憲楷之子也冬十月甲戍漢王淵即皇帝位大赦改元永鳳十一月以其子和為大將軍聰為車騎大將軍族子曜為龍驤大將軍壬寅并州刺史劉琨使上黨太守劉惇帥鮮卑攻壺闗漢鎮東將軍綦母達戰敗亡歸丙午漢都督中外諸軍事大司馬領丞相右賢王宣卒石勒劉靈帥衆三萬冦魏郡汲郡頓丘百姓望風降附者五十餘壘皆假壘主將軍都尉印綬簡其彊壯五萬為軍士老弱安堵如故己酉勒執魏郡太守王粹于三臺殺之十二月辛未朔大赦乙亥漢主淵以大將軍和為大司馬封梁王尚書令歡樂為大司徒封陳留王后父御史大夫呼延翼為大司空封鴈門郡公宗室以親疏悉封郡縣王異姓以功伐悉封郡縣公矦成尚書令楊褒卒褒好直言成主雄初得蜀用度不足諸將有以獻金銀得官者褒諫曰陛下設官爵當網羅天下英豪何有以官買金邪雄謝之雄嘗醉推中書令杖太官令褒進曰天子穆穆諸矦皇皇安有天子而為酗也雄慙而止成平冦將軍李鳳屯晉壽屢冦漢中漢中民東走荆􅃆詔以張光為梁州刺史荆州冦盜不禁詔起劉璠為順陽内史江漢間翕然歸之資治通鑑卷第八十六
