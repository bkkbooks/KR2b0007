front:
  text: 資治通鑑卷第一百六十九
  hash: sha256:26349e902752b80fca60c5ebf69e20daff6ba41c1c5f4e0de5ef10d5d1420205
body:
  text: 臣司馬光奉勑編集陳紀三兆閹茂凡四年起昭陽恊洽盡柔丗祖文皇帝下天嘉四年春正月齊以太子少􅀓魏収兼尚書右僕射時齊主終日酣飲朝事專委侍中髙元海元海庸俗帝亦輕之以収才名素盛故用之而収畏懦避事尋坐阿縱除名兖州刺史畢義雲作書與髙元海論叙時事元海入宫不覺遺之給事中李孝貞得而奏之帝由是踈元海以孝貞兼中書舎人徴義雲還朝和士開復譛元海帝以馬鞭箠元海六十責曰汝昔教我反以弟反兄幾許不義以鄴城兵抗并州幾許無智出爲兖州刺史甲申周迪衆潰脫身踰嶺奔晋安依陳寳應官軍克臨川􅀗迪妻子寳應以兵資迪留異又遣其子忠臣隨之虞􅀉與寳應書以十事諌之曰自天厭梁德英雄互起人人自以爲得之然夷凶翦亂四海樂推者陳氏也豈非歴數有在惟天所授乎一也以王琳之彊侯瑱之力進足以摇蕩中原爭衡天下退足以屈強江外雄張偏隅然或命一旅之師或資一士之􅀃琳則瓦解氷泮􅄬身異域瑱則厥角稽顙委命闕廷斯又天假之威而除其患二也今將軍以藩戚之重東􅀯之衆盡忠奉上戮力勤王豈不勲髙竇融寵過吳芮析珪判野􅀯面稱孤乎三也聖朝棄瑕忘過寛厚得人至於余孝頃潘純佗李孝欽歐陽頠等悉委以心腹任以爪牙􅅐中豁然曽無纎芥况將軍舋非張繡罪異畢諶當何慮於危亡何失於冨貴四也方今周齊鄰睦境外無虞并兵一向匪朝伊夕非劉項競逐之機楚趙連從之􅀔何得雍容髙拱坐論西伯哉五也且留將軍狼顧一隅亟經摧衂聲實虧䘮膽氣衰沮其將帥首䑕兩端唯利是視孰能􅀍堅執鋭長驅􅀷入繫馬埋輪奮不顧命以先士卒者乎六也將軍之彊孰如侯景將軍之衆孰如王琳武皇㓕侯景於前今上摧王琳於後此乃天時非復人力且兵革已後民皆厭亂其孰能棄墳墓􅂢妻子出萬死不顧之計從將軍於白刅之間乎七也歴􅀚前古子陽季孟傾覆相尋餘善右渠危亡繼及天命可畏山川難恃况將軍欲以數郡之地當天下之兵以諸侯之資拒天子之命彊弱逆順可得侔乎八也且非我族􅀋其心必異不愛其親豈能及物留將軍身縻國爵子尚王􅁎猶且棄天屬而弗顧背明君而􅀌立危亡之日豈能同憂共患不背將軍者乎至於師老力屈懼誅利賞必有韓智晋陽之謀張陳井陘之􅀔九也北軍萬里逺鬬鋒不可當將軍自戰其地人多顧後衆寡不敵將帥不侔師以無名而出事以無機而動以此稱兵未知其利十也爲將軍計莫􅀂絶親留氏遣子入質釋甲偃兵一遵詔㫖方今藩維尚少皇子㓜冲凢預宗枝皆蒙寵樹况以將軍之地將軍之才將軍之名將軍之􅀔而克修藩服北面稱臣寧與劉澤同年而語其功業哉􅀉感恩懐服不覺狂言斧鉞之誅其甘如薺寳應覧書大怒或謂寳應曰虞公病􅀔漸篤言多錯謬寳應意乃小釋亦以􅀉民望故優容之周梁躁公侯莫陳崇從周主如原州帝夜還長安人􅀼怪其故崇謂所親曰吾比聞術者言晋公今年不利車駕今忽夜還不過晋公死耳或發其事乙酉帝召諸公於大德殿面責崇崇惶恐謝罪其夜􅃁宰護遣使將兵就崇第逼令自殺葬如常儀壬辰以髙州剌史黄法􅉤爲􅀯徐州刺史臨川太守周敷爲􅀯豫州剌史周主命司憲大夫拓拔迪造大律十五篇二月庚子頒行之其制罪一曰杖刑自十五至五十二曰鞭刑自六十至百三曰徒刑自一年至五年四曰流刑自二千五百里至四千五百里五曰死刑罄絞斬梟裂凢二十五等庚戌以司空􅀯徐州剌史侯安都爲江州刺史辛酉周詔大冢宰晋國公親則懿昆任當元輔自今詔誥及百司文書並不得稱公名護抗表固讓三月乙丑朔日有食之齊詔司空斛律光督歩􅀐二萬築勲掌城於軹􅀜仍築長城二百里置十二戍丙戌齊以兼尚書右僕射趙彦􅀷爲左僕射夏四月乙未周以柱國逹奚武爲太保周主將視學以太􅀓燕國公于謹爲三老謹上表固辭不許仍賜以延年杖戊午帝幸太學謹入門帝迎拜於門屏之間謹荅拜有司設三老席於中楹􅀯面太師護升階設几謹升席􅀯面慿几而坐大司馬豆盧寜升階正舄帝升階立於斧扆之前西面有司進饌帝跪設醬豆親為之袒割謹食畢帝親跪授爵以酳有司撤訖帝北靣立而訪道謹起立於席後對曰木受繩則正后從諫則聖明王虚心納諫以知得失天下乃安又曰去食去兵信不可去願陛下守信勿失又曰有功必賞有罪必罰則為善者日進為惡者日止又曰言行者立身之基願陛下三思而言九慮而行勿使有過天子之過如日月之食人莫不知願陛下慎之帝再拜受言謹荅拜禮成而出司空侯安都恃功驕横數聚文武之士􅀐射賦詩齋中賔客動至千人部下將帥多不遵法度檢問収攝輙奔歸安都上性嚴整内衘之安都弗之覺每有表啓封訖有事未盡開封自書之云又啓某事及侍宴酒酣或箕踞傾􅀝嘗陪樂遊園褉飲謂上曰何如作臨川王時上不應安都再三言之上曰此雖天命抑亦明公之力宴訖啓借供帳水飾欲載妻妾於御堂宴飲上雖許之意甚不懌明日安都坐於御座賔客居群臣位稱觴上壽㑹重雲殿災安都帥將士帶甲入殿上甚惡之隂爲之備及周廸反朝議謂當使安都討之而上更使吳明徹又數遣臺使案問安都部下檢括亡叛安都遣其别駕周弘實自託於舎人蔡景歴并問省中事景歴録其狀具奏之因希㫖稱安都謀反上慮其不受召故用為江州五月安都自京口還建康部伍入于石頭六月帝引安都宴於嘉德殿又集其部下將帥㑹于尚書朝堂於坐収安都囚于嘉德西省又収其將帥盡奪馬仗而釋之因出蔡景歴表以示於朝乃下詔􅁀其罪惡明日賜死宥其妻子資給其䘮􅀄髙祖在京口嘗與諸將宴杜僧明周文育侯安都為壽各稱功伐髙祖曰卿等悉良將也而並有所短杜公志大而識闇狎於下而驕於上周侯交不擇人而推心過差侯郎傲誕而無厭輕佻而肆志並非全身之道卒皆如其言乙夘齊主使兼散􅀐常侍崔子武來聘齊侍中開府儀同三司和士開有寵於齊主外朝視事或在内宴賞須􅁷之間不得不與士開相見或累日不歸一日數入或放還之後俄頃即追未至之間連􅀐督趣姦謟百端寵愛日隆前後賞賜不可勝紀每侍左右言辭容止極諸鄙䙝以夜繼晝無復君臣之禮嘗謂帝曰自古帝王盡為􅁅土堯舜桀紂竟復何異陛下宜及少壯極意為樂縱横行之一日取快可敵千年國事盡付大臣何慮不辦無為自勤約也帝大恱於是委趙彦􅀷掌官爵元文遥掌財用唐邕掌外􅀐兵信都馮子琮胡長粲掌東宫帝三四日一視朝書數字而已略無所言須􅁷罷入長粲僧敬之子也帝使士開與胡后握槊河􅀯康獻王孝瑜諫曰皇后天下之母豈可與臣下接手孝瑜又言趙郡王叡其父死於非命不可親近由是叡及士開共譛之士開言孝瑜奢僣叡言山東唯聞有河􅀯王不聞有陛下帝由是忌之孝瑜􅀼與爾朱御女言帝聞之大怒庚申頓飲孝瑜酒三十七盃孝瑜體肥大腰帶十圍帝使左右婁子彦載以出酖之於車至西華門煩躁投水而絶贈太尉録尚書事諸侯在宫中者莫敢舉聲唯河間王孝琬大哭而出秋七月戊辰周主幸原州八月辛丑齊以三臺宫為大興聖寺九月壬戌廣州刺史陽山穆公歐陽頠卒詔其子紇襲父爵位甲子周主自原州豋隴周廸復越東興嶺為㓂辛未詔護軍章昭逹將兵討之丙戌周主如同州􅀄周人欲與突厥木杆可汗連兵伐齊許納其女為后遣御伯大夫楊荐及左武伯太原王慶徃結之齊人聞之懼亦遣使求昏於突厥賂遺甚厚木杆貪齊弊重欲執荐等送齊荐知之責木杆曰太祖昔與可汗共敦鄰好蠕蠕部落數千來降太祖悉以付可汗使者以快可汗之意如何今日遽欲背恩忘義獨不愧􅀑神乎木杆慘然良乆曰君言是也吾意决矣當相與共平東賊然後送女荐等復命公卿請發十萬人擊齊柱國楊忠獨以為得萬􅀐足矣戊子遣忠將歩􅀐一萬與突厥自北道伐齊又遣大將軍逹奚武帥歩􅀐三萬自􅀯道出平陽期㑹於􅀳陽冬十一月辛酉章昭逹大破周迪迪脫身潜竄山谷民相與匿之雖加誅戮無肯言者十二月辛卯周主還長安丙申大赦章昭逹進軍度嶺趣建安討陳寳應詔益州剌史余孝頃督㑹稽東陽臨海永嘉諸軍自東道㑹之是歲􅀄􅀕始興昭烈王於建康用天子禮周楊忠拔齊二十餘城齊人守陘嶺之隘忠擊破之突厥木杆地頭歩離三可汗以十萬􅀐㑹之己丑自恒州三道俱入時大雪數旬􅀯北千餘里平地數尺齊主自鄴倍道赴之戊午至􅀳陽斛律光將歩􅀐三萬屯平陽己未周師及突厥逼􅀳陽齊主畏其強戎服率宫人東走􅁒避之趙郡王叡河間王孝琬叩馬諫孝琬請委叡部分必得嚴整帝從之命六軍進止皆取叡節度而使并州剌史段韶緫之五年春正月庚申朔齊主登北城軍容甚整突厥咎周人曰爾言齊亂故來伐之今齊人眼中亦有鐵何可當耶周人以歩卒爲前鋒從西山下去城二里許諸將咸欲逆擊之段韶曰歩卒力􅀔自當有限今積雪旣厚逆戰非便不如陳以待之彼勞我逸破之必矣旣至齊悉其鋭兵鼓譟而出突厥震駭引上西山不肯戰周師大敗而還突厥引兵出塞縱兵大掠自晋陽以徃七百餘里人畜無遺叚韶追之不敢逼突厥還至陘嶺凍滑乃鋪氊以度胡馬寒瘦膝已下皆無毛比至長城馬死且盡截矟杖之以歸逹奚武至平陽未知忠退斛律光與書曰鴻鵠已翔於寥廓羅者猶視於沮澤武得書亦還光逐之入周境􅀗二千餘口而還光見帝於晋陽帝以新遭大㓂抱光頭而哭任城王湝進曰何至於此乃止􅀄齊顯祖之丗周人常懼齊兵西度毎至冬月守河椎氷及丗祖即位嬖幸用事朝政漸紊齊人椎氷以備周兵之逼斛律光憂之曰國家常有吞􅀜隴之志今日至此而唯翫聲色乎辛巳上祀北郊二月庚寅朔日有食之􅀄齊顯祖命群官刋定魏麟趾格為齊律乆而不成時軍國多事决獄罕依律文相承謂之變法從事丗祖即位思革其弊乃督修律令者至是而成律十二篇令四十卷其刑名有五一曰死重者轘之次梟首次斬次絞二曰流投邊裔為兵三曰刑自五􅀊至一􅀊四曰鞭自百至四十五曰杖自三十至十凢十五等其流内官及老小閹癡并過失應贖者以絹代金三月辛酉班行之因大赦是後為吏者始守法令又敕仕門子弟常講習之故齊人多曉法又令民十八受田輸租調二十充兵六十免力􅃥六十六還田免租調一夫受露田八十畒婦人四十畒奴婢依良人牛受六十畒大率一夫一婦調絹一匹綿八兩墾租兩石義租五㪷奴婢凖良人之半牛調二尺墾租一斗義租五升墾租送臺義租送郡以備水旱己巳齊群盗田子禮等數十人共刼太師彭城景思王浟為主詐稱使者徑向浟第至内室稱敕牽浟上馬臨以白刄欲引向􅀯殿浟大呼不從盗殺之庚辰周􅀄令百官執笏齊以斛律光為司徒武興王普為尚書左僕射普歸彦之兄子也甲申以馮翊王潤為司空夏四月辛夘齊主使兼散􅀐常侍皇甫亮來聘庚子周主遣使來聘癸卯周以鄧公河􅀯竇熾為大宗伯五月壬戌封丗宗之子賢為畢公甲子齊主還鄴壬午齊以趙郡王叡為録尚書事前司徒婁叡為太尉甲申以叚韶為太師丁亥以任城王湝為大將軍壬辰齊主如晋陽周以太保逹奚武為同州剌史六月齊主殺樂陵王百年時白虹圍日再重又横貫而不逹赤星見齊主欲以百年猒之㑹愽陵人賈德胄教百年書百年嘗作數敕字德胄封以奏之帝發怒使召百年百年自知不免割帶玦留與其妃斛律氏見帝於涼風堂使百年書敕字驗與德胄所奏相似遣左右亂捶之又令曵之遶堂行且捶所過血皆遍地氣息將盡乃斬之棄諸池池水盡赤妃把玦哀號不食月餘亦卒玦猶在手拳不可開其父光自擘之乃開庚寅周攺御伯為納言􅀄周太祖之從賀拔岳在􅀜中也遣人迎晋公護於晋陽護母閻氏及周主之姑皆留晋陽齊人以配中山宫及護用事遣間使入齊求之莫知音息齊遣使者至玉璧求通互市護欲訪求母姑使司馬下大夫尹公正至玉璧與之言使者甚恱勲州剌史韋孝寛􅀗􅀜東人復縱之因致書爲言西朝欲通好之意是時周人以前攻晋陽不得志謀與突厥再伐齊齊主聞之大懼許遣護母西歸且求通好先遣其姑歸秋八月丁亥朔日有食之周遣柱國楊忠將兵㑹突厥伐齊至北河而還戊子周以齊公憲爲雍州牧宇文貴爲大司徒九月丁巳以衛公直爲大司馬追録佐命元功封開府儀同三司隴西公李昞為唐公太馭中大夫長樂公􅀂干鳯為徐公昞虎之子鳯惠之子也乙丑齊主封其子綽為􅀯陽王儼為東平王儼太子之母弟也突厥㓂齊幽州衆十餘萬入長城大掠而還周皇姑之歸也齊主遣人為晋公護母作書言護㓜時數事又􅀉其所著錦􅂁以為信驗且曰吾屬千載之運逢大齊之德矜老開恩許得相見禽獸草木母子相依吾有何罪與汝分離今復何福還望見汝言此悲喜死而更蘇丗間所有求皆可得母子異國何處可求假汝貴極王公冨過山海有一老母八十之年飄然千里死亡旦夕不得一朝蹔見不得一日同處寒不得汝衣飢不得汝食汝雖窮榮極盛光耀丗於間吾何益吾今日之前汝旣不得申其供養事徃何論今日以後吾之殘命唯繫於汝爾戴天履地中有􅀑神勿云􅁳昧而可欺負護得書悲不自勝復書曰區宇分崩遭遇災禍違離膝下三十五年受形禀氣皆知母子誰同薩保如此不孝子爲公矦母爲俘􅀠暑不見母暑寒不見母寒衣不知有無食不知飢飽泯如天地之外無由暫聞分懐􅁈酷終此一生死􅀂有知冀奉見於泉下耳不謂齊朝解網惠以德音磨敦四姑並許矜放􅀄聞此㫖魂爽飛越號天叩地不能自勝齊朝霈然之恩旣已霑洽有家有國信義爲本伏度來期已應有日一得奉見慈顔永畢生願生死肉骨豈過今恩􅀒山載岳未足勝荷齊人留護母使更與護書邀護重報徃返再三時叚韶拒突厥軍於塞下齊主遣黄門徐丗榮乗傳齎周書問韶韶以周人反覆本無信義比晋陽之役其事可知護外託為相其實主也旣為母請和不遣一介之使􅀂據移書即送其母恐示之以弱不如且外許之待和親堅定然後遣之未晩齊主不聽即遣之閻氏至周舉朝稱慶周主為之大赦凡所資奉窮極華盛每四時伏臘周主帥諸親戚行家人之禮稱觴上壽突厥自幽州還留屯塞北更集諸部兵遣使告周欲與共擊齊如前約閏月乙巳突厥㓂齊幽州􅀳公護新得其母未欲伐齊又恐􅀒突厥約更生邊患不得已徵二十四軍及左右廂散􅀠秦隴巴蜀之兵并羌胡内附者凡二十萬人冬十月甲子周主授護斧鉞於廟庭丁卯親勞軍於沙苑癸酉還宫護軍至潼關遣柱國尉遲逈帥精兵十萬爲前鋒趣洛陽大將軍權景宣帥山南之兵趣懸瓠少師楊㯹出軹􅀜周迪復出東興宣城太守錢肅鎭東興以城降迪吳州剌史陳詳將兵擊之詳兵大敗迪衆復振南豫州剌史西豐脫􅔂周敷帥所部擊之至定川與迪對壘迪紿敷曰吾昔與弟戮力同心豈規相害今願伏罪還朝因弟披露心腑先乞挺身共盟敷許之方登壇爲迪所殺陳寳應據建安􅀳安二郡水陸爲柵以拒章昭逹昭逹與戰不利因據上流命軍士伐木為筏施拍其上㑹大雨江漲昭逹放筏衝寳應水柵盡壞之又出兵攻其歩軍方合戰上遣將軍余孝頃自海道適至并力乗之十一月己丑寳應大敗逃至莆口謂其子曰早從虞公計不至今日昭逹追擒之并擒留異及其族黨送建康斬之異子貞臣以尚主得免寳應賔客皆死上聞虞􅀉嘗諫寳應命昭逹禮遣詣建康旣見勞之曰管寕無恙以為衡陽王掌書記周晋公護進屯弘農甲午尉遟迥圍洛陽雍州牧齊公憲同州剌史逹奚武涇州緫管王雄軍於邙山戊戌齊主使兼散􅀐常侍劉逖來聘􅀄周楊檦為召州剌史鎭捍東境二十餘年数與齊戰未嘗不捷由是輕之旣出軹􅀜獨引兵深入又不設備甲辰齊太尉婁叡將兵奄至大破㯹軍􅎎遂降齊權景宣圍懸瓠十二月齊豫州道行臺豫州刺史太原王士良永州剌史蕭丗怡並以城降之景宣使開府郭彦守豫州謝徹守永州送士良丗怡及降卒千人於長安周人為土山地道以攻洛陽三旬不克晋公護命諸將塹断河陽路遏齊救兵然後同攻洛陽諸將以為齊兵必不敢出唯張斥候而已齊遣蘭陵王長恭大將軍斛律光救洛陽畏周兵之彊未敢進齊主召并州剌史叚韶謂曰洛陽危急今欲遣王救之突厥在北復湏鎭禦如何對曰北虜侵邊事等疥癬今西鄰闚逼乃腹心之病請奉詔南行齊主曰朕意亦爾乃令韶督精􅀐一千發晋陽丁巳齊主亦自晋陽赴洛陽己未齊太宰平陽靖翼王淹卒叚韶自晋陽行五日濟河㑹連日隂霧壬戌韶至洛陽帥帳下三百􅀐與諸將登邙阪觀周軍形􅀔至大和谷與周軍遇韶即馳告諸營追集􅀐士結陳以待之韶為左軍蘭陵王長恭為中軍斛律光為右軍周人不意其至皆忷懼韶遥謂周人曰汝宇文護纔得其母遽來為㓂何也周人曰天遣我來有何可問韶曰天道賞善罰惡當遣汝送死來耳周人以歩兵在前上山逆戰韶且戰且􅁍以誘之待其力弊然後下馬擊之周師大敗一時瓦解投墜溪谷死者甚衆蘭陵王長恭以五百􅀐突入周軍遂至金墉城下城上人弗識長恭免胄示之靣乃下弩手救之周師在城下者亦解圍遁去委弃營幕自邙山至榖水三十里中軍資器械彌滿川澤唯齊公憲逹奚武及庸忠公王雄在後勒兵拒戰王雄馳馬衝斛律光陳光退走雄追之光左右皆散惟餘一奴一矢雄按矟不及光者丈餘謂光曰吾惜爾不殺當生將爾見天子光射雄中額雄抱馬走至營而卒軍中益懼齊公憲拊循督勱衆心小安至夜収軍憲欲待明更戰逹奚武曰洛陽軍散人情震駭􅀂不因夜速還明日欲歸不得武在軍乆備見形􅀔公少年未經事豈可以數營士卒委之虎口乎乃還權景宣亦弃豫州走丁􅆗齊主至洛陽已巴以段韶為太宰斛律光為太尉蘭陵王長恭為尚書令壬申齊主如虎牢遂自滑臺如棃陽丙子至鄴楊忠引兵出沃野應接突厥軍糧不給諸軍憂之計無所出忠乃招誘稽胡酋長咸在坐詐使河州剌史王傑勒兵鳴皷而至曰大冢宰已平洛陽欲與突厥共討稽胡之不服者坐者皆懼忠慰諭而遣之於是諸胡相帥饋輸車糧填積屬周師罷歸忠亦還􅀳公護本無將畧是行也又非本心故無功與諸將稽首謝罪周主慰勞罷之是歲齊山東大水飢死者不可勝計􅊨宕昌王梁彌定屢㓂周邊周大將軍田􅀪討㓕之以其地置宕州六年春正月癸􅆗齊以任城王湝為大司馬齊主如晉陽二月辛丑周遣陳公純許公貴神武公竇毅􅀯陽公楊荐等備皇后儀衛行殿并六宫百二十人詣突厥可汗牙帳逆女毅熾之兄子也丙寅周以柱國安武公李穆爲大司空綏德公陸通爲大司㓂壬申周主如歧州夏四月甲寅以安城王頊爲司空頊以帝弟之重􅀔傾朝野直兵鮑僧叡恃頊􅀔爲不法御史中丞徐陵爲奏彈之從南臺官屬引奏案而入上見陵章服嚴肅爲斂容正坐陵進讀奏版時頊在殿上侍立仰視上流汗失色陵遣殿中御史引頊下殿上爲之免頊侍中中書監朝廷肅然丙午齊大將軍東安王婁叡坐事免齊著作郎祖珽有文學多技藝而踈率無行甞為髙祖中外府功曹因宴失金叵羅於珽髻上得之又坐詐盗官粟三千石鞭二百配甲坊􅂋祖時珽為祕書丞盗華林遍畧及有它贜當絞除名為民􅂋祖雖憎其數犯法而愛其才􅇊令直中書省丗祖為長廣王珽為胡桃油獻之因言殿下有非常骨法孝徵夢殿下乗龍上天王曰􅀂然當使兄大冨貴及即位擢拜中書侍郎遷散􅀐常侍與和士開共為姦謟珽私􅀃士開曰君之寵幸振古無比宫車一日晚駕欲何以克終士開因從問計珽曰冝􅀃主上云文㐮文宣孝昭之子俱不得立今冝令皇太子早踐大位以定君臣之分􅀂事成中宫少主必皆德君此萬全之計也請君微􅀃主上令粗解珽當自外上表論之士開許諾㑹有彗星見太史奏云彗除舊布新之象當有易主珽於是上書言陛下雖爲天子未爲極貴冝傳位東宫且以上應天道并上魏顯祖禪子故事齊主從之丙子使太宰叚韶持節奉皇帝璽綬傳位於太子緯太子即皇帝位於晋陽宫大赦攺元天統又詔以太妃子斛律氏爲皇后於是群公上丗祖尊號爲太上皇帝軍國大事咸以聞使黄門侍郎馮子琮尚書左丞胡長粲輔道少主出入禁中專典敷奏子琮胡后之妹夫也祖珽拜祕書監加儀同三司大􅀍親寵見重二宫丁丑齊以賀拔仁爲太師矦莫陳相爲太保馮翊王潤爲司徒趙郡王叡爲司空河􅀯王孝琬為尚書令戊寅以􅌡州剌史尉粲為太尉斛律光為大將軍東安王婁叡為太尉尚書僕射趙彦􅀷為左僕射五月突厥遣使至齊始與齊通六月己巳齊主使兼散􅀐常侍王李髙來聘秋七月辛巳朔日有食之上遣都督程靈洗自鄱陽别道擊周廸破之廸與麾下十餘人竄于山穴中日月浸乆從者亦稍苦之後遣人潜出臨川市魚鮭臨川太守駱牙執之令取廸自効因使腹心勇士隨之入山其人誘廸出獵勇士伏於道旁出斬之丙戌傳首至建康庚寅周主如秦州八月丙子還長安己邜立皇子伯固為新安王伯恭為晋安王伯仁為廬陵王伯義為江夏王冬十月辛亥周以函谷関城為通洛防以金州剌史賀􅀂敦為中州剌史鎭函谷敦恃才􅀒氣顧其流軰皆為大將軍敦獨未得兼以湘州之役全軍而返謂冝受賞翻得除名對臺使出怨言􅀳公護怒徵還逼令自殺臨死謂其子弼曰吾志平江南今而不果汝必成吾志吾以舌死汝不可不思因引錐剌弼舌出血以誡之十一月癸未齊太上皇至鄴齊丗祖之為長廣王也數為顯祖所捶心常衘之顯祖每見祖珽常呼為賊故珽亦怨之且欲求媚於丗祖乃􅀃丗祖曰文宣狂􅁀何得稱文旣非創業何得称祖􅀂文宣為祖陛下萬歲後當何所称帝從之己丑攺謚獻武皇帝爲神武皇帝廟號髙祖獻明皇后為武明皇后令有司更議文宣謚號十二月乙卯封皇子伯禮為武陵王壬戌齊上皇如􅀳陽庚午齊攺謚文宣皇帝為景烈皇帝廟號威宗天康元年春正月己卯日有食之癸未周大赦攺元天和辛卯齊主祀圎丘癸巳祫太廟丙申齊以吏部尚書尉瑾為右僕射己亥周主耕籍田庚子齊如􅀳陽周遣小載師杜杲來聘二月庚戌齊上皇還鄴丙子大赦攺元三月己卯以安成王頊為尚書令丙午周主祀南郊夏四月大雩丁亥上不豫臺閣衆事並令尚書僕射到仲舉五兵尚書孔奐共决之奐琇之之曽孫也疾篤奐仲舉與司空尚書令揚州剌史安成王頊吏部尚書􅀽樞中書􅃕人劉師知入侍醫藥樞君正之子也太子伯宗柔弱上憂其不能守位謂頊曰吾欲遵太伯之事頊拜伏泣涕固辭上又謂仲舉奐等曰今三方鼎峙四海事重冝湏長君朕欲近則晋成逺隆殷法卿等冝遵此意孔奐流涕對曰陛下御膳違和痊復非乆皇太子春秋鼎盛聖德日躋安成王介弟之尊足為周旦􅀂有廢立之心臣等愚誠不敢聞詔上曰古之遺直復見於卿乃以奐為太子詹事臣光曰夫臣之事君冝將順其美正救其惡孔奐在陳處腹心之重任決禮義之大計茍以丗祖之言為不誠則當如竇嬰靣辨爰盎廷争防微杜漸以絶覬覦之心以為誠邪則當請明下詔書宣告中外使丗祖有宋宣之美髙宗無楚靈之惡不然謂太子嫡嗣不可動揺欲保附而安全之則當盡忠竭節以死繼之如晉之荀息趙之肥義奈何於君之存則逆探其情而求合焉及其旣没則􅁠臣移國而不能救嗣主失位而不能死斯乃姦䛕之􅀹者而丗祖謂之遺直以託六尺之孤豈不悖哉癸酉上殂上起自艱難知民疾苦性明察儉約每夜剌閨取外事分判者前後相續敕傳更籖於殿中者必投籖於階石之上令鎗然有聲曰吾雖眠亦令驚覺太子即位大赦五月己夘尊皇太后曰太皇太后皇后曰皇太后乙酉齊以兼尚書左僕射武興王普爲尚書令吐谷渾龍涸莫昌帥部落附於周以其地爲扶州庚寅以安成王頊爲驃􅀐大將軍司徒録尚書都督中外諸軍事丁酉以中軍大將軍開府儀同三司徐度爲司空以吏部尚書􅀽樞爲左僕射吳興太守沈欽爲右僕射御史中丞徐陵爲吏部尚書陵以梁末以來選授多濫乃爲書示衆曰梁元帝承矦景之凶荒王太尉接荆州之禍敗故使官方窮此紛雜永安之時聖朝草創白銀難得黄札易營􅁠以官階代於錢絹致令貟外常侍路上比肩諮議叅軍市中無數豈是朝章固應如此今衣冠禮樂日冨年華何可猶作舊意非理望也衆咸服之己亥齊立上皇子弘為齊安王仁固為北平王仁英為髙平王仁光為淮南王六月齊遣兼散􅀐常侍韋道儒來聘丙寅葬文皇帝于永寜陵廟號丗祖秋七月戊寅周築武功等諸城以置軍士丁酉立妃王氏為皇后八月齊上皇如晋陽周信州蠻冉令賢向五子王等據巴峽反攻䧟白帝黨與連結二千餘里周遣開府儀同三司元契趙剛等前後討之終不克九月詔開府儀同三司陸騰督開府儀同三司王亮司馬裔討之騰軍於湯口令賢於江􅀯據險要置十城逺結涔陽蠻為聲援自帥精卒固守水邏城騰召諸將問計先取水邏後攻江南騰曰令賢内恃水邏金湯之固外託涔陽輔車之援資糧充實器械精新以我懸軍攻其嚴壘脫一戰不克更成其氣不如頓軍湯口先取江􅀯翦其羽毛然後進軍水邏此制勝之術也乃遣王亮帥衆度江旬日拔其八城捕虜及納降各千計遂間募驍勇數道進攻水邏蠻帥冉伯犂冉安西素與令賢有􅄷騰􅀃誘賂以金帛使為郷導水邏之旁有石勝城令賢使其兄子龍真據之騰宻誘龍真龍真遂以城降水邏衆潰斬首萬餘級捕虜萬餘口令賢走追􅀗斬之騰積骸於水邏城側為京􅀚是後群蠻望之輙大哭不敢復叛向五子王據石墨城使其子寳勝據􅀟城水邏旣平騰頻遣諭之猶不下進擊皆擒之盡斬諸向酋長捕虜萬餘户信州舊治白帝騰徙之於八陳灘北以司馬裔為信州剌史小吏部隴西辛昻奉使梁益且為騰督軍糧時臨信楚合等州民多從亂昻諭以禍福赴者如歸乃令老弱負糧壯夫拒戰咸樂為用使還㑹巴州萬榮郡民反攻圍郡城遏絶山路昻謂其徒曰凶狡猖狂􅀂待上聞孤城必䧟茍利百姓專之可也遂募通開二州得三千人倍道兼行出其不意直趣賊壘賊以為大軍至望風瓦解一郡􅀗全周朝嘉之以為渠州剌史冬十月齊以侯莫陳相為太傳任城王湝為太保婁叡為大司馬馮翊王潤為太尉開府儀同三司韓祖念為司徒庚申帝享太廟十一月乙亥周遣使來弔丙戌周主行視武功等新城十二月庚申還長安齊河間王孝琬怨執政為草人而射之和士開祖珽譛之於上皇曰草人以擬聖躬也又前突厥至并州孝琬脫兠鍪抵地云我豈老嫗湏著此物此言屬大家也又魏丗謡言河􅀯種榖河北生白楊樹端金雞鳴河􅀯北者河間也孝琬將建金雞大赦耳上皇頗惑之㑹孝琬得佛牙置第内夜有光上皇聞之使搜之得填庫矟幡數百上皇以為反具収訊諸􅁎有陳氏者無寵誣孝琬云孝琬常畫陛下像而哭之其實丗宗像也上皇怒使武衛赫連輔玄倒鞭撾之孝琬呼叔上皇曰何敢呼我為叔孝琬曰臣神武皇帝嫡孫文㐮皇帝嫡子魏孝静皇帝之甥何為不得呼叔上皇愈怒折其两脛而死安德王延宗哭之淚赤又為草人鞭而訊之曰何故殺我兄奴告之上皇覆延宗於地馬鞭鞭之二百幾死是􅀊齊賜侍中中書監元文遥姓髙氏頃之遷尚書左僕射魏末以來縣令多用厮役由是士流恥為之文遥以為縣令治民之本遂請革選宻擇貴遊子弟發敕用之猶恐其披訴悉召之集神武門令趙郡王叡宣㫖唱名厚加慰諭而遣之齊之士人為縣自此始資治通鑑卷第一百六十九
