seq: 44
front:
  text: 輿弟右谷蠡王知牙師以次當為左賢王左賢王次即當為單于單于欲傳其子遂殺知牙師烏珠留單于有子曰比為右薁鞬日逐王領南邊八部比見知牙師死出怨言曰以兄弟言之右谷蠡王次當立以子言之我前單于長子我當立遂内懷猜懼庭㑹稀闊單于疑之乃遣兩骨都矦監領比所部兵及單于蒲奴立比益恨望密遣漢人郭衡奉匈奴地圖詣西河太守求内附兩骨都矦頗覺其意㑹五月龍祠勸單于誅比比弟漸將王在單于帳下聞之馳以報比比遂聚八部兵四五萬人待兩骨都矦還欲殺之骨都矦且到知其謀亡去單于遣萬騎擊之見比衆盛不敢進而還是嵗鬲矦朱祜薨祜爲人質直尚儒學爲將多受降以克定城邑爲本不存首級之功又禁制士卒不得虜掠百姓軍人樂放縱多以此怨之二十四年春正月乙亥赦天下匈奴八部大人共議立日逐王比爲呼韓邪單于􅅃五原塞願永爲藩蔽扞禦北虜事下公卿議者皆以爲天下初定中國空虚夷狄情僞難知不可許五官中郎將耿國獨以爲宜如孝宣故事受之令東扞鮮卑北拒匈奴率厲四夷完復邊郡帝從之秋七月武陵蠻㓂臨沅遣謁者李嵩中山太守馬成討之不克馬援請行帝愍其老未許援曰臣尚能被甲上馬帝令試之援據鞍顧眄以示可用帝笑曰矍鑠哉是翁遂遣援率中郎將馬武耿舒等將四萬餘人征五溪援謂友人杜愔曰吾受厚恩年迫日索常恐不得死國事今獲所願甘心瞑目但畏長者家兒或在左右或與從事殊難得調介介獨惡是耳
  hash: sha256:35d0dcd648fdba7f3b8bc3e76c453e84d8ed7cfe2862bba3229d4f78ca98a3de
body:
  text: 冬十月匈奴日逐王比自立爲南單于遣使詣闕奉藩稱臣上以問朗陵矦臧宫宫曰匈奴飢疫分爭臣願得五千騎以立功帝笑曰常勝之家難與慮敵吾方自思之二十五年春正月遼東徼外貊人㓂邊太守祭肜招降之肜又以財利撫納鮮卑大都護偏何使招致異種駱驛􅅃塞肜曰審欲立功當歸撃匈奴斬送頭首乃信耳偏何等即撃匈奴斬首二千餘級持頭詣郡其後嵗嵗相攻輙送首級受賞賜自是匈奴衰弱邊無㓂警鮮卑烏桓並入朝貢肜為人質厚重毅撫夷狄以恩信故皆畏而愛之得其死力南單于遣其弟左賢王莫將兵萬餘人擊北單于弟薁鞬左賢王生獲之北單于震怖却地千餘里北部薁鞬骨都矦與右骨都矦率衆三萬餘人歸南單于三月南單于復遣使詣闕貢獻求使者監䕶遣侍子修舊約戊申晦日有食之馬援軍至臨鄉擊破蠻兵斬獲二千餘人初援嘗有疾虎賁中郎將梁松來􅀱之獨拜牀下援不答松去後諸子問曰梁伯孫帝壻貴重朝庭公卿已下莫不憚之大人柰何獨不為禮援曰我乃松父友也雖貴何得失其序乎援兄子嚴敦並喜譏議通輕俠援前在交阯還書誡之曰吾欲汝曹聞人過失如聞父母之名耳可得聞口不可得言也好論議人長短妄是非政灋此吾所大惡也寧死不願聞子孫有此行也龍伯髙敦厚周慎口無擇言謙約節儉亷公有威吾愛之重之願汝曹效之杜季良豪俠好義憂人之憂樂人之樂父䘮致客數郡畢至吾愛之重之不願汝曹效也效伯髙不得猶為謹敕之士所謂刻鵠不成尚類鶩者也效季良不得䧟為天下輕薄子所謂畫虎不成反類狗者也伯髙者山都長龍述也季良者越騎司馬杜保也皆京兆人㑹保仇人上書訟保為行浮薄亂羣惑衆伏波將軍萬望還書以誡兄子而梁松竇固與之交結將扇其輕偽敗亂諸夏書奏帝召責松固以訟書及援誡書示之松固叩頭流血而得不罪詔免保官擢拜龍述為零陵太守松由是恨援及援討武陵蠻軍次下雋有兩道可入從壺頭則路近而水嶮從充則塗夷而運遠耿舒欲從充道援以為棄日費糧不如進壼頭搤其㗋咽充賊自破以事上之帝從援策進營壼頭賊乗髙守隘水疾船不得上㑹暑甚士卒多疫死援亦中病乃穿岸為室以避炎氣賊每升險鼔譟援輙曳足以觀之左右哀其壯意莫不為之流涕耿舒與兄好畤矦弇書曰前舒上書當先擊充糧雖難運而兵馬得用軍人數萬爭欲先奮今壼頭竟不得進大衆怫鬱行死誠可痛惜前到臨鄉賊無故自致若夜擊之即可殄滅伏波類西域賈胡到一處輒止以是失利今果疾疫皆如舒言弇得書奏之帝乃使梁松乗驛責問援因代監軍㑹援卒松因是構䧟援帝大怒追收援新息矦印綬初援在交阯常餌薏苡實能輕身勝障氣軍還載之一車及卒後有上書譖之者以為前所載還皆明珠文犀帝益怒援妻孥惶懼不敢以䘮還舊塋稾葬城西賔客故人莫敢弔㑹嚴與援妻子草索相連詣闕請罪帝乃出松書以示之方知所坐上書訴寃前後六上辭甚哀切前雲陽令扶風朱勃詣闕上書曰竊見故伏波將軍馬援㧞自西州欽慕聖義聞關險難觸冒萬死經營隴冀謀如涌泉埶如轉規兵動有功師進輒克誅鋤先零飛矢貫脛出征交阯與妻子生訣間復南討立䧟臨鄉師已有業未竟而死吏士雖疫援不獨存夫戰或以乆而立功或以速而致敗深入未必為得不進未必為非人情豈樂乆屯絶地不生歸哉惟援得事朝廷二十二年北出塞漠南度江海觸冒害氣僵死軍事名滅爵絶國土不傳海内不知其過衆庶未聞其毁家屬杜門塟不歸墓怨隙並興宗親怖慄死者不能自列生者莫為之訟臣竊傷之夫明主醲於用賞約於用刑髙祖嘗與陳平金四萬斤以間楚軍不問出入所為豈復疑以錢榖間哉願下公卿平援功罪宜絶宜續以厭海内之望帝意稍解初勃年十二能誦詩書常􅀱援兄況辭言􅈺雅援裁知書見之自失況知其意乃自酌酒慰援曰朱勃小器速成智盡此耳卒當從汝稟學勿畏也勃未二十右扶風請試守渭城宰及援為將軍封矦而勃位不過縣令援後雖貴常待以舊恩而卑侮之勃愈身自親及援遇䜛唯勃能終焉謁者南陽宗均監援軍援旣卒軍士疫死者太半蠻亦飢困均乃與諸將議曰今道逺士病不可以戰欲權承制降之何如諸將皆伏地莫敢應均曰夫忠臣出竟有可以安國家專之可也乃矯制調伏波司馬呂种守沅陵長命种奉詔書入虜營告以恩信因勒兵隨其後蠻夷震怖冬十月共斬其大帥而降於是均入賊營散其衆遣歸本郡為置長吏而還羣蠻遂平均未至先自劾矯制之罪上嘉其功迎賜以金帛令過家上冡是嵗遼西烏桓大人赧旦等率衆内屬詔封烏桓渠帥為矦王君長者八十一人使居塞内布於縁邊諸郡令招來種人給其衣食遂為漢偵􅇋助撃匈奴鮮卑時司徒􅁺班彪上言烏桓天性輕黠好為㓂賊若乆放縱而無緫領者必復掠居人但委主降􅁺吏恐非所能制臣愚以為宜復置烏桓校尉誠有益於附集省國家之邊慮帝從之於是始復置校尉於上谷寗城開營府并領鮮卑賞賜質子嵗時互市焉二十六年正月詔增百官奉其千石已上減於西京舊制六百石已下增於舊秩初作夀陵帝曰古者帝王之葬皆陶人瓦器木車茅馬使後世之人不知其處太宗識終始之義景帝能述遵孝道遭天下反覆而覇陵獨完受其福豈不美哉今所制地不過二三頃無爲山陵陂池裁令流水而已使迭興之後與丘隴同體詔遣中郎將叚郴副校尉王郁使南匈奴立其庭去五原西部塞八十里使者令單于伏拜受詔單于顧望有頃乃伏稱臣拜訖令譯曉使者曰單于新立誠慙於左右願使者衆中無相屈折也詔聽南單于入居雲中始置使匈奴中郎將將兵衛護之夏南單于所獲北虜薁鞬左賢王將其衆及南部五骨都矦合三萬餘人畔歸去北庭三百餘里自立為單于月餘日更相攻撃五骨都矦皆死左賢王自殺諸骨都矦子各擁兵自守秋南單于遣子入侍詔賜單于冠帶璽綬車馬金帛甲兵什器又轉河東米糒二萬五千斛牛羊三萬六千頭以贍給之令中郎將將㢮刑五十人隨單于所處參辭訟察動静單于嵗盡輒遣奉奏送侍子入朝漢遣謁者送前侍子還單于庭賜單于及閼氏左右賢王以下繒綵合萬匹嵗以為常於是雲中五原朔方北地定襄鴈門上谷代八郡民歸於本土遣謁者分將㢮刑補治城郭發遣邊民在中國者布還諸縣皆賜以裝錢轉給糧食時城郭丘墟掃地更為上乃悔前徙之冬南匈奴五骨都矦子復將其衆三千人歸南部北單于使騎追撃悉獲其衆南單于遣兵拒之逆戰不利於是復詔單于徙居西河美稷因使叚郴王郁留西河擁䕶之令西河長史嵗將騎二千㢮刑五百人助中郎將衛䕶單于冬屯夏罷自後以為常南單于旣居西河亦列置諸部王助漢扞戍北地朔方五原雲中定襄鴈門代郡皆領部衆為郡縣偵邏耳目北單于惶恐頗還所略漢民以示善意鈔兵每到南部下還過亭候輒謝曰自擊亡虜薁鞬日逐耳非敢犯漢民也二十七年夏四月戊午大司徒王況薨五月丁丑詔司徒司空並去大名改大司馬為太尉驃騎大將軍行大司馬劉隆即日罷以太僕趙熹為太尉大司農馮勤為司徒北匈奴遣使詣武威求和親帝召公卿廷議不決皇太子言曰南單于新附北虜懼於見伐故傾耳而聽爭欲歸義耳今未能出兵而反交通北虜臣恐南單于將有二心北虜降者且不復來矣帝然之告武威太守勿受其使朗陵矦臧宫􅀭虚矦馬武上書曰匈奴貪利無有禮信窮則稽首安則侵盜虜今人畜疫死旱蝗赤地疲困乏力不當中國一郡萬里死命縣在陛下福不再來時或易失豈宜固守文徳而墮武事乎今命將臨塞厚縣購賞喻告髙句驪烏􅁊鮮卑攻其左發河西四郡天水隴西羌胡擊其右如此北虜之滅不過數年臣恐陛下仁恩不忍謀臣狐疑令萬世刻石之功不立於聖世詔報曰黄石公記曰柔能制剛弱能制彊舎近謀遠者勞而無功舎遠謀近者逸而有終故曰務廣地者荒務廣徳者彊有其有者安貪人有者殘殘滅之政雖成必敗今國無善政災變不息百姓驚惶人不自保而復欲遠事邊外乎孔子曰吾恐季孫之憂不在顓臾且北狄尚彊而屯田警備傳聞之事恒多失實誠能舉天下之半以滅大㓂豈非至願茍非其時不如息民自是諸將莫敢復言兵事者上問趙憙以乆長之計憙請遣諸王就國冬上始遣魯王興齊王石就國是嵗帝舅夀張恭矦樊宏薨宏為人謙柔畏慎每當朝㑹輒迎期先到俯伏待事所上便宜手自書寫毁削草本公朝訪逮不敢衆對宗族染其化未嘗犯灋帝甚重之及病困遺令薄葬一無所用以為棺柩一藏不宜復見如有腐敗傷孝子之心使與夫人同墳異藏帝善其令以書示百官因曰今不順夀張矦意無以彰其徳且吾萬嵗之後欲以為式二十八年春正月己巳徙魯王興為北海王以魯益東海帝以東海王彊去就有禮故優以大封食二十九縣賜虎賁旄頭設鍾虡之樂擬於乗輿夏六月丁夘沛太后郭氏薨初馬援兄子壻王磐平阿矦仁之子也王莽敗磐擁富貲為游俠有名江淮間後游京師與諸貴戚友善援謂姊子曹訓曰王氏廢姓也子石當屏居自守而反游京師長者用氣自行多所陵折其敗必也後嵗餘磐坐事死磐子肅復出入王矦邸第時禁㒺尚䟽諸王皆在京師競脩名譽招游士馬援謂司馬呂种曰建武之元名為天下重開自今以往海内日當安耳但憂國家諸子並壯而舊防未立若多通賔客則大獄起矣卿曹戒慎之至是有上書告肅等受誅之家為諸王賔客慮因事生亂㑹更始之子夀光矦鯉得幸於沛王怨劉盆子結客殺故式矦恭帝怒沛王坐繋詔獄三日乃得出因詔郡縣收捕諸王賔客更相牽引死者以千數吕种亦與其禍臨命嘆曰馬將軍誠神人也秋八月戊寅東海王彊沛王輔楚王英濟南王康淮陽王延始就國上大㑹羣臣問誰可傅太子者羣臣承望上意皆言太子舅執金吾原鹿矦隂識可博士張佚正色曰今陛下立太子為隂氏乎為天下乎即為隂氏則隂矦可為天下則固宜用天下之賢才帝稱善曰欲置傅者以輔太子也今博士不難正朕況太子乎即拜佚為太子太傅以博士􅁊榮為少傅賜以輜車乗馬榮大㑹諸生陳其車馬印綬曰今日所䝉稽古之力也可不勉哉北匈奴遣使貢馬及裘更乞和親并請音樂又求率西域諸國胡客俱獻見帝下三府議酬荅之宜司徒掾班彪曰臣聞孝宣皇帝敕邊守尉曰匈奴大國多變詐交接得其情則却敵折衝應對入其數則反為輕欺今北匈奴見南單于來附懼謀其國故數乞和親又遠驅牛馬與漢合市重遣名王多所貢獻斯皆外示富彊以相欺誕也臣見其獻益重知其國益虚歸親愈數為懼愈多然今旣未獲助南則亦不宜絶北羈縻之義禮無不答謂可頗加賞賜略與所獻相當報答之辭令必有適今立稾草并上曰單于不忘漢恩追念先祖舊約欲修和親以輔身安國計議甚髙為單于嘉之往者匈奴數有乖亂呼韓邪郅支自相讎隙並蒙孝宣皇帝垂恩救䕶故各遣侍子稱藩保塞其後郅支忿戾自絶皇澤而呼韓附親忠孝彌著及漢滅郅支遂保國􅀓嗣子孫相繼今南單于攜衆向南􅅃塞㱕命自以呼韓嫡長次第當立而侵奪失職猜疑相背數請兵將歸埽北庭䇿謀紛紜無所不至惟念斯言不可獨聽又以北單于比年貢獻欲脩和親故拒而未許將以成單于忠孝之義漢秉威信緫率萬國日月所照皆爲臣妾殊俗百蠻義無親踈服順者襃賞畔逆者誅罰善惡之効呼韓郅支是也今單于欲脩和親􅅃誠已達何嫌而欲率西域諸國俱來獻見西域國屬匈奴與屬漢何異單于數連兵亂國内虚耗貢物裁以通禮何必獻馬裘今齎雜繒五百匹弓鞬韥丸一矢四發遺單于又賜獻馬左骨都矦右谷蠡王雜繒各四百匹斬馬劒各一單于前言先帝時所賜呼韓邪竽瑟空矦皆敗願復裁賜念單于國尚未安方厲武節以戰攻為務竽瑟之用不如良弓利劒故未以齎朕不愛小物於單于便宜所欲遣驛以聞帝悉納從之二十九年春二月丁巳朔日有食之三十年春二月車駕東廵羣臣上言即位三十年宜封禪泰山詔曰即位三十年百姓怨氣滿腹吾誰欺欺天乎曾謂泰山不如林放乎何事汙七十二代之編錄若郡縣逺遣吏上壽盛稱虚美必髠令屯田於是羣臣不敢復言甲子上幸魯濟南閏月癸丑還宫有星孛于紫宫夏四月戊子徙左翊王焉為中山王五月大水秋七月丁酉上行幸魯冬十一月丁酉還宫膠東剛矦賈復薨復從征伐未嘗䘮敗數與諸將潰圍解急身被十二創帝以復敢深入希令遠征而壯其勇節常自從之故復少方面之勲諸將每論功伐復未嘗有言帝輒曰賈君之功我自知之三十一年夏五月大水癸酉晦日有食之蝗京兆掾第五倫領長安市公平亷介市無姦枉每讀詔書常歎息曰此聖主也一見決矣等輩笑之曰爾説將尚不能下安能動萬乗乎倫曰未遇知已道不同故耳後舉孝亷補淮陽王醫工長中元元年春正月淮陽王入朝倫隨官屬得㑹見帝問以政事倫因此酬對帝大恱明日復特召入與語至夕帝謂倫曰聞卿爲吏篣婦公不過從兄飯寧有之邪對曰臣三娶妻皆無父少遭饑亂實不敢妄過人食衆人以臣愚蔽故生是語耳帝大笑以倫爲扶夷長未到官追拜㑹稽太守爲政清而有惠百姓愛之上讀河圗㑹昌符曰赤劉之九㑹命岱宗上感此文乃詔虎賁中郎將梁松等按索河雒讖文言九世當封禪者凡三十六事於是張純等復奏請封禪上乃許焉詔有司求元封故事當用方石再累玉檢金泥上以石功難就欲因孝武故封石置玉牒其中梁松爭以爲不可乃命石工取完青石無必五色丁卯車駕東廵二月己卯幸魯進幸泰山辛卯晨燎祭天於泰山下南方羣神皆從用樂如南郊事畢至食時天子御輦登山日中後到山上更衣晡時升壇北面尚書令奉玉牒檢天子以寸二分璽親封之訖太常命騶騎二千餘人發壇上方石尚書令藏玉牒已復石覆訖尚書令以五寸印封石檢事畢天子再拜羣臣稱萬嵗乃復道下夜半後上乃到山下百官明旦乃訖甲午禪祭地于梁隂以髙后配山川羣神從如元始中北郊故事三月戊辰司空張純薨夏四月癸酉車駕還宫己卯赦天下改元上行幸長安五月乙丑還宫六月辛卯以太僕馮魴為司空乙未司徒馮勤薨京師醴泉涌出又有赤草生於水崖郡國頻上甘露羣臣奏言靈物仍降宜令太史撰集以傳來世帝不納帝自謙無徳每郡國所上輒抑而不當故史官罕得記焉秋郡國三蝗冬十月辛未以司􅀠校尉東萊李訢為司徒甲申使司空告祠髙廟上薄太后尊號曰髙皇后配食地祇遷呂太后廟主于園四時上祭十一月甲子晦日有食之是嵗起明堂靈臺辟雍宣布圗䜟於天下初上以赤伏符即帝位由是信用䜟文多以決定嫌疑給事中􅁊譚上䟽諌曰凡人情忽於見事而貴於異聞觀先王之所記述咸以仁義正道為本非有竒怪虛誕之事蓋天道性命聖人所難言也自子貢以下不得而聞況後世淺儒能通之乎今諸巧慧小才伎數之人増益圖書矯稱䜟記以欺惑貪邪詿誤人主焉可不抑遠之哉臣譚伏聞陛下窮折方士黄白之術甚為明矣而乃欲聽納䜟記又何誤也其事雖有時合譬猶卜數隻偶之類陛下宜垂明聽發聖意屛羣小之曲説述五經之正義䟽奏帝不悦㑹議靈臺所處帝謂譚曰吾欲以䜟決之何如譚黙然良乆曰臣不讀䜟帝問其故譚復極言䜟之非經帝大怒曰桓譚非聖無灋將下斬之譚叩頭流血良乆乃得解出為六安郡丞道病卒范曄論曰􅁊譚以不善䜟流亡鄭興以遜辭僅免賈逵能附㑹文致最差貴顯世主以此論學悲哉逵扶風人也南單于比死弟左賢王莫立為丘浮尤鞮單于帝遣使齎璽書拜授璽綬賜以衣冠及繒綵是後遂以為常二年春正月辛未初立北郊祀后土二月戊戌帝崩於南宮前殿年六十二帝毎旦視朝日仄乃罷數引公卿郎將講論經理夜分乃寐皇太子見帝勤勞不怠承閒諌曰陛下有禹湯之明而失黄老養性之福願頥愛精神優游自寧帝曰我自樂此不為疲也雖以征伐濟大業及天下旣定乃退功臣而進文吏明慎政體緫攬權綱量時度力舉無過事故能恢復前烈身致太平太尉趙憙典䘮事時經王莽之亂舊典不存皇太子與諸王雜止同席藩國官屬出入宫省與百僚無别憙正色横劒殿階扶下諸王以明尊卑奏遣謁者將䕶官屬分止它縣諸王並令就邸唯得朝晡入臨整禮儀嚴門衛内外肅然太子即皇帝位尊皇后曰皇太后山陽王荆哭臨不哀而作飛書令蒼頭詐稱大鴻臚郭況書與東海王彊言其無罪被廢及郭后黜辱勸令東歸舉兵以取天下且曰髙祖起亭長陛下興白水何況於王陛下長子故副主哉當為秋霜無為檻羊人主崩亡閭閻之伍尚為盜賊欲有所望何況王邪彊得書惶怖即執其使封書上之明帝以荆母弟祕其事遣荆出止河南宮三月丁卯葬光武皇帝於原陵夏四月丙辰詔曰方今上無天子下無方伯若渉淵水而無舟楫夫萬乗至重而壯者慮輕實賴有徳左右小子髙宻矦禹元功之首東平王蒼寛博有謀其以禹爲太傅蒼爲驃騎將軍蒼懇辭帝不許又詔驃騎將軍置長史掾史員四十人位在三公上蒼嘗薦西曹掾齊國吳良帝曰薦賢助國宰相之職也蕭何舉韓信設壇而拜不復考試今以良爲議郎初燒當羌豪滇良擊破先零奪居其地滇良卒子滇吾立附落轉盛秋滇吾與弟滇岸率衆㓂隴西敗太守劉盱於允街於是守寨諸羌皆叛詔謁者張鴻領諸郡兵撃之戰於允吾鴻軍敗沒冬十一月復遣中郎將竇固監捕虜將軍馬武等二將軍四萬人討之是嵗南單于莫死弟汗立為伊伐於慮鞮單于顯宗孝明皇帝上永平元年春正月帝率公卿已下朝于原陵如元㑹儀乗輿拜神坐退坐東廂侍衛官皆在神坐後太官上食太常奏樂郡國上計吏以次前當神軒占其郡榖價及民所疾苦是後遂以為常夏五月髙宻元矦鄧禹薨東海恭王彊病上遣使者太醫乗驛視疾駱驛不絶詔沛王輔濟南王康淮陽王延詣魯省疾戊寅彊薨臨終上䟽謝恩言身旣夭命孤弱復為皇太后陛下憂慮誠悲誠慙息政小人也猥當襲臣後必非所以全利之也願還東海郡今天下新罹大憂惟陛下加供養皇太后數進御餐臣彊困劣言不能盡意願並謝諸王不意永不復相見也帝覽書悲慟從太后出幸津門亭發哀使大司空持節䕶䘮事贈送以殊禮詔楚王英趙王栩北海王興及京師親戚皆㑹葬帝追惟彊深執謙儉不欲厚葬以違其意於是特詔遣送之物務從約省衣足斂形茅車瓦器物減於制以彰王卓爾獨行之志將作大匠留起陵廟秋七月馬武等撃燒當羌大破之餘皆降散山陽王荆私迎能爲星者與謀議冀天下有變帝聞之徙封荆廣陵王遣之國遼東太守祭肜使偏何討赤山烏􅁊大破之斬其魁帥塞外震讋西自武威東盡􅀇莵皆來内附野無風塵乃悉罷緣邊屯兵東平王蒼以為中興三十餘年四方無虞宜修禮樂乃與公卿共議定南北郊冠冕車服制度及光武廟登歌八佾舞數上之好畤愍矦耿弇薨二年春正月辛未宗祀光武皇帝於明堂帝及公卿列矦始服冠冕玉佩以行事禮畢登靈臺望雲物赦天下三月臨辟雍初行大射禮冬十月壬子上幸辟雍初行養老禮以李躬為三老􅁊榮為五更三老服都紵大袍冠進賢扶玉杖五更亦如之不杖乗輿到辟雍禮殿御坐東廂遣使者安車迎三老五更於太學講堂天子迎于門屏交禮道自阼階三老升自賓階至階天子揖如禮三老升東面三公設几九卿正履天子親􅃝割牲執醬而饋執爵而酳祝鯁在前祝饐在後五更南面三公進供禮亦如之禮畢引桓榮及弟子升堂上自為下説諸儒執經問難於前冠帶搢紳之人圜橋門而觀聽者蓋億萬計於是下詔賜榮爵關内矦三老五更皆以二千石禄養終厥身賜天下三老酒人一石肉四十斤上自為太子受尚書於桓榮及即帝位猶尊榮以師禮嘗幸太常府令榮坐東面設几杖㑹百官及榮門生數百人上親自執業諸生或避位發難上謙曰大師在是旣罷悉以太官供具賜太常家榮每疾病帝輒遣使者存問太官太醫相望於道及篤上疏謝恩讓還爵土帝幸其家問起居入街下車擁經而前撫榮垂涕賜以牀茵帷帳刀劒衣被良乆乃去自是諸矦將軍大夫問疾者不敢復乗車到門皆拜牀下榮卒帝親自變服臨䘮送葬賜􅃁塋于首山之陽子郁當嗣讓其兄子汎帝不許郁乃受封而悉以租入與之帝以郁為侍中上以中山王焉郭太后少子太后尤愛之故獨留京師至是始與諸王俱就國賜以虎賁官騎恩寵尤厚獨得往來京師帝禮待隂郭毎事必均數受賞賜恩寵俱渥甲子上行幸長安十一月甲申遣使者以中牢祠蕭何霍光帝過式其墓進幸河東癸卯還宮十二月䕶羌校尉竇林坐欺㒺及臧罪下獄死林者融之從兄子也於是竇氏一公兩矦三公主四二千石相與並時自祖及孫官府邸第相望京邑於親戚功臣中莫與為比及林誅帝數下詔切責融融惶恐乞骸骨詔令歸第養病是嵗初迎氣於五郊新陽矦隂就子豐尚酈邑公主公主驕妬豐殺之被誅父母皆自殺南單于汗死單于比之子適立為醯僮尸逐矦鞮單于三年春二月甲寅太尉趙憙司徒李訢免丙辰以左馮翊郭丹為司徒己未以南陽太守虞延為太尉甲子立貴人馬氏為皇后皇子炟為太子后援之女也光武時以選入太子宫能奉承隂后傍接同列禮則脩備上下安之遂見寵異及帝即位為貴人時后前母姊女賈氏亦以選入生皇子炟帝以后無子命養之謂曰人未必當自生子但患愛養不至耳后於是盡心撫育勞悴過於所生太子亦孝性淳篤母子慈愛始終無纎介之間后常以皇嗣未廣薦達左右若恐不及後宫有進見者每加慰納若數所寵引輙增隆遇及有司奏立長秋宫帝未有所言皇太后曰馬貴人徳冠後宫即其人也后旣正位宫闈愈自謙肅好讀書常衣大練裙不加縁朔望諸姬主朝請望見后袍衣踈麤以為綺縠就視乃笑后曰此繒特宜染色故用之耳羣臣奏事有難平者帝數以試后后輒分解趣理各得其情然未嘗以家私干政事帝由是寵敬始終無衰焉帝思中興功臣乃圗􅀞二十八將於南宫雲臺以鄧禹為首次馬成吳漢王梁賈復陳俊耿弇杜茂冦恂傅俊岑彭堅鐔馮異王霸朱祜任光祭遵李忠景丹萬脩蓋延邳肜銚期劉植耿純臧宫馬武劉隆又益以王常李通竇融卓茂合三十二人馬援以椒房之親獨不與焉夏四月辛酉封皇子建為千乗王羡為廣平王六月丁卯有星孛于天船北帝大起北宫時天旱尚書僕射㑹稽鍾離意詣闕免冠上䟽曰昔成湯遭旱以六事自責曰政不節邪使民疾邪宫室營邪女謁盛邪苞苴行邪讒夫昌邪竊見北宫大作民失農時自古非苦宫室小狹但患民不安寧宜且罷止以應天心帝䇿詔報曰湯引六事咎在一人其冠履勿謝又敕大匠止作諸宫減省不急詔因謝公卿百僚遂應時澍雨意薦全椒長劉平詔徴拜議郎平在全椒政有恩惠民或増貲就賦或減年從役刺史太守行部獄無繋囚人自以得所不知所問唯班詔書而去帝性褊察好以耳目隠發為明公卿大臣數被詆毁近臣尚書以下至見提曵常以事怒郎藥崧以杖撞之崧走入牀下帝怒甚疾言曰郎出崧乃曰天子穆穆諸矦皇皇未聞人君自起撞郎帝乃赦之是時朝廷莫不悚慄爭為嚴切以避誅責唯鍾離意獨敢諌爭數封還詔書臣下過失輙救解之㑹連有變異上䟽曰陛下敬畏鬼神憂恤黎元而天氣未和寒暑違節者咎在羣臣不能宣化治職而以苛刻為俗百官無相親之心吏民無雍雍之志至於感逆和氣以致天災百姓可以徳勝難以力服鹿鳴之詩必言宴樂者以人神之心洽然後天氣和也願陛下垂聖徳緩刑罰順時氣以調隂陽帝雖不能用然知其至誠終愛厚之秋八月戊辰詔改太樂官曰太予用讖文也壬申晦日有食之詔曰昔楚莊無災以致戒懼魯哀禍大天不降譴今之動變儻尚可救有司勉思厥職以匡無徳冬十月甲子車駕從皇太后幸章陵荆州刺史郭賀官有殊政上賜以三公之服黼黻冕旒敕行部去襜帷使百姓見其容服以章有徳戊辰還自章陵是嵗京師及郡國七大水莎車王賢以兵威逼奪于寘大宛媯塞王國使其將守之于寘人殺其將君徳立大人休莫霸為王賢率諸國兵數萬擊之大為休莫霸所敗脱身走還休莫霸進圍莎車中流矢死于寘人復立其兄子廣徳為王廣徳使其弟仁攻賢廣徳父先拘在莎車賢乃歸其父以女妻之與之和親資治通鑑巻第四十四
