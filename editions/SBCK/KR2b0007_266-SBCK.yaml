front:
  text: 資治通鑑卷第二百六十六
  hash: sha256:e8e084814cb62b6ec208eaf40daa373a6059366907ebd43046b274b45ce9baa7
body:
  text: 臣司馬光奉勑編集後梁紀一徐七月凡一年有奇起強圉單閼盡著雍執太祖神武元聖孝皇帝上開平元年春正月辛巳梁王休兵于貝州淮南節度使兼侍中東面諸道行營都統􅀪農王楊渥既得江西驕侈益甚謂節度判官周隱曰君賣人國家何面復相見遂殺之由是將佐皆不自安黒雲都指揮使吕師周與副指揮使綦章將兵屯上髙師周與湖南戰屢有功渥忌之師周懼謀於綦章曰馬公寛厚吾欲逃死焉可乎章曰茲事君自圖之吾舌可㫁不敢泄師周遂奔湖南章縱其孥使逸去師周楊州人也渥居喪晝夜酣飲作樂然十圍之燭以擊毬一燭費錢數萬或單騎出遊從者奔走道路不知所之左右牙指揮使張顥徐温泣諫渥怒曰汝謂我不才何不殺我自為之二人懼渥選壯士號東院馬軍廣署親信為將吏所署者恃勢驕横陵蔑勲舊顥温潜謀作亂渥父行密之世有親軍數千營於牙城之内渥遷出於外以其地為射場顥温由是無所憚渥之鎮宣州也命指揮使朱思勍范思從陳璠將親兵三千及嗣位召歸廣陵顥温使三將從秦裴擊江西因戍洪州誣以謀叛命别將陳祐往誅之祐間道兼行六日至洪州微服懐短兵徑入秦裴帳中裴大驚祐告之故乃召思勍等飲酒祐數思勍等罪執而斬之渥聞三將死益忌顥温欲誅之丙戍渥晨視事顥温帥牙兵二百露刃直入庭中渥曰爾果欲殺我邪對曰非敢然也欲誅王左右亂政者耳因數渥所親信十餘人之罪曵下以鐵檛擊殺之謂之兵諫諸將不與之同者顥温稍以法誅之於是軍政悉歸二人渥不能制初梁王以河北諸鎮皆服惟幽滄未下故大舉伐之欲以堅諸鎮之心既而潞州内叛王燒營而還威望大沮恐中外因此離心欲速受禪以鎮之丁亥王入館于魏有疾臥府中魏博節度使羅紹威恐王襲之入見王曰今四方稱兵為王患者皆以翼戴唐室為名王不如早滅唐以絶人望王雖不許而心徳之乃亟歸壬寅至大梁甲辰唐昭宣帝遣御史大夫薛貽矩至大梁勞王貽矩請以臣禮見王揖之升階貽矩曰殿下功徳在人三靈改卜皇帝方行舜禹之事臣安敢違乃北面拜舞於庭王側身避之貽矩還言於帝曰元帥有受禪之意矣帝乃下詔以二月禪位于梁又遣宰相以書諭王王辭河東兵猶屯長子欲窺澤州王命保平節度使康懐貞悉發京兆同華之兵屯晉州以備之二月唐大臣共奏請昭宣帝遜位壬子詔宰相帥百官詣元帥府勸進王遣使却之於是朝臣藩鎮乃至湖南嶺南上牋勸進者相繼三月癸未王以毫州刺史李思安為北路行軍都統將兵擊幽州庚寅唐昭宣帝詔薛貽矩再詣大梁諭禪位之意又詔禮部尚書蘇循齎百官牋詣大梁鎮海鎮東節度使吳王錢鏐遣其子傳璙傳瓘討盧佶於温州甲辰唐昭宣帝降御札禪位于梁以攝中書令張文蔚為冊使禮部尚書蘇循副之攝侍中楊涉為押傳國寳使翰林學士張䇿副之御史大夫薛貽矩為押金寳使尚書左丞趙光逢副之帥百官備法駕詣大梁楊涉子直史館凝式言於涉曰大人為唐宰相而國家至此不可謂之無過况手持天子璽綬與人雖保冨貴柰千載何盍辭之涉大駭曰汝滅吾族神色為之不寧者數日䇿敦煌人光逢隱之子也盧龍節度使劉仁恭驕侈貪暴常慮幽州城不固築館於大安山曰此山四面懸絶可以少制衆其棟宇壯麗擬於帝者選美女實其中與方士鍊丹藥求不死悉歛境内錢瘞於山顛令民間用堇泥為錢又禁江南茶商無得入境自采山中草木為茶鬻之仁恭有愛妾羅氏其子守光通焉仁恭杖守光而斥之不以為子數李思安引兵入其境所過焚蕩無餘夏四月己酉直抵幽州城下仁恭猶在大安山城中無備幾至不守守光自外引兵入登城拒守又出兵與思安戰思安敗退守光遂自稱節度使令部將李小喜元行欽將兵攻大安山仁恭遣兵拒戰為小喜所敗虜仁恭以歸囚於别室仁恭將佐及左右凡守光素所惡者皆殺之銀胡䩮都指揮使王思同帥部兵三千山後八軍廵檢使李承約帥部兵二千奔河東守光弟守竒奔契丹未幾亦奔河東河東節度使晉王克用以承約為匡霸都指揮使思同為飛騰指揮使思同母仁恭之女也庚戍梁王始御金祥殿受百官稱臣下書稱教令自稱曰寡人辛亥令諸牋表簿籍皆去唐年號但稱月日丙辰張文蔚等至大梁盧佶聞錢傳璙等將至將水軍拒之於青澳錢傳瓘曰佶之精兵盡在於此不可與戰乃自安固捨舟間道襲温州戊午温州潰擒佶斬之吳王鏐以都監使吳璋為温州制置使命傳璙等移兵討盧約於處州壬戌梁王更名晃王兄全昱聞王將即帝位謂王曰朱三爾可作天子乎甲子張文蔚楊涉乗輅自上源驛從冊寳諸司各備儀衞鹵簿前導百官從其後至金祥殿前陳之王被衮冕即皇帝位張文蔚蘇循奉冊升殿進讀楊涉張䇿薛貽矩趙光逢以次奉寳升殿讀己降帥百官舞蹈稱賀帝遂與文蔚等宴於􅀇徳殿帝舉酒曰朕輔政未久此皆諸公推戴之力文蔚等皆慙懼俯伏不能對獨蘇循薛貽矩及刑部尚書張禕盛稱帝功徳宜應天順人帝復與宗戚飲博於宫中酒酣朱全昱忽以投瓊擊盆中迸散睨帝曰朱三汝本碭山一民也從黄巢為盜天子用汝為四鎮節度使富貴極矣柰何一旦滅唐家三百年社稷自稱帝王行當族滅奚以博為帝不懌而罷乙丑命有司告天地宗廟社稷丁卯遣使宣諭州鎮戊辰大赦改元國號大梁奉唐昭宣帝為濟隂王皆如前代故事唐中外舊臣官爵並如故以汴州為開封府命曰東都以故事都為西都廢故西京以京兆府為大安府置佑國軍於大安府更名魏博曰天雄軍遷濟隂王于曹州栫之以棘使甲士守之辛未以武安節度使馬殷為楚王以宣武掌書記太府卿敬翔知崇政院事以備顧問參謀議於禁中承上㫖宣於宰相而行之宰相非進對時有所奏請及已受㫖應復請者皆具記事因崇政院以聞得㫖則復宣於宰相翔為人沈深有智略在幕府三十餘年軍謀民政帝一以委之翔盡心勤勞晝夜不寐自言惟馬上乃得休息帝性暴戾難近人莫能測惟翔能識其意趣或有所不可翔未嘗顯言但微示持疑帝意巳悟多為之改易禪代之際翔謀居多追尊皇髙祖考妣以來皆為帝后皇考誠為烈祖文穆皇帝妣王氏為文惠皇后初帝為四鎮節度使凡倉庫之籍置建昌院以領之至是以養子宣武節度副使友文為開封尹判院事掌凡國之金榖友文本康氏子也乙亥下制削奪李克用官爵是時惟河東鳯翔淮南稱天祐西川稱天復年號餘皆稟梁正朔稱臣奉貢蜀王與􅀪農王移檄諸道云欲與岐王晉王㑹兵興復唐室卒無應者蜀王乃謀稱帝下教諭綂内吏民又遺晉王書云請各帝一方俟朱温既平乃訪唐宗室立之退歸藩服晉王復書不許曰誓於此生靡敢失節唐末之誅宦官也詔書至河東晉王匿監軍張承業於斛律寺斬罪人以應詔至是復以為監軍待之加厚承業亦為之竭力岐王治軍甚寛待士卒簡易有告部將苻昭反者岐王直詣其家悉去左右熟寢經宿而還由是衆心悦服然御軍無紀律及聞唐亡以兵羸地蹙不敢稱帝但開岐王府置百官名其所居為宫殿妻稱皇后將吏上書稱牋表鞭扇號令多擬帝者鎮海節度判官羅隱説吴王鏐舉兵討梁曰縱無成功猶可退保杭越自為東帝柰何交臂事賊為終古之羞乎鏐始以隱為不遇於唐必有怨心及聞其言雖不能用心甚義之五月丁丑朔以御史大夫薛貽矩為中書侍郎同平章事加武順軍節度使趙王王鎔守太師天雄節度使鄴王羅紹威守太傅義武節度使王處直兼侍中契丹遣其臣袍笏梅老來通好帝遣太府少卿髙頎報之初契丹有八部部各有大人相與約推一人為王建旗鼓以號令諸部每三年則以次相代咸通末有習爾者為王土宇始大其後欽徳為王乗中原多故時入盜邊及阿保機為王尤雄勇五姓奚及七姓室韋達靼咸役屬之阿保機姓邪律氏恃其彊不肯受代久之阿保機擊黄頭室韋還七部劫之於境上求如約阿保機不得已傳旗鼓且曰我為王九年得漢人多請帥種落居古漢城與漢人守之别自為一部七部許之漢城者故後魏滑鹽縣也地宜五榖有鹽池之利其後阿保機稍以兵擊滅七部復併為一國又北侵室韋女真西取突厥故地擊奚滅之復立奚王而使契丹監其兵東北諸夷皆畏服之是歲阿保機帥衆三十萬冦雲州晉王與之連和面㑹東城約為兄弟延之帳中縱酒握手盡歡約以今冬共擊梁或勸晉王因其來可擒也王曰讎敵未滅而失信夷狄自亡之道也阿保機留旬日乃去晉王贈以金繒數萬阿保機留馬三千匹雜畜萬計以酬之阿保機旣歸而背盟更附于梁晉王由是恨之己卯以河南尹兼河陽節度使張全義為魏王鎮海鎮東節度使吴王錢鏐為吴越王加清海節度使劉隱威武節度王審知兼侍中仍以隱為大彭王癸未以權知荆南留後髙季昌為節度使荆南舊綂八州乾符以來寇亂相繼諸州皆為鄰道所據獨餘江陵季昌到官城邑殘毁户口彫耗季昌安集流散民皆復業乙酉立皇兄全昱為廣王子友文為博王友珪為郢王友璋為福王友貞為均王友雍為賀王友徽為建王辛夘以東都舊第為建昌宫改判建昌院事為建昌宫使壬辰命保平節度使康懐貞將兵八萬㑹魏博兵攻潞州甲午詔廢樞密院其職事皆入於崇政院以知院事敬翔為院使禮部尚書蘇循及其子起居郎楷自謂有功於梁當不次擢用循朝夕望為相帝薄其為人敬翔及殿中監李振亦鄙之翔言於帝曰蘇循唐之䲭梟賣國求利不可以立於惟新之朝戊戍詔循及刑部尚書張禕等十五人並勒致仕楷斥歸田里循父子乃之河中依朱友謙盧約以處州降吴越􅀪農王以鄂岳觀察使劉存為西南面都招討使岳州刺史陳知新為岳州團練使廬州觀察使劉威為應援使别將許􅀇應為監軍將水軍三萬以擊楚楚王馬殷甚懼靜江軍使楊定真賀曰我軍勝矣殷問其故定真曰夫戰懼則勝驕則敗今淮南兵直趨吾城是驕而輕敵也而王有懼色吾是以知其必勝也殷命在城都指揮使秦彦暉將水軍三萬浮江而下水軍副指揮使黄璠帥戰艦三百屯瀏陽口六月存等遇大雨引兵還至越堤北彦暉追之存數戰不利乃遺殷書詐降彦暉使謂殷曰此必詐也勿受存與彦暉夾水而陳存遥呼曰殺降不祥公獨不為子孫計耶彦暉曰賊入吾境而不擊奚顧子孫鼓譟而進存等走黄璠自瀏陽引兵絶江與彦暉合擊大破之執存及知新禆將死者百餘人士卒死者以萬數獲戰艦八百艘威以餘衆遁歸彦暉遂㧞岳州殷釋存知新之縳慰諭之二人皆罵曰丈夫以死報主肯事賊乎遂斬之許􅀇應􅀪農王之腹心也常預政事張顥徐温因其敗収斬之楚王殷遣兵㑹吉州刺史彭玕攻洪州不克康懐貞至潞州晉昭義節度使李嗣昭副使李嗣弼閉城拒守懐貞晝夜攻之半月不克乃築壘穿蚰蜒塹而守之内外斷絶晉王以蕃漢都指揮使周徳威為行營都指揮使帥馬軍都指揮使李嗣本馬步都虞􅃸李存璋先鋒指揮使史建瑭鐡林都指揮使安元信横衝指揮使李嗣源騎將安金全救潞州嗣弼克脩之子嗣本本姓張建瑭敬思之子金全代北人也晉兵攻澤州帝遣左神勇軍使范居實將兵救之甲寅以平盧節度使韓建守司徒同平章事武貞節度使雷彦恭㑹楚兵攻江陵荆南節度使髙季昌引兵屯公安絶其糧道彦恭敗楚兵亦走劉守光既囚其父自稱盧龍留後遣使請命秋七月甲午以守光為盧龍節度使同平章事靜海節度使曲裕卒丙申以其子權知留後顥為節度使雷彦恭攻岳州不克八月丙午賜河南尹張全義名宗奭辛亥以吴越王鏐兼淮南節度使楚王殷兼武昌節度使各充本道招討制置使晉周徳威壁于髙河康懐貞遣親騎都頭秦武將兵擊之武敗丁巳帝以亳州刺史李思安代懐貞為潞州行營都統黜懐貞為行營都虞􅃸思安將河北兵西上至潞州城下更築重城内以防奔突外以拒援兵謂之夾寨調山東民饋軍糧徳威日以輕騎抄之思安乃自東南山口築甬道屬於夾寨徳威與諸將互往攻之排牆填塹一晝夜間數十發梁兵疲於奔命夾寨中出芻牧者徳威輙抄之於是梁兵閉壁不出九月雷彦恭攻涔陽公安髙季昌擊敗之彦恭貪殘類其父專以焚掠為事荆湖間常被其患又附於淮南丙申詔削彦恭官爵命季昌與楚王殷討之蜀王㑹將佐議稱帝皆曰大王雖忠於唐唐已亡矣此所謂天與不取者也馮涓獨獻議請以蜀王稱制曰朝興則未爽稱臣賊在則不同為惡王不從涓杜門不出王用安撫副使掌書記韋莊之謀帥吏民哭三日己亥即皇帝位國號大蜀辛丑以前東川節度使兼侍中王宗佶為中書令韋莊為左散騎常侍判中書門下事閬州防禦使唐道襲為内樞密使莊見素之孫也蜀主雖目不知書好與書生談論粗曉其理是時唐衣冠之族多避亂在蜀蜀主禮而用之使修舉故事故其典章文物有唐之遺風蜀主長子校書郎宗仁㓜以疾廢立其次子祕書少監宗懿為遂王冬十月髙季昌遣其將倪可福㑹楚將秦彦暉攻朗州雷彦恭遣使乞降於淮南且告急􅀪農王遣將泠業將水軍屯平江李饒將步騎屯瀏陽以救之楚王殷遣岳州刺史許徳勲將兵拒之泠業進屯朗口徳勲使善游者五十人以木枝葉覆其首持長刀浮江而下夜犯其營且舉火業軍中驚擾徳勲以大軍進擊大破之追至鹿角鎮擒業又破瀏陽寨擒李饒掠上髙唐年而歸斬業饒於長沙市十一月甲申夾馬指揮使尹皓攻晉江猪嶺寨㧞之義昌節度使劉守文聞其弟守光幽其父集將吏大哭曰不意吾家生此梟鏡吾生不如死誓與諸君討之乃發兵擊守光玄有勝負天雄節度使鄴王紹威謂其下曰守光以窘急歸國守文孤立無援滄州可不戰服也乃遺守文書諭以禍福守文亦恐梁乘虚襲其後戊子遣使請降以子延祐為質帝拊手曰紹威折簡勝十萬兵加守文中書令撫納之初帝在藩鎮用法嚴將校有戰沒者所部兵悉斬之謂之跋隊斬士卒失主將者多亡逸不敢歸帝乃命凡軍士皆文其面以記軍號軍士或思鄉里逃去闗津輒執之送所屬無不死者其鄉里亦不敢容由是亡者皆聚山澤為盜大為州縣之患壬寅詔赦其罪自今雖文面亦聴還鄉里盜減什七八淮南右都押牙米志誠等將兵度淮襲潁州克其外郭刺史張實據子城拒守晉王命李存璋攻晉州以分上黨兵勢十二月壬戍詔河中陜州發兵救之甲子詔發步騎五千救頴州米志誠等引去丁夘晉兵冦洺州淮南兵攻信州刺史危仔倡求救於吳越二年春正月癸酉朔蜀主登興義樓有僧抉一目以獻蜀主命飯僧萬人以報之翰林學士張格曰小人無故自殘赦其罪已幸矣不宜復崇奨以敗風俗蜀主乃止丁丑蜀以韋莊爲門下侍郎同平章事辛巳蜀主祀南郊壬午大赦改元武成晉王疽發於首病篤周徳威等退屯亂栁晉王命其弟内外蕃漢都知兵馬使振武節度使克寧監軍張承業大將李存璋吴珙掌書記盧質立其子晉州刺史存朂爲嗣曰此子志氣逺大必能成吾事爾曹善教導之辛卯晉王謂存朂曰嗣昭厄於重圍吾不及見矣俟葬畢汝與徳威輩速竭力救之又謂克寧等曰以亞子累汝亞子存朂小名也言終而卒克寧綱紀軍府中外無敢諠譁克寧久總兵柄有次立之勢時上黨圍未解軍中以存朂年少多竊議者人情忷忷存朂懼以位讓克寧克寧曰汝􅃁嗣也且有先王之命誰敢違之將吏欲謁見存朂存朂方哀哭乆未出張承業入謂存朂曰大孝在不墜基業多哭何為因扶存朂出襲位為河東節度使晉王李克寧首帥諸將拜賀王悉以軍府事委之以李存璋為河東軍城使馬步都虞候先王之時多寵借胡人及軍士侵擾市肆存璋既領職執其尤暴横者戮之旬月間城中肅然吴越王鏐遣兵侵淮南甘露鎮以救信州蜀中書令王宗佶於諸假子為最長且恃其功專權驕恣唐道襲已為樞密使宗佶猶以名呼之道襲心衘之而事之逾謹宗佶多樹黨友蜀主亦惡之二月甲辰以宗佶為太師罷政事蜀以户部侍郎張格為中書侍郎同平章事格為相多迎合主意有勝己者必以計排去之初晉王克用多養軍中壯士為子寵遇如真子及晉王存朂立諸假子皆年長握兵心怏怏不服或託疾不出或見新王不拜李克寧權位既重人情多向之假子李存顥隂説克寧曰兄終弟及自古有之以叔拜姪於理安乎天與不取後悔無及克寧曰吾家世以慈孝聞天下先王之業茍有所歸吾復何求汝勿妄言我且斬汝克寧妻孟氏素剛捍諸假子各遣其妻入説孟氏孟氏以為然且慮語泄及禍數以迫克寧克寧性怯朝夕惑於衆言心不能無動又與張承業李存璋相失數誚讓之又因事擅殺都虞候李存質又求領大同節度使以蔚朔應州為廵屬晉王皆聴之李存顥等為克寕謀因晉王過其第殺承業存璋奉克寧為節度使舉河東九州附于梁執晉王及太夫人曹氏送大梁太原人史敬鎔少事晉王克用居帳下見親信克寧欲知府中隂事召敬鎔密以謀告之敬鎔陽許之入告太夫人太夫人大駭召張承業指晉王謂之曰先王把此兒臂授公等如聞外間謀欲負之但置吾母子有地勿送大梁自它不以累公承業惶恐曰老奴以死奉先王之命此何言也晉王以克寧之謀告且曰至親不可自相魚肉吾茍避位則亂不作矣承業曰克寧欲投大王母子於虎口不除之豈有全理乃召李存璋吳珙及假子李存敬長直軍使朱守殷使隂爲之備壬戍置酒㑹諸將於府舍伏甲執克寧存顥於座晉王流涕數之曰兒曏以軍府讓叔父叔父不取今事巳定柰何復爲此謀忍以吾母子遺仇讎乎克寧曰此皆䜛人交構夫復何言是日殺克寧及存顥癸亥酖殺濟隂王於曹州追謚曰唐哀皇帝甲子蜀兵入歸州執刺史張瑭辛未以韓建爲侍中兼建昌宫使李思安等攻潞州久不下士卒疲弊多逃亡晉兵猶屯余吾寨帝疑晉王克用詐死欲召兵還恐晉人躡之乃議自至澤州應接歸師且召匡國節度使劉知俊將兵趣澤州三月壬申朔帝發大梁丁丑次澤州辛巳劉知俊至壬午以知俊為潞州行營招討使癸巳門下侍郎同平章事張文蔚卒帝以李思安久無功亡將校四十餘人士卒以萬計更閉壁自守遣使召詣行在甲午削思安官爵勒歸本貫充役斬監押楊敏貞晉李嗣昭固守踰年城中資用將竭嗣昭登城宴諸將作樂流矢中嗣昭足嗣昭密㧞之座中皆不覺帝數遣使賜嗣昭詔諭降之嗣昭焚詔書斬使者帝留澤州旬餘欲召上黨兵還遣使就與諸將議之諸將以為李克用死余吾兵且退上黨孤城無援請更旬月以俟之帝從之命増運芻糧以饋其軍劉知俊將精兵萬餘人擊晉軍斬獲甚衆表請自留攻上黨車駕宜還京師帝以關中空虚慮歧人侵同華命知俊休兵長子旬日退屯晉州俟五月歸鎮蜀太師王宗佶既罷相怨望隂畜養死士謀作亂上表以為臣官預大臣親則長子國家之事休戚是同今儲貳未定必啓厲階陛下若以宗懿才堪繼承宜早行冊禮以臣為元帥兼總六軍儻以時方艱難宗懿沖㓜臣安敢持謙不當重事陛下既正位南面軍旅之事宜委之臣下臣請開元帥府鑄六軍印征戍徴發臣悉專行太子視膳於晨昏微臣握兵於環衛萬世基業惟陛下裁之蜀主怒隱忍未發以問唐道襲對曰宗佶威望内外懾服足以綂御諸將蜀主益疑之己亥宗佶入見辭色悖慢蜀主諭之宗佶不退蜀主不堪其忿命衞士撲殺之貶其黨御史中丞鄭騫為維州司户衞尉少卿李鋼為汶川尉皆賜死於路初晉王克用卒周徳威握重兵在外國人皆疑之晉王存朂召徳威使引兵還夏四月辛丑朔徳威至晉陽留兵城外獨徒步而入伏先王柩哭極哀退謁嗣王禮甚恭衆心由是釋然癸卯門下侍郎同平章事楊渉罷為右僕射以吏部侍郎于兢為中書侍郎翰林學士承㫖張䇿為刑部侍郎並同平章事兢琮之兄子也夾寨奏余吾晉兵已引去帝以爲援兵不能復來潞州必可取丙午自澤州南還壬子至大梁梁兵在夾寨者亦不復設備晉王與諸將謀曰上黨河東之藩蔽無上黨是無河東也且朱温所憚者獨先王耳聞吾新立以為童子未閑軍旅必有驕怠之心若簡精兵倍道趣之出其不意破之必矣取威定霸在此一舉不可失也張承業亦勸之行乃遣承業及判官王緘乞師於鳯翔又遣使賂契丹王阿保機求騎兵歧王衰老兵弱財竭竟不能應晉王大閲士卒以前昭義節度使丁㑹為都招討使甲子帥周徳威等發晉陽淮南遣兵寇石首襄州兵敗之於瀺港又遣其將李厚將水軍萬五千趣荆南髙季昌逆戰敗之於馬頭己巳晉王軍于黄碾距上黨四十五里五月辛未朔晉王伏兵三垂岡下詰旦大霧進兵直抵夾寨梁軍無斥候不意晉兵之至將士尚未起軍中驚擾晉王命周徳威李嗣源分兵為二道徳威攻西北隅嗣源攻東北隅填塹燒寨鼓譟而入梁兵大潰南走招討使符道昭馬倒為晉人所殺失亡將校士卒以萬計委弃資糧器械山積周徳威等至城下呼李嗣昭曰先王已薨今王自來破賊夾寨賊已去矣可開門嗣昭不信曰此必為賊所得使來誑我耳欲射之左右止之嗣昭曰王果來可見乎王自往呼之嗣昭見王白服大慟幾絶城中皆哭遂開門初徳威與嗣昭有隙晉王克用臨終謂晉王存朂曰進通忠孝吾愛之深今不出重圍豈徳威不忘舊怨邪汝為吾以此意諭之若潞圍不解吾死不瞑目進通嗣昭小名也晉王存朂以告徳威徳威感泣由是戰夾寨甚力既與嗣昭相見遂歡好如初康懐貞以百餘騎自天井關遁歸帝聞夾寨不守大驚既而歎曰生子當如李亞子克用為不亡矣至如吾兒豚犬耳詔所在安集散兵周徳威李存璋乗勝進趣澤州刺史王班素失人心衆不為用龍虎綂軍牛存節自西都將兵應接夾寨潰兵至天井關謂其衆曰澤州要害地不可失也雖無詔㫖當救之衆皆不欲曰晉人勝氣方鋭且衆寡不敵存節曰見危不救非義也畏敵彊而避之非勇也遂舉䇿引衆而前至澤州城中人已縱火諠譟欲應晉王班閉牙城自守存節至乃定晉兵尋至縁城穿地道攻之存節晝夜拒戰凡旬有三日劉知俊自晉州引兵救之徳威焚攻具退保髙平晉王歸晉陽休兵行賞以周徳威為振武節度使同平章事命州縣舉賢才黜貪殘寛租賦撫孤窮伸冤濫禁姦盗境内大治以河東地狹兵少乃訓練士卒令騎兵不見敵無得乗馬部分已定無得相踰越及留絶以避險分道並進期㑹無得差晷刻犯者必斬故能兼山東取河南由士卒精整故也初晉王克用平王行瑜唐昭宗許其承制封拜時方鎮多行墨制王恥與之同每除吏必表聞至是晉王存朂始承制除吏晉王徳張承業以兄事之每至其第升堂拜母賜遣甚厚潞州圍守歴年士民凍餒死者太半市里蕭條李嗣昭勸課農桑寛租緩刑數年之間軍城完復靜江節度使同平章事李瓊卒楚王殷以其弟永州刺史存知桂州事壬申更以許州忠武軍爲匡國軍同州匡國軍爲忠武軍陜州保義軍爲鎮國軍乙亥楚兵冦卾州淮南所署知州秦裴擊破之淮南左牙指揮使張顥右牙指揮使徐温專制軍政􅀪農威王心不能平欲去之而未能二人不自安共謀弑王分其地以臣於梁戊寅顥遣其黨紀祥等弑王於寢室詐云暴薨己夘顥集將吏於府廷夾道及庭中堂上皆列白刃令諸將悉去衞從然後入顥厲聲問曰嗣王已薨軍府誰當王之三問莫應顥氣色益怒幕僚嚴可求前密啓曰軍府至大四境多虞非公主之不可然今日則恐太速顥曰何謂速也可求曰劉威陶雅李遇李簡皆先王之等夷公今自立此曹肯為公下乎不若立㓜主輔之諸將孰敢不從顥黙然久之可求因屏左右急書一紙置䄂中麾同列詣使宅賀衆莫測其所為既至可求跪讀之乃太夫人史氏教也大要言先王創業艱難嗣王不幸早世隆演次當立諸將宜無負楊氏善輔導之辭㫖明切顥氣色皆沮以其義正不敢奪遂奉威王弟隆演稱淮南留後東面諸道行營都統既罷副都統朱瑾詣可求所居曰瑾年十六七即横戈躍馬衝犯大敵未嘗畏懾今日對顥不覺流汗公面折之如無人乃知瑾匹夫之勇不及公逺矣因以兄事之縱顥以徐温為浙西觀察使鎮潤州嚴可求説温曰公捨牙兵而出外藩顥必以弑君之罪歸公温驚曰然則柰何可求曰顥剛愎而暗於事公能見聴請為公圖之時副使李承嗣參預軍府之政可求又説承嗣曰顥凶威如此今出徐於外意不徒然恐亦非公之利承嗣深然之可求往見顥曰公出徐公於外人皆言公欲奪其兵權而殺之多言亦可畏也顥曰右牙欲之非吾意也業已行矣柰何可求曰止之易耳明日可求邀顥及承嗣俱詣温可求瞋目責温曰古人不忘一飯之恩况公楊氏宿將今㓜嗣初立多事之時乃求自安於外可乎温謝曰茍諸公見容温何敢自專由是不行顥知可求隂附温夜遣盗刺之可求知不免請為書辭府主盜執刀臨之可求操筆無懼色盜能辨字見其辭㫖忠壯曰公長者吾不忍殺掠其財以復命曰捕之不獲顥怒曰吾欲得可求首何用財為温與可求謀誅顥可求曰非鍾泰章不可泰章者合肥人時為左監門衞將軍温使親將彭城翟䖍告之泰章聞之喜密結壯士三十人夜刺血相飲為誓丁亥旦直入斬顥於牙堂并其親近温始暴顥弑君之罪轘紀祥等於市詣西宫白太夫人太夫人恐懼大泣曰吾兒冲㓜禍難如此願保百口歸廬州公之惠也温曰張顥弑逆不可不誅夫人宜自安初顥與温謀弑威王温曰參用左右牙兵心必不一不若獨用吾兵顥不可温曰然則獨用公兵顥從之至是窮治逆黨皆左牙兵也由是人以温為實不知謀也隆演以温為左右牙都指揮使軍府事咸取决焉以嚴可求為揚州司馬温性沈毅自奉簡儉雖不知書使人讀獄訟之辭而决之皆中情理先是張顥用事刑戮酷濫縱親兵剽奪市里温謂嚴可求曰大事已定吾與公輩當力行善政使人解衣而寢耳乃立法度禁彊􅁀政舉大綱軍民安之温以軍旅委可求以財賦委支計官駱知祥皆稱其職淮南謂之嚴駱己丑契丹王阿保機遣使隨髙頎入貢且求冊命帝復遣司農卿渾特賜以手詔約共滅沙陁乃行封冊壬辰夾寨諸將詣闕待罪皆赦之帝賞牛存節全澤州之功以為六軍馬步都指揮使雷彦恭引沅江環朗州以自守秦彦暉頓兵月餘不戰彦恭守備稍懈彦暉使禆將曹徳昌帥壯士夜入自水竇内外舉火相應城中驚亂彦暉鼓譟壊門而入彦恭輕舟奔廣陵彦暉虜其弟彦雄送于大梁淮南以彦恭為節度副使先是澧州刺史向瓌與彦恭相表裏至是亦降於楚楚始得澧朗二州蜀主遣將將兵㑹歧兵五萬攻雍州晉張承業亦將兵應之六月壬寅以劉知俊為西路行營都招討使以拒之金吾上將軍王師範家於洛陽朱友寧之妻泣訴於帝曰陛下化家為國宗族皆蒙榮寵妾夫獨不幸因王師範叛逆死於戰場今仇讎猶在妾誠痛之帝曰朕幾忘此賊己酉遣使就洛陽族之使者先鑿阬於第側乃宣敕告之師範盛陳宴具與宗族列坐謂使者曰死者人所不免况有罪乎予不欲使積尸長㓜無序酒既行命自㓜及長引於阬中戮之死者凡二百人丙辰劉知俊及佑國節度使王重師大破歧兵于幕谷晉蜀兵皆引歸蜀立遂王宗懿為太子帝欲自將撃潞州丁卯詔㑹諸道兵湖南判官髙郁請聴民自采茶賣於北客収其征以贍軍楚王殷從之秋七月殷奏於汴荆襄唐郢復州置回圖務運茶於河南北賣之以易繒纊戰馬而歸仍歲貢茶二十五萬斤詔許之湖南由是富贍壬申淮南將吏請於李儼承制授楊隆演淮南節度使東面諸道行營都綂同平章事􅀪農王鍾泰章賞薄泰章未嘗自言後踰年因醉與諸將爭言而及之或告徐温以泰章怨望請誅之温曰是吾過也擢為滁州刺史資治通鑑卷第二百六十六
