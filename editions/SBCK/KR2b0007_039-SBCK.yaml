seq: 39
front:
  text: 兵已十餘萬諸將議以兵多而無所統一欲立劉氏以從人望南陽豪桀及王常等皆欲立劉縯而新市平林將帥樂放縱憚縯威明貪􅀇懦弱先共定策立之然後召縯示其議縯曰諸將軍幸欲尊立宗室甚厚然今赤眉起青徐衆數十萬聞南陽立宗室恐赤眉復有所立王莽未滅而宗室相攻是疑天下而自損權非所以破莽也舂陵去宛三百里耳遽自尊立爲天下凖的使後人得承吾敝非計之善者也不如且稱王以號令王勢亦足以斬諸將若赤眉所立者賢相率而往從之必不奪吾爵位若無所立破莽降赤眉然後舉尊號亦未晩也諸將多曰善張卬㧞劒擊地曰疑事無功今日之議不得有二衆皆從之二月辛巳朔設壇場於淯水上沙中􅀇即皇帝位南面立朝羣臣羞愧流汗舉手不能言於是大赦改元以族父良爲國三老王匡爲定國上公王鳳爲成國上公朱鮪爲大司馬劉縯爲大司徒陳牧爲大司空餘皆九卿將軍由是豪桀失望多不服
  hash: sha256:09eba0979dbf57fe3ac010c48451389e1280ac5628e74b3486255dade37ec754
body:
  text: 王莽欲外示自安乃染其須髮立杜陵史諶女爲皇后置後宫位號視公卿大夫元士者凡百二十人莽赦天下詔王匡哀章等討青徐盗賊嚴尤陳茂等討前隊醜虜明告以生活丹青之信復迷惑不解散將遣大司空隆新公將百萬之師劋絶之矣三月王鳳與太常偏將軍劉秀等狥昆陽定陵郾皆下之王莽聞嚴尤陳茂敗乃遣司空王邑馳傳與司徒王尋發兵平定山東徴諸明兵法六十三家以僃軍吏以長人巨母霸爲壘尉又驅諸猛獸虎豹犀象之屬以助威武邑至洛陽州郡各選精兵牧守自將定㑹者四十二萬人號百萬餘在道者旌旗輜重千里不絶夏五月尋邑南出潁川與嚴尤陳茂合諸將見尋邑兵盛皆反走入昆陽惶怖憂念妻孥欲散歸諸城劉秀曰今兵榖旣少而外㓂強大并力禦之功庶可立如欲分散埶無俱全且宛城未㧞不能相救昆陽即拔一日之間諸部亦滅矣今不同心膽共舉功名反欲守妻子財物邪諸將怒曰劉將軍何敢如是秀笑而起㑹􅇋􅀐還言大兵且至城北軍陳數百里不見其後諸將素輕秀及迫急乃相謂曰更請劉將軍計之秀復爲圖畫成敗諸將皆曰諾時城中唯有八九千人秀使王鳳與廷尉大將軍王常守昆陽夜與五威將軍李軼等十三􅀐出城南門於外收兵時莽兵到城下者且十萬秀等幾不得出尋邑縱兵圍昆陽嚴尤􅀃邑曰昆陽城小而堅今假號者在宛亟進大兵彼必犇走宛敗昆陽自服邑曰吾昔圍翟義坐不生得以見責讓今將百萬之衆遇城而不能下非所以示威也當先屠此城蹀血而進前歌後舞顧不快邪遂圍之數十重列營百數鉦鼓之聲聞數十里或爲地道衝輣撞城積弩亂發矢下如雨城中負户而汲王鳳等乞降不許尋邑自以功在漏刻不以軍事爲憂嚴尤曰兵灋圍城爲之闕宜使得逸出以怖宛下邑又不聽棘陽守長岑彭與前隊貳嚴􅀃共守宛城漢兵攻之數月城中人相食乃舉城降更始入都之諸將欲殺彭劉縯曰彭郡之大吏執心堅守是其節也今舉大事當表義士不如封之更始乃封彭爲歸德矦劉秀至郾定陵悉發諸營兵諸將貪惜財物欲分兵守之秀曰今若破敵珍寶萬倍大功可成如爲所敗首領無餘何財物之有乃悉發之六月己卯朔秀與諸營俱進自將歩􅀐千餘爲前鋒去大軍四五里而陳尋邑亦遣兵數千合戰秀犇之斬首數十級諸將喜曰劉將軍平生見小敵怯今見大敵勇甚可怪也且復居前請助將軍秀復進尋邑兵却諸部共乗之斬首數百千級連勝遂前諸將膽氣益壯無不一當百秀乃與敢死者三千人從城西水上衝其中堅尋邑易之自將萬餘人行陳敕諸營皆按部毋得動獨迎與漢兵戰不利大軍不敢擅相救尋邑陳亂漢兵乗銳崩之遂殺王尋城中亦鼓譟而出中外合埶震呼動天地莽兵大潰走者相騰踐伏尸百餘里㑹大雷風屋瓦皆飛雨下如注滍川盛溢虎豹皆股戰士卒赴水溺死者以萬數水爲不流王邑嚴尤陳茂輕􅀐乗死人度水逃去盡獲其軍實輜重不可勝筭舉之連月不盡或燔燒其餘士卒犇走各還其郡王邑獨與所將長安勇敢數千人還洛陽關中聞之震恐於是海内豪桀翕然響應皆殺其牧守自稱將軍用漢年號以待詔命旬月之閒徧於天下莽聞漢兵言莽鴆殺孝平皇帝乃㑹公卿於王路堂開所爲平帝請命金縢之䇿泣以示羣臣劉秀復徇潁川攻父城不下屯兵巾車鄉潁川郡􅁺馮異監五縣爲漢兵所􅀗異曰異有老母在父城願歸據五城以效功報德秀許之異歸謂父城長苗萌曰諸將多暴横獨劉將軍所到不虜略觀其言語舉止非庸人也遂與萌率五縣以降新市平林諸將以劉縯兄弟威名益盛隂勸更始除之秀謂縯曰事欲不善縯笑曰常如是耳更始大㑹諸將取縯寶劒視之繡衣御史申徒建隨獻玉玦更始不敢發縯舅樊宏謂縯曰建得無有范曾之意乎縯不應李軼初與縯兄弟善後更諂事新貴秀戒縯曰此人不可復信縯不從縯部將劉稷勇冠三軍聞更始立怒曰本起兵圖大事者伯升兄弟也今更始何爲者邪更始以稷爲抗威將軍稷不肯拜更始乃與諸將陳兵數千人先収稷將誅之縯固爭李軼朱鮪因勸更始并執縯即日殺之以族兄光禄勲賜爲大司徒秀聞之自父城馳詣宛謝司徒官屬迎弔秀秀不與交私語惟深引過而已未嘗自伐昆陽之功又不敢爲縯服喪飲食言笑如平常更始以是慙拜秀爲破虜大將軍封武信矦道士西門君惠謂王莽衞將軍王渉曰䜟文劉氏當復興國師公姓名是也渉遂與國師公劉秀大司馬董忠司中大贅孫伋謀以所部兵劫莽降漢以全宗族秋七月伋以其謀告莽莽召忠詰責因格殺之使虎賁以斬馬劒剉忠收其宗族以醇醯毒藥白刃叢􅁄并一坎而埋之秀渉皆自殺莽以其骨肉舊臣惡其内潰故隱其誅莽以軍師外破大臣内畔左右亡所信不能復逺念郡國乃召王邑還爲大司馬以大長秋張邯爲大司徒崔發爲大司空司中夀容苗訢爲國師莽憂懣不能食但飲酒㗖鰒魚讀軍書倦因馮几寐不復就枕矣成紀隗崔隗義上邽楊廣冀人周宗同起兵以應漢衆數千人攻平襄殺莽鎭戎大尹李育崔兄子囂素有名好經書崔等共推爲上將軍崔爲白虎將軍義爲左將軍囂遣使聘平陵方望以爲軍師望􅀃囂立髙廟于邑東己巳祀髙祖太宗世宗囂等皆稱臣執事殺馬同盟以興輔劉宗移檄郡國數莽罪惡勒兵十萬擊殺雍州牧陳慶安定大尹王向分遣諸將徇隴西武都金城武威張掖酒泉燉煌皆下之初茂陵公孫述爲清水長有能名遷導江卒正治臨卭漢兵起南陽宗成商人王岑起兵徇漢中以應漢殺王莽庸部牧宋遵衆合數萬人述遣使迎成等成等至成都虜掠暴横述召郡中豪桀謂曰天下同苦新室思劉氏乆矣故聞漢將軍到馳迎道路今百姓無辜而婦子係􅀗此㓂賊非義兵也乃使人詐稱漢使者假述輔漢將軍蜀郡太守兼益州牧印綬選精兵西擊成等殺之并其衆前鐘武矦劉望起兵汝南嚴尤陳茂往歸之八月望即帝位以尤爲大司馬茂爲丞相王莽使太師王匡國將哀章守洛陽更始遣定國上公王匡攻洛陽西屏大將軍申屠建丞相司直李松攻武關三輔震動析人鄧曄于匡起兵南鄉以應漢攻武關都尉朱萌萌降進攻右隊大夫宋綱殺之西㧞湖莽愈憂不知所出崔發言古者國有大災則哭以猒之宜告天以求救莽乃率羣臣至南郊陳其符命本末仰天大哭氣盡伏而叩頭諸生小民旦夕㑹哭爲設飱粥甚悲哀者除以爲郎郎至五千餘人莽拜將軍九人皆以虎爲號將北軍精兵數萬人以東内其妻子宫中以爲質時省中黄金尚六十餘萬斤它財物稱是莽愈愛之賜九虎士人四千錢衆重怨無􅃲意九虎至華隂回谿距隘自守于匡鄧曄擊之六虎敗走二虎詣闕歸死莽使使責死者安在皆自殺其四虎亡三虎収散卒保渭口京師倉鄧曄開武關迎漢兵李松將三千餘人至湖與曄等共攻京師倉未下曄以弘農􅁺王憲爲校尉將數百人北度渭入左馮翊界李松遣偏將軍韓臣等徑西至新豐擊破莽波水將軍追犇至長門宫王憲北至頻陽所過迎降諸縣大姓各起兵稱漢將率衆隨憲李松鄧曄引軍至華隂而長安旁兵四㑹城下又聞天水隗氏方到皆爭欲先入城貪立大功鹵掠之利莽赦城中囚徒皆授兵殺豨飲其血與誓曰有不爲新室者社鬼記之使更始將軍史諶將之度渭橋皆散走諶空還衆兵發掘莽妻子父祖􅃁燒其棺椁及九廟明堂辟雍火照城中九月戊申朔兵從宣平城門入張邯逢兵見殺王邑王林王廵䠠惲等分將兵距擊北闕下會日暮官府邸第盡犇亡己酉城中少年朱弟張魚等恐見鹵掠趨讙並和燒作室門斧敬法闥呼曰反虜王莽何不出降火及掖庭承明黄皇室主所居黄皇室主曰何靣目以見漢家自投火中而死莽避火宣室前殿火輒隨之莽紺袀服持虞帝匕首天文郎按式於前莽旋席隨斗柄而坐曰天生德於予漢兵其如予何庚戌旦明羣臣扶掖莽自前殿之漸臺欲阻池水公卿從官尚千餘人隨之王邑晝夜戰罷極士死傷略盡馳入宫閒關至漸臺見其子侍中睦解衣冠欲逃邑叱之令還父子共守莽軍人入殿中聞莽在漸臺衆共圍之數百重臺上猶與相射矢盡短兵接王邑父子䠠惲王巡戰死莽入室下餔時衆兵上臺苖訢唐尊王盛等皆死商人杜吳殺莽校尉東海公賔就斬莽首軍人分莽身節解臠分爭相殺者數十人公賔就持莽首詣王憲慮自稱漢大將軍城中兵數十萬皆屬焉舎東宫妻莽後宫乘其車服癸丑李松鄧曄入長安將軍趙萌申屠建亦至以王憲得璽綬不上多挾宫女建天子鼓旗收斬之傳莽首詣宛縣於市百姓共提擊之或切食其舌班固贊曰王莽始起外戚折節力行以要名譽及居位輔政勤勞國家直道而行豈所謂色取仁而行違者邪莽旣不仁而有佞邪之材又乗四父歷世之權遭漢中微國統三絶而太后壽考爲之宗主故得肆其姦慝以成簒盜之禍推是言之亦天時非人力之致矣及其竊位南面顛覆之埶險於桀紂而莽晏然自以黄虞復出也乃始恣睢奮其威詐毒流諸夏亂延蠻貉猶未足逞其欲焉是以四海之内囂然喪其樂生之心中外憤怨逺近俱發城池不守支體分裂遂令天下城邑爲虚害徧生民自書傳所載亂臣賊子考其禍敗未有如莽之甚者也昔秦燔詩書以立私議莽誦六蓺以文姦言同歸殊塗俱用滅亡皆聖王之驅除云爾定國上公王匡㧞洛陽生縛莽太師王匡哀章皆斬之冬十月奮威大將軍劉信擊殺劉望於汝南并誅嚴尤陳茂郡縣皆降更始將都洛陽以劉秀行司􅀠校尉使前整脩宫府秀乃致僚屬作文移從事司察一如舊章時三輔吏士東迎更始見諸將過皆冠幘而服婦人衣莫不笑之及見司􅊢僚屬皆歡喜不自勝老吏或垂涕曰不圖今日復見漢官威儀由是識者皆屬心焉更始北都洛陽分遣使者徇郡國曰先降者復爵位使者至上谷上谷太守扶風耿況迎上印綬使者納之一宿無還意功曹㓂恂勒兵入見使者請之使者不與曰天王使者功曹欲脅之邪恂曰非敢脅使君竊傷計之不詳也今天下初定使君建節衘命郡國莫不延頸傾耳今始至上谷而先墮大信將復何以號令他郡乎使者不應恂叱左右以使者命召況況至恂進取印綬帶況使者不得已乃承制詔之況受而歸宛人彭寵吴漢亡命在漁陽鄉人韓鴻爲更始使徇北州承制拜寵偏將軍行漁陽太守事以漢爲安樂令更始遣使降赤眉樊崇等聞漢室復興即留其兵將渠帥二十餘人隨使者至洛陽更始皆封爲列矦崇等旣未有國邑而留衆稍有離叛者乃復亡歸其營王莽廬江連率潁川李憲據郡自守稱淮南王故梁王立之子永詣洛陽更始封爲梁王都睢陽更始欲令親近大將徇河北大司徒賜言諸家子獨有文叔可用朱鮪等以爲不可更始狐疑賜深勸之更始乃以劉秀行大司馬事持節北度河鎭慰州郡以大司徒賜爲丞相令先入關脩宗廟宫室大司馬秀至河北所過郡縣考察官吏黜陟能否平遣囚徒除王莽苛政復漢官名吏民喜恱爭持牛酒迎勞秀皆不受南陽鄧禹杖策追秀及於鄴秀曰我得專封拜生逺來寧欲仕乎禹曰不願也秀曰即如是何欲爲禹曰但願明公威德加於四海禹得効其尺寸垂功名於竹帛耳秀笑因留宿閒語禹進􅀃曰今山東未安赤眉青犢之屬動以萬數更始既是常才而不自聽斷諸將皆庸人屈起志在財幣爭用威力朝夕自快而已非有忠良明智深慮逺圖欲尊主安民者也歷觀往古聖人之興二科而已天時與人事也今以天時觀之更始既立而災變方興以人事觀之帝王大業非凡夫所任分崩離析形埶可見明公雖建藩輔之功猶恐無所成立也況明公素有盛徳大功爲天下所嚮服軍政齊肅賞罰明信爲今之計莫如延􅄃英雄務恱民心立髙祖之業救萬民之命以公而慮天下不足定也秀大恱因令禹常宿止於中與定計議毎任使諸將多訪於禹皆當其才秀自兄縯之死毎獨居輙不御酒肉枕席有涕泣處主簿馮異獨叩頭寛譬秀止之曰卿勿妄言異因進􅀃曰更始政亂百姓無所依戴夫人乆饑渴易爲充飽今公專命方面宜分遣官屬徇行郡縣宣布惠澤秀納之􅀐都尉宋子耿純謁秀於邯鄲退見官屬將兵法度不與它將同遂自結納故趙繆王子林􅀃秀決列人河水以灌赤眉秀不從去之真定林素任俠於趙魏閒王莽時長安中有自稱成帝子子輿者莽殺之邯鄲卜者王郎縁是詐稱眞子輿云母故成帝謳者嘗見黄氣從上下遂任身趙后欲害之僞易它人子以故得全林等信之與趙國大豪李育張參等謀共立郎㑹民閒傳赤眉將度河林等因此宣言赤眉當立劉子輿以􅀚衆心百姓多信之十二月林等率車􅀐數百晨入邯鄲城止於王宫立郎爲天子分遣將帥徇下幽冀移檄州郡趙國以北遼東以西皆望風響應二年春正月大司馬秀以王郎新盛乃北徇薊申屠建李松自長安迎更始遷都二月更始發洛陽􅀄三輔豪桀假號誅莽者人人皆望封矦申屠建旣斬王憲又揚言三輔兒大􅃛共殺其主吏民惶恐属縣屯聚建等不能下更始至長安乃下詔大赦非王莽子他皆除其罪於是三輔悉平時長安唯未央宫􅀍焚其餘宫室供帳倉庫官府皆案堵如故市里不改於舊更始居長樂宫升前殿郎吏以次列庭中更始羞怍俛首刮席不敢視諸將後至者更始問虜掠得幾何左右侍官皆宫省乆吏驚愕相視李松與棘陽趙萌􅀃更始宜悉王諸功臣朱鮪爭之以爲髙祖約非劉氏不王更始乃先封諸宗室祉爲定陶王慶爲燕王歙爲元氏王嘉爲漢中王賜爲宛王信爲汝隂王然後立王匡爲泚陽王王鳳爲宜城王朱鮪爲膠東王王常爲鄧王申屠建爲平氏王陳牧爲隂平王衛尉大將軍張卬爲淮陽王執金吾大將軍廖湛爲穣王尚書胡殷爲隨王柱天大將軍李通爲西平王五威中郎將李軼爲舞隂王水衡大將軍成丹爲㐮邑王驃􅀐大將軍宗佻爲潁隂王尹尊爲郾王唯朱鮪辭不受乃以鮪爲左大司馬宛王賜爲前大司馬使與李軼等鎮撫関東又使李通鎮荆州王常行南陽太守事以李松爲丞相趙萌爲右大司馬共秉内任更始納趙萌女爲夫人故委政於萌日夜飲讌後庭羣臣欲言事輒醉不能見時不得已乃令侍中坐帷内與語韓夫人尤􅄝酒毎侍飲見常侍奏事輒怒曰帝方對我飲正用此時持事來邪起抵破書案趙萌專權生殺自恣郎吏有說萌放縱者更始怒㧞劒斬之自是無敢復言以至羣小膳夫皆濫授官爵長安爲之語曰竈下養中郎將爛羊胃騎都尉爛羊頭関内矦軍師將軍李淑上書諫曰陛下定業雖因下江平林之埶斯蓋臨時濟用不可施之既安唯名與器聖人所重今加非其人望其禆益萬分猶縁木求魚升山采珠海内望此有以窺度漢祚更始怒囚之諸將在外者皆專行誅賞各置牧守州郡交錯不知所從由是關中離心四海怨叛更始徴隗囂及其叔父崔義等囂將行方望以爲更始成敗未可知固止之囂不聽望以書辭謝而去囂等至長安更始以囂爲右將軍崔義皆即舊號耿況遣其子弇奉奏詣長安弇時年二十一行至宋子㑹王郎起弇從吏孫倉䘙包曰劉子輿成帝正統捨此不歸逺行安之弇按劒曰子輿弊賊卒爲降虜耳我至長安與國家陳漁陽上谷兵馬歸發突騎以轔烏合之衆如摧枯折腐耳􅀚公等不識去就族滅不乆也倉包遂亡降王郎弇聞大司馬秀在盧奴乃馳北上謁秀留署長史與俱北至薊王郎移檄購秀十萬户秀令功曹令史潁川王霸至市中募人擊王郎市人皆大笑舉手邪揄之霸慙懅而反秀將南歸耿弇曰今兵從南方來不可南行漁陽太守彭寵公之邑人上谷太守即弇父也發此兩郡控􅁌萬􅀐邯鄲不足慮也秀官屬腹心皆不肯曰死尚南首奈何北行入囊中秀指弇曰是我北道主人也㑹故廣陽王子接起兵薊中以應郎城内擾亂言邯鄲使者方到二千石以下皆出迎於是秀趣駕而出至南城門門已閉攻之得出遂晨夜南馳不敢入城邑舍食道傍至蕪蔞亭時天寒烈馮異上豆粥至饒陽官屬皆乏食秀乃自稱邯鄲使者入傳舍傳吏方進食從者飢爭奪之傳吏疑其僞乃椎鼓數十通紿言邯鄲將軍至官屬皆失色秀升車欲馳既而懼不免徐還坐曰請邯鄲將軍入乆乃駕去晨夜兼行䝉犯霜雪面皆破裂至下曲陽傳聞王郎兵在後從者皆恐至嘑沱河􅇋吏還白河水流澌無船不可濟秀使王霸往視之霸恐驚衆欲且前阻水還即詭曰冰堅可度官屬皆喜秀笑曰候吏果妄語也遂前比至河河冰亦合乃令王霸護度未畢數􅀐而冰解至南宫遇大風雨秀引車入道傍空舍馮異抱薪鄧禹􅋹火秀對竈燎衣馮異復進麥飯進至下愽城西惶惑不知所之有白衣老父在道旁指曰弩力信都郡爲長安城守去此八十里秀即馳赴之是時郡國皆已降王郎獨信都太守南陽任光和戎太守信都邳肜不肯從光自以􅀌城獨守恐不能全聞秀至大喜吏民皆稱萬􅀊邳肜亦自和戎來㑹議者多言可因信都兵自送西還長安邳肜曰吏民歌吟思漢乆矣故更始舉尊號而天下響應三輔清宫除道以迎之今卜者王郎假名因埶驅集烏合之衆遂振燕趙之地無有根本之固明公奮二郡之兵以討之何患不克今釋此而歸豈徒空失河北必更驚動三輔墮損威重非計之得者也若明公無復征伐之意則雖信都之兵猶難㑹也何者明公旣西則邯鄲勢成民不肯捐父母背成主而千里送公其離散亡逃可必也秀乃止秀以二郡兵弱欲入城頭子路力子都軍中任光以爲不可乃發傍縣得精兵四千人拜任光爲左大將軍信都都尉李忠爲右大將軍邳肜爲後大將軍和戎太守如故信都令萬脩爲偏將軍皆封列矦留南陽宗廣領信都太守事使任光李忠萬脩將兵以從邳肜將兵居前任光乃多作檄文曰大司馬劉公將城頭子路力子都兵百萬衆從東方來擊諸反虜遣􅀐馳至鉅鹿界中吏民得檄傳相告語秀投暮入堂陽界多張􅀐火彌滿澤中堂陽即降又擊貰縣降之城頭子路者東平爰曽也㓂掠河濟間有衆二十餘萬力子都有衆六七萬故秀欲依之昌城人劉植聚兵數千人據昌城迎秀秀以植爲驍􅀐將軍耿純率宗族賔客二千餘人老病者皆載木自隨迎秀於育拜純爲前將軍進攻下曲陽降之衆稍合至數萬人復北擊中山耿純恐宗家懐異心乃使從弟訢宿歸燒廬舍以絶其反顧之望秀進㧞盧奴所過發犇命兵移檄邊郡共擊邯鄲郡縣還復響應時眞定王楊起兵附王郎衆十餘萬秀遣劉植􅀃楊楊乃降秀因留真定納楊甥郭氏爲夫人以結之進擊元氏防子皆下之至鄗擊斬王郎將李惲至柏人復破郎將李育育還保城攻之不下南鄭人延岑起兵據漢中漢中王嘉擊降之有衆數十萬校尉南陽賈復見更始政亂乃􅀃嘉曰今天下未定而大王安守所保所保得無不可保乎嘉曰卿言大非吾任也大司馬在河北必能相用乃爲書薦復及長史南陽陳俊於劉秀復等見秀於柏人秀以復爲破虜將軍俊爲安集􅁺秀舍中兒犯灋軍市令潁川祭遵格殺之秀怒命収遵主簿陳副諫曰明公常欲衆軍整齊今遵奉灋不避是教令所行也乃貰之以爲剌姦將軍謂諸將曰當僃祭遵吾舍中兒犯灋尚殺之必不私諸卿也初王莽既殺鮑宣上黨都尉路平欲殺其子永太守茍諫保䕶之永由是得全更始徴永爲尚書僕射行大將軍事將兵安集河東并州得自置偏禆永至河東擊青犢大破之以馮衍爲立漢將軍屯太原與上黨太守田邑等繕甲養士以扞衞并土或說大司馬秀以守柏人不如定鉅鹿秀乃引兵東北拔廣阿秀披輿地圖指示鄧禹曰天下郡國如是今始乃得其一子前言以吾慮天下不足定何也禹曰方今海内殽亂人思明君猶赤子之慕慈母古之興者在德薄厚不以大小也薊中之亂耿弇與劉秀相失北走昌平就其父況因􅀃況擊邯鄲時王郎遣將徇漁陽上谷急發其兵北州疑惑多欲從之上谷功曹㓂恂門下􅁺閔業􅀃況曰邯鄲拔起難可信向大司馬劉伯升母弟尊賢下士可以歸之況曰邯鄲方盛力不能獨拒如何對曰今上谷完實控􅁌萬􅀐可以詳擇去就恂請東約漁陽齊心合衆邯鄲不足圖也況然之遣恂東約彭寵欲各發突􅀐二千匹歩兵千人詣大司馬秀安樂令吳漢護軍蓋延孤奴令王梁亦勸寵從秀寵以爲然而官屬皆欲附王郎寵不能奪漢出止外亭遇一儒生召而食之問以所聞生言大司馬劉公所過爲郡縣所稱邯鄲舉尊號者實非劉氏漢大喜即詐爲秀書移檄漁陽使生齎以詣寵令具以所聞說之㑹㓂恂至寵乃發步騎三千人以吳漢行長史與蓋延王梁將之南攻薊殺王郎大將趙閎宼恂還遂與上谷長史景丹及耿弇將兵俱南與漁陽軍合所過擊斬王郎大將九卿校尉以下凡斬首三萬級定涿郡中山鉅鹿清河河閒凡二十二縣前及廣阿聞城中車騎甚衆丹等勒兵問曰此何兵曰大司馬劉公也諸將喜即進至城下城下初傳言二郡兵爲邯鄲來衆皆恐劉秀自登西城樓勒兵問之耿弇拜於城下即召入具言發兵狀秀乃悉召景丹等入笑曰邯鄲將帥數言我發漁陽上谷兵吾聊應言我亦發之何意二郡良爲吾來方與士大夫共此功名耳乃以景丹㓂恂耿弇蓋延吳漢王梁皆爲偏將軍使還領其兵加耿況彭寵大將軍封況寵丹延皆爲列矦吳漢爲人質厚少文造次不能以辭自逹然沈勇有智略鄧禹數薦之於秀秀漸親重之更始遣尚書令謝躬率六將軍討王郎不能下秀至與之合軍東圍鉅鹿月餘未下王郎遣將攻信都大姓馬寵等開城内之更始遣兵攻破信都秀使李忠還行太守事王郎遣將倪宏劉奉率數萬人救鉅鹿秀逆戰於南􅒋不利景丹等縱突􅀐擊之宏等大敗秀曰吾聞突騎天下精兵今見其戰樂可言邪耿純言於秀曰乆守鉅鹿士衆疲弊不如及大兵精銳進攻邯鄲若王郎已誅鉅鹿不戰自服矣秀從之夏四月留將軍鄧滿守鉅鹿進軍邯鄲連戰破之郎乃使其諌大夫杜威請降威雅稱郎實成帝遺體秀曰設使成帝復生天下不可得況詐子輿者乎威請求萬戶矦秀曰顧得全身可矣威怒而去秀急攻之二十餘日五月甲辰郎少傅李立開門内漢兵遂拔邯鄲郎夜亡走王霸追斬之秀收郎文書得吏民與郎交關謗毁者數千章秀不省㑹諸將軍燒之曰令反側子自安秀部分吏卒各􅀠諸軍士皆言願屬大樹將軍大樹將軍者偏將軍馮異也爲人謙退不伐敕吏士非交戰受敵常行諸營之後毎所止舍諸將並坐論功異常獨屏樹下故軍中號曰大樹將軍護軍宛人朱祜從容言於秀曰長安政亂公有日角之相此天命也秀曰召刺姦収護軍祜乃不敢復言更始遣使立秀爲蕭王悉令罷兵與諸將有功者詣行在所遣苗曽爲幽州牧韋順爲上谷太守蔡充爲漁陽太守並北之部蕭王居邯鄲宫晝卧温明殿耿弇入造牀下請閒因􅀃曰吏士死傷者多請歸上谷益兵蕭王曰王郎已破河北畧平復用兵何爲弇曰王郎雖破天下兵革乃始耳今使者從西方來欲罷兵不可聽也銅馬赤眉之屬數十輩輩數十百萬人所向無前聖公不能辦也敗必不乆蕭王起坐曰卿失言我斬卿弇曰大王哀厚弇如父子故敢披赤心蕭王曰我戯卿耳何以言之弇曰百姓患苦王莽復思劉氏聞漢兵起莫不歡喜如去虎口得歸慈母今更始爲天子而諸將擅命於山東貴戚縱横於都内虜掠自恣元元叩心更思莽朝是以知其必敗也公功名已著以義征伐天下可傳檄而定也天下至重公可自取母令他姓得之蕭王乃辭以河北未平不就徴始貳於更始是時諸賊銅馬大彤髙湖重連鐵脛大槍尤來上江青犢五校五幡五樓富平􅀗索等各領部曲衆合數百萬人所在㓂掠蕭王欲擊之乃拜吳漢耿弇俱爲大將軍持節北發幽州十郡突􅀐苗曽聞之隂敕諸郡不得應調吳漢將二十􅀐先馳至無終曽出迎於路漢即収曾斬之耿弇到上谷亦収韋順蔡充斬之北州震駭於是悉發其兵秋蕭王擊銅馬於鄡吳漢將突􅀐來㑹清陽士馬甚盛漢悉上兵簿於莫府請所付與不敢自私王益重之王以偏將軍沛國朱浮爲大將軍幽州牧使治薊城銅馬食盡夜遁蕭王追擊於館陶大破之受降未盡而髙湖重連從東南來與銅馬餘衆合蕭王復與大戰於蒲陽悉破降之封其渠帥爲列矦諸將未能信賊降者亦不自安王知其意敕令降者各歸營勒兵自乗輕騎按行部陳降者更相語曰蕭王推赤心置人腹中安得不投死乎由是皆服悉以降人分配諸將衆遂數十萬赤眉别帥與青犢上江大彤鐵脛五幡十餘萬衆在射犬蕭王引兵進擊大破之南徇河内河内太守韓歆降初謝躬與蕭王共滅王郎數與蕭王違戾常欲襲蕭王畏其兵彊而止雖俱在邯鄲遂分城而處然蕭王每有以慰安之躬勤於吏職蕭王常稱之曰謝尚書眞吏也故不自疑其妻知之常戒之曰君與劉公積不相能而信其虚談終受制矣躬不納既而躬率其兵數萬還屯於鄴及蕭王南擊青犢使躬邀擊尤來於隆慮山躬兵大敗蕭王因躬在外使吳漢與刺姦大將軍岑彭襲據鄴城躬不知輕騎還鄴漢等收斬之其衆悉降更始遣柱功矦李寶益州刺史張忠將兵萬餘人徇蜀漢公孫述遣其弟恢擊寶忠於綿竹大破走之述遂自立爲蜀王都成都民夷皆附之冬更始遣中郎將歸德矦颯大司馬護軍陳遵使匈奴授單于漢舊制璽綬因送云當餘親屬貴人從者還匈奴單于輿驕謂遵颯曰匈奴本與漢爲兄弟匈奴中亂孝宣皇帝輔立呼韓邪單于故稱臣以尊漢今漢亦大亂爲王莽所簒匈奴亦出兵擊莽空其邊境令天下騷動思漢莽卒以敗而漢復興亦我力也當復尊我遵與相牚拒單于終持此言赤眉樊崇等將兵入潁川分其衆爲二部崇與逢安為一部徐宣謝禄楊音爲一部赤眉雖數戰勝而疲敝厭兵皆日夜愁泣思欲東歸崇等計議慮衆東向必散不如西攻長安於是崇安自武關宣等從陸渾關兩道俱入更始使王匡成丹與抗威將軍劉均等分據河東弘農以拒之蕭王將北徇燕趙度赤眉必破長安又欲乗釁并關中而未知所􅀉乃拜鄧禹爲前將軍中分麾下精兵二萬人遣西入關令自選偏禆以下可與俱者時朱鮪李軼田立陳僑將兵號三十萬與河南太守武勃共守洛陽鮑永田邑在并州蕭王以河内險要富實欲擇諸將守河内者而難其人問於鄧禹禹曰寇恂文武僃足有牧人御衆之才非此子莫可使也乃拜恂河内太守行大將軍事蕭王謂恂曰昔髙祖留蕭何關中吾今委公以河内當給足軍糧率厲士馬防遏它兵勿令北度而已拜馮異爲孟津將軍統魏郡河内兵於河上以拒洛陽蕭王親送鄧禹至野王禹既西蕭王乃復引兵而北㓂恂調糇糧治器械以供軍軍雖逺征未嘗乏絶隗崔隗義謀叛歸天水隗囂恐并及禍乃告之更始誅崔義以囂爲御史大夫梁王永據國起兵招諸郡豪桀沛人周建等並署爲將帥攻下濟隂山陽沛楚淮陽汝南凡得二十八城又遣使拜西防賊帥山陽佼彊爲横行將軍東海賊帥董憲爲翼漢大將軍琅邪賊帥張歩爲輔漢大將軍督青徐二州與之連兵遂專據東方邔人秦豐起兵於􅀺丘攻得邔宜城等十餘縣有衆萬人自號楚黎王汝南田戎攻䧟夷陵自稱埽地大將軍轉㓂郡縣衆數萬人資治通鑑卷第三十九
