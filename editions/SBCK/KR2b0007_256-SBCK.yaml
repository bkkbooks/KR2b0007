body:
  text: 臣司馬光奉勑編集唐紀七十二恊洽三月凡二年有竒起閼逢執徐六月盡強圉僖宗惠聖恭定孝皇帝下之上中和四年六月壬辰東川留後高仁厚奏鄭君雄斬楊師立出降仁厚圍梓州乆不下乃爲書射城中遺其將士曰仁厚不忍城中玉石俱焚爲諸君緩師十日使諸君自成其功若十日不送師立首當分見兵爲五畨畨分晝夜以攻之於此甚逸於彼必困矣五日不下四面俱進克之必矣諸君圖之數日君雄大呼於衆曰天子所誅者元惡耳它人無預也衆呼萬歳大譟突入府中師立自殺君雄挈其首出降仁厚獻其首及妻子于行在陳敬瑄釘其子於城北敬瑄三子出觀之釘者呼曰兹事行及汝曹汝曹於後努力領取三子走馬而返以高仁厚爲東川節度使甲辰武寜將李師悅與尚讓追黄巢至瑕丘敗之巢衆殆盡走至狼虎谷丙午巢甥林言斬巢兄弟妻子首將詣時􅄎遇沙陀博野軍奪之并斬言首以獻於溥蔡州節度使秦宗權縱兵四出侵噬鄰道天平節度使朱瑄有衆三萬從父弟瑾勇冠軍中宣武節度使朱全忠爲宗權所攻勢甚窘求救於瑄瑄遣瑾將兵救之敗宗權於合鄉全忠徳之與瑄約爲兄弟秋七月壬午時溥遣使獻黄巢及家人首并姬妾上御大玄樓受之宣問姬妾汝曹皆勲貴子女世受國恩何爲從賊其居首者對曰狂賊凶逆國家以百萬之衆失守宗祧播遷巴蜀今陛下以不能拒賊責一女子置公卿將帥於何地乎上不復問皆戮之於市人爭與之酒其餘皆悲怖昬醉居首者獨不飲不泣至於就刑神色肅然朱全忠撃秦宗權敗宗權于溵水李克用至晉陽大治甲兵遣榆次鎭將鴈門李承嗣奉表詣行在自陳有破黄巢大功爲朱全忠所圖僅能自免將佐已下從行者三百餘人并牌印皆没不返全忠仍牓東都陝孟云臣已死行營兵潰令所在邀遮屠翦勿令潮失將士皆號泣􅁈訴請復仇讎臣以朝廷至公當俟詔命拊循抑止復歸本道乞遣使按問發兵誅討臣遣弟克勤將萬騎在河中俟命時朝廷以大宼初平方務姑息得克用表大恐但遣中使賜優詔和解之克用前後凡八表稱全忠妬功疾能陰狡禍賊異日必爲國患惟乞下詔削其官爵臣自帥本道兵討之不用度支糧餉上累遣楊復恭等諭指稱吾深知卿􅁈方事之殷姑存大體克用終鬱鬱不平時藩鎭相攻者朝廷不復爲之辯曲直由是互相吞噬惟力是視皆無所禀畏矣八月李克用奏請割麟州􅀠河東又奏請以弟克脩爲昭義節度使皆許之由是昭義分爲二鎭進克用爵隴西郡王克用奏罷雲蔚防禦使依舊􅀠河東從之九月己未加朱全忠同平章事以右僕射大明宫留守王徽知京兆尹事上以長安宫室焚毀故乆留蜀未歸徽招撫流散户口稍歸復繕治宫室百司粗有緒冬十月􅀜東藩鎭表請車駕還京師朱全忠之降也義成節度使王鐸爲都統承制除官全忠􅀄鎭大梁事鐸禮甚恭鐸依以爲援而全忠兵浸彊益驕倨知不足恃表請還朝徙鐸爲義昌節度使鹿晏弘之去河中也王建韓建張造晉暉李師泰各帥其衆與之俱及據興元以建等爲巡内刺史不遣之官晏弘猜忍衆心不附王建韓建素相親善晏弘尤忌之數引入卧内待之加厚二建密相謂曰僕射甘言厚意疑我也禍將至矣田令孜密遣人以厚利誘之十一月二建與張造晉暉李師泰帥衆數千逃奔行在令孜皆養爲假子賜與巨萬拜諸衛將軍使各將其衆號隨駕五都又遣禁兵討晏弘晏弘率衆弃興元走初宦者曹知慤本華原富家子有膽略黄巢陷長安知慤歸鄉里集壯士據嵯峩山南爲堡自固巢黨不敢近知慤數遣壯士變衣服語言效巢黨夜入長安攻賊營賊驚以爲鬼神又疑其下有叛者由是心不自安朝廷聞而嘉之就除内常侍賜金紫知慤聞車駕將還謂人曰吾施小術使諸軍得成大功從駕羣臣但平步往來俟至大散􅀜當閱其可歸者納之行在聞之恐其爲變田令孜尤惡之密以敕㫖諭邠寜節度使王行瑜使誅之行瑜潛師自嵯峨山北乗高攻之知慤不爲備舉營盡殪令孜益驕横禁制天子不得有所主斷上患其專時語左右而流涕鹿晏弘引兵東出襄州秦宗權遣其將秦誥趙徳諲將兵㑹之共攻襄州陷之山南東道節度使劉巨容奔成都徳諲蔡州人也晏弘引兵轉掠襄鄧均房廬夀復還許州忠武節度使周岌聞其至弃鎭走晏弘遂據許州自稱留後朝廷不能討因以爲忠武節度使十二月己丑陳敬瑄表辭三川都指揮招討制置安撫等使從之初黄巢轉掠福建建州人陳巖聚衆數千保鄉里號九龍軍福建觀察使鄭鎰奏爲團練副使泉州刺史左廂都虞􅀱李連有罪亡入溪洞合衆攻福州巖撃敗之鎰畏巖之逼表巖自代壬寅以巖爲福建觀察使巖爲治有威惠閩人安之義昌節度使兼中書令王鐸厚於奉養過魏州侍妾成列服御鮮華如承平之態魏博節度使樂彦禎之子從訓伏卒數百人於漳南高雞泊圍而殺之及賓僚從者三百餘人皆死掠其資裝侍妾而還彦禎奏云爲盜所殺朝廷不能詰賜邠寜軍號曰靜難是歳餘杭鎭使陳晟逐睦州刺史栁超潁州都知兵馬使汝隂王敬蕘逐其刺史各領州事朝廷因命爲刺史均州賊帥孫喜聚衆數千人謀攻州城刺史吕曄不知所爲都將武當馮行襲伏兵江南自乗小舟迎喜謂曰州人得良牧無不歸心然公所從之卒大多州人懼於剽掠尚以爲疑不若置軍江北獨與腹心輕騎俱進行襲請爲前道告諭州人無不服者矣喜以爲然從之既度江軍吏迎謁伏兵發行襲手撃喜斬之從喜者皆死江北軍望之俱潰山南東道節度使上其功詔以行襲爲均州刺史州西有長山當襄鄧入蜀之道羣盜據之抄掠貢賦行襲討誅之蜀道以通鳳翔節度使李昌言病表弟昌符知留後昌言薨制以昌符爲鳳翔節度使時黄巢雖平秦宗權復熾命將出兵冦掠鄰道陳彦侵淮南秦賢侵江南秦誥陷襄唐鄧孫儒陷東都孟陝虢張晊陷汝鄭盧塘攻汴宋所至屠翦焚蕩殆無孑遺其殘暴又甚於巢軍行未始轉糧車載鹽尸以從北至衛滑西及􅀜輔東盡青齊南出江淮州鎭存者僅保一城極目千里無復煙火上將還長安畏宗權爲患光啓元年春正月戊午下詔招撫之己卯車駕發成都陳敬瑄送至漢州而還荆南監軍朱敬玫所募忠勇軍暴横節度使陳儒患之鄭紹業之鎭荆南也遣大將申屠琮將兵五千擊黄巢於長安軍還儒告琮使除之忠勇將程君從聞之帥其衆奔朗州琮追擊之殺百餘人餘衆皆潰自是琮復專軍政雷滿屢攻掠荆南儒重賂以却之淮南將張瓌韓師徳叛高駢據復岳二州自稱刺史儒請瓌攝行軍司馬師德攝節度副使將兵擊雷滿師德引兵上峽大掠歸于岳州瓌還兵逐儒而代之儒將奔行在瓌刼還囚之瓌渭州人性貪暴荆南舊將夷滅殆盡先是朱敬玫屢殺大將及富商以致富朝廷遣中使楊玄晦代之敬玫留居荆􅀯甞曝衣瓌見而欲之遣卒夜攻之殺敬玫盡取其財瓌惡牙將郭禹慓悍欲殺之禹結黨千人亡去庚申襲歸州據之自稱刺史禹青州人成汭也因殺人亡命更其姓名􅀯康賊帥盧光稠䧟䖍州自稱刺史以其里人譚全播爲謀主秦宗權責租賦於光州刺史王緒緒不能給宗權怒發兵撃之緒懼悉舉光壽二州兵五千人驅吏民渡江以劉行全爲前鋒轉掠江洪䖍州是月陷汀漳二州然皆不能守也秦宗權㓂潁亳朱全忠敗之於焦夷二月丙申車駕至鳳翔三月丁卯至京師荆棘滿城狐兔縱横上凄然不樂己巳赦天下改元時朝廷號令所行惟河西山南劒南嶺南數十州而已秦宗權稱帝置百官詔以武寜節度使時溥爲蔡州四面行營兵馬都統以討之盧龍節度使李可舉成徳節度使王鎔惡李克用之彊而義武節度使王處存與克用親善爲姪鄴娶克用女又河北諸鎭惟義武尚屬朝廷可舉等恐其窺伺山東終爲已患乃相與謀曰易定燕趙之餘也約共滅處存而分其地又說雲中節度使赫連鐸使攻克用之背可舉遣其將李全忠將兵六萬攻易州鎔遣將將兵攻無極處存告急於克用克用遣其將康君立等將兵救之閏月秦宗權遣其弟宗言㓂荆南初田令孜在蜀募新軍五十四都每都千人分􅀠兩神策爲十軍以統之又南牙北司官共萬餘員是時藩鎭各專租稅河南北江淮無復上供三司轉運無調發之所度支惟収京畿同華鳳翔等數州租稅不能贍賞賚不時士卒有怨言令孜患之不知所出先是安邑解縣兩池鹽皆􅀠鹽鐵置官搉之中和以來河中節度使王重榮專之歳獻三千車以供國用令孜奏復如舊制􅀠鹽鐵夏四月令孜自兼兩池搉鹽使収其利以贍軍重榮上章論訴不已遣中使徃諭之重榮不可時令孜多遣親信覘藩鎭有不附已者輒圖之令孜養子匡祐使河中重榮待之甚厚而匡祐傲甚舉軍皆憤怒重榮乃數令孜罪惡責其無禮監軍爲講解僅得脫去匡祐歸以告令孜勸圖之五月令孜徙重榮爲泰寜節度使以泰寜節度使齊克讓爲義武節度使以義武節度使王處存爲河中節度使仍詔李克用以河東軍援處存赴鎭盧龍兵攻易州禆將劉仁恭穴地入城遂克之仁恭深州人也李克用自將救無極敗成徳兵成徳兵退保新城克用復進擊大破之拔新城成徳兵走追至九門斬首萬餘級盧龍兵既得易州驕怠王處存夜遣卒三千蒙羊皮造城下盧龍兵以爲羊也爭出掠之處存奮擊大破之復取易州李全忠走加陝虢節度使王重盈同平章事李全忠既喪師恐獲罪収餘衆還襲幽州六月李可舉窘急舉族登樓自焚死全忠自爲留後東都留守李罕之與秦宗權將孫儒相拒數月罕之兵少食盡弃城西保澠池宗權陷東都秋十月以李全忠爲盧龍留後乙巳右補􅀜常濬上疏以爲陛下姑息藩鎭太甚是非功過駢首並足致天下紛紛若此猶未之寤豈可不念駱谷之艱危復懷西顧之計乎宜稍振典刑以威四方田令孜之黨言於上曰此䟽傳於藩鎭豈不致其猜忿庚戌貶濬萬州司户尋賜死滄州軍亂逐節度使楊全玫立牙將盧彦威爲留後全玫奔幽州以保鑾都將曹誠爲義昌節度使以彦威爲徳州刺史孫儒據東都月餘燒宫室官寺民居大掠席卷而去城中寂無雞犬李罕之復引其衆入東都築壘於市西而居之王重榮自以有復京城功爲田令孜所擯不肯之兖州累表論令孜離間君臣數令孜十罪令孜結邠寜節度使朱玫鳳翔節度使李昌符以抗之王處存亦上言幽鎭兵新退臣未敢離易定且王重榮無罪有大功於國不宜輕有改易摇藩鎭心詔趣其上道八月處存引軍至晉州刺史兾君武閉城不内而還洺州刺史馬爽與昭義行軍司馬奚忠信不叶起兵屯邢州􅀯脅孟方立請誅忠信既而衆潰爽奔魏州忠信使人賂樂彦禎而殺之秦宗權攻鄰道二十餘州䧟之唯陳州距蔡百餘里兵力甚弱刺史趙犨日與宗權戰宗權不能屈詔以犨爲蔡州節度使犨徳朱全忠之援與全忠結昬凡全忠所調發無不立至王緒至漳州以道險糧少令軍中無得以老弱自隨犯者斬唯王潮兄弟扶其母董氏﨑嶇從軍緒召潮等責之曰軍皆有法未有無法之軍汝違吾令而不誅是無法也三子曰人皆有母未有無母之人將軍柰何使人弃其母緒怒命斬其母三子曰潮等事母如事將軍既殺其母安用其子請先母死將士皆爲之請乃捨之有望氣者謂緒曰軍中有王者氣於是緒見將卒有勇略踰已及氣質魁岸者皆殺之劉行全亦死衆皆自危曰行全親也且軍鋒之冠猶不免况吾屬乎行至南安王潮說其前鋒將曰吾屬違墳墓捐妻子羈旅外鄉爲羣盜豈所欲哉乃爲緒所迫脅故也今緒猜刻不仁妄殺無辜軍中孑孑者受誅且盡子須眉若神騎射絶倫又爲前鋒吾竊爲子危之前鋒將執潮手泣問計安出潮爲之謀伏壯士數十人於篁竹中伺緒至挺劒大呼躍出就馬上擒之反􅅞以徇軍中皆呼萬歳潮推前鋒將爲主前鋒將曰吾屬今日不爲魚肉皆王君力也天以王君爲主誰敢先之相推讓數四卒奉潮爲將軍緒歎曰此子在吾網中不能殺豈非天哉潮引兵將還光州約其屬所過秋豪無犯行及沙縣泉州人張延魯等以刺史廖彦若貪暴帥耆老奉牛酒遮道請潮留爲州將潮乃引兵圍泉州九月戊申以陳敬瑄爲三川及峽内諸州都指揮制置等使蔡軍圍荆南馬步使趙匡謀奉前節度使陳儒以出留後張瓌覺之殺匡及儒冬十月癸丑秦宗權敗朱全忠于八角王重榮求救於李克用克用方怨朝廷不罪朱全忠選兵市馬聚結諸胡議攻汴州報曰待吾先滅全忠還掃䑕輩如秋葉耳重榮曰待公自􅀜東還吾爲虜矣不若先除君側之惡退擒全忠易矣時朱玫李昌符亦陰附朱全忠克用乃上言玫昌符與全忠相表裏欲共滅臣臣不得不自救已集蕃漢兵十五萬決以來年濟河自渭北討二鎮不近京城保無驚擾既誅二鎭乃旋師滅全忠以雪讎恥上遣使者諭釋冠葢相望朱玫欲朝廷討克用數遣人潛入京城燒積聚或刺殺近侍聲云克用所爲於是京師震恐日有訛言令孜遣玫昌符將本軍及神䇿鄜延靈夏等軍各三萬人屯沙苑以討王重榮重榮發兵拒之告急於李克用克引兵赴之十一月重榮遣兵攻同州刺史郭璋出戰敗死重榮與玫等相守月餘克用兵至與重榮俱壁沙苑表請誅令孜及玫昌符詔和解之克用不聴十二月癸酉合戰玫昌符大敗各走還本鎭潰軍所過焚掠克用進逼京城乙亥夜令孜奉天子自開逺門出幸鳳翔初黄巢焚長安宫室而去諸道兵入城縱掠焚府寺民居什六七王徽累年補葺僅完一二至是復爲亂兵焚掠無孑遺矣是歳賜河中軍號護國二年春正月鎮海牙將張郁作亂攻陷常州李克用還軍河中與王重榮同表請大駕還宫因罪狀田令孜請誅之上復以飛龍使楊復恭爲樞密使戊子令孜請上幸興元上不從是夜令孜引兵入宫刼上幸寳雞黄門衛士從者纔數百人宰相朝臣皆不知翰林學士承㫖杜讓能宿直禁中聞之步追乗輿出城十餘里得人所遺馬無羇勒解帶繋頸而乗之獨追及上於寳雞明日乃有太子少保孔緯等數人繼至讓能審權之子緯戣之孫也宗正奉太廟神主至鄠遇盜皆失之朝士追乗輿者至盩厔爲亂兵所掠衣裝殆盡庚寅上以孔緯爲御史大夫使還召百官上留寳雞以待之時田令孜弄權再致播遷天下共忿疾之朱玫李昌符亦恥爲之用且憚李克用王重榮之彊更與之合蕭遘因邠寜奏事判官李松年至鳳翔遣召朱玫亟迎車駕癸巳玫引步騎五千至鳳翔孔緯詣宰相欲宣詔召之蕭遘裴澈以令孜在上側不欲往辭疾不見緯令臺吏趣百官詣行在皆辭以無􅂁笏緯召三院御史泣謂布衣親舊有急猶當赴之豈有天子蒙塵爲人臣子累召而不往者邪御史請辦裝數日而行緯拂衣起曰吾妻病垂死且不顧諸君善自爲謀請從此辭乃詣李昌符請騎衛送至行在昌符義之贈裝錢遣騎送之邠寜鳳翔兵追逼乗輿敗神策指揮使楊晟於潘氏鉦鼔之聲聞於行宫田令孜奉上發寳雞留禁軍守石鼻爲後拒置感義軍於興鳳二州以楊晟爲節度使守散􅀜時軍民雜糅鋒鏑縱横以神策軍使王建晋暉爲清道斬斫使建以長劒五百前驅奮撃乗輿乃得前上以傳國寳授建使負之以從登大散嶺李昌符焚閣道丈餘將摧折王建扶掖上自煙焰中躍過夜宿板下上枕建膝而寢既覺始進食解御袍賜建曰以其有淚痕故也車駕纔入散􅀜朱玫已圍寳雞石鼻軍潰玫長驅攻散􅀜不克嗣襄王煴肅宗之玄孫也有疾從上不及留遵塗驛爲玫所得與之俱還鳳翔庚戌李克用還太原二月王重榮朱玫李昌符復上表請誅田令孜以前東都留守鄭從讜爲守太傅兼侍中朱玫李昌符使山南西道節度使石君涉柵絶險要燒郵驛上由它道以進山谷﨑嶇邠軍迫其後危殆者數四僅得達山南三月壬午石君涉弃鎮逃歸朱玫癸未鳳翔百官蕭遘等罪狀田令孜及其黨韋昭度請誅之初昭度因供奉僧澈結宦官得爲相澈師知玄鄙澈所爲昭度每與同列詣知玄皆拜之知玄揖使詣澈啜茶山南西道監軍馮翊嚴遵美迎上于西縣丙申車駕至興元戊戌以御史大夫孔緯翰林學士承㫖兵部尚書杜讓能並爲兵部侍郎同平章事保銮都將李鋋等敗邠軍於鳳州詔加王重榮應接糧料使使調本道穀十五萬斛以繼國用重榮表稱令孜未誅不奉詔以尚書左丞盧渥爲户部尚書充山南西道留後以嚴遵美爲内樞密使遣王建帥部兵戍三泉晉暉及神策軍使張造帥四都兵屯黒水修棧道以通往來以建遙領壁州刺史將帥遙領州鎮自此始陳敬瑄疑東川節度使高仁厚欲去之遂州刺史鄭君立起兵攻陷漢州進向成都敬瑄遣其將李順之逆戰君立敗死敬瑄又發維茂羗軍撃仁厚殺之朱玫以田令孜在天子左右終不可去言於蕭遘曰主上播遷六年中原將士冒矢石百姓供饋餉戰死餓死什减七八僅得復京城天下方喜車駕還宫主上更以勤王之功爲敇使之榮委以大權使墮綱紀騷擾藩鎮召亂生禍玫昨奉尊命來迎大駕不蒙信察反類脅君吾輩報國之心極矣戰賊之力殫矣安能垂頭弭耳受制於閽寺之手哉李氏孫尚多相公盍改圖以利社稷乎遘曰主上踐阼十餘年無大過惡正以令孜專權肘腋致坐不安席上每言之流涕不已近日上初無行意令孜陳兵帳前迫脅以行不容俟旦罪皆在令孜人誰不知足下盡心王室正有引兵還鎮拜表迎銮廢立重事伊霍所難遘不敢聞命玫出宣言曰我立李氏一王敢異議者斬夏四月壬子玫逼鳳翔百官奉襄王煴􅁠監軍國事承制封拜指揮仍遣大臣入蜀迎駕盟百官于石􅈹驛玫使蕭遘爲􅁽文遘辭以文思荒落乃使兵部侍郎判户部鄭昌圖爲之乙卯煴受􅁽玫自兼左右神策十軍使帥百官奉煴還京師以鄭昌圖同平章事判度支鹽鐵户部各置副使三司之事一以委焉河中百官崔安潛等上襄王牋賀受􅁽田令孜自知不爲天下所容乃薦樞密使楊復恭爲左神策中尉觀軍容使自除西川監軍使往依陳敬瑄復恭斥令孜之黨出王建爲利州刺史晉暉爲集州刺史張造爲萬州刺史李師泰爲忠州刺史五月朱玫以中書侍郎同平章事蕭遘爲太子太保自加侍中諸道鹽鐵轉運等使加裴澈判度支鄭昌圖判户部以淮南節度使高駢兼中書令充江淮鹽鐵轉運等使諸道行營兵馬都統淮南右都押牙和州刺史吕用之爲嶺南東道節度使大行封拜以悅藩鎮遣吏部侍郎夏矦潭宣諭河北户部侍郎楊陟宣諭江淮諸藩鎮受其命者什六七高駢仍奉牋勸進吕用之建牙開幕一與駢同凡駢之腹心及將校能任事者皆逼以從已諸所施爲不復咨禀駢頗疑之陰欲奪其權而根蔕已固無如之何用之知之甚懼訪於其黨前度支巡官鄭􅂎前知廬州事董瑾􅂎曰此固爲晚矣用之問策安出杞曰曹孟徳有言寜我負人無人負我明日與瑾共爲書一緘授用之其語祕人莫有知者蕭遘稱疾歸永樂初鳳翔節度使李昌符與朱玫同謀立襄王既而玫自爲宰相専權昌符怒不受其官更通表興元詔加昌符檢校司徒朱玫遣其將王行瑜將邠寜河西兵五萬追乗輿感義節度使楊晟戰數却弃散􅀜走行瑜進屯鳳州是時諸道貢賦多之長安不之興元從官衛士皆乏食上涕泣不知爲計杜讓能言於上曰楊復光與王重榮同破黄巢復京城相親善復恭其兄也若遣重臣往諭以大義且致復恭之意宜有回慮歸國之理上從之遣右諫議大夫劉崇望使於河中齎詔諭重榮重榮即聴命遣使表獻絹十萬匹且請討朱玫以自贖戊戌襄王煴遣使者至晉陽賜李克用詔言上至半塗六軍變擾蒼黄晏駕吾爲藩鎮所推今已受冊朱玫亦與克用書克用聞其謀皆出於玫大怒大將蓋寓說克用曰鑾輿播遷天下皆歸咎於我今不誅玫黜李煴無以自湔洗克用從之燔詔書囚使者移檄鄰道稱玫敢欺藩方明言晏駕當道已發蕃漢三萬兵進討凶逆當共立大功寓蔚州人也秦賢㓂宋汴朱全忠敗之於尉氏南癸巳遣都將郭言將步騎三萬擊蔡州六月以扈蹕都將楊守亮爲金商節度京畿制置使將兵二萬出金州與王重榮克用共討朱玫守亮本姓訾名亮曹州人與弟信皆爲楊復光假子更名守亮守信李克用遣使奉表稱方發兵濟河除逆黨迎車駕願詔諸道與臣恊力先是山南之人皆言克用與朱玫合人情恟懼表至上出示從官并諭山南諸鎮由是帖然然克用表猶以朱全忠爲言上使楊復恭以書諭之云俟三輔事寜别有進止衡州刺史周岳發兵攻潭州欽化節度使閔勗招淮西將黄皓入城共守皓遂殺勗岳攻拔州城擒皓殺之鎮海節度使周寳遣牙將丁從實襲常州逐張郁郁奔海陵依鎮遏使南昌高霸霸高駢將也鎮海陵有民五萬户兵三萬人秋七月秦宗權陷許州殺節度使鹿晏弘王行瑜進攻興州感義節度使楊晟弃鎭走據文州詔保鑾都將李鋋扈蹕都將李茂貞陳佩屯大唐峯以拒之茂貞博野人本姓宋名文通以功賜姓名更名欽化軍曰武安以衡州刺史周岳爲節度使八月盧龍節度使李全忠薨以其子匡威爲留後王潮抜泉州殺廖彦若潮聞福建觀察陳巖威名不敢犯福州境遣使降之巖表潮爲泉州刺史潮沈勇有智略既得泉州招懐離散均賦繕兵吏民悅服幽王緒於别館緒慙自殺九月朱玫將張行實攻大唐峰李鋋等擊却之金吾將軍滿存與邠軍戰破之復取興州進守萬仞寨李克脩攻孟方立甲午擒其將吕臻於焦岡拔故鎮武安臨洺邯鄲沙河以大將安金俊爲邢州刺史長安百官太子太師裴璩等勸進於襄王煴冬十月煴即皇帝位改元建貞遙尊上爲太上元皇聖帝董昌謂錢鏐曰汝能取越州吾以杭州授汝鏐曰然不取終爲後患遂將兵自諸暨趨平水鑿山開道五百里出曹娥埭浙東將鮑君福帥衆降之鏐與浙東軍戰屢破之進屯豐山感化牙將張雄馮􅀪鐸得罪於節度使時溥聚衆三百走度江襲蘇州據之雄自稱刺史稍聚兵至五萬戰艦千餘自號天成軍河陽節度使諸葛爽薨大將劉經張全義立爽子仲方爲留後全義臨濮人也李克脩攻邢州不克而還十一月丙戊錢鏐克越州劉漢宏奔台州義成節度使安師儒委政於兩廂都虞􅀱夏矦晏杜標二人驕恣軍中忿之小校張驍潛出聚衆二千攻州城師儒斬晏標首諭之軍中稍息天平節度使朱瑄謀取滑州遣濮州刺史朱裕將兵誘張驍殺之朱全忠先遣其將朱珍李唐賓襲滑州入境遇大雪珍等一夕馳至壁下百梯並升遂克之虜師儒以歸全忠以牙將江陵胡眞知義成留後田令孜至成都請尋醫許之十二月戊寅諸軍拔鳳州以滿存爲鳳州防禦使楊復恭傳檄􅀜中稱得朱玫首者以静難節度使賞之王行瑜戰數敗恐獲罪於玫與其下謀曰今無功歸亦死曷若與汝曹斬玫首定京城迎大駕取邠寜節鉞乎衆從之甲寅行瑜自鳯州擅引兵歸京師玫方視事聞之怒召行瑜責之曰汝擅歸欲反邪行瑜曰吾不反欲誅反者朱玫耳遂擒斬之并殺其黨數百人諸軍大亂焚掠京城士民無衣凍死者蔽地裴澈鄭昌圖帥百官二百餘人奉襄王奔河中王重榮詐爲迎奉執煴殺之囚澈昌圖百官死者殆半台州刺史杜雄誘劉漢宏執送董昌斬之昌徙鎮越州自稱知浙東軍府事以錢鏐知杭州事王重榮函襄王煴首送行在刑部請御興元城南門獻馘百官畢賀太常博士殷盈孫議以爲煴爲賊臣所逼正以不能死節爲罪耳禮公族罪在大辟君爲之素服不舉今煴已就誅宜廢爲庶人令所在葬其首其獻馘稱賀之禮請俟朱玫首至而行之從之盈孫侑之孫也河陽大將劉經畏李罕之難制自引兵鎮洛陽襲罕之於澠池爲罕之所敗經弃洛陽走罕之追殺殆盡罕之軍于鞏將渡河經遣張全義將兵拒之時諸葛仲方㓜弱政在劉經諸將多不附全義遂與罕之合兵攻河陽爲經所敗罕之全義走保懷州初忠武決勝指揮使孫儒與龍驤指揮使朗山劉建鋒戍蔡州拒黄巢扶溝馬殷􅀠軍中以材勇聞及秦宗權叛儒等皆屬焉宗權遣儒將兵攻陷鄭州刺史李璠奔大梁儒進陷河陽留後諸葛仲方奔大梁儒自稱節度使張全義據懷州李罕之據澤州以拒之初長安人張佶爲宣州幕僚惡觀察使秦彦之爲人弃官去過蔡州宗權留以爲行軍司馬佶謂劉建鋒曰秦公剛鷙而猜忌亡無日矣吾屬何以自免建鋒方自危遂與佶善夀州刺史張翺遣其將魏䖍將萬人㓂廬州廬州刺史楊行愍遣其將田頵李神福張訓拒之敗䖍于禇城滁州刺史許勍襲舒州刺史陶雅奔廬州高駢命行愍更名行密是歳天平牙將朱瑾逐泰寜節度使齊克讓自稱留後瑾將襲兖州求昬於克讓乃自鄆盛飾車服私藏兵甲以赴之親迎之夕甲士竊發逐克讓而代之朝廷因以瑾爲泰寜節度使安陸賊帥周通攻鄂州路審中亡去岳州刺史杜洪乗虚入鄂自稱武昌留後朝廷因以授之湘陰賊帥鄧進思復乗虚陷岳州秦宗言圍荆南二年張瓌嬰城自守城中米斗直錢四十緡食甲鼓皆盡擊門扉以警夜死者相枕宗言竟不能克而去三年春正月以邠州都將王行瑜爲静難軍節度使扈蹕都頭李茂貞領武定節度使扈蹕都頭楊守宗爲金商節度使右衛大將軍顧彦朗爲東川節度使金商節度使楊守亮爲山南西道節度使彦朗豐縣人也辛巳以董昌爲浙東觀察使錢鏐爲杭州刺史秦宗權自以兵力十倍於朱全忠而數爲全忠所敗恥之欲悉力以攻汴州全忠患兵少二月以諸軍都指揮使朱珍爲淄州刺史募兵於東道期以初夏而還戊辰削奪三川都監田令孜官爵長流端州然令孜依陳敬瑄竟不行代北節度使李國昌薨三月癸未詔僞宰相蕭遘鄭昌圖裴澈於所在集衆斬之皆死於岐山時朝士受煴官者甚衆法司皆處以極法杜讓能力爭之免者什七八壬辰車駕至鳳翔節度使李昌符恐車駕還京雖不治前過恩賞必踈乃以宫室未完固請駐蹕府舍從之太傅兼侍中鄭從讜罷爲太子太保鎮海節度使周寳募親軍千人號後樓兵禀給倍於鎮海軍鎮海軍皆怨而後樓兵浸驕不可制寳溺於聲色不親政事築羅城二十餘里建東第人苦其役寳與僚屬宴後樓有言鎮海軍怨望者寳曰亂則殺之度支催勘使薛朗以其言告所善鎮海軍將劉浩戒之使戢士卒浩曰惟反可以免死耳是夕寳醉方寢浩帥其黨作亂攻府舍而焚之寳驚起徒跣叩芙蓉門呼後樓兵後樓兵亦反矣寳帥家人步走出青陽門遂奔常州依刺史丁從實浩殺諸僚佐癸巳迎薛朗入府推爲留後寳先兼租庸副使城中貨財山積是日盡於亂兵之手高駢聞寳敗列牙受賀遣使饋以韲粉寳怒擲之地曰汝有吕用之在它日未可知也楊州連歳饑城中餒死者日數千人坊巷爲之寥落妖異數見駢悉以爲周寳當之山南西道節度使楊守亮忌利州刺史王建驍勇屢召之建懼不往前龍州司倉周庠說建曰唐祚將終藩鎮互相吞噬皆無雄才逺略不能戡濟多難公勇而有謀得士卒心立大功者非公而誰然葭萌四戰之地難以乆安閬州地僻人富楊茂實陳田之腹心不脩職貢若表其罪興兵討之可一戰而擒也建從之召募溪洞酋豪有衆八千㳂嘉陵江而下襲閬州逐其刺史楊茂實而據之自稱防禦使招納亡命軍勢益盛守亮不能制部將張䖍裕說建曰公乗天子微弱專據方州若唐室復興公無種矣宜遣使奉表天子杖大義以行師蔑不濟矣部將綦毋諫復說建養士愛民以觀天下之變建皆從之庠䖍裕諫皆許州人也初建與東川節度使顧彦朗俱在神策軍同討賊建既據閬州彦朗畏其侵暴數遣使問遺饋以軍食建由是不犯東川􅀄周寳聞淮南六合鎮遏使徐約兵精誘之使撃􅂫州資治通鑑卷第二百五十六
