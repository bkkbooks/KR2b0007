body:
  text: 徐羨之等以南兖州刺史檀道濟先朝舊將威服殿省且有兵衆乃召道濟及江州刺史王􅀪入朝五月皆至建康以廢立之謀告之甲申謝晦以領軍府屋敗悉令家人出外聚將士於府内又使中書舍人邢安泰潘盛為内應夜邀檀道濟同宿晦悚動不得眠道濟就寢便熟晦以此服之時帝於華林園為列肆親自沽賣又與左右引船為樂夕游天淵池即龍舟而寢乙酉詰旦道濟引兵居前羨之等繼其後入自雲龍門安泰等先誡宿衞莫有禦者帝未興軍士進殺二侍者傷帝指扶出東閤收璽綬羣臣拜辭衞送故太子宫侍中程道惠勸羨之等立皇弟南豫州刺史義恭羨之等以宐都王義隆素有令望又多符瑞乃稱皇太后令數帝過惡廢為營陽王以宐都王纂承大統赦死罪以下又稱皇太后令奉還璽綬并廢皇后為營陽王妃遷營陽王於呉使檀道濟入守朝堂王至呉止金昌亭六月癸丑羨之等使邢安泰就弑之王多力突走出昌門追者以門闗踣而弑之裴子野論曰古者人君養子能言而師授之辭能行而傅相之禮宋之教誨雅異於斯居中則任僕妾處外則近趨走太子皇子有帥有侍是二職者皆臺皁也制其行止授其灋則導達臧否罔弗由之言不及於禮義識不達於今古謹敇者能勸之以吝嗇狂愚者或誘之以凶慝雖有師傅多以耆艾大夫為之雖有友及文學多以膏粱年少為之具位而已亦弗與遊幼王臨州長史行事宣傳敎命又有典籖往往專恣竊弄威權是以本枝雖茂而端良甚寡嗣君冲幼世繼姦回雖惡物醜類天然自出然習則生常其流逺矣降及太宗舉天下而弃之亦昵比之為也烏呼有國有家其鑑之矣傅亮帥行臺百官奉灋駕迎宐都王于江陵祠部尚書蔡廓至尋陽遇疾不堪前亮與之别廓曰營陽在呉宐厚加供奉一旦不幸卿諸人有弑主之名欲立於世將可得邪時亮已與羨之議害營陽王乃馳信止之不及羨之大怒曰與人共計議如何旋背即賣惡於人邪羨之等又遣使者殺前廬陵王義真於新安羨之以荆州地重恐宐都王至或用别人乃亟以錄命除領軍將軍謝晦行都督荆湘等七州諸軍事荆州刺史欲令居外為援精兵舊將悉以配之秋七月行臺至江陵立行門於城南題曰大司馬門傅亮帥百僚詣門上表進璽紱儀物甚盛宐都王時年十八下教曰猥以不徳謬降大命顧已兢悸何以克堪輒當暫歸朝廷展哀陵寢并與賢彦申寫所懐望體其心勿為辭費府州佐史並稱臣請題牓諸門一依宫省王皆不許教州府國綱紀宥所統内見刑原逋責諸將佐聞營陽廬陵王死皆以爲疑勸王不可東下司馬王華曰先帝有大功於天下四海所服雖嗣主不綱人望未改徐羨之中才寒士􅀓亮布衣諸生非有晉宣帝王大將軍之心明矣受寄崇重未容遽敢背徳畏廬陵嚴㫁將來必不自容以殿下寛叡慈仁逺近所知且越次奉迎冀以見徳悠悠之論殆必不然又羨之等五人同功並位孰肯相讓就懐不軌勢必不行廢主若存慮其將來受禍致此殺害蓋由貪生過深寧敢一朝頓懐逆志不過欲握權自固以少主仰待耳殿下但當長驅六轡以副天人之心王曰卿復欲為宋昌邪長史王曇首南蠻校尉到彦之皆勸王行曇首仍陳天人符應王乃曰諸公受遺不容背義且勞臣舊將内外充滿今兵力又足以制物夫何所疑乃命王華揔後任留鎮荆州王欲使到彦之將兵前驅彦之曰了彼不反便應朝服順流若使有虞此師既不足恃更開嫌隙之端非所以副逺邇之望也㑹雍州刺史褚叔度卒乃遣彦之權鎮襄陽甲戌王􅀤江陵引見傅亮號泣哀動左右既而問義眞及少帝薨廢本末悲哭嗚咽侍側者莫能仰視亮流汗沾背不能對乃布腹心於到彦之王華等深自結納王以府州文武嚴兵自衞臺所遣百官衆力不得近部伍中兵參軍朱容子抱刀處王所乘舟户外不解帶者累旬魏主還宫秦王熾磐遣太子暮宋帥征北將軍木弈干等步騎三萬出貂渠谷攻河西白草嶺臨松郡皆破之徙民二萬餘口而還八月丙申宐都王至建康羣臣迎拜於新亭徐羨之問傅亮曰王可方誰亮曰晉文景以上人羨之曰必能明我赤心亮曰不然丁酉王謁初寧陵還止中堂百官奉璽綬王辭讓數四乃受之即皇帝位于中堂備灋駕入宫御太極前殿大赦改元文武賜位二等戊戌謁太廟詔復廬陵王先封迎其柩及孫脩華謝妃還建康庚子以行荆州刺史謝晦為眞晦將行與蔡廓别屛人問曰吾其免乎廓曰卿受先帝顧命任以社稷廢昏立明義無不可但殺人二兄而以之北面挾震主之威據上流之重以古推今自免為難晦始懼不得去既􅀤顧望石頭城喜曰今得脱矣癸夘徐羨之進位司徒王􅀪進位司空傅亮加開府儀同三司謝晦進號衛將軍檀道濟進號征北將軍有司奏車駕依故事臨華林園聽訟詔曰政刑多所未悉可如先者二公推訊帝以王曇首王華為侍中曇首領右衞將軍華領驍騎將軍朱容子為右軍將軍甲辰追尊帝母胡婕妤曰章皇后封皇弟義恭為江夏王義宣為竟陵王義季為衡陽王仍以義宣為左將軍鎮石頭徐羨之等欲即以到彦之為雍州帝不許徵彦之為中領軍委以戎政彦之自襄陽南下謝晦已至鎮慮彦之不過已彦之至楊口步往江陵深布誠􅅃晦亦厚自結納彦之留馬及利劒名刀以與晦晦由此大安柔然紇升蓋可汗聞魏太宗殂將六萬騎入雲中殺掠吏民攻㧞盛樂宫魏世祖自將輕騎討之三日二夜至雲中紇升蓋引騎圍魏主五十餘重騎逼馬首相次如堵將士大懼魏主顔色自若衆情乃安紇升蓋以弟子於陟斤為大將魏人射殺之紇升蓋懼遁去尚書令劉絜言於魏主曰大檀自恃其衆必將復來請俟收田畢大􅀤兵為二道東西並進以討之魏主然之九月丙子立妃袁氏為皇后耽之曾孫也冬十月吐谷渾威王阿柴卒阿柴有子二十人疾病召諸子弟謂之曰先公車騎以大業之故捨其子拾䖍而授孤孤敢私於緯代而忘先君之志乎我死汝曹當奉慕璝為主緯代者阿柴之長子慕璝者阿柴之母弟叔父烏紇提之子也阿柴又命諸子各獻一箭取一箭授其弟慕利延使折之慕利延折之又取十九箭使折之慕利延不能折阿柴乃諭之曰汝曹知之乎孤則易折衆則難摧汝曹當勠力一心然後可以保國寧家言終而卒慕璝亦有才略撫納秦涼失業之民及氐羌雜種至五六百落部衆轉盛十二月魏主命安集將軍長孫翰安北將軍尉眷北撃柔然魏主自將屯柞山柔然北遁諸軍追之大獲而還翰肥之子也詔拜營陽王母張氏為營陽太妃林邑王范陽邁冦日南九徳諸郡宕昌王梁彌怱遣子彌黄入見于魏宕昌羌之别種也羌地東接中國西通西域長數千里各有酋帥部落分地不相統攝而宕昌最彊有民二萬餘落諸種畏之夏主將廢太子璝而立少子酒泉公倫璝聞之將兵七萬北伐倫倫將騎三萬拒之戰于髙平倫敗死倫兄太原公昌將騎一萬襲璝殺之并其衆八萬五千歸于統萬夏主大悦立昌爲太子夏主好自矜大名其四門東曰招魏南曰朝宋西曰服涼北曰平朔二年春正月徐羨之傅亮上表歸政表三上帝乃許之丙寅始親萬機羨之仍遜位還第徐珮之程道惠及呉興太守王韶之等並謂非宐敦勸甚苦乃復奉詔視事辛未帝祀南郊大赦己夘魏主還平城二月燕有女子化為男燕主以問羣臣尚書左丞傅權對曰西漢之末雌雞化為雄猶有王莽之禍况今女化為男臣將為君之兆也三月丙寅魏主尊保母竇氏為保太后密后之殂也世祖尚幼太宗以竇氏慈良有操行使保養之竇氏撫視有恩訓導有禮世祖徳之故加以尊號奉養不異所生丁巳魏以長孫嵩為太尉長孫翰為司徒奚斤為司空夏四月秦王熾磐遣平逺將軍叱盧犍等襲河西鎮南將軍沮渠白蹄於臨松擒之徙其民五千餘戸于枹罕魏主遣龍驤將軍步堆等來聘始復通好六月武都惠文王楊盛卒初盛聞晉亡不改義熈年號謂世子􅀇曰吾老矣當終為晉臣汝善事宋帝及盛卒􅀇自稱都督隴右諸軍事征西大將軍開府儀同三司秦州刺史武都王遣使來告䘮始用元嘉年號秋七月秦王熾磐遣鎮南將軍吉毗等南擊黒水羌酋丘擔大破之八月夏武烈帝殂葬嘉平陵廟號世祖太子昌即皇帝位大赦改元承光王􅀪自以始不預定策不受司空表讓彌年乃許之乙酉以􅀪為車騎大將軍開府儀同三司冬十月丘擔以其衆降秦秦以擔為歸善將軍拜折衝將軍乞伏信帝為平羌校尉以鎮之癸夘魏主大舉伐柔然五道並進長孫翰等從東道出黒漠廷尉卿長孫道生等出白黒二漠之間魏主從中道東平公娥清出栗園奚斤等從西道出爾寒山諸軍至漠南舍輜重輕騎齎十五日糧度漠擊之柔然部落大驚絶迹比走十一月以武都世子􅀇為北秦州刺史武都王初㑹稽孔甯子為帝鎮西諮議叅軍及即位以􅑔子為步兵校尉與侍中王華並有富貴之願疾徐羨之傅亮專權日夜搆之於帝㑹謝晦二女當適彭城王義康新野侯義賓遣其妻曹氏及長子世休送女至建康帝欲誅羨之亮并發兵討晦聲言當伐魏取河南又言拜京陵治行裝艦亮與晦書曰薄伐河朔事猶未已朝野之慮憂懼者多又言朝士多諫北征上當遣外監萬幼宗往相諮訪時朝廷處分異常其謀頗泄三年春正月謝晦弟黄門侍郎㬭馳使告晦晦猶謂不然以傅亮書示諮議參軍何承天曰計幼宗一二日必至􅀓公慮我好事故先遣此書承天曰外閒所聞咸謂西討已定幼宗豈有上理晦尚謂虚妄使承天豫立答詔啟草言伐虜宐須明年江夏内史程道惠得尋陽人書言朝廷將有大處分其事已審使其輔國府中兵參軍樂囧封以示晦晦問承天曰若果爾卿令我云何對曰䝉將軍殊顧常思報徳事變至矣何敢隠情然明日戒嚴動用軍灋區區所懐懼不得盡晦懼曰卿豈欲我自裁邪承天曰尚未至此以王者之重舉天下以攻一州大小既殊逆順又異境外求全上計也其次以腹心將兵屯義陽將軍自帥大衆戰於夏口若敗即趨義陽以出北境其次也晦良久曰荆州用武之地兵糧易給聊且決戰走復何晩乃使承天造立表檄又與衞軍諮議參軍琅邪顔邵謀舉兵邵飲藥而死晦立幡戒嚴謂司馬庾登之曰今當自下欲屈卿以三千人守城備禦劉粹登之曰下官親老在都又素無部衆情計二三不敢受此㫖晦仍問諸將佐戰士三千足守城否南蠻司馬周超對曰非徒守城而已若有外冦可以立功登之因曰超必能辦下官請解司馬南郡以授之晦即於坐命超為司馬領南義陽太守轉登之為長史南郡如故登之蘊之孫也帝以王􅀪檀道濟始不預廢弑之謀􅀪弟曇首又為帝所親委事將發密使報􅀪且召道濟欲使討晦王華等皆以為不可帝曰道濟止於脅從本非創謀殺害之事又所不闗吾撫而使之必將無慮乙丑道濟至建康丙寅下詔暴羨之亮晦殺營陽廬陵王之罪命有司誅之且曰晦據有上流或不即罪朕當親帥六師為其過防可遣中領軍到彦之即日電發征北將軍檀道濟駱驛繼路符衞軍府州以時收翦已命雍州刺史劉粹等㫁其走伏罪止元凶餘無所問是日詔召羨之亮羨之行至西明門外謝㬭正直遣報亮云殿内有異處分亮辭以嫂病暫還遣信報羨之羨之還西州乘内人問訊車出郭步走至新林入陶竈中自經死亮乘車出郭門乘馬奔兄迪墓屯騎校尉郭􅇦收之至廣莫門上遣中書舍人以詔書示亮幷謂曰以公江陵之誠當使諸子無恙亮讀詔書訖曰亮受先帝布衣之眷遂䝉顧託黜昏立明社稷之計也欲加之罪其無辭乎於是誅亮而徙其妻子於建安誅羨之二子而宥其兄子珮之又誅晦子世休收繋謝㬭帝將討謝晦問策於檀道濟對曰臣昔與晦同從北征入闗十策晦有其九才略明練殆為少敵然未嘗孤軍決勝戎事恐非其長臣悉晦智晦悉臣勇今奉王命以討之可未陳而擒也丁夘徵王􅀪為侍中司徒錄尚書事揚州刺史以彭城王義康為都督荆湘等八州諸軍事荆州刺史樂囧復遣使告謝晦以徐傅及㬭等已誅晦先舉羨之亮哀次發子弟凶問既而自岀射堂勒兵晦從髙祖征討指麾處分莫不曲盡其宐數日間四逺投集得精兵三萬人乃奉表稱羨之亮等忠貞横被寃酷且言臣等若志欲執權不專為國初廢營陽陛下在逺武皇之子尚有童幼擁以號令誰敢非之豈得泝流三千里虚館七旬仰望鸞旗者哉故廬陵王於營陽之世積怨犯上自貽非命不有所廢將何以興耿弇不以賊遺君父臣亦何負於宋室邪此皆王􅀪王曇首王華險躁猜忌䜛構成禍今當舉兵以除君側之惡秦王熾磐復遣使如魏請用師于夏初袁皇后生皇子劭后自詳視使馳白帝曰此兒形貌異常必破國亡家不可舉即欲殺之帝狼狽至后殿户外手撥幔禁之乃止以尚在諒闇故祕之閏月丙戌始言劭生􅊨帝下詔戒嚴大赦諸軍相次進路以討謝晦晦以弟遯爲竟陵内史將萬人揔留任帥衆二萬發江陵列舟艦自江津至于破冢旌旗蔽日歎曰恨不得以此為勤王之師晦欲遣兵襲湘州刺史張邵何承天以邵兄益州刺史茂度與晦善曰邵意趣未可知不宐遽擊之晦以書招邵邵不從二月戊午以金紫光祿大夫王敬􅀪為尚書左僕射建安太守鄭鮮之爲右僕射敬􅀪廙之曾孫也庚申上􅀤建康命王􅀪與彭城王義康居守入居中書下省侍中殷景仁參掌留任帝姊㑹稽長公主留止臺内揔攝六宫謝誨自江陵東下何承天留府不從晦至江口到彦之已至彭城洲庾登之據巴陵畏懦不敢進㑹霖雨連日參軍劉和之曰彼此共有雨耳檀征北尋至東軍方彊唯宐速戰登之恇怯使小將陳祐作大囊貯茅懸於㠶檣云可以焚艦用火宐須晴以緩戰期晦然之停軍十五日乃使中兵參軍孔延秀攻將軍蕭欣於彭城洲破之又攻洲口栅陷之諸將咸欲退還夏口到彦之不可乃保隠圻晦又上表自訟且自矜其捷曰陛下若梟四凶於廟庭懸三監於絳闕臣便勒衆旋旗還保所任初晦與徐羨之傅亮為自全之計以為晦據上流而檀道濟鎮廣陵各有彊兵足以制朝廷羨之亮居中秉權可得持久及聞道濟帥衆來上惶懼無計道濟既至與到彦之軍合牽艦縁岸晦始見艦數不多輕之不即岀戰至晩因風㠶上前後連咽西人離沮無復鬬心戊辰臺軍至悉置洲尾列艦過江晦軍一時皆潰晦夜岀投巴陵得小船還江陵先是帝遣雍州刺史劉粹自陸道帥步騎襲江陵至沙橋周超帥萬餘人逆戰大破之士衆傷死者過半俄而晦敗問至初晦與粹善以粹子曠之為參軍帝疑之王􅀪曰粹無私必無憂也及受命南討一無所顧帝以此嘉之晦亦不殺曠之遣還粹所丙子帝自蕪湖東還晦至江陵無它處分唯愧謝周超而已其夜超捨軍單舸詣到彦之降晦衆散略盡乃􅂝其弟遯等七騎北走遯肥壯不能乘馬晦毎待之行不得速己夘至安陸延頭爲戍主光順之所執檻送建康到彦之至馬頭何承天自歸彦之因監荆州府事以周超爲參軍劉粹以沙橋之敗告乃執之於是誅晦㬭遯及其兄弟之子并同黨孔延秀周超等晦女彭城王妃被髪徒跣與晦訣曰大丈夫當横尸戰場柰何狼籍都市庾登之以無任免官禁錮何承天及南蠻行參軍新興王􅀇謨等皆見原晦之走也左右皆弃之唯延陵蓋追隨不捨帝以蓋爲鎮軍功曹督䕶晦之起兵引魏南蠻校尉王慧龍爲援慧龍帥衆一萬拔思陵戍進圍項城聞晦敗乃退益州刺史張茂度受詔襲江陵晦敗茂度軍始至白帝議者疑茂度有貳心帝以茂度弟邵有誠節赦不問使還三月辛巳帝還建康徵謝靈運為祕書監顔延之為中書侍郎賞遇甚厚帝以惠琳道人善談論因與議朝廷大事遂參權要賔客輻湊門車常有數十兩四方贈賂相係方筵七八座上恒滿琳著髙屐披貂裘置通呈書佐㑹稽孔顗嘗詣之遇賓客填咽暄涼而已顗慨然曰遂有黑衣宰相可謂冠屨失所矣夏五月乙未以檀道濟為征南大將軍開府儀同三司江州剌史到彦之爲南豫州剌史遣㪚騎常侍袁渝等十六人分行諸州郡縣觀察吏政訪求民隠又使郡縣各言損益丙午上臨延賢堂聽訊自是每嵗三訊左僕射王敬􅀪性恬淡有重名闗署文桉初不省讀嘗預聽訟上問以疑獄敬􅀪不對上變色問左右何故不以訊牒副僕射敬􅀪曰臣乃得訊牒讀之正自不解上甚不悦雖加禮敬不復以時務及之六月以右衞將軍王華為中護軍侍中如故華以王􅀪輔政王曇首為上所親任與已相埓自謂力用不盡每歎息曰宰相頓有數人天下何由得治是時宰相無常官唯人主所與議論政事委以機密者皆宰相也故華有是言亦有任侍中而不為宰相者然尚書令僕中書監令侍中侍郎給事中皆當時要官也華與劉湛王曇首殷景仁俱爲侍中風力局幹冠冕一時上甞與四人於合殿宴飲甚恱旣罷岀上目送良久歎曰此四賢一時之秀同管喉脣恐後世難繼也黄門侍郎謝􅀪微與華等皆上所重當時號曰五臣􅀪微琰之從孫也精神端審時然後言婢僕之前不妄語笑由是尊卑小大敬之若神從叔混特重之常曰微子異不傷物同不害正吾無間然上欲封王曇首王華等拊御牀曰此坐非卿兄弟無復今日因出封詔以示之曇首固辭曰近日之事賴陛下英明罪人斯得臣等豈可因國之災以為身幸上乃止魏主詔問公卿今當用兵赫連蠕蠕二國何先長孫嵩長孫翰奚斤皆曰赫連土著未能為患不如先伐蠕蠕若追而及之可以大獲不及則獵於隂山取其禽獸皮角以充軍實太常崔浩曰蠕蠕鳥集獸逃舉大衆追之則不能及輕兵追之又不足以制敵赫連氏土地不過千里政刑殘虐人神所弃宐先伐之尚書劉絜武京侯安原請先伐燕於是魏主自雲中西巡至五原因畋於隂山東至和兜山秋八月還平城詔殿中將軍吉恒聘于魏燕太子永卒立次子翼為太子秦王熾磐伐河西至㢘川遣太子暮末等步騎三萬攻西安不克又攻番禾河西王䝉遜􅀤兵禦之且遣使説夏主使乘虛襲枹罕夏主遣征南大將軍呼盧古將騎二萬攻苑川車騎大將軍韋伐將騎三萬攻南安熾磐聞之引歸九月徙其境内老弱畜産於澆河及莫河仍寒川留左丞相曇達守枹罕韋伐攻抜長安獲秦秦州刺史翟爽南安太守李亮吐谷渾握逵等帥部衆二萬餘落叛秦奔昻川附于吐谷渾王慕璝大旱蝗左光祿大夫范泰上表曰婦人有三從之義無自專之道謝晦婦女猶在尚方唯陛下留意有詔原之魏主聞夏世祖殂諸子相圖國人不安欲伐之長孫嵩等皆曰彼若城守以逸待勞大檀聞之乘虚入冦此危道也崔浩曰往年以來熒惑再守羽林鉤已而行其占秦亡今年五星并出東方利於西伐天人相應不可失也嵩固争之帝大怒責嵩在官貪汚命武士頓辱之於是遣司空奚斤帥四萬五千人襲蒲坂宋兵將軍周㡬帥萬人襲陜城以河東太守薛謹為鄉導謹辨之子也魏主欲以中書博士平棘李順揔前驅之兵訪於崔浩浩曰順誠有籌略然臣與之婚姻深知其為人果於去就不可專委帝乃止浩與順由是有隙冬十月丁巳魏主􅀤平城秦左丞相曇達與夏呼盧古戰於嵻㟍山曇達兵敗十一月呼盧古韋伐進攻枹罕秦王熾磐遷保定連呼盧古入南城鎮京將軍趙夀生帥死士三百人力戰却之呼盧古韋伐又攻沙州刺史出連䖍于湟河䖍遣後將軍乞伏萬年擊敗之又攻西平執安西將軍庫洛干阬戰士五千餘人掠民二萬餘户而去仇池氐楊興平求内附梁南秦二州刺史吉翰遣始平太守龎諮據武興氐王楊􅀇遣其弟難當將兵拒諮諮擊走之魏主行至君子津㑹天暴寒冰合戊寅帥輕騎二萬濟河襲統萬壬午冬至夏主方燕羣臣魏師奄至上下驚擾魏主軍於黑水去城三十餘里夏主出戰而敗退走入城門未及閉内三郎豆代田帥衆乘勝入西宫焚其西門宫門閉代田踰宫垣而出魏主拜代曰勇武將軍魏軍夜宿城北癸未分兵四掠殺獲數萬得牛馬十餘萬魏主謂諸將曰統萬未可得也它年當與卿等取之乃徙其民萬餘家而還夏􅀪農太守曹達聞周㡬將至不戰而走魏師乘勝長驅遂入三輔㑹㡬卒于軍中蒲坂守將東平公乙斗聞奚斤將至遣使詣統萬告急使者至統萬魏軍已圍其城還告乙斗曰統萬已敗矣乙斗懼弃城西奔長安斤遂克蒲坂夏主之弟助興先守長安乙斗至與助興弃長安西奔安定十二月斤入長安秦雍氐羌皆詣斤降河西王䝉遜及氐王楊􅀇聞之皆遣使附魏前呉郡太守徐珮之聚黨百餘人謀以明年正㑹於殿中作亂事覺壬戌收斬之營陽太妃張氏卒秦征南將軍吉毗鎮南漒隴西人辛澹帥戸三千據城逐毗毗走還枹罕澹南奔仇池魏初得中原民多逃隠天興中詔采諸漏戸令輸繒帛於是自占為紬繭羅縠戸者甚衆不􅀠郡縣賦役不均是嵗始詔一切罷之以屬郡縣四年春正月辛巳帝祀南郊乙酉魏主還平城統萬徙民在道多死能至平城者什纔六七己亥魏主如幽州夏主遣平原公定帥衆二萬向長安魏主聞之伐木隂山大造攻具再謀伐夏山羌叛秦二月秦王熾磐遣左丞相曇達招慰武始諸羌征南將軍吉毗招慰洮陽諸羌羗人執曇達送夏吉毗為羌所撃奔還士馬死傷者什八九魏主還平城乙夘帝如丹徒己巳謁京陵初髙祖既貴命藏微時耕具以示子孫帝至故宫見之有慙色近侍或進曰大舜躬耕歷山伯禹親事水土陛下不覩遺物安知先帝之至徳稼穡之艱難乎三月丙子魏主遣髙涼王禮鎮長安禮斤之孫也又詔執金吾􅁊貸造橋於君子津丁丑魏廣平王連卒丁亥帝還建康戊子尚書右僕射鄭鮮之卒秦王熾磐以輔國將軍段暉為涼州刺史鎮樂都平西將軍麴景為沙州刺史鎮西平寧朔將軍出連輔政為梁州刺史鎮赤水夏四月丁未魏員外散騎常侍步堆等來聘庚戌以廷尉王徽之為交州刺史徵前刺史杜􅀪文􅀪文有疾自輿就路或勸之待病愈􅀪文曰吾杖節三世常欲投軀帝庭况被徵乎遂行卒於廣州􅀪文慧度之子也魏奚斤與夏平原公定相持於長安魏主欲乘虚伐統萬簡兵練士部分諸將命司徒長孫翰等將三萬騎為前驅常山王素等將步兵三萬為後繼南陽王伏眞等將步兵三萬部送攻具將軍賀多羅將精騎三千為前􅀱素遵之子也五月魏主􅀤平城命龍驤將軍代人陸俟督諸軍鎮大磧以備柔然辛巳濟君子津壬午中䕶軍王華卒魏主至㧞鄰山築城捨輜重以輕騎三萬倍道先行羣臣咸諫曰統萬城堅非朝夕可拔今輕軍討之進不可克退無所資不若與步兵攻具一時俱往帝曰用兵之術攻城最下必不得已然後用之今以步兵攻具皆進彼必懼而堅守若攻不時拔食盡兵疲外無所掠進退無地不如以輕騎直扺其城彼見步兵未至意必寛弛吾羸形以誘之彼或出戰則成擒矣所以然者吾之軍士去家二千餘里又隔大河所謂置之死地而後生者也故以之攻城則不足決戰則有餘矣遂行六月癸夘朔日有食之魏主至統萬分軍伏於深谷以少衆至城下夏將狄子玉降魏言夏主聞有魏師遣使召平原公定定曰統萬堅峻未易攻拔待我擒奚斤然後徐往内外擊之蔑不濟矣故夏主堅守以待之魏主患之乃退軍以示弱遣娥清及永昌王健帥騎五千西掠居民魏軍上有得罪亡奔夏者言魏軍糧盡士卒食菜輜重在後步兵未至宜急擊之夏主從之甲辰將步騎三萬出城長孫翰等皆言夏兵步陳難陷宜避其鋒魏主曰吾逺來求賊惟恐不出今既出矣乃避而不撃彼奮我弱非計也遂收衆偽遁引而疲之夏兵為兩翼鼓譟追之行五六里㑹有風􅀨從東南來揚沙晦􅑡宦者趙倪頗曉方術言於魏主曰今風􅀨從賊上來我向之彼背之天不助人且將士飢渇願陛下攝騎避之更待後日崔浩叱之曰是何言也吾千里制勝一日之中豈得變易賊貪進不止後軍已絶宜隠軍分出奄撃不意風道在人豈有常也魏主曰善乃分騎為左右隊以掎之魏主馬蹶而墜幾為夏兵所獲拓跋齊以身捍蔽決死力戰夏兵乃退魏主騰馬得上刺夏尚書斛黎文殺之又殺騎兵十餘人身中流矢奮擊不輟夏衆大潰齊翳槐之􅀇孫也魏人乘勝逐夏主至城北殺夏主之弟河南公滿及兄子䝉遜死者萬餘人夏主不及入城遂奔上邽魏主微服逐奔者入其城拓拔齊固諫不聽夏人覺之諸門悉閉魏主因與齊等入其宫中得婦人裙繋之槊上魏主乘之而上僅乃得免㑹日暮夏尚書僕射問至奉夏主之母出走長孫翰將八千騎追夏主至髙平不及而還乙巳魏主入城獲夏王公卿校及諸母后妃姊妹宫人以萬數馬三十餘萬匹牛羊數千萬頭府庫珍寶車旗器物不可勝計頒賜將士有差初夏世祖性豪侈築統萬城髙十仞基厚三十步上廣十步宮牆髙五仞其堅可以厲刀斧臺榭壯大皆彫鏤圖畫被以綺繡窮極大采魏主顧謂左右曰蕞爾國而用民如此欲不亡得乎得夏太史令張淵徐辯復以為太史令得故晉將毛脩之秦將軍庫洛干歸庫洛干於秦以毛脩之善烹調用為太官令魏主見夏著作郎天水趙逸所為文譽夏主太過怒曰此豎無道何敢如是誰所為邪當速推之崔浩曰文士襃貶多過其實蓋非得已不足罪也乃止魏主納夏世祖三女為貴人奚斤與夏平原公定猶相拒於長安魏主命宗正娥清太僕丘堆帥騎五千略地闗右定聞統萬已破遂奔上邽斤追至雍不及而還清堆攻夏貳城拔之魏主詔斤等班師斤上䟽言赫連昌亡保上邽鳩合餘燼未有蟠據之資今因其危滅之為易請益鎧馬平昌而還魏主不許斤固請乃許之給斤兵萬人遣將軍劉拔送馬三千匹并留娥清丘堆使共擊夏辛酉魏主自統萬東還以常山王素為征南大將軍假節與執金吾􅁊貸莫雲留鎮統萬雲題之弟也秦王熾磐還抱罕秋七月己夘魏主至柞嶺柔然冦雲中聞魏已克統萬乃遁去秦王熾磐謂羣臣曰孤知赫連氏必無成冒險歸魏今果如孤言八月遣其叔父平逺將軍渥頭等入貢于魏壬子魏主還至平城以所獲頒賜留臺百官有差魏主為人壯健鷙勇臨城對陳親犯矢石左右死傷相繼神色自若由是將士畏服咸盡死力性儉率服御飲膳取給而已羣臣請增峻京城及脩宫室曰易云王公設險以守其國又蕭何云天子以四海為家不壯不麗無以重感帝曰古人有言在徳不在險屈丐蒸土築城而朕滅之豈在城也今天下未平方須民力土功之事朕所未為蕭何之對非雅言也毎以為財者軍國之本不可輕費至於賞賜皆死事勲績之家親戚貴寵未嘗横有所及命將出師指授節度違之者多致負敗明於知人或拔士於卒伍之中唯其才用所長不論本末聽察精敏下無遁情賞不遺賤罰不避貴雖所甚愛之人終無寛假常曰灋者朕與天下共之何敢輕也然性殘忍果於殺戮往往已殺而復悔之九月丁酉安定民舉城降魏氐王楊􅀇遣將軍苻白作圍秦梁州刺史出連輔政于赤水城中糧盡民執輔政以降輔政至駱谷逃還冬十月秦以驍騎將軍呉漢為平南將軍梁州刺史鎮南漒十一月魏主遣軍司馬公孫軌兼大鴻臚持節䇿拜楊􅀇為都督荆梁等四州諸軍事梁州刺史南秦王及境􅀇不出迎軌責讓之欲奉策以還􅀇懼而郊迎魏主善之以軌為尚書軌表之子也十二月秦梁州刺史呉漢為羣羌所攻帥戸二千還于枹罕魏主行如中山癸夘還平城資治通鑑卷第一百二十
