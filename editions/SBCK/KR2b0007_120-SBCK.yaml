front:
  text: 之道也不聽泰甯之子也南豫州刺史廬陵王義眞警悟愛文義而性輕易與太子左衞率謝靈運員外常侍顔延之慧琳道人情好􅅃密嘗云得志之日以靈運延之為宰相慧琳為西豫州都督靈運􅀇之孫也性褊傲不遵灋度朝廷但以文義處之不以為有實用靈運自謂才能宜參權要常懐憤邑延之含之曾孫也嗜酒放縱徐羨之等􅁖義真與靈運等遊義真故吏范晏從容戒之義真曰靈運空疎延之隘薄魏文帝所謂古今文人類不䕶細行者也但性情所得未能忘言於悟賞耳於是羨之等以為靈運延之構扇異同非毁執政出靈運為永嘉太守延之為始安太守義真至歷陽多所求索執政每裁量不盡與義真深怨之數有不平之言又表求還都諮議參軍廬江何尚之屢諫不聽時羨之等已密謀廢帝而次立者應在義眞乃因義眞與帝有隙先奏列其罪惡廢為庻人徙新安郡前吉陽令堂邑張約之上疏曰廬陵王少䝉先皇優慈之遇長受陛下睦愛之恩故在心必言所懐必亮容犯臣子之道致招驕恣之愆至於天姿夙成實有卓然之美宐在容養錄善掩瑕訓盡義方進退以漸今猥加剝辱幽徙逺郡上傷陛下常棣之篤下令逺近恇然失圖臣伏思大宋開基造次根條未繁宐廣樹藩戚敦睦以道人誰無過貴能自新以武皇之愛子陛下之懿弟豈可以其一眚長致淪弃哉書奏以約之為梁州府參軍尋殺之夏四月甲辰魏主東巡大甯秦王熾磐遣鎮南將軍吉毗等帥步騎一萬南伐白茍車孚崔提旁為四國皆降之
