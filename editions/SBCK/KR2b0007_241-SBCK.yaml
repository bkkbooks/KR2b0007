front:
  text: 資治通鑑卷第二百四十一
  hash: sha256:daa1d05c412e9913c9650e50eebf7f49a15171dc66fc28dcf3d914544432a4c2
body:
  text: 臣司馬光奉勑編集唐紀五十七赤奮若六月凡二年有竒起屠維大淵獻二月盡重光憲宗昭文章武大聖至神孝皇帝下元和十四年二月李聽襲海州克東海朐山懷仁等縣李愬敗平盧兵於泝州拔丞縣李師道聞官軍侵逼􅀤民治鄆州城塹修守備役及婦人民益懼且怨都知兵馬使劉悟正臣之孫也師道使之將兵萬餘人屯陽榖以拒官軍悟務爲寛惠使士卒人人自便軍中號曰劉父及田弘正度河悟軍無備戰又數敗或謂師道曰劉悟不修軍法專収衆心恐有它志宜早圖之師道召悟計事欲殺之或諫曰今官軍四合悟無逆狀用一人言殺之諸將誰肯爲用是自脱其爪牙也師道留悟旬日復遣之厚贈金帛以安其意悟知之還營隂爲之備師道以悟將兵在外署悟子從諫門下别奏從諫與師道諸奴日遊戲頗得其隂謀密䟽以白父又有謂師道者曰劉悟終爲患不如早除之丙辰師道潜遣二使齎帖授行營兵馬副使張暹令斬悟首獻之勒暹權領行營時悟方據高丘張幕置酒去營二三里二使至營密以帖授暹暹素與悟善陽與使者謀曰悟自使府還頗爲備不可怱怱暹請先往白之云司空遣使存問將士兼有賜物請都頭速歸同受傳語如此則彼不疑乃可圖也使者然之暹懷帖走詣悟屏人示之悟潜遣人先執二使殺之時已向暮悟按轡徐行還營坐帳下嚴兵自衛召諸將厲色謂之曰悟與公等不顧死亡以抗官軍誠無負於司空今司空信讒言來取悟首悟死諸公其次矣且天子所欲誅者獨司空一人今軍勢日蹙吾曹何爲隨之族滅欲與諸公卷旗束甲還入鄆州奉行天子之命豈徒免危亡富貴可圖也諸公以爲何如兵馬使趙垂棘立於衆首良久對曰如此事果濟否悟應聲罵曰汝與司空合謀邪立斬之徧問其㳄有遲疑未言者悉斬之并斬軍中素爲衆所惡者凡三十餘尸於帳前餘皆股栗曰惟都頭命願盡死乃令士卒曰入鄆人賞錢百緡惟不得近軍帑其使宅及逆黨家財任自掠取有仇者報之使士卒皆飽食執兵夜半聽鼔三聲絶即行人銜枚馬􅅞口遇行人執留之人無知者距城數里天未明悟駐軍使聽城上柝聲絶使十人前行宣言劉都頭奉帖追入城門者請俟寫簡白使十人拔刃擬之皆竄匿悟引大軍繼至城中譟譁動地比至子城已洞開惟牙城拒守尋縱火斧其門而入牙中兵不過數百始猶有􅀤弓矢者俄知不支皆投於地悟勒兵升聽事使捕索師道師道與二子伏厠牀下索得之悟命置牙門外隙地使人謂曰悟奉密詔送司空歸闕然司空亦何顔復見天子師道猶有幸生之意其子弘方仰曰事已至此速死爲幸尋皆斬之自卯至午悟乃命兩都虞候巡坊市禁掠者即時皆定大集兵民於毬􅂣親乗馬巡繞慰安之斬賛師道逆謀者二十餘家文武將吏且懼且喜皆入賀悟見李公度執手歔欷出賈直言於獄置之幕府悟之自陽穀還兵趨鄆也潛使人以其謀告田弘正曰事成當舉烽相白萬一城中有備不能入願公引兵爲助功成之日皆歸於公悟何敢有之旦使弘正進據已營弘正見烽知得城遣使往賀悟函師道父子三首遣使送弘正營弘正大喜露布以聞淄青等十二州皆平弘正初得師道首疑其非眞召夏侯澄使識之澄熟視其靣長號隕絶者久之乃抱其首䑛其目中塵垢復慟哭弘正爲之改容義而不責壬戌田弘正捷奏至乙丑命户部侍郎楊於陵爲淄青宣撫使己巳李師道首函至自廣徳以來垂六十年藩鎭跋扈河南北三十餘州自除官吏不供貢賦至是盡遵朝廷約束上命楊於陵分李師道地於陵按圖籍視土地逺邇計士馬衆寡校倉庫虚實分爲三道使之適均以鄆曹濮爲一道淄青齊登萊爲一道兖海沂密爲一道上從之劉悟以初討李師道詔云部將有能殺師道以衆降者師道官爵悉以與之意謂盡得十二州之地遂補署文武將佐更易州縣長吏謂其下曰軍府之政一切循舊自今但與諸公抱子弄孫夫復何憂上欲移悟它鎭恐悟不受代復須用兵密詔田弘正察之弘正日遣使者詣悟託言修好實觀其所爲悟多力好手􅅮得鄆州三日則敎軍中壯士手􅅮與魏􅀶使者庭觀之自揺肩攘臂離坐以助其勢弘正聞之笑曰是聞除改登即行矣何能爲哉庚午以悟爲義成節度使悟聞制下手足失墜明日遂行弘正將數道兵已至城西二里與悟相見於客亭即受旌節馳詣滑州辟李公度李存郭昈賈直言以自隨悟素與李文㑹善既得鄆州使召之未至聞將移鎭昈存謀曰文㑹佞人敗亂淄青一道㓕李司空之族萬人所共讎也不乗此際誅之田相公至務施寛大將何以雪三齊之憤怨乎乃詐爲悟帖遣使即文㑹所至取其首以來使者遇文㑹於豐齊驛斬之比還悟及昈存已去無所復命矣文㑹二子一亡去一死於獄家貲悉爲人所掠田宅没官詔以淄青行營副使張暹爲戎州刺史癸酉加田弘正檢校司徒同平章事先是李師道將敗數月聞風動鳥飛皆疑有變禁鄆人親識宴聚及道路偶語犯者有刑弘正既入鄆悉除苛禁縦人遊樂寒食七晝夜不禁行人或諫曰鄆人久爲宼敵今雖平人心未安不可不備弘正曰今爲暴者既除冝施以寛惠若復爲嚴察是以桀易桀也庸何愈焉先是賊數遣人入􅀜截陵㦸焚倉􅂣流矢飛書以震駭京師沮撓官軍有司督察甚嚴潼􅀜吏至􅀤人囊篋以索之然終不能絶及田弘正入鄆閲李師道簿書有賞殺武元衡人王士元等及賞潼􅀜蒲津吏卒案乃知曏者皆吏卒受賂於賊容其姦也裴度纂述蔡鄆用兵以來上之憂勤機略因侍宴獻之請内印出付史官上曰如此似出朕志非所欲也弗許三月戊子以華州刺史馬揔爲鄆曹濮等州節度使己丑以義成節度使薛平爲平盧節度淄青齊登萊等州觀察使以淄青四面行營供軍使王遂爲沂海兖密等州觀察使横海節度使烏重㣧奏河朔藩鎭所以能旅拒朝命六十餘年者由諸州縣各置鎭將領事収刺史縣令之權自作威福曏使刺史各得行其職則雖有姧雄如安史必不能以一州反也臣所領徳棣景三州已舉牒各還刺史職事應在州兵並令刺史領之夏四月丙寅詔諸道節度都團練都防禦經略等使所統支郡兵馬並令刺史領之自至徳以來節度使權重所統諸州各置鎭兵以大將主之暴横爲患故重㣧論之其後河北諸鎭惟横海最爲順命由重㣧處之得宜故也辛未工部侍郎同平章事程异薨裴度在相位知無不言皇甫鎛之黨隂擠之丙子詔度以門下侍郎同平章事充河東節度使皇甫鎛專以掊克取媚人無敢言者獨諫議大夫武儒衡上䟽言之鎛自訴於上上曰卿以儒衡上䟽將報怨邪鎛乃不敢言儒衡元衡之從父弟也史館修撰李翺上言以爲定禍亂者武功也興太平者文徳也今陛下既以武功定海内若遂革弊事復高祖太宗舊制用忠正而不疑屏邪佞而不邇改税法不督錢而納布帛絶進獻寛百姓租賦厚邊兵以制戎狄侵盜數訪問待制官以通塞蔽此六者政之根本太平所以興也陛下既已能行其難若何不爲其易乎以陛下天資上聖如不惑近習容悦之辭任骨鯁正直之士與之興大化可不勞而成也若不以此爲事臣恐大功之後逸欲易生進言者必曰天下既平矣陛下可以高枕自安逸如是則太平未可期矣秋七月丁丑朔田弘正送殺武元衡賊王士元等十六人詔仗内京兆府御史臺徧鞫之皆款服京兆尹崔元略以元衡物色詢之則多異同元略問其故對曰恒鄆同謀遣客刺元衡而士元等後期聞恒人事成遂竊以爲己功還報受賞耳今自度爲罪均終不免死故承之上亦不欲復辨正悉殺之戊寅宣武節度使韓弘始入朝上待之甚厚弘獻馬三千絹五千雜繒三萬金銀器千而汴之庫廏尚有錢百餘萬緡絹百餘萬匹馬七千匹糧三百萬解己丑羣臣上尊號曰元和聖文神武法天應道皇帝赦天下沂海兖密觀察使王遂本錢穀吏性狷急無逺識時軍府草創人情未安遂專以嚴酷爲治所用杖絶大於常行者每詈將卒輒曰反虜又盛夏役士卒營府舍督責峻急將卒憤怨辛卯役卒王弁與其徒四人浴於沂水密謀作亂曰今服役觸罪亦死奮命立事亦死死於立事不猶愈乎明日常侍與監軍副使有宴軍將皆在告直兵多休息吾屬乗此際出其不意取之可以萬全四人皆以爲然約事成推弁爲留後壬辰遂方宴飲日過中弁等五人突入於直房前取弓刀徑前射副使張敦實殺之遂與監軍狼狽起走弁執遂數之以盛暑興役用刑刻暴立斬之傳聲勿驚監軍弁即自稱留後升㕔號令與監軍抗禮召集將吏參賀衆莫敢不從監軍具以狀聞甲午韓弘又獻絹二十五萬匹絁三萬匹銀器二百七十左右軍中尉各獻錢萬緡自淮西用兵以來度支鹽鐵及四方争進奉謂之助軍賊平又進奉謂之賀禮後又進奉謂之助賞上加尊號又進奉亦謂之賀禮丁酉以河陽節度使令狐楚爲中書侍郎同平章事楚與皇甫鎛同年進士故鎛引以爲相朝廷聞沂州軍亂甲辰以棣州刺史曹華爲沂海兖密觀察使韓弘累表請留京師八月己酉以弘守司徒兼中書令癸丑以吏部尚書張弘靖同平章事充宣武節度使弘靖宰相子少有令聞立朝簡黙河東宣武闕帥朝廷以其位望素重使鎭之弘靖承王鍔聚歛之餘韓弘嚴猛之後两鎭喜其廉謹寛大故上下安之己未田弘正入朝上待之尤厚戊辰陳許節度使郗士美薨以庫部員外郎李渤爲弔祭使渤上言臣過渭南聞長源鄉舊四百户今纔百餘户閺鄉縣舊三千户今纔千户其它州縣大率相似迹其所以然皆由以逃户税攤於比隣致驅迫俱逃此皆聚歛之臣剥下媚上惟思竭澤不慮無魚乞降詔書絶攤逃之弊盡逃户之産償税不足者乞免之計不數年人皆復於農矣執政見而惡之渤遂謝病歸東都癸酉吐蕃宼慶州營於方渠朝廷議興兵討王弁恐青鄆相扇繼變乃除弁開州刺史遣中使賜以告身中使紿之曰開州計已有人迎候道路留後宜速􅀤弁即日􅀤沂州導從尚百餘人入徐州境所在減之其衆亦稍逃散遂加以杻械乗驢入關九月戊寅􅆎斬東市先是三分鄆兵以􅀠三鎭及王遂死朝廷以爲師道餘黨凶態未除命曹華引棣州兵赴鎭以討之沂州將士迎候者華皆以好言撫之使先入城慰安其餘衆皆不疑華視事三日大饗將士伏甲士千人於幕下乃集衆而諭之曰天子以鄆人有遷徙之勞特加優給宜令鄆人處右沂人處左既定令沂人皆出因闔門謂鄆人曰王常侍以天子之命爲帥於此將士何得輒害之語未畢伏者出圍而殺之死者千二百人無一得脱者門屏間亦霧高丈餘久之方散臣光曰春秋書楚子䖍誘蔡矦般殺之于申彼列國也孔子猶深貶之惡其誘討也况爲天子而誘匹夫乎王遂以聚歛之才殿新造之邦用苛虐致亂王弁庸夫乗釁竊􅀤苟沂帥得人戮之易於大豕耳何必以天子詔書爲誘人之餌乎且作亂者五人耳乃使曹華設詐屠千餘人不亦濫乎然則目今士卒孰不猜其將帥將帥何以令其士卒上下眄眄如宼讎聚處得間則更相魚肉惟先發者爲雄耳禍亂何時而弭哉惜夫憲宗削平僭亂㡬致治平其羙業所以不終由苟徇近功不敦大信故也甲辰以田弘正兼侍中魏博節度使如故弘正三表請留上不許弘正常恐一旦物故魏人猶以故事繼襲故兄弟子姪皆仕諸朝上皆擢居顯列朱紫盈庭時人榮之乙巳上問宰相玄宗之政先理而後亂何也崔羣對曰玄宗用姚崇宋璟盧懷慎蘇頲韓休張九齡則理用宇文融李林甫楊國忠則亂故用人得失所繫非輕人皆以天寳十四年安禄山反爲亂之始臣獨以爲開元二十四年罷張九齡相專任李林甫此理亂之所分也願陛下以開元初爲法以天寳末爲戒乃社稷無疆之福皇甫鎛深恨之冬十月壬戌容管奏安南賊楊清陷都護府殺都護李象古及妻子官屬部曲千餘人象古道古之兄也以貪縱苛刻失衆心清世爲蠻酋象古召爲牙將清鬱鬱不得志象古命清將兵三千討黄洞蠻清因人心怨怒引兵夜還襲府城陷之初蠻賊黄少卿自貞元以來數反覆桂管觀察使裴行立容管經略使陽旻欲徼幸立功爭請討之上從之嶺南節度使孔戣屢諌曰此禽獸耳但可自計利害不足與論是非上不聽大發江湖兵㑹容桂二管入討士卒􅀍瘴癘死者不可勝計安南乗之遂殺都護行立旻竟無功二管彫弊惟戣所部晏然丙寅以唐州刺史桂仲武爲安南都護赦楊清以爲瓊州刺史是月吐蕃節度論三摩等將十五萬衆圍鹽州党項亦發兵助之刺史李文恱竭力拒守凡二十七日吐蕃不能克靈武牙將史奉敬言於朔方節度使杜叔良請兵三千齎三十日糧深入吐蕃以解鹽州之圍叔良以二千五百人與之奉敬行旬餘無聲問朔方人以爲俱没矣無何奉敬自它道出吐蕃背吐蕃大驚潰去奉敬奮擊大破不可勝計奉敬與鳳翔將野詩良輔涇原將郝玭皆以勇著名於邊吐蕃憚之栁泌至台州驅吏民采藥歳餘無所得而懼舉家逃入山中浙東觀察使捕送京師皇甫鎛李道古保護之上復使待詔翰林服其藥日加躁渴起居舍人裴潾上言以爲除天下之害者受天下之利同天下之樂者饗天下之福自黄帝至於文武享國壽考皆用此道也自去嵗以來所在多薦方士轉相汲引其數浸繁借令天下眞有神仙彼必深潜巖壑惟畏人知凡候伺權貴之門以大言自􅃷竒伎驚衆者皆不軌徇利之人豈可信其説而餌其藥邪夫藥以愈疾非朝夕常餌之物况金石酷烈有毒又益以火氣殆非人五藏所能勝也古者君飲藥臣先嘗之乞令獻藥者先自餌一年則眞僞自可辨矣上怒十一月己亥貶潾江陵令初羣臣議上尊號皇甫鎛欲増孝徳字中書侍郎同平章事崔羣曰言聖則孝在其中矣鎛譛羣於上曰羣於陛下惜孝徳二字上怒時鎛給邊軍賜與多不時得又所給多陳敗不可服用軍士怨怒流言欲爲亂李光顔憂懼欲自殺遣人訴於上上不信京師忷懼羣具以中外人情上聞鎛密言於上曰邊賜皆如舊制而人情忽如此者由羣鼓扇將以賣直歸怨於上也上以爲然十二月乙卯以羣爲湖南觀察使於是中外切齒於鎛矣中書舍人武儒衡有氣節好直言上器之顧待甚渥人皆言其且入相令狐楚忌之思有以沮之者乃薦山南東道節度推官狄兼謩才行癸亥擢兼謩左拾遺内供奉兼謩仁傑之族曽孫也楚自草制辭盛言天后竊位姦臣擅權賴仁傑保佑中宗克復明辟儒衡泣訴於上且言臣曽祖平一在天后朝辭榮終老上由是薄楚之爲人十五年春正月沂海兖密觀察使曹華請徙理兖州許之義成節度使劉悟入朝初左軍中尉吐突承璀謀立澧王惲爲太子上不許及上寢疾承璀謀尚未息太子聞而憂之密遣人問計於司農卿郭釗釗曰殿下但盡孝謹以俟之勿恤其它釗太子之舅也上服金丹多躁怒左右宦官往往獲罪有死者人人自危庚子暴崩於中和殿時人皆言内常侍陳弘志弑逆其黨類諱之不敢討賊但云藥􅀤外人莫能明也中尉梁守謙與諸宦官馬進潭劉承偕韋元素王守澄等共立太子殺吐突承璀及澧王惲賜左右神策軍士錢人五十緡六軍威逺人三十緡左右金吾人十五緡閏月丙午穆宗即位于太極殿東序是日召翰林學士段文昌等及兵部郎中薛放駕部員外郎丁公著對于思政殿放戎之弟公著蘇州人皆太子侍讀也上未聽政放公著常侍禁中參預機密上欲以爲相二人固辭丁未輟西宫朝臨集羣臣於月華門外貶皇甫鎛爲崖州司户市井皆相賀上議命相令狐楚薦御史中丞蕭俛辛亥以俛及叚文昌皆爲中書侍郎同平章事楚俛與皇甫鎛皆同年進士上欲誅鎛俛及宦官救之故得免壬子杖殺柳泌及僧大通自餘方士皆流嶺表貶左金吾將軍李道古循州司馬癸丑以薛放爲工部侍郎丁公著爲給事中乙卯尊郭貴妃爲皇太后丁卯上與羣臣皆釋服從吉二月丁丑上御丹鳳門樓赦天下事畢盛陳倡優雜戲於門内而觀之丁亥上幸左神策軍觀手􅅮雜戲庚寅監察御史楊虞卿上䟽以爲陛下宜延對羣臣周徧顧問惠以氣色使進忠若趨利論政若訴寃如此而不致升平者未之有也衡山人趙知微亦上䟽諫上遊畋無節上雖不能用亦不罪也壬辰廢邕管命容管經略使陽旻兼領之安南都護桂仲武至安南楊清拒境不納清用刑慘虐其黨離心仲武遣人説其酋豪數月間降者相繼得兵七千餘人朝廷以仲武爲逗遛甲午以桂管觀察使裴行立爲安南都護乙未以太僕卿杜式方爲桂管觀察使丙申貶仲武爲安州刺史丹王逾薨吐蕃寇靈武憲宗之末回鶻遣合達干來求昬尤切憲宗許之三月癸卯朔遣合達干歸國上見夏州觀察判官柳公權書跡愛之辛酉以公權為右拾遺翰林侍書學士上問公權卿書何能如是之善對曰用筆在心心正則筆正上黙然改容知其以筆諫也公權公綽之弟也辛未安南將士開城納桂仲武執楊清斬之裴行立至海門而卒復以仲武爲安南都護吐蕃宼鹽州初膳部員外郎元稹爲江陵士曹與監軍崔潭峻善上在東宫聞宫人誦稹謌詩而善之及即位潭峻歸朝獻稹歌詩百餘篇上問稹安在對曰今爲散郎夏五月庚戌以稹爲祠部郎中知制誥朝論鄙之㑹同僚食􅀲於閣下有蠅集其上中書舍人武儒衡以扇揮之曰適從何來遽集於此同僚皆失色儒衡意氣自若庚申葬神聖章武孝皇帝于景陵廟號憲宗六月以湖南觀察使崔羣爲吏部侍郎召對别殿上曰朕升儲副知卿爲羽翼對曰先帝之意久屬聖明臣何力之有太后居興慶宫每朔望上帥百官詣宫上壽上性侈所以奉養太后尤爲華靡秋七月乙巳以鄆曹濮節度爲天平軍門下侍郎同平章事令狐楚坐爲山陵使部吏盜官物又不給工人傭直収其錢十五萬緡爲羡餘獻之怨訴盈路丁卯罷爲宣歙池觀察使八月癸巳􅀤神策兵一千浚魚藻池戊戌以御史中丞崔植爲中書侍郎同平章事己亥再貶令狐楚衡州刺史上甫過公除即事遊畋聲色賜與無節九月欲以重陽大宴拾遺李珏帥其同僚上䟽曰伏以元朔未改園陵尚新雖陛下就易月之期俯從人欲而禮經著三年之制猶服心喪遵同軌之㑹始離京告逺夷之使未復命遏密㢮禁蓋爲齊人合謀內庭事將未可上不聽戊午加邠寧節度使李光顔武寧節度使李愬並同平章事冬十月王承宗薨其下秘不􅀤䘮子知感知信皆在朝諸將欲取帥於屬内諸州參謀崔燧以承宗祖母涼國夫人命告諭諸將及親兵立承宗之弟觀察支使承元承元時年二十將士拜之承元不受泣且拜諸將固請不已承元曰天子遣中使監軍有事當與之議及監軍至亦勸之承元曰諸公未忘先徳不以承元年少欲使之攝軍務承元請盡節天子以遵忠烈王之志諸公肯從之乎衆許諾承元乃視事於都將聽事令左右不得謂已爲留後委事於參佐密表請朝廷除帥庚辰監軍奏承宗疾亟弟承元􅁠知留後并以承元表聞党項復引吐蕃宼涇州連營五十里辛巳遣起居舍人柏耆詣鎭州宣慰壬午羣臣入閤退諌議大夫鄭覃崔郾等五人進言陛下宴樂過多畋游無度今胡宼壓境忽有急奏不知乗輿所在又晨夕與近習倡優狎暱賜與過厚大金帛皆百姓膏血非有功不可與雖内藏有餘願陛下愛之萬一四方有事不復使有司重斂百姓時乆無閤中論事者上始甚訝之謂宰相曰此輩何人對曰諌官上乃使人慰勞之曰當依卿言宰相皆賀然實不能用也覃珣瑜之子也上嘗謂給事中丁公著曰聞外間人多宴樂此乃時和人安足用爲慰公著對曰此非佳事恐漸勞聖慮上曰何故對曰自天寳以來公卿大夫競爲遊宴沈酣晝夜優雜子女不愧左右如此不已則百職皆廢陛下能無獨憂勞乎願少加禁止乃天下之福也癸未涇州奏吐蕃進營距州三十里告急求救以右軍中尉梁守謙爲左右神策京西北行營都監將兵四千人并􅀤八鎭全軍救之賜將士裝錢二萬緡以剡王府長史邵同爲太府少卿兼御史中丞充荅吐蕃請和好使初秘書少監田洎入吐蕃爲弔祭使吐蕃請與唐盟於長武城下洎恐吐蕃留之不得還唯阿而已既而吐蕃爲党項所引入宼因以爲辭曰田洎許我將兵赴盟於是貶洎郴州司户成徳軍始奏王承宗薨乙酉徙田弘正爲成徳節度使以王承元爲義成節度使劉悟爲昭義節度使李愬爲魏博節度使又以左金吾將軍田布爲河陽節度使渭州刺史郝玭數出兵襲吐蕃營所殺甚衆李光顔􅀤邠寧兵救涇州邠寧兵以神策受賞厚皆愠曰人給五十緡而不識戰闘者彼何人邪常額衣資不得而前冒白刃者此何人邪洶洶不可止光顔親爲開陳大義以諭之言與涕俱然後軍士感悦而行將至涇州吐蕃懼而退丙戌罷神策行營西川奏吐蕃寇雅州辛卯鹽州奏吐蕃營於烏白池尋亦皆退十一月癸卯遣諫議大夫鄭覃詣鎭州宣慰賜錢一百萬緡以賞將士王承元既請朝命諸將及鄰道爭以故事勸之承元皆不聽及移鎭義成將士諠譁不受命承元與柏耆召諸將以詔㫖諭之諸將號哭不從承元出家財以散之擇其有勞者擢之謂曰諸公以先代之故不欲承元去此意甚厚然使承元違天子之詔其罪大矣昔李師道之未敗也朝廷嘗赦其罪師道欲行諸將固留之其後殺師道者亦諸將也諸將勿使承元爲師道則幸矣因涕泣不自勝且拜之十將李寂等十餘人固留承元承元斬以徇軍中乃定丁未承元赴滑州將吏或以鎭州器用財貨行承元悉命留之上將幸華清宫戊午宰相帥兩省供奉官詣延英門三上表切諫且言如此臣輩當扈從求面對皆不聽諫官伏門下至暮乃退己未未明上自復道出城幸華清宫獨公主駙馬中尉神䇿六軍使帥禁兵千餘人扈從晡時還宫十二月己巳朔鹽州奏吐蕃千餘人圍烏白池庚辰西川奏南詔二萬人入界請討吐蕃癸未容管奏破黄少卿萬餘衆拔營柵三十六時少卿久未平國子祭酒韓愈上言臣去年貶嶺外熟知黄家賊事其賊無城郭可居依山傍險自稱洞主尋常亦各營生急則屯聚相保比縁邕管經略使多不得人徳既不能綏懷威又不能臨制侵欺虜􅅞以致怨恨遂攻刼州縣侵暴平人或復私讎或貪小利或聚或散終亦不能爲事近者征討本起裴行立陽旻此兩人者本無逺慮深謀意在邀功求賞亦縁見賊未屯聚之時將謂單弱争獻謀計自用兵已來已經二年前後所奏殺獲計不下二萬餘人儻皆非虛賊已尋盡至今賊猶依舊足明欺罔朝廷邕容兩管經此凋弊殺傷疾疫十室九空如此不已臣恐嶺南一道未有寧息之時自南討已來賊徒亦甚傷損察其情理厭苦必深賊所處荒僻假如盡殺其人盡得其地在於國計不爲有益若因改元大慶赦其罪戾遣使宣諭必望風降伏仍爲選擇有威信者爲經略使苟處置得宜自然永無侵叛之事上不能用穆宗睿聖文惠孝皇帝上長慶元年春正月辛丑上祀圓丘赦天下改元河北諸道各令均定兩税門下侍郎同平章事蕭俛介㓗疾惡爲相重惜官職少所引拔西川節度使王播大修貢奉且以賂結宦官求爲相段文昌復左右之詔徴播詣京師俛屢於延英力爭言播纎邪物論沸騰不可以汚台司上不聽俛遂辭位己未播至京師壬戌俛罷爲右僕射俛固辭僕射二月癸酉改吏部尚書盧龍節度使劉緫既殺其父兄心常自疑數見父兄爲祟常於府舍飯僧數百使晝夜爲佛事每視事退則處其中或處他室則驚悸不敢寐晩年恐懼尤甚亦見河南北皆從化己卯奏乞弃官爲僧仍乞賜錢百萬緡以賞將士上面諭西川節度使王播令歸鎭播累表乞留京師㑹中書侍郎同平章事段文昌請退壬申以文昌同平章事充西川節度使以翰林學士杜元穎爲户部侍郎同平章事以播爲刑部尚書充鹽鐵轉運使元穎淹之六世孫也回鶻保義可汗卒三月癸丑以劉總兼侍中充天平節度使以宣武節度使張弘靖爲盧龍節度使乙卯以權知京兆尹盧士玫爲瀛莫觀察使丁巳詔劉緫兄弟子姪皆除官大將僚佐亦宜超擢百姓給復一年軍士賜錢一百萬緡戊午立皇弟憬爲鄜王悦爲瓊王惸爲沔王懌爲婺王愔爲茂王怡爲光王協爲淄王憺爲衢王惋爲澶王皇子湛爲景王涵爲江王湊爲漳王溶爲安王瀍爲穎王劉緫奏懇乞為僧且以其私第為佛寺詔賜緫名大覺寺名報恩遣中使以紫僧服及天平節鉞侍中告身并賜之惟其所擇詔未至總已削髮為僧將士欲遮留之總殺其唱帥者十餘人夜以印節授留後張玘遁去及明軍中始知之玘奏總不知所在癸亥卒于定州之境翰林學士李徳裕吉甫之子也以中書舍人李宗閔嘗對策譏切其父恨之宗閔又與翰林學士元稹争進取有隙右補闕楊汝士與禮部侍郎錢徽掌貢舉西川節度使段文昌翰林學士李紳各以書屬所善進士於徽及牓出文昌紳所屬皆不預焉及第者鄭朗覃之弟裴譔度之子蘇巢宗閔之壻楊殷士汝士之弟也文昌言於上曰今嵗禮部殊不公所取進士皆子弟無藝以􅀜節得之上以問諸學士徳裕稹紳皆曰誠如文昌言上乃命中書舍人王起等覆試夏四月丁丑詔黜朗等十人貶徽江州刺史宗閔劒州刺史汝士開江令或勸徽奏文昌紳屬書上必悟徽曰茍無愧心得喪一致柰何奏人私書豈士君子所爲邪取而焚之時人多之紳敬􅀇之曽孫起播之弟也自是徳裕宗閔各分朋黨更相傾軋垂四十年丙戌冊回鶻嗣君為登囉羽録没密施句主毗伽崇徳可汗五月丙申朔回鶻遣都督宰相等五百餘人來逆公主壬子鹽鐵使王播奏約搉茶額每百錢加税五十右拾遺李珏等上䟽以爲搉茶近起貞元多事之際今天下無虞所宜寛横斂之目而更増之百姓何時當得息肩不從丙辰建王恪薨癸亥以太和長公主嫁回鶻公主上之妺也吐蕃聞唐與回鶻婚六月辛未宼青塞堡鹽州刺史李文恱擊却之戊寅回鶻奏以萬􅀐出北庭萬􅀐出安西拒吐蕃以迎公主初劉緫奏分所屬爲三道以幽􅃰營爲一道請除張弘靖爲節度使平薊嬀檀爲一道請除平盧節度使薛平爲節度使瀛莫爲一道請除權知京兆尹盧士玫爲觀察使弘靖先在河東以寛簡得衆緫與之鄰境聞其風望以燕人桀驁日乆故舉弘靖自代以安輯之平嵩之子知河朔風俗而盡誠於國故舉之士玫則緫妻族之親也總又盡擇麾下宿將有功伉健難制者都知兵馬使朱克融等送之京師乞加奬拔使燕人有慕羨朝廷禄位之志又獻征馬萬五千匹然後削髮委去克融滔之孫也是時上方酣宴不留意天下之務崔植杜元穎無逺略不知安危大體茍欲崇重弘靖惟割瀛莫二州以士玫領之自餘皆統於弘靖朱克融輩久羈旅京師至假匄衣食日詣中書求官植元穎不之省及除弘靖幽州勒克融輩歸本軍驅使克融輩皆憤怨先是河北節度使皆親冒寒暑與士卒均勞逸及弘靖至雍容驕貴肩輿於萬衆之中燕人訝之弘靖莊黙自尊涉旬乃一出坐決事賔客將吏罕得聞其言情意不接政事多委之幕僚而所辟判官韋雍輩多年少輕薄之士嗜酒豪縱出入傳呼甚盛或夜歸燭火滿街皆燕人所不習也詔以錢百萬緡賜將士弘靖留其二十萬緡充軍府雜用雍輩復裁刻軍士糧賜繩之以法數以反虜詬責吏卒謂軍士曰今天下太平汝曹能挽兩石弓不若識一丁字由是軍中人人怨怒資治通鑑卷第二百四十一
