front:
  text: 喜即轉愔冠軍將軍㑹稽内史温自領徐兖二州刺史夏四月庚戌温帥步騎五萬發姑熟甲子燕主暐立皇后可足渾氏太后從弟尚書今豫章公翼之女也大司馬温自兖州伐燕郗超曰道逺汴水又淺恐漕運難通温不從六月辛丑温至金鄉天旱水道絶温使冠軍將軍毛虎生鑿鉅野三百里引汶水㑹于清水虎生寳之子也温引舟自清水入河舳艫數百里郗超曰清水入河難以通運若宼不戰運道又絶因敵爲資復無所得此危道也不若盡舉見衆直趨鄴城彼畏公威名必望風逃潰北歸遼碣若能出戰則事可立決若欲城鄴而守之則當此盛夏難爲功力百姓布野盡爲官有易水以南必交臂請命矣但恐明公以此計輕鋭勝負難必欲務持重則莫若頓兵河濟控引漕運俟資儲充備至來夏乃進兵雖如賖遲然期於成功而已捨此二策而連軍北上進不速决退必愆乏賊因此勢以日月相引漸及秋冬水更澁滯且北土早寒三軍裘褐者少恐於時所憂非獨無食而已温又不從温遣建威將軍檀􅀇攻胡陸拔之獲燕寜東將軍慕容忠燕主暐以下邳王厲爲征討大都督帥步騎二萬逆戰于黄墟厲兵大敗單馬犇還髙平太守徐翻舉郡來降前鋒鄧遐朱序敗燕將傅顔於林渚暐復遣樂安王臧統諸軍拒温臧不能抗乃遣散騎常侍李鳳求救于秦秋七月温屯武陽燕故兖州刺史孫元帥其族黨起兵應温温至枋頭暐及太傅評大懼謀犇和龍呉王垂曰臣請擊之若其不捷走未晚也暐乃以垂代樂安王臧爲使持節南討大都督帥征南將軍范陽王徳等衆五萬以拒温垂表司徒左長史申㣧黄門侍郎封孚尚書郎悉羅騰皆從軍㣧鍾之子孚放之子也暐又遣散騎侍郎樂嵩請救于秦許賂以虎牢以西之地秦王堅引羣臣議于東堂皆曰昔桓温伐我至灞上燕不我救今温伐燕我何救焉且燕不稱藩於我我何爲救之王猛密言於堅曰燕雖彊大慕容評非温敵也若温舉山東進屯洛邑収幽冀之兵引并豫之粟觀兵崤澠則陛下大事去矣今不如與燕合兵以退温温退燕亦病矣然後我承其弊而取之不亦善乎堅從之八月遣將軍苟池洛州刺史鄧羌帥步騎二萬以救燕出自洛陽軍至潁川又遣散騎侍郎姜撫報使于燕以王猛爲尚書令太子太傅封孚問於申㣧曰温衆強士整乘流直進今大軍徒逡巡髙岸兵不接刃未見克殄之理事將何如􅅌曰以温今日聲勢似能有爲然在吾觀之必無成功何則晉室衰弱温專制其國晉之朝臣未必皆與之同心故温之得志衆所不願也必將乖阻以敗其事又温驕而恃衆怯於應變大衆深入值可乘之㑹反更逍遙中流不出赴利欲望持乆坐取全勝若糧廪愆懸情見勢屈必不戰自敗此自然之數也温以燕降人段思爲鄉導悉羅騰與温戰生擒思温使故趙將李述徇趙魏騰又與虎賁中郎將染干津共擊斬之温軍奪氣初温使豫州刺史袁真攻譙梁開石門以通水運真克譙梁而不能開石門水運路塞九月燕范陽王徳帥騎一萬蘭臺治書侍御史劉當帥騎五千屯石門豫州刺史李邽帥州兵五千斷温糧道當佩之子也徳使將軍慕容宙帥騎一千爲前鋒與晉兵遇宙曰晉人輕剽怯於陷敵勇於乘退宐設餌以釣之乃使二百騎挑戰分餘騎爲三伏挑戰者兵未交而走晉兵追之宙帥伏以擊之晉兵死者甚衆温戰數不利糧儲復竭又聞秦兵將至丙申焚舟弃輜重鎧仗自陸道犇還以毛虎生督東燕等四郡諸軍事領東燕太守温自東燕出倉垣鑿井而飲行七百餘里燕之諸將爭欲追之呉王垂曰不可温初退惶恐必嚴設警備簡精鋭爲後拒擊之未必得志不如緩之彼幸吾未至必晝夜疾趨俟其士衆力盡氣衰然後擊之無不克矣乃帥八千騎徐行躡其後温果兼道而進數日垂告諸將曰温可擊矣乃急追之及温於襄邑范陽王徳先帥勁騎四千伏於襄邑東澗中與垂夾擊温大破之斬首三萬級秦苟池邀擊温於譙又破之死者復以萬計孫元遂據武陽以拒燕燕左衛將軍孟髙討擒之冬十月己巳大司馬温収散卒屯于山陽温深恥喪敗乃歸罪於袁眞奏免眞爲庻人又免冠軍將軍鄧遐官眞以温誣已不服表温罪狀朝廷不報眞遂據壽春叛降燕且請救亦遣使如秦温以毛虎生領淮南太守守歴陽燕秦既結好使者數往來燕散騎侍郎太原郝晷給事黄門侍郎梁琛相繼如秦晷與王猛有舊猛接以平生問晷東方之事晷見燕政不脩而秦大治知燕將亡陰欲自託於猛頗泄其實琛至長安秦王堅方畋於萬年欲引見琛琛曰秦使至燕燕之君臣朝服備禮灑掃宫廷然後敢見今秦主欲野見之使臣不敢聞命尚書郎辛勁謂琛曰賓客入境惟主人所以處之君焉得專制其禮且天子稱乘輿所至曰行在所何常居之有又春秋亦有遇禮何爲不可乎琛曰晉室不綱靈祚歸徳二方承運俱受明命而桓温猖狂闚我王略燕危秦孤勢不獨立是以秦主同恤時患要結好援東朝君臣引領西望愧其不競以爲隣憂西使之辱敬待有加今彊宼既退交聘方始謂宐崇禮篤義以固二國之歡若忽慢使臣是卑燕也豈脩好之義乎夫天子以四海爲家故行曰乘輿止曰行在今㝢縣瓜裂天光分曜安得以乘輿行在爲言哉禮不期而見曰遇蓋因事權行其禮簡略豈平居容與之所爲哉客使單行誠勢屈於主人然苟不以禮亦不敢從也堅乃爲之設行宫百僚陪位然後延客如燕朝之儀事畢堅與之私宴問東朝名臣爲誰琛曰太傅上庸王評明徳茂親光輔王室車騎大將軍呉王垂雄略冠世折衝禦侮其餘或以文進或以武用官皆稱職野無遺賢琛從兄弈爲秦尚書郎堅使典客館琛於弈舍琛曰昔諸葛瑾爲吳聘蜀與諸葛亮惟公朝相見退無私面余竊慕之今使之即安私室所不敢也乃不果館弈數來就邸舍與琛卧起閒問琛東國事琛曰今二方分據兄弟竝蒙榮寵論其本心各有所在琛欲言東國之美恐非西國之所欲聞欲言其惡又非使臣之所得論也兄何用問爲堅使太子延琛相見秦人欲使琛拜太子先諷之曰隣國之君猶其君也隣國之儲君亦何以異乎琛曰天子之子視元士欲其由賤以登貴也尚不敢臣其父之臣況它國之臣乎苟無純敬則禮有往來情豈忘恭但恐降屈爲煩耳乃不果拜王猛勸堅留琛堅不許燕主暐遣大鴻臚温統拜袁真使持節都督淮南諸軍事征南大將軍楊州刺史封宣城公統未踰淮而卒呉王垂自襄邑還鄴威名益振太傅評愈忌之垂奏所募將士忘身立効將軍孫蓋等槯鋒陷陳應蒙殊賞評皆抑而不行垂數以爲言與評廷爭怨隙愈深太后可足渾氏素惡垂毁其戰功與評密謀誅之太宰恪之子楷及垂舅蘭建知之以告垂曰先發制人但除評及樂安王臧餘無能爲矣垂曰骨肉相殘而首亂於國吾有死而已不忍爲也頃之二人又以告曰内意已决不可不早發垂曰必不可彌縫吾寜避之於外餘非所議垂内以爲憂而未敢告諸子世子令請曰尊比者如有憂色豈非以主上幼沖太傅疾賢功髙望重愈見猜邪垂曰然吾竭力致命以破彊宼本欲保全家國豈知功成之後返令身無所容汝既知吾心何以爲吾謀令曰主上闇弱委任太傅一旦禍發疾於駭機今欲保族全身不失大義莫若逃之龍城遜辭謝罪以待主上之察若周公之居東庶幾可以感寤而得還此幸之大者也如其不然則内撫燕代外懐羣夷守肥如之險以自保亦其次也垂曰善十一月辛亥朔垂請畋于大陸因微服出鄴將趨龍城至邯鄲少子麟素不爲垂所愛逃還告狀垂左右多亡叛太傅評白燕主暐遣西平公强帥精騎追之及於范陽世子令斷後强不敢逼㑹日暮令謂垂曰本欲保東都以自全今事已泄謀不及設秦主方招延英傑不如往歸之垂曰今日之計舍此安之乃散騎􅌍迹傍南山復還鄴隠于趙之顯原陵俄有獵者數百騎四面而來抗之則不能敵逃之則無路不知所爲㑹獵者鷹皆飛颺衆騎散去垂乃殺白馬以祭天且盟從者世子令言於垂曰太傅忌賢疾能構事以來人尤忿恨今鄴城之中莫知尊處如嬰兒之思母夷夏同之若順衆心襲其無備取之如指掌耳事定之後革弊簡能大匡朝政以輔主上安國存家功之大者也今日之便誠不可失願給騎數人足以辦之垂曰如汝之謀事成誠爲大福不成悔之何及不如西犇可以萬全子馬奴潛謀逃歸殺之而行至河陽爲津吏所禁斬之而濟遂自洛陽與段夫人世子令令弟寳農隆兄子楷舅蘭建郎中令髙弼俱犇秦留妃可足渾氏於鄴乙泉戍主呉歸追及於閺鄉世子令擊之而退初秦王堅聞太宰恪卒隂有圖燕之志憚垂威名不敢發及聞垂至大喜郊迎執手曰天生賢傑必相與共成大功此自然之數也要當與卿共定天下告成岱宗然後還卿本邦世封幽州使卿去國不失爲子之孝歸朕不失事君之忠不亦美乎垂謝曰羈旅之臣免罪爲幸本邦之榮非所敢望堅復愛世子令及慕容楷之才皆厚禮之賞賜鉅萬每進見屬目觀之關中士民素聞垂父子名皆嚮慕之王猛言於堅曰慕容垂父子譬如龍虎非可馴之物若借以風雲將不可復制不如早除之堅曰吾方収攬英雄以清四海柰何殺之且其始來吾已推誠納之矣匹夫猶不棄言況萬乗乎乃以垂爲冠軍將軍封賓徒矦楷爲積弩將軍燕魏尹范陽王徳素與垂善及車騎從事中郎髙泰等皆坐免官尚書右丞申紹言於太傅評曰今吳王出犇外口籍籍宐徵王僚屬之賢者顯進之粗可消謗評曰誰可者紹曰髙泰其領袖也乃以泰爲尚書郎泰瞻之從子紹㣧之兄也秦留梁琛月餘乃遣歸琛兼程而進比至鄴呉王垂已犇秦琛言於太傅評曰秦人日閲軍旅多聚糧於陜東以琛觀之爲和必不能乆今呉王又往歸之秦必有窺燕之謀宐早爲之備評曰秦豈肯受叛臣而敗和好哉琛曰今二國分據中原常有相吞之志桓温之入宼彼以計相救非愛燕也若燕有釁彼豈忘其本志哉評曰秦主何如人琛曰明而善斷問王猛曰名不虚得評皆不以爲然琛又以告燕主暐暐亦不然之以告皇甫真真深憂之上䟽言苻堅雖聘問相尋然實有窺上國之心非能慕樂徳義不忘乆要也前出兵洛川及使者繼至國之險易虚實彼皆得之矣今吴王垂又往從之爲其謀主伍貟之禍不可不備洛陽太原壺關皆宐選將益兵以防未然暐召太傅評謀之評曰秦國小力弱恃我爲援且苻堅庶幾善道終不肯納叛臣之言絶二國之好不宐輕自驚擾以啟宼心卒不爲備秦遣黄門郎石越聘於燕太傅評示之以奢欲以誇燕之富盛髙泰及太傅參軍河閒劉靖言於評曰越言誕而視逺非求好也乃觀釁也宐耀兵以示之用折其謀今乃示之以奢益爲其所輕矣評不從泰遂謝病歸是時太后可足渾氏侵橈國政太傅評貪昧無厭貨賂上流官非才舉羣下怨憤尚書左丞申紹上䟽以爲守宰者致治之本今之守宰率非其人或武人出於行伍或貴戚生長綺紈既非鄉曲之選又不更朝廷之職加之黜陟無灋貪惰者無刑罰之懼清修者無旌賞之勸是以百姓困弊宼盜充斥綱頽紀紊莫相糾攝又官吏猥多踰於前世公私紛然不勝煩擾大燕戸口數兼二宼弓馬之勁四方莫及而比者戰則屢北皆由守宰賦調不平侵漁無已行留俱窘莫肯致命故也後宫之女四千餘人僮侍厮役尚在其外一日之費厥直萬金士民承風競爲奢靡彼秦呉僣僻猶能條治所部有兼并之心而我上下因循日失其序我之不脩彼之願也謂宐精擇守宰併官省職存恤兵家使公私兩遂節抑浮靡愛惜用度賞必當功罰必當罪如此則温猛可梟二方可取豈特保境安民而已哉又索頭什翼犍疲病昏悖雖乏貢御無能爲患而勞兵逺戍有損無益不若移於并土控制西河南堅壺關北重晉陽西寇來則拒守過則斷後猶愈於戍孤城守無用之地也䟽奏不省辛丑丞相昱與大司馬温㑹涂中以謀後舉以温世子熙爲豫州刺史假節初燕人許割虎牢以西賂秦晉兵既退燕人悔之謂秦人曰行人失辭有國有家者分災救患理之常也秦王堅大怒遣輔國將軍王猛建威將軍梁成洛州刺史鄧羌帥步騎三萬伐燕十二月進攻洛陽
