body:
  text: 大司馬温發徐兖州民築廣陵城徙鎮之時征役既頻加之疫癘死者什四五百姓嗟怨祕書監太原孫盛作晉春秋直書時事大司馬温見之怒謂盛子曰枋頭誠爲失利何至乃如尊君所言若此史遂行自是關君門戸事其子遽拜謝請改之時盛年老家居性方嚴有􅁤度子孫雖班白待之愈峻至是諸子乃共號泣稽顙請爲百口切計盛大怒不許諸子遂私改之盛先已寫别本傳之外國及孝武帝購求異書得之於遼東人與見本不同遂兩存之五年春正月己亥袁真以梁國内史沛郡朱憲及弟汝南内史斌陰通大司馬温殺之秦王猛遺燕荆州刺史武威王筑書曰國家今已塞成臯之險杜盟津之路大駕虎旅百萬自軹關取鄴都金墉窮戌外無救援城下之師將軍所監豈三百弊卒所能支也筑懼以洛陽降猛陳師受之燕衛大將軍樂安王臧城新樂破秦兵于石門執秦將楊猛王猛之發長安也請慕容令參其軍事以爲鄉導將行造慕容垂飲酒從容謂垂曰今當逺别鄉何以贈我使我覩物思人垂脱佩刀贈之猛至洛陽賂垂所親金熙使詐爲垂使者謂令曰吾父子來此以逃死也今王猛疾人如讐讒毁日深秦王雖外相厚善其心難知丈夫逃死而卒不免將爲天下笑吾聞東朝比來始更悔寤主后相尤吾今還東故遣告汝吾已行矣便可速發令疑之躊躇終日又不可審覆乃將舊騎詐爲出獵遂奔樂安王臧於石門猛表令叛狀垂懼而出走及藍田爲追騎所獲秦王堅引見東堂勞之曰卿家國失和委身投朕賢子心不忘本猶懐首丘亦各其志不足深咎然燕之將亡非令所能存惜其徒入虎口耳且父子兄弟罪不相及卿何爲過懼而狼狽如是乎待之如舊燕人以令叛而復還其父為秦所厚疑令爲反閒徙之沙城在龍都東北六百里臣光曰昔周得微子而革商命秦得由余而霸西戎呉得伍貟而克彊楚漢得陳平而誅項籍魏得許攸而破袁紹彼敵國之材臣來爲已用進取之良資也王猛知慕容垂之心乆而難信獨不念燕尚未􅌍垂以材髙功盛無罪見疑窮困歸秦未有異心遽以猜忌殺之是助燕爲無道而塞來者之門也如何其可哉故秦王堅禮之以收燕望親之以盡燕情寵之以傾燕衆信之以結燕心未爲過矣猛何汲汲於殺垂至乃爲市井鬻賣之行有如嫉其寵而讒之者豈雅徳君子所宐爲哉樂安王臧進屯榮陽王猛遣建威將軍梁成洛州刺史鄧羌擊走之留羌鎮金墉以輔國司馬桓寅爲弘農太守代羌戌陜城而還秦王堅以王猛爲司徒録尚書事封平陽郡矦猛固辭曰今燕呉未平戎車方駕而始得一城即受三事之賞若克殄二寇將何以加之堅曰茍不蹔抑朕心何以顯卿謙光之美已詔有司權聴所守封爵酬庸其勉從朕命二月癸酉袁真卒陳郡太守朱輔立真子瑾爲建威將軍豫州刺史以保壽春遣其子乾之及司馬爨亮如鄴請命燕人以瑾爲揚州刺史輔爲荆州刺史三月秦王堅以吏部尚書權翼為尚書右僕射夏四月復以王猛爲司徒録尚書事猛固辭乃止燕秦皆遣兵助袁瑾大司馬温遣督䕶笁瑤等禦之燕兵先至瑤等與戰於武丘破之南頓太守桓石䖍克其南城石䖍温之弟子也秦王堅復遣王猛督鎮南將軍楊安等十將步騎六萬以伐燕慕容令自度終不得免密謀起兵沙城中讁戍士數千人令皆厚撫之五月庚午令殺牙門孟媯城大涉圭懼請自効令信之引置左右遂帥譴戍士東襲威徳城殺城郎慕容倉據城部署遣人招東西諸戍翕然皆應之鎮東將軍勃海王亮鎮龍城令將襲之其弟麟以告亮亮閉城拒守癸酉涉圭因侍直擊令令單馬走其黨皆潰涉圭追令至薛黎澤擒而殺之詣龍城白亮亮爲之誅涉圭收令尸而葬之六月乙夘秦王堅送王猛於灞上曰今委卿以關東之任當先破壺關平上黨長驅取鄴所謂疾雷不及掩耳吾當親督萬衆繼卿星發舟車糧運水陸俱進卿勿以爲後慮也猛曰臣杖威靈奉成筭盪平殘胡如風掃葉願不煩鑾輿親犯塵霧但願速敇所司部置鮮卑之所堅大悦秋七月癸酉朔日有食之秦王猛攻壷􅀜楊安攻晉陽八月燕主暐命太傅上庸王評將中外精兵三十萬以拒秦暐以秦寇爲憂召散騎侍郎李鳳黄門侍郎梁琛中書侍郎樂嵩問曰秦兵衆寡何如今大軍旣出秦能戰乎鳳曰秦國小兵弱非王師之敵景略常才又非太傅之比不足憂也琛嵩曰勝敗在謀不在衆寡秦遠來爲寇安肯不戰且吾當用謀以求勝豈可冀其不戰而已乎暐不悦王猛克壺關執上黨太守南安王越所過郡縣皆望風降附燕人大震黄門侍郎封孚問司徒長史申㣧曰事將何如胤歎曰鄴必亡矣吾屬今兹將爲秦虜然越得嵗而呉伐之卒受其禍今福徳在燕秦雖得志而燕之復建不過一紀耳大司馬温自廣陵帥衆二萬討袁瑾以襄城大守劉波爲淮南内史將五千人鎮石頭波隗之孫也癸丑温敗瑾于壽春遂圍之燕左衛將軍孟髙將騎兵救瑾至淮北未渡㑹秦伐燕燕召髙還廣漢妖賊李弘詐稱漢歸義矦勢之子聚衆萬餘人自稱聖王年號鳳凰隴西人李髙詐稱成主雄之子攻破涪城逐梁州刺史楊亮九月益州刺史周楚遣子瓊討髙又使瓊子梓潼太守虓討弘皆平之秦楊安攻晉陽晉陽兵多糧足乆之未下王猛留屯騎校尉茍長戍壺關引兵助安攻晉陽爲地道使虎牙將軍張蚝帥壯士數百潜入城中大呼斬關納秦兵辛巳猛安入晉陽執燕并州刺史東海王莊太傅評畏猛不敢進屯於潞川冬十月辛亥猛留將軍武都毛當戍晉陽進兵潞川與慕容評相持壬戍猛遣將軍徐成覘燕軍形要期以日中及昏而返猛怒將斬之鄧羌請之曰今賊衆我寡詰朝將戰成大將也宐且宥之猛曰若不殺成軍灋不立羌固請曰成羌之郡將也雖違期應斬羌願與成効戰以贖之猛弗許羌怒還營嚴鼓勒兵將攻猛猛問其故羌曰受詔討逺賊今有近賊自相殺欲先除之猛謂羌義而有勇使語之曰將軍止吾今赦之成旣免羌詣猛謝猛執其手曰吾試將軍耳將軍於郡將尚爾况國家乎吾不復憂賊矣太傅評以猛懸軍深入欲以持乆制之評爲人貪鄙鄣固山泉鬻樵及水積錢帛如丘陵士卒怨憤莫有鬬志猛聞之笑曰慕容評眞奴才雖億兆之衆不足畏况數十萬乎吾今兹破之必矣乃遣游擊將軍郭慶帥騎五千夜從間道出評營後燒評輜重火見鄴中燕主暐懼遣侍中蘭伊讓評曰王髙祖之子也當以宗廟社稷爲憂奈何不撫戰士而榷賣樵水專以貨殖爲心乎府庫之積朕與王共之何憂於貧若賊兵遂進家國喪亡王持錢帛欲安所置之乃命悉以其錢帛散之軍士且趨使戰評大懼遣使請戰於猛甲子猛陳於渭源而誓之曰王景略受國厚恩任兼内外今與諸君深入賊地當竭力致死有進無退共立大功以報國家受爵明君之朝稱觴父母之室不亦美乎衆皆踊躍破釡棄糧大呼競進猛望燕兵之衆謂鄧羌曰今日之事非將軍不能破勍敵成敗之機在茲一舉將軍勉之羌曰若能以司􅀠見與者公勿以爲憂猛曰此非吾所及也必以安定太守萬户矦相處羌不悦而退俄而兵交猛召羌羌寢弗應猛馳就許之羌乃大飲帳中與張蚝徐成等跨馬運矛馳赴燕陳出入數四旁若無人所殺傷數百及日中燕兵大敗俘斬五萬餘人乘勝追擊所殺及降者又十萬餘人評單騎走還鄴崔鴻曰鄧羌請郡將以橈灋徇私也勒兵欲攻王猛無上也臨戰豫求司􅀠邀君也有此三者罪孰大焉猛能容其所短收其所長若馴猛虎馭悍馬以成大功詩曰采葑采菲無以下體猛之謂矣秦兵長驅而東丁夘圍鄴猛上疏稱臣以甲子之日大殱醜類順陛下仁愛之志使六州士庶不覺易主自非守迷違命一無所害秦王堅報之曰將軍役不踰時而元惡克舉勲髙前古朕今親帥六軍星言電赴將軍其休養將士以待朕至然後取之猛之未至也鄴旁剽刼公行及猛至逺近帖然號令嚴明軍無私犯灋簡政寛燕民各安其業更相謂曰不圖今日復見太原王猛聞之歎曰慕容玄恭信竒士也可謂古之遺愛矣設太牢以祭之十一月秦王堅留李威輔太子守長安陽平公融鎭洛陽自帥精鋭十萬赴鄴七日而至安陽宴祖父時故老猛潜如安陽謁堅堅曰昔周亞夫不迎漢文帝今將軍臨敵而棄軍何也猛曰亞夫前却人主以求名臣竊少之且臣奉陛下威靈擊垂亡之虜譬如釡中之魚何足慮也監國冲㓜鸞駕逺臨脱有不虞悔之何及陛下忘臣灞上之言邪初燕宐都王桓帥衆萬餘屯沙亭爲太傅評後繼聞評敗引兵屯内黄堅使鄧羌攻信都丁丑桓帥鮮卑五千犇龍城戊寅燕散騎侍郎餘蔚帥扶餘髙句麗及上黨質子五百餘人夜開鄴北門納秦兵燕主暐與上庸王評樂安王臧定襄王淵左衛將軍孟髙殿中將軍艾朗等犇龍城辛巳秦王堅入鄴宫慕容垂見燕公卿大夫及故時僚吏有愠色髙弼言於垂曰大王憑祖宗積累之資負英傑髙世之略遭值迍阨棲集外邦今雖家國傾覆安知其不爲興運之始邪愚謂國之舊人宐恢江海之量有以慰結其心以立覆簣之基成九仞之功奈何以一怒捐之愚竊爲大王不取也垂悦從之燕主暐之出鄴也衛士猶千餘騎旣出城皆散惟十餘騎從行秦王堅使遊擊將軍郭慶追之時道路艱難孟髙扶侍暐經䕶二王極其勤瘁又所在遇盜轉鬬而前數日行至福禄依冢解息盜二十餘人猝至皆挾弓矢髙持刀與戰殺傷數人髙力極自度必死乃直前抱一賊頓擊於地大呼曰男兒窮矣餘賊從傍射髙殺之艾朗見髙獨戰亦還趨賊并死暐失馬步走郭慶追及於髙陽部將巨武將􅅞之暐曰汝何小人敢縛天子武曰我受詔追賊何謂天子執以詣秦王堅堅詰其不降而走之狀對曰狐死首丘欲歸死於先人墳墓耳堅哀而釋之令還宫帥文武出降暐稱孟髙艾朗之忠於堅堅命厚加斂葬拜其子爲郎中郭慶進至龍城太傅評犇髙句麗髙句麗執評送於秦宐都王桓殺鎮東將軍渤海王亮并其衆犇遼東遼東太守韓稠先已降秦桓至不得入攻之不克郭慶遣將軍朱嶷擊之桓棄衆單走嶷獲而殺之諸州牧守及六夷渠帥盡降於秦凡得郡百五十七戸二百四十六萬口九百九十九萬以燕宫人珍寳分賜將士下詔大赦曰朕以寡薄猥承休命不能懐逺以徳柔服四維至使戎車屢駕有害斯民雖百姓之過然亦朕之罪也其大赦天下與之更始初梁琛之使秦也以侍輦苟純爲副琛每應對不先告純純恨之歸言於燕主暐曰琛在長安與王猛甚親善疑有異謀琛又數稱秦王堅及王猛之美且言秦將興師宐爲之備已而秦果伐燕皆如琛言暐乃疑琛知其情及慕容評敗遂收琛繫獄秦王堅入鄴而釋之除中書著作郎引見謂之曰卿昔言上庸王呉王皆將相竒材何爲不能謀畫自使亡國對曰天命廢興豈二人所能移也堅曰卿不能見幾而作虚稱燕美忠不自防返爲身禍可謂智乎對曰臣聞幾者動之微吉㐫之先見者也如臣愚暗實所不及然爲臣莫如忠爲子莫如孝自非有一至之心者莫能保忠孝之始終是以古之烈士臨危不改見死不避以徇君親彼知幾者心達安危身擇去就不顧家國臣就使知之尚不忍爲况非所及邪堅聞悦綰之忠恨不及見拜其子爲郎中堅以王猛爲使持節都督關東六州諸軍事車騎大將軍開府儀同三司冀州牧鎮鄴進爵清河郡矦悉以慕容評第中之物賜之賜楊安爵愽平縣矦以鄧羌爲持節征虜將軍安定太守賜爵真定郡矦郭慶為持節都督幽州諸軍事幽州刺史鎮薊賜爵襄城侯其餘將士封賞各有差堅以京兆韋鐘為魏郡太守彭豹為陽平太守其餘州縣牧守令長皆因舊以授之以燕常山太守申紹爲散騎侍郎使與散騎侍郎京兆韋儒俱爲繡衣使者循行關東州郡觀省風俗勸課農桑振恤窮困収葬死亡旌顯節行燕政有不便於民者皆變除之十二月秦王堅遷慕容暐及燕后妃王公百官并鮮卑四萬餘户于長安王猛表留梁琛為主簿領記室督它日猛與僚屬宴語及燕朝使者猛曰人心不同昔梁君至長安専美本朝樂君但言桓温軍盛郝君微説國弊參軍馮誕曰今三子皆為國臣敢問取臣之道何先猛曰郝君知幾為先誕曰然則明公賞丁公而誅季布也猛大笑秦王堅自鄴如枋頭宴父老改枋頭爲永昌復之終世甲寅至長安封慕容暐為新興侯以燕故臣慕容評爲給事中皇甫真爲奉車都尉李洪爲駙馬都尉皆奉朝請李邽爲尚書封衡爲尚書郎慕容徳爲張掖太守燕國平叡爲宣威將軍悉羅騰爲三署郎其餘封授各有差衡裕之子也燕故太史黄泓歎曰燕必中興其在呉王乎恨吾老不及見耳汲郡趙秋曰天道在燕而秦滅之不及十五年秦必復爲燕有慕容桓之子鳳年十一陰有復讎之志鮮卑丁零有氣幹者皆傾身與之交結權翼見而謂之曰兒方以才望自顯勿效爾父不識天命鳳厲色曰先王欲建忠而不遂此乃人臣之節君侯之言豈奬勸將來之義乎翼改容謝之言於秦王堅曰慕容鳳忼慨有才器但狼子野心恐終不爲人用耳秦省雍州是嵗仇池公楊世卒子纂立始與秦絶叔父武都太守統與之爭國起兵相攻資治通鑑卷第一百二
