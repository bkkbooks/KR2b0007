body:
  text: 六月壬申魏以驃􅀐大將軍樊子鵠為青膠大使督濟州刺史蔡儁等討耿翔秋七月魏師至青州翔弃城來奔詔以為兖州刺史壬辰魏以廣陵王欣為大司馬趙郡王諶為太師庚戌以前司徒賀拔允為太尉􅀄賀拔岳遣行臺郎馮景詣晉陽丞相􅂬聞岳使至甚喜曰賀拔公詎憶吾邪與景歃血約與岳為兄弟景還言於岳曰歡姦詐有餘不可信也府司馬宇文泰自請使晉陽以觀歡之為人歡竒其狀貌曰此兒視瞻非常將留之泰固求復命歡旣遣而悔之􅀤驛急追至關不及而返泰至長安謂岳曰髙歡所以未簒者正憚公兄弟耳侯莫陳恱之徒非所忌也公但潜為之備圖歡不難今費也頭控弦之􅀐不下一萬夏州刺史斛拔彌俄突勝兵三千餘人靈州刺史曹泥河西流民紇豆陵伊利等各擁部衆未有所屬公若移軍近隴抗其要害震之以威懷之以惠可收其士馬以資吾軍西輯氐羌北撫沙塞還軍長安匡輔魏室此􅁊文之功也岳大恱復遣泰詣洛陽請事密陳其狀魏主喜加泰武衛將軍使還報八月帝以岳為都督雍華等二十州諸軍事雍州刺史又割心前血遣使者齎以賜之岳遂引兵西屯平涼以牧馬為名斛拔彌俄突紇豆陵伊利及費也頭万俟受洛于鐵勒斛律沙門等皆附於岳唯曹泥附於歡秦南秦河渭四州刺史同㑹平涼受岳節度岳以夏州􅀍邊要重欲求良刺史以鎭之衆舉宇文泰岳曰宇文左丞吾左右手何可廢也沈吟累日卒表用之九月癸酉魏丞相歡表讓王爵不許請分封邑十万戸頒授勲義從之冬十月庚申以尚書右僕射何敬容為左僕射吏部尚書謝舉為右僕射十一月癸巳魏以殷州刺史中山邸珍為徐州大都督東道行臺僕射以討下邳十二月丁己魏主狩於嵩髙巳巳幸温湯丁丑還宫魏荆州刺史賀拔勝宼雍州拔下迮戍扇動諸蠻雍州刺史廬陵王續遣軍擊之屢為所敗漢南震駭勝又遣軍攻馮翊安定沔陽鄼城皆拔之續遣電威將軍柳仲禮屯穀城以拒之勝攻之不克乃還於是沔北盪為丘墟矣仲禮慶逺之孫也魏丞相歡患賀拔岳矦莫陳恱之彊右丞翟嵩曰嵩能間之使其自相屠滅歡遣之歡又使長史矦景招撫紇豆陵伊利伊利不從六年春正月壬辰魏丞相歡擊伊利於河西擒之遷其部落於河東魏主讓之曰伊利不侵不叛為國純臣王忽伐之詎有一介行人先請之乎魏東梁州民夷作亂二月詔以行東雍州事豐陽泉企討平之企丗為商洛豪族魏丗祖以其曾祖景言為本縣令封丹水矦使其子孫襲之壬戍魏大赦癸亥上耕藉田大赦魏永寧浮圖災觀者皆哭聲振城闕魏賀拔岳將討曹泥使都督武川趙貴至夏州與宇文泰謀之泰曰曹泥􅀌城阻逺未足為憂矦莫陳恱貪而無信宜先圖之岳不聽召恱㑹於髙平與共討泥恱旣得翟嵩之言乃謀取岳岳數與恱宴語長史武川雷紹諫不聽岳使恱前行至河曲恱誘岳入營坐論軍事恱陽稱腹痛而起其壻元洪景拔刀斬岳岳左右皆散走恱遣人諭之云我别受㫖止取一人諸君勿怖衆以為然皆不敢動而恱心猶豫不即撫納乃還入隴屯水洛城岳衆散還平涼趙貴詣恱請岳尸葬之恱許之岳旣死恱軍中皆相賀行臺郎中薛憕私謂所親曰恱才略素寡輙害良將吾屬今為人虜矣何賀之有憕眞度之從孫也岳衆未有所屬諸將以都督武川宼洛年最長推使揔諸軍洛素無威略不能齊衆乃自請避位趙貴曰宇文夏州英略冠丗逺近歸心賞罰嚴明士卒用命若迎而奉之大事濟矣諸將或欲南召賀拔勝或欲東告魏朝猶豫未決都督盛樂杜朔周曰逺水不救近火今日之事非宇文夏州無能濟者趙將軍議是也朔周請輕􅀐告哀且迎之衆乃使朔周馳至夏州召泰泰與將佐賔客共議去留前太中大夫潁川韓襃曰此天授也又何疑乎矦莫陳恱井中蛙耳使君往必擒之衆以為恱在水洛去平涼不逺若巳有賀拔公之衆則圖之實難願且留以觀變泰曰恱旣害元帥自應乘勢直據平涼而退屯水洛吾知其無能為也夫難得易失者時也若不早赴衆心將離夏州首望都督彌姐元進隂謀應恱泰知之與帳下都督髙平蔡祐謀執之祐曰元進㑹當反噬不如殺之泰曰汝有大決乃召元進等入計事泰曰隴賊逆亂當與諸人勠力討之諸人似有不同者何也祐即被甲持刀直入瞋目謂諸將曰朝謀夕異何以為人今日必斷姦人首舉坐皆叩頭曰願有所擇祐乃叱元進斬之并誅其黨因與諸將同盟討恱泰謂祐曰吾今以爾為子爾其以我為父乎泰與帳下輕􅀐馳赴平涼令杜朔周帥衆先據彈箏峽時民間惶懼逃散者多軍士爭欲掠之朔周曰宇文公方伐罪弔民柰何助賊為虐乎撫而遣之逺近恱附泰聞而嘉之朔周本姓赫連曾祖庫多汗避難攺焉泰命復其舊姓名之曰逹丞相歡使矦景招撫岳衆泰至安定遇之謂曰賀拔公雖死宇文泰尚存卿何為者景失色曰我猶箭耳唯人所射遂還泰至平涼哭岳甚慟將士皆悲喜􅂬復使矦景與散􅀐常侍代郡張華原義寧太守太安王基勞泰泰不受欲刧留之曰留則共享富貴不然命在今日華原曰明公欲脅使者以死亡此非華原所懼也泰乃遣之基還言泰雄傑請及其未定擊滅之歡曰卿不見賀拔矦莫陳乎吾當以計拱手取之魏主聞岳死遣武衛將軍元毗慰勞岳軍召還洛陽并召矦莫陳恱毗至平涼軍中巳奉宇文泰為主恱旣附丞相􅂬不肯應召泰因元毗上表稱臣岳忽罹非命都督宼洛等令臣權掌軍事奉詔召岳軍入京令髙􅂬之衆巳至河東矦莫陳恱猶在水洛士卒多是西人顧戀郷邑若逼令赴闕恱躡其後􅂬邀其前恐敗國殄民所損更甚乞少賜停緩徐事誘導漸就東引魏主乃以泰為大都督即統岳軍初岳以東雍州刺史李虎為左廂大都督岳死虎奔荆州􅀃賀拔勝使収岳衆勝不從虎聞宇文泰代岳統衆乃自荆州還赴之至閺鄉為丞相􅂬别將所獲送洛陽魏主方謀取􅀜中得虎甚喜拜衛將軍厚賜之使就泰虎歆之玄孫也泰與恱書責以賀拔公有大功於朝廷君名微行薄賀拔公薦君為隴右行臺又髙氏專權君與賀拔公同受密㫖屢結盟約而君黨附國賊共危宗廟口血未乾匕首巳發今吾與君皆受詔還闕今日進退唯君是視君若下隴東邁吾亦自北道同歸若首䑕兩端吾則指日相見魏主問泰以安秦隴之䇿泰表言冝召恱授以内官或處以瓜涼一藩不然終為後患原州刺史史歸素為賀拔岳所親任河曲之變反為恱守恱遣其黨王伯和成次安將兵二千助歸鎮原州泰遣都督矦莫陳崇帥輕􅀐一千襲之崇乗夜將十􅀐直抵城下餘衆皆伏於近路歸見􅀐少不設備崇即入據城門髙平令隴西李賢及弟逺穆在城中為崇内應於是中外鼓噪伏兵悉起遂擒歸及次安伯和等歸于平涼泰表崇行原州事三月泰引兵擊恱至原州衆軍畢集夏四月癸丑朔日有食之魏南秦州刺史隴西李弼􅀃矦莫陳恱曰賀拔公無罪而公害之又不撫納其衆今奉宇文夏州以來聲言為主報讎此其勢不可敵也宜解兵謝之不然必及禍恱不從宇文泰引兵上隴留兄子導為都督鎮原州泰軍令嚴肅秋毫無犯百姓大恱軍出木狹􅀜雪深二尺泰倍道兼行出其不意恱聞之退保略陽留萬人守水洛泰至水洛即降泰遣輕􅀐數百趣略陽恱退保上邽召李弼與之拒泰弼知恱必敗隂遣使詣泰請為内應恱弃州城南保山險弼謂所部曰矦莫陳公欲還秦州汝輩何不裝束弼妻恱之姨也衆咸信之爭趣上邽弼先據城門以安集之遂舉城降泰泰即以弼為秦州刺史其夜恱出軍將戰軍自驚潰恱性猜忌旣敗不聽左右近己與其二弟并子及謀殺岳者七八人弃軍迸走數日之中槃􅁊往來不知所趣左右􅂆向靈州依曹泥恱從之自乗騾令左右皆步從欲自山中趣靈州宇文泰使原州都督賀拔潁追之恱望見追􅀐縊死於野泰入上邽引薛憕為記室參軍收恱府庫財物山積泰秋毫不取皆以賞士卒左右竊一銀甕以歸泰知而罪之即剖賜將士恱黨豳州刺史孫定兒據州不下有衆數萬泰遣都督中山劉亮襲之定兒以大軍逺不為備亮先豎一纛於近城髙嶺自將二十􅀐馳入城定兒方置酒衆猝見亮至駭􅕎不知所為亮麾兵斬定兒遥指城外纛命二􅀐曰出召大軍城中皆懾服莫敢動先是故氐王楊紹先乗魏亂逃歸武興復稱王涼州刺史李叔仁爲其民所執氐羌吐谷渾所在蜂起自南岐至􅀲鄯跨州據郡者不可勝數宇文泰令李弼鎭原州夏州刺史抜也惡蚝鎭南秦州渭州剌史可朱渾元鎭渭州衛將軍趙貴行秦州事徴豳涇東秦岐西州之粟以給軍楊紹先懼稱藩送妻子為質夏州長史于謹言於泰曰明公據􅀜中險固之地將士驍勇土地膏􅃾今天子在洛迫於羣凶若陳明公之懇誠筭時事之利害請都􅀜右挾天子以令諸矦奉王命以討暴亂此􅁊文之業千載一時也泰善之丞相􅂬聞泰定秦隴遣使甘言厚禮以結之泰不受封其書使都督濟北張軌獻於魏主斛斯椿問軌曰髙􅂬逆謀行路皆知之人情所恃唯在西方未知宇文何如賀拔􅁤曰宇文公文足經國武能定亂椿曰誠如君言眞可恃也魏主命泰發二千􅀐鎭東雍州助為勢援仍命泰稍引軍而東泰以大都督武川梁禦為雍州刺史使將步􅀐五千前行先是丞相􅂬遣其都督太安韓軌將兵一萬據蒲坂以救矦莫陳恱雍州刺史賈顯度以舟迎之梁禦見顯度􅀃使從泰顯度即出迎禦禦入據長安魏主以泰為侍中驃􅀐大將軍開府儀同三司􅀜西大都督略陽縣公承制封拜泰乃以宼洛為涇州剌史李弼為秦州刺史前略陽太守張獻為南岐州刺史南岐州刺史盧待伯不受代泰遣輕􅀐襲而擒之侍中封隆之言於丞相歡曰斛斯椿等今在京師必構禍亂隆之與僕射孫騰爭尚魏主妹平原公主公主歸隆之騰泄其言於椿椿以白帝隆之懼逃還郷里歡召隆之詣晉陽㑹騰帶仗入省擅殺御史懼罪亦逃就歡領軍婁昭辭疾歸晉陽帝以斛斯椿兼領軍攺置都督及河南􅀜西諸刺史華山王鷙在徐州歡使大都督邸珍奪其管鑰建州剌史韓賢濟州剌史蔡儁皆􅂬黨也帝省建州以去賢使御史舉儁罪以汝陽王叔昭代之歡上言儁勲重不可解奪汝陽懿德當受大藩臣弟永寶猥任定州宜避賢路帝不聽五月丙子魏主增置勲府庶子廂别六百人又增􅀐官廂别二百人魏主欲伐晉陽辛卯下詔戒嚴云欲自將伐梁發河南諸州兵大閱於洛陽南臨洛水北際邙山帝戎服與斛斯椿臨􅀚之六月丁巳魏主密詔丞相􅂬稱宇文黑􅆩賀拔勝頗有異志故假稱南伐潜為之備王亦宜共為形援讀訖燔之􅂬表以為荆雍將有逆謀臣今潛勒兵馬三萬自河東渡又遣􅁪州刺史庫狄干等將兵四萬自來違津渡領軍將軍婁昭等將兵五萬以討荆州兾州剌史尉景等將山東兵五萬突􅀐五萬以討江左皆勒所部伏聽處分帝知􅂬􅁴其変乃出歡表命羣臣議之欲止歡軍歡亦集并州僚佐共議還以表聞仍云臣為嬖佞所間陛下一旦賜疑臣若敢􅀒陛下使身受天殃子孫殄絶陛下若垂信赤心使干戈不動佞臣一二人願斟量廢出丁卯帝使大都督源子㳟守陽胡汝陽王暹守石濟又以儀同三司賈顯智為濟州刺史帥豫州刺史斛斯元壽東趣濟州元壽椿之弟也蔡儁不受代帝愈怒辛未帝復録洛中文武議意以荅歡且使舎人温子昇為敕賜歡曰朕不勞尺刃坐為天子所謂生我者父母貴我者髙王今若無事背王規相攻討則使身及子孫還如王誓近慮宇文為亂賀拔應之故戒嚴欲與王俱為聲援今觀其所為更無異迹東南不賔為日巳乆今天下户口減半未冝窮兵極武朕旣闇昧不知佞人為誰頃髙乾之死豈獨朕意王怱對昂言兄枉死人之耳目何易可輕如聞庫狄干語王云本欲取懦弱者為主無事立此長君使其不可駕御今但作十五日行自可廢之更立餘者如此議論自是王間勲人豈出佞臣之口去歳封隆之叛今年孫騰逃去不罪不送誰不怪王王若事君盡誠何不斬送二首王雖啓云西去而四道俱進或欲􅀯度洛陽或欲東臨江左言之者猶應自怪聞之者寧能不疑王若晏然居北在此雖有百萬之衆終無圗彼之心王若舉旗南指縱無匹馬隻輪猶欲奮空拳而爭死朕本寡德王巳立之百姓無知或謂實可若為他人所圖則彰朕之惡假令還為王殺幽辱韲粉了無遺恨本望君臣一體若合符契不圖今日分踈至此中軍將軍王思政言於魏主曰髙歡之心昭然可知洛陽非用武之地宇文泰乃心王室今往就之還復舊京何慮不克帝深然之遣散􅀐侍郎河東柳慶見泰於髙平共論時事泰請奉迎輿駕慶復命帝復私謂慶曰朕欲向荆州何如慶曰関中形勝宇文泰才略可依荆州地非要害南迫梁宼臣愚未見其可帝又問閤内都督宇文顯和顯和亦勸帝西幸時帝廣徴州郡兵東郡太守河東裴俠帥所部詣洛陽王思政問曰今權臣擅命王室日卑柰何俠曰宇文泰為三軍所推居百二之地所謂巳操戈矛寧肯授人以柄雖欲投之恐無異避湯入火也思政曰然則如何而可俠曰圗歡有立至之憂西巡有將來之慮且至関右徐思其宜耳思政然之乃進俠於帝授左中郎將􅀄丞相歡以爲洛湯乆經喪亂欲遷都於鄴帝曰髙祖定鼎河洛為萬丗之基王旣功存社稷宜遵太和舊事歡乃止至是復謀遷都遣三千􅀐鎭建興益河東及濟州兵擁諸州和糴粟悉運入鄴城帝又敕歡曰王若厭伏人情杜絶物議唯有歸河東之兵罷建興之戍送相州之粟追濟州之軍使蔡儁受代邸珍出徐止戈散馬各事家業脫須糧廪别遣轉輸則讒人結舌疑悔不生王髙枕太原朕垂拱京洛矣王若馬首南向問鼎輕重朕雖不武為社稷宗廟之計欲止不能決在於王非朕能定為山止簣相為惜之歡上表極言宇文泰斛斯椿罪惡帝以廣寧太守廣寧任祥兼尚書左僕射加開府儀同三司祥弃官走渡河據郡待􅂬帝乃敕文武官北來者任其去留遂下制書數􅂬咎惡召賀拔勝赴行在所勝以問大保掾范陽盧柔柔曰髙􅂬悖逆公席卷赴都與决勝􅀒死生以之上策也北阻魯陽南并舊楚東連兖豫西引􅀜中帶甲百萬􅀚舋而動中策也舉三荆之地庇身於梁功名皆去下策也勝􅀏而不應帝以宇文泰兼尚書僕射為􅀜西大行臺許妻以馮翊長公主謂泰帳内都督秦郡楊荐曰卿歸語行臺遣􅀐迎我以荐為直閤將軍泰以前秦州刺史駱超為大都督將輕􅀐一千赴洛又遣荐與長史宇文測出􅀜􅇋接丞相􅂬召其弟定州刺史琛使守晋陽命長史崔暹佐之暹挺之族孫也􅂬勒兵南出告其衆曰􅀌以爾朱擅命建大義於海内奉戴主上誠貫幽明橫為斛斯椿讒構以忠為逆今者南邁誅椿而巳以髙敖曹為前鋒宇文泰亦移檄州郡數􅂬罪惡自將大軍發髙平前軍屯弘農賀拔勝軍于汝水秋七月已丑魏主親勒兵十餘萬屯河橋以斛斯椿為前驅陳於邙山之北椿請帥精􅀐二千夜度河掩其勞弊帝始然之黄門侍郎楊寛􅀃帝曰髙􅂬以臣伐君何所不至今假兵於人恐生它變椿若度河萬一有功是滅一髙􅂬生一髙􅂬矣帝遂敕椿停行椿歎曰頃熒惑入南斗今上信左右間構不用吾計豈天道乎宇文泰聞之謂左右曰髙􅂬數日行八九百里此兵家所忌當乗便擊之而主上以萬乘之重不能度河决戰方縁津據守且長河萬里扞禦為難若一處得度大事去矣即以大都督趙貴為别道行臺自蒲坂濟趣并州遣大都督李賢將精􅀐一千赴洛陽帝使斛斯椿與行臺長孫稚大都督潁川王斌之鎮虎牢行臺長孫子彦鎮陜賈顯智斛斯元壽鎮滑臺斌之鑒之弟子彦稚之子也􅂬使相州刺史竇泰趣滑臺建州刺史韓賢趣石濟竇泰與顯智遇於長壽津顯智隂約降於􅂬引軍退軍司元玄覺之馳還請益師帝遣大都督矦幾紹赴之戰於滑臺東顯智以軍降紹戰死北中郎將田怙為􅂬内應􅂬潜軍至野王帝知之斬怙􅂬至河北十餘里再遣使口申誠􅍁帝不報丙午􅂬引軍度河魏主問計於羣臣或欲奔梁或云南依賀拔勝或云西就􅀜中或云守洛口死戰計未決元斌之與斛斯椿爭􅁠弃椿還紿帝云髙􅂬兵巳至丁未帝遣使召椿還遂帥南陽王寶炬清河王亶廣陽王湛以五千􅀐宿於瀍西南陽王别舎沙門惠臻􅀒璽持千牛刀以從衆知帝將西出其夜亡者過半亶湛亦逃歸湛深之子也武衛將軍雲中獨孤信單􅀐追帝帝歎曰將軍辭父母捐妻子而來丗亂識忠臣豈虚言也戊申帝西奔長安李賢遇帝于崤中已酉􅂬入洛陽舎於永寧寺遣領軍婁昭等追帝請帝東還長孫子彦不能守陜弃城走髙敖曹帥勁􅀐追帝至陜西不及帝鞭馬長騖糗漿乏絶三二日間從官唯飲澗水至湖城有王思村民以麥飯壷漿獻帝帝恱復一村十年至稠桑潼􅀜大都督毛鴻賔迎獻酒食從官始解飢渴八月甲寅丞相歡集百官謂曰為臣奉主匡救危亂若處不諫争出不陪從緩則耽寵爭榮急則委之逃竄臣節安在衆莫能對兼尚書左僕射辛雄曰主上與近習圖事雄等不得預聞及乗輿西幸若即追隨恐跡同佞黨留待大王又以不從􅂪責雄等進退無所逃罪歡曰卿等備位大臣當以身報國羣佞用事卿等甞有一言諫爭乎使國家之事一朝至此罪欲何歸乃收雄及開府儀同三司叱列延慶兼吏部尚書崔孝芬都官尚書劉廞兼度支尚書天水楊機散􅀐常侍元士弼皆殺之孝芬子司徒從事中郎猷間行入􅀜魏主使以本官奏門下事歡推司徒清河王亶為大司馬承制決事居尚書省宇文泰使趙貴梁禦帥甲􅀐二千奉迎帝循河西行謂禦曰此水東流而朕西上若得復見洛陽親謁陵廟卿等功也帝及左右皆流涕泰備儀衛迎帝謁見於東陽驛免冠流涕曰臣不能式遏宼虐使乗輿播遷臣之罪也帝曰公之忠節著於遐邇朕以不德􅀒乗致宼今日相見深用厚顔方以社稷委公公其勉之將士皆呼萬歳遂入長安以雍州廨舎為宫大赦以泰為大將軍雍州剌史兼尚書令軍國之政咸取決焉别置二尚書分掌機事以行臺尚書毛遐周惠逹為之時軍國草創二人積糧儲治器械簡士馬魏朝賴之泰尚馮翊長公主拜駙馬都尉先是熒惑入南斗去而復還留止六旬上以諺云熒惑入南斗天子下殿走乃跣而下殿以禳之及聞魏主西奔慙曰虜亦應天象邪已未武興王楊紹先為秦南秦二州刺史辛酉魏丞相歡自追迎魏主戊辰清河王亶下制大赦歡至弘農九月癸巳使行臺僕射元子思帥侍官迎帝已酉攻潼􅀜克之擒毛鴻賔進屯華隂長城龍門都督薛崇禮以城降歡賀拔勝使長史元頴行荆州事守南陽自帥所部西赴􅀜中至淅陽聞歡巳屯華隂欲還行臺左丞崔謙曰今帝室顚覆主上蒙塵公宜倍道兼行朝於行在然後與宇文行臺同心勠力唱舉大義天下孰不望風響應今捨此而退恐人人解體一失事機後悔何及勝不能用遂還歡退屯河東使行臺尚書長史薛瑜守潼􅀜大都督庫狄温守封陵築城於蒲津西岸以薛紹宗為華州刺史使守之以髙敖曹行豫州事歡自發晉陽至是凡四十啓魏王皆不報歡乃東還遣行臺矦景等引兵向荆州荆州民鄧誕等執元頴以應景賀拔勝至景逆擊之勝兵敗帥數百􅀐來奔魏主之在洛陽也密遣閤内都督河南趙剛召東荆州刺史馮景昭帥兵入援兵未及發魏主西入関景昭集府中文武議所從司馬馮道和請據州待北方處分剛曰公冝勒兵赴行在所乆之更無言者剛抽刀投地曰公若欲為忠臣請斬道和如欲從賊可速見殺景昭感悟即帥衆赴􅀜中矦景引兵逼穰城東荆州民楊祖􅂬等起兵應之以其衆邀景昭於路景昭戰敗剛没蠻中冬十月丞相􅂬至洛陽又遣僧道榮奉表於孝武帝曰陛下若逺賜一制許還京洛臣當帥勒文武式清宫禁若返正無日則七廟不可無主萬國須有所歸臣寧負陛下不負社稷帝亦不荅􅂬乃集百官􅂄老議所立時清河王亶岀入巳稱警蹕􅂬醜之乃託以孝昌以來昭穆失序永安以孝文為伯考永熙遷孝明於夾室業喪祚短職此之由遂立清河丗子善見為帝謂亶曰欲立王不如立王之子亶不自安輕􅀐南走􅂬追還之丙寅孝靜帝即位於城東北時年十一大赦攺元天平魏宇文泰進軍攻潼􅀜斬薛瑜虜其卒七千人還長安進位大丞相東魏行臺薛脩義等度河據楊氏壁魏司空參軍河東薛端糾帥村民擊却東魏兵復取楊氏丞相泰遣南汾州刺史蘇景恕鎭之丁卯以信武將軍元慶和為鎭北將軍帥衆伐東魏􅀄魏孝武帝旣與丞相􅂬有隙齊州刺史矦淵兖州刺史樊子鵠青州刺史東萊王貴平隂相連結以􅀚時變淵亦遣使通於􅂬所及孝武帝入􅀜清河王亶承制以汝陽王暹為齊州刺史暹至城西淵不時納城民劉桃符等潛引暹入城淵帥􅀐出走妻子部曲悉為暹所虜行及廣里㑹承制以淵行青州事􅂬遺淵書曰卿勿以部曲單少憚於東行齊人澆薄唯利是從齊州尚能迎汝陽王青州豈不能開門待卿也淵乃復東暹歸其妻子部曲貴平亦不受代淵襲髙陽郡克之置累重於城中自帥輕􅀐遊掠於外貴平使其丗子帥衆攻髙陽淵夜趣東陽見州民餽糧者紿之曰臺軍巳至殺戮殆盡我丗子之人也脫走還城汝何為復往聞者皆弃糧走比曉復謂行人曰臺軍昨夜巳至髙陽我是前鋒今至此不知矦公竟在何所城民恟懼遂執貴平出降戊辰淵斬貴平傳首洛陽庚午東魏以趙郡王諶為大司馬咸陽王坦為太尉開府儀同三司髙盛為司徒髙敖曹為司空坦樹之弟也丞相􅂬以洛陽西逼西魏南近梁境乃議遷鄴書下三日即行丙子東魏主發洛陽四十萬戸狼狽就道收百官馬尚書丞郎巳上非陪從者盡令乗驢􅂬留後部分事畢還晉陽攺司州為洛州以尚書令元弼為洛州刺史鎭洛陽以行臺尚書司馬子如為尚書左僕射與右僕射髙隆之侍中髙岳孫騰留鄴共知朝政詔以遷民貲産未立出粟一百三十萬石以賑之十一月兖州刺史樊子鵠據瑕丘以拒東魏南青州刺史大野拔帥衆就之庚寅東魏主至鄴居北城相州之廨攺相州刺史為司州牧魏郡太守為魏尹是時六坊之衆從孝武帝西行者不及萬人餘皆北徙並給常廪春秋賜帛以供衣服乃於常調之外隨豐稔之處折絹糴粟以供國用十二月魏丞相泰遣儀同李虎李弼趙貴擊曹泥於靈州閏月元慶和克瀨鄉而據之魏孝武帝閨門無禮從妹不嫁者三人皆封公主平原公主明月南陽王寶炬之同産也從帝入􅀜丞相泰使元氏諸王取明月殺之帝不恱或時彎弓或時椎桉由是復與泰有隙癸巳帝飲酒遇酖而殂泰與羣臣議所立多舉廣平王贊贊孝武之兄子也侍中濮陽王順於别室垂涕謂泰曰髙歡逼逐先帝立幼主以專權明公宜反其所為廣平沖幼不如立長君而奉之泰乃奉太宰南陽王寶炬而立之順素之玄孫也殯孝武帝於草堂佛寺諫議大夫宋球慟哭嘔血漿粒不入口者數日泰以其名儒不之罪也魏賀抜勝之在荆州也表武衛將軍獨孤信為大都督東魏旣取荆州魏以信為都督三荆州諸軍事尚書右僕射東南道行臺大都督荆州刺史以招懐之蠻酋樊五能攻破淅陽郡以應魏東魏西荆州刺史辛纂欲討之行臺郎中李廣諫曰淅陽四面無民唯一城之地山路深險表裏羣蠻今少遣兵則不能制賊多遣則根本虚弱脫不如意大挫威名人情一去州城難保纂曰豈可縱賊不討廣曰今所憂在心腹何暇治疥癬聞臺軍不乆應至公但約勒屬城使完壘撫民以待之雖失淅陽不足惜也纂不從遣兵攻之兵敗諸將因亡不返城民密召獨􅀌信信至武陶東魏遣􅁪農太守田八能帥羣蠻拒信於淅陽又遣都督張齊民以步􅀐三千出信之後信謂其衆曰今士卒不滿千人首尾受敵若還擊齊民則土民謂我退走必爭來邀我不如進擊八能破之齊民自潰矣遂擊破八能乗勝襲穰城辛纂勒兵出戰大敗還趣城門未及闔信令都督武川楊忠為前驅忠叱門者曰大軍巳至城中有應爾等求生何不避走門者皆散忠帥衆入城斬纂以徇城中懾服信分兵定三荆居半嵗東魏髙敖曹矦景將兵奄至城下信兵少不敵與楊忠皆來奔資治通鑑卷第一百五十六
