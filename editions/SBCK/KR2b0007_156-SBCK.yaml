front:
  text: 通􅅃於􅂬唯張亮無啓䟽􅂬嘉之以爲丞相府參軍魏罷諸行臺辛亥上祀明堂丁巳魏主追尊其父爲武穆帝太妃馮氏爲武穆后母李氏爲皇太妃營州刺史曹鳯東荆州刺史雷能勝等舉城降魏魏侍中斛斯椿聞喬寧張子期之死内不自安與南陽王寳炬武衛將軍元毗王思政密􅂆魏主圖丞相􅂬毗遵之玄孫也舎人元士弼又言􅂬受詔不敬帝由是不恱椿勸帝置閤内都督部曲又增武直人數自直閤巳下員别數百皆選四方驍勇者充之帝數出遊幸椿自部勒别爲行陳由是朝政軍謀帝專與椿決之帝以􅀜中大行臺賀拔岳擁重兵密與相結又出侍中賀拔勝爲都督三荆等七州諸軍事荆州刺史欲􅀝勝兄弟以敵􅂬􅂬益不悅侍中司空髙乾之在信都也遭父喪不暇終服及孝武帝即位表請解職行喪詔聽解侍中司空如故乾雖求退不謂遽見許旣去内侍朝政多不􅀜預居常怏怏帝旣貳於􅂬兾乾為已用甞於華林園宴罷獨留乾謂之曰司空弈丗忠良今日復建殊効相與雖則君臣義同兄弟冝共立盟約以敦情契殷勤逼之乾對曰臣以身許國何敢有貳時事出倉猝且不謂帝有異圖遂不固辭亦不以啓􅂬及帝置部曲乾乃私謂所親曰主上不親勲賢而招集羣小數遣元士弼王思政往來􅀜西與賀拔岳計議又出賀拔勝為荆州外示踈忌實欲樹黨令其兄弟相近兾據有西方禍難將作必及於我乃密啓􅂬􅂬召乾詣并州面論時事乾因􅂆􅂬受魏禪􅂬以䄂掩其口曰勿妄言今令司空復為侍中門下之事一以相委􅂬屢啓請帝不許乾知變難將起密啓􅂬求為徐州二月辛酉以乾為驃􅀐大將軍開府儀同三司徐州刺史以咸陽王坦為司空癸未上幸同泰寺講般若經七日而罷㑹者數万人魏正光以前阿至羅常附於魏及中原多事阿至羅亦叛丞相􅂬招撫之阿至羅復降凡十万戸三月辛卯詔復以􅂬為大行臺使隨冝裁處􅂬與之粟帛議者以為徒費無益􅂬不從及經略河西大收其用髙乾將之徐州魏主聞其漏泄機事乃詔丞相歡曰乾邕與朕私有盟約今乃反覆兩端歡聞其與帝盟亦惡之即取乾前後數啓論時事者遣使封上帝召乾對歡使責之乾曰陛下自立異圖乃謂臣為反覆人主加罪其可辭乎遂賜死帝又宻敕東徐州刺史潘紹業殺其弟敖曹敖曹先聞乾死伏壯士於路執紹業得敕書於􅂁領遂將十餘􅀐奔晋陽歡抱其首哭曰天子枉害司空敖曹兄仲密為光州刺史帝敕青州斷其歸路仲密亦間行奔晋陽仲密名慎以字行魏太師魯郡王肅卒丙辰南平元襄王偉卒丁巳魏以趙郡王諶為太尉南陽王寳炬為大保魏爾朱兆之入洛也焚太常樂庫鍾磬俱盡節閔帝詔録尚書事長孫稚太常卿祖瑩等更造之至是始成命曰大成樂魏青州民耿翔聚衆宼掠三齊膠州刺史裴粲專事髙談不為防禦夏四月翔掩襲州城左右白賊至粲曰豈有此理左右又言巳入州門粲乃徐曰耿王來可引之聽事自餘部衆且付城民翔斬之送首來降五月魏東徐州民王早等殺刺史崔庠以下邳來降
