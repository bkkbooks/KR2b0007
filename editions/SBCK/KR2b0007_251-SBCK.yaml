front:
  text: 資治通鑑卷第二百五十一
  hash: sha256:9a5df23d19f28b583454220854e6f9887e8dbab11be8d9f5be81681dac0b5545
body:
  text: 臣司馬光奉勑編集唐紀六十七維赤奮若凡二年起著雍困敦盡屠懿宗昭聖恭惠孝皇帝中咸通九年夏六月鳯翔少尹李師望上言嶲州控扼南詔為其要衝成都道逺難以節制請建定邊軍屯重兵於嶲州以邛州為理所朝廷以為信然以師望為嶲州刺史充定邊軍節度眉蜀邛雅嘉黎等州觀察統押諸蠻并統領諸道行營制置等使師望利於專制方面故建此䇿其實邛距成都纔百六十里嶲距邛千里其欺罔如此初南詔陷安南敕徐泗募兵二千赴援分八百人别戍桂州初約三年一代徐泗觀察使徐彦曾慎由之從子也性嚴刻朝廷以徐兵驕命鎮之都押牙尹戡教練使杜璋兵馬使徐行儉用事軍中怨之戍桂州者已六年屢求代還戡言於彦曾以軍帑空虚􅀤兵所費頗多請更留舊戍卒一年彦曾從之戍卒聞之怒都虞􅀱許佶軍校趙可立姚周張行實皆故徐州羣盜州縣不能討招出之補牙職㑹桂管觀察使李叢移湖南新使未至秋七月佶等作亂殺都將王仲甫推糧料判官龐勛為主刼庫兵北還所過剽掠州縣莫能禦朝廷聞之八月遣髙品張敬思赦其罪部送歸徐州戍卒乃止剽掠以前静海節度使髙駢為右金吾大將軍駢請以從孫潯代鎮交趾從之九月戊戌以山南東道節度使盧耽為西川節度使以有定邊軍之故不領統押諸蠻安撫等使龐勛等至湖南監軍以計誘之使悉輸其甲兵山南東道節度使崔􅉗嚴兵守要害徐卒不敢入境泛舟㳂江東下許佶等相與謀曰吾輩罪大於銀刀朝廷所以赦之者慮縁道攻刧或潰散為患耳若至徐州必葅醢矣乃各以私財造甲兵旗幟過浙西入淮南淮南節度使令狐綯遣使慰勞給芻米都押牙李湘言於綯曰徐卒擅歸勢必為亂雖無敕令誅討藩鎮大臣當臨事制宜髙郵岸峻而水深狹請將竒兵伏於其側焚荻舟以塞其前以勁兵蹙其後可盡擒也不然縱之使得度淮至徐州與怨憤之衆合為患必大綯素懦怯且以無敕書乃曰彼在淮南不為暴聽其自過餘非吾事也勛招集銀刀等都竄匿者及諸亡命匿於舟中衆至千人丁巳至泗州刺史杜慆饗之於毬埸優人致辭徐卒以為玩已擒優人欲斬之坐者驚散慆素為之備徐卒不敢為亂而止慆悰之弟也先是朝廷屢敕崔彦曾慰撫戍卒擅歸者勿使憂疑彦曾遣使以敕意諭之道路相望勛亦申狀相繼辭禮甚恭戊午行及徐城勛與許佶等乃言於衆曰吾輩擅歸思見妻子耳今聞已有宻敕下本軍至則支分滅族矣丈夫與其自投網羅為天下笑曷若相與戮力同心赴蹈湯火豈徒脱禍兼富貴可求况城中將士皆吾輩父兄子弟吾輩一唱於外彼必響應於内矣然後遵王侍中故事五十萬賞錢翹足可待也衆皆呼躍稱善將士趙武等十二人獨憂懼欲逃去勛悉斬之遣使致其首於彦曾且為申狀稱勛等逺戍六年實懐鄉里而武等因衆心不安輙萌姦計將士誠知詿誤敢避誅夷今既䝉恩全宥輙共誅首惡以補愆尤冬十月甲子使者至彭城彦曾執而訊之具得其情乃囚之丁卯勛復於逓中申狀稱將士自負罪戾各懐憂疑今已及苻離尚未釋甲蓋以軍將尹戡杜璋徐行儉等狡詐多疑必生釁隙乞且停此三人職任以安衆心仍乞戍還將士别置二營共為一將時戍卒拒彭城止四驛闔城忷懼彦曾召諸將謀之皆泣曰比以銀刀㐫悍使一軍皆蒙惡名殱夷流竄不無枉濫今寃痛之聲未已而桂州戍卒復爾猖狂若縱使入城必為逆亂如此則闔境塗地矣不若乘其逺來疲􅁦􅀤兵擊之我逸彼勞徃無不捷彦曾猶豫未決團練判官温庭皓復言於彦曾曰安危之兆已在目前得失之機決於今日今擊之有三難而捨之有五害詔釋其罪而擅誅之一難也帥其父兄討其子弟二難也枝黨鉤連刑戮必多三難也然當道戍卒若擅歸不誅則諸道戍邊者皆效之無以制禦一害也將者一軍之首而輙敢害之則凡爲將者何以號令士卒二害也所過剽掠自爲甲兵招納亡命此而不討何以懲惡三害也軍中將士皆其親屬銀刀餘黨潜匿山澤一旦內外俱􅀤何以支梧四害也逼脅軍府誅所忌三將又欲自爲一營從之則銀刀之患復起違之則託此爲作亂之端五害也惟明公去其三難絶其五害早定大計以副衆望時城中有兵四千三百彦曾乃命都虞候元宻等將兵三千人討勛數勛之罪以令士衆且曰非惟塗炭平人實亦汙染將士儻國家發兵誅討則玉石俱焚矣又曰凡彼親屬無用憂疑罪止一身必無連坐仍命宿州出兵苻離泗州出兵於虹以邀之且奏其狀彦曾戒元宻無傷敕使戊辰元宻􅀤彭城軍容甚盛諸將至任山北數里頓兵不進共思所以奪敕使之計欲俟賊入館乃縱兵擊之遣人變服負薪以詗賊日暮賊至任山館中空無人又無供給疑之見負薪者執而榜之果得其情乃為偶人執旗幟列於山下而潜遁比夜官軍始覺之恐賊潜伏山谷及閒道來襲復引兵退宿於城南明旦乃進追之時賊已至苻離宿州戍卒五百人出戰於濉水上望風奔潰賊遂抵宿州時宿州闕刺史觀察副使焦璐攝州事城中無復餘兵庚午賊攻陷之璐走免賊悉聚城中貨財令百姓來取之一日之中四逺雲集然後選募為兵有不願者立斬之自旦至暮得數千人於是勒兵乘城龐勛自稱兵馬留後再宿官軍始至賊守備已嚴不可復攻先是焦璐聞苻離敗決汴水以斷北路賊至水尚淺可渉比官軍至已深矣壬申元宻引兵度水將圍城㑹大風賊以火箭射城外茅舎延及官軍營士卒進則冒矢石退則限水火賊急擊之死者近三百人元宻等以為賊必固守但為攻取之計賊夜使婦人持更掠城中大船三百艘備載資糧順流而下欲入江湖為盜以千縑贈張敬思遣騎送至汴之東境縱使西歸明旦官軍知賊已去狼狽追之士卒皆未食比追及已饑乏賊檥舟隄下而陳於隄外伏千人於舟中官軍將至陳者皆走入陂中宻以為畏已縱兵追之賊自舟中出夾攻之自午及申官軍大敗宻引兵走陷於荷涫賊追及之宻等諸將及監陳敕使皆死士卒死者殆千人其餘皆降於賊無一人還徐者賊問降卒以彭城人情計謀知其無備始有攻彭城之志乙亥龐勛引兵北度濉水踰山趣彭城其夕崔彦曾始知元宻敗移牒鄰道求救明日塞門選城中丁壯為守備内外震恐無復固志或勸彦曾奔兖州彦曾怒曰吾為元帥城陷而死職也立斬言者丁丑賊至城下衆六七千人鼓譟動地民居在城外者賊皆慰撫無所侵擾由是人爭歸之不移時克羅城彦曾退保子城民助賊攻之推草車塞門而焚之城陷賊囚彦曾於大彭館執尹戡杜璋徐行儉刳而剉之盡滅其族勛坐聽事盛陳兵衛文武將吏伏謁莫敢仰視即日城中願附從者萬餘人戊寅勛召温庭皓使草表求節􅃏庭皓曰此事甚大非頃刻可成請還家徐草之勛許之明旦勛使趣之庭皓來見勛曰昨日所以不即拒者欲一見妻子耳今已與妻子别謹來就死勛熟視笑曰書生敢爾不畏死邪龐勛能取徐州何患無人草表遂釋之有周重者每以才略自負勛迎為上客重為勛草表稱臣之一軍乃漢室興王之地頃因節度使刻削軍府刑賞失中遂致迫逐陛下奪其節制翦滅一軍或死或流寃横無數今聞本道復欲誅夷將士不勝痛憤推臣權兵馬留後彈壓十萬之師撫有四州之地臣聞見利乘時帝王之資也臣見利不失遇時不疑伏乞聖慈復賜旌節不然揮戈曵㦸詣闕非遲庚辰遣押牙張琯奉表詣京師勛以許佶為都虞侯趙可立為都遊奕使黨與各補牙職分將諸軍又遣舊將劉行及將千五百人屯濠州李圎將二千人屯泗州梁丕將千人屯宿州自餘要害縣鎮悉繕完戍守徐人謂旌節之至不過旬月願効力獻䇿者逺近輻湊乃至光蔡淮浙兖鄆沂宻羣盜皆倍道歸之闐溢郛郭旬日閒米斗直錢二百勛詐為崔彦曾請剪滅徐州表其略曰一軍暴卒盡可翦除五縣愚民各宜配􅀠又作詔書依其所請傳布境内徐人信之皆歸怨朝廷曰㣲桂州將士回戈吾徒悉為魚肉矣劉行及引兵至渦口道路附從者増倍濠州兵纔數百刺史盧望回素不設備不知所為乃開門具牛酒迎之行及入城囚望回自行刺史事泗州刺史杜慆聞勛作亂完守備以待之且求救於江淮李圎遣精卒百人先入泗州封府庫慆遣人迎勞誘之入城悉誅之明日圎至即引兵圍城城上矢石雨下賊死者數百乃歛兵屯城西勛以泗州當江淮之衝益􅀤兵助圎攻之衆至萬餘終不能克初朝廷聞龐勛自任山還趣宿州遣髙品康道偉齎敕書撫慰之十一月道偉至彭城勛出郊迎自任山至子城三十里大陳甲兵號令金鼓響震山谷城中丁壯悉驅使乘城宴道偉於毬􅂣使人詐爲羣盜降者數千人諸寨告捷者數十輩復作求節􅃏表附道偉以聞􅀄辛雲京之孫讜寓居廣陵喜任俠年五十不仕與杜慆有舊聞龐勛作亂詣泗州勸慆挈家避之慆曰安平享其禄位危難棄其城池吾不爲也且人各有家誰不愛之我獨求生何以安衆誓與將士共死此城耳讜曰公能如是僕與公同死乃還廣陵與其家訣壬辰復如泗州時民避亂扶老􅂝㓜塞塗而來見讜皆止之曰人皆南走子獨北行取死何爲讜不應至泗州賊已至城下讜急棹小舟得入慆即署團練判官城中危懼都押牙李雅有勇略爲慆設守僃帥衆鼔譟四出擊賊賊退屯徐城衆心稍安龐勛募人為兵人利於剽掠爭赴之至父遣其子妻勉其夫皆斷鉏首而鋭之執以應募鄰道聞勛據徐州各遣兵戍守要害而官軍尚少賊衆日滋官軍數不利賊遂破魚䑓等近十縣宋州東有磨山民逃匿其上勛遣其將張􅀇稔圍之㑹旱山泉竭數萬口皆渴死或説勛曰留後止欲求節􅃏當恭順盡禮以事天子外戢士卒内撫百姓庶㡬可得勛雖不能用然國忌猶行香饗士卒必先西向拜謝癸卯勛聞敕使入境以為必賜旌節衆皆賀明日敕使至但責崔彦曾及監軍張道謹貶其官勛大失望遂囚敕使不聽歸詔以右金吾大將軍康承訓為義成節度使徐州行營都招討使神武大將軍王晏權為徐州北靣行營招討使羽林將軍戴可師為徐州南面行營招討使大􅀤諸道兵以􅀠三帥承訓奏乞沙陀三部落使朱邪赤心及吐谷渾達靼契苾酋長各帥其衆以自隨詔許之龐勛以李圎攻泗州乆不克遣其將吳逈代之丙午復進攻泗州晝夜不息時敕使郭厚本將淮南兵千五百人救泗州至洪澤畏賊彊不敢進辛讜請徃求救杜慆許之丁未夜乘小舟潜度淮至洪澤説厚本厚本不聽比明復還己酉賊攻城益急欲焚水門城中㡬不能禦讜請復徃求救慆曰前徃徒還今徃何益讜曰此行得兵則生返不得則死之慆與之泣别讜復乘小舟負戸突圍出見厚本為陳利害厚本將從之淮南都將袁公弁曰賊􅀔如此自保恐不足何暇救人讜拔劒瞋目謂公弁曰賊百道攻城陷在朝夕公受詔救援而逗留不進豈惟上負國恩若泗州不守則淮南遂為寇埸公詎能獨存邪我當殺公而後死耳起欲擊之厚本趨抱止之公弁僅免讜乃回望泗州慟哭終日士卒皆為之流涕厚本乃許分五百人與之仍問將士將士皆願行讜舉身自擲叩頭以謝將士遂帥之抵淮南岸望賊方攻城有軍吏言曰賊􅀔已似入城還去則便讜逐之攬得其髻舉劒擊之士卒共救之曰千五百人判官不可殺也讜曰臨陳妄言惑衆必不可捨衆請不能得乃共奪之讜素多力衆不能奪讜曰將士但登舟我則捨此人衆競登舟乃捨之士卒有回顧者則斫之驅至淮比勒兵擊賊陷於城上布兵與之相應賊遂敗走鼓譟逐之至晡而還龐勛遣其將劉佶將精兵數千助吳迴攻泗州劉行及自濠州遣其將王􅀪立引兵㑹之戊午鎮海節度使杜審權遣都頭翟行約將四千人救泗州己未行約引兵至泗州賊逆擊於淮南圍之城中兵少不能救行約及士卒盡死先是令狐綯遣李湘將兵數千救泗州與郭厚本袁公弁合兵屯都梁城與泗州隔淮相望賊既破翟行約乘勝遂圍之十二月甲子李湘等引兵出戰大敗賊遂陷都梁城執湘及郭厚本送徐州據淮口漕驛路絶康承訓軍於新興賊將姚周屯柳子出兵拒之時諸道兵集者纔萬人承訓以衆寡不敵退屯宋州龐勛以為官軍不足畏乃分遣其將丁從實等各將數千人南寇舒盧北侵沂海破沐陽下蔡烏江巢縣攻陷滁州殺刺史髙錫望又寇和州刺史崔雍遣人以牛酒犒之引賊登樓共飲命軍士皆釋甲指所愛二人為子弟乞全之其餘惟賊所處賊遂大掠城中殺士卒八百餘人泗州援兵既絶糧且盡人食薄粥閏月己亥辛讜言於杜慆請出求救於淮浙夜帥敢死士十人執長柯斧乘小舟潜徃斫賊水寨而出明旦賊乃覺之以五舟遮其前以五千人夾岸追之賊舟重行遲讜舟輕行疾力鬭三十餘里乃得免癸卯至楊州見令狐綯甲辰至潤州見杜審權時泗州乆無聲問或傳已陷讜既至審權乃遣押牙趙翼將甲士二千人與淮南共輸米五千斛鹽五百斛以救泗州戴可師將兵三萬渡淮轉戰而前賊盡棄淮南之守可師欲先奪淮口後救泗州壬申圍都梁城城中賊少拜於城上曰方與都頭議出降可師為之退五里賊夜遁明旦惟空城可師恃勝不設備是日大霧賊將王􅀪立引兵數萬疾徑奄至縱擊官軍官軍不及成列遂大敗將士觸兵及溺淮死得免者纔數百人亡器械資糧車馬以萬計賊傳可師及監軍將校首於彭城龐勛自謂無敵於天下作露布散示諸寨及鄉村於是淮南士民震恐徃徃避地江左令狐綯畏其侵軼遣使詣勛説諭許為之請節􅃏勛乃息兵俟命由是淮南稍得收散卒修守備時汴路既絶江淮徃來者皆出壽州賊既破戴可師乘勝圍壽州掠諸道貢獻及商人貨其路復絶勛益自驕日事遊宴周重諫曰自古驕滿奢逸得而復失成而復敗多矣况未得未成而為之者乎諸道兵大集於宋州徐州始懼應募者益少而諸寨求益兵者相繼勛乃使其黨散入鄉村驅人為兵又見兵已及數萬人資糧匱竭乃歛富室及商旅財什取其七八坐匿財夷宗者數百家又與勛同舉兵於桂州者尤驕暴奪人資財掠人婦女勛不能制由是境内之民皆厭苦之不聊生矣王晏權兵數退衂朝廷命泰寧節度使曹翔代晏權為徐州北面招討使前天雄節度使何全皥遣其將薛尤將兵萬三千人討龐勛翔軍於滕沛尤軍於豐蕭是歳江淮旱蝗十年春正月康承訓將諸道軍七萬餘人屯柳子之西自新興至鹿塘三十里壁壘相屬徐兵分戍四境城中不及數千人龐勛始懼民多穴地匿其中勛遣人搜掘為兵日不過得三二十人勛將孟敬文守豐縣狡悍而兵多謀貳於勛自為符䜟勛聞之㑹魏博攻豐勛遣腹心將將三千助敬文守豐敬文與之約共擊魏博軍且譽其勇使為前鋒新軍既與魏博戰敬文引兵退走新軍盡􅃿勛乃遣使紿之曰王弘立已克淮南留後欲自往鎮之悉召諸將欲選一人可守徐州者敬文喜即馳詣彭城未至城數里勛伏兵擒之辛酉殺之丁卯同昌公主適右拾遺韋保衡以保衡爲起居郎駙馬都尉公主郭淑妃之女上特愛之傾宫中珍玩以爲資送賜第於廣化里䆫户皆飾以雜寳井欄藥臼槽匱亦以金銀爲之編金縷爲箕筐賜錢五百萬緡它物稱是徐賊冦海州時諸道兵戍海州者已數千人斷賊所過橋柱而弗殊仍伏兵要害以待之賊過橋崩蒼黄散亂伏兵發盡殪之其攻壽州者復爲南道軍所破斬獲數千人辛讜以浙西之軍至楚州敕使張存誠以舟助之徐賊水陸布兵鎻斷淮流浙西軍憚其彊不敢進讜曰我請為前鋒勝則繼之敗則汝走猶不可讜乃募選軍中敢死士數十人牒補職名先以米舟三艘鹽舟一艘乘風逆流直進賊夾攻之矢著舟板如急雨及鎻讜帥衆死戰斧斷其鎻乃得過城上人喧呼動地杜慆及將佐皆泣迎之乙酉城上望見舟師張帆自東來識其旗浙西軍也去城十餘里賊列火船拒之帆止不進慆令讜帥死士出迎之乘戰艦衝賊陳而過見張存誠帥米舟九艘曰將士在道前却存誠屢欲自殺僅得至此今又不進讜􅀭言賊不多甚易與耳帥衆􅀭旗鼓譟而前賊見其􅀔猛鋭避之遂得入城二月端州司馬楊收長流驩州尋賜死其僚屬黨友坐長流嶺表者十餘人初尚書右丞裴坦子娶收女資送甚盛器用飾以犀玉坦見之怒曰破我家矣立命壞之已而收竟以賄敗康承訓使朱邪赤心將沙陀三千騎為前鋒陷陳却敵十鎮之兵伏其驍勇承訓嘗引麾下千人濟渙水賊伏兵圍之赤心帥五百騎奮檛衝圍拔出承訓賊􅀔披靡因合擊敗之承訓數與賊戰賊軍屢敗王􅀪立自矜淮口之捷請獨將所部三萬人破承訓龐勛許之己亥􅀪立引兵度濉水夜襲鹿塘寨黎明圍之􅀪立與諸將臨望自謂功在漏刻沙陀左右突圍出入如飛賊紛擾移避沙陀縱騎蹂之寨中諸軍爭出奮擊賊大敗官軍蹙之於濉水溺死者不可勝紀自鹿塘至襄城伏尸五十里斬首二萬餘級􅀪立單騎走免所驅掠平民皆散走山谷不復還營委弃資糧器械山積時有敕諸軍破賊得農民皆釋之自是賊毎與官軍遇其驅掠之民先自潰龐勛許佶以􅀪立驕惰致敗欲斬之周重為之説勛曰􅀪立再勝未賞一敗而誅之弃功録過為敵報讎諸將咸懼矣不若赦之責其後効勛乃釋之􅀪立收散卒纔得數百人請取泗州以補過勛益其兵而遣之三月辛未以起居郎韋保衡為左諫議大夫充翰林學士徙郢王侃為威王康承訓既破王􅀪立進逼柳子與姚周一月之閒數十戰丁亥周引兵度水官軍急擊之周退走官軍逐之遂圍柳子㑹大風四面縱火賊弃寨走沙陀以精騎邀之屠殺殆盡自柳子至芳城死者相枕斬其將劉豐周將麾下數十人奔宿州宿州守將梁丕素與之有隙開城聽入執而斬之龐勛聞之大懼與許佶議自將出戰周重泣言於勛曰柳子地要兵精姚周勇敢有謀今一旦覆沒危如累卵不若遂建大號悉兵四出決死力戰又勸殺崔彦曾以絶人望術士曹君長亦言徐州山川不容兩帥今觀察使尚在故留後未興賊黨皆以為然夏四月壬辰勛殺彦曾及監軍張道謹宣慰使仇大夫僚佐焦璐温庭皓等并其親屬賓客僕妾皆死斷淮南監軍郭厚本都押衙李湘手足以示康承訓軍勛乃集衆􅀭言曰勛始望國恩庶全臣節今日之事前志已乖自此勛與諸君真反者也當掃境内之兵戮力同心轉敗為功耳衆皆稱善於是命城中男子悉集毬􅂣仍分遣諸將比屋大索敢匿一男子者族其家選丁壯得三萬人更造旗幟給以精兵許佶等共推勛為天冊將軍大㑹明王勛辭王爵先是辛讜復自泗州引驍勇四百人迎糧於楊潤賊夾岸攻之轉戰百里乃得出至廣陵止于公館不敢歸家舟載鹽米二萬石錢萬三千緡乙未還至斗山賊將王􅀪芝帥衆萬餘拒之於盱眙密布戰艦百五十艘以塞淮流又縱火船逆之讜命以長义托過自卯戰及未衆寡不敵官軍不利賊縛木於戰艦旁出四五尺爲戰棚讜命勇士乘小舟入其下矢刃所不能及以槍揭火牛焚之戰艦既然賊皆潰走官軍乃得過入城龐勛以父舉直爲大司馬與許佶等留守徐州或曰將軍方耀兵威不可以父子之親失上下之節乃令舉直趨拜於庭勛據桉而受之時魏博屢圍豐縣龐勛欲先擊之丙申引兵􅀤徐州戊戌以前淮南節度使同平章事令狐綯爲太保分司龐勛夜至豐縣潜入城魏博軍皆不之知魏博分爲五寨其近城者屯數千人勛縱兵圍之諸寨救之勛伏兵要路殺官軍二千人餘皆返走賊攻寨不克至夜解圍去官軍畏其衆且聞勛自來諸寨皆宵潰曹翔方圍滕縣聞魏博敗引兵退保兖州賊悉毁其城栅運其資糧傳檄徐州盛自誇大謂官軍為國賊云馬舉將精兵三萬救泗州乙巳分軍三道度淮至中流大譟聲聞數里賊大驚不測衆寡歛兵屯城西寨舉就圍之縱火焚栅賊衆大敗斬首數千級王􅀪立死吳迥退保徐城泗州之圍始解泗州被圍凡七月守城者不得寐面目皆生瘡龐勛留豐縣數日欲引兵西擊康承訓或曰天時向暑蠶麥方急不若且休兵聚食然後圖之或曰將軍出師數日摧七萬之衆西軍震恐乘此聲􅀔彼破走必矣時不可失龐舉直以書勸勛乘勝進軍勛意遂決丁未􅀤豐縣庚戌至蕭約襄城留武小睢諸寨兵合五六萬人以二十九日遲明攻柳子淮南敗卒在賊中者逃詣康承訓告以其期承訓得先為之備秣馬整衆設伏以待之丙辰襄城等兵先至柳子遇伏敗走龐勛既自失期遽引兵自三十里外赴之比至諸寨已敗勛所將皆市井白徒覩官軍勢盛皆不戰而潰承訓命諸將急追之以騎兵邀其前歩卒蹙其後賊狼狽不知所之自相蹈藉僵尸數十里死者數萬人勛解甲服布襦而遁收散卒纔及三千人歸彭城使其將張實分諸寨兵屯第城驛勛初起下邳土豪鄭鎰聚衆三千自備資糧器械以應之勛以為將謂之義軍五月沂州遣軍圍下邳勛命鎰救之鎰帥所部來降六月陜民作亂逐觀察使崔蕘蕘以器韻自矜不親政事民訴旱蕘指庭樹曰此尚有葉何旱之有杖之民怒故逐之蕘逃於民舍渴求飲民以溺飲之坐貶昭州司馬以中書侍郎同平章事徐商同平章事充荆南節度使癸卯以翰林學士承㫖戸部侍郎劉瞻同平章事瞻桂州人也馬舉自泗州引兵攻濠州拔招義鍾離定逺劉行及設寨於城外以拒守舉先遣輕騎挑戰賊見其衆少爭出寨西擊之舉引大軍數萬自它道擊其東南遂焚其寨賊入固守舉塹其三面而圍之北面臨淮賊猶得與徐州通龐勛遣吳迴助行及守濠州屯兵北津以相應舉遣别將度淮擊之斬獲數千人平其寨曹翔之退屯兖州也留滄州卒四千人戍魯橋卒擅還翔曰以龐勛作亂故討之今滄卒不從約束是自亂也勒兵迎之圍於兖州城外擇違命者二千人悉誅之朝廷聞魏博軍敗以將軍宋威為徐州西北面招討使將兵三萬屯於豐蕭之間翔復引兵㑹之秋七月康承訓克臨渙殺獲萬人遂拔襄城留武小睢等寨曹翔拔滕縣進擊豐沛賊諸寨戍兵多相帥逃匿保據山林賊抄掠者過之輙為所殺而五八村尤甚有陳全裕者為之帥凡叛勛者皆歸之衆至數千人戰守之具皆備環地數千里賊莫敢近康承訓遣人招之遂舉衆來降賊黨益離蘄縣士豪李衮殺賊守將舉城降於承訓沛縣守將李直詣彭城計事裨將朱玫舉城降於曹翔直自彭城還玫逆擊走之翔發兵戍沛玫邠州人也勛遣其將孫章許佶各將數千人攻陳全裕朱玫皆不克而還康承訓乘勝長驅拔第城進抵宿州之西築城而守之龐勛憂懣不知所為但禱神飯僧而已初龐勛怒梁丕專殺姚周黜之使徐州舊將張􅀇稔代之治州事以其黨張儒張實等將城中兵數萬拒官軍儒等列寨數重於城外環水自固康承訓圍之張實夜遣人潜出以書白勛曰今國兵盡在城下西方必虚將軍冝引兵出其不意掠宋亳之郊彼必解圍而西將軍設伏要害迎擊其前實等出城中兵蹙其後破之必矣時曹翔使朱玫擊豐破之乘勝攻徐城下邳皆拔之斬獲萬計勛方憂懼欲走得實書即從其策使龐舉直許佶守徐州引兵而西八月壬子康承訓焚外寨張儒等入保羅城官軍攻之死者數千人不能克承訓患之遣辯士於城下招諭之張􅀇稔甞戍邊有功雖脅從於賊心甞憂憤時將所部兵守子城夜召所親數十人謀歸國因稍令布諭恊同者衆乃遣腹心張臯夜出以狀白承訓約期殺賊將舉城降至日請立青旌為應使衆心無疑承訓大喜從之九月丁巳張儒等飲酒於柳溪亭􅀇稔使部將董厚等勒兵於亭西􅀇稔先躍馬而前大呼曰龐勛已梟首於僕射寨中此輩何得尚存士卒競進遂斬張儒等數十人城中大擾􅀇稔諭以歸國之計及暮而定戊午開門出降􅀇稔見承訓肉袒􅂰行涕泣謝罪承訓慰勞即宣敕拜御史中丞賜遺甚厚􅀇稔復進言今舉城歸國四逺未知請詐為城陷引衆趨苻離及徐州賊黨不疑可盡擒也承訓許之宿州舊兵三萬承訓益以數百騎皆賞勞而遣之􅀇稔復入城暮􅀤平安火如常日己未向晨􅀇稔積薪數千束縱火焚之如城陷軍潰之狀直趨苻離苻離納之既入斬其守將號令城中皆聽命收其兵復得萬人北趨徐州龐舉直許佶聞之嬰城拒守辛酉􅀇稔至彭城引兵圍之桉兵未攻先諭城上人曰朝廷唯誅逆黨不傷良人汝曹奈何為賊城守若尚狐疑須臾之閒同為魚肉矣於是守城者稍稍弃甲投兵而下崔彦曾故吏路審中開門納官軍龎舉直許佶帥其黨保子城日昃賊黨自北門出􅀇稔遣兵追之斬舉直佶首餘黨多赴水死悉捕戍桂州者親族斬之死者數千人徐州遂平龐勛將兵二萬自石山西出所過焚掠無遺庚申承訓始知之引歩騎八萬西擊之使朱邪赤心將數千騎為前鋒勛襲宋州陷其南城刺史鄭處沖守其北城賊知有備捨去度汴南掠亳州沙陀追及之勛引兵循渙水而東將歸彭城為沙陀所逼不暇飲食至蘄將濟水李衮􅀤橋勒兵拒之賊惶惑不知所之至縣西官軍大集縱擊殺賊近萬人餘皆溺死降者纔及千人勛亦死而人莫之識數日乃獲其尸賊宿遷等諸寨皆殺其守將而降宋威亦取蕭縣吳迥獨守濠州不下冬十月以張􅀇稔為右驍衛大將軍御史大夫馬舉攻濠州自夏及冬不克城中糧盡殺人而食之守軍深塹重圍以守之辛丑夜吳逈突圍走舉勒兵追之殺獲殆盡迥死於招義以康承訓為河東節度使同平章事以杜慆為義成節度使上嘉朱邪赤心之功置大同軍於雲州以赤心為節度使召見留為左金吾上將軍賜姓名李國昌賞賚甚厚以辛讜為亳州刺史讜在泗州犯圍出迎兵糧徃返凡十二及除亳州上表言臣之功非杜惂不能成也賜和州刺史崔雍自盡家屬流康州兄弟五人皆逺貶上荒宴不親庶政委任路巖巖奢靡頗通賂遺左右用事至徳令陳蟠叟因上書召對言請破邊咸一家可贍軍二年上問咸為誰對曰路巖親吏上怒流蟠叟於愛州自是無敢言者初南詔遣使者楊酋慶來謝釋董成之囚定邊節度使李師望欲激怒南詔以求功遂殺酋慶西川大將恨師望分裂巡屬隂遣人致意南詔使入冦師望貪殘聚私貨以百萬計戍卒怨怒欲生食之師望以計免朝廷徵還以太府少卿竇滂代之滂貪殘又甚於師望故蠻冦未至而定邊固已困矣是月南詔驃信酋龍傾國入冦引數萬衆擊董舂烏部破之十一月蠻進冦嶲州定邊都頭安再榮守清溪闗蠻攻之再榮退屯大渡河比與之隔水相射九日八夜蠻密分軍伐木開道逾雪坡奄至沐源川滂遣兖海將黄卓帥五百人拒之舉軍覆沒十二月丁酉蠻衣兖海之衣詐為敗卒至江岸呼船已濟衆乃覺之遂陷犍為縱兵焚掠陵榮二州之境後數日蠻軍大集於陵雲寺與嘉州對岸刺史揚忞與定邊監軍張允瓊勒兵拒之蠻潜遣竒兵自東津濟夾擊官軍殺忠武都將顔慶師餘衆皆潰忞允瓊脱身走壬子陷嘉州慶師慶復之弟也竇滂自將兵拒蠻於大渡河驃信詐遣清平官數人詣滂約和滂與語未畢蠻乘船栰爭度忠武徐宿兩軍結陳抗之滂懼自經於帳中徐州將苖全緒解之曰都統何至於是全緒與安再榮及忠武將勒兵出戰滂遂單騎宵遁三將謀曰今衆寡不敵明旦復戰吾屬盡矣不若乘夜攻之使之驚亂然後解去於是夜入蠻軍弓弩亂􅀤蠻大驚三將乃全軍引去蠻遂進陷黎雅民竄匿山谷敗軍所在焚掠滂奔導江邛州軍資儲偫皆散於亂兵之手蠻至城已空通行無礙矣詔左神武將軍顔慶復將兵赴援資治通鑑巻第二百五十一
