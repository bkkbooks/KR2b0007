body:
  text: 臣司馬光奉勑編集唐紀九光單閼凡三年有竒起著雍困敦九月盡重太宗文武大聖大廣孝皇帝上之中貞觀二年九月丙午初令致仕官位在本品之上上曰比見羣臣屢上表賀祥瑞夫家給人足而無瑞不害爲堯舜百姓愁怨而多瑞不害爲桀紂後魏之世吏焚連理木煑白雉而食之豈足爲至治乎丁未詔自今大瑞聽表聞自外諸瑞申所司而已嘗有白鵲構巢於寢殿槐上合歡如腰鼓左右稱賀上曰我常笑隋􅌆帝好祥瑞瑞在得賢此何足賀命毁其巢縱鵲於野外天少雨中書舍人李百藥上言往年雖出宫人竊聞太上皇宫及掖庭宫人無用者尚多豈惟虚費衣食且隂氣鬱積亦足致旱上曰婦人幽閉深宫誠為可愍灑掃之餘亦何所用宜皆出之任求伉儷於是遣尚書左丞戴胄給事中洹水杜正倫於掖庭西門簡出之前後所出三千餘人己未突厥寇邊朝臣或請修古長城發民乘堡障上曰突厥災異相仍頡利不懼而修德暴虐滋甚骨肉相攻亡在朝夕朕方為公掃清沙漠安用勞民逺修鄣塞乎壬申以前司農卿竇靜為夏州都督靜在司農少卿趙元楷善聚歛靜鄙之對官屬大言曰隋煬帝奢侈重歛司農非公不可今天子節儉愛民公何所用哉元楷大慙上問王珪曰近世為國者益不及前古何也對曰漢世尚儒術宰相多用經術士故風俗淳厚近世重文輕儒參以法律此治化之所以益衰也上然之冬十月御史大夫參預朝政安吉襄公杜淹薨交州都督遂安公壽以貪得罪上以瀛州刺史盧祖尚才兼文武廉平公直徵入朝諭以交趾久不得人須卿鎮撫祖尚拜謝而出既而悔之辭以舊疾上遣杜如晦等諭㫖曰匹夫猶敦然諾柰何既許朕而復悔之祖尚固辭戊子上復引見諭之祖尚固執不可上大怒曰我使人不行何以為政命斬於朝堂尋悔之它日與侍臣論齊文宣帝何如人魏徵對曰文宣狂暴然人與之爭事理屈則從之有前青州長史魏愷使於梁還除光州長史不肯行楊遵彦奏之文宣怒召而責之愷曰臣先任大州長史使還有勞無過更得小州此臣所以不行也文宣顧謂遵彦曰其言有理卿赦之此其所長也上曰然曏者盧祖尚雖失人臣之義朕殺之亦為太暴由此言之不如文宣矣命復其官蔭徵狀貌不逾中人而有膽畧善囘人主意毎犯顔苦諫或逢上怒甚徵神色不移上亦為之霽威嘗謁告上冢還言於上曰人言陛下欲幸南山外皆嚴裝已畢而竟不行何也上笑曰初實有此心畏卿嗔故中輟耳上嘗得佳鷂自臂之望見徵來匿懐中徵奏事固久不已鷂竟死懷中十一月辛酉上祀圜丘十二月壬午以黄門侍郎王珪為守侍中上嘗間居與珪語有美人侍側上指示珪曰此廬江王瑗之姬也瑗殺其夫而納之珪避席曰陛下以廬江納之為是邪非邪上曰殺人而取其妻卿何問是非對曰昔齊桓公知郭公之所以亡由善善而不能用然弃其所言之人管仲以為無異於郭公今此美人尚在左右臣以為聖心是之也上悅即出之還其親族上使太常少卿祖孝孫教宫人音樂不稱㫖上責之温彦博王珪諫曰孝孫雅士今乃使之教宫人又從而譴之臣竊以為不可上怒曰朕寘卿等於腹心當竭忠直以事我乃附下罔上為孝孫遊說邪彦愽拜謝珪不拜曰陛下責臣以忠直今臣所言豈私曲邪此乃陛下負臣非臣負陛下上黙然而罷明日上謂房􅀇齡曰自古帝王納諫誠難朕昨責温彦􅀶王珪至今悔之公等勿為此不盡言也上曰為朕養民者唯在都督刺史朕常疏其名於屏風坐卧觀之得其在官善惡之跡皆注於名下以備黜陟縣令尤為親民不可不擇乃命内外五品已上各舉堪為縣令者以名聞上曰比有奴告其主反者此弊事夫謀反不能獨為必與人共之何患不發何必使奴告邪自今有奴告主者皆勿受仍斬之西突厥統葉䕶可汗為其伯父所殺伯父自立是為莫賀咄侯屈利俟毗可汗國人不服弩失畢部推泥孰莫賀設為可汗泥孰不可統葉䕶之子咥力特勒避莫賀咄之禍亡在康居泥孰迎而立之是為乙毗鉢羅肆葉䕶可汗與莫賀咄相攻連兵不息俱遣使來請昏上不許曰汝國方亂君臣未定何得言昏且諭以各守部分勿復相攻於是西域諸國及敕勒先役屬西突厥者皆叛之突厥北邊諸姓多叛頡利可汗歸薛延陀共推其俟斤夷男為可汗夷男不敢當上方圖頡利遣遊擊將軍喬師望閒道齎册書拜夷男為真珠毗伽可汗賜以鼓纛夷男大喜遣使入貢建牙於大漠之鬱督軍山下東至靺鞨西至西突厥南接沙磧北至俱倫水迴紇拔野古阿跌同羅僕骨霫諸部落皆屬焉三年春正月戊午上祀太廟癸亥耕藉於東郊沙門法雅坐妖言誅司空裴寂嘗聞其言辛未寂坐免官遣還鄉里寂請留京師上數之曰計公勲庸安得至此直以恩澤為羣臣第一武德之際貨賂公行紀綱紊亂皆公之由也但以故舊不忍盡法得歸守墳墓幸已多矣寂遂歸蒲州未幾又坐狂人信行言寂有天命寂不以聞當死流靜州㑹山羌作亂或言刼寂為主上曰寂當死我生之必不然也俄聞寂帥家僮破賊上思其佐命之功徵入朝㑹卒二月戊寅以房􅀇齡為左僕射杜如晦為右僕射以尚書右丞魏徵守祕書監參預朝政三月己酉上錄繫囚有劉恭者頸有勝文自云當勝天下坐是繫獄上曰若天將興之非朕所能除若無天命勝文何為乃釋之丁巳上謂房􅀇齡杜如晦曰公為僕射當廣求賢人隨才授任此宰相之職也比聞聽受辭訟日不暇給安能助朕求賢乎因敕尚書細務屬左右丞唯大事應奏者乃關僕射􅀇齡明達政事輔以文學夙夜盡心惟恐一物失所用法寛平聞人有善若己有之不以求備取人不以己長格物與杜如晦引拔士類常如不及至於臺閣規模皆二人所定上毎與􅀇齡謀事必曰非如晦不能决及如晦至卒用􅀇齡之策蓋􅀇齡善謀如晦能斷故也二人深相得同心徇國故唐世稱賢相者推房杜焉玄齡雖䝉寵待或以事被譴輒累日詣朝堂稽顙請罪恐懼若無所容玄齡監修國史上語之曰比見漢書載子虚上林賦浮華無用其上書論事詞理切直者朕從與不從皆當載之夏四月乙亥上皇徙居弘義宫更名大安宫甲午上始御太極殿謂侍臣曰中書門下機要之司詔敕有不便者皆應論執比來唯睹順從不聞違異若但行文書則誰不可爲何必擇才也房玄齡等皆頓首謝故事凡軍國大事則中書舍人各執所見雜署其名謂之五花判事中書侍郎中書令省審之給事中黄門侍郎駮正之上始申明舊制由是鮮有敗事茌平人馬周客遊長安舍於中郎將常何之家六月壬午以旱詔文武官極言得失何武人不學不知所言周代之陳便宜二十餘條上恠其能以問何對曰此非臣所能家客馬周為臣具草耳上即召之未至遣使督促者數輩及謁見與語甚恱令直門下省尋除監察御史奉使稱旨上以常何為知人賜絹三百匹秋八月己巳朔日有食之丙子薛延陁毗伽可汗遣其弟統特勒入貢上賜以寶刀及寶鞭謂曰卿所部有大罪者斬之小罪者鞭之夷男甚喜突厥頡利可汗大懼始遣使稱臣請尚公主修壻禮代州都督張公謹上言突厥可取之狀以為頡利縱欲逞暴誅忠良暱姦佞一也薛延陀等諸部皆叛二也突利拓設欲谷設皆得罪無所自容三也塞北霜旱糇糧乏絶四也頡利疏其族類親委諸胡胡人反覆大軍一臨必生内變五也華人入北其衆甚多比聞所在嘯聚保據山險大軍出塞自然響應六也上以頡利可汗既請和親復援梁師都丁亥命兵部尚書李靖為行軍揔管討之以張公謹為副九月丙午突厥俟斤九人帥三千騎來降戊午拔野古僕骨同羅奚酋長並帥衆來降冬十一月辛丑突厥寇河西肅州刺史公孫武達甘州刺史成仁重與戰破之捕虜千餘口上遣使至涼州都督李大亮有佳鷹使者諷大亮使獻之大亮宻表曰陛下久絶畋遊而使者求鷹若陛下之意深乖昔旨如其自擅乃是使非其人癸卯上謂侍臣曰李大亮可謂忠直手詔褒美賜以胡缾及荀悅漢紀庚申以行并州都督李世勣為通漢道行軍揔管兵部尚書李靖為定襄道行軍揔管華州刺史柴紹為金河道行軍揔管靈州大都督薛萬徹為暢武道行軍揔管衆合十餘萬皆受李靖節度分道出擊突厥乙丑任城王道宗擊突厥於靈州破之十二月戊辰突利可汗入朝上謂侍臣曰往者太上皇以百姓之故稱臣於突厥朕常痛心今單于稽顙庶幾可雪前恥壬午靺鞨遣使入貢上曰靺鞨逺來蓋突厥已服之故也昔人謂禦戎無上策朕今治安中國而四夷自服豈非上策乎癸未右僕射杜如晦以疾遜位上許之乙酉上問給事中孔頴達曰論語以能問於不能以多問於寡有若無實若虚何謂也頴達具釋其義以對且曰非獨匹夫如是帝王亦然帝王内藴神明外當􅀇默故易稱以䝉養正以明夷莅衆若位居尊極􅋑耀聰明以才陵人飾非拒諫則下情不通取亡之道也上深善其言庚寅突厥郁射設帥所部來降閏月丁未東謝酋長謝元深南謝酋長謝强來朝諸謝皆南蠻别種在黔州之西詔以東謝為應州南謝為莊州􅀠黔州都督是時逺方諸國來朝貢者甚衆服裝詭異中書侍郎顔師古請圖寫以示後作王㑹圖從之乙丑牂柯酋長謝能羽及充州蠻入貢詔以牂柯為牂州党項酋長細封步賴來降以其地為軌州各以其酋長為刺史党項地亘三千里姓别為部不相統壹細封氏費聽氏往利氏頗超氏野辭氏旁當氏米擒氏拓跋氏皆大姓也步賴既為唐所禮餘部相繼來降以其地為崌奉巖逺四州是歲戸部奏中國人自塞外歸及四夷前後降附者男女一百二十餘萬口房􅀇齡王珪掌内外官考治書侍御史萬年權萬紀奏其不平上命侯君集推之魏徵諫曰􅀇齡珪皆朝廷舊臣素以忠直爲陛下所委所考旣多其間能無一二人不當察其情終非阿私若推得其事則皆不可信豈得復當重任且萬紀比來恒在考堂曾無駮正及身不得考乃始陳論此正欲激陛下之怒非竭誠徇國也使推之得實未足裨益朝廷若其本虚徒失陛下委任大臣之意臣所愛者治體非敢茍私二臣上乃釋不問濮州刺史龎相壽坐貪汚解任自陳嘗在秦王幕府上憐之欲聽還舊任魏徵諫曰秦王左右中外甚多恐人人皆恃恩私足使為善者懼上欣然納之謂相壽曰我昔為秦王乃一府之主今居大位乃四海之主不得獨私故人大臣所執如是朕何敢違賜帛遣之相壽流涕而去四年春正月李靖帥驍騎三千自馬邑進屯惡陽嶺夜襲定襄破之突厥頡利可汗不意靖猝至大驚曰唐不傾國而來靖何敢孤軍至此其衆一日數驚乃徙牙於磧口靖復遣諜離其心腹頡利所親康蘇宻以隋蕭后及煬帝之孫政道來降乙亥至京師先是有降胡言中國人或潛通書啟於蕭后者至是中書舍人楊文瓘請鞫之上曰天下未定突厥方彊愚民無知或有斯事今天下已安既往之罪何須問也李世勣出雲中與突厥戰於白道大破之二月己亥上幸驪山温湯甲辰李靖破突厥頡利可汗於陰山先是頡利既敗竄于鐡山餘衆尚數萬遣執失思力入見謝罪請舉國内附身自入朝上遣鴻臚卿唐儉等慰撫之又詔李靖將兵迎頡利頡利外為卑辭内實猶豫欲俟草青馬肥亡入漠北靖引兵與李世勣㑹白道相與謀曰頡利雖敗其衆猶盛若走渡磧北保依九姓道阻且逺追之難及今詔使至彼虜必自寛若選精騎一萬齎二十日糧往襲之不戰可擒矣以其謀告張公謹公謹曰詔書已許其降使者在彼柰何擊之靖曰此韓信所以破齊也唐儉輩何足惜遂勒兵夜發世勣繼之軍至隂山遇突厥千餘帳俘以隨軍頡利見使者大喜意自安靖使武邑蘇定方帥二百騎爲前鋒乘霧而行去牙帳七里虜乃覺之頡利乘千里馬先走靖軍至虜衆遂潰唐儉脫身得歸靖斬首萬餘級俘男女十餘萬獲雜畜數十萬殺隋義成公主擒其子疊羅施頡利帥萬餘人欲度磧李世勣軍於磧口頡利至不得度其大酋長皆帥衆降世勣虜五萬餘口而還斥地自陰山北至大漠露布以聞丙午上還宫甲寅以克突厥赦天下以御史大夫温彦博為中書令守侍中王珪為侍中守戸部尚書戴胄為戸部尚書參預朝政太常少卿蕭瑀為御史大夫與宰臣參議朝政三月戊辰以突厥夾畢特勒阿史那思摩為右武候大將軍四夷君長詣闕請上為天可汗上曰我為大唐天子又下行可汗事乎羣臣及四夷皆稱萬歲是後以璽書賜西北君長皆稱天可汗庚午突厥思結俟斤帥衆四萬來降丙子以突利可汗為右衛大將軍北平郡王初始畢可汗以啟民母弟蘇尼失為沙鉢羅設督部落五萬家牙直靈州西北及頡利政亂蘇尼失所部獨不攜貳突利之來奔也頡利立之為小可汗及頡利敗走往依之將奔吐谷渾大同道行軍揔管任城王道宗引兵逼之使蘇尼失執送頡利頡利以數騎夜走匿于荒谷蘇尼失懼馳追獲之庚辰行軍副揔管張寶相帥衆奄至沙鉢羅營俘頡利送京師蘇尼失舉衆來降漠南之地遂空蔡成公杜如晦疾篤上遣太子問疾又自臨視之甲申薨上毎得佳物輒思如晦遣使賜其家久之語及如晦必流涕謂房􅀇齡曰公與如晦同佐朕今獨見公不見如晦矣突厥頡利可汗至長安夏四月戊戌上御順天樓盛陳文物引見頡利數之曰汝藉父兄之業縱滛虐以取亡罪一也數與我盟而背之二也恃彊好戰暴骨如莽三也蹂我稼穡掠我子女四也我宥汝罪存汝社稷而遷延不來五也然自便橋以來不復大入為寇以是得不死耳頡利哭謝而退詔館於太僕厚廩食之上皇聞擒頡利歎曰漢髙祖困白登不能報今我子能滅突厥吾託付得人復何憂哉上皇召上與貴臣十餘人及諸王妃主置酒凌煙閣酒酣上皇自彈琵琶上起舞公卿迭起為夀逮夜而罷突厥既亡其部落或北附薛延陁或西奔西域其降唐者尚十萬口詔羣臣議區處之宜朝士多言北狄自古為中國患今幸而破亡宜悉徙之河南兖豫之間分其種落散居州縣教之耕織可以化胡虜為農民永空塞北之地中書侍郎顔師古以為突厥鐡勒皆上古所不能臣陛下既得而臣之請皆寘之河北分立酋長領其部落則永永無患矣禮部侍郎李百藥以為突厥雖云一國然其種類區分各有酋帥今宜因其離散各即本部署為君長不相臣屬縱欲存立阿史那氏唯可使臣其本族而已國分則弱而易制勢敵則難相吞滅各自保全必不能抗衡中國仍請於定襄置都䕶府為其節度此安邊之長策也夏州都督竇靜以為戎狄之性有如禽獸不可以刑法威不可以仁義教况彼首丘之情未易忘也置之中國有損無益恐一旦變生犯我王畧莫若因其破亡之餘施以望外之恩假之王侯之號妻以宗室之女分其土地析其部落使其權弱勢分易為羈制可使常為藩臣永保邊塞温彦博以為徙於兖豫之間則乖違物性非所以存養之也請準漢建武故事置降匈奴於塞下全其部落順其土俗以實空虚之地使為中國扞蔽策之善者也魏徵以為突厥世為寇盜百姓之讎也今幸而破亡陛下以其降附不忍盡殺宜縱之使還故土不可留之中國夫戎狄人面獸心弱則請服彊則叛亂固其常性今降者衆近十萬數年之後蕃息倍多必為腹心之疾不可悔也晉初諸胡與民雜居中國郭欽江統皆勸武帝驅出塞外以絶亂階武帝不從後二十餘年伊洛之閒遂為氊裘之域此前事之明鑑也彦博曰王者之於萬物天覆地載靡有所遺今突厥窮來歸我柰何弃之而不受乎孔子曰有教無類若救其死亡授以生業教之禮義數年之後悉為吾民選其酋長使入宿衞畏威懐德何後患之有上卒用彦博策處突厥降衆東自幽州西至靈州分突利故所統之地置順祐化長四州都督府又分頡利之地為六州左置定襄都督府右置雲中都督府以統其衆五月辛未以突利為順州都督使帥其部落之官上戒之曰爾祖啟民挺身奔隋隋立以為大可汗奄有北荒爾父始畢反為隋患天道不容故使爾今日亂亡如此我所以不立爾為可汗者懲啟民前事故也今命爾為都督爾宜善守國法勿相侵掠非徒欲中國久安亦使爾宗族永全也壬申以阿史那蘇尼失為懷德郡王阿史那思摩為懷化郡王頡利之亡也諸部落酋長皆弃頡利來降獨思摩隨之竟與頡利俱擒上嘉其忠拜右武候大將軍尋以為北開州都督使統頡利舊衆丁丑以右武衞大將軍史大柰為豐州都督其餘酋長至者皆拜將軍中郎將布列朝廷五品已上百餘人殆與朝士相半因而入居長安者近萬家辛巳詔自今訟者有經尚書省判不服聽於東宫上啟委太子裁決若仍不服然後聞奏丁亥御史大夫蕭瑀劾奏李靖破頡利牙帳御軍無法突厥珍物虜掠俱盡請付法司推科上特敕勿劾及靖入見上大加責讓靖頓首謝久之上乃曰隋史萬歲破達頭可汗有功不賞以罪致戮朕則不然錄公之功赦公之罪加靖左光祿大夫賜絹千匹加真食邑通前五百戸未幾上謂靖曰前有人讒公今朕意已寤公勿以為懷復賜絹二千匹林邑獻火珠有司以其表辭不順請討之上曰好戰者亡如隋煬帝頡利可汗皆耳目所親見也小國勝之不武况未可必乎語言之閒何足介意六月丁酉以阿史那蘇尼失為北寧州都督以中郎將史善應為北撫州都督壬寅以右驍衞將軍康蘇為北安州都督乙卯發卒修洛陽宫以備巡幸給事中張􅀇素上書諫以為洛陽未有巡幸之期而預修宫室非今日之急務昔漢髙祖納婁敬之說自洛陽遷長安豈非洛陽之地不及關中之形勝邪景帝用晁錯之言而七國構禍陛下今處突厥於中國突厥之親何如七國豈得不先為憂而宫室可遽興乘輿可輕動哉臣見隋氏初營宫室近山無大木皆致之逺方二千人曳一柱以木為輪則戛摩火出乃鑄鐡為轂行一二里鐡轂輒破别使數百人齎鐡轂隨而易之盡日不過行二三十里計一柱之費已用數十萬功則其餘可知矣陛下初平洛陽凡隋氏宫室之宏侈者皆令毁之曾未十年復加營繕何前日惡之而今日效之也且以今日財力何如隋世陛下役瘡痍之人襲亡隋之弊恐又甚於煬帝矣上謂玄素曰卿謂我不如煬帝何如桀紂對曰若此役不息亦同歸于亂耳上歎曰吾思之不熟乃至於是顧謂房玄齡曰朕以洛陽土中朝貢道均意欲便民故使營之今玄素所言誠有理宜即爲之罷役後日或以事至洛陽雖露居亦無傷也仍賜玄素綵二百匹秋七月甲子朔日有食之乙丑上問房玄齡蕭瑀曰隋文帝何如主也對曰文帝勤於爲治毎臨朝或至日昊五品已上引坐論事衞士傳飱而食雖性非仁厚亦勵精之主也上曰公得其一未知其二文帝不明而喜察不明則照有不通喜察則多疑於物事皆自決不任羣臣天下至廣一日萬機雖復勞神苦形豈能一一中理羣臣既知主意唯取決受成雖有愆違莫敢諫爭此所以二世而亡也朕則不然擇天下賢才寘之百官使思天下之事闗由宰相審熟便安然後奏聞有功則賞有罪則刑誰敢不竭心力以修職業何憂天下之不治乎因敕百司自今詔敕行下有未便者皆應執奏毋得阿從不盡己意癸酉以前太子少保李綱為太子少師以兼御史大夫蕭瑀為太子少傅李綱有足疾上賜以步輿使之乘至閤下數引入禁中問以政事毎至東宫太子親拜之太子毎視事上令綱與房􅀇齡王珪侍坐先是上命蕭瑀與宰相參議朝政瑀氣剛而辭辯房􅀇齡等皆不能抗上多不用其言玄齡魏徵温彦博嘗有微過瑀劾奏之上竟不問瑀由此怏怏自失遂罷御史大夫為太子少傅不復預聞朝政西突厥種落散在伊吾詔以涼州都督李大亮為西北道安撫大使於磧口貯糧來者賑給使者招慰相望於道大亮上言欲懷逺者必先安近中國如本根四夷如枝葉疲中國以奉四夷猶拔本根以益枝葉也臣逺考秦漢近觀隋室外事戎狄皆致疲􅁦今招致西突厥但見勞費未見其益况河西州縣蕭條突厥微弱以來始得耕穫今又供億此役民將不堪不若且罷招慰為便伊吾之地率皆沙磧其人或自立君長求稱臣内屬者羈縻受之使居塞外為中國藩蔽此乃施虛惠而収實利也上從之八月丙午詔以常服未有差等自今三品以上服紫四品五品服緋六品七品服綠八品服青婦人從其夫色甲寅詔以兵部尚書李靖為右僕射靖性沈厚每與時宰參議恂恂如不能言突厥既亡營州都督薛萬淑遣契丹酋長貪没折說諭東北諸夷奚霫室韋等十餘部皆内附萬淑萬均之兄也戊午突厥欲谷設來降欲谷設突利之弟也頡利敗欲谷設奔髙昌聞突利為唐所禮遂來降九月戊辰伊吾城主入朝隋末伊吾内屬置伊吾郡隋亂臣於突厥頡利既滅舉其屬七城來降因以其地置西伊州思結部落饑貧朔州刺史新豐張儉招集之其不來者仍居磧北親屬私相往還儉亦不禁及儉徙勝州都督州司奏思結將叛詔儉往察之儉單騎入其部落說諭徙之代州即以儉檢校代州都督思結卒無叛者儉因勸之營田歲大稔儉恐虜蓄積多有異志奏請和糴以充邊儲部落喜營田轉力而邊備實焉丙子開南蠻地置費州夷州己卯上幸隴州冬十一月壬辰以右衞大將軍侯君集為兵部尚書參議朝政甲子車駕還京師上讀明堂鍼灸書云人五藏之系咸附於背戊寅詔自今毋得笞囚背十二月甲辰上獵於鹿苑乙巳還宫甲寅髙昌王麴文泰入朝西域諸國咸欲因文泰遣使入貢上遣文泰之臣厭怛紇干往迎之魏徵諫曰昔光武不聽西域送侍子置都䕶以為不以蠻夷勞中國今天下初定前者文泰之來所過勞費已甚今借使十國入貢其徒旅不減千人邊民荒耗將不勝其弊若聽其商賈往來與邊民交市則可矣儻以賓客遇之非中國之利也時厭怛紇干已行上遽令止之諸宰相侍宴上謂王珪曰卿識鑒精通復善談論􅀇齡以下卿宜悉加品藻且自謂與數子何如對曰孜孜奉國知無不為臣不如􅀇齡才兼文武出將入相臣不如李靖敷奏詳明出納惟允臣不如温彦博處繁治劇衆務畢舉臣不如戴胄恥君不及堯舜以諫爭為己任臣不如魏徵至於激濁揚清嫉惡好善臣於數子亦有微長上深以為然衆亦服其確論上之初即位也嘗與羣臣語及教化上曰今承大亂之後恐斯民未易化也魏徵對曰不然久安之民驕佚驕佚則難教經亂之民愁苦愁苦則易化譬猶飢者易為食渴者易為飲也上深然之封德彝非之曰三代以還人漸澆訛故秦任法律漢雜霸道蓋欲化而不能豈能之而不欲邪魏徵書生未識時務若信其虚論必敗國家徵曰五帝三王不易民而化昔黄帝征蚩尤顓頊誅九黎湯放桀武王伐紂皆能身致太平豈非承大亂之後邪若謂古人淳樸漸至澆訛則至于今日當悉化為鬼魅矣人主安得而治之上卒從徵言元年關中饑米斗直絹一匹二年天下蝗三年大水上勤而撫之民雖東西就食未嘗嗟怨是歲天下大稔流散者咸歸鄉里米斗不過三四錢終歲斷死刑纔二十九人東至于海南及五嶺皆外戸不閉行旅不齎糧取給於道路焉上謂長孫无忌曰貞觀之初上書者皆云人主當獨運威權不可委之臣下又云宜震耀威武征討四夷唯魏徵勸朕偃武修文中國既安四夷自服朕用其言今頡利成擒其酋長並帶刀宿衞部落皆襲衣冠徵之力也但恨不使封德彝見之耳徵再拜謝曰突厥破滅海内康寧皆陛下威德臣何力焉上曰朕能任公公能稱所任則其功豈獨在朕乎房玄齡奏閱府庫甲兵逺勝隋丗上曰甲兵武備誠不可闕然煬帝甲兵豈不足邪卒亡天下若公等盡力使百姓乂安此乃朕之甲兵也上謂祕書監蕭璟曰卿在隋世數見皇后乎對曰彼兒女且不得見臣何人得見之魏徵曰臣聞煬帝不信齊王􅁪有中使察之聞其宴飲則曰彼營何事得遂而喜聞其憂悴則曰彼有他念故爾父子之閒且猶如是况佗人乎上笑曰朕今視楊政道勝煬帝之於齊王逺矣璟瑀之兄也西突厥肆葉䕶可汗既先可汗之子爲衆所附莫賀咄可汗所部酋長多歸之肆葉䕶引兵擊莫賀咄莫賀咄兵敗逃於金山爲泥孰設所殺諸部共推肆葉護爲大可汗五年春正月詔僧尼道士致拜父母癸酉上大獵於昆明池四夷君長咸從甲戌宴髙昌王文泰及羣臣丙子還宫親獻禽於大安宫癸未朝集使趙郡王孝恭等上表以四夷咸服請封禪上手詔不許有司上言皇太子當冠用二月吉請造兵備儀仗上曰東作方興宜改用十月少傅蕭瑀奏據陰陽書不若二月上曰吉凶在人若動依隂陽不顧禮義吉可得乎循正而行自與吉㑹農時最急不可失也二月甲辰詔諸州有京觀處無問新舊宜悉剗削加土為墳掩蔽枯朽勿令暴露己酉封皇弟元裕為鄶王元名為譙王靈蘷為魏王元祥為許王元曉為密王庚戌封皇子愔為梁王惲為郯王貞為漢王治為晉王慎為申王囂為江王簡為代王夏四月壬辰代王簡薨壬寅靈州斛薛叛任城王道宗等追擊破之隋末中國人多没於突厥及突厥降上遣使以金帛贖之五月乙丑有司奏凡得男女八萬口六月甲寅太子少師新昌貞公李綱薨初周齊王憲女孀居無子綱贍恤甚厚綱薨其女以父禮䘮之秋八月甲辰遣使詣髙麗収隋氏戰亡骸骨葬而祭之河内人李好德得心疾妄為妖言詔按其事大理丞張藴古奏好德被疾有徵法不當坐治書侍御史權萬紀劾奏藴古貫在相州好德之兄厚德為其刺史情在阿縱按事不實上怒命斬之於市既而悔之因詔自今有死罪雖令即決仍三覆奏乃行刑權萬紀與侍御史李仁發俱以告訐有寵於上由是諸大臣數被譴怒魏徵諫曰萬紀等小人不識大體以訐為直以讒為忠陛下非不知其無堪蓋取其無所避忌欲以警策羣臣耳而萬紀等挾恩依勢逞其姦謀凡所彈射皆非有罪陛下縱未能舉善以厲俗柰何昵姦以自損乎上黙然賜絹五百匹久之萬紀等姦狀自露皆得罪九月上修仁夀宫更命曰九成宫又將修洛陽宫民部尚書戴胄表諫以亂離甫定百姓彫弊帑藏空虚若營造不已公私勞費殆不能堪上嘉之曰戴胄於我非親但以忠直體國知無不言故以官爵酬之耳久之竟命將作大匠竇璡修洛陽宫璡鑿池築山彫飾華靡上怒遽命毁之免璡官冬十月丙午上逐兎於後苑左領軍將軍執失思力諫曰天命陛下為華夷父母柰何自輕上又將逐鹿思力脫巾解帶跪而固諫上為之止初上令羣臣議封建魏徵議以為若封建諸侯則卿大夫咸資俸祿必致厚歛又京畿賦税不多所資畿外若盡以封國邑經費頓闕又燕秦趙代俱帶外夷若有警急追兵内地難以奔赴禮部侍郎李百藥以為運祚脩短定命自天堯舜大聖守之而不能固漢魏微賤拒之而不能却今使勲戚子孫皆有民有社易世之後將驕淫自恣攻戰相殘害民尤深不若守令之迭居也中書侍郎顔師古以為不若分王宗子勿令過大閒以州縣雜錯而居互相維持使各守其境協力同心足扶京室為置官寮皆省司選用法令之外不得擅作威刑朝貢禮儀具為條式一定此制萬代無虞十一月丙辰詔皇家宗室及勲賢之臣宜令作鎮藩部貽厥子孫非有大故無或黜免所司明為條例定等級以聞丁巳林邑獻五色鸚鵡丁卯新羅獻美女二人魏徵以為不宜受上喜曰林邑鸚鵡猶能自言苦寒思歸其國况二女逺别親戚乎并鸚鵡各付使者而歸之倭國遣使入貢上遣新州剌史髙表仁持節往撫之表仁與其王爭禮不宣命而還丙子上祀圓丘十二月太僕寺丞李世南開党項之地十六州四十七縣上謂侍臣曰朕以死刑至重故令三覆奏蓋欲思之詳熟故也而有司須臾之閒三覆已訖又古刑人君為之徹樂減膳朕庭無常設之樂然常為之不啖酒肉但未有著令又百司斷獄唯據律文雖情在可矜而不敢違法其閒豈能盡無冤乎丁亥制決死囚者二日中五覆奏下諸州者三覆奏行刑之日尚食勿進酒肉内教坊及太常不舉樂皆令門下覆視有據灋當死而情可矜者錄狀以聞由是全活甚衆其五覆奏者以決前一二日至決日又三覆奏惟犯惡逆者一覆奏而已己亥朝集使利州都督武士彠等復上表請封禪不許壬寅上幸驪山温湯戊申還宫上謂執政曰朕常恐因喜怒妄行賞罰故欲公等極諫公等亦宜受人諫不可以己之所欲惡人違之茍自不能受諫安能諫人康國求内附上曰前代帝王好招來絶域以求服逺之名無益於用而糜弊百姓今康國内附儻有急難於義不得不救師行萬里豈不疲勞勞百姓以取虚名朕不為也遂不受謂侍臣曰治國如治病病雖愈尤宜將䕶儻遽自放縱病復作則不可救矣今中國幸安四夷俱服誠自古所希然朕日慎一日唯懼不終故欲數聞卿輩諫爭也魏徵曰内外治安臣不以為喜唯喜陛下居安思危耳上嘗與侍臣論獄魏徵曰煬帝時嘗有盜發帝令於士澄捕之少涉疑似皆栲訊取服凡二千餘人帝悉令斬之大理丞張元濟恠其多試尋其狀内五人嘗爲盜餘皆平民竟不敢執奏盡殺之上曰此豈唯煬帝無道其臣亦不盡忠君臣如此何得不亡公等宜戒之是嵗髙州揔管馮盎入朝未幾羅竇諸洞獠反敕盎帥部落二萬爲諸軍前鋒獠數萬人屯據險要諸軍不得進盎持弩謂左右口盡吾此矢足知勝負矣連發七矢中七人獠皆走因縱兵乘之斬首千餘級上美其功前後賞賜不可勝數盎所居地方二千里奴婢萬餘人珍貨充積然爲治勤明所部愛之新羅王真平卒無嗣國人立其女善德爲王資治通鑑卷第一百九十三
