body:
  text: 臣司馬光奉勑編集唐紀五十四黓執徐九月凡三年有竒起屠維赤奮若七月盡􅀇憲宗昭文章武大聖至神孝皇帝上之下元和四年秋七月壬戌御史中丞李夷簡彈京兆尹楊憑前為江西觀察使貪汚僭侈丁卯貶憑臨賀尉夷􅂤元懿之􅀇孫也上命盡籍憑資産李絳諫曰舊制非反逆不籍其家上乃止憑之親友無敢送者櫟陽尉徐晦獨至藍田與别太常卿權德輿素與晦善謂之曰君送楊臨賀誠為厚矣無乃為累乎對曰晦自布衣䝉楊公知奬今日逺謫豈得不與之别借如明公它日為䜛人所逐晦敢自同路人乎德輿嗟嘆稱之於朝後數日李夷簡奏為監察御史晦謝曰晦平生未嘗得望公顔色公何從而取之夷簡曰君不負楊臨賀肯負國乎上宻問諸學士曰今欲用王承宗為成德留後割其德棣二州更為一鎮以離其勢并使承宗輸二税請官吏一如師道何如李絳等對曰德棣之􅀠成德為日已久今一旦割之恐承宗及其將士憂疑怨望得以為辭况其鄰道情狀一同各慮它日分割或潛相構扇萬一旅拒倍難處置願更三思所是二税官吏願因弔祭使至彼自以其意諭承宗令上表陳乞如師道例勿令知出陛下意如此則幸而聽命於理固順若其不聽體亦無損上又問今劉濟田季安皆有疾若其物故豈可盡如成德付授其子天下何時當平議者皆言宜乗此際代之不受則發兵討之時不可失如何對曰羣臣見陛下西取蜀東取呉易於反掌故謟䛕躁競之人爭獻䇿畫勸開河北不為國家深謀逺慮陛下亦以前日成功之易而信其言臣等夙夜思之河北之勢與二方異何則西川浙西皆非反側之地其四鄰皆國家臂指之臣劉闢李錡獨生狂謀其下皆莫之與闢錡徒以貨財㗖之大軍一臨則渙然離耳故臣等當時亦勸陛下誅之以其萬全故也成德則不然内則膠固嵗深外則蔓連勢廣其將士百姓懐其累代喣嫗之恩不知君臣逆順之理諭之不從威之不服將為朝廷羞又鄰道平居或相猜恨及聞代易必合為一心蓋各為子孫之謀亦慮他日及此故也萬一餘道或相表裏兵連禍結財盡力竭西戎北狄乗閒窺窬其為憂患可勝道哉濟季安與承宗事體不殊若物故之際有閒可乗當臨事圖之於今用兵則恐未可太平之業非朝夕可致願陛下審處之時呉少誠病甚絳等復上言少誠病必不起淮西事體與河北不同四旁皆國家州縣不與賊鄰無黨援相助朝廷命帥今正其時萬一不從可議征討臣願捨恒兾難致之䇿就申蔡易成之謀脱或恒兾連兵事未如意蔡州有舋勢可興師南北之役俱興財力之用不足儻事不得已須赦承宗則恩德虚施威令頓廢不如早賜處分以收鎮兾之心坐待機宜必獲申蔡之利既而承宗久未得朝命頗懼累表自訴八月壬午上乃遣京兆少尹裴武詣真定宣慰承宗受詔甚㳟曰三軍見廹不暇俟朝㫖議獻德棣二州以明懇欵丙申安南都䕶張舟奏破環王三萬衆九月甲辰朔裴武復命庚戌以承宗為成德軍節度恒兾深趙州觀察使德州刺史薛昌朝為保信軍節度德棣二州觀察使昌朝嵩之子王氏之壻也故就用之田季安得飛報先知之使謂承宗曰昌朝隂與朝廷通故受節鉞承宗遽遣數百騎馳入德州執昌朝至真定囚之中使送昌朝節過魏州季安陽為宴勞留使者累日比至德州已不及矣上以裴武為欺罔又有譖之者曰武使還先宿裴垍家明旦乃入見上怒甚以語李絳欲貶武於嶺南絳曰武昔陷李懐光軍中守節不屈豈容今日遽為姦回蓋賊多變詐人未易盡其情承宗始懼朝廷誅討故請獻二州既䝉恩貸而鄰道皆不欲成德開分割之端計必有隂行閒説誘而脅之使不得守其初心者非武之罪也今陛下選武使入逆亂之地使還一語不相應遽竄之遐荒臣恐自今奉使賊庭者以武為戒茍求便身率為依阿兩可之言莫肯盡誠具陳利害如此非國家之利也且垍武久處朝廷諳練事體豈有使還未見天子而先宿宰相家乎臣敢為陛下必保其不然此殆有䜛人欲傷武及垍者願陛下察之上良久曰理或有此遂不問丙辰振武奏吐蕃五萬餘騎至拂梯泉辛未豐州奏吐蕃萬騎至大石谷掠回鶻入貢還國者左神䇿軍吏李昱貣長安冨人錢八千緡滿三歳不償京兆尹許孟容收捕械繫立期使償曰期滿不足當死一軍大驚中尉訴於上上遣中使宣㫖送本軍孟容不之遣中使再至孟容曰臣不奉詔當死然臣爲陛下尹京畿非抑制豪彊何以肅清輦下錢未畢償昱不可得上嘉其剛直而許之京城震栗上遣中使諭王承宗使遣薛昌朝還鎮承宗不奉詔冬十月癸未制削奪承宗官爵以左神䇿中尉吐突承璀爲左右神䇿河中河陽浙西宣歙等道行營兵馬使招討處置等使翰林學士白居易上奏以爲國家征伐當責成將帥近嵗始以中使爲監軍自古及今未有徵天下之兵專令中使統領者也今神䇿軍既不置行營節度使即承璀乃制將也又充諸軍招討處置使即承璀乃都統也臣恐四方聞之必輕朝廷四夷聞之必笑中國陛下忍令後代相傳云以中官爲制將都統自陛下始乎臣又恐劉濟茂昭及希朝從史乃至諸道將校皆恥受承璀指麾心既不齊功何由立此是資承宗之計而挫諸將之勢也陛下念承璀勤勞貴之可也憐其忠赤富之可也至於軍國權柄動闗理亂朝廷制度出自祖宗陛下寧忍徇下之情而自隳法制從人之欲而自損聖明何不思於一時之間而取笑於萬代之後乎時諫官御史論承璀職名太重者相屬上皆不聽戊子上御延英殿度支使李元素鹽鐵使李鄘京兆尹許孟容御史中丞李夷􅂤諌議大夫孟􅂤給事中吕元膺穆質右補闕獨孤郁等極言其不可上不得已明日削承璀四道兵馬使改處置為宣慰而已李絳嘗極言宦官驕横侵害政事䜛毁忠貞上曰此屬安敢為䜛就使為之朕亦不聽絳曰此屬大抵不知仁義不分枉直惟利是嗜得賂則譽跖蹻為亷良怫意則毁龔黄為貪暴能用傾巧之智構成疑似之端朝夕左右浸潤以入之陛下必有時而信之矣自古宦官敗國者備載方冊陛下豈得不防其漸乎己亥吐突承璀將神䇿兵發長安命恒州四面藩鎮各進兵招討初呉少誠寵其大將呉少陽名以從弟署為軍職出入少誠家如至親累遷申州刺史少誠病不知人家僮鮮于熊兒詐以少誠命召少陽攝副使知軍州事少誠有子元慶少陽殺之十一月己巳少誠薨少陽自為留後是嵗雲南王尋閤勸卒子勸龍晟立田季安聞吐突承璀將兵討王承宗聚其徒曰師不跨河二十五年矣今一旦越魏伐趙趙虜魏亦虜矣計為之奈何其將有超伍而言者曰願借騎五千以除君憂季安大呼曰壯哉兵决出格沮者斬幽州牙將絳人譚忠為劉濟使魏知其謀入謂季安曰如某之謀是引天下之兵也何者今王師越魏伐趙不使􅂄臣宿將而專付中臣不輸天下之甲而多出秦甲君知誰為之謀此乃天子自為之謀欲將夸服於臣下也若師未叩趙而先碎於魏是上之謀反不如下且能不恥於天下乎既恥且怒必任智士畫長䇿仗猛將練精兵畢力再舉渉河鑑前之敗必不越魏而伐趙校罪輕重必不先趙而後魏是上不上下不下當魏而來也季安曰然則若之何忠曰王師入魏君厚犒之於是悉甲壓境號曰伐趙則可隂遺趙人書曰魏若伐趙則河北義士謂魏賣友魏若與趙則河南忠臣謂魏反君賣友反君之名魏不忍受執事若能隂解陴障遺魏一城魏得持之奏㨗天子以爲符信此乃使魏北得以奉趙西得以爲臣於趙有角尖之秏於魏獲不世之利執事豈能無意於魏乎趙人脱不拒君是魏霸基安矣季安曰善先生之來是天眷魏也遂用忠之謀與趙隂計得其堂陽忠歸幽州謀欲激劉濟討王承宗㑹濟合諸將言曰天子知我怨趙今命我伐之趙亦必大備我伐與不伐孰利忠疾對曰天子終不使我伐趙趙亦不備燕濟怒曰爾何不直言濟與承宗反乎命繫忠獄使人視成德之境果不爲備後一日詔果來令濟專護北疆勿使朕復挂胡憂而得專心於承宗濟乃解獄召忠曰信如子斷矣何以知之忠曰盧從史外親燕内實忌之外絶趙内實與之此為趙畫曰燕以趙爲障雖怨趙必不殘趙不必為備一且示趙不敢抗燕二且使燕獲疑天子趙人既不備燕潞人則走告于天子曰燕厚怨趙趙見伐而不備燕是燕反與趙也此所以知天子終不使君伐趙趙亦不備燕也濟曰今則柰何忠曰燕趙爲怨天下無不知今天子伐趙君坐全燕之甲一人未濟易水此正使潞人以燕賣恩於趙敗忠於上兩皆售也是燕貯忠義之心卒染私趙之口不見德於趙人惡聲徒嘈嘈於天下耳惟君熟思之濟曰吾知之矣乃下令軍中曰五日畢出後者醢以徇五年春正月劉濟自將兵七萬人擊王承宗時諸軍皆未進濟獨前奮擊㧞饒陽束鹿河東河中振武義武四軍為恒州北道招討㑹于定州㑹望夜軍吏以有外軍請罷張燈張茂昭曰三鎮官軍也何謂外軍命張燈不禁行人不閉里門三夜如平日亦無敢喧嘩者丁夘河東將王榮㧞王承宗洄湟鎮吐突承璀至行營威令不振與承宗戰屢敗左神䇿大將軍酈定進戰死定進驍將也軍中奪氣河南尹房式有不法事東臺監察御史元稹奏攝之擅令停務朝廷以為不可罰一季俸召還西京至敷水驛有内侍後至破驛門呼罵而入以馬鞭擊稹傷面上復引稹前過貶江陵士曹翰林學士李絳崔羣言稹無罪白居易上言中使陵辱朝士中使不問而稹先貶恐自今中使出外益暴横人無敢言者又稹為御史多所舉奏不避權勢切齒者衆恐自今無人肯為陛下當官執法疾惡繩愆有大姦猾陛下無從得知上不聽上以河朔方用兵不能討呉少陽三月己未以少陽為淮西留後諸軍討王承宗者久無功白居易上言以為河北本不當用兵今既出師承璀未嘗苦戰已失大將與從史兩軍入賊境遷延進退不惟意在逗留亦是力難支敵希朝茂昭至新市鎮竟不能過劉濟引全軍攻圍樂壽久不能下師道季安元不可保察其情狀似相計㑹各收一縣遂不進軍陛下觀此事勢成功有何所望以臣愚見速須罷兵若又遲疑其害有四可為痛惜者二可為深憂者二何則若保有成即不論用度多少既的知不可即不合虛費貲糧悟而後行事亦非晩今遲校一日有一日之費更延旬月所費滋多終須罷兵何如早罷以府庫錢帛百姓脂膏資助河北諸侯轉令彊大此臣為陛下痛惜者一也臣又恐河北諸將見呉少陽已受制命必引事例輕重同詞請雪承宗若章表繼來即義無不許請而後捨體勢可知轉令承宗膠固同類如此則與奪皆由鄰道恩信不出朝廷實恐威權盡歸河北此為陛下痛惜者二也今天時已熱兵氣相蒸至於飢渇疲勞疾疫暴露驅以就戰人何以堪縱不惜身亦難忍苦况神䇿烏雜城市之人例皆不慣如此忽思生路或有奔逃一人若逃百人相扇一軍若散諸軍必揺事忽至此悔將何及此為陛下深憂者一也臣聞回鶻吐蕃皆有細作中國之事小大盡知今聚天下之兵唯討承宗一賊自冬及夏都未立功則兵力之彊弱資費之多少豈宜使西戎北虜一一知之忽見利生心乗虛入冦以今日之勢力可能救其首尾哉兵連禍生何事不有萬一及此實闗安危此其為陛下深憂者二也盧從史首建伐王承宗之謀及朝廷興師從史逗留不進隂與承宗通謀令軍士潛懐承宗號又髙芻粟之價以販度支諷朝廷求平章事誣奏諸道與賊通不可進兵上甚患之㑹從史遣牙將王翊元入奏事裴垍引與語為言為臣之義微動其心翊元遂輸誠言從史隂謀及可取之狀垍令翊元還本軍經營復來京師遂得其都知兵馬使烏重􅅌等􅅃要垍言於上曰從史狡猾驕狠必且為亂今聞其與承璀對營視承璀如嬰兒往來殊不設備失今不取後雖興大兵未可以嵗月平也上初愕然熟思良久乃許之從史性貪承璀盛陳竒玩視其所欲稍以遺之從史喜益相昵狎甲申承璀與行營兵馬使李聽謀召從史入營慱伏壯士於幕下突出擒詣帳後縳之内車中馳詣京師左右驚亂承璀斬十餘人諭以詔㫖從史營中士卒聞之皆甲以出操兵趨譁烏重􅅌當軍門叱之曰天子有詔從者賞敢違者斬士卒皆歛兵還部伍會夜車疾驅未明已出境重􅅌承洽之子聽晟之子也丁亥范希朝張茂昭大破承宗之衆於木刀溝上嘉烏重􅅌之功欲即授以昭義節度使李絳以為不可請授重􅅌河陽以河陽節度使孟元陽鎮昭義㑹吐突承璀奏已牒重􅅌句當昭義留後絳上言昭義五州據山東要害魏博恒幽諸鎮蟠結朝廷惟恃此以制之磁邢洺入其腹内誠國之寳地安危所繫也曏為從史所據使朝廷旰食今幸而得之承璀復以與重􅅌臣聞之驚歎實所痛心昨國家誘執從史雖爲長䇿已失大體今承璀又以文牒差人爲重鎮留後爲之求旌節無君之心孰甚於此陛下昨日得昭義人神同慶威令再立今日忽以授本軍牙將物情頓沮紀綱大紊校計利害更不若從史爲之何則從史雖蓄姦謀已是朝廷牧伯重􅅌出於列校以承璀一牒代之竊恐河南北諸侯聞之無不憤怒恥與爲伍且謂承璀誘重􅅌使逐從史而代其位彼人人麾下各有將校能無自危乎儻劉濟茂昭季安執㳟韓􅀪師道繼有章表陳其情狀并指承璀專命之罪不知陛下何以處之若皆不報則衆怒益甚若爲之改除則朝廷之威重去矣上復使樞宻使梁守謙宻謀於絳曰今重㣧已揔軍務事不得已須應與節對曰從史為帥不由朝廷故啓其邪心終成逆節今以重㣧典兵即授之節威福之柄不在朝廷何以異於從史乎重㣧之得河陽已爲望外之福豈敢更爲旅拒況重㣧所以能執從史本以杖順成功一旦自逆詔命安知同列不襲其跡而動乎重㣧軍中等夷甚多必不願重㣧獨為主帥移之它鎮乃惬衆心何憂其致亂乎上恱皆如其請壬辰以重㣧為河陽節度使元陽爲昭義節度使戊戌貶盧從史驩州司馬五月乙巳昭義軍三千餘人夜潰奔魏州劉濟奏抜安平庚申吐蕃遣其臣論思邪􅀬入見且歸路泌鄭叔矩之柩甲子奚冦靈州六月甲申白居易復上奏以為臣比請罷兵今之事勢又不如前不知陛下復何所待是時上毎有軍國大事必與諸學士謀之嘗踰月不見學士李絳等上言臣等飽食不言其自為計則得矣如陛下何陛下詢訪理道開納直言實天下之幸豈臣等之幸上遽令明日三殿對來白居易嘗因論事言陛下錯上色莊而罷宻召承㫖李絳謂白居易小臣不遜須令出院絳曰陛下容納直言故羣臣敢竭誠無隱居易言雖少思志在納忠陛下今日罪之臣恐天下各思箝口非所以廣聦明昭聖德也上悦待居易如初上嘗欲近獵苑中至蓬萊池西謂左右曰李絳必諫不如且止秋七月庚子王承宗遣垍曰承璀首唱用兵疲􅁦天下卒無成功陛下縱以舊恩不加顯戮豈得全不貶黜以謝天下乎給事中叚平仲吕元膺言承璀可斬李絳奏稱陛下不責承璀它日復有敗軍之將何以處之若或誅之則同罪異罰彼必不服若或釋之則誰不保身而玩冦乎願陛下割不忍之恩行不易之典使將帥有所懲勸閒二日上罷承璀中尉降為軍器使中外相賀裴垍得風疾上甚惜之中使候問旁午於道丙寅以太常卿權德輿為禮部尚書同平章事義武節度使張茂昭請除代人欲舉族入朝河北諸鎮互遣人説止之茂昭不從凡四上表上乃許之以左庶子任廸􅂤為義武行軍司馬茂昭悉以易定二州簿書管鑰授廸簡遣其妻子先行曰吾不欲子孫染於汚俗茂昭既去冬十月戊寅虞候楊伯玊作亂囚廸簡辛巳義武將士共殺伯玉兵馬使張佐元又作亂囚廸􅂤廸􅂤乞歸朝既而將士復殺佐元奉廸􅂤主軍務時易定府庫罄竭閭閻亦空廸􅂤無以犒士乃設糲飯與士卒共食之身居㦸門下經月將士感之共請廸􅂤還寢然後得安其位上命以綾絹十萬匹賜易定將士壬辰以廸􅂤為義武節度使甲午以張茂昭為河中慈隰晉絳節度使從行將校皆拜官右金吾大將軍伊慎以錢三萬緡賂右軍中尉第五從直求河中節度使從直恐事泄奏之十一月庚子貶慎為右衛使自陳為盧從史所離間乞輸貢賦請官吏許其自新李師道等數上表請雪承宗朝廷亦以師久無功丁未制洗雪承宗以為成德軍節度使復以德棣二州與之悉罷諸道行營將士共賜布帛二十八萬端匹加劉濟中書令劉濟之討王承宗也以長子緄為副大使掌幽州留務濟軍瀛州次子緫為瀛州刺史濟署行營都知兵馬使使屯饒陽濟有疾緫與判官張玘孔目官成國寳謀詐使人從長安來曰朝廷以相公逗留無功已除副大使為節度使矣明日又使人來告曰副大使旌節已至太原又使人走而呼曰旌節已過代州舉軍驚駭濟憤怒不知所為殺大將素與緄厚者數十人追緄詣行營以張玘兄臯代知留務濟自朝至日昊不食渇索飲緫因寘毒而進之乙夘濟薨緄行至􅃰州緫矯以父命杖殺之遂領軍務嶺南監軍許遂振以飛語毁節度使楊於陵於上上命召於陵還除宂官裴垍曰於陵性亷直陛下以遂振故黜藩臣不可丁巳以於陵為吏部侍郎遂振尋自抵罪八月乙亥上與宰相語及神仙問果有之乎李藩對曰秦始皇漢武帝學仙之效具載前史太宗服天笁僧長年藥致疾此古今之明戒也陛下春秋鼎盛方勵志太平宜拒絶方士之説茍道盛德充人安國理何憂無堯舜之壽乎九月己亥吐突承璀自行營還辛亥復為左衛上將軍充左軍中尉裴將軍坐死者三人初慎自安州入朝留其子宥主留事朝廷因以為安州刺史未能去也㑹宥母卒於長安宥利於兵權不時發喪鄂岳觀察使郗士美遣僚屬以事過其境宥出迎因告以凶問先備籃輿即日遣之甲辰㑹王纁薨庚戌以前河中節度使王鍔為河東節度使上左右受鍔厚賂多稱譽之上命鍔兼平章事李藩固執以為不可權德輿曰宰相非序進之官唐興以來方鎮非大忠大勲則䟦扈者朝廷或不得已而加之今鍔既無忠勲朝廷又非不得已何為遽以此名假之上乃止鍔有吏才工於完聚范希朝以河東全軍出屯河北秏散甚衆鍔到鎮之初兵不滿三萬人馬不過六百匹嵗餘兵至五萬人馬有五千匹器械精利倉庫充實又進家財三十萬緡上復欲加鍔平章事李絳諫曰鍔在太原雖頗著績効今因獻家財而命之若後世何乃止中書侍郎同平章事裴垍數以疾辭位庚申罷為兵部尚書十二月戊寅張茂昭入朝請遷祖考之骨于京兆壬午以御史中丞吕元膺為鄂岳觀察使元膺嘗欲夜登城門已鏁守者不為開左右曰中丞也對曰夜中難辨真偽雖中丞亦不可元膺乃還明日擢為重職翰林學士司勲郎中李絳面陳吐突承璀專横語極懇切上作色曰卿言太過絳泣曰陛下置臣於腹心耳目之地若臣畏避左右愛身不言是臣負陛下言之而陛下惡聞乃陛下負臣也上怒解曰卿所言皆人所不能言使朕聞所不聞真忠臣也它日盡言皆應如是己丑以絳為中書舍人學士如故絳甞從容諌上聚財上曰今兩河數十州皆國家政令所不及河湟數千里淪於左祍朕日夜思雪祖宗之恥而財力不贍故不得不蓄聚耳不然朕宫中用度極儉薄多藏何用邪六年春正月甲辰以彰義留後呉少陽爲節度使庚申以前淮南節度使李吉甫為中書侍郎同平章事二月壬申李藩罷爲太子詹事己丑忻王造薨宦官惡李絳在翰林以為户部侍郎判本司上問絳故事户部侍郎皆進羡餘卿獨無進何也對曰守土之官厚歛於人以市私恩天下猶共非之况户部所掌皆陛下府庫之物給納有籍安得羡餘若自左藏輸之内藏以為進奉是猶東庫移之西庫臣不敢踵此􅁦也上嘉其直益重之乙巳上問宰相為政寛猛何先權德輿對曰秦以慘刻而亡漢以寛大而興太宗觀明堂圖禁杖人背是故安史以來屢有悖逆之臣皆旋踵自亡由祖宗仁政結於人心人不能忘故也然則寛猛之先後可見矣上善其言夏四月戊辰以兵部尚書裴垍為太子賔客李吉甫惡之也庚午以刑部侍郎鹽鐵轉運使盧坦為户部侍郎判度支或告泗州刺史薛謇為代北水運使有異馬不以獻事下度支使廵官往驗未返上遲之使品官劉泰昕按其事盧坦曰陛下既使有司驗之又使品官繼往豈大臣不足信於品官乎臣請先就黜免上召泰昕還五月前行營糧料使于臯謩董溪坐贓數千緡敕貸其死臯謨流春州溪流封州行至潭州並追遣中使賜死權德輿上言以為臯謨等罪當死陛下肆諸市朝誰不懼法不當已赦而殺之溪晉之子也庚子以金吾大將軍李惟􅂤為鳯翔節度使隴州地與吐蕃接舊常朝夕相伺更入攻抄人不得息惟簡以為邊將當謹守備蓄財榖以待冦不當覩小利起事盗恩禁不得妄入其地益市耕牛鑄農器以給農之不能自具者増墾田數十萬畝屬嵗屢稔公私有餘販者流及它方賜振武節度使阿跌光進姓李氏六月丁夘李吉甫奏自漢至隋十有三代設官之多無如國家者天寳以後中原宿兵見在可計者八十餘萬其餘為商賈僧道不服田畒者什有五六是常以三分勞筋苦骨之人奉七分待衣坐食之輩也今内外官以税錢給俸者不下萬員天下三百餘縣或以一縣之地而為州一鄉之民而為縣者甚衆請敕有司詳定廢置吏員可省者省之州縣可併者併之入仕之塗可減者減之又國家舊章依品制俸官一品月俸錢三十緡職田禄米不過千斛艱難以來増置使額厚給俸錢大曆中權臣月俸至九千緡州無大小刺史皆千緡常衮為相始立限約李泌又量其閑劇隨事増加時謂通濟理難減削然猶有名存職廢或額去俸存閑劇之閒厚薄頓異請敕有司詳考俸料雜給量定以聞於是命給事中叚平仲中書舍人韋貫之兵部侍郎許孟容户部侍郎李絳同詳定秋九月富平人梁悦報父仇殺秦杲自詣縣請罪敕復讎據禮經則義不同天徵法令則殺人者死禮法二事皆王教之大端有此異同固資論辯宜令都省集議聞奏職方員外郎韓愈議以為律無其條非闕文也蓋以不許復讎則傷孝子之心而乖先王之訓許復讎則人將倚法專殺無以禁止其端矣故聖人丁寧其義於經而深沒其文於律其意將使法吏一斷於法而經術之士得引經而議也宜定其制曰凡復父讎者事發具事申尚書省集議奏聞酌其宜而處之則經律無失其指矣戊戌敕梁悦杖一百流循州甲寅吏部奏凖敕併省内外官計八百八員諸司流外一千七百六十九人黔州大水壊城郭觀察使竇羣發溪洞蠻以治之督役太急於是辰溆二州蠻反羣討之不能定戊午貶羣開州刺史冬十一月弓箭庫使劉希光受羽林大將軍孫璹錢二萬緡為求方鎮事覺賜死事連左衛上將軍知内侍省事吐突承璀丙申以承璀為淮南監軍上問李絳朕出承璀何如對曰外人不意陛下遽能如是上曰此家奴耳曏以其驅使之久故假以恩私若有違犯朕去之輕如一毛耳十六宅諸王既不出閤其女嫁不以時選尚者皆由宦官率以厚賂自逹李吉甫上言自古尚主必擇其人獨近世不然十二月壬申詔封恩王等六女為縣主委中書門下宗正吏部選門地人才稱可者嫁之己丑以户部侍郎李絳為中書侍郎同平章事李吉甫為相多修舊怨上頗知之故擢絳為相吉甫善逢迎上意而絳鯁直數爭論於上前上多直絳而從其言由是二人有隙閏月辛夘朔黔州奏辰溆賊帥張伯靖冦播州費州試太子通事舍人李渉知上於吐突承璀恩顧未衰乃投匭上疏稱承璀有功希光無罪承璀久委心腹不宜遽弃知匭使諫議大夫孔戣見其副章詰責不受渉乃行賂詣光順門通之戣聞之上疏極言渉姦險欺天請加顯戮戊申貶渉峽州司倉渉渤之兄戣巢父之子也辛亥惠昭太子寧薨是嵗天下大稔米斗有直二錢者七年春正月辛未以京兆尹元義方為鄜坊觀察使初義方媚事吐突承璀李吉甫欲自託於承璀擢義方為京兆尹李絳惡義方為人故出之義方入謝因言李絳私其同年許季同除京兆少尹出臣鄜坊專作威福欺罔聰明上曰朕諳李絳不如是明日將問之義方惶愧而出明日上以詰絳曰人於同年固有情乎對曰同年乃四海九州之人偶同科第或登科然後相識情於何有且陛下不以臣愚備位宰相宰相職在量才授任若其人果才雖在兄弟子姪之中猶將用之况同年乎避嫌而棄才是乃便身非徇公也上曰善朕知卿必不爾遂趣義方之官振武河溢毁東受降城三月丙戌上御延英殿李吉甫言天下已太平陛下宜為樂李絳曰漢文帝時兵木無刃家給人足賈誼猶以為厝火積薪之下不可謂安今法令所不能制者河南北五十餘州犬戎腥羶近接涇隴烽火屢驚加之水旱時作倉廩空虛此正陛下宵衣旰食之時豈得謂之太平遽為樂哉上欣然曰卿言正合朕意退謂左右曰吉甫專為悦媚如李絳真宰相也上嘗問宰相貞元中政事不理何乃至此李吉甫對曰德宗自任聖智不信宰相而信它人是使姦臣得乗閒弄威福政事不理職此故也上曰然此亦未必皆德宗之過朕㓜在德宗左右見事有得失當時宰相亦未有再三執奏者皆懐禄偷安今日豈得專歸咎於德宗邪卿輩宜用此為戒事有非是當力陳不已勿畏朕譴怒而遽止也李吉甫常言人臣不當强諫使君悦臣安不亦美乎李絳曰人臣當犯顔苦口指陳得失若陷君於惡豈得為忠上曰絳言是也吉甫至中書卧不視事長吁而已李絳或久不諫上輙詰之曰豈朕不能容受邪將無事可諫也李吉甫又嘗言於上曰賞罰人主之二柄不可偏廢陛下踐阼以來惠澤深矣而威刑未振中外懈惰願加嚴以振之上顧李絳曰何如對曰王者之政尚德不尚刑豈可捨成康文景而效秦始皇父子乎上曰然後旬餘于頔入對亦勸上峻刑又數日上謂宰相曰于頔大是姦臣勸朕峻刑卿知其意乎皆對曰不知也上曰此欲使朕失人心耳吉甫失色退而抑首不言笑竟日夏四月丙辰以庫部郎中翰林學士崔羣為中書舍人學士如故上嘉羣讜直命學士自今奏事必取崔羣連署然後進之羣曰翰林舉動皆為故事必如是後來萬一有阿媚之人為之長則下位直言無從而進矣固不奉詔章三上上乃從之五月庚申上謂宰相曰卿輩屢言淮浙去嵗水旱近有御史自彼還言不至為災事竟如何李絳對曰臣按淮南浙西浙東奏狀皆云水旱人多流亡求設法招撫其意似恐朝廷罪之者豈肯無災而妄言有災邪此蓋御史欲為姦謏以悦上意耳願得其主名按致其法上曰卿言是也國以人為本聞有災當亟救之豈可尚復疑之邪朕適者不思失言耳命速蠲其租賦上嘗與宰相論治道於延英殿日旰暑甚汗透御服宰相恐上體倦求退上留之曰朕入禁中所與處者獨宫人宦官耳故樂與卿等且共談為理之要殊不知倦也六月癸巳司徒同平章事杜佑以太保致仕秋七月乙亥立遂王宥為太子更名恒恒郭貴妃之子也諸姫子澧王寛長於恒上將立恒命崔羣為寛草讓表羣曰凡推己之有以與人謂之讓遂王嫡子也寛何讓焉上乃止八月戊戌魏博節度使田季安薨初季安娶洺州刺史元誼女生子懐諫為節度副使牙内兵馬使田興庭玠之子也有勇力頗讀書性㳟遜季安淫虐興數規諫軍中頼之季安以為收衆心出為臨清鎮將欲殺之興陽為風痺炙灼滿身乃得免季安病風殺戮無度軍政廢亂夫人元氏召諸將立懐諫為副大使知軍務時年十一遷季安於别寢月餘而薨召田興為歩射都知兵馬使辛亥以左龍武大將軍薛平為鄭滑節度使欲以控制魏博上與宰相議魏博事李吉甫請興兵討之李絳以為魏博不必用兵當自歸朝廷吉甫盛陳不可不用兵之狀上曰朕意亦以為然絳曰臣竊觀兩河藩鎮之䟦扈者皆分兵以􅀠諸將不使專在一人恐其權任太重乗間而謀己故也諸將勢均力敵莫能相制欲廣相連結則衆心不同其謀必泄欲獨起為變則兵少力微勢必不成加以購賞既重刑誅又峻是以諸將互相顧忌莫敢先發䟦扈者恃此以為長䇿然臣竊思之若常得嚴明主帥能制諸將之死命者以臨之則粗能自固矣今懐諫乳臭子不能自聽斷軍府大權必有所歸諸將厚薄不均怨怒必起不相服從然則曏日分兵之䇿適足為今日禍亂之階也田氏不為屠肆則悉為俘囚矣何煩天兵哉彼自列將起代主帥鄰道所惡莫甚於此彼不倚朝廷之援以自存則立為鄰道所􅕖粉矣故臣以為不必用兵可坐待魏博之自歸也但願陛下按兵養威嚴敕諸道選練士馬以須後敕使賊中知之不過數月必有自效於軍中者矣至時惟在朝廷應之敏速中其機㑹不愛爵禄以賞其人使兩河藩鎮聞之恐其麾下效之以取朝廷之賞必皆恐懼爭為㳟順矣此所謂不戰而屈人兵者也上曰善它日吉甫復於延英盛陳用兵之利且言芻糧金帛皆已有備上顧問絳絳對曰兵不可輕動前年討恒州四面發兵二十萬又發兩神䇿兵自京師赴之天下騷動所費七百餘萬緡訖無成功為天下笑今瘡痍未復人皆憚戰若又以敕命驅之臣恐非直無功或生它變况魏博不必用兵事勢明白願陛下勿疑上奮身撫按曰朕不用兵决矣絳曰陛下雖有是言恐退朝之後復有熒惑聖聽者上正色厲聲曰朕志已决誰能惑之絳乃拜賀曰此社稷之福也既而田懐諫㓜弱軍政皆决於家僮蔣士則數以愛憎移易諸將衆皆憤怒朝命久未至軍中不安田興晨入府士卒數千人大譟環興而拜請為留後興驚仆於地衆不散久之興度不免乃謂衆曰汝肯聽吾言乎皆曰惟命興曰勿犯副大使守朝廷法令申版籍請官吏然後可皆曰諾興乃殺蔣士則等十餘人遷懐諫於外卷終
