front:
  text: 號中軍大將軍開府儀同三司太傅道成以謝朏有重名必欲引參佐命以為左長史嘗置酒與論魏晉故事因曰石苞不早勸晉文死方慟哭方之馮異非知機也朏曰晉文世事魏室必將身終北面借使魏依唐虞故事亦當三讓彌髙道成不悅甲寅以朏為侍中更以王儉為左長史丙辰以給事黄門侍郎蕭長懋為雍州刺史二月丙子邵陵殤王友卒辛巳魏太皇太后及魏主如代郡温泉甲午詔申前命命太傅贊拜不名
  hash: sha256:199e7a032321c0810dd1311deaa90be08f0142dfcfedf1fb3cdce938da7a1582
body:
  text: 己亥魏太皇太后及魏主如西宫三月癸卯朔日有食之甲辰以太傅為相國揔百揆封十郡為齊公加九錫其驃騎大將軍楊州牧南徐州刺史如故乙巳詔齊國官爵禮儀竝倣天朝丙午以世子􅄨領南豫州刺史楊運長去宣城郡還家齊公遣人殺之凌源令潘智與運長厚善臨川王綽義慶之孫也綽遣腹心陳讚說智曰君先帝舊人身是宗室近屬如此形勢豈得久全若招合内外計多有從者臺城内人常有此心正苦無人建意耳智即以告齊公庚戌誅綽兄弟及其黨與甲寅齊公受策命赦其境内以石頭為世子宮一如東宫褚淵引何曾自魏司徒為晉丞相故事求為齊官齊公不許以王儉為齊尚書右僕射領吏部儉時年二十八夏四月壬申朔進齊公爵為王增封十郡甲戌武陵王贊卒非疾也丙戌加齊王殊禮進世子爲太子辛卯宋順帝下詔禪位于齊壬辰帝當臨軒不肯出逃于佛蓋之下王敬則勒兵殿庭以板輿入迎帝太后懼自帥閹人索得之敬則啓譬令出引令升車帝收淚謂敬則曰欲見殺乎敬則曰出居别宫耳官先取司馬家亦如此帝泣而彈指曰願後身世世勿復生天王家宫中皆哭帝拍敬則手曰必無過慮當餉輔國十萬錢是日百僚陪位侍中謝朏在直當解璽綬陽為不知曰有何公事傅詔云解璽綬授齊王朏曰齊自應有侍中乃引枕卧傳詔懼使朏稱疾欲取兼人朏曰我無疾何所道遂朝服步出東掖門仍登車還宅乃以王儉為侍中解璽綬禮畢帝乗畫輪車岀東掖門就東邸問今日何不奏鼓吹左右莫有應者右光祿大夫王琨華之從父弟也在晉世已為郎中至是攀車􅆩尾慟哭曰人以夀為歡老臣以夀為戚既不能先驅螻蟻乃復頻見此事嗚咽不自勝百官雨泣司空兼太保禇淵等奉璽綬帥百官詣齊宫勸進王辭讓未受淵從弟前成安太守炤謂淵子賁曰司空今日何在賁曰奉璽綬在齊大司馬門炤曰不知汝家司空將一家物與一家亦復何謂甲午王即皇帝位于南郊還宫大赦改元奉宋順帝為汝隂王優崇之禮皆倣宋初築宫丹楊置兵守衞之宋神主遷汝隂廟諸王皆降為公自非宣力齊室餘皆除國獨置南康華容䓑鄉三國以奉劉穆之王弘何無忌之後除國者凡百二十人二臺官僚依任攝職名號不同員限盈長者别更詳議以褚淵為司徒賔客賀者滿座禇炤歎曰彦回少立名行何意狓猖至此門戸不幸乃復有今日之拜使彦回作中書郎而死不當為一名士邪名徳不昌乃復有期頥之夀淵固辭不拜奉朝請河東裴顗上表數帝過惡掛冠徑去帝怒殺之太子頥請殺謝朏帝曰殺之遂成其名正應容之度外耳久之因事廢于家帝問爲政於前撫軍行參軍沛國劉瓛對曰政在孝經凡宋氏所以亡陛下所以得者皆是也陛下若戒前車之失加之以寛厚雖危可安若循其覆轍雖安必危矣帝歎曰儒者之言可寳萬世丙申魏主如崞山丁酉以太子詹事張緒為中書令齊國左衞將軍陳顯達為中䕶軍右衞將軍李安民為中領軍緒岱之子兄也戊戌以荆州刺史嶷為尚書令驃騎大將軍開府儀同三司楊州刺史帝命群臣各言得失淮南宣城二郡太守劉善明請除宋氏大明泰始以來諸苛政細制以崇簡易又以為交州險逺宋末政苛遂至怨叛今大化創始宜懐以恩徳且彼􅁟所出唯有珠寳實非聖朝所須之急討伐之事謂宜且停給事黄門郎清河崔祖思亦上言以為人不學則不知道此悖逆禍亂所由生也今無員之官空受祿秩彫耗民財宜開文武二學課臺府州國限外之人各從所樂依方習業若有廢惰者遣還故郡經藝優殊者待以不次又今陛下雖履節儉而群下猶安習侈靡宜褒進朝士之約素清修者貶退其驕奢荒淫者則風俗可移矣宋元嘉之世凡事皆責成郡縣世祖徵求急速以郡縣遲緩始臺使督之自是使者所在旁午競作威福營私納賂公私勞擾㑹稽太守聞喜公子良上表極陳其弊以為臺有求須但明下詔敕為之期㑹則人思自竭若有稽違自依紏坐之科今雖臺使盈湊㑹取正屬所辦徒相疑憤反更淹懈宜悉停臺使員外散騎郎劉思効上言宋自大明以來漸見雕弊徴賦有加而天府尤貧小民嗷嗷殆無生意而貴族富室以侈麗相髙乃至山澤之民不敢采食其水草陛下宜一新王度革正其失上皆加褒賞或以表付外使有司詳擇所宜奏行之己亥詔二宫諸王悉不得營立屯邸封略山湖魏主還平城魏秦州刺史尉洛侯雍州刺史宜都王目辰長安鎮將陳提等皆坐貪殘不法洛侯目辰伏誅提徙邊又詔以候官千數重罪受賕不列輕罪吹毛發舉宜悉罷之更置謹直者數百人使防邏街衢執喧鬪而已自是吏民始得安業自泰始以來内外多虞將帥各募部曲屯聚建康李安上表以自非淮北常備外餘軍悉皆輸遣若親近宜立隨身者聽限人數上從之五月辛亥詔断衆募壬子上賞佐命之功禇淵王儉等進增爵戸各有差處士何㸃謂人曰我作齊書已竟賛云淵既世族儉亦國華不頼舅氏遑卹國家㸃尚之之孫也淵母宋始安公主繼母吳郡公主又尚巴西公主儉母武康公主又尚陽羨公主故㸃云然己未或走馬過汝隂王之門衛士恐有為亂者奔入殺王而以疾聞上不罪而賞之辛酉殺宋宗室隂安公爕等無少長皆死前豫州刺史劉澄之遵考之子也與禇淵善淵為之固請曰澄之兄弟不武且於劉宗又踈故遵考之族獨得免丙寅追尊皇考曰宣皇帝皇妣陳氏曰孝皇后丁卯封皇子鈞為衡陽王上謂兖州刺史垣崇祖曰吾新得天下索虜必以納劉昶為辭侵犯邊鄙壽陽當虜之衝非卿無以制此虜也乃徙崇祖為豫州刺史六月丙子誅游擊將軍姚道和以其貳於沈攸之也甲子立太子􅄨為皇太子皇子嶷為豫章王映為臨川王暠為安成王鏘為鄱陽王鑠為桂陽王鑑為廣陵王皇孫長懋為南郡王乙酉葬宋順帝于遂寜陵帝以建康居民舛雜多姦盜欲立符伍以相檢括右僕射王儉諫曰京師之地四方輻凑必也持符於事既煩理成不曠謝安所謂不爾何以為京師也乃止初交州刺史李長仁卒從弟叔獻代領州事以號令未行遣使求刺史於宋宋以南海太守沈煥為交州刺史以叔獻為煥寜逺司馬武平新昌二郡太守叔獻旣得朝命人情服從遂發兵守烏奴與白水氐楊成等冦梁州梁州刺史范柏年說降烏奴擊楊成等破之及沈攸之事起柏年遣兵出魏興聲云入援實候望形勢事平朝廷遣王玄邈代之詔柏年與烏奴俱下烏奴勸柏年不受代柏年計未决玄邈已至柏年乃留烏奴於漢中還至魏興盤桓不進左衛率豫章胡諧之嘗就柏年求馬柏年曰馬非狗也安能應無已之求待使者甚薄使者還語諧之曰柏年云胡諧之何物狗所求無厭諧之恨之譖於上曰柏年恃險聚衆欲專據一州上使雍州刺史南郡王長懋誘柏年啓為府長史柏年至襄陽上欲不問諧之曰見虎格得而縱上山乎甲午賜柏年死李烏奴叛入氐依楊文弘引氐兵千餘人冦梁州陷白馬戌王玄邈使人詐降誘烏奴烏奴輕兵襲州城玄邈伏兵邀擊大破之烏奴挺身復走入氐初玄邈為青州刺史上在淮隂為宋太宗所疑欲北附魏遣書結玄邈玄邈長史清河房叔安曰將軍居方州之重無故舉忠孝而弃之三齊之士寜蹈東海而死耳不敢隨將軍也玄邈乃不荅上書及罷州還至淮隂嚴軍直過至建康啓太宗稱上有異志及上為驃騎引為司馬玄邈甚懼而上待之如初及破烏奴上曰玄邈果不負吾意遇也叔安為寜蜀太守上賞其忠正欲用為梁州會病卒十一月辛亥立皇太子妃裴氏癸丑魏遣假梁郡王嘉督二將出淮隂隴西公琛督三將出廣陵河東公薛虎子督三將出夀陽奉丹楊王劉昶入冦許昶以克復舊業世胙江南稱藩于魏蠻酋桓誕請為前驅以誕為南征西道大都督義陽民謝天盖自稱司州刺史欲以州附魏魏樂陵鎮將韋珍引兵渡淮應接豫章王嶷遣中兵參軍蕭恵㓪將二千人助司州刺史蕭景先討天盖韋珍略七千餘户而去景先上之從子也南兖州刺史王敬則聞魏將濟淮委鎮還建康士民驚散既而魏竟不至上以其功臣不問上之輔宋也遣驍騎將軍王洪範使柔然約與共攻魏洪範自蜀出吐谷渾歴西域乃得逹至是柔然十餘萬冦魏至塞上而還是嵗魏詔中書監髙允議定律令允雖篤老而志識不衰詔以允家貧養薄令樂部絲竹十人五日一詣允以娛其志朝晡給膳朔望致牛酒月給衣服綿絹入見則備几杖問以政治契丹莫賀弗勿干帥部落萬餘口入附于魏居白狼水東二年春正月戊戌朔大赦以司空禇淵為司徒尚書右僕射王儉為左僕射淵不受辛丑上祀南郊魏隴西公琛等攻㧞馬頭戍殺太守劉從乙卯詔内外纂嚴發兵拒魏徴南郡王長懋為中軍將軍鎮石頭魏廣川王略卒魏師攻鍾離徐州刺史崔文仲擊破之文仲遣軍主崔孝伯渡淮攻魏茌眉戍主龍得侯等殺之文仲祖思之族人也羣蠻依阻山谷連帶荆湘雍郢司五州之境聞魏師入宼官盡發民丁南襄城蠻秦逺乗虛宼潼陽殺縣令司州蠻引魏兵冦平昌平昌戍主荀元賔擊破之北上黄蠻文勉徳冦汶陽汶陽太守戴元賔弃城奔江陵豫章王嶷遣中兵參軍劉伾緒將千人討之至當陽勉徳請降秦逺遁去魏將薛道標引兵趣夀陽上使齊郡太守劉懐慰作冠軍將軍薛淵書以招道標魏人聞之召道標還使梁郡王嘉代之懐慰乗民之子也二月丁卯朔嘉與劉昶冦夀陽將戰昶四向拜將士流涕縱横曰願同戮力以雪讎恥魏步騎號二十萬豫州刺史垣崇祖集文武議之欲治外城堰肥水以自固皆曰昔佛狸入冦南平王士卒完盛數倍於今猶以郭大難守退保内城且自有肥水未嘗堰也恐勞而無益崇祖曰若弃外城虜必據之外修樓櫓内築長圍則坐成擒矣守郭築堰是吾不諌之策也乃於城西北堰肥水堰北築小城周為深塹使數千人守之曰虜見城小以為一舉可取必悉力攻之以謀破堰吾縱水衝之皆爲流尸矣魏人果蟻附攻小城崇祖著白沙㡌肩輿上城晡時决堰下水魏攻城之衆漂墜塹中人馬溺死以千數魏師退走謝天蓋部曲殺天蓋以降宋自孝建以來政綱㢮紊簿籍訛謬上詔黄門郎會稽虞玩之等更加檢定曰黄籍民之大紀國之治端自頃巧偽日甚何以釐革玩之上表以為元嘉中故光禄大夫􅀓隆年出七十猶手自書籍躬加隱校今欲求治取正必在勤明令長愚謂宜以元嘉二十七年籍為正更立明科一聽首悔迷而不返依制必戮若有虚昧州縣同科上從之上以羣蠻數為叛亂分荆益置巴州以鎮之壬申以三巴校尉明慧昭為巴州刺史領巴東太守是時齊之境内有州二十三郡三百九十縣千四百八十五乙酉崔文仲遣軍主陳靖拔魏竹邑殺戍主白仲都崔叔延破魏睢陵殺淮陽太守梁惡三月丁酉朔以侍中西昌侯鸞為郢州刺史鸞帝兄始安貞王道生之子也早孤為帝所養恩過諸子魏劉昶以雨水方降表請還師魏人許之丙午遣車騎大將軍馮熈將兵迎之夏四月辛巳魏主如白登山五月丙申朔如火山壬寅還平城自晉以來建康宫之外城唯設竹籬而有六門㑹有發白虎樽者言白門三重關竹籬穿不完上感其言命改立都牆李烏奴數乗間出冦梁州豫章王嶷遣中兵參軍王圖南將益州兵從劒閣掩擊之梁南秦二州刺史崔慧景發梁州兵屯白馬與圖南覆背擊烏奴大破之烏奴走保武興慧景祖思之族人也秋七月辛亥魏主如火山戊午皇太子穆妃裴氏卒詔南郡王長懋移鎮西州角城戍主舉城降魏秋八月丁酉魏遣徐州刺史梁郡王嘉迎之又遣平南將軍郎大檀等三將出胊城將軍白吐頭等二將出海西將軍元泰等二將出連口將軍封延等三將出角城鎮南將軍賀羅出下蔡同入冦甲辰魏主如方山戊申遊武州山石窟寺庚戌還平城崔慧景遣長史裴叔保攻李烏奴於武興為氐王楊文弘所敗九月甲午朔日有食之丙午柔然遣使來聘汝南太守常元真龍驤將軍胡青苟降於魏閏月辛巳遣領軍李安民循行清泗諸戍以備魏魏梁郡王嘉帥衆十萬圍朐山胊山戍主玄元度嬰城固守青冀二州刺史范陽盧紹之遣子奐將兵助之庚寅元度大破魏師臺遣軍主崔靈建等將萬餘人自淮入海夜至各舉兩炬魏師望見遁去冬十月王儉固請解選職許之加儉侍中以大子詹事何戢領選上以戢資重欲加常侍褚淵曰聖㫖每以蟬冕不宜過多臣與王儉既已左珥若復加戢則八座遂有三貂若帖以驍游亦為不少乃以戢為吏部尚書加驍騎將軍甲辰以沙州刺史楊廣香為西秦州刺史又以其子炅為武都太守丁未魏以昌黎王馮熈為西道都督與征南將軍桓誕出義陽鎮南將軍賀羅出鍾離入冦淮北四州民不樂屬魏常思歸江南上多遣間諜誘之於是徐州民桓標之兖州民徐猛子等所在蠭起為冦盜聚衆保伍固推司馬朗之為主魏遣淮陽王尉元平南將軍薛虎子等討之十一月戊寅丹楊尹王僧䖍上言郡縣獄相承有上湯殺囚名為救疾實行􅁈暴豈有死生大命而濳制下邑愚謂囚病必先刺郡求職司與醫對共診驗逺縣家人省視然後處治上從之戊子以楊難當之孫後起為北秦州刺史武都王鎮武興十二月戊戌以司空褚淵為司徒淵入朝以腰扇障日征虜功曹劉祥從側過曰作如此舉止羞面見人扇障何益淵曰寒士不遜祥曰不能殺袁劉安得免寒士祥穆之之孫也祥好文學而性韻剛踈撰宋書譏斥禪代王儉密以聞坐徙廣州而卒太子宴朝臣於玄圃右衛率沈文季與褚淵語相失文季怒曰淵自謂忠臣不知死之日何面目見宋明帝太子笑曰沈率醉矣壬子以豫章王嶷爲中書監司空楊州刺史以臨川王映爲都督荆雍等九州諸軍事荆州刺史是歲魏尚書令王叡進爵中山王加鎮東大將軍置王官二十二人以中書侍郎鄭羲為􅀓郎中令以下皆當時名士又拜叡妻丁氏為妃三年春正月封皇子鋒為江夏王魏人冦淮陽圍軍主成買於甬城上遣領軍將軍李安民為都督與軍主周盤龍等救之魏人緣淮大掠江北民皆驚走渡江成買力戰而死盤龍之子奉叔以二百人陷陳深入魏以萬餘騎張左右翼圍之或告盤龍云奉叔已没盤龍馳馬奮矟直突魏陳所向披靡奉叔已出復入求盤龍父子兩騎縈擾魏數萬之衆莫敢當者魏師遂敗殺傷萬計魏師退李安民等引兵追之戰於孫溪渚又破之己卯魏主南廵司空苟頹留守丁亥魏主至中山二月辛卯朔魏大赦丁酉游擊將軍桓康復敗魏師於淮陽進攻樊諧城拔之魏主自中山如信都癸卯復如中山庚戍還至肆州沙門法秀以妖術惑衆謀作亂於平城苟頽帥禁兵收掩悉擒之魏主還平城有司囚法秀加以籠頭鐵鎻無故自解魏人穿其頸骨祝之曰若果有神當令穿肉不入遂穿以徇三日乃死議者或欲盡殺道人馮太后不可乃止垣崇祖之敗魏師也恐魏復冦淮北乃徙下蔡戍於淮東既而魏師果至欲攻下蔡聞其内徙欲夷其故城己酉崇祖引兵渡淮擊魏大破之殺獲千計晉宋之際荆州刺史多不領南蠻校尉别以重人居之豫章王嶷為荆湘二州刺史領南蠻嶷罷更以侍中王奐為之奐固辝曰西土戎燼之後痍毁難復今復割撤太府制置偏校崇望不足助彊語實交能相弊且資力既分職司增廣衆勞務倍文桉滋煩竊以為國訃非允癸丑罷南蠻校尉官三月辛酉朔魏主如肆州己巳還平城魏法秀之亂事連蘭臺御史張求等百餘人皆以反法當族尚書令王叡請誅首惡宥其餘黨乃詔應誅五族者降為三族三族者門誅門誅止其身所免千餘人夏四月己亥魏主如方山馮太后樂其山川曰它日必葬我於是不必祔山陵也乃為太后作夀陵又建永固石室於山上欲以為廟桓標之等有衆數萬寨險求援庚子詔李安民督諸將往迎之又使兖州刺史周山圖自淮入清倍道應接淮北民桓磊磈破魏師於抱犢固李安民赴救遲留標之等皆為魏所滅餘衆得南歸者尚數千家魏人亦掠三萬餘口歸平城魏任城康王雲卒五月壬戌鄧至王像舒遣使入貢于魏鄧至者羗之别種國於宕昌之南六月壬子大赦甲辰魏中山宣王王叡卒叡疾病太皇太后魏主屢至其家視疾及卒贈太宰立廟於平城南文士為叡作哀詩及誄者百餘人及葬自稱親姻義舊縗絰哭送者千餘人魏主以叡子中散大夫襲代叡為尚書令領吏部曹戊午魏封皇叔簡為齊郡王猛為安豐王秋七月己未朔日有食之上使後軍參軍車僧朗使於魏甲子僧朗至平城魏主問曰齊輔宋日淺何故遽登大位對曰虞夏登庸身陟元后魏晉匡輔貽厥子孫時宜各異耳辛酉柔然别帥他稽帥衆降魏楊文弘遣使請降詔復以為北秦州刺史先是楊廣香卒其衆半奔文弘半奔梁州文弘遣楊後起進據白水上雖授以官爵而隂敕晉夀太守楊公則使伺便圖之宋昇明中遣使者殷靈誕荀昭先如魏聞上受禪靈誕謂魏典客曰宋魏通好憂患是同宋今滅亡魏不相救何用和親及劉昶入冦靈誕請為昶司馬不許九月庚午魏閱武於南郊因宴群臣置車僧朗於靈誕下僧朗不肯就席曰靈誕昔為宋使今為齊民乞魏主以禮見處靈誕遂與相忿詈劉昶賂宋降人解奉君於㑹刺殺僧朗魏人收奉君誅之厚送僧朗之䘮并靈誕等南歸及世祖即位昭先具以靈誕之語啓聞靈誕坐下獄死辛未柔然主遣使來聘與上書謂上為足下自稱曰吾遺上師子皮袴褶約共伐魏魏尉元蔚虎子克五固斬司馬朗之東南諸州皆平尉元入為侍中都曹尚書薛虎子為彭城鎮將遷徐州刺史時州鎮戍兵資絹自隨不入公庫虎子上表以為國家欲取江東先須積穀彭城切惟在鎮之兵不減数萬資糧之絹人十二匹用度無凖未及代下不免飢寒公私損費今徐州良田十萬餘頃水陸肥沃清汴通流足以溉灌若以兵絹市牛可得萬頭興置屯田一嵗之中且給官食半兵芸殖餘兵屯戍且耕且守不妨捍邊一年之收過於十倍之絹蹔時之耕足充數載之食於後兵資皆貯公庫五稔之後穀帛俱溢非直戍卒豐飽亦有吞敵之勢魏人從之虎子為政有惠愛兵民懐之㑹沛郡太守邵安下邳太守張攀以􅂍汙為虎子所案各遣子上書告虎子與江南通魏主曰虎子必不然推桉果虛詔安攀皆賜死二子各鞭一百吐谷渾王拾寅卒世子度易侯立冬十月戊子朔以度易侯為西秦河二州刺史河南王魏中書令高閭等更定新律成凡八百三十二章門房之誅十有六大辟二百三十五雜刑三百七十七初高昌王闞伯周卒子義成立是嵗其從兄首歸殺義成自立高車王可至羅殺首歸兄弟以敦煌張明為高昌王國人殺明立馬儒為王四年春正月壬戌詔置斈生二百人以中書令張緒為國子祭酒甲戌魏大赦三月庚申上召司徒褚淵尚書左僕射王儉受遺詔輔太子壬戌殂于臨光殿太子即位大赦高帝沉深有大量博斈能文性清儉主衣中有玉導上敇中書曰留此正是興長病源即命擊碎仍桉檢有何異物皆隨此例每曰使我治天下十年當使黄金與土同價乙丑以褚淵錄尚書事王儉為侍中尚書令車騎將軍張敬兒開府儀同三司丁卯以前將軍王奐為尚書左僕射庚午以豫章王嶷為太尉庚辰魏主臨虎圈詔曰虎狼猛暴取捕之日每多傷害既無所益損費良多從今勿復捕貢夏四月庚寅上大行諡曰高皇帝廟號太祖丙午葬秦安陵辛卯追尊穆妃為皇后六月甲申朔立南郡王長懋爲皇太子丙申立太子妃王氏妃琅邪人也封皇子聞喜公子良為竟陵王臨汝公子卿為廬陵王應城公子敬為安陸王江陵公子懋為晉安王枝江公子隆為隨郡王子真為建安王皇孫昭業為南郡王司徒褚淵寢疾自表遜位世祖不許淵固請懇切癸卯以淵為司空領驃騎將軍侍中錄尚書如故秋七月魏發州郡五萬人治靈丘道吏部尚書濟陽江謐性諂躁太祖殂謐恨不豫顧命上即位謐又不遷官以此怨望誹謗㑹上不豫謐詣豫章王嶷請閒曰至尊非起疾東宮又非才公今欲作何計上知之使御史中丞沈冲奏謐前後罪惡庚寅賜謐死癸卯南康文簡公褚淵卒世子侍中賁恥其父失節服除遂不仕以爵讓其弟蓁屏居墓下終身九月丁巳以國哀罷國子學氐王楊文弘卒諸子皆幼乃以兄子後起為嗣九月辛酉魏以後起為武都王文弘子集始為白水太守既而集始自立為王後起擊破之魏以荆州巴氐擾亂以鎮西大將軍李崇為荆州刺史崇顯祖之舅子也將之鎮敕發陜秦二州兵送之崇辭曰邉人失和本怨刺史今奉詔代之自然安靖但須一詔而已不煩發兵自防使之懐懼也魏朝從之崇遂輕將數十騎馳至上洛宣詔慰諭民夷帖然崇命邊戍掠得齊人者悉還之由是齊人亦還其生口二百許人二境交和無復烽燧之警久之徙兖州刺史兖土舊多劫盜崇命村置一樓樓皆懸鼓盜發之處亂擊之旁村始聞者以一擊為節次二次三俄頃之間聲布百里皆發人守險要由是盜發無不擒獲其後諸州皆效之自崇始也辛未以征南將軍王僧䖍為左光祿大夫開府儀同三司以尚書右僕射王奐為湘州刺史宋故建平王景素主簿何昌㝢記室王摛及所舉秀才劉璡前後上書陳景素徳美為之訟􅁈冬十月辛丑詔聽以士禮還葬舊瑩璡瓛之弟也十一月魏髙祖將親祀七廟命有司具儀法依古制備牲牢器服及樂章自是四時常祀皆舉之世祖武皇帝上之上永明元年春正月辛亥上祀南郊大赦改元詔以邊境寜晏治民之官普復田秩以太尉豫章王嶷領太子太傅嶷不參朝務而常密獻謀畫上多從之壬戌立皇弟銳為南平王鏗為宜都王皇子子明為武昌王子罕為南海王二月辛巳以征虜將軍楊炅為沙州刺史隂平王辛丑以宕昌王梁彌機為河涼二州刺史鄧至王像舒為西涼州刺史宋末以治民之官六年過久乃以三年為斷謂之小滿而遷換去來又不能依三年之制三月癸丑詔自今一以小滿為限有司以天文失度請禳之上曰應天以實不以文我克己求治思隆恵政若災眚在我禳之何益夏四月壬午詔袁粲劉秉沈攸之雖末節不終而始誠可錄皆命以禮改葬上之為太子也自以年長與太祖同創大業朝事大小率皆專斷多違制度信任左右張景真景真驕侈被服什物僭擬乘輿内外畏之莫敢言者司空諮議荀伯玉素為太祖所親厚歎曰太子所為官終不知豈得畏死蔽官耳目我不啓聞誰當啓者因太子拜陵密以啓大祖太祖怒命檢校東宫太子拜陵還至方山晩將泊舟豫章王嶷自東府乘飛鷰東迎太子告以上怒之意太子夜歸入宫太祖亦停門籥待之明日太祖使南郡王長懋聞喜公子良宣敇詰責并示以景真罪狀使以太子令收景真殺之太子憂懼稱疾月餘太祖怒不解晝卧太陽殿王敬則直入叩頭啟太祖曰官有天下日淺太子無事被責人情恐懼願官徃東宫解釋之太祖無言敬則因大聲宣㫖裝束往東宫又敕太官設饌呼左右索輿太祖了無動意敬則索衣被太祖仍牽强登輿太祖不得已至東宫召諸王宴於玄圃長沙王晃捉華葢臨川王暎執雉尾扇聞喜公子良持酒鎗南郡王長懋行酒太子及豫章王嶷王敬則自捧酒饌至暮盡醉乃還太祖嘉伯玉忠盡愈見親信軍國密事多委使之權動朝右遭母憂去宅二里許冠葢已塞路左率蕭景先侍中王晏共弔之自旦至暮始得前比出飢乏氣息惙然憤悒形於聲貌明日言於太祖曰臣等所見二宫門庭比荀伯玉宅可張雀羅矣晏敬弘之從子也驍騎將軍陳胤叔先亦白景真及太子得失而語太子皆云伯玉以聞太子由是深怨伯玉太祖隂有以豫章王嶷代太子之意而嶷事太子愈謹故太子友愛不衰豫州刺史垣崇祖不親附太子㑹崇祖破魏兵太祖召還朝與之密謀太子疑之曲加禮待謂曰世間流言我已豁懐自今以富貴相付崇祖拜謝㑹太祖復遣荀伯玉敕以邊事受㫖夜發不得辭東宫太子以為不盡誠益銜之太祖臨終指伯玉以屬太子上即位崇祖累遷五兵尚書伯玉累遷散騎常侍伯玉内懐憂懼上以伯玉與崇祖善恐其為變加意撫之丁亥下詔誣崇祖招結江北荒人欲與伯玉作亂皆收殺之庚子魏主如崞山壬寅還宫閏月癸丑魏主後宫平涼林氏生子恂大赦文明太后以恂當為太子賜林氏死自撫養恂五月戊寅朔魏主如武州山石窟佛寺車騎將軍張敬兒好信夢初為南陽太守其妻尚氏夢一手熱如火及為雍州夢一胛熱為開府夢半身熱敬兒意欲無限常謂所親曰吾妻復夢舉體熱矣又自言夢舊村杜樹髙至天上聞而惡之垣崇祖死敬兒内自疑㑹有人告敬兒遣人至蠻中貨易上疑其有異志㑹上於華林園設八關齋朝臣皆預於坐收敬兒敬兒脫冠貂投地曰此物誤我丁酉殺敬兒并其四子敬兒弟恭兒常慮為兄禍所及居於冠軍未甞出襄陽村落深阻牆垣重􅃨敬兒每遣信輒上馬屬鞬然後見之敬兒敗問至席卷入蠻後自出上恕之敬兒女為征北諮議參軍謝超宗子婦超宗謂丹陽尹李安民曰往年殺韓信今年殺彭越尹欲何計安民具啓之上素惡超宗輕慢使兼御史中丞袁彖奏彈超宗丁巳收付廷尉徙越嶲於道賜死以彖語不刻切又使左丞王逡之奏彈彖輕文畧奏橈法容非彖坐免官禁錮十年超宗靈運之孫彖顗之弟子也秋七月丁丑魏主及太后如神淵池甲申如方山魏使假員外散騎常侍頓丘李彪來聘侍中左光祿大夫開府儀同三司王僧䖍固辭開府謂兄子儉曰汝任重於朝行登三事我若復有此授乃是一門有二台司吾實懼焉累年不拜上乃許之戊戌加僧䖍特進儉作長梁齋制度小過僧䖍視之不悅竟不入户儉即日毁之初王􅀪與兄弟集㑹任子孫戯適僧達跳下地作虎子僧綽正坐采蠟燭珠為鳳皇僧達奪取打壞亦復不惜僧䖍累十二博棊既不墜落亦不重作􅀪歎曰僧達俊爽當不減人然恐終危吾家僧綽當以名義見美僧䖍必為長者位至公台已而皆如其言八月庚申驍騎將軍王洪範自柔然還經塗三萬餘里冬十月丙寅遣驍騎將軍劉纘聘於魏魏主客令李安世主之魏人出内藏之寳使賈人鬻之於市纘曰魏金玉大賤當由山川所出安世曰聖朝不貴金玉故賤同瓦礫纘初欲多市聞其言内慙而止纘屢奉使至魏馮太后遂私幸之十二月乙巳朔日有食之癸丑魏始禁同姓為婚王儉進號衛將軍參掌選事是歲省巴州魏秦州刺史于洛侯性殘酷刑人或斷腕拔舌分懸四體合州驚駭州民王元夀等一時俱反有司劾奏之魏主遣使至州於洛侯常刑人處宣告吏民然後斬之齊州刺史韓麒麟為政尚寛從事劉普慶說麒麟曰公杖節方夏而無所誅斬何以示威麒麟曰刑罰所以止惡仁者不得已而用之今民不犯法又何誅乎若必斷斬然後可以立威當以卿應之普慶慚懼而起資治通鑑卷第一百三十五
