body:
  text: 長孫稚行至鄴詔解大都督以河間王琛代之稚上言曏與琛同在淮南琛敗臣全遂成私隙今難以受其節度魏朝不聽前至呼沱稚未欲戰琛不從鮮于脩禮邀擊稚於五鹿琛不赴救稚軍大敗稚琛並坐除名五月丁未魏主下詔将北討内外戒嚴既而不行衡州刺史元略自至江南晨夕哭泣常如居喪及魏元义死胡太后欲召之知略因刁雙獲免徵雙為光禄大夫遣江革祖暅之南還以求略上備禮遣之寵贈甚厚略始濟淮魏拜略為侍中賜爵義陽王以司馬始賔為給事中栗法光為本縣令刁昌為東平太守刁雙為西兖州刺史凡略所過一飱一宿皆賞之魏以丞相髙陽王雍為大司馬復以廣陽王深為大都督討鮮于脩禮章武王融為左都督裴衍為右都督並受深節度深以其子自隨城陽王徽言於太后曰廣陽王攜其愛子握兵在外将有異志乃敕融衍潛為之備融衍以敕示深深懼事無大小不敢自决太后使問其故對曰徽銜臣次骨臣疏逺在外徽之􅌟臣無所不為自徽執政以來臣所表請多不從允徽非但害臣而已從臣将士有勲勞者皆見排抑不得比它軍仍深被憎嫉或因其有罪加以深文至於殊死以是從臣行者莫不悚懼有言臣善者視之如仇讎言臣惡者待之如親戚徽居中用事朝夕欲陷臣於不測之誅臣何以自安陛下若使徽出臨外州臣無内顧之憂庶可以畢命賊庭展其忠力太后不聴徽與中書舍人鄭儼等更相阿黨外似柔謹内實忌克賞罰任情魏政由是愈亂戊申魏燕州刺史崔秉帥衆弃城奔定州乙丑魏以安西将軍宗正珍孫爲都督討汾州反胡六月魏絳蜀陳雙熾聚衆反自號始建王魏以假鎮西将軍長孫稚爲討蜀都督别将河東薛脩義輕騎詣雙熾壘下曉以利害雙熾即降詔以修義爲龍門鎮将丙子魏徙義陽王略爲東平王頃之遷大將軍尚書令爲胡太后所委任與城陽王徽相埒然徐鄭用事略亦不敢違也杜洛周遣都督王曹紇眞等将兵掠薊南秋七月丙午行臺常景遣都督于榮等擊之於栗園大破之斬曹紇眞及将卒三千餘級洛周帥衆南趣范陽景與榮等又破之魏僕射元纂以行臺鎮恒州鮮于阿胡擁朔州流民冦恒州戊申陷平城纂奔冀州上聞淮堰水盛夀陽城幾沒復遣郢州刺史元樹等自北道攻黎漿豫州刺史夏矦亶等自南道攻夀陽八月癸巳賊帥元洪業斬鮮于修禮請降于魏賊黨葛榮復殺洪業自立魏安北將軍都督恒朔討虜諸軍事爾朱榮過肆州肆州刺史尉慶賔忌之據城不出榮怒舉兵襲肆州執慶賔還秀容署其從叔羽生為刺史魏朝不能制初賀拔允及弟勝岳從元纂在恒州平城之陷也允兄弟相失岳奔爾朱榮勝奔肆州榮克肆州得勝大喜曰得卿兄弟天下不足平也以為别将軍中大事多與之謀九月己酉鄱陽忠烈王恢卒葛榮既得杜洛周之衆北趣瀛州魏廣陽忠武王深自交津引兵躡之辛亥榮至白牛邏輕騎掩擊章武莊武王融殺之榮自稱天子國號齊改元廣安深聞融敗停軍不進侍中元晏宣言於太后曰廣陽王盤􅁊不進坐圖非望有于謹者智略過人為其謀主風塵之際恐非陛下之純臣也太后深然之詔牓尚書省門募能獲謹者有重賞謹聞之謂深曰今女主臨朝信用讒侫苟不明白殿下素心恐禍至無日謹請束身詣闕歸罪有司遂徑詣牓下自稱于謹有司以聞太后引見大怒謹備論深忠􅅃兼陳停軍之狀太后意解遂捨之深引軍還趣定州定州刺史楊津亦疑深有異志深聞之止於州南佛寺經二日深召都督毛謚等數人交臂為約危難之際期相拯恤謚愈疑之密告津云深謀不軌津遣謚討深深走出諡呼噪逐深深與左右間行至博陵界逢葛榮遊騎劫之詣榮賊徒見深頗有喜者榮新立惡之遂殺深城陽王徽誣深降賊録其妻子深府佐宋遊道為之訴理乃得釋遊道繇之􅀇孫也甲申魏行臺常景破杜洛周斬其武川王賀拔文興等捕虜四百人就徳興陷魏平州殺刺史王買奴天水民吕伯度本莫折念生之黨也後更據顯親以拒念生已而不勝亡歸胡琛琛以爲大都督秦王資以士馬使擊念生伯度屢破念生軍復據顯親乃叛琛東引魏軍念生窘迫乞降於蕭寶寅寶寅使行臺左丞崔士和據秦州魏以伯度爲涇州刺史封平秦郡公大都督元修義停軍隴口久不進念生復反執士和送胡琛於道殺之久之伯度爲万俟醜奴所殺賊勢益盛寶寅不能制胡琛與莫折念生交通事破六韓拔陵浸慢拔陵遣其臣費律至髙平誘琛斬之醜奴盡并其衆冬十一月庚辰大赦丁貴嬪卒太子水漿不入口上使謂之曰毁不滅性况我在邪乃進粥數合太子體素肥壯􅆎帶十圍至是減削過半夏矦亶等軍入魏境所向皆下辛巳魏揚州刺史李憲以夀陽降宣猛将軍陳慶之入據其城凡降城五十二獲男女七萬五千口丁亥縱李憲還魏復以夀陽為豫州改合肥為南豫州以夏侯亶為南豫二州刺史夀陽久罹兵革民多流散亶輕刑薄賦務農省役頃之民户充復杜洛周圍范陽戊戌民執魏幽州刺史王延年行臺常景送洛周開門納之魏齊州平原民劉樹等反攻陷郡縣頻敗州軍刺史元欣以平原房士達為将討平之曹義宗據穰城以逼新野魏遣都督魏承祖及尚書左丞南道行臺辛纂救之義宗戰不利不敢進纂雄之從父兄也魏盜賊日滋征討不息國用耗竭豫徵六年租調猶不足乃罷百官所給酒肉又税入市者人一錢及邸店皆有税百姓嗟怨吏部郎中辛雄上疏以為夷夏之民相聚為亂豈有餘憾哉正以守令不得其人百姓不堪其命故也宐及此時早加慰撫但郡縣選舉由來共輕貴遊雋才莫肯居此宜改其弊分郡縣為三等清官選補之法妙盡才望如不可並後地先才不得拘以停年三載黜陟有稱職者補在京名官如不歴守令不得為内職則人思自勉枉屈可申彊暴自息矣不聴大通元年春正月乙丑以尚書左僕射徐勉為僕射辛未上祀南郊甲戌魏以司空皇甫度為司徒儀同三司蕭寶寅為司空魏分定相二州四郡置殷州以北道行臺博陵崔楷為刺史楷表稱州今新立尺刃斗糧皆所未有乞資以兵糧詔付外量聞竟無所給或勸楷留家單騎之官楷曰吾聞食人之禄者憂人之憂若吾獨往則将士誰肯固志哉遂舉家之官葛榮逼州城或勸減弱小以避之楷遣幼子及一女夜出既而悔之曰人謂吾心不固虧忠而全愛也遂命追還賊至彊弱相懸又無守禦之具楷撫勉将士以拒之莫不争奮皆曰崔公尚不惜百口吾屬何愛一身連戰不息死者相枕終無叛志辛未城陷楷執節不屈榮殺之遂圍冀州魏蕭寶寅出兵累年将士疲弊秦賊擊之寶寅大敗於涇州收散兵萬餘人屯逍遥園東秦州刺史潘義淵以汧城降賊莫折念生進逼岐州城人執刺史魏蘭根應之豳州刺史畢祖暉戰沒行臺羊深弃城走北海王顥軍亦敗賊帥胡引祖據北華州叱干麒麟據豳州以應天生闗中大擾雍州刺史楊椿募兵得七千餘人帥以拒守詔加椿侍中兼尚書右僕射為行臺節度闗西諸将北地功曹毛鴻賔引賊抄掠謂北雍州録事參軍楊侃将兵三千掩擊之鴻賔懼請討賊自効遂擒送宿勤烏過仁烏過仁者明達之兄子也莫折天生乗勝冦雍州蕭寶寅部将羊侃隠身塹中射之應􅁌而斃其衆遂潰侃祉之子也魏右民郎陽平路思令上疏以為師出有功在於将帥得其人則六合唾掌可清失其人則三河方為戰地竊以比年将帥多寵貴子孫銜杯躍馬志逸氣浮軒眉攘腕以攻戰自許及臨大敵憂怖交懐雄圖鋭氣一朝頓盡乃令羸弱在前以當冦彊壯居後以衛身兼復器械不精進止無節以當負險之衆敵數戰之虜欲其不敗豈可得哉是以兵知必敗始集而先逃将帥畏敵遷延而不進國家謂官爵未滿屢加寵命復疑賞賚之輕日散金帛帑藏空竭民財殫盡遂使賊徒益甚生民彫弊凡以此也夫徳可感義夫恩可勸死士今若黜陟幽明賞罰善惡簡練士卒繕修器械先遣辯士曉以禍福如其不悛以順討逆如此則何異勵蕭斧而伐朝菌鼓洪爐而燎毛髮哉弗聽􅊨戊子魏以皇甫度為太尉己丑魏主以四方未平詔内外戒嚴将親出討竟亦不行譙州刺史湛僧智圍魏東豫州将軍彭羣王辯圍琅邪魏敕青南青二州救琅邪司州刺史夏矦䕫帥壯武将軍裴之禮等出義陽道攻魏平静穆陵隂山三闗皆克之䕫亶之弟之禮邃之子也魏東清河郡山賊羣起詔以齊州長史房景伯為東清河太守郡民劉簡虎嘗無禮於景伯舉家亡去景伯窮捕擒之署其子為西曹掾令諭山賊賊以景伯不念舊惡皆相帥出降景伯母崔氏通經有明識貝丘婦人列其子不孝景伯以白其母母曰吾聞聞名不如見面山民未知禮義何足深責乃召其母與之對榻共食使其子侍立堂下觀景伯供食未旬日悔過求還崔氏曰此雖面慙其心未也且置之凡二十餘日其子叩頭流血母涕泣乞還然後聴之卒以孝聞景伯法夀之族子也二月秦賊據魏潼闗庚申魏東郡民趙顯徳反殺太守裴烟自號都督将軍成景儁攻魏彭城魏以前荆州刺史崔孝芬為徐州行臺以禦之先是孝芬坐元义黨與盧同等俱除名及将赴徐州入辭太后太后謂孝芬曰我與卿姻戚柰何内頭元义車中稱此老嫗會須去之孝芬曰臣䝉國厚恩實無斯語假令有之誰能得聞若有聞者此於元义親密過臣逺矣太后意解悵然有愧色景儁欲堰泗水以灌彭城孝芬與都督李叔仁等擊之景儁遁還三月甲子魏主詔将西討中外戒嚴會奏賊西走復得潼闗戊辰詔回駕北討其實皆不行葛榮久圍信都魏以金紫光禄大夫源子邕爲北討大都督以敕之初上作同泰寺又開大通門以對之取其反語相協上晨夕幸寺皆出入是門辛未上幸寺捨身甲戌還宫大赦改元魏齊州廣川民劉鈞聚衆反自署大行臺清河民房湏自署大都督屯據昌國城夏四月魏将元斌之討東郡斬趙顯徳己酉柔然頭兵可汗遣使入貢於魏且請討羣賊魏人畏其反覆詔以盛暑且俟後敕魏蕭寳寅之敗也有司處以死刑詔免爲庶人雍州刺史楊椿有疾求解復以寶寅為都督雍涇等四州諸軍事征西将軍雍州刺史開府儀同三司西討大都督自闗以西皆受節度椿還鄉里其子昱将適洛陽椿謂之曰當今雍州刺史亦無踰寶寅者但其上佐朝廷應遣心膂重人何得任其牒用此乃聖朝百慮之一失也且寶寅不藉刺史為榮吾觀其得州喜悦特甚至於賞罰云為不依常憲恐有異心汝今赴京師當以吾此意啟二聖并白宰輔更遣長史司馬防城都督欲安關中正須三人耳如其不遣必成深憂昱面啟魏主及太后皆不聴五月丙寅成景儁攻魏臨潼竹邑拔之東宫直閤蘭欽攻魏蕭城厥固拔之欽斬魏将曹龍牙六月魏都督李叔仁討劉鈞平之秋七月魏陳郡民劉獲鄭辯反於西華改元天授與湛僧智通謀魏以行東豫州刺史譙國曹世表為東南道行臺以討之源子恭代世表為東豫州諸将以賊衆彊官軍弱且皆敗散之餘不敢戰欲保城自固世表方病背腫轝出呼統軍是云寶謂曰湛僧智所以敢深入為冦者以獲辯皆州民之望為之内應也曏聞獲引兵欲迎僧智去此八十里今出其不意一戰可破獲破則僧智自走矣乃選士馬付寶暮出城比曉而至擊􅀗大破之窮討餘黨悉平僧智聞之遁還鄭辯與子恭親舊亡匿子恭所世表集将吏面責子恭收辯斬之魏相州刺史樂安王鑒與北道都督裴衍共救信都鑒幸魏多故隂有異志遂據鄴叛降葛榮己丑魏大赦初侍御史遼東髙道穆奉使相州前刺史李世哲奢縱不法道穆案之世哲弟神軌用事道穆兄謙之家奴訴良神軌收謙之繫廷尉赦将出神軌啟太后先賜謙之死朝士哀之彭羣王辯圍琅邪自春及秋魏青州刺史彭城王劭遣司馬鹿悆南青州刺史胡平遣長史劉仁之将兵擊羣辯破之羣戰沒劭􅎰之子也八月魏遣都督源子邕李神軌裴衍攻鄴子邕行及湯隂安樂王鑒遣弟斌之夜襲子邕營不克子邕乗勝進圍鄴城丁未拔之斬鑒傳首洛陽改姓拓跋氏魏因遣子邕裴衍討葛榮九月秦州城民杜粲殺莫折念生闔門皆盡粲自行州事南秦州城民辛琛亦自行州事遣使詣蕭寶寅請降魏復以寶寅為尚書令還其舊封譙州刺史湛僧智圍魏東豫州刺史元慶和於廣陵魏将軍元顯伯救之司州刺史夏矦䕫自武陽引兵助僧智冬十月䕫至城下慶和舉城降䕫以讓僧智僧智曰慶和欲降公不欲降僧智今往必乖其意且僧智所将應募烏合之人不可御以法公持軍素嚴必無侵暴受降納附深得其宜䕫乃登城拔魏幟建梁幟慶和束兵而出吏民安堵獲男女四萬餘口臣光曰湛僧智可謂君子矣忘其積時攻戰之勞以授一朝新至之将知己之短不掩人之長功成不取以濟國事忠且無私可謂君子矣元顯伯宵遁諸軍追之斬獲萬計詔以僧智領東豫州刺史鎮廣陵䕫引軍屯安陽遣别将屠楚城由是義陽北道遂與魏絶領軍曹仲宗東宫直閤陳慶之攻魏渦陽詔尋陽太守韋放将兵會之魏散騎常侍費穆引兵奄至放營壘未立麾下止有二百餘人放免胄下馬據胡牀處分士皆殊死戰莫不一當百魏兵遂退放叡之子也魏又遣将軍元昭等衆五萬救渦陽前軍至駝澗去渦陽四十里陳慶之欲逆戰韋放以魏之前鋒必皆輕鋭不如勿擊待其來至慶之曰魏兵逺來疲倦去我既逺必不見疑及其未集須挫其氣諸軍若疑慶之請獨取之於是帥麾下二百騎進擊破之魏人驚駭慶之乃還與諸将連營而進背渦陽城與魏軍相持自春至冬數十百戰将士疲弊聞魏人欲築壘於軍後曹仲宗等恐腹背受敵議引軍還慶之杖節軍門曰共來至此涉歴一嵗糜費極多今諸君皆無鬬心唯謀退縮豈是欲立功名直聚為抄暴耳吾聞置兵死地乃可求生須虜大合然後與戰審欲班師慶之别有密敕今日犯者當依敕行之仲宗等乃止魏人作十三城欲以控制梁軍慶之銜枚夜出陷其四城渦陽城主王緯乞降韋放簡遣降者三十餘人分報魏諸營陳慶之陳其俘馘鼓譟隨之魏九城皆潰追擊之俘斬略盡尸咽渦水所降城中男女三萬餘口蕭寶寅之敗於涇州也或勸之歸罪洛陽或曰不若留闗中立功自効行臺都令史河間馮景曰擁兵不還此罪將大寶寅不從自念出師累年糜費不貲一旦覆敗内不自安魏朝亦疑之中尉酈道元素名嚴猛司州牧汝南王悦嬖人丘念弄權縱恣道元收念付獄悦請之於胡太后太后敕赦之道元殺之并以劾悦時寶寅反狀已露悦乃奏以道元為闗右大使寶寅聞之謂為取已甚懼長安輕薄子弟復勸使舉兵寶寅以問河東栁楷楷曰大王齊明帝子天下所屬今日之舉實允人望且謡言鸞生十子九子􅖁一子不􅖁闗中亂亂者治也大王當治闗中何所疑道元至隂盤驛寶寅遣其将郭子恢攻殺之收殯其尸表言白賊所害又上表自理稱為楊椿父子所譖寶寅行臺郎中武功蘇湛卧病在家寶寅令湛從母弟開府屬天水姜儉説湛曰元略受蕭衍㫖欲見勦除道元之來事不可測吾不能坐受死亡今須為身計不復作魏臣矣死生榮辱與卿共之湛聞之舉聲大哭儉遽止之曰何得便爾湛曰我百口今屠滅云何不哭哭數十聲徐謂儉曰為我白齊王王本以窮鳥投人頼朝廷假王羽翼榮寵至此屬國步多虞不能竭忠報徳乃欲乗人間隙信惑行路無識之語欲以羸敗之兵守闗問鼎今魏徳雖衰天命未改且王之恩義未洽於民但見其敗未見有成蘇湛不能以百口為王族滅寶寅復使謂曰我救死不得不爾所以不先相白者恐沮吾計耳湛曰凡謀大事當得天下奇才與之從事今但與長安愽徒謀之此有成理不湛恐荆棘必生於齋閤願賜骸骨還鄉里庶得病死下見先人寶寅素重湛且知其不為己用聴還武功甲寅寶寅自稱齊帝改元隆緒赦其所部置百官都督長史毛遐鴻賔之兄也與鴻賔帥氐羌起兵於馬祇柵以拒寶寅寶寅遣大将軍盧祖遷擊之為遐所殺寶寅方祀南郊行即位禮未畢聞敗色變不暇整部伍狼狽而歸以姜儉為尚書左丞委以心腹文安周惠達為寶寅使在洛陽有司欲收之惠達逃歸長安寶寅以惠達為光禄勲丹楊王蕭贊聞寶寅反懼而出走趣白鹿山至河橋為人所􅀗魏主知其不預謀釋而慰之行臺郎封偉伯等與闗中豪桀謀舉兵誅寶寅事泄而死魏以尚書僕射長孫稚為行臺以討寶寅正平民薛鳳賢反宗人薛脩義亦聚衆河東分據鹽池攻圍蒲坂東西連結以應寶寅詔都督宗正珍孫討之十一月丁卯以䕶軍蕭淵藻為北討都督鎮渦陽戊辰以渦陽置西徐州葛榮圍魏信都自春及冬冀州刺史元孚帥勵将士晝夜拒守糧儲既竭外無救援己丑城陷榮執孚逐出居民凍死者什六七孚兄祐為防城都督榮大集将士議其生死孚兄弟各自引咎争相為死都督潘紹等數百人皆叩頭請就法以活使君榮曰此皆魏之忠臣義士於是同禁者五百人皆得免魏以源子邕為冀州刺史将兵討榮裴衍表請同行詔許之子邕上言衍行臣請留臣行請留衍若逼使同行敗在旦夕不許十二月戊申行至陽平東北漳水曲榮帥衆十萬擊之子邕衍俱敗死相州吏民聞冀州巳陷子邕等敗人不自保相州刺史恒農李神志氣自若撫勉将士大小致力葛榮盡鋭攻之卒不能克秦州民駱超殺杜粲請降於魏資治通鑑卷第一百五十一
