front:
  text: 人請深為刺史徽言深心不可測及杜洛周反五原降户在恒州者謀奉深為主深懼上書求還洛陽魏以左衛将軍楊津代深為北道大都督詔深為吏部尚書徽長夀之孫也五原降户鮮于修禮等帥北鎮流民反於定州之左城改元魯興引兵向州城州兵禦之不利楊津至靈丘聞定州危迫引兵救之入據州城修禮至津欲出擊之長史許被不聴津手劒擊之被走得免津開門出戰斬首數百賊退人心少安詔尋以津為定州刺史兼北道行臺魏以揚州刺史長孫稚為大都督北討諸軍事與河間王琛共討修禮二月甲戌北伐衆軍解嚴魏西部敕勒斛律洛陽反於桑乾西與費也頭牧子相連結三月甲寅游擊将軍爾朱榮擊破洛陽於深井牧子於河西夏四月乙酉臨川靖惠王宏卒魏大赦癸巳魏以侍中車騎大将軍城陽王徽為儀同三司徽與給事黄門侍郎徐紇共毁侍中元順於太后出為䕶軍将軍太常卿順奉辭於西遊園紇侍側順指之謂太后曰此魏之宰噽魏國不亡此終不死紇脅肩而出順抗聲叱之曰爾刀筆小才正堪供几案之用豈應汙辱門下斁我彞倫因振衣而起太后黙然魏朔州城民鮮于阿胡等據城反杜洛周南出鈔掠薊城魏常景遣統軍梁仲禮擊破之丁未都督李琚與洛周戰於薊城之北敗沒常景帥衆拒之洛周引還上谷
