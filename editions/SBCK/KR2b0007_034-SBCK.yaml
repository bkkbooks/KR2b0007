front:
  text: 資治通鑑卷第三十四
  hash: sha256:8f35fd4e7a218b469812ef99e970822d8ce197a77265bc83e7fd861e0758cd68
body:
  text: 臣司馬光奉勑編集漢紀二十六雍敦牂凡三年起柔兆執徐盡著孝哀皇帝中建平二年春正月有星孛于牽牛丁傅宗族驕奢皆嫉傅喜之恭儉又傅太后欲求稱尊號與成帝母齊尊喜與孔光師丹共執以為不可上重違大臣正議又内迫傅太后依違者連嵗傅太后大怒上不得已先免師丹以感動喜喜終不順朱博與孔鄉矦傅晏連結共謀成尊號事數燕見奏封事毀短喜及孔光丁丑上遂䇿免喜以矦就第御史大夫官既罷議者多以為古今異制漢自天子之號下至佐史皆不同於古而獨改三公職事難分明無益於治亂於是朱博奏言故事選郡國守相髙第為中二千石選中二千石為御史大夫任職者為丞相位次有序所以尊聖徳重國相也今中二千石未更御史大夫而為丞相權輕非所以重國政也臣愚以為大司空官可罷復置御史大夫遵奉舊制臣願盡力以御史大夫為百僚率上從之夏四月戊午更拜博為御史大夫又以丁太后兄陽安侯明為大司馬衛将軍置官屬大司馬冠號如故事傅太后又自詔丞相御史大夫曰高武侯喜附下罔上與故大司空丹同心背畔放命圯族不宜奉朝請其遣就國丞相孔光自先帝時議繼嗣有持異之隙又重忤傅太后指由是傅氏在位者與朱博為表裏共毁譛光乙亥䇿免光為庶人以御史大夫朱博為丞相封陽鄉侯少府趙􅀇為御史大夫臨延登受䇿有大聲如鍾鳴殿中郎吏陛者皆聞焉上以問黄門侍郎蜀郡揚雄及李㝷尋對曰此洪範所謂鼓妖者也師灋以為人君不聦為衆所惑空名得進則有聲無形不知所從生其傳曰嵗月日之中則正卿受之今以四月日加辰巳有異是為中焉正卿謂執政大臣也宜退丞相御史以應天變然雖不退不出期年其人自䝉其咎揚雄亦以爲鼓妖聽失之象也朱博為人彊毅多權謀宜将不宜相恐有凶惡亟疾之怒上不聴朱博既為丞相上遂用其議下詔曰定陶共皇之號不宜復稱定陶尊共皇太后曰帝太太后稱永信宮共皇后曰帝太后稱中安宮為共皇立寝廟於京師比宣帝父悼皇考制度於是四太后各置少府太僕秩皆中二千石傅太后既尊後尤驕與太皇太后語至謂之嫗時丁傅以一二年間暴興尤盛為公卿列侯者甚衆然帝不甚假以權埶不如王氏在成帝世也丞相博御史大夫􅀇奏言前高昌侯宏首建尊號之議而為關内侯師丹所劾奏免為庻人時天下衰麤委政於丹丹不深惟褒廣尊號之義而妄稱説抑貶尊號虧損孝道不忠莫大焉陛下仁聖昭然定尊號宏以忠孝復封髙昌侯丹惡逆㬥著雖蒙赦令不宜有爵邑請免為庶人奏可又奏新都侯王莽前為大司馬不廣尊尊之義抑貶尊號虧損孝道當伏顯戮幸䝉赦令不宜有爵土請免為庶人上曰以莽與太皇太后有屬勿免遣就國及平阿侯仁臧匿趙昭儀親屬皆就國天下多寃王氏者諫大夫楊宣上封事言孝成皇帝深惟宗廟之重稱述陛下至徳以承天序聖䇿深逺恩徳至厚惟念先帝之意豈不欲以陛下自代奉承東宮哉太皇太后春秋七十數更憂傷敕令親屬引領以避丁傅行道之人為之隕涕况於陛下時登高逺望獨不慙於延陵乎帝深感其言復封成都矦商中子邑爲成都矦朱博又奏言漢家故事置部刺史秩卑而賞厚咸勸功樂進前罷刺史更置州牧秩眞二千石位次九卿九卿缺以高第補其中材則茍自守而已恐功效陵夷姦軌不禁臣請罷州牧置刺史如故上從之六月庚申帝太后丁氏崩詔歸葬定陶共皇之園發陳留濟隂近郡國五萬人穿復土初成帝時齊人甘忠可詐造天官歷包元太平經十二卷言漢家逢天地之大終當更受命於天以教渤海夏賀良等中壘校尉劉向奏忠可假鬼神罔上惑衆下獄治服未㫁病死賀良等復私以相教上即位司􅀠校尉解光騎都尉李尋白賀良等皆待詔黄門數召見陳説漢歷中衰當更受命成帝不應天命故絶嗣今陛下久疾變異屢數天所以譴告人也宜急改元易號乃得延年益夀皇子生災異息矣得道不得行咎殃且無不有洪水将出災火且起滌盪民人上久寑疾冀其有益遂従賀良等議詔大赦天下以建平二年為太初元年號曰陳聖劉太平皇帝漏刻以百二十為度秋七月以渭城西北原上永陵亭部為初陵勿徙郡國民上既改號月餘寝疾自若夏賀良等復欲妄變政事大臣爭以為不可許賀良等奏言大臣皆不知天命宜退丞相御史以解光李尋輔政上以其言無驗八月詔曰待詔賀良等建言改元易號増益漏刻可以永安國家朕信道不篤過聴其言冀為百姓􅀗福卒無嘉應夫過而不改是謂過矣六月甲子詔書非赦令皆蠲除之賀良等反道惑衆姦態當窮竟皆下獄伏誅尋及解光減死一等徙燉煌郡上以寑疾盡復前世所嘗興諸神祠凡七百餘所一嵗三萬七千祠云傅太后怨傅喜不已使孔鄉侯晏風丞相朱博令奏免喜侯博與御史大夫趙􅀇議之􅀇言事已前决得無不宜博曰已許孔鄉侯矣匹夫相要尚相得死何况至尊博唯有死耳􅀇即許可博惡獨斥奏喜以故大司空汜鄉侯何武前亦坐過免就國事與喜相似即并奏喜武前在位皆無益於治雖已退免爵土之封非所當也皆請免為庶人上知傅太后素嘗怨喜疑博􅀇承指即召􅀇詣尚書問状􅀇辭服有詔左将軍彭宣與中朝者雜問宣等奏劾博􅀇晏皆不道不敬請召詣廷尉詔獄上减􅀇死罪三等削晏户四分之一假謁者節召丞相詣廷尉博自殺國除九月以光禄勲平當為御史大夫冬十月甲寅遷為丞相以冬月故且賜爵關内侯以京兆尹平陵王喜為御史大夫上欲令丁傅處爪牙官是嵗䇿免左将軍淮陽彭宣以關内侯歸家而以光禄勲丁望代為左将軍烏孫畀爰疐侵盜匈奴西界單于遣兵擊之殺數百人畧千餘人􅇌牛畜去卑爰疐恐遣子趨逯為質匈奴單于受以状聞漢遣使者責讓單于􅁻令還歸卑爰疐質子單于受詔遣歸三年春正月立廣徳夷王弟廣漢為廣平王癸卯帝太太后所居桂宮正殿火上使使者召丞相平當欲封之當病篤不應召室家或謂當不可彊起受侯印為子孫邪當曰吾居大位已負素餐責矣起受侯印還卧而死死有餘罪今不起者所以為子孫也遂上書乞骸骨上不許三月己酉當薨有星孛于河鼓夏四月丁酉王嘉為丞相河南太守王崇為御史大夫崇京兆尹駿之子也嘉以時政苛急郡國守相數有變動乃上䟽曰臣聞聖王之功在於得人孔子曰材難不其然與故繼世立諸侯象賢也雖不能盡賢天子為擇臣立命卿以輔之居是國也累世尊重然後士民之衆附焉是以教化行而治功立今之郡守重於古諸侯往者致選賢材賢材難得拔擢可用者或起於囚徒昔魏尚坐事繫文帝感馮唐之言遣使持節赦其辠拜為雲中太守匈奴忌之武帝擢韓安國於徒中拜為梁内史骨肉以安張敞為京兆尹有罪當免黠吏知而犯敞敞收殺之其家自寃使者覆獄劾敞賊殺人上逮捕不下㑹免亡命十數日宣帝徴敞拜為冀州刺史卒獲其用前世非私此三人貪其材噐有益於公家也孝文時吏居官者或長子孫以官爲氏倉氏庫氏則倉庫吏之後也其二千石長吏亦安官樂職然後上下相望莫有茍且之意其後稍稍變易公卿以下􅀓相促急又數改更政事司􅀠部刺史舉劾苛細發揚隂私吏或居官數月而退送故迎新交錯道路中材茍容求全下材懐危内顧壹切營私者多二千石益輕賤吏民慢易之或持其微過増加成􅓧言於剌史司􅀠或上書告之衆庶知其易危小失意則有離畔之心前山陽亡徒蘇令等縦横吏士臨難莫肯伏節死義以守相威權素奪也孝成皇帝悔之下詔書二千石不為故縦遣使者賜金尉厚其意誠以為國家有急取辦於二千石二千石尊重難危乃能使下孝宣皇帝愛其善治民之吏有章劾事留中㑹赦壹解故事尚書希下章爲煩擾百姓證驗繫治或死嶽中章文必有敢告之字乃下唯陛下留神於擇賢記善忘過容忍臣子勿責以僃二千石部刺史三輔縣令有材任職者人情不能不有過差宜可闊略令盡力者有所勸此方今急務國家之利也前蘇令發欲遣大夫使逐問狀時見大夫無可使者召盩厔令尹逢拜爲諌大夫遣之今諸大夫有材能者甚少宜豫畜養可成就者則士赴難不愛其死臨事倉卒乃求非所以明朝廷也嘉因薦儒者公孫光滿昌及能吏蕭咸薛脩等皆故二千石有名稱者天子納而用之六月立魯頃王子部鄉矦閔爲王上以寑疾未定冬十一月壬子令太皇太后下詔復甘泉泰畤汾隂后土祠罷南北郊上亦不能親至甘泉河東遣有司行事而禮祠焉無鹽危山土自起覆草如馳道状又瓠山石轉立東平王雲及后謁自之石所祭治石象瓠山立石束倍草并祠之河内息夫躬長安孫寵相與謀共告之曰此取封侯之計也乃與中郎谷師譚共因中常侍宋􅀪上變事告焉是時上被疾多所惡事下有司逮王后謁下獄驗治服祠祭詛祝上為雲求為天子以為石立宣帝起之表也有司請誅王有詔廢徙房陵雲自殺謁并舅伍宏及成帝舅安成共侯夫人放皆棄市事連御史大夫王崇左遷大司農擢寵為南陽太守譚潁川都尉􅀪躬皆光禄大夫左曹給事中四年春正月大旱關東民無故驚走持槀或掫一枚傳相付與曰行西王母籌道中相過逢多至千數或被髮徒跣或夜折關或踰牆入或乗車騎犇馳以置驛􅀓行經歷郡國二十六至京師不可禁止民又聚㑹里巷阡陌設張博具歌舞祠西王母至秋乃止上欲封傅太后従父弟侍中光禄大夫商尚書僕射平陵鄭崇諫曰孝成皇帝封親舅五侯天為赤黄晝昏日中有黒氣孔鄉侯皇后父髙武侯以三公封尚有因縁今無故欲復封商壞亂制度逆天人之心非傅氏之福也臣願以身命當國咎崇因持詔書案起傅太后大怒曰何有為天子乃反為一臣所顓制邪二月癸夘上遂下詔封商為汝昌侯駙馬都尉侍中雲陽董賢得幸於上出則參乗入御左右賞賜累鉅萬貴震朝廷常與上卧起甞晝寑偏藉上袖上欲起賢未覺不欲動賢乃斷袖而起又詔賢妻得通引籍殿中止賢廬又召賢女弟以為昭儀位次皇后昭儀及賢與妻旦夕上下並侍左右以賢父恭為少府賜爵關内侯詔将作大匠為賢起大第北闕下重殿洞門土木之功窮極技巧賜武庫禁兵上方珍寳其選物上弟盡在董氏而乗輿所服乃其副也及至東園祕器珠襦玉柙豫以賜賢無不備具又令将作為賢起冢塋義陵旁内為便房剛柏題凑外為徼道周垣數里門闕罘罳甚盛鄭崇以賢貴寵過度諫上由是重得罪數以職事見責發疾頸癰欲乞骸骨不敢尚書令趙昌佞讇素害崇知見䟽因奏崇與宗族通疑有姦請治上責崇曰君門如市人何以欲禁切主上崇對曰臣門如市臣心如水願得考覆上怒下崇獄司􅀠孫寳上書曰按尚書令昌奏僕射崇獄覆治榜掠将死卒無一辭道路稱寃疑昌與崇内有纎介浸潤相陷自禁門樞機近臣䝉受寃譛虧損國家為謗不小臣請治昌以解衆心書奏上下詔曰司􅀠寳附下罔上以春月作詆欺遂其姦心蓋國之賊也免寳為庶人崇竟死獄中二月丁卯諸吏散騎光禄勲賈延為御史大夫上欲侯董賢而未有縁侍中傅嘉勸上定息夫躬孫寵告東平本章掇去宋􅀪更言因董賢以聞欲以其功侯之皆先賜爵關内侯頃之上欲封賢等而心憚王嘉乃先使孔鄉侯晏持詔書示丞相御史於是嘉與御史大夫賈延上封事言竊見董賢等三人始賜爵衆庶匈匈咸曰賢貴其餘并䝉恩至今流言未解陛下仁恩於賢等不已宜㬥賢等本奏語言延問公卿大夫博士議郎考合古今明正其義然後乃加爵土不然恐大失衆心海内引領而議㬥評其事必有言當封者在陛下所従天下雖不説咎有所分不獨在陛下前定陵侯淳于長初封其事亦議大司農谷永以長當封衆人歸咎於永先帝不獨䝉其譏臣嘉臣延材駑不稱死有餘責知順指不迕可得容身須㬰所以不敢者思報厚恩也上不得已且為之止夏六月尊帝太太后為皇太太后秋八月辛夘上下詔切責公卿曰昔楚有子玉得臣晉文為之側席而坐近事汲黯折淮南之謀今東平王雲等至有圗弑天子逆亂之謀者是公卿股肱莫能悉心務聰明以銷厭未萌故也賴宗廟之靈侍中駙馬都尉賢等發覺以聞咸伏厥辜書不云乎用徳章厥善其封賢為髙安侯南陽太守寵為方陽侯左曹光禄大夫躬為宜陵侯賜右師譚爵􅀜内矦又封傅太后同母弟鄭惲子業為陽信侯息夫躬既親近數進見言事議論無所避上䟽歴詆公卿大臣衆畏其口見之仄目上使中黄門發武庫兵前後十輩送董賢及上乳母王阿舎執金吾母将隆奏言武庫兵器天下公用國家武備繕治造作皆度大司農錢大司農錢自乗輿不以給共飬共飬勞賜一出少府蓋不以本臧給末用不以民力共浮費别公私示正路也古者諸侯方伯得顓征伐乃賜斧鉞漢家邉吏職任距冦亦賜武庫兵皆任事然後䝉之春秋之誼家不臧甲所以抑臣威損私力也今賢等便僻弄臣私恩㣲妾而以天下公用給其私門契國威器共其家備民力分於弄臣武兵設於微妾建立非宜以廣驕􅆫非所以示四方也孔子曰奚取於三家之堂臣請收還武庫上不説頃之傅太后使謁者賤買執金吾官婢八人隆奏言買賤請更平直上於是制詔丞相御史隆位九卿既無以匡朝廷之不逮而反奏請與永信宫争貴賤之賈傷化失俗以隆前有安國之言左遷為沛郡都尉初成帝末隆為諫大夫甞奏封事言古者選諸侯入為公卿以褒功徳宜徵定陶王使在國邸以填萬方故上思其言而宥之諌大夫渤海鮑宣上書曰竊見孝成皇帝時外親持權人人牽引所私以充塞朝廷妨賢人路濁亂天下奢泰亡度窮困百姓是以日食且十彗星四起危亡之徴陛下所親見也今奈何反覆劇於前乎今民有七亡隂陽不和水旱為災一亡也縣官重責更賦租税二亡也貪吏並公受取不已三亡也豪彊大姓蠶食亡厭四亡也苛吏繇役失農桑時五亡也部落鼓鳴男女遮列六亡也盗賊劫略取民財物七亡也七亡尚可又有七死酷吏毆殺一死也治獄深刻二死也􅁈陷亡辜三死也盜賊横發四死也怨讎相殘五死也嵗惡饑餓六死也時氣疾疫七死也民有七亡而無一得欲望國安誠難民有七死而無一生欲望刑措誠難此非公卿守相貪殘成化之所致邪羣臣幸得居尊官食重禄豈有肯加惻隠於細民助陛下流教化者邪志但在營私家稱賔客爲姦利而已以苟容曲從爲賢以拱黙尸禄爲智謂如臣宣等爲愚陛下擢臣巖穴誠冀有益豪毛豈徒欲使臣美食大官重髙門之地哉天下乃皇天之天下也陛下上為皇天子下為黎庶父母為天牧飬元元視之當如一合尸鳩之詩今貧民菜食不厭衣又穿空父子夫婦不能相保誠可為酸鼻陛下不救将安所歸命乎奈何獨私飬外親與幸臣董賢多賞賜以大萬數使奴従賔客漿酒藿肉蒼頭廬兒皆用致富非天意也及汝昌侯傅商亡功而封夫官爵非陛下之官爵乃天下之官爵也陛下取非其官官非其人而望天說民服豈不難哉方陽侯孫寵宜陵侯息夫躬辯足以移衆彊可用獨立姦人之雄惑世尤劇者也宜以時罷退及外親幼童未通經術者皆宜令休就師傅急徵故大司馬傅喜使領外親故大司空何武師丹故丞相孔光故左将軍彭宣經皆更博士位皆歴三公龔勝為司直郡國皆慎選舉可大委任也陛下前以小不忍退武等海内失望陛下尚能容亡功徳者甚衆曾不能忍武等邪治天下者當用天下之心為心不得自専快意而已也宣語雖刻切上以宣名儒優容之匈奴單于上書願朝五年時帝被疾或言匈奴従上游來厭人自黄龍竟寧時單于朝中國輙有大故上由是難之以問公卿亦以為虛費府帑可且勿許單于使辭去未發黄門郎揚雄上書諫曰臣聞六經之治貴於未亂兵家之勝貴於未戰二者皆㣲然而大事之本不可不察也今單于上書求朝國家不許而辭之臣愚以為漢與匈奴従此隙矣匈奴本五帝所不能臣三王所不能制其不可使隙明甚臣不敢逺稱請引秦以來明之以秦始皇之彊䝉恬之威然不敢窺西河乃築長城以界之㑹漢初興以髙祖之威靈三十萬衆困於平城時竒譎之士石畫之臣甚衆卒其所以脱者世莫得而言也又髙皇后時匈奴悖慢大臣權書遺之然後得解及孝文時匈奴侵暴北邉􅀱騎至雍甘泉京師大駭發三将軍屯細栁􅁄門覇上以備之數月乃罷孝武即位設馬邑之􅁠欲誘匈奴徒費財勞師一虜不可得見况單于之靣乎其後深惟社稷之計規恢萬載之䇿乃大興師數十萬使衛青霍去病操兵前後十餘年於是浮西河絶大幕破寘顔襲王庭窮極其地追犇逐北封狼居胥山禪於姑衍以臨翰海虜名王貴人以百數自是之後匈奴震怖益求和親然而未肯稱臣也且夫前世豈樂傾無量之費役無罪之人快心於狼望之北哉以為不壹勞者不乆佚不暫費者不永寧是以忍百萬之師以摧餓虎之喙運府庫之財填盧山之壑而不悔也至本始之初匈奴有桀心欲掠烏孫侵公主乃發五将之師十五萬騎以擊之時鮮有所獲徒奮揚威武明漢兵若雷風耳雖空行空反尚誅兩将軍故北狄不服中國未得髙枕安寑也逮至元康神爵之間大化神明鴻恩溥洽而匈奴内亂五單于争立日逐呼韓邪攜國歸死扶伏稱臣然尚羈縻之計不顓制自此之後欲朝者不距不欲者不彊何者外國天性忿鷙形容魁健負力怙氣難化以善易肄以惡其彊難詘其和難得故未服之時勞師逺攻傾國殫貨伏尸流血破堅拔敵如彼之難也既服之後慰薦撫循交接賂遺威儀俯仰如此之備也徃時甞屠大宛之城蹈烏桓之壘探姑繒之壁藉蕩姐之場艾朝鮮之旃拔兩越之旗近不過旬月之役逺不離二時之勞固已犂其庭掃其閭郡縣而置之雲徹席卷後無餘災唯北狄爲不然眞中國之堅敵也三垂比之縣矣前世重之兹甚未易可輕也今單于歸義懐􅅃誠之心欲離其庭陳見於前此乃上世之遺䇿神靈之所想望國家雖費不得已者也奈何距以來厭之辭踈以無日之期消徃昔之恩開将來之隙夫疑而隙之使有恨心負前言縁徃辭歸怨於漢因以自絶終無北面之心威之不可諭之不能焉得不為大憂乎夫明者視於無形聰者聴於無聲誠先於未然即兵革不用而憂患不生不然壹有隙之後雖智者勞心於内辯者轂擊於外猶不若未然之時也且徃者圗西域制車師置城郭都䕶三十六國費歳以大萬計者豈為康居烏孫能踰白龍堆而冦西邉哉乃以制匈奴也夫百年勞之一日失之費十而愛一臣竊為國不安也唯陛下少留意於未亂未戰以遏邉萌之禍書奏天子寤焉召還匈奴使者更報單于書而許之賜雄帛五十匹黄金十斤單于未發㑹病復遣使願朝明年上許之董賢貴幸日盛丁傅害其寵孔鄉矦晏與息夫躬謀欲求居位輔政㑹單于以病未朝躬因是而上奏以爲單于當以十一月入塞後以病爲解疑有他變烏孫兩昆彌弱卑爰疐彊盛東結單于遣子往侍恐其合埶以并烏孫烏孫并則匈奴盛而西域危矣可令降胡詐爲卑爰疐使者來上書欲因天子威告單于歸臣侍子因下其章令匈奴客聞焉則是所謂上兵伐謀其次伐交者也書奏上引見躬召公卿將軍大議左將軍公孫禄以爲中國常以威信懷伏夷狄躬欲逆詐造不信之謀不可許且匈奴賴先帝之徳保塞稱蕃令單于以疾病不任奉朝賀遣使自陳不失臣子之禮臣禄自保沒身不見匈奴為邉竟憂也躬掎禄曰臣為國家計冀先謀将然豫圗未形為萬世慮而禄欲以其犬馬齒保目所見臣與禄異議未可同日詔也上曰善乃罷羣臣獨與躬議躬因建言災異屢見恐必有非常之變可遣大将軍行邉兵敕武備斬一郡守以立威震四夷因以厭應變異上然之以問丞相嘉對曰臣聞動民以行不以言應天以實不以文下民㣲細猶不可詐况於上天神明而可欺哉天之見異所以敕戒人君欲令覺悟反正推誠行善民心説而天意得矣辯士見一端或妄以意傅著星歷虛造匈奴烏孫西羌之難謀動干戈設為權變非應天之道也守相有辠車馳詣闕交臂就死恐懼如此而談説者欲動安之危辯口快耳其實未可従夫議政者苦其讇䛕傾險辯恵深刻也昔秦繆公不従百里奚蹇叔之言以敗其師其悔過自責疾詿誤之臣思黄髮之言名垂於後世願陛下觀覽古戒反覆參考無以先入之語為主上不聴資治通鑑卷第三十四
