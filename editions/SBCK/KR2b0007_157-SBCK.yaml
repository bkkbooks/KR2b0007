front:
  text: 州刺史曹泥資送至雲州􅂬聞之遣資糧迎􅀱拜車􅀐大將軍道元至晉陽􅂬始聞孝武帝之喪啓請舉哀制服東魏主使羣臣議之太學博士潘崇和以為君遇臣不以禮則無反服是以湯之民不哭桀周武之臣不服紂國子博士衛旣隆李同軌議以為髙后於永熈離絶未彰冝為之服東魏從之
  hash: sha256:b55855b2163fc475457ec6feb445bcbf1fafaa500158366896cfd8ff5b398a43
