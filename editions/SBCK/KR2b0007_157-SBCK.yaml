body:
  text: 魏驍􅀐大將軍儀同三司李虎等招諭費也頭之衆與之共攻靈州凡四旬曹泥請降己酉魏進丞相略陽公泰為都督中外諸軍録尚書事大行臺封安定王泰固辭王爵及録尚書乃封安定公以尚書令斛斯椿為太保廣平王賛為司徒乙卯魏主立妃乙弗氏為皇后子欽為皇太子后仁恕節儉不妬忌帝甚重之稽胡劉蠡升自孝昌以來自稱天子改元神嘉居雲陽谷魏之邊境常被其患謂之胡荒壬戌東魏丞相􅂬襲擊大破之勃海丗子澄通於􅂬妾鄭氏􅂬歸一婢告之二婢為證􅂬杖澄一百而幽之婁妃亦隔絶不得見􅂬納魏敬宗之后爾朱氏有寵生子浟􅂬欲立之澄求救於司馬子如子如入見􅂬偽為不知者請見婁妃􅂬告其故子如曰消難亦通子如妾此事正可掩覆妃是王結髪婦常以父母家財奉王王在懐朔被杖背無完皮妃晝夜供侍後避葛賊同走并州貧困妃然馬矢自作靴恩義何可忘也夫婦相冝女配至尊男承大業且婁領軍之勲何冝摇動一女子如草芥況婢言不必信邪􅂬因使子如更鞫之子如見澄尤之曰男兒何意畏威自誣因教二婢反其辭脅告者自縊乃啓􅂬曰果虚言也􅂬大恱召婁妃及澄妃逆見􅂬一步一叩頭澄且拜且進父子夫婦相泣復如初􅂬置酒曰全我父子者司馬子如也賜之黄金百三十斤甲子魏以廣陵王欣為太傅儀同三司万俟受洛干為司空己巳東魏以丞相􅂬為相國假黄􅃏殊禮固辭東魏大行臺尚書司馬子如帥大都督竇泰太州刺史韓軌等攻潼􅀜魏丞相泰軍于霸上子如與軌回軍從蒲津宵濟攻華州時脩城未畢梯􅀝城外比曉東魏人乗梯而入刺史王羆卧未起聞閤外匈匈有聲袒身露髻徒跣持白梃大呼而出東魏人見之驚却羆逐至東門左右稍集合戰破之子如等遂引去二月辛巳上祀明堂壬午東魏以咸陽王坦為太􅀓西河王悰為太尉東魏使尚書右僕射髙隆之發十萬夫撤洛陽宫殿運其材入鄴丁亥上耕籍田東魏儀同三司婁昭等攻兖州樊子鵠使前膠州刺史嚴思達守東平昭攻拔之遂引兵圍瑕丘乆不下昭以水灌城己丑大野拔見子鵠計事因斬其首以降始子鵠以衆少悉驅老弱為兵子鵠死各散走諸將勸婁昭盡捕誅之昭曰此州不幸横􅀍殘賊跂望官軍以救塗炭今復誅之民將誰訴皆捨之戊戌司州刺史陳慶之伐東魏與豫州刺史堯雄戰不利而還三月辛酉東魏以髙盛為太尉髙敖曹為司徒濟隂王暉業為司空東魏丞相歡偽與劉蠡升約和許以女妻其太子蠡升不設備歡舉兵襲之辛酉蠡升北部王斬蠡升首以降餘衆復立其子南海王歡進擊擒之俘其皇后諸王公卿以下四百餘人華夷五萬餘戸壬申歡入朝于鄴以孝武帝后妻彭城王韶魏丞相泰以軍旅未息吏民勞弊命所司斟酌古今可以便時適治者為二十四條新制奏行之泰用武功蘇綽為行臺郎中居嵗餘泰未之知也而臺中皆稱其能有疑事皆就決之泰與僕射周惠逹論事惠達不能對請出議之出以告綽綽為之區處惠逹入白之泰稱善曰誰與卿為此議者惠逹以綽對且稱綽有王佐之才泰乃擢綽為著作郎泰與公卿如昆明池觀漁行至漢故倉池顧問左右莫有知者泰召綽問之具以狀對泰恱因問天地造化之始歷代興亡之迹綽應對如流泰與綽並馬徐行至池竟不設網罟而還遂留綽至夜問以政事卧而聽之綽指陳為治之要泰起整衣危坐不覺膝之前席語遂逹曙不厭詰朝謂周惠逹曰蘇綽眞竒士吾方任之以政即拜大行臺左丞參典機密自是寵遇日隆綽始制文桉程式朱出墨入及計帳戸籍之灋後人多遵用之東魏以封延之為青州刺史代侯淵淵旣失州任而懼行及廣川遂反夜襲青州南郭劫掠郡縣夏四月丞相歡使濟州刺史蔡儁討之淵部下多叛淵欲南奔於道為賣漿者所斬送首於鄴元慶和攻東魏城父丞相歡遣髙敖曹帥三萬人趣項竇泰帥三萬人趣城父侯景帥三萬人趣彭城以任祥為東南道行臺僕射節度諸軍五月魏加丞相泰柱國元慶和引兵逼東魏南兖州東魏洛州刺史韓賢拒之六月慶和攻南頓豫州刺史堯雄破之秋七月甲戌魏以開府儀同三司念賢為太尉万俟受洛干為司徒開府儀同三司越勒肱為司空益州刺史鄱陽王範南梁州刺史樊文熾合兵圍晉壽魏東益州刺史傅敬和來降範恢之子敬和豎眼之子也魏下詔數髙􅂬二十罪且曰朕將親揔六軍與丞相掃除凶醜􅂬亦移檄於魏謂宇文黑獺斛斯椿為逆徒且言今分命諸將領兵百萬刻期西討東魏遣行臺元晏擊元慶和或告東魏司空濟隂王暉業與七兵尚書薛琡貳於魏八月辛卯執送晋陽皆免官甲午東魏發民七萬六千人作新宫於鄴使僕射髙隆之與司空胄曹參軍辛術共營之築鄴南城周二十五里術琛之子也趙剛自蠻中往見東魏東荆州刺史趙郡李愍勸令附魏愍從之剛由是得至長安丞相泰以剛為左光禄大夫剛􅀃泰召賀拔勝獨孤信等於梁泰使剛來請之九月丁巳東魏以開府儀同三司襄城王旭為司空冬十月魏太師上黨文宣王長孫稚卒魏秦州刺史王超丗丞相泰之内兄也驕而黷貨泰奏請加灋詔賜死十一月丁未侍中中衛將軍徐勉卒勉雖骨鯁不及范雲亦不阿意苟合故梁世言賢相者稱范徐云癸丑東魏主祀圜丘甲午東魏閶闔門災門之􅀄成也髙隆之乗馬逺望謂其匠曰西南獨髙一寸量之果然太府卿任忻集自矜其巧不肯攺隆之恨之至是譛於丞相􅂬曰忻集潜通西魏令人故燒之􅂬斬之北梁州刺史蘭欽引兵攻南鄭魏梁州刺史元羅舉州降東魏以丞相􅂬之子洋為驃騎大將軍開府儀同三司封太原公洋内明決而外如不慧兄弟及衆人皆嗤鄙之獨歡異之謂長史薛琡曰此兒識慮過吾㓜時􅂬甞欲􅀚諸子意識使各治亂絲洋獨抽刀斬之曰亂者必斬又各配兵四出使都督彭樂帥甲􅀐偽攻之兄澄等皆怖撓洋獨勒衆與樂相格樂免胄言情猶擒之以獻􅀄大行臺右丞楊愔從兄岐州刺史幼卿以直言為孝武帝所殺愔同列郭秀害其能恐之曰髙王欲送卿於帝所愔惧變姓名逃於田横島乆之􅂬聞其尚在召為太原公開府司馬頃之復為大行臺右丞十二月甲午東魏文武官量事給禄魏以念賢為太傅河州刺史梁景叡為太尉是嵗鄱陽妖賊鮮于琛攺元上願有衆萬餘人鄱陽内史吳郡陸襄討擒之桉治黨與無濫死者民歌之曰鮮于平後善惡分民無枉死頼陸君柔然頭兵可汗求㛰於東魏丞相􅂬以常山王妹為蘭陵公主妻之柔然數侵魏魏使中書舎人庫狄峙奉使至柔然與約和親由是柔然不復為㓂二年春正月辛亥魏祀南郊改用神元皇帝配甲子東魏丞相􅂬自將萬􅀐襲魏夏州身不火食四日而至縛矟為梯夜入其城擒刺史斛拔俄彌突因而用之留都督張瓊將兵鎮守遷其部落五千戸以歸魏靈州刺史曹泥與其壻凉州刺史普樂劉豐復叛降東魏魏人圍之水灌其城不没者四尺東魏丞相􅂬􅀤阿至羅三萬騎徑度靈州繞出魏師之後魏師退歡帥騎迎泥及豐㧞其遺戸五千以歸以豐為南汾州刺史東魏加丞相歡九錫固讓而止上為文帝作皇基寺以追福命有司求良材曲阿弘氏自湘州買巨材東下南津校尉孟少卿欲求媚於上誣弘氏為劫而殺之没其材以為寺二月乙亥上耕藉田東魏勃海丗子澄年十五為大行臺并州刺史求入鄴輔朝政丞相歡不許丞相主簿樂安孫搴為之請乃許之丁酉以澄為尚書令加領軍京畿大都督魏朝雖聞其器識猶以年少期之旣至用灋嚴峻事無凝滯中外震肅引并州别駕崔暹為左丞吏部郎親任之司馬子如髙季式召孫搴劇飲醉甚而卒丞相歡親臨其喪子如叩頭請罪歡曰卿折我右臂為我求可代者子如舉中書郎魏收歡以收為主簿收子建之子也它日歡謂季式曰卿飲殺我孫主簿魏收治文書不如我意司徒甞稱一人謹密者為誰季式以司徒記室廣宗陳元康對曰是能夜中闇書快吏也召之一見即授大丞相功曹掌機密遷大行臺都官郎時軍國多務元康問無不知歡或出臨行留元康在後馬上有所號令九十餘條元康屈指数之盡能記憶與功曹平原趙彦深同知機密人謂之陳趙而元康勢居趙前性又柔謹歡甚親之曰如此人誠難得天賜我也彦深名隱以字行東魏丞相歡令阿至羅逼魏秦州刺史万俟普歡以衆應之三月戊申丹楊陶弘景卒弘景博學多藝能好飬生之術仕齊為奉朝請弃官隱居茅山上早與之遊及即位恩禮甚篤每得其書焚香䖍受屢以手敇招之弘景不出國家每有吉凶征討大事無不先諮之月中常有數信時人謂之山中宰相將没為詩曰夷甫任散誕平叔坐論空豈悟昭陽殿遂作單于宫時士大夫競談玄理不習武事故弘景詩及之甲寅東魏以華山王鷙為大司馬魏以涼州刺史李叔仁為司徒万俟洛為太宰夏四月乙未以驃􅀐大將軍開府同三司之儀元灋僧為太尉尚書右丞考城江子四上封事極言政治得失五月癸卯詔曰古人有言屋漏在上知之在下朕有過失不能自覺江子四等封事所言尚書可時加檢括於民有蠧患者宜速詳啓戊辰東魏髙盛卒魏越勒肱卒魏秦州刺史万俟普與其子太宰洛豳州刺史叱干寶樂右衛將軍破六韓常及督將三百人奔東魏丞相泰輕􅀐追之至河北千餘里不及而還秋七月庚子東魏大赦上待魏降將賀拔勝等甚厚勝請討髙歡上不許勝等思歸前荆州大都督撫寧史寧謂勝曰朱异言於梁主無不從請厚結之勝從之上許勝寧及盧柔皆北還親餞之於南苑勝懐上恩自是見鳥獸南向者皆不射之行至襄城東魏丞相歡遣侯景以輕􅀐邀之勝等弃舟自山路逃歸從者凍餒道死者太半旣至長安詣闕謝罪魏主執勝手歔欷曰乗輿播越天也非卿之咎丞相泰引盧柔為從事中郎與蘇綽對掌機密九月壬寅東魏以定州刺史侯景兼尚書右僕射南道行臺督諸將入宼魏以扶風王孚為司徒斛斯椿為太傅冬十月乙亥詔大舉伐東魏東魏侯景將兵七萬宼楚州虜刺史􅁊和進軍淮上南北司二州刺史陳慶之擊破之景弃輜重走十一月己亥罷北伐之師魏復改始祖神元皇帝為太祖道武皇帝為烈祖十二月東魏以并州刺史尉景為太保壬申東魏遣使請和上許之東魏清河文宣王亶卒丁丑東魏丞相歡督諸軍伐魏遣司徒髙敖曹趣上洛大都督竇泰趣潼􅀜癸未東魏以咸陽王坦為太師是嵗魏􅀜中大饑人相食死者什七八三年春正月上祀南郊大赦東魏丞相􅂬軍蒲坂造三浮橋欲度河魏丞相泰軍廣陽謂諸將曰賊掎吾三面作浮橋以示必度此欲綴吾軍使竇泰得西入耳􅂬自起兵以來竇泰常為前鋒其下多銳卒屢勝而驕今襲之必克克泰則􅂬不戰自走矣諸將皆曰賊在近捨而襲逺脫有蹉跌悔何及也不如分兵禦之丞相泰曰歡再攻潼􅀜吾軍不出灞上今大舉而來謂吾亦當自守有輕我之心乗此襲之何患不克賊雖作浮橋未能徑度不過五日吾取竇泰必矣行臺左丞蘇綽中兵參軍代人逹奚武亦以爲然庚戌丞相泰還長安諸將意猶異同丞相泰隱其計以問族子直事郎中深深曰竇泰歡之驍將今大軍攻蒲坂則歡拒守而泰救之吾表裏受敵此危道也不如選輕銳潛出小􅀜竇泰躁急必來決戰歡持重未即救我急擊泰必可擒也擒泰則歡􅀔自沮回師擊之可以決勝丞相泰喜曰此吾心也乃聲言欲保隴右辛亥謁魏主而潛軍東出癸丑旦至小􅀜竇泰猝聞軍至自風陵度丞相泰出馬牧澤擊竇泰大破之士衆皆盡竇泰自殺傳首長安丞相歡以河冰薄不得赴救撤浮橋而退儀同代人薛孤延爲殿一日之中斫十五刀折乃得免丞相泰亦引軍還髙敖曹自商山轉􅃲而進所向無前遂攻上洛郡人泉岳及弟猛略與順陽人杜窋等謀翻城應之洛州刺史泉企知之殺岳及猛略杜窋走歸敖曹敖曹以為鄉導而攻之敖曹􅀍流矢通中者三殞絶良乆復上馬免胄巡城企固守旬餘二子元禮仲遵力戰拒之仲遵傷目不堪復戰城遂陷企見敖曹曰吾力屈非心服也敖曹以杜窋為洛州刺史敖曹創甚曰恨不見季式作刺史丞相歡聞之即以髙季式為濟州刺史敖曹欲入藍田􅀜歡使人告曰竇泰軍没人心恐動宜速還路險賊盛拔身可也敖曹不忍弃衆力戰全軍而還以泉企泉元禮自隨泉仲遵以傷重不行企私戒二子曰吾餘生無幾汝曹才器足以立功勿以吾在東遂虧臣節元禮於路逃還泉杜雖皆為土豪鄉人輕杜而重泉元禮仲遵隂結豪右襲窋殺之魏以元禮丗襲洛州刺史二月丁亥上耕籍田己丑以尚書左僕射何敬容為中權將軍䕶軍將軍蕭淵藻為左僕射右僕射謝舉為右光禄大夫魏槐里獲神璽大赦二月辛未東魏遷七帝神主入新廟大赦魏斛斯椿卒夏五月魏以廣陵王欣為太宰賀拔勝為大師六月魏以扶風王孚為太保梁景叡為太傅廣平王贊為大尉開府儀同三司武川王盟為司空東魏丞相歡遊汾陽之天池得竒石隱起成文曰六王三川以問行臺郎中陽休之對曰六者大王之字王者當王天下河洛伊為三川涇渭洛亦為三川大王若受天命終應奄有􅀜洛歡曰丗人無事常言我反況聞此乎愼勿妄言休之固之子也行臺郎中中山杜弼承間勸歡受禪歡舉杖擊走之東魏遣兼散􅀐常侍李諧來聘以吏部郎盧元明通直侍郎李業興副之諧平之孫元明昶之子也秋七月諧等至建康上引見與語應對如流諧等出上目送之謂左右曰朕今日遇勍敵卿輩常言北間全無人物此等何自而來是時鄴下言風流者以諧及隴西李神儁范陽盧元明北海王元景弘農楊遵彦清河崔贍為首神儁名挺寶之孫元景名昕憲之曾孫也皆以字行贍㥄之子也時南北通好務以俊乂相誇衘命接客必盡一時之選無才地者不得與焉毎梁使至鄴鄴下爲之傾動貴勝子弟盛飾聚觀禮贈優渥館門成市宴日髙澄常使左右覘之一言制勝澄爲之拊掌魏使至建康亦然獨􅀌信求還北上許之信父母皆在山東上問信所適信曰事君者不敢顧私親而懐貳心上以爲義禮送甚厚信與楊忠皆至長安上書謝罪魏以信有定三荆之功遷驃􅀐大將軍加侍中開府儀同三司餘官爵如故丞相泰愛楊忠之勇留置帳下魏宇文深勸丞相泰取􅁪農八月丁丑泰帥李弼等十二將伐東魏以北雍州刺史于謹為前鋒攻盤豆拔之戊子至􅁪農庚寅㧞之擒東魏陜州刺史李徽伯俘其戰士八千時河北諸城多附東魏左丞楊㯹自言父猛甞為邵郡白水令知其豪傑請往􅀃之以取邵郡泰許之㯹乃與土豪王覆憐等舉兵收邵郡守程保及縣令四人斬之表覆憐為郡守遣諜􅀃諭東魏城堡旬月之間歸附甚衆東魏以東雍州刺史司馬㳟鎭正平司空從事中郎聞喜裴邃欲攻之㳟弃城走泰以楊㯹行正平郡事上修長干寺阿育王塔出佛爪髪舎利辛卯上幸寺設無礙食大赦九月柔然為魏侵東魏三堆丞相歡擊之柔然退走行臺郎中杜弼以文武在位多貪汙言於丞相歡請治之歡曰弼來我語爾天下貪汙習俗巳乆今督將家屬多在􅀜西宇文黒􅆩常相招誘人情去留未定江東復有一吳翁蕭􅄛專事衣冠禮樂中原士大夫望之以為正朔所在我若急正綱紀不相假借恐督將盡歸黒􅆩士子悉奔蕭衍人物流散何以為國爾宜少待吾不忘之歡將出兵拒魏杜弼請先除内賊歡問内賊為誰弼曰諸勲貴掠奪百姓者是也歡不應使軍士皆張弓注矢舉刀桉矟夾道羅列命弼冒出其間弼戰慄流汗歡乃徐諭之曰矢雖注不射刀雖舉不擊矟雖桉不刺爾猶亡魂失膽諸勲人身犯鋒鏑百死一生雖或貪鄙所取者大豈可同之常人也弼乃頓首謝不及歡每號令軍士常令丞相屬代郡張華原宣㫖其語鮮卑則曰漢民是汝奴夫為汝耕婦為汝織輸汝粟帛令汝温飽汝何為陵之其語華人則曰鮮卑是汝作客得汝一斛粟一匹絹為汝擊賊令汝安寧汝何為疾之時鮮卑共輕華人唯憚髙敖曹歡號令將士常鮮卑語敖曹在列則為之華言敖曹返自上洛歡復以為軍司大都督統七十六都督以司空侯景為西道大行臺與敖曹及行臺任祥御史中尉劉貴豫州刺史堯雄冀州刺史万俟洛同治兵於虎牢敖曹與北豫州刺史鄭嚴祖握槊貴召嚴祖敖曹不時遣枷其使者使者曰枷則易脫則難敖曹以刀就枷刎之曰又何難貴不敢校明日貴與敖曹坐外白治河役夫多溺死貴曰一錢漢隨之死敖曹怒拔刀斫貴貴走出還營敖曹鳴鼓㑹兵欲攻之侯景万俟洛共解諭乆之乃止敖曹甞詣相府門者不納敖曹引弓射之􅂬知而不責閏月甲子以武陵王紀為都督益梁等十三州諸軍事益州刺史東魏丞相􅂬將兵二十萬自壷口趣蒲津使髙敖曹將兵三萬出河南時􅀜中饑魏丞相泰所將將士不滿萬人館穀於􅁪農五十餘日聞􅂬將濟河乃引兵入􅀜髙敖曹遂圍􅁪農􅂬右長史薛琡言於􅂬曰西賊連年飢饉故冒死來入陜州欲取倉粟今敖曹已圍陜城粟不得出但置兵諸道勿與野戰比及麥秋其民自應餓死寶炬黑􅆩何憂不降願勿度河侯景曰今兹舉兵形􅀔極大萬一不捷猝難收斂不如分為二軍相繼而進前軍若勝後軍全力前軍若敗後軍承之􅂬不從自蒲津濟河丞相泰遣使戒華州刺史王羆羆語使者曰老羆當道臥貉子那得過􅂬至馮翊城下謂羆曰何不早降羆大呼曰此城是王羆冢死生在此欲死者来歡知不可攻乃涉洛軍於許原西泰至渭南徴諸州兵皆未㑹欲進擊􅂬諸將以衆寡不敵請待􅂬更西以􅀚其勢泰曰􅂬若至長安則人情大擾今及其逺來新至可擊也即造浮橋於渭令軍士齎三日糧輕􅀐度渭輜重自渭南夾渭而西冬十月壬辰泰至沙苑距東魏軍六十里諸將皆懼宇文深獨賀泰問其故對曰􅂬鎮撫河北甚得衆心以此自守未易可圖今懸師度河非衆所欲獨􅂬恥失竇泰愎諌而來所謂忿兵可一戰擒也事理昭然何為不賀願假深一節發王羆之兵邀其走路使無遺􅀋泰遣湏昌縣公逹奚武覘􅂬軍武從三􅀐皆效歡將士衣服日暮去營數百步下馬潛聽得其軍號因上馬歷營若警夜者有不如灋往往撻之具知敵之情狀而還􅂬聞泰至癸巳引兵㑹之􅇋􅀐告􅂬兵且至㤗召諸將謀之開府儀同三司李弼曰彼衆我寡不可平地置陳此東十里有渭曲可先據以待之泰從之背水東西為陳李弼為右拒趙貴為左拒命將士皆偃戈於葦中約聞鼓聲而起晡時東魏兵至渭曲都督太安斛律羌舉曰黑􅆩舉國而來欲一死決譬如猘狗或能噬人且渭曲葦深土濘無所用力不如緩與相持密分精銳徑掩長安巢穴旣傾則黑􅆩不戰成擒矣􅂬曰縱火焚之何如侯景曰當生擒黑􅆩以示百姓若衆中燒死誰復信之彭樂盛氣請􅃲曰我衆賊寡百人擒一何憂不克􅂬從之東魏兵望見魏兵少爭進擊之無復行列兵將交丞相泰鳴鼓士皆奮起于謹等六軍與之合􅀾李弼等帥鐵􅀐横擊之東魏兵中絶為二遂大破之李弼弟㯹身小而勇每躍馬陷陳隱身鞍甲之中敵見皆曰避此小兒泰歎曰膽決如此何必八尺之軀征虜將軍武川耿令貴殺傷多甲裳盡赤泰曰觀其甲裳足知令貴之勇何必數級彭樂乗醉深入魏陳魏人刺之腸出内之復戰丞相歡欲收兵更戰使張華原以簿歷營􅀧兵莫有應者還白歡曰衆盡去營皆空矣歡猶未肯去阜城侯斛律金曰衆心離散不可復用宜急向河東歡據鞍未動金以鞭拂馬乃馳去夜度河船去岸逺歡跨槖駝就船乃得度喪甲士八萬人弃鎧仗十有八萬丞相泰追歡至河上選留甲士二萬餘人餘悉縱歸都督李穆曰髙歡破膽矣速追之可獲泰不聽還軍渭南所徴之兵甫至乃於戰所人種柳一株以旌武功侯景言於歡曰黒􅆩新勝而驕必不爲僃願得精􅀐二萬徑往取之歡以告婁妃妃曰設如其言景豈有還理得黑􅆩而失景何利之有歡乃止魏加丞相泰柱國大將軍李弼等十二將皆進爵增邑有差髙敖曹聞歡敗釋􅁪農退保洛陽己酉魏行臺宫景壽等向洛陽東魏洛州大都督韓賢擊走之州民韓木蘭作亂賢擊破之一賊匿尸間賢自桉檢收鎧仗賊欻起斫之斷脛而卒魏復遣行臺馮翊王季海與獨􅀌信將步􅀐二萬趣洛陽洛州刺史李顯趣三荆賀抜勝李弼圍蒲坂東魏丞相歡之西伐也蒲坂民敬珍謂其從祖兄祥曰髙歡迫逐乗輿天下忠義之士皆欲倳刃於其腹今又稱兵西上吾欲與兄起兵斷其歸路此千載一時也祥從之糾合郷里數日有衆萬餘㑹歡自沙苑敗歸祥珍帥衆邀之斬獲甚衆賀拔勝李弼至河東祥珍帥猗氏等六縣十餘萬戸歸之丞相泰以珍為平陽太守祥為行臺郎中東魏泰州史刺薛崇禮守蒲坂别駕薛善崇禮之族弟也言於崇禮曰髙歡有逐君之罪善與兄忝衣冠緒餘丗荷國恩今大軍已臨而猶為髙氏固守一旦城陷函首送長安署為逆賊死有餘愧及今歸款猶為愈也崇禮猶豫不決善與族人斬􅀜納魏師崇禮出走追獲之丞相泰進軍蒲坂略定汾絳凡薛氏預開城之謀者皆賜五等爵善曰背逆歸順臣子常節豈容闔門大小俱叨封邑與其弟愼固辭不受東魏行晉州事封祖業弃城走儀同三司薛脩義追至洪洞􅀃祖業還守祖業不從脩義還據晉州安集固守魏儀同三司長孫子彦引兵至城下脩義開門伏甲以待之子彦不測虚實遂退走丞相歡以脩義為晉州刺史獨孤信至新安髙敖曹引兵北度河信逼洛陽洛州刺史廣陽王湛弃城歸鄴信遂據金墉城孝武帝之西遷也散騎常侍河東裴寛謂諸弟曰天子旣西吾不可以東附髙氏帥家屬逃於大石嶺獨孤信入洛乃出見之時洛陽荒廢人士流散唯河東栁虯在陽城裴諏之在潁川信俱徴之以虯為行臺郎中諏之為開府屬東魏潁州長史賀若統執刺史田迄舉城降魏魏都督梁廻入據其城前通直散􅀐侍郎鄭偉起兵陳留攻東魏梁州執其刺史鹿永吉前大司馬從事中郎崔彦穆攻滎陽執其太守蘇淑與廣州長史劉志皆降於魏偉先䕶之子也丞相泰以偉為北徐州刺史彦穆為滎陽太守十一月東魏行臺任祥帥督將堯雄趙育是云寶攻潁川丞相泰使大都督宇文貴樂陵公遼西怡峯將步騎二千救之軍至陽翟雄等軍已去潁川三十里祥帥衆四萬繼其後諸將咸以為彼衆我寡不可争鋒貴曰雄等謂吾兵少必不敢進彼與任祥合兵攻潁川城必危矣若賀若統陷没吾輩坐此何爲今進據潁川有城可守又岀其不意破之必矣遂疾趨據潁川背城為陳以待雄等至合戰大破之雄走趙育請降俘其士卒萬餘人悉縱遣之任祥聞雄敗不敢進貴與怡峯乗勝逼之祥退保宛陵貴追及擊之祥軍大敗是云寶殺其陽州刺史那椿以州降魏魏以貴為開府儀同三司是云寶趙育為車􅀐大將軍都督杜陵韋孝寛攻東魏豫州拔之執其行臺馮邕孝寛名叔裕以字行丙子東魏以驃􅀐大將軍儀同三司万俟普為太尉司農張樂臯等聘于東魏十二月魏行臺楊白駒與東魏陽州刺史段粲戰於蓼塢魏師敗績魏荆州刺史郭鵉攻東魏東荆州刺史清都慕容儼儼晝夜拒戰二百餘日乗間出擊鸞大破之時河南諸州多失守唯東荆獲全河間邢磨納范陽盧仲禮仲禮從弟仲􅁉等皆起兵海隅以應魏東魏濟州刺史髙季式有部曲千餘人馬八百匹鎧仗皆僃濮陽民杜靈椿等為盗聚衆近萬人攻城剽野季式遣騎三百一戰擒之又擊陽平賊路文徒等悉平之於是逺近肅清或謂季式曰濮陽陽平乃畿内之郡不奉詔命又不侵境何急而使私軍逺戰萬一失利豈不獲罪乎季式曰君何言之不忠也我與國家同安共危豈有見賊而不討乎且賊知臺軍猝不能來又不疑外州有兵擊之乗其無僃破之必矣以此獲罪吾亦無恨資治通鑑卷第一百五十七
