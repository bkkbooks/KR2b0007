body:
  text: 臣司馬光奉勑編集隋紀五黓涒灘凡五年起著雍執徐盡玄煬皇帝上之下大業四年春正月乙巳詔發河北諸軍百餘萬衆穿永濟渠引沁水南逹于河北通􅃰郡丁男不供始役婦人壬申以太府卿元壽爲内史令裴矩聞西突厥處羅可汗思其母請遣使招懐之二月己卯帝遣司朝謁者崔君肅齎詔書慰諭之處羅見君肅甚踞受詔不肯起君肅謂之曰突厥本一國中分爲二每歳交兵積數十嵗而莫能相滅者明知其勢敵耳然啓民舉其部落百萬之衆卑躬折節入臣天子者其故何也正以切恨可汗不能獨制欲借兵於大國共滅可汗耳羣臣咸欲從啓民之請天子既許之師出有日矣顧可汗母向夫人懼西國之滅旦夕守闕哭泣哀祈匍匐謝罪請發使召可汗令入内屬天子憐之故復遣使至此今可汗乃踞慢如是則向夫人爲誑天子必伏尸都市傳首虜庭發大隋之兵資東國之衆左提右挈以擊可汗亡無日矣奈何愛兩拜之禮絶慈母之命惜一語稱臣使社稷爲墟乎處羅矍然而起流涕再拜跪受詔書因遣使者隨君肅貢汗皿馬三月壬戌倭王多利思比􅀌遣使入貢遺帝書曰日出處天子致書日没處天子無恙帝覽之不恱謂鴻臚卿曰蠻夷書無禮者勿復以聞乙丑車駕幸五原因出塞廵長城行宫設六合板城載以槍車每頓舍則外其轅以爲外圍内布鐵菱次施弩牀牀皆挿鋼錐外向上施旋機弩以繩連機人來觸繩則弩機旋轉向所處而發其外又以矰周圍施鈴柱槌磬以知所警帝募能通絶域者屯田主事常駿等請使赤土帝大恱丙寅命駿等齎物五千段以賜其王赤土者南海中逺國也帝無日不治宫室兩京及江都苑囿亭殿雖多乆而益厭每遊幸左右顧矚無可意者不知所適乃備責天下山川之圖躬自歴覽以求勝地可置宫苑者夏四月詔於汾州之北汾水之源營汾陽宫初元德太子薨河南尹齊王􅌔次當爲嗣元德吏兵二萬餘人悉􅀠於􅌔帝爲之妙選僚屬以光祿少卿柳謇之爲齊王長史且戒之曰齊王德業脩僃富貴自鍾卿門􅀂有不善罪亦相及謇之慶之從子也􅌔寵遇日隆百官趨謁闐咽道路􅌔以是驕恣昵近小人所爲多不灋遣左右喬令則庫狄仲錡陳智偉等求聲色令則等因此放縱訪人家有美女輙矯􅌔命呼之載入􅌔第滛而遣之仲錡智偉詣隴西撾炙諸胡責其名馬得數匹以進􅌔􅌔令還主仲錡等詐言王賜取歸其家􅌔不知也樂平公主嘗奏帝言柳氏女羙帝未有所答乆之主復以柳氏進􅌔􅌔納之其後帝問主柳氏女安在主曰在齊王所帝不恱暕從帝幸汾陽宫大獵詔􅌔以千􅀐入圍􅌔大獲麋鹿以獻而帝未有得也乃怒從官皆言爲􅌔左右所遏獸不得前帝於是發怒求􅌔罪失時制縣令無故不得出境有伊闕令皇甫詡得幸於􅌔違禁􅂝之至汾陽宫御史韋德裕希㫖劾奏􅌔帝令甲士千餘人大索􅌔第因窮治其事􅌔妃韋氏早卒􅌔與妃姉元氏婦通産一女􅌔召相工令徧視後庭相工指妃姉曰此産子者當爲皇后􅌔以元德太子有三子恐不得立隂挾左道爲厭勝至是皆發帝大怒斬令則等數人賜妃姊死􅌔府僚皆斥之邊逺柳謇之坐不能厈正除名時趙王杲尚幼帝謂侍臣曰朕唯有􅌔一子不然者當肆諸市朝以明國憲􅌔自是恩寵日衰雖為京尹不復關預時政帝􅁪令虎賁郎將一人監其府事􅌔有微失虎賁輙奏之帝亦常慮􅌔生變所給左右皆以老弱備員而已太史令庾質季才之子也其子為齊王屬帝謂質曰汝不能一心事我乃使兒事齊王何向背如此對曰臣事陛下子事齊王實是一心不敢有二帝猶怒出為合水令乙卯詔以突厥啓民可汗遵奉朝化思改戎俗宐於萬壽戌置城造屋其帷帳牀褥以上務從優厚秋七月辛巳發丁男二十餘萬築長城自榆谷而東裴矩說鐵勒使擊吐谷渾大破之吐谷渾可汗伏允東走入西平境内遣使請降求救帝遣安德王雄出澆河許公宇文述出西平迎之述至臨羌城吐谷渾畏述兵盛不敢降帥衆西遁述引兵追之拔曼頭赤水二城斬三千餘級獲其王公以下二百人虜男女四千口而還伏允南奔雪山其故地皆空東西四千里南北二千里皆為隋有置郡縣鎮戍天下輕罪徙居之八月辛酉上親祠􅁪岳赦天下河北道郡守畢集裴矩所致西域十餘國皆來助祭九月辛未徴天下鷹師悉集東京至者萬餘人冬十月乙卯頒新式常駿等至赤土境赤土王利富多塞遣使以三十舶迎之進金鏁以纜駿船凡汎海百餘日入境月餘乃至其都其王居處器用窮極珍麗待使者禮亦厚遣其子􅃚邪迦隨駿入貢帝以右翊衞將軍河東薛丗雄為玉門道行軍大將與突厥啓民可汗連兵擊伊吾師出玉門啓民不至丗雄孤軍度磧伊吾初謂隋軍不能至皆不設備聞丗雄軍已度磧大懼請降丗雄乃於漢故伊吾城東築城留銀青光祿大夫王威以甲卒千餘人戍之而還五年春正月丙子改東京為東都突厥啓民可汗來朝禮賜益厚癸未詔天下均田戊子上自東都西還己丑制民間鐵义搭鉤􅗋刄之類皆禁之二月戊申車駕至西京三月己巳西廵河右乙亥幸扶風舊宅夏四月癸亥出臨津關度黄河至西平陳兵講武將擊吐谷渾五月乙亥上大獵於拔延山長圍周亘二十里庚辰入長寧谷度星嶺丙戌至浩舋川以橋未成斬都水使者黄亘及督役者九人數日橋成乃行吐谷渾可汗伏允帥衆保覆袁川帝分命内史元壽􅀯屯金山兵部尚書段文振北屯雪山太僕卿楊義臣東屯琵琶峽將軍張壽西屯泥嶺四面圍之伏允以數十騎遁出遣其名王詐稱伏允保車我真山壬辰詔右屯衞大將軍張定和往捕之定和輕其衆少不被甲挺身登山吐谷渾伏兵射殺之其亞將柳武建擊吐谷渾破之甲午吐谷渾仙頭王窮䠞帥男女十餘萬口來降六月丁酉遣左光祿大夫梁黙等追討伏允兵敗為伏允所殺衛尉卿彭城劉權出伊吾道擊吐谷渾至青海虜獲千餘口乘勝追奔至伏俟城辛丑帝謂給事郎蔡徴曰自古天子有廵狩之禮而江東諸帝多傅脂粉坐深宫不與百姓相見此何理也對曰此其所以不能長丗丙午至張掖帝之將西廵也命裴矩說髙昌王麴伯雅及伊吾吐屯設等啗以厚利召使入朝壬子帝至燕支山伯雅吐屯設等及西域二十七國謁於道左皆令佩金玉􅀍錦罽焚香奏樂歌舞諠譟帝復令武威張掖士女盛飾縱觀衣服車馬不鮮者郡縣督課之騎乘填咽周亘數十里以示中國之盛吐屯設獻西域數千里之地上大恱癸丑置西海河源鄯善且末等郡讁天下罪人為戍卒以守之命劉權鎮河源郡積石鎮大開屯田扞禦吐谷渾以通西域之路是時天下凡有郡一百九十縣一千二百五十五户八百九十萬有竒東西九千三百里􅀯北萬四千八百一十五里隋氏之盛極於此矣帝謂裴矩有綏懐之略進位銀青光祿大夫自西京諸縣及西北諸郡皆轉輸塞外每歳鉅億萬計經途險遠及遇宼鈔人畜死亡不達者郡縣皆徴破其家由是百姓失業西方先困矣􅀄吐谷渾伏允使其子順來朝帝留順不遣伏允敗走無以自資帥數千騎客於党項帝立順為可汗送至玉門令統其餘衆以其大寶王尼洛周爲輔至西平其部下殺洛周順不果入而還丙辰上御觀風殿大僃文物引髙昌王麴伯雅及伊吾吐屯設升殿宴飲其餘蠻夷使者陪階庭者二十餘國奏九部樂及魚龍戲以娛之賜賚有差戊午赦天下吐谷渾有青海俗傳置牝馬於其上得龍種秋七月丁卯置馬牧於青海縱牝馬二千匹於川谷以求龍種無効而止車駕東還行經大斗拔谷山路隘險魚貫而出風雪晦􅁳文武饑餒沾濕夜乆不逮前營士卒凍死者太半馬驢什八九後宫妃主或狼狽相失與軍士雜宿山間九月癸未車駕入西京冬十一月丙子復幸東都民部侍郎裴藴以民間版籍脫漏户口及詐注老小尚多奏令貌閱􅀂一人不實則官司解職又許民糾得一丁者令被糾之家代輸賦役是歳諸郡計帳進丁二十四萬三千新附口六十四萬一千五百帝臨朝覽狀謂百官曰前代無賢才致此罔冒今户口皆實全由裴藴由是漸見親委未幾擢授御史大夫與裴矩虞丗基參掌機密藴善候伺人主微意所欲罪者則曲灋鍜成其罪所欲宥者則附從輕典因而釋之是後大小之獄皆以付藴刑部大理莫敢與爭必稟承進止然後決斷藴有機辯言􅀂懸河或重或輕皆由其口剖析明敏時人不能致詰突厥啓民可汗卒上為之廢朝三日立其子咄吉是為始畢可汗表請尚公主詔從其俗􅀄内史侍郎薛道衡以才學有盛名乆當樞要髙祖末出為襄州揔管帝即位自畨州刺史召之欲用為祕書監道衡既至上髙祖文皇帝頌帝覽之不恱顧謂蘇威曰道衡致羙先朝此魚藻之義也拜司􅀠大夫將置之罪司􅀠刺史房彦謙勸道衡杜絶賔客卑辭下氣道衡不能用㑹議新令乆不決道衡謂朝士曰向使髙熲不死令決當乆行有人奏之帝怒曰汝憶髙熲邪付執灋者推之裴藴奏道衡負才恃舊有無君之心推惡於國妄造禍端論其罪名似如隠昧原其情意深為悖逆帝曰然我少時與之行役輕我童稚與髙熲賀􅀂弼等外擅威權及我即位懐不自安賴天下無事未得反耳公論其逆妙體本心道衡自以所坐非大過促憲司早斷兾奏日帝必赦之敕家人具饌以備賔客來候者及奏帝令自盡道衡殊不意未能引決憲司重奏縊而殺之妻子徙且末天下寃之帝大閱軍實稱器甲之羙宇文述因進言此皆雲定興之功帝即擢定興為太府丞六年春正月癸亥朔未明三刻有盗數十人素冠練衣焚香持華自稱彌勒佛入自建國門監門者皆稽首既而奪衛士仗將為亂齊王􅌔遇而斬之於是都下大索連坐者千餘家帝以諸蕃酋長畢集洛陽丁丑於端門街盛陳百戲戲塲周圍五千歩執絲竹者萬八千人聲聞數十里自昏逹旦燈火光燭天地終月而罷所費巨萬自是嵗以爲常諸蕃請入豐都市交易帝許之先命整飾店肆簷宇如一盛設帷帳珍貨充積人物華盛賣菜者亦藉以龍須席胡客或過酒食店悉令邀延就坐醉飽而散不取其直紿之曰中國豐饒酒食例不取直胡客皆驚嘆其黠者頗覺之見以繒帛纒樹曰中國亦有貧者衣不蓋形何如以此物與之纒樹何爲市人慙不能荅帝稱裴矩之能謂羣臣曰裴矩大識朕意凡所陳奏皆朕之成筭未發之頃矩輙以聞自非奉國盡心孰能􅀂是是時矩與右翊衛大將軍宇文述内史侍郎虞丗基御史大夫裴藴光禄大夫郭􅄛皆以諂䛕有寵述善於供奉容止便辟侍衛者威取則焉郭􅄛嘗勸帝五日一視朝曰無効髙祖空自勤苦帝益以爲忠曰唯有郭􅄛心與朕同帝臨朝凝重發言降詔辭義可觀而内存聲色其在兩都及廵遊常以僧尼道士女官自隨謂之四道場梁公蕭鉅琮之弟子千牛左右宇文皛慶之孫也皆有寵於帝帝每日於苑中林亭閒盛陳酒饌敕燕王倓與鉅皛及髙祖嬪御爲一席僧尼道士女官爲一席帝與諸寵姬爲一席略相連接罷朝即從之宴飲更相勸侑酒酣殽亂靡所不至以是爲常楊氏婦女之羙者往往進御皛出入宫掖不限門禁至於妃嬪公主皆有醜聲帝亦不之罪也帝復遣朱寛招撫流求流求不從帝遣虎賁郎將廬江陳稜朝請大夫同安張鎮周發東陽兵萬餘人自義安汎海擊之行月餘至其國以鎮周爲先鋒流求王渴刺兠遣兵逆戰屢破之遂至其都渴刺兠自將出戰又敗退入栅稜等乗勝攻拔之斬渇刺兠虜其民萬餘口而還二月乙巳稜等獻流求俘頒賜百官進稜位右光禄大夫鎮周金紫光禄大夫乙卯詔以近丗茅土妄假名實相乖自今唯有功勲乃得賜封仍令子孫承襲於是舊賜五等爵非有功者皆除之庚申以所徴周齊梁陳散樂悉配太常皆置愽士弟子以相傳授樂工至三萬餘人三月癸亥帝幸江都宫􅀄帝欲大營汾陽宫令御史大夫張衡具圖奏之衡承閒進諌曰比年勞役繁多百姓疲弊伏願留神稍加抑損帝意甚不平後目衡謂侍臣曰張衡自謂由其計畫令我有天下也乃錄齊王􅌔􅂝皇甫詡從駕及前幸涿郡祠􅁪岳時父老謁見者衣冠多不整譴衡以憲司不能舉正出爲榆林太守乆之衡督役築樓煩城因帝廵幸得謁帝帝惡衡不損瘦以爲不念咎謂衡曰公甚肥澤宐且還郡復遣之榆林未幾敕衡督役江都宫禮部尚書楊玄感使至江都衡謂玄感曰薛道衡真爲枉死􅀇感奏之江都郡丞王丗充又奏衡頻减頓具帝於是發怒鎖詣江都市將斬之乆乃得釋除名爲民放還田里以王丗充領江都宫監丗充本西域胡人姓支氏父収幼從其母嫁王氏因冒其姓丗充性譎詐有口辯頗涉書傳好兵灋習律令帝數幸江都丗充能伺候顔色爲阿䛕雕飾池臺奏獻珍物由是有寵夏六月甲寅制江都太守秩同京尹冬十二月己未文安憲侯牛弘卒弘寛厚恭儉學術精博隋室舊臣始終信任悔吝不及者唯􅀪一人而已弟弼好酒而䣱嘗因醉射殺弘駕車牛􅀪來還宅其妻迎謂之曰叔射殺牛􅀪無所怪問直荅云作脯坐定其妻又曰叔忽射殺牛大是異事􅀪曰已知之矣顔色自􅀂讀書不輟敕穿江􅀯河自京口至餘杭八百餘里廣十餘丈使可通龍舟并置驛宫草頓欲東廵㑹稽上以百官從駕皆服袴褶於軍旅閒不便是歳始詔從駕渉逺者文武官皆戎衣五品以上通著紫􅂁六品以下兼用緋緑胥史以青庶人以白屠商以皁士卒以黃帝之幸啓民帳也髙麗使者在啓民所啓民不敢隠與之見帝黃門侍郎裴矩說帝曰髙麗本箕子所封之地漢晉皆爲郡縣今乃不臣别為異域先帝欲征之乆矣但楊諒不肖師出無功當陛下之時安可不取使冠帶之境遂爲蠻貃之郷乎今其使者親見啓民舉國從化可因其恐懼脅使入朝帝從之敕牛弘宣旨曰朕以啓民誠心奉國故親至其帳明年當往􅃰郡爾還日語髙麗王宐早來朝勿自疑懼存育之禮當如啓民茍或不朝將帥啓民往廵彼土髙麗王元懼藩禮頗闕帝將討之課天下冨人買武馬匹至十萬錢􅂤閱器仗務令精新或有濫惡則使者立斬七年春正月壬寅真定㐮矦郭􅄛卒二月己未上升釣臺臨楊子津大宴百僚乙亥帝自江都行幸􅃰郡御龍舟度河入永濟渠仍敕選部門下内史御史四司之官於前船選􅀘其受選者三千餘人或徒歩隨船三千餘里不得處分凍餒疲頓因而致死者什一二壬午下詔討髙麗敕幽州揔管元􅀪嗣往東萊海口造船三百艘官吏督􅃥晝夜立水中略不敢息自􅆎以下皆生蛆死者什三四夏四月庚午車駕至􅃰郡之臨朔宫文武從官九品以上並令給宅安置先是詔揔徴天下之兵無問逺近俱㑹於􅃰又發江淮以南水手一萬人弩手三萬人嶺南排鑹手三萬人於是四逺奔赴如流五月敕河南淮南江南造戎車五萬乘送髙陽供載衣甲幔幕令兵士自挽之發河南北民夫以供軍須秋七月發江淮以南民夫及船運黎陽及洛口諸倉米至􅃰郡舳艫相次千餘里載兵甲及攻取之具往還在道常數十萬人填咽於道晝夜不絶死者相枕臭穢􅄹路天下騷動山東河南大水漂没三十餘郡冬十月乙卯底柱崩偃河逆流數十里􅀄帝西廵遣侍御史韋節召西突厥處羅可汗令與車駕㑹大斗拔谷國人不從處羅謝使者辭以佗故帝大怒無如之何㑹其酋長射匱遣使來求婚裴矩因奏曰處羅不朝恃疆大耳臣請以計弱之分裂其國即易制也射匱者都六之子逹頭之孫丗爲可汗君臨西面今聞其失職附屬處羅故遣使來以結援耳願厚禮其使拜爲大可汗則突厥勢分兩從我矣帝曰公言是也因遣矩朝夕至舘微諷諭之帝於仁風殿召其使者言處羅不順之狀稱射匱向善吾將立爲大可汗令發兵誅處羅然後爲婚帝取桃竹白羽箭一枚以賜射匱因謂之曰此事宐速使疾如箭也使者返路經處羅處羅愛箭將留之使者譎而得免射匱聞而大喜興兵襲處羅處羅大敗弃妻子將左右數千騎東走縁道􅀍刼寓於髙昌東保時羅漫山髙昌王麴伯雅上狀帝遣裴矩與向氏親要左右馳至玉門關晉昌城曉諭處羅使入朝十二月己未處羅來朝於臨朔宫帝大恱接以殊禮帝與處羅宴處羅稽首謝入見之晩帝以温言慰勞之僃設天下珍膳盛陳女樂羅綺絲竹眩矅耳目然處羅終有怏怏之色帝自去嵗謀討髙麗詔山東置府令養馬以供軍􅃥又發民夫運米積於瀘河懐逺二鎮車牛往者皆不返士卒死亡過半耕稼失時田疇多荒加之饑饉􅂖價踊貴東北邊尤甚斗米直數百錢所運米或粗惡令民糴以償之又發鹿車夫六十餘萬二人共推米三石道途險逺不足充糇糧至鎮無可輸皆懼罪亡命重以官吏貪殘因縁侵漁百姓困窮財力俱竭安居則不勝凍餒死期交急剽掠則猶得延生於是始相聚爲羣盗鄒平民王薄擁衆據長白山剽掠齊濟之郊自稱知丗郎言事可知矣又作無向遼東浪死歌以相感勸避征役者多往歸之平原東有豆子䴚負海帶河地形深阻自髙齊以來羣盜多匿其中有劉霸道者家於其旁累丗仕官貲産冨厚霸道喜遊俠食客常數百人及羣盗起逺近多往依之有衆十餘萬號阿舅賊漳􅀯人竇建德少尚氣俠膽力過人爲郷黨所歸附㑹募人征髙麗建德以勇敢選爲二百人長同縣孫安祖亦以驍勇選爲征士安祖辭以家爲水所漂妻子餒死縣令怒笞之安祖剌殺令亡抵建徳建徳匿之官司逐捕緃跡至建徳家建徳謂安祖曰文皇帝時天下殷盛發百萬之衆以伐髙麗尚爲所敗今水潦爲災百姓困窮加之往歳西征行者不歸瘡痍未復主上不恤乃更發兵親擊髙麗天下必大亂丈夫不死當立大功豈可但爲亡虜邪乃集無頼少年得數百人使安祖將之入髙雞泊中爲羣盗安祖自號將軍時鄃人張金稱聚衆河曲蓨人髙士逹聚衆於清河境内爲盗郡縣疑建德與賊通悉收其家屬殺之建德帥麾下二百人亡歸士逹士逹自稱東海公以建德爲司兵頃之孫安祖爲張金稱所殺其衆盡歸建徳建德兵至萬餘人建德能傾身接物與士卒均勞逸由是人爭附之爲之致死自是所在羣盗蜂起不可勝數徒衆多者至萬餘人攻陷城邑甲子敕都尉鷹揚與郡縣相知追捕隨獲斬決然莫能禁止八年春正月帝分西突厥處羅可汗之衆爲三使其弟闕逹度設將羸弱萬餘口居于㑹寧又使特勒大奈别將餘衆居于樓煩命處羅將五百􅀐常從車駕廵幸賜號曷婆那可汗賞賜甚厚􅀄嵩髙道士潘誕自言三百嵗爲帝合鍊金丹帝爲之作嵩陽觀華屋數百閒以童男童女各一百二十人充給使位視三品常役數千人所費巨萬云金丹應用石膽石髓發石工鑿嵩髙大石深百尺者數十處凡六年丹不成帝詰之誕對以無石膽石髓􅀂得童男女膽髓各三斛六斗可以代之帝怒鎻詣涿郡斬之且死語人曰此乃天子無福值我兵解時至我應生梵摩天云四方兵皆集涿郡帝徴合水令􅁃質問曰髙麗之衆不能當我一郡今朕以此衆伐之卿以爲克不對曰伐之可克然臣竊有愚見不願陛下親行帝作色曰朕今揔兵至此豈可未見賊而先自退邪對曰戰而未克懼損威靈􅀂車駕留此命猛將勁卒指授方略倍道兼行出其不意克之必矣事機在速緩則無功帝不恱曰汝既憚行自可留此右尚方署監事耿詢上書切諫帝大怒命左右斬之何稠苦救得免壬午詔左十二軍出鏤方長岑溟海蓋馬建安􅀯蘇遼東玄莵扶餘朝鮮沃沮樂浪等道右十二軍出黏蟬含資渾彌臨屯候城提奚蹋頓肅慎碣石東暆帶方襄平等道駱驛引途揔集平壤凡一百一十三萬三千八百人號二百萬其餽運者倍之宐社於􅀯桑乾水上類上帝於臨朔宫􅀯祭馬祖於薊城北帝親授節度每軍大將亞將各一人􅀐兵四十隊隊百人十隊爲團步卒八十隊分爲四團團各有偏將一人其鎧胄纓拂旗旛每團異色受降使者一人承詔慰撫不受大將節制其輜重散兵等亦爲四團使步卒挾之而行進止立營皆有次叙儀灋癸未第一軍發日遣一軍相去四十里連營漸進終四十日發乃盡首尾相繼鼔角相聞旌旗亘九百六十里御營内合十二衛三臺五省九寺分􅀠内外前後左右六軍次後發又亘八十里近古出師之盛未之有也甲辰内史令元壽薨二月壬戌觀德王雄薨北平襄矦叚文振爲兵部尚書上表以爲帝寵待突厥太厚處之塞内資以兵食戎狄之性無親而貪異日必爲國患宐以時諭遣令出塞外然後明設烽候縁邊鎮防務令嚴重此萬歳之長策也兵曹郎斛斯政椿之孫也以器幹明悟爲帝所寵任使專掌兵事文振知政險薄不可委以機要屢言於帝帝不從及征髙麗以文振爲左候衛大將軍出􅀯蘇道文振於道中疾篤上表曰竊見遼東小醜未服嚴刑逺降六師親勞萬乗但夷狄多詐深須防擬口陳降欵母宐遽受水潦方降不可淹遲唯願嚴勒諸軍星馳速發水陸俱前出其不意則平壤孤城勢可拔也􅀂傾其本根餘城自克如不時定脫遇秋霖深爲艱阻兵糧既竭彊敵在前靺鞨出後遲疑不決非上策也三月辛卯文振卒帝甚惜之癸巳上始御師進至遼水衆軍揔㑹臨水爲大陳髙麗兵阻水拒守隋兵不得濟左屯衛大將軍麥鐵杖謂人曰丈夫性命自有所在豈能然艾灸頞􅀲蔕歕鼻治黄不差而卧死兒女手中乎乃自請爲前鋒謂其三子曰吾荷國恩今爲死日我得良殺汝當冨貴帝命工部尚書宇文愷造浮橋三道於遼水西岸既成引橋趣東岸橋短不及岸丈餘髙麗兵大至隋兵驍勇者爭赴水接戰髙麗兵乘髙擊之隋兵不得登岸死者甚衆麥鐵杖躍登岸與虎賁郎將錢士雄孟义等皆戰死乃歛兵引橋復就西岸詔贈鐵杖宿公使其子孟才襲爵次子仲才季才並拜正議大夫更命少府監何稠接橋二日而成諸軍相次繼進大戰于東岸髙麗兵大敗死者萬計諸軍乘勝進圍遼東城即漢之襄平城也車駕度遼引曷薩􅃚可汗及髙昌王伯雅觀戰處以懾憚之因下詔赦天下命刑部尚書衛文昇尚書右丞劉士龍撫遼左之民給復十年建置郡縣以相統攝夏五月壬午納言楊逹薨諸將之東下也帝親戒之曰今者弔民伐罪非爲功名諸將或不識朕意欲輕兵掩襲孤軍獨鬬立一身之名以邀勲賞非大軍行灋公等進軍當分為三道有所攻擊必三道相知毋得輕軍獨進以致失亡又凡軍事進止皆須奏聞待報母得專擅遼東數出戰不利乃嬰城固守帝命諸軍攻之又敕諸將髙麗􅀂降即宐撫納不得縱兵遼東城將陷城中人輙言請降諸將奉㫖不敢赴機先令馳奏比報至城中守禦亦僃隨出拒戰如此再三帝終不悟既而城乆不下六月己未帝幸遼東城􅀯觀其城池形勢因召諸將詰責之曰公等自以官髙又恃家丗欲以暗懦待我邪在都之日公等皆不願我來恐見病敗耳我今來此正欲觀公等所爲斬公輩耳公今畏死莫肯盡力謂我不能殺公邪諸將咸戰懼失色帝因留止城西數里御六合城髙麗諸城各堅守不下右翊衛大將軍來護兒帥江淮水軍舳艫數百里浮海先進入自浿水去平壤六十里與髙麗相遇進擊大破之護兒欲乘勝趣其城副揔管周灋尚止之請俟諸軍至俱進護兒不聽簡精甲四萬直造城下髙麗伏兵於羅郭内空寺中出兵與護兒戰而偽敗護兒逐之入城縱兵俘掠無復部伍伏兵發護兒大敗僅而獲免士卒還者不過數千人髙麗追至船所周灋尚整陳待之髙麗乃退護兒引兵還屯海浦不敢復留應接諸軍左翊衛大將軍宇文述出扶餘道右翊衛大將軍于仲文出樂浪道左驍衛大將軍荆元􅁪出遼東道右翊衛將軍薛丗雄出沃沮道左屯衛將軍辛丗雄出玄莵道右禦衛將軍張瑾出襄平道右武候將軍趙孝才出碣石道涿郡太守檢校左武衛將軍崔弘昇出遂城道檢校右禦衛虎賁郎將衛文昇出增地道皆㑹於鴨緑水西述等兵自瀘河懐逺二鎮人馬皆給百日糧又給排甲槍矟并衣資戎具火幕人别三石已上重莫能勝致下令軍中遺弃米粟者斬士卒皆於幕下掘坑埋之纔行及中路糧已將盡髙麗遣大臣乙支文徳詣其營詐降實欲觀虛實于仲文先奉密㫖􅀂遇髙元及文徳來者必擒之仲文將執之尚書右丞劉士龍爲慰撫使固止之仲文遂聽文德還既而悔之遣人紿文德曰更欲有言可復來文德不顧濟鴨緑水而去仲文與述等既失文德内不自安述以糧盡欲還仲文議以精銳追文德可以有功述固止之仲文怒曰將軍仗十萬之衆不能破小賊何顔以見帝且仲文此行固知無功何則古之良將能成功者軍中之事決在一人今人各有心何以勝敵時帝以仲文有計畫令諸軍諮稟節度故有此言由是述等不得已而從之與諸將度水追文德文德見述軍士有飢色故欲疲之每戰輒走述一日之中七戰皆捷既恃驟勝又逼羣議於是遂進東濟薩水去平壤城三十里因山爲營文德復遣使詐降請於述曰􅀂旋師者當奉髙元朝行在所述見士卒疲弊不可復戰又平壤城險固度難猝拔遂因其詐而還述等爲方陳而行髙麗曰靣鈔擊述等且戰且行秋七月壬寅至薩水軍半濟髙麗自後擊其後軍右屯衛將軍辛丗雄戰死於是諸軍俱潰不可禁止將士奔還一日一夜至鴨緑水行四百五十里將軍天水王仁恭爲殿擊髙麗却之來護兒聞述等敗亦引還唯衛文昇一軍獨全初九軍度遼凡三十萬五千及還至遼東城唯二千七百人資儲器械巨萬計失亡蕩盡帝大怒鎻繫述等癸卯引還初百濟王璋遣使請討髙麗帝使之覘髙麗動靜璋内與髙麗潜通隋軍將岀璋使其臣國智牟來請師期帝大恱厚加賞賜遣尚書起部郎席律詣百濟告以期㑹及隋軍度遼百濟亦嚴兵境上聲言助隋實持兩端是行也唯於遼水西拔髙麗武厲邏置遼東郡及通定鎮而已八月敕運黎陽洛口太原等倉􅂖向望海頓使民部尚書廬江樊子蓋留守涿郡九月庚寅車駕至東都冬十月甲寅工部尚書宇文愷卒十一月己卯以宗女爲華容公主嫁高昌宇文述素有寵於帝且其子士及尚帝女􅀯陽公主故帝不忍誅甲申與于仲文等皆除名爲民斬劉士龍以謝天下薩水之敗髙麗追圍薛丗雄於白石山丗雄奮擊破之由是獨得免官以衛文昇爲金紫光禄大夫諸將皆委罪於于仲文帝既釋諸將獨繫仲文仲文憂恚發病困篤乃出之卒于家是嵗大旱疫山東尤甚張衡既放廢帝每令親人覘衡所爲帝還自遼東衡妾告衡怨望謗訕朝政詔賜盡于家衡臨死大言曰我爲人作何等事而望乆活監刑者塞耳促令殺之資治通鑑卷第一百八十一
