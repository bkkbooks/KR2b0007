body:
  text: 六月壬寅朔中書舍人吳興茹法亮封望蔡男時中書舍人四人各住一省謂之四戸以法亮及臨海吕文顯等爲之既揔重權勢傾朝廷守宰數遷換去來四方餉遺歳數百萬法亮嘗於衆中語人曰何須求外禄此一戸中年辦百萬蓋約言之也後因天文有變王儉極言文顯等專權徇私上天見異禍由四戸上手詔酬荅而不能攺也魏舊制戸調帛二匹絮二斤絲一斤糓二十斛又入帛一匹二丈委之州庫以供調外之費所調各隨土之所出丁卯詔曰置官班禄行之尚矣自中原䘮亂兹制中絶朕憲章舊典始班俸禄戸増調帛三匹穀二斛九斗以爲官司之禄増調外帛二匹禄行之後􅂍滿一匹者死變法攺度宜爲更始其大赦天下秋七月甲申立皇子子倫爲巴陵王乙未魏主如武州山石窟寺九月魏詔班禄以十月爲始季别受之舊律枉法十匹義贓二十匹罪死至是義贓一匹枉法無多少皆死仍分命使者紏桉守宰之貪者秦益二州刺史􅁪農李洪之以外戚貴顯爲治貪暴班禄之後洪之首以贓敗魏主命鎻赴平城集百官親臨數之猶以其大臣聽在家自裁自餘守宰坐贓死者四十餘乂受禄者無不跼蹐賕賂殆絶然吏民犯它罪者魏主率寛之疑罪奏讞多減死徙邊嵗以千計都下決大辟嵗不過五六人州鎮亦􅂤乆之淮南王佗奏請依舊斷禄文明太后召羣臣議之中書監髙閭以爲飢寒切身慈母不能保其子今給禄則廉者足以無濫貪者足以勸慕不給則貪者得肆其姦廉者不能自保淮南之議不亦謬乎詔從閭議閭又上表以爲北狄悍愚同於禽獸所長者野戰所短者攻城若以狄之所短奪其所長則雖衆不能成患雖來不能深入又狄散居野澤隨逐水草戰則與家業竝至奔則與畜牧俱逃不齎資糧而飲食自足是以歷代能爲邊患六鎮勢分倍衆不闘互相圍逼難以制之請依秦漢故事於六鎮之北築長城擇要害之地往往開門造小城於其側置兵扞守狄既不攻城野掠無􅀗草盡則走終必懲艾計六鎮東西不過千里一夫一月之功可城三步之地彊弱相兼不過用十萬人一月可就雖有暫勞可以永逸凡長城有五利罷遊防之苦一也北部放牧無抄掠之患二也登城觀敵以逸待勞三也息無時之備四也嵗常遊運永得不匱五也魏主優詔荅之冬十月丁巳以南徐州刺史長沙王晃爲中書監􅀄太祖臨終以晃屬帝使處於輦下或近藩勿令遠出且曰宋氏若非骨肉相殘它族豈得乗其弊汝深誡之舊制諸王在都唯得置捉刀左右四十人晃好武飾及罷南徐州私載數百人仗還建康爲禁司所覺投之江水帝聞之大怒將紏以法豫章王嶷叩頭流涕曰晃罪誠不足宥陛下當憶先朝念晃帝亦垂泣由是終無異意然亦不被親寵論者謂帝優於魏文減於漢明武陵王曅多才藝而踈婞亦無寵於帝嘗侍宴醉伏地貂抄肉柈帝笑曰肉汙貂對曰陛下愛羽毛而踈骨肉帝不恱曅輕財好施故無蓄積名後堂山曰首陽蓋怨貧薄也髙麗王璉遣使入貢於魏亦入貢於齊時髙麗方彊魏置諸國使邸齊使第一髙麗次之益州大度獠恃險驕恣前後刺史不能制及陳顯逹爲刺史遣使責其租賧獠帥曰兩眼刺史尚不敢調我况一眼乎遂殺其使顯逹分部將吏聲言出獵夜往襲之男女無少長皆斬之晉氏以來益州刺史皆以名將爲之十一月丁亥帝始以始興王鑑爲督益寜諸軍事益州刺史徴顯逹爲中護軍先是劫帥韓武方聚黨千餘人斷流爲暴郡縣不能禁鑑行至上明武方出降長史虞悰等咸請殺之鑑曰殺之失信且無以勸善乃啓臺而宥之於是巴西蠻夷爲宼暴者皆望風降附鑑時年十四行至新城道路籍籍云陳顯逹大選士馬不肯就徴乃停新城遣典籖張曇晢往觀形勢俄而顯逹遣使詣鑑咸勸鑑執之鑑曰顯逹立節本朝必自無此居二日曇晢還具言顯逹巳遷家出城日夕望殿下至於是乃前鑑喜文學器服如素士蜀人恱之乙未魏貟外散􅀐常侍李彪等來聘是嵗詔増豫章王嶷封邑爲四千户宋元嘉之丗諸王入齋閤得白服羣帽見人主唯出太極四廟乃備朝服自後此制遂絶上於嶷友愛宫中曲宴聽依元嘉故事嶷固辭不敢唯車駕至其弟乃白服烏紗帽以侍宴至於衣服器用制度動皆陳啓事無專制務從減省上竝不許嶷常慮盛滿求解楊州以授竟陵王子良上終不許曰畢汝一丗無所多言嶷長七尺八寸善修容範文物衛從禮冠百僚每出入殿省瞻望者無不肅然交州剌史李叔獻既受命而斷割外國貢獻上欲討之三年春正月丙辰以大司農劉楷爲交州刺史發南康廬陵始興兵以討叔獻叔獻聞之遣使乞更申數年獻十二隊純銀兠鍪及孔雀毦上不許叔獻懼爲楷所襲間道自湘州還朝戊寅魏詔曰圖䜟之興出於三季既非經國之典徒爲妖邪所慿自今圖䜟祕緯一皆焚之留者以大辟論又嚴禁諸巫覡及委巷卜筮非經典所載者魏馮太后作皇誥十八篇癸未大饗羣臣于太華殿班皇誥辛卯上祀南郊大赦詔復立國學釋奠先師用上公禮二月己亥魏制皇子皇孫有封爵者嵗禄各有差辛丑上祀北郊三月丙申魏封禧爲咸陽王幹爲河南王羽爲廣陵王雍爲潁川王勰爲始平王詳爲北海王文明太后令置學舘選師傅以教諸王勰於兄弟最賢敏而好學善屬文魏主尤竒愛之夏四月癸丑魏主如方山甲寅還宫􅀄宋太宗置揔明觀以集學士亦謂之東觀上以國學既立五月乙未省揔明觀時王儉領國子祭酒詔於儉宅開學士舘以揔明四部書充之又詔儉以家爲府自宋丗祖好文章士大夫悉以文章相尚無以專經爲業者儉少好禮學及春秋言論造次必於儒者由是衣冠翕然更尚儒術儉撰次朝儀國典自晉宋以來故事無不諳憶故當朝理事斷決如流毎博議引證八坐丞郎無能異者令史諮事常數十人賔客滿席儉應接辨析傍無留滯發言下筆皆有音彩十日一還學監試諸生巾卷在庭劒衛令史儀容甚盛作解散髻斜挿􅆪朝野慕之相與倣効儉常謂人曰江左風流宰相唯有謝安意以自比也上深委仗之士流選用奏無不可六月庚戌進河南王度易矦爲車􅀐將軍遣給事中吴興丘冠先使河南并送柔然使辛亥魏主如方山丁巳還宫秋七月癸未魏遣使拜宕昌王梁彌機兄子彌承爲宕昌王初彌機死子彌博立爲吐谷渾所逼奔仇池仇池鎮將穆亮以彌機事魏素厚矜其滅亡彌博㐫悖所部惡之彌承爲衆所附表請納之詔許之亮帥􅀐三萬軍于龍鵠擊走吐谷渾立彌承而還亮崇之曾孫也戊子魏主如魚池登青原岡甲午還宫八月己亥如彌澤甲寅登牛頭山甲子還宫魏初民多䕃附䕃附者皆無官役而豪彊徴斂倍於公賦給事中李安丗上言嵗飢民流田業多爲豪右所占奪雖桑井難復宜更均量使力業相稱又所爭之田宜限年斷事乆難明悉歸今主以絶詐妄魏主善之由是始議均田冬十月丁未詔遣使者循行州郡與牧守均給天下之田諸男夫十五以上受露田四十畒婦人二十畒奴婢依良丁牛一頭受田三十畒限止四牛所授之田率倍之三易之田再倍之以供耕作及還受之􅄹縮人年及課則受田老免及身没則還田奴婢牛隨有無以還受初受田者男夫給二十畒課種桑五十株桑田皆爲丗業身終不還􅁪計見口有􅄹者無受無還不足者受種如法􅄹者得賣其􅄹諸宰民之官各隨近給公田有差更代相付賣者坐如律辛酉魏魏郡王陳建卒魏貟外散􅀐常侍李彪等來聘十二月乙卯魏以侍中淮南王佗爲司徒柔然犯魏塞魏任城王澄帥衆拒之柔然遁去澄雲之子也氐羌反詔以澄爲都督梁益荆三州諸軍事梁州刺史澄至州討叛柔服氐羌皆平初太祖命黄門郎虞玩之等檢定黄籍上即位别立校籍官置令史哏人一日得數巧既連年不巳民愁怨不安外監㑹稽呂文度啓上籍被却者悉充逺戍民多逃亡避罪富陽民唐㝢之因以妖術惑衆作亂攻䧟富陽三吴却籍者奔之衆至三萬文度與茹法亮吕文顯皆以姦謟有寵於上文度爲外監專制兵權領軍守虚位而巳法亮爲中書通事舍人權􅀔尤盛王儉常曰我雖有大位權􅀉豈及茹公邪是嵗柔然部真可汗卒子豆崘立號伏名敦可汗攺元太平四年春正月癸亥朔魏髙祖朝㑹始服衮冕壬午柔然宼魏邊唐㝢之攻䧟錢唐吳郡諸縣令多弃城走㝢之稱帝於錢唐立太子置百官遣其將髙道度等攻䧟東陽殺東陽太守蕭崇之崇之太祖族弟也又遣其將孫泓宼山隂至浦陽江浹口戍主湯休武擊破之上發禁兵數千人馬數百匹東擊㝢之臺軍至錢唐㝢之衆烏合畏􅀐兵一戰而潰擒斬㝢之進平諸郡縣臺軍乗勝頗縱抄掠軍還上聞之丁酉收軍主前軍將軍陳天福弃市左軍將軍劉明徹免官削爵付東冶天福上寵將也既伏誅內外莫不震肅使通事舍人丹楊劉係宗隨軍慰勞遍至遭賊郡縣百姓􅀍驅逼者悉無所問閏月癸巳立皇太子貞爲邵陵王皇孫昭文爲臨汝公氐王楊後起卒丁未詔以白水太守楊集始爲北秦州刺史武都王集始文弘之子也後起弟後明爲白水太守魏亦以集始爲武都王集始入朝于魏魏以爲南秦州刺史辛亥上耕藉田二月己未立皇弟銶爲晉熙王鉉爲河東王魏無郷黨之法唯立宗主督護民多隱冒三五十家始爲一戸內袐書令李沖上言宜準古法五家立鄰長五鄰立里長五里立黨長取郷人彊謹者爲之鄰長復一夫里長二夫黨長三夫三載無過則升一等其民調一夫一婦帛一匹粟二石大率十匹爲公調二匹爲調外費三匹爲百官俸此外復有雜調民年八十巳上聽一子不從役孤獨癃老篤疾貧窮不能自存者三長內迭養食之書奏詔百官通議中書令鄭羲等皆以爲不可太尉丕曰臣謂此法若行於公私有益但方有事之月校比戸口民必勞怨請過今秋至冬乃遣使者於事爲宜沖曰民可使由之不可使知之若不因調時民徒知立長校戸之勤未見均傜省賦之益心必生怨宜及課調之月令知賦稅之均既識其事又得其利行之差易羣臣多言九品差調爲日巳乆一旦攺法恐成擾亂文明太后曰立三長則課調有常凖苞䕃之戸可出僥倖之人可止何爲不可甲戌初立黨里鄰三長定民戸籍民始皆愁苦豪彊者尤不願既而課調省費十餘倍上下安之三月丙申柔然遣使者牟提如魏時敕勒叛柔然柔然伏名敦可汗自將討之追奔至西漠魏左僕射穆亮等請乗虚擊之中書監髙閭曰秦漢之丗海內一統故可逺征匈奴今南有吳冦何可捨之深入虜庭魏主曰兵者凶器聖人不得巳而用之先帝屢出征伐者以有未賔之虜故也今朕承太平之業柰何無故動兵革乎厚禮其使者而歸之夏四月辛酉朔魏始制五等公服甲子初以法服御輦祀西郊癸酉魏主如靈泉池戊寅還宫湘州蠻反刺史吕安國有疾不能討丁亥以尚書左僕射柳丗隆爲湘州刺史討平之六月辛酉魏主如方山己卯魏文明太后賜皇子恂名大赦秋七月戊戌魏主如方山八月乙亥魏給尚書五等爵巳上朱衣玉佩大小組綬九月辛卯魏作明堂辟雍冬十一月魏議定民官依戸給俸十二月柔然宼魏邊是嵗魏攺中書學曰國子學分置州郡凡三十八州二十五在河南十三在河北五年春正月丁亥朔魏主詔定樂章非雅者除之戊子以豫章王嶷爲大司馬竟陵王子良爲司徒臨川王映衞將軍王儉中軍將軍王敬則竝加開府儀同三司子良啓記室范雲爲郡上曰聞其􅁪相賣弄朕不復窮法當宥之以逺子良曰不然雲動相規誨諌書具存遂取以奏凡百餘紙辭皆切直上歎息謂子良曰不謂雲能爾方使弼汝何宜出守文惠太子嘗出東田觀穫顧謂衆賔曰刈此亦殊可觀衆皆唯唯雲獨曰三時之務實爲長勤㐲願殿下知稼穡之艱難無徇一朝之宴逸荒人􅁊天生自稱􅁊玄宗族與雍司二州蠻相扇動據南陽故城請兵於魏將入宼丁酉詔假丹楊尹蕭景先節揔帥步􅀐直指義陽司州諸軍皆受節度又假護軍將軍陳顯逹節帥征虜將軍戴僧靜等水軍向宛葉雍司衆軍皆受顯逹節度以討之魏光禄大夫咸陽文公髙允歷事五帝出入三省五十餘年未嘗有譴馮太后及魏主甚重之常命中黄門􅂫興壽扶侍允仁恕簡静雖處貴重情同寒素執書吟覽晝夜不去手誨人以善恂恂不倦篤親念故無所遺棄顯祖平青徐悉徙其望族於代其人多允之婚媾流離飢寒允傾家賑施咸得其所又隨其才行薦之於朝議者多以􅀄附間之允曰任賢使能何有新舊必若有用豈可以此抑之允躰素無疾至是微有不適猶起㞐如常數日而卒年九十八贈侍中司空賻禭甚厚魏􅀄以來存亡蒙賚皆莫及也􅁊天生引魏兵萬餘人至沘陽陳顯逹遣戴僧靜等與戰於深橋大破之殺􅀗萬計天生退保沘陽僧靜圍之不克而還荒人胡丘生起兵懸弧以應齊魏人擊破之丘生來奔天生又引魏兵宼舞隂舞隂戍主殷公愍拒擊破之殺其副張麒麟天生􅀍創退走三月丁未以陳顯逹爲雍州刺史顯逹進據舞陽城夏五月壬辰魏主如靈泉池癸巳魏南平王渾卒甲午魏主還平城詔復七廟子孫及外戚緦麻服巳上賦役無所與魏南部尚書公孫邃上谷公張儵帥衆與􅁊天生復宼舞隂殷公愍擊破之天生還竄荒中邃表之孫也魏春夏大旱代地尤甚加以牛疫民餒死者多六月癸未詔内外之臣極言無隱齊州刺史韓麒麟上表曰古先哲王儲積九稔逮於中代亦崇斯業入粟者與斬敵同爵力田者與孝悌均賞今京師民庶不田者多遊食之口參分居二自承平日乆豐穰積年競相矜夸遂成侈俗貴冨之家童妾􅕼服工商之族僕􅀠玉食而農夫闕糟糠蠶婦乏短􅄄故令耕者日少田有荒蕪穀帛罄於府庫寳貨􅄹於市里衣食匱於室麗服溢於路飢寒之本寔在於斯愚謂凡珍異之物皆宜禁斷吉凶之禮備爲格式􅂆課農桑嚴加賞罰數年之中必有盈贍往年校比戸貫租賦輕少臣所統齊州租粟纔可給俸略無入倉雖於民爲利而不可長乆脫有戎役或遭天災恐供給之方無所取濟可減絹布増益穀租年豐多積嵗儉出賑所謂私民之穀􅀉積於官官有宿積則民無荒年矣秋七月己丑詔有司開倉賑貸聽民出􅀜就食遣使者造籍分遣去留所過給糧廪所至三長贍養之柔然伏名敦可汗殘暴其臣侯醫垔石洛候數諌止之且􅂆其與魏和親伏名敦怒族誅之由是部衆離心八月柔然冦魏邊魏以尚書陸叡爲都督擊柔然大破之叡麗之子也􅀄髙車阿伏至羅有部落十餘萬役屬柔然伏名敦之侵魏也阿伏至羅諌不聽阿伏至羅怒與從弟窮竒帥部落西走至前部西北自立爲王國人號曰候婁匐勒夏言天子也號窮竒曰候倍夏言太子也二人甚親睦分部而立阿伏至羅居北窮竒居南伏名敦追擊之屢爲阿伏至羅所敗乃引衆東徙九月辛未魏詔罷起部無益之作出宫人不執機杼者冬十月丁未又詔罷尚方錦繡綾羅之工四民欲造任之無禁是時魏乆無事府藏􅄹積詔盡出御府衣服珍寶太官雜噐太僕乗具内庫弓矢刀鈐十分之八外府衣物繒布絲纊非供國用者以其太半班賚百司下至工商皁􅀠逮于六鎮邊戍畿内鰥寡孤獨貧癃皆有差魏袐書令高祐丞李彪奏請攺國書編年爲紀傳表志魏主從之祐允之從祖弟也十二月詔彪與著作郎崔光攺修國書光道固之從孫也魏主問高祐曰何以止盜對曰昔宋均立徳猛虎渡河卓茂行化蝗不入境況盜賊人也苟守宰得人治化有方止之易矣祐又上䟽言今之選舉不採識治之優劣專􅂤年勞之多少斯非盡才之謂宜停此薄藝弃彼朽勞唯才是舉則官方斯穆又勲舊之臣雖年勤可録而才非撫民者可加之以爵賞不宜委之以方任所謂王者可私人以財不私人以官者也帝善之祐出爲西兖州刺史鎮滑臺以郡國雖有學縣黨亦宜有之乃命縣立講學黨立小學六年春正月乙未魏詔犯死刑者父母祖父母年老更無成人子孫旁無朞親者具狀以聞􅀄皇子右衛將軍子響出繼豫章王嶷嶷後有子表留爲丗子子響每入朝以車服異於諸王每拳擊車壁上聞之詔車服與皇子同於是有司奏子響宜還本三月己亥立子響爲巴東王角城戍將張蒲因大霧乗􅂳入清中採樵濳納魏兵戍主皇甫仲賢覺之帥衆拒戰於門中僅能却之魏步􅀐三千餘人巳至塹外淮隂軍主王僧慶等引兵救之魏人乃退夏四月􅁊天生復引魏兵出據隔城詔游擊將軍下邳曹虎督諸軍討之輔國將軍朱公恩將兵蹹伏遇天生遊軍與戰破之遂進圍隔城天生引魏兵步􅀐萬餘人來戰虎奮擊大破之俘斬二千餘人明日攻拔隔城斬其襄城太守帛烏祝復俘斬二千餘人天生弃平氏城走陳顯逹侵魏甲寅魏遣豫州刺史拓跋斤將兵拒之甲子魏大赦乙丑魏主如靈泉池丁卯如方山己巳還宫魏築城於醴陽陳顯逹攻拔之進攻沘陽城中將士皆欲出戰鎮將韋珍曰彼􅀄至氣銳未可與爭且共堅守待其力攻疲弊然後擊之乃慿城拒戰旬有二日珍夜開門掩擊顯逹還五月甲午以宕昌王梁彌承爲河涼二州刺史秋七月己丑魏主如靈泉池遂如方山已亥還宫九月壬寅上如琅邪城講武癸卯魏淮南靖王佗卒魏主方享宗廟始薦聞之爲廢祭臨視哀慟冬十月庚申立冬􅀄臨太極殿讀時令閏月辛酉以尚書僕射王奐爲領軍將軍辛未魏主如靈泉池癸酉還宫十二月柔然伊吾戍主高羔子帥衆三千以城附魏上以中外穀帛至賤用尚書右丞江夏李珪之議出上庫錢五千萬及出諸州錢皆令糴買西陵戍主杜元懿建言吴興無秋會稽豐登商旅往來倍多常嵗西陵牛埭稅官格日三千五百如臣所見日可增倍并浦陽南北津柳浦四埭乞爲官領攝一年格外可長四百許萬西陵戌前檢稅無妨戍事餘三埭自舉腹心上以其事下會稽會稽行事吴郡顧憲之議以爲始立牛埭之意非苟逼蹴以取稅也乃以風濤迅險濟急利物耳後之監領者不逹其本各務已功或禁遏佗道或空稅江行案吴興頻嵗失稔今兹尤甚去之從豐良由飢棘埭司責稅依格弗降舊格新減尚未議登格外加倍將以何術皇慈恤隱振廪蠲調而元懿幸災搉利重增困瘼人而不仁古今共疾若事不副言懼貽譴詰必百方侵苦爲公賈怨元懿禀性苛刻巳彰往効任以物上譬以狼將羊其所欲舉腹心亦當虎而冠耳書云與其有聚歛之臣寜有盜臣此言盜公爲損蓋微斂民所害乃大也愚又以便宜者蓋謂便於公宜於民也竊見頃之言便宜者非能於民力之外用天分地率皆即日不宜於民方來不便於公名與實反有乖政躰凡如此等誠宜深察上納之而止魏主訪羣臣以安民之術祕書丞李彪上封事以爲豪貴之家奢僭過度第宅車服宜爲之等制又國之興亡在􅃁嗣之善惡􅃁嗣善惡在教諭之得失髙宗文成皇帝嘗謂羣臣曰朕始學之日年尚幼冲情未能專既臨萬機不遑温習今日思之豈唯予咎抑亦師傅之不勤尚書李訢免冠謝此近事之可鑒者也臣謂宜準古立師傅之官以訓導太子又漢置常平倉以救匱乏去嵗京師不稔移民就豐既廢營生困而後逹又於國躰實有虚損曷若豫儲倉粟安而給之豈不愈於驅督老弱餬口千里之外哉宜析州郡常調九分之二京師度支嵗用之餘各立官司年豐糴粟積之於倉儉則加私之二糶之於人如此民必力田以取官絹積財以取官粟年登則常積嵗凶則直給數年之中穀積而人足雖災不爲害矣又宜於河表七州人中擢其門才引令赴闕依中州官比隨能序之一可以廣聖朝均新舊之義一可以懐江漢歸有道之情又父子兄弟異躰同氣罪不相及乃君上之厚恩至於憂懼相連固自然之􅁪理也無情之人父兄繫獄子弟無慘惕之容子弟逃刑父兄無愧恧之色宴安榮位遊從自若車馬衣冠不變華飾骨肉之恩豈當然也臣愚以爲父兄有犯宜令子弟素服肉􅃝詣闕請罪子弟有坐宜令父兄露板引咎乞解所司若職任必要不宜許者慰勉留之如此足以敦厲凡薄使人知所恥矣又朝臣遭親喪者假滿赴職衣錦乗軒從郊廟之祀鳴玉垂緌同慶賜之燕傷人子之道虧天地之經愚謂凡遭大父母父母喪者皆聽終服若無其人職業有曠者則優旨慰喻起令視事但綜司出納敷奏而巳國之吉慶一令無預其軍旅之警墨繞從役雖愆於禮事所宜行也魏主皆從之由是公私豐贍雖時有水旱而民不困窮魏遣兵擊百濟爲百濟所敗七年春正月辛亥上祀南郊大赦魏主祀南郊始備大駕壬戌臨川獻王映卒􅀄上爲鎮西長史主簿王晏以傾謟爲上所親自是常在上府上爲太子晏爲中庶子上之得罪於太祖也晏稱疾自踈及即位爲丹楊尹意任如舊朝夕進見議論朝事自豫章王嶷及王儉皆降意接之二月壬寅出爲江州刺史晏不願外出復留爲吏部尚書三月甲寅立皇子子岳爲臨賀王子峻爲廣漢王子琳爲宣城王子珉爲義安王夏四月丁丑魏主詔曰升樓散物以賚百姓至使人馬騰踐多有傷毁今可斷之以本所費之物賜老疾貧獨者丁亥魏主如靈泉池遂如方山己丑還宫上優禮南昌文憲公王儉詔三日一還朝尚書令史出外諮事上猶以往來煩數復詔儉還尚書下省月聽十日出外儉固求解選詔攺中書監參掌選事五月乙巳儉卒王晏既領選權行臺閣與儉頗不平禮官欲依王導謚儉爲文獻晏啓上曰導乃得此謚但宋氏以來不加異姓出謂親人曰平頭憲事巳行矣徐湛之之死也其孫孝嗣在孕得免八嵗襲爵枝江縣公尚宋康樂公主及上即位孝嗣爲御史中丞風儀端簡王儉謂人曰徐孝嗣將來必爲宰相上嘗問儉誰可繼卿者儉曰臣東都之日其在徐孝嗣乎儉卒孝嗣時爲吴興太守徵爲五兵尚書庚戌魏主祭方澤上欲用領軍王奐爲尚書令以問王晏晏與奐不相能對曰柳爲隆有勲望恐不宜在奐後甲子以尚書左僕射柳丗隆爲尚書令王奐爲左僕射六月丁亥上如琅邪城魏懐朔鎮將汝隂靈王天賜長安鎮都大將雍州刺史南安惠王楨皆坐贓當死馮太后及魏主臨皇信堂引見王公太后令曰卿等以爲當存親以毀令邪當滅親以明法邪羣臣皆言二王景穆皇帝之子宜蒙矜恕太后不應魏主乃下詔稱二王所犯難恕而太皇太后追惟高宗孔懐之恩且南安王事母孝謹聞於中外竝特免死削奪官爵禁錮終身􅀄魏朝聞楨貪暴遣中散閭文祖詣長安察之文祖受楨賂爲之隱事覺文祖亦抵罪馮太后謂羣臣曰文祖前自謂廉今竟犯法以此言之人心信不可知魏王曰古有待放之臣卿等自審不勝貪心者聽辭位歸第宰官中散慕容契進曰小人之心無常而帝王之法有常以無常之心奉有常之法非所克堪乞從退黜魏主曰契知心不可常則知貪之可惡矣何必求退遷宰官令契白曜之弟子也秋七月丙寅魏主如靈泉池魏主使羣臣議乆與齊絶今欲通使何如尚書游明根曰朝廷不遣使者又築醴陽深入彼境皆直在蕭賾不復追使不亦可乎魏主從之八月乙亥遣兼貟外散􅀐常侍邢産等來聘九月魏出宫人以賜北鎮人貧無妻者冬十一月己未魏安豐匡王猛卒十二月丙子魏河東王苟頽卒平南參軍顔幼明等聘於魏魏以尚書令尉元爲司徒左僕射穆亮爲司空豫章王嶷自以地位隆重深懐退素是嵗啓求還第上令其丗子子廉代鎮東府太子詹事張緒領楊州中正長沙王晃屬用吴興聞人邕爲州議曹緒不許晃使書佐固請緒正色曰此是身家州郷殿下何得見逼侍中江斆爲都官尚書中書舎人紀僧真得幸於上容表有士風請於上曰臣出自本縣武吏邀逢聖時階榮至此爲兒昏得荀昭光女即時無復所須唯就陛下乞作士大夫上曰此由江斆謝瀹我不得措意可自詣之僧真承旨詣斆登榻坐定斆顧命左右曰移吾牀遠客僧真喪氣而退告上曰士大夫故非天子所命斆湛之孫瀹朏之弟也柔然别帥叱吕勒帥衆降魏資治通鑑卷第百三十六
