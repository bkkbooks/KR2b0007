front:
  text: 待號曰八友法曹參軍柳惲太學博士王僧孺南徐州秀才濟陽江革尚書殿中郎范縝㑹稽孔休源亦預焉琛惠開之從子惲元景之從孫融僧逹之孫衍順之之子朓述之孫約璞之子僧孺雅之曾孫縝雲之從兄也子良篤好釋氏招致名僧講論佛法道俗之盛江左未有或親爲衆僧賦食行水丗頗以爲失宰相體范縝盛稱無佛子良曰君不信因果何得有富貴貧賤縝曰人生如樹花同發隨風而散或拂簾幌墜茵席之上或􅀜籬牆落糞溷之中墜茵席者殿下是也落糞溷者下官是也貴賤雖復殊途因果竟在何處子良無以難縝又著神滅論以爲形者神之質神者形之用也神之於形猶利之於刀未聞刀没而利存豈容形亡而神在哉此論出朝野諠譁難之終不能屈太原王琰著論譏縝曰嗚呼范子曽不知其先祖神靈所在欲以杜縝後對縝對曰嗚呼王子知其先祖神靈所在而不能殺身以從之子良使王融謂之曰以卿才美何患不至中書郎而故乖刺爲此論甚可惜也宜急毀弃之縝大笑曰使范縝賣論取官巳至令僕矣何但中書郎邪蕭衍好籌略有文武才幹王儉􅀷器異之曰蕭郎出三十貴不可言壬寅以柳丗隆爲尚書左僕射丹陽尹李安民爲右僕射王儉領丹楊尹夏四月甲寅魏主如方山戊午還宫庚申如鴻池丁卯還宫五月甲申魏遣貟外散􅀐常侍李彪等來聘
