front:
  text: 資治通鑑卷第二百八十四
  hash: sha256:90eb54d355d7099ed5fb1208d1f9ad4175a28433aa1f74e54220a1b3b1c41ce3
body:
  text: 臣司馬光奉勑編集後晉紀五大荒落七月凡二年有竒起閼逢執徐月盡旃􅂪齊王中開運元年二月甲辰朔命前保義節度使石贇守麻家口前威勝節度使何重建守楊劉鎭護聖都指揮使白再榮守馬家口西京留守安彦威守河陽未幾周儒引契丹將麻荅自馬家口濟河營於東岸攻鄆州北津以應楊光逺麻荅契丹主之從弟也乙巳遣侍衞馬軍都指揮使義成節度使李守貞神武統軍皇甫遇陳州防禦使梁漢璋懐州刺史薛懐讓將兵萬人縁河水陸俱進守貞河陽漢璋應州懐讓太原人也丙午契丹圍髙行周符彦卿及先鋒指揮使石公霸於戚城先是景延廣令諸將分地而守無得相救行周等告急延廣徐白帝帝自將救之契丹解去三將泣訴救兵之緩幾不免戊申李守貞等至馬家口契丹遣歩卒萬人築壘散􅀐兵於其外餘兵數萬屯河西船數十艘度兵未已晉兵薄之契丹􅀐兵退走晉兵進攻其壘拔之契丹大敗乗馬赴河溺死者數千人俘斬亦數千人河西之兵慟哭而去由是不敢復東辛亥定難節度使李彜殷奏將兵四萬自麟州濟河侵契丹之境壬子以彞殷為契丹西南面招討使初契丹主得貝州博州皆撫慰其人或拜官賜服章及敗於戚城及馬家口忿恚所得民皆殺之得軍士燔灸之由是晉人憤怒戮力爭奮楊光逺將青州兵欲西㑹契丹戊午詔石贇分兵屯鄆州以僃之詔劉知逺將部兵自土門出恒州擊契丹又詔㑹杜威馬全節於邢州知逺引兵屯樂平不進帝居䘮朞年即於宫中奏細聲女樂及出師常令左右奏三絃琵琶和以羌笛擊鼓歌舞曰此非樂也庚申百官表請聽樂詔不許壬戌楊光逺圍棣州刺史李瓊出兵擊敗之光逺燒營走還青州癸亥以前威勝節度使何重建為東面馬歩都部署將兵屯鄆州階州義軍指揮使王君懐帥所部千餘人叛降蜀請為鄉道以取階成甲子蜀人攻階州契丹僞弃元城去伏精􅀐於古頓丘城以俟晉軍與􅁪定之兵合而擊之鄴都留守張從恩屢奏虜已遁去大軍欲進追之㑹霖雨而止契丹設伏旬日人馬飢疲趙延壽曰晉軍悉在河上畏我鋒銳必不敢前不如即其城下四合攻之奪其浮梁則天下定矣契丹主從之三月癸酉朔自將兵十餘萬陳於澶州城北東西横掩城之兩隅登城望之不見其際髙行周前軍在戚城之南與契丹戰自午至晡互有勝負契丹主以精兵當中軍而來帝亦出陳以待之契丹主望見晉軍之盛謂左右曰楊光逺言晉兵半已餒死今何其多也以精􅀐左右略陳晉軍不動萬弩齊發飛矢蔽地契丹稍却又攻晉陳之東偏不克苦戰至暮兩軍死者不可勝數昬後契丹引去營於三十里之外乙亥契丹主帳中小校竊其馬亡來云契丹已傳木書收軍北去景延廣疑其詐閉壁不敢追漢主命中書令都元帥越王弘昌謁烈宗陵於海曲至昌華宫使盜殺之契丹主自澶州北分為兩軍一出滄徳一出深兾而歸所過焚掠方廣千里民物殆盡留趙延照為貝州留後麻荅䧟徳州擒刺史尹居璠閩拱宸都指揮使朱文進閤門使連重遇既弑康宗常懼國人之討相與結昬以自固閩主曦果於誅殺嘗遊西園因醉殺控鶴指揮使魏從朗從朗朱連之黨也又嘗酒酣誦白居易詩云惟有人心相對閒咫尺之情不能料因舉酒屬二人二人起流涕再拜曰臣子事君父安有它志曦不應二人大懼李后妬尚賢妃之寵欲弑曦而立其子亞澄使人告二人曰主上殊不平於二公柰何㑹后父李眞有疾乙酉曦如眞第問疾文進重遇使拱宸馬歩使錢逹弑曦於馬上召百官集朝堂告之曰太祖昭武皇帝光啟閩國今子孫淫虐荒墜厥緒天厭王氏宜更擇有徳者立之衆莫敢言重遇乃推文進升殿被衮冕帥羣臣北面再拜稱臣文進自稱閩主悉收王氏宗族延喜以下少長五十餘人皆殺之葬閩主曦謚曰睿文廣武明聖元徳隆道大孝皇帝廟號景宗以重遇揔六軍禮部尚書判三司鄭元弼抗辭不屈黜歸田里將奔建州文進殺之文進下令出宫人罷營造以反曦之政殷主延政遣統軍使呉成義將兵討文進不克文進加樞密使鮑思潤同平章事以羽林統軍使黄紹頗為泉州刺史左軍使程文緯為漳州郡吏汀州刺史同安許文稹舉郡降之丁亥詔太原恒安兵各還本鎭辛卯馬全節攻契丹㤗州拔之敇天下籍鄕兵毎七户共出兵械資一卒秦州兵救階州出黄階嶺敗蜀兵於西平漢以户部侍郎陳偓同平章事夏四月丁未縁河巡檢使梁進以鄉社兵復取徳州己酉命歸徳節度使髙行周保義節度使王周留鎭澶州庚戌帝發澶州甲寅至大梁侍衞馬歩都指揮使天平節度使同平章事景延廣旣為上下所惡帝亦憚其不遜難制桑維翰引其不救戚城之罪辛酉加延廣兼侍中出為西京留守以歸徳節度使兼侍中髙行周為侍衛馬歩都指揮使延廣鬱鬱不得志見契丹彊盛始憂國破身危遂日夜縱酒朝廷因契丹入寇國用愈竭復遣使者三十六人分道括率民財各封劔以授之使者多從吏卒􅂝鎻械刀杖入民家小大驚懼求死無地州縣吏復因縁為姦河南府出緡錢二十萬景延廣率三十七萬留守判官河南盧億言於延廣曰公位兼將相富貴極矣今國家不幸府庫空竭不得已取於民公何忍復因而求利為子孫之累乎延廣慙而止先是詔以楊光逺判命兖州修守僃泰寧節度使安審信以治樓堞為名率民財以實私藏大理卿張仁愿為括率使至兖州賦緡錢十萬值審信不在拘其守藏吏指取錢一囷已滿其數戊寅命侍衞馬歩都虞候㤗寧節度使李守貞將歩􅀐二萬討楊光逺於青州又遣神武統軍洛陽潘環及張彦澤等將兵屯澶州以僃契丹契丹遣兵救青州齊州防禦使堂陽薛可言邀撃敗之丙戌詔諸州所籍鄉兵號武定軍凡得七萬餘人時兵荒之餘復有此擾民不聊生丁亥鄴都留守張從恩上言趙延照雖據貝州麾下兵皆乆客思歸宜速進軍攻之詔以從恩為貝州行營都部署督諸將擊之辛卯從恩奏趙延照縱火大掠棄城而遁屯於瀛莫阻水自固朱文進遣使如唐唐主囚其使將伐之㑹天暑疾疫而止六月辛酉官軍拔淄州斬其刺史劉翰太尉侍中馮道雖為首相依違兩可無所操决或謂帝曰馮道承平之良相今艱難之際譬如使禪僧飛鷹耳癸卯以道為匡國節度使兼侍中乙巳漢主幽齊王弘弼于私第或謂帝曰陛下欲禦北狄安天下非桑維翰不可丙午復置樞密院以維翰為中書令兼樞密使事無大小悉以委之數月之間朝廷差治滑州河決浸汴曹單濮鄆五州之境環梁山合于汶詔大發數道丁夫塞之旣塞帝欲刻碑紀其事中書舎人楊昭儉諌曰陛下刻石紀功不若降哀痛之詔染翰頌美不若頒罪已之文帝善其言而止􅀄髙祖割北邊之地以賂契丹由是府州刺史折從逺亦北屬契丹欲盡徙河西之民以實遼東州人大恐從逺因保險拒之及帝與契丹絶遣使諭從逺使攻契丹從逺引兵深入拔十餘寨戊午以從逺為府州團練使從逺雲州人也甲子復置翰林學士戊辰以右散􅀐常侍李愼儀為兵部侍郎翰林學士承旨都官郎中劉温叟金部郎中知制誥武強徐台符禮部郎中李澣主客貟外郎宗城范質皆為學士温叟岳之子也秋七月辛未朔大赦改元己丑以太子太傅劉煦為司空兼門下侍郎同平章事八月辛丑朔以河東節度使劉知逺為北面行營都統順國節度使杜威為都招討使督十三節度以僃契丹桑維翰兩秉朝政出楊光逺景延廣於外至是一制指揮節度使十五人無敢違者時人服其膽略朔方節度使馮暉上章自陳未老可用而制書見遺維翰詔禁直學士使為荅詔曰非制書忽忘實以朔方重地非卿無以彈壓比欲移卿内地受代亦須竒才暉得詔甚喜時軍國多事百司及使者咨請輻湊維翰隨事裁決􅀄若不經思慮人疑其踈略退而熟議之亦終不能易也然為相頗任愛憎一飯之恩睚眦之怨必報人亦以是少之契丹之入寇也帝再命劉知逺㑹兵山東皆後期不至帝疑之謂所親曰太原殊不助朕必有異圖果有分何不速為之至是雖為都統而實無臨制之權密謀大計皆不得預知逺亦知見踈但愼事自守而已郭威見知逺有憂色謂知逺曰河東山川險固風俗尚武土多戰馬靜則勤稼穡動則習軍旅此霸王之資也何憂乎朱文進自稱威武留後權知閩國事遣使奉表稱藩于晉癸丑以文進為威武節度使知閩國事癸亥置鎭寧軍於澶州以濮州􅀠焉􅀄呉濠州刺史劉金卒子仁規代之仁規卒子崇俊代之唐烈祖置定逺軍於濠州以崇俊為節度使㑹清淮節度使姚景卒崇俊厚賂權要求兼領壽州唐主陽為不知其意徙崇俊為清淮節度使以楚州刺史劉彦貞為濠州觀察使馳往代之崇俊悔之彦貞信之子也九月庚午朔日有食之丙子契丹寇遂城樂壽深州刺史康彦進擊却之冬十月丙午漢主毒殺鎭王弘澤于邕州殷主延政遣其將陳敬佺以兵三千屯尤溪及古田盧進以兵二千屯長溪泉州散貟指揮使桃林留從效謂同列王忠順董思安張漢思曰朱文進屠滅王氏遣腹心分據諸州吾屬丗受王氏恩而交臂事賊一旦冨沙王克福州吾屬死有餘愧衆以為然十一月從效等各引軍中所善壯士夜飲於從效之家從效紿之曰富沙王已平福州密㫖令吾屬討黄紹頗吾觀諸君狀貌皆非乆處貧賤者從吾言冨貴可圖不然禍且至矣衆皆踊躍操白梃踰垣而入執紹頗斬之從效持州印詣王繼勲第請主軍府從效自稱平賊統軍使函紹頗首遣副兵馬使臨淮陳洪進齎詣建州洪進至尤溪福州戍兵數千遮道洪進紿之曰義師已誅朱福州吾倍道逆嗣君於建州爾輩尚守此何為乎以紹頗首示之衆遂潰大將數人從洪進詣建州延政以繼勲為侍中泉州刺史從效忠順思安洪進皆為都指揮使漳州將程謨聞之立殺刺史程文緯立王繼成權州事繼勲繼成皆延政之從子也朱文進之滅王氏二人以踈逺獲全汀州刺史許文稹奉表請降於殷十二月癸丑加朱文進同平章事封閩國王李守貞圍青州經時城中食盡餓死者太半契丹援兵不至楊光逺遥稽首於契丹曰皇帝皇帝誤光逺矣其子承勲承祚承信勸光逺降兾全其族光逺不許曰吾昔在代北嘗以紙錢祭天池而沈人皆言當為天子姑待之丁巳承勲斬勸光逺反者節度判官丘濤等送其首於守貞縱火大譟劫其父出居私第上表待罪開城納官軍朱文進聞黄紹頗死大懼以重賞募兵二萬遣統軍使林守諒内客省使李廷鍔將之攻泉州鉦鼔相聞五百里殷主延政遣大將軍杜進將兵二萬救泉州留從效開門與福州兵戰大破之斬守諒執廷鍔延政遣統軍使呉成義帥戰艦千艘攻福州朱文進遣子弟為質於呉越以求救􅀄唐翰林待詔臧循與樞密副使查文徽同鄕里循常為賈人習福建山川為文徽畫取建州之䇿文徽表請用兵擊王延政國人多以為不可唐主以文徽為江西安撫使循行境上覘其可否文徽至信州奏言攻之必克唐主以洪州營屯都虞候邊鎬為行營招討諸軍都虞候將兵從文徽伐殷文徽自建陽進屯蓋竹聞漳泉汀三州皆降于殷殷將張漢真自鏞州將兵八千將至文徽懼退保建陽臧循屯邵武邵武民導殷兵襲破循軍執循送建州斬之朝廷以楊光逺罪大而諸子歸命難於顯誅命李守貞以便宜從事閏月癸酉守貞入青州遣人拉殺光逺於别第以病死聞丙戌起復楊承勲除汝州防禦使殷呉成義聞有唐兵詐使人告福州吏民曰唐助我討賊臣大兵今至矣福人益懼乙未朱文進遣同平章事李光準等奉國寳于殷丁酉福州南廊承旨林仁翰謂其徒曰吾曹丗事王氏今受制賊臣富沙王至何面見之帥其徒三十人􅀍甲趣連重遇第重遇方嚴兵自衛三十人者望之稍稍遁去仁翰執槊直前刺重遇殺之斬其首以示衆曰富沙王且至汝軰族矣今重遇已死何不亟取文進以贖罪衆踊躍從之遂斬文進迎呉成義入城函二首送建州契丹復大舉入寇盧龍節度使趙延壽引兵先進契丹前鋒至邢州順國節度使杜威遣使間道告急帝欲自將拒之㑹有疾命天平節度使張從恩鄴都留守馬全節護國節度使安審琦㑹諸道兵屯邢州武寧節度使趙在禮屯鄴都契丹主以大兵繼至建牙於元氏朝廷憚契丹之盛詔從恩等引兵稍却於是諸軍忷懼無復部伍委弃器甲所過焚掠比至相州不復能整二年春正月詔趙在禮還屯澶州馬全節還鄴都又遣右神武統軍張彦澤屯黎陽西京留守景延廣自滑州引兵守胡梁渡庚子張從恩奏契丹逼邢州詔滑州鄴都復進軍拒之義成節度使皇甫遇將兵趣邢州契丹寇邢洺磁三州殺掠殆盡入鄴都境壬子張從恩馬全節安審琦悉以行營兵數萬陳於相州安陽水之南皇甫遇與濮州刺史慕容彦超將數千􅀐前覘契丹至鄴縣將度漳水遇契丹數萬遇等且戰且却至榆林店契丹大至二將謀曰吾屬今走死無遺矣乃止布陳自午至未力戰百餘合相殺傷甚衆遇馬斃因歩戰其僕杜知敏以所乗馬授之遇乗馬復戰乆之稍解顧知敏已為契丹所擒遇曰知敏義士不可弃也與彦超躍馬入契丹陳取知敏而還俄而契丹繼出新兵來戰二將曰吾屬勢不可走以死報國耳日且暮安陽諸將恠覘兵不還安審琦曰皇甫太師寂無聲問必為虜所困語未卒有一􅀐白遇等爲虜數萬所圍審琦即引􅀐兵出將救之張從恩曰此言未足信必若虜衆猥至盡吾軍恐未足以當之公往何益審琦曰成敗天也萬一不濟當共受之借使虜不南來坐失皇甫太師吾屬何顔以見天子遂踰水而進契丹望見塵起即解去遇等乃得還與諸將俱歸相州軍中皆服二將之勇彦超本吐谷渾也與劉知逺同母契丹亦引軍退其衆自相驚曰晉軍悉至矣時契丹主在邯鄲聞之即時北遁不再宿至鼓城是夕張從恩等議曰契丹傾國而來吾兵不多城中糧不支一旬萬一有姦人往告吾虛實虜悉衆圍我死無日矣不若引軍就􅀺陽倉南􅀝大河以拒之可以萬全議未決從恩引兵先發諸軍繼之擾亂失亡復如發邢州之時從恩等留歩兵五百守安陽橋夜四鼓知相州事符彦倫謂將佐曰此夕紛紜人無固志五百弊卒安能守橋即召入乗城為僃至曙望之契丹數萬􅀐已陳於安陽水北彦倫命城上揚旌鼓譟約束契丹不測日加辰趙延壽與契丹愓隱帥衆踰水環相州而南詔右神武統軍張彦澤將兵趣相州延壽等至湯陰聞之甲寅引還馬全節等擁大軍在黎陽不敢追延壽悉陳甲􅀐於相州城下若將攻城狀符彦倫曰此虜將走耳出甲卒五百陳於城北以待之契丹果引去以天平節度使張從恩權東京留守庚申振武節度使折從逺擊契丹圍勝州遂攻朔州帝疾小愈河北相繼告急帝曰此非安寢之時乃部分諸將為行計更命武定曰天威軍北面副招討使馬全節等奏據降者言虜衆不多宜乗其散歸種落大舉徑襲幽州帝以為然徴兵諸道壬戌下詔親征乙丑帝發大梁閩之故臣共迎殷主延政請歸福州改國號曰閩延政以方有唐兵未暇徙都以從子門下侍郎同平章事繼昌都督南都内外諸軍事鎭福州以飛捷指揮使黄仁諷為鎭遏使將兵衞之林仁翰至福州閩主賞之甚薄仁翰未嘗自言其功發南都侍衞及兩軍甲士萬五千人詣建州以拒唐二月壬辰朔帝至滑州壬申命安審琦屯鄴都甲戍帝發滑州乙亥至澶州己卯馬全節等諸軍以次北上劉知逺聞之曰中國疲弊自守恐不足乃横挑彊胡勝之猶有後患況不勝乎契丹自恒州還以羸兵驅牛羊過祁州城下刺史下邳沈斌出兵擊之契丹以精􅀐奪其門州兵不得還趙延壽知城中無餘兵引契丹急攻之斌在上延壽語之曰沈使君吾之故人擇禍莫若輕何不早降斌曰侍中父子失計陷身虜庭忍帥犬羊以殘父母之邦不自愧恥更有驕色何哉沈斌弓折矢盡寧為國家死耳終不効公所為明日城陷斌自殺丙戍詔北面行營都招討使杜威以本道兵㑹馬全節等進軍端明殿學士户部侍郎馮玉宣徽北院使權侍衞馬歩都虞候太原李彦韜皆挾恩用事惡中書令桑維翰數毁之帝欲罷維翰政事李崧劉煦固諌而止維翰知之請以玉爲樞密副使玉殊不平丙申中旨以玉爲戸部尚書樞密使以分維翰之權彦韜少事閻寳爲僕夫後􅀠髙祖帳下髙祖自太原南下留彦韜侍帝爲腹心由是有寵性纎巧與嬖幸相結以蔽帝耳目帝委信之至於升黜將相亦得預議常謂人曰吾不知朝廷設文官何所用且欲澄汰徐當盡去之唐查文徽表求益兵唐主以天威都虞候何敬洙爲建州行營招討馬歩都指揮使將軍祖全恩爲應援使姚鳯爲都監將兵數千㑹攻建州自崇安進屯赤嶺閩主延政遣僕射楊思㳟統軍使陳望將兵萬人拒之列柵水南旬餘不戰唐人不敢逼思㳟以延政之命督望戰望曰江淮兵精其將習武事國之安危繫此一舉不可不萬全而後動思㳟怒曰唐兵深侵陛下寢不交睫委之將軍今唐兵不出數千將軍擁衆萬餘不乗其未定而擊之有如唐兵懼而自退將軍何面目見陛下乎望不得已引兵渉水與唐戰全恩等以大軍當其前使竒兵出其後大破之望死思恭僅以身免延政大懼嬰城自守召董思安王忠順使將泉州兵五千詣建州分守要害􅀄髙祖置徳清軍於故澶州城及契丹入寇澶州鄴都之間城戌俱陷議者以澶州鄴都相去百五十里宜於中塗築城以應接南北從之三月戊戌更築徳清軍城合徳清南樂之民以實之􅀄光州人李仁逹仕閩為元從指揮使十五年不遷職閩主曦之丗叛奔建州閩主延政以為將及朱文進弑曦復叛奔福州陳取建州之䇿文進惡其反覆黜居福清浦城人陳繼珣亦叛閩主延政奔福州為曦畫策取建州曦以為著作郎及延政得福州二人皆不自安王繼昌暗弱􅄝酒不恤將士將士多怨仁逹潜入福州與繼珣說黄仁諷曰今唐兵乗勝建州􅀌危冨沙王不能保建州安能保福州昔王潮兄弟光山布衣耳取福建如反掌況吾輩乗此機㑹自圖冨貴何患不如彼乎仁諷然之是夕仁逹等引甲士突入府舎殺繼昌及呉成義仁逹欲自立恐衆心未服以雪峯寺僧卓巖明素為衆所重乃言此僧目重瞳子手垂過􅂰眞天子也相與迎之己亥立以為帝解去衲衣􅀍以衮冕帥將吏北面拜之然猶稱天福十年遣使奉表稱藩于晉延政聞之族黄仁諷家命統軍使張漢眞將水軍五千㑹漳泉兵討巖明乙巳杜威等諸軍㑹于定州以供奉官蕭處鈞權知祁州事庚戌諸軍攻契丹泰州刺史晉廷謙舉州降甲寅取滿城獲契丹酋長没剌及其兵二千人乙卯取遂城趙延壽部曲有降者言契丹主還至虎北口聞晉取泰州復擁衆南向約八萬餘􅀐計來夕當至宜速為僃杜威等懼丙辰退保泰州戊午契丹至泰州己未晉軍南行契丹踵之晉軍至陽城庚申契丹大至晉軍與戰逐北十餘里契丹踰白溝而去壬戌晉軍結陳而南胡􅀐四合如山諸軍力戰拒之是日纔行十餘里人馬飢乏癸亥晉軍至白團衞村埋鹿角為行寨契丹圍之數重竒兵出寨後斷糧道是夕東北風大起破屋折樹營中掘井方及水輒崩士卒取其泥帛絞而飲之人馬俱渴至曙風尤甚契丹主坐奚車中令其衆曰晉軍止此耳當盡擒之然後南取大梁命鐡鷂四面下馬拔鹿角而入奮短兵以擊晉軍又順風縱火揚塵以助其勢軍士皆憤怒大呼曰都招討使何不用兵令士卒徒死諸將請出戰杜威曰俟風稍緩徐觀可否馬歩都監李守貞曰彼衆我寡風沙之内莫測多少惟力􅃲者勝此風乃助我也若俟風止吾屬無類矣即呼曰諸軍齊擊賊又謂威曰令公善守禦守貞以中軍決死矣馬軍左廂都排陳使張彦澤召諸將問計皆曰虜得風勢宜俟風回與戰彦澤亦以為然諸將退馬軍右廂副排陳使太原藥元福獨留謂彦澤曰今軍中飢渴已甚若俟風回吾屬已為虜矣敵謂我不能逆風以戰宜出其不意急擊之此兵之詭道也馬歩左右廂都排陳使符彦卿曰與其束手就擒曷若以身徇國乃與彦澤元福及左廂都排陳使皇甫遇引精􅀐出西門擊之諸將繼至契丹却數百歩彦卿等謂守貞曰且曳隊往來乎直前􅁬擊以勝為度乎守貞曰事勢如此安可迴鞚宜長驅取勝耳彦卿等躍馬而去風勢益甚昬晦如夜彦卿等擁萬餘􅀐横擊契丹呼聲動天地契丹大敗而走勢如崩山李守貞亦令歩兵盡拔鹿角出􅃲歩􅀐俱進逐北二十餘里鐡鷂旣下馬蒼黃不能復上皆委弃馬及鎧仗蔽地契丹散卒至陽城東南水上稍復布列杜威曰賊已破膽不宜更令成列遣精􅀐擊之皆度水去契丹主乗奚車走十餘里追兵急􅀗一橐駝乗之而走諸將請急追之杜威揚言曰逢賊幸不死更索衣囊邪李守貞曰兩日人馬渴甚今得水飲之皆足重難以追寇不若全軍而還乃退保定州契丹主至幽州散兵稍集以軍失利杖其酋長各數百唯趙延壽得免乙丑諸軍自定州引歸詔以泰州􅀠定州夏四月辛巳帝發澶州甲申還大梁己丑復以鄴都為天雄軍閩張漢眞至福州攻其東關黄仁諷聞其家夷滅開門力戰大破閩兵執漢眞入城斬之卓巖明無它方略但於殿上噀水散豆作諸法事而巳又遣使迎其父於莆田尊為太上皇李仁逹旣立巖明自判六軍諸衛事使黄仁諷屯西門陳繼珣屯北門仁諷從容謂繼珣曰人之所以為人以有忠信仁義也吾頃嘗有功於冨沙中間叛之非忠也人以從子託我而與人殺之非信也屬者與建兵戰所殺皆鄕曲故人非仁也弃妻子使人魚肉之非義也此身十沈九浮死有餘愧因拊膺慟哭繼珣曰大丈夫徇功名何顧妻子宜置此事勿以取禍仁逹聞之使人告仁諷繼珣謀反皆殺之由是兵權盡歸仁逹五月丙申朔大赦順國節度使杜威乆鎭􅁪州性貪殘自恃貴戚多不法毎以僃邊爲名歛吏民錢帛以充私藏冨室有珍貨或名姝駿馬皆奪取之或誣以罪殺之籍沒其家又畏懦過甚毎契丹數十􅀐入境威已閉門登陴或數􅀐驅所掠華人千百過城下威但瞋目延頸望之無意邀取由是虜無所忌憚屬城多爲所屠威竟不出一卒救之千里之間暴骨如莽村落殆盡威見所部殘弊爲衆所怨又畏契丹之彊累表請入朝帝不許威不俟報遽委鎭入朝朝廷聞之驚駭桑維翰言於帝曰威固違朝命擅離邊鎭居常慿恃勲親邀求姑息及疆埸多事曽無守禦之意宜因此時廢之庶無後患帝不恱維翰曰陛下不忍廢之宜授以近京小鎭勿復委以雄藩帝曰威朕之密親必無異志但宋國長公主切欲相見耳公勿以為疑維翰自是不敢復言國事以足疾辭位丙辰威至大梁丁巳李仁逹大閲戰士請卓巖明臨視仁逹隂教軍士突前登階刺殺巖明仁逹陽驚狼狽而走軍士共執仁逹使居巖明之坐仁逹乃自稱威武留後用保大年號奉表稱藩于唐亦遣使入貢于晉并殺巖明之父唐以仁逹為威武節度使同平章事賜名弘義編之屬籍弘義又遣使修好於呉越己未杜威獻部曲歩􅀐合四千人并鎧仗庚申又獻粟十萬斛芻二十萬束云皆在本道帝以其所獻􅀐兵􅀠扈聖歩兵􅀠護國威復請以為牙隊而禀賜皆仰縣官威又令公主白帝求天雄節􅃏帝許之唐兵圍建州屢破泉州兵許文稹敗唐兵于汀州執其將時厚卿六月癸酉以杜威為天雄節度使契丹連歳入寇中國疲於奔命邊民塗地契丹人畜亦多死國人厭苦之述律太后謂契丹主曰使漢人為胡主可乎曰不可太后曰然則汝何故欲為漢主曰石氏負恩不可容太后曰汝今雖得漢地不能居也萬一蹉跌悔何所及又謂其羣下曰漢兒何得一向眠自古但聞漢和蕃未聞蕃和漢漢兒果能回意我亦何惜與和桑維翰屢勸帝復請和於契丹以紓國患帝假開封軍將張暉供奉官使奉表稱臣詣契丹卑辭謝過契丹主曰使景延廣桑維翰自來仍割鎭定兩道􅀠我則可和朝廷以契丹語忿謂其無和意乃止及契丹主入大梁謂李崧等曰曏使晉使再來則南北不戰矣秋七月閩人或告福州援兵謀叛閩主延政收其鎧仗遣還伏兵於隘盡殺之死者八千餘人脯其肉以歸為食唐邊鎬拔鐔州查文徽之黨魏岑馮延巳延魯以師出有功皆踊躍賛成之徴求供億府庫為之耗竭洪饒撫信之民尤苦之延政遣使奉表稱臣於呉越請為附庸以求救楚王希範疑靜江節度使兼侍中知朗州希杲得人心遣人伺之希杲懼稱疾求歸不許遣醫往視疾因毒殺之資治通鑑卷第二百八十四
