front:
  text: 資治通鑑卷第一百八十五
  hash: sha256:ea4b44ef0c724a9ccbc69cbe5b5f74ff2cb2b1a19d9f4db200f2217c488264cb
body:
  text: 臣司馬光奉勑編集唐紀一盡七月不蒲一年起著雍攝提格正月髙祖神堯大聖光孝皇帝上之上武徳元年春正月丁未朔隋恭帝詔唐王劒履上殿賛拜不名唐王既克長安以書諭諸郡縣於是東自商洛南盡巴蜀郡縣長吏及盜賊渠帥氐羌酋長爭遣子弟入見請降有司復書日以百數王世充既得東都兵進擊李密於洛北敗之遂屯鞏北辛酉世充命諸軍各造浮橋度洛擊密橋先成者先進前後不一虎賁郎將王辯破密外柵密營中驚擾將潰世充不知鳴角収衆密因帥敢死士乘之世充大敗爭橋溺死者萬餘人王辯死世充僅自免洛北諸軍皆潰世充不敢入東都北趣河陽是夜疾風寒雨軍士涉水沾濕道路凍死者又以萬數世充獨與數千人至河陽自繫獄請罪越王侗遣使赦之召還東都賜金帛美女以安其意世充収合亡散復得萬餘人屯含嘉城不敢復出密乘勝進據金墉城修其門堞廬舍而居之鉦鼓之聲聞於東都未幾擁兵三十餘萬陳於北邙南逼上春門乙丑金紫光禄大夫段達民部尚書韋津出兵拒之達望見密兵盛懼而先還密縱兵乘之軍遂潰韋津死於是偃師柏谷及河陽都尉獨孤武都檢校河内郡丞柳爕職方郎柳續等各舉所部降於密竇建徳朱粲孟海公徐圓朗等並遣使奉表勸進密官屬裴仁基等亦上表請正位號密曰東都未平不可議此戊辰唐王以世子建成為左元帥秦公世民為右元帥督諸軍十餘萬人救東都東都乏食太府卿元文都等募守城者不食公粮進散官二品於是商賈執象而朝者不可勝數二月己卯唐王遣太常卿鄭元璹將兵出商洛狥南陽左領軍府司馬安陸馬元規狥安陸及荆襄李密遣房彦藻鄭頲等東岀黎陽分道招慰州縣以梁郡太守楊汪為上柱國宋州總管又以手書與之曰昔在雍丘曾相追捕射鉤斬袂不敢庶幾汪遣使往來通意密亦羈縻待之彦藻以書招竇建徳使來見密建徳復書卑辭厚禮託以羅藝南侵請捍禦北垂彦藻還至衛州賊帥王徳仁邀殺之徳仁有衆數萬據林慮山四出抄掠為數州之患三月己酉以齊公元吉為鎮北將軍太原道行軍元帥都督十五郡諸軍事聽以便宜從事隋􅌆帝至江都荒淫益甚宮中為百餘房各盛供張實以美人日令一房為主人江都郡丞趙元楷掌供酒饌帝與蕭后及幸􅁎歴就宴飲酒巵不離口從􅁎千餘人亦常醉然帝見天下危亂意亦擾擾不自安退朝則幅巾短衣策杖歩遊徧歴臺館非夜不止汲汲顧景唯恐不足帝自曉占候卜相好為吳語常夜置酒仰視天文謂蕭后曰外閒大有人圖儂然儂不失為長城公卿不失為沈后且共樂飲耳因引滿沈醉又嘗引鏡自照顧謂蕭后曰好頭頸誰當斫之后驚問故帝笑曰貴賤苦樂更迭為之亦復何傷帝見中原已亂無心北歸欲都丹楊保據江東命羣臣廷議之内史侍郎虞世基等皆以為善右候衛大將軍李才極陳不可請車駕還長安與世基忿爭而出門下錄事衡水李桐客曰江東卑濕土地險狹内奉萬乘外給三軍民不堪命恐亦將散亂耳御史劾桐客謗毁朝政於是公卿皆阿意言江東之民望幸已乆陛下過江撫而臨之此大禹之事也乃命治丹楊宮將徙都之時江都糧盡從駕驍果多闗中人乆客思郷里見帝無西意多謀叛歸郎將竇賢遂帥所部西走帝遣騎追斬之而亡者猶不止帝患之虎賁郎將扶風司馬徳戡素有寵於帝帝使領驍果屯於東城徳戡與所善虎賁郎將元禮直閤裴䖍通謀曰今驍果人人欲亡我欲言之恐先事受誅不言於後事發亦不免族滅柰何又聞闗内淪沒李孝常以華隂叛上囚其二弟欲殺之我輩家屬皆在西能無此慮乎二人皆懼曰然計將安出徳戡曰驍果若亡不若與之俱去二人皆曰善因轉相招引内史舍人元敏虎牙郎將趙行樞鷹􅀭郎將孟秉符璽郎李覆牛方裕直長許􅀪仁薛世良城門郎唐奉義醫正張愷勲侍楊士覽等皆與之同謀日夜相結約於廣座明論叛計無所畏避有宫人白蕭后曰外閒人人欲反后曰任汝奏之宮人言於帝帝大怒以為非所宐言斬之其後宮人復白后后曰天下事一朝至此無可救者何用言之徒令帝憂耳自是無復言者趙行樞與將作少監宇文智及素厚楊士覽智及之甥也二人以謀告智及智及大喜徳戡等期以三月望日結黨西遁智及曰主上雖無道威令尚行卿等亡去正如竇賢取死耳今天實喪隋英雄並起同心叛者已數萬人因行大事此帝王之業也徳戡等然之行樞薛世良請以智及兄右屯衛將軍許公化及為主結約既定乃告化及化及性駑怯聞之變色流汗既而從之徳戡使許􅀪仁張愷入備身府告所識者云陛下聞驍果欲叛多醖毒酒欲因享㑹盡鴆殺之獨與南人留此驍果皆懼轉相告語反謀益急乙卯徳戡悉召驍果軍吏諭以所為皆曰唯將軍命是日風霾晝昏晡後徳戡盜御廐馬濳厲兵刀是夕元禮裴䖍通直閤下專主殿内唐奉義主閉城門與䖍通相知諸門皆不下鍵至三更徳戡於東城集兵得數萬人舉火與城外相應帝望見火且聞外諠囂問何事䖍通對曰草坊失火外人共救之耳時内外隔絶帝以為然智及與孟秉於城外集千餘人劫􅇋衛虎賁馮普樂布兵分守衢巷燕王倓覺有變夜穿芳林門側水竇而入至􅀇武門詭奏曰臣猝中風命懸俄頃請得面辭裴䖍通等不以聞執囚之丙辰天未明徳戡授䖍通兵以代諸門衛士䖍通自門將數百騎至成象殿宿衛者傳呼有賊䖍通乃還閉諸門獨開東門驅殿内宿衛者令出皆投仗而走右屯衛將軍獨孤盛謂䖍通曰何物兵形勢太異䖍通曰事勢已然不預將軍事將軍慎毋動盛大罵曰老賊是何物語不及被甲與左右十餘人拒戰為亂兵所殺盛楷之弟也千牛獨孤開逺帥殿内兵數百人詣􅀇武門叩閤請曰兵仗尚全猶堪破賊陛下若出臨戰人情自定不然禍今至矣竟無應者軍士稍散賊執開逺義而釋之先是帝選驍健官奴數百人置􅀇武門謂之給使以備非常待遇優厚至以宮人賜之司宮魏氏為帝所信化及等結之使為内應是日魏氏矯詔悉聽給使出外倉猝之際無一人在者徳戡等引兵自􅀇武門入帝聞亂易服逃於西閣䖍通與元禮進兵排左閤魏氏啓之遂入永巷問陛下安在有美人出指之校尉令狐行達拔刀直進帝映䆫扉謂行達曰汝欲殺我邪對曰臣不敢但欲奉陛下西還耳因扶帝下閣䖍通本帝為晉王時親信左右也帝見之謂曰卿非我故人乎何恨而反對曰臣不敢反但將士思歸欲奉陛下還京師耳帝曰朕方欲歸正為上江米船未至今與汝歸耳䖍通因勒兵守之至旦孟秉以甲􅀐迎化及化及戰栗不能言人有來謁之者但俛首據鞍稱罪過化及至城門徳戡迎謁引入朝堂號爲丞相裴䖍通謂帝曰百官悉在朝堂陛下須親出慰勞進其從􅀐逼帝乘之帝嫌其鞍勒弊更易新者乃乘之䖍通執轡挾刀出宮門賊徒喜譟動地化及揚言曰何用持此物出亟還與手帝問世基何在賊黨馬文舉曰已梟首矣於是引帝還至寢殿䖍通徳戡等拔白刃侍立帝歎曰我何罪至此文舉曰陛下違棄宗廟廵遊不息外勤征討内極奢淫使丁壯盡於矢刃女弱填於溝壑四民喪業盜賊蜂起專任佞諛飾非拒諌何謂無罪帝曰我實負百姓至於爾輩榮祿兼極何乃如是今日之事孰爲首邪徳戡曰溥天同怨何止一人化及又使封徳􅂜數帝罪帝曰卿乃士人何爲亦爾徳彞赧然而退帝愛子趙王杲年十二在帝側號慟不已䖍通斬之血濺御服賊欲弑帝帝曰天子死自有法何得加以鋒刃取鴆酒來文舉等不許使令狐行達頓帝令坐帝自解練巾授行達縊殺之初帝自知必及於難常以甖貯毒藥自隨謂所幸諸􅁎曰若賊至汝曹當先飲之然後我飲及亂顧索藥左右皆逃散竟不能得蕭后與宮人撤漆牀板爲小棺與趙王杲同殯於西院流珠堂帝每巡幸常以蜀王秀自隨囚於驍果營化及弑帝欲奉秀立之衆議不可乃殺秀及其七男又殺齊王暕及其二子并燕王倓隋氏宗室外戚無少長皆死唯秦王浩素與智及往來且以計全之齊王􅌔素失愛於帝􅁪相猜忌帝聞亂顧蕭后曰得非阿孩邪化及使人就第誅􅌔􅌔謂帝使収之曰詔使且緩兒兒不負國家賊曵至街中斬之􅌔竟不知殺者為誰父子至死不相明又殺内史侍郎虞世基御史大夫裴藴左翊衛大將軍來護兒秘書監袁充右翊衛將軍宇文協千牛宇文皛梁公蕭鉅等及其子鉅琮之弟子也難將作江陽長張惠紹馳告裴藴與惠紹謀矯詔發郭下兵収化及等扣門援帝議定遣報虞世基世基疑告反者不實抑而不許須臾難作藴歎曰謀及播郎竟誤人事虞世基宗人伋謂世基子符璽郎熈曰事勢已然吾將濟卿南度同死何益熈曰弃父背君求生何地感尊之懐自此決矣丗基弟丗南抱丗基號泣請以身代化及不許黄門侍郎裴矩知必將有亂雖厮役皆厚遇之又建䇿為驍果娶婦及亂作賊皆曰非裴黄門之罪既而化及至矩迎拜馬首故得免化及以蘇威不預朝政亦免之威名位素重往參化及化及集衆而見之曲加殊禮百官悉詣朝堂賀給事郎許善心獨不至許􅀪仁馳告之曰天子已崩宇文將軍攝政闔朝文武咸集天道人事自有代終何預於叔而低回若此善心怒不肯行􅀪仁反走上馬泣而去化及遣人就家擒至朝堂既而釋之善心不舞蹈而出化及怒曰此人大負氣復命擒還殺之其母范氏年九十二撫柩不哭曰能死國難吾有子矣因卧不食十餘日而卒唐王之入關也張季珣之弟仲琰為上洛令帥吏民拒守部下殺之以降宇文化及之亂仲琰弟琮為千牛左右化及殺之兄弟三人皆死國難時人愧之化及自稱大丞相揔百揆以皇后令立秦王浩為帝居别宫令發詔畫敕書而已仍以兵監守之化及以弟智及為左僕射士及為内史令裴矩為右僕射乙卯徙秦公世民為趙公戊辰隋恭帝詔以十郡益唐國仍以唐王為相國揔百揆唐國置丞相以下官又加九錫王謂僚屬曰此諂諛者所為耳孤秉大政而自加寵錫可乎必若循魏晉之迹彼皆繁文偽飾欺天罔人考其實不及五霸而求名欲過三王此孤常所非笑竊亦恥之或曰歴代所行亦何可廢王曰堯舜湯武各因其時取與異道皆推其至誠以應天順人未聞夏商之末必效唐虞之禪也若使少帝有知必不肯為若其無知孤自尊而飾譲平生素心所不為也但攺丞相為相國府其九錫殊禮皆歸之有司宇文化及以左武衛將軍陳稜為江都太守綜領留事壬申令内外戒嚴云欲還長安皇后六宫皆依舊式為御營營前别立帳化及視事其中仗衛部伍皆擬乗輿奪江都人舟檝取彭城水路西歸以折衝郎將沈光驍勇使將給使營於禁内行至顯福宫虎賁郎將麥孟才虎牙郎錢傑與光謀曰吾儕受先帝厚恩今俛首事讎受其驅帥何面目視息世閒哉吾必欲殺之死無所恨光泣曰是所望於將軍也孟才乃糾合恩舊帥所將數千人期以晨起將發時襲化及語洩化及夜與腹心走出營外留人告司馬徳戡等使討之光聞營内諠知事覺即襲化及營空無所獲值内史侍郎元敏數而斬之徳戡引兵入圍之殺光其麾下數百人皆鬬死一無降者孟才亦死孟才鐵杖之子也武康沈法興世為郡著姓宗族數千家法興為吳興太守聞宇文化及弑逆舉兵以討化及為名比至烏程得精卒六萬遂攻餘杭毗陵丹楊皆下之據江表十餘郡自稱江南道大揔管承制置百官陳國公竇抗唐王之妃兄也􅌆帝使行長城於靈武聞唐王定關中癸酉帥靈武鹽川等數郡來降夏四月稽胡宼富平將軍王師仁擊破之又五萬餘人宼冝春相國府諮議參軍竇軌將兵討之戰於黄欽山稽胡乗髙縱火官軍小却軌斬其部將十四人拔隊中小校代之勒兵復戰軌自將數百􅀐居軍後令之曰聞鼓聲有不進者自後斬之既而鼓之將士爭先赴敵稽胡射之不能止遂大破之虜男女二萬口世子建成等至東都軍於芳華􅁐東都閉門不出遣人招諭不應李密出軍爭之小戰各引去城中人多欲為内應者趙公世民曰吾新定關中根本未固懸得逺來雖得東都不能守也遂不受戊寅引軍還丗民曰城中見吾退必來追躡乃設三伏於三王陵以待之段達果將萬餘人追之遇伏而敗丗民逐北抵其城下斬四千餘級遂置新安宜陽二郡使行軍揔管史萬寳盛彦師將兵鎭宜陽吕紹宗任瓌將兵鎭新安而還初五原通守櫟陽張長遜以中原大亂舉郡附突厥突厥以為割利特勒郝瑗􅀃薛舉與梁師都及突厥連兵以取長安舉從之時啓民可汗之子咄苾號莫賀咄設建牙直五原之北舉遣使與莫賀咄設謀入宼莫賀咄設許之唐五使都水監宇文歆賂莫賀咄設且為陳利害止其出兵又􅀃莫賀咄設遣張長遜入朝以五原之地歸之中國莫賀咄設並從之己卯武都宕渠五原等郡皆降王即以長遜為五原太守長遜又詐為詔書與莫賀咄設示知其謀莫賀咄設乃拒舉師都等不納其使戊戌世子建成等還長安東都號令不出四門人無固志朝議郎段丗弘等謀應西師㑹西師已還乃遣人招李密期以己亥夜納之事覺越王命王世充討誅之密聞城中已定乃還宇文化及擁衆十餘萬據有六宫自奉飬一如煬帝每於帳中南面坐人有白事者嘿然不對下牙方取啓狀與唐奉義牛方裕薛丗良張愷等參決之以少主浩付尚書省令衛士十餘人守之遣令史取其畫敕百官不復朝參至彭城水路不通復奪民車牛得二千兩並載宫人珍寶其戈甲戎器悉令軍士負之道逺疲劇軍士始怨司馬徳戡竊謂趙行樞曰君大謬誤我當今撥亂必藉英賢化及庸暗羣小在側事將必敗若之何行樞曰在我等耳廢之何難初化及既得政賜司馬徳戡爵温國公加光禄大夫以其專統驍果心忌之後數日化及署諸將分配士卒以徳戡為禮部尚書外示羙遷實奪其兵柄徳戡由是憤怨所獲賞賜皆以賂智及智及為之言乃使之將後軍萬餘人以從於是徳戡行樞與諸將李本尹正卿宇文導師等謀以後軍襲殺化及更立德戡為主遣人詣孟海公結為外助遷延未發待海公報許弘仁張愷知之以告化及化及遣宇文士及陽爲遊獵至後軍徳戡不知事露出營迎謁因執之化及讓之曰與公戮力共定海内出於萬死今始事成方願共守富貴公又何反也徳戡曰本殺昏主苦其淫虐推立足下而又甚之逼於物情不獲已也化及縊殺之并殺其支黨十餘人孟海公畏化及之彊帥衆具牛酒迎之李密據鞏洛以拒化及化及不得西引兵向東郡東郡通守王􅁤以城降之辛丑李密將井陘王君廊帥衆來降君廓本羣盗有衆數千人與賊帥韋寶鄧豹合軍虞郷唐王與李密俱遣使招之寶豹欲從唐王君廓僞與之同乗其無僃襲擊破之奪其輜重奔李密密不禮之復來降拜上柱國假河内太守蕭銑即皇帝位置百官凖梁室故事謚其從父琮為孝靖皇帝祖巖為河間忠烈王父璿為文憲王封董景珍等功臣七人皆為王遣宋王楊道生撃南郡下之徙都江陵修復園廟引岑文本為中書侍郎使典文翰委以機密又使魯王張繡徇嶺南隋將張鎭周王仁壽等拒之既而聞􅌆帝遇弑皆降於銑欽州刺史寗長眞亦以鬱林始安之地附於銑漢陽太守馮盎以蒼梧髙涼珠崖番禺之地附於林士弘銑士弘各遣人招交趾太守丘和和不從銑遣寗長眞帥嶺南兵自海道攻和和欲出迎之司法書佐髙士廉􅀃和曰長眞兵數雖多懸軍逺至不能持乆城中勝兵足以當之柰何望風受制於人和從之以士廉為軍司馬將水陸諸軍逆擊破之長眞僅以身免盡俘其衆既而有驍果自江都至得􅌆帝凶問亦以郡附於銑士廉勱之子也始安郡丞李襲志遷哲之孫也隋末散家財募士得三千人以保郡城蕭銑林士弘曹武徹迭來攻之皆不克聞煬帝遇弑帥吏民臨三日或􅀃襲志曰公中州貴族乆臨鄙郡華夷恱服今隋室無主海内鼎沸以公威惠號令嶺表尉佗之業可坐致也襲志怒曰吾世繼忠貞今江都雖覆宗社尚存尉佗狂僭何足慕也欲斬􅀃者衆乃不敢言堅守二年外無聲援城䧟為銑所虜銑以為工部尚書檢校桂州揔管於是東自九江西抵三峽南盡交阯北距漢川銑皆有之勝兵四十餘萬煬帝凶問至長安唐王哭之慟曰吾北面事人失道不能救敢忘哀乎五月山南撫慰使馬元規撃朱粲於冠軍破之王徳仁既殺房彦藻李密遣徐丗勣討之徳仁兵敗甲寅與武安通守􅀽子幹皆來降詔以徳仁為鄴郡太守戊午隋恭帝禪位于唐遜居代邸甲子唐王即皇帝位于太極殿遣刑部尚書蕭造告吴於南郊大赦攺元罷郡置州以太守為刺史推五運為土徳色尚黄隋􅌆帝凶問至東都戊辰留守官奉越王即皇帝位大赦攺元皇泰是日於朝堂宣旨以時鍾金革公私皆即日大祥追謚大行曰明皇帝廟號丗祖追尊元德太子曰成皇帝廟號丗宗尊母劉良娣為皇太后以段達為納言陳國公王丗充為納言鄭國公元文都為内史令魯國公皇甫無逸為兵部尚書杞國公又以盧楚為内史令郭文懿為内史侍郎趙長文為黄門侍郎共掌朝政時人號七貴皇泰主眉目如畫温厚仁愛風格儼然辛未突厥始畢可汗遣骨咄禄特勒來宴之於太極殿奏九部樂時中國人避亂者多入突厥突厥彊盛東自契丹室韋西盡吐谷渾髙昌諸國皆臣之控􅁌百餘萬帝以初起資其兵馬前後餉遺不可勝紀突厥恃功驕倨每遣使者至長安多􅁀横帝優容之壬申命裴寂劉文靜等修定律令置國子太學四門生合三百餘貟郡縣學亦各置生貟六月甲戌朔以趙公丗民為尚書令黄臺公瑗為刑部侍郎相國府長史裴寂為右僕射知政事司馬劉文静為納言司録竇威為内史令李綱為禮部尚書參掌選事掾殷開山為吏部侍郎屬趙慈景為兵部侍郎韋義節為禮部侍郎主簿陳叔逹博陵崔民幹並為黄門侍郎唐儉為内史侍郎録事參軍裴晞為尚書右丞以隋民部尚書蕭瑀為内史令禮部尚書竇璡為户部尚書蔣公屈突通為兵部尚書長安令獨孤懷恩為工部尚書瑗上之從子懷恩舅子也上待裴寂特厚羣臣無與為比賞賜服玩不可勝紀命尚書奉御日以御膳賜寂視朝必引與同坐入閤則延之卧内言無不從稱為裴監而不名委蕭瑀以庶政事無大小莫不關掌瑀亦孜孜盡力繩違舉過人皆憚之毁之者衆終不自理上嘗有敕而内史不時宣行上責其遲瑀對曰大業之丗内史宣敕或前後相違有司不知所從其易在前其難在後臣在省日乆備見其事今王業經始事繫安危逺方有疑恐失機㑹故臣每受一敕必勘審使與前敕不違始敢宣行稽緩之愆實由於此上曰卿用心如是吾復何憂初帝遣馬元規慰撫山南南陽郡丞河東吕子臧獨據郡不從元規遣使數輩諭之皆為子臧所殺及煬帝遇弑子臧發喪成禮然後請降拜鄧州刺史封南郡公廢大業律令頒新格上每視事自稱名引貴臣同榻而坐劉文靜諌曰昔王導有言若太陽俯同萬物使羣生何以仰照今貴賤失位非常乆之道上曰昔漢光武與嚴子陵共寢子陵加足於帝腹今諸公皆名徳舊齒平生親友宿昔之歡何可忘也公勿以為嫌戊寅隋安陽令吕珉以相州來降以為相州刺史己卯祔四親廟主追尊皇髙祖瀛州府君曰宣簡公皇曾祖司空曰懿王皇祖景王曰景皇帝廟號太祖祖妣曰景烈皇后皇考元王曰元皇帝廟號世祖妣獨孤氏曰元貞皇后追謚妃竇氏曰穆皇后每歲祀昊天上帝皇地祗神州地祗以景帝配感生帝明堂以元帝配庚辰立丗子建成為皇太子趙公丗民爲秦王齊公元吉爲齊王宗室黄爪公白駒爲平原王蜀公孝基爲永安王柱國道玄爲淮陽王長平公叔良爲長平王鄭公神通爲永康王安吉公神符爲襄邑王柱國徳良爲新興王上柱國博义爲隴西王上柱國奉慈爲勃海王孝基叔良神符徳良帝之從父弟博义奉慈弟子道玄從父兄子也癸未薛舉宼涇州以秦王丗民爲元帥將八揔管兵以拒之遣太僕卿宇文明逹招慰山東以永安王孝基爲陜州揔管時天下未定凡邊要之州皆置揔管府以統數州之兵乙酉奉隋帝爲酅國公詔曰近丗以來時運遷革前代親族莫不誅夷興亡之效豈伊人力其隋蔡王智積等子孫並付所司量才選用東都聞宇文化及西來上下震懼有蓋琮者上䟽請􅀃李密與之合勢拒化及元文都謂盧楚等曰今讎恥未雪而兵力不足若赦密罪使撃化及兩賊自闘吾徐承其弊化及既破密兵亦疲又其將士利吾官賞易可離閒并密亦可擒也楚等皆以為然即以琮為通直散􅀐常侍齎敕書賜密丙申隋信都郡丞東萊麴稜來降拜冀州刺史丁酉萬年縣法曹武城孫伏伽上表以為隋以惡聞其過亡天下陛下龍飛􅀳陽逺近響應未朞年而登帝位徒知得之之易不知隋失之之不難也臣謂宜易其覆轍務盡下情凡人君言動不可不愼竊見陛下今日即位而明日有獻鷂鶵者此乃少年之事豈聖主所須哉又百戲散樂亡國淫聲近太常於民閒借婦女裙襦五百餘襲以充妓衣擬五月五日􅀇武門遊戲此亦非所以為子孫法也凡如此類悉冝廢罷善惡之習朝夕漸染易以移人皇太子諸王參僚左右宜謹擇其人其有門風不能雍睦為人素無行義專好奢靡以聲色遊獵為事者皆不可使之親近也自古及今骨肉乖離以至敗國亡家未有不因左右離閒而然也願陛下愼之上省表大恱下詔褒稱擢為治書侍御史賜帛三百匹仍頒示逺近辛丑内史令延安靖公竇威薨以將作大匠竇抗兼納言黄門侍郎陳叔逹判納言宇文化及留輜重於滑臺以王軌為刑部尚書使守之引兵北趣黎陽李密將徐丗勣據黎陽畏其軍鋒以兵西保倉城化及度河保􅀺陽分兵圍丗勣密帥歩􅀐二萬壁於清淇與丗勣以烽火相應深溝髙壘不與化及戰化及每攻倉城密輒引兵以掎其後密與化及隔水而語密數之曰卿本匈奴皁􅀠破野頭耳父兄子弟並受隋恩冨貴累世舉朝莫二主上失徳不能死諌反行弑逆欲規簒奪不追諸葛瞻之忠誠乃為霍禹之惡逆天地所不容將欲何之若速來歸我尚可得全後嗣化及黙然俯視良乆瞋目大言曰與爾論相殺事何須作書語邪密謂從者曰化及庸愚如此忽欲圖為帝王吾當折杖驅之耳化及盛修攻具以逼倉城丗勣於城外掘深溝以固守化及阻塹不得至城下丗勣於塹中為地道出兵撃之化及大敗焚其攻具時密與東都相持日乆又東拒化及常畏東都議其後見蓋琮至大喜遂上表乞降請討滅化及以贖罪送所獲凶黨雄武郎將于洪建遣元帥府記室參軍李儉上開府徐師譽等入見皇泰主命戮洪建於左掖門外如斛斯政之法元文都等以密降為誠實盛飾賔館於宣仁門東皇泰主引見儉等以儉為司農卿師譽為尚書右丞使具導從列鐃吹還館玉帛酒饌中使相望冊拜密太尉尚書令東南道大行臺行軍元帥魏國公令先平化及然後入朝輔政以徐世勣為右武侯大將軍仍下詔稱密忠欵且曰其用兵機略一禀魏公節度元文都等喜於和解謂天下可定於上東門置酒作樂自段達已下皆起舞王丗充作色謂起居侍郎崔長文曰朝廷官爵乃以與賊其志欲何為邪文都等亦疑丗充欲以城應化及由是有隙然猶外相彌縫陽為親善秋七月皇泰主遣大理卿張權鴻臚卿崔善福賜李密書曰今日以前咸共刷蕩使至以後彼此通懷七政之重佇公匡弼九伐之利委公指揮權等既至密北面拜受詔書既無西慮悉以精兵東撃化及密知化及軍糧且盡因偽與和化及大喜恣其兵食冀密饋之㑹密下有人獲罪亡扺化及具言其情化及大怒其食又盡乃度永濟渠與密戰于童山之下自辰達酉密為流矢所中墮馬悶絶左右奔散追兵且至唯秦叔寶獨捍衛之密由是獲免叔寶復収兵與之力戰化及乃退化及入汲郡求軍糧又遣使考掠東郡吏民以責米粟王軌等不堪其弊遣通事舍人許敬宗詣密請降密以軌為滑州揔管以敬宗為元帥府記室與魏徴共掌文翰敬宗善心之子也房公蘇威在東郡隨衆降密密以其隋氏大臣虛心禮之威見密初不言帝室艱危唯再三舞蹈稱不圖今日復覩聖明時人鄙之化及聞王軌叛大懼自汲郡引兵欲取以北諸郡其將陳智略帥嶺南驍果萬餘人樊文超帥江淮排䂎張童兒帥江東驍果數千人皆降於密文超子蓋之子也化及猶有衆二萬北趣魏縣密知其無能爲西還鞏洛留徐丗勣以僃之乙巳宣州刺吏周超撃朱粲敗之丁未梁師都宼靈州驃􅀐將軍藺興粲撃破之突厥闕可汗遣使内附初闕可汗附於李􅁤隋西戎使者曹瓊據甘州誘之乃更附瓊與之拒􅁤爲􅁤所敗竄於逹斗㧞谷與吐谷渾相表裏至是内附上厚加慰撫尋爲李􅁤所滅薛舉進逼髙墌遊兵至于􅃎􅄮秦王丗民深溝髙壘不與戰會丗民得瘧疾委軍事於長史納言劉文靜司馬殷開山且戒之曰薛舉懸軍深入食少兵疲若來挑戰愼勿應也俟吾疾愈爲君等破之開山退謂文靜曰王慮公不能辦故有此言耳且賊聞王有疾必輕我冝曜武以威之乃陳於髙墌西南恃衆而不設備舉濳師掩其後壬子戰於淺水原八揔管皆敗士卒死什五六大將軍慕容羅㬋李安逺劉弘基皆没丗民引兵還長安舉遂㧞髙墌収唐兵死者為京觀文靜等皆坐除名乙卯榆林賊帥郭子和遣使來降以為靈州揔管李密每戰勝輒遣使告捷於皇泰主隋人皆喜王丗充獨謂其麾下曰元文都輩刀筆吏耳吾觀其勢必為李密所擒且吾軍士屢與密戰没其父兄子弟前後已多一旦為之下吾屬無類矣欲以激怒其衆文都聞之大懼與盧楚等謀因丗充入朝伏甲誅之段逹性庸懦恐其不就遣其壻張志以楚等謀告丗充戊午夜三鼔丗充勒兵襲含嘉門元文都聞變入奉皇泰主御乾陽殿陳兵自衛命諸將閉門拒守將軍䟦野綱將兵出遇丗充下馬降之將軍費曜田闍戰於門外不利文都自將宿衛兵欲出􅀇武門以襲其後長秋監段瑜稱求門鑰不獲稽留遂乆天且曙文都引兵復欲出太陽門逆戰還至乾陽殿丗充已攻太陽門得入皇甫無逸弃母及妻子斫右掖門西奔長安盧楚匿於太官署丗充之黨擒之至興教門見丗充丗充令亂斬殺之進攻紫微宫門皇泰主使人登紫微觀問稱兵欲何為丗充下馬謝曰元文都盧楚等横見規圖請殺文都甘從刑典段逹乃令將軍黄桃樹執送文都文都顧謂皇泰主曰臣今朝死陛下夕至矣皇泰主慟哭遣之出興教門亂斬如盧楚并殺盧元諸子段逹又以皇泰主命開門納丗充丗充悉遣人代宿衛者然後入見皇泰主於乾陽殿皇泰主謂丗充曰擅相誅殺曾不聞奏豈為臣之道乎公欲肆其彊力敢及我邪丗充拜伏流涕謝曰臣䝉先皇采㧞粉骨非報文都等苞藏禍心欲召李密以危社稷疾臣違異深積猜嫌臣廹於救死不暇聞奏若内懷不臧違􅀒陛下天地日月實所照臨使臣闔門殄滅無復遺類詞淚俱發皇泰主以為誠引令升殿與語乆之因與俱入見皇太后丗充被髪為誓稱不敢有貳心乃以丗充為左僕射揔督内外諸軍事比及日中捕獲趙長文郭文懿殺之然後廵城告諭以誅元盧之意丗充自含嘉城移居尚書省漸結黨援恣行威福用兄丗惲為内史令入居禁中子弟咸典兵馬分政事為十頭悉以其黨主之勢震内外莫不趨附皇泰主拱手而已李密將入朝至温聞元文都等死乃還金墉東都大饑私錢濫惡太半雜以錫鐶其細如線米斛直錢八九萬初李密嘗受業於儒生徐文逺文逺為皇泰主國子􅀕酒自出樵采為密軍所執密令文逺南面坐備弟子禮北面拜之文逺曰老夫既荷厚禮敢不盡言未審將軍之志欲為伊霍以繼絶扶傾乎則老夫雖遲暮猶願盡力若為莾卓乘危邀利則無所用老夫矣密頓首曰昨奉朝命備位上公冀竭庸虚匡濟國難此密之本志也文逺曰將軍名臣之子失塗至此若能不逺而復猶不失為忠義之臣及王丗充殺元文都等密復問計於文逺文逺曰丗充亦門人也其為人殘忍􅄶隘既乘此勢必有異圖將軍前計為不諧矣非破丗充不可入朝也密曰始謂先生儒者不逹時事今乃坐决大計何其明也文逺孝嗣之􅀇孫也庚申詔隋氏離宫遊幸之所並廢之戊辰遣黄臺公瑗安撫山南己巳以隋右武衛將軍皇甫無逸為刑部尚書隋河閒郡丞王琮守郡城以拒羣盗竇建徳攻之歲餘不下聞􅌆帝凶問帥吏士發䘮乘城者皆哭建徳遣使弔之琮因使者請降建徳退舎具饌以待之琮言及隋亡俯伏流涕建徳亦為之泣諸將曰琮乆拒我軍殺傷甚衆力盡乃降請烹之建德曰琮忠臣也吾方賞之以勸事君奈何殺之往在髙雞泊為盗容可妄殺人今欲安百姓定天下豈得害忠良乎乃徇軍中曰先與王琮有怨敢妄動者夷三族以琮為瀛州刺史於是河北郡縣聞之爭附於建徳先是建徳陷景城執户曹河東張􅀇素將殺之縣民千餘人號泣請代其死曰戸曹清愼無比大王殺之何以勸善建德乃釋之以爲治書侍御史固辭及江都敗復以爲黄門侍郎􅀇素乃起饒陽令宋正本博學有才氣􅀃建德以定河北之䇿建德引為謀主建德定都樂壽命所居曰金城宫備置百官資治通鑑卷第一百八十五
