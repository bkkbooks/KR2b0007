body:
  text: 臣司馬光奉勑編集後漢紀四茂一年上章閹隱皇帝下乾祐三年春正月丁未加鳯翔節度使趙暉兼侍中密州刺史王萬敢請益兵以攻唐詔以前沂州刺史郭瓊爲東路行營都部署帥禁軍及齊州兵赴之郭威請勒兵北臨契丹之境詔止之丙寅遣使詣河中鳯翔收瘞戰死及餓殍遺骸時有僧已聚二十萬矣唐主聞漢兵盡平三叛始罷李金全北面行營招討使唐清淮節度使劉彦貞多歛民財以賂􅁠貴􅁠貴爭譽之在壽州積年恐􅀍代欲以警急自固妄奏稱漢兵將大舉􅀯伐二月唐主以東都留守燕王弘兾爲潤宣二州大都督鎭潤州寧國節度使周宗爲柬都留守朝廷欲移易藩鎭因其請赴嘉慶節上壽許之甲申郭威行北邊還福州人或詣建州告唐永安留後查文徽云呉越兵已弃城去請文徽爲帥文徽信之遣劒州刺史陳誨將水軍下閩江文徽自以歩􅀐繼之㑹大雨水漲誨一夕行七百里至城下敗福州兵執其將馬先進等庚寅文徽至福州呉越知威武軍呉程詐遣數百人出迎誨曰閩人多詐未可信也宜立寨徐圖文徽曰疑則變生不若乗機據其城因引兵徑進誨整衆鳴鼔止于江湄文徽不爲備程勒兵出擊之唐兵大敗文徽墜馬爲福人所執士卒死者萬人誨全軍歸劒州程送文徽於錢塘呉越王弘俶獻于五廟而釋之丁亥汝州奏防禦使劉審交卒吏民詣闕上書以審交有仁政乞留葬汝州得奉事其丘壟詔許之州人相與聚哭而葬之爲立祠歳時享之太師馮道曰吾甞爲劉君僚佐觀其爲政無以踰人非能減其租賦除其繇役也但推公廉慈愛之心以行之耳此亦衆人所能爲但它人不爲而劉君獨爲之故汝人愛之如此使天下二千石皆効其所爲何患得民不如劉君哉甲午呉越丞相昭化節度使同平章事杜建徽卒乙未以前永興節度使趙匡賛爲左驍衛上將軍三月丙午嘉慶節鄴都留守髙行周天平節度使慕容彦超泰寧節度使符遠節度使楊信安國節度使彦卿昭義節度使常思安逺節度使楊信安國節度使薛懷讓成德節度使武行德彰德節度使郭謹保大留後王饒皆入朝甲寅詔營寢廟於高祖長陵丗祖原陵以時致祭有司以費多寢其事以至國亡二陵竟不霑一奠壬戌徙高行周爲天平節度使符彦卿爲平盧節度使甲子徙慕容彦超爲泰寜節度使永安節度使折從阮舉族入朝夏四月戊辰朔徙薛懷讓爲匡國節度使庚午徙折從阮爲武勝節度使壬申徙楊信爲保大節度使徙鎭國節度使劉詞爲安國節度使永清節度使王令温爲安逺節度使李守貞之亂王饒濳與之通守貞平衆謂饒必居散地及入朝厚結史弘肈遷護國節度使聞者駭之楊邠求解樞密使帝遣中使諭止之宣徽北院使呉虔􅁉在旁曰樞密重地難以乆居當使後來者迭爲之相公辭之是也帝聞之不恱辛巳以虔裕爲鄭州防禦使朝廷以契丹近入寇横行河北諸藩鎭各自守無扞禦之者議以郭威鎭鄴都使督諸將以備契丹史弘肈欲威仍領樞密使蘇逢吉以爲故事無之弘肈曰領樞密使則可以便宜從事諸軍畏服號令行矣帝卒從弘肈議弘肇怨逢吉異議逢吉曰以內制外順也今反以外制內其可乎壬午制以威爲鄴都留守天雄節度使樞密使如故仍詔河北兵甲錢榖但見郭威文書立皆禀應明日朝貴㑹飲於竇貞固之第弘肈舉大觴屬威厲聲曰昨日廷議一何同異今日爲弟飲之逢吉與楊邠亦舉觴曰是國家之事何足介意弘肈又厲聲曰安定國家在長槍大劒安用毛錐王章曰無毛錐則財賦何從可出自是將相始有􅂩癸未罷永安軍壬辰以左􅁥門衛將軍郭榮爲貴州刺史天雄牙內都指揮使榮本姓柴父守禮郭威之妻兄也威未有子時養以爲子五月己亥以府州蕃漢馬歩都指揮使折德扆爲本州團練使德扆從阮之子也庚子郭威辭行言於帝曰太后從先帝乆多歷天下事陛下富於春秋有事宜禀其教而行之親近忠直放逺䜛邪善惡之閒所宜明審蘇逢吉楊邠史弘肇皆先帝舊臣盡忠徇國願陛下推心任之必無敗失至於疆場之事臣願竭其愚駑庶不負驅策帝斂容謝之威至鄴都以河北困弊戒邊將謹守疆􅂣嚴守備無得出侵掠契丹入寇則堅壁清野以待之辛丑敕防禦團練使自非軍期無得專奏事皆先申觀察使斟酌以聞丙午以皇弟山南西道節度使承勲爲開封尹加兼中書令實未出閤平盧節度使劉銖貪虐恣横朝廷欲徴之恐其拒命因沂密用兵於唐遣前沂州刺史郭瓊將兵屯青州銖不自安置酒召瓊伏兵幕下欲害之瓊知其謀悉屏左右從容如㑹了無懼色銖不敢發瓊因諭以禍福銖感服詔至即行庚戌銖入朝辛亥以瓊爲潁州團練使癸丑王章置酒㑹諸朝貴酒酣爲手􅀔令史弘肈不閑其事客省使閻晉卿坐次弘肈屢教之蘇逢吉戲之曰旁有姓閻人何憂罰爵弘肈妻閻氏本酒家倡也意逢吉譏之大怒以醜語詬逢吉逢吉不應弘肈欲歐之逢吉起去弘肈索劒欲追之楊邠泣止之曰蘇公宰相公若殺之置天子何地願孰思之弘肈即上馬去邠與之聮鑣送至其第而還於是將相如水火矣帝使宣徽使王峻置酒和解之不能得逢吉欲求出鎭以避之旣而中止曰吾去朝廷止煩史公一處分吾韲粉矣王章亦忽忽不樂欲求外官楊史固止之閏月宫中數有怪癸巳大風雨發屋拔木吹鄭門扉起十餘歩而落震死者六七人水深平地尺餘帝召司天􅁥趙延乂問以禳祈之術對曰臣之業在天文時日禳祈非所習也然王者欲弭災異莫如修德延乂歸帝遣中使問如何爲修德延乂對請讀貞觀政要而灋之六月河決鄭州馬希萼旣敗歸乃以書誘辰溆州及梅山蠻欲與共擊湖南蠻素聞長沙帑藏之富大喜爭出兵赴之遂攻益陽楚王希廣遣指揮使陳璠拒之戰于淹溪璠敗死秋七月唐歸馬先進等於呉越以易查文徽馬希萼又遣羣蠻攻迪田八月戊戌破之殺其鎭將張延嗣楚王希廣遣指揮使黄處超救之處超敗死潭人震恐復遣牙內指揮使崔洪璉將兵七千屯玉潭庚子蜀主立其弟仁毅爲夔王仁贄爲雅王仁􅁉爲彭王仁操爲嘉王己酉立子玄喆爲秦王玄珏爲襃王晉李太后在建州卧病無醫藥惟與晉主仰天號泣㦸手罵杜重威李守貞曰吾死不置汝戊午卒周顯德中有自契丹來者云晉主及馮后尚無恙其從者亡歸及物故則過半矣馬希萼表請別置進奏務於京師九月辛巳詔以湖南已有進奏務不許亦賜楚王希廣詔勸以敦睦馬希萼以朝廷意佑楚王希廣怒遣使稱藩于唐乞師攻楚唐加希萼同平章事以鄂州今年租稅賜之命楚州刺史何敬洙將兵助希萼冬十月丙午希廣遣使上表告急言荆南嶺南江南連謀欲分湖南之地乞發兵屯澧州以扼江南荆南援朗州之路丁未以呉越王弘俶爲諸道兵馬元帥楚王希廣以朗州與山蠻入寇諸將屢敗憂形於色劉彦瑫言於希廣曰朗州兵不滿萬馬不滿千都府精兵十萬何憂不勝願假臣兵萬餘人戰艦百五十艘徑入朗州􅅞取希萼以解大王之憂王恱以彦瑫爲戰棹都指揮使朗州行營都統彦瑫入朗州境父老爭以牛酒犒軍曰百姓不願從亂望都府之兵乆矣彦瑫厚賞之戰艦過則運竹木以斷其後是日馬希萼遣朗兵及蠻兵六千戰艦百艘逆戰於湄州彦瑫乗風縱火以焚其艦頃之風回反自焚彦瑫還走江路已斷士卒戰及溺死者數千人希廣聞之涕泣不知所爲希廣平日罕頒賜至是大出金帛以取恱於士卒或告天䇿左司馬希崇流言惑衆反狀已明請殺之希廣曰吾自害其弟何以見先王於地下馬軍指揮使張暉將兵自它道擊朗州至龍陽聞彦瑫敗退屯益陽希萼又遣指揮使朱進忠等將兵三千急攻益陽張暉紿其衆曰我以麾下出賊後汝輩留城中待我相與合􅀔擊之旣出遂自竹頭市遁歸長沙朗兵知城中無主急擊之士卒九千餘人皆死呉越王弘俶歸查文徽於唐文徽得瘖疾以工部尚書致仕十一月甲子朔日有食之蜀太師中書令宋忠武王趙廷隱卒楚王希廣遣其僚屬孟駢􅀃馬希萼曰公忘父兄之讎北面事唐何異􅀽譚求救於曹公邪希萼將斬之駢曰古者兵交使在其閒駢若愛死安肯此來駢之言非私於潭人實爲公謀也乃釋之使還報曰大義絶矣非地下不相見也朱進忠請希萼自將兵取潭州辛未希萼留其子光賛守朗州悉發境內之兵趣長沙自稱順天王詔侍衞歩軍都指揮使寧江節度使王殷將兵屯澶州以備契丹殷瀛州人也朝廷議發兵以安逺節度使王令温爲都部署以救潭州㑹内難作不果帝自即位以來樞密使右僕射同平章事楊邠緫機政樞密使兼侍中郭威主征伐歸德節度使侍衞親軍都指揮使兼中書令史弘肈典宿衞三司使同平章事王章掌財賦邠頗公忠退朝門無私謁雖不却四方饋遺有餘輒獻之弘肈督察京城道不拾遺是時承契丹蕩覆之餘公私困竭章捃摭遺利吝於出納以實府庫屬三叛連衡宿兵累年而供饋不乏及事平賜予之外尚有餘積以是國家粗安章聚斂刻急舊制田稅每斛更輸二升謂之雀䑕耗章始令更輸二斗謂之省耗舊錢出入皆以八十爲陌章始令入者八十出者七十七謂之省陌有犯鹽礬酒麴之禁者錙銖㳙滴罪皆死由是百姓愁怨章尤不喜文臣甞曰此輩授之握筭不知縱横何益於用俸禄皆以不堪資軍者給之吏已高其估章更増之帝左右嬖倖浸用事太后親戚亦干預朝政邠等屢裁抑之太后有故人子求補軍職弘肈怒而斬之武德使李業太后之弟也高祖使掌內帑帝即位尤􅀩寵任㑹宣徽使闕業意欲之帝及太后亦諷執政邠弘肈以爲內使遷補有次不可以外戚超居乃止內客省使閻晉卿次當爲宣徽使乆而不補樞密承㫖聶文進飛龍使後匡賛翰林茶酒使郭允明皆有寵於帝乆不遷官共怨執政文進并州人也劉銖罷青州歸乆奉朝請未除官常㦸手於執政帝初除三年喪聽樂賜伶人錦袍玉帶伶人詣弘肈謝弘肈怒曰士卒守邊苦戰猶未有以賜之汝曹何功而得此皆奪以還官帝欲立所幸耿夫人爲后邠以爲太速夫人卒帝欲以后禮葬之邠復以爲不可帝年益壯厭爲大臣所制邠弘肈甞議事於帝前帝曰審圖之勿令人有言邠曰陛下但禁聲有臣等在帝積不能平左右因乗間譛之於帝云邠等專恣終當爲亂帝信之甞夜聞作坊鍜聲疑有急兵逹旦不寐司空同平章事蘇逢吉旣與弘肈有􅂩知李業等怨弘肈屢以言激之帝遂與業文進匡賛允明謀誅邠等議旣定入白太后太后曰兹事何可輕發更宜與宰相議之業時在旁曰先帝甞言朝廷大事不可謀及書生懦怯誤人太后復以爲言帝忿曰國家之事非閨門所知拂衣而出乙亥業等以其謀告閻晉卿晉卿恐事不成詣弘肈第欲告之弘肈以它故辭不見丙子旦邠等入朝有甲士數十自廣政殿出殺邠弘肈章於東廡下文進亟召宰相朝臣班於崇元殿宣云邠等謀反已伏誅與卿等同慶又召諸軍將校至萬歳殿庭帝親諭之且曰邠等以穉子視朕朕今始得爲汝主汝輩免横憂矣皆拜謝而退又召前節度使剌史等升殿諭之分遣使者帥􅀐収捕邠等親戚黨與傔從盡殺之弘肈待侍衞歩軍都指揮使王殷尤厚邠等死帝遣供奉官孟業齎密詔詣澶州及鄴都令鎭寧節度使李洪義殺殷又令鄴都行營馬軍都指揮使郭崇威歩軍都指揮使眞定曹威殺郭威及監軍宣徽使王峻洪義太后之弟也又急詔徴天平軍節度使髙行周平盧節度使符彦卿永興節度使郭從義泰寧節度使慕容彦超匡國節度使薛懷讓鄭州防禦使呉虔􅁉陳州剌史李穀入朝以蘇逢吉權知樞密院事前平盧節度使劉銖權知開封府侍衞馬軍都指揮使李洪建權判侍衞司事內侍省使閻晉卿權侍衞馬軍都指揮使洪建業之兄也時中外人情憂駭蘇逢吉雖惡弘肈而不預李業等謀聞變驚愕私謂人曰事大怱怱主上儻以一言見問不至於此業等命劉銖誅郭威王峻之家銖極其慘毒嬰孺無免者命李洪建誅王殷之家洪建但使人守視仍飲食之丁丑使者至澶州李洪義畏懦慮王殷已知其事不敢發乃引孟業見殷殷囚業遣副使陳光穗以密詔示郭威威詔樞密吏魏仁浦示以詔書曰柰何仁浦曰公國之大臣功名素著加之握彊兵據重鎭一旦爲羣小所搆禍出非意此非辭􅀃所能解時事如此不可坐而待死威乃召郭崇威曹威及諸將告以楊邠等冤死及有密詔之狀且曰吾與諸公披荆棘從先帝取天下受託􅀌之任竭力以衞國家今諸公已死吾何心獨生君輩當奉行詔書取吾首以報天子庶不相累郭崇威等皆泣曰天子幼沖此必左右羣小所爲若使此輩得志國家其得安乎崇威願從公入朝自訴盪滌䑕輩以清朝廷不可爲單使所殺受千載惡名翰林天文趙修己謂郭威曰公徒死何益不若順衆心擁兵而南此天啓也郭威乃留其養子榮鎭鄴都命郭崇威將􅀐兵前驅戊寅自將大軍繼之慕容彦超方食得詔捨匕筯入朝帝悉以軍事委之己卯呉虔􅁉入朝帝聞郭威舉兵南向議發兵拒之前開封尹矦益曰鄴都戍兵家屬皆在京師官軍不可輕出不若閉城以挫其鋒使其母妻登城招之可不戰而下也慕容彦超曰矦益衰老爲懦夫計耳帝乃遣益及閻晉卿呉虔􅁉前保大節度使張彦超將禁軍趣澶州是日郭威已至澶州李洪義納之王殷迎謁慟哭以所部兵從郭威渉河帝遣內養鸗脫覘郭威威獲之以表置鸗脫衣領中使歸白帝曰臣昨得詔書延頸俟死郭崇威等不忍殺臣云此皆陛下左右貪權無厭者􅉲臣耳逼臣南行詣闕請罪臣求死不獲力不能制臣數日當至闕廷陛下若以臣爲有罪安敢逃刑若實有􅉲臣者願執付軍前以快衆心臣敢不撫諭諸軍退歸鄴都庚辰郭威趣滑州辛巳義成節度使宋延渥迎降延渥洛陽人其妻高祖女永寧公主也郭威取滑州庫物以勞將士且諭之曰聞矦令公已督諸軍自南來今遇之交戰則非入朝之義不戰則爲其所屠吾欲全汝曹功名不若奉行前詔吾死不恨皆曰國家負公公不負國所以萬人爭奮如報私讎侯益輩何能爲乎王峻徇於衆曰我得公處分俟克京城聽旬日剽掠衆皆踊躍辛巳鸗脫至大梁前此帝議自徃澶州聞郭威已至河上而止帝甚有悔懼之色私謂竇貞固曰屬者亦太草草李業等請傾府庫以賜諸軍蘇禹珪以爲未可業拜禹珪於帝前曰相公且爲天子勿惜府庫乃賜禁軍人二十緡下軍半之將士在北者給其家仍使通家信以誘之壬午郭威軍至封丘人情忷懼太后泣曰不用李濤之言宜其亡也慕容彦超恃其驍勇言於帝曰臣視北軍猶蠛蠓耳當爲陛下生致其魁退見聶文進問北來兵數及將校姓名頗懼曰是亦劇賊未易輕也帝復遣左神武統軍􅀽㠖前威勝節度使劉重進等帥禁軍與矦益等㑹屯赤岡㠖象先之子也彦超以大軍屯七里店癸未南北軍遇於劉子陂帝欲自出勞軍太后曰郭威吾家故舊非死亡切身何以至此但按兵守城飛詔諭之觀其志趣必有辭理則君臣之禮尚全愼勿輕出帝不從時扈從軍甚盛太后遣使戒聶文進曰大須在意對曰有臣在雖郭威百人可擒也至暮兩軍不戰帝還宫慕容彦超大言曰陛下來日宫中無事幸再出觀臣破賊臣不必與之戰但叱散使歸營耳甲申帝欲再出太后力止之不可旣陳郭威戒其衆曰吾來誅羣小非敢敵天子也愼勿先動乆之慕容彦超引輕􅀐直前奮擊郭崇威與前博州刺史李榮帥􅀐兵拒之彦超馬倒幾獲之彦超引兵退麾下死者百餘人於是諸軍奪氣稍稍降於北軍矦益呉虔􅁉張彦超􅀽㠖劉重進皆濳往見郭威威各遣還營又謂宋延渥曰天子方危公近親宜以牙兵往衞乗輿且附奏陛下願乗間早幸臣營延渥未至御營亂兵雲擾不敢進而還比暮南軍多歸於北慕容彦超與麾下十餘􅀐奔還兖州是夕帝獨與三相及從官數十人宿於七里寨餘皆逃潰乙酉旦郭威望見天子旌旗在高阪上下馬免胄往從之至則帝巳去矣帝策馬將還宫至玄化門劉銖在門上問帝左右兵馬何在因射左右帝回轡西北至趙村追兵已至帝下馬入民家爲亂兵所弑蘇逢吉閻晉卿郭允明皆自殺聶文進挺身走軍士追斬之李業奔陜州後匡贊奔兖州郭威聞帝遇弑號慟曰老夫之罪也威至玄化門劉銖雨射城外威自迎春門入歸私第遣前曹州防禦使何福進將兵守明德門諸軍大掠通夕煙火四發軍士入前義成節度使白再榮之第執再榮盡掠其財旣而進曰某等昔甞趨走麾下一旦無禮至此何面目復見公遂刎其首而去吏部侍郎張允家貲以萬計而性吝雖妻亦不之委常自繫衆鑰於衣下行如環珮是夕匿於佛殿藻井之上登者浸多板壊而墜軍士掠其衣遂以凍卒初作坊使賈延徽有寵於帝與魏仁浦爲鄰欲併仁浦所居以自廣屢􅉲仁浦於帝幾至不測至是有擒延徽以授仁浦者仁浦謝曰因亂而報怨吾所不爲也郭威聞之待仁浦益厚右千牛衛大將軍􅀥彊趙鳯曰郭侍中舉兵欲誅君側之惡以安國家耳而䑕輩敢爾乃賊也豈侍中意邪執弓矢踞胡床坐於巷首掠者至輙射殺之里中皆賴以全丙戌獲劉銖李洪建囚之銖謂其妻曰我死汝且爲人婢乎妻曰以公所爲雅當然耳王殷郭崇威言於郭威曰不止剽掠今夕止有空城耳威乃命諸將分部禁止掠者不從則斬之至晡乃定竇貞固蘇禹珪自七里寨逃歸郭威使人訪求得之尋復其位貞固爲相值楊史弄權李業等作亂但以凝重處其間自全而已郭威命有司遷隱帝梓宫於西宫或請如魏髙貴郷公故事葬以公禮威不許曰倉猝之際吾不能保衛乗輿罪已大矣況敢貶君乎太師馮道帥百官謁見郭威威見猶拜之道受拜如平時徐曰侍中此行不易丁亥郭威帥百官詣明德門起居太后且奏稱軍國事殷請早立嗣君太后誥稱郭允明弑逆神器不可無主河東節度使崇忠武節度使信皆髙祖之弟武寧節度使贇開封尹勲髙祖之子其令百官議擇所宜贇崇之子也髙祖愛之養視如子郭威王峻入見太后於萬歳宫請以勲爲嗣太后曰勲乆羸疾不能起威出諭諸將諸將請見之太后令左右以卧榻舉之示諸將諸將乃信之於是郭威與峻議立贇己丑郭威帥百官表請以贇承大統太后誥所司擇日備灋駕迎贇即皇帝位郭威奏遣太師馮道及樞密直學士王度祕書􅁥趙上交詣徐州奉迎郭威之討三叛也每見朝廷詔書處分軍事皆合機宜問使者誰爲此詔使者以翰林學士范質對威曰宰相器也入城訪求得之甚喜時大雪威解所服紫袍衣之令草太后誥令迎新君儀注蒼黄之中討論撰定皆得其宜初隱帝遣供奉官押班陽曲張永德賜昭義節度使常思生辰物永德郭威之壻也㑹楊邠等誅密詔思殺永德思素聞郭威多竒異囚永德以觀變及威克大梁思乃釋永德而謝之庚寅郭威帥羣臣上言比皇帝到闕動渉浹旬請太后臨朝聽政先是馬希萼遣蠻兵圍玉潭朱進忠引兵㑹之崔洪璉兵敗奔還長沙希萼引兵繼進攻岳州刺史王贇拒之五日不克希萼使人謂贇曰公非馬氏之臣乎不事我欲事異國乎爲人臣而懷貳心豈不辱其先人贇曰亡父爲先王將六破淮南兵今大王兄弟不相容贇常恐淮南坐收其弊一旦以遺體臣淮南誠辱先人耳大王茍能釋憾罷兵兄弟雍睦如初贇敢不盡死以事大王兄弟豈有二心乎希萼慙引兵去辛卯至湘隂焚掠而過至長沙軍于湘西歩兵及蠻兵軍于嶽麓朱進忠自玉潭引兵㑹之馬希廣遣劉彦瑫召水軍指揮使許可瓊帥戰艦五百艘屯城北津屬于南津以馬希崇爲􅁥軍又遣馬軍指揮使李彦温將􅀐兵屯駝口扼湘隂路歩軍指揮使韓禮將二千人屯楊栁橋扼柵路可瓊德勲之子也壬辰太后始臨朝以王峻爲樞密使􅀽㠖爲宣徽南院使王殷爲侍衞馬歩軍都指揮使郭崇威爲侍衛馬軍都指揮使曹威爲侍衞步軍都指揮使陳州刺史李穀權判三司劉銖李洪建及其黨皆梟首於市而赦其家郭威謂公卿曰劉銖屠吾家吾復屠其家怨讎反覆庸有極乎由是數家獲免王殷屢爲洪建請免死郭威不許後匡贊至兖州慕容彦超執而獻之李業至陜州其兄保義節度使洪信不敢匿於家業懷金將奔晉陽至絳州盜殺之而取其金蜀施州刺史田行臯奔荆南髙保融曰彼貳於蜀安肯盡忠於我執之歸于蜀伏誅鎭州邢州奏契丹主將數萬􅀐入寇攻內丘五日不克死傷甚衆有戍兵五百叛應契丹引契丹入城屠之又䧟饒陽太后敕郭威將大軍擊之國事權委竇貞固蘇禹珪王峻軍事委王殷十二月甲午朔郭威發大梁丁酉以翰林學士戸部侍郎范質爲樞密副使初蠻酋彭師暠降於楚楚人惡其獷直楚王希廣獨怜之以爲強弩指揮使領辰州刺史師暠常欲爲希廣死及朱進忠與蠻兵合七千餘人至長沙營於江西師暠登城望之言於希廣曰朗人驟勝而驕雜以蠻兵攻之易破也願假臣歩卒三千自巴溪渡江出岳麓之後至水西令許可瓊以戰艦度江腹背合擊必破之前軍敗則其大軍自不敢輕進矣希廣將從之時馬希萼已遣間使以厚利啖許可瓊許分湖南而治可瓊有貳心乃謂希廣曰師暠與梅山諸蠻皆族􅀋安可信也可瓊丗爲楚將必不􅀒大王希萼竟何能爲希廣乃止希萼尋以戰艦四百餘艘泊江西希廣命諸將皆受可瓊節度日賜可瓊銀五百兩希廣屢造其營計事可瓊常閉壘不使士卒知朗軍進退希廣歎曰真將軍也吾何憂哉可瓊或夜乗單舸詐稱廵江與希萼㑹水西約爲內應一旦彭師暠見可瓊瞋目叱之拂衣入見希廣曰可瓊將叛國人皆知之請速除之無貽後患希廣曰可瓊許侍中之子豈有是邪師暠退歎曰王仁而不斷敗亡可翹足俟也潭州大雪平地四尺潭朗兩軍乆不得戰希廣信巫覡及僧語塑鬼於江上舉手以却朗兵又作大像于髙樓手指水西怒目視之命衆僧日夜誦經希廣自衣僧服膜拜求福甲辰朗州歩軍指揮使武陵何敬真等以蠻兵三千陳于楊栁橋敬真望韓禮營旌旗紛錯曰彼衆已懼擊之易破也朗人雷暉衣潭卒之服濳入禮寨手劒擊禮不中軍中驚擾敬真等乗其亂擊之禮軍大潰禮被創走至家而卒於是朗兵水陸急攻長沙歩軍指揮使呉宏小門使楊滌相謂曰以死報國此其時矣各引兵出戰宏出清泰門戰不利滌出長樂戰自辰至午朗兵小却許可瓊劉彦瑫按兵不救滌士卒飢疲退就食彭師暠戰於城東北隅蠻兵自城東縱火城上人招許可瓊軍使救城可瓊舉全軍降希萼長沙遂陷朗兵及蠻兵大掠三日殺吏民焚廬舍自武穆王以來所營宫室皆為灰燼所積寳貨皆入蠻落李彦温望見城中火起自駝口引兵救之朗人已據城拒戰彦温攻清泰門不克與劉彦瑫各將千餘人奉文昭王及希廣諸子趣􅀽州遂奔唐張暉降於希萼左司馬希崇帥將吏詣希萼勸進呉宏戰血滿䄂見希萼曰不幸爲許可瓊所誤今日死不愧先王矣彭師暠投槊於地大呼請死希萼歎曰鐡石人也皆不殺乙巳希崇迎希萼入府視事閉城分捕希廣及掌書記李弘臯弟弘節都軍判官唐昭胤及鄧懿文楊滌等皆獲之希萼謂希廣曰承父兄之業豈無長㓜乎希廣曰將吏見推朝廷見命耳希萼皆囚之丙午希萼命內外廵檢侍衞指揮使劉賔禁止焚掠丁未希萼自稱天策上將軍武安武平靜江寜逺等軍節度使楚王以希崇爲節度副使判軍府事湖南要職悉以朗人爲之臠食李弘臯弘節唐昭胤楊滌斬鄧懿文於市戊申希萼謂將吏曰希廣懦夫為左右所制耳吾欲生之可乎諸將皆不對朱進忠甞爲希廣所笞對曰大王三年血戰始得長沙一國不容二主它日必悔之戊申賜希廣死希廣臨刑猶誦佛書彭師暠葬之於瀏陽門外武寜節度使贇留右都押牙鞏延羙元從教練使楊温守徐州與馮道等西來在道仗衞皆如王者左右呼萬歳郭威至滑州留數日贇遣使慰勞諸將受命之際相顧不拜私相謂曰我輩屠䧟京城其罪大矣若劉氏復立我軰尚有種乎己酉威聞之即引兵行趣澶州辛亥遣蘇禹珪如宋州迎嗣君楚王希萼以子光賛為武平留後以何敬真爲朗州牙內都指揮使將兵戍之希萼召拓跋恒欲用之􅁪稱疾不起壬子郭威度河館于澶州癸丑旦將發將士數千人忽大譟威命閉門將士踰垣登屋而入曰天子須侍中自爲之將士已與劉氏爲仇不可立也或裂黄旗以􅀍威體共扶抱之呼萬歳震地因擁威南行威乃上太后牋請奉漢宗廟事太后爲母丙辰至韋城下書撫諭大梁士民以昨離河上在道秋毫不犯勿有憂疑戊午威至七里店竇貞固帥百官出迎拜謁因勸進威營於臯門村武寜節度使贇已至宋州王峻王殷聞澶州軍變遣侍衞馬軍都指揮使郭崇威將七百􅀐往拒之又遣前申州刺史馬鐸將兵詣許州巡檢崇威忽至宋州陳于府門外贇大驚闔門登樓詰之對曰澶州軍變郭公慮陛下未察故遣崇威來宿衞無它也贇召崇威崇威不敢進馮道出與崇威語崇威乃登樓贇執崇威手而泣崇威以郭威意安諭之少頃崇威出時護聖指揮使張令超帥部兵爲贇􅀫衞徐州判官董裔􅀃贇曰觀崇威視瞻舉措必有異謀道路皆言郭威已爲帝而陛下深入不止禍其至哉請急召張令超諭以禍福使夜以兵劫崇威奪其兵明日掠睢陽金帛募士卒北走晉陽彼新定京邑未暇追我此策之上也贇猶豫未決是夕崇威密誘令超令超帥衆歸之贇大懼郭威遺贇書云爲諸軍所迫召馮道先歸留趙上交王度奉侍道辭行贇曰寡人此來所恃者以公三十年舊相故無疑耳今崇威奪吾衞兵事危矣公何以爲計道黙然客將賈貞數目道欲殺之贇曰汝輩勿草草此無預馮公事崇威遷贇於外館殺其腹心董裔賈貞等數人己未太后誥廢贇爲湘隂公馬鐸引兵入許州劉信惶惑自殺庚申太后誥以侍中􅁥國百官藩鎭相繼上表勸進壬戌夜􅁥國營有歩軍將校醉揚言曏者澶州􅀐兵扶立今歩兵亦欲扶立􅁥國斬之南漢主以宫人盧瓊仙黄瓊芝爲女侍中朝服冠帶參決政事宗室勲舊誅戮殆盡惟宦官林延遇等用事資治通鑑卷第二百八十九
