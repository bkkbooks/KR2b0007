front:
  text: 秦侍中征虜將軍出連輔政侍中右衞將軍乞伏延祚吏部尚書乞伏跋跋踰城奔夏秦王暮末窮蹙輿櫬出降并沮渠興國送於上邽秦太子司直焦楷奔廣寧泣謂其父遺曰大人荷國寵靈居藩鎭重任今本朝顚覆豈得不帥見衆唱大義以殄宼讎遺曰今主上巳陷賊庭吾非愛死而忘義顧以大兵追之是趣絶其命也不如擇王族之賢者奉以爲主而伐之庶有濟也楷乃築壇誓衆二旬之間赴者萬餘人㑹遺病卒楷不能獨舉事亡奔河西二月戊午以尚書右僕射江夷爲湘州刺史檀道濟等進至濟上二十餘日閒前後與魏三十餘戰道濟多捷軍至歷城叔孫建等縱輕􅀐邀其前後焚燒榖草道濟軍乏食不能進由是安頡司馬楚之等得專力攻滑臺魏主復使楚兵將軍王慧龍助之朱脩之堅守數月糧盡與士卒熏䑕食之辛酉魏克滑臺執脩之及東郡太守申謨虜獲萬餘人謨鍾之曾孫也
  hash: sha256:8388fd70a44eca77b091c3e59a608796be8b79f35523340c38e7596d87363528
body:
  text: 癸酉魏主還平城大饗告廟將帥及百官皆受賞戰士賜復十年於是魏南鄙大水民多饑死尚書令劉絜言於魏主曰自湏邊宼内侵戎車屢駕天贊聖明所在克殄方難旣平皆蒙優錫而郡國之民雖不征討服勤農桑以供軍國實經世之大本府庫之所資今自山以東徧遭水害應加哀矜以弘覆育魏主從之復境内一嵗租賦檀道濟等食盡自歷城引還軍士有亡降魏者具告之魏人追之衆忷懼將潰道濟夜唱籌量沙以所餘少米覆其上及旦魏軍見之謂道濟資糧有餘以降者爲妄而斬之時道濟兵少魏兵甚盛􅀐士四合道濟命軍士皆􅀍甲巳白服乗輿引兵徐出魏人以爲有伏兵不敢逼稍稍引退道濟全軍而返青州刺史蕭思話聞道濟南歸欲委鎭保險濟南太守蕭承之固諫不從丁丑思話棄鎭奔平昌參軍劉振之戍下邳聞之亦委城走魏軍竟不至而東陽積聚已爲百姓所焚思話坐徵繋尚方燕王立夫人慕容氏爲王后庚戌魏安頡等還平城魏主嘉朱脩之守節拜侍中妻以宗女初帝之遣到彦之也戒之曰􅀂北國兵動先其未至徑前入河􅀂其不動留彭城勿進及安頡得宋俘魏主始聞其言謂公卿曰卿軰前謂我用崔浩計爲謬驚怖固諌常勝之家始皆自謂踰人至於歸終乃不能及司馬楚之上疏以爲諸方巳平請大舉伐宋魏主以兵乆勞不許徵楚之爲散􅀐常侍以王慧龍爲滎陽太守慧龍在郡十年農戰並脩大著聲績歸附者萬餘家帝縱反間於魏云慧龍自以功髙位下欲引宋人入宼因執司馬楚之以叛魏主聞之賜慧龍璽書曰劉義隆畏將軍如虎欲相中害朕自知之風塵之言想不足介意帝復遣刺客吕玄伯刺之曰得慧龍首封二百戸男賞絹千匹玄伯詐爲降人求屏人有所論慧龍疑之使人探其懐得尺刀玄伯叩頭請死慧龍曰各爲其主耳釋之左右諫曰宋人爲謀未巳不殺玄伯無以制將來慧龍曰死生有命彼亦安能害我我以仁義爲扞蔽又何憂乎遂捨之夏五月庚寅魏主如雲中六月乙丑大赦夏主殺乞伏暮末及其宗族五百人夏主畏魏人之逼擁秦民十餘萬口自冶城濟河欲擊河西王蒙遜而奪其地吐谷渾王慕璝遣益州刺史慕利延寧州刺史拾虔帥􅀐三萬乗其半濟邀擊之執夏主定以歸沮渠興國􅀍創而死拾虔樹洛干之子也魏之邊吏獲柔然邏者二十餘人魏主賜衣服而遣之柔然感恱閏月乙未柔然敕連可汙遣使詣魏魏主厚禮之魏主遣散􅀐侍郎周紹來聘且求昏帝依違荅之荆州刺史江夏王義恭年寖長欲專政事長史劉湛毎裁抑之遂與湛有隙帝心重湛使人詰讓義恭且和解之是時王華王曇首皆卒領軍將軍殷景仁素與湛善白帝以時賢零落徵湛爲太子詹事加給事中共參政事以雍州刺史張邵代湛爲撫軍長史南蠻校尉頃之邵坐在雍州營私畜聚贓滿二百四十五萬下廷尉當死左衞將軍謝述上表陳邵先朝舊勲宜蒙優貸帝手詔酬納免邵官削爵土述謂其子綜曰主上矜邵夙誠特加曲恕吾所言謬㑹故特見酬納耳􅀂此迹宣布則爲侵奪主恩不可之大者也使綜對前焚之帝後謂邵曰卿之獲免謝述有力焉秋七月己酉魏主如河西八月乙酉河西王蒙遜遣子安周入侍于魏吐谷渾王慕璝遣侍郎謝太寧奉表于魏請送赫連定己丑魏以慕璝爲大將軍封西秦王左僕射臨川王義慶固求解職甲辰以義慶爲中書令丹楊尹如故九月癸丑魏主還宫庚申加太尉長孫嵩柱國大將軍以左光禄大夫崔浩爲司徒征西大將軍長孫道生爲司空道生性清儉一熊皮鄣􅅺數十年不易魏主使歌工歷頌群臣曰智如崔浩㢘􅀂道生魏主欲選使者詣河西崔浩薦尚書李順乃以順爲太常拜河西王蒙遜爲侍中都督涼州西域羗戎諸軍事太傅行征西大將軍涼州牧涼王王武威張掖敦煌酒泉西海金城西平七郡冊曰盛衰存亡與魏升降北盡窮髮南極庸㟭西􅀍崐嶺東至河曲王實征之以夾輔皇室置將相羣卿百官承制假授建天子旌旗出入警蹕如漢􅀄諸矦王故事壬申魏主詔曰今二宼摧殄將偃武修文理廢職舉逸民范陽盧玄博陵崔綽趙郡李靈河閒邢潁勃海髙允廣平游雅太原張偉等皆賢擕之胄冠冕州􅀖易曰我有好爵吾與爾縻之如玄之比者盡敇州郡以禮􅀤遣遂徵玄等及州郡所遣至者數百人差次叙用崔綽以母老固辭玄等皆拜中書博士玄諶之曾孫靈順之從父兄也玄舅崔浩毎與玄言輒歎曰對子眞使我懐古之情更深浩欲大整流品明辨姓族玄止之曰夫創制立事各有其時樂爲此者詎有幾人宜加三思浩不從由是得罪於衆初魏昭成帝始制灋令反逆者族其餘當死者聽入金馬贖罪殺人者聽與死家馬牛葬具以平之盜官物一備五私物一備十四部大人共坐王庭決辭訟無繫訊連逮之苦境内安之太祖入中原患前代律令峻密命三公郎王德刪定務崇􅂤易季年􅀍疾刑罰濫酷太宗承之吏文亦􅀷冬十月戊寅世祖命崔浩更定律令除五歳四歳刑增一年刑巫蠱者負羖羊抱犬沈諸淵􅀄令官階九品者得以官爵除刑婦人當刑而孕産後百日乃決闕左懸登聞鼔以逹寃人魏主如漠南十一月丙辰北部敇勒莫弗庫􅀂干帥所部數萬􅀐驅鹿數百萬頭詣魏主行在魏主大獵以賜從官十二月丁丑還宫是歳涼王改元義和林邑王范陽邁宼九德交州兵擊却之九年春正月丙午魏主尊保太后竇氏爲皇太后立貴人赫連氏爲皇后子晃爲皇太子大赦改元延和燕王立慕容后之子王仁爲太子三月庚戌衞將軍王弘進位太保加中書監丁巳征南大將軍檀道濟進位司空還鎭尋陽壬申吐谷渾王慕璝送赫連定于魏魏人殺之慕璝上表曰臣俘擒僣逆獻捷王府爵秩雖崇而土不增廓車旗旣飾而財不周賞願垂鑒察魏主下其議公卿以爲慕璝所致唯定而巳塞外之民皆爲已有而貪求無厭不可許也魏主乃詔曰西秦王所得金城枹罕隴西之地朕即與之乃是裂土何須復廓西秦款至綿絹隨使䟽數臨時增益非一賜而止也自是慕璝貢使至魏者稍簡魏方士祁纎奏改代爲萬年以代尹爲萬年尹代令爲萬年令崔浩曰昔太祖應天受命兼稱代魏以灋殷商國家積德當享年萬億不待假名以爲益也纎之所聞皆非正義宜復舊號魏主從之夏五月壬申華容文昭公王弘卒弘明敏有思致而輕率少威儀性􅄶隘好折辱人人以此少之雖貴顯不營財利及卒家無餘業帝聞之特賜錢百萬米千斛魏主治兵於南郊謀伐燕帝遣使者趙道生聘于魏六月戊寅司徒南徐州刺史彭城王義康改領楊州刺史詔分青州置冀州治歷城吐谷渾王慕璝遣其司馬趙叔入貢且來告捷庚寅魏王伐燕命太子晃録尚書事時晃纔五歳又遣左僕射安原建寧王崇等屯漠南以備柔然辛卯魏主遣散􅀐常侍鄧頴來聘乙未以吐谷渾王慕璝爲都督西秦河沙三州諸軍事征西大將軍西秦河二州刺史進爵隴西王且命慕璝悉歸南方將士先没於夏者得百五十餘人又加北秦州刺史楊難當征西將軍難當以兄子保宗爲鎭南將軍鎭宕昌以其子順爲秦州刺史守上邽保宗謀襲難當事泄難當囚之壬寅以江夏王義恭爲都督南兖等六州諸軍事開府儀同三司南兖州刺史臨川王義慶爲都督荆雍等七州諸軍事荆州刺史竟陵王義宣爲中書監衡陽王義季爲南徐州刺史􅀄髙祖以荆州居上流之重土地廣逺資實兵甲居朝廷之半故遺詔令諸子居之上以義慶宗室令美且烈武王有大功於社稷故特用之秋七月巳未魏主至濡水庚申遣安東將軍奚斤􅀤幽州民及密雲丁零萬餘人運攻具出南道㑹和龍魏主至遼西燕王遣其侍御史崔聘奉牛酒犒師巳巳魏主至和龍庚午以領軍將軍殷景仁爲尚書僕射太子詹事劉湛爲領軍將軍益州刺史劉道濟粹之弟也信任長史費謙别駕張熈等聚歛興利傷政害民立官冶禁民鼓鑄而貴賣鐵器商賈失業吁嗟滿路流民許穆之變姓名稱司馬飛龍自云晉室近親往依氐王楊難當難當因民之怨資飛龍以兵使侵擾益州飛龍招合蜀人得千餘人攻殺巴興令逐隂平太守道濟遣軍擊斬之道濟欲以五城人帛氐奴梁顯爲參軍督護費謙固執不與氐奴等與郷人趙廣􅌟扇縣人詐言司馬殿下猶在陽泉山中聚衆得數千人引向廣漢道濟參軍程展㑹治中李抗之將五百人擊之皆敗死巴西人唐頻聚衆應之趙廣等進攻涪城陷之於是涪陵江陽遂寧諸郡守皆棄城走蜀土僑舊俱反燕石城太守李崇等十郡降于魏魏主發其民三萬穿圍塹以守和龍崇績之子也八月燕王使數萬人出戰魏昌􅀺公丘等擊破之死者萬餘人燕尚書髙紹帥萬餘家保羌胡固辛巳魏主攻紹斬之平東將軍賀多羅攻帶方撫軍大將軍永昌王健攻建德驃􅀐大將軍樂平王丕攻冀陽皆拔之九月乙卯魏主引兵西還徙營丘成周遼東樂浪帶方玄菟六郡民三萬家於幽州燕尚書郭淵勸燕王送􅅃獻女於魏乞爲附庸燕王曰負舋在前結忿巳深降附取死不如守志更圖也魏主之圍和龍也宿衞之士多在戰陳行宫人少雲中鎭將朱脩之謀與南人襲殺魏主因入和龍浮海南歸以告冠軍將軍毛脩之毛脩之不從乃止旣而事泄朱脩之逃奔燕魏人數伐燕燕王遣脩之南歸求救脩之汎海至東萊遂還建康拜黄門侍郎趙廣等進攻成都劉道濟嬰城自守賊衆屯聚日乆不見司馬飛龍欲散去廣懼將三千人及羽儀詣陽泉寺詐云迎飛龍至則謂道人枹罕程道養曰汝但自言是飛龍則坐享富貴不則斷頭道養惶怖許諾廣乃推道養爲蜀王車􅀐大將軍益梁二州牧改元㤗始僃置百官以道養弟道助爲驃􅀐將軍長沙王鎭涪城趙廣帛氐奴梁顯及其黨張尋嚴遐皆爲將軍奉道養還成都衆至十餘萬四面圍城使人謂道濟曰但送費謙張熈來我軰自解去道濟遣中兵參軍裴方明任浪之各將千餘人出戰皆敗還冬十一月乙巳魏主還平城壬子以少府中山甄灋崇爲益州刺史􅀄燕王嫡妃王氏生長樂公崇崇於兄弟爲最長及即位立慕容氏爲王后王氏不得立又黜崇使鎭肥如崇母弟廣平公朗樂陵公邈相謂曰今國家將亡人無愚智皆知之王復受慕容后之譛吾兄弟死無日矣乃相與亡奔遼西説崇使降魏崇從之㑹魏主使給事郎王德招崇十二月己丑崇使邈如魏請舉郡降燕王聞之使其將封羽圍崇於遼西魏主徴諸名士之未仕者州郡多逼遣之魏主聞之下詔令守宰以禮申諭任其進退毋得逼遣􅀄帝以少子紹爲廬陵孝獻王嗣以江夏王義恭子朗爲營陽王嗣庚寅封紹爲廬陵王朗爲南豐縣王裴方明等復出擊程道養營破之焚其積聚賊黨江陽楊孟子將千餘人屯城南參軍梁儁之統南樓投書説諭孟子邀使入城見劉道濟道濟板爲主簿克期討賊趙廣知其謀孟子懼將所領奔晉原晉原太守文仲與與之同拒守趙廣遣帛氐奴攻晉原破之仲興孟子皆死裴方明復出擊賊屢戰破之賊遂大潰程道養收衆得七千人還廣漢趙廣别將五千餘人還涪城先是張熈說道濟糶倉榖故自九月末圍城至十二月糧儲俱盡方明將二千人出城求食爲賊所敗單馬獨還賊衆復大集方明夜縋而上道濟爲設食涕泣不能食道濟曰卿非大丈夫小敗何苦賊勢旣衰臺兵垂至但令卿還何憂於賊即減左右以配之賊於城外揚言云方明已死城中大恐道濟夜列炬火出方明以示衆衆乃安道濟悉出財物於北射堂令方明募人時城中或傳道濟巳死莫有應者梁儁之説道濟遣左右給使三十餘人出外且告之曰吾病小􅂢各聽歸家休息給使旣岀城中乃宴應募者日有千餘人初晉謝混尚晉陵公主混死詔公主與謝氏絶婚公主悉以混家事委混從子弘微混仍世宰輔僮僕千人唯有二女年數歳弘微爲之紀理生業一錢尺帛有文簿九年而髙祖即位公主降號東郷君聽還謝氏入門室宇倉廩不異平日田疇墾闢有加於舊東鄕君歎曰僕射平生重此子可謂知人僕射爲不亡矣親舊見者爲之流涕是歳東鄕君卒公私咸謂貲財宜歸二女田宅僮役應屬弘微弘微一無所取自以私禄葬東鄕君混女夫殷叡好摴蒲聞弘微不取財物乃奪其妻妹及伯母兩姑之分以還戲責内人皆化弘微之讓一無所爭或譏之曰謝氏累世財産充殷君一朝戲責理之不允莫此爲大卿視而不言譬棄物江海以爲廉耳設使立清名而令家内不足亦吾所不取也弘微曰親戚爭財爲鄙之甚今内人尚能無言豈可導之使爭乎分多共少不至有乏身死之後豈復見􅀜也秃髮保周自涼奔魏魏封保周爲張掖公魏李順復奉使至涼涼王蒙遜遣中兵校郎楊定歸謂順曰年衰多疾腰髀不隨不堪拜伏比三五日消息小差當相見順曰王之老疾朝廷所知豈得自安不見詔使明日蒙遜延順入至庭中蒙遜箕坐隱几無動起之狀順正色大言曰不謂此叟無禮乃至於此今不憂覆亡而敢陵侮天地魂魄逝矣何用見之握節將出涼王使定歸追止之曰太常旣雅恕衰疾傳聞朝廷有不拜之詔是以敢自安耳順曰齊桓公九合諸矦一匡天下周天子賜胙命無下拜桓公猶不敢失臣禮下拜登受今王雖功高未如齊桓朝廷雖相崇重未有不拜之詔而遽自偃蹇此豈社稷之福邪蒙遜乃起拜受詔使還魏主問以涼事順曰蒙遜控制河右踰三十年經涉艱難粗識機變綏集荒裔羣下畏服雖不能貽厥孫謀猶足以終其一世然禮者德之輿敬者身之基也蒙遜無禮不敬以臣􅀚之不復年矣魏主曰易世之後何時當滅順曰蒙遜諸子臣略見之皆庸才也如聞敦煌太守牧犍器性粗立繼蒙遜者必此人也然比之於父皆云不及此殆天之所以資聖明也魏主曰朕方有事東方未暇西略如卿所言不過數年之外不爲晩也􅀄􅄢賔沙門曇無䜟自云能使鬼治病且有祕術涼王蒙遜甚重之謂之聖人諸女及子婦皆往受術魏主聞之使李順往徴之蒙遜留不遣仍殺之魏主由是怒涼蒙遜荒淫猜虐羣下苦之十年春正月乙卯魏主遣永昌王健督諸軍救遼西巳未大赦丙寅魏以樂安王範爲都督秦雍等五州諸軍事衞大將軍開府儀同三司長安鎭都大將魏主以範年少更選舊德平西將軍崔徽征北大將軍鴈門張􅀺爲之副共鎭長安徽宏之弟也範謙恭寛惠徽務敦大體􅀺清約公平政刑簡易輕傜薄賦􅀜中遂安二月庚午魏主以馮崇爲都督幽平東夷諸軍事車􅀐大將軍幽平二州牧封遼西王録其國尚書事食遼西十郡承制假授尚書刺史征虜巳下官魏平涼休屠征西將軍金崖羌涇州刺史狄子玉與安定鎭將延普爭權崖子玉舉兵攻普不克退保胡空谷魏主以虎牢鎮大將陸俟爲安定鎭大將擊崖等皆擒之魏主徴陸俟爲散􅀐常侍出爲懐荒鎭大將未朞歳髙車諸莫弗訟俟嚴急無恩復請前鎭將郎孤魏主徴俟還以孤代之俟旣至言於帝曰不過期年郎孤必敗髙車必叛帝怒切責之使以建業公歸第明年諸莫弗果殺郎孤而叛帝大驚立召俟問之曰卿何以知其然也俟曰髙車不知上下之禮故臣臨之以威制之以灋欲以漸訓導使知分限而諸莫弗惡臣所爲訟臣無恩稱孤之美臣以罪去孤獲還鎭恱其稱譽益收名聲專用寛恕待之無禮之人易生驕慢不過朞年無復上下孤所不堪必將復以灋裁之如此則衆心怨懟必生禍亂矣帝笑曰卿身雖短思慮何長也即日復以爲散􅀐常侍壬午魏主如河西遣兼散􅀐常侍宋宣來聘且爲太子晃求婚帝依違荅之劉道濟卒梁儁之裴方明等密埋其尸於齋後詐爲道濟教命以荅籖䟽雖其母妻亦不知也程道養於毁金橋登壇郊天方明將三千人出擊之道養等大敗退保廣漢荆州刺史臨川王義慶以巴東太守周籍之督巴西等五郡諸軍事將二千人救成都三月亡人司馬天助降於魏自稱晉㑹稽世子元顯之子魏人以爲青徐二州刺史東海公壬子魏主還宫趙廣等自廣漢至郫連營百數周籍之與裴方明等合兵攻郫克之進擊廣等於廣漢廣等走還涪及五城夏四月戊寅始發劉道濟喪帝聞梁南秦二州刺史甄灋護刑政不治失氐羌之和乃自徒中起蕭思話爲梁南秦二州刺史灋護灋崇之兄也涼王蒙遜病甚國人共議以世子菩提㓜弱立菩提之兄敦煌太守牧犍爲世子加中外都督大將軍録尚書事蒙遜卒諡曰武宣王廟號太祖牧犍即河西王位大赦改元永和立子封壇爲世子加撫軍大將軍録尚書事遣使請命于魏牧犍聦頴好學和雅有度量故國人立之先是魏主遣李順迎武宣王女爲夫人㑹卒牧犍稱先王遺意遣左丞宋繇送其妹興平公主于魏拜右昭儀魏主謂李順曰卿言蒙遜死今則驗矣又言牧犍立何其妙哉朕克涼州亦當不逺於是賜絹千匹廏馬一乗進號安西將軍寵待彌厚政事無巨細皆與之參議遣順拜牧犍都督涼沙河三州西域羌戎諸軍事車􅀐將軍開府儀同三司涼州刺史河西王以宋繇爲河西王右相牧犍以無功受賞留順上表乞安平一號優詔不許牧犍尊敦煌劉昞爲國師親拜之命官屬以下皆北面受業五月巳亥魏主如山北林邑王范陽邁遣使入貢求領交州詔荅以道逺不許裴方明進軍向涪城破張尋唐頻擒程道助斬嚴遐於是趙廣等皆奔散六月魏永昌王健左僕射安原督諸軍擊和龍將軍樓㪍别將五千􅀐圍凡城燕守將封羽以凡城降收其三千餘家而還辛巳魏人􅀤秦雍兵一萬築小城於長安城内秋八月馮崇上表請説降其父魏主不聽九月益州刺史甄灋崇至成都收費謙誅之程道養張尋將二千餘家逃入郪山餘黨各擁衆藏竄山谷時出爲㓂不絶戊午魏主遣兼大鴻臚崔􅄨持節拜氐王楊難當爲征南大將軍開府儀同三司秦梁二州牧南秦王􅄨逞之子也楊難當因蕭思話未至甄灋護將下舉兵襲梁州破白馬獲晉昌太守張範敗灋護參軍魯安期等又攻葭萌獲晉夀太守范延㓪冬十一月丁未灋護棄城奔洋川之西城難當遂有漢中之地以其司馬趙温爲梁秦二州刺史􅊨甲寅魏主還宫􅊨十二月己巳魏大赦辛未魏主如隂山之北魏寧朔將軍盧玄來聘􅊨前祕書監謝靈運好爲山澤之遊窮幽極險從者數百人伐木開徑百姓驚擾以爲山賊㑹稽太守孟顗與靈運有隙表其有異志􅀤兵自防靈運詣闕自陳上以爲臨川内史靈運遊放自􅀂廢棄郡事爲有司所紏是歳司徒遣使隨州從事鄭望生收靈運靈運執望生興兵逃逸作詩曰韓亡子房奮秦帝魯連恥追討擒之廷尉奏靈運帥衆反叛論正斬刑上愛其才欲免官而巳彭城王義康堅執謂不宜恕乃降死一等徙廣州乆之或告靈運令人買兵器結健兒欲於三江口簒取之不果詔於廣州棄市靈運恃才放逸多所陵忽故及於禍魏立徐州於外黄以刁雍爲刺史十一年春正月戊戌燕王遣使請和於魏魏主不許楊難當以克漢中告捷於魏送雍州流民七千家於長安蕭思話至襄陽遣横野司馬蕭承之爲前驅承之縁道收兵得千人進據磝頭楊難當焚掠漢中引衆西還留趙温守梁州又遣其魏興太守薛健據黄金山思話遣隂平太守蕭坦攻鐵城戍拔之二月趙温薛健與其馮翊太守蒲甲子合攻坦營坦擊破之温等退保西水臨川王義慶遣龍驤將軍裴方明將三千人助承之拔黄金戍而據之温棄州城退據小城健甲子退保下桃城思話繼至與承之共擊趙温等屢破之行參軍王靈濟别將出洋川攻南城拔之擒其守將趙英南城空無所資靈濟引兵還與承之合魏主以西海公主妻柔然敕連可汗又納其妹爲夫人遣潁川王提往逆之丁卯敕連遣其異母兄秃鹿傀送妹并獻馬二千匹魏主以其妹爲左昭儀提曜之子也辛卯魏主還宫三月甲寅復如河西楊難當遣其子和將兵與蒲甲子等共擊蕭承之相拒四十餘日圍承之數十重短兵接弓矢無所復施氐悉衣犀甲戈矛所不能入承之斷矟長數尺以大斧椎之一矟輒貫數人氐不能當燒營走據大桃閏月承之等追擊之至南城氐敗走斬獲甚衆悉收漢中故地置戍於葭萌水􅀄􅁊希旣敗氐王楊盛據漢中梁州刺史范元之傅歆皆治魏興唯得魏興上庸新城三郡及索邈爲刺史乃治南城至是南城爲氐所焚不可復固蕭思話徙鎭南鄭甲戌赫連昌叛魏西走丙子河西􅀱將格殺之魏人并其羣弟誅之己卯魏主還宫辛巳燕王遣尚書髙顒上表稱藩請罪于魏乞以季女充掖庭魏主乃許之徵其太子王仁入朝燕王送魏使者于什門還平城什門在燕二十一年不屈節魏主下詔襃稱以比蘇武拜治書御史賜羊千口帛千匹䇿告宗廟頒示天下戊子休屠金當川圍魏隂密夏四月乙未魏征西大將軍常山王素擊之丁未魏主行如河西壬戍獲當川斬之甄灋護坐委鎭賜死於獄楊難當遣使奉表謝罪帝下詔赦之河西王牧犍遣使上表告嗣位戊寅詔以牧犍爲都督涼秦等四州諸軍事征西大將軍涼州刺史河西王六月甲辰魏主還宫燕王不遣太子質魏散􅀐常侍劉滋諫曰昔劉禪有重山之險孫皓有長江之阻皆爲晉擒何則彊弱之勢異也今吾弱於吴蜀而魏彊於晉不從其欲將有危亡之禍願亟遣太子而修政事撫百姓收離散賑飢窮勸農桑省賦役社稷猶庶幾可保燕王怒殺之辛亥魏主遣撫軍大將軍永昌王健等伐燕收其禾稼徙民而還秋七月壬午魏主如美稷遂至隰城命陽平王它督諸軍擊山胡白龍於西河它熈之子也魏主輕山胡日引數十􅀐登山臨視之白龍伏壯士十餘處掩擊之魏主墜馬幾爲所擒内入行長代人陳建以身扞之大呼奮擊殺胡數人身􅀍十餘瘡魏主乃免九月戊子大破胡衆斬白龍屠其城冬十月甲午魏人破白龍餘黨於五原誅數千人以其妻子賜將士十一月魏主還宫十二月甲辰復如雲中十二年春正月已未朔日有食之辛酉大赦辛未上祀南郊燕王數爲魏所攻遣使詣建康稱藩奉貢癸酉詔封為燕王江南謂之黄龍國甲申魏大赦改元太延有老父投書於敦煌東門求之不獲書曰涼王三十年􅀂七年河西王牧犍以問奉常張慎對曰昔虢之將亡神降于莘願殿下崇德脩政以享三十年之祚􅀂盤于遊田荒于酒色臣恐七年將有大變牧犍不恱二月丁未魏主還宫三月癸亥燕王遣大將湯燭入貢於魏辭以太子王仁有疾故未之遣領軍將軍劉湛與僕射殷景仁素善湛之入也景仁實引之湛旣至以景仁位遇本不踰己而一旦居前意甚憤憤俱被時遇以景仁專管内任謂爲間己猜隙漸生知帝信仗景仁不可移奪時司徒義康專秉朝權湛嘗爲義康上佐遂委心自結欲因宰相之力以回上意傾黜景仁獨當時務夏四月己巳帝加景仁中書令中護軍即家爲府湛加太子詹事湛愈憤怒使義康毀景仁於帝帝遇之益隆景仁對親舊歎曰引之令入入便噬人乃􅁛疾解職表䟽累上帝不許使停家養病湛議遣人􅀂劫盗者於外殺之以爲帝雖知當有以解之不能傷義康至親之愛帝微聞之遷護軍府於西掖門外使近宫禁故湛謀不行義康僚屬及諸附麗湛者潛相約勒無敢歷殷氏之門彭城王主簿沛郡劉敬文父成未悟其機詣景仁求郡敬文遽往謝湛曰老父悖耄遂就殷鐵干禄由敬文闇淺上􅀒生成闔門慙懼無地自處唯後將軍司馬􅁃炳之遊二人之間皆得其歡心而密輸忠於朝廷景仁卧家不朝謁帝常使炳之衘命往來湛不疑也炳之登之之弟也燕王遣右衞將軍孫德來乞師五月庚申魏主進宜都公穆夀爵爲王汝隂公長孫道生爲上黨王宜城公奚斤爲􅁪農王廣陵公樓伏連爲廣陵王加夀征東大將軍夀辭曰臣祖父崇所以得効功前朝流福於後者由梁眷之忠也今眷元勲未録而臣獨弈世受賞心實愧之魏主恱求眷後得其孫賜爵郡公夀觀之子也􅀛兹䟽勒烏孫恱般渇槃陁鄯善焉􅂄車師粟持九國入貢于魏魏主以漢世雖通西域有求則卑辭而來無求則驕慢不服蓋自知去中國絶逺大兵不能至故也今報使往來徒爲勞費終無所益欲不遣使有司固請以爲九國不憚險逺慕義入貢不宜拒絶以抑將來乃遣使者王恩生等二十軰使西域恩生等始度流沙爲柔然所執恩生見敇連可汗持魏節不屈魏主聞之切責敇連敇連乃遣恩生等還竟不能逹西域甲戍魏主如雲中六月甲午魏主以時和年豐嘉瑞沓臻詔大酺五日徧祭百神用荅天貺丙午髙麗王璉遣使入貢于魏且請國諱魏主使録帝系及諱以與之拜璉都督遼海諸軍事征東將軍遼東郡公髙句麗王璉釗之曾孫也戊申魏主命驃􅀐大將軍樂平王丕鎭東大將軍徒河屈垣等帥􅀐四萬伐燕楊州諸郡大水己酉運徐豫南兖榖以賑之楊州西曹主簿沈亮建議以爲酒糜榖而不足療飢請􅁠禁止詔從之亮林子之子也秋七月魏主畋於棝陽己卯魏樂平王丕等至和龍燕王以牛酒犒軍獻甲三千屈垣責其不送侍子掠男女六千口而還八月丙戍魏主如河西九月甲戍還宫魏左僕射河間公安原恃寵驕恣或告原謀爲逆冬十月癸卯原坐族誅甲辰魏主如定州十一月乙丑如冀州己巳畋于廣川丙子如鄴魏人數伐燕燕日危蹙上下憂懼太常楊㟭復􅂆燕王速遣太子入侍燕王曰吾未忍爲此􅀂事急且東依髙麗以圖後舉㟭曰魏舉天下以擊一隅理無不克髙麗無信始雖相親終恐爲變燕王不聽密遣尚書陽伊請迎於髙麗丹楊尹蕭摹之上言佛化􅀍于中國已歷四代形像塔寺所在千數自頃以來情敬浮末不以精誠爲至更以奢競爲重材竹銅綵糜􅂢無極無􅀜神祗有累人事不爲之防流遁未息請自今欲鑄銅像及造塔寺者皆當列言須報乃得爲之詔從之摹之思話從叔也魏秦州刺史薛謹擊吐没骨滅之楊難當釋楊保宗之囚使鎭童亭資治通鑑卷第一百二十二宋太祖
