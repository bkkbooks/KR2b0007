front:
  text: 太尉劉寛免衛尉許􅖢為太尉
  hash: sha256:416e330efb5f8a8ea513910d83e72a25060c79623cfe2c275d868c2baac897df
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0007_SBCK_058-1a}
body:
  text: 閏月辛酉北宫東掖庭永巷署災司徒楊賜罷冬十月太常陳耽為司徒鮮卑冦幽并二州檀石槐死子和連代立和連才力不及父而貪淫後出攻北地北地人射殺之其子騫曼尚幼兄子魁頭立後騫曼長大與魁頭爭國衆遂離散魁頭死弟歩度根立是歳帝作列肆於後宫使諸采女販賣更相盜竊爭鬬帝著商賈服從之飲宴為樂又於西園弄狗著進賢冠帶綬又駕四驢帝躬自操轡驅馳周旋京師轉相倣傚驢價遂與馬齊帝好爲私稸收天下之珍貨每郡國貢獻先輸中署名為導行費中常侍吕强上䟽諫曰天下之財莫不生之陰陽歸之陛下豈有公私而今中尚方斂諸郡之寶中御府積天下之繒西園引司農之藏中廐聚太僕之馬而所輸之府輒有導行之財調廣民困費多獻少姦吏因其利百姓受其敝又阿媚之臣好獻其私容謟姑息自此而進舊典選舉委任三府尚書受奏御而已受試任用責以成功功無可察然後付之尚書舉劾請下廷尉覆案虛實行其罪罰於是三公毎有所選參議掾屬咨其行狀度其器能然猶有曠職廢官荒穢不治今但任尚書或有詔用如是三公得免選舉之負尚書亦復不坐責賞無歸豈肯空自勞苦乎書奏不省何皇后性彊忌後宫王美人生皇子協后酖殺美人帝大怒欲廢后諸中官固請得止大長秋華容矦曹節卒中常侍趙忠代領大長秋五年春正月辛未赦天下詔公卿以謡言舉刺史二千石為民蠧害者太尉許􅖢司空張濟承望内官受取貨賂其宦者子弟賓客雖貪汗穢濁皆不敢問而虛紏邊遠小郡清脩有惠化者二十六人吏民詣闕陳訴司徒陳耽上言公卿所舉率黨其私所謂放鴟梟而囚鸞鳯帝以讓􅖢濟由是諸坐謠言徴者悉拜議郎二月大疫三月司徒陳耽免夏四月旱以太常袁隗為司徒五月庚申永樂宫署災秋七月有星孛于太幑板楯蠻冦亂巴郡連年討之不能剋帝欲大發兵以問益州計吏漢中程包對曰板楯七姓自秦世立功復其租賦其人勇猛善戰昔永初中羌入漢川郡縣破壊得板楯救之羌死敗殆盡羌人號為神兵傳語種輩勿復南行至建和二年羌復大入實頼板楯連摧破之前車騎将軍馮緄南征武陵亦倚板楯以成其功近益州郡亂太守李顒亦以板楯討而平之忠功如此本無惡心長吏鄉亭更賦至重僕役箠楚過於奴虜亦有嫁妻賣子或乃至自剄割雖陳寃州郡而牧守不為通理闕庭悠遠不能自聞含怨呼天無所叩愬故邑落相聚以致叛戾非有謀主􅆫號以圖不軌今但選明能牧守自然安集不煩征伐也帝從其言選用太守曹謙遣宣詔赦之即時皆降八月起四百尺觀於阿亭道冬十月太尉許􅖢罷以太常楊賜為太尉帝校獵上林苑歴函谷闗遂狩于廣成苑十二月還幸太學桓典為侍御史宦官畏之典常乘驄馬京師為之語曰行行且止避驄馬御史典焉之孫也六年春三月辛未赦天下夏大旱爵號皇后母為舞陽君秋金城河水溢出二十餘里五原山岸崩初鉅鹿張角奉事黄老以妖術敎授號太平道呪符水以療病令病者跪拜首過或時病愈衆共神而信之角分遣弟子周行四方轉相誑誘十餘年間徒衆數十萬自青徐幽冀荆揚兖豫八州之人莫不畢應或弃賣財産流移犇赴塡塞道路未至病死者亦以萬數郡縣不解其意反言角以善道教化為民所歸太尉楊賜時為司徒上書言角誑燿百姓遭赦不悔稍益滋蔓今若下州郡捕討恐更騷擾速成其患宜切敕刺史二千石簡别流民各䕶歸本郡以孤弱其黨然後誅其渠帥可不勞而定㑹賜去位事遂留中司徒掾劉陶復上疏申賜前議言角等陰謀益甚四方私言云角等竊入京師覘視朝政鳥聲獸心私共鳴呼州郡忌諱不欲聞之但更相告語莫肯公文宜下明詔重募角等賞以國土有敢回避與之同罪帝殊不為意方詔陶次第春秋條例角遂置三十六方方猶將軍也大方萬餘人小方六七千各立渠帥訛言蒼天已死黄天當立歳在甲子天下大吉以白土書京城寺門及州郡官府皆作甲子字大方馬元義等先收荆揚數萬人期㑹發於鄴元義數往來京師以中常侍封諝徐奉等為内應約以三月五日内外俱起中平元年春角弟子濟南唐周上書告之於是收馬元義車裂於雒陽詔三公司􅀠案驗宫省直衞及百姓有事角道者誅殺千餘人下冀州逐捕角等角等知事已露晨夜馳敕諸方一時俱起皆著黄巾以為標幟故時人謂之黄巾賊二月角自稱天公将軍角弟寳稱地公将軍寶弟梁稱人公將軍所在燔焼官府劫略聚邑州郡失據長吏多逃亡旬月之閒天下響應京師震動安平甘陵人各執其王應賊三月戊申以河南尹何進為大將軍封慎矦率左右羽林五營營士屯都亭修理器械以鎭京師置函谷大谷廣成伊闕轘轅旋門孟津小平津八關都尉帝召群臣㑹議北地太守皇甫嵩以為宜解黨禁益出中藏錢西園廐馬以班軍士嵩規之兄子也上問計於中常侍吕強對曰黨錮久積人情怨憤若不赦宥輕與張角合謀爲變滋大悔之無救今請先誅左右貪濁者大赦黨人料簡刺史二千石能否則盜無不平矣帝懼而從之壬子赦天下黨人還諸徙者唯張角不赦發天下精兵遣北中郎將盧植討張角左中郎將皇甫嵩右中郎將朱儁討潁川黄巾是時中常侍趙忠張讓夏惲郭勝叚珪宋典等皆封矦貴寵上常言張常侍是我公趙常侍是我母由是宦官無所憚畏竝起第宅擬則宫室上嘗欲登永安􅇋臺宦官恐望見其居處乃使中大人尚但諌曰天子不當登高登高則百姓虛散上自是不敢復升臺榭及封諝徐奉事發上詰責諸常侍曰汝曹常言黨人欲為不軌皆令禁錮或有伏誅者今黨人更為國用汝曹反與張角通為可斬未皆叩頭曰此王甫矦覽所為也於是諸常侍人人求退各自徴還宗親子弟在州郡者趙忠夏惲等遂共譖吕強云與黨人共議朝廷數讀霍光傳强兄弟所在竝皆貪穢帝使中黄門持兵召強強聞帝召怒曰吾死亂起矣丈夫欲盡忠國家豈能對獄吏乎遂自殺忠惲復譖曰強見召未知所問而就外自屏有姦明審遂收捕其宗親沒入財産侍中河内向栩上便宜譏刺左右張讓誣栩與張角同心欲為内應收送黄門北寺獄殺之郎中中山張鈞上書曰竊惟張角所以能興兵作亂萬民所以樂附之者其源皆由十常侍多放父兄子弟㛰親賓客典據州郡辜􅅦財利侵掠百姓百姓之寃無所告訴故謀議不軌聚為盗賊宜斬十常侍縣頭南郊以謝百姓遣使者布告天下可不須師旅而大冦自消帝以鈞章示諸常侍皆免冠徒跣頓首乞自致雒陽詔獄竝出家財以助軍費有詔皆冠履視事如故帝怒鈞曰此眞狂子也十常侍固常有一人善者不御史承㫖遂誣奏鈞學黄巾道收掠死獄中庚子南陽黄巾張曼成攻殺太守禇貢帝問太尉楊賜以黄巾事賜所對切直帝不悦夏四月賜坐冦賊免以太僕􅀪農鄧盛為太尉已而帝閲錄故事得賜與劉陶所上張角奏乃封賜為臨晉矦陶為中陵鄉矦司空張濟罷以大司農張温為司空皇甫嵩朱儁合將四萬餘人共討潁川嵩儁各統一軍儁與賊波才戰敗嵩進保長社汝南黄巾敗太守趙謙於邵陵廣陽黄巾殺幽州刺史郭勲及太守劉衞波才圍皇甫嵩於長社嵩兵少軍中皆恐賊依草結營㑹大風嵩約敕軍士皆束苣乘城使鋭士間出圍外縱火大呼城上舉燎應之嵩從城中鼓譟而出犇擊賊陳賊驚亂走犇㑹騎都尉沛國曹操将兵適至五月嵩操與朱儁合軍更與賊戰大破之斬首數萬級封嵩都鄉侯操父嵩為中常侍曹騰養子不能審其生出本末或云夏矦氏子也操少機警有權數而任俠放蕩不治行業世人未之竒也唯太尉橋􅀇及南陽何顒異焉􅀇謂操曰天下将亂非命世之才不能濟也能安之者其在君乎顒見操歎曰漢家将亡安天下者必此人也􅀇謂操曰君未有名可交許子将子将者訓之從子劭也好人倫多所賞識與從兄靖俱有高名好共覈論鄉黨人物毎月輙更其品題故汝南俗有月旦評焉嘗為郡功曹府中聞之莫不改操飾行曹操往造劭而問之曰我何如人劭鄙其為人不荅操乃劫之劭曰子治世之能臣亂世之姦雄操大喜而去朱儁之擊黄巾也其䕶軍司馬北地􅀓爕上疏曰臣聞天下之禍不由於外皆興於内是故虞舜先除四凶然後用十六相明惡人不去則善人無由進也今張角起於趙魏黄巾亂於六州此皆釁發蕭牆而禍延四海者也臣受戎任奉辭伐罪始到潁川戰無不尅黄巾雖盛不足為廟堂憂也臣之所懼在於治水不自其源末流彌増其廣耳陛下仁德寛容多所不忍故閹豎弄權忠臣不進誠使張角梟夷黄巾變服臣之所憂甫益深耳何者夫邪正之人不宜共國亦猶冰炭不可同器彼知正人之功顯而危亡之兆見皆將巧辭飾説共長虚偽夫孝子疑於屢至市虎成於三夫若不詳察眞偽忠臣將復有杜郵之戮矣陛下宜思虞舜四罪之舉速行讒佞之誅則善人思進姦凶自息趙忠見其疏而惡之爕擊黄巾功多當封忠譖訴之帝識爕言得不加罪竟亦不封張曼成屯宛下百餘日六月南陽太守秦頡擊曼成斬之交趾土多珍貨前後刺史多無清行財計盈給輙求遷代故吏民怨叛執刺史及合浦太守來逹自稱柱天将軍三府選京令東郡賈琮為交趾刺史琮到部訊其反狀咸言賦歛過重百姓莫不空單京師遥逺告寃無所民不聊生故聚為盜賊琮即移書告示各使安其資業招撫荒散蠲復徭役誅斬渠帥為大害者簡選良吏試守諸縣歳閒蕩定百姓以安巷路為之歌曰賈父來晚使我先反今見清平吏不敢飯皇甫嵩朱儁乗勝進討汝南陳國黄巾追波才於陽翟擊彭脱於西華竝破之餘賊降散三郡悉平嵩乃上言其狀以功歸儁於是進封儁西鄉矦遷鎭賊中郎將詔嵩討東郡儁討南陽北中郎將盧植連戰破張角斬獲萬餘人角等走保廣宗植築圍鑿壍造作雲梯垂當㧞之帝遣小黄門左豐視軍或勸植以賂送豐植不肯豐還言於帝曰廣宗賊易破耳盧中郎固壘息軍以待天誅帝怒檻車徴植減死一等遣東中郎將隴西董卓代之巴郡張脩以妖術為人療病其灋略與張角同令病家出五斗米號五斗米師秋七月脩聚衆反冦郡縣時人謂之米賊八月皇甫嵩與黄巾戰於蒼亭獲其帥卜已董卓攻張角無功抵罪乙巳詔嵩討角九月安平王續坐不道誅國除初續為黄巾所虜國人贖之得還朝廷議復其國議郎李爕曰續守藩不稱損辱聖朝不宜復國朝廷不從爕坐謗毁宗室輸作左校未滿歳王坐誅乃復拜議郎京師為之語曰父不肯立帝子不肯立王冬十月皇甫嵩與張角弟梁戰於廣宗梁衆精勇嵩不能剋明日乃閉營休士以觀其變知賊意稍懈乃濳夜勒兵雞鳴馳赴其陳戰至晡時大破之斬梁􅀗首三萬級赴河死者五萬許人角先已病死剖棺戮屍傳首京師十一月嵩復攻角弟寳於下曲陽斬之斬獲十餘萬人即拜嵩為左車騎將軍領冀州牧封槐里矦嵩能温䘏士卒毎軍行頓止須營幔修立然後就舎軍士皆食爾乃嘗飯故所嚮有功北地先零羌及枹罕河闗羣盜反共立湟中義從胡北宫伯玉李文矦爲將軍殺護羌校尉泠徴金城人邉章韓遂素著名西州羣盜誘而劫之使專任軍政殺金城太守陳懿攻燒州郡初武威太守倚恃權貴恣行貪暴凉州從事武都蘇正和案致其罪刺史梁鵠懼欲殺正和以免其負訪於漢陽長史敦煌蓋勲勲素與正和有仇或勸勲因此報之勲曰謀事殺良非忠也乗人之危非仁也乃諌鵠曰夫紲食鷹隼欲其鷙也鷙而亨之將何用哉鵠乃止正和詣勲求謝勲不見曰吾為梁使君謀不為蘇正和也怨之如初後刺史左昌盜軍榖數萬勲諌之昌怒使勲與從事辛曽孔常别屯阿陽以拒賊欲因軍事罪之而勲數有戰功及北宫伯玉之攻金城也勲勸昌救之昌不從陳懿既死邉章等進圍昌於冀昌召勲等自救辛曽等疑不肯赴勲怒曰昔莊賈後期穰苴奮剱今之從事豈重於古之監軍乎曽等懼而從之勲至冀誚讓章等以背叛之罪皆曰左使君若早從君言以兵臨我庶可自改今罪已重不得降也乃解圍去叛羗圍校尉夏育於畜官勲與州郡合兵救育至狐槃為羗所敗勲餘衆不及百人身被三創堅坐不動指木表曰尸我於此句就種羗滇吾以兵扞衆曰葢長史賢人汝曹殺之者為負天勲仰罵曰死反虜汝何知促來殺我衆相視而驚滇吾下馬與勲勲不肯上遂為羗所執羗服其義勇不敢加害送還漢陽後刺史楊雍表勲領漢陽太守張曼成餘黨更以趙弘為帥衆復盛至十餘萬據宛城朱儁與荆州刺史徐璆等合兵圍之自六月至八月不㧞有司奏徴儁司空張温上疏曰昔秦用白起燕任樂毅皆曠年歷載乃能尅敵儁討潁川已有功效引師南指方畧已設臨軍易將兵家所忌宜假日月責其成功帝乃止儁擊弘斬之賊帥韓忠復據宛拒儁儁鳴鼓攻其西南賊悉衆赴之儁自將精卒掩其東北乘城而入忠乃退保小城惶懼乞降諸將皆欲聽之儁曰兵固有形同而埶異者昔秦項之際民無定主故賞附以勸來耳今海内一統唯黄巾造逆納降無以勸善討之足以懲惡今若受之更開逆意賊利則進戰鈍則乞降縱敵長冦非良計也因急攻連戰不尅儁登土山望之顧謂司馬張超曰吾知之矣賊今外圍周固内營逼急乞降不受欲出不得所以死戰也萬人一心猶不可當况十萬乎不如徹圍并兵入城忠見圍解埶必自出自出則意散易破之道也既而解圍忠果出戰儁因擊大破之斬首萬餘級南陽太守秦頡殺忠餘衆復奉孫夏為帥還屯宛儁急攻之司馬孫堅率衆先登癸巳㧞宛城孫夏走儁追至西鄂精山復破之斬萬餘級於是黄巾破散其餘州郡所誅一郡數千人十二月己巳赦天下改元豫州刺史太原王允破黄巾得張讓賓客書與黄巾交通上之帝責怒讓讓叩頭陳謝竟亦不能罪也讓由是以事中允遂傳下獄㑹赦還為刺史旬日間復以它罪被誅楊賜不欲使更楚辱遣客謝之曰君以張讓之事故一月再徴凶慝難量幸為深計諸從事好氣决者共流涕奉藥而進之允厲聲曰吾爲人臣獲罪於君當伏大辟以謝天下豈有乳藥求死乎投杯而起出就檻車既至廷尉大將軍進與楊賜袁隗共上疏請之得減死論二年春正月大疫二月己酉南宫雲臺災庚戍樂城門災中常侍張讓趙忠説帝斂天下田畮十錢以脩宫室鑄銅人樂安太守陸康上疏諌曰昔魯宣税畮而蝝災自生哀公増賦而孔子非之豈有聚奪民物以營無用之銅人捐捨聖戒自蹈亡王之灋哉内倖譖康援引亡國以譬聖明大不敬檻車徴詣廷尉侍御史劉岱表陳解釋得免歸田里康續之孫也又詔發州郡材木文石部送京師黄門常侍輙令譴呵不中者因强折賤買僅得本賈十分之一因復貨之宦官復不為即受材木遂至腐積宫室連年不成刺史太守復増私調百姓呼嗟又令西園騶分道督趣恐動州郡多受賕賂刺史二千石及茂才孝廉遷除皆責助軍脩宫錢大郡至二三千萬餘各有差當之官者皆先至西園諧價然後得去其守清者乞不之官皆廹遣之時鉅鹿太守河内司馬直新除以有清名減責三百萬直被詔悵然曰為民父母而反割剝百姓以稱時求吾不忍也辭疾不聽行至孟津上書極陳當世之失即吞藥自殺書奏帝為暫絶脩宫錢以朱儁為右車騎将軍自張角之亂所在盜賊竝起博陵張牛角常山禇飛燕及黄龍左校于氐根張白騎劉石左髭文八平漢大計司􅀠縁城雷公浮雲白雀楊鳯于毒五鹿李大目白繞眭固苦蝤之徒不可勝數大者二三萬小者六七千人張牛角褚飛燕合軍攻廮陶牛角中流矢且死令其衆奉飛燕為帥改姓張飛燕名燕輕勇趫捷故軍中號曰飛燕山谷冦賊多附之部衆寖廣殆至百萬號黒山賊河北諸郡縣竝被其害朝廷不能討燕乃遣使至京師奏書乞降遂拜燕平難中郎将使領河北諸山谷事歳得舉孝廉計吏司徒袁隗免三月以廷尉崔烈為司徒烈寔之從兄也是時三公往往因常侍阿保入錢西園而得之叚熲張温等雖有功勤名譽然皆先輸貨財乃登公位烈因傅母入錢五百萬故得為司徒及拜日天子臨軒百僚畢㑹帝顧謂親幸者曰悔不小靳可至千萬程夫人於傍應曰崔公冀州名士豈肯買官賴我得是反不知姝邪烈由是聲譽頓衰北宫伯玉等冦三輔詔左車騎將軍皇甫嵩鎮長安以討之時凉州兵亂不解徴發天下役賦無已崔烈以為宜棄涼州詔㑹公卿百官議之議郎􅀓爕厲言曰斬司徒天下乃安尚書奏爕廷辱大臣帝以問爕對曰樊噲以冒頓悖逆憤激思奮未失人臣之節季布猶曰噲可斬也今涼州天下要衝國家藩衛高祖初興使酈商别定隴右世宗拓境列置四郡議者以為斷匃奴右臂今牧御失和使一州叛逆烈爲宰相不念爲國思所以弭之之䇿乃欲割棄一方萬里之土臣竊惑之若使左衽之虜得居此地士勁甲堅因以爲亂此天下之至慮社稷之深憂也若烈不知是極蔽也知而故言是不忠也帝善而從之夏四月庚戌大雨雹五月太尉鄧盛罷以太僕河南張延爲太尉六月以討張角功封中常侍張讓等十二人爲列矦秋七月三輔螟皇甫嵩之討張角也過鄴見中常侍趙忠舍宅踰制奏沒入之又中常侍張讓私求錢五千萬嵩不與二人由是奏嵩連戰無功所費者多徴嵩還收左車騎將軍印綬削戸六千八月以司空張温爲車騎將軍執金吾袁滂爲副以討北宫伯玉拜中郎将董卓為破虜將軍與盪冦將軍周愼竝統於温九月以特進楊賜爲司空冬十月庚寅臨晉文烈矦楊賜薨以光禄大夫許相爲司空相訓之子也諌議大夫劉陶上言天下前遇張角之亂後遭邉章之冦今西羌逆類已攻河東恐遂轉盛豕突上京民有百走退死之心而無一前􅃲生之計西冦浸前車騎孤危假令失利其敗不救臣自知言數見厭而言不自裁者以爲國安則臣䝉其慶國危則臣亦先亡也謹復陳當今要急八事大較言天下大亂皆由宦官宦官共讒陶曰前張角事發詔書示以威恩自此以來各各改悔今者四方安静而陶􅔂害聖政專言妖孽州郡不上陶何縁知疑陶與賊通情於是收陶下黄門北寺獄掠按日急陶謂使者曰臣恨不與伊吕同疇而以三仁為輩今上殺忠謇之臣下有憔悴之民亦在不久後悔何及遂閉氣而死前司徒陳耽為人忠正宦官怨之亦誣䧟死獄中張温將諸郡兵歩騎十餘萬屯美陽邉章韓遂亦進兵美陽温與戰輙不利十一月董卓與右扶風鮑鴻等并兵攻章遂大破之章遂走榆中温遣周慎將三萬人追之參軍事孫堅説愼曰賊城中無榖當外轉糧食堅願得萬人斷其運道將軍以大兵繼後賊必困乏而不敢戰走入羗中并力討之則凉州可定也愼不從引軍圍榆中城而章遂分屯葵園峽反斷愼運道愼懼棄車重而退温又使董卓將兵三萬討先零羌羗胡圍卓於望垣北糧食乏絶乃於所度水中僞立􅋣以捕魚而濳從􅋣下過軍比賊追之决水已深不得度遂還屯扶風張温以詔書召卓卓良乆乃詣温温責讓卓卓應對不順孫堅前耳語謂温曰卓不怖罪而䲭張大語宜以召不時至陳軍灋斬之温曰卓素著威名於河隴之間今日殺之西行無依堅曰明公親率王師威震天下何賴於卓觀卓所言不假明公輕上無禮一罪也章遂䟦扈經年當以時進討而卓云未可沮軍疑衆二罪也卓受任無功應召稽留而軒昻自高三罪也古之名將仗􅃏臨衆未有不斷斬以成功者也今明公垂意於卓不即加誅虧損威刑於是在矣温不忍發乃曰君且還卓將疑人堅遂出是歳帝造萬金堂於西園引司農金錢繒帛牣積堂中復藏寄小黄門常侍家錢各數千萬又於河間買田宅起第觀三年春二月江夏兵趙慈反殺南陽太守秦頡庚戌赦天下太尉張延罷遣使者持節就長安拜張温為太尉三公在外始於温以中常侍趙忠為車騎將軍帝使忠論討黄巾之功執金吾甄舉謂忠曰傅南容前在東軍有功不侯天下失望今將軍親當重任宜進賢理屈以副衆心忠納其言遣弟城門校尉延致殷勤於􅀓爕延謂爕曰南容少荅我常侍萬戸侯不足得也爕正色拒之曰有功不論命也傅爕豈求私賞哉忠愈懐恨然憚其名不敢害出為漢陽太守帝使鉤盾令宋典繕脩南宫玉堂又使掖庭令畢嵐鑄四銅人又鑄四鐘皆受二千斛又鑄天祿蝦蟇吐水於平門外橋東轉水入宫又作翻車渇烏施於橋西用灑南北郊路以為可省百姓灑道之費五月壬辰晦日有食之六月荆州刺史王敏討趙慈斬之車騎將軍趙忠罷冬十月武陵蠻反郡兵討破之前太尉張延為宦官所譖下獄死􅊨十二月鮮卑冦幽并二州􅊨徴張温還京師四年春正月己卯赦天下二月滎陽賊殺中牟令三月河南尹何苖討滎陽賊破之拜苖爲車騎將軍韓遂殺邉章及北宫伯玉李文矦擁兵十餘萬進圍隴西太守李相如叛與遂連和凉州刺史耿鄙率六郡兵討遂鄙任治中程球球通姦利士民怨之漢陽太守傅爕謂鄙曰使君統政日淺民未知教賊聞大軍將至必萬人一心邉兵多勇其鋒難當而新合之衆上下未和萬一内變雖悔無及不若息軍養德明賞必罰賊得寛挺必謂我怯羣惡爭埶其離可必然後率已敎之民討成離之賊其功可坐而待也鄙不從夏四月鄙行至狄道州别駕反應賊先殺程球次害鄙賊遂進圍漢陽城中兵少糧盡爕猶固守時北地胡騎數千隨賊攻郡皆夙懐爕恩共於城外叩頭求送爕歸鄉里爕子幹年十三言於爕曰國家昬亂遂令大人不容於朝今兵不足以自守宜聽羗胡之請還鄉里徐俟有道而輔之言未終爕慨然歎曰汝知吾必死邪聖逹節次守節殷紂暴虐伯夷不食周粟而死吾遭世亂不能養浩然之志食禄又欲避其難乎吾行何之必死於此汝有才智勉之勉之主簿揚㑹吾之程嬰也狄道人王國使故酒泉太守黄衍説爕曰天下已非復漢有府君寧有意為吾屬帥乎爕按剱叱衍曰若剖符之臣反為賊説邪遂麾左右進兵臨陳戰殁耿鄙司馬扶風馬騰亦擁兵反與韓遂合共推王國為主冦掠三輔太尉張温以冦賊未平免以司徒崔烈為太尉五月以司空許相為司徒光禄勲沛國丁宫爲司空初張温發幽州烏桓突騎三千以討凉州故中山相漁陽張純請將之温不聽而使涿令遼西公孫瓚將之軍到薊中烏桓以牢禀逋縣多叛還本國張純忿不得將乃與同郡故泰山太守張舉及烏桓大人丘力居等連盟劫略薊中殺護烏桓校尉公綦稠右北平太守劉政遼東太守陽終等衆至十餘萬屯肥如舉稱天子純稱彌天將軍安定王移書州郡云舉當代漢告天子避位敕公卿奉迎冬十月長沙賊區星自稱將軍衆萬餘人詔以議􅀰孫堅爲長沙太守討擊平之封堅烏程侯十一月太尉崔烈罷以大司農曹嵩爲太尉十二月屠各胡反是歳賣関内矦直五百萬錢前大丘長陳寔卒海内赴弔者三萬餘人寔在鄉閭平心率物其有爭訟輙求判正曉譬曲直退無怨者至乃歎曰寧為刑罰所加不為陳君所短楊賜陳耽每拜公卿羣僚畢賀輙歎寔大位未登愧於先之資治通鑑卷第五十八
