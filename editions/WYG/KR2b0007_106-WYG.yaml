body:
  text: 資治通鑑卷一百六宋司馬光撰胡三省音註晉紀二十八起旃䝉作噩盡柔兆閹茂凡二年烈宗孝武皇帝中之上太元十年春正月秦王堅朝饗羣臣朝直遥翻時長安饑人相食諸將歸吐肉以飼妻子窮匱如此外無救援烏得不敗乎飼祥吏翻慕容冲即皇帝位於阿房是為西燕改元更始冲有自得之志賞罸任情慕容盛年十三謂慕容柔曰夫十人之長長知兩翻亦須才過九人然後得安今中山王才不逮人功未有成而驕汰已甚殆難濟乎冲在前燕時封中山王汰侈也溢也史言慕容盛㓜而有識畧所以能自奮而有國盛柔歸冲見上卷上年後秦王萇留諸將攻新平自引兵撃安定擒秦安西將軍勃海公珍嶺北諸城悉降之降户江翻甲寅秦王堅與西燕主冲戰于仇班渠大破之慕容垂復興于山東而冲稱號于闗中故書西燕以别之乙卯戰于雀桑又破之甲子戰于白渠白渠即漢時白公所鑿者也秦兵大敗西燕兵圍秦王堅殿中將軍鄧邁力戰却之堅乃得免壬申冲遣尚書令髙葢夜襲長安入其南城左將軍竇衝前禁將軍李辯等擊破之斬首八百級分其屍而食之乙亥髙葢引兵攻渭北諸壘太子宏與戰於成貳壁成貳葢人姓名闗中大亂立壁自保因為地名大破之斬首三萬燕帶方王佐與寧朔將軍平規共攻薊薊音計王永兵屢敗二月永使宋敞燒和龍及薊城宫室帥衆三萬奔壺闗帥讀曰率佐等入薊慕容農引兵㑹慕容麟於中山與共攻翟真麟農先帥數千騎至承營帥讀曰率下同觀察形勢翟真望見陳兵而出諸將欲退農曰丁零非不勁勇而翟真懦弱今簡精鋭望真所在而衝之真走衆必散矣乃邀門而蹙之可盡殺也使驍騎將軍慕容國帥百餘騎衝之驍堅堯翻騎竒寄翻真走其衆争門自相蹈藉藉慈夜翻死者太半遂拔承營外郭癸未秦王堅與西燕主冲戰於城西長安城西也大破之追奔至阿城阿城即阿房宫城冲之巢穴也諸將請乘勝入城堅恐為冲所掩引兵還萬乘之主固不可乘危徼幸然秦喪敗若此乘諸将之勝氣以圖萬一之功可也引兵而還何歟還從宣翻乙酉秦益州刺史王廣以蜀人江陽太守李丕為益州刺史守成都沈約曰江陽郡劉璋分犍為立守式又翻己丑廣帥所部奔還隴西蜀人隨之者三萬餘人劉牢之至枋頭楊膺姜讓謀泄膺讓謀見上卷上年長樂公丕收殺之枋音方樂音洛牢之聞之盤􅁊不進秦平原悼公暉數為西燕主冲所敗數所角翻敗補遇翻秦王堅讓之曰汝吾之才子也擁大衆與白虜小兒戰而屢敗何用生為三月暉憤恚自殺堅責怒暉欲其死戰耳豈意其自殺哉恚于避翻前禁將軍李辯都水使者隴西彭和正恐長安不守召集西州人晉書職官志都水長屬大司農沈約志都水使者掌舟航及運部李辯李儼之子亦隴西人也屯於韮園堅召之不至為後堅襲韮園張本韮舉有翻西燕主冲攻秦髙陽愍公方于驪山殺之苻方戍驪山見上卷上年七月執秦尚書韋鍾以其子謙為馮翊太守使招集三輔之民馮翊壘主邵安民等責謙曰君雍州望族七相五公雍州之望族鍾葢韋賢後也雍于用翻今乃從賊與之為不忠不義何面目以行於世乎謙以告鍾鍾自殺謙來奔秦左將軍茍池右將軍俱石子與西燕主冲戰於驪山兵敗西燕將軍慕容永斬茍池俱石子奔鄴永廆弟運之孫石子難之弟也俱難見一百四卷太元三年廆户罪翻秦王堅遣領軍將軍楊定擊冲大破之虜鮮卑萬餘人而還悉阬之定佛奴之孫也北史曰定佛奴之子佛奴宋奴之子也滎陽人鄭燮以郡來降降户江翻燕王垂攻鄴久不下將北詣冀州乃命撫軍大將軍麟屯信都樂浪王温屯中山召驃騎大將軍農還鄴樂浪音洛琅驃匹妙翻騎竒寄翻於是逺近聞之以燕為不振頗懐去就農至髙邑髙邑本鄗縣漢光武即位于此改曰髙邑屬常山晉志屬趙國遣從事中郎眭邃近出違期不還師古曰眭息隨翻長史張攀言於農曰邃目下參佐目下參佐言其近在眼前也敢欺罔不還請回軍討之農不應敕備假板以邃為髙陽太守參佐家在趙北者悉假署遣歸趙北趙國以北也假署者權時以假板署置其官未以白燕王垂也凡舉補太守三人長史二十餘人退謂攀曰君所見殊誤當今豈可自相魚肉俟吾北還邃等自當迎于道左君但觀之為後邃等迎農張本樂浪王温在中山兵力甚弱丁零四布分據諸城温謂諸将曰以吾之衆攻則不足守則有餘驃騎撫軍首尾連兵㑹須滅賊但應聚糧厲兵以俟時耳於是撫舊招新勸課農桑民歸附者相繼郡縣壁壘争送軍糧倉庫充溢翟真夜襲中山温擊破之自是不敢復至復扶又翻下復還同温乃遣兵一萬運糧以餉垂且營中山宫室欲迎垂都中山也劉牢之攻燕黎陽太守劉撫于孫就柵孫就人姓名盖立柵于黎陽界劉憮因屯焉燕王垂留慕容農守鄴圍自引兵救之秦長樂公丕聞之出兵乘虚夜襲燕營農擊敗之敗補邁翻劉牢之與垂戰不勝退屯黎陽垂復還鄴吕光以龜兹饒樂龜兹音丘慈樂音洛欲留居之天竺沙門鳩摩羅什謂光曰此凶亡之地不足留也據載記鳩摩羅姓也什其名將軍但東歸中道自有福地可居鳩摩羅什知數知吕光必得涼州之地而據之光乃大饗將士議進止衆皆欲還乃以駝二萬餘頭載外國珍寳竒玩驅駿馬萬餘匹而還還音旋又如字夏四月劉牢之進兵至鄴燕王垂逆戰而敗遂撤圍退屯新城乙卯自新城北遁牢之不告秦長樂公丕即引兵追之丕聞之發兵繼進庚申牢之追及垂於董唐淵垂曰秦晉瓦合相待為彊瓦合言其勢不膠固觸而動之一瓦墜碎則衆瓦俱解矣待當作恃今觀待字義亦自通一勝則俱豪一失則俱潰非同心也今兩軍相繼勢既未合宜急擊之牢之軍疾趨二百里至五橋澤五橋澤在臨漳縣北兵法百里而趨利者蹶上將况二百里乎争燕輜重重直用翻垂邀撃大破之斬首數千級牢之單馬走㑹秦救至得免燕冠軍將軍宜都王鳳冠古玩翻每戰奮不顧身前後大小二百五十七戰未嘗無功垂戒之曰今大業甫濟汝當先自愛使為車騎將軍徳之副以抑其鋭以徳持重也鄴中饑甚長樂公丕帥衆就晉穀於枋頭帥讀曰率劉牢之入鄴城收集亡散兵復少振復扶又翻少詩沼翻坐軍敗徴還燕秦相持經年去年正月垂攻鄴幽冀大饑人相食邑落蕭條燕之軍士多餓死燕王垂禁民養蠶以桑椹為軍粮垂將北趣中山趣七喻翻以驃騎大將軍農為前驅前所假授吏眭邃等皆來迎候上下如初李攀乃服農之智略前作張攀此作李攀未知孰是㑹稽王道子好専權好呼到翻復為姦謟者所搆扇復扶又翻下同與太保安有隙安欲避之㑹秦王堅來求救安乃請自將救之將即亮翻壬戌出鎮廣陵之步丘築壘曰新城而居之今揚州邵伯鎮即其地也在揚州城北六十里晉史云安于步丘築埭後人謂之召伯埭蜀郡太守任權攻拔成都斬秦益州刺史李丕復取益州秦取益州見一百三卷寧康元年任音壬新平糧竭矢盡後秦自去年攻新平外救不至後秦王萇使人謂茍輔曰吾方以義取天下豈讐忠臣邪卿但帥城中之人還長安吾止欲得此城耳輔以為然帥民五千口出城萇圍而阬之男女無遺萇仲良翻帥讀曰率獨馮傑子終得脱奔長安馮傑勸輔拒後秦事見上卷上年秦王堅追贈輔等官爵皆諡曰節愍侯以終為新平太守翟真自承營徙屯行唐即漢之南行唐縣也屬常山郡燕王垂趣中山真為所逼故徙屯真司馬鮮于乞殺真及諸翟自立為趙王營人共殺乞立真從弟成為主其衆多降於燕降户江翻五月西燕主冲攻長安秦王堅身自督戰飛矢滿體流血淋漓冲縱兵暴掠闗中士民流散道路斷絶千里無煙有堡壁三十餘推平逺將軍趙敖為主安逺平逺二将軍號盖皆當時所置相與結盟冒難遣兵粮助堅多為西燕所殺堅謂之曰聞來者率不善逹此誠忠臣之義然今寇難殷繁難乃旦翻殷衆也盛也繁多也非一人之力所能濟也徒相隨入虎口何益汝曹宜為國自愛為于偽翻畜糧厲兵以俟天時庶幾善不終否有時而泰也幾居希翻否皮鄙翻三輔之民為冲所畧者遣人宻告堅請遣兵攻冲欲縱火為内應堅曰甚哀諸卿忠誠然吾猛士如虎豹利兵如霜雪困於烏合之虜豈非天乎恐徒使諸卿坐致夷滅吾不忍也其人固請不已乃遣七百騎赴之冲營縱火者反為風火所燒其得免者什一二堅祭而哭之史言闗中之人乃心為堅而力不能濟盖天棄秦也衛將軍楊定與冲戰於城西為冲所擒定秦之驍將也驍堅堯翻將即亮翻堅大懼以䜟書云帝出五將久長得據載記此䜟書謂之古符傳賈錄秦王堅始也禁人學䜟及喪敗之極乃欲用䜟書奔五将山以求免其顛倒錯繆甚矣盖死期将至也䜟楚譛翻乃留太子宏守長安謂之曰天其或者欲導予出外汝善守城勿與賊争利吾當出隴收兵運糧以給汝遂帥騎數百與張夫人及中山公詵二女寳錦出奔五將山新唐書地理志京兆醴泉縣有武將山水經注扶風杜陽縣有五將山又按唐杜佑鳯翔府岐山縣有五将山宣告州郡期以孟冬救長安堅過襲韮園李辯奔燕奔西燕也彭和正慙自殺閏月以廣州刺史羅友為益州刺史鎮成都庚戌燕王垂至常山圍翟成於行唐命帶方王佐鎮龍城六月髙句麗寇遼東句如字又音駒麗力知翻佐遣司馬郝景將兵救之為髙句麗所敗敗補邁翻髙句麗遂陷遼東𤣥菟自此燕不能勝髙句麗菟同都翻秦太子宏不能守長安將數千騎與母妻宗室西奔下辨辨皮莧翻百官逃散司𨽻校尉權翼等數百人奔後秦權翼本姚襄僚屬苻氏既敗故奔後秦西燕主冲入據長安縱兵大掠死者不可勝計勝音升秋七月旱饑井皆竭後秦王萇自故縣如新平漢安定郡有安定縣後漢晉省故曰故縣秦王堅至五將山後秦王萇遣驍騎將軍吳忠帥騎圍之秦兵皆散走獨侍御十數人在側堅神色自若坐而待之召宰人進食俄而忠至執之送詣新平幽於别室太子宏至下辨南秦州刺史楊璧拒之苻堅破仇池置南秦州楊璧氐之種類仕秦尚主任居方面以宏奔敗拒而不納孟子曰寡助之至親戚叛之信哉斯言璧妻堅之女順陽公主也棄其夫從宏宏奔武都投氐豪强熈强其兩翻假道來奔詔處之江州為苻宏附桓𤣥而誅張本處昌吕翻長樂公丕帥衆三萬自枋頭將歸鄴城龍驤將軍檀𤣥擊之戰於谷口檀𤣥晉将也谷口在枋頭西𤣥兵敗丕復入鄴城復扶又翻燕建節將軍餘巖叛自武邑北趣幽州趣七喻翻燕王垂馳使敕幽州將平規曰使疏吏翻固守勿戰俟吾破丁零自討之規出戰為巖所敗敗補邁翻巖入薊掠千餘户而去遂據令支令音鈴又郎定翻支音祁癸酉翟成長史鮮于得斬成出降垂屠行唐盡阬成衆去年丁零叛燕至是而滅降户江翻太保安有疾求還安屯廣陵步丘詔許之八月安至建康甲午大赦丁酉建昌文靖公謝安薨諡法柔徳安衆曰靖寛樂令終曰靖詔加殊禮如大司馬温故事晉以此崇寵謝安安之雅志豈願與桓温同哉庚子以司徒琅邪王道子領揚州刺史録尚書都督中外諸軍事道子得權晉自此亂以尚書令謝石為衛將軍後秦王萇使求傳國璽於秦王堅璽斯氏翻曰萇次應厯數可以為恵堅瞋目叱之曰小羌敢逼天子五胡次序無汝羌名胡羯鮮卑氐羌五胡之次序也無汝羌名謂䜟文耳姚萇自謂次應厯數堅故亦以䜟文為言瞋七人翻璽已送晉不可得也萇復遣右司馬尹緯説堅求為禪代復扶又翻説輸芮翻堅曰禪代聖賢之事姚萇叛賊何得為之堅與緯語問緯在朕朝何官朝直遙翻緯曰尚書令史後漢以來尚書有令史十八人秩二百石堅歎曰卿王景略之儔宰相才也而朕不知卿宜其亡也堅自以平生遇萇有恩尤忿之數罵萇求死數所角翻謂張夫人曰豈可令羌奴辱吾兒乃先殺寳錦堅自知身死之後女必當歸姚萇也辛丑萇遣人縊堅於新平佛寺年四十八張夫人中山公詵皆自殺後秦將士皆為之哀慟為于偽翻萇欲隠其名諡堅曰壯烈天王臣光曰論者皆以為秦王堅之亡由不殺慕容垂姚萇故也臣獨以為不然許劭謂魏武帝治世之能臣亂世之姦雄事見五十八卷漢靈帝中平元年治直吏翻使堅治國無失其道治直之翻則垂萇皆秦之能臣也烏能為亂哉堅之所以亡由驟勝而驕故也魏文矦問李克吳之所以亡對曰數戰數勝文侯曰數戰數勝國之福也何故亡對曰數戰則民疲數勝則主驕數所角翻以驕主御疲民未有不亡者也秦王堅似之矣長樂公丕在鄴將西赴長安樂音洛幽州刺史王永在壺闗是年春王永自幽州奔壺闗遣使招丕丕乃帥鄴中男女六萬餘口西如潞川使疏吏翻帥讀曰率驃騎將軍張蚝并州刺史王騰迎之入晉陽驃匹妙翻騎竒寄翻蚝七吏翻丕始知長安不守堅已死乃發喪即皇帝位丕字永叙堅之庶長子也追諡堅曰宣昭皇帝廟號世祖大赦改元大安燕王垂以魯王和為南中郎將鎮鄴遣慕容農出蠮螉塞蠮于結翻螉于公翻厯凡城趣龍城趣七喻翻㑹兵討餘巖慕容麟慕容隆自信都徇勃海清河麟擊勃海太守封懿執之因屯厯口水經注清河自廣川東北流逕厯縣故城南前漢信都國之屬縣也應劭曰廣川縣西北三十里有厯城亭故縣也今亭在縣東津濟之所謂之厯口渡懿放之子也封放見九十九卷穆帝永和七年鮮卑劉頭眷擊破賀蘭部於善無善無縣前漢屬雁門郡後漢屬定襄郡漢末日棄之荒外又破柔然于意親山意親山葢即意辛山親辛語相近按魏書帝紀道武登國五年四月幸意辛山與質驎討賀蘭紇突鄰紇奚諸部大破之六月還幸牛川則意辛山在牛川之北頭眷子羅辰言於頭眷曰比來行兵所向無敵比毗至翻然心腹之疾願早圖之頭眷曰誰也羅辰曰從兄顯忍人也從才用翻必將為亂頭眷不聴顯庫仁之子也頃之顯果殺頭眷自立又將殺拓跋珪珪依劉庫仁見一百四卷太元元年顯弟亢埿妻珪之姑也埿與泥同以告珪母賀氏顯謀主梁六眷代王什翼犍之甥也犍居言翻下同亦使其部人穆崇奚牧宻告珪魏書官氏志拓拔氏之先兼并它國各有本部部中别族為内姓丘穆陵氏後改為穆氏又拓拔鄰以弟為逹奚氏後改為奚氏且以其愛妻駿馬付崇曰事泄當以此自明賀氏夜飲顯酒令醉飲于鴆翻使珪隂與舊臣長孫犍元他羅結輕騎亡去元他羅結二人也他唐何翻向晨賀氏故驚廐中羣馬使顯起視之賀氏哭曰吾子適在此今皆不見汝等誰殺之邪顯以故不急追珪遂奔賀蘭部依其舅賀訥賀訥本賀蘭訥後魏孝文帝改北方舊姓以賀蘭氏為賀氏史因簡便而書之如上文穆崇奚牧之類皆是也訥驚喜曰復國之後當念老臣珪笑曰誠如舅言不敢忘也顯疑梁六眷泄其謀將囚之穆崇宣言曰六眷不顧恩義助顯為逆我掠得其妻馬足以解忿顯乃捨之賀氏從弟外朝大人賀恱舉所部以奉珪賀恱盖什翼犍時為外朝大人魏書官氏志曰登國二年因舊制置南北大人對治二部又置外朝大人無常員主受詔命外使出禁中國有大喪大禮皆與參知隨所典焉從才用翻顯怒將殺賀氏賀氏奔亢埿家匿神車中三日北人無室屋逐水草置神于車中而嚴事之因謂之神車亢埿舉家為之請乃得免為于偽翻故南部大人長孫嵩帥所部七百餘家叛顯奔五原嵩依劉氏亦見一百四卷太元元年五原秦郡魏晉棄之荒外帥讀曰率時拓跋寔君之子渥亦聚衆自立嵩欲從之烏渥謂嵩曰逆父之子不足從也寔君弑什翼犍見太元元年不如歸珪嵩從之史言長孫嵩由此遂為拓跋珪佐命功臣福流子孫久之劉顯所部有亂故中部大人庾和辰奉賀氏奔珪凡言故者皆什翼犍舊所署置也魏書官氏志拓拔詰汾時餘部諸姓内入者自有庾氏非中國之庾氏也賀訥弟染干以珪得衆心忌之使其黨侯引七突殺珪代人尉古真知之以告珪矦引七突不敢發矦引七突官氏志無此氏志云諸姓年世稍久互以改易興衰存滅間有之今舉其可知者則其不可知而不舉者亦有之矣西方尉遲氏後改為尉氏尉讀如鬱染干疑古真泄其謀執而訊之訊鞠問也以兩車輪夾其頭傷一目不伏乃免之染干遂舉兵圍珪賀氏出謂染干曰汝等欲於何置我而殺吾子乎染干慙而去史言賀訥兄弟不能舉部以奉拓跋珪為珪攻賀蘭部張本夫以珪備嘗險阻艱難以成大業而卒斃于賀蘭氏豈天道邪九月秦主丕以張蚝為侍中司空蚝七吏翻王永為侍中都督中外諸軍事車騎大將軍尚書令王騰為中軍大將軍司𨽻校尉苻冲為尚書左僕射封西平王又以左長史楊輔為右僕射右長史王亮為護軍將軍立妃楊氏為皇后子寧為皇太子夀為長樂王樂音洛鏘為平原王懿為勃海王昶為濟北王吕光自龜兹還至宜禾班志敦煌郡廣至縣昆侖障宜禾都尉治晉分為宜禾縣屬晉昌郡劉昫曰𤓰州常樂縣漢廣至縣魏分廣至置宜禾縣李暠於此置凉興郡隨廢置常樂鎮武徳五年改鎮為縣龜兹音丘慈秦凉州刺史梁熈謀閉境拒之髙昌太守楊翰言於熈曰李延夀曰髙昌者車師前王之故地昔漢武帝遣兵西討師旅頓弊其中尤困者住焉地勢髙敞人庶昌盛因名髙昌其地有漢時髙昌壘晉為髙昌郡後因為國名吕光新破西域兵疆氣鋭聞中原喪亂喪息浪翻必有異圖河西地方萬里帶甲十萬足以自保若光出流沙其勢難敵髙梧谷口險阻之要宜先守之而奪其水髙悟谷口當在髙昌西界彼既窮渇可以坐制如以為逺伊吾闗亦可拒也伊吾縣晉置屬晉昌郡有伊吾闗度此二阨雖有子房之䇿無所施矣言地險既失雖有張良之計無所用也熙弗聴美水令犍為張統謂熙曰今闗中大亂京師存亡不可知長安已陷而凉州不知道梗故也犍居言翻吕光之來其志難測將軍何以抗之熙曰憂之未知所出統曰光智畧過人今擁思歸之士乘戰勝之氣其鋒未易當也易以䜴翻將軍世受大恩忠誠夙著立勲王室宜在今日行唐公洛上之從弟勇冠一時從才用翻冠古玩翻為將軍計莫若奉為盟主以收衆望推忠義以帥羣豪帥讀曰率下同則光雖至不敢有異心也資其精鋭東兼毛興毛興時刺河州連王統楊璧王統時刺秦州楊璧時刺南秦州合四州之衆掃兇逆寧帝室此桓文之舉也熈又弗聴殺洛於西海洛徙西海見一百四卷太元五年梁熈既欲拒吕光又殺苻洛不過欲保據凉州非有扶顛持危之志也光聞楊翰之謀懼不敢進杜進曰梁熈文雅有餘機鑒不足終不能用翰之謀不足憂也宜及其上下離心速進以取之光從之進至髙昌楊翰以郡迎降熈不能用楊翰之謀翰遂降於光降户江翻下同至玉門熈移檄責光擅命還師以子𦙍為鷹揚將軍與振威將軍南安姚皓别駕衛翰帥衆五萬拒光於酒泉帥讀曰率燉煌太守姚静晉昌太守李純以郡降光敦徒門翻光報檄凉州責熈無赴難之志難乃旦翻而遏歸國之衆遣彭晃杜進姜飛為前鋒與𦙍戰于安彌安彌縣自漢以來屬酒泉郡大破擒之於是四山胡夷皆附於光武威太守彭濟執熈以降光殺之光入姑臧自領凉州刺史表杜進為武威太守自餘將佐各受職位凉州郡縣皆降於光獨酒泉太守宋皓西郡太守宋泮晉志曰漢分張掖之日勒刪丹等縣置西郡其地當嶺要城守不下光攻而執之讓泮曰吾受詔平西域而梁熈絶我歸路此朝廷之罪人卿何為附之泮曰將軍受詔平西域不受詔亂凉州梁公何罪而將軍殺之泮但苦力不足不能報君父之讐耳豈肯如逆氐彭濟之所為乎主滅臣死固其常也光殺泮及皓主簿尉祐姦佞傾險尉姓也讀如字與彭濟俱執梁熈光寵信之祐譛殺名士姚皓等十餘人凉州人由是不悦昔齊人伐燕勝之孟子曰取之而燕民悦則取之取之而燕民不悦則勿取其後燕卒報齊吕光始得凉士而無以収凉人之心宜其有國不永也光以祐為金城太守祐至允吾允吾漢縣屬金城郡晉省據水經注允吾在廣武西北其地在當時葢屬廣武郡界劉昫曰唐鄯州龍支縣本漢允吾縣後漢改曰龍耆後魏改曰金城又改曰龍支積石山在今縣南允音鉛吾音牙襲據其城以叛姜飛擊破之祐奔據興城以載記參考水經興城當在允吾之西白土之東乞伏國仁自稱大都督大將軍單于領秦河二州牧單音蟬改元建義以乙旃童埿為左相屋引出支為右相獨孤匹蹄為左輔武羣勇士為右輔乙旃屋引獨孤武羣皆夷人復姓乞伏與拓拔同出於鮮卑故其部人亦有乙旃獨孤二姓埿與泥同弟乾歸為上將軍分其地置武城等十二郡載記曰置武城武陽安固武始漢陽天水畧陽漒川甘松匡朋白馬苑川十二郡築勇士城而都之水經注苑川水出勇士縣之子城南山北逕牧師苑故漢牧苑之地也有東西二苑城其城相去七里西城即乞伏所都秦尚書令魏昌公纂自闗中奔晉陽秦主丕拜纂太尉封東海王冬十月西燕主冲遣尚書令髙葢帥衆五萬伐後秦戰于新平南蓋大敗降於後秦帥讀曰率降户江翻初葢以楊定為子及葢敗定亡奔隴右復收集其舊衆定為西燕禽財六月耳復扶又翻苻定苻紹苻謨苻亮聞秦主丕即位皆自河北遣使謝罪定紹謨亮降燕見上卷上年中山太守王兖本新平氐也固守博陵為秦拒燕為于偽翻十一月丕以兖為平州刺史定為冀州牧紹為冀州都督謨為幽州牧亮為幽平二州都督並進爵郡公左將軍竇衝據兹川兹川即霸川也霸水古曰滋水秦穆公之霸也更滋水曰霸水以顯霸功今曰兹川因古名也有衆數萬與秦州刺史王統河州刺史毛興益州刺史王廣南秦州刺史楊璧衛將軍楊定皆自隴右遣使邀丕共擊後秦丕以定為雍州牧雍于用翻衝為梁州牧加統鎮西大將軍興車騎大將軍璧征南大將軍並開府儀同三司加廣安西將軍皆進位州牧楊定尋徙治厯城置儲蓄於百頃百頃自楊茂搜以來保為巢穴自稱龍驤將軍仇池公遣使來稱藩驤思將翻使疏吏翻詔因其所號假之其後又取天水略陽之地自稱秦州刺史隴西王繹幕人蔡匡據城以叛燕繹幕縣自漢以來屬清河郡至隋廢入徳州安樂縣燕慕容麟慕容隆共攻之泰山太守任泰潜師救匡任音壬至匡壘南八里燕人乃覺之諸將以匡未下而外敵奄至甚患之隆曰匡恃外救故不時下今計泰之兵不過數千人及其未合擊之泰敗匡自降矣乃釋匡擊泰大敗之斬首千餘級匡遂降降户江翻下同燕王垂殺之且屠其壘慕容農至龍城自蠮螉塞厯凡城至龍城休士馬十餘日諸將皆曰殿下之來取道甚速今至此久留不進何也農曰吾來速者恐餘巖過山鈔盜侵擾良民耳此山謂白狼山鈔楚交翻巖才不踰人誑誘饑兒誑居况翻誘音酉烏集為羣非有綱紀吾已扼其喉久將離散無能為也今此田善熟未収而行徒自耗損當俟収畢往則梟之梟堅堯翻亦不出旬日耳頃之農將步騎三萬至令支巖衆震駭稍稍踰城歸農巖計窮出降農斬之進擊髙句麗復遼東𤣥莬二郡郝景之敗髙句麗陷遼東𤣥菟菟同都翻還至龍城上疏請繕修陵廟燕自慕容皝以前皆𦵏遼西故陵廟在焉燕王垂以農為使持節都督幽平二州北狄諸軍事幽州牧鎮龍城使疏吏翻徙平州刺史帶方王佐鎮平郭農於是創立法制事從寛簡清刑獄省賦役勸課農桑居民富贍四方流民前後至者數萬口先是幽冀流民多入髙句麗先悉薦翻農以驃騎司馬范陽龎淵為遼東太守招撫之慕容麟攻王兖于博陵城中糧竭矢盡功曹張猗踰城出聚衆以應麟兖臨城數之曰數所角翻卿是秦民吾是卿君卿起兵應賊自號義兵何名實之相違也古人求忠臣必於孝子之門後漢韋彪之言卿母在城棄而不顧吾何有焉今人取卿一切之功則可矣寧能忘卿不忠不孝之事乎不意中州禮義之邦乃有如卿者也十二月麟拔博陵執兖及苻鑑殺之昌黎太守宋敞帥烏桓索頭之衆救兖不及而還帥讀曰率索昔各翻還從宣翻又如字秦主丕以敞為平州刺史敞時從王永在壺闗燕王垂北如中山謂諸將曰樂浪王招流離實倉廩外給軍糧内營宫室雖蕭何之功何以加之樂浪王温之功詳見上漢髙祖與項羽相拒蕭何鎮撫闗中為之根本丙申垂始定都中山杜佑曰後燕都中山今博陵郡唐昌縣秦苻定據信都以拒燕燕王垂以從弟北地王精為冀州刺史將兵攻之從才用翻將即亮翻拓跋珪從曽祖紇羅與其弟建及諸部大人共請賀訥推珪為主從才用翻十一年春正月戊申拓跋珪大㑹于牛川自武周塞西行至牛川牛川以北皆大漠也據魏紀窟咄之來寇也珪乞師于燕自弩山至牛川屯於延水南出代谷以㑹燕師又據水經注于延水出長川城南則長川即牛川也班志于延水出代郡且如塞外則牛川亦當在且如塞外也又明元帝大獮于牛川登釡山括地志釡山在媯州懐戎縣北三里且如之且音子如翻即代王位珪什翼犍之嫡孫世子寔之子拓跋氏自此興矣改元登國以長孫嵩為南部大人叔孫普洛為北部大人分治其衆魏書曰魏初自北荒南遷置四部大人坐王庭决辭訟以言語約束刻契記事無囹圄考訊之法諸犯罪者皆臨時决遣治直之翻下同以上谷張衮為左長史許謙為右司馬廣寗王建代人和跋叔孫建庾岳為外朝大人魏書官氏志拓拔鄰命叔父之𦙍曰乙旃氏後改叔孫氏朝直遙翻奚牧為治民長長知兩翻皆掌宿衛及參軍國謀議長孫道生賀毗等侍從左右從才用翻出納教命王建娶代王什翼犍之女岳和辰之弟道生嵩之從子也庾和辰奉珪母賀氏以奔珪長孫嵩帥部衆歸珪事並見上從才用翻燕王垂即皇帝位垂字道明燕主皝之第五子後秦王萇如安定南安祕宜祕姓也前漢書功臣表有戴矦祕彭時祕氏為南安豪族帥羌胡五萬餘人攻乞伏國仁國仁將兵五千逆擊大破之帥讀曰率將即亮翻􅀢奔還南安鮮于乞之殺翟真也翟真見殺見上年四月翟遼奔黎陽黎陽太守滕恬之甚愛信之恬之喜畋獵喜許記翻不愛士卒遼潜施姦恵以収衆心恬之南攻鹿鳴城黎陽在河北鹿鳴城在河南酈道元曰案竹書紀年梁恵成王十三年取鄭鹿即是城也今城内有臺尚謂之鹿鳴臺又謂之鹿鳴城遼于後閉門拒之恬之東奔鄄城鄄吉掾翻遼追執之遂據黎陽豫州刺史朱序遣將軍秦膺童斌與淮泗諸郡共討之斌音彬秦益州牧王廣自隴右引兵攻河州牧毛興於枹罕興遣建節將軍衛平帥其宗人一千七百夜襲廣大破之帥讀曰率二月秦州牧王統遣兵助廣攻興興嬰城自守去年王廣自成都依統燕大赦改元建興置公卿尚書百官繕宗廟社稷西燕主冲樂在長安樂音洛且畏燕主垂之彊不敢東歸課農築室為久安之計鮮卑咸怨之鮮卑思東歸而冲安于長安故怨傳曰以欲從人則可以人從欲鮮濟其是之謂歟左將軍韓延因衆心不悦攻冲殺之立冲將叚隨為燕王改元昌平初張天錫之南奔也見上卷太元八年秦長水校尉王穆匿其世子大豫與俱奔河西依秃髪思復鞬思復鞬烏孤之父也鞬居言翻思復鞬送魏安五代志武威郡昌松縣後魏置昌松郡後周廢郡以揖次縣入焉又有後魏魏安郡後亦廢載記言焦松等迎大豫于揖次則魏安盖後魏所置郡晉書成於唐唐史臣以後魏郡名書之耳孟康曰揖音子如翻次音恣魏安人焦松齊肅張濟等聚兵數千人迎大豫為主攻吕光昌松郡拔之昌松即漢倉松縣地本屬武威郡盖河西張氏分置郡也吕光後以郭黁言改昌松為東張掖郡執太守王世强光使輔國將軍杜進擊之進兵敗大豫進逼姑臧王穆諫曰光糧豐城固甲兵精鋭逼之非利不如席卷嶺西卷讀曰捲礪兵積粟然後東向與之争不及朞年光可取也大豫不從自號撫軍將軍凉州牧改元鳳凰以王穆為長史傳檄郡縣使穆説諭嶺西諸郡自西郡至張掖酒泉建康晉昌其地皆嶺西也説愉芮翻建康太守李隰祁連都尉嚴純皆起兵應之建康郡張駿置屬凉州新唐書地理志甘州張掖縣西北百九十里有祁連山北有建康軍盖張氏置郡地也晉書地理志永興中張祚置漢陽縣以守牧地張𤣥靚改為祁連郡有衆三萬保據楊塢楊塢在姑臧城西代王珪徙居定襄之盛樂按盛樂前漢書作成樂屬定襄後漢書作盛樂屬雲中疑定襄之盛樂即雲中之盛樂也然魏書帝紀什翼犍立三年移都于雲中之盛樂明年築盛樂城於故城南八里則已非後漢之盛樂城疑定襄之盛樂乃前漢之成樂城也葢建武之初匈奴侵寇塞下之民悉内徙其後南單于内附北單于勢屈復歸内徙之民於塞下郡縣城郭掃地更為必有非其故處者攷宋白續通典唐振武軍漢定襄郡之盛樂也在隂山之陽黄河之北後魏所都盛樂是也在唐朔州北三百餘里後魏孝文遷洛之後于定襄故城置朔州領盛樂廣牧二郡唐初平突厥置雲中都督府於盛樂貞觀八年移雲州雲中郡及定襄縣于今雲州而雲中都督府後又改單于都護府又改安北都護府由是雲中定襄地名混亂不可考而盛樂則一也務農息民國人悦之史言拓跋珪所以興三月大赦泰山太守張願以郡叛降翟遼降户江翻初謝𤣥欲使朱序屯梁國𤣥自屯彭城以北固河上西援洛陽朝議以征役既久欲令𤣥置戍而還㑹翟遼張願繼叛北方騷動𤣥謝罪乞解職詔慰諭令還淮隂燕主垂追尊母蘭氏為文昭皇后欲遷文明叚后以蘭氏配享太祖叚氏燕王皝之元妃蘭氏皝之側室也皝廟號太祖諡文明皇帝詔百官議之皆以為當然順垂指也博士劉詳董謐以為堯母為帝嚳妃位第三不以貴陵姜嫄帝王紀曰帝嚳有四妃元妃有邰氏女曰姜嫄生后稷次妃有娀氏女曰簡狄生卨次妃陳豐氏女曰慶都生放勛次妃娵訾氏女曰常義生摯嚳苦沃翻明聖之道以至公為先文昭后宜立别廟垂怒逼之詳謐曰上所欲為無問於臣臣案經奉禮不敢有貳垂乃不復問諸儒卒遷叚后以蘭后代之復扶又翻卒子戍翻又以景昭可足渾后傾覆社稷追廢之尊烈祖昭儀叚氏為景徳皇后配享烈祖可足渾氏燕主雋之元妃也傾覆事見一百二卷海西公太和四年叚氏雋之側室也雋廟號烈祖諡景昭皇帝崔鴻曰齊桓公命諸侯無以妾為妻孟子曰齊桓公葵丘之㑹初命曰誅不孝無易樹子無以妾為妻夫之於妻猶不可以妾代之况子而易其母乎春秋所稱母以子貴者君母既沒得以妾母為小君也春秋公羊傳曰桓幼而貴隠長而卑隠長又賢諸大夫扳隠而立之隠之立為桓立也隠長又賢何以不宜立立適以長不以賢立子以貴不以長桓何以貴母貴也母貴則子何以貴子以母貴母以子貴左氏傳曰恵公元妃孟子孟子卒繼室以聲子生隠公宋武公生仲子為魯夫人生桓公而恵公薨是以隠公立而奉之至於享祀宗廟則成風終不得配莊公也魯荘公夫人姜氏成風者荘公之妾僖公之母也姜氏通于共仲弑閔公而欲立共仲不克遂孫于邾齊桓公殺之僖公既立請其喪以夫人之禮𦵏之君父之所為臣子必習而效之猶形聲之于影響也寳之逼殺其母事見後一百八卷太元二十一年由垂為之漸也堯舜之讓猶為之噲之禍事見二卷周愼靚王五年况違禮而縱私者乎昔文姜得罪於桓公春秋不之廢魯桓公之夫人曰文姜通于齊襄公桓公謫之夫人以告襄公遂殺桓公至荘公二十一年春秋書夫人姜氏薨二十二年書葬我小君文姜是不之廢也可足渾氏雖有罪於前朝朝直遥翻然小君之禮成矣垂以私憾廢之私憾謂譛殺垂妃叚氏又譛垂而逐之奔秦也又立兄妾之無子者皆非禮也劉顯自善無南走馬邑畏代之偪且懼其修怨也其族人奴真帥所部請降於代帥讀曰率降户江翻奴真有兄鞬先居賀蘭部鞬居言翻奴真言於代王珪請召鞬而以所部讓之珪許之鞬既領部遣弟去斤遺賀訥金馬遺于季翻賀染干謂去斤曰我待汝兄弟厚汝今領部宜來從我去斤許之奴真怒曰我祖父以來世為代忠臣故我以部讓汝等欲為義也今汝等無狀乃謀叛國義於何在遂殺鞬及去斤染干聞之引兵攻奴真奴真奔代珪遣使責染干染干乃止珪與賀蘭從此隙矣使疏吏翻西燕僕射慕容恒尚書慕容永襲叚隨殺之立宜都王子顗為燕王顗盖燕宜都王栢之子顗魚豈翻改元建明帥鮮卑男女四十餘萬口去長安而東海西公太和五年秦遷鮮卑于長安至是財十七年耳而種類蕃育乃如此唐太宗阿史那結社率之變亦幸其早發耳帥讀曰率恒弟護軍將軍韜誘顗殺之於臨晉誘音酉恒怒捨韜去永與武衛將軍刁雲帥衆攻韜韜敗奔恒營恒立西燕主冲之子瑶為帝改元建平諡冲曰威皇帝衆皆去瑶奔永永執瑶殺之立慕容泓子忠為帝改元建武忠以永為太尉守尚書令封河東公永持灋寛平鮮卑安之至聞喜聞燕主垂已稱尊號不敢進築燕熈城而居之為燕主垂滅西燕張本鮮卑既東長安空虚前滎陽髙陵趙榖等招杏城盧水胡郝奴帥户四千入於長安渭北皆應之帥讀曰率下同以榖為丞相扶風王驎有衆數千保據馬嵬馬嵬山在咸陽縣西去長安城百餘里杜佑曰京兆金城縣有馬嵬故城孫景安征塗記云馬嵬所築不知何代人金城周曰犬丘秦曰廢丘漢曰槐里驎離珍翻嵬吾回翻奴遣弟多攻之夏四月後秦王萇自安定伐之驎奔漢中萇執多而進奴懼請降降户江翻拜鎮北將軍六谷大都督長安南山有六谷癸巳以尚書僕射陸納為左僕射譙王恬為右僕射晉志曰左右僕射或不兩置但曰尚書僕射納玩之子也陸玩見九十四卷成帝咸和四年毛興襲擊王廣敗之敗補邁翻廣奔秦州隴西鮮卑匹蘭執廣送于後秦興復欲攻王統于上邽枹罕諸氐皆厭苦兵事諸氐盖秦王堅使毛興領之以鎮枹罕者也復扶又翻枹音膚乃共殺興推衛平為河州刺史以衛平宗强故推之遣使請命於秦使疏吏翻下同燕主垂封其子農為遼西王麟為趙王隆為髙陽王代王珪初改稱魏王拓跋氏自此國號魏張大豫自楊塢進屯姑臧城西王穆及禿髪思復鞬子奚于帥衆三萬屯於城南鞬居言翻吕光出擊大破之斬奚于等二萬餘級秦大赦以衛平為撫軍將軍河州刺史吕光為車騎大將軍凉州牧騎竒寄翻使者皆没于後秦不能逹時秦主丕在晉陽後秦隔其道故不能逹二鎮燕主垂以范陽王徳為尚書令太原王楷為左僕射樂浪王温為司𨽻校尉温守中山有營宫室建都邑之功因用為司𨽻樂浪音洛琅後秦王萇即皇帝位于長安萇字景茂姚弋仲之第二十四子也大赦改元建初國號大秦追尊其父弋仲為景元皇帝立妻地氏為皇后類篇虵以者翻虜姓也姓譜姚萇后虵氏南安人也虵食遮翻又音它子興為皇太子置百官萇與羣臣宴酒酣言曰諸卿皆與朕北面秦朝朝直遥翻今忽為君臣得無耻乎趙遷曰天不恥以陛下為子臣等何恥為臣萇大笑魏王珪東如陵石陵石地名在盛樂東護佛矦部帥矦辰乙佛部帥代題皆叛走帥所類翻諸將請追之珪曰矦辰等累世服役有罪且當忍之方今國家草創人情未壹愚者固宜前却一前一却言叛服不常也不足追也史言珪能識時知變以安反側六月庚寅以前輔國將軍楊亮為雍州刺史鎮衛山陵帝置雍州于襄陽今遣亮帶雍州鎮洛雍于用翻荆州刺史桓石民遣將軍晏謙擊𢎞農下之姓譜曰左傳齊有晏氏代為大夫初置湖陜二戍湖陜二縣皆屬𢎞農陜式冉翻西燕刁雲等殺西燕主忠推慕容永為使持節大都督中外諸軍事大將軍大單于雍秦梁凉四州牧録尚書事河東王稱藩於燕稱藩于燕主垂也使疏吏翻雍于用翻燕主垂遣太原王楷趙王麟陳留王紹章武王宙攻秦苻定苻紹苻謨苻亮等去年苻定等背燕為秦楷先以書與之為陳禍福定等皆降降户江翻垂封定等為矦曰以酬秦主之徳秦主丕以都督中外諸軍事司徒録尚書事王永為左丞相太尉東海王纂為大司馬司空張蚝為太尉蚝七吏翻尚書令咸陽徐義為司空司𨽻校尉王騰為驃騎大將軍儀同三司驃匹妙翻騎竒寄翻永傳檄四方公矦牧守壘主民豪共討姚萇慕容垂令各帥所統以孟冬上旬㑹大駕於臨晉帥讀曰率於是天水姜延馮翊寇明河東王昭新平張晏京兆杜敏扶風馬朗建忠將軍髙平牧官都尉扶風王敏等建忠将軍盖亦苻氏創置髙平縣漢屬安定郡晉省前趙劉曜以為朔州治所秦置牧官都尉於其地咸承檄起兵各有衆數萬遣使詣秦使疏吏翻丕皆就拜將軍郡守封列矦冠軍將軍鄧景擁衆五千據彭池與竇衝為首尾以擊後秦彭池恐當作彪池彪池在長安西詩所謂滮池北流者也竇衝據兹川在長安東南可以相為首尾又據新唐書地理志寧州有彭池但去兹川逺耳丕以景為京兆尹景羌之子也鄧羌秦之名將後秦王萇徙安定五千餘户于長安秋七月秦平凉太守金熈安定都尉沒奕干與後秦左將軍姚方成戰于孫丘谷孫丘谷當在安定方成兵敗後秦主萇以其弟征虜將軍緒為司𨽻校尉鎮長安自將至安定将即亮翻擊熈等大破之金熈本東胡之種秦謂鮮卑之種居遼碣者為東胡種章勇翻没奕干鮮卑多蘭部帥也帥所類翻枹罕諸氐枹音膚以衛平衰老難與成功議廢之而憚其宗彊累日不决氐啖青謂諸将曰啖徒覽翻姓也大事宜時定不然變生諸君但請衛公為㑹觀我所為㑹七夕大宴青抽劒而前曰今天下大亂吾曹休戚同之非賢主不可以濟大事衛公老宜返初服以避賢路衛平本毛興部将狄道長苻登長知兩翻雖王室疎屬志略雄明請共立之以赴大駕欲承王永檄赴秦主丕也諸君有不同者即下異議乃奮劒攘袂將斬異已者衆皆從之莫敢仰視於是推登為使持節都督隴右諸軍事撫軍大將軍雍河二州牧略陽公帥衆五萬東下隴攻南安拔之馳使請命於秦登秦主丕之族子也苻登事始此使疏吏翻雍于用翻帥讀曰率下同祕宜與莫矦悌眷帥其衆三萬餘户降于乞伏國仁國仁拜宜東秦州刺史悌眷梁州刺史莫矦夷人複姓降户江翻下同己酉魏王珪還盛樂自陵石還也代題復以部落來降復扶又翻十餘日又奔劉顯珪使其孫倍斤代領其衆劉顯弟肺泥帥衆降魏八月燕主垂留太子寳守中山以趙王麟為尚書右僕射録留臺庚午自帥范陽王徳等南略地使髙陽王隆東徇平原丁零鮮于乞保曲陽西山曲陽縣屬常山郡聞垂南伐出營望都望都縣屬中山郡水經注堯封于唐堯山在東北堯母慶都山在南登堯山見都山故望都縣以為名也剽掠居民剽匹妙翻趙王麟自出討之諸將皆曰殿下虚鎮逺征萬一無功而返虧損威重不如遣諸將討之麟曰乞聞大駕在外無所畏忌必不設備一舉可取不足憂也乃聲言至魯口夜回趣乞趣七喻翻比明至其營掩擊擒之比必寐翻及也翟遼寇譙朱序擊走之秦主丕以苻登為征西大將軍開府儀同三司南安王持節州牧都督皆因其所稱而授之又以徐義為右丞相留王騰守晉陽右僕射楊輔戍壺闗帥衆四萬進屯平陽帥讀曰率初後秦主萇之弟碩徳統所部羌居隴上聞萇起兵自稱征西將軍聚衆於冀城以應之以兄孫詳為安逺將軍據隴城從孫訓為安西將軍據南安之赤亭諸姚本赤亭羌也與秦秦州刺史王統相持萇自安定引兵㑹碩徳攻統天水屠各畧陽羌胡應之者二萬餘户秦略陽太守王皮降之屠直於翻降户江翻初秦滅代遷代王什翼犍少子窟咄於長安事見一百四卷太元元年窟苦骨翻咄當没翻從慕容永東徙永以窟咄為新興太守劉顯遣其弟亢埿迎窟咄以兵隨之逼魏南境諸部騷動魏王珪左右于桓等與部人謀執珪以應窟咄幢將代人莫題等亦潜與窟咄交通魏收官氏志道武登國元年置幢將六人主三郎衛士直宿禁中者侍中已下中散已上皆統之拓拔詰汾時餘部諸姓内入者有莫那婁氏後為莫氏幢直江翻桓舅穆崇告之珪誅桓等五人莫題等七姓悉原不問為後珪殺莫題張本珪懼内難難乃旦翻北踰隂山復依賀蘭部復扶又翻遣外朝大人遼東安同求救於燕姓譜安息王子入侍遂為漢人風俗通漢有安成為太守廬山記有安息國王子安髙朝直遙翻燕主垂遣趙王麟救之九月王統以秦州降於後秦降户江翻後秦主萇以姚碩徳為使持節都督隴右諸軍事秦州刺史鎮上邽使疏吏翻吕光得秦王堅㓙問舉軍縞素諡曰文昭皇帝冬十月大赦改元大安晉書載記作太安西燕慕容永遣使詣秦主丕求假道東歸使疏吏翻丕弗許與永戰于襄陵襄陵縣漢屬河東郡晉屬平陽郡秦兵大敗左丞相王永衛大將軍俱石子皆死初東海王纂自長安來去年纂奔丕麾下壯士三千餘人丕忌之既敗懼為纂所殺帥騎數千南奔東垣東垣縣漢已改為真定此東垣在河南新安縣界宋白曰河南府王屋縣漢為河東郡垣縣地又絳州垣縣本河東郡縣名其地即周召分陜之所又曰河南府漢為河南郡治洛陽後漢都洛陽河南屬司𨽻校尉魏陳留王奐合河南等五郡置司州劉聰為荆州石虎為洛州苻堅為豫州宋武入洛更置東垣西垣二縣仍于虎牢置司州帥讀曰率騎竒寄翻謀襲洛陽揚威將軍馮該自陜邀擊之陜式冉翻殺丕執其太子寧長樂王夀送建康樂音洛詔赦不誅以付苻宏苻宏去年來奔處之江州纂與其弟尚書永平矦師奴帥秦衆數萬走據杏城其餘王公百官皆沒於永永遂進據長子即皇帝位改元中興將以秦后楊氏為上夫人楊氏引劍刺永刺七亦翻為永所殺甲申海西公奕薨于吳年四十五燕寺人吳深據清河反寺音侍又如字燕主垂攻之不克後秦主萇還安定自上邽還安定也秦南安王登既克南安夷夏歸之者三萬餘户夏户雅翻遂進攻姚碩徳于秦州後秦主萇自往救之登與萇戰于胡奴阜胡奴阜在上邽西大破之斬首二萬餘級將軍啖青射萇中之射而亦翻中竹仲翻萇創重創初良翻走保上邽姚碩徳代之統衆燕趙王麟軍未至魏拓跋窟咄稍前逼魏王珪賀染干侵魏北部以應之魏衆驚擾北部大人叔孫普洛亡奔劉衛辰麟聞之遽遣安同等歸魏人知燕軍在近衆心少安少詩沼翻窟咄進屯髙栁髙栁縣漢屬代郡晉省酈道元曰髙栁在代中其山重巒疊巘霞舉雲髙其山隠隠而東出遼塞注又見前珪引兵與麟㑹擊之窟咄大敗奔劉衛辰衛辰殺之珪悉収其衆以代人庫狄干為北部大人魏書官氏志次南諸部有庫狄氏後為狄氏麟引兵還中山劉衛辰居朔方士馬甚盛後秦主萇以衛辰為大將軍大單于河西王幽州牧單音蟬西燕主永以衛辰為大將軍朔州牧十一月秦尚書寇遺奉勃海王懿濟北王昶自杏城奔南安濟子禮翻南安王登發喪行服諡秦主丕曰哀平皇帝登議立懿為主衆曰勃海王雖先帝之子然年在㓜冲未堪多難難乃旦翻今三虜窺覦三虜謂姚萇慕容垂慕容永也宜立長君長知兩翻非大王不可登乃為壇於隴東即皇帝位登字文髙堅之族孫也大赦改元太初置百官慕容柔慕容盛及盛弟㑹皆在長子太元九年柔等自長安得脱奔慕容冲冲死隨永東遷盛謂柔㑹曰主上已中興幽冀主上謂燕主垂東西未壹東謂燕主垂西謂燕主永吾屬居嫌疑之地為智為愚皆將不免不若以時東歸無為坐待魚肉也遂相與亡歸燕後嵗餘西燕主永悉誅燕主雋及燕主垂之子孫男女無遺史言慕容盛之智張大豫自西郡入臨洮掠民五千餘户保據俱城俱城在臨洮界十二月吕光自稱使持節侍中中外大都督督隴右河西諸軍事大將軍凉州牧酒泉公使疏吏翻秦主登立世祖神主于軍中秦主堅廟號世祖載以輜軿車四面有屏蔽者曰輜軿軿蒲眠翻建黄旗青葢以虎賁三百人衛之賁音奔凡所欲為必啟主而後行引兵五萬東擊後秦將士皆刻鉾鎧為死休字鉾頭牟鎧甲也鉾音牟言欲復讐必死乃休也楊正衡曰字林鉾古矛字每戰以劍矟為方圓大陣矟色角翻與槊同知有厚薄從中分配故人自為戰所向無前初長安之將敗也謂苻堅為慕容冲所困之時中壘將軍徐嵩屯騎校尉胡空各聚衆五千結壘自固既而受後秦官爵後秦主萇以王禮𦵏秦主堅于二壘之間及登至嵩空以衆降之登拜嵩雍州刺史空京兆尹降户江翻雍于用翻改𦵏堅以天子之禮乙酉燕主垂攻吳深壘拔之深單馬走吳深時據清河以叛燕垂進屯聊城之逢闗陂聊城縣漢屬東郡晉屬平原郡初燕太子洗馬温詳來奔以為濟北太守屯東阿東阿縣漢屬東郡晉屬濟北郡洗悉薦翻濟子禮翻燕主垂遣范陽王徳髙陽王隆攻之詳遣從弟攀守河南岸子楷守碻磝以拒之燕主垂以魏王珪為西單于封上谷王珪不受珪不受燕封其志不在小單音蟬資治通鑑卷一百六
