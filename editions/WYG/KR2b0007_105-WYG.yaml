  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百五宋司馬光撰胡三省音註晉紀二十七起昭陽恊洽盡閼逢涒灘凡二年烈宗孝武皇帝上之下太元八年春正月秦吕光發長安以鄯善王休宻䭾車師前部王彌窴為鄉導鄯上扇翻䭾唐何翻窴徒賢翻又唐見翻鄉讀曰嚮三月丁巳大赦夏五月桓冲帥衆十萬伐秦攻襄陽帥讀曰率遣前將軍劉波等攻沔北諸城沔彌兖翻輔國將軍楊亮攻蜀拔五城進攻涪城涪音浮鷹揚將軍郭銓攻武當六月冲别將攻萬嵗筑陽拔之萬嵗城名盖近筑陽筑陽縣漢屬南陽郡晉屬順陽郡春秋穀伯之國唐為襄州榖城縣師古曰筑音逐秦王堅遣征南將軍鉅鹿公叡冠軍將軍慕容垂等帥步騎五萬救襄陽冠古玩翻騎竒寄翻兖州刺史張崇救武當後將軍張蚝步兵校尉姚萇救涪城蚝七吏翻萇仲良翻叡軍於新野垂軍於鄧城鄧城縣屬襄陽郡蓋晉置也桓冲退屯沔南秋七月郭銓及冠軍將軍桓石䖍敗張崇於武當敗補邁翻掠二千戸以歸鉅鹿公叡遣慕容垂為前鋒進臨沔水垂夜命軍士人持十炬繫於樹枝光照數十里冲懼退還上明冲鎮上明見上卷二年張蚝出斜谷斜余遮翻谷音浴又古祿翻楊亮引兵還冲表其兄子石民領襄城太守戍夏口冲自求領江州刺史詔許之秦王堅下詔大舉入寇民每十丁遣一兵其良家子年二十已下有材勇者皆拜羽林郎又曰其以司馬昌明為尚書左僕射謝安為吏部尚書桓冲為侍中勢還不逺謂以勢言之克晉之期近在旦夕還師不逺也還音旋又如字可先為起第為于偽翻良家子至者三萬餘騎騎竒寄翻下同拜秦州主簿趙盛之為少年都統都統官名起于此少詩照翻下同是時朝臣皆不欲堅行朝直遥翻獨慕容垂姚萇及良家子勸之陽平公融言於堅曰鮮卑羌虜我之仇讐慕容垂鮮卑也姚萇羌也其國皆為秦所滅雖曰臣服其實仇讐常思風塵之變以逞其志所陳䇿畫何可從也良家少年皆富饒子弟不閑軍旅茍為謟諛之言以㑹陛下之意㑹㑹合也今陛下信而用之輕舉大事臣恐功既不成仍有後患悔無及也堅不聴八月戊午堅遣陽平公融督張蚝慕容垂等歩騎二十五萬為前鋒以兖州刺史姚萇為龍驤將軍督益梁州諸軍事堅謂萇曰昔朕以龍驤建業堅以龍驤將軍殺苻生得秦國驤思將翻未嘗輕以授人卿其勉之左將軍竇衝曰王者無戯言此不祥之徵也堅黙然慕容楷慕容紹言於慕容垂曰主上驕矜已甚叔父建中興之業在此行也垂曰然非汝誰與成之至此垂知堅必敗方與兄子明言之甲子堅發長安戎卒六十餘萬騎二十七萬旗鼓相望前後千里九月堅至項城涼州之兵始達咸陽蜀漢之兵方順流而下幽冀之兵至於彭城東西萬里水陸齊進運漕萬艘艘蘇遭翻陽平公融等兵三十萬先至潁口潁水入淮之口也地理志潁水出陽城縣陽乾山東下至蔡入淮詔以尚書僕射謝石為征虜將軍征討大都督以徐兖二州刺史謝𤣥為前鋒都督與輔國將軍謝琰西中郎將桓伊等衆共八萬拒之使龍驤將軍胡彬以水軍五千援夀陽琰安之子也是時秦兵既盛都下震恐謝𤣥入問計於謝安安夷然夷坦也平也言坦然無異平日也答曰已别有㫖既而寂然𤣥不敢復言乃令張𤣥重請復扶又翻重直用翻安遂命駕出逰山墅墅承與翻園廬也親朋畢集與𤣥圍棊賭墅安棊常劣於𤣥是日𤣥懼便為敵手而又不勝敵手謂下子爭行刼智筭相敵也𤣥意不在棊故不能勝安安遂逰陟至夜乃還還從宣翻又如字桓沖深以根本為憂遣精鋭三千入衛京師謝安固却之曰朝廷處分已定處昌吕翻分扶問翻兵甲無闕西藩宜留以為防沖對佐吏歎曰諸藩府參佐為佐吏謝安石有廟堂之量不閑將略將即亮翻今大敵垂至方遊談不暇遣諸不經事少年拒之衆又寡弱天下事已可知吾其左衽矣以琅邪王道子錄尚書六條事錄尚書六條事始於劉聰冬十月秦陽平公融等攻夀陽癸酉克之執平虜將軍徐元喜等融以其參軍河南郭褒為淮南太守淮南郡本治夀陽秦既得之以郭褒為太守慕容垂拔鄖城杜預曰江夏雲杜縣東南有鄖城鄖于分翻胡彬聞夀陽陷退保硖石水經注淮水東過夀春縣北右合肥水又北逕山峽中謂之峽石對岸山上結二城以防津要杜佑曰硖石今汝隂郡下蔡縣融進攻之秦衛將軍梁成等帥衆五萬屯于洛澗柵淮以遏東兵水經注洛澗上承苑馬塘水北厯秦墟下注淮謂之洛口帥讀曰率下同謝石謝𤣥等去洛澗二十五里而軍憚成不敢進胡彬糧盡潜遣使告石等曰今賊盛糧盡恐不復見大軍復扶又翻秦人獲之送於陽平公融融馳使白秦王堅曰賊少易擒但恐逃去宜速赴之使疏吏翻下同融持議以為晉不可伐今臨敵乃輕脱如此亦天奪其鍳也少詩沼翻易以䜴翻堅乃留大軍於項城引輕騎八千兼道就融於夀陽遣尚書朱序来説謝石等以為彊弱異勢不如速降三年堅執朱序于襄陽拜為度支尚書説輸芮翻降戸江翻序私謂石等曰若秦百萬之衆盡至誠難與為敵今乗諸軍未集宜速擊之若敗其前鋒敗捕邁翻則彼已奪氣可遂破也石聞堅在夀陽甚懼欲不戰以老秦師謝琰勸石從序言十一月謝𤣥遣廣陵相劉牢之帥精兵五千趣洛澗趣七喻翻未至十里梁成阻澗為陳以待之陳讀曰陣下同牢之直前渡水撃成大破之斬成及弋陽太守王詠曹魏分西陽蘄春置弋陽郡秦未能有其地也王詠領太守耳弋陽唐為光蘄黄三州之地又分兵斷其歸津斷丁管翻秦步騎崩潰爭赴淮水士卒死者萬五千人執秦揚州刺史王顯等盡收其器械軍實于是謝石等諸軍水陸繼進秦王堅與陽平公融登壽陽城望之見晉兵部陣嚴整又望八公山上草木皆以為晉兵八公山在今夀春縣北四里世傳漢淮南王安好神仙忽有八公皆鬚眉皓素詣門求見門者曰吾王好長生今先生無駐衰之術未敢以聞八公皆變成童遂立廟于山上或言今廟食于此山者乃右吳朱驕任被雲被雪八人皆淮南王之客世以八公為仙誕也顧謂融曰此亦勍敵何謂弱也勍渠京翻強也憮然始有懼色憮罔甫翻悵然失意貌秦兵逼肥水而陳晋兵不得渡謝𤣥遣使謂陽平公融曰君懸軍深入而置陳逼水此乃持久之計非欲速戰者也若移陳少却少詩沼翻下同使晉兵得渡以决勝負不亦善乎秦諸将皆曰我衆彼寡不如遏之使不得上上時掌翻可以萬全堅曰但引兵少却使之半渡我以鐵騎蹙而殺之蔑不勝矣融亦以為然遂麾兵使却秦兵遂退不可復止兩陳相向退者先敗此用兵之常勢也復扶又翻謝𤣥謝琰桓伊等引兵渡水撃之融馳騎略陳欲以帥退者帥讀曰率馬倒為晉兵所殺秦兵遂潰𤣥等乗勝追擊至于青岡青岡去今夀春縣三十里秦兵大敗自相蹈藉而死者蔽野塞川言敗兵自相蹈踐枕藉而死也藉慈夜翻塞悉則翻其走者聞風聲鶴唳皆以為晉兵且至晝夜不敢息草行露宿草行者涉草而行不敢由路露宿者宿於野次不敢入人家皆懼追兵也重以饑凍重直用翻死者什七八初秦兵少却朱序在陳後呼曰呼火故翻秦兵敗矣衆遂大奔序因與張天錫徐元喜皆来奔獲秦王堅所乗雲母車晉制雲母車以雲母飾犢車臣下不得乗以賜王公耳趙彦絟續古今注石虎皇后乗輦以純雲母代紗四望皆通徹復取夀陽執其淮南太守郭褒晉復取夀陽故秦所置太守見執堅中流矢中竹仲翻單騎走至淮北饑甚民有進壺飱豚髀者飱蘇昆翻熟食曰飱字林曰水澆飯也堅食之賜帛十匹綿十斤辭曰陛下厭苦安樂樂音洛自取危困臣為陛下子陛下為臣父安有子飼其父而求報乎弗顧而去飼祥吏翻堅謂張夫人曰吾今復何面目治天下乎復扶又翻治直之翻澘然流涕澘所姦翻流涕貌又所版翻所晏翻是時諸軍皆潰惟慕容垂所將三萬人獨全垂别撃鄖城不與肥水之戰且持軍嚴整故諸軍皆潰而垂軍獨全將即亮翻堅以千餘騎赴之世子寳言於垂曰家國傾覆天命人心皆歸至尊但時運未至故晦迹自藏耳今秦主兵敗委身于我是天借之便以復燕祚此時不可失也願不以意氣微恩忘社稷之重意氣㣲恩謂堅厚禮垂父子也垂曰汝言是也然彼以赤心投命於我若之何害之天茍棄之不患不亡不若保護其危以報徳徐俟其釁而圖之既不負宿心且可以義取天下慕容垂此言猶有君人之度奮威將軍慕容徳曰秦彊而并燕秦弱而圖之此為報仇雪恥非負宿心也兄奈何得而不取釋數萬之衆以授人乎垂曰我昔為太傅所不容置身無所逃死於秦見一百二卷海西公太和四年秦主以國士遇我恩禮備至後復為王猛所賣復扶又翻下尚復徳復同無以自明秦主獨能明之見太和五年此恩何可忘也若氐運必窮吾當懐集闗東以復先業耳闗西㑹非吾有也冠軍行參軍趙秋曰明公當紹復燕祚著於圖䜟冠古玩翻䜟楚譛翻今天時已至尚復何待若殺秦主據鄴都鼔行而西三秦亦非苻氏之有也垂親黨多勸垂殺堅垂皆不從悉以兵授堅平南將軍慕容暐屯鄖城聞堅敗棄其衆遁去至滎陽慕容徳復説暐起兵以復燕祚尚復徳復扶又翻説輸芮翻暐不從謝安得驛書知秦兵已敗時方與客圍棊攝書置牀上了無喜色攝收也圍棊如故客問之徐答曰小兒輩遂已破賊既罷還内過戸限不覺屐齒之折言其喜甚也史言安矯情鎮物人臣以安社稷為悦者也大敵壓境一戰而破之安得不喜乎屐齒之折亦非安之訾也丁亥謝石等歸建康得秦樂工䏻習舊聲于是宗廟始備金石之樂永嘉之亂伶官樂器皆沒於劉石江左初立宗廟以無雅樂及伶人省太樂并鼓吹令是後頗得登歌食舉之樂猶有未備太寧末明帝又訪阮孚等増益之咸和中成帝乃復置太樂官鳩集遺工而尚未有金石也及慕容雋平冉閔兵戈之際鄴下樂人頗亦有来者謝尚鎮夀陽採拾樂人以備太樂并制石磬雅樂始頗具而王猛平鄴慕容氏所得樂聲又入闗右今破苻堅獲其樂工楊蜀等閑習舊樂于是金石始備焉乙未以張天錫為散騎常侍散悉亶翻騎竒寄翻朱序為琅邪内史秦王堅收集離散比至洛陽比必寐翻衆十餘萬百官儀物軍容粗備粗坐五翻慕容農謂慕容垂曰尊不迫人於險尊謂其父垂也慕容令亦呼垂為尊蓋其父子間常稱也其義聲足以感動天地農聞祕記曰燕復興當在河陽燕于賢翻夫取果於未熟與自落不過晚旬日之間然其難易美惡相去逺矣易以豉翻垂心善其言行至澠池澠彌兖翻言于堅曰北鄙之民聞王師不利輕相扇動臣請奉詔書以鎮慰安集之因過謁陵廟垂欲因行自謁其祖父陵廟也堅許之權翼諌曰國兵新破四方皆有離心宜徵集名將置之京師以固根本鎮枝葉將即亮翻垂勇略過人世豪東夏頃以避禍而来其心豈止欲作冠軍而已哉夏戸雅翻冠古玩翻譬如養鷹飢則附人每聞風飊之起常有陵霄之志正宜謹其絛籠飊扶搖風也釋曰疾風自下而上曰飊音卑遥翻絛他刀翻絲䋲也所以紲鷹豈可解縦任其所欲哉堅曰卿言是也然朕已許之匹夫猶不食言孔安國曰食言者食盡其言偽不實况萬乗乎乗䋲證翻若天命有廢興固非智力所能移也翼曰陛下重小信而輕社稷臣見其往而不返闗東之亂自此始矣堅不聴遣將軍李蠻閔亮尹固帥衆三千送垂又遣驍騎將軍石越率精卒三千戍鄴驃騎將軍張蚝帥羽林五千戍并州鎮軍將軍毛當帥衆四千戍洛陽驍堅堯翻騎竒寄翻下同帥讀曰率下同驃匹妙翻蚝七吏翻權翼宻遣壯士邀垂於河橋南空倉中垂疑之自涼馬臺結草筏以渡水經注東郡白馬縣有涼城河水逕其北有神馬亭西去白馬津可二十許里實中層峙南北二百步東西五十許步今按神馬亭既在東郡白馬正對黎陽岸垂安得越滎洛而至此渡河乎此涼馬臺蓋在富平津橋之西也涼馬臺由昔人于河渚浴馬浴竟驅馬就髙納涼因名使典軍程同衣已衣乗已馬與僮僕趣河橋典軍葢王國官垂在燕為吳王時所置也同衣于既翻趣七喻翻伏兵發同馳馬獲免十二月秦王堅至長安哭陽平公而後入諡曰哀公大赦復死事者家復方目翻復其家之賦役也庚午大赦以謝石為尚書令進謝𤣥號前將軍固讓不受謝安壻王國寳坦之之子也安惡其為人惡烏路翻每抑而不用以為尚書郎國寳自以望族故事唯作吏部不為餘曹尚書郎晉制三十五曹置郎二十三人更相統攝及江左無直事右民屯田車部别兵都兵騎兵左右士運曹十曹郎康穆以後又無虞曹二千石二郎但有殿中祠部吏部儀曹三公比部金部倉部度支都官起部水部主客駕部庫部中兵外兵十八曹後又省主客起部水部餘十五曹而吏部最為清選固辭不拜由是怨安國寳従妹為㑹稽王道子妃帝與道子皆嗜酒狎昵邪諂從才用翻昵尼質翻國寳乃譛安于道子使離間之於帝間古莧翻安功名既盛而險詖求進之徒多毀短安帝由是稍疎忌之詖彼義翻初開酒禁漢建安中曹公嚴酒禁増民税米口五石咸和五年成帝始度百姓田取十分之一率畆税米三升哀帝即位減田租畆收二升太元二年帝除度田收租之制王公以下口租三斛唯蠲在役之身至是年又増税米口五石秦呂光行越流沙三百餘里自玉門出渡流沙西行至鄯善北行至車師又且未國在鄯善西其國之西北有流沙數百里夏日有熱風為行旅之患風之所至唯老駞預知之即嗔而聚立埋其口鼻於沙中人每以為候亦即將氈擁蔽鼻口其風迅駛斯須過盡若不防者必致危斃桑欽曰流沙地在張掖居延縣西北杜佑曰流沙在沙州敦煌郡西八十里酈道元曰弱水入流沙流沙與水流行也亦言出鍾山西行極崦嵫之山在西海郡北流沙又逕浮渚歴壑市之國又逕于鳥山之東朝雲國西歴崐山西南出于過瀛之山大荒山經曰西南海之外流沙出焉焉耆等諸國等皆降降戸江翻惟龜兹王帛純拒之龜兹音邱慈嬰城固守光進軍攻之秦王堅之入寇也以乞伏國仁為前將軍領先鋒騎騎竒寄翻㑹國仁叔父步頽反於隴西堅遣國仁還討之國仁代司繁鎮勇士見上卷元年步頽聞之大喜迎國仁於路國仁置酒大言曰苻氏疲民逞兵殆將亡矣吾當與諸君共建一方之業及堅敗國仁遂迫脇諸部有不従者撃而併之衆至十餘萬慕容垂至安陽安陽在鄴城西南遣叅軍田山修牋於長樂公丕樂音洛丕聞垂北来疑其欲為亂然猶身自迎之趙秋勸垂於座取丕因據鄴起兵垂不從丕謀襲撃垂侍郎天水姜讓諌曰晉制王國置侍郎二人垂反形未著而明公擅殺之非臣子之義不如待以上賓之禮嚴兵衛之宻表情狀聴敕而後圖之丕從之館垂於鄴西館音貫垂潜與燕之故臣謀復燕祚㑹丁零翟斌起兵叛秦丁零種落本居中山苻堅之滅燕也徙于新安斌仕秦為衛軍從事中郎斌音彬謀攻豫州牧平原公暉於洛陽秦王堅驛書使垂將兵討之將即亮翻石越言於丕曰王師新敗民心未安負罪亡匿之徒思亂者衆故丁零一唱旬日之中衆已數千此其驗也慕容垂燕之宿望有興復舊業之心今復資之以兵此為虎傅翼也今復扶又翻為于偽翻傅讀曰附丕曰垂在鄴如藉虎寢蛟藉慈夜翻常恐為肘腋之變腋音亦今逺之於外不猶愈乎逺于願翻且翟斌凶悖悖蒲内翻又蒲没翻必不肯為垂下使兩虎相斃吾從而制之此卞莊子之術也乃以羸兵二千及鎧仗之獘者給垂羸倫為翻鎧可亥翻又遣廣武將軍苻飛龍帥氐騎一千為垂之副帥讀曰率騎竒寄翻宻戒飛龍曰垂為三軍之帥卿為謀垂之將行矣勉之成都王潁使和演圖王浚殷浩使魏憬圖姚襄苻丕使苻飛龍圖慕容垂智略不足以濟其敗同一轍也帥所類翻將即亮翻垂請入鄴城拜廟燕都鄴故廟在鄴城丕弗許乃潜服而入亭吏禁之垂怒斬吏燒亭而去石越言於丕曰垂敢輕侮方鎮殺吏燒亭反形已露可因此除之丕曰淮南之敗垂侍衛乗輿乗䋲證翻此功不可忘也越曰垂尚不忠於燕安能盡忠於我失今不取必為後患丕不從越退告人曰公父子好為小仁不顧大計終當為人禽耳丕父子後卒如越之言好呼到翻垂留慕容農慕容楷慕容紹於鄴行至安陽之湯池閔亮李毗自鄴来以丕與苻飛龍所謀告垂幾事不宻則害成苻飛龍固不足以辦垂况其謀已泄邪垂因激怒其衆曰吾盡忠於苻氏而彼専欲圖我父子吾雖欲已得乎已止也乃託言兵少少詩沼翻停河内募兵旬日間有衆八千平原公暉遣使讓垂趣使進兵遣使疏吏翻趣讀曰促垂謂飛龍曰今宼賊不逺河内距新安洛陽止隔大河耳故云然當晝止夜行襲其不意飛龍以為然壬午夜垂遣世子寳將兵居前少子隆勒兵從已將即亮翻少詩照翻令氐兵五人為伍隂與寳約聞鼓聲前後合撃氐兵及飛龍盡殺之參佐家在西者皆遣還并以書遺秦王堅言所以殺飛龍之故蓋言丕使飛龍圖已故殺之也遺于季翻初垂從堅入鄴見一百二卷海西公太和五年以其子麟屢嘗告變於燕事見太和四年立殺其母然猶不忍殺麟置之外舍希得侍見見賢遍翻及殺苻飛龍麟屢進䇿畫啟發垂意垂意所欲為而思慮偶有所未及麟能迎其機言之故謂之啟發垂更竒之寵待與諸子均矣為後麟亂燕張本慕容鳳及燕故臣之子燕郡王騰遼西段延等段延蓋段國之種燕于賢翻聞翟斌起兵各帥部曲歸之帥讀曰率平原公暉使武平武矦毛當討斌慕容鳳曰鳳今將雪先王之恥燕之亡也鳳父桓死難事見一百二卷海西公太和五年請為將軍斬此氐奴為于偽翻乃擐甲直進擐音宦丁零之衆随之大敗秦兵敗補邁翻斬毛當遂進攻陵雲臺戍克之收萬餘人甲仗陵雲臺魏文帝所築在洛城西秦置戍焉癸未慕容垂濟河焚橋有衆三萬留遼東鮮卑可足渾譚集兵於河内之沙城言河内以别魏郡之沙城燕主皝后可足渾氏譚葢亦燕之戚黨也垂遣田山如鄴宻告慕容農等使起兵相應時日已暮農與慕容楷留宿鄴中慕容紹先出至蒲池蒲池在鄴城外慕容雋與羣臣宴處盜丕駿馬數百疋以待農楷甲申晦農楷將數十騎㣲服出鄴遂同奔列人列人縣漢屬鉅鹿郡魏晉屬廣平郡其地在鄴城東北魏收地形志魏郡臨漳縣有列人城又别有列人縣亦屬魏郡九年春正月乙酉朔秦長樂公丕大㑹賓客樂音洛請慕容農不得始覺有變遣人四出求之三日乃知其在列人已起兵矣慕容鳳王騰叚延皆勸翟斌奉慕容垂為盟主斌從之垂欲襲洛陽且未知斌之誠偽乃拒之曰吾来救豫州秦平原公暉以豫州牧鎮洛陽不来赴君君既建大事成享其福敗受其禍吾無預焉丙戌垂至洛陽平原公暉聞其殺苻飛龍閉門拒之翟斌復遣長史郭通往説垂復扶又翻説輸芮翻下同垂猶未許通曰將軍所以拒通者豈非以翟斌兄弟山野異類無竒才逺略必無所成故邪獨不念將軍今日憑之可以濟大業乎謂憑其衆可以成功也垂乃許之於是斌帥其衆来與垂㑹帥讀曰率下同勸垂稱尊號垂曰新興矦吾主也秦獲慕容暐封為新興矦當迎歸返正耳垂以洛陽四面受敵欲取鄴而據之乃引兵而東故扶餘王餘蔚為滎陽太守餘蔚即太和五年開鄴北門納秦兵者蔚音紆勿翻及昌黎鮮卑衛駒各率其衆降垂降戸江翻垂至滎陽羣下固請上尊號垂乃依晉中宗故事晉元帝廟號中宗上時掌翻稱大將軍大都督燕王承制行事晉元帝稱王承制見九十卷建武元年謂之統府羣下稱臣文表奏疏封拜官爵皆如王者以弟徳為車騎大將軍封范陽王騎竒寄翻兄子楷為征西大將軍封太原王燕本封徳為范陽王今復其故楷恪子也恪封太原王今令楷襲父爵翟斌為建義大將軍封河南王餘蔚為征東將軍統府左司馬封扶餘王衞駒為鷹揚將軍慕容鳳為建䇿將軍建䇿將軍亦慕容垂一時所署置也帥衆二十餘萬帥讀曰率自石門濟河長驅向鄴慕容農之奔列人也止於烏桓魯利家魯利本烏桓種而家於列人利為之置饌為于偽翻饌雛皖翻又雛戀翻饔也農笑而不食利謂其妻曰惡奴句絶惡奴蓋詈其妻之語郎貴人家貧無以饌之奈何妻曰郎有雄才大志今無故而至必將有異非為飲食来也為于偽翻君亟出逺望以備非常利從之農謂利曰吾欲集兵列人以圖興復卿䏻從我乎利曰死生唯郎是從今世俗多呼其主為郎主又呼其主之子為郎君農乃詣烏桓張驤説之曰驤思將翻説輸芮翻下同家王已舉大事翟斌等咸相推奉逺近響應故来相告耳驤再拜曰得舊主而奉之敢不盡死於是農驅列人居民為士卒斬桑榆為兵裂襜裳為旗襜昌占翻爾雅曰衣蔽前也郭璞曰衣蔽膝也使趙秋説屠各畢聰聰與屠各卜勝張延李白郭超及東夷餘和敕勃屠直於翻餘和敕勃葢二人易陽烏桓劉大易陽縣漢屬趙國魏晉屬陽平郡劉昫曰唐洛州臨洺縣古易陽縣也隋開皇六年更名各帥部衆數千赴之帥讀曰率農假張驤輔國將軍劉大安逺將軍魯利建威將軍農自將攻破館陶館陶縣漢屬魏郡魏晉屬陽平郡將即亮翻收其軍資器械遣蘭汗叚讃趙秋慕輿悕略取康臺牧馬數千匹悕香衣翻魏收地形志廣平郡平恩縣有康臺澤杜預曰不以道取曰略汗燕王垂之從舅讃聰之子也從才用翻於是步騎雲集衆至數萬驤等共推農為使持節都督河北諸軍事驃騎大將軍監統諸將使疏吏翻驃匹妙翻騎竒寄翻監工衘翻隨才部署上下肅然農以燕王垂未至不敢封賞將士趙秋曰軍無賞士不往言無賞以奨激之則士不往赴戰也今之来者皆欲建一時之功規萬世之利規圖也宜承制封拜以廣中興之基農従之於是赴者相繼垂聞而善之農間招庫傉官偉於上黨東引乞特歸於東阿北召光烈將軍平叡及叡兄汝陽太守㓜於燕國偉等皆應之間古莧翻遣間使招之也傉奴沃翻東阿縣漢屬東郡晉屬濟北郡唐屬濟州汝陽縣漢晉屬汝南郡後分為汝陽郡平㓜葢先嘗為汝陽太守時居燕國也偉等皆燕之舊臣故招之而應光烈將軍蓋亦前燕以授平叡又遣蘭汗攻頓丘克之頓丘縣漢屬東郡武帝㤗始二年分置頓丘郡農號令整肅軍無私掠言其軍不敢掠居民而私其物士女喜悦長樂公丕使石越將歩騎萬餘討之農曰越有智勇之名今不南拒大軍而来此是畏王而陵我也王謂慕容垂必不設備可以計取之衆請治列人城治直之翻下同農曰善用兵者結士以心不以異物異物猶言别物也今起義兵唯敵是求當以山河為城池何列人之足治也辛夘越至列人西農使趙秋及參軍綦母滕撃越前鋒破之越之氣已挫矣參軍太原趙謙言於農曰越甲仗雖精人心危駭易破也易以豉翻宜急撃之農曰彼甲在人我甲在心士心欲鬬則雖無甲胄而勇于赴戰故曰甲在心晝戰則士卒見其外貌而憚之不如待暮撃之可以必克令軍士嚴備以待毋得妄動越立栅自固農笑謂諸將曰越兵精士衆不乗初至之鋭以撃我方更立柵吾知其無䏻為也向暮農鼔譟出陳於城西陳讀曰陣牙門劉木請先攻越柵農笑曰凡人見美食誰不欲之何得獨請然汝猛鋭可嘉當以先鋒惠汝木乃帥壯士四百騰栅而入秦兵披靡帥讀曰率下同披普彼翻農督大衆随之大敗秦兵斬越送首於垂敗補邁翻越與毛當皆秦之驍將也驍堅堯翻將即亮翻故秦王堅使助二子鎮守既而相繼敗沒人情騷動騷愁也擾也所在盜賊羣起庚戌燕王垂至鄴改秦建元二十年為燕元年服色朝儀皆如舊章朝直遥翻以前岷山公庫傉官偉為左長史前尚書段崇為右長史滎陽鄭豁等為従事中郎凡帶前字者皆前燕所授官也慕容農引兵㑹垂於鄴垂因其所稱之官而授之即張驤等所推之官也立世子寳為太子封從弟拔等十七人及甥宇文輸舅子蘭審皆為王從才用翻其餘宗族及功臣封公者三十七人矦伯子男者八十九人可足渾譚集兵得二萬餘人攻野王拔之垂使譚集兵於河内之沙城遂因而攻拔野王引兵㑹攻鄴平㓜及其弟叡規亦帥衆數萬㑹垂於鄴長樂公丕使姜讓誚讓燕王垂且説之曰過而䏻改今猶未晚也誚才笑翻説輸芮翻垂曰孤受主上不世之恩故欲安全長樂公使盡衆赴京師京師謂長安也然後修復國家之業與秦永為鄰好好呼到翻何故闇於機運不以鄴城見歸若迷而不復當窮極兵勢恐單馬求生亦不可得也讓厲色責之曰將軍不容於家國投命聖朝朝直遥翻燕之尺土將軍豈有分乎分扶問翻主上與將軍風殊類别言氐處闗西鮮卑在東北既不同風族類又别也一見傾心親如宗戚寵踰勲舊自古君臣際遇有如是之厚者乎一旦因王師小敗遽有異圖長樂公主上元子受分陕之任陕失冉翻寧可束手輸將軍以百城之地乎將軍欲裂冠毀冕左傳晉率隂戎伐潁景王使詹桓伯辭於晉曰我在伯父猶衣服之有冠冕木水之有本原民人之有謀主也伯父若裂冠毀冕拔本塞原専棄謀主雖戎狄其何有余一人自可極其兵勢奚更云云但惜將軍以七十之年懸首白旗武王斬紂首懸於太白之旗髙世之忠更為逆鬼耳垂黙然姜譲之辭直垂心内愧故黙然無以答左右請殺之垂曰彼各為其主耳何罪禮而歸之遺丕書及上秦王堅表陳述利害請送丕歸長安堅及丕怒復書切責之為于偽翻遺于季翻上時掌翻鷹揚將軍劉牢之攻秦譙城拔之桓冲遣上庸太守郭寳攻秦魏興上庸新城三郡拔之將軍楊佺期進據成固撃秦梁州刺史潘猛走之佺期亮之子也楊亮見上卷太元二年壬子燕王垂攻鄴拔其外郭長樂公丕退守中城闗東六州郡縣多送任請降於燕降戸江翻癸丑垂以陳留王紹行冀州刺史屯廣阿廣阿縣前漢屬鉅鹿郡後漢併入鉅鹿縣有廣阿澤在鉅鹿縣界即大陸澤也豐城宣穆公桓沖聞謝𤣥等有功自以失言謂去年吾其左衽之言也慙恨成疾二月辛巳卒朝議欲以謝𤣥為荆江二州刺史朝直遥翻謝安自以父子名位太盛又懼桓氏失職怨望乃以梁郡太守桓石民為荆州刺史河東太守桓石䖍為豫州刺史豫州刺史桓伊為江州刺史燕王垂引丁零烏桓之衆二十餘萬為飛梯地道以攻鄴不拔乃築長圍守之分處老弱於肥鄉晉志肥郷縣屬廣平郡魏收曰天平初併入魏郡臨漳縣隋復分置肥鄉縣唐屬洺州處昌呂翻築新興城以置輜重重直用翻秦征東府官屬疑參軍髙泰燕之舊臣有貳心苻丕為征東大將軍髙泰先仕燕慕容垂以為從事中郎泰懼與同郡虞曹従事吳韶逃歸勃海秦征東府置虞曹從事掌所部山澤泰與韶皆勃海人也韶曰燕軍近在肥鄉宜従之泰曰吾以避禍耳去一君事一君吾所不為也申紹見而歎曰去就以道可謂君子矣燕范陽王徳撃秦枋頭取之置戍而還還音旋又讀如字東胡王晏據館陶為鄴中聲援鮮卑烏桓及郡縣民據塢壁不從燕者尚衆燕王垂遣太原王楷與鎮南將軍陳留王紹討之楷謂紹曰鮮卑烏桓及冀州之民本皆燕臣今大業始爾人心未洽所以小異惟宜綏之以徳不可震之以威吾當止一處為軍聲之本汝巡撫民夷示以大義彼必當聴從楷乃屯於辟陽地理風俗記曰廣川西南六十里有辟陽亭故縣也漢高帝封審食其為矦國魏收地形志長樂郡信都縣有辟陽城紹帥騎數百往説王晏為陳禍福帥讀曰率説輸芮翻為于偽翻晏隨紹詣楷降于是鮮卑烏桓及塢民降者數十萬口降戸江翻楷留其老弱置守宰以撫之發其丁壯十餘萬與王晏詣鄴垂大悦曰汝兄弟才兼文武足以繼先王矣言足以繼慕容恪也三月以衛將軍謝安為太保秦北地長史慕容泓聞燕王垂攻鄴亡奔關東收集鮮卑衆至數千還屯華隂敗秦將軍強永華戸化翻敗補邁翻强其兩翻其衆遂盛自稱都督陕西諸軍事大將軍雍州牧濟北王陕式冉翻雍于用翻濟子禮翻推垂為丞相都督陕東諸軍事領大司馬冀州牧吳王秦王堅謂權翼曰不用卿言謂不用翼之言而遣慕容垂也使鮮卑至此闗東之地吾不復與之爭復扶又翻將若泓何乃以廣平公熙為雍州刺史鎮蒲阪阪音反徵雍州牧鉅鹿公叡為都督中外諸軍事衛大將軍錄尚書事配兵五萬以左將軍竇衝為長史龍驤將軍姚萇為司馬以討泓驤思將翻平陽太守慕容沖亦起兵于平陽有衆二萬進攻蒲坂堅使竇衝討之庫傉官偉帥營部數萬至鄴燕王垂封偉為安定王秦冀州刺史阜城侯定守信都髙城男紹在其國髙城縣屬勃海郡唐為滄州鹽山縣髙邑侯亮重合侯謨守常山重直龍翻固安侯鑒守中山燕王垂遣前將軍樂浪王温督諸軍攻信都不克樂浪音洛琅夏四月丙辰遣撫軍大將軍麟益兵助之定鑒秦王堅之従叔紹謨從弟亮従子也従才用翻温燕王垂之弟子也慕容泓聞秦兵且至懼帥衆將奔闗東帥讀曰率下同秦鉅鹿愍公叡麄猛輕敵欲馳兵邀之姚萇諫曰鮮卑皆有思歸之志故起而為亂宜驅令出關不可遏也夫執鼷䑕之尾猶能反噬於人鼷䑕一名甘口䑕食物不痛爾雅曰有螫毒者鼷音奚彼自知困窮致死於我萬一失利悔將何及但可鳴鼓随之彼將奔敗不暇矣使苻叡䏻用姚萇之言慕容泓必東奔慕容沖敗而無所歸必亦就禽矣叡弗従戰于華澤華澤即華隂之澤也華戸化翻叡兵敗為泓所殺萇遣龍驤長史趙都參軍姜協詣秦王堅謝罪驤思將翻堅怒殺之萇懼奔渭北馬牧馬牧牧馬之地猶漢之牧苑也於是天水尹緯尹詳南安龎演等龎皮江翻糾扇羌豪帥其户口歸萇者五萬餘家帥讀曰率推萇為盟主萇自稱大將軍大單于萬年秦王大赦改元白雀通鑑目錄年經國緯自此以後姚萇繋之後秦單音蟬以尹詳龎演為左右長史南安姚晃及尹緯為左右司馬天水狄伯支等為従事中郎羌訓等為掾屬王據等為參軍王欽盧姚方成等為將帥掾以絹翻將即亮翻帥所類翻秦竇衝撃慕容沖於河東大破之沖帥鮮卑騎八千奔慕容泓泓衆至十餘萬遣使謂秦王堅曰吳王已定闗東可速資備大駕奉送家兄皇帝暐泓之兄也泓當帥闗中燕人翼衛乗輿還返鄴都乗䋲證翻還音旋又如字與秦以虎牢為界永為鄰好好呼到翻堅大怒召慕容暐責之曰今泓書如此卿欲去者朕當相資卿之宗族可謂人面獸心不可以國士期也暐叩頭流血涕泣陳謝堅久之曰此自三豎所謂非卿之過三豎謂垂泓沖復其位待之如初命暐以書招諭泓沖及垂暐宻遣使謂泓曰吾籠中之人必無還理且燕室之罪人也暐不能保燕之社稷故自謂為罪人不足復顧復扶又翻汝勉建大業以吳王為相國中山王為太宰領大司馬汝可為大將軍領司徒承制封拜聴吾死問汝便即尊位泓于是進向長安改元燕興燕王垂以鄴城猶固㑹僚佐議之右司馬封衡請引漳水灌之用曹操攻鄴故智也從之垂行圍行下孟翻因飲於華林園洛都鄴都皆有華林園鄴之華林則魏武所築也秦人宻出兵掩之矢下如雨垂幾不得出㡬居依翻冠軍大將軍隆將騎衝之垂僅而得免將即亮翻騎竒寄翻竟陵太守趙統攻襄陽秦荆州刺史都貴奔魯陽五月秦洛州刺史張五虎據豐陽来降降戸江翻梁州刺史楊亮帥衆五萬伐蜀帥讀曰率遣巴西太守費統將水陸兵三萬為前鋒費扶瑞翻將即亮翻亮屯巴郡秦益州刺史王廣遣巴西太守康回等拒之姓譜西胡自有康姓秦苻定苻紹皆降於燕定以信都降紹以髙城降降户江翻下同燕慕容麟引兵西攻常山苻謨守常山後秦王萇進屯北地姚萇書後秦以别於苻秦也秦華隂北地新平安定羌胡降之者十餘萬六月癸丑朔崇徳太后禇氏崩秦王堅自帥歩騎二萬以撃後秦軍於趙氏塢據晉書載記趙氏塢在北地帥讀曰率騎竒寄翻使護軍將軍楊璧等分道攻之後秦兵屢敗斬後秦王萇之弟鎮軍將軍尹買後秦軍中無井秦人塞安公谷堰同官水以困之安公谷同官水皆在今耀州界魏收地形志北地郡有銅官縣真君七年置杜佑曰銅官本漢祋祤縣地晉為頻陽苻秦於祋祤北銅官川置銅官護軍後魏太武罷護軍置銅官縣後周武帝移于今所隋以後唯作同官塞悉則翻後秦人恟懼有渴死者恟許拱翻㑹天大雨後秦營中水三尺繞營百步之外寸餘而已後秦軍復振復扶又翻秦王堅歎曰天亦佑賊乎天不助秦不可復支矣慕容泓謀臣髙葢等以泓徳望不如慕容沖且持法苛峻乃殺泓立沖為皇太弟承制行事置百官以蓋為尚書令後秦王萇遣子嵩為質於沖以請和欲連兵以斃秦且畏沖兵之彊也質音致將軍劉春攻魯陽都貴奔還長安後秦王萇帥衆七萬撃秦秦王堅遣楊璧等拒之為萇所敗敗補邁翻獲楊璧及右將軍徐成鎮軍將軍毛盛等將吏數十人萇皆禮而遣之燕慕容麟拔常山秦苻亮苻謨皆降降户江翻麟進圍中山秋七月克之執苻鑒冀州皆為燕有惟苻丕守鄴而已麟威聲大振留屯中山秦幽州刺史王永平州刺史苻沖帥二州之衆以撃燕帥讀曰率燕王垂遣平朔將軍平規撃永此平規别是一平規平幼之弟非與苻洛同反之平規也永遣昌黎太守宋敞逆戰於范陽敞兵敗規進據薊南薊音計秦平原公暉帥洛陽陕城之衆七萬歸於長安陕失冉翻秦王堅聞慕容沖去長安浸近乃引兵歸歸自北地趙氏塢使沖不逼長安堅尚與萇相持勝負之勢未有所定也沖兵既逼堅不容不還長安萇得收嶺北以為資堅沖血戰而萇伺其敝堅死而鮮卑東出萇坐而取闗中真所謂鷸蚌相持漁人之利也遣撫軍大將軍方戍驪山驪力知翻拜平原公暉為都督中外諸軍事車騎大將軍錄尚書事配兵五萬以拒沖沖與暉戰于鄭西大破之堅又遣前將軍姜宇與少子河間公琳帥衆三萬拒沖於灞上少詩照翻琳宇皆敗死沖遂據阿房城即秦之阿房宮城秦康回兵數敗數所角翻退還成都梓潼太守壘襲以涪城来降此晉西師之捷姓譜曰後趙錄有壘澄本姓裴氏荆州刺史桓石民據魯陽遣河南太守髙茂北戍洛陽此晉自襄沔北向之師也己酉𦵏康獻皇后於崇平陵燕翟斌恃功驕縦邀求無厭斌音彬厭於鹽翻又以鄴城久不下潜有貳心太子寳請除之燕王垂曰河南之盟不可負也斌引兵㑹垂於洛陽垂與之盟盖在河南縣若其為難難乃旦翻罪由於斌今事未有形而殺之人必謂我忌憚其功能吾方收攬豪傑以隆大業不可示人以狹失天下之望也藉彼有謀吾以智防之無能為也范陽王徳陳留王紹驃騎大將軍農皆曰翟斌兄弟恃功而驕必為國患垂曰驕則速敗焉能為患焉于乾翻何也彼有大功當聴其自斃耳禮遇彌重斌諷丁零及其黨請斌為尚書令垂曰翟王之功宜居上輔但臺既未建此官不可遽置耳斌怒宻與前秦長樂公丕通謀通鑑凡苻秦事書曰秦此前字衍使丁零決隄潰水燕引漳水以灌鄴故斌欲決隄以潰之事覺垂殺斌及其弟檀敏餘皆赦之斌兄子真夜將營衆北奔邯鄲將即亮翻邯鄲音寒丹引兵還向鄴圍欲與丕内外相應太子寳與冠軍大將軍隆撃破之冠古玩翻真還走邯鄲走音奏太原王楷陳留王紹言於垂曰丁零非有大志但寵過為亂耳今急之則屯聚為寇緩之則自散散而撃之無不克矣垂從之龜兹王帛純窘急呂光自去年進軍攻龜兹龜兹音丘慈窘渠隕翻重賂獪胡以求救獪胡盖又在龜兹之西楊正衡曰獪古邁字獪胡王遣其弟呐龍侯將馗帥騎二十餘萬呐龍一人馗又一人侯將官稱也漢時西域諸國各有輔國侯安國侯左右將其後盖併矦將為一官呐女劣翻又女鬱翻將即亮翻馗渠追翻并引温宿尉頭等諸國兵合七十餘萬以救龜兹秦吕光與戰於城西大破之帛純出走王矦降者三十餘國降戸江翻光入其城城如長安市邑宮室甚盛光撫寧西域威恩甚著逺方諸國前世所不能服者皆来歸附上漢所賜節傳上時掌翻傳張戀翻光皆表而易之立帛純弟震為龜兹王八月翟真自邯鄲北走燕王垂遣太原王楷驃騎大將軍農帥騎追之及於下邑楷欲戰農曰士卒饑倦且視賊營不見丁壯殆有他伏楷不従進戰燕兵大敗真北趨中山屯於承營羸師示弱者必有伏兵衆所通知也然而往往堕其中而不自覺以致覆軍者多矣趨七諭翻下同鄴中芻糧俱盡削松木以飼馬飼祥史翻燕王垂謂諸將曰苻丕窮寇必無降理降户江翻不如退屯新城即肥鄉之新興城也開丕西歸之路以謝秦王疇昔之恩且為討翟真之計丙寅夜垂解圍趨新城遣慕容農狗清河平原徵督租賦農明立約束均適有無軍令嚴整無所侵暴由是榖帛屬路軍資豐給屬之欲翻戊寅南昌文穆公郗愔薨郗丑之翻愔挹淫翻太保安奏請乗苻氏傾敗開拓中原以徐兗二州刺史謝𤣥為前鋒都督帥豫州刺史桓石䖍伐秦帥讀曰率𤣥至下邳秦徐州刺史趙遷棄彭城走𤣥進據彭城此晉自淮泗北向之師也秦王堅聞呂光平西域以光為都督玉門以西諸軍事西域校尉道絶不通秦幽州刺史王永求救於振威将軍劉庫仁先是秦盖授劉庫仁振武将軍庫仁遣其妻兄公孫希帥騎三千救之大破平規於薊南乗勝長驅進據唐城中山郡之唐縣城也九月謝𤣥使彭城内史劉牢之攻秦兖州刺史張崇辛夘崇棄鄄城奔燕牢之據鄄城鄄古掾翻河南城堡皆来歸附太保安上疏自求北征加安都督揚江等十五州諸軍事加黄鉞十五州蓋揚徐南徐兖南兖豫南豫江青冀幽并司荆雍也慕容沖進逼長安秦王堅登城觀之歎曰此虜何従出哉大呼責沖曰呼火故翻奴何苦来送死沖曰奴厭奴苦欲取汝為代耳沖少有寵於堅沖少有龍陽色得幸於堅少詩照翻堅遣使以錦袍稱詔遺之遺於季翻沖遣詹事稱皇太弟令答之曰孤今心在天下豈顧一袍小恵茍能知命君臣束手早送皇帝皇帝謂慕容暐自當寛貸苻氏以酬曩好好呼到翻堅大怒曰吾不用王㬌略陽平公之言事見一百三卷寧康三年及上卷大元七年使白虜敢至於此載記曰秦人率謂鮮卑為白虜冬十月辛亥朔日有食之乙丑大赦謝𤣥遣隂陵太守髙素攻秦青州刺史苻朗隂陵縣漢屬九江郡晉書謝𤣥傳作淮陵淮陵縣前漢屬臨淮郡後漢屬下邳郡晉復屬臨淮郡惠帝元康七年分置淮陵郡隂當作淮軍至琅邪朗来降朗堅之従子也降戸江翻従才用翻翟真在承營與公孫希宋敞遥相首尾公孫希劉庫仁所遣宋敞王永所遣長樂公丕遣宦者冗從僕射清河光祚姓譜光姓燕人田光之後秦末子孫避地以光為氏冗而隴翻従才用翻将兵數百赴中山與真相結又遣陽平太守邵興將數千騎招集冀州故郡縣與祚期㑹襄國是時燕軍疲弊秦勢復振復扶又翻冀州郡縣皆觀望成敗趙郡人趙粟等起兵柏鄉以應興魏收地形志南趙郡柏人縣有柏鄉城九域志曰柏鄉故城春秋時晉鄗邑五代志隋文帝開皇十六年置柏鄉縣屬趙郡燕王垂遣冠軍大將軍隆龍驤将軍張崇将兵邀擊興命驃騎大將軍農自清河引兵㑹之冠古玩翻驤思将翻驃匹妙翻騎竒寄翻隆與興戰于襄國大破之興走至廣阿遇慕容農執之光祚聞之循西山走歸鄴隆遂撃趙粟等皆破之冀州郡縣復從燕復扶又翻劉庫仁聞公孫希已破平規欲大舉兵以救長樂公丕發鴈門上谷代郡兵屯繁畤畤音止燕太子太保慕輿句之子文零陵公慕輿䖍之子常慕輿句見九十八卷穆帝永和六年慕輿䖍見一百一卷哀帝興寧三年句音鉤時在庫仁所知三郡兵不樂逺征樂音洛因作亂夜攻庫仁殺之竊其駿馬奔燕公孫希之衆聞亂自潰希奔翟真庫仁弟頭眷代領庫仁部衆秦長樂公丕遣光祚及參軍封孚召驃騎将軍張蚝并州刺史王騰於晉陽以自救蚝騰以衆少不能赴秦以鄧羌張蚝為萬人敵是時鄧羌死矣張蚝卒不䏻救秦之亡是知徒勇而無謀者無益于成敗之數也蚝七吏翻丕進退路窮謀於僚佐司馬楊膺請自歸於晉丕未許㑹謝𤣥遣龍驤將軍劉牢之等據碻磝碻磝城濟北郡治所沿河要地也碻丘交翻磝牛交翻楊正衡曰碻口勞翻杜佑曰碻口交翻磝音敖濟陽太守郭滿據滑臺沈約曰晉恵帝分陳留為濟陽國滑臺漢之白馬唐之滑州也宋南渡後遣范成大北使時河已南徙滑州及白馬縣皆在河北古滑州已淪于河中矣剰水在濬州西南積水若河對濬州城即黎陽山濟子禮翻将軍顔肱劉襲軍於河北河北滑臺之北岸也丕遣将軍桑據屯黎陽以拒之劉襲夜襲據走之遂克黎陽丕懼乃遣従弟就與參軍焦逵請救於𤣥従才用翻致書稱欲假塗求糧西赴國難難乃旦翻須援軍既接以鄴與之若西路不通長安陷沒請帥所領保守鄴城帥讀曰率逵與參軍姜讓宻謂膺曰今喪敗如此喪息浪翻長安阻絶存亡不可知屈節竭誠以求糧援猶懼不獲而公豪氣不除方設兩端事必無成宜正書為表許以王師之至當致身南歸如其不従可逼縛與之膺自以力能制丕楊膺丕之妃兄故自以為力能制丕乃改書而遣之謝𤣥遣晉陵太守滕恬之渡河守黎陽恬之修之曽孫也滕修為吳将孫皓之亡修歸晉朝廷以兖青司豫既平加𤣥都督徐兖青司冀幽并七州諸軍事後秦王萇聞慕容沖攻長安㑹羣僚議進止皆曰大王宜先取長安建立根本然後經營四方萇曰不然燕人因其衆有思歸之心以起兵若得其志必不久留闗中吾當移屯嶺北嶺北謂九􅉄之北凡新平北地安定之地皆是也廣收資實以待秦亡燕去然後拱手取之耳乃留其長子興守北地長知兩翻使寧北将軍姚穆守同官川自将其衆攻新平將即亮翻初新平人殺其郡將秦王堅缺其城角以恥之石虎之末清河崔恱為新平相為郡人所殺恱子液仕堅為尚書郎自表父仇不同天地請還冀州堅愍之禁錮新平人缺其城角以恥之将即亮翻新平民望深以為病民望郡之賢豪為一郡所宗嚮者欲立忠義以雪之及後秦王萇至新平新平太守南安茍輔欲降之茍輔氐也秦之外威降戸江翻下同郡人遼西太守馮傑蓮勺令馮羽尚書郎趙義汶山太守馮苗諌曰昔田單以一城存齊傑等皆新平人太康地志曰汶山郡漢武帝立孝宣地節三年合蜀郡劉蜀又立郡蓮音輦汶讀曰岷田單事見四卷周赧王三十六年今秦之州鎮猶連城過百奈何遽為叛臣乎輔喜曰此吾志也但恐久而無救郡人横被無辜横戸孟翻諸君能爾吾豈顧生哉於是憑城固守後秦為土山地道輔亦於内為之或戰地下或戰山上後秦之衆死者萬餘人輔詐降以誘萇萇将入城覺之而返輔伏兵邀撃幾獲之幾巨依翻又殺萬餘人隴西處士王嘉隠居倒虎山水經注倒虎山在新豐縣南處昌呂翻有異術䏻知未然秦人神之秦王堅後秦王萇及慕容沖皆遣使迎之十一月嘉入長安衆聞之以為堅有福故聖人助之三輔堡壁及四山氐羌歸堅者四萬餘人堅置嘉及沙門道安於外殿動静咨之燕慕容農自信都西撃丁零翟遼于魯口破之遼退屯無極農屯藁城以逼之無極縣漢屬中山晉省後魏復置無極縣唐末為祁州治所藁城縣前漢屬真定後漢屬鉅鹿晉省今所屯葢故縣城也唐復置藁城縣屬恒州遼真之従兄也従才用翻鮮卑在長安城中者猶千餘人慕容紹之兄肅與慕容暐隂謀結鮮卑為亂十二月暐白堅以其子新昏請堅幸其家置酒欲伏兵殺之堅許之㑹天大雨不果往事覺堅召暐及肅肅曰事必洩矣入則俱死今城内已嚴已嚴者謂鮮卑之衆也不如殺使者馳出既得出門大衆便集暐不従遂俱入堅曰吾相待何如而起此意暐飾辭以對肅曰家國事重何論意氣意氣謂堅相待之厚堅先殺肅乃殺暐及其宗族城内鮮卑無少長男女皆殺之少詩照翻長知兩翻燕王垂幼子柔養於宦者宋牙家為牙子故得不坐與太子寳之子盛乗間得出奔慕容沖為後慕容盛等自長子歸燕張本間古莧翻燕慕容麟慕容農合兵襲翟遼大破之遼單騎奔翟真燕王垂以秦長樂公丕猶據鄴不去乃更引兵圍鄴開其西走之路垂志在得鄴故開其走路所謂圍城為之缺也焦逵見謝𤣥𤣥欲徵丕任子然後出兵逵固陳丕欵誠并述楊膺之意𤣥乃遣劉牢之滕恬之等帥衆二萬救鄴帥讀曰率丕告饑𤣥水陸運米二千斛以饋之秦梁州刺史潘猛棄漢中奔長安梁州之地自此復歸于晉資治通鑑卷一百五
