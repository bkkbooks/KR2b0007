body:
  text: 資治通鑑卷七十三宋司馬光撰胡三省音註魏紀五起旃䝉單閼盡彊圉大荒落凡三年烈祖明皇帝中之下青龍三年春正月戊子以大將軍司馬懿為太尉丁巳皇太后郭氏殂帝數問甄后死狀於太后甄后死見六十五卷文帝之黄初年數所角翻甄之人翻由是太后以憂殂漢楊儀既殺魏延事見上卷上年自以為有大功宜代諸葛亮秉政而亮平生宻指以儀狷狹宻指蓋亮宻以語諸僚佐特儀不知耳狷吉掾翻意在蔣琬儀至成都拜中軍師無所統領從容而已從千容翻初儀事昭烈帝為尚書琬時為尚書郎後雖俱為丞相參軍長史儀每從行當其勞劇自謂年宦先琬才能踰之先悉薦翻於是怨憤形于聲色歎咤之音發於五内咤叱稼翻噴也叱怒也五内五藏之内也時人畏其言語不節莫敢從也惟後軍師費禕往慰省之費父沸翻省悉景翻儀對禕恨望前後云云云云師古曰猶言如此如此也又語禕曰往者丞相亡沒之際吾若舉軍以就魏氏處世寧當落度如此邪語牛倨翻處昌吕翻度徒洛翻落度失意也令人追悔不可復及復扶又翻下同禕宻表其言漢主廢儀為民徙漢嘉郡漢嘉縣故青衣也漢順帝陽嘉二年改為漢嘉屬蜀郡屬國都尉蜀郡屬國安帝延光元年所置蜀分為漢嘉郡儀至徙所復上書誹謗辭指激切遂下郡收儀上時掌翻下遐稼翻儀自殺三月庚寅葬文德皇后文德郭后也郭后諡曰德甄后諡曰昭夏四月漢主以蔣琬為大將軍録尚書事費禕代琬為尚書令帝好土功好呼到翻既作許昌宫事見上卷太和六年又治洛陽宫諸葛亮死帝乃大興宫室晉士燮所謂釋楚為外懼者此也治直之翻起昭陽太極殿水經注明帝上法太極於洛陽南宫起太極殿即漢崇德殿之故處築總章觀髙十餘丈舜有總章之訪相傳以為總章即明堂也觀闕也總章觀蓋在太極殿前觀古玩翻髙居傲翻力役不已農桑失業司空陳羣上疏曰昔禹承唐虞之盛猶卑宫室而惡衣服况今喪亂之後人民至少喪息浪翻少詩沼翻比漢文景之時不過漢一大郡漢自秦項之争民死於兵者多矣雖文景與民休息户口蕃息重以武帝窮奢極欲又減其半平帝元始之初民户一千三百二十三萬三千六百一十二以班志考之汝南一郡户四十六萬一千五百八十七光武興於南陽至永和元年户五十餘萬三國虎爭人衆之損萬有一存景元四年與蜀通計民户九十四萬三千二百四十三耳當此之時謂不過漢文景時一大郡非虚語也加以邊境有事將士勞苦將即亮翻若有水旱之患國家之深憂也昔劉備自成都至白水多作𫝊舍典略曰備鎮成都拔魏延督漢中於是起館舍築亭障從成都至白水闗四百餘區𫝊株戀翻興費人役太祖知其疲民也今中國勞力亦吳蜀之所願此安危之機也惟陛下慮之帝荅曰王業宫室亦宜並立滅賊之後但當罷守禦耳豈可復興役邪復扶又翻下同是固君之職蕭何之大略也此指蕭何治未央宫事為言羣曰昔漢祖惟與項羽争天下羽已滅宫室燒焚是以蕭何建武庫太倉皆是要急然髙祖猶非其壯麗羣因帝蕭何之言以陳善閉邪蕭何事見十一卷髙帝七年今二虜未平誠不宜與古同也夫人之所欲莫不有辭况乃天王莫之敢違前欲壊武庫謂不可不壊也後欲置之謂不可不置也此皆指帝拒諫實事壊音怪若必作之固非臣下辭言所屈若少留神少詩沼翻下同卓然回意亦非臣下之所及也漢明帝欲起德陽殿鍾離意諫即用其言後乃復作之殿成謂羣臣曰鍾離尚書在不得成此殿也夫王者豈憚一人蓋為百姓也為于偽翻下同今臣曽不能少凝聖聽凝定也停也言帝不為之留聽也不及意逺矣帝乃為之少有減省帝耽于内寵婦官秩石擬百官之數西漢婦官十四等秩石視内外百官之數魏武建國始命王后其下五等曰夫人昭儀倢伃容華美人文帝増貴嬪淑媛脩容順成良人明帝増淑妃昭華脩儀除順成官太和中始復命夫人登其位於淑妃之上自夫人以下爵凡十二等貴嬪夫人位次皇后爵無所視淑妃位視相國爵比諸侯王淑媛位視御史大夫爵比縣公昭儀比縣侯昭華比鄉侯脩容比亭侯脩儀比闗内侯倢伃比中二千石容華視真二千石美人視比二千石良人視千石自貴人以下至掖庭灑掃凡數千人灑所賣翻掃素報翻又並如字選女子知書可付信者六人以為女尚書使典省外奏事處當畫可漢東都之末宫中有女尚書處當奏事有不合上意區處其當而下之也畫可畫從其所奏省悉景翻處昌吕翻廷尉髙柔上疏曰昔漢文惜十家之資不營小臺之娛去病慮匈奴之害不遑治第之事冶直之翻况今所損者非惟百金之費所憂者非徒北狄之患乎可粗成見所營立以充朝宴之儀粗坐五翻見賢遍翻朝直遥翻訖罷作者使得就農二方平定復可徐興周禮天子后妃以下百二十人王立后三夫人九嬪二十七世婦八十一御妻是為百二十人嬪嬙之儀既已盛矣竊聞後庭之數或復過之嬪毘賔翻嬙慈良翻復扶又翻下同聖嗣不昌殆能由此臣愚以為可妙簡淑媛以備内官之數媛美女也淑善也媛于絹翻其餘盡遣還家且以育精養神専静為寳如此則螽斯之徵可庶而致矣詩螽斯后妃子孫衆多也帝報曰輒克昌言他復以聞輙以昌言自克也楊子曰勝己之私之謂克是時獵法嚴峻殺禁地鹿者身死財産沒官有能覺告者厚加賞賜柔復上疏曰中間以來百姓供給衆役親田者既減親田謂躬親田畆者加頃復有獵禁羣鹿犯暴殘食生苖處處為害所傷不訾不訾言不可計量也民雖障防力不能禦至如滎陽左右周數百里嵗略不收方今天下生財者甚少而麋鹿之損者甚多卒有兵戎之役凶年之災卒讀曰猝將無以待之惟陛下寛放民間使得捕鹿遂除其禁則衆庶永濟莫不恱豫矣帝又欲平北芒令於其上作臺觀望見孟津黃圖曰登之可以逺觀故曰觀觀古玩翻衛尉辛毗諫曰天地之性髙髙下下國語周太子晉曰天地成而聚於髙歸物於下四岳佐禹髙髙下下封崇九山决汨九川今而反之既非其理加以損費人功民不堪役且若九河盈溢洪水為害而丘陵皆夷將何以禦之帝乃止少府楊阜上疏曰陛下奉武皇帝開拓之大業守文皇帝克終之元緒元始也緒絲端也言文帝克終武帝之志受禪易制此絲端所從始也誠宜思齊往古聖賢之善治治直吏翻總觀季世放蕩之惡政曩使柦靈不廢髙祖之法度文景之恭儉太祖雖有神武於何所施而陛下何由處斯尊哉處昌吕翻今吳蜀未定軍旅在外諸所繕治惟陛下務從約節治直之翻帝優詔荅之阜復上疏曰堯尚茅茨而萬國安其居堯土堦三尺茅茨不翦禹卑宫室而天下樂其業樂音洛及至殷周或堂崇三尺度以九筵耳周官考工記曰殷人重屋堂脩七尋堂崇三尺周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵桀作璇室象廊史記龜策傳曰桀為瓦室紂為象廊與此稍異紂為傾宫鹿臺新序曰鹿臺其大三里髙千仞臣瓉曰今在朝歌城中以喪其社稷喪息浪翻楚靈以築章華而身受禍楚靈王為章華之臺民不堪命從亂如歸王走而死于芋尹氏秦始皇作阿房二世而滅事見七卷三十五年夫不度萬民之力以從耳目之欲度徒洛翻未有不亡者也陛下當以堯舜禹湯文武為法則夏桀殷紂楚靈秦皇為深誡而乃自暇自逸惟宫臺是飾必有顛覆危亡之禍矣君作元首臣為股肱存亡一體得失同之臣雖駑怯敢忘爭臣之義駑音奴爭讀曰諍言不切至不足以感悟陛下陛下不察臣言恐皇祖烈考之祚墜于地使臣身死有補萬一則死之日猶生之年也謹叩棺沐浴伏俟重誅奏御叩近也御進也帝感其忠言手筆詔荅帝嘗著帽被縹綾半袖著陟略翻說文曰帽小兒蠻夷頭衣縹普沼翻青白色綾紋帛或謂之綺或謂之紋繒半袖半臂也晉志曰帽名猶冠也義取於䝉覆其首其本纚也古者冠無幘冠下有纚以繒為之後世施幘於冠因或裁纚為帽自乘輿宴居下至庶人無爵者皆服之被皮義翻阜問帝曰此於禮何法服也帝黙然不答自是不法服不以見阜阜又上疏欲省宫人諸不見幸者乃召御府吏問後宫人數少府屬官有御府令典官婢員吏七十人吏從官三十人吏守舊令對曰禁宻不得宣露阜怒杖吏一百數之曰數所具翻國家不與九卿為宻反與小吏為宻乎帝愈嚴憚之散騎常侍蔣濟上疏曰昔句踐養胎以待用國語越王句踐困於㑹稽既反國命壯者無取老婦老者無取壯妻女子十七不嫁丈夫二十不娶其父母有罪將免乳者以告公令醫守之生丈夫二壺酒一犬生女子二壺酒一豚生三人公與之母生二人公與之餼散悉亶翻騎竒寄翻昭王恤病以雪仇燕昭王於破燕之後弔死問疾欲以報齊雪先王之恥故能以弱燕服強齊羸越滅勁吳今二敵強盛當身不除百世之責也謂當帝之身不能滅吳蜀後世之責必歸於帝以陛下聖明神武之略舍其緩者舍讀曰捨専心討賊臣以為無難矣中書侍郎東萊王基上疏曰按此則魏已改通事郎為中書侍郎矣臣聞古人以水喻民曰水所以載舟亦所以覆舟家語載孔子之言顔淵曰東野子之御馬力盡矣而求進不已殆將敗矣荀子魯定公問於顔淵曰東野子善御乎顔淵曰善則善矣雖然其馬將失定公曰何以知之顔淵曰臣以政知之昔舜巧於使民造父巧於使馬舜不窮其民力造父不窮其馬力是舜無失民造父無失馬也今東野畢之御上車執轡御體正矣步驟馳騁朝禮畢矣歴險致逺馬力盡矣然猶求進不已是以知之也今事役勞苦男女離曠願陛下深察東野之敝留意舟水之喻息奔駟於未盡節力役於未困昔漢有天下至孝文時唯有同姓諸侯而賈誼憂之曰置火積薪之下而寢其上因謂之安見十四卷漢文帝六年今冦賊未殄猛將擁兵檢之則無以應敵乆之則難以遺後謂五大在邊尾大不掉非善計以詒後人也遺于季翻當盛明之世不務以除患若子孫不競競強也社稷之憂也使賈誼復起必深切於曩時矣言不特痛哭流涕長太息而已復扶又翻下同帝皆不聽殿中監督役擅收蘭臺令史此殿中監以其時營造宫守使監作殿中耳非唐殿中監之官也觀後所謂校事可知矣又據晉書輿服志大駕鹵簿左殿中御史右殿中監則魏時殿中監已有定官蘭臺令史屬御史臺㑹要曰漢謂御史臺為蘭臺右僕射衛臻奏案之詔曰殿舍不成吾所留心卿推之何也推考鞫也臻曰古制侵官之法古者百官不相踰越左傳欒鍼曰侵官冒也非患其勤事也惡烏路翻誠以所益者小所墮者大也墮讀曰隳臣每察校事類皆如此魏武建國置校事使察羣下若又縱之懼羣司將遂越職以至陵夷矣尚書涿郡孫禮固請罷役帝詔曰欽納讜言讜音黨促遣民作監作者復奏留一月有所成訖成訖言欲成殿舍以訖事也監古衘翻禮徑至作所不復重奏重直龍翻稱詔罷民帝竒其意而不責帝雖不能盡用羣臣直諫之言然皆優容之秋七月洛陽崇華殿災帝問侍中領太史令泰山髙堂隆太史令屬太常隆以侍中領之漢儒有髙堂生魯人隆其後也姓譜齊公族有髙堂氏風俗通齊卿髙恭仲食采於髙堂曰此何咎也於禮寧有祈禳之義乎對曰易傳曰上不儉下不節孽火燒其室又曰君髙其臺天火為災京房易傳之辭傳直戀翻孽魚列翻此人君務飾宫室不知百姓空竭故天應之以旱火從髙殿起也詔問隆吾聞漢武之時栢梁災而大起宫殿以厭之事見二十一卷漢武帝太初元年厭益渉翻下同其義云何對曰夷越之巫所為非聖賢之明訓也五行志曰栢梁災其後有江充巫蠱事如志之言越巫建章無所厭也今宜罷散民役宫室之制務從約節清埽所災之處不敢於此有所立作則萐莆嘉禾必生此地萐山輒翻又色洽翻莆音蒲說文萐莆瑞草也堯時生於庖厨扇暑而凉若乃疲民之力竭民之財非所以致符瑞而懐逺人也八月庚午立皇子芳為齊王詢為秦王帝無子養二王為子宫省事秘莫有知其所由來者或云芳任城王楷之子也楷任城王彰之子任音壬丁巳帝還洛陽詔復立崇華殿復扶又翻更名曰九龍據髙堂隆傳時郡國有九龍見因以名殿更工衡翻通引榖水過九龍殿前水經注穀渠東歴故金市南直千秋門枝流入石逗伏流注靈芝九龍池為玉井綺欄蟾蜍含受神龍吐出使博士扶風馬鈞作司南車司南車即指南車也崔豹古今注曰黄帝與蚩尤戰于涿鹿蚩尤作大霧士皆迷路乃作指南車以正四方述征記曰指南車上有木仙人持信旛車轉而人常指南水轉百戲傅𤣥曰人有上百戲而不能動帝問鈞可動否對曰可動其巧可益否對曰可益受詔作之以大木彫構使其形若輪平地施之潛以水發焉設為女樂舞象至令木人擊鼔吹簫作山嶽使木人跳絙擲劒縁絙倒立出入自在百官行署舂磨鬬雞變巧百端陵霄闕始構有鵲巢其上帝以問髙堂隆對曰詩曰惟鵲有巢惟鳩居之詩召南鵲巢之辭也今興宫室起陵霄闕而鵲巢之此宫未成身不得居之象也天意若曰宫室未成將有他姓制御之斯乃上天之戒也夫天道無親惟與善人太戊武丁覩災悚懼故天降之福太戊桑榖生朝武丁飛雉雊鼎皆能戒懼轉災為福今若罷休百役増崇德政則三王可四五帝可六豈惟商宗轉禍為福而已哉帝為之動容為于偽翻下同帝性嚴急其督脩宫室有稽限者立為期限以必其成及期而不成為稽限帝親召問言猶在口身首已分散騎常侍領秘書監王肅漢桓帝延熹二年置秘書監秩四百石上疏曰今宫室未就見作者三四萬人見賢遍翻九龍可以安聖體其内足以列六宫惟泰極已前功夫尚大泰極謂太極殿願陛下取常食禀之士非急要者之用選其丁壯擇留萬人使一期而更之更工衡翻咸知息代有日則莫不恱以即事勞而不怨矣易曰說以使民民忘其勞計一嵗有三百六十萬夫亦不為小當一嵗成者聽且三年分遣其餘使皆即農無窮之計也夫信之於民國家大寳也前車駕當幸洛陽發民為營有司命以營成而罷此營壘之營既成又利其功力不以時遣有司徒營目前之利此營求之營不顧經國之體臣愚以為自今已後儻復使民復扶又翻宜明其令使必如期以次有事寧使更發無或失信謂始焉於甲處營造發民就役次焉於乙處營造不可仍用甲處就役之民寧使更發民以供乙處之役也凡陛下臨時之所行刑皆有罪之吏宜死之人也然衆庶不知謂為倉卒故願陛下下之於吏卒讀曰猝下之之下音户稼翻下同鈞其死也無使汙于宫掖鈞與均同汙烏故翻而為逺近所疑且人命至重難生易殺易以䜴翻氣絶而不續者也是以聖賢重之昔漢文帝欲殺犯蹕者廷尉張釋之曰方其時上使誅之則已今下廷尉廷尉天下之平不可傾也事見十四卷漢文帝三年下遐稼翻臣以為大失其義非忠臣所宜陳也廷尉者天子之吏也猶不可以失平而天子之身反可以惑謬乎斯論誠足以矯張釋之之失言斯重於為己而輕於為君為于偽翻不忠之甚者也不可不察中山恭王衮疾病令官屬曰男子不死於婦人之手喪大記之言亟以時營東堂堂成輿疾往居之又令世子曰汝幼為人君知樂不知苦必將以驕奢為失者也兄弟有不良之行樂音洛行下孟翻當造䣛諫之造䣛詣䣛前也造七到翻䣛與膝同諫之不從流涕喻之喻之不改乃白其母猶不改當以奏聞并辭國土與其守寵罹禍不若貧賤全身也此亦謂大罪惡耳其微過細故當掩覆之覆敷救翻冬十月己酉衮卒十一月丁酉帝行如許昌是嵗幽州刺史王雄使勇士韓龍刺殺鮮卑軻比能自是種落離散刺七亦翻種章勇翻互相侵伐強者逺遁弱者請服邊陲遂安張掖柳谷口水溢涌魏氏春秋曰張掖刪丹縣金山𤣥川謚漢晉春秋曰氐池縣大柳谷口夜激波涌溢刪丹氐池二縣漢志皆屬張掖晉志無之當是併省也五代志甘州張掖縣有大柳谷又後周廢金山縣入刪丹縣蓋歴代廢置無常疆土有離合也寳石負圖狀象靈龜立于川西有石馬七及鳳凰麒麟白虎犧牛璜玦八卦列宿孛彗之象宿音秀孛蒲内翻彗徐芮翻乂徐醉翻又祥嵗翻又有文曰大討曹石圖之文天意蓋昭昭矣詔書班天下以為嘉瑞任令于綽連齎以問鉅鹿張臶任縣前漢屬廣平國後漢屬鉅鹿郡魏復屬廣平郡師古曰任本晉邑也鄭皇頡奔晉為任大夫劉昫曰唐邢州任縣漢鉅鹿南䜌縣地晉置任縣治苑郷城連齎者連詔書及班下石圖齎以問張臶也張臶兼内外學故以問之臶徂悶翻又在甸翻祖悶翻臶宻謂綽曰夫神以知來不追既往祥兆先見而後廢興從之見賢遍翻今漢已乆亡魏已得之何所追興祥兆乎此石當今之變異而將來之符瑞也後人以此為晉繼魏之徴牛繼馬又以為元帝本牛氏繼司馬之徵帝使人以馬易珠璣翡翠玳瑁於吳珠不圓者為璣又曰粗瑀為璣玳徒耐翻瑁蒲佩翻吳主曰此皆孤所不用而可以得馬孤何愛焉盡以與之四年春吳人鑄大錢一當五百杜佑曰孫權嘉平五年鑄大錢一當五百文曰大錢五百徑一寸三分重十二銖三月吳張昭卒年八十一昭容貎矜嚴有威風吳主以下舉邦憚之夏四月漢主至湔登觀阪觀汶水之流湔即漢之湔氐道屬蜀郡汶水即㟭江水也㟭江出氐道西徼外㟭山東流歴都安縣沈約曰縣蜀所立水經注曰都安縣有桃闗蜀守李氷作大堰于此謂之湔塴亦曰湔堰觀阪在其上裴松之曰湔音翦晉書音義汶讀與㟭同諸葛亮既沒漢主游觀莫之敢止旬日而還還從宣翻又如字武都氐苻健請降於漢以此觀之諸氐固先有苻姓矣不待蒲堅以背文草付之祥乃姓苻也杜佑曰氐者西戎别種漢武帝開武都郡排其種人分竄山谷或在上禄或在河隴左右魏武令夏侯淵討叛氐阿貴千萬等後因拔棄漢中遂徙武都之種於秦川是曰楊氐苻堅之先是曰苻氐楊氐苻氐同出略陽世為婚姻降户江翻其弟不從將四百户來降五月乙卯樂平定侯董昭卒諡法大慮静民曰定純行不爽曰定冬十月己卯帝還洛陽宫甲申有星孛于大辰公羊傳曰大辰者何大火也何休注曰大火與伐天之所以示民時早晚天下之所以取正故謂之大辰蔡邕曰自亢八度至尾四度謂之大火陳卓曰自氐五度至尾九度曰大火之次於辰在卯孛蒲内翻又孛于東方髙堂隆上疏曰凡帝王徙都立邑皆先定天地社稷之位所謂圜丘方澤南北郊及社稷神位也敬恭以奉之將營宫室則宗廟為先廏庫為次居室為後記曲禮之言今圜丘方澤南北郊明堂社稷神位未定宗廟之制又未如禮而崇飾居室士民失業外人咸云宫人之用與軍國之費略齊民不堪命皆有怨怒書曰天聰明自我民聰明天明畏自我民明威書皋陶謨之言孔安國注曰言天因民而降之福民所歸者天命之天視聽人君之行用民為聰明天明可畏亦用民成其威民所叛者天討之是天明可畏之效也言天之賞罰隨民言順民心也夫采椽卑宫唐虞大禹之所以垂皇風也采椽即采來之木為椽不加斵削也玉臺瓊室夏癸商辛之所以犯昊天也張藴古曰彼昏不知瑶其臺而瓊其室文選東都賦注曰紂為瓊室以瓊瑶飾之今宫室過盛天彗章灼彗祥嵗翻音又見上斯乃慈父懇切之訓當崇孝子祇聳之禮不宜有忽以重天怒隆數切諫數所角翻下同帝頗不恱侍中盧毓進曰臣聞君明則臣直古之聖王惟恐不聞其過此乃臣等所以不及隆也帝乃解毓植之子也十二月癸巳潁隂靖侯陳羣卒諡法恭已鮮言曰靖寛樂令終曰靖羣前後數陳得失數所角翻每上封事輒削其草時人及其子弟莫能知也論者或譏羣居位拱黙言拱手而已黙無一言正始中詔撰羣臣上書以為名臣奏議撰雛免翻朝士乃見羣諫事皆歎息焉袁子論曰或云少府楊阜豈非忠臣哉見人主之非則勃然觸之與人言未嘗不道道者言之也答曰夫仁者愛人施之君謂之忠施於親謂之孝今為人臣見人主失道力詆其非而播揚其惡可謂直士未為忠臣也故司空陳羣則不然談論終日未嘗言人主之非書數十上上時掌翻外人不知君子謂羣於是乎長者矣乙未帝行如許昌詔公卿舉才德兼備者各一人司馬懿以兖州刺史太原王昶應選兖州統陳留東郡濟隂任城東平濟北泰山昶丑兩翻昶為人謹厚名其兄子曰黙曰沈沈時林翻名其子曰渾曰深為書戒之曰吾以四者為名欲使汝曹顧名思義不敢違越也夫物速成則疾亡晚就而善終朝華之草夕而零落松栢之茂隆寒不衰是以君子戒於闕黨也論語闕黨童子將命或問之曰益者歟孔子曰吾見其居於位也見其與先生並行也非求益者也欲速成者也夫能屈以為伸讓以為得弱以為強鮮不遂矣鮮息淺翻夫毁譽者愛惡之原而禍福之機也譽音余惡烏路翻孔子曰吾之於人誰毁誰譽見論語以聖人之德猶尚如此况庸庸之徒而輕毁譽哉人或毁己當退而求之於身若已有可毁之行則彼言當矣若已無可毁之行則彼言妄矣當則無怨於彼當丁浪翻妄則無害於身乂何反報焉諺曰救寒莫如重裘重直龍翻止謗莫如自脩斯言信矣昶之所以戒子姪如此然髙貴鄉公之難王沈陷於不忠平吳之役王渾與王濬爭功馬伏波萬里還書以戒兄子固無益於兄子也景初元年以改厯紀元景初春正月壬辰山茌縣言黃龍見山茌前漢曰茌縣後漢及魏晉曰山茌屬泰山郡師古曰茌士疑翻應劭音淄裴松之音仕狸翻見賢遍翻髙堂隆以為魏得土德故其瑞黃龍見宜改正朔易服色以神明其政變民耳目帝從其議三月下詔改元以是月為孟夏四月服色尚黃犧牲用白從地正也是月春三月也殷為地正以建丑十二月為嵗首服色尚黄以土代火之次犧牲用白從殷也更命太和厯曰景初厯太和厯注見目録七卷太和元年更工衡翻五月己巳帝還洛陽己丑大赦六月戊申京都地震己亥以尚書令陳矯為司徒令僕射衛臻為司空晉志曰尚書僕射漢本置一人獻帝建安四年以執金吾榮郃為尚書左僕射僕射分置左右蓋自此始自晉迄于江左省置無恒置二則為左右僕射或不兩置但曰尚書僕射令闕則左為省主若左右並闕則置尚書僕射以主左事有司奏以武皇帝為魏太祖文皇帝為魏髙祖帝為魏烈祖三祖之廟萬世不毁沈約曰時羣公有司始奏更定七廟之制曰武皇帝肇建洪基撥亂夷險為魏太祖文皇帝繼天革命應期受禪為魏髙祖上集成大命清定華夏興制禮樂為魏烈祖明帝在阼而其下先擬定廟號非禮也諡法有功安民曰烈秉德尊業曰烈孫盛論曰夫諡以表行行下孟翻廟以存容未有當年而逆制祖宗未終而豫自尊顯魏之羣司於是乎失正矣羣司百執事之臣也秋七月丁卯東鄉貞公陳矯卒諡法不隱無屈曰貞清白守節曰貞公孫淵數對國中賔客出惡言數所角翻帝欲討之以荆州刺史毋丘儉為幽州刺史毋丘複姓毋音無儉上疏曰陛下即位以來未有可書吳蜀恃險未可卒平卒讀曰猝聊可以此方無用之士克定遼東鄭𤣥曰聊且略之辭光禄大夫衛臻曰儉所陳皆戰國細術非王者之事也吳頻嵗稱兵稱舉也冦亂邊境而猶按甲養士未果致討者誠以百姓疲勞故也淵生長海表相承三世度康淵凡三世長知兩翻外撫戎夷内脩戰射而儉欲以偏軍長驅朝至夕卷卷讀曰捲知其妄矣帝不聽使儉帥諸軍及鮮卑烏桓屯遼東南界帥讀曰率璽書徵淵淵遂發兵反逆儉於遼隧遼隧縣二漢屬遼東郡晉志無其地蓋在遼水東㟁水經注𤣥莵郡髙句麗縣有遼山小遼水所出西南至遼隧縣入于大遼水璽斯氏翻㑹天雨十餘日遼水大漲儉與戰不利引軍還右北平淵因自立為燕王改元紹漢置百官遣使假鮮卑單于璽封拜邊民誘呼鮮卑以侵擾北方誘音酉漢張后殂九月冀兖徐豫大水冀州統趙鉅鹿安平平原樂陵勃海河間博陵清河中山常山徐州統彭城下邳東海琅邪廣陵臨淮豫州統潁川汝南汝隂梁沛譙魯弋陽安豐西平郭夫人有寵於帝夫人河右大族黄初中以本郡反叛沒入宫毛后愛弛帝游後園曲宴極樂曲宴禁中之宴猶言私宴也樂音洛下同郭夫人請延皇后帝不許因禁左右使不得宣宣布也露其事也后知之明日謂帝曰昨日游宴北園樂乎後園在洛城北隅帝以左右泄之所殺十餘人庚辰賜后死然猶加諡曰悼諡法中年早夭曰悼肆行無禮曰悼癸丑葬愍陵遷其弟曽為散騎常侍冬十月帝用髙堂隆之議營洛陽南委粟山為圓丘魏氏春秋曰洛陽有委粟山在隂鄉魏時營為圓丘孔穎逹曰委粟山在洛陽南二十里詔曰昔漢氏之初承秦滅學之後採摭殘缺以備郊祀四百餘年廢無禘禮摭之石翻禮五年一禘禘其祖之所自出以其祖配之審諦昭穆而祭于太祖也禘所以異於祫者毁廟之主陳於太祖廟與祫同未毁廟之主則各就其廟以祭此其異也春秋吉禘于莊公左傳晉人曰寡君之未禘祀杜預注曰禘祀三年之吉祭也僖八年禘于太廟杜預曰三年大祭之名二者不同禮有禘有大禘以下文觀之則此乃禮記祭法所謂郊禘之禘鄭氏注曰禘郊祖宗謂祭祀以配食也此禘謂祭昊天於圜丘也曹氏世系出自有虞今祀皇皇帝天於圓丘以始祖虞舜配祭皇皇后地於方丘以舜妃伊氏配舜妃堯女也堯伊祁氏祀皇天之神於南郊以武帝配祭皇地之祗於北郊以武宣皇后配廬江主簿吕習宻使人請兵於吳欲開門為内應吳主使衛將軍全琮督前將軍朱桓等赴之既至事露吳軍還琮徂宗翻還從宣翻又如字諸葛恪至丹陽移書四部屬城長吏四部當作四郡謂吳郡㑹稽新都鄱陽皆與丹陽隣接山越依阻出沒故令各保其疆界也或曰四部謂東南西北四部都尉也令各保其疆界明立部伍其從化平民悉令屯居乃内諸將羅兵幽阻使諸將入扼幽阻之地故謂之内内讀曰納但繕藩籬不與交鋒俟其榖稼將熟輒縱兵芟刈使無遺種芟所衘翻種章勇翻舊榖既盡新榖不收平民屯居略無所入於是山民饑窮漸出降首降户江翻首式救翻恪乃復敕下曰復扶又翻敕下者出教令約敕其下也山民去惡從化皆當撫慰徙出外縣不得嫌疑有所拘執臼陽長胡伉得降民周遺臼陽既置長必以為縣其地當在丹陽郡而今無所考遺舊惡民困迫暫出伉縳送言府恪以伉違教遂斬以徇民聞伉坐執人被戮伉胡朗翻又去浪翻知官惟欲出之而已於是老幼相攜而出嵗期人數皆如本規嵗期人數見上卷青龍二年恪自領萬人餘分給諸將吳主嘉其功拜恪威北將軍威北將軍亦孫氏所創置封都鄉侯徙屯廬江皖口皖水自霍山縣東南流三百四十里入大江謂之皖口皖户版翻是嵗徙長安鐘簴槖佗銅人承露盤於洛陽盤折簴音巨佗徒河翻折而設翻聲聞數十里聞音問銅人重不可致留于霸城霸城即漢京兆霸陵縣故城也大發銅鑄銅人二號曰翁仲列坐於司馬門外又鑄黄龍鳳皇各一龍髙四丈鳳髙三丈餘髙古號翻置内殿前起土山於芳林園西北陬水經注大夏門内東側際城有景陽山即芳林園之西北陬也裴松之曰芳林園即今華林園齊王芳即位改曰華林園陬將侯翻使公卿羣僚皆負土樹松竹雜木善草於其上捕山禽雜獸置其中司徒軍議掾董尋上疏諫曰漢公府無軍議掾此官魏置也掾俞絹翻臣聞古之直士盡言於國不避死亡故周昌比髙祖於桀紂劉輔譬趙后於人婢周昌注已見前劉輔事見三十一卷漢成帝永始元年天生忠直雖白刃沸湯往而不顧者誠為時主愛惜天下也為于偽翻建安以來野戰死亡或門殫户盡雖有存者遺孤老弱若今宫室狹小當廣大之猶宜隨時不妨農務况乃作無益之物黃龍鳳皇九龍承露盤此皆聖明之所不興也其功三倍於殿舍陛下既尊羣臣顯以冠冕被以文繡被皮義翻載以華輿所以異於小人而使穿方舉土方穴土為方也漢書所謂方中亦此義面目垢黒衣冠了鳥了鳥衣冠摧敝之貌毁國之光以崇無益甚非謂也孔子曰君使臣以禮臣事君以忠見論語孔子對魯定公之辭無忠無禮國何以立臣知言出必死而臣自比於牛之一毛生既無益死亦何損司馬遷答任安書曰假令僕伏法受誅若九牛亡一毛與螻蟻何異秉筆流涕心與世辭臣有八子臣死之後累陛下矣累力瑞翻將奏沐浴以待命帝曰董尋不畏死邪主者奏收尋有詔勿問髙堂隆上疏曰今世之小人好說秦漢之奢靡以蕩聖心好呼到翻求取亡國不度之器不度之器謂長安鍾簴槖佗銅人承露盤也勞役費損以傷德政非所以興禮樂之和保神明之休也帝不聽隆又上疏曰昔洪水滔天二十二載隆之此言蓋取鯀九載績用弗成禹治兖州作十有三載乃同合以為二十二載之數載于亥翻堯舜君臣南面而已今無若時之急而使公卿大夫並與厮徒共供事役聞之四夷非嘉聲也垂之竹帛非令名也今吳蜀二賊非徒白地小虜聚邑之冦白地謂大幕不生草木多白沙也小虜謂烏桓鮮卑也聚邑之冦謂盜賊竊發屯據鄉邑聚落者乃潛號稱帝欲與中國爭衡衡所以稱輕重爭衡者言吳蜀自謂國埶與中國鈞無所輕重也今若有人來告權禪並脩德政輕省租賦動咨耆賢事遵禮度陛下聞之豈不惕然惡其如此惡烏路翻以為難卒討滅卒讀曰猝而為國憂乎若使告者曰彼二賊並為無道崇侈無度役其士民重其賦斂歛力贍翻下不堪命吁嗟日甚陛下聞之豈不幸彼疲敝而取之不難乎茍如此則可易心而度事義之數亦不逺矣度徒洛翻義禮也髙堂隆之論諫可謂深切著明矣亡國之主自謂不亡然後至於亡賢聖之君自謂亡然後至於不亡今天下彫敝民無儋石之儲儋丁濫翻國無終年之蓄外有強敵六軍暴邊内興土功州郡騷動若有冦警則臣懼版築之士不能投命虜庭矣又將吏奉禄稍見折減將子亮翻奉扶用翻方之於昔五分居一諸受休者又絶禀賜禀筆錦翻給也不應輸者今皆出半此為官入兼多於舊其所出與參少於昔參三分也而度支經用更每不足牛肉小賦前後相繼此蓋犒饗工徒度支經用不足以給故賦牛肉以供之度徒洛翻尺而推之凡此諸費必有所在指言諸費皆在於營繕也且夫禄賜穀帛人主所以恵養吏民而為之司命者也若今有廢是奪其命矣既得之而又失之此生怨之府也帝覽之謂中書監令曰觀隆此奏使朕懼哉中書監令典奏事因觀隆奏遂以語之尚書衛覬上疏曰今議者多好恱耳覬音冀好呼到翻其言政治則比陛下於堯舜治直吏翻其言征伐則比二虜於貍䑕臣以為不然四海之内分而為三羣士陳力各為其主為于偽翻是與六國分治無以為異也當今千里無烟遺民困苦陛下不善留意將遂凋敝難可復振復扶又翻武皇帝之時後宫食不過一肉衣不用錦繡茵蓐不縁飾縁俞絹翻茵蓐之字從草蓋古人用草為之後世鞇用字有旁從革者用皮為之也裀褥二字有旁從衣者帛為之也古樸散而文飾盛又從而加縁飾焉觀書顧命敷席有黼純綴純畫純𤣥粉純之别則成周之時已然矣純之尹翻縁也器物無丹漆古者樸素舜造漆器而羣臣諫者不止况加丹乎用能平定天下遺福子孫此皆陛下之所覽也當今之務宜君臣上下計校府庫量入為出猶恐不及量音良而工役不輟侈靡日崇帑藏日竭帑徒朗翻藏徂浪翻昔漢武信神仙之道謂當得雲表之露以餐玉屑故立仙掌以承髙露陛下通明每所非笑漢武有求於露而猶尚見非陛下無求於露而空設之不益於好而糜費功夫誠皆聖慮所宜裁制也時有詔録奪士女録收也前已嫁為吏民妻者還以配士聽以生口自贖又簡選其有姿首者内之掖庭姿謂有色者首謂鬒髪者太子舍人沛國張茂上書諫曰陛下天之子也百姓吏民亦陛下子也今奪彼以與此亦無以異於奪兄之妻妻弟也妻妻下七細翻於父母之恩偏矣又詔書得以生口年紀顔色與妻相當者自代故富者則傾家盡産貧者舉假貸貰貴買生口以贖其妻縣官以配士為名而實内之掖庭其醜惡乃出與士得婦者未必喜而失妻者必有憂或窮或愁皆不得志夫君有天下而不得萬姓之懽心者鮮不危殆鮮息淺翻且軍師在外數十萬人一日之費非徒千金舉天下之賦以奉此役猶將不給况復有掖庭非員無録之女非員謂出於員數之外者無録謂宫中録籍無其名者復扶又翻椒房母后之家賞賜橫與横户孟翻内外交引其費半軍謂其費與給軍之費相半也昔漢武帝掘地為海封土為山掘地為海謂開昆明池封土為山謂作三神山漸臺也賴是時天下為一莫敢與爭者耳自衰亂以來四五十載載子亥翻下同馬不捨鞍士不釋甲強冦在疆圖危魏室陛下不戰戰業業念崇節約而乃奢靡是務中尚方作玩弄之物晉志少府統中左右三尚方後園建承露之盤斯誠快耳目之觀然亦足以騁冦讐之心矣騁丑郢翻惜乎舍堯舜之節儉而為漢武帝之侈事臣竊為陛下不取也帝不聽舍讀曰捨竊為于偽翻髙堂隆疾篤口占上疏曰疾篤不能自書故口占而使人書之曽子有言曰人之將死其言也善見論語臣寢疾有増無損常恐奄忽忠欵不昭臣之丹誠願陛下少垂省覽省悉景翻臣觀三代之有天下聖賢相承歴數百載尺土莫非其有一民莫非其臣然癸辛之徒縱心極欲皇天震怒宗國為墟紂梟白旗武王斬紂首懸之太白之旗梟堅堯翻桀放鳴條商湯破桀於鳴條遂放之于南巢孔安國曰鳴條地在安邑之西天子之尊湯武有之豈伊異人皆明王之胄也黃初之際天兆其戒異類之鳥育長燕巢口爪胸赤此魏室之大異也晉書五行志黃初元年未央宫中有燕生鷹口爪俱赤長知兩翻宜防鷹揚之臣於蕭牆之内司馬氏之事隆固逆知之矣可選諸王使君國典兵往往棊時鎮撫皇畿翼亮帝室夫皇天無親惟德是輔書蔡仲之命之辭民詠德政則延期過厯下有怨歎則輟録授能録圖録也由此觀之天下乃天下之天下非獨陛下之天下也帝手詔深慰勞之未幾而卒勞力到翻幾居豈翻陳夀評曰髙堂隆學業脩明志存匡君因變陳戒發於懇誠忠矣哉及至必改正朔俾魏祖虞所謂意過其通者歟謂是年黄龍見之議也意過其通謂意料之說執之甚堅反過其學之所通習者也帝深疾浮華之士詔吏部尚書盧毓曰毓余六翻選舉莫取有名名如畫地作餅不可啖也啖徒覽翻噍也食也又徒濫翻毓對曰名不足以致異人而可以得常士常士畏教慕善然後有名非所當疾也愚臣既不足以識異人又主者正以循名案常為職但當有以驗其後耳古者敷奏以言明試以功言唐虞之治也今考績之法廢而以毁譽相進退故真偽渾雜虚實相䝉帝納其言渾胡本翻詔散騎常侍劉邵作考課法邵作都官考課法七十二條又作說略一篇說略者說考課之大畧也詔下百官議下遐稼翻司𨽻校尉崔林曰案周官考課其文備矣周冢宰總百官嵗終則令百官府各正其治受其㑹聴其政事而詔王廢置三嵗則大計羣吏之治而誅賞之其詳見於周禮自康王以下遂以陵夷此即考課之法存乎其人也及漢之季其失豈在乎佐吏之職不宻哉方今軍旅或猥或卒猥積也卒倉猝也讀曰猝増減無常固難一矣且萬目不張舉其綱以綱為譬也衆毛不整振其領以裘為譬也皋陶仕虞伊尹臣殷不仁者逺用論語子夏答樊遲之言陶音遥若大臣能任其職式是百辟詩烝民曰王命仲山甫式是百辟注云汝施行法度於是百君則孰敢不肅烏在考課哉黃門侍郎杜恕曰明試以功三載考績誠帝王之盛制也然歴六代而考績之法不著闗七聖而課試之文不垂六代唐虞夏商周漢七聖堯舜禹湯文武周公闗通也臣誠以為其法可粗依其詳難備舉故也粗坐五翻語曰世有亂人而無亂法若使法可専任則唐虞可不須稷契之佐殷周無貴伊吕之輔矣契息列翻今奏考功者陳周漢之云為綴京房之本㫖漢京房有考功課吏法可謂明為課之要矣於以崇揖讓之風興濟濟之治臣以為未盡善也濟子禮翻治直吏翻其欲使州郡考士必由四科四科即漢左雄所上黄瓊所増者也見五十二卷順帝漢安二年皆有事效然後察舉試辟公府為親民長吏長知兩翻轉以功次補郡守者或就増秩賜爵此最考課之急務也臣以為便當顯其身用其言使具為課州郡之法法具施行立必信之賞施必行之罰至於公卿及内職大臣亦當俱以其職考課之古之三公坐而論道周官考工記曰坐而論道謂之三公内職大臣納言補闕無善不紀無過不舉且天下至大萬機至衆誠非一明所能徧照故君為元首臣作股肱明其一體相須而成也是以古人稱廊廟之材非一木之支帝王之業非一士之略師古曰此語出於慎子班固引以贊婁敬叔孫通由是言之焉有大臣守職辦課可以致雍熈者哉焉於䖍翻誠使容身保位無放退之辜而盡節在公抱見疑之埶公義不脩而私議成俗雖仲尼為課猶不能盡一才又况於世俗之人乎司空掾北地傅嘏曰夫建官均職清理民物所以立本也循名責實糾勵成規所以治末也治直之翻本綱未舉而造制末程綱維紘繩綱總也舉綱則衆目張矣言所繫者大也十髪為程一程為分言其細也又曰程品式也國略不崇而考課是先國略國經也先必薦翻懼不足以料賢愚之分精幽明之理也料音聊議久之不决事竟不行臣光曰為治之要莫先於用人治直吏翻而知人之道聖賢所難也書皋陶曰在知人在安民禹曰吁咸若時惟帝其難之是故求之於毁譽則愛憎競進而善惡渾殽譽音余渾户本翻考之於功狀則巧詐橫生而真偽相冒要之其本在於至公至明而已矣為人上者至公至明則羣下之能否焯然形於目中無所復逃矣焯職略翻明也復扶又翻茍為不公不明則考課之法適足為曲私欺罔之資也何以言之公明者心也功狀者迹也己之心不能治治直之翻下同而以考人之迹不亦難乎為人上者誠能不以親疎貴賤異其心喜怒好惡亂其志好呼到翻惡烏路翻欲知治經之士則視其記覽博洽博廣也大也通也洽徧也講論精通斯為善治經矣欲知治獄之士則視其曲盡情偽無所寃抑斯為善治獄矣欲知治財之士則視其倉庫盈實百姓富給斯為善治財矣欲知治兵之士則視其戰勝攻取敵人畏服斯為善治兵矣至於百官莫不皆然雖詢謀於人而决之在己雖考求於迹而察之在心研覈其實而斟酌其宜至精至微不可以口述不可以書𫝊也安得豫為之法而悉委有司哉温公之論善矣然必英明之君然後能行之自漢以下循名責實莫孝宣若也宣帝之政非由師傅之諭教公輔之啟沃也公所謂不可以口述不可以書𫝊其萬世之名言也歟或者親貴雖不能而任職疎賤雖賢才而見遺所喜所好者敗官而不去所怒所惡者有功而不録喜許記翻好呼到翻敗補邁翻惡烏路翻詢謀於人則毁譽相半而不能决考求其迹則文具實亡而不能察雖復為之善法復扶又翻繁其條目謹其簿書安能得其真哉或曰人君之治治直吏翻大者天下小者一國内外之官以千萬數考察黜陟安得不委有司而獨任其事哉曰非謂其然也凡為人上者不特人君而已太守居一郡之上刺史居一州之上九卿居屬官之上三公居百執事之上皆用此道以考察黜陟在下之人為人君者亦用此道以考察黜陟公卿太守奚煩勞之有哉古人有言曰舉一綱衆目張又曰正其本萬事理此之謂也而所謂本者豈易言哉或曰考績之法唐虞所為京房劉邵述而脩之耳烏可廢哉曰唐虞之官其居位也久其受任也専其立法也寛其責成也逺是故鯀之治水九載績用弗成然後治其罪事見尚書治其罪謂殛鯀於羽山也治直之翻下同禹之治水九州攸同四隩既宅然後賞其功隩於六翻事亦見尚書賞其功謂錫禹以𤣥珪也非若京房劉邵之法校其米鹽之課責其旦夕之效也事固有名同而實異者不可不察也考績非可行於唐虞而不可行於漢魏由京房劉邵不得其本而奔趨其末故也趨七喻翻初右僕射衛臻典選舉中䕶軍蔣濟遺臻書曰蔣濟已自中䕶軍遷䕶軍將軍此復書中䕶軍蓋先時事也遺于季翻漢主遇亡虜為上將謂韓信周武拔漁父為太師謂吕望布衣厮養厮音斯養羊尚翻可登王公何必守文試而後用臻曰不然子欲同牧野於成康喻斷蛇於文景謂草創之規略不可用於承平之時也好不經之舉好呼到翻經常也開拔竒之津津江河濟度之要故以為喻將使天下馳騁而起矣盧毓論人及選舉皆先性行而後言才先悉薦翻行下孟翻黃門郎馮翊李豐嘗以問毓毓曰才所以為善也故大才成大善小才成小善今稱之有才而不能為善是才不中器也豐服其言中竹仲翻資治通鑑卷七十三
