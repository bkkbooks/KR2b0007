body:
  text: 資治通鑑卷一百七宋司馬光撰胡三省音註晉紀二十九起彊圉大淵獻盡重光單閼凡五年烈宗孝武皇帝中之下太元十二年春正月乙巳以朱序為兖青二州刺史代謝𤣥鎮彭城序求鎮淮隂許之序求鎮淮隂以燕方强必進取河南彭城去建康道逺聲援不接故也以𤣥為㑹稽内史優𤣥以内地也㑹工外翻丁未大赦燕主垂觀兵河上韋昭曰觀示也陳兵以示威武觀古玩翻髙陽王隆曰温詳之徒皆白面儒生烏合為羣徒恃長河以自固若大軍濟河必望旗震壊不待戰也垂從之戊午遣鎮北将軍蘭汗䕶軍将軍平幼於碻磝西四十里濟河隆以大衆陳於北岸陳讀曰陣温攀温楷果走趣城盖趣東阿城也趣七喻翻平幼追擊大破之詳夜将妻子犇彭城其衆三萬餘户皆降於燕降户江翻垂以太原王楷為兖州刺史鎮東阿初垂在長安秦王堅甞與之交手語宂從僕射光祚言於堅曰宂而隴翻從才用翻陛下頗疑慕容垂乎垂非久為人下者也堅以告垂及秦主丕自鄴奔晉陽事見上卷十年祚與黄門侍郎封孚鉅鹿太守封勸皆来奔祚從符丕在鄴見上卷九年勸奕之子也封奕仕燕燕興於昌黎奕有力焉垂之再圍鄴也見一百五卷九年秦故臣西河朱肅等各以其衆来犇詔以祚等為河北諸郡太守皆營於濟北濮陽濟北濮陽二郡濟子禮翻濮博木翻羈屬温詳師古曰言羈縻屬之而已詳敗俱詣燕軍降降户江翻垂赦之撫待如舊垂見光祚流涕沾衿衿音今曰秦王待我深吾事之亦盡但為二公猜忌二公謂長樂公丕平原公暉也吾懼死而負之事見一百五卷九年每一念之中宵不寐祚亦悲慟垂賜祚金帛祚固辭垂曰卿猶復疑邪復扶又翻祚曰臣昔者惟知忠於所事不意陛下至今懐之臣敢逃其死垂曰此乃卿之忠固吾所求也前言戲之耳用孔子語待之彌厚以為中常侍光祚秦之宦者故處以此官翟遼遣其子釗冦陳頴朱序遣将軍秦膺擊走之秦主登立妃毛氏為皇后勃海王懿為太弟后興之女也遣使拜東海王纂為使持節都督中外諸軍事太師領大司馬封魯王使疏吏翻纂弟師奴為撫軍大将軍并州牧封朔方公纂怒謂使者曰勃海王先帝之子南安王何以不立而自立乎長史王旅諫曰南安已立理無中改今冦虜未滅不可宗室之中自為仇敵也纂乃受命於是盧水胡彭沛榖屠各董成張龍世新平羌雷惡地等皆附於纂有衆十餘萬以登纂連兵聲勢浸盛故相與歸之屠直於翻後秦主萇徙秦州豪傑三萬户于安定去年萇徙安定民以實長安今又徙秦州豪傑以實安定盖萇起兵以安定為根本而欲都長安故因道里逺近為次以漸徙之初安次人齊涉聚衆八千餘家據新柵降燕安次縣前漢屬勃海後漢屬廣陽國晉屬燕國新柵盖在魏郡界降户江翻燕主垂拜涉魏郡太守既而復叛連張願願自帥萬餘人進屯祝阿之瓮口祝阿縣漢屬平原郡晉屬濟南郡願自泰山進屯焉劉昫曰齊州禹城縣漢祝阿縣天寳元年更名宋白曰祝阿猶東阿也古祝國黄帝之後按古東阿齊為東阿漢為祝阿縣故城在今豐齊縣東北二里唐改禹城復扶又翻帥讀曰率瓮烏貢翻招翟遼共應涉髙陽王隆言於垂曰新柵堅固攻之未易猝㧞易以䜴翻若久頓兵於其城下張願擁帥流民西引丁零丁零謂翟遼帥讀曰率為患方深願衆雖多然皆新附未䏻力鬬因其自至宜先擊之願父子恃其驍勇驍堅堯翻必不肯避去可一戰擒也願破則涉不䏻自存矣垂從之二月遣范陽王徳陳留王紹龍驤将軍張崇驤思将翻帥步騎二萬㑹隆擊願軍至斗城去瓮口二十餘里觧鞍頓息願引兵奄至燕人驚遽徳兵退走隆勒兵不動願子龜出衝陳陳讀曰陣隆遣左右王末逆擊斬之隆徐進戰願兵乃退徳行里餘復整兵還與隆合復扶又翻謂隆曰賊氣方銳宜且緩之隆曰願乗人不備宜得大捷而吾士卒皆以懸隔河津勢迫之故人思自戰言兵為河津所隔前有强敵退則溺死故思之而各自為戰也故䏻却之今賊不得利氣竭勢衰皆有進退之志不䏻齊奮宜亟擊之徳曰吾唯卿所為耳遂進戰於瓮口大破之斬首七千八百級願脫身保三布口燕人進軍厯城厯城縣自漢以来屬濟南郡青兖徐州郡縣壁壘多降降户江翻垂以陳留王紹為青州刺史鎮厯城徳等還師新柵人冬鸞執涉送之果如慕容隆所料唐韻冬姓也垂誅涉父子餘悉原之三月秦主登以竇衝為南秦州牧楊定為益州牧楊璧為司空梁州牧乞伏國仁為大将軍大單于苑川王杜佑曰苑川在蘭州五泉縣近大小榆谷余謂杜佑以意言之單音蟬燕上谷人王敏殺太守封戢代郡人許謙逐太守賈閏各以郡附劉顯為燕擊劉顯張本燕樂浪王温為尚書右僕射燕下當有以字樂浪音洛琅夏四月戊辰尊帝母李氏為皇太妃儀服如太后後秦征西将軍姚碩徳為楊定所逼退守涇陽涇陽縣前漢屬安定郡後漢晉省秦屬隴東郡杜佑曰漢涇陽縣在今平涼郡界涇陽故城是定與秦魯王纂共攻之戰于涇陽碩徳大敗後秦主萇自隂宻救之纂退屯敷陸隂宻縣屬安定郡殷時宻國也敷陸唐坊州鄜城縣即其地燕主垂自碻磝還中山慕容柔慕容盛慕容㑹来自長子柔等去年自長子逃歸今始達中山庚子垂為之大赦喜子孫得全而東歸故為之肆赦為于偽翻垂問盛長子人情如何為可取乎盛曰西軍擾擾人有東歸之志陛下唯當脩仁政以俟之耳若大軍一臨必投戈而来若孝子之歸慈父也垂恱癸未封柔為陽平王盛為長樂公樂音洛㑹為清河公髙平人翟暢執太守徐含逺以郡降翟遼降户江翻燕主垂謂諸将曰遼以一城之衆反覆三國之間三國謂晉及燕西燕不可不討五月以章武王宙監中外諸軍事監工銜翻輔太子寳守中山垂自帥諸将南攻遼帥讀曰率下同以太原王楷為前鋒都督遼衆皆燕趙之人聞楷至皆曰太原王子吾之父母也楷父恪相燕燕趙之人懐之故云然相帥歸之遼懼遣使請降垂以遼為徐州牧封河南公前至黎陽受降而還降户江翻井陘人賈鮑井陘縣屬常山郡陘音刑招引北山丁零翟遥等五千餘人夜襲中山䧟其郭章武王宙以竒兵出其外太子寳鼓譟於内合擊大破之盡俘其衆唯遥鮑單馬走免劉顯地廣兵彊雄於北方㑹其兄弟乖争魏長史張衮言於魏王珪曰顯志在并吞今不乗其内潰而取之奴真肺埿相繼来降故云然必為後患然吾不䏻獨克請與燕共攻之珪從之復遣安同乞師於燕去年魏遣安同乞師於燕以破窟咄故此言復復扶又翻詔徴㑹稽處士戴逵㑹工外翻處昌吕翻逵累辭不就郡縣敦逼不已逵逃匿于吳謝𤣥上疏曰逵自求其志論語曰隠居以求其志今王命未回将罹風霜之患陛下既已愛而器之亦宜使其身名並存請絶召命帝許之𤣥為㑹稽内史故為逵上疏逵􅋟之兄也戴􅋟見一百四卷四年秦主登以其兄同成為司徒守尚書令封潁川王弟廣為中書監封安成王子崇為尚書左僕射封東平王燕主垂自黎陽還中山吳深殺燕清河太守丁國章武人王祖殺太守白欽勃海人張申據髙城以叛髙城縣屬勃海郡賢曰髙城故城在今滄州鹽山縣南燕主垂命樂浪王温討之苑川王國仁帥騎三萬襲鮮卑大人宻貴裕茍提倫三部于六泉宻貴為一部裕茍為一部提倫為一部六泉在髙平帥讀曰率騎竒寄翻秋七月與没奕千金熈戰于渇渾川按載記國仁襲三部而没奕千金熈連兵襲國仁故遇戰于渇渾川其地當在天水勇士縣東北沒奕千金熈大敗三部皆降降户江翻秦主登軍于瓦亭後秦主萇攻彭沛穀堡㧞之穀犇杏城彭沛穀盧水胡也立堡於貳縣杜佑曰杏城在坊州西萇還隂宻以太子興鎮長安燕趙王麟討王敏于上谷斬之劉衛辰獻馬於燕劉顯掠之燕主垂怒遣太原王楷将兵助趙王麟擊顯大破之将即亮翻顯犇馬邑西山魏王珪引兵㑹麟擊顯於彌澤按魏書帝紀彌澤在馬邑南又破之顯犇西燕麟悉收其部衆獲馬牛羊以千萬數劉顯滅而拓拔氏彊矣為慕容氏計者莫若兩利而俱存之可以無他日亡國之禍吕光将彭晃徐炅攻張大豫于臨洮破之張大豫奔臨洮見上卷上年洮土刀翻大豫犇廣武王穆犇建康八月廣武人執大豫送姑臧斬之穆襲據酒泉自稱大将軍涼州牧辛巳立皇子徳宗為太子大赦燕主垂立劉顯弟可泥為烏桓王以撫其衆徙八千餘落于中山秦馮翊太守蘭櫝帥衆二萬自頻陽入和寧頻陽縣秦厲公置自漢以来屬馮翊應劭曰在頻水之陽據載記和寧在嶺北杏城之東南帥讀曰率與魯王纂謀攻長安纂弟師奴勸纂稱尊號纂不從師奴殺纂而代之櫝遂與師奴絶西燕主永攻櫝櫝請救於後秦後秦主萇欲自救之尚書令姚旻左僕射尹緯曰苻登近在瓦亭将乗虚襲吾後萇曰苻登衆盛非旦夕可制登遲重少决必不能輕軍深入比兩月間比必寐翻及也吾必破賊而返登雖至無䏻為也九月萇軍于泥源漢書地理志北地郡有泥陽縣應劭注云泥水出郁郅北蠻中師奴逆戰大敗亡犇鮮卑後秦盡收其衆屠各董成等皆降苻纂兄弟既敗苻登之勢孤矣屠直於翻秦主登進據胡空堡秦屯騎校尉胡空所築堡也在新平界戎夏歸之十餘萬夏户雅翻冬十月翟遼復叛燕復扶又翻下同遣兵與王祖張申冦抄清河平原抄楚交翻後秦主萇進擊西燕王永於河西西燕王當作西燕主此龍門至華隂河之西也永走蘭櫝復列兵拒守萇攻之十二月禽櫝遂如杏城後秦姚方成攻秦雍州刺史徐嵩壘拔之執嵩而數之雍於用翻數所具翻嵩罵曰汝姚萇罪當萬死苻黄眉欲斬之先帝止之謂穆帝升平元年姚襄敗時也授任内外榮寵極矣曽不如犬馬識所養之恩親為大逆謂殺秦王堅於新平佛寺也汝羌輩豈可以人理期也何不速殺我方成怒三斬嵩三斬者斬其足斬其腰斬其頸也悉阬其士卒以妻子賞軍後秦王萇掘秦主堅尸鞭撻無數剥衣倮形薦之以棘坎土而埋之堅葬于徐嵩胡空二壘之間徐嵩之壘既陷故姚萇得掘墓鞭尸以逞其忿倮郎果翻薦藉也凉州大饑米斗直錢五百人相食死者大半吕光西平太守康寧自稱匈奴王殺湟河太守强禧以叛西平郡東漢之末分金城置唐之鄯州即其地也湟河郡河西張氏置盖亦在鄯州界内強其兩翻張掖太守彭晃亦叛東結康寧西通王穆光欲自擊晃諸将皆曰今康寧在南伺釁而動伺相吏翻若晃穆未誅康寧復至復扶又翻進退狼狽勢必大危光曰實如卿言然我今不往是坐待其来也若三冦連兵三冦謂康寧彭晃王穆東西交至則城外皆非吾有大事去矣今晃初叛與穆寧情契未宻出其倉猝取之差易耳易以䜴翻乃自帥騎三萬帥讀曰率騎竒寄翻倍道兼行既至攻之二旬拔其城誅晃初王穆起兵遣使招敦煌處士郭瑀使疏吏翻敦徒門翻處昌吕翻瑀歎曰今民将左袵吾忍不救之邪乃與同郡索嘏起兵應穆索昔各翻運粟三萬石以餉之穆以瑀為太府左長史軍師将軍嘏為敦煌太守既而穆聽䜛言引兵攻嘏瑀諌不聽出城大哭舉手謝城曰吾不復見汝矣復扶又翻還而引被覆面覆敷又翻不與人言不食而卒卒子恤翻吕光聞之曰二虜相攻此成禽也不可以憚屢戰之勞而失永逸之機也一勞永逸古語有之遂帥步騎二萬攻酒泉克之進屯凉興凉興郡河西張氏置在唐𤓰州常樂縣界穆引兵東還未至衆潰穆單騎走騂馬令郭文斬其首送之騂馬縣屬酒泉郡盖魏晉間所置也騂思榮翻吕光新得河西黨叛於内敵攻於外雖數戰數勝而根本不固宜不足以貽子孫也十三年春正月康樂獻武公謝𤣥卒樂音洛康樂縣屬豫章郡二月秦主登軍朝那朝那縣自漢以来屬安定郡後秦主萇軍武都此武都亦當在安定界五代志朝那縣西魏置安武郡安武漢舊縣名武都之名當是因安武而名翟遼遣司馬眭瓊詣燕謝罪眭姓也師古息隨翻類篇宜為翻燕主垂以其數反覆斬瓊以絶之數所角翻遼乃自稱魏天王改元建光置百官燕青州刺史陳留王紹為平原太守辟閭渾所逼退屯黄巾固漢末黄巾保聚于其地因以為名齊人謂壘堡為固紹自厯城退屯焉其地在濟南郡章丘城北燕主垂更以紹為徐州刺史渾蔚之子也辟閭蔚見一百卷穆帝永和十二年蔚紆忽翻因苻氏亂據齊地来降後辟閭渾為慕容徳所殺降户江翻三月乙亥燕主垂以太子寳録尚書事授之以政自總大綱而已燕趙王麟擊許謙破之去年許謙叛燕附劉顯謙犇西燕遂廢代郡悉徙其民於龍城吕光之定涼州也杜進功居多光以為武威太守事見上巻十年貴寵用事羣僚莫及光甥石聰自闗中来光問之曰中州人言我為政何如聰曰但聞有杜進耳不聞有舅光由是忌進而殺之光與羣寮宴語及政事參軍京兆段業曰眀公用灋太峻光曰吳起無恩而楚彊商鞅嚴刑而秦興業曰起喪其身鞅亡其家皆殘酷之致也吴起事見一卷周安王十五年商鞅事見二卷顯王三十一年喪息浪翻眀公方開建大業景行堯舜詩曰髙山仰止景行行止毛萇曰景大也鄭𤣥曰景明庻幾古人有髙徳者則慕仰之有眀行者則而行之行下孟翻猶懼不濟乃慕起鞅之為治治直吏翻豈此州士女所望哉光改容謝之沮渠蒙遜兄弟舉兵所以推段業為重亦由此言為凉州人士所歸敬也夏四月戊午以朱序為都督司雍梁秦四州諸軍事雍州刺史戍洛陽雍於用翻以譙王恬代序為都督兖兾幽并諸軍事青兖二州刺史苑川王國仁破鮮卑越質叱黎於平襄平襄縣漢屬天水郡晉屬畧陽郡越質盖鮮卑部落之號後以為氏獲其子詰歸丁亥燕主垂立夫人段氏為皇后以太子寳領大單于單音蟬段氏右光禄大夫儀之女其妹適范陽王徳儀寳之舅也為後寳逼殺段后張本追諡前妃段氏為成昭皇后段氏死見一百卷穆帝升平二年五月秦太弟懿卒諡曰獻哀翟遼徙屯滑臺遼自黎陽徙屯滑臺既與燕絶欲阻河為固也滑臺城在白馬縣西春秋鄭廩延邑也唐為滑州六月苑川王乞伏國仁卒諡曰宣烈廟號烈祖其子公府尚幼羣下推國仁弟乾歸為大都督大将軍大單于河南王時乞伏氏跨有涼州河南之地遂為國號為後公府殺乾歸張本單音蟬大赦改元太初魏王珪破庫莫奚於弱落水南新唐書曰奚亦東胡種為匈奴所破保烏丸山漢曹操斬蹋頓盖其後也弱落水即饒樂水在奚中秋七月庫莫奚復襲魏營復扶又翻珪又破之庫莫奚者本屬宇文部與契丹同類而異種其先皆為燕王皝所破徙居松漠之間契丹國自西樓東去四十里至真珠塞又東行地勢漸髙西望松林欎然數十里遂入平川契欺訖翻洪邁曰契丹之讀如喫惟新唐書有音種章勇翻秦後秦自春相持屢戰互有勝負至是各觧歸闗西豪傑以後秦久無成功多去而附秦河南王乾歸立其妻邉氏為王后置百官倣漢制以南川矦出連乞都為丞相出連亦以部落之號為氏梁州刺史悌眷為御史大夫金城邉芮為左長史東秦州刺史祕宜為右長史乞㐲氏置東秦州於安南武始翟勍為左司馬勍渠京翻略陽王松夀為主簿從弟軻彈為梁州牧弟益州為秦州牧屈眷為河州牧乞伏乾歸所置州牧不過分居河隴之間從才用翻八月秦主登立子崇為皇太子弁為南安王尚為北海王燕䕶軍将軍平幼㑹章武王宙討吴深破之走保繹幕繹幕縣自漢以来屬清河郡魏王珪隂有圖燕之志遣九原公儀奉使至中山燕主垂詰之曰使疏吏翻詰去吉翻魏王何以不自来儀曰先王與燕並事晉室世為兄弟魏與燕皆鮮卑種也拓㧞力㣲與慕容涉歸並事晉室臣今奉使於理未失垂曰吾今威加四海豈得以昔日為比儀曰燕若不修徳禮欲以兵威自彊此乃將帥之事将即亮翻帥所類翻非使臣所知也儀還言於珪曰燕主衰老太子闇弱范陽王自負材氣是時慕容徳在燕宗室中固自有與人不同者非少主臣也少詩照翻燕主既沒内難必作難乃旦翻於時乃可圖也今則未可珪善之為後魏攻燕張本儀珪母弟翰之子也九月河南王乾歸遷都金城張申攻廣平王祖攻樂陵壬午燕髙陽王隆将兵討之冬十月後秦主萇還安定秦主登就食新平帥衆萬餘圍萇營帥讀曰率四面大哭萇命營中哭以應之登乃退十二月庚子尚書令南康襄公謝石卒燕太原王楷趙王麟将兵㑹髙陽王隆於合口水經衡漳水過勃海建成縣又東左㑹呼沱别河故瀆又東北入清河謂之合口魏收地形志曰浮陽縣西接漳水衡水入焉今謂之合口以擊張申王祖帥諸壘共救之帥讀曰率夜犯燕軍燕人逆擊走之隆欲追之楷麟曰王祖老賊或恐詐而設伏不如俟明隆曰此白地羣盜烏合而来徼幸一决徼堅堯翻非素有約束䏻壹其進退也今失利而去衆莫為用乗勢追之不過數里可盡擒也申之所恃唯在於祖祖破則申降矣降户江翻下同乃留楷麟守申壘隆與平幼分道擊之比明比必利翻及也大獲而還懸所獲之首以示申甲寅申出降祖亦歸罪秦以潁川王同成為太尉同成秦主登之兄十四年春正月燕以陽平王柔鎮襄國遼西王農在龍城五年庻務修舉乃上表曰臣頃因征即鎮農誅餘巖擊髙句麗因鎮龍城見上卷十年所統将士安逸積年青徐荆雍遺冦尚繁雍於用翻願時代還展竭㣲效生無餘力没無遺恨臣之志也庚申燕主垂召農為侍中司𨽻校尉以髙陽王隆為都督幽平二州諸軍事征北大将軍幽州牧建留臺於龍城以隆録留臺尚書事又以䕶軍将軍平幼為征北長史散騎常侍封孚為司馬散悉亶翻騎竒寄翻並兼留臺尚書隆因農舊規修而廣之遼碣遂安遼碣謂遼水碣石碣其謁翻後秦主萇以秦戰屢勝謂得秦王堅之神助亦於軍中立堅像而禱之曰臣兄襄敕臣復讎穆帝升平元年姚襄為秦所殺新平之禍見上卷十年臣行㐮之命非臣罪也苻登陛下疎屬猶欲復讎况臣敢忘其兄乎且陛下命臣以龍驤建業見一百五卷八年驤思将翻臣敢違之今為陛下立像為于偽翻陛下勿追計臣過也秦主登升樓遥謂萇曰為臣弑君而立像求福庸有益乎因大呼曰呼火故翻弑君賊姚萇何不自出吾與汝決之萇不應久之以戰未有利軍中每夜數驚數所角翻乃斬像首以送秦秦主登以河王乾歸為大将軍大單于金城王單音蟬甲寅魏王珪襲髙車破之二月吕光自稱三河王吕光字世明光時有涼州河西之地未能兼有三河也大赦改元麟嘉置百官光妻石氏子紹弟徳世自仇池来至姑臧長安之亂吕光之家奔仇池依楊氏光立石氏為妃紹為世子癸巳魏王珪擊吐突隣部於女水女水在弱落水西去平城三千餘里後魏顯祖改曰武川大破之盡徙其部落而還秦主登留輜重於大界大界當在安定新平之間重直用翻自将輕騎萬餘攻安定羌宻造保克之将即亮翻騎竒寄翻保當作堡夏四月翟遼冦滎陽執太守張卓燕以長樂公盛鎮薊城脩繕舊宫燕主雋初自龍城徙都薊有舊宫在焉樂音洛薊音計五月清河民孔金斬吴深送首中山吴深反事始上卷十一年金城王乾歸擊矦年部大破之於是秦涼鮮卑羌胡多附乾歸乾歸悉授以官爵後秦主萇與秦主登戰數敗數所角翻乃遣中軍将軍姚崇襲大界登邀擊之於安丘魏收地形志安定隂盤縣有安城又敗之敗補邁翻燕范陽王徳趙王麟擊賀訥追犇至勿根山訥窮迫請降降户江翻徙之上谷質其弟染干於中山質音致秋七月以驃騎長史王忱為荆州刺史都督荆益寧三州諸軍驃匹妙翻騎竒寄翻忱是壬翻忱國寳之弟也秦主登攻後秦右将軍吳忠等於平凉克之八月登據茍頭原以逼安定諸將勸後秦主萇决戰萇曰與窮寇競勝兵家之忌也吾将以計取之乃留尚書令姚旻守安定夜帥騎三萬師讀曰率下同襲秦輜重于大界克之重戰輕防此苻登所以敗也重直用翻殺毛后及南安王尚尚秦主登之子也擒名将數十人驅掠男女五萬餘口而還毛氏美而勇善騎射後秦兵入其營毛氏猶彎弓跨馬帥壮士數百人戰衆寡不敵為後秦所執萇将納之毛氏罵且哭曰姚萇汝先已殺天子謂殺秦王堅也今又欲辱皇后皇天后土寧汝容乎萇殺之諸将欲因秦軍駭亂擊之萇曰登衆雖亂怒氣猶盛未可輕也遂止兵勝者驕兵怒者奮以奮乗驕則先敗而後勝者多矣姚萇見兵勢所以收衆而止登收餘衆屯胡空堡萇使姚碩徳鎮安定徙安定千餘家于隂宻遣其弟征南将軍靖鎮之九月庚午以左僕射陸納為尚書令秦主登之東也後秦主萇使姚碩徳置秦州守宰以從弟常戍隴城從才用翻隴城縣漢屬天水郡晉省此時當屬畧陽郡邢奴戍冀城姚詳戍畧陽楊定攻隴冀克之斬常執邢奴詳棄略陽犇隂宻定自稱秦州牧隴西王秦因其所稱而授之冬十月秦主登以竇衝為大司馬都督隴東諸軍事雍州牧雍於用翻楊定為左丞相都督中外諸軍事秦梁二州牧約共攻後秦又約監河西諸軍事并州刺史楊政都督河東諸軍事冀州刺史楊楷各帥其衆㑹長安帥讀曰率下同政楷皆河東人秦主丕既敗政楷收集流民數萬户政據河西楷據湖陕之間遣使請命於秦登因而授之大界既䧟苻登之兵勢衰矣故約竇衝等共攻後秦陕式冉翻使疏吏翻燕樂浪悼王温為兾州刺史燕兾州刺史治信都樂浪音洛琅翟遼遣丁零故堤詐降於温帳何承天姓苑有故姓帳謂帳下乙酉刺温殺之刺七亦翻并其長史司馬驅帥守兵二百户犇西燕燕遼西王農邀擊刺温者於㐮國盡獲之惟堤走免十一月枹罕羌彭奚念附於乞伏乾歸以奚念為北河州刺史枹罕舊為河州治所乞伏氏先于境内置河州以屈眷為牧故以枹罕為北河州以奚念為刺史枹音膚初帝既親政事太元元年崇徳太后歸政帝始親政事威權已出有人主之量已而溺於酒色委事於琅邪王道子道子亦嗜酒日夕與帝以酣歌為事又崇尚浮屠窮奢極費所親暱者皆姏姆僧尼暱尼質翻姏姑三翻老女稱姆莫補翻女師也又音茂左右近習爭弄權柄交通請託賄賂公行官賞濫雜刑獄謬亂尚書令陸納望宫闕歎曰好家居纎兒欲撞壊之邪撞丈降翻纎者小之至言為纎兒謂不及小兒也左衛領營将軍㑹稽許營以左衛将軍領營兵是為左衛領營将軍許營一作榮上疏曰今臺府局吏直衛武官及僕𨽻婢兒取母之姓者官婢私合而生子不能審知其父取母之姓為姓本無鄉邑品第皆得為郡守縣令或帶職在内及僧尼乳母競進親黨又受貨賂輒臨官領衆政教不均㬥濫無罪禁令不明刼盜公行昔年下書敇羣下盡規而衆議兼集無所採用臣聞佛者清逺𤣥虚之神今僧尼往往依傍灋服傍步浪翻謂依傍佛法服僧尼之服而不遵其教也五誡麄灋尚不能遵况精妙乎佛有五戒不淫不盜不殺不妄語不遭酒敗而流惑之徒競加敬事又侵漁百姓取財為恵亦未合布施之道也施式吏翻疏奏不省省悉景翻道子勢傾内外逺近犇湊帝漸不平然猶外加優崇侍中王國寳以讒佞有寵於道子扇動朝衆朝直遥翻諷八座啟道子宜進位丞相揚州牧假黄鉞加殊禮晉氏渡江有吏部祠部五兵左民度支五尚書二僕射一令為八坐䕶軍将軍南平車𦙍曰沈約曰秦時有䕶軍都尉漢陳平為䕶軍中尉盡䕶諸将李廣為驍騎将軍屬䕶軍将軍盖䕶軍䕶諸将軍魏武以韓浩為䕶軍資重為護軍将軍資輕為中䕶軍車尺遮翻此乃成王所以尊周公也今主上當陽人主南面鄉眀而立以治天下故曰當陽非成王之比相王在位豈得為周公乎乃稱疾不署不署名也疏奏帝大怒而嘉𦙍有守中書侍郎范甯徐邈為帝所親信數進忠言數所角翻補正闕失指斥姦黨王國寳甯之甥也甯尤疾其阿諛勸帝黜之陳郡袁恱之有寵於道子國寳使恱之因尼妙音致書於太子母陳淑媛云國寳忠謹宜見親信帝知之發怒以他事斬恱之國寳大懼與道子共譛范甯出為豫章太守甯臨發上疏言今邉烽不舉而倉庫空匱古者使民嵗不過三日記王制古者用民之力嵗不過三日任老者之事食北者之食今之勞擾殆無三日之休至有生兒不復舉養復扶又翻鰥寡不敢嫁娶厝火積薪不足喻也厝火積薪賈誼之言甯又上言中原士民流寓江左嵗月漸久人安其業凡天下之人原其先祖皆隨世遷移何至於今而獨不可謂宜正其封疆户口皆以土斷晉時中原士民南渡者皆於江左僑立郡縣以居之不以土著為斷斷丁亂翻又人性無涯奢儉由勢今并兼之室亦多不贍非其財力不足盖由用之無節爭以靡麗相髙無有限極故也禮十九為長殤以其未成人也未成人而死曰殤其喪禮殺於成人長知兩翻今以十六為全丁十三為半丁所任非復童幼之事任音壬豈不傷天理困百姓乎謂宜以二十為全丁十六為半丁則人無夭折生長繁滋矣夭於兆翻長知兩翻帝多納用之甯在豫章遣十五議曹下屬城豫章領南昌海昏新塗建成望蔡永修建昌吳平豫章彭澤艾康樂豐城新昌宜豐鍾陵十六縣一縣負郭餘十五縣各遣一議曹下遐稼翻採求風政并吏假還訊問官長得失假居訝翻假還謂吏休假日滿而還府者徐邈與甯書曰足下聴斷眀允庶事無滯則吏慎其負負謂罪也吏畏罪則每事加謹斷丁亂翻而人聽不惑矣人聽即民聴晉書史臣避唐太宗諱改民為人通鑑因之豈須邑至里詣飾其㳺聲哉非徒不足致益寔乃蠶漁之所資蠶漁謂所遣者蠶食漁取於民鄭𤣥曰趙魏之東寔實同聲寔是也詩實墉實壑實畝實籍實當作寔言韓矦之先祖㣲弱所受之國多滅絶今復舊職繼絶世故築治是城修是壑井牧是田畝收歛是賦稅使如故常孔穎達曰凡言實者已有其事而後實之今此方說所為不宜為實故轉為寔訓之為是也趙魏之東寔實同聲鄭以時事驗之也春秋桓六年州公寔来是由聲同故字有變異也余按徐邈所謂寔訓之為是於義亦通豈有善人君子而干非其事多所告白者乎自古以来欲為左右耳目無非小人皆先因小忠而成其大不忠先藉小信而成其大不信遂使讒謟並進善惡倒置可不戒哉足下慎選綱紀郡以僚佐為綱紀必得國士以攝諸曹諸曹皆得良吏以掌文按攝總也整也按據也文按謂諸曹文書留為按據者又擇公方之人以為監司監工銜翻則清濁能否與事而眀足下但平心處之處昌吕翻何取於耳目哉昔眀徳馬后未嘗顧左右與言漢眀帝后馬氏諡眀徳皇后可謂逺識況大丈夫而不能免此乎十二月後秦主萇使其東門将軍任瓫東門将軍萇使守安定東門者也任音壬瓫與盆同音蒲奔翻詐遣使招秦主登許開門納之使疏吏翻登将從之征東将軍雷惡地将兵在外将即亮翻聞之馳騎見登騎竒寄翻曰姚萇多詐不可信也登乃止萇聞惡地詣登謂諸将曰此羌見登事不成矣登以惡地勇略過人隂憚之惡地懼降於後秦降戸江翻萇以惡地為鎮軍将軍秦以安成王廣為司徒十五年春正月乙亥譙敬王恬薨西燕主永引兵向洛陽朱序自河隂北濟河擊敗之敗補邁翻序追至白水水經注白水出上黨髙都縣故城西東流厯天井闗序所至處去長子一百六十里㑹翟遼謀向洛陽序乃引兵還擊走之留膺揚将軍朱黨戍石門使其子畧督䕶洛陽以參軍趙蕃佐之身還襄陽琅琊王道子恃寵驕恣侍宴酣醉或虧禮敬帝益不能平欲選時望為藩鎮以潜制道子問於太子左衛率王雅曰吾欲用王恭殷仲堪何如雅曰王恭風神簡貴志氣方嚴仲堪謹於細行行下孟翻以文義著稱然皆峻狭自是且幹略不長若委以方面天下無事足以守職若其有事必為亂階矣帝不從為後王殷稱兵張本恭藴之子王藴后父也仲堪融之孫也殷融見九十六卷成帝咸康五年二月辛巳以中書令王恭為都督青兖幽并兾五州諸軍事兖青二州刺史鎮京口三月戊辰大赦後秦主萇攻秦扶風太守齊益男於新羅堡克之益男走秦主登攻後秦天水太守張業生於隴東隴東安定涇陽縣之地萇救之登引去夏四月秦鎮東将軍魏掲飛自稱衝天王晉書載紀作魏褐飛太元元年秦遣庭中将軍魏曷飛擊氐羌意即此人也帥氐胡攻後秦安北将軍姚當成於杏城帥讀曰率鎮軍将軍雷惡地叛應之攻鎮東将軍姚漢得於李潤李潤地名在邢望李延夀曰馮翊東有李潤鎮按魏書宗室列傳安定王變除華州刺史表曰謹惟州居李潤堡雖是少梁舊地晉芮錫壌然胡夷内附遂為戎落請徙馮翊古城後秦主萇欲自擊之羣臣皆曰陛下不憂六十里苻登時登趣長安據新豐之千户固乃憂六百里魏掲飛何也萇曰登非可猝滅吾城亦非登所䏻猝拔惡地智畧非常若南引掲飛東結董成董成屠各種也時據北地得杏城李潤而據之長安東北非吾有也乃潜引精兵一千六百赴之掲飛惡地有衆數萬氐胡赴之者前後不絶萇每見一軍至輒喜羣臣怪而問之萇曰掲飛等扇誘同惡種類甚繁種章勇翻吾雖克其魁帥帥所類翻餘黨未易猝平易以䜴翻今烏集而至吾乗勝取之可一舉無餘也此曹操取馬超韓遂故智耳掲飛等見後秦兵少少詩沼翻悉衆攻之萇固壘不戰示之以弱潜遣其子中軍将軍崇帥騎數百出其後掲飛兵擾亂萇遣鎮逺将軍王超等縱兵擊之斬掲飛及其将士萬餘級惡地請降降户江翻萇待之如初惡地謂人曰吾自謂智勇傑出一時而每遇姚翁輒困固其分也分扶問翻史言姚萇能服雷惡地之心萇命姚當成於所營之地每柵孔中輒樹一木以旌戰功掘地作孔豎木以為柵故有柵孔嵗餘問之當成曰營地太小已廣之矣萇曰吾自結髪以来與人戰未嘗如此之快以千餘兵破三萬之衆營地惟小為竒豈以大為貴哉吐谷渾視連遣使獻見於金城王乾歸乾歸拜視連沙州牧白蘭王河西張茂以燉煌晉昌西域都䕶校尉玉門大䕶軍三郡三營為沙州吐谷渾未能有其地也李延夀曰此以吐谷渾部内有黄沙周迴數百里不生草木因號沙州使疏吏翻見賢遍翻丙寅魏王珪㑹燕趙王麟於意辛山意辛山在牛川北賀蘭部所居也據北史踰隂山而北即賀蘭部擊賀蘭紇突鄰紇奚三部破之紇突鄰紇奚皆降於魏史言燕為魏驅除降户江翻秋七月馮翊人郭質起兵於廣鄉以應秦魏收地形志鄭縣有廣鄉原鄭縣時屬京兆移檄三輔曰姚萇凶虐毒被神人被皮義翻吾屬世䝉先帝堯舜之仁先帝謂秦主堅非常伯納言之子常伯侍中也納言尚書也即卿校牧守之孫也校户教翻與其含恥而存孰若蹈道而死於是三輔壁壘皆應之獨鄭縣人茍曜聚衆數千附於後秦秦以質為馮翊太守後秦以曜為豫州刺史茍曜後持兩端為後秦所殺事見後劉衛辰遣子直力鞮攻賀蘭部賀訥困急謂降於魏丙子魏王珪引兵救之直力鞮退鞮田黎翻珪徙訥部落處之東境處昌吕翻八月劉牢之擊翟釗於鄄城釗走河北又敗翟遼於滑臺張願来降翟遼張願叛見上卷十一年走音奏敗補邁翻鄄音絹九月北平人吴柱聚衆千餘立沙門灋長為天子破北平郡轉冦廣都入白狼城白狼縣前漢屬右北平郡後漢晉省魏收地形志後漢真君八年置建徳郡治白狼城廣都縣屬焉燕時當屬北平郡燕幽州牧髙陽王隆方𦵏其夫人郡縣守宰皆㑹之衆聞柱反請隆還城遣大兵討之隆曰今閭閻安業民不思亂柱等以詐謀惑愚夫誘脅相聚無䏻為也誘音酉遂留葬訖遣廣平太守廣都令先歸廣平當作北平續遣安昌矦進将百餘騎趨白狼城趨七喻翻柱衆聞之皆潰窮捕斬之以侍中王國寳為中書令俄兼中領軍道子主之也丁未以吴郡太守王珣為尚書右僕射吐谷渾視連卒子視羆立視羆以其父祖慈仁為四鄰所侵侮吐谷渾辟奚視連慈仁見一百三卷簡文帝咸安元年乃督厲将士欲建功業冬十月金城王乾歸遣使拜視羆沙州牧白蘭王視羆不受為後乞伏乾歸伐吐谷渾張本十二月郭質及茍曜戰于鄭東質敗犇洛陽鄭東鄭縣之東也越質詰歸據平襄叛金城王乾歸十三年越質詰歸附于乞伏氏十六年春正月燕置行臺於薊加長樂公盛録行臺尚書事薊音計樂音洛金城王乾歸擊越質詰歸詰歸降降户江翻乾歸以宗女妻之妻七細翻賀染干謀殺其兄訥訥知之舉兵相攻魏王珪告于燕請為鄉導以討之鄉讀曰嚮二月甲戌燕主垂遣趙王麟将兵擊訥鎮北将軍蘭汗帥龍城之兵擊染干賀染干部落盖居賀蘭部之東偏故燕以龍城之兵擊之将即亮翻帥讀曰率三月秦主登自雍攻後秦安東将軍金榮于范氏堡克之雍於用翻遂渡渭水攻京兆太守韋範于段氏堡不克進據曲牢曲牢在杜縣東北夏四月燕蘭汗破賀染干於牛都都聚也其地當在牛川夷人放牧於此聚㑹因名茍曜有衆一萬宻召秦主登許為内應登自曲牢向繁川繁川盖即杜陵縣之樊川也軍于馬頭原五月後秦主萇引兵逆戰登擊破之斬其右将軍吳忠萇收衆復戰復扶又翻下同姚碩徳曰陛下慎於輕戰每欲以計取之今戰失利而更前逼賊何也萇曰登用兵遲緩不識虚實今輕兵直進遥據吾東馬頭原之地盖在長安東此必茍曜豎子與之有謀也善用兵者觀敵之動而察知其情是以䏻制勝緩之則其謀得成故及其交之未合急擊之以敗散其事耳敗補邁翻遂進戰大破之登退屯於郿郿音媚今音眉秦兖州刺史强金槌據新平降後秦以其子逵為質强其兩翻降户江翻質音致後秦主萇将數百騎入金槌營羣丁諫之萇曰金槌既去苻登又欲圖我将安所歸乎且彼初来欵附宜推心以結之奈何復以不信疑之乎復扶又翻既而羣氐欲取萇金槌不從强金槌氐種秦之戚黨也姚萇推心待之以攜符登之黨六月甲辰燕趙王麟破賀訥於赤城禽之水經河水自雲中楨陵縣南過赤城東又南過定襄桐過縣西又魏書帝紀登國三年幸東赤城明元泰常八年築長城於長川之南起自赤城西至五原延袤二千餘里降其部落數萬降户江翻燕主垂命麟歸訥部落徙染干於中山麟歸言於垂曰臣觀拓跋珪舉動終為國患不若攝之還朝使其弟監國事垂不從攝録也收也慕容麟之姦詐知拓跋珪之終不可制而慕容垂不從其言天将啟珪以滅燕雖以垂之明畧不知覺也監工銜翻西燕主永冦河南太守楊佺期擊破之秋七月壬申燕主垂如范陽范陽縣漢屬涿郡魏文帝改涿郡為范陽郡魏王珪遣其弟觚獻見於燕見賢遍翻燕主垂衰老子弟用事留觚以求良馬魏王珪弗與遂與燕絶為燕魏搆難張本使長史張衮求好於西燕好呼到翻觚逃歸燕太子寳追獲之垂待之如初秦主登攻新平後秦主萇救之登引去秦驃騎将軍沒奕干驃匹妙翻騎竒寄翻以其二子為質於金城王乾歸質音致請共擊鮮卑大兠乾歸與沒奕干攻大兠於鳴蟬堡克之據載記大兠時據安陽城安陽城在唐秦州隴城縣界鳴蝉堡亦當在其地兠微服走乾歸收其部衆而還還從宣翻又如字歸沒奕干二子沒奕干尋叛東合劉衛辰八月乾歸帥騎一萬討沒奕干帥讀曰率沒奕干犇他樓城他樓城在髙平唐太宗貞觀六年以突厥降户置縁州治平髙之他樓城髙宗置他樓縣後入原州蕭闗縣界乾歸射之中目射而亦翻中竹仲翻九月癸未以尚書右僕射王珣為左僕射太子詹事謝琰為右僕射太學博士范𢎞之論殷浩宜加贈諡因叙桓温不臣之迹是時桓氏猶盛王珣温之故吏也王珣先為温府主簿以為温廢昏立眀有忠貞之節黜𢎞之為餘杭令餘杭縣漢屬㑹稽郡顧来曰縣秦始皇立後漢分屬吳郡吳分屬吳興郡𢎞之汪之孫也范汪得罪於桓温見一百一卷哀帝升平五年冬十月壬辰燕主垂還中山自范陽還也初柔然部人世服於代魏收曰神元之末掠騎得一奴髪始齊肩忘本姓名其主字之曰木骨閭木骨閭者首禿也木骨閭與郁久閭聲相近故後子孫因以為氏木骨閭既壮免奴為騎卒穆帝時坐後期當斬亡匿廣漠谿谷間收合逋逃得百餘人依紇突鄰木骨閭死子車鹿㑹雄健始有部衆自號柔然其大人郁久閭地粟袁卒部落分為二長子匹候跋繼父居東邉次子緼紇提别居西邉長知兩翻緼於粉翻紇户骨翻秦主堅滅代滅代見一百四卷元年柔然附於劉衛辰及魏王珪即位攻擊髙車等諸部率皆服從獨柔然不事魏戊戌珪引兵擊之柔然舉部遁走珪追犇六百里諸将因張衮言於珪曰賊逺糧盡不如早還珪問諸将若殺副馬為三日食足乎凡北人用騎兵各乗一馬又有一馬為副馬皆曰足乃復倍道追之及於大磧南牀山下是時魏盛跨有代北柔然西犇南牀山盖在大磧之西北史帝紀作南商山復扶又翻大破之虜其半部匹􅇋跋及别部帥屋擊各收餘衆遁走帥所類翻珪遣長孫嵩長孫肥追之珪謂将佐曰卿曹知吾前問三日糧意乎曰不知也珪曰柔然驅畜産犇走數日至水必留我以輕騎追之計其道里不過三日及之矣皆曰非所及也嵩追斬屋擊於平望川肥追匹􅇋跋至涿邪山匹􅇋跋舉衆降降户江翻下同獲緼紇提之子曷多汗汗音寒兄子社崘斛律等宗黨數百人崘盧昆翻緼紇提将奔劉衛辰珪追及之緼紇提亦降珪悉徙其部衆於雲中為社崘復叛去而建國張本翟遼卒子釗代立改元定鼎攻燕鄴城燕遼西王農擊却之為燕滅翟釗張本三河王光遣兵乗虚伐金城王乾歸乗其伐沒奕干之虚也乾歸聞之引兵還光兵亦退劉衛辰遣子直力鞮帥衆八九萬攻魏南部鞮田黎翻又丁奚翻帥讀曰率十一月己夘魏王珪引兵五六千人拒之壬午大破直力鞮於鐵岐山南直力鞮單騎走騎竒寄翻下同乗勝追之戊子自五原金津南濟河金津當在五原郡宜梁九原二縣間徑入衛辰國衛辰部落駭亂辛夘珪直抵其所居恱跋城考之載記恱跋城即代来城也衛辰父子出走壬辰分遣諸將輕騎追之将軍伊謂禽直力鞮於木根山魏書官氏志拓跋鄰以次弟為伊婁氏後改為伊氏木根山在五原河西衛辰為其部下所殺十二月珪軍于鹽池漢地理志五原郡成宜縣有鹽官唐鹽州五原縣有烏白等池鹽宋白曰青白鹽池在鹽州北誅衛辰宗黨五千餘人皆投尸于河報元年衛辰藉兵於秦以滅代之怨也自河以南諸部悉降降户江翻獲馬三十餘萬匹牛羊四百餘萬頭國用由是遂饒衛辰少子勃勃亡犇薛于部少詩照翻珪使人求之薛于部帥太悉仗出勃勃以示使者曰帥所類翻使疏吏翻勃勃國破家亡以窮歸我我寧與之俱亡何忍執以與魏乃送勃勃於沒奕干沒奕干以女妻之為勃勃殺沒奕干復建國張本妻七細翻戊申燕主垂如魯口秦主登攻安定後秦主萇如隂宻以拒之謂太子興曰茍曜聞吾北行自長安如隂宻為北行必来見汝汝執誅之曜果見興於長安興使尹緯讓而誅之善制敵者䏻因事而為功茍曜反覆於苻姚之間而長安去鄭二百里耳此姚氏腹脇之癰疽也使萇召之曜必不来萇在長安曜亦畏憚而不敢来萇外出以誘之曜亦疑而不敢来二秦交兵邉遽狎至萇之北行若不得已者茍曜無疑畏之心謂姚興居守為無䏻為者輕於一来卒以送死姚氏腹脇之疾去矣此非䏻因事而為功乎萇敗登於安定城東敗補邁翻登退據路承堡路承人姓名築堡自守時因以為名萇置酒髙㑹諸将皆曰若值魏武王姚萇僣號追諡兄襄為魏武王不令此賊至今陛下将牢太過耳将牢謂先自固而不妄動也猶今人之言把穩萇笑曰吾不如亡兄有四身長八尺五寸長直亮翻臂垂過膝人望而畏之一也将十萬之衆與天下爭衡望麾而進前無横陳二也将即亮翻陳讀曰陣温古知今講論道藝收羅英雋三也董帥大衆上下咸恱人盡死力四也帥讀曰率所以得建立功業驅䇿羣賢者正望筭略中有片長耳羣臣咸稱萬嵗資治通鑑卷一百七
