body:
  text: 資治通鑑卷二百六十五宋司馬光撰胡三省音註唐紀八十一起閼逢困敦五月盡柔兆攝提格凡二年有竒昭宗聖穆景文孝皇帝下之下天祐元年五月丙寅加河陽節度使張漢瑜同平章事帝宴朱全忠及百官於崇勲殿時以洛陽宫前殿為貞觀殿内朝為崇勲殿既罷復召全忠宴於内殿復扶又翻全忠疑不入帝曰全忠不欲來可令敬翔來全忠擿翔使去曰翔亦醉矣全忠疑帝欲圖已敬翔其腹心也故亦不使之入擿它狄翻辛未全忠東還還從宣翻又如字乙亥至大梁忠義節度使趙匡凝遣水軍上峽攻王建䕫州趙匡凝以襄陽之甲窺䕫門䕫在三峽上游泝流攻之故曰上峽上時掌翻知渝州王宗阮等擊敗之萬州刺史張武作鐵絙絶江中流立柵於兩端謂之鏁峽敗補邁翻絙古恒翻鏁即鎖字六月李茂貞王建李繼徽傳檄合兵以討朱全忠全忠以鎮國節度使朱友裕為行營都綂將步騎擊之當是時蜀兵不出朱全忠之兵力不能及也令朱友裕擊岐邠耳命保大節度使劉鄩弃鄜州引兵屯同州劉鄩在鄜州逼近李茂貞繼徽聲援不接故使弃鄜還屯同州與朱友裕合埶鄜音夫癸丑全忠引兵自大梁西討茂貞等秋七月甲子過東都入見見賢遍翻壬申至河中西川諸將勸王建乗李茂貞之衰攻取鳯翔建以問節度判官馮涓涓圭淵翻涓曰兵者凶器殘民耗財不可窮也言不可窮兵極其兵力好戰不休是窮兵也今梁晉虎爭勢不兩立梁朱全忠晉李克用若併而為一舉兵向蜀雖諸葛亮復生不能敵矣復扶又翻鳯翔蜀之藩蔽不若與之和親結為婚姻無事則務農訓兵保固疆埸易音亦有事則覘其機事觀舋而動可以萬全覘丑廉翻又丑艷翻舋許覲翻建曰善茂貞雖庸才然有强悍之名悍下罕翻又侯旰翻逺近畏之與全忠力爭則不足自守則有餘使為吾藩蔽所利多矣乃與茂貞修好王建既併山南諸州阻關而守關外倚李茂貞為藩蔽故與之修好好呼到翻丙子茂貞遣判官趙鍠如西川為其姪天雄節度使繼勲求昏鍠户盲翻為于偽翻此天雄軍治秦州屬李茂貞建以女妻之妻七細翻茂貞數求貨及甲兵於建建皆與之墮軍實以厚寇讐豈王建之本心哉倚以自蔽不厭其數也數所角翻王建賦斂重人莫敢言馮涓因建生日獻頌先美功徳後言生民之苦建愧謝曰如君忠諫功業何憂賜之金帛自是賦斂稍損史言馮涓因獻頌而進規故其諌易入斂力贍翻初朱全忠自鳯翔迎車駕還見二百六十三卷天復三年還從宣翻又如字見徳王裕眉目疎秀且年齒已壯惡之惡烏路翻全忠欲簒利立庸㓜徳王裕貌秀而齒長立之非已之利也故惡之私謂崔𦙍曰徳王嘗奸帝位謂為劉季述所立也事見二百六十二卷光化三年天復元年豈可復留奸音于復扶又翻公何不言之𦙍言於帝帝問全忠全忠曰陛下父子之間臣安敢竊議此崔𦙍賣臣耳史言朱全忠之狡猾帝自離長安日憂不測與皇后終日沈飲或相對涕泣離力智翻是年正月壬戌帝離長安而東沈持林翻全忠使樞密使蔣𤣥暉伺察帝動靜皆知之伺相吏翻帝從容謂𤣥暉曰徳王朕之愛子全忠何故堅欲殺之因泣下齧中指血流𤣥暉具以語全忠史言昭宗之輕脱以速禍從千容翻齧五結翻語牛倨翻全忠愈不自安時李茂貞楊崇本李克用劉仁恭王建楊行密趙匡凝移檄往來皆以興復為辭全忠方引兵西討西討岐邠以帝有英氣恐變生於中欲立㓜君易謀禪代易以豉翻乃遣判官李振至洛陽與𤣥暉及左龍武綂軍朱友恭右龍武綂軍氏叔琮等圖之八月壬寅帝在椒殿椒殿皇后殿也史炤曰椒殿亦猶椒房之稱𤣥暉選龍武牙官史太等百人夜叩宫門言軍前有急奏軍前謂西討行營軍前也欲面見帝夫人裴貞一開門見兵曰急奏何以兵為史太殺之𤣥暉問至尊安在昭儀李漸榮臨軒呼曰呼火故翻寧殺我曹勿傷大家帝方醉遽起單衣繞柱走史太追而弑之年三十八漸榮以身蔽帝太亦殺之又欲殺何后后求哀於𤣥暉乃釋之何后祈生于蔣𤣥暉而卒以𤣥暉死屈節以茍嵗月之生豈若以身殉昭宗之不失節也癸卯蔣𤣥暉矯詔稱李漸榮裴貞一弑逆宜立輝王祚為皇太子更名柷更工衡翻柷昌六翻監軍國事監古衘翻又矯皇后令太子於柩前即位宫中恐懼不敢出聲哭丙午昭宣帝即位時年十三李克用復以張承業為監軍李克用匿張承業見上卷天復三年監古衘翻淮南將李神福攻鄂州未下天復三年李神福始攻鄂州天祐元年又攻卾州事並見上卷㑹疾病還廣陵楊行密以舒州團練使泌陽劉存代為招討使泌陽漢湖陽縣地後魏置石馬縣後訛為上馬貞觀元年廢開元十六年復割湖陽置上馬縣天寳元年改曰泌陽屬唐州宋白曰泌陽縣本漢舞隂縣地云云同上唐改泌陽以地在泌水之陽也唐州治焉泌兵媚翻神福尋卒宣州觀察使臺濛卒卒子恤翻楊行密以其子牙内諸軍使渥為宣州觀察使右牙都指揮使徐温謂渥曰王寢疾而嫡嗣出藩此必姦臣之謀它日相召非温使者及王令書慎無亟來諸侯下令于境内謂之令書以異於天子所下制詔敕之書也亟紀力翻為徐温召渥張本渥泣謝而行九月己巳尊皇后為皇太后朱全忠引兵北屯永壽南至駱谷軍永壽所以致邠兵自此而南至駱谷所以致岐兵鳯翔邠寧兵竟不出辛未東還冬十月辛卯朔日有食之朱全忠聞朱友恭等弑昭宗陽驚號哭號户刀翻自投於地曰奴輩負我令我受惡名於萬代癸巳至東都自軍前東還至東都伏梓宫慟哭流涕又見帝自陳非已志請討賊帝昭宣帝也賊弑君之賊先是䕶駕軍士有掠米於市者先悉薦翻甲午全忠奏朱友恭氏叔琮不戢士卒侵擾市肆以此為二人罪猶不敢昌然以弑逆之罪罪之友恭貶崖州司户復姓名李彦威李彦威夀州人客汴州殖財任俠朱全忠愛而子之考異見二百五十九卷景福二年叔琮貶白州司户尋皆賜自盡彦威臨刑大呼曰賣我以塞天下之謗呼火故翻塞悉則翻如鬼神何行事如此望有後乎丙申天平節度使張全義來朝丁酉復以全忠為宣武䕶國宣義天平節度使以全義為河南尹兼忠武節度使判六軍諸衛事朱全忠兼忠武張全義帥天平見上卷上年朱友恭氏叔琮既誅以全義領宿衞乙巳全忠辭赴鎮庚戌至大梁鎮國節度使朱友裕薨於棃園死于梨園行營光州叛楊行密降朱全忠降户江翻行密遣兵圍之與鄂州皆告急於全忠楊行密使其將劉存攻杜洪於鄂州十一月戊辰全忠自將兵五萬自潁州濟淮自潁州潁上縣取正陽濟淮軍于霍丘九域志霍丘縣在夀州東一百二十七里按元豐之壽州治下蔡分兵救鄂州淮南兵釋光州之圍還廣陵按兵不出戰全忠分命諸將大掠淮南以困之錢鏐潜遣衢州羅城使葉讓殺刺史陳璋事泄錢鏐恨陳璋見二百六十三卷天復二年十二月璋斬讓而叛降于楊行密降户江翻初馬殷弟賨性沈勇賨徂宗翻沈持林翻事孫儒為百勝指揮使以百戰百勝名軍儒死事楊行密屢有功遷黒雲指揮使行密嘗從容問其兄弟從千容翻乃知為殷之弟大驚曰吾常怪汝器度瓌偉瓌古回翻果非常人當遣汝歸賨泣辭曰賨淮西殘兵馬賨從秦宗權孫儒起于淮西故云然大王不殺而寵任之湖南地近嘗得兄聲問賨事大王久不願歸也行密固遣之是歲賨歸長沙行密親餞之郊賨至長沙殷表賨為節度副使它日殷議入貢天子賨曰楊王地廣兵彊楊行密封吳王故稱之與吾鄰接不若與之結好好呼到翻大可以為緩急之援小可通商旅之利殷作色曰楊王不事天子一旦朝廷致討罪將及吾汝置此論勿為吾禍史言馬殷畏朱全忠初清海節度使徐彦若遺表薦副使劉隱權留後事見二百六十二卷天復元年朝廷以兵部尚書崔逺為清海節度使逺至江陵聞嶺南多盜且畏隱不受代不敢前朝廷召逺還隱遣使以重賂結朱全忠乃奏以隱為清海節度使史言劉隱自託于朱全忠昭宣光烈孝皇帝諱祚即位更名柷昭宗第九子後唐明宗天成三年立廟于曹州四年乃追崇諡號天祐二年春正月朱全忠遣諸將進兵逼壽州是時壽州治壽春朱全忠自霍丘遣諸將進逼之潤州團練使安仁義勇決得士心故淮南將王茂章攻之踰年不克王茂章攻潤州事始上卷天復三年八月楊行密使謂之曰汝之功吾不忘也安仁義歸楊行密破趙鍠孫儒平宣潤皆有功能束身自歸當以汝為行軍副使但不掌兵耳仁義不從茂章為地道入城遂克之仁義舉族登樓衆不敢逼安仁義在淮南軍中號最善射衆憚之故不敢逼先是攻城諸將見仁義輒罵之先悉薦翻惟李徳誠不然至是仁義召徳誠登樓謂曰汝有禮吾今以為汝功且以愛妾贈之徳誠掖之而下并其子斬于廣陵市田頵朱延壽安仁義淮南諸將中之鎗鎗者也三叛連衡不足以病楊行密朞年之餘相次禽殄行密未易才也兩浙兵圍陳詢于睦州陳詢叛錢鏐事始上卷天復三年楊行密遣西南招討使陶雅將兵救之軍中夜驚士卒多踰壘亡去左右及禆將韓球奔告之雅安臥不應須臾自定亡者皆還史言御衆之術惟静足以制動錢鏐遣其從弟鎰及指揮使顧全武王球禦之為雅所敗從才用翻鎰夷質翻敗補邁翻虜鎰及球以歸庚午朱全忠命李振知青州事代王師範朱全忠寛西顧之虞然後命李振代王師範全忠圍壽州州人閉壁不出全忠乃自霍丘引歸朱全忠遣諸將逼毒州城下而留屯霍丘為後勢二月辛卯至大梁霍丘至大梁九百餘里李振至青州王師範舉族西遷至濮陽素服乗驢而進至濮陽已入朱全忠巡屬故囚服乘驢以請罪濮博木翻至大梁全忠客之表李振為青州留後戊戌以安南節度使同平章事朱全昱為太師致仕全昱全忠之兄也戇樸無能戇竹巷翻先領安南全忠自請罷之是日社自古以來以戊日社戊土也立春以後歴五戊則社日全忠使蔣𤣥暉邀昭宗諸子徳王裕棣王祤䖍王禊沂王禋遂王禕景王祕祁王琪雅王􅐃􅐃之人翻瓊王祥置酒九曲池九曲池在洛苑中酒酣悉縊殺之投尸池中朱全忠遣其將曹延祚將兵與杜洪共守鄂州庚子淮南將劉存攻拔之天復二年正月淮南兵攻鄂州踰兩朞而後克執洪延祚及汴兵千餘人送廣陵悉誅之僖宗光啓二年杜洪據鄂州至是而亡行密以存為鄂岳觀察使已酉葬聖穆景文孝皇帝於和陵和陵在河南緱氏縣懊來山是年更名太平山廟號昭宗三月庚午以王師範為河陽節度使戊寅以門下侍郎同平章事獨孤損同平章事充靜海節度使罷獨孤損政事耳靜海軍治交州在嶺海之外損安得至邪以禮部侍郎河間張文蔚同平章事蔚紆勿翻甲申以門下侍郎同平章事裴樞為左僕射崔逺為右僕射並罷政事初栁璨及第不四年為宰相性傾巧輕佻佻它彫翻時天子左右皆朱全忠腹心璨曲意事之同列裴樞崔逺獨孤損皆朝廷宿望意輕之璨以為憾和王傅張廷範和王福亦昭宗之子本優人有寵于全忠奏以為太常卿樞曰廷範勲臣幸有方鎮言幸有方鎮可以處之何藉樂卿太常卿掌禮樂故曰樂卿言勲人處之之職當各當其分不藉樂卿以榮恐非元帥之㫖朱全忠時為諸道元帥故稱之持之不下下户嫁翻全忠聞之謂賔佐曰吾常以裴十四器識真純不入浮薄之黨裴樞第十四觀此議論本態露矣言其猶持清議也璨因此并逺損譖於全忠故三人皆罷以吏部侍郎楊涉同平章事渉收之孫也楊收見懿宗紀為相以罪貶死為人和厚恭謹聞當為相與家人相泣謂其子凝式曰此吾家之不幸也必為汝累累良瑞翻加清海節度使劉隱同平章事壬辰河東都押牙葢寓卒遺書勸李克用省營繕薄賦斂求賢俊史言葢寓垂歿不忘效忠於李克用葢古盍翻姓也省所景翻夏四月庚子有彗星出西北彗祥歳翻又徐醉翻又音歲淮南將陶雅㑹衢睦兵攻婺州光化三年田頵取婺州既而頵為楊行密所攻錢鏐取婺州使沈夏守之錢鏐使其弟鏢將兵救之鏢匹燒翻五月禮院奏皇帝登位應祀南郊敕用十月甲午行之為朱全忠殺栁璨蔣𤣥暉張本乙丑彗星長竟天彗所以除舊布新易姓之徴也薛居正五代史曰是年正月甲辰有彗出于北河貫文昌其長三文餘五月乙丑復出軒轅大角及于天市垣光耀嚴猛栁璨恃朱全忠之勢恣為威福會有星變占者曰君臣俱災宜誅殺以應之璨因疏其素所不快者於全忠曰此曹皆聚徒横議怨望腹非横户猛翻非亦作誹宜以之塞災異塞悉則翻李振亦言於朱全忠曰朝廷所以不理良由衣冠浮薄之徒紊亂綱紀紊音問且王欲圖大事謂簒奪也此曹皆朝廷之難制者也不若盡去之去羌吕翻全忠以為然癸酉貶獨孤損為棣州刺史裴樞為登州刺史崔逺為萊州刺史乙亥貶吏部尚書陸扆為濮州司户工部尚書王溥為淄州司户庚辰貶太子太保致仕趙崇為曹州司户兵部侍郎王賛為濰州司户濰音維唐武徳二年分青州北海縣置濰州八年州廢以北海還屬青州此時葢復置濰州也自餘或門胄髙華或科第自進居三省臺閣以名檢自處處昌吕翻聲迹稍著者皆指為浮薄貶逐無虛日搢紳為之一空為于偽翻辛巳再貶裴樞為瀧州司户劉昫曰瀧州治瀧水縣本漢端溪縣地晉分端溪立龍鄉縣隋改龍鄉為平原縣又改為瀧水唐平蕭銑置瀧州瀧閭江翻獨孤損為瓊州司户崔逺為白州司户甲申忠義節度使趙匡凝遣使修好於王建趙匡凝東結淮南西通巴蜀欲交隣以抗朱全忠也適以動朱全忠之兵好呼到翻六月戊子朔敕裴樞獨孤損崔逺陸扆王溥趙崇王賛等並所在賜自盡時全忠聚樞等及朝士貶官者三十餘人於白馬驛白馬驛在滑州白馬縣一夕盡殺之投尸于河初李振屢舉進士竟不中第中竹仲翻故深疾搢紳之士言於全忠曰此輩常自謂清流宜投之黄河使為濁流全忠笑而從之振毎自汴至洛朝廷必有竄逐者時人謂之鴟梟朝直遥翻下同梟堅堯翻見朝士皆頥指氣使以頥指麾以氣使令言其怙朱全忠之勢而肆其驕豪也旁若無人全忠嘗與僚佐及遊客坐於大栁之下全忠獨言曰此栁宜為車轂轂古鹿翻衆莫應有遊客數人起應曰宜為車轂全忠勃然厲聲曰書生輩好順口玩人皆此類也好呼到翻言順口附和以玩狎人車轂須用夾榆説文榆白枌所謂夾榆乃今之田榆也生田塍間其皮類槐其肉理堅緻而赤鋸以為器堅而耐久車轂衆輻所湊其木宜堅緻者吕俛曰櫅榆宜作車轂爾雅云白棗也櫅相稽翻栁木豈可為之顧左右曰尚何待左右數十人捽言宜為車轂者悉撲殺之捽昨没翻撲弼角翻己丑司空致仕裴贄貶青州司户尋賜死栁璨餘怒所注猶不啻十數張文蔚力解之乃止時士大夫避亂多不入朝壬辰敕所在州縣督遣無得稽留前司勲員外郎李延古徳裕之孫也去官居平泉莊李徳裕有平泉莊在河南府界徳裕平泉記曰先公眺想屬注伊川吾于是有退居河洛之志於龍門得喬處士故居翦荆棘驅狐狸而為之康駢曰平泉莊去洛城三十里詔下未至責授衞尉寺主簿秋七月癸亥太子賔客致仕栁遜貶曹州司馬庚午夜天雄牙將李公佺與牙軍謀亂羅紹威覺之公佺焚府舍剽掠奔滄州為羅紹威誅牙將張本佺且縁翻剽匹妙翻時劉守文據滄州八月王建遣前山南西道節度使王宗賀等將兵擊昭信節度使馮行襲於金州馮行襲附朱全忠朱全忠以趙匡凝東與楊行密交通西與王建結昏乙未遣武寧節度使楊師厚將兵撃之己亥全忠以大軍繼之月考異曰梁太祖實録薛居正五代史梁記皆云七南庚午遣楊師厚帥前軍討趙匡凝于襄州辛未帝征唐實録七月全忠奏匡凝擅通好西川淮南又遣弟專領荆南請削奪官爵已遣都將楊師厚討之翌日全忠自帥軍以進編遺録八月壬辰先抽武寧楊師厚是日到乃議伐襄州帥趙匡凝乙未大發車徒委楊師厚總其軍政乙亥上領親從步騎繼大軍之後是夜宿尉氏今從之薛史太祖將圖禪代以匡凝兄弟並據藩鎮乃遣使先諭㫖焉凝對使者流涕荅以受國恩深豈敢隨時妄有它志使者復命太祖大怒天祐二年秋七月遣楊師厚帥師討之辛未全忠南征表匡凝罪狀請削官爵按全忠劫遷昭宗於洛陽匡凝與行密等移檄諸道共討之全忠安肯以禪代問之今不取處州刺史盧約使其弟佶攻䧟温州佶巨乙翻紀考異曰新紀正月約陷温州十國年在此月戊戌今從之張惠奔福州犬復三年張惠據温州至是而敗王審知時據福州自温州南出平陽縣渡海浦即福州界九域志温州東南至福州界三百二十里自界首至福州五百二十里錢鏐遣方永珍救婺州淮南兵自正月攻婺州初禮部員外郎知制誥司空圖弃官居虞鄉王官谷王官谷在虞鄉縣中條山昭宗屢徵之不起栁璨以詔書徴之圖懼詣洛陽入見見賢遍翻陽為衰野墜笏失儀璨乃復下詔畧曰既養髙以傲代類移山以釣名又曰匪夷匪惠難居公正之朝復扶又翻栁璨言司空圖既非伯夷之清又非栁下惠之和且朝政如彼而自謂公正通鑑直叙其辭而媺惡自見可放還山圖臨淮人也楊師厚攻下唐鄧復郢隨均房七州七州皆忠義軍巡屬朱全忠軍于漢北九月辛酉命師厚作浮梁於隂谷口襄州穀城縣有隂城鎮按舊史隂谷口在襄州西六十里癸亥引兵度漢浮梁成而度甲子趙匡凝將兵二萬陳于漢濱陳讀曰陣師厚與戰大破之遂傅其城下傅讀如附是夕匡凝焚府城帥其族及麾下士㳂漢奔廣陵僖宗中和四年趙徳諲據襄州傳子匡凝至是而亡楊行密時據廣陵匡凝㳂漢入江順流東下而奔歸之帥讀曰率下同乙丑師厚入襄陽丙寅全忠繼至匡凝至廣陵楊行密戲之曰君在鎮歲以金帛輸全忠今敗乃歸我乎匡凝曰諸侯事天子歲輸貢賦乃其職也豈輸賊乎輸舂遇翻今日歸公正以不從賊故耳行密厚遇之丙寅封皇弟禔為潁王禔是支翻又是兮翻祐為蔡王丁夘荆南節度使趙匡明帥衆二萬弃城奔成都天復二年趙匡凝遣匡明據有荆南匡凝既敗匡明亦走戊辰朱全忠以楊師厚為山南東道留後引兵擊江陵荆南軍府治江陵至樂鄉九域志江陵府長林縣有樂鄉鎮荆南牙將王建武遣使迎降全忠以都將賀瓌為荆南留後降户江翻瓌古回翻全忠尋表師厚為山南東道節度使王宗賀等攻馮行襲所向皆捷丙子行襲弃金州奔均州其將全師朗以城降僖宗大順二年馮行襲取金州至是而敗行襲遂歸于朱全忠九域志金州東至均州七百里宗考異曰李昊蜀書髙祖紀作全行思後主紀作全行林思諤王宗播王承規傳作全行宗桑𢎞志傳作全行朗新書馮行襲傳作金行全葢傳寫差誤不可考正按後蜀後主實録云金州招安指揮使全師郁世居金州疑是師朗昆弟族人也今從十國紀年王建更師朗姓名曰王宗朗更工衡翻下詔更同補金州觀察使割渠巴開三州以𨽻之宋白曰渠州春秋巴國秦滅巴置巴郡漢為宕渠縣地蜀先主分巴郡置宕渠郡梁大同三年於郡理置渠州巴州亦漢宕渠地後漢分宕渠北界置漢昌縣今州理是也後魏於漢昌縣理置大谷郡又于郡北置巴州開州漢朐䏰縣地後漢建安二年分朐䏰西北界置漢豐縣後周置開江郡隋改郡為開州乙酉詔更用十一月癸酉親郊淮南將陶雅陳璋拔婺州執刺史沈夏以歸楊行密以雅為江南都招討使歙婺衢睦觀察使楊行密本用陶雅為歙州以璋為衢婺副招討使璋攻暨陽此暨陽即越州諸暨縣也與婺州東陽縣接境兩浙將方習敗之敗補邁翻習進攻婺州濠州團練使劉金卒楊行密以金子仁規知濠州楊行密長子宣州觀察使渥長知兩翻下子長同素無令譽令善也令力正翻軍府輕之行密寢疾命節度判官周隱召渥隱性憃直憃書容翻愚也又涉降翻對曰宣州司徒輕易信䜛喜擊毬飲酒楊渥時守宣州蓋加官司徒易以䜴翻喜許記翻非保家之主餘子皆㓜未能駕馭諸將廬州刺史劉威從王起細㣲必不負王不若使之權領軍府考異曰按徐温謂隱為姧人隱若欲為亂當密召劉威豈肯對其父斥渥短請以軍府授威隱乃戇直之人耳俟諸子長以授之長知兩翻行密不應左右牙指揮使徐温張顥言於行密曰王平生出萬死冒矢石為子孫立基業為于偽翻安可使它人有之行密曰吾死瞑目矣瞑莫定翻閉目也隱舒州人也它日將佐問疾行密目留幕僚嚴可求衆出可求曰王若不諱如軍府何行密曰吾命周隱召渥今忍死待之可求與徐温詣隱隱未出見牒猶在案上可求即與温取牒遣使者如宣州召之為楊渥不終張本可求同州人也路振九國志曰嚴可求本馮翊人父實仕唐為江淮陸運判官由是家于江都行密以潤州團練使王茂章為宣州觀察使楊行密以宣州地接杭州使良將居之豈知楊渥與王茂章搆怨乎為茂章奔兩浙張本冬十月丙戌朔以朱全忠為諸道兵馬元帥别開幕府别開元帥府是日全忠部署將士將歸大梁將自襄陽歸大梁忽變計欲乗勝擊淮南洛陽以丙戌除全忠諸道元帥全忠猶在行營以是日變計欲攻淮南敬翔諫曰今出師未踰月平兩大鎮謂荆襄兩鎮闢地數千里逺近聞之莫不震懾懾之涉翻此威望可惜不若且歸息兵俟舋而動敬翔知淮南之不可攻舋許觀翻不聴改昭信軍為戎昭軍昭信軍本置于金州時已為王建所取辛夘朱全忠發襄州壬辰至棗陽棗陽縣屬隨州自襄陽至棗陽一百三十餘里遇大雨自申州抵光州宋白曰申州春秋之申國漢置平氏縣魏文帝立義陽郡宋立司州入魏改為郢州周武帝改郢州為申州光州春秋弦國漢為西陽縣魏置弋陽郡梁末于光城置光州北齊置南郢州後周為淮南郡隋復為光州九域志自申州東南至光州三百五十五里由考異曰梁太祖實録十月壬申上御大軍發自襄州安黄涉申光暨夀春之霍丘駐焉十國紀年十月朱全忠自襄州帥衆二十萬趨光夀按十月丙戌朔無壬申梁實録誤今從編遺録道險狹塗潦人馬疲乏士卒尚未冬服多逃亡全忠使人謂光州刺史柴再用曰下我以汝為蔡州刺史柴再用汝陽人也故以衣錦啗之不下且屠城再用嚴設守備戎服登城見全忠拜伏甚恭曰光州城小兵弱不足以辱王之威怒王茍先下壽州敢不從命全忠留其城東旬日而去起居郎蘇楷禮部尚書循之子也裴樞等既死而蘓循等進矣奉唐璽綬而輸之梁者此輩也素無才行行下孟翻乾寧中登進士第昭宗覆試黜之仍永不聴入科場洪邁隨筆曰昭宗乾寧三年試進士刑部尚書崔凝以下二十五人放榜詔于武徳殿前覆試但放十五人自狀頭張貽範以下重落其六人許再入舉場四人所試最下不許再入蘓楷其一也唐人謂貢院為科場亦謂之場屋言由此而決科進取爭名之場也甲午楷帥同列上言諡號美惡臣子不得而私先帝諡號多溢美乞更詳議按舊書帝紀楷時帥起居郎羅衮起居舍人盧鼎上駮議楷目不知書僅能執筆其文羅衮作也帥讀曰率上時掌翻事下大常下户嫁翻丁酉張廷範奏改諡恭靈莊愍孝皇帝廟號襄宗詔從之楊渥至廣陵渥自宣州至廣陵辛丑楊行密承制以渥為淮南留後戊申朱全忠發光州迷失道百餘里又遇雨比及壽州九域志光州東至壽州三百五十里比必利翻壽人堅壁清野以待之全忠欲圍之無林木可為柵乃退屯正陽淮水流出潁壽之間夾淮有正陽鎮東正陽屬壽州安豐縣界西正陽屬潁州潁上縣界癸丑更名成徳軍曰武順以朱全忠父名誠故改成徳為武順更工衡翻十一月丙辰朱全忠度淮而北柴再用抄其後軍抄楚交翻斬首三千級獲輜重萬計全忠悔之悔不用敬翔之言也躁忿尤甚躁則到翻丁卯至大梁先是全忠急於傳禪先悉薦翻密使蔣𤣥暉等謀之𤣥暉與栁璨等議以魏晉以來皆先封大國加九錫殊禮然後受禪當次第行之乃先除全忠諸道元帥以示有漸仍以刑部尚書裴迪為送官告使全忠大怒宣徽副使王殷趙殷衡疾𤣥暉權寵欲得其處蔣𤣥暉時為樞密使内專朝廷之權外結朱全忠之寵因譛之於全忠曰𤣥暉璨等欲延唐祚故逗遛其事以須變須待也𤣥暉聞之懼自至壽春具言其狀言朱全忠在壽春行營蔣𤣥暉懼罪故自往言狀全忠曰汝曹巧述閒事以沮我沮在吕翻止也借使我不受九錫豈不能作天子邪禪代之事先封大國次加九錫殊禮此王莽創為之也魏晉踵而行之諱其名而受其實魏文帝所謂舜禹之事吾知之矣其言雖不至如朱全忠之凶暴其欲簒之心則一也𤣥暉曰唐祚已盡天命歸王愚智皆知之𤣥暉與栁璨等非敢有背徳背蒲妹翻但以今兹晉燕岐蜀皆吾勍敵晉李克用燕劉仁恭岐李茂貞蜀王建勍渠京翻王遽受禪彼心未服不可不曲盡義理然後取之欲為王創萬代之業耳為于偽翻全忠叱之曰奴果反矣𤣥暉惶遽辭歸與璨議行九錫時天子將郊祀百官既習儀唐制大祀百官皆先習儀受誓戒散齋致齋而後行事裴迪自大梁還裴迪先至壽春行營從朱全忠還大梁自大梁還洛陽言全忠怒曰栁璨蔣𤣥暉等欲延唐祚乃郊天也璨等懼庚午敕改用來年正月上辛殷衡本姓孔名循為全忠家乳母養子故冒姓趙後漸貴復其姓名壬申趙匡明至成都正月丁卯弃荆南至是方至成都王建以客禮遇之昭宗之䘮朝廷遣告哀使司馬卿宣諭王建至是始入蜀境西川掌書記韋莊為建謀為于偽翻下思為同使武定節度使王宗綰諭卿曰武定節度使治洋州蜀之東北鄙也故使諭卿蜀之將士世受唐恩去歲聞乗輿東遷凡上二十表乗繩證翻上時掌翻皆不報尋有士卒自汴來聞先帝已罹朱全忠弑逆蜀之將士方日夕枕戈枕職任翻思為先帝報仇不知今兹使來以何事宣諭舍人宜自圖進退司馬卿抑時為中書舍人歟否則唐制中書通事舎人掌受四方章奏及宣傳詔命今以卿將命出使故稱之歟卿乃還還從宣翻庚辰吳武忠王楊行密薨年五十四王考異曰十國紀年注吳録唐烈祖實録及吳史官振撰楊本紀皆云天祐二年十一月庚辰行密卒敬翔梁編遺録云天祐三年三月潁州獲河東諜者言去年十一月持李克用絹書往淮南十二月至楊州方知楊行密已死與莊宗功臣列傳行密傳所載畧同沈顔行密神道碑殷文圭行密墓誌游恭渥墓誌皆云天祐三年丙寅二月十三日丙申卒薛居正五代史行密傳亦云天祐三年卒行密之亡嗣君幼弱不由朝命承襲或始死未敢發䘮赴以明年二月疑沈顔等從而書之墓誌云十一月吳王寢疾付渥後事授淮南使或本紀等誤以此月為行密卒王振沈顔殷文圭游恭皆仕吳而記録差異固不可考今從舊史而存碑誌年月以廣傳聞將佐共請宣諭使李儼承制授楊渥淮南節度使東南諸道行營都綂兼侍中𢎞農郡王楊行密請李儼承制見二百六十三卷天復二年渥字承天楊行密長子栁璨蔣𤣥暉等議加朱全忠九錫朝士多竊懐憤邑朝直遥翻禮部尚書蘓循獨揚言曰梁王功業顯大厯數有歸朝廷速宜揖讓朝士無敢違者辛巳以全忠為相國總百揆以宣武宣義天平䕶國天雄武順佑國河陽義武昭義保義戎昭武定泰寧平盧忠武匡國鎮國武寧忠義荆南等二十一道為魏國宣武領汴宋亳單宣義領汝鄭滑天平領鄆曹濮濟䕶國領河中晉絳慈隰天雄領魏博貝衞澶相武順領鎮冀深趙佑國領京兆商華河陽領孟懐義武領定祁易昭義軍領潞澤保義領邢洺磁戎昭領金均房武定領洋泰寧領兖沂密平盧領青淄齊棣登萊忠武領陳許匡國領同鎮國領陜虢武寧領徐宿忠義領襄鄧隨郢唐復安荆南領荆歸峽進封魏王仍加九錫全忠怒其稽緩讓不受十二月戊子命樞密使蔣𤣥暉齎手詔詣全忠諭指癸巳𤣥暉自大梁還言全忠怒不解甲午栁璨奏稱人望歸梁王陛下釋重負今其時也即日遣璨詣大梁逹傳禪之意全忠拒之初璨陷害朝士過多謂白馬之禍也全忠亦惡之惡烏路翻璨與蔣𤣥暉張廷範朝夕宴聚深相結為全忠謀禪代事為于偽翻何太后泣遣宫人阿䖍阿秋達意𤣥暉語以它日傳禪之後求子母生全阿烏葛翻語牛倨翻帝及徳王裕皆何太后子也昭宗已弑裕與諸弟稍長相繼而死事已至此后之母子能獨全乎后素號多智臨難乃爾蓋當時以能隨時上下以全生者為智也王殷趙殷衡譛𤣥暉云與栁璨張廷範於積善堂夜宴對太后焚香為誓期興復唐祚何太后時居積善宫全忠信之乙未收𤣥暉及豐徳庫使應頊御㕑使朱建武繫河南獄河南府獄以王殷權知樞密趙殷衡權判宣徽院事全忠三表辭魏王九錫之命丁酉詔許之朱全忠憤怒正欲殺蔣𤣥暉等乃復行魏晉之事表辭者敬翔教之也詔許之者王殷等承朱全忠之風指也更以為天下兵馬元帥然全忠已修大梁府舍為宫闕矣史誅其心迹以示天下後世是日斬蔣𤣥暉杖殺應頊朱建武庚子省樞密使及宣徽南院使獨置宣徽使一員以王殷為之趙殷衡為副使辛丑敕罷宫人宣傳詔命天復三年誅宦官以内夫人宣傳詔命考異見前及參隨視朝開元禮疏曰晉康獻禇后臨朝不坐則宫人傳命百僚周隋相因國家承之不改唐六典曰宫嬪司賛掌朝㑹賛相之事凡朝引客立于殿庭至天祐三年詔曰宫嬪女職本備内任今後遇延英坐日只令小黄門祇候引從宫人不得出内正是年詔敕也追削蔣𤣥暉為凶逆百姓令河南掲尸於都門外聚衆焚之河南河南府也揭其謁翻舉也𤣥暉既死王殷趙殷衡又誣𤣥暉私侍何太后令阿秋阿䖍通導往來己酉全忠密令殷殷衡害太后于積善宫敕追廢太后為庶人子而廢母是復晉峻陽之事也阿秋阿䖍皆於殿前撲殺撲弼角翻庚戌以皇太后喪廢朝三日既廢母為庶人又廢朝三日廢為庶人天性滅矣廢朝三日既非䘮母之禮又不足以塞天性之傷唐之臣子非唐之臣子也朝直遥翻辛亥敕以宫禁内亂罷來年正月上辛謁郊廟禮唐不復郊矣癸丑守司空兼門下侍郎同平章事栁璨貶登州刺史太常卿張廷範貶萊州司户甲寅斬璨於上東門外車裂張廷範於都市自罷謁郊廟以下皆朱全忠之夙心璨臨刑呼曰負國賊栁璨死其宜矣呼火故翻西川將王宗朗不能守金州焚其城邑奔成都王宗朗守金州纔三月耳戎昭節度使馮行襲復取金州奏請金州荒殘乞徙理均州從之更以行襲領武安軍武考異曰實録云改為寧軍新表云改為武定軍按武寧乃徐州軍額武定乃洋州軍額不應同名續寳運録注云天復七年秋汴軍都頭號馮青面改姓朱授全忠印綬為洋州刺史授當作受洋州自景福元年刺史楊守佐歸順鳯翔後被朱全忠除此年秋蜀第二指揮使王宗綰收獲金州都押衙全貴帥衆降賜姓王名宗朗拜金州刺史又編遺録天祐三年二月云行襲巳于均州建節因署韓恭知金州事請朝廷落下防禦使并不建戎昭軍以此諸書參驗似是今者以行襲兼領洋州節制非改戎昭為武定軍實録新表皆誤續寳運録天復七年亦誤也按考異則武安軍當作武定軍參考新舊書亦然陳詢不能守睦州奔于廣陵為兩浙兵所逼也僖宗中和四年陳晟據睦州至詢而敗淮南招討使陶雅入據其城楊渥之去宣州也欲取其幄幕及親兵以行觀察使王茂章不與渥怒既襲位遣馬步都指揮使李簡等將兵襲之楊渥襲位曽幾何時而修怨于一州將其褊量如此固不足以君國子民湖南兵寇淮南淮南牙内指揮使楊彪擊却之三年春正月壬戌靈武節度使韓遜奏吐蕃七千餘騎營於宗髙谷將擊嗢未及取涼州趙珣聚米圖經曰靈武自賀蘭山路過西至涼州九百里李簡兵奄至宣州王茂章度不能守度徒洛翻帥衆奔兩浙帥讀曰率親兵上蔡刁彦能辭以母老不從行登城諭衆曰王府命我招諭汝曹楊渥父子皆以王爵鎮廣陵故稱淮南軍府為王府大兵行至矣衆由是定陶雅畏茂章斷其歸路斷音短引兵還歙州錢鏐復取睦州睦州自此屬錢氏楊氏不能爭歙書涉翻鏐以茂章為鎮東節度副使更名景仁更工衡翻乙丑加靜海節度使曲承裕同平章事曲承裕乗亂據有安南初田承嗣鎮魏博選募六州驍勇之士五千人為牙軍事見二百二十二卷代宗廣徳元年厚其給賜以自衞為腹心自是父子相繼親黨膠固歲乆益驕横横户孟翻小不如意輒族舊帥而易之帥所類翻自史憲誠以來皆立於其手穆宗長慶二年立史憲誠文宗大和三年立何進滔懿宗咸通十一年立韓允中僖宗中和三年立樂彦禎文徳元年立趙文㺹尋立羅𢎞信天雄節度使羅紹威心惡之力不能制惡烏路翻朱全忠之圍鳯翔也圍鳯翔見昭宗天復元年二年三年紹威遣軍將楊利言密以情告全忠欲借其兵以誅之全忠以事方急未暇如其請隂許之及李公佺作亂去年七月李公佺亂見上紹威益懼復遣牙將臧延範趣全忠趣讀曰促全忠乃發河南諸鎮兵七萬遣其將李思安將之㑹魏鎮兵屯深州樂城魏鎮魏博鎮冀兩鎮樂城恐當作樂夀聲言擊滄州討其納李公佺也㑹全忠女適紹威子廷規者卒卒子恤翻全忠遣客將馬嗣勲實甲兵於槖中有底曰囊無底曰槖槖撻各翻選長直兵千人為擔夫長直兵葢選驍勇之士長使之直衞不以番代者也擔都濫翻帥之入魏帥讀曰率下同詐云㑹葬全忠自以大軍繼其後云赴行營牙軍皆不之疑庚午紹威潜遣人入庫斷弓弦甲襻㫁音短襻普患翻是夕紹威帥其奴客數百與嗣勲合擊牙軍牙軍欲戰而弓甲皆不可用遂闔營殪之殪一計翻凡八千家嬰孺無遺詰旦全忠引兵入城詰去吉翻辛未以權知寧逺留後龎巨昭嶺南西道留後葉廣畧並為節度使二人皆能保據本道因而命之庚辰錢鏐如睦州九域志杭州西南至睦州三百一十五里西川將王宗阮攻歸州獲其將韓從實歸州屬荆南陳璋聞陶雅歸歙自婺州退保衢州兩浙將方永珍等取婺州進攻衢州去年九月淮南兵取婺州陳璋本以衢州附淮南今自婺州退保之楊渥遣先鋒指揮使陳知新攻湖南三月乙丑知新拔岳州逐刺史許徳勲昭宗天復三年湖南將許徳勲取岳州今弃之渥以知新為岳州刺史為陳知新等覆軍張本戊寅以朱全忠為鹽鐵度支户部三司都制置使三司之名始于此全忠辭不受夏四月癸未朔日有食之羅紹威既誅牙軍魏之諸軍皆懼紹威雖數撫諭之數所角翻而猜怨益甚朱全忠營於魏州城東數旬將北巡行營㑹天雄牙將史仁遇作亂聚衆數萬據髙唐髙唐漢古縣唐屬博州九域志在州東北一百一十里自稱留後天雄巡内諸縣多應之全忠移軍入城遣使召行營兵還攻髙唐至歴亭歴亭縣屬貝州九域志在州東九十里宋白曰歴亭縣之地自後魏至髙齊其地屬鄃縣隋開皇十六年于永濟渠南置歴亭縣遥取漢歴城縣為名按漢地理志歴城屬信都郡在蓚縣界王莽改曰歴亭唐萬歲登封元年移就盤河置在古歴城西七十里魏兵在行營者作亂與仁遇相應元帥府左司馬李周彞右司馬符道昭擊之所殺殆半進攻髙唐克之城中兵民無少長皆死少詩照翻長知兩翻擒史仁遇鋸殺之先是仁遇求救於河東及滄州先悉薦翻李克用遣其將李嗣昭將三千騎攻邢州以救之時邢州兵纔二百團練使牛存節守之嗣昭攻七日不克全忠遣右長直都將張筠將數千騎助存節守城筠伏兵於馬嶺擊嗣昭敗之敗襧邁翻嗣昭遁去義昌節度使劉守文遣兵萬人攻貝州又攻冀州拔蓚縣進攻阜城蓚阜城並漢古縣唐屬冀州九域志蓚縣在州東北一百五十里阜城在州東一百六十里蓚音條時鎮州大將王釗攻魏州叛將李重霸於宗城宗城縣屬魏州九域志在州西北一百七十里全忠遣歸救冀州滄州兵去滄州兵即劉守文所遣丙午重霸弃城走汴將胡規追斬之鎮南節度使鍾傳以養子延規為江州刺史傳薨軍中立其子匡時為留後延規恨不得立遣使降淮南補考異曰實録初鍾傳養上藍院僧為子曰延圭江州刺史傳卒遂召淮師陷其城今從十國紀年吳史五月丁巳朱全忠如洺州遂巡北邊視戎備還入于魏丙子廢戎昭軍并均房𨽻忠義軍併屬山南東道以武定節度使馮行襲為匡國節度使馮行襲自均州徙同州楊渥以昇州刺史秦裴為西南行營都招討使將兵擊鍾匡時於江西鍾延規啓之也六月甲申復以忠義軍為山南東道僖宗文徳元年以山南東道為忠義軍朱全忠以長安鄰於邠岐數有戰爭九域志長安西北至邠州二百七十五里西至鳯翔三百九里數所角翻奏徙佑國節度使韓建於淄青韓建本與李茂貞連結者也朱全忠恐其復然故徙之以淄青節度使長社王重師為佑國節度使秋七月朱全忠克相州時魏之亂兵散據貝博澶相衞州澶時連翻相息亮翻全忠分命諸將攻討至是悉平之引兵南還曰考異實録在六月今從編遺録唐太祖紀年録編遺録七月癸未上起兵離魏都按是月壬子朔無癸未編遺録誤也全忠留魏半歲自正月入魏至是半歳羅紹威供億所殺牛羊豕近七十萬資糧稱是所賂遺又近百萬比去蓄積為之一空近其靳翻稱尺證翻遺唯季翻比必利翻為于偽翻紹威雖去其逼去羌吕翻而魏兵自是衰弱紹威悔之謂人曰合六州四十三縣鐵不能為此錯也魏州領貴鄉元城魏館陶冠氏莘朝城昌樂臨河洹水成安内黄宗城永濟十四縣博州領聊城博平武水清平堂邑髙唐六縣相州領安陽鄴湯隂林慮堯城臨漳六縣衛州領汲衛共城新鄉黎陽五縣貝州領清河清陽武城經城臨清漳南歴亭夏津八縣澶州領頓丘清豐觀城臨黄四縣錯鑢也鑄為之又釋錯為誤羅以殺牙兵之誤取鑄錯為喻壬申全忠至大梁曰考異編遺録云壬辰亦誤秦裴至洪州軍于蓼洲諸將請阻水立寨裴不從鍾匡時果遣其將劉楚據之諸將以咎裴裴曰匡時驍將獨楚一人耳若帥衆守城不可猝拔帥讀曰率下同吾故以要害誘致之耳誘音酉未幾裴破寨執楚楚居豈翻遂圍洪州饒州刺史唐寳請降降户江翻八月乙酉李茂貞遣其子侃為質於西川質音致王建以侃知彭州朱全忠以幽滄相首尾為魏患幽劉仁恭滄劉守文父子相為首尾欲先取滄州甲辰引兵發大梁兩浙兵圍衢州此即方永珍之兵也衢州刺史陳璋告急於淮南楊渥遣左廂馬步都虞候周本將兵迎璋本至衢州浙人解圍陳於城下璋帥衆歸于本兩浙兵取衢州淮南與浙人爭婺睦衢三州至是方悉歸于錢氏陳讀曰陣帥讀曰率吕師造曰浙人近我而不動輕我也請擊之吕師造狃於青山之捷氣陵浙人近其靳翻本曰吾受命迎陳使君今至矣何為復戰彼必有以待我也遂引兵還本為之殿浙人躡之復扶又翻殿丁練翻躡尼輒翻本中道設伏大破之九月辛亥朔朱全忠自白馬渡河丁卯至滄州軍於長蘆杜佑曰滄州長蘆縣漢參蘆縣地宋廢縣為長蘆鎮屬清池縣滄人不出羅紹威饋運自魏至長蘆五百里不絶於路又建元帥府舍於魏所過驛亭供酒饌幄幕什器饌雛皖翻又雛戀翻上下數十萬人無一不備羅紹威厚奉朱全忠不惟以報徳亦懼因伐虢之便而取虞也秦裴拔洪州虜鍾匡時等五千人以歸僖宗中和二年鍾傳據洪州至匡時而亡楊渥自兼鎮南節度使以裴為洪州制置使淮南楊氏遂兼有江西之地靜難節度使楊崇本以鳯翔保塞彰義保義之兵攻夏州保義當作保大葢保義軍領邢洺磁在山東而保大軍領鄜坊與邠岐等鎮皆在關西也難乃旦翻夏户雅翻匡國節度使劉知俊邀擊坊州之兵斬首三千餘級擒坊州刺史劉彦暉坊州保大軍巡屬也以此證上文保義其誤明矣劉仁恭救滄州戰屢敗乃下令境内男子十五以上七十以下悉自備兵糧詣行營軍發之後有一人在閭里刑無赦或諫曰今老弱悉行婦人不能轉餉此令必行濫刑者衆矣乃命勝執兵者盡行勝音升文其面曰定霸都士人則文其腕或臂腕烏貫翻曰一心事主於是境内士民穉孺之外無不文者穉直利翻得兵十萬軍于瓦橋時汴軍築壘圍滄州鳥䑕不能通仁恭畏其强不敢戰城中食盡丸土而食或互相掠啖啖徒濫翻朱全忠使人説劉守文曰説式芮翻援兵勢不相及何不早降守文登城應之曰僕於幽州父子也梁王方以大義服天下若子叛父而來將安用之全忠愧其辭直為之緩攻為于偽翻冬十月丙戌王建始立行臺於蜀六考異曰續寳運録曰天復六年十月日行下此牓帖則是此年十月也建東向舞蹈號慟號户刀翻稱自大駕東遷謂昭宗遷洛也制命不通請權立行臺用李晟鄭畋故事承制封拜按李晟討朱泚屯東渭橋但請假禆佐趙光銑唐良臣張彧為洋利劒三州刺史以通蜀漢喉衿上不暇從也其後假張彧京兆少尹以調畿内芻米表李懐光降將孟涉段威勇以要官未嘗承制封拜也鄭畋便宜從事見二百五十四卷僖宗廣明元年仍以牓帖告諭所部藩鎮州縣劉仁恭求救于河東前後百餘輩李克用恨仁恭返覆劉仁恭以幽州叛李克用又約朱全忠共攻之此克用之所深恨也竟未之許其子存朂諫曰今天下之勢歸朱温者什七八雖强大如魏博鎮定莫不附之自河以北能為温患者獨我與幽滄耳今幽滄為温所困我不與之併力拒之非我之利也夫為天下者不顧小怨且彼嘗困我而我救其急以徳懐之乃一舉而名實附也此乃吾復振之時不可失也史言李存朂智識能輔其父所不逮克用以為然與將佐謀召幽州兵與攻潞州曰於彼可以解圍於我可以拓境乃許仁恭和召其兵仁恭遣都指揮使李溥將兵三萬詣晉陽克用遣其將周徳威李嗣昭將兵與之共攻潞州夏州告急於朱全忠戊戌全忠遣劉知俊及其將康懐英救之楊崇本將六鎮之兵五萬軍于美原據上文則楊崇本所將者五鎮之兵耳葢併將秦隴之兵為六鎮知俊等擊之崇本大敗歸于邠州武貞節度使雷彦威屢寇荆南留後賀瓌閉城自守去年九月汴將賀瓌守荆南朱全忠以為怯以潁州防禦使髙季昌代之髙季昌自此遂據有荆南又遣駕前指揮使倪可福將兵五千戍荆南以備吳蜀倪可福自此遂委質於髙季昌朗兵引去朗兵雷彦威之兵也十一月劉知俊康懐貞以此觀之上文誤作懐英乗勝攻鄜延等五州下之加知俊同平章事以懐貞為保義節度使恐即命康懐頁以鄜畤保義當作保大以通鑑明年書保平節度使康懐貞證之又恐自是保義西軍自是不振西軍謂邠岐軍也湖州刺史髙彦卒子澧代之澧音禮十二月乙酉錢鏐表薦行軍司馬王景仁詔以景仁領寧國節度使王景仁即王茂章是年正月弃宣州歸錢鏐考異曰薛居正五代史鏐辟為兩府行軍司馬具以狀聞太祖復命遥領宣州節度使同平章事歐陽修五代史曰鏐表景仁領宣州節度使今從之朱全忠分步騎數萬遣行軍司馬李周彞將之自河陽救潞州閏月乙丑廢鎮國軍興徳府復為華州𨽻匡國節度割金商州𨽻佑國軍併同華為一鎮割金商以𨽻佑國皆欲厚其資力以扞邠岐初昭宗凶訃至潞州訃音赴告喪曰訃昭義節度使丁㑹帥將士縞素流涕久之帥讀曰率及李嗣昭攻潞州㑹舉軍降於河東年考異曰唐太祖紀録丁酉丁㑹開門迎降閏十二月太祖以李嗣昭為潞帥薛居正五代史梁紀在閏月後唐紀在十二月今從新舊唐紀薛史梁紀及編遺録李克用以嗣昭為昭義留後㑹見克用泣曰㑹非力不能守也梁王陵虐唐室㑹雖受其舉拔之恩誠不忍其所為故來歸命耳無是非之心非人也丁㑹其有是非之心者乎克用厚待之位於諸將之上己巳朱全忠命諸軍治攻其將攻滄州治直之翻壬申聞潞州不守甲戌引兵還先是調河南北芻糧水陸輸軍前先悉薦翻調徒吊翻輸舂遇翻諸營山積全忠將還悉命焚之煙炎數里在舟中者鑿而沉之炎讀曰燄沈持林翻朱全忠舉兩河之兵力以攻劉守文滄州孤城破在旦夕遽以潞州内叛燒營而退者豈不知功壊于垂成哉蓋潞州天下之脊而河東之兵全忠之所素憚者也自潞州而南下太行直抵懐孟之郊可以進據洛都一正唐室全忠之簒事不成矣此其所以狼狽而返劉守文使遺全忠書曰王以百姓之故赦僕之罪解圍而去王之惠也城中數萬口不食數月矣與其焚之為煙沈之為泥願乞其餘以救之全忠為之留數囷以遺之劉守文之辭卑而情可矜故全忠之凶暴亦為之感動遺惟季翻乞音氣為于偽翻滄人賴以濟河東兵進攻澤州不克而退吉州刺史彭玕遣使請降於湖南鍾氏既亡故彭玕請降于馬氏玕音千路振九國志作玕玕本赤石洞蠻酋鍾傳用為吉州刺史酋慈由翻資治通鑑卷二百六十五
