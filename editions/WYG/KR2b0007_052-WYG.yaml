front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷五十二宋司馬光撰胡三省音註漢紀四十四起閼逢閹茂盡旃䝉作噩凡十二年孝順皇帝下陽嘉三年夏四月車師後部司馬率後王加特奴掩擊北匈奴於閶吾陸谷閶音昌大破之獲單于母五月戊戌詔以春夏連旱赦天下上親自露坐徳陽殿東廂請雨按范書桓帝紀徳陽殿在北宫掖庭中以尚書周舉才學優深特加策問舉對曰臣聞隂陽閉隔則二氣否塞否皮鄙翻塞悉則翻陛下廢文帝光武之法而循亡秦奢侈之欲内積怨女外有曠夫自枯旱以來彌歴年嵗未聞陛下改過之効徒勞至尊暴露風塵誠無益也謂露坐無益陛下但務其華不尋其實猶縁木希魚却行求前賢曰縁木求魚孟子之文韓詩外傳曰夫明鏡所以照形徃古所以知今惡知徃古之所以危亡無異却行而求達於前人也誠宜推信革政崇道變惑出後宫不御之女除太官重膳之費易傳曰陽感天不旋日易稽覽圖中孚傳曰陽感天不旋日諸侯不旋時大夫不過朞鄭𤣥注云陽者天子為善一日天立應以善為惡一日天立應以惡一説不旋時立應之重直龍翻傳直戀翻惟陛下留神裁察帝復召舉面問得失舉對以宜慎官人去貪汙逺佞邪復扶又翻去羌吕翻逺于願翻帝曰官貪汙佞邪者為誰乎對曰臣從下州超備機宻舉自冀州刺史徴拜尚書不足以别羣臣然公卿大臣數有直言者忠貞也别彼列翻數所角翻阿䛕茍容者佞邪也太史令張衡亦上疏言前年京師地震土裂裂者威分震者民擾也竊懼聖思厭倦制不專己恩不忍割與衆共威威不可分徳不可共願陛下思惟所以稽古率舊勿使刑徳八柄不由天子周禮王以八柄馭羣臣一曰爵以馭其貴二曰禄以馭其富三曰予以馭其幸四曰置以馭其行五曰生以馭其福六曰奪以馭其貧七曰廢以馭其罪八曰誅以馭其過然後神望允塞塞悉則翻災消不至矣衡又以中興之後儒者爭學圖緯緯七緯也七緯者易緯稽覽圖乾鑿度坤靈圖通卦驗是類謀辯終備也書緯璇璣鈐考靈耀刑徳放帝命驗運期授也詩緯推度災記歴樞含神霧也禮緯含文嘉稽命徵斗威儀也樂緯動聲儀稽耀嘉什國徵也孝經緯援神契鉤命决也春秋緯演孔圖元命包文耀鉤運斗樞感精符合誠圖考異郵保乾圖漢含孳佑助期握誠圖濳潭巴説題辭也上疏言春秋元命包有公輸班與墨翟事見戰國又言别有益州益州之置在於漢世賢曰前書武帝始置益州又劉向父子領校祕書閲定九流亦無䜟録賢曰成哀時劉向及子歆為祕書校定經傳諸子等九流謂儒家道家隂陽家法家名家墨家縱横家雜家農家見蓻文志並無䜟説䜟楚譖翻則知圖䜟成於哀平之際皆虚偽之徒以要世取資要一遙翻欺罔較然莫之紏禁且律歴卦侯九宫風角黄帝命伶倫吹律大橈作甲子容成造歴而律歴之學傳矣京房分六十四卦更直日用事以風雨寒温為候伏羲之時龍馬負圖出於河戴九履一左三右七二四為肩六八為足而五居中伏羲觀河圖而畫八卦隂陽家謂之九宫一六八為白二黑三綠四碧五黄七赤九紫至今承用之又易乾鑿度曰太一取其數而行九宫鄭𤣥注云太一者北辰神名也下行八卦之宫每四乃還於中央中央者地神之所居故謂之九宫天數大分以陽出以隂入陽起於子隂起於午是以太一下九宫從坎宫始自此而從於坤宫又自此而從於震宫又自此而從於巽宫所以從半矣還息於中央之宫既又自此而從於乾宫又自此而從於兑宫又自此而從於艮宫又自此而從於離宫行則周矣上遊息於太一之星而反於紫宫行起從坎宫始終於離宫也此雖緯書之説而九宫定位則一也賢曰風角謂候四方四隅之風以占吉凶數有徵効數所角翻下同世莫肯學而競稱不占之書賢曰謂競稱䜟家也譬猶畫工惡圖犬馬而好作鬼魅誠以實事難形而虚偽不窮也惡烏路翻好呼到翻魅音媚韓子曰客有為齊王畫者問畫孰難對曰狗馬最難孰易曰鬼魅最易狗馬人所知也故難鬼魅無形故易也宜收藏圖䜟一禁絶之則朱紫無所眩典籍無瑕玷矣秋七月鍾羌良封等復冦隴西漢陽復扶又翻詔拜前校尉馬賢為謁者鎮撫諸種種章勇翻冬十月䕶羌校尉馬續遣兵擊良封破之十一月壬寅司徒劉崎司空孔扶免用周舉之言也崎丘宜翻乙巳以大司農黄尚為司徒光禄勲河東王卓為司空耿䝿人數為耿氏請為于偽翻帝乃紹封耿寳子箕為牟平侯耿寳貶死事見上卷安帝延光四年四年春北匈奴呼衍王侵車師後部帝令敦煌太守發兵救之不利敦徒門翻二月丙子初聽中官得以養子襲爵曹操階之遂移漢祚其所由來者漸矣初帝之復位宦官之力也事見上卷延光四年由是有寵參與政事與讀曰預御史張綱上書曰竊尋文明二帝徳化尤盛中官常侍不過兩人近倖賞賜裁滿數金惜費重民故家給人足而頃者以來無功小人皆有官爵非愛民重器承天順道者也書奏不省省悉景翻綱皓之子也張皓見五十卷安帝延光三年旱謁者馬賢擊鍾羌大破之夏四月甲子太尉施延免戊寅以執金吾梁商為大將軍故太尉龐參為太尉龐皮江翻商稱疾不起且一年帝使太常桓焉奉策就第即拜商乃詣闕受命杜祐曰後漢策拜諸王侯三公之儀百官㑹位定謁者引光禄勲前謁者引當拜者前伏殿下光祿前一拜舉手曰制詔其以某為某讀策書畢拜者稱臣再拜尚書郎以璽印綬付侍御史前面立受印璽綬當受策者再拜頓首三贊謁者曰某王臣某新封某公某初除謝中謁者報謹謝贊者立曰皇帝為公興重坐受策者拜謝起就位禮畢自漢以來惟衛青以有功即軍中拜大將軍未聞有就第即拜者也况以此異數加之后父乎商少通經傳謙恭好士少詩沼翻好呼到翻下同辟漢陽巨覽巨姓覽名上黨陳龜為掾屬掾余絹翻李固為從事中郎楊倫為長史李固以商柔和自守不能有所整裁乃奏記於商曰數年以來災怪屢見見賢遍反孔子曰智者見變思形愚者覩怪諱名范書李固𫝊形作刑此二語葢亦本之緯書天道無親可為祗畏賢曰祗敬也言天無親疎惟善是與可敬而畏也誠令王綱一整道行忠立明公踵伯成之髙莊子曰伯成子髙唐虞時為諸侯至禹去而耕於野全不朽之譽豈與此外戚凡輩耽榮好位者同日而論哉商不能用秋閏八月丁亥朔日有食之冬十月烏桓冦雲中度遼將軍耿曅追擊不利十一月烏桓圍曅於蘭池城續漢志雲中郡沙南縣有蘭池城發兵數千人救之烏桓乃退十二月丙寅京師地震永和元年春正月己巳改元赦天下冬十月丁亥承福殿火十一月丙子太尉龎參罷十二月象林蠻夷反象林縣屬日南郡晉宋以下為林邑國乙巳以前司空王龔為太尉龔疾宦官專權上書極言其状諸黄門使各誣奏龔罪上命龔亟自實李固奏記於梁商曰王公以堅貞之操横為讒佞所構横户孟翻衆人聞知莫不歎慄夫三公尊重無詣理訴寃之義哀帝時丞相王嘉召詣廷尉主簿曰將相不對理陳寃相踵以為故事君矦宜引决纎微感槩輒引分决是以舊典不有大罪不至重問賢曰大臣獄重故曰重問成帝時丞相薛宣御史大夫翟方進有罪上使五二千石雜問音義云大臣獄重故以二千石五人同問之王公卒有他變卒讀曰猝則朝廷獲害賢之名羣臣無救䕶之節矣語曰善人在患饑不及餐言當速救之也斯其時也商即言之於帝事乃得釋是嵗以執金吾梁冀為河南尹冀性嗜酒逸遊自恣居職多縱暴非灋父商所親客雒陽令吕放以告商商以讓冀冀遣人於道刺殺放刺七亦翻而恐商知之乃推疑放之怨仇推吐雷翻惡自冀出欲嫁之他人故託其辭疑放之怨仇為之請以放弟禹為雒陽令使捕之賢曰安慰放家欲以滅口余謂賢説非也冀請於商以放弟為令謂必急於捕賊而隂使禹滅其兄之宗親賔客以快己忿耳盡滅其宗親賔客百餘人武陵太守上書以蠻夷率服言相率而來服可比漢人増其租賦議者皆以為可尚書令虞詡曰自古聖王不臣異俗先帝舊典貢賦多少所由來乆矣漢興令武陵諸蠻大人嵗輸布一匹小口二丈是謂之賨布今猥増之必有怨叛計其所得不償所費必有後悔帝不從澧中漊中蠻各爭貢布非舊約漊即矦翻遂殺鄉吏舉種反二年春武陵蠻二萬人圍充城八千人冦夷道賢曰充縣屬武陵郡故城在澧州崇義縣東北充音衝夷道屬南郡二月廣漢屬國都尉擊破白馬羌安帝改蜀郡北部都尉為廣漢屬國都尉别領隂平甸氐剛氐三道屬益州帝遣武陵太守李進擊叛蠻破平之進乃簡選良吏撫循蠻夷郡境遂安三月司空王卓薨丁丑以光祿勲郭䖍為司空作考異曰袁書乾今從范書夏四月丙申京師地震五月癸丑山陽君宋娥坐構姦誣罔收印綬歸里舍黄龍楊佗孟叔李建張賢史汎王道李元李剛等九矦坐與宋娥更相賂遺更工衡翻遺于季翻求髙官増邑並遣就國減租四分之一按考異曰孫程傳云龍等誣罔曹騰孟賁梁商傳誣罔騰賁者張逵等非龍等也象林蠻區憐等區烏侯翻今廣中猶有此姓姓譜云今長沙有此姓音豈俱翻攻縣寺殺長吏交趾刺史樊演發交趾九真兵萬餘人救之兵士憚逺役秋七月二郡兵反攻其府府雖擊破反者而蠻埶轉盛冬十月甲申上行幸長安扶風田弱薦同郡灋真博通内外學東都諸儒以七緯為内學六經為外學隠居不仕宜就加衮職賢曰毛詩曰衮職有闕謂三公也帝虚心欲致之前後四徵終不屈友人郭正稱之曰灋真名可得聞身難得而見逃名而名我隨避名而名我追可謂百世之師者矣真雄之子也灋雄見四十九卷安帝永初四年丁卯京師地震太尉王龔以中常侍張昉等專弄國權欲奏誅之宗親有以楊震行事諫之者楊震事見五十卷安帝延光三年龔乃止十二月乙亥上還自長安三年春二月乙亥京師及金城隴西地震二郡山崩夏閏四月己酉京師地震五月吳郡丞羊珍反攻郡府太守王衡破斬之侍御史賈昌與州郡幷力討區憐不尅為所攻圍嵗餘兵穀不繼帝召公卿百官及四府掾屬大將軍府掾屬二十九人太尉府二十四人司徒府三十一人司空府二十九人問以方略皆議遣大將發荆揚兖豫四萬人赴之李固駮曰若荆揚無事發之可也今二州盜賊磐結不散二州謂荆揚也武陵南郡蠻夷未輯長沙桂陽數被徴發如復擾動數所角翻被皮義翻復扶又翻下同必更生患其不可一也又兖豫之人卒被徴發卒讀曰猝逺赴萬里無有還期詔書迫促必致叛亡其不可二也南州水土温暑加有瘴氣瘴之亮翻度嶺而南瘴氣甚重炎熱蒸鬰之所生也中之者輒死致死亡者十必四五其不可三也逺涉萬里士卒疲勞比至嶺南比必寐翻及也不復堪鬬其不可四也軍行三十里為程而去日南九千餘里三百日乃到計人禀五升賢曰古升小故曰五升也禀給也用米六十萬斛不計將吏驢馬之食但負甲自致費便若此其不可五也設軍所在死亡必衆既不足禦敵當復更發此為刻割心腹以補四支其不可六也九真日南相去千里發其吏民猶尚不堪何况乃苦四州之卒以赴萬里之艱哉其不可七也前中郎將尹就討益州叛羌益州諺曰虜來尚可尹來殺我後就徵還以兵付刺史張喬喬因其將吏旬月之間破殄冦虜事見四十九卷安帝元初二年至五十卷五年此發將無益之效將即亮翻州郡可任之驗也宜更選有勇略仁惠任將帥者以為刺史太守悉使共住交趾今日南兵單無穀言孤軍處叛蠻之中又乏糧也守既不足戰又不能可一切徙其吏民北依交趾事靜之後乃命歸本還募蠻夷使自相攻轉輸金帛以為其資有能反間致頭首者間古莧翻頭首謂諸蠻渠帥也許以封矦裂土之賞故并州刺史長沙祝良性多勇决又南陽張喬前在益州有破虜之功皆可任用昔太宗就加魏尚為雲中守魏尚見十四卷文帝十四年就加事未見守式又翻下同哀帝即拜龔舍為泰山守前書龔舍楚人初徴為諌大夫病免復徴為博士又病去頃之哀帝遣使即楚拜舍為泰山太守宜即拜良等便道之官四府悉從固議即拜祝良為九真太守張喬為交趾刺史喬至開示慰誘並皆降散良到九真單車入賊中設方略招以威信降者數萬人皆為良築起府寺由是嶺外復平為于偽翻復扶又翻秋八月已未司徒黄尚免九月己酉以光祿勲長沙劉壽為司徒丙戌令大將軍三公舉剛毅武猛謀謨任將帥者各二人特進卿校尉各一人校户教翻初尚書令左雄薦冀州刺史周舉為尚書既而雄為司隸校尉舉故冀州刺史馮直任將帥直嘗坐臧受罪臧古贓字通舉以此劾奏雄劾所舉非其人也劾户槩翻又户得翻雄曰詔書使我選武猛不使我選清髙舉曰詔書使君選武猛不使君選貪汚也雄曰進君適所以自伐也舉曰昔趙宣子任韓厥為司馬厥以軍灋戮宣子僕宣子謂諸大夫曰可賀我矣吾選厥也任其事秦晉戰于河曲趙宣子將中軍韓厥為司馬宣子使以其乘車于行韓厥戮其僕衆曰韓厥必不沒矣其主朝升之而暮戮其車宣子謂諸大夫曰可賀我矣吾舉厥也任其事吾今乃知免於戾矣任音壬今君不以舉之不才誤升諸朝不敢阿君以為君羞不寤君之意與宣子殊也雄悦謝曰吾嘗事馮直之父又與直善今宣光以此奏吾是吾之過也周舉字宣光天下益以此賢之聞過而服天下以此益賢左雄諱過者為何如邪是時宦官競賣恩勢挟勢市恩以此自鬻也唯大長秋良賀清儉退厚春秋鄭穆公子子良後為良氏賢曰謙退而厚重也余謂退厚者不與儕輩爭進趣競浮薄也及詔舉武猛賀獨無所薦帝問其故對曰臣生自草茅長於宫掖長知兩翻既無知人之明又未嘗交加士類昔衛鞅因景監以見有識知其不終事見二卷周顯王三十一年今得臣舉者匪榮伊辱言不足為榮適以為辱也賀考異曰宦者傳云陽嘉中詔舉武猛良獨無所薦按此詔葢誤以永和為陽嘉也是以不敢帝由是賞之冬十月燒當羌􅃚離等三千餘騎冦金城校尉馬賢擊破之十二月戊戌朔日有食之大將軍商以小黄門南陽曹節等用事於中遣子冀不疑與為交友而宦官忌其寵反欲陷之中常侍張逵蘧政楊定等蘧姓也衛有大夫蘧伯玉與左右連謀共譖商及中常侍曹騰孟賁云欲徴諸王子圖議廢立請收商等案罪帝曰大將軍父子我所親騰賁我所愛必無是但汝曹共妒之耳妒與妬同逵等知言不用懼迫言既不用懼禍且及也遂出矯詔收縛騰賁於省中帝聞震怒敇宦者李歙急呼騰賁釋之收逵等下獄歙許及翻下遐稼翻四年春正月庚辰逵等伏誅事連𢎞農太守張鳳安平相楊皓皆坐死辭所連染延及在位大臣商懼多侵枉乃上疏曰春秋之義功在元帥罪止首惡春秋左氏傳晉卻克帥師敗齊師于鞌師歸范文子後入曰師有功國人喜以逆之先入必屬耳目焉是代帥受名也故不敢虞師晉師滅下陽公羊傳曰虞微國也曷為序于大國之上使虞首惡也帥所類翻大獄一起無辜者衆死囚乆繫纎微成大賢曰言乆繫之則細微之事牽引以成大也非所以順迎和氣平政成化也宜早訖竟以止逮捕之煩謂孟春之月當行慶施惠順天地生物之心以迎和氣不宜使獄事枝蔓賢曰逮及也辭所連及即追捕之也帝納之罪止坐者二月帝以商少子虎賁中郎將不疑為步兵校尉商上書辭曰不疑童孺猥處成人之位處昌吕翻昔晏平仲辭鄁殿以守其富左傳齊討慶封與晏子鄁殿其鄙六十弗受子尾曰富人之所欲也何故弗受對曰慶氏之邑足欲故亡吾邑不足欲也益之以鄁殿乃足欲亡無日矣不受鄁殿非惡富也恐失富也鄁蒲對翻殿多薦翻又如字公儀休不受魚飱以定其位公儀休為魯相客有遺相魚者相不受客曰聞君嗜魚遺君魚何故不受也相曰以嗜魚故不受也今為相能自給魚受魚而免誰復給我魚者故不受也臣雖不才亦願固福祿於聖世上乃以不疑為侍中奉車都尉梁商之讓通經傳之力也三月乙亥京師地震燒當羌􅃚離等復反復扶又翻下同夏四月癸卯䕶羌校尉馬賢討斬之獲首虜千二百餘級戊午赦天下五月戊辰封故濟北惠王壽子安為濟北王去年濟北王多薨無子今以安紹封范書列傳作安國此從帝紀濟子禮翻秋八月太原旱五年春二月戊申京師地震南匈奴句龍王吾斯車紐等反句古侯翻車尺遮翻冦西河招誘右賢王合兵圍美稷殺朔方代郡長吏夏五月度遼將軍馬續與中郎將梁並等此䕶匈奴中郎將也發邊兵及羌胡合二萬餘人掩擊破之吾斯等復更屯聚攻沒城邑天子遣使責讓單于單于本不預謀乃脱帽避帳詣並謝罪並以病徴五原太守陳龜代為中郎將龜以單于不能制下賢曰吾斯等攻沒城邑單于雖不預謀然不能制下即是不堪其任逼迫單于及其弟左賢王皆令自殺龜又欲徙單于近親於内郡而降者遂更狐疑龜坐下獄免降户江翻下同龜所施行必冇未究其方畧者而遽坐免也下遐稼翻大將軍商上表曰匈奴冦畔自知罪極窮鳥困獸皆知救死鳥窮則攫獸困則搏傳曰困獸猶鬭況種類繁熾不可單盡賢曰單亦盡也種章勇翻今轉運日増三軍疲苦虛内給外非中國之利度遼將軍馬續素有謀謨且典邊日乆深曉兵要每得續書與臣策合宜令續深溝髙壘以恩信招降宣示購賞明為期約如此則醜類可服賢曰醜等也余謂醜類言凶醜之黨類也國家無事矣帝從之乃詔續招降畔虜商又移書續等曰中國安寧忘戰日乆良騎夜合交鋒接矢决勝當時戎狄之所長而中國之所短也彊弩乘城堅營固守以待其衰中國之所長而戎狄之所短也宜務先所長而觀其變先悉薦翻設購開賞宣示反悔反音幡宣示招降之意以開其反悔之心勿貪小功以亂大謀於是右賢王部抑鞮等萬三千口皆詣續降鞮丁奚翻己丑晦日有食之初􅃚離等既平朝廷以來機為并州刺史劉秉為凉州刺史機等天性虐刻多所擾發且凍傅難種羌遂反賢曰且音子余翻種章勇翻下同攻金城與雜種羌胡大冦三輔殺害長吏機等並坐徴於是拜馬賢為征西將軍以騎都尉耿叔為副將左右羽林五校士及諸州郡兵十萬人屯漢陽九月令扶風漢陽築隴道塢三百所置屯兵辛未太尉王龔以老病罷且凍羌冦武都燒隴關賢曰隴山之關也今名大震關在今隴州汧源縣西壬午以太常桓焉為太尉匈奴句龍王吾斯等立車紐為單于東引烏桓西收羌胡等數萬人攻破京兆虎牙營殺上郡都尉及軍司馬遂冦掠并涼幽冀四州乃徙西河治離石賢曰離石即西河之屬縣也在郡南五百九里郡本都平定縣至此徙於離石上郡治夏陽朔方治五原十二月遣使匈奴中郎將張耽將幽州烏桓諸郡營兵擊車紐等戰於馬邑斬首三千級獲生口甚衆車紐乞降而吾斯猶率其部曲與烏桓冦鈔鈔楚交翻下同初上命馬賢討西羌大將軍商以為賢老不如太中大夫宋漢帝不從漢由之子也宋由為公於章和之間賢到軍稽留不進武都太守馬融上疏曰今雜種諸羌種章勇翻轉相鈔盜宜及其未并亟遣深入破其支黨并合也及其勢未合而攻其支黨而馬賢等處處留滯羌胡百里望塵千里聽聲今逃匿避回回胡對翻繞也曲也漏出其後則必侵冦三輔為民大害臣願請賢所不可用關東兵五千裁假部隊之號盡力率厲埋根行首以先吏士賢曰埋根言不退也行户剛翻先悉薦翻三旬之中必克破之臣又聞吳起為將暑不張葢寒不披裘今賢野次垂幕珍肴雜遝兒子侍妾事與古反臣懼賢等專守一城賢攻於西而羌出於東且其將士將不堪命必有髙克潰叛之變也鄭髙克好利而不顧其君文公使克將兵而禦狄于竟陳其師旅翺翔河上衆潰而歸安定人皇甫規亦見賢不恤軍事審其必敗審悉也察也上書言狀朝廷皆不從六年春正月丙子征西將軍馬賢與且凍羌戰于射姑山且子余翻射音夜按續漢書天文志射姑山在北地賢軍敗賢及二子皆沒東西羌遂大合羌居安定北地上郡西河者謂之東羌居隴西漢陽延及金城塞外者謂之西羌閏月鞏唐羌冦隴西遂及三輔燒園陵殺掠吏民二月丁巳有星孛于營室晉書天文志營室二星天子之宫也又為軍糧之府及土功事孛蒲内翻三月上已大將軍商大㑹賔客讌于雒水司馬彪曰三月上已宫人皆潔於東流上洗濯祓除為大潔也按古以三月上已日為上已今以三月三日為上已酒闌繼以䪥露之歌纂文曰䪥露今之挽歌也崔豹古今注曰䪥上露何易晞露晞明朝還復落人死一去何時歸䪥下戒翻一作薤從事中郎周舉聞之歎曰此所謂哀樂失時樂音洛非其所也殃將及乎左傳曰哀樂失時殃咎必至武都太守趙冲追擊鞏唐羌太考異曰西羌傳作武威守今從帝紀皇甫規傳云與䕶羌校尉趙冲按西羌傳冲時尚為太守規傳誤也斬首四百餘級降二千餘人詔冲督河西四郡兵為節度余按冲以追羌之功詔督河西四郡兵則武威太守為是武都西北接漢陽東北接扶風南接漢中無縁逺督河西四郡兵安定上計掾皇甫規上疏曰臣比年以來數陳便宜羌戎未動策其將反馬賢始出知其必敗誤中之言在可考校比毗至翻數所角翻中竹仲翻臣每惟賢等擁衆四年未有成功縣師之費且百億計賢曰縣猶停也余謂出師逺征其勢縣絶不能相及故曰縣師縣讀曰懸出於平民平民謂齊民也回入姦吏謂為姦吏所侵盜也故江湖之人羣為盜賊青徐荒饑襁負流散襁居兩翻夫羌戎潰叛不由承平皆因邊將失於綏御乘常守安則加侵暴言前後相乘以侵暴羌戎為常也茍競小利則致大害微勝則虚張首級軍敗則隠匿不言軍士勞怨困於猾吏進不得快戰以徼功徼一遙翻退不得温飽以全命餓死溝渠暴骨中原徒見王師之出不聞振旅之聲賢曰振整也旅衆也穀梁傳曰出曰治兵入曰振旅酋豪泣血驚懼生變酋慈秋翻是以安不能乆叛則經年臣所以搏手扣心而増歎者也願假臣兩營二郡屯列坐食之兵五千賢曰兩營謂馬賢及趙冲等二郡安定隴西也余謂兩營者扶風雍營及京兆虎牙營也出其不意與趙冲共相首尾土地山谷臣所曉習兵勢巧便臣已更之更工衡翻經也歴也可不煩方寸之印尺帛之賜髙可以滌患下可以納降降户江翻若謂臣年少官輕不足用者凡諸敗將非官爵之不髙年齒之不邁賢曰邁徃也臣不勝至誠沒死自陳勝音升沒死猶言昧死也冒死也帝不能用庚子司空郭䖍免丙午以太僕趙戒為司空夏使匈奴中郎將張耽度遼將軍馬續率鮮卑到穀城擊烏桓於通天山大破之穀城盖即西河郡之穀羅縣城通天山葢即土軍縣之石樓山以其髙絶故曰通天鞏唐羌冦北地䍐考異曰西羌𫝊作種羌今從帝紀北地太守賈福與趙冲擊之不利秋八月乘氏忠侯梁商病篤乘繩證翻敇子冀等曰吾生無以輔益朝廷死何可耗費帑藏帑他朗翻藏徂浪翻衣衾飯含玉匣珠貝之屬賢曰含口實也白虎通曰大夫飯以玉含以貝士飯以珠含以貝也飯父逺翻含户紺翻何益朽骨百僚勞擾紛華道路祗増塵垢耳宜皆辭之丙辰薨帝親臨喪諸子欲從其誨朝廷不聽賜以東園祕器銀鏤黄腸玉匣賢曰棺以銀鏤之以柏木黄心為椁曰黄腸孔穎達曰喪服大記君松椁大夫柏椁士雜木椁鄭注椁謂周棺者也天子柏椁以端長六尺正義曰君松椁君諸侯也諸侯用松為椁材也盧云以松黄腸為椁庾云黄腸松心也大夫柏椁以柏為椁不用黄腸下天子也及葬賜輕車介士賢曰輕車兵車也介士甲士也中宫親送帝幸宣陽亭賢曰每城門各有亭即宣陽門之亭也余按續漢志雒陽城十二門無宣陽門魏晉之間洛城始有宣陽門正南門也漢雒城正南曰平城門瞻望車騎壬戌以河南尹乘氏侯梁冀為大將軍冀弟侍中不疑為河南尹臣光曰成帝不能選任賢俊委政舅家可謂闇矣猶知王立之不材棄而不用事見三十二卷元延元年順帝援大柄授之后族援于元翻梁冀頑嚚凶暴著於平昔而使之繼父之位終於悖逆嚚魚巾翻悖蒲内翻又蒲沒翻蕩覆漢室校於成帝闇又甚焉初梁商病篤帝親臨幸問以遺言對曰臣從事中郎周舉清髙忠正可重任也由是拜舉諫議大夫續漢志曰武帝元符五年置諫大夫世祖中興以為諫議大夫九月諸羌冦武威辛亥晦日有食之冬十月癸丑以羌冦充斥凉部震恐復徙安定居扶風北地居馮翊永建四年二郡還舊治今復徙之復扶又翻十一月庚子以執金吾張喬行車騎將軍事將兵萬五千人屯三輔荆州盜賊起彌年不定以大將軍從事中郎李固為荆州刺史固到遣吏勞問境内赦冦盜前釁與之更始勞力到翻更工衡翻於是賊帥夏宻等率其魁黨六百餘人自縛歸首帥所類翻首式救翻固皆原之遣還自相招集開示威灋半嵗間餘類悉降降户江翻州内清平奏南陽太守髙賜等臧穢臧古贓字通賜等重賂大將軍梁冀冀為之千里移檄賢曰言移檄一日行千里救之急也為于偽翻而固持之愈急冀遂徙固為㤗山太守時泰山盜賊屯聚歴年郡兵常千人追討不能制固到悉罷遣歸農但選留任戰者百餘人任音壬以恩信招誘之未滿嵗賊皆弭散誘音酉弭止也散逃潰而去也漢安元年春正月癸巳赦天下改元秋八月南匈奴句龍吾斯與薁鞬臺耆等復反薁音郁鞬居言翻復扶又翻冦掠并部丁卯遣侍中河内杜喬周舉按范書紀傳周舉汝南人時為光禄大夫守光禄大夫周栩馮羨魏郡欒巴張綱張綱犍為武陽人栩况羽翻郭遵劉班分行州郡行下孟翻表賢良顯忠勤其貪汚有罪者刺史二千石驛馬上之墨綬以下便輒收舉刺史二千石大吏驛馬上奏其罪取㫖黜免驛馬欲速達京闕也墨綬縣令長也令長以下便收案舉劾其罪上時掌翻喬等受命之部張綱獨埋其車輪於雒陽都亭漢郡國縣道皆有都亭曰豺狼當路安問狐狸前漢京兆督郵矦文對孫寳之辭遂劾奏大將軍冀河南尹不疑以外戚䝉恩居阿衡之任而專肆貪叨縱恣無極謹條其無君之心十五事斯皆臣子所切齒者也書御賢曰御進也京師震竦時皇后寵方盛諸梁姻戚滿朝朝直遙翻帝雖知綱言直不能用也杜喬至兖州表奏泰山太守李固政為天下第一上徴固為將作大匠八使所劾奏多梁冀及宦者親黨互為請救事皆寢遏劾户槩翻又户得翻寢者已御其奏寢而不行遏者其奏未達遏而不上侍御史河南种暠疾之种音冲暠古老翻復行案舉復扶又翻廷尉吳雄將作大匠李固亦上言八使所糾宜急誅罰帝乃更下八使奏章令考正其罪下遐稼翻梁冀恨張綱思有以中傷之中竹仲翻時廣陵賊張嬰冦亂揚徐間積十餘年二千石不能制冀乃以綱為廣陵太守前太守率多求兵馬綱獨單車之職既到徑詣嬰壘門嬰大驚遽走閉壘綱於門罷遣吏民獨留所親者十餘人以書喻嬰請與相見嬰見綱至誠乃出拜謁綱延置上坐坐才卧翻譬之曰前後二千石多肆貪暴故致公等懐憤相聚二千石信有罪矣然為之者又非義也今主上仁聖欲以恩徳服叛故遣太守來思以爵祿相榮不願以刑罰相加今誠轉禍為福之時也若聞義不服天子赫然震怒荆揚兖豫大兵雲合身首横分血嗣俱絶賢曰凡祭皆用牲故曰血嗣或曰父子氣血相傳故曰血嗣二者利害公其深計之嬰聞泣下曰荒裔愚民不能自通朝廷不堪侵枉遂復相聚偷生復扶又翻若魚游釡中知其不可乆且以喘息須㬰間耳人以氣一出入之頃為一息喘者息之疾音尺兖翻今聞明府之言乃嬰等更生之辰也乃辭還營明日將所部萬餘人與妻子面縛歸降冦考異曰帝紀九月張嬰郡縣又云是嵗嬰詣綱降按張綱傳云冦亂十餘年則非今年九月始冦郡縣也袁紀置嬰降事於八月下十月上今從之綱單車入嬰壘大㑹置酒為樂樂音洛散遣部衆任從所之親為卜居宅相田疇賢曰相視也田並畔曰疇為于偽翻相息亮翻子孫欲為吏者皆引召之人情悦服南州晏然朝廷論功當封梁冀遏之在郡一嵗卒卒子恤翻張嬰等五百餘人為之制服行喪為于偽翻送到犍為犍居言翻負土成墳詔拜其子續為郎中賜錢百萬是時二千石長吏有能政者有雒陽令任峻任音壬冀州刺史京兆蘇章膠東相陳留吳祐雒陽令自王渙之後皆不稱職王渙事見四十八卷和帝元興元年稱尺證翻峻能選用文武吏各盡其用發姦不旋踵民間不畏吏其威禁猛於渙而文理政教不如也章為冀州刺史有故人為清河太守章行部欲案其姦臧行下孟翻臧古贓字通用乃請太守為設酒肴陳平生之好甚歡為于偽翻好呼到翻太守喜曰人皆有一天我獨有二天謂章必能覆蓋其惡也章曰今夕蘇孺文與故人飲者私恩也蘇章字孺文明日冀州刺史案事者公灋也遂舉正其罪州境肅然後以摧折權豪忤㫖坐免時天下日敝民多愁苦論者日夜稱章朝廷遂不能復用也復扶又翻祐為膠東相續漢志膠東矦國屬北海國政崇仁簡民不忍欺嗇夫孫性私賦民錢市衣以進其父百官志縣置嗇夫一人主知民善惡為役先後知民貧富為賦多少平其差品風俗通曰嗇省也夫賦也言省息百姓均其役賦嗇音色父得而怒曰有君如是何忍欺之促歸伏罪性慙懼詣閣持衣自首首式救翻祐屏左右問其故屛必郢翻性具談父言祐曰掾以親故受汚穢之名所謂觀過斯知仁矣論語載孔子之言也此言觀性之過在於取民則知其心主於奉父使歸謝其父還以衣遺之遺于季翻冬十月辛未太尉桓焉司徒劉壽免罕羌邑落五千餘户詣趙冲降唯燒何種據參䜌未下種章勇翻參䜌縣屬安定郡䜌音力全翻甲戌罷張喬軍屯十一月壬午以司隸校尉下邳趙峻為太尉大司農胡廣為司徒二年夏四月庚戌䕶羌校尉趙冲與漢陽太守張貢擊燒當羌於參䜌破之當當作何此承范紀之誤燒當燒何羌兩種也六月丙寅立南匈奴守義王兠樓儲為呼蘭若尸逐就單于自永和五年吾斯車紐反陳龜逼殺單于休利南庭虚位至是始立單于考異曰袁紀去年六月立兜樓儲為單于今從范書時兜樓儲在京師上親臨軒授璽綬引上殿賜車馬器服金帛甚厚璽斯氏翻綬音受引上時掌翻詔太常大鴻臚與諸國侍子於廣陽門外祖㑹饗賜作樂角抵百戲太常掌樂大鴻臚典四夷之客故詔使祖單于祖㑹為祖道之㑹也賢曰廣陽城西面南頭門角抵之戲則魚龍爵馬之屬言兩兩相當亦角而為抵對即今之鬭角古之角抵也臚陵如翻冬閏十月趙冲擊燒當羌於阿陽破之賢曰阿陽縣屬漢陽郡故城在今秦州隴城縣西北十一月使匈奴中郎將扶風馬寔遣人刺殺句龍吾斯刺七亦翻句古侯翻凉州自九月以來地百八十震山谷坼裂壊敗城寺壊音怪敗補邁翻民壓死者甚衆尚書令黄瓊以前左雄所上孝㢘之選專用儒學文吏亊見上卷陽嘉元年上時掌翻於取士之義猶有所遺乃奏増孝悌及能從政為四科帝從之建康元年是年四月改元春䕶羌從事馬𤣥為諸羌所誘將羌衆亡出塞誘音酉將如字領也領䕶羌校尉衛琚追擊𤣥等斬首八百餘級琚音居趙冲復追叛羌到建威鸇隂河賢曰續漢書建威作武威鸇隂縣名屬安定郡又曰凉州姑臧縣東南有鸇隂縣故城縣因水以為名宋白曰㑹州㑹寧縣漢鸇隂縣地黄河西南自蘭州金城縣界流注水經云河水又東過勇士縣北東流即此處復扶又翻軍度竟所將降胡六百餘人叛走降户江翻冲將數百人追之遇羌伏兵與戰而殁冲雖死而前後多所斬獲羌遂衰耗詔封冲子為義陽亭侯夏四月使匈奴中郎將馬寔擊南匈奴左部破之左部即句龍吾斯之黨於是胡羌烏桓悉詣寔降辛巳立皇子炳為太子炳虞貴人之子也改元赦天下太子居承光宫帝使侍御史种暠監太子家監古銜翻中常侍髙梵從中單駕出迎太子暠工老翻梵房戎翻又房汎翻時太傅杜喬等疑不欲從而未决暠乃手劒當車曰手守又翻太子國之儲副天命所係今常侍來無詔信何以知非姦邪今日有死而已梵辭屈不敢對馳還奏之詔報太子乃得去喬退而歎息愧暠臨事不惑愧者愧己之不能然也帝亦嘉其持重稱善者良乆揚徐盜賊羣起盤互連嵗秋八月九江范容周生等冦掠城邑屯據歴陽歴陽縣屬九江郡賢曰今和州縣為江淮巨患遣御史中丞馮緄督州兵討之緄古本翻考異曰帝紀作馮赦袁紀作馮放皆誤今據緄傳庚午帝崩于玉堂前殿年三十太子即皇帝位年二嵗尊皇后曰皇太后太后臨朝丁丑以太尉趙峻為太傅大司農李固為太尉參録尚書事九月丙午葬孝順皇帝于憲陵賢曰憲陵在雒陽西十五里廟曰敬宗是日京師及太原鴈門地震庚戌詔舉賢良方正之士策問之皇甫規對曰伏惟孝順皇帝初勤王政紀綱四方幾以獲安幾讀曰冀後遭姦偽威分近習賢曰近習謂佞幸親近小人也受賂賣爵賔客交錯天下擾擾從亂如歸官民並竭上下窮虚陛下體兼乾坤以坤母臨朝以君天下行乾之徳故曰體兼乾坤聰哲純茂攝政之初拔用忠貞其餘維綱多所改正逺近翕然望見太平而災異不息冦賊縱横縱子容翻殆以姦臣權重之所致也其常侍尤無狀者賢曰無狀謂無善狀宜亟黜遣披埽凶黨披開也埽除也收入財賄以塞痛怨塞悉則翻以答天誡大將軍冀河南尹不疑亦宜增修謙節輔以儒術省去遊娛不急之務去羌吕翻割減廬第無益之飾夫君者舟也民者水也家語孔子曰君者舟也民者水也水可載舟亦以覆舟君以此思危則危可知也羣臣乘舟者也將軍兄弟操檝者也操千髙翻檝與楫同若能平志畢力以度元元所謂福也如其怠弛將淪波濤可不慎乎夫徳不稱祿猶鑿墉之趾以益其髙豈量力審功安固之道哉稱尺證翻量音良凡諸宿猾酒徒戲客皆宜貶斥以懲不軌令冀等深思得賢之福失人之累累良瑞翻梁冀忿之以規為下第拜郎中託疾免歸州郡承冀㫖幾陷死者再三遂沈廢於家積十餘年幾居希翻沈持林翻考異曰規傳云冲質之間規對策免歸積十四年檢帝紀此後别無舉賢良事或者此時規舉賢良其至對策時已在質帝世也故云冲質之間自明年數至梁冀誅亦整十四年也揚州刺史尹耀九江太守鄧顯討范容等於歴陽敗歿冬十月日南蠻夷復反復扶又翻攻燒縣邑交趾刺史九江夏方招誘降之夏户雅翻十一月九江盜賊徐鳳馬勉攻燒城邑鳳稱無上將軍勉稱皇帝月考異曰帝紀永嘉元年三勉稱皇帝今據滕撫傳築營於當塗山中賢曰當塗縣之山在今宣州余按兩漢志當塗縣屬九江郡續志曰縣有馬丘聚徐鳳反於此又有塗山禹㑹諸侯處也又有芍陂陂在夀州安豐縣東塗山在濠州鍾離縣西九十五里以此證之漢當塗縣地當在唐濠夀二州界晉氏南渡淮民避亂渡江晉成帝乃僑立當塗縣於于湖於唐屬宣州今當塗縣非漢舊當塗縣也建年號置百官十二月九江賊黄虎等攻合肥合肥縣屬九江郡賢曰故城在今廬州北應劭曰夏水出父城東南至此與淮合故曰合肥是嵗羣盜發憲陵孝冲皇帝諱炳諡法幼少在位曰冲司馬彪曰冲幼早夭故諡曰冲伏侯古今注曰炳之字曰明永嘉元年紀考異曰袁作元嘉誤春正月戊戌帝崩于玉堂前殿年三嵗梁太后以揚徐盜賊方盛欲須所徵諸王侯到乃發喪太尉李固曰帝雖幼少猶天下之父今日崩亡人神感動豈有人子反共掩匿乎人子當作臣子昔秦皇沙丘之謀及近日北鄉之事皆祕不發喪沙丘事見七卷秦始皇三十七年北鄉事見上卷安帝延光四年此天下大忌不可之甚者也太后從之即暮發喪徵清河王蒜及渤海孝王鴻之子纘皆至京師蒜父曰清河恭王延平延平及鴻皆樂安夷王寵之子千乘貞王伉之孫也千乘貞王伉章帝建初四年封薨子寵嗣和帝永元七年改千乘國曰樂安薨子為嗣是生質帝帝既立梁太后以樂安國土卑濕租委鮮薄改封鴻渤海王清河王慶子虎威嗣國三年而薨無子鄧太后立延平為清河王諡法安心好靜曰夷蒜蘇貫翻伉音抗清河王為人嚴重動止有灋度公卿皆歸心焉李固謂大將軍冀曰今當立帝宜擇長年髙明有徳任親政事者長知兩翻任如林翻堪也願將軍審詳大計察周霍之立文宣戒鄧閻之利幼弱周勃事見十三卷髙后八年霍光事見二十四卷昭帝元平元年鄧氏事見四十八卷和帝元興元年四十九卷殤帝延平元年閻氏事見上卷安帝延光四年冀不從與太后定策禁中丙辰冀持節以王青葢車迎纘入南宫丁巳封為建平侯其日即皇帝位年八嵗蒜罷歸國將卜山陵李固曰今處處冦賊軍興費廣新創憲陵賦發非一帝尚幼小可起陵於建陵塋内依康陵制度康陵殤帝陵亦在慎陵塋内塋音營太后從之己未葬孝冲皇帝於懐陵太后委政宰輔李固所言太后多從之宦官為惡者一皆斥遣天下咸望治平治直吏翻而梁冀深忌疾之初順帝時所除官多不以次及固在事奏免百餘人此等既怨又希望冀㫖遂共作飛章誣奏固曰太尉李固因公假私依正行邪離間近戚間古莧翻自隆支黨大行在殯路人掩涕掩涕者掩面而泣也固獨胡粉飾貌燒鉛汞成粉以傅面北史曰胡粉出龜兹國搔頭弄姿西京雜記曰武帝遇李夫人就取玉簪搔頭自此宫人搔頭皆用玉槃旋偃仰從容治步從七容翻從容舒緩也治步言修治容儀行步中規矩也治直之翻曽無慘怛傷悴之心悴秦醉翻山陵未成違矯舊政善則稱己過則歸君斥逐近臣不得侍送作威作福莫固之甚矣夫子罪莫大於累父累功瑞翻臣惡莫深於毁君固之過釁事合誅辟辟毗亦翻書奏冀以白太后使下其書下遐稼翻太后不聽廣陵賊張嬰復聚衆數千人反據廣陵復扶又翻下同二月乙酉赦天下西羌叛亂積年費用八十餘億諸將多斷盜牢禀前書音義曰牢價直也稟給也賢曰牢稟食也古者宅廩為牢斷割也減割牢廩而盜之斷丁管翻私自潤入皆以珍寳貨賂左右上下放縱不恤軍事士卒不得其死者白骨相望於野左馮翊梁並以恩信招誘叛羌離湳狐奴等五萬餘户皆詣並降誘音酉湳乃感翻降户江翻隴右復平太后以徐揚盜賊益熾博求將帥三公舉涿令北海滕撫有文武才姓譜滕侯之後以國為氏詔拜撫九江都尉與中郎將趙序助馮緄合州郡兵數萬人共討之緄古本翻又廣開賞募錢邑各有差謂立賞格錢邑以功之髙下為差錢賜錢也邑封邑也又議遣太尉李固未及行三月撫等進擊衆賊大破之斬馬勉范容周生等千五百級徐鳳以餘衆燒東城縣東城縣屬九江郡賢曰在今濠州定逺縣南夏五月下邳人謝安應募率其宗親設伏擊鳳斬之封安為平鄉侯拜滕撫中郎將督揚徐二州事丙辰詔曰孝殤皇帝即位踰年君臣禮成孝安皇帝承襲統業而前世遂令恭陵在康陵之上先後相踰失其次序今其正之六月鮮卑冦代郡秋廬江盜賊攻尋陽尋陽縣屬廬江郡班志注云禹貢九江在南皆東合為大江余按尋陽縣本在大江之北尋水之陽吳立蘄春郡尋陽縣屬焉蘄春縣漢屬江夏郡唐蘄州之地元豐九域志蘄州東南至江州二百四十里是江州得尋陽之名由司馬氏置尋陽太守於柴桑於江南之尋陽著於此江北之尋陽晦矣又攻旴台旴台縣屬下邳國音吁怡滕撫遣司馬王章擊破之九月庚戌太傅趙峻薨滕撫進擊張嬰冬十一月丙午破嬰斬獲千餘人丁未中郎將趙序坐畏懦詐増首級棄市三考異曰東觀記曰取錢縑百七十五萬今從滕撫傳歴陽賊華孟自稱黑帝華户化翻攻殺九江太守楊岑滕撫進擊破之斬孟等三千八百級虜獲七百餘人於是東南悉平振旅而還還從宣翻又如字以撫為左馮翊永昌太守劉君世鑄黄金為文蛇以獻大將軍冀益州刺史种暠糾發逮捕馳傳上言傳株戀翻下傳逮同上時掌翻冀由是恨暠㑹巴郡人服直姓譜服周内史叔服之後漢有江夏太守服徹聚黨數百人自稱天王暠與太守應承討捕不克吏民多被傷害被皮義翻冀因此陷之傳逮暠承逮暠承傳詣京師也李固上疏曰臣伏聞討捕所傷本非暠承之意實由縣吏懼法畏罪迫逐深苦致此不詳詳審也言不能審知賊勢驅民赴戰以致死傷也比盜賊羣起比毗至翻處處未絶暠承以首舉大姦而相隨受罪臣恐沮傷州縣糾發之意更共飾匿賢曰言各飾偽辭隠匿真狀也莫復盡心太后省奏復扶又翻省悉景翻乃赦暠承罪免官而已金蛇輸司農大司農掌諸錢穀金帛故金蛇輸司農懦考異曰种暠傳云二府畏不敢按之今從杜喬傳冀從大司農杜喬借觀之喬不肯與冀小女死令公卿㑹喪喬獨不徃冀由是銜之為冀殺喬張本資治通鑑卷五十二
