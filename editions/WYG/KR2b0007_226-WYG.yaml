front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷二百二十六宋司馬光撰胡三省音注唐紀四十二起屠維恊洽八月盡重光作噩五月凡一年有竒始己未八月終辛酉五月凡二年零十月代宗睿文孝武皇帝下大厯十四年八月甲辰以道州司馬楊炎為門下侍郎大厯十二年楊炎以黨元載貶懷州刺史喬琳為御史大夫並同平章事在考異曰崔祐甫與炎皆自門下遷中書是時中書上也憲宗以後門下在上中書在下不知何時遷改上方勵精求治治直吏翻不次用人卜相於崔祐甫相息亮翻祐甫薦炎器業上亦素聞其名故自遷謫中用之琳太原人性粗率喜詼諧粗讀曰麁善許記翻無它長與張渉善渉稱其才可大用上信渉言而用之聞者無不駭愕代宗之世吐蕃數遣使求和吐從暾入聲數所角翻使疏吏翻下同而冦盜不息代宗悉留其使者前後八輩有至老死不得歸者俘獲其人皆配江嶺使疏吏翻俘方無翻江謂大江之南嶺謂五嶺之外上欲以徳懷之乙巳以隨州司馬韋倫為太常少卿使于吐蕃悉集其俘五百人各賜襲衣而遣之少始照翻襲衣衣一襲也衣一稱為一襲恊律郎沈既濟上選舉議唐制恊律郎掌和律吕辯四時之氣八風五音之節屬太常寺正八品上上時掌翻以為選用之法三科而已曰徳也曰才也勞也今選曹皆不及焉選湏絹翻下同考校之法皆在書判簿歴言詞俯仰而已唐擇人之法有四曰身言書判身取其體貌豐偉言取其言詞辯正書取其楷法遒美判取其文理優長簿歴所以著其資考殿最俯仰則觀諸身言之間夫安行徐言非徳也麗藻芳翰非才也累資積考非勞也執此以求天下之士固未盡矣今人未土著夫音扶著直畧翻不可本於鄉閭鑒不獨明不可專於吏部臣謹詳酌古今謂五品以上及羣司長官宜令宰臣進叙吏部兵部得參議焉長知兩翻其六品以下或僚佐之屬許州府辟用其牧守將帥守手又翻將即亮翻帥所類翻或選用非公則吏部兵部得察而舉之罪其私冒不慎舉者小加譴黜大正刑典責成授任誰敢不勉夫如是則賢者不奬而自進不肖者不抑而自退衆才並進而官無不治矣今選法皆擇才於吏部試能於州郡若才職不稱稱尺證翻紊亂無任紊文運翻任音壬責於刺史則曰命官出於吏曹不敢廢也責於侍郎則曰量書判資考而授之不保其往也量音良責於令史則曰按由歷出入而行之不知其它也黎庶徒弊誰任其咎若牧守自用則罪將焉逃必州郡之濫獨換一刺史則革矣如吏部之濫雖更其侍郎無益也焉於䖍翻更工衡翻葢人物浩浩不可得而知法使之然非主司之過今諸道節度都團練觀察租庸等使自判官副將以下皆使自擇縱其間或有情故大舉其例十猶七全則辟吏之法已試於今但未及於州縣耳利害之理較然可觀曏令諸使僚佐盡受於選曹則安能鎮方隅之重理財賦之殷乎既濟吴人也等使疏吏翻下諸使同將即亮翻令力丁翻選湏絹翻初衡州刺史曹王臯有治行治直吏翻行下孟翻衡州治衡陽縣屬湖南觀察湖南觀察使辛京杲疾之大厯五年辛京杲為湖南觀察使䧟以法貶潮州刺史度嶺為貶時楊炎在道州知其直及入相復擢為衡州刺史相息亮翻復扶又翻始臯之遭誣在治在治者謂獄吏治其事臯以囚服在列念太妃老將驚而戚出則囚服就辯入則擁笏垂魚唐高宗給五品以上隨身魚銀袋以防召命之詐三品以上金飾袋天授二年改佩魚為龜中宗罷龜復給以魚郡王嗣王亦佩金魚袋即貶于潮即就也以遷入賀及是然後跪謝告實臯明之𤣥孫也曹王明太宗之子朔方邠寧節度使李懷光既代郭子儀邠府宿將史抗温儒雅龎仙鶴張獻明李光逸功名素出懷光右皆怏怏不服邠卑旻翻龐都江翻怏於兩翻懷光發兵防秋屯長武城軍期進退不時應令監軍翟文秀勸懷光奏令宿衛既離營監工銜翻翟萇伯翻奏令力丁翻離力智翻使人追捕誣以它罪且曰黄萯之敗黄萯敗事見二百二十四卷九年萯音倍職爾之由盡殺之九月甲戍改淮西曰淮寧西川節度使同平章事崔寧在蜀十餘年永泰元年崔旰入成都至是十四年矣恃地險兵彊恣為淫侈朝廷患之而不能易至是入朝加司空兼山陵使南詔王閤羅鳯卒子鳯迦異前死孫異牟尋立朝直遥翻使疎吏翻卒子恤翻迦音加冬十月丁酉朔吐蕃與南詔合兵十萬三道入冦一出茂州一出扶文吐從暾入聲文州漢隂平之地隋為曲水縣義寧三年分武都之曲水正西長松置文州扶州古鄧至地後周天和中置扶州舊本置龍涸防與隂平接界盖吐蕃出扶文南詔出黎雅也一出黎雅黎州之地漢屬越嶲郡界隋置漢源縣武后大足元年置黎州黎州漢沉黎縣雅州漢嚴道縣境相接也考異曰建中實録裴垍徳宗實録此月吐蕃三道入冦皆在梁益之境而來年四月乃云去冬吐蕃三道來侵一自靈武一自山南一自蜀又云賛普謂韋倫曰今靈武之師聞命輟矣而山南已入扶文蜀師已趣灌口追且不及與此自相違今不取曰吾欲取蜀以為東府崔寧在京師所留諸將不能禦將即亮翻虜連䧟州縣刺史弃城走士民竄匿山谷上憂之趣寧歸鎮趣讀曰促寧已辭楊炎言於上曰蜀地富饒寧據有之朝廷失其外府十四年矣寧雖入朝全師尚守其後貢賦不入與無蜀同且寧本與諸將等夷因亂得位威令不行今雖遣之必恐無功若其有功則義不可奪是蜀地敗固失之勝亦不得也願陛下熟察上曰然則柰何對曰請留寧發朱泚所領范陽兵數千人雜禁兵往擊之何憂不克泚且禮翻又音此因而得内親兵於其腹中蜀將必不敢動然後更授他帥將即亮翻更工衡翻帥所類翻使千里沃壤復為國有復扶又翻又音如字是因小害而收大利也上曰善遂留寧初馬璘忌涇原都知兵馬使李晟功名遣入宿衛為右神䇿都將璘離珍翻使疏吏翻晟成正翻將即亮翻上發禁兵四千人使晟將之發邠隴范陽兵五千邠隴邠寧隴右二鎮之兵也將即亮翻又音如字下同使金吾大將軍安邑曲環將之以救蜀史炤曰曲姓也漢有代郡太守曲謙東川出兵自江油趨白垻江油漢魏為無人之地晉始置平武縣唐改為江油縣帶龍州利州管下景谷縣西北有白垻鎮城垻必駕翻蜀人謂平川為垻與山南兵合擊吐蕃南詔破之范陽兵追及於七盤吐從暾入聲七盤縣屬巴州武后久視元年置又破之遂克維茂二州李晟追擊於大度河外大度河在雅州盧山縣寰宇記大度河自吐蕃界經雅州諸部落至黎州東界流入通望界於黎州為南邊要害之地又破之吐蕃南詔饑寒隕於崖谷死者八九萬人吐蕃悔怒殺誘導使之來者異牟尋懼築苴哶城自瀘州南渡瀘水六百五十里至羊苴哶城舊史羊苴咩城南去大和城十餘里東北至成都二千四百里去雲南城三百里誘羊久翻咩莫者翻又徐婢翻史炤曰苴音酢又徐嗟切咩音養又彌嗟切薛能聞官軍破吉浪詩越嶲通遊客苴咩閙聚蚊又西縣塗中野色生肥芉鄉儀搗散茶梯航經杜宇烽火徹苴咩延袤十五里徙居之吐蕃封之為日東王上用法嚴百官震悚以山陵近禁人屠宰郭子儀之𨽻人潜殺羊載以入城𨽻人僕𨽻之屬右金吾將軍裴諝奏之或謂諝曰郭公有社稷大功君獨不為之地乎諝曰此乃吾所以為之地也郭公勲高望重上新即位以為羣臣附之者衆徳宗之猜忌裴諝于其初政已窺見之諝私吕翻吾故發其小過以明郭公威權不足畏也如此上尊天子下安大臣不亦可乎己酉𦵏睿文孝武皇帝于元陵元陵在京兆富平縣西北二十五里檀山廟號代宗將發引上送之見輼輬車不當馳道稍指丁未之間引羊晉翻輼音温輬音凉欲考異曰按車指丁未之間則行出道外矣盖出門斜就道西不當道之中間行耳問其故有司對曰陛下本命在午不敢衝也上哭曰安有枉靈駕而謀身利乎命改轅直午而行肅宗代宗皆喜隂陽鬼神喜許切記事無大小必謀之卜祝故王嶼黎幹皆以左道得進上雅不之信嶼音余雅素也山陵但取七月之期禮天子七月而葬事集而發不復擇日復扶又翻下謀復同十一月丁丑以晉州刺史韓滉為蘇州刺史浙江東西觀察使滉呼廣翻使疏吏翻喬琳衰老耳聵聵五怪翻上或時訪問應對失次所謀議復疎闊壬午以琳為工部尚書罷政事上由是疎張渉喬琳渉所薦也尚辰羊翻楊炎既留崔寧二人由是交惡炎託以北邊須大臣鎮撫癸巳以京畿觀察使崔寧為單于鎮北大都䕶朔方節度使鎮坊州單音蟬以荆南節度使張延賞為西川節度使又以靈鹽節度都虞候醴泉杜希全知靈鹽州留後代州刺史張光晟知單于振武等城綏銀麟勝州留後雄考異曰舊傳云王為振武今從實録延州刺史李建徽知鄜坊丹州留後時寧既出鎮不當更置留後炎欲奪寧權且窺其所爲令三人皆得自奏事仍諷之使伺寧過失令力丁翻伺相吏翻章考異曰舊傳初寧代喬琳為御史大夫平事寧以為選擇御史當出大夫不謀及宰相乃奏請以李衡于結等數人為御史楊炎大怒其狀遂寢炎又數讒毁劉晏寧又救解之因此大怒其年十月南蠻大至上遣寧還鎮炎懼怨已入蜀難制奏止之按寧為御史大夫在吐蕃南蠻㓂蜀後舊傳恐悮十二月乙卯立宣王誦為皇太子舊制天下金帛皆貯於左藏太府四時上其數比部覆其出入唐制太府掌廪藏財貨出納比部掌句㑹蜀注曰唐制天下財賦皆納於左藏太府四時以數聞尚書比部覆校其出入貯丁吕翻藏狙浪翻上時掌翻比音毘及第五𤦺為度支鹽鐵使𤦺音竒度徒洛翻使疎吏翻時京師多豪將求取無節𤦺不能制將即亮翻乃奏盡貯於大盈内庫百寶大盈庫始於𤣥宗朝詳見二百二十八卷徳宗建中四年十月注使宦官掌之天子亦以取給為便故久不出由是以天下公賦為人君私藏有司不復得窺其多少校其贏縮藏徂浪翻復扶又翻贏有餘也縮不足也殆二十年宦官領其事者三百餘員皆蠶食其中蟠結根據牢不可動楊炎頓首於上前曰財賦者國之大本生民之命重輕安危靡不由之是以前世皆使重臣掌其事猶或耗亂不集耗當讀曰眊或讀如字今獨使中人出入盈虛大臣皆不得知政之蠧敝莫甚於此請出之以歸有司度宫中嵗用幾何度徒洛翻量數奉入量音良不敢有乏如此然後可以為政上即日下詔凢財賦皆歸左藏一用舊式嵗於數中擇精好者三五千匹進入大盈下遐稼翻萬考異曰徳宗實録作三五十匹今從建中實録炎以片言移人主意議者稱之丙寅晦日有食之湖南賊帥王國良阻山為盗帥所類翻上遣都官員外郎闗播招撫之唐都官郎掌俘𨽻簿録給衣糧醫藥而理其訴寃辭行上問以為政之要對曰為政之本必求有道賢人與之為理上曰朕比以下詔求賢比毘至翻近以當作己又遣使臣廣加搜訪庶幾可以為理乎使疎吏翻幾居希翻對曰下詔所求及使者所薦惟得文詞干進之士耳安有有道賢人肯隨牒舉選乎上悦崔祐甫有疾上令肩輿入中書或休假在第令力丁翻假古訝翻大事令中使咨决徳宗神武孝文皇帝一諱适代宗長子也謚法諫爭不威曰徳言不以威拒諫也執義揚善曰徳言稱人之善也建中元年春正月丁卯朔改元羣臣上尊號曰聖神文武皇帝上時掌翻赦天下始用楊炎議命黜陟使與觀察刺史約百姓丁産定等級改作兩税法楊炎作兩税法夏輸無過六月秋輸無過十一月視大厯十四年墾田数為定比來新舊徴科色目一切罷之比毘至翻比來猶云近來也二税外輙率一錢者以枉法論唐初賦歛之法曰租庸調有田則有租有身則有庸有户則有調𤣥宗之末版籍浸壞多非其實及至徳兵起所在賦歛迫趣取辦歛力贍翻調徒弔翻趣讀曰促無復常凖復扶又翻又音如字賦歛之司增數而莫相綂攝綂他綜翻俗從上聲各隨意增科自立色目新故相仍不知紀極民富者丁多率為官為僧以免課役而貧者丁多無所伏匿故上户優而下户勞吏因縁蠶食旬輸月送不勝困弊勝音升率皆逃徙為浮户其土著百無四五著直畧翻至是炎建議作兩税法先計州縣每嵗所應費用及上供之數而賦於人量出以制入户無主客以見居為簿人無丁中以貧富為差州縣有主户客户天寶三載令民十八以上為中男二十三以上成丁量音良見賢遍翻為行商者在所州縣税三十之一使與居者均無僥利言居行皆無僥幸之利也僥堅堯翻居人之税秋夏兩徵之其租庸調雜徭悉省皆總綂於度支上用其言因􅎁令行之初左僕射劉晏為吏部尚書楊炎為侍郎不相悦射寅謝翻尚辰羊翻元載之死晏有力焉事見上卷代宗大厯十三年載祖亥翻又如字及上即位晏久典利權衆頗疾之多上言轉運使可罷多上時掌翻使疎吏翻又有風言晏嘗宻表勸代宗立獨孤妃為皇后者風言謂得於風聞而言之者也楊炎為宰相欲為元載報仇因為上流涕言晏與黎幹劉忠翼同謀幹忠翼死於大厯十四年事見上卷為于偽翻相息亮翻臣為宰相不能討罪當萬死崔祐甫言茲事曖昩陛下已曠然大赦不當復䆒尋虛語曖音愛復扶又翻炎乃建言尚書省國政之本比置諸使分奪其權尚辰羊翻比毘至翻今宜復舊上從之甲子按是月無甲子恐是丙子否則戊子詔天下錢榖皆歸金部倉部唐志金部掌天下庫藏出納之數京市互市和市宫市交易之事倉部掌天下庫儲出納租税禄粮倉廩之事罷晏轉運租庸青苖鹽鐵等使東考異曰建中實録曰初大厯中上居宫貞懿皇后方為妃有寵生韓王回帝又鍾愛故閹官劉清潬京兆尹黎幹與左右嬖幸欲立貞懿為皇后且言韓王所居獲黄蛇以為符動摇儲宫而晏附其謀冀立殊効圖為宰輔時宰臣元載獨保䕶上以為最長而賢且嘗有功義不當移王縉亦謂人曰晏黠者也今所圖無乃過黠乎後其議漸定貞懿卒不立上憾之至是以晏大臣而附邪為姦不去將為亂託陳奏不實謫為忠州刺史沈既濟楊炎所薦盖附炎為説今從舊傳二月丙申朔命黜陟使十一人分廵天下黜陟使始置於太宗貞觀八年先是魏博節度使田悦事朝廷猶㳟順先悉薦翻使疏吏翻朝直遥翻河北黜陟使洪經綸宗考異曰建中實録黜陟使十一人而無名徳實録有十人名而無河北道及經綸名盖脱誤也不曉時務聞悦軍七萬人符下罷其四萬令還農下遐稼翻令力丁翻悦陽順命如符罷之既而集應罷者激怒之曰汝曹久在軍中有父母妻子今一旦為黜陟使所罷將何資以自衣食乎衆大哭悦乃出家財以賜之使各還部伍於是軍士皆徳悦而怨朝廷為田悦連諸鎮之兵以拒命張本崔祐甫以疾多不視事楊炎獨任大政專以復恩讐為事奏用元載遺䇿城原州任音壬載祖亥翻又音如字元載䇿見二百二十四卷代宗大厯八年又欲發兩京關内丁夫浚豐州陵陽渠以興屯田陵陽渠在州九原縣豐上遣中使詣涇原節度使叚秀實訪以利害秀實以為今邊備尚虛未宜興事以召冦炎怒以為沮己徵秀實為司農卿使疏吏翻沮在吕翻丁未邠寧節度使李懷光兼四鎮北庭行營涇原節度使使移軍原州以四鎮北庭留後劉文喜為别駕為劉文喜以涇州拒命張本京兆尹嚴郢奏按朔方五城舊屯沃饒之地自䘮亂以來郢以井翻䘮息浪翻人功不及因致荒廢十不耕一若力可墾闢不俟浚渠今發兩京闗輔人於豐州浚渠營田計所得不補所費而闗輔之人不免流散是虛畿甸而無益軍儲也疏奏不報疏所據翻既而陵陽渠竟不成弃之上用楊炎之言託以奏事不實己酉貶劉晏為忠州刺史舊志忠州京師南二千一百二十二里癸丑以澤潞留後李抱眞為節度使為李抱眞以澤潞為國藩翰張本楊炎欲城原州以復秦原秦原謂秦州原州命李懷光居前督作朱泚崔寧各將萬人翼其後泚且禮翻又音此將即亮翻又音如字詔下涇州為城具下遐嫁翻為築城之具也涇之將士怒曰吾屬為國家西門之屏十餘年矣將即亮翻屏必郢翻蔽也始居邠州甫營耕桑有地著之安徙屯涇州邠卑旻翻著直畧翻徙涇州見二百二十四卷大厯三年披荆榛立軍府坐席未暖又投之塞外先弃原州不守故云投之塞外吾屬何罪而至此乎李懷光始為邠寧帥即誅温儒雅等事見上大厯十四年帥所類翻下同軍令嚴峻及兼涇原諸將皆懼曰彼五將何罪而為戮五將即史抗温儒雅龐仙鶴張獻明李光逸將即亮翻今又來此吾屬能無憂乎劉文喜因衆心不安據涇州不受詔上疏復求叚秀實為帥不則朱泚上時掌翻疏所據翻復扶又翻或如字不讀曰否又讀如字泚且禮翻又音此癸亥以朱泚兼四鎮北庭行營涇原節度使代懷光使疎吏翻三月翰林學士左散騎常侍張渉受前湖南觀察使辛京杲金事覺上怒欲寘于法李忠臣以檢校司空同平章事奉朝請散悉亶翻騎竒寄翻校古效翻朝直遥翻言於上曰陛下貴為天子而先生以乏財犯法以臣愚觀之非先生之過也張渉先侍讀東宫故李忠臣言以為先生上意解辛未放渉歸田里辛京杲以私忿杖殺部曲有司奏京杲罪當死上將從之李忠臣曰京杲當死久矣上問其故忠臣曰京杲諸父兄弟皆戰死獨京杲至今尚存臣故以為當死久矣上憫然左遷京杲諸王傅忠臣乘機救人多此類楊炎罷度支轉運使度徒洛翻命金部倉部代之既而省職久廢謂尚書省諸司失其職已久耳目不相接莫能振舉天下錢榖無所總領癸巳復以諫議大夫韓洄為户部侍郎判度支以金部郎中萬年杜佑權江淮水陸轉運使皆如舊制復扶又翻或如字諸杜居城南時號城南韋杜去天尺五户貫則萬年劉文喜又不受詔欲自邀旌節夏四月乙未朔據涇州叛遣其子質于吐蕃以求援質音致上命朱泚李懷光討之泚且禮翻又音此又命神䇿軍使張巨濟將禁兵二千助之使疏吏翻將即亮翻又音如字吐蕃始聞韋倫歸其俘吐從暾入聲帝初即位欲以徳懷吐蕃遣倫歸代宗朝所獲之俘不之信及俘入境各還部落稱新天子出宫人放禽獸英威聖徳洽於中國吐蕃大悦除道迎倫賛普即發使隨倫入貢且致賻贈至代宗之賻贈也賻音附癸卯至京師上禮接之既而蜀將上言吐蕃豺狼所獲俘不可歸將上上即亮翻下時掌翻上曰戎狄犯塞則擊之服則歸之擊以示威歸以示信威信不立何以懷逺悉命歸之又悉歸劒南所獲之俘也陴考異曰建中實録曰及境境上守者焚樓櫓弃城壁而去初吐蕃既得河湟之地土宇日廣守兵勞弊以國家始因用胡為邊將而致禍故得河隴之士約五十萬人以為非族類也無賢愚莫敢任者悉以為奴僕故其人苦之及見倫歸國皆毛裘蓬首窺覷墻隙或搥心隕泣或東向拜舞及宻通章疏言蕃之虛實望王師之至若嵗焉君子曰惜乎人心之可乗也若逾代之後斯人既没後生安於所習難乎哉此恐沈既濟之溢美且欲附楊炎復河隴之説耳今不取代宗之世毎元日冬至端午生日州府於常賦之外競為貢獻貢獻多者則悦之武將姦吏縁此侵漁下民自代宗迄于五代正至端午降誕州府皆有貢獻謂之四節進奉將即亮翻癸丑上生日上生於天寶元年四月十九日不置節名四方貢獻皆不受李正已田悦各獻縑三萬匹縑并絲繒也上悉歸之度支以代租賦度徒洛翻五月戊辰以韋倫為太常卿乙酉復遣倫使吐蕃復扶又翻倫請上自為載書載書盟誓之書與吐蕃盟楊炎以為非敵請與郭子儀輩為載書以聞令上畫可而已從之令力丁翻朱泚等圍劉文喜於涇州泚且禮翻又音此杜其出入而閉壁不與戰久之不拔天方旱徵發餽運内外騷然朝臣上書請赦文喜以蘇疲人者不可勝紀朝直遥翻上時掌翻勝音升上皆不聼曰㣲孽不除何以令天下文喜使其將劉海賔入奏孽魚列翻將即亮翻海賔言於上曰臣乃陛下藩邸部曲帝初以雍王為天下兵馬元帥討史朝義凡在行營皆部曲也豈肯附叛臣必為陛下梟其首以獻為于偽翻梟堅堯翻但文喜今所求者節而已願陛下姑與之文喜必怠則臣計得施矣上曰名器不可假人孔子之言爾能立效固善我節不可得也使海賔歸以告文喜而攻之如初減御膳以給軍士城中將士當受春服者賜予如故予讀曰與於是衆知上意不可移時吐蕃方睦於唐不為發兵為于偽翻城中勢窮庚寅海賔與諸將共殺文喜傳首考異曰邠志曰詔李懷光朱泚并軍誅之師圍涇城數月不拔文喜使其子求救于吐蕃蕃衆將至二將議退軍以避之都遊奕使韓遊瓖争之曰西戎若來涇衆必變義不為文喜没身於戎虜秋七月西蕃遊騎登高麾涇人涇人果曰始吾為文喜求節度耳王師致討困則歸之安能赤土塗靣為異方之人乎劉海賔因之殺文喜以衆降泚泚無所戮涇人徳之萌泚之亂亦自此始按是時吐蕃通好無入援文喜事又此月涇州平而邠志云七月西蕃至皆相違今從建中實録而原州竟不果城自上即位李正已内不自安遣參佐入奏事㑹涇州㨗奏至上使觀文喜之首而歸正已益懼六月甲午朔門下侍郎同平章事崔祐甫薨薨呼肱翻術士桑道茂上言陛下不出數年暫有離宫之厄上時掌翻離力智翻臣望奉天有天子氣宜高大其城以備非常辛丑命京兆發丁夫數千雜六軍之士築奉天城神考異曰舊傳云道茂待詔翰林建中初䇿修奉天城道茂請高其垣墻大為制度徳宗不之省及朱泚之亂帝倉猝出幸至奉天方思道茂之言時道茂已卒命祭之今從實録又及袁光庭幸奉天傳初囘紇風俗樸厚君臣之等不甚異故衆志專一勁健無敵紇下没翻及有功於唐謂平安史也唐賜遺甚厚遺于季翻登里可汗始自尊大築宫殿以居婦人有粉黛文繡之飾中國為之虛耗可從刋入聲汗音寒為于偽翻而虜俗亦壞及代宗崩上遣中使梁文秀往告哀登里驕不為禮九姓胡附囘紇者説登里以中國富饒今乗䘮伐之可有大利使疏吏翻説式芮翻源考異曰既云乘䘮入冦當在去年今因休冊命追叙之耳登里從之欲舉國入冦其相頓莫賀逹千登里之從父兄也相息亮翻從才用翻諫曰唐大國也無負於我吾前年侵太原獲羊馬數萬可謂大㨗事見上卷代宗大厯十三年而道逺糧乏比歸士卒多徒行者比必利翻及也道逺糧乏士卒殺馬食之故多徒行今舉國深入萬一不㨗將安歸乎登里不聽頓莫賀乗人心之不欲南冦也舉兵擊殺之并九姓胡二千人自立為合骨咄禄毗伽可汗遣其臣聿逹千與梁文秀俱入見咄當没翻伽求迦翻可從刋入聲汗音寒見賢遍翻願為藩臣垂髪不翦以待詔命乙卯命京兆少尹臨漳源休册頓莫賀為武義成功可汗少始照翻臨漳縣屬相州本鄴縣地東魏孝静帝分鄴縣于鄴城中置臨漳縣考異曰舊傳曰休妻即吏部侍郎王翊女也因小忿而離妻族上訴下御史臺騐理休遅留不荅欵狀除名配流溱州久之移岳州建中初楊炎執政以京兆尹嚴郢威名稍著心欲傾之郢即王翊甥壻也休與王氏離絶之時炎風聞休郢有隙遂擢休自流人為京兆少尹俾令伺郢過失休既在職久與郢親善炎怒之奏令以本官兼御史中丞奉使囘紇按休奉使時囘紇方㳟順張光晟未殺董突炎安知囘紇欲殺休而遣之今不取秋七月丙寅邵州賊帥王國良降帥所類翻降户江翻國良本湖南牙將觀察使辛京杲使戍武岡將即亮翻使疎吏翻武岡縣漢零陵郡都梁縣之地晉分都梁置武岡縣今岡東五十里有漢都梁故城是也後漢武陵蠻為漢所伐來保此岡故謂之武岡郡國志云武岡接武陵因以得名隋廢武徳四年分邵陽復置武岡縣屬邵州新志曰本武攸縣武徳四年更名梁夫夷縣在今武岡界以扞西原蠻京杲貪暴國良家富京杲以死罪加之國良懼據縣叛與西原蠻合聚衆千人侵掠州縣瀕湖千里咸被其害被皮義翻詔荆黔洪桂諸道合兵討之荆南節度使治荆州黔中觀察使治黔州江南西道觀察使治洪州桂管經畧觀察使治桂州黔音禽連年不能克及曹王臯為湖南觀察使曰驅疲甿誅反仄非䇿之得者也乃遺國良書遺于季翻言將軍非敢為逆欲救死耳我與將軍俱為辛京杲所搆曹王臯事見上大厯十四年我已䝉聖朝湔洗何心復加兵刅於將軍乎朝直遥翻復扶又翻又音如字將軍遇我不速降後悔無及國良且喜且懼遣使乞降猶疑未决臯乃假為使者從一騎越五百里抵國良壁鞭其門大呼曰我曹王也使疏吏翻騎竒寄翻呼火故翻來受降舉軍大驚國良趨出迎拜請罪臯執其手約為兄弟盡焚攻守之具散其衆使還農詔赦國良罪賜名惟新按新書南蠻傳西原蠻居廣容之南邕桂之西地數千里種落甚衆乾元以來累為叛亂與夷獠梁崇牽覃問西原酋長吴功曹合兵内冦䧟道州進攻永州䧟邵州辛京杲遣王國良戍武岡國良亦叛建中初城溆州以斷西原國良乃降降户江翻辛巳遥尊上母沈氏為皇太后沈氏以開元末選入代宗宫安禄山之亂𤣥宗避賊諸王妃妾不及從者皆為賊所得拘之東都之掖庭代宗克東都入宫得沈氏留之東都宫中史思明再䧟東都遂失所在荆南節度使庾準希楊炎指奏忠州刺史劉晏與朱泚書求營救辭多怨望又奏召補州兵欲拒朝命忠州荆南廵屬也故庾凖得以誣奏劉晏使疏吏翻泚且禮翻又音此朝直遥翻炎證成之上宻遣中使就忠州縊殺之縊于賜翻又于計翻己丑乃下詔賜死天下寃之初安史之亂數年間天下户口什亡八九州縣多為藩鎮所據貢賦不入朝廷府庫耗竭中國多故戎狄每嵗犯邊所在宿重兵仰給縣官朝直遥翻仰牛向翻所費不貲皆倚辦于晏晏初為轉運使獨領陜東諸道寶應元年劉晏充度支轉運等使代宗廣徳二年始以晏為河南江淮以來轉運使乃疏浚汴水以開漕運之利陜失冉翻陜西皆度支領之末年兼領未幾而罷度徒洛翻大厯十四年晏兼判度支建中元年罷幾居豈翻晏有精力多機智變通有無曲盡其妙常以厚直募善走者置遞相望覘報四方物價覘丑亷翻雖逺方不數日皆逹使司使司謂轉運使司食貨輕重之權悉制在掌握國家獲利而天下無甚貴甚賤之憂常以為辦集衆務在於得人故必擇通敏精悍亷勤之士而用之至於句檢簿書悍侯旰翻又下罕翻句古矦翻出納錢榖必委之士類吏惟書符牒不得輕出一言常言士陷􅂍賄則淪弃於時名重於利故士多清修吏雖潔亷終無榮顯利重于名故吏多貪汚然惟晏能行之他人效者終莫能逮其屬官雖居數千里外奉教令如在目前起居語言無敢欺紿紿待亥翻當時權貴或以親故屬之者屬之欲翻晏亦應之使俸給多少遷次緩速皆如其志然無得親職事其場院要劇之官俸扶用翻少始紹翻場謂交場船場院為廵院必盡一時之選故晏没之後掌財賦有聲者多晏之故吏也晏又以為户口滋多則賦税自廣故其理財以愛民為先諸道各置知院官知院官掌諸道廵院者也毎旬月具州縣雨雪豐歉之狀白使司豐則貴糴歉則賤糶或以榖易雜貨供官用及於豐處賣之知院官始見不稔之端先申至某月須如干蠲免某月須如干救助使疏吏翻如干猶言若干也程大昌曰若干者設數之言也干猶箇也若箇猶言幾何枚也又設干者十干自甲至癸也亦以數言也及期晏不俟州縣申請即奏行之應民之急未嘗失時不待其困弊流亡餓殍然後賑之也由是民得安其居業户口蕃息殍居表翻賑津忍翻蕃音煩晏始為轉運使時天下見户不過二百萬見賢遍翻其季年乃三百餘萬在晏所綂則增非晏所綂則不增也其初財賦嵗入不過四百萬緡季年乃千餘萬緡晏專用𣙜鹽法充軍國之用時自許汝鄭鄧之西皆食河東池鹽度支主之汴滑唐蔡之東綂他綜翻俗音如字緡眉巾翻𣙜古岳翻代宗寶應元年更豫州為蔡州避上名也皆食海鹽晏主之晏以為官多則民擾故但于出鹽之鄉置鹽官收鹽户所煮之鹽轉鬻於商人任其所之自餘州縣不復置官復扶又翻下賈復同其江嶺閒去鹽鄉逺者轉官鹽於彼貯之或商絶鹽貴則減價鬻之謂之常平鹽後又𣙜茶遂置常平茶鹽官貯丁吕翻官獲其利而民不乏鹽其始江淮鹽利不過四十萬緡季年乃六百餘萬緡由是國用充足而民不困弊其河東鹽利不過八十萬緡而價復貴於海鹽先是運闗東榖入長安者先悉薦翻以河流湍悍率一斛得八斗至者則為成勞受優賞晏以為江汴河渭水力不同各隨便宜造運船教漕卒江船達揚州汴船達河隂悍下罕翻又候旴翻汴皮變翻江船達揚州入淮汴船自清口達河隂開元二十二年分汜水武渉滎澤置河隂縣屬河南府有河隂倉河船達渭口渭口達太倉渭口謂渭水入河之口其閒縁水置倉轉相受給自是每嵗運榖或至百餘萬斛無斗升沈覆者沈持林翻船十艘為一綱使軍將領之艘蘇遭翻將即亮翻十運無失授優勞官其人數運之後無不斑白者晏於楊子置十場造船毎艘給錢千緡艘蘇遭翻緡眉巾翻或言所用實不及半虛費太多晏曰不然論大計者固不可惜小費凡事必為永久之慮今始置船場執事者至多當先使之私用無窘則官物堅牢矣若遽與之屑屑校計錙銖窘巨隕翻八銖為錙十絫為銖安能久行乎異日必有患吾所給多而減之者減半以下猶可也過此則不能運矣其後五十年有司果減其半及咸通中有司計費以給之無復羨餘復扶又翻又音如字羨千線翻羡贏也船益脆薄易壞易以豉翻漕運遂廢矣宋白曰武徳永徽之後姜行本薛大鼎禇朗皆言漕運未能通濟後監察御史王師順請運晉絳之粟于河渭之間始置渭橋倉開元初李傑為水運使始大興漕事十八年裴耀卿以言漕運拜江淮轉運使以崔希逸蕭炅為副轉運鹽鐵有副使自此始肅宗初第五𤦺以錢榖見始置江淮租庸使乾元初加鹽鐵使始大鹽鐵法就山海井竈收𣙜其鹽立監院官吏至劉晏始以鹽鐵兼漕運晏為人勤力事無閑劇必于一日中决之不使留宿後來言財利者皆莫能及之八月甲午振武留後張光晟殺囘紇使者董突等九百餘人董突者武義可汗之叔父也晟成正翻紇下没翻使䟽吏翻可從刋入聲汗音寒代宗之世九姓胡常冒囘紇之名雜居京師殖貨縱暴與囘紇共為公私之患上即位命董突盡帥其徒歸國輜重甚盛帥讀曰率輜莊持翻重直用翻至振武留數月厚求資給日食肉千斤它物稱是稱尺證翻縱樵牧者暴踐禾稼振武人苦之光晟欲殺囘紇取其輜重而畏其衆彊未敢發九姓胡聞其種族為新可汗所誅多道亡踐息淺翻種章湧翻董突防之甚急九姓胡不得亡又不敢歸乃宻獻䇿於光晟請殺囘紇光晟喜其黨自離許之上以陜州之辱事見二百二十二卷寶應元年陜失冉翻心恨囘紇光晟知上㫖乃奏稱囘紇本種非多紇下没翻晟成正翻種章勇翻所輔以彊者羣胡耳今聞其自相魚肉頓莫賀新立移地健有孽子登里可汗名移地健及國相梅録各擁兵數千人相攻國相息亮翻宋白曰梅録囘鶻將軍號柳公綽帥河東時有梅録將軍李暢入貢國未定彼無財則不能使其衆陛下不乘此際除之乃歸其人與之財正所謂借冦兵齎盗糧者也引李斯諫秦王逐客之言請殺之三奏上不許光晟乃使副將過其館門故不為禮董突怒執而鞭之數十光晟勒兵掩擊并羣胡盡殺之聚為京觀獨留一胡使歸國為證曰囘紇鞭辱大將且謀襲據振武故先事誅之將即亮翻觀古玩翻先悉薦翻上徵光晟為右金吾將軍遣中使王嘉祥往致信幣囘紇請得專殺者以復讐上為之貶光晟為睦王傅以慰其意睦王述上弟也為于偽翻加盧龍隴右涇原節度使朱泚兼中書令盧龍隴右節度使如故使疏吏翻以舒王謨為四鎮北庭行軍涇原節度大使行軍當作行營以涇州牙前兵馬使河中姚令言為留後為後姚令言以涇原兵作亂張本考異曰舊傳孟皥尋歸朝遂拜令言為四鎮北庭行營涇原節度使按實録建中三年八月以涇原節度留後姚令言為節度使此年必始為留後也文按姚令言傳建中元年孟皥為涇原節度留後自以吏進身不樂軍旅頻表薦令言謹肅堪任將帥皥尋歸朝謨邈之子也邈代宗子大厯八年薨早孤上子之癸丑詔贈太后父祖兄弟官及自餘宗族男女拜官封邑者告第告身第恐當作䇿凡百二十有七通中使以馬負而賜之九月壬午將作奏宣政殿廊壞十月魁岡未可修隂陽家拘忌有天岡河魁凡魁岡之月及所繫之地忌修造史炤曰魁岡者北斗魁星之氣十月在戌為魁岡宋白曰隂陽氏書謂是嵗孟冬為魁岡不利修作上曰但不妨公害人則吉矣安問時日即命修之大厯以前賦歛出納俸給皆無法長吏得專之重以元王秉政貨賂公行歛力贍翻長知兩翻俸扶用翻元王謂元載王縉也天下不按􅂍吏者殆二十年建考異曰中實録云三十年盖字之誤也惟江西觀察使路嗣恭按䖍州刺史源敷翰流之上以宣歙觀察使薛邕文雅舊臣徵為左丞邕去宣州盗隱官物以巨萬計殿中侍御史員㝢發之時以宣歙二州依山而扼江湖之要分置觀察使使疏吏翻嗣祥吏翻歙音攝員音運姓也冬十月己亥貶連山尉連山縣屬連州晉武帝分桂陽立廣惠縣隋改為廣澤仁壽元年改為連山縣避太子廣諱也於是州縣始畏朝典不敢放縱上初即位疎斥宦官親任朝士而張渉以儒學入侍薛邕以文雅登朝朝直遥翻繼以􅂍敗宦官武將得以藉口曰南牙文臣􅂍動至巨萬而謂我曹濁亂天下豈非欺罔邪將即亮翻邪音耶於是上心始疑不知所倚仗矣中書舍人高參請分遣諸沈訪求太后庚寅以睦王述為奉迎使工部尚書喬琳副之又命諸沈四人為判官與中使分行諸道求之尚辰羊翻行下孟翻又音如字十一月初令待制官外更引朝集使二人訪以時政得失逺人疾苦令力丁翻朝直遥翻使疏吏翻先是公主下嫁者舅姑拜之婦不荅先悉薦翻上命禮官定公主拜見舅姑及壻之諸父兄姊之儀舅姑坐受於中堂兄姊立受于東序如家人禮有縣主將嫁擇用丁丑是日上之從父妺卒姊將兕翻從才用翻命罷之有司奏供張已備供居用翻張知亮翻且殤服不足廢事殤音傷説文未成人而死者為殤禮十九至十六死者為長殤十五至十二死者為中殤十一至八嵗死者為下殤上曰爾愛其費我愛其禮卒罷之卒子恤翻至徳以來國家多事公主郡縣主多不以時嫁有華髪者雖居禁中或十年不見天子上始引見諸宗女髪中白者曰華見賢遍翻尊者致敬卑者存慰悉命嫁之所齎小大之物必經心目己卯庚辰二日嫁岳陽等凡十一縣主齎則兮翻吐蕃見韋倫再至益喜是年五月韋倫再使吐蕃吐從暾入聲十二月辛卯朔倫還吐蕃遣其相論欽明思等入貢還從宣翻又音如字相息亮翻是嵗册太子母王氏為淑妃天下税户三百八萬五千七十六籍兵七十六萬八千餘人籍兵兵之著籍者也税錢一千八十九萬八千餘緡榖二百一十五萬七千餘斛緡眉巾翻二年春正月戊辰成徳節度使李寶臣薨恒冀成徳軍考異曰建中實録云二月丁已寶臣卒疑奏到之日也今從徳宗實録谷况燕南記曰忠志末年惟納妖妄之人兼隂陽術數謟媚茍且之軰爭獻圖䜟稱有尊位詐作朱草靈芝鑿石上作名字又于後堂院結壇場清齋菜食置金杯玉斚銀盤云甘靈神酒自至其内又言天符下降忠志自謂命符上天將吏罔有諫者使行文牒布告州縣云靈芝朱草王者之瑞輙生壇上香滿院中靈石呈祥天符飛應甘露如蜜神酒盈杯匪我所求不期自至各牒管内郡縣宜令知委同為喜慶也既而日為妖妄者更相矯云不日當有天神下降持金箱玉印而至然後即大位為天所授也四方皆自歸伏不待征討海内坐而定矣忠志大悦多以金銀羅錦異物賞之隂陽妖妄者自知虛偽恐事泄見誅共言相公宜服甘露靈芝草湯即天神降速忠志一任妖者遂於湯中宻著毒藥既飲畢便失音三日而卒舊傳亦以為然按方士妖妄必為一府所疾所慿恃者寶臣一人耳若酖殺寶臣身在府中逃無所之安能免死乎計方士雖愚必不為此盖時人見寶臣曾飲其湯遇疾而死以為方士所酖谷况承而書之耳寶臣欲以軍府傳其子行軍司馬惟岳以其年少闇弱少詩照翻豫誅諸將之難制者將即亮翻深州刺史張獻誠等至有十餘人同日死者寶臣召易州刺史張孝忠孝忠不往使其弟孝節召之孝忠使孝節謂寶臣曰諸將何罪連頸受戮孝忠懼死不敢往亦不敢叛正如公不入朝之意耳朝直遥翻孝節泣曰如此孝節必死孝忠曰往則併命我在此必不敢殺汝遂歸寶臣亦不之罪也兵馬使王武俊位卑而有勇故寶臣特親愛之以女妻其子士眞使䟽吏翻妻七細翻士眞復厚結其左右故孝忠武俊獨全史言人不可妄殺且為孝忠武俊歸國張本復扶又翻及薨孔目官胡震家僮王它奴勸惟岳匿䘮二十餘日詐為寶臣表求令惟岳繼襲上不許令力丁翻遣給事中汲人斑宏往問寶臣疾且諭之惟岳厚賂宏宏不受還報惟岳乃發䘮自為留後使將佐共奏求旌節上又不許汲縣屬衛州還從宣翻又音如字將即亮翻初寶臣與李正已田承嗣梁崇義相結事見上卷代宗大厯十二年嗣祥吏翻期以土地傳之子孫故承嗣之死見上卷大厯十四年寶臣力為之請于朝為于偽翻下屢為同朝直遥翻使以節授田悦代宗從之悦初襲位事朝廷禮甚恭河東節度使馬燧表其必反請先為備至是悦屢為惟岳請繼襲上欲革前弊不許或諫曰惟岳已據父業不因而命之必為亂上曰賊本無資以為亂皆藉我土地假我位號以聚其衆耳曏日因其所欲而命之多矣而亂日益滋是爵命不足以已亂而適足以長亂也徳宗鋭于削平藩鎮而發是言誠中肅代之病而終不能已亂亦以召亂所行者未能副其言也長知丈翻然則惟岳必為亂命與不命等耳竟不許悦乃與李正已各遣使詣惟岳潜謀勒兵拒命魏博節度副使田庭玠謂悦曰爾藉伯父遺業田承嗣者悦之伯父也但謹事朝廷坐享富貴不亦善乎奈何無故與恒鄆共為叛臣成徳節度使治恒州淄青節度使治鄆州故以恒鄆稱之恒户登翻鄆音運爾觀兵興以來逆亂者誰能保其家乎必欲行爾之志可先殺我無使我見田氏之族滅也因稱病卧家悦自往謝之庭玠閉門不内竟以憂卒卒子恤翻成徳判官邵眞聞李惟岳之謀泣諫曰先相公受國厚恩大夫衰絰之中相悉亮翻衰倉囘翻遽欲負國此甚不可勸惟岳執李正已使者送京師且請討之曰如此朝廷嘉大夫之忠則旄節庶幾可得使疏吏翻朝直遥翻幾居希翻惟岳然之使眞草奏長史畢華曰先公與二道結好二十餘年長知兩翻好呼到翻奈何一旦弃之且雖執其使朝廷未必見信正已忽來襲我孤軍無援何以待之惟岳又從之前定州刺史谷從政惟岳之舅也有膽略頗讀書王武俊等皆敬憚之為寶臣所忌從政乃稱病杜門惟岳亦忌之不與國事日夜獨與胡震王它奴等計議多散金帛以悦將士將即亮翻從政往見惟岳曰今海内無事自上國來者時藩鎮竊據自比古諸侯謂京師為上國皆言天子聰明英武志欲致太平深不欲諸侯子孫專地爾今首違詔命天子必遣諸道致討將士受賞皆言為大夫盡死為于偽翻下且為同茍一戰不勝各惜其生誰不離心大將有權者乗危伺便咸思取爾以自為功矣伺相吏翻且先相公所殺高斑大將殆以百數撓敗之際撓奴教翻其子弟欲復仇者庸可數乎又相公與幽州有隙謂李寶臣襲朱滔也事見上卷代宗大厯之十年朱滔兄弟常切齒于我今天子必以為將滔與吾擊柝相聞左傳曰魯擊柝聞於邾謂接境也計其聞命疾驅若虎狼之得獸也何以當之是後李惟岳禍敗皆如谷從政所言昔田承嗣從安史父子同反身經百戰凶悍聞于天下嗣祥吏翻悍下罕翻又戸旰翻違詔舉兵自謂無敵及盧子期就擒吴希光歸國承嗣指天垂泣身無所措賴先相公按兵不進且為之祈請先帝寛仁赦而不誅事亦見上卷大厯十年相息亮翻為于偽翻不然田氏豈有種乎况爾生長富貴齒髪尚少不更艱危種章勇翻長知丈翻少詩照翻更工衡翻乃信左右之言欲效承嗣所為乎為爾之計不若辭謝將佐使惟誠攝領軍府身自入朝乞留宿衛因言惟誠且留攝事恩命决於聖志上必悦爾忠義縱無大位不失榮禄永無憂矣不然大禍將及吾亦知爾素疎忌我顧以舅甥之情事急不得不言耳惟岳見其言切益惡之從政乃復歸杜門稱病將即亮翻朝直遥翻惡烏路翻復扶又翻又音如字惟誠者惟岳之庶兄也謙厚好書得衆心好呼到翻其母妹為李正巳子婦母妹者惟誠同母之妹也是日惟岳送惟誠於正已正已使復姓張遂仕淄青惟岳遣王它奴詣從政家察其起居將殺之示之以意使自引分從政飲藥而卒卒子恤翻且死曰吾不憚死哀張氏今族滅矣李寶臣本張忠志故云然劉文喜之死也李正已田悦等皆不自安劉晏死正已等益懼劉文喜劉晏死皆見上年相謂曰我軰罪惡豈得與劉晏比乎李正巳田悦非面相告語也使人傳言有此語㑹汴州城隘廣之東方人訛言上欲東封汴皮變翻隘烏介翻東封非東封泰山之謂盖用左傳燭之武説秦伯既東封鄭又欲肆其西封之語故城汴州正已懼𤼵兵萬人屯曹州曹州李正已廵屬與汴州接壤田悦亦完聚為備杜預曰完聚者完城郭聚人民與梁崇義李惟岳遥相應助河南士民騷然驚駭永平舊領汴宋滑亳陳潁泗七州此平李靈曜後永平軍所領廵屬也按代宗大厯七年賜滑亳軍號永平十一年平李靈曜増領宋泗二州十四年增領汴潁二州滑亳未賜軍號之前已領陳州共七州丙子分宋亳潁别為節度使以宋州刺史劉洽為之以泗州𨽻淮南又以東都留守路嗣恭為懷鄭汝陜四州河陽三城節度使使疏吏翻守式又翻嗣祥吏翻陜失冉翻旬日又以永平節度使李勉都統洽嗣恭二道仍割鄭州𨽻之選嘗為將者為諸州刺史以備正已等統它綜翻俗又讀如字將即亮翻初高力士有養女嫠居東京嫠里之翻無夫為嫠頗能言宫中事女官李眞一意其為沈太后詣使者具言其狀去年遣使訪求太后上聞之驚喜時沈氏故老已盡無識太后者上遣宦官宫人往驗視之年狀頗同宦官宫人不審識太后皆言是高氏辭稱實非太后驗視者益疑之強迎入上陽宫強其兩翻下所強同上𤼵宫女百餘人齎乗輿服御物就上陽宫供奉乘繩證翻輿音于左右誘諭百方誘音酉高氏心動乃自言是驗視者走馬入奏上大喜二月辛卯上以偶日御殿羣臣皆入賀唐制天子以隻日受朝賀今喜於得太后故以耦日御殿而受賀詔有司草儀奉迎高氏弟承悦在長安恐不言久獲罪遽自言本末上命力士養孫樊景超往覆視景超見高氏居内殿以太后自處處昌吕翻左右侍衛甚嚴景超謂高氏曰姑何自置身於爼上謂將以詐偽伏罪如置身爼上以俟刀也左右叱景超使下景超抗聲曰有詔太后詐偽左右可下左右皆下殿高氏乃曰吾為人所強非己出也強其兩翻以牛車載還其家還從宣翻又音如字上恐後人不復敢言太后皆不之罪曰吾寧受百欺庶幾得之復扶又翻幾居依翻自是四方稱得太后者數四皆非是而眞太后竟不知所之之往也御史中丞盧把奕之子也天寶十四載安禄山䧟洛陽李憕盧奕死之貌醜色如藍有口辯上悦之丁未擢為大夫擢為御史大夫領京畿觀察使句郭子儀毎見賔客姬妾不離側把嘗往問疾子儀悉屏侍妾獨隱几待之離力智翻屏必郢翻隱於靳翻或問其故子儀曰把貌陋而心險婦人輩見之必笑它日把得志吾族無類矣楊炎既殺劉晏朝野側目李正已累表請晏罪譏斥朝廷炎懼遣腹心分詣諸道以宣慰為名實使之宻諭節度使云晏昔朋附姦邪請立獨孤后上自惡而殺之上聞而惡之朝直遥翻度使疎吏翻惡烏路翻由是有誅炎之志隱而未𤼵乙巳遷炎為中書侍郎擢盧把為門下侍郎並同平章事不專任炎矣把蕞陋無文學蕞徂外翻炎輕之多託疾不與㑹食唐制諸宰相日㑹食于政事堂把亦恨之杞隂狡欲起勢立威小不附者必欲寘之死地引太常博士裴延齡為集賢殿直學士親任之為盧把以姦邪致亂張本然把為建中厲階人皆知之其引裴延齡以樹黨其禍蔓延迄于貞元之末年人未知其罪也故通鑑著言之丙午更汴宋軍曰宣武按是時李勉以永平軍節度使鎮汴州盖以宋亳潁為宣武軍當從新書方鎮表更工衡翻振武節度使彭令芳苛虐監軍劉惠光貪婪婪盧含翻乙卯軍士共殺之𤼵京西防秋兵萬二千人戍闗東時吐蕃通和西邊無警而河南北諸鎮連兵拒命闗東騷然故抽京西防秋之兵以戍闗東上御望春樓望春樓在㶚水之西臨廣運潭宴勞將士勞力到翻將即亮翻神䇿軍士獨不飲上使詰之其將楊惠元對曰臣等𤼵奉天軍帥張巨濟戒之曰此行大建功名凱還之日相與為歡故不敢奉詔按建中元年遣神䇿軍使張巨濟將禁兵助朱泚等討劉文喜盖涇州既平巨濟還屯奉天也詰去吉翻帥所類翻還音旋又如字及行有司縁道設酒食獨惠元所部缾罌不𤼵罌烏莖翻上深歎美賜書勞之勞力到翻惠元平州人也平州北平郡三月置溵州於郾城魏收地形志潁川郡曲陽縣有郾城後齊置臨潁郡隋廢郡為郾城縣唐屬蔡州時分郾城臨潁陳州之溵水置溵州溵于巾翻郾于建翻辛巳以汾州刺史王翃為振武軍使鎮北綏銀等州留後翃户萌翻遣殿中少監崔漢衡使于吐蕃少始照翻使疏吏翻吐從暾入聲梁崇義雖與李正已等連結兵勢寡弱禮數最恭或勸其入朝朝直遥翻崇義曰來公有大功於國上元中為閹宦所䜛遷延稽命稽緩也及代宗嗣位不俟駕入朝猶不免族誅來公謂來瑱死于廣徳元年事見二百二十四卷吾嵗久舋積何可往也淮寧節度使李希烈屢請討之方鎮表大厯十四年淮西節度使復治蔡州賜號淮寧軍事見上崇義懼益修武備流人郭昔告崇義為變郭昔以告崇義得流罪史因稱流人以叙其事崇義聞之請罪上為之杖昔逺流之為于偽翻下為陳同使金部員外郎李舟詣襄州諭㫖以安之舟嘗奉使詣劉文喜為陳禍福文喜囚之㑹帳下殺文喜以降諸道跋扈者聞之謂舟能覆城殺將將即亮翻至襄州崇義惡之舟又勸崇義入朝言頗切直崇義益不悦及遣使宣慰諸道舟復詣襄州崇義拒境不内惡烏路翻復扶又翻拒境者拒之于境上上言軍中疑懼請易以它使上時掌翻時兩河諸鎮方猜阻上欲示恩信以安之夏四月庚寅加崇義同平章事妻子悉加封賞賜以鐵劵遣御史張著齎手詔徵之仍以其禆將藺杲為鄧州刺史禆賔彌翻鄧州治穰縣五月丙寅以軍興增商税為什一楊炎定税法商賈三十税一今增之田悦卒與李正已李惟岳定計卒子恤翻終也竟也連兵拒命遣兵馬使孟祐將歩騎五千北助惟岳將即亮翻又音如字騎竒寄翻薛嵩之死也田承嗣盗據洺相二州事見上卷大厯十年洺音名相息亮翻朝廷獨得邢磁二州及臨洺縣臨洺漢之易陽縣地屬趙國晉屬廣平郡後魏屬魏郡後齊廢入㐮國縣置襄國郡後周改置易陽縣别置襄國縣隋開皇之六年改易陽為邯鄲十年改邯鄲為臨洺屬武安郡唐屬洺州范大成北使録臨洺縣東至洺州三十五里朝直遥翻磁牆之翻悦欲阻山為境曰邢磁如兩眼在吾腹中不可不取乃遣兵馬使康愔將八千人圍邢州使疏吏翻愔挹滛翻將即亮翻又音如字别將楊朝光將五千人柵於邯鄲西北以斷昭義救兵邯鄲縣漢屬趙國晉屬廣平郡東魏廢隋復置屬武安郡唐屬磁州余按隋開皇十年既改邯鄲為臨洺隋志不復言别置邯鄲至唐志則臨洺縣屬洺州邯鄲縣屬磁州盖邯鄲縣必復置於唐世與臨洺各為一縣史逸其置縣之嵗月也宋白曰臨洺縣漢易陽縣地屬趙國魏屬魏郡晉屬廣平郡後魏省入邯鄲孝文于北中府城復置易陽縣屬廣平郡今理是也隋開皇六年改易陽為邯鄲縣十年移邯鄲理涉鄉在今邯鄲縣界仍於北中府城置臨洺縣北濵洺水為名九域志邯鄲縣在磁州東北七十里柵測革翻邯音寒鄲音單斷音短悦自將兵數萬圍臨洺邢考異曰馬燧傳悦自將兵三萬圍州次臨洺燕南記悦自統馬歩五千人應接今從舊傳邢州刺史李共臨洺將張伾堅壁拒守伾音丕貝州刺史邢曹俊田承嗣舊將也老而有謀悦寵信牙官扈㟧而疎之嗣徐史翻將即亮翻㟧五各翻及攻臨洺召曹俊問計曹俊曰兵法十圍五攻此孫子兵法之言尚書以逆犯順勢更不侔尚辰羊翻言以寡敵衆勢已不侔而以逆犯順更不侔也今頓兵堅城之下糧竭卒盡自亡之道也不若置萬兵於崞口以遏西師西師謂澤潞河東之師自西山而下崞音郭崞口當西山之下直相州之西則河北二十四州皆為尚書有矣河北二十四州即𤣥宗所謂河朔二十四郡也自至徳改郡為州安史既平之後河北又有分置之州若以開元天寶河北道采訪使所統大畧言之此時河北不止二十四州邢曹俊之説盖因時俗為傳習古語耳諸將惡其異已共毁之悦不用其䇿為悦摧敗張本惡烏路翻資治通鑑卷二百二十六
