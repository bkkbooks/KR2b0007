  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷七十七宋司馬光撰胡三省音註魏紀九起柔兆困敦盡重光大荒落凡六年高貴鄉公下甘露元年是年六月改元春正月漢姜維進位大将軍二月丙辰帝宴羣臣於太極東堂與諸儒論夏少康漢高祖優劣以少康為優帝謂少康生於滅亡之後降為諸侯之𨽻能布其徳而兆其謀卒滅過戈克復禹績祀夏配天不失舊物非至徳𢎞仁豈濟斯勛漢祖因土崩之埶杖一時之權專任智力以成功業行事動靜多違聖檢為人子則數危其親為人君則囚繫賢相為人父則不能衛子身没之後社稷幾傾若與少康易時而處未必能復大禹之績嗚呼帝固有志於少康矣然而不能殱澆豷而身死人手者不能布其德而兆其謀也予觀帝之所以論二君優劣書生之譚耳未能如石勒辭氣之雄爽也夏戶雅翻少詩沼翻夏四月賜大将軍昭衮冕之服赤舄副焉九錫之漸也丙辰帝幸太學與諸儒論書易及禮諸儒莫能及時帝與博士淳于俊論易庾峻論書馬照論禮記考其難疑答問不過擿抉經義及王鄭之異同耳非人君之學也帝嘗與中䕶軍司馬望侍中王沈散騎常侍裴秀黄門侍郎鍾會等講宴於東堂并屬文論沈持林翻散悉亶翻騎竒寄翻屬之欲翻特加禮異謂秀為儒林丈人沈為文籍先生帝性急請召欲速以望職在外特給追鋒車虎賁五人望為中䕶軍其職在外傅子曰追鋒車施通幰遽則乗之令虎賁五人舁之也晉志曰追鋒車去小平葢加通幰如軺車駕二馬追鋒之名取其迅速也施於戎陳之間是為傳乘賁音奔每有集會輙犇馳而至秀濳之子也裴潜事武帝守代郡著名六月丙午改元盖以甘露䧏而改元也姜維在鍾提議者多以為維力已竭未能更出安西将軍鄧艾曰洮西之敗見上卷上年非小失也士卒彫殘倉廪空虛百姓流離今以策言之彼有乘勝之埶我有虚弱之實一也彼上下相習五兵犀利管子曰蚩尤受盧山之金而作五兵孔頴逹曰歩卒之五兵謂弓矢一殳二矛三戈四㦸五也鄭司農所謂戈矛㦸酋矛夷矛車之五兵也犀堅也古以犀兕為甲故謂堅為犀我将易兵新器仗未復二也将易艾自謂初代王經也兵新謂遣還洮西敗卒更差軍守也将即亮翻彼以船行吾以陸軍勞逸不同三也言蜀船自涪戍白水可以上沮水由沮水入武都下辨自此而西北水路漸峻陿小舟猶可入也魏軍度隴而西皆陸行狄道隴西南安祁山各當有守彼専為一我分為四四也從南安隴西因食羌榖若趣祁山趣七喻翻下同熟麥千頃為之外倉賊有黠計其來必矣黠下八翻桀黠也秋七月姜維復率衆出祁山復扶又翻聞鄧艾已有備乃回從董亭趣南安水經注董亭在南安郡西南谷水歴其下東北注于渭艾據武城山以拒之水經注渭水過獂道南獂道南安郡治也又東逕武城縣西武城川水入焉盖以山名縣也酈道元後魏人武城縣必後魏所立而魏収地形志無之葢廢省也維與艾爭險不克其夜渡渭東行緣山趣上邽艾與戰於叚谷水經注上邽之南有叚溪水水出西南馬門溪東北流合籍水杜佑曰秦州上邽縣有叚谷水趣七喻翻大破之以艾為鎭西将軍都督隴右諸軍事維與其鎭西大将軍胡濟期會上邽濟失期不至故敗士卒星散死者甚衆言士卒迸散如星不能收拾成隊伍蜀人由是怨維維上書謝求自貶黜乃以衛将軍行大将軍事八月庚午詔司馬昭加號大都督奏事不名假黄鉞癸酉以太尉司馬孚為太傅九月以司徒高柔為太尉文欽說吳人以伐魏之利説輸芮翻孫峻使欽與驃騎将軍吕據驃匹妙翻及車騎将軍劉纂鎮南将軍朱異前将軍唐咨自江都入淮泗江都縣屬廣陵郡此自邗溝入淮自淮入泗也以圖青徐魏青州統齊濟南樂安城陽東萊徐州統下邳彭城東海琅邪東莞東安廣陵臨淮晉志曰周禮曰正東曰青州葢取土居少陽其色為青徐州取舒緩之義或云因徐丘以立名峻餞之於石頭遇暴疾以後事付從父弟偏将軍綝從才用翻綝丑林翻丁亥峻卒呉人以綝為侍中武衛将軍都督中外諸軍事召吕據等還還從宣翻又如字己丑吳大司馬吕岱卒年九十六始岱親近吳郡徐原慷慨有才志岱知其可成賜巾褠釋名巾謹也二十成人士冠庶人巾言當自謹修於四教褠單衣漢魏以來士庶以為禮服褠古侯翻與共言論後遂薦㧞官至侍御史原性忠壮好直言好呼到翻岱時有得失原輙諫爭爭讀曰諍又公論之公然於衆中論其得失人或以告岱岱歎曰是我所以貴德淵者也徐原字德淵及原死岱哭之甚哀曰徐德淵吕岱之益友論語孔子曰益者三友友直友諒友多聞今不幸論語曰不幸短命死矣岱復於何聞過復扶又翻談者美之吕據聞孫綝代孫峻輔政大怒與諸督将連名共表薦滕𦙍為丞相将即亮翻綝更以𦙍為大司馬代吕岱駐武昌據引兵還使人報𦙍欲共廢綝冬十月綝遣從兄憲将兵逆據於江都使中使敕文欽劉纂唐咨等共擊取據又遣侍中左将軍華融中書丞丁晏魏晉之制中書無丞此吳所置華戶化翻告喻𦙍宜速去意言宜速徃武昌否則且有誅罰𦙍自以禍及因留融晏勒兵自衛召典軍楊崇将軍孫咨楊崇葢𦙍帳下典軍告以綝為亂迫融等使有書難綝有者對無之稱於此則文義不為通通鑑既因三國志舊文今亦不欲輕改難乃旦翻綝不聼表言𦙍反許将軍劉丞以封爵使率兵騎攻圍𦙍𦙍又刼融等使詐為詔發兵融等不從皆殺之或勸𦙍引兵至蒼龍門蒼龍門吳建業宫之東門也将士見公出必委綝就公委弃也時夜已半𦙍恃與據期又難舉兵向宫乃約令部曲約勒而號令之説吕侯兵已在近道故皆為𦙍盡死無離㪚者為于偽翻𦙍顔色不變談笑如常時大風比曉據不至比必寐翻綝兵大會遂殺𦙍及将士數十人夷𦙍三族己酉大赦改元太平或勸吕據犇魏者據曰吾耻為叛臣遂自殺據父範佐孫策以造吳故耻為叛臣自殺以明節以司空鄭冲為司徒左僕射盧毓為司空晉志曰尚書僕射漢本置一人至漢獻帝建安四年以執金吾榮郃為尚書左僕射僕射分置左右葢自此始經魏至晉迄于江左省置無常置二則為左右僕射或不兩置但曰尚書僕射今闕則左為省主若左右並闕則置尚書僕射以主省事毓余六翻毓固讓驃騎将軍王昶光禄大夫王觀司𨽻校尉琅邪王祥詔不許祥性至孝繼母朱氏遇之無道祥愈恭謹朱氏子覽年數嵗每見祥被楚撻楚荆也撻擊也被皮義翻輙涕泣抱持母母以非理使祥覽輒與祥俱往及長娶妻長知兩翻母虐使祥妻覽妻亦趨而共之母患之為之少止為于偽翻祥漸有時譽母深疾之密使酖祥覽知之逕起取酒祥爭而不與母遽奪反之漢書齊悼惠王𫝊奪反孝惠巵師古曰反音幡自後母賜祥饌饌雛戀翻又雛睆翻覽輒先甞母懼覽致斃遂止漢末遭亂祥隱居三十餘年不應州郡之命母終毁瘁瘁秦醉翻病勞也杖而後起徐州刺史吕䖍檄為别駕委以州事州界清靜政化大行時人歌之曰海沂之康實賴王祥徐州之地東際海西北距泗沂故曰海沂邦國不空别駕之功十一月吳孫綝遷大将軍綝負貴倨傲多行無禮峻從弟憲嘗與誅諸葛恪與讀曰預峻厚遇之官至右将軍無難督平九官事九官即九卿也魏明帝太和二年呉主還建業留尚書九官于武昌綝遇憲薄於峻時憲怒與将軍王惇謀殺綝事泄綝殺惇憲服藥死二年春三月大梁成侯盧毓卒夏四月吳主臨正殿大赦始親政事孫綝表奏多見難問難乃旦翻又科兵子弟十八已下十五以上三千餘人科程也程其長短小大也或曰科當作料音聊量度也選大将子弟年少有勇力者使将之少詩照翻将即亮翻日於苑中教習曰吾立此軍欲與之俱長長丁丈翻今知兩翻又數出中書視大帝時舊事問左右侍臣曰先帝數有特制特制謂特出上意以手詔宣行也數所角翻今大将軍問事問事猶言奏事不言奏者自卑挹之意但令我書可邪書可畫可也嘗食生梅使黄門至中藏取蜜中藏中藏府也掌幣帛金銀諸貨物蜜蜂糖也藏徂浪翻下同蜜中有䑕矢召問藏吏藏吏叩頭吳主曰黄門從爾求蜜邪吏曰向求謂向者嘗求蜜也實不敢與黄門不服吳主令破䑕矢矢中燥因大笑謂左右曰若矢先在蜜中中外當俱濕今外濕裏燥此必黄門所為也詰之果服詰去吉翻左右莫不驚悚征東大将軍諸葛誕素與夏侯𤣥鄧颺等友善𤣥等死𤣥死見上卷正元元年颺死見七十五卷邵陵厲公嘉平元年颺余章翻又余亮翻王凌毋丘儉相繼誅滅王凌死見七十五卷嘉平三年毋丘儉死見上卷正元二年誕内不自安乃傾帑藏振施帑它郎翻施式智翻曲赦有罪以收衆心畜養揚州輕俠數千人以為死士畜許六翻因吳人欲向徐堨徐堨即徐塘在東關之東堨烏葛翻請十萬衆以守壽春又求臨淮築城以備吳寇司馬昭初秉政長史賈充請遣叅佐慰勞四征魏置征東将軍屯淮南征南将軍屯襄沔以備吳征西将軍屯關隴以備蜀征北将軍屯幽并以備鮮卑皆授以重兵司馬昭初當國故充請慰勞以觀其志趣勞力到翻且觀其志昭遣充至淮南充見誕論説時事因曰洛中諸賢皆願禪代君以為如何誕厲聲曰卿非賈豫州子乎充父逵先為豫州而卒故稱之世受魏恩豈可欲以社稷輸人乎若洛中有難難乃旦翻吾當死之充黙然還言於昭曰諸葛誕再在揚州誕先督揚州東關之敗改督豫州毋丘儉既死復督揚州得士衆心今召之必不來然反疾而禍小不召則反遲而禍大不如召之昭從之甲子詔以誕為司空召赴京師誕得詔書愈恐疑揚州刺史樂綝間已遂殺綝征東将軍與揚州刺史同治壽春魏四征之任率以其州刺史為儲帥故誕疑綝間已間古莧翻斂淮南及淮北郡縣屯田口十餘萬官兵魏郡縣皆置屯田凡屯田口悉官兵也揚州新附勝兵者四五萬人勝音升聚榖足一年食為閉門自守之計遣長史吳綱将少子靚至吳将如字少詩沼翻靚疾郢翻又疾正翻稱臣請救并請以牙門子弟為質牙門諸将之子弟也質音致吳滕𦙍吕據之妻皆夏口督孫壹之妹也壹孫奐庶子也夏戶雅翻六月孫綝使鎭南将軍朱異自虎林将兵襲壹異至武昌壹将部曲來犇乙已詔拜壹車騎将軍交州牧封吳侯開府辟召儀同三司衮冕赤舄事從豐厚崇異孫壹者以招攜貳也司馬昭奉帝及太后討諸葛誕昭若自行恐後有挾兩宫為變者故奉之以討誕吳綱至吳吳人大喜使将軍全懌全端唐咨王祚将三萬衆與文欽同救誕以誕為左都䕶假節大司徒驃騎将軍青州牧封壽春侯懌琮之子端其從子也六月甲子車駕次項司馬昭督諸軍二十六萬進屯丘頭是役也司馬昭改丘頭曰武丘以旌武功武丘唐為沈丘縣以鎭南将軍王基行鎭東将軍都督揚豫諸軍事與安東将軍陳騫等圍壽春基始至圍城未合文欽全懌等從城東北因山乘險得将其衆突入城壽春城外他無山唯城北有八公山耳昭敕基歛軍堅壁基累求進討㑹吳朱異率三萬人進屯安豐為文欽外埶安豐縣漢屬廬江郡魏分屬安豐郡今安豐縣在壽春南八十里詔基引諸軍轉據北山基謂諸将曰今圍壘轉固兵馬向集但當精修守備以待越逸而更移兵守險使得放縱雖有智者不能善其後矣遂守便宜上疏曰今與賊家對敵當不動如山若遷移依險人心揺蕩於埶大損諸軍並據深溝高壘衆心皆定不可傾動此御兵之要也書奏報聼報基聼行其策時帝在軍故諸軍節度皆禀詔指而裁其可否者實司馬昭也於是基等四靣合圍表裏再重重直龍翻塹壘甚峻文欽等數出犯圍數所角翻逆擊走之司馬昭又使奮武将軍監青州諸軍事石苞監古銜翻督兖州刺史州泰徐州刺史胡質簡鋭卒為游軍以備外宼泰擊破朱異於陽淵水經注決水出廬江雩婁縣北過安豐縣東又北右㑹陽泉水水西有陽泉縣故城故陽泉鄉也漢靈帝封黄琬為侯國决水又北入于淮異走泰追之殺傷二千人秋七月吳大将軍綝大發兵出屯鑊里後吳主責孫綝以留湖中不上岸一歩則鑊里當在巢縣界復遣朱異帥将軍丁奉黎斐等五人前解壽春之圍復扶又翻帥讀曰率異留輜重於都陸水經注博鄉縣王莽改曰楊陸泄水出焉北過芍陂又西北入于淮意者都陸即楊陸歟又據晉紀都陸在黎漿南重直用翻進屯黎漿水經注芍陂瀆水東注黎漿水水東逕黎漿亭南又東注肥水謂之黎漿水口石苞州泰又擊破之太山太守胡烈以竒兵五千襲都陸盡焚異資粮異将餘兵食葛葉走歸孫綝綝使異更死戰異以士卒乏食不從綝命綝怒九月己巳綝斬異於鑊里辛未引兵還建業壽春之圍已固雖使周瑜吕䝉陸遜復生不能解也若綝能舉荆揚之衆出襄陽以向宛洛壽春城下之兵必分歸以自救諸葛誕文欽等於此時决圍力戰猶庶幾焉綝既不能㧞出諸葛誕而䘮敗士衆䘮息浪翻敗補邁翻自戮名将由是吳人莫不怨之為後吳誅孫綝張本司馬昭曰異不得至壽春而吳人殺之非其罪也欲以謝壽春而堅誕意使其猶望救耳今當堅圍備其越逸而多方以誤之乃縱反閒閒古莧翻揚言吳救方至大軍乏食分遣羸􅍚就榖淮北埶不能乆誕等益寛恣食俄而城中乏糧外救不至将軍蒋班焦彞皆誕腹心謀主也言於誕曰朱異等以大衆來而不能進孫綝殺異而歸江東外以發兵為名内實坐須成敗須待也今宜及衆心尚固士卒思用并力决死攻其一靣雖不能盡克猶有可全者空坐守死無為也言不若决死而求生無為坐守而待斃文欽曰公今舉十餘萬之衆歸命於吳而欽與全端等皆同居死地父兄子弟盡在江表就孫綝不欲來主上及其親戚豈肻聼乎且中國無嵗無事軍民並疲今守我一年内變将起奈何舍此舍讀曰捨欲乘危徼倖乎徼堅堯翻班􅂜固勸之欽怒誕欲殺班彞二人懼十一月弃誕踰城來降全懌兄子輝儀在建業輝儀懌兄全緒之二子輝一作禕與其家内爭訟攜其母将部曲數十家來奔于是懌與兄子靖及全端弟翩緝皆将兵在壽春城中司馬昭用黄門侍郎鍾㑹䇿密為輝儀作書為于偽翻使輝儀所親信齎入城告懌等説吳中怒懌等不能㧞壽春言不能㧞壽春之衆於重圍也欲盡誅諸将家故逃來歸命十二月懌等帥其衆數千人開門出降帥讀曰率降戶江翻城中震懼不知所為詔拜懌平東将軍封臨湘侯端等封拜各有差漢姜維聞魏分關中兵以赴淮南欲乘虚向秦川秦地四塞以為固渭水貫其中渭川左右沃壤千里世謂之秦川率數萬人出駱谷至沈嶺時長城積榖甚多而守兵少征西将軍都督雍凉諸軍事司馬望雍於用翻及安西将軍鄧艾進兵據之以拒維維壁於芒水水經注駱谷水出郿塢東南山駱谷北流逕長城西又北流注于渭渭水又東芒水從南來注之水出南山芒谷北逕􅉦厔縣竹圃中又北流注于渭予按駱谷在今洋州眞符縣屈回八十里凡八十四盤數挑戰數所角翻挑徒了翻望艾不應是時維數出兵蜀人愁苦中散大夫譙周作仇國論以諷之續漢志曰中散大夫秩六百石漢官曰秩比二千石胡廣曰光禄大夫本為中大夫武帝元狩五年置諫大夫為光禄大夫世祖中興以為諫議大夫又有太中中散大夫此四等於古者為天子之下大夫視列國之上卿曰或問徃古能以弱勝彊者其術如何曰吾聞之處大無患者常多慢處小有憂者常思善處昌吕翻多慢則生亂思善則生治理之常也故周文養民以少取多句踐䘏衆以弱斃彊此其術也文王治岐由方百里起三分天下冇其二所謂以少取多也句踐歸越弔死問􅍚十年生聚十年教訓以弱越斃强吳或曰曩者項彊漢弱相與戰爭項羽與漢約分鴻溝各歸息民張良以為民志已定則難動也率兵追羽終斃項氏事見十卷漢高帝四年豈必由文王之事乎曰當商周之際王侯世尊言世世居尊位君臣乆固民習所専民習見君臣之分明故専于戴上深根者難㧞據固者難遷當此之時雖漢祖安能杖劔鞭馬而取天下乎及秦罷侯置守之後謂罷列國諸侯分置三十六郡郡置守也民疲秦役天下土崩或嵗易主或月易公鳥驚獸駭莫知所從於是豪彊並爭虎裂狼分疾摶者獲多遲後者見吞今我與彼皆傳國易世矣既非秦末鼎沸之時實有六國並據之埶故可為文王難為漢祖夫民之疲勞則騷擾之兆生上慢下暴則瓦解之形起諺曰射幸數跌不如審發跌差也射數差而不中不如審而後發也書曰若虞機張徃省括于度則釋是故智者不為小利移目不為意似改歩孔頴逹曰舉足謂之歩為于偽翻時可而後動數合而後舉故湯武之師不再戰而克湯伐桀鳴條一戰而革夏命武王伐紂一戎衣而天下大定誠重民勞而度時審也度徒洛翻如遂極武黷征征伐不欲數數則黷土崩埶生不幸遇難難乃旦翻雖有智者将不能謀之矣姜維以數戰亡蜀卒如譙周之言三年春正月文欽謂諸葛誕曰蒋班焦彛謂我不能出而走全端全懌又率衆逆降逆迎也降戶江翻此敵無備之時也可以戰矣誕及唐咨等皆以為然遂大為攻具晝夜五六日攻南圍欲决圍而出圍上諸軍臨高發石車火箭石車即砲車也車昌􅃒翻逆燒破其攻具矢石雨下死傷蔽地血流盈壍壍七豔翻復還城城内食轉竭出降者數萬口欽欲盡出北方人省食與吳人堅守誕不聼由是爭恨欽素與誕有隙徒以計合事急愈相疑言誕欽初以詭計茍合事急愈相猜疑欽見誕計事誕遂殺欽欽子鴦虎将兵在小城中鴦虎欽二子也時壽春葢别有小城聞欽死勒兵赴之衆不為用遂單走踰城出自歸於司馬昭軍吏請誅之昭曰欽之罪不容誅其子固應就戮然鴦虎以窮歸命且城未㧞殺之是堅其心也乃赦鴦虎使将數百騎廵城呼曰呼火故翻文欽之子猶不見殺其餘何懼又表鴦虎皆為将軍賜爵闗内侯城内皆喜且日益饑困司馬昭身自臨圍見城上持弓者不發曰可攻矣知其衆無拒守之心也乃四面進軍同時鼓譟登城二月乙酉克之誕窘急單馬将其麾下突小城欲出司馬胡奮部兵擊斬之夷其三族誕麾下數百人皆拱手為列不降每斬一人輙降之降戶江翻下同卒不變以至於盡史言諸葛誕得人心人䝉其恩而為之死卒子恤翻吳将于詮曰詮且緣翻大丈夫受命其主以兵救人既不能克又束手於敵吾弗取也乃免胄冒陳而死陳讀曰陣唐咨王祚等皆降唐咨本魏人降吳見七十卷文帝黄初六年吳兵萬衆器仗山積司馬昭初圍壽春王基石苞等皆欲急攻之昭以為壽春城固而衆多攻之必力屈若有外㓂表裏受敵此危道也今三叛相聚於孤城之中三叛謂諸葛誕文欽唐咨也天其或者使同就戮吾當以全䇿縻之但堅守三靣若吳賊陸道而來軍糧必少吾以游兵輕騎絕其轉輸可不戰而破也吳賊破欽等必成禽矣乃命諸軍案甲而守之卒不煩攻而破卒子恤翻議者又以為淮南仍為叛逆仍相因也吳兵室家在江南不可縱宜悉坑之昭曰古之用兵全國為上戮其元惡而已言全其國之人民止戮其君所謂誅其君而弔其民也吳兵就得亡還適可以示中國之大度耳一無所殺分布三河近郡以安處之河南都也河東河内皆近京師處昌吕翻拜唐咨安遠将軍其餘禆将咸假位號衆皆悦服其淮南将士吏民為誕所脅略者皆赦之聼文鴦兄弟收歛父䘮給其車牛致葬舊墓文欽譙人也舊墓在焉歛力贍翻昭遺王基書曰遺于季翻初議者云云求移者甚衆謂前詔諸軍轉據北山時未臨履亦謂宜然臨履謂親臨其地而履行營壘處所也将軍深筭利害獨秉固志上違詔命下拒衆議終至制敵禽賊雖古人所述不是過也昭欲遣諸軍輕兵深入招迎唐咨等子弟因釁有滅吳之埶王基諫曰昔諸葛恪乘東關之勝竭江表之兵以圍新城城既不㧞而衆死者大半事見上卷邵陵厲公嘉平五年姜維因洮西之利輕兵深入糧餉不繼軍復上邽謂叚谷之敗也夫大㨗之後上下輕敵輕敵則慮難不深難乃旦翻今賊新敗於外又内患未弭謂孫綝君臣相猜是其修備設慮之時也且兵出踰年人有歸志今俘馘十萬罪人斯得謂禽諸葛誕也書曰周公居東二年則罪人斯得自歴代征伐未有全兵獨克如今之盛者也武皇帝克袁紹於官渡自以所獲已多不復追犇復扶又翻懼挫威也事見六十三卷漢獻帝建安五年昭乃止以基為征東将軍都督揚州諸軍事進封東武侯習鑿齒曰君子謂司馬大将軍於是役也可謂能以德攻矣左傳晉文公城濮之勝君子謂晉於是役也能以德攻夫建業者異道各有所尚而不能兼并也故窮武之雄斃于不仁如夫差智伯也存義之國䘮於懦退如宋襄公是也䘮息浪翻今一征而禽三叛大虜吳衆席卷淮浦俘馘十萬生虜為俘截耳為馘古者戰勝馘所格之左耳而獻之可謂壮矣而未及安坐賞王基之功種惠吳人結異類之情書曰臯陶邁種德孔安國注曰種布也夫種則有穫種惠於呉人使歸心中國以成他日混一之功如種藝之有秋也寵鴦葬欽忘疇㫺之隙不咎誕衆使揚土懐愧功高而人樂其成業廣而敵懐其德樂音洛武昭既敷文算又洽推是道也天下其孰能當之哉鑿齒晉人其辭盖有溢羙者司馬昭之克壽春鍾㑹謀畫居多昭親待日隆委以腹心之任時人比之子房比之張良也漢姜維聞諸葛誕死復還成都復拜大将軍維以叚谷之敗貶行大将軍事夏五月詔以司馬昭為相國漢書百官表曰相國丞相皆秦官又按蕭何傳何自丞相拜相國則相國尊於丞相封晉公食邑八郡晉書帝記曰以并州之太原上黨西河樂平新興雁門司州之河東平陽凡八郡封為晉公加九錫昭前後九讓乃止秋七月吳主封故齊王奮為章安侯奮徙章安見上卷邵陵厲公嘉平五年八月以驃騎将軍王昶為司空昶音丑兩翻詔以關内侯王祥為三老鄭小同為五更帝率羣臣詣太學行養老乞言之禮記曰凡養老五帝憲三王又乞言五帝憲養氣體而不乞言有善則記之以為惇史三王亦憲既養老而後乞言亦㣲其禮皆有惇史鄭𤣥注曰憲法也養之為法其德行三王又從之求善言可施行也惇史惇厚者也㣲其禮者依違言之更音工衡翻小同𤣥之孫也鄭𤣥别傳曰𤣥有子為孔融吏舉孝廉融之被圍徃赴為賊所害有遺腹子以丁夘日生而𤣥以丁夘歲生故名曰小同吳孫綝以吳主親覽政事多所難問難音乃旦翻甚懼返自鑊里遂稱疾不朝朝直遥翻使弟威遠将軍據入倉龍門宿衛古倉蒼字通用武衛将軍恩偏将軍幹長水校尉闓闓音開又苦亥翻分屯諸營欲以自固吳主惡之惡音烏路翻乃推朱公主死意朱公主死見上卷正元二年推尋也尋問公主所以見殺之意全公主懼曰我實不知皆朱據二子熊損所白是時熊為虎林督損為外部督吳外部督建業外營兵吳主皆殺之損妻即孫峻妹也綝諫不從由是益懼吳主隂與全公主及将軍劉丞謀誅綝全后父尚為太常衛将軍吳主謂尚子黄門侍郎紀曰孫綝專埶輕小於孤謂輕視之以為㓜小也孤前勅之使速上岸為唐咨等作援而留湖中不上岸一歩上時掌翻又委罪於朱異擅殺功臣不先表聞築第橋南綝葢築第於朱雀橋南不復朝見此為自在無所復畏自在謂居處自如不復知有君上復扶又翻見賢遍翻不可乆忍今規取之規圖也卿父作中軍都督衛将軍督中軍使密嚴整士馬孤當自出臨橋率宿衛虎騎左右無難一時圍之吳有左右無難督督無難營兵作版詔勅綝所領皆解散不得舉手正爾自當得之正爾猶言正如此也卿去但當使密耳卿宣詔卿父勿令卿母知之女人既不曉大事且綝同堂姊邂逅漏洩誤孤非小也邂戶廨翻逅戶茂翻紀承詔以告尚尚無遠慮以語紀母母使人密語綝語牛倨翻九月戊午綝夜以兵襲尚執之遣弟恩殺劉承於蒼龍門外劉承即劉丞比明遂圍宫比必寐翻吳主大怒上馬帶鞬執弓欲出鞬居言翻戢弓矢器曰孤大皇帝適子適讀曰嫡在位已五年誰敢不從者侍中近臣及乳母共牽攀止之不得出歎咤不食咤陟駕翻罵全后曰爾父憒憒憒烏外翻類篇曰悶也敗我大事敗補邁翻又遣呼紀紀曰臣父奉詔不謹負上無靣目復見復扶又翻下同因自殺綝使光禄勲孟宗告太廟廢吳主為㑹稽王吳主亮時年十六㑹工外翻召羣臣議曰少帝荒病昏亂不可以處大位承宗廟少詩沼翻處昌呂翻下同已告先帝廢之諸君若有不同者下異議皆震怖怖普布翻曰唯将軍令綝遣中書郎李崇奪吳主璽綬璽斯氏翻綬音受以吳主罪班告逺近尚書桓彛不肯署名綝怒殺之典軍施正勸綝迎立琅邪王休綝從之吳制中營置左右典軍己未綝使宗正楷與中書郎董朝楷以吳同姓為宗正中書郎即晉中書侍郎之職迎琅邪王於㑹稽吳建興元年休徙丹陽既又徙㑹稽㑹工外翻遣将軍孫耽送㑹稽王亮之國亮時年十六徙全尚於零陵尋追殺之遷全公主於豫章冬十月戊午琅邪王行至曲阿杜祐曰曲阿今丹陽郡丹陽縣界有老公􅃒王叩頭曰事乆變生天下喁喁喁魚容翻師古曰喁喁衆口向上也又相應和聲是日進及布塞亭孫綝以琅邪王未至欲入居宫中召百官㑹議皆惶怖失色徒唯唯而已唯以水翻諾也選曹郎虞汜曰明公為國伊周處将相之任汜音祀處昌呂翻擅廢立之威将上安宗廟下惠百姓大小踴躍自以伊霍復見今迎王未至而欲入宮如是羣下揺蕩衆聽疑惑非所以永終忠孝揚名後世也綝不懌而止汜翻之子也綝命弟恩行丞相事率百僚以乘輿法駕迎琅邪王於永昌亭孫恩奉上璽符乘繩證翻上時掌翻王三讓乃受羣臣以次奉引引讀曰靷王就乘輿百官陪位綝以兵千人迎於半野拜於道側王下車荅拜即日御正殿大赦改元永安吳主休字子烈吳主權第六子孫綝稱艸莽臣詣闕上書上印綬節鉞求避賢路謂他有賢者進用恐妨其路求引身避之吳主引見慰諭見賢遍翻下詔以綝為丞相荆州牧増邑五縣綝遷大将軍封永寧侯今休以援立之功増其封邑以恩為御史大夫衛将軍中軍督封縣侯孫據幹闓皆拜将軍封侯又以長水校尉張布為輔義将軍封永康侯初休為王時布為左右督素見信愛及即位遂寵任之為布擅吳立孫皓以亡國䘮身張本宋白曰吳赤烏八年分烏傷之上浦立永康縣屬東陽郡先是丹陽太守李衡數以事侵琅邪王休徙丹陽見七十五卷邵陵厲公嘉平四年先悉薦翻數所角翻下同其妻習氏諫之習姓按風俗通漢有外黄令習一衡不聽琅邪王上書乞徙它郡詔徙㑹稽及琅邪王即位李衡憂懼謂妻曰不用卿言以至於此吾欲奔魏何如妻曰不可君本庶民耳先帝相㧞過重既數作無禮而復逆自猜嫌復扶又翻逃叛求活以此北歸何靣目見中國人乎琅邪王素好善慕名好呼到翻方欲自顯於天下終不以私嫌殺君明矣可自囚詣獄表列前失顯求受罪如此乃當逆見優饒逆迎也言将優加其官以饒益之非但直活而已衡從之吳主詔曰丹陽太守李衡以徃事之嫌自拘司敗左傳楚箴尹克黄自拘於司敗司敗即司寇也夫射鉤斬祛在君為君齊桓公與公子糾爭國管仲射桓公中帶鉤子糾死桓公以管仲為相遂覇諸侯晉獻公使寺人披伐蒲公子重耳踰垣而走披斬其袪及重耳反國與披謀國事發呂郤之謀薦趙衰守原為于偽翻其遣衡還郡勿令自疑又加威逺将軍授以棨㦸果如習氏所料己丑吳主封故南陽王和子皓為烏程侯和死皓全見上卷邵陵厲公嘉平五年羣臣奏立皇后太子吳主曰朕以寡徳奉承洪業涖事日淺恩澤未敷后妃之號嗣子之位非所急也有司固請吳主不許孫綝奉牛酒詣吳主吳主不受齎詣左将軍張布酒酣出怨言曰初廢少主時多勸吾自為之者吾以陛下賢明故迎之帝非我不立今上禮見拒是與凡臣無異當復改圖耳上時掌翻復扶又翻布以告吳主綝以布為吳主所信倚故詣之酒酣失言遂以賈禍綝之凶愚其赤族宜矣吳主銜之恐其有變數加賞賜數所角翻戊戍吳主詔曰大将軍掌中外諸軍事事統煩多其加衛将軍御史大夫恩侍中與大将軍分省諸事分綝之權也或有告綝懷怨侮上欲圖反者吳主執以付綝綝殺之由是益懼因孟宗求出屯武昌吳主許之綝盡敕所督中營精兵萬餘人皆令装載中營兵即中軍也吳人謂装船為装載綝欲以此兵自隨上武昌載才再翻車船装物皆曰載詩云載輸爾載又取武庫兵器吳主咸令給與綝求中書兩郎典知荆州諸軍事主者奏中書不應外出吳主特聽之其所請求一無違者将軍魏邈説吳主曰綝居外必有變説輸芮翻武衛士施朔又告綝謀反武衛士武衛之士也吳主将討綝密問輔義将軍張布布曰左将軍丁奉雖不能吏書而計畧過人能斷大事斷丁亂翻吳主召奉告之且問以計畫奉曰丞相兄弟支黨甚盛恐人心不同不可卒制卒讀曰猝可因臘㑹有陛兵以誅之陛兵宿衛之兵夾殿陛者所謂陛㦸之士吳主從之十二月丁夘建業中謡言明㑹有變明㑹明日臘㑹也吳以土徳王用辰臘綝聞之不悦夜大風發屋揚沙綝益懼戊辰臘㑹稱疾不至吳主彊起之彊其兩翻使者十餘輩綝不得已将入衆止焉綝曰國家屢有命不可辭可豫整兵令府内起火因是可得速還遂入尋而火起尋繼時也綝求出吳主曰外兵自多不足煩丞相也綝起離席離力智翻奉布目左右縛之綝叩頭曰願徙交州吳主曰卿何不徙滕𦙍呂據於交州乎綝復曰復扶又翻願没為官奴吳主曰卿何不以𦙍據為奴乎𦙍據死見上甘露元年遂斬之以綝首令其衆曰諸與綝同謀者皆赦之放仗者五千人孫闓乘船欲降此追殺之闓音開又可亥翻綝之諸弟據恩幹葢已就誅獨闓走欲投北降户江翻夷綝三族發孫峻棺取其印綬斵其木而埋之古者棺椁厚薄皆有度斵而薄之以示貶己巳吳主以張布為中軍督改葬諸葛恪滕𦙍呂據等其罹恪等事逺徙者一切召還朝臣有乞為諸葛恪立碑者為于偽翻吳主詔曰盛夏出軍士卒傷損無尺寸之功不可謂能受託孤之任死於豎子之手不可謂智遂寑恪死見上卷嘉平五年初漢昭烈留魏延鎮漢中事見六十八卷漢獻帝建安二十四年皆實兵諸圍以禦外敵敵若來攻使不得入及興埶之役王平捍拒曹爽事見七十四卷邵陵厲公正始五年皆承此制及姜維用事建議以為錯守諸圍錯倉故翻適可禦敵不獲大利不若使敵至諸圍皆歛兵聚榖退就漢樂二城諸葛亮築漢樂二城見七十一卷明帝太和三年聽敵入平謂縱敵使入平地也重關頭鎮守以捍之令游軍旁出以伺其虚敵攻關不克野無散榖千里運糧自然疲乏引退之日然後諸城並出與游軍并力傳之此殄敵之術也於是漢主令督漢中胡濟却住漢夀監軍王含守樂城樂城在沔陽東山上周三十里甚險固諸葛亮所築沔水逕其北又北逕西樂城東而北流注于漢䕶軍蒋斌守漢城姜維自弃險要以開狡焉啓疆之心書此為亡蜀張本斌音彬四年春正月黄龍二見寧陵井中見賢遍翻下同先是頓丘冠軍陽夏井中屢有龍見陳夀志曰去年青龍仍見頓丘冠軍陽夏縣界井中寧陵縣前漢屬陳留郡後漢魏屬梁國頓丘縣漢屬東郡魏屬魏郡冠軍縣屬南陽郡陽夏縣漢屬陳國魏屬梁國先悉薦翻夏音賈羣臣以為吉祥帝曰龍者君徳也上不在天下不在田而數屈於井數所角翻非嘉兆也作潛龍詩以自諷司馬昭見而惡之帝有誅昭之志不務善晦而憤鬰之氣見於辭而不能自揜盖亦淺矣此其所以死於權臣之手乎惡烏路翻夏六月京陵穆侯王昶卒漢主封其子諶為北地王諶時壬翻詢為新興王䖍為上黨王尚書令陳祗以巧佞有寵於漢主姜維雖位在祗上而多率衆在外希親朝政權任不及祗秋八月丙子祗卒漢主以僕射義陽董厥為尚書令尚書諸葛瞻為僕射冬十一月車騎将軍孫壹為婢所殺二年孫壹來降是嵗以王基為征南将軍都督荆州諸軍事據晉書文帝紀時分荆州為二都督基鎮新野州泰鎮襄陽元皇帝上諱奐字景明武帝之孫燕王宇之子也甘露二年封安次縣常道鄉公諡法行義説民曰元帝本名璜即位改名奐景元元年是年六月方改元春正月朔日有食之夏四月詔有司率遵前命復進大将軍昭位相國封晉公加九錫遵前年之命也復扶又翻帝見威權日去不勝其忿勝音升五月己丑召侍中王沈沈持林翻下同尚書王經散騎常侍王業謂曰司馬昭之心路人所知也言路人亦知其将簒吾不能坐受廢辱今日當與卿自出討之卿下當有等字王經曰昔魯昭公不忍季氏敗走失國為天下笑魯季氏世執魯國之政至昭公時伐之不勝公孫于齊次于陽州死于乾侯事見左傳今權在其門為日乆矣朝廷四方皆為之致死為于偽翻不顧逆順之理非一日也且宿衛空闕兵甲寡弱陛下何所資用而一旦如此毋乃欲除疾而更深之邪禍殆不測宜見重詳重直用翻重再也詳審也帝乃出懷中黄素詔投地説文曰素白緻繒也此黄素詔者盖以白緻繒染為黄色以書詔曰行之决矣正使死何懼况不必死邪於是入白太后沈業犇走告昭呼經欲與俱經不從帝禮遇王沈呼為文籍先生而臨變乃爾吁考異曰世語曰經因沈業申意今從晉諸公贊帝遂㧞劔升輦率殿中宿衛蒼頭官僮鼓譟而出昭弟屯騎校尉伷遇帝於東止車門左右呵之伷衆犇走伷讀曰胄中䕶軍賈充自外入逆與帝戰於南闕下帝自用劔衆欲退騎督成倅弟太子舍人濟問充曰事急矣當云何充曰司馬公畜養汝等畜許六翻騎督督騎兵晉志太子舍人職比散騎中書等侍郎時未立太子不應置東宫官屬濟本昭之私人授以是官耳騎竒寄翻倅七内翻正為今日為于偽翻今日之事無所問也濟即抽戈前刺帝殞于車下時年二十刺七亦翻昭聞之大驚自投於地太傅孚犇徃枕帝股而哭甚哀枕帝於股也左傳齊崔杼弑其君光晏子枕尸股而哭之三踊而出枕職任翻曰殺陛下者臣之罪也昭入殿中召羣臣㑹議尚書左僕射陳泰不至昭使其舅尚書荀顗召之泰曰世之論者以泰方於舅方比也今舅不如泰也言顗阿附司馬氏而已忠於魏室子弟内外咸共逼之乃入見昭悲慟昭亦對之泣曰𤣥伯陳泰字𤣥伯卿何以處我處昌呂翻泰曰獨有斬賈充少可以謝天下耳少詩沼翻崩考異曰魏氏春秋曰帝之也太傅司馬孚右僕射陳泰枕帝尸於股號哭盡哀大将軍入禁中泰見之悲慟大将軍亦對之泣謂曰𤣥伯其如我何泰曰獨有斬賈充少可以謝天下耳大将軍乆之曰卿更思其他泰曰豈可使泰復發後言遂嘔血薨裴松之以為違實今從干寶晉紀昭乆之曰卿更思其次泰曰泰言惟有進於此言當以弑君之罪罪昭不知其次昭乃不復更言復扶又翻顗彧之子也彧於六翻太后下令罪状高貴鄉公廢為庶人葬以民禮收王經及其家屬付廷尉經謝其母母顔色不變笑而應曰人誰不死正恐不得其所以此并命何恨之有非此母不生此子及就誅故吏向雄哭之哀動一市向姓也音式亮翻王沈以功封安平侯庚寅太傅孚等上言請以王禮葬高貴鄉公太后許之使中䕶軍司馬炎迎燕王宇之子常道鄉公璜於鄴水經注曰白祀溝水出廣陽縣之婁城東東南逕常道城西故鄉亭也西去良鄉城四十里魏少帝璜所封也廣陽故燕國以為明帝嗣炎昭之子也辛夘羣公奏太后自今令書皆稱詔制羣公自上公三公至諸從公也癸夘司馬昭固讓相國晉公九錫之命太后詔許之戊申昭上言成濟兄弟大逆不道夷其族六月癸丑太后詔常道鄉公更名奐更工衡翻甲寅常道鄉公入洛陽是日即皇帝位年十五大赦改元丙辰詔進司馬昭爵位九錫如前昭固讓乃止癸亥以尚書右僕射王觀為司空吳都尉嚴密建議作浦里塘據范書方術傳浦里塘在丹陽郡宛陵縣界陳志濮陽興傳亦云嚴密建丹陽湖田作浦里塘羣臣皆以為難唯衛将軍陳留濮陽興以為可成濮陽以邑為姓陳留風俗傳漢有長沙太守濮陽逸吳主休居㑹稽時興為太守深與相結及即位遂與張布並見信用遂㑹諸軍民就作功費不可勝數數音升士卒多死亡民大愁怨㑹稽郡謡言王亮當還為天子而亮宫人告亮使巫禱祠有惡言有司以聞吳主黜亮為候官侯遣之國晉志曰建安郡故秦閩中郡漢高祖以封閩越王及武帝滅之徙其人名為東治後漢改為候官都尉吳置建安郡以候官為縣屬焉宋白曰漢武帝元鼎六年立都尉居候官以禦兩越所謂南北一候也亮自殺衛送者皆伏罪冬十月陽鄉肅侯王觀卒謚法剛徳克就曰肅十一月詔尊燕王待以殊禮十二月甲午以司𨽻校尉王祥為司空尚書王沈為豫州刺史初到下敎敕屬城及士民曰若有能陳長吏可否長知兩翻説百姓所患者給榖五百斛若説刺史得失朝政寛猛者給榖千斛主簿陳廞禇䂮廞許今翻䂮力灼翻入白曰敎㫖思聞苦言示以勸賞竊恐拘介之士或憚賞而不言貪昧之人将慕利而妄舉茍不合宜賞不虛行則逺聽者未知當否之所在當丁浪翻徒見言之不用因謂設而不行愚以為告下之事可少須後須待也沈又敎曰夫興益於上受分於下興益謂進言有益於上也受分謂受賞也斯乃君子之操何不言之有禇䂮復白曰復扶又翻下同堯舜周公所以能致忠諫者以其欵誠之心著也氷炭不言而冷熱之質自明者以其有實也若好忠直好呼到翻如氷炭之自然則諤諤之言将不求而自至若德不足以配唐虞配合也明不足以並周公實不可以同氷炭雖懸重賞忠諫之言未可致也沈乃止二年春三月襄陽太守胡烈襄陽縣漢屬南郡沈約曰魏武平荆州分南郡編以北及南陽之山都立襄陽郡表言吳将鄧由李光等十八屯同謀歸化遣使質任質音致欲令郡兵臨江迎㧞詔王基部分諸軍徑造沮水以迎之造七到翻應劭曰沮水出漢中房陵東入江師古曰沮千余翻南郡臨沮縣以臨沮水得名水經注曰自臨沮界東南過枝江縣又東南入于江若由等如期到者便當因此震蕩江表基馳驛遺司馬昭書遺于季翻下同説由等可疑之状且當清澄謂事之虚實未定如水之混濁莫測其淺深且當清澄以俟之盖亦當時常語也未宜便舉重兵深入應之又曰夷陵東西皆險陿陿與狹同竹木叢蔚卒有要害弩馬不陳蔚音尉又紆勿翻卒讀曰猝謂猝然敵人於要害之地設伏邀擊弩馬不得陳其力也今者筋角濡弱考工記弓人為弓冬析幹春液角夏治筋秋合三材春液角夏治筋以陽煦而筋角濡滑也冬析幹秋合三材以隂凝而堅緻也春夏之交陽氣蒸潤筋角濡弱則弓弩之力不勁水潦方降廢盛農之務要難必之利此事之危者也要一遥翻姜維之趣上邽趣七喻翻文欽之據夀春皆深入求利以取覆没此近事之鑒戒也嘉平已來累有内難謂曹爽足弟既死累有廢立之事毌丘儉諸葛誕相繼而舉兵也難乃旦翻當今之宜當務鎮安社稷撫寧上下力農務本懷柔百姓未宜動衆以求外利也昭累得基書意狐疑敕諸軍已上道者且權停住所在令各就其所至之地而住軍也須候節度須待也基復遺昭書曰昔漢祖納酈生之説欲封六國寤張良之謀而趣銷印事見十卷漢高帝三年復扶又翻下同趣讀曰促基謀慮淺短誠不及留侯亦懼襄陽有食其之謬食其音異基昭於是罷兵報基書曰凡處事者多曲相從順鮮能確然共盡理實處昌吕翻鮮息淺翻誠感忠愛每見規示輙依來㫖已罷軍嚴既而由等果不降降戶江翻烈奮之弟也秋八月甲寅復命司馬昭進爵位如前不受冬十月漢主以董厥為輔國大将軍諸葛瞻為都䕶衛将軍共平尚書事以侍中樊建為尚書令時中常侍黄皓用事厥瞻皆不能矯正揉曲使直曰矯士大夫多附之唯建不與皓徃來祕書令郤正乆在内職與皓比屋比毗至翻近也並也聯也又簿必翻相次也周旋三十餘年澹然自守以書自娛既不為皓所愛亦不為皓所憎故官不過六百石秘書令秩六百石而亦不罹其禍漢主弟甘陵王永憎皓皓譖之使十年不得朝見朝直遥翻見賢遍翻吳主使五官中郎将薛珝聘于漢珝况羽翻及還吳主問漢政得失對曰主闇而不知其過臣下容身以求免罪入其朝不聞直言經其野民皆菜色臣聞燕雀處堂子母相樂以為至安也突决棟焚而燕雀怡然不知禍之将及其是之謂乎魏相子順引先人之言也嗚呼蜀之亡形成矣薛珝見而知之濮陽興張布用事浦里塘之役吳民愁怨韋昭盛冲以切直而不得居王所珝亦知之否邪知而不言無亦容身而求免罪邪處昌呂翻樂音洛珝綜之子也薛綜見七十二卷明帝青龍元年是嵗鮮卑索頭部大人拓䟦力㣲始遣其子沙漠汗入貢因留為質索音昔名翻汗音寒質音致力㣲之先世居北荒不交南夏魏收曰魏之先出自黄帝黄帝子曰昌意昌意少子受封北國有大鮮卑山因以為號黄帝以土徳王北人謂土為托謂后為㧞故以為氏或曰自謂托天而生抜地而長故為托㧞氏蕭子顯曰匈奴女名托䟦妻李陵胡俗以母為姓故為李陵之後而甚諱之有言其是陵後者輙見殺夏戶雅翻至可汗毛始彊大可汗北方之尊稱猶漢時之單于也宋白曰虜俗呼天為可汗可讀如渴汗何干翻統國三十六大姓九十九後五世至可汗推寅魏書曰漢桓帝時鮮卑檀石槐分其地為東西三部其大人曰置鞬落羅曰律推演宴荔游等皆為大帥推演葢即推寅也按魏收魏書帝紀毛死貸立貸死觀立觀死樓立樓死越立越死推寅立推寅盖俗云鑽研之義南遷大澤又七世至可汗鄰推寅死利立利死俟立俟死肆立肆死機立機死葢立葢死儈立儈死隣立使其兄弟七人及族人乙旃氏車惃氏車昌遮翻惃胡昆翻又公渾翻又古本翻分統部衆為十族按魏書官氏志毛統國有九十九姓至鄰七分國人使諸兄弟各攝領之乃分其氏以兄為紇骨氏後改為胡氏次兄為普氏後改為周氏次兄為抜抜氏後改為長孫氏弟為逹奚氏後改為奚氏次弟為伊婁氏後改為伊氏次弟為丘敦氏後改為丘氏次弟為侯氏後改為亥氏七族之興自此始也又命叔父之𦙍曰乙旃氏後改為叔孫氏又命䟽族為車惃氏後改為車氏凡與托抜氏為十姓百世不通婚鄰老以位授其子詰汾使南遷遂居匈奴故地詰汾卒力㣲立復徙居定襄之盛樂漢定襄郡有成樂縣後漢屬雲中郡建安二十年併雲中定襄五原朔方為新興郡郡止置一縣以屬新興而盛樂故縣弃之荒外故力㣲得居之後魏既盛南都平城置盛樂宫於其地永熈中又置盛樂郡復扶又翻部衆浸盛諸部皆畏服之拓抜氏始見于此鮮卑軻比能與魏為敵者也軻比能死北邉差安而拓抜氏盛矣為後魏張本資治通鑑卷七十七
