front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百二十四宋司馬光撰胡三省音註宋紀六起𤣥黓敦牂盡柔兆閹茂凡五年太祖文皇帝中之中元嘉十九年春正月甲申魏主備法駕詣道壇受符籙旗幟盡青自是每帝即位皆受籙此所受者今道士所謂法籙也隋志曰道士受道之法初受五千文籙次受三洞籙次受洞𤣥籙次受上清籙籙皆素書紀諸天曹官屬佐吏之名又有諸符錯在其間文章詭怪世所不識籙龍玉翻謙之又奏作静輪宫水經註静輪宫在道壇東北道壇在平城東灅水之左必令其髙不聞雞犬欲以上接天神崔浩勸帝為之功費萬計經年不成太子晃諌曰天人道殊卑髙定分分扶問翻不可相接理在必然今虚耗府庫疲弊百姓為無益之事將安用之必如謙之所言請因東山萬仞之髙謂平城之東山也為功差易易以豉翻帝不從夏四月沮渠無諱將萬餘家棄敦煌西就沮渠安周未至鄯善王比龍畏之將其衆奔且末沮子余翻將即亮翻敦徒門翻鄯上扇翻且末漢故國在鄯善西去代八千三百二十里且子余翻其世子降於安周降戸江翻無諱遂據鄯善其士卒經流沙渴死者大半李寳自伊吾帥衆二千入據敦煌帥讀曰率繕脩城府安集故民沮渠牧犍之亡也見上卷十六年犍居言翻凉州人闞爽據髙昌自稱太守唐契為柔然所逼擁衆西趨髙昌闞苦濫翻守手又翻趨七喻翻欲奪其地柔然遣其將阿若追擊之契敗死營陽王景平元年契與李寳同奔伊吾契弟和收餘衆奔車師前部王伊洛時沮渠安周屯横截城和攻㧞之又㧞髙寧白力二城李延壽曰髙昌國有四十六鎮交河田地髙寧白刄横截等餘不具載白力當作白刄遣使請降於魏使疏吏翻甲戌上以疾愈大赦五月裴方明等至漢中與劉真道等分兵攻武興下辯白水皆取之下辯漢書作下辨並音皮莧翻楊難當遣建節將軍符𢎞祖守蘭臯元豐九域志階州將利縣有蘭臯鎮按五代志將利縣後魏武興郡之石門縣也蕭子顯曰武興西北有蘭臯戍去仇池二百里符恐當作苻楊氏苻氏皆氐種也使其子撫軍大將軍和將重兵為後繼方明與𢎞祖戰于濁水濁水城在上禄縣東南武街城西北酈道元曰濁水即白水也武街城故下辨縣治大破之斬𢎞祖和退走追至赤亭又破之難當奔上邽獲難當兄子建節將軍保熾難當以其子虎為益州刺史守隂平聞難當走引兵還至下辯方明使其子肅之邀擊之擒虎送建康斬之仇池平以輔國司馬胡崇之為北秦州刺史鎮其地立楊保熾為楊𤣥後使守仇池楊難當廢𤣥子保宗而自立見一百二十一卷六年魏人遣中山王辰迎楊難當詣平城秋七月以劉真道為雍州刺史雍於用翻裴方明為梁南秦二州刺史方明辭不拜在考異曰真道傳此事胡崇之没後氐胡傳崇之没在明年二月即真道傳誤丙寅魏主使安西將軍古弼曰考異宋索虜傳作吐奚愛弼氐胡傳作吐奚弼蓋其舊姓今從後魏書督隴右諸軍及殿中虎賁賁音奔與武都王楊保宗自祁山南入保宗奔魏見上卷十六年征西將軍漁陽皮豹子與琅邪王司馬楚之督闗中諸軍自散闗西入俱㑹仇池又使譙王司馬文思督洛豫諸軍南趨襄陽營陽王景平二年魏取河南置洛州於洛陽豫州於虎牢趨七喻翻下同征南將軍刁雍東趨廣陵雍於容翻移書徐州稱為楊難當報仇為于偽翻甲戌晦日有食之唐契之攻闞爽也曰考異宋氐胡傳作闕爽今從後魏書爽遣使詐降于沮渠無諱欲與之共擊契使疏吏翻降戸江翻八月無諱將其衆趨髙昌比至將即亮翻下同比必利翻及也契已死爽閉門拒之九月無諱將衛興奴夜襲髙昌屠其城作考異曰宋書衛興奴衛尞今從後魏書爽奔柔然無諱據髙昌遣其常侍汜雋奉表詣建康汜音凡詔以無諱都督凉河沙三州諸軍事征西大將軍凉州刺史河西王曰考異宋紀封爵在六月傳在九月末今從傳冬十月己卯魏立皇子伏羅為晉王翰為秦王譚為燕王建為楚王余為吳王甲申柔然遣使詣建康十二月辛巳魏襄城孝王盧魯元卒丙申詔魯郡脩孔子廟及學舍蠲墓側五戸課役以供灑掃灑所賣翻又所買翻掃素報翻又蘇老翻李寳遣其弟懐達子承奉表詣平城魏人以寳為都督西垂諸軍事逺邉曰垂鎮西大將軍開府儀同三司沙州牧敦煌公敦徒門翻四品以下聽承制假授雍州刺史晉安襄矦劉道産卒道産善為政民安其業小大豐贍由是民間有襄陽樂歌雍於用翻贍時艷翻卒子恤翻樂音洛山蠻前後不可制者皆出縁沔為村落戸口殷盛及卒蠻追送至沔口未幾羣蠻大動道産卒未幾而之蠻作亂後之人不能容養也沔彌兖翻幾居豈翻征西司馬朱脩之討之不利詔建威將軍沈慶之代之殺虜萬餘人魏主使尚書李順差次羣臣賜以爵位順受賄品第不平是嵗凉州人徐桀告之魏主怒且以順保庇沮渠氏面欺誤國事見上卷十六年賜順死二十年春正月魏皮豹子進擊樂鄉將軍王奐之等敗没魏軍進至下辯將軍强𤣥明等敗死强其兩翻二月胡崇之與魏戰於濁水崇之為魏所擒餘衆走還漢中將軍姜道祖兵敗降魏降戸江翻魏遂取仇池楊保熾走丙午魏主如恒山之陽恒戸登翻三月庚申還宫壬戌烏洛矦國遣使如魏烏洛矦國在地豆于國北去代四千五百餘里地豆于在室韋西千餘里室韋當勿吉之北勿吉在髙麗之北則烏洛矦東夷也使疏吏翻初魏之居北荒也鑿石為廟在烏洛矦西北以祀其先髙七十尺深九十歩度髙曰髙音居號翻度深曰深音式禁翻及烏洛矦使者至魏言石廟具在魏主遣中書侍郎李敞詣石廟致祭刻祝文於壁而還去平城四千餘里魏河間公齊與武都王楊保宗對鎮雒谷雒谷即駱谷北史作駱保宗弟文徳説保宗令閉險自固以叛魏説輸芮翻或以告齊夏四月齊誘執保宗送平城殺之前鎮東司苻達司上當有軍字否則司下當有馬字征西從事中郎任朏等苻達等皆楊氏官屬也任音壬朏敷尾翻遂舉兵立楊文徳為主據白崖今大安軍東北八十里有白崖大安軍古葭萌地也齊考異曰宋氐胡傳云拓䟦齊聞兵起遁走達追擊斬因據白崖按後魏河間公齊傳云文徳求援于宋宋遣房亮之苻昭啖龍等帥衆助文徳斬龍擒亮之氐遂平以功拜内都大官卒然則宋書誤也分兵取諸戍進圍仇池自號征西將軍秦河梁三州牧仇池公魏考異曰宋書在三月書在四月今從之甲午立皇子誕為廣陵王丁酉魏大赦己亥魏主如隂山五月魏古弼𤼵上邽髙平岍城諸軍擊楊文徳岍城意當作汧城汧口堅翻文徳退走皮豹子督闗中諸軍至下辯聞仇池解圍欲還弼遣人謂豹子曰宋人恥敗必將復來復扶又翻軍還之後再舉為難不如練兵蓄力以待之不出秋冬宋師必至以逸待勞無不克矣豹子從之魏以豹子為仇池鎮將楊文徳遣使來求援使疏吏翻秋七月癸丑詔以文徳為都督北秦雍二州諸軍事征西大將軍北秦州刺史武都王雍於用翻文徳屯葭蘆城五代志武都郡盤堤縣西魏之南五部縣也魏又置武陽郡及茄蘆縣後周皆併入盤堤祝穆曰盤池山在階州福津縣東南七十里郡縣志魏將鄧艾與蜀將姜維相持于此置茄蘆戍後於此置縣以任朏為左司馬武都隂平氐多歸之甲子前雍州刺史劉真道梁南秦二州刺史裴方明坐破仇池減匿金寳及善馬下獄死宋人捨功録過自戮良將宜其為魏人所窺下遐稼翻九月辛巳魏主如漠南甲辰捨輜重重直用翻以輕騎襲柔然騎竒寄翻下同分軍為四道樂安王範建寧王崇各統十五將出東道樂平王丕督十五將出西道魏主出中道中山王辰督十五將為後繼將即亮翻魏主至鹿渾谷鹿渾谷即鹿渾海之谷也本髙車袁紇部所居其地直平城西北其東即弱洛水遇敕連可汗可從刋入聲汗音寒太子晃言于魏主曰賊不意大軍猝至宜掩其不備速進擊之尚書令劉絜固諌以為賊營中塵盛其衆必多出至平地恐為所圍不如須諸軍大集須待也然後擊之晃曰塵之盛者由軍士驚怖擾亂故也怖普布翻何得營上而有此塵乎魏主疑之不急擊柔然遁去追至石水不及而還石水在頞根河北還從宣翻又如字既而獲柔然候騎曰柔然不覺魏軍至上下惶駭引衆北走經六七日知無追者乃始徐行魏主深恨之為魏誅劉絜中山王辰等張本自是軍國大事皆與太子謀之司馬楚之别將兵督軍糧鎮北將軍封沓亡降柔然説柔然令擊楚之以絶軍食降戸江翻説輸芮翻俄而軍中有告失驢耳者諸將莫曉其故楚之曰此必賊遣姦人入營覘伺覘丑㢘翻又丑艷翻伺相吏翻割驢耳以為信耳賊至不久宜急為之備乃伐栁為城以水灌之令凍城立而柔然至冰堅滑不可攻乃散走十一月將軍姜道盛與楊文徳合衆二萬攻魏濁水戍魏皮豹子河間公齊救之道盛敗死甲子魏主還至朔方下詔令皇太子副理萬機總統百揆異考曰宋索虜傳晃與大臣崔氏寇氏不睦崔寇譛之𤣥髙道人有道術晃使祈福七日七夜佛狸夢其祖父並怒手刄向之曰汝何故信䜛欲害太子佛狸驚覺下偽詔曰王者大業纂承為重儲宫嗣紹百王舊例自今以徃事無巨細必經太子然後上聞事節小異今從後魏書且曰諸功臣勤勞日久皆當以爵歸第随時朝請饗宴朕前論道陳謨而已不宜復煩以劇職朝直遥翻復扶又翻更舉賢俊以備百官十二月丁卯魏主還平城自伐柔然還也二十一年春正月己亥帝耕藉田大赦藉秦昔翻辛考異曰宋畧酉藉田大赦下有戊午又有辛酉誤也今從宋書壬寅魏太子始總百揆命侍中中書監穆夀司徒崔浩侍中張黎古弼輔太子决庶政上書者皆稱臣儀與表同古弼為人忠慎質直嘗以上谷苑囿太廣乞減大半以賜貧民入見魏主欲奏其事據北史古弼傳時上谷人上書言苑囿過度人無田業宜減大半以賜貧者蓋上谷距代都甚逺魏未嘗置苑囿于其地而道武帝起鹿苑于南臺隂北距長城東苞白登屬之西山廣輪數十里天興六年幸南平城規度灅南夏屋山背黄𤓰堆以建新邑至天賜三年遂築灅南宫闕引溝穿池廣苑囿所謂太廣者此也不在上谷當以北史為正見賢遍翻帝方與給事中劉樹圍碁志不在弼弼侍坐良久不獲陳聞坐徂卧翻忽起捽樹頭捽昨没翻掣下牀搏其耳毆其背掣尺列翻毆烏口翻曰朝廷不治實爾之罪治直之翻帝失容捨碁曰不聽奏事朕之過也樹何罪置之弼具以狀聞帝皆可其奏弼曰為人臣無禮至此其罪大矣出詣公車免冠徒跣請罪帝召入謂曰吾聞築社之役蹇蹷而築之蜀注曰跛蹇而顛蹷也端冕而事之神降之福然則卿有何罪其冠履就職茍可以利社稷便百姓者竭力為之勿顧慮也太子課民稼穡使無牛者借人牛以耕種而為之芸田以償之為于偽翻凡耕種二十二畝而芸七畝大略以是為率使民各標姓名於田首以知其勤惰禁飲酒遊戲者於是墾田大増戊申魏主詔王公以下至庶人有私養沙門巫覡於家者男曰巫女曰覡覡刑狄翻皆遣詣官曹過二月十五日不出沙門巫覡死主人門誅門誅者闔門盡誅之庚戌又詔王公卿大夫之子皆詣太學其百工商賈之子當各習父兄之業賈音古毋得私立學校校戸敎翻違者師死主人門誅二月辛未魏中山王辰内都坐大官薛辨魏置中都大官外都大官都坐大官皆掌折獄謂之三都坐徂卧翻尚書奚眷等八將將即亮翻下同坐擊柔然後期斬於都南初魏尚書令劉絜久典機要宋髙祖永初末魏明元帝寢疾魏主監國劉絜與古弼等選侍東宫對綜機要至是二十餘年矣恃寵自專魏主心惡之惡烏路翻及將襲柔然絜諫曰蠕蠕遷徙無常前者出師勞而無功絜之言蓋指太延四年魏主伐柔然至白阜時也蠕人兖翻不如廣農積穀以待其來崔浩固勸魏主行魏主從之絜恥其言不用欲敗魏師敗補邁翻魏主與諸將期㑹鹿渾谷絜矯詔易其期帝至鹿渾谷欲擊柔然絜諌止之使待諸將帝留鹿渾谷六日諸將不至柔然遂逺遁追之不及軍還經漠中糧盡士卒多死絜隂使人驚魏軍勸帝委軍輕還帝不從絜以軍出無功請治崔浩之罪治直之翻下同帝曰諸將失期遇賊不擊浩何罪也浩以絜矯詔事白帝帝至五原收絜囚之帝之北行也絜私謂所親曰若車駕不返吾當立樂平王絜聞尚書右丞張嵩家有圖䜟問曰劉氏應王繼國家後吾有姓名否嵩曰有姓無名帝聞之命有司窮治索嵩家得䜟書索山客翻事連南康公狄鄰絜嵩鄰皆夷三族死者百餘人絜在勢要好作威福好呼到翻諸將破敵所得財物皆與絜分之既死籍其家財巨萬帝毎言之則切齒癸酉樂平戾王丕以憂卒初魏主築白臺髙二百餘尺魏主嗣泰常二年秋七月乙酉起白臺於平城南髙二十丈丕夢登其上四顧不見人命術士董道秀筮之道秀曰大吉丕黙有喜色及丕卒道秀亦坐棄市髙允閒之曰夫筮者皆當依附爻象勸以忠孝漢嚴君平卜筮於成都市人有邪惡非正之問則依蓍龜為言利害與人子言依於孝與人弟言依於順與人臣言依於忠各因勢道之以善髙允之言祖君平之術也王之問道秀也道秀宜曰窮髙為亢易曰亢龍有悔又曰髙而無民易乾上九及文言之辭亢苦浪翻皆不祥也王不可以不戒如此則王安於上身全於下矣道秀反之宜其死也庚辰魏主幸廬自南北國分治人主所至例不書幸此必誤也己丑江夏王義恭進位太尉領司徒夏戸雅翻庚寅以侍中領右衛將軍沈演之為中領軍左衛將軍范曄為太子詹事辛卯立皇子宏為建平王三月甲辰魏主還宫癸丑魏主遣司空長孫道生鎮統萬長知兩翻夏四月乙亥魏侍中太宰陽平王杜超為帳下所殺六月魏北部民殺立義將軍衡陽公莫孤帥五千餘落北走遣兵追擊之至漠南殺其渠帥餘徙冀相定三州為營戸杜佑曰魏道武天興中詔採漏戸令輸綸綿自後諸逃戸占為紬繭羅縠者甚衆於是雜營戸率徧於天下不𨽻守宰賦役不同景穆皇帝一切罷之以屬郡縣孤帥讀曰率渠帥所𩔖翻相息亮翻吐谷渾王慕利延兄子緯世與魏使者謀降魏緯世即阿柴之長子緯代也北史避唐太宗諱改世為代使疏吏翻降戸江翻慕利延殺之是月緯世弟叱力延等八人奔魏魏以叱力延為歸義王沮渠無諱卒沮子余翻弟安周代立魏入中國以來雖頗用古禮祀天地宗廟百神而猶循其舊俗所祀胡神甚衆崔浩請存合於祀典者五十七所其餘複重及小神悉罷之量直龍翻魏主從之秋七月癸卯魏東雍州刺史沮渠秉謀反伏誅隋志絳郡後魏置東雍州後周改曰絳州雍於用翻八月乙丑魏主畋于河西尚書令古弼留守守手又翻詔以肥馬給獵騎弼悉以弱者給之帝大怒曰筆頭奴敢裁量朕騎竒寄翻量音良朕還臺先斬此奴弼頭鋭故帝常以筆目之弼官屬惶怖恐并坐誅怖普布翻弼曰吾為人臣不使人主盤於遊畋盤樂也其罪小不備不虞乏軍國之用其罪大今蠕蠕方彊南寇未滅吾以肥馬供軍弱馬供獵為國逺慮為于偽翻雖死何傷且吾自為之非諸君之憂也帝聞之歎曰有臣如此國之寳也賜衣一襲衣一稱為一襲猶今言一副衣服也馬二匹鹿十頭他日魏主復畋于山北山北平城北山之北復扶又翻獲麋鹿數千頭詔尚書發車五百乗以運之觀下載弼表蓋𤼵民車也秉繩證翻詔使已去魏主謂左右曰筆公必不與我汝輩不如以馬運之遂還行百餘里得弼表曰今秋穀懸黄麻菽布野豬鹿竊食鳥鴈侵費風雨所耗朝夕三倍言夕之所收較于朝之所收得失三倍收穫不可以不速載麋鹿猶可緩乞賜矜緩使得收載帝曰果如吾言筆公可謂社稷之臣矣魏主使貟外散騎常侍髙濟來聘散悉亶翻騎竒寄翻戊辰以荆州刺史衡陽王義季為征北大將軍開府儀同三司南兗州刺史以南譙王義宣為荆州刺史初帝以義宣不才故不用㑹稽公主屢以為言帝不得已用之㑹稽公主髙祖長女帝深加禮敬家事大小必咨之㑹工外翻先賜中詔敕之曰師護以在西久詔自中出不經門下者謂之中詔今之手詔是也敕戒也義季小字師護比表求還比毗至翻頻也今欲聽許以汝代之師護雖無殊績絜已節用絜與㓗同通懐期物不恣群下聲著西土為士庶所安論者乃未議遷之今之囬換更為汝與師護年時一輩為于偽翻欲各試其能汝徃脱有一事減之者既於西夏交有巨礙江左六朝以荆楚為西夏夏戸雅翻遷代之譏必歸責于吾矣言遷代之際所任非人也此事亦易勉耳無為使人復生評論也易以䜴翻復扶又翻義宣至鎮勤自課厲事亦脩理庚辰㑹稽長公主卒知兩翻卒子恤翻吐谷渾叱力延等請師於魏以討吐谷渾王慕利延魏主使晉王伏羅督諸軍擊之九月甲辰以沮渠安周為都督凉河沙三州諸軍事凉州刺史河西王丁未魏主如漠南將襲柔然柔然敕連可汗逺遁乃止敕連尋卒子吐賀真立號處羅可汗魏收曰處羅魏言唯也可從刋入聲汗音寒魏晉王伏羅至樂都樂音洛引兵從間道襲吐谷渾間古莧翻至大母橋吐谷渾王慕利延大驚逃奔白蘭慕利延兄子拾寅奔河西魏軍斬首五千餘級慕利延從弟伏念等帥萬三千落降於魏慕利延背阿柴折箭之誡使之招引外寇至于衆叛親離同其宜也從才用翻帥讀曰率降戸江翻冬十月己卯以左軍將軍徐瓊為兖州刺史大將軍參軍申恬為冀州刺史徙兖州鎮須昌沈約曰武帝定河南以兖州治滑臺文帝元嘉十三年治鄒山又寄治彭城此又自彭城徙須昌也冀州鎮歴下歴下即歴城恬謨之弟也十二月魏主還平城是嵗沙州牧李寳入朝于魏魏人留之以為外都大官為李氏貴盛張本朝直遥翻太子率更令何承天撰元嘉新厯表上之更工衡翻上時掌翻下所上同以月食之衝知日所在日與月對衝光相揜而知之又以中星檢之知堯時冬至日在須女十度此以堯典日短星昴推之今在斗十七度又測景校二至差三日有餘此亦用周禮測日至之景之法也知今之南至日應在斗十三四度于是更立新法冬至徙上三日五時日之所在移舊四度又月有遲疾前厯合朔月食不在朔望月食上當有日字今皆以贏縮定其小餘以正朔望之日贏或作盈厯法有大餘小餘史記厯書曰大餘者日也小餘者月也周天三百六十五度四分度之一日日盈一度十二月而一周天嵗十二月凡三百五十四日以六除之五六三百日餘五十四日為大餘周天三百六十五度以六甲除之六六三百六十餘五為大餘小餘即四分之一未滿日之分數也其分毎滿三十二則成一日蓋竒日為大餘竒分為小餘積而成閏也詔付外詳之太史令錢樂之等奏皆如承天所上唯月有頻三大頻二小比舊法殊為乖異謂宜仍舊詔可二十二年春正月辛卯朔始行新厯初漢京房以十二律中吕上生黄鐘不滿九寸更演為六十律中讀曰仲更工衡翻下同錢樂之復演為三百六十律復扶又翻日當一管何承天立議以為上下相生三分損益其一蓋古人簡易之法易以豉翻猶如古厯周天三百六十五度四分度之一也而京房不悟謬為六十乃更設新律林鍾長六寸一釐則從中吕還得黄鍾十二旋宫聲韻無失長直亮翻中讀曰仲律厯志黄鍾律九寸三分損一下生林鍾律六寸三分林鍾益一上生太簇三分大簇損一下生南吕三分南吕益一上生姑洗三分姑洗損一下生應鍾三分應鍾益一上生㽔賓三分㽔賓損一下生大吕三分大吕益一上生夷則三分夷則損一下生夾鍾三分夾鍾益一上生無射三分無射損一下生中吕隂陽相生自黄鍾始而左旋八八為伍孟康注曰從子數至未得八下生林鍾數未至寅得八上生太簇律上下相生皆以此為率伍耦也八八為耦然月令注中吕律長六寸萬九千六百八十三分寸之萬二千九百七十四若上生黄鍾當不止九寸故孔穎達考其同異於月令疏曰十二律有上生下生冋位異位長短分寸之别故鄭注周禮太師職云其相生則以隂陽六體黄鍾初九下生林鍾之初六林鍾又上生太簇之九二太簇又下生南吕之六二南吕又上生姑洗之九三姑洗又下生應鍾之六三應鍾又上生㽔賓之九四㽔賓又上生大吕之六四大吕又下生夷則之九五夷則又上生夾鍾之六五夾鍾又下生無射之上九無射又上生中吕之上六同位者象夫妻異位者象子母所謂律娶妻而吕生子也同位象夫妻者則黄鍾之初九下生林鍾之初六同是初位故為夫婦又是律娶妻也異位為子母者謂林鍾上生太簇林鍾是初位太簇是二位故云異位為子母又是吕生子也云五下六上者鄭注云五下六上乃一終矣謂林鍾夷則南吕無射應鍾皆被子午以東之管三分減一而下生之大吕太簇夾鍾姑洗中吕㽔賓皆被子午以西之管三分益一而上生之子午皆上生應云七上而云六上者以黄鍾為諸律之首物莫之先似若無所稟生者故不數黄鍾也其實十二律終于中吕反歸黄鍾生于中吕三分益一大略得應黄鍾九寸之數也律厯志云黄鍾為天統林鍾為地統太簇為人統故數整餘律則各有分數随其相生之次毎辰各自為宫各有五聲黄鍾為第一宫下生林鍾為徵上生太簇為商下生南吕為羽上生姑洗為角林鍾為第二宫上生太簇為徵下生南吕為商上生姑洗為羽下生應鍾為角太簇為第三宫下生南吕為徵上生姑洗為商下生應鍾為羽上生㽔賓為角南吕為第四宫上生姑洗為徵下生應鍾為商上生㽔賓為羽下生大吕為角姑洗為第五宫下生應鍾為徵上生㽔賓為商上生大吕為羽下生夷則為角應鍾為第六宫上生㽔賓為徵上恐當作下上生大吕為商下生夷則為羽上生夾鍾為角㽔賓為第七宫上生大吕為徵下生夷則為商上生夾鍾為羽下生無射為角大吕為第八宫下生夷則為徵上生夾鍾為商下生無射為羽上生中吕為角夷則為第九宫上生夾鍾為徵下生無射為商上生中吕為羽上生黄鍾為角夾鍾為第十宫下生無射為徵上生中吕為商上生黄鍾為羽下生林鍾為角無射為第十一宫上生中吕為徵上生黄鍾為商下生林鍾為羽下生太簇為角中吕為第十二宫上生黄鍾為徵下生林鍾為商上生太簇為羽下生南吕為角是十二宫各有五聲凡六十聲京房六十律相生之法以上生下皆三生二以下生上皆三生四陽下生隂隂上生陽終于中吕而十二律畢矣中吕上生執始執始下生去滅上下相生終于南事而六十律畢矣夫十二律之變至于六十猶八卦之變至于六十四也六十律之名詳見續漢書補志壬辰以武陵王駿為雍州刺史雍於用翻帝欲經略闗河故以駿鎮襄陽魏主使散騎常侍宋愔來聘散悉亶翻騎竒寄翻愔於今翻二月魏主如上黨西至吐京酈道元曰吐京即漢西河郡吐軍縣夷夏俗音訛也後魏置吐京郡隋隰州石樓縣魏吐京郡地討徙叛胡出配郡縣甲戌立皇子褘為東海王昶為義陽王褘吁韋翻昶丑兩翻三月庚申魏主還宫魏詔諸疑獄皆付中書以經義量决量音良夏四月庚戌魏主遣征西大將軍髙凉王那等擊吐谷渾王慕利延於白蘭秦州刺史代人封敕文安逺將軍乙烏頭擊慕利延兄子什歸于枹罕枹音膚河西之亡也鄯善人以其地與魏鄰大懼鄯上扇翻曰通其使人知我國虛實取亡必速乃閉斷魏道閉斷魏通西域之道也使疏吏翻下同斷丁管翻使者徃來輙鈔刼之鈔楚交翻由是西域不通者數年魏主使散騎常侍萬度歸𤼵凉州以西兵擊鄯善六月壬辰魏主北廵帝謀伐魏罷南豫州入豫州以南豫州刺史南平王鑠為豫州刺史髙祖永初二年分淮東之地為南豫州治歴陽淮西為豫州或治壽陽或治汝南鑠式約翻秋七月己未以尚書僕射孟顗為左僕射顗魚豈翻中護軍何尚之為右僕射武陵王駿將之鎮時縁沔諸蠻猶為寇沔彌兖翻水陸梗礙駿分軍遣撫軍中兵參軍沈慶之掩擊大破之駿至鎮蠻斷驛道斷丁管翻欲攻随郡随郡太守河東栁元景募得六七百人邀擊大破之遂平諸蠻獲七萬餘口溳山蠻㝡彊水經注云水出蔡陽縣東南大洪山山在随郡之西南竟陵之東北槃基所跨廣圓一百餘里溳水出于其山之隂時人以為溳水所導亦曰溳山溳音云沈慶之討平之獲三萬餘口徙萬餘口於建康吐谷渾什歸聞魏軍將至棄城夜遁八月丁亥封敕文入枹罕分徙其民千家還上邽留乙烏頭守枹罕枹音膚萬度歸至敦煌留輜重以輕騎五千度流沙襲鄯善壬辰鄯善王真達面縛出降度歸留軍屯守與真達詣平城敦徒門翻重直用翻騎竒寄翻降戸江翻考異曰本紀作真達興今從西域傳西域復通復扶又翻魏主如隂山之北𤼵諸州兵三分之一各於其州戒嚴以須後命須待也徙諸種雜民五千餘家於北邉種章勇翻令就北畜牧以餌柔然壬寅魏髙凉王那軍至寧頭城寧頭城當在白蓢東北吐谷渾王慕利延擁其部落西度流沙吐谷渾慕璝之子被囊逆戰那擊破之被囊遁走中山公杜豐帥精騎追之璝古回翻帥讀曰率度三危至雪山酈道元曰三危山在敦煌縣南生擒被囊及吐谷渾什歸乞伏熾盤之子成龍皆送平城乞伏成龍蓋因赫連定之敗没于吐谷渾慕利延遂西入于闐闐徒賢翻又徒見翻殺其王據其地死者數萬人九月癸酉上餞衡陽王義季于武帳岡餞義季徃鎮南兖杜佑曰武帳岡在廣莫門外宣武場設行宫殿便坐於其上因名上將行敕諸子且勿食至㑹所設饌日旰不至饌雛戀翻又雛晥翻旰古案翻有飢色上乃謂曰汝曹少長豐佚少詩沼翻長知雨翻不見百姓艱難今使汝曹識有飢苦知以節儉御物耳裴子野論曰善乎太祖之訓也夫侈興于有餘儉生于不足欲其隠約莫若貧賤習其險艱利以任使達其情偽易以躬臨易以䜴翻太祖若能率此訓也難其志操卑其禮秩教成徳立然後授以政事則無怠無荒可播之於九服矣周制九服侯服甸服男服采服衛服蠻服夷服鎮服藩服毎服五百里謂之服者責以服事天子為職也髙祖思固本枝崇樹襁褓後世遵守迭據方岳謂義真義康義恭義宣皆迭居方面襁居兩翻褓音保及乎泰始之初升明之季絶咽於衾衽者動數十人謂明帝殺孝武諸子而宋齊禪代之際蕭氏夷劉氏也咽音煙國之存亡既不是繫早肆民上左傳晉師曠曰天之愛民甚矣豈其使一人肆於民上非善誨也魏民間訛言滅魏者吳盧水胡蓋吳聚衆反於杏城蓋吳蓋安定盧水胡種而分居杏城蓋古盍翻諸衆胡爭應之種章勇翻有衆十餘萬遣其黨趙綰來上表自歸冬十月戊子長安鎮副將拓䟦紇帥衆討吳紇敗死上時掌翻將即亮翻紇下没翻吳衆愈盛民皆渡渭奔南山長安南山也魏主𤼵髙平敕勒騎赴長安命將軍叔孫㧞領攝并秦雍三州兵屯渭北騎竒寄翻雍於用翻十一月魏𤼵冀州民造浮橋於碻磝津蓋吳遣别部帥白廣平帥所類翻西掠新平安定諸胡皆聚衆應之又分兵東掠臨晉巴東巴當作已將軍章直擊破之溺死于河者三萬餘人溺奴狄翻吳又遣兵西掠至長安將軍叔孫㧞與戰於渭北大破之斬首三萬餘級河東蜀薛永宗聚衆以應吳蜀人遷居河東者謂之河東蜀居綘郡者謂之綘蜀居闗中赤水者謂之赤水蜀襲擊聞喜聞喜縣屬河東郡春秋時晉武公所居之曲沃也秦改為左邑漢武帝於此聞南越破改曰聞喜後魏分屬綘郡聞喜縣無兵仗令憂惶無計縣人裴駿帥厲鄉豪擊之帥讀曰率永宗引去魏主命薛謹之子拔糾合宗鄉宗謂薛之宗族鄉謂鄉人壁於河際以斷二寇徃來之路二寇謂薛永宗蓋吳斷丁管翻庚午魏主使殿中尚書拓跋處直等將二萬騎討薛永宗殿中尚書乙拔將三萬騎討蓋吳晉置殿中尚書與吏部五兵田曹度支左民為六曹杜佑曰後魏初有殿中樂部駕部南部北部五尚書殿中掌殿内兵馬倉庫樂部掌伎樂及角使伍伯駕部掌牛馬驢騾南部掌南邉諸州郡北部掌北邉諸州郡魏書官氏志内入諸姓乙弗氏改為乙氏處昌吕翻將即亮翻騎竒寄翻下同西平公寇提將萬騎討白廣平官氏志内入諸姓若口引氏改為寇氏吳自號天台王署置百官辛未魏主還宫自隂山還也魏選六州驍騎二萬六州冀定相并幽平驍堅堯翻使永昌王仁髙凉王那分將之為二道掠淮泗以北徙青徐之民以實河北癸未魏主西廵初魯國孔熙先博學文史兼通數術有縱横才志縱子容翻為貟外散騎侍郎不為時所知憤憤不得志父黙之為廣州刺史以贓獲罪大將軍彭城王義康為救解得免為于偽翻及義康遷豫章義康遷見上卷十七年熙先密懐報効且以為天文圖䜟䜟楚譛翻帝必以非道晏駕由骨肉相殘江州應出天子以范曄志意不滿欲引與同謀而熙先素不為曄所重太子中舍人謝綜曄之甥也大子中舍人晉咸寧四年置以舍人才學美者為之與中庶子共掌文翰職如黄門侍郎在中庶子下洗馬上熙先傾身事之綜引熙先與曄相識熙先家饒於財數與曄博故為拙行以物輸之數所角翻凡博弈以計數誘人謂之行拙行者偽為不能也行下孟翻曄既利其財又愛其文藝由是情好欵洽熙先乃從容説曄曰大將軍英斷聰敏好呼到翻從于容翻斷丁亂翻大將軍謂義康人神攸屬屬之欲翻失職南垂謂遷豫章也天下憤怨小人受先君遺命以死報大將軍之徳頃人情騷動天文舛錯此所謂時運之至不可推移者也若順天人之心結英豪之士表裏相應𤼵於肘腋腋音亦然後誅除異我崇奉明聖號令天下誰敢不從小人請以七尺之軀三寸之舌立功立事而歸諸君子丈人以為何如曄甚愕然熙先曰昔毛玠竭節於魏武張温畢議於孫權彼二人者皆國之俊乂豈言行玷缺然後至於禍辱哉皆以㢘直勁正不得久容毛玠見六十七卷漢獻帝建安二十一年張温事見六十九卷魏文帝黄初五年行下孟翻下内行同玷多忝翻丈人之於本朝不深於二主人間雅譽過于兩臣䜛夫側目為日久矣比肩競逐庸可遂乎言與時貴比肩競逐榮利所在衆所共爭將不得遂其志也朝直遥翻近者殷鐡一言而劉班碎首見上卷十七年彼豈父兄之讐百世之怨乎所爭不過榮名勢利先後之間耳及其末也唯恐陷之不深發之不早戮及百口猶曰未厭是可為寒心悼懼豈書籍逺事也哉今建大勲奉賢哲圖難于易易以䜴翻以安易危享厚利收鴻名一旦苞舉而有之豈可棄置而不取哉曄猶疑未决熙先曰又有過於此者愚則未敢道耳曄曰何謂也熈先曰丈人弈葉清通曄曽祖汪祖寧父泰皆冇名行而不得連姻帝室人以犬豕相遇而丈人曾不恥之欲為之死不亦惑乎為于偽翻曄門無内行故熈先以此激之曄黙然不應反意乃决曄與沈演之並為帝所知曄先至必待演之俱入演之先至嘗獨被引被皮義翻引引見也曄以此為怨曄累經義康府佐中間獲罪于義康謝綜及父述皆為義康所厚綜弟約娶義康女綜為義康記室參軍自豫章還申義康意于曄求解晚隙復敦徃好復扶又翻好呼到翻大將軍府史仲承祖有寵于義康聞熈先有謀密相結納丹楊尹徐湛之素為義康所愛承祖因此結事湛之告以密計道人法略尼法静皆感義康舊恩並與熈先徃來法静妹夫許曜領隊在臺江南謂禁中為臺許為内應法静之豫章熈先付以牋書陳説圖䜟於是密相署置及素所不善者並入死目條分名目凡素所不善者皆欲置之死地熈先又使弟休先作檄文稱賊臣趙伯符肆兵犯蹕禍流儲宰趙伯符時為領軍將軍故欲以弑逆之罪歸之言禍流儲宰蓋欲併殺太子劭湛之曄等投命奮戈即日斬伯符首及其黨與今遣護軍將軍臧質奉璽綬迎彭城王正位辰極北辰為天極故以帝位為辰極璽斯氏翻綬音受熈先以為舉大事宜須以義康之㫖諭衆曄又詐作義康與湛之書令誅君側之惡宣示同黨帝之燕武帳岡也曄等謀以其日作亂許曜侍帝扣刀目曄拔刀微出削為扣刀曄不敢仰視俄而座散徐湛之恐事不濟密以其謀白帝帝使湛之具探取本末探吐南翻得其檄書選署姓名上之上時掌翻帝乃命有司收掩窮治治直之翻其夜呼曄置客省客省凡四方之客入見者居之屬典客令先於外收綜及熈先兄弟皆款服帝遣使詰問曄曄猶隠拒詰去吉翻熈先聞之笑曰凡處分符檄書疏皆范所造處昌吕翻分扶問翻云何於今方作如此抵蹋邪帝以曄墨迹示之乃具陳本末明日仗士送付廷尉仗士士之執兵仗者熈先望風吐款辭氣不橈橈奴敎翻上竒其才遣人慰勉之曰以卿之才而滯于集書省散騎侍郎集書省官也蕭子顯曰自散騎侍郎及通直貟外給事中奉朝請駙馬都尉皆集書省職也理應有異志此乃我負卿也又責前吏部尚書何尚之曰使孔熈先年將三十作散騎郎那不作賊熈先於獄中上書謝恩且陳圖䜟深戒上以骨肉之禍䜟楚譛翻曰願勿遺弃存之中書若囚死之後或可追録庶九泉之下少塞舋責少詩沼翻塞悉則翻舋許覲翻曄在獄為詩曰雖無嵇生琴庶同夏矦色嵇康為晉文王所殺臨命顧視日影索琴而彈夏矦𤣥為晉景王所殺及赴東市顔色不變曄本意謂入獄即死而上窮治其獄遂經二旬曄更有生望獄吏戲之曰外傳詹事或當長繫曄聞之驚喜綜熈先笑之曰詹事疇昔攘袂瞋目躍馬顧盼自以為一世之雄今擾攘紛紜畏死乃爾曄為太子詹事故稱之瞋七人翻設令賜以性命人臣圖主何顔可以生存十二月乙未曄綜熈先及其子弟黨與皆伏誅曄母至市涕泣責曄以手擊曄頸曄顔色不怍怍疾各翻慙也妺及妓妾來别曄悲涕流漣妓渠綺翻漣泣下貌綜曰舅殊不及夏矦色曄收淚而止謝約不豫逆謀見兄綜與熈先遊常諌之曰此人輕事好竒不近於道果鋭無檢言無檢束也好呼到翻近其靳翻未可與狎綜不從而敗綜母以子弟自蹈逆亂獨不出視曄語綜曰姊今不來勝人多矣收籍曄家樂噐服玩並皆珍麗妓妾不勝珠翠語牛倨翻不勝音升母居止單陋唯有一㕑盛樵薪盛時征翻弟子冬無被叔父單布衣裴子野論曰夫有逸羣之才必思冲天之據冲與翀同上飛也古語云一飛冲天蓋俗之量則憤常均之下常均猶言平常也其能守之以道將之以禮殆為鮮乎鮮息淺翻劉𢎞仁范蔚宗劉湛字𢎞仁范曄字蔚宗蔚於勿翻皆忸志而貪權忸女九翻驕也玩也狎也矜才以徇逆累葉風素一朝而隕嚮之所謂智能翻為亡身之具矣徐湛之所陳多不盡為曄等辭所連引上赦不問臧質熹之子也臧熹臧燾之弟質在戚里於帝為中表之親先為徐兖二州刺史與曄厚善曄敗以為義興太守有司奏削彭城王義康爵收付廷尉治罪治直之翻丁酉詔免義康及其男女皆為庶人絶屬籍徙付安成郡以寧朔將軍沈邵為安成相領兵防守相息亮翻邵璞之兄也義康在安成讀書見淮南厲王長事廢書歎曰自古有此我乃不知得罪為宜也庚戌以前豫州刺史趙伯符為䕶軍將軍伯符孝穆皇后之弟子也髙祖母趙氏追諡孝穆皇后后弟倫之初江左二郊無樂宗廟雖有登歌亦無二舞是嵗南郊始設登歌禮記郊特牲曰奠酬而工升歌發徳也歌者在上匏竹在下貴人聲也二舞文舞武舞也魏安南平南府移書兖州安南平南二將軍府以南國僑置諸州多濫北境名號又欲遊獵具區周官職方氏揚州藪曰具區師古曰具區在吳兖州答移曰必若因土立州則彼立徐揚豈有其地復知欲遊獵具區復扶又翻觀化南國開館飾邸則有司存呼韓入漢厥儀未泯饋餼之秩毎存豐厚饋餉也饋餼餉客以生食及芻米也詩傳曰牲腥曰餼餼許既翻二十三年春正月庚申尚書左僕射孟顗罷戊辰魏主軍至東雍州雍於用翻臨薛永宗壘崔浩曰永宗未知陛下自來衆心縱弛今北風迅疾宜急擊之魏主從之庚午圍其壘永宗出戰大敗與家人皆赴汾水死據南史薛安都傳諸薛家于河東汾隂世為強族其族人安都先據𢎞農棄城來奔辛未魏主南如汾隂濟河至洛水橋此華隂之洛水史記秦孝公之元年所謂魏築長城自鄭濵洛者也聞蓋吳在長安北帝以渭北地無穀草欲渡渭南循渭而西以問崔浩對曰夫擊蛇者先擊其首首破則尾不能掉掉徒弔翻今蓋吳營去此六十里輕騎趨之騎竒寄翻趨七喻翻一日可到到則破之必矣破吳南向長安亦不過一日一日之乏未至有傷若從南道則吳徐入北山猝未可平帝不從自渭南向長安庚辰至戲水戲許宜翻吳衆聞之悉散入北地山地字衍軍無所獲帝悔之二月丙戌帝至長安丙申如􅉦厔􅉦厔音舟窒歴陳倉還如雍城雍於用翻下同所過誅民夷與蓋吳通謀者乙拔等諸軍大破蓋吳于杏城吳復遣使上表求援使疏吏翻下以義推詔以吳為都督闗隴諸軍事雍州刺史北地公使雍梁二州𤼵兵屯境上為吳聲援遣使賜吳印一百二十一紐使吳随宜假授初林邑王范陽邁雖遣使入貢而寇盜不絶使貢亦薄陋帝遣交州刺史檀和之討之南陽宗慤家世儒素慤叔父少文髙尚不仕諸子羣從皆愛好墳典慤獨好武事好呼到翻常言願乗長風破萬里浪及和之伐林邑慤自奮請從軍詔以慤為振武將軍和之遣慤為前鋒陽邁聞軍出遣使請還所掠日南民輸金一萬斤銀十萬斤帝詔和之若陽邁果有款誠亦許其歸順和之至朱梧戍朱梧縣自漢以來屬日南郡時于其地置戍宋白曰漢日南郡治朱吾又南行四百餘里至林邑國遣府戸曹參軍姜仲基等詣陽邁府者交州刺史府陽邁執之和之乃進軍圍林邑將范扶龍於區粟城水經注盧容水出日南盧容縣區粟城南髙山東逕區粟城北林邑兵噐戰具悉在城中將即亮翻陽邁遣其將范毗沙達救之宗慤潛兵迎擊毗沙達破之魏主與崔浩皆信重寇謙之奉其道浩素不喜佛法喜許記翻每言於魏主以為佛法虚誕為世費害宜悉除之及魏主討蓋吳至長安入佛寺沙門飲從官酒從官入其室飲於鴆翻從才用翻見大有兵噐出以白帝帝怒曰此非沙門所用必與蓋吳通謀欲為亂耳命有司案誅闔寺沙門閲其財産大得釀具及州郡牧守富人所寄藏物以萬計守式又翻又為窟室以匿婦女窟苦骨翻浩因説帝悉誅天下沙門毁諸經像説輸芮翻帝從之寇謙之與浩固爭浩不從先盡誅長安沙門焚毁經像并敕留臺下四方令一用長安法魏主出征太子居守故謂平城為留臺下遐稼翻詔曰昔後漢荒君信惑邪偽以亂天常佛法自漢明帝時入中國楚王英㝡先好之至桓帝始事浮屠自古九州之中未嘗有此夸誕大言不本人情叔季之世莫不眩焉日無常主不辯白黒謂之眩由是政教不行禮義大壊九服之内鞠為丘墟鞠窮也朕承天緒欲除偽定真復羲農之治治直吏翻其一切盪除滅其蹤跡自今已後敢有事胡神及造形像泥人銅人者門誅有非常之人然後能行非常之事非朕孰能去此歴代之偽物去羌吕翻有司宣告征鎮諸軍刺史諸有浮圖形像及胡經皆擊破焚燒沙門無少長悉阮之少詩照翻長知兩翻太子晁素好佛法好呼到翻屢諌不聽乃緩宣詔書使逺近豫聞之得各為計沙門多亡匿獲免或牧藏經像唯塔廟在魏境者無復孑遺復扶又翻魏主徙長安工巧二千家於平城還至洛水分軍誅李閏叛羌太原顔白鹿私入魏境太原郡本屬并州江左以郡人南徙者僑立太原郡晉安帝義熈中土斷立太原縣屬泰山郡元嘉十年割濟南泰山為太原郡境屬青州為魏人所得將殺之詐云青州刺史杜驥使其歸誠魏人送白鹿詣平城魏主喜曰我外家也魏主母杜氏故謂驥為外家使崔浩作書與驥且命永昌王仁髙凉王那將兵迎驥攻冀州刺史申恬於歴城杜驥遣其府司馬夏矦祖歡等將兵救歴城魏人遂寇青兖冀三州至清東而還清柬清水之東也殺掠甚衆北邉騷動考異曰宋文帝紀三月索虜寇兖豫青冀刺史申恬破之魏太武紀二月永昌王仁至髙平禽劉義隆將王章略金鄉方與遷其民五千家於河北髙凉王那至濟南東平陵遷其民六千餘家於河北蓋宋魏各據奏到之月書之耳宋索虜傳又云虜破掠太原得四千餘口蓋魏人夸張其數故不同耳帝以魏寇為憂咨訪群臣御史中丞何承天上表以為凡備匈奴之䇿不過二科武夫盡征伐之謀儒生講和親之約今欲追蹤衛霍自非大田淮泗内實青徐使民有贏儲野有積穀然後發精卒十萬一舉蕩夷則不足為也若但欲遣軍追討報其侵暴則彼必輕騎奔走不肯㑹戰騎竒寄翻徒興巨費不損於彼報復之役將遂無已斯䇿之最末者也安邉固守於計為長臣竊以曹孫之霸才均智敵江淮之間不居各數百里曹孫謂曹操孫權也何者斥候之郊非耕牧之地故堅壁清野以俟其來整甲繕兵以乗其弊保民全境不出此塗要而歸之其䇿有四一曰移逺就近今青兖舊民及冀州新附在界首者三萬餘家可悉徙置大峴之南以實内地峴戸典翻二曰多築城邑以居新徙之家假其經用春夏佃牧佃讀曰田秋冬入保寇至之時一城千家堪戰之士不下二千其餘羸弱猶能登陴鼔譟足抗羣虜三萬矣羸倫為翻陴音疲三曰纂偶車牛以載糧械纂綜集也計千家之資不下五百耦牛為車五百兩兩力讓翻參合鉤連以衛其衆設使城不可固平行趨險趨七喻翻賊所不能干有急徵𤼵信宿可聚四曰計丁課仗凡戰士二千随其便能各自有仗素所服習銘刻由已還保輸之於庫出行請以自新請噐仗各自磨礪使精新弓簳利鐡民不得者官以漸充之簳古旱翻數年之内軍用粗備矣粗坐五翻近郡之師逺屯清濟近郡謂南徐州所領諸僑郡及三吳近在邦域之中者濟子禮翻功費既重嗟怨亦深以臣料之未若即用彼衆之易也易弋䜴翻今因民所利導而帥之帥讀曰率兵彊而敵不戒國富而民不勞比於優復隊伍復方目翻坐食糧廩者不可同年而校矣魏金城邉固天水梁㑹與秦益雜民萬餘戸據上邽東城反攻逼西城秦益二州刺史封敕文拒却之氐羌萬餘人休官屠各二萬餘人休官屠各二種屠直於翻皆起兵應固㑹敕文擊固斬之餘衆推㑹為主與敕文相攻夏四月甲申魏主至長安丁未大赦仇池人李洪聚衆自言應王梁㑹求救於氐王楊文徳文徳曰兩雄不並立若須我者宜先殺洪㑹誘洪斬之誘音酉送首于文徳五月癸亥魏主遣安豐公閭根帥騎赴上邽帥讀曰率騎竒寄翻未至㑹弃東城走敕文先掘重塹於外重直龍翻嚴兵守之格鬭從夜至旦敕文曰賊知無生路致死於我多殺傷士卒未易克也易以豉翻乃以白虎幡宣告會衆降者赦之降戸江翻㑹衆遂潰分兵追討悉平之略陽人王元達聚衆屯松多川水經注松多水出隴山西南流逕降隴城北又西南注秦水敕文又討平之蓋吳收兵屯杏城自號秦地王聲勢復振復扶又翻魏主遣永昌王仁髙凉王那督北道諸軍討之北道諸軍謂魏兵分屯長安以北者檀和之等拔區粟斬范扶龍乗勝入象浦象浦即盧容浦盧容縣即秦象郡象林縣地故亦謂之象浦林邑王陽邁傾國來戰以具裝被象前後無際馬甲謂之其裝被皮義翻宗慤曰吾聞外國有師子威服百獸師子似虎正黄有􅐖耏尾端茸毛大如斗爾雅翼曰穆天子傳狻猊日走五百里其為物最猛雖虎豹亦畏之象至以鼻捲泥自塗數尺數數噴鼻隅立師子直摶而殺之乃製其形與象相拒象果驚走林邑兵大敗和之遂克林邑水綬注林邑國都治典冲在夀泠縣阿賁浦西去海岸四十里考異曰本紀在六月𫝊在五月當是六月賞檀和之等今從傳陽邁父子挺身走所獲未名之寳不可勝計宗慤一無所取還家之日衣櫛蕭然勝音升櫛側瑟翻梳枇總名六月癸未朔日有食之甲申魏𤼵冀相定三州兵二萬人相息亮翻屯長安南山諸谷以備蓋吳竄逸丙戌又𤼵司幽定冀四州兵十萬人築畿上塞圍魏都平城置司州於代都宋白曰唐雲州雲中郡是起上谷西至河廣縱千里廣古曠翻縱子容翻帝築北隄立𤣥武湖以其地在臺城之後故名𤣥武湖在今建康府上元縣北十里祝穆曰湖今為後軍寨築景陽山於華林園秋七月辛未以散騎常侍杜坦為青州刺史坦驥之兄也初杜預之子耽避晉亂居河西仕張氏前秦克凉州子孫始還闗中髙祖滅後秦坦兄弟從髙祖過江時江東王謝諸族方盛北人晚渡者朝廷悉以傖荒遇之傖助耕翻南人呼北人為傖荒言其自荒外來也雖復人才可施皆不得踐清塗上嘗與坦論金日磾曰恨今無復此輩人復扶又翻磾丁奚翻坦曰日磾假生今世養馬不暇豈辦見知上變色曰卿何量朝廷之薄也量音良坦曰請以臣言之臣本中華髙族晉氏䘮亂䘮息浪翻播遷凉土世業相承不殞其舊直以南度不早便以荒傖賜隔日磾胡人身為牧圉乃超登内侍齒列名賢金日磾事見二十二卷漢武帝後元二年聖朝雖復拔才臣恐未必能也上黙然八月魏髙凉王那等破蓋吳獲其二叔諸將欲送詣平城長安鎮將陸俟曰長安險固風俗豪忮將即亮翻忮支義翻狠也平時猶不可忽况承荒亂之餘乎今不斬吳則長安之變未巳也吳一身潜竄非其親信誰能獲之若停十萬之衆以追一人又非長䇿不如私許吳叔免其妻子使自追吳擒之必矣諸將咸曰今賊黨衆已散唯吳一身何所能至俟曰諸君不見毒蛇乎不斷其首猶能為害斷丁管翻吳天性凶狡今若得脱必自稱王者不死以惑愚民為患愈大諸將曰公言是也但得賊不殺而更遣之若遂徃不返將何以任其罪俟曰此罪我為諸君任之為于偽翻任音壬髙凉王那亦以俟計為然遂赦二叔與刻期而遣之及期吳叔不至諸將皆咎俟俟曰彼伺之未得其便耳必不負也後數日吳叔果以吳首來傳詣平城伺相吏翻傳知戀翻又直戀翻死考異曰宋索虜傳云屠各反吳自攻之為流矢所中吳弟吾生率衆入木面山尋皆破散今從魏書永昌王仁討吳餘黨白廣平路那羅悉平之以陸俟為内都大官㑹安定盧水胡劉超等聚衆萬餘人反魏主以俟威恩著於闗中復加俟都督秦雍二州諸軍事鎮長安復扶又翻下復選復還同謂俟曰闗中奉化日淺魏主平夏始得闗中恩信未洽吏民數為逆亂數所角翻今朕以重兵授卿則超等必同心協力據險拒守未易攻也易以豉翻若兵少則不能制賊少詩沼翻卿當自以方略取之俟乃單馬之鎮超等聞之大喜以俟為無能為也俟既至諭以成敗誘納超女與為姻戚以招之超自恃其衆猶無降意俟乃帥其帳下親徃見超誘音酉降戸江翻帥讀曰率超使人逆謂俟曰從者過三百人從才用翻當以弓馬相待不及三百人當以酒食相供俟乃將二百騎詣超將即亮翻騎竒寄翻超設備甚嚴俟縱酒盡醉而還還而宣翻又如字頃之俟復選敢死士五百人出獵復扶又翻因詣超營約曰發機當以醉為限既飲俟陽醉上馬大呼呼火故翻手斬超首士卒應聲縱擊殺傷千數遂平之魏主徴俟還為外都大官是嵗吐谷渾復還舊土去年吐谷渾西奔資治通鑑卷一百二十四
