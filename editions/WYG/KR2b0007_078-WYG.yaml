body:
  text: 資治通鑑卷七十八宋司馬光撰胡三省音註魏紀十起𤣥黓敦牂盡閼逢涒灘凡三年涒音暾元皇帝下景元三年秋八月乙酉吳主立皇后朱氏朱公主之女也戊子立子􅓣為太子􅓣烏關翻據吳志吳主休為四子作名字􅓣音湖水灣澳之灣非先有此音也漢大将軍姜維将出軍右車騎将軍廖化曰兵不戢必自焚伯約之謂也左傳魯襄仲曰兵猶火也不戢将自焚姜維字伯約廖力教翻今力弔翻智不出敵而力小於宼用之無厭将何以存謂較智則不出于敵人之上而較力則又弱小也厭於鹽翻冬十月維入宼洮陽洮陽洮水之陽也洮水之隂魏不置郡縣維渡洮而攻之也沙州記曰嵹城東北三百里有曾城臨洮水曰洮陽城杜佑曰臨洮郡城本洮陽城臨洮水洮土刀翻鄧艾與戰於侯和破之維􅅲住沓中水經注洮水逕洮陽城又東逕共和山南城在四山中又東逕迷和城北意侯和即此地也沓中在諸羗中即沙漒之地晉張駿據河西因前趙之亂收河南地至于狄道置武街石門侯和漒川甘松五屯䕶軍與後趙分境乞伏熾盤攻漒川師次沓中則侯和之地在塞内沓中之地在羗中明矣初維以羈旅依漢維降漢見七十一卷明帝太和元年身受重任興兵累年功績不立黄皓用事於中與右大将軍閻宇親善隂欲廢維樹宇維知之言於漢主曰皓姦巧專恣将敗國家請殺之敗補邁翻漢主曰皓趨走小臣耳徃董允每切齒事見七十四卷邵陵厲公正始六年吾常恨之君何足介意維見皓枝附葉連懼於失言遜辭而出漢主敕皓詣維陳謝維由是自疑懼此維未出洮陽以前事也返自洮陽因求種麥沓中不敢歸成都司馬昭因是决計絆維於沓中而伐蜀吳主以濮陽興為丞相廷尉丁密光禄勲孟宗為左右御史大夫漢成帝綏和元年罷御史大夫置大司空世祖中興因之獻帝建安十三年罷司空復置御史大夫未嘗分左右也蓋吳分之初興為㑹稽太守㑹工外翻守式又翻吳主在㑹稽興遇之厚左将軍張布嘗為㑹稽王左右督将吳主休先封琅邪王徙居㑹稽自㑹稽入立未嘗封㑹稽王也㑹稽當作琅邪将即亮翻故吳主即位二人皆貴寵用事布典宫省興關軍國以佞巧更相表裏更工衡翻吳人失望吳主喜讀書喜許記翻欲與博士祭酒韋昭博士盛冲講論前漢五經博士有僕射一人東漢轉為祭酒胡廣曰官名祭酒皆一位之元長也古禮賓客得主人饌老者一人舉酒以祭於地舊説以為示有先沈約志曰吳王濞為劉氏祭酒夫祭祀以酒為本長者主之故以祭酒為稱漢侍中魏散騎常侍高功者並為祭酒公府祭酒漢末有之張布以昭冲切直恐其入侍言已隂過固諫止之吳主曰孤之渉學羣書畧徧但欲與昭等講習舊聞亦何所損君特當恐昭等道臣下姦慝故不欲令入耳如此之事孤已自備之不須昭等然後乃解也布惶恐陳謝且言懼妨政事吳主曰王務學業其流各異不相妨也王務猶言王事也此無所為非而君以為不宜是以孤有所及耳不圖君今日在事更行此於孤也良甚不取布拜表叩頭據陳夀志自孤之渉學已下皆詔答之語布得詔惶恐以表陳謝重自序述吳主又靣答之自王務學業以下皆靣答之語也所謂今日在事更行此於孤蓋比之孫綝以綝擅權之時不使吳主親近儒生也於是布拜叩頭未嘗再上表也此表字衍在事者在官任事也吳主曰聊相開悟耳何至叩頭乎如君之忠誠逺近所知吾今日之巍巍皆君之功也詩云靡不有初鮮克有終詩大雅蕩之辭鮮音息淺翻終之實難君其終之然吳主恐布疑懼卒如布意卒音子恤翻廢其講業不復使昭等入復扶又翻譙郡嵇康晉書曰康之先姓奚㑹稽上虞人以避怨徙譙郡銍縣銍有嵇山家於其側因以命氏文辭壮麗好言老荘而尚竒任俠俠戶頰翻與陳留阮籍籍兄子咸姓譜殷有阮國在岐渭之間周詩有侵阮徂共之辭子孫以國為姓後漢有已吾令阮敦河内山濤河南向秀向式亮翻琅邪王戎沛國劉伶特相友善號竹林七賢皆崇尚虚無輕蔑禮法縱酒昏酣遺落世事阮籍為歩兵校尉其母卒籍方與人圍碁對者求止籍留與决賭與决勝負也既而飲酒二斗舉聲一號吐血數升毁瘠骨立骨立者言其瘠甚身肉俱消唯骨立也號戸刀翻吐土故翻居䘮飲酒無異平日司𨽻校尉何曽惡之惡烏路翻靣質籍於司馬昭座質正也靣以正義責之也曰卿縱情背禮敗俗之人今忠賢執政綜核名實若卿之曹不可長也背蒲妹翻敗補邁翻長知兩翻因謂昭曰公方以孝治天下治直之翻而聽阮籍以重哀飲酒食肉於公座何以訓人宜擯之四裔無令汚染華夏汚烏故翻昭愛籍才常擁䕶之昭之讓九錫也籍代公卿為勸進牋辭甚清壮故昭愛其才曾䕫之子也何䕫見六十三卷漢獻帝建安五年阮咸素幸姑婢姑将婢去咸方對客遽借客馬追之累騎而還累重也兩人共馬謂之累騎還音旋又如字劉伶嗜酒常乘鹿車賢曰鹿車言其小僅可容鹿也攜一壺酒使人荷鍤隨之荷下可翻鍤側洽翻鍫也曰死便埋我當時士大夫皆以為賢爭慕效之謂之放逹鍾㑹方有寵於司馬昭聞嵇康名而造之造七到翻康箕踞而鍜康性巧而好鍜鍜都玩翻小冶也不為之禮㑹将去康曰何所聞而來何所見而去㑹曰聞所聞而來見所見而去遂深衘之山濤為吏部郎魏尚書郎有二十三員吏部其一也舉康自代康與濤書自説不堪流俗而非薄湯武昭聞而怒之湯武革命而康非薄之故昭聞而怒康與東平呂安親善安兄巽誣安不孝康為證其不然為于偽翻㑹因譖康嘗欲助毋丘儉言毋丘儉反而康欲助之毋音無且安康有盛名於世而言論放蕩害時亂教宜因此除之昭遂殺安及康康嘗詣隱者汲郡孫登晉泰始二年始分河内為汲郡史追書也登曰子才多識寡難乎免於今之世矣司馬昭患姜維數為宼官騎路遺求為刺客入蜀官騎騶騎也數所角翻騎竒寄翻從事中郎荀朂曰明公為天下宰宜杖正義以伐違貳違離也背也貳攜貳也兩屬也而以刺客除賊非所以刑于四海也毛萇曰刑法也韓嬰曰刑正也昭善之朂爽之曾孫也荀爽淑之子也漢末為公昭欲大舉伐漢朝臣多以為不可獨司𨽻校尉鍾㑹勸之昭諭衆曰自定夀春以來息役六年治兵繕甲以擬二虜治直之翻今吳地廣大而下濕攻之用功差難不如先定巴蜀三年之後因順流之埶水陸並進此滅虢取虞之埶也春秋晉獻公滅虢因以滅虞此言滅蜀乘勢可以滅吳也計蜀戰士九萬居守成都及備他境不下四萬然則餘衆不過五萬今絆姜維於沓中絆博漫翻繫足曰絆使不得東顧直指駱谷出其空虚之地以襲漢中以劉禪之闇而邉城外破士女内震其亡可知也乃以鍾㑹為鎮西将軍都督關中征西将軍鄧艾以為蜀未有釁屢陳異議善用兵者觀釁而動此艾所以陳異議也昭使主簿師纂為艾司馬以諭之姓譜師古者掌樂之官因以為氏艾乃奉命姜維表漢主聞鍾㑹治兵關中欲規進取宜並遣左右車騎張翼廖化時張翼為左車騎将軍廖化為右車騎将軍督諸軍分䕶陽安關口陽安關口意即陽平關也及隂平之橋頭杜佑曰隂平橋頭在文州界以防未然黄皓信巫鬼謂敵終不自致致至也又請也送也啓漢主寝其事羣臣莫知四年春正月復命司馬昭進爵位如前如元年之詔也復扶又翻又辭不受吳交趾太守孫諝貪暴諝私呂翻為百姓所患㑹吳主遣察戰鄧荀至交趾裴松之曰察戰吳官號今揚都有察戰巷荀擅調孔爵三十頭送建業調徒弔翻民憚逺役因謀作亂夏五月郡吏呂興等殺諝及荀遣使來請太守及兵九真日南皆應之詔諸軍大舉伐漢遣征西将軍鄧艾督三萬餘人自狄道趣甘松沓中甘松本生羗之地張駿置甘松䕶軍乞伏國仁置甘松郡後魏時白水羗朝貢置甘松縣太和六年改置扶州隋改甘松為嘉誠縣屬同昌郡唐武徳初置松州取甘松嶺為名且其地産甘松也杜佑曰甘松嶺江水發源之地甘松山在今交川郡境今臨洮和政郡之南及合川郡之地新唐書曰甘松山在洮水之西吐谷渾居山之陽以連綴姜維雍州刺史諸葛緒督三萬餘人自祁山趣武街橋頭絶維歸路賢曰下辨縣屬武都郡今城州同谷縣舊名武街城水經注濁水逕武街城南又曰白水出臨洮縣西傾山東南逕隂平故城南又東北逕橋頭雍於用翻鍾㑹統十餘萬衆分從斜谷駱谷子午谷趣漢中斜余􅃒翻谷音浴趣七喻翻以廷尉衛瓘持節監艾㑹軍事行鎮西軍司鍾㑹時為鎮西将軍瓘既監艾㑹軍又行㑹軍司監古銜翻瓘覬之子也衛覬歴事武帝文帝明帝覬音冀㑹過幽州刺史王雄之孫戎王雄刺幽州遣勇士刺殺軻比能問計将安出戎曰道家有言為而不恃老子道經之言非成功難保之難也或以問參相國軍事平原劉實曰鍾鄧其平蜀乎實曰破蜀必矣而皆不還客問其故實笑而不荅鍾鄧之禍識者固知之矣秋八月軍發洛陽大賚将士賚來代翻賜也陳師誓衆将軍鄧敦謂蜀未可討司馬昭斬以狥漢人聞魏兵且至乃遣廖化将兵詣沓中為姜維繼援張翼董厥等詣陽安關口為諸圍外助大赦改元炎興敕諸圍皆不得戰退保漢樂二城用姜維之言也城中各有兵五千人翼厥北至隂平聞諸葛緒将向建威留住月餘待之鍾㑹率諸軍平行至漢中九月鍾㑹使前将軍李輔統萬人圍王含於樂城䕶軍荀愷圍蒋斌於漢城斌音彬将考異曰晉書文紀作部易愷今從魏志㑹徑過西趣陽安口遣人祭諸葛亮墓諸葛亮葬沔陽初漢武興督蒋舒在事無稱宋白曰武興漢武都沮縣也元和郡國志曰興州城即古武興城也蜀以處當衝要置武興督以守之無稱言其庸庸無可稱者漢朝令人代之朝直遥翻使助将軍傅僉守關口舒由是恨鍾㑹使䕶軍胡烈為前鋒攻關口舒詭謂僉曰今賊至不擊而閉城自守非良圖也僉曰受命保城惟全為功今違命出戰若䘮師負國䘮息浪翻死無益矣舒曰子以保城獲全為功我以出戰克敵為功請各行其志遂率其衆出僉謂其戰也不設備使舒果迎戰亦未可保其必勝僉何為不設備邪關城失守僉亦有罪焉舒率其衆迎降胡烈降戶江翻烈乘虚襲城僉格鬬而死僉肜之子也傅肜死事見六十九卷文帝黄初三年肜余中翻鍾㑹聞關口已下長驅而前大得庫藏積榖藏音徂浪翻鄧艾遣天水太守王頎直攻姜維營前漢天水郡後漢改曰漢陽郡魏復曰天水頎渠希翻隴西太守牽𢎞邀其前金城太守楊欣趣甘松維聞鍾㑹諸軍已入漢中引兵還欣等追躡於疆川口大戰彊川口在嵹臺山南嵹臺山即臨洮之西傾山闕駰曰彊水出隂平西北彊山一曰彊川姜維之還也鄧艾遣王頎追敗之於彊口即是地也維敗走聞諸葛緒已塞道屯橋頭塞悉則翻乃從孔函谷入北道欲出緒後緒聞之却還三十里維入北道三十餘里聞緒軍却尋還從橋頭過緒趣截維較一日不及言較遲一日遂不及維也維遂還至隂平合集士衆欲赴關城聞其已破退趣白水遇廖化張翼董厥等合兵守劒閣以拒㑹水經注小劍戍西去大劒山三十里連山絶險飛閣通衢故謂之劒閣華陽國志曰廣漢郡徳陽縣有劒閣道三十里至險祝穆曰劒門漢屬廣漢郡為葭萌縣地蜀先主以霍峻為梓潼太守有劒閣縣苻秦使徐成宼蜀攻二劒克之始有二劒之號安國元侯高柔卒冬十月漢人告急於吳甲申吳主使大将軍丁奉督諸軍向夀春将軍留平就施績於南郡議兵所向将軍丁封孫異如沔中以救漢沔中時為魏境吳兵未能至也擬其所向耳吳之巫秭歸等縣皆在江北與魏之新城接境自此行兵亦可以達沔中然亦猶激西江之水以救涸轍之魚耳詔以征蜀諸将獻㨗交至復命大将軍昭進位爵賜一如前詔復扶又翻昭乃受命始受相國晉公九錫之命昭辟任城魏舒為相國參軍任音壬初舒少時遲鈍不為鄉親所重鄉里親戚也少詩沼翻從叔父吏部郎衡有名當世從才用翻亦不知之使守水碓為碓水側寘輪碓後以横木貫輪横木之兩頭復以木長二尺許交午貫之正直碓尾木激水灌輪輪轉則交午木戞擊碓尾木而自舂不煩人力謂之水碓碓都内翻毎歎曰舒堪數百戶長謂小邑長也長知兩翻我願畢矣舒亦不以介意不為皎厲之事皎者求以暴白於世厲危行也唯太原王乂謂舒曰卿終當為台輔常振其匱乏舒受而不辭年四十餘郡舉上計掾上時掌翻掾于絹翻察孝亷宗黨以舒無學業勸令不就可以為高舒曰若試而不中中竹仲翻其負在我安可虛竊不就之高以為已榮乎於是自課百日習一經因而對䇿升第累遷後将軍鍾毓長史毓每與參佐射參佐參軍及諸佐吏毓余六翻舒常為畫籌而已射之畫籌猶投壺之釋筭也為于偽翻下徐為同後遇朋人不足以舒滿數射以兩人為朋射之有朋猶古射儀之有耦也周禮王以六耦射三侯諸侯以四耦射二侯卿大夫以三耦射一侯士以三侯射豻侯左傳魯襄公享范獻子射者三耦公臣不足取於家臣杜預注云二人為耦舒容範閒雅發無不中中竹仲翻舉坐愕然莫有敵者坐徂卧翻毓歎而謝曰吾之不足以盡卿才有如此射矣豈一事哉及為相國參軍府朝碎務未嘗見是非府朝猶言府庭也朝直遥翻見賢遍翻至於廢興大事衆人莫能斷者斷丁亂翻舒徐為籌之多出衆議之表昭深器重之癸卯立皇后卞氏昭烈将軍秉之孫也鄧艾進至隂平簡選精鋭欲與諸葛緒自江油趣成都水經注涪水出廣漢屬國剛氐道徼外東南流逕緜竹縣北又東南逕江油戍北鄧艾自隂平景谷歩道懸兵束馬入蜀逕江油廣漢者也宋白曰龍州江油郡北踰山至文州三百三十里文州漢隂平地也鄧艾自隂平行無人之地七百里至江油即此九域志龍州北至文州四百三十里元豐九域志龍州治江油縣南至綿州二百餘里緒以本受節度邀姜維西行非本詔遂引軍向白水此白水闗也賢曰在今梁州金牛縣西東北至關城百八十里與鍾㑹合欲專軍埶密白緒畏懦不進檻車徴還軍悉屬㑹姜維列營守險㑹攻之不能克糧道險逺軍食乏欲引還鄧艾上言賊已摧折宜遂乘之若從隂平由邪徑經漢徳陽亭按前漢無徳陽縣後漢志廣漢郡始有徳陽縣蓋因漢故亭而置縣也自蜀分廣漢置梓潼郡之後劒閣縣屬梓潼徳陽縣屬廣漢續漢志以為徳陽縣有劒閣今姜維守劒閣拒鍾㑹而鄧艾欲從徳陽亭趣涪則此時分為兩縣明矣然徳陽亭亦非此時徳陽縣治蓋前漢徳陽亭故處也此道即所謂隂平景谷道趣涪趣七喻翻涪音浮出劒閣西百里去成都三百餘里竒兵衝其腹心出其不意劒閣之守必還赴涪則㑹方軌而進劒閣之軍不還則應涪之兵寡矣趣七喻翻涪音浮遂自隂平行無人之地七百餘里鑿山通道造作橋閣今隆慶府隂平縣北六十里有馬閣山峻峭崚嶒極為艱險鄧艾軍行至此路不得通乃懸車束馬造作棧閣始通江油因名馬閣又自文州青塘嶺至龍州百五十里自北而南者右肩不得易所負謂之左擔路亦艾伐蜀路也據鍾㑹傳艾自漢德陽亭入江油左擔道則德陽亭蓋當馬閣山之路山谷高深至為艱險又糧運将匱瀕於危殆艾以氊自裹推轉而下推吐雷翻将士皆攀木緣崖魚貫而進山崖險陿單行相繼而進如貫魚然先登至江油江油今龍州江油縣地南至綿州二百餘里綿州古涪城也蜀守将馬邈降降戶江翻下同諸葛瞻督諸軍拒艾至涪停住不進陳夀曰涪去成都三百六十里尚書郎黄崇權之子也黄權劉璋所用先主伐吳而敗權隔在江北遂降魏屢勸瞻宜速行據險無令敵得入平地瞻猶豫未納崇再三言之至于流涕瞻不能從艾遂長驅而前擊破瞻前鋒瞻􅅲住緜竹緜竹縣屬廣漢郡今緜竹縣東北至綿州百餘里艾以書誘瞻曰若降者必表為琅邪王諸葛氏本琅邪人故以此誘之誘音酉瞻怒斬艾使列陳以待艾使䟽吏翻陳讀曰陣下同艾遣子惠唐亭侯忠出其右司馬師纂等出其左忠纂戰不利並引還曰賊未可擊艾怒曰存亡之分在此一舉何不可之有叱忠纂等将斬之忠纂馳還更戰大破斬瞻及黄崇瞻子尚歎曰父子荷國重恩荷下可翻不早斬黄皓使敗國殄民用生何為䇿馬冒陳而死杜佑曰漢州徳陽縣鄧艾破諸葛瞻於此因為京觀敗補邁翻漢人不意魏兵卒至不為城守調度卒讀曰猝調徒弔翻聞艾已入平土百姓擾擾皆迸山澤不可禁制迸北孟翻漢主使羣臣㑹議或以蜀之與吳本為與國宜可奔吳或以為南中七郡南中七郡越嶲朱提牂柯雲南興古建寧永昌也阻險斗絶易以自守易以豉翻宜可奔南光禄大夫譙周以為自古以來無寄它國為天子者若入吳國亦當臣服且治政不殊則大能吞小此數之自然也治直吏翻由此言之則魏能并吳吳不能并魏明矣等為稱臣為小孰與為大為于偽翻再辱之耻何與一辱謂今降魏一辱而已若奔吳稱臣是一辱矣與吳俱亡又将臣服於魏是為再辱且若欲犇南則當蚤為之計然後可果果决也克也今大敵已近禍敗将及羣小之心無一可保恐發足之日其變不測何至南之有乎謂衆心已離既行之後中道潰散必不能至南中或曰今艾已不逺恐不受降如之何降戶江翻下同周曰方今東吳未賓事埶不得不受受之不得不禮若陛下降魏魏不裂土以封陛下者周請身詣京都京都謂洛陽魏都晉景王諱師晉人避之率謂京師為京都蜀方議降譙周已為晉人諱矣吁以古義爭之衆人皆從周議漢主猶欲入南狐疑未决周上䟽曰南方逺夷之地平常無所供為言其民既不出税租以供上用又不出力為上有所施為猶數反叛自丞相亮以兵威偪之窮乃率從事見七十卷文帝黄初六年數所角翻今若至南外當拒敵内供服御費用張廣他無所取耗損諸夷其叛必矣漢主乃遣侍中張紹等奉璽綬以降於艾璽斯氏翻綬音受北地王諶怒曰若理窮力屈禍敗将及便當父子君臣背城一戰同死社稷以見先帝可也諶時壬翻背蒲妹翻奈何降乎漢主不聽是日諶哭於昭烈之廟先殺妻子而後自殺曾謂庸禪有子如此乎張紹等見鄧艾於雒雒縣屬廣漢郡西南至成都八十餘里艾大喜報書褒納漢主遣太僕蒋顯别敕姜維使降鍾㑹又遣尚書郎李虎送士民簿於艾戸二十八萬口九十四萬甲士十萬二千吏四萬人艾至成都城北漢主率太子諸王及羣臣六十餘人面縛輿櫬詣軍門杜預曰面縛縛手於後唯見其面也櫬棺也示将受死櫬初覲翻後主時年四十八艾持節解縳焚櫬延請相見檢御将士無得虜略綏納降附使復舊業輙依鄧禹故事承制拜漢主禪行驃騎将軍太子奉車諸王駙馬都尉漢羣司各隨高下拜為王官或領艾官屬依鄧禹承制授隗囂故事也後艾由此得罪驃匹妙翻以師纂領益州刺史隴西太守牽𢎞等領蜀中諸郡艾聞黄皓姦險收閉将殺之皓賂艾左右卒以得免卒子恤翻姜維等聞諸葛瞻敗未知漢主所嚮乃引軍東入于巴巴即巴中也鍾會進軍至涪遣胡烈等追維維至郪郪縣屬廣漢郡劉昫曰梓州飛烏縣漢郪縣地隋取飛烏山以名縣師古曰郪音妻又音千私翻得漢主敕命乃令兵悉放仗送節傳於胡烈傳株戀翻自從東道與廖化張翼董厥等同詣㑹降将士咸怒㧞刀斫石觀此則蜀之将士豈肯下人哉其主不能用之耳於是諸郡縣圍守皆被漢主敕罷兵降圍守即魏延所置漢中諸圍之守兵也鍾㑹厚待姜維等皆權還其印綬節葢漢先主以獻帝建安十九年得蜀魏文帝黄初二年即帝位傳二世四十三年而亡吳人聞蜀已亡乃罷丁奉等兵吳中書丞吳郡華覈魏有中書監令無中書丞此官盖吳置也華戶化翻覈戶革翻詣宫門上表曰伏聞成都不守臣主播越社稷傾覆失委附之土棄貢獻之國臣以草芥竊懐不寧陛下聖仁恩澤逺撫卒聞如此必􅂷哀悼臣不勝忡悵之情卒讀曰猝勝音升忡丑中翻憂也謹拜表以聞左傳楚人滅江秦伯為之降服出次不舉過數大夫諫公曰同盟滅敢不矜乎吾自懼也蜀吳之與國蜀亡岌岌乎為吳矣吳之君臣不知懼故華覈拜表以儆之魏之伐蜀也吳人或謂襄陽張悌曰司馬氏得政以來大難屢作難乃旦翻謂王凌毋丘儉諸葛誕舉兵也百姓未服今又勞力逺征敗於不暇何以能克悌曰不然曹操雖功葢中夏夏戶雅翻民畏其威而不懷其德也丕叡承之刑繁役重東西驅馳無有寧嵗司馬懿父子累有大功除其煩苛而布其平惠為之謀主而救其􅍚苦民心歸之亦已乆矣故淮南三叛而腹心不擾邵陵厲公嘉平元年王凌叛高貴鄉公正元元年毌丘儉叛甘露二年諸葛誕叛曹髦之死四方不動任賢使能各盡其心其本根固矣姦計立矣今蜀閹宦專朝朝直遥翻國無政令而玩戎黷武民勞卒敝競於外利不修守備彼彊弱不同智筭亦勝因危而伐殆無不克噫彼之得志我之憂也吳人笑其言至是乃服吳人以武陵五溪夷與蜀接界蜀亡懼其叛亂乃以越騎校尉鍾離牧領武陵太守魏已遣漢葭縣長郭純試守武陵太守率涪陵民入遷陵界沈約曰漢獻帝建安六年劉璋以涪陵縣分立丹興漢葭二縣立巴東屬國都尉後為涪陵郡遷陵縣屬武陵郡吳境也長知兩翻屯于赤沙誘動諸夷進攻酉陽赤沙葢在遷陵酉陽之間酉陽縣屬武陵郡縣在酉溪之陽劉昫曰黔州彭水縣漢酉陽縣地吳分酉陽置黔陽郡隋於郡置彭水縣尋為黔州九域志曰漢武陵郡酉陽縣古城在今辰州界杜佑曰思州治務川縣亦漢酉陽地郡中震懼牧問朝吏曰朝郡朝也朝直遥翻西蜀傾覆邉境見侵何以禦之皆對曰今二縣山險諸夷阻兵不可以軍驚擾驚擾則諸夷盤結宜以漸安可遣恩信吏宣敎慰勞勞力到翻牧曰外境内侵誑誘人民誑居况翻當及其根柢未深而撲取之柢典禮翻又下計翻撲普卜翻此救火貴速之埶也敕外趣嚴趣讀曰促嚴装也撫夷将軍高尚謂牧曰昔潘太常督兵五萬然後討五溪夷事見七十二卷明帝太和五年是時劉氏連和諸夷率化今既無徃日之援而郭純已據遷陵而明府欲以三千兵深入尚未見其利也牧曰非常之事何得循舊即帥所領晨夜進道帥讀曰率緣山險行垂二千里斬惡民懷異心者魁帥百餘人帥所類翻及其支黨凡千餘級純等散走五溪皆平十二月庚戌以司徒鄭冲為太保壬子分益州為梁州益州統蜀犍為汶山漢嘉江陽朱提越嶲牂柯梁州統漢中梓潼廣漢涪陵巴巴西巴東梁古州也言西方金剛之氣彊梁故因名焉癸丑特赦益州士民復除租税之半五年復方目翻乙夘以鄧艾為太尉增邑二萬戸鍾㑹為司徒增邑萬戸賞平蜀之功也皇太后郭氏殂鄧艾在成都頗自矜伐謂蜀士大夫諸君頼遭艾故得有今日耳如遇吳漢之徒已殄滅矣吳漢屠成都事見四十二卷漢光武建武十二年艾以書言於晉公昭曰兵有先聲而後實者漢初李左車以是説韓信艾祖其説以言於晉公司馬昭既受封錫遂書其爵今因平蜀之埶以乘吳吳人震恐席卷之時也然大舉之後将士疲勞不可便用且徐緩之留隴右兵二萬人蜀兵二萬人煑鹽興冶為軍農要用蜀有鹽井朱提出銀嚴道卭都出銅武陽南安臨卭沔陽皆出鐵漢置鹽官鐵官艾欲復其利並作舟船豫為順流之事然後發使告以利害吳必歸化可不征而定也使䟽吏翻今宜厚劉禪以致孫休封禪為扶風王錫其資財供其左右郡有董卓塢董卓築塢於扶風郿縣為之宫舍爵其子為公侯食郡内縣以顯歸命之寵開廣陵城陽以待吳人開廣陵城陽為王國以待孫休也廣陵屬徐州城陽屬青州葢魏廣陵郡治淮隂故城城陽郡治莒二郡壤界實相接也則畏威懷徳望風而從矣昭使監軍衛瓘喻艾事當須報不宜輙行艾重言曰重直用翻衘命征行奉指授之䇿元惡既服至於承制拜假以安初附謂合權宜今蜀舉衆歸命地盡南海南中之地東南帶海接于交阯東接吳㑹宜早鎮定若待國命徃復道途延引日月春秋之義大夫出疆有可以安社稷利國家專之可也春秋公羊傳之言今吳未賓埶與蜀連不可拘常以失事機兵法進不求名􅅲不避罪孫子曰将之至任不可不察也進不求名􅅲不避罪唯人是保而利於主國之寶也艾雖無古人之節終不自嫌以損國家計也鍾㑹内有異志姜維知之欲搆成擾亂乃説㑹曰聞君自淮南已來筭無遺䇿謂平諸葛誕也説輸芮翻晉道克昌皆君之力今復定蜀復扶又翻威徳振世民高其功主畏其謀欲以此安歸乎何不法陶朱公汎舟絶迹全功保身邪越大夫范蠡既與越王句踐滅吳以雪㑹稽之耻乃扁舟五湖汎海而止於陶欲絶其跡乃號曰陶朱公㑹曰君言逺矣我不能行且為今之道或未盡於此也維曰其佗則君智力之所能無煩於老夫矣言為亂也維之智固足以玩弄鍾㑹於掌股之上迫於時制於命奈之何哉由是情好歡甚好呼到翻出則同轝坐則同席㑹因鄧艾承制專事乃與衛瓘密白艾有反状㑹善效人書於劒閣要艾章表白事要一遥翻章表上之魏朝白事白之晉公皆易其言令辭指悖傲多自矜伐悖蒲内翻又蒲没翻又毁晉公昭報書手作以疑之既以怒昭又以疑艾咸熈元年是年五月始改元咸熈此猶是景元五年春正月壬辰詔以檻車徴鄧艾晉公昭恐艾不從命敕鍾㑹進軍成都又遣賈充将兵入斜谷斜昌􅃒翻谷音浴又古禄翻昭自将大軍從帝幸長安将即亮翻以諸王公皆在鄴乃以山濤為行軍司馬鎮鄴楚王彪之死盡録諸王公置鄴事見七十五卷邵陵厲公嘉平三年行軍司馬之號始此初鍾㑹以才能見任昭夫人王氏言於昭曰昭夫人王氏肅之女也生晉武帝齊王攸後謚文明皇后㑹見利忘義好為事端好呼到翻寵過必亂不可大任及㑹将伐漢西曹屬邵悌言於晉公曰自漢以來丞相有東西曹掾屬今遣鍾㑹率十餘萬衆伐蜀愚謂㑹單身無任魏制凡遣将帥皆留其家以為質任㑹單身無子弟故曰單身無任不若使餘人行也晉公笑曰我寧不知此邪蜀數為邉宼師老民疲我今伐之如指掌耳指掌言易也數所角翻而衆言蜀不可伐夫人心豫怯則智勇並竭智勇並竭而彊使之彊其兩翻適所以為敵禽耳惟鍾㑹與人意同今遣㑹伐蜀蜀必可滅滅蜀之後就如卿慮何憂其不能辦邪言㑹若為亂自能辦之也夫蜀已破亡遺民震恐不足與共圖事中國将士各自思歸不肯與同也㑹若作惡作為也惡不善也作惡作亂也所為不善也秪自滅族耳卿不須憂此慎勿使人聞也及晉公将之長安悌復曰鍾㑹所統兵五六倍於鄧艾但可敕㑹取艾不須自行晉公曰卿忘前言邪忘巫放翻而云不須行乎雖然所言不可宣也我要自當以信意待人但人不當負我耳我豈可先人生心哉先悉薦翻近日賈䕶軍問我頗疑鍾㑹不賈䕶軍賈充也時為中䕶軍不讀曰否我答言如今遣卿行寜可復疑卿邪復扶又翻賈亦無以易我語也我到長安則自了矣了辦也决也鍾㑹遣衛瓘先至成都收鄧艾㑹以瓘兵少欲令艾殺瓘因以為艾罪瓘知其意心然不可得距瓘監艾㑹軍遣之收艾是以職分使之故不可得而拒乃夜至成都檄艾所統諸将稱奉詔收艾其餘一無所問若來赴官軍爵賞如先謂復加爵賞如先平蜀時也敢有不出誅及三族比至鷄鳴比必寐翻悉來赴瓘唯艾帳内在焉平旦開門瓘乘使者車續漢志有大使車小使車諸使車大使車立乘駕駟赤帷持節者重導從賊曹車斧車督車功曹車皆兩大車伍伯璅弩十二人辟車四人從車四乘無節單導從者减半小使車不立乘冇騑赤屛泥油重絳帷導無斧車近小使車蘭輿赤轂白葢赤帷從騶騎四十人此謂追捕考案有所勑取者之所乘也諸使車皆朱班輪四輻亦衡軛徑入至艾所艾尚卧未起遂執艾父子置艾於檻車諸将圖欲刼艾整仗趣瓘營趣七喻翻瓘輕出迎之偽作表草将申明艾事詭言将申明艾無反心諸将信之而止丙子㑹至成都送艾赴京師㑹所憚惟艾艾父子既禽㑹獨統大衆威震西土遂决意謀反㑹欲使姜維将五萬人出斜谷為前驅㑹自将大衆隨其後既至長安令騎士從陸道歩兵從水道順流浮渭入河以為五日可到孟津與騎兵㑹洛陽一旦天下可定也談何容易㑹得晉公書云恐鄧艾或不就徴今遣中䕶軍賈充将歩騎萬人徑入斜谷屯樂城諸葛亮所築成固之樂城也吾自将十萬屯長安相見在近㑹得書驚呼所親語之曰但取鄧艾相國知我獨辦之謂昭知㑹之足以辦取艾之事語牛倨翻今來大重大讀曰太必覺我異矣異變也便當速發事成可得天下不成􅅲保蜀漢不失作劉備也蜀漢謂漢蜀郡漢中郡之地丁丑㑹悉請䕶軍郡守牙門騎督以上此皆從㑹軍在成都者也及蜀之故官為太后發哀於蜀朝堂明元郭太后去年殂蜀都成都有朝堂朝直遥翻矯太后遺詔使㑹起兵廢司馬昭皆班示坐上人坐徂卧翻使下議訖書版署置更使所親信代領諸軍所請羣官悉閉著益州諸曹屋中著直略翻城門宮門皆閉嚴兵圍守衛瓘詐稱􅍚篤出就外廨廨古隘翻舍也㑹信之無所復憚姜維欲使㑹盡殺北來諸将已因殺㑹盡坑魏兵復立漢主宻書與劉禪曰願陛下忍數日之辱臣欲使社稷危而復安日月幽而復明姜維之心始終為漢千載之下炳炳如丹陳夀孫盛干寳之譏貶皆非也㑹欲從維言誅諸将猶預未决㑹帳下督丘建風俗通丘魯左丘明之後又云齊太公封於營丘支孫以地為氏本屬胡烈㑹愛信之建愍烈獨坐啓㑹使聽内一親兵出取飲食諸牙門隨例各内一人烈紿語親兵及疏與子淵曰丘建宻説消息㑹已作大坑白棓數千紿徒亥翻語牛倨翻棓歩項翻欲悉呼外兵入人賜白㡊幍魏武帝所製状如弁缺四角幍苦洽翻拜散将将即亮翻以次棓殺内坑中諸牙門親兵亦咸説此語一夜轉相告皆徧己夘日中胡淵率其父兵雷鼓出門雷盧對翻諸軍不期皆鼓譟而出曾無督促之者而爭先赴城時㑹方給姜維鎧杖杖與仗同直亮翻白外有匈匈聲似失火者匈許容翻又許勇翻毛晃曰匈匈喧擾之聲有頃白兵走向城㑹驚謂維曰兵來似欲作惡當云何維曰但當擊之耳㑹遣兵悉殺所閉諸牙門郡守内人共舉机以柱門内人謂㑹所閉在屋内者机舉綺翻机案也兵斫門不能破斯須城外倚梯登城斯此也須待也言其問無多時於此可待也或燒城屋蟻附亂進矢下如雨牙門郡守各緣屋出與其軍士相得姜維率㑹左右戰手殺五六人衆格斬維爭前殺㑹考異曰衛瓘𫝊曰㑹留瓘謀議乃書版云欲殺胡烈等舉以示瓘不許因相疑貳瓘如厠見胡烈故給使使宣語三軍言㑹反㑹逼瓘定議經宿不眠各横刀膝上在外諸軍已潛欲攻㑹瓘既不出未敢先發㑹使瓘慰勞諸軍瓘便下殿㑹悔遣之使呼瓘瓘辭眩􅍚動詐仆地比出閣數十信追之瓘至外廨服鹽湯大吐㑹遣所親人及醫視之皆言不起㑹由是無所憚及暮門閉瓘作檄宣告諸軍並已唱義陵旦共攻㑹殺之常璩華陽國志曰㑹命諸将發䘮因欲誅之諸将半入而南安太守胡烈等知其謀燒成都東門以襲殺㑹及維今從魏志又世語曰維死時見剖膽如斗大如斗非身所能容恐當作升㑹将士死者數百人殺漢太子璿及姜維妻子軍衆鈔略死䘮狼籍璿從宣翻鈔楚交翻衛瓘部分諸将數日乃定分扶問翻鄧艾本營将士追出艾於檻車迎還衛瓘自以與㑹共䧟艾恐其為變乃遣䕶軍田續等将兵襲艾遇於緜竹西斬艾父子艾之入江油也田續不進艾欲斬續既而捨之及瓘遣續謂曰可以報江油之辱矣鎮西長史杜預言於衆曰伯玉其不免乎衛瓘行鎮西軍司而杜預為鎮西長史則為同僚而軍事則瓘任之也瓘字伯玉身為名士位望已高既無徳音又不御下以正謂激田續使報鄧艾而行其私也将何以堪其責乎瓘聞之不候駕而謝預預恕之子也杜恕見七十三卷明帝景初元年鄧艾餘子在洛陽者悉伏誅徙其妻及孫於西城西城縣屬魏興郡為晉武帝叙艾孫灼張本鍾㑹兄毓嘗密言於晉公曰㑹挾術難保不可專任及㑹反毓已卒卒子恤翻晉公思鍾繇之勲與毓之賢鍾繇有定關中之功特原毓子峻辿官爵如故裴松之曰辿勑連翻㑹功曹向雄收葬㑹尸晉公召而責之曰徃者王經之死卿哭於東市而我不問事見上卷景元元年鍾㑹躬為叛逆又輙收葬若復相容當如王法何復扶又翻雄曰昔先王掩骼埋胔仁流朽骨記月令孟春之月掩骼埋胔鄭𤣥注曰骨枯曰骼肉腐曰胔陸徳明曰露骨曰骼有肉曰胔骼江百翻胔才賜翻周文王澤及朽骨當時豈先卜其功罪而後收葬哉今王誅既加於法已備雄感義收葬敎亦無闕法立于上敎𢎞于下以此訓物不亦可乎何必使雄背死違生以立于世背蒲妹翻明公讐對枯骨言㑹已誅晉公復以枯骨為讐對不令收葬捐之中野豈仁賢之度哉晉公悦與宴談而遣之二月丙辰車駕還洛陽庚申葬明元皇后初劉禪使巴東太守襄陽羅憲将兵二千人守永安姓譜羅本顓頊末𦙍受封於羅國今房州也為楚所滅子孫以為氏譙周巴記曰漢獻帝初平六年益州司馬趙韙建議分巴郡諸縣漢安以下為永寜郡建安六年劉璋改永寜為巴東郡治魚復縣蜀先主章武二年改魚復曰永安聞成都敗吏民驚擾憲斬稱成都亂者一人百姓乃定及得禪手敕乃帥所統臨于都亭三日帥讀曰率都亭永安之都亭也臨力鴆翻吳聞蜀敗起兵西上上時掌翻外託救援内欲襲憲憲曰本朝傾覆朝直遥翻吳為唇齒不恤我難而背盟徼利難乃旦翻徼一遥翻不義甚矣且漢已亡吳何得久我寜能為吳降虜乎降戶江翻保城繕甲告誓将士厲以節義莫不憤激吳人聞鍾鄧敗百城無主有兼蜀之志而巴東固守兵不得過乃使撫軍歩協率衆而西協歩隲子吳以為撫軍将軍憲力弱不能禦遣參軍楊宗突圍北出告急於安東将軍陳騫又送文武印綬任子詣晉公協攻永安憲與戰大破之吳主怒復遣鎮軍陸抗等帥衆三萬人增憲之圍時吳以陸抗為鎮軍将軍都督西陵帥讀曰率三月丁丑以司空王祥為太尉征北将軍何曾為司徒左僕射荀顗為司空顗魚豈翻己夘進晉公爵為王增封十郡高貴鄉公甘露三年晉公始封八郡帝景元之三年加封司州之𢎞農雍州之馮翊凡十郡今又増封十郡凡二十郡王祥何曾荀顗共詣晉王顗魚豈翻顗謂祥曰相王尊重何侯與一朝之臣何侯謂何曾一朝之臣謂舉魏朝之臣也朝直遥翻下同皆已盡敬今日便當相率而拜無所疑也祥曰相國雖尊要是魏之宰相吾等魏之三公王公相去一階而已安有天子三公可輙拜人者損魏朝之望虧晉王之徳君子愛人以禮我不為也及入顗遂拜而祥獨長揖王謂祥曰今日然後知君見顧之重也劉禪舉家東遷洛陽時擾攘倉猝禪之大臣無從行者姜維既死張翼廖化董厥必亦死於亂兵矣惟祕書令郤正及殿中督汝南張通捨妻子單身隨禪禪頼正相導宜適舉動無闕宜當也適亦當也禪初入洛見魏君臣其禮各有所當嗚呼使正束帶立於朝上而擯贊漢主下而與賓客言事事令宜而無闕失豈非人臣之至願哉乃慨然歎息恨知正之晩初漢建寜太守霍弋都督南中建寜漢益州郡也蜀後主建興元年改建寜郡治味縣聞魏兵至欲赴成都劉禪以備敵既定不聽成都不守弋素服大臨三日臨力鴆翻諸将咸勸弋宜速降降戶江翻下同弋曰今道路隔塞塞悉則翻未詳主之安危去就大故不可茍也若魏以禮遇主上則保境而降不晩也若萬一危辱吾将以死拒之何論遲速邪得禪東遷之問始率六郡将守上表曰南中七郡而此言六郡者葢越嶲已降魏也将即亮翻守式又翻臣聞人生在三事之如一惟難所在則致其命無父母烏生無君烏以為生所謂人生在三也難乃旦翻今臣國敗主附守死無所是以委質不敢有貳質如字晉王善之拜南中都尉委以本任丁亥封劉禪為安樂公晉志安樂屬燕國樂音洛下間樂同子孫及羣臣封侯者五十餘人晉王與禪宴為之作故蜀技蜀技蜀樂也如巴渝舞之類也為于偽翻下同技與伎同渠綺翻旁人皆為之感愴而禪喜笑自若王謂賈充曰人之無情乃至於此雖使諸葛亮在不能輔之乆全况姜維邪佗曰王問禪曰頗思蜀否禪曰此間樂不思蜀也郤正聞之謂禪曰若王後問宜泣而答曰先人墳墓逺在岷蜀乃心西悲無日不思西悲用詩東山語此儒生之搜章摘句也因閉其目㑹王復問復扶又翻禪對如前王曰何乃似郤正語邪禪驚視曰誠如尊命左右皆笑夏四月新附督王稚浮海入吳句章新附督蓋以吳人新附者别為一部置督以領之句章縣屬㑹稽郡賢曰句章故城在今鄮縣西略其長吏及男女二百餘口而還長知兩翻五月庚申晉王奏復五等爵封騎督以上六百餘人賞平蜀之功也周制列爵五等公侯地方百里伯七十里子男五十里秦廢五等爵漢列侯以戶為差獻帝建安二十年魏王操置名號侯以賞軍功虚封自此始矣今雖復五等爵亦虚封也騎竒寄翻甲戍改元始改元咸熈癸未追命舞陽文宣侯懿為晉宣王忠武侯師為景王羅憲被攻凡六月被皮義翻救援不到城中疾病太半或説憲棄城走説輸芮翻下布説同憲曰吾為城主百姓所仰危不能安急而棄之君子不為也畢命於此矣陳騫言於晉王遣荆州刺史胡烈将歩騎二萬攻西陵以救憲秋七月吳師􅅲晉王使憲因仍舊任加陵江将軍沈約志魏置陵江将軍為四十號之首言欲陵駕江流以蕩平吳會也封萬年亭侯晉王奏使司空荀顗定禮儀中䕶軍賈充正法律尚書僕射裴秀議官制太保鄭冲總而裁焉吳分交州置廣州漢武帝元鼎六年開百越置交趾州刺史治龍編獻帝建安八年改曰交州治蒼梧廣信縣十六年徙治南海畨禺縣至是分為二州廣州治畨禺交州還治龍編吳主寝疾口不能言乃手書呼丞相濮陽興入令子􅓣出拜之􅓣讀如彎休把興臂指􅓣以託之癸未吳主殂謚曰景帝年三十羣臣尊朱皇后為皇太后吳人以蜀初亡交趾攜叛謂吕興反也國内恐愳欲得長君長知兩翻左典軍萬彧嘗為烏程令與烏程侯皓相善稱皓之才識明斷長沙桓王之儔也孫䇿謚長沙桓王斷丁亂翻又加之好學奉遵法度好呼到翻屢言之於丞相興左将軍布興布説朱太后欲以皓為嗣朱后曰我寡婦人安知社稷之慮茍吳國無隕宗廟有頼可矣頼恃也利也於是遂迎立皓改元元興大赦皓字元宗孫和之子八月庚寅命中撫軍司馬炎副貳相國事依五官将故事也初鍾㑹之伐漢也辛憲英謂其夫之從子羊祜曰㑹在事縱恣非持乆處下之道從才用翻處昌吕翻吾畏其有他志也㑹請其子郎中琇為參軍琇息救翻憲英憂曰他日吾為國憂今日難至吾家矣為于偽翻難乃旦翻琇固請於晉王王不聽憲英謂琇曰行矣戒之軍旅之間可以濟者其惟仁恕乎琇竟以全歸詔以琇嘗諫㑹反賜爵關内侯琇司馬師夫人之從父弟故以諌會為功而得封九月戊午以司馬炎為撫軍大将軍晉志撫軍大将軍位從公班驃騎車騎衛伏波等将軍下辛未詔以呂興為安南将軍都督交州諸軍事以南中監軍霍弋遥領交州刺史得以便宜選用長吏弋表遣建寜㸑谷為交趾太守㸑氏建寜之大姓世為耆帥至隋唐為東㸑西㸑蠻杜佑曰昆明在越嶲西南諸㸑所居率牙門董元毛炅炅古迥翻又古惠翻孟幹孟通爨能李松王素等将兵助興未至興為其功曹王統所殺吳主貶朱太后為景皇后貶其號從夫而自父其父母其母追謚父和曰文皇帝尊母何氏為太后冬十月丁亥詔以夀春所獲吳相國參軍事徐紹為散騎常侍水曹掾孫彧為給事黄門侍郎水曹掾吳相府所置吳未嘗置相國魏人以晉王為相國因亦稱吳丞相叅軍掾于絹翻以使於吳使䟽吏翻其家人在此者悉聽自隨不必使還以開廣大信言吳不必使還以廣中國之信攜吳人之心晉王因致書吳主諭以禍福初晉王娶王肅之女生炎及攸以攸繼景王後司馬師謚景王攸性孝友多才蓺清和平允名聞過於炎聞音問晉王愛之常曰天下者景王之天下也吾攝居相位百年之後大業宜歸攸炎立髪委地手􅂷過䣛䣛與膝同嘗從容問裴秀曰人有相否因以異相示之從干容翻相息亮翻秀由是歸心羊琇與炎善為炎畫䇿察時政所宜損益為于偽翻皆令炎豫記之以備晉王訪問晉王欲以攸為世子山濤曰廢長立少違禮不祥長知兩翻少詩沼翻賈充曰中撫軍有君人之徳不可易也何曾裴秀曰中撫軍聰明神武有超世之才人望既茂天表如此固非人臣之相也相息亮翻晉王由是意定丙午立炎為世子為晉武帝不能容齊王攸張本吳主封太子􅓣及其三弟皆為王􅓣弟名音如兕觥之觥次名壾壾音如屮莽之莽次名􅨟􅨟音如襃衣下寛大之褎皆吳主休自作名字立妃滕氏為皇后初吳主之立發優詔恤士民開倉廪振貧乏科出宫女以配無妻者科條也禽獸養於苑中者皆放之當時翕然稱為明主及既得志麤暴驕盈多忌諱好酒色好呼到翻大小失望濮陽興張布竊悔之或譖諸吳主十一月朔興布入朝朝直遥翻吳主執之徙於廣州道殺之夷三族以后父滕牧為衛将軍録尚書事牧𦙍之族人也滕𦙍為孫綝所殺是嵗罷屯田官置屯田官事見六十二卷漢獻帝建安元年資治通鑑卷七十八
