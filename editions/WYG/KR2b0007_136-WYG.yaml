之斷讀如短以本所費之物賜老疾貧獨者丁亥魏主如靈泉池遂如方山己丑還宫上優禮南昌文憲公王儉詔三日一還朝還當作造音七到翻朝直遥翻尚書令史出外諮事上猶以往來煩數復詔儉還尚書下省數所角翻復扶又翻月聽十日出外儉固求解選詔改中書監參掌選事選須絹翻五月乙巳儉卒王晏既領選權行臺閣與儉頗不平禮官欲依王𨗳諡儉為文獻晏啟上曰導乃得此諡但宋氏以來不加異姓出謂親人曰平頭憲事已行矣平頭謂憲字也諡神至翻徐湛之之死也湛之死見一百三十七卷宋文帝元嘉三十年其孫孝嗣在孕得免孕以證翻八嵗襲爵枝江縣公尚宋康樂公主樂音洛及上即位孝嗣為御史中丞風儀端簡玉儉謂人曰徐孝嗣將來必為宰相上嘗問儉誰可繼卿者儉曰臣東都之日其在徐孝嗣乎謂周公既定洛請明農也周都豐鎬以洛為東都儉卒孝嗣時為吳興太守徵為五兵尚書庚戌魏主祭方澤方澤者為方丘於澤中以祭地祇上欲用領軍王奐為尚書令以問王晏晏與奐不相能對曰柳世隆有勲望恐不宜在奐後甲子以尚書左僕射柳世隆為尚書令王奐為左僕射六月丁亥上如琅邪城魏懐朔鎮將汝隂靈王天賜魏置懐朔鎮於漢五原郡界是後六鎮叛改為朔州而不能有舊鎮之地杜佑曰魏都平城於馬邑郡北三百餘里置懐朔鎮及遷洛後置朔州將即亮翻下同長安鎮都大將雍州刺史南安惠王楨雍於用翻皆坐􅂍當死馮太后及魏主臨皇信堂水經注曰太極殿南對承賢門門南即皇信堂也魏書帝紀太和七年十月皇信堂成十六年以安昌殿為内寢皇信堂為中寢引見王公見賢遍翻太后令曰卿等以為當存親以毁令邪當滅親以明法邪羣臣皆言二王景穆皇帝之子景穆皇帝世祖之子薨諡曰景穆皇帝未即尊位也二王於高祖為叔祖宜䝉矜恕太后不應魏主乃下詔稱二王所犯難恕而太皇太后追惟高宗孔懐之恩二王於文成帝為兄弟詩曰兄弟孔懐惟思也且南安王事母孝謹聞於中外聞音問竝特免死削奪官爵禁錮終身初魏朝聞楨貪暴遣中散閭文祖詣長安察之中散中散大夫也散悉亶翻文祖受楨賂為之隱為于偽翻事覺文祖亦扺罪馮太后謂羣臣曰文祖前自謂廉今竟犯法以此言之人心信不可知魏主曰古有待放之臣春秋公羊傳晉放其大夫胥甲父于衛放之者何猶曰無去是云爾然則何言爾近正也此其為近正奈何古者大夫已去三年待放君放之非也大夫待放正也卿等自審不勝貪心者聽辭位歸第宰官中散慕容契進曰契葢以宰官帶中散大夫也小人之心無常而帝王之法有常以無常之心奉有常之法非所克堪乞從退黜魏主曰契知心不可常則知貪之可惡矣惡烏路翻何必求退遷宰官令契白曜之弟子也慕容白曜有平齊之功秋七月丙寅魏主如靈泉池魏主使羣臣議久與齊絶今欲通使何如使疏吏翻下同尚書游明根曰朝廷不遣使者又築醴陽深入彼境皆直在蕭賾今復遣使不亦可乎復扶又翻魏主從之八月乙亥遣兼員外散騎常侍邢産等來聘九月魏出宫人以賜北鎮人貧無妻者北鎮六鎮也一曰懐朔鎮直平城北冬十一月己未魏安豐匡王猛卒十二月丙子魏河東王茍頽卒平南參軍顔㓜明等聘於魏魏以尚書令尉元為司徒左僕射穆亮為司空豫章王嶷自以地位隆重深懐退素是嵗啓求還第上令其世子子廉代鎮東府太子詹事張緒領揚州中正長沙王晃屬用吳興聞人邕為州議曹屬之欲翻州議曹自漢以來率儒士為之緒不許晃使書佐固請緒正色曰此是身家州鄉殿下何得見逼自魏晉以來中正率用本州人望為之侍中江斆為都官尚書斆音効中書舍人紀僧真得幸於上容表有士風請於上曰臣出自本縣武吏邀逢聖時邀南史江斆傳作憿說文曰幸也集韻憿僥徼通音堅堯翻階榮至此為兒昏得荀昭光女即時無復所須為于偽翻復扶又翻唯就陛下乞作士大夫上曰此由江斆謝瀹我不得措意可自詣之僧真承㫖詣斆登榻坐定斆顧命左右曰移吾牀遠客遠于願翻僧真䘮氣而退告上曰士大夫故非天子所命斆湛之孫瀹朏之弟也二家以名義自持至於甄别流品雖萬乘之主不可得而奪䘮息浪翻朏敷尾翻柔然别帥叱呂勤帥衆降魏别帥所類翻勤帥讀曰率降户江翻資治通鑑卷一百三十六
