body:
  text: 資治通鑑卷一百三十六宋司馬光撰胡三省音註齊紀二起閼達困敦盡屠維大荒落凡六年世祖武皇帝上之下永明二年春正月乙亥以後將軍柳世隆為尚書右僕射竟陵王子良為䕶軍將軍兼司徒領兵置佐鎮西州子良少有清尚少詩照翻傾意賓客才雋之士皆遊集其門開西邸據子良傳西邸在雞籠山多聚古人器服以充之記室參軍范雲蕭琛樂安任昉法曹參軍王融衛軍東閤祭酒蕭衍記室參軍掌書記法曹參軍掌刑法此皆子良府屬也時王儉為衛將軍辟蕭衍為東閤祭酒自晉以來公府屬長史之下有東西閤祭酒琛丑林翻任音壬昉孚往翻鎮西功曹謝朓朓土了翻步兵校尉沈約揚州秀才吳郡陸倕校户教翻倕是為翻竝以文學尤見親待號曰八友法曹參軍柳惲惲於粉翻太學博士王僧孺晉武帝置太學博士太常博士國子博士南徐州秀才濟陽江革革南徐州所舉秀才也濟陽郡時屬南徐州濟子禮翻尚書殿中郎范縝魏晉以來尚書諸曹殿中郎為諸曹之首縝章忍翻㑹稽孔休源亦預焉會工外翻琛惠開之從子蕭惠開見一百三十一卷宋明帝泰始元年二年從才用翻下同惲元景之從孫融僧達之孫栁元景以武功顯於宋文武二朝王僧達以世資才俊進衍順之之子蕭順之太祖族弟朓述之孫約璞之子僧孺雅之曾孫謝遽見一百二十三卷宋文帝元嘉十七年沈璞守盱眙有功元嘉二十七年孝武孝建之初以不迎義師戮王雅見一百七卷晉孝武太元十五年縝雲之從兄也縝章忍翻子良篤好釋氏招致名僧講論佛法道俗之盛江左未有或親為衆僧賦食行水好呼到翻為于偽翻賦分畀也世頗以為失宰相體范縝盛稱無佛子良曰君不信因果釋氏冇因緣果報之說何得有富貴貧賤縝曰人生如樹花同發隨風而散或拂簾幌墜茵席之上幌呼廣翻或關籬牆落糞溷之中墜茵席者殿下是也落糞溷者下官是也貴賤雖復殊途復扶又翻因果竟在何處子良無以難難乃旦翻下難之同縝又著神滅論以為形者神之質神者形之用也神之于形猶利之於刀未聞刀没而利存豈容形亡而神在哉此論出朝野諠譁難之終不能屈朝直遥翻太原王琰著論譏縝曰嗚呼范子曾不知其先祖神靈所在欲以杜縝後對縝對曰嗚呼王子知其先祖神靈所在而不能殺身以從之子良使王融謂之曰以卿才美何患不至中書郎而故乖刺為此論中書郎即謂中書侍郎也刺來葛翻甚可惜也宜急毀棄之縝大笑曰使范縝賣論取官已至令僕矣令僕謂尚書令及兩僕射何但中書郎邪蕭衍好籌畧有文武才幹好呼到翻王儉深器異之曰蕭郎出三十貴不可言蕭衍事始此壬寅以栁世隆為尚書左僕射丹陽尹李安民為右僕射王儉領丹陽尹夏四月甲寅魏主如方山戊午還宫庚申如鴻池鴻池即旋鴻池也水經注凉城郡旋鴻縣東山下水積成池東西二里南北四里又太祖天與二年穿鴻鴈池於平城丁卯還宫五月甲申魏遣員外散騎常侍李彪等來聘散悉亶翻騎竒寄翻六月壬寅朔中書舍人吳興茹法亮封望蔡男康曰茹人諸切姓也望蔡縣屬豫章郡沈約曰漢靈帝中平中汝南上蔡民分徙此城立縣名曰上蔡晉武帝太康元年更名望蔡宋白曰望蔡縣本漢建成縣靈帝分置上蔡縣晉武帝以上蔡人思本土改為望蔡今為髙安縣瑞州治所時中書舍人四人各住一省謂之四户以法亮及臨海吕文顯等為之既總重權勢傾朝廷守宰數遷換去來四方餉遺嵗數百萬法亮嘗於衆中語人曰何須求外祿此一户中年辦百萬葢約言之也數所角翻遺于季翻語牛倨翻李延夀曰中書所司掌在機務漢元以令僕用事魏明以監令專權至宋孝武以來士庶雜選及明帝世胡母顥阮佃夫之徒專為侯倖矣齊初亦用久勞及以親信關讞表啓發署詔勑頗涉詞輸亦為詔文侍郎之局復見侵矣建武詔命始不關中書專出舍人省内舍人四人所直四省據此四戸則舍人分住四省自法壳等始後因天文有變王儉極言文顯等専權徇私上天見異禍由四户見賢遍翻上手詔酬答而不能改也魏舊制户調帛二匹絮二斤絲一斤穀二十斛又入帛一匹二丈委之州庫以供調外之費所調各隨土之所出丁卯詔曰置官班祿行之尚矣自中原䘮亂兹制中絶朕憲章舊典始班俸祿户增調帛三匹穀二斛九斗以為官司之祿增調外帛二匹祿行之後􅂍滿一匹者死變法改度宜為更始調徒弔翻俸扶用翻更工衡翻其大赦天下秋七月甲申立皇子子倫為巴陵王乙未魏主如武州山石窟寺九月魏詔班祿以十月為始季别受之三月為一季舊律枉法十匹義􅂍二十匹罪死至是義􅂍一匹枉法無多少皆死枉法謂受賕枉法而出入人罪者義贓謂人私情相饋遺雖非乞取亦計所受論贓仍分命使者糾按守宰之貪者秦益二州刺史恒農李洪之以外戚貴顯魏顯祖髙祖皆李氏出魏避顯祖諱改𢎞農為恒農為治貪暴治直吏翻班祿之後洪之首以􅂍敗魏主命鎖赴平城集百官親臨數之數所具翻數其罪也猶以其大臣聽在家自裁自餘守宰坐􅂍死者四十餘人受祿者無不跼蹐跼音局蹐音脊賕賂殆絶然吏民犯它罪者魏主率寛之疑罪奏讞多減死徙邊嵗以千計都下決大辟嵗不過五六人州鎮亦簡久之淮南王佗奏請依舊斷祿讞魚列翻又魚蹇翻辟毗亦翻斷丁管翻文明太后召羣臣議之中書監髙閭以為飢寒切身慈母不能保其子今給祿則廉者足以無濫貪者足以勸慕不給則貪者得肆其姦廉者不能自保淮南之議不亦謬乎詔從閭議閭又上表以為北狄悍愚難以防遏悍侯旰翻又下罕翻所長者野戰所短者攻城北狄指蠕蠕也若以狄之所短奪其所長則雖衆不能成患雖來不能深入又狄散居野澤隨逐水草戰則與家業並至奔則與畜牧俱逃不齎資糧而飲食自足是以歴代能為邊患六鎮勢分倍衆不鬬謂敵人衆力加倍則鎮人不敢鬬也互相圍逼難以制之請依秦漢故事於六鎮之北築長城魏世祖破蠕蠕列置降人於漢南東至濡源西暨五原隂山竟三千里分為六鎮今武川撫𠖇懐朔懐荒柔𤣥禦夷也下云六鎮東西不過千里則當自代都北塞而東至濡源耳杜佑曰後魏六鎮並在馬邑雲中單于府界擇要害之地往往開門造小城於其側置兵扞守狄既不攻城野掠無獲草盡則走終必懲艾計六鎮東西不過千里一夫一月之功可城三步之地彊弱相兼不過用十萬人一月可就雖有暫勞可以永逸凡長城有五利罷遊防之苦一也北部放牧無抄掠之患二也抄楚交翻登城觀敵以逸待勞三也息無時之備四也嵗常遊運遊行也行運芻糧以實塞下永得不匱五也魏主優詔答之冬十月丁巳以南徐州刺史長沙王晃為中書監初太祖臨終以晃屬帝使處於輦下或近藩屬之欲翻處昌呂翻勿令遠出且曰宋氏若非骨肉相殘它族豈得乗其弊汝深誡之舊制諸王在都唯得置捉刀左右四十人捉刀執刀以衛左右者也晃好武飾及罷南徐州私載數百人仗還建康為禁司所覺投之江水禁司主防禁諸王好呼到翻下同帝聞之大怒將糾以法豫章王嶷叩頭流涕曰晃罪誠不足宥陛下當憶先朝念晃帝亦垂泣由是終無異意然亦不被親寵論者謂帝優於魏文減於漢明魏文防禁任城陳諸王漢明友愛東海東干諸王嶷魚力翻朝直遥翻被皮義翻武陵王曅多材藝而踈悻悻直也狠也音胡頂翻亦無寵於帝嘗侍宴醉伏地貂抄肉柈抄楚交翻柈薄官翻帝笑曰肉汙貂汙烏故翻對曰陛下愛羽毛而踈骨肉帝不悦曅輕財好施施式智翻故無蓄積名後堂山曰首陽葢怨貧薄也髙麗王璉遣使入貢於魏亦入貢於齊時髙麗方彊魏置諸國使邸齊使第一髙麗次之麗力知翻使䟽吏翻下同益州大度獠恃險驕恣水經注南安縣有濛水即大度水東入于江寰宇記大度河自吐蕃界經雅州諸部落至黎州東界流入通莖界獠魯皓翻前後刺史不能制及陳顯逹為刺史遣使責其租賧賧吐濫翻夷人以財贖罪曰賧獠帥曰兩眼刺史尚不敢調我帥所類翻調徒弔翻况一眼乎遂殺其使顯逹分部將吏聲言出獵夜往襲之男女無少長皆斬之分扶問翻將即亮翻下同少詩照翻長知兩翻晉氏以來益州刺史皆以名將為之十一月丁亥帝始以始興王鑑為督益寜諸軍事益州刺史徴顯逹為中䕶軍先是劫帥韓武方聚黨千餘人斷流為暴先悉薦翻斷丁管翻郡縣不能禁鑑行至上明武方出降降户江翻下同長史虞悰等咸請殺之悰徂宗翻鑑曰殺之失信且無以勸善乃啓臺而宥之於是巴西蠻夷為冦暴者皆望風降附鑑時年十四行至新城新城今房州道路籍籍云陳顯逹大選士馬不肯就徴乃停新城遣典籖張曇晢往觀形勢俄而顯逹遣使詣鑑咸勸鑑執之鑑曰顯逹立節本朝必自無此曇徒含翻晢先擊翻使䟽吏翻朝直遥翻下同居二日曇晢還具言顯逹已遷家出城日夕望殿下至於是乃前鑑喜文學喜許記翻器服如素士蜀人悦之乙未魏員外散騎常侍李彪等來聘嵗悉亶翻騎竒寄翻至考異曰齊紀十二月庚申虜使李道固今從後魏帝紀是嵗詔増豫章王嶷封邑為四千户宋元嘉之世諸王入齋閣得白服帬㡌見人主宋齊之間制髙屋㡌下帬葢帬渠云翻見賢遍翻唯出太極四廂乃備朝服太極殿前殿也有四廂自後此制遂絶上於嶷友愛宫中曲宴聽依元嘉故事嶷固辭不敢唯車駕至其第乃白服烏紗㡌以侍宴至於衣服器用制度動皆陳啓事無専制務從減省上竝不許嶷常慮盛滿求解揚州以授竟陵王子良上終不許曰畢汝一世無所多言嶷長七尺八寸善修容範文物衛從禮冠百僚長直亮翻從才用翻冠古玩翻每出入殿省瞻望者無不肅然交州刺史李叔獻既受命命叔獻為交州刺史見上卷太祖建元元年而斷割外國貢獻上欲討之斷丁管翻三年春正月丙辰以大司農劉楷為交州刺史發南康廬陵始興兵以討叔獻叔獻聞之遣使乞更申數年獻十二隊純銀兠鍪及孔雀毦毦仍吏翻以孔雀毛為飾也上不許叔獻懼為楷所襲間道自湘州還朝不敢取道南康始興避劉楷之兵故也間古莧翻戊寅魏詔曰圖䜟之興出於三季三代之季也䜟楚譖翻既非經國之典徒為妖邪所憑自今圖䜟祕緯一皆焚之妖於遥翻緯于貴翻留者以大辟論律凡言以論者罪同真犯辟毗亦翻又嚴禁諸巫覡及委巷卜筮非經典所載者直曰街曲曰巷委即曲也鄭𤣥曰委巷猶街里委曲所為也覡刑狄翻魏馮太后作皇誥十八篇癸未大饗羣臣于太華殿班皇誥魏高宗興光四年起太華殿辛卯上祀南郊大赦詔復立國學罷國學見上卷髙帝建元四年李延夀曰江左草創日不暇給以迄宋齊國學時或開置而勸課未博建之不能十年葢取文具而已復扶又翻釋奠先師用上公禮二月己亥魏制皇子皇孫有封爵者嵗祿各有差辛丑上祀北郊三月丙申魏封皇弟禧為咸陽王幹為河南王羽為廣陵王雍為潁川王勰為始平王勰音協詳為北海王自禧以下皆魏主之弟文眀太后令置學舘選師傅以教諸王勰於兄弟最賢敏而好學善屬文好呼到翻屬之欲翻魏主尤竒愛之夏四月癸丑魏主如方山甲寅還宫初宋太宗置總明觀以集學士亦謂之東觀上以國學既立五月乙未省總明觀時王儉領國子祭酒詔於儉宅開學士舘以總明四部書充之分經史子集為甲乙丙丁四部又據宋紀明帝泰始六年立總明觀徵學士以充之舉士二十人分為儒道文史隂陽五部學言隂陽者遂無其人然則四部書者其儒道文史之書歟觀古玩翻又詔儉以家為府自宋世祖好文章士大夫悉以文章相尚無以専經為業者儉少好禮學及春秋言論造次必於儒者好呼到翻造七到翻由是衣冠翕然更尚儒術儉撰次朝儀國興自晉宋以來故事無不諳憶憶記也朝直遥翻下同諳烏含翻故當朝理事斷决如流毎博議引證八坐丞郎無能異者八坐丞郎自八坐至左右丞諸曹郎也斷丁亂翻坐徂卧翻令史諮事常數十人賓客滿席儉應接辨析傍無留滯𤼵言下筆皆有音彩十日一還學監試諸生巾卷在庭監工銜翻卷巨員翻冠武也鄭註禮記云武冠卷也音起權翻劒衛令史儀容甚盛作解散髻據南史儉𫝊作解散幘蕭子顯齊書作解散髻斜挿幘簮斜挿簮朝野慕之相與倣效儉常謂人曰江左風流宰相唯有謝安意以自比也上深委仗之士流選用奏無不可六月庚戌進河南王度易侯為車騎將軍遣給事中吳興丘冠先使河南并送柔然使騎竒寄翻冠古玩翻使疏吏翻辛亥魏主如方山丁巳還宫秋七月癸未魏遣使拜宕昌王梁彌機兄子彌承為宕昌王宕徒浪翻嵗考異曰齊書是八月丁巳以行宕昌王梁彌頡為河梁二州刺史六年五月甲午以彌承為河涼二州刺史令從魏書初彌機死子彌博立為吐谷渾所逼奔仇池吐從暾入聲谷音浴仇池鎮將穆亮以彌機事魏素厚矜其滅亡彌博凶悖所部惡之將即亮翻悖蒲内翻又蒲没翻惡烏路翻彌承為衆所附表請納之詔許之亮帥騎三萬軍于龍鵠龍鵠葢即龍涸也在甘松界宇文氏於此置龍涸防隋為扶州嘉誠縣唐為松州杜佑曰龍涸城吐谷渾南界也去成都千餘里周武帝天和初其主率衆降以為扶州帥讀曰率騎竒寄翻擊走吐谷渾立彌承而還還從宣翻又如字亮崇之曾孫也穆崇見一百一十一卷晉安帝隆安三年戊子魏主如魚池魏太宗永興五年穿魚池於平城北苑登青原岡甲午還宫八月己亥如彌澤甲寅登牛頭山甲子還宫魏初民多䕃附䕃附者自附於豪强之家以求䕃庇䕃附者皆無官役而豪彊徴斂倍於公賦斂力贍翻給事中李安世上言嵗飢民流田業多為豪右所占奪占之贍翻雖桑井難復桑井謂古者井田之制五畝之宅樹墻下以桑也宜更均量使力業相稱又所爭之田宜限年斷量音良稱尺證翻斷丁亂翻事久難明悉歸今主以絶詐妄魏主善之由是始議均田冬十月丁未詔遣使者循行州郡行下孟翻與牧守均給天下之田守式又翻諸男夫十五以上受露田四十畝婦人二十畝杜佑通典注曰不栽樹萟者謂之露田奴婢依良丁良丁謂良人成丁者牛一頭受田三十畝限止四牛所授之田率倍之三易之田再倍之以供耕作及還受之盈縮倍之者合受四十畝授以八十畝此一易之田也三易之田三年耕然後復故故再倍以授之人年及課則受田老免及身没則還田奴婢牛隨有無以還受初受田者男夫給二十畝課種桑五十株桑田皆為世業身終不還恒計見口有盈者無受無還不足者受種如法盈者得賣其盈恒户登翻見賢遍翻口分世業之法始此諸宰民之官各隨近給公田有差更代相付更工衡翻賣者坐如律辛酉魏魏郡王陳建卒魏員外散騎常侍李彪等來聘十二月乙卯魏以侍中淮南王佗為司徒柔然犯魏塞魏任城王澄帥衆拒之柔然遁去澄雲之子也任城王雲見一百三十三卷宋明帝泰始七年任音壬帥讀曰率氐羌反詔以澄為都督梁益荆三州諸軍事梁州刺史魏髙祖始置梁益二州於仇池澄至州討叛柔服氐羌皆平初太祖命黄門郎虞玩之等檢定黄籍見上卷太祖建元二年上即位别立校籍官置令史限人一日得數巧巧謂姦偽也既連年不已民愁怨不安外監㑹稽呂文度外監屬中領軍而親任過於領軍會工外翻啓上籍被却者悉充遠戍被皮義翻民多逃亡避罪富陽民唐㝢之因以妖術惑衆作亂攻陷富陽富陽即漢富春縣也本屬會稽後屬吳郡晉簡文鄭太后諱春孝武改曰富陽妖於驕翻三吳却籍者奔之衆至三萬文度與茹法亮吕文顯皆以姦諂有寵於上茹音如文度為外監専制兵權領軍守虛位而已法亮為中書通事舍人權勢尤盛王儉常曰我雖有大位權寄豈及茹公邪是嵗柔然部真可汗卒子豆崙立可從刋入聲汗音寒崘盧昆翻號伏名敦可汗魏收曰伏名敦魏言恒也改元太平四年春正月癸亥朔魏髙祖朝㑹始服衮冕史言魏孝文用夏變夷朝直遥翻壬午柔然冦魏邊唐㝢之攻陷錢唐吳郡諸縣令多棄城走㝢之稱帝於錢唐立太子置百官遣其將髙道度等攻陷東陽將即亮翻殺東陽太守蕭崇之崇之太祖族弟也又遣其將孫泓冦山隂至浦陽江據水經注浦陽江即今曹娥江也水𤼵剡溪皆西流至曹娥鎮始折而東流入海浹口戍主湯休武擊破之浹即叶翻上𤼵禁兵數千人馬數百匹東擊㝢之臺軍至錢唐㝢之衆烏合畏騎兵騎竒寄翻一戰而潰擒斬㝢之進平諸郡縣臺軍乗勝頗縱抄掠抄楚交翻軍還還從宣翻又如字上聞之收軍主前軍將軍陳天福棄市左軍將軍劉明徹免官削爵付東冶建康有東西二冶今冶城即其地亦曰東冶亭天福上寵將也將即亮翻既伏誅内外莫不震肅使通事舍人丹楊劉係宗隨軍慰勞勞力到翻遍至遭賊郡縣百姓被驅逼者悉無所問閏月癸巳立皇太子貞為邵陵王皇孫昭文為臨汝公氐王楊後起卒丁未詔以白水太守楊集始為北秦州刺史武都王集始文𢎞之子也後起弟後明為白水太守魏亦以集始為武都王集始入朝于魏朝直遥翻魏以為南秦州刺史辛亥帝耕籍田二月己未立皇弟銶為晉熙王銶音求鉉為河東王魏無鄉黨之法唯立宗主督䕶民多隱冒三五十家始為一户内祕書令李冲上言祕書省在禁中故謂之内祕書令亦謂之中祕上時掌翻宜凖古法五家立鄰長五鄰立里長五里立黨長取鄉人彊謹者為之鄰長復一夫里長二夫黨長三夫長知兩翻復方目翻三載無過則升一等其民調一夫一婦帛一匹粟二石大率十匹為公調二匹為調外費三匹為百官俸此外復有雜調調徒弔翻俸扶用翻復扶又翻民年八十已上聽一子不從役孤獨癃老篤疾貧窮不能自存者三長内迭養食之食讀曰飤書奏詔百官通議中書令鄭羲等皆以為不可太尉丕曰臣謂此法若行於公私有頼但方有事之月校比户口民必勞怨請過今秋至冬乃遣使者於事為宜冲曰民可使由之不可使知之論語孔子之言若不因調時調時所謂調課之月民徒知立長校户之勤未見均徭省賦之益心必生怨宜及調課之月令知賦稅之均既識其事又得其利行之差易易以䜴翻羣臣多言九品差調為日已久九品上中下各分為三品事見一百三十二卷宋明帝泰始五年一旦改法恐成擾亂文明太后曰立三長則課調有常凖苞䕃之户可出僥倖之人可止何為不可僥堅堯翻甲戌初立黨里鄰三長定民户籍民始皆愁苦豪彊者尤不願既而課調省費十餘倍上下安之三月丙申柔然遣使者牟提如魏時敕勒叛柔然柔然伏名敦可汗自將討之追奔至西漠西漠者大漠之西偏也將即亮翻魏左僕射穆亮等請乗虛擊之中書監髙閭曰秦漢之世海内一統故可逺征匈奴今南有吳冦何可捨之深入虜庭魏主曰兵者凶器聖人不得已而用之老子之言先帝屢出征伐者以有未賓之虜故也今朕承太平之業奈何無故動兵革乎厚禮其使者而歸之夏四月辛酉朔魏始制五等公服甲子初以法服御輦祀南郊公服朝廷之服五等朱紫緋緑青法服衮冕以見郊廟之服癸酉魏主如靈泉池魏於方山之南起靈泉宮引如渾水為靈泉池東西一百步南北二百步戊寅還宫湘州蠻反刺史呂安國有疾不能討丁亥以尚書左僕射柳世隆為湘州刺史討平之六月辛酉魏主如方山戌考異曰魏帝紀是日幸方山七月戊又云幸方山皆不言還宫盖闕文耳己卯魏文明太后賜皇子恂名大赦秋七月戊戌魏主如方山八月乙亥魏給尚書五等爵已上朱衣玉佩大小組綬組綬者組織以成綬鄭𤣥曰綬所以貫佩玉相承受者也漢制印綬先合單紡為一系四系為一扶五扶為一首五首成一文文采淳為一圭首多者系細少者系麤皆廣一尺六寸組則古翻絞音受九月辛卯魏作明堂辟雍冬十一月魏議定民官依户給俸以所領民户之多少為給俸之差也十二月柔然冦魏邊是嵗魏改中書學曰國子學魏先置中書博士及中書學生今改曰國子學從晉制也分置州郡凡三十八州二十五在河南十三在河北河南二十五州青南青兖齊濟光豫洛徐東徐雍秦南秦梁益荆凉河沙時又置華陜夏岐班郢凡二十五河北十三州司并肆定相冀幽燕營平安時又置瀛汾凡十三蕭子顯曰雍凉秦沙涇華岐河西華寜陜洛荆郢北豫東荆南豫西兖東兖南徐東徐青齊濟光二十五州在河南相汾懐并東雍肆定瀛朔并冀幽平司等十三州在河北五年春正月丁亥朔魏主詔定樂章非雅者除之戊子以豫章王嶷為大司馬竟陵王子良為司徒臨川王映衛將軍王儉中軍將軍王敬則竝加開府儀同三司子良啓記室范雲為郡上曰聞其常相賣弄朕不復窮法當宥之以遠復扶又翻子良曰不然雲動相規誨諫書具存遂取以奏凡百餘紙辭皆切直上歎息謂子良曰不謂雲能爾方使弼汝何宜出守守式又翻文惠太子嘗出東田觀穫時太子作東田於東宫之東緜恒華逺壯麗極目又齊紀太子立樓舘于鍾山下號曰東田顧謂衆賓曰刈此亦殊可觀衆皆曰唯唯唯于癸翻雲獨曰三時之務實為長勤三時之務謂春耕夏耘秋穫也伏願殿下知稼穡之艱難無徇一朝之宴逸荒人桓天生自稱桓𤣥宗族與雍司二州蠻相扇動雍於用翻據南陽故城請兵於魏將入冦丁酉詔假丹楊尹蕭景先節總帥步騎直指義陽司州諸軍皆受節度帥讀曰率騎竒寄翻又假䕶軍將軍陳顯逹節帥征虜將軍戴僧静等水軍向宛葉宛於元翻葉式涉翻雍司諸軍皆受顯逹節度以討之魏光祿大夫咸陽文公髙允歴事五帝太武景穆文成獻文及髙祖為五帝出入三省三省尚書省中書省祕書省也五十餘年未嘗有譴馮太后及魏主甚重之常命中黄門蘓興夀扶侍允仁恕簡静雖處貴重處昌呂翻情同寒素執書吟覽晝夜不去手誨人以善恂恂不倦楊中立曰恂恂一於誠也朱元晦曰恂恂信實之貌篤親念故無所遺棄顯祖平青徐悉徙其望族於代事見一百三十二卷宋明帝泰始五年其人多允之婚媾流離飢寒允傾家賑施賑之忍翻施式智翻咸得其所又隨其才行薦之於朝行下孟翻朝直遥翻議者多以初附間之間古莧翻允曰任賢使能何有新舊必若有用豈可以此抑之允體素無疾至是㣲有不適猶起㞐如常數日而卒年九十八贈侍中司空􅉠襚甚厚布帛曰賻衣被曰襚賻音附襚徐醉翻魏初以來存亡䝉賚皆莫及也桓天生引魏兵萬餘人至沘陽漢沘陽縣屬南陽郡應劭曰沘水所出魏太和中置東荆州於沘陽故城宋白曰今唐州沘陽縣即州故城九域志沘陽縣在唐州東北七十五里陳顯逹遣戴僧静等與戰於深橋戴僧靜𫝊深橋距沘陽四十里沘音比大破之殺獲萬計天生退保沘陽僧静圍之不克而還還從宣翻又如字荒人胡丘生起兵懸瓠以應齊魏人擊破之丘生來奔天生又引魏兵冦舞隂舞隂戍主殷公愍拒擊破之殺其副張麒麟天生被創退走被皮義翻創初良翻三月丁未以陳顯逹為雍州刺史雍於用翻顯逹進據舞陽城夏五月壬辰魏主如靈泉池癸巳魏南平王渾卒甲午魏主還平城詔復七廟子孫及外戚緦麻服已上賦役無所與復方月翻七廟子孫自太祖已下緦麻三月服五服至緦麻而服盡與讀當曰預魏南部尚書公孫邃上谷公張儵帥衆與桓天生復冦舞隂殷公愍擊破之儵式竹翻帥讀曰率復扶又翻軍考異曰齊書魏虜𫝊云偽安南將軍遼東公平南將上谷公又攻武隂魏書帝紀云詔南部尚書公孫文慶上谷公張伏于南討舞隂按公孫邃𫝊邃字文慶與内都幢將上谷公張儵討蕭賾舞隂戍盖伏于亦儵字也天生還竄荒中邃表之孫也公孫表事魏明元為將魏春夏大旱代地尤甚加以牛疫民餒死者多六月癸未詔内外之臣極言無隱齊州刺史韓麒麟上表曰古先哲王儲積九稔古者三年耕餘一年食九年耕餘三年食以三十年之通制國用則當有九年之蓄國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也稔而廩翻逮於中代亦崇斯業入粟者與斬敵同爵力田者與孝悌均賞漢令民入粟拜爵又有孝悌力田之科今京師民庻不田者多遊食之口參分居二自承平日久豐穰積年競相矜夸遂成侈俗貴富之家童妾袨服袨黄練翻袨服美衣也工商之族僕𨽻玉食張晏曰玉食珍食也而農夫闕糟糠蠶婦乏短褐故令耕者日少少詩沼翻下同田有荒蕪穀帛罄於府庫寳貨盈於市里衣食匱於室麗服溢於路飢寒之本寔在於斯愚謂凡珍異之物皆宜禁斷斷丁管翻吉凶之禮備為格式勸課農桑嚴加賞罰數年之中必有盈贍往年校比户貫毛晃曰貫鄉籍也租賦輕少臣所統齊州租粟纔可給俸略無入倉俸扶用翻雖於民為利而不可長久脫有戎役或遭天災恐供給之方無所取濟可減絹布増益穀租年豐多積嵗儉出賑嵗入約少為儉賑之忍翻下同所謂私民之穀寄積於官官有宿積則民無荒年矣宿積子智翻秋七月己丑詔有司開倉賑貸聽民出關就食魏都平城郊畿之外置關於要路以譏征遣使者造籍分遣去留所過給糧廪所至三長贍養之柔然伏名敦可汗殘暴可從刋入聲汗音寒其臣侯醫垔石洛候數諫止之垔伊真翻數所角翻且勸其與魏和親伏名敦怒族誅之由是部衆離心八月柔然冦魏邊魏以尚書陸叡為都督擊柔然大破之叡麗之子也陸麗陸俟之子於乙渾之難死也初髙車阿伏至羅有部落十餘萬役屬柔然伏名敦之侵魏也阿伏至羅諫不聽阿伏至羅怒與從弟窮竒帥部落西走至前部西北從才用翻帥讀曰率前部漢車師前王地也自立為王車考異曰魏書高𫝊云在太和十一年蠕蠕在十六年今從高車𫝊按蠕蠕下當有傳字國人號曰候婁匐勒夏言天子也號窮奇曰候倍夏言太子也夏言謂中華之言夏户雅翻二人甚親睦分部而立阿伏至羅居北窮竒居南伏名敦追擊之屢為阿伏至羅所敗乃引衆東徙史言柔然寖衰敗補邁翻九月辛未魏詔罷起部無益之作起部掌百工之事書曰百工起哉出宫人不執機杼者冬十月丁未又詔罷尚方錦繡綾羅之工四民欲造任之無禁四民士農工商也是時魏久無事府藏盈積詔盡出御府衣服珍寳太官雜器太僕乗具内庫弓矢刀鈐十分之八藏徂浪翻乘繩證翻鈐與鉗同其廉翻刃也唐有玉鈐衛外府衣物繒布絲纊繒慈陵翻帛也纊苦謗翻纊絮也非供國用者以其大半班賚百司下至工商皁𨽻逮于六鎮邊戍畿内鰥寡孤獨貧癃皆有差劉熈釋名曰無妻曰鰥憂悒不能寐目常鰥鰥然其字從魚魚目常不閉無夫曰寡寡倮也倮然單獨也無父曰孤孤顧也顧望無所瞻見也無子曰獨獨鹿也鹿鹿無所依也無財曰貧疲病曰癃魏袐書令高祐丞李彪奏請改國書編年為紀𫝊表志𫝊直戀翻魏主從之祐允之從祖弟也十二月詔彪與著作郎崔光改脩國書光道固之從孫也從才用翻宋明帝泰始五年崔道固降魏魏主問高祐曰何以止盜對曰昔宋均立徳猛虎渡河卓茂行化蝗不入境宋均事見四十五卷漢明帝永平七年卓茂為密令教化大行漢平帝時天下大蝗獨不入密縣界况盜賊人也茍守宰得人治化有方止之易矣守式又翻治直吏翻易以豉翻祐又上䟽言今之選舉不採識治之優劣専簡年勞之多少少詩沼翻斯非盡才之謂宜停此薄藝棄彼朽勞唯才是舉則官方斯穆方道也穆和也清也又勲舊之臣雖年勤可錄而才非撫民者可加之以爵賞不宜委之以方任所謂王者可私人以財不私人以官者也王者不私人以官前漢書佞幸𫝊賛之辭帝善之祐出為西兖州刺史鎮滑臺以郡國雖有學縣黨亦宜有之乃命縣立講學黨立小學六年春正月乙未魏詔犯死刑者父母祖父母年老更無成人子孫旁無朞親者具狀以聞朞親為之服朞者初皇子右衛將軍子響出繼豫章王嶷嶷魚力翻嶷後有子表留為世子子響每入朝朝直遥翻以車服異於諸王每拳擊車壁上聞之詔車服與皇子同於是有司奏子響宜還本三月己亥立子響為巴東王角城戍將張蒲因大霧乗船入清中採樵清中清水中也將即亮翻濳納魏兵戍主皇甫仲賢覺之帥衆拒戰於門中僅能却之魏步騎三千餘人已至塹外帥讀曰率騎竒寄翻塹七艶翻淮隂軍主王僧慶等引兵救之魏人乃退夏四月桓天生復引魏兵出據隔城復扶又翻詔游擊將軍下邳曹虎督諸軍討之輔國將軍朱公恩將兵蹹伏將即亮翻下同蹹與踏同遇天生遊軍與戰破之遂進圍隔城天生引魏兵步騎萬餘人來戰虎奮擊大破之俘斬二千餘人明日拔隔城斬其襄城太守帛烏祝復俘斬二千餘人天生棄平氏城走平氏漢縣屬南陽郡晉宋屬義陽郡縣西南有桐柏山淮源所出也五代志淮安郡平氏縣魏置漢廣郡至我朝開寳五年省平氏縣為鎮入唐州泌陽縣陳顯逹侵魏甲寅魏遣豫州刺史拓跋斤將兵拒之甲子魏大赦乙丑魏主如靈泉池丁卯如方山己巳還宫魏築城於醴陽醴陽葢在醴水之北水經注醴水出桐柏山與淮同源而别流西注逕平氏縣東北又西流注于沘水陳顯逹攻拔之進攻沘陽城中將士皆欲出戰鎮將韋珍曰魏樂陵鎮將鎮沘陽將即亮翻彼初至氣銳未可與爭且共堅守待其力攻疲弊然後擊之乃憑城拒戰旬有二日珍夜開門掩擊顯逹還還從宣翻又如字五月甲午以宕昌王梁彌承為河涼二州刺史宕徒浪翻秋七月己丑魏主如靈泉池遂如方山己亥還宫九月壬寅上如琅邪城講武治蕭子顯曰南琅邪郡本金城永明乃徙治白下三沈約曰晉亂琅邪國人隨元帝過江者千餘户太興年立懐徳縣丹陽雖有琅邪郡而無其地成帝成康元年桓温領郡鎮江乗之蒲洲金城上求割丹陽之江乘縣境立郡癸卯魏淮南靖王佗卒佗徒河翻魏主方享宗廟始薦聞之為廢祭臨視哀慟為于偽翻冬十月庚申立冬初臨太極殿讀時令漢儀太史每歳上其年厯先立春立夏大暑立秋立冬常讀五時令皇帝所服各隨五時之色帝升御座尚書令以下就席位尚書三公郎以令置按上奏以入就席伏讀訖賜酒一巵閏月辛酉以尚書僕射王奐為領軍將軍辛未魏主如靈泉池癸酉還宫十二月柔然伊吾戍主高羔子帥衆三千以城附魏帥讀曰率上以中外穀帛至賤用尚書右丞江夏李珪之議夏户雅翻出上庫錢五千萬及出諸州錢皆令糴買西陵戍主杜元懿建言吳興無秋會稽豐登會工外翻商旅往來倍多常嵗西陵牛埭稅官格日三千五百如臣所見日可增倍西陵在今越州蕭山縣西十二里西興渡是也吳越王錢鏐以西陵非吉語改曰西興牛埭即今西興堰用牛挽船因曰牛埭埭徒耐翻并浦陽南北津柳浦四埭浦陽江南津埭則今之梁湖堰是也北津埭則今之曹俄堰是也栁浦埭則今杭州江干浙江亭北跨浦橋埭是也乞為官領攝一年為于偽翻格外可長四百許萬長丁丈翻今知兩翻增也又音直亮翻多也西陵戌前檢稅無妨戌事餘三埭自舉腹心上以其事下會稽下户嫁翻會稽行事吳郡顧憲之議以為始立牛埭之意非苟逼蹴以取稅也蹴子六翻乃以風濤迅險濟急利物耳後之監領者不逹其本各務已功監古銜翻或禁遏佗道或空稅江行案吳興頻嵗失稔今兹尤甚去之從豐良由飢棘去之當作去乏棘急也埭司責稅依格弗降舊格新減尚未議登格外加倍將以何術皇慈恤隱振廪蠲調左傳楚大饑振廩同食杜預注曰振發也廪倉也調徒釣翻而元懿幸災𣙜利重増困瘼𣙜古岳翻瘼病也重直用翻人而不仁古今共疾若事不副言懼貽譴詰譴去戰翻詰去吉翻必百方侵苦為公賈怨元懿禀性苛刻已彰往效任以物土譬以狼將羊其所欲舉腹心亦當虎而冠耳為于偽翻賈音古狼將羊虎而冠皆漢書語以狼將羊則羊必為狼所噬食虎而冠者言其人惡戾如虎著冠書云與其有聚斂之臣寜有盜臣記大學記孟獻子之言斂力贍翻此言盜公為損葢㣲斂民所害乃大也愚又以便宜者葢謂便於公宜於民也竊見頃之言便宜者非能於民力之外用天分地用天之道分地之利此孝經第六章之言率皆即日不宜於民方來不便於公名與實反有乖政體凡如此等誠宜深察上納之而止魏主訪羣臣以安民之術祕書丞李彪上封事以為豪貴之家奢僭過度第宅車服宜為之等制又國之興亡在冢嗣之善惡冢嗣之善惡在教諭之得失冢大也周禮疏曰冢大之上也冢知隴翻髙宗文成皇帝嘗謂羣臣曰朕始學之日年尚㓜冲情未能専既臨萬機不遑温習今日思之豈唯予咎抑亦師傅之不勤尚書李訢免冠謝訢許斤翻此近事之可鍳者也臣謂宜凖古立師傅之官以訓𨗳太子葢此時恂之失徳已著故彪有是言又漢置常平倉以救匱乏見二十七卷漢宣帝五鳳四年去嵗京師不稔移民就豐既廢營生困而後逹又於國體實有虚損曷若豫儲倉粟安而給之豈不愈於驅督老弱餬口千里之外哉餬音胡說文曰寄食鬻也余據正考父鼎銘饘於是粥於是以餬余口則餬者食饘粥之義許慎所謂寄食者葢因左傳餬口於四方以為說今此當依許義宜析州郡常調九分之二京師度支嵗用之餘調徒弔翻度徒洛翻各立官司年豐糴粟積之於倉儉則加私之二糶之於人糶他弔翻如此民必力田以取官絹積財以取官粟年登則常積嵗凶則直給數年之中穀積而人足雖災不為害矣又宜於河表七州人中擢其門才引令赴闕依中州官比隨能序之河表七州秦雍岐華陜河涼也以下文懐江漢歸有道之情證之則七州當謂荆兖豫洛青徐齊也河表直謂大河之外門才者因其世家叙其才用中州謂代都東至海南距大河諸州比毗至翻比例也一可以廣聖朝均新舊之義朝直遥翻二可以懐江漢歸有道之情又父子兄弟異體同氣罪不相及乃君上之厚恩至於憂懼相連固自然之恒理也恒户登翻無情之人父兄繫獄子弟無慘惕之容子弟逃刑父兄無愧恧之色恧女六翻宴安榮位遊從自若車馬衣冠不變華飾骨肉之恩豈當然也臣愚以為父兄有犯宜令子弟素服肉袒詣闕請罪子弟有坐宜令父兄露板引咎乞解所司若職任必要不宜許者慰勉留之如此足以敦厲凡薄使人知所恥矣又朝臣遭親䘮者假滿赴職朝直遥翻假古訝翻時魏不聽朝臣終䘮給假而已衣錦乘軒從郊廟之祀衣於既翻鳴玉垂緌同慶賜之燕緌如佳翻傷人子之道虧天地之經愚謂凡遭大父母父母䘮者皆聽終服若無其人職業有曠者則優㫖慰諭起令視事但綜司出納敷奏而已國之吉慶一令無預其軍旅之警墨縗從役春秋時晉襄公居文公之䘮墨縗絰以敗秦師於殽自是之後以墨縗從戎縗倉回翻雖愆於禮事所宜行也魏主皆從之由是公私豐贍雖時有水旱而民不困窮魏遣兵擊百濟為百濟所敗陳夀曰三韓凡七十八國百濟其一也據李延夀史其先以百家濟海後浸強盛以立國故曰百濟晉世句麗畧有遼東百濟亦據有遼西晉平二郡地七年春正月辛亥上祀南郊大赦魏主祀南郊始備大駕漢儀大駕公卿奉引太僕御大將軍驂乘屬車八十一乘備千乘萬騎祀天郊丼泉乃備之謂之丼泉鹵簿東都惟大行備大駕晉中朝大駕鹵簿先象車鼓吹一部十三人中道次静室令駕一中道式道候二人駕一分左右次洛陽尉二人騎分左右次洛陽亭長九人赤車駕