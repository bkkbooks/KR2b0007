front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷四十二宋司馬光撰胡三省音註漢紀三十四起上章攝提格盡旃蒙協洽凡六年世祖光武皇帝中之止建武六年春正月丙辰以舂陵郷為章陵縣世世復徭役比豐沛復方目翻吳漢等㧞胊斬董憲龎萌江淮山東悉平據范紀是年馬成等㧞舒獲李憲呉漢等㧞朐斬董憲龐萌蓋獲李憲則江淮平斬董憲龎萌則山東平也㧞胊之上逸㧞舒事諸將還京師置酒賞賜還從宣翻又如字帝積苦兵間以隗囂遣子内侍公孫述逺據邊垂乃謂諸將曰且當置此兩子於度外耳因休諸將於雒陽分軍士於河内數騰書隴蜀告示禍福説文曰騰𫝊也數所角翻公孫述屢移書中國自陳符命冀以惑衆帝與述書曰圗讖言公孫即宣帝也宣帝有公孫病已之符代漢者姓當塗其名髙君豈髙之身邪乃復以掌文為瑞述刻其掌文曰公孫帝自言手文有竒復扶又翻王莽何足效乎王莽自陳符命遣五威將帥班之天下君非吾賊臣亂子倉卒時人皆欲為君事耳卒讀曰猝君日月已逝謂已老也妻子弱小當早為定計天下神器不可力爭宜留三思署曰公孫皇帝述不答其騎都尉平陵荆邯説述曰漢髙祖起於行陳之中兵破身困者數矣然軍敗復合瘡愈復戰邯下甘翻説輸芮翻行户剛翻陳讀曰陣數所角翻復扶又翻下同何則前死而成功愈於却就於滅亡也隗囂遭遇運㑹割有雍州兵彊士附威加山東賢曰隴西天水皆雍州之地故言割有囂傳曰名震西州流聞山東是威加也雍於用翻遇更始政亂復失天下衆庶引領四方瓦解囂不及此時推危乗勝推吐雷翻以爭天命而退欲為西伯之事尊師章句賔友處士處昌吕翻偃武息戈卑辭事漢喟然自以文王復出也令漢帝釋關隴之憂賢曰以囂居西無東之意故置之度外而不為憂專精東伐四分天下而有其三發間使召攜貳賢曰間使謂來歙馬援等也攜貳謂王遵鄭興杜林牛邯等相次而歸光武間古莧翻使西州豪桀咸居心於山東則五分而有其四若舉兵天水必至沮潰沮在呂翻天水旣定則九分而有其八陛下以梁州之地益州禹貢梁州之域也内奉萬乗外給三軍百姓愁困不堪上命將有王氏自潰之變矣賢曰王氏即王莽也臣之愚計以為宜及天下之望未絶豪桀尚可招誘誘音酉急以此時發國内精兵令田戎據江陵臨江南之㑹倚巫山之固瓚曰巫山在今䕫州巫山縣東築壘堅守傳檄吳楚長沙以南必隨風而靡令延岑出漢中定三輔天水隴西拱手自服如此海内震搖冀有大利述以問羣臣博士吳柱曰武王伐殷八百諸侯不期同辭然猶還師以待天命武王伐紂至于孟津諸侯不期而㑹者八百皆曰紂可伐矣武王曰汝未知天命乃還未聞無左右之助而欲出師千里之外者也邯曰今東帝無尺土之柄東帝謂光武驅烏合之衆跨馬陷敵所向輙平不亟乗時與之分功而坐談武王之説是復效隗囂欲為西伯也述然邯言欲悉發北軍屯士及山東客兵述倣漢制亦置北軍山東之人僑寓於蜀者述以為兵故曰客兵使延岑田戎分出兩道與漢中諸將合兵并埶蜀人及其弟光以為不宜空國千里之外決成敗於一舉固爭之述乃止延岑田戎亦數請兵立功述終疑不聽唯公孫氏得任事述廢銅錢置鐵錢貨幣不行百姓苦之為政苛細察於小事如為清水令時而已好改易郡縣官名少嘗為郎哀帝時述以父任為郎好呼到翻少詩沼翻習漢家故事出入灋駕鸞旗旄騎又立其兩子為王食犍為廣漢各數縣犍居言翻或諫曰成敗未可知戎士暴露而先王愛子先王于況翻示無大志也述不從由此大臣皆怨為述亡國張本馮異自長安入朝帝謂公卿曰是我起兵時主簿也帝起兵徇潁川異降以為主簿為吾披荆棘定闗中為于偽翻旣罷賜珍寳錢帛詔曰倉卒蕪蔞亭豆粥虖沱河麥飯事見三十九卷更始二年卒與猝同厚意乆不報異稽首謝曰臣聞管仲謂桓公曰願君無忘射鉤臣無忘檻車齊國頼之史記管仲射桓公中鉤後魯桎梏管仲而送於齊公以為相説􅁐曰管仲桎梏檻車中非無愧也自裁也新序曰齊桓公與管仲飲酣管仲上夀曰願君無忘出奔於莒也臣亦無忘束縳於魯也此云射鉤檻車義亦通射而亦翻臣今亦願國家無忘河北之難東都臣子率謂天子為國家難乃旦翻小臣不敢忘巾車之恩事見三十九卷更始元年留十餘日令與妻子還西申屠剛杜林自隗囂所來囂考異曰本傳云七年徵剛按明年已臣公孫述必不用詔書當在此年帝皆拜侍御史以鄭興為太中大夫三月公孫述使田戎出江關地理志江關都尉治巴郡魚復縣賢曰華陽國志曰巴楚相攻故置江關舊在赤甲城後移在江州南岸對白帝城故基在今䕫州魚復縣南招其故衆欲以取荆州不克帝乃詔隗囂欲從天水伐蜀囂上言白水險阻棧閣敗絶賢曰白水縣有關屬廣漢郡棧閣者山路懸險棧木為閣道又公孫述傳註曰白水關在漢陽西縣梁州記曰關城西南有白水關余據水經白水出隴西臨洮縣西南西傾山東南流入隂平又東南經廣漢白水縣臨洮與西縣接界故天水之西縣有白水關而廣漢之白水縣亦有白水關自源徂流同一白水也賢曰梁州記曰關城西南百八十里有白水關故關城在今梁州金牛縣西述性嚴酷上下相患須其罪惡孰著而攻之此大呼響應之埶也須待也孰古熟字通用人大呼則響必應言俟其上下乖離而攻之必有為内應者呼火故翻帝知其終不為用乃謀討之夏四月丙子上行幸長安郡國志長安在雒陽西九百五十里謁園陵遣耿弇葢延等七將軍從隴道伐蜀先使中郎將來歙奉璽書賜囂諭㫖囂復多設疑故歙許及翻璽斯氏翻疑疑難故事故也復扶又翻事乆冘豫不決賢曰冘豫不定之意也説文曰冘冘行貌也音滛余按冘讀與猶同毛晃曰冘字從犬曲其足古與尤字同唐史以冘豫之冘音滛者誤也歙遂發憤質責囂曰賢曰質正也國家以君知臧否曉廢興否音鄙故以手書暢意足下推忠誠旣遣伯春委質囂子恂字伯春質職日翻賢曰委質猶屈膝也又音摯而反欲用佞惑之言為族滅之計邪因欲前刺囂刺七亦翻囂起入部勒兵將殺歙歙徐杖節就車而去囂使牛邯將兵圍守之邯下甘翻囂將王遵諫曰君叔雖單車逺使而陛下之外兄也來歙字君叔賢曰光武之姑子故曰外兄使疏吏翻殺之無損於漢而隨以族滅昔宋執楚使遂有析骸易子之禍左傳楚使申舟聘齊不假道於宋華元曰過我而不假道鄙我也乃殺之楚子聞之遂圍宋宋人易子而食析骸而㸑小國猶不可辱況於萬乗之主重以伯春之命哉重直用翻歙為人有信義言行不違及往來游説皆可按覆行下孟翻説輸芮翻西州士大夫皆信重之多為其言為于偽翻故得免而東歸五月己未車駕至自長安隗囂遂發兵反使王元據隴坻師古曰坻音丁計翻又音底伐木塞道塞悉則翻諸將因與囂戰大敗各引兵下隴囂追之急馬武選精騎為後拒殺數千人諸軍乃得還還從宣翻又如字六月辛夘詔曰夫張官置吏所以為民也為于偽翻今百姓遭難户口耗少難乃旦翻少詩沼翻而縣官吏職所置尚繁其令司𨽻州牧各實所部所部郡縣名考覈其實也省減吏員縣國不足置長吏者并之於是并省四百餘縣吏職減損十置其一九月丙寅晦日有食之執金吾朱浮上䟽曰昔堯舜之盛猶加三考賢曰考謂考其功最也尚書舜典曰三載考績三考黜陟幽明大漢之興亦累功效吏皆積乆至長子孫如倉氏庫氏之類是也長知兩翻下同當時吏職何能悉治論議之徒豈不喧譁葢以為天地之功不可倉卒艱難之業當累日也而間者守宰數見換易卒與猝同數所角翻迎新相代疲勞道路尋其視事日淺未足昭見其職旣加嚴切人不自保廹於舉劾劾户槩翻懼於刺譏故爭飾詐偽以希虚譽斯所以致日月失行之應也夫物暴長者必夭折功卒成者必亟壞夭於紹翻卒讀曰猝如摧長乆之業而造速成之功非陛下之福也願陛下遊意於經年之外望治於一世之後孔子曰如有王者必世而後仁三十年為一世治直吏翻天下幸甚帝采其言自是牧守代易頗簡十二月壬辰大司空宋𢎞免癸巳詔曰頃者師旅未解用度不足故行十一之税謂十分而税其一也今糧儲差積其令郡國收見田租三十税一如舊制賢曰景帝二年令田租三十而税一今依景帝故云舊制見賢遍翻諸將之下隴也帝詔耿弇軍漆賢曰漆縣名屬右扶風故城在今􅃎州新平縣漆水在西馮異軍栒邑祭遵軍汧賢曰汧水名因以名縣屬右扶風故城在今隴州汧城縣南汧苦堅翻吳漢等還屯長安馮異引軍未至栒邑隗囂乗勝使王元行廵將二萬餘人下隴行姓也姓譜周有大行人之官其後氏焉分遣廵取栒邑異即馳兵欲先據之諸將曰虜兵盛而乗勝不可與爭鋒宜止軍便地徐思方畧異曰虜兵臨境忸􅏸小利賢曰忸􅏸猶慣習也謂慣習前事而復為之爾雅曰忸復也郭景純曰謂慣忸復為之也忸尼丑翻􅏸音逝遂欲深入若得栒邑三輔動搖夫攻者不足守者有餘孫武子之言今先據城以逸待勞非所以爭也濳往閉城偃旗鼔行廵不知馳赴之異乗其不意卒擊鼓建旗而出卒讀曰猝廵軍驚亂奔走追擊大破之祭遵亦破王元於汧於是北地諸豪長耿定等悉畔隗囂降長知兩翻詔異進軍義渠義渠縣屬北地郡古義渠戌地也擊破盧芳將賈覽匈奴奥鞬日逐王北地上郡安定皆降奧音郁鞬居言翻竇融復遣其弟友上書曰臣幸得託先后末屬謂孝文竇皇后之親屬也復扶又翻累世二千石臣復假厯將帥守持一隅復扶又翻故遣劉鈞口陳肝膽事見上卷上年自以底裏上露長無纖介賢曰底裏皆露言無藏隠而璽書盛稱蜀漢二主三分鼎足之權任囂尉佗之謀竊自痛傷臣融雖無識無知利害之際順逆之分豈可背眞舊之主事姦偽之人分扶問翻背蒲妹翻廢忠貞之節為傾覆之事棄已成之基求無冀之利此三者雖問狂夫猶知去就而臣獨何以用心謹遣弟友詣闕口陳至誠友至髙平賢曰髙平縣屬安定後改為平髙今原州縣㑹隗囂反道不通乃遣司馬席封間道通書姓譜席其先姓籍避項羽諱改姓席氏帝復遣封賜融友書所以尉藉之甚厚尉與慰同尉安也藉薦也尉以安於身上藉以安於身下融乃與隗囂書曰將軍親遇厄㑹之際國家不利之時賢曰謂漢遭王莽簒奪也守節不囘承事本朝融等所以欣服高義願從役於將軍者良為此也為于偽翻而忿悁之間悁恚也吉縣翻躁急也改節易圗委成功造難就委棄也就成也百年累之一朝毁之豈不惜乎殆執事者貪功建謀以至於此言隗囂執政事者貪有其功而立此逆謀也當今西州地埶局廹民兵離散易以輔人易以豉翻下同難以自建計若失路不反聞道猶迷不南合子陽則北入文伯耳夫負虚交而易彊禦負恃也易輕也恃遠救而輕近敵未見其利也自兵起以來城郭皆為丘墟生民轉於溝壑幸頼天運少還而將軍復重其難復扶又翻下同難乃旦翻是使積痾不得遂瘳㓜孤將復流離言之可為酸鼻庸人且猶不忍況仁者乎融聞為忠甚易得宜實難憂人太過以徳取怨謂憂之之過而言之甚切將以為徳而反以取怨也知且以言獲罪也囂不納融乃與五郡太守共砥厲兵馬上䟽請師期帝深嘉美之融即與諸郡守將兵入金城擊囂黨先零羌封何等大破之更始時先零羌封何諸種殺金城太守據其郡囂賂遺封何與結盟欲發其衆零音憐因並河揚威武賢曰並蒲浪翻伺候車駕時大兵未進融乃引還帝以融信效著明益嘉之脩理融父墳墓祠以太牢融祖父墳墓在扶風數馳輕使致遺四方珍羞遺以四方珍羞既以厚融且示四方來服能致逺物也數所角翻遺于季翻梁綂猶恐衆心疑惑乃使人刺殺張𤣥張𤣥隗囂使刺七亦翻遂與隗囂絶皆解所假將軍印綬先是馬援聞隗囂欲貳於漢先悉薦翻數以書責譬之囂得書増怒及囂發兵反援乃上書曰臣與隗囂本實交友初遣臣東謂臣曰本欲為漢為于偽翻願足下往觀之於汝意可即專心矣及臣還反報以赤心實欲導之於善非敢譎以非義而囂自挟姦心盜憎主人左傳晉伯宗妻曰盜憎主人民惡其上怨毒之情遂歸於臣臣欲不言則無以上聞願聽詣行在所極陳滅囂之術帝乃召之援具言謀畫帝因使援將突騎五千往來游説囂將髙峻任禹之屬下及羌豪為陳禍福説輸芮翻為于偽翻説客單車往使足矣光武遣馬援將突騎五千欲耀兵威以示隴右諸將使訹而來以離囂支黨援又為書與囂將楊廣使曉勸於囂曰援竊見四海已定兆民同情而季孟閉拒背畔為天下表的隗囂字季孟賢曰表猶標也言為標表的謂射的也言背畔之罪為天下所指射也背蒲妹翻常懼海内切齒思相屠裂故遺書戀戀以致惻隠之計遺于季翻乃聞季孟歸罪於援而納王游翁諂邪之説賢曰王元字游翁據隗囂傳元字惠孟游翁盖其别字也因自謂函谷以西舉足可定所謂以九泥封函谷関也以今而觀竟何如邪援間至河内間古莧翻過存伯春存存問也時囚囂子恂於河内伯春恂字也見其奴吉從西方還説伯春小弟仲舒望見吉欲問伯春無它否竟不能言曉夕號泣號戸刀翻又説其家悲愁之狀不可言也夫怨讎可刺不可毁援聞之不自知泣下也援素知季孟孝愛曽閔不過夫孝於其親豈不慈於其子可有子抱三木而跳梁妄作自同分羹之事乎賢曰三木者謂桎梏及械也分羹謂樂羊也余謂此正引髙帝答項羽之事季孟平生自言所以擁兵衆者欲以保全父母之國而完墳墓也又言茍厚士大夫而已即其所常言以感人悟物者而窮其本情而今所欲全者將破亡之所欲完者將傷毁之所欲厚者將反薄之季孟嘗折隗子陽而不受其爵事見上卷四年賢曰愧猶辱也今更共陸陸往附之賢曰陸陸猶碌碌也將難為顔乎言將有慙色也若復責以重質當安從得子主給是哉言蜀若復責質子當何從得子以為質也復扶又翻質音致往時子陽獨欲以王相待而春卿拒之今者歸老更欲低頭與小兒曹共槽􅌴而食併肩側身於怨家之朝乎歸入也言其年已入老境也字林曰併音卑正翻朝直遥翻今國家待春卿意深宜使牛孺卿與諸耆老大人共説季孟牛邯字孺卿説輸芮翻若計畫不從真可引領去矣前披輿地圗見天下郡國百有六所奈何欲以區區二邦以當諸夏百有四乎二邦謂隴西天水夏戸雅翻春卿事季孟外有君臣之義内有朋友之道言君臣邪固當諫爭語朋友邪應有切磋賢曰骨曰切象曰磋言朋友之道如切磋以成器也豈有知其無成而但萎腇咋舌义手從族乎賢曰萎腇耎弱也萎音於罪翻腇音乃罪翻咋吐格翻齧也及今成計殊尚善也過是欲少味矣賢曰以食為喻少詩沼翻且來君叔天下信士朝廷重之其意依依常獨為西州言為于偽翻援商朝廷尤欲立信於此商度也必不負約援不得乆留願急賜報廣竟不答諸將毎有疑議更請呼援咸敬重焉更工衡翻隗囂上䟽謝曰吏民聞大兵卒至卒讀曰猝驚恐自救臣囂不能禁止兵有大利不敢廢臣子之節親自追還此因王元隴坻之㨗而有嫚書也昔虞舜事父大杖則走小杖則受賢曰家語孔子謂曽子之辭臣雖不敏敢忘斯義今臣之事在於本朝賜死則死加刑則刑如更得洗心死骨不朽有司以囂言慢請誅其子帝不忍復使來歙至汧復扶又翻汧苦堅翻賜囂書曰昔柴將軍云陛下寛仁諸侯雖有亡叛而後歸輙復位號不誅也髙帝時柴武與韓王信書之言今若束手復遣恂弟歸闕庭者則爵禄獲全有浩大之福矣吾年垂四十在兵中十嵗厭浮語虚辭即不欲勿報囂知帝審其詐遂遣使稱臣於公孫述使疏吏翻匈奴與盧芳為㓂不息帝令歸徳侯颯使匈奴以脩舊好颯使匈奴見三十九卷更始二年颯音立好呼到翻單于驕倨雖遣使報命而㓂暴如故七年春三月罷郡國輕車騎士材官令還復民伍漢官儀曰髙祖命天下郡國選能引關蹷張材力武猛者以為輕車騎士材官平地用車騎山阻用材官公孫述立隗囂為朔寧王賢曰欲其寧靜北邉也遣兵往來為之援埶張形埶以為之援也癸亥晦日有食之詔百僚各上封事其上書者不得言聖上時掌翻太中大夫鄭興上䟽曰夫國無善政則謫見日月賢曰謫責也音直革翻見賢遍翻要在因人之心擇人處位處昌呂翻今公卿大夫多舉漁陽太守郭伋可大司空者而不以時定道路流言咸曰朝廷欲用功臣功臣用則人位謬矣人不稱其位位不宜其人也願陛下屈已從衆以濟羣臣讓善之功賢曰濟成也頃年日食多在晦先時而合皆月行疾也日君象而月臣象君亢急而臣下促廹故月行疾亢苦浪翻今陛下髙明而羣臣惶促宜留思柔克之政垂意洪範之灋賢曰克能也柔克謂和柔而能立事也尚書洪範曰髙明柔克帝躬勤政事頗傷嚴急故興奏及之夏四月壬午大赦五月戊戌以前將軍李通為大司空大司農江馮上言宜令司𨽻校尉督察三公司空掾陳元上䟽曰臣聞師臣者帝賔臣者霸元王莽厭難將軍陳欽之子賢曰言以臣為師以臣為賔也故武王以太公為師齊桓以夷吾為仲父近則髙帝優相國之禮太宗假宰輔之權賢曰蕭何為相國髙祖賜劍履上殿入朝不趨太宗孝文也申屠嘉召責鄧通孝文令人謝嘉故曰假權也及亡新王莽遭漢中衰專操國柄以偷天下操于髙翻況已自喻不信羣臣奪公輔之任損宰相之威以刺舉為明激訐為直至乃陪僕告其君長子弟變其父兄王莽時開吏告其將奴婢告其主變者上變告之也陪僕猶左傳所謂陪臺也毛晃曰陪臺臣也盖古者家臣謂之陪臣故家之臣僕謂之陪僕長知兩翻㒺密灋峻大臣無所措手足然不能禁董忠之謀事見三十九卷更始元年身為世戮方今四方尚擾天下未一百姓觀聽咸張耳目陛下宜修文武之聖典襲祖宗之遺徳勞心下士屈節待賢誠不宜使有伺察公輔之名帝從之酒泉太守竺曾以弟報怨殺人東觀記曰曾弟嬰報怨殺屬國侯王𦙍等自免去郡竇融承制拜曾武鋒將軍更以辛肜為酒泉太守更工衡翻肜余中翻秋隗囂將歩騎三萬侵安定至隂槃賢曰隂槃縣名屬安定郡今涇州縣宋白曰滑州潘原縣漢隂槃縣地馮異率諸將拒之囂又令别將下隴攻祭遵於汧並無利而還考異曰帝紀六年冬隗囂將行廵冦扶風馮異拒破之馮異傳六年夏諸將上隴為隗囂所敗乃詔異軍栒邑未及至囂乗勝使王元行廵將二萬人下隴分遣廵取栒邑異即先據栒邑破廵又云祭遵亦破王元於汧隗囂傳侵三輔事亦同按此文勢緣諸將才敗還隗囂即遣二將追之故得云乗勝又云馮異未及至栒邑也然則馮異祭遵之破王元行廵實在六年明矣至十年八月紀又有隗囂㓂安定馮異祭遵擊却之此即隗囂傳所書秋囂侵安定至隂槃馮異拒之又令别將攻祭遵於汧兵並無利者也據此是囂兩嵗各嘗攻馮異祭遵矣故遵傳亦云數挫隗囂也而袁紀不載六年事併在七年秋紀之且傳云囂乗勝若事已一年安可云乗勝又馮異何緣稽緩爾乆不至栒邑故知袁紀誤矣帝將自征隗囂先戒竇融師期㑹遇雨道斷且囂兵已退乃止帝令來歙以書招王遵遵來降降户江翻下同拜太中大夫封向義侯冬盧芳以事誅其五原太守李興兄弟其朔方太守田颯颯音立守式又翻下同雲中太守喬扈各舉郡降前代錄匈奴貴姓喬氏代為輔相帝令領職如故帝好圗讖讖楚譛翻與鄭興議郊祀事曰吾欲以讖斷之好呼到翻斷下亂翻何如對曰臣不為讖帝怒曰卿不為讖非之邪興惶恐曰臣於書有所未學而無所非也帝意乃解南陽太守杜詩郡國志南陽郡在雒陽南七百里政治清平治直吏翻興利除害百姓便之又修治陂池治直之翻廣拓土田郡内比室殷足比薄必翻又毗至翻時人方於召信臣方比也召信臣事見二十九卷元帝竟寧元年召讀曰邵南陽為之語曰前有召父後有杜母八年春來歙將二千餘人伐山開道從番須囘中徑襲畧陽賢曰畧陽縣名屬天水郡故城在今秦州隴城縣西北番音盤宋白曰畧陽道在隴城縣東六十里即故冀城魏黄初中改為隴城時隗囂居冀以地理考之當從宋説斬隗囂守將金梁姓譜金古金天氏之後又漢金日磾本匈奴休屠王子以祭天金人為金氏囂大驚曰何其神也帝聞得畧陽甚喜曰畧陽囂所依阻心腹已壞則制其支體易矣易以䜴翻呉漢等諸將聞歙據畧陽爭馳赴之上以為囂失所恃亡其要城埶必悉以精鋭來攻曠日乆圍而城不拔士卒頓敝乃可乗危而進皆追漢等還隗囂果使王元拒隴坻行廵守番須口王孟塞雞頭道賢曰雞頭山道也一名崆峝山在原州西塞悉則翻牛邯軍瓦亭賢曰安定烏氏縣有瓦亭故關有瓦亭川水在今原州南杜佑曰瓦亭關在唐原州之蕭關蕭關漢朝那縣地邯下甘翻囂自悉其大衆數萬人圍畧陽公孫述遣將李育田弇助之斬山築堤激水灌城來歙與將士固死堅守矢盡發屋斷木以為兵斷丁管翻下同囂盡鋭攻之累月不能下夏閏四月帝自將征隗囂光禄勲汝南郭憲諫曰東方初定車駕未可遠征乃當車拔佩刀以斷車靷靷在馬胷音𦙍帝不從西至漆漆縣屬右扶風以漆水名縣杜佑曰新平漢漆縣地諸將多以王師之重不宜逺入險阻計冘豫未決冘與猶同帝召馬援問之援因説隗囂將帥有土崩之埶兵進有必破之狀説如字又於帝前聚米為山谷指畫形執開示衆軍所從道徑往來分析昭然可曉帝曰虜在吾目中矣明旦遂進軍至髙平第一郡國志髙平縣有第一城竇融率五郡太守及羌虜小月氏等歩騎數萬月氏為匈奴所破餘種西踰葱嶺其不能去者保南山號小月氏氏音支輕重五千餘兩重直用翻兩音亮與大軍㑹是時軍旅草創諸將朝㑹禮容多不肅朝直遥翻融先遣從事問㑹見儀適賢曰猶言儀注余謂適當也㑹見之儀各有當也見賢遍翻帝聞而善之以宣告百僚乃置酒高㑹待融等以殊禮殊異也絶也謂待之之禮異絶於羣臣也遂共進軍數道上隴上時掌翻使王遵以書招牛邯下之拜邯太中大夫於是囂大將十三人屬縣十六地理志天水郡十六縣衆十餘萬皆降囂將妻子犇西城從楊廣賢曰西城縣名屬漢陽郡一名始昌城在今秦州上邽縣西南余據地理志西縣本屬隴西郡後乃改屬漢陽西城者西縣城也以西城為縣名誤矣明帝永平十七年方改天水為漢陽而田弇李育保上邽上邽縣屬天水郡弇古含翻畧陽圍解帝勞賜來歙勞力到翻班坐絶席在諸將之右專席而坐於諸將之上不與諸坐者並也賜歙妻縑千匹毛晃曰縑并絲繒又絹也進幸上邽詔告隗囂曰若束手自詣父子相見保無他也若遂欲為黥布者亦自任也謂必不歸降如黥布云欲為帝亦任之也囂終不降於是誅其子恂使吳漢岑彭圍西城耿弇蓋延圍上邽以四縣封竇融為安豐侯融封安豐陽泉蓼安風四縣皆屬廬江郡弟友為顯親侯郡國志漢陽郡有顯親縣賢曰故城在今秦州成紀縣東南帝置顯親縣以封友褒顯竇氏有孝文皇后之親也及五郡太守皆封列侯竺曽助義侯梁統成義侯史苞褒義侯庫鈞輔義侯辛肜扶義侯遣西還所鎮融以乆專方靣懼不自安數上書求代數所角翻下同詔報曰吾與將軍如左右手耳數執謙退何不曉人意勉循士民循撫循也順也無擅離部曲離智力翻潁川盜賊羣起㓂沒屬縣河東守兵亦叛京師騷動郡國志潁川郡在雒陽東南五百里河東郡在雒陽西北五百里帝聞之曰吾悔不用郭子横之言郭憲字子横秋八月帝自上邽晨夜東馳賜岑彭等書曰兩城若下便可將兵南擊蜀虜人苦不知足旣平隴復望蜀復扶又翻下同每一發兵頭須為白言苦心於軍事也須與鬚同古字通用九月乙夘車駕還宫帝謂執金吾㓂恂曰潁川迫近京師近其靳翻當以時定惟念獨卿能平之耳從九卿復出以憂國可也對曰潁川聞陛下有事隴蜀故狂狡乗間相詿誤耳賢曰狡猾也間古莧翻説文曰詿亦誤也音卦如聞乗與南向乗䋲證翻賊必惶怖歸死怖普布翻臣願執鋭前驅帝從之庚申車駕南征潁川盜賊悉降㓂恂竟不拜郡百姓遮道曰願從陛下復借㓂君一年恂前為潁川太守故云復借也乃留恂長社長社縣屬潁川郡應劭曰宋人圍長葛是也其社中樹暴長更名長社師古曰長讀如字鎮撫吏民受納餘降降户江翻東郡濟隂盜賊亦起郡國志東郡去雒陽八百餘里濟隂郡在雒陽東八百里濟子禮翻帝遣李通王常擊之以東光侯耿純嘗為東郡太守東光縣屬渤海郡賢曰今滄州縣威信著於衛地東郡衛地也遣使拜太中大夫使與大兵㑹東郡東郡聞純入界盜賊九千餘人皆詣純降大兵不戰而還璽書復以純為東郡太守璽斯氏翻戊寅車駕還自潁川安丘侯張歩將妻子逃犇臨淮與弟𢎞藍欲招其故衆乗船入海琅邪太守陳俊追討斬之冬十月丙午上行幸懐十一月乙丑還雒陽楊廣死隗囂窮困其大將王㨗别在戎丘水經註戎丘城在西城西北戎溪水逕其南登城呼漢軍曰為隗王城守者皆必死無二心為于偽翻願諸軍亟罷請自殺以明之遂自刎死刎扶粉翻初帝敕吳漢曰諸郡甲卒但坐費糧食若有逃亡則沮敗衆心沮在呂翻敗蒲邁翻宜悉罷之漢等貪并力攻囂遂不能遣糧食日少吏士疲役逃亡者多岑彭壅谷水灌西城城未沒丈餘㑹王元行廵周宗將蜀救兵五千餘人乗髙卒至卒讀曰猝鼔譟大呼曰百萬之衆方至漢軍大驚未及成陳呼火故翻陳讀曰陣元等决圍殊死戰遂得入城迎囂歸冀吳漢軍食盡乃燒輜重引兵下隴蓋延耿弇亦相隨而退重直用翻蓋古盍翻囂出兵尾擊諸營尾撃謂尋其後而擊之也岑彭為後拒諸將乃得全軍東歸唯祭遵屯汧不退汧口堅翻呉漢等復屯長安岑彭還津鄉於是安定北地天水隴西復反為囂為于偽翻校尉太原温序為囂將茍宇所獲姓譜唐叔虞之子受封於河内温因以命族又郤至食采於温號温季因以為族據序傳序為䕶羌校尉行部至襄武為茍宇所獲考異曰按序傳及袁紀皆稱序為䕶羌校尉檢西羌傳九年方置此官牛邯為之又云邯卒職省則序無緣作䕶羌今但云校尉宇曉譬數四欲降之序大怒叱宇等曰虜何敢迫脅漢將因以節撾殺數人撾職𤓰翻擊也宇衆爭欲殺之宇止之曰此義士死節可賜以劍序受劍銜須於口顧左右曰旣為賊所殺無令須汙土汙烏故翻遂伏劒而死從事王忠持其䘮歸雒陽詔賜以冢地拜三子為郎十二月髙句麗王遣使朝貢帝復其王號王莽貶髙句麗為侯今復其王號句音如字又音駒又巨俱翻是嵗大水九年春正月潁陽成侯祭遵薨於軍潁陽縣屬潁川郡詔馮異并將其營遵為人亷約小心克己奉公賞賜盡與士卒約束嚴整所在吏民不知有軍取士皆用儒術對酒設樂必雅歌投壺賢曰雅歌謂歌雅詩也禮記投壺經曰壺頸脩七寸腹脩五寸口徑二寸半容斗五升壺中實小豆馬為其矢之躍而出也矢以柘若棘長二尺八寸無去其皮取其堅而重投之勝者飲不勝者以為優劣也臨終遺戒薄葬問以家事終無所言帝愍悼之尤甚遵䘮至河南車駕素服臨之望哭哀慟還幸城門閲過䘮車涕泣不能已䘮禮成復親祠以太牢復扶又翻下同詔大長秋謁者河南尹䕶䘮事大司農給費皇后卿曰將行秦官也景帝中六年更名大長秋師古曰秋者收成之時長者恒乆之義故以為皇后官名西都或用中人或用士人東都之後純用閹人矣至葬車駕復臨之旣葬又臨其墳存見夫人室家其後朝㑹帝毎歎曰安得憂國奉公如祭征虜者乎遵為征虜將軍衛尉銚期曰陛下至仁哀念祭遵不已羣臣各懐慚懼言帝念祭遵屢以為言羣臣愧不如遵各懐懼也銚音姚帝乃止隗囂病且餓餐糗糒鄭康成曰糗熬大豆與米也糒乾飯糗去乆翻又丘救翻糒音備恚憤而卒恚於避翻卒子恤翻王元周宗立囂少子純為王總兵據冀公孫述遣將趙匡田弇助純帝使馮異擊之公孫述遣其翼江王田戎大司徒任滿南郡太守程汎將數萬人下江關任音壬擊破馮駿等軍遂拔巫及夷道夷陵五年岑彭留馮駿軍江州分屯夷道夷陵巫縣亦屬南郡因據荆門虎牙水經註曰江水東厯荆門虎牙之間荆門山在南上合下開其狀似門虎牙山在北石壁色紅間有白文類牙故以名也此二山楚之西塞也賢曰在今峡州夷陵縣東南宜都縣西北今猶有故城基址在山上横江水起浮橋關樓立櫕柱以絶水道關樓范書作闘僂猶今城上敵樓也櫕徂官翻叢木為柱曰櫕柱又作管翻結營跨山以塞陸路塞悉則翻拒漢兵夏六月丙戌帝幸緱氏登轘轅緱氏縣屬河南尹縣有緱氏山轘轅山轘轅坂並在雒陽之東南緱工矦翻轘音環吳漢率王常等四將軍兵五萬餘人擊盧芳將賈覽閔堪於髙栁髙栁縣屬代郡賢曰故城在今雲州定襄縣水經註曰髙栁在代中其山重巒疊巘霞舉雲髙連山隠隠東出遼塞匈奴救之漢軍不利於是匈奴轉盛鈔暴日增鈔楚交翻詔朱祜屯常山王常屯涿郡破姦將軍侯進屯漁陽以討虜將軍王霸為上谷太守以備匈奴帝使來歙悉監䕶諸將屯長安監古銜翻太中大夫馬援為之副歙上書曰公孫述以隴西天水為藩蔽故得延命假息息氣息也今二郡平蕩則述智計窮矣宜益選兵馬儲積資糧今西州新破兵人疲饉若招以財榖則其衆可集臣知國家所給非一用度不足然有不得已也帝然之於是詔於汧積榖六萬斛秋八月來歙率馮異等五將軍討隗純於天水驃騎將軍杜茂與賈覽戰於繁畤賢曰繁畤縣屬鴈門郡今代州縣畤音止余按唐代州繁畤雖存漢縣名然非古繁畤也茂軍敗績諸羌自王莽末入居塞内金城屬縣多為所有隗囂不能討因就慰納發其衆與漢相拒司徒掾班彪上言續漢志司徒掾屬三十一人掾比三百石屬比二百石今涼州部皆有降羌降户江翻羌胡被髪左祍而與漢人雜處習俗旣異言語不通數為小吏黠人所見侵奪窮恚無聊故致反叛夫蠻夷㓂亂皆為此也被皮義翻處昌呂翻數所角翻黠下八翻為于偽翻舊制益州部置蠻夷騎都尉武帝開西南夷置一都尉幽州部置領烏桓校尉涼州部置䕶羌校尉皆持節領䕶應劭曰漢官䕶烏桓䕶羌校尉比二千石擁節長史一人司馬二人皆六百石校户教翻治其怨結治直之翻嵗時廵行行下孟翻問所疾苦又數遣使譯通導動静使塞外羌夷為吏耳目州郡因此可得警備今宜復如舊以明威防帝從之以牛邯為䕶羌校尉盜殺隂貴人母鄧氏及弟訢訢許靳翻帝甚傷之封貴人弟就為宣恩侯帝追爵貴人父陸為宣恩哀侯以就嗣哀侯後漢舊制惟皇后父封侯貴人未正位中宫而追爵其父非舊也復召就兄侍中興欲封之置印綬於前興固讓曰臣未有先登陷陳之功復扶又翻陳讀曰陣而一家數人竝蒙爵土令天下觖望賢曰觖音羌志翻前書音義曰觖猶冀也一音决猶望之也誠所不願帝嘉之不奪其志貴人問其故興曰夫外戚家苦不知謙退嫁女欲配侯王取婦眄睨公主取讀曰娶愚心實不安也富貴有極人當知足夸奢益為觀聽所譏貴人感其言深自降挹以器俯而取水曰挹人之謙下者亦曰挹卒不為宗親求位卒子恤翻為于偽翻帝召㓂恂還以漁陽太守郭伋為潁川太守伋招降山賊趙宏召吳等數百人皆遣歸附農附農者附於農籍也召讀曰邵因自劾專命賢曰謂擅放降賊也劾户槩翻帝不以咎之後宏吳等黨與聞伋威信逺自江南或從幽冀不期俱降駱驛不絶莎車王康卒弟賢立攻殺拘彌西夜王拘彌即前漢之扞罙唐曰寧彌西夜國去雒陽萬四千四百里而使康兩子王之王于况翻十年春正月吳漢復率捕虜將軍王霸等四將軍六萬人出髙栁擊賈覽復扶又翻匈奴數千騎救之連戰於平城下平城縣屬鴈門郡破走之夏陽節侯馮異等馮異傳云封異陽夏侯賢曰夏音賈馬武𫝊末列二十八將官位姓名曰夏陽侯馮異陽夏縣屬淮陽郡夏陽縣屬左馮翊未知孰是夏陽之夏户雅翻與趙匡田弇戰且一年皆斬之隗純未下諸將欲且還休兵異固持不動共攻落門天水冀縣有落門聚有落門山賢曰在今渭州隴西縣東南未拔夏異薨於軍秋八月己亥上幸長安初隗囂將安定髙峻擁兵據髙平第一帝之上隴也遣馬援招降峻及吳漢等軍退峻亡歸故營復助囂拒隴坻建威大將軍耿弇等圍之一嵗不拔帝自將征之㓂恂諫曰長安道里居中賢曰從雒陽至髙平長安為中應接近便安定隴西必懐震懼此從容一處可以制四方也從千容翻今士馬疲倦方履險阻非萬乗之固也前年潁川可為至戒帝不從進幸汧峻猶不下帝遣㓂恂往降之降戸江翻下同恂奉璽書至第一峻遣軍師皇甫文出謁辭禮不屈恂怒將誅之諸將諫曰髙峻精兵萬人率多彊弩西遮隴道連年不下今欲降之而反戮其使使疏吏翻無乃不可乎恂不應遂斬之遣其副歸告峻曰軍師無禮已戮之矣欲降急降不欲固守峻惶恐即日開城門降諸將皆賀因曰敢問殺其使而降其城何也恂曰皇甫文峻之腹心其所取計者也今來辭意不屈必無降心全之則文得其計殺之亡其膽謂文死則峻亡其膽也是以降耳諸將皆曰非所及也冬十月來歙與諸將攻破落門周宗行廵茍宇趙恢等將隗純降王元犇蜀徙諸隗於京師以東隗純降而徙其族以其西州彊宗恐其後復能為變也後隗純與賔客亡入胡至武威捕得誅之先零羌與諸種㓂金城隴西零音憐種章勇翻來歙率蓋延等進擊大破之蓋古盍翻斬首虜數千人於是開倉廪以賑飢乏隴右遂安而涼州流通焉涼州諸郡至京師皆須度隴隴右安則涼州之路流通庚寅車駕還宫十一年春三月己酉帝幸南陽南考異曰帝紀己酉幸陽庚午車駕還宫上有二月己卯袁紀三月己酉幸南陽以長厯考之二月壬申朔己夘八日也己酉庚午皆在三月盖帝紀己酉上脱三月字今從袁紀還幸章陵庚午車駕還宫岑彭屯津鄉數攻田戎等不克數所角翻帝遣吳漢率誅虜將軍劉隆等三將發荆州兵凡六萬餘人騎五千匹與彭㑹荆門彭裝戰船數千艘艘蘇遭翻吳漢以諸郡棹卒多費糧榖欲罷之棹卒持棹行船者也彭以為蜀兵盛不可遣上書言狀帝報彭曰大司馬習用歩騎不曉水戰荆門之事一由征南公為重而已彭為征南大將軍故稱為征南公閏月岑彭令軍中募攻浮橋先登者上賞於是偏將軍魯竒應募而前時東風狂急魯竒船逆流而上直衝浮橋上時掌翻而櫕柱有反杷鉤反杷鉤者既鉤住敵船使不得退又逆拒之使不得進也竒船不得去竒乗埶殊死戰因飛炬焚之風怒火盛橋樓崩燒岑彭悉軍順風並進所向無前蜀兵大亂溺死者數千人斬任滿生獲程汎而田戎走保江州彭上劉隆為南郡太守先以隆守南郡而上奏也上時掌翻自率輔威將軍臧宫驍騎將軍劉歆長驅入江關華陽國志巴楚相攻故置江關舊在赤甲城後移在江川南岸對白帝城故城在今䕫州魚復縣南即古捍關也杜佑曰巴山縣古扞關如此則别是一處令軍中無得虜掠所過百姓皆奉牛酒迎勞彭復讓不受勞力到翻復扶又翻百姓大喜争開門降降户江翻詔彭守益州牧所下郡輙行太守事彭若出界即以太守號付後將軍後將軍者將兵繼彭後而進者也選官屬守州中長吏彭到江州以其城固糧多難卒拔卒讀曰猝留馮駿守之自引兵乗利直指墊江攻破平曲賢曰墊江縣名屬巴郡今忠州縣也按宋白續通典忠州墊江縣本後漢臨江縣地後魏恭帝分臨江置墊江縣合州石鏡縣本漢墊江縣凡合州管下諸縣皆漢墊江地也墊音徒協翻平曲地闕收其米數十萬石吳漢留夷陵裝露橈繼進爾雅曰檝謂之橈露橈謂露檝在外人在船中橈音饒夏先零羌㓂臨洮臨洮縣屬隴西郡零音憐洮音韜來歙薦馬援為隴西太守郡國志隴西郡在雒陽西二千二百二十里擊先零羌大破之公孫述以王元為將軍使與領軍環安拒河池姓譜環姓也楚環列尹之後又楚有賢者環淵河池縣屬武都郡六月來歙與蓋延等進攻元安大破之遂克下辨辨皮莧翻乗勝遂進蜀人大懼使刺客刺歙未殊未殊謂未絶也客刺七亦翻馳召蓋延延見歙因伏悲哀不能仰視歙叱延曰虎牙何敢然延為虎牙大將軍故以虎牙稱之今使者中刺客無以報國中竹仲翻下同故呼巨卿欲相屬以軍事蓋延字巨卿屬之欲翻而反效兒女子涕泣乎刃雖在身不能勒兵斬公邪延牧淚強起受所誡強其兩翻歙自書表曰臣夜人定後日入而羣動息故甲夜謂之人定為何人所賊傷中臣要害何人謂不知何人也臣不敢自惜誠恨奉職不稱以為朝廷羞稱尺證翻夫理國以得賢為本太中大夫段襄骨鯁可任賢曰骨鯁謂正直也説文曰鯁魚骨也食骨留咽中為鯁願陛下裁察又臣兄弟不肖終恐被罪陛下哀憐數賜教督被皮義翻數所角翻投筆抽刃而絶凡為人所刺者刃在身猶未死抽刃則氣絶矣帝聞大驚省書攬涕省悉景翻以揚武將軍馬成守中郎將代之歙䘮還洛陽乗輿縞素臨弔送葬乗䋲證翻趙王良從帝送歙䘮還入夏城門雒陽十二城門夏門位在亥與中郎將張邯爭道叱邯旋車又詰責門候百官志城門校尉掌雒陽十二城門毎門候一人邯下甘翻使前走數千歩司𨽻校尉鮑永劾奏良無藩臣禮大不敬良尊戚貴重而永劾之劾户槩翻又戸得翻朝廷肅然永辟扶風鮑恢為都官從事百官志司𨽻校尉從事吏十二人都官從事主察舉百官犯法者蔡質漢儀曰都官主雒陽朝㑹與三府掾同恢亦抗直不避彊禦帝嘗曰貴戚且歛手以避二鮑永行縣到霸陵司𨽻校尉主三河三輔𢎞農霸陵縣屬京兆行下孟翻路經更始墓下拜哭盡哀而去西至扶風椎牛上茍諫冢茍諫保䕶鮑永事見三十六卷更始二年上時掌翻帝聞之意不平問公卿曰奉使如此何如武帝置十三州刺史皆部使者也司𨽻今出所部故言奉使使疏吏翻太中大夫張湛對曰仁者行之宗忠者義之主也仁不遺舊忠不忘君行之髙者也行下孟翻帝意乃釋帝自將征公孫述秋七月次長安公孫述使其將延岑呂鮪王元公孫恢悉兵拒廣漢及資中廣漢縣屬廣漢郡賢曰資中縣名屬犍為郡其地在今資州資陽縣宋白曰資州諸縣皆漢資中地磐石縣資州治所漢資中故城也又遣將侯丹率二萬餘人拒黄石賢曰即黄石灘也水經注曰江水自涪陵東出百里而屇于黄石在今涪州涪陵縣杜佑曰今謂之横石灘岑彭使臧宮將降卒五萬從涪水上平曲拒延岑涪音浮杜佑音符水經涪水出廣漢屬國剛氏道徼外東南流逕涪縣北又東南逕綿竹縣北即臧宫遡涪至平陽鄉之地涪水又東南與建始水合水發平洛郡西溪西南流屈而東西流意此即平曲也上時掌翻自分兵浮江下還江州泝都江而上賢曰都江成都江也宋白曰郫江一名都江一名成都江襲擊侯丹大破之因晨夜倍道兼行二千餘里徑拔武陽賢曰武陽縣屬犍為郡故城在今隆州隆山縣東也又曰故城在今眉州劉昫曰唐陵州仁夀縣漢武陽縣地或曰今眉州眉山彭山縣本漢武陽縣地杜佑曰漢武陽縣故城在嘉州綏山縣東使精騎馳擊廣都去成都數十里賢曰廣都縣名屬蜀郡故城在今益州成都縣東南宋白曰蜀志漢元朔二年置廣都縣隋仁夀元年避煬帝諱改為雙流唐龍朔三年析雙流縣又置廣都縣於舊縣南一十二里埶若風雨所至皆犇散初述聞漢兵在平曲故遣大兵逆之及彭至武陽繞出延岑軍後蜀地震駭述大驚以杖擊地曰是何神也延岑盛兵於沅水帝紀作沈水此作沅承臧宫傳之誤也賢曰水經註曰沈水出廣漢縣下入涪水本或作況水及沅水者並非余據今潼川府通泉縣北有沉水臧宫衆多食少轉輸不至降者皆欲散畔郡邑復更保聚觀望成敗復扶又翻宫欲引還恐為音去聲所反賢曰反音翻㑹帝遣謁者將兵詣岑彭有馬七百匹宫矯制取以自益晨夜進兵多張旗幟登山鼓譟右歩左騎幟昌志翻騎竒寄翻挾船而引呼聲動山谷岑不意漢軍卒至呼火故翻卒讀曰猝登山望之大震恐宫因縱擊大破之斬首溺死者萬餘人水為之濁為于偽翻延岑犇成都其衆悉降降户江翻盡獲其兵馬珍寳自是乗勝追北賢曰人好陽而惡隂北方幽隂之地故軍敗者皆謂之北史記樂書曰北者敗也近代音北為背失其指矣降者以十萬數軍至陽鄉臧宫傳作平陽郷此逸平字水經註曰臧宫泝涪至平陽公孫述將王元降遂拔綿竹涪水經綿竹縣北則平陽郷當在綿竹縣界王元舉衆降帝與公孫述書陳言禍福示以丹青之信述省書太息以示所親太常常少光禄勲張隆皆勸述曰廢興命也豈有降天子哉左右莫敢復言少隆皆以憂死省悉景翻少詩照翻復扶又翻帝還自長安冬十月公孫述使刺客詐為亡奴降岑彭夜刺殺彭刺殺之刺七亦翻太中大夫監軍鄭興領其營以俟吳漢至而授之彭持軍整齊秋豪無犯卭榖王任貴聞彭威信數千里遣使迎降任貴降述事見四十卷元年卭渠恭翻任音壬㑹彭已被害被皮義翻帝盡以任貴所獻賜彭妻子蜀人為立廟祠之為于偽翻馬成等破河池遂平武都郡國志武都郡在雒陽西一千九百里先零諸種羌數萬人屯聚㓂鈔拒浩亹隘零音憐種章勇翻鈔楚交翻浩亹音告門成與馬援深入討擊大破之徙降羌置天水隴西扶風是時朝臣以金城破羌之西破羌縣屬金城郡賢曰故城在今鄯州湟水縣西宋白曰湟水縣本漢破羌縣地後魏得羌地於此置西都縣隋改為湟水塗逺多㓂議欲棄之馬援上言破羌以西城多堅牢易可依固易以䜴翻其田土肥壤賢曰無塊曰壤灌漑流通如令羌在湟中則為害不休不可棄也帝從之民歸者三千餘口援為置長吏繕城郭為于偽翻長知兩翻起塢候字林曰塢小障也字或作嗚一古翻開溝洫洫況域翻勸以耕牧郡中樂業樂音洛又招撫塞外氐羌皆來降附援奏復其侯王君長帝悉從之乃罷馬成軍十二月呉漢自夷陵將三萬人泝江而上伐公孫述上時掌翻郭伋為并州牧過京師過古禾翻帝問以得失伋曰選補衆職當簡天下賢俊不宜專用南陽人是時在位多鄉曲故舊故伋言及之資治通鑑卷四十二
