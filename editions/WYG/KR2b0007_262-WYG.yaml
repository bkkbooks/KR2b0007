body:
  text: 資治通鑑卷二百六十二宋司馬光撰胡三省音註唐紀七十八起上章涒灘盡重光作噩凡二年昭宗聖穆景文孝皇帝中之中光化三年春正月宣州將康儒攻睦州宣州將田頵所遣將也錢鏐使其從弟銶拒之從才用翻銶音求二月庚申以西川節度使王建兼中書令壬申加威武節度使王審知同平章事壬午以吏部尚書崔𦙍同平章事充清海節度使李克用大發軍民治晉陽城塹愳朱全忠之攻逼也治直之翻押牙劉延業諫曰大王聲振華夷宜揚兵以嚴四境不宜近治城塹損威望而啓冦心克用謝之賞以金帛夏四月加定難軍節度使李承慶同平章事難乃旦翻朱全忠遣葛從周帥兖鄆滑魏四鎮兵十萬擊劉仁恭帥讀曰率五月庚寅拔徳州斬刺史傅公和己亥圍劉守文於滄州仁恭復遣使卑辭厚禮求援於河東復扶又翻李克用遣周徳威將五千騎出黄澤攻邢洺以救之黄澤關在遼州遼山縣黄澤嶺邕州軍亂逐節度使李鐬懿宗咸通三年升邕管經畧使為嶺南西道節度使鐬呼㑹翻鐬借兵鄰道討平之六月癸亥加東川節度使王宗滌同平章事司空門下侍郎同平章事王摶明達有度量時稱良相以其時言之稱為良相所謂彼善於此也上素疾宦官樞密使宋道弼景務修專横横户孟翻崔𦙍日與上謀去宦官去羌吕翻宦官知之由是南北司益相憎嫉各結藩鎮為援以相傾奪摶恐其致亂從容言於上曰從千容翻人君當務明大體無所偏私宦官擅權之弊誰不知之顧其埶未可猝除宜俟多難漸平以道消息難乃旦翻以道消息者言惡者以漸殺其埶則久而自消善者以漸培其根則久而自長願陛下言勿輕泄以速姦變𦙍聞之譛摶於上曰王摶姦邪已為道弼輩外應上疑之及𦙍罷相去年𦙍罷相見上卷意摶排已愈恨之及出鎮廣州遺朱全忠書具道摶語是年二月出𦙍廣州摶語即從容言於上者遺唯季翻令全忠表論之全忠上言𦙍不可離輔弼之地上時掌翻下連上同離力智翻摶與敕使相表裏同危社稷表連上不已上雖察其情迫於全忠不得已𦙍至湖南復召還復扶又翻丁卯以𦙍為司空門下侍郎同平章事摶罷為工部侍郎以道弼監荆南軍務修監青州軍監古衘翻戊辰貶摶溪州刺史己巳又貶崖州司户道弼長流驩州務修長流愛州是日皆賜自盡摶死於藍田驛道弼務修死於霸橋驛藍田驛在藍田縣霸橋驛在長安城南近霸橋於是𦙍專制朝政埶震中外朝直遥翻宦官皆側目不勝其憤為劉季述韓全誨之亂張本勝音升劉仁恭將幽州兵五萬救滄州營於乾寧軍乾寜軍在滄州西一百里葢乾寜間始置此軍也宋白曰乾寜軍本古盧臺軍地後為馮橋鎮臨御河之岸接滄幽二州之界周顯徳六年收復關南始建為乾寧軍九域志云太平興國七年始置軍葛從周留張存敬氏叔琮守滄州寨自將精兵逆戰於老鵶堤老鵶堤在乾寧軍東南大破仁恭斬首三萬級仁恭走保瓦橋瓦橋在涿州歸義縣南至莫州三十里宋白曰瓦橋亦謂之瓦子濟橋在涿州南易州東周顯徳收復二關以其地控幽薊建為雄州秋七月李克用復遣都指揮使李嗣昭將兵五萬攻邢洺以救仁恭敗汴軍於内丘復扶又翻敗補邁翻下同范成大北使録内丘縣至邢州三十五里考異曰唐太祖紀年録七月嗣昭攻堯山至内丘遇汴軍三千戰敗之擒其將李瓌薛居正五代史後唐紀與紀年録同惟唐末見聞録八月二十五日嗣昭領馬步五萬取馬嶺進軍下山東某日山東告㨗收得洺州九月二日嗣昭兵士失利却回新紀八月庚辰陷洺州薛史唐紀九月嗣昭弃城歸葢據此也按編遺録八月中云前月二十五日上於毬場饗士忽有大風占者云賊風果於是時李進通領蕃冦出攻洺州然則嗣昭出兵乃七月二十五日也編遺録又曰八月乙丑出兵救洺州乙丑九日也又進通敗奔歸太原在八月見聞録誤今從編遺録紀年録梁紀王鎔遣使和解幽汴㑹乆雨朱全忠召從周還滄州下濕雨水難以駐軍且欲救邢洺故召還庚戌以昭義留後孟遷為節度使甲寅以西川節度使王建兼東川信武軍兩道都指揮制置等使時置武信軍於遂州信武當作武信王建兼指揮制置兩道則可以制宗滌宗佶葢諷朝廷以此命之八月李嗣昭又敗汴軍于沙門河沙門河疑當作沙河即邢州沙河縣也并考異曰編遺録七月二十五日李進通領蕃㓂出州來攻洺州八月乙丑發大軍救應之上尋亦自領衙軍相繼北征翌日達滑臺軍前馳報洺州已陷刺史朱紹宗因踰堞墮而傷足為賊所擒唐太祖紀年録八月李嗣昭又遇汴軍於沙門河擊而敗之進攻洺州刺史朱紹宗挈其族夜遁我師追及擒之唐末見聞録八月二十五日嗣昭進軍下山東某日山東告㨗收得洺州捉得刺史朱温姪男舊紀八月庚辰嗣昭攻洺州下之薛史梁紀八月河東遣李進通襲陷洺州新紀亦在庚辰乃二十五日也實録在九月約奏到今從編遺録進攻洺州乙丑朱全忠引兵救之未至嗣昭拔洺州擒刺史朱紹宗全忠命葛從周將兵擊嗣昭宣州將康儒食盡自清溪遁歸康儒是年正月攻睦州清溪漢歙縣地後分置新安縣隋改為雉山文眀元年復為新安開元二十年改為還淳永貞元年避憲宗名改曰清溪屬睦州九域志縣在州西一百六十六里九月葛從周自鄴縣度漳水營於黄龍鎮朱全忠自將中軍三萬涉洺水置營李嗣昭弃城走弃洺州城而走從周設伏於青山口邀擊大破之歸考異曰唐太祖紀年録葛從周攻洺州嗣昭弃城而是役也王郃郎楊師悦陷賊洺州復為汴有唐末見聞録九月二日嗣昭兵士失利却回被汴州捉到王郃郎編遺録薛居正五代史梁紀八月帝遣葛從周屯黄龍鎮親領中軍涉洺而寨晉人愳而宵遁洺州復平唐紀九月汴帥自將兵三萬圍洺州嗣昭弃城而歸葛從周伏青山口嗣昭軍不利實録九月嗣昭奔洺州敗於青山口今從唐末見聞録唐紀實録又按考異所録唐紀葢後唐紀崔𦙍以太保門下侍郎同平章事徐彦若位在已上惡之惡烏路翻彦若亦自求引去徐彦若可謂知遥増擊而去之之意者時藩鎮皆為彊臣所據惟嗣薛王知柔在廣州知柔鎮廣州見二百六十卷乾寧元年乃求代之乙巳以彦若同平章事充清海節度使初荆南節度成汭以澧朗本其巡屬為雷滿所據肅宗至徳二載置荆南節度領荆澧朗郢復䕫峽忠萬十州其後増領分𨽻不一自雷滿據澧朗又分置武貞軍節度屢求割𨽻荆南朝廷不許汭頗怨望薛史曰汭奏請割𨽻彦若為相執不行汭由是衘之及彦若過荆南汭置酒從容以為言從千容翻彦若曰令公位尊方面自比桓文成汭進中書令故稱之為令公雷滿小盜不能取乃怨朝廷乎汭甚慙丙午中書侍郎兼吏部尚書同平章事崔逺罷守本官以刑部尚書裴贄為中書侍郎同平章事贄坦之弟子也裴坦見二百五十一卷懿宗咸通十年升桂管為靜江軍以經略使劉士政為節度使朱全忠以王鎔與李克用交通移兵伐之自洺州移兵伐趙下臨城踰滹沱攻鎮州南門焚其關城全忠自至元氏鎔懼遣判官周式詣全忠請和全忠盛怒謂式曰僕屢以書諭王公竟不之聴今兵已至此期於無捨式曰鎮州密邇太原鎮州與太原僅隔山耳九域志鎮州西距太原四百三十里困於侵暴李克用自得河東以來屢攻趙四鄰各自保莫相救恤王公與之連和乃為百姓故也為于偽翻下為人為之同今明公果能為人除害則天下誰不聴命豈惟鎮州明公為唐桓文當崇禮義以成霸業若但窮威武則鎮州雖小城堅食足明公雖有十萬之衆未易攻也况王氏秉旄五代庭湊元逵紹鼎紹懿景崇及鎔為五世葢紹鼎紹懿兄弟也共為一世時推忠孝人欲為之死庸可冀乎全忠笑攬式袂延之帳中曰與公戲耳周式之説朱全忠猶屈完之説齊桓公也而當時汴鎮攻守之勢誠亦如此全忠易怒為笑而延之以其言中其要害也乃遣客將開封劉捍入見鎔客將主賓客掌通名賛謁鎔以其子節度副使昭祚及大將子弟為質質音致以文繒二十萬犒軍文繒絹之有文者今謂之花絹全忠引還以女妻昭祚還從宣翻又如字妻七細翻成徳判官張澤言於王鎔曰河東勍敵也勍車京翻今雖有朱氏之援譬如火發於家安能俟逺水乎彼幽滄易定猶附河東不若説朱公乗勝兼服之幽劉仁恭滄劉守文易定王郜説式芮翻下同使河北諸鎮合而為一則可以制河東矣鎔復遣周式往説全忠復扶又翻全忠喜遣張存敬㑹魏博兵擊劉仁恭甲寅拔瀛州冬十月丙辰拔景州執刺史劉仁霸辛酉拔莫州靜江節度使劉士政聞馬殷悉平嶺北湖南之地在五嶺之北大懼遣副使陳可璠屯全義嶺以備之璠孚袁翻武徳四年分始安置臨源縣大厯三年更名全義屬桂州國朝改全義為興安縣在桂州東北一百五十里殷遣使修好於士政好呼到翻可璠拒之殷遣其將秦彦暉李瓊等將兵七千擊士政湖南軍至全義士政又遣指揮使王建武屯秦城范成大桂海虞衡志曰秦城在桂林城北八十里相傳以為始皇發戍五嶺之地城在湘水之南瀜灕二水之間遺址尚存石甃亦無恙城北二十里有嚴關羣山環之鳥道不可方軌秦取百粤以其地為桂林象郡而戍兵乃止湘南葢嶺有喉衿在是稍南又不可以宿兵也可璠掠縣民耕牛以犒軍縣民怨之請為湖南鄉導犒苦到翻鄉讀曰嚮曰此西南有小徑距秦城纔五十里僅通單騎彦暉遣李瓊將騎六十步兵三百襲秦城中宵踰垣而入擒王建武比眀復還􅖞之以練造可璠壁下示之比必利翻及也􅖞充夜翻縶縛也造七到翻可璠猶未之信斬其首投壁中桂人震恐瓊因勒兵擊之擒可璠降其將士二千皆殺之引兵趣桂州趣七喻翻下同自秦城以南二十餘壁皆望風奔潰遂圍桂州數日士政出降乾寜二年劉士政襲據桂州至是而敗桂宜巖栁象五州宜州之地秦屬象郡漢屬交趾日南二郡界後没于蠻唐初開置粤州乾封中更曰宜州皆降於湖南馬殷又兼有桂管志考異曰唐烈祖實録新唐書本紀路振九國楚世家皆云光化二年殷克桂州馬氏行年記及王舉大定録云天復元年惟曹衍湖湘馬氐故事云天復甲子宣晟自安州入桂州天祐四年丁卯十二月收嶺北七州明年十月平桂州差繆極甚新唐書方鎮表光化三年升桂管經畧使為靜江節度使而本紀乾寧二年安州防禦使宣晟陷桂州靜江軍節度使周元靜部將劉士政死之歲月既已倒錯又以士政為元靜部將同死尤為乖誤今据武安節度掌書記林崇禧撰武威王廟碑云我王臨位五嵗而桂林歸款自乾寧三年至光化三年五年矣又與實録合故從之馬殷以李瓊為桂州刺史未幾幾居豈翻表為靜江節度使張存敬攻劉仁恭下二十城將自瓦橋趣幽州道濘不能進濘乃定翻泥淖也乃引兵西攻易定辛巳拔祁州景福二年王處存表以定州無極深澤二縣置祁州殺刺史楊約癸未以保義留後朱友謙為節度使朱全忠請之也張存敬攻定州義武節度使王郜郜居號翻遣後院都知兵馬使王處直將兵數萬拒之唐中世以來方鎮多置後院兵處昌吕翻處直請依城為柵俟其師老而擊之孔目官梁汶曰昔幽鎮兵三十萬攻我汶音問薛史作問僖宗光啟元年幽州李可舉鎮州王鎔攻王處存事見二百五十六卷于時我軍不滿五千一戰敗之敗補邁翻今存敬兵不過三萬我軍十倍於昔奈何示怯欲依城自固乎郜乃遣處直逆戰于沙河沙河在新城北望都縣南易定兵大敗死者過半餘衆擁處直奔還甲申王郜弃城奔晉陽王處存素睦於晉又昏姻也故郜奔之軍中推處直為留後存敬進圍定州丙申朱全忠至城下處直登城呼曰呼火故翻本道事朝廷甚忠義武自張存忠以來事朝廷最為忠順於公未嘗相犯何為見攻全忠曰何故附河東對曰吾兄與晉王同時立勲謂王處存與李克用同平黄巢立功封疆密邇自定州出飛狐即河東之境且昏姻也修好往來乃常理耳好呼到翻請從此改圖全忠許之定州城池髙深朱全忠知不可猝攻而拔故許其和乃歸辠於梁汶而族之以謝全忠以繒帛十萬犒師全忠乃還仍為處直表求節鉞為于偽翻處直處存之母弟也劉仁恭遣其子守光將兵救定州軍於易水之上易水在易州遂城縣界遂城縣於宋為安肅軍昔燕太子丹送荆軻於易水之上即此地全忠遣張存敬襲之殺六萬餘人由是河北諸鎮皆服於全忠史言河北諸鎮皆覊服於全忠全忠不能并有其地也先是王郜告急於河東先悉薦翻李克用遣李嗣昭將步騎三萬下太行攻懐州拔之行户剛翻進攻河陽河陽留後侯言不意其至狼狽失據嗣昭壊其羊馬城壊音怪城外别立短垣以屏蔽謂之羊馬城㑹佑國軍將閻寳引兵救之河南府佑國軍東北至河陽八十五里力戰於壕外河東兵乃退寳鄆州人也初崔𦙍與帝密謀盡誅宦官及宋道弼景務修死事見上六月宦官益懼上自華州還光化元年上還自華州事見上卷還從宣翻又如字忽忽不樂樂音洛多縱酒喜怒不常左右尤自危於是左軍中尉劉季述右軍中尉王仲先樞密使王彦範薛齊偓等隂相與謀曰主上輕佻多變詐難奉事佻土彫翻專聴任南司時宦官謂之北司謂南牙百官為南司吾輩終罹其禍不若奉太子立之尊主上為太上皇引岐華兵為援岐李茂貞華韓建華户化翻控制諸藩誰能害我哉十一月上獵苑中禁苑在宫城北因置酒夜醉歸手殺黄門侍女數人明旦日加辰巳宫門不開季述詣中書白崔𦙍曰宫中必有變我内臣也得以便宜從事請入視之乃帥禁兵千人破門而入帥讀曰率訪問具得其狀出謂𦙍曰主上所為如是豈可理天下廢昏立眀自古有之為社稷大計非不順也𦙍畏死不敢違庚寅季述召百官陳兵殿庭陳兵以脅百官也作𦙍等連名狀請太子監國以示之使署名𦙍及百官不得已皆署之監古衘翻上在乞巧樓按劉季述傳乞巧樓在思𤣥門内近思政殿季述仲先伏甲士千人於門外即宣化門外與宣武進奏官程巖等十餘人入請對季述仲先甫登殿將士大呼呼火故翻突入宣化門至思政殿前逢宫人輒殺之上見兵入驚墮床下起將走季述仲先掖之令坐宫人走白皇后后趨至拜請曰軍容勿驚宅家有事取軍容商量量音良今人謂議事為商量季述等乃出百官狀白上曰陛下厭倦大寳中外羣情願太子監國請陛下保頥東宫頥養也言於少陽院自保養也上曰昨與卿曹樂飲不覺太過樂音洛何至於是對曰此非臣等所為皆南司衆情不可遏也願陛下且之東宫之往也待事小定復迎歸大内耳后曰宅家趣依軍容語趣讀曰促即取傳國寳以授季述宦官扶上與后同輦嬪御侍從者纔十餘人從才用翻適少陽院季述以銀檛畫地數上曰檛側加翻數所具翻俗從上聲某時某事汝不從我言其罪一也如此數十不止歴數之至數十不止乃手鎖其門鎔鐵錮之錮音固遣左軍副使李師䖍將兵圍之上動靜輒白季述穴牆以通飲食凡兵器針刀皆不得入上求錢帛俱不得求紙筆亦不與時大寒嬪御公主無衣衾號哭聞於外號户刀翻聞音問季述等矯詔令太子監國迎太子入宫日考異曰按此月乙酉朔己丑五日庚寅六也廢立之日舊紀云庚寅舊宦者傳唐年補紀皆云六日無云五日者而實録新紀云己丑誤也唐太祖紀年録先云六日後云七日尤誤也崔𦙍所恃者昭宗耳季述議廢立安肯即從之補録紀年録言脅之以兵是也唐補紀云皇后穴牆取太子又云令㫖宣告大臣與社稷為主又云后白軍容令聖上養疾皆程匡柔為宦者諱耳不可信也辛卯矯詔令太子嗣位更名縝更工衡翻下同縝止忍翻以上為太上皇皇后為太上皇后甲午太子即皇帝位更名少陽院曰問安宫季述加百官爵秩與將士皆受優賞欲以求媚於衆殺睦王倚倚上弟也凡宫人左右方士僧道為上所寵信者皆榜殺之榜音彭每夜殺人晝以十車載尸出一車或止一兩尸欲以立威將殺司天監胡秀林武徳四年改太史監曰太史局有令有丞髙宗龍朔二年改太史局曰祕書閣局令曰祕書閻郎中武后光宅元年改太史局曰渾天監俄改曰渾儀監長安二年復曰太史局中宗景龍二年改太史局曰太史監乾元元年改曰司天臺置監一人正三品掌察天文稽歴數秀林曰軍容幽囚君父更欲多殺無辜乎季述憚其言正而止季述欲殺崔𦙍而憚朱全忠但解其度支鹽鐵轉運使而已强考異曰舊傳劉季述畏朱全忠之不敢殺崔𦙍但罷知政事落使務守本官而已𦙍復致書於全忠請出師返正故全忠令張存敬急攻晉絳河中按舊紀新紀新宰相表此際皆無𦙍罷相事全忠攻晉絳河中乃在明年返正後今不取左僕射致仕張濬在長水乾寧三年上復欲相張濬以李克用言而止濬遂致仕居長水宋白曰長水本漢盧氏縣地後魏延昌二年分盧氏東境庫谷已西沙渠谷已東為南陜縣北有陜縣故名南陜廢帝元年改為長淵以縣東洛水長淵為名唐以犯唐祖諱改名長水九域志在河南府西二百四十里見張全義於洛陽勸之匡復又與諸藩鎮書勸之進士無棣李愚客華州上韓建書畧曰僕每讀書見父子君臣之際有傷教害義者恨不得肆之市朝上時掌翻朝直遥翻下並同明公居近關重鎮葢謂華州控扼潼關距關為近君父幽辱月餘坐視凶逆而忘勤王之舉僕所未諭也僕竊計中朝輔弼雖有志而無權外鎮諸侯雖有權而無志惟明公忠義社禝是依往年車輅播遷號泣奉迎累歲供饋再復廟朝謂乾寧三年迎上駐蹕華州光化元年歸長安也廟朝謂宗廟朝廷也號户刀翻義感人心至今謌詠此時事勢尤異前日明公地處要衝處昌吕翻位兼將相自宫闈變故已涉旬時旬時即旬日也若不號令率先以圖反正遲疑未決一朝山東侯伯唱義連衡衡讀曰横鼓行而西明公求欲自安其可得乎言山東勤王之師若至華州韓建亦不得安其位矣其後朱全忠攻岐遂徙建許州卒如李愚之言此必然之勢也不如馳檄四方諭以逆順軍聲一振則元凶破膽旬浹之間二豎之首傳於天下旬浹謂一日二日至于十日浹即恊翻二竪謂劉季述王仲先計無便於此者建雖不能用厚待之愚堅辭而去朱全忠在定州行營聞亂丁未南還十二月戊辰至大梁季述遣養子希度詣全忠許以唐社稷輸之又遣供奉官李奉本以太上皇誥示全忠劉季述矯為之誥也全忠猶豫未決㑹僚佐議之或曰朝廷大事非藩鎮所宜預知天平節度副使李振獨曰王室有難難乃旦翻此霸者之資也今公為唐桓文安危所屬李振以齊桓晉文諂朱全忠屬之欲翻季述一宦竪耳乃敢囚廢天子公不能討何以復令諸侯復扶又翻且㓜主位定則天下之權盡歸宦官矣是以太阿之柄授人也全忠大悟即囚希度奉本遣振如京師詗事詗火迥翻又翾正翻既還又遣親吏蔣𤣥暉如京師與崔𦙍謀之又召程巖赴大梁五考異曰薛居正代史李振十一月太祖遣振入奏於長安邸吏程巖白振曰劉中尉命其姪希貞來計大事既至巖乃先啓曰主上嚴急内官憂恐左中尉欲行廢黜敢以事告振顧希貞曰百歲奴事三歲主亂國不義廢君不祥非敢聞也况梁王以百萬之師匡輔天子幸熟計之希貞大沮而去振復命劉季述果作亂程巖率諸道邸吏牽帝下殿以立㓜主振至陜陜已賀矣護軍韓彛範言其事振曰懿皇初昇遐韓中尉殺長立㓜以利其權遂亂天下今將軍復欲爾邪彛範即文約孫也由是不敢言編遺録上雖聞其事未知摭實但懐憤激丁未上離定州軍前十二月戊辰達大梁欲潜謀返正乃遣李振偵視其事振迴益詳其宜也尋馳蔣𤣥暉與崔𦙍密圖大義薛史梁紀季述幽昭宗立徳王裕為帝仍遣其養子希度來言為以唐之神器輸於帝時帝方在河朔聞之遽還于汴大計未決㑹李振自長安使回因言於帝云云帝悟因請振復使于長安與時宰潜謀返正按季述廢立之前李振若已嘗立異今豈敢復入長安與崔𦙍謀返正乎今從編遺録注曰貞明中史臣李琪張衮郗殷象馮錫嘉修撰太祖實録事多漏略敬翔别纂成三十卷補其闕號曰大梁編遺録又按唐太祖紀年録及舊張濬傳皆云濬勸諸藩匡復而梁實録及李振傳皆云濬勸全忠附中官與紀年録及舊傳相違恐梁實録誤振傳据實録也唐補紀曰自監國居位將及五旬牋表不來朝野驚虞亢旱時多虹蜺背璚崔𦙍覩其不祥便謀内變潜行書檄於關外播楊辭舌於街衢朱全忠封崔𦙍檄書併手扎等與季述云彼已翻覆早宜别圖無何季述以此書示于崔𦙍曰比來同匡社稷却為鬭亂藩方不審相公何至於此𦙍唯云無此事遭人反圖刻蠟偽名自古乃有軍容若行怪怒則乞俯存家族季述乃與言誓相保始終𦙍其夜便致書謝全忠云昨以丹誠諮撓尊聴却䝉封示左軍劉公其人已知意㫖今日與𦙍設盟不相損害然逺託令公為主方應保全兼送女僕二人細馬兩匹全忠覧書大詬曰劉季述我與伊同王事十二三年兄弟之故特令報渠不能自謀却示崔相道我兩頭三面直是難容我若不殺此公不姓朱也乃擲於地囚其使者走一健步直申崔公從兹與大梁同謀大事按崔𦙍曏來内倚昭宗外挾全忠與宦官為敵今昭宗既廢𦙍所以得未死者以與全忠親密故也全忠安肯以其書示季述季述恨𦙍深入骨髓若得此書立當殺𦙍豈肯復以示𦙍而與之盟誓也此殊不近人情皆由程匡柔黨宦官疾𦙍之亂耳清海節度使薛王知柔薨是歲加楊行密兼侍中睦州刺史陳晟卒弟詢自稱刺史太子即位累旬藩鎮牋表多不至王仲先性苛察素知左右軍多積弊及為中尉鉤校軍中錢榖得隱沒為姦者痛捶之捶止橤翻急徴所負將士頗不安有鹽州雄毅軍使孫徳昭為左神䇿指揮使自劉季述廢立常憤惋不平惋烏貫翻崔𦙍聞之遣判官石戩與之遊判官度支鹽鐵判官也戩即棧翻徳昭每酒酣必泣戩知其誠乃密以𦙍意説之曰自上皇幽閉中外大臣至于行間士卒孰不切齒説式芮翻行户剛翻今反者獨季述仲先耳公誠能誅此二人迎上皇復位則富貴窮一時忠義流千古茍狐疑不決則功落它人之手矣徳昭謝曰徳昭小校校户教翻國家大事安敢專之茍相公有命不敢愛死戩以白𦙍𦙍割衣帶手書以授之徳昭復結右軍清逺都將董彦弼周承誨清逺都亦神䇿五十四都之一復扶又翻謀以除夜伏兵安福門外以俟之天復元年是年四月方改元春正月乙酉朔王仲先入朝至安福門孫徳昭擒斬之馳詣少陽院叩門呼曰呼火故翻逆賊已誅請陛下出勞將士勞力到翻何后不信曰果爾以其首來徳昭獻其首上乃與后毁扉而出扉門扇也崔𦙍迎上御長樂門樓新書儀衞志太極宫端門曰承天門承天門分為東西廊下門自東廊下入長樂門自西廊下入永安門凡朝㑹之仗門内各有挾門隊樂音洛帥百官稱賀帥讀曰率周承誨擒劉季述王彦範繼至方詰責已為亂梃所斃詰去吉翻梃徒鼎翻薛齊偓赴井死出而斬之滅四人之族并誅其黨二十餘人宦官奉太子匿于左軍獻傳國寳上曰裕㓜弱為凶豎所立非其罪也命還東宫黜為徳王復名裕裕之為宦官所立也更名縝今復其舊名丙戌以孫徳昭同平章事充靜海節度使靜海軍安南孫徳昭遥領也賜姓名李繼昭丁亥崔𦙍進位司徒𦙍固辭上寵待𦙍益厚己丑朱全忠聞劉季述等誅折程巖足折而設翻薛史梁紀曰昭宗之廢也汴之邸吏程巖牽昭宗衣下殿帝召巖至汴折其足至長安殺之械送京師并劉希度李奉本等皆斬於都市由是益重李振李振請誅劉季述等見上庚寅以周承誨為嶺南西道節度使賜姓名李繼誨董彦弼為寧逺節度賜姓李並同平章事與李繼昭俱留宿衞十日乃出還家即句休之制也賞賜傾府庫時人謂之三使相未幾周承誨董彦弼復朋比宦官獨孫徳昭不肯爾癸巳進朱全忠爵東平王守考異曰舊紀二月以全忠中書令進封梁王薛居正五代史梁紀正月癸巳進封帝為梁王酬返正之功也實録癸巳沛郡王朱全忠加定謀宣力功臣進封東平王新紀二月辛未封全忠為梁王按編遺録此年二月辛未表讓梁王三年二月制云兔苑名邦睢陽奥壤光膺簡冊大啓封疆可守太尉中書令進封梁王或者今年已曽封梁王全忠讓不受改封東平王至三年乃進封梁王而三年制辭前官爵已稱梁王葢誤也今從實録丙午敕近年宰臣延英奏事樞密使侍側爭論紛然既出又稱上㫖未允復有改易橈權亂政復扶又翻橈奴教翻或奴巧翻自今並依大中舊制俟宰臣奏事畢方得升殿承受公事大中故事凡宰相對延英兩中尉先降樞密使侯㫖殿西宰相奏事已畢樞密使案前受事賜兩軍副使李師度徐彦孫自盡皆劉季述之黨也鳯翔彰義節度使李茂貞來朝加茂貞守尚書令唐自太宗以尚書令即阼不復授人郭子儀有大功雖授之而不敢受王行瑜怙强力雖求之而終不獲葢君臣上下猶知守先朝之法也今以授李茂貞唐法蕩然於此極矣兼侍中進爵岐王劉季述王仲先既死崔𦙍陸扆上言上時掌翻禍亂之興皆由中官典兵乞令𦙍主左軍扆主右軍則諸侯不敢侵陵王室尊矣上猶豫兩日未決李茂貞聞之怒曰崔𦙍奪軍權未得已欲翦滅諸侯上召李繼昭李繼誨李彦弼謀之皆曰臣等累世在軍中未聞書生為軍主若屬南司必多所變更更工衡翻不若歸之北司為便上乃謂𦙍扆曰將士意不欲屬文臣卿曹勿堅求於是以樞密使韓全誨鳯翔監軍使張彦𢎞為左右中尉全誨亦前鳯翔監軍也為韓全誨刧上幸鳯翔張本又徴前樞密使致仕嚴遵美為兩軍中尉觀軍容處置使遵美曰一軍猶不可為况兩軍乎按新書宦者傳嚴遵美嘗歴左神䇿觀軍容使故云然處昌呂翻固辭不起以袁易簡周敬容為樞密使李茂貞辭還鎮崔𦙍以宦官典兵終為肘腋之患欲以外兵制之諷茂貞留兵三千于京師充宿衛以茂貞假子繼筠將之左諫議大夫萬年韓偓以為不可𦙍曰兵自不肯去非留之也偓曰始者何為召之邪𦙍無以應新書韓偓傳𦙍召李茂貞入朝使留族子繼筠宿衞故斥言之而𦙍無以應偓於角翻偓曰留此兵則家國兩危不留則家國兩安𦙍不從李繼筠卒與宦官劫帝幸鳯翔考異曰唐補紀曰其月八日李茂貞朝覲留二千人在右街侍衞而回崔𦙍申朱全忠請三千人在南坊宅側安下鳯翔劫駕西去朱全忠又闇以車子載器仗稱是紬絹進奉推車子人皆是官健入崔𦙍宅中人心驚惶不同前後崔𦙍累差人喚召朱全忠不到新傳韓全誨等知崔𦙍必除已乃已因諷茂貞留選士四千宿衞以李繼徽總之𦙍亦諷朱全忠納兵二千居南司以婁敬思領之盖取唐補紀耳按韓偓金鑾密記偓對昭宗云當留兵之時臣五六度與崔𦙍力爭𦙍曰某實不留兵是兵不肯去臣曰其初何用召來又𦙍云且喜岐兵只留三千人據此則是𦙍召茂貞入朝仍留其兵也又舊紀梁實録編遺録薛居正五代史梁紀等諸書皆不言全忠嘗遣兵宿衞京師若如唐補紀所言岐汴各遣兵數千人戍京師則昭宗欲西幸時兩道兵必先鬭於闕下不則汴兵皆為宦官所誅不則先遁去今皆無此事葢程匡柔得於傳聞又黨於宦官深疾崔𦙍未足信也然𦙍所以欲留茂貞兵為已援者葢以茂頁自以誅劉季述為已功必能與已同心讐疾宦官以利誘之遂復與宦官為一耳今從金鑾記朱全忠既服河北欲先取河中以制河東己亥召諸將謂曰王珂駑材恃太原自驕汰駑音奴王珂恃李克用翁壻之親而不事朱全忠故云然吾今斷長蛇之腰諸君為我以一繩縛之言河東河中兩鎮連衡以通長安今若取河中是斷李克用之腰也斷丁管翻為于偽翻庚子遣張存敬將兵三萬自汜水度河出含山路以襲之含山在絳州東張濬之敗也出含口至河陽度河西歸即此路全忠以中軍繼其後戊申存敬至絳州晉絳不意其至皆無守備庚戍絳州刺史陶建釗降之釗音昭降户江翻壬子晉州刺史張漢瑜降之全忠遣其將侯言守晉州何絪守絳州絪音因屯兵二萬以扼河東援兵之路朝廷恐全忠西入關急賜詔和解之全忠不從珂遣間使告急于李克用道路相繼間古莧翻克用以汴兵先據晉絳兵不得進九域志太原西南二百六十里至汾州汾州南三百五十里至晉州晉州南百二十五里至絳州絳州西南六十五里至河中府援兵擇便利投間隙而行固不盡由驛道但汴兵已屯晉絳以塞其衝并兵縱由㨗徑得進汴兵遮前險守後要進不得援河中退不得歸太原也珂妻遺李克用書曰遺唯季翻下又遺同兒旦暮為俘虜大人何忍不救克用報曰今賊兵塞晉絳塞悉則翻衆寡不敵進則與汝兩亡不若與王郎舉族歸朝自晉以來婦翁皆呼壻為郎迨今猶然珂又遺李茂貞書言天子新返正詔藩鎮無得相攻同奬王室今朱公不顧詔命首興兵相加其心可見河中若亡則同華邠岐俱不自保同華韓建邠李茂貞養子繼徽岐茂貞所鎮也天子神器拱手授人其埶必然矣公宜亟帥關中諸鎮兵固守潼關赴救河中帥讀曰率僕自知不武願於公西偏授一小鎮此地請公有之關中安危國祚修短繫公此舉願審思之茂貞素無逺圖不報此時李茂貞若能救河中以連河東異時鳯翔必無受圍之困二月甲寅朔河東將李嗣昭攻澤州拔之乙卯張存敬引兵發晉州己未至河中遂圍之王珂埶窮將奔京師而人心離貳㑹浮梁壊流澌塞河舟行甚難浮梁謂蒲津之浮梁也河中府治河東縣架浮梁以通河西縣自此路西入長安塞悉則翻珂挈其族數百欲夜登舟親諭守城者皆不應牙將劉訓曰今人情擾擾若夜出涉河必爭舟紛亂一夫作難事不可知不若且送款存敬徐圖向背珂從之壬戌珂植白幡於城隅難乃旦翻背蒲妹翻植直吏翻又如字遣使以牌印請降於存敬存敬請開城珂曰吾於朱公有家世事分珂父重榮朱全忠以舅事之分扶問翻請公退舍俟朱公至吾自以城授之存敬從之且使走白全忠乙丑全忠至洛陽聞之喜凡用兵者擁强大之衆以臨弱小必曰以此衆戰誰能禦之以此攻城何城不克此以聲形臨敵者也而弱小者能堅力一心而守之以大衆困於堅城之下者亦多矣故善用兵者不以大衆為可恃而以攻城為最下王珂之迎降朱全忠之所以喜也馳往赴之戊辰至虞鄉九域志虞鄉在河中府東六十里先哭於重榮之墓盡哀河中人皆悦珂欲面縛牽羊出迎全忠遽使止之曰太師舅之恩何可忘全忠由重榮歸國故云然若郎君如此使僕異日何以見舅於九泉乃以常禮出迎握手歔欷歔音虚欷音希又許既翻聮轡入城全忠表張存敬為䕶國軍留後王珂舉族遷于大梁僖宗廣明元年王重榮據河中傳兄重盈以及子珂凡二十二年而亡朱全忠自此有河中晉絳其後全忠遣珂入朝遣人殺之于華州全忠聞張夫人疾亟遽自河中東歸張夫人全忠之妻也李克用遣使以重幣請修好於全忠好呼到翻全忠雖遣使報而忿其書辭蹇傲決欲攻之寧考異曰唐末見聞録乾四年六月差軍將發往汴州為使其書云云汴州回書云云據全忠書有前年洹水曽獲賢郎去歲青山又擒列將又云鎮定歸款蒲晉求和則非乾寧四年明矣唐年補録天復元年五月壬午制以朱全忠兼領河中仍詔與太原通和初朝廷以全忠吞併河朔又收下蒲津必恐兵起相侵乃下詔太原夷門使務和好時太原意亦以全忠漸强先以書聘全忠書辭與見聞錄同全忠答太原書又進表云臣與太原曽於頃歲首締歡盟及其偶掇猜嫌止為各爭言氣又云但以來書意㫖未息披攘又云臣詳兹來意益切憤懐不敢遂與通和必恐有孤朝寄已遣諸軍進討訖續寳運録載全忠表云臣當道先自河府抽軍便赴太原進討已累具狀分析聞奏訖臣今月二十三日部領牙隊到東都李克用差到專使張特與臣書一封并駞馬弓箭銀器匹段等與臣通和其張特臣且與回書放歸訖當月河府抽回兵士即勒權於河陽屯駐見排比收復潞州使邐迤赴太原進討次日李克用與臣書一封謹隨狀封進天復四年二月奏其年三月二日表到駕前奉襄宗三月八日敕云云云天復四年尤誤也編遣録天復元年二月李克用遣軍將張特執檄厚幣而來釋憾亦差軍將持函以為報又曰辛巳上欲北回軍便征北虜近者李克用以甘言重幣請通和好遂具事奏聞語與補録同唐太祖紀年録天復元年六月太祖以梁㓂方强難以兵伏陽降心以緩其謀乃遣押牙張特持幣馬書檄以諭之請復舊好書詞大陳北邊五部壬馬之盛皆吾外援朱温視之不懌令敬翔修報詞㫖踈拙人士嗤之薛居正五代史梁紀天復元年二月李克用遣牙將張特來聘帝亦遣使報命李襲吉傳天復中武皇議欲修好於梁命襲吉以貽梁祖書辭與見聞録同其年月日各參差不同據全忠答太原書云今月二十二日使至又上表云先自河府抽軍赴太原又云二十三日到東都則克用書達全忠必在天復元年二月下旬今從編遺録梁紀以翰林學士户部侍郎王溥為中書侍郎同平章事以吏部侍郎裴樞為户部侍郎同平章事溥正雅之從孫也王正雅見二百四十四卷文宗大和五年從才用翻常在崔𦙍幕府故𦙍引之贈諡故睦王倚曰恭哀太子倚為宦官所殺見上年加幽州節度使劉仁恭魏博節度使羅紹威並兼侍中三月癸未朔朱全忠至大梁自河中歸至大梁癸卯遣氏叔琮等將兵五萬攻李克用入自太行魏博都將張文恭入自磁州新口武宗之討劉稹也自遼州開新路達于磁州武安縣故謂之新口葛從周以兖鄆兵㑹成徳兵入自土門洺州刺史張歸厚入自馬嶺義武節度使王處直入自飛狐沈括曰北岳常山之岑謂之大茂山自石晉割燕雲與契丹以大茂山分脊為界飛狐路在大茂山西自銀冶寨北出倒馬關度北界却自石門子令水鋪入缾形梅回兩寨之間至代州今大茂祠中多唐人古碑殿前一亭有李克用題名云太原河東節度使李克用親領步騎五十萬問罪幽陵回師自飛狐路即歸鴈門權知晉州侯言以慈隰晉絳兵入自隂地叔琮入天井關進軍昂車昂車即昂車關在澤州昂車嶺辛亥沁州刺史蔡訓以城降河東都將葢瑋詣侯言降即令權知沁州葢古盍切姓也壬子叔琮拔澤州李存璋弃城走叔琮進攻潞州昭義節度使孟遷降之河東屯將李審建王周將步軍一萬騎二千詣叔琮降叔琮進趣晉陽趣七喻翻夏四月乙卯叔琮出石㑹闗營于洞渦驛洞渦驛臨洞渦水張歸厚引兵至遼州丁巳遼州刺史張鄂降别將白奉國㑹成徳兵自井陘入陘音刑己未拔承天軍與叔琮烽火相應甲戌上謁太廟丁丑赦天下改元雪王涯等十七家王涯等誅夷見二百四十五卷文宗太和九年崔𦙍將誅宦官故先雪王涯等初楊復恭為中尉借度支賣麴一年之利以贍兩軍自是不復肯歸度徒洛翻復扶又翻下同至是崔𦙍草赦草赦文及諸條件欲抑宦官聴酤者自造麴但月輸𣙜酤錢兩軍先所造麴趣令減價賣之過七月無得復賣𣙜訖岳翻酤音故復扶又翻㑹要㑹昌六年九月勑揚州等入道州府置𣙜酤并置官店酤酒代百姓納𣙜酒錢并充資助軍用如有人私酤酒及置私麴者罪止一身不得没入家産葢𣙜酤賣麯本皆屬度支東川節度使王宗滌以疾求代王建表馬步使王宗裕為留後氏叔琮等引兵抵晉陽城下數挑戰數所角翻挑徒了翻城中大恐李克用登城備禦不遑飲食時大雨積旬城多頽壊隨加完補河東將李嗣昭李嗣源鑿暗門夜出攻汴壘屢有殺獲李存進敗汴軍於洞渦敗補邁翻時汴軍既衆芻糧不給乆雨士卒瘧利瘧逆約翻寒熱迭作為瘧泄下為利全忠乃召兵還五月叔琮等自石㑹關歸齎考異曰編遺録四月壬戌李克用遣張特書請尋懽盟乃指揮諸軍所在且駐留見差發專人之太原許通懽好兼并州地寒節侯甚晚戊馬既多野草不足於芻牧尋令氏叔琮迴戈後唐太祖紀五月氏叔琮及四面賊軍皆退薛史梁紀班師在四月後唐紀汴軍退在五月葢全忠以四月命班師而叔琮等以五月離晉陽故國史記之各異也諸道軍亦退河東將周徳威李嗣昭以精騎五千躡之殺獲甚衆先是汾州刺史李瑭舉州附於汴軍先悉薦翻克用遣其將李存審攻之三日而拔執瑭斬之氏叔琮過上黨孟遷挈族隨之南徙朱全忠遣丁㑹代守潞州為丁㑹歸李克用張本朱全忠奏乞除河中節度使而諷吏民請已為帥帥讀曰率癸卯以全忠為宣武宣義天平護國四鎮節度使當是時自蒲陜以東至于海南距淮北距河諸鎮皆為朱全忠所有使全忠以鄰道自廣則當兼領佑國河陽陜虢不應越此三鎮而領河中全忠所以領河中者上以制朝廷下以制李克用也己酉加鎮海鎮東節度使錢鏐守侍中崔𦙍之罷兩軍賣麴也并近鎮亦禁之李茂貞惜其利表乞入朝論奏李茂貞在鳯翔近鎮也故爭賣麴之利韓全誨請許之茂貞至京師全誨深與相結崔𦙍始愳隂厚朱全忠益甚與茂貞為仇敵矣以佑國節度使張全義兼中書令六月癸亥朱全忠如河中梁考異曰薛居正五代史紀庚申帝發自大梁今從編遺録上之返正也中書舍人令狐渙給事中韓偓皆預其謀故擢為翰林學士數召對訪以機密渙綯之子也數所角翻令狐綯相宣宗時上悉以軍國事委崔𦙍每奏事上與之從容從千容翻或至然燭宦官畏之側目皆咨𦙍而後行𦙍志欲盡除之韓偓屢諫曰事禁太甚此輩亦不可全無恐其黨迫切更生它變𦙍不從丁夘上獨召偓問曰敕使中為惡者如林何以處之處昌吕翻下同對曰東内之變敕使誰非同惡處之當在正旦謂誅劉季述等時也今已失其時矣上曰當是時卿何不為崔𦙍言之為于偽翻對曰臣見陛下詔書云自劉季述等四家之外其餘一無所問夫人主所重莫大於信既下此詔則守之宜堅若復戮一人則人人懼死矣復扶又翻然後來所去者已為不少去羌吕翻少詩沼翻此其所以忷忷不安也陛下不若擇其尤無良者數人明示其罪寘之於法然後撫諭其餘曰吾恐爾曹謂吾心有所貯貯丁吕翻藏蓄也自今可無疑矣乃擇其忠厚者使為之長長知兩翻其徒有善則奬之有罪則懲之咸自安矣今此曹在公私者以萬數公謂有職名於官者私謂乞丐攜養於宦者私家未有名籍在於官者豈可盡誅邪夫帝王之道當以重厚鎮之公正御之至于瑣細機巧此機生則彼機應矣終不能成大功所謂理絲而棼之者也治絲而棼左傳魯衆仲之言杜預注云絲見棼緼益所以亂况今朝廷之權散在四方茍能先收此權則事無不可為者矣上深以為然曰此事終以屬卿嗚呼世固有能知之言之而不能究于行者韓偓其人也屬之欲翻李克用遣其將李嗣昭周徳威將兵出隂地闗攻隰州刺史唐禮降之進攻慈州刺史張瓌降之閏月以河陽節度使丁㑹為昭義節度使洛考異曰薛居正五代史㑹傳自河陽以疾致政于陽梁祖季年猜忌故將功大者多遭族滅㑹隂有避禍之志稱疾者累年天復元年梁祖并有河中晉絳乃起㑹為昭義節度使按光化二年六月㑹自河陽為昭義節度使九月李克用取潞州表孟遷為節度使時罕之已卒必是㑹却領河陽至此纔二年則非致政稱疾累年也又是時全忠未嘗誅戮大將疑㑹降河東後作傳者誤以天祐中事在前言之耳孟遷為河陽節度使從朱全忠之請也道士杜從法以妖妄誘昌普合三州民作亂妖一遥翻誘音酉昌州乾元中割瀘普渝資等州界置普州漢牛鞞資中墊江徳陽四縣之境梁置普慈郡後周置普州合州漢墊江地宋置東宕渠郡西魏置合州九域志普州東至昌州一百七十五里昌州東至合州一百八十里王建遣行營兵馬使王宗黯將兵三萬㑹東川武信兵討之宗黯即吉諫也崔𦙍請上盡誅宦官但以宫人堂内諸司事時宦官牙領内諸司使宦官屬耳頗聞之屬之欲翻韓全誨等涕泣求衷于上上乃令𦙍有事封疏以聞勿口奏宦官求美女知書者數人内之宫中隂令詗密其事詗古永翻又翾正翻盡得𦙍密謀上不之覺也全誨等大懼每宴聚流涕相訣别日夜謀所以去𦙍之術𦙍時領三司使去羌吕翻三司户部度支鹽鐵全誨等教禁軍對上諠譟訴𦙍減損冬衣上不得已解𦙍鹽銕使時朱全忠李茂貞各有挾天子令諸侯之意全忠欲上幸東都茂貞欲上幸鳯翔𦙍知謀泄事急遺朱全忠書遺唯季翻稱被密詔被皮義翻令全忠以兵迎車駕且言昨者返正皆令公良圖𦙍言返正之謀皆出於全忠按舊書帝紀全忠并河中進檢校太師兼中書令故稱令公而鳯翔先入朝抄取其功李茂貞入朝見上正月抄楚交翻今不速來必成罪人豈惟功為它人所有且見征討矣全忠得書秋七月甲寅遽歸大梁發兵年考異曰唐太祖紀録㑹汴入㓂同華宦者知崔𦙍之謀時𦙍專掌三司泉貨韓全誨教禁兵伺𦙍出聚而呼譟訴以冬衣減損軍人又上前披訴天子徇衆情罷崔𦙍知政事崔𦙍怒急召朱温請以兵師入輔唐補紀時朱全忠在河中𦙍潜作急令全忠入朝又修書云云全忠得此書詔便發河中還汴按是時全忠未㓂同華𦙍亦未罷紀年録誤今從唐補紀西川龍臺鎮使王宗侃等討杜從法平之九域志普州安岳縣有龍臺鎮八月甲申上問韓偓曰聞陸扆不樂吾返正樂音洛下同正旦易服乘小馬出啓夏門有諸啓夏門京城南面東來第一門夏户雅翻對曰返正之謀獨臣與崔𦙍輩數人知之扆不知也一旦忽聞宫中有變人情能不驚駭易服逃避何妨有之陛下責其為宰相無死難之志則可也難乃旦翻至於不樂返正恐出䜛人之口願陛下察之上乃止韓全誨等懼誅謀以兵制上乃與李繼昭李繼誨李彦弼李繼筠深相結繼昭獨不肻從它日上問韓偓外間何所聞對曰惟聞敕使憂愳與功臣及繼筠交結功臣謂李繼昭李繼誨李彦弼也將致不安亦未知其果然不耳然不讀曰否上曰是不虛矣比日繼誨彦弼輩語漸倔强比毗至翻倔其勿翻强其兩翻令人難耐令狐渙欲令朕召崔𦙍及全誨等於内殿置酒和解之何如對曰如此則彼凶悖益甚悖蒲昧翻又蒲没翻上曰為之奈何對曰獨有顯罪數人速加竄逐餘者許其自新庻幾可息幾居依翻若一無所問彼必知陛下心有所貯益不自安事終未了耳貯下吕翻上曰善既而宦官自恃黨援已成稍不遵敕㫖上或出之使監軍或黜守諸陵黜守諸陵者剥色配役諸陵也皆不行上無如之何或告楊行密云錢鏐為盜所殺行密遣步軍都指揮使李神福等將兵取杭州兩浙將顧全武等列八寨以拒之九月癸丑上急召韓偓謂曰聞全忠欲來除君側之惡大是盡忠然須令與茂貞共其功若兩帥交争則事危矣帥所類翻卿為我語崔𦙍速飛書兩鎮為于偽翻語牛倨翻兩鎮謂汴岐使相與合謀則善矣壬戌上又謂偓曰繼誨彦弼輩驕横益甚横户孟翻累日前與繼筠同入輒于殿東令小兒歌以侑酒侑佑也令人驚駭對曰臣必知其然兹事失之於初當正旦立功之時謂誅劉王迎上反正時但應以官爵田宅金帛酧之不應聴其出入禁中此輩素無知識數求入對或僣易薦人數所角翻易以䜴翻稍有不從則生怨望况惟知嗜利為敕使以厚利雇之言韓全誨等以利㗖繼誨彦弼惟其所指使而為之用若受傭雇然令其如此耳崔𦙍本留衞兵欲以制敕使也言留岐兵以制宦官事見是年正月今敕使衞兵相與為一將若之何汴兵若來必與岐兵鬭于闕下臣竊寒心上但愀然憂沮而已秋子小翻冬十月戊戌朱全忠大舉兵發大梁奉考異曰薛居正五代史十月戊戌密詔赴長安是時朝廷軍國大政專委崔𦙍崔每事裁抑宦官宦官側目崔一日於便殿奏欲盡去之全誨等屬垣聞之中官視崔眥裂以重賂甘言誘藩臣以為城社時因讌聚則相向流涕時崔專掌三司貨泉全誨等教禁兵於昭宗前訴之昭宗不得已罷崔知政事崔急召太祖請以兵入輔故有是行按帝幸鳯翔前崔𦙍未罷相此與太祖紀年録畧同亦誤李神福與顧全武相拒乆之神福𫉬杭俘使出入卧内神福謂諸將曰杭兵尚彊我師且當夜還杭俘走告全武神福命勿追逸杭俘使之告全武以誘之暮遣羸兵先行神福為殿羸倫為翻殿丁練翻使行營都尉吕師造伏兵青山下沈括曰臨安縣有青山鎮路振九國志作設伏青山路全武素輕神福出兵追之神福師造夾擊大破之斬首五千級生擒全武錢鏐聞之驚泣曰喪我良將喪息浪翻神福進攻臨安臨安縣錢鏐所起之地衣錦軍在焉九域志臨安縣在杭州西一百二十里兩浙將秦昶帥衆三千降之帥讀曰率韓全誨聞朱全忠將至丁酉令李繼筠李彦弼等勒兵劫上請幸鳯翔宫禁諸門皆増兵防守記考異曰按金鑾二十日入直隔夜崔公傳語明日請相看侵早到門崔出御札相示然則添人把門及降御札皆十九日事實録己亥差人把門己亥乃二十一日實録誤也人及文書出入搜閲甚嚴上遣人密賜崔𦙍御札言皆悽愴愴楚亮翻末云我為宗社大計埶須西行卿等但東行也西行謂將幸鳯翔使𦙍等東行趣朱全忠進兵惆悵惆悵惆丑留翻悵丑亮翻戊戌上遣趙國夫人出語韓偓命宫人出至學士院語之也新舊書帝紀曰趙國夫人寵顔語牛倨翻朝來彦弼輩無禮極甚欲召卿對其埶未可且言上與皇后但涕泣相向自是學士不復得對矣癸卯韓全誨等令上入閤召百官百官自閤門入見於内殿謂之入閤追寢正月丙午敕書丙午敕書依大中舊制見上悉如咸通以來近例是日開延英全誨等即侍側同議政事丁未神䇿都指揮使李繼筠遣部兵掠内庫寳貨帷帳法物韓全誨遣人密送諸王宫人先之鳯翔之往也戊申朱全忠至河中表請車駕幸東都京城大駭士民亡􅇡山谷是日百官皆不入朝闕前寂無人十一月己酉朔李繼筠等勒兵闕下禁人出入諸軍大掠士民衣紙及布襦者滿街極目衣於既翻襦汝朱翻韓建以幕僚司馬鄴知匡國留後朱全忠引四鎮兵七萬趣同州四鎮兵宣武宣義天平䕶國兵也趣七喻翻鄴迎降韓全誨等以李繼昭不與之同遏絶不令見上時崔𦙍居第在開化坊按五代史孫徳昭傳開化坊在長安東街繼昭帥所部六十餘人六十當作六千帥讀曰率及闗東諸道兵在京師者共守衞之史言崔𦙍所以不死於羣閹之手百官及士民避亂者皆往依之依李繼昭之兵以避禁兵及岐兵暴掠庚戌上遣供奉官張紹孫召百官崔𦙍等皆表辭不至壬子韓全誨等陳兵殿前言於上曰全忠以大兵逼京師欲刼天子幸洛陽求傳禪臣等請奉陛下幸鳯翔收兵拒之上不許杖劒登乞巧樓全誨等逼上下樓上行纔及夀春殿李彦弼已於御院縱火御院天子及后妃所居之地是日冬至上獨坐思政殿翹一足一足蹋䦨干蹋與踏同闌干殿檻也庭無羣臣旁無侍者頃之不得已與皇后妃嬪諸王百餘人皆上馬慟哭聲不絶出門回顧禁中火已赫然是夕宿鄠縣九域志鄠縣在長安南六十里入考異曰續寳運録其年十月朱全忠發士馬十二月長安聖上幸鳯翔宰臣裴諗翰林學士令狐渙等扈從其皇后王氏及千官太子玉印龍服並是汴州迎在華州相次修東都宫室旋迎赴東都其年十一月初鳯翔士馬入京劫掠街西諸坊寳貨士女至甚及七日汴州士馬入京赴救長安士庻並走攅在開化坊其説妄謬今不取朱全忠遣司馬鄴入華州謂韓建曰公不早知過自歸又煩此軍少留城下矣司馬鄴本韓建幕僚以同州降因使之諭建少詩沼翻是日全忠自故市引兵南渡渭韓建遣節度副使李巨川請降獻銀三萬兩助軍全忠乃西南趣赤水趣七喻翻癸丑李茂貞迎車駕於田家磑磑五對翻上下馬慰接之史言昭宗屈體以接李茂貞甲寅車駕至盩厔乙卯留一日朱全忠至零口西宋白曰昭應縣界有零口天授二年於此置鴻州於郭下置鴻門縣葢古鴻門之地也昭應漢新豐縣地宋又改昭應為臨潼九域志臨潼縣有零口鎮聞車駕西幸與僚佐議復引兵還赤水左僕射致仕張濬説全忠曰張濬時居長水説式芮翻韓建茂貞之黨不先取之必為後患全忠聞建有表勸天子幸鳯翔乃引兵逼其城建單騎迎謁全忠責之對曰建目不知書凡表章書檄皆李巨川所為全忠以巨川常為建畫策斬之軍門李巨川之誅晚矣常為于偽翻謂建曰公許人可即徃衣錦漢人曰富貴不歸故鄉如衣錦夜行韓建許州長社人也衣於既翻丁巳以建為忠武節度使理陳州唐置忠武軍於許州黄巢之自長安東出也趙犨陳人也守陳州有功朝廷以忠武節授之奏徙忠武軍治陳州按是時天子已西幸韓建自華徙陳皆朱全忠為之未經表授即以為忠武節度使何所禀命乎以兵援送之慮韓建中路逸而歸岐又慮其在華久其將士有刼奪之者上考異曰編遺録上引兵逼華州韓建輕騎出牆歸投於西溪亭子與建飲膳畢却歸赤水營旬日乃請建充忠武節度使梁太祖實録乙卯大軍及華州建來降甲辰署建權知華州事仍以宣武牙推龔麟佐之唐太祖紀年録丙辰汴軍攻華州九日建以城降唐補紀同州刺史王行約閉城登壘全忠斫開城門屠之不留噍類華州韓建聞此出城三十里迎之只於迎處云令公本貫許州便仰衣錦乃差人押出關東舊傳建今李巨川至河中送款敬翔疾其文筆勸全忠害之薛居正五代史梁祖紀丙辰帝表建權知忠武軍事徙令赴任實録乙卯全忠取華州丙辰次武功徙建為忠武節度使按此月無甲辰葢丙辰字誤也全忠乙卯取華州丙辰豈能遽至武功唐補紀又云昭宗不知崔𦙍偽行詔命聞朱全忠平陷兩州十一月三日亥時奔波西去按行約乃克用取同州時節度使也程匡柔妄謬多此類今取華州日從梁太祖實録李巨川死從昭宗實録以前商州刺史李存權知華州徙忠武節度使趙珝為匡國節度使趙珝徙節同州亦非天子出命車駕之在華州也乾寧三年四年車駕在華州商賈輻湊賈音古天子行在所從兵及百司供億浩繁故商賈輻湊以牟利輻湊者葢以車輻皆内湊于轂為諭夫三十輻共一轂轂者衆輻聚湊之所四方之商賈内嚮而聚湊焉故曰輻湊韓建重征之二年得錢九百萬緡至是全忠盡取之史言自古聚財者率為他人積是時京師無天子行在無宰相崔𦙍使太子太師盧渥等二百餘人列狀請朱全忠西迎車駕又使王溥至赤水見全忠計事于考異曰編遺録時長安無人主朝廷無敕畫帝在岐下無輔臣自漢魏以來䘮亂未若今日𦙍請王溥自西京至赤水請上進軍迎駕戊午離赤水薛居正五代史梁紀己未發赤水按唐太祖紀年録朱温至長樂崔𦙍帥百官班迎編遺録𦙍請王溥自西京至赤水軍前商議實録𦙍東寓華州又云𦙍召溥至赤水皆誤也舊紀亦云𦙍令溥至赤水促全忠迎駕今從之發赤水日從編遺録全忠復書曰進則懼脇君之謗退則懐負國之慚然不敢不勉戊午全忠發赤水辛酉以兵部侍郎盧光啓權句當中書事時無宰相權使之句當句占侯翻當丁浪翻車駕留岐山三日壬戌至鳯翔朱全忠至長安宰相帥百官班迎於長樂坡明日行復班辭於臨臯驛班迎班辭非藩臣所得當崔𦙍之奉朱全忠至此為一身脱死計非為唐社稷計也宦官既誅𦙍亦死於全忠之手宜矣帥讀曰率樂音洛復扶又翻全忠賞李繼昭之功以其能保衞崔𦙍及百官也初令權知匡國留後復留為兩街制置使賜與甚厚繼昭盡獻其兵八千人孫徳昭畏朱温之雄猜也全忠使判官李擇裴鑄入奏事稱奉密詔及得崔𦙍書令臣將兵入朝韓全誨等矯詔答以朕避災至此非宦官所刼密詔皆崔𦙍詐為之卿宜斂兵歸保土宇茂貞遣其將符道昭屯武功以拒全忠九域志武功縣在長安西北一百五十里癸亥全忠將康懐貞擊破之丁卯以盧光啓為右諌議大夫參知機務參知機務唐乆不除授盧光啟自權句當中書為之戊辰朱全忠至鳯翔軍於城東至考異曰實録乙丑全忠駐軍岐城之東丙寅全忠軍城下按全忠癸亥離長安乙丑丙寅至岐太速今從編遺録新紀李茂貞登城謂曰天子避災非臣下無禮讒人誤公至此全忠報曰韓全誨刼遷天子今來問罪迎扈還宫岐王茍不預謀何煩陳諭上屢詔全忠還鎮全忠乃拜表奉辭屢詔全忠歸鎮韓全誨李茂貞挾天子以令之也全忠拜表奉辭若不敢逆詔指者然其意則有在矣辛未移兵北趣邠州全忠之意在此茂貞養子繼徽鎮邠邠岐輔車之援也若先得邠則岐孤九域志鳯翔東北至邠州二百二十二里趣七喻翻下同考異曰金鑾記曰十七日早聞岐師昨夜二更却迴云軍大衂汴令有表迎駕并述行止汴軍在岐東下寨十八日十九日白麻盧光啟可御史大夫參知機務二十日翰林學士姚洎兼知外制誥二十四日汴令有表奉辭東去二十五日汴軍離發延英門舊紀癸酉全忠辭去今從編遺録甲戌制守司空兼門下侍郎同平章事崔𦙍責授工部尚書四考異曰實録載制辭曰居極位一無可稱又曰無功及人為國生事按舊傳前為罷知政事落使務後云同平章事鹽鐵轉運使實録前云罷𦙍鹽鐵使至此制官位中復帶鹽鐵使皆誤户部侍郎同平章事裴樞罷守本官皆宦官之意也時宰相皆不扈從乙亥朱全忠攻邠州丁丑靜難節度使李繼徽請降復姓名楊崇本全忠質其妻於河中令崇本仍鎮邠州難乃旦翻質音致為朱全忠漁色邠岐復連兵張本全忠之西入關也韓全誨李茂貞以詔命徴兵河東茂貞仍以書求援於李克用克用遣李嗣昭將五千騎自沁州趣晉州與汴兵戰于平陽北破之漢平陽縣隋改為臨汾晉州治焉唐府兵未廢時有平陽府乙亥全忠發邠州戊寅次三原自邠州東南至三原一百五十餘里十二月癸未崔𦙍至三原見全忠趣之迎駕趣讀曰促己丑全忠遣朱友寧攻盩厔不下戊戌全忠自往督戰盩厔降屠之九域志盩厔縣在鳯翔府東南二百里盩音􅀈厔音窒全忠令崔𦙍帥百官及京城居民悉遷于華州帥讀曰率詔以裴贄充大眀宫留守清海節度使徐彦若薨遺表薦行軍司馬劉隱權留後劉隱始得廣州李神福知錢鏐定不死或言錢鏐為盜所殺見上文八月而臨安城堅久攻不拔欲歸恐為鏐所邀自臨安退還宣州有千秋嶺之險乃遣人守衞鏐祖考丘壟禁樵采錢鏐臨安人其祖父丘壟在焉又使顧全武通家信鏐遣使謝之神福於要路多張旗幟為虚寨鏐以為淮南兵大至遂請和神福受其犒賂而還還音旋又如字朱全忠之入關也是年十一月朱全忠入關戎昭節度使馮行襲遣副使魯崇矩聽命於全忠按光化元年以馮行襲為昭信軍節度使天祐二年始改昭信軍為戎昭軍韓全誨遣中使二十餘人分道徴江淮兵屯金州以脅全忠行襲盡殺中使收其詔敕送全忠馮行襲以昭信節度使治金州故得盡殺中使又遣使徴兵於王建朱全忠亦遣使乞師于建建外修好於全忠罪狀李茂貞好呼到翻而隂勸茂貞堅守許之救援以武信節度使王宗佶前東川節度使王宗滌等為扈駕指揮使將兵五萬聲言迎車駕其實襲茂貞山南諸州為王建取山南西道張本江西節度使鍾傳將兵圍撫州刺史危全諷天火燒其城士民讙驚讙與諠同諸將請急攻之傳曰乗人之危非仁也乃祝曰全諷之罪無為害民火尋止全諷聞之謝罪聴命以女妻傳子匡時妻七細翻傳少時嘗獵少詩照翻醉遇虎與鬭虎搏其肩而傳亦持虎腰不置旁人共殺虎乃得免既貴悔之常戒諸子曰士處世貴智謀勿效吾暴虎也詩曰袒裼暴虎注云暴虎空手以搏之也處昌吕翻武貞節度使雷滿薨子彦威自稱留後資治通鑑卷二百六十二
