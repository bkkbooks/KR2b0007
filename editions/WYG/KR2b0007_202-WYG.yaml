front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑巻二百二宋司馬光撰胡三省音註唐紀十八起重光協洽盡重光大荒落几十一年髙宗天皇大聖大𢎞孝皇帝中之下咸亨二年春正月甲子上幸東都太考異曰舊本紀及子𢎞傳正月乙巳幸東都留太子𢎞於京師監國明年十月己未又云皇太子監國新本紀唐歴統紀皆連歳言太子監國按離長安時已留太子監國及自東都將還豈得又令監國按實録此月無監國事唯明年十月有之今從之夏四月甲申以西突厥阿史那都支為左驍衞大將軍兼匐延都督顯慶二年平賀魯以處本昆部為匐延都督府厥九勿翻驍堅堯翻匐蒲北翻以安集五咄陸之衆咄當没翻初武元慶等既死事見上巻乾封元年皇后奏以其姊子賀蘭敏之為士彠之嗣彠一虢翻襲爵周公改姓武氏累遷𢎞文館學士左散騎常侍大宗在藩於秦府置文學館學士其後𢎞文崇文二館皆有學士散悉亶翻騎奇寄翻魏國夫人之死也亦見乾封元年上見敏之悲泣曰曏吾出視朝猶無恙􅅲朝已不救何倉猝如此朝直遥翻敏之號哭不對后聞之曰此兒疑我由是惡之敏之貌美蒸於太原王妃及居妃喪釋衰絰奏妓號户髙翻惡烏路翻衰倉冋翻妓渠綺翻司衛少卿楊思儉女有殊色上及后自選以為太子妃昏有日矣敏之逼而淫之后於是表言敏之前後辠惡請加竄逐六月丙子敕流雷州復其本姓至韶州以馬韁絞死雷州漢徐聞縣地梁置南合州隋曰合州仍置海康縣大業廢州唐武德五年復置貞觀八年改曰雷州韶州漢南野縣地呉孫皓甘露元年分立始興郡唐武德初置番州貞觀元年改韶州舊志雷州至京師六十五百四十七里至東都五千八百三十六里韶州至京師四千九百三十二里至東都四千一百四十二里韁居良翻朝士坐與敏之交遊流嶺南者甚衆朝直遥翻秋七月乙未朔髙侃破髙麗餘衆於安市城麗力知翻九月丙申潞州長史徐王元禮薨冬十一月甲午朔日有食之車駕自東都幸許汝十二月癸酉校獵於葉縣舊志東都至許州四百里至汝州百八十里葉縣舊屬南陽郡後并省後齊置襄州後周廢州置南襄城郡隋廢郡為葉縣屬許州葉式涉翻丙戌還東都三年春正月辛丑以太子左衛副率梁積夀為姚州道行軍摠管太子十率府各有副率位四品率所律翻將兵討叛蠻將即亮翻庚戌昆明蠻十四姓二萬三千户内附置殷敦總三州㸑蠻西有昆明蠻一曰昆彌蠻以西洱河為境即葉榆河也去長安九千里殷州居戎州西北總州居西南敦州居南逺不過五百餘里近三百里二月庚午徙吐谷渾於鄯州浩亹水南漢書地理志浩亹水東至允吾入湟允吾唐為鄯州龍支縣水經注浩亹河出允吾西北塞外東逕浩亹縣故城南又東流注于湟水俗呼為閤門河吐從暾入聲谷音浴鄯時戰翻浩音誥亹音門吐谷渾畏吐蕃之彊不安其居又鄯州地狹尋徙靈州以其部落置安樂州時以靈州鳴沙縣地置安樂州樂音洛以可汗諾曷鉢為刺史可從刋入聲汗音寒吐谷渾故地皆入於吐蕃己卯侍中永安郡公姜恪薨夏四月庚午上幸合璧宫吐蕃遣其大臣仲琮入貢上問以吐蕃風俗對曰吐蕃地薄氣寒風俗朴魯然法令嚴整上下一心議事常自下而起因人所利而行之斯所以能持久也上詰以吞滅吐谷渾見上巻龍朔三年誥去吉翻敗薛仁貴見上巻咸亨元年敗蒲邁翻冦逼凉州事吐蕃既滅吐谷渾又破西域則冦逼凉州矣對曰臣受命貢獻而已軍旅之事非所聞也上厚賜而遣之癸未遣都水使者黄仁素使于吐蕃使䟽吏翻秋八月壬午特進髙陽郡公許敬宗卒卒子恤翻太常博士袁思古議敬宗弃長子於荒徼徼吉弔翻嫁少女於夷貊少詩照翻貊莫白翻案諡法名與實爽曰繆請諡為繆繆靡幼翻敬宗孫太子舍人彦伯訟思古與許氏有怨請改諡太常博士王福畤議畤音止以為得失一朝榮辱千載大常博士擬謚皆跡其功行為之褒貶大行大名之小行小名之載于亥翻若嫌隙有實當據法推繩如其不然義不可奪户部尚書戴至德謂福畤曰髙陽公任遇如是何以謚之為繆對曰㫺晉司空何曾既忠且孝徒以日食萬錢秦秀謚之為繆見八十巻晉武帝咸寧四年許敬宗忠孝不逮於曾而飲食男女之累過之累力瑞翻諡之曰繆無負許氏矣詔集五品已上更議禮部尚書陽思敬議按諡法既過能改曰恭請諡曰恭詔從之敬宗嘗奏流其子昂于嶺南又以女嫁蠻酋馮盎之子多納其貨酋慈由翻故思古議及之福畤勃之父也王勃見二百巻龍朔元年九月癸卯徙沛王賢為雍王雍於用翻冬十月己未詔太子監國監古衘翻壬戌車駕發東都十一月戊子朔日有食之甲辰車駕至京師十二月髙侃與髙麗餘衆戰于白水山破之新羅遣兵救髙麗侃擊破之癸卯以左庶子劉仁軌同中書門下三品太子罕接宫臣典膳丞全椒邢文偉輙減所供膳東宫典膳局郎正六品上丞正八品上掌進膳嘗食全椒縣時屬滁州并上書諫太子太子復書謝以多疾及入侍少暇嘉納其意上時掌翻頃之右史缺上曰邢文偉事吾子能撤膳進諫此直士也擢為右史起居舍人從六品上屬中書省掌修記言之史録天子之制誥德音如記言之制以紀時政之損益季終則授之於國史龍朔改曰右史太子因宴集命宫臣擲倒唐散樂有舞􅐻伎舞輪伎長蹻伎跳鈴伎擲倒伎跳劒伎吞劒伎皆梁之遺伎也次至左奉裕率王及善隋置太子内率府擬上臺千牛衛掌東宫千牛備身侍奉之事龍朔改為左右奉裕率率所律翻及善曰擲倒自有伶官伶盧經翻臣若奉令恐非所以羽翼殿下也太子謝之上聞之賜及善縑百匹尋遷左千牛衛將軍千牛刀即人主防身刀也取莊子庖丁言解千牛而芒刃不減之義後魏有千牛備身掌宿衛侍從隋煬帝置備身府唐改千牛府四年春正月丙辰絳州刺史鄭惠王元懿薨三月丙申詔劉仁軌等改修國史以許敬宗等所記多不實故也夏四月丙子車駕幸九成宫閏五月燕山道摠管右領軍大將軍李謹行大破髙麗叛者於瓠蘆河之西胡嶠曰黒車子之北有牛蹄突厥人身牛足其地有寒水曰瓠􅕧河夏秋水厚二尺秋冬氷徹底常燒器銷氷乃得飲余按唐書劉仁軌傳此瓠蘆河當在髙麗南界新羅七里城之北燕因肩翻下同俘獲數千人餘衆皆犇新羅時謹行妻劉氏留伐奴城髙麗引靺鞨攻之劉氏檈甲帥衆守城久之虜退靺鞨音末曷檈音宦帥讀曰率上嘉其功封燕國夫人謹行靺鞨人突地稽之子也突地稽見一百八十九巻髙祖武德四年武力絶人為衆夷所憚秋七月婺州大水溺死者五千人婺亡遇翻溺奴狄翻八月辛丑上以瘧疾令太子於延福殿受諸司啓事瘧迸約翻冬十月壬午中書令閻立本薨乙巳車駕還京師十二月丙午弓月疎勒二王來降降户江翻下同西突厥興㫺亡可汗之世諸部離散弓月及阿悉吉皆叛阿悉吉即阿悉結弩失畢五俟斤之一也蘇定方之西討也見二百巻顯慶二年擒阿悉吉以歸弓月南結吐蕃北招咽麪咽麫亦鐵勒種居得嶷海咽於甸翻麫眡見翻共攻疎勒降之上遣鴻臚卿蕭嗣業發兵討之嗣業兵未至弓月懼與踈勒皆入朝上赦其辠遣歸國臚陵如翻朝直遥翻上元元年是年八月方改元春正月壬午以左庶子同中書門下三品劉仁軌為雞林道大摠管帝以新羅國為雞林州衛尉卿李弼右領軍大將軍李謹行副之發兵討新羅時新羅王法敏既納髙麗叛衆又據百濟故地使人守之上大怒詔削法敏官爵其弟右驍衛貟外大將軍臨海郡公仁問在京師驍堅堯翻立以為新羅王使歸國三月辛亥朔日有食之賀蘭敏之既得辠皇后奏召武元爽之子承嗣於嶺南乾封元年元爽流振州襲爵周公拜尚衣奉御尚衣奉御屬殿中省掌衣服詳其制度辯其名數夏四月辛卯遷宗正卿秋八月壬辰追尊宣簡公為宣皇帝妣張氏為宣莊皇后懿王為光皇帝妣賈氏為光懿皇后後魏金門鎮將熙太祖虎之祖也謚宣簡公魏憧主天賜太祖虎之父也謚懿王太武皇帝為神堯皇帝太穆皇后為太穆神皇后文皇帝為太宗文武聖皇帝文德皇后為文德聖皇后皇帝稱天皇皇后稱天后以避先帝先后之稱實欲自尊而以避先帝先后之稱為言武后之意也之稱尺證翻改元赦天下戊戌敕文武官三品以上服紫金玉帯四品服深緋金帯五品服淺緋金帶六品服深緑七品服淺緑並銀帶八品服深青九品服淺青並䃋石帶鍮石似金而非金鍮託侯翻庶人服黄銅鐵帶自非庶人不聽服黄非庶人謂工商雜户九月癸丑詔追復長孫晟長孫无忌官爵以无忌曾孫翼襲爵趙公聽无忌喪歸陪葬昭陵无忌削官爵而死見二百巻顯慶四年甲寅上御翔鸞閣據舊書郝處俊傳翔鸞閣在含元殿東唐六典含元殿翼以二閣左曰翔鸞右曰棲鳯二閣之下為東西朝堂觀大酺酺薄胡翻分音樂為東西朋使雍王賢主東朋周王顯主西朋角勝為樂郝處俊諫曰二王春秋尚少志趣未定當推棃讓棗梁元帝遺武陵王書有是言樂音洛少詩沼翻推吐雷翻相親如一今分二朋遞相誇競俳優小人言辭無度恐其交爭勝負譏誚失禮非所以崇禮義勸敦睦也上瞿然曰誚才笑翻瞿九遇翻驚視貌卿逺識非衆人所及也遽止之是日衛尉卿李弼暴卒于宴所為之廢酺一日為于偽翻冬十一月丙午朔車駕發京師己酉校獵華山之曲武原華山在華州華隂縣南曲武原在華山下華户化翻戊辰至東都箕州録事參軍張君澈等誣告刺史蔣王惲及其子汝南郡王煒謀反惲於粉翻煒於鬼翻敕通事舍人薛思貞馳傳往按之傳張戀翻十二月癸未惲惶懼自縊死縊於計翻上知其非罪深痛惜之斬君澈等四人戊子于闐王伏闍雄來朝闐徒賢翻闍視遮翻朝直遥翻下同辛卯波斯王卑路斯來朝壬寅天后上表以為國家聖緒出自𤣥元皇帝老子姓李名耳唐祖之乾封元年尊為𤣥元皇帝上時掌翻下同請令王公以下皆習老子每歳明經凖孝經論語策試又請自今父在為母服齊衰三年古禮父在為母服朞為于偽翻齊音咨衰倉回翻又京官八品以上宜量加俸禄京官在京官也量音良及其餘便宜合十二條詔書褒美皆行之是歳有劉曉者上䟽論選選須絹翻下同考異曰㑹要作劉嶢今從統紀以為今選曹以檢勘為公道檢勘者謂考其功過察其假名承偽隱冐升降書判為得人殊不知考其德行才能况書判借人者衆矣又禮部取士專用文章為甲乙故天下之士皆捨德行而趨文藝有朝登甲科而夕陷刑辟者雖日誦萬言何闗理體理體即治道行下孟翻趨七喻翻下同辟毗亦翻文成七步未足化人况盡心卉木之間極筆烟霞之際以斯成俗豈非大謬夫人之慕名如水趨下上有所好下必甚焉陛下若取士以德行為先文藝為末則多士雷奔四方風動矣趨七喻翻好呼到翻下隣好同二年春正月丙寅以于闐國為毗沙都督府分其境内為十州以于闐王尉遲伏闍雄為毗沙都督闐徒賢翻又徒見翻尉紆勿翻闇視遮翻辛未吐蕃遣其大臣論吐渾彌來請和且請與吐谷渾復修鄰好吐從瞰入聲下同復扶又翻谷音浴上不許二月劉仁軌大破新羅之衆於七重城重音直龍翻又使靺鞨浮海略新羅之南境斬獲甚衆仁軌引兵還靺音末鞨音曷還從宣翻又音如字詔以李謹行為安東鎮撫大使使疏吏翻下同屯新羅之買肖城以經略之三戰皆㨗新羅乃遣使入貢且謝罪上赦之復新羅王法敏官爵金仁問中道而還使疏吏翻還音旋又如字改封臨海郡公三月丁巳天后祀先蠶於邙山之陽漢儀三月桑始生皇后親桑於苑中蠶室養蠶千薄以上祠以中牢羊豕續漢志三月皇后帥公卿諸侯夫人蠶祠先蠶禮以少牢注云今蠶神曰苑䟽婦人寓氏公主唐制皇后歳祀一季春吉已享先蠶遂以親桑蜀注曰通典先蠶天駟也百官及朝集使皆陪位朝直遥翻下同上苦風眩甚議使天后攝知國政中書侍郎同三品郝處俊曰天子理外后理内天之道也記昏義曰天子聽男教后聽女順天子理陽道后治隂德天子聽外治后聽内職教順成俗外内和順國家理治此之謂盛德昔魏文著令雖有幼主不許皇后臨朝所以杜禍亂之萌也事見六十九巻魏文帝黄初三年陛下奈何以髙祖太宗之天下不傳之子孫而委之天后乎中書侍郎昌樂李義琰曰處俊之言至忠陛下宜聽之樂音洛上乃止天后多引文學之士著作郎元萬頃唐著作郎從五品上掌修撰碑誌祝文祭文屬袐書省左史劉禕之等龍朔改起居郎為左史使之撰列女傳臣軌百僚新戒樂書凡千餘巻撰士免翻朝廷奏議及百司表疏時密令參决以分宰相之權䟽所去翻時人謂之北門學士不從南衙於北門出入故云然禕之子翼之子也劉子翼仕隋以學行著夏四月庚辰以司農少卿韋𢎞機為司農卿𢎞機兼知東都營田受詔完葺宫苑有宦者於苑中犯法𢎞機杖之然後奏聞上以為能賜絹數十匹曰更有犯者卿即杖之不必奏也初左千牛將軍長安趙瓌尚髙祖女常樂公主生女為周王顯妃公主頗為上所厚天后惡之樂音洛惡烏路翻辛巳妃坐廢幽閉於内侍省食料給生者防人候其突烟而已數日烟不出開視死腐矣瓌自定州刺史貶栝州刺史令公主隨之官仍絶其朝謁朝直遥翻太子𢎞仁孝謙謹上甚愛之禮接士大夫中外屬心屬之欲翻天后方逞其志太子奏請數迕旨迕逆也數所角翻迕五故翻由是失愛於天后義陽宣城二公主蕭淑妃之女也坐母得罪幽于掖庭年踰三十不嫁太子見之驚惻遽奏請出降上許之天后怒即日以公主配當上翊衛權毅王遂古親勲翊三衛皆當上上時掌翻己亥太子薨于合璧宫時人以為天后酖之也曰考異新書本紀云己亥天后殺皇太子新傳云后將逞志𢎞奏請數怫旨從幸合璧宫遇酖薨唐歴云𢎞仁孝英果深為上所鍾愛自升為太子敬禮大臣鴻儒之士未嘗居有過之地以請嫁二公主失愛於天后不以夀終實錄舊傳皆不言𢎞遇酖按李泌對肅宗云髙宗有八子睿宗最幼天后所生四子自為行第故睿宗第四長曰孝敬皇帝為太子監國仁明孝悌天后方圗臨朝乃酖殺孝敬立雍王賢為太子新書葢據此及唐歴也按𢎞之死其事不明今但云時人以為天后酖之也疑以傳疑壬寅車駕還洛陽宫五月戊申下詔朕方欲禪位皇太子而疾遽不起宜申往命加以尊名可諡為孝敬皇帝帝子諡皇帝始此諡神至翻六月戊寅立雍王賢為皇太子赦天下雍於用翻天后惡慈州刺史杞王上金宋白曰慈州春秋廧咎如之國漢為北屈縣隋為汾州唐武德元年為西汾州五年改南汾州貞觀八年改南汾州為慈州以州近慈烏戍故名孫愐曰因慈氏縣名之上金帝後宫劉氏所生惡烏路翻有司希㫖奏其辠秋七月上金坐解官澧州安置八月庚寅葬孝敬皇帝于恭陵恭陵在洛州緱氏縣懊來山改名太平山戊戍以戴至德為右僕射庚子以劉仁軌為左僕射並同中書門下三品如故張文瓘為侍中郝處俊為中書令李敬𤣥為吏部尚書兼左庶子同中書門下三品如故劉仁軌戴至德更日受牒訴尚辰羊翻更工衡翻仁軌常以美言許之至德必據理難詰難乃旦翻詰去吉翻未嘗與奪實有寃結者密為奏辯為于偽翻由是時譽皆歸仁軌或問其故至德曰威福者人主之柄人臣安得盗取之上聞深重之有老嫗欲詣仁軌陳牒誤詣至德至德覽之未終嫗曰本謂是解事僕射乃不解事僕射邪嫗威遇翻解户買翻歸我牒至德笑而授之時人稱其長者長知兩翻文瓘時兼大理卿囚聞改官皆慟哭文瓘性嚴正諸司奏議多所糾駁上甚委之駁比角翻儀鳯元年是年十一月方改元春正月壬戌徙冀王輪為相王納州獠反唐制儀鳯二年開山洞置納州屬盧州都督府獠魯皓翻敕黔州都督發兵討之黔音琴二月甲戌徙安東都䕶府於遼東故城都考異曰實録咸亨元年楊昉髙侃討安舜始㧞安東䕶府自平壤城移於遼東州儀鳯元年二月甲戌以髙麗餘衆反叛移安東都䕶府於遼東城葢咸亨元年言移府者終言之也儀鳯元年言髙麗反者本其所以移也會要無咸亨元年移府事此年云移於遼東故城今從之先是有華人任東官者悉罷之先悉薦翻徙熊津都督府於建安故城其百濟户口先徙於徐兖等州者皆置於建安天后勸上封中嶽癸未詔以今冬有事于嵩山中嶽嵩山在河南陽城縣丁亥上幸汝州之温湯汝州梁縣西南五十里有温湯可以熟米又有黄女煬帝置温泉頓三月癸卯黄門侍郎來􅁪中書侍郎薛元超並同中書門下三品􅁪濟之兄元超收之子也來濟盡忠而又死於封疆薛收事太宗於濳躍􅁪户登翻甲辰上還東都還從宣翻又音如字閏月吐蕃冦鄯廓河芳等州宋白曰疊州常芬縣舊為吐谷渾所據周武成三年逐諸羌始有其地乃於三交築城置甘松防又為三州縣以𨽻常香郡建德三年改三川為常芬縣仍立芳州以邑𨽻焉取地多芳草以名州隋廢州唐復置吐從暾入聲鄯時戰翻敕左監門衛中郎將令狐智通發興鳯等州兵以禦之興州漢武都沮縣地後魏改為略陽縣江左為武興藩王國後魏以為武興郡置興州改略陽縣為順政縣鳯州漢故道河池縣地晉為仇池氐所據後魏置梁泉縣西魏廢帝置鳯州鄯時戰翻監古衘翻將即亮翻己卯詔以吐蕃犯塞停封中嶽乙酉以洛州牧周王顯為洮州道行軍元帥將工部尚書劉審禮等十二摠管并州大都督相王輪為凉州道行軍元帥將左衛大將軍契苾何力等以討吐蕃洮土刀翻帥所類翻將即亮翻并卑經翻契欺訖翻苾毗必翻二王皆不行庚寅車駕西還甲寅中書侍郎李義琰同中書門下三品戊午車駕至九成宫六月癸亥黄門侍郎晉陵髙智周同中書門下三品秋八月乙未吐蕃冦疊州壬寅敕桂廣交黔等都督府比來注擬上人簡擇未精自今每四年遣五品已上清正官充使仍令御史同往注擬時人謂之南選黔音琴比毗至翻使疏吏翻令力丁翻選須絹翻九月壬申大理奏左威衛大將軍權善才左監門中郎將范懐義誤斫昭陵柏辠當除名監古衘翻將即亮翻上特命殺之大理丞太原狄仁傑奏二人辠不當死太原漢晉陽縣隋改為太原縣而以後齊所置龍山縣為晉陽縣並帶并州上曰善才等斫陵柏我不殺則為不孝仁傑固執不已上作色令出仁傑曰犯顏直諫自古以為難臣以為遇桀紂則難遇堯舜則易易以豉翻今法不至死而陛下特殺之是法不信於人也人何所措其手足且張釋之有言設有盗長陵一抔土陛下何以處之釋之言見十四巻漢文帝三年抔薄侯翻處昌吕翻今以一株柏殺二將軍後代謂陛下為何如矣臣不敢奉詔者恐陷陛下於不道且羞見釋之於地下故也上怒稍解二人除名流嶺南後數日擢仁傑為侍御史初仁傑為并州法曹同僚鄭崇質當使絶域使疏吏翻崇質母老且病仁傑曰彼母如此豈可使之有萬里之憂詣長史藺仁基請代之行長知兩翻藺良刃翻仁基素與司馬李孝廉不叶因相謂曰吾軰豈可不自愧乎遂相與輯睦冬十月車駕還京師還從宣翻又音如字丁酉祫享太廟用太學博士史璨議禘後三年而祫祫後二年而禘歐陽脩曰禘祫大祭也祫以昭穆合食於太祖而禘以審諦其尊卑此禘祫之義而為禮者失之至於年數不同祖宗失位議者莫知所從禮曰三年一祫五年一禘傳曰五年再殷祭髙宗上元三年十月當祫而有司議其年數史璨等議以為新君喪畢而祫明年而禘自是之後五年而再祭葢後禘去前禘五年而祫常在禘後三年禘常在祫後二年魯宣公八年禘僖公葢三年喪畢而祫明年而禘至八年而再禘昭公二十年禘至二十五年又禘此可知也時以其言有經據遂從之唐制國子博士正五品上掌教文武官二品已上國公子孫二品已上曾孫為生者太學博士正六品上掌教文武官五品已上郡縣公子孫從三品曽孫之為生者祫胡夾翻璨倉按翻禘大計翻郇王素節蕭淑妃之子也郇音荀警敏好學天后惡之好呼到翻惡烏路翻自岐州刺史左遷申州刺史申州漢平氏鄳縣地晉分置義陽郡南齊置司州後魏改郢州後周改申州隋改義州唐復曰申州岐州在京師西三百十五里至東都一千一百七十里申州至京師一千七百九十六里東都九百四十三里乾封初敕曰素節既有舊疾不須入朝朝直遥翻而素節實無疾自以久不得入覲乃著忠孝論王府倉曹參軍張柬之因使濳封其論以進后見之誣以贓賄丙午降封鄱陽王袁州安置東之封論以進欲以感動帝心豈知適所以速素節之罪乎袁州在京師東南三千五百八十里至東都二千一百六十一里十一月壬申改元赦天下庚寅以李敬𤣥為中書令十二月戊午以來􅁪為河南道大使薛元超為河北道大使尚書左丞鄢陵崔知悌國子司業鄭祖𤣥為江南道大使隋大業三年始置國子司業唐從四品下所職與祭酒同使疏吏翻鄢謁晩翻又於建翻又音偃分道廵撫二年春正月乙亥上耕籍田初劉仁軌引兵自熊津還見上麟徳二年扶餘隆畏新羅之逼不敢留尋亦還朝朝直遥翻二月丁巳以工部尚書髙藏為遼東州都督封朝鮮王朝音潮鮮音仙遣歸遼東安輯髙麗餘衆髙麗先在諸州者皆遣與藏俱歸又以司農卿扶餘隆為熊津都督封帶方王亦遣歸安輯百濟餘衆仍移安東都䕶府於新城以統之去年春移安東都䕶府於遼東故城今又移於新城統他綜翻時百濟荒殘命隆寓居髙麗之境藏至遼東謀叛潜與靺鞨通召還徙卭州而死麗力知翻還從宣翻又音如字靺鞨音末曷卭渠容翻散徙其人於河南隴右諸州貧者畱安東城傍髙麗舊城没於新羅餘衆散入靺鞨及突厥厥九勿翻隆亦竟不敢還故地髙氏扶餘氏遂亡三月癸亥朔以郝處俊髙智周並為左庶子李義琰為右庶子郝呼各翻處昌吕翻唐制東宫左右庶子各二員夏四月左庶子張大安同中書門下三品大安公謹之子也張公謹太宗朝功臣詔以河南北旱遣御史中丞崔謐等分道存問賑給侍御史寧陵劉思立上疏寧陵縣漢屬陳留郡曹魏至元魏屬譙郡後齊廢隋開皇六年復置屬宋州賑津忍翻上時掌翻䟽所據翻以為今麥秀蠶老農事方殷敕使撫廵人皆竦抃忘其家業冀此天恩聚集參迎妨廢不少使䟽吏翻少詩沼翻既緣賑給須立簿書本欲安存更成煩擾望且委州縣賑給待秋務閑出使褒貶疏奏謐等遂不行使䟽吏翻五月吐蕃冦扶州之臨河鎮擒鎮將杜孝昇令齎書説松州都督武居寂使降孝昇固執不從吐蕃軍還捨孝昇而去孝昇復帥餘衆拒守吐從瞰入聲將即亮翻説輸芮翻降户江翻復扶又翻帥讀曰率詔以孝昇為遊擊將軍晉官品令游擊將軍第四品唐從五品下秋八月徙周王顯為英王更名哲更工衡翻命劉仁軌鎮洮河軍鄯州城内有臨洮軍洮土力翻冬十二月乙卯詔大發兵討吐蕃詔以顯慶新禮多不師古顯慶三年行新禮見二百巻其五禮並依周禮行事自是禮官益無憑守每有大禮臨時撰定撰士免翻三年春正月辛酉百官及蠻夷酋長朝天后于光順門酋慈由翻長知兩翻朝直遥翻劉仁軌鎮洮河每有奏請多為李敬𤣥所抑由是怨之仁軌知敬𤣥非將帥才欲中傷之仁軌以私怨奏用敬𤣥以至敗國殄民矯情以容袁異式挾怨以䧟李敬𤣥得為賢乎將即亮翻帥所類翻中竹仲翻奏言西邊鎮守非敬𤣥不可敬𤣥固辭上曰仁軌須朕朕亦自往卿安得辭丙子以敬𤣥代仁軌為洮河道大摠管兼安撫大使仍檢校鄯州都督使疏吏翻鄯時戰翻考異曰實錄云與仁軌相知鎮守而敬𤣥之敗仁軌不預新舊傳皆云以代仁軌今從之又命益州大都督府長史李孝逸等發劒南山南兵以赴之孝逸神通之子也淮安王神通癸未遣金吾將軍曹懐舜等分往河南北募猛士不問布衣及仕宦夏四月戊申赦天下改來年元為通乾五月壬戌上幸九成宫丙寅山中雨大寒從兵有凍死者從音才用翻秋七月李敬𤣥奏破吐蕃於龍支龍支縣屬鄯州漢允吾縣地後漢改為龍耆縣後魏改為金城縣又改為龍支積石山在今縣南上初即位不忍觀破陳樂命撤之辛酉太常少卿韋萬石奏乆寢不作愳成廢缺請自今大宴㑹復奏之上從之陳讀曰陣少詩照翻復扶又翻又如字九月辛酉車駕還京師上將發兵討新羅侍中張文瓘臥疾在家自輿入見見賢遍翻諌曰今吐蕃為冦方發兵西討新羅雖云不順未嘗犯邊若又東征臣恐公私不勝其弊上乃止勝音升癸亥文瓘薨丙寅李敬𤣥將兵十八萬與吐蕃將論欽陵戰於青海之上將即亮翻下同兵敗工部尚書右衛大將軍彭城僖公劉審禮為吐蕃所虜諡法剛克曰僖又小心畏忌曰僖又戴記有伐有還曰僖時審禮將前軍深入頓于濠所為虜所攻敬𤣥懦怯按兵不救聞審禮戰没狼狽還走頓于承風嶺杜佑曰承風嶺在廓州廣威縣西南東北去鄯州三百一十三里故吐谷渾界阻泥溝以自固虜屯兵髙崗以壓之左領軍貟外將軍黑齒常之夜帥敢死之士五百人襲擊虜營虜衆潰亂其將䟦地設引兵遁去帥讀曰率將即亮翻敬𤣥乃收餘衆還鄯州野考異曰朝僉載曰中書令李敬𤣥為元帥吐蕃至樹敦城聞劉尚書没蕃著鞾不得狼狽而走遺却麥飯首尾千里地上尺餘言之大過今不取審禮諸子自縳詣闕請入吐蕃贖其父敕聽次子易從詣吐蕃省之比至審禮已病卒易以豉翻省悉景翻比必利翻卒子恤翻審考異曰新本紀審禮死之按舊傳永隆二年禮卒于蕃中新紀誤也今終言之易從晝夜號哭不絶聲號户髙翻吐蕃哀之還其尸易從徒跣負之以歸上嘉黑齒常之之功擢拜左武衛將軍充河源軍副使杜佑曰河源軍在鄯州西一百二十里使疏吏翻下同李敬𤣥之西征也監察御史原武婁師德應猛士詔從軍時詔募猛士討吐蕃師德應募從軍監古衘翻及敗敕師德收集散亡軍乃復振復扶又翻又如字因命使于吐蕃吐蕃將論賛婆迎之赤嶺宋白曰石堡城西三十里有山土石皆赤北接大山南連小雪山號曰赤嶺去長安三千五百里自鄯州鄯城縣西行二百里至赤嶺將即亮翻師德宣導上意諭以禍福賛婆甚恱為之數年不犯邊為于偽翻師德遷殿中侍御史充河源軍司馬考異曰御史臺記充河源軍使今從舊傳兼知營田事上以吐蕃為憂悉召侍臣謀之或欲和親以息民或欲嚴設守僃俟公私富實而討之或欲亟發兵擊之議竟不决賜食而遣之大學生宋城魏元忠上封事宋城縣帶宋州舊睢陽縣也隋開皇十八年更名上時掌翻言禦吐蕃之策以為理國之要在文與武今言文者則以辭華為首而不及經綸言武者則以騎射為先而不及方略騎奇寄翻是皆何益於理亂哉故陸機著辨亡之論無救河橋之敗陸機痛吳之亡著辯亡論迹吳之所以興及其所以亡其論甚悉河橋之敗見八十五巻晉惠帝太安二年養由基射穿七札不濟鄢陵之師左傳晉楚遇於鄢陵楚大夫養由基潘黨蹲甲而射之徹七札焉以示楚共王曰君有二臣何憂於戰王怒曰大辱國詰朝爾射死藝及戰楚師敗績杜預曰濟益也此己然之明效也古語有之人無常俗政有理亂兵無彊弱將有巧拙故選將當以智略為本勇力為末今朝廷用人類取將門子弟及死事之家將即亮翻下同彼皆庸人豈足當閫外之任李左車陳湯吕蒙孟觀皆出貧賤而立殊功李左車見十巻漢髙帝三年陳湯見二十九巻元帝建昭三年吕蒙見獻帝紀六十五巻至六十八巻孟觀見八十三巻晉惠帝元康九年未聞其家代為將也夫賞罸者軍國之切務茍有功不賞有辠不誅雖堯舜不能以致理議者皆云近日征伐虗有賞格而無事實葢由小才之吏不知大體徒惜勲庸恐虛倉庫不知士不用命所損幾何黔首雖微不可欺㒺豈得懸不信之令設虛賞之科而望其立功乎自蘇定方征遼東見二百巻龍朔元年二年李勣破平壤見上巻總章元年賞絶不行勲仍淹滯不聞斬一臺郎戮一令史以謝勲人尚書謂曹郎皆謂之臺郎勲轉淹滯則司勲之責耳司勲令史三十三人大非川之敗薛仁貴郭待封等不即重誅見上巻咸亨元年即就也曏使早誅仁貴等則自餘諸將豈敢失利於後哉臣恐吐蕃之平非旦夕可冀也又出師之要全資馬力臣請開畜馬之禁使百姓皆得畜馬畜吁玉翻若官軍大舉委州縣長吏以官錢增價市之則皆為官有彼胡虜恃馬力以為彊若聽人間市而畜之乃是損彼之彊為中國之利也先是禁百姓畜馬長知兩翻畜吁玉翻先悉薦翻故元忠言之上善其言召見令直中書省仗内供奉仗内供奉朝㑹得隨百官入見冬十月丙午徐州刺史密貞王元曉薨十一月壬子黄門侍郎同中書門下三品來􅁪薨􅁪户登翻十二月詔停來年通乾之號以反語不善故也通乾反語為天窮調露元年按㑹要是年六月十三日方改元調露春正月己酉上幸東都司農卿韋𢎞機作宿羽髙山上陽等宫按六典宿羽髙山二宫皆在東都禁苑中制度壯麗上陽宫臨洛水為長廊亘一里宫成上徙御之侍御史狄仁傑劾奏𢎞機導上為奢泰𢎞機坐免官劾户槩翻又户得翻所考異曰舊傳云儀鳯中機坐家人犯盗為憲司劾免官狄仁傑傳云時司農卿韋機兼領將作少府造宿羽髙山上陽等宫莫不壯麗仁傑奏其太過機竟坐免官統紀云駕幸東都上遊韋𢎞機所造宿羽髙山等宫乗髙臨深有登眺之矣乃即敕𢎞機造髙館及成臨幸即上陽宫也今據實録營宫在前左司郎中王本立隋煬帝大業三年尚書都司始置左右司郎各一人掌都省之職唐置左右司郎中各掌付十有二司之事以舉正稽違省置符目恃恩用事朝廷畏之仁傑奏其姧請付法司上特原之仁傑曰國家雖乏英才豈少本立軰少詩沼翻陛下何惜罪人以虧王法必欲曲赦本立請弃臣於無人之境為忠貞將來之戒本立竟得罪句考異曰御史臺記曰狄仁傑以司農發太原運㑹欠米萬餘斛髙宗怒曰仁傑偷我米命殺之吏部侍郎魏𤣥同曰仁傑健而踈只是句當失所臣委知不偷請以官爵保明髙宗意觧仁傑不坐案仁傑傳未嘗為司農今不取由是朝廷肅然庚戌右僕射太子賔客道恭公戴至德薨道古國名左傳之江黄道栢是也顯慶元年始置太子賔客四員正三品掌侍從規諫賛相禮儀諡法尊賢讓善曰恭二月壬戌吐蕃賛普卒子器弩悉弄立生八年矣時器弩悉弄與其舅麴薩若詣羊同發兵羊同西戎國名宋祈載劉元鼎之言曰黄河上流由洪濟橋西南行二千里水益狹春可涉秋夏乃勝舟其南三百里三山中髙而四下曰紫山直大羊同國古所謂崑崙者也虜曰悶摩黎山東距長安五千里河源出其間唐會要曰大羊同國東接吐蕃西接小羊同北直于闐東西千里薩桑割翻有弟生六年在論欽陵軍中國人畏欽陵之彊欲立之欽陵不可與薩若共立器弩悉弄上聞賛普卒命裴行儉乗閒圖之卒子恤翻間古莧翻行儉曰欽陵為政大臣輯睦未可圖也乃止夏四月辛酉郝處俊為侍中偃師人眀崇儼以符呪幻術為上及天后所重呪職救翻幻户辨翻官至正諌大夫五月壬午崇儼為盗所殺求賊竟不得臺考異曰御史記鄭仁恭本榮陽人也自監察累遷刑部郎中儀鳯中明崇儼以奇術承恩寵夜遇刺客敕三司亟推鞫妄承引連坐者甚衆髙宗怒促有司行刑仁恭奏曰此軰必死之囚願假其數日之命髙宗曰卿以為枉邪仁恭曰臣識慮淺短非的以為枉恐萬朝非實則怨氣生遂緩之旬餘果獲賊矣廷稱之今從實録贈崇儼侍中丙戌命太子監國監古衘翻太子處事明審處昌吕翻時人稱之戊戌作紫桂宫於澠池之西紫桂宫在澠池之西五里澠彌兗翻六月卒亥赦天下改元初西突厥十姓可汗阿史那都支及其别帥李遮匐與吐蕃連和侵逼安西帥所類翻匐蒲北翻朝議欲發兵討之吏部侍郎裴行儉曰吐蕃為冦審禮覆没干戈未息豈可復出師西方今波斯王卒其子泥洹師為質在京師波斯為大食所滅其王卑路斯入朝授武衛將軍而死其子為質在京師朝直遥翻復扶又翻卒子恤翻洹戸官翻質音致考異曰實録作泥浬師按舊傳作泥湟師唐厯作泥洹師今從統紀宜遣使者送歸國使疏吏翻道過二虜以便宜取之可不血刅而擒也上從之命行儉冊立波斯王過工禾翻考異曰波斯王卑路斯入朝未還請遣使送歸今從實録唐􅔦統紀舊傳仍為安撫大食使行儉奏肅州刺史王方翼以為已副仍令檢校安西都䕶使䟽吏翻令力丁翻秋七月己卯朔詔以今年冬至有事于嵩山初裴行儉嘗為西州長史見一百九十九巻永徽五年長知兩翻及奉使過西州吏人郊迎行儉悉召其豪傑子弟千餘人自隨且揚言天時方熱未可涉逺須稍凉乃西上上時掌翻阿史那都支覘知之遂不設僃覘丑亷翻又丑艶翻行儉徐召四鎮諸胡酋長四鎮龜兹毗沙焉耆踈勒四都督府也酋慈由翻謂曰昔在西州縱獵甚樂樂音洛今欲尋舊賞誰能從吾獵者諸胡子弟爭請從行近得萬人行儉陽為畋獵校勒部伍校古効翻數日遂倍道西進去都支部落十餘里先遣都支所親問其安否外示閒暇似非討襲續使促召相見都支先與李遮匐約秋中拒漢使漢家威加四夷故夷人率謂中國人為漢人猶漢時匈奴謂漢人為秦人也使䟽吏翻下同猝聞軍至計無所出帥其子弟迎謁遂擒之帥讀曰率因傳其契箭悉召諸部酋長夷狄無符信以箭為契信西突厥沙鉢咥利失可汗分其國為十部部以一人綂之人授一箭號十設亦曰十箭左五咄陸部置五大啜居碎葉東右五弩失畢部置五大俟斤居碎葉西執送碎葉城簡其精騎輕齎晝夜進掩遮匐途中獲都支還使與遮匐使者同來行儉釋遮匐使者使先往諭遮匐以都支已就擒遮匐亦降騎奇寄翻齎則兮翻匐蒲北翻降户江翻於是囚都支遮匐以歸遣波斯王自還其國留王方翼於安西使築碎葉城碎葉城焉耆都督府治所也方翼築四面十二門為屈曲隱出伏没之狀冬十月單于大都䕶府突厥阿史德温傳奉職二部俱反阿史德姓也温傳其名奉職亦一部酋長之名單音蟬厥九勿翻立阿史那泥熟匐為可汗二十四州酋長皆叛應之衆數十萬置二十四州見一百九十九卷永徽元年遣鴻臚卿單于大都䕶府長史蕭嗣業右領軍衛將軍花大智何承天姓苑有花姓臚陵如翻單音蟬長知兩翻嗣祥吏翻右千牛衛將軍李景嘉等將兵討之將兵即亮翻又音如字嗣業等先戰屢㨗因不設僃會大雪突厥夜襲其營嗣業狼狽㧞營走衆遂大亂為虜所敗死者不可勝數厥九勿翻敗蒲邁翻勝音升大智景嘉引步兵且行且戰得入單于都䕶府嗣業減死流桂州大智景嘉並免官突厥冦定州刺史霍王元軌命開門偃旗虜疑有伏愳而宵遁州人李嘉運與虜通謀事洩洩息列翻上令元軌窮其黨與元軌曰彊冦在境人心不安若多所逮繫是驅之使叛也乃獨殺嘉運餘無所問因自劾違制上覽表大喜謂使者曰朕亦悔之向無王失定州矣劾户槩翻又户得翻使䟽吏翻自是朝廷有大事上多密敕問之朝直遥翻壬子遣左金吾衛將軍曹懐舜屯井陘井陘縣漢晉後魏皆属常山郡唐属恒州陘音刑右武衛將軍崔獻屯龍門以備突厥突厥扇誘奚契丹侵掠營州誘羊乆翻契欺訖翻又音喫都督周道務遣户曹始平唐休璟將兵擊破之曹魏置始平縣晉武帝置始平郡後魏廢郡以縣屬扶風隋唐屬雍州庚申詔以突厥背誕罷封嵩山背蒲妹翻癸亥吐蕃文成公主遣其大臣論塞調傍來告喪并請和親上遣郎將宋令文詣吐蕃㑹賛普之葬將即亮翻下管將同十一月戊寅朔以太子左庶子同中書門下三品髙智周為御史大夫罷知政事癸未上宴裴行儉謂之曰卿有文武兼資今授卿二職乃除禮部尚書兼檢校右衛大將軍甲辰以行儉為定襄道行軍大摠管將兵十八萬并西軍檢校豐州都督程務挺東軍幽州都督李文暕暕古限翻摠三十餘萬以討突厥並受行儉節度務挺名振之子也程名振為將著功名於貞觀永徽之間永隆元年按會要是年八月二十三日改元永隆春二月癸丑上幸汝州之温湯戊午幸嵩山處士三原田遊巖所居處昌吕翻己未幸道士宗城潘師正所居州考異曰舊傳師正趙賛皇人今從實録上及天后太子皆拜之史言帝崇信異端乙丑還東都三月裴行儉大破突厥于黑山黒山一名殺胡山在豐州中受降城正北如東八十里亦謂之呼延谷禽其酋長奉軄句絶可汗泥熟匐為其下所殺以其首來降降户江翻初行儉行至朔川依考異曰舊傳作朔州今實録及綂紀余按唐朔州治善陽縣漢定襄縣地單于府治金河縣漢雲中郡城也自朔州至單于府三百五十七里以裴行儉軍行次舍考之先至朔州而後至單于府北則舊傳朔州為是謂其下曰用兵之道撫士貴誠制敵貴詐前日蕭嗣業粮運為突厥所掠士卒凍餒故敗今突厥必復為此謀復扶又翻下復為可復同宜有以詐之乃詐為粮車三百乗毎車伏壯士五人各持陌刀勁弩陌刀大刀也一舉刀可殺數人唐六典曰陌刀長刀也步兵所持葢古之斬馬劒釋名曰弩怒也有怒勢也其柄曰臂似人臂也鈎弦者曰牙似牙齒也牙外曰郭為牙之規郭也合名之曰機言如機之巧也亦言如門户樞機開闔有節也乗繩證翻以羸兵數百為之援羸倫為翻且伏精兵於險要以待之虜果至羸兵弃車散走虜驅車就水屮解鞍牧馬欲取糧壯士自車中躍出擊之虜驚走復為伏兵所邀殺獲殆盡自是糧運行者虜莫敢近近其靳翻軍至單于府比抵暮下營掘壍己周掘其月翻塹七艷翻行儉遽命移就髙岡諸將皆言士卒已安堵不可復動行儉不從趣使移趣讀曰促是夜風雨暴至前所營地水深丈餘深式禁翻諸將驚服問其故行儉笑曰自今但從我命不必問其所由知也奉軄既就禽餘黨走保狼山狼山歌邏禄右廂部落所居也永徽元年置狼山州属雲中都䕶府詔户部尚書崔知悌馳傳詣定襄宣慰將士且區處餘冦傳知戀翻處昌吕翻行儉引軍還夏四月乙丑上幸紫桂宫戊辰黄門侍郎聞喜裴炎崔知温聞喜縣漢屬河東郡隋以漢聞喜縣為絳縣以漢絳縣為曲沃縣以桐鄉置聞喜縣尋改為桐鄉縣武德元年復曰聞喜屬絳州中書侍郎京兆王德真並同中書門下三品知温知悌之弟也秋七月吐蕃冦河源左武衛將軍黑齒常之擊却之和考異曰實録吐蕃大將賛婆及素貴等帥衆三萬進冦河源屯兵于良非川辛巳河西鎮撫大使李敬𤣥統衆與賊戰于湟川官軍敗績副使左武衛將軍黒齒常之帥精騎三千夜襲賊營殺獲二千餘級賛婆等遂退擢常之為河源軍經略大使詔敬𤣥留鎮鄯州以為之援按儀鳯三年九月敬𤣥已與吐蕃戰敗于青海常之夜襲虜營賊乃退與此事頗相類舊書敬𤣥傳止一敗無再敗常之傳儀鳯中從敬𤣥擊吐蕃走䟦地設充河源軍副使時賛婆等屯良非川常之夜襲賊營走之擢為大使事似同時新書敬𤣥傳戰青海又戰湟川凡再敗常之傳儀鳯三年襲䟦地設調露中襲賛婆唐厯統紀皆無今年敬𤣥敗事又實録今年八月丁巳敬𤣥貶衡州刺史辛巳至丁巳纔三十七日賈耽皇華四逹記自長安至鄯州約一千七百餘里時髙宗又在東都若敬𤣥敗後累表稱疾得報乃來至東都必數日乃貶非三十七日之内所能容也今略去敬𤣥湟川敗事但云吐蕃冦河源常之擊却之而已今按劉㫬唐書地理志鄯州在京師西一千九百一十三里擢常之為河源軍經略大使常之以河源衝要欲加兵戌之而轉輸險逺乃廣置烽戍七十餘所開屯田五千餘頃歳收五百餘萬石由是戰守有僃焉先是劒南募兵於茂州西南築安戎城以斷吐蕃通蠻之路宋白曰茂州本冉駹之國漢開為汶山郡華陽國志云宣帝地節三年武都白馬羌反使駱武平定之汶山吏民詣武自訟一歳再度更賦至重邊人貧苦無以供給求省郡遂省汶山郡復置都尉今州即漢蜀郡汶江縣梁普通三年置繩州取桃闗之路以繩作橋以名州後周為汶州置汶山縣唐改茂州取界内茂滋山而名吐蕃以生羌為鄉導先悉薦翻斷丁管翻鄉讀曰嚮攻陷其城以兵據之由是西洱諸蠻皆降于吐蕃洱而志翻降户江翻吐蕃盡據羊同党項及諸羌之地東接凉松茂嶲等州南鄰天笁西陷龜兹疎勒等四鎮党底朗翻嶲音髓龜兹音丘慈北抵突厥地方萬餘里諸胡之盛莫與為比丙申鄭州刺史江王元祥薨鄭州漢滎陽縣地漢滎陽属河南郡晉分為滎陽郡後魏屬北豫州後置鄭州隋開皇十六年改曰管州大業初復曰鄭州突厥餘衆圍雲州雲州漢平城縣地後魏為代都北齊及後周為恒安鎮貞觀七年置雲州及定襄縣代州都督竇懐悊悊與哲同右領軍中郎將程務挺將兵擊破之將即亮翻八月丁未上還東都中書令檢校鄯州都督李敬𤣥軍既敗屢稱疾請還上許之既至無疾詣中書視事上怒丁巳貶衡州刺史衡州漢酃縣蒸陽耒陽茶陵縣地吳置湘東郡梁陳置衡山郡隋平陳置衡州京師東南三千四百三里至東都二千七百六十里太子賢聞宫中竊議以賢為天后姊韓國夫人所生内自疑懼明崇儼以厭勝之術為天后所信厭於葉翻常密稱太子不堪承繼英王貌類太宗又言相王相最貴相悉亮翻天后嘗命北門學士撰少陽正範顔延之曲水詩序曰正體毓德於少陽注云東宫少陽位也少詩照翻及孝子傳以賜太子傳直戀翻又數作書誚讓之數所角翻誚才笑翻太子愈不自安及崇儼死賊不得天后疑太子所為太子頗好聲色與户奴趙道生等狎昵好呼到翻昵尼質翻多賜之金帛司議郎韋承慶上書諫不聽上時掌翻天后使人告其事詔薛元超裴炎與御史大夫髙智周等襍鞫之於東宫馬坊搜得皂甲數百領以為反具道生又欵稱太子使道生殺崇儼上素愛太子遲回欲宥之天后曰為人子懐逆謀天地所不容大義滅親何可赦也甲子廢太子賢為庶人遣右監門中郎將令狐智通等送賢詣京師監古銜翻將即亮翻幽于别所黨與皆伏誅仍焚其甲於天津橋南以示士民劉昫曰東都周之王城平王東遷所都也故城在今苑内東北隅自赧王以後及東漢魏文晉武皆都於今故洛城隋大業元年自故洛城西移十八里置新都今都城是也北據邙山南對伊闕洛水貫都有河漢之象跨洛為橋曰天津橋唐世人主往來東都西京而實都長安以長安為京師承慶思謙之子也韋思謙見一百九十九巻永徽元年乙丑立左衛大將軍雍州牧英王哲為皇太子雍於用翻改元赦天下太子洗馬劉訥言嘗撰俳諧集以獻賢賢敗搜得之上怒曰以六經教人猶恐不化乃進俳諧鄙説豈輔導之義邪流訥言於振州舊志振州與崖州同在大海洲中至京師八千六百六里至東都七千七百九十七里洗悉薦翻撰士免翻俳蒲皆翻考異曰新傳云除名為民復坐事流死振州今從實録左衛將軍髙真行之子政為太子典膳丞事與賢連上以付其父使自訓責政入門真行以佩刀刺其喉真行兄户部侍郎審行又刺其腹真行兄子琁斷其首弃之道中刺七亦翻琁從宣翻斷丁管翻上聞之不恱貶真行為睦州刺史審行為渝州刺史真行士亷之子也舊志睦州京師東南三千六百五十九里至東都二千八百二十一里渝州漢末之巴東郡隋置渝州京師西南二千七百四十八里至東都三千四百三十里髙士廉長孫无忌之舅左庶子中書門下三品張大安坐阿附太子左遷普州刺史舊志普州至京師二千三百六十里至東都三千二百三里其餘宫僚上皆釋其罪使復位左庶子薛元超等皆舞蹈拜恩右庶子李義琰獨引咎涕泣時論美之九月甲申以中書侍郎同中書門下三品王德真為相王府長史罷政事唐制王府置長史司馬長史從四品上司馬從四品下長史司馬統領府僚紀綱職務相悉亮翻冬十月壬寅蘇州刺史曹王明蘇州古吳國東漢為吳郡隋置蘇州因姑蘇山而名沂州刺史嗣蔣王煒沂州漢琅邪國後魏置北徐州後周改沂州以沂水名隋為琅邪郡唐復以琅邪郡置沂州煒于鬼翻皆坐故太子賢之黨明降封零陵郡王黔州安置煒除名道州安置道州漢零陵郡冷道馮乗之地隋以零陵郡置永州武德四年分置營州貞觀八年改曰道州舊志黔州京師南三千一百九十三里至東都二千二百七十七里丙午文成公主薨于吐蕃己酉車駕西還十一月壬申朔日有食之開耀元年是年十月方改元新書作九月春正月突厥冦原慶等州乙亥遣右衛將軍李知十等屯涇慶二州以僃突厥庚辰以初立太子敕宴百官及命婦於宣政殿西京東内正殿曰含元後殿曰宣政引九部伎及散樂自宣政門入杜佑曰散樂即百戱也伎渠綺翻散悉亶翻太常博士袁利貞上疏以為正寢非命婦宴㑹之地路門非倡優進御之所上時掌翻倡音昌請命婦㑹於别殿九部伎自東西門入其散樂伏望停省上乃更命置宴於麟德殿麟德殿麟德中所作也閣本大明宫圗翰林院宻邇麟德殿韋執誼曰翰林院在右銀臺門内麟德殿在西重廊之後更工衡翻宴日賜利貞帛百叚利貞昂之曾孫也利貞族孫誼為蘇州刺史自以其先自宋太尉淑以來盡忠帝室袁淑死於宋元凶之難袁顗以死奉子勛袁昂盡節於齊室袁憲盡忠於陳後主謂琅邪王氏雖奕世台鼎而為歴代佐命琅邪王氏股肱晉室而王𢎞為宋室佐命王儉為齊室佐命梁室之興侯景之簒王亮王克為勸進之首耻與為比嘗曰所貴於名家者為其世篤忠貞才行相繼故也為于偽翻行下孟翻彼鬻婚姻求禄利者又烏足貴乎時人是其言因袁利貞併著袁誼之言以其有益於名教也裴行儉軍既還突厥阿史那伏念復自立為可汗復扶又翻杜佑曰伏念頡利從兄之子與阿史德温傅連兵為冦癸巳以行儉為定襄道大摠管以右武衛將軍曹懐舜幽州都督李文暕為副將兵討之暕古限翻將即亮翻二月天后表請赦杞王上金鄱陽王素節之罪以上金為沔州刺史沔州漢安陸之地晉置沔陽縣江左為魯山鎮隋開皇十七年置漢陽縣属復州復州治沔陽大業初改復州曰沔州唐復以沔州為復州分漢陽置沔州素節為岳州刺史岳州漢下雋縣地吳置巴陵縣晉置建昌郡梁置巴州隋改曰岳州因天岳山以名州大業初改羅州唐復曰岳州舊志岳州京師東南二千二百三十七里至東都一千八百一十六里仍不聽朝集朝直遥翻三月辛卯以劉仁軌兼太子少傅餘如故仁軌先為尚書左僕射同中書門下三品以侍中郝處俊為太子少保罷政事少府監裴匪舒善營利少詩照翻奏賣苑中馬糞歳得錢二千萬緡上以問劉仁軌對曰利則厚矣恐後代稱唐家賣馬糞非嘉名也乃止匪舒又為上造鏡殿成為于偽翻上與仁軌觀之仁軌驚趨下殿上問其故對曰天無二日土無二王孟子識孔子之言適視四壁有數天子不祥孰甚焉上遽令剔去去羌吕翻曹懐舜與禆將竇義昭將前軍擊突厥將即亮翻下同又音如字或告阿史那伏念與阿史德温傅在黑沙黒沙城後突厥㸃啜以為南庭左右纔二十騎以下可逕往取也騎奇寄翻懐舜等信之留老弱於瓠蘆泊水白為泊帥輕鋭倍道進至黑沙無所見人馬疲頓乃引兵還㑹薛延陁部落欲西詣伏念遇懐舜軍因請降帥讀曰率降户江翻懐舜等引兵徐還至長城北遇温傅小戰各引去至横水横水去金河百四十許里遇伏念懐舜義昭與李文暕及禆將劉敬同四軍合為方陳陳讀曰陣且戰且行經一日伏念乗便風擊之軍中擾亂懐舜等弃軍走軍遂大敗死者不可勝數勝音升懐舜等收散卒歛金帛以賂伏念與之約和殺牛為盟伏念北去懐舜等乃得還還從宣翻又音如字夏五月丙戌懐舜免死流嶺南己丑河源道經略大使黑齒常之將兵擊吐蕃論賛婆於良非川破之収其糧畜而還畜許救翻常之在軍七年吐蕃深畏之不敢犯邊初太原王妃之薨也武士彠封太原王妃從其爵咸亨元年薨天后請以太平公主為女官以追福公主天后女也及吐蕃求和親請尚太平公主上乃為立太平觀以公主為觀主以拒之為于偽翻觀古玩翻至是始選光禄卿汾隂薛曜之子紹尚焉紹母太宗女城陽公主也據㑹要城陽公主先降杜荷荷誅降薛瓘新書亦然秋七月公主適薛氏自興安門南至宣陽坊西燎炬相屬自興安門而南歴三坊至宣陽坊萬年縣治在焉属之欲翻夾路槐木多死紹兄顗以公主寵盛深憂之顗魚豈翻以問族祖户部郎中克構唐户部郎掌分理户口井田之事凡天下十道任土所出為貢賦之差克構曰帝甥尚主國家故事茍以恭慎行之亦何傷然諺曰娶婦得公主無事取官府不得不為之懼也天后以顗妻蕭氏及顗弟緒妻成氏非貴族欲出之曰我女豈可使與田舍女為妯娌邪為于偽翻妯直六翻娌兩耳翻妯娌娣姒婦也或曰蕭氏瑀之姪孫國家舊姻蕭瑀子鋭尚太宗女襄城公主乃止夏州羣牧使安元夀奏自調露元年九月以來喪馬一十八萬餘匹監牧吏卒為虜所殺掠者八百餘人夏戸雅翻使䟽吏翻喪息浪翻唐諸牧監掌群牧孳課之事凡諸羣牧立南北東西四使以分綂之其馬皆印每歳終監牧使廵案孳數以功過相除為之考課此止夏州所喪失之數薛延陁逹渾等五州四萬餘帳來降逹渾都督領姑衍州步訖若州嵠彈州鶻州低粟州降户江翻甲午左僕射兼太子少傅同中書門下三品劉仁軌固請解僕射許之閏七月丁未裴炎為侍中崔知温薛元超並守中書令上徵田遊巖為太子洗馬在東宫無所規益右衛副率蔣儼右衛副率從四品上洗悉薦翻率所律翻以書責之曰足下負巢由之俊節傲唐虞之聖主聲出區宇名流海内主上屈萬乗之重申三顧之榮三顧用諸葛亮事上幸嵩山嘗至遊巖所居故云然乗繩證翻遇子以商山之客漢四皓隱於商山待子以不臣之禮將以輔導儲貳漸染芝蘭耳漸子廉翻皇太子春秋鼎盛聖道未周僕以不才猶參庭諍足下受調䕶之寄漢髙帝謂四皓曰煩公卒調䕶太子是可言之秋唯唯而無一談悠悠以卒年歳唯于癸翻卒子恤翻向使不飡周粟夷齊採薇西山不食周粟飡千安翻僕何敢言禄及親矣以何酬塞遊巖有母塞悉則翻想為不逹謹書起予孔子謂子夏曰起予者商也為于偽翻遊巖竟不能荅庚申上以服餌令太子監國監古衘翻裴行儉軍于代州之陘口即鴈門之陘嶺闗口陘音刑多縱反間由是阿史那伏念與阿史德温傅浸相猜貳伏念留妻子輜重於金牙山突厥之初建牙於金山其後分為東西突厥凡建牙之地率謂之金牙山蘇定方直抵金牙山擒賀魯此西突厥可汗所居之金牙山也裴行儉遣程務挺等掩金牙山取伏念妻子此東突厥可汗所居之金牙山也可汗所居謂之金帳故亦以金牙言之間古莧翻下同重直龍翻下同以輕騎襲曹懐舜行儉遣禆將何迦密自通漠道程務挺自石地道掩取之騎奇寄翻將即亮翻下同迦居牙翻又居伽翻伏念與曹懐舜約和而還比至金牙山還從宣翻比必利翻失其妻子輜重士卒多疾疫乃引兵北走細沙行儉又使副摠管劉敬同程務挺等將單于府兵追躡之伏念請執温傅以自效然尚猶豫又自恃道逺唐兵必不能至不復設僃走音奏躡泥輙翻復扶又翻單音蟬敬同等軍到伏念狼狽不能整其衆遂執温傅從間道詣行儉降候騎告以塵埃漲天而至將士皆震恐行儉曰此乃伏念執温𫝊來降非它盗也然受降如受敵不可無僃乃命嚴僃遣單使迎前勞之少選間古莧翻降户江翻下同騎奇寄翻使䟽吏翻勞力到翻少選猶言少頃也伏念果帥酋長縳温傅詣軍門請罪帥讀曰率酋慈由翻長知兩翻行儉盡平突厥餘黨以伏念温傅歸京師厥九勿翻冬十月丙寅朔日有食之壬戌裴行儉等獻定襄之俘乙丑改元改元開耀丙寅斬阿史那伏念阿史德温傅等五十四人于都市既書十月丙寅朔日食方書壬戍裴行儉獻俘乙丑改元又書丙寅斬阿史那伏念等是十月一月内有二丙寅矣此舊史之誤通鑑因之失於檢㸃也新書是年九月乙丑改元葢壬戌獻俘亦九月事前年命行儉為定襄道行軍大總管以討突厥故曰獻定襄之俘初行儉許伏念以不死故降裴炎疾行儉之功奏言伏念為副將張䖍朂程務挺所逼又廻紇等自磧北南向逼之窮窘而降耳紇下没翻磧七迹翻遂誅之行儉歎曰渾濬爭功事見八十一巻晉武帝太康元年言若爭伏念之死則是與張䖍勗程務挺爭功古今所耻但恐殺降無復來者復扶又翻因稱疾不出丁亥新羅王法敏卒卒子恤翻遣使立其子政明十一月癸卯徙故太子賢於巴州舊志巴州至京師二千三百六十里東都二千五百八十二里資治通鑑卷二百二
