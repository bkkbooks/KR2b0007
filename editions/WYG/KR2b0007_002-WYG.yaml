  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑巻二宋司馬光撰胡三省音註周紀二起昭陽赤奮若盡上章困敦凡四十八年起癸丑終庚子顯王十一家諡法行見中外曰顯受禄于天曰顯百辟惟刑曰顯周公蓋未有此諡而周之末世諡顯王曰顯意謂後世傳寫周公諡法者遺之元年齊伐魏取觀津康曰齊伐魏魏惠王請獻觀以和即觀津余按班志信都國有觀津縣與齊相去甚逺且趙地也又東郡有畔觀縣水經大河故瀆東逕五鹿之野又東逕衞國故城南古卙觀也此其魏之觀津歟徐廣曰觀今衛縣史記正義曰魏州觀城縣古觀國國語云觀國夏太康第五弟之所封也觀工喚翻趙侵齊取長城劉昭志濟北盧縣有長城史記蘇代説燕王曰齊有長城鉅防即此三年魏韓㑹于宅陽水經注曰滎澤之際有沙城世謂水城非也魏冉走芒卯入北宅即此宅陽城括地志曰宅陽故城在鄭州滎陽縣東十七里秦敗魏師韓師于洛陽洛陽在洛水之北周公遷殷民於此謂之成周班志屬河南郡敗補邁反四年魏伐宋五年秦獻公敗三晉之師于石門水經注馮翊雲陽縣有石門山括地志在雍州三原縣西北三十二里又曰堯門山俗名石門上有路其狀若門故老云堯鑿山為門因名之武徳中於此山南置石門縣貞觀中改雲陽縣斬首六萬王賜以黼黻之服黼者刺繡為斧形黻者刺繡為兩已相背孔頴達曰白與黒謂之黼黑與青謂之黻黼音甫黻音弗七年魏敗韓師趙師于澮澮古外翻括地志澮水在絳州翼城縣東南二十五里水側有皮牢城秦魏戰于少梁班志馮翊夏陽縣故少梁師古曰本梁國為秦所滅至惠文王十一年更名夏陽康曰魏有大梁故此稱少以别之少詩沼翻夏戸雅翻更工衡翻魏師敗績獲魏公孫痤左傳師大崩曰敗績痤才何翻衞聲公薨子成矦速立燕桓公薨子文公立燕因肩翻侯考異曰史記蘇秦傳謂之燕文按春秋時北燕簡公已稱公文公之子易王尋稱王豈文公獨稱侯乎今從世家秦獻公薨子孝公立索隱曰孝公名渠梁孝公生二十一年矣是時河山以東彊國六河自龍門上口南抵華陰而東流秦國在河之西山自鳥鼠同穴連延為長安南山至于泰華秦國在山之西韓魏趙齊楚燕六國皆在河山以東華戸化翻燕因肩翻淮泗之間小國十餘南陽郡平氏縣東南有桐柏大復山淮水所出東南至淮陵入海泗水出魯國卞縣西南至方與入沛宋魯鄒滕薛郳等國國於其間齊威王所謂泗上十二諸侯楚魏與秦接界魏築長城自鄭濱洛以北有上郡鄭縣周宣王母弟鄭桓公封邑班志屬京兆洛水名非伊洛之洛也水經注渭水東過華隂縣北洛水入焉洛水古漆沮之水也又有長澗水南出泰華之山側長城東而北流注于渭史記所謂魏築長城自鄭濱洛者也宋白曰今華州東南魏長城是也上郡漢屬并州隋唐之綏州延州秦漢之上郡地也濱音賓楚自漢中南有巴黔中漢中郡漢屬益州自晉以後為梁州巴即春秋巴子之國漢為巴郡屬益州唐為巴渝渠果諸州之地黔中漢為牂牁郡之地唐為黔中節度黔渠今翻皆以夷翟遇秦翟與狄同擯斥之不得與中國之㑹盟擯必刃翻與讀曰預於是孝公發憤布徳修政欲以彊秦憤房粉翻懣也怒也朱元晦曰憤者心求通而未得之意八年孝公下令國中曰昔我穆公自岐雍之間修徳行武東平晉亂以河為界西霸戎翟廣地千里天子致伯諸侯畢賀令力正翻號令也命令也令者出於上而行於下者也岐山周太王所邑班志岐山在扶風美陽縣西雍縣屬扶風秦穆公娶晉獻公之女獻公卒晉國亂穆公納惠公惠公立而背河外之賂又閉秦糴穆公伐晉執惠公既而歸之始征晉河東置官司惠公卒子懷公立穆公納文公而晉亂平又能用由余及孟明以霸西戎天子致伯者周禮九命作伯古有九州一為王畿八州八伯各主其方之諸侯致伯者以方伯之任致之穆公也雍於用翻伯如字背蒲妹翻為後世開業甚光美㑹往者厲躁簡公出子之不寜國家内憂未遑外事三晉攻奪我先君河西地醜莫大焉為于偽翻史記秦厲共公卒子躁公立躁公卒立其弟懷公四年庻長鼂闈懷公公自殺乃立靈公靈公卒子獻公不得立立靈公之季父是為簡公公卒而惠公立惠公卒子出子立二年庶長改殺出子迎立獻公于河西河西地即魏所有西河之外史記正義曰自華州北至同州並魏河西之地躁則到翻共讀曰恭鼂古朝字長知兩翻華戸化翻獻公即位鎭撫邊境徙治櫟陽史記秦獻公二年始治櫟陽徐廣註曰即漢萬年縣余按漢志櫟陽萬年為兩縣皆屬馮翊後漢始省併宋白曰櫟陽秦舊縣漢高祖既葬太上皇於萬年陵仍分櫟陽置萬年縣以為陵邑理櫟陽城中故櫟陽城亦名萬年城後漢省櫟陽縣入萬年縣後魏大統中分萬年置鄣丘宣武又分置廣陽縣周明帝省萬年入高陵廣陽二縣更於武安城中别置萬年縣唐武徳元年又改廣陽為櫟陽元和十五年並移𨽻奉先縣以奉景陵櫟音藥且欲東伐復穆公之故地修穆公之政令寡人思念先君之意常痛於心賓客羣臣有能出奇計彊秦者吾且尊官與之分土謂裂地以封之使各有分土分扶問翻於是衞公孫鞅聞是令下乃西入秦公孫鞅者衞之庶孫也好刑名之學師古曰劉向别錄云中子學好刑名刑名者循名以責實其尊君卑臣崇上抑下合於六經説者曰刑刑家名名家即太史公所論六家之二也此説非劉原父曰刑名即并學兩家術耳公孫非姓氏以其先出於衞父為衞侯則稱為公子祖為衞侯則稱為公孫鞅於兩翻事魏相公孫痤痤知其賢未及進㑹病魏惠王往問之曰公叔病如有不可諱相息亮翻痤才戈翻不可諱謂死也俗語有之人不諱死将奈社稷何公叔曰痤之中庶子衞鞅自戰國以來大夫之家有中庶子有舍人年雖少有奇才少詩照翻願君舉國而聽之王嘿然公叔曰君即不聽用鞅必殺之無令出境王許諾而去令力丁翻公叔召鞅謝曰吾先君而後臣先後皆去聲故先為君謀後以告子此先後皆如字為于偽翻子必速行矣鞅曰君不能用子之言任臣又安能用子之言殺臣乎卒不去卒子恤翻王出謂左右曰公叔病甚悲乎欲令寡人以國聽衞鞅也旣又勸寡人殺之豈不悖哉悖蒲内翻衞鞅旣至秦因嬖臣景監以求見孝公嬖博計翻又卑義翻史記正義監甲暫翻康曰景姓楚之族監古銜切非説以富國彊兵之術公大悦與議國事説式芮翻十年衞鞅欲變法秦人不悦衞鞅言於秦孝公曰夫民不可與慮始而可與樂成夫音扶樂音洛論至徳者不和於俗成大功者不謀於衆是以聖人茍可以彊國不灋其故索隱曰言救弊為政之術所為茍可以彊國則不必須要法於故事也甘龍曰不然索隱曰甘姓龍名甘姓出春秋時甘昭公子帶之後姓譜又曰甘姓商甘盤之後因民而教者不勞而成功緣法而治者吏習而民安之治直吏翻衞鞅曰常人安於故俗學者溺於所聞溺奴歴翻以此兩者居官守法可也非所與論於灋之外也智者作法愚者制焉賢者更禮不肖者拘焉更工衡翻公曰善以衞鞅為左庻長劉邵爵制曰春秋傳有庻長鮑商君為政備其法品為十八級合闗内侯列侯凡二十等其制因古義古者天子寄軍政於六卿居則以田警則以戰所謂入使治之出使長之素信者與衆相得也故啓伐有扈乃召六卿大夫之在軍為将者也及周之六卿亦以居軍在國也則以比長閭胥族師黨州長鄉大夫為稱其在軍也則以司馬将軍卒伍為號所以異在國之名也秦依古制其在軍賜爵為等級其師人皆更卒也有功賜爵則在軍吏之例自一等以上至不更四等皆士也大夫以上至五大夫五等比大夫也九等依九命之義也曰左庻長至大庻長比九卿也闗内侯者依古圻内子男之義也秦都山西以闗内為王畿故曰闗内侯也列侯者依古列國諸侯之義也然則卿大夫士下之品皆倣古比朝之制而異其名亦所以殊軍國也古者以車戰兵車一乘步卒七十二人分翼左右車大夫在左御者處中勇士為右凡七十五人一爵曰公士者步卒之有爵為公士者也二爵曰上造造成也古者成士升於司徒曰造士雖依此名皆步卒也三爵曰簮褭御駟馬者要褭者古之名馬也駕駟馬其形似簮故云簮褭也四爵曰不更不更者為車右不復與凡更卒同也五爵曰大夫大夫在車左者也六爵為官大夫七爵為公大夫八爵為公乘九爵為五大夫皆軍吏也吏民爵不得過公乘者得貰與子若同産然則公乘者軍吏之爵最高者也雖非臨戰得公乘車故曰公乘也十爵為左庻長十一爵為右庻長十二爵為左更十三爵為中更十四爵為右更十五爵為少上造十六爵為大上造十七爵為駟車庻長十八爵為大庻長十九爵為闗内侯二十爵為列侯自左庻長至大庻長皆卿大夫皆軍将也所将皆庻人更卒也故以庻更為名大庻長即大将軍也左右庻長即左右偏裨将軍也長知丈翻卒定變法之令令民為什伍而相收司連坐索隱曰收司謂相糾發也一家有罪則九家連舉發若不糾舉則九家連坐師古曰五人為伍二伍為什康曰司猶管也為什伍之法使之相司相管秦有見知連坐法余謂連坐者一家有罪什伍皆相連坐罪也見知乃漢法卒子恤翻告姦者與斬敵首同賞索隱曰謂告姦一人則得爵一級故曰與斬敵首同賞不告姦者與降敵同罰索隱曰律降敵者誅其身沒其家今匿姦者言常與之同罰降户江翻有軍功者各以率受上爵率音律為私鬭者各以輕重被刑大小僇力本業耕織致粟帛多者復其身僇力竹翻古戮字説文并力也字林音遼復方目翻漢法除其賦税役皆謂之復事末利及怠而貧者舉以為收孥索隱曰末利謂工商糾舉而收録其妻子没為奴婢秦法一人有罪收其室家至漢文帝元年始除收孥相坐法孥音奴宗室非有軍功論論議也有戰功之可論也論盧困翻康盧昆切不得為屬籍屬籍宗屬之籍也孔頴達曰漢之同宗有屬籍則周家繫之以姓是也周禮小史之官掌定帝繫世本知世代昭穆屬殊玉翻明尊卑爵秩等級各以差次白虎通曰爵者盡也所以盡人才也毛晃曰大夫以上預燕饗然後賜爵秩以章有徳秩職也官也積也次也常也序也名田宅臣妾衣服有功者顯榮無功者雖富無所芬華令既具未布恐民之不信乃立三丈之木於國都市南門募民有能徙置北門者予十金予讀曰與民怪之莫敢徙復曰能徙者予五十金復扶又翻有一人徙之輙予五十金李云金方寸重一斤為一金程大昌演繁露曰二十兩為一金亦為一鎰乃下令令行朞年秦民之國都之往也如也言新令之不便者以千數於是太子犯法衞鞅曰法之不行自上犯之太子君嗣也嗣祥吏翻不可施刑刑其傅公子䖍黥其師公孫賈墨湼其面曰黥黥音渠京翻為後秦殺商君鞅張本明日秦人皆趨令索隱曰趨者向也附也音七喻翻行之十年秦國道不拾遺山無盜賊民勇於公戰怯於私鬭鄉邑大治自是年至三十一年商鞅死蓋鞅之行其法而致效在十年之間又十年而致禍治直吏翻秦民初言令不便者有來言令便衞鞅曰此皆亂法之民也盡遷之於邊其後民莫敢議令臣光曰夫信者人君之大寶也夫音扶國保於民民保於信非信無以使民非民無以守國是故古之王者不欺四海孔穎達曰自今本昔曰古霸者不欺四鄰善為國者不欺其民善為家者不欺其親不善者反之欺其鄰國欺其百姓甚者欺其兄弟欺其父子上不信下下不信上上下離心以至於敗所利不能藥其所傷所獲不能補其所亡豈不哀哉昔齊桓公不背曹沫之盟晉文公不貪伐原之利魏文侯不棄虞人之期姓譜曹本自顓頊之𤣥孫陸終之子六安是為曹姓周武王封曹狹于邾故邾曹姓也又云曹叔振鐸之後武王母弟也後以為氏史記齊桓公伐魯魯荘公請平桓公許之與盟於柯将盟曹沫以匕首劫桓公於壇上請反魯之侵地桓公許之曹沬去匕首而就臣位桓公後悔欲殺曹沬管仲不可遂反所侵地於魯諸侯聞之皆信齊而欲附焉左傳晉文公圍原命三日之糧原不降命去之諜出曰原将降矣軍吏曰請待之公曰得原失信所亡滋多退一舍而原降魏文侯事見上卷威烈王二十三年背蒲妺反索隱曰沬音亡葛翻左傳榖梁並作曹劌然則沬宜音劌沬劌聲相近而字異耳秦孝公不廢徙木之賞此四君者道非粹白而商君尤稱刻薄又處戰攻之世天下趨於詐力猶且不敢忘信以畜其民處昌吕翻趨七喻翻畜許六翻養也况為四海治平之政者哉治直吏翻韓懿侯薨子昭侯立諡法昭徳有勞曰昭聖聞周達曰昭十一年秦敗韓師于西山自宜陽熊耳東連嵩高南至魯陽皆韓之西山敗補邁翻十二年魏韓㑹于鄗班志鄗縣屬中山郡此時為趙地後漢改為高邑唐為趙州柏鄉縣贊皇縣地鄗呼各翻十三年燕趙㑹于阿燕因肩翻趙齊宋㑹于平陸十四年齊威王魏惠王㑹田于郊惠王曰齊亦有寶乎威王曰無有惠王曰寡人國雖小尚有徑寸之珠照車前後各十二乘者十枚乘繩證翻豈以齊大國而無寶乎威王曰寡人之所以為寶者與王異吾臣有檀子者姓譜云齊公族有食采於瑕丘檀城因以為氏使守南城城在齊之南境故曰南城則楚人不敢為寇泗上十二諸侯皆來朝朝直遥翻吾臣有盼子者使守高唐則趙人不敢東漁于河盼匹莧翻又披班翻按丁度集韻盼與盻同盼子齊之同姓即田盼也班志高唐縣屬平原郡杜預曰祝阿西北有高唐城宋白曰齊州章丘縣古高唐春秋戰國之時為齊邑故城在廢禹城縣西四十里唐之禹城漢祝阿也吾吏有黔夫者使守徐州姓譜齊有黔敖則黔亦姓也音其淹翻司馬彪曰魯國薛縣六國時曰徐州徐音舒丁度集韻徐作俆音同則燕人祭北門趙人祭西門燕在齊之北趙在齊之西賈逵曰燕趙畏齊故祭以求福燕因肩翻徙而從者七千餘家吾臣有種首者使備盗賊則道不拾遺種章勇翻此四臣者将照千里豈特十二乘哉惠王有慙色秦孝公魏惠王㑹于杜平班志京兆有杜陵縣故周之杜伯國也史記灌嬰傳嬰以昌平侯食邑于杜平鄉正義曰杜平在唐之同州澄城縣界魏世家作杜平魯共公薨子康公毛立共讀曰恭十五年秦敗魏師于元里史記正義曰元里亦在同州澄城縣界敗補邁翻斬首七千級秦法戰而斬敵人一首者賜爵一級因謂之級取少梁少詩照翻魏惠王伐趙圍邯鄲楚王使景舍救趙邯音寒鄲音丹昭屈景皆楚之同姓楚強族也屈九勿翻十六年齊威王使田忌救趙初孫臏與龎涓俱學兵法姓譜周文王子康叔封於衞至武公子惠孫曾耳為衞上卿因氏焉後有孫武孫臏俱善兵趙明誠金石錄有漢安平相孫根碑云先出自有殷之裔子武王定周封比干墓𦙍裔分析定曰孫焉姓譜又曰龎姓畢公高之後支庻封于龎因氏焉臏頻忍翻刖刑也去膝葢骨鄭𤣥曰周改臏作刖刖斷足也書傳云决闗梁踰城郭而畧盗者其刑臏孫臏蓋以刖足故呼為臏説文臏膝耑也類篇毘賓切龎薄江翻涓古𤣥翻龎涓仕魏為将軍将軍之官自周以來有之自以能不及孫臏乃召之至則以法斷其兩足而黥之斷丁管翻欲使終身廢棄齊使者至魏孫臏以刑徒陰見説齊使者齊使疏吏翻説式芮翻齊使者竊載與之齊之往也田忌善而客待之進於威王威王問兵法遂以為師於是威王謀救趙以孫臏為将辭以刑餘之人不可乃以田忌為将而孫子為師居輜車中坐為計謀将即亮翻字林曰軿車有衣蔽無後轅者謂之輜釋名曰有邸曰輜無邸曰輧傅子曰周曰輜車即輦也康曰輧車也軍行所以載輜重輜楚持翻輧蒲眠翻重直用翻田忌欲引兵之趙孫子曰夫解雜亂紛糾者不控拳索隱曰謂事之雜亂紛糾也解雜亂紛糾者當善以手解之不可控拳而擊之余謂雜亂紛糾者謂人鬭者耳非事也康曰拳與絭同絭者攘臂繩也余謂當從索隱説康説非夫音扶救鬭者不搏撠索隱曰搏撠音博㦸謂救鬬者當善撝解之毋以手相搏撠則其怒益熾矣按撠謂以手持撠以刺人也余謂索隱之説善矣但以撠為持撠以刺人則非也撠如漢書撠太后掖之撠師古曰撠謂拘持之也毛晃曰索隱曰搏拘持曰撠批亢擣虛形格勢禁則自為解耳索隱曰批白結翻亢苦浪翻按批者相排批也音白滅翻亢言敵人相亢拒也擣者擊也衝也虚空也謂前人相亢必須批之彼兵若虚則衝擣之若批其相亢擊擣彼虛則是其形相格其勢自禁止則彼自為解也康曰亢極也高也擣築也乘其高亢而批之乘其虛而擣之則其勢自解批亢擣虛所謂形格勢禁也余謂索隱之説為長蓋鬭者方相亢拒則排批之使解虛者兩敵拒鬬力所不及之處擣之則雖欲鬭其勢不能不解此易見也格各額翻格正也又擊也鬭也吳都賦􅍛􅍛笑而被格本音如字協韻音閣􅍛與彿同音父沸翻今梁趙相攻輕兵鋭卒必竭於外老弱疲於内子不若引兵疾走魏都據其街路衝其方虛康曰虚音墟余謂虛如字衝其方虚即上所謂擣虚也索隱之説義亦如此走則凑翻彼必釋趙以自救是我一舉解趙之圍而收弊於魏也田忌從之十月邯鄲降魏邯音寒戰音丹降户江翻魏師還與齊戰于桂陵魏師大敗還從宣翻又音如字水經注濮渠與酸水㑹水東逕滑臺城南又東南逕瓦亭南又東南㑹于濮濮渠之側有漆城桂城亦曰桂陵即田忌敗魏師處史記正義曰桂陵在曹州乘氏縣東南二十一里濮博木翻韓伐東周取陵觀廪丘周室衰微戰國之時僅有七邑漢時之河南洛陽穀成平陰偃師鞏緱氏是也晉志曰周考王封周桓公孫惠公於鞏號東周故戰國有東西周芒山首山其界也陵觀廪丘皆當時邑聚之名史無所考廪丘史記作邢丘觀古玩翻楚昭奚恤為相江乙言於楚王曰人有愛其狗者狗嘗溺井昭屈景楚之彊族所謂三閭者也太史公曰嬴姓分封為江氏相息亮翻溺奴弔翻其鄰人見欲入言之狗當門而噬之今昭奚恤常惡臣之見亦猶是也噬時制翻見謂見楚王也惡烏路翻且人有好揚人之善者王曰此君子也近之好揚人之惡者王曰此小人也逺之好呼到翻近者附近之近去聲逺于願翻推而逺之推吐雷翻然則且有子弑其父臣弑其主者而王終已不知也已音紀終已猶言終身也何者以王好聞人之美而惡聞人之惡也王曰善寡人願兩聞之江乙欲毁昭奚恤故先設是言十七年秦大良造伐魏索隱曰大良造即大上造余謂大良造大上造之良者也按史記秦紀孝公十年衞鞅為大良造将兵圍魏安邑降之又按六國年表秦孝公之十年顯王之十七年所謂大良造伐魏即衞鞅将兵也是時魏都安邑其兵猶強龎涓太子申公子卭未敗安邑不應遽降於秦至顯王二十九年卭軍既敗魏獻河西之地於秦始去安邑徙都大梁史記六國表不書徙大梁而世家書之魏世家於是年不書安邑降秦而秦紀孝公十年書之通鑑從魏世家於顯王二十九年書魏去安邑徙大梁而是年不書魏安邑降秦蓋亦疑而除去之但大良造之下當有衞鞅二字意謂傳寫通鑑者逸之諸侯圍魏襄陵史記正義曰襄陵故城在兖州鄒縣余按魏境時不至於鄒班志河東有襄陵縣師古曰晉襄公之陵因以名縣括地志襄陵在晉州臨汾縣東南三十五里宋白曰後魏為禽昌縣隋大業二年改為襄陵縣以趙襄子晉襄公俱陵於是邑也十八年秦衞鞅圍魏固陽降之魏有上郡北至固陽漢五原郡稒陽縣是也括地志固陽在銀州銀城縣界按魏築長城自鄭濱洛黄北抵銀州至勝州固陽縣為塞也固陽有連山東至河西南至夏㑹等州降户江翻夏戸雅翻魏人歸趙邯鄲邯音寒鄲音丹與趙盟漳水上記曲禮曰蒞牲曰盟盟者殺牲歃血誓於神也天下太平之時諸侯不得擅相與盟惟天子巡狩至方岳之下㑹畢乃與諸侯相盟同好惡奨王室以昭事神訓民事君凡國有疑則盟詛其不信者至於五霸有事而㑹不協而盟盟之為法先鑿地為方坎殺牲於坎上割牲左耳盛以珠盤又取血盛以王敦用血為盟書成乃歃血而讀書左傳云坎用牲加書是也班志濁漳水出上黨長子縣鹿谷山東至鄴入清漳水經曰出長子縣發鳩山東至武安縣與清漳㑹謂之交漳口又東過鄴縣列人又東北過鉅鹿信都謂之衡漳又東北過平舒縣南而東入海漳諸良翻韓昭侯以申不害為相諡法昭徳有勞曰昭聖聞周達曰昭姓譜四岳之後封于申周有申伯鄭有大夫申侯齊有申鮮虞相息亮翻申不害者鄭之賤臣也學黄老刑名以干昭侯黄老黄帝老子之書昭侯用為相内修政教外應諸侯十五年終申子之身國治兵彊治直吏翻申子嘗請仕其從兄從才用翻羣從之從同昭侯不許申子有怨色昭侯曰所為學於子者欲以治國也為于偽翻治直之翻今将聽子之謁而廢子之術乎已其行子之術而廢子之請乎子嘗教寡人修功勞視次第今有所私求我将奚聽乎申子乃辟舍請罪曰君眞其人也辟讀曰避昭侯有弊袴命藏之袴苦故翻脛衣也侍者曰君亦不仁者矣不賜左右而藏之昭侯曰吾聞明主愛一嚬一咲嚬有為嚬咲有為咲今袴豈特嚬咲哉吾必待有功者言袴雖弊其直猶重固不止於嚬咲也然人主之嚬咲所闗甚大昭侯姑以此為言耳為于偽翻嚬與顰同愁蹙之貌咲古笑字十九年秦商鞅築冀闕宫庭於咸陽索隱曰冀闕即魏闕也爾雅觀謂之闕郭璞曰宫門雙闕也釋名闕在門兩旁中間闕然為道也三輔黄圖曰人臣至此必思其所闕少爾雅宫謂之室郭璞曰宫謂圍繞之也説文曰庭朝中也蒼頡篇曰庭直也風俗通曰庭正也言縣庭郡庭朝庭皆取平均正直也三輔黄圖曰山南為陽水北為陽山水皆在陽故曰咸陽漢高帝更名新城武帝更名渭城屬右扶風括地志咸陽故城在雍州咸陽縣東十五里在長安城北四十五里宋白曰咸陽縣本周王季所都秦又都之三秦記秦都在九􅉄山南渭水北山水俱陽故名咸陽二十九年秦始封衞鞅于商號商君史以後所封書之徙都之令民父子兄弟同室内息者為禁息止也秦俗父子兄弟同室居止商君始更制禁同室内息者堯教民以人倫教之有序有别秦用西戎之俗至於男女無别長幼無序商君今為之禁古道也烏可例言之白虎通曰父矩也以法度教子也子孳也孳孳無已也兄况也况父法也弟悌也心順行篤也并諸小鄉聚集為一縣縣置令丞凡三十一縣廢井田開阡陌周禮六鄉鄉萬二千五百家又百家之内曰鄉五鄙為縣縣二千五百家此六遂之縣也四甸為縣此州里之縣也周制天子地方千里分為百縣縣有四郡左傳趙鞅所謂上大夫受縣下大夫受郡者也秦并天下置三十六郡以監天下之縣自是始統于郡矣釋名曰縣懸也懸于郡也漢書音義所謂大曰鄉小曰聚亦秦制也廣雅曰聚聚居也音慈諭翻縣令丞之官始此令音力正翻令命也告也律也法也長也使為一縣之長以行誥命法律也丞翊也副貳也成周之制田方里為井井九百畝八家各耕百畝其中百畝八十畝為公田二十畝為廬舍史記正義曰南北曰阡東西曰陌劉伯荘曰開田界道使不相干長知兩翻平斗桶權衡丈尺桶索隱音統非也當作甬音勇斛也沈括曰予受詔考鍾律及鑄渾儀求秦漢以來度量斗升計六斗當今之一斗七升九合秤三斤當今十三兩一斤當今四兩三分兩之一一兩當今六銖半為升中方古尺二寸五分十分分之三今尺一寸八分百分分之四十五強秦魏遇于彤彤周彤伯所封之國國于王畿之内史記六國年表商君反死彤地則其地當在漢京兆鄭縣界彤徒冬翻趙成侯薨公子緤與太子爭立緤敗奔韓緤私列翻趙成侯敬侯之子名種太子肅侯語也二十一年秦商鞅更為賦税法行之井田既廢則周什一之法不復用葢計畝而為賦税之法更工衡翻二十二年趙公子范襲邯鄲不勝而死邯音寒鄲音丹二十三年齊殺其大夫牟魯康公薨子景公偃立衞更貶號曰侯服屬三晉周成王封康叔為衞侯其後世進爵為公今寖以弱小貶號曰侯貶悲檢翻二十五年諸侯㑹于京師時天下宗周以洛陽為京師京大也師衆也京師衆大之名也二十六年王致伯于秦伯如字伯者周二伯九伯之任諸侯皆賀秦秦孝公使公子少官帥師㑹諸侯于逢澤以朝王左傳逢澤有介麋焉宋地也杜預註曰地理志言逢澤在滎陽開封縣東北逺疑非括地志曰逢澤在汴州浚儀縣東南二十四里帥音率二十八年魏龎涓伐韓韓請救于齊齊威王召大臣而謀曰蚤救孰與晚救成侯曰不如勿救鄒忌為齊相封成侯田忌曰弗救則韓且折而入於魏折而設翻不如蚤救之孫臏曰夫韓魏之兵未弊而救之臏頻忍翻又毘賓翻夫音扶是吾代韓受魏之兵顧反聽命于韓也且魏有破國之志韓見亡必東面而愬於齊矣見亡言見有亡國之勢也愬告愬也吾因深結韓之親而晚承魏之弊則可受重利而得尊名也王曰善乃隂許韓使而遣之陰闇也使疏吏翻韓因恃齊五戰不勝而東委國于齊齊因起兵使田忌田嬰田盼将之盼與盻同音匹莧翻将即亮翻下同又音如字領也孫子為師以救韓直走魏都走音奏龎涓聞之去韓而歸龎薄江翻涓工𤣥翻魏人大發兵以太子申為将以禦齊師孫子謂田忌曰彼三晉之兵素悍勇而輕齊将即亮翻悍下罕翻又音汗齊號為怯善戰者因其勢而利導之兵法百里而趨利者蹷上将五十里而趨利者軍半至此孫武子兵法也趨七喻翻魏武帝曰蹷其月翻蹷猶挫也劉氏曰蹷猶斃也半至謂軍趨利前後不相屬半至半不至也屬陟玉翻乃使齊軍入魏地為十萬竈明日為五萬竈又明日為二萬竈龎涓行三日大喜曰我固知齊軍怯入吾地三日士卒亡者過半矣過工禾翻乃棄其步軍句斷龎薄江翻涓圭淵翻與其輕鋭倍日并行逐之并行兼程而行也倍日一日行兩日之程亦兼程也孫子度其行暮當至馬陵司馬彪志魏郡元城縣註云左傳成七年㑹馬陵杜預志在縣東南龎涓死處虞喜志林馬陵在濮州鄄城東北六十里澗谷深可以置伏度徒洛翻鄄吉椽翻馬陵道陿而旁多阻隘可伏兵陿與狹同隘烏懈翻乃斫大樹白而書之曰龎涓死此樹下於是令齊師善射者萬弩夾道而伏期曰暮見火舉而俱發龎涓果夜到斫木下見白書以火燭之讀未畢萬弩俱發魏師大亂相失龎涓自知智窮兵敗乃自剄曰遂成豎子之名龎薄江翻涓工𤣥翻剄古頂翻斷首也康古定切非豎殊遇翻説文豎使布短衣齊因乘勝大破魏師虜太子申成侯鄒忌惡田忌鄒以國為氏惡烏路翻使人操十金卜於市操七刀翻曰我田忌之人也我為将三戰三勝欲行大事可乎卜者出因使人執之田忌不能自明率其徒攻臨淄臨淄齊國都也城臨淄水因以為名班志臨淄屬齊國臣瓚曰臨淄即營丘太公營之淄荘持翻求成侯不克出奔楚為下齊復田忌張本二十九年衞鞅言於秦孝公曰秦之與魏譬若人有腹心之疾非魏幷秦秦即并魏何者魏居嶺阨之西索隱曰蓋安邑以東山巔險阨之地今蒲州中條以東連汾晉之險嶝皆其地也阨於革翻都安邑與秦界河秦魏以河為界也而獨擅山東之利擅市戰翻利則西侵秦病則東收地今以君之賢聖國賴以盛而魏往年大破於齊諸侯畔之可因此時伐魏魏不支秦必東徙然後秦據河山之固東鄉以制諸侯鄉讀曰嚮此帝王之業也公從之使衞鞅将兵伐魏魏使公子卭将而禦之軍既相距衞鞅遺公子卭書曰吾始與公子驩今俱為兩國将将即亮翻遺于季翻不忍相攻可與公子面相見盟樂飲而罷兵以安秦魏之民樂音洛公子卭以為然乃相與㑹盟已飲盟已而飲也而衞鞅伏甲士襲虜公子卭因攻魏師大破之魏惠王恐使使獻河西之地於秦以和使使下疏吏翻因去安邑徙都大梁班志陳留郡浚儀縣故大梁杜佑曰汴州城西古城戰國時魏惠王所築乃嘆曰吾恨不用公叔之言公叔言見上八年秦封衞鞅商於十五邑班志𢎞農郡商縣商君邑裴駰曰商於之地在今順陽郡南鄉丹水二縣有商城在於中故謂之商於史記正義曰丹水及商皆屬𢎞農今言順陽是魏晉始分置順陽郡商及丹水皆屬之也水經註丹水逕南鄉丹水二縣之間歴於中之北所謂商於者也杜佑曰今鄧州内鄉縣東七里有於村蓋秦所謂商州商洛縣古商邑卨所封也漢為商縣於如字號曰商君齊趙伐魏楚宣王薨子威王商立三十一年秦孝公薨子惠文王立公子䖍之徒告商君欲反發吏捕之商君亡之魏之如也往也魏人不受復内之秦内讀曰納怨其挾詐以破魏師故不受商君乃與其徒之商於發兵北擊鄭之往也如也鄭京兆之鄭縣也周宣王弟鄭桓公采邑唐屬華州宋白續通典曰鄭縣古城在華州郡城北秦人攻商君殺之車裂以狥盡滅其家車裂古之轘刑轘戸串翻初商君相秦用法嚴酷嘗臨渭論囚渭水盡赤相息亮翻水經渭水出隴西首陽縣鳥鼠山東流至秦都咸陽南商君葢臨此以論囚决罪曰論論盧困翻為相十年人多怨之按顯王十七年秦以商鞅為大良造十九年商鞅徙秦都咸陽廢井田開阡陌平權量二十一年更賦税法為相當在是年至今年十年矣趙良見商君商君問曰子觀我治秦治直之翻孰與五羖大夫賢百里奚自賣以五羖羊之皮為人養牛秦穆公舉以為相秦人謂之五羖大夫羖壮羊也羖音古趙良曰千人之諾諾不如一士之諤諤引趙簡子之言諾應聲也諤謇直也僕請終日正言而無誅可乎商君曰諾趙良曰五羖大夫荆之鄙人也穆公舉之牛口之下孟子百里奚虞人也以食牛干秦繆公今曰荆之鄙人按史記晉滅虞執百里傒為秦繆夫人媵百里傒亡秦走宛楚鄙人執之繆公以五羖羊皮贖之以為上大夫傒讀與奚同繆讀與穆同媵以證翻宛於元翻而加之百姓之上秦國莫敢望焉相秦六七年而東伐鄭謂左傳僖三十年與晉圍鄭也相息亮翻三置晉君一救荆禍三置晉君謂立惠公懷公文公也索隱曰十二諸侯年表穆公二十八年㑹晉伐楚朝周此云救荆未詳余按左傳晉既敗楚于城濮又敗秦於殽穆公使鬭克歸楚求成所謂救荆禍蓋指此也秦諱楚故其國記率謂楚為荆太史公取秦記為史記通鑑又因史記而成書故亦以楚為荆其為相也勞不坐乘古者車立乘惟安車則坐乘耳暑不張蓋周禮輪人為蓋蓋所以覆冒車上也行於國中不從車乘乘繩證翻不操干戈操五刀翻五羖大夫死秦國男女流涕童子不歌謡舂者不相杵記鄰有喪舂不相註云相杵者以音聲相勸相息亮翻今君之見也因嬖人景監以為主事見上八年嬖卑義翻又博計翻監甲暫翻其從政也凌轢公族殘傷百姓轢郎擊翻車踐曰轢公子䖍杜門不出已八年矣君又殺祝懽而黥公孫賈祝姓也古有巫史祝之官其子孫因以為姓或曰武王封黄帝之後于祝其子孫因氏焉黥其京翻詩曰得人者興失人者崩逸詩也此數者非所以得人也君之出也後車載甲多力而駢脅者為驂乘杜預曰駢脅合幹也駢歩田翻乘繩證翻驂讀曰參持矛而操闟㦸者旁車而趨薛綜曰闟之為言函也取四㦸函車邊此蓋令力士旁車而趨有急則操翕㦸以禦之也後漢志有闟㦸車晉志闟㦸車長㦸邪偃在後唐韻㦸名曰闟音所及翻史記正義曰顧野王云矛鋋也方言云矛吳楚江淮之間謂之鋋釋名曰㦸格也車旁有枝格旁車之旁音步浪翻此一物不具君固不出書曰恃徳者昌恃力者亡逸書也此數者非恃徳也君之危若朝露朝露易晞言不久也而尚貪商於之富寵秦國之政言以專秦國之政為寵也畜百姓之怨畜讀曰蓄秦王一旦捐賓客而不立朝朝直遥翻秦國之所以收君者豈其微哉微少也趙良言豈少葢謂太子與其師傅将挾怨而殺之也商君弗從居五月而難作難乃旦翻史言商君尚刑愎諫之禍速三十二年韓申不害卒卒子恤翻三十三年宋太丘社亡班志沛郡有太丘縣又志曰宋太丘社亡周鼎淪没於泗水中爾雅右陵太丘釋云謂丘之西有大阜者為太丘也宋太丘社亡蓋依丘作社於時亡去咎證也鄒人孟軻見魏惠王鄒春秋之邾國也班志鄒縣屬魯國宋白曰淄州鄒平縣漢舊縣王曰叟叟者尊老之稱稱尺證翻不逺千里而來亦有以利吾國乎孟子曰君何必曰利仁義而已矣不逺千里言不以千里為逺也君曰何以利吾國大夫曰何以利吾家士庻人曰何以利吾身上下交征利而國危矣未有仁而遺其親者也未有義而後其君者也後戸豆翻王曰善通鑑于此段前後書王因孟子之文也中間叙孟子答魏王之言獨改王曰君不與魏之稱王也初孟子師子思嘗問牧民之道何先子思曰先利之孟子曰君子所以教民者亦仁義而已矣何必利子思曰仁義固所以利之也上不仁則下不得其所上不義則下樂為詐也樂音洛此為不利大矣故易曰利者義之和也易乾卦文言又曰利用安身以崇徳也易大傳之辭此皆利之大者也臣光曰子思孟子之言一也夫唯仁者為知仁義之為利不仁者不知也夫音扶故孟子對梁王直以仁義而不及利者所與言之人異故也三十四年秦伐韓拔宜陽三十五年齊王魏王㑹于徐州以相王史記正義曰竹書紀年云梁惠王三十年下邳遷于薛改曰徐州續漢志曰魯國薛縣六國時曰徐州與竹書合徐音舒相王者相立為王也韓昭侯作髙門屈宜臼曰君必不出此門許愼曰屈宜臼楚大大時在韓屈九切翻何也不時吾所謂時者非時日也夫人固有利不利時夫音扶往者君嘗利矣不作高門前年秦抜宜陽今年旱君不以此時恤民之急而顧益奢此所謂時詘舉贏者也詘區勿翻徐廣曰時衰耗而作奢侈言國家多難而勢詘此時宜恤民之急而舉事反若有贏餘者失其所以為國之道矣時詘舉贏蓋古語也贏怡成翻故曰不時越王無彊伐齊越王句踐之後自句踐至無彊凡六世句音鉤踐音慈淺翻齊王使人説之以伐齊不如伐楚之利説式芮翻越王遂伐楚楚人大敗之敗補邁翻乘勝盡取吳故地東至于浙江越以此散諸公族爭立或為王或為君濱于海上吳之故地漢㑹稽九江丹陽豫章廬江廣陵臨淮等郡是也越初都㑹稽其境北至于禦兒不能全有漢㑹稽一郡地及其滅吳始幷有吳地今楚取吳地至于浙江則禦兒亦入于楚矣浙江有三源發于太末者謂之穀水今之衢港是也發于烏傷者水經謂之吳寧溪今之婺港是也發下黝縣者班志謂之漸江水今之徽港是也三水合為浙江東至錢唐入海浙折也言水屈折于羣山之間也釋名曰江共也小水流入其中所公共也國于海上者漢之甌越閩越駱越其後也浙之列翻濱音賓㑹古外翻太末之太孟康音闥港古項翻婺亡遇翻黝音伊閩眉中翻駱音洛朝服于楚朝直遥翻三十六年楚王伐齊圍徐州徐音舒韓高門成昭侯薨卒如屈宜臼之言卒子恤翻子宣惠王立宣惠複諡也初洛陽人蘇秦説秦王以兼天下之術説式芮翻姓譜蘇己姓顓頊裔孫吳囘生陸終陸終生昆吾封於蘇至周蘇公秦王不用其言蘇秦乃去説燕文公曰燕之所以不犯寇被甲兵者以趙之為蔽其南也燕因肩翻被皮義翻且秦之攻燕也戰於千里之外趙之攻燕也戰於百里之内燕南與趙接境戰於百里之内言其近也秦欲攻燕自蒲潼下兵則為趙所隔故必逕上郡之西出雲中九原然後至燕故云戰於千里之外夫不憂百里之患而重千里之外計無過於此者夫音扶計無過於此者言燕計之過無甚於此願大王與趙從親從子容翻天下為一則燕國必無患矣此蘇秦為燕至計先定於胷中者文公從之資蘇秦車馬以説趙肅侯曰當今之時山東之建國莫彊於趙説式芮翻建國猶言立國也秦之所害亦莫如趙然而秦不敢舉兵伐趙者畏韓魏之議其後也秦之攻韓魏也無有名山大川之限稍蠶食之傅國都而止傅讀曰附傅著之傅韓魏不能支秦必入臣於秦秦無韓魏之規則禍中於趙矣中竹仲翻臣以天下地圖案之諸侯之地五倍於秦料度諸侯之卒十倍於秦料音聊又如字度徒洛翻六國為一并力西鄉而攻秦鄉讀曰嚮秦必破矣夫衡人者皆欲割諸侯之地以與秦衡讀曰横衡人説客之連横者秦成則其身富榮國被秦患而不與其憂與讀曰預是以衡人日夜務以秦權恐喝諸侯以求割地索隱曰恐起拱翻喝許曷翻又呼曷翻謂相恐脅也鄒氏喝音憇義疎故願大王熟計之也竊為大王計莫如一韓魏齊楚燕趙為從親以畔秦從子容翻畔反也反秦之所為也秦之所為者衡也令天下之将相㑹於洹水之上令盧經翻使也将即亮翻相息亮翻徐廣曰洹水出汲郡林慮縣水經洹水出上黨泫氏縣東北出山逕鄴縣南又東過内黄縣北入于白溝洹音桓又于元翻慮音廬通質結盟質音致約曰秦攻一國五國各出鋭師或撓秦服䖍曰撓弱也音奴教翻又音乃卯翻或救之有不如約者五國共伐之諸侯從親以擯秦秦甲必不敢出於函谷以害山東矣從子容翻擯必刃翻班志𢎞農郡𢎞農縣有秦函谷闗漢武帝從楊僕之請移闗於新安縣文頴曰秦闗在𢎞農縣衡嶺後移在河南穀成縣師古曰今桃林縣有洪溜澗水即古所謂函谷其水北流入河夾河之岸尚有舊闗餘跡焉穀成即新安杜佑曰漢函谷闗在漢新安縣東北一里其秦闗在今靈寶縣肅侯大説索隱曰肅侯名語諡法剛徳克就曰肅執心决斷曰肅説與悦同厚待蘇秦尊寵賜賚之以約於諸侯㑹秦使犀首伐魏大敗其師四萬餘人禽将龍賈取雕陰犀首魏官名公孫衍為此官因號犀首猶虎牙将軍之稱龍姓出於龍伯氏或云出於御龍氏班志上郡有雕隂道括地志雕陰故城在鄜州洛交縣北二十里敗補邁翻稱尺證翻且欲東兵言引兵東下也蘇秦恐秦兵至趙而敗從約從子容翻念莫可使用於秦者乃激怒張儀入之於秦張儀者魏人與蘇秦俱事鬼谷先生蓋居於鬼谷因以稱之隋志馮翊郡韓城縣有鬼谷風俗通義曰鬼谷先生六國時縱横家索隱曰扶風池陽潁川陽城並有鬼谷蓋是其人所居因以為號又樂壹注鬼谷子書云蘇秦欲神祕其道故假名鬼谷學縱横之術縱與從同音子容翻蘇秦自以為不及也儀游諸侯無所遇困於楚蘇秦故召而辱之儀恐恐史記作怒念諸侯獨秦能苦趙遂入秦蘇秦隂遣其舍人齎金幣資儀文頴曰舍人主廐内小吏官名也師古曰舍人親近左右之通稱也後遂為司屬官號齎則兮翻儀得見秦王秦王悦之説讀曰悦以為客卿秦有客卿之官以待自諸侯來者其位為卿而以客禮待之也舍人辭去曰蘇君憂秦伐趙敗從約敗補邁翻從子容翻以為非君莫能得秦柄故激怒君使臣陰奉給君資盡蘇君之計謀也張儀曰嗟乎此吾在術中而不悟吾不及蘇君明矣為吾謝蘇君蘇君之時儀何敢言為吾之為于偽翻為後蘇秦死儀方出説六國張本説式芮翻於是蘇秦説韓宣惠王曰韓地方九百餘里帶甲數十萬天下之彊弓勁弩利劒皆從韓出韓卒超足而射百發不暇止以韓卒之勇被堅甲蹠勁弩被皮義翻蹠之石翻踏也史記正義曰欲放弩者皆坐舉足踏弩材手引凑機然後發之帶利劒一人當百不足言也大王事秦秦必求宜陽成臯韓之宜陽西接境於秦當函谷出兵之路成臯春秋鄭之制邑亦曰虎牢戰國時為鄭之屛蔽皆韓之地班志宜陽屬𢎞農郡成臯屬河南郡今兹効之明年復求割地復扶乂翻與則無地以給之不與則棄前功受後禍且大王之地有盡而秦求無己以有盡之地逆無己之求此所謂市怨結禍者也市買也凡以物買賣貿易曰市不戰而地已削矣鄙諺曰寜為雞口無為牛後諺魚變翻俗言也史記正義曰雞口雖小猶進食牛後雖大乃出糞爾雅翼曰蘇秦説韓王寧為雞尸無為牛從尸主也一羣之主所以将衆也從從物者也謂牛子也随羣而往制不在我者也言寜為雞中之主不為牛子之從後也此本諸延篤注戰國䇿夫以大王之賢挾强韓之兵而有牛後之名臣竊為大王羞之夫音扶挾户頰翻為于偽翻韓王從其言蘇秦説魏王曰大王之地方千里地名雖小然而田舍廬廡之數廡文甫翻數七欲翻宻也曾無所芻牧曾才登翻芻刈草也牧放牧也言魏民居蕃庻無刈芻牧放之地也人民之衆車馬之多日夜行不絶輷輷殷殷若有三軍之衆輷呼宏翻殷音隱臣竊量大王之國不下楚量吕張翻量度也今竊聞大王之卒武士三十萬蒼頭二十萬奮擊二十萬厮徒十萬武士武卒也詳見後第六卷秦昭襄王五十二年蒼頭謂著青帽項羽傳有異軍蒼頭特起奮擊簡軍中之勇士敢奮力而擊敵者異之蘇林曰取薪之卒曰厮音斯車六百乘騎五千匹古者用車戰戰國始用騎兵車騎異用而並用矣乘繩證翻騎奇寄翻乃聽於羣臣之説而欲臣事秦故敝邑趙王使臣効愚計奉明約在大王之詔詔之魏王聽之蘇秦説齊王曰齊四塞之國地方二千餘里帶甲數十萬粟如丘山三軍之良五家之兵三軍謂三晉之軍高誘曰五家即五國進如鋒矢戰如雷霆解如風雨即有軍役未嘗倍泰山絶清河渉渤海者也倍與背同音蒲妹翻鄉倍之倍也班志泰山在泰山郡博縣東北水經淇水自館陶清淵東北過廣宗縣東為清河漢因置清河郡清河又東過脩縣與大河張甲故瀆合又東過東光南皮等縣齊之北界也又齊東北皆阻海漢渤海郡亦其境也師古曰郡在渤海之濱因以為名直度曰絶由膝以上曰渉臨淄之中七萬户臣竊度之不下戸三男子不待發於逺縣而臨淄之卒固已二十一萬矣臨淄甚富而實其民無不鬭雞走狗六博闒鞠説文曰六博局戲也六箸十二棊烏胄所作楚辭箟蔽象棊有六博鮑宏博經曰琨蔽玊箸也各投六箸行六棊故曰六博用十二棊六棊白六棊黑所擲頭謂之瓊瓊有五采刻為一畫者謂之塞刻為兩畫者謂之白刻為三畫者謂之黑一邊不刻者五塞之間謂之五塞闒鞠史記作蹋鞠以皮為之實之以毛蹵蹋而戲劉向曰蹵鞠起於戰國之時所以練武士因嬉戲而講習之或言黄帝所作闒徒臘翻臨淄之塗車轂擊人肩摩連袵成帷揮汗成雨夫韓魏之所以重畏秦者為與秦接境壤也夫音扶為于偽翻兵出而相當不十日而戰勝存亡之機决矣而戰句㫁勝下當有負字以此觀之文意明通竊謂通鑑承史記元文之誤韓魏戰而勝秦則兵半折折常列翻摧折也四境不守戰而不勝則國已危亡隨其後是故韓魏之所以重與秦戰而輕為之臣也今秦之攻齊則不然倍韓魏之地過衞陽晉之道經乎亢父之險車不得方軌騎不得比行水經注瓠子河出東郡濮陽縣北河南至濟隂句陽縣為新溝又東過廪丘縣與濮水俱東瓠河又逕陽晉城南蘇秦所謂衞陽晉之道也史記正義曰陽晉故城在曹州乘氏縣西北三十七里班志亢父縣屬東平國又括地志亢父故城在兖州任城縣南五十一里亢音抗又音剛父音甫説文軌車轍也顔師古曰車併行為方軌騎奇寄翻比毘義翻次也行户剛翻列也凡行列之行皆同音車併讀曰並百人守險千人不敢過也秦雖欲深入則狼顧恐韓魏之議其後也爾雅翼狼猛而敏給能自顧其後蓋狼行而屢顧恐人掎其後故也掎居綺翻是故恫疑虛喝驕矜而不敢進恫他紅翻恐懼貌高誘曰虛喝喘息懼貌劉氏曰秦自疑懼虛作恐猲之辭以脅韓魏也史記正義曰言秦雖至亢父猶恐懼狼顧虛作喝罵驕溢矜誇而不敢進伐齊喝呼葛翻亦作猲音同則秦之不能害齊亦明矣夫不深料秦之無奈齊何而欲西面而事之是羣臣之計過也夫音扶今無臣事秦之名而有彊國之實臣是故願大王少留意計之齊王許之少始紹翻乃西南説楚威王曰楚天下之彊國也地方六千餘里帶甲百萬車千乘騎萬匹楚在齊之西南故蘇秦自齊而西南詣楚説式芮翻乘䋲證翻騎奇寄翻粟支十年此覇王之資也秦之所害莫如楚楚彊則秦弱秦彊則楚弱其勢不兩立故為大王計莫如從親以孤秦從子容翻臣請令山東之國令廬經翻使也奉四時之獻以承大王之明詔委社稷奉宗廟練士厲兵在大王之所用之故從親則諸侯割地以事楚衡合則楚割地以事秦從子容翻衡讀曰横此兩策者相去逺矣大王何居焉楚王亦許之於是蘇秦為從約長長知丈翻并相六國相息亮翻北報趙車騎輜重擬於王者康曰輜重載物車也行者之車總曰輜重韻書曰輜荘持翻庫車也重直用翻考異曰史記蘇秦傳秦兵不敢闚函谷闗十五年又云秦使犀首欺齊魏與共伐趙蘇秦去趙而從約皆解齊魏伐趙敗從約止在明年耳秦本紀惠文王十年公子卭與魏戰虜其将龍賈後二年事耳烏在其不闚函谷十五年乎此出於㳺談之士誇大蘇秦而云爾今不取齊威王薨子宣王辟彊立知成侯賣田忌事見上二十八年乃召而復之燕文公薨子易王立諡法好更改舊曰易燕因肩翻易音如字更工衡翻衞成侯薨子平侯立諡法治而無眚曰平執事有制曰平布綱治紀曰平又曰惠無内徳曰平三十七年秦惠王使犀首欺齊魏與共伐趙以敗從約敗補邁翻從子容翻趙肅侯讓蘇秦蘇秦恐請使燕必報齊蘇秦去趙而從約皆解趙人决河水以灌齊魏之師齊魏之師乃去魏以陰晉為和於秦寔華陰班志華隂故隂晉秦惠文王五年更名寜秦漢高帝改曰華陰縣屬京兆以其地在華山之陰也宋白曰華隂分秦晉之境邊晉之西則曰隂晉邊秦之東則曰寧秦華户化翻齊王伐燕取十城已而復歸之三十九年秦伐魏圍焦曲沃班志𢎞農郡陜縣有焦城左傳所謂晉與秦焦瑕者也括地志焦在陜城東百步曲沃在陜西南三十二里因曲沃水為名酈道元曰按春秋文公十三年晉侯使詹嘉處瑕守桃林之塞以備秦時以曲沃之官守之故曲沃之名遂為積古之傳宋白曰焦古焦國括地志焦城在焦城東北百步因焦水為名周同姓所封魏人少梁河西地於秦少詩照翻二十九年魏已使使獻河西於秦以和今乃入其地四十年秦伐魏度河取汾隂皮氏班志汾隂縣屬河東郡皮氏縣故耿國晉獻公以封趙夙者也亦屬河東郡括地志汾隂故城在蒲州汾隂縣北九里皮氏故城在絳州龍門縣西百八十步抜焦楚威王薨子懷王槐立諡法慈仁短折曰懷又懷思也槐乎乖翻又乎瑰翻折而設翻宋公剔成之弟偃襲攻剔成剔成奔齊偃自立為君剔他歴翻四十一年秦公子華張儀帥師圍魏蒲陽取之史記正義曰蒲陽在隰州隰川縣蒲邑故城是也帥讀曰率張儀言於秦王請以蒲陽復與魏而使公子繇質於魏質音致儀因説魏王曰秦之遇魏甚厚魏不可以無禮於秦魏因盡入上郡十五縣以謝焉説式芮翻括地志曰上郡故城在綏州上縣東南五十里魏秦之上郡地也史記正義曰按鄜坊丹延等州北至固陽盡上郡地魏築長城界秦自華州鄭縣濵洛至慶州洛源縣白於山即東北至勝州固陽東至河西上郡之地盡入於秦秦之與魏者小魏之謝秦者大史言張儀為秦計者甚巧張儀歸而相秦相息亮翻四十二年秦縣義渠以其君為臣義渠西戎國名秦取之以為縣班志義渠道屬北地郡括地志寧慶原三州秦之北地郡也秦歸焦曲沃於魏既取而復歸之秦之於魏若玩弄嬰兒於掌股之上耳四十三年趙肅侯薨索隱曰肅侯名語子武靈王立置博聞師三人左右司過三人先問先君貴臣肥義加其秩索隱曰武靈王名雍姓譜肥姓肥子之後以國為姓四十四年夏四月戊午秦初稱王衛平侯薨子嗣君立嗣祥吏翻衛有胥靡亡之魏漢書音義曰胥相也靡隨也古者相隨坐輕刑之名謂罪不至於朴刑者令衣褐帶索相隨以執役朱元晦曰胥靡者連鎻役作也胥新於翻靡母被翻因為魏王之后治病為于偽翻治直之翻嗣君聞之請以五十金買之五反魏不與乃以左氏易之左右諫曰夫以一都買一胥靡可乎夫音扶下同嗣君曰非子所知也夫治無小亂無大治直吏翻灋不立誅不必雖有十左氏無益也灋立誅必失十左氏無害也魏王聞之曰人主之欲不聼之不祥因載而往徒獻之此學申韓者為之説耳四十五年秦張儀帥師伐魏取陜班志陜縣屬𢎞農郡故虢國北虢在大陽東虢在滎陽西虢在雍州周召分陜而治即此陜也帥讀曰率陜失冉翻召讀曰邵蘇秦通於燕文公之夫人易王知之蘇秦恐乃説易王曰臣居燕不能使燕重而在齊則燕重易王許之燕因肩翻易音如字説式芮翻諡法好更改舊曰易註變故改常乃偽得罪於燕而奔齊齊宣王以為客卿蘇秦説齊王高宮室大苑囿以明得意欲以敝齊而為燕説式芮翻為後齊大夫殺蘇秦張本四十六年秦張儀及齊楚之相㑹齧桑相息亮翻服䖍曰齧桑翟地徐廣曰在梁與彭城之間裴駰曰晉地索隱曰衛地余按漢武帝瓠子歌曰齧桑浮兮淮泗滿及塞决河而梁楚之地復寧無水災後漢王梁擊佼彊蘇茂於楚沛間拔大梁齧桑則徐説為近之齧五結翻韓燕皆稱王趙武靈王獨不肯曰無其實敢處其名乎令國人謂已曰君趙武靈王之不肯稱王非守君臣之分居之以謙也將求其所大欲而力未能稱心也處昌呂翻令力丁翻使也又力正翻命令也分扶問翻稱尺證翻四十七年秦張儀自齧桑還而免相相魏齧魚結翻還從宣翻又音如字免相免秦相而相魏相息亮翻欲令魏先事秦而諸侯効之魏王不聼秦王伐魏取曲沃平周令力丁翻此曲沃在河東晉桓叔所封之邑漢武帝改名聞喜史記正義曰絳州桐鄉縣晉曲沃邑十三州志古平周邑在汾州介休縣西四十里復陰厚張儀益甚四十八年王崩子愼靚王定立靚疾正翻燕易王薨子噲立燕因肩翻易音如字噲古夬翻齊王封田嬰於薛班志薛縣屬魯國夏奚仲之國後遷于邳仲虺居之括地志故薛城在今徐州滕縣界史記正義曰薛故城在今徐州滕縣南四十四里號曰靖郭君杜佑曰戰國之際秦項之間權設班寵有加賜邑封君者盖假其位號或空受其爵如靖郭武安之類是也至漢尤多葢在封爵之外别加美號史記列傳云嬰諡為靖郭君索隱曰靖郭或封邑號故漢駟鈞封靖郭君靖郭君言於齊王曰五官之計不可不日聼而數覧也記曾子問諸侯出命國家五官而後行註云五官五大夫典事者命者勑之以其職正義云按太宰職云建其牧立其監設其參傳其伍是諸侯有三卿五大夫經云五官故云五大夫以屬官大夫其數衆多直云五者據典國事言之不云命卿者或從君出行或雖在國畱守揔主羣吏如三公然不專主一事且尊之既命五大夫則卿亦命之可知故不顯言命卿也余謂此所謂五官葢亦言典事五大夫也數所角翻王從之已而厭之悉以委靖郭君靖郭君由是得專齊之權靖郭君欲城薛客謂靖郭君曰君不聞海大魚乎網不能止鉤不能牽蕩而失水則螻蟻制焉今夫齊亦君之水也夫音扶君長有齊奚以薛為茍為失齊雖隆薛之城到于天庸足恃乎乃不果城隆高也崇也庸長也靖郭君有子四十人其賤妾之子曰文文通儻饒智畧通達也儻倜儻卓異也饒智畧言智畧有餘也説靖郭君以散財養士靖郭君使文主家待賔客賔客爭譽其美説式芮翻譽音余皆請靖郭君以文為嗣靖郭君卒嗣祥吏翻卒子恤翻文嗣為薛公號曰孟嘗君史記列傳曰諡曰孟嘗君索隱曰號曰孟嘗君曰諡非也孟字嘗邑名嘗邑在薛之旁孟嘗君招致諸侯遊士及有罪亡人皆舍業厚遇之舍業為之築舍立居業也存救其親戚食客常數千人各自以為孟嘗君親已由是孟嘗君之名重天下臣光曰君子之養士以為民也易曰聖人養賢以及萬民頥卦彖辭也為于偽翻夫賢者其德足以敦化正俗其才足以頓綱振紀頓謂整頓夫音扶其明足以燭微慮遠其彊足以結仁固義大則利天下小則利一國是以君子豐禄以富之隆爵以尊之養一人而及萬人者養賢之道也今孟嘗君之養士也不恤智愚不擇臧否否補美翻盜其君之禄以立私黨張虚譽上以侮其君下以蠧其民是姦人之雄也烏足尚哉書曰受為天下逋逃主萃淵藪此之謂也孟嘗君聘於楚楚王遺之象牀登徒直送之象牀以象齒為之登徒姓也直其名遺于季翻不欲行謂孟嘗君門人公孫戌曰象牀之直千金茍傷之毫髮則賣妻子不足償也足下能使僕無行者有先人之寳劒願獻之公孫戌許諾姓譜公孫氏出於黄帝釋名曰劒檢也所以防檢非常也戊音恤償辰羊翻報也諾奴各翻以言許人曰諾入見孟嘗君曰小國所以皆致相印於君者以君能振達貧窮存亡繼絶故莫不悦君之義慕君之廉也今始至楚而受象牀則未至之國將何以待君哉孟嘗君曰善遂不受公孫戌趨去未至中閨閨涓畦翻宮中小門曰閨上圓下方如圭故謂之閨孟嘗君召而反之曰子何足之高志之揚也公孫戌以實對孟嘗君乃書門版曰有能揚文之名止文之過私得寳於外者疾入諫臣光曰孟嘗君可謂能用諫矣茍其言之善也雖懷詐諼之心猶將用之諼許元翻况盡忠無私以事其上乎詩云采葑采菲無以下體詩邶谷風之辭毛氏傳曰葑須也菲芴也鄭氏箋曰此二菜蔓菁與蒚之類也皆上下可食然其根有美時冇惡時采之者不可以根惡并棄其葉下體謂根莖也陸璣草木疏曰葑蕪菁也郭璞曰今菘菜陸德明曰江南有菘江北有蔓菁相似而異爾雅曰菲芴又曰菲息菜郭璞曰菲芴土𤓰息菜似菁蕪華紫赤色可食蒚大葉白華根如指色白可食菲敷尾翻邶蒲昧翻芴挨拂翻蔓謨官翻蒚方六翻孟嘗君有焉韓宣惠王欲兩用公仲公叔為政問於繆畱繆莫留翻姓也又靡㓜翻又音穆對曰不可晉用六卿而國分齊簡公用陳成子及闞止而見殺魏用犀首張儀而西河之外亡晉六卿智氏范氏中行氏趙氏韓氏魏氏也自晉文襄以來迭秉國政後皆彊大卒分晉國齊簡公使闞止為政陳成子憚之已而陳常殺闞止弑簡公闞以邑為氏蘇代曰魏相犀首必右韓而左魏相張儀必右秦而左魏盖二相外各倚與國以為重而内爭權所以魏日削也闞户監翻行户剛翻恒户登翻卒子恤翻相息亮翻今君兩用之其多力者内樹黨其寡力者藉外權羣臣有内樹黨以驕主有外為交以削地君之國危矣資治通鑑巻二
