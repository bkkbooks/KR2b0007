body:
  text: 資治通鑑卷二百七十三宋司馬光撰胡三省音註後唐紀二起閼逢涒灘盡旃䝉作噩十月凡一年有竒莊宗光聖神閔孝皇帝中同光二年春正月甲辰幽州奏契丹入寇至瓦橋李存審奏也以天平軍節度使李嗣源為北面行營都招討使陜州留後霍彦威副之宣徽使李紹宏為監軍將兵救幽州陜失冉翻監古銜翻將即亮翻孔謙復言於郭崇韜曰首座相公萬機事繁居第且逺復扶又翻豆盧革時為首相故稱之為首座相公租庸簿書多留滯宜更圖之請改用人為租庸使孔謙意欲自得之也更工衡翻豆盧革嘗以手書便省庫錢數十萬今俗謂借錢為便錢言借貸以便用也時租庸錢皆入省庫謙以手書示崇韜崇韜微以諷革革懼奏請崇韜專判租庸崇韜固辭上曰然則誰可者崇韜曰孔謙雖久典金榖自帝得魏博孔謙即為支度務使若遽委大任恐不叶物望請復用張憲帝即命召之謙彌失望謙自去年四月帝即位之初即望為租庸使事見上卷岐王聞帝入洛内不自安聞帝自大梁入洛懼移兵西伐也遣其子行軍司馬彰義節度使兼侍中繼曮入貢李繼曮以鳳翔行軍司馬領涇州節始上表稱臣帝以其前朝耆舊與太祖比肩前朝謂唐僖昭之朝帝即位追尊考晉王克用曰武皇帝廟號太祖上時掌翻朝直遥翻下同特加優禮每賜詔但稱岐王而不名庚戌加繼曮中書令遣還曮魚險翻還從宣翻又如字敕内官不應居外應前朝内官及諸道監軍并私家先所畜者不以貴賤並遣詣闕唐末誅宦官其有逃逸者散投外鎮及為私家所養畜旴玉翻時在上左右者已五百人至是殆及千人皆給贍優厚委之事任以為腹心内諸司使自天祐以來以士人代之唐昭宗天復三年誅宦官以士人為内諸司使時所存者九使而已至梁有客省使改小馬坊使為天驥使飛龍使莊宅使儀鸞使文思使五坊使如京使尚食使改御食使為司膳使洛苑使教坊使東上閤門使西上閤門使内園栽接使弓箭庫使大内皇墻使武備庫使引進使左藏庫使閑廏使宫苑使翰林使大和庫使豐德庫使乾文院使後唐雖不用梁制而復唐之舊内諸司使其官亦多至是復用宦者寖干政事既而復置諸道監軍節度使出征或留闕下軍府之政皆監軍决之陵忽主帥怙勢爭權由是藩鎮皆憤怒為後諸藩鎮乗變殺監軍張本契丹出塞召李嗣源旋師命泰寧節度使李紹欽澤州刺史董璋戍瓦橋李繼曮見唐甲兵之盛歸語岐王語牛倨翻岐王益懼癸丑表請正藩臣之禮優詔不許孔謙惡張憲之來時自魏召張憲復為租庸使憲方正故謙惡其來惡烏路翻言於豆盧革曰錢榖細事一健吏可辦耳魏都根本之地顧不重乎興唐尹王正言操守有餘智力不足必不得已使之居朝廷衆人輔之猶愈於專委方面也革為之言於崇韜為于偽翻崇韜乃奏留張憲於東京甲寅以正言為租庸使正言昏懦謙利其易制故也易以豉翻李存審奏契丹去復得新州新州陷見二百六十九卷梁均王貞明三年戊午敕鹽鐵度支户部三司並𨽻租庸使租庸使之權愈重矣上遣皇弟存渥皇子繼岌迎太后太妃於晉陽太妃曰陵廟在此若相與俱行嵗時何人奉祀遂留不來帝即位尊曽祖執宜廟號懿祖陵曰永興國昌廟號獻祖陵曰長寧克用廟號太祖陵曰建極三陵皆在代州雁門縣親廟在晉陽太妃之不來夫豈專陵廟之為其心固有所見也且其辭義甚正為太后太妃俱以憂邑成疾張本太后至庚申上出迎於河陽辛酉從太后入洛陽二月己巳朔上祀南郊大赦孔謙欲聚斂以求媚斂力贍翻凡赦文所蠲者謙復徴之蠲圭淵翻除也復扶又翻自是每有詔令人皆不信百姓愁怨郭崇韜初至汴洛頗受藩鎮饋遺遺唯季翻所親或諫之崇韜曰吾位兼將相郭崇韜為樞密使加侍中領成德節樞密使天下事無所不闗侍中三省長官又領節鎮故言位兼將相禄賜巨萬豈藉外財但以偽梁之季賄賂成風今河南藩鎮皆梁之舊臣主上之仇讎也若拒其意能無懼乎吾特為國家藏之私室耳為于偽翻郭崇韜受饋遺未足以安藩鎮疑懼之心乃所以成其主好貨之惡及將祀南郊崇韜首獻勞軍錢十萬緡先是宦官勸帝分天下財賦為内外府勞力到翻先悉薦翻州縣上供者入外府充經費供居用翻方鎮貢獻者入内府充宴遊及給賜左右於是外府常虛竭無餘而内府山積及有司辦郊祀乏勞軍錢崇韜言於上曰臣已傾家所有以助大禮願陛下亦出内府之財以助有司上黙然久之曰吾晉陽自有儲積積子賜翻又如字可令租庸輦取以相助於是取李繼韜私第金帛數十萬以益之李繼韜父嗣昭從晉王克用起于晉陽故私第在焉繼韜以反誅其家貲没官軍士皆不滿望始怨恨有離心矣為後諸軍離叛張本河中節度使李繼麟請𣙜安邑解縣鹽每季輸省課每三月一輸鹽課於省也𣙜古岳翻解戸買翻己卯以繼麟充制置兩池𣙜鹽使辛巳進岐王爵為秦王同考異日茂貞改封秦王薛史無的確年月實録光元年十一月壬寅巳稱秦王茂貞遣使賀收復自後皆稱秦王至二年辛巳制秦王李茂貞可封秦王豈有秦王封秦王之理必是至是時始自岐王封秦王也通鑑考異正本在二年正月岐王上表稱臣之下今移置於此仍不名不拜郭崇韜知李紹宏怏怏乃置内句使掌句三司財賦以紹宏為之冀弭其意而紹宏終不悦李紹宏恨郭崇韜見上卷元年句音鉤徒使州縣増移報之煩按薛史云同光元年十一月以李紹宏兼内句凡天下錢榖簿書悉委裁遣自是州縣供帳煩費議者非之與此有嵗月之差崇韜位兼將相復領節旄以天下為己任權侔人主旦夕車馬填門性剛急遇事輒發嬖倖僥求多所摧抑嬖卑義翻又必計翻僥堅堯翻宦官疾之朝夕短之於上崇韜扼腕欲制之不能腕烏貫翻豆盧革韋説嘗問之曰汾陽王本太原人徙華隂説讀曰悦華戸化翻公世家雁門豈其枝派邪崇韜因曰遭亂亡失譜諜嘗聞先人言上距汾陽四世耳譜博古翻藉録也諜徒協翻漢郊祀歌披圖按諜蘇林注曰諜譜第也汾陽王謂郭子儀也革曰然則固從祖也從才用翻崇韜由是以膏梁自處多甄别流品處昌吕翻别彼列翻引拔浮華鄙弃勲舊有求官者崇韜曰深知公功能然門地寒素不敢相用恐為名流所嗤嗤丑之翻笑也由是嬖倖疾之於内勲舊怨之於外崇韜屢請以樞密使讓李紹宏上不許又請分樞密院事歸内諸司以輕其權而宦官謗之不已崇韜鬱鬱不得志與所親謀赴本鎮以避之其人曰不可蛟龍失水螻蟻足以制之先是上欲以劉夫人為皇后先悉薦翻而有正妃韓夫人在歐史曰莊宗正室曰衞國夫人韓氏其次曰燕國夫人伊氏次魏國夫人劉氏耳太后素惡劉夫人按歐史劉氏為袁建豐所得内之太后宫教以吹笙歌舞莊宗悦之太后以賜莊宗然而惡之者以其所出微而妒悍也崇韜亦屢諫上以是不果於是所親説崇韜曰説式芮翻公若請立劉夫人為皇后上必喜内有皇后之助則伶宦輩不能為患矣崇韜從之與宰相帥百官共奏劉夫人宜正位中宫癸未立魏國夫人劉氏為皇后郭崇韜以是求自全乃所以自禍也為殺郭崇韜張本帥讀曰率下同皇后生於寒微既貴專務蓄財其在魏州薪蘇果茹皆販鬻之採木為薪採草為蘇果覈也茹菜也及為后四方貢獻皆分為二一上天子一上中宫上時掌翻以是寶貨山積惟用寫佛經施尼師而已施式豉翻是時皇太后誥皇后教與制敕交行於藩鎮奉之如一婦言與王言並行自古亂政未有如同光之甚者也詔蔡州刺史朱勍浚索水通漕運水經注車闗水出於嵩渚之山發于層阜之上一源兩枝分流瀉注世謂之石泉水東流為索水西注為車闗水索水在成臯北勍渠京翻索山客翻三月己亥朔蜀主宴近臣於怡神亭酒酣君臣及宫人皆脱冠露髻喧譁自恣知制誥京兆李龜禎諫曰君臣沈湎不憂國政沈持林翻臣恐啟北敵之謀北敵謂唐也不聽乙巳鎮州言契丹將犯塞此據諜報而上言也詔横海節度使李紹斌北京左廂馬軍指揮使李從珂帥騎兵分道備之天平節度使李嗣源屯邢州紹斌本姓趙名行實幽州人也斌悲巾翻丙午加髙季興兼尚書令進封南平王李存審自以身為諸將之首李存審時為蕃漢馬步軍都總管不得預克汴之功感憤疾益甚李存審自滄徙幽時已寢疾屢表求入覲郭崇韜抑而不許存審疾亟表乞生覩龍顔乃許之初帝嘗與右武衞上將軍李存賢手搏存賢不盡其技存賢本許州王賢少為軍卒善角觝晉王克用得之賜以姓名養為子技渠綺翻帝曰汝能勝我當授藩鎮存賢乃奉詔僅仆帝而止及許存審入覲帝以存賢為盧龍行軍司馬旬日除節度使曰手搏之約吾不食言矣以手搏而得大藩是節鎮可以戲取矣庚戌幽州奏契丹寇新城新城縣屬涿州唐太和六年以故督亢地置匈奴須知新城縣北至涿州六十里勲臣畏伶官之讒皆不自安蕃漢内外馬步副總管李嗣源求解兵柄帝不許自唐末喪亂喪息浪翻搢紳之家或以告赤鬻於族姻赤當作勅鬻於族姻則既非矣安知後世有鬻於非其族姻者乎遂亂昭穆昭上招翻至有舅叔拜甥姪者言舅拜其甥叔拜其姪也選人偽濫者衆郭崇韜欲革其弊請令銓司精加考覈銓司吏部也選須絹翻覈下革翻時南郊行事官千二百人凡郊祀預執事者皆謂之行事官注官者纔數十人塗毁告身者十之九選人或號哭道路號戸刀翻或餒死逆旅唐室諸陵先為温韜所發帝不能正温韜之罪見上卷上年庚申以工部郎中李途為長安按視諸陵使皇子繼岌代張全義判六軍諸衞事夏四月己巳朔羣臣上尊號曰昭文睿武至德光孝皇帝唐諸帝尊號皆有孝字葢因漢制今此又因唐制也帝遣客省使李嚴使於蜀嚴盛稱帝威德有混一天下之志且言朱氏簒竊諸侯曽無勤王之舉王宗儔以其語侵蜀請斬之蜀主不從宣徽北院使宋光葆上言晉王有憑陵我國家之志宜選將練兵屯戍邊鄙積糗糧治戰艦以待之上時掌翻糗去久翻治直之翻艦戸黯翻言治戰艦欲以防峽江蜀主乃以光葆為梓州觀察使充武德節度留後蜀置武德軍於梓州乙亥加楚王殷兼尚書令庚辰賜前保義留後霍彦威姓名李紹真唐既滅梁改陜州鎮國軍為保義軍秦忠敬王李茂貞卒遺奏以其子繼曮權知鳳翔軍府事初安義牙將楊立有寵於李繼韜李繼韜之求世襲也改昭義軍為安義軍繼韜誅見上卷上年常邑邑思亂㑹發安義兵三千戍涿州立謂其衆曰前此潞兵未嘗戍邊晉與梁兵爭潞兵未嘗北戍葢以備梁耳今朝廷驅我輩投之絶塞葢不欲置之潞州耳與其暴骨沙場不若據城自守涿州在幽州之南未為絶塞也唐人謂沙漠之地為沙場豈涿州之地乎楊立以此言激怒潞兵耳事成富貴不成為羣盜耳因聚譟攻子城東門焚掠市肆節度副使李繼珂監軍張𢎞祚弃城走立自稱留後遣將士表求旌節詔以天平節度使李嗣源為招討使武寧節度使李紹榮為部署部署之官始見於通鑑本在招討使之下其後有都部署遂為專任主帥之任帳前都指揮使張廷藴為馬步都指揮使以討之孔謙貸民錢使以賤估償絲估音古價也以錢貸民而以賤價徵絲償所貸錢屢檄州縣督之翰林學士承㫖權知汴州盧質上言梁趙巖為租庸使舉貸誅斂結怨於人斂力贍翻陛下革故鼎新為人除害易雜卦曰革去故也鼎取新也為于偽翻而有司未改其所為是趙巖復生也復扶又翻今春霜害稼繭絲甚薄但輸正税猶懼流移况益以稱貸稱舉也貸借也人何以堪臣惟事天子不事租庸敕㫖未頒省牒頻下省牒謂租庸使所下文書下戸嫁翻願早降明命帝不報漢主引兵侵閩屯於汀漳境上閩之汀漳二州皆與漢之潮州接境閩人擊之漢主敗走初胡柳之役見二百七十卷梁均王貞明四年伶人周匝為梁所得帝每思之帝思周匝而不思周德威此其所以亡也入汴之日匝謁見於馬前入汴見上卷上年見賢遍翻帝甚喜匝涕泣言曰臣之所以得生全者皆梁教坊使陳俊内園栽接使儲德源之力也梁内園栽接使猶唐之内園使也宋白曰栽接使貞元中已有之職官分紀五代有内園栽接使國朝止名内園使願就陛下乞二州以報之帝許之郭崇韜諫曰陛下所與共取天下者皆英豪忠勇之士今大功始就封賞未及一人而先以伶人為刺史恐失天下心以是不行踰年伶人屢以為言帝謂崇韜曰吾已許周匝矣使吾慙見此三人三人謂周匝陳俊儲德源也周匝李存賢之事帝自以為踐言矣可以為政乎公言雖正當為我屈意行之為于偽翻五月壬寅以俊為景州刺史德源為憲州刺史憲州本樓煩監牧唐昭宗龍紀元年晉王克用表置憲州時親軍有從帝百戰未得刺史者莫不憤歎宜其離叛也乙巳右諫議大夫薛昭文上疏以為諸道僭竊者尚多當是時諸道奉貢者有所不論如蜀如吳如漢皆唐之諸道也征伐之謀未可遽息又士卒久從征伐賞給未豐貧乏者多此正時病也宜以四方貢獻及南郊羨餘羨戈戰翻更加頒賚又河南諸軍皆梁之精鋭恐僭竊之國潛以厚利誘之宜加收撫又戸口流亡者宜寛徭薄賦以安集之又土木不急之役宜加裁省又請擇隙地牧馬勿使踐京畿民田皆不從戊申蜀主遣李嚴還李嚴四月入蜀至是而還還從宣翻又如字巳考異曰實録七月戊午蜀遣歐陽彬朝貢十月癸遣客省使李嚴充蜀川回信使八月戊辰嚴自西川回蜀書四月己巳朔唐使李嚴來聘五月戊申遣嚴歸本國十一月己未朔遣彬為唐國通好使按錦里耆舊傳是嵗遣歐陽彬通聘洛京莊宗遣李嚴來修好笏記云豈謂大蜀皇帝特遣蘇張之士來追唐蜀之歡吾皇迴感於蜀皇復禮逺酬於厚禮然則嚴為回信使也或者歐陽彬之前蜀已有入洛之使乎若如實錄年月則李嚴以二年十月奉使至三年八月方歸何留之久乎十國紀年蜀史又云九月己亥唐帝遣李彦稠來使十一月辛丑遣彦稠東還又八月以後遣王宗鍔等戍利州以備東師似用宋光葆之言十一月以後以唐國通好召諸軍還似因彦稠來而罷之今並從蜀書年月初帝因嚴入蜀令以馬市宫中珍玩而蜀法禁錦綺珍竒不得入中國其粗惡者乃聽入中國謂之入草物粗讀曰麤自盛唐以來蜀貢賦嵗至京師此法乃王衍之法也嚴還以聞帝怒曰王衍寧免為入草之人乎嚴因言於帝曰衍童騃荒縱不親政務斥逺故老昵比小人騃語駭翻逺丁願翻昵尼質翻比毘至翻其用事之臣王宗弼宋光嗣等諂諛專恣黷貨無厭賢愚易位刑賞紊亂厭於鹽翻紊音問君臣上下專以奢淫相尚以臣觀之大兵一臨瓦解土崩可翹足而待也帝深以為然為伐蜀張本帝以潞州叛故庚戌詔天下州鎮無得修城濬隍悉毁防城之具毁防城之具慮天下將卒有憑城而拒命者耳然趙在禮攻魏而魏不能守趙在禮據魏而攻不能拔而帝由是亦死於亂兵防患之道固不在此也壬子新宣武節度使兼中書令蕃漢馬步總管李存審卒於幽州李存審受宣武之命而未離幽州也存審出於寒微常戒諸子曰爾父少提一劍去鄉里少詩照翻存審陳州宛丘人從李罕之歸晉王四十年間位極將相言以節度使同平章事也其間出萬死獲一生者非一破骨出鏃者凡百餘因授以所出鏃命藏之曰爾曹生於膏粱當知爾父起家如此也幽州言契丹將入寇甲寅以横海節度使李紹斌充東北面行營招討使將大軍度河而北契丹屯幽州東南城門之外虜騎充斥饋運多為所掠壬戌以李繼曮為鳳翔節度使嗣李茂貞帥岐乙丑以權知歸義留後曹義金為節度使時𤓰沙與吐蕃雜居義金遣使間道入貢故命之唐懿宗咸通八年張義潮入朝以族子惟深守歸義十三年惟深卒以義金權知留後自咸通十三年至是五十四年葢曹義金亦已老矣間古莧翻李嗣源大軍前鋒至潞州日已暝暝莫定翻夕也泊軍方定張廷藴帥麾下壯士百餘輩踰塹坎城而上帥讀曰率上時掌翻守者不能禦即斬闗延諸軍入比明比必利翻及也下比起同嗣源及李紹榮至城已下矣嗣源等不悦以張廷藴不待其至而先取城也丙寅嗣源奏潞州平六月丙子磔楊立及其黨於鎮國橋磔陟格翻潞州城池髙深帝命夷之夷平也丙戌以武寧節度使李紹榮為歸德節度使同平章事梁都汴移宣武軍於宋州唐滅梁復以汴州為宣武軍以宋州為歸德軍留宿衞寵遇甚厚帝或時與太后皇后同至其家帝有幸姬色美嘗生子矣劉后妒之㑹紹榮喪妻喪息浪翻一日侍禁中帝問紹榮汝復娶乎復扶又翻為汝求昏為于偽翻下為之同后因指幸姬曰大家憐紹榮何不以此賜之帝難言不可微許之后趣紹榮拜謝趣讀曰促比起顧幸姬已肩輿出宫矣帝為之託疾不食者累日史言帝憚劉后之妒悍壬辰以天平節度使李嗣源為宣武節度使代李存審為蕃漢内外馬步總管自副總管陞都總管秋七月壬寅蜀以禮部尚書許寂為中書侍郎同平章事孔謙復短王正言於郭崇韜復扶又翻又厚賂伶官求租庸使終不獲意怏怏癸卯表求解職帝怒以為避事將置於法景進救之得免梁所决河連年為曹濮患梁决河見二百七十卷均王貞明四年濮博木翻甲辰命右監門上將軍婁繼英督汴滑兵塞之未幾復壊塞悉則翻幾居豈翻庚申置威塞軍於新州契丹恃其强盛遣使就帝求幽州以處盧文進處昌吕翻時東北諸夷皆役屬契丹惟勃海未服契丹主謀入寇恐勃海犄其後勃海時為海東盛國置五京十五府六十二州盡有髙麗肅慎之地犄居蟻翻乃先舉兵擊勃海之遼東遣其將托諾及盧文進據營平等州以擾燕地燕於賢翻八月戊辰蜀主以右定逺軍使王宗鍔為招討馬步使帥二十一軍屯洋州帥讀曰率乙亥以長直馬軍使林思鍔為昭武節度使戍利州以備唐租庸使王正言病風恍惚不能治事恍許昉翻惚音忽治直之翻景進屢以為言癸酉以副使衞尉卿孔謙為租庸使右威衞大將軍孔循為副使循即趙殷衡也梁亡復其姓名歐史曰孔循不知其家世何人也少孤流落于汴州富人李讓闌得之養以為子梁太祖以李讓為養子循乃冒姓朱氏給事太祖帳中太祖諸兒乳母有愛之者養循為子乳母之夫姓趙又冒姓趙名殷衡梁亡事唐始改孔名循按唐天祐二年趙殷衡已權判宣徽院事見二百六十五卷謙自是得行其志重斂急徴以充帝欲民不聊生癸未賜謙號豐財贍國功臣記曰與其有聚斂之臣寧有盜臣而以是為功臣之號以寵孔謙唐之君臣不知其非也民困軍怨其能久乎為明宗誅謙張本帝復遣使者李彦稠入蜀九月己亥至成都復扶又翻下復蹂同癸卯帝獵於近郊時帝屢出遊獵從騎傷民禾稼洛陽令何澤伏於叢薄草聚生曰叢草木交錯曰薄俟帝至遮馬諫曰陛下賦斂既急今稼穡將成復蹂踐之蹂人九翻又如又翻踐慈演翻使吏何以為理民何以為生臣願先賜死帝慰而遣之諫獵一也中牟令幾不免於死洛陽令乃䝉勞遣者意必有伶官為之容也夷考何澤終身之行實非亮直之士澤廣州人也薛史何澤廣州人梁貞明中清海節度使劉陟薦其才以進士擢第契丹攻勃海無功而還還從宣翻又如字蜀前山南節度使兼中書令王宗儔以蜀主失德與王宗弼謀廢立宗弼猶豫未决庚戌宗儔憂憤而卒宗弼謂樞密使宋光嗣景潤澄等曰宗儔教我殺爾曹今日無患矣光嗣輩俯伏泣謝宗弼子承班聞之謂人曰吾家難乎免矣乙卯蜀主以前鎮江軍節度使張武為峽路應援招討使蜀置鎮江軍於夔州丁巳幽州言契丹入寇冬十月辛未天平節度使李存霸平盧節度使符習言屬州多稱直奉租庸使帖指揮公事使司殊不知有紊規程使司謂節度使司也紊音問租庸使奏近例皆直下時租庸使帖下諸州調發不闗節度觀察使謂之直下下戸嫁翻敕朝廷故事制敕不下支郡節鎮為㑹府巡屬諸州為支郡牧守不專奏陳今兩道所奏乃本朝舊規租庸所陳是偽廷近事時以梁為偽廷黜之也自今支郡自非進奉皆須本道騰奏租庸徴催亦須牒觀察使唐制節度使掌兵事觀察使掌民事故敕租庸徴催止牒觀察使司雖有此敕竟不行史言徴斂嚴急但期趣辦竟不奉敕而行易定言契丹入寇蜀宣徽北院使王承休請擇諸軍驍勇者萬二千人置駕下左右龍武步騎四十軍兵械給賜皆優異於它軍以承休為龍武軍馬步都指揮使以禆將安重霸副之舊將無不憤恥重霸雲州人以狡佞賄賂事承休故承休悦之為安重霸背王承休而降唐張本吳越王鏐復修本朝職貢錢鏐本唐臣唐亡事梁梁亡復事唐故云復修本朝職貢壬午帝因梁官爵而命之鏐厚貢獻并賂權要求金印玉冊賜詔不名稱國王有司言故事惟天子用玉冊王公皆用竹冊竹冊編竹為之以存古意又非四夷無封國王者帝皆曲從鏐意吳王如白沙觀樓船更命白沙曰迎鑾鎮路振九國志曰楊溥巡白沙太學博士王榖上書請改白沙為迎鑾其畧曰日月所經星辰盡為黄道鑾輿所止井邑皆為赤縣徐温自金陵來朝白沙楊子縣地五季之末改楊子為永貞縣宋朝乾德二年以揚州永貞縣迎鑾鎮為建安軍大中祥符六年升為真州而永貞縣先是復改為楊子其地東至揚州六十里南臨大江度江而南至金陵亦六十里更工衡翻先是温以親吏翟䖍為閤門宫城武備等使使察王起居先悉薦翻䖍防制王甚急使鍾泰章殺張顥閉牙城門討朱瑾皆翟䖍也故徐温親任之翟直格翻至是王對温名雨為水温請其故王曰翟䖍父名吾諱之熟矣因謂温曰公之忠誠我所知也然翟䖍無禮宫中及宗室所須多不獲須者意所欲也求也温頓首謝罪請斬之王曰斬則太過逺徙可也乃徙撫州十一月蜀主遣其翰林學士歐陽彬來聘七考異曰實録月戊午蜀主遣戸部侍郎歐陽彬來使致書用敵國之禮蜀書後主紀十一月乙未命翰林學士兵部侍郎歐陽彬為唐國通好使今從之彬衡山人也又遣李彦稠東還李彦稠至蜀見上九月還從宣翻又如字癸卯帝帥親軍獵於伊闕伊闕縣在洛陽南二百餘里有伊闕山大禹所鑿也宋朝省伊闕縣為鎮入伊陽縣帥讀曰率命從官拜梁太祖墓梁祖帝之仇讎前欲發墓斵棺今使從官拜之何前後之相違也從才用翻涉歴山險連日不止或夜合圍士卒墜崖谷死及折傷者甚衆史言帝荒於從禽而不恤士卒折而設翻丙午還宫蜀以唐修好罷威武城戍召闗宏業等二十四軍還成都戊申又罷武定武興招討劉潛等三十七軍丁巳賜䕶國節度使李繼麟鐵劵以其子令德令錫皆為節度使諸子勝衣者即拜官勝音升寵冠列藩朱友謙之寵乃所以速禍也是其反覆多矣能無及乎冠工喚翻庚申蔚州言契丹入寇辛酉蜀主罷天雄軍招討命王承騫等二十九軍還成都十二月乙丑朔蜀主以右僕射張格兼中書侍郎同平章事初格之得罪事見二百七十卷梁均王貞明四年中書吏王魯柔乗危窘之窘渠隕翻及再為相用事杖殺之許寂謂人曰張公才髙而識淺戮一魯柔它人誰敢自保此取禍之端也張格則失矣許寂同在相位不知蜀有垂亡之勢但知張格有取禍之端蜀亡為相者得免禍乎蜀主罷金州屯戍命王承勲等七軍還成都蜀主恃與唐和而徹邊備是馴狎虎豹而不嚴設圈檻也己巳命宣武節度使李嗣源將宿衞兵三萬七千人赴汴州遂如幽州禦契丹命李嗣源將兵赴鎮因而北出備邊庚午帝及皇后如張全義第全義大陳貢獻酒酣皇后奏稱妾幼失父母見老者輒思之請父事全義帝許之全義惶恐固辭再三彊之竟受皇后拜復貢獻謝恩劉后利張全義之財此如倡婢屈膝於人志在求貨耳惡可以母天下乎彊其兩翻復扶又翻明日后命翰林學士趙鳳草書謝全義鳳密奏自古無天下之母拜人臣為父者帝嘉其直然卒行之卒子恤翻自是后與全義日遣使往來問遺不絶遺唯季翻初唐僖昭之世宦官雖盛未嘗有建節者蜀安重霸勸王承休求秦州節度使承休言於蜀主曰秦州多美婦人請為陛下采擇以獻為于偽翻蜀主許之庚午以承休為天雄節度使封魯國公史言蜀政之亂有唐末之所無者以龍武軍為承休牙兵是年十月蜀方置龍武軍乙亥蜀主以前武德節度使兼中書令徐延瓊為京城内外馬步都指揮使蜀以成都城為京城延瓊以外戚代王宗弼居舊將之右衆皆不平蜀主之母之妃皆徐氏也蜀主建遺命不以徐氏兄弟典兵雖王衍昏縱而蜀之臣亦無以建遺命為衍言者王宗弼亦何足任衆之所以不平徐延瓊者但以非次耳壬午北京言契丹寇嵐州同光之初以鎮州為北都太原為西京尋廢北都復為鎮州以太原為北京嵐盧含翻辛卯蜀主改明年元曰咸康盧龍節度使李存賢卒是嵗蜀主徙普王宗仁為衞王雅王宗輅為豳王褒王宗紀為趙王榮王宗智為韓王興王宗澤為宋王彭王宗鼎為魯王忠王宗平為薛王資王宗特為莒王宗輅宗智宗平皆罷軍役蜀以諸王為軍使見二百七十卷梁均王貞明四年三年春正月甲午朔蜀大赦丙申敕有司改葬昭宗及少帝以其遭朱温之弑葬故多闕也少詩照翻竟以用度不足而止後唐自以為承唐後終不能改葬昭宗少帝後漢自以為纂漢緒而長陵原陵終乾祐之世不沾一奠史書之以見譏契丹寇幽州庚子帝發洛陽庚戌至興唐時以魏州為興唐府詔平盧節度使符習治酸棗遥隄以禦決河遥隄者逺於平地為之以捍水治直之翻初李嗣源北征謂去年北禦契丹時也過興唐東京庫有供御細鎧嗣源牒副留守張憲取五百領憲以軍興不暇奏而給之帝怒曰憲不奉詔擅以吾鎧給嗣源何意也罰憲俸一月令自往軍中取之往嗣源軍中取細鎧帝以義武節度使王都將入朝欲闢毬場憲曰比以行宫闕廷為毬場前年陛下即位於此其壇不可毁比毘至翻同光元年帝築壇於魏州牙城之南告天即位請闢毬場於宫西數日未成帝命毁即位壇憲謂郭崇韜曰此壇主上所以禮上帝始受命之地也若之何毁之崇韜從容言於帝從千容翻帝立命兩虞候毁之兩虞候馬軍虞候及步軍虞候一曰左右兩虞候憲私於崇韜曰忘天背本不祥莫大焉背蒲妹翻張憲郭崇韜相與私議而不敢廷爭以帝之鷙悍而不可回也二月甲戌以横海節度使李紹斌為盧龍節度使李紹斌至明宗時復姓趙賜名德均德均守幽州不為無功其後乗危以邀君外與契丹為市不但父子為虜幽州亦為虜有矣丙子李嗣源奏敗契丹於涿州敗補邁翻上以契丹為憂與郭崇韜謀以威名宿將零落殆盡李紹斌位望素輕欲徙李嗣源鎮真定為紹斌聲援崇韜深以為便時崇韜領真定上欲徙崇韜鎮汴州欲使二人兩易節鎮崇韜辭曰臣内典樞機外預大政富貴極矣何必更領藩方且羣臣或從陛下嵗久身經百戰所得不過一州臣無汗馬之勞徒以侍從左右侍從才用翻時賛聖謨致位至此常不自安今因委任勲賢使臣得解旄節乃大願也且汴州闗東衝要汴州在成臯闗之東南通淮泗北接滑魏衝要之地也地富人繁臣既不至治所徒令它人攝職何異空城非所以固國基也上曰深知卿忠藎然卿為朕畫策襲取汶陽保固河津既而自此路直趨大梁成朕帝業為于偽翻取汶陽謂取鄆州保固河津謂築壘馬家口與取大梁事並見上卷元年汶音問趨七喻翻豈百戰之功可比乎今朕貴為天子豈可使卿曽無尺寸之地乎崇韜固辭不已上乃許之庚辰徙李嗣源為成德節度使漢主聞帝滅梁而懼遣宫苑使何詞入貢且覘中國彊弱覘丑亷翻又丑艶翻甲申詞至魏時帝在魏都及還還從宣翻又如字言帝驕淫無政不足畏也漢主大悦自是不復通中國復扶又翻無敵國外患者國恒亡漢主既知唐之不足畏奢虐亦由是滋矣帝性剛好勝好呼到翻不欲權在臣下入洛之後信伶宦之讒頗疎忌宿將李嗣源家在太原三月丁酉表衞州刺史李從珂為北京内牙馬步都指揮使以便其家帝怒曰嗣源握兵權居大鎮軍政在吾安得為其子奏請得為于偽翻乃黜從珂為突騎指揮使帥數百人戍石門鎮石門鎮即唐之横水柵帥讀曰率嗣源憂恐上章申理久之方解上時掌翻申者重也重自理説辛丑嗣源乞至東京朝覲不許郭崇韜以嗣源功髙位重亦忌之私謂人曰總管令公非久為人下者李嗣源為中書令蕃漢内外馬步軍都總管故以稱之皇家子弟皆不及也密勸帝召之宿衞罷其兵權又勸帝除之帝皆不從為李嗣源疑懼張本郭崇韜其亦自知為伶宦所忌乎己酉帝發興唐自德勝濟河歴楊村戚城觀昔時戰處指示羣臣以為樂此即帝自言我於十指上得天下之故態也樂音洛洛陽宫殿宏邃宦者欲上増廣嬪御詐言宫中夜見鬼物上欲使符呪者攘之符水厭祝巫覡挾術以欺世者為之攘却也宦者曰臣昔逮事咸通乾符天子逮及也咸通唐懿宗年號乾符僖宗年號當是時六宫貴賤不減萬人今掖庭太半空虛故鬼物遊之耳上乃命宦者王允平伶人景進采擇民間女子逺至太原幽鎮以充後庭不啻三千人不問所從來上還自興唐還從宣翻又如字載以牛車纍纍盈路張憲奏諸營婦女亡逸者千餘人慮扈從諸軍挾匿以行其實皆入宫矣諸營謂魏州諸營也史言帝之結怨于魏卒者非一事從才用翻庚辰帝至洛陽辛酉詔復以洛陽為東都興唐府為鄴都唐之盛時以洛陽為東都同光之初以晉陽為西京魏州為東京尋以洛陽為洛都今復唐舊以洛陽為東都則亦復以長安為西京矣晉陽之西京先已改為北都洛陽既復東京之舊又改魏州之東京為鄴都然相州乃古鄴地魏州治元城非鄴地也鄴戰國時為魏邑漢為鄴縣魏郡治焉漢末曹操為魏王居鄴前燕慕容暐都鄴置貴鄉縣屬昌樂郡水經注所謂沙丘堰有貴鄉者也隋開皇三年罷昌樂郡貴鄉縣屬魏州遂為州治所此時與興唐縣並置於鄴下興唐本元城莊宗以魏州為鄴都特以漢魏郡治鄴曹操以魏王都鄴而名之耳然相州自隋以來治安陽而鄴為屬縣魏州相州治所皆非古鄴也夏四月癸亥朔日有食之初五臺僧誠惠以妖妄惑人自言能降伏天龍降戸江翻命風召雨帝尊信之親師后妃及皇弟皇子拜之帥讀曰率誠惠安坐不起羣臣莫敢不拜時大旱帝自鄴都迎誠惠至洛陽使祈雨士民朝夕瞻仰數旬不雨或謂誠惠謂者告語之也官以師祈雨無驗將焚之官謂莊宗師謂誠惠誠惠逃去慙懼而卒史言異端率妖妄不足信庚寅中書侍郎同平章事趙光𦙍卒太后自與太妃别二年正月太后離晉陽常忽忽不樂樂音洛雖娛玩盈前未嘗解顔太妃既别太后亦邑邑成疾太后遣中使醫藥相繼於道聞疾稍加輒不食又謂帝曰吾與太妃恩如兄弟欲自往省之省悉景翻帝以天暑道逺苦諫久之乃止但遣皇弟存渥等往迎侍五月丁酉北都奏太妃薨太后悲哀不食者累日帝寛譬不離左右太后自是得疾又欲自往㑹太妃葬帝力諫而止離力智翻太后之悲慕以太妃有以得其心耳閩王審知寢疾命其子節度副使延翰權知軍府事自春夏大旱六月壬申始雨帝苦溽暑溽儒欲翻溽暑濕熱也於禁中擇髙凉之所皆不稱㫖稱尺證翻宦者因言臣見長安全盛時大明興慶宫樓觀以百數唐都長安大明宫東内也興慶宫南内也觀工喚翻今日宅家曽無避暑之所宫殿之盛曽不及當時公卿第舍耳帝乃命宫苑使王允平别建一樓以清暑宦者曰郭崇韜常不伸眉為孔謙論用度不足為于偽翻恐陛下雖欲營繕終不可得上曰吾自用内府錢無闗經費經費謂國之經常調度其費仰于租庸使者然猶慮崇韜諫遣中使語之曰語牛倨翻今嵗盛暑異常朕昔在河上與梁人相拒行營卑濕被甲乗馬被皮義翻親當矢石猶無此暑今居深宫之中而暑不可度奈何對曰陛下昔在河上勍敵未滅勍渠京翻深念讎恥雖有盛暑不介聖懐今外患已除海内賔服故雖珍臺閒館猶覺鬱蒸也陛下儻不忘艱難之時則暑氣自消矣郭崇韜之言其指明居養之移人可謂婉切其如帝不聽何帝黙然宦者曰崇韜之第無異皇居宜其不知至尊之熱也帝卒命允平營樓卒子恤翻日役萬人所費巨萬崇韜諫曰今兩河水旱軍食不充願且息役以俟豐年帝不聽帝將伐蜀辛卯詔天下括市戰馬吳鎮海節度判官楚州團練使陳彦謙有疾陳彦謙徐温所親信者也徐知誥恐其遺言及繼嗣事遺之醫藥金帛相屬於道遺唯季翻下同屬之欲翻彦謙臨終密留書遺徐温請以所生子為嗣以父子血氣所屬之親感動徐温太后疾甚秋七月甲午成德節度使李嗣源以邊事稍弭表求入朝省太后省悉景翻帝不許壬寅太后殂帝哀毁過甚五日方食八月癸未杖殺河南令羅貫初貫為禮部員外郎性强直為郭崇韜所知用為河南令為政不避權豪伶宦請托書積几案一不報皆以示崇韜崇韜奏之由是伶宦切齒河南尹張全義亦以貫髙伉惡之伉苦浪翻惡烏路翻遣婢訴於皇后劉后以父事張全義故得遣婢出入宫掖后與伶宦共毁之帝含怒未發㑹帝自往壽安視坤陵役者九域志壽安縣在洛陽西南七十里五代㑹要曰上欲祔太后於代州太祖園陵中書門下奏議曰人君以四海為家不當分南北洛陽是帝王之宅四時朝拜理須便近不能逺幸代州漢朝諸陵皆近秦雍國家園寢布列京畿後魏文帝自代遷洛之後園陵皆在河南兼勅應勲臣之家不許北葬今魏氏諸陵尚在京畿祔葬代州理未為允於是作坤陵道路泥濘濘乃定翻淖也橋多壊帝問主者為誰宦官對屬河南帝怒下貫獄獄吏榜掠下户嫁翻榜音彭掠音亮體無完膚明日傳詔殺之崇韜諫曰貫坐橋道不修法不至死帝怒曰太后靈駕將發天子朝夕往來橋道不修卿言無罪是黨也崇韜曰陛下以萬乗之尊怒一縣令使天下謂陛下用法不平臣之罪也帝曰既公所愛任公裁之拂衣起入宫崇韜隨之論奏不已帝自闔殿門崇韜不得入貫竟死㬥尸府門逺近寃之羅貫之死崇韜可以去而不能去自致夷滅哀哉丁亥遣吏部侍郎李德休等賜吳越國王玉冊金印紅袍御衣九月蜀主與太后太妃遊青城山歴丈人觀上清宫青城山在蜀州青城縣北三十三里杜光庭曰岷山連峯接岫千里不絶青城山乃第一峯也丈人觀在青城北二十里上清宫在髙臺山丈人祠之側髙臺山在岷山上有天池晉朝立天宫於上號上清宫遂至彭州陽平化彭州濛陽縣北四十里有葛仙山二十四化之第五化也漢州三學山而還還從宣翻又如字乙未立皇子繼岌為魏王丁酉帝與宰相議伐蜀威勝節度使李紹欽素諂事宣徽使李紹宏紹宏薦紹欽有葢世竒才雖孫吳不如可以大任郭崇韜曰段凝亡國之將姦諂絶倫不可信也改鄧州宣化軍為威勝軍段凝降賜姓名李紹欽事並見上卷元年衆舉李嗣源崇韜曰契丹方熾總管不可離河朔離力智翻魏王地當儲副未立殊功請依故事以為伐蜀都綂安禄山之亂𤣥宗分命諸子為諸道都統此唐故事也成其威名帝曰兒幼豈能獨往當求其副既而曰無以易卿庚子以魏王繼岌充西川四面行營都綂崇韜充東北面行營都招討制置等使軍事悉以委之又以荆南節度使髙季興充東南面行營都招討使鳳翔節度使李繼曮充都供軍轉運應接等使同州節度使李令德充行營副招討使陜州節度使李紹琛充蕃漢馬步軍都排陳斬斫使兼馬步軍都指揮使李令德朱友謙之子也李紹琛康延孝也皆降唐賜姓名陳讀曰陣西京留守張筠充西川管内安撫應接使華州節度使毛璋充左廂馬步都虞候邠州節度使董璋充右廂馬步都虞候客省使李嚴充西川管内招撫使將兵六萬伐蜀仍詔季興自取夔忠萬三州為巡屬唐時䕫忠萬三州本屬荆南節度唐末之亂王建據蜀併而有之都綂置中軍以供奉官李從襲充中軍馬步都指揮監押髙品李廷安吕知柔充魏王府通謁李從襲等皆宦官也辛丑以工部尚書任圜翰林學士李愚並參預都綂軍機自六月甲午雨罕見日星江河百川皆溢凡七十五日乃霽郭崇韜以北都留守孟知祥有薦引舊恩事見二百七十卷梁均王貞明五年將行言於上曰孟知祥信厚有謀若得西川而求帥無踰此人者帥所類翻又薦鄴都副留守張憲謹重有識可為相戊申大軍西行蜀安重霸勸王承休請蜀主東遊秦州承休到官即毁府署作行宫大興力役强取民間女子教歌舞圖形遺韓昭遺唯季翻韓昭諛佞蜀主狎而信之使言於蜀主又獻花木圖盛稱秦州山川土風之美蜀主將如秦州羣臣諫者甚衆皆不聽王宗弼上表諫蜀主投其表於地太后涕泣不食止之亦不能得前秦州節度判官蒲禹卿上表幾二千言上時掌翻幾居依翻其畧曰先帝艱難創業欲傳之萬世陛下少長富貴少詩照翻長知兩翻荒色惑酒秦州人雜羌胡地多瘴癘萬衆困於奔馳郡縣罷於供億瘴之亮翻罷讀曰疲鳳翔久為仇讎必生釁隙唐國方通歡好恐懐疑貳好呼到翻言無事舉兵東出恐因而致寇先皇未嘗無故盤游陛下率意頻離宫闕離力智翻秦皇東狩鑾駕不還見秦紀煬帝南巡龍舟不返見隋紀蜀都强盛雄視隣邦邊庭無烽火之虞境内有腹心之疾百姓失業盜賊公行昔李勢屈於桓温見九十七卷晉孝宗永和三年劉禪降於鄧艾見七十七卷魏元帝景元四年降戸江翻山河險固不足憑恃韓昭謂禹卿曰吾收汝表俟主上西歸自秦州歸成都曰西歸當使獄吏字字問汝蜀主歸未及以問蒲禹卿而韓昭身首已異處矣王承休妻嚴氏美蜀主私焉故鋭意欲行冬十月排陳斬斫使李紹琛與李嚴將驍騎三千步兵萬人為前鋒招討判官陳乂至寶雞稱疾乞留李愚厲聲曰陳乂見利則進懼難則止今大軍涉險自寶雞入散闗則涉棧閣之險人心易揺易以豉翻宜斬以徇由是軍中無敢顧望者乂薊州人也薊音計癸亥蜀主引兵數萬發成都甲子至漢州武興節度使王承捷告唐兵西上蜀置武興軍於鳳州唐自闗東進兵攻蜀為西上上時掌翻蜀主以為羣臣同謀沮已沮在吕翻猶不信大言曰吾方欲耀武遂東行在道與羣臣賦詩殊不為意丁丑李紹琛攻蜀威武城蜀指揮使唐景思將兵出降城使周彦禋等知不能守亦降至考異曰實録十月戊寅魏王繼岌鳳州王承㨗以鳳興文成四州降前一日康延孝李嚴至故鎮威武城唐景思等降按今故鎮在鳳州西四程延孝未下鳳州何能先至故鎮又蜀之守禦必在鳳州之東或者當時鳳州之東别有威武城亦名故鎮非今之故鎮歟景思秦州人也得城中糧二十萬斛紹琛縱其敗兵萬餘人逸去因倍道趣鳳州縱敗兵先去以懼蜀人而倍道踵其後以趣鳳州趣七喻翻李嚴飛書以諭王承捷李繼曮竭鳳翔蓄積以饋軍不能充人情憂恐郭崇韜入散闗指其山曰吾輩進無成功不得復還此矣當盡力一决一决者一决戰也復扶又翻下同今饋運將竭宜先取鳳州因其糧諸將皆言蜀地險固未可長驅宜按兵觀釁崇韜以問李愚愚曰蜀人苦其主荒淫莫為之用宜乗其人心崩離風驅霆擊彼皆破膽雖有險阻誰與守之兵勢不可緩也是日李紹琛告捷是日崇韜入散闗之日也葢即丁丑崇韜喜謂李愚曰公料敵如此吾復何憂乃倍道而進復扶又翻戊寅王承㨗以鳳興文扶四州印節迎降四州州印及武興節度使印及旌節也得兵八千糧四十萬斛崇韜曰平蜀必矣兵威已振有糧可因知功必成即以都綂牒命承捷攝武興節度使己卯蜀主至利州威武敗卒奔還始信唐兵之來王宗弼宋光嗣言於蜀主曰東川山南兵力尚完東川謂梓遂諸州山南謂興元諸州陛下但以大軍扼利州唐人安敢懸兵深入從之庚辰以隨駕清道指揮使王宗勲王宗儼兼侍中王宗昱為三招討將兵三萬逆戰從駕兵自綿漢至深渡從才用翻深渡在利州綿谷縣北大漫天小漫天之間千里相屬屬之欲翻皆怨憤曰龍武軍糧賜倍於它軍龍武糧賜優厚事見上年它軍安能禦敵李紹琛等過長舉長舉漢沮縣地西魏置盤頭郡隋置長舉縣唐屬興州九域志在州西一百里興州都指揮使程奉璉將所部兵五百來降且請先治橋棧以俟唐軍璉力展翻治直之翻棧士限翻由是軍行無險阻之虞辛巳興州刺史王承鑒弃城走紹琛等克興州考異曰實録甲申魏王至故鎮康延孝收興州十國紀年辛巳承鑒出奔甲申繼岌郭崇韜至威武城今從之郭崇韜以唐景思攝興州刺史乙酉成州刺史王承朴棄城走九域志興州西至成州二百一十五里李紹琛等與蜀三招討戰于三泉三泉縣唐屬興元府九域志興州東南至三泉一百四十五里有百牢闗金牛道之險蜀兵大敗斬首五千級餘衆潰走又得糧十五萬斛於三泉由是軍食優足優饒也戊子葬貞簡太后于坤陵蜀主聞王宗勲等敗自利州倍道西走斷桔柏津浮梁桔古屑翻斷音短命中書令判六軍諸衞事王宗弼將大軍守利州且令斬王宗勲等三招討以三泉之敗也李紹琛晝夜兼行趣利州九域志三泉西至利州一百八十九里趣七喻翻蜀武德留後宋光葆遺郭崇韜書遺唯季翻請唐兵不入境當舉巡屬内附茍不如約則背城决戰以報本朝背蒲昧翻宋光葆謂蜀為本朝朝直遥翻崇韜復書撫納之乙丑魏王繼岌至興州光葆以梓綿劍龍普五州武定節度使王承肇以洋蓬壁三州山南節度使王宗威以梁開通渠麟五州渠州潾山縣唐武德元年置潾州八年州廢以潾山縣屬渠州當是蜀復置潾州也麟當作潾音力珍翻又唐貞觀中置麟州以處生羌歸附者屬松州都督府唐至德後淪没久矣當以渠潾之潾為是階州刺史王承岳以階州皆降承肇宗侃之子也自餘城鎮皆望風欵附天雄節度使王承休與副使安重霸謀掩擊唐軍欲自秦州掩撃唐軍之後重霸曰擊之不勝則大事去矣蜀中精兵十萬天下險固唐兵雖勇安能直度劍門邪然公受國恩聞難不可不赴難乃旦翻願與公俱西言自秦州西赴成都承休素親信之以為然重霸請賂羌人買文扶州路以歸承休從之使重霸將龍武軍及所募兵萬二千人以從將行州人餞於城外承休上道以從才用翻上時掌翻重霸拜於馬前曰國家竭力以得秦隴蜀得秦隴見二百六十九卷梁均王貞明元年若從開府還朝朝直遥翻誰當守之開府行矣重霸請為公留守蜀葢加王承休開府儀同三司故稱之為于偽翻下為陳同守式又翻承休業已上道無如之何遂與招討副使王宗汭自扶文而南其地皆不毛羌人抄之抄楚交翻且戰且行士卒凍餒比至茂州餘衆二千而已此自秦州取道文扶循山至茂州也為王承休宗汭為魏王繼岌所誅張本比必利翻重霸遂以秦隴來降髙季興常欲取三峽畏蜀峽路招討使張武威名不敢進至是乗唐兵勢使其子行軍司馬從誨權軍府事自將水軍上峽取施州張武以鐵鏁斷江路斷音短季興遣勇士乗舟斫之㑹風大起舟絓於鏁不能進退絓音掛矢石交下壊其戰艦壊音怪季興輕舟遁去使蜀之邊帥盡如張武散闗豈易入哉為後孟知祥復用張武張本既而聞北路陷敗以䕫忠萬三州遣使詣魏王降郭崇韜遺王宗弼等書為陳利害遺唯季翻李紹琛未至利州宗弼棄城引兵西歸王宗勲等三招討追及宗弼於白芀九域志簡州金水縣有白芀鎮芀都聊翻宗弼懐中探詔書示之曰探吐南翻宋光嗣令我殺爾曹因相持而泣遂合謀送欵於唐資治通鑑卷二百七十三
