  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百五十七宋司馬光撰胡三省音註梁紀十三起旃䝉單閼盡彊圉大荒落凡三年髙祖武皇帝十三大同元年春正月戊申朔大赦改元是日魏文帝即位於城西城西長安城西也古者天子即位御前殿魏自髙歡立孝武帝復用夷禮於郊拜天而後即位大赦改元大統追尊父京兆王為文景皇帝妣楊氏為皇后魏渭州刺史可朱渾道元先附侯莫陳悦悦死悦死見上卷中大通六年丞相泰攻之不能克與盟而罷道元世居懐朔與東魏丞相歡善又母兄皆在鄴由是常與歡通泰欲擊之道元帥所部三千户西北度烏蘭津抵靈州烏蘭津在平涼西北唐分平涼之㑹寧鎮置㑹州又置烏蘭縣屬焉縣西南有烏蘭闗帥讀曰率靈州刺史曹泥資送至雲州歡聞之遣資糧迎候拜車騎大將軍騎奇寄翻道元至晉陽歡始聞孝武帝之喪魏孝武去年十二月殂啟請舉哀制服東魏主使羣臣議之太學博士潘崇和以為君遇臣不以禮則無反服記檀弓魯繆公問於子思曰為舊君反服古與子思曰古之君子進人以禮退人以禮故有舊君反服之禮也今之君子進人若將加諸膝退人若將隊諸淵毋為戎首不亦善乎又何反服之禮之有孟子齊宣王曰禮為舊君有服何如斯可為之服矣孟子曰諫行言聽膏澤下於民有故而去則君使人導之出疆又先之於其所往去三年不反然後收其田里此之謂三有禮焉如此則為之服矣今也為臣諫則不行言則不聽膏澤不下於民有故而去則君搏執之又極之於其所往去之日遂收其田里此之謂冦讎冦讎何服之有是以湯之民不哭桀周武之民不服紂國子博士衛既隆李同軌議以為髙后於永熈離絶未彰宜為之服東魏從之歡初立孝武納其長女以為皇后帝之西奔后留不從魏驍騎大將軍儀同三司李虎等招諭費也頭之衆與之共攻靈州凡四旬曹泥請降驍堅堯翻騎奇寄翻降户江翻己酉魏進丞相畧陽公泰為都督中外諸軍録尚書事大行臺封安定王泰固辭王爵及録尚書乃封安定公以尚書令斛斯椿為太保廣平王贊為司徒乙卯魏主立妃乙弗氏為皇后乙弗之先世為吐谷渾渠帥居青海即禿髪傉儃所襲者也魏平凉州后之髙祖莫瓌擁部落入附其後從孝文遷洛遂家焉子欽為皇太子后仁恕節儉不妬忌帝甚重之以魏文帝之重乙弗后而卒迫於彊敵使后不得其死悲夫稽胡劉蠡升自孝昌以来自稱天子改元神嘉居雲陽谷李延夀曰稽胡一日步落稽蓋匈奴别種劉元海五部之苗裔也或云山戎赤狄之後自離石以西安定以東方七八百里居山谷間種荒繁熾魏之邊境常被其患謂之胡荒言其本胡種侵擾漢民若在荒服之外者也被皮義翻壬戌東魏丞相歡襲擊大破之勃海世子澄通於歡妾鄭氏歡封渤海王以澄為世子歡歸歸自襲稽胡一婢告之二婢為證歡杖澄一百而幽之婁妃亦隔絶不得見歡納魏敬宗之后爾朱氏有寵生子浟浟夷周翻歡欲立之澄求救於司馬子如子如入見歡偽為不知者請見婁妃歡告其故子如曰消難亦通子如妾此事正可掩覆難乃旦翻覆敷又翻妃是王結髪婦常以父母家財奉王程正叔曰古人言結髪為夫婦如言結髪事君結髪戰匈奴只言初上頭時也豈謂合髻子邪按婁妃本傳妃少見歡在城上執役慕之使婢通意又數致私財使以聘己父母不得已而許焉王在懐朔被杖背無完皮妃晝夜供侍後避葛賊葛賊謂葛榮也同走幷州貧困妃然馬矢然與燃同自作靴隋志靴胡履也取便於事施於戎服恩義何可忘也夫婦相宜女配至尊妃二女長配孝武帝次配孝静帝男承大業謂澄為世子也且婁領軍之勳何宜搖動妃弟昭時為領軍將軍一女子如草芥况婢言不必信邪歡因使子如更鞫之子如見澄尤之曰男兒何意畏威自誣因教二婢反其辭反音翻脅告者自縊縊於賜翻又於計翻乃啟歡曰果虛言也歡大悦召婁妃及澄妃遙見歡一步一叩頭澄且拜且進父子夫婦相泣復如初復扶又翻歡置酒曰全我父子者司馬子如也賜之黄金百三十斤甲子魏以廣陵王欣為太傅儀同三司万俟夀洛千為司空万莫北翻俟渠之翻夀洛千即受洛千己巳東魏以丞相歡為相國假黄鉞殊禮固辭東魏大行臺尚書司馬子如帥大都督竇泰太州刺史韓軌等攻潼闗按韓軌𫝊為秦州刺史又考魏收志東魏置秦州於河東領河東北鄉二郡史蓋誤以秦為泰縁泰之誤又以泰為太帥讀曰率魏丞相泰軍於霸上子如與軌囘軍從蒲津宵濟攻華州五代志後魏置東雍州於鄭縣西魏改曰華州華戸化翻時脩城未畢梯倚城外比曉東魏人乗梯而入刺史王羆臥尚未起聞閤外匈匈有聲比必利翻匈許容翻匈匈喧擾之聲􅃝身露髻徒跣持白梃大呼而出梃待鼎翻杖也白梃即今人所謂白棓也呼火故翻東魏人見之驚却羆逐至東門左右稍集合戰破之子如等遂引去兵以氣勢為用兵之勇怯恃主帥以為氣勢王羆勇於赴敵而其左右又勇於戰此其所以於不備不虞之中而能却敵也二月辛巳上祀明堂壬午東魏以咸陽王坦為太𫝊西河王悰為太尉悰徂宗翻東魏使尚書右僕射髙隆之發十萬夫撤洛陽宫殿運其材入鄴丁亥上耕籍田東魏儀同三司婁昭等攻兖州樊子鵠使前膠州刺史嚴思達守東平魏收志泰常中置東平郡太和末罷建義中復置治秦城屬濟州秦城在范縣界昭攻㧞之遂引兵圍瑕丘乆不下昭以水灌城己丑大野㧞見子鵠計事因斬其首以降始子鵠以衆少降户江翻少詩沼翻悉驅老弱為兵子鵠死各散走諸將勸婁昭盡捕誅之昭曰此州不幸横被殘賊跂望官軍以救塗炭横戸孟翻跂去智翻舉踵也今復誅之復扶又翻下衆復同民將誰訴皆捨之戊戌司州刺史陳慶之伐東魏與豫州刺史堯雄戰不利而還東魏豫州治汝南堯姓雄名三月辛酉東魏以髙盛為太尉髙敖曹為司徒濟隂王暉業為司空濟子禮翻東魏丞相歡偽與劉蠡升約和許以女妻其太子妻七細翻下后妻同蠡升不設備歡舉兵襲之辛酉蠡升北部王斬蠡升首以降降戸江翻餘衆復立其子南海王歡進擊擒之俘其皇后諸王公卿以下四百餘人華夷五萬餘戸壬申歡入朝於鄴朝直遙翻以孝武帝后妻彭城王韶孝武帝后歡長女也魏丞相泰以軍旅未息吏民勞弊命所司斟酌古今可以便時適治者為二十四條新制奏行之治直吏翻泰用武功蘇綽為行臺郎中魏收志太和十一年分扶風置武功郡屬岐州即漢魏武功縣之地居嵗餘泰未之知也而臺中皆稱其能有疑事皆就决之就蘇綽以决疑也此就即孟子欲有謀焉則就之之就泰與僕射周惠達論事惠達不能對請出議之出以告綽綽為之區處為於偽翻處昌吕翻惠達入白之泰稱善曰誰與卿為此議者惠達以綽對且稱綽有王佐之才泰乃擢綽為著作郎泰與公卿如昆明池觀漁行至漢故倉池水經志沈水枝渠至章門西飛渠引水入城東為倉池池在未央宫西池有漸臺漢兵起王莽死於此臺蘇綽𫝊亦云行至長安城西漢故倉池顧問左右莫有知者泰召綽問之具以狀對泰悦因問天地造化之始歴代興亡之迹綽應對如流泰與綽並馬徐行至池竟不設網罟而還意在問綽不在觀漁還從宣翻又如字遂留綽至夜問以政事臥而聽之綽指陳為治之要治直吏翻泰起整衣危坐不覺膝之前席初臥而聽繼起而整衣危坐又不覺膝之前席蓋綽之言深有以當泰心乆而愈敬也語遂達曙不厭天曉為曙詰朝謂周惠達曰蘇綽真奇士吾方任之以政結去吉翻即拜大行臺左丞參典機宻自是寵遇日隆綽始制文按程式朱出墨入及計帳戸籍之法計帳者具来嵗課役之大數以報度支戸籍者戸口之籍後人多遵用之世有有為之主必有能者出為之用若謂天下無才吾不信也東魏以封延之為青州刺史代侯淵淵既失州任而懼行及廣川沈約曰廣川縣本屬信都後漢屬清河魏屬渤海晉還清河江左僑立廣川郡縣於濟南非舊所也魏收曰齊郡廣川縣有牛山齊桓公冢管仲冢五代志齊州長山縣舊屬廣川郡遂反夜襲青州南郭刼掠郡縣夏四月丞相歡使濟州刺史蔡儁討之濟子禮翻淵部下多叛淵欲南奔於道為賣漿者所斬送首於鄴元慶和攻東魏城父魏收志陳留郡浚儀縣有城父城至隋改浚儀為城父縣屬譙郡五代志譙郡城父縣宋置浚儀縣又考沈約志陳留浚儀縣竝寄治譙郡長垣縣界則知諸志所謂浚儀非我宋朝開封府之浚儀也魏收志梁州陳留郡浚儀縣則我宋朝開封之浚儀也真宗改浚儀曰祥符所謂城父則今亳州之城父縣是也父音甫丞相歡遣髙敖曹帥三萬人趣項竇泰帥三萬人趣城父侯景帥三萬人趣彭城帥讀曰率趣七喻翻以任祥為東南道行臺僕射節度諸軍任音壬五月魏加丞相泰柱國柱國大將軍元慶和引兵逼東魏南兖州東魏洛州刺史韓賢拒之東魏既遷鄴以洛陽為洛州領洛陽河隂新安中川河南陽城郡六月慶和攻南頓豫州刺史堯雄破之秋七月甲戌魏以開府儀同三司念賢為太尉万俟夀洛干為司徒開府儀同三司越勒肱為司空越勒出於越勒部因以為姓益州刺史鄱陽王範南梁州刺史樊文熾五代志普安郡梁置南梁州後改為安州西魏改曰始州至唐改始州曰劒州合兵圍晉夀魏東益州刺史傅敬和来降降戸江翻範恢之子鄱陽王恢費妃之子上之弟也敬和豎眼之子也傅豎眼著功梁益而子為降虜隤其家聲忽諸豎而庾翻魏下詔數髙歡二十罪數所具翻且曰朕將親總六軍與丞相掃除凶醜歡亦移檄於魏謂宇文黑獺斛斯椿為逆徒且言令分命諸將領兵百萬刻期西討將即亮翻東魏遣行臺元晏擊元慶和或告東魏司空濟隂王暉業與七兵尚書薛琡貳於魏曹魏置五兵尚書謂中兵外兵騎兵别兵都兵也及晉分中兵外兵為左右與舊五兵為七曹然尚書唯置五兵而已無七兵尚書之名至後魏始有七兵尚書北齊復為五兵琡昌六翻濟子禮翻八月辛卯執送晉陽皆免官時東魏丞相歡居晉陽執送二人取其裁决春秋晉為方伯執列國君臣之違命者歸之京師經猶貶之况自京師而執送晉陽乎甲午東魏發民七萬六千人作新宫於鄴使僕射髙隆之與司空胄曹參軍辛術共營之元魏公府有法墨田水鎧胄集士等曹皆行參軍也築鄴南城周二十五里術琛之子也辛琛見一百四十七卷天監六年琛丑林翻趙剛自蠻中往見東魏東荆州刺史趙郡李愍勸令附魏愍從之剛由是得至長安丞相泰以剛為左光禄大夫剛説泰召賀㧞勝獨孤信等於梁剛沒蠻中勝信奔梁竝見上卷上年説式芮翻泰使剛来請之九月丁巳東魏以開府儀同三司襄城王旭為司空旭吁玉翻冬十月魏太師上黨文宣王長孫稚卒長知兩翻魏秦州刺史王超世丞相泰之内兄也母黨以兄弟齒謂之内兄内弟驕而黷貨泰奏請加法詔賜死十一月丁未侍中中衛將軍徐勉卒卒子恤翻勉雖骨鯁不及范雲亦不阿意苟合故梁世言賢相者稱范徐云范徐既沒專任朱异梁殆矣癸丑東魏主祀圜丘甲午東魏閶闔門災門之初成也髙隆之乗馬逺望謂其匠曰西南獨髙一寸量之果然髙居奥翻量音良太府卿任忻集自矜其巧不肯改任音壬隆之恨之至是譛於丞相歡曰忻集潛通西魏令人故燒之歡斬之北梁州刺史蘭欽引兵攻南鄭梁以南鄭為北梁州蓋以欽為刺史使之圖南鄭也魏梁州刺史元羅舉州降降户江翻今考異曰典畧在七月從梁帝紀東魏以丞相歡之子洋為驃騎大將軍開府儀同三司封太原公洋音羊又音祥驃匹妙翻騎奇寄翻下同洋内明决而外如不慧兄弟及衆人皆嗤鄙之嗤丑之翻獨歡異之謂長史薛琡曰此兒識慮過吾㓜時歡嘗欲觀諸子意識使各治亂絲治直之翻下同洋獨抽刀斬之曰亂者必斬又各配兵四出使都督彭樂帥甲騎偽攻之兄澄等皆怖撓帥讀曰率怖普布翻撓奴教翻洋獨勒衆與樂相格樂免胄言情猶擒之以獻初大行臺右丞楊愔從兄岐州刺史㓜卿以直言為孝武帝所殺愔於今翻從才用翻愔同列郭秀害其能恐之曰髙王欲送卿於帝所愔懼變姓名逃於田横島五代志東莱郡即墨縣有田横島乆之歡聞其尚在召為太原公開府司馬為楊愔為洋所親任張本頃之復為大行臺右丞復扶又翻十二月甲午東魏文武官量事給禄隨任事之輕重以為給禄之差量音良魏以念賢為太傅河州刺史梁景叡為太尉是嵗鄱陽妖賊鮮于琛改元上願有衆萬餘人妖於驕翻琛丑林翻鄱陽内史吳郡陸襄討擒之按治黨與無濫死者民歌之曰鮮于平後善惡分民無枉死賴陸君柔然頭兵可汗求婚於東魏丞相歡以常山王妹為蘭陵公主妻之柔然數侵魏妻七細翻數所角翻魏使中書舍人庫狄峙奉使至柔然與約和親使疏吏翻由是柔然不復為冦復扶又翻二年春正月辛亥魏祀南郊改用神元皇帝配魏髙祖太和十六年以太祖道武皇帝配南郊神元皇帝魏之先祖拓㧞力微也見晉武帝紀甲子東魏丞相歡自將萬騎襲魏夏州將即亮翻騎奇寄翻夏戸雅翻身不火食四日而至縛矟為梯矟色角翻夜入其城擒刺史斛㧞俄彌突因而用之留都督張瓊將兵鎮守遷其部落五千戸以歸魏靈州刺史曹泥與其壻凉州刺史普樂劉豐復叛降東魏魏置普樂郡屬靈州五代史志靈武郡迴樂縣後周置帶普樂郡宋白曰靈州西南至凉州九百里去年曹泥降魏今復叛樂音洛復扶又翻降戸江翻魏人圍之齊考異曰北書典畧皆云周文圍泥周書不言故但云魏人水灌其城不沒者四尺東魏丞相歡𤼵阿至羅三萬騎徑度靈州繞出魏師之後魏師退歡帥騎迎泥及豐㧞其遺戸五千以歸髙歡豈不欲與宇文争靈州哉雖鞭之長不及馬腹也以豐為南汾州刺史東魏置南汾州於定陽隋改定陽縣為吉昌縣唐為慈州治所東魏加丞相歡九錫固讓而止上為文帝作皇基寺以追福帝追尊考順之曰文皇帝為於偽翻命有司求良材曲阿𢎞氏自湘州買巨材東下南津校尉孟少卿欲求媚於上據梁紀普通六年南州津改置校尉增加奉秩南州即今采石校戸教翻少詩照翻誣𢎞氏為刧而殺之沒其材以為寺殺無罪之人取其材以為寺福田利益果安在哉二月乙亥上耕籍田東魏勃海世子澄年十五為大行臺并州刺史中大通五年魏以歡為大行臺歡以授其子澄歡居晉陽并州刺史地任要重故亦以澄為之求入鄴輔朝政朝直遙翻下同丞相歡不許丞相主簿樂安孫搴為之請為於偽翻下為我同乃許之丁酉以澄為尚書令加領軍京畿大都督考異曰魏帝紀為尚書令大行臺大都督北齊文襄紀天平元年為尚書令大行臺并州刺史入輔朝政加領軍左右京畿大都督按尚書令不在外大行臺不在内今兩捨之魏朝雖聞其器識猶以年少期之少詩照翻既至用法嚴峻事無凝滯中外震肅引并州别駕崔暹為左丞吏部郎親任之司馬子如髙季式召孫搴劇飲醉甚而卒卒子恤翻丞相歡親臨其喪子如叩頭請罪歡曰卿折我右臂折而設翻為我求可代者子如舉中書郎魏收歡以收為主簿收子建之子也魏子建見一百五十卷普通五年他日歡謂季式曰卿飲殺我孫主簿飲於禁翻魏收治文書不如我意治直之翻司徒嘗稱一人謹宻者為誰時東魏以髙敖曹為司徒季式以司徒記室廣宗陳元康對曰是能夜中闇書快吏也召之一見即授大丞相功曹掌機宻大考異曰典畧孫搴卒在同十年四月按搴卒然後陳元康為功曹髙慎叛髙澄已令元康救崔暹卭山之戰元康又勸髙歡追宇文泰事竝在九年北史元康𫝊又云草劉蠡升軍書按蠡升滅在元年孫搴二年猶存今不取然則搴卒宜置於澄入輔之下遷大行臺都官郎時軍國多務元康問無不知歡或出臨行留元康在後馬上有所號令九十餘條元康屈指數之盡能記憶與功曹平原趙彦深同知機宻時人謂之陳趙而元康勢居趙前性又柔謹歡甚親之曰如此人誠難得天賜我也彦深名隱以字行東魏丞相歡令阿至羅逼魏秦州刺史万俟普万莫北翻俟渠之翻歡以衆應之三月戊申丹楊陶𢎞景卒𢎞景博學多藝能好養生之術仕齊為奉朝請棄官隱居茅山茅山在今建康府句容縣南五十里山記云漢時有三茅君各乘一鶴来此故名焉卒子恤翻好呼到翻朝直遙翻上早與之遊及即位恩禮甚篤每得其書焚香䖍受屢以手敇招之𢎞景不出國家每有吉凶征討大事無不先諮之月中嘗有數信月中謂一月之中也信使信也時人謂之山中宰相將沒為詩曰夷甫任散誕平叔坐論空王衍字夷甫何晏字平叔以魏晉喻梁也誕徒旱翻豈悟昭陽殿遂作單于宫𢎞景𫝊曰後侯景篡果在昭陽殿史言脩道之士有識時知數者時士大夫競談𤣥理不習武事故𢎞景詩及之甲寅東魏以華山王鷙為大司馬華戸化翻魏以凉州刺史李叔仁為司徒万俟洛為太宰洛字受洛干亦曰夀洛干受夀同音洛樂亦同音按北齊有太宰之官仍晉制也西魏用周制置大冢宰無太宰夏四月乙未以驃騎大將軍開府同三司之儀元法僧為太尉梁開府儀同三司之下又有開府同三司之儀尚書右丞考城江子四上封事極言政治得失上時掌翻治直吏翻五月癸卯詔曰古人有言屋漏在上知之在下朕有過失不能自覺江子四等封事所言尚書可時加檢括於民有蠧患者宜速詳啟江子四所上封事必不敢言帝崇信釋氏而窮兵廣地適以毒民用法寛於權貴而急於細民等事特毛舉細故而論得失耳戊辰東魏髙盛卒髙盛東魏太尉魏越勒肱卒越勒肱魏司空魏秦州刺史万俟普與其子太宰洛豳州刺史叱千寶樂右衛將軍破六韓常及督將三百人奔東魏阿至羅兵近普等因之以東奔在考異曰普降東魏事北齊書帝紀在三月甲午典畧六月北史齊紀在六月甲午周書帝紀北史魏紀齊紀在五月今從之史按考異前既引北齊書帝紀又引北史齊紀不應北魏紀之下􅃨出齊紀必有誤丞相泰輕騎追之至河北千餘里不及而還河北龍門西河之北也還從宣翻又如字下同秋七月庚子東魏大赦上待魏降將賀㧞勝等甚厚勝請討髙歡上不許勝等思歸前荆州大都督撫寧史寧謂勝曰按寧𫝊寧居撫寧鎮考魏北鎮無撫寧恐即撫㝠也又按五代志雕隂郡開疆縣有後魏撫寧郡又有撫寧縣亦屬雕隂郡朱异言於梁主無不從請厚結之勝從之上許勝寧及盧柔皆北還盧柔蓋去年從勝来奔親餞之於南苑勝懐上恩自是見禽獸南向者皆不射之射而亦翻行至襄城東魏丞相歡遣侯景以輕騎邀之勝等棄舟自山路逃歸勝等舟行蓋自淮入潁自潁入汝泝流而西入山路自三鵶取武闗也從者凍餒道死者太半從才用翻既至長安詣闕謝罪魏主執勝手歔欷曰乘輿播越天也乘繩證翻非卿之咎丞相泰引盧柔為從事中郎與蘇綽對掌機宻九月壬寅東魏以定州刺史侯景兼尚書右僕射南道行臺督諸將入冦將即亮翻魏以扶風王孚為司徒斛斯椿為太傅冬十月乙亥詔大舉伐東魏東魏侯景將兵七萬冦楚州魏收志梁置楚州治楚城領汝陽仵城城陽郡五代志汝南城陽縣梁置楚州虜刺史桓和進軍淮上南北司二州刺史陳慶之擊破之景棄輜重走重直用翻十一月己亥罷北伐之師魏復改始祖神元皇帝為太祖道武皇帝為烈祖魏改二祖廟號見一百三十七卷齊武帝永明九年復扶又翻十二月東魏以并州刺史尉景為太保壬申東魏遣使請和使疏吏翻上許之東魏清河文宣王亶卒數考異曰國典云亶為髙歡所酖典畧周太祖歡罪亦云殺亶魏書北史皆無亶𫝊而帝紀皆云亶薨今從之丁丑東魏丞相歡督諸軍伐魏遣司徒髙敖曹趣上洛大都督竇泰趣潼闗趣七喻翻癸未東魏以咸陽王坦為太師是嵗魏闗中大饑人相食者什七八三年春正月上祀南郊大赦東魏丞相歡軍蒲坂造三浮橋欲度河魏丞相泰軍廣陽魏收志景明元年置廣陽縣屬馮翊郡謂諸將曰賊掎吾三面掎居蟻翻作浮橋以示必度此欲綴吾軍使竇泰得西入耳歡自起兵以来竇泰常為前鋒其下多鋭卒屢勝而驕今襲之必克克泰則歡不戰自走矣諸將皆曰賊在近捨而襲逺脱有蹉跌悔何及也蹉七何翻跌徒結翻不如分兵禦之丞相泰曰歡再攻潼闗吾軍不出灞上中大通六年歡攻潼闗元年歡兵又攻潼闗今大舉而来謂吾亦當自守有輕我之心乗此襲之何患不克賊雖作浮橋未能徑度不過五日吾取竇泰必矣行臺左丞蘇綽中兵參軍代人達奚武亦以為然庚戌丞相泰還長安諸將意有異同丞相泰隱其計以問族子直事郎中深晉武帝置直事郎在尚書諸曹郎之上深曰竇泰歡之驍將驍堅堯翻將即亮翻今大軍攻蒲坂則歡拒守而泰攻之吾表裏受敵此危道也不如選輕鋭潛出小闗小闗在潼闗之左唐時謂之禁谷竇泰躁急必来决戰躁則到翻歡持重未即救我急擊泰必可擒也擒泰則歡勢自沮沮在吕翻囘師擊之可以决勝丞相泰喜曰此吾心也乃聲言欲保隴右辛亥謁魏主而潛軍東出癸丑旦至小闗竇泰猝聞軍至自風陵度丞相泰出馬牧澤水經注曰桃林之塞湖水出焉其中多野馬三秦記曰桃林塞在長安東四百里若有軍馬經過則牧華山休息林下馬牧澤蓋即此地也擊竇泰大破之士卒皆盡竇泰自殺傳首長安丞相歡以河氷薄不能赴救撤浮橋而退儀同代人薛孤延為殿通志曰作蕯孤復姓殿丁練翻一日斫十五刀折乃得免折即設翻丞相泰亦引軍還此一叚皆書丞相泰所以别竇泰也歴攷前後髙歡宇文泰皆書丞相於此尤為有别髙敖曹自商山轉鬭而進杜佑曰商山在商州上洛縣所向無前遂攻上洛郡人泉岳及弟猛畧與順陽人杜窋等謀翻城應之窋竹律翻又丁骨翻洛州刺史泉企知之此魏太和中所改洛州也治上洛時屬西魏企字兩道音去智翻殺岳及猛畧杜窋走歸敖曹敖曹以為鄉導而攻之敖曹被流矢通中者三郷讀曰嚮被皮義翻中作仲翻殞絶良乆復上馬免胄巡城企固守旬餘二子元禮仲遵力戰拒之仲遵傷目不堪復戰城遂陷企見敖曹曰吾力屈非心服也敖曹以杜窋為洛州刺史敖曹創甚復扶又翻創初良翻曰恨不見季式作刺史季式敖曹弟也丞相歡聞之即以季式為濟州刺史敖曹欲入藍田闗唐志京兆藍田縣有藍田闗故嶢闗也濟于禮翻歡使人告曰竇泰軍沒人心恐動宜速還路險賊盛㧞身可也敖曹不忍棄衆力戰全軍而還以泉企泉元禮自隨泉仲遵以傷重不行企私戒二子曰吾餘生無幾汝曹才器足以立功勿以吾在東遂虧臣節元禮於路逃還泉杜雖皆為土豪鄉人輕杜而重泉元禮仲遵隂結豪右襲窋殺之魏以元禮世襲洛州刺史二月丁亥上耕籍田籍秦昔翻己丑以尚書左僕射何敬容為中權將軍中權將軍二百四十號之一也䕶軍將軍蕭淵藻為左僕射右僕射謝舉為右光禄大夫魏槐里獲神璽槐里縣漢屬扶風晉屬治平郡後魏復属扶風璽斯氏翻大赦三月辛未東魏遷七帝神主入新廟七帝道武明元太武文成獻文孝文宣武大赦魏斛斯椿卒時解斯椿為魏太𫝊按椿居爾朱髙歡之間以智數間搆其君臣之際爾朱氏既為所夷而髙歡亦不能制也及入闗之後與宇文泰同列若無能為者權不在已無以舞弄其智數也夏五月魏以廣陵王欣為太宰賀㧞勝為太師六月魏以扶風王孚為太保梁景叡為太傅廣平王贊為太尉開府儀同三司武川王盟為司空東魏丞相歡遊汾陽之天池水經注太原汾陽縣北燕京山上有大池池在山原之上世謂之天池方里餘其水澄渟鏡淨而不流得奇石隱起成文曰六王三川以問行臺郎中陽休之對曰六者大王之字歡字賀六渾故云然王者當王天下河洛伊為三川涇渭洛亦為三川涇渭洛之洛指闗中之洛水今徑鄜坊同三州而入於渭當王於况翻大王若受天命終應奄有闗洛歡曰世人無事常言我反况聞此乎慎勿妄言休之固之子也陽固事魏孝文帝嘗從劉昶南伐行臺郎中中山杜弼承間勸歡受禪歡舉杖擊走之髙歡之志蓋如曹操所謂吾為周文王者非真無移魏鼎之心也間古莧翻東魏遣兼散騎常侍李諧来聘以吏部郎盧元明通直侍郎李業興副之通直侍郎即通直散騎侍郎散悉亶翻騎奇寄翻諧平之孫李平崇之從弟事孝文宣武元明昶之子也盧昶盧𤣥之孫秋七月諧等至建康上引見與語見賢遍翻應對如流諧等出上目送之謂左右曰朕今日遇勍敵勍其京翻卿輩嘗言北間全無人物此等何自而来是時鄴下言風流者以諧及隴西李神儁范陽盧元明北海王元景𢎞農楊遵彦清河崔贍為首贍而艶翻神儁名挺寶之孫李寶自敦煌歸魏其後貴盛元景名昕憲之曾孫也王憲猛之孫皇始中歸魏皆以字行贍㥄之子也㥄力膺翻時南北通好好呼到翻務以俊乂相誇銜命接客必盡一時之選銜命奉使者也接客主客也無才地者不得與焉與讀曰預毎梁使至鄴使疏吏翻下同鄴下為之傾動貴勝子弟盛飾聚觀禮贈優渥館門成市宴日髙澄常使左右覘之一言制勝澄為之拊掌魏使至建康亦然兩國通使各務夸矜以見所長自古然矣昭奚恤之事猶可以服覘國者之心為於偽翻覘丑㢘翻又丑艶翻獨孤信求還北上許之信父母皆在山東魏孝武西遷信棄父母追從之上問信所適信曰事君者不敢顧私親而懐貳心上以為義禮送甚厚信與楊忠皆至長安上書謝罪魏以信有定三荆之功定三荆見上卷中大通六年遷驃騎大將軍加侍中開府儀同三司餘官爵如故驃匹妙翻騎奇寄翻丞相泰愛楊忠之勇留置帳下魏宇文深勸丞相泰取恒農八月丁丑泰帥李弼等十二將伐東魏以北雍州刺史于謹為前鋒攻盤豆㧞之恒戸登翻帥讀曰率將即亮翻雍於用翻五代志雍州華原縣後魏置北雍州恒農湖城閿鄉之西有皇天原原西有盤豆城戊子至恒農庚寅㧞之擒東魏陜州刺史李徽伯魏收志太和十一年置陜州治陜城帶恒農郡領西恒農澠池石城河北郡陜式冉翻俘其戰士八千時河北諸城多附東魏左丞楊檦自言父猛嘗為邵郡白水令左丞行臺左丞也魏收志皇興四年置邵郡治白水縣五代志絳郡垣縣後魏置邵郡及白水縣裴慶孫傳邵郡治陽胡城去軹闗二百餘里孔穎達曰垣縣有召亭因以名郡宋白曰絳州垣縣其地即周召分陜之所今縣東六十里有邵原祠廟與古棠樹春秋襄二十二年齊侯魏伐晉取朝歌入孟門登太行張武軍於熒庭戍鄲邵後獻文四年置邵州檦與標同知其豪傑請往説之以取邵郡説式芮翻下諜説同泰許之檦乃與土豪王覆憐等舉兵收邵郡守程保及縣令四人斬之表覆憐為郡守守式又翻遣諜説諭東魏城堡旬月之間歸附甚衆諜達協翻東魏以東雍州刺史司馬恭鎮正平正平本漢晉之臨汾縣地魏真君七年分置太平縣神䴥元年改為正平太和十八年置正平郡帶間喜縣屬東雍州杜佑曰絳州治正平縣司空從事中郎聞喜裴邃欲攻之恭葉城走泰以楊檦行正平郡事上脩長干寺阿育王塔出佛爪髪舍利辛卯上幸寺設無礙食今建康府上原縣有長干里去縣五里李白長干行所謂同居長干里乃秣陵縣東里巷江東謂山隴之間曰干僧家載國事曰佛泥湼後天人以新白緤裏佛以香花供養滿七日盛以金棺送出王宫可三里許在宫各以旃檀木為薪天人各以火燒薪歛舍利得八斛四斗諸國王各得少許齎還本國以造佛寺阿肓王起浮圖於佛泥湼處李延夀扶南傳曰長干寺塔吳時有尼居其地為小精舍孫綝毀除之吳平後諸道人復於舊處建立晉簡文咸安中造塔孝武太原九年上金相輪及承露其後有西河離石縣胡人劉蕯何遇疾暴亡七日而蘇因此出家名慧達遊行至丹陽長干里有阿育王塔掘入一丈得金函盛三舍利及佛爪髪遷舍利近北對簡文所造塔西造塔及帝開之初穿土四尺得龍窟及昔人所捨金銀釵釧鐶鑷等諸雜寶物可深九尺許至石磉之下有石函函内有鐵壺以盛銀坩坩内有金縷甖盛三舍利如粟粒大圓正光潔函内有瑠璃盌盌心得四舍利及髪爪爪有四枚竝為沈香色髪青紺色衆僧以手伸之隨手長短放之則旋屈為蠡形帝乃設無礙大㑹豎二利各以金甖次玊甖重盛舍利及爪髪内七寶塔内又以石函盛寶塔分入兩刹刹下大赦九月柔然為魏侵東魏三堆魏收志肆州永安郡平冦縣真君七年并三堆縣屬焉有三堆戍隋改平冦縣為崞縣屬雁門郡宋白曰嵐州静樂縣本漢汾陽縣地城内有堆阜三俗名三堆城為于偽翻丞相歡擊之柔然退走行臺郎中杜弼以文武在位多貪汙言於丞相歡請治之治直之翻歡曰弼来我語爾語牛倨翻天下貪汙習俗已乆今督將家屬多在闗西此指言可朱渾道元万俟普劉豐生等部曲也將即亮翻宇文黒獺常相招誘人情去留未定獺他達翻誘音酉江東復有吳翁蕭衍專事衣冠禮樂復扶又翻中原士大夫望之以為正朔所在我若急正綱紀不相假借恐督將盡歸黒獺士子悉奔蕭衍人物流散何以為國爾宜少待吾不忘之史言髙歡權時施宜以凝固其衆捨小過以成大功少詩沼翻歡將出兵拒魏杜弼請先除内賊歡問内賊為誰弼曰諸勲貴掠奪百姓者是也歡不應使軍士皆張弓注矢舉刀按矟夾道羅列命弼冒出其間弼戰慄流汗歡乃徐諭之曰矢雖注不射刀雖舉不擊矟雖按不刺矟色角翻射而亦翻刺七亦翻爾猶亡魂失膽諸勳人身犯鋒鏑百死一生雖或貪鄙所取者大豈可同之常人也弼乃頓首謝不及歡每號令軍士常令丞相屬代郡張華原宣㫖其語鮮卑則曰漢民是汝奴夫為汝耕婦為汝織輸汝粟帛令汝溫飽汝何為陵之其語華人則曰鮮卑是汝作客言汝傭作之客也語牛倨翻為于偽翻下同得汝一斛粟一匹絹為汝擊賊令汝安寧汝何為疾之史言髙歡雜用夷夏有撫御之術時鮮卑共輕華人唯憚髙敖曹歡號令將士常鮮卑語敖曹在列則為之華言敖曹返自上洛歡復以為軍司大都督統七十六都督復扶又翻以司空侯景為西道大行臺使景經畧闗西也與敖曹及行臺任祥御史中尉劉貴豫州刺史堯雄冀州刺史万俟洛同治兵於虎牢任音壬万莫北翻俟渠之翻治直之翻下同敖曹與北豫州刺史鄭嚴祖握槊魏太常中置豫州治虎牢後得汝南置豫州以虎牢為北豫州領廣武滎陽成臯郡握槊亦博塞之戲也劉禹錫觀博曰初主人執握槊之器寘於廡下曰主進者要約之既揖讓即次有博齒齒異乎古之齒其制用骨觚稜四均鏤以朱墨偶而合數取應日月視其轉止依以争道是制也行之乆矣莫詳所祖以其用必投擲以博投詔之又爾朱世隆與元世儁握槊忽聞局上詨然有聲一局子盡倒立世隆甚惡之既而及禍李延夀曰握槊此盖胡戲近入中國云胡王有弟一人遇罪將殺之從獄中為此戲上之意言孤則易死也貴召嚴祖敖曹不時遣枷其使者使者曰枷則易脱則難枷居牙翻易弋豉翻敖曹以刀就枷刎之曰又何難貴不敢校明日貴與敖曹坐外白治河役夫多溺死溺奴狄翻貴曰一錢漢言漢人之賤也隨之死敖曹怒㧞刀斫貴貴走出還營敖曹鳴鼓㑹兵欲攻之侯景万俟洛共解諭乆之乃止敖曹嘗詣相府門者不納敖曹引弓射之射而亦翻歡知而不責閏月甲子以武陵王紀為都督益梁等十三州諸軍事益州刺史為後紀與湘東爭國張本東魏丞相歡將兵二十萬自壺口趣蒲津班志壺口山在河東郡北屈縣東南北屈後魏改為禽昌縣屬平陽郡隋改禽昌為襄陵縣將即亮翻下同趣七喻翻使髙敖曹將兵三萬出河南時闗中饑魏丞相泰所將將士不滿萬人館穀於恒農五十餘日聞歡將濟河乃引兵入闗髙敖曹遂圍恒農恒戸登翻歡右長史薛琡言於歡曰琡齒肓翻西賊連年饑饉故冒死来入陜州欲取倉粟今敖曹已圍陜城粟不得出陜式冉翻但置兵諸道勿與野戰比及麥秋比必利翻記月令孟夏之月麥秋至其民自應餓死寶炬黑獺何憂不降降戸江翻願勿度河侯景曰今茲舉兵形勢極大萬一不捷猝難收歛不如分為二軍相繼而進前軍若勝後軍全力前軍若敗後軍承之歡不從自蒲津濟河帝考異曰北齊帝紀十一月壬辰神武自蒲津濟魏紀十月壬辰敗於沙苑按長厯十月壬辰朔北齊紀誤也丞相泰遣使戒華州刺史王羆羆語使者曰老羆當道臥貉子那得過歡至馮翊城下使疏吏翻華戸化翻語牛倨翻五代志馮翊郡後魏曰華州西魏後改曰同州馮翊縣後魏曰華隂貉曷各翻北方有之似狐善睡康曰貉莫白切説文云北方豸種也鄭𤣥曰貉子曰貆郭璞曰今江東通呼貉為􅀈􅀈余按北方豸種乃指夷貉之貉孟子所謂大貉小貉者也此乃狐貉之貉當從諸家之説謂羆曰何不早降降戸江翻羆大呼曰呼火故翻此城是王羆冢死生在此欲死者来歡知不可攻乃涉洛軍於許原西漢志馮翊懐徳縣南有荆山山下有彊梁原洛水東南入渭許原蓋在洛水之南泰至渭南徴諸州兵皆未㑹欲進擊歡諸將以衆寡不敵請待歡更西以觀其勢泰曰歡若至長安則人情大擾今及其逺来新至可擊也即造浮橋於渭令軍士齎三日糧輕騎度渭輜重自渭南夾渭而西重直用翻冬十月壬辰泰至沙苑水經注沙苑在渭北沙苑之南即漢懐徳縣故城五代志馮翊縣有沙苑距東魏軍六十里諸將皆懼宇文深獨賀泰問其故對曰歡鎮撫河北甚得衆心以此自守未易可圖易弋豉翻今懸師渡河非衆所欲獨歡恥失竇泰愎諫而来所謂忿兵愎弼力翻戾也漢魏相曰爭恨細故不忍憤怒者謂之忿兵兵忿者敗可一戰擒也事理昭然何為不賀願假深一節發王羆之兵邀其走路使無遺類泰遣須昌縣公達奚武覘歡軍覘丑亷翻又丑艶翻武從三騎皆效歡將士衣服日暮去營數百步下馬潛聽得其軍號因上馬歴營若警夜者有不如法往往撻之具知敵之情狀而還還從宣翻又如字歡聞泰至癸巳引兵㑹之候騎告歡軍且至泰召諸將謀之開府儀同三司李弼曰彼衆我寡不可平地置陳此東十里有渭曲可先據以待之泰從之背水東西為陳陳讀曰陣下陷陳魏陳同李弼為右拒趙貴為左拒杜預曰拒方陳陸德明曰拒俱甫翻命將士皆偃戈於葦中約聞鼓聲而起晡時東魏兵至渭曲晡奔謨翻都督太安斛律𦍑舉曰黑獺舉國而来欲一死决言欲盡死力戰之以决勝負譬如猘狗或能噬人猘漢書音義征例翻又居例翻狂犬也左𫝊曰國犬之瘈無不噬也且渭曲葦深土濘無所用力濘乃定翻泥淖也不如緩與相持宻分精鋭徑掩長安巢穴既傾則黑獺不戰成擒矣使斛律𦍑舉之計行西魏殆哉歡曰縱火焚之何如侯景曰當生擒黑獺以示百姓若衆中燒死誰復信之侯景此言固亦有恃衆輕敵之心復扶又翻下復戰可復同彭樂盛氣請鬭曰我衆賊寡百人擒一何憂不克歡從之東魏兵望見魏兵少爭進擊之無復行列史言東魏將士皆恃衆輕敵故敗少詩沼翻復扶又翻行户剛翻兵將交丞相泰鳴鼓士皆奮起于謹等六軍與之合戰李弼帥鐵騎横擊之時東魏之師萃於左拒于謹等與之合戰李弼引右拒之騎兵横擊之帥讀曰率東魏兵中絶為二遂大破之李弼弟檦身小而勇檦與標同每躍馬陷陳隱身鞍甲之中敵見皆曰避此小兒泰歎曰膽决如此何必八尺之軀征虜將軍武川耿令貴殺傷多甲裳盡赤左傳晉楚戰于邲屈蕩搏趙旃得其甲裳杜預注曰下曰裳泰曰觀其甲裳足知令貴之勇何必數級謂不必數其斬獲首級之多少彭樂乗醉深入魏陳魏人刺之刺七亦翻腸出内之復戰丞相歡欲收兵更戰使張華原以簿歴營㸃兵簿者軍之名籍莫有應者還白歡曰衆盡去營皆空矣歡猶未肯去阜城侯斛律金曰衆心離散不可復用宜急向河東歡據鞍未動金以鞭拂馬乃馳去夜度河船去岸逺歡跨槖駝就船乃得度喪甲士八萬人喪息浪翻棄鎧仗十有八萬鎧可亥翻丞相泰追歡至河上選留甲士二萬餘人餘悉縱歸都督李穆曰髙歡破膽矣速追之可獲泰不聽沙苑之戰宇文泰不敢乘勝追髙歡邙山之戰歡不敢乘勝追泰蓋二人者智力相敵足以相持而不足以相斃也還軍渭南所徴之兵甫至甫方也乃於戰所人植桞一株以旌武功侯景言於歡曰黒獺新勝而驕必不為備願得精騎二萬徑往取之歡以告婁妃妃曰設如其言景豈有還理得黑獺而失景何利之有歡乃止魏加丞相泰柱國大將軍李弼十二將皆進爵增邑有差十二將李弼獨孤信梁禦趙貴于謹古干惠怡峯劉亮王徳侯莫陳崇李逺奚達武也髙敖曹聞歡敗釋恒農退保洛陽己酉魏行臺宫景夀等向洛陽宫姓也左傳虞大夫有宫之奇東魏洛州大都督韓賢擊走之州民韓木蘭作亂賢擊破之一賊匿尸間賢自按檢收鎧仗賊欻起斫之斷脛而卒欻許勿翻斷丁管翻下兵斷同脛胡定翻魏復遣行臺馮翊王季海與獨孤信將步騎二萬趣洛陽復扶又翻趣七喻翻下同洛州刺史李顯趣三荆西魏洛州治上洛賀㧞勝李弼圍蒲坂東魏丞相歡之西伐也蒲坂民敬珍謂其從祖兄祥曰髙歡迫逐乗輿乗繩證翻天下忠義之士皆欲剚刃於其腹從才用翻剚側吏翻賈公彦曰剚猶立也東齊人謂立物地中為剚今又稱兵西上上時掌翻吾欲與兄起兵斷其歸路此千載一時也斷丁管翻祥從之糾合鄉里數日有衆萬餘㑹歡自沙苑敗歸祥珍帥衆邀之斬獲甚衆賀㧞勝李弼至河東祥珍帥猗氏等六縣十餘萬戸歸之猗氏縣自漢以来屬河東郡丁度曰猗氏本郇國也後以猗頓居於此因為猗氏按左傳所謂郇瑕氏之地沃而近盬其後猗頓居之用盬鹽起富遂以猗氏名縣而郇瑕氏隱矣帥讀曰率丞相泰以珍為平陽太守祥為行臺郎中東魏秦州刺史薛崇禮守蒲坂蒲坂縣名注見周赧王十二年别駕薛善崇禮之族弟也言於崇禮曰髙歡有逐君之罪善與兄忝衣冠緒餘世荷國恩今大軍已臨而猶為髙氏固守荷下可翻為于偽翻一旦城陷函首送長安署為逆賊死有餘愧及今歸款猶為愈也崇禮猶豫不決善與族人斬闗納魏師崇禮出走追獲之丞相泰進軍蒲坂畧定汾絳五代志文城郡東魏置南汾州後周改為汾州絳郡後魏置東雍州後周改為絳州凡薛氏預開城之謀者皆賜五等爵善曰背逆歸順背蒲妹翻臣子常節豈容闔門大小俱叨封邑與其弟慎固辭不受東魏行晉州事封祖業棄城走儀同三司薛脩義追至洪洞杜佑曰洪洞故城在平陽北四固重􅃨控據要險劉昫曰晉州洪洞縣古陽縣也隋義寧元年改曰洪洞取縣北洪洞嶺以名縣孫恒曰洞音同又徒弄翻説祖業還守説式芮翻守手又翻下固守同祖業不從脩義還據晉州安集固守魏儀同三司長孫子彦引兵至城下脩義開門伏甲以待之子彦不測虛實遂退走丞相歡以脩義為晉州刺史史言河東諸薛各行其志為東西魏宣力獨孤信至新安新安縣漢屬𢎞農郡晉屬河南尹魏天平初置新安郡屬洛州髙敖曹引兵北度河信逼洛陽洛州刺史廣陽王湛棄城歸鄴信遂據金墉城孝武之西遷也西遷見上卷中大通六年散騎常侍河東裴寛謂諸弟曰天子既西吾不可以東附髙氏帥家屬逃於大石嶺水經注洛陽之南有新城縣縣界有大石嶺未儒之水逕其南獨孤信入洛乃出見之時洛陽荒廢人士流散惟河東栁虯在陽城陽城縣漢屬潁川郡晉屬河南尹魏孝昌二年置陽城郡屬洛州隋廢郡為陽城縣唐登封元年將有事嵩山改為告成縣我宋朝屬西京登封縣界裴諏之在潁川信俱徴之以虯為行臺郎中諏之為開府屬諏將侯翻又逡須翻東魏潁州長史賀若統執刺史田迄舉城降魏魏收志天平初置潁州治長社城領許昌潁州陽翟郡武定七年改為鄭州賀若復姓魏書官氏志内入諸姓有賀若氏北俗謂忠貞為賀若因以為氏若人者翻魏都督梁迴入據其城前通直散騎侍郎鄭偉起兵陳留攻東魏梁州執其刺史鹿永吉魏收志天平初置梁州治大梁城領陽夏開封陳留汝南潁川汝陽義陽新蔡初安襄陽城陽廣陵郡鹿姓也風俗通漢有巴郡太守鹿旗魏收官氏志阿鹿桓氏後改為鹿氏前大司馬從事中郎崔彦穆攻滎陽執其太守蘇淑與廣州長史劉志皆降於魏降戸江翻偉先䕶之子也鄭先䕶見一百五十二卷大通二年丞相泰以偉為北徐州刺史彦穆為滎陽太守十一月東魏行臺任祥帥督將堯雄趙育是云寶攻潁川帥讀曰率將即亮翻丞相泰使大都督宇文貴樂陵公遼西怡峯怡姓峯名峯遼西怡寛之子將步騎二千救之軍至陽翟陽翟縣漢屬潁川郡晉屬河南尹後魏置陽翟郡九域志陽翟在長社西北九十里雄等軍已去潁川三十里言雄等軍逼潁川相去三十里祥帥衆四萬繼其後諸將咸以為彼衆我寡不可爭鋒貴曰雄等謂吾兵少必不敢進少詩沼翻彼與任祥合兵攻潁川城必危矣若賀若統陷沒吾輩坐此何為今進據潁川有城可守又出其不意破之必矣遂疾趨據潁川背城為陳以待背蒲妹翻陳讀曰陣雄等至合戰大破之雄走趙育請降降戸江翻下同俘其士卒萬餘人悉縱遣之任祥聞雄敗不敢進貴與怡峯乘勝逼之祥退保宛陵宛陵縣漢屬河南尹晉屬滎陽郡魏天平初分屬廣武郡隋開皇十六年并宛陵縣入新鄭貴追及擊之祥軍大敗是云寶殺其陽州刺史那椿以州降魏魏收志天平初置陽州治宜陽領宜陽金門郡那椿人姓名魏以貴為開府儀同三司是云寶趙育為車騎大將軍都督杜陵韋孝寛攻東魏豫州㧞之執其行臺馮邕孝寛名叔裕以字行丙子東魏以驃騎大將軍儀同三司万俟普為太尉司農張樂臯等聘於東魏司農之下恐有脱宇十二月魏行臺楊白駒與東魏陽州刺史段粲戰於蓼塢水經注蓼水出河北縣襄山蓼谷當時之人於此谷築塢因謂之蓼塢漢書音義曰襄山在潼闗北十餘里魏師敗績魏荆州刺史郭鸞攻東魏東荆州刺史清都慕容儼東魏都鄴以魏郡為清都尹儼晝夜拒戰二百餘日乗間出擊鸞大破之間古莧翻時河南諸州多失守唯東荆獲全河間邢磨納范陽盧仲禮仲禮從弟仲裕等皆起兵海隅以應魏從才用翻東魏濟州刺史髙季式有部曲千餘人馬八百匹鎧仗皆備濟子禮翻鎧可亥翻濮陽民杜靈椿等為盜聚衆近萬人濮博木翻近其僅翻攻城剽野剽匹妙翻季式遣騎三百一戰擒之又擊陽平賊路文徒等悉平之於是逺近肅清或謂季式曰濮陽陽平乃畿内之郡二郡東魏皆以屬司州故云然不奉詔命又不侵境言無詔命使季式討賊而賊又不来侵濟州境何急而使私軍逺戰萬一失利豈不獲罪乎季式所自養部曲不衣食於官故謂之私軍季式曰君何言之不忠也我與國家同安共危豈有見賊而不討乎且賊知臺軍猝不能来又不疑外州有兵擊之乗其無備破之必矣以此獲罪吾亦無恨資治通鑑卷一百五十七
