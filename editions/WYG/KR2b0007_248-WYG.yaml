body:
  text: 資治通鑑卷二百四十八宋司馬光撰胡三省音註唐紀六十四起閼逢困敦閏月盡屠維大荒落凡五年有竒武宗至道昭肅孝皇帝下㑹昌四年閏月壬戌以中書侍郎同平章事李紳同平章事充淮南節度使李徳裕奏鎮州奏事官髙迪方鎮遣牙職入奏事因謂之奏事官密陳意見二事其一以為賊中好為偷兵術好呼到翻潛抽諸處兵聚於一處官軍多就廹逐以致失利經一兩月又偷兵詣它處官軍須知此情自非來攻城柵慎勿與戰彼淹留不過三日須散歸舊屯如此數四空歸自然喪氣喪息浪翻官軍密遣諜者詗其抽兵之處乗虛襲之無不捷矣詗翾正翻又火迥翻其二鎮魏屯兵雖多終不能分賊勢何則下營不離故處離力智翻每兩三月一深入燒掠而去賊但固守城柵城外百姓賊亦不惜宜令進營據其要害以漸逼之若止如今日賊中殊不以為懼望詔諸將各使知之劉稹腹心將髙文端降言賊中乏食令婦人挼穗舂之以給軍挼奴禾翻兩手相切摩也徳裕訪文端破賊之䇿文端以為官軍今直攻澤州恐多殺士卒城未易得易以豉翻澤州兵約萬五千人賊常分兵大半潛伏山谷伺官軍攻城疲弊則四集救之官軍必失利伺相吏翻今請令陳許軍過乾河立寨乾音干自寨城連延築為夾城環繞澤州環音宦日遣大軍布陳於外以扞救兵陳讀曰陣賊見圍城將合必出大戰待其敗北然後乗勢可取徳裕奏請詔示王宰文端又言固鎮寨四崖懸絶勢不可攻九域志磁州武安縣有固鎮鎮武安西北至遼州三百餘里然寨中無水皆飲澗水在寨東約一里許宜令王逢進兵逼之絶其水道不過三日賊必棄寨遁去官軍即可追躡前十五里至青龍寨亦四崖懸絶水在寨外可以前法取也其東十五里則沁州城沁州治沁源縣漢上黨穀逺縣地沁七鴆翻徳裕奏請詔示王逢文端又言都頭王釗將萬兵戍洺州劉稹既族薛茂卿又誅邢洺救援兵馬使談朝義兄弟三人釗自是疑懼稹遣使召之釗不肯入士卒皆譁譟釗必不為稹用但釗及士卒家屬皆在潞州又士卒恐己降為官軍所殺招之必不肯來惟有諭意於釗使引兵入潞州取稹事成之日許除别道節度使仍厚有賜與庶幾肯從幾居依翻徳裕奏請詔何𢎞敬潛遣人諭以此意劉稹年少懦弱少詩照翻押牙王協宅内兵馬使李士貴用事專聚貨財府庫充溢而將士有功無賞由是人心離怨劉從諫妻裴氏冕之支孫也裴冕相肅代兩朝憂稹將敗其弟問典兵在山東欲召之使掌軍政士貴恐問至奪已權且泄其姧狀乃曰山東之事仰成於五舅仰牛向翻裴問第五若召之是無三州也乃止三州邢洺磁王協薦王釗為洺州都知兵馬使釗得衆心而多不遵使府約束同列髙元武安玉言其有貳心稹召之釗辭以到洺州未立少功實所慙恨乞留數月然後詣府許之王協請稅商人每州遣軍將一人主之名為稅商實籍編户家貲編户猶言編民也將即亮翻至於什器無所遺皆估為絹匹十分取其二率髙其估民竭浮財及糗糧輸之不能充皆忷忷不安民財非地著轉易以致利者為浮財糗去乆翻忷許拱翻軍將劉溪尤貪殘劉從諌棄不用溪厚賂王協協以邢州富商最多命溪主之裴問所將兵號夜飛多富商子弟溪至悉拘其父兄軍士訴於問問為之請為于偽翻溪不許以不遜語答之問怒密與麾下謀殺溪歸國并告刺史崔嘏嘏從之丙子嘏問閉城斬城中大將四人請降於王元逵時髙元武在党山聞之亦降党山恐當作堯山先是使府賜洺州軍士布人一端尋有帖以折冬賜先悉薦翻以前所賜布折充冬賜折之舌翻㑹稅商軍將至洺州王釗因人不安謂軍士曰留後年少少詩照翻政非已出今倉庫充實足支十年豈可不少散之少詩沼翻以慰勞苦之士使帖不可用也乃擅開倉庫給士卒人絹一匹榖十二石士卒大喜釗遂閉城請降於何𢎞敬安玉在磁州聞二州降亦降於𢎞敬堯山都知兵馬使魏元談等降於王元逵元逵以其乆不下皆殺之八月辛夘鎮魏奏邢洺磁三州降宰相入賀李徳裕曰昭義根本盡在山東三州降則上黨不日有變矣上曰郭誼必梟劉稹以自贖徳裕曰誠如聖料上曰於今所宜先處者何事處昌呂翻徳裕請以盧𢎞止為三州留後作考異曰舊紀傳皆𢎞正實錄新紀傳皆作𢎞止今從之曰萬一鎮魏請占三州占之贍翻朝廷難於可否上從之詔山南東道兼昭義節度使盧鈞乗驛赴鎮潞人聞三州降大懼郭誼王協謀殺劉稹以自贖稹再從兄中軍使匡周兼押牙再從兄同曽祖從才用翻誼患之言於稹曰十三郎在牙院劉匡周第十三牙院押牙治事之所諸將皆莫敢言事恐為十三郎所疑而獲罪以此失山東今誠得十三郎不入則諸將始敢盡言采於衆人必獲長䇿稹召匡周諭之使稱疾不入匡周怒曰我在院中故諸將不敢有異圖我出院家必滅矣稹固請之匡周不得已彈指而出誼令稹所親董可武說稹曰說式芮翻山東之叛事由五舅城中人人誰敢相保留後今欲何如五舅謂裴問劉稹自為留後故稱之稹曰今城中尚有五萬人且當閉門堅守耳可武曰非良䇿也留後不若束身歸朝如張元益元益事見二百四十六卷文宗開成三年不失作刺史且以郭誼為留後俟得節之日徐奉太夫人及室家金帛歸之東都不亦善乎太夫人謂從諫妻裴氏稹曰誼安肯如是可武曰可武已與之重誓必不負也乃引誼入稹與之密約既定乃白其母母曰歸朝誠為佳事但恨已晩吾有弟不能保謂裴問以邢州降也安能保郭誼汝自圖之稹乃素服出門以母命署誼都知兵馬使王協已戒諸將列於外㕔誼拜謝稹己巳猶畢也出見諸將稹治裝於内㕔治直之翻李士貴聞之帥後院兵數千攻誼帥讀曰率誼叱之曰何不自取賞物乃欲與李士貴同死乎軍士乃退共殺士貴誼易置將吏部署軍士一夕俱定明日使董可武入謁稹曰請議公事稹曰何不言之可武曰恐驚太夫人乃引稹步出牙門至北宅北宅昭義節度使别宅也在使宅之北故曰北宅置酒作樂酒酣乃言今日之事欲全太尉一家劉悟贈太尉須留後自圖去就則朝廷必垂矜閔稹曰如所言稹之心也可武遂前執其手崔𤣥度自後斬之因收稹宗族匡周以下至襁褓中子皆殺之襁舉兩翻褓音保穆宗長慶初劉悟始帥昭義三世二十六年而滅又殺劉從諫父子所厚善者張谷陳揚庭李仲京郭台王羽韓茂章茂實王渥賈庠等凡十二家并其子姪甥壻無遺仲京訓之兄台行餘之子羽涯之從孫茂章茂實約之子渥璠之子庠餗之子也甘露之亂仲京等亡歸從諫從諫撫養之李仲京等僅脫甘露之禍卒與劉從諫之族俱屠蓋天聚而殱之也凡軍中有小嫌者誼日有所誅流血成泥乃函稹首遣使奉表及書降於王宰首過澤州劉公直舉營慟哭亦降於宰乙未宰以狀聞丙申宰相入賀李徳裕奏今不須復置邢洺磁留後復扶又翻下同但遣盧𢎞止宣慰三州及成徳魏博兩道上曰郭誼宜如何處之徳裕曰劉稹騃孺子耳處昌呂翻騃五駭翻癡也阻兵拒命皆誼為之謀主及勢孤力屈又賣稹以求賞此而不誅何以懲惡宜及諸軍在境并誼等誅之上曰朕意亦以為然乃詔石雄將七千人入潞州以應謡言謡言見上卷三年杜悰以饋運不給謂誼等可赦上熟視不應徳裕曰今春澤潞未平太原復擾自非聖斷堅定斷丁亂翻二寇何由可平外議以為若在先朝赦之乆矣上曰卿不知文宗心地不與卿合安能議乎罷盧鈞山南東道專為昭義節度使戊戌劉稹傳首至京師詔昭義五州給復一年復方目翻除其賦役也軍行所過州縣免今年秋稅昭義自劉從諫以來横増賦歛横户孟翻歛力贍翻悉從蠲免所籍土團並縱遣歸農諸道將士有功者等級加賞郭誼既殺劉稹日望旌節既乆不聞問乃曰必移他鎮於是閱鞍馬治行裝治直之翻及聞石雄將至懼失色雄至誼等參賀畢敕使張仲清曰郭都知告身來日當至郭誼為昭義都知兵馬使故稱之諸髙班告身在此晩牙來受之諸髙班謂諸將凡方鎮及州縣率早晩兩牙將校吏卒皆集乃以河中兵環毬場河中兵石雄所統入潞州者環讀如宦晩牙誼等至唱名引入凡諸將桀􅃛拒官軍者􅃛下八翻悉執送京師加何𢎞敬同平章事丁未詔𤼵劉從諫尸暴於潞州市三日石雄取其尸置毬場斬剉之戊申加李徳裕太尉趙國公徳裕固辭上曰恨無官賞卿耳卿若不應得朕必不與卿初李徳裕以韓全義以來徳宗遣韓全義討呉少誠敗于溵水將帥出征屢敗其弊有三一者詔令下軍前日有三四下户嫁翻宰相多不與聞二者監軍各以意見指揮軍事將帥不得專進退三者毎軍各有宦者為監使悉選軍中驍勇數百為牙隊其在陣戰鬭者皆怯弱之士每戰監使自有信旗信旗者别為一旗軍中視之以為進退監古銜翻使疏吏翻乗髙立馬以牙隊自衛視軍勢小却輒引旗先走陳從而潰陳讀曰陣徳裕乃與樞密使楊欽義劉行深議約敕監軍不得預軍政每兵千人聽監使取十人自衛有功隨例霑賞二樞密皆以為然白上行之自禦回鶻至澤潞罷兵皆守此制自非中書進詔意更無它詔自中出者號令既簡將帥得以施其謀略故所向有功史因李徳裕之事而敘之以見唐中世之所以敗武宗之所以勝自用兵以來河北三鎮每遣使者至京師李徳裕常面諭之曰河朔兵力雖彊不能自立須藉朝廷官爵威命以安軍情歸語汝使語牛倨翻使疏吏翻與其使大將邀宣慰敕使以求官爵何如自奮忠義立功立事結知明主使恩出朝廷不亦榮乎且以耳目所及者言之李載義在幽州為國家盡忠平滄景為于偽翻及為軍中所逐不失作節度使後鎮太原位至宰相楊志誠遣大將遮敕使馬求官及為軍中所逐朝廷竟不赦其罪事並見前紀此二人禍福足以觀矣徳裕復以其言白上復扶又翻上曰要當如此明告之由是三鎮不敢有異志九月詔以澤州𨽻河陽節度用李徳裕三年之議也丁巳盧鈞入潞州鈞素寛厚愛人劉稹未平鈞已領昭義節度事見上卷三年襄州士卒在行營者與潞人戰常對陳揚鈞之美陳讀曰陣及赴鎮入天井闗昭義散卒歸之者鈞皆厚撫之人情大洽昭義遂安劉稹將郭誼王協劉公直安全慶李道徳李佐堯劉武徳董可武等至京師皆斬之臣光曰董重質之在淮西事見憲宗紀郭誼之在昭義呉元濟劉稹如木偶人在伎兒之手耳伎渠綺翻彼二人始則勸人為亂終則賣主規利其死固有餘罪然憲宗用之於前武宗誅之於後臣愚以為皆失之何則賞姦非義也殺降非信也失義與信何以為國昔漢光武待王郎劉盆子止於不死知其非力竭則不降故也樊崇徐宣王元牛邯之徒豈非助亂之人乎而光武不殺事並見光武紀蓋以既受其降則不可復誅故也若既赦而復逃亡叛亂復扶又翻下司則其死固無辭矣如誼等免死流之逺方沒齒不還可矣殺之非也王羽賈庠等已為誼所殺李徳裕復下詔稱逆賊王涯賈餗等已就昭義誅其子孫宣告中外識者非之王涯賈餗非為逆也設以其附麗非人害于而家凶于而國罪亦不至於殄滅而無遺育李徳裕明底其罪若真假手于郭誼而致天誅者宜識者之非之也劉從諫妻裴氏亦賜死又令昭義降將李丕髙文端王釗等疏昭義將士與劉稹同惡者悉誅之死者甚衆盧鈞疑其枉濫奏請寛之不從昭義屬城有甞無禮於王元逵者元逵推求得二十餘人斬之餘衆懼復閉城自守戊辰李徳裕等奏寇孽既平盡為國家城鎮豈可令元逵窮兵攻討望遣中使賜城内將士敕招安之仍詔元逵引兵歸鎮并詔盧鈞自遣使安撫從之乙亥李徳裕等請上尊號且言自古帝王成大功必告天地又宣懿太后祔廟上初即位追諡母韋妃曰宣懿太后陛下未甞親謁上瞿然曰郊廟之禮誠宜亟行至於徽稱非所敢當凡五上表乃許之瞿紀具翻瞿然失其常度之貌徽美也稱昌孕翻李徳裕奏據幽州奏事官言詗知回鶻上下離心詗火迥翻又翾正翻可汗欲之安西其部落言親戚皆在唐不如歸唐又與室韋已相失計其不日來降或自相殘滅望遣識事中使欲遣識事宜者出使賜仲武詔諭以鎮魏已平昭義惟回鶻未滅仲武猶帶北面招討使宜早思立功李徳裕怨太子太傅東都留守牛僧孺湖州刺史李宗閔言於上曰劉從諫據上黨十年太和中入朝僧孺宗閔執政不留之加宰相縱去事見二百四十四卷文宗太和七年以成今日之患竭天下力乃能取之皆二人之罪也徳裕又使人於潞州求僧孺宗閔與從諫交通書疏無所得乃令孔目官鄭慶言從諫每得僧孺宗閔書疏皆自焚毁詔追慶下御史臺按問下遐稼翻中丞李回知雜鄭亞以為信然唐制御史臺侍御史六人以乆次者一人知雜事謂之雜端河南少尹呂述與徳裕書言稹破報至僧孺出聲歎恨此希徳裕意而誣僧孺也徳裕奏述書上大怒以僧孺為太子少保分司宗閔為漳州刺史戊子再貶僧孺汀州刺史宗閔漳州長史垂拱元年分福州西南境置漳州以南有漳水為名舊志京師東南七千三百里上幸鄠校獵鄠音户十一月復貶牛僧孺循州長史宗閔長流封州復扶又翻十二月以忠武節度使王宰為河東節度使河中節度使石雄為河陽節度使雄考異曰實錄九月盧鈞奏十七日石回軍赴孟州按雄于時未為河陽節度使實錄誤也上幸雲陽校獵五年春正月己酉朔羣臣上尊號曰仁聖文武章天成功神徳明道大孝皇帝尊號始無道字中㫖令加之是時帝崇信道士趙歸真等至親受道籙故㫖令羣臣於尊號中加道字而不知其所謂道者非吾之所謂道也庚戌上謁太廟辛亥祀昊天上帝赦天下築望仙臺於南郊庚申義安太后王氏崩太和五年宰相建白以太皇太后與寳厯太后稱號未辨前代詔令不敢斥言皆以宫為稱今寳厯太后居義安殿宜曰義安太后詔可以秘書監盧𢎞宣為義武節度使𢎞宣性寛厚而難犯為政簡易易以䜴翻其下便之河北之法軍中偶語者斬𢎞宣至除其法河北諸帥防其下相與聚謀以圖已故嚴軍中偶語之法以剛制之盧𢎞宣至中山乃除其法詔賜粟三十萬斛在飛狐西計運致之費踰於粟價𢎞宣遣吏守之㑹春旱𢎞宣命軍民隨意自往取之粟皆入境約秋稔償之時成徳魏博皆饑獨易定之境無害淮南節度使李紳按江都令呉湘盜用程糧錢新書百官志主客郎中主蕃客東南蕃使還者給入海程糧西北蕃使還者給度磧程糧至於官吏以公事有逺行則須計程以給糧而糧重不可逺致則以錢凖估故有程糧錢强娶所部百姓顔恱女估其資裝為􅂍罪當死湘武陵之兄子也呉武陵見二百三十九卷憲宗元和十年李徳裕素惡武陵惡烏路翻議者多言其寃諫官請覆按詔遣監察御史崔元藻李稠覆之還言湘盜程糧錢有實顔恱本衢州人甞為青州牙推妻亦士族與前獄異徳裕以為無與奪二月貶元藻端州司户稠汀州司户不復更推亦不付法司詳斷即如紳奏處湘死復扶又翻斷丁亂翻處昌呂翻為徳裕以呉湘獄致禍張本諫議大夫栁仲郢敬晦皆上疏爭之不納稠晉江人宋白曰泉州治晉江縣晉為晉安縣地隋廢郡為邑晦昕之弟也敬昕見上卷三年李徳裕以栁仲郢為京兆尹素與牛僧孺善謝徳裕曰不意太尉恩奬及此仰報厚徳敢不如竒章公門館徳裕不以為嫌隋封牛𢎞為竒章公牛僧孺蓋其後也故時人亦呼之為竒章公宋白曰竒章縣屬巴州本漢葭萌縣地梁置竒章縣取縣東八里竒章山為名夏四月壬寅以陜虢觀察使李拭為冊􅃛戛斯可汗使陜失冉翻五月壬戌葬恭僖皇后于光陵柏城之外義安太后諡曰恭僖后於穆宗非伉儷故陪葬光陵而不合門下侍郎同平章事杜悰罷為右僕射中書侍郎同平章事崔鉉罷為户部尚書乙丑以户部侍郎李回為中書侍郎同平章事判户部如故祠部奏括天下寺四千六百蘭若四萬僧尼二十六萬五百祠部掌僧尼故使括之若人者翻釋氏要覽曰蘭若者梵言阿蘭若唐言無諍也四方律云空靜處智度經云逺離處大悲經云離諸忿􅃛戛斯可汗為宗英雄武誠明可汗秋七月丙午朔日有食之上惡僧尼耗蠧天下欲去之惡烏路翻去羌吕翻道士趙歸真等復勸之復扶又翻乃先毁山野招提蘭若釋書云招提菩薩皆佛名故號寺或謂之招提増輝記曰招提者梵言拓鬬提奢唐言四方僧物後人傳寫之誤以拓為招又省去鬬奢二字只稱招提即今十方寺院是也薩波論云西天度地以四肘為一弓去村店五百弓不逺不近以閒靜為蘭若史炤曰今若以唐尺計之度二里許敕上都東都兩街各留二寺唐謂長安曰上都時左街留慈恩薦福右街留西明莊嚴每寺留僧三十人天下節度觀察使治所及同華商汝州各留一寺華户化翻分為三等上等留僧二十人中等留十人下等五人東考異曰實録中書門下奏請上都都兩街各留寺十所毎寺留僧十人大藩鎮各一所僧亦依前詔敕上都東都毎街各留寺兩所毎寺僧各留三十人中書門下奏奉敕諸道所留僧尼數宜令更商量分為三等上至二十人中至十人下至五人今據天下諸道共五十處四十六道合配三等鎮州魏博淮南西川山南東道荆南嶺南汴宋幽州東川鄂岳浙西浙東宣歙湖南江西河南府望毎道許留僧二十人山南西道河東鄭滑陳許潞磁鄆曹徐泗鳯翔兖海淄青滄景易定福建同華州望今毎道許留十人夏桂邕管黔中安南汝金商州容管望毎道許留五人一道河中已敕下留十三人按鎮州凡五十六州四十一道今云五十處四十六道誤也杜牧杭州南亭記曰武宗即位始去其山臺野邑四萬所冠其徒幾至十萬人後至㑹昌五年始命西京留佛寺四僧惟十人東都二寺天下所謂節度觀察同華汝三十四治所得留一寺僧凖西京數其他刺史州不得有寺凡除寺四千六百僧尼䈂冠二十六萬五百實録注又云按唐時石刻云兩都留寺僧各十人郡國留寺二僧各三人數皆不同今從實録前文餘僧及尼并大秦穆䕶祅僧皆勒歸俗大秦穆䕶又釋氏之外教如回鶻摩尼之類是時勑曰大秦穆䕶等祠釋教既已釐革邪法不可獨存其人並勒還俗遞歸本貫充稅户如外國人送逺處收管祅乎煙翻胡神也唐制祠部嵗再祀磧西諸州火祅而禁民祈祭官品令有祅正蓋主祅僧也寺非應留者立期令所在毁撤仍遣御史分道督之財貨田産並沒官寺材以葺公廨驛舍廨古隘翻銅像鐘磬以鑄錢以山南東道節度使鄭肅檢校右僕射同平章事詔𤼵昭義騎兵五百步兵千五百戍振武節度使盧鈞出至裴村餞之潞卒素驕憚於逺戍乗醉回旗入城閉門大譟鈞奔潞城以避之宋白曰潞城縣春秋潞子嬰兒之國漢為潞縣十三州志云潞水出焉後魏太武改為刈陵縣隋開皇十三年置潞城縣九域志潞城在潞州東北四十里監軍王惟直自出曉諭亂兵擊之傷旬日而卒李徳裕奏請詔河東節度使王宰以步騎一千守石㑹闗三千自儀州路據武安以斷邢洺之路斷音短又令河陽節度使石雄引兵守澤州河中節度使韋恭甫發步騎千人戍晉州如此賊必無能為分守四境使潞之亂卒不得越逸而奔他鎮皆從之八月李徳裕等奏東都九廟神主二十六今貯於太微宫小屋𤣥宗天寳二年改東都𤣥元皇帝廟曰太微宫劉昫曰東都太微宫本武后家廟神龍初中宗反正廢武氏廟主立太祖已下神主祔主安禄山陷洛陽以廟為馬廄棄其神主協律郎嚴郢收而藏之史思明再陷洛陽尋又散失賊平東都留守盧正已又募得之廟已焚毁乃寄主於太微宫貯丁呂翻請以廢寺材復修太廟壬午詔陳釋教之弊宣告中外凡天下所毁寺四千六百餘區歸俗僧尼二十六萬五百人大秦穆䕶祅僧二千餘人毁招提蘭若四萬餘區曰考異㑹要元和二年薛平奏請賜中條山蘭若額為大和寺蓋官賜額者為寺私造者為招提蘭若杜牧所謂山臺野邑是也收良田數千萬頃奴婢十五萬人所留僧皆𨽻主客不𨽻祠部時中書門下奏據大唐六典祠部掌天地宗廟大祭與僧事殊不相當又萬務根本合歸尚書省𨽻鴻臚寺亦未為允當又據六典主客掌朝貢之國七十餘蕃五天竺國並在數内釋氏出自天竺國今陛下以其非中國之教已有釐革僧尼名籍便令係主客不𨽻祠部及鴻臚寺至為允當從之百官奉表稱賀尋又詔東都止留僧二十人諸道留二十人者減其半留十人者減三人留五人者更不留五臺僧多亡奔幽州五臺在代州五臺縣山形五峙相傳以為文殊示現之地華嚴經疏云清涼山者即代州鴈門五臺山也以嵗積堅冰夏仍飛雪曽無炎暑故曰清涼五峯聳出頂無林木有如壘土之臺故曰五臺古傳云山在長安東北一千六百餘里代州之所管山頂至州城一百餘里其山左隣恒山右接天池南屬五臺縣北至繁畤縣環基所至五百餘里靈記云五臺山有四埵去臺各一百二十里據古經所載今北臺即是中臺中臺即是南臺大黄尖即是北臺栲栳山即是西臺漫天石即是東臺惟北臺中臺古時無異東臺西臺古今無别無恤臺恒山頂是也昔趙襄子名無恤曽登此山觀代國下瞰東海西瞢山有宫池古廟隋煬帝避暑於此而居因天池造立宫室龍樓鳯閣遍滿池邊號為西埵南繋舟山上有銅環船軸猶在昔帝堯遭水繋舟於此世傳文殊見于南臺號為南埵北有覆宿堆即夏屋山也後魏孝文皇帝避暑往復宿此下見雲州謂之北埵中臺稍近西北有太華泉有古寺二十餘處東臺去太華泉四十二里䑓上遥見滄瀛諸州日出時下視大海猶陂澤焉有古寺十五處西臺去太華泉四里危嶝千雲喬林拂日有古寺十二處南臺去太華泉八十里最為幽寂有古寺九處北臺去太華泉十二里有古寺八處唐末所添寺不在其數五臺縣本漢慮虒縣慮虒音驢夷隋大業二年改為五臺縣李徳裕召進奏官謂曰汝趣白本使趣讀曰促五臺僧為將必不如幽州將為卒必不如幽州卒何為虛取容納之名染於人口將即亮翻染如豔翻又而險翻獨不見近日劉從諫招聚無筭閒人竟有何益張仲武乃封二刀付居庸闗曰有游僧入境則斬之主客郎中韋博以為事不宜太過李徳裕惡之惡烏路翻出為靈武節度副使昭義亂兵奉都將李文矩為帥帥所類翻文矩不從亂兵亦不敢害文矩稍以禍福諭之亂兵漸聽命乃遣人謝盧鈞於潞城鈞還入上黨復遣之戍振武行一驛乃潛選兵追之明日及於太平驛唐制三十里一驛太平驛在潞州北六十里宋白曰太平驛東南距潞州八十里盡殺之臣考異曰獻替記上信任宰無不先訪問無獨斷之事唯誅討澤潞不肯捨赴振武官健及誅翦党項此二事並禁中𤼵詔處分更不顧問振武官健回旗不肯進𤼵先害監軍傔一人監軍王惟直自出曉諭又被傷痍旬日而卒禁中兩軍樞密已下恨其不殺節將唯害中人所以激上之怒盡須𠞰戮上問宰臣曰我送石雄領兵至澤潞令盧鈞不誅討罪人如何徳裕曰盧鈞已失律性又寛愞必恐自誅不得若便替却盧鈞亂卒罪惡轉大須興兵討伐恐不如先除替令新帥誅翦上謂徳裕曰勿惜盧鈞本非材將救澤潞叛兵疑李丕報嫌往劉稹平後處置澤潞與劉稹同惡僅五千餘人皆是取得髙文端王釗狀通姓名勘李丕狀同然後處分其間有三兩人或王釗狀無名並不更問足明是李丕不能逞其憾又云惟務茍安因循為政凡方鎮𤼵兵只合不出軍城嚴兵自衛於城門閱過部伍更令軍將慰安豈有自出送兵馬又令家口縱觀事同兒戲實不足惜緣大兵之後須有防虞臣不敢隠黙由是中詔處分不復顧問殺按盧鈞還入潞州諭戍兵使赴振武尋遣兵追擊盡之非上不肯捨也既云不可便替又云不如先除替語自相違上云勿惜盧鈞是上語下云臣不敢隠黙乃是徳裕語獻替記至此差舛尤甚不可復據又處置澤潞五千餘人太多必是五十字誤耳具以狀聞且請罷河東河陽兵在境上者從之九月詔修東都太廟如李徳裕所奏也李徳裕請置備邊庫令户部嵗入錢帛十二萬緡匹度支鹽鐡嵗入錢帛十三萬緡匹明年減其三之一凡諸道所進助軍財貨皆入焉以度支郎中判之王才人寵冠後庭冠古玩翻上欲立以為后李徳裕以才人寒族且無子恐不厭天下之望厭益涉翻伏也合也乃止上餌方士金丹性加躁急喜怒不常冬十月上問李徳裕以外事對曰陛下威斷不測斷丁亂翻外人頗驚懼曏者寇逆暴横横户孟翻固宜以威制之今天下既平願陛下以寛理之但使得罪者無怨為善者不驚則為寛矣以衡山道士劉𤣥靜為銀青光祿大夫崇𤣥館學士賜號廣成先生為之治崇𤣥館置吏鑄印唐有崇𤣥署令掌僧道屬宗正寺又有崇𤣥學博士掌教𤣥學生𤣥宗天寳二年改崇𤣥學曰崇𤣥館改博士曰學士為之于偽翻治直之翻𤣥靜固辭乞還山許之李徳裕秉政日乆好徇愛憎好呼到翻人多怨之自杜悰崔鉉罷相宦官左右言其太專上亦不恱給事中韋𢎞質上疏言宰相權重不應更領三司錢榖徳裕奏稱制置職業人主之柄𢎞質受人教導所謂賤人圖柄臣傳曰下輕其上爵賤臣圖柄臣則國家動揺而人不靜非所宜言十二月𢎞質坐貶官由是衆怒愈甚史言李徳裕以自專自用速禍上自秋冬以來覺有疾而道士以為換骨上祕其事外人但怪上希復遊獵復扶又翻下同宰相奏事者亦不敢乆留詔罷來年正旦朝㑹以有疾也吐蕃論恐熱復糾合諸部擊尚婢婢婢婢遣厖結藏將兵五千拒之恐熱大敗與數十騎遁去婢婢傳檄河湟數恐熱殘虐之罪數恐所具翻曰汝輩本唐人吐蕃無主則相與歸唐毋為恐熱所獵如狐兔也於是諸部從恐熱者稍稍引去是時天下户四百九十五萬五千一百五十一朝廷雖為党項置使帝以侍御史為使分三部招定党項以邠寧延屬崔彦曽鹽夏長凙屬李鄠靈武麟勝屬鄭賀党項侵盜不已攻陷邠寧鹽州界城堡屯叱利寨宰相請遣使宣慰上決意討之六年春二月庚辰以夏州節度使米暨為東北道招討党項使米姓出於西域康居枝庶分為米國後入中國子孫遂以為姓上疾乆未平以為漢火徳改洛為雒漢光武改洛陽為雒陽唐土徳不可以王氣勝君名三月下詔改名炎王于况翻唐以土徳王而帝名瀍瀍旁從水土勝水故言以王氣勝君名今改名炎炎從火火能生土取以君名生王氣也帝未幾而晏駕厭勝果何益哉上自正月乙夘不視朝記考異曰實錄作十五日按獻替自正月十三日後至三月二十日更不開延英時見中詔處分莫得預焉今從之宰相請見不許見賢遍翻中外憂懼初憲宗納李錡妾鄭氏生光王怡怡幼時宫中皆以為不慧太和以後益自韜匿羣居游處處昌呂翻未甞𤼵言文宗幸十六宅宴集好誘其言以為戲笑好呼到翻上性豪邁尤所不禮即考異曰韋昭度續皇王寳運錄曰宣宗憲皇第四子自憲皇崩便合紹位乃與姪文宗文宗崩武皇慮有他謀乃密令中常侍四人擒宣宗於永巷幽之數日沈於宫厠宦者仇公武愍之乃奏武宗曰前者王子不宜乆於宫厠誅之武宗曰唯唯仇公武取出於車中以糞土雜物覆之將别路歸家密養之三年後武皇宫車晏駕百官奉迎于玉宸殿立之尋擢仇公武為軍容使尉遲偓中朝故事曰敬宗文宗武宗相次即位宣皇皆叔父也武宗初登極深忌焉一日㑹鞠於禁苑間武宗召上遥覩瞬目於中官仇士良士良躍馬向前曰適有㫖王可下馬士良命中官輿出軍中奏云落馬已不救矣尋請為僧遊行江表間㑹昌末中人請還京遂即位令狐澄貞陵遺事曰上在藩時甞從駕迴而上誤墮馬人不之覺比二更方能興時天大雪四顧悄無人聲上寒甚㑹巡警者至大驚上曰我光王也不悟至此方困且渇若為我求水警者即於旁近得水以進遂委而去上良乆起舉甌將飲顧甌中水盡為芳醪矣上獨喜自負一舉盡甌已而體微煖有力遂步歸藩邸此三事皆鄙妄無稽今不取及上疾篤旬日不能言諸宦官密於禁中定䇿辛酉下詔稱皇子冲幼須選賢徳光王怡可立為皇太叔武考異曰舊紀三月一日止為皇太叔宗實錄云壬戌宣宗實錄云辛酉按獻替記云自正月十三日後至三月二十日更不聞延英蓋二十一日則宣宗見百寮也今從宣宗實錄更名忱更工衡翻忱時壬翻應軍國政事令權句當以武宗之英逹李徳裕之得君而不能定後嗣卒制命於宦豎北司掌兵且專宫禁之權也句古侯翻當丁浪翻下咸當同太叔見百官哀戚滿容裁决庶務咸當於理人始知有隠徳焉當丁浪翻甲子上崩年三十三以李徳裕攝冢宰丁夘宣宗即位宣宗素惡李徳裕之專惡烏路翻即位之日徳裕奉冊既罷謂左右曰適近我者非太尉邪毎顧我使我毛髮洒淅近其靳翻洒淅肅然之意言可畏憚也夏四月辛未朔上始聽政尊母鄭氏為皇太后壬申以門下侍郎同平章政事李徳裕同平章事充荆南節度使云考異曰實錄新表傳皆徳裕自守太尉檢校司徒今從舊紀又貞陵遺事曰上初即位於太極殿時宰相李徳裕與行冊禮及退上謂宦侍云云聽政之二日遂出為荆門舊徳裕傳曰五年武宗上尊號累表乞骸不許徳裕病月餘堅請解機務乃以本官平章事兼江陵尹荆南節度使數月追復知政事宣宗即位罷相出為東都留守按舊紀新表及諸書武宗朝徳裕未嘗罷免此年九月方自江陵除東都留守舊傳謬誤今從實錄徳裕秉權日乆位重有功衆不謂其遽罷聞之莫不驚駭甲戌貶工部尚書判鹽鐵轉運使薛元賞為忠州刺史弟京兆少尹權知府事元龜為崖州司户皆徳裕之黨也杖殺道士趙歸真等數人流羅浮山人軒轅集于嶺南五月乙巳赦天下上京兩街先聽留兩寺外更各増置八寺左街先留慈恩薦福今増置興唐保夀二寺寳應寺改為資聖寺青龍寺改為䕶國寺菩提寺改為保唐寺清禪寺改為安國寺尼寺二所法雲寺改為唐安寺崇敬寺改為唐昌寺右街先留西明寺改為福夀寺莊嚴寺改為聖夀寺添置僧寺一所千福寺尼寺一所興聖寺依舊名化度寺改為崇福寺永泰寺改為萬夀寺清國寺改為崇聖寺經行寺改為龍興寺奉恩寺改為興福寺尼寺一所萬善寺改為延唐寺考異曰杭州南亭記曰今天子即位天下州率與二寺用齒衰男女為其徒各止三十人兩京數倍其四五焉實録凖五日敕兩街先留寺兩所外更添八所注唐石刻云京師兩街各置十寺寺僧五十人蓋謂二年正月赦後非今赦也僧尼依前𨽻功徳使不𨽻主客唐初天下僧尼道士女官皆𨽻鴻臚寺武后延載元年以僧尼𨽻祠部開元二十四年道士女官𨽻宗正寺天寳二載以道士𨽻司封貞元四年崇𤣥館罷大學士後復置左右街大功徳使東都功徳使修功徳使總僧尼之籍及功役元和二年以道士女官𨽻左右街功徳使㑹昌二年以僧尼𨽻主客太清宫置𤣥元館亦有學士至六年廢而僧尼復𨽻兩街功徳使即是年也所度僧尼仍令祠部給牒改武宗之政也牒即今祠部所給僧道度牒也以翰林學士兵部侍郎白敏中同平章事辛酉立皇子温為鄆王渼為雍王渼音美涇為雅王滋為䕫王沂為慶王六月禮儀使奏請復代宗神主於太廟開成五年文宗升祔代宗神主以親盡祧遷今請復之以敬宗文宗武宗同為一代於廟東増置兩室為九代十一室從之秋七月壬寅淮南節度使李紳薨回鶻烏介可汗之衆稍稍降散及凍餒死所餘不及三千人國相逸隠啜殺烏介於金山烏介可汗自殺胡山之敗竄於黒車子族今為其下所殺立其弟特勒遏捻為可汗捻奴協翻八月壬申葬至道昭肅孝皇帝于端陵端陵在京兆三原縣東十里廟號武宗初武宗疾困顧王才人曰我死汝當如何對曰願從陛下於九泉武宗以巾授之武宗崩才人即縊武宗之問王才人之死懲楊妃之禍也上聞而矜之贈貴妃葬於端陵柏城之内考異曰蔡京王貴妃傳曰帝疾亟才人乆視帝而歸燕息處濃粧潔服如常日乃取所翫用物散與内家淨盡持帝所授巾至帝前已見升遐容易自縊而仆於御座下以縊為名而得卒舊紀武宗葬端陵徳妃王氏祔焉李徳裕獻替記自上臨御王妃有專房之寵至是以嬌妬忤㫖一夕而殞羣情無不驚懼以謂上功成之後喜怒不測徳裕因以進諫在五年十月與王貴妃傳不同恐獻替記誤康軿劇談録曰孟才人善歌有寵於武宗屬一旦聖體不豫召而問之曰我或不諱汝將何之對曰若陛下萬嵗之後無復生為是口令於御前歌河滿子一曲聲調悽咽聞者涕零及宫車晏駕哀慟數日而殞窆於端陵之側此事恐正是王才人傳聞不同以循州司馬牛僧孺為衡州長史封州流人李宗閔為郴州司馬恩州司馬崔珙為安州長史安州漢安陸縣地京師東南二千五十一里潮州刺史楊嗣復為江州刺史昭州刺史李珏為郴州刺史僧孺等五相皆武宗所貶逐楊嗣復貶見二百四十六卷元年三年崔珙罷相崔鉉代之奏珙妄費宋滑院鹽鐵錢九十萬緡又劾與劉從諫厚數䕶其姦貶澧州刺史再斥恩州司馬僧孺宗閔貶見上四年至是同日北遷宗閔未離封州而卒離力智翻九月以荆南節度使李徳裕為東都留守解平章事以中書侍郎同平章事鄭肅同平章事充荆南節度使以兵部侍郎判度支盧商為中書侍郎同平章事商翰之族孫也盧翰相徳宗於興元貞元之間冊􅃛戛斯可汗使者以國喪未行或以為僻逺小國不足與之抗衡回鶻未平不應遽有建置詔百官集議事遂寢蠻寇安南經畧使裴元裕帥鄰道兵討之帥讀曰率以右常侍李景讓為浙西觀察使右常侍右散騎常侍也初景讓母鄭氏性嚴明早寡家貧居於東都諸子皆幼母自教之宅後古牆因雨隤陷隤杜回翻下墜也得錢盈船奴婢喜走告母母往焚香祝之曰吾聞無勞而獲身之災也天必以先君餘慶矜其貧而賜之則願諸孤他日學問有成乃其志也此不敢取遽命掩而築之三子景讓景温景莊皆舉進士及第景讓官達髮已斑白小有過不免捶楚捶止橤翻景讓在浙西有左都押牙迕景讓意迕五故翻景讓杖之而斃軍中憤怒將為變母聞之景讓方視事母出坐聽事聽讀曰㕔立景讓於庭而責之曰天子付汝以方面國家刑法豈得以為汝喜怒之資妄殺無罪之人乎萬一致一方不寧豈惟上負朝廷使垂年之母銜羞入地垂末垂也垂年猶言末垂之年何以見汝之先人乎命左右褫其衣坐之褫丑豸翻將撻其背將佐皆為之請為于偽翻拜且泣乆乃釋之軍中由是遂安景莊老於場屋唐人謂貢院為場屋至今猶然每被黜母輒撻景讓然景讓終不肯屬主司屬之欲翻主司校文主司也禮部侍郎知貢舉者是也曰朝廷取士自有公道豈敢效人求闗節乎乆之宰相謂主司曰李景莊今嵗不可不收可憐彼翁每嵗受撻由是始及第冬十月禮院奏禘祭祝文於穆敬文武四室但稱嗣皇帝臣某昭告從之太常有禮院帝於穆宗弟也於敬文武叔也甲申上受三洞法籙於衡山道士劉𤣥靜既杖殺趙歸真而復受法籙所謂尤而效之㑹昌五年劉𤣥靜還衡山十二月戊辰朔日有食之宣宗元聖至明成武獻文睿智章仁神聰懿道大孝皇帝上諱怡即位改名忱憲宗第十三子按通鑑書唐諸帝號自𤣥宗以後皆以葬陵諡冊為正宣宗諡聖武獻文孝皇帝若元聖至明成武獻文睿智章仁神聰懿道大孝則咸通十三年追崇之號也大中元年春正月甲寅上祀圎丘赦天下改元二月加盧龍節度使張仲武同平章事賞其破回鶻也石雄獨非破回鶻者乎癸未上以旱故減膳徹樂出宫女縱鷹隼隼聳尹翻止營繕命中書侍郎同平章事盧商與御史中丞封敖疎理京城繫囚大理卿馬植奏稱盧商等務行寛宥凡抵極法一切免死彼官典犯贓及故殺人平日大赦所不免今因疎理而原之使貪吏無所懲畏死者衘寃無告恐非所以消旱災致和氣也昔周饑克殷而年豐左傳甯莊子之言為討邢𤼵也衛旱討邢而雨降是則誅罪戮姦式合天意雪寃决滯乃副聖心也乞再加裁定詔兩省五品以上議之兩省五品以上官自給事中中書舍人以上也初李徳裕執政引白敏中為翰林學士見二百四十六卷㑹昌二年及武宗崩徳裕失勢敏中乗上下之怒竭力排之使其黨李咸訟徳裕罪黨考異曰實錄白敏中令狐綯在㑹昌中徳裕不以朋疑之置之臺閣及徳裕失勢抵掌㦸手同謀斥逐而崔鉉亦以㑹昌末罷相怨徳裕大中初敏中復薦鉉在中書乃令其黨人李咸者訟徳裕輔政時隂事罷徳裕留守以太子少保分司東都按舊傳綯以大中二年自湖州刺史入知制誥鉉以三年自河中節度使入為相此時未也實録誤月今按通鑑所書令狐綯知制誥在是年六七之間湖州刺史有前字徳裕由是自東都留守以太子少保分司分司東都也左諫議大夫張鷺等上言陛下以旱理繫囚慮有寃滯今所原死罪無寃可雪恐凶險僥倖之徒常思水旱為災宜如馬植所奏詔從之皆論如法以植為刑部侍郎充鹽鐵轉運使植素以文學政事有名於時李徳裕不之重及白敏中秉政凡徳裕所薄者皆不次用之以盧商為武昌節度使以刑部尚書判度支崔元式為門下侍郎翰林學士户部侍郎韋琮為中書侍郎並同平章事閏月敕應㑹昌五年所廢寺有僧能營葺者聽自居之有司毋得禁止是時君相務反㑹昌之政相息亮翻故僧尼之弊皆復其舊觀通鑑所書則㑹昌大中之是非可見矣己酉積慶太后蕭氏崩蕭后文宗之母也武宗時徙居積慶殿故以稱之五月幽州節度使張仲武大破諸奚吐蕃論恐熱乗武宗之喪誘党項及回鶻餘衆寇河西誘音酉詔河東節度使王宰將代北諸軍擊之代北諸軍謂陘嶺以北諸軍也宰以沙陀朱邪赤心為前鋒自麟州濟河與恐熱戰於鹽州破走之六月以鴻臚卿李業為冊􅃛戛斯英武誠明可汗使上謂白敏中曰朕昔從憲宗之喪道遇風雨百官六宫四散避去惟山陵使長而多髯髯如占翻攀靈駕不去誰也對曰令狐楚上曰有子乎對曰長子緒今為隨州刺史上曰堪為相乎對曰緒少病風痺少詩照翻痺必至翻脚冷濕病也次子綯前湖州刺史有才器上即擢為考功郎中知制誥綯入謝上問以元和故事綯條對甚悉綯徒刀翻悉詳也上恱遂有大用之意為令狐綯抦用張本秋八月丙申以門下侍郎同平章事李回同平章事充西川節度使葬貞獻皇后於光陵之側積慶蕭后諡貞獻上敦睦兄弟作雍和殿於十六宅㑹要是年勅親親樓號雍和殿别造屋宇廊舍七百間宋白曰雍和殿在睦親院數臨幸置酒作樂擊毬盡歡數所角翻諸王有疾常親至臥内存問憂形於色突厥掠漕米及行商振武節度使史憲忠擊破之按考異曰突厥亡巳乆蓋猶有餘種在振武之北者余謂此突厥餘種保塞内屬者也九月丁夘以金吾大將軍鄭光為平盧節度使光潤州人太后之弟也乙酉前永寧尉呉汝納訟其弟湘罪不至死李紳與李徳裕相表裏欺罔武宗枉殺臣弟乞召江州司户崔元藻等對辨呉湘死見上卷武宗㑹昌五年丁亥敕御史臺鞠實以聞鞠實窮治其實也冬十二月庚戌御史臺奏據崔元藻所列呉湘寃狀如呉汝納之言戊午貶太子少保分司李徳裕為潮州司馬吏部奏㑹昌四年所減州縣官内復増三百八十三貟讀者至此以減者為是邪以於既減之後而復增者為是邪二年正月甲子羣臣上尊號曰聖敬文思和武光孝皇帝思相吏翻赦天下初李徳裕執政有薦丁柔立清直可任諫官者徳裕不能用上即位柔立為右補闕徳裕貶潮州柔立上疏訟其寃丙寅坐阿附貶南陽尉史言丁柔立有是非之心南陽縣漢南陽郡所治宛縣地也隋改為南陽縣唐屬鄧州九域志在州東北一百二十里西川節度使李回桂管觀察使鄭亞坐前不能直呉湘寃乙酉回左遷湖南觀察使亞貶循州刺史李紳追奪三任告身李紳已薨故追奪中書舎人崔嘏坐草李徳裕制不盡言其罪己丑貶端州刺史回鶻遏捻可汗仰給於奚王石舎朗仰牛向翻及張仲武大破奚衆見去年五月回鶻無所得食日益耗散至是所存貴人以下不滿五百人依於室韋使者入賀正此回鶻使者也過幽州張仲武使歸取遏捻等遏捻聞之夜與妻葛禄子特勒毒斯等九騎西走餘衆追之不及相與大哭室韋分回鶻餘衆為七七姓共分之室韋有嶺西部山北部黄頭部如者部婆萵部訥北部駱丹部凡七姓悉居栁城東北近者三千里逺者六千里而贏居二日􅃛戛斯遣其相阿播帥諸胡兵號七萬來取回鶻帥讀曰率大破室韋悉收回鶻餘衆歸磧北猶有數帳潛竄山林鈔盜諸胡鈔楚交翻其别部厖勒先在安西亦自稱可汗居甘州總磧西諸城種落微弱時入獻見見賢遍翻回鶻至五季時入獻見者皆厖勒種類也種章勇翻二月庚子以知制誥令狐綯為翰林學士上甞以太宗所撰金鏡金鏡書太宗所著也授綯使讀之至亂未甞不任不肖至治未甞不任忠賢治直吏翻上止之曰凡求致太平當以此言為首又書貞觀政要於屏風每正色拱手而讀之觀古玩翻上欲知百官名數令狐綯曰六品已下官卑數多皆吏部注擬五品以上則政府制授各有籍命曰具貟上命宰相作具貟御覽五卷上之上之時掌翻常寘於案上立皇子澤為濮王上欲作五王院於大明宫以處皇子之幼者處昌吕翻召術士柴嶽明使相其地嶽明對曰臣庶之家遷徙不常故有自陽宅入隂宅隂宅入陽宅刑克禍福師有其說隂陽家所謂三刑謂寅刑巳巳刑申申刑寅丑刑戌戌刑未未刑丑子刑夘夘刑子辰刑辰午刑午酉刑酉亥刑亥克謂金克木木克土土克水水克火火克金今陛下深拱法宫如淳曰法宫路寢正殿也萬神擁衛隂陽書本不言帝王家上善其言賜束帛遣之夏五月己未朔日有食之門下侍郎同平章事崔元式罷為户部尚書以兵部侍郎判度支户部周墀刑部侍郎鹽鐵轉運使馬植并同平章事并當作並初墀為義成節度使辟韋澳為判官及為相謂澳曰力小任重何以相助澳曰願相公無權墀愕然不知所謂澳曰官賞刑罰與天下共其可否勿以己之愛憎喜怒移之天下自理何權之有墀深然之澳貫之之子也澳烏到翻韋貫之元和中為相己夘太皇太后郭氏崩于興慶宫六月禮院檢討官王皥貶句容令唐太常寺有禮院修撰檢討官各一貟宋白曰貞元九年四月敕太常寺宜署禮院修撰檢討官各一貟使為定額句容縣屬昇州宋白曰句容縣本漢縣以界内茅山本名句曲山因立名初憲宗之崩上疑郭太后預其謀又鄭太后本郭太后侍兒有宿怨故上即位待郭太后禮殊薄郭太后意怏怏一日登勤政樓即𤣥宗所起勤政務本之樓在興慶宫欲自隕上聞之大怒是夕崩外人頗有異論上以鄭太后故不欲以郭后袝憲宗有司請葬景陵外園皥奏宜合葬景陵神主配憲宗室奏入上大怒白敏中召皥詰之皥曰太皇太后汾陽王之孫郭子儀封汾陽王憲宗在東宫為正妃逮事順宗為婦憲宗厭代之夕事出曖昧太皇太后母天下歴五朝五朝穆敬文武宣豈得以曖昧之事遽廢正嫡之禮乎敏中怒甚皥辭氣愈厲諸相㑹食周墀立於敏中之門以俟之敏中使謝曰方為一書生所苦公弟先行弟與第同墀入至敏中㕔問其事見皥爭辨方急墀舉手加顙歎皥孤直明日皥坐貶官寅考異曰實録五月戊以太皇太后寢疾權不聽政宰臣帥百寮問太后起居己夘復問起居下遺令是日太后崩初上纂位以憲宗遇弑頗疑后在黨中至是暴得疾崩帝之志也甲申白敏中帥百寮上表請聽政不許乙酉又上表不許丙戌三上表乃依六月貶禮院檢討官王皥為潤州句容令舊傳曰宣宗繼統即后之諸子也思禮愈異於前朝大中年崩袝景陵后歴位七朝五居太母之尊人君行子孫之禮福夀隆貴四十餘年雖漢之馬鄧無以加焉識者以為汾陽社稷之功未泯復鍾慶于懿安焉裴延裕東觀奏記曰憲宗皇帝晏駕之夕上雖幼頗記其事追恨光陵商臣之酷即位後誅鉏惡黨無漏網者郭太后以上英察孝果且懷慙懼時居興慶宫一日與一二侍兒同升勤政樓倚衡而望便欲殞於樓下欲成上過左右急持之即聞于上上大怒其夕大后暴崩上志也又曰懿安郭太后既崩喪服許如故事禮院檢討官王皥抗疏請后合葬景陵配饗憲宗廟室既入上大怒宰臣白敏中召皥詰其事皥對云云翌日皥貶潤州句容縣令周墀亦免相按實錄所言暴崩事皆出于東觀奏記若實有此事則既云是夕暴崩何得前一日先下詔云以太后寢疾權不聽政若無此事則廷裕豈敢輒誣宣宗或者郭后實以病終而宣宗以平日疑忿之心欲黜其禮故皥爭之疑以傳疑今參取之東觀奏記又曰杜悰通貴日久門下有術士姓李悰任西川節度使馬植罷黔中赴闕至西川李術士一見植謂悰曰馬中丞非常人也相公厚遇之悰未之信術士一日密言於悰曰相公將有甚禍非馬中丞不能救乞厚結之悰始驚信𤼵日厚幣贈之仍令邸吏為植買宅生生之費無闕焉植至門方知感悰不知其㫖尋除光禄卿報狀至蜀悰謂術士曰貴人到闕作光禄勲矣術士曰姑待之稍進大理卿又遷刑部侍郎充諸道鹽鐵使悰始驚憂俄而作相懿安皇太后崩後悰懿安子壻也忽一日内榜子索檢責宰相元載故事植諭㫖翌日延英上前萬端營救植素辯能回上㫖事遂中寢按植㑹昌中已自黔中入為大理卿悰今年二月始為西川節度今不取按裴延裕後作廷裕必有一誤秋九月甲子再貶潮州司馬李徳裕為崖州司户湖南觀察使李回為賀州刺史崖州去京師七千四百六十里賀州京師東南四千一百三十里前鳯翔節度使石雄詣政府自陳黑山烏嶺之功政府即謂政事堂黒山烏嶺功並見上卷武宗㑹昌三年考異曰此出范櫖雲谿友議彼以烏嶺為天井誤也求一鎮以終老執政以雄李徳裕所薦曰曏日之功朝廷以蒲孟岐三鎮酬之足矣蒲河中孟河陽岐鳯岐除左龍武統軍雄怏怏而薨十一月庚午萬夀公主適起居郎鄭顥顥絪之孫鄭絪為相于元和之初登進士第為校書郎右拾遺内供奉以文雅著稱公主上之愛女故選顥尚之有司循舊制請用銀裝車上曰吾欲以儉約化天下當自親者始令依外命婦以銅裝車唐制公主乗厭翟車外命婦一品乗白銅厭犢車詔公主執婦禮皆如臣庶之法戒以毋得輕夫族毋得預時事又申以手詔曰茍違吾戒必有太平安樂之禍樂音洛顥弟顗甞得危疾上遣使視之還問公主何在曰在慈恩寺觀戲場上怒歎曰我怪士大夫家不欲與我家為昏良有以也亟命召公主入宫立之階下不之視公主懼涕泣謝罪上責之曰豈有小郎病不往省視乃觀戲乎自晉以來嫂謂叔為小郎省悉景翻遣歸鄭氏由是終上之世貴戚皆兢兢守禮法如山東衣冠之族壬午葬懿安皇后於景陵之側非禮也憲宗不為正其始以致宣宗不為正其終以中書侍郎同平章事韋琮為太子賔客分司十二月鳯翔節度使崔珙奏破吐蕃克清水清水先𨽻秦州宋白曰清水漢舊縣其地即秦仲始所封九域志清水縣在秦州九十里宋白曰長興中移清水縣于上邽鎮九域志之清水長興所移也詔以本州未復權𨽻鳯翔上見憲宗朝公卿子孫多擢用之刑部貟外郎杜勝次對上問其家世對曰臣父黄裳首請憲宗監國事見二百三十六卷永貞元年朝直遥翻即除給事中翰林學士裴諗度之子也上幸翰林面除承㫖諗式荏翻以裴度相元和之功自足以賞延于世但翰林學士承㫖非賞功之官耳吐蕃論恐熱遣其將莽羅急藏將兵二萬畧地西鄙尚婢婢遣其將拓拔懷光擊之於南谷大破之急藏降降户江翻三年春正月上與宰相論元和循吏孰為第一周墀曰臣甞守土江西聞觀察使韋丹功徳被於八州被皮義翻八州洪江鄂岳䖍吉袁撫也沒四十年老稚歌思稚直吏翻如丹尚存乙亥詔史館修撰杜牧撰丹遺愛碑以紀之仍擢其子河陽觀察判官宙為御史二月吐蕃論恐熱軍於河州尚婢婢軍于河源軍河源軍在鄯州東宋白曰河源軍置在湟州東西本趙充國亭堠也婢婢諸將欲擊恐熱婢婢曰不可我軍驟勝而輕敵彼窮困而致死戰必不利諸將不從婢婢知其必敗據河橋以待之諸將果敗婢婢收餘衆焚橋歸鄯州據河橋則兵敗而退者有歸路敗兵既度焚橋阻河則可以截論恐熱之追掩史言尚婢婢善兵吐蕃秦原安樂三州及石門等七闗來降髙宗時吐谷渾為吐蕃所逼徙于鄯州不安其居又徙于靈州之境咸亨三年以靈州故鳴沙縣地置安樂州以居之安史之亂吐蕃取安樂州吐谷渾又徙朔方河東之境原州界冇石門驛藏制勝石峽木靖木峽六盤七闗考異曰實録涇原節度使康季榮奏吐蕃宰相論恐熱殺東道節度使奉表以三州七闗來降獻祖紀年錄亦云殺東道節度使奉表國史敘論恐熱事甚詳至五年五月始來降此際未降也又不云殺東道節度使且恐熱若以三州七闗來降朝廷必官賞之何故但賞邊將而不及恐熱蓋三州七闗以吐蕃國亂自來降唐朝廷遣諸道應接之非恐熱帥以來實錄誤耳以太僕卿陸耽為宣諭使詔涇原靈武鳯翔邠寧振武皆出兵應接河東節度使王宰入朝以貨結權倖求以使相領宣武刑部尚書同平章事周墀上疏論之宰遂還鎮駙馬都尉韋讓求為京兆尹墀言京兆尹非才望不可為讓議竟寢墀又諫上開邊開邊謂經畧河西也由是忤㫖忤五故翻夏四月以墀為東川節度使以御史大夫崔鉉為中書侍郎同平章事兵部侍郎判户部魏扶同平章事癸巳盧龍奏節度使張仲武薨軍中立其子節度押牙直方翰林學士鄭顥言于上曰周墀以直言入相亦以直言罷相上深感悟甲午墀入謝加檢校右僕射戊戌以張直方為盧龍留後五月徐州軍亂逐節度使李廓廓程之子也李程見二百四十三卷長慶四年在鎮不治治直之翻右補闕鄭魯上言其狀且曰臣恐新麥未登徐師必亂速命良帥救此一方帥所類翻上未之省省悉景翻徐州果亂上思魯言擢為起居舍人以義成節度使盧𢎞止為武寧節度使武寧士卒素驕有銀刀都尤甚屢逐主帥𢎞止至鎮都虞候胡慶方復謀作亂復扶又翻𢎞止誅之撫循其餘訓以忠義軍府由是獲安六月戊申以張直方為盧龍節度使涇原節度使康季榮取原州原州本治髙平安史亂後沒于吐蕃及石門驛藏木峽制勝六磐石峽六闗秋七月丁巳靈武節度使朱叔明取長樂州長樂當作安樂宋白曰安樂州置於靈州鳴沙縣樂音洛下同甲子邠寧節度使張君緒取蕭闗蕭闗縣舊志屬原州甲戌鳯翔節度使李玭取秦州玭蒲蠲翻凡取言易也秦州本治上邽宋白曰時治成紀在舊州南一百里詔邠寧節度權移軍於寧州以應接河西八月乙酉改長樂州為威州宋白曰靈州鳴沙縣本漢富平縣地後周立㑹州隋立環州以大河環曲為名唐神龍中黙啜寇掠移縣於廢豐安城咸通三年歸復以舊縣基置安樂州大中三年改為威州河隴老幼千餘人詣闕實考異曰錄云數千人今從舊傳己丑上御延喜門樓見之延喜門在皇城東北角六典皇城東面二門北曰延喜南曰景風延喜門則承天門外横街東直通化門歡呼舞躍解胡服襲冠帶觀者皆呼萬嵗詔募百姓懇闢三州七闗土田五年不租稅自今京城罪人應配流者皆配十處十處三州七闗也四道將吏能於鎮戍之地營田者官給牛及種糧四道涇原邠寜靈武鳯翔宋白曰史臣曰營田之名蓋緣邊多隙地蕃兵鎮戍課其播殖以助軍須謂之屯田其後中原兵興民户減耗野多閒田而治財賦者如沿邊例開置名曰營田行之嵗乆不以兵乃招致農民强户謂之營田户復有主務敗闕犯法之家沒納田宅亦係于此自此諸道皆有營田務種章勇翻温池鹽利可贍邊陲委度支制置神龍元年置温池縣屬靈州是年度屬威州縣有鹽池其三州七闗鎮戍之卒皆倍給衣糧言衣糧倍于其他戍卒仍二年一代道路建置堡柵有商旅往來販易及戍卒子弟通傳家信闗鎮毋得留難其山南劔南邊境有沒蕃州縣亦令量力收復廣徳以來西羌内侵山南巡内階成陷沒文州移治劒南西山諸州亦多有沒於吐蕃者按階州時為武州宋白曰階州漢武都之地後魏平武都築城於仙陵山置武都鎮西魏始置武州大厯初與秦州俱沒于吐蕃大中三年收復復立武州景厯元年改階州冬十月改備邊庫為延資庫備邊庫初置見上武宗㑹昌五年西川節度使杜悰奏取維州閏十一月丁酉宰相以克復河湟請上尊號上曰憲宗常有志復河湟見二百三十八卷元和五年以中原方用兵謂方用兵於兩河也未遂而崩今乃克成先志耳其議加順憲二廟尊諡以昭功烈盧龍節度使張直方暴忍喜遊獵喜許記翻軍中將作亂直方知之託言出獵遂舉族逃歸京師軍中推牙將周綝為留後綝丑林翻幽考異曰舊紀十一月州軍亂逐張直方軍人推周綝為留後四年九月周綝卒軍人立張允伸為留後直方傳曰直方多不法慮為將卒所圖三年冬託以遊獵奔赴闕廷張允伸傳曰四年戎帥周綝寢疾表允伸為留後新紀四年八月幽州軍亂逐張直方張允伸自稱留後傳亦言直方出奔即以允伸為留後實錄直方赴闕亦在去年八月至九月又云張允伸知留後皆無周綝姓名今從舊傳直方至京師拜金吾大將軍甲戌追上順宗諡曰至徳𢎞道大聖大安孝皇帝憲宗諡曰昭文章武大聖至神孝皇帝仍改題神主自天寳已來加上諸帝諡號陵中玊冊及神主未甞改題己未崖州司户李徳裕卒山南西道節度使鄭涯奏取扶州劉昫曰扶州治同昌縣歴代吐谷渾所據西魏逐吐谷渾於此置鄧州及鄧寧郡蓋以平定鄧至羌為名隋初改置扶州及同昌縣在長安西南一千六百九十里廣德後沒於吐蕃資治通鑑卷二百四十八
