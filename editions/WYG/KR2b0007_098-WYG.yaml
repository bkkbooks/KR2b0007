front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷九十八宋司馬光撰胡三省音註晉紀二十起著雍涒灘盡上章閹茂凡三年孝宗穆皇帝上之下永和四年夏四月林邑寇九眞既再破日南故進寇九眞九眞郡唐愛州殺士民什八九趙秦公韜有寵於趙王虎欲立之以太子宣長長知兩翻猶豫未决宣嘗忤㫖忤五故翻虎怒曰悔不立韜也韜由是益驕造堂於太尉府號曰宣光殿梁長九丈長直亮翻宣見之大怒斬匠截梁而去以犯其名也韜怒増之至十丈宣聞之謂所幸楊杯牟成趙生曰凶豎傲愎敢爾愎弼力翻汝能殺之吾入西宮虎居西宮當盡以韜之國邑分封汝等韜死主上必臨䘮吾因行大事蔑不濟矣左傳潘崇謂楚商臣曰能行大事乎杜預注曰大事謂弑君杯等許諾秋八月韜夜與僚屬宴於東明觀水經注石氏立東明觀於鄴東城上因宿於佛精舍佛精舍佛寺也僧徒專精修行之地故謂之精舍事物紀原曰漢明帝於東都門外立精舍以處攝摩騰竺法蘭宣使楊杯等縁獼猴梯而入梯小而長人如獮猴攀緣而上故曰獮猴梯殺韜置其刀箭而去旦日宣奏之虎哀驚氣絶久之方蘇將出臨其䘮司空李農諫曰害秦公者未知何人賊在京師鑾輿不宜輕出虎乃止嚴兵發哀於太武殿宣徃臨韜䘮不哭直言呵呵呵虎何翻呵呵笑聲使舉衾觀尸大笑而去大被曰衾收大將軍記事參軍鄭靖尹武等將委之以罪虎疑宣殺韜欲召之恐其不入乃詐言其母杜后哀過危惙惙陟劣翻類篇丑例翻困劣也言其氣息惙然僅相屬也宣不謂見疑入朝中宮因留之朝直遥翻建興人史科知其謀告之魏土地記曰建興郡治陽阿縣陽阿縣漢屬上黨郡魏收志曰慕容永分上黨置建興郡則其地非石趙所置建興郡也水經注曰田融言趙立建興郡於廣宗城内斯其是矣虎使收楊杯牟成皆亡去獲趙生詰之具服詰去吉翻虎悲怒彌甚囚宣於席庫席庫藏席之所以鐵環穿其頷而鏁之取殺韜刀箭䑛其血哀號震動宮殿鏁蘇果翻䑛直氏翻號戸高翻佛圖澄曰宣韜皆陛下之子今為韜殺宣是重禍也為于偽翻陛下若加慈恕福祚猶長若必誅之宣當為彗星下掃鄴宮彗祥歲翻又旋芮翻乂徐醉翻虎不從積柴於鄴北樹標其上標末置鹿盧穿之以䋲鹿盧即轆轤倚梯柴積送宣其下使韜所幸宦者郝稚劉霸㧞其髪抽其舌牽之登梯郝稚以繩貫其頷鹿盧絞上上時掌翻劉霸斷其手足斷丁管翻斫眼潰腸如韜之傷四面縱火煙炎際天炎讀曰燄虎從昭儀已下數千人登中臺以觀之中臺者三臺之中臺即銅爵臺也火滅取灰分置諸門交道中交道午道也一縱一横為午道殺其妻子九人宣少子纔數歲少詩照翻虎素愛之抱之而泣欲赦之其大臣不聽就抱中取而殺之兒挽虎衣大叫至於絶帶虎因此發病又廢其后杜氏為庶人誅其四率已下三百人宦者五十人皆車裂節解弃之漳水東宫有左右前後四率率所律翻支解者解其四支節解者凡骨節節節解之也洿其東宮以養猪牛洿汪乎翻東宮衛士十餘萬人皆謫戍凉州趙未得凉州置凉州於金城謫使戍凉州之邉也為下高力叛張本先是趙攬言於虎曰宮中將有變宜備之及宣殺韜虎疑其知而不告亦誅之史言趙攬談天於猜暴之朝以自禍先悉薦翻朝廷論平蜀之功欲以豫章郡封桓温尚書左丞荀㽔曰温若復平河洛復扶又翻將何以賞之乃加温征西大將軍開府儀同三司封臨賀郡公加譙王無忌前將軍袁喬龍驤將軍封湘西伯驤思將翻㽔崧之子也荀崧荀藩之弟永嘉之禍相與建行臺於密建興之初又嘗鎮宛温旣滅蜀威名大振朝廷憚之會稽王昱以揚州刺史殷浩有盛名朝野推服引為心膂與參綜朝權欲以抗温由是與温寖相疑貳為温廢浩脅制朝廷張本朝直遥翻㑹工外翻浩以征北長史荀羨前江州刺史王羲之夙有令名擢羨為呉國内史江左郡國以呉為甲羲之為䕶軍將軍以為羽翼羡㽔之弟羲之導之從子也從才用翻羲之以為内外恊和然後國家可安勸浩不宜與温搆隙浩不從燕王皝有疾召世子雋屬之曰屬之欲翻今中原未平方資賢傑以經世務恪知勇兼濟才堪任重汝其委之以成吾志又曰陽士秋士行高潔忠幹貞固陽騖字士秋行卜孟翻可託大事汝善待之九月丙申薨年五十二趙王虎議立太子太尉張舉曰燕公斌有武畧斌音彬彭城公遵有文徳惟陛下所擇虎曰卿言正起吾意戎昭將軍張犲曰載記曰虎置左右戎昭曜武將軍位在左右衛上燕公母賤又嘗有過謂欲殺張賀度也事見九十六卷成帝咸康六年彭城公母前以太子事廢遵與邃同母鄭氏廢見九十五卷咸康三年今立之臣恐不能無㣲恨陛下宜審思之初虎之㧞上邽也見九十四卷成帝咸和四年張犲獲前趙主曜㓜女安定公主有殊色納於虎虎嬖之嬖卑義翻又博計翻生齊公世犲以虎老病欲立世爲嗣冀劉氏為太后已得輔政乃說虎曰陛下再立太子其母皆出於倡賤說輸芮翻倡音昌故禍亂相尋今宜擇母貴子孝者立之虎曰卿勿言吾知太子處矣虎再與羣臣議於東堂虎曰吾欲以純灰三斛自滌其腸何為專生惡子年踰二十輙欲殺父今世方十歲比其二十吾已老矣比必寐翻乃與張舉李農定議令公卿上書請立世為太子大司農曹莫不肻署名虎使張犲問其故莫頓首曰天下重器不宜立少少詩照翻故不敢署虎曰莫忠臣也然未達朕意張舉李農知朕意矣可令諭之遂立世為太子以劉昭儀為后虎父子相殘廢長立少天將假手於冉閔以夷其種類也冬十一月甲辰葬燕文明王皝諡曰文明世子雋即位雋字宣英皝之第二子赦境内遣使詣建康告䘮使䟽吏翻以弟交為左賢王左長史陽騖為郎中令十二月以左光禄大夫領司徒錄尚書事蔡謨為侍中司徒謨上䟽固讓謂所親曰我若為司徒將為後代所哂哂式忍翻義不敢拜也五年春正月辛未朔大赦趙王虎即皇帝位虎以成帝咸康三年即天王位今即皇帝位大赦改元太寕諸子皆進爵為王故東宮髙力等萬餘人謫戍凉州石宣簡多力之士以衛東宮號曰髙力置督將以領之行達雍城扶風雍縣城也雍於用翻下同旣不在赦例又敕雍州刺史張茂送之茂皆奪其馬使之歩推鹿車致糧戍所推吐雷翻風俗通曰鹿車窄小裁容一鹿髙力督定陽梁犢定陽縣漢屬上郡晉省後魏太安中置定陽郡唐為延州臨真縣因衆心之怨謀作亂東歸衆聞之皆踊抃大呼踊跳躍也抃拊手也呼火故翻犢乃自稱晉征東大將軍帥衆攻㧞下辨辨步莧翻安西將軍劉寕自安定擊之為犢所敗敗補邁翻髙力皆多力善射一當十餘人雖無兵甲掠民斧施一丈柯攻戰若神柯斧柄也所向崩潰戍卒皆隨之攻陷郡縣殺長吏二千石長知兩翻長驅而東比至長安比必寐翻衆已十萬樂平王苞盡銳拒之一戰而敗犢遂東出潼闗進趣洛陽趣七喻翻趙主虎以李農為大都督行大將軍事統衛軍將軍張賀度等步騎十萬討之戰于新安新安縣漢屬𢎞農郡自晉以後屬河南郡騎奇寄翻下同農等大敗戰于洛陽又敗退壁成臯犢遂東掠滎陽陳留諸郡武帝㤗始二年分河南置滎陽郡虎大懼以燕王斌為大都督督中外諸軍事統冠軍大將軍姚弋仲車騎將軍蒲洪等討之斌音彬冠古玩翻弋仲將其衆八千餘人至鄴自灄頭至鄴將即亮翻求見虎虎病未之見引入領軍省領軍省領軍將軍視事之所賜以已所御食弋仲怒不食曰主上召我來擊賊當面見授方略我豈為食來邪為于偽翻下𦍑為同且主上不見我我何以知其存亡邪虎力疾見之弋仲讓虎曰兒死愁邪何為而病兒㓜時不擇善人敎之使至於為逆旣為逆而誅之又何愁焉且汝久病所立兒㓜謂太子世也汝若不愈天下必亂當先憂此勿憂賊也犢等窮困思歸相聚為盗所過殘暴何所能至老𦍑為汝一舉了之了决也弋仲性狷直人無貴賤皆汝之虎亦不之責狷吉掾翻以石虎之猜暴而能容姚弋仲之狷直者以其當理而切於事情也茍徒狷直而不切當殆難以免矣於坐授使持節征西大將軍賜以鎧馬坐狙臥翻使䟽吏翻鎧可亥翻弋仲曰汝看老𦍑堪破賊否乃被鎧跨馬于庭中被皮義翻因䇿馬南馳不辭而出遂與斌等擊犢於滎陽大破之斬犢首而還討其餘黨盡滅之虎命弋仲劒履上殿入朝不趨上時掌翻進封西平郡公蒲洪為車騎大將軍開府儀同三司都督雍秦州諸軍事雍州刺史雍於用翻進封略陽郡公始平人馬朂聚兵自稱將軍杜佑曰漢平陵晉改為始平有馬嵬故城趙樂平王苞討滅之誅三千餘家夏四月益州刺史周撫龍驤將軍朱燾擊范賁斬之益州平范賁亂始上卷三年驤始將翻詔遣謁者陳沈如燕沈持林翻拜慕容雋為使持節侍中大都督督河北諸軍事幽平二州牧使䟽吏翻四考異曰雋載記云幽冀并平州牧今從帝記大將軍大單于燕王單音蟬桓温遣督䕶滕畯帥交廣之兵擊林邑王文於盧容畯祖峻翻盧容縣自漢以來屬日南郡有盧容浦去郡二百里帥讀曰率為文所敗敗補邁翻退屯九真乙卯趙王虎病甚以彭城王遵為大將軍鎮闗右燕王斌為丞相錄尚書事張犲為鎮衛大將軍領軍將軍吏部尚書劉聰置十六大將軍鎮衛其一也石虎置鎮衛將軍在車騎將軍上今以張犲為鎮衛大將軍崇其號也領軍將軍則掌兵柄吏部尚書則典選事是文武二柄悉以付犲並受遺詔輔政劉后惡斌輔政恐不利於太子與張犲謀去之惡烏路翻去𦍑呂翻斌時在襄國遣使詐謂斌曰主上疾已漸愈王須獵者可少停也斌素好獵嗜酒少詩沼翻好呼到翻遂留獵且縱酒劉氏與犲因矯詔稱斌無忠孝之心免官歸第使犲弟雄帥龍騰五百人守之此石虎幽石宏之故智也張犲踵而用之非虎敎之邪石斌亦庸人耳君父疾篤徵之受遺輔政就使虎疾少愈亦當夜衣而行乃酣酒縱獵其無智識如此就使得權諸弟亦將紾其臂而奪之張舉謂有武略妄矣乙丑遵自幽州至鄴敕朝堂受拜朝直遥翻配禁兵三萬遣之遵涕泣而去是日虎疾小瘳問遵至未左右對曰去已久矣虎曰恨不見之虎臨西閤太武殿之西閤也龍騰中郎二百餘人列拜於前虎問何求皆曰聖體不安宜令燕王入宿衛典兵馬或言乞以為皇太子虎曰燕王不在内邪召以來左右言王酒病不能入虎曰促持輦迎之當付璽綬亦竟無行者左右皆為劉后母子故竟無行者璽斯氏翻綬音受尋惛眩而入惛迷忘也眩目視亂也張犲使張雄矯詔殺斌殺斌欲以一衆心豈知已有從㬰石遵入立者戊辰劉氏復矯詔以犲為太保都督中外諸軍錄尚書事如霍光故事復扶又翻侍中徐統歎曰亂將作矣吾無為預之仰藥而死己巳虎卒太子世即位尊劉氏為皇太后劉氏臨朝稱制朝直遥翻以張犲為丞相犲辭不受請以彭城王遵義陽王鑒為左右丞相以慰其心劉氏從之犲與太尉張舉謀誅司空李農舉素與農善密告之農奔廣宗帥乞活數萬家保上白乞活李惲田徽之餘衆也自永嘉以來屯聚於上白帥讀曰率劉氏使張舉統宿衛諸軍圍之犲以張離為鎮軍大將軍監中外諸軍事以為已副監工銜翻彭城王遵至河内聞䘮姚弋仲蒲洪劉寕及征虜將軍石閔武衛將軍王鸞等討梁犢還遇遵於李城續漢志河内平睪縣有李城史記邯鄲李同却秦兵趙封其父李矦即此城共說遵曰殿下長且賢先帝亦有意以殿下為嗣謂虎欲從張舉之言也說輸芮翻長知兩翻正以末年惛惑為張犲所誤今女主臨朝姧臣用事上白相持未下京師宿衛空虛殿下若聲張豺之罪鼓行而討之其誰不開門倒戈而迎殿下者遵從之遵自李城舉兵還趣鄴趣七喻翻洛州刺史劉國帥洛陽之衆往㑹之檄至鄴張豺大懼馳召上白之軍丙戌遵軍於蕩陰蕩音湯戎卒九萬石閔為前鋒耆雋羯士皆曰彭城王來奔䘮吾當出迎之不能為張豺守城也方言曰耆長也說文曰老也左傳注曰强也禮記音義曰至也言至老境也羯士石氏之種類也為于偽翻踰城而出豺斬之不能止張離亦帥龍騰二千斬闗迎遵劉氏懼召張豺入對之悲哭曰先帝梓宫未殯而禍難至此難乃旦翻今嗣子冲㓜託之將軍將軍將若之何欲加遵重位能弭之乎豺惶怖不知所出怖普布翻但云唯唯唯于癸翻乃下詔以遵為丞相領大司馬大都督督中外諸軍錄尚書事加黄鉞九錫己丑遵至安陽亭安陽縣屬魏郡此葢安陽縣都亭也張豺懼而出迎遵命執之庚寅遵擐甲曜兵入自鳳陽門升太武前殿擗踊盡哀擐音宦擗毗亦翻拊心也踊跳也退如東閤太武殿之東閤也斬張豺于平樂市鄴都有平樂市樂音洛夷其三族假劉氏令曰嗣子㓜冲先帝私恩所授皇業至重非所克堪其以遵嗣位於是遵即位大赦罷上白之圍辛卯封世為譙王載記曰世凡立三十三日廢劉氏為太妃后考異曰晉春秋及十六國春秋鈔皆云廢太為昭儀今從載記十六國春秋及載記又云世立三十三日按四月乙巳至五月庚寅凡二十一日尋皆殺之李農來歸罪使復其位尊母鄭氏為皇太后鄭氏即邃母鄭后被廢見九十五卷成帝咸康三年立妃張氏為皇后故燕王斌子衍為皇太子以義陽王鍳為侍中太傅沛王冲為太保樂平公苞為大司馬汝陰王琨為大將軍武興公閔為都督中外諸軍事輔國大將軍為石閔得兵柄以夷胡羯張本甲午鄴中暴風㧞樹震電雨雹大如盂升如盂及升也雨于具翻太武暉華殿災及諸門觀閤蕩然無餘乘輿服御燒者大半觀古玩翻乘繩證翻金石皆盡火月餘乃滅時沛王冲鎮薊冲蓋代遵鎮薊薊音計聞遵殺世自立謂其僚佐曰世受先帝之命遵輙廢而殺之罪莫大焉其敕内外戒嚴孤將親討之於是留寕北將軍沭堅戍幽州沭食律翻姓也帥衆五萬自薊南下傳檄燕趙所在雲集比至常山帥讀曰率比必寐翻衆十餘萬軍于苑鄉遇遵赦書冲曰皆吾弟也死者不可復追何為復相殘乎復扶又翻下同吾將歸矣欲歸薊也其將陳暹曰彭城簒弑自尊為罪大矣王雖北斾臣將南轅俟平京師擒彭城然後奉迎大駕冲乃復進遵馳遣王擢以書喻冲冲弗聼遵使武興公閔及李農帥精卒十萬討之戰于平棘平棘縣漢屬常山郡晉屬趙國唐為趙州治所冲兵大敗獲冲于元氏元氏縣漢屬常山郡晉屬趙國闞駰曰趙公子元之封邑故曰元氏唐元氏縣屬趙州劉昫曰元氏漢常山郡所治故城在今趙州元氏縣西南賜死阬其士卒三萬餘人武興公閔言於遵曰蒲洪人傑也今以洪鎮闗中臣恐秦雍之地非國家之有雍於用翻此雖先帝臨終之命然陛下踐祚自宜改圖遵從之罷洪都督餘如前制洪怒歸枋頭遣使來降洪屯枋頭見九十五卷成帝咸和八年降户江翻燕平狄將軍慕容霸上書於燕王雋曰石虎窮凶極暴天之所弃餘燼僅存自相魚肉今中國倒懸企望仁恤若大軍一振勢必投戈北平太守孫興亦表言石氏大亂宜以時進取中原雋以新遭大䘮弗許以去年皝薨也霸馳詣龍城言於雋曰難得而易失者時也萬一石氏衰而復興易以䜴翻復扶又翻或有英雄據其成資謂中原或有英雄乘亂而取趙據有其已成之資也豈惟失此大利亦恐更為後患雋曰鄴中雖亂鄧恒據安樂以前參考安樂當作樂安兵彊糧足今若伐趙東道不可由也當由盧龍盧龍山徑險狹水經注濡水東南逕盧龍塞塞道自無終縣東出渡濡水向林蘭陘東至清陘盧龍之險峻阪縈折故有九崢之名虜乘髙斷要斷丁管翻首尾為患將若之何霸曰恒雖欲為石氏拒守其將士顧家人懐歸志若大軍臨之自然瓦解臣請為殿下前驅東出徒河潛趨令支出其不意為于偽翻趨七喻翻令音鈴又即定翻支音祁彼聞之勢必震駭上不過閉門自守下不免弃城逃潰何暇禦我哉然則殿下可以安步而前無復留難矣雋猶豫未决以問五材將軍封奕燕置五材將軍蓋取宋子罕所謂天生五材誰能去兵之義對曰用兵之道敵彊則用智敵弱則用勢是故以大呑小猶狼之食豚也以治易亂猶日之消雪也大王自上世以來積徳累仁兵彊士練石虎極其殘暴死未瞑目瞑莫定翻子孫爭國上下乖亂中國之民墜於塗炭延頸企踵以待振㧞大王若揚兵南邁先取薊城次指鄴都宣耀威徳懐撫遺民彼孰不扶老提㓜以迎大王凶黨將望旗氷碎安能為害乎從事中郎黄泓曰泓烏宏翻今太白經天歲集畢北陰國受命此必然之驗也漢書天文志太白經天天下革民更王孟康注曰謂出東入西出西入東也太白陰星出東當伏東出西當㐲西過午為經天晉灼曰日陽也日出則星亡晝見午上為經天歲星所在國不可伐可以伐人昴畢間為天街其陰陰國歲集畢北明陰國當受命而王宜速出師以承天意折衝將軍慕輿根曰中國之民困於石氏之亂咸思易主以救湯火之急此千載一時不可失也載子亥翻自武宣王以來慕容廆謚武宣王招賢養民務農訓兵正俟今日今時至不取更復顧慮復扶又翻豈天意未欲使海内平定邪將大王不欲取天下也雋笑而從之以慕容恪為輔國將軍慕容評為輔弼將軍左長史陽騖為輔義將軍謂之三輔輔弼輔義二將軍號亦一時創置慕容霸爲前鋒都督建鋒將軍建鋒將軍亦創置也選精兵二十餘萬講武戒嚴為進取之計昭考異曰燕景紀集兵在四月時石虎方死諸子未爭十六國春秋在五月故從之而燕書載封奕慕輿根言俱指冉閔按是時閔未篡趙葢撰史者附會耳故削去六月葬趙王虎於顯原陵廟號太祖桓温聞趙亂出屯安陸安陸縣自漢以來屬江夏郡唐為安州治所温自江陵出屯安陸遣諸將經營北方將即亮翻趙揚州刺史王浹舉壽春降浹即恊翻降戸江翻下同西中即將陳逵進據壽春征北大將軍褚裒上表請伐趙褚裒時鎮京口裒蒲矦翻即日戒嚴直指泗口朝議以裒事任貴重宜先遣偏帥裒太后之父又當方面故云事任貴重裒奏言前已遣督䕶王頥之等徑造彭城造七到翻後遣督䕶麋嶷進據下邳嶷魚力翻今宜速發以成聲勢秋七月加裒征討大都督督徐兖青揚豫五州諸軍事裒帥衆三萬徑赴彭城帥讀曰率北方士民降附者日以千計朝野皆以為中原指期可復光祿大夫蔡謨獨謂所親曰胡滅誠為大慶然恐更貽朝廷之憂其人曰何謂也謨曰夫能順天乘時濟羣生於艱難者非上聖與英雄不能為也自餘則莫若度徳量力度徒洛翻量音良觀今日之事殆非時賢所及必將經營分表疲民以逞言必不能長驅以定中原勢須隨所得之地分列屯戍畫境而守疲民以逞其志也或說分音扶問翻言人之才具各有分量收復中原非當時人才所能辦也經之營之過於其分量之外則不能成功丁壯苦征戰老弱困轉輸疲民以逞而不能濟也旣而才畧踈短不能副心財殫力竭智勇俱困安得不憂及朝廷乎其後殷浩之敗卒如蔡謨所料魯郡民五百餘家相與起兵附晉求援於褚裒裒遣部將王龕李邁將銳卒三千迎之龕苦含翻將即亮翻趙南討大都督李農帥騎二萬與龕等戰于代陂騎奇寄翻龕等大敗皆没於趙八月裒退屯廣陵陳逵聞之焚壽春積聚毁城遁還積子賜翻聚慈諭翻裒上䟽乞自貶詔不許命裒還鎮京口解征討都督時河北大亂遺民二十餘萬口渡河欲來歸附會裒已還威勢不接皆不能自㧞死亡略盡掠考異曰裒傳云為慕容皝及苻徤所死亡咸盡按是時慕容皝卒已踰年矣永和六年慕容雋始率衆南征石鍳即位後蒲洪始有衆十萬永和六年洪死健始嗣位皆與裒不相接今不取趙樂平王苞謀帥闗右之衆攻鄴帥讀曰率下同左長史石光司馬曹曜等固諫苞怒殺光等百餘人苞性貪而無謀雍州豪傑知其無成並遣使告晉梁州刺史司馬勲帥衆赴之勲宣帝弟子濟南王遂之曽孫雍於用翻使䟽吏翻楊初襲趙西城破之楊初武都氐王也此西城葢即漢隗囂奔處九月凉州官屬共上張重華為丞相凉王雍秦凉三州牧上時掌翻重華屢以錢帛賜左右寵臣又喜博奕博樗蒲奕奕棋喜許記翻頗廢政事徵事索振諫曰先王夙夜勤儉以實府庫正以讐耻未雪志平海内故也殿下嗣位之初彊寇侵逼徵事凉所置官謂趙来攻也事見上卷二年三年索惜各翻頼重餌之故得戰士死力謂以錢帛厚賞戰士得其出力致死僅保社稷今蓄積已虛而寇讐尚在豈可輕有耗散以與無功之人乎昔漢光武躬親萬機章奏詣闕報不終日故能隆中興之業今章奏停滯動經時月三月為一時三旬為一月下情不得上通沈寃困於囹圄沈持林翻囹盧經翻獄也圄偶許翻守也殆非明主之事也重華謝之司馬勲出駱谷破趙長城戍長城戍即魏司馬望鄧艾據之以拒姜維之地壁于懸鉤去長安二百里使治中劉煥攻長安斬京兆太守劉秀離劉秀離葢迎戰而敗死渙未能至長安城下也又㧞賀城三輔豪傑多殺守令以應勲凡三十餘壁衆五萬人趙樂平王苞乃輟攻鄴之謀使其將麻秋姚國等將兵拒勲趙主遵遣車騎將軍王朗帥精騎二萬以討勲為名因刼苞送鄴勲兵少畏朗不敢進使桓温於是時攻闗中闗中可取也少詩沼翻冬十月釋懸鉤㧞宛城殺趙南陽太守袁景復還梁州宛於元翻復扶又翻初趙主遵之發李城也謂武興公閔曰努力事成以爾為太子旣而立太子衍閔恃功欲專朝政朝直遥翻遵不聼閔素驍勇屢立戰功夷夏宿將皆憚之驍堅堯翻旣為都督總内外兵權乃撫循殿中將士皆奏為殿中貟外將軍爵闗外矦殿中將軍晉初置殿中貟外將軍又後來所置也闗外矦漢獻帝建安二十年魏武王置所謂名號矦也余按秦漢列矦則有國邑闗内矦無國邑列位於朝無官位者居京師故謂之闗内矦列矦就國者多出闗外後曹操置闗外矦於闗内矦之下非秦漢列爵意也遵弗之疑而更題名善惡以挫抑之衆咸怨怒中書令孟準左衛將軍王鸞勸遵稍奪閔兵權閔益恨望恨望猶怨望也準等咸勸誅之十一月遵召義陽王鑒樂平王苞汝陰王琨淮南王昭等入議於鄭太后前曰閔不臣之迹漸著今欲誅之如何鑒等皆曰宜然鄭氏曰李城還兵無棘奴豈有今日冉閔小字棘奴小驕縱之謂閔恃功頗驕宜寛縱之何可遽殺鑒出遣宦者楊環馳以告閔閔遂劫李農及右衛將軍王基密謀廢遵使將軍蘇彦周成帥甲士三千人執遵於南臺三臺之南臺也水經注銅雀臺之南則金雀臺髙八丈有屋百九十間帥讀曰率遵方與婦人彈碁藝經曰彈碁兩人對局白黑碁各六枚先列碁相當更先彈也其局以石為之局形四隤而中高魏文帝善彈碁能用手巾角時一書生又能低頭以所冠葛巾撇碁劉貢父詩云漢皇初厭蹵鞠勞侍臣始作彈碁戲彈碁葢始於漢也世說曰彈碁始自魏内宮粧奩之戲此說誤也按西京雜記漢武帝好蹵鞠言事者以為勞體非至尊所宜帝命擇似而不勞者家君作彈碁奏之帝大悦問成曰反者誰也成曰義陽王鑒當立遵曰我尚如是鑒能幾時遂殺之於琨華殿載記曰遵在位凡一百八十三日并殺鄭太后張后太子衍孟準王鸞及上光祿張裴載記曰石虎置上中光祿大夫位在左右光祿大夫上鑒即位大赦以武興公閔為大將軍封武徳王司空李農為大司馬並錄尚書事郎闓為司空闓苦亥翻又音開秦州刺史劉羣為尚書左僕射侍中盧諶為中書監諶是壬翻秦雍流民相率西歸成帝咸和四年石虎破殺劉􅉙徙氐𦍑十五萬落于司冀州八年破石生徙秦雍民及氐𦍑十餘萬户于闗東今因趙亂故相帥西歸雍於用翻帥讀曰率路由枋頭共推蒲洪為主衆至十餘萬蒲洪勸石虎徙秦雍民夷以實闗東而身委質於趙及趙之亂得因以為資奸雄俟時而動也洪子健在鄴斬關出奔枋頭鑒懼洪之逼欲以計遣之乃以洪為都督關中諸軍事征西大將軍雍州牧領秦州刺史洪㑹官屬議應受與不不讀曰否主簿程朴請且與趙連和如列國分境而治洪怒曰吾不堪為天子邪而云列國乎引朴斬之姚弋仲猶知盡忠於石氏蒲洪則直欲奪取之而後已都鄉元矦禇裒漢志常山郡有都鄉矦國晉志不見此特以漢舊矦國名封禇裒耳非必有實土也還至京口聞哭聲甚多以問左右對曰皆代陂死者之家也裒慙憤發疾十二月己酉卒以吳國内史荀羡為使持節監徐兖二州揚州之晉陵諸軍事徐州刺史時年二十八中興方伯未有如羡之少者少詩照翻趙主鑒使樂平王苞中書令李松殿中將軍張才夜攻石閔李農於琨華殿不克禁中擾亂鑒懼偽若不知者夜斬松才於西中華門并殺苞新興王祗虎之子也時鎮襄國與姚弋仲蒲洪等連兵祗北連姚弋仲南連蒲洪以討閔農移檄中外欲共誅閔農閔農以汝陰王琨為大都督與張舉及侍中呼延盛帥步騎七萬分討祗等帥讀曰率騎奇寄翻中領軍石成侍中石啓前河東太守石暉謀誅閔農閔農皆殺之龍驤將軍孫伏都劉銖等帥羯士三千伏於胡天胡天葢石氏禁中署舍之名驤思將翻亦欲誅閔農鑒在中臺伏都帥三十餘人將升臺挾鑒以攻之鑒見伏都毁閣道臨問其故伏都曰李農等反已在東掖門臣欲帥衛士討之謹先啓知鑒曰卿是功臣好為官陳力魏晉以下率謂天子為官天子亦時自言之陳展也為于偽翻朕從臺上觀卿勿慮無報也言若能誅閔農將厚賞以報之於是伏都銖帥衆攻閔農不克屯於鳳陽門閔農帥衆數千毁金明門而入鑒懼閔之殺已馳招閔農開門内之謂曰孫伏都反卿宜速討之閔農攻斬伏都等自鳳陽至琨華横尸相枕枕職任翻流血成渠宣令内外六夷敢稱兵仗者斬稱舉也胡人或斬關或踰城而出者不可勝數閔旣誅孫伏都等又禁胡人稱兵仗胡人知禍之將及故去勝音升閔使尚書王簡少府王欝帥衆數千守鑒於御龍觀觀古玩翻懸食以給之下令城中曰近日孫劉搆逆支黨伏誅良善一無預也今日已後與官同心者留不同者各任所之敕城門不復相禁復扶又翻於是趙人百里内悉入城趙人謂中國人也胡羯去者填門閔知胡之不為己用班令内外趙人斬一胡首送鳳陽門者文官進位三等武官悉拜牙門一日之中斬首數萬閔親帥趙人以誅胡羯無貴賤男女少長皆斬之少詩照翻長知兩翻死者二十餘萬尸諸城外悉為野犬豺狼所食其屯戍四方者閔皆以書命趙人為將帥者誅之或髙鼻多須濫死者半髙鼻多鬚其狀似羯胡故亦見殺將卽亮翻帥所類翻燕王雋遣使至凉州使䟽吏翻約張重華共擊趙髙句麗王釗送前東夷䕶軍宋晃于燕燕王雋赦之更名曰活更工衡翻下同拜為中尉晃奔髙麗見九十六卷成帝咸康四年六年春正月趙大將軍閔欲滅去石氏之迹去𦍑吕翻託以䜟文有繼趙李更國號曰衛易姓李氏大赦改元青龍太宰趙庶太尉張舉中軍將軍張春光祿大夫石岳撫軍石寕撫軍之下當有將軍字武衛將軍張季及公矦卿校龍騰等萬餘人出奔襄國從石祗也校戸教翻汝陰王琨奔冀州趙之冀州治信都撫軍將軍張沈據滏口滏口滏水之口也唐代宗永泰元年薛嵩奏於滏口之右故臨水縣城置昭義縣以屬磁州沈持林翻滏音釜張賀度據石瀆魏收地形志鄴縣有石竇堰建義將軍叚勤據黎陽建義將軍葢亦後趙所置寕南將軍楊羣據桑壁後趙葢於征鎮安平之外又置四寕括地志易州遂成縣界有桑丘城又水經注常山蒲吾縣東南有桑中縣故城俗謂之石勒城劉國據陽城續漢志中山蒲隂縣有陽城據後劉國自繁陽引兵會石琨擊冉閔則此陽城乃繁陽城也叚龕據陳留姚弋仲據灄頭龕苦含翻灄書涉翻蒲洪據枋頭衆各數萬皆不附於閔勤末柸之子龕蘭之子也叚末柸先據令支叚蘭自宇文入趙王朗麻秋自長安赴洛陽秋承閔書誅朗部胡千餘人朗所部有胡兵千餘人閔命秋誅之朗奔襄國秋帥衆歸鄴帥讀曰率下同蒲洪使其子龍驤將軍雄迎擊獲之驤思將翻以為軍師將軍汝陰王琨及張舉王朗帥衆七萬伐鄴大將軍閔帥騎千餘與戰於城北閔操兩刃矛馳騎擊之兩刃矛者鋏之兩㫄皆利其刃騎奇寄翻操千髙翻所向摧陷斬首三千級琨等大敗而去閔與李農帥騎三萬討張賀度于石瀆閏月晉考異曰帝紀後云閏月三十國春秋皆云閏正月按長閏二月帝紀閏月有丁丑己丑按是歲正月癸酉朔若閏正月即無丁丑己丑今以長厯為据衛主鑒密遣宦者齎書召張沈等使乘虛襲鄴宦者以告閔農閔農馳還廢鑒殺之載記曰鑒立一百三日并殺趙主虎二十八孫盡滅石氏載記曰始勒以成帝咸和三年僣立二主四子凡二十三年姚弋仲子曜武將軍益曜武曜威葢皆石氏所置武衛將軍若帥禁兵數千斬闗奔灄頭弋仲帥衆討閔軍于混橋司徒申鍾等上尊號於閔閔以讓李農農固辭閔曰吾屬故晉人也今晉室猶存請與諸君分割州郡各稱牧守公矦守式又翻奉表迎晉天子還都洛陽尚書胡睦進曰陛下聖徳應天宜登大位晉氏衰㣲遠竄江表豈能總馭英雄混一四海乎閔曰胡尚書之言可謂識機知命矣乃即皇帝位冉閔字永曽少字棘奴虎之養孫也父瞻本姓冉名良魏郡内黄人勒破陳午獲瞻時年十二命虎子之大赦改元永興國號大魏朝廷聞中原大亂復謀進取復扶又翻己丑以揚州刺史殷浩為中軍將軍假節都督揚豫徐兖青五州諸軍事為殷浩䘮師張本以蒲洪為氐王使持節征北大將軍都督河北諸軍事冀州刺史廣川郡公蒲健為假節右將軍監河北征討前鋒諸軍事襄國公去年蒲洪遣使來降今經畧中原故授任以懐來之使䟽吏翻監工銜翻姚弋仲蒲洪各有據闗右之志弋仲遣其子襄帥衆五萬擊洪洪迎擊破之斬獲三萬餘級洪自稱大都督大將軍大單于三秦王改姓苻氏洪以䜟文草付應王又其孫堅背有艸付字遂改姓苻氏苻上從竹者非單音蟬以南安雷弱兒為輔國將軍安定梁楞為前將軍領左長史楞盧登翻馮翊魚遵為右將軍領右長史風俗通宋公子魚之後以王父字為氏京兆叚陵為左將軍領左司馬天水趙俱隴西牛夷北地辛牢皆為從事中郎互酋毛貴為單于輔相互即氐字二月燕王雋使慕容霸將兵二萬自東道出徒河慕輿于自西道出蠮螉塞雋自中道出盧龍塞以伐趙杜佑曰盧龍塞在今平州城西北二百里以慕容恪鮮于亮為前驅命慕輿埿槎山通道槎仕下翻邪斫木曰槎留世子􅁮守龍城以内史劉斌為大司農斌音彬與典書令皇甫真留統後事霸軍至三陘樂安城在遼西遼陽縣東魏收地形志海陽縣有横山葢即三陘之地陘音形趙征東將軍鄧恒惶怖焚倉庫弃安樂遁去安樂當作樂安果如慕容霸所料怖普布翻與幽州刺史王午共保薊薊音計徒河南部都尉孫泳急入安樂撲滅餘火籍其榖帛霸收安樂北平兵糧安樂並當作樂安與雋㑹臨渠臨渠城臨泃渠泃水出右北平無終縣西山東南至雍奴縣入鮑丘水魏武征蹋頓從泃口鑿渠逕雍奴縣州以通河海者也泃古矦翻三月燕兵至無終王午留其將王佗以數千人守薊佗徒河翻與鄧恒走保魯口魏收地形志博陵郡饒陽縣有魯口城博陵郡唐為定州乙巳雋㧞薊執王佗斬之雋欲悉阬其士卒千餘人慕容霸諫曰趙為暴虐王興師伐之將以拯民於塗炭而撫有中州也今始得薊而阬其士卒恐不可以為王師之先聲也雋入都于薊中州士女降者相繼降戸江翻燕兵至范陽范陽太守李産欲為石氏拒燕為于偽翻衆莫為用乃帥八城令長出降范陽郡統涿良鄉方城長鄉道故安范陽容城八縣帥讀曰率雋復以産為太守産子績為幽州别駕弃其家從王午在魯口鄧恒謂午曰績鄉里在北績范陽人范陽在魯口之北父已降燕今雖在此恐終難相保徒為人累不如去之累力瑞翻去𦍑呂翻謂殺之也午曰此何言也夫以當今䘮亂䘮息浪翻而績乃能立義捐家情節之重雖古烈士無以過乃欲以猜嫌害之燕趙之士聞之謂我直相聚為賊了無意識衆情一散不可復集復扶又翻此為坐自屠潰也恒乃止午猶慮諸將不與已同心或致非意謂諸將殺之非午之意乃遣績歸績始辭午徃見燕王雋雋讓之曰卿不識天命弃職邀名今日乃始來邪對曰臣眷戀舊主志存徵節官身所在何事非君績謂其身為官身言委質事君身非我有也殿下方以義取天下臣未謂得見之晩也雋恱善待之雋以弟宜為代郡城郎此秦漢以來之代郡非後魏之代都此代郡治代後魏代都乃秦漢之平城也城郎城大皆鮮卑所置付以城郭之任郎主也孫泳為廣寗太守悉置幽州郡縣守宰甲子雋使中部俟釐慕輿句督薊中留事俟釐葢亦鮮卑部帥之稱俟渠之翻自將擊鄧恒於魯口軍至清梁魏收地形志髙陽蠡吾縣有清凉城水經注中山蒲陰縣東南有清梁亭恒將鹿勃早將數千人夜襲燕營鹿姓也風俗通後漢有巴郡太守鹿旗半已得入先犯前鋒都督慕容霸突入幕下霸起奮擊手殺十餘人早不能進由是燕軍得嚴謂得以嚴備也雋謂慕輿根曰賊鋒甚銳宜且避之根正色曰我衆彼寡力不相敵故乘夜来戰冀萬一獲利今求賊得賊正當擊之復何所疑復扶又翻王但安臥臣等自為王破之為于偽翻雋不能自安内史李洪從雋出營外屯髙冢上根帥左右精勇數百人從中牙直前擊早中牙雋所居也李洪徐整騎隊還助之騎奇寄翻早乃退走衆軍追擊四十餘里早僅以身免所從士卒死亡略盡雋引兵還薊雋之還薊亦鹿勃早有以挫其銳否則進攻魯口矣魏主閔復姓冉氏尊母王氏為皇太后立妻董氏為皇后子智為皇太子􅉙明裕皆為王􅉙明裕閔之三子以李農為太宰領太尉錄尚書事封齊王其子皆封縣公遣使者持節赦諸軍屯皆不從諸軍屯張沈及蒲洪等也麻秋說苻洪曰說輸芮翻冉閔石祗方相持中原之亂未可平也不如先取關中基業已固然後東爭天下誰敢敵之洪深然之旣而秋因宴鴆洪欲并其衆世子健收秋斬之洪謂健曰吾所以未入闗者以為中州可定今不幸為豎子所困中州非汝兄弟所能辦我死汝急入關言終而卒健代統其衆乃去大都督大將軍三秦王之號去𦍑呂翻稱晉官爵遣其叔父安來告䘮且請朝命朝直遥翻趙新興王祗即皇帝位于襄國春考異曰晉帝紀祗即位在閏月三十國晉秋皆在三月按十六國春秋祗稱帝拜姚弋仲苻健官而不言苻洪洪三月死故疑祗以三月即位改元永寕以汝隂王琨為相國六夷據州郡者皆應之六夷胡羯氐𦍑叚氏及已蠻也祗以姚弋仲為右丞相親趙王待以殊禮弋仲子襄雄勇多才略士民多愛之請弋仲以為嗣弋仲以襄非長子不許襄弋仲之第五子長知兩翻請者日以千數弋仲乃使之將兵將即亮翻祗以襄為驃騎將軍豫州刺史新昌公又以苻健為都督河南諸軍事鎮南大將軍開府儀同三司兖州牧略陽郡公夏四月趙主祗遣汝陰王琨將兵十萬伐魏魏主閔殺李農及其三子并尚書令王謨侍中王衍中常侍嚴震趙昇閔遣使臨江告晉曰使䟽吏翻逆胡亂中原今已誅之能共討者可遣軍來也朝廷不應五月廬江太守袁真攻魏合肥克之虜其居民而還還從宣翻又如字六月趙汝陰王琨進據邯鄲邯鄲音寒丹鎮南將軍劉國自繁陽㑹之繁陽縣漢屬魏郡晉屬頓丘郡隋廢繁陽入相州内黄縣魏衛將軍王㤗擊琨大破之死者萬餘人劉國還繁陽初叚蘭卒於令支叚蘭屯令支見上卷康帝建元元年令音鈴又郎定翻支音祁叚龕代領其衆因石氏之亂擁部落南徙秋七月龕引兵東據廣固龕自陳留而東據廣固自稱齊王八月代郡人趙榼帥三百餘家叛燕歸趙并州刺史張平榼苦合翻帥讀曰率燕王雋徙廣寗上谷二郡民於徐無徐無縣漢晉屬右北平郡後周廢入無終縣唐改無終為玉田縣屬薊州代郡民於凡城恐其復叛歸趙故徙之王朗之去長安也朗司馬杜洪據長安自稱晉征北將軍雍州刺史以馮翊張琚為司馬關西夷夏皆應之雍於用翻夏戶雅翻苻健欲取之恐洪知之乃受趙官爵趙主祗所授者也以趙俱為河内太守戍温牛夷為安集將軍戍懐安集將軍苻氏置以安集民夷為號温縣懐縣並屬河内郡温縣唐屬孟州懐縣故城在懐州武陟縣西治宮室於枋頭治直之翻課民種麥示無西意有知而不種者健殺之以狥旣而自稱晉征西大將軍都督關中諸軍事雍州刺史以武威賈𤣥碩為左長史略陽梁安為右長史叚純為左司馬辛牢為右司馬京兆王魚安定程肱胡文等為軍諮祭酒悉衆而西以魚遵為前鋒行至盟津盟讀曰孟為浮梁以濟遣弟輔國將軍雄帥衆五千自潼關入兄子揚武將軍菁帥衆七千自軹闗入從河南入潼關至華陰從河北入軹關自蒲津西渡河至渭北合兵以攻長安帥讀曰率下同臨别執菁手曰若事不捷汝死河北我死河南不復相見復扶又翻旣濟焚橋自帥大衆隨雄而進杜洪聞之與健書侮嫚之以張琚弟先為征虜將軍帥衆萬三千逆戰于潼闗之北先兵大敗走還長安洪悉召闗中之衆以拒健洪弟郁勸洪迎健洪不從郁帥所部降於健降户江翻下同健遣苻雄狥渭北氐酋毛受屯髙陵髙陵縣漢屬馮翊晉改曰髙陵屬京兆徐磋屯好畤磋倉何翻好畤縣前漢屬右扶風後漢晉省畤音止𦍑酋白犢屯黄白即黄白城酋慈由翻衆各數萬皆斬洪使使䟽吏翻遣子降於健苻菁魚遵所過城邑無不降附洪懼固守長安張賀度叚勤劉國靳豚㑹于昌城魏收地形志魏郡昌樂縣有昌城昌樂縣後魏太和二十一年分魏縣置靳居焮翻將攻鄴魏主閔自將擊之戰于蒼亭蒼亭在河上西南至東阿六十里自將即亮翻賀度等大敗死者二萬八千人追斬靳豚於陰安陰安縣漢屬魏郡晉屬頓丘郡劉昫曰陰安城在澶州頓丘縣北盡俘其衆而歸閔戎卒三十餘萬旌旗鉦鼓綿亘百餘里雖石氏之盛無以過也故晉散騎常侍隴西辛謐有髙名散悉亶翻騎奇寄翻歴劉石之世徵辟皆不就閔備禮徵為太常謐遺閔書遺于季翻以為物極則反致至則危戰國策曰物至而反冬夏是也致至則危累碁是也髙誘注曰冬至生夏至殺故曰反致極也君王功已成矣宜因茲大㨗歸身晉朝朝直遥翻必有由夷之廉享松喬之壽矣由夷許由伯夷也松喬赤松子王子喬也因不食而卒九月燕王雋南狥冀州取章武河間晉武帝㤗始元年分渤海置章武國五代志後魏以河間置瀛州統内有平舒縣舊置章武郡初勃海賈堅少尚氣節少詩照翻下同仕趙為殿中督趙亡堅弃魏主閔還鄉里擁部曲數千家燕慕容評狥勃海遣使招之堅終不降使䟽吏翻降户江翻評與戰擒之雋以評為章武太守封裕為河間太守雋與慕容恪皆愛賈堅之材堅時年六十餘恪聞其善射置牛百步上以試之堅曰少之時能令不中今老矣徃徃中之乃射再發少詩照翻中竹仲翻射而亦翻一矢拂脊一矢磨腹皆附膚落毛上下如一觀者咸服其妙雋以堅為樂陵太守治髙城髙城縣自漢以来屬勃海郡賢曰髙城故城在今滄州鹽山縣南苻菁與張先戰于渭北擒之三輔郡縣堡壁皆降冬十月苻健長驅至長安杜洪張琚奔司竹扶風􅉦厔縣有司竹園宋白曰􅉦在鄠􅉦厔之間漢官有竹丞魏置司守之官後魏有司竹都尉燕王雋還薊留諸將守之雋還至龍城謁陵廟十一月魏主閔帥步騎十萬攻襄國帥讀曰率騎奇寄翻下同署其子太原王𦙍為大單于驃騎大將軍以降胡一千配之為麾下單音蟬驃匹妙翻降户江翻光祿大夫韋謏諫曰胡羯皆我之仇敵謏蘇島翻閔先誅胡羯故謏云然今來歸附茍存性命耳萬一為變悔之何及請誅屏降胡去單于之號屏必郢翻去𦍑吕翻以防㣲杜漸閔方欲撫納羣胡大怒誅謏及其子伯陽為下降胡執𦙍降趙張本甲午苻健入長安以民心思晉乃遣參軍杜山伯詣建康獻㨗并修好於桓温於是秦雍夷夏皆附之夷夏皆附健以其歸晉也好呼到翻雍於用翻夏户雅翻趙凉州刺史石寕獨據上邽不下十二月苻雄擊斬之蔡謨除司徒三年不就職四年謨除司徒詔書屢下太后遣使諭意使䟽吏翻謨終不受於是帝臨軒遣侍中紀據黄門郎丁纂徵謨謨陳疾篤使主簿謝攸陳讓自旦至申使者十餘返而謨不至時帝方八嵗甚倦問左右曰所召人何以至今不來臨軒何時當竟太后以君臣俱疲乃詔必不來者宜罷朝朝直遥翻下同中軍將軍殷浩奏免吏部尚書江虨官虨逋閑翻㑹稽王昱令曹曰下令於尚書曹也昱時錄尚書六條事㑹工外翻蔡公傲違上命無人臣之禮若人主卑屈於上大義不行於下亦不知所以為政矣公卿乃奏謨悖慢傲上罪同不臣悖蒲内翻請送廷尉以正刑書謨懼帥子弟詣闕稽顙自到廷尉待罪帥讀曰率稽音啟殷浩欲加謨大辟辟毗亦翻㑹徐州刺史荀羡入朝羡自京口朝建康浩以問羡羡曰蔡公今日事危謂謨死也明日必有桓文之舉言將舉兵以問其罪浩乃止下詔免謨為庶人資治通鑑卷九十八
