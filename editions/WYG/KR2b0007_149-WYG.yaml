難知其分數不明故作準以代之準之聲明暢易達分寸又粗然弦以緩急清濁非管無以正也均其中弦令與黄鍾相得案畫以求諸律無不如數而應者矣音聲精微綜之者解晉書樂志宫中也中和之道無往而不理商强也謂金性堅强角觸也象諸陽觸物而生徵止也言物盛則止羽舒也陽氣将復萬物孳育而舒生宋白曰合宫通音謂之宫其音雄雄洪洪然開口吐聲謂之商其音鏘鏘倉倉然張牙湧唇謂之角其音喔喔礭礭然齒合唇開謂之徵其音倚倚􅕆􅕆然齒開唇聚謂之羽其音詡酗于吁然遂竭愚思思相吏翻鑽研甚久頗有所得夫準者所以代律取其分數調校樂器竊尋調聲之體宫商宜濁徵羽宜清徵陟里翻下同若依公孫崇止以十二律聲而云還相為宫還音旋清濁悉足唯黄鍾管最長故以黄鍾為宫則往往相順若均之八音猶須錯采衆音配成其美若以應鍾為宫㽔賔為徵則徵濁而宫清雖有其韻不成音曲若以中吕為宫則十二律中全無所取今依京房書中吕為宫乃以去滅為商執始為徵然後方韻而崇乃以中吕為宫猶用林鍾為徵何由可諧中吕陸徳明曰中音仲乂如字但音聲精微史𫝊簡略舊志準十三絃隠間九尺不言須柱以不不讀曰否今刑統疏議多用以否二字蓋當時常用疑辭也又一寸之内有萬九千六百八十三分微細難明仲儒私曾考驗準當施柱但前却柱中以約準分則相生之韻已自應合其中絃粗細粗讀曰麤須與琴宫相類施軫以調聲令與黄鍾相合中絃下依數畫六十律清濁之節其餘十二絃須施柱如筝即於中絃案盡一周之聲度著十二絃上著直略翻然後依相生之法以次運行取十二律之商徵商徵既定又依琴五調調聲之法以均樂器五調之調徒釣翻調聲之調如字然後錯采衆聲以文飾之若事有乖此聲則不和且燧人不師資而習火古者未有火化燧人氏始鑽燧出火教民熟食延夀不束修以變律延夀即京房之師焦延夀也言無所師承而變十二律為六十律也孔子曰自行束脩以上吾未嘗無誨焉朱元晦注曰脩脯也十脡為束古者相見必執贄以為禮束脩其至薄者也故云知之者欲教而無從心達者體知而無師茍有一毫所得皆闗心抱豈必要經師受然後為奇哉尚書蕭寶寅奏仲儒學不師受輕欲制作不敢依許事遂寢魏中尉東平王匡以論議數為任城王澄所奪憤恚復治其故棺匡造棺見一百四十七卷七年數所角翻恚於避翻復扶又翻治直之翻欲奏攻澄澄因奏匡罪狀三十餘條廷尉處以死刑處昌吕翻秋八月己未詔免死削除官爵以車騎将軍侯剛代領中尉騎奇寄翻三公郎中辛雄奏理匡曹魏置尚書三公郎以為歴奉三朝骨鯁之迹朝野具知朝直遥翻故髙祖賜名曰匡先帝既已容之於前陛下亦宜寛之於後若終貶黜恐杜忠臣之口未幾復除匡平州刺史幾居豈翻復扶又翻雄琛之族孫也辛琛見一百四十七卷天監六年琛丑林翻九月庚寅朔胡太后遊嵩髙癸巳還宫太后從容謂兼中書舍人楊昱曰親姻在外不稱人心從千容翻稱尺證翻卿有聞慎勿諱隠昱奏揚州刺史李崇五車載貨相州刺史楊鈞造銀食器餉領軍元乂相息亮翻太后召乂夫妻泣而責之泣而責之愛誨之意也乂由是怨昱昱叔父舒妻武昌王和之妹也和即乂之從祖從才用翻舒卒元氏頻請别居昱父椿泣責不聴元氏恨之會瀛州民劉宣明謀反事覺逃亡义使和及元氏誣告昱藏匿宣明且云昱父定州刺史椿叔父華州刺史津並送甲仗三百具謀為不逞華户化翻乂復構成之遣御仗五百人夜圍昱宅收之一無所獲太后聞其狀昱具對為元氏所怨太后解昱縛處和及元氏死刑復扶乂翻處昌吕翻既而乂營救之和直免官元氏竟不坐史言靈后昵庇元乂以自為患冬十二月癸丑魏任城文宣王澄卒任音壬卒子恤翻庚申魏大赦是嵗髙句麗王雲卒世子安立句如字又音駒麗力知翻魏以郎選不精大加沙汰以水淘去沙石謂之沙汰故以喻去不肖唯朱元旭辛雄羊深源子恭及范陽祖瑩等八人以才用見留餘皆罷遣深祉之子也正始之初羊祉鎮梁益普通元年春正月乙亥朔改元大赦丙子日有食之己夘以臨川王宏為太尉揚州刺史金紫光禄大夫王份為尚書左僕射份奐之弟也份彼陳翻王奐死于齊武帝永明十一年左軍将軍豫寧威伯馮道根卒五代志豫章郡建昌縣舊有豫寧縣宋白曰漢建安中分建昌立西安縣晉太康元年改為豫寧縣是日上春祠二廟帝立太廟祀太祖文皇帝以上為六親廟皆同一堂共庭而别室又有小廟太祖太夫人廟也非嫡故别立廟皇帝每祭太廟訖乃詣小廟亦以一太牢如太廟禮有二廟令掌廟事既出宫有司以聞上問中書舍人朱异曰吉凶同日今可行乎對曰昔衛獻公聞栁莊死不釋祭服而往記檀弓曰衛太史栁莊寢疾公曰若疾革雖當祭必告公再拜稽首請於尸曰有臣栁莊也者非寡人之臣社稷之臣也聞之死請往不釋服而往遂以襚之道根雖未為社稷之臣亦有勞王室臨之禮也上即幸其宅哭之甚慟髙句麗世子安遣使入貢二月癸丑以安為寧東将軍髙句麗王句音駒麗力知翻使疏吏翻遣使者江法盛授安衣冠劍佩魏光州兵就海中執之送洛陽魏皇興四年分青州置光州領東萊長廣東牟郡治掖魏太傅侍中清河文獻王懌美丰儀胡太后逼而幸之然素有才能輔政多所匡益好文學好呼到翻禮敬士人時望甚重侍中領軍将軍元乂在門下兼總禁兵恃寵驕恣志欲無極懌每裁之以法乂由是怨之衛将軍儀同三司劉騰權傾内外吏部希騰意奏用騰弟為郡人資乖越人非其才為乖資非其次為越懌抑而不奏騰亦怨之龍驤府長史宋維弁之子也宋弁見用于魏孝文帝驤思将翻長之兩翻懌薦為通直郎通直郎即通直散騎侍郎隋後遂為寄禄官浮薄無行行下孟翻乂許維以富貴使告司染都尉韓文殊父子謀作亂立懌周官有染人漢有平準令主練染作采色後魏置司染都尉後齊太府寺屬官有司染署令丞陸徳明染而艷翻劉音而險翻懌坐禁止案驗無反狀得釋維當反坐反坐誣告失實者以其所告之罪坐之乂言於太后曰今誅維後有真反者人莫敢告乃黜維為昌平郡守昌平縣漢屬上谷郡後魏置昌平郡屬燕州隋復廢郡為縣屬幽州乂恐懌終為己害乃與劉騰密謀使主食中黄門胡定自列主食主御食者也列陳也云懌貨定使毒魏主若已得為帝許定以富貴帝時年十一信之秋七月丙子太后在嘉福殿未御前殿乂奉帝御顯陽殿騰閉永巷門太后不得出懌入遇乂於含章殿後乂厲聲不聴懌入懌曰汝欲反邪乂曰乂不反正欲縛反者耳命宗士及直齋執懌衣袂将入含章東省魏置宗師宗士其屬也直齋直殿内齋閤者也屬直閣将引也送也使人防守之騰稱詔集公卿議論懌大逆衆咸畏乂無敢異者唯僕射新泰文貞公游肇抗言以為不可五代志新泰縣屬琅邪郡終不下署不下筆署名也乂騰持公卿議入俄而得可魏主可其奏也夜中殺懌於是詐為太后詔自稱有疾還政於帝幽太后於北宮宣光殿宫門晝夜長閉内外斷絶騰自執管鑰帝亦不得省見省悉景翻見賢遍翻裁聴𫝊食而已太后服膳俱廢不免飢寒乃歎曰養虎得噬我之謂矣又使中常侍賈粲侍帝書密令防察動止乂遂與太師髙陽王雍等同輔政帝謂乂為姨父乂與騰表裏擅權乂為外禦騰為内防常直禁省共裁刑賞政無巨細决於二人威振内外百僚重跡重直龍翻言懼之甚不敢妄舉足而行步步踏陳迹也朝野聞懌死莫不喪氣喪息浪翻胡夷為之􅋇面者數百人為于偽翻􅋇里之翻胡夷臨喪􅋇面而哭哀甚游肇憤邑而卒己夘江淮海並溢辛夘魏主加元服大赦改元正光魏相州刺史中山文莊王熙英之子也元英事魏孝文宣武數将兵有功相息亮翻與弟給事黄門侍郎略司徒祭酒纂自曹魏以來公府有東西閤祭酒皆為清河王懌所厚聞懌死起兵於鄴上表欲誅元乂劉騰纂亡奔鄴後十日長史栁元章等帥城人鼓譟而入帥讀曰率下同殺其左右執熙纂并諸子置於髙樓八月甲寅元乂遣尚書左丞盧同就斬熙於鄴街并其子弟熙好文學有風義好呼到翻名士多與之遊将死與故知書曰吾與弟俱䝉皇太后知遇兄據大州弟則入侍殷勤言色恩同慈母今皇太后見廢北宫太傅清河王横受屠酷横户孟翻主上幼年獨在前殿君親如此無以自安故帥兵民欲建大義於天下但智力淺短旋見囚執旋反也上慙朝廷下愧相知本以名義干心不得不爾流腸碎首復何言哉凡百君子各敬爾儀為國為身善勗名節復扶又翻為于偽翻下為知力為同聞者憐之熙首至洛陽親故莫敢視前驍騎将軍刁整獨收其尸而藏之驍堅堯翻騎奇寄翻整雍之孫也刁雍去晉入魏著功淮汝之間盧同希乂意窮治熙黨與治直之翻鎖濟隂内史楊昱赴鄴濟隂郡漢晉屬兖州魏屬西兖州濟子禮翻考訊百日乃得還任乂以同為黄門侍郎元略亡抵故人河内司馬始賔始賔與略縛荻筏夜渡孟津詣屯留栗法光家屯留縣自漢晉以來屬上黨郡姓譜栗姓栗陸氏之後漢長安富室有栗氏師古曰屯音純轉依西河太守刁雙匿之經年時購略甚急略懼求送出境雙曰會有一死所難遇者為知己死耳願不以為慮略固求南奔雙乃使從子昌送略渡江從才用翻遂來奔上封略為中山王為略後還魏張本雙雍之族孫也乂誣刁整送略并其子弟收繫之御史王基等力為辯雪乃得免甲子侍中車騎将軍永昌嚴侯韋叡卒五代志零陵郡零陵縣舊分置永昌縣諡法服敵公莊曰嚴威而不猛曰嚴騎奇寄翻時上方崇釋氏士民無不從風而靡獨叡自以位居大臣不欲與俗俯仰所行略如平日史言韋叡於事佛之朝矯之以正幾於以道事君者九月戊戌魏以髙陽王雍為丞相總攝内外與元乂同决庶務初柔然佗汗可汗納伏名敦之妻候吕陵氏生伏跋可汗及阿那瓌等六子可從刋入聲汗音寒瓌古回翻伏跋既立忽亡其幼子祖惠求募不能得有巫地萬言祖惠今在天上我能呼之乃於大澤中施帳幄祀天神祖惠忽在帳中自云恒在天上恒户登翻伏跋大喜號地萬為聖女納為可賀敦柔然之主曰可汗其正室曰可賀敦地萬既挾左道復有姿色伏跋敬而愛之信用其言干亂國政如是積嵗祖惠浸長語其母曰我常在地萬家未嘗上天上天者地萬教我也長知兩翻語牛倨翻上時掌翻其母具以狀告伏跋伏跋曰地萬能前知未然勿為讒也既而地萬懼譖祖惠於伏跋而殺之侯吕陵氏遣其大臣具列等絞殺地萬伏跋怒欲誅具列等會阿至羅入冦阿至羅虜之别種居北河之東世附於魏一曰阿至羅髙車種伏跋擊之兵敗而還還從宣翻又如字侯吕陵氏與大臣共殺伏跋立其弟阿那瓌為可汗阿那瓌立十日其族兄示𤼵帥衆數萬擊之帥讀曰率阿那瓌戰敗與其弟乙居伐輕騎奔魏騎奇寄翻示發殺侯吕陵氏及阿那瓌二弟史言柔然亂魏清河王懌死汝南王悦了無恨元乂之意以桑落酒候之水經注河東郡多徙民民有姓劉名墮者宿擅工釀採挹河流醖成芳酎懸食同枯枝之年排于桑落之辰故酒得其名香醑之色清白若滫漿焉别調氛氳不與他同蘭薫麝越自成馨邁方土之貢最為佳酌自王公庶友牽拂相招每云索郎索郎返語為桑落也更為籍徵之儁句中書之英談盡其私佞乂大喜冬十月乙夘以悦為侍中太尉悦就懌子亶求懌服玩不時稱㫖既遷延不以時納所納者又不稱悦意也稱尺證翻杖亶百下幾死幾居依翻柔然可汗阿那瓌将至魏魏主使司空京兆王繼侍中崔光等相次迎之賜勞甚厚魏主引見阿那瓌於顯陽殿勞力到翻見賢遍翻因置宴置阿那瓌位於親王之下宴将罷阿那瓌執啟立于座後詔引至御座前阿那瓌再拜言曰臣以家難難乃旦翻輕來詣闕本國臣民皆已逃散陛下恩隆天地乞兵送還本國誅翦叛逆收集亡散臣當統帥遺民奉事陛下帥讀曰率言不能盡别有啟陳仍以啟授中書舍人常景以聞景爽之孫也常爽見一百二十三卷宋文帝元嘉六年十一月己亥魏立阿那瓌為朔方公蠕蠕王賜以衣服軺車蠕人兖翻軺音遥禄恤儀衛一如親王時魏方彊盛於洛水橋南御道東作四館道西立四里有自江南來降者處之金陵館三年之後賜宅於歸正里自北夷降者處燕然館賜宅於歸徳里自東夷降者處扶桑館賜宅於慕化里自西夷降者處崦嵫館賜宅於慕義里四館皆因四方之地為名金陵在江南燕然在漠北扶桑在東日所出崦嵫在西日所入山海經曰大荒之中𤾉谷上有扶桑日所出也灰野之山有樹青葉赤華名曰若木日所入也生崐崘西鳥鼠山西南曰崦嵫淮南子曰經細栁西方之地崦嵫日所入也十洲記曰扶桑在碧海中長數千丈一千餘圍兩榦同根更相依倚是以名扶桑降户江翻處昌吕翻下同燕因肩翻崦依㢘翻又依檢翻嵫音兹及阿那瓌入朝以燕然館處之阿那瓌屢求返國朝議異同不决朝直遥翻阿那瓌以金百斤賂元乂遂聴北歸十二月壬子魏勑懐朔都督簡鋭騎二千䕶送阿那瓌達境首境首猶言界首也騎奇寄翻觀機招納若彼迎候宜賜繒帛車馬禮餞而返繒慈陵翻如不容受聴還闕庭其行裝資遣付尚書量給量音良辛酉魏以京兆王繼為司徒魏遣使者劉善明來聘始復通好自齊明帝建元二年盧昶北歸之後魏不復遣使南聘至是復通復扶又翻二年春正月辛巳上祀南郊置孤獨園於建康以收養窮民古者鰥寡孤獨廢疾者有養帝非能法古也祖釋氏須達多長者之為耳戊子大赦魏南秦州氐反魏𤼵近郡兵萬五千人近郡近輔諸郡也使懐朔鎮将楊鈞将之将息亮翻下同送柔然可汗阿那瓌返國尚書左丞張普惠上疏以為蠕蠕久為邊患今兹天降喪亂喪息浪翻荼毒其心蓋欲使之知有道之可樂革面稽首以奉大魏也樂音洛稽音啓陛下宜安民恭己以悦服其心阿那瓌束身歸命撫之可也乃更先自勞擾興師郊甸之内投諸荒裔之外救累世之勍敵資天亡之醜虜臣愚未見其可也勍渠京翻此乃邊将貪竊一時之功不思兵為凶器王者不得已而用之用老子語意况今旱暵方甚聖慈降膳暵呼旱翻乃以萬五千人使楊鈞為将欲定蠕蠕干時而動其可濟乎竊有顛覆之變楊鈞之肉其足食乎用左傳楚孫叔敖斥伍參語意宰輔專好小名好呼到翻不圖安危大計此微臣所以寒心者也且阿那瓌之不還負何信義臣賤不及議漢自議郎以上皆得預朝廷大議尚書二丞於當時位不為卑而以為賤不及議蓋自曹魏以後朝廷大議止及八坐以上文書所過文書皆過尚書二丞之手不敢不陳阿那瓌辭於西堂詔賜以軍器衣被雜采糧畜事事優厚采與綵同畜許救翻命侍中崔光等勞遣於外郭勞力到翻阿那瓌之南奔也其從父兄婆羅門帥衆數萬入討示發破之從才用翻帥讀曰率示發奔地豆干魏書曰地豆干國在室韋西千餘里地豆干殺之國人推婆羅門為彌偶可社句可汗魏收曰魏言安静也楊鈞表稱柔然已立君長長知兩翻恐未肯以殺兄之人郊迎其弟輕往虛返徒損國威自非廣加兵衆無以送其入北二月魏人使舊嘗奉使柔然者牒云具仁牒云姓具仁名魏書官氏志内入諸姓有牒云氏奉使疏吏翻往諭婆羅門使迎阿那瓌辛丑上祀明堂庚戌魏使假撫軍将軍邴虯討南秦叛氐姓譜邴即丙姓魏元乂劉騰之幽胡太后也右衛将軍奚康生預其謀乂以康生為撫軍大将軍河南尹仍使之領左右領仗身左右康生子難當娶侍中左衛将軍侯剛女剛子乂之妹夫也乂以康生通姻深相委託三人率多俱宿禁中時或迭出以難當為千牛備身御左右有千牛刀謂之防身刀千牛刀者利刀也取庖丁解數千牛而芒刃不頓為義千牛備身執千牛刀以侍左右者也康生性麤武言氣髙下乂稍憚之見于顔色見賢遍翻康生亦微懼不安甲午魏主朝太后于西林園文武侍坐酒酣迭舞朝直遥翻坐徂卧翻康生乃為力士儛蓋為勇士進退坐作之氣勢而舞也儛與舞同及折旋之際每顧視太后舉手蹈足瞋目頷首為執殺之勢折之舌翻瞋七入翻太后解其意而不敢言解户買翻日暮太后欲攜帝宿宣光殿侯剛曰至尊己朝訖嬪御在南宣光殿在洛陽北官元乂等幽胡太后於此魏主與嬪御居南宫故侯剛云然嬪毗賔翻何必留宿康生曰至尊陛下之兒随陛下将東西更復訪誰復扶又翻羣臣莫敢應太后自起援帝臂援于元翻引也下堂而去康生大呼唱萬嵗呼火故翻帝前入閤左右競相排閤不得閉康生奪難當千牛刀斫直後元思輔直後官名直閤之屬也乃得定帝既升宣光殿左右侍臣俱立西階下康生乗酒勢将出處分處昌吕翻分扶問翻為乂所執鎖於門下以此知一夫之勇終受制於人也光禄勲賈粲紿太后曰侍官懐恐不安言其心懐恐懼也紿徒亥翻陛下宜親安慰太后信之適下殿粲即扶帝出東序前御顯揚殿閉太后於宣光殿至晩乂不出令侍中黄門僕射尚書等十餘人就康生所訊其事處康生斬刑難當絞刑處昌吕翻乂與剛並在内矯詔决之康生如奏難當恕死從流難當哭辭父康生慷慨不悲曰我不反死汝何哭也時已昏闇有司驅康生赴市斬之尚食典御奚混與康生同執刀入内亦坐絞尚食典御唐為尚食奉御進御必辨時禁先嘗之難當以侯剛壻得留百餘日竟流安州魏顯祖皇興二年置安州治方城領密雲廣陽安樂郡久之乂使行臺盧同就殺之魏太祖既得中山将北還慮中原有變乃於鄴中山置行臺後因之以劉騰為司空八坐九卿常旦造騰宅坐徂卧翻造七到翻參其顔色然後赴省府亦有終日不得見者得或作能非也公私屬請屬之欲翻唯視貨多少舟車之利山澤之饒所在榷固刻剥六鎮交通互市嵗入利息以巨萬萬計巨萬萬萬也巨萬萬計者萬萬萬也少詩沼翻榷古岳翻逼奪鄰舍以廣其居逺近苦之京兆王繼自以父子權位太盛固請以司徒讓車騎大将軍儀同三司崔光騎奇寄翻夏四月庚子以繼為太保侍中如故繼固辭不許壬寅以崔光為司徒侍中祭酒著作如故魏牒云具仁至柔然婆羅門殊驕慢無遜避心責具仁禮敬具仁不屈婆羅門乃遣大臣丘升頭等将兵二千随具仁迎阿那瓌五月具仁還鎮還懐朔鎮也将息浪翻下同具道其狀阿那瓌懼不敢進上表請還洛陽辛巳魏南荆州刺史桓叔興據所部來降魏置南荆州見一百四十七卷天監十一年降户江翻下同從考異曰梁帝紀七月叔興帥衆降蓋記奏到之日今魏帝紀六月丁夘義州刺史文僧明此義州當置於齊安郡木蘭縣界蕭子顯齊志木蘭縣屬寧蠻左郡唐省木蘭縣入黄岡縣以下文裴邃復義州觀之恐義州與邊城皆置於安豐界邊城太守田守徳沈約志宋文帝元嘉十五年以豫部蠻民立邊城左郡酈道元曰安豐縣故城今邊城郡治也此時梁境未得至安豐五代志黄岡縣界舊有邊城郡此正田守徳所居之地擁所部降魏皆蠻酋也酋慈由翻魏以僧明為西豫州刺史守徳為義州刺史癸夘琬琰殿火延燒後宫三千間秋七月丁酉以大匠卿裴邃為信武将軍假節督衆軍討義州破魏義州刺史封夀於檀公峴水經注决水出廬江雩婁縣大别山注云俗謂之檀公峴蓋大别之異名也又北過安豐縣東安豐故城今邊城郡治也此魏邊城郡峴户典翻遂圍其城夀請降復取義州復扶又翻下聞復同魏以尚書左丞張普惠為行臺将兵救之不及棄考異曰普惠𫝊云城走今從裴邃𫝊以裴邃為豫州刺史鎮合肥邃欲絶夀陽隂結夀陽民李𤓰花等為内應邃已勒兵為期日恐魏覺之先移揚州云魏始於馬頭置戍如聞復欲修白捺故城馬頭置戍蓋即沈約志所謂馬頭太守治所而置之白捺當作馬頭東北或東南捺奴葛翻若爾便相侵逼此亦須營歐陽設交境之備今板卒已集板榦所以築城卒士卒也唯聴信還揚州刺史長孫雉謀於僚佐皆曰此無修白捺之意宜以實報之録事參軍楊侃曰白捺小城本非形勝邃好狡數好呼到翻今集兵遣移恐有他意雉大寤曰録事可亟作移報之侃報移曰彼之纂兵纂集也想别有意何為妄構白捺它人有心予忖度之詩巧言之辭度徒洛翻勿謂秦無人也左傳秦大夫繞朝之言邃得移以為魏人已覺即散其兵𤓰花等以失期遂相告發伏誅者十餘家稚觀之子長孫觀道生之孫見一百三十三卷宋鬱林王元徽元年侃播之子楊播見一百四十卷齊明帝建武二年初髙車王彌俄突死事見上卷天監十五年其衆悉歸嚈噠後數年嚈噠遣彌俄突弟伊匐帥餘衆還國伊匐擊柔然可汗婆羅門大破之婆羅門帥十部落詣凉州請降於魏柔然餘衆數萬相帥迎阿那瓌阿那瓌表稱本國大亂姓姓别居迭相抄掠當今北人鵠望待拯言鵠立而望魏拯救也嚈益涉翻噠當割翻又宅軌翻帥讀曰率降户江翻抄楚交翻乞依前恩給臣精兵一萬送臣磧北撫定荒民磧七迹翻詔付中書門下博議凉州刺史袁翻以為自國家都洛以來蠕蠕髙車迭相吞噬始則蠕蠕授首謂佗汗也事見一百四十七卷天監七年既而髙車被擒謂彌俄突也今髙車自奮於衰微之中克雪讐恥誠由種類繁多種章勇翻終不能相滅自二虜交鬬邊境無塵數十年矣此中國之利也今蠕蠕兩主相繼歸誠兩主謂阿那瓌婆羅門雖戎狄禽獸終無純固之節然存亡繼絶帝王本務若棄而不受則虧我大徳若納而撫養則損我資儲或全徙内地則非直其情不願亦恐終為後患劉石是也謂漢徙胡羯於内地至於晉世卒階劉石之亂且蠕蠕尚存則髙車猶有内顧之憂未暇窺窬上國若其全滅則髙車跋扈之勢豈易可知易以䜴翻今蠕蠕雖亂而部落猶衆處處棊布以望舊主髙車雖彊未能盡服也愚謂蠕蠕二主並宜存之居阿那瓌於東處婆羅門於西分其降民各有攸屬阿那瓌所居非所經見不敢臆度婆羅門請修西海故城以處之處昌吕翻度徒洛翻西海在酒泉之北去髙車所居金山千餘里此西海非王莽所置西海郡之西海但言在酒泉之北則别有西海故城也按北史蠕蠕𫝊西海郡即漢晉舊鄣袁翻又曰直張掖西北千二百里又按晉志漢獻帝興平二年武威太守張稚請置西海郡於居延蓋此即漢晉舊鄣也金山形如兜鍪其後突厥居金山之陽即此山實北虜往來之衝要土地沃衍大宜耕稼宜遣一良将配以兵仗監䕶婆羅門将即亮翻監工銜翻因令屯田以省轉輸之勞其北則臨大磧野獸所聚磧七迹翻使蠕蠕射獵彼此相資足以自固外以輔蠕蠕之微弱内亦防髙車之畔援韓詩云畔援武强也鄭𤣥云跋扈也此安邊保塞之長計也若婆羅門能收離聚散復興其國者復扶又翻漸令北轉徙度流沙則是我之外藩髙車勍敵勍渠京翻西北之虞可以無慮如其姦回反覆不過為逋逃之冦於我何損哉朝議是之朝直遥翻九月柔然可汗俟匿伐詣懐朔鎮請兵且迎阿那瓌俟匿伐阿那瓌之兄也冬十月録尚書事髙陽王雍等奏懐朔鎮北吐若奚泉原野平沃請置阿那瓌於吐若奚泉吐若奚泉在懐朔鎮北無結山下婆羅門於故西海郡令各帥部落收集離散阿那瓌所居既在境外宜少優遣少詩沼翻婆羅門不得比之其婆羅門未降以前蠕蠕歸化者悉令州鎮部送懐朔鎮以付阿那瓌詔從之為阿那瓌婆羅門皆叛去張本十一月癸丑魏侍中車騎大将軍侯剛加儀同三司騎奇寄翻魏以東益南秦氐皆反庚辰以秦州刺史河間王琛為行臺以討之琛恃劉騰之勢琛求為劉騰養子見上卷天監十七年琛丑林翻貪暴無所畏忌大為氐所敗敗補邁翻中尉彈奏彈徒丹翻會赦除名尋復王爵魏以安西将軍元洪超兼尚書行臺詣敦煌安置柔然婆羅門敦徒門翻三年春正月庚子以尚書令袁昂為中書監吳郡太守王暕為尚書左僕射暕古限翻辛亥魏主耕籍田魏宋雲與惠生自洛陽西行四千里至赤嶺乃出魏境赤嶺在唐鄯州鄯城縣西二百餘里又西行再朞至乾羅國而還二月達洛陽得佛經一百七十部魏遣宋雲求佛經事始見上卷天監十七年髙車王伊匐遣使入貢于魏匐蒲北翻使疏吏翻夏四月庚辰魏以伊匐為鎮西将軍西海郡公髙車王久之伊匐與柔然戰敗其弟越居殺伊匐自立五月壬辰朔日有食之既癸巳大赦冬十一月甲午領軍将軍始興忠武王憺卒憺徒敢翻又徒濫翻乙巳魏主祀圜丘初魏世祖以𤣥始厯浸疎宋文帝元嘉二十九年魏行𤣥始厯命更造新厯更工衡翻至是著作郎崔光表取盪冦将軍張龍祥等九家所上厯候驗得失合為一厯以壬子為元應魏之水徳壬癸水也水旺於子故以壬子為元上時掌翻命曰正光厯丙午初行正光厯大赦後考異曰魏律厯志云厯成會孝明帝加元服改元正光因命曰正光厯按帝紀正光元年七月辛夘加元服三年十一月丙午行正光厯今從之十二月乙酉魏以車騎大将軍尚書右僕射元欽為儀同三司騎奇寄翻太保京兆王繼為太傅司徒崔光為太保初太子統之未生也上養臨川王宏之子正徳為子正徳少麤險少詩照翻上即位正徳意望東宫及太子統生正徳還本賜爵西豐侯沈約宋志臨川郡有西豐縣正徳怏怏不滿意常蓄異謀怏於兩翻是嵗正徳自黄門侍郎為輕車将軍頃之亡奔魏自稱廢太子避禍而來魏尚書左僕射蕭寶寅上表曰豈有伯為天子父作揚州元年臨川王宏為揚州刺史弃彼密親逺投他國不如殺之由是魏人待之甚薄正徳乃殺一小兒稱為己子逺營𦵏地魏人不疑明年復自魏逃歸復扶又翻年考異曰梁書正徳𫝊普通六為輕車将軍頃之奔魏七年自魏逃歸魏書蕭衍𫝊正光二年弟子正徳來奔南史正徳𫝊普通三年為輕車将軍頃之奔魏又自魏逃歸六年随豫章王北侵輒棄軍走北史蕭寳寅𫝊正光四年表論考課後乃云表論正徳後乃云莫折大提反按大提反在正光五年唯南北史年月前後相近今從之上泣而誨之復其封爵為後正徳納侯景張本柔然阿那瓌求粟為種種章勇翻魏與之萬石婆羅門帥部落叛魏亡歸嚈噠魏以平西府長史代人費穆兼尚書右丞西北道行臺将兵討之魏收官氏志西方費連氏後改為費氏柔然遁去穆謂諸将曰戎狄之性見敵即走乗虚復出若不使之破膽終恐疲于奔命左傳巫臣遺子重子反書曰吾必使汝疲于奔命以死奔命者赴急之兵也復扶又翻乃簡練精騎伏于山谷以步兵之羸者為外營騎奇寄翻羸倫為翻柔然果至奮擊大破之婆羅門為凉州軍所擒送洛陽四年春正月辛夘上祀南郊大赦丙午祀明堂二月乙亥耕籍田柔然大飢阿那瓌帥其衆入魏境表求賑給帥讀曰率賑之忍翻己亥魏以尚書左丞元孚為行臺尚書持節撫諭柔然孚譚之孫也魏孝昌元年元譚為幽州都督後此三年按魏書譚太武之子蓋魏宗室多有同名者将行表陳便宜以為蠕蠕久來彊大昔在代京常為重備今天祚大魏使彼自亂亡稽首請服蠕人兖翻稽音啓朝廷鳩其散亡禮送令返宜因此時善思逺策昔漢宣之世呼韓欵塞漢遣董忠韓昌領邊郡士馬送出朔方因留衛助事見二十七卷漢宣帝甘露三年又光武時亦使中郎将段彬置安集掾史随單于所在參察動静事見四十四卷漢光武建武二十六年掾俞絹翻單音蟬今宜略依舊事借其閒地聴其田牧粗置官屬示相慰撫粗坐五翻嚴戒邊兵因令防察使親不至矯詐疎不容反叛最䇿之得者也魏人不從柔然俟匿伐入朝于魏朝直遥翻三月魏司空劉騰卒宦官為騰義息重服者四十餘人衰絰送𦵏者以百數朝貴送𦵏者塞路滿野衰倉回翻塞悉則翻夏四月魏元孚持白虎幡勞阿那瓌于柔𤣥懐荒二鎮之間懐荒鎮在柔𤣥鎮之東禦夷鎮之西勞力到翻阿那瓌衆號三十萬隂有異志遂拘留孚載以輼車應劭注漢帝曰轒輼匈奴車師古曰輼於云翻每集其衆坐孚東廂稱為行臺甚加禮敬引兵而南所過剽掠剽匹妙翻至平城乃聴孚還有司奏孚辱命抵罪甲申魏遣尚書令李崇左僕射元纂帥騎十萬擊柔然帥讀曰率騎奇寄翻阿那瓌聞之驅良民二千公私馬牛羊數十萬北遁崇追之三千餘里不及而還還從宣翻又如字纂使鎧曹參軍于謹帥騎二千追柔然至郁對原前後十七戰屢破之鎧可亥翻謹忠之從曾孫也于忠以保䕶胡太后恃功專恣從才用翻性深沈有識量涉獵經史少時屏居田里不求仕進沈持林翻少詩照翻屏必郢翻或勸之仕謹曰州郡之職昔人所鄙後漢梁竦曰州郡之職徒勞人耳台鼎之位須待時來纂聞其名而辟之後帥輕騎出塞覘候屬鐵勒數千騎奄至覘丑㢘翻又丑豔翻屬之欲翻髙車部或曰敕勒訛為鐵勒謹以衆寡不敵退必不免乃散其衆騎使匿叢薄之間又遣人升山指麾若部分軍衆者分扶問翻鐵勒望見雖疑有伏兵自恃其衆進軍逼謹謹以常乗駿馬一紫一騧騧古花翻鐵勒所識乃使二人各乗一馬突陣而出鐵勒以為謹也争逐之謹帥餘軍擊其追騎鐵勒遂走謹因得入塞李崇長史鉅鹿魏蘭根説崇曰昔縁邊初置諸鎮地廣人稀或徵𤼵中原彊宗子弟或國之肺腑寄以爪牙中年以來有司號為府户役同厮養説式芮翻厮音斯養余亮翻官婚班齒致失清流而本來族類各居榮顯顧瞻彼此理當憤怨宜改鎮立州分置郡縣凡是府户悉免為民入仕次敘一準其舊文武兼用威恩並施此計若行國家庶無北顧之慮矣崇為之奏聞事寢不報為後改鎮為州無及於事張本為于偽翻初元乂既幽胡太后常入直於魏主所居殿側曲盡佞媚帝由是寵信之乂出入禁中恒令勇士持兵以自先後恒户登翻先悉薦翻後胡茂翻時出休於千秋門外施木欄楯欄檻也楯食尹翻使腹心防守以備竊發士民求見者遥對之而已其始執政之時矯情自飾以謙勤接物時事得失頗以闗懐既得志遂自驕慢嗜酒好色貪吝寶賄與奪任情紀綱壊亂父京兆王繼尤貪縱與其妻子各受賂遺請屬有司好呼到翻遺于季翻屬之欲翻莫敢違者乃至郡縣小吏亦不得公選牧守令長率皆貪汚之人守式又翻令郎定翻長知兩翻由是百姓困窮人人思亂武衛将軍于景忠之弟也謀廢乂乂黜為懐荒鎮将将即亮翻宋白曰後魏懐荒禦夷二鎮皆在蔚州界及柔然入冦鎮民請糧景不肯給鎮民不勝忿遂反執景殺之未幾沃野鎮民破六韓拔陵聚衆反殺鎮将改元真王勝音升幾居豈翻魏收曰破六韓單于之苗裔也初呼㕑泉入朝于漢為魏武所留遣其叔父右賢王去卑監本國户魏氏方興率部南轉去卑遣弟右谷蠡王潘六奚帥軍北禦軍敗奚及五子俱沒于魏其子孫遂以潘六奚為氏後人遂誤以為破六韓又曰破洛汗彧考異曰魏帝紀正光五年破六汗拔陵反詔臨淮王討之五月彧敗削官按令狐徳棻周書賀拔勝𫝊衛可孤圍懐朔經年勝乃告急于彧然則拔陵反當在四年蓋帝紀因詔彧討拔陵而言之非拔陵于時始反也周書作破六韓今從之諸鎮華夷之民往往響應拔陵引兵南侵遣别帥衛可孤圍武川鎮北考異曰史孤作瓌今從周書又攻懐朔鎮尖山賀拔度拔及其三子允勝岳皆有材勇魏收志尖山縣屬神武郡薛居正五代史周密傳神武川屬應州令狐徳棻曰賀拔之先與魏氏同出隂山魏書官氏志内入諸姓有賀拔氏懐朔鎮将楊鈞擢度拔為統軍三子為軍主以拒之魏景明之初世宗命宦者白整為髙祖及文昭髙后鑿二佛龕於龍門山龕口含翻此龍門山即伊闕山也為于偽翻下復為同皆髙百尺髙居報翻永平中劉騰復為世宗鑿一龕復扶又翻至是二十四年凡用十八萬二千餘工而未成秋七月辛亥魏詔見在朝官依令七十合解者見賢遍翻七十而致仕合解所任可給本官半禄以終其身九月魏詔侍中太尉汝南王悦入居門下與丞相髙陽王雍參决尚書奏事冬十月庚午以中書監中衛将軍袁昂為尚書令即本號開府儀同三司本號中衛将軍號魏平恩文宣公崔光疾篤魏主親撫視之拜其子勵為齊州刺史為之撤樂罷遊眺丁酉光卒帝臨哭之慟為減常膳以光擁立之功也為于偽翻光寛和樂善樂音洛終日怡怡未嘗忿恚恚於避翻于忠元乂用事以光舊徳皆尊敬之事多咨决而不能救裴郭清河之死裴郭死見上卷天監十四年清河王懌死見上元年時人比之張禹胡廣光且死薦都官尚書賈思伯為侍講帝從思伯受春秋思伯雖貴傾身下士下遐稼翻或問思伯曰公何以能不驕思伯曰衰至便驕何常之有當時以為雅談十一月癸未朔日有食之甲辰尚書左僕射王暕卒暕古限翻梁初唯揚荆郢江湘梁益七州用錢交廣用金銀餘州雜以穀帛交易上乃鑄五銖錢肉好周郭皆備華昭曰肉錢形也好孔也杜佑曰内郭為肉外郭為好孟康曰周郭周帀為郭也肉疾僦翻好呼到翻别鑄無肉郭者謂之女錢民間私用女錢交易禁之不能止乃議盡罷銅錢十二月戊午始鑄鐵錢魏以汝南王悦為太保資治通鑑卷一百四十九
