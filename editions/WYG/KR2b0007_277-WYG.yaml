body:
  text: 資治通鑑巻二百七十七宋司馬光撰胡三省音註後唐紀起上章攝提格盡𤣥黓執徐六月凡二年有竒明宗聖德和武欽孝皇帝中之下長興元年是年二月方改元春正月董璋遣兵築七寨於劍門辛巳孟知祥遣趙季良如梓州修好先是董璋在東川與孟知祥鄰鎮而未嘗通問天成三年兩鎮因爭鹽利而有違言去年璋遣使求昏於知祥今知祥遣報使以修好兩釋嫌怨以從講解懼朝廷加兵也同舟遇風則胡越相應如左右手斯之謂矣安重誨患兩川之難制不能因其構隙而鬬之反從而合之可以為善謀國乎兵法曰合則能離之安重誨反是好呼到翻下同鴻臚少卿郭在徽奏請鑄當五千三千一千大錢朝廷以其指虛為實無識妄言左遷衞尉少卿同正此唐官所謂員外置同正員者也吳徙平原王澈為德化王江州德化縣本漢尋陽縣宋白曰南唐所改二月乙未朔趙季良還成都謂孟知祥曰董公貪殘好勝志大謀短終為西川之患史紀趙季良之言為董璋攻孟知祥張本都指揮使李仁罕張業欲置宴召知祥先二日有尼告二將謀以宴日害知祥先悉薦翻知祥詰之無狀無謀害之狀也詰去吉翻丁酉推始言者軍校都延昌王行本腰斬之校户教翻都姓也春秋時鄭大夫公孫閼字子都子孫以為氏戊戌就宴盡去左右去羌吕翻獨詣仁罕第仁罕叩頭流涕曰老兵惟盡死以報德由是諸將皆親附而服之史言孟知祥能推心以得人死力壬子孟知祥董璋同上表言兩川聞朝廷於閬中建節綿遂益兵無不憂恐閬中建節謂置保寧軍於閬州綿遂益兵謂武䖍裕刺綿州夏魯竒帥遂州皆益兵戍之事並見上巻上年上以詔書慰諭之乙卯上祀圓丘大赦改元改元長興鳳翔節度使兼中書令李從曮入朝陪祀三月壬申制徙從曮為宣武節度使天成元年李從曮再鎮鳳翔至是徙鎮癸酉吳主立江都王璉為太子璉立展翻丙子以宣徽使朱𢎞昭為鳳翔節度使康福奏克保靜鎮斬李匡賔李匡賔據保靜鎮見上巻上年復以安義為昭義軍梁均王龍德二年晉王改昭義軍曰安義軍見二百七十一巻帝將立曹淑妃為后淑妃謂王德妃曰吾素病中煩中煩謂胷中煩熱倦於接對妹代我為之德妃曰中宫敵偶至尊誰敢干之庚寅立淑妃為皇后德妃事后恭謹后亦憐之初王德妃因安重誨得進常德之歐史曰德妃王氏邠州餅家女也有美色號花見羞少賣為梁將劉鄩侍兒鄩卒王氏無所歸是時帝正室夏夫人已卒方求别室有言王氏於安重誨者以告於帝而納之帝性儉約及在位久宫中用度稍侈重誨每規諫妃取外庫錦造地衣重誨切諫引劉后為戒謂莊宗劉皇后也妃由是怨之髙從誨遣使奉表詣吳告以墳墓在中國髙季興陜州硤石人也故云然恐為唐所討吳兵援之不及謝絶之髙季興請附於吳見二百七十五巻天成二年吳遣兵擊之不克董璋恐綿州刺史武䖍裕窺其所為按九域志綿州東南至梓州一百三十七里以其逼近故恐為所窺夏四月甲午朔表兼行軍司馬囚之府廷以兼行軍司馬誘之至梓州而囚之府廷東川府廷也宣武節度使苻習自恃宿將苻習本成德將從莊宗戰於河上故自恃為耆宿論議多抗安重誨重誨求其過失奏之丁酉詔習以太子太師致仕戊戌加孟知祥兼中書令夏魯竒同平章事初帝在真定莊宗同光二年帝鎮真定李從珂與安重誨飲酒爭言從琦毆重誨毆烏口翻重誨走免既醒悔謝重誨終銜之至是重誨用事自皇子從榮從厚皆敬事不暇不暇謂不敢自暇也時從琦為河中節度使同平章事重誨屢短之於帝帝不聽重誨乃矯以帝命諭河東牙内指揮使楊彦温使逐之河東當作河中是日承上戊戌故曰是日從珂出城閲馬彦温勒兵閉門拒之從珂使人扣門詰之曰詰去吉翻吾待汝厚何為如是對曰彦温非敢負恩受樞密院宣耳樞密院用宣三省用堂帖今堂帖謂之省劄宣謂之密劄請公入朝從珂止于虞鄉九域志虞鄉縣在河中府東六十里遣使以狀聞使者至壬寅帝問重誨曰彦温安得此言謂言受樞密院宣也對曰此姦人妄言耳宜速討之帝疑之欲誘致彦温訊其事訊問也誘音酉除彦温絳州刺史重誨固請發兵擊之乃命西都留守索自通索蘇各翻姓也步軍都指揮使藥彦稠將兵討之藥姓也漢有藥崧按薛史藥彦稠沙陀三部落人必非崧後帝令彦稠必生致彦温吾欲面訊之召從珂詣洛陽從珂知為重誨所構馳入自明加安重誨兼中書令李從珂至洛陽上責之使歸第絶朝請薛史曰歸清化里第辛亥索自通等拔河中斬楊彦温承安重誨指斬楊彦温以滅口為潞王殺藥彦稠索自通自投於水張本癸丑傳首來獻上怒藥彦稠不生致不生致楊彦温也深責之安重誨諷馮道趙鳳奏從珂失守宜加罪上曰吾兒為姦黨所傾未明曲直公輩何為發此言意不欲置之人間邪此皆非公輩之意也言二人為安重誨所使二人惶恐而退它日趙鳳又言之上不應明日重誨自言之上曰朕昔為小校校戸教翻家貧賴此小兒拾馬糞自贍以至今日為天子曽不能庇之邪卿欲如何處之於卿為便上亦以此語激安重誨處昌吕翻重誨曰陛下父子之間臣何敢言惟陛下裁之上曰使閒居私第亦可矣何用復言復扶又翻丙辰以索自通為河中節度使自通至鎮承重誨指籍軍府甲仗數上之上時掌翻以為從珂私造賴王德妃居中保䕶從珂由是得免士大夫不敢與從珂往來惟禮部郎中史館脩撰吕琦居相近時往見之從珂每有奏請皆咨琦而後行從珂居閒奏請咨吕琦而後行及其在位能厚琦而不能用琦何也戊午帝加尊號曰聖明神武文德恭孝皇帝安重誨言昭義節度使王建立過魏州有揺衆之語五月丙寅制以太傅致仕安重誨王建立交惡見上卷天成三年董璋閲集民兵皆剪髪黥面復於劍門北置永定闗布列烽火復扶又翻孟知祥累表請割雲安等十三鹽監𨽻西川雲安縣漢巴郡胊䏰縣地周武帝改為雲安縣屬巴東郡唐屬夔州後改為雲安監又夔州大昌縣萬州南浦縣漁陽監皆有鹽官𨽻寧江軍巡屬而所謂十三監未知盡在何所以鹽直贍寧江屯兵辛卯許之六月癸巳朔日有食之辛亥敕防禦團練使刺史行軍司馬節度副使自今皆朝廷除之諸道無得奏薦董璋遣兵掠遂閬鎮戍秋七月戊辰兩川以朝廷繼遣兵屯遂閬復有論奏復扶又翻自是東北商旅少敢入蜀少詩沼翻八月乙未捧聖軍使李行德按五代㑹要周應順元年改龍武神武四十指揮為捧聖左右軍據此則是時先已有捧聖軍矣宋白曰長興三年改在京龍武神武四十指揮為捧聖左右軍十將張儉引告密人邊彦温告安重誨發兵云欲自討淮南因天成二年安重誨常有伐吳之議遂以是誣告之又引占相者問命相息亮翻帝以問侍衞都指揮使安從進藥彦稠二人曰此姦人欲離間陛下勲舊耳間古莧翻重誨事陛下三十年梁均王貞明二年帝始為安國節度以安重誨為中門使至是纔十六年葢帝與重誨皆應州人其相從久矣幸而富貴何苦謀反臣等請以宗族保之帝乃斬彦温召重誨慰撫之君臣相泣葢是時安重誨之跡已危矣以前忠武節度使張延朗行工部尚書充三司使三司使之名自此始自宋熈寧以前三司使位亞執政專制國計權任重矣吳徐知誥以海州都指揮使王傳拯有威名得士心值團練使陳宣罷歸知誥許以傳拯代之既而復遣宣還海州徴傳拯還江都傳拯怒以為宣毁之己亥帥麾下入辭宣帥讀曰率因斬宣焚掠城郭帥其衆五千來奔知誥曰是吾過也免其妻子漣水制置使王巖將兵入海州漣水至海州一百八十里以巖為威衞大將軍知海州傳拯綰之子也吳先以王綰知海州楊隆演之建國也加鎮東大將軍其季父輿為光州刺史傳拯遣間使持書至光州間古莧翻使疏吏翻輿執之以聞因求罷歸以兄子外叛身居邊郡心迹危疑故求罷歸知誥以輿為控鶴都虞候時政在徐氏典兵宿衞者尤難其人知誥以輿重厚慎密故用之壬寅趙鳳奏竊聞近有姦人誣陷大臣揺國柱石行之未盡言未盡行誅也帝乃收李行德張儉皆族之立皇子從榮為秦王丙辰立從厚為宋王董璋之子光業為宫苑使在洛陽璋與書曰朝廷割吾支郡為節鎮謂夏魯竒鎮遂州李仁矩鎮閬州又傳割綿龍也屯兵三千是殺我必矣汝見樞要為吾言樞要謂兩樞密董璋意專指安重誨為于偽翻如朝廷更發一騎入斜谷吾必反與汝訣矣騎竒寄翻斜余遮翻谷音浴光業以書示樞密承㫖李䖍徽未幾朝廷又遣别將荀咸乂將兵戍閬州幾居豈翻光業謂䖍徽曰此兵未至吾父必反吾不敢自愛言不敢愛其死也恐煩朝廷調發言恐須用兵調徒釣翻願止此兵吾父保無它䖍徽以告安重誨重誨不從璋聞之遂反利閬遂三鎮以聞利帥李彦琦閬帥李仁矩遂州夏魯竒且言已聚兵將攻三鎮重誨曰臣久知其如此陛下含容不討耳帝曰我不負人人負我則討之九月癸亥西川進奏官蘇愿白孟知祥云朝廷欲大發兵討兩川進奏官在京師故以其事白其主帥知祥謀於副使趙季良季良請以東川兵先取遂閬然後併兵守劍門則大軍雖來吾無内顧之憂矣兩川同心協力守險則西川無内顧之憂知祥從之遣使約董璋同舉兵璋移檄利閬遂三鎮數其離間朝廷數所具翻間古莧翻下無間同引兵擊閬州九域志梓州東北至閬州三百九里庚午知祥以都指揮使李仁罕為行營都部署漢州刺史趙廷隠副之簡州刺史張業為先鋒指揮使將兵三萬攻遂州九域志遂州北至梓州二百五里别將牙内都指揮使矦𢎞實先登指揮使孟思恭將兵四千㑹璋攻閬州安重誨久專大權中外惡之者衆惡烏路翻王德妃及武德使孟漢瓊浸用事數短重誨於上數所角翻重誨内憂懼表解機務上曰朕無間於卿誣罔者朕既誅之矣謂李行德張儉也卿何為爾甲戌重誨復面奏曰復扶又翻臣以寒賤致位至此忽為人誣以反非陛下至明臣無種矣種章勇翻由臣才薄任重恐終不能鎮浮言願賜一鎮以全餘生上不許重誨求之不已上怒曰聽卿去朕不患無人前成德節度使范延光勸上留重誨且曰重誨去誰能代之上曰卿豈不可延光曰臣受驅策日淺且才不逮重誨何敢當此上遣孟漢瓊詣中書議重誨事馮道曰諸公果愛安令時安重誨兼中書令故稱之宜解其樞務為便馮道肯發此言葢知之矣趙鳳曰公失言乃奏大臣不可輕動東川兵至閬州諸將皆曰董璋久蓄反謀以金帛㗖其士卒㗖徒濫翻鋭氣不可當宜深溝髙壘以挫之不過旬日大軍至賊自走矣李仁矩曰蜀兵懦弱安能當我精卒遂出戰兵未交而潰歸董璋晝夜攻之庚辰城陷殺仁矩滅其族初璋為梁將指揮使姚洪嘗𨽻麾下至是將兵千人戍閬州璋密以書誘之洪投諸厠誘音酉城陷璋執洪而讓之曰吾自行間奬拔汝行戸剛翻今日何相負洪曰老賊汝昔為李氏奴董璋先為汴富人李讓家僮掃馬糞得臠炙感恩無窮臠力兖翻肉作片也炙之夜翻燔肉也今天子用汝為節度使何負於汝而反邪汝猶負天子吾受汝何恩而云相負哉汝奴才固無恥吾義士豈忍為汝所為乎吾寧為天子死寧為于偽翻不能與人奴並生璋怒然鑊於前鑊戸郭翻鼎大無足曰鑊然燒也令壯士十人刲其肉自啗之刲涓畦翻割也洪至死罵不絶聲帝置洪二子於近衞厚給其家甲申以范延光為樞密使安重誨如故言雖進用范延光而安重誨職任如故丙戌下制削董璋官爵興兵討之丁亥以孟知祥兼西南供饋使孟知祥之兵已攻遂州朝廷豈不知之邪猶欲懐輯之以離董璋之交耳唇亡齒寒已了了於知祥胸中此策安所施哉以天雄節度石敬瑭為東川行營都招討使節度之下當有使字蜀本有使字以夏魯竒為之副璋使孟思恭分兵攻集州集州本漢宕渠縣宇文周置集州隋廢為難江縣唐復置集州宋熈寧五年復廢州為難江縣屬巴州九域志縣在州北一百六十里思恭輕進敗歸璋怒遣還成都知祥免其官戊子以石敬瑭權知東川事庚寅以右武衞上將軍王思同為西都留守兼行營馬步都虞候為伐蜀前鋒漢主遣其將梁克貞李守鄘攻交州拔之執靜海節度使曲承美以歸唐末曲顥據交州至承美而敗以其將李進守交州冬十月癸巳李仁罕圍遂州夏魯竒嬰城固守孟知祥命都押牙髙敬柔帥資州義軍二萬人築長城環之帥讀曰率環音宦魯竒遣馬軍都指揮使康文通出戰文通聞閬州陷遂以其衆降於仁罕戊戌董璋引兵趣利州九域志閬州西北至利州二百四十里趣七喻翻下同遇雨糧運不繼還閬州知祥聞之驚曰比破閬中比毗至翻正欲徑取利州其帥不武必望風自遁利帥李彦琦帥所類翻吾獲其倉廩據漫天之險漫天寨在利州北有小漫天大漫天二寨北軍終不能西救武信武信軍遂州今董公僻處閬州逺棄劍閣非計也處昌召翻欲遣兵三千助守劍門璋固辭曰此已有備為劍門失守張本錢鏐因朝廷冊閩王使者裴羽還裴羽葢冊閩王延鈞者也還從宣翻又如字附表引咎其子傳瓘及將佐屢為鏐上表自訢為于偽翻癸卯敕聽兩浙綱使自便繫治兩浙綱使見上巻上年以宣徽北院使馮贇為左衞上將軍北都留守丁未族誅董光業以其父璋反也楚王殷寢疾遣使詣闕請傳位於其子希聲朝廷疑殷已死辛亥以希聲為起復武安節度使兼侍中孟知祥以故蜀鎮江節度使張武為峽路行營招收討伐使將水軍趣夔州前蜀置鎮江軍於夔州張武其舊帥也趣七喻翻以左飛棹指揮使袁彦超副之天成元年孟知祥置左右飛棹六營癸丑東川兵陷徴合巴蓬果五州徧考隋唐地理志五代職方考元豐九域志皆無徴州按東川之兵時自遂閬東畧九域志合州在遂州東二百二十里果州在遂州東南一百八十里巴州在閬州東二百四十五里蓬州在果州東北一百八十五里徴州必在遂合果三州之間丙辰吳左僕射同平章事嚴可求卒嚴可求忠於徐氏者也徐温既卒可求相吳坐視徐知詢之廢不能出一計權不在焉故也徐知誥以其長子大將軍景通為兵部尚書叅政事知誥將出鎮金陵故也漢將梁克貞入占城取其寶貨以歸占城國在西南海上其地方千里東至海西至雲南南鄰真臘北抵驩州其人俗與大食同其乗象馬其食稻米十一月戊辰張武至渝州刺史張環降之遂取瀘州九域志渝瀘二州相去七百餘里降戸江翻瀘音盧遣先鋒將朱偓分兵趣黔涪九域志涪州西至渝州三百四十里東南至黔州四百九十里將即亮翻趣七喻翻黔其今翻涪音浮己巳楚王殷卒年七十九遺命諸子兄弟相繼置劍於祠堂曰違吾命者戮之為殷諸子爭國以至于亡張本諸將議遣兵守四境然後發喪兵部侍郎黄損曰吾喪君有君用左傳語吾喪息浪翻何備之有宜遣使詣鄰道告終稱嗣而已石敬瑭入散闗階州刺史王𢎞贄瀘州刺史馮暉與前鋒馬步都虞候王思同步軍都指揮使趙在禮引兵出人頭山後過劍門之南還襲劍門克之殺東川兵三千人獲都指揮使齊彦温據而守之暉魏州人也甲戍𢎞贄等破劍州而大軍不繼乃焚其廬舍取其資糧還保劍門今利州昭化縣南有白衞嶺與劍門相接九域志劍州東北至劍門五十五里考異曰實録軍前奏今月十三日王𢎞贄馮暉自利州入山路出劍門闗外倒下殺董璋把闗兵士約三千人獲都指揮使齊彦温大軍進攻入劍門次又丙戌奏今月十七日收下劍州破賊千餘人獲指揮使劉太李昊蜀髙祖實録己卯東川告急今月十八日北軍自白衞嶺人頭山後過從小劍路至漢源驛出頭倒入劍門打破闗寨掩捉彦温及將士五百餘人遂相次構喚大軍據闗下營又龐福誠謝鍠相謂曰北軍昨來既得闗寨之後隔一日大軍曽下至劍州而乃搬運糧食燒舍自驚還奔闗寨十國紀年後蜀史壬申𢎞贄暉襲陷劍門癸酉攻焚劍州取糧還屯劍門己卯東川告急使至成都知祥命牙内都指揮使李肇帥兵五千赴援董璋自閬州帥兩川兵屯木馬寨先是龎福誠謝鍠屯閬州北來蘇寨聞劍門陷懼北軍據劍州帥部兵千餘人由間道先董璋至劍州壁于衙城後士卒方食北軍萬餘人自北山馳下福誠等趨河橋迎擊之北軍小却福誠帥數百人夜升北山顛轉至北軍壁外大呼譟鍠命將士以弓弩短兵急擊之北軍驚擾棄戈甲而遁鍠追襲之北軍退保劍門十餘日不窺劍州按劍門至成都尚十許程若十八日劍門失守何得二十日孟知祥已聞之邪今從實録十三日壬申為定若隔一日下至劍州則十五日甲戌非十七日也葢思同等以大軍未至故收糧燒舍還保劍門故福誠等得復入劍州李昊叙事甚詳無執劉太事今刪之晉髙祖實録云甲申平劍州破賊千餘人尤誤也乙亥詔削孟知祥官爵己卯董璋遣使至成都告急知祥聞劍門失守大懼曰董公果誤我庚辰遣牙内都指揮使李肇將兵五千赴之戒之曰爾倍道兼行先據劍州北軍無能為也又遣使詣遂州令趙廷隠將萬人㑹屯劍州時趙廷隠與李仁罕圍遂州孟知祥知夏魯竒無能為而劍閣之險不可不爭故使趙廷隠赴之又遣故蜀永平節度使李筠將兵四千趣龍州守要害防唐兵由鄧艾故道而入蜀也史言孟知祥慮患之周時天寒士卒恐懼觀望不進廷隠流涕諭之曰今北軍勢盛汝曹不力戰却敵則妻子皆為人有矣衆心乃奮蜀兵皆亡國之餘王衍之亡也蜀人妻子係虜者多矣趙廷隠以其所經見實利害告之夫安得而不奮董璋自閬州將兩川兵屯木馬寨木馬寨在閬州西北劍州東南宋白曰梁大同中於巴嶺側近立東巴州治木馬按木馬地名在今洋州界無復遺址先是西川牙内指揮使太谷龎福誠昭信指揮使謝鍠屯來蘇村益昌江東越大山數重有狹徑名來蘇蜀人于江西置柵守之度江出劍門南二十里至青强店與官路合九域志蓬州儀隴縣有來蘇鎮即其地鍠戸盲翻聞劍門失守相謂曰使北軍更得劍州則二蜀勢危矣遽引部兵千餘人間道趣劍州始至間古莧翻趣七喻翻下同官軍萬餘人自北山大下㑹日暮二人謀曰衆寡不敵逮明則吾屬無遺矣福誠夜引兵數百升北山大譟於官軍營後鍠帥餘衆操短兵自其前急擊之帥讀曰率操七刀翻官軍大驚空營遁去復保劍門十餘日不出孟知祥聞之喜曰吾始謂𢎞贄等克劍門徑據劍州堅守其城或引兵直趣梓州董公必棄閬州奔還我軍失援亦須解遂州之圍如此則内外受敵兩川震動勢可憂危今乃焚毁劍州運糧東歸劍門頓兵不進吾事濟矣孟知祥喜兵勢之小寛自言其料敵方畧此如棊工之説棊耳官軍分道趣文州將襲龍州自文州界青塘嶺至龍州一百五十里郡志云自北至南者右肩不得易所負謂之左擔路鄧艾伐蜀所由之路也為西川定逺指揮使潘福超義勝都頭太原沙延祚所敗姓苑云沙姓神農夙沙氏之後此傅㑹之説耳甲申張武卒於渝州知祥命袁彦超代將其兵朱偓將至涪州武泰節度使楊漢賔棄黔南奔忠州九域志黔州北至忠州三百七十九里偓追至豐都舊唐書地理志曰豐都漢巴郡枳縣地後漢置平都縣隋義寧二年分臨江置豐都縣九域志豐都縣在忠州西九十二里還取涪州九域志忠州豐都縣西至涪州百許里涪音浮知祥以成都支使崔善權武泰留後董璋遣前陵州刺史王暉將兵三千㑹李肇等分屯劍州南山丙戌馬希聲襲位稱遺命去建國之制楚王建國見上巻天成二年去羌吕翻復藩鎮之舊契丹東丹王托雲自以失職突欲不得立見二百七十五卷天成元年帥部曲四十人越海自登州來奔九域志登州東北至海五里新唐志登州東北海行過大謝島龜歆島淤島烏湖島三百里北度烏湖海至馬石山東之都里鎮二百里東傍海壖過青泥浦桃花浦杏花浦石人汪槖馳彎烏骨江八百里乃南傍海壖過烏牧島貝江口椒島得新羅西北之長口鎮又過秦王石橋麻田島古寺島得物島千里至鴨渌江唐恩浦口乃東南陸行七百里至新羅王城自鴨渌江口舟行百餘里乃小舫沂流東北三十里至泊灼口得渤海之境又泝流五百里至丸都縣城故髙麗王都又東北沂流五百里至神州又陸行四百里至顯州天寶中王所都又正北如東六百里至勃海王城按契丹東丹王居扶餘城在唐髙麗扶餘川中考異曰實録按巴堅妻令元帥太子往勃海代慕華歸西樓欲立為契丹王而元帥太子既典兵柄不欲之勃海遂自立為契丹王謀害慕華其母不能止慕華懼遂航海内附按天皇王入汴猶求害東丹者誅之豈有在國欲殺之理今不取十二月壬辰石敬瑭至劍門乙未進屯劍州北山趙廷隠陳于牙城後山郭忱劍州靜照堂記曰前瞰巨澗後倚層巒又春風樓記曰邊山而立是州一逕坡陁中貫大溪太守之居已在平山内外居民悉在山上則劍州之山川可知矣陳讀曰陣下同李肇王暉陳于河橋按劍州無所謂河路振九國志曰王師陷劍門趙廷隠帥兵據石橋恐當作石橋敬瑭引步兵進擊廷隠廷隠擇善射者五百人伏敬瑭歸路按甲待之矛矟欲相及乃揚旗鼓譟擊之北軍退走顛墜下山俘斬百餘人敬瑭又使騎兵衝河橋李肇以强弩射之射而亦翻騎兵不能進薄暮敬瑭引去廷隠引兵躡之與伏兵合擊敗之敗補邁翻敬瑭還屯劍門癸卯夔州奏復取開州舊唐書地理志曰開州亦漢巴郡胊䏰縣地梁置永豐縣西魏改曰永寧隋開皇末改曰盛山縣唐武德初置開州時葢為蜀兵所陷而復取之也庚戌以武安節度使馬希聲為武安靜江節度使加兼中書令石敬瑭征蜀未有功使者自軍前來多言道險狹進兵甚難闗右之人疲於轉餉往往竄匿山谷聚為盜賊上憂之壬子謂近臣曰誰能辦吾事者吾當自行耳安重誨曰臣職忝機密軍威不振臣之罪也臣請自往督戰上許之重誨即拜辭癸丑遂行日馳數百里西方藩鎮聞之無不惶駭陜州保義軍華州鎮國軍同州匡國軍耀州順義軍鳳翔山南西道皆西方藩鎮也錢帛芻糧晝夜輦運赴利州人畜斃踣於山谷者不可勝紀踣蒲北翻勝音升時上已疎重誨石敬瑭本不欲西征及重誨離上側離力智翻乃敢累表奏論以為蜀不可伐上頗然之西川兵先戍夔州者千五百人上悉縱歸二年春正月壬戌孟知祥奉表謝表謝遣還戍兵而已遂劍之兵未嘗解也庚午李仁罕陷遂州夏魯竒自殺癸酉石敬瑭復引兵至劍州復扶又翻下同屯于北山孟知祥梟夏魯竒首以示之梟堅堯翻魯竒二子從敬瑭在軍中泣請往取其首葬之敬瑭曰知祥長者必葬而父長知兩翻而汝也豈不愈於身首異處乎言知祥若收葬之則身首猶合於一處若取葬其首而身在敵中必異處也既而知祥果收葬之敬瑭與趙廷隠戰不利復還劍門丙戌加髙從誨兼中書令東川歸合州于武信軍合州本武信巡屬東川先取合州今西川取遂州故歸之武信初鳳翔節度使朱𢎞昭諂事安重誨連得大鎮重誨過鳳翔𢎞昭迎拜馬首館於府舍館古玩翻延入寢室妻子羅拜奉進酒食禮甚謹重誨為𢎞昭泣言讒人交構幾不免賴主上明察得保宗族為于偽翻讒人謂李行德張儉等事見上年重誨既去𢎞昭即奏重誨怨望有惡言不可令至行營恐奪石敬瑭兵柄又遺敬瑭書言重誨舉措孟浪遺唯季翻孟浪猶言張大而無拘束也若至軍前恐將士疑駭不戰自潰宜逆止之敬瑭大懼即上言重誨至恐人情有變宜急徴還宣徽使孟漢瓊自西方還亦言重誨過惡有詔召重誨還二月己丑朔石敬瑭以遂閬既陷糧運不繼燒營北歸軍前以告孟知祥軍前謂趙廷隠李肇之軍知祥匿其書謂趙季良曰北軍漸進奈何季良曰不過綿州必遁知祥問其故曰我逸彼勞彼懸軍千里糧盡能無遁乎史言懸軍涉險糧道不繼為敵人所窺知祥大笑以書示之安重誨至三泉得詔亟歸過鳳翔朱𢎞昭不内重誨懼馳騎而東兩川兵追石敬瑭至利州劍州北至利州二百三十里壬辰昭武節度使李彦琦棄城走甲午兩川兵入利州孟知祥以趙廷隠為昭武留後孟知祥遂得據漫天之險如其宿規矣廷隠遣使密言於知祥曰董璋多詐可與同憂不可與共樂它日必為公患因其至劍州勞軍請圖之樂音洛勞力到翻并兩川之衆可以得志於天下知祥不許趙廷隠所以能拒石敬瑭者依險而戰也平原易地烏能當北兵就使殺董璋并兩川之衆亦不能得志於天下孟知祥之不許葢審已量彼也璋入廷隠營留宿而去廷隠歎曰不從吾謀禍難未已難乃旦翻庚子孟知祥以武信留後李仁罕孟知祥得遂閬二鎮就以與其將故李仁罕趙廷隠各竭其力為峽路行營招討使使將水軍東畧地辛丑以樞密使兼中書令安重誨為䕶國節度使安重誨還未至京師而除河中不容其入朝也趙鳳言於上曰重誨陛下家臣其心終不叛主但以不能周防為人所讒陛下不察其心死無日矣上以為朋黨不悦考趙鳳前後所言誠有黨安重誨之心明宗已累見其情而趙鳳言之不已乃所以速其死也乙巳趙廷隠李肇自劍州引還引還成都留兵五千戍利州丙午董璋亦還東川留兵三千戍果閬果閬二州名丁巳李仁罕陷忠州吳徐知誥欲以中書侍郎内樞使宋齊丘為内樞使即内樞密使之職齊丘自以資望素淺欲以退讓為髙謁歸洪州葬父宋齊丘本洪州進士因入九華山九華山在池州青陽縣界本名九子山李白以九峯如蓮花改為九華止于應天寺啟求隠居吳主下詔徴之知誥亦以書招之皆不至知誥遣其子景通自入山敦諭齊丘始還朝究觀宋齊丘晩年之心迹則始焉之所為者皆偽也朝直遥翻除右僕射致仕更命應天寺曰徴賢寺更工衡翻三月己未朔李仁罕陷萬州庚申陷雲安監九域志萬州在忠州東北二百八十六里雲安軍又在萬州東北二百五十七里監又在軍東北三十里其地産鹽故置監辛酉賜契丹東丹王托雲姓東丹名慕華以為懐化節度使瑞慎等州觀察使時置懐化軍於慎州瑞州領逺來一縣慎州領逢龍一縣葢皆後唐所置薛史瑞慎二州本遼東之地唐末為懐化節度余按唐貞觀十年以烏突汗達于部落置威州於營州之境後更名瑞州僑治良鄉之廣陽城武德初以速末烏素固部落置慎州僑治良鄉之故都鄉城其部曲及先所俘契丹將特哩衮賜姓名特哩衮姓狄名懐忠擒特哩衮見上天成三年李仁罕至夔州寧江節度使安崇阮棄鎮與楊漢賔自均房逃歸壬戌仁罕陷夔州孟知祥遂并有夔忠萬三州帝既解安重誨樞務乃召李從珂泣謂曰如重誨意汝安得復見吾安重誨欲殺從珂事見上元年丙寅以從珂為左衞大將軍壬申横海節度使同平章事孔循卒乙酉復以錢鏐為天下兵馬都元帥尚父吳越國王遣監門上將軍張籛往諭㫖以曏日致仕安重誨矯制也籛則前翻錢鏐致仕事見上巻天成四年丁亥以太常卿李愚為中書侍郎同平章事夏四月辛卯以王德妃為淑妃唐制因隋之舊貴妃淑妃賢妃各一人正一品時曹后自淑妃正位中宫故陞德妃為淑妃閩奉國節度使兼中書令王延稟聞閩王延鈞有疾以次子繼昇知建州留後帥建州刺史繼雄將水軍襲福州帥讀曰率癸卯延稟攻西門繼雄攻東門延鈞遣樓船指揮使王仁達將水軍拒之仁達伏甲舟中偽立白幟請降繼雄喜屏左右幟昌志翻降戸江翻屏必郢翻又卑正翻登仁達舟慰撫之仁達斬繼雄梟首於西門延稟方縱火攻城見之慟哭仁達因縱兵擊之衆潰左右以斛舁延稟而走斛槩量之器十斗為斛舁音余又羊茹翻甲辰追擒之延鈞見之曰果煩老兄再下王延稟此語見二百七十五巻天成二年延稟慙不能對延鈞囚于别室遣使者如建州招撫其黨其黨殺使者奉繼昇及弟繼倫奔吳越仁達延鈞從子也為延鈞忌仁達而殺之張本從才用翻以宣徽北院使趙延壽為樞密使己酉天雄節度使同平章事石敬瑭兼六軍諸衞副使辛亥以朱𢎞昭為宣徽南院使五月閩王延鈞斬王延稟於市復其姓名曰周彦琛遣其弟都教練使延政如建州撫慰吏民為王延政以建州與福州相攻張本丁卯罷畆税麴錢計畝税麴錢見上巻天成三年城中官造麴減舊半價鄉村聽百姓自造民甚便之己卯以孟漢瓊知内侍省事充宣徽北院使漢瓊本趙王鎔奴也時范延光趙延壽雖為樞密使懲安重誨以剛愎得罪愎蒲逼翻每於政事不敢可否獨漢瓊與王淑妃居中用事人皆憚之先是宫中須索稍踰常度重誨輒執奏由是非分之求殆絶先悉薦翻須求也索亦求也索山客翻分扶問翻至是漢瓊直以中宫之命取府庫物不復闗由樞密院及三司亦無文書所取不可勝紀勝音升辛巳以相州刺史孟鵠為左驍衞大將軍充三司使昭武留後趙廷隠自成都赴利州踰月請兵進取興元及秦鳳孟知祥以兵疲民困不許孟知祥量力而後動所以能跨有三蜀也䕶國節度使兼中書令安重誨内不自安表請致仕閏月庚寅制以太子太師致仕是日其子崇賛崇緒逃奔河中壬辰以保義節度使李從璋為䕶國節度使甲午遣步軍指揮使藥彦稠將兵趣河中揺于讒口遣藥彦稠以兵討安重誨安崇賛等至河中重誨驚曰汝安得來既而曰吾知之矣此非渠意為人所使耳渠猶言其也吾以死徇國夫復何言夫音扶復扶又翻乃執二子表送詣闕明日有中使至見重誨慟哭久之重誨問其故中使曰人言令公有異志朝廷已遣藥彦稠將兵至矣重誨曰吾受國恩死不足報敢有異志更煩國家發兵貽主上之憂罪益重矣崇賛等至陜有詔繫獄皇城使翟光鄴素惡重誨惡烏路翻帝遣詣河中察之曰重誨果有異志則誅之史言帝無决然殺重誨之㫖郭崇韜之死亦猶是也上無道揆下無法守無怪乎爾光鄴至河中李從璋以甲士圍其第自入見重誨拜于庭下重誨驚降堦答拜從璋奮檛擊其首妻張氏驚救亦檛殺之代考異曰五史闕文李從璋奮檛擊重誨于地重誨曰重誨死無恨但不與官家誅得潞王他日必為朝廷之患言終而絶按重誨自以私憾欲殺從珂當是時從珂未有跋扈之跡重誨何以知其為朝廷之患此恐是清泰篡立之後人譽重誨者造此語未可信也奏至己亥下詔以重誨離間孟知祥董璋錢鏐為重誨罪間古莧翻離間事並見上又誣其欲自擊淮南以圖兵柄因邊彦温所告而誣之遣元隨竊二子歸本道并二子誅之丙午帝遣西川進奏官蘇愿東川軍將劉澄各還本鎮諭以安重誨專命興兵致討今已伏辜六月乙丑復以李從珂同平章事充西都留守安重誨既死復用李從珂守長安丙子命諸道均民田税閩王延鈞好神仙之術道士陳守元巫者徐彦林與盛韜共誘之作寶皇宫極土木之盛薛史福州城中有王霸壇錬丹井壇旁有皁莢木久枯一旦忽生枝葉井中有白龜浮出掘地得石銘有王霸裔孫之文昶以為已應之于壇側建寳皇宫好呼到翻以守元為宫主陳守元盛韜等見信而薛文傑得行其姦妄矣史言閩政自是愈亂秋九月己亥更賜東丹慕華姓名曰李賛華是年三月慕華賜名今更賜姓吳鎮南節度使同平章事徐知諫卒以諸道副都綂鎮海節度使守中書令徐知詢代之賜爵東海郡王徐知誥之召知詢入朝也事見上巻天成四年知諫豫其謀知詢遇其喪於塗知諫之喪自洪州還而知詢往赴洪州故相遇于塗撫棺泣曰弟用心如此我亦無憾然何面見先王於地下乎先王謂徐温也辛丑加樞密使范延光同平章事辛亥敕解縱五坊鷹隼隼聳尹翻内外無得更進馮道曰陛下可謂仁及禽獸上曰不然朕昔嘗從武皇獵武皇晉王克用諡時秋稼方熟有獸逸入田中遣騎取之比及得獸餘稼無幾比必利翻幾居豈翻以是思之獵有損無益故不為耳冬十月丁卯洋州指揮使李進唐攻通州拔之洋州東南至通州七百三十九里先是蜀人葢嘗取通州故復攻抜之宋乾德二年改通州為達州以淮南有通州也壬午以王延政為建州刺史十一月甲申朔日有食之癸巳蘇愿至成都孟知祥聞甥妷在朝廷者皆無恙恙余亮翻遣使告董璋欲與之俱上表謝罪璋怒曰孟公親戚皆完固宜歸附璋已族滅謂朝廷族誅其子董光業也尚何謝為詔書皆在蘇愿腹中劉澄安得豫聞璋豈不知邪由是復為怨敵為董璋攻西川敗死張本復扶又翻乙未李仁罕自夔州引兵還成都孟知祥既盡得前蜀夔黔之土不復東畧吳中書令徐知誥表稱輔政嵗久請歸老金陵乃以知誥為鎮海寧國節度使鎮金陵餘官如故總録朝政如徐温故事徐温先鎮京口總録吳朝之政後徙金陵朝直遥翻以其子兵部尚書㕘政事景通為司徒同平章事知中外左右諸軍事留江都輔政徐知誥襲徐温之跡而景通襲知誥之跡吳祚因此移於李氏以内樞使同平章事王令謀為左僕射兼門下侍郎以宋齊丘為右僕射兼中書侍郎並同平章事兼内樞使以佐景通賜德勝節度使張崇爵清河王吳置德勝軍於廬州崇在廬州貪暴州人苦之屢嘗入朝厚以貨結權要由是常得還鎮為廬州患者二十餘年十二月甲寅朔初聽百姓自鑄農器并雜鐵器按五代㑹要雜鐵器謂燒器動使諸物熟鐵亦任百姓自煉徐無黨曰税農具錢至今因之每田二畝夏秋輸農具三錢武安靜江節度使馬希聲聞梁太祖嗜食雞慕之既襲位日殺五十雞為膳居喪無戚容庚申葬武穆王于衡陽馬殷諡武穆王衡陽本漢蒸陽縣吳分置臨蒸縣隋改臨蒸縣為衡陽縣唐屬衡州為治所將發引頓食雞􅌜數盤引讀曰靷􅌜黒角翻羮也前吏部侍郎潘起譏之曰昔阮籍居喪食蒸豚晉阮籍任情不羈而性至孝母終將葬食一蒸豚飲二斗酒然後臨决直言窮矣舉聲一號吐血數升毁瘠骨立殆至滅性然不可以訓也何代無賢癸亥徐知誥至金陵昭武留後趙廷隠白孟知祥以利州城塹已完頃在劍州與牙内都指揮使李肇同功事見上年十一月願以昭武讓肇知祥褒諭不許廷隠三讓癸酉知祥召廷隠還成都以肇代之閩陳守元等稱寶皇之命謂閩王延鈞曰茍能避位受道當為天子六十年延鈞信之丙子命其子節度副使繼鵬權軍府事延鈞避位受籙道名𤣥錫愛州將楊廷藝養假子三千人圖復交州漢交州守將李進知之受其賂不以聞是嵗廷藝舉兵圍交州舊唐書地理志交州西至愛州界小黄江口水路四百一十六里漢主遣承㫖程寶救之未至城陷進逃歸漢主殺之寶圍交州廷藝出戰寶敗死去年漢取交州今復失之三年春正月樞密使范延光言自靈州至邠州方渠鎮宋白曰通逺軍本靈州方渠鎮晉天福四年改為威州仍割木波馬嶺二鎮𨽻之周廣順二年避諱改為環州顯德四年降為通逺軍使臣及外國入貢者多為党項所掠請發兵擊之己丑遣靜難節度使藥彦稠前朔方節度使康福將步騎七千討党項党底朗翻乙未孟知祥妻福慶長公主卒歐史長興元年秋改封知祥妻瓊華長公主為福慶長公主長知兩翻孟知祥以朝廷恩意優厚而董璋塞綿州路不聽遣使入謝由成都趣劍利路由綿州塞悉則翻與節度副使趙季良等謀欲發使自峽江上表上時掌翻掌書記李昊曰公不與東川謀而獨遣使則異日負約之責在我矣乃復遣使語之復扶又翻語牛倨翻璋不從二月趙季良與諸將議遣昭武都監太原髙彦儔將兵攻取壁州舊唐書地理志壁州諾水縣後漢之宣漢縣梁分宣漢置始寧縣元魏分始寧置諾水縣唐武德初分巴東之始寧置壁州治諾水宋廢壁州以其地入巴州之曽口通江二縣以絶山南兵轉入山後諸州者山後諸州謂巴蓬果等州孟知祥謀於僚佐李昊曰朝廷遣蘇愿等西歸未嘗報謝今遣兵侵軼軼徒結翻公若不顧墳墓甥妷孟知祥之先墳墓在邢州龍岡縣其甥妷時皆仕于朝則不若傳檄舉兵直取梁洋安用壁州乎知祥乃止季良由是惡昊惡烏路翻辛未初令國子監校定九經雕印賣之印賣九經始此藥彦稠等奏破党項十九族俘二千七百人賜髙從誨爵勃海王吳徐知誥作禮賢院於府舍作之於金陵府舍聚圖書延士大夫與孫晟及海陵陳覺談議時事孟知祥三遣使説董璋説式芮翻以主上加禮於兩川茍不奉表謝罪恐復致討復扶又翻璋不從三月辛丑遣李昊詣梓州極論利害璋見昊詬怒不許詬古候翻又許候翻昊還還從宣翻又如字言於知祥曰璋不通謀議不通謀議猶今人言不容商量也且有窺西川之志公宜備之甲辰閩王延鈞復位王延鈞避位受籙見上年吳越武肅王錢鏐疾謂將吏曰吾疾必不起諸兒皆愚懦誰可為帥者衆泣曰兩鎮令公仁孝有功孰不愛戴天成三年錢鏐以兩鎮授傳瓘事見上卷按是年秋朝廷始加傳瓘中書令其下過呼之耳鏐乃悉出印鑰授傳瓘印吳越國印及鎮海鎮東印也鑰内外城諸門及宫門契鑰也曰將吏推爾宜善守之又曰子孫善事中國勿以易姓廢事大之禮時中國率數年一易姓錢鏐之意葢謂偏據一隅知以小事大而已茍中國有主則臣事之其自興自仆吾不問也庚戌卒年八十一傳瓘與兄弟同幄行喪内牙指揮使陸仁章曰令公嗣先王霸業將吏旦暮趨謁當與諸公子異處處昌吕翻乃命主者更設一幄扶傳瓘居之告將吏曰自今惟謁令公禁諸公子從者無得妄入從才用翻晝夜警衞未嘗休息陸仁章雖不學而其所為闇與趙熹合鏐末年左右皆附傳瓘獨仁章數以事犯之至是傳瓘勞之數所角翻勞力到翻仁章曰先王在位仁章不知事令公今日盡節猶事先王也先王謂鏐傳瓘嘉歎久之傳瓘既襲位更名元瓘兄弟名傳者皆更為元更工衡翻以遺命去國儀吳越建國見二百七十一卷梁均王龍德三年用藩鎮法除民田荒絶者租税荒者有主而不耕絶者戸絶而無主命處州刺史曹仲達權知政事置擇能院掌選舉殿最殿丁練翻以浙西營田副使沈崧領之内牙指揮使富陽劉仁把富陽縣本漢富春縣晉避鄭太后諱改名富陽後世遂因之九域志富陽縣屬杭州在州西南七十三里及陸仁章久用事仁章性剛仁把好毁短人皆為衆所惡惡烏路翻一日諸將共詣府門請誅之元瓘使從子仁俊諭之從才用翻曰二將事先王久吾方圖其功汝曹乃欲逞私憾而殺之可乎吾為汝王汝當禀吾命不然吾當歸臨安以避賢路錢氏本居臨安衆懼而退乃以仁章為衢州刺史仁把為湖州刺史中外有上書告訐者訐居謁翻元瓘皆置不問由是將吏輯睦初契丹錫里䇿稜特哩衮皆為趙徳鈞所擒錫里特哩衮契丹管軍頭目之稱被擒見上巻天成三年契丹屢遣使請之上謀於羣臣德鈞等皆曰契丹所以數年不犯邊數求和者以此輩在南故也縱之則邊患復生數所角翻復扶又翻上以問冀州刺史楊檀對曰䇿稜契丹之驍將曏助王都謀危社稷幸而擒之陛下免其死為賜已多契丹失之如喪手足喪息浪翻彼在朝廷數年知中國虛實若得歸為患必深彼纔出塞則南向發矢矣恐悔之無及上乃止檀沙陀人也楊檀後改名光逺上欲授李賛華以河南藩鎮羣臣皆以為不可上曰吾與其父約為昆弟故賛華歸我吾老矣後世繼體之君雖欲招之其可致乎夏四月癸亥以賛華為義成節度使為選朝士為僚屬輔之為選于偽翻賛華但優游自奉不豫政事上嘉之雖時有不法亦不問以莊宗後宫夏氏妻之五代㑹要莊宗昭容夏氏封虢國夫人薛史曰明宗入洛莊宗宫人數百悉令歸其骨肉惟夏氏無所歸明宗以夏魯竒是其同宗因命歸之今以妻賛華妻七細翻賛華好飲人血姬妾多刺臂以吮之婢僕小過或抉目或刀刲火灼好呼到翻刺七亦翻吮士兖翻抉於穴翻刲頃畦翻夏氏不忍其殘奏離昏為尼乙丑加宋王從厚兼中書令東川節度使董璋㑹諸將謀襲成都皆曰必克前陵州刺史王暉曰劍南萬里成都為大時方盛夏師出無名必無成功孟知祥聞之遣馬軍都指揮使潘仁嗣將三千人詣漢州詗之詗古永翻又休正翻璋入境破白楊林鎮白楊林鎮當在漢州界上執戍將武𢎞禮聲勢甚盛知祥憂之趙季良曰璋為人勇而無恩士卒不附城守則難克野戰則成擒矣今不守巢穴公之利也璋用兵精鋭皆在前鋒公宜以羸兵誘之以勁兵待之始雖小衂後必大捷此孫臏三駟之説也自古以來以此取勝者多矣楚以之破吳師而滅舒鳩周訪以之破杜曽而清襄沔王茂章以之斬朱友寧其策畧皆不出此羸倫為翻衂女六翻璋素有威名今舉兵暴至人心危懼公當自出禦之以彊衆心趙廷隠以季良言為然曰璋輕而無謀輕墟正翻舉兵必敗當為公擒之為于偽翻辛巳以廷隠為行營馬步軍都部署將三萬人拒之五月壬午朔廷隠入辭董璋檄書至又有遺季良廷隠及李肇書董璋書獨不及李仁罕者以趙季良者孟知祥之謀主趙廷隠李肇嘗與璋同禦石敬瑭干劍州故皆先以書誘之李仁罕未嘗共事故不及遺唯季翻誣之云季良廷隠與己通謀召己令來知祥以書授廷隠廷隠不視投之於地曰不過為反間令力呈翻下同間古莧翻欲令公殺副使與廷隠耳趙季良為節度副使故廷隠稱之再拜而行知祥曰事必濟矣肇素不知書視之曰璋教我反耳囚其使者然亦擁衆為自全計李肇時鎮利州璋兵至漢州潘仁嗣與戰于赤水大敗為璋所擒赤水在漢州東南璋遂克漢州癸未知祥留趙季良髙敬柔守成都自將兵八千趣漢州至彌牟鎮九域志成都府新都縣有彌牟鎮趣七喻翻趙廷隠陳於鎮北陳讀曰陣下同甲申遲明遲直二翻廷隠陳於雞蹤橋薛史孟知祥傳云知祥親帥其衆與趙廷隠等逆戰於金雁橋璋軍大敗按金雁橋在漢州雒縣南璋兵既敗知祥追之夕宿雒縣豈金雁橋即雞蹤橋邪義勝定逺都知兵馬使張公鐸陳於其後俄而璋望西川兵盛退陳於武侯廟下諸葛武侯有功於蜀蜀人所在為立廟璋帳下驍卒大譟曰日中曝我輩何為曝步木翻璋乃上馬前鋒始交東川右廂馬步都指揮使張守進降於知祥言璋兵盡此無復後繼復扶又翻當急擊之知祥登髙冢督戰左明義指揮使毛重威左衝山指揮使李瑭守雞蹤橋孟知祥置左右衝山六營見二百七十五巻天成元年皆為東川兵所殺趙廷隠三戰不利牙内都指揮副使侯𢎞實兵亦却知祥懼以馬箠指後陳箠止橤翻張公鐸帥衆大呼而進帥讀曰率呼火故翻東川兵大敗死者數千人擒東川中都指揮使元璝牙内副指揮使董光演等八十餘人中都指揮使中軍都指揮使也一本有軍字璝公回翻璋拊膺曰親兵皆盡吾何依乎與數騎遁去餘衆七千人降降户江翻下同復得潘仁嗣復扶又翻知祥引兵追璋至五侯津五侯津在漢州西南東川馬步都指揮使元瓌降元瓌疑即前元璝通鑑集衆書以成書以其官有中興馬步之異其字有瓌與璝之異因再書之耳西川兵入漢州府第求璋不得士卒爭璋軍資故璋走得免趙廷隠追至赤水又降其卒三千人是夕知祥宿雒縣自唐以來漢州治雒縣知祥入漢州不居州宅而宿雒縣葢漢州州宅為追兵剽掠不可居故宿雒縣廨舍也命李昊草牓諭東川吏民及草書勞問璋勞力到翻且言將如梓州如往也詢負約之由請見伐之罪乙酉知祥㑹廷隠於赤水遂西還還從宣翻又如字命廷隠將兵攻梓州璋至梓州肩輿而入王暉迎問曰太尉全軍出征洪邁曰唐節度帶檢校官其初只檢校散騎常侍如李愬在唐鄧時所稱者也後乃轉尚書及僕射司空司徒能至此者葢少僖昭以降藩鎮盛强武夫得志纔建節鉞其資級已髙於是復升太保太傅太尉其上惟有太師故將帥悉稱太尉余按唐制太師太傅太保為三師太尉司徒司空為三公太尉古以主兵故呼將帥為太尉耳若唐末藩鎮固亦有加太師者唐自睿宗之末邊鎮置節度使如薛訥等已是後來使相之職其帶御史大夫中丞六曹尚書者僕射侍中中書令者往往有之李愬之帥唐鄧隨以資淺帶散騎常侍耳洪説未為精當今還者無十人何也璋涕泣不能對至府第方食暉與璋從子牙内都虞侯延浩帥兵三百大譟而入帥讀曰率下同璋引妻子登城子光嗣自殺璋至北門樓呼指揮使潘稠使討亂兵稠引十卒登城斬璋首及取光嗣首以授王暉暉舉城迎降趙廷隠入梓州封府庫以待知祥李肇聞璋敗始斬其使以聞李肇持兩端聞璋敗始斬其使丙戌知祥入成都丁亥復將兵八千如梓州至新都九域志新都縣在成都府北四十五里復扶又翻趙廷隠獻董璋首己丑發𤣥武舊唐書地理志𤣥武漢氐道縣晉改曰𤣥武九域志宋大中祥符五年改為中江縣在梓州西九十里趙廷隠帥東川將吏來迎康福奏党項鈔盜者已伏誅餘皆降附鈔楚交翻壬辰孟知祥有疾癸巳疾甚中門副使王處回侍左右庖人進食必空器而出以安衆心李仁罕自遂州來趙廷隠迎于板橋板橋在梓州東南仁罕不稱東川之功侵侮廷隠廷隠大怒乙未知祥疾瘳瘳丑留翻丁酉入梓州戊戌犒賞將士既罷犒苦到翻知祥謂李仁罕趙廷隠曰二將誰當鎮此仁罕曰令公再與蜀州亦行耳先是朝廷加孟知祥中書令故李仁罕稱之仁罕葢先嘗領蜀州廷隠不對知祥愕然退命李昊草牒俟二將有所推則命一人為留後昊曰昔梁祖莊宗皆兼領四鎮梁太祖領宣武宣義天平䕶國四鎮莊宗領河東魏博盧龍成德四鎮今二將不讓惟公自領之為便耳公宜亟還府府謂成都西川帥府所在更與趙僕射議之趙僕射謂趙季良己亥契丹使者多囉卿辭歸國上曰朕志在安邊不可不少副其求少詩沼翻乃遣䇿古舍利與之俱歸契丹以不得䇿稜自是數寇雲州及振武數所角翻孟知祥命李仁罕歸遂州留趙廷隠東川巡檢以李昊行梓州軍府事昊曰二虎方爭僕不敢受命願從公還乃以都押牙王彦銖為東川監押監古銜翻癸卯知祥至成都趙廷隠尋亦引兵西還還從宣翻又如字知祥謂李昊曰吾得東川為患益深昊請其故知祥曰自吾發梓州得仁罕七狀皆云公宜自領東川不然諸將不服廷隠言本不敢當東川因仁罕不讓遂有爭心耳君為我曉廷隠為干偽翻復以閬州為保寧軍董璋取閬州廢保寧軍今孟知祥復以為節鎮以賞趙廷隠益以果蓬渠開四州往鎮之吾自領東川以絶仁罕之望廷隠猶不平請與仁罕鬬勝者為東川昊深解之乃受命六月以廷隠為保寧留後戊午趙季良帥將吏請知祥兼鎮東川許之帥讀曰率季良等又請知祥稱王權行制書賞功臣不許董璋之攻知祥也山南西道節度使王思同以聞范延光言於上曰若兩川併於一賊撫衆守險則取之益難宜及其交爭早圖之上命思同以興元之兵密規進取興元之兵既不足以進取王思同之才又不足以進取劉􅁮料魏之羣臣無能敵劉備孫權者所以重于用兵也未幾幾居豈翻聞璋敗死延光曰知祥雖據全蜀然士卒皆東方人知祥恐其思歸為變亦欲倚朝廷之重以威其衆陛下不屈意撫之彼則無從自新上曰知祥吾故人為人離間至此何屈意之有離間葢指安重誨也孟知祥本有據蜀之志使重誨不相猜阻亦必别求釁端而動明宗葢未能察見知祥之心術也間古莧翻乃遣供奉官李存瓌此供奉官乃殿頭供奉官非禁中供奉官也賜知祥詔曰董璋狐狼曰狐者言其依憑窟穴曰狼者言其抗厲犯上自貽族滅卿丘園親戚皆保安全言董光業族滅而孟知祥墳墓甥姪皆無他所宜成家世之美名守君臣之大節存瓌克寧之子知祥之甥也李克寧妻孟氏見二百六十六巻梁太祖開平二年閩王延鈞謂陳守元曰為我問寶皇為于偽翻既為六十年天子陳守元此語見上年後當如何明日守元入白昨夕奏章得寶皇㫖當為大羅仙主徐彦林等亦曰北廟崇順王嘗見寶皇其言與守元同延鈞益自負史言王延鈞之昏愚始謀稱帝表朝廷云錢鏐卒請以臣為吳越王馬殷卒請以臣為尚書令錢鏐卒于是年三月馬殷卒于去年十一月朝廷不報自是職貢遂絶資治通鑑巻二百七十七
