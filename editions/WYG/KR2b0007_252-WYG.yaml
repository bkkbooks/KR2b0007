body:
  text: 資治通鑑卷二百五十二宋司馬光撰胡三省音註唐紀六十八起上章攝提格盡柔兆涒灘凡七年懿宗昭聖恭惠孝皇帝下咸通十一年春正月甲寅朔羣臣上尊號曰睿文英武明徳至仁大聖廣孝皇帝赦天下西川之民聞蠻冦將至爭走入成都時成都但有子城亦無壕人所占地占之贍翻各不過一席許雨則戴箕盎以自庇又乏水取摩訶池泥汁澄而飲之成都記摩訶池在張儀子城内隋蜀王秀取土築廣子城因為池有胡僧見之曰摩訶宫毘羅盖胡僧謂摩訶為大宫毘羅為龍謂此池廣大有龍耳因名摩訶池或曰蕭摩訶所開非也池今在成都縣東南十二里將士不習武備節度使盧耽召彭州刺史吳行魯使攝參謀與前瀘州刺史楊慶復曰考異新傳云瀘州刺史楊慶錦里耆舊傳云嘉州誤也今從解圍録共修守備選將校分職事將即亮翻下同校户教翻立戰棚具礟檑棚蒲庚翻礟普教翻檑盧對翻檑木也自城上下之以壓敵造器備嚴警邏先是西川將士多虚職名亦無禀給先悉薦翻至是掲牓募驍勇之士邏郎佐翻掲丘傑翻補以實職厚給糧賜應募者雲集慶復乃諭之曰汝曹皆軍中子弟年少材勇少始照翻平居無由自進今蠻冦慿陵乃汝曹取富貴之秋也可不免乎皆歡呼踊躍於是列兵械于庭使之各試所能兩兩角勝察其勇怯而進退之得選兵三千人號曰突將行魯彭州人也戊午蠻至眉州耽遣同節度副使王偃等齎書見其用事之臣杜元忠與之約和蠻報曰我輩行止只繫雅懐路巖韋保衡上言康承訓討龎勛時逗撓不進上時掌翻逗音豆撓奴教翻又不能盡其餘黨又貪虜獲不時上功上時掌翻辛酉貶蜀王傅分司蜀王佶皇子也貪考異曰新傳云宰相路巖韋保衡劾承訓討賊逗撓虜獲不時上功貶蜀王傅分司東都按此時保衡未為相盖以尚主之故上用其言故得擠承訓也尋再貶恩州司馬南詔進軍新津新津漢武陽縣後周改為新津唐屬蜀州九域志在州東南七十里定邊之北境也盧耽遣同節度副使譚奉祀致書于杜元忠問其所以來之意蠻留之不還耽遣使告急于朝朝直遥翻且請遣使與和以紓一時之患朝廷命知四方館事太僕卿支詳為宣諭通和使晏公類要曰舊儀於通事舍人中以宿長一人總知館事謂之館主凡四方貢納及章表皆受而進之唐自中世以後始以他官判四方館事蠻以耽待之恭亦為之盤桓為于偽翻而成都守備由是粗完粗坐五翻甲子蠻長驅而北陷雙流雙流漢廣都縣地隋置雙流縣唐屬成都府九域志在府南四十里庚午耽遣節度副使柳槃徃見之杜元忠授槃書一通曰此通和之後驃信與軍府相見之儀也其儀以王者自處處昌吕翻語極驕慢又遣人負綵幕至城南云欲張陳蜀王㕔以居驃信隋蜀王秀鎮蜀起聽事極為宏壯㕔他經翻癸酉廢定邊軍復以七州歸西川七州邛眉蜀雅嘉黎嶲也是日蠻軍抵成都城下前一日盧耽遣先鋒遊奕使王晝至漢州詗援軍且趣之詗翾正翻又火迥翻趣讀曰促時興元六千人鳯翔四千人已至漢州㑹竇滂以忠武義成徐宿四千人自導江奔漢州就授軍以自存丁丑王晝以興元資簡兵三千餘人軍於毗橋毗橋在漢州南界遇蠻前鋒與戰不利退保漢州時成都日望援軍之至而竇滂自以失地謂失定邊軍也欲西川相繼陷沒以分其責毎援軍自北至輒説之曰蠻衆多於官軍數十倍官軍逺來疲弊未易遽前説式芮翻易以豉翻諸將信之皆狐疑不進成都十將李自孝隂與蠻通欲焚城東倉為内應城中執而殺之後數日蠻果攻城乆之城中無應而止二月癸未朔蠻合梯衝四面攻成都城上以鉤繯挽之使近梯雲梯衝衝車也繯于善翻屈轉其索如環鉤施於其端投火沃油焚之攻者皆死盧耽以楊慶復攝左都押牙李驤各帥突將出戰帥讀曰率殺傷蠻二千餘人㑹暮焚其攻具三千餘物而還蜀人素怯其突將新為慶復所奬拔且利於厚賞勇氣自倍其不得出者皆憤鬱求奮後數日賊取民籬重沓濕而屈之以為蓬重直龍翻蓬當作篷編竹以覆舟曰篷言濕籬而屈之狀如舟之眠篷也置人其下舉以抵城而斸之斸陟玊翻斫也掘也矢石不能入火不能然然與燃同燒也慶復鎔鐵汁以灌之攻者又死乙酉支詳遣使與蠻約和丁亥蠻歛兵請和戊子遣使迎支詳時顔慶復以援軍將至詳謂蠻使曰受詔詣定邊約和今雲南乃圍成都則與曏日詔㫖異矣且朝廷所以和者冀其不犯成都也今矢石晝夜相交何謂和乎蠻見和使不至使並䟽吏翻庚寅復進攻城復扶又翻辛卯城中出兵擊之乃退初韋臯招南詔以破吐蕃既而蠻訴以無甲弩臯使匠教之數歲蠻中甲弩皆精利又東蠻苴那時勿鄧夢衝三部助臯破吐蕃有功事見二百三十三巻徳宗興元五年其後邊吏遇之無狀東蠻怨唐深自附於南詔毎從南詔入冦為之盡力為于偽翻得唐人皆虐殺之朝廷貶竇滂為康州司户以顔慶復為東川節度使凡援蜀諸軍皆受慶復節制癸巳慶復至新都九域志新都縣在成都府北四十五里蠻分兵徃拒之甲午與慶復遇慶復大破蠻軍殺二千餘人蜀民數千人爭操芟刀白棓以助官軍操七刀翻芟刀農家所以芟草棓蒲項翻呼聲震野呼火故翻乙未蠻歩騎數萬復至復扶又翻㑹右武衛上將軍宋威以忠武二千人至即與諸軍㑹戰蠻軍大敗死者五千餘人退保星宿山宿音秀威進軍沱江驛沱江驛在成都府新繁縣禺貢岷山導江别為沱沱徒河翻距成都三十里蠻遣其臣楊定保詣支詳請和詳曰宜先解圍退軍定保還蠻圍城如故城中不知援軍之至但見其數來請和數所角翻知援軍必勝矣戊戌蠻復請和使者十返城中亦依違答之蠻以援軍在近攻城尤急驃信以下親立矢石之間庚子官軍至城下與蠻戰奪其升遷橋升遷橋即升僊橋秦時李氷所起舊名七星橋是夕蠻自燒攻具遁去比明官軍乃覺之比必利翻及也初朝廷使顔慶復救成都命宋威屯綿漢為後繼綿漢二州名威乘勝先至城下破蠻軍功居多慶復疾之威飯士欲追蠻軍飯扶晩翻城中戰士亦欲與北軍合勢俱進慶復牒威奪其軍勒歸漢州蠻至雙流阻新穿水九域志蜀州新津縣有新穿鎮造橋未成狼狽失度失度者失其常度也三日橋成乃得過斷橋而去斷丁管翻甲兵服物遺弃於路蜀人甚恨之黎州刺吏嚴師本收散卒數千保邛州蠻圍之二日不克亦捨去顔慶復始教蜀人築壅門城城門之外别築垣牆以遮城門謂之壅門今人謂之八卦牆者是也穿塹引水滿之植鹿角分營舖斬木為鹿角植之城外以限衝突今人謂之排杈者是分立寨屋謂之營以居士卒城上分立小屋使守卒居之以候望謂之舖舖普故翻蠻知有備自是不復犯成都矣復扶又翻先是西川牙將有職無官先悉薦翻及拒却南詔四人以功授監察御史此所謂官也堂帖人輸堂例錢三百緡貧者苦之有功授官而徵其輸錢史言唐之紀綱大壞三月左僕射同平章事曹確同平章事充鎮海節度使夏四月丙午以翰林學士承㫖兵部侍郎韋保衡同平章事徐賊餘黨猶相聚閭里為羣盜散居兖鄆青齊之間詔徐州觀察使夏矦瞳招諭之瞳徒紅翻五月丁丑以邛州刺史吳行魯為西川留後光州民逐刺史李弱翁弱翁奔新息新息漢古縣唐屬蔡州九域志在州東南二百五十五里去光州九十里左補闕楊堪等上言刺史不道百姓負寃當訴於朝廷寘諸典刑豈得羣黨相聚擅自斥逐亂上下之分此風殆不可長分扶問翻長知兩翻宜加嚴誅以懲來者上令百官議處置徐州之宜處昌吕翻六月丙午太子少傅李膠等狀以為徐州雖屢搆禍亂謂銀刀及桂州戍卒也未必比屋頑凶比毘必翻蓋由統御失人是致姦回乘釁今使名雖降謂降節度為觀察使疏吏翻兵額尚存以為支郡則糧餉不給分𨽻别藩則人心未服或舊惡相濟更成披猖惟泗州向因攻守結釁已深事見上巻九年十年宜有更張庶為兩便更工衡翻詔從之徐州依舊為觀察使統徐濠宿三州泗州為團練使割𨽻淮南加幽州節度使張允伸兼侍中秋八月乙未同昌公主薨上痛悼不已殺翰林醫官韓宗劭等二十餘人悉收捕其親族三百餘人繫京兆獄中書侍郎同平章事劉瞻召諫官使言之諫官莫敢言者乃自上言上時掌翻以為修短之期人之定分昨公主有疾深軫聖慈宗劭等診療之時診止忍翻候脉也療力照翻治疾也惟求疾愈備施方術非不盡心而禍福難移竟成差跌跌徒結翻原其情狀亦可哀矜而械繫老幼三百餘人物議沸騰道路嗟歎奈何以達理知命之君渉肆暴不明之謗蓋由安不慮危忿不思難之故也伏願少回聖慮寛釋繫者上覽䟽不恱瞻又與京兆尹温璋力諫於上前上大怒叱出之魏博節度使何全皥年少驕暴好殺少詩照翻好呼到翻又減將士衣糧將士作亂全皥單騎走追殺之何進滔得魏博傳三世四十二年而滅推大將韓君雄為留後成徳節度使王景崇為之請旌節為之于偽翻九月庚戍以君雄為魏博留後丙辰以劉瞻同平章事充荆南節度使貶温璋振州司馬璋歎曰生不逢時死何足惜是夕仰藥卒仰牛向翻勑曰茍無蠧害何至於斯惡實貫盈死有餘責宜令三日内且於城外權瘞瘞於計翻俟經恩宥方許歸葬使中外快心姦邪知懼己巳貶右諫議大夫髙湘比部郎中知制誥楊知至禮部郎中魏簹等於嶺南比音毘簹都郎翻皆坐與劉瞻親善為韋保衡所逐也知至汝士之子汝士虞卿從兄也見二百四十一巻穆宗長慶元年簹扶之子也魏扶見二百四十八卷宣宗大中三年保衡又與路巖共奏劉瞻云與醫官通謀誤投毒藥譛言誤投毒藥以致同昌公主於死然既言誤矣又安可以為通謀邪丙子貶瞻康州刺史康州去京師五千七百五十里翰林學士承㫖鄭畋草瞻罷相制辭曰安數畝之居仍非已有却四方之賂惟畏人知巖謂畋曰侍郎乃表薦劉相也坐貶梧州刺史梧州漢蒼梧郡所治廣信縣地唐置梧州去京師五千五百里御史中丞孫瑝坐為瞻所引用亦貶汀州刺史瑝户盲翻又音皇路巖素與劉瞻論議多不叶瞻既貶康州巖猶不快閱十道圖以驩州去長安萬里再貶驩州司户驩州陸路至長安一萬二千四百五十二里水路一萬七千里張考異曰實録新傳皆云巖志欲殺之賴幽州節度使公素表論瞻寃乃止按是時張允伸鎮幽州云公素恐誤也冬十月癸卯以西川留後吳行魯為節度使十一月辛亥以兵部尚書鹽鐵轉運使王鐸為禮部尚書同平章事鐸起之兄子也王起見二百四十一巻長慶元年鐸起兄炎之子丁卯復以徐州為感化軍節度徐州本武寧軍中有銀刀之亂罷節鎮為觀察今復為感化軍十二月加成徳節度使王景崇同平章事以左金吾上將軍李國昌為振武節度使十二年春正月辛酉𦵏文懿公主同昌公主諡文懿韋氏之人爭取庭祭之灰汰其金銀勑祭之於韋氏之庭故曰庭祭汰淘也凡服玩毎物皆百二十輿以錦繡珠玉為儀衛明器輝煥三十餘里記檀弓孔子謂為明器者知䘮道矣備物而不可用也其曰明噐神明之也何取於輝煥乎賜酒百斛餅餤四十槖駝以飼体夫餤于廉翻又徒甘翻飼祥吏翻体蒲本翻体夫轝柩之夫也上與郭淑妃思公主不已樂工李可及作歎百年曲其聲悽惋歎百年曲厯叙人自少而壯自壯而老少時姢好壯時追歡極樂老時衰颯之狀其聲悽切感動人心惋烏貫翻舞者數百人𤼵内庫雜寳為其首飾以絁八百匹為地衣舞罷珠璣覆地絁式支翻覆敷救翻以魏博留後韓君雄為節度使門下侍郎同平章事路巖與韋保衡素相表裏勢傾天下既而爭權浸有隙保衡遂短巖於上夏四月癸卯以巖同平章事充西川節度使巖出城路人以瓦礫擲之礫郎狄翻權京兆尹薛能巖所擢也巖謂能曰臨行煩以瓦礫相餞能徐舉笏對曰曏來宰相出府司無例發人防衛府司謂京兆府所司巖甚慙能汾州人也能音裳來切五月上幸安國寺賜僧重謙僧澈沈檀講座二各髙二丈以沈香檀香為講座也沈持林翻髙古號翻設萬人齋秋七月以兵部尚書盧耽同平章事充山南東道節度使冬十月以兵部侍郎鹽鐵轉運使劉鄴為禮部尚書同平章事十三年春正月幽州節度使張允伸得風疾請委軍政就醫許之以其子簡㑹知留後疾甚遣使上表納旌節丙申薨允伸鎮幽州二十三年宣宗大中四年張允伸代周綝鎮幽州勤儉恭謹邊鄙無警上下安之二月丁巳以兵部侍郎同平章事于琮為山南東道節度使以刑部侍郎判户部奉天趙隠為户部侍郎同平章事平州刺史張公素素有威望為幽人所服張允伸薨公素帥州兵來奔䘮帥讀曰率張簡㑹懼三月奔京師以為諸衛將軍汎言諸衛將軍不言何衛史畧之也夏四月立皇子保為吉王傑為壽王倚為睦王以張公素為平盧留後平盧當作盧龍五月國子司業韋殷裕詣閤門告郭淑妃弟内作坊使敬􅄒隂事内作坊使内諸司使之一掌造内庫軍器上大怒杖殺殷裕籍沒其家曰考異續寶運録曰内作使郭敬述與宰臣韋保衡張能順頻於内宅飲酒濳通郭妃荒穢頗甚毎封進文書於金合内詐稱果子内連郭妃郭敬述外結張能順國子司業韋殷裕擬傾皇祚别立太子事泄遽加貶降五月十四日内牓子貶工部尚書嚴祈郴州刺史給事中李貺勤州刺史給事中張鐸滕州刺史左金吾大將軍李敬仲儋州司户國子司業韋殷裕勑京兆府決痛杖一頓處死家貲妻女沒官又貶叙州刺史韋君卿愛州崇平縣尉右僕射右羽林統軍張直方康州司馬續又貶駙馬于琮並扶㑹與韋保衛同謀不軌事其月十七日又貶尚書左丞李當道州刺史吏部侍郎王諷建州刺史左常侍李都賀州刺史翰林承㫖張裼封州司馬中書舎人封彦卿潮州司戸諌議大夫楊塾新州司戸駙馬韋保衡雷州刺史又貶儋州澄邁縣尉又貶驩州長流百姓又賜自盡家貲沒官仍三族不許朝廷録用其語雜亂無稽今從實録乙亥閤門使田獻銛奪紫改橋陵使銛思亷翻以其受殷裕狀故也殷裕妻父太府少卿崔元應妻從兄中書舍人崔沆從才用翻沆下黨翻季父君卿皆貶嶺南官給事中杜裔休坐與殷裕善亦貶端州司户沆鉉之子也崔鉉見二百四十七巻武宗㑹昌三年裔休悰之子也丙子貶山南東道節度使于琮為普王傅分司普王儼皇子也後踐阼是為僖宗韋保衡譛之也辛巳貶尚書左丞李當吏部侍郎王渢渢房戎翻左散騎常侍李都翰林學士承㫖兵部侍郎張裼裼他計翻又先擊翻前中書舍人封彦卿左諌議大夫楊塾癸未貶工部尚書嚴祁給事中李貺給事中張鐸左金吾大將軍李敬仲起居舍人蕭遘李瀆鄭彦特李藻皆處之湖嶺之南處昌吕翻不詳言各人所貶之地以其無罪故畧之也坐與琮厚善故也貺漢之子遘寘之子也李漢見二百四十五巻文宗太和九年蕭寘見二百五十巻五年甲申貶前平盧節度使于琄為涼王府長史分司琄胡大翻涼王侹皇子也前湖南觀察使于瓌為袁州刺史瓌琄皆琮之兄也尋再貶琮韶州刺史隋於曲江縣置韶州以縣北八十里韶石為名至京師四千九百三十二里琮妻廣徳公主上之妹也廣徳縣屬宣州與琮偕之韶州行則肩輿門相對坐則執琮之帶琮由是獲全時諸公主多驕縱惟廣徳動遵法度事于氏宗親尊卑無不如禮内外稱之六月以盧龍留後張公素為節度使韋保衡欲以其黨裴條為郎官憚左丞李璋方巖恐其不放上尚書左右丞分總六曹二十四司郎官凡除授非其人左右丞得以糾劾之不令赴省供職上時掌翻先遣人達意璋曰朝廷遷除不應見問秋七月乙未以璋為宣歙觀察使歙書渉翻八月歸義節度使張義潮薨沙州長史曹義金代領軍府制以義金為歸義節度使是後中原多故朝命不及回鶻陷甘州自餘諸州𨽻歸義者多為羌胡所據自唐末迄于宋朝河湟之地遂悉為戎中國不能復取朝直遥翻冬十二月追上宣宗諡曰元聖至明成武獻文睿智章仁神聰懿道大孝皇帝上時掌翻振武節度使李國昌恃功恣横横户孟翻專殺長吏長知丈翻朝廷不能平徙國昌為大同軍防禦使國昌稱疾不赴史言沙陀䟦扈不待殺段文楚而後動於惡十四年春三月癸巳上遣勑使詣法門寺迎佛骨羣臣諫者甚衆至有言憲宗迎佛骨尋晏駕者事見憲宗紀元和十四年死者人所甚諱也况言之於人主之前乎言之至此人所難也上曰朕生得見之死亦無恨廣造浮圖寳帳香轝幡花幢葢以迎之幡孚袁翻幢傳江翻史炤曰幢童也其狀童童然皆飾以金玉錦繡珠翠自京城至寺三百里間道路車馬晝夜不絶夏四月壬寅佛骨至京師導以禁軍兵仗公私音樂沸天燭地綿亘數十里儀衛之盛過於郊祀元和之時不及逺矣富室夾道為綵樓及無遮㑹競為侈靡上御安福門降樓膜拜膜拜胡禮拜也膜莫乎翻流涕霑臆賜僧及京城耆老嘗見元和事者金帛迎佛骨入禁中三日出置安國崇化寺宰相已下競施金帛不可勝紀施式䜴翻勝音升因下徳音降中外繫囚五月丁亥以西川節度使路巖兼中書令舊考異曰錦里耆傳十二年八月路公用邊咸郭籌䇿奏於邛州置定邊軍節度使復制扼大渡河脩邛崍闗南路米㸃檀丁子弟教之斫刺刀補義軍將主管教練兵士新傳巖至西川承蠻盗邊後巖力拊循置定邊軍於邛州扼大渡治故闗取檀丁子弟教擊刺補屯籍由是西山八國來朝以勞遷兼中書令按置定邊軍乃李師望耆舊傳新傳皆誤也南詔冦西川又冦黔南黔中經畧使秦匡謀兵少不敵弃城奔荆南黔渠今翻少詩沼翻荆南節度使杜悰囚而奏之六月乙未勑斬匡謀籍沒其家貲親族應縁坐者令有司搜捕以聞匡謀鳯翔人也以中書侍郎同平章事王鐸同平章事充宣武節度使時韋保衡挾恩弄權以劉瞻于琮先在相位不禮於己譛而逐之王鐸保衡及第時主文也唐禮部校文主司謂之主文蕭遘同年進士也二人素薄保衡之為人保衡皆擯斥之楊考異曰舊傳云保衡以收路巖在中書不加禮接媒蘖逐之按收獲罪時保衡未為相盖保衡雖為學士懿宗寵任之故能譛收也又曰公主薨自後恩禮漸薄按路巖于琮王鐸蕭遘被擯皆在公主薨後今從實録秋七月戊寅上疾大漸左軍中尉劉行深右軍中尉韓文約立少子普王儼考異曰范質五代通録梁李振謂陜州䕶軍韓彛範曰懿皇初升遐韓中尉殺長立少以利其權遂亂天下今將軍復欲爾邪彛範即文約孫也按懿宗八子僖宗第五餘子新舊書不載長㓜又不言所終不言所殺者果何王也庚辰制立儼為皇太子日考異曰續寳運録云其宰臣蕭鄴等直至寢幄問疾上㣲道朕三字而止羣臣不覺號哭失聲中外悉皆垂泣按是時宰相韋保衡最在上蕭鄴不為相今不取權句當軍國政事句古侯翻當丁浪翻辛巳上崩于咸寧殿年四十一遺詔以韋保衡攝冢宰僖宗即位八月丁未追尊母王貴妃為皇太后劉行深韓文約皆封國公關東河南大水九月有司上先太后諡曰惠安先太后謂上母王貴妃也上時掌翻司徒門下侍郎同平章事韋保衡怨家告其陰事貶保衡賀州刺史樂工李可及流嶺南可及有寵於懿宗嘗為子娶婦為于偽翻懿宗賜之酒二銀壺啓之無酒而中實右軍中尉西門季𤣥屢以為言懿宗不聽可及嘗大受賜物載以官車季𤣥謂曰汝它日破家此物復應以官車載還非為受賜徒煩牛足耳及流嶺南籍沒其家果如季𤣥言史言小人寵過而禍及以西川節度使路巖兼侍中加成徳節度使王景崇中書令魏博節度使韓君雄盧龍節度使張公素天平節度使髙駢並同平章事君雄仍賜名允中録考異曰舊傳作允忠實新傳皆作允中今從之冬十月乙未以左僕射蕭倣為門下侍郎同平章事韋保衡再貶崖州澄邁令澄邁隋縣唐屬瓊州九域志在州西五十五里尋賜自盡又貶其弟翰林學士兵部侍郎保乂為賔州司户所親翰林學士户部侍郎劉承雍為涪州司馬涪音浮承雍禹錫之子也劉禹錫見二百三十六巻順宗永貞元年癸卯赦天下西川節度使路巖喜聲色遊宴喜許記翻委軍府政事於親吏邊咸郭籌皆先行後申上下畏之嘗大閱二人議事黙書紙相示而焚之軍中以為有異圖驚懼不安朝廷聞之十一月戊辰徙巖荆南節度使咸籌濳知其故遂亡命以右僕射蕭鄴同平章事充河東節度使十二月己亥詔送佛骨還法門寺再貶路巖為新州刺史僖宗惠聖恭定孝皇帝上之上初名儼改名儇懿宗第五子乾符元年是年十一月方改元春正月丁亥翰林學士盧攜上言上時掌翻以為陛下初臨大寳宜深念黎元國家之有百姓如草木之有根柢抵典禮翻又下計翻若秋冬培溉則春夏滋榮臣竊見闗東去年旱災自虢至海自虢州東至于海也麥纔半收秋稼㡬無冬菜至少貧者磑蓬實為麵蓄槐葉為韲或更衰羸亦難收拾㡬居依翻少詩沼翻磑五對翻䃺也麵眠見翻韲牋西翻羸倫為翻常年不稔則散之鄰境之往也今所在皆饑無所依投坐守鄉閭待盡溝壑其蠲免餘稅實無可徵而州縣以有上供及三司錢户部轉運鹽鐵為三司督趣甚急趣讀曰促動加捶撻雖撤屋伐木雇妻鬻子止可供所由酒食之費所由謂催督租稅之吏卒未得至於府庫也或租稅之外更有他徭朝廷儻不撫存百姓實無生計乞勑州縣應所欠殘稅並一切停徵以俟蠶麥仍𤼵所在義倉亟加賑給太宗置義倉及常平倉以備凶荒髙宗以後稍假義倉以給他費至神龍中畧盡𤣥宗即位復置之安史之亂復廢至文宗太和九年以天下回殘錢置常平義倉本錢歲增市之以備賑給至深春之後有菜葉木牙繼以桑椹漸有可食在今數月之間尤為窘急行之不可稽緩勑從其言而有司竟不能行徒為空文而已路巖行至江陵勑削官爵長流儋州儋都甘翻巖羙姿儀囚於江陵獄再宿須髪皆白尋賜自盡籍沒其家巖之為相也密奏三品以上賜死皆令使者剔取結喉三寸以進結㗋㗋嚨上下相接之處驗其必死至是自罹其禍所死之處乃楊收賜死之榻也史言天之報應不爽楊收賜死見上巻咸通十年邊咸郭籌捕得皆伏誅初巖佐崔鉉於淮南為支使唐制節度使幕屬有掌書記觀察有支使以掌表牋書翰亦書記之任也鉉知其必貴曰路十終須作彼一官巖第十作彼一官謂作相也既而入為監察御史不出長安城十年至宰相其自監察入翰林也鉉猶在淮南聞之曰路十今已入翰林如何得老皆如鉉言以太子少傅于琮同平章事充山南東道節度使二月甲午𦵏昭聖恭惠孝皇帝于簡陵簡陵在京兆富平縣西北四十五里廟號懿宗以中書侍郎同平章事趙隠同平章事充鎮海節度使以華州刺史裴坦為中書侍郎同平章事華户化翻以虢州刺史劉瞻為刑部尚書瞻之貶也懿宗咸通十二年瞻貶人無賢愚莫不痛惜及其還也長安兩市人率錢雇百戲迎之長安城中分東西兩市瞻聞之改期由它道而入見考異曰玉泉子聞録曰初瞻南遷無問賢不肖一口皆為之痛惜殆將至京東西市豪俠共率泉帛募集百戲將逆於城外瞻知之差期而易路焉瞻為相亦無它才能徒以路巖遭時嫉怒瞻為所排而人心歸向耳其實未足譚也按瞻以清慎著聞及懿宗暴怒瞻獨能不顧其身救數百人之死而玉泉子以為未足談不亦誣乎夏五月乙未裴坦薨以劉瞻為中書侍郎同平章事初瞻南遷劉鄴附於韋路共短之韋路謂韋保衡路巖及瞻還為相鄴内懼秋八月丁巳朔鄴延瞻置酒於鹽鐵院劉鄴以鹽鐵轉運使為相故延劉瞻宴於鹽鐵院瞻歸而遇疾辛未薨時人皆以為鄴鴆之也以兵部侍郎判度支崔彦昭為中書侍郎同平章事彦昭羣之從子也崔羣相憲穆從才用翻兵部侍郎王凝正雅之從孫也王正雅見二百四十四巻文宗太和五年其母彦昭之從母母之姊妹謂之從母凝彦昭同舉進士凝先及第嘗衩衣見彦昭衩差賣翻衩衣便服不具禮也且戲之曰君不若舉明經彦昭怒遂為深仇唐世重進士而輕明經故當時有焚香禮進士設幕試明經之語崔彦昭之仇怒王凝盖以此也及彦昭為相其母謂侍婢曰為我多作韈履為我于偽翻王侍郎母子必將竄逐吾當與妹偕行彦昭拜且泣謝曰必不敢凝由是獲免考異曰此出中朝故事曰彦昭代凝判鹽鐵半取之載而入相按實録彦昭不代凝為鹽鐵其餘則冬十月以門下侍郎同平章事劉鄴同平章事充淮南節度使以吏部侍郎鄭畋為兵部侍郎翰林學士承㫖户部侍郎盧攜守本官並同平章事云考異曰舊畋傳乾符四年遷吏部侍郎尋降制可本官同平章事今從實録此年為相十一月庚寅日南至冬至日南至夏至日北至羣臣上尊號曰聖神聰睿仁哲孝皇帝改元改元乾符上時掌翻魏博節度使韓允中薨軍中立其子節度副使簡為留後南詔冦西川作浮梁濟大度河防河都知兵馬使黎州刺史黄景復俟其半濟擊之蠻敗走斷其浮梁斷丁管翻蠻以中軍多張旗幟當其前而分兵濳出上下流各二十里夜作浮梁詰朝俱濟詰其吉翻朝陟遥翻旦也襲破諸城栅夾攻景復力戰三日景復陽敗走蠻盡銳追之景復設三伏以待之蠻過三分之二乃𤼵伏擊之蠻兵大敗殺二千餘人追至大度河南而還還從宣翻又如字復修完城栅而守之蠻歸至之羅谷遇國中𤼵兵繼至新舊相合新者繼至之兵舊者敗歸之兵鉦鼓聲聞數十里聞音問復冦大度河復扶又翻與唐夾水而軍詐云求和又自上下流濳濟與景復戰連日西川援軍不至而蠻衆日益景復不能支軍遂潰十二月党項回鶻冦天徳軍感化軍奏羣盜冦掠感化軍治徐州羣盜龎勛餘黨也州縣不能禁勑兖鄆等道出兵討之南詔乘勝陷黎州入邛崍闗攻雅州大度河潰兵奔入邛州九域志雅州東北至邛州一百六十里大度河潰兵黄景復之軍也成都驚擾民爭入城或北奔它州城中大為守偹而塹壘比曏時嚴固驃信使其坦綽遺節度使牛叢書云坦綽南詔清平官之首也遺唯季翻非敢為冦也欲入見天子面訴數十年為讒人離間寃抑之事見賢遍翻間古莧翻儻蒙聖恩矜恤當還與尚書永敦鄰好今假道貴府欲借蜀王㕔留止數日即東上好呼到翻上時掌翻詐言將自成都而東上長安叢素懦怯欲許之楊慶復以為不可斬其使者留二人授以書遣還書辭極數其罪詈辱之數所具翻蠻兵及新津而還宋白曰新津縣本漢犍為郡武陽縣地李膺益州記云皂里江津之所曰新津市周北圖記云閔帝元年於此立新建縣九域志縣在蜀州東南七十里叢恐蠻至豫焚城外民居蕩盡舊考異曰錦里耆傳咸通十四年十一月五日雲南蠻冦再犯大度河黄景復擊敗之十二月二十五日復攻大度河三十日蠻乘勝進攻黎州十二月二十八日蠻來只到新津前後蜀州界左右便退竟不到城下按咸通十四年南詔冦西川事舊紀南詔傳唐年補録唐録備闕讀寳運録皆無之獨耆舊傳載之甚詳新書取之作南詔傳而實録但云十二月西川奏南蠻入冦黎州刺史黄景復擊退之新紀但云十二月雲南蠻冦黎州蓋亦出於耆舊傳耳舊紀乾符元年冬南詔蠻冦西蜀詔河西河東山南西道東川徴兵赴援實録乾符元年十月西川奏雲南蠻入冦十二月雲南蠻冦西川坦綽致書於牛叢欲求入覲河東山南西道及東川兵援之月末又云南蠻侵犯黎州而成都守禦無備殊不拒敵踰河越嶺洞無籬障賴積雪丈餘遂阻隔奔衝之勢又邛雅二州刺史望風奔遁蠻燒劫一空牛叢不曉兵失於探候而奏報差戾詔切責之蠻劫畧黎雅間破黎州入邛崍闗成都閉三日蠻乃去新紀乾符元年十二月雲南蠻冦黎雅二州河西河東山南東道東川兵伐雲南按實録咸通十四年十一月七日路巖始移荆南八日牛叢始除西川而耆舊傳蠻入冦皆叢任内事恐誤先一年也實録新紀因此於十四年十二月添雲南冦黎州事實皆在乾符元年冬也蜀人尤之詔𤼵河東山南西道東川兵援之仍命天平節度使髙駢詣西川制置蠻事以韓簡為魏博留後商州刺史王樞以軍州空窘減折糴錢窘巨隕翻徳宗時度支以稅物頒諸司皆増本價為虚估給之而繆以濫惡督州縣剥價謂之折納其後又以稅物折錢使輸米粟謂之折糴折音之舌翻民相帥以白梃􅇌之帥讀曰率梃徒鼎翻白棓也敺烏口翻又􅇌殺官吏二人朝廷更除刺史李誥到官收捕民李叔汶等三十餘人斬之汶音問初回鶻屢求册命詔遣册立使郗宗莒詣其國㑹回鶻為吐谷渾嗢末所破嗢末者吐蕃奴部也虜法出師必𤼵豪室皆以奴從平居散處田牧及論恐熱亂無所歸共相嘯合數千人以嗢末自號居甘肅河沙𤓰渭岷廓疊宕間其近蕃牙者最勇而馬尤良嗢烏沒翻逃遁不知所之詔宗莒以玉册國信授靈鹽節度使唐𢎞夫掌之還京師上年少少詩沼翻政在臣下南牙北司互相矛盾自懿宗以來奢侈日甚用兵不息賦歛愈急歛九贍翻闗東連年水旱州縣不以實聞上下相蒙百姓流殍流散也殍餓殍殍音被表翻無所控訴相聚為盜所在蠭起州縣兵少加以承平日乆人不習戰毎與盜遇官軍多敗是從王仙芝黄巢遂為大盜史先言唐末所以致盜之由是歳濮州人王仙芝始聚衆數千起於長垣滑州匡城縣本後齊之長垣縣開皇十六年改為匡城是年又分韋城縣置長垣縣新志匡城有長垣縣宋朝以長垣縣屬開封府九域志在府東北一百五里考異曰實録二年五月仙芝反於長垣按續寳運録濮州賊王仙芝自稱天補平均大將軍兼海内諸豪都統傳檄諸道檄末稱乾符一年正月三日則仙芝起必在二年前今置於歲末二年春正月丙戌以髙駢為西川節度使辛巳上祀圓丘赦天下髙駢至劒州先遣使走馬開成都門開成都城諸門也除考異曰錦里耆舊傳鄆州節度使髙相公駢乘急詔劒南西州節度副大使乾符元年正月二十一日行李到劒州先遣使走馬開城門並令放出百姓二月十六日至府豁開城門並放人出今從實録置今年又劒州至成都止十二程駢正月二十一日自劒州遣使走馬開城門二月十六日始至府下又云駢三十日到上按長厯二月小無三十日蓋二十六日誤為二月十六日也或曰蠻冦逼近成都相公尚逺萬一豨突奈何近其靳翻豨香衣翻又許豈翻豨豕也豕健於突駢曰吾在交趾破蠻二十萬衆事見二百五十巻懿宗咸通七年蠻聞我來逃竄不暇何敢輒犯成都今春氣向暖數十萬人藴積城中生死共處汚穢鬱蒸將成癘疫不可緩也使者至成都開城縱民出各復常業乘城者皆下城解甲民大悦蠻方攻雅州聞之遣使請和引兵去駢又奏南蠻小醜易以枝梧易以䜴翻今西川新舊兵已多所𤼵長武鄜坊河東兵徒有勞費並乞勒還勑止河東兵而已考異曰舊紀此奏在元年十二月今因駢開成都門言之上之為普王也小馬坊使田令孜有寵小馬坊使亦内諸司使之一後梁改為天驥使後唐復舊長興元年改飛龍院為左飛龍院小馬坊為右飛龍院宋太平興國三年改左右天廐坊至雍熈二年又改左右騏驥院使及即位使知樞密遂擢為中尉月考異曰舊本紀此年正令孜為右軍中尉新傳云帝即位擢為左神䇿中尉舊傳但云神䇿中尉今從之上時年十四專事遊戲考異曰續寳運録曰上是年十五嵗中朝故事曰僖宗皇帝以咸通三年降誕十四年七月十九日即位年十二按舊紀亦云咸通三年五月八日生於東内即位年十二今從之㨿考異四當作二政事一委令孜呼為阿父阿烏葛翻一讀如字阿保也令孜頗讀書多巧數招權納賄除官及賜緋紫皆不闗白於上毎見常自備果食兩盤與上相對飲啗從容良乆而退見賢遍翻從千容翻上與内園小兒狎昵賞賜樂工伎兒所費動以萬計府藏空竭昵尼質翻伎渠綺翻藏徂浪翻令孜說上籍兩市商旅寳貨悉輸内庫說式芮翻有陳訴者付京兆杖殺之宰相以下鉗口莫敢言鉗其亷翻髙駢至成都明日𤼵歩騎五千追南詔至大度河殺獲甚衆擒其酋長數十人至成都斬之酋慈由翻長知丈翻修復邛崍闗大度河諸城柵又築城于戎州馬湖鎮號平夷軍馬湖鎮當馬湖江之要又築城于沐源川皆蠻入蜀之要路也各置兵數千戍之自是蠻不復入冦復扶又翻駢召黄景復責以大度河失守腰斬之乾考異曰耆舊傳云符元年三月十五日處置前黎州刺史充大度河把截制置土軍都知兵馬使黄景復實録乾符二年三月駢奏斬景復今事從耆舊傳年從實録駢又奏請自將本管本管謂西川兵及天平昭義義成等軍共六萬人擊南詔詔不許先是南詔督爽屢牒中書南詔清平官坦綽布爕乆贊之下有幕爽主兵琮爽主户籍慈爽主禮罰爽主刑勸爽主官人厥爽主工作萬爽主財用引爽主客禾爽主商賈亦皆清平官爽猶言省也督爽摠三省也先悉薦翻辭語怨望中書不答盧攜奏稱如此則蠻益驕謂唐無以答宜數其十代受恩以責之南詔之先曰細奴邏髙宗朝遣使入朝生邏盛炎邏盛炎生炎閤炎閤死弟盛邏皮立盛邏皮生皮邏閤𤣥宗賜名歸義於開元間合六詔為一而國始強歸義子曰閤羅鳯閤羅鳯子曰鳯迦異鳯迦異子曰異牟尋異牟尋子曰尋閤勸尋閤勸子曰勸龍晟勸龍晟弟曰勸利勸利弟曰豐祐豐祐死而酋龍立自細奴邏至酋龍十三代中間鳯迦異未立而死而豐祐酋龍與唐為敵是受恩十代也數所具翻然自中書𤼵牒則嫌於體敵請賜髙駢及嶺南節度使辛讜詔使録詔白牒與之録詔白今謂之録白是也從之三月以魏博留後韓簡為節度使去歲感化軍𤼵兵詣靈武防秋㑹南詔冦西川勑往救援蠻退遣還至鳳翔不肯詣靈武欲擅歸徐州内養王裕本都將劉逢搜擒唱帥者胡雄等八人斬之内養亦宦者也帥讀曰率下同衆然後定初南詔圍成都楊慶復以右職優給募突將以禦之事見上懿宗咸通十一年將即亮翻下同成都由是獲全及髙駢至悉令納牒牒職牒也又託以蜀中屢遭蠻冦人未復業停其禀給既奪其職牒又停其優給突將皆忿怨駢好妖術每𤼵兵追蠻皆夜張旗立隊對將士焚紙畫人馬好呼到翻妖於遥翻畫讀曰畫散小豆曰蜀兵懦怯今遣𤣥女神兵前行軍中壯士皆恥之髙駢之好妖術終以此敗又索闔境官有出於胥吏者皆停之索山客翻下索之同令民間皆用足陌錢陌不足者皆執之劾以行賂取與皆死劾舊音戸槩翻今紇得翻刑罰嚴酷由是蜀人皆不悅夏四月突將作亂大譟突入府廷駢走匿於厠間厠初刺翻圊也溷也突將索之不獲索山客翻天平都將張傑帥所部數百人被甲入府擊突將髙駢自天平從西川張傑盖元從部曲將被皮義翻突將撤牙前儀注兵仗節度使牙前列兵仗以壯威容無者奮梃揮拳乘怒氣力鬭天平軍不能敵走歸營突將追之營門閉不得入監軍使人招諭許以復職名禀給乆之乃肯還營天平軍復開門出為追逐之勢至城北時方修毬塲役者數百人天平軍悉取其首還詣府云已誅亂者駢出見之厚以金帛賞之明日牓謝突將悉還其職名衣糧自是日令諸道將士從已來者更直府中嚴兵自衛備突將復為亂也更工衡翻加成徳節度使王景崇兼侍中浙西狼山鎮遏使王郢等六十九人有戰功今通州静海縣南有狼山五山相連上接大江下達巨海絶江南渡抵蘓州常熟縣福山鎮順江東至崇明沙揚㠶乗順南抵明州定海縣陶隠居所謂狼五山對句章岸者也節度使趙隠賞以職名而不給衣糧郢等論訴不獲論盧昆翻遂劫庫兵作亂行收黨衆近萬人攻陷蘇常蘇常二州名相去一百八十里乘舟徃來泛江入海轉掠二浙南及福建大為人患考異曰新紀云浙西突陳將王郢反五月遣右龍武大將軍宋皓討之按四年郢執魯寔始命皓討之置此誤也程匡柔唐補記曰浙西突將王郢反聚黨萬衆燒劫蘇常三年正月貶蘇州刺史李繪以郢亂弃城故也舊紀二年海賊王郢攻剽浙西郡邑寔録乾符三年二月浙西奏突陳將王郢等六十九人劫庫兵為亂三月浙西奏王郢聚衆萬人攻陷州縣續寳運録元年玉郢於兩浙叛敕差山北兵士討之不逾月而尅乃組頸于闕下今從舊紀五月以太傅分司令狐綯同平章事充鳯翔節度使司空同平章事蕭倣薨曰考異舊傳曰俄而盜起河南内官握兵王室濁亂倣氣勁論直同列忌之罷知政事出為廣州刺史嶺南節度使遇亂不至京師而卒舊紀三年春正月己卯朔倣以病免罷為太子太傅新紀此月蕭倣薨新傳亦云卒于位為嶺南節度在前舊紀傳皆誤今從實録六月以御史大夫李蔚為中書侍郎同平章事蔚紆勿翻辛未髙駢隂籍突將之名使人夜掩捕之圍其家挑牆壊户而入挑它凋翻蜀本作排讀如字壊音怪老幼孕病悉驅去殺之嬰兒或撲於階撲弼角翻或擊於柱流血成渠號哭震天號户髙翻死者數千人夜以車載尸投之於江有一婦人臨刑㦸手大罵曰髙駢汝無故奪有功將士職名衣糧激成衆怒幸而得免不省已自咎省悉景翻乃更以詐殺無辜近萬人近其靳翻天地鬼神豈容汝如此我必訴汝於上帝使汝它日舉家屠滅如我今日寃抑汙辱如我今日驚憂惴恐如我今日言畢拜天怫然就戮惴之睡翻怫扶弗翻觀異日髙駢之禍則信如婦人之言矣天地鬼神臨之在上質之在旁豈可多殺無辜以逞私忿乆之突將有自戍役歸者駢復欲盡族之復扶又翻下同有元從親吏王殷諌曰相公奉道宜好生惡殺元從言從髙駢歲乆非新隸也從才用翻好呼到翻惡烏路翻此屬在外初不同謀若復誅之則自危者多矣駢乃止王仙芝及其黨尚君長攻陷􅗛州曹州􅗛博木翻衆至數萬天平節度使薛崇出兵擊之為仙芝所敗敗補邁翻寃句人黄巢亦聚衆數千人應仙芝寃句漢縣唐屬曹州九域志在州西四十五里顔師古曰句音胊黄巢始此巢少與仙芝皆以販私鹽為事少詩照翻巢善騎射喜任俠粗渉書傳喜許紀翻粗坐五翻傳柱戀翻屢舉進士不第遂為盜與仙芝攻剽州縣剽匹妙翻横行山東民之困於重歛者爭歸之歛力贍翻數月之間衆至數萬盧龍節度使張公素性暴戾不為軍士所附大將李茂勲本回鶻阿布思之族回鶻敗降於張仲武李茂勲之降盖在㑹昌間也仲武使戍邊屢有功賜姓名納降軍使陳貢言者幽之宿將為軍士所信服納降軍在幽州丁零川茂勲濳殺貢言聲云貢言舉兵向薊公素出戰而敗奔京師茂勲入城衆乃知非貢言也不得已推而立之朝廷因以為留後秋七月蝗自東而西蔽日所過赤地言蝗之多所過食草木葉及五穀皆盡京兆尹楊知至奏蝗入京畿不食稼皆抱荆棘而死宰相皆賀楊國忠以霖雨不害稼韓滉以霖雨不敗鹽今楊知至以蝗不食稼抱荆棘而死唐之臣以蒙蔽人主而成習其來乆矣八月李茂勲為盧龍節度使八月之下當有以字九月右補闕董禹諫上遊畋乘驢擊毬上賜金帛以褒之邠寧節度使李侃奏為假父華清宫使道雅求贈官李侃為宦者假子為于偽翻禹上䟽論之語頗侵宦官樞密使楊復㳟等列訴於上冬十月禹坐貶郴州司馬谷永專攻上身不失為九卿王章斥言王鳯則死于牢獄嗚呼有以也哉復㳟欽義之養孫也楊欽義見二百四十六巻文宗開成五年昭義軍亂大將劉廣逐節度使髙湜湜承職翻自為留後以左金吾大將軍曹翔為昭義節度使回鶻還至羅川唐寧州真寧縣隋羅川縣也其地即漢上郡陽周縣地宣宗大中二年回鶻西奔至是方還十一月遣使者同羅榆禄入貢賜拯接絹萬匹羣盜侵滛侵當作浸剽掠十餘州至于淮南多者千餘人少者數百人詔淮南忠武宣武義成天平五軍節度使監軍亟加討捕及招懐十二月王仙芝冦沂州平盧節度使宋威表請以歩騎五千别為一使兼帥本道兵所在討賊帥讀曰率仍以威為諸道行營招討草賊使仍給禁兵三千甲騎五百騎竒寄翻因詔河南方鎮所遣討賊都頭並取威處分處昌吕翻分扶問翻三年春正月天平軍奏遣將士張晏等救沂州還至義橋聞北境復有盜起復扶又翻留使扞禦晏等不從喧譟趣鄆州趣七喻翻都將張思泰李承祐走馬出城裂袖與盟以俸錢備酒殽慰諭然後定詔本軍宣慰一切無得窮詰詰區吉翻唐自中世以來姑息藩鎮至其末也姑息亂軍遂陵夷以至於亡勑福建江西湖南諸道觀察刺史皆訓練士卒又令天下鄉村各置弓刀皷板以備羣盜賜兖海節度號泰寧軍三月盧龍節度使李茂勲請以其子幽州左司馬可舉知留後自求致仕詔茂勲以左僕射致仕以可舉為盧龍留後門下侍郎同平章事崔彦昭罷為太子太傅以左僕射王鐸兼門下侍郎同平章事南詔遣使者詣髙駢求和而盜邊不息駢斬其使者蠻之陷交趾也事見二百五十巻懿宗咸通六年虜安南經畧判官杜驤妻李瑶瑶宗室之疎屬也蠻遣瑶還遞木夾以遺駢遞牒以木夾之故云木夾范成大桂海虞衡志曰紹興元年安南與廣西帥司及邕通信問用兩漆板夾繫文書刻字其上謂之木夾按宋白續通典諸道州府巡院傳逓敕書皆有木夾是中國亦用木夾也遺唯季翻稱督爽牒西川節度使辭極驕慢駢送瑶京師甲辰復牒南詔數其負累聖恩徳暴犯邊境殘賊欺詐之罪安南大度覆敗之狀折辱之數所角翻懿宗咸通七年髙駢破蠻於安南上乾符二年駢破蠻於大度河折之舌翻原州刺史史懐操貪暴夏四月軍亂逐之賜宣武感化節度泗州防禦使密詔選精兵數百人於巡内遊奕防衛綱船五日一具上供錢米平安狀聞奏汴徐泗三鎮汴水所經東南綱運輸上都者皆由此道羣盜從横恐為所掠故密詔選兵遊奕防衛五月昭王汭薨汭宣宗子以盧龍留後李可舉為節度使六月撫王紘薨紘順宗子雄州地震裂水涌壊州城及公私廬舍俱盡雄州在靈州西南百八十里壊音怪秋七月以前巖州刺史髙傑為左驍衛將軍充㳂海水軍都知兵馬使新志調露二年析横貴二州置巖州因巖岡之北以為名以討王郢鄂王潤薨潤宣宗子加魏博節度使韓簡同平章事宋威擊王仙芝於沂州城下大破之全考異曰實録去年十二月宋威自青州與副使曹晸進軍擊王仙芝仙芝敗走按仙芝若以去年十二月敗走中間半年豈能静處盖實因威除招討使連言之其實仙芝敗在此月不在十二月也仙芝亡去威奏仙芝已死縱遣諸道兵身還青州百官皆入賀居三日州縣奏仙芝尚在攻剽如故剽匹妙翻時兵始休詔復𤼵之復扶又翻士皆忿怨思亂八月仙芝陷陽翟郟城郟訖洽翻詔忠武節度使崔安濳𤼵兵擊之安濳慎由之弟也崔慎由相宣宗又昭義節度使曹翔將歩騎五千及義成兵衛東都宫以左散騎常侍曽元裕為招討副使守東都又詔山南東道節度使李福選歩騎二千守汝鄧要路仙芝進逼汝州詔邠寧節度使李侃鳯翔節度使令狐綯選歩兵一千騎兵五百守陜州潼闗陜失冉翻加成徳節度使王景崇兼中書令九月乙亥朔日有食之丙子王仙芝陷汝州執刺史王鐐鐐鐸之從父兄弟也鐐力彫翻又力弔翻從才用翻東都大震九域志汝州北至東都一百六十里士民挈家逃出城乙酉勑赦王仙芝尚君長罪除官以招諭之仙芝陷陽武攻鄭州昭義監軍判官雷殷符屯中牟中牟漢古縣隋曰郟城大業元年改曰圃田唐武徳三年改曰中牟屬鄭州九域志在汴州西七十里擊仙芝破走之冬十月仙芝南攻唐鄧西川節度使髙駢築成都羅城使僧景仙規度度徒洛翻周二十五里悉召縣令庀徒賦役成都府領成都華陽新都犀浦新繁雙流廣都郫温江靈池十縣庀匹婢翻具也賦布也分布使之就役也吏受百錢以上皆死蜀土疏惡以甓甃之環城十里内取土皆剗丘姪平之甓蒲力翻甎也甃則救翻環音宦剗初限翻削也垤徒結翻無得為坎埳以害耕種埳徒感翻坎旁入也役者不過十日而代衆樂其均樂音洛不費扑撻而功辦扑普卜翻自八月癸丑築之至十一月戊子畢功役之始作也駢恐南詔揚聲入冦雖不敢決來役者必驚擾乃奏遣景仙託遊行入南詔説諭驃信使歸附中國仍許妻以公主新書曰浮屠景仙如此則文意明説輸芮翻妻七細翻因與議二國禮儀乆之不決駢又聲言欲巡邊朝夕通烽火至大度河而實不行蠻中惴恐惴之睡翻由是訖於城成邊候無風塵之警先是西川將吏入南詔先悉薦翻將即亮翻驃信皆坐受其拜駢以其俗尚浮屠故遣景仙徃驃信果帥其大臣迎拜帥讀曰率信用其言王仙芝攻郢復二州陷之王郢因温州刺史魯寔請降寔屢為之論奏為于為翻勑郢詣闕郢擁兵遷延半年不至固求望海鎮使朝廷不許以郢為右率府率唐有十率府率右率府率其一也仍令左神䇿軍補以重職其先所掠之財並令給與十二月王仙芝攻申光廬壽舒通等州按唐書地理志通州屬山南東道宋之達州是也周世宗以南唐静海軍置通州今淮東之通州是也其地在唐則為揚州海陵縣之東境唐時淮南道未有通州此必誤叅考下文通當作蘄淮南節度使劉鄴奏求益兵勑感化節度使薛能選精兵數千助之鄭畋以言計不行稱疾遜位不許乃上言自沂州奏捷之後謂宋威奏破王仙芝於沂州城下上時掌翻仙芝愈肆猖狂屠陷五六州瘡痍數千里宋威衰老多病自妄奏以來諸道尢所不服妄奏謂奏仙芝已死今淹留亳州殊無進討之意曽元裕擁兵蘄黄專欲望風退縮若使賊陷揚州則江南亦非國有崔安濳威望過人張自勉驍雄良將宫苑使李瑑西平王晟之孫瑑柱兖翻言瑑奕世將家嚴而有勇請以安濳為行營都統瑑為招討使代威自勉為副使代元裕實考異曰録雖於此月載畋所上書亦不言行與不行新紀遂於此言安濳為諸道行營都統李瑑為招討草賊使張自勉副之按明年威元裕使副猶如故實録誤也上頗采其言青滄軍士戍安南青州平盧軍滄州義昌軍還至桂州逐觀察使李瓚瓚才但翻在考異曰新紀四年十二月今從實録瓚宗閔之子也李宗閔太和中為相以右諌議大夫張禹謨為桂州觀察使桂管監軍李維周驕横横户孟翻瓚曲奉之浸不能制桂管有兵八百人防禦使纔得百人餘皆屬監軍又預於逐帥之謀强取兩使印両使印謂觀察使及防禦使印也帥所類翻使疏吏翻下同擅補知州官奪昭州送使錢唐制諸州之稅分為三一曰上供以輸京師二曰送使以輸本道三曰留州留充本州經費詔禹謨并按之禹謨徹之子也張徹見二百四十二巻穆宗長慶元年招討副使都監楊復光奏尚君長弟讓據查牙山查鋤加翻官軍退保鄧州復光𤣥价之養子也楊𤣥价見二百五十卷懿宗咸通四年王仙芝攻蘄州蘄州刺史裴偓王鐸知舉時所擢進士也王鐐在賊中為仙芝以書説偓為于偽翻下同偓與仙芝約歛兵不戰許為之奏官鐐亦説仙芝許以如約偓乃開城延仙芝及黄巢輩三十餘人入城置酒大陳貨賄以贈之表陳其狀諸宰相多言先帝不赦龎勛朞年卒誅之事見上巻咸通九年十年卒子恤翻今仙芝小賊非龎勛之比赦罪除官益長姦宄長知両翻王鐸固請許之乃以仙芝為左神䇿軍押牙兼監察御史遣中使以告身即蘄州授之仙芝得之甚喜鐐偓皆賀未退黄巢以官不及已大怒曰始者共立大誓横行天下今獨取官赴左軍使此五千餘衆安所歸乎至考異曰仙芝巢初起時云數月間衆至數萬此纔有五千者盖烏合之衆聚散無常耳因毆仙芝傷其首毆烏口翻其衆諠譟不已仙芝畏衆怒遂不受命大掠蘄州城中之人半驅半殺焚其廬舍偓奔鄂州勑使奔襄州勑使授告身之中使也鐐為賊所拘賊乃分其軍三千餘人從仙芝及尚君長二千餘人從巢各分道而去星考異曰王坤驚聽録曰乾符四年丁酉仲夏天示彗草冦黄巢尚君長奔突即五年戊戍之歲狂冦王仙芝起自鄆封而侵汝鄭即大冦黄巢尚君長並賊帥之徒黨僅一千餘人攻陷汝州云云又曰黄巢望閩廣而去仙芝指鄆州南行尚君長劫陳蔡間取羣凶之願三千餘冦屬仙芝君長二千餘人屬黄巢所管明年二月仙芝陷鄂州巢陷鄆州則非巢趣閩廣仙芝趣鄆也王坤此書年月事迹差舛尤多但擇其可信者取之資治通鑑巻二百五十二
