body:
  text: 資治通鑑卷一百五十四宋司馬光撰胡三省音註梁紀十上章閹茂一年髙祖武皇帝十中大通二年春正月己丑魏益州刺史長孫壽梁州刺史元儁等遣將擊嚴始欣斬之蕭玩等亦敗死玩援始欣見上卷上年長知兩翻將即亮翻失亡萬餘人辛亥魏東徐州城民呂文欣等殺刺史元大賔據城反魏孝昌昌年置東徐州於下邳魏遣都官尚書平城樊子鵠討之二月甲寅斬文欣万俟醜奴侵擾闗中万莫北翻俟渠之翻魏爾朱榮遣武衛將軍賀㧞岳討之岳私謂其兄勝曰醜奴勍敵也勍其京翻今攻之不勝固有罪勝之讒嫉將生勝曰然則奈何岳曰願得爾朱氏一人為帥而佐之帥所類翻勝為之言於榮為于偽翻榮悦以爾朱天光為使持節都督二雍二岐諸軍事驃騎大將軍雍州刺史後魏雍州治長安北雍州治蕐原縣東雍州治鄭縣岐州治扶風雍縣南岐州治河池故道縣使疏吏翻雍於用翻驃匹妙翻騎奇寄翻以岳為左大都督又以征西將軍代郡侯莫陳悦為右大都督侯莫陳其先魏之别部也居庫斛真水世為渠帥遂以為氏其後鎮代郡武川因家焉竝為天光之副以討之天光初行唯配軍士千人發洛陽以西路次民馬以給之時赤水蜀賊斷路水經注赤水在鄭縣北即山海經之灌水也北注於渭蜀賊本蜀人之遷闗中者乗亂相聚為賊斷丁管翻詔侍中楊侃先行慰諭并税其馬蕐隂諸楊仕魏奕世貴顯闗西所歸重故使之先行慰諭也賊持疑不下軍至潼闗天光不敢進岳曰蜀賊䑕竊公尚遲疑若遇大敵將何以戰天光曰今日之事一以相委岳遂進擊蜀於渭北破之獲馬二千匹簡其壯徤以充軍士又税民馬合萬餘匹以軍士尚少少詩沒翻淹畱未進榮怒遣騎兵參軍劉貴乗驛至軍中責天光杖之一百以軍士二千人益之三月醜奴自將其衆圍岐州遣其大行臺尉遲菩薩李延壽曰其先魏之别號尉遲部因以為氏尉音欝菩薄胡翻薩桑葛翻僕射万俟仵自武功南渡渭攻圍趣柵仵疑古翻醜考異曰北史作万俟行今從周書天光使賀㧞岳將千騎救之菩薩等已㧞柵而還還從宣翻又如字岳故殺掠其吏民以挑之菩薩率步騎二萬至渭北挑徒了翻帥讀曰率岳以輕騎數十自渭南與菩薩隔水而語稱揚國威菩薩令省事傳語省事葢猶今之通事兩敵相向使之往来通𫝊言語省悉井翻岳怒曰我與菩薩語卿何人也射殺之射而亦翻明曰復引百餘騎隔水與賊語程扶又翻稍引而東至水淺可涉之處岳即馳馬東出賊以為走乃棄步兵輕騎南渡渭追岳岳依横岡設伏兵以待之賊半度岡東岳還兵擊之賊兵敗走岳既還兵擊賊伏兵又𤼵故敗走岳下令賊下馬者勿殺賊悉投馬俄獲三千人馬亦無遺遂擒菩薩仍度渭北降步卒萬餘竝收其輜重降戸江翻重直用翻醜奴聞之棄岐州北走安定走音奏置柵於平亭天光方自雍至岐與岳合平亭在涇州北自雍至岐自雍州至岐州也夏四月天光至汧渭之間汧水出汧縣西北而入於渭汧口堅翻停軍牧馬宣言天時將熱未可行師俟秋凉更圖進止獲醜奴覘候者縱遣之覘醜亷翻又丑艶翻醜奴信之散衆耕於細川據令狐德棻後周書百里細川在岐州北又據元豐九域志涇州靈臺縣冇百里鎮葢即細川之地細川平亭當亦相近使其太尉侯伏侯元進將兵五千據險立柵侯伏侯虜三字姓將即亮翻其餘千人以下為柵者甚衆天光知其勢分晡時宻嚴諸軍相繼俱𤼵黎明圍元進大柵㧞之所得俘囚一皆縱遣諸柵聞之皆降唐末髙仁厚平阡能等亦用此術降戸江翻下同天光晝夜徑進抵安定城下賊涇州刺史侯㡬長貴以城降侯幾虜複姓魏書官氏志内入諸姓有俟幾氏俟侯字相近醜奴棄平亭走欲趣髙平九域志鎮戎軍古髙平地也趣七喻翻天光遣賀㧞岳輕騎追之丁卯及於平凉賊未成列直閤代郡侯莫陳崇單騎入賊中於馬上生擒醜奴因大呼衆皆披靡呼火故翻披普彼翻無敢當者後騎益集賊衆崩潰遂大破之天光進逼髙平城中執送蕭寳寅以降万俟醜奴胡琛之將也普通六年破魏將崔延伯其衆始盛蕭寳寅大通元年叛魏至二年敗奔醜奴及是皆平壬申以吐谷渾王佛輔為西秦河二州刺史吐從暾入聲谷音浴甲戌魏以闗中平大赦万俟醜奴蕭寳寅至洛陽置閶闔門外都街之中士女聚觀凡三日丹陽王蕭贊表請寳寅之命賛以寳寅為叔父故請其命吏部尚書李神儁黄門侍郎髙道穆素與寳寅善欲左右之左右讀曰佐佑言於魏主曰寳寅叛逆事在前朝朝音直遙翻㑹應詔王道習自外至應詔猶漢之待詔也帝問道習在外所聞對曰惟聞李尚書髙黄門與蕭寳寅周欵周至也宻也欵愛也竝居得言之地必能全之且二人謂寳寅叛逆在前朝寳寅為醜奴太傅豈非陛下時邪賊臣不翦法欲安施帝乃賜寳寅死於駞牛署邪音耶後魏官有駞牛都尉署者其寺舍也五代志太僕寺之屬有駞牛署掌飼駞騾驢牛有令丞斬醜奴於都市六月丁巳帝復以魏汝南王悦為魏王復扶又翻求考異曰梁帝紀中大通元年正月甲子魏汝南王悦還本國許之二年六月丁巳遣悦還北為魏主按魏書悦傳悦未嘗歸魏復入梁今刪去元年事戊寅魏詔胡氏親屬受爵於朝者皆黜為民謂靈后親屬也朝直遙翻庚申以魏降將范遵為安北將軍司州牧從魏王悦北還范遵魏北海王顥之舅葢與顥同来奔降戸江翻將即亮翻万俟醜奴既敗自涇豳以西至靈州後魏滅赫連以赫連果城置薄骨律鎮至孝昌中改鎮為靈州杜佑曰薄骨律鎮今靈武郡富平今迴樂縣唐靈州治迴樂括地志云薄骨律鎮城在河渚之中隨水上下未嘗陷沒故號靈州也賊黨皆降於魏唯所署行臺万俟道洛帥衆六千逃入山中不降降戸江翻帥讀曰率下同時髙平大旱爾朱天光以馬乏草退屯城東五十里遣都督長孫邪利帥二百人行原州事以鎮之魏太延二年置髙平鎮正光五年改曰原州治髙平城領髙平長城二郡道洛濳與城民通謀掩襲邪利并其所部皆殺之天光帥諸軍赴之道洛出戰而敗帥其衆西入牽屯山班志开頭山在安定郡涇陽縣西涇水所出師古注曰开音牽此山在今靈州東南俗語訛謂之开屯山杜佑曰牽屯山在今原州髙平縣據險自守爾朱榮以天光失邪利不獲道洛復遣使杖之一百復扶又翻使疏吏翻以詔書黜天光為撫軍將軍雍州刺史降爵為侯天光追擊道洛於牽屯道洛敗走入隴隴隴山也歸略陽賊帥王慶雲晉武帝分天水置略陽郡隋廢為隴城縣屬秦州考異曰魏帝紀作白馬龍涸胡王慶雲今從爾朱天光傳帥音所類翻道洛驍果絶倫驍堅堯翻慶雲得之甚喜謂大事可濟遂稱帝於水洛城水經注水洛水導源隴山西逕水洛亭西南注略陽川九域志水洛城在德順軍西南一百里范仲淹曰朝那之西秦亭之東有水洛城置百官以道洛為大將軍秋七月天光帥諸軍入隴至水洛城慶雲道洛出戰天光射道洛中臂射而亦翻中竹仲翻失弓還走㧞其東城賊併兵趣西城趣七喻翻城中無水衆渴乏有降者言慶雲道洛欲突走天光恐失之乃遣人招諭慶雲使早降降戸江翻曰若未能自决當聽諸人今夜共議明晨早報慶雲等冀得少緩因待夜突出少詩沒翻乃報曰請俟明日天光因使謂曰知須水須者意所欲也今相為小退為於偽翻任取澗水飲之賊衆悦無復走心天光宻使軍士多作木槍各長七尺此即拒馬槍也杜佑曰拒馬槍以木徑二尺長短隨事十字鑿孔縱横安檢長丈鋭其端以塞要路昏後繞城布列要路加厚又伏人槍中備其衝突兼令宻縳長梯於城北其夜慶雲道洛果馳馬突出遇槍馬各傷倒伏兵起即時擒之軍士縁梯入城餘衆皆出城南遇槍而止窮窘乞降降戸江翻丙子天光悉收其仗而阬之死者萬七千人分其家口於是三秦河渭瓜凉鄯州皆降三秦秦東秦南秦也河州乞伏之地也魏太武真君六年置枹罕鎮後改為河州領金城武始洪和臨洮郡渭州領隴西南安南安陽廣寧郡𤓰州即古敦煌之地鄯州禿髪氏之地漢金城西部都尉所統也師古曰𤓰州即左傳所云允姓之戎居于𤓰州者也其地今猶出大𤓰長者狐入𤓰中食之首尾不出天光頓軍略陽詔復天光官爵尋加侍中儀同三司以賀㧞岳為涇州刺史侯莫陳悦為渭州刺史秦州城民謀殺刺史駱超南秦州城民謀殺刺史辛顯超顯皆覺之走歸天光天光遣兵討平之步兵校尉宇文泰從賀㧞岳入闗以功遷征西將軍行原州事時闗隴彫弊泰撫以恩信民皆感悦曰早遇宇文使君吾輩豈從亂乎為宇文泰得賀㧞岳之衆以創大業於闗西張本八月庚戍上餞魏王悦於德陽堂遣兵送至境上年考異曰悦傳云立為魏主號更興衍遣其將軍王僧辯送至境上以冀侵逼按僧辯傳未嘗送悦蓋王弁耳魏爾朱榮雖居外藩遙制朝政朝直遙翻樹置親黨布列魏主左右伺察動静大小必知伺相吏翻魏主雖受制於榮然性勤政事朝夕不倦數親覽辭訟理寃獄數所角翻榮聞之不悦史言魏主不能養晦帝又與吏部尚書李神儁議清治選部治直之翻選須絹翻下同榮嘗闗補曲陽縣令據榮傳即上曲陽縣也漢晉屬常山郡後魏屬中山郡闗補者先補授而後闗吏部五代志趙州鼓城縣舊曰曲陽劉昫曰漢上曲陽縣隋改曰恒陽唐元和十五年復曰曲陽趙州之曲陽下曲陽也神儁以階懸不奏言階級相去懸絶其人不應補為縣令别更擬人榮大怒即遣所補者往奪其任神儁懼而辭位榮使尚書左僕射爾朱世隆攝選榮啓北人為河南諸州帝未之許太宰天穆入見面諭見賢遍翻帝猶不許天穆曰天柱既有大功為國宰相若請普代天下官恐陛下亦不得違之如何啓數人為州遽不用也帝正色曰天柱若不為人臣朕亦須代如其猶存臣節無代天下百官之理榮聞之大恚恨曰天子由誰得立今乃不用我語爾朱皇后性妬忌屢致忿恚帝遣爾朱世隆語以大理恚於避翻語牛倨翻大理謂事理之大致也后曰天子由我家置立今便如此我父本即自作今亦復决决判也謂天下事有判决也復扶又翻世隆曰止自不為止當作正若本自為之臣今亦封王矣帝既外逼於榮内逼皇后恒快怏不以萬乗為樂恒音常怏於兩翻乘繩正翻樂音洛下同惟幸冦盗未息欲使與榮相持及闗隴既定告捷之日乃不甚喜謂尚書令臨淮王彧曰即今天下便是無賊彧見帝色不悦曰臣恐賊平之後方勞聖慮帝畏餘人怪之還以他語亂之曰然撫寧荒餘荒餘謂兵荒之餘民也彌成不易易以䜴翻榮見四方無事奏稱參軍許周勸臣取九錫臣惡其言已斥遣令去榮時望得殊禮故以意諷朝廷帝實不欲與之因稱歎其忠榮好獵惡烏路翻好呼報翻不捨寒暑列圍而進令士卒必齊壹雖遇險阻不得違避一鹿逸出必數人坐死有一卒見虎而走榮謂曰汝畏死邪即斬之自是每獵士卒如登戰塲嘗見虎在窮谷中榮令十餘人空手搏之毋得損傷死者數人卒擒得之魏道武帝因摶熊而謝于栗磾爾朱榮反是嗜殺人者烏能定天下邪卒音子恤翻以此為樂其下甚苦之大宰天穆從容謂榮曰樂音洛從于容翻大王勲業已盛四方無事唯宜脩政養民順時蒐狩禮春蒐夏苗秋獮冬狩杜預曰蒐索擇取不孕者苖為苖除害也獮殺也以殺為名順秋氣也狩圍守也冬物畢成獲則取之無所擇也何必盛夏驅逐感傷和氣榮攘袂曰靈后女主不能自正推奉天子乃人臣常節葛榮之徒本皆奴才乘時作亂譬如奴走擒獲即已頃来受國大恩未能混壹海内何得遽言勳業如聞朝士猶自寛縱今秋欲與兄戒勒士馬校獵嵩髙令貪汙朝貴入圍搏虎朝直遙翻仍出魯陽歴三荆悉擁生蠻北填六鎮杜佑曰北荆州今即伊陽縣東荆州後改曰淮州今淮安郡荆州今南陽郡余按榮言出魯陽則已越伊陽而南矣五代志舂陵郡後魏置南荆州當以此足三荆之數生蠻謂諸蠻戸之未附於魏者六鎮叛亂鎮戸荒殘故欲填之囘軍之際掃平汾胡稽胡皆居汾州界謂之汾胡明年簡練精騎分出江淮蕭衍若降乞萬戸侯騎奇計翻降戸江翻乞丘計翻與也如其不降以數千騎徑度縛取然後與兄奉天子巡四方乃可稱勳耳今不頻獵兵士懈怠安可復用也懈七隘翻復扶又翻城陽王徽之妃帝之舅女侍中李彧延寔之子帝之姊婿也徽彧欲得權寵惡榮為己害日毁榮於帝勸帝除之帝懲河隂之難河隂之難事見一百五十二卷惡烏路翻難乃旦翻恐榮終難保由是宻有圖榮之意侍中楊侃尚書右僕射元羅亦預其謀元羅義之弟也㑹榮請入朝欲視皇后㝃乳㝃與免同又音晩師古曰免乳為産子也乳人喻翻唐韻曰子母相解曰免徽等勸帝因其入刺殺之刺七亦翻唯膠東侯李侃晞濟隂王暉業言榮若来必當有備恐不可圖濟子禮翻又欲殺其黨與𤼵兵拒之帝疑未定而洛陽人懐憂懼中書侍郎郉子才之徒已避之東出郉邵字子才避魏主兄彭城王邵諱故以字行本傳云少時有避遂不行名榮乃遍與朝士書相任去留中書舍人温子昇以書呈帝帝恒望其不来恒戸登翻及見書以榮必来色甚不悦子才名邵以字行巒之族弟也邢巒事魏宣武帝屢經將領有功考異曰北史邢巒卷首排目云族孫臧劭而卷中乃云巒叔祖祐祐從祖虯虯子臧劭魏書亦云巒從祖祐然則臧劭乃巒族弟非族孫也時人多以字行者舊史皆因之武衛將軍奚毅建義初往来通命事見二百五十二卷大通二年帝每期之甚重然猶以榮所親信不敢與之言情毅曰若必有變臣寧死陛下不能事契胡爾朱氏契胡種也契欺訖翻帝曰朕保天柱無異心亦不忘卿忠欵欵誠也爾朱世隆疑帝欲為變乃為匿名書自牓其門云天子與楊侃髙道穆等為計欲殺天柱取以呈榮榮自恃其彊不以為意手毁其書唾地曰世隆無膽誰敢生心榮妻北鄉長公主亦勸榮不行榮妻非元氏也以榮功封北鄉長公主主考異作鄉郡長公主注曰北史世隆𫝊作北鄉郡公今從魏帝紀寫按考異作鄉郡長公主是也通鑑作北鄉長公主傳之誤耳五代志上黨郡鄉縣石勒置武鄉郡後魏去武字為鄉郡證以魏收志無北鄉郡則從鄉郡為是唾吐臥翻長知兩翻榮不從是月榮將四五千騎發幷州將即亮翻騎奇計翻時人皆言榮反又云天子必當圖榮九月榮至洛陽天考異曰魏帝紀曰辛卯榮穆自晉陽来朝按北史九月初榮至京十五日天穆至是月甲戌朔辛卯乃十八日非也帝即欲殺之以太宰天穆在幷州恐為後患故忍未𤼵幷召天穆有人告榮云帝欲圖之榮即具奏帝曰外人亦言王欲害我豈可信之於是榮不自疑毎入謁帝從人不過數十從才用翻又皆挺身不持兵伏挺徒頂翻直也帝欲止城陽王徽曰縱不反亦何可耐耐忍也况不可保邪先是長星出中台掃大角恒州人髙榮祖頗知天文榮問之對曰除舊布新之象也三台中台上星為諸侯三公大角者天王座也傳曰彗所以除舊布新先悉薦翻恒戸登翻榮甚悦榮至洛陽行臺郎中李顯和曰天柱至那無九錫安須王自索也李顯和蓋為幷肆九州行臺郎中時從榮至洛陽索山客翻亦是天子不見機都督郭羅察曰今年真可作禪文河隂之難榮已募朝士作禪文故羅察云然郭羅察即郭羅刹何但九錫參軍禇光曰人言幷州城上有紫氣何慮天柱不應之榮下人皆陵侮帝左右無所忌憚故其事皆上聞皆上時掌翻奚毅又見帝求間求間即請間也帝即下明光殿與語知其至誠乃召城陽王徽及楊侃李彧告以毅語榮小女適帝兄子陳留王寛榮嘗指之曰我終得此壻力徽以白帝曰榮慮陛下終為己患脱有東宫必貪立孩㓜孩何開翻若皇后不生太子則立陳留耳帝夣手持刀自割落十指惡之惡烏路翻告徽及楊侃徽曰蝮蛇螫手壯士解腕螫音釋腕烏貫翻割指亦是其類乃吉祥也戊子天穆至洛陽帝出迎之榮與天穆竝從入西林園宴射榮奏曰近来侍官皆不習武陛下宜將五百騎出獵因省辭訟將即亮翻騎奇計翻省悉井翻先是奚毅言榮欲因獵挾天子移都先悉薦翻由是帝益疑之辛卯帝召中書舍人溫子昇告以殺榮狀并問以殺董卓事子昇具道本末帝曰王允若即赦涼州人必不應至此董卓王允事見六十卷漢獻帝初平三年良乆語子昇曰語牛倨翻朕之情理卿所具知死猶須為况不必死吾寧為髙貴鄉公死不為常道鄉公生謂曹魏髙貴鄉公欲誅司馬昭不克而死常道鄉公禪位于晉而生也帝謂殺榮天穆即赦其黨皆應不動應詔王道習曰爾朱世隆司馬子如朱元龍特為榮所委任具知天下虛實謂不宜留徽及楊侃皆曰若世隆不全仲逺天光豈有来理爾朱仲逺時鎮徐州天光時鎮闗隴帝亦以為然徽曰榮腰間常有刀或能狼戾傷人狼當作很孟子樂嵗粒米狼戾猶言狼籍也非此義臨事願陛下起避之乃伏侃等十餘人於明光殿東其日榮與天穆竝入坐食未訖起出侃等從東階上殿上時掌翻見榮天穆已至中庭事不果壬辰帝忌日癸巳榮忌日親喪之日為忌日禮曰忌日不樂甲午榮暫入即詣陳留王家飲酒極醉遂言病動頻日不入帝謀頗泄世隆又以告榮且勸其速𤼵榮輕帝以為無能為曰何怱怱預帝謀者皆懼帝患之城陽王徽曰以生太子為辭榮必入朝因此斃之帝曰后懐孕始九月可乎朝直遙翻孕以正翻徽曰婦人不及期而産者多矣彼必不疑帝從之戊戍帝伏兵於明光殿東序聲言皇子生遣徽馳騎至榮第告之騎奇計翻榮方與上黨王天穆慱徽脱榮帽懽舞盤旋唐李太白詩云脱君帽為君笑脱帽懽舞蓋夷禮也兼殿内文武傳聲趣之趣讀曰促榮遂信之與天穆俱入朝帝聞榮来不覺失色中書舍人溫子昇曰陛下色變帝連索酒飲之酒能變貌又能張膽故連索飲之索山客翻帝令子昇作赦文既成執以出遇榮自外入問是何文書子昇顔色不變曰勑榮不取視而入帝在東序下西向坐榮天穆在御榻西北南向坐徽入始一拜榮見光禄少卿魯安典御李侃晞等抽刀從東戸入漢九卿惟正卿一人魏髙祖太和十一年始各置少卿一人典御嘗食典御也少詩詔翻即起趨御座趨七喻翻帝先横刀膝下遂手刅之安等亂砍榮與天穆同時俱死榮子菩提及車騎將軍爾朱陽覩等三十人從榮入宫亦為伏兵所殺菩薄乎翻帝得榮手板上有數牒啓皆左右去留人名非其腹心者悉在出限出不使在帝左右帝曰豎子若過今日遂不可制於是内外喜譟聲滿洛陽城百僚入賀帝登閶闔門下詔大赦遣武衛將軍奚毅前燕州刺史崔淵將兵鎮北中燕因肩翻將即亮翻是夜爾朱世隆奉北鄉長公主帥榮部曲焚西陽門出屯河隂西陽門即洛陽城西明門衛將軍賀㧞勝與滎黨田怡等聞榮死奔赴榮第時宫殿門猶未加嚴防怡等議即攻門勝止之曰天子既行大事必當有備吾輩衆少何可輕爾少時沼翻但得出城更為他計怡乃止及世隆等走勝遂不從考異曰周書及北史云勝復從世隆至河橋勝以為臣無讎君之義遂勒所部還都莊帝大悦今從魏書帝甚嘉之朱瑞雖為榮所委而善處朝廷之間朱瑞本榮之行臺郎中榮定魏主于洛陽以瑞為黄門侍郎兼中書舍人處昌吕翻帝亦善遇之故瑞從世隆走而中道逃還榮素厚金紫光禄大夫司馬子如榮死子如自宫中突出至滎第棄家隨榮妻子走出城世隆即欲還北子如曰兵不厭詐今天下恟恟唯彊是視恟許勇翻當此之際不可以弱示人若亟北走恐變生肘腋腋音亦不如分兵守河橋還軍向京師出其不意或可成功假使不得所欲亦足示有餘力使天下畏我之彊不敢叛散世隆從之己亥攻河橋擒奚毅等殺之據北中城魏朝大懼遣前華陽太守叚育慰諭之魏分漢中之沔陽西縣置華陽郡以其地在華山之南也朝直遙翻華户化翻世隆斬首以徇魏以雍州刺史爾朱天光為侍中儀同三司雍於用翻以司空楊津為都督并肆等九州諸軍事驃騎大將軍并州刺史兼尚書令北道行臺經略河汾驃匹妙翻騎奇計翻榮之入洛也以髙敖曹自隨禁於駝牛署爾朱榮誘拘髙敖曹事見一百五十二卷大通二年榮死帝引見勞勉之見賢遍翻勞力到翻兄乾自東冀州馳赴洛陽魏孝昌末葛榮作亂髙翼聚衆河濟間魏因置東冀州以翼為刺史蓋因劉宋先置冀州於河濟間而置東冀州以别河北之冀州也翼乾之族也按後以翼為乾之父帝以乾為河北大使使疏吏翻敖曹為直閣將軍使歸招集鄉曲為表裏形援帝親送之於河橋敖曹兄弟歸鄉里路當東出河橋在洛城北帝不應送之於此河橋二字意必有誤舉酒指水曰卿兄弟冀部豪傑能令士卒致死京城儻有變可為朕河上一揚塵乾垂涕受詔敖曹援劒起舞誓以必死為于偽翻下亦為吾為為陛下同援于元翻冬十月癸卯朔世隆遣爾朱拂律歸考異曰魏書無拂律歸名伽藍記有之按爾朱度律時在世隆所或者拂律歸即度律也將胡騎一千皆白服来至郭下索太原王尸榮迎立敬宗封太原王將即亮翻騎奇計翻索山客翻帝升大夏門望之洛陽城北有大夏廣莫二門夏戸雅翻遣主書牛法尚謂之曰太原王立功不終隂圖舋逆舋許覲翻王法無親言法在必行雖親無赦也已正刑書罪止榮身餘皆不問卿等若降官爵如故拂律歸曰臣等隨太原王入朝忽致寃酷今不忍空歸願得太原王尸生死無恨因涕泣哀不自勝勝音升羣胡皆慟哭聲振城邑帝亦為之愴然遣侍中朱瑞齎鐵劵賜世隆世隆謂瑞曰太原王功格天地赤心奉國長樂不顧信誓枉加屠害魏敬宗本封長樂王樂音洛今日兩行鐵字何足可信行戸剛翻吾為太原王報讎終無降理瑞還白帝帝即出庫物置城西門外募敢死之士以討世隆一日即得萬人與拂律歸等戰於郭外拂律歸等生長戎旅長知兩翻洛陽之人不習戰鬭屢戰不克甲辰以前車騎大將軍李叔仁為大都督帥衆討世隆帥讀曰率戊申皇子生大赦以中書令魏蘭根兼尚書左僕射為河北行臺定相殷三州皆稟蘭根節度相悉亮翻爾朱氏兵猶在城下帝集朝臣愽議皆恇懼不知所出通直散騎常侍李苖奮衣起曰朝直遙翻恇去王翻散悉亶翻騎奇寄翻下同今小賊唐突如此朝廷有不測之危正是忠臣烈士效節之日臣雖不武請以一旅之衆為陛下徑斷河橋杜預曰五百人為一旅斷丁管翻城陽王徽髙道穆皆以為善帝許之乙卯苗募人從馬渚上流乗船夜下去橋數里縱火船焚河橋倐忽而至爾朱氏兵在南岸者望之爭橋北渡俄而橋絶溺死者甚衆苗將百許人泊於小渚以待南援溺奴狄翻將即亮翻下同官軍不至爾朱氏就擊之左右皆盡苗赴水死帝傷惜之贈車騎大將軍儀同三司封河陽侯謚曰忠烈世隆亦收兵北遁丙辰詔行臺源子恭將步騎一萬出西道楊昱將募士八千出東道以討之募士即洛城西門外所募者也子恭仍鎮太行丹谷築壘以防之水經注丹水出上黨髙都縣故城東北阜下東南流注於丹谷晉書地道記曰縣有太行闗丹溪為闗之東谷塗自此去不復由闗矣行戸剛翻三考異曰伽藍記云源子恭楊寛領步騎萬鎮河内今從魏書世隆至建州慕容永分上黨置建興郡魏真君元年省和平五年復置郡永安中罷郡置建州治髙都城領髙都長平安平恭寕郡據五代志建州即唐澤州之地刺史陸希質閉城拒守世隆攻㧞之殺城中人無遺類以肆其忿唯希質走免詔以前東荆州刺史元顯恭為晉州刺史魏孝昌中置唐州建義元年改曰晉州治白馬城領平陽西河南綘北綘永安北五城定陽西平城敷城河西五城冀氏義寕郡兼尚書左僕射西道行臺魏東徐州刺史廣牧斛斯椿廣牧縣漢朔方東部都尉治所也魏省朔方以廣牧縣屬新興郡魏收志屬朔州附化郡考椿傳椿廣牧富昌人則又似廣牧自為一郡也斛斯虜複姓素依附爾朱榮榮死椿懼聞汝南王悦在境上乃帥部衆棄州歸悦帥讀曰率下同悦授椿侍中大將軍司空封靈丘郡公又為大行臺前驅都督汾州刺史爾朱兆聞榮死自汾州帥騎據晉陽騎奇計翻世隆至長子考異曰魏帝紀云世隆停建興之髙都今從世隆傳兆来㑹之壬申共推太原太守行并州事長廣王曄即皇帝位守式又翻大赦改元建明曄英之弟子也中山王英著功於太和正始之間以兆為大將軍進爵為王世隆為尚書令賜爵樂平王加太傅司州牧又以榮從弟度律為太尉賜爵常山王從才用翻世隆兄天柱長史彦伯為侍中徐州刺史仲逺為車騎大將軍兼尚書左僕射三徐州大行臺仲逺亦起兵向洛陽三徐州徐州治彭城北徐州治琅邪永安二年置領東泰山琅邪二郡東徐州治下邳此皆長廣王所除授爾朱天光之克平凉也宿勤明逹請降宿勤明逹與万俟醜奴皆胡琛將也降戸江翻既而復叛北走天光遣賀㧞岳討之明逹奔東夏東夏唐之延州夏戸雅翻岳聞爾朱榮死不復窮追復扶又翻還涇州以待天光天光與侯莫陳悦亦下隴與岳謀引兵向洛魏敬宗使朱瑞慰諭天光天光與岳謀欲令帝外奔而更立宗室更工衡翻乃頻啟云臣實無異心唯欲仰奉天顔以申宗門之罪又使其下僚屬啓云天光宻有異圖願思勝筭以防之天光設兩端以疑魏朝范陽太守盧文偉誘平州刺史侯淵出獵閉門拒之淵本領平州鎮范陽范陽即涿郡後漢章帝改焉誘音酉淵屯於郡南為榮舉哀為于偽翻勒兵南向進至中山行臺僕射魏蘭根邀擊之為淵所敗敗補賣翻敬宗以城陽王徽兼大司馬録尚書事總統内外徽意謂榮既死枝葉自應散落及爾朱世隆等兵四起黨衆日盛徽憂怖不知所出怖普布翻性多嫉忌不欲人居己前每獨與帝謀議羣臣有獻䇿者徽輒勸帝不納且曰小賊何慮不平又靳惜財貨賞賜率皆薄少靳居焮翻少詩沼翻或多而中減或與而復追故徒有糜費而恩不感物史言徽誤魏主復扶又翻十一月癸酉朔敬宗以車騎將軍鄭先䕶為大都督與行臺楊昱共討爾朱仲逺乙亥以司徒長孫稚為太尉臨淮王彧為司徒丙子進雍州刺史廣宗公爾朱天光爵為王自此以上至鄭先䕶官爵皆敬宗所授長廣王亦以天光為隴西王爾朱仲逺攻西兗州魏太和中置西兗州於滑臺孝昌中置西兗州於定陶下云仲逺於賀㧞勝戰於滑臺東則是時猶以滑臺為西兖州也丁丑㧞之擒刺史王衍衍肅之兄子也王肅去齊入魏而貴顯癸未敬宗以右衛將軍賀㧞勝為東征都督壬辰又以鄭先䕶兼尚書左僕射為行臺與勝共討仲逺戊戍詔罷魏蘭根行臺以定州刺史薛曇尚兼尚書為北道行臺曇徒舎翻鄭先䕶疑賀㧞勝置之營外庚子勝與仲逺戰於滑臺東兵敗降於仲逺初爾朱榮嘗從容問左右曰從于容翻一日無我誰可主軍皆稱爾朱兆榮曰兆雖勇於戰鬭然所將不過三千騎多則亂矣堪代我者唯賀六渾耳因戒兆曰爾非其匹終當為其穿鼻譬之以牛牛鼻既穿則為人所制乃以髙歡為晉州刺史及兆引兵向洛遣使召歡歡遣長史孫騰詣兆辭以山蜀未平蜀人徙汾晉依山而居者謂之山蜀今方攻討不可委去致有後憂定蜀之日當隔河為犄角之勢犄居蟻翻兆不悦曰還白髙晉州吾得吉夣夣與吾先人登髙丘丘旁之地耕之已熟獨餘馬藺本草蠡實馬藺子也出冀州圖經曰馬蕳子生河東川谷葉似薤而長厚衍義曰馬藺葉牛馬皆不食為纔出土葉已硬也先人命吾㧞之隨手而盡以此觀之往無不克騰還報歡曰兆狂愚如是而敢為悖逆吾勢不得乆事爾朱矣為歡起兵討爾朱張本悖蒲内翻又蒲沒翻十二月壬寅朔爾朱兆攻丹谷都督崔伯鳯戰死都督史仵龍開壁請降仵宜古翻降戸江翻源子恭退走兆輕兵倍道兼行從河橋西涉渡藍考異曰伽記云從雷波涉渡今從魏書兆𫝊先是敬宗以大河深廣謂兆未能猝濟先昔薦翻是日水不沒馬腹甲辰暴風黄塵漲天兆騎叩宫門宿衛乃覺彎弓欲射騎奇計翻下同射而亦翻矢不得發一時散走華山王鷙斤之𤣥孫也斤亂代事見一百四卷晉孝武太元元年魏以此始亦以此終天邪人邪素附爾朱氏帝始聞兆南下欲自帥諸軍討之鷙説帝曰黃河萬仭兆安得渡帝遂自安及兆入宫鷙復約止衛兵不使鬭帥音率説式芮翻復扶又翻帝步出雲龍門外遇城陽王徽乗馬走帝屢呼之不顧而去徽預國大謀敗不即死去將安之兆騎執帝鎻於永寧寺樓上帝寒甚就兆求頭巾頭巾所謂袹頭也不與兆營於尚書省用天子金皷設刻漏於庭撲殺皇子皇子爾朱后所生也撲弼角翻汙辱嬪御妃主汙烏故翻嬪毘賔翻縱兵大掠殺司空臨淮王彧尚書左僕射范陽王誨青州刺史李延寔等城陽王徽走至山南山南伊潁南山之南也扺前洛陽令冦祖仁家所考異曰魏書作冦彌按冦讃諸孫字皆連祖字或者名彌字祖仁今從伽藍記祖仁一門三刺史皆徽所引㧞以有舊恩故投之徽齎金百斤馬五十匹祖仁利其財外雖容納而私謂子弟曰如聞爾朱兆購募城陽王得之者封千戸侯今日富貴至矣乃怖徽云官捕將至令其逃於他所怖普布翻使人於路邀殺之送首於兆徽背敬宗而祖仁亦背徽惡殃之報何速哉蒼蒼之不可欺也如此兆亦不加勳賞兆夣徽謂己曰我有金二百斤馬百匹在祖仁家卿可取之兆既覺覺古孝翻意所夣為實即掩捕祖仁徴其金馬祖仁謂人宻告望風欵服云實得金百斤馬五十匹欵誠實也獄囚招承之辭曰欵言得其實也兆疑其隱匿依夣徴之祖仁家舊有金三十斤馬三十匹盡以輸兆兆猶不信𤼵怒執祖仁懸首髙樹大石墜足捶之至死捶止橤翻爾朱世隆至洛陽自長子至洛陽也兆自以為己功責世隆曰叔父在朝日乆世隆榮從弟兆榮從子故呼世隆為叔父靈后臨朝之時世隆已在朝故曰日乆朝直遥翻耳目應廣如何令天柱受禍按劒瞋目聲色甚厲瞋七人翻世隆遜辭拜謝然後得已由是深恨之為爾朱兄弟叔姪互相猜疑以致夷滅張本爾朱仲逺亦自滑臺至洛戊申魏長廣王大赦爾朱榮之死也敬宗詔河西賊帥紇豆陵步蕃使襲秀容步蕃居北河之西紇豆陵虜三宇姓魏書官氏志次南諸姓有紇豆陵氏帥音所類翻紇音下沒翻及兆入洛步蕃南下兵勢甚盛故兆不暇乆留亟還晉陽以禦之使爾朱世隆度律彦伯等留鎮洛陽甲寅兆遷敬宗於晉陽兆自於河梁監閱財資河梁即河橋監工咸翻髙歡聞敬宗向晉陽帥騎東巡欲邀之不及因與兆書為陳禍福不宜害天子受惡名兆怒不納爾朱天光輕騎入洛見世隆等即還雍州帥讀曰率騎奇計翻為于偽翻雍於用翻初敬宗恐北軍不利北軍謂源子恭鎮丹谷之軍也欲為南走之計託云征蠻以髙道穆為南道大行臺未及發而兆入洛道穆託疾去世隆殺之主者請追李苗封贈世隆曰當時衆議更一二日即欲縱兵大掠焚燒郭邑賴苗之故京師獲全天下之善一也不宜復追復扶又翻爾朱榮之死也世隆等徴兵於大寧太守代人房謨魏收志魏孝昌中置泰寧郡屬建州其地當在唐澤州沁水縣界大當作泰謨不應前後斬其三使使䟽吏翻遣弟毓詣洛陽及兆得志其黨建州刺史是蘭安定是蘭姓也安定其名執謨繫州獄郡中蜀人聞之皆叛此謂蜀人之居泰寧者亦汾蜀絳蜀之類也安定給謨弱馬令軍前慰勞勞力到翻諸賊見謨莫不遙拜謨先所乗馬安定别給將士將即亮翻戰敗蜀人得之謂謨遇害莫不悲泣善養其馬不聽人乗之兒童婦女競投草粟皆言此房公馬也爾朱世隆聞之捨其罪以為其府長史北道大行臺楊津以衆少留鄴召募欲自滏口入并州㑹爾朱兆入洛津乃散衆輕騎還朝少詩沼翻滏音釜騎奇計翻朝直遙翻爾朱世隆與兄弟宻謀慮長廣王母衛氏干預朝政伺其出行遣數十騎如刼盜者於京巷殺之直曰街曲曰巷京巷洛京之曲巷也朝直遙翻伺相吏翻尋懸牓以千萬錢募賊甲子爾朱兆縊敬宗於晉陽三級佛寺年二十匹廢帝謚帝曰武懐皇帝及孝武帝立以廟諱改謚曰孝莊皇帝廟號敬宗縊於賜翻又於計翻并殺陳留王寛是月紇豆陵步蕃大破爾朱兆於秀容南逼晉陽兆懼使人召髙歡幷力髙考異曰北齊慕容紹宗傳兆召祖紹宗諫曰今天下擾攘人懐覬覦正是智士用䇿之秋髙晉州才雄氣猛英略盖世譬如蛟龍安可借以雲雨兆怒曰我與晉州推誠相待何得輒相間阻囚紹宗數日乃釋之北史紹宗語在神武請帥降户就食山東下按兆始召歡以自救非猜嫌之時今從北史僚屬皆勸歡勿應召歡曰兆方急保無它慮遂行歡所親賀㧞焉過兒請緩行以弊之歡往往逗留辭以河無橋不得渡此河蓋汾河也步蕃兵日盛兆屢敗告急於歡歡乃往從之兆時避步蕃南出步蕃至平樂郡平樂郡據爾朱兆傳當作樂平郡後漢獻帝分太原置樂平郡治沾城唐遼州即其地歡與兆進兵合擊大破之斬步蕃於石皷山魏收志秀容郡秀容縣有石皷山其衆退走兆德歡相與誓為兄弟將數十騎詣歡通夜宴飲初葛榮部衆流入并肆者二十餘萬為契胡凌暴契胡爾朱之種人也契欺訖翻皆不聊生大小二十六反誅夷者半猶謀亂不止兆患之問計於歡歡曰六鎮反殘不可盡殺自破六韓㧞陵杜洛周之敗其衆盡歸葛榮皆六鎮人也宜選王腹心使統之有犯者罪其帥帥所類翻則所罪者寡矣兆曰善誰可使者賀㧞允時在坐坐徂臥翻請使歡領之歡拳敺其口折一齒曰平生天柱時奴輩伏處分如鷹犬敺烏口翻歡自謂也詭為遜辭使兆不疑已折而設翻處昌呂翻分扶問翻下同今日天下事取捨在王而阿鞠泥敢僣易妄言請殺之賀㧞允字阿鞠泥易以豉翻兆以歡為誠遂以其衆委焉歡以兆醉恐醒而悔之遂出宣言受委統州鎮兵魏改六鎮為州葛榮部衆皆六鎮人故曰州鎮兵可集汾東受號令乃建牙陽曲川水經注汾水自汾陽縣南流逕陽曲城西陽曲在秀容之南地形志陽曲縣二漢屬太原郡後魏永安中置永安郡陽曲縣屬焉宋白曰唐忻州秀容定襄二縣皆漢陽曲縣地河千里一曲縣當其陽故曰陽曲後漢末移陽曲縣於并州太原縣界於舊陽曲縣置定襄縣又分置九原縣屬新興郡後魏以九原縣為平冠縣隋為秀容縣陳部分軍士素惡兆而樂屬歡分扶問翻惡烏故翻樂音洛莫不皆至居無何居無何言在事未多時也無何猶言無幾何時又使劉貴請兆以幷肆頻嵗霜旱降戸掘田䑕而食之降戸江翻面無榖色徒汙人境内幷肆之地兆統内也汙烏故翻請令就食山東幷肆冀定瀛相殷以太行常山為限幷肆在山西餘州皆在山東歡欲引衆就食山東正欲逺兆得以從容收衆心因之以起兵也待溫飽更受處分兆從其議長史慕容紹宗諫曰不可方今四方紛擾人懐異望髙公雄才盖世復使握大兵於外復扶又翻譬如借蛟龍以雲雨將不可制矣兆曰有香火重誓何慮邪重誓謂與歡誓為兄弟紹宗曰親兄弟尚不可信何論香火時爾朱兆與其羣從已搆嫌隙故紹宗以此言諷之時兆左右已受歡金因稱紹宗與歡有舊隙兆怒囚紹宗趣歡發趣讀曰促歡自晉陽出滏口道逢北鄉長公主自洛陽来有馬三百匹盡奪而易之兆聞之乃釋紹宗而問之紹宗曰此猶是掌握中物也兆乃自追歡至襄垣襄垣縣漢屬上黨即後魏屬鄉郡至敬宗建義元年分置襄垣郡㑹漳水暴漲橋壊水經漳水自屯留縣東北流逕襄垣縣故城南歡隔水拜曰所以借公主馬非有它故備山東盜耳王信公主之讒自来賜追歡稱兆為王因長廣王所封也今不辭度水而死恐此衆便叛兆自陳無此意因輕馬度水與歡坐幕下授歡刀引頸使歡斫之古之豪雄推赤心置人腹中者必其威望有以服其心智力足以制其命然後行之以安反側然亦未至如爾朱兆之輕率也歡大哭曰自天柱之薨賀六渾更何所仰但願大家千萬嵗以申力用耳今為旁人所搆間大家何忍復出此言歡之此言亦謬為恭敬耳歡以主事兆故稱為大家間古莧翻復音扶又翻下同兆投刀於地復斬白馬與歡為誓因留宿夜飲尉景伏壯士欲執兆尉紆勿翻歡齧臂止之曰今殺之其黨必奔歸聚結兵饑馬瘦不可與敵若英雄乗之而起則為害滋甚不如且置之兆雖驍勇㓙悍無謀不足圖也不足圖者謂其易圖也史言舉大事者必審而後𤼵驍堅堯翻悍侯旴翻旦日兆歸營復召歡歡將上馬詣之上時掌翻孫騰牽歡衣歡乃止兆隔水肆罵馳還晉陽當是時爾朱兆已知髙歡之不可制而無如之何兆腹心念賢領降戸家屬别為營歡偽與之善觀其佩刀因取殺之按通鑑念賢後仕於西魏貴顯此豈别有一念賢邪又按李百藥北齊書歡取賢佩刀以殺其從者從者盡散則謂所殺者賢之從者非殺賢也姓譜有念姓士衆感悦益願附從齊州城民趙洛周聞爾朱兆入洛逐刺史丹陽王蕭賛以城歸兆賛變形為沙門逃入長白山五代志齊州章丘縣舊曰髙唐有長白山杜佑曰長白山在淄州長山縣流轉卒於陽平陽平縣漢屬東郡魏晉以来分屬陽平郡隋唐魏州之莘縣即其地卒子恤翻梁人或盜其柩以歸上猶以子禮𦵏於陵次豫章王綜奔魏改名賛事見一百五十卷普通六年賛不以帝為父而帝猶以賛為子可謂愛其所不當愛矣柩音舊魏荆州刺史李琰之韶之族弟也南陽太守趙修延以琰之敬宗外族敬宗母彭城王勰妃李氏也故云然誣琰之欲奔梁𤼵兵襲州城執琰之自行州事魏王悦改元更興更工行翻聞爾朱兆已入洛自知不及事遂南還斛斯椿復棄悦奔魏為斛斯椿誅爾朱世隆兄弟搆間髙歡以分魏為東西張本復扶又翻是嵗詔以陳慶之為都督南北司等四州諸軍事南北司二州刺史梁置南司州於安陸北司州於義陽慶之引兵圍魏懸瓠破魏潁州刺史婁起等於溱水魏孝昌四年置潁州於汝隂領汝隂弋陽北陳留潁川財丘梁興西恒農陳南東郡汝南清河南陽新蔡南陳留滎陽北通汝南太原等雙郡東恒農新興等郡水經注溱水出汝南平輿縣浮石嶺東北北青衣山東南逕朗陵縣故城西東北逕北宜春縣故城又東北入於汝溱緇詵翻宋白曰蔡州城南有溱水又破行臺孫騰等於楚城梁置西楚州於楚城在汝南郡城陽縣界其地當在唐申州界按孫騰此時猶從髙歡在幷冀殷相之間慶之破騰必非此年事史䆒言之耳罷義陽鎮兵停水陸漕運江湖諸州竝得休息謂瀕江及洞庭彭蠡間諸州也開田六十頃二年之後倉廩充實資治通鑑卷一百五十四
