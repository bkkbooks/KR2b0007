front:
  text: 欽定四庫全書資治通鑑卷七十二宋司馬光撰
  hash: sha256:c00033cef2b08154c0964fa1dd4ef14146eb8a94915f7cbb4a2900e9046d45a0
body:
  text: 胡三省音註魏紀四起重光大淵獻盡逢攝提格凡四年烈祖明皇帝中之上太和五年春二月吳主假太常潘濬節使與吕岱督軍五萬人討五溪蠻濬姨兄蔣琬為諸葛亮長史同出為姨母之姊妹曰姨妻之姊妹亦曰姨若母之兄弟則當呼為舅此蓋妻之兄弟也長知兩翻武陵太守衛旍奏濬遣宻使與琬相聞旍與旌同使疏吏翻欲有自託之計吳主曰承明不為此也潘濬字承明即封旍表以示濬而召旍還免官衛温諸葛直軍行經嵗士卒疾疫死者什八九亶洲絶逺卒不可得至卒子恤翻得夷洲數千人還温直坐無功誅吳遣温直見上巻上年漢丞相亮命李嚴以中都䕶署府事蜀置左右中三都䕶署府事署漢中留府事也嚴更名平更工衡翻亮帥諸軍入冦圍祁山以木牛運亮集曰木牛者方腹曲頭一脚四足頭入領中舌著於腹載多而行少宜可大用不可少使特行者數十里羣行者二十里也曲者為牛頭雙者為牛脚横者為牛領轉者為牛足覆者為牛背方者為牛腹垂者為牛舌曲者為牛肋刻者為牛齒立者為牛角細者為牛鞅攝者為牛鞦䩜牛仰雙轅人行六尺牛行四步載一嵗糧日行二十里而又不大勞帥讀曰率於是大司馬曹真有疾帝命司馬懿西屯長安督將軍張郃費曜戴陵郭淮等以禦之郃古合翻又曷閣翻費父沸翻三月邵陵元侯曹真卒自十月不雨至于是月司馬懿使費曜戴陵留精兵四千守上邽上邽縣前漢屬隴西郡後漢以来屬漢陽郡餘衆悉出西救祁山張郃欲分兵駐雍郿雍郿二縣皆屬扶風郡雍於用翻郿音媚又音眉懿曰料前軍能獨當之者將軍言是也若不能當而分為前後此楚之三軍所以為黥布禽也事見十二卷漢髙帝十一年觀懿此言蓋自知其才不足以敵亮矣遂進亮分兵留攻祁山自逆懿于上邽郭淮費曜等徼亮徼讀曰邀亮破之因大芟刈其麥芟所衘翻與懿遇於上邽之東懿歛軍依險兵不得交亮引還懿等尋亮後至于鹵城張郃曰彼逺來逆我請戰不得謂我利在不戰欲以長計制之也且祁山知大軍已在近人情自固可止屯於此分為竒兵示出其後不宜進前而不敢偪坐失民望也今亮孤軍食少少詩沼翻亦行去矣懿不從故尋亮有意為之曰故尋者隨而躡其後既至又登山掘營不肯戰賈栩魏平數請戰數所角翻因曰公畏蜀如虎奈天下笑何懿病之懿實畏亮又以張郃嘗再拒亮名著闗右不欲從其計及進而不敢戰情見勢屈為諸將所笑栩况羽翻諸將咸請戰夏五月辛巳懿乃使張郃攻無當監何平於南圍無當蓋蜀軍部之號言其軍精勇敵人無能當者使平監䕶之故名官曰無當監南圍蜀兵圍祁山之南屯監古暫翻自案中道向亮案據也懿分道進兵欲以解祁山之圍自據中道與亮旗鼓相向也亮使魏延髙翔吳班逆戰魏兵大敗漢人獲甲首三千懿還保營六月亮以糧盡退軍司馬懿遣張郃追之郃進至木門木門去今天水軍天水縣十里水經注籍水出上邽當亭西山東歴當亭川又東入上邽縣左佩五水右帶五水木門谷之水其一也導源南山北流入籍水與亮戰蜀人乗髙布伏弓弩亂發飛矢中郃右䣛而卒中竹仲翻䣛與膝同卒子恤翻秋七月乙酉皇子殷生大赦黃初以來諸侯王法禁嚴切至于親姻皆不敢相通問東阿王植上疏曰堯之為教先親後疏自近及逺堯親九族九族既睦平章百姓百姓昭明協和萬邦周文王刑于寡妻至于兄弟以御于家邦詩大雅思齊之辭毛氏注曰刑法也寡妻嫡妻也御迎也鄭氏曰寡妻寡有之妻言賢也御治也文王以禮法接待其妻至于宗族以此又能為政治于家邦也伏惟陛下資帝唐欽明之德體文王翼翼之仁恵洽椒房恩昭九族羣后百寮番休遞上上時掌翻李周翰曰遞迭也言百寮宿衛以次休息更遞上直執政不廢於公朝朝直遥翻下同下情得展於私室親姻之路通慶弔之情展誠可謂恕己治人推恵施恩者矣治直之翻至于臣者人道絶緒禁錮明時臣竊自傷也不敢乃望交氣類易曰同聲相應同氣相求此言志同道合者謂疇昔文㑹之友也修人事叙人倫近且婚媾不通兄弟乖絶吉凶之問塞塞悉則翻慶弔之禮廢恩紀之違甚於路人隔閡之異殊於胡越殊絶也閡五慨翻今臣以一切之制一切謂權宜也一說一切謂不問可否一切整齊之也永無朝覲之望至於注心皇極皇極宅中之位人君居之結情紫闥神明知之矣然天實為之謂之何哉詩􅆁風北門之詩也鄭氏曰詩人事君無二志故歸之於天余謂植之意蓋謂君者天也天可違乎退惟諸王常有戚戚具爾之心詩曰戚戚兄弟莫逺具爾爾義與邇同願陛下沛然垂詔使諸國慶問四節得展四節謂四時之節展舒也以叙骨肉之歡恩全怡怡之篤義論語孔子曰兄弟怡怡妃妾之家膏沐之遺嵗得再通吕延濟曰膏脂也沐甘漿之屬也遺于季翻齊義於貴宗等恵於百司貴宗謂貴戚及公卿之族也百司謂百官也如此則古人之所歎風雅之所詠復存於聖世矣臣伏自惟省無錐刀之用思惟也省悉景翻及觀陛下之所拔授若以臣為異姓竊自料度不後於朝士矣度徒洛翻若得辭逺游戴武弁解朱組佩青紱諸王冠逺游冠佩朱紱三都尉諸侍中常侍皆戴武弁佩青紱駙馬奉車趣得一號安宅京室駙馬奉車都尉及騎都尉為三都尉皆漢武帝置魏晉以下多以宗室及外戚為之執鞭珥筆出從華蓋入侍輦轂承荅聖問拾遺左右珥仍吏翻珥筆挿筆也古者侍臣持槖簪筆華蓋乗輿車上施之魏晉之制侍中與散騎常侍或乗輿御殿及出游幸祭祀治兵侍中居左常侍居右備切問近對拾遺補闕乃臣丹誠之至願不離於夢想者也離力智翻逺慕鹿鳴君臣之宴中詠常棣匪他之誡詩鹿鳴宴羣臣嘉賔常棣燕兄弟也其詩曰凡今之人莫如兄弟所謂匪他也又頍弁詩豈伊異人兄弟匪他下思伐木友生之義終懐蓼莪罔極之哀伐木燕朋友故舊其詩曰相彼鳥矣猶求友聲矧伊人矣不求友生蓼莪之詩曰哀哀父母生我劬勞欲報之德昊天罔極知念其父母必念其同氣矣蓼音六每四節之㑹塊然獨處處昌吕翻左右惟僕𨽻所對惟妻子髙談無所與陳精義無所與展未嘗不聞樂而拊心臨觴而歎息也臣伏以犬馬之誠不能動人譬人之誠不能動天崩城隕霜齊大夫杞梁戰死于莒城其妻向城而哭城為之崩鄒衍盡忠於君燕恵王信讒而繫之鄒子仰天而哭正夏而天降霜臣初信之以臣心况徒虚語耳况譬也若葵藿之傾太陽雖不為回光然向之者誠也言葵藿草也傾葉於日日雖不為回光終是誠心向日也為于偽翻竊自比葵藿若降天地之施垂三光之明者實在陛下施式智翻下同臣聞文子曰不為福始不為禍先文子九篇班固曰文子老子弟子李周翰曰福始禍先謂諸王皆不表植獨先表也今之否隔友于同憂否隔不通也友于兄弟也否皮鄙翻而臣獨倡言者實不願於聖世有不䝉施之物欲陛下崇光被時雍之美宣緝熈章明之德也光被時雍言帝堯睦族之效詩周頌曰維清緝熈文王之典鄭氏箋曰緝熈光明也故植以言文王之治被皮義翻詔報曰蓋教化所由各有隆敝非皆善始而惡終也事使之然隆崇也謂立教之始各有所崇其流之敝則事勢使之然也惡如字今令諸國兄弟情禮簡怠妃妾之家膏沐疏略本無禁錮諸國通問之詔也矯枉過正下吏懼譴以至於此耳已勑有司如王所訴植復上疏曰昔漢文發代疑朝有變復扶又翻朝直遥翻宋昌曰内有朱虚東牟之親外有齊楚淮南琅邪此則磐石之宗願王勿疑事見十三巻漢髙后八年臣伏惟陛下逺覧姬文二虢之援虢仲虢叔文王之母弟文王咨于二虢以成王業中慮周成召畢之輔召公畢公周同姓也二伯分治輔成王以成太平之功召讀曰邵下同下存宋昌磐石之固臣聞羊質虎皮見草則恱見豺則戰忘其皮之虎也揚子之言今置將不良有似於此將即亮翻故語曰患為之者不知知之者不得為也昔管蔡放誅周召作弼成王幼管叔蔡叔以武庚畔成王誅管叔放蔡叔以周公為師召公為保而相左右叔魚陷刑叔向贊國左傳晉邢侯與雍子爭田久而無成韓宣子使叔魚斷舊獄罪在雍子雍子納其女於叔魚叔魚蔽罪於邢侯邢侯怒殺叔魚及雍子于朝宣子問其罪於叔向不以叔向為私其親而從之决平也三監之釁臣自當之二南之輔求必不逺華宗貴族藩王之中必有應斯舉者夫能使天下傾耳注目者當權者是也故謀能移主威能懾下懾之渉翻豪右執政不在親戚權之所在雖疏必重埶之所去雖親必輕蓋取齊者田族非吕宗也分晉者趙魏非姬姓也齊太公姓吕其後為田成子所取非吕族也晉唐叔姬姓其後為趙籍魏斯韓䖍所分此不言韓以韓亦姬姓惟陛下察之茍吉専其位凶離其患者異姓之臣也離力智翻下得離同欲國之安祈家之貴存共其榮歿同其禍者公族之臣也今反公族疏而異姓親臣竊惑焉今臣與陛下踐氷履炭登山浮澗寒温燥濕髙下共之豈得離陛下哉不勝憤懣勝音升懣音悶拜表陳情若有不合乞且藏之書府不便滅棄臣死之後事或可思若有毫釐少挂聖意者乞出之朝堂朝直遥翻下同使夫博古之士糾臣表之不合義者如是則臣願足矣帝但以優文答報而已植求自試而但以優詔荅之終疑之也八月詔曰先帝著令不欲使諸王在京都者謂幼主在位母后攝政防微以漸闗諸盛衰也朕惟不見諸王十有二載自文帝黄初元年遣植等就國至是十二年惟思也載子亥翻悠悠之懐能不興思其令諸王及宗室公侯各將適子一人朝明年正月適讀曰嫡後有少主母后在宫者自如先帝令漢丞相亮之攻祁山也李平留後主督運事李平即李嚴改名曰平㑹天霖雨平恐運糧不繼遣參軍狐忠狐忠即馬忠也少養外家姓狐名篤後復姓馬改名忠此姓從先名從後姓譜狐周王子狐之後又晉有狐突督軍成藩喻指呼亮來還喻以後主指言運糧不繼亮承以退軍平聞軍退乃更陽驚說軍糧饒足何以便歸又欲殺督運岑述以解己不辦之責又表漢主說軍偽退欲以誘賊此又欲解以上指喻亮之罪也誘音酉亮具出其前後手筆書疏本末違錯平辭窮情竭首謝罪負首式救翻於是亮表平前後過惡免官削爵土徙梓潼郡平蓋嘗封侯也復以平子豐為中郎將參軍事出教敕之曰敕戒也吾與君父子勠力以奬漢室表都䕶典漢中委君於東闗東闗謂江州謂至心感動終始可保何圖中乖乎若都䕶思負一意思負謂思其罪負也一意謂一意於為國無復詭變以自營也君與公琰推心從事否可復通否皮鄙翻逝可復還也詳思斯戒明吾用心亮又與蔣琬董允書曰孝起前為吾說正方腹中有鱗甲李嚴字正方為于偽翻下同鄉黨以為不可近近其靳翻吾以為鱗甲但不當犯之耳不圖復有蘇張之事出於不意謂蘇秦張儀押闔其說以反覆諸侯之間今李平復為之復扶又翻可使孝起知之孝起者衛尉南陽陳震也冬十月吳主使中郎將孫布詐降以誘揚州刺史王凌吳主伏兵於阜陵以俟之阜陵縣漢屬九江郡魏改九江為淮南郡晉志曰阜陵縣漢明帝時淪為麻湖麻湖在今和州歴陽縣西三十里杜佑曰漢阜陵縣在滁州全椒縣南布遣人告凌云道逺不能自致乞兵見迎凌騰布書騰𫝊也上也請兵馬迎之征東將軍滿寵以為必詐不與兵而為凌作報書曰知識邪正欲避禍就順去暴歸道甚相嘉尚今欲遣兵相迎然計兵少則不足相衛多則事必逺聞聞音問且先宻計以成本志臨時節度其宜㑹寵被書入朝被皮義翻朝直遥翻敕留府長史若凌欲往迎勿與兵也凌於後索兵不得索山客翻乃單遣一督將步騎七百人往迎之布夜掩擊督將迸走死傷過半迸北孟翻孫權自量其國之力不足以斃魏不過時於疆場之間設詐用竒以誘敵人之來而陷之耳非如孔明真有用蜀以爭天下之心也凌允之兄子也王允獻帝時誅董卓先是凌表寵年過耽酒不可居方任方任方面之任也先悉薦翻帝將召寵給事中郭謀曰寵為汝南太守豫州刺史漢建安中武王操以寵為汝南太守太和三年刺豫州是年都督揚州二十餘年有勲方岳自魏以下以督州為方岳之任謂其職猶古之方伯岳牧也及鎮淮南吳人憚之若不如所表將為所闚可令還朝朝直遥翻問以東方事以察之帝從之既至體氣康強帝慰勞遣還勞力到翻十一月戊戌晦日有食之十二月戊午博平敬侯華歆卒諡法夙夜警戒曰敬合善典法曰敬華户化翻丁卯吳大赦改明年元曰嘉禾㑹稽南始平言嘉禾生故以改元六年春正月吳主少子建昌侯慮卒太子登自武昌入省吳主因自陳久離定省子道有闕記曲禮曰凡為人子之禮冬温而夏凊昏定而晨省省悉景翻離力智翻又陳陸遜忠勤無所顧憂乃留建業二月詔改封諸侯王皆以郡為國帝愛女淑卒帝痛之甚追諡平原懿公主立廟洛陽葬於南陵取甄后從孫黃與之合葬甄之人翻從才用翻追封黃為列侯為之置後襲爵為于偽翻下同帝欲自臨送葬又欲幸許司空陳羣諫曰八嵗下殤禮所不備記檀弓曰周人以殷人之棺椁葬長殤以夏后氏之堲周葬中殤下殤以有虞氏之瓦棺葬無服之殤鄭𤣥注云略未成人陸德明曰十六至十九為長殤十二至十五為中殤八嵗至十一為下殤七嵗以下為無服之殤生未三月不為殤况未期月而以成人禮送之加為制服舉朝素衣朝夕哭臨自古以來未有此比朝直遥翻下同臨力鴆翻比毘寐翻而乃復自往視陵復扶又翻親臨祖載願陛下抑割無益有損之事此萬國之至望也又聞車駕欲幸許昌二宫上下皆悉居東舉朝大小莫不驚怪或言欲以避衰或言欲以便移殿舍避衰謂五行之氣有王有衰徙舍以避之也今人謂之避災便移殿舍謂欲營繕宫室故出幸許以便移殿舍也或不知何故臣以為吉凶有命禍福由人移走求安則亦無益若必當移避繕治金墉城西宫水經注金墉城在洛陽城西北角治直之翻及孟津别宫皆可權時分止何為舉宫暴露野次公私煩費不可計量量音良且吉士賢人猶不妄徙其家以寧鄉邑使無恐懼之心子思居於衛有齊冦或曰冦至盍去諸子思曰如伋去君誰與守况乃帝王萬國之主行止動静豈可輕脫哉少府楊阜曰文皇帝武宣皇后崩陛下皆不送葬所以重社稷備不虞也何至孩抱之赤子而送葬也哉帝皆不聽三月癸酉行東巡吳主遣將軍周賀校尉裴潛乘海之遼東從公孫淵求馬初虞翻性疎直數有酒失又好抵忤人抵觸也數所角翻好呼到翻忤五故翻多見謗毁吳主嘗與張昭論及神仙翻指昭曰彼皆死人而語神仙世豈有仙人也吳主積怒非一遂徙翻交州及周賀等之遼東翻聞之以為五谿宜討遼東絶逺聽使來屬尚不足取今去人財以求馬去猶棄也去羌吕翻既非國利又恐無獲欲諫不敢作表以示吕岱岱不報為愛憎所白讒佞之人有愛有憎而無公是非故謂之愛憎白陳奏也復徙蒼梧猛陵猛陵縣屬蒼梧郡劉昫曰唐梧州孟陵縣藤州鐔津縣龔州南平武林隋建三縣皆漢猛陵縣地復扶又翻夏四月壬寅帝如許昌五月皇子殷卒秋七月以衛尉董昭為司徒九月帝行如摩陂治許昌宫起景福承光殿治直之翻公孫淵隂懐貳心數與吳通數所角翻帝使汝南太守田豫督青州諸軍自海道幽州刺史王雄自陸道討之海道自東萊浮海陸道自遼西度遼水散騎常侍蔣濟諫曰凡非相吞之國不侵叛之臣光武報竇融書曰吾與爾非相吞之國左傳戎子駒支對范宣子曰為不侵不叛之臣不宜輕伐伐之而不能制是驅使為賊也故曰虎狼當路不治狐狸治直之翻先除大害小害自己今海表之地累世委質質如字嵗選計孝計孝謂每嵗上計及舉孝亷也不乏職貢議者先之先悉薦翻正使一舉便克得其民不足益國得其財不足為富儻不如意是為結怨失信也帝不聽豫等往皆無功詔令罷軍豫以吳使周賀等垂還嵗晚風急必畏漂浪東道無㟁當赴成山成山無藏船之處遂輒以兵屯據成山賀等還至成山班志成山在東萊郡不夜縣後漢省不夜縣括地志成山在萊州文登縣西北百九十里遇風豫勒兵擊賀等斬之吳主聞之始思虞翻之言乃召翻於交州㑹翻已卒以其喪還還從宣翻又如字十一月庚寅陳思王植卒諡法追悔前過曰思十二月帝還許昌宫侍中劉􅁮為帝所親重帝將伐蜀朝臣内外皆曰不可朝直遥翻􅁮入與帝議則曰可伐出與朝臣言則曰不可􅁮有膽智言之皆有形謂言蜀之可伐與不可伐皆有勝負之形可以動人之聽中領軍楊暨中領軍主中壘五校武衛等三營漢建安四年魏武丞相府自置中領軍文帝踐祚始置領軍將軍其後以資重者為領軍將軍資輕者則為中領軍帝之親臣又重􅁮執不可伐之議最堅毎從内出輒過􅁮過工禾翻􅁮講不可之意後暨與帝論伐蜀事暨切諫帝曰卿書生焉知兵事焉於䖍翻下同暨謝曰臣言誠不足采侍中劉􅁮先帝謀臣常曰蜀不可伐帝曰􅁮與吾言蜀可伐暨曰􅁮可召質也質證也驗也對問也詔召􅁮至帝問􅁮終不言後獨見見賢遍翻下同􅁮責帝曰伐國大謀也臣得與聞大謀與讀曰預常恐眯夢漏泄以益臣罪眯毋禮翻一作寐說文曰寐而眯厭厭讀曰魘焉敢向人言之夫兵詭道也軍事未發不厭其宻陛下顯然露之臣恐敵國已聞之矣於是帝謝之曄見出責暨曰夫釣者中大魚見賢遍翻中竹仲翻則縱而隨之須可制而後牽則無不得也人主之威豈徒大魚而已子誠直臣然計不足采不可不精思也暨亦謝之或謂帝曰􅁮不盡忠善伺上意所趨而合之伺相吏翻趨七喻翻陛下試與􅁮言皆反意而問之若皆與所問反者是􅁮常與聖意合也毎問皆同者􅁮之情必無所逃矣言者謂􅁮善迎合上意上若有所問謂反上意而問之􅁮之對必與上所問者反而與上意所向者合毎問皆然則可以見曄迎合之情矣帝如言以驗之果得其情從此疏焉疏與疎同􅁮遂發狂出為大鴻臚以憂死侍中在天子左右大鴻臚外朝官也臚陵如翻傅子曰巧詐不如拙誠信矣晉傅𤣥著書號傅子以􅁮之明智權計若居之以德義行之以忠信古之上賢何以加諸獨任才智不敦誠慤敦厚也崇尚也内失君心外困於俗卒以自危卒子恤翻豈不惜哉􅁮嘗譖尚書令陳矯専權矯懼以告其子騫騫曰主上明聖大人大臣今若不合不過不作公耳後數日帝意果解尚書郎樂安亷昭以才能得幸好抉擿羣臣細過以求媚於上好呼到翻抉一决翻挑也擿他歴翻發動也黃門侍郎杜恕上疏曰伏見亷昭奏左丞曹璠以罰當闗不依詔坐判問續漢志尚書左右丞各一人掌録文書期㑹左丞主吏民章報及騶伯史右丞主假署印綬及紙筆墨詣財用庫藏蔡質漢儀曰左丞總典臺中綱紀無所不統魏晉之制左丞主臺内禁令宗廟祠祀朝儀禮制選用署吏急假右丞掌臺内庫藏廬舍凡諸器用之物及廩振人租布刑獄兵器督録逺道文書章表奏事罰罪罰也闗白也言有罪罰當闗白而不依詔書故坐以判問判剖也析也問責問也剖析其事而責問之也璠孚袁翻又云諸當坐者别奏亷昭又云諸當坐者别奏意欲并奏今僕坐之尚書令陳矯自奏不敢辭罰亦不敢陳理志意懇惻臣竊愍然為朝廷惜之為于偽翻古之帝王所以能輔世長民者長知兩翻莫不逺得百姓之懽心近盡羣臣之智力今陛下憂勞萬幾或親燈火而庶事不康刑禁日弛原其所由非獨臣不盡忠亦其主不能使也百里奚愚於虞而智於秦韓信之言見十巻漢髙帝三年豫讓茍容中行而著節智伯豫讓事范中行氏智伯伐而滅之移事智伯後趙襄子滅智伯豫讓漆身吞炭必報襄子五起而不中人問豫讓豫讓曰范中行衆人遇我我故衆人報之智伯國士遇我我故國士報之行户剛翻斯則古人之明驗矣若陛下以為今世無良才朝廷乏賢佐豈可追望稷契之遐蹤契息列翻坐待來世之俊乂乎今之所謂賢者盡有大官而享厚禄矣然而奉上之節未立向公之心不一者委任之責不専而俗多忌諱故也臣以為忠臣不必親親臣不必忠今有疏者毁人而陛下疑其私報所憎譽人而陛下疑其私愛所親左右或因之以進憎愛之說遂使疏者不敢毁譽此言帝信其所親而疑其所疏遂使在逺之臣不敢言以至是非失其真也疏與疎同譽音余以致政事損益亦皆有嫌陛下當思所以闡廣朝臣之心篤厲有道之節有道謂有道之士也使之自同古人垂名竹帛反使如亷昭者擾亂其間臣懼大臣將遂容身保位坐觀得失為來世戒也昔周公戒魯侯曰無使大臣怨乎不以以用也見論語言不賢則不可為大臣為大臣則不可不用也書數舜之功稱去四凶共工驩兠鯀三苖世濟其惡然後去之數所具翻去羌吕翻不言有罪無問大小則去也言小過當略而不問今者朝臣不自以為不能以陛下為不任也不自以為不知以陛下為不問也知讀曰智陛下何不遵周公之所以用大舜之所以去使侍中尚書坐則侍帷幄行則從華輦親對詔問各陳所有則羣臣之行皆可得而知行下孟翻忠能者進闇劣者退誰敢依違而不自盡以陛下之聖明親與羣臣論議政事使羣臣人得自盡賢愚能否在陛下之所用以此治事何事不辦治直之翻下同以此建功何功不成毎有軍事謂二邊有警急之時也詔書常曰誰當憂此者邪吾當自憂耳近詔又曰憂公忘私者必不然但先公後私即自辦也近詔謂近日所下詔也先悉薦翻後户遘翻伏讀明詔乃知聖思究盡下情然亦怪陛下不治其本而憂其末也為治之本在於任賢事之治不治乃其末也人之能否實有本性雖臣亦以為朝臣不盡稱職也稱尺證翻明主之用人也使能者不敢遺其力而不能者不得處非其任處昌吕翻選舉非其人未必為有罪也舉朝共容非其人乃為怪耳朝直遥翻陛下知其不盡力而代之憂其職知其不能也而教之治其事豈徒主勞而臣逸哉雖聖賢並世終不能以此為治也為治直吏翻陛下又患臺閣禁令之不宻人事請屬之不絶屬之欲翻下同定迎客出入之制以惡吏守寺門寺門官寺之門也斯實未得為禁之本也昔漢安帝時少府竇嘉辟廷尉郭躬無罪之兄子猶見舉奏章劾紛紛按范書郭躬章帝元和三年拜廷尉和帝永元六年卒不及安帝時蓋躬死後竇嘉方辟其兄子也劾户槩翻又户得翻近司𨽻校尉孔羨辟大將軍狂悖之弟裴松之曰按大將軍司馬宣王也晉書云宣帝第五弟名通為司𨽻從事疑恕所云狂悖者悖蒲内翻又蒲沒翻而有司嘿爾望風希指甚於受屬屬之欲翻選舉不以實者也嘉有親戚之寵躬非社稷重臣猶尚如此以今况古陛下自不督必行之罰以絶阿黨之原耳出入之制與惡吏守門非治世之具也治直之翻使臣之言少䝉察納少詩沼翻何患於姦不削滅而養若亷昭等乎夫糾擿姦宄忠事也擿他狄翻然而世憎小人行之者以其不顧道理而茍求容進也若陛下不復考其終始復扶又翻必以違衆迕世為奉公迕五故翻宻行白人為盡節謂潛伺人之過失以白上乃以為盡節也焉有通人大才而更不能為此邪焉於䖍翻誠顧道理而弗為耳使天下皆背道而趨利則人主之所最病者也陛下將何樂焉背蒲妹翻趨七喻翻下同樂音洛恕畿之子也建安中畿守河東有能名帝嘗卒至尚書門卒讀曰猝尚書門尚書臺門也陳矯跪問帝曰陛下欲何之帝曰欲案行文書耳矯曰此自臣職分非陛下所宜臨也若臣不稱其職則請就黜退行下孟翻分扶問翻稱尺證翻陛下宜還帝慙回車而反帝嘗問矯司馬公忠貞可謂社稷之臣乎矯曰朝廷之望也社稷則未知也陳矯賈逵皆忠於魏而二人之子皆為晉初佐命豈但利禄之移人哉非故家喬木而教忠不先也吳陸遜引兵向廬江論者以為宜速救之滿寵曰廬江雖小將勁兵精將即亮翻守則經時謂陸遜若以兵圍守必經時而不能拔又賊舍船二百里來句絶舍讀曰捨後尾空絶不來尚欲誘致今宜聽其遂進但恐走不可及耳乃整軍趨楊宜口魏廬江郡治陽泉縣續漢志陽泉縣有陽泉湖故陽泉鄉也漢靈帝封黃琬為侯國水經注陽泉水受决水東北流逕陽泉縣故城東又西北入决水謂之陽泉口趨七喻翻吳人聞之夜遁是時吳人嵗有來計滿寵上疏曰合肥城南臨江湖北逺夀春魏揚州治夀春距合肥二百餘里逺于願翻下同賊攻圍之得據水為埶官兵救之當先破賊大輩然後圍乃得解賊往甚易易以䜴翻而兵往救之甚難宜移城内之兵其西三十里有竒險可依更立城以固守此為引賊平地而掎其歸路掎居蟻翻於計為便䕶軍將軍蔣濟議以為既示天下以弱且望賊烟火而壊城壊音怪此為未攻而自拔一至於此劫略無限必淮北為守濟言望風移戍吳必劫掠無限將限淮以自守也帝未許寵重表曰重直用翻孫子言兵者詭道也故能而示之不能驕之以利示之以懾懾懼也懾之渉翻此為形實不必相應也又曰善動敵者形之今賊未至而移城却内所謂形而誘之也引賊逺水逺于願翻擇利而動舉得於外則福生於内矣尚書趙咨以寵䇿為長趙咨蓋必黃初初自吳使于魏者也文帝重其辯給遂臣於魏詔遂報聽青龍元年春正月甲申青龍見摩陂井中二月帝如摩陂觀龍改元自是改摩陂曰龍陂公孫淵遣校尉宿舒姓譜宿本風姓伏羲之後封於宿風俗通漢有雁門太守宿詳郎中令孫綜晉志王國置郎中令淵未封王潛置之也奉表稱臣於吳吳主大恱為之大赦為于偽翻三月吳主遣太常張彌執金吾許晏將軍賀達將兵萬人金寳珍貨九錫備物乗海授淵封淵為燕王舉朝大臣自顧雍以下皆諫以為淵未可信而寵待太厚但可遣吏兵䕶送舒綜而已吳主不聽張昭曰淵背魏懼討背蒲妹翻逺來求援非本志也若淵改圖欲自明於魏兩使不反使疏吏翻不亦取笑於天下乎吳主反覆難昭難乃旦翻昭意彌切吳主不能堪案劍而怒曰吳國士人入宫則拜孤出宫則拜君孤之敬君亦為至矣而數於衆中折孤數所角翻折之舌翻孤常恐失計失計謂不能容昭而殺之也昭孰視吳主古孰熟字通曰臣雖知言不用毎竭愚忠者誠以太后臨崩呼老臣於牀下遺詔顧命之言故在耳事見六十五卷漢獻帝建安十二年因涕泣橫流吳主擲刀於地與之對泣然卒遣彌晏往卒子恤翻昭忿言之不用稱疾不朝朝直遥翻吳主恨之土塞其門塞悉則翻昭又於内以土封之張昭事吳有古大臣之節夏五月戊寅北海王蕤卒閏月庚寅朔日有食之六月洛陽宫鞠室災鞠室者畫地為域以蹵鞠因以名室鮮卑軻比能誘保塞鮮卑步度根與深結和親步度根保塞見七十巻文帝黃初五年誘音酉自勒萬騎迎其累重於陘北累力瑞翻重直用翻陘音刑陘北陘嶺之北也唐代州雁門縣有東陘闗西陘山并州刺史畢軌表輒出軍以外威比能内鎮步度根帝省表曰省悉景翻步度根已為比能所誘有自疑心今軌出軍慎勿越塞過句注也漢靈帝末羌胡大擾定襄雲中五原朔方上郡並流徙分散建安二十年集塞下荒地置新興郡自陘嶺以北並棄之故以句注為塞比詔書到比必寐翻軌已進軍屯隂館應劭曰句注山名在雁門隂館縣杜佑曰句注山即雁門縣西陘嶺句伏儼音俱包愷音鉤遣將軍蘇尚董弼追鮮卑軻比能遣子將千餘騎迎步度根部落與尚弼相遇戰於樓煩隂館樓煩二縣漢皆屬雁門郡而晉志無之蓋已棄之荒外矣二將沒步度根與泄歸泥部落皆叛出塞泄歸泥扶羅韓之子與軻比能合冦邊帝遣驍騎將軍秦朗將中軍討之晉職官志驍騎將軍游擊將軍並漢雜號將軍也魏置為中軍軻比能乃走幕北泄歸泥將其部衆來降步度根尋為軻比能所殺公孫淵知吳逺難恃乃斬張彌許晏等首𫝊送京師悉沒其兵資珍寳卒如張昭之言𫝊直戀翻冬十二月詔拜淵大司馬封樂浪公樂浪音洛埌吳主聞之大怒曰朕年六十世事難易靡所不嘗嘗試也易以䜴翻近為䑕子所前却謂稱臣以誘吳使使前既又斬其使以却之也令人氣踊如山不自截䑕子頭以擲于海無顔復臨萬國復扶又翻就令顛沛不以為恨知其不可而欲興忿兵也陸遜上疏曰陛下以神武之資誕膺期運破操烏林事見六十五巻漢獻帝建安十三年敗備西陵事見六十九卷文帝黃初三年敗補邁翻禽羽荆州事見六十八巻建安二十四年斯三虜者當世雄傑皆摧其鋒聖化所綏萬里草偃言如風行而草偃也方蕩平華夏總一大猷猷道也謀也夏户雅翻今不忍小忿而發雷霆之怒違垂堂之戒千金之子坐不垂堂以喻權不當自越海而加兵於遼東輕萬乗之重乗繩證翻此臣之所惑也臣聞之行萬里者不中道而輟足圖四海者不懐細而害大強冦在境荒服未庭陛下乗桴逺征桴芳無翻編竹木渡水大者曰栰小者曰桴必致闚􅎿慼至而憂悔之無及若使大事時捷則淵不討自服今乃逺惜遼東衆之與馬謂權所以逺惜遼東而不忍棄絶之者以其民衆與其地産馬也奈何獨欲捐江東萬安之本業而不惜乎尚書僕射薛綜上疏曰昔漢元帝欲御樓船薛廣德請刎頸以血染車事見二十八巻永光元年刎武粉翻何則水火之險至危非帝王所宜渉也今遼東戎貊小國貊莫百翻無城隍之固備禦之術器械銖鈍銖者十分黍之重言其輕也犬羊無政往必禽克誠如明詔然其方土寒埆埆克角翻墝瘠也榖稼不殖民習鞍馬轉徙無常卒聞大軍之至自度不敵卒讀曰猝度徒洛翻鳥驚獸駭長驅奔竄一人匹馬不可得見雖獲空地守之無益此不可一也加又洪流滉瀁滉瀁水深廣貌滉户廣翻瀁以兩翻又余亮翻有成山之難海行無常風波難免倐忽之間人船異埶雖有堯舜之德智無所施賁育之勇力不得設此不可二也賁音奔加以鬱霧㝠其上鹹水蒸其下善生流腫轉相洿染洿烏故翻流腫者謂毒氣下流足為之腫古人謂之重膇今人謂之脚氣凡行海者稀無此患此不可三也天生神聖當乗時平亂康此民物今逆虜將滅海内垂定乃違必然之圖尋至危之阻忽九州之固肆一朝之忿既非社稷之重計又開闢以來所未嘗有斯誠羣僚所以傾身側息謂傾身而卧側鼻而息不得展布四體安於偃仰也食不甘味寢不安席者也選曹尚書陸瑁上疏曰吳選曹尚書即魏選部尚書瑁音冒北冦與國壤地連接茍有閒隙閒古莧翻下同應機而至夫所以為越海求馬曲意於淵者為赴目前之急除腹心之疾也為于偽翻而更棄本追末捐近治逺治直之翻忿以改規激以動衆斯乃猾虜所願聞非大吳之至計也北冦猾虜皆謂魏也又兵家之術以功役相疲勞逸相待得失之間所覺輒多兵法以逸待勞又曰逸則能勞之言敵人用智以疲我苦不自覺比我覺知則得失之間相去多矣且沓渚去淵道里尚逺遼東郡有沓氏縣西南臨海渚應劭曰沓長荅翻又據陳夀志景初三年以遼東東沓縣吏民渡海居齊郡界為新沓縣即沓渚之民也今到其岸兵勢三分使強者進取次當守船又次運糧行人雖多難得悉用加以單步負糧經逺深入賊地多馬邀截無常若淵狙詐與北未絶動衆之日唇齒相濟此慮魏乗吳伐遼之間而南侵也狙千余翻若實了然無所憑賴了然猶言曉然也蜀本作孑然文義尤長孑孤孑也謂淵孤立孑然無援也其畏怖逺迸或難卒滅怖普布翻迸北孟翻卒讀曰猝使天誅稽於朔野山虜乗間而起山虜謂丹陽豫章鄱陽廬陵新都等郡山越也乗蜀本作承間古莧翻恐非萬安之長慮也吳主未許瑁重上疏曰重直龍翻夫兵革者固前代所以誅暴亂威四夷也然其役皆在姦雄已除天下無事從容廟堂之上從千容翻以餘議議之耳至於中夏鼎沸九域盤互之時盤互謂各盤據而互為敵也夏户雅翻率須深根固本愛力惜費未有正於此時舍近治逺以疲軍旅者也舍讀曰捨治直之翻昔尉佗叛逆僭號稱帝于時天下乂安百姓康阜然漢文猶以逺征不易告喻而已佗徒河翻事見十三巻漢文帝元年易以䜴翻今凶桀未殄疆埸猶警埸音亦未宜以淵為先願陛下抑威任計暫寧六師潛神嘿規以為後圖天下幸甚吳主乃止吳主數遣人慰謝張昭數所角翻昭固不起吳主因出過其門呼昭過工禾翻昭辭疾篤吳主燒其門欲以恐之恐丘共翻昭亦不出吳主使人滅火住門良乆昭諸子共扶昭起吳主載以還宫深自克責昭不得已然後朝㑹朝直遥翻初張彌許晏等至襄平襄平縣遼東郡治所淵所都也公孫淵欲圖之乃先分散其吏兵中使秦旦張羣杜德黃彊等及吏兵六十人置𤣥莬中使中節人使也使疏吏翻陳夀曰漢武帝開𤣥莬郡治沃沮城後為夷貊所侵徙郡句驪西北莬同都翻𤣥莬在遼東北二百里此非𤣥莬郡舊治也太守王贊領户二百旦等皆舍於民家仰其飲食仰牛向翻積四十許日旦與羣等議曰吾人逺辱國命自棄於此與死無異今觀此郡形勢甚弱若一旦同心焚燒城郭殺其長史為國報恥長知兩翻為于偽翻然後伏死足以無恨孰與偷生茍活長為囚虜乎羣等然之於是隂相結約當用八月十九日夜發其日中時為郡中張松所告贊便㑹士衆閉城門旦羣德彊皆踰城得走時羣病疽瘡著䣛疽千余翻着直略翻䣛與膝同不及輩旅德常扶接與俱﨑嶇山谷﨑丘宜翻嶇音區行六七百里創益困不復能前創初良翻下同卧草中相守悲泣羣曰吾不幸創甚死亡無日卿諸人宜速進道冀有所達空相守俱死於窮谷之中何益也德曰萬里流離死生共之不忍相委委棄也於是推旦彊使前推吐雷翻德獨留守羣採菜果食之食讀曰飤旦彊别數日得達句麗因宣吳主詔於句麗王位宫及其主簿髙句麗國在遼東之東千里位宫漢髙句麗王宫之曽孫也宫生而開目能視及長勇壯數犯漢邊位宫生墮地亦能開目視人句麗呼相似為位以似其祖故名曰位宫句麗有相加對盧沛者古鄒大加主簿擾台使者帛衣先人帛衣三國志作皁衣句音如字又音駒驪力知翻紿言有賜為遼東所劫奪紿徒變翻位宫等大喜即受詔命使人隨旦還迎羣遣皁衣二十五人送旦等還吳奉表稱臣貢貂皮千枚鶡雞皮十具郭璞注山海經曰鶡雞似雉而大青色有毛角鬭敵死乃止鶡何葛翻旦等見吳主悲喜不能自勝勝音升吳主壯之皆拜校尉是嵗吳主出兵欲圍新城合肥新城也以其逺水積二十餘日不敢下船大船向㟁船髙㟁卑故謂舍船就㟁曰下船以自船而下也逺于願翻滿寵謂諸將曰孫權得吾移城必於其衆中有自大之言今大舉來欲要一切之功要一遥翻雖不敢至必當上㟁耀兵以示有餘上時掌翻乃潛遣步騎六千伏肥水隱處以待之吳主果上㟁耀兵寵伏兵卒起擊之卒讀曰猝斬首數百或有赴水死者吳主又使全琮攻六安亦不克蜀庲降都督張翼水經注寧州建寧縣故庲降都督屯蜀後主建興三年分益州郡置之用法嚴峻南夷豪帥劉胄叛帥所類翻丞相亮以參軍巴西馬忠代翼召翼令還其人謂翼宜速歸即罪其人謂召翼者也即就也翼曰不然吾以蠻夷蠢動不稱職故還耳稱尺證翻然代人未至吾方臨戰場當運糧積榖為滅賊之資豈可以黜退之故而廢公家之務乎於是統攝不懈懈古隘翻代到乃發馬忠因其成基破胄斬之諸葛亮勸農講武作木牛流馬亮集曰流馬尺寸之數肋長三尺五寸廣三寸厚二寸二分左右同前軸孔分墨去頭四寸徑中二寸前脚孔分墨二寸去前軸孔四寸五分廣一寸前杠孔分墨去前脚孔分墨三寸七分孔長二寸廣一寸後軸孔去前杠孔分墨一尺五分大小與前同後脚孔分墨去後軸孔三寸五分大小與前同後杠孔去後脚孔分墨二寸七分後載尅去後杠孔分墨四寸五分前杠長一尺八寸廣二寸厚一寸五分後杠與等板方囊一板厚八分長二尺七寸髙一尺六寸五分廣一尺六寸每枚受米二斛三斗從上杠孔去肋下七寸前後同上杠孔去下杠孔分墨一尺三寸孔長一寸五分廣七分八孔同前後四脚廣二寸厚一寸五分形制如象靬長四寸徑面四寸三分孔徑中二脚杠長二尺一寸廣二寸五分厚一寸四分同杠耳運米集斜谷口治斜谷邸閣息民休士三年而後用之按明年亮即出斜谷所謂息民休士三年而後用之通自再攻祁山之後至是凡三年也斜昌遮翻谷音浴又古禄翻二年死考異曰唐太宗晉書景懐夏侯后𫝊后以此年云宣帝居上將之重諸子並有雄才大略后知帝非魏之純臣而后既魏氏之甥帝深忌之遂以鴆崩按是時司馬懿方信任於明帝未有不臣之迹况其諸子乎徒以魏甥之故猥鴆其妻俱非事實蓋甚之之辭不然師自以他故鴆之也今不取春二月亮悉大衆十萬由斜谷入冦遣使約吳同時大舉三月庚寅山陽公卒獻帝自禪位至卒十有四年年五十四帝素服發喪己酉大赦夏四月大疫崇華殿災是嵗復修改崇華曰九龍殿引榖水過九龍前為玉井綺欄蟾蜍含受神龍吐出諸葛亮至郿郿音媚又音眉軍於渭水之南司馬懿引軍渡渭背水為壘以拒之背蒲妹翻謂諸將曰亮若出武功依山而東誠為可憂若西上五丈原水經注五丈原在郿縣西渭水逕其北又亮與步隲書曰原在武功西十里上時掌翻諸將無事矣亮果屯五丈原雍州刺史郭淮言於懿曰雍於用翻亮必爭北原宜先據之議者多謂不然淮曰若亮跨渭登原連兵北山隔絶隴道揺盪民夷盪徒朗翻此非國之利也懿乃使淮屯北原塹壘未成塹七艶翻漢兵大至淮逆擊却之亮以前者數出數所角翻皆以運糧不繼使己志不伸乃分兵屯田為久駐之基耕者雜於渭濵居民之間而百姓安堵軍無私焉五月吳主入居巢湖口巢湖口即今柵江口也在和州歴陽縣西南百五十里水導源巢湖裴松之曰巢祖了翻今巢湖與焦湖通焦勦音近故有勦音今讀如字向合肥新城即太和六年滿寵所築新城也華夷對境圖魏合肥新城今為廬州謝步鎮衆號十萬又遣陸遜諸葛瑾將萬餘人入江夏沔口向襄陽瑾渠吝翻沔彌兖翻將軍孫韶張承入淮向廣陵淮隂六月滿寵欲率諸軍救新城殄夷將軍田豫曰殄夷將軍蓋魏所置然不在沈約志所謂四十號將軍之數賊悉衆大舉非圖小利欲質新城以致大軍耳質音致宜聽使攻城挫其銳氣不當與争鋒也城不可拔衆必罷怠罷怠然後擊之可大克也罷讀曰疲若賊見計言窺見吾所以待敵之計也必不攻城埶將自走若便進兵適入其計矣時東方吏士皆分休寵表請召中軍兵并召所休將士分休猶畨休也須集擊之散騎常侍廣平劉劭議以為賊衆新至心専氣銳寵以少人自戰其地少詩沼翻若便進擊必不能制寵請待兵未有所失也以為可先遣步兵五千精騎三千先軍前發先悉薦翻揚聲進道震曜形埶騎到合肥疏其行隊疏讀曰疎行户剛翻多其旌鼔曜兵城下引出賊後擬其歸路要其糧道賊聞大軍來騎斷其後必震怖遁走要一遥翻斷丁管翻怖普布翻不戰自破矣帝從之寵欲拔新城守致賊夀春帝不聽曰昔漢光武遣兵據略陽終以破隗囂事見四十二巻建武八年先帝東置合肥南守襄陽西固祁山賊來輒破於三城之下者地有所必爭也合肥襄陽以備吳祁山以備蜀也縱權攻新城必不能拔敕諸將堅守吾將自往征之比至恐權走也比必寐翻乃使征蜀䕶軍秦朗督步騎二萬助司馬懿禦諸葛亮敕懿但堅壁拒守以挫其鋒彼進不得志退無與戰乆停則糧盡虜略無所獲則必走走而追之全勝之道也秋七月帝御龍舟東征滿寵募壯士焚吳攻具射殺吳主之弟子泰射而亦翻又吳吏士多疾病帝未至數百里疑兵先至吳主始謂帝不能出聞大軍至遂遁孫韶亦退陸遜遣親人韓扁奉表詣吳主邏者得之扁補典翻又音篇邏郎佐翻諸葛瑾聞之甚懼書與遜云大駕已還賊得韓扁具知吾濶狹且水乾宜當急去乾音干遜未荅方催人種葑豆葑菜也謂之蔓菁豆菽也與諸將奕棊射戲如常瑾曰伯言多智略陸遜一名議字伯言其必當有以乃自來見遜遜曰賊知大駕已還無所復憂得専力於吾又已守要害之處兵將意動謂敵既知權還料遜兵當退已分守要害之處欲以遮截遜所部兵既無進取之氣而有遮截之慮則其意恐動將至於或降或潰也復扶又翻且當自定以安之施設變術然後出耳今便示退賊當謂吾怖怖普布翻仍來相蹙必敗之勢也乃宻與瑾立計令瑾督舟船遜悉上兵馬以向襄陽城上時掌翻魏人素憚遜名遽還赴城瑾便引船出遜徐整部伍張拓聲埶步趣船趣七喻翻魏人不敢逼行到白圍蓋立圍屯於白河口因以為名託言住獵潛遣將軍周峻張梁等擊江夏新市安陸石陽新市安陸二縣皆屬江夏郡魏初以文聘為江夏太守屯石陽舟車湊焉頗為繁富沈約曰江夏曲陵縣本名石陽晉武帝太康元年改曰曲陵宋明帝泰始六年併曲陵入安陸縣斬獲千餘人而還羣臣以為司馬懿方與諸葛亮相守未解車駕可西幸長安帝曰權走亮膽破大軍足以制之吾無憂矣遂進軍至夀春録諸將功封賞各有差八月壬申葬漢孝獻皇帝于禪陵帝王紀曰禪陵在濁鹿城西北十里賢曰在今懐州修武縣北二十五里劉澄之地記曰以漢禪魏因以名焉辛巳帝還許昌司馬懿與諸葛亮相守百餘日亮數挑戰數所角翻挑徒了翻懿不出亮乃遺懿巾幗婦人之服字書幗古獲翻婦人喪冠也又古對翻據劉昭注補輿服志公卿列侯夫人紺繒幗蓋婦人首飾之稱不特喪冠也遺于季翻懿怒上表請戰帝使衛尉辛毗杖節為軍師以制之䕶軍姜維謂亮曰辛佐治杖節而到賊不復出矣治直吏翻復扶又翻亮曰彼本無戰情所以固請戰者以示武於其衆耳將在軍君命有所不受孫武子及司馬穰苴之言也將即亮翻茍能制吾豈千里而請戰邪亮遣使者至懿軍懿問其寢食及事之煩簡不問戎事懿所憚者亮也問其寢食及事之煩簡以覘夀命之久近耳戎事何必問邪使者對曰諸葛公夙興夜寐罰二十以上皆親覽焉所噉食不至數升懿告人曰諸葛孔明食少事煩其能乆乎亮病篤漢使尚書僕射李福省侍噉徒濫翻少詩沼翻省悉景翻因諮以國家大計福至與亮語已别去已竟也語竟而别也數日復還復扶又翻下同亮曰孤知君還意近日言語雖彌日有所不盡更來求决耳公所問者公琰其宜也福謝前實失不諮請如公百年後誰可任大事者故輒還耳乞復請蔣琬之後誰可任者亮曰文偉可以繼之又問其次亮不荅費禕字文偉亮不荅繼禕之人非髙帝此後亦非乃所知之意蓋亦見蜀之人士無足以繼禕者矣嗚呼是月亮卒于軍中長史楊儀整軍而出百姓奔告司馬懿懿追之姜維令儀反旗鳴鼓若將向懿者懿歛軍退不敢偪猶恐亮未死也於是儀結陳而去陳讀曰陣入谷然後發喪入斜谷也百姓為之諺曰死諸葛走生仲達司馬懿字仲達以當時百姓之諺觀之時人之於孔明何如也懿聞之笑曰吾能料生不能料死故也懿案行亮之營壘處所歎曰天下竒才也方亮之出也懿以為若西上五丈原諸將無事矣及亮既死退軍懿案行其營壘處所以為天下竒才觀此則知懿已料亮之必屯五丈原而力不能制姑為此言以安諸將之心耳行下孟翻追至赤㟁不及而還還從宣翻又如字初漢前軍師魏延蜀置中軍師前軍師後軍師勇猛過人善養士卒毎隨亮出輒欲請兵萬人與亮異道㑹于潼闗如韓信故事韓信請兵故事見九卷漢髙帝二年亮制而不許延常謂亮為怯歎恨己才用之不盡楊儀為人幹敏亮毎出軍儀常規畫分部籌度糧榖不稽思慮斯須便了斯此也須待也言即此待之便可辦事分扶問翻度徒洛翻軍戎節度取辦於儀延性矜髙當時皆避下之下遐稼翻唯儀不假借延延以為至忿有如水火言不可同處也亮深惜二人之才不忍有所偏廢也費禕使吳費父沸翻使疏吏翻吳主醉問禕曰楊儀魏延牧豎小人也雖嘗有鳴吠之益於時務然既己任之勢不得輕若一朝無諸葛亮必為禍亂矣諸君憒憒憒古對翻釋云心亂也不知防慮於此豈所謂貽厥孫謀乎禕對曰儀延之不協起於私忿耳而無黥韓難御之心也黥布韓信也今方埽除強賊混一函夏夏户雅翻功以才成業由才廣若捨此不任防其後患是猶備有風波而逆廢舟檝非長計也檝與楫同亮病困與儀及司馬費禕等作身歿之後退軍節度令延斷後斷讀曰短姜維次之若延不從命軍便自發亮固知延非儀所能令矣亮卒儀祕不發喪令禕往揣延意指揣初委翻延曰丞相雖亡吾自見在此魏延矜髙之語也見賢遍翻府親官屬便可將喪還葬府親官屬謂長史以下也吾當自率諸軍擊賊云何以一人死廢天下之事邪且魏延何人當為楊儀所部勒作斷後將乎將即亮翻自與禕共作行留部分分扶問翻令禕手書與己連名告下諸將時禕為亮司馬延知儀必不已從故因禕來劫與共作行留處分行謂當從亮喪還者留謂當留拒敵者延欲令禕手書處分之語告其下諸將也禕紿延曰當為君還解楊長史長史文吏稀更軍事紿徒亥翻為于偽翻更工衡翻必不違命也禕出奔馬而去延尋悔之已不及矣尋繼也言繼時而悔也延遣人覘儀等欲案亮成規諸營相次引軍還覘丑亷翻還從宣翻又如字下同延大怒攙儀未發攙初衘翻自後爭前曰攙今人猶言攙先率所領徑先南歸所過燒絶閣道延儀各相表叛逆一日之中羽檄交至漢主以問侍中董允留府長史蔣琬琬允咸保儀而疑延儀等令槎山通道槎仕下翻邪斫木也晝夜兼行亦繼延後延先至據南谷口南谷即褒谷也南谷曰褒北谷曰斜長四百七十里同為一谷遣兵逆擊儀等儀等令將軍何平於前禦延何平即王平也本養外家何氏後復姓王此從其初姓平叱先登曰公亡身尚未寒汝輩何敢乃爾延士衆知曲在延莫為用命為于偽翻皆散延獨與其子數人逃亡奔漢中儀遣將馬岱追斬之遂夷延三族蔣琬率宿衛諸營北行赴難難乃旦翻行數十里延死問至乃還問音訊也始延欲殺儀等冀時論以己代諸葛輔政故不降魏而南還擊儀實無反意也延雖無反意使其輔政是速蜀之亡也降户江翻諸軍還成都大赦諡諸葛亮曰忠武侯初亮表於漢主曰成都有桑八百株薄田十五頃子弟衣食自有餘饒臣不别治生以長尺寸治直之翻長知兩翻若臣死之日不使内有餘帛外有贏財以負陛下卒如其所言卒子恤翻丞相長史張裔常稱亮曰公賞不遺逺罰不阿近爵不可以無功取刑不可以貴勢免此賢愚所以僉忘其身者也陳夀評曰諸葛亮之為相國也撫百姓示儀軌儀度也軌法也約官職從權制開誠心布公道盡忠益時者雖讐必賞犯法怠慢者雖親必罰服罪輸情者雖重必釋游辭巧飾者雖輕必戮善無微而不賞惡無纎而不貶庶事精練物理其本言事事物物必從其本而治之循名責實虚偽不齒終於邦域之内咸畏而愛之刑政雖峻而無怨者以其用心平而勸戒明也可謂識治之良才管蕭之亞匹矣治直吏翻亞次也匹遇也初長水校尉廖立廖力弔翻姓也裴松之音理救翻姓譜廖姓周文王子伯廖之後後漢有廖湛風浴通曰古有廖叔安左傳作飂蓋其後也自謂才名宜為諸葛亮之副常以職位游散散悉亶翻怏怏怨謗無己亮廢立為民徙之汶山據立傳廢徙汶山後主初立之時也汶山漢武帝開為郡宣帝地節三年合於蜀郡蜀又分置汶山郡唐為茂州汶山縣汶音問及亮卒立垂泣曰吾終為左衽矣李平聞之亦發病死平廢徙見上太和五年平常冀亮復收已得自補復䇿後人不能故也復扶又翻習鑿齒論曰昔管仲奪伯氏駢邑三百沒齒而無怨言聖人以為難見論語鄭氏曰小國之下大夫采地方一成其定稅三百家故三百户也其實大國下大夫亦三百户故論語云管仲奪伯氏駢邑三百一成所以三百家者一成九百夫宫室塗巷山澤三分去一餘有六百夫又不易再易通率一家受二夫之田是定稅三百家也諸葛亮之使廖立垂泣李嚴致死豈徒無怨言而已哉夫水至平而邪者取法鑑至明而醜者忘怒水鑑之所以能窮物而無怨者以其無私也水鑑無私猶以免謗况大人君子懐樂生之心樂音洛流矜恕之德法行於不可不用刑加乎自犯之罪爵之而非私誅之而不怒天下有不服者乎蜀人所在求為諸葛亮立廟漢主不聽為于偽翻百姓遂因時節私祭之於道陌上步兵校尉習隆等姓譜習國名後以為姓風俗通漢有習響為陳相上言請近其墓立一廟于沔陽近其靳翻斷其私祀斷音短漢主從之漢主以左將軍吳懿為車騎將軍假節督漢中代魏延也以丞相長史蔣琬為尚書令總統國事尋加琬行郡䕶假節領益州刺史時新喪元帥喪息浪翻逺近危悚琬出類拔萃類倫也萃聚也處羣僚之右處昌吕翻既無戚容又無喜色神守舉止有如平日由是衆望漸服吳人聞諸葛亮卒恐魏承衰取蜀増巴丘守兵萬人此巴丘即巴陵也今岳州巴陵縣有天岳山臨大江一名幕阜前有培塿謂之巴蛇冢相傳以為羿屠巴蛇於洞庭其骨若陵因謂之巴陵一欲以為救援二欲以事分割漢人聞之亦増永安之守以防非常漢主使右中郎將宗預使吳使疏吏翻吳主問曰東之與西譬猶一家而聞西更増白帝之守何也對曰臣以為東益巴丘之戍西増白帝之守皆事埶宜然俱不足以相問也吳主大笑嘉其抗盡謂抗言不為吳屈又盡情無所隱也禮之亞於鄧芝蜀先主殂諸葛亮當國始遣鄧芝使吳吳諸葛恪以丹陽山險民多果勁雖前發兵徒得外縣平民而已陸遜先嘗部伍山越為兵事見六十八卷漢獻帝建安二十四年其餘深逺莫能禽盡屢自求為官出之為于偽翻三年可得甲士四萬衆議咸以為丹陽地埶險阻與吳郡㑹稽新都番陽四郡隣接會工外翻番蒲何翻周旋數千里山谷萬重重直龍翻其幽邃人民未嘗入城邑對長吏長知兩翻皆仗兵野逸白首於林莽莽莫補翻又母黨翻草深曰莽逋亡宿惡咸共逃竄山出銅鐵自鑄甲兵俗好武習戰好呼到翻髙尚氣力其升山越險抵突叢棘若魚之走淵猿狖之騰木也走音奏狖余救翻說文曰狖䑕屬善旋時觀間隙間古莧翻出為冦盜每致兵征伐尋其窟藏其戰則蠭至敗則鳥竄自前世以來不能羈也皆以為難恪父瑾聞之亦以事終不逮逮及也謂恪所出山民終不能及四萬之數也歎曰恪不大興吾家將赤吾族也恪盛陳其必捷吳主乃拜恪撫越將軍以招撫山越為將軍號領丹陽太守使行其䇿冬十一月洛陽地震吳潘濬討武陵蠻數年斬獲數萬自是羣蠻衰弱一方寧靜十一月濬還武昌太和五年吳遣潘濬討武陵蠻資治通鑑卷七十二
