body:
  text: 資治通鑑卷一百二十三宋司馬光撰胡三省音註宋紀五起柔兆困敦盡重光大荒落凡六年太祖文皇帝中之上元嘉十三年春正月癸丑朔上有疾不朝㑹朝直遥翻下同甲寅魏主還宫二月戊子燕王遣使入貢於魏使疏吏翻下同請送侍子魏主不許燕王屢請送侍子而不至魏主知其詐故不許將舉兵討之壬辰遣使者十餘輩詣東方髙麗等諸國告諭之諭以燕王之罪使不得與通或有奔逸使不得容受之也司空江州刺史永脩公檀道濟漢靈帝中平中立永脩縣屬豫章郡隋開皇九年併入建昌縣立功前朝威名甚重左右腹心並經百戰諸子又有才氣朝廷疑畏之朝直遥翻帝久疾不愈劉湛說司徒義康以為宫車一日晏駕道濟不復可制説輸芮翻復扶又翻下足復同㑹帝疾篤義康言于帝召道濟入朝其妻向氏謂道濟曰姓譜祁姓之後為向國向式亮翻又如字髙世之勲自古所忌今無事相召禍其至矣既至留之累月帝稍間間如字將遣還已下渚道濟將還江州船已下秦淮渚未𤼵㑹帝疾動義康矯詔召道濟入祖道因執之三月己未下詔稱道濟潜散金貨招誘剽猾誘音酉剽匹妙翻因朕寢疾規肆禍心收付廷尉并其子給事黄門侍郎植等十一人誅之唯宥其孫孺唯宥諸孫之在童孺者又殺司空參軍薛彤髙進之二人皆道濟腹心有勇力時人比之闗張闗羽張飛也道濟見收憤怒目光如炬脫幘投地曰乃壊汝萬里長城壊音怪魏人聞之喜曰道濟死吳子輩不足復憚為後魏人入冦帝思道濟張本庚申大赦以中軍將軍南譙王義宣為江州刺史辛未魏平東將軍娥清安西將軍古弼將精騎一萬伐燕平州刺史拓䟦嬰帥遼西諸軍會之將即亮翻騎竒寄翻帥讀曰率下同氐王楊難當自稱大秦王改元建義立妻為王后世子為太子置百官皆如天子之制然猶貢奉宋魏不絶夏四月魏娥清古弼攻燕白狼城克之白狼縣漢屬右北平郡燕以白狼城為重鎮置并州魏後併入建徳郡廣都縣有白狼山白狼水髙麗遣其將葛盧孟光將衆數萬随陽伊至和龍迎燕王去年燕遣陽伊請迎于髙麗髙麗屯于臨川臨川在和龍城東燕尚書令郭生因民之憚遷開城門納魏兵考異曰後魏古弼傳作大臣古泥今從十六國春秋鈔魏人疑之不入生遂勒兵攻燕王王引髙麗兵入自東門與生戰于闕下生中流矢死中竹仲翻葛盧孟光入城命軍士脱弊褐取燕武庫精仗以給之大掠城中五月乙卯燕王帥龍城見戸東徙帥讀曰率見賢遍翻馮氏歴二主二千八年而滅焚宫殿火一旬不滅令婦人被甲居中陽伊等勒精兵居外葛盧孟光帥騎殿後被皮義翻殿丁甸翻方軌而進前後八十餘里古弼部將髙茍子帥騎欲追之將即亮翻帥讀曰率騎竒寄翻弼醉㧞刀止之故燕王得逃去魏主聞之怒檻車徴弼及娥清至平城皆黜為門卒戊午魏主遣散騎常侍封撥使髙麗散悉亶翻騎竒寄翻使疏吏翻令送燕王丁卯魏主如河西六月詔寧朔將軍蕭汪之將兵討程道養軍至郪口郪江源出今潼川府銅山縣歴遂寧府長江縣而合于涪水謂之郪口郪音妻帛氐奴請降降戸江翻道養兵敗還入郪山赫連定之西遷也事見上卷八年楊難當遂據上邽秋七月魏主遣驃騎大將軍樂平王丕尚書令劉絜督河西髙平諸軍以討之先遣平東將軍崔賾齎詔書諭難當驃匹妙翻騎竒寄翻賾士革翻魏散騎侍郎游雅來聘姓譜鄭公子偃字子游後以為氏魏為廣平望姓己未零陵王太妃禇氏卒追諡曰晉恭思皇后葬以晉禮八月魏主畋于河西魏主遣廣平公張黎發定州兵一萬二千通莎泉道莎泉在靈丘魏收地形志靈丘郡有莎泉縣隋廢靈丘為縣併莎泉入焉莎素何翻九月庚戌魏樂平王丕等至略陽楊難當懼請奉詔攝上邽守兵還仇池諸將議以為不誅其豪帥帥所類翻軍還之後必相聚為亂又大衆逺出不有所掠無以充軍實賞將士丕將從之中書侍郎髙允參丕軍事諌曰如諸將之謀是傷其向化之心大軍既還為亂必速丕乃止還從宣翻又如字撫慰初附秋毫不犯秦隴遂安難當以其子順為雍州刺史鎮下辨雍於用翻辨歩莧翻髙麗不送燕王於魏遣使奉表稱當與馮𢎞俱奉王化魏主以髙麗違詔議擊之將𤼵隴右騎卒麗力知翻使疏吏翻騎竒寄翻劉絜曰秦隴新民且當優復新民新附之民也復方目翻俟其饒實然後用之樂平王丕曰和龍新定宜廣脩農桑以豐軍實然後進取則髙麗一舉可滅也魏主乃止癸丑封皇子濬為始興王駿為武陵王冬十一月己酉魏主如棝陽棝音固驅野馬於雲中置野馬苑閏月壬子還宫初髙祖克長安事見一百十八卷晉安帝義熙十三年得古銅渾儀渾戸本翻儀狀雖舉不綴七曜日月五星謂之七曜是嵗詔太史令錢樂之更鑄渾儀徑六尺八分以水轉之昏明中星與天相應孟春之月昏參中旦尾中仲春之月昏弧中旦建星中季春之月昏七星中旦牽牛中孟夏之月昏翼中旦婺女中仲夏之月昏亢中旦危中季夏之月昏火中旦奎中孟秋之月昏建星中旦畢中仲秋之月昏牽牛中旦觜觿中季秋之月昏虚中旦栁中孟冬之月昏危中旦七星中仲冬之月昏東壁中旦軫中季冬之月昏婁中旦氐中更工衡翻柔然與魏絶和親犯魏邊柔然與魏和見上卷八年吐谷渾恵王慕璝卒弟慕利延立璝古冋翻十四年春正月戊子魏北平宣王長孫嵩卒長知兩翻辛卯大赦二月乙卯魏主如幽州三月丁丑魏主以南平王渾為鎮東大將軍儀同三司鎮和龍己卯還宫帝遣散騎常侍劉熙伯如魏議納幣散悉亶翻騎竒寄翻㑹帝女亡而止魏請婚始上卷十年夏四月趙廣張尋梁顯等各帥衆降别將王道恩斬程道養送首餘黨悉平九年趙廣等反今乃平帥讀曰率降戸江翻將即亮翻丁未以輔國將軍周籍之為益州刺史魏主以民官多貪郡守縣令親民之官夏五月己丑詔吏民得舉告守令不如法者於是姦猾專求牧宰之失廹脇在位横於閭里横戸孟翻而長吏咸降心待之貪縱如故長知兩翻丙申魏主如雲中秋七月戊子魏永昌王健等討山胡白龍餘黨于西河滅之八月甲辰魏主如河西九月甲申還宫丁酉魏主遣使者拜吐谷渾王慕利延為鎮西大將軍儀同三司改封西平王冬十月癸卯魏主如雲中十一月壬申還宫魏主復遣散騎侍郎董琬髙明等多齎金帛使西域招撫九國復扶又翻下不復為復同九國入貢見上卷十二年琬等至烏孫其王甚喜曰破落那者舌二國破落那漢大宛國也去代萬四千四百五十里者舌漢康居國也去代萬五千四百五十里皆欲稱臣致貢于魏但無路自致耳今使君宜過撫之乃遣導譯送琬詣破落那明詣者舌旁國聞之爭遣使者随琬等入貢凡十六國自是毎嵗朝貢不絶朝直遥翻魏主以其妹武威公主妻河西王牧犍妻七細翻犍居言翻河西王遣宋繇奉表詣平城謝且問公主所宜稱魏主使羣臣議之皆曰母以子貴妻從夫爵春秋之義母以子貴禮記婦人無爵從夫之爵牧犍母宜稱河西國太后公主於其國稱王后於京師則稱公主魏主從之初牧犍娶凉武昭王之女及魏公主至李氏與其母尹氏遷居酒泉頃之李氏卒尹氏撫之不哭曰汝國破家亡今死晚矣牧犍之弟無諱鎮酒泉謂尹氏曰后諸孫在伊吾李寳奔伊吾見一百十九卷營陽王景平元年后欲就之乎尹氏未測其意紿之曰吾子孫漂蕩託身異域餘生無幾當死此不復為氊裘之鬼也未幾潜奔伊吾無諱遣騎追及之尹氏謂追騎曰沮渠酒泉許吾歸北何為復追汝取吾首以徃吾不復還矣追騎不敢逼引還尹氏卒于伊吾史言尹氏義烈紿蕩亥翻幾居豈翻復扶又翻騎竒寄翻卒子恤翻牧犍遣將軍沮渠旁周入貢于魏魏主遣侍中古弼尚書李順賜其侍臣衣服并徴世子封壇入侍是嵗牧犍遣封壇如魏亦遣使詣建康使疏吏翻獻雜書及敦煌趙􅜫所撰甲寅元厯敦徒門翻􅜫讀為斐魏書作􅱿撰士免翻并求雜書數十種種章勇翻帝皆與之李順自河西還魏主問之曰卿徃年言取凉州之䇿朕以東方有事未遑也今和龍已平吾欲即以此年西征可乎對曰臣疇昔所言見上卷十年以今觀之私謂不謬然國家戎車屢動士馬疲勞西征之議請俟他年魏主乃止十五年春二月丁未以吐谷渾王慕利延為都督西秦河沙三州諸軍事鎮西大將軍西秦河二州刺史隴西王三月癸未魏主詔罷沙門年五十以下者以其彊壯罷使為民以從征役初燕王𢎞至遼東髙麗王璉遣使勞之曰麗力知翻璉力展翻使疏吏翻勞力到翻龍城王馮君爰適野次士馬勞乎𢎞慙怒稱制讓之髙麗處之平郭處昌吕翻尋徙北豐𢎞素侮髙麗政刑賞罰猶如其國髙麗乃奪其侍人取其太子王仁為質質音致𢎞怨髙麗遣使上表求迎上遣使者王白駒等迎之并令髙麗資遣髙麗王不欲使𢎞南來遣將孫潄髙仇等殺𢎞于北豐并其子孫十餘人果如楊㟭之言將即亮翻下同諡𢎞曰昭成皇帝白駒等帥所領七千餘人掩討潄仇殺仇生擒潄髙麗王以白駒等專殺遣使執送之上以逺國不欲違其意下白駒等獄下遐稼翻已而原之夏四月納故黄門侍郎殷淳女為太子劭妃五月戊寅魏大赦丙申魏主如五原秋七月自五原北伐柔然命樂平王丕督十五將出東道永昌王徤督十五將出西道魏主自出中道至浚稽山復分中道為二陳留王崇從大澤向涿邪山魏主從浚稽北向天山西登白阜天山在漢北即唐鐡勒思結多濫葛所保之地非伊吾之折羅漫山也白阜疑即雪山復扶又翻邪讀曰耶不見柔然而還時漠北大旱無水草人馬多死冬十一月丁卯朔日冇食之十二月丁巳魏主至平城豫章雷次宗好學好呼到翻下同隠居廬山廬山在尋陽今在南康城北十五里尋陽之南正面廬山嘗徵為散騎侍郎不就是嵗以處士徵至建康為開舘於雞籠山雞籠山在臺城北郊散悉亶翻騎竒寄翻處昌吕翻為于偽翻使聚徒教授帝雅好蓺文使丹楊尹廬江何尚之立𤣥學太子率更令何承天立史學晉志太子率更令主宫殿門戸及賞罰事職如光禄勲衛尉更工衡翻司徒參軍謝元立文學并次宗儒學為四學元靈運之從祖弟也帝數幸次宗學館令次宗以巾褠侍講從才用翻數所角翻褠古矦翻江南人士交際以為盛服蓋次于朝服毛脩之不肯以巾褠到殷景仁之門是也蜀註曰巾謂巾幘褠謂單衣資給甚厚又除給事中不就久之還廬山臣光曰易曰君子多識前言徃行以畜其徳行下孟翻易大畜彖辭孔子曰辭達而已矣論語所記然則史者儒之一端文者儒之餘事至于老莊虛無固非所以為教也夫學者所以求道天下無二道安有四學哉帝性仁厚恭儉勤於為政守法而不峻容物而不弛百官皆久于其職守宰以六朞為斷吏不茍免民有所係三十年間四境之内晏安無事戸口蕃息斷丁亂翻蕃音頓出租供徭止於嵗賦嵗賦常賦也言不額外取民晨出暮歸自事而已自適已事而已閭閻之間講誦相聞士敦操尚鄉恥輕薄江左風俗於斯為美後之言政治者皆稱元嘉焉治直吏翻十六年春正月庚寅司徒義康進位大將軍領司徒自漢以來大將軍位三公上司徒丞相職也義康既進位猶領司徒職南兗州刺史江夏王義恭進位司空夏戸雅翻魏主如定州初髙祖遺詔令諸子次第居荆州臨川王義慶在荆州八年欲為之選代為于偽翻其次應在南譙王義宣帝以義宣人才凡鄙置不用二月己亥以衡陽王義季為都督荆湘等八州諸軍事荆州刺史義季嘗春月出畋有老父被苫而耕被皮義翻苫詩㢘翻左右斥之老父曰盤于遊畋古人所戒夏太康以遊畋失國周公以文王戒成王盤樂也今陽和布氣一日不耕民失其時奈何以從禽之樂而驅斥老農也樂音洛義季止馬曰賢者也命賜之食辭曰大王不奪農時則境内之民皆飽大王之食老夫何敢獨受大王之賜乎義季問其名不告而退三月魏雍州刺史葛那宼上洛魏雍州刺史治長安此北上洛也南上洛寄治魏興魏書官氏志内入諸姓賀葛氏改為葛氏雍於用翻上洛太守鐔長生棄郡走鐔徐林翻辛未魏主還宫楊保宗與兄保顯自童亭奔魏保宗鎮童亭見上卷十二年庚寅魏主以保宗為都督隴西諸軍事征西大將軍開府儀同三司秦州牧武都王鎮上邽妻以公主妻七細翻保顯為鎮西將軍晉夀公河西王牧犍通于其嫂李氏兄弟三人傳嬖之傳逓也以便辟得幸曰嬖嬖卑義翻陸徳明必計翻李氏與牧犍之姊共毒魏公主公主魏主妹也魏主遣解毒醫乗傳救之得愈傳知戀翻魏主徵李氏牧犍不遣厚資給使居酒泉魏毎遣使者詣西域使疏吏翻下同常詔牧犍𤼵導護送出流沙使者自西域還至武威牧犍左右有告魏使者曰我君承蠕蠕可汗妄言云可從刋入聲汗音寒去嵗魏天子自來伐我士馬疫死大敗而還還從宣翻又如字下同我擒其長弟樂平王丕我君大喜宣言於國又聞可汗遣使告西域諸國稱魏已削弱今天下唯我為彊若更有魏使勿復供奉西域諸國頗有貳心復扶又翻下能復同兩屬曰貳西域既貢奉魏又信柔然之言是有貳心使還具以狀聞魏主遣尚書賀多羅使凉州觀虛實多羅還亦言牧犍雖外脩臣禮内實乖悖悖蒲内翻又蒲没翻魏主欲討之以問崔浩對曰牧犍逆心已露不可不誅官軍徃年北伐雖不克獲實無所損戰馬三十萬匹計在道死傷不滿八千常嵗羸死亦不減萬匹羸倫為翻而逺方乗虛遽謂衰耗不能復振今出其不意大軍猝至彼必駭擾不知所為擒之必矣魏主曰善吾意亦以為然於是大集公卿議於西堂魏平城太極殿有東西堂𢎞農王奚斤等三十餘人皆曰牧犍西垂下國雖心不純臣然繼父位以來職貢不乏朝廷待以藩臣妻以公主妻七細翻今其罪惡未彰宜加恕宥國家新征蠕蠕蠕人兖翻士馬疲弊未可大舉且聞其土地鹵瘠鹹地曰鹵瘠地曰瘠難得水草大軍既至彼必嬰城固守攻之不㧞野無所掠此危道也初崔浩惡尚書李順伐夏之役浩順有隙順以使凉為魏主所寵待浩愈惡之惡烏路翻順使凉州凡十二返使疏吏翻魏主以為能凉武宣王數與順遊宴沮渠䝉遜諡武宣王數所角翻對其羣下時為驕慢之語恐順泄之随以金寳納于順懐順亦為之隠亦為于偽翻浩知之密以白魏主魏主未之信及議伐凉州順與尚書古弼皆曰自温圉水以西至姑臧據北史温圉水當作温圉地皆枯石絶無水草彼人言姑臧城南天梯山上冬有積雪深至丈餘春夏消釋下流成川居民引以溉灌彼聞軍至決此渠口水必乏絶彼人謂凉人也環城百里之内環音宦地不生草人馬饑渴難以久留斤等之議是也魏主乃命浩與斤等相詰難衆無復他言但云彼無水草浩曰漢書地理志稱凉州之畜為天下饒若無水草畜何以蕃詰去吉翻難乃旦翻復扶又翻下敢復同漢書地理志曰凉州土廣民稀水草宜畜牧故凉州之畜為天下饒畜許救翻又許六翻蕃音繁又漢人終不於無水草之地築城郭建郡縣也且雪之消釋僅能斂塵何得通渠溉灌乎此言大為欺誣矣欺誑也誣詐也李順曰耳聞不如目見吾嘗目見何可共辨浩曰汝受人金錢欲為之遊説謂我目不見便可欺邪帝隠聽聞之為于偽翻説輸芮翻隠聽者隠屏而聽也乃出見斤等辭色嚴厲羣臣不敢復言唯唯而已唯于癸翻羣臣既出振威將軍代人伊馛言於帝馛蒲撥翻曰凉州若果無水草彼何以為國衆議皆不可用宜從浩言帝善之夏五月丁丑魏主治兵於西郊治直之翻六月甲辰𤼵平城使侍中宜都王穆夀輔太子晃監國決留臺事内外聽焉監工銜翻又使大將軍長樂王稽敬稽敬北史作嵇敬當從之魏書官氏志北方諸姓紇奚氏改為嵇氏輔國大將軍建寧王崇將二萬人屯漠南以備柔然王將即亮翻命公卿為書以讓河西王牧犍數其十二罪且曰若親帥羣臣委贄逺迎數所具翻帥讀曰率古者執贄以見拜贄首則委之於地起則取而進之此之謂委贄謁拜馬首上䇿也六軍既臨面縛輿櫬其次也若守迷窮城不時悛悟櫬初覲翻悛丑縁翻身死族滅為世大戮宜思厥中自求多福己酉改封隴西王吐谷渾慕利延為河南王魏主自雲中濟河秋七月己巳至上郡屬國城漢置屬國於邉郡以處降胡此屬國城漢舊城也班書地理志上郡龜兹縣屬國都尉治壬午留輜重部分諸軍重直用翻分扶問翻使撫軍大將軍永昌王健尚書令劉絜與常山王素為前鋒兩道並進驃騎大將軍樂平王丕太宰陽平王杜超為後繼驃匹妙翻騎竒寄翻以平西將軍源賀為鄉導鄉讀曰嚮魏主問賀以取凉州方略對曰姑臧城旁有四部鮮卑皆臣祖父舊民秃髪傉檀據姑臧既而為沮渠所取有四部鮮卑留居城外賀傉檀之子也臣願處軍前處昌吕翻宣國威信示以禍福必相帥歸命帥讀曰率外援既服然後取其孤城如反掌耳魏主曰善八月甲午永昌王健獲河西畜産二十餘萬河西王牧犍聞有魏師驚曰何為乃爾用左丞姚定國計不肯出迎求救于柔然遣其弟征南大將軍董來將兵萬餘人出戰於城南來將即亮翻望風奔潰劉絜用卜者言以為日辰不利斂兵不追董來遂得入城魏主由是怒之為魏誅劉絜張本丙申魏主至姑臧遣使諭牧犍令出降使疏吏翻降戸江翻牧犍聞柔然欲入魏邉為寇冀幸魏主東還遂嬰城固守其兄子祖踰城出降魏主具知其情乃分軍圍之源賀引兵招慰諸部下三萬餘落故魏主得專攻姑臧無復外慮復扶又翻下不復同魏主見姑臧城外水草豐饒由是恨李順謂崔浩曰卿之昔言今果騐矣自是魏主决意誅李順矣對曰臣之言不敢不實類皆如此魏主之將伐凉州也太子晃亦以為疑至是魏主賜太子詔曰姑臧城西門外涌泉合於城北其大如河自餘溝渠流入漠中其間乃無燥地故有此敕以釋汝疑庚子立皇子鑠為南平王鑠書藥翻九月丙戌河西王牧犍兄子萬年帥所領降魏氐考異曰宋書胡傳曰茂䖍兄子萬年為虜内應茂䖍見執今從後魏書帥讀曰率降戸江翻下同姑臧城潰牧犍帥其文武五千人面縛請降魏主釋其縛而禮之收其城内戸口二十餘萬倉庫珍寳不可勝計使張掖王秃髮保周保周奔魏封張掖公今進為王保周源賀之兄也勝音升龍驤將軍穆羆驤思將翻安逺將軍源賀分徇諸郡雜胡降者又數十萬初牧犍以其弟無諱為沙州刺史都督建康以西諸軍事領酒泉太守宜得為秦州刺史都督丹嶺以西諸軍事領張掖太守丹嶺在姑臧西即刪丹嶺安周為樂都太守乞伏衰滅樂都亦為沮渠所有樂音洛作考異曰宋書宜得作儀徳安周從子豐周今從後魏書從弟唐兒為敦煌太守從才用翻敦徒門翻及姑臧破魏主遣鎮南將軍代人奚眷擊張掖鎮北將軍封沓擊樂都宜得燒倉庫西奔酒泉安周南奔吐谷渾封沓掠數千戸而還還從宣翻又如字奚眷進攻酒泉無諱宜得收遺民奔晉昌遂就唐兒於敦煌魏主使弋陽公元絜守酒泉及武威張掖皆置將守之將即亮翻魏主置酒姑臧謂羣臣曰崔公知略有餘吾不復以為竒復扶又翻伊馛弓馬之士而所見乃與崔公同深可竒也馛善射能曳牛却行走及奔馬而性忠謹故魏主特愛之魏主之西伐也穆夀送至河上自平城送魏主西至河魏主敕之曰吳提與牧犍相結素深聞朕討牧犍吳提必犯塞柔然敕連可汗名吳提朕故留壯兵肥馬使卿輔佐太子收田既畢即𤼵兵詣漠南分伏要害以待虜至引使深入然後擊之無不克矣凉州路逺朕不得救卿勿違朕言夀頓首受命夀雅信中書博士公孫質以為謀主夀質皆信卜筮以為柔然必不來不為之備質軌之弟也公孫軌見一百二十卷四年柔然敕連可汗聞魏主向姑臧乗虚入宼留其兄乞列歸與嵇敬建寜王崇相拒于北鎮北鎮即魏主破降髙車所置六鎮也以在平城之北故曰北鎮或曰北鎮直代都北即懐朔鎮自帥精騎深入帥讀曰率騎竒寄翻至善無七介山平城大駭民爭走中城走音奏穆壽不知所為欲塞西郭門塞悉則翻請太子避保南山竇太后不聽而止竇太后即保太后遣司空長孫道生征北大將軍張黎拒之於吐頽山㑹嵇敬建寧王崇擊破乞列歸於隂山之北擒之并其伯父他吾無鹿胡及將帥五百人將即亮翻帥所類翻斬首萬餘級敕連聞之遁去追至漠南而還冬十月辛酉魏主東還留樂平王丕及征西將軍賀多羅鎮凉州徙沮渠牧犍宗族及吏民三萬戸于平城考異曰十六國春秋鈔云十萬戸今從後魏書癸亥秃髪保周帥諸部鮮卑據張掖叛魏帥讀曰率十二月乙亥太子劭加元服大赦劭美鬚眉好讀書便弓馬喜延賔客好呼到翻喜許記翻下尤喜同意之所欲上必從之東宫置兵與羽林等師古曰羽林宿衛之官言其如羽之疾如林之多也為邵以東宫兵弑逆張本壬午魏主至平城以柔然入寇無大失亡故穆壽等得不誅魏主猶以妹婿待沮渠牧犍征西大將軍河西王如故牧犍母卒葬以太妃之禮武宣王置守冢三十家為沮渠蒙遜置守冢凉州自張氏以來號為多士永嘉之亂中州之人士避地河西張氏禮而用之子孫相承衣冠不墜故凉州號為多士沮渠牧犍尤喜文學以敦煌闞駰為姑臧太守敦徒門翻闞苦濫翻駰音因張湛為兵部尚書曹魏置五兵尚書據此則兵部之號起于河西劉昞索敞隂興為國師助教金城宋欽為世子洗馬索昔各翻洗悉薦翻趙柔為金部郎曹魏置二十三郎金部其一也主財帛委輸廣平程駿駿從弟𢎞為世子侍講從才用翻魏主克凉州皆禮而用之以闞駰劉昞為樂平王丕從事中郎安定胡叟少有俊才少詩照翻徃從牧犍牧犍不甚重之叟謂程𢎞曰貴主居僻陋之國而淫名僣禮以小事大而心不純壹外慕仁義而實無道徳其亡可翹足待也吾將擇木左傳衛孔文子將攻太叔疾訪於仲尼仲尼曰甲兵之事未之學也退命駕而行曰鳥則擇木木豈能擇鳥先集于魏與子暫違非久闊也遂適魏嵗餘而牧犍敗魏主以叟為先識拜虎威將軍賜爵始復男按地名無始復漢書地理志越嶲郡有姑復縣或者始字其姑字之誤乎河内常爽世寓凉州不受禮命魏主以為宣威將軍河西右相宋繇從魏主至平城而卒相息亮翻卒子恤翻魏主以索敞為中書博士時魏朝方尚武功朝直遥翻貴遊子弟不以講學為意鄭𤣥曰貴遊子弟王公之子弟遊無官司者敞為博士十餘年勤於誘導肅而有禮誘音酉貴遊皆嚴憚之多所成立前後顯達至尚書牧守者數十人守手又翻常爽置館於温水之右水經註桑乾城西十里有温湯教授七百餘人爽立賞罰之科弟子事之如嚴君由是魏之儒風始振髙允毎稱爽訓厲有方曰文翁柔勝先生剛克漢景帝末文翁為蜀郡守仁愛好教化選郡縣小吏開敏冇才者詣京師受業博士又修起學宫于成都市中招下縣子弟為學官弟子為除更繇由是大化至今巴蜀好儒雅文翁之教也克亦勝也言文翁以柔勝而常爽以剛勝也立教雖殊成人一也陳留江强寓居凉州獻經史諸子千餘卷及書法亦拜中書博士魏延昌三年强孫式上表曰臣聞伏羲氏作而八卦形其畫軒轅氏興而靈龜彰其彩古史倉頡覽二象之爻觀鳥獸之迹别剏文字以代結繩用書契以維事迄于三代厥體頗異雖依類取制未能達倉氏矣故周禮八嵗入小學保氏教以六書蓋是史頡之遺法及宣王太史史籀著大篆十五篇與古文或同或異時書謂之籀書孔子脩六經左丘明述春秋皆以古文厥意可得而言其後七國殊軌文字乖引暨秦兼天下丞相李斯乃奏蠲罷不合秦文者斯作倉頡篇車府令髙作爰歴篇太史令胡母敬作博學篇皆取史籀式頗有省改所謂小者也於是秦燒經書滌除舊典官獄煩多以趣簡易始用𨽻書古文自此息矣𨽻書者始皇使下杜人程邈附于小篆所作也世人以邈徒𨽻即謂之𨽻書故秦有八體一曰大二曰小三曰符書四曰蟲書五曰摹印六曰署書七曰殳書八曰𨽻書漢興有尉律學復教以籀書又習八體試之課最以為尚書史書省字不正輙舉劾焉又有草書莫知誰始其形書雖無厥誼亦一時之變通也孝宣時召通倉頡讀者獨張敞從受之凉州刺史杜業沛人爰禮講學大夫秦近亦能言之孝平時徵禮等百餘人説文字於未央宫中以禮為小學元士黄門侍郎揚雄採以作訓纂篇及亡新居攝自以運應制作使大司馬甄豐校文字之部頗改定古文時有六書一曰古文孔子壁中書也二曰竒字即古文而異者三曰書云小也四曰佐書秦𨽻書也五曰繆所以摹印也六曰鳥蟲所以書旛信也壁中書者魯恭王壊孔子宅而得尚書春秋論語孝經也又北平矦張蒼獻春秋左氏傳書體與孔氏相類即前代之古文矣後漢扶風曹喜號曰工篆小異斯法而甚精巧自是後學皆其法也又詔侍中賈逵脩理舊文殊藝異術王教一端茍有可以加于國者靡不悉集逵即汝南許慎古學之師也後慎嗟時人之好竒歎俗儒之穿鑿故撰説文解字十五篇首一終𤣥各有部屬可謂類聚羣分雜而不越文質彬彬最可得而論也左中郎將蔡邕採李斯曹喜之法以為古今雜形詔于太學立石碑刋載五經題書楷法多是邕書也後開鴻都書畫竒能莫不雲集特諸方獻篆無出邕者魏初博士清河張揖著埤蒼廣雅古今字詁方之許篇古今體用或得或失陳留邯鄲淳亦與揖同博聞古藝特善蒼雅許氏字指八體六書精究厥理有名於揖以書教諸皇子又建三字石經於漢碑西其文蔚煥三體復宣較之説文篆𨽻大同而古字小異又有京兆韋誕河東衛覬二家並號能篆當時臺觀牋題寳噐之銘悉是誕書咸傳之子孫世稱其妙晉世吕忱表上字林六卷尋其况趣附託許慎説文而按偶章句隠别古籀竒惑之字文得正𨽻不差篆意也忱弟静别倣故左校令李登聲類之法作韻集五卷使宫商録徵羽各為一篇而文字與兄便是魯衛音讀楚夏時有不同皇魏承百王之季紹五運之緒世易風移文字改變篆形謬錯𨽻體失真俗學鄙習復加虚造巧談辨士以意為疑炫惑于時難以釐改乃曰追來為歸巧言為辯小兎為神虫為蠶如斯甚衆皆不合孔氏古書史籀大篆許氏説文石經三字也嗟夫文字者六籍之宗王教之始前人所以垂今今人所以識古臣六世祖瓊家世陳留住晉之初與從父兄皆受學于衛覬古篆之法蒼雅方言説文之誼當時並收善譽而祖遇洛陽之亂避地河西數世傳習斯業所以不墜也世祖大延中牧犍内附臣亡祖文威杖䇿歸國奉獻五世傳掌之書古篆八體之法時䝉褒録叙列于儒林官班文省家號世業臣藉六世之資奉遵祖考之訓切慕古人乏軌企踐儒門之轍求撰集古來文字以許慎説文為主及孔氏尚書五經音註籀篇爾雅三蒼凡將方言通俗文祖文宗埤蒼廣雅古今字詁三字石經字林韻集諸賦文字有六書之誼者以類編聯文無複重統為一部其石籀竒惑俗𨽻諸體咸使班于篆下各有區别訓詁假借之誼随文而解音讀楚夏之聲逐字而註其所不知則闕如也冀省百氏之觀而同文字之域詔如所請中書自曹魏置監令以來未嘗置博士蓋拓抜氏初置是官也魏主命崔浩監秘書事監工銜翻綜理史職以中書侍郎髙允散騎侍郎張偉參典著作曹魏明帝景初初中書改置監令又置通事郎及晉改曰中書侍郎散悉亶翻騎竒寄翻浩啟稱殷仲逵叚承根凉土美才請同修國史皆除著作郎仲逵武威人承根暉之子也叚暉事乞伏熾磐暮末父子浩集諸厯家考校漢元以來日月薄食五星行度漢元漢初也并譏前史之失别為魏厯以示髙允允曰漢元年十月五星聚東井見九卷漢髙帝元年考異此乃厯術之淺事今譏漢史而不覺此謬恐後人之譏今猶今之譏古也浩曰所謬云何允曰案星傳太白辰星常附日而行十月日在尾箕孟冬之月日在尾言在尾箕者竟一月言之也傳直戀翻昏没于申南而東井方出于寅北二星何得背日而行背蒲妹翻是史官欲神其事不復推之於理也復如字又扶又翻浩曰天文欲為變者何所不可邪允曰此不可以空言爭宜更審之坐者咸怪允之言唯東宫少傅游雅曰東宫少傅即太子少傅少詩照翻髙君精於厯數當不虚也後嵗餘浩謂允曰先所論者本不經心及更考究果如君言五星乃以前三月聚東井非十月也衆乃歎服允雖明厯初不推歩及為人論說為于偽翻唯游雅知之雅數以災異問允數所角翻允曰隂陽災異知之甚難既已知之復恐漏泄復扶又翻不如不知也天下妙理至多何以問此雅乃止魏主問允為政何先時魏多封禁良田允曰臣少賤允自言其少也賤少詩照翻唯知農事若國家廣田積穀公私有偹則飢饉不足憂矣帝乃命悉除田禁以賦百姓吐谷渾王慕利延聞魏克凉州大懼帥衆西遁踰沙漠帥讀曰率魏主以其兄慕璝有擒赫連定之功事見上卷八年遣使撫諭之使疏吏翻慕利延乃還故地氐王楊難當將兵數萬寇魏上邽將即亮翻下同秦州人多應之東平吕羅漢説鎮將拓跋意頭曰難當衆盛今不出戰示之以弱衆情離沮不可守也意頭遣羅漢將精騎千餘出衝難當陳所向披靡説輸芮翻陳讀曰陣披普彼翻殺其左右騎八人難當大驚㑹魏主以璽書責讓難當璽斯氏翻難當引還仇池南豐太妃司馬氏卒故營陽王之后也九年帝以江夏王義恭子朗為南豐王奉營陽王祀以后為南豐太妃趙廣張尋等復謀反伏誅十四年廣尋降至建康復謀反復扶又翻下復能復那不復無復同十七年春正月己酉沮渠無諱寇魏酒泉元絜輕之出城與語壬子無諱執絜以圍酒泉二月魏假通直常侍邢頴來聘散騎常侍秦官也曹魏末増置貟外散騎常侍晉武帝秦始十年使貟外二人與散騎常侍通直故謂之通直散騎常侍頴假以出使非正官也三月沮渠無諱㧞酒泉夏四月戊午朔日有食之庚辰沮渠無諱寇魏張掖禿髪保周屯刪丹刪丹縣漢屬張掖郡後分屬西郡唐屬甘州居延海在縣界丙戌魏主遣撫軍大將軍永昌王健督諸將討之將即亮翻司徒義康專總朝權上羸疾積年羸倫為翻心勞輒𤼵屢至危殆義康盡心營奉藥石非口所親嘗不進或連夕不寐内外衆事皆專決施行性好吏職好呼到翻下好於同糾剔文案莫不精盡上由是多委以事凡所陳奏入無不可方伯以下並令義康選用生殺大事或以録命斷之義康録尚書故謂其命為録命斷丁亂翻勢傾遠近朝野輻湊毎旦府門常有車數百乗朝直遥翻乗繩證翻義康傾身引接未嘗懈倦復能强記耳目所經終身不忘好于稠人廣席標題所憶以示聰明士之幹練者多被意遇懈古隘翻復扶又翻下同好呼到翻被皮義翻嘗謂劉湛曰王敬𢎞王球之屬竟何所堪坐取富貴復那可解王敬𢎞恬淡有重名王球簡貴虚静皆以門望位入坐不以文按關心故義康云然解戸買翻然素無學術不識大體朝士有才用者皆引入已府府僚無施及忤㫖者乃斥為臺官晉宋以來謂天朝為天臺忤五故翻自謂兄弟至親不復存君臣形迹率心而行曾無猜防私置僮六千餘人不以言臺四方獻饋皆以上品薦義康而以次者供御上嘗冬月噉甘甘似橘而巨其皮黄於橘其味甘於橘歎其形味並劣義康曰今年甘殊有佳者遣人還東府取甘大供御者三寸領軍劉湛與僕射殷景仁有隙事見上卷十二年湛欲倚義康之重以傾之義康權勢已盛湛愈推崇之無復人臣之禮上浸不能平湛初入朝上恩禮甚厚湛善論治道諳前代故事叙致銓理致極致也理文理也言叙其極致又銓次其文理也治直吏翻諳烏含翻聽者忘疲毎入雲龍門御者即解駕左右及羽儀随意分散不夕不出以此為常及晚節驅煽義康馬方走而疾其鞭䇿曰驅火方熾而鼔其氣燄曰煽上意雖内離而接遇不改嘗謂所親曰劉班方自西還宫與語常視日早晚慮其將去比入吾亦視日早晚苦其不去湛小字班虎故稱之為班比毗至翻近也殷景仁密言於上曰相王權重非社稷計宜少加裁抑相息亮翻少詩沼翻上隂然之司徒左長史劉斌湛之宗也斌音彬大將軍從事中郎王履謐之孫也王謐識武帝於㣲時晉宋之際位任通顯及主簿劉敬文祭酒魯郡孔𦙍秀皆以傾謟有寵于義康見上多疾皆謂宫車一日晏駕宜立長君長知兩翻上嘗疾篤使義康具顧命詔義康還省流涕以告湛及景仁湛曰天下艱難詎是㓜主所御義康景仁並不答康考異曰南史以為義康有此言湛景仁並不答按義雖不識大體豈敢自為此言湛常欲推崇義康豈肯聞而不答今從宋書及宋略而𦙍秀等輙就尚書議曹索晉咸康末立康帝舊事議曹南史作儀曹當從之曹魏置二十三郎儀曹其一也立康帝事見九十七卷索山客翻義康不知也及上疾瘳微聞之瘳丑留翻而斌等密謀欲使大業終歸義康遂邀結朋黨伺察禁省伺相吏翻有不與己同者必百方構䧟之又採拾景仁短長或虛造異同以告湛自是主相之勢分矣相息亮翻義康欲以劉斌為丹楊尹斌音彬言次啟上陳其家貧言未卒卒子恤翻上曰以為吳郡後㑹稽太守羊𤣥保求還會工外翻義康又欲以斌代之啟上曰羊𤣥保求還不審以誰為㑹稽上時未有所擬倉猝曰我已用王鴻自去年秋上不復徃東府史言帝已疎忌義康而義康貪戀權勢惑于附麗者不能引退復扶又翻下同五月癸巳劉湛遭母憂去職湛自知罪舋已彰無復全地舋許覲翻謂所親曰今年必敗常日正賴口舌爭之故得推遷耳今既窮毒謂母子相訣則人理窮而罹荼毒也無復此望禍至其能久乎南考異曰史云湛伏甲於室以俟上臨弔謀又泄竟弗之幸宋書無此事按湛若謀泄當即伏誅豈得尚延半嵗今從宋書乙巳沮渠無諱復圍張掖不克退保臨松臨松郡臨松縣當是沮渠氏所置後宇文周廢入張掖復扶又翻下同魏主不復加討但以詔諭之六月丁丑魏皇孫濬生大赦改元太平真君取寇謙之神書云輔佐北方太平真君故也寇謙之神書見一百十九卷營陽王景平元年太子劭詣京口拜京陵司徒義康竟陵王誕等並從從才用翻南兖州刺史江夏王義恭自江都㑹之夏戸雅翻秋七月己丑魏永昌王健擊破秃髪保周于番禾保周走遣安南將軍尉眷追之番音盤尉紆勿翻丙申魏太后竇氏殂壬子皇后袁氏殂太子邵弑逆之心萌於此矣癸丑秃髪保周窮廹自殺八月甲申沮渠無諱使其中尉梁偉詣魏永昌王健請降降戸江翻歸酒泉郡及所虜將士元絜等魏主使尉眷留鎮凉州九月壬子葬元皇后上以司徒彭城王義康嫌隙已著將成禍亂冬十月戊申收劉湛付廷尉下詔暴其罪惡就獄誅之并誅其子黯亮儼及其黨劉斌劉敬文孔𦙍秀等八人徙尚書庫部郎何默子等五人於廣州曹魏置尚書二十三郎庫部其一也因大赦是日敕義康入宿留止中書省其夕分收湛等青州刺史杜驥勒兵殿内以備非常遣人宣㫖告義康以湛等罪狀義康上表遜位詔以義康為江州刺史侍中大將軍如故出鎮豫章初殷景仁卧疾五年景仁卧疾始上卷十二年雖不見上而密函去來日以十數朝政大小必以咨之朝直遥翻影迹周密莫有窺其際者收湛之日景仁使拂拭衣冠左右皆不曉其意其夜上出華林園延賢堂召景仁景仁猶稱脚疾以小牀輿就坐誅討處分一以委之坐徂卧翻處昌吕翻分扶問翻初檀道濟薦吳興沈慶之忠謹曉兵上使領隊防東掖門劉湛為領軍嘗謂之曰卿在省嵗久比當相論省謂領軍省比毗寐翻謂當為之論叙也慶之正色曰下官在省十年自應得轉不復以此仰累復扶又翻下同累力瑞翻收湛之夕上開門召慶之慶之戎服縛袴而入上曰卿何意乃爾急裝慶之曰夜半喚隊主江南軍制呼長帥為隊主軍主隊主者主一隊之稱軍主者主一軍之稱不容緩服史言沈慶之有識畧上遣慶之收劉斌殺之驍騎將軍徐湛之逵之之子也徐逵之武帝愛壻死于司馬楚之魯宗之之難驍堅堯翻騎竒寄翻與義康尤親厚上深銜之義康敗湛之被收罪當死其母㑹稽公主於兄弟為長嫡被皮義翻㑹工外翻長知兩翻素為上所禮家事大小必咨而後行髙祖微時嘗自于新洲伐荻有納布衫襖納與衲同臧皇后手所作也既貴以付公主曰後世有驕奢不節可以此衣示之至是公主入宫見上號哭不復施臣妾之禮以錦囊盛納衣擲地號戸髙翻盛時征翻曰汝家本貧賤此是我母為汝父所作為于偽翻下右為嘗為同今日得一飽餐遽欲殺我兒邪上乃赦之吏部尚書王球履之叔父也以簡淡有美名為上所重履性進利言履務進而好利也深結義康及湛球屢戒之不從誅湛之夕履徒跣告球跣先典翻球命左右為取履先温酒與之謂曰常日語汝云何語牛倨翻履怖懼不得答怖普布翻球徐曰阿父在汝亦何憂江南人士呼叔父伯父為阿父為伯父叔父者以自呼阿烏葛翻上以球故履得免死廢於家據南史帝初為宜都王以球為友簡淡見重蓋素知之也義康方用事人爭求親暱暱尼質翻唯司徒主簿江湛早能自疎求出為武陵内史檀道濟嘗為其子求婚于湛湛固辭道濟因義康以請之湛拒之愈堅故不染于二公之難難巧旦翻上聞而嘉之湛夷之子也江夷嚮用於元嘉之初彭城王義康停省十餘日見上奉辭便下渚上惟對之慟哭餘無所言上遣沙門慧琳視之義康曰弟子有還理不不讀曰否慧琳曰恨公不讀數百卷書初吳興太守謝述裕之弟也謝裕見一百十五卷晉安帝義熈五年累佐義康數有規益早卒義康鎮江陵述為驃騎長史南郡太守義康入相又為司徒左長史數所角翻義康將南將自建康南徙豫章歎曰昔謝述惟勸吾退劉班惟勸吾進今班存而述死其敗也宜哉上亦曰謝述若存義康必不至此以征虜司馬蕭斌為義康諮議參軍領豫章太守事無大小皆以委之斌摹之之子也蕭摹之見上卷十二年使龍驤將軍蕭承之將兵防守驤思將翻之將即亮翻義康左右愛念者並聽随從從才用翻資奉優厚信賜相係朝廷大事皆報示之久之上就㑹稽公主宴集甚懽主起再拜叩頭悲不自勝勝音升上不曉其意自起扶之主曰車子嵗暮必不為陛下所容今特請其命義康小字車子因慟哭上亦流涕指蔣山曰必無此慮若違今誓便是負初寧陵髙祖葬初寧陵在蔣山即封所飲酒賜義康并書曰會稽姊飲宴憶弟所餘酒今封送故終主之身義康得無恙恙余亮翻臣光曰文帝之於義康友愛之情其始非不隆也終于失兄弟之歡虧君臣之義迹其亂階正由劉湛權利之心無有厭已厭於鹽翻詩云貪人敗類芮良夫桑柔之詩敗補邁翻其是之謂乎徵南兖州刺史江夏王義恭為司徒録尚書事戊寅以臨川王義慶為南兖州刺史殷景仁為揚州刺史僕射吏部尚書如故義恭懲彭城之敗雖為總録奉行文書而已上乃安之彭城義康也上年給相府錢二千萬他物稱此相息亮翻稱尺證翻而義恭性奢用常不足上又别給錢年至千萬十一月丁亥魏主如山北殷景仁既拜揚州羸疾遂篤羸倫為翻上為之敕西州道上不得有車聲為于偽翻揚州治所在建康臺城西故謂之西州宋白曰秣陵縣秦屬鄣郡丹楊圖云自句容以西屬鄣郡以東屬㑹稽郡武帝元封二年改鄣郡為丹楊郡置揚州刺史理秣陵西州橋冶城之間是其理處劉縣為揚州刺史始移理曲阿孫䇿號此為西州癸丑卒卒子恤翻十二月癸亥以光禄大夫王球為僕射戊辰以始興王濬為揚州刺史時濬尚㓜州事悉委後軍長史范曄主簿沈璞曄泰之子璞林子之子也范泰為髙祖所賞愛林子從髙祖為將有功曄尋遷左衛將軍以吏部郎沈演之為右衛將軍對掌禁旅又以庾炳之為吏部郎俱參機密演之勁之曾孫也沈勁守死于洛陽以雪父充為逆之罪曄有雋才而薄情淺行數犯名教為士流所鄙行下孟翻數所角翻性躁競自謂才用不盡常怏怏不得志為後范曄謀亂張本吏部尚書何尚之言于帝曰范曄志趨異常趨與趣同七著翻請出為廣州刺史若在内舋成不得不加鈇鉞鈇鉞亟行舋許覲翻亟區記翻非國家之美也帝曰始誅劉湛復遷范曄復扶又翻下復稱同人將謂卿等不能容才朕信受䜛言但共知其如此無能為害也是嵗魏寧南將軍王慧龍卒吕𤣥伯留守其墓終身不去慧龍不殺𤣥伯見上卷八年魏主欲以伊馛為尚書封郡公馛辭曰尚書務殷公爵至重非臣年少愚近所宜膺受馛蒲撥翻少詩照翻帝問其所欲對曰中袐二省多諸文士中袐謂中書省袐書省也若恩矜不已請參其次帝善之以為中護軍將軍袐書監大秦王楊難當復稱武都王十三年難當自稱大秦王十八年春正月癸卯魏以沮渠無諱為征西大將軍凉州牧酒泉王彭城王義康至豫章辭刺史辭江州刺史也甲辰以義康都督江交廣三州諸軍事前龍驤參軍巴東扶令育詣闕上表驤思將翻扶姓也稱昔袁盎諌漢文帝曰淮南王若道路遇霜露死陛下有殺弟之名文帝不用追悔無及見十四卷文帝六年彭城王義康先朝之愛子朝直遥翻陛下之次弟若有迷謬之愆正可數之以善惡數所具翻導之以義方奈何信疑似之嫌一旦黜削逺送南垂草萊黔首皆為陛下痛之為于偽翻下竊為同廬陵徃事足為龜鑑見百二十卷元年恐義康年窮命盡奄忽于南臣雖微賤竊為陛下羞之陛下徒知惡枝之宜伐豈知伐枝之傷樹伏願亟召義康返于京甸兄弟協和君臣輯睦則四海之望塞多言之路絶矣塞悉則翻何必司徒公揚州牧然後可以置彭城王哉若臣所言於國為非請伏重誅以謝陛下表奏即收付建康獄賜死裴子野論曰夫在上為善若雲行雨施施式智翻萬物受其賜及其惡也若天裂地震萬物所驚駭其誰弗知其誰弗見豈戮一人之身鉗一夫之口所能攘逃所能弭滅哉是皆不勝其忿怒而有増于疾疹也勝音升疹丑刃翻以太祖之含𢎞尚掩耳于彭城之戮自斯以後誰易由言鄭𤣥曰由用也易以䜴翻有宋累葉罕聞直諒豈骨鯁之氣俗愧前古抑時王刑政使之然乎張約隕于權臣事見百二十卷元年扶育斃于哲后宋之鼎鑊吁可畏哉魏新興王俊荒淫不法三月庚戌降爵為公俊母先得罪死俊積怨望有逆謀事覺賜死辛亥魏賜郁乆閭乞列歸爵為朔方王沮渠萬年為張掖王十六年魏擒乞列歸沮渠萬年亦以是年以姑臧降魏夏四月沮渠唐兒叛沮渠無諱無諱留從弟天周守酒泉從才用翻與弟宜得引兵擊唐兒唐兒敗死魏以無諱終為邉患庚辰遣鎮南將軍奚眷擊酒泉秋八月辛亥魏遣散騎侍郎張偉來聘九月戊戌魏永昌王健卒冬十一月戊子王球卒己亥以丹楊尹孟顗為尚書僕射顗魚豈翻酒泉城中食盡萬餘口皆餓死沮渠天周殺妻以食戰士食祥吏翻庚子魏奚眷㧞酒泉獲天周送平城殺之沮渠無諱乏食且畏魏兵之盛乃謀西度流沙遣其弟安周西擊鄯善鄯善王欲降鄯上扇翻降戸江翻㑹魏使者至勸令拒守安周不能克退保東城鄯善國之東城也氐王楊難當傾國入冦謀據蜀土遣其建忠將軍苻冲出東洛以禦梁州兵五代志義城郡景谷縣舊白水縣也後周省東洛郡入焉子按白水縣漢屬廣漢晉屬梓潼時屬晉壽則東洛在晉壽界也梁秦二州刺史劉真道擊冲斬之真道懐敬之子也劉懐敬見一百一十一卷晉安帝隆安三年難當攻拔葭萌獲晉壽太守申坦遂圍涪城涪音浮巴西梓潼二郡太守劉道錫嬰城固守難當攻之十餘日不克乃還道錫道産之弟也十二月癸亥詔龍驤將軍裴方明等帥甲士三千人又發荆雍二州兵以討難當皆受劉真道節度裴方明益州之良將也程道養趙廣之亂屢有戰功故用之為明年平仇池張本驤思將翻帥讀曰率雍於用翻晉寧太守爨松子反寧州刺史徐循討平之晉惠帝永安二年分建寧西七縣為益州郡至懐帝更名晉寧郡天門蠻田向求等反破漊中沈約曰漊中縣二漢無晉太康地志有疑是吳立屬天門郡漊郎矦翻荆州刺史衡陽王義季遣行參軍曹孫念討破之魏寇謙之言於魏主曰今陛下以真君御世建静輪天宫之法開古以來未之有也應登受符書以彰聖徳帝從之資治通鑑卷一百二十三
