body:
  text: 資治通鑑卷一百九十九宋司馬光撰胡三省音註唐紀十五起著雍涒灘四月盡旃䝉單閼九月凡七年有竒太宗文武大聖大廣孝皇帝下之下貞觀二十二年觀古玩翻夏四月丁巳右武候將軍梁建方擊松外蠻破之松外諸蠻依阻山谷亦屬古南中之地蓋以其在松州之外而得名也新志松外蠻在嶲州昌明縣徼外初嶲州都督劉伯英上言松外諸蠻蹔降復叛請出師討之以通西洱天竺之道此即漢武帝欲通之道而為昆明所蔽者也嶲州漢邛都夷之地武帝開置越嶲郡後周武帝置嚴州唐為嶲州嶲音髓上時掌翻蹔與暫同降户江翻復扶又翻洱乃吏翻勑建方發巴蜀十二州兵討之十二州益眉榮梓利綿遂巴盧渠逹集渝也蠻酋雙舍帥衆拒戰酋慈由翻帥讀曰率下同建方擊敗之敗補邁翻殺獲千餘人羣蠻震懾亡竄山谷建方分遣使者諭以利害懾之渉翻使䟽吏翻皆來歸附前後至者七十部户十萬九千三百建方署其酋長蒙和等為縣令長知兩翻下同各統所部莫不感悦因遣使詣西洱河新書曰西洱河蠻道由郎州走三千里時建方自嶲州道千五百里遣竒兵奄至其地其帥楊盛大駭具船將遁使者曉諭以威信盛遂請降帥所類翻降户江翻其地有楊李趙董等數十姓各據一州大者六百小者二三百户無大君長不相統壹語雖小訛其生業風俗大略與中國同自云本皆華人其所異者以十二月為歲首己未契丹辱紇主曲據帥衆内附奚契丹酋領皆稱為辱紇主契欺訖翻又音喫帥讀曰率以其地置𤣥州以曲據為刺史𨽻營州都督府甲子烏胡鎮將古神感烏胡鎮當置於海中烏胡島自登州東北海行過大謝島龜歆島淤島而後至烏胡島又三百里北渡烏湖海姓譜周太王去邠適岐稱古公因氏焉將兵浮海擊髙麗遇髙麗歩騎五千戰於易山破之易山新書作曷山將即亮翻麗力知翻騎竒寄翻其夜髙麗萬餘人襲神感船神感設伏又破之而還還從宣翻又如字初西突厥乙毘咄陸可汗厥九勿翻咄當沒翻可從刋入聲汗音寒以阿史那賀魯為葉䕶居多邏斯水在西州北千五百里邏郎佐翻統處月處宻始蘇歌邏禄失畢五姓之衆乙毘咄陸奔吐火羅見一百九十六卷十六年乙毘射匱可汗遣兵迫逐之部落亡散乙亥賀魯帥其餘衆數千帳内屬詔處之於庭州莫賀城庭州西延城西六十里有沙鉢城守捉蓋即莫賀城也以賀魯後立為沙鉢羅葉䕶可汗故改城名也處昌吕翻拜左驍衛將軍驍堅堯翻賀魯聞唐兵討龜茲請為鄉導龜茲音丘慈鄉讀曰嚮仍從數十騎入朝朝直遥翻上以為崑丘道行軍總管厚宴賜而遣之為賀魯後叛張本五月庚子右衛率長史王𤣥䇿擊帝那伏帝王阿羅那順大破之東宫十率府各有長史正七品上新書作那伏帝阿羅那順無王字率所律翻初中天竺王尸羅逸多兵最彊四天竺皆臣之天竺國漢身毒國也或曰摩伽陀或曰婆羅門去京師九千六百里居蔥嶺南幅員三萬里分東西南北中五天竺南天竺瀕海北天竺距雪山東天竺際海與扶南林邑接西天竺與􅄢賔波斯接中天竺在四天竺之㑹都城曰茶餺和羅城杜佑曰天竺塞種也顔師古曰塞釋也𤣥䇿奉使至天竺諸國皆遣使入貢㑹尸羅逸多卒國中大亂其臣阿羅那順自立𤼵胡兵攻𤣥䇿𤣥䇿帥從者三十人與戰使䟽吏翻卒子恤翻帥讀曰率從才用翻力不敵悉為所擒阿羅那順盡掠諸國貢物𤣥䇿脱身宵遁抵吐蕃西境以書徵鄰國兵吐蕃遣精鋭千二百人泥婆國遣七千餘騎赴之泥婆羅國直吐蕃之西樂陵川臣於吐蕃吐從暾入聲騎竒寄翻𤣥䇿與其副蔣師仁帥二國之兵進至中天竺所居茶餺和羅城帥讀曰率餺音博新書曰茶餺和羅城濱伽毘黎河連戰三日大破之斬首三千餘級赴水溺死者且萬人溺奴狄翻阿羅那順棄城走更收餘衆還與師仁戰又破之擒阿羅那順餘衆奉其妃及王子阻乾陀衛江水經注曰崑崙山釋氏曰阿耨逹山河水出其東北陬屈從其東南流注于蒲昌海自蒲昌海潛行地下南出積石而為中國河其崑崙山西有大水出焉曰新頭河西南流逕烏長國又東南流逕中天竺國亦曰恒河又西逕四大塔北又西逕陀衛國北所謂乾陀衛江蓋即此也師仁進擊之衆潰獲其妃及王子虜男女萬二千人於是天竺響震城邑聚落降者五百八十餘所降户江翻俘阿羅那順以歸以𤣥䇿為朝散大夫唐制文散階朝散大夫從五品下朝直遥翻散悉亶翻六月乙丑以白霫部為居延州霫而立翻癸酉特進宋公蕭瑀卒太常議諡曰徳尚書議諡曰肅周公諡法剛徳克就曰肅諡時利翻上曰諡者行之迹當得其實行下孟翻可諡曰貞褊公賀琛諡法直道不橈曰貞儉嗇無徳曰褊心隘政急曰褊子鋭嗣尚上女襄城公主上欲為之營第為于偽翻公主固辭曰婦事舅姑當朝夕侍側若居别第所闕多矣上乃命即瑀第而營之上以髙麗困弊議以明年發三十萬衆一舉滅之或以為大軍東征須備經歲之糧非畜乘所能載宜具舟艦為水運隋末劒南獨無宼盗屬者遼東之役劒南復不預及畜許救翻乗繩證翻艦户黯翻屬之欲翻復扶又翻其百姓富庶宜使之造舟艦上從之秋七月遣右領左右府長史强偉領左右府亦分為左右各有長史此即左右千牛府也强其兩翻姓也於劒南道伐木造舟艦大者或長百尺其廣半之别遣使行水道長直亮翻行下孟翻自巫峽抵江揚趣萊州趣七喻翻庚寅西突厥相屈利啜請帥所部從討龜茲相息亮翻屈居勿翻啜陟劣翻帥讀曰率初左武衛將軍武連縣公武安李君羡直𤣥武門武連縣時屬始州始州後改劒州武安縣漢屬魏郡晉屬廣平郡後周隋屬洺州左右武衛将軍乃南牙諸衛将軍直𤣥武門則掌北門宿衛時太白屢晝見太史占云女主昌民間又傳秘記云唐三世之後女主武王代有天下上惡之見賢遍翻惡烏路翻下深惡同㑹與諸武臣宴宫中行酒令行酒令者一人為令伯餘人以次行之下文使各言小名即酒令也使各言小名君羡自言名五娘上愕然因笑曰何物女子乃爾勇健又以君羡官稱封邑皆有武字深惡之後出為華州刺史華户化翻有布衣貟道信自言能絶粒曉佛法君羡深敬信之數相從屛人語貟音運姓也數所角翻屏必郢翻御史奏君羡與妖人交通謀不軌妖於喬翻壬辰君羡坐誅籍沒其家上宻問太史令李淳風秘記所云信有之乎對曰臣仰稽天象俯察厯數其人已在陛下宫中為親屬自今不過三十年當王天下王于况翻殺唐子孫殆盡其兆既成矣上曰疑似者盡殺之何如對曰天之所命人不能違也王者不死徒多殺無辜且自今以徃三十年其人已老庶㡬頗有慈心為禍或淺㡬居希翻今借使得而殺之天或生壯者肆其怨毒恐陛下子孫無遺類矣上乃止司空梁文昭公房𤣥齡留守京師守手又翻疾篤上徵赴玉華宫肩輿入殿至御座側乃下相對流涕因留宫下聞其小愈則喜形於色加劇則憂悴悴秦醉翻𤣥齡謂諸子曰吾受主上厚恩今天下無事唯東征未已羣臣莫敢諌吾知而不言死有餘責乃上表諌上時掌翻以為老子曰知足不辱知止不殆陛下功名威徳亦可足矣拓地開疆亦可止矣且陛下毎决一重囚必令三覆五奏進素膳止音樂者見一百九十三卷五年重人命也今驅無罪之士卒委之鋒刄之下使肝腦塗地獨不足愍乎明謹用刑重人命也踴躍用兵則忘人命之為重矣引彼形此𤣥齡之言可謂深切著明向使髙麗違失臣節誅之可也侵擾百姓滅之可也它日能為中國患除之可也今無此三條而坐煩中國内為前代雪恥外為新羅報讎豈非所存者小所損者大乎説到此分明見得髙麗不必征當時在朝之臣諌東征者未有能及此者也此是忠誠懇切中流出為于偽翻願陛下許髙麗自新焚陵波之船罷應募之衆自然華夷慶賴逺肅邇安臣且夕入地儻蒙録此哀鳴論語曾子有疾孟敬子問之曾子言曰鳥之將死其鳴也哀人之將死其言也善死且不朽𤣥齡子遺愛尚上女髙陽公主上謂公主曰彼病篤如此尚能憂我國家上自臨視握手與訣悲不自勝勝音升癸卯薨柳芳曰𤣥齡佐太宗定天下及終相位凡三十二年天下號為賢相相息亮翻然無跡可尋徳亦至矣故太宗定禍亂而房杜不言功王魏善諫諍而房杜讓其賢英衛善將兵而房杜行其道新賛作房杜濟以文將即亮翻理致太平善歸人主為唐宗臣宜哉八月己酉朔日有食之丁丑勑越州都督府及婺洪等州造海船及雙舫千一百艘東陽郡隋平陳置婺州舫甫妄翻艘蘇遭翻辛未遣左領軍大將軍執失思力出金山道擊薛延陁餘宼九月庚辰崑丘道行軍大總管阿史那社爾擊處月處宻破之餘衆悉降降户江翻癸未薛萬徹等伐髙麗還還從宣翻又如字萬徹在軍中使氣陵物裴行方奏其怨望坐除名流象州裴行方副萬徹東伐見上卷上年象州漢潭中中溜縣之地隋為始安郡桂林縣唐武徳四年置象州桂林郡以象山名州己丑新羅奏為百濟所攻破其十三城己亥以黄門侍郎褚遂良為中書令强偉等發民造船役及山獠雅邛眉三州獠友强其兩翻卭渠容翻獠魯皓翻壬寅遣茂州都督張士貴右衛將軍梁建方發隴右峽中兵二萬餘人以擊之蜀人苦造船之役或乞輸直雇潭州人造船上許之州縣督迫嚴急民至賣田宅鬻子女不能供榖價踊貴劒外騷然自劒門關以南謂之劒外内京師而外諸夏也上聞之遣司農少卿長孫知人馳驛往視之知人奏稱蜀人脆弱不耐勞劇脆此芮翻大船一艘庸絹二千二百三十六匹山谷已伐之木挽曵未畢復徵船庸艘蘇遭翻復扶又翻二事倂集民不能堪宜加存養上乃勑潭州船庸皆從官給冬十月癸丑車駕還京師回紇吐迷度兄子烏紇蒸其叔母紇下沒翻烏紇與俱陸莫賀逹官俱羅勃皆突厥車鼻可汗之壻也相與謀殺吐迷度以歸車鼻烏紇夜引十餘騎襲吐迷度殺之燕然副都䕶元禮臣使人誘烏紇許奏以為瀚海都督烏紇輕騎詣禮臣謝禮臣執而斬之以聞燕因肩翻誘音酉騎竒寄翻上恐回紇部落離散遣兵部尚書崔敦禮往安撫之乆之俱羅勃入見上留之不遣回紇由是又㣲見賢遍翻阿史那社爾既破處月處宻引兵自焉耆之西趣龜茲北境趣七喻翻分兵為五道出其不意焉耆王薛婆阿那支棄城奔龜茲保其東境社爾遣兵追擊擒而斬之十六年郭孝恪破焉耆立栗婆凖為王而阿那支殺之今也罪人斯得立其從父弟先那凖為焉耆王新書曰立突騎支弟婆伽利為王此從舊書從才用翻使修職貢龜茲大震守將多棄城走社爾進屯磧口去其都城三百里磧口新舊書作磧石龜茲都伊邏盧城北倚白山亦曰阿羯田山将即亮翻磧七迹翻遣伊州刺史韓威帥千餘騎為前鋒帥讀曰率下同騎竒寄翻右衛將軍曹繼叔次之至多褐城龜茲王訶利布失畢其相那利羯獵顛帥衆五萬拒戰相息亮翻羯居謁翻鋒刃甫接威引兵偽遁龜茲悉衆追之行三十里與繼叔軍合龜茲懼將却繼叔乘之龜茲大敗逐北八十里甲戍以回紇吐迷度子前左屯衛大將軍婆閏為左驍衛大將軍大俟利發瀚海都督驍堅堯翻俟渠之翻考異曰舊回紇傳云詔西突厥可汗阿史那賀魯統五啜五俟斤二十餘部居多羅斯水南去西州馬行十五日程回紇不肯西屬突厥按賀魯時為将軍自多羅斯水入居庭州永徽二年乃西遁自稱可汗所統咄陸五啜弩失畢五俟斤唐末嘗以回紇𨽻之也今不取十一月庚子契丹帥窟哥奚帥可度者並帥所部内屬帥所類翻下别帥同並帥讀曰率以契丹部為松漠府杜佑曰松漠之地在柳城郡之北以窟哥為都督又以其别帥逹稽等部為峭落等九州各以其辱紇主為刺史峭落州無逢州羽陵州白連州徒何州萬丹州疋黎州赤山州并松漠府為九州峭七笑翻以奚部為饒樂府以可度者為都督樂音洛又以其别帥阿㑹等部為弱水等五州亦各以其辱紇主為刺史弱水州祁黎州洛壞州太魯州渇野州辛丑置東夷校尉官於營州校户教翻十二月庚午太子為文徳皇后作大慈恩寺成西京雜記西京外城朱雀街東第三橋皇城之東第一街進業坊隋無漏寺之故基太子即其地建寺為文徳皇后祈福竹木森邃為京城觀游之最雍録曰慈恩寺在朱雀街東第三街自北次南第十五坊名曰進昌坊寺南臨黄渠竹木森邃為于偽翻社龜兹王布失畢既敗走保都城阿史那社爾進軍逼之布失畢輕騎西走社爾拔其城使安西都䕶郭孝恪守之沙州刺史蘇海政尚輦奉御薛萬備帥精騎追布失畢行六百里布失畢窘急保撥換城自安西府西出柘厥闗渡白馬河四百餘里至撥換城騎竒寄翻帥讀曰率爾進軍攻之四旬閏月丁丑拔之擒布失畢及羯獵顛那利脱身走濳引西突厥之衆并其國兵萬餘人襲擊孝恪孝恪營於城外龜茲人或告之孝恪不以為意那利奄至孝恪帥所部千餘人將入城那利之衆已登城矣城中降胡與之相應降户江翻下同共擊孝恪矢刃如雨孝恪不能敵將復出復扶又翻下利復同死於西門城中大擾倉部郎中崔義超倉部郎掌判天下倉儲受納租税出給禄廩之事屬户部義超以是官從軍召募得二百人衛軍資財物與龜茲戰於城中曹繼叔韓威亦營於城外自城西北隅擊之那利經宿乃退斬首三千餘級城中始定後旬餘日那利復引山北龜兹萬餘人趣都城山北蓋白山之北也趣七喻翻繼叔逆擊大破之斬首八千級那利單騎走龜茲人執之以詣軍門阿史那社爾前後破其大城五遣左衛郎將權袛甫詣諸城開示禍福皆相帥請降帥讀曰率降户江翻凡得七百餘城虜男女數萬口社爾乃召其父老宣國威靈諭以伐罪之意立其王之弟葉䕶為王龜茲人大喜西域震駭西突厥于闐安國爭饋駝馬軍糧闐徒賢翻又徒見翻社爾勒石紀功而還還從宣翻又如字戊寅以崑丘道行軍總管左驍衛將軍阿史那賀魯為泥伏沙鉢羅葉䕶賜以鼓纛使招討西突厥之未服者假賀魯以羽翼正速其叛耳驍堅堯翻纛徒到翻癸未新羅相金春秋及其子文王入見相息亮翻見賢遍翻春秋真徳之弟也上以春秋為特進文王為左武衛將軍春秋請改章服從中國内出冬服賜之二十三年春正月辛亥龜茲王布失畢及其相那利等至京師上責讓而釋之以布失畢為左武衛中郎將龜茲音丘慈又音屈佳將即亮翻中考異曰實録云左武衛翊衛中郎将舊𫝊為武翊衛郎將按㑹要武徳五年改左右翊衛為左右衛然則於時已無翊衛之名且布失畢必不獨兼兩衛之官今去翊衛字按唐六典左右衛有親勲翊三衛中郎將其餘諸衛府各有翊衛中郎将翊衛二字恐不可去西南徒莫袛等蠻内附以其地為傍望覽丘四州𨽻郎州都督府徒莫袛蠻在爨蠻之西郎州當作朗州武徳元年開南中仍舊置南寕州貞觀八年改為郎州以其地本夜郎國也上以突厥車鼻可汗不入朝遣右驍衛郎將髙侃𤼵回紇僕骨等兵襲擊之兵入其境諸部落相繼來降拔悉宻吐屯肥羅察降以其地置新黎州舊書云車鼻長子羯漫陀先統拔悉密部遣其子菴鑠入朝帝嘉之為置新黎州朝直遥翻降户江翻考異曰髙宗實録云初突厥車鼻可汗遣其子車鉢羅入貢太宗遣使徵之不至太宗大怒遣右驍衛郎將髙侃引回紇僕骨等兵襲擊之其下諸部落相次歸降其子羯漫陀先統拔悉宻部泣諌其父請歸國車鼻不聼羯漫陀遂背父來降以其地為新黎州舊傳云二十三年遣右驍衛郎將髙侃潛引回紇僕骨等兵衆襲撃之其酋長歌邏禄泥執闕俟利𤼵乃拔塞匐處木昆莫賀咄俟斤等帥部落背車鼻相繼來降車鼻長子羯漫陀先統拔悉宻部車鼻未敗前遣其子菴鑠入朝太宗嘉之拜左屯衛将軍更置新黎州以統其衆今從太宗實録二月丙戍置瑶池都督府此因穆天子𫝊西王母觴天子於瑶池之上而名之也𨽻安西都䕶戊子以左衛將軍阿史那賀魯為瑶池都督三月丙辰置豐州都督府使燕然都䕶李素立兼都督去冬旱至是始雨辛酉上力疾至顯道門外赦天下丁卯勑太子於金液門聼政按唐六典城門郎掌京城皇城宫殿諸門明徳等門為京城門朱雀等門為皇城門承天等門為宫城門嘉徳等門為宫門太極等門為殿門通内諸門並同上閤門顯道金液其亦通内諸門之門歟圖志不能盡載耳夏四月乙亥上行幸翠㣲宫上謂太子曰李世勣才智有餘然汝與之無恩恐不能懐服我今黜之若其即行俟我死汝於後用為僕射新任之若徘徊顧望當殺之耳五月戊午以同中書門下三品李世勣為疊州都督世勣受詔不至家而去史言太宗以機數御李世勣世勣亦以機心而事君杜佑曰疊州去京師千三百四十里孫愐曰疊州自秦至魏諸𦍑據焉周武帝逐諸𦍑乃置疊州蓋以山重疊名之辛酉開府儀同三司衛景武公李靖薨上苦利增劇太子晝夜不離側離力智翻或累日不食髪有變白者上泣曰汝能孝愛如此吾死何恨丁卯疾篤召長孫無忌入含風殿含風殿在翠㣲宫上臥引手捫無忌頥無忌哭悲不自勝勝音升上竟不得有所言因令無忌出己巳復召無忌及褚遂良入臥内復扶又翻謂之曰朕今悉以後事付公軰太子仁孝公軰所知善輔導之謂太子曰無忌遂良在汝勿憂天下又謂遂良曰無忌盡忠於我我有天下多其力也我死勿令䜛人間之武許之間二臣玉几之命猶在髙宗之耳何遽忘之邪間古莧翻仍令遂良草遺詔有頃上崩年五十有三太子擁無忌頸號慟將絶無忌攬涕請處分衆事以安内外太子哀號不已號户髙翻處昌吕翻分扶問翻無忌曰主上以宗廟社稷付殿下豈得效匹夫唯哭泣乎乃秘不發䘮庚午無忌等請太子先還飛騎勁兵及舊將皆從騎竒寄翻将即亮翻從才用翻辛未太子入京城大行御馬輿侍衛如平日繼太子而至頓於兩儀殿以太子左庶子于志寧為侍中少詹事張行成兼侍中以檢校刑部尚書右庶子兼吏部侍郎髙季輔兼中書令壬申𤼵䘮於太極殿宣遺詔太子即位太極殿西内正朝於此𤼵䘮太子於柩前即位軍國大事不可停闕平常細務委之有司諸王為都督刺史者並聼奔䘮濮王泰不在來限罷遼東之役及諸土木之功四夷之人入仕於朝及來朝貢者數百人聞䘮皆慟哭翦髪􅋇面割耳流血灑地朝直遥翻􅋇里之翻六月甲戌朔髙宗即位赦天下丁丑以疊州都督李勣為特進檢校洛州刺史洛陽宫留守李世勣去世字避太宗二名也守手又翻先是太宗二名令天下不連言者勿避先悉薦翻至是始改官名犯先帝諱者孔頴逹曰曲禮卒哭乃諱注云敬鬼神之名也諱避也生者不相避名衛候名惡大夫有名惡君臣同名春秋不非按昭七年衛候惡卒榖梁𫝊云昭元年有衛齊惡今衛候惡所謂君臣同名也君子不奪人親所名也癸未以長孫無忌為太尉兼檢校中書令知尚書門下二省事無忌固辭知尚書省事帝許之仍令以太尉同中書門下三品唐制三公正一品無忌既為太尉而令同中書門下三品當時朝議之失也癸巳以李勣為開府儀同三司同中書門下三品阿史那社爾之破龜茲也行軍長史薛萬備請因兵威説于闐王伏闍信入朝説輪芮翻闍視遮翻朝直遥翻社爾從之秋七月己酉伏闍信隨萬備入朝詔入謁梓宫八月癸酉夜地震晉州尤甚壓殺五千餘人庚寅𦵏文皇帝于昭陵昭陵在京兆醴泉縣西北六十里九􅉄山廟號太宗自唐太宗後為臣子者率稱其君之廟號豈非子孫臣民亦病其謚號太多非實而古者袓有功宗有徳之義㣲乎阿史那社爾契苾何力請殺身殉𦵏上遣人諭以先㫖不許蠻夷君長為先帝所擒服者頡利等十四人皆琢石為其像刻名列於北司馬門内丁酉禮部尚書許敬宗奏𢎞農府君廟應毁𢎞農府君魏𢎞農太守重耳也於髙宗為七世祖親盡應毁請藏主於西夾室從之太廟有東西夾室夾太室兩旁故謂之夾室九月乙卯以李勣為左僕射行先帝之治命也冬十月以突厥諸部置舍利等五州𨽻雲中都督府五州舍利州思辟州阿史那州綽州白登州蘇農等六州𨽻定襄都督府史只載蘇農州阿徳州執失州拔延州餘二州逸乙亥上問大理卿唐臨繋囚之數對曰見囚五十餘人見賢遍翻唯二人應死上悦上嘗録繫囚前卿所處者多號呼稱寃臨所處者獨無言上怪問其故囚曰唐卿所處本自無寃號户髙翻處昌吕翻上歎息良乆曰治獄者不當如是邪治直之翻上以吐蕃賛普弄讃為駙馬都尉漢武帝置三都尉曰奉車都尉曰駙馬都尉曰騎都尉唐以騎都尉為勲官駙馬都尉以授尚主者奉車都尉不復除授封西海郡王賛普致書于長孫無忌等云天子初即位臣下有不忠者當勒兵赴國討除之吐蕃以太宗晏駕固有輕中國之心矣十二月詔濮王泰開府置僚屬車服珍膳特加優異髙宗天皇大聖大𢎞孝皇帝上之上諱治字為善小字雉奴太宗第九子也文明元年諡曰天皇大帝廟號髙宗天寳八年加尊號髙宗天皇大聖皇帝十三載加尊號髙宗天皇大聖大𢎞孝皇帝永徽元年春正月辛丑朔改元丙午立妃王氏為皇后后思政之孫也王思政為西魏守頴川沒於東魏以后父仁祐為特進魏國公己未以張行成為侍中辛酉上召朝集使朝直遥翻使䟽吏翻謂曰朕初即位事有不便於百姓者悉宜陳不盡者更封奏自是日引刺史十人入閤問以百姓疾苦及其政治治直吏翻有洛陽人李𢎞泰誣告長孫無忌謀反上命立斬之無忌與褚遂良同心輔政上亦尊禮二人恭已以聼之以帝之尊任二人如此武后譛而去之雖墜諸淵不悔也哲婦之為鴟梟也尚矣故永徽之政百姓阜安有貞觀之遺風觀古玩翻太宗女衡山公主應適長孫氏有司以為服既公除欲以今秋成昏于志寧上言漢文立制本為天下百姓公主服本斬衰上時掌翻為于偽翻衰倉回翻縱使服隨例除豈可情隨例改請俟三年䘮畢成昏上從之二月辛卯立皇子孝為許王上金為杞王素節為雍王帝後宫鄭生孝楊生上金蕭淑妃生素節雍於用翻夏五月壬戍吐蕃賛普弄讃卒卒子恤翻其嫡子早死立其孫為賛普賛普幼弱政事皆决於國相禄東賛相息亮翻禄東賛性明逹嚴重行兵有法吐蕃所以彊大威服氐𦍑皆其謀也六月髙侃擊突厥至阿息山車鼻可汗召諸部兵皆不赴與數百騎遁去侃帥精騎追至金山擒之以歸其衆皆降騎竒寄翻帥讀曰率降户江翻初阿史那爾虜龜茲王布失畢立其弟為王事見太宗貞觀二十六年唐兵既還其酋長爭立更相攻擊酋慈由翻長知兩翻更工衡翻秋八月壬午詔復以布失畢為龜茲王復扶又翻遣歸國撫其衆九月庚子髙侃執車鼻可汗至京師釋之拜左武衛將軍處其餘衆於鬱督軍山處昌吕翻置狼山都督府以統之以髙侃為衛將軍唐無衛將軍衛字之上須有脱字於是突厥盡為封内之臣分置單于瀚海二都䕶府單于領狼山雲中桑乾三都督蘇農等一十四州瀚海領瀚海金徽新黎等七都督仙蕚等八州各以其酋長為刺史都督新書作蘇農二十四州舊書作一十四州又攷是後調露元年温傅奉職二部反二十四州皆叛應之則二字為是然單于都䕶府所領見於史者蘇農等四州舍利等五州及桑乾府所領郁射藝失畢失叱略等四州呼延府所領賀魯葛邏􅎤跌等三州財十九州耳其五州逸無所攷又有定襄呼延二都督而無狼山都督是其廢置離合不可詳也狼山府顯慶三年廢為州金徽當作金㣲瀚海都䕶府領瀚海金㣲新黎幽陵龜林堅昆六都督府其一逸仙蕚浚稽余吾稽落居延寘顔榆溪渾河燭龍凡八州宋白曰振武軍舊為單于都䕶府即漢定襄郡之盛樂縣也在隂山之陽黄河之北西南至東受降城百二十里瀚海都䕶後移於回紇本部乾音干癸亥上出畋遇雨問諌議大夫昌樂谷那律曰油衣若為則不漏炙轂子曰惟絹油之製及㡌油陳始有之樂音洛對曰以瓦為之必不漏上悦為之罷獵悦為之為于偽翻獵考異曰舊書那律𫝊云嘗從太宗出在塗遇雨有此語意欲太宗不為畋獵太宗悦賜帛二百段唐録政要髙宗出獵有此月日唐統紀亦在此年今從之李勣固求解職冬十月戊辰解勣左僕射以開府儀同三司同中書門下三品己未監察御史陽武韋思謙陽武縣漢屬河南郡自晉以來屬榮陽郡監工銜翻劾奏中書令褚遂良抑買中書譯語人地中書掌受四方朝貢及通表疏故有譯語人劾户槩翻又户得翻大理少卿張叡冊以為准估無罪思謙奏曰佑價之設備國家所須臣下交易豈得准佑為定估音古叡冊舞文附下罔上罪當誅是日左遷遂良為同州刺史叡冊循州刺史思謙名仁約以字行十二月庚午梓州都督謝萬歲兖州都督謝法興與黔州都督李孟嘗討琰州叛獠梓州當作牂州武徳三年牂柯蠻酋謝龍羽降以其地置牂州兖州當作充州武徳三年以牂柯蠻别部置琰州亦蠻州貞觀四年置皆屬黔州都督府黔音琴獠魯皓翻萬歲法興入洞招慰為獠所殺二年春正月乙巳以黄門侍郎宇文節中書侍郎柳奭並同中書門下三品奭亨之兄子柳亨西魏尚書左僕射慶之孫竇誕之壻也亨妻即襄陽公主之女王皇后之舅也左驍衛將軍瑶池都督阿史那賀魯驍堅堯翻招集離散廬帳漸盛聞太宗崩謀襲取西庭二州庭州刺史駱𢎞義知其謀表言之上遣通事舍人橋寳明馳往慰撫寳明説賀魯令長子咥運入宿衛授右驍衛中郎將尋復遣歸咥運乃説其父擁衆西走説輸芮翻復扶又翻擊破乙毘射匱可汗倂其衆建牙于雙河及千泉自雙河西南抵賀魯牙帳二百里千泉屬石國界又在賀魯牙帳西南新書曰素葉城西四百里至千泉地贏二百里南雪山三垂平陸多泉地因名之自號沙鉢羅可汗咄陸五啜弩失畢五俟斤皆歸之勝兵數十萬咄當沒翻啜歩劣翻俟渠之翻勝音升與乙毘咄陸可汗連兵處月處宻及西域諸國多附之以咥運為莫賀咄葉䕶咥徒結翻焉耆王婆伽利卒國人表請復立故王突騎支率子恤翻復扶又翻騎竒寄翻夏四月詔加突騎支右武衛將軍遣還國金州刺史滕王元嬰驕奢縱逸居亮隂中畋遊無節數夜開城門勞擾百姓或引彈彈人或埋人雪中以戲笑數所角翻引彈徒旦翻上賜書切讓之且曰取適之方亦應多緒晉靈荒君何足為則左𫝊晉靈公不君從䑓上彈人以觀其避丸朕以王至親不能致王於法今書王下上考以愧王心元嬰與蔣王惲皆好聚斂惲於粉翻好呼到翻斂力贍翻上嘗賜諸王帛各五百叚獨不及二王勑曰滕叔蔣兄自能經紀不湏賜物給麻兩車以為錢貫二王大慙秋七月西突厥沙鉢羅可汗寇庭州攻陷金嶺城及蒲類縣西州交河縣北行八十里入谷又百三十里經柳谷渡金沙嶺百六十里至庭州蒲類縣屬西州後屬庭州又改為後庭縣殺略數千人詔左武候大將軍梁建方右驍衛大將軍契苾何力為弓月道行軍總管弓月城在庭州西千有餘里右驍衛將軍髙徳逸右武候將軍薛孤吳仁為副發秦成岐雍府兵三萬人成州漢武都上禄下辨之地後魏置仇池郡漢陽郡南秦州西魏改曰成州雍州京兆郡雍於用翻及回紇五萬騎以討之紇下沒翻癸巳詔諸禮官學士議明堂制度以髙袓配五天帝太宗配五人帝五天帝注已見七十九卷晉武帝泰始二年五人帝東方帝太皥西方帝少皥南方帝炎帝北方帝顓頊中央帝黄帝八月己巳以于志寧為左僕射張行成為右僕射髙季輔為侍中志寧行成仍同中書門下三品己卯郎州白水蠻反寇麻州白水蠻與青蛉弄棟接𨽻郎州麻州貞觀二十二年分郎州置遣左領軍將軍趙孝袓等𤼵兵討之九月癸巳廢玉華宫為佛寺戊戌更命九成宫為萬年宫更工衡翻庚戌左武候引駕盧文操踰牆盗左藏物上以引駕職在紏繩左右武候掌宫中及京城晝夜巡警之法以執禦非違有引駕仗三衛六十人引駕快飛六十六人左右藏晉始有之唐因而不改各有令一人宋白曰唐制左右金吾有引駕仗百四十人以三衛人數充左藏掌邦國庫藏右藏掌國寳貨藏徂浪翻乃自為盗命誅之諌議大夫蕭鈞諫曰文操情實難原然法不至死上乃免文操死顧侍臣曰此真諫議也閏月長孫無忌等上所刪定律令式上時掌翻甲戌詔頒之四方上謂宰相曰聞所在官司行事猶互觀顔面多不盡公長孫無忌對曰此豈敢言無然肆情曲法實亦不敢至於小小收取人情恐陛下尚不能免無忌以元舅輔政凡有所言上無不嘉納冬十有一月辛酉上祀南郊癸酉詔自今京官及外州有獻鷹隼及犬馬者罪之隼息允翻戊寅特浪𦍑酋董悉奉求辟惠𦍑酋卜檐莫各帥種落萬餘户詣茂州内附特浪辟惠皆生𦍑也是年以其地置蓬魯等三十二州屬茂州都督府酋慈由翻檐余亷翻帥讀曰率種章勇翻竇州義州蠻酋李寳誠等反義州漢猛陵縣地梁置永業郡隋改為懐徳縣屬瀧州唐武徳五年置南義州貞觀二年曰義州桂州都督劉伯英討平之郎州道總管趙孝祖討白水蠻蠻酋秃磨蒲及儉彌于帥衆據險拒戰孝祖皆擊斬之會大雪蠻飢凍死亡略盡孝祖奏言貞觀中討昆州烏蠻始開青蛉弄棟為州縣昆州漢益州郡地隋置昆州以亂廢唐武徳初開南中復置柘東兩㸑蠻自曲州靖州西南昆川曲軛晉寧喻獻安寧距龍和城通謂之西㸑白蠻自彌鹿升麻二川南至歩頭謂之東㸑烏蠻青蛉漢武帝開為縣屬越嶲郡弄棟縣屬益州郡晉並屬雲南郡後屬興寧郡隋亂與中國絶唐以青蛉地置髳州弄棟地置裒川弄棟之西有小勃弄大勃弄二川勃弄屬漢永昌郡界唐武徳七年置南雲州貞觀八年更名匡州恒扇誘弄棟欲使之反恒户登翻其勃弄以西與黄𤓰葉榆西洱河相接葉榆亦漢武帝開為縣有葉榆澤屬益州郡後漢屬永昌郡晉屬雲南郡後分屬東河陽郡人衆殷實多於蜀川無大酋長好結讎怨好呼到翻今因破白水之兵請隨便西討撫而安之勑許之十二月壬子處月朱邪孤注殺招慰使單道惠邪音耶單音善與突厥賀魯相結是歲百濟遣使入貢上戒之使勿與新羅髙麗相攻不然吾將𤼵兵討汝矣三年春正月己未朔吐谷渾新羅髙麗百濟並遣使入貢癸亥梁建方契苾何力等大破處月朱邪孤注於牢山新書牢山亦曰賭蒲東北距烏徳犍山度馬行十五日孤注夜遁建方使副總管髙徳逸輕騎追之騎竒寄翻行五百餘里生擒孤注斬首九千級軍還御史劾奏梁建方兵力足以追討而逗留不進髙徳逸勑令市馬自取駿者劾户槩翻又戶得翻上以建方等有功釋不問大理卿李道裕奏言徳逸所取之馬筋力異常請實中廐中廐猶言内廐也上謂侍臣曰道裕法官進馬非其本職妄希我意豈朕行事不為臣下所信邪朕方自咎故不復黜道裕耳復扶又翻己巳以同州刺史褚遂良為吏部尚書同中書門下三品丙子上饗太廟丁亥饗先農躬耕籍田漢儀天子正月親耕籍田告祠先農先農即神農也祠以太牢百官皆從唐制天子以孟冬吉亥享先農而遂以耕籍二月甲寅上御安褔門樓唐六典長安皇城西面二門北曰安褔南曰順義安福西直京城之開逺門觀百戲乙卯上謂侍臣曰昨登樓欲以觀人情及風俗奢儉非為聲樂為于偽翻朕聞胡人善為擊鞠之戲鞠以韋為之實以柔物今謂之毬子嘗一觀之昨初升樓即有羣胡擊鞠意謂朕篤好之也好呼到翻帝王所為豈宜容易易以䜴翻朕已焚此鞠冀杜胡人窺望之情亦因以為誡三月辛巳以宇文節為侍中柳奭為中書令以兵部侍郎三原韓瑗守黄門侍郎同中書門下三品瑗于眷翻夏四月趙孝祖大破西南蠻斬小勃弄酋長歿盛擒大勃弄酋長楊承顛自餘皆屯聚保險大者有衆數萬小者數千人孝祖皆破降之降户江翻西南蠻遂定甲午澧州刺史彭思王元則薨澧音禮六月戊申遣兵部尚書崔敦禮等將并汾歩騎萬人往茂州茂州考之新舊志無之當置之於薛延陀故地将即亮翻𤼵薛延陀餘衆渡河置祁連州以處之秋七月丁巳立陳王忠為皇太子赦天下王皇后無子柳奭為后謀為于偽翻以忠母劉氏㣲賤勸后立忠為太子冀其親已外則諷長孫無忌等使請於上上從之乙丑以于志寧兼太子少師張行成兼少𫝊髙季輔兼少保丁丑上問户部尚書髙履行去年進戸多少户部尚書即民部尚書避太宗諱改焉進户新増進之户也少詩沼翻履行奏去年進户總一十五萬因問隋代及今日見户見賢遍翻履行奏隋開皇中户八百七十萬即今户三百八十萬即今猶言當今也唐人多有此語履行士亷之子也九月守中書侍郎來濟同中書門下三品冬十一月庚寅𢎞化長公主自吐谷渾來朝𢎞化公主貞觀十三年降吐谷渾慕容諾曷鉢長知兩翻癸巳濮王泰薨於均州濮博木翻散騎常侍房遺愛尚太宗女髙陽公主散悉亶翻騎竒寄翻公主驕恣甚房𤣥齡薨公主教遺愛與兄遺直異財既而反譖遺直遺直自言太宗深責讓主由是寵衰主怏怏不悦怏於兩翻㑹御史劾盗得浮屠辯機寳枕浮屠正號曰佛陀與浮屠音聲相近皆西方言其來轉為二音華言譯之則謂之諍覺言滅穢成明道為聖悟劾户槩翻又户得翻云主所賜主與辯機私通餉遺億計餉遺唯季翻更以二女子侍遺愛太宗怒腰斬辯機殺奴婢十餘人主益怨望太宗崩無戚容上即位主又令遺愛與遺直更相訟直更工衡翻遺愛坐出為房州刺史房州古房陵上庸地西魏置光遷國後周改曰遷州随改曰房州尋廢州為房陵郡唐復曰房州遺直為隰州刺史又浮屠智朂等數人私侍主主使掖庭令陳𤣥運伺宫省禨祥掖庭局令從七品下官者為之屬内侍省掌宫禁女工之事凡宫人名籍司其除附禨居希翻又其既翻先是駙馬都尉薛萬徹髙祖女丹陽公主下嫁薛萬徹先悉薦翻坐事除名徙寧州刺史入朝與遺愛欵昵朝直遥翻昵尼質翻對遺愛有怨望語且曰今雖病足坐置京師䑕輩猶不敢動因與遺愛謀若國家有變當奉司徒荆王元景為主元景女適遺愛弟遺則由是與遺愛往來元景嘗自言夢手把日月駙馬都尉柴令武紹之子也柴紹尚髙祖女平陽公主尚巴陵公主巴陵公主太宗之女除衛州刺史託以主疾留京師求醫因與遺愛謀議相結髙陽公主謀黜遺直奪其封爵使人誣告遺直無禮於己遺直亦言遺愛及主罪云罪盈惡稔恐累臣私門累力瑞翻上令長孫無忌鞫之令力丁翻長知兩翻更獲遺愛及主反狀司空安州都督吳王恪母隋焬帝女也恪有文武才太宗常以為類已欲立為太子無忌固爭而止事見一百九十七卷貞觀十七年由是與無忌相惡恪名望素髙為物情所向無忌深忌之欲因事誅恪以絶衆望遺愛知之因言與恪同謀冀如紇干承基得免死事見一百九十六卷一百九十七卷貞觀十七年四年春二月甲申詔遺愛萬徹令武皆斬元景恪髙陽巴陵公主並賜自盡上泣謂侍臣曰荆王朕之叔父吳王朕兄欲匄其死可乎匄居大翻兵部尚書崔敦以為不可乃殺之萬徹臨刑大言曰薛萬徹大健兒留為國家効死力豈不佳尚辰羊翻為于偽翻乃坐房遺愛殺之乎吳王恪且死罵曰長孫無忌竊弄威權構害良善宗社有靈當族滅不乆乙酉侍中兼太子詹事宇文節特進太常卿江夏王道宗左驍衛大將軍駙馬都尉執失思力髙祖女九江公主下嫁執失思力夏户雅翻驍堅堯翻並坐與房遺愛交通流嶺表節與遺愛親善及遺愛下獄節頗左右之下遐嫁翻左右讀曰佐佑江夏王道宗素與長孫無忌褚遂良不恊故皆得罪戊子廢恪母弟蜀王愔為庶人置巴州愔於今翻房遺直貶春州銅陵尉銅陵縣漢允吾縣地屬合浦郡宋置瀧潭縣屬新寧郡隋改為銅陵縣屬端州唐初屬春州萬徹弟萬備流交州罷房𤣥齡配饗鄭樵曰盤庚云兹予大享于先王爾袓其從與享之周制凡有功者祭于大蒸漢制祭功臣於庭生時侍燕於庭死則降在庭位謂之配饗開府儀同三司李勣為司空初林邑王范頭利卒卒子恤翻子真龍立大臣伽獨弑之盡滅范氏伽獨自立國人弗從乃立頭利之壻婆羅門為王國人咸思范氏復罷婆羅門復扶又翻立頭利之女為王女不能治國治直之翻有諸葛地者頭利之姑子也父為頭利所殺南奔真臘真臘一名吉蔑本扶南屬國去京師二萬七百里東距車渠西屬驃南瀕海北與道明接東北抵驩州貞觀初并扶南有其地大臣可倫翁定遣使迎而立之使䟽吏翻下同妻以女王妻七細翻衆然後定夏四月戊子遣使入貢秋九月壬戍右僕射北平定公張行成薨諡法純行不爽曰定甲戍以褚遂良為右僕射同中書門下三品如故仍知選事選湏絹翻冬十月庚子上幸驪山温湯乙巳還宫初睦州女子陳碩真吳孫權分丹陽立新安郡隋仁壽三年置睦州大業初廢州為遂安郡唐復為睦州以妖言惑衆妖於喬翻下同與妹夫章叔𦙍舉兵反自稱文佳皇帝以叔𦙍為僕射甲子夜叔𦙍帥衆攻桐廬陷之吳分富春立桐廬縣屬吳郡隋唐屬睦州九域志縣在州東一百五里頃安世曰桐廬縣魏黄初四年吳置以桐溪側有大桐樹垂條􅅯蓋旁䕃數畆逺望如廬因謂之桐廬帥讀曰率碩真撞鍾焚香撞直江翻引兵二千攻陷睦州及於潛於潛縣漢屬丹楊郡晉宋屬吳興郡梁陳屬錢唐郡隋唐屬杭州宋白曰吳越春秋秦徙大越鳥語之人寘之替闞駰十三州志替讀為潛吳録地理志縣西有替山舊替字無水至隋加水於如字進攻歙州不克歙音懾敕揚州刺史房仁裕𤼵兵討之碩真遣其黨童文寳將四千人寇婺州將即亮翻下同刺史崔義𤣥發兵拒之民間訛言碩真有神犯其兵者必滅族士衆兇懼兇許勇翻司功參軍崔𤣥籍曰功倉户兵法士參軍所謂州判司也起兵仗順猶且無成况憑妖妄其能乆乎義𤣥以𤣥籍為前鋒自將州兵繼之至下淮戍遇賊與戰左右以楯蔽義𤣥楯食尹翻義𤣥曰刺史避箭人誰致死命撤之於是士卒齊奮賊衆大潰斬首數千級聼其餘衆歸首歸首式又翻進至睦州境降者萬計降户江翻十一月庚戍房仁裕軍合獲碩真叔𦙍斬之餘黨悉平義𤣥以功拜御史大夫御史大夫天子耳目官也非以賞功厥後崔義𤣥承中宫㫖繩長孫無忌等豈不忝厥官哉癸丑以兵部尚書崔敦禮為侍中十二月庚子侍中蓨憲公髙季輔薨諡法博聞多能曰憲蓚音條是歲西突厥乙毗咄陸可汗卒其子頡苾逹度設號真珠葉䕶始與沙鉢羅可汗有隙與五弩失畢共撃沙鉢羅破之斬首千餘級五年春正月壬戍𦍑酋凍就内附以其地置劒州凍就特浪生𦍑卜樓大首領也劒州羈縻屬松州都督府三月戊午上行幸萬年宫考異曰實録戊午以下皆為二月按長厯二月丁丑朔無戊午戊午三月十二日也庚申加贈武徳功臣屈突通等十三人官初王皇后無子蕭淑妃有寵録考異曰新舊唐書或作蕭淑妃或作蕭良娣實皆作良娣廢王后詔亦曰良娣蕭氏按當時後宫位號無良娣名唯漢世太子宫有良娣疑髙宗在東宫時蕭為良娣及即位拜淑妃也王后疾之上之為太子也入侍太宗見才人武氏而悦之才人晉武帝所制爵視千石以下宋齊之時以為散職梁於九嬪之下置五職三職才人位列三職比駙馬都尉唐承隋制才人五人正五品太宗崩武氏隨衆感業寺為尼長安志曰貞觀二十三年五月太宗上僊其年即以安業坊濟度尼寺為靈寳寺盡度太宗嬪御為尼以處之程大昌曰以通鑑及長安志及吕大坊長安圖參定通鑑言武氏在感業寺長安志在安業寺惟此差不同然志能言寺之位置及始末則安業者是也忌日上詣寺行香見之武氏泣上亦泣王后聞之隂令武氏長髪長知兩翻勸上内之後宫欲以間淑妃之寵閒古莧翻武氏巧慧多權數初入宫卑辭屈體以事后后愛之數稱其美於上數所角翻未㡬大幸㡬居豈翻拜為昭儀后及淑妃寵皆衰更相與共譛之上皆不納昭儀欲追贈其父而無名故託以褒賞功臣而武士彠預焉為廢皇后淑妃張本彠一虢翻乙丑上幸鳯泉湯鳯泉湯在岐州郿縣乙巳還萬年宫夏四月大食發兵擊波斯波斯國居逹遏水之西距京師萬五千里而嬴東與吐火羅康接北鄰突厥可薩部西南皆瀕海其先波斯匿王大月氏别裔王因以姓又以為國號杜佑曰波斯國即條支之故地大月氏之别種其先有波斯匿王因以為號大食本波斯地隋大業中有波斯國人牧于俱紛摩地山有獸言曰山西三穴有利兵黑質而白文得之者王走視如言石文言當反乃詭衆裒亡命於恒曷水劫商旅保西鄙自王移黑石寳之國人往討皆大敗而還於是遂强殺波斯王伊嗣侯伊嗣侯之子卑路斯奔吐火羅大食兵去吐火羅發兵立卑路斯為波斯王而還閏月丙子以處月部置金滿州其地近古輪䑓屬北庭都䕶府丁丑夜大雨山水漲溢衝𤣥武門此萬年宫之𤣥武門也唐離宫諸門蓋略倣宫城之制宿衛士皆散走右領軍郎將薛仁貴曰唐制自左右衛至左右金吾衛其屬各有左右中郎將府有中郎將及左郎將右郎將將即亮翻安有宿衛之士天子有急而敢畏死乎乃登門桄大呼以警宫内桄枯黄翻門前横木也呼火故翻上遽出乘髙俄而水入寢殿水溺衛士及麟遊居人隋文帝於岐州之北置仁壽宫太業初置普潤縣義寕二年於宫獲白麟因分普潤於宫置麟遊縣仁壽宫唐改為九成宫又改曰萬年宫溺奴狄翻死者三千餘人壬辰新羅女王金真徳卒詔立其弟春秋為新羅王六月丙午恒州大水呼沱溢漂溺五千三百家恒户登翻沱徒河翻中書令柳奭以王皇后寵衰内不自安請解政事癸亥罷為吏部尚書秋七月丁酉車駕至京師戊戍上謂五品以上曰頃在先帝左右見五品以上論事或仗下面陳唐制常朝諸衛皆立仗仗下宰執諫官奏事或退上封事終日不絶上時掌翻豈今日獨無事邪何公等皆不言也冬十月雇雍州四萬一千人築長安外郭三旬而畢雇者以錢若物酬其功事不徒役其力也雍於同翻癸丑雍州參軍薛景宣上封事言漢惠帝城長安尋晏駕事見十二卷漢惠帝三年五年上時掌翻下同今復城之復扶又翻必有大咎于志寧等以景宣言渉不順請誅之上曰景宣雖狂妄若因上封事得罪恐絶言路遂赦之髙麗遣其將安固將髙麗靺鞨兵擊契丹麗力知翻將即亮翻靺鞨音末曷契欺訖翻又音喫松漠都督李窟哥禦之大敗髙麗於新城窟苦骨翻敗補邁翻是歲大稔洛州粟米斗兩錢半秔米斗十一錢秔音庚稲之不黎者王皇后蕭淑妃與武昭儀更相譛訴更工衡翻上不信后淑妃之語獨信昭儀后不能曲事上左右母魏國夫人柳氏及舅中書令柳奭入見六宫又不為禮武昭儀伺后所不敬者伺相吏翻必傾心與相結所得賞賜分與之由是后及淑妃動静昭儀必知之皆以聞於上后寵雖衰然上未有意廢也㑹昭儀生女后憐而弄之后出昭儀潛扼殺之覆之以被覆敷又翻上至昭儀陽歡笑發被觀之女已死矣即驚啼問左右左右皆曰皇后適來此上大怒曰后殺吾女昭儀因泣數其罪數所具翻后無以自明上由是有廢立之志又畏大臣不從乃與昭儀幸太尉長孫無忌第酣飲極驩席上拜無忌寵􅁎子三人皆為朝散大夫朝直遥翻散悉亶翻仍載金寳繒錦十車以賜無忌上因從容言皇后無子以諷無忌從才容翻無忌對以佗語竟不順㫖上及昭儀皆不悦而罷昭儀又令母楊氏詣無忌第屢有祈請無忌終不許禮部尚書許敬宗亦數勸無忌無忌厲色折之上於無忌官及庶孽又有横賜意可知矣無忌欲格其非心則辭而不受可也為無忌得罪張本數所角翻折之舌翻六年春正月壬申朔上謁昭陵甲戌還宫己丑嶲州道行軍總管曹繼叔破胡叢顯養車魯等蠻於斜山㧞十餘城胡叢劒山招討使所領五部落之一也顯養車魯亦各蠻種車魯新書作東魯嶲音髓庚寅立皇子𢎞為代王賢為潞王髙麗與百濟靺鞨連兵侵新羅北境取三十三城新羅王春秋遣使求援使䟽吏翻二月乙丑遣營州都督程名振左衛中郎將蘇定方發兵擊髙麗將即亮翻夏五月壬午名振等度遼水髙麗見其兵少開門度貴端水逆戰按舊書程名振𫝊貴端水當在新城西南少詩沼翻名振等奮擊大破之殺獲千餘人焚其外郭及村落而還癸未以右屯衛大將軍程知節為蔥山道行軍大總管蔥山即蔥嶺以討西突厥沙鉢羅可汗壬辰以韓瑗為侍中瑗于眷翻來濟為中書令六月武昭儀誣王后與其母魏國夫人柳氏為厭勝厭於葉翻又一琰翻考異曰舊𫝊云后懼不自安宻與母柳氏求巫祝厭勝事𤼵故廢今從實録敕禁后母柳氏不得入宫秋七月戊寅貶吏部尚書柳奭為遂州刺史奭行至扶風武徳元年分岐山置準川縣取準水為名貞觀八年更名扶風屬岐州九域志縣在州東八十里岐州長史于承素希㫖奏奭漏洩禁中語復貶榮州刺史榮州漢南安江陽之地隋為大牢縣屬資州武徳元年分置榮州復扶又翻唐因隋置後宫有貴妃淑妃徳妃賢妃皆視一品上欲特置宸妃以武昭儀為之韓瑗來濟諫以為故事無之乃止唐考異曰厯在此年四月今據實録四月韓瑗來濟未為侍中中書令唐厯又云瑗濟諌帝不從按立武后詔書猶云昭儀武氏然則未嘗為宸妃也今從會要中書舍人饒陽李義府為長孫無忌所惡惡烏路翻左遷壁州司馬武徳八年析巴州始寧縣地置壁州敕未至門下義府宻知之問計於中書舍人幽州王徳儉徳儉曰上欲立武昭儀為后猶豫未决者直恐宰臣異議耳君能建策立之則轉禍為福矣義府然之是日代徳儉直宿叩閤上表請廢皇后王氏立武昭儀以厭兆庶之心厭於葉翻上悦召見與語賜珠一斗留居舊職昭儀又宻遣使勞勉之使疏吏翻勞力到翻尋超拜中書侍郎髙考異曰舊傳云宗將立武后義府宻申叶賛擢拜中書侍郎同中書門下三品監修國史賜爵廣平縣男新書本紀年表皆云是歲七月義府為中書侍郎參知政事實録但云超拜中書侍郎宰輔圖十一月自中書侍郎參知政事今從之於是衛尉卿許敬宗御史大夫崔義𤣥中丞袁公瑜皆潛布腹心於武昭儀矣乙酉以侍中崔敦禮為中書令八月尚藥奉御蔣孝璋員外特置仍同正員尚藥局奉御員二人掌合和御藥及診候方胍之事員外同正自孝璋始長安令裴行儉聞將立武昭儀為后以國家之禮必自此始與長孫無忌褚遂良私議其事袁公瑜聞之以告昭儀母楊氏行儉坐左遷西州都督府長史唐制長安萬年河南洛陽太原晉陽六縣謂之京縣京縣令正五品上西州中都督府中都督府長史亦正五品上但從輦轂下出佐邊州故謂左遷行儉仁基之子也裴仁基隋將歸李宻為王世充所殺九月戊辰以許敬宗為禮部尚書上一日退朝朝直遥翻召長孫無忌李勣于志寧褚遂良入内殿遂良曰今日之召多為中宫上意既决逆之必死太尉元舅司空功臣不可使上有殺元舅及功臣之名遂良起於草茅無汗馬之勞致位至此且受顧託不以死爭之何以下見先帝勣稱疾不入無忌等至内殿上顧謂無忌曰皇后無子武昭儀有子今欲立昭儀為后何如遂良對曰皇后名家先帝為陛下所娶為于偽翻先帝臨崩執陛下手謂臣曰朕佳兒佳婦今以付卿此陛下所聞言猶在耳皇后未聞有過豈可輕廢臣不敢曲從陛下上違先帝之命上不悦而罷明日又言之遂良曰陛下必欲易皇后伏請妙擇天下令族何必武氏武氏經事先帝衆所具知天下耳目安可蔽也萬代之後謂陛下為如何願留三思臣今忤陛下罪當死忤五故翻因置笏於殿階解巾叩頭流血曰還陛下笏乞放歸田里上大怒命引出昭儀在簾中大言曰何不撲殺此獠無忌曰遂良受先朝顧命有罪不可加刑撲弼角翻又普木翻獠魯皓翻朝直遥翻顧音古事考異曰唐厯云無忌等将入遂良曰今者多為中宫遂良欲諌何如無忌曰公但極言無忌接公及入上冄三顧無忌曰莫大之罪無過絶嗣皇后無子今欲廢之立武士彠女何如無忌曰自貞觀二十三年後先朝託付遂良望陛下問其可否按如此則是無忌賣遂良也今不取于志寧不敢言韓瑗因間奏事間古莧翻涕泣極諫上不納明日又諫悲不自勝勝音升上命引出瑗又上疏諫曰匹夫匹婦猶相選擇况天子乎皇后母儀萬國善惡由之故嫫母輔佐黄帝漢書古今人表幠母黄帝妃生倉林師古曰幠音謨即嫫母也何承天纂文曰嫫母醜人也黄帝愛幸之嫫音謨妲己傾覆殷王妲己有蘇氏之羙女紂愛之唯妲己之言是從卒以亡殷妲當割翻詩云赫赫宗周褒姒滅之詩小雅正月之辭韓瑗之意謂嫫毋以醜而佐黄帝有天下妲己褒姒以羙豔而亡殷周女在徳不在色也毎覽前古常興歎息不謂今日塵黷聖代作而不法後嗣何觀左𫝊曹劌諌魯莊公之辭願陛下詳之無為後人所笑使臣有以益國葅醢之戮臣之分也分扶問翻昔吳王不用子胥之言而麋鹿遊於姑蘇漢伍被曰昔子胥諌吳王吳王不用迺曰臣今見麋鹿遊於姑蘇之䑓也師古曰姑蘇因山為䑓名西南去吳國二十五里范成大吳郡志曰姑蘇䑓在姑蘇山舊圖經云在吳縣西三十里續圖經云三十五里史記正義曰在吳縣西南三十里横山西北麓姑蘇山上臣恐海内失望荆棘生於闕庭宗廟不血食期有日矣來濟上表諫曰王者立后上法乾坤必擇禮教名家幽閑令淑副四海之望稱神祗之意是故周文造舟以迎太姒而興關雎之化百姓蒙祚太姒文王之妃也詩云文定厥祥親迎于渭造舟為梁不顯其光太姒佐文王以興王業故闗雎羙其徳稱尺證翻造七到翻孝成縱欲以婢為后使皇統亡絶社稷傾淪事見漢成帝紀有周之隆既如彼大漢之禍又如此惟陛下詳察上皆不納褚遂良韓瑗來濟言皆痛切此時去貞觀未逺士大夫敢言之氣未衰自三人者得罪在朝之臣唯承武后風㫖安能言人所難言哉它日李勣入見見賢遍翻上問之曰朕欲立武昭儀為后遂良固執以為不可遂良既顧命大臣事當且己乎對曰此陛下家事何必更問外人自李勣有是言李林甫襲取之以成明皇殺三子之禍德宗舒王之議亦袓此説㣲李泌東宫殆哉上意遂决許敬宗宣言於朝曰田舍翁多収十斛麥尚欲易婦况天子欲立后何豫諸人事而妄生異議乎以田舍翁况天子許敬宗之事君不敬莫大乎是朝直遥翻昭儀令左右以聞庚午貶遂良為潭州都督潭州在京師南三千四百四十五里資治通鑑卷一百九十九
