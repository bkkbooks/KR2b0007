body:
  text: 資治通鑑卷八十宋司馬光撰胡三省音註晉紀二起昭陽大荒落盡屠維大淵獻凡七年世祖武皇帝上之下泰始九年春正月辛酉密陵元侯鄭袤卒本考異曰按傳袤為司空固辭乆之見許以侯就第拜儀同三司而帝紀云司空鄭袤薨誤也二月癸巳樂陵武公石苞卒三月立皇子祗為東海王吳以陸抗為大司馬荆州牧夏四月戊辰朔日有食之初鄧艾之死事見七十八卷魏元帝咸熈元年人皆寃之而朝廷無為之辯者為于偽翻及帝即位議郎敦煌段灼上疏曰敦徒門翻鄧艾心懷至忠而荷反逆之名荷下可翻平定巴蜀而受三族之誅艾性剛急矜功伐善不能協同朋類故莫肯理之臣竊以為艾本屯田掌犢人鄧艾本義陽棘陽人魏太祖破荆州徙汝南為農民養犢寵位已極功名已成七十老公復何所求復扶又翻正以劉禪初降降戸江翻逺郡未附矯令承制權安社稷鍾㑹有悖逆之心悖蒲内翻又蒲没翻畏艾威名因其疑似構成其事艾被詔書即遣彊兵束身就縛不敢顧望被皮義翻誠知奉見先帝必無當死之理也會受誅之後艾官屬将吏愚戇相聚自共追艾破壞檻車解其囚執戇直降翻壞音怪艾在困地狼狽失據狼前則䟦其胡退則疐其尾狽狼屬也生子或欠一足二足相附而後能行離則顛蹶故猝遽謂之狼狽狽博葢翻未嘗與腹心之人有平素之謀獨受腹背之誅腹在前背在後謂前後皆不免於誅豈不哀哉陛下龍興闡𢎞大度謂可聽艾歸葬舊墓還其田宅以平蜀之功繼封其後使艾闔棺定謚死無所恨謚神至翻則天下狥名之士思立功之臣必投湯火樂為陛下死矣樂音洛為于偽翻帝善其言而未能從會帝問給事中樊建以諸葛亮之治蜀樊建故蜀臣治直之翻曰吾獨不得如亮者而臣之乎建稽首曰陛下知鄧艾之寃而不能直稽音啓雖得亮得無如馮唐之言乎言不能用也馮唐事見十四卷漢文帝十四年帝笑曰卿言起我意乃以艾孫朗為郎中吳人多言祥瑞者吳主以問侍中韋昭昭曰此家人筐篋中物耳言祥瑞而謂之家人筐篋中物者葢稱引圖緯以言祥瑞之應故謂其書為家人筐篋中物也昭領左國史吳有左右國史皆掌記述呉主欲為其父作紀為于偽翻昭曰文皇不登極位當為傳不當為紀吳主謚其父和曰文皇帝傳直戀翻吳主不悦漸見責怒昭憂懼自陳衰老求去侍史二官侍史侍中及左國史也不聽時有疾病醫藥監䕶持之益恐監工衘翻吳主飲羣臣酒飲于禁翻不問能否率以七升為限至昭獨以茶代之後更見偪强强其兩翻又酒後常使侍臣嘲㺯公卿發摘私短以為歡摘當作擿時有愆失輒見收縛至於誅戮昭以為外相毁傷内長尤恨長丁丈翻令知兩翻使羣臣不睦不為佳事故但難問經義而已難乃旦翻吳主以為不奉詔命意不忠盡積前後嫌忿遂收昭付獄昭因獄上辭辭獄辭也上時掌翻獻所著書冀以此求免而吳主怪其書垢故垢塵也故舊也更被詰責被皮義翻詰去吉翻遂誅昭徙其家於零陵五月以何曾領司徒六月乙未東海王祗卒秋七月丁酉朔日有食之此考異曰宋志無食今從晉書詔選公卿以下女備六宫有蔽匿者以不敬論以律不敬論罪也采擇未畢權禁天下嫁娶帝使楊后擇之后惟取潔白長大而捨其美者帝愛卞氏女欲留之后曰卞氏三世后族魏武帝卞后諡曰宣后弟秉生蘭及琳蘭孫女為高貴鄉公后琳女又為陳留王后凡三世不可屈以卑位帝怒乃自擇之中選者以絳紗繫臂中竹仲翻公卿之女為三夫人孔頴逹曰夫扶也言扶侍於王也九嬪句斷二千石将校女補良人以下漢制後宫之號十有四等良人視八百石爵比庻長師古曰良善也将即亮翻校戸敎翻九月吳主悉封其子弟為十一王王給三千兵大赦十一王史逸其名是歳鄭冲以夀光公罷吳主愛姬遣人至市奪民物司市中郎将陳聲素有寵於吳主繩之以法姬愬於吳主愬與訴同吳主怒假它事燒鋸斷聲頭投其身於四望之下據晉書温嶠𫝊嶠討蘇峻於石頭結壘於四望磯又據内史石頭有四望山葢山下有磯也斷丁管翻十年春正月乙未日有食之閏月癸酉夀光成公鄭冲卒丁亥詔曰近世以來多由内寵以登后妃謂魏三祖立卞郭毛為后亂尊卑之序自今不得以妾媵為正嫡媵以證翻分幽州置平州幽州言北方太隂幽宴也杜佑曰因幽都山為名山海經有幽都山今列北荒統范陽燕北平上谷代遼西漢末公孫度自號平州牧今分昌黎遼東樂浪𤣥莵帶方五郡置平州三月癸亥日有食之詔又取良家及小将吏女五千人入宫選之母子號哭於宫中聲聞於外将即亮翻號户刀翻聞音問夏四月己未臨淮康公荀顗卒諡法温柔好樂曰康顗魚豈翻吳左夫人王氏卒吳主哀念數月不出葬送甚盛時何氏以太后故宗族驕横横戸孟翻吳主舅子何都貌類吳主民間訛言吳主已死立者何都也會稽又訛言章安侯奮當為天子奮母仲姬墓在豫章豫章太守張俊為之掃除掃糞掃也除芟除荆棘㑹古外翻為于偽翻臨海太守奚熈吳主休永安三年分㑹稽東部都尉為臨海郡與㑹稽太守郭誕書㑹工外翻非議國政誕但白熈書不白妖言妖言即前訛言妖於驕翻吳主怒收誕繫獄誕懼功曹邵疇曰疇在明府何憂遂詣吏自列白自列猶自陳也疇厠身本郡位極朝右郡功曹位居郡朝之右朝直遥翻以噂􅊱之語噂祖本翻􅊱逹合翻噂􅊱聚語也本非事實疾其醜聲不忍聞見欲含垢藏疾左傳曰川澤納汙山藪藏疾國君含垢不彰之翰墨鎮躁歸静使之自息故誕屈其所是黙以見從謂誕從疇之説黙而不白妖言也此之為愆實由於疇不敢逃死歸罪有司因自殺吳主乃免誕死送付建安作船宋白曰吳分侯官之地立建安縣又立曲郍都尉主謫徙之人作舟船遣其舅三郡督何植收奚熈江表傳作備海督葢督臨海建安㑹稽三郡也熈發兵自守其部曲殺熈送首建業又車裂張俊皆夷三族并誅章安侯奮及其五子女考異曰江表傳曰張布有寵於皓而死皓厚葬之國人見葬太奢麗皆謂皓已死所葬者是也皓舅子何都顔状似皓故民間訛言都代立臨海太守奚熈信訛言舉兵欲還秣陵誅都都叔父植時為備海督擊殺熈夷三族訛言乃息又云奮本在章安徙還吳城禁錮使男女不得通婚或年三十四十不得嫁娶奮上表乞自比禽獸使男女自相配偶皓大怒遣察戰齎藥賜奮父子皆飲藥死裴松之按建衡二年至奮之死孫皓即位尚未久若奮未被疑之前男女年二十左右至奮死時不得年三十四十也若先已長大自失時未婚娶不由皓之禁錮矣此雖欲増皓之惡然非實理又吳志孫皓傳鳯凰三年㑹稽妖言奮為天子遂誅奚熈不言誅奮孫奮傳建衡二年左夫人王氏卒民間訛言遂誅奮及五子三十國晉春秋自皓納張布女至殺奮皆在天冊元年按奮若以建衡二年死不容至鳯凰三年㑹稽方冇訛言不知奮死果在何年今因奚熈之死終言之秋七月丙寅皇后楊氏殂初帝以太子不慧恐不堪為嗣常密以訪后常當作甞后曰立子以長不以賢春秋公羊傳之言長知兩翻豈可動也鎮軍大将軍胡奮女為貴嬪晉制貴人夫人貴嬪是為三夫人皆金章紫綬嬪毗賔翻有寵於帝后疾篤恐帝立貴嬪為后致太子不安枕帝膝泣曰枕職任翻叔父駿女芷有徳色言有徳冇色也願陛下以備六宫帝流涕許之以前太常山濤為吏部尚書濤典選十餘年帝受禪濤自吏部郎遷尚書居母䘮復奪情起典選選息絹翻每一官缺輒擇才資可為者啓擬數人才謂其才足以任資謂其資序當為者得詔㫖有所向然後顯奏之帝之所用或非舉首衆情不察以濤輕重任意言之於帝帝益親愛之濤甄㧞人物各為題目而奏之時稱山公啓事甄稽延翻明也察也别也濤薦嵇紹於帝請以為祕書郎晉制祕書監屬官有丞有郎帝發詔徴之紹以父康得罪事見七十八卷魏元帝景元三年屏居私門欲辭不就屏必郢翻濤謂之曰為君思之久矣天地四時猶有消息况於人乎為于偽翻下樹為人為同又蠻為同紹乃應命帝以為秘書丞初東闗之敗事見七十五卷魏郡陵厲公嘉平四年文帝問僚屬曰近日之事誰任其咎任音壬安東司馬王儀修之子王修見六十四卷漢獻帝建安八年對曰責在元帥文帝時為安東将軍監諸軍文帝怒曰司馬欲委罪孤邪引出斬之儀子裒痛父非命隱居敎授三徴七辟皆不就徴詔召也辟公府及州郡辟也裒萍侯翻未嘗西向而坐裒居城陽晉朝在洛陽故未嘗西向廬於墓側旦夕攀柏悲號涕淚着樹號直刀翻著略翻樹為之枯讀詩至哀哀父母生我劬勞詩蓼莪之辭未嘗不三復流涕門人為之廢蓼莪以裒悲慘故廢蓼莪之篇不敢講習三息暫翻復扶又翻蓼力竹翻家貧計口而田度身而蠶度徒洛翻人或饋之不受助之不聽諸生密為刈麥裒輒棄之遂不仕而終臣光曰昔舜誅鯀而禹事舜不敢廢至公也嵇康王儀死皆不以其罪二子不仕晉室可也嵇紹茍無蕩陰之忠蕩陰事見後八十五卷惠帝永興元年余謂蕩陰之難君子以嵇紹為忠於所事可也然未足以塞天性之傷也蕩音湯殆不免於君子之譏乎吴大司馬陸抗疾病上䟽曰西陵建平國之蕃表蕃籬也表外也謂二郡為蕃籬於外也既處上流受敵二境謂二郡之境西距巴䕫北接魏興上庸二靣皆受敵也處昌呂翻若敵汎舟順流星犇電邁非可恃援他部以救倒縣也縣讀曰懸此乃社稷安危之機非徒封疆侵陵小害也臣父遜昔在西埀上言西陵國之西門雖云易守亦復易失易弋䜴翻若有不守非但失一郡荆州非吳有也如其有虞當傾國爭之臣前乞屯精兵三萬而主者循常未肯差赴主者謂居本兵之職者也差初皆翻自歩闡以後歩闡反見上卷八年益更損耗今臣所統千里外禦彊對彊對猶言彊敵也内懷百蠻而上下見兵財有數萬見賢遍翻財與纔同羸敝日久難以待變羸倫為翻臣愚以為諸王㓜冲無用兵馬以防要務謂十一王各給三千兵也又黄門宦官開立占募兵民避役逋逃入占占章艶翻乞特詔簡閲一切料出料音聊以補疆埸受敵常處使臣所部足滿八萬省息衆務并力備禦庶幾無虞幾居希翻若其不然深可憂也臣死之後乞以西方為屬陸抗固知吳之将亡特就職分上言之耳屬之欲翻下屬文同及卒吳主使其子晏景𤣥機雲分将其兵将即亮翻機雲皆善屬文名重於世初周魴之子處膂力絶人不修細行鄉里患之魴符方翻行下孟翻處嘗問父老曰今時和歳豐而人不樂何邪父老歎曰三害不除何樂之有樂音洛處曰何謂也父老曰南山白額虎長橋蛟南山今湖秀以南諸山也長橋在今常州宜興縣并子為三矣子謂周處處曰若所患止此吾能除之乃入山求虎射殺之因投水摶殺蛟遂從機雲受學篤志讀書砥節礪行比及朞年州府交辟射而亦翻行下孟翻比必寐翻八月戊申葬元皇后于峻陽陵帝及羣臣除䘮即吉博士陳逵議以為今時所行漢帝權制太子無有國事自宜終服尚書杜預以為古者天子諸侯三年之䘮始同齊斬謂齊衰斬衰之服其始自天子逹於庶人無以異也齊津夷翻既葬除服諒闇以居心䘮終制故周公不言高宗服䘮三年而云諒闇此服心䘮之文也周公作無逸曰其在高宗作其即位乃或亮陰三年杜預遂引此言以為不服䘮之證闇與陰同孔安國曰諒信也隂黙也叔向不譏景王除䘮而譏其宴樂已早明既葬應除而違諒闇之節也左傳晉荀躒如周葬穆后既葬除䘮以文伯宴叔向曰王其不終乎吾聞之所樂必卒焉今王樂憂若卒以憂不可謂終王一歳而有三年之䘮二焉於是乎以䘮賔宴樂憂甚矣三年之䘮雖貴遂服禮也王雖弗遂宴樂以早亦非禮也樂音洛子之於禮存諸内而已禮非玉帛之謂論語孔子曰禮云禮云玉帛云乎哉䘮豈衰麻之謂乎衰七囘翻下同太子出則撫軍守則監國左傳晉大夫里克之言監古銜翻不為無事宜卒哭除衰麻卒子恤翻而以諒闇終三年帝從之臣光曰規矩主於方圓然庸工無規矩則方圓不可得而制也衰麻主於哀戚然庸人無衰麻則哀戚不可得而勉也素冠之詩正為是矣衰倉囘翻詩素冠刺不能三年也為于偽翻杜預巧飾經傳以附人情辯則辯矣傳直戀翻臣謂不若陳逵之言質略而敦實也九月癸亥以大将軍陳騫為太尉杜預以孟津渡險請建河橋於富平津水經注孟津又曰富平津杜佑曰富平津在河陽縣南議者以為殷周所都歴聖賢而不作者必不可立故也殷都河内周都洛二代夾河建都不立河橋故以為言預固請為之及橋成帝從百寮臨㑹舉觴屬預曰屬之欲翻非君此橋不立對曰非陛下之明臣亦無所施其巧是歳邵陵厲公曹芳卒初芳之廢遷金墉也芳之廢也築宮于河内重門今言遷金墉葢始廢之時自禁中遷于金墉後乃居于河内也太宰中郎陳留范粲素服拜送晉既受禪避景帝諱採周官名置太宰以代太師魏因漢制上公惟有太傅據粲傳自太宰從事中郎遷太宰中郎時未置太宰宰當作傅哀動左右遂稱疾不出陽狂不言陽發見於外隂蔽伏於中凡人之作事外為是形而内無其實者皆陽為之外若無所營而内濳經畫皆陰為之寝所乘車足不履地子孫有婚宦大事輒密諮焉合者則色無變不合則眠寝不安妻子以此知其㫖子喬等三人並棄學業絶人事按晉書喬年二歳祖馨臨終撫其首曰恨不見汝成人因以所用硯與之至五歳祖母以告喬喬便執硯涕泣九歳請學在同輩之中言無媟辭李銓常論揚雄才學優於劉向喬以為向定一代之書正羣籍之篇使雄當之故非所長遂著劉揚優劣論前後辟舉皆不就邑人臘日盜斫其樹人有告者喬陽不聞邑人愧而歸之喬曰卿節日取柴欲與父母相歡娛耳何以愧為嗚呼觀喬之學行如此則棄學業絶人事殆庶幾乎夷齊餓于首陽之下之意侍疾家庭足不出邑里及帝即位詔以二千石禄養病加賜帛百匹喬以父疾篤辭不敢受粲不言凡三十六年年八十四終於所寝之車自卲陵厲公之廢至是方二十一年史因公卒而究言之吳比三年大疫比毗至翻咸寧元年春正月戊午朔大赦改元吳掘地得銀尺上有刻文吳志曰銀長一尺廣三分刻上有年月字吳主大赦改元天冊吳中書令賀邵中風不能言中竹仲翻去職數月吳主疑其詐收付酒藏掠考千數藏徂浪翻掠音亮卒無一言乃燒鋸斷其頭卒子恤翻斷丅管翻徙其家屬於臨海又誅樓𤣥子孫殺樓𤣥見上卷泰始八年夏六月鮮卑拓㧞力㣲復遣其子沙漠汗入貢沙漠汗初入貢見七十八卷魏元帝景元二年汗音寒将還幽州刺史衛瓘表請留之又密以金賂其諸部大人離間之為力㣲信譖殺沙漠汗張本間古莧翻秋七月甲申晦日有食之冬十二月丁亥追尊宣帝廟曰高祖景帝曰世宗文帝曰太祖大疫洛陽死者以萬數二年春令狐豐卒弟宏繼立楊欣討斬之豐自為敦煌太守見上卷泰始八年帝得疾甚劇及愈羣臣上夀詔曰每念疫氣死亡者為之愴然豈以一身之休息忘百姓之艱難邪諸上禮者皆絶之為于偽翻上時掌翻初齊王攸有寵於文帝每見攸輒撫牀呼其小字曰此桃符座也幾為太子者數矣事見七十八卷魏元帝咸熈元年幾居依翻數所角翻臨終為帝叙漢淮南王魏陳思王事而泣漢文帝誅淮南厲王長魏文帝不能容陳思王植引此二事以戒切帝也執攸手以授帝太后臨終亦流涕謂帝曰桃符性急而汝為兄不慈我若不起必恐汝不能相容以是屬汝勿忘我言及帝疾甚朝野皆屬意於攸屬之欲翻朝直遥翻攸妃賈充之長女也充先娶李氏豐女也生二女長曰荃為齊王攸妃長知兩翻河南尹夏侯和謂充曰卿二婿親踈等耳二婿謂攸及太子也立人當立徳充不答攸素惡荀勗及左衛将軍馮紞傾陷朂乃使紞説帝曰惡烏路翻紞都感翻説輸芮翻陛下前日疾若不愈齊王為公卿百姓所歸太子雖欲高讓其得免乎宜遣還藩以安社稷帝隂納之乃徙和為光禄勲奪充兵權充自文帝時領兵而位遇無替吳施但之亂事見上卷泰始二年或譖京下督孫楷於吳主曰楷不時赴討懷兩端吳主數詰讓之徴為宫下鎮驃騎将軍京下督鎮京口宫下鎮在建業楷孫韶之子數所角翻驃匹妙翻騎竒寄翻楷自疑懼夏六月将妻子來犇拜車騎将軍封丹陽侯秋七月吳人或言於吳主曰臨平湖自漢末薉塞臨平湖今在臨安府仁和縣界有臨平鎮在臨安府城西北四十八里薉荒蕪也音烏廢翻塞悉則翻下同長老言此湖塞天下亂此湖開天下平近無故忽更開通此天下當太平青葢入洛之祥也青葢之占見上卷泰始八年吳主以問奉禁都尉歴陽陳訓吳置奉禁都尉葢以侍奉宮禁為稱對曰臣止能望氣不能逹湖之開塞退而告其友曰青葢入洛者将有銜璧之事非吉祥也或獻小石刻皇帝字云得於湖邉吳主大赦改元天璽璽斯氏翻湘東太守張詠不出筭緡吳主亮太平二年分長沙東部都尉立湘東郡吳主就在所斬之狥首諸郡㑹稽太守車浚公清有政績㑹工外翻車姓出於田千秋車昌遮翻值郡旱饑表求振貸吳主以為收私恩遣使梟首梟堅堯翻尚書熊睦㣲有所諫黄帝有熊氏姓譜楚鬻熊之後此以名為氏者也吳主以刀環撞殺之身無完肌史詳言吳主之昏虐撞直江翻八月己亥以何曾為太傅陳騫為大司馬賈充為太尉齊王攸為司空吳歴陽山有七穿駢羅穿中黄赤俗謂之石印云石印封發天下當太平歴陽長上言石印發據吳志鄱陽上言歴陽山石文理成字又江表傳曰歴陽縣有石山臨水高百丈其三十丈所有七穿駢羅今考晉志鄱陽郡無歴陽縣有歴陵縣陽當作陵今饒州圖經亦載鄱陽歴陵縣有石印山長知兩翻吳主遣使者以太牢祠之使䟽吏翻使者作高梯登其上以朱書石曰楚九州渚吳九州都揚州士作天子四世治太平始還以聞吳主大喜封其山神為王大赦改明年元曰天紀冬十月以汝陰王駿為征西大将軍羊祜為征南大将軍皆開府辟召儀同三司此位從公也祜上䟽請伐吳陸抗没羊祜始抗䟽請伐呉上時掌翻曰先帝西平巴蜀見七十八卷魏元帝景元四年南和吳㑹見七十八卷魏元帝咸熈元年庶幾海内得以休息而吳復背信事見上卷泰始元年幾居希翻背蒲妹翻使邉事更興夫期運雖天所授而功業必因人而成不一大舉掃滅則兵役無時得息也蜀平之時天下皆謂吳當并亡自是以來十有三年矣景元四年蜀亡至是十三年夫謀之雖多決之欲獨凡以險阻得全者謂其埶均力敵耳若輕重不齊强弱異埶雖有險阻不可保也蜀之為國非不險也皆云一夫荷㦸千人莫當荷下可翻及進兵之日曾無藩籬之限乘勝席卷徑至成都漢中諸城皆鳥栖而不敢出謂漢樂諸城也非無戰心誠力不足以相抗也及劉禪請降諸營堡索然俱散索昔各翻今江淮之險不如劒閣孫皓之暴過於劉禪吳人之困甚於巴蜀而大晉兵力盛於徃時不於此際平壹四海而更阻兵相守使天下困於征戍經歴盛衰不可長久也謂兵将以盛壯之年出戍經歴營陳至於衰老也今若引梁益之兵水陸俱下王濬唐彬統梁益兵荆楚之衆進臨江陵荆楚祜所統也平南豫州直指夏口胡奮為平南将軍王戎為豫州刺史夏戸雅翻徐揚青兖並㑹秣陵徐揚王渾所統青兖琅邪王伷所統以一隅之吳當天下之衆埶分形散所備皆急巴漢竒兵出其空虚一處傾壞則上下震蕩雖有智者不能為吳謀矣其後平吳皆如祜所規吳緣江為國東西數千里所敵者大無有寧息孫皓恣情任意與下多忌将疑於朝将即亮翻朝直遥翻士困於野無有保世之計一定之心平常之日猶懷去就兵臨之際必有應者終不能齊力致死已可知也其俗急速不能持久弓弩㦸楯不如中國唯有水戰是其所便一入其境則長江非復所保還趣城池趣七喻翻去長入短非吾敵也官軍縣進縣讀曰懸人有致死之志吳人内顧各有離散之心如此軍不踰時克可必矣帝深納之而朝議方以秦凉為憂謂樹機能未平也朝直遥翻祜復表曰復扶又翻吳平則胡自定但當速濟大功耳議者多有不同賈充荀朂馮紞尤以伐吳為不可祜歎曰天下不如意事十常居七八天與不取豈非更事者恨於後時哉言吳可取而不取機㑹一失經見其事者豈不有後時之恨更工衡翻唯度支尚書杜預魏制度支尚書度徒洛翻中書令張華與帝意合贊成其計丁夘立皇后楊氏大赦后元皇后之從妹也從才用翻美而有婦徳帝初聘后后叔父珧珧余招翻上表曰自古一門二后未有能全其宗者乞藏此表於宗廟異日如臣之言得以免禍帝許之珧雖有此表終不能以免禍十二月以后父鎮軍将軍駿為車騎将軍封臨晉侯國號晉而封后父為臨晉侯不祥之徴也尚書禇䂮郭奕皆表駿小器不可任社稷之重䂮離灼翻任音壬帝不從駿驕傲自得胡奮謂駿曰卿恃女更益豪邪歴觀前世與天家婚未有不滅門者但早晩事耳駿曰卿女不在天家乎天子尊無二上故曰天家言其尊如天也奮曰我女與卿女作婢耳何能為損益乎三年春正月丙子朔日有食之立皇子裕為始平王庚寅裕卒三月平虜䕶軍文鴦督凉秦雍州諸軍討樹機能破之諸胡二十萬口來降雍於用翻降户江翻夏五月吳将邵顗顗魚豈翻今考異日武紀作邵凱從羊祜傳夏祥帥衆七千餘人來降夏戸雅翻帥讀曰率降户江翻秋七月中山王睦坐招誘逋亡貶為丹水縣侯誘音酉有星孛于紫宫孛蒲内翻衛将軍楊珧等建議以為古者封建諸侯所以藩衛王室今諸王公皆在京師非干城之義又異姓諸将居邉宜參以親戚望考異曰職官志以為珧與荀朂以齊王攸有時懼太子冇後難故建此議使諸王之國帝初未之察於是下詔議其制按朂𫝊有異議又時齊王不之國疑此説非實今不取帝乃詔諸王各以戸邑多少為三等大國置三軍五千人次國二軍三千人小國一軍一千一百人時以平原汝南琅邪扶風齊為大國梁趙樂安燕安平義陽為次國餘國為小國諸王為都督者各徙其國使相近八月癸亥徙扶風王亮為汝南王出為鎮南大将軍都督豫州諸軍事琅邪王倫為趙王督鄴城守事勃海王輔為太原王監并州諸軍事以東莞王伷在徐州徙封琅邪王莞音官伷音胄汝陰王駿在闗中徙封扶風王又徙太原王顒為河間王汝南王柬為南陽王輔孚之子顒孚之孫也顒魚容翻其無官者皆遣就國諸王公戀京師皆涕泣而去又封皇子瑋為始平王允為濮陽王該為新都王遐為清河王其異姓之臣有大功者皆封郡公郡侯封賈充為魯郡公追封王沈為博陵郡公沈持林翻徙封鉅平侯羊祜為南城郡侯時詔以泰山之南武陽牟南城梁父平陽五縣為南城郡羊祜本泰山南城人也帝制公侯邑萬戸以上為大國五千戸以上為次國不滿五千戸為小國祜固辭不受祜每拜官爵常多避讓至心素著故特見申於分列之外見申謂許之辭爵其志獲申也分列謂分封列爵也祜歴事二世謂事文帝及帝也職典樞要凡謀議損益皆焚其草世莫得聞所進逹之人皆不知所由謂人由祜薦引而進逹不知其所由來也常曰拜官公朝謝恩私門吾所不敢也朝直遥翻兖豫徐青荆益梁七州大水冬十二月吳夏口督孫慎入江夏汝南江夏郡屬荆州汝南郡屬豫州相去甚逺沈約宋志江夏太守治汝南縣本沙羡地晉末汝南郡民流寓夏口因立為汝南則此時江夏郡未有汝南縣也無亦史追書乎夏戸雅翻略千餘家而去詔遣侍臣詰羊祜不追討之意詰去吉翻并欲移荆州祜曰江夏去襄陽八百里比知賊問比必寐翻賊已去經日歩軍安能追之勞師以免責非臣志也昔魏武帝置都督類皆與州相近如揚州刺史治夀春都督揚州諸軍事亦治夀春之類近其靳翻以兵埶好合惡離故也好呼到翻惡烏路翻疆埸之間一彼一此慎守而已左傳魯桓公曰疆埸之間慎守其一而備其不虞若輙徙州賊出無常亦未知州之所宜據也是歳大司馬陳騫自揚州入朝朝直遙翻以高平公罷吳主以㑹稽張俶多所譖白㑹工外翻俶昌六翻甚見寵任累遷司直中郎将封侯其父為山隂縣卒山隂縣屬㑹稽郡知俶不良上表曰若用俶為司直有罪乞不從坐吳主許之俶表置彈曲二十人専糾司不灋彈徒干翻於是吏民各以愛憎互相告訐獄犴盈溢訐居謁翻犴音岸犴野犬也野犬所以守故為獄又胡地謂犬為犴上下囂然俶大為姧利驕奢暴横横戸孟翻事發父子皆車裂衛瓘遣拓㧞沙漠汗歸國前年瓘表留沙漠汗讒間既行乃遣歸自沙漠汗入質入質見七十七卷魏元帝景元二年質音致力㣲可汗諸子在側者多有寵及沙漠汗歸諸部大人共譖而殺之既而力㣲疾篤烏桓主庫賢親近用事受衛瓘賂欲擾動諸部乃礪斧於庭謂諸大人曰可汗恨汝曹讒殺太子此時鮮卑君長已有可汗之稱可今讀從刋入聲汗音寒欲盡收汝曹長子殺之長知兩翻諸大人懼皆散走力㣲以憂卒時年一百四子悉禄立悉禄魏收魏書作悉鹿其國遂衰初幽并二州皆與鮮卑接東有務桓西有力㣲多為邉患衛瓘密以計間之間古莧翻務桓降而力㣲死奴考異曰魏收後魏書鐵弗劉虎匈去卑之孫昭成四年死子務桓立按昭成四年晉成帝咸康七年也務桓不應與瓘同時蓋二人皆名務桓耳朝廷嘉瓘功封其弟為亭侯四年春正月庚午朔日有食之司馬督東平馬隆晉制二衛前驅由基彊弩為三部司馬各置督沈約曰殿中司馬督晉武帝時殿中宿衛號曰三部司馬與殿中将軍分𨽻左右二衛上言凉州刺史楊欣失𦍑戎之和必敗隆言欣必敗猶漢皇甫規之言馬賢葢懷才欲用故以此自顯耳夏六月欣與樹機能之黨若羅㧞能等戰于武威敗死𢎞訓皇后羊氏殂景皇后居𢎞訓宫羊祜以病求入朝朝直遙翻既至帝命乘輦入殿不拜而坐祜靣陳伐吳之計帝善之以祜病不宜數入數所角翻更遣張華就問籌䇿祜曰孫皓暴虐已甚於今可不戰而克若皓不幸而没吳人更立令主雖有百萬之衆長江未可窺也将為後患矣華深然之祜曰成吾志者子也帝欲使祜卧䕶諸将祜曰取吳不必臣行但既平之後當勞聖慮耳功名之際臣不敢居若事了當有所付授願審擇其人也以東南壤界闊逺當得人以鎮撫之秋七月己丑葬景獻皇后于峻平陵即𢎞訓后也司冀兖豫荆揚州大水司州即漢司𨽻校尉所部也漢司𨽻部察郡縣與州刺史同晉遂定名司州統河南滎陽𢎞農上洛平陽河東汲郡河内廣平陽平魏郡頓丘冀州者亂則冀安弱則冀强荒則冀豐統趙國鉅鹿安平平原樂陵勃海河間髙陽博陵清河中山常山等郡國螟傷稼螟食苖心之蟲詔問主者何以佐百姓主者謂左民及度支二曹也度支尚書杜預上䟽度徒洛翻上時掌翻以為今者水災東南尤劇宜敕兖豫等諸州留漢氏舊陂繕以蓄水餘皆决瀝令饑者盡得魚菜螺蜯之饒螺盧戈翻蜯歩項翻此目下日給之益也水去之後滇淤之田淤依據翻畆收數鍾此又明年之益也典牧種牛有四萬五千餘頭晉志典牧令屬太僕種章勇翻不供耕駕至有老不穿鼻者可分以給民使及春耕種榖登之後責其租税此又數年以後之益也帝從之民頼其利年考異曰食貨志云咸寧三杜預傳云四年按五行志三年大水無蟲災四年螟今從預傳預在尚書七年泰始六年預自秦州刺史得罪歸拜度支尚書至是七年矣損益庶政不可勝數勝音升時人謂之杜武庫言其無所不有也九月以何曾為太宰辛巳以侍中尚書令李𦙍為司徒吳主忌勝已者侍中中書令張尚紘之孫也張紘事孫䇿孫權見漢獻帝紀為人辯㨗談論毎出其表吳主積以致恨後問孤飲酒可以方誰方比也尚曰陛下有百觚之量吳主曰尚知孔丘不王而以孤方之孔叢子曰趙平原君與孔子高飲强子高酒曰諺云堯飲千鍾孔子百觚子路嗑嗑尚飲十榼古之聖賢無不能飲子何辭焉觚飲器也受二升王于况翻因發怒收尚公卿已下百餘人詣宫叩頭請尚罪得减死送建安作船尋就殺之三考異曰十國春秋云岑昏等泥頭請代尚死尚得免死徙廣州今從尚傳參取環氏吳紀余觀尚之為人葢以辯給得親近於孫皓而亦以辯給取怒請其死者必岑昏之徒三十國春秋所書葢得其實冬十月徴征北大将軍衛瓘為尚書令是時朝野咸知太子昏愚不堪為嗣瓘每欲陳啓而未敢發㑹侍宴陵雲臺陵雲臺魏文帝所築瓘陽醉跪帝牀前曰臣欲有所啓帝曰公所言何邪瓘欲言而止者三因以手撫牀曰此座可惜帝意悟固謬曰公真大醉邪瓘於此不復有言帝悉召東宮官屬為設宴㑹復扶又翻為于偽翻下便為同而密封尚書疑事令太子决之賈妃大懼倩外人代對倩七正翻假手於人也多引古義給使張泓曰太子不學陛下所知而答詔多引古義必責作草主言将責問作對草之主名也更益譴負不如直以意對妃大喜謂泓曰便為我好答富貴與汝共之給使給東宮使令張泓葢庸中之佼佼者後為趙王倫拒齊王冏於陽翟者必是人也泓即具草令太子自寫帝省之甚悦省悉景翻先以示瓘瓘大踧踖踧子六翻踖子昔翻踧踖不自安貌衆人乃知瓘嘗有言也賈充密遣人語妃云衛瓘老奴幾破汝家為賈妃怨衛瓘張本語牛倨翻始考異曰三十國春秋在泰始八年按瓘𫝊泰初為青州刺史徙幽州八年不得在京師瓘𫝊在遷司空後按帝紀太康三年賈充卒十二月瓘為司空故移在入為尚書令下吳人大田皖城佃亭年翻治田也皖户板翻欲謀入宼都督揚州諸軍事王渾遣揚州刺史應綽攻破之斬首五千級焚其積榖百八十餘萬斛踐稻田四千餘頃毁船六百餘艘艘蘇刀翻十一月辛巳太醫司馬程據獻雉頭裘晉志太醫屬宗正雉頭毛采炫燿集以為裘帝焚之於殿前甲申敕内外敢有獻竒技異服者罪之記王制作淫聲異服竒技竒器以疑衆殺技渠綺翻羊祜疾篤舉杜預自代辛卯以預為鎮南大将軍都督荆州諸軍事祜卒卒子恤翻下同帝哭之甚哀是日大寒涕涙霑須鬢皆為氷祜遺令不得以南城侯印入柩柩音舊帝曰祜固讓歴年身没讓存謂身没而遺令讓侯印也今聽復本封以彰高美祜本封鉅平侯南州民聞祜卒為之罷市巷哭聲相接南州謂荆州也為于偽翻下同吳守邉将士亦為之泣祜好遊峴山好呼到翻峴戸典翻襄陽人建碑立廟於其地歳時祭祀望其碑者無不流涕因謂之墮淚碑杜預至鎮簡精鋭襲吳西陵督張政大破之政吳之名将也耻以無備取敗不以實告吳主預欲間之間古莧翻乃表還其所獲吳主果召政還遣武昌監留憲代之吳之邉鎮有督有監督者督諸軍事之職監者監諸軍事之職十二月丁未朗陵公何曾卒曾厚自奉養過於人主司𨽻校尉東萊劉毅數劾奏曾侈汰無度數所角翻帝以其重臣不問及卒博士新興秦秀議曰秀新興雲中人朗之子也曾驕奢過度名被九域九域九州之域被皮義翻宰相大臣人之表儀若生極其情死又無貶王公貴人復何畏哉謹按諡灋諡法始於周公以行為諡復扶又翻名與實爽曰繆怙亂肆行曰醜宜諡醜繆公帝䇿諡曰孝䇿諡者不用博士議以詔䇿賜諡前司𨽻校尉𫝊𤣥卒異考曰𤣥傳曰五年遷太僕轉司𨽻景獻皇后崩坐爭位罵尚書免尋卒按景獻后崩在四年𤣥傳誤也𤣥性峻急每有奏劾或值日暮捧白簡整簪帶文選任昉彈曹景宗曰謹奉白簡以聞呂向注云簡略状也晉志曰古者執笏有事則書之故常簪筆今之白筆是其遺意三臺五省二品文官簮之帶革帶也古之鞶帶劾戸槩翻又戸得翻竦踊不寐坐而待旦由是貴游震懾周官師氏凡國之貴游子弟學焉注云貴游子弟王公之子弟游無官司者懾之渉翻臺閣生風𤣥與尚書左丞博陵崔洪善漢安帝分安平置博陵國洪亦清厲骨鯁好面折人過好呼到翻折之舌翻而退無後言人以是重之鮮卑樹機能久為邉患泰始六年樹機能為宼至是九年矣僕射李憙請發兵討之朝議皆以為出兵重事虜不足憂朝直遥翻下同五年春正月樹機能攻陷凉州凉州治武威帝甚悔之臨朝而歎曰誰能為我討此虜者為于偽翻司馬督馬隆進曰陛下能任臣臣能平之帝曰必能平賊何為不任顧方略何如耳隆曰臣願募勇士三千人無問所從來應募者或出於農畆或出於營伍或出於逋逃或出於奴𨽻皆不問其所從來也帥之以西虜不足平也帥讀曰率帝許之乙丑以隆為討虜䕶軍武威太守公卿皆曰見兵已多不宜横設賞募見賢遍翻横户孟翻隆小将妄言将即亮翻不足信也帝不聽隆募能引弓四鈞挽弩九石者取之三十斤為鈞四鈞為石石百二十斤立標簡試標表也自旦至日中得三千五百人隆曰足矣又請自至武庫選仗武庫令與隆忿爭晉志武庫令屬衛尉御史中丞劾奏隆自東漢至魏晉以中丞為御史臺主劾戸槩翻又户得翻隆曰臣當畢命戰場武庫令乃給以魏時朽仗非陛下所以使臣之意也帝命惟隆所取仍給三年軍資而遣之初南單于呼厨泉以兄於扶羅子豹為左賢王及魏武帝分匈奴為五部五部見上卷泰始六年以豹為左部帥帥所類翻豹子淵㓜而雋異師事上黨崔游博習經史嘗謂同門生上黨朱紀雁門范隆曰吾常耻隨陸無武絳灌無文隨陸遇高帝而不能建封侯之業絳灌遇文帝而不能興庠序之敎豈不惜哉隨陸隨何陸賈絳灌絳侯周勃灌将軍嬰於是兼學武事及長長知兩翻猨臂善射膂力過人姿貌魁偉為任子在洛陽王渾及子濟皆重之屢薦於帝帝召與語悦之濟曰淵有文武長才陛下任以東南之事吳不足平也孔恂楊珧曰非我族類其心必異左傳魯季文子曰史佚之志冇之非我族類其心必異珧余招翻淵才器誠少比然不可重任也少詩昭翻及凉州覆没帝問将於李憙對曰陛下誠能發匈奴五部之衆假劉淵一将軍之號使将之而西樹機能之首可指日而梟也使将即亮翻梟堅堯翻孔恂曰淵果梟樹機能則凉州之患方更深耳帝乃止東萊王彌家世二千石世語曰彌魏𤣥莵太守王頎之孫彌有學術勇略善騎射青州人謂之飛豹處士陳留董養見而謂之曰君好亂樂禍若天下有事不作士大夫矣言将為賊也處昌吕翻好呼到翻樂音洛淵與彌友善謂彌曰王李以鄉曲見知王渾太原人李憙上黨人與澗同州里每相稱薦適足為吾患耳因歔欷流涕歔音虚欷音希又吁既翻齊王攸聞之言於帝曰陛下不除劉淵臣恐并州不得久安王渾曰大晉方以信懷殊俗奈何以無形之疑殺人侍子乎何徳度之不𢎞也帝曰渾言是也㑹豹卒以淵代為左部帥劉淵事始此史言晉将有亂帥所類翻夏四月大赦除部曲督以下質任帝受禪之初除部曲将質任今又除部曲督質任質音致吳桂林太守修允卒桂林漢縣屬欝林郡吳主皓鳯凰三年分立桂林郡其部曲應分給諸将督将郭馬何典王族等累世舊軍不樂離别㑹吳主料實廣州戸口将即亮翻樂音洛料音聊馬等因民心不安聚衆攻殺廣州督虞授馬自號都督交廣二州諸軍事使典攻蒼梧族攻始興吳主皓甘露元年分桂陽南部都尉立始興郡秋八月吳以軍師張悌為丞相牛渚都督何植為司徒執金吾滕修為司空未拜更以修為廣州牧帥萬人從東道討郭馬帥讀曰率馬殺南海太守劉略逐廣州刺史徐旗吳主又遣徐陵督陶濬将七千人徐陵與洞浦對岸吳主權時呂範洞浦之敗魏臧霸度江攻徐陵全琮徐盛擊却之又華覈封徐陵亭侯則徐陵葢亭名吳以其臨江津置督守之南徐州記曰京口先為徐陵其地葢丹徒縣之西鄉京口里也從西道與交州牧陶璜共擊馬吳有鬼目菜生工人黄耉家有買菜生工人吳平家吳志曰鬼日菜依緣棗樹長丈餘莖廣四寸厚三分買菜高四尺厚二分如枇杷形莖廣尺八寸下莖廣五寸兩邉生葉緑色東觀案圖書吳有東觀令觀古玩翻名鬼目曰芝草買菜曰平慮草吳主以耉為侍芝郎平為平慮郎皆銀印青綬以漢制言之銀印青綬中二千石服之吳主每宴羣臣咸令沈醉沈持林翻又置黄門郎十人為司過宴罷之後各奏其闕失迕視謬言罔有不舉沈持林翻迕五故翻逆也大者即加刑戮小者記録為罪或剥人靣或鑿人眼由是上下離心莫為盡力為于偽翻益州刺史王濬上䟽曰孫皓荒淫凶逆宜速征伐若一旦皓死更立賢主則彊敵也更工衡翻臣作船七年泰始八年濬始作船至是葢七期年矣日有朽敗臣年七十死亡無日三者一乖則難圖也誠願陛下無失事機帝於是决意伐吳㑹安東将軍王渾表孫皓欲北上上時掌翻邉戍皆戒嚴朝廷乃更議明年出師王濬參軍何攀奉使在洛上䟽稱皓必不敢出宜因戒嚴掩取甚易易以豉翻杜預上表曰自閏月以來是年閏七月賊但敕嚴下無兵上吳自建業宼淮襄皆自下沂江而上上時掌翻以理埶推之賊之窮計力不兩完必保夏口以東以延視息凡人目不能視氣不能息則赫然死人矣無緣多兵西上空其國都而陛下過聽便用委棄大計縱敵患生誠可惜也嚮使舉而有敗勿舉可也今事為之制務從完牢若或有成則開太平之基不成不過費損日月之間何惜而不一試之若當須後年須待也天時人事不得如常臣恐其更難也今有萬安之舉無傾敗之慮臣心實了了决也不敢以曖昧之見自取後累曖時不明也累力瑞翻惟陛下察之旬月未報預復上表曰復扶又翻羊祜不先博謀於朝臣朝直遥翻而密與陛下共施此計故益令朝臣多異同之議凡事當以利害相校今此舉之利十有八九而其害一二止於無功耳必使朝臣言破敗之形亦不可得直是計不出已功不在身各耻其前言之失而固守之也此言指出賈充荀朂馮紞等肺腑自頃朝廷事無大小異意鋒起雖人心不同亦由恃恩不慮後患故輕相異同也自秋已來討賊之形頗露今若中止孫皓或怖而生計怖普布翻徙都武昌更完修江南諸城逺其居民城不可攻野無所掠則明年之計或無所及矣帝方與張華圍碁博物志曰堯造圍碁以敎子丹朱或曰舜以子商均愚故作圍碁以教之其法非智莫能也預表適至華推枰歛手曰推吐雷翻枰音平碁局也陛下聖武國富兵彊吳主淫虐誅殺賢能當今討之可不勞而定願勿以為疑帝乃許之以華為度支尚書量計運漕度徒洛翻量音良賈充荀朂馮紞固爭之紞吐感翻帝大怒充免冠謝罪僕射山濤退而告人曰自非聖人外寧必有内憂左傳晉大夫范文子之言今釋吳為外懼豈非筭乎山濤身為大臣不昌言於朝而退以告人葢求合於賈充者也冬十一月大舉伐吳遣鎮軍将軍琅邪王伷出涂中伷音胄吳主權作堂邑涂塘即其地葢從今滁州取真州路涂讀曰滁安東将軍王渾出江西今和州出横江渡路建威将軍王戎出武昌平南将軍胡奮出夏口鎮南大将軍杜預出江陵龍驤将軍王濬巴東監軍魯國唐彬下巴蜀監古銜翻東西凡二十餘萬命賈充為使持節假黄鉞大都督魏文帝以曹真都督中外諸軍事假黄鉞明帝大和四年司馬懿征蜀加號大都督此仍魏制也武王伐紂左杖黄鉞黄鉞天子之器非人臣所得専用故曰假使䟽吏翻以冠軍将軍楊濟副之冠古玩翻充固陳伐吳不利且自言衰老不堪元帥之任帥讀從所類翻詔曰君若不行吾便自出充不得已乃受節鉞将中軍南屯襄陽為諸軍節度馬隆西度温水武威之東有温圍水樹機能等以衆數萬據險拒之隆以山路陿隘乃作扁箱車陿與狹同車箱扁則可行狹路扁補典翻為木屋施於車上木屋所以蔽風雨捍矢石轉戰而前行千餘里殺傷甚衆或考異曰隆傳曰夾道累磁石賊被鐵鎧行不得前隆卒悉被犀甲無所留礙賊以為神按此説太誕恐不可信余謂磁石脅鐵鎧誠有此理自隆之西音問斷絶朝廷憂之或謂已没後隆使夜到使䟽吏翻帝撫掌歡笑詰朝召羣臣謂曰若從諸卿言無凉州矣詰去吉翻朝如字乃詔假隆節拜宣威将軍沈約志魏置将軍四十號宣威第二隆至武威鮮卑大人猝䟦韓且萬能帥萬餘落來降且子閭翻帥讀曰率降户江翻十二月隆與樹機能大戰斬之凉州遂平詔問朝臣以政之損益司徒左長史傅咸上書晉志司徒加置左右長史各一人朝直遥翻以為公私不足由設官太多舊都督有四今并監軍乃盈於十魏初置都督諸軍東南以備吳西以備蜀北以備胡隨其資望輕重而加以征鎮安平之號有四而已其後増置有都督鄴城守諸軍都督秦雍凉諸軍都督梁益諸軍都督荆州諸軍都督揚州諸軍都督徐州諸軍都督淮北諸軍都督豫州諸軍都督幽州諸軍都督并州諸軍凡十其資輕者為監軍禹分九州今之刺史幾向一倍時有司豫徐兖荆揚梁益寧交秦雍凉冀幽并青十八州刺史幾居希翻户口比漢十分之一漢元始之初民戸千三百二十三萬三千六百一十二口五千九百一十九萬四千九百七十八漢之極盛也桓帝之初戸二千六百七萬九百六口五千六萬六千八百五十六魏既幷蜀景元四年與蜀通計民戸九十四萬三千四百二十三口五百三十七萬二千八百九十一葢口猶及漢十分之一而戸則未幾及也而置郡縣更多虛立軍府動有百數而無益宿衛五等諸侯坐置官屬軍府謂驃騎車騎衛伏波撫軍都䕶鎮軍中軍典軍上軍撫國領軍䕶軍左右衛驍騎游擊左右前後軍及雜號将軍也五等諸侯官屬王置𫝊友文學郎中令中尉大農左右常侍侍郎典書典祠典衛學官等令典書丞治書中尉司馬世子庶子陵廟牧長謁者中大夫舍人典府公侯以下置官屬隨國小大無定制諸所廩給皆出百姓此其所以困乏者也當今之急在於并官息役上下務農而已咸𤣥之子也時又議省州郡縣半吏以赴農功中書監荀朂以為省吏不如省官省官不如省事省事不如清心昔蕭曹相漢載其清静民以寧一事見十三卷漢惠帝二年所謂清心也抑浮説簡文案略細苛宥小失有好變常以徼利者必行其誅所謂省事也好呼倒翻徼一遥翻以九寺併尚書蘭臺付三府所謂省官也九寺謂九卿寺也漢初九卿各有所掌東都以後尚書諸曹分掌衆軍九卿殆為具官故欲併之尚書蘭臺御史臺也三府三公府也漢丞相有長史司直御史大夫有中丞侍御史掌察舉非法故朂欲以蘭臺付之三府若直作大例凡天下之吏皆減其半恐文武衆官郡國職業劇易不同易以豉翻不可以一槩施之若有曠闕皆須更復或激而滋繁亦不可不重也資治通鑑卷八十
