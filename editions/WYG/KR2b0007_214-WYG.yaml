front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷二百十四宋司馬光撰胡三省音注唐紀三十起閼逢閹茂盡重光大荒落凡八年𤣥宗至道大聖大明孝皇帝中之中開元二十二年春正月己巳上發西京己丑至東都張九齡自韶州入見見賢遍翻都考異曰唐紀二年六月戊子至東己丑張九齡至自韶州今從實録求終䘮不許二月壬寅秦州地連震壞公私屋殆盡吏民壓死者四千餘人命左丞相蕭嵩賑恤壞音怪賑津忍翻方士張果自言有神仙術誑人云堯時為侍中於今數千嵗多往來恒山中恒山時屬定州恒陽縣界誑居况翻恒户登翻則天以來屢徴不至相州刺史韋濟薦之上遣中書舍人徐嶠齎璽書迎之相息亮翻璽斯氏翻庚寅至東都肩輿入宫恩禮甚厚張九齡請不禁鑄錢三月庚辰敕百官議之裴耀卿等皆曰一啟此門恐小人棄農逐利而濫惡更甚自武后以來民間多惡錢官不能禁祕書監崔沔曰若稅銅折役則官冶可成計估度庸則私鑄無利易而可久簡而難誣沔彌兖翻折之舌翻易以䜴翻且夫錢之為物貴以通貨利不在多何待私鑄然後足用也右監門録事參軍劉秩曰唐十六衛府皆有録事參軍正八品下掌受諸曹及五府之外府事句稽抄目印給紙筆監古衘翻夫人富則不可以賞勸貧則不可以威禁若許其私鑄貧者必不能為之臣恐貧者益貧而役於富富者益富而逞其欲漢文帝時吳王濞富埓天子鑄錢所致也事見十四卷漢文帝五年濞匹備翻埒力輟翻上乃止秩子𤣥之子也劉子𤣥即知幾避帝嫌名以字行夏四月壬辰以朔方節度使信安王禕兼闗内道采訪處置使増領涇原等十二州處昌吕翻吏部侍郎李林甫柔佞多狡數深結宦官及妃嬪家伺候上動靜無不知之伺相吏翻由是每奏對常稱㫖上恱之稱尺證翻時武惠妃寵幸傾後宫生夀王清諸子莫得為比太子浸疎薄林甫乃因宦官言於惠妃願盡力保䕶夀王惠妃徳之隂為内助由是擢黄門侍郎武考異曰舊傳云初侍中裴光庭妻三思女詭譎有材略與林甫私中官髙力士本出三思家及光庭卒武氏衘哀祈於力士請林甫代其夫位力士未敢言𤣥宗使中書令蕭嵩擇相久之以右丞韓休對𤣥宗然之乃令草詔力士遽漏於武氏乃令林甫白休休既入相甚徳林甫與嵩不和乃薦林甫堪為宰相恵妃隂助之因拜黄門侍郎𤣥宗眷遇益深按光庭妻一寡婦耳豈敢遽引所私代其夫為相韓休正直雖得林甫先報必不至薦之為相今不取五月戊子以裴耀卿為侍中張九齡為中書令林甫為禮部尚書同中書門下三品為李林甫得權太子廢張本顔真卿疏曰天寳已後閻官袁思藝日宣詔至中書𤣥宗動静必告林甫林甫先意奏請𤣥宗驚喜若神以此權柄恩寵日甚上種麥於苑中帥太子以下親往芟之帥讀曰率芟所衘翻謂曰此所以薦宗廟故不敢不親且欲使汝曹知稼穡艱難耳又徧以賜侍臣曰比遣人視田中稼多不得實故自種以觀之種藝之事天有雨暘之不時地有肥磽之不等而人力又有至不至故所收有厚薄之異也若人君不奪農時人得盡其力則地無遺利矣豈必待自種而觀其實哉六月壬辰幽州節度使張守珪大破契丹使疏吏翻下同契欺訖翻又音喫三考異曰實録守珪大破林胡按㑹要契丹事二十年守珪大破之盖實録以契丹即戰國時林胡地故云然遣使獻㨗薛王業疾病上憂之容髪為變為于偽翻七月己巳薨贈諡惠宣太子上以裴耀卿為江淮河南轉運使南考異曰舊紀云充江淮以囘造使今從舊食貨志於河口置輸場八月壬寅於輸場東置河隂倉西置柏崖倉髙宗咸亨二年於洛州河陽縣柏崖置倉開元十年廢今復因舊基置之三門東置集津倉西置鹽倉鑿漕渠十八里以避三門之險參考新舊志乃是鑿山開車路十八里非漕渠也先是舟運江淮之米至東都含嘉倉僦車陸運三百里至陜率兩斛用十錢耀卿令江淮舟運悉輸河隂倉更用河舟運至含嘉倉及太原倉自太原倉入渭輸闗中凡三嵗運米七百萬斛省僦車錢三十萬緡按舊制東都含嘉倉積江淮之米載以大輿運而西至于陜三百里率兩斛計庸錢千此耀卿所省之大數也十錢誤當從千錢為是先悉薦翻僦即就翻陜失冉翻更工衡翻考異曰舊志云四十萬貫今從耀卿傳舊志又云明年耀卿拜侍中蕭炅代焉按耀卿二十一年建此議今年為侍中始置河隂倉後三年方見成効則非作侍中時解此職也或説耀卿獻所省錢説式芮翻耀卿曰此公家贏縮之利耳奈何以之市寵乎悉奏以為市糴錢糴徙厯翻張果固請歸恒山制以為銀青光禄大夫號通𤣥先生厚賜而遣之後卒好異者奏以為尸解解佳買翻仙家所謂尸解譬猶蟬蜕蟬飛而蜕在也卒子恤翻好呼到翻上由是頗信神仙明皇改集仙為集賢殿是其初心不信神仙也至是則頗信矣又至晩年則深信矣史言正心為難漸入於邪而不自覺冬十二月戊子朔日有食之乙巳幽州節度使張守珪斬契丹王屈烈及可突干𫝊首𫝊考異曰舊守珪屈烈作屈刺契丹傅來年正月傅首今從實録時可突干連年為邊患趙含章薛楚玉皆不能討守珪到官屢擊破之可突干困迫遣使詐降守珪使管記王悔就撫之悔至其牙帳察契丹上下殊無降意降户江翻下同但稍徙營帳近西北密遣人引突厥謀殺悔以叛悔知之近其靳翻牙官李過折傅考異曰舊契丹作遇折今從實録及守珪傳與可突干分典兵馬爭權不叶悔説過折使圖之説式芮翻過折夜勒兵斬屈烈及可突干盡誅其黨帥餘衆來降帥讀曰率守珪出師紫䝉川據晉書載記秦漢之間東胡邑于紫䝉之野唐書地理志平州有紫䝉白狼昌黎等戍盖平州之北境契丹之南界也大閱以鎮撫之梟屈烈可突干首于天津之南梟堅堯翻突厥毗伽可汗為其大臣梅録啜所毒厥九勿翻伽求迦翻可從刋入聲汗音寒啜陟劣翻未死討誅梅録啜及其族黨既卒子伊然可汗立尋卒弟登利可汗立卒子恤翻舊史曰登利華言果報也伊考異曰舊傳伊然立詔宗正卿李詮弔祭冊立然為立碑廟無幾伊然病卒又立其弟為登利可汗按張九齡集敕登利可汗書云今又遣從叔金吾大將軍佺弔祭又云建碑立廟貽範紀功然則告䘮時登利已立矣實録銓亦作佺庚戌來告䘮禁京城匄者置病坊以廩之時病坊分置於諸寺以悲田養病本於釋教也匄古太翻二十三年春正月契丹知兵馬中郎李過折來獻㨗制以過折為北平王檢校松漠州都督同考異曰實録云幽州節度副大使舊傳云授特進檢校松漢州都督按過折雖有功唐未必肯使為幽州節度使今從舊傳乙亥上耕籍田九推乃止杜佑曰是年親耕有司進儀注天子三推公卿九推庶人終畝帝欲重耕籍遂進耕五十餘歩盡壠乃止推吐雷翻公卿以下皆終畝赦天下都城酺三日都城謂東都城酺音蒲上御五鳯樓酺宴觀者諠隘樂不得奏金吾白梃如雨不能遏隘烏懈翻梃待鼎翻上患之髙力士奏河南丞嚴安之為理嚴唐赤縣丞從七品理治也唐諱治改曰理為人所畏請使止之上從之安之至以手板繞場畫地曰犯此者死于是盡三日人指其畫以相戒無敢犯者時命三百里内刺史縣令各帥所部音樂集于樓下各較勝負帥讀曰率懷州刺史以車載樂工數百皆衣文繡服箱之牛皆為虎豹犀象之狀詩大東曰晥彼牽牛不以服箱注云服牝服也箱大車之箱也疏云兩較之間謂之箱甫田云乃求萬斯箱書傳云長幾充箱是車内容物之處丘氏曰服箱猶言駕車也衣於既翻魯山令元徳秀惟遣樂工數人連袂歌于蒍魯山古魯縣夏孔甲時豢龍氏劉累所遷之地漢為魯陽縣屬南陽郡後魏置魯陽郡隋復為魯縣屬汝州唐為魯山縣以縣有魯山故名于蒍者徳秀所為歌也蒍韋委翻今考異曰明皇雜録作于蒍新傳作于蒍于未詳其義從雜録上曰懷州之人其塗炭乎立以刺史為散官散官無職事散蘇旱翻徳秀性介潔質樸士大夫皆服其髙上美張守珪之功欲以為相張九齡諫曰宰相者代天理物非賞功之官也上曰假以其名而不使任其職可乎對曰不可惟名與器不可以假人君之所司也左傳記孔子之言且守珪纔破契丹陛下即以為宰相若盡滅奚厥奚厥謂奚與突厥厥九勿翻將以何官賞之上乃止二月守珪詣東都獻㨗拜右羽林大將軍兼御史大夫賜二子官賞賚甚厚賚來代翻初殿中侍御史楊汪既殺張審素事見上卷十九年更名萬頃更工衡翻審素二子瑝琇皆㓜瑝户肓翻又音皇琇音秀坐流嶺表尋逃歸謀伺便復讐伺相吏翻三月丁夘手殺萬頃於都城擊表於斧言父寃狀欲之江外殺與萬頃同謀陷其父者至汜水為有司所得汜音祀議者多言二子父死非罪穉年孝烈能復父讐宜加矜宥穉直利翻張九齡亦欲活之裴耀卿李林甫以為如此壞國法壞音怪上亦以為然謂九齡曰孝子之情義不顧死然殺人而赦之此塗不可啟也乃下敕曰國家設法期於止殺各伸為子之志誰非徇孝之人展轉相讐何有限極咎繇作士咎與臯同古勞翻繇與陶同餘招翻法在必行曾參殺人亦不可恕宜付河南府杖殺士民皆憐之為作哀誄牓於衢路為于偽翻誄魯水翻市人歛錢葬之於北邙恐萬頃家發之仍為疑冢數處多作冢以疑之使莫知其所𦵏之的處唐初公主實封止三百户中宗時太平公主至五千户率以七丁為限開元以來皇妹止千户皇女又半之皆以三丁為限駙馬皆除三品員外官而不任以職事公主邑入至少至不能具車服少詩沼翻左右或言其太薄上曰百姓租賦非我所有戰士出死力賞不過束帛女子何功而享多户邪且欲使之知儉嗇耳秋七月咸宜公主將下嫁咸宜公主下嫁楊洄始加實封至千户公主武恵妃之女也于是諸公主皆加至千户冬十月戊申突騎施冦北庭及安西撥换城騎竒寄翻閏月壬午朔日有食之長考異曰舊紀作十一月壬申朔按厯十一月壬子朔今從實録唐厯十二月乙亥冊故蜀州司户楊𤣥琰女為夀王妃為帝納妃於後宮以亂國張本云考異曰實録載冊文云𤣥璬長女按陳鴻長恨歌傳詔髙力士潜搜外宫得楊𤣥琰女於夀邸舊貴妃傳云𤣥琰女早孤養於叔父𤣥璬又云或奏𤣥琰女容色冠代宜䝉召見時妃衣道士服號太真新傳云始為夀王妃云云遂召内禁中即為自出妃意者匄籍女官號太真更為夀王娶韋昭訓女而太真得幸舊史葢諱之耳𤣥琰汪之曾孫也楊汪見一百八十三卷隋煬帝大業十二年是嵗契丹王過折為其臣湼禮所殺湼奴結翻為考異曰舊傳過折可突干餘黨泥裏所殺不云朝廷如何處置泥裏今据張九齡集有上賜契丹都督湼禮敕又有賜張守珪敕云湼禮自擅難以義責而未有名位恐其不安卿可宣示朝㫖使知無它也葢泥裏即湼禮也并其諸子一子刺乾奔安東得免刺盧逹翻乾音干開元二年移安東都䕶府於平州湼禮上言過折用刑殘虐衆情不安故殺之上赦其罪因以湼禮為松漠都督且賜書責之曰卿之蕃法多無義於君長長知兩翻自昔如此朕亦知之然過折是卿之王有惡輙殺之為此王者不亦難乎但恐卿為王後人亦爾常不自保誰願作王亦應防慮後事豈得取快目前突厥尋引兵東侵奚契丹湼禮與奚王李歸國擊破之二十四年春正月庚寅敕天下逃户聽盡今年内自首有舊産者令還本貫無者别俟進止踰限不首首式又翻當命専使搜求散配諸軍使疏吏翻北庭都䕶葢嘉運擊突騎施大破之葢古盍翻姓也二月甲寅宴新除縣令於朝堂上作令長新戒一篇賜天下縣令朝直遥翻長知兩翻庚午更皇子名更工衡翻皇考異曰舊紀唐厯二十三年七月景子太子諸王皆改名今從實録鴻曰瑛潭曰琮浚曰璵洽曰琰㳙曰瑶滉曰琬涺曰琚濰曰璲璲音遂澐曰璬璬公了翻澤曰璘清曰瑁瑁音冒洄曰玢玢方貧翻沐曰琦溢曰環沔曰理泚曰玼漼曰珪澄曰珙潓曰瑱瑱他甸翻漎曰璿璿從宣翻滔曰璥璥居影翻舊制考功貟外郎掌試貢舉人有進士李權陵侮貟外李昻議者以員外郎位卑不能服衆三月壬辰敕自今委禮部侍郎試貢舉人張守珪使平盧討擊使左騎衛將軍安禄山討奚契丹叛者擊使疏吏翻驍堅堯翻下同禄山恃勇輕進為虜所敗夏四月辛亥守珪奏請斬之禄山臨刑呼曰敗蒲邁翻呼火故翻大夫不欲滅奚契丹邪奈何殺禄山守珪亦惜其驍勇乃更執送京師張九齡批曰昔穰苴誅莊賈史記齊景公使司馬穰苴為將穰苴曰願得君之寵臣以監軍景公使莊賈往賈素驕貴穰苴與之約日中㑹于軍門夕時乃至穰苴以賈後期斬之以令三軍批匹迷翻判也今人謂之批判孫武斬宫嬪孫武以兵法見吴王闔廬吴王曰可以勒兵小試於婦人乎曰可於是出宮中美女百八十人分為二隊以王寵姬二人名為隊長皆令持㦸約束既布三令五申於是皷之右婦人大笑孫子曰約束不行申令不熟將之罪也復三令五申而皷之左婦人復大笑孫子斬左右隊長以狥用其次為隊長而復皷婦人左右前後跪起皆中䋲墨規矩於是吴王知孫子能用兵以為將守珪軍令若行禄山不宜免死上惜其才敕令免官以白衣將領將即亮翻九齡固爭曰禄山失律䘮師於法不可不誅且臣觀其貎有反相不殺必有後患䘮息浪翻相息亮翻上曰卿勿以王夷甫識石勒枉害忠良晉石勒年十四隨邑人行販洛陽倚嘯上東門王衍見而異之顧謂左右曰向者胡雛吾觀其聲視有竒志恐將為天下之患馳遣收之㑹勒已去竟赦之守考異曰𤣥宗實録四月辛亥張珪奏禄山統戎失律挫敗軍威請依軍法决斬許之禄山臨刑抗聲言曰兩蕃未和忍殺壮士豈為大夫謀也守珪以禄山嘗㨗於擒生聞其言遂捨之以聞肅宗實録云禄山為互市牙郎盗羊事發守珪怒追捕至欲擊殺之禄山大呼曰大夫不欲滅奚契丹兩蕃邪而殺壮士守珪竒其貌壮其言遂釋之姚汝能作禄山事迹其盗羊事與肅宗實録同又云二十一年守珪令禄山奏事中書令張九齡見之謂裴光庭曰亂幽州者此胡也又云二十四年禄山為平盧將討奚契丹失利守珪奏請斬之九齡批曰穰苴出征必誅荘賈孫武行令亦斬宫嬪守珪軍令若行禄山不宜免死𤣥宗惜其勇鋭但令免官白衣展効九齡奏請誅之𤣥宗曰卿豈以王夷甫識石勒使臆斷禄山難制邪竟不誅之孫樵作西齋録其序曰張守珪以安禄山叛者何貸刑咈教稔禍階也禄山乃張守珪部將嘗犯令張曲江令守珪斬之不從果使亂天下故書曰張守珪以安禄山叛舊張九齡傳云張守珪以禆將安禄山討奚契丹敗衂執送京師請行朝典九齡奏劾曰穰苴出軍必誅莊賈孫武教戰亦斬宫嬪守珪軍令必行禄山不宜免死上特捨之九齡奏曰禄山狼子野心面有逆相臣請因罪戮之冀絶後患上曰卿勿以王夷甫知石勒故事誤害忠良遂放歸蕃新傳語裴光庭事如事迹執送京師事如舊傳舊禄山傳盗羊事如事迹而無失利請斬事新傳亦然舊傳仍云二十年守珪為幽州節度使禄山盗羊事覺按裴光庭二十一年卒是年冬九齡乃為相云與光庭語誤也孫樵云曲江令守珪斬之尤為失實實録二十一年守珪猶在隴右與吐蕃立分界碑未至幽州舊傳云二十年為節度亦誤也按禄山若始為互市牙郎守珪安能知其終亂天下釋而不殺孫樵豈得以叛罪加之邪若如舊九齡傳守珪執送京師𤣥宗自赦之則守珪何罪而時人咎之也若謂盗羊䘮師兩次當死則禄山豈祇用辭而得免兩死邪若如𤣥宗實録守珪奏請行法得報聽許感其一言輙舍之則守珪必不敢輕易反覆如此且九齡何從而得見其面而云面有逆相邪若云守珪未嘗奏請行灋則張九齡集有賜守珪敕云禄山等輕我兵威曽不審料致令損失宜其就誅卿既行之軍灋合爾又賜平盧將士敕云安禄山之誅緣輕敵太過勿因此畏懦致失後圖是當時曽許之行誅矣若云守珪自捨之非𤣥宗意則又賜守珪敕云禄山勇而無謀遂至失利衣甲資盗挫我軍威論其輕敵合加重罪然初聞勇鬭亦有誅殺又冦戎未滅軍令從權故不以一敗棄之將欲收其後效也不行薄責又無所懲宜且停官令白衣將領卿更審量本状亦任隨事處之今以諸書參考葢禄山失律守珪奏請行灋故前敕云卿既行之軍灋合爾又云禄山之誅緣輕敵太過似謂守珪已誅之矣既而守珪感其言惜其驍勇欲殺則不忍欲捨則已先奏聞且恐不能厭服將士之心或者報未到故執送京師使上自裁之冀上見其材力而赦之亦猶陳平執樊噲衛青囚蘇建耳上因是欲赦之而九齡執奏云守珪軍令若行禄山不宜免死是并劾守珪不斷於閫外乃更執以諉上之辭也九齡因此見之而云面有逆相上終欲赦之故九齡不得已草敕云卿更審量本状隨事處之守珪得此敕即捨之以聞如此則與𤣥宗實録相應而於人情差似相近安禄山者本營州雜胡初名阿犖山其母巫也新書曰禄山本姓康其母居突厥中禱于軋犖山虜所謂戰鬬神者而生禄山故以為字從母冐姓安氏阿烏葛翻犖吕角翻父死母擕之再適突厥安延偃㑹其部落破散與延偃兄子思順俱逃來故冐姓安氏名禄山又有史窣干者窣蘇骨翻與禄山同里閈先後一日生按考異曰舊傳云思明除日生禄山元日生禄山事迹天寳十載正月二十日上及貴妃為禄山作生日今不取及長相親愛皆為互市牙郎以驍勇聞牙郎駔儈也南北物價定於其口而後相與貿易張守珪以禄山為捉生將禄山每與數騎出輙擒契丹數十人而返狡猾善揣人情將即亮翻騎竒寄翻揣初委翻守珪愛之養以為子窣干嘗負官債亡入奚中為奚遊奕所得欲殺之窣干紿曰我唐之和親使也紿湯亥翻使疏吏翻汝殺我禍且及汝國遊奕信之送詣牙帳窣干見奚王長揖不拜奚王雖怒而畏唐不敢殺以客禮館之館古玩翻使百人隨窣干入朝窣干謂奚王曰王遣人雖多觀其才皆不足以見天子聞王有良將瑣髙者何不使之入朝瑣髙者葢奚中酋豪之號非人名也前已有李詩瑣髙将即亮翻朝直遥翻奚王即命瑣髙與牙下三百人隨窣干入朝窣干將至平盧先使人謂軍使裴休子曰奚使𤨏髙與精鋭俱來聲云入朝實欲襲軍城宜謹為之備先事圖之休子乃具軍容出迎至館悉阬殺其從兵執瑣髙送幽州使疏吏翻先悉薦翻從才用翻張守珪以窣干為有功奏為果毅累遷將軍後入奏事上與語悦之賜名思明安史事始此故連州司馬武攸望之子温眘坐交通權貴杖死帝平韋氏武攸望貶死眘時刅翻乙丑朔方河東節度使信安王禕貶衢州刺史廣武王承宏貶房州别駕涇州刺史薛自勸貶澧州别駕皆坐與温眘交遊故也承宏守禮之子也􅃎王守禮章懷太子賢之子辛未蒲州刺史王琚貶通州刺史坐與禕交書也五月醴泉妖人劉志誠作亂驅掠路人將趣咸陽妖於喬翻趣七喻翻村民走告縣官焚橋斷路以拒之斷音短其衆遂潰數日悉擒斬之六月初分月給百官俸錢初上因籍田赦命有司議増宗廟籩豆之薦及服紀未通者太常卿韋縚奏請宗廟每坐籩豆十二縚土刀翻坐徂臥翻兵部侍郎張均職方郎中韋述議曰聖人知孝子之情深而物類之無限故為之節制人之嗜好本無憑凖宴私之饌與時遷移故聖人一切同歸於古屈到嗜芰屈建不以薦以為不以私欲干國之典國語楚屈到嗜芰有疾召其宗老而屬之曰祭我必以芰及祥宗老將薦芰屈建命去之曰國君有牛享大夫有羊饋士有豚犬之奠庶人有魚炙之薦籩豆脯醢則上下共之不羞珍異不陳庶侈不以其私欲干國之典遂不用芰竒寄翻菱一名芰説文曰楚謂之芰秦謂之薢茩今俗但言蓤芰武陵記四角三角曰芰兩角曰蓤好呼到翻去𦍑吕翻今欲取甘㫖肥濃皆充祭用茍踰舊制其何限焉書曰黍稷非馨明徳惟馨書成王命君陳之言若以今之珍饌平生所習求神無方何必泥古則簠簋可去而盤盂盃按當在御矣韶濩可息而箜􅔃箏笛當在奏矣舜樂曰韶湯樂曰濩箜􅔃漢武帝使樂人侯調所作或云侯輝所作今按其形似瑟而小七絃用撥彈之如琵琶舊唐書曰箜􅔃胡樂也漢靈帝好之體曲而長二十三絃豎抱于懐用兩手齊奏俗名擘箜􅔃鳯首箜􅔃有項加軫七絃鄭善子作開元中進形如阮咸其下缺小而身大旁有小缺取其身便也一曰箜􅔃乃鄭衛之音權輿以其亡國之聲故號空國之侯亦曰坎侯風俗通云漢武帝時丘仲作笛按周禮笙師掌敎箎篴又云起於羌人後漢馬融所賦横笛空洞無底剡其二孔五孔一出其背正似今之尺八李善為之注七孔今一尺四寸此乃今之横笛耳太常鼔吹部中所謂横吹非融所賦者融賦易京君明識音律故本四孔加以一君明所加孔後出是謂商聲五音畢沈約宋書亦云京房備其五音周禮笙師注杜子春云篴乃今時所吹五孔篴以融約所記論之則古篴不應有五孔子春之說亦未為然今三禮圖畫篴亦横設而有五孔不知出何典據篴與笛同簠音甫簋居洧翻既非正物後嗣何觀夫神以精明臨人者也不求豐大茍失於禮雖多何為豈可廢棄禮經以從流俗且君子愛人以禮不求茍合况在宗廟敢忘舊章太子賔客崔沔議曰祭祀之興肇於太古茹毛飲血則有毛血之薦未有麴糵則有𤣥酒之奠司烜氏以鑒取明水於月為𤣥酒糵魚列翻施及後王禮物漸備施弋智翻然以神道致敬不敢廢也籩豆簠簋樽罍之實皆周人之時饌也其用通於宴饗賔客而周公制禮與毛血𤣥酒同薦鬼神國家由禮立訓因時制範清廟時饗禮饌畢陳用周制也如簠簋籩豆鉶羮之類饌雛戀翻又雛晥翻園陵上食時膳具設遵漢法也如叔孫通請薦含桃之類上時掌翻職貢來祭致逺物也有新必薦順時令也苑囿之内躬稼所收蒐狩之時親發所中莫不薦而後食盡誠敬也若此至矣復何加焉中竹仲翻復扶又翻但當申敕有司無或簡怠則鮮美肥濃盡在是矣不必加籩豆之數也自此以上諸人之議皆因舊禮而申之上固欲量加品味量音良縚又奏每室加籩豆各六四時各實以新果珍羞從之縚又奏䘮服舅緦麻三月從母外祖父母皆小功五月外祖至尊同於從母之服姨舅一等服則輕重有殊姨即從母也從才用翻堂姨舅親即未踈恩絶不相為服舅母來承外族不如同㸑之禮竊以古意猶有所未暢者也請加外祖父母為大功九月姨舅皆小功五月堂舅堂姨舅母並加至袒免五服止於緦麻此外有袒免之服􅃝者偏脱衣䄂而露其肩免者以布廣一寸從項申而前交於額上又却向後繞於䯻􅃝音但免音問崔沔議曰正家之道不可以貳總一定義理歸本宗是以内有齊斬齊音咨外皆緦麻尊名所加不過一等此先王不易之道也願守八年明㫖一依古禮崔沔所謂詔㫖見二百十二卷七年曰八年者通帝即位先天之年數之也以為萬代成法韋述議曰䘮服傳曰禽獸知母而不知父野人曰父母何等焉都邑之士則知尊禰矣傳直戀翻禰奴禮翻大夫及學士則知尊祖矣聖人究天道而厚於祖禰繫族姓而親其子孫母黨比於本族不可同貫明矣今若外祖與舅加服一等堂舅及姨列於服紀則中外之制相去幾何廢禮徇情所務者末古之制作者知人情之易揺恐失禮之將漸别其同異輕重相懸易以䜴翻别彼列翻欲使後來之人永不相雜㣲㫖斯在豈徒然哉茍可加也亦可減也往聖可得而非則禮經可得而隳矣先王之制謂之彛倫彛常也倫道理次叙奉以周旋猶恐失墜一紊其叙庸可止乎請依議禮䘮服為定紊音問禮部員外郎楊仲昌議曰唐禮部郎掌五禮舉其儀制而辯其名數鄭文貞公魏徵始加舅服至小功五月雖文貞賢也而周孔聖也以賢改聖後學何從竊恐内外乖序親疎奪倫情之所㳂何所不至昔子路有姊之䘮而不除孔子曰先王制禮行道之人皆不忍也子路除之見記檀弓此則聖人援事抑情之明例也記曰毋輕議禮禮器之言明其蟠於天地並彼日月賢者由之安敢損益也敕姨舅既服小功舅母不得全降宜服緦麻堂姨舅宜服袒免均説之子也説讀曰悦秋八月壬子千秋節羣臣皆獻寳鏡張九齡以為以鏡自照見形容以人自照見吉凶乃述前世興廢之源為書五卷謂之千秋金鏡録上之上時掌翻上賜書褒美甲寅突騎施遣其大臣胡禄逹干來請降許之騎竒寄翻降户江翻御史大夫李適之承乾之孫也以才幹得幸於上數為承乾論辯甲戍追贈承乾恒山愍王承乾廢見一百九十七卷太宗貞觀十七年數所角翻為于偽翻恒户登翻乙亥汴哀王璥薨冬十月戊申車駕發東都先是敕以來年二月二日行幸西京先悉薦翻㑹宫中有恠明日上召宰相即議西還裴耀卿張九齡曰今農收未畢請俟仲冬李林甫潜知上指二相􅅲林甫獨留言於上曰長安洛陽陛下東西宫耳往來行幸何更擇時借使妨於農收但應蠲所過租税而已蠲圭𤣥翻臣請宣示百司即日西行上恱從之過陜州以刺史盧奐有善政題贊於其聽事而去稱人之美曰費陜失冉翻聽讀曰㕔奐懷慎之子也丁卯至西京朔方節度使牛仙客前在河西能節用度勤職業倉庫充實器械精利上聞而嘉之欲加尚書張九齡曰不可尚書古之納言唐興以來惟舊相及敭厯中外有徳望者乃為之仙客本河湟使典事見上卷十五年相息亮翻使疏吏翻今驟居清要恐羞朝廷上曰然則但加實封可乎對曰不可封爵所以勸有功也邊將實倉庫修器械乃常務耳將即亮翻不足為功陛下賞其勤賜之金帛可也裂土封之恐非其宜上黙然李林甫言於上曰仙客宰相才也何有於尚書九齡書生不逹大體仙考異曰舊林甫傳曰林甫以九齡言告客仙客翌日見上泣讓官爵按時不聞仙客在京今從唐厯上悦明日復以仙客實封為言復扶又翻九齡固執如初上怒變色曰事皆由卿邪九齡頓首謝曰陛下不知臣愚使待罪宰相事有未允臣不敢不盡言上曰卿嫌仙客寒㣲如卿有何閥閲九齡曰臣嶺海孤賤九齡韶州人不如仙客生於中華牛仙客涇州人然臣出入臺閣典司誥命有年矣九齡厯司勲員外郎中書舍人仙客邊隅小吏目不知書若大任之恐不愜衆望愜苦叶翻林甫􅅲而言曰茍有才識何必辭學天子用人有何不可十一月戊戌賜仙客爵隴西縣公食實封三百户初上欲以李林甫為相問於中書令張九齡九齡對曰宰相繫國安危陛下相林甫臣恐異日為廟社之憂上不從時九齡方以文學為上所重林甫雖恨猶曲意事之侍中裴耀卿與九齡善林甫并疾之是時上在位嵗久漸肆奢欲怠於政事而九齡遇事無細大皆力爭林甫巧伺上意日思所以中傷之伺相吏翻中竹仲翻上之為臨淄王也趙麗妃皇甫徳儀劉才人皆有寵帝置六儀徳儀其一也麗妃生太子瑛徳儀生鄂王瑶才人生光王琚及即位幸武恵妃麗妃等愛皆弛恵妃生夀王瑁寵冠諸子太子與瑶琚㑹於内第時太子諸王皆居禁中冠古玩翻各以母失職有怨望語駙馬都尉楊洄尚咸宜公主常伺三子過失以告恵妃咸宜公主武恵妃之女故楊洄黨於恵妃惠妃泣訴於上曰太子隂結黨與將害妾母子亦指斥至尊上大怒以語宰相欲皆廢之語牛倨翻九齡曰陛下踐阼垂三十年太子諸王不離深宫離力智翻日受聖訓天下之人皆慶陛下享國久長子孫蕃昌蕃音煩今三子皆已成人不聞大過陛下奈何一旦以無根之語喜怒之際盡廢之乎且太子天下本不可輕揺昔晉獻公聽驪姬之讒殺申生三世大亂左傳晉獻公殺其世子申生立驪姬之子里克殺之公子夷吾重耳及子圉爭國三世大亂漢武帝信江充之誣罪戾太子京城流血事見漢紀晉惠帝用賈后之讚廢愍懷太子中原塗炭事見晉紀隋文帝納獨孤后之言黜太子勇立煬帝遂失天下事見隋紀由此觀之不可不慎陛下必欲為此臣不敢奉詔上不恱林甫初無所言退而私謂宦官之貴幸者曰此主上家事何必問外人上猶豫未决惠妃密使官奴牛貴兒謂九齡曰有廢必有興公為之援宰相可長處九齡叱之以其語白上上為之動色處昌吕翻上為于偽翻故訖九齡罷相太子得無動林甫日夜短九齡於上上浸疎之考異曰明皇雜録云林甫請見屢陳仙客實封九齡頗懐誹謗于時方秋上命髙力士以白羽扇賜之九齡惶恐作賦以獻新傳亦云然按實録仙客加實封在十月而九齡集白羽扇賦序云開元二十四年夏盛暑奉敕使大將軍髙力士賜宰相白羽扇九齡預焉竊有所感立獻賦云云敕報曰朕近賜羽扇聊以滌暑佳彼勁翮方資用利與夫棄捐篋笥義不同也然則上以盛夏遍賜宰臣扇非以秋日獨賜九齡但九齡因此獻賦自寄意耳林甫引蕭炅為户部侍郎炅素不學炅古廻翻嘗對中書侍郎嚴挺之讀伏臘為伏獵挺之言於九齡曰省中豈容有伏獵侍郎由是出炅為岐州刺史故林甫怨挺之九齡與挺之善欲引以為相嘗謂之曰李尚書方承恩李林甫時以禮部尚書相足下宜一造門與之欵䁥挺之素負氣薄林甫為人竟不之詣林甫恨之益深挺之先娶妻出之更嫁蔚州刺史王元琰元琰坐贓罪下三司按鞫挺之為之營解林甫因左右使於禁中白上上謂宰相曰挺之為罪人請屬所由造七到翻更工衡翻蔚紆勿翻下遐嫁翻為于偽翻屬之欲翻九齡曰此乃挺之出妻不宜有情上曰雖離乃復有私復扶又翻下無復同於是上積前事以耀卿九齡為阿黨壬寅以耀卿為左丞相九齡為右丞相並罷政事以林甫兼中書令仙客為工部尚書同中書門下三品領朔方節度如故仙考異曰唐厯曰宰相遥領節度自客始按蕭嵩已遥領河西非始此嚴挺之貶洺州刺史舊志洺州京師東北一千五百八十五里王元琰流嶺南上即位以來所用之相姚崇尚通宋璟尚法張嘉貞尚吏張說尚文李元紘杜暹尚儉韓休張九齡尚直各其所長也九齡既得辠自是朝廷之士皆容身保位無復直言李林甫欲蔽塞人主視聽自専大權明召諸諫官謂曰今明主在上羣臣將順之不暇烏用多言諸君不見立仗馬乎食三品料一鳴輙斥去悔之何及塞悉則翻去羌吕翻唐舊儀每日尚乘以廐馬八匹分為左右廂立於正殿側宫門外俟仗下即散若大陳設則馬在樂懸之北與大象相次進馬二人戎服執鞭侍立于馬之左隨馬進退補闕杜璡嘗上書言事璡資辛翻上時掌翻考異曰唐厯作杜珽今從新書明日黜為下邽令唐制上縣令從六品上補闕從七品上以此言之則非黜也葢唐人重内官而品之髙下不論也况遺補供奉言地居清要乎自是諫爭路絶矣牛仙客既為林甫所引専給唯諾而已爭讀曰諍唯于癸翻然二人皆謹守格式百官遷除各有常度雖竒才異行不免終老常調其以巧謟邪險自進者則超騰不次自有它蹊矣林甫城府深密人莫窺其際好以甘言㗖人而隂中傷之不露辭色凡為上所厚者始則親結之及位埶稍逼輙以計去之行下孟翻調徒弔翻中竹仲翻去羌吕翻雖老奸巨猾無能逃於其術者如韋堅楊慎矜王鉷之類是也二十五年春正月初置𤣥學博士崇𤣥學習老子莊子文子列子亦曰道舉每嵗依明經舉二月敕曰進士以聲韵為學多昧古今明經以帖誦為功罕窮㫖趣自今明經問大義十條對時務策三首進士試大經十帖戊辰新羅王興光卒卒子恤翻子承慶襲位乙酉幽州節度使張守珪破契丹於捺禄山使疏吏翻契欺訖翻又音喫捺奴軋翻己亥河西節度使崔希逸襲吐蕃破之於青海西初希逸遣使謂吐蕃乞力徐曰兩國通好今為一家何必更置兵守捉妨人耕牧請皆罷之乞力徐曰常侍忠厚吐從暾入聲崔希逸葢帶散騎常侍鎮河西故稱之使疏吏翻好呼到翻捉反角翻言必不欺然朝廷未必専以邊事相委萬一有姦人交闘其間掩吾不備悔之何及希逸固請乃刑白狗為盟各去守備于是吐蕃畜牧被野朝直遙翻去羌吕翻被皮義翻畜許救翻時吐蕃西擊勃律勃律來告急上命吐蕃罷兵吐蕃不奉詔遂破勃律上甚怒㑹希逸傔人孫誨入奏事傔苦念翻傔從也唐制凡諸軍鎮大使副使以下皆有傔人别奏以為之使大使傔二十五人别奏十人副使傔二十人别奏八人自欲求功奏稱吐蕃無備請掩擊必大獲上命内給事趙惠琮與誨偕往審察事宜唐内侍省有内給事十人從五品下掌承㫖勞問分判省事凡元日冬至百官賀皇后則出入宣傳宫人衣服費用則具品秩計其多少春秋宣送中書惠琮等至則矯詔令希逸襲之希逸不得已發兵自凉州南入吐蕃二千餘里至青海西與吐蕃戰大破之斬首二千餘級乞力徐脱身走惠琮誨皆受厚賞自是吐蕃復絶朝貢復扶又翻下而復同朝直遥翻夏四月辛酉監察御史周子諒彈牛仙客非才引䜟書為證薛居正五代史曰天后朝有䜟辭云首尾三鱗六十年兩角犢子自狂顛龍蛇相鬬血成川當時好事者解云兩角犢子牛也必有牛姓干唐祚監古衘翻彈徒丹翻上怒命左右㩧于殿庭㩧蒲角翻擊也又匹角翻絶而復蘇仍杖之朝堂流瀼州至藍田而􅋱瀼如羊翻又而章翻藍田縣漢晉屬京兆後魏真君七年併入霸城太和十一年復後周置藍田郡隋廢郡為縣屬京兆府九域志在府東南七十里此考異曰舊紀云子諒以妄陳休咎於朝堂决殺實録月則曰子諒彈奏仙客非才引妖䜟為證上怒召入禁中責之左右拉者數四氣絶而蘇及仙客傳則云子諒竊言於御史大夫李適之曰牛仙客不才濫登相位大夫國之懿親豈得坐觀其事適之遽奏子諒之言上大怒廷詰子諒子諒辭窮於朝堂决杖配流瀼州行至藍田死舊仙客傳亦然今從此月實録及舊紀栁宗元周君墓碣云有唐貞臣汝南周氏諱某字某又曰在天寳年有以諂䛕至相位賢臣放退公為御史抗言以白其事得死于墀下宗元集此碣雖無名字然其事則子諒也云在天寳年誤矣李林甫言子諒張九齡所薦也甲子貶九齡荆州長史楊洄又奏太子瑛鄂王瑶光王琚云與太子妃兄駙馬薛鏽潜搆異謀鏽息六翻又息救翻薛考異曰新傳曰二十五年洄復搆瑛瑶琚與妃之兄鏽異謀惠妃使人詭召太子二王曰宫中有賊請介以入太子從之妃白帝曰太子二王謀反甲而來帝使中人視之如言遽召宰相林甫議答曰陛下家事非臣所宜豫帝意决乃廢瑛等按瑛等與恵妃相猜忌已久雖承妃言豈肯遽被甲入宫又按廢太子制書云䧟元良於不友誤二子於不義不言被甲入宫也盖洄譛瑛等云欲害夀王瑁耳今從舊傳但云潜搆異謀上召宰相謀之李林甫對曰此陛下家事非臣等所宜豫上意乃决乙丑使宦者宣制於宫中廢瑛瑶琚為庶人於宫中廢之用李林甫家事之言也庶考異曰獨孤及作裴稹行状云公為起居郎三人以罪廢夀王以母寵子愛議者頗有奪宗之嫌道路憫黙朝野疑愳公乃從容請間慷慨獻諫上述新城之敫鑒下陳戾園之元龜謂興亡之由在廢立之地天子感悟改容以謝因詔以給事中授公公曰陛下絶招諫之路為日固久今臣一言而荷殊寵則言者衆矣何以錫之上善其敏而多其讓乃止不拜尋除尚書禮部貟外郎按稹光庭之子當是時周子諒杖死張九齡逺貶稹若敢為太子直寃則聲振宇宙豈得湮沒無聞而諸書皆不言此事葢出於及之虚美耳流鏽於瀼州瑛瑶琚尋賜死城東驛鏽賜死於藍田瑶琚皆好學有才識死不以罪人皆惜之好呼到翻丙寅瑛舅家趙氏妃家薛氏瑶舅家皇甫氏坐流貶者數十人惟瑶妃家韋氏以妃賢得免五月夷州刺史楊濬坐贓當死上命杖之六十流古州夷州漢牂柯地其後為徼外隋開置綏陽縣屬明陽郡武徳四年置夷州於思州寧夷縣明陽屬焉而綏陽屬義州貞觀元年廢夷州而明陽寧夷屬務州四年復置夷州於黔州都上縣尋又自都上移於綏陽貞觀十二年李𢎞節開夷獠置古州屬容州都督府左丞相裴耀卿上疏以為决杖贖死恩則甚優解體受笞事頗為辱止可施之徒𨽻不當及於士人上從之癸未敕以方隅底定令中書門下與諸道節度使量軍鎮閑劇利害審計兵防定額於諸色征人及客户中召募丁壯長充邊軍増給田宅務加優恤辛丑上命有司選宗子有才者授以臺省及法官京縣官敇曰違道慢常義無私於主法修身効節恩豈薄於它人期於帥先勵我風俗帥讀曰率秋七月己夘大理少卿徐嶠岵考異曰舊紀作徐今從刑法志通典奏今嵗天下斷死刑五十八大理獄院由來相傳殺氣太盛鳥雀不栖今有鵲巢其樹于是百官以幾致刑措上表稱賀斷丁亂翻幾居依翻上時掌翻上歸功宰輔庚辰賜李林甫爵晉國公牛仙客􅃎國公異考曰實録七月戊寅有司奏囚減少上歸美宰臣制曰斷獄五十殆至無刑遂封二人又十月丙午上因聽政問京城囚徒有司奏有五十人怡然有喜色下制曰日者叢棘之地烏鵲來巢今結諸刑名纔逾五十其刑部侍郎鄭少㣲等各賜中上考二者未詳其為一事二事今從舊紀上命李林甫牛仙客與法官刪修律令格式成九月壬申頒行之先是西北邊數十州多宿重兵先悉薦翻地租營田皆不能贍贍而艶翻始用和糴之法有彭果者因牛仙客獻策請行糴法於闗中戊子敕以嵗稔榖賤傷農命増時價什二三和糴東西畿粟各數百萬斛東畿都畿也西畿京畿也糴他厯翻停今年江淮所運租自是闗中蓄積羡溢羡延面翻車駕不復幸東都矣復扶又翻癸巳敕河南北租應輸含嘉太原倉者據李泌傳太原倉在陜州西皆留輸本州太常博士王璵璵音余璵考異曰舊傳不言鄉里世系新傳云方慶六世孫又新舊傳皆云抗疏請置春壇因遷太常博士不知其本何官也新表王方慶五世孫璵事肅宗按方慶長安二年卒距此才三十六年不應已有五世六世孫能上疏恐璵偶與之同名實非也今不取上疏請立青帝壇以迎春從之冬十月辛丑制自今立春親迎春於東郊時上頗好祀神鬼好呼到翻故璵專習祠祭之禮以干時上恱之以為侍御史領祠祭使璵祈禱或焚紙錢類巫覡漢以來䘮𦵏有瘞錢後世俚俗稍以紙寓錢為鬼事使疏吏翻覡刑狄翻習禮者羞之壬申上幸驪山温泉乙酉還宫己丑開府儀同三司廣平文貞公宋璟薨十二月丙午惠妃武氏薨贈諡貞順皇后是嵗命將作大匠康諐素之東都毁明堂諐與愆同籕文也新書禮樂志作諐素諐素上言毁之勞人請去上層去羌吕翻卑於舊九十五尺仍舊為乾元殿從之初令租庸調租資課調徒弔翻皆以土物輸京都西京東都租庸調髙祖太宗之法租資課必開元以來之法二十六年春正月乙亥以牛仙客為侍中丁丑上迎氣於滻水之東滻音産制邊地長征兵召募向足自今鎮兵勿復遣復扶又翻在彼者縱還今天下州縣里别置學壬辰以李林甫領隴右節度副大使以鄯州都督杜希望知留後鄯時戰翻又音善二月乙夘以牛仙客兼河東節度副大使牛仙客先已領朔方今兼河東己未葬貞順皇后于敬陵武恵妃諡貞順皇后敬陵在京兆萬年縣東南四十里壬戌敇河曲六州胡坐康待賔散𨽻諸州者聽還故土於鹽夏之間置宥州以處之徙六胡州見二百十二卷十年今併六胡州之地以為宥州舊志宥州去京師二千一百里夏户雅翻處昌吕翻三月吐蕃冦河西節度使崔希逸擊破之鄯州都督知隴右留後杜希望攻吐蕃新城㧞之以其地為威戎軍鄯州星宿川西北三百五十里有威戎軍考異曰舊傳作威武軍今從實録置兵一千戌之夏五月乙酉李林甫兼河西節度使已領隴右又兼河西丙申以崔希逸為河南尹希逸自念失信於吐蕃以背乞力徐之盟也内懷愧恨未幾而卒幾居豈翻太子瑛既死李林甫數勸上立夀王瑁上以忠王璵年長且仁孝恭謹又好學意欲立之猶豫嵗餘不决自念春秋浸髙三子同日誅死繼嗣未定常忽忽不樂寢膳為之減髙力士乘間請其故數所角翻長知兩翻好呼到翻樂音洛為于偽翻間古莧翻上曰汝我家老奴豈不能揣我意揣初委翻力士曰得非以郎君未定邪上曰然對曰大家何必如此虚勞聖心但推長而立長知兩翻肅考異曰統紀叙力士語云但從大枒注謂宗也大枒語不可曉今從新傳誰敢復爭復扶又翻上曰汝言是也汝言是也由是遂定六月庚子立璵為太子辛丑以岐州刺史蕭炅為河西節度使總留後事鄯州都督杜希望為隴右節度使太僕卿王昱為劒南節度使昊考異曰舊傳作王今從實録唐厯分道經略吐蕃仍毁所立赤嶺碑立碑見上卷二十一年突騎施可汗蘇禄素亷儉毎攻戰所得輙與諸部分之不留私蓄由是衆樂為用樂音洛既尚唐公主又潜通突厥及吐蕃突厥吐蕃各以女妻之蘇禄以三國女為可敦又立數子為葉䕶用度浸廣由是攻戰所得不復更分晚年病風一手攣縮妻七細翻復扶又翻下面復同攣閭緣翻諸部離心酋長莫賀逹干都摩度兩部最彊酋慈由翻長知兩翻新考異曰㑹要作莫賀咄逹干今從實録傳作都摩支今從實録舊傳其部落又分為黄姓黑姓互相乖阻突騎施種人自謂娑葛後者為黄姓蘇禄部為黒姓于是莫賀逹干勒兵夜襲蘇禄殺之都摩度初與莫賀逹干連謀既而復與之異立蘇禄之子骨啜為吐火仙可汗以收其餘衆與莫賀逹干相攻莫賀逹干遣使告磧西節度使葢嘉運磧七迹翻上命嘉運招集突騎施㧞汗那以西諸國吐火仙與都摩度據碎葉城黑姓可汗爾微特勒據怛邏斯城碎葉川長千里西屬怛邏斯城其城初屬石國石常分兵鎮之葢古盍翻騎竒寄翻可從刋入聲汗音寒怛當割翻邏郎佐翻考異曰唐厯作怛邏斯今從實録相與連兵以拒唐太子將受冊命儀注有中嚴外辦及絳紗袍唐制皇帝大祀致齋之日晝漏上水一刻侍中版奏請中嚴諸衛入陳于殿庭文武五品已上袴褶陪位諸侍從之官服其器服諸侍臣齋者結佩詣閤奉迎二刻侍中版奏外辦乘輿乃出朝㑹諸衛立仗百官就列已定侍中亦奏外辦不請中嚴皇帝将出駕發前七刻擊三皷爲一嚴前五刻擊二皷為再嚴侍中版奏請中嚴有司陳鹵簿前二刻擊三皷為三嚴諸衛以次入立于殿庭羣官立朝堂侍中中書令已下奉迎于西階侍中奉寳乘黄令進路於太極殿西階南向于牛將軍執長刀立路前北向黄門侍郎立侍臣之前者二人既外辦太僕卿攝衣而升正立執轡乘輿出升路太后皇后亦有中嚴外辦皆尚儀版奏皇太子中嚴外辦左庶子版奏皇帝冠通天冠則服絳紗袍冬至受朝賀祭還燕羣臣養老之服也太子冠逺遊冠亦服絳紗袍謁廟還宫元日朔日入朝釋奠之服也太子嫌與至尊同稱表請易之左丞相裴耀卿奏停中嚴改外辦曰外備改絳紗袍為朱明服秋七月己巳上御宣政殿冊太子異考曰元載肅宗實録云二十七年七月壬辰行典禮今從𤣥宗實録故事太子乘輅至殿門至是太子不就輅自其宫歩入是日赦天下己夘冊忠王妃韋氏為太子妃杜希望將鄯州之衆奪吐蕃河橋築鹽泉城於河左吐蕃發兵三萬逆戰希望衆少不敵將即亮翻又音如字鄯音善又時戰翻吐從暾入聲少始紹翻將卒皆懼左威衛郎將王忠嗣帥所部先犯其陳所向闢易殺數百人虜陳亂將即亮翻嗣祥吏翻帥讀曰率陳讀曰陣希望縱兵乘之虜遂大敗置鎮西軍於鹽泉鎮西軍在河州西百八十里忠嗣以功遷左金吾將軍八月辛巳勃海王武藝卒子欽茂立九月丙申朔日有食之初儀鳯中吐蕃陷安戎城而據之初劒南度茂州之西築安戎城戌之以迮吐蕃南鄙生羌導吐蕃取之因守之遂并西洱河諸蠻東與松茂嶲接其地險要唐屢攻之不克劒南節度使王昱築兩城於其側頓軍蒲婆嶺下新舊作蓬婆嶺其地在雪山外杜甫詩所謂次取蓬婆雪外城是也運資糧以逼之吐蕃大發兵救安戎城昱衆大敗死者數千人人考異曰舊傳將士數萬皆沒于賊今從實録昱脱身走糧仗軍資皆棄之貶昱栝州刺史再貶髙要尉而死戊午冊南詔䝉歸義為雲南王水經注雲南郡本雲山縣地也蜀劉氏建興二年置郡自唐戎州開邊縣而南七十里至曲州又二千五百里至雲南城歸義之先本哀牢夷地哀牢夷漢明帝之時内附居姚州之西東南接交趾西北接吐蕃蠻語謂王曰詔先有六詔曰䝉舍曰䝉越曰越析曰浪穹曰様備曰越澹邆考異曰新書六詔曰䝉嶲越析浪穹睒施浪䝉舍今從竇滂雲南别録兵刀相埒莫能相壹埒力輟翻厯代因之以分其勢䝉舍最在南故謂之南詔髙宗時䝉舍細奴邏初入朝細奴邏生邏盛邏盛生盛邏皮盛邏皮生皮邏閤朝直遥翻邏郎佐翻子考異曰新傳云䝉氏父以名相屬細奴邏生邏盛炎邏盛炎生炎閤武后時邏盛炎身入朝妻方娠生盛邏皮喜曰我又有子雖死唐地足矣炎閤立死開元時弟盛邏皮立生皮邏閤授特進臺登郡王炎閤未有子時以閤羅鳯為嗣及生子還其宗而名承閤遂不改按邏盛炎之子盛邏皮豈得云以名相屬既有炎閤豈得云我又有子雖死唐地足矣今從舊南詔傳及楊國忠傳雲南别録又舊南詔傳閤皆作閣今從新傳皮邏閤浸彊大而五詔微弱㑹有破渳河蠻之功渳河即西洱河洱音乃吏翻乃賂王昱求合六詔為一昱為之奏請為于偽翻朝廷許之仍賜名歸義於是以兵威脅服羣蠻不從者滅之遂擊破吐蕃徙居大和城其後卒為邊患南詔事始此其先烏蠻别種夷語山陂陀為和故謂之大和城卒子恤翻冬十月戊寅上幸驪山温泉壬辰上還宫是嵗於西京東都往來之路作行宫千餘間分左右羽林置龍武軍以萬騎營𨽻焉騎竒寄翻潤州刺史齊澣奏自𤓰歩濟江迂六十里請自京口埭下直濟江穿伊婁河二十五里即逹楊子縣立伊婁埭從之埭音代按舊書本紀齊澣開伊婁河於揚州南𤓰州浦則今之𤓰州運河是也但楊子縣今為真州治所安能二十五里即逹楊子縣若自𤓰洲逹楊子橋則二十五里而近今之楊子橋或者唐之楊子縣治所橋以此得名也二十七年春正月壬寅命隴右節度大使榮王琬自至本道廵按處置諸軍處昌吕翻選募闗内河東壯士三五萬人詣隴右防遏至秋末無冦聽還羣臣請加尊號曰聖文二月己巳許之因赦天下免百姓今年田租夏四月癸酉敕諸隂陽術數自非昏䘮卜擇皆禁之己丑以牛仙客為兵部尚書兼侍中李林甫為吏部尚書兼中書令總文武選事葢令牛仙客總武選李林甫總文選也選須絹翻六月癸酉以御史大夫李適之兼幽州節度使幽州將趙堪白真陁羅矯節度使張守珪之命使平盧軍使烏知義擊叛奚餘黨於横水之北横水當作潢水新書作湟水舊書張守珪傳作潢水今從之潢水在遼國今臨潢府界志云自營州度松陘嶺北行四百里至潢水使疏吏翻將即亮翻知義不從白真陁羅矯稱制指以迫之知義不得已出師與虜遇先勝後敗守珪隱其敗状以克獲聞事頗泄上令内謁者監牛仙童往察之内謁者監唐正六品下掌内宣傳及諸親命婦朝㑹所司籍其人數送内侍省守珪重賂仙童歸罪於白真陁羅逼令自縊死縊於計翻仙童有寵於上衆宦官疾之共發其事上怒甲戌命楊思朂杖殺之思勗縳格杖之數百刳取其心割其肉㗖之㗖徒濫翻又徒覽翻守珪坐貶括州刺史太子太師蕭嵩嘗賂仙童以城南良田數頃李林甫發之嵩坐貶青州刺史秋八月乙亥磧西節度使葢嘉運擒突騎施可汗吐火仙磧七迹翻葢古盍翻嘉運攻碎葉城吐火仙出戰敗走擒之於賀邏嶺分遣疏勒鎮守使夫蒙靈詧與㧞汗那王阿悉爛逹干潜引兵突入怛邏斯城擒黑姓可汗爾微遂入曳建城取交河公主交河公主事始二百一十二卷十一年悉收散髪之民數萬以與㧞汗那王威震西陲壬午吐蕃冦白草安人等軍白草軍在蔚茹水之西又鄯州星宿州之西有安人軍蔚茹水在原州蕭闗縣此時吐蕃兵不能至疑白草軍當作白水軍隴右節度使蕭炅擊破之炅火廻翻甲申追諡孔子為文宣王先是祀先聖先師周公南向孔子東向坐制自今孔子南向坐被王者之服釋奠用宫懸先悉薦翻被皮義翻周禮王宫懸諸侯軒懸卿大夫判懸士特懸注云宫懸四面懸象宫室四靣有牆故謂之宫懸軒懸三面其形曲判懸又去其一面特懸又去其一面追贈弟子皆為公侯伯顔淵兖公閔子騫費侯冉伯牛鄆侯仲弓薛侯冉有徐侯季路衛侯宰我齊侯子貢黎侯子游吴侯子夏魏侯曽參成伯顓孫師陳伯澹臺減明江伯宓子賤單伯原憲原伯公冶長莒伯南宫适郯伯公晢哀郳伯曽㸃宿伯顔路杞伯商瞿䝉伯髙柴其伯漆雕開滕伯公伯寮任伯司馬牛向伯樊遲樊伯有若卞伯公西赤邵伯巫馬期鄫伯梁鱣梁伯顔栁蕭伯冉孺郜伯曹恤豐伯伯䖍鄒伯公孫龍黄伯冉季産東平伯秦子南少梁伯漆雕歛武城伯顔子驕琅邪伯漆雕徒父須句伯壞駟赤北徵伯商澤睢陽伯石作蜀郈邑伯任不齊任城伯公夏首亢父伯公良孺東牟伯后處營丘伯秦開彭衙伯奚容箴下邳伯公肩定新伯顔襄臨沂伯鄔單銅鞮伯句井彊淇陽伯罕父黒乘丘伯秦商上洛伯申黨召陵伯公祖子之期思伯榮子期雩婁伯縣成渠野伯左人郢臨淄伯燕伋漁陽伯鄭子徒滎陽伯秦非汧陽伯施常乘氏伯顔噲朱虗伯步叔乘停干伯顔之僕東武伯原亢籍萊蕪伯樂欬昌平伯亷潔菖父伯顔何開陽伯叔孫㑹任丘伯狄黒臨濟伯郝㢲平陸伯孔患汶陽伯公西與如重丘伯公西箴祝阿伯九月戊午處木昆鼠尼施弓月等諸部先𨽻突騎施者皆帥衆内附帥讀曰率仍請徙居安西管内太子更名紹更工衡翻冬十月辛巳改修東都明堂按舊書帝紀即東都乾元殿改修明堂丙戌上幸驪山温泉十一月辛丑還宫甲辰明堂成劒南節度使張宥文吏不習軍旅悉以軍政委團練副使章仇兼瓊據舊志上元後置團練使余攷唐制凡有團結兵之地則置團練使此時蜀有黎雅卭翼茂五州鎮防團結兵故有團練副使安史亂後諸州皆置團練使矣兼瓊入奏事盛言安戎城可取上悦之丁巳以宥為光禄卿十二月以兼瓊為劒南節度使初睿宗䘮既除祫于太廟自是三年一祫五年一禘是嵗夏既禘冬又當祫祫疾夾翻太常議以為祭數則凟數所角翻請停今年祫祭自是通計五年一祫一禘從之史言如此乃合於五年再殷祭之義二十八年春正月癸巳上幸驪山温泉庚子還宫二月荆州長史張九齡卒上雖以九齡忤㫖逐之卒子恤翻忤五故翻然終愛重其人每宰相薦士輙問曰風度得如九齡不不讀曰否三月丁亥朔日有食之章仇兼瓊潜與安戎城中吐蕃翟都局及維州别駕董承晏結謀使局開門引内唐兵盡殺吐蕃將卒使監察御史許逺將兵守之將即亮翻監古莧翻逺敬宗之曾孫也永徽顯慶之間許敬宗以姦佞致位公輔安史之亂逺乃能効死節以報國史故著其世以勉為臣者甲寅葢嘉運入獻㨗上赦吐火仙罪以為左金吾大將軍嘉運請立阿史那懷道之子昕為十姓可汗從之立考異曰舊傳云嘉運請懷道之子昕為可汗以鎮撫之莫賀逹干不肯曰討平蘇禄本是我之元謀若立史昕為主則國家何以酬賞於我乃不立史昕便令莫賀逹干統衆二十七年嘉運詣闕獻俘仍令將吐火仙獻于太廟㑹要二十九年以解瑟羅之子昕為可汗遣兵送之天寳元年昕至碎葉西南俱南城為莫賀咄逹干所殺三年安西節度使馬靈詧斬之更立其酋長為在地米里骨咄禄毗伽可汗按實録開元二十八年三月甲寅葢嘉運俘吐火仙來獻四月辛未冊十姓可汗阿史那昕妻李氏為交河公主十二月乙夘突騎施可汗莫賀逹干率其妻子及纛官首領百餘帳内屬初莫賀逹干與烏蘇萬洛扇誘諸蕃叛于我上命葢嘉運宣恩招諭皆相率而降新傳云逹干不肯立昕即誘部落叛詔嘉運招諭乃率妻子等降遂命統其衆後數年復以昕為可汗遣兵䕶送昕至俱闌城為莫賀咄所殺莫賀咄自為可汗安西節度使天䝉靈詧誅斬之若如舊傳所言嘉運便以莫賀逹干為可汗統衆則莫賀不應復叛且立可汗當須朝廷冊命嘉運豈得擅立于塞外也若未以為可汗則實録十二月不應謂突騎施可汗莫賀逹干也若如㑹要所言二十九年始立昕為可汗則實録二十八年四月不應已謂昕為十姓可汗也葢嘉運既平突騎施即奏立昕為十姓可汗故莫賀逹干不服而叛明皇乃以莫賀逹干為小可汗止統突騎施之衆使嘉運招諭之故來降然昕為十姓可汗兼統諸部故明皇遣兵送之而為莫賀逹干所殺事或然也但實録脱略疑不敢質故略采諸書所見存其梗槩書之夏四月辛未以昕妻李氏為交河公主六月吐蕃圍安戎城上嘉葢嘉運之功以為河西隴右節度使使之經略吐蕃嘉運恃恩流連不時發葢嘉運恃其邊功以自眤於人主是從流於上也在京師以酒色自娱而不即赴鎮是從流於下也史以流連二字言之㫖哉左丞相裴耀卿上疏上時掌翻疏所去翻以為臣近與嘉運同班觀其舉措誠勇烈有餘然言氣矜誇恐難成事昔莫敖狃于蒲騷之役卒䘮楚師左傳楚莫敖屈瑕既敗鄖師於蒲騷復伐羅鬭伯比送之曰莫敖必敗舉􅀈髙心不固矣遂見楚子楚子入告夫人鄧曼鄧曼曰莫敖狃於蒲騷之役将自用也君若不鎮撫其不設備乎莫敖果不設備及羅羅與盧戎兩軍之大敗之狃女九翻陸徳明曰騷音蕭又音縿卒子恤翻今嘉運有驕敵之色臣竊憂之况防秋非逺未言發日若臨事始去則士卒尚未相識何以制敵且將軍受命鑿凶門而出今乃酣飲朝夕殆非憂國愛人之心若不可改易宜速遣進塗仍乞聖恩嚴加訓勵上乃趣嘉運行趣讀曰促已而嘉運竟無功葢嘉運小器易盈志氣惰矣安能有功秋八月甲戌幽州奏破奚契丹冬十月甲子上幸驪山温泉辛巳還宫吐蕃冦安戎城及維州發闗中彊騎救之騎竒寄翻吐蕃引去更命安戎城曰平戎更工衡翻十一月罷牛仙客朔方河東節度使突騎施莫賀逹干聞阿史那昕為可汗怒曰首誅蘇禄我之謀也今立史昕何以賞我遂帥諸部叛上乃立莫賀逹干為可汗使統突騎施之衆命葢嘉運招諭之十二月乙夘莫賀逹干降帥讀曰率降户江翻金城公主薨金城公主事始二百八卷中宗景龍元年吐蕃告䘮且請和上不許是嵗天下縣千五百七十三户八百四十一萬二千八百七十一口四千八百一十四萬三千六百九西京東都米斛直錢不滿二百絹匹亦如之海内富安行者雖萬里不持寸兵以開元之承平而戸口猶不及漢之盛時唐興以來治日少而亂日多也二十九年春正月癸巳上幸驪山温泉丁酉制承前諸州饑饉皆待奏報然始開倉賑給承前猶今言從前也然始猶今言然後也道路悠逺何救懸絶自今委州縣長官與采訪使量事給訖奏聞長知兩翻使疏吏翻量音良庚子上還宫上夢𤣥元皇帝告云吾有像在京城西南百餘里汝遣人求之吾當與汝興慶宫相見有宋大中祥符之事皆唐明皇教之也上遣使求得之於盩厔樓觀山間盩厔縣漢屬扶風後魏併入武功尋復後周為周南郡隋廢郡以盩厔縣為缺州唐屬岐州蘇軾曰樓觀山今為崇聖觀乃尹洙舊宅山脚有授經臺尚在使疏吏翻盩厔音舟窒觀古玩翻下同夏閏四月迎置興慶宫五月命畫𤣥元真容分置諸州開元觀六月吐蕃四十萬衆入冦至安仁軍安仁軍當作安人軍渾崕峰騎將臧希液帥衆五千擊破之騎竒寄翻將即亮翻帥讀曰率唐考異曰舊傳作盛希液今從厯秋七月丙寅突厥遣使來告登利可汗之䘮初登利從叔二人分典兵馬號左右殺從才用翻登利患兩殺之專與其母謀誘右殺斬之誘音酉自將其衆將即亮翻左殺判闕特勒勒兵攻登利殺之立毗伽可汗之子為可汗俄為骨咄葉䕶所殺更立其弟伽求迦翻咄當沒翻更工衡翻尋又殺之骨咄葉䕶自立為可汗考異曰舊傳云左殺自立為烏蘇米施可汗唐厯新傳皆云判闕特勒子為烏蘓米施可汗天寳初立今從之上以突厥内亂癸酉命左羽林將軍孫老奴招諭囘紇葛邏禄㧞悉宻等部落訖下沒翻邏郎佐翻乙亥東都洛水溢溺死者千餘人溺奴狄翻平盧兵馬使安禄山傾巧善事人人多譽之譽音余上左右至平盧者禄山皆厚賂之由是上益以為賢御史中丞張利貞為河北采訪使至平盧禄山曲事利貞乃至左右皆有賂利貞入奏盛稱禄山之美八月乙未以禄山為營州都督充平盧軍使考異曰實録此年八月以幽州節度副大使安禄山為營州刺史充平盧渤海黒水軍使舊紀以幽州節度副使安禄山為營州刺史平盧軍節度副使㑹要二十八年王斛斯為平盧節度使遂為定額按舊傳禄山自平盧兵馬使為平盧軍使葢以平盧兵馬使帶幽州節度副使之名耳實録衍大字也天寳元年始以平盧為節度㑹要誤也兩蕃渤海黑水四府經略使唐謂奚契丹為兩蕃冬十月丙申上幸驪山温泉壬寅分北庭安西為二節度十一月庚戌司空邠王守禮薨守禮庸鄙無才識毎天將雨及霽守禮必先言之已而皆驗岐薛諸王言於上曰邠兄有術上問其故對曰臣無術則天時以章懷之故幽閉宫中十餘年守禮幽閉事見二百四卷武后天授元年嵗賜敕杖者數四背瘢甚厚將雨則沈悶瘢蒲官翻沈持林翻将霽則輕爽臣以此知之耳因流涕霑襟上亦為之慘然為于偽翻辛酉上還宫辛未太尉寧王憲薨上哀惋特甚曰天下兄之天下也兄固讓於我事見二百十卷睿宗景雲元年惋烏貫翻為唐太伯常名不足以處之處昌吕翻乃諡曰讓皇帝其子汝陽王璉璉資辛翻上表追述先志謙冲不敢當帝號上不許歛日歛力贍翻内出服天子之服也以手書致於靈座書稱隆基白又名其基曰惠陵恵陵在同州奉先縣西北十里追諡其妃元氏曰恭皇后祔𦵏焉十二月乙巳吐蕃屠逹化縣逹化古澆河之地後周置逹化郡及縣隋廢郡以縣屬廓州縣西百二十里有澆河城䧟石堡城葢嘉運不能禦果如裴耀卿之言資治通鑑卷二百十四
