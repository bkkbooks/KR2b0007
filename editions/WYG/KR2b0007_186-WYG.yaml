body:
  text: 資治通鑑卷一百八十六宋司馬光撰胡三省音註唐紀二起著雍攝提格八月盡十二月不滿一年髙祖神堯大聖光孝皇帝上之中武徳元年八月薛舉遣其子仁果進圍寜州西魏置寕州於定安置豳州於新平隋志并定安新平二縣皆屬北地郡大業初慶新平之豳州改定安之寧州為􅃎州唐初折北地之新平三水置􅃎州而以北地郡為寜州治定安刺史胡演撃却之郝瑗言於舉曰郝呼各翻瑗于眷翻今唐兵新破關中騷動宜乘勝直取長安舉然之㑹有疾而止辛巳舉卒卒子恤翻太子仁果立居於折墌城新志涇州保定縣有折墌故城折杜佑作析音思歴翻墌章恕翻諡舉曰武帝上欲與李軌共圖秦隴薛舉父子時據秦隴遣使濳詣凉州復武威郡為凉州宋白曰凉州之地本月氐居之後為匈奴右地漢武帝置凉州兼綂河隴之地而河西之地列置武威酒泉敦煌張掖四郡東都之季河西諸郡以去州隔遠自求立州為立雍州晉惠帝末張軌為凉州刺史治姑臧為㑹府後分置諸州而武威始專凉州之名使䟽吏翻下同招撫之與之書謂之從弟從才用翻軌大喜遣其弟懋入貢上以懋為大將軍命鴻臚少卿張俟徳冊拜軌為凉州總管封凉王臚陵如翻少詩照翻初朝廷以安陽令吕珉為相州刺史更以相州刺史王徳仁為巖州刺史是年五月王徳仁來降先受朝命徳仁未能有相州也六月吕珉以相州來降故正投之新志以林慮縣置巖州正徳仁所據地朝直遥翻相息亮翻徳仁由是怨憤甲申誘山東大使宇文明逹入林慮山而殺之誘音酉慮音廬叛歸王世充己丑以秦王世民為元帥帥所類翻撃薛仁果丁酉臨洮等四郡來降後周武帝逐吐谷渾以置洮陽郡尋置九州大業初改州為臨九郡洮土刀翻隋江郡太守陳稜求得煬帝之柩取宇文化及所留輦路鼓吹粗備天子儀衛守式乂翻柩音舊吹昌瑞翻粗坐五翻改塟於江都宫西吳公臺下今揚州城西北有雷塘塘西有吳公臺相傳以為陳吳明徹攻廣陵所築弩臺以射城中其王公以下皆列瘞於帝塋之側瘞於計翻塋音營宇文化及之發江都也是年四月化及發江都以杜伏威為歴陽太守義寧元年春伏威據歴陽伏威不受仍上表於隋皇泰主拜伏威為東道大總管封楚王沈法興亦上表於皇泰主自稱大司馬録尚書事天門公上時掌翻承制置百官以陳杲仁為司徒新書竹陳果仁孫士漢為司空蔣元超為左僕射殷芊為左丞徐令言為右丞劉子翼為選部侍郎李百藥為府椽百藥徳林之子也李徳林歴事齊周隋選宣絹翻椽於絹翻九月隋襄國通守陳君賔來降拜邢州刺史復以襄國郡為邢州宋白曰邢州禹貢衡漳之地春秋邢侯之國邢遷於夷儀即其地秦兼天下於此置信都郡項羽改曰襄國盖以趙襄子謚名之也石氏置襄國郡隋置邢州取古邢國爲名守式又翻降户江翻君賔伯山之子也伯山陳文帝之子虞州刺史韋義節義寧元年以安邑虞郷夏三縣置安邑郡武徳元年曰虞州攻隋河東通守堯君素久不下軍數不利數所角翻壬子以工部尚書獨孤懷恩代之初李密既殺翟讓見一百八十四卷義寧元年十一月翟萇伯翻頗自驕矜不恤士衆倉粟雖多無府庫錢帛戰士有功無以為賞又厚撫初附之人衆心頗怨徐世勣嘗因宴㑹刺譏其短密不懌使世勣出鎮黎陽雖名委任實亦踈之此叙密致敗之由非一時之事密開洛口倉散米無防守典當者當主當也當丁浪翻又無文劵取之者隨意多少或離倉之後離力智翻力不能致委棄衢路自倉城至郭門郭郛郭也米厚數寸厚戸豆翻為車馬所轥踐轥良刃翻踐慈演翻羣盗來就食者并家屬近百萬口近其靳翻無甕盎織荆筐淘米洛水十里兩岸之間望之皆如白沙密喜謂賈閏甫曰此可謂足食矣閏甫對曰國以民為本民以食為天今民所以襁負如流而至者以所天在此故也襁居兩翻而有司曾無愛吝屑越如此吝惜也屑越猶言狼籍而弃之也荀子曰貨財粟米者彼將日月棲遲薛越之中野我今將畜積并聚之於倉廩竊恐一旦米盡民散明公孰與成大業哉密謝之即以閏甫判司倉參軍事密以東都兵數敗微弱而將相自相屠滅謂旦夕可平王世充既專大權厚賞將士繕治器械亦隂圖取密時隋軍乏食而密軍少衣數所角翻將即亮翻治直之翻少詩沼翻世充請交易密難之長史邴元真等各求私利邴即古丙姓長知兩翻勸密許之先是東都人歸密者日以百數先悉薦翻既得食降者益少密悔而止密破宇文化及還還從宣翻其勁卒良馬多死士卒疲病世充欲乗其弊撃之恐人心不壹乃詐稱左軍衛士張永通三夣周公令宣意於世充當勒兵相助擊賊乃為周公立廟周公作洛世充假之以作士氣令力丁翻下同為於偽翻每出兵輙先祈禱世充令巫宣言周公欲令僕射急討李密當有大功不即兵皆疫死不讀曰否世充兵多楚人信妖言皆請戰妖於驕翻世充簡練精鋭得二萬餘人馬二千餘匹壬子出師撃密旗幡之上皆書永通字軍容甚盛以張永通宣周公之意故旗幡書永通字以表神助癸丑至偃師營於通濟渠南作三橋於渠上通濟渠大業元年所開密留王伯當守金墉自引精兵出偃師阻邙山以待之密召諸將㑹議將即亮翻裴仁基曰世充悉衆而至洛下必虚可分兵守其要路令不得東簡精兵三萬傍河西出以逼東都傍歩浪翻世充還還從宣翻我且按甲世充再出我又逼之如此則我有餘力彼勞奔命破之必矣密言公言大善今東都兵有三不可當兵仗精鋭一也决計深入二也食盡求戰三也我但乘城固守畜力以待之彼欲鬬不得求走無路不過十日世充之頭可致麾下陳智略樊文超單雄信皆曰計世充戰卒甚少屢經摧破悉已䘮膽少詩沼翻䘮息浪翻兵法曰倍則戰况不啻倍哉且江淮新附之士望因此機展其勲效及其鋒而用之可以得志於是諸將諠然欲戰者什七八密惑於衆議而從之將即亮翻仁基苦爭不能得撃地歎曰公後必悔之魏徴言於長史鄭頲曰魏公雖驟勝而驍將鋭卒多死長知兩翻頲它鼎翻驍堅堯翻將即亮翻下同戰士心怠此二者難以應敵且世充乏食志在死戰難與争鋒未若深溝髙壘以拒之不過旬月世充糧盡必自退追而撃之蔑不勝矣頲曰此老生之常談耳徴曰此乃竒䇿何謂常談拂衣而起程知節將内馬軍與密同營在北邙山上單雄信將外馬軍營於偃師城北單慈淺翻世充遣數百騎度通濟渠攻雄信營密遣裴行儼與知節助之行儼先馳赴敵中流矢墜於地騎竒寄翻下同中竹仲翻知節救之殺數人世充軍披靡披普彼翻乃抱行儼重騎而還重直龍翻二人共騎一馬曰重騎還從宣翻又如字為世充騎所逐刺槊洞過知節廻身捩折其槊刺七亦翻槊色角翻捩練結翻拗捩也折而設翻兼斬追者與行儼俱免㑹日暮各歛兵還營密騎將孫長樂等千餘人皆被重創驍堅堯翻樂音洛被皮義翻創初良翻宻新破宇文化及有輕世充之心不設壁壘世充夜遣二百餘騎潜入北山北山即北邙山伏谿谷中命軍士皆秣馬蓐食甲寅旦將戰世充誓衆曰今日之戰非直爭勝負死生之分在此一舉若其捷也富貴固所不論若其不捷必無一人獲免所爭者死非獨為國為于偽翻各宜免之遲明遲直二翻引兵薄密密出兵應之未及成列世充縱兵撃之世充士卒皆江淮剽勇剽匹妙翻出入如飛世充先索得一人貌類密者縳而匿之索山客翻戰方酣使牽以過陳前陳讀曰陣譟曰已獲李密矣覔考異曰革命記曰世充先於衆中得一人眉目狀似李密者隂畜之而不令出師至偃師城下與李密未大相接遽令數十騎馳將所畜人頭來云殺得李密充佯不信遣衆共看咸言是密頭也遂於城下勒兵擲頭與城中人城中人亦言是密頭也遂以城降今從壺關録士卒皆呼萬歲其伏兵發乗髙而下馳壓密營縱火焚其廬舍密衆大潰其將張童仁陳智略皆降壓於甲翻將即亮翻降户江翻下同密與萬餘人馳向洛口世充夜圍偃師鄭頲守偃師其部下翻城納世充初世充家屬在江都隨宇文化及至滑臺又隨王軌入李密密留於偃師欲以招世充及偃師破世充得其兄世偉子𤣥應䖍恕瓊等又獲密將佐裴仁基鄭頲祖君彦等數十人世充於是整兵向洛口得邴元真妻子鄭䖍象母及密諸將子弟皆撫慰之令濳呼其父兄令力丁翻初邴元真為縣吏坐贓亡命從翟讓於瓦岡翟萇伯翻讓以其嘗為吏使掌書記及密開幕府妙選時英讓薦元真為長史密不得已用之此義寜元年春二月事長知兩翻行軍謀畫未嘗參預密西拒世充留元真守洛口倉元真性貪鄙宇文温謂密曰不殺元真必為公患密不應元真知之隂謀叛密楊慶聞之以告密密固疑焉至是密將入洛口城元真已遣人濳引世充矣密知而不發因與衆謀待世充兵半濟洛水然後擊之世充軍至密候騎不時覺比將出戰比必寐翻世充軍悉已濟矣單雄信等又勒兵自據密自度不能支度徒洛翻帥麾下輕騎奔虎牢元真遂以城降降戸江翻初雄信驍捷善用馬槊名冠諸軍帥讀曰率下同冠古玩翻軍中號曰飛將將即亮翻彦藻以雄信輕於去就勸密除之彦藻房彦藻也是年二月彦藻死此亦叙日前事密愛其才不忍也及密失利雄信遂以所部降世充史叙邴元眞單雄信事皆言李密當斷不斷反受其亂密將如黎陽或曰殺翟讓之際徐世勣㡬死事見一百八十四卷義寜元年十一月㡬居希翻今失利而就之安可保乎時王伯當棄金墉保河陽密自虎牢歸之引諸將共議密欲南阻河北守太行東連黎陽以圖進取將即亮翻行戸剛翻諸將皆曰今兵新失利衆心危懼若更停留恐叛亡不日而盡又人情不願難以成功密曰孤所恃者衆也衆既不願孤道窮矣欲自刎以謝衆刎扶粉翻伯當抱密號絶號戸刀翻衆皆悲泣密復曰復扶又翻諸君幸不相棄當共歸關中密身雖無功諸君當保富貴府掾栁爕曰明公與唐公同族兼有疇昔之好謂自唐公起與之連和也掾于絹翻好呼到翻雖不陪起兵然阻東都斷隋歸路斷丁管翻使唐公不戰而據長安此亦公之功也衆咸曰然密又謂王伯當曰將軍室家重大豈復與孤俱行哉伯當曰昔蕭何盡帥子弟以從漢王漢王與項羽相拒蕭何悉遣子弟詣軍天下既定論功行封上曰何舉宗數十人隨我復扶又翻下同伯當恨不兄弟俱從從才用翻豈以公今日失利遂輕去就乎縱身分原野亦所甘心左右莫不感激從密入關者凡二萬人於是密之將帥州縣多降於隋朱粲亦遣使降隋將即亮翻帥所類翻降户江翻使䟽吏翻皇泰主以粲為楚王甲寅秦州總管竇軌撃薛仁果不利驃騎將軍劉感鎮涇州宋白曰魏黄初中分隴右為秦州因秦初封也與州同理冀城冀城改為隴城縣時復以隴西郡為秦州安定郡為涇州驃匹妙翻騎竒寄翻仁果圍之城中糧盡感殺所乗馬以分將士感一無所噉唯煑馬骨取汁和木屑食之城垂䧟者數矣數所角翻㑹長平王叔良將士至涇州士當作兵仁果乃揚言食盡引兵南去乙卯又遣髙墌人偽以城降墌章恕翻墌考異曰寳録云乙卯宇文歆攻髙城下之今從劉感傳叔良遣感帥衆赴之帥讀曰率下同己未至城下扣城中人曰賊已去可踰城入感命燒其門城上下水灌之感知其詐遣歩兵先還自帥精兵為殿帥讀曰率殿丁練翻俄而城上舉三烽仁果兵自南原大下戰於百里細川唐軍大敗感為仁果所擒仁果復圍涇州令感語城中云語牛倨翻援軍已敗不如早降降户江翻感許之至城下大呼曰呼火故翻逆賊饑餒亡在旦夕秦王帥數十萬衆四面俱集城中勿憂勉之仁果怒執感於城旁埋之至膝馳騎射之至死帥讀曰率騎奇寄翻射而亦翻聲色逾厲叔良嬰城固守僅能自全感豐生之孫也劉豐生高齊將死於穎川庚申隴州刺史陜人常逹隋志扶風汧源縣西魏之東秦州也後改為隴州大業三年廢州併入扶風郡義寧二年析扶風郡之汧源汧陽南由安定郡之華亭置隴東郡唐受禪改為隴州陜失冉翻擊薛仁果於宜祿川宜祿川在􅃎涇二州間貞觀二年析􅃎之新平及涇之保定靈臺置宜祿縣斬首千餘級上遣從子襄武公琛從才用翻琛丑林翻太常卿鄭元璹璹殊玉翻以女妓遺始畢可汗妓渠綺翻遺于季翻可從刋入聲汗音寒壬戌始畢復遣骨咄祿特勒來上受禪之後骨咄祿嘗來使復扶又翻咄當没翻癸亥白馬道士傅仁均白馬縣帶滑州造戊寅厯成唐受禪建國嵗在戊寅故以名厯奏上行之上時掌翻薛仁果屢攻常逹不能克乃遣其將仵士政以數百人詐降作姓也姓苑仵姓望出襄陽急就章有仵終古將即亮翻仵音疑古翻降戸江翻下同逹厚撫之乙丑士政伺隙以其徒劫逹擁城中二千人降於仁果伺相吏翻劫考異曰新舊唐書皆云薛舉遣仵士政偽降逹士政逹以見舉據實錄薛舉前已死此月逹再擊仁果及士政劫逹皆有日月今從實錄逹見仁果詞色不屈仁果壯而釋之奴賊帥張貴謂逹曰汝識我乎帥所𩔖翻逹曰汝逃死奴賊耳貴怒欲殺之人救之得免辛未追諡隋太上皇為煬帝諡神至翻宇文化及至魏縣張愷等謀去之事覺化及殺之腹心稍盡兵勢日蹙兄弟更無他計但相聚酣宴奏女樂化及醉尤智及曰酣户甘翻尤責過也我初不知由汝為計强來立我智及創謀弑逆故尤之强其兩翻今所向無成士馬日㪚負弑君之名天下所不容今者滅族豈不由汝乎持其兩子而泣智及怒曰事捷之日初不賜尤及其將敗乃欲歸罪何不殺我以降竇建徳數相鬭鬩降戸江翻數所角翻鬩許激翻恨也戾也言無長幼醒而復飲以此為恒恒常也長知兩翻復扶又翻恒户登翻其衆多亡化及自知必敗嘆曰人生固當死豈不一日為帝乎於是鴆殺秦王浩即皇帝位於魏縣國號許宇文化及襲封許公因以為國號改元天壽署置百官冬十月壬申朔日有食之戊寅宴突厥骨咄祿引骨咄祿升御坐以寵之史言突厥驕倨唐祖欲以結其心適以滋其慢厥九勿翻咄當没翻坐徂卧翻李密將至上遣使迎勞相望於道使疏吏翻下同勞力到翻密大喜謂其徒曰我擁衆百萬一朝解甲歸唐山東連城數百知我在此遣使招之亦當盡至比於竇融功亦不細竇融以河西歸漢光武李密自謂過之豈不以一台司見處乎處昌吕翻己卯至長安有司供待稍薄所部兵累日不得食衆心頗怨既而以密為光祿卿上柱國賜爵邢國公密既不滿望朝臣又多輕之朝直遥翻執政者或來求賄意甚不平為李密復叛去張本獨上親禮之常呼為弟以舅子獨孤氏妻之妻七細翻庚辰詔右翊衛大將軍淮安王神通為山東道安撫大使山東諸軍並受節度以黄門侍郎崔民幹為副崔民幹山東望族故使副神通以招撫諸郡縣使疏吏翻鄧州刺史吕子臧與撫慰使馬元規擊朱粲破之子臧言於元規曰粲新敗上下危懼請併力擊之一舉可滅若復遷延復扶又翻下同其徒稍集力彊食盡致死於我為患方深元規不從子臧請獨以所部兵擊之元規不許既而粲収集餘衆兵復大振自稱楚帝於冠軍復扶又翻又音如字冠古玩翻改元昌逹進攻鄧州子臧撫膺膺胷也謂元規曰老夫今坐公死矣粲圍南陽南陽即鄧州㑹霖雨城壞所親勸子臧降子臧曰安有天子方伯降賊者乎帥麾下赴敵而死降戸江翻帥讀曰率俄而城陷元規亦死是年二月遣馬元規今死癸未王世充収李密美人珍寶及將卒十餘萬人還東都陳於闕下將即亮翻乙酉皇泰主大赦丙戌以世充為太尉尚書令内外諸軍事内外諸軍事之上當有總督二字仍使之開太尉府備置官屬妙選人物史言王世充簒形已成世充以裴仁基父子驍勇深禮之驍堅堯翻徐文遠復入東都見世充必先拜或問曰君倨見李密見上七月而敬王公何也文遠曰魏公君子也能容賢士王公小人也能殺故人吾何敢不拜李密總管李育徳以武陟來降隋志河内郡修武縣開皇十六年折置武陟郡劉昫曰武陟漢懷縣地故城在今縣西降户江翻下同降考異曰舊唐書高季輔傳云與李厚徳來按以武陟來降者乃育徳非厚徳也拜陟州刺史新舊志皆云武徳二年李厚徳以修武縣東北濁鹿城歸順因置陟州通鑑二年書厚徳逐王世充殷州刺史以獲嘉來降以厚徳刺殷州二志皆云四年置殷州差殊如此當考育徳諤之孫也李諤見一百七十六卷陳長城公至徳三年其餘將佐劉徳威賈閏甫高季輔等或以城邑或帥衆相繼來降將即亮翻帥讀曰率初北海賊帥綦公順大業初以青州為北海郡綦姓也帥所類翻綦音其帥其徒三萬攻郡城已克其外郭進攻子城城中食盡公順自謂克在旦夕不為備明經劉蘭成糾合城中驍健百餘人襲擊之劉蘭成蓋嘗應明經科因稱之新唐志曰唐制取士之科多因隋舊則明經科起於隋也帥讀曰率驍堅堯翻下同城中見兵繼之見賢遍翻公順大敗棄營走郡城獲全於是郡官及望族分城中民為六軍各將之蘭成亦將一軍將即亮翻有宋書佐者離間諸軍曰煬帝改郡諸曹參軍為書佐間古莧翻蘭成得衆心必為諸人不利不如殺之衆不忍殺但奪其兵以授宋書佐蘭成恐終及禍亡奔公順公順軍中喜譟欲奉以為主固辭乃以為長史軍事咸聽焉居五十餘日蘭成簡軍中驍健者百五十人往抄北海抄楚交翻下同距城四十里留十人使多芟草分為百餘積芟所銜翻二十里又留二十人各執大旗五六里又留三十人伏險要蘭成自將十人夜距城一里許潛伏餘八十人分置便處約聞鼓聲即抄取人畜亟去抄楚交翻亟紀力翻仍一時焚積草明晨城中遠望無烟塵皆出樵牧日向中蘭成以十人直抵城門城上鉦鼓亂發伏兵四出抄掠雜畜千餘頭及樵牧者而去畜許又翻蘭成度抄者已遠徐步而還度徒洛翻還音旋又如字城中雖出兵恐有伏兵不敢急追又見前有旌旗烟火遂不敢進而還既而城中知蘭成前者衆少悔不窮追少詩沼翻下同居月餘蘭成謀取郡城更以二十人直抵城門城中人競出逐之行未十里公順將大兵總至將即亮翻下自將主將同郡兵奔馳還城公順進兵圍之蘭成一言招諭城中人爭出降降戸江翻蘭成撫存老幼禮遇郡官見宋書佐亦禮之如舊仍資送出境内外安堵時海陵賊帥臧君相隋志海陵縣屬江都郡帥所類翻相息亮翻聞公順據北海帥其衆五萬來爭之帥讀曰率公順衆少聞之大懼蘭成為公順畫策曰為于偽翻君相今去此尚遠必不為備請將軍倍道襲擊其營公順從之自將驍勇五千人齎熟食倍道襲之驍堅堯翻將至蘭成與敢死士二十人前行距君相營五十里見其抄者負擔向營擔丁濫翻蘭成亦與其徒負擔蔬米燒器擔亦負也都甘翻燒器鍋釜之屬詐為抄者擇空而行聽察得其號號户告翻軍號也及主將姓名至暮與賊比肩而入負擔巡營知其虚實得其更號更號持更之號更工衡翻乃於空地燃火營食至三鼓忽於主將幕前交刀亂下殺百餘人賊衆驚擾公順兵亦至急攻之君相僅以身免舊考異曰書作劉蘭云頗涉經史善言成敗然性多兇狡見隋末將亂交通不逞于時北海完富蘭利其子女玉帛與羣盜相應破其鄉城邑武徳中淮安王神通為山東道安撫大使蘭率宗黨歸之革命記序其事頗詳今從之俘斬數千収其資糧甲仗以還還從宣翻由是公順黨衆大盛及李密據洛口公順以衆附之密敗亦來降降户江翻隋末羣盜起冠軍司兵李襲譽按新書李襲譽傳仕隋為冠軍府司兵考之隋志冠軍輔國將軍從六品耳其府司兵當在流外小官也冠古玩翻說西京留守隂世師守式又翻遣兵據永豐倉發粟以賑貧乏出庫物賞戰士移檄郡縣同心討賊世師不能用說輸芮翻乃求募兵山南世師許之上克長安自漢中召還為太府少卿隋避諱以漢中為漢川郡唐復曰漢中仍改郡曰梁州梁洋等州皆在長安南山之南少始照翻乙未附襲譽籍於宗正李襲譽之先亦出於隴西故附之屬籍以親之宗正寺掌天子族親屬籍以别昭穆襲譽襲志之弟也李襲志時事蕭銑丙申朱粲冦淅州舊志鄧州内鄉縣漢淅縣地後周改為中鄉隋改為内鄉武徳二年置浙州又按隋志浙陽郡西魏置浙州治南鄉縣朱粲所冦蓋南鄉之淅州浙音折遣太常卿鄭元璹帥步騎一萬擊之璹殊玉翻帥讀曰率騎奇寄翻是月納言竇抗罷為左武候大將軍十一月乙巳凉王李軌即皇帝位改元安樂樂音洛軌考異曰按軌傳云稱凉王即改元安樂今據實錄戊申王軌以滑州來降李密既敗王軌來降降戸江翻下同薛仁果之為太子也去年秋七月薛舉稱帝仁果為太子與諸將多有隙及即位衆心猜懼郝瑗哭舉得疾遂不起由是國勢浸弱秦王世民至高墌仁果使宗羅㬋將兵拒之羅㬋數挑戰將即亮翻郝呼各翻瑗于眷翻塘章恕翻數所角翻挑徒了翻世民堅壁不出諸將咸請戰世民曰我軍新敗士氣沮喪謂是年七月淺水原之敗也沮在吕翻䘮息浪翻賊恃勝而驕有輕我心宜閉壘以待之彼驕我奮可一戰而克也乃令軍中曰敢言戰者斬相持六十餘日仁果糧盡其將梁胡郎等帥所部來降將即亮翻下同帥讀曰率下同世民知仁果將士離心命行軍總管梁實營於淺水原以誘之誘音酉羅㬋大喜盡銳攻之梁實守險不出營中無水人馬不飲者數日羅㬋攻之甚急世民度賊已疲度徒洛翻謂諸將曰可以戰矣遟明遟直利翻使右武候大將軍龎玉陳於淺水原陳讀曰陣下同羅㬋併兵擊之玉戰㡬不能支㡬居依翻世民引大軍自原北出其不意羅㬋引兵還戰世民帥驍騎數十先陷陳唐兵表裏奮擊呼聲動地帥讀曰率驍堅堯翻騎奇寄翻下同陳讀曰陣呼火故翻羅㬋士卒大潰斬首數千級世民帥二千餘騎追之騎奇寄翻竇軌叩馬苦諫曰仁果猶據堅城雖破羅㬋未可輕進請且按兵以觀之㬋音侯世民曰吾慮之久矣破竹之勢不可失也杜預曰兵威已振譬如破竹數節之後迎刄而解舅勿復言世民竇氏之出呼軌為舅復扶又翻遂進仁果陳於城下世民據涇水臨之仁果驍將渾幹等數人臨陳來降驍堅堯翻將即亮翻渾戸昆翻姓苑記其所出者多左傳鄭有大夫渾罕衛有渾良夫唐渾瑊祖渾邪王吐谷渾後為渾其音戸本翻以為出於渾沌氏者謬也註又見後降户江翻仁果懼引兵入城拒守日向暮大軍繼至遂圍之夜半守城者爭自投下仁果計窮己酉出降得其精兵萬餘人男女五萬口諸將皆賀因問曰大王一戰而勝遽捨步兵又無攻具輕騎直造城下造七到翻衆皆以為不克而卒取之何也卒子恤翻世民曰羅㬋所將皆隴外之人將驍卒悍將即亮翻又音如字領也悍户罕翻又侯旰翻吾特出其不意而破之斬獲不多若緩之則皆入城仁果撫而用之未易克也易以豉翻急之則散歸隴外折墌虛弱仁果破膽不暇為謀此吾所以克也折當作析音思歷翻墌章恕翻衆皆悅服世民所得降卒悉使仁果兄弟及宗羅㬋翟長孫等將之翟萇伯翻長知兩翻與之射獵無所疑間間古莧翻賊畏威銜恩皆願效死世民聞禇亮名求訪獲之禮遇甚厚引為王府文學自隋時親王府有文學上遣使謂世民曰使疏吏翻薛舉父子多殺我士卒必盡誅其黨以謝寃䰟李密諫曰薛舉虐殺無辜此其所以亡也陛下何怨焉懷服之民不可不撫乃命戮其謀首餘皆赦之上使李密迎秦王世民於􅃎州密自恃智略功名見上猶有傲色及見世民不覺驚服此豈獨相表服之哉威靈氣燄足以服之也私謂殷開山曰真英主也不如是何以定禍亂乎詔以員外散騎常侍姜謩為秦州刺史曹魏末置員外散騎常侍散悉亶翻騎奇寄翻謩撫以恩信盜賊悉歸首首手又翻士民安之徐世勣據李密舊境未有所屬魏徵隨密至長安乃自請安集山東上以為祕書丞漢獻帝建安中魏武為魏王置祕書令及二丞乘傳至黎陽遺徐世勣書傳殊戀翻遺于季翻勸之早降世勣遂决計西向謂長史陽翟郭孝恪曰隋志陽翟縣屬襄城郡降戸江翻長知兩翻此民衆土地皆魏公有也李密建國稱魏公吾若上表獻之上時掌翻是利主之敗自為功以邀富貴也吾實恥之今宜籍郡縣戸口士馬之數以啟魏公使自獻之乃遣孝恪詣長安又運糧以餉淮安王神通神通時安撫山東上聞世勣使者至無表止有啟與密甚怪之孝恪具言世勣意上乃嘆曰徐世勣不背德不邀功使疏吏翻背蒲妹翻真純臣也賜姓李時授世勣黎州總管封英國公通鑑書於明年閏二月以孝恪為宋州刺史復以梁郡為宋州此時唐未能有宋州也使與世勣經畧虎牢以東所得州縣委之選補委之選補官吏也癸丑獨孤懷恩攻堯君素於蒲反漢志作蒲反後始作蒲坂行軍總管趙慈景尚帝女桂陽公主為君素所擒梟首城外以示無降意梟堅堯翻降户江翻癸亥秦王世民至長安斬薛仁果於市賜常達帛三百段賞其不屈也唐制凡賜十段其率絹三匹布三端綿四斤若雜綵十段則絲布二匹紬二匹綾二匹縵四匹贈劉感平原郡公諡忠壯以其死節也撲殺仵士政於殿庭撲弼角翻擊也以張貴尤淫暴腰斬之上享勞將士因謂羣臣曰諸公共相翊戴以成帝業若天下承平可共保富貴使王世充得志公等豈有種乎因薛仁果君臣以相戒勞力到翻種章勇翻如薛仁果君臣豈可不以為前鑑也己巳以劉文靜為戸部尚書領陜東道行臺左僕射復殷開山爵位先是劉文靜殷開山皆以淺水原之敗除名李密驕貴日久又自負歸國之功朝廷待之不副本望事見上鬱鬱不樂樂音洛嘗遇大朝㑹密為光祿卿當進食六典光祿卿之職掌邦國酒醴膳羞之事總太官珍羞良醖掌醢四署之官屬朝㑹燕饗則節其等差量其豐約以供焉故當進食朝直遥翻深以為恥退以告左武衛大將軍王伯當伯當心亦怏怏怏於兩翻因謂密曰天下事在公度内耳今東海公在黎陽密封徐世勣為東海公襄陽公在羅口襄陽公未知為誰按密將張善相時為伊州刺史據襄城自襄城北出則羅口蓋李密封善相為襄城公伯當指言之也襄陽公疑當作襄城公河南兵馬屈指可計豈得久如此也密大喜乃獻策於上曰臣虛䝉榮寵安坐京師曾無報效山東之衆皆臣故時麾下請往収而撫之憑籍國威取王世充如拾地芥耳顏師古曰地芥謂草芥之横在地上者俯而拾之言易而必得也上聞密故將士多不附世充亦欲遣密往収之羣臣多諫曰李密狡猾好反將即亮翻好呼到翻今遣之如投魚於泉放虎於山必不反矣上曰帝王自有天命非小子所能取借使叛去如以蒿箭射蒿中耳蒿蓬蕭之屬叢生於地人皆賤其無用剡蒿為箭射之蒿中言其無用而不足惜也北齊源文宗曰國家視淮南同於蒿箭蓋蒿箭之言尚矣射而亦翻今使二賊交鬭吾可以坐収其弊辛未遣密詣山東収其餘衆之未下者密請與賈閏甫偕行上許之命密及閏甫同升御榻賜食傳飲巵酒曰吾三人同飲是酒以明同心善建功名以副朕意丈夫一言許人千金不易有人確執不欲弟行上呼李密為弟朕推赤心於弟非他人所能間也間古莧翻密閏甫再拜受命上又以王伯當為密副而遣之附考異曰高祖實錄未㡬聞其下兵皆不王世充今密収集餘衆以圖洛陽密言於高祖曰臣入朝日淺不願違離又在朝公卿未甚委信願得陛下腹心左右與臣同去高祖曰朕推赤心於人終無疑阻但有益國利人即當專决今從蒲山公傳有大鳥五集于樂壽樂音洛羣鳥數萬從之經日乃去竇建德以為已瑞改元五鳯宗城人有得𤣥圭獻於建徳者宋正本及景城丞㑹稽孔徳紹皆曰此天所以賜大禹也隋志宗城縣屬清河郡舊曰廣宗仁壽元年改焉避煬帝諱也景城縣屬河間郡舊曰成平開皇十八年改隋改越州為㑹稽郡禹平水土錫𤣥圭告厥成功蓋堯錫之也宋正本等引為天瑞以謟建徳過矣隋縣置令丞㑹古外翻請改國號曰夏竇建徳初稱長樂王夏戸雅翻建德從之以正本為納言德紹為内史侍郎初王須拔掠幽州中流矢死中竹仲翻云考異曰革命記須拔衆散奔突厥突厥以為南面可汗今從唐書其將魏刀兒代領其衆據深澤掠冀定之間隋志深澤縣屬博陵郡劉昫曰治滹沱河北宋白曰以界内水澤深廣名縣時復信都郡為冀州博陵郡為定州將即亮翻衆至十萬自稱魏帝建德偽與連和刀兒弛備建德襲擊破之遂圍深澤其徒執刀兒降建德斬之盡幷其衆降户江翻易定等州皆降唯冀州刺史麴稜不下麴稜時附於唐稜婿崔履行暹之孫也崔暹事齊高氏父子以不畏彊禦用自言有奇術可使攻者自敗稜信之履行命守城者皆坐毋得妄鬭曰賊雖登城汝曹勿怖怖普布翻吾將使賊自縛於是為壇夜設章醮然後自衣衰絰衣於既翻衰倉回翻絰徒結翻杖竹登北樓慟哭又令婦女升屋四面振裙建德攻之急稜將戰履行固止之俄而城陷履行哭猶未已自古以來信妖人之言以䘮師亡城者多矣然後世之人猶有信而不悟者若高駢李守貞之徒是也建德見稜曰卿忠臣也厚禮之以為内史令十二月壬申詔以秦王世民為太尉使持節陜東道大行臺使疏吏翻其蒲州河北諸府兵馬並受節度復以河東郡為蒲州河北謂大河以北黎相之地諸府諸總管府癸酉西突厥曷娑那可汗厥九勿翻娑蘇何翻可從刋入聲汗音寒自宇文化及所來降隋煬帝以曷婆那自從煬帝弑從化及降戸江翻隋將堯君素守河東將即亮翻上遣吕紹宗韋義節獨孤懷恩相繼攻之俱不下義寧元年九月屈突通留堯君素守河東吕紹宗攻之不克以韋義節代之又不克武徳元年九月以獨孤懷恩代之仍不下時外圍嚴急君素為木鵝置表於頸具論事勢浮之於河河陽守者得之達於東都皇泰主見而歎息拜君素金紫光祿大夫龎玉皇甫無逸自東都來降上悉遣詣城下為陳利害為于偽翻君素不從宇考異曰高祖實錄令宇文士及為陳利害按文化及為竇建徳所擒士及乃自歸於唐實錄誤也今從隋書又賜金劵許以不死其妻又至城下謂之曰隋室已亡君何自苦君素曰天下名義非婦人所知引弓射之應弦而倒射而亦翻而考異曰實錄云妻號慟去今從隋書君素亦自知不濟然志在守死每言及國家未嘗不歔欷歔音虚欷音希又許既翻謂將士曰吾昔事主上於藩邸隋書堯君素傳煬帝為晉王君素以左右從大義不得不死必若隋祚永終天命有屬屬之欲翻自當斷頭以付諸君聽君等持取富貴斷丁管翻今城池甚固倉儲豐備大事猶未可知不可横生心也横户孟翻君素性嚴明善御衆下莫敢叛久之倉粟盡人相食又獲外人微知江都傾覆丙子君素左右薛宗李楚客殺君素以降傳首長安降戸江翻下同君素遣朝散大夫解人王行本將精兵七百在他所解漢古縣也後魏曰安定西魏改曰南解又改曰綏化又曰虞鄉武徳元年更名解縣别置虞鄉縣並屬蒲州朝直遥翻散悉亶翻解戸買翻將即亮翻聞之赴救不及因捕殺君素者黨與數百人悉誅之復乘城拒守復扶又翻又音如字獨孤懷恩引兵圍之丁酉隋襄平太守鄧暠以柳城北平二郡來降以暠為營州總管隋置襄平柳城郡皆在遼西郡柳城縣界北平郡即平州盧龍之地時復以􅈙西郡為營州守式又翻暠工老翻辛巳太常卿鄭元璹擊朱粲於商州破之復以上洛郡為商州璹殊玉翻初宇文化及遣使招羅藝藝曰我隋臣也斬其使者為煬帝發喪臨三日使疏吏翻為于偽翻臨力鴆翻竇建德高開道各遣使招之藝曰建德開道皆劇賊耳吾聞唐公已定關中人望歸之此真吾主也吾將從之敢沮議者斬沮在吕翻㑹張道源慰撫山東藝遂奉表與漁陽上谷等諸郡皆來降癸未詔以藝為幽州總管隋大業初置漁陽郡於無終唐復以涿郡為幽州考異曰創業注藝以武徳元年二月降舊云三年新書云二年皆誤也今從實錄薛萬均世雄之子也薛世雄死見一百八十四卷義寧元年與弟萬徹俱以勇畧為藝所親待詔以萬均為上柱國永安郡公萬徹為車騎將軍武安縣公唐制上柱國郡公皆正二品縣公從二品車騎將軍則諸衛郎將之職也正五品騎奇寄翻下同竇建德既克冀州兵威益盛帥衆十萬冦幽州帥讀曰率下同藝將逆戰萬均曰彼衆我寡出戰必敗不若使羸兵背城阻水為陳羸倫為翻背蒲妹翻陳讀曰陣彼必度水擊我萬均請以精騎百人伏於城旁俟其半度擊之蔑不勝矣藝從之建德果引兵度水萬均邀擊大破之建德竟不能至其城下乃分兵掠霍堡及雍奴等縣霍堡蓋世亂霍氏宗黨築堡以自固因以為名雍奴漢古縣唐志屬幽州天寶改為武清縣藝復邀擊敗之復扶又翻敗補邁翻凡相距百餘日建德不能克乃還樂壽樂音洛藝得隋通直謁者温彥博以為司馬隋煬帝置謁者臺有司朝謁者通事謁者通直謁者將事謁者藝以幽州歸國彥博贊成之詔以彦博為幽州總管府長史未㡬徵為中書侍郎長知兩翻㡬居豈翻兄大雅時為黄門侍郎與彦博對居近密黄門侍郎居門下省謂之東省中書侍郎居中書省謂之西省故曰對居近密時人榮之以西突厥曷娑那可汗為歸義王厥九勿翻娑素那翻可從刋入聲汗音寒曷娑那獻大珠上曰珠誠至寶然朕寶王赤心珠無所用竟還之乙酉車駕幸周氏陂過故墅水經注白渠尾入櫟陽而東南注于渭故渠逕漢丞相周勃冢南冢北有弱夫冢故渠東南有周氏曲渠又南逕漢景帝陵南又東南注于渭周氏曲即周氏陂也在高陵縣界故墅在高陵縣西十里店上舊所居也武徳六年名龍躍宫初羌豪旁企地以所部附薛舉旁步光翻羌姓也及薛仁果敗企地來降留長安企地不樂企去智翻樂音洛帥其衆數千叛入南山出漢川帥讀曰率此自長安南山諸谷出漢川漢川即漢中所過殺掠武候大將軍龎玉擊之為企地所敗敗補邁翻行至始州普安漢梓潼縣廣漢郡治焉宋置南安郡梁置南梁州後改安州西魏改為始州大業初改為普安郡唐復為始州先天二年改為劒州掠女子王氏與俱醉卧野外王氏拔其佩刀斬首送梁州唐改漢川郡為梁州其衆遂潰詔賜王氏號為崇義夫人壬辰王世充帥衆三萬圍穀州新安縣後周置中州及東垣縣州尋廢開皇十六年置榖州仁壽四年州廢又廢新安入東垣大業初改名新安縣屬河南郡義寧二年破叚達置新安郡武徳元年改榖州取榖水為名帥讀曰率刺史任瓌拒却之任音壬瓌古回翻上使李密分其麾下之半留華州周宣王封其弟友於鄭自漢以來為鄭縣後魏置東雍州及華山郡西魏改曰華州開皇初州廢大業初郡廢為鄭縣屬京兆郡義寧元年析京兆之鄭華隂置華隂郡尋改華州華户化翻將其半出關將即亮翻長史張寶德預在行中恐密亡去罪相及上封事言其必叛長知兩翻上時掌翻上意乃中變又恐密驚駭乃降敕書勞來勞力到翻來力代翻令密留所部徐行單騎入朝更受節度騎奇寄翻朝直遥翻密至稠桑得敕謂賈閏甫曰敕遣我去無故復召我還稠直留翻復扶又翻天子曏云有人確執不許此譖行矣吾今若還無復生理不若破桃林縣開皇十六年分閿鄉陜置桃林縣取古桃林之塞以名縣也在陜西四十五里収其兵糧北走度河比信達熊州宜陽縣後魏置宜陽郡東魏置陽州後周改曰熊州開皇初郡廢大業初州廢屬河南郡義寧二年破叚達置宜陽郡武徳元年置熊州取熊耳山以名州杜佑曰熊州今福昌縣比必寐翻吾已遠矣茍得至黎陽大事必成言欲就徐世勣也公意如何閏甫曰主上待明公甚厚况國家姓名著在圖䜟䜟楚譛翻天下終當一統明公既已委質質職日翻復生異圖復扶又翻下同任瓌史萬寶據熊穀二州任音壬瓌古回翻此事朝舉彼兵夕至雖克桃林兵豈暇集一稱叛逆誰復容人為明公計不若且應朝命朝直遥翻以明元無異心自然浸潤不行論語曰浸潤之譖不行焉閏甫引此更欲出就山東徐思其便可也密怒曰唐使吾與絳灌同列何以堪之言不得如韓彭割地而王使與周勃灌嬰同列且䜟文之應彼我所共今不殺我聽使東行足明王者不死縱使唐遂定關中山東終為我有天與不取乃欲束手投人公吾之心腹何意如是若不同心當斬而後行閏甫泣曰明公雖云應䜟近察天人稍已相違今海内分崩人思自擅强者為雄明公奔亡甫爾誰相聽受且自翟讓受戮之後翟萇伯翻人皆謂明公棄恩忘本今日誰肯復以所有之兵束手委公乎彼必慮公見奪逆相拒抗一朝失勢豈有容足之地哉自非荷恩殊厚者詎肯深言不諱乎荷下可翻願明公熟思之但恐大福不再楚靈王之言茍明公有所措身閏甫亦何辭就戮密大怒揮刃欲擊之王伯當等固請乃釋之閏甫奔熊州伯當亦止密以為未可密不從伯當乃曰義士之志不以存亡易心公必不聽伯當與公同死耳然恐終無益也密因執使者斬之庚子旦密紿桃林縣官曰奉詔蹔還京師使疏吏翻紿徒亥翻蹔與暫同家人請寄縣舍乃簡驍勇數十人著婦人衣戴羃䍦驍堅堯翻著側畧翻羃莫狄翻䍦音離藏刀裙下詐為妻妾自帥之入縣舍帥讀曰率下同須㬰變服突出因據縣城驅掠徒衆直趣南山趣七喻翻又逡須翻乘險而東遣人馳告故將伊州刺史襄城張善相令以兵應接五代志襄城郡東魏置北荆州後周改曰和州開皇初改曰伊州大業初改曰汝州尋改為郡李密復開皇舊州名杜佑曰伊州今陸渾縣將即亮翻相息亮翻右翊衛將軍史萬寶鎮熊州謂行軍總管盛彦師曰李密驍賊也驍堅堯翻又輔以王伯當今决策而叛殆不可當也彦師笑曰請以數千之衆邀之必梟其首梟古堯翻萬寶曰公以何策能爾彦師曰兵法尚詐不可為公言之為于偽翻即帥衆踰熊耳山熊耳山在熊州南南據要道南字當屬上句令弓弩夾路乘高刀楯伏於溪谷楯食尹翻令之曰俟賊半度一時俱發或問曰聞李密欲向洛州而公入山何也洛州謂洛陽彦師曰密聲言向洛實欲出人不意走襄城就張善相耳走音奏相息亮翻若賊入谷口我自後追之山路險隘無所施力一夫殿後必不能制殿丁練翻今吾先得入谷擒之必矣李密既度陜以為餘不足慮陜州之兵既不能邀密密自以為踰山而南他無邀阻不足慮也陜失冉翻遂擁衆徐行果踰山南出彦師擊之密衆首尾斷絶不得相救遂斬密及伯當俱傳首長安曰考異河洛記密因執驛使者斬之曉入桃林詐縣官翻據縣城中驚悸莫敢當者驅掠畜産趨南山時左翊衛將軍上柱國太平公史萬寳在熊州既聞密叛遣將劉善武領兵追躡善武兄善績往在洛口為密所屠善武因此發憤志在取密十日十夜倍道兼行百方羅捕無暫休息追至陸渾縣南七十里與密相及連戰轉鬬一步一前驅密於邢公山與王伯當死之今從實錄及舊書彦師以功賜爵葛國公仍領熊州領當依舊書作鎮李世勣在黎陽上遣使以密首示之告以反狀世勣北面拜伏號慟表請収葬使疏吏翻號戸刀翻詔歸其尸世勣為之行服備君臣之禮世勣以此受知於太宗為于偽翻大具儀衛舉軍縞素葬密于黎陽山南縞工老翻密素得士心哭者多歐血隋右武衛大將軍李景守北平高開道圍之嵗餘不能克遼西太守鄧暠將兵救之景帥其衆遷于柳城守式又翻暠古老翻將即亮翻帥讀曰率下同後將還幽州於道為盜所殺開道遂取北平進陷漁陽郡有馬數千匹衆且萬自稱燕王改元始興號考異曰實錄唐書皆無開道年栁璨注正閏位歴六年號天成李昉歷代年號亦如之宋庠紀年通譜武徳元年開道年號始興云出歷代紀要錄此號未知孰是今從紀要都漁陽懷戎沙門高曇晟劉昫曰懷戎後漢之潘縣屬上谷郡北齊改為懷戎縣隋屬幽州涿郡曇徒含翻晟承正翻因縣令設齋士民大集曇晟與僧五千人擁齋衆而反殺縣令及鎮將將即亮翻自稱大乘皇帝立尼靜宣為邪輸皇后釋氏以人之性識根業各差故有大乘小乘之說改元法輪遣使招開道立為齊王開道帥衆五千人歸之使疏吏翻帥讀曰率居數月襲殺曇晟悉幷其衆有犯法不至死者上特命殺之監察御史李素立諫曰六典監察御史蓋取秦監郡御史以名官晉孝武太元中創置檢校御史後周秋官府有司憲旅下士隋初改為監察御史從八品上監工銜翻三尺法王者所與天下共也漢書客謂杜周曰君為廷尉不循三尺法孟康注云以三尺竹簡書法律也法一動揺人無所措手足陛下甫創洪業奈何棄法臣忝法司不敢奉詔上從之自是特承恩遇命所司授以七品清要官所司擬雍州司戸雍於用翻上曰此官要而不清又擬祕書郎上曰此官清而不要遂擢授侍御史六典侍御史從六品上杜佑曰唐侍御史之職有四謂推彈公廨雜事推者掌推鞠彈者掌彈舉公廨知公廨事雜事臺事總悉判之素立義深之曾孫也李義深趙郡著姓事高齊史云人位兼美上以舞胡安比奴為散騎侍郎散悉亶翻騎奇寄翻禮部尚書李綱諫曰古者樂工不與士齒雖賢如子野師襄皆世不易其業子野晉樂師曠字襄魯樂師唯齊末封曹妙達為王安馬駒為開府有國家者以為殷鑑齊後主亡國亦此之由詩云殷監不遠在夏后之世今天下新定建義功臣行賞未遍高才碩學猶滯草萊而先擢舞胡為五品使鳴玉曳組趨翔廊廟組則古翻非所以規模後世也上不從曰吾業已授之不可追也陳嶽論曰受命之主發號出令為子孫法一不中理則為厲階中竹仲翻今高祖曰業已授之不可追茍授之而是則已授之而非胡不可追歟君人之道不得不以業已授之為誡哉李軌吏部尚書梁碩有智畧軌常倚之以為謀主碩見諸胡浸盛隂勸軌宜加防察由是與戸部尚書安修仁有隙其後安修仁兄弟縛軌以歸於唐卒如梁碩所慮軌子仲琰嘗詣碩碩不為禮乃與修仁共譖碩於軌誣以謀反軌酖碩殺之有胡巫謂軌曰上帝當遣玉女自天而降軌信之發民築臺以候玉女勞費其廣河右飢人相食軌傾家財以賑之不足欲發倉粟賑津忍翻召羣臣議之曹珍等皆曰國以民為本豈可愛倉粟而坐視其死乎謝統師等皆故隋官心終不服謝統師等為軌所執見一百八十四卷義寧元年七月密與羣胡為黨排軌故人乃詬珍曰詬苦候翻百姓餓者自是羸弱勇壯之士終不至此國家倉粟以備不虞豈可散之以飼羸弱羸倫為翻伺祥吏翻僕射茍悅人情不為國計非忠臣也軌以為然由是士民離怨為李軌敗亡張本資治通鑑卷一百八十六
