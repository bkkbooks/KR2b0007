front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百四十六宋司馬光撰胡三省音註梁紀二起旃䝉作噩盡彊圉大淵獻凡三年髙祖武皇帝二天監四年春正月癸夘朔詔曰二漢登賢莫非經術服膺雅道名立行成行下孟翻朱元晦曰服著也膺胷也奉持而著之心胷之間著則略翻魏晉浮蕩儒教淪歇風節罔樹樹立也歇許竭翻抑此之由可置五經博士各一人廣開館宇招内後進於是以賀瑒及平原明山賔吳興沈峻建平嚴植之補博士各主一館館有數百生給其餼廩瑒徒杏翻又音暢餼許既翻鄭𤣥曰餼廩稍食也稍所教翻其射䇿通明者即除為吏漢書音義曰作簡䇿難問列置案上在試者意投射取而答之謂之射䇿朞年之間懐經負笈者雲會瑒循之𤣥孫也笈其劫翻又楚洽翻書箱也晉氏南渡之初以賀循為儒宗又選學生往會稽雲門山從何𦙍受業𦙍時隠雲門山今在會稽南三十一里有雲門寺會工外翻命𦙍選門徒中經明行修者行下孟翻具以名聞分遣博士祭酒巡州郡立學初譙國夏侯道遷以輔國将軍從裴叔業鎮夀陽為南譙太守案魏收地形志晉孝武置南譙郡蓋治渦陽又案蕭子顯齊志武帝永明二年割揚州宣城淮南南豫譙盧江臨江六郡置南豫州四年冠軍長史沈憲啟二豫分置以桑堁子亭為斷潁州汝陽在南譙歴陽界悉屬西豫廬江居晉熙汝隂之中屬南豫求以潁川汝陽屬南豫廬江屬西豫則齊之南譙蓋置於歴陽西界而渦陽已入於魏矣南北建置郡縣最為難考者率如此夏戸雅翻守式又翻與叔業有隙單騎犇魏魏以道遷為驍騎将軍騎奇寄翻驍堅堯翻從王肅鎮夀陽使道遷守合肥肅卒卒子恤翻下同道遷棄戍來犇從梁秦二州刺史莊丘黑鎮南鄭以道遷為長史領漢中太守黑卒詔以都官尚書王珍國為刺史未至道遷隂與軍主考城江忱之等謀降魏降户江翻先是魏仇池鎮将楊靈珍叛魏來犇事見一百四十一卷齊明帝建武四年先悉薦翻将即亮翻朝廷以為征虜将軍假武都王助戍漢中有部曲六百人道遷憚之上遣左右吳公之等使南鄭道遷遂殺使者𤼵兵擊靈珍父子斬之并使者首送於魏使疏吏翻白馬戍主尹天寶聞之引兵擊道遷敗其将龎樹敗補邁翻遂圍南鄭道遷求救於氐王楊紹先楊集起楊集義皆不應集義弟集朗引兵救道遷擊天寶殺之魏以道遷為平南将軍豫州刺史豐縣侯三考異曰梁帝紀天監年二月魏陷梁州而列傳皆無其事魏帝紀正始元年閏十二月癸夘朔蕭衍行梁州事夏侯道遷據漢中來降道遷𫝊具言其事按長厯梁閏二月癸夘即天監四年正月朔也故置於此又以尚書邢巒為鎮西将軍都督征梁漢諸軍事将兵赴之道遷受平南辭豫州辭豫州者欲得梁州也且求公爵魏主不許辛亥上祀南郊大赦乙丑魏以驃騎大将軍髙陽王雍為司空驃匹妙翻騎奇寄翻加尚書令廣陽王嘉儀同三司二月丙子魏以宕昌世子梁彌博為宕昌王宕徒浪翻上謀伐魏壬午遣衛尉卿楊公則将宿衛兵塞洛口自漢以來衛尉與太常太僕廷尉大鴻臚宗正大司農少府為九卿而職名未帶卿字至梁分十二寺始各帶卿字水經注洛澗北逕秦虚下注淮謂之洛口塞悉則翻壬辰交州刺史李凱據州反長史李畟討平之畟初力翻魏邢巒至漢中擊諸城戍所向摧破晉夀太守王景𦙍據石亭水經注漢水自武興城北西南流逕闕城北又西逕石亭戍又逕晉夀城西巒遣統軍李義珍擊走之魏以巒為梁秦二州刺史巴西太守龎景民據郡不下龎皮江翻郡民嚴𤣥思聚衆自稱巴州刺史附於魏攻景民斬之楊集起集義聞魏克漢中而懼閏月帥羣氐叛魏斷漢中糧道帥讀曰率斷丁管翻巒屢遣軍擊破之夏四月丁巳以行宕昌王梁彌博為河凉二州刺史宕昌王冠軍将軍孔陵等将兵二萬戍深杭冠古玩翻将即亮翻晉考異曰梁鄧元起傳魏将王景𦙍孔陵冦東西夀並遣告急按魏邢巒𫝊曰蕭衍晉夀太守王景𦙍據石亭又曰蕭衍遣其将軍孔陵等據深杭然則景𦙍陵皆梁将也元起𫝊誤魯方達戍南安五代志始州普安縣舊曰南安始州唐之劍州任僧褒等戍石同以拒魏任音壬邢巒遣統軍王足将兵擊之所至皆捷遂入劍閣陵等退保梓潼足又進擊破之梁州十四郡地東西七百里南北千里皆入于魏蕭子顯齊志梁州注籍者二十二郡荒郡不預焉今魏取十四郡初益州刺史鄧元起以母老乞歸詔徵為右衛将軍以西昌侯淵藻代之淵藻懿之子也懿死于東昏之手夏侯道遷之叛也尹天寶馳使報元起使疏吏翻及魏冦晉夀王景𦙍等並遣告急衆勸元起急救之元起曰朝廷萬里軍不猝至若冦賊侵淫侵淫以癰疽為喻侵毒好肉為淫肉方須撲討董督之任非我而誰何事怱怱救之史言鄧元起乞歸非由衷之請撲普木翻詔假元起都督征討諸軍事救漢中而晉夀已陷蕭淵藻将至元起營還裝糧儲器械取之無遺淵藻入城恨之又求其良馬元起曰年少郎子何用馬為淵藻恚因醉殺之元起養冦自資而卒不免於死雖淵藻以私忿殺之亦不為無罪也少詩照翻恚於避翻元起麾下圍城哭且問故淵藻曰天子有詔衆乃散遂誣以反上疑焉元起故吏廣漢羅研詣闕訟之上曰果如我所量也使讓淵藻曰元起為汝報讐謂協力誅東昏報其父讐也量音良為于偽翻下同汝為讐報讐忠孝之道如何乃貶淵藻號為冠軍将軍冠古玩翻遺考異曰梁書元起𫝊藻以糧儲無甚怨望之因表元起逗留不憂軍事收付州獄自縊死按若止以逗留表元起安敢擅收前刺史付獄殺之必誣以反也今從南史梁書藻本以冠軍為益州刺史與南史異贈元起征西将軍諡曰忠侯李延夀論曰元起勤乃胥附毛萇曰幸下親上曰胥附功惟闢土謂開梁益之土也勞之不圖禍機先陷冠軍之貶於罰已輕梁之政刑於斯為失私戚之端自斯而啟年之不永不亦宜乎益州民焦僧䕶聚衆作亂蕭淵藻年未弱冠人生二十曰弱冠冠古玩翻集僚佐議自擊之或陳不可淵藻大怒斬于階側乃乗平肩輿巡行賊壘平肩輿使人就掆肩之故曰平肩行下孟翻賊弓亂射矢下如雨從者舉楯禦矢淵藻命去之射而亦翻從才用翻去羌吕翻由是人心大安擊僧䕶等皆平之六月庚戌初立孔子廟豫州刺史王超宗以五代志攷之此時梁置豫州於晉熙今安慶府懐寧縣地将兵圍魏小峴峴戸典翻丁夘魏揚州刺史薛真度遣兼統軍李叔仁等擊之超宗兵大敗冠軍将軍王景𦙍李畎輔國将軍魯方達等與魏王足戰屢敗秋七月足進逼涪城畎姑泫翻涪音浮八月壬寅魏中山王英冦雍州雍於用翻庚戌秦梁二州刺史魯方達與魏王足統軍紀洪雅盧祖遷戰敗方達等十五将皆死壬子王景𦙍等又與祖遷戰敗景𦙍等二十四将皆死楊公則至洛口與魏豫州長史石榮戰斬之甲寅将軍姜慶真與魏戰於羊石不利羊石蓋即陳伯之所屯之陽石也公則退屯馬頭雍州蠻沔東太守田青喜叛降魏攷之北史青喜所據之地蓋在襄陽之東竟陵之西沔彌兖翻魏有芝生於太極殿之西序殿廡曰序魏主以示侍中崔光光上表以為此莊子所謂氣蒸成菌者也菌巨隕翻地簟也柔脆之物生於墟落穢濕之地不當生於殿堂髙華之處今忽有之厥狀扶疎誠足異也夫野木生朝野鳥入廟古人皆以為敗亡之象故太戊中宗懼災修徳殷道以昌商王太戊之時亳有祥桑榖共生于朝一暮大拱太戊懼而修徳祥桑枯死殷道復興髙宗祭成湯有飛雉升鼎耳而雊祖巳曰惟先格王正厥事朝諸侯有天下猶運之於掌中宗當作髙宗朝直遥翻所謂家利而怪先國興而妖豫者也妖於遥翻今西南二方兵革未息郊甸之内大旱踰時民勞物悴莫此之甚悴秦醉翻承天育民者所宜矜恤伏願陛下側躬聳意惟新聖道節夜飲之樂養方富之年則魏祚可以永隆皇夀等於山岳矣於是魏主好宴樂樂音洛好呼到翻故光言及之九月己巳楊公則等與魏揚州刺史元嵩戰公則敗績冬十月丙午上大舉伐魏以揚州刺史臨川王宏都督北討諸軍事尚書右僕射栁惔為副惔徒甘翻王公以下各上國租及田穀以助軍國租者封國所入之租田穀者職田所入之穀各上時掌翻宏軍于洛口楊集起集義立楊紹先為帝自皆稱王十一月戊辰朔魏遣光禄大夫楊椿将兵討之将即亮翻魏王足圍涪城蜀人震恐益州城戍降魏者什二三民自上名籍者五萬餘戸上時掌翻下西上同邢巒表於魏主請乗勝進取蜀以為建康成都相去萬里陸行既絶自襄陽西行遵陸可以至蜀梁州既入于魏則陸路斷矣惟資水路水軍西上非周年不達益州外無軍援一可圖也頃經劉季連反鄧元起攻圍事見上卷元年二年資儲空竭吏民無復固守之志二可圖也蕭淵藻裠屐少年復扶又翻裠渠云翻下裳也屐竭㦸翻蹻也少詩沼翻未洽治務宿昔名将多見囚戮治直吏翻将即亮翻下同今之所任皆左右少年三可圖也蜀之所恃唯在劍閣今既克南安已奪其險據彼竟内竟讀曰境三分已一自南安向涪方軌無礙前軍累敗後衆喪魄四可圖也喪息浪翻淵藻是蕭衍骨肉至親必無死理若克涪城淵藻安肯城中坐而受困必将望風逃去若其出鬭庸蜀士卒駑怯弓矢寡弱五可圖也武王之伐紂也庸蜀八國皆從庸上庸之地蜀蜀郡之地臣内省文吏不習軍旅賴将士竭力頻有薄捷既克重阻省悉景翻重直龍翻重阻猶言重險也民心懐服瞻望涪益時梓潼太守治涪城益州刺史治成都旦夕可圖止以兵少糧匱未宜前出少詩沼翻今若不取後圖便難况益州殷實户口十萬比夀春義陽其利三倍魏先此已得夀春義陽故云然朝廷若欲進取時不可失若欲保境寧民則臣居此無事乞歸侍養養余亮翻魏主詔以平蜀之舉當更聴後勑冦難未夷何得以養親為辭巒又表稱昔鄧艾鍾會帥十八萬衆傾中國資儲僅能平蜀事見七十八卷魏元帝景元四年難乃旦翻帥讀曰率所以然者鬭實力也况臣才非古人何宜以二萬之衆而希平蜀所以敢者正以據得要險士民慕義此往則易易以豉翻下未易同彼來則難任力而行理有可克今王足已逼涪城脱得涪則益州乃成擒之物但得之有早晩耳且梓潼已附民户數萬謂已上名籍之民也朝廷豈可不守又劍閣天險得而棄之良可惜矣諸葛孔明相蜀以大劍小劍有隘東之路故曰劍門以閣道三十里至險乃有闍尉姜維拒鍾會於此晉以其地入梓潼郡桓温入蜀於晉夀置劍閣縣屬梁州臣誠知戰伐危事未易可為自軍度劍閣以來鬢髮中白中竹仲翻日夜戰懼何可為心所以勉强者强其兩翻既得此地而自退不守恐負陛下之爵禄故也且臣之意算正欲先取涪城以漸而進若得涪城則中分益州之地斷水陸之衝魏已得劍閣進取成都涪當其衝梁兵由内水而上救成都涪亦當其衝斷丁管翻彼外無援軍孤城自守何能復持久哉復扶又翻臣今欲使軍軍相次聲勢連接先為萬全之計然後圖功得之則大利不得則自全又巴西南鄭相距千四百里去州迢遰迢田聊翻遰徒計翻迢遰逺也恒多擾動恒户登翻昔在南之日以其統綰勢難曽立巴州鎮静夷獠立巴州見一百三十五卷齊髙帝建元二年省巴州見武帝永明二年獠魯皓翻下同梁州藉利因而表罷彼土民望嚴蒲何楊非唯一族雖率居山谷而豪右甚多文學風流亦為不少但以去州既逺不獲仕進至於州綱無由厠迹州之上佐是謂州綱少詩沼翻是以鬱怏多生異圖怏於兩翻比道遷建義之始比毗至翻嚴𤣥思自號巴州刺史克城以來仍使行事巴西廣袤千里戸餘四萬若於彼立州鎮攝華獠巴西之地華人與獠雜居故云華獠袤音茂則大帖民情帖静也安也伏也從墊江已還不勞征伐自為國有李雄譙縱取蜀東不能過墊江以苻秦兵力之盛取梁益如反掌墊江以東苻秦不能有也邢巒之圖蜀亦規墊江以西而已蓋地利足恃也我朝自紹定失蜀彭大雅遂城渝為制府支持西蜀且四十年渝古墊江之地也墊音疊魏主不從先是魏主以王足行益州刺史先悉薦翻上遣天門太守張齊将兵救益州未至将即亮翻魏主更以梁州軍司泰山羊祉為益州刺史更工衡翻王足聞之不悦輒引兵還還從宣翻又如字遂不能定蜀久之足自魏來犇邢巒在梁州接豪右以禮撫小民以惠州人悦之巒之克巴西也使軍主李仲遷守之仲遷溺於酒色費散兵儲公事諮承無能見者巒忿之切齒仲遷懼謀叛城人斬其首以城來降史言魏所以不能定蜀降戸江翻十二月庚申魏遣驃騎大将軍源懐討武興氐邢巒等並受節度驃匹妙翻騎奇寄翻司徒尚書令謝朏以母憂去職朏敷尾翻是嵗大穰穰豐也詩豐年穰穰米斛三十錢五年春正月丁夘朔魏于后生子昌大赦楊集義圍魏闗城此即陽平闗城也邢巒遣建武将軍傅豎眼討之豎而庾翻集義逆戰豎眼擊破之乗勝逐北壬申克武興執楊紹先送洛陽楊集起楊集義亡走遂滅其國晉惠帝元康六年氐王楊茂搜始據仇池百頃其後浸盛盡有漢武都郡之地北侵隴西天水南侵漢中拓䟦既盛取武都仇池之地楊氏僅據武興今魏既取漢中遂滅楊氏以為武興鎮又改為東益州東益州領武興仇池盤頭廣長廣業梓潼洛叢郡乙亥以前司徒謝朏為中書監司徒朏敷尾翻冀州刺史桓和擊魏南青州不克梁青冀二州治鬱洲魏顯祖取三齊置東徐州於圂城領東安東莞郡髙祖太和二十二年改為南青州五代志沂州沂水縣舊置南青州魏秦州屠各王法智聚衆二千屠直於翻推秦州主簿吕茍兒為主改元建明置百官攻逼州郡涇州民陳瞻亦聚衆稱王改元聖明魏置涇州治臨涇城領安定隴東新平趙平平凉平源等郡己夘楊集起兄弟相帥降魏帥讀曰率降戸江翻甲申封皇子綱為晉安王二月丙辰魏主詔王公以下直言忠諫治書侍御史陽固上表治直之翻上時掌翻以為當今之務宜親宗室勤庶政貴農桑賤工賈賈音古絶談虛窮微之論簡桑門無用之費以救饑寒之苦時魏主委任髙肇疎薄宗室好桑門之法好呼到翻不親政事故固言及之戊午魏遣右衛将軍元麗都督諸軍討吕茍兒麗小新成之子也小新成見一百二十九卷宋孝武大明五年乙丑徐州刺史歴陽昌義之與魏平南将軍陳伯之戰於梁城晉孝武太元中僑立梁郡於淮南夀春界故有梁城其地在夀陽東北鍾離西南義之敗績将軍蕭昞将兵擊魏徐州圍淮陽角城在淮水之陽淮陽又在角城北十八里治宿預梁後於角城置淮陽郡昞音丙三月丙寅朔日有食之己夘魏荆州刺史趙怡平南将軍奚康生救淮陽魏咸陽王禧之子翼遇赦求𦵏其父禧誅見一百四十四卷齊和帝中興元年屢泣請於魏主魏主不許癸未翼與其弟昌曄來犇上以翼為咸陽王翼以曄嫡母李妃之子也請以爵讓之上不許輔國将軍劉思效敗魏青州刺史元繫於膠水魏收志光州長廣郡即墨縣有膠水水經膠水出黔陬縣膠山北流過夷安縣東又東北過膠東縣城北百里注于海敗補邁翻臨川王宏使記室吳興丘遲為書遺陳伯之曰遺于季翻尋君去就之際非有他故直以不能内審諸已外受流言沈迷猖獗以至於此沈持林翻主上屈法申恩吞舟是漏漢懲秦法之苛禁罔疏濶時稱為漏吞舟之魚将軍松柏不翦親戚安居髙臺未傾愛妾尚在松柏不翦謂不毁夷其先世墳墓也親戚安居謂其親戚在江南者皆不以叛黨連坐安居自若也髙臺未傾謂居第未嘗汙瀦池臺如故也愛妾尚在謂其婢妾猶守其家不沒於官及流落於他家也昔雍門子見孟嘗君吟曰髙臺既已傾曲池既已平墳墓生荆棘牧豎游其上孟嘗君亦如是乎孟嘗君為之喟然嘆息而将軍魚游於沸鼎之中鷰巢於飛幕之上魚游釡中古人多有是言言将必至於焦爛左𫝊吳季札謂孫林父曰夫子之居此也猶燕之巢於幕上杜預註曰言至危也不亦惑乎想早勵良圖自求多福庚寅伯之自夀陽梁城擁衆八千來降伯之元年奔魏今復還降户江翻魏人殺其子虎牙詔復以伯之為西豫州刺史未之任復以為通直散騎常侍不使之出當邊鎮恐其復叛也復扶又翻久之卒於家初魏御史中尉甄琛甄七人翻琛丑林翻表稱周禮山林川澤有虞衡之官為之厲禁蓋取之以時不使戕賊而已故雖置有司實為民守之也周禮山虞掌山林之政令物為之厲而為之守禁令萬民時斬材有期日凡竊木者有刑罰林衡掌林麓之禁令而平其守以時計林麓而賞罰之川衡掌巡川澤之禁令而平其守以時舍其守犯禁者執而誅罰之澤虞掌國澤之政令為之厲禁使其地之人守其財物以時入于王府頒其餘于萬民為于偽翻下專為同夫一家之長必惠養子孫長知兩翻天下之君必惠養兆民未有為人父母而吝其醯醢富有羣主而榷其一物者也榷古岳翻今縣官鄣䕶河東鹽池而收其利是専奉口腹而不及四體也蓋天子富有四海何患於貧乞弛鹽禁與民共之録尚書事勰尚書邢巒奏勰彭城王勰也音協以為琛之所陳坐談則理髙行之則事闕竊惟古之善治民者必汚隆随時豐儉稱事治直之翻稱尺證翻役養消息以成其性命若任其自生随其飲啄乃是芻狗萬物老子曰天地不仁以萬物為芻狗註云天施地化不以仁恩天地生萬物視之如芻草狗畜任自然也何以君為是故聖人斂山澤之貨以寛田疇之賦收闗市之税以助什一之儲此謂田疇什一之賦不足以供國用故斂山澤税闗市以助之也取此與彼皆非為身為于偽翻下同所謂資天地之産惠天地之民也今鹽池之禁為日已久積而散之以濟軍國非専為供大官之膳羞給後宫之服玩既利不在己則彼我一也然自禁鹽以來有司多慢出納之間或不如法是使細民嗟怨負販輕議此乃用之者無方非作之者有失也一旦罷之恐乖本㫖一行一改法若奕棊左傳曰奕者舉棊不定不勝其耦今此以喻一行一改無定法也參論理要宜如舊式自此以上合載於一百四十三卷齊東昏永明二年魏主卒從琛議琛議既行於景明初年随格於景明四年今復罷鹽禁是卒從其議也卒子恤翻夏四月乙未罷鹽池禁復收鹽利見上卷二年庚戌魏以中山王英為征南将軍都督揚徐二州諸軍事帥衆十餘萬以拒梁軍帥讀曰率指授諸節度所至以便宜從事江州刺史王茂将兵數萬侵魏荆州誘魏邊民及諸蠻更立宛州将即亮翻誘音酉更魏荆州為宛州也更工衡翻宛於元翻遣其所署宛州刺史雷豹狼等襲取魏河南城蕭子顯齊志雍州有河南郡所領五縣惟棘陽為實土則河南郡當在南陽棘陽縣界五代志鄧州新野縣舊曰棘陽魏遣平南将軍楊大眼都督諸軍擊茂辛酉茂戰敗失亡二千餘人七考異曰大眼𫝊云俘馘千有餘今從魏帝紀大眼進攻河南城茂逃還大眼追至漢水攻拔五城魏征虜将軍宇文福冦司州俘千餘口而去五月辛未太子右衛率張惠紹等侵魏徐州拔宿預執城主馬成龍晉安帝立宿預縣屬淮陽郡魏髙祖以為南徐州治所乙亥北徐州刺史昌義之拔梁城南徐治京口故以鍾離為北徐豫州刺史韋叡遣長史王超等攻小峴未拔叡行圍柵行下孟翻魏出數百人陳於門外陳讀曰陣叡欲擊之諸将皆曰将即亮翻下同向者輕來未有戰備徐還授甲乃可進耳叡曰不然魏城中二千餘人足以固守今無故出人於外必其驍勇者也驍堅堯翻茍能挫之其城自拔衆猶遲疑叡指其節曰朝廷授此非以為飾韋叡法不可犯也遂進擊之士皆殊死戰魏兵敗走因急攻之中宿而拔中讀曰仲又竹使翻戍考異曰魏帝紀六月辛丑陷小峴今從叡𫝊遂至合肥先是右軍司馬胡景略等攻合肥久未下先悉薦翻叡按山川夜帥衆堰肥水頃之堰成水通舟艦繼至帥讀曰率艦戸黯翻魏築東西小城夾合肥叡先攻二城魏将楊靈𦙍帥衆五萬奄至衆懼不敵請奏益兵叡笑曰賊至城下方求益兵将何所及且吾求益兵彼亦益兵兵貴用奇豈在衆也遂擊靈𦙍破之叡使軍主王懐静築城於岸以守堰魏攻拔之城中千餘人皆沒魏人乗勝至堤下兵勢甚盛諸将欲退還漅湖或欲保三义今考異曰南史作三丈從梁書蓋漅湖之水於此分三汊故名退保於此利於入船故衆欲之叡怒曰寧有此邪命取繖扇麾幢樹之堤下示無動志繖蘇旱翻又蘇盱翻幢𫝊江翻魏人來鑿堤叡親與之争魏兵卻因築壘於堤以自固叡起鬬艦髙與合肥城等四面臨之城中人皆哭守将杜元倫登城督戰中弩死将即亮翻中竹仲翻辛巳城潰俘斬萬餘級獲牛羊以萬數叡體素羸未嘗跨馬羸倫為翻每戰常乗板輿督厲将士勇氣無敵晝接賔旅夜半起筭軍書張燈逹曙撫循其衆常如不及故投募之士争歸之所至頓舍館宇藩牆皆應準繩諸軍進至東陵水經注廬江金蘭縣西北東陵鄉大蘇山灌水之所出也攷之諸志無金蘭縣未知何世所置有詔班師班師之詔必在洛口師潰之後史因書叡事而終言之去魏城既近據姚思㢘梁書時魏守甓城去東陵二十里諸将恐其追躡叡悉遣輜重居前身乗小輿殿後重直用翻殿丁練翻魏人服叡威名望之不敢逼全軍而還於是遷豫州治合肥豫州自晉熙還合肥壬午魏遣尚書元遥南拒梁兵癸未魏遣征西将軍于勁節度秦隴諸軍丁亥廬江太守聞喜裴邃克魏羊石城庚寅又克霍丘城水經注曹魏安豐都尉治安豐津南後以其故城立霍丘戍隋立霍丘縣今在夀春東百餘里杜佑曰霍丘漢松滋縣地考異曰梁裴邃𫝊云五年征邵陽洲魏人為長橋以濟邃築壘逼橋密作沒突艦㑹淮水暴漲邃乗艦徑造橋側魏衆驚潰邃乗勝追擊大破之進克羊石霍丘城平小峴攻合肥魏帝紀辛巳衍将陷合肥己丑又陷羊石霍丘案韋叡𫝊叡攻邵陽洲方使邃乗艦焚橋事在克合肥後又梁帝紀辛巳叡克合肥丁亥邃克羊石庚寅克霍丘今從之邃𫝊載取二城在破邵陽洲後誤也六月庚子青冀二州刺史桓和克朐山城胊音劬乙巳魏安西将軍元麗擊王法智破之斬首六千級張惠紹與假徐州刺史宋黑水陸俱進趣彭城圍髙塚戍水經注彭城同孝山隂有楚元王冢髙十許丈廣百許步意者魏立戍於此乎趣七喻翻魏武衛将軍奚康生将兵救之将即亮翻丁未惠紹兵不利黑戰死太子統生五嵗能遍誦五經庚戌始自禁中出居東宫丁巳魏以度支尚書邢巒都督東討諸軍事度徒洛翻魏驃騎大将軍馮翊惠公源懐卒懐性寛簡不喜煩碎驃匹妙翻騎奇寄翻喜許記翻常曰為貴人當舉綱維何必事事詳細譬如為屋但外望髙顯楹棟平正基壁完牢足矣斧斤不平斵削不密非屋之病也秋七月丙寅桓和擊魏兖州拔固城固城疑即抱犢固城也抱犢固在蘭陵界吕茍兒率衆十餘萬屯孤山圍逼秦州此孤山當在上邽左右魏秦州治上邽領天水略陽漢陽郡元麗進擊大破之行秦州事李韶掩擊孤山獲其父母妻子庚辰茍兒帥其徒詣麗降帥讀曰率降户江翻兼太僕卿楊椿别討陳瞻瞻據險拒守諸将或請伏兵山蹊斷其出入斷丁管翻待糧盡而攻之或欲斬木焚山然後進討椿曰皆非計也自官軍之至所向輒克賊所以深竄正避死耳今約勒諸軍勿更侵掠賊必謂我見險不前待其無備然後奮擊可一舉平也乃止屯不進賊果出抄掠椿復以馬畜餌之抄楚交翻復扶又翻不加討逐久之隂簡精卒銜枚夜襲之斬瞻𫝊首秦涇二州皆平戊子徐州刺史王伯敖與魏中山王英戰於隂陵隂陵縣漢屬九江郡晉屬淮南郡梁北譙郡治隂陵城隋改北譙郡為全椒縣屬江都郡唐全椒縣屬滁州伯敖兵敗失亡五千餘人己丑魏發定冀瀛相并肆六州十萬人以益南行之兵相息亮翻上遣将軍角念将兵一萬屯䝉山招納兖州之民降者甚衆魏收志南青州東安郡新泰縣東南有䝉山蓋䝉山即古所謂東䝉也與固城孤山皆近魏兖州東界故梁連兵據之以招兖州之民北史邢巒𫝊謂是時梁人侵軼徐兖是矣角姓也姓苑漢有角善叔将即亮翻降户江翻是時将軍蕭及屯固城桓和屯孤山魏收志蘭陵郡蘭陵縣有石孤山又昌慮縣有孤山魏邢巒遣統軍樊魯攻和别将元恒攻及恒户澄翻統軍畢祖朽攻念壬寅魯大破和於孤山恒拔固城祖朽擊念走之己酉魏詔平南将軍安樂王詮督後發諸軍赴淮南詮長樂之子也安樂王長樂見一百三十三卷宋蒼梧王元徽三年樂音洛詮且縁翻将軍藍懐恭與魏邢巒戰于睢口姓譜藍魯甘翻姓也戰國策有中山大夫藍諸水經注睢水過睢陵縣故城北而東南流逕下相縣故城南又東南流入于泗謂之睢口睢音雖懐恭敗績巒進圍宿預懐恭復于清南築城清南清水之南也復扶又翻巒與平南将軍楊大眼合攻之九月癸酉拔之斬懐恭殺獲萬計張惠紹棄宿預此與後張惠紹聞洛口敗引兵退本一事耳解見後蕭昞棄淮陽遁還臨川王宏以帝弟将兵将即亮翻下同器械精新軍容甚盛北人以為百數十年所未之有軍次洛口水經注洛澗在西曲陽縣北劉牢之斬秦将梁成處北歴秦墟下注淮謂之洛口前軍克梁城即謂昌義之克梁城也諸将欲乗勝深入宏性懦怯部分乖方分扶問翻魏詔邢巒引兵度淮與中山王英合攻梁城宏聞之懼召諸将議旋師吕僧珍曰知難而退不亦善乎宏曰我亦以為然栁惔曰自我大衆所臨何城不服何謂難乎裴邃曰是行也固敵是求何難之避馬仙琕曰王安得亡國之言天子掃境内以屬王惔徒甘翻琕部田翻屬之欲翻有前死一尺無却生一寸昌義之怒須髮盡磔磔陟格翻張開也曰吕僧珍可斬也豈有百萬之師出未逢敵望風遽退何面目得見聖主乎朱僧勇胡辛生拔劍而退退據南史宏𫝊當作起曰欲退自退下官當前向取死議者罷出僧珍謝諸将曰殿下昨來風動謂宏心風𤼵動也意不在軍深恐大致沮喪故欲全師而返耳沮在吕翻喪息浪翻宏不敢遽違羣議停軍不前魏人知其不武遺以巾幗遺于季翻幗古獲翻且歌之曰不畏蕭娘與吕姥言其怯懦如婦人女子也姥莫補翻但畏合肥有韋虎虎謂韋叡也僧珍歎曰使始興吳平為帥而佐之豈有為敵人所侮如是乎始興王憺吳平侯昺帥所類翻欲遣裴邃分軍取夀陽大衆停洛口宏固執不聴令軍中曰人馬有前行者斬於是将士人懐憤怒魏奚康生馳遣楊大眼謂中山王英曰梁人自克梁城已後久不進軍其勢可見必畏我也王若進據洛水彼自犇敗英曰蕭臨川雖騃其下有良将韋裴之屬未可輕也騃古駭翻将即亮翻宜且觀形勢勿與交鋒張惠紹號令嚴明所至獨克軍于下邳前已言張惠紹棄宿預遁還矣宿預在下邳東南百餘里此言軍于下邳是未棄宿預之前事李延夀以此事載之臨川王宏𫝊通鑑因亦連而書之下邳人多欲降者惠紹諭之曰我若得城諸卿皆是國人國人猶言王民也降户江翻下同若不能克徒使諸卿失鄉里非朝廷弔民之意也今且安堵復業勿妄自辛苦降人咸悦己丑夜洛口暴風雨軍中驚臨川王宏與數騎逃去将士求宏不得皆散歸有考異曰梁書宏𫝊云㑹征役久詔班師殊為不實今從南史棄甲投戈填滿水陸捐棄病者及羸老死者近五萬人羸倫為翻近其靳翻宏乗小船濟江夜至白石壘叩城門求入臨汝侯淵猷登城謂曰百萬之師一朝鳥散國之存亡未可知也恐姦人乗間為變間古莧翻城不可夜開宏無以對乃縋食饋之縋馳偽翻淵猷淵藻之弟時昌義之軍梁城聞洛口敗與張惠紹皆引兵退此即張惠紹棄宿預一事也通鑑因南史臨川王宏𫝊所載者書之遂致複出魏主詔中山王英乗勝平蕩東南逐北至馬頭攻拔之城中糧儲魏悉遷之歸北議者咸曰魏運米北歸當不復南向復扶又翻上曰不然此必欲進兵為詐計耳乃命修鍾離城勑昌義之為戰守之備馬頭城在鍾離之西馬頭既陷魏必東攻鍾離故預為之備冬十月英進圍鍾離魏主詔邢巒引兵會之巒上表以為南軍雖野戰非敵而城守有餘今盡鋭攻鍾離得之則所利無幾不得則虧損甚大且介在淮外借使束手歸順猶恐無糧難守况殺士卒以攻之乎又征南士卒從戎二時從戎二時謂兵連不解自夏迄秋也疲弊死傷不問可知雖有乗勝之資懼無可用之力若臣愚見謂宜修復舊戍撫循諸州以俟後舉江東之釁不患其無詔曰濟淮掎角事如前敕釁許覲翻掎居蟻翻何容猶爾盤桓盤桓不進貌方有此請可速進軍巒又表以為今中山進軍鍾離實所未解解户買翻曉也若為得失之計謂為一切之計或得或失未可必也不顧萬全直襲廣陵出其不備或未可知若止欲以八十日糧取鍾離城者臣未之前聞也英期以八十日糧取鍾離故巒云然彼堅城自守不與人戰城塹水深非可填塞塞悉則翻空坐至春士卒自弊若遣臣赴彼從何致糧夏來之兵不齎冬服脱遇氷雪何方取濟臣寧荷怯懦不進之責不受敗損空行之罪荷下可翻鍾離天險朝貴所具謂朝之貴臣所具知也朝直遥翻若有内應則所不知如其無也必無克狀言必無可克之狀若信臣言願賜臣停若謂臣憚行求還臣所領兵乞盡付中山任其處分處昌吕翻分扶問翻臣止以單騎随之東西臣屢更為将騎奇寄翻更工衡翻将即亮翻頗知可否臣既謂難何容强遣强其兩翻乃召巒還更命鎮東将軍蕭寶寅與英同圍鍾離侍中盧昶素惡巒更工衡翻惡烏路翻與侍中領右衛将軍元暉共譖之使御史中尉崔亮彈巒在漢中掠人為奴婢巒傳云巒初至漢中接豪右以禮撫衆以惠嵗餘之後頗因其去就誅滅百姓籍為奴婢者二百餘人彈徒丹翻巒以漢中所得美女賂暉暉言於魏主曰巒新有大功不當以赦前小事案之謂是年正月生皇子赦也魏主以為然遂不問暉與盧昶皆有寵於魏主而貪縱時人謂之餓虎将軍饑鷹侍中暉尋遷吏部尚書用官皆有定價大郡二千匹次郡下郡遞減其半餘官各有等差選者謂之市曹以選曹貨賂為市因謂之市曹選須絹翻丁酉梁兵圍義陽者夜遁聞洛口師潰故亦遁魏郢州刺史婁悦追擊破之柔然庫者可汗卒子伏圖立號佗汗可汗佗汗魏言緒也可從刋入聲汗音寒佗徒河翻改元始平戊申佗汗遣使者紇奚勿六跋如魏請和魏主不報其使謂勿六跋曰蠕蠕逺祖社崘乃魏之叛臣事見一百八卷晉孝武太元十九年使疏吏翻蠕人兖翻崘盧昆翻往者包容蹔聴通使事見一百三十六卷齊武帝永明五年蹔與暫同今蠕蠕衰微不及疇昔大魏之徳方隆周漢正以江南未平少寛北略少詩沼翻通和之事未容相許若修藩禮欵誠昭著者當不爾孤也孤負也魏京兆王愉廣平王懐國臣多驕縱公行屬請屬之欲翻魏主詔中尉崔亮窮治之治直之翻坐死者三十餘人其不死者悉除名為民惟廣平右常侍楊昱文學崔楷以忠諫獲免昱椿之子也自晉以來王國置師友文學各一人左古常侍各一人楊椿見一百三十七卷齊武帝永明八年十一月乙丑大赦詔右衛将軍曹景宗都督諸軍二十萬救鍾離上勑景宗頓道人洲道人洲在邵陽洲之東俟衆軍齊集俱進景宗固啟求先據邵陽洲尾上不許景宗欲専其功違詔而進值暴風猝起頗有溺者溺奴狄翻復還守先頓謂還守道人洲也復扶又翻上聞之曰景宗不進蓋天意也若孤軍獨往城不時立必致狼狽今破賊必矣初漢歸義侯勢之末羣獠始出北自漢中南至邛笮布滿山谷事見九十七卷晉孝宗永和二年獠魯皓翻邛渠容翻笮音昨勢既亡蜀民多東徙山谷空地皆為獠所據其近郡縣與華民雜居者頗輸租賦逺在深山者郡縣不能制梁益二州嵗伐獠以自潤公私利之及邢巒為梁州獠近者皆安堵樂業樂音洛逺者不敢為冦巒既罷去魏以羊祉為梁州刺史傅豎眼為益州刺史去年魏得晉夀置益州豎而庾翻祉性酷虐不得物情獠王趙清荆引梁兵入州境為冦祉遣兵擊破之豎眼施恩布信大得獠和十二月癸夘都亭靖侯謝朏卒朏敷尾翻魏人議樂久不决三年魏命議樂事見上卷六年春正月公孫崇請委衛軍将軍尚書右僕射髙肇監其事監工衡翻魏主知肇不學詔太常卿劉芳佐之魏中山王英與平東将軍楊大眼等衆數十萬攻鍾離鍾離城北阻淮水魏人於邵陽洲兩岸為橋樹柵數百步跨淮通道英據南岸攻城大眼據北岸立城以通糧運城中衆纔三千人昌義之督帥将士随方抗禦魏人以車載土填塹使其衆負土随之嚴騎蹙其後人有未及回者因以土迮之帥讀曰率将即亮翻塹七艷翻騎奇寄翻迮側百翻迫也俄而塹滿衝車所撞撞𫝊江翻城土輒頽義之用泥補之衝車雖入而不能壊魏人晝夜苦攻分畨相代墜而復升復扶又翻下同莫有退者一日戰數十合前後殺傷萬計魏人死者與城平二月魏主召英使還英表稱臣志殄逋冦而月初已來已以字通霖雨不止若三月晴霽城必克願少賜寛假少詩沼翻魏主復詔曰彼土蒸濕無宜久淹勢雖必取乃将軍之深計兵久力殆亦朝廷之所憂也英猶表稱必克魏主遣步兵校尉范紹詣英議攻取形勢紹見鍾離城堅勸英引還英不從元英違衆議志在必克鍾離恃義陽之勝而驕也兵法曰常勝之家難與慮敵又曰兵驕者敗其謂是歟校户教翻上命豫州刺史韋叡将兵救鍾離将即亮翻下同受曹景宗節度叡自合肥取直道由隂陵大澤行水經注濠水出隂陵縣之陽亭東北流逕鍾離城下而注于淮隂陵蓋有在鍾離西南合肥東北也值澗谷輒飛橋以濟師人畏魏兵盛多勸叡緩行叡曰鍾離今鑿穴而處處昌吕翻負户而汲車馳卒奔猶恐其後而况緩乎魏人已墮吾腹中卿曹勿憂也旬日至邵陽上豫勑曹景宗曰韋叡卿之鄉望曹景宗新野人韋叡以京兆著姓居襄陽既同州鄉而韋為望族宜善敬之景宗見叡禮甚謹上聞之曰二将和師必濟矣景宗與叡進頓邵陽洲叡於景宗營前二十里夜掘長塹樹鹿角截洲為城去魏城百餘步南梁太守馮道根能走馬步地計馬足以賦功比曉而營立賦市也給與也功力也計一夫之力所任作謂之功杜佑通典曰凡築城下濶與髙倍上濶與下倍城髙五丈下闊二丈五尺上闊一丈二尺五寸髙下闊狹以此為準料功上闊下加濶得三丈七尺五寸半之得一丈八尺七寸五分以髙五丈乗之一尺之城積數得九十三丈七尺五寸每一功日築土二尺計功約四十七人一步五尺之城計役二百三十五人一百步計役二萬三千五百人率一里則十里可知其出土負簣並計之大功之内城濠面濶二丈深一丈㡳闊一丈以面濶加底積數大半之得數一丈五尺以深一丈乗之鑿濠一尺得數一十五丈每一人計功日出三丈計功五人一步五尺計功二十五人十步計功二百五十人一里計功七萬五百人以此為數則百里可知比必利翻及也魏中山王英大驚以杖擊地曰是何神也景宗等器甲精新軍容甚盛魏人望之奪氣景宗慮城中危懼募軍士言文達等言姓孔門言偃吳人今吳人猶有言姓潛行水底齎勑入城城中始知有外援勇氣百倍楊大眼勇冠軍中将萬餘騎來戰所向皆靡叡結車為陳冠古玩翻将即亮翻騎奇寄翻陳讀曰陣大眼聚騎圍之叡以彊弩二千一時俱𤼵洞甲穿中中如字殺傷甚衆矢貫大眼右臂大眼退走明旦英自帥衆來戰帥讀曰率叡乗素木輿執白角如意以麾軍如意􅀈翻一日數合英乃退魏師復夜來攻城復扶又翻飛矢雨集叡子黯請下城以避箭叡不許軍中驚叡於城上厲聲呵之乃定此確鬭也兩軍營壘相逼旦暮接戰勇而無剛者不能支久韋叡於此是難能也比年襄陽之守使諸将連營而前如韋叡之畧城猶可全不至誤國矣嗚呼痛哉牧人過淮北伐芻藁者皆為楊大眼所畧曹景宗募勇敢士千餘人於大眼城南數里築壘大眼來攻景宗擊却之壘成使别将趙草守之有抄掠者皆為草所獲是後始得縱芻牧上命景宗等豫裝髙艦使與魏橋等為火攻之計将即亮翻抄楚交翻艦户黯翻令景宗與叡各攻一橋叡攻其南景宗攻其北魏於邵陽洲兩岸立橋南橋以接元英之兵北橋以接楊大眼之兵三月淮水暴漲六七尺等考異曰梁帝紀四月癸未景宗破魏軍魏帝紀四月戊戌鍾離大水英敗績按曹景宗傳云三月春水生淮水暴漲梁魏二史蓋據奏到月日書之耳今從景宗𫝊叡使馮道根與廬江太守裴邃秦郡太守李文釗等沈約曰晉武帝分扶風為秦國中原亂其民南流寄居堂邑堂邑本為縣前漢屬臨淮後漢屬廣陵晉又屬臨淮惠帝永興元年以臨淮淮陵立堂邑郡安帝改堂邑為秦郡五代志揚州六合縣舊曰尉氏置秦郡乗鬬艦競發擊魏洲上軍盡殪殪於計翻别以小船載草灌之以膏從而焚其橋風怒火盛煙塵晦冥敢死之士拔柵斫橋水又漂疾倏忽之間橋柵俱盡道根等皆身自搏戰軍人奮勇呼聲動天地呼火故翻無不一當百魏軍大潰英見橋絶脱身棄城走大眼亦燒營去諸壘相次土崩悉棄其器甲争投水死者十餘萬斬首亦如之叡遣報昌義之義之悲喜不暇答語但叫曰更生更生諸軍逐北至濊水上魏收志睢州穀陽郡連城縣有濊水按水經注服䖍云穀水在沛國相縣界藎睢水逕穀熟而兩分穀水之名蓋因地變然則穀水即泗水也魏收又云睢州即梁之潼州治取慮城又按水經注睢水自穀熟東流逕取慮城北又東逕睢陵城北又東與潼水會參而攻之則濊水當在沛臨淮二郡界丁度集韻曰濊呼外翻一作渙音同水名在亳州是則濊水即渙水音同而字異耳英單騎入梁城縁淮百餘里尸相枕藉生擒五萬人枕之任翻藉慈夜翻釋考異曰韋叡𫝊云其餘甲稽顙乞為囚奴者猶數十萬按魏軍共止數十萬如叡𫝊所言似為太過今從景宗𫝊收其資糧器械山積牛馬驢騾不可勝計騾盧戈翻勝音升義之徳景宗及叡請二人共會設錢二十萬官賭之樗蒱賭博私相與為戲耳不設於公庭今官賭之於徐州府廨公賭之也博以取財曰賭音丁古翻景宗擲得雉叡徐擲得盧遽取一子反之曰異事遂作塞反讀曰翻又如字樗蒱得盧者勝反一子而作塞塞者擲采未成次擲者塞之以决勝負塞與簺同先代翻異事猶言怪事也景宗與羣帥争先告捷帥所類翻叡獨居後世尤以此賢之史言韋叡有功不伐詔增景宗叡爵邑義之等受賞各有差夏四月己酉以江州刺史王茂為尚書右僕射安成王秀為江州刺史秀将發主者求堅船以為齋舫以船載齋庫物因曰齋舫舫甫妄翻並兩船曰舫秀曰吾豈愛財而不愛士乎乃以堅者給參佐下者載齋物既而遭風齋舫遂破時諸王並下士建安王偉與秀尤好人物時人方之四豪丁巳以臨川王宏為驃騎将軍開府儀同三司驃匹妙翻騎奇寄翻建安王偉為揚州刺史右光禄大夫沈約為尚書左僕射左僕射王瑩為中軍将軍六月丙午馮翊等七郡叛降魏馮翊等郡江左僑立於雍州界降户江翻秋七月丁亥以尚書右僕射王茂為中軍将軍八月戊子大赦魏有司奏中山王英經算失圖齊王蕭寶寅等守橋不固皆處以極法處昌吕翻己亥詔英寶寅免死除名為民楊大眼徙營州為兵魏世祖真君五年置營州治和龍城領昌黎建徳遼東樂浪冀陽郡以中䕶軍李崇為征南将軍揚州刺史崇多事産業征南長史狄道辛琛屢諫不從琛丑林翻遂相糾舉詔並不問崇因置酒謂琛曰長史後必為刺史但不知得上佐何如人耳琛曰若萬一叨忝得一方正長史朝夕聞過是所願也崇有慙色九月己亥魏以司空髙陽王雍為太尉尚書令廣陽王嘉為司空甲子魏開斜谷舊道漢髙祖之為漢王也從杜南入斜中張良送至褒中褒斜一谷也南谷曰褒北谷曰斜意此即斜谷舊道諸葛亮揚聲内斜谷取郿非杜南舊道也以事勢言之承平舊時自長安入蜀其取道就平易南北分争塞故道而開新路以依險今魏欲就平易以通梁益故復開舊道斜余遮翻谷音浴冬十月壬寅以五兵尚書徐勉為吏部尚書勉精力過人雖文案填積坐客充滿應對如流手不停筆又該綜百氏皆為避諱為于偽翻嘗與門人夜集客虞暠求詹事五官太子詹事亦有五官掾嵩古老翻勉正色曰今夕止可談風月不可及公事時人咸服其無私閏月乙丑以臨川王宏為司徒行太子太傅尚書左僕射沈約為尚書令行太子少傅吏部尚書袁昂為右僕射丁夘魏皇后于氏殂是時髙貴嬪有寵而妬髙肇勢傾中外后暴疾而殂人皆歸咎髙氏宫禁事祕莫能詳也為魏太子昌卒張本甲申以光禄大夫夏侯詳為尚書左僕射乙酉魏𦵏順皇后于永泰陵十二月丙辰豐城景公夏侯詳卒沈約曰吳立富城縣晉武太康元年更名豐城屬豫章郡乙丑魏淮陽鎮都軍主常邕和以城來降降户江翻考異曰魏帝紀十月庚午淮陽太守安樂以城南叛今從梁帝紀資治通鑑卷一百四十六
