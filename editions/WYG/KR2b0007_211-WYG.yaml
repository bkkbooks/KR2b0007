front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷二百十一宋司馬光撰胡三省音注唐紀二十七起閼逢攝提格盡彊圉大荒落凡四年𤣥宗至道大聖大明孝皇帝上之中開元二年春正月壬申制選京官有才識者除都督刺史都督刺史有政迹者除京官京官即在朝官也使出入常均永為恒式恒户登翻己卯以盧懷慎檢校黄門監去年改門下省為黄門侍中為監檢校黄門監檢校侍中也舊制雅俗之樂皆𨽻太常上精曉音律以太常禮樂之司不應典倡優雜伎倡音昌伎渠綺翻下同乃更置左右教坊以教俗樂命右驍衞將軍范及為之使更工衡翻使疏吏翻又選樂工數百人自教法曲於棃園謂之皇帝棃園弟子棃園在禁苑中注已見前又教宫中使習之又選伎女置宜春院宜春院當在西内宜春門内近射殿給賜其家禮部侍郎張廷珪酸棗尉袁楚客皆上疏以為上春秋鼎盛宜崇經術邇端士尚樸素深以恱鄭聲好遊獵為戒上時掌翻疏所去翻好呼到翻上雖不能用咸嘉賞之中宗以來貴戚爭營佛寺奏度人為僧兼以偽妄富户彊丁多削髪以避徭役所在充滿姚崇上言佛圖澄不能存趙石虎敬重佛圖澄澄死而趙亡鳩摩羅什不能存秦姚興師鳩摩羅什興死而秦亡齊襄梁武未免禍殃但使蒼生安樂即是福身何用妄度姦人使壞正法樂音洛壞音怪上從之丙寅命有司沙汰天下僧尼尼女夷翻以偽妄還俗者萬二千餘人初營州都督治栁城以鎮撫奚契丹則天之世都督趙文翽失政奚契丹攻陷之見二百五卷武后萬嵗通天元年契欺訖翻又音喫翽呼㑹翻是後寄治幽州東漁陽城據舊書漁陽城在幽州東二百里或言靺鞨奚霫大欲降唐止以唐不建營州無所依投為黙啜所侵擾故且附之靺鞨音末曷霫而立翻降户江翻啜陟劣翻若唐復建營州則相帥歸化矣復扶又翻帥讀曰率并州長史和戎大武等軍州節度大使薛訥信之大武軍在代州北後改曰大同軍使疏吏翻奏請擊契丹復置營州上亦以冷陘之役欲討契丹冷陘敗見上卷先天元年羣臣姚崇等多諫甲申以訥同紫㣲黄門三品將兵擊契丹将即亮翻羣臣乃不敢言薛王業之舅王仙童侵暴百姓御史彈奏業為之請彈徒丹翻為于偽翻敕紫微黄門覆按姚崇盧懷慎等奏仙童辠状明白御史所言無所枉不可縱捨上從之由是貴戚束手二月庚寅朔太史奏太陽應虧不虧姚崇表賀請書之史冊從之乙未突厥可汗黙啜遣其子同俄特勒及妹夫火㧞頡利發厥九勿翻可從刋入聲汗音寒頡户結翻考異曰舊郭䖍瓘𫝊云默啜壻今從舊突厥𫝊及唐厯舊䖍瓘𫝊作移江可汗突厥𫝊作移湼可汗今從唐紀石附失畢將兵圍北庭都䕶府都䕶郭䖍瓘擊破之阿烏葛翻將即亮翻敗補邁翻同俄單騎逼城下䖍瓘伏壮士於道側突起斬之騎竒寄翻突厥請悉軍中資糧以贖同俄聞其已死慟哭而去丁未敕自今所在毋得創建佛寺舊寺頽壞應葺者詣有司陳牒檢視然後聽之閠月以鴻臚少卿朔方軍副大總管王晙兼安北大都䕶朔方道行軍大總管令豐安定逺三受降城及旁側諸軍皆受晙節度靈州界有豐安定逺等軍在黄河外武徳四年分豐州廻樂縣置豐安縣貞觀十三年省入廻樂杜佑曰豐安軍在靈武西黄河外百八十餘里定逺軍在靈武東北二百里黄河外臚陵如翻晙子峻翻降户江翻徙大都䕶府於中受降城杜祐曰安北府東至榆林三百五十里南至朔方八百里西至九原三百五十里北至囘紇界七百里置兵屯田丁卯復置十道按察使罷十道按察使見上卷上年復扶又翻使疏吏翻以益州長史陸象先等為之長和兩翻上思徐有功用法平直乙亥以其子大理司直惀為㳟陵令惀力迍翻又力尹翻恭陵孝敬皇帝陵竇孝諶之子光禄卿􅃎公希瑊等請以已官爵讓惀以報其徳竇孝諶事見二百五卷武后長夀二年諶氏壬翻瑊古咸翻由是惀累遷申王府司馬唐制大理司直從六品上親王府司馬從四品下丙子申王成義請以其府録事閻楚珪為其府參軍唐親王府録事從九品上流外官也參軍正七品上上許之姚崇盧懷慎上言先嘗得㫖云王公駙馬有所奏請非墨敕皆勿行引近㫖以寢格其請臣竊以量材授官當歸有司量音良若緣親故之恩得以官爵為恵踵習近事近事謂中宗朝濫官之弊實紊紀綱紊音問事遂寢由是請謁不行突厥石阿失畢既失同俄不敢歸癸未與其妻來奔以為右衛大將軍封燕北郡王燕因肩翻命其妻曰金山公主或告太子少保劉幽求太子詹事鍾紹京有怨望語下紫微省按問幽求等不服姚崇盧懷慎薛訥言於上曰幽求等皆功臣乍就閑職微有沮䘮下遐嫁翻沮在吕翻䘮息浪翻人情或然功業既大榮寵亦深一朝下獄恐驚逺聽戊子貶幽求為睦州刺史紹京為果州刺史果州漢安漢縣地宋於安漢故城置南宕渠郡隋廢郡改安漢縣曰南充縣屬隆州武徳四年置果州舊志睦州京師東南三千六百五十九里果州至京師二千五百五十八里於考異曰幽求傳曰姚崇素嫉忌之乃奏言幽求鬱怏散職兼有怨言貶授睦州刺史紹京𫝊曰姚崇素惡紹京之為人因奏紹京發言怨望左遷綿州刺史今從實録紫㣲侍郎王琚行邉軍未還去年遣王琚按行北邉諸軍行下孟翻還從宣翻又如字亦坐幽求黨貶澤州刺史澤州京師東北一千三十里敕涪州刺史周利貞等十三人皆天后時酷吏周利貞裴談張栖正張思敬王承本劉暉楊允康暐封珣行張知黙衛遂忠公孫琰鍾思亷等凡十三人涪音浮比周興等情状差輕宜放歸草澤終身勿齒西突厥十姓酋長都擔叛三月己亥磧西節度使阿史那獻克碎葉等鎮擒斬都擔降其部落二萬餘帳厥九勿翻酋慈由翻長知兩翻擔都甘翻磧七迹翻降户江翻考異曰實録此月云獻擒賊帥都擔六月梟都擔首盖此月奏擒之六月𫝊首方至耳實録此月又云以西域二萬餘帳内附六月云擒其部落五萬餘帳新𫝊云三萬帳盖兵家好虚聲今從其少者御史中丞姜晦以宗楚客等改中宗遺詔事見二百九卷睿宗景雲元年青州刺史韋安石太子賔客韋嗣立刑部尚書趙彦昭特進致仕李嶠於時同為宰相不能匡正令監察御史郭震彈之監古銜翻彈徒丹翻且言彦昭拜巫趙氏為姑䝉婦人服與妻乘車詣其家甲辰貶安石為沔州别駕嗣立為岳州别駕彦昭為袁州别駕舊志岳州京師東南二千二百二十七里袁州京師東南三千五百八十里沔彌兖翻之考異曰彦昭𫝊曰姚崇素惡彦昭為人今從實録嶠為滁州别駕滁州漢全椒縣地江左為南北二譙州及新昌郡隋改南譙州曰滁州舊志滁州京師東南二千五百六十四里滁音除安石至沔州晦又奏安石嘗檢校定陵定陵中宗陵盗隱官物下州徵贓下遐嫁翻安石歎曰此祗應須我死耳憤恚而卒恚於避翻卒子恤翻晦皎之弟也毁天樞造天樞見二百五卷武后延載元年發匠鎔其鐵錢厯月不盡先是韋后亦於天街作石臺髙數丈以頌功徳天街即京城朱雀街先悉薦翻髙古號翻至是并毁之夏四月辛巳突厥可汗黙啜復遣使求昏復扶又翻使疏吏翻自稱乾和永清太駙馬天上得果報天男突厥聖天骨咄禄可汗天男猶云天子也咄當沒翻五月己丑以嵗饑悉罷員外試檢校官員外官一也試官二也檢校官三也罷之以其冗濫日靡俸廩也自今非有戰功及别勑毋得注擬此三項官今後非有戰功及别敕特行録用吏兵部毋得注擬己酉吐蕃相坌逹延吐從暾入聲相息亮翻坌蒲頓翻遺宰相書遺于季翻請先遣解琬至河源正二國封疆然後結盟琬嘗為朔方大總管故吐蕃請之前此琬以金紫光禄大夫致仕復召拜左散騎常侍而遣之復扶又翻又如字又命宰相復坌逹延書招懷之琬上言吐蕃必隂懷叛計請預屯兵十萬於秦渭等州以備之史言解琬所言其識逺過崔漢衡上時掌翻黄門監魏知古本起小吏因姚崇引薦以至同為相崇意輕之請知古攝吏部尚書知東都選事遣吏部尚書宋璟於門下過官唐制凡文武職事官六品以下吏兵部進擬必過門下省量其階資校其才用以審定之若擬職不當隨其優屈退而量焉謂之過官選須絹翻知古銜之崇二子分司東都恃其父有徳於知古頗招權請託知古歸悉以聞它日上從容問崇從千容翻卿子才性何如今何官也崇揣知上意揣初委翻對曰臣有三子兩在東都為人多欲而不謹是必以事干魏知古臣未及問之耳上始以崇必為其子隱為于偽翻及聞崇奏喜問卿安從知之對曰知古微時臣卵而翼之左𫝊楚子西謂白公勝曰勝如卵余翼而長之臣子愚以為知古必徳臣容其為非故敢干之耳上于是以崇為無私而薄知古負崇欲斥之崇固請曰臣子無狀撓陛下法撓奴巧翻又奴教翻陛下赦其辠已幸矣苟因臣逐知古天下必以陛下為私於臣累聖政矣累力瑞翻上久乃許之辛亥知古罷為工部尚書上考異曰舊知古傳二年還京屢有顧問恩意甚厚尋改紫㣲令姚崇深忌憚之隂加讒毀乃除工部尚書罷知政事新傳亦云由黄門監改紫㣲令今據實録知古自黄門監罷政事其所以罷從柳氏舊聞宋王成器申王成義於上兄也岐王範薛王業上之弟也􅃎王守禮上之從兄也從才用翻上素友愛近世帝王莫能及初即位為長枕大被與兄弟同寢諸王每旦朝於側門朝直遥翻下同退則相從宴飲鬬雞擊毬或獵於近郊遊賞别墅中使存問相望於道墅承與翻使疏吏翻下同上聽朝罷多從諸王遊在禁中拜跪如家人禮飲食起居相與同之於殿中設五幄與諸王更處其中更工衡翻下更奏同處昌吕翻或講論賦詩間以飲酒博奕遊獵間古莧翻下讒間同或自執絲竹成器善笛範善琵琶與上更奏之諸王或有疾上為之終日不食終夜不寢業嘗疾上方臨朝須㬰之間使者十返上親為業煑藥為于偽翻囘飆吹火誤爇上須左右驚救之上曰但使王飲此藥而愈須何足惜爇如恱翻須與鬚同成器尤恭慎未嘗議及時政與人交結上愈信重之故䜛間之言無自而入然專以聲色畜養娱樂之畜吁玉翻樂音洛不任以職事羣臣以成器等地逼請循故事出刺外州六月丁巳以宋王成器兼岐州刺史舊制岐州京師西三百一十五里申王成義兼􅃎州刺史録考異曰實舊𫝊作幽州今從唐厯舊紀􅃎王守禮兼虢州刺史虢州西至京師四百三十里令到官但領大綱自餘州務皆委上佐主之上佐長史司馬也是後諸王為都䕶都督刺史者並凖此丙寅吐蕃使其宰相尚飲藏來獻盟書尚吐蕃之貴姓也上以風俗奢靡秋七月乙未制乘輿服御金銀器玩宜令有司銷毁以供軍國之用其珠玉錦繡焚于殿前乘繩證翻后妃以下皆毋得服珠玉錦繡戊戌敕百官所服帶及酒器馬衘鐙鐙都鄧翻鞍鐙也三品以上聽飾以玉四品以金五品以銀自餘皆禁之婦人服飾從其夫子夫子者夫若子也其舊成錦繡聽染為皂自今天下更毋得采珠玉織錦繡等物違者杖一百工人減一等唐法杖一百决臀杖二十減一等則杖八十罷兩京織錦坊臣光曰明皇之始欲為治治直吏翻能自刻厲節儉如此晩節猶以奢敗甚哉奢靡之易以溺人也詩云靡不有初鮮克有終詩蕩之辭易以䜴翻鮮息淺翻可不慎哉薛訥與左監門衛將軍杜賔客定州刺史崔宣道等將兵六萬監古衘翻將即亮翻人考異曰舊傳云兵二萬僉載云八萬皆没今從唐紀出檀州擊契丹賔客以為士卒盛夏負戈甲齎資糧深入冦境難以成功訥曰盛夏草肥羔犢孳息小羊曰羔小牛曰犢孳津之翻生也因糧於敵正得天時一舉滅虜不可失也行至灤水山峽中薊州雄武軍東北行百二十里至鹽城守捉又東北渡灤河灤落官翻契丹伏兵遮其前後從山上擊之唐兵大敗死者什八九訥與數十騎突圍得免虜中嗤之謂之薛婆俗謂婦人之老曰婆言薛訥老怯如老婦人也崔宣道將後軍聞訥敗亦走訥歸罪於宣道及胡將李思敬等八人将即亮翻制悉斬之於幽州庚子敕免訥死削除其官爵獨赦杜賔客之罪壬寅以北庭都䕶郭䖍瓘為凉州刺史河西諸軍州節度使使疏吏翻果州刺史鍾紹京心怨望數上疏妄陳休咎數所角翻乙巳貶溱州刺史溱側詵翻丁未房州刺史襄王重茂薨輟朝三日追諡曰殤皇帝以韋氏所立故仍諡曰皇帝重直龍翻朝直遥翻戊申禁百官家毋得與僧尼道士往還壬子禁人間鑄佛寫經宋王成器等請獻興慶坊宅為離宫甲寅制許之始作興慶宫興慶宫後謂之南内在皇城中南距京城之東直東内之南自東内逹南内有夾城複道經通化門逹南内人主往來兩宫外人莫知之仍各賜成器等宅環於宫側寧王岐王宅在安興坊薛王宅在勝業坊二坊相連皆在興慶宫西寧王即宋王也環音宦又於宫西南置樓題其西曰花萼相輝之樓南曰勤政務本之樓上或登樓聞王奏樂則召升樓同宴或幸其所居盡歡賞賚優渥乙卯以岐王範兼絳州刺史薛王業兼同州刺史朔考異曰實録云八月乙卯據長厯八月丙辰實録自此以下脱少今取唐厯舊本紀補之仍敕宋王以下每季二人入朝朝直遥翻周而復始民間訛言上采擇女子以充掖庭掖音亦上聞之八月乙丑令有司具車牛於崇明門唐六典大明宫紫宸殿内朝正殿也殿之南面紫宸門紫宸門之左曰崇明門右曰光順門自選後宫無用者載還其家敕曰燕寢之内尚令罷遣閭閻之間足可知悉乙亥吐蕃將坌逹延乞力徐帥衆十萬冦臨洮軍蘭州至于渭源果如解琬之言岷州溢樂縣古臨洮縣義寧二年更名渭源漢隴西之首陽縣也後魏分隴西置渭源郡又改首陽為渭源縣唐以縣屬渭州将即亮翻坌蒲頓翻帥讀曰率下同洮土刀翻掠取牧馬命薛訥白衣攝左羽林將軍為隴右防禦使薛訥以灤河之敗削除官爵故命以白衣攝官出隴右使疏吏翻下同以右驍衛將軍常樂郭知運為副使常樂漢廣至縣地曹魏分廣至置宜禾縣李暠於此置凉興郡隋置常樂鎮武徳五年改鎮為縣屬𤓰州驍堅堯翻樂音洛與太僕少卿王晙帥兵擊之辛巳大募勇士詣河隴就訥教習初鄯州都督楊矩以九曲之地與吐蕃事見上卷睿宗景雲元年鄯時戰翻又音善其地肥饒吐蕃就之畜牧畜吁玉翻因以入㓂矩悔懼自殺乙酉太子賔客薛謙光獻武后所製豫州鼎銘武后鑄九州鼎自製銘其末云上𤣥降鑒方建隆基通典載豫州鼎銘曰犧農首出軒昊應期唐虞繼踵湯武乘時天下光宅域内雍熈上𤣥降鑒方建隆基以為上受命之符姚崇表賀且請宣示史官頒告中外臣光曰日食不驗太史之過也而君臣相賀是誣天也采偶然之文以為符命小臣之謟也而宰相因而實之是侮其君也上誣於天下侮其君以明皇之明姚崇之賢猶不免於是豈不惜哉九月戊申上幸驪山温湯敕以嵗稔傷農令諸州脩常平倉法太宗時置義倉及常平倉以備凶荒髙宗以後稍假以給他費至神龍中略盡至是復置之江嶺淮浙劔南地下濕不堪貯積不在此例貯丁吕翻突厥可汗黙啜衰老昏虐愈甚壬子葛邏禄等部落詣凉州降邏邸佐翻降户江翻冬十月吐蕃復冦渭源復抉又翻丙辰上下詔欲親征發兵十餘萬人馬四萬匹戊午上還宫甲子薛訥與吐蕃戰于武街水經注武街城在漢狄道縣東白石山西北唐為武街驛與大來谷皆屬臨洮渭源縣界劉昫曰武街驛在渭州西界大破之時太僕少卿隴右羣牧使王晙帥所部二千人與訥㑹擊吐蕃坌逹延將吐蕃兵十萬屯大來谷晙選勇士七百衣胡服夜襲之晙子峻翻帥讀曰率坌蒲頓翻将即亮翻衣於既翻多置鼔角於其後五里前軍遇敵大呼後人鳴鼔角以應之虜以為大軍至驚懼自相殺傷死者萬計訥時在武街去大來谷二十里虜軍塞其中間呼火故翻塞悉則翻晙復夜出襲之虜大潰始得與訥軍合追奔至洮水復戰于長城堡秦築長城起臨洮因以名堡復扶又翻又敗之敗補邁翻前後殺獲數萬人豐安軍使王海賔戰死使疏吏翻戊辰姚崇盧懷慎等奏頃者吐蕃以河為境神龍中尚公主遂踰河築城置獨山九曲兩軍即楊矩所與九曲之地也去積石三百里又於河上造橋今吐蕃既叛宜毁橋㧞城從之以王海賔之子忠嗣為朝散大夫尚輦奉御朝直遥翻散悉亶翻養之宫中己巳突厥可汗默啜又遣使求昏上許以來嵗迎公主突厥十姓胡禄屋等諸部詣北庭請降此西突厥也降户江翻下同命都䕶郭䖍瓘撫存之乙酉命左驍衛郎將尉遲瓌使于吐蕃宣慰金城公主吐蕃遣其大臣宗俄因矛至洮水請和用敵國禮驍堅堯翻將即亮翻尉紆勿翻使疏吏翻洮土刀翻上不許自是連嵗犯邊異考曰唐厯四年七月丁丑吐蕃以去年之敗遣其大臣宗俄因矛欵塞請和自恃兵彊求敵國之禮天子忿之按自此至四年非去年也既云以敗請和又何得云自恃兵彊既云天子忿之又當年八月已許其和今從舊𫝊十一月辛卯𦵏殤皇帝丙申遣左散騎常侍解琬詣北庭宣慰突厥降者隨便宜區處處昌吕翻十二月壬戌沙陀金山入朝甲子置隴右節度大使須嗣鄯奉河渭蘭臨武洮岷郭疊宕十二州須當作領嗣字衍奉當作秦郭當作廓臨州本漢隴西之狄道地晉置武始郡隋廢郡復為狄道縣屬蘭州天寳三載始分置臨州新舊志皆云然據此則已置臨州久矣武州古白馬之地漢武帝開置武都郡西魏改曰石門縣置武州宕州後魏宕昌羌之地後周置宕昌郡天和元年置宕州鄯時戰翻又音善宕徒浪翻以隴右防禦副使郭知運為之乙丑立皇子嗣真為鄫王此考異曰實録於作鄫王於後作郯王今從舊傳真余詳考新舊二史嗣真是年與嗣初嗣𤣥同封然嗣實帝之第四子非長子也長子乃嗣直也次子則嗣謙也先天元年封嗣直郯王嗣謙郢王嗣初為鄂王嗣主為鄄王嗣主當作嗣𤣥辛巳立郢王嗣謙為皇太子嗣真上之長子母曰劉華妃劉華妃郯王嗣直之母若鄫王嗣真之母則錢妃也亦誤嗣謙次子也母曰趙麗妃帝置恵妃麗妃華妃以代三夫人麗妃以倡進有寵于上故立之以母寵而立其子母寵衰則子愛弛矣為後廢太子張本倡音昌是嵗置幽州節度經略鎮守大使領幽易平檀媯燕六州媯居為翻燕因肩翻突騎施可汗守忠之弟遮弩恨所分部落少於其兄遂叛入突厥請為鄉導以伐守忠騎竒寄翻少詩照翻鄉讀曰嚮黙啜遣兵二萬擊守忠虜之而還還從宣翻又如字三考異曰舊傳以為景龍年事按實録娑葛既為十四姓可汗自後無娑葛名但屢云突騎施守忠入朝或者守忠即娑葛賜名邪景雲以後守忠猶在又開元二年六月阿史那獻奏有龍見于北庭為鎮将妻馮言之曰突厥施娑葛三年後破散黙啜八年後自滅然則娑葛於時尚在也竟不知死于何年故附此謂遮弩曰汝叛其兄何有於我遂幷殺之書此以戒兄弟日尋干戈而假手於他人以逞其志者三年春正月癸卯以盧懷慎檢校吏部尚書兼黄門監懷慎清謹儉素不營資産雖貴為卿相所得俸賜隨散親舊俸芳用翻妻子不免饑寒所居不蔽風雨姚崇嘗有子䘮䘮息浪翻謁告十餘日政事委積懷慎不能决惶恐入謝於上上曰朕以天下事委姚崇以卿坐鎮雅俗耳崇既出須㬰裁决俱盡頗有得色顧謂紫㣲舍人齊澣曰予為相可比何人澣未對崇曰何如管晏澣曰管晏之法雖不能施於後猶能沒身公所為法隨復更之似不及也復扶又翻更工衡翻觀姚崇之所以問齊澣之所以對皆揣已以方人欲不失其實今之好議論者當大臣得權之時則譽之為伊傳周召為大臣者安受之而不愧失權之後則詆之為王莾董卓李林甫楊國忠為大臣者亦受之而不得以自明則今日之諂我者乃它日之毁我者也崇曰然則竟如何澣曰公可謂救時之相耳崇喜投筆曰救時之相豈易得乎懷慎與崇同為相自以才不及崇毎事推之易以䜴翻推吐雷翻又如字時人謂之伴食宰相臣光曰㫺鮑叔之於管仲子皮之於子産皆位居其上能知其賢而下之授以國政孔子美之管仲請囚於魯鮑叔受之以歸言于桓公曰管夷吾治于髙傒使相可也桓公用之遂霸諸侯鄭子皮當國授子産政子産辭子皮曰虎帥以聽政孰敢不聼遂授以政鄭國大治下遐稼翻曹參自謂不及蕭何一遵其法無所變更漢業以成事見十二卷漢恵帝二年更工衡翻夫不肖用事為其僚者愛身保禄而從之不顧國家之安危是誠罪人也賢智用事為其僚者愚惑以亂其治專固以分其權媢嫉以毁其功愎戾以竊其名是亦辠人也治直吏翻媢音冒愎弼力翻崇唐之賢相懷慎與之同心勠力以濟明皇太平之政夫何辠哉秦誓曰如有一介臣斷斷猗無它技斷丁亂翻猗於綺翻乂於宜翻技渠綺翻下同其心休休焉其如有容人之有技若己有之人之彦聖其心好之好呼到翻不啻如自其口出寔能容之以保我子孫黎民亦職有利哉懷慎之謂矣御史大夫宋璟坐監朝堂杖人杖輕貶睦州刺史監古衘翻朝直遥翻突厥十姓降者前後萬餘帳髙麗莫離支文簡十姓之壻也二月與􅎤跌都督思㤗等亦自突厥帥衆來降麗力知翻􅎤奚結翻跌徒結翻帥讀曰率鉢考異曰實録二年九月壬子葛邏禄車鼻施失羅俟斤等十二人詣凉州内屬乙卯胡禄屋闕及首領等一千三百十一人來降十月庚辰胡禄二萬帳詣北庭内屬明年正月突厥葛邏禄下首領裴羅逹干來降二月突厥十姓部落左廂五咄陸啜右廂五弩失畢俟斤等相繼内屬前後二千餘帳三月突厥支副忌等來朝詔曰胡禄屋大首領之匐忌四月三姓葛邏禄率衆歸國五月詔葛邏禄胡屋䑕尼施等又云宜令北庭都䕶湯嘉恵與葛邏禄胡屋等相應安西都䕶吕休璟與䑕尼施相應又云及新來十姓大首領計㑹掎角唐厯九月云胡禄屋闕啜十月云胡禄屋二萬帳新傳前云胡禄屋後云胡屋按十姓有胡禄居闕啜鼠尼施處半啜諸書名號雖各參差要之葛邏胡禄屋鼠尼施為三姓必矣然胡禄屋以二萬帳而云十姓内屬前後二千餘帳參差難據今從舊傳余考新舊史時黙啜既破突騎施不能撫安西突厥十姓故來降而髙文簡則黙啜之子壻也制皆以河南地處之處昌吕翻三月胡禄屋酋長支匐忌等入朝上以十姓降者浸多夏四月庚申以右羽林大將軍薛訥為凉州鎮大總管赤水等軍並受節度居凉州凉州有赤水軍本赤烏鎮有赤青泉因名之幅員五千一百八十里軍之最大者也左衛大將軍郭䖍瓘為朔州鎮大總管和戎等軍並受節度居并州朔州蜀本作朔川新紀亦然勒兵以備黙啜默啜發兵擊葛邏禄胡禄屋鼠尼施等屢破之葛邏禄本突厥諸族在北庭西北金山之西有三族一謀落二熾俟三踏實力當東西突厥間後稍南徙自號三姓葉䕶邏郎佐翻尼女夷翻敕北庭都䕶湯嘉恵左散騎常侍解琬等發兵救之五月壬辰敕嘉恵等與葛邏禄胡禄屋鼠尼施及定邉道大總管阿史那獻互相應援山東大蝗民或於田旁焚香膜拜設祭而不敢殺姚崇奏遣御史督州縣捕而瘞之膜莫胡翻膜拜胡禮拜也瘞於計翻考異曰舊傳開元四年山東蝗大起崇奏請捕瘞按本紀三年六月山東諸州大蝗姚崇奏差御史下諸道促官吏遣人驅撲焚瘞從之是嵗田收有獲人不甚饑四年又云是夏山東河南河北蝗蟲大起遣使分捕而瘞之又實録今年十一月制以間者河南河北災蝗水潦明年正月辛未以右丞倪若水為汴州刺史五月敕曰今年蝗暴乃是孶生所由官司不早除遏任蟲成長看食田苗不恤人災自為身計向若信其拘忌不有指麾則山東之苗掃地俱盡然則三年有蝗崇令討捕不能盡明年又有蝗也今從本紀議者以為蝗衆多除不可盡上亦疑之崇曰今蝗滿山東河南北之人流亡殆盡豈可坐視食苗曾不救乎借使除之不盡猶勝養以成災上乃從之盧懷慎以為殺蝗太多恐傷和氣崇曰㫺楚莊吞蛭而愈疾賈誼書曰楚王食寒葅而得蛭因遂吞之腹有疾而不能食令尹入問疾曰吾食葅而得蛭不行其罪是法廢而威不立也譴而誅之恐監食者皆死遂吞之令尹曰天道無親唯徳是輔王有仁徳疾不為傷王疾果愈蛭之日翻孫叔殺蛇而致福説苑孫叔敖為兒時出遊見兩頭蛇殺而埋之還家而哭母問其故曰見兩頭蛇恐死母曰蛇安在曰聞見兩頭蛇者死恐人復見己殺而埋之矣母曰毋憂汝不死矣吾聞有隂徳者天必報以福奈何不忍於蝗而忍人之饑死乎若使殺蝗有禍崇請當之秋七月庚辰朔日有食之上謂宰相曰朕每讀書有所疑滯無從質問可選儒學之士日使入内侍讀盧懷慎薦太常卿馬懷素九月戊寅以懷素為左散騎常侍使與右散騎常侍禇無量更日侍讀更工衡翻每至閤門令乘肩輿以進或往别館道逺聽于宫中乘馬親送迎之待以師傅之禮以無量羸老特為之造腰輿羸倫為翻腰輿令人舉之適與腰平為于偽翻在内殿令内侍舁之舁羊茹翻九姓思結都督磨散等來降己未悉除官遣還西南蠻冦邊遣右驍衛將軍李𤣥道發戎瀘䕫巴梁鳯等州兵三萬人戎州本犍為郡梁置戎州瀘音盧并舊屯兵討之壬戍以凉州大總管薛訥為朔方道行軍大總管太僕卿吕延祚霛州刺史杜賔客副之以討突厥甲子上幸鳯泉湯唐六典岐州郿縣有鳯凰湯十一月乙卯還京師劉幽求自杭州刺史徙郴州刺史郴州漢郴縣地爲桂陽郡治昕隋平陳置郴州郴丑林翻憤恚恚於避翻甲申卒于道卒子恤翻丁酉以左羽林大將軍郭䖍瓘兼安西大都䕶四鎮經略大使䖍瓘請自募闗中兵萬人詣安西討擊皆給遞䭾及熟食遞䭾者㳂路遞發馬牛驢䭾運兵器什物也唐六典曰驢載曰䭾每䭾一百斤其脚直一百里一百文山阪處一百二十文驢少處不得過一百五十文平易處不得下八十文其有人負處兩人分一䭾又給熟食欲其速逹安西䭾徒何翻敕許之將作大匠韋湊上疏以為今西域服從雖或時有小盗竊舊鎮兵足以制之闗中常宜充實以彊幹弱枝自頃西北二虜冦邊凡在丁壯征行略盡豈宜更募驍勇逺資荒服驍堅堯翻又一萬征人行六千餘里咸給遞䭾熟食道次州縣將何以供秦隴之西户口漸少凉州已往沙磧悠然少詩沼翻下同磧七迹翻下同遣彼居人如何取濟縱令必克其獲幾何儻稽天誅毋乃甚損請計所用所得校其多少則知利害昔唐堯之代兼愛夷夏中外乂安漢武窮兵逺征雖多克獲而中國疲耗唐堯協和萬邦韋凑所謂兼愛夷夏也漢武事見漢紀夏户雅翻今論帝王之盛徳者皆歸唐堯不歸漢武况邀功不成者復何足比議乎時姚崇亦以䖍瓘之策為不然既而䖍瓘卒無功復扶又翻卒子恤翻初監察御史張孝嵩奉使廓州監古銜翻使疏吏翻下同還陳磧西利害請往察其形埶上許之聽以便宜從事㧞汗那者古烏孫也内附嵗久吐蕃與大食共立阿了逹為王發兵攻之㧞汗那王兵敗奔安西求救孝嵩謂都䕶吕休璟曰不救則無以號令西域遂帥旁側戎落兵萬餘人出龜茲西數千里下數百城璟俱永翻帥讀曰率龜茲曰丘慈下遐嫁翻長驅而進是月攻阿了逹于連城孝嵩自擐甲督士卒急攻自巳至酉屠其三城俘斬千餘級阿了逹與數騎逃入山谷擐音宦騎竒寄翻孝嵩𫝊檄諸國威振西域大食康居大宛􅄢賔等八國皆遣使請降􅄢音計㑹有言其贓汚者坐繫凉州獄貶靈州兵曹參軍兵曹參軍即司兵參軍是後復用孝嵩為都䕶著名西域京兆尹崔日知貪暴不法御史大夫李傑將糾之日知反構傑罪十二月侍御史楊瑒廷奏曰若糾彈之司使姧人得而恐愒瑒雉杏翻又音暢愒呼葛翻則御史臺可廢矣上遽命傑視事如故貶日知為歙縣丞歙縣漢屬丹陽郡縣南有歙浦因以為名唐帶歙州歙書渉翻或上言按察使徒煩擾公私等考異曰開元宰臣奏云李伯不知伯何人也今去其名請精簡刺史縣令停按察使上命召尚書省官議之姚崇以為今止擇十使猶患未盡得人况天下三百餘州縣多數倍安得刺史縣令皆稱其職乎稱尺證翻下不稱同乃止尚書左丞韋玢玢方貧翻奏郎官多不舉軄請沙汰改授它官玢尋出為刺史宰相奏擬冀州敕改小州姚崇奏言臺郎寛怠及不稱職玢請沙汰乃是奉公臺郎甫爾改官玢即貶黜於外議者皆謂郎官謗傷臣恐後來左右丞指以為戒則省事何從而舉矣省事謂尚書省之事也伏望聖慈詳察使當官者無所疑愳乃除冀州刺史突騎施守忠既死黙啜兵還守忠部將蘇禄鳩集餘衆為之酋長騎竒寄翻将即亮翻酋慈由翻長知兩翻蘇禄頗善綏撫十姓部落稍稍歸之有衆二十萬遂據有西方尋遣使入見使疏吏翻下同見賢遍翻是嵗以蘇禄為左羽林大將軍金方道經略大使西方屬金故曰金方道皇后妹夫尚衣奉御長孫昕以細故與御史大夫李傑不協殿中省有尚食尚藥尚衣尚舍尚乘尚輦六局各有奉御二人尚衣奉御掌供天子衣服詳其制度辨其名數而供其進御四年春正月昕與其妹夫楊仙玉於里巷伺傑而敺之伺相吏翻敺烏口翻傑上表自訴曰髪膚見毁雖則痛身冠冕被陵誠為辱國上大怒命於朝堂杖殺以謝百僚上時掌翻被皮義翻朝直遥翻仍以敕書慰傑曰昕等朕之宻戚不能訓導使陵犯衣冠雖寘以極刑未足謝罪卿宜以剛腸疾惡勿以凶人介意丁亥宋王成器更名憲申王成義更名撝二王以成字犯昭成皇后諡號更名更工衡翻乙酉隴右節度使郭䖍瓘奏奴石良才等八人皆有戰功請除游擊將軍唐制游擊將軍從五品下敕下下遐嫁翻盧懷慎等奏曰郭䖍瓘恃其㣲效輙侮彛章為奴請五品為于偽翻實亂綱紀不可許上從之丙午以鄫王嗣真為安北大都䕶安撫河東闗内隴右諸蕃大使據新舊書此亦郯王嗣直以為鄫王嗣真誤也而新舊書以安北為安西亦誤使疏吏翻以安北大都䕶張知運為之副陜王嗣昇為安西大都䕶安撫河西四鎮諸蕃大使以安西都䕶郭䖍瓘為之副陜失冉翻二王皆不出閤諸王遥領節度自此始二月丙辰上幸驪山温湯吐蕃圍松州丁卯上還宫辛未以尚書右丞倪若水為汴州刺史兼河南采訪使唐㑹要開元二十二年二月十九日初置十道採訪處置使據此則先置采訪使二十二年始置採訪處置使也舊志汴州京師東一千三百五十里上雖欲重都督刺史選京官才望者為之然當時士大夫猶輕外任揚州采訪使班景倩入為大理少卿過大梁唐汴州治浚儀縣古之大梁也若水餞之行立望其行塵乆之乃返謂官屬曰班生此行何異登仙癸酉松州都督孫仁獻襲擊吐蕃於城下大破之上嘗遣宦官詣江南取鵁鶄鸂䳵等鵁居肴翻鶄咨盈翻鵁鶄似鳬而大脚髙毛冠水鳥也爾雅曰鳽鵁鶄陸佃新義曰鵁鶄闘視不流其睛交據汧出不流所謂鵁鶄旋目者也爾雅翼鳽似鳬而脛髙有毛冠江東人養以厭火災又謂之交精精目精也其目精交也陸龜䝉曰鵁鶄黑襟青脛丹爪噣色㡬及項鸂苦奚翻䳵恥力翻鸂䳵亦水鳥也毛有五色陸佃埤雅曰鸂䳵五色尾有毛如船柂小于鴨性食短狐在山澤中無復毒氣故淮賦云鸂䳵尋邪而逐害此鳥盖溪中之勑邪逐害者故以名云陳昭裕建州圖經曰鸂䳵于水中宿老少若有勑令也亦有浮游雄者左雌者右羣伍皆有式度欲置苑中使者所至煩擾道過汴州倪若水上言今農桑方急而羅捕禽鳥以供園池之翫逺自江嶺水陸𫝊送食以梁肉傳張戀翻食祥吏翻道路觀者豈不以陛下賤人而貴鳥乎陛下方當以鳯皇為凡鳥麒麟為凡獸况鵁鶄鸂䳵曷足貴也上手敕謝若水賜帛四十叚縱散其鳥山東蝗復大起復扶又翻姚崇又命捕之倪若水謂蝗乃天災非人力所及宜修徳以禳之禳如羊翻劉聰時常捕埋之為害益甚拒御史不從其命崇牒若水曰劉聰偽主徳不勝妖今日聖朝妖不勝徳妖於喬翻朝直遥翻古之良守守手又翻蝗不入境若其修徳可免彼豈無徳致然若水乃不敢違夏五月甲辰勑委使者詳察州縣捕蝗勤惰者各以名聞由是連嵗蝗災不至大饑或言於上曰今嵗選叙大濫選須絹翻下典選同縣令非才及入謝上悉召縣令於宣政殿庭大明宫正殿曰含元殿其北曰宣政殿試以理人策惟鄄城令韋濟詞理第一鄄城古縣漢屬濟隂郡後漢為兖州治所晉屬濮陽郡唐帶濮州鄄吉掾翻擢為醴泉令自𦂳縣擢為次赤縣也餘二百餘人不入第且令之官百當作十四十五人放歸學問吏部侍郎盧從愿左遷豫州刺史李朝隱左遷滑州刺史舊志滑州去京師一千四百四十里朝直遥翻考異曰韋濟傳云問安人䇿一道今從唐厯盧從愿𫝊曰上盡召新授縣令一時於殿庭策試考入下第者一切放歸學問唐厯試在四月從愿朝隱貶在五月朝隱傳云四年春以授縣非其人貶今從唐厯又韋濟傳曰時有人宻奏上曰今嵗吏部選叙大濫縣令非才全不簡擇及縣令謝官日引入殿庭問安人策試者一百餘人獨濟策第一或有不書紙者擢濟為醴泉令二十餘人還舊官四十五人放歸習讀今亦從唐厯從愿典選六年與朝隱皆名稱職史以從愿朝隱為稱職則或言為非矣稱尺證翻初髙宗之世馬載裴行儉在吏部最有名時人稱吏部前有馬裴後有盧李濟嗣立之子也韋嗣立思謙之子長安中為相有胡人上言海南多珠翠竒寳海南謂林邑扶南真臘諸國也上時掌翻可往營致因言市舶之利舶音白又欲往師子國師子國天竺旁國也居西南海中舊無人民止有鬼神及龍居之諸國商賈來共市易鬼神不見其形但出珍寳顯其所堪價商賈依價取之其地和適無冬夏之異諸國人聞其土樂因此競至或有停住者遂成大國能馴養師子因以名國求靈藥及善醫之嫗寘之宫掖嫗威遇翻掖音亦上命監察御史楊範臣與胡人偕往求之範臣從容奏曰陛下前年焚珠玉錦繡示不復用今所求者何以異於所焚者乎彼市舶與商賈爭利殆非王者之體從千容翻復扶又翻賈音古胡藥之性中國多不能知况於胡嫗豈宜寘之宫掖夫御史天子耳目之官必有軍國大事臣雖觸冐炎瘴死不敢辭此特胡人眩惑求媚無益聖徳竊恐非陛下之意願熟思之上遽自引咎慰諭而罷之六月癸亥上皇崩于百福殿年五十五一考異曰睿宗𤣥宗實録皆曰甲子按下云己巳睿宗七齋度萬安公主為女道士今從舊本紀唐厯己巳以上女萬安公主為女官欲以追福癸酉㧞曵固斬突厥可汗黙啜首來獻時黙啜北擊㧞曵固大破之於獨樂水樂音洛恃勝輕歸不復設備遇㧞曵固迸卒頡質略自栁林突出斬之兵敗潰散士卒迸走故曰迸卒復扶又翻迸北孟翻時大武軍子將郝靈荃奉使在突厥子將小將也唐令制每軍大將一人别奏八人傔十六人副二人分掌軍務奏傔減大將半判官二人典四人總管四人二主左右虞侯二主左右押衙傔各五人子將八人資其分行陣辯金鼔及部署傔各二人頡質畧以其首歸之特考異曰唐厯侔勃曵固今從實録唐厯又云靈荃引勒囘紇部落斬黙啜于毒樂河今從舊𫝊舊傳云入蕃使郝靈儉今從唐厯又新舊紀皆云六月癸酉斬黙啜唐厯亦在六月𤣥宗實録七月戊寅詔書與降附突厥云乘其衰弱早就翦除其能捉獲黙啜者已立賞格盖未奏到耳與偕詣闕懸其首於廣街㧞曵固囘紇同羅霫僕固五部皆來降置於大武軍北黙啜之子小可汗立骨咄禄之子闕特勒擊殺之骨咄禄即骨篤禄黙啜之兄也永淳二年反天授二年死黙啜代立及黙啜諸子親信略盡立其兄右賢王黙棘連是為毗伽可汗國人謂之小殺毗伽以國固讓闕特勒闕特勒不受乃以為左賢王専典兵馬秋七月壬辰太常博士陳貞節蘇獻以太廟七室已滿請遷中宗神主於别廟奉睿宗神主袝太廟從之又奏遷昭成皇后祔睿宗室肅明皇后留祀於儀坤廟肅明皇后睿宗之元妃也昭成后次妃也以生帝升祔睿宗而肅明后祀於别廟非禮也儀坤廟見上卷景雲二年八月乙巳立中宗廟於太廟之西辛未契丹李失活奚李大酺帥所部來降武后萬嵗通天時奚契丹叛帝即位之後孫佺薛訥相繼䘮師兩蕃不敢乘勝慿陵中國乃相帥來降中國之勢安強有以服其心故也酺音蒲帥讀曰率降户江翻下同制以失活為松漠郡王行金吾大將軍兼松漠都督因其八部落酋長拜為刺史貞觀末以契丹逹稽部為峭落州紇便部為彈汙州獨活部為無逢州芬問部為羽陵州突便部為日連州芮奚部為徒河州墜斤部為萬丹州伏部為匹黎赤山二州并松漠府凡八部十州今復以其酋長各為刺史又以將軍薛㤗督軍鎮撫之大酺為饒樂郡王行金吾大將軍兼饒樂都督失活盡忠之從父弟也李盡忠即萬嵗通天叛者樂音洛從才用翻吐蕃復請和復扶又翻下禄復多復必復無復同上許之突厥黙啜既死奚契丹㧞曵固等諸部皆内附突騎施蘇禄復自立為可汗突厥部落多離散毗伽可汗患之乃召黙啜時牙官暾欲谷以為謀主暾欲谷年七十餘暾乃昆翻多智略國人信服之突厥降户處河曲者北河之曲處昌吕翻聞毗伽立多復叛歸之幷州長史王晙上言此屬徒以其國䘮亂䘮息浪翻故相帥來降若彼安寧必復叛去今置之河曲此屬桀黠實難制御往往不受軍州約束興兵剽掠黠户入翻剽匹妙翻聞其逃者已多與虜聲問往來通傳委曲乃是畜養此屬使為間諜畜吁玉翻間古莧翻日月滋久奸詐逾深窺伺邊隙將成大患虜騎南牧必為内應伺相吏翻騎竒寄翻來逼軍州表裏受敵雖有韓彭不能取勝矣願以秋冬之交大集兵衆諭以利害給其資糧徙之内地二十年外漸變舊俗皆成勁兵雖一時暫勞然永久安靖比者守邉將吏及出境使人多為䛕辭皆非事實比毗至翻將即亮翻或云北虜破滅或云降户妥帖皆欲自衒其功非能盡忠狥國願察斯利口孔子曰惡利口之覆邦家者勿忘逺慮議者必曰國家曏時已嘗寘降户於河曲皆獲安寧謂貞觀時也今何所疑此則事同時異不可不察曏者頡利既亡降者無復異心故得久安無變今北虜尚存謂黙啜雖死毗伽又立也此屬或畏其威或懷其惠或其親屬豈樂南來較之彼時固不侔矣彼時謂貞觀之時樂音洛以臣愚慮徙之内地上也多屯士馬大為之備華夷相參人勞費廣次也正如今日下也願審茲三策擇利而行縱使因徙逃亡得者皆為唐有若留至河氷恐必有變䟽奏未報降户􅎤跌思㤗阿悉爛等果叛冬十月甲辰命朔方大總管薛訥發兵追討之王晙引并州兵西濟河晝夜兼行追擊叛者破之斬獲三千級先是單于副都䕶張知運悉收降户兵仗先悉薦翻令度河而南降户怨怒御史中丞姜晦為廵邉使使疏吏翻降户訴無弓矢不得射獵晦悉還之降户得之遂叛張知運不設備與之戰于青剛嶺青剛嶺在慶州方渠縣北靈州之南為虜所擒欲送突厥至綏州境將軍郭知運以朔方兵邀擊之大破其衆於黒山呼延谷虜釋張知運而去上以張知運䘮師斬之以徇毗伽可汗既得思泰等欲南入為冦暾欲谷曰唐主英武民和年豐未有間隙不可動也䘮息浪翻間古莧翻我衆新集力尚疲羸且當息養數年始可觀變而舉毗伽又欲築城并立寺觀羸倫為翻寺觀古玩翻暾欲谷曰不可突厥人徒稀少少詩沼翻不及唐家百分之一所以能與為敵者正以逐水草居處無常處昌吕翻射獵為業人皆習武彊則進兵抄掠弱則竄伏山林唐兵雖多無所施用若築城而居變更舊俗更工衡翻一朝失利必為所滅釋老之法教人仁弱非用武爭勝之術不可崇也毗伽乃止庚午𦵏大聖皇帝于橋陵橋陵在同州蒲城縣三十里是嵗改蒲城縣為奉先縣屬京兆尹廟號睿宗御史大夫李傑䕶橋陵作判官王旭犯贓傑按之反為所構左遷衢州刺史衢州漢新安太未之地晉改新安為信安改太未為龍丘屬東陽郡唐武徳四年分置衢州衢州京師東南四千七百十二里十一月己卯黄門監盧懷慎疾亟上表薦宋璟李傑李朝隱盧從愿並明時重器所坐者小所棄者大望垂矜録上深納之乙未薨黄考異曰鄭處誨明皇雜録云懐慎為門監吏部尚書卧病既久宋璟盧從愿相與訪焉懐慎常器重二人持一人手謂曰公出入為藩輔主上求治甚切然享國嵗久近者稍倦于勤必有人乘此而進矣君其志之按懷慎初為吏部時璟貶睦州及卒璟猶未歸從愿未嘗入相又四年未為享國嵗久今不取家無餘蓄惟一老蒼頭請自鬻以辦䘮事史言盧懷慎之奴異乎人奴丙申以尚書左丞源乹曜為黄門侍郎同平章事姚崇無居第寓居罔極寺以病痁謁告唐㑹要神龍元年太平公主為天后立罔極寺於大寧坊開元二十年改為興唐寺痁失亷翻瘧疾也上遣使問飲食起居狀日數十輩使疏吏翻源乾曜奏事或稱㫖上輙曰此必姚崇之謀也或不稱㫖輙曰何不與姚崇議之稱尺證翻乾曜常謝實然每有大事上常令乾曜就寺問崇癸卯乾曜請遷崇於四方館四方館屬中書省仍聽家人入侍疾上許之崇以四方館有簿書非病者所宜處固辭上曰設四方館為官吏也使卿居之為社稷也處昌吕翻為于偽翻恨不可使卿居禁中耳此何足辭崇子光禄少卿彛宗正少卿异廣通賔客頗受饋遺為時所譏遺于季翻主書趙誨為崇所親信唐中書省有主書四人從七品上受胡人賂事覺上親鞫問下獄當死崇復營救下遐嫁翻復扶又翻上由是不恱㑹曲赦京城敕特標誨名杖之一百流嶺南僉考異曰朝野載紫㣲舍人倪若水贓至八百貫因諸王内宴姚元崇諷之曰倪舍人正直百司嫉之欲成事何不為上言之諸王入衆共救之遂釋一無所問主書趙誨受蕃餉一刀子或直六七百錢元崇宣敕處死後有降崇乃􅬷曰别敕處死者决一百配流大理决趙誨一百不死夜遣給使縊殺之􅬷盖批字也今從舊傳崇由是憂懼數請避相位數所角翻薦廣州都督宋璟自代十一月上將幸東都以璟為刑部尚書西京留守璟俱永翻守式又翻令馳驛詣闕遣内侍將軍楊思勗迎之按舊書楊思勗傳時為内常侍右監門衛將軍内侍内侍省官之長内常侍則為之貳者也内侍從四品下内常侍正五品上璟風度凝逺人莫測其際在塗竟不與思勗交言思勗素貴幸歸訴于上上嗟歎良久益重璟丙辰上幸驪山温湯乙丑還宫閏月己亥姚崇罷為開府儀同三司源乾曜罷為京兆尹西京留守守手又翻以刑部尚書宋璟守吏部尚書兼黄門監紫微侍郎蘇頲同平章事頲他鼎翻璟為相務在擇人隨材授任使百官各稱其職稱尺證翻刑賞無私敢犯顔直諫上甚敬憚之雖不合意亦曲從之突厥黙啜自則天世為中國患朝廷旰食朝直遥翻旰古按翻傾天下之力不能克郝靈荃得其首自謂不世之功璟以天子好武功恐好事者競生心徼倖好呼到翻徼工堯翻痛抑其賞逾年始授郎將靈荃慟哭而死郝靈荃因人以為功授以郎將非抑之也將即亮翻璟與蘇頲相得甚厚頲遇事多讓於璟璟毎論事則頲為之助璟嘗謂人曰吾與蘇氏父子皆同居相府僕射寛厚誠為國器僕射謂蘇瓌也然獻可替否吏事精敏則黄門過其父矣按舊書蘇頲𫝊頲以紫㣲侍郎同紫㣲黄門平章事姚宋相繼為相崇善應變成務璟善守法持正二人志操不同然協心輔佐使賦役寛平刑罰清省百姓富庶唐世賢相前稱房杜後稱姚宋它人莫得比焉二人每進見上輙為之起去則臨軒送之見賢遍翻輒為于偽翻及李林甫為相雖寵任過於姚宋然禮遇殊卑薄矣史終言之紫㣲舍人髙仲舒博通典籍齊澣練習時務姚宋每坐二人以質所疑既而歎曰欲知古問髙君欲知今問齊君可以無闕政矣辛丑罷十道按察使開元二年復置按察使舊制六品以下官皆委尚書省奏擬是嵗始制員外郎御史起居遺補不擬員外郎御史起居遺補皆臺省要官由人主親除不由尚書奏擬按唐制員外郎從六品侍御史起居郎亦從六品補闕七品拾遺及監察御史則八品耳五年春正月癸卯太廟四室壞上素服避正殿時上將幸東都舊志東都至西京八百五十里以問宋璟蘇頲對曰陛下三年之制未終去年六月睿宗崩故云然遽爾行幸恐未契天心災異為戒願且停車駕又問姚崇對曰太廟屋材皆苻堅時物嵗久朽腐而壞適與行期相㑹何足異也言不足以為災異且王者以四海為家陛下以闗中不稔幸東都百司供擬已備不可失信但應遷神主于太極殿更修太廟更工衡翻如期自行耳上大喜從之賜崇絹二百匹己酉上行享禮於太極殿命姚崇五日一朝仍入閤供奉入閤供奉者應内殿朝叅立于供奉班中姚崇舊相也盖立于供奉班首朝直遥翻恩禮更厚有大政輙訪焉右散騎常侍禇無量上言隋文帝富有天下遷都之日豈取苻氏舊材以立太廟乎此特䛕臣之言耳願陛下克謹天戒納忠諫逺諂䛕禇無量之言讜言也上時掌翻逺于願翻上弗聽辛亥行幸東都過崤谷道隘不治崤谷在陜州硤石縣上欲免河南尹及知頓使官車駕行幸有知頓使使疏吏翻宋璟諫曰陛下方事廵幸今以此罪二臣臣恐將來民受其弊上遽命釋之璟曰陛下罪之以臣言而免之是臣代陛下受徳也請令待罪朝堂而後赦之朝直遥翻上從之五考異曰實録月乙巳以李朝隱為河南尹宋璟傳云上次永寧之崤谷馳道隘狹車騎停擁河南尹李朝隐知頓使王怡失於部伍上令黜其官爵二𫝊相違盖當時河南尹不知何人非朝隱耳又明皇雜録曰上幸東都至繡嶺宫當時炎酷上以行宫狹隘謂左右曰此有佛寺乎吾将避暑於廣厦或云六軍填委於其中不可速行上謂髙力士曰姚崇多計第往覘之力士囘奏云姚崇方袗絺綌乘小駟按轡于木隂下上恱曰吾得之矣遽命小駟而頓消暑溽乃歎曰小事尚如此觸類而長之天下固受其恵矣按正月東幸二月至東都未炎暑也今不取二月甲戌至東都赦天下奚契丹既内附貝州刺史宋慶禮建議請復營州三月庚戌制復置營州都督於柳城制復扶又翻又如字兼平盧軍使管内州縣鎮戍皆如其舊武后萬嵗通天元年營州陷至是乃復以太子詹事姜師度為營田支度使與慶禮等築之三旬而畢慶禮清勤嚴肅開屯田八十餘所招安流散數年之間倉廩充實市里浸繁夏四月甲戍賜奚王李大酺妃辛氏號固安公主酺音蒲己丑皇子嗣一卒追立為夏王諡曰悼夏户雅翻嗣一母武恵妃攸止之女也武攸止武后從子也突騎施酋長左羽林大將軍蘇禄部衆浸彊雖職貢不乏隂有窺邊之志五月十姓可汗阿史那獻欲發葛邏禄兵擊之上不許初上㣲時與太常卿姜皎親善及誅竇懷貞等誅懐貞等見上卷元年皎預有功由是寵遇羣臣莫及常出入臥内與后妃連榻宴飲賞賜不可勝紀勝音升弟晦亦以皎故累遷吏部侍郎宋璟言皎兄弟權寵太盛非所以安之上亦以為然秋七月庚子以晦為宗正卿因下制曰西漢諸將以權貴不全謂漢髙帝時也將即亮翻南陽故人以優閑自保謂漢光武時也皎宜放歸田園散官勲封皆如故散悉亶翻壬寅隴右節度使郭知運大破吐蕃於九曲安西副大都䕶湯嘉恵奏突騎施引大食吐蕃謀取四鎮圍鉢換及大石城鉢換即撥換城大石城盖石國城也已發三姓葛邏禄兵與阿史那獻擊之并州長史張嘉貞上言突厥九姓新降者散居太原以北請宿重兵以鎮之辛酉置天兵軍於并州集兵八萬以嘉貞為天兵軍大使天兵軍在并州城中太常少卿王仁恵奏則天立明堂不合古制又明堂尚質而窮極奢侈宻邇宫掖人神雜擾甲子制復以明堂為乾元殿毁乾元殿見二百四卷武后垂拱四年復扶又翻又如字冬至元日受朝賀朝直遥翻季秋大享復就圓丘九月中書門下省及侍中皆復舊名改中書門下省及省官名見上卷元年貞觀之制中書門下及三品官入奏事必使諫官史官隨之有失則匡正美惡必記之諸司皆於正牙奏事御史彈百官服豸冠對仗讀彈文獬豸冠法冠也一曰柱後恵文髙五寸以纚為展筩鐵柱卷執法者服之觀王義方彈李義府事可見彈徒丹翻下同故大臣不得専君而小臣不得為讒慝慝吐得翻及許敬宗李義府用事政多私僻奏事官多俟仗下於御坐前屏左右宻奏坐徂臥翻屏必郢翻監奏御史監奏御史意即殿中侍御史也監古銜翻下同及待制官永徽中命𢎞文館學士一人日待制于武徳殿西門文明元年詔京官五品已上清官日一人待制于章善明福門先天末又以朝集使六品已上二人隨仗待制逺立以俟其退諫官御史皆隨仗出仗下後事不復預聞復扶又翻武后以法制羣下諫官御史得以風聞言事自御史大夫至監察得互相彈奏率以險詖相傾覆詖皮義翻及宋璟為相欲復貞觀之政戊申制自今事非的須秘宻者皆令對仗奏聞史官自依故事唐制天子御正殿則左右俯陛而聽有命則退而書之若仗在紫宸内閤則夾香案分立殿下自永徽之後唯得對仗承㫖仗下之後謀議皆不得預聞冬十月癸酉伊闕人孫平子上言春秋譏魯躋僖公春秋文二年大事于太廟躋僖公傳曰逆祀也君子以為失禮禮無不順祀國之大事也而逆之可謂禮乎子雖齊聖不先父食久矣故禹不先鯀湯不先契文武不先不窋宋祖帝乙鄭祖厲王猶上祖也上音時掌翻今遷中宗於别廟而祀睿宗正與魯同兄臣於弟猶不可躋謂魯僖公嘗臣於閔公也况弟臣於兄謂睿宗之于中宗也可躋之於兄上乎若以兄弟同昭昭讀曰佋則不應出兄置於别廟願下羣臣博議遷中宗入廟事下禮官下遐嫁翻太常博士陳貞節馮宗蘇獻議以為七代之廟不數兄弟殷代或兄弟四人相繼為君殷時陽甲盤庚小辛小乙兄弟四人相繼為君若數以為代則無祖禰之祭矣禰乃禮翻今睿宗之室當亞高宗故為中宗特立别廟中宗既升新廟睿宗乃祔髙宗何嘗躋居中宗之上而平子引躋僖公為證誣罔聖朝漸不可長時論多是平子上亦以為然故議久不决蘇獻頲之從祖兄也長知兩翻從才用翻從考異曰唐厯曰獻頲之再叔今從舊志新表故頲右之左𫝊天子之所右者寡君右之右音又卒從禮官議卒子恤翻平子論之不已謫為康州都城尉都城漢端溪縣地晉立都城縣屬晉康郡隋省併入端溪屬信安郡唐分端溪置康州都城屬焉新廟成更作太廟成也戊寅神主祔廟上命宋璟蘇頲為諸皇子制名及國邑之號為于偽翻又令别制一佳名及佳號進之璟等上言七子均養著於國風詩曹國風曰鳲鳩在桑其子七兮淑人君子其儀一兮注云鳲鳩之養其子朝從上下暮從下上平均如一上時掌翻今臣等所制名號各三十餘輙混同以進以彰陛下覆燾無偏之徳覆敷又翻上甚善之十一月丙申契丹王李失活入朝朝直遥翻差考異曰長厯十一月丁酉朔丙申十月晦也與實録一日舊紀唐厯皆云十二月己亥契丹李失活來朝今從實録十二月壬午以東平王外孫楊氏為永樂公主妻之東平王續紀王慎之子也慎太宗子樂音洛妻子細翻祕書監馬懷素奏省中書散亂訛缺請選學術之士二十人整比校補從之比毗至翻于是搜訪逸書選吏繕寫命國子博士尹知章桑泉尉韋述等二十人同刋正桑泉縣隋開皇十六年分猗氏縣置屬蒲州考異曰舊𫝊為櫟陽尉今從韋述集賢注記以左散騎常侍禇無量為之使使疏吏翻於乾元殿前編校羣書資治通鑑卷二百十一
