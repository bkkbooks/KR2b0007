body:
  text: 資治通鑑卷二百二十九宋司馬光撰胡三省音註唐紀四十五起昭陽大淵獻十一月盡閼逢困敦正月不滿一年始癸亥十一月終甲子正月一卷所紀財三月耳徳宗神武聖文皇帝四建中四年十一月乙亥以隴州為奉義軍擢臯為節度使泚又使中使劉海廣許臯鳯翔節度使臯斬之史言韋臯以此𤼵身使疎吏翻泚且禮翻靈武留後杜希全鹽州刺史戴休顔夏州刺史時常春㑹渭北節度使李建徽合兵萬人入援靈武節度使治靈州夏州治朔方縣鹽州治五原縣皆鄰境相接渭北節度使本治坊州時徙治鄜州夏户雅翻將至奉天上召將相議道所從出闗播渾瑊曰漠谷道險狹召將即亮翻相息亮翻渾户昆翻又户本翻瑊古衘翻漠谷在奉天城西北恐為賊所邀不若自乾陵北過附柏城而行山陵樹柏成行以遮迾陵寢故謂之柏城宋白曰唐諸陵皆栽柏環之貞元六年十一月敕諸陵柏城四面各三里内不得安𦵏過古禾翻又古卧翻營於城東北雞子堆與城中犄角相應犄居蟻翻且分賊勢盧把曰漠谷道近若為賊所邀則城中出兵應接可也儻出乾陵恐驚陵寢瑊曰自泚攻城斬乾陵松栢以夜繼晝其驚多矣今城中危急諸道救兵未至惟希全等來所繫非輕若得營據要地則泚可破也把曰陛下行師豈比逆賊若令希全等過之是自驚陵寢泚且禮翻又音此令力丁翻上乃命希全等自漠谷進丙子希全等軍至漠谷果為賊所邀乘高以大弩巨石擊之死傷甚衆城中出兵應接為賊所敗是夕四軍潰退保邠州泚閲其輜重於城下從官相視失色自兩河兵興以至乗輿播遷盧杞之言無一不誤國而徳宗信之如故庸昏甚矣敗補邁翻從才用翻邠卑旻翻泚且禮翻又音此輜莊持翻重直用翻休顔夏州人也夏户雅翻泚攻城益急穿塹環之泚移帳於乾陵下視城中動静皆見之時遣使環城塹士艶翻使疏吏翻環音宦招誘士民笑其不識天命誘音酉神䇿河北行營節度使李晟疾愈前年五月李晟疾甚自易州還保定州事見上卷晟成正翻聞上幸奉天帥衆將奔命帥讀曰率張孝忠迫於朱滔王武俊倚晟為援不欲晟行數沮止之數所角翻沮在吕翻晟乃留其子慿使娶孝忠女為婦又解玉帶賂孝忠親信使説之説式芮翻孝忠乃聽晟西歸遣大將楊榮國將鋭兵六百與晟俱晟引兵出飛狐道晝夜兼行至代州沈存中曰北岳常岑謂之大茂山者是也半屬契丹以大茂山脊為界飛狐路在茂之西自銀冶寨北出倒馬闗度虜界却自石門子令水鋪入缾形梅囘兩寨之間至代州今此路已不通惟北寨西出承天闗路可至河東然路極峭狹按存中所謂地界乃石晉與契丹所分地界也丁丑加晟神䇿行營節度使史言李晟前只節度河北神䇿出征兵行營今又加節度神䇿行營兵出征河南者此其所以得誅劉徳信也王武俊馬寔攻趙州不克辛巳寔歸瀛州武俊送之五里犒贈甚厚武俊亦歸恒州恒户登翻上之出幸奉天也陜虢觀察使姚明􅆒陜失冉翻􅆒與揚同以軍事委都防禦副使張勸去詣行在勸募兵得數萬人甲申以勸為陜虢節度使朱泚攻圍奉天經月是年十月上出奉天纔至奉天數日而朱泚繼至攻圍至是月為經月城中資糧俱盡上嘗遣健歩出城覘賊健歩今之急脚子是也覘五亷翻其人懇以苦寒為辭跪奏乞一􅃭袴􅃭汝朱翻短衣上為之尋求不獲為于偽翻竟憫黙而遣之憫者矜其寒黙者無以為辭也時供御纔有糲米二斛毎伺賊之休息夜縋人於城外采蕪菁根而進之本草曰蕪菁及蘆菔南北通有之蕪菁即蔓菁蘆菔即蘿蔔也陶隱居云蘆菔是今温菘其根可食葉不中噉蕪菁根乃細於温菘而葉似菘好食日華子曰梗長葉瘦高者為菘闊厚短肥而􅋻及梗細者為蕪菁葉也陸佃埤雅曰舊説菘菜北種初年半為蕪菁二年菘種都絶蕪菁南種亦然菘之不生北土猶橘柚之變於淮北矣蕪菁似菘而小有臺一名葑一名湏史炤曰本草注云蕪菁北人又名蔓菁根葉及子乃是菘類詩云采葑采菲疏云陸璣云葑蕪菁幽州人或謂之芥方言云蘴蕘蕪菁也陳楚謂之葑齊魯謂之蕘闗西謂之蕪菁趙魏之郊謂之大芥糲盧達翻伺相吏翻縋馳偽翻上召公卿將吏謂曰朕以不德自䧟危亡固其宜也公輩無罪宜早降以救家室降户江翻羣臣皆頓首流涕期盡死力故將士雖困急而鋭氣不衰上之幸奉天也糧料使崔縱勸李懷光令入援崔縱為魏縣行營糧料使懷光從之縱悉歛軍資與懷光皆來懷光晝夜倍道至河中力疲休兵三日河中尹李齊運傾力犒宴犒口到翻軍尚欲遷延崔縱先輦貨財度河謂衆曰至河西悉以分賜開元八年析河東縣自蒲津以西為河西縣衆利之西屯蒲城有衆五萬齊運惲之孫也蔣王惲太宗子也惲於粉翻李晟行且收兵亦自蒲津濟軍於東渭橋其始有卒四千晟善於撫御與士卒同甘苦人樂從之晟成正翻樂音洛旬月間至萬餘人神䇿兵馬使尚可孤討李希烈將三千人在襄陽自武闗入援軍于七盤使踈吏翻將即亮翻又音如字七盤即古繞霤之險敗泚將仇敬仇敬即仇敬忠此因舊史書之敗補邁翻遂取藍田可孤宇文部之别種也種章勇翻鎮國軍副使駱元光肅宗上元元年置鎮國軍於華州其先安息人駱奉先養以為子將兵守潼闗近十年為衆所服潼音童近其靳翻朱泚遣其將何望之襲華州刺史董晉弃州走行在華戸化翻下同走音奏望之據其城將聚兵以絶東道元光引闗下兵襲望之走還長安還從宣翻又音如字元光遂軍華州召募士卒數日得萬餘人泚數遣兵攻元光泚且禮翻又音此數所角翻元光皆擊却之賊由是不能東出上即以元光為鎮國軍節度使鎮國軍節度治華州元光乃將兵二千西屯昭應馬燧遣其行軍司馬王權及其子彚將兵五千人入援屯中渭橋燧音遂彚于季翻宋敏求長安志引三輔黄圖曰渭水貫都以象天漢横橋南度以法牽牛盖指此之中橋而為若言也橋之廣至及六丈其柱之多至於七百五十約其地望即唐太極宫之西而太倉之北也程大昌曰此橋舊止單名渭橋水經叙渭曰水上有梁謂之橋者是也後世加中以冠橋上者為長安之西别有便門橋度渭萬年縣之東更有東渭橋故不得不以中别之也於是泚黨所據惟長安而已援軍遊騎時至望春樓下李忠臣等屢出兵皆敗求援於泚泚恐民間乘弊抄之望春樓近長樂城臨廣運潭𤣥宗所立騎竒寄翻抄楚交翻所遣兵皆晝伏夜行泚内以長安為憂乃急攻奉天使僧法堅造雲梯高廣各數丈高居傲翻廣古曠翻近世學者多各以音如字讀之録考異曰劇談録曰高九十餘尺下瞰城中今從實裹以兕革史炤曰兕色如野牛而青一説雌犀也余按山海經兕角重百斤身重千斤黄帝得之以其皮冒鼓聲震百里其説固誕矣國語叔向曰唐叔殪兕以為大甲周官考工記犀甲壽百年兕甲壽二百年兕甲固堅於犀甲矣左傳宋華元之言曰犀兕尚多則兕者世之常有也然兕者今不常見史言朱泚裹雲梯以兕革不過用牛皮耳兕序姊翻下施巨輪上容壯士五百人城中望之忷懼上以問羣臣渾瑊侯仲莊對曰臣觀雲梯勢甚重重則易陷忷許拱翻渾户昆翻又户本翻瑊古銜翻易以豉翻臣請迎其所來鑿地道積薪蓄火以待之神武軍使韓澄曰開元二十六年分左右羽林置左右神武軍使疏吏翻雲梯小伎不足上勞聖慮伎渠綺翻臣請禦之乃度梯之所傃度徒洛翻傃桑故翻向也鄭𤣥曰攻城攻其所傃傃猶嚮也廣城東北隅三十歩多儲膏油松脂薪葦於其上丁亥泚盛兵鼓譟攻南城韓遊瓌曰此欲分吾力也乃引兵嚴備東北戊子北風甚迅譟則竈翻環古囘翻迅疾也泚推雲梯推吐雷翻上施濕氈懸水囊載壯士攻城翼以轒輼轒扶云翻輼於云翻轒輼攻城車也兵法修轒輼距堙者三月而後成置人其下抱薪負土填塹而前矢石火炬所不能傷賊併兵攻城東北隅矢石如雨城中死傷者不可勝數塹七艶翻勝音升賊已有登城者上與渾瑊對泣羣臣惟仰首祝天上以無名告身自御史大夫實食五百户以下千餘通授瑊無名告身即空名告身有功者則書填姓名以授之實食食實封也使募敢死士禦之仍賜御筆使視其功之大小書名給之告身不足則書其身謂若立功者多所給告身千餘通酬功而不足則書陳前所喝轉階勲於其身以為照驗出給告身且曰今便與卿别期望渾瑊死戰也瑊俯伏流涕上拊其背歔欷不自勝瑊古衘翻歔音虛欷許旣翻又音希勝音升時士卒凍餒又乏甲胄瑊撫諭激以忠義皆鼓譟力戰瑊中流矢譟則竈翻中竹仲翻進戰不輟初不言痛㑹雲梯輾地道一輪偏陷不能前却輾猪輦翻又尼展翻地道者渾瑊等所鑿以迎雲梯者也火從地中出火亦渾瑊等所蓄以待雲梯者風勢亦回城上人投葦炬散松脂沃以膏油讙呼震地讙許元翻須臾雲梯及梯上人皆為灰燼臭聞數里聞音問賊乃引退於是三門皆出兵時朱泚攻奉天城東南北三靣故三門皆出兵與戰太子親督戰賊徒大敗死者數千人將士傷者太子親為裹瘡將即亮翻為于偽翻入夜泚復來攻城泚且禮翻又音此復扶又翻又音如字矢及御前三歩而墜上大驚李懷光自蒲城引兵趣涇陽趣七喻翻並北山而西並讀曰傍歩浪翻先遣兵馬使張韶㣲服間行詣行在間古莧翻下得間同藏表於蠟丸詔至奉天值賊方攻城見韶以為賤人驅之使與民俱填塹韶得間踰塹抵城下呼曰我朔方軍使者也塹七艷翻呼火故翻使疏吏翻城上人下繩引之比登比必利翻及也身中數十矢中竹仲翻得表於衣中而進之上大喜舁韶以徇城四隅歡聲如雷舁音余又羊茹翻癸巳懷光敗泚兵於灃泉敗補邁翻泚聞之懼引兵遁歸長安衆以為懷光復三日不至則城不守矣史言李懷光解奉天之圍不為無功泚且禮翻又音此泚旣退從臣皆賀從才用翻汴滑行營兵馬使賈隱林進言陛下性太急不能容物若此性未改雖朱泚敗亡憂未艾也上不以為忤甚稱之使踈吏翻汴皮變翻使徳宗果能以此心而受諫何至追仇陸贄之盡言乎忤五故翻侍御史萬俟著開金商運路萬當作万莫北翻俟渠之翻万俟虜複姓也開金商運路轉江淮財賦以至奉天重圍既解重直龍翻諸道貢賦繼至用度始振朱泚至長安但為城守之計時遣人自城外來周走呼曰呼火故翻奉天破矣欲以惑衆泚旣據府庫之富不愛金帛以悦將士公卿家屬在城者皆給月俸將即亮翻俸扶用翻神䇿及六軍從車駕及哥舒曜李晟者泚皆給其家糧加以繕完器械日費甚廣及長安平府庫尚有餘蓄見者皆追怨有司之暴歛焉以此觀之趙賛輩不足責也杜佑判度支安能逃其罪乎歛力贍翻或謂泚曰陛下旣受命唐之陵廟不宜復存復扶又翻泚曰朕嘗北靣事唐豈忍為此又曰百官多缺請以兵脅士人補之泚曰强授之則人懼强其兩翻但欲仕者則與之何必叩户拜官邪邪音耶泚所用者惟范陽神䇿團練兵團練兵即團結兵事見二百二十五卷代宗大厯十二年涇原卒驕皆不為用但守其所掠資貨不肯出戰又宻謀殺泚不果而止李懷光性粗疎泚且禮翻又音此粗讀與麤同自山東來赴難自魏縣行營來赴奉天之難魏縣屬魏州其地在河山之東難乃旦翻下同數與人言盧把趙贊白志貞之姦佞數所角翻且曰天下之亂皆此曹所為也吾見上當請誅之旣解奉天之圍自矜其功謂上必接以殊禮禮絶百僚謂之殊禮或説王翃趙贊曰説式芮翻翃户萌翻懷光縁道憤歎以為宰相謀議乖方乖方猶言失所也度支賦歛煩重京尹犒賜刻薄致乘輿播遷者三臣之罪也宰相指盧把度支指趙賛京尹指王翃度徒洛翻歛力贍翻乘繩證翻今懷光新立大功上必披襟布誠詢得失使其言入豈不殆哉殆危也翃贊以告盧把把懼從容言於上曰從千容翻下同懷光勲業社稷是賴賊徒破膽皆無守心若使之乘勝取長安則一舉可以滅賊此破竹之勢也今聽其入朝必當賜宴留連累日使賊入京城得從容成備恐難圖矣上以為然懷光矜功厚望其上而求逞其欲徳宗欲速逼使其下而不閔其勞盧把之心自營免罪而柙闔於其間是以雖急於平賊而不知更生一賊也朝直遥翻詔懷光直引軍屯便橋與李建徽李晟及神䇿兵馬使楊惠元刻期共取長安懷光自以數千里竭誠赴難破朱泚解重圍而咫尺不得見天子意殊怏怏晟成正翻使疏吏翻難乃旦翻泚且禮翻又音此重直龍翻怏於兩翻曰吾今已為姦臣所排事可知矣遂引兵去至魯店魯店在奉天東南咸陽陳濤斜西北留二日乃行為李懷光反與朱泚連兵張本劒南西山兵馬使張朏以所部兵作亂入成都使疏吏翻劒南宿重兵于西山以備吐蕃崔寧以是兵殺郭英乂張朏以是兵逐張延賞朏敷尾翻西川節度使張延賞弃城奔漢州武后垂拱二年分益州置漢州九域志成都北至漢州九十五里鹿頭戍將叱干遂等討之鹿頭闗在漢州徳陽縣劉昫曰成都北一百五十里有鹿頭山扼兩川之要將即亮翻叱尺栗翻斬朏及其黨延賞復歸成都淮南節度使陳少遊將兵討李希烈屯盱眙盱眙漢縣唐初屬楚州建中四年度屬泗州少始照翻盱音吁眙音怡聞朱泚作亂歸廣陵修塹壘繕甲兵浙江東西節度使韓滉閉闗梁禁馬牛出境築石頭城穿井近百所繕館第數十修塢壁泚且禮翻又音此塹七艶翻滉呼廣翻近其靳翻通俗文營居曰塢壁壘也釋名曰壁辟也所以辟禦冦盗也起建業抵京峴京峴山在潤州州治東五里峴户蹇翻樓堞相屬屬之欲翻聨屬也堞逹恊翻以備車駕度江且自固也少遊𤼵兵三千大閲於江北滉亦𤼵舟師三千曜武於京江以應之大江逕京口城北謂之京江鹽鐵使包佶佶巨乙翻有錢帛八百萬將輸京師陳少遊以為賊據長安未期收復言收復未有期也欲彊取之彊如字佶不可少遊欲殺之佶懼匿妻子於案牘中急濟江少遊悉收其錢帛一考異曰奉天記曰佶以財幣百八十萬欲轉輸入城少遊彊收之今從舊傳佶有守財卒三千少遊亦奪之佶纔與數十人俱至上元復為韓滉所奪上元縣時帯昇州宋白曰上元縣晉江寧縣地貞觀七年移還舊郭即今所置縣也九年改為江寧縣𤣥宗置昇州因縣宇為州城縣元治鳯凰山南今移治㑹府時包佶盖在楊子廵院也史言天子播遷籓鎮阻兵陵轢王人復扶又翻時南方藩鎮各閉境自守惟曹王臯數遣使間道貢獻曹王臯時節度江南西道史言曹王臯悉心于帝室數所角翻使疏吏翻間古莧翻李希烈攻逼汴鄭江淮路絶朝貢皆自宣饒荆襄趣武闗汴皮變翻朝直遥翻趣逡喻翻下同臯治郵驛平道路由是往來之使通行無阻此為江浙往來之使治直之翻郵音尤上問陸䞇以當今切務䞇以曏日致亂由上下之情不通勸上接下從諫乃上疏上時掌翻疏所據翻其略曰臣謂當今急務在於審察羣情若羣情之所甚欲者陛下先行之所甚惡者陛下先去之此即孟子所欲與之聚之所惡勿施之意惡烏路翻下同去羗吕翻欲惡與天下同而天下不歸者自古及今未之有也夫理亂之本繫於人心夫音扶况乎當變故動揺之時在危疑向背之際背蒲妺翻人之所歸則植植立也人之所去則傾陛下安可不審察羣情同其欲惡使億兆歸趣以靖邦家乎趣嚮也此誠當今之所急也又曰頃者竊聞輿議輿衆也頗究羣情四方則患於中外意乖百辟又患於君臣道隔郡國之志不逹於朝廷朝廷之誠不升於軒陛上澤闕於下布下情壅於上聞實事不必知知事不必實上下否隔於其際眞偽雜糅於其間朝直遥翻否皮鄙翻糅女救翻聚怨囂囂騰謗籍籍欲無疑阻其可得乎又曰總天下之智以助聰明順天下之心以施教令則君臣同志何有不從逺邇歸心孰與為亂又曰慮有愚而近道近其靳翻事有要而似迃䟽奏旬日上無所施行亦不詰問詰去吉翻䞇又上疏上疏音並同前其略曰臣聞立國之本在乎得衆得衆之要在乎見情言洞見人情也故仲尼以謂人情者聖王之田記禮運以為仲尼之言言理道所生也理道猶言治道也唐人避高宗諱率以治為理又曰易乾下坤上曰泰坤下乾上曰否損上益下曰益損下益上曰損夫天在下而地處上於位乖矣而反謂之泰者上下交故也君在上而臣處下否皮鄙翻下同夫音扶處昌吕翻於義順矣而反謂之否者上下不交故也上約已而裕於人人必説而奉上矣説讀曰悦豈不謂之益乎上蔑人而肆諸己人必怨而叛上矣豈不謂之損乎陸贄此言深究否泰損益之義誠足以箴砭徳宗之失又曰舟即君道水即人情舟順水之道乃浮違則没君得人之情乃固失則危是以古先聖王之居人上也必以其欲從天下之心而不敢以天下之人從其欲祖左傳臧文仲所謂以欲從人則可以人從欲鮮濟之語之意又曰陛下憤習俗以妨理理治也言徳宗憤强藩之跋扈習以成俗有妨為治任削平而在躬以明威照臨以嚴法制斷斷丁亂翻流弊自久浚恒太深易恒之初六曰浚恒貞凶無攸利象曰浚恒之凶始求深也王弼注曰始求深者求深窮底令物無餘藴漸以至此人猶不堪而况始求深者乎以此為恒無所施而利也逺者驚疑而阻命逃死之禍作近者畏懾而偷容避罪之態生懾質渉翻君臣意乖上下情隔君務致理而下防誅夷臣將納忠又上慮欺誕此數語亦深中當時君臣之病誕妄也故睿誠不布於羣物物情不逹於睿聰臣於往年曾任御史徳宗初年陸贄為監察御史獲奉朝謁僅欲半年朝直遥翻陛下嚴邃高居未嘗降㫖臨問此可以見徳宗初年臨朝氣象羣臣跼蹐趨退跼音局蹐音脊亦不列事奏陳軒陛之間且未相諭宇宙之廣何由自通雖復例對使臣别延宰輔復扶又翻又音如字使疏吏翻例對使臣謂功臣節度及諸軍使待制者得隨例以次對也别延宰輔謂朝謁之外别延之與議天下事也復扶又翻既殊師錫書堯典師錫帝曰孔安國注云師衆也錫與也且異公言未行者則戒以樞宻勿論己行者又謂之遂事不諫論語載孔子責宰我之言漸生拘礙動渉猜嫌由是人各隱情以言為諱至於變亂將起億兆同憂獨陛下恬然不知方謂太平可致徳宗致亂之事誠如贄言陛下以今日之所覩騐往時之所聞孰眞孰虛何得何失則事之通塞備詳之矣塞悉則翻人之情偽盡知之矣上乃遣中使諭之曰朕本性甚好推誠好呼到翻亦能納諫將謂君臣一體全不隄防縁推誠不疑多被姦人賣弄今所致患害朕思亦無它其失反在推誠此徳宗猜防之心𤼵於言而不能自掩者也被皮義翻又諫官論事少能慎宻例自矜􅃷少詩沼翻􅃷音炫歸過於朕以自取名朕從卽位以來見奏對論事者甚多大抵皆是雷同道聽塗説孔子有言道聽而塗説徳之棄也馬融注曰謂聞於道路則傳而説之試加質問遽即辭窮若有竒才異能在朕豈惜㧞擢朕見從前已來事祗如此所以近來不多取次對人言次對人敷奏縁此多不取用其言或曰取次唐人語也亦非倦於接納卿宜深悉此意悉詳也贄以人君臨下當以誠信為本諫者雖辭情鄙拙亦當優容以開言路若震之以威折之以辯則臣下何敢盡言乃復上疏折之舌翻復扶又翻上時掌翻疏所據翻其略曰天子之道與天同方天不以地有惡木而廢𤼵生天子不以時有小人而廢聽納又曰唯信與誠有失無補言人君所為有失於誠信則無補於治道一不誠則心莫之保一不信則言莫之行陛下所謂失於誠信以致患害者臣竊以斯言為過矣又曰馭之以智則人詐示之以疑則人偷上行之則下從之上施之則下報之施式豉翻或讀如字若誠不盡於己而望盡於人衆必怠而不從矣不誠於前而曰誠於後衆必疑而不信矣是知誠信之道不可斯須而去身願陛下慎守而行之有加恐非所以為悔者也因徳宗之言以為失在推誠故陸贄極言誠信之不可去身以開廣上意又曰臣聞仲虺贊揚成湯不稱其無過而稱其改過書仲虺之誥曰惟王改過不吝虺許偉翻吉甫歌誦周宣不美其無闕而美其補闕詩烝民曰衮職有闕惟仲山甫補之尹吉甫所以美宣王之任賢使能也是則聖賢之意較然著明惟以改過為能不以無過為貴葢為人之行己必有過差葢為于偽翻上智下愚俱所不免智者改過而遷善愚者恥過而遂非遷善則其徳日新遂非則其惡彌積又曰諫官不宻自矜信非忠厚其於聖徳固亦無虧陛下若納諫不違則傳之適足增美陛下若違諫不納又安能禁之勿傳陸贄告君之言可謂深切著明又曰侈言無騐不必用徳宗之信裴延齡以侈言也質言當理不必違徳宗之罷桞渾以質言也當丁浪翻辭拙而效速者不必愚如蕭復之諫幸鳯翔是也言甘而利重者不必智趙賛竇滂之苛征重歛是也是皆考之以實慮之以終其用無它唯善所在又曰陛下所謂比見奏對論事皆是雷同道聽塗説者比毘至翻臣竊以衆多之議足見人情必有可行亦有可畏恐不宜一槩輕侮而莫之省納也省悉景翻察也陛下又謂試加質問即便辭窮臣但以陛下雖窮其辭而未窮其理能服其口而未服其心但以若依上文作竊以又覺文從字順又曰為下者莫不願忠為上者莫不求理然而下毎苦上之不理上每苦下之不忠若是者何兩情不通故也下之情莫不願逹於上上之情莫不求知於下然而下恒苦上之難逹上恒苦下之難知恒户登翻若是者何九弊不去故也所謂九弊者上有其六而下有其三好勝人好呼到翻下同恥聞過騁辯給眩聰明厲威嚴恣彊愎愎符逼翻狠也此六者君上之弊也諂諛顧望畏愞愞奴亂翻此三者臣下之弊也上好勝必甘於佞辭上恥過必忌於直諫如是則下之諂諛者順指而忠實之語不聞矣上騁辯必勦説而折人以言勦初交翻又初教翻此所謂勦説者人言未竟勦絶其説而伸己之説也折之舌翻上眩明必臆度而虞人以詐度徒洛翻以胸臆之見料度人如是則下之顧望者自便而切磨之辭不盡矣上厲威必不能降情以接物上恣愎必不能引咎以受規如是則下之畏愞者避辜而情理之説不申矣夫以區域之廣大生靈之衆多宫闕之重深夫音扶重直龍翻高卑之限隔自黎獻而上獲覩至尊之光景者踰億兆而無一焉黎獻衆賢也就獲覩之中得接言議者又千萬不一幸而得接者猶有九弊居其間則上下之情所通鮮矣鮮息淺翻上情不通於下則人惑下情不通於上則君疑疑則不納其誠惑則不從其令誠而不見納則應之以悖令而不見從則加之以刑下悖上刑不敗何待悖蒲内翻又蒲没翻是使亂多理少從古以然少始紹翻或為從古以然當作從古而然今觀文意陸宣公所謂從古至今亂多治少者正以下悖上刑故也以之與而辭義相去逺矣又曰昔趙武呐呐而為晉賢臣晉趙文子名武其言呐呐然如不出其口為晉正卿晉國以彊諸侯不叛呐呐舒小貎音如悦翻又奴劣翻絳侯木訥而為漢元輔絳侯事見漢文帝紀程氏曰木者質樸訥者遲鈍然則口給者事或非信辭屈者理或未窮人之難知堯舜所病書臯陶曰在知人在安民禹曰吁惟帝其難之胡可以一詶一詰而謂盡其能哉詰去吉翻以此察天下之情固多失實以此輕天下之士必有遺才徳宗所以成叚平仲之名者正如此又曰諫者多表我之能好諫者直示我之能容諫者之狂誣明我之能恕諫者之漏泄彰我之能從極言納諫之美以誘掖其君上也好呼到翻是則人君與諫者交相益之道也諫者有爵賞之利君亦有理安之利諫者得獻替之名君亦得采納之名然猶諫者有失中而君無不美唯恐讜言之有不切天下之不聞如此則納諫之徳光矣讜音黨上頗采用其言李懷光頓兵不進數上表暴揚盧把等罪惡數所角翻上時掌翻衆論諠騰亦咎把等上不得已十二月壬戌貶把為新州司馬白志貞為恩州司馬恩州屬漢合浦郡地蕭齊為齊安郡隋廢郡為海安縣唐貞觀二十三年以髙州之西平海安杜陵置恩州海安改曰恩平天寶曰恩平郡乾元復為恩州宋平王則改貝州曰恩州遂以此州為南恩州宋白為此恩州瀕海最為蒸濕當海南五郡汎海路此路自廣汎海行數日方登陸人惮海波不由此路多由新州陸去唯健歩出使與逓符牒經過耳新州治新興縣秦取陸梁地置象郡今州即其地晉永和分蒼梧郡於此置新寧郡梁武帝立新州所謂新興縣漢合浦郡臨元縣也又按舊志云恩州京師東南六千六百里西北六十里接廣州界新州至京師五千五十二里趙贊為播州司馬播州隋牂柯縣京師南四千四百五十里宦者翟文秀上所信任也翟萇伯翻懷光又言其罪上亦為殺之亦為于偽翻乙丑以翰林學士祠部員外郎陸䞇為考功郎中金部員外郎吴通㣲為職方郎中祠部屬禮部掌祠部考功屬吏部掌文武官功過考法以官職言之祠部比考功職方為清要郎中正五品上員外以從六品上䞇上奏辭以初到奉天扈從將吏上時掌翻從才用翻例加兩階今翰林獨遷官唐自至徳以後勲階輕而職事官重故云然夫行罰先貴近而後卑逺則令不犯行賞先卑逺而後貴近則功不遺夫音扶先悉薦翻後户構翻望先録大勞次徧羣品則臣亦不敢獨辭上不許上在奉天使人説田悦王武俊李納赦其罪説式芮翻考異曰燕南記十二月二十四日前已云赦武俊等罪而實録明年正月改元乃赦武俊等葢上先已諭㫖赦罪及赦書出始明言之耳厚賂以官爵悦等皆密歸欵而猶未敢絶朱滔各稱王如故滔使其虎牙將軍王郅説悦曰朱滔等倣漢官置虎牙將軍按唐書滔等之稱王也以左將軍曰虎牙右將軍曰豹畧徵以新書虎牙將軍盖王郅也日者八郎有急淊與趙王不敢愛其死竭力赴救幸而解圍田悦第八解圍事見二百一十七卷三年今太尉三兄受命闗中朱泚第三淊欲與回紇共往助之願八郎治兵與淊度河共取大梁紇下没翻治直之翻大梁汴州宣武節度治所悦心不欲行而未忍絶淊乃許之淊復遣其内史舍人李琯見悦審其可否内史舍人猶天朝中書舍人復扶又翻琯古緩翻悦猶豫不决宻召扈㠋議之司武侍郎許士則曰司武侍郎猶天朝兵部侍郎也朱淊昔事李懷仙為牙將與兄泚及朱希彩共殺懷仙而立希彩將即亮翻泚且禮翻又音如字殺李懷仙事見二百二十四卷代宗大厯三年考異曰燕南記作朱寀今從舊傳希彩所以寵信其兄弟至矣淊又與判官李子瑗謀殺希彩而立泚事見二百二十四卷大厯七年瑗于眷翻泚旣為帥帥所類翻淊乃勸泚入朝而自為留後事見二百二十五卷大厯九年雖勸以忠義實奪之權也平生與之同謀共功如李子瑗之徒負而殺之者二十餘人今又與泚東西相應使滔得志泚亦不為所容况同盟乎滔為人如此大王何從得其肺腑而信之邪觀時審勢量度彼已世不為無其人特其言有用不用耳泚且禮翻又音此邪音耶彼引幽陵回紇十萬之兵屯於郊坰紇下没翻幽陵即幽州坰古熒翻邑外謂之郊野外謂之林林外謂之坰大王出迎則成擒矣彼囚大王兼魏國之兵南向渡河與闗中相應天下其孰能當之大王於時悔之無及為大王計不若陽許偕行而隂為之備厚加迎勞勞力到翻至則託以它故遣將分兵而隨之如此大王外不失報徳之名而内無倉猝之憂矣扈㠋等皆以為然王武俊聞李琯適魏遣其司刑員外郎田秀馳見悦曰㠋五各翻琯古瑗翻司刑員外郎猶天朝刑部員外郎武俊曏以宰相處事失宜相息亮翻處昌吕翻恐禍及身又八郎困於重圍重直龍翻故與滔合兵救之今天子方在隱憂以徳綏我我曹何得不悔過而歸之邪捨九葉天子不事而事滔乎自高祖太宗高宗中宗睿宗𤣥宗肅宗代宗至帝凢九葉且泚未稱帝之時滔與我曹比肩為王固已輕我曹矣事見上卷本年况使之南平汴洛與泚連衡汴皮變翻汴州宣武軍洛州東都也衡讀曰横吾屬皆為虜矣八郎慎勿與之俱南但閉城拒守武俊請伺其隙連昭義之兵擊而滅之伺相吏翻與八郎再清河朔復為節度使共事天子不亦善乎復扶又翻又音如字使䟽吏翻悦意遂决紿滔云從行必如前約丁卯滔將范陽歩騎五萬人私從者復萬餘人紿蕩亥翻將即亮翻又音如字騎竒寄翻私從才用翻復扶又翻回紇三千人𤼵河間而南輜重首尾四十里紇下没翻瀛州治河間縣重直用翻李希烈攻李勉於汴州李勉以宣武節度使鎮汴州驅民運土木築壘道以攻城忿其未就并人填之謂之濕薪勉城守累月外救不至將其衆萬餘人奔宋州將音同上勉奔宋州依劉洽也庚午希烈䧟大梁滑州刺史李澄以城降希烈希烈以澄為尚書令兼永平節度使勉上表請罪滑州治白馬縣降户江翻尚辰羊翻上時掌翻上謂其使者曰朕猶失守宗廟勉宜自安待之如初劉洽遣其將髙翼將精兵五千保襄邑九域志襄邑在汴州東南一百七十里希烈攻拔之翼赴水死希烈乘勝攻寧陵九域志寧陵縣在宋州西四十五里江淮大震陳少遊遣參謀温述送欵於希烈曰濠壽舒廬已令弛備韜戈卷甲伏俟指麾又遣廵官趙詵結李納於鄆州少始照翻濠夀舒廬四州之地在淮蔡東南送欵遂言使弛備令力丁翻使也卷讀與捲同詵疎臻翻鄆音運中書侍郎同平章事關播罷為刑部尚書以給事中孔巢父為淄青宣慰使國子祭酒董晉為河北宣慰使宣慰者宣上命以慰安反側也父音甫淄莊持翻陸䞇言於上曰今盗遍天下輿駕播遷陛下宜痛自引過以感人心昔成湯以罪已勃興左傳臧文仲曰禹湯罪已其興也勃焉楚昭以善言復國楚昭王遭闔閭之禍國滅出亡父老送之王曰父老反矣何患無君父老曰有君如是其賢也相與從之或奔走赴秦號哭請救秦人憐之為之出兵二國并力遂走吴師昭王復國陛下誠能不吝改過以言謝天下使書詔無所避忌臣雖愚陋可以仰副聖情庶令反側之徒革心向化上然之故奉天所下書詔雖驕將悍卒聞之無不感激揮涕令力丁翻下遐稼翻將即亮翻術者上言國家厄運宜有變更以應時數上時掌翻下䞇上音同更工衡翻羣臣請更加尊號一二字上以問䞇䞇上奏以為不可其略曰尊號之興本非古制上尊號事始於開元五年行於安泰之日已累謙冲累力瑞翻襲乎䘮亂之時䘮息浪翻尤傷事體又曰嬴秦徳衰兼皇與帝始總稱之見七卷秦始皇二十六年流及後代昏僻之君乃有聖劉天元之號聖劉見三十四卷漢哀帝建平二年天元見一百七十三卷陳宣帝太建十一年是知人主輕重不在名稱稱尺證翻下美稱同損之有謙光稽古之善崇之獲矜能納謟之譏又曰必也俯稽術數須有變更更工衡翻與其增美稱而失人心不若黜舊號以祗天戒上納其言但改年號而已謂改明年號為興元也上又以中書所撰赦文示䞇撰如免翻䞇上言以為動人以言所感己淺言又不切人誰肯懷今兹徳音悔過之意不得不深引咎之辭不得不盡洗刷疵垢宣暢鬱堙疵才支翻使人人各得所欲則何有不從者乎應須改革事條謹具别狀同進捨此之外尚有所虞竊以知過非難改過為難言善非難行善為難假使赦文至精止於知過言善猶願聖慮更思所難上然之興元元年春正月癸酉朔赦天下改元制曰致理興化必在推誠忘已濟人不吝改過朕嗣服丕構丕大也構立屋也書大誥曰若考作室既底法厥子乃弗肯堂矧肯構丕構之語本諸此君臨萬邦失守宗祧宗者百世不毁之廟逺廟為祧祧他彫翻越在草莾用左傳語不念率徳誠莫追於既往永言思咎期有復於將來明徵其義以示天下徵證也明徵其義言無所掩覆也小子懼徳弗嗣懼已徳弗能嗣先業嗣祥吏翻罔敢怠荒然以長于深宫之中用禮記魯哀公之言長知丈翻暗於經國之務積習易溺易以豉翻居安忘危不知稼穡之艱難書無逸周公告成王之語不恤征戍之勞苦澤靡下究情未上通事既擁隔人懷疑阻猶昩省已擁恐當作壅省悉景翻遂用興戎戎兵也徵師四方轉餉千里賦車籍馬逺近騷然行齎居送衆庶勞止或一日屢交鋒刃或連年不解甲胄祀奠乏主室家靡依死生流離怨氣凝結力役不息田萊多荒鄭𤣥曰田萊多荒茨棘不除也陸徳明曰田廢生草曰萊暴令峻於誅求疲甿空於杼軸詩小東大東杼軸其空杼持緯器布帛已織成者以機軸卷之轉死溝壑離去鄉閭離力智翻邑里丘墟人煙斷絶天譴於上而朕不寤人怨於下而朕不知馴致亂階變興都邑馴從也言從此而致亂也萬品失序九廟震驚歐陽修曰書云七世之廟可以觀徳而禮家之説世數不同然自禮記王制祭法禮器大儒荀卿劉歆班固王肅之徒以為七廟者多盖自漢魏以來創業之君特起其上世又㣲無功徳以備祖宗故其初皆不能立七廟唐武徳元年始立四廟高祖崩朱子奢請立七廟虛太祖之室以待尚書入座議禮曰天子三昭三穆與太祖之廟而七晉宋齊梁皆立親廟六此故事也於是宣簡公懿王景元二帝四廟更祔𢎞農府君及高祖為六室太宗崩𢎞農以世逺毁而祔太宗高宗崩又遷宣簡而祔高宗皆為六室中宗神龍初以景帝為始祖而元帝不遷而祔孝敬帝由是爲七室中宗崩孝敬别立廟而祔中宗遂為七室至睿宗崩中宗立别廟而祔睿宗開元十年詔宣皇帝復祔正室諡爲獻祖并諡光帝爲懿祖又以中宗遷祔太廟於是太廟爲九室寳應二年祧獻懿而祔𤣥宗肅宗代宗崩又遷元皇帝而祔代宗自是常為九室上累于祖宗累力瑞翻下負于蒸庶痛心􅌤貌􅌤他典翻慙恧也罪實在予永言愧悼若墜泉谷唐避高祖諱改淵為泉自今中外所上書奏不得更言聖神文武之號建中元年羣臣上尊號曰聖神文武皇帝見二百二十六卷李希烈田悦王武俊李納等咸以勲舊各守藩維朕撫御乖方致其疑懼皆由上失其道而下罹其災朕實不君人則何罪此等言語强藩悍將聞之宜其感服易心宜并所管將吏等一切待之如初朱滔雖縁朱泚連坐路逺必不同謀念其舊勲務在𢎞貸𢎞大也如能效順亦與惟新朱泚反易天常君臣上下天秩有典之常也盗竊名器暴犯陵寢所不忍言獲罪祖宗朕不敢赦此等言語可與誥誓相表裏其脅從將吏百姓等但官軍未到京城以前去逆效順并散歸本道本軍者並從赦例所以携從逆之黨將即亮翻下同諸軍諸道應赴奉天及進收京城將士並賜名奉天定難功臣所以作勤王之心難乃旦翻其所加墊陌錢税間架竹木茶漆𣙜鐵之類悉宜停罷所以順人情之欲惡墊陌錢即趙賛所行除陌錢也墊丁念翻𣙜古岳翻赦下四方人心大悦及上還長安明年上還長安之明年貞元元年也下遐嫁翻還從宣翻又音如字李抱眞入朝為上言朝直遥翻為于偽翻山東宣布赦書士卒皆感泣臣見人情如此知賊不足平也史究言興元赦書感動人心之效命兵部員外郎李充為恒冀宣慰使唐兵部員外郎二人一人掌貢舉雜請一人判南曹嵗選出使非本職命以即官出使耳恒户登翻使疏吏翻朱泚更國號曰漢泚且禮翻音此朱泚初僣號國號秦更工衡翻自號漢元天皇改元天皇王武俊田悦李納見赦令皆去王號去羌吕翻上表謝罪上時掌翻惟李希烈自恃兵彊財富遂謀稱帝遣人問儀於顔眞卿眞卿曰老夫嘗為禮官所記惟諸侯朝天子禮耳顔眞卿所以答李希烈者辭不廹切而義甚嚴正朝直遥翻希烈遂即皇帝位録考異曰希烈稱帝實舊希烈傳顔眞卿傳皆無年月今據奉天記幸奉天録皆云赦令既行諸方莫不向化惟李希烈長惡不悛國號大楚又實録今年閏月庚午詔曰朕茍存拯物不憚屈身故於嵗首特布新令赦其殊死待以初誠使臣纔及於郊畿巨猾已聞於僭竊然則希烈稱帝必在正月初也國號大楚改元武成置百官以其黨鄭賁為侍中孫廣為中書令李緩李元平同平章事李緩新書作李綬以汴州為大梁府分其境内為四節度希烈遣其將辛景臻謂顔眞卿曰不能屈節當自焚積薪灌油於其庭眞卿趨赴火景臻遽止之希烈又遣其將楊峯將即亮翻今考異曰舊傳作楊豐從奉天記齎赦賜陳少遊及夀州刺史張建封建封執峯徇於軍腰斬於市少遊聞之駭懼建封具以少遊與希烈交通之狀聞上悦以建封為濠壽廬三州都團練使少始照翻使疏吏翻希烈乃以其將杜少誠為淮南節度使使將歩騎萬餘人先取壽州後之江都使將即亮翻又音如字騎竒寄翻夀州治夀春縣之往也淮南節度治江都建封遣其將賀蘭元均邵怡守霍丘秋柵後周書賀蘭祥傳其先與後魏俱起有紇伏者為賀蘭莫弗遂以為氏霍丘漢廬江松滋縣地梁置安豐郡東魏廢郡隋開皇十六年置霍丘縣唐屬夀州九域志在州東一百二十里宋白曰霍丘本春秋時蓼國梁置霍丘戍隋廢戍為縣少誠竟不能過遂南㓂蘄黄欲斷江路蘄渠希翻斷音短時上命包佶自督江淮財賦泝江詣行在至蘄口水經注蘄水源出蘄春縣北大浮山南過其縣西又南至蘄口入于江佶其吉翻泝蘇故翻遇少誠入冦曹王臯遣蘄州刺史伊慎將兵七千拒之戰於永安戍永安戍在黄州黄岡縣界梁置永安郡後廢為戍大破之少誠脱身走斬首萬級包佶乃得前後佶入朝具奏陳少遊奪財賦事奪財賦事見上年佶巨乙翻朝直遥翻少遊懼厚歛所部以償之歛力贍翻李希烈以夏口上流要地卾州治夏口當江漢之㑹夏户雅翻使其驍將董侍募死士七千襲卾州刺史李兼偃旗卧鼓閉門以待之侍撤屋材以焚門兼帥士卒出戰大破之驍堅堯翻將即亮翻鄂逆各翻鄂州治江夏縣即夏口帥讀曰率上以兼為鄂岳沔都團練使沔彌兖翻使疏吏翻於是希烈東畏曹王臯西畏李兼不敢復有窺江淮之志矣史言李希烈兵勢稍挫復扶又翻朱滔引兵入趙境王武俊大具犒享犒口到翻入魏境田悦供承倍豐使者迎候相望於道丁丑滔至永濟宋白曰永濟縣本漢貝丘縣地隋已後為臨清縣地大厯七年田承嗣奏分臨清置永濟縣屬貝州以縣西臨永濟渠為名遣王郅見悦約㑹館陶偕行度河館陶縣屬魏州在州城東稍北悦見郅曰悦固願從五兄南行昨日將出軍將士勒兵不聽悦出曰國兵新破謂先為馬燧等所破也戰守踰年資儲竭矣謂守魏州與馬燧等相持也今將士不免凍餒何以全軍逺征大王日自撫循猶不能安若捨城邑而去朝出暮必有變悦之志非敢有貳也如將士何已令孟祐備歩騎五千從五兄供芻牧之役騎竒寄翻因遣其司禮侍郎裴抗等往謝滔司禮侍郎猶天朝禮部侍郎滔聞之大怒曰田悦逆賊曏在重圍重直龍翻命如絲髪使我叛君弃兄𤼵兵晝夜赴之事見二百二十七卷建中三年幸而得存許我貝州我辭不取尊我為天子我辭不受事見同上年今乃負恩誤我逺來飾辭不出即日遣馬寔攻宗城經城經城漢古縣時屬貝州宋白曰後漢分前漢堂陽縣於今縣西北二十里置經縣後魏書併南宫縣太和十年又於今理置經縣尋置廣宗郡於此北齊省郡及縣移武彊縣於此後周復於此置廣宗郡隋開皇三年罷郡復於此置經城縣宋省縣為鎮入宗城楊榮國攻冠氏去年張孝宗遣其將楊榮國與李晟俱赴國難及晟收京城諸將中獨楊榮國不見於史今朱滔遣楊榮國攻冠氏乃建中三年以深州降于朱滔者冠氏春秋邑名隋分館陶東界置冠氏縣唐屬魏州九域志在州東北六十里皆拔之又縱囘紇掠館陶頓幄帟器皿車牛以去紇下没翻帟音亦三禮圖在上曰帟四旁及上曰帷上下四旁悉周曰幄又曰帟平帳也帟主在幕若幄中坐上承塵悦閉城自守壬午滔遣裴抗等還還從宣翻又音如字分兵置吏守平恩永濟平恩縣屬洺州治平恩州丙戌以吏部侍郎盧翰為兵部侍郎同平章事盖考異曰實録新舊紀表皆同翰罷領選故自吏部遷兵部耳翰義僖之七世孫也盧義僖仕元魏當靈后臨朝時不附徐鄭朱滔引兵北圍貝州引水環之環音宦刺史邢曹俊嬰城拒守縱范陽及囘紇兵大掠諸縣滔縱兵大掠又拔武城武城即漢東武城縣地唐屬貝州九域志在州東五十里通徳棣二州使給軍食建中二年朱滔據有徳棣遣馬寔將歩騎五千屯冠氏以逼魏州以給事中杜黄裳為江淮宣慰副使酉考異曰實録去年十二月癸已云黄裳使江淮此又有之按舊紀去年十二月黄裳為給事耳實録誤也上於行宫廡下貯諸道貢獻之物牓曰瓊林大盈庫貯直吕翻陸䞇以為戰守之功賞賚未行而遽私别庫則士卒怨望無復鬭志上疏諫復扶又翻又音如字上時掌翻疏所據翻其略曰天子與天同徳以四海為家何必橈廢公方橈奴教翻屈曲也方法也崇聚私貨降至尊而代有司之守辱萬乘以效匹夫之藏乘繩證翻虧法失人誘姦聚慝以斯制事豈不過哉誘羊又翻慝吐得翻又曰頃者六師初降降讀如字天子之行必有六師以為營衛不敢指言自京師出居奉天故㣲其辭曰六師初降百物無儲外扞兇徒内防危堞晝夜不息殆將五旬凍餒交侵死傷相枕堞逹協翻枕職任翻畢命同力竟夷大艱良以陛下不厚其身不私其欲絶甘以同卒伍輟食以㗖功勞㗖徒濫翻又徒覽翻無猛制而人不擕懷所感也無厚賞而人不怨悉所無也悉詳體也今者攻圍已解衣食已豐而謡讟方興讟怨謗也軍情稍阻豈不以勇夫恒性嗜利矜功恒户登翻其患難既與之同憂而好樂不與之同利難乃旦翻好呼到翻樂音洛茍異恬黙能無怨咨咨咨嗟也又曰陛下誠能近想重圍之殷憂重直用翻殷於謹翻追戒平居之專欲凡在二庫貨賄盡令出賜有功毎獲珍華令力丁翻珍華猶言珍麗也先給軍賞如此則亂必靖賊必平徐駕六龍旋復都邑天子之貴豈當憂貧是乃散其小儲而成其大儲損其小寶而固其大寶也上即命去其牓去𦍑吕翻蕭復嘗言於上曰宦官自艱難以來多為監軍恃恩縱横監工銜翻横户孟翻此屬但應掌宫掖之事不宜委以兵權國政上不悦又嘗言陛下踐阼之初聖徳光被應乙陵翻當也掖音亦被皮義翻自楊炎盧把黷亂朝政以致今日朝直遥翻陛下誠能變更睿志臣敢不竭力此必盧把貶逐之後蕭復方有是言更工衡翻儻使臣依阿茍免臣實不能蕭復盖撲而直者又嘗與盧把同奏事把順上㫖復正色曰盧把言不正上愕然退謂左右曰蕭復輕朕此事必在蕭復盧把同列之時史因徳宗命復出使而序其事於此耳戊子命復充山南東西荆湖淮南江西鄂岳浙江東西福建嶺南等道宣慰安撫使實踈之也鄂五各翻使疏吏翻既而劉從一及朝士往往奏留復上謂陸䞇曰朕思遷幸以來江淮逺方或傳聞過實欲遣重臣宣慰謀於宰相及朝士僉謂宜然今乃反覆如是朕為之悵恨累日朝直遥翻相息亮翻為于偽翻意復悔行使之論奏邪意者以意度之也此亦徳宗猜防臣下之一事卿知蕭復何如人其不欲行意趣安在䞇上奏以為復痛自脩勵慕為清貞用雖不周行則可保上時掌翻行下孟翻至於輕詐如此復必不為借使復欲逗留從一安肯附㑹今所言矛楯韓非子有鬻矛楯者自譽其矛曰吾矛之利物無不䧟也又自譽其楯曰吾楯之堅物莫能䧟也或謂之曰以子之矛䧟子之楯可乎其人不能答故後世謂議論自相反及為事自相反者為自相矛楯楯食尹翻願陛下明加辯詰詰去吉翻若蕭復有所請求則從一何容為隱為于偽翻若從一自有囘互則蕭復不當受疑陛下何憚而不辯明乃直為此悵恨也夫明則罔惑辯則罔寃惑莫甚於逆詐而不與明夫音扶逆者未至而迎之也詐謂人欺己也未見其詐而逆以為詐謂之逆詐寃莫痛於見疑而不與辯是使情偽相糅糅女救翻忠邪靡分兹實居上御下之要樞惟陛下留意上亦竟不復辯復扶又翻辛卯以王武俊為恒冀深趙節度使壬辰加李抱眞張孝忠並同平章事丙申加田悦檢校左僕射恒户登翻使疏吏翻校古效翻射寅謝翻以山南東道行軍司馬樊澤為本道節度使前深趙觀察使康日知為同州刺史奉誠軍節度使以趙州與王武俊故徙康日知乾元初以同州為匡國軍節度使今又為奉誠軍曹州刺史李納為鄆城刺史平盧節度使李納本為曹州刺史建中二年其父正已卒納自領軍務未有朝命今方命以旌節故先叙其本職而加以新命鄆音運戊戍加劉洽汴滑宋亳都統副使知都統事李勉悉以其衆授之李勉既失守汴州命劉洽知都統事汴皮變翻統他綜翻俗多從上聲辛丑六軍各置統軍此北門左右羽林龍武神武六軍也軍考異曰實録云詔六軍各置軍使一員又云因置統按舊紀獨置統軍耳今從之秩從三品以寵勲臣從才用翻吐蕃尚結贊請出兵助唐收京城庚子遣祕書監崔漢衡使吐蕃𤼵其兵吐從暾入聲資治通鑑卷二百二十九
