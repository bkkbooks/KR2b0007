  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷二十八宋司馬光撰胡三省音註漢紀二十起昭陽作噩盡屠維單閼凡七年孝元皇帝上荀悦曰諱奭之字曰盛應劭曰諡法行義悦民曰元初元元年春正月辛丑葬孝宣皇帝于杜陵臣瓉曰自崩至葬凡二十八日杜陵在長安南五十里赦天下三月丙午立皇后王氏封后父禁為陽平侯恩澤侯表陽平侯食邑於東郡以三輔太常郡國公田及苑可省者振業貧民太常掌諸陵邑故亦有公田苑師古曰振業振起之令有作業貲不滿千錢者賦貸種食師古曰賦給與之也貸假也種音之勇翻賈公彦曰種食者或為種子或為食用封外祖平恩戴侯同産弟子中常侍許嘉為平恩侯文頴曰戴侯許廣漢諡法典禮不愆曰戴余按廣漢先坐腐刑及薨無後今以嘉紹封百官表侍中中常侍皆加官西都參用士人東都始以宦者為中常侍夏六月以民疾疫令太官省膳減樂府員省苑馬以振困乏樂府員大凡八百二十九人武帝所立漢官儀牧師諸苑三十六所分置北邊西邊養馬三十萬匹闗東郡國十一大水饑或人相食轉旁郡錢榖以相救上素聞琅邪王吉貢禹皆眀經潔行姓譜貢姓子貢之後行下孟翻遣使者徴之吉道病卒禹至拜為諫大夫上數虛己問以政易咸卦君子以虚受人師古曰虛已謂聽受其言也數所角翻禹奏言古者人君節儉什一而税無他賦役故家給人足髙祖孝文孝景皇帝宫女不過十餘人廐馬百餘匹後世争為奢侈轉轉益甚臣下亦相放效師古曰放音甫往翻下同臣愚以為如太古難宜少放古以自節焉少詩沼翻方今宫室已定無可奈何矣其餘盡可減損故時齊三服官輸物不過十笥李斐曰齊國舊有三服之官春獻冠幘縰為首服紈素為冬服輕綃為夏服凡三如淳曰地理志曰齊冠帶天下胡公曰服官主作文繡以給衮龍之服地理志襄邑亦有服官師古曰齊三服官李説是也縰與纚同音山爾翻即今之方目􅀢也紈素今之絹也輕綃今之輕􅀢也襄邑自出文繡非齊三服也方今齊三服官作工各數千人一嵗費數鉅萬萬萬為鉅萬廐馬食粟将萬匹武帝時又多取好女至數千人以填後宫及棄天下多蔵金錢財物鳥獸魚鼈凡百九十物又皆以後宫女置於園陵至孝宣皇帝時陛下惡有所言師古曰不能自言減省之事惡烏路翻惡有所言者惡以天下儉其親此語承上園陵事羣臣亦隨故事甚可痛也故使天下承化取女皆大過度師古曰取讀曰娶諸侯妻妾或至數百人豪富吏民畜歌者至數十人此所謂取女過度也是以内多怨女外多曠夫師古曰曠空也室家空也及衆庶葬埋皆虛地上以實地下其過自上生師古曰自從也上謂天子也皆在大臣循故事之辠也唯陛下深察古道從其儉者大減損乘輿服御器物三分去二乘䋲證翻去羌吕翻擇後宫賢者留二十人餘悉歸之及諸陵園女無子者宜悉遣漢制天子晏駕後宫送葬因留奉陵寑廐馬可無過數十匹獨舎長安城南苑地以為田獵之囿師古曰舎置也獨留置之其餘皆廢去舎讀曰捨以方今天下饑饉可無大自損減以救之稱天意乎天生聖人盖為萬民非獨使自娛樂而已也稱只證翻為于偽翻樂音洛天子納善其言下詔令諸宫館希御幸者勿繕治治直之翻太僕減榖食馬水衡減肉食獸太僕掌輿馬漢舊儀云天子大廐未央丞華輅軨陪馬騶駼大廐也馬皆萬匹水衡都尉掌上林苑禽獸屬焉師古曰繕補也減謂損其數省者全去之臣光曰忠臣之事君也責其所難則其易者不勞而正易以豉翻補其所短則其長者不勸而遂孝元踐位之初虚心以問禹禹宜先其所急後其所緩然則優游不斷先後皆去聲斷丁亂翻讒佞用權當時之大患也而禹不以為言恭謹節儉孝元之素志也而禹孜孜言之何哉使禹之智不足以知烏得為賢知而不言為罪愈大矣匈奴呼韓邪單于復上書言民衆困乏復扶又翻詔雲中五原郡轉榖二萬斛以給之是嵗初置戊巳校尉使屯田車師故地師古曰戊巳校尉者鎮安西域無常治處亦猶甲乙等各冇方位而戊與巳四季寄王故以名官也時有戊校尉又冇巳校尉一説戊與巳位在中央今所置校尉在三十六國之中故曰戊巳也余謂車師之地不在三十六國之中當從師古前説為是宣帝元康二年以車師地與匈奴今匈奴欵附故復屯田故地二年春正月上行幸甘泉郊泰畤畤音止樂陵侯史髙以外屬領尚書事前将軍蕭望之光禄大夫周堪為之副望之名儒與堪皆以師傅舊恩天子任之數宴見言治亂陳王事數所角翻見賢遍翻治直吏翻陳王者之事也望之選白宗室眀經有行行下孟翻㪚騎諫大夫劉更生給事中明經有行言其通於經術且行修飭也百官表曰㪚騎加官騎並乘輿車師古曰並音歩浪翻騎而㪚從無常職也給事中給事禁中也㪚悉亶翻與侍中金敞並拾遺左右四人同心謀議勸導上以古制多所欲匡正上甚鄕納之師古曰郷讀曰嚮意信嚮之而納用其言史髙充位而已由此與望之有隙中書令𢎞恭𢎞姓也衛冇大夫𢎞演僕射石顯自宣帝時久典樞機眀習文法續漢志尚書令承秦所置武帝用宦者更為中書謁者令成帝用士人復故令掌凡選署及奏下尚書曹文書衆事僕射署尚書事令不在則奏下衆事辯已見前帝即位多疾以顯久典事中人無外黨師古曰少骨肉之親無婚姻之家也精専可信任遂委以政事無大小因顯白决白奏也决斷也貴幸傾朝朝直遥翻百僚皆敬事顯顯為人巧慧習事能深得人主㣲指内深賊持詭辯以中傷人師古曰詭違也違道之辯中竹仲翻忤恨睚眦輒被以危法忤五故翻睚五懈翻眦仕懈翻師古曰被加也音皮義翻危法謂以法危殺之亦與車騎将軍髙為表裏議論常獨持故事不從望之等望之等患苦許史放縱又疾恭顯擅權建白以為中書政本國家樞機師古曰建白者立此議而白之宜以通眀公正處之處昌呂翻武帝游宴後庭故用宦者非古制也宜罷中書宦官應古不近刑人之義師古曰禮刑人不在君側故曰應古近其靳翻由是大與髙恭顯忤師古曰忤謂相違逆也忤五故翻上初即位謙讓重改作師古曰重難也未欲更置士人於中書也議久不定出劉更生為宗正㪚騎給事中中朝官也宗正外朝官也故云出望之堪數薦名儒茂材以僃諫官數所角翻㑹稽鄭朋隂欲附望之㑹土外翻上書言車騎将軍髙遣客為姦利郡國及言許史子弟罪過章視周堪師古曰視讀曰示以朋所奏之章示堪也堪白令朋待詔金馬門朋奏記望之曰今将軍規橅云若管晏而休遂行日昃至周召乃留乎師古曰問望之立意當趣如管晏而止為欲恢廓其道日昃不食追周召之蹟然後已乎橅讀曰模其字從木若管晏而休則下走将歸延陵之臯没齒而已矣應劭曰下走僕也張晏曰吳公子札食邑延陵薄吳王之行棄國而耕於皐澤朋云望之所為若但如管晏則不處漢朝将歸㑹稽尋延陵之軌隱耕皐澤之中也師古曰下走自謙言趨走之使也没齒終身也如将軍興周召之遺業親日昃之兼聽則下走其庶㡬願竭區區奉萬分之一召讀曰邵庶㡬居希翻望之始見朋接待以意師古曰與之相見納用其説也余謂接待以意者推誠待之接以殷勤後知其傾邪絶不與通朋楚士怨恨張晏曰朋㑹稽人㑹稽并屬楚蘇林曰楚人脆急也更求入許史推所言許史事推吐審翻曰皆周堪劉更生教我我闗東人何以知此於是侍中許章白見朋見賢遍翻下同朋出揚言曰我見言前将軍小過五大罪一前将軍謂望之也待詔華龍行汙穢師古曰華音胡化翻姓也行下孟翻欲入堪等堪等不納亦與朋相結恭顯令二人告望之等謀欲罷車騎将軍疏退許史状車騎将軍謂史髙疏與疎同候望之出休日漢制自三署郎以上入直禁中者十日一出休沐令朋龍上之事下𢎞恭問状上時掌翻下遐稼翻下既下同望之對曰外戚在位多奢滛欲以匡正國家非為邪也恭顯奏望之堪更生朋黨相稱舉數譛訴大臣數所角翻毀離親戚欲以専擅權勢為臣不忠誣上不道請謁者召致廷尉時上初即位不省召致廷尉為下獄也省悉井翻察也悟也可其奏後上召堪更生曰繫獄上大驚曰非但廷尉問邪以責恭顯皆叩頭謝上曰令出視事恭顯因使史髙言上新即位未以德化聞天下而先驗師傅既下九卿大夫獄劉更生為宗正九卿也周堪為光禄大夫聞音問下遐稼翻宜因決免於是制詔丞相御史前将軍望之傅朕八年宣帝五鳯二年蕭望之為太子太傅至黄龍元年為八年無它罪過今事久逺識忘難眀師古曰言不能盡記有遺忘者故難眀忘巫放翻其赦望之罪收前将軍光禄勲印綬及堪更生皆免為庶人二月丁巳立弟竟為清河王考異曰荀紀竟作寛今從漢書戊午隴西地震敗城郭屋室壓殺人衆敗補邁翻考異曰劉向傳云三月地大震今從元紀三月立廣陵厲王子霸為王宣帝五鳳四年廣陵厲王胥以罪自殺國除今復立其子詔罷黄門乘輿狗馬師古曰黄門近署也故親幸之物屬焉百官表黄門寺屬少府乘繩證翻水衡禁囿百官表水衡都尉屬官有禁囿等九官令丞宜春下苑孟康曰宜春宫名也在杜縣東晉灼曰史記云葬二世杜南宜春苑中師古曰宜春下苑即今京城東南隅曲江池是少府佽飛外池百官表少府屬官有左弋十二官令丞武帝大初元年更名左弋為佽飛佽飛掌弋射有九丞兩尉如淳曰佽飛其矰繳以射鳬鴈給祭祀是故有池也佽飛荆人入水斬蛟勇士也故以名官佽音次嚴籞池田蘇林曰嚴飾池上之屋及其池也晉灼曰嚴籞射苑也許慎曰嚴弋射所蔽也池田苑中田也師古曰晉説是也假與貧民又詔赦天下舉茂材異等直言極諫之士夏四月立子驁為皇太子鷔五到翻待詔鄭朋薦太原太守張敞先帝名臣宜傅輔皇太子上以問蕭望之望之以為敞能吏任治煩亂材輕非師傅之器敞傳云敝無威儀罷朝㑹過走馬章臺街使御吏驅自以便面拊馬又為婦畫睂所謂材輕也任音壬治直之翻天子使使者徴敞欲以為左馮翊㑹病卒詔賜蕭望之爵闗内侯給事中朝朔望朝直遥翻考異曰元紀此詔在今冬按劉向傳云前𢎞恭石顯秦望之等獄決三月地大震然則望之等黜免在今春地震前也又曰夏客星見昴卷舌間上感悟下詔賜望之爵闗内侯望之傳曰後數月賜望之爵闗内侯盖紀見望之死在十二月因置此詔於彼上耳闗東饑齊地人相食秋七月己酉地復震復扶又翻下同考異曰劉向傳曰冬地復震元紀此月詔曰一年中地再動漢紀在七月己酉今從之上復徴周堪劉更生欲以為諫大夫𢎞恭石顯白皆以為中郎百官表諫大夫秩比八百石中郎秩比六百石並屬光禄勲上器重蕭望之不已欲倚以為相相息亮翻恭顯及許史兄弟侍中諸曹皆側目於望之等更生乃使其外親上變事外親謂母黨也上時掌翻下同言地震殆為恭等不為三獨夫動應劭曰三獨夫謂蕭望之周堪及向師古曰獨夫猶言匹夫也殆近也為于偽翻臣愚以為宜退恭顯以章蔽善之罰師古曰章眀也進望之等以通賢者之路如此則太平之門開災異之原塞矣塞悉則翻下同書奏恭顯疑其更生所為白請考姦詐辭果服遂逮更生繫獄免為庶人會望之子散騎中郎伋亦上書訟望之前事散騎中郎者本為中郎而加散騎官也事下有司復奏望之前所坐眀白無譖訴者師古曰言望之自有罪非人讒譛而訴之也下遐稼翻復扶又翻下同而教子上書稱引亡辜之詩史不載伋書不知其所稱引者何詩詩變雅云無罪無辜讒口嗸嗸豈伋所引者即此詩乎亡古無字通失大臣體不敬請逮捕𢎞恭石顯等知望之素髙節不詘辱詘與屈同建白望之前幸得不坐復賜爵邑不悔過服罪深懐怨望教子上書歸非於上師古曰言歸惡於天子也自以託師傅終必不坐師古曰言恃舊恩自謂終無罪坐懐此心非頗屈望之於牢獄塞其怏怏心則聖朝無以施恩厚上曰蕭太傅素剛安肯就吏顯等曰人命至重言人所重者性命也望之所坐語言薄罪既以語言為薄罪則不當下吏孝元於此不能破恭顯之姦可謂不眀矣必無所憂上乃可其奏冬十二月顯等封詔以付謁者敕令召望之手付因令太常急發執金吾車騎馳圍其第太常掌諸陵縣執金吾掌徼循京師蕭望之時居杜陵故令太常發執金吾車騎往圍其第以恐脅之速其自盡也使者至召望之望之以問門下生魯國朱雲雲者好節士好呼到翻勸望之自裁自裁猶自殺也於是望之仰天歎曰吾甞僃位将相年踰六十矣老入牢獄茍求生活不亦鄙乎字謂雲曰游師古曰朱雲字游呼其字趣和藥來趣讀曰促和户卧翻無久留我死遂飲鴆自殺果墮恭顯計中天子聞之驚拊手曰曩固疑其不就牢獄果然殺吾賢傅是時太官方上晝食上時掌翻上乃卻食為之涕泣哀動左右詩云啜其泣矣何嗟及矣為于偽翻於是召顯等責問以議不詳師古曰詳審也皆免冠謝良久然後已上追念望之不忘每嵗時遣使者祠祭望之冢終帝之世平曰墓封曰冢髙曰墳臣光曰甚矣孝元之為君易欺而難悟也易以䜴翻夫恭顯之譖訴望之其邪説詭計誠有所不能辯也至于始疑望之不肯就獄恭顯以為必無憂已而果自殺則恭顯之欺亦眀矣在中智之君孰不感動奮發以厎邪臣之罰厎致也孝元則不然雖涕泣不食以傷望之而終不能誅恭顯纔得其免冠謝而已如此則姦臣安所懲乎是使恭顯得肆其邪心而無復忌憚者也復扶又翻是嵗𢎞恭病死石顯為中書令初武帝滅南越開置珠厓儋耳郡事見二十卷武帝元鼎六年儋丁甘翻在海中洲上師古曰居海中之洲也水中可居者曰洲吏卒皆中國人多侵陵之其民亦暴惡自以阻絶數犯吏禁數所角翻率數年壹反殺吏漢輒發兵擊定之二十餘年間凡六反據賈捐之傳自初為郡至昭帝始元元年二十餘年間凡六反至宣帝時又再反始元五年罷儋耳郡并屬珠厓至宣帝神爵三年珠厓三縣反後七年甘露元年九縣復反上即位之眀年珠厓山南縣反發兵擊之諸縣更叛連年不定海中洲上以黎母山為王環山列置諸縣山南縣盖置於黎母山之南也師古曰吏音工衡翻上博謀於羣臣欲大發軍待詔賈捐之曰捐之時待詔金馬門臣聞堯舜禹之聖德地方不過數千里西被流沙東漸于海朔南暨聲教師古曰此引禹貢之辭漸入也一曰浸也朔北方也暨及也被皮義翻漸子㢘翻言欲與聲教則治之不欲與者不彊治也與讀曰豫治直之翻彊其兩翻故君臣歌德師古曰言皆有德可歌頌含氣之物各得其宜武丁成王殷周之大仁也然地東不過江黄杜預曰江國在汝南安陽縣黄國今弋陽縣西不過氐羌南不過蠻荆北不過朔方是以頌聲並作視聽之物咸樂其生樂音洛越裳氏重九譯而獻此非兵革之所能致也晉灼曰逺國使來因九譯言語乃通也張晏曰越不著衣裳慕中國化遣譯來著衣裳故曰越裳也師古曰越裳自是國名非以襲衣裳始為稱號也王充論衡作越甞此則不作衣裳之字眀矣晉志曰吳孫皓置九徳郡即周時越裳氏地以至于秦興兵逺攻貪外虚内而天下潰畔孝文皇帝偃武行文當此之時斷獄數百賦役輕簡斷丁亂翻下同孝武皇帝厲兵馬以攘四夷天下斷獄萬數賦煩役重寇賊並起軍旅數發數所角翻父戰死於前子鬭傷於後女子乘亭障孤兒號於道老母寡婦飲泣巷哭師古曰涙流被面以入于口故言飲泣也巷哭者哭于路也號户刀翻是皆廓地泰大征伐不休之故也今闗東民衆久困流離道路人情莫親父母莫樂夫婦樂音洛至嫁妻賣子法不能禁義不能止此社稷之憂也今陛下不忍悁悁之忿悁縈年翻又吉掾翻忿也憂也詩中心悁悁又急躁貌欲驅士衆擠之大海之中師古曰擠墜也音子詣翻又子奚翻余謂擠排也推也快心幽㝠之地非所以救助饑饉保全元元也詩云蠢爾蠻荆大邦為讐師古曰詩小雅采芑之詩也蠢動貌也蠻荆荆州之蠻也言敢與大國為讐敵也言聖人起則後服中國衰則先畔自古而患之何况乃復其南方萬里之蠻乎言珠厓又在蠻荆之南去京師萬里復扶又翻駱越之人南越王尉佗以兵威役屬西甌駱師古曰西甌即駱越也言西者以别束甌也余謂今安南之地古之駱越也珠厓盖亦駱越地宋白曰髙貴二州亦古駱越地父子同川而浴相習以鼻飲范成大曰今邕管溪洞及㳂海喜鼻飲隨貧富以銀錫陶器或大瓢盛水入塩并山薑汁數滴器側有竅施管如瓶觜内鼻中吸水升腦下入喉吸水時含魚肉鮓一臠故水得安流入鼻不與氣相激既飲必噫氣謂涼腦快膈莫此若但可飲水或𫝊為飲酒非是與禽獸無異本不足郡縣置也顓顓獨居一海之中師古曰顓與専同専専猶區區也一曰圜貌也霧露氣濕多毒草蟲蛇水土之害人未見虜戰士自死又非獨珠厓有珠犀瑇瑁也海中有珠池珠母者蚌也採珠必蜑丁皆居海艇中以大舶環池採珠以石懸大絙别以小繩繫蜑腰没水取珠氣迫則撼繩繩動舶人覺乃絞取人縁大絙上然而死於採珠者亦多矣此我太祖皇帝所以罷劉氏媚川都也師古曰犀状如小牛頭如猪而四足類象黑色一角當額前鼻上又有角劉欣眀交州記曰犀其毛如豕蹄冇三甲頭如馬有三角鼻上角短額上頂上角長異物志曰角中特有光耀白理如綫自本達末則為通天犀抱朴于曰通天犀有白理如綫者以盛米雞即駭矣其真者刻為魚衘入水水開三尺本草圖經曰犀出永昌山谷及益州今出南海者為上郭璞爾雅注曰犀三角一在頂上一在額上一在鼻上鼻上者即食角小而不橢瑇瑁如龜其甲相覆而生若甲然甲上有斑文瑇音代瑁音妹棄之不足惜不擊不損威其民譬猶魚鼈何足貪也臣竊以往者羌軍言之此盖指宣帝神爵元年羌反時暴師曾未一年兵出不踰千里費四十餘萬萬大司農錢盡乃以少府禁錢續之續漢志大司農掌諸錢穀金帛諸貨幣邊郡諸官請調度者皆為報給損多益寡取相給足百官表少府掌山林池澤之税以給共養應劭註曰名曰禁錢以給私養自别為藏少者小也故稱少府師古曰大司農供軍國之用少府以養天子也夫一隅為不善費尚如此况於勞師逺攻亡士毋功乎毋與無同求之往古則不合施之當今又不便臣愚以為非冠帶之國禹貢所及春秋所治皆可且無以為師古曰為猶用也治直之翻願遂棄珠厓専用恤闗東為憂上以問丞相御史御史大夫陳萬年以為當擊丞相于定國以為前日興兵擊之連年䕶軍都尉校尉及丞凡十一人還者二人卒士及轉輸死者萬人以上費用三萬萬餘尚未能盡降降户江翻今闗東困乏民難揺動捐之議是上從之捐之賈誼曾孫也三年春詔曰珠厓虜殺吏民背畔為逆背蒲妹翻今廷議者或言可擊或言可守或欲棄之其指各殊朕日夜惟思議者之言羞威不行則欲誅之狐疑辟難則守屯田師古曰辟讀曰避下同欲屯田與之相守以待其敝通乎時變則憂萬民夫萬民之饑餓與逺蠻之不討危孰大焉且宗廟之祭凶年不僃王制冢宰制國用視年之豐耗祭用數之仂鄭氏曰筭今年一嵗經用之數用其什一夫以凶年之入制經用之什一以供祭則宗廟之禮宜有不僃者矣况乎辟不嫌之辱哉嫌當讀作慊慊之為言厭也意自足也今闗東大困倉庫空虛無以相贍又以動兵非特勞民凶年隨之其罷珠厓郡民有慕義欲内屬便處之師古曰欲有來入内郡者所至之處即安置之余謂便處者各隨其所便而處之也處昌呂翻不欲勿彊彊其兩翻夏四月乙未晦茂陵白鶴舘災赦天下夏旱立長沙煬王弟宗為王長沙煬王旦定王發之玄孫初元元年薨無後今立其弟紹封鄭氏曰煬音供養之養謚法好内逺禮曰煬去禮逺衆曰煬長信少府貢禹上言諸離宫及長樂宫衛可減其大半以寛繇役繇讀曰徭六月詔曰朕惟烝庶之饑寒烝衆也逺離父母妻子離力智翻勞於非業之作師古曰不急之事故云非業也衛於不居之宫恐非所以佐隂陽之道也其罷甘泉建章宫衛令就農百官各省費師古曰費用之物務減損條奏毋有所諱是嵗上復擢周堪為光禄勲復扶又翻堪弟子張猛為光禄大夫給事中大見信任猛張騫孫也四年春正月上行幸甘泉郊泰畤畤音止下同三月行幸河東祠后土赦汾隂徒徒有罪居作者五年春正月以周子南君為周承休侯文穎曰姓姬名延其祖父姫嘉本周後武帝元鼎四年封為周子南君奉周祀師古曰承休侯國在潁川郡上行幸雍雍於用翻祠五畤畤音止夏四月有星孛于參孛蒲内翻天文志參為白虎三星直者是為衡石下有三星鋭曰罰為斬艾事其外四星左右肩股也參所今翻上用諸儒貢禹等之言詔太官毋日殺師古曰不得日日宰殺所具各減半師古曰食具也乘輿秣馬無乏正事而已師古曰秣養馬以粟秣食之也正事謂駕供祭祀蒐狩之事非游田者也乘繩證翻秣音末罷角抵上林宫館希御幸者角抵見二十一卷武帝元封三年齊三服官北假田官李斐曰主假賃見官田與民收其假税也故置田農之官晉灼曰匈奴傳秦始皇渡河據陽山北假中王莽傳五原北假膏壤殖穀北假地名師古曰晉説是也酈道元曰自髙闕以束夾山帶河陽山以西皆北假也鹽鐵官常平倉武帝置鹽鐵官宣帝置常平倉博士弟子毋置員以廣學者武帝為博士官置弟子五十人昭帝増弟子員滿百人宣帝末増倍之今不限員數以廣學者後數年以用度不足更為設員千人令民有能通一經者皆復復方目翻省刑罰七十餘事陳萬年卒六月辛酉長信少府貢禹為御史大夫禹前後言得失書數十上上時掌翻上嘉其質直多采用之匈奴郅支單于自以道逺又怨漢擁䕶呼韓邪而不助已困辱漢使者江乃始等遣使奉獻因求侍子郅支遣子入侍見上卷宣帝甘露元年漢議遣衛司馬谷吉送之谷姓也御史大夫貢禹博士東海匡衡以為郅支單于郷化未醇師古曰不雜曰醇醇壹也厚也郷讀曰嚮下同所在絶逺宜令使者送其子至塞而還還從宣翻又如字吉上書言中國與夷狄有羈縻不絶之義今既養全其子十年德澤甚厚空絶而不送近從塞還示棄捐不畜畜許六翻使無郷從之心師古曰郷從謂嚮化而從命也棄前恩立後怨不便議者見前江乃始無應敵之數智勇俱困以致恥辱即豫為臣憂臣幸得建彊漢之節承眀聖之詔宣諭厚恩不宜敢桀師古曰言郅支畏威當不敢桀猾也若懐禽獸心加無道於臣則單于長嬰大罪師古曰嬰猶帶也必逃遁逺舎師古曰舎止也不敢近邊近其靳翻没一使以安百姓國之計臣之願也願送至庭郅支單于庭也上許焉既至郅支單于怒竟殺吉等考異曰陳湯傳初元四年郅支求侍子元帝紀五年谷吉使匈奴不還湯傳又云御史大夫貢禹議吉不可遣按禹今年六月始為御史大夫或者郅支以四年求侍子而吉以五年使匈奴也自知負漢又聞呼韓邪益彊恐見襲擊欲逺去㑹康居王數為烏孫所困數所角翻下同與諸翕侯計以為匈奴大國烏孫素服屬之今郅支單于困阨在外可迎置東邊使合兵取烏孫而立之師古曰言與郅支并力共滅烏孫以其地立郅支令居之也長無匈奴憂矣即使使至堅昆通語郅支宣帝黄龍元年郅支都堅昆郅支素恐又怨烏孫怨烏孫事亦見上卷黄龍元年聞康居計大説説讀曰悦遂與相結引兵而西郅支人衆中寒道死餘財三千人師古曰中寒傷於寒也道死死於道上也中竹仲翻財與纔同到康居康居王以女妻郅支郅支亦以女予康居王妻七細翻予讀曰與康居甚尊敬郅支欲倚其威以脅諸國郅支數借兵擊烏孫深入至赤谷城殺略民人敺畜産去師古曰敺與驅同烏孫不敢追西邊空虚不居者五千里西域傳烏孫國治赤谷城西至康居蕃地五千里若云空虚者五千里則自赤谷以西皆不居矣此已扺其國都不得云西邊也陳湯傳作且千里當從之冬十二月丁未貢禹卒丁巳長信少府薛廣德為御史大夫永光元年春正月上行幸甘泉郊泰畤禮畢因留射獵薛廣德上書曰竊見闗東困極人民流離陛下日撞亡秦之鍾師古曰撞音丈江翻聽鄭衛之樂臣誠悼之今士卒暴露從官勞倦應劭曰從官謂宦者及虎賁羽林太醫太官是也師古曰從官親近天子常侍從者皆是也從才用翻下同願陛下亟反宫思與百姓同憂樂樂音洛天下幸甚上即日還還從宣翻又如字二月詔丞相御史舉質樸敦厚遜讓有行者行下孟翻光禄嵗以此科第郎從官師古曰始令丞相御史舉此四科人而擢用之而見在郎及從官又令光禄每嵗依此科考校定其第髙下用知其人賢否也三月赦天下雨雪隕霜殺桑雨于具翻秋上酎祭宗廟出便門師古曰便門長安城南面西頭第一門酎直又翻欲御樓舡薛廣德當乘輿車免冠􅉐首曰宜從橋詔曰大夫冠乘繩證翻説文冠絭也所以絭髪弁冕之總名也廣德曰陛下不聽臣臣自刎刎扶粉翻以血汙車輪陛下不得入廟矣師古曰言不以理終不得立廟也一曰以見死傷犯於齋潔不得入廟祠也原父曰一説是也時上欲入廟汙烏故翻上不説先敺光禄大夫張猛進曰師古曰先驅導乘輿也説説曰悦􅇌讀曰驅臣聞主聖臣直乘舡危就橋安聖主不乘危御史大夫言可聽上曰曉人不當如是邪師古曰謂諫諍之言當如猛之詳善也乃從橋九月隕霜殺稼天下大饑丞相于定國大司馬車騎将軍史髙御史大夫薛廣德俱以災異乞骸骨賜安車駟馬黄金六十斤罷太子太傅韋𤣥成為御史大夫考異曰百官表七月癸未大司馬髙免辛亥韋𤣥成為御史大夫十一月戊寅丞相定國免荀紀七月己未髙免薛廣德𫝊酎祭後月餘以嵗惡民流乞骸骨罷廣徳為御史大夫凡十月免月日參差未知孰是故皆没不書廣德歸縣其安車以傳示子孫為榮師古曰縣其所賜安車以示榮幸也致仕縣車盖亦古法韋孟詩縣車之義以洎小臣是也貢父曰致仕縣車言休息不出也故韋孟及薛廣德自縣其安車也縣讀曰懸帝之為太子也從太中大夫孔霸受尚書及即位賜霸爵闗内侯號褒成君如淳曰為帝師教令成就故曰褒成君給事中上欲致霸相位霸為人謙退不好權埶好呼到翻常稱爵位泰過何德以堪之御史大夫屢缺上輒欲用霸霸讓位自陳至于再三上深知其至誠乃弗用以是敬之賞賜甚厚戊子侍中衛尉王接為大司馬車騎将軍接平昌侯王無故之子石顯憚周堪張猛等數譛毀之數所角翻劉更生懼其傾危上書曰臣聞舜命九官師古曰尚書禹作司空棄后稷契司徒皐陶作士垂共工益朕虞伯夷秩宗䕫典樂龍納言凡九官也濟濟相讓和之至也濟子禮翻衆臣和於朝則萬物和於野故簫韶九成鳳皇來儀師古曰韶舜樂名舉簫管之屬示其僃也於韶樂九奏則鳯皇見其容儀言感至和也至周幽厲之際師古曰厲王夷王之子厲王生宣王宣王生幽王朝廷不和轉相非怨則日月薄食水泉沸騰山谷易處師古曰薄迫也謂被掩迫也沸涌出也騰乘也言百川沸涌而相乘陵山頂隆髙而盡崩壞陵谷易處霜降失節謂正月繁霜也正月夏之四月正陽之月也由此觀之和氣致祥乖氣致異祥多者其國安異衆者其國危天地之常經古今之通義也今陛下開三代之業招文學之士優游寛容使得並進今賢不肖渾殽師古曰言雜亂也渾音胡本翻白黑不分邪正雜糅師古曰糅和也音汝救翻忠讒並進章交公車人滿北軍如淳曰漢儀注中壘校尉主北軍壘門内尉一人主上書者獄上章於公車冇不如法者以付北軍尉北軍尉以法治之楊惲上書遂幽北闕北闕公車所在朝臣舛午膠戾乖剌師古曰言志意不和各相違背午音五故翻剌音來曷翻更相讒愬轉相是非更工衡翻所以營惑耳目感移心意不可勝載師古曰言其誣罔天子也營謂回繞之勝音升下同分曹為黨師古曰曹輩也往往羣朋将同心以䧟正臣正臣進者治之表也正臣䧟者亂之機也乘治亂之機未知孰任而災異數見治直吏翻數所角翻見賢遍翻此臣所以寒心者也初元以來六年矣按春秋六年之中災異未有稠如今者也師古曰稠多也音直流翻原其所以然者由讒邪並進也讒邪之所以並進者由上多疑心既已用賢人而行善政如或譛之則賢人退而善政還矣師古曰還謂收還也夫執狐疑之心者來讒賊之口持不斷之意者開羣枉之門斷丁亂翻讒邪進則衆賢退羣枉盛則正士消故易有否泰師古曰否音皮鄙翻小人道長君子道消則政日亂君子道長小人道消則政日治長知兩翻治直吏翻下同昔者鯀共工驩兠與舜禹雜處堯朝師古曰鯀崇伯之名即檮杌也共工少皥氏之後即窮竒也驩兠帝鴻氏之後即渾敦也鯀音工本翻共音恭驩音火官翻處昌吕翻周公與管蔡並居周位當是時迭進相毀師古曰迭互也音大結翻流言相謗豈可勝道哉勝音升帝堯成王能賢舜禹周公而消共工管蔡故以大治榮華至今孔子與季孟偕仕于魯師古曰季孟謂季孫孟孫皆桓公之後代執國權而卑公室余謂季孫孟孫季孟之通稱與孔子偕仕者季孫斯孟孫何忌也李斯與叔孫俱宦於秦師古曰叔孫者叔孫通也定公始皇賢季孟李斯而消孔子叔孫故以大亂汙辱至今故冶亂榮辱之端在所信任信任既賢在於堅固而不移詩云我心匪石不可轉也師古曰此􅆁柏舟之詩也言石性雖堅尚可移轉已志須確執德不傾過於石也言守善篤也易曰渙汗其大號師古曰此易渙卦九五爻辭也言王者渙然大發號令如汗之出也言號令如汗汗出而不反者也今出善令未能踰時而反師古曰踰時三月也是反汗也用賢未能三旬而退是轉石也論語曰見不善如探湯師古曰論語載孔子之言探湯言其除難無所避也探吐南翻今二府奏佞讇不當在位師古曰讇古謟字歴年而不去故出令則如反汗用賢則如轉石去佞則如抜山去羌吕翻如此望隂陽之調不亦難乎是以羣小窺見間隙間古莧翻縁飾文字巧言醜詆師古曰詆毀也辱也音丁禮翻流言飛文譁于民間放言於外以誣人曰流言孔穎逹曰流謂水流造作虛語使人𫝊之如水之流然故謂之流言為飛書以詆毀若今之匿名書曰飛文師古曰譁讙也音火𤓰翻故詩云憂心悄悄愠于羣小師古曰􅆁柏舟言仁人不遇之詩悄悄憂貌愠怒也悄音千小翻愠於問翻小人成羣誠足愠也昔孔子與顔淵子貢更相稱譽不為朋黨師古曰事具見論語更工衡翻譽音余禹稷與皐陶傳相汲引不為比周師古曰事見尚書傳柱戀翻逓也比頻寐翻何則忠於為國無邪心也今佞邪與賢臣並交㦸之内師古曰交㦸謂宿衛者合黨共謀違善依惡歙歙訿訿詩小旻歙歙訿訿毛氏注曰潝潝然患其上訿訿然思不稱於上爾雅云潝潝訿訿莫供職也韓詩云不善之貌歙與潝同許急翻訿音紫數設危險之言數所角翻欲以傾移主上如忽然用之此天地之所以先戒災異之所以重至者也師古曰重音直用翻自古眀聖未有無誅而治者也故舜有四放之罰師古曰謂舜流共工于幽州放驩兠于崇山竄三苖于三危殛鯀于羽山孔子有兩觀之誅應劭曰少正卯姦人之雄故孔子為司㓂七日誅之於兩觀之下師古曰兩觀謂闕也觀古玩翻然後聖化可得而行也今以陛下眀知知讀曰智誠深思天地之心覽否泰之卦歴周唐之所進以為法原秦魯之所消以為戒師古曰歴謂歴觀之原謂思其本也周成王唐唐堯考祥應之福災異之禍以揆當世之變放逺佞邪之黨壊散險詖之聚逺于願翻壊音怪師古曰揆度也險言曰詖詖彼義翻杜閉羣枉之門廣開衆正之路決斷狐疑分别猶豫斷丁亂翻别彼列翻使是非炳然可知則百異消滅而衆祥並至太平之基萬世之利也顯見其書愈與許史比而怨更生等比毗至翻下同是嵗夏寒日青無光顯及許史皆言堪猛用事之咎上内重堪又患衆口之浸潤鄭氏曰譛人之言如水之浸潤漸以成之孔子曰浸潤之譛不行焉可謂眀也已矣無所取信時長安令楊興以材能幸常稱譽堪譽音余下同上欲以為助乃見問興朝臣斷斷不可光禄勲何邪師古曰斷斷忿疾之意也斷音牛斤翻興者傾巧士謂上疑堪因順指曰堪非獨不可于朝廷自州里亦不可也周禮五黨為州五家為鄰五鄰為里漢人謂同州郷而居者為州里臣見衆人聞堪與劉更生等謀毀骨肉以為當誅故臣前書言堪不可誅傷為國養恩也為于偽翻下同上曰然此何罪而誅今宜奈何興曰臣愚以為可賜爵闗内侯食邑三百户勿令典事眀主不失師傅之恩此最䇿之得者也上於是疑之司𨽻校尉琅邪諸葛豐姓譜葛氏先本琅邪諸縣人徙陽都時人本其先之所居謂之諸葛氏風俗通云葛嬰為陳渉将冇功而誅孝文録其後封諸縣侯因并氏焉始以剛直特立著名於朝數侵犯貴戚數所角翻下同在位者多言其短後坐春夏繫治人春夏生長之時故仲春省囹圉去桎梏毋肆掠止獄訟仲夏挺重囚益其食春夏而繫治人為不順天時徙城門校尉豐於是上書告堪猛罪上不直豐乃制詔御史城門校尉豐前與光禄勲堪光禄大夫猛在朝之時數稱言堪猛之美豐前為司𨽻校尉不順四時修法度専作苛暴以獲恩威朕不忍下吏下遐稼翻以為城門校尉百官表城門校尉掌京師十二城門屯兵不内省諸已省悉景翻而反怨堪猛以求報舉師古曰言舉其事以報怨告按無證之辭暴揚難驗之罪毀譽恣意不顧前言師古曰前言謂譽堪猛之美今乃吏言其短是不顧也譽音余下同不信之大也朕憐豐之耆老不忍加刑其免為庶人又曰豐言堪猛貞信不立朕閔而不治又惜其材能未有所効其左遷堪為河東太守猛槐里令槐里周之大丘秦曰廢丘高帝二年改為槐里屬右扶風臣光曰諸葛豐之於堪猛前譽而後毀其志非為朝廷進善而去姦也去羌吕翻欲比周求進而已矣斯亦鄭朋楊興之流烏在其為剛直哉人君者察美惡辯是非賞以勸善罰以懲姦所以為治也治直吏翻使豐言得實則豐不當黜若其誣罔則堪猛何辜焉今兩責而俱棄之則美惡是非果安在哉賈捐之與楊興善捐之數短石顯師古曰談説其長短余謂此言數陳其短耳數所角翻以故不得官稀復進見復扶又翻下同見賢遍翻興新以材能得幸捐之謂興曰京兆尹缺按百官表初元四年京兆尹成永光四年光禄大夫琅邪張譚為京兆尹四年不騰任免盖是時成已去而譚未除是以缺官也使我得見言君蘭張晏曰楊興字君蘭漢考異曰荀紀作君簡今從書京兆尹可立得興曰君房下筆言語妙天下賈捐之字君房師古曰於天下最為精妙耳使君房為尚書令勝五鹿充宗逺甚續漢志曰尚書令承秦所置武帝用宦者更為中書謁者令是時石顯為中書令五鹿充宗為尚書令疑兩官並置也百官表成帝建始元年尚書令五鹿充宗為少府五年貶為𤣥菟太守逆而數之則知充宗是年猶為尚書令也姓譜趙大夫食采于五鹿以邑為氏捐之曰令我得代充宗君蘭為京兆京兆郡國首尚書百官本天下真大冶士則不隔矣治直吏翻捐之復短石顯興曰顯方貴上信用之今欲進第從我計師古曰第但也且與合意即得入矣捐之即與興共為薦顯奏稱譽其美譽音余下同以為宜賜爵闗内侯引其兄弟以為諸曹又共為薦興奏以為可試守京兆尹石顯聞知白之上乃下興捐之獄下遐稼翻令顯治之奏興捐之懐詐偽更相薦譽更工衡翻欲得大位罔上不道捐之竟坐棄市興髠鉗為城旦臣光曰君子以正攻邪猶懼不克况捐之以邪攻邪其能免乎徙清河王竟為中山王匈奴呼韓邪單于民衆益盛塞下禽獸盡單于足以自衛不畏郅支其大臣多勸單于北歸者師古曰塞下無禽獸則射獵無所得又不畏郅支故欲北歸舊處久之單于竟北歸庭民衆稍稍歸之其國遂定二年春二月赦天下丁酉御史大夫韋𤣥成為丞相右扶風鄭𢎞為御史大夫三月壬戌朔日有食之夏六月赦天下上問給事中匡衡以地震日食之變匡衡時以博士給事中風俗通云匡魯邑句須為之宰其後氏焉衡上疏曰陛下躬聖德開太平之路閔愚吏民觸法抵禁比年大赦使百姓得改行自新比毗至翻行下孟翻天下幸甚臣竊見大赦之後姦邪不為衰止為于偽翻今日大赦眀日犯法相隨入獄此殆導之未得其務也今天下俗貪財賤義好聲色上侈靡親戚之恩薄婚姻之黨隆茍合徼幸好呼到翻下同徼工堯翻以身設利不改其原師古曰設施也原本也雖嵗赦之刑猶難使錯而不用也師古曰嵗赦謂每嵗一赦也錯置也錯音千故翻臣愚以為宜壹曠然大變其俗夫朝廷者天下之楨幹也楨幹版築之具題曰楨旁曰幹以築垣墻喻治天下也楨音貞朝有變色之言則下有争鬭之患上有自専之士則下有不讓之人上有克勝之佐則下有傷害之心上有好利之臣則下有盗竊之民此其本也師古曰言下之所行皆取化於上也治天下者審所上而已師古曰上謂崇尚也治直之翻教化之流非家至而人説之也師古曰非家家皆到人人勸説之也賢者在位能者布職朝廷崇禮百僚敬讓道德之行由内及外自近者始然後民知所法遷善日進而不自知也詩曰商邑翼翼四方之極師古曰商頌殷武之詩也商邑京師也極中也言商邑之禮俗翼翼然可則倣是乃四方之中正也今長安天子之都親承聖化然其習俗無以異於逺方郡國來者無所法則或見侈靡而放效之師古曰放依也音甫往翻此教化之原本風俗之樞機宜先正者也臣聞天人之際精祲有以相盪李竒曰祲氣也言天人精氣相動也師古曰祲謂隂陽之氣相浸漸以成炎祥者也音子鴆翻善惡有以相推事作乎下者象動乎上隂變則静者動陽蔽則眀者晻鄧展曰静者動謂地震也明者晻謂日食也師古曰晻與暗同水旱之災隨類而至陛下祗畏天戒哀閔元元宜省靡麗考制度近忠正逺巧佞近其靳翻逺于願翻以崇至仁匡失俗道德𢎞于京師淑問揚乎疆外師古曰淑善也問名也然後大化可成禮讓可興也上説其言説讀曰悦遷衡為光禄大夫荀悦論曰夫赦者權時之宜非常典也漢興承秦兵革之後大愚之世比屋可刑比毗至翻又毗必翻故設三章之法大赦之令約法三章事見九卷髙帝元年赦自古有之至於大赦則始于秦髙祖既并天下即皇帝位大赦天下後世因之為永制蕩滌穢流與民更始更工衡翻時埶然也後世承業襲而不革失時宜矣若惠文之世無所赦之若孝景之時七國皆亂異心並起姦詐非一及武帝末年賦役繁興羣盜並起加以太子之事巫蠱之禍天下紛然百姓無聊及光武之際撥亂之後如此之比宜為赦矣秋七月隴西羌彡姐旁種反師古曰彡音所㢘翻又音先㢘翻姐音紫今西羗尚有此姓而彡音先冉翻詔召丞相韋𤣥成等入議是時嵗比不登比毗至翻朝廷方以為憂而遭羌變𤣥成等漠然莫有對者師古曰漠無聲也音莫右将軍馮奉世曰羌虜近在竟内背畔竟古境字通用背蒲妹翻不以時誅無以威制逺蠻臣願帥師討之帥讀曰率上問用兵之數對曰臣聞善用兵者役不再興糧不三載故師不久暴而天誅亟決師古曰暴露也亟急也載子亥翻往者數不料敵師古曰料量也音聊而師至於折傷再三發調則曠日煩費威武虧矣折而設翻調徒弔翻今反虜無慮三萬人師古曰無慮舉凡之言無小思慮而大計也法當倍用六萬人然羌戎弓矛之兵耳噐不犀利如淳曰今俗以刀兵利為犀晉灼曰犀堅也師古曰晉説是可用四萬人一月足以決丞相御史兩将軍兩将軍車騎将軍王接左将軍許嘉也皆以為民方收斂時未可多發發萬人屯守之且足且足猶言且可也歛力贍翻奉世曰不可天下被饑饉被皮義翻士馬羸耗守戰之僃久廢不簡師古曰簡謂選揀夷狄皆有輕邊吏之心而羌首難師古曰言創首為寇難也難乃旦翻今以萬人分屯數處虜見兵少必不畏懼戰則挫兵病師守則百姓不救如此怯弱之形見見賢遍翻羌人乘利諸種並和種章勇翻師古曰和應也音胡卧翻相扇而起臣恐中國之役不得止于四萬非財幣之所能解也故少發師而曠日師古曰曠空也空費其日而無功也與一舉而疾決利害相萬也師古曰相比為萬倍也固争之不能得言奉世不能得請也有詔益二千人於是遣奉世将萬二千人騎以将屯為名師古曰且云領兵屯田不言討賊将即亮翻典屬國任立䕶軍都尉韓昌為偏裨到隴西分屯三處任立為右軍屯白石韓昌為前軍屯臨洮奉世為中軍屯首陽西極上任音壬昌先遣兩校尉與羌戰羌衆盛多皆為所破殺兩校尉校户教翻奉世具上地形部衆多少之計願益三萬六千人乃足以決事書奏天子大為發兵六萬餘人上時掌翻為于偽翻八月拜太常弋陽侯任千秋為奮武将軍以助之昭帝時宫以捕上官桀功封弋陽侯千秋其子也弋陽侯國屬汝南郡應劭曰弋山在西北冬十月兵畢至隴西十一月並進羌虜大破斬首數千級餘皆走出塞兵未決間漢復發募士萬人復扶又翻拜定襄太守韓安國為建威将軍師古曰自别有此韓安國非武帝時人也未進聞羌破而還詔罷吏士吏軍吏士卒也頗留屯田僃要害處師古曰要害者在我為要于敵為害也資治通鑑卷二十八
