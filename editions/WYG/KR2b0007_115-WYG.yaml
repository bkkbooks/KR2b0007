front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百十五宋司馬光撰胡三省音注晉紀三十七起屠維作噩盡上章閹茂凡二年安皇帝庚義熙五年春正月庚寅朔南燕主超朝會羣臣歎太樂不備三年超獻太樂伎于秦故歎其不備朝直遥翻議掠晉人以補伎伎渠綺翻領軍將軍韓􅒲曰丁度曰􅒲竹角翻先帝以舊京傾覆戢翼三齊中山陷慕容徳棄鄴保滑臺既而復失滑臺乃東取齊地而據之事並見前戢疾立翻陛下不養士息民以伺魏釁恢復先業而更侵掠南鄰以廣讐敵可乎超曰我計已定不與卿言史言慕容超愎諌致冦而亡伺相吏翻辛卯大赦庚戌以劉毅為衛將軍開府儀同三司毅愛才好士好呼到翻當世名流莫不輻凑獨揚州主簿吳郡張邵不往或問之邵曰主公命世人傑何煩多問劉裕領揚州故稱之為主公秦王興遣其弟平北將軍冲征虜將軍狄伯支等帥騎四萬帥讀曰率騎竒寄翻擊夏王勃勃冲至嶺北謀還襲長安伯支不從而止因酖殺伯支以滅口秦王興遣使册拜譙縱為大都督相國蜀王加九錫承制封拜悉如王者之儀二月南燕將慕容興宗斛榖提公孫歸等帥騎寇宿豫拔之宿豫城在淮北帝置宿豫郡及宿豫縣唐代宗諱豫改為宿遷縣屬徐州宋白曰宿豫城在下邳東南百八十里葢本宋人遷宿處也宋滅為邑漢為仇猶縣屬臨淮郡晉安帝立宿豫縣唐改宿遷縣將即亮翻大掠而去簡男女二千五百付太樂教之歸五樓之兄也是時五樓為侍中尚書領左衛將軍専總朝政朝直遥翻宗親並居顯要王公内外無不憚之南燕王超論宿豫之功封斛榖提等並為郡縣公桂林王鎮諫曰此數人者勤民頓兵頓讀曰鈍為國結怨為于偽翻何功而封超怒不答尚書都令史王儼謟事五樓漢尚書有令史十八人後増為二十一人其後貟數愈増置都令史以總之比嵗屢遷官至左丞比毗至翻禮記比年入學注每嵗也漢書比年頻年也國人為之語曰欲得侯事五樓超又遣公孫歸等冦濟南俘男女千餘人而去此濟南郡亦是僑置於淮北濟子禮翻自彭城以南民皆堡聚以自固詔并州刺史劉道憐鎮淮隂以備之乞伏熾磐入見秦太原公懿於上邽熾昌志翻彭奚念乗虚伐之熾磐聞之怒不告懿而歸擊奚念破之遂圍枹罕乞伏乾歸從秦王興如平凉熾磐克枹罕彭奚念據枹罕枹音膚遣人告乾歸乾歸逃還苑川乾歸為秦所留見上卷三年馮翊人劉厥聚衆數千據萬年作亂秦王興在平涼故厥乘間作亂秦太子泓遣鎮軍將軍彭白狼帥東宫禁兵討之斬厥赦其餘黨諸將請露布表言廣其首級帥讀曰率將即亮翻泓不許曰主上委吾後事不能式遏寇逆當責躬請罪尚敢矜誕自為功乎姚泓優游文義自儒者觀之似得子道然非撥亂才也秦王興自平涼如朝那聞姚沖之謀謂欲還襲長安也賜沖死三月劉裕抗表伐南燕朝議皆以為不可朝直遥翻惟左僕射孟昶車騎司馬謝裕㕘軍臧熹以為必克勸裕行裕以昶監中軍留府事監中軍將軍留府事也昶丑兩翻監古銜翻謝裕安之兄孫也初苻氏之敗也王猛之孫鎮惡来奔以為臨澧令武帝太康四年立臨澧縣屬天門郡隋唐併入澧州澧陽縣澧音禮鎮惡騎乘非長闗弓甚弱闗讀曰彎而有謀略善果斷喜論軍國大事或薦鎮惡於劉裕裕與語說之斷丁亂翻喜許記翻説讀曰悦因留宿明旦謂參佐曰吾聞將門有將將即亮翻鎮惡信然即以為中軍參軍恒山崩恒戶豋翻夏四月乞伏乾歸如枹罕留世子熾磐鎮之收其衆得二萬徙都度堅山度堅山乞伏之先司繁所居也雷震魏天安殿東序魏主珪惡之命左校以衝車攻東西序皆毁之初珪服寒食散晉人多服寒食散今千金方中有數方蘇軾曰世有食鍾乳烏喙而縦酒色以求長年者蓋始於何晏晏少而富貴故服寒食散以濟其欲凡服之者疽背嘔血相踵也久之藥發性多躁擾忿怒無常至是寖劇躁則到翻又災異數見見賢遍翻占者多言當有急變生肘腋腋音亦珪憂懣不安懣音悶又音滿或數日不食或達旦不寐追計平生成敗得失獨語不止疑羣臣左右皆不可信每百官奏事至前追計其舊惡輒殺之其餘或顔色變動或鼻息不調氣一出一入謂之息或步趨失節或言語差繆皆以為懷惡在心發形於外往往手擊殺之史言魏主珪死期將至死者皆陳天安殿前朝廷人不自保百官茍免莫相督攝盜賊公行里巷之間人為希少為于偽翻少詩沼翻珪亦知之曰朕故縱之使然待過災年更當清治之耳治直之翻是時羣臣畏罪多不敢求親近近其靳翻唯著作郎崔浩恭勤不懈或終日不歸浩吏部尚書宏之子也宏未嘗忤㫖亦不諂諛故宏父子獨不被譴懈居隘翻忤五故翻被皮義翻夏王勃勃率騎二萬攻秦騎竒寄翻掠取平涼雜胡七千餘户進屯依力川魏收地形志平涼城在漢安定鶉隂界唐為原州之地依力川又當在其東南己巳劉裕發建康帥舟師自淮入泗帥讀曰率五月至下邳留船艦輜重艦户黯翻重直用翻步進至琅邪所過皆築城留兵守之慮南燕以竒兵㫁其後也或謂裕曰燕人若塞大峴之險水經注沐水出琅琊東莞縣西北山東南流右合峴水水北出大峴山今有大峴闗魏收志齊郡盤陽縣有大峴山五代志臨胊縣有大峴山杜佑曰大峴在沂州沂水縣北塞悉則翻峴户典翻或堅壁清野大軍深入不唯無功將不能自歸奈何裕曰吾慮之熟矣鮮卑貪婪婪盧含翻不知逺計進利虜獲退惜禾苖謂我孤軍逺入不能持久不過進據臨朐魏收志曰臨朐即漢之朐縣也屬東海郡晉曰臨胊屬東莞郡宋白曰因臨胊山而名朐音劬退守廣固必不能守險清野敢為諸君保之為于偽翻南燕主超聞有晉師引羣臣會議征虜將軍公孫五樓曰吳兵輕果利在速戰不可爭鋒宜據大峴使不得入曠日延時沮其銳氣沮在吕翻然後徐簡精騎二千循海而南絶其糧道别敕段暉帥兖州之衆緣山東下南然兖州治梁父縁梁父之山而東下也騎竒寄翻帥讀曰率腹背擊之此上策也各命守宰依險自固校其資儲之外餘悉焚蕩芟除禾苖芟所銜翻下同使敵無所資彼僑軍無食僑渠嬌翻求戰不得旬月之間可以坐制此中策也縱賊入峴出城逆戰此下策也超曰今嵗星居齊以天道推之不戰自克客主埶殊以人事言之彼逺来疲弊埶不能乆吾據五州之地南燕以并州牧鎮隂平幽州刺史鎮𤼵干徐州刺史鎮莒城兖州刺史鎮梁父青州刺史鎮東萊所謂五州也擁富庶之民鐡騎萬羣麥禾布野奈何芟苖徙民先自蹙弱乎不如縱使入峴以精騎蹂之何憂不克蹂人九翻輔國將軍廣寜王賀賴盧苦諫不従退謂五樓曰必若此亡無日矣太尉桂林王鎮曰陛下必以騎兵利平地者宜出峴逆戰戰而不勝猶可退守不宜縱敵入峴自棄險固也超不從鎮出謂韓􅒲曰丁度曰􅒲竹角翻主上既不能逆戰却敵又不肻徙民清野延敵入腹坐待攻圍酷似劉璋矣劉璋事見六十七卷漢獻帝建安十八年今年國滅吾必死之卿中華之士復為文身矣古者東南之民斷髮文身故鎮云然超聞之大怒收鎮下獄下户稼翻乃攝莒梁父二戍父音甫修城隍簡士馬以待之劉裕過大峴燕兵不出裕舉手指天喜形於色左右曰公未見敵而先喜何也裕曰兵已過險士有必死之志謂已得過大峴之險餘糧棲畝人無匱乏之憂謂燕人不芟除禾苖虜已入吾掌中矣六月己巳裕至東莞莞音官超先遣公孫五樓賀賴盧及左將軍段暉等將步騎五萬屯臨朐朐音劬聞晉兵入峴自將步騎四萬往就之使五樓帥騎進據巨蔑水巨蔑水國語謂之具水袁宏謂之巨昧水水經謂之巨洋水水出朱虚縣太山北過其縣西又北過臨朐縣東上下沿水悉是劉裕伐廣固營壘所在前鋒孟龍符與戰破之五樓退走裕以車四千乘為左右翼乘繩證翻方軌徐進與燕兵戰於臨朐南日向昃日過中為向昃也勝負猶未決参軍胡藩言於裕曰燕悉兵出戰臨朐城中留守必寡願以竒兵從間道取其城此韓信所以破趙也間古莧翻韓信事見九卷漢髙帝三年裕遣藩及諮議參軍檀韶建威將軍河内向彌潜師出燕兵之後攻臨朐聲言輕兵自海道至矣向彌擐甲先登遂克之向式亮翻擐音宦超大驚單騎就段暉於城南超自臨胊城中出城南就暉裕因縱兵奮擊燕衆大敗斬段暉等大將十餘人超遁還廣固獲其玉璽輦及豹尾服䖍曰大駕屬車八十一乘作三行尚書御史乘之最後一乘懸豹尾豹尾以前皆為省中晉志法駕屬車三十六乘最後車懸豹尾璽斯氏翻裕乘勝逐北至廣固丙子克其大城超收衆入保小城裕築長圍守之圍髙三丈穿塹三重髙古號翻重直龍翻塹七艶翻撫納降附采拔賢俊華夷大悦于是因齊地糧儲悉停江淮漕運超遣尚書郎張綱乞師於秦赦桂林王鎮以為録尚書都督中外諸軍事引見謝之且問計焉鎮曰百姓之心係於一人今陛下親董六師奔敗而還還從宣翻又如字羣臣離心士民喪氣聞秦人自有内患謂秦内有赫連之患也喪息浪翻恐不暇分兵救人散卒還者尚有數萬宜悉出金帛以餌之更決一戰若天命助我必能破敵如其不然死亦為美比於閉門待盡不猶愈乎司徒樂浪王恵曰不然樂浪音洛琅晉兵乘勝氣埶百倍我以敗軍之卒當之不亦難乎秦雖與勃勃相持不足為患且與我分據中原埶如脣齒安得不来相救但不遣大臣則不能得重兵尚書令韓範為燕秦所重事見上卷二年宜遣乞師超從之秋七月加劉裕北青冀二州刺史晉氏南渡立南青冀二州於淮南北青冀二州於齊地南燕尚書畧陽垣尊及弟京兆太守苖踰城來降裕以為行參軍垣氏子孫後遂為南國邊將著功名尊苖皆超所委任以為腹心者也或謂裕曰張綱有巧思思相吏翻若得綱使為攻具廣固必可㧞也會綱自長安還太山太守申宣執之送於裕裕升綱於樓車杜預曰樓車車上望櫓使周城呼曰呼火故翻劉勃勃大破秦軍無兵相救城中莫不失色江南每發兵及遣使者至廣固裕輒潜遣兵夜迎之明日張旗鳴鼓而至董卓之入洛計亦出此北方之民執兵負糧歸裕者日以千數圍城益急張華封愷皆為裕所獲超請割大峴以南地為藩臣裕不許秦王興遣使謂裕曰慕容氏相與鄰好好呼到翻今晉攻之急秦已遣鐡騎十萬屯洛陽晉軍不還當長驅而進裕呼秦使者謂曰語汝姚興使疏吏翻下同語牛倨翻下相語同我克燕之後息兵三年當取關洛今能自送便可速来劉穆之聞有秦使馳入見裕而秦使者已去裕以所言告穆之穆之尤之尤怪也過也曰常日事無大小必賜預謀此宜善詳善謂善為之辭詳謂審諦也云何遽爾答之此語不足以威敵適足以怒之若廣固未下羌寇奄至不審何以待之裕笑曰此是兵機非卿所解解尸買翻曉也故不相語耳語牛倨翻夫兵貴神速彼若審能赴救必畏我知寧容先遣信命逆設此言是自張大之辭也晉師不出為日久矣羌見伐齊殆將内懼自保不暇何能救人邪乞伏乾歸復即秦王位復扶又翻大赦改元更始更工衡翻公卿以下皆復本位乾歸降公卿將帥為僚佐偏裨見一百十二卷隆安五年慕容氏在魏者百餘家謀逃去魏主珪盡殺之初魏太尉穆崇與衛王儀伏甲謀弑魏主珪不果珪惜崇儀之功袐而不問及珪有疾殺大臣儀自疑而出亡追獲之八月賜儀死封融詣劉裕降封融奔魏見上卷二年魏殺慕容氏故融歸裕降戶江翻九月加劉裕太尉裕固辭秦王興自將擊夏王勃勃至貳城貳城貳縣城也在杏城西北平􅈵東南遣安逺將軍姚詳等分督租運勃勃乘虚奄至興懼欲輕騎就詳等騎竒寄翻右僕射韋華曰若鑾輿一動衆心駭懼必不戰自潰詳營亦未必可至也興與勃勃戰秦兵大敗將軍姚榆生為勃勃所禽左將軍姚文崇等力戰勃勃乃退興還長安勃勃復攻秦敕竒堡黄石固魏收地形志原州長城郡有黄石縣五代志西魏改黄石為長城隋開皇初廢郡為縣大業初改長城縣為百泉縣復扶又翻我羅城皆抜之徙七千餘家於大城以其丞相右地代領幽州牧以鎮之初興遣衛將軍姚强帥步騎一萬隨韓範徃就姚紹於洛陽并兵以救南燕帥讀曰率騎竒寄翻及為勃勃所敗敗補邁翻追强兵還長安韓範歎曰天滅燕矣南燕尚書張俊自長安還降於劉裕降戶江翻因説裕曰説輸芮翻燕人所恃者謂韓範必能致秦師也今得範以示之燕必降矣裕乃表範為散騎常侍散悉亶翻騎竒寄翻且以書招之長水校尉王蒲勸範犇秦範曰劉裕起布衣滅桓𤣥復晉室今興師伐燕所向崩潰此殆天授非人力也燕亡則秦為之次矣吾不可以再辱遂降於裕漢李陵降匈奴霍光上官桀使其故人任立政招之使歸陵曰大丈夫不能再辱裕將範循城城中人情離沮將如字引也沮在吕翻或勸燕主超誅範家超以範弟􅒲盡忠無貳并範家赦之冬十月段宏自魏奔于裕宏奔魏見上卷三年張綱為裕造攻具盡諸竒巧超怒縣其母於城上支解之為于偽翻縣讀曰懸西秦王乾歸立夫人邊氏為皇后世子熾磐為太子仍命熾磐都督中外諸軍錄尚書事熾昌志翻以屋引破光為河州刺史鎮枹罕枹音膚以南安焦遺為太子太師與參軍國大謀乾歸曰焦生非特名儒乃王佐之才也謂熾磐曰汝事之當如事吾熾磐拜遺於床下遺子華至孝乾歸欲以女妻之妻七細翻辭曰凡娶妻者欲與之共事二親也今以王姬之貴周姬姓也故王女謂之王姬後世因而稱之凡王者之女皆謂之王姬下嫁蓬茅之士誠非其匹臣懼其闕於中饋易家人之六二曰在中饋言以隂應陽居中得正盡婦人之義職乎中饋巽順而已饋食也非所願也乾歸曰卿之所行古人之事孤女不足以强卿乃以為尚書民部郎魏尚書郎有民曹晉初分置左民右民江左以後省右民郎有左民郎民部郎至是始見于通鑑强其兩翻北燕王雲自以無功徳而居大位内懐危懼常畜養壯士以為腹心爪牙畜吁玉翻寵臣離班桃仁専典禁衛離桃皆姓也班仁其名賞賜以巨萬計衣食起居皆與之同而班仁志願無厭厭於鹽翻猶有怨憾戊辰雲臨東堂班仁懐劒執帋而入帋與紙同通俗書也稱有所啟班抽劒擊雲雲以几扞之仁從旁擊雲弑之髙雲以勇力發身叨居君位自謂非壯士以為翼衛不足以防其身豈知小人之難養也是以古之綴衣虎賁左右擕僕必用吉士其慮患誠深逺也雲得燕見上卷三年馮跋升洪光門以觀變帳下督張泰李桑言於跋曰此豎埶何所至請為公斬之為于偽翻乃奮劒而下桑斬班于西門泰殺仁于庭中衆推跋為主跋以讓其弟范陽公素弗素弗不可跋乃即天王位於昌黎載記馮跋字文起長樂信都人其先畢萬之後也萬之子孫有食采馮鄉者因氏焉大赦詔曰陳氏代姜不改齊國周師尚父始封于齊姜姓也戰國時齊太公田和陳敬仲之後也簒姜氏之後而取其國仍號曰齊宜即國號曰燕改元太平諡雲曰恵懿皇帝跋尊母張氏為太后立妻孫氏為王后子永為太子以范陽公素弗為車騎大將軍録尚書事孫護為尚書令張興為左僕射汲郡公𢎞為右僕射廣川公萬泥為幽平二州牧上谷公乳陳為并青二州牧素弗少豪俠放蕩少詩沼翻俠户頰翻蕩徒浪翻嘗請婚於尚書左丞韓業業拒之及為宰輔待業尤厚好申拔舊門好呼到翻謙恭儉約以身帥下帥讀曰率百僚憚之論者美其有宰相之度温公作通鑑雖相小國者茍有片善必因舊史而表章之以言為輔之難魏主珪將立齊王嗣為太子魏故事凡立嗣子輒先殺其母乃賜嗣母劉貴人死珪召嗣諭之曰漢武帝殺鉤弋夫人以防母后豫政外家為亂也事見二十二卷漢武帝後元元年汝當繼統吾故逺迹古人蜀本作故吾為國家長久之計耳嗣性孝哀泣不自勝珪怒之嗣還舍日夜號泣勝音升號戶髙翻珪知而復召之復扶又翻左右曰上怒甚入將不測不如且避之俟上怒解而入嗣乃逃匿於外帷帳下代人車路頭車焜氏拓跋氏之䟽屬也至後魏孝文改為車氏京兆王洛兒二人隨之初珪如賀蘭部見獻明賀太后之妹美珪父寔魏昭成帝什翼犍之嫡子也先昭成而薨追諡獻明皇帝賀太后從夫諡言於賀太后請納之賀太后曰不可是過美必有不善左傳晉叔向欲娶於申公巫臣氏其母止之曰甚美必有甚惡此語類之且已有夫不可奪也珪密令人殺其夫而納之生清河王紹紹兇狠無賴好輕遊里巷刼剥行人以為樂狠户墾翻好呼到翻樂音洛珪怒之嘗倒懸井中垂死乃出之齊王嗣屢誨責之紹由是與嗣不協戊辰珪譴責賀夫人譴去戰翻囚將殺之會日暮未決夫人密使告紹曰汝何以救我左右以珪殘忍人人危懼紹年十六夜與帳下及宦者宫人數人通謀踰垣入宫至天安殿左右呼曰賊至呼火故翻珪驚起求弓刀不獲遂弑之年三十九明元帝永興二年上諡曰宣武皇帝廟號烈祖泰常五年改諡道武己巳宫門至日中不開紹稱詔集百官於端門前宫門正南門曰端門北面立句斷紹從門扉間扉門扇也謂百官曰我有叔父亦有兄公卿欲從誰衆愕然失色莫有對者良久南平公長孫嵩曰從王長知兩翻衆乃知宫車晏駕而不測其故莫敢出聲唯隂平公烈大哭而去烈儀之弟也魏之克燕儀有功焉是年八月賜死於是朝野恟恟人懐異志朝直遥翻恟許拱翻肥如侯賀䕶舉烽於安陽城北安陽城即漢代郡之東安陽縣城也魏收地形志永熙中置髙栁郡治安陽賀蘭部人皆赴之其餘諸部亦各屯聚紹聞人情不安大出布帛賜王公以下崔宏獨不受史言崔宏有識齊王嗣聞變乃自外還晝伏匿山中夜宿王洛兒家洛兒鄰人李道潛奉給嗣民間頗知之喜而相告紹聞之收道斬之紹募人求訪嗣欲殺之獵郎叔孫俊拓跋氏起于代北俗尚獵故置獵郎以豪望子弟有材勇者為之亦漢期門郎羽林郎之類也魏書官氏志天賜元年置散騎郎獵郎諸省令史省事典籖等後魏孝文以獻帝叔父之後乙旃氏為叔孫氏與宗室疏屬拓䟦磨渾磨渾元城侯屈之子也自云知嗣所在紹使帳下二人與之偕往俊磨渾得出即執帳下詣嗣斬之俊建之子也王洛兒為嗣往来平城通問大臣為于偽翻夜告安逺將軍安同等衆聞之翕然響應爭出奉迎嗣至城西衛士執紹送之嗣殺紹及其母賀氏并誅紹帳下及宦官宫人為内應者十餘人其先犯乘輿者群臣臠食之乘繩證翻壬申嗣即皇帝位嗣道武皇帝之長子也蕭子顯曰嗣字木末大赦改元永興追尊劉貴人曰宣穆皇后公卿先罷歸第不預朝政者悉召用之朝直遥翻詔長孫嵩與北新侯安同山陽侯奚斤後魏孝文以獻帝第三兄之後為達奚氏尋又改為奚氏白馬侯崔宏元城侯拓跋屈等八人坐止車門右臣子至宫門皆下車而入故謂之止車門共聴朝政時人謂之八公屈磨渾之父也嗣以尚書燕鳳逮事什翼犍什翼犍為代王以鳳為左長史犍居言翻使與都坐大官封懿等魏謂尚書都省為尚書都坐都坐大官蓋尚書長官也坐徂卧翻入侍講論出議政事以王洛兒車路頭為散騎常侍叔孫俊為衛將軍散悉亶翻騎竒寄翻拓䟦磨渾為尚書皆賜爵郡縣公嗣問舊臣為先帝所親信者為誰王洛兒言李先先慕容永之謀主也永滅徙中山魏伐燕先歸魏道武親信之嗣召問先卿以何才何功為先帝所知對曰臣不才無功但以忠直為先帝所知耳詔以先為安東將軍常宿於内以備顧問朱提王悦䖍之子也拓䟦䖍見二百八卷孝武太元二十一年朱提音銖時有罪自疑懼閏十一月丁亥悅懐匕首入侍將作亂叔孫俊覺其舉止有異引手掣之索懷中得匕首掣昌列翻索山客翻遂殺之十二月乙巳太白犯虚危虚二星危三星晉天文志自須女八度至危十五度為𤣥枵齊之分野屬青州南燕靈臺令張光勸南燕主超出降降户江翻下同超手殺之柔然侵魏六年春正月甲寅朔南燕主超登天門天門廣固内城南門也朝羣臣於城上朝直遥翻乙夘超與寵姬魏夫人登城見晉兵之盛握手對泣韓􅒲諫曰􅒲竹角翻陛下遭堙厄之運正當努力自强以壯士民之志而更為兒女子泣邪為于偽翻下為民同超拭目謝之尚書令董詵勸超降超怒囚之詵疎臻翻魏長孫嵩將兵伐柔然魏主嗣以郡縣豪右多為民患悉以優詔徴之民戀土不樂内徙樂音洛長吏逼遣之於是無賴少年逃亡相聚長知兩翻少詩沼翻所在冦盜羣起嗣引八公議之曰朕欲為民除蠧而守宰不能綏撫使之紛亂今犯者既衆不可盡誅吾欲大赦以安之何如元城侯屈曰民逃亡為盜不罪而赦之是為上者反求於下也不如誅其首惡赦其餘黨崔宏曰聖王之御民務在安之而已不與之較勝負也夫赦雖非正可以行權屈欲先誅後赦要為兩不能去兩不能去言先不能去誅後又不能去赦也去羌吕翻曷若一赦而遂定乎赦而不從誅未晩也嗣従之二月癸未朔遣將軍于栗磾將騎一萬討不従命者所向皆平史言魏有謀臣所以靖亂磾丁奚翻將即亮翻騎竒寄翻下同南燕賀賴盧公孫五樓為地道出擊晉兵不能却城久閉城中男女病脚弱者大半出降者相繼降户江翻超輦而登城尚書恱夀說超曰說輸芮翻今天助寇為虐戰士凋瘁瘁秦醉翻獨守窮城絶望外援天時人事亦可知矣苟厯數有終堯舜避位陛下豈可不思變通之計乎超歎曰廢興命也吾寜奮劒而死不能銜璧而生丁亥劉裕悉衆攻城或曰今日往亡不利行師厯書二月以驚蟄後十四日為往亡日裕曰我往彼亡何為不利四面急攻之悦夀開門納晉師超與左右數十騎踰城突圍出走追獲之裕數以不降之罪數所具翻降户江翻超神色自若一無所言惟以母託劉敬宣而已敬宣先嘗奔燕故超以母託之夫孝莫大於寧親超以母之故屈節事秦竭聲伎以奉之既又掠取晉人以足聲伎由是致冦至于母子並為俘虜乃更欲以託劉敬宣何庸淺也裕忿廣固久不下欲盡阬之以妻女賞將士韓範諫曰晉室南遷中原鼎沸士民無援强則附之既為君臣必須為之盡力為于偽翻彼皆衣冠舊族先帝遺民今王師弔伐而盡阬之使安所歸乎竊恐西北之人無復來蘇之望矣湯征諸侯東面而征西夷怨南面而征北狄怨曰奚為後我攸徂之民室家胥慶曰傒我后后來其蘇裕改容謝之然猶斬王公以下三千人沒入家口萬餘夷其城隍送超詣建康斬之隆安二年慕容徳建國號南燕二主十三年而亡臣光曰晉自濟江以來威靈不競戎狄横騖虎噬中原劉裕始以王師翦平東夏騖音務夏户雅翻不於此時旌禮賢俊慰撫疲民宣愷悌之風滌殘穢之政使羣士嚮風遺黎企踵而更恣行屠戮以快忿心迹其施設曾苻姚之不如宜其不能蕩壹四海成美大之業豈非雖有智勇而無仁義使之然哉初徐道覆聞劉裕北伐勸盧循乘虛襲建康循不従道覆自至番禺番禺音潘愚説循曰本住嶺外説輸芮翻交廣之地在五嶺之外豈以理極於此傳之子孫邪正以劉裕難與為敵故也今裕頓兵堅城之下未有還期我以此思歸死士孫泰徒黨本三呉之人孫恩所掠者又三呉人也久在海中故皆懐土思歸掩擊何劉之徒如反掌耳何劉謂何無忌劉毅也不乗此機而茍求一日之安朝廷常以君為腹心之疾若裕平齊之後息甲嵗餘以璽書徴君裕自將屯豫章遣諸將帥鋭師過嶺璽音斯氏翻將音即亮翻帥讀曰率下同雖復以將軍之神武恐必不能當也復音扶又翻今日之機萬不可失若先克建康傾其根蒂裕雖南還無能為也君若不同便當帥始興之衆直指尋陽元興三年循使道覆攻陷始興因使守之循甚不樂此舉而無以奪其計乃従之樂音洛初道覆使人伐船材於南康山南康山南康縣之山也呉立安南縣於漢豫章梅嶺武帝太康元年更名南康所謂梅嶺今大庾嶺是也南康山即大庾諸山皆在今南安軍界至始興賤賣之自南康西至始興四百里居人争市之船材大積而人不疑至是悉取以裝艦艦户黯翻旬日而辦循自始興冦長沙道覆冦南康廬陵豫章諸守相皆委任奔走守式又翻相息亮翻道覆順流而下順贑石之流而下舟械甚盛時克燕之問未至朝廷急徴劉裕裕方議留鎮下邳經營司雍雍於用翻會得詔書乃以韓範為都督八郡軍事燕郡太守青州舊督齊濟南樂安城陽東莱長廣平昌髙密八郡而所謂燕郡者蓋南燕於廣固置燕都尹而今改為燕郡太守耳封融為勃海太守檀韶為琅邪太守戊申引兵還韶祗之兄也久之劉穆之稱範融謀反皆殺之二人燕之舊臣穆之恐其為變故殺之安成忠肅公何無忌自尋陽引兵拒盧循諡法危身奉上曰忠剛徳克就曰肅長史鄧潜之諫曰國家安危在此一舉聞循兵艦大盛埶居上流宜決南塘守二城以待之贑水出漢豫章南壄縣聶都山漢南壄晉南康之地也贑水至南昌縣歴南塘南塘在徐孺子宅西二城謂豫章尋陽也水經注曰豫章城東大湖十里二百二百六歩北與城齊南縁迴折至南塘本通贑江増減與江水同漢永元中太守張躬築塘以通南路兼遏此水若決南塘則盧循之舟兵無所用可以堅守而待其敝彼必不敢捨我逺下蓄力養鋭俟其疲老然後擊之此萬全之策也今決成敗於一戰萬一失利悔將無及叅軍殷闡曰循所將之衆皆三呉舊賊百戰餘勇始興溪子拳捷善鬭未易輕也始興溪子謂徐道覆所統始興兵也詩云無拳無勇毛傳曰拳力也將即亮翻易以䜴翻將軍宜留屯豫章徴兵屬城兵至合戰未為晚也若以此衆輕進殆必有悔無忌不聴三月壬申與徐道覆遇於豫章賊令彊弩數百登西岸小山邀射之射而亦翻會西風暴急飄無忌所乘小艦向東㟁賊乘風以大艦逼之衆遂奔潰無忌厲聲曰取我蘇武節来節至執以督戰賊衆雲集無忌辭色無撓撓奴教翻握節而死於是中外震駭朝議欲奉乗輿北走就劉裕朝直遥翻乗繩證翻既而知賊未至乃止西秦王乾歸攻秦金城郡拔之夏王勃勃遣尚書胡金纂攻平涼秦王興救平涼擊金纂殺之勃勃又遣兄子左將軍羅提攻拔定陽魏收地形志敷城郡有定陽縣在今鄜州鄜城縣界阬將士四千餘人秦將曹熾曹雲王肆佛等各將數千户内徙將即亮翻興處之湟山及陳倉據載記湟山澤名處昌吕翻勃勃寇隴右破白崖堡遂趣清水清水縣前漢屬天水郡後漢省晉分屬畧陽郡元豐九域志清水縣在秦州東九十里有白沙鎮縣西又有白石堡趣七喩翻畧陽太守姚夀都棄城走勃勃徙其民萬六千户於大城興自安定追之至夀渠川不及而還初南涼王傉檀遣左將軍枯木等伐沮渠蒙遜掠臨松千餘戶而還張天錫分張掖置臨松郡五代志甘州張掖縣後周併臨松入焉傉奴沃翻沮子余翻還従宣翻又如字下同蒙遜伐南涼至顯美徙數千户而去顯美縣前漢屬張掖郡後漢晉屬武威郡五代志後周廢顯美入姑臧縣南涼太尉俱延復伐蒙遜大敗而歸復扶又翻是月傉檀自將五萬騎伐蒙遜將即亮翻戰于窮泉傉檀大敗單馬奔還蒙遜乘勝進圍姑臧姑臧人懲王鍾之誅皆驚潰王鍾誅見上卷四年夷夏萬餘户降於蒙遜夏户雅翻降户江翻下同傉檀懼遣司𨽻校尉敬歸及子佗為質於蒙遜以請和何承天姓苑敬姓黄帝孫敬康之後風俗通陳敬仲之後質音致蒙遜許之歸至胡阬逃還佗為追兵所執蒙遜徙其衆八千餘戶而去右衛將軍折掘竒鎮據石驢山以叛石驢山在姑臧西南長寜川西北屬晉昌郡界張寔討曹袪於晉昌自姑臧西踰石驢據長寜折而設翻掘其月翻傉檀畏蒙遜之逼且懼嶺南為竒鎮所據乃遷於樂都樂音洛留大司農成公緒守姑臧傉檀纔出城魏安人侯諶等晉書載記作焦諶王侯等諶氏壬翻閉門作亂収合三千餘家據南城推焦朗為大都督龍驤大將軍諶自稱涼州刺史降于蒙遜傉檀自據姑臧之後與四鄰交兵所遇輒敗不惟失姑臧亦不能保樂都矣詩曰毋田甫田惟莠驕驕我思逺人勞心忉忉正謂此也劉裕至下邳以船載輜重重直用翻自帥精鋭步歸帥讀曰率至山陽聞何無忌敗死慮京邑失守卷甲兼行卷讀曰捲與數十人至淮上李延夀南史作江上當従之盖裕至山陽則已渡淮也問行人以朝廷消息行人曰賊尚未至劉公若還便無所憂裕大喜將濟江風急衆咸難之裕曰若天命助國風當自息若其不然覆溺何害溺奴狄翻即命登舟舟移而風止過江至京口衆乃大安夏四月癸未裕至建康以江州覆沒表送章綬詔不許綬音受青州刺史諸葛長民兖州刺史劉藩并州刺史劉道憐各將兵入衛建康青州兖州并州時皆僑在江淮間將即亮翻藩豫州刺史毅之従弟也従才用翻毅聞盧循入冦將拒之而疾作既瘳將行劉裕遺毅書曰吾往習擊妖賊孫泰以左道惑衆孫恩盧循皆其黨也故謂之妖賊遺于季翻妖於嬌翻曉其變態賊新獲姦利其鋒不可輕今修船垂畢當與弟同舉克平之日上流之任皆以相委又遣劉藩往諭止之毅怒謂藩曰往以一時之功相推耳汝便謂我真不及劉裕邪投書於地帥舟師二萬發姑孰毅時以豫州刺史鎮姑孰帥讀曰率循之初入冦也使徐道覆向尋陽循自將攻湘中諸郡湘中諸郡漢長沙零桂之地荆州刺史劉道規遣軍逆戰敗於長沙循進至巴陵將向江陵徐道覆聞毅將至馳使報循曰使疏吏翻毅兵甚盛成敗之事係之於此宜并力摧之若此克捷江陵不足憂也循即日發巴陵與道覆合兵而下五月戊午毅與循戰于桑落洲毅兵大敗棄船以數百人步走餘衆皆為循所虜所棄輜重山積重直用翻初循至尋陽聞裕已還猶不信既破毅乃得審問審者悉其實也問音問也與其黨相視失色循欲退還尋陽攻取江陵據二州以抗朝廷二州謂荆江也道覆謂宜乘勝徑進固争之循猶豫累日乃従之己未大赦裕募人為兵賞之同京口赴義之科裕起兵於京口以討桓𤣥赴義之人酬賞重於當時𤼵民治石頭城治直之翻議者謂宜分兵守諸津要裕曰賊衆我寡若分兵屯守則測人虚實且一處失利則沮三軍之心沮在吕翻今聚衆石頭隨宜應赴既令彼無以測多少少詩沼翻又於衆力不分若徒旅轉集徐更論之耳朝廷聞劉毅敗人情恟懼時北師始還將士多創病恟許拱翻創初良翻建康戰士不盈數千循既克二鎮二鎮謂江豫也戰士十餘萬舟車百里不絶樓船髙十二丈髙古號翻敗還者争言其彊盛孟昶諸葛長民欲奉乘輿過江裕不聴時江西江北皆無城池可倚昶長民欲奉天子過江不過東走廣陵西據歴陽耳昶丑兩翻初何無忌劉毅之南討也昶策其必敗已而果然至是又謂裕必不能抗循衆頗信之惟龍驤將軍東海虞丘進廷折昶等以為不然驤思將翻虞丘複姓史記楚相有虞丘子折之舌翻中兵參軍王仲徳言於裕曰明公命世作輔新建大功威震六合魏尚書曹有中兵郎諸公府征鎮亦因而置中兵參軍新建大功謂滅燕也妖賊乘虛入冦既聞凱還自當奔潰若先自遁逃則勢同匹夫匹夫號令何以威物此謀若立請従此辭裕甚悦昶固請不已裕曰今重鎮外傾彊冦内逼人情危駭莫有固志若一旦遷動便自土崩瓦解江北亦豈可得至設令得至不過延日月耳今兵士雖少少詩沼翻下同自足一戰若其克濟則臣主同休茍厄運必至我當横尸廟門遂其由來以身許國之志不能竄伏草間茍求存活也我計決矣卿勿復言昶恚其言不行恚於避翻且以為必敗因請死裕怒曰卿且申一戰申重也死復何晚復扶又翻昶知裕終不用其言乃抗表自陳曰臣裕北討衆並不同唯臣贊裕行計事見上年致使彊賊乘間社稷危逼臣之罪也間古莧翻謹引咎以謝天下封表畢仰藥而死乙丑盧循至淮口秦淮入江之口也中外戒嚴琅邪王徳文都督宫城詣軍事屯中堂皇堂無四壁曰皇劉裕屯石頭諸將各有屯守裕子義隆始四嵗裕使諮議參軍劉粹輔之鎮京口粹毅之族弟也裕見民臨水望賊怪之以問參軍張劭劭曰若節鉞未反民奔散之不暇亦何能觀望今當無復恐耳復扶又翻裕謂將佐曰賊若於新亭直進其鋒不可當宜且迴避勝負之事未可量也量音良若迴泊西岸西岸即蔡州此成禽耳徐道覆請於新亭至白石焚舟而上上時掌翻數道攻裕循欲以萬全為計謂道覆曰大軍未至孟昶便望風自裁以大勢言之自當計日潰亂今決勝負於一朝乾沒求利乾音干既非必克之道且殺傷士卒不如案兵待之道覆以循多疑少決乃歎曰我終為盧公所誤事必無成使我得為英雄驅馳天下不足定也為于偽翻裕登石頭城望循軍初見引向新亭顧左右失色既而迴泊蔡洲乃悦蔡洲在石頭西㟁今建康府上元縣西二十五里有蔡洲于是衆軍轉集裕恐循侵軼軼徒結翻用虞丘進計伐樹柵石頭淮口修治越城築查浦藥園廷尉三壘查浦在大江南岸近秦淮口藥園蓋種芍藥之所廷尉寺舎所在因以為地名查莊加翻據晉書帝紀三壘皆在淮口皆以兵守之劉毅經涉蠻晉西陽上下羣蠻所居之地謂之蠻其為王民應租税征役者謂之晉僅能自免従者飢疲死亡什七八從才用翻丙寅至建康待罪裕慰勉之使知中外留事知都督中外諸軍府留事也毅乞自貶詔降為後將軍魏長孫嵩至漠北而還還従宣翻又如字下同柔然追圍之於牛川壬申魏主嗣北擊柔然柔然可汗社崘聞之遁走道死崘盧昆翻其子度㧞尚幼部衆立社崘弟斛律號藹豆葢可汗可讀従刋入聲汗音寒嗣引兵還参合陂盧循伏兵南岸南岸即秦淮口南岸使老弱乘舟向白石聲言悉衆自白石步上上時掌翻劉裕留參軍沈林子徐赤特戍南岸斷查浦㫁丁管翻戒令堅守勿動裕及劉毅諸葛長民北出拒之林子曰妖賊此言未必有實宜深為之防裕曰石頭城險且淮柵甚固留卿在後足以守之林子穆夫之子也沈穆夫吳興武康人隆安三年孫恩寇會稽三呉響應穆夫在會稽恩以為餘姚令恩為劉牢之所破并殺穆夫庚辰盧循焚查浦進至張侯橋徐赤特將擊之林子曰賊聲往白石而屢来挑戰挑徒了翻其情可知吾衆寡不敵不如守險以待大軍赤特不從遂出戰伏兵𤼵赤特大敗單舸奔淮北秦淮北岸也林子及將軍劉鍾據柵力戰朱齡石救之賊乃退循引精兵大上至丹陽郡丹陽郡丹陽尹治所也上時掌翻裕帥諸軍馳還石頭帥讀曰率斬徐赤特解甲久之乃出陳於南塘南塘秦淮南㟁也陳讀曰陣六月以劉裕為太尉中書監加黄鉞裕受黄鉞餘固辭以車騎中軍司馬庾悦為江州刺史恱凖之子也劉裕為車騎將軍以劉敬宣征蜀失利乞降號中軍將軍故車騎中軍二府共一司馬庾凖庾亮之孫也司馬國璠及弟叔璠叔道奔秦璠孚袁翻秦王興曰劉裕方誅桓𤣥輔晉室卿何為来對曰裕削弱王室臣宗族有自修立者裕輒除之方為國患甚於桓𤣥耳興以國璠為揚州刺史叔道為交州刺史盧循寇掠諸縣無所得謂徐道覆曰師老矣不如還尋陽并力取荆州據天下三分之二徐更與建康争衡耳秋七月庚申循自蔡洲南還尋陽留其黨范崇民將五千人據南陵南陵在宣城郡宣城縣西梁置南陵郡及南陵縣葢漢丹陽郡石城縣之界也今為池州貴池縣地循慮兵有利鈍欲南歸番禺故使崇民守之以固彭蠡湖口宋白曰柵江口對岸即舊南陵縣地今為繁昌縣甲子裕使輔國將軍王仲徳廣川太守劉鍾河間内史蘭陵蒯恩中軍諮議參軍孟懐玉等帥衆追循帥讀曰率乙丑魏主嗣還平城西秦王乾歸討越質屈機等十餘部越質鮮卑種也其酋曰叱黎叱黎之子曰詰歸孝武太元十六年降于乾歸二十一年叛降秦屈機即詰歸也語稍訛耳降其衆二萬五千降户江翻徙於苑川八月乾歸復都苑川乞伏氏本都度堅山乾歸強盛始都苑川旣為秦所破而降於秦秦使鎮苑川復叛恐為秦所襲還保度堅山今部衆浸盛不畏秦復都苑川沮渠䝉遜伐西涼敗西涼世子歆于馬廟古者祭馬祖後世因立廟祭之故名其地為馬廟禽其將朱元虎而還涼公暠以銀二千斤金二千兩贖元虎䝉遜歸之遂與暠結盟而還將子亮翻暠古老翻劉裕還東府盧循退裕乃還東府大治水軍治直之翻遣建威將軍會稽孫處振武將軍沈田子帥衆三千自海道襲番禺會工外翻處昌吕翻帥讀曰率番禺音潘愚田子林子之兄也衆皆以為海道艱逺必至為難且分撤見力見賢遍翻下同非目前之急裕不従敇處曰大軍十二月之交必破妖虜卿至時先傾其巢窟使彼走無所歸也譙縦遣侍中譙良等入見於秦請兵以伐晉見賢遍翻縦以桓謙為荆州刺史譙道福為梁州刺史帥衆二萬冦荆州秦王興遣前將軍茍林帥騎兵會之江陵自盧循東下不得建康之問問音問也羣盜互起荆州刺史劉道規遣司馬王鎮之帥天門太守檀道濟呉孫休永安六年分武陵立天門郡充縣有松梁山山有石石開處數十丈其髙以弩仰射不至其上名天門因以名郡輿地志澧州石門縣古天門郡帥讀曰率下同廣武將軍彭城到彦之入援建康道濟祗之弟也鎮之至尋陽為茍林所破盧循聞之以林為南蠻校尉分兵配之使乗勝伐江陵聲言徐道覆已破建康桓謙於道召募義舊桓氏世居荆楚舊恩所結義不相忘謂之義舊民投之者二萬人謙屯枝江枝江縣自漢以来屬南郡春秋之羅國也江水於縣西别出為沱而東復合於江故曰枝江我朝熙寜六年省枝江為鎮入松滋縣林屯江津二寇交逼江陵士民多懐異心道規乃會將士告之曰桓謙今在近道聞諸長者頗有去就之計長知兩翻吾東来文武足以濟事東來文武謂道規従行將佐兵士也若欲去者本不相禁因夜開城門達曉不閉衆咸憚服莫有去者雍州刺史魯宗之帥衆數千自襄陽赴江陵雍於用翻或謂宗之情未可測道規單馬迎之宗之感悦道規使宗之居守守式又翻委以腹心自帥諸軍攻謙諸將佐皆曰今逺出討謙其勝難必茍林近在江津伺人動静伺相吏翻若來攻城宗之未必能固脱有蹉跌蹉倉何翻跌徒結翻大事去矣道規曰茍林愚懦無它竒計以吾去未逺必不敢向城吾今取謙往至便克沈疑之間已自還返沈持林翻沈吟不決也還音旋謙敗則林破膽豈暇得來且宗之獨守何為不支數日乃馳往攻謙水陸齊進謙等大陳舟師兼以步騎戰於枝江檀道濟先進陷陳陷陳讀曰陣謙等大敗謙單舸奔茍林道規追斬之還至涌口水經注涌水自夏水南通於江謂之涌口春秋左氏傳所謂閻敖游涌而逸者也在江陵城東杜預曰涌水在南郡華容縣涌音勇討林林走道規遣諮議參軍臨淮劉遵帥衆追之初謙至枝江江陵士民皆與謙書言城内虛實欲為内應至是檢得之道規悉焚不視衆於是大安江州刺史庾悦以鄱陽太守虞丘進為前驅屢破盧循兵進據豫章絶循糧道九月劉遵斬茍林于巴陵桓石綏因循入冦起兵洛口水經注漢水過魏興安陽縣又東至灙城南與洛谷水合水北出洛谷谷北通長安其水南流注漢水所謂洛口也自號荆州刺史徴陽令王天恩自號梁州刺史徴陽當作微陽晉地里志微陽縣屬上庸郡沈約曰魏立建始縣晉武帝改曰微陽周武王之伐紂庸蜀𦍑髳微盧彭濮八國從之竊意微陽縣葢因古微國而得名而史無其據襲據西城梁州刺史傅韶遣其子魏興太守𢎞之討石綏等皆斬之桓氏遂滅韶暢之孫也西秦王乾歸攻秦略陽南安隴西諸郡皆克之徙民二萬五千户於苑川及枹罕枹音膚甲寅葬魏主珪於盛樂金陵諡曰宣武廟號烈祖宋髙祖永初元年魏改諡珪曰道武皇帝劉毅固求追討盧循長史王誕密言於劉裕曰毅既喪敗不宜復使立功喪息浪翻復扶又翻下無復同裕従之冬十月裕帥兖州刺史劉藩寧朔將軍檀韶冠軍將軍劉敬宣等南擊盧循帥讀曰率下同冠古玩翻以劉毅監太尉留府後事皆委焉監音工衘翻癸巳裕𤼵建康徐道覆率衆三萬趣江陵奄至破冢破冢在江岸之東趣七喻翻時魯宗之已還襄陽追召不及人情大震或傳循已平京邑遣道覆来為刺史江漢士民感劉道規焚書之恩無復貳志復扶又翻道規使劉遵别為遊軍自拒道覆於豫章口前驅失利遵自外横擊大破之斬首萬餘級赴水死者殆盡道覆單舸走還湓口湓蒲奔翻初道規使遵為遊軍衆咸以為彊敵在前唯患衆少不應分割見力置無用之地見賢遍翻及破道覆卒得遊軍之力卒子恤翻衆心乃服鮮卑僕渾羌句豈輸報鄧若等帥户二萬降于西秦鮮卑有僕渾部句豈輸報鄧若則羌種也句古侯翻王仲徳等聞劉裕大軍且至進攻范崇民於南陵崇民戰艦夾屯西岸艦户黯翻十一月劉鍾自行覘賊覘丑亷翻又丑艷翻天霧賊鉤得其舸鍾因帥左右攻艦户艦戶今舟人謂之馬門賊遽閉户拒之鍾乃徐還與仲徳共攻崇民崇民走崇民走則裕可徑進循失湖口之險癸丑益州刺史鮑陋卒謙道福陷巴東殺守將温祚時延祖温祚本巴東太守時延祖自劉敬宣黄虎之退皆屯巴東將即亮翻盧循兵守廣州者不以海道為虞庚戌孫處乘海奄至會大霧四面攻之即日拔其城處撫其舊民戮循親黨勒兵謹守分遣沈田子等擊嶺表諸郡劉裕軍雷池盧循揚聲不攻雷池當乘流徑下裕知其欲戰十二月己夘進軍大雷杜佑曰晉大雷戍舒州望江縣是今晥口之西有雷江口即其地宋書志云望江縣西岸有大雷江自尋陽柴桑沿流三百里入江即望江縣庚辰盧循徐道覆帥衆數萬塞江而下塞悉則翻前後莫見舳艫之際舳音逐艫音盧裕悉出輕艦帥衆軍齊力擊之又分步騎屯於西岸先備火具裕以勁弩射循軍射而亦翻因風水之勢以蹙之循艦悉泊西岸岸上軍投火焚之烟炎漲天烟與煙同炎讀曰燄循兵大敗走還尋陽將趣豫章趣七喻翻乃悉力柵斷左里左里以其地在章江之左故名杜佑曰左里即江州尋陽縣彭蠡湖口斷丁管翻丙申裕軍至左里不得進裕麾兵將戰所執麾竿折幡沈于水衆並怪懼裕笑曰往年覆舟之戰謂討桓𤣥與桓謙等戰時也折而設翻沈持林翻幡竿亦折今者復然復扶又翻賊必破矣即攻柵而進循兵雖殊死戰弗能禁循單舸走舸古我翻所殺及投水死者凡萬餘人納其降附宥其逼略降户江翻遣劉藩孟懐玉輕軍追之循收散卒尚有數千人徑還番禺番禺音潘愚道覆走保始興裕板建威將軍禇裕之行廣州刺史裕之裒之曾孫也褚裒崇徳太后之父裒蒲侯翻裕還建康劉毅惡劉穆之每従容與裕言穆之權太重惡烏路翻従干容翻裕益親任之燕廣川公萬泥上谷公乳陳自以宗室有大功慕容熙之死萬泥乳陳皆有功謂當入為公輔燕王跋以二藩任重久而弗徴跋以萬泥為幽平二州牧鎮肥如乳陳為并青二州牧鎮白狼二人皆怨是嵗乳陳密遣人告萬泥曰乳陳有至謀願與叔父圖之萬泥遂奔白狼與乳陳俱叛䟦遣汲郡公𢎞與張興將步騎二萬討之𢎞先遣使諭以禍福萬泥欲降乳陳不可將即亮翻騎竒寄翻使疏吏翻降户江翻下同興謂𢎞曰賊明日出戰今夜必來驚我營宜為之備𢎞乃密令人課草十束畜火伏兵以待之是夜乳陳果遣壯士千餘人來斫營衆火俱起伏兵邀擊俘斬無遺萬泥乳陳懼而出降𢎞皆斬之跋以范陽公素弗為大司馬改封遼西公𢎞為驃騎大將軍改封中山公驃匹妙翻騎竒寄翻資治通鑑卷一百十五
