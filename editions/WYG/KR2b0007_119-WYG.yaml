body:
  text: 資治通鑑卷一百十九宋司馬光撰胡三省音注宋紀一起上章涒灘盡昭陽大淵獻凡四年故劉氏世居彭城彭城於春秋之時宋土也帝之始建國號曰宋高祖武皇帝諱裕字徳輿小字寄奴姓劉氏彭城縣綏徳里人漢楚元王交二十一世孫也彭城楚都故苗裔家焉晉氏東遷劉氏移居晉陵丹徒之京口里永初元年是年六月改元春正月己亥魏主還宫晉有天下通鑑於魏主率兼書名是年宋主受禪秦王熾磐立其子乞伏暮末為大子熾昌志翻茂考異曰晉書作乞伏慕末宋書又作乞佛蔓今従崔鴻十六國春秋作暮末仍領撫軍大將軍都督中外諸軍事大赦改元建𢎞宋王欲受禪而難於發言乃集朝臣宴飲此宋朝之臣也朝直遥翻従容言曰従千容翻桓𤣥簒位鼎命已移我首唱大義興復帝室南征北伐平定四海功成業著遂荷九錫荷下可翻今年將衰暮崇極如此物忌盛滿非可乆安今欲奉還爵位歸老京師羣臣惟盛稱功徳莫諭其意日晩坐散坐徂卧翻中書令傅亮還外乃悟而宫門已閉亮叩扉請見見賢遍翻王即開門見之亮入但曰臣暫宜還都王解其意無復他言解戶買翻曉也復扶又翻直云須幾人自送亮曰數十人可也即時奉辭亮出已夜見長星竟天拊髀歎曰我常不信天文今始驗矣長星所以除舊布新故云然亮至建康夏四月徴王入輔王留子義康為都督豫司雍并四州諸軍事豫州刺史鎮夀陽豫州後漢治譙魏治汝南安成晉平吳治陳國江左治夀陽蕪湖邾城牛渚歴陽馬頭夀春姑孰不常厥居安帝之末帝欲開拓河南綏定豫土割揚州大江以西大雷以北悉屬豫州豫州基址因此而立帝既平關洛置司州刺史治虎牢領河南滎陽𢎞農實土三郡河内東京兆二僑郡雍州仍僑治襄陽秦并州刺史鎮蒲阪毛徳祖既自蒲阪退屯虎牢則并州當寄治虎牢也雍於用翻義康尚㓜以相國參軍南陽劉湛為長史決府州事府州都督府及豫州也湛自弱年即有宰物之情常自比管葛謂管仲諸葛亮也博涉書史不為文章不喜談議喜許記翻王甚重之五月乙酉魏更諡宣武帝曰道武帝魏主嗣永興二年諡父珪曰宣武皇帝更古衡翻魏淮南公司馬國璠池陽子司馬道賜謀外叛司馬文思告之庚戌魏主殺國璠道賜賜文思爵鬱林公國璠等降魏見上卷晉安帝義熈十三年璠孚袁翻國璠等連引平城豪桀坐族誅者數十人章安侯封懿之子𤣥之當坐魏主以𤣥之燕朝舊族慕容廆興於昌黎封氏依之遂世仕於燕貴顯欲宥其一子𤣥之曰弟子磨奴早孤乞全其命乃殺𤣥之四子而宥磨奴六月壬戌王至建康傅亮諷晉恭帝禪位於宋具詔草呈帝使書之帝欣然操筆謂左右曰桓𤣥之時晉氏已無天下重為劉公所延將二十載晉安帝元興三年裕討桓𤣥至是凡十七年操千髙翻重直龍翻載子亥翻今日之事本所甘心遂書赤紙為詔甲子帝遜於琅邪第百官拜辭祕書監徐廣流涕哀慟晉武帝泰始元年受禪歳在乙酉建興四年長安陷歳在丙子凡五十二年次年元帝建號於江東改元建武至是年歳在庚申凡一百單三年西東享國共一百五十七年而亡丁夘王為壇於南郊即皇帝位禮畢自石頭備法駕入建康宫徐廣又悲感流涕侍中謝晦謂之曰徐公得無小過廣曰君為宋朝佐命朝直遙翻身是晉室遺老悲歡之事固不可同廣邈之弟也徐邈為晉孝武所親重帝臨太極殿大赦改元其犯鄉論清議一皆蕩滌與之更始犯郷論清議盖得罪於名教者更工衡翻裴子野論曰昔重華受終四凶流放書堯使舜嗣位正月上日受終於文祖流共工于幽州放驩兠于崇山竄三苗于三危殛鯀于羽山四罪而天下咸服重直龍翻武王克殷頑民遷洛武王克殷遷頑民于洛邑天下之惡一也鄉論清議除之過矣奉晉恭帝為零陵王優崇之禮皆倣晉初故事即宫于故秣陵縣沈約曰秣陵縣本治去京邑六十里今故治村是也晉安帝義熈九年移治京邑在鬬場恭帝元熙元年省楊州禁防參軍縣移治其處使冠軍將軍劉遵考將兵防衛冠古亮翻將即亮翻降禇后為王妃追尊皇考為孝穆皇帝皇妣趙氏為孝穆皇后尊王太后蕭氏為皇太后帝父翹娶趙氏生帝而徂繼室以蕭氏上事蕭太后素謹及即位春秋已高毎旦入朝太后朝直遙翻未嘗失時刻詔晉氏封爵當隨運改獨置始興廬陵始安長沙康樂五公降爵為縣公及縣侯始興廬陵始安長沙皆郡公獨康樂縣公耳據南史降始興郡公為華容縣公廬陵公為柴桑縣公始安公為荔浦縣侯長沙公為醴陵縣侯樂音洛以奉王導謝安温嶠陶侃謝𤣥之祀其宣力義熈豫同艱難者一仍本秩庚午以司空道憐為太尉封長沙王追封司徒道規為臨川王以道憐子義慶襲其爵其餘功臣徐羨之等增位進爵各有差追封劉穆之為南康郡公王鎮惡為龍陽縣侯上每歎念穆之曰穆之不死當助我治天下治直之翻可謂人之云亡邦國殄瘁詩曕卬之辭瘁秦醉翻又曰穆之死人輕易我易以豉翻立皇子桂陽公義真為廬陵王彭城公義隆為宜都王義康為彭城王己夘改泰始厯為永初厯以元改歴魏主如翳犢山遂至馮滷池據北史翳犢山在平城之西五原之東馮滷池即五原鹽池唐屬鹽州界滷龍五翻聞上受禪驛召崔浩告之曰卿往年之言騐矣浩言見上卷晉安帝義熙十四年朕於今日始信天道秋七月丁酉魏主如五原甲辰詔以涼公歆為都督高昌等七郡諸軍事征西大將軍酒泉公秦王熾磐為安西大將軍熾昌志翻交州刺史杜慧度擊林邑大破之林邑屢為冦故慧度撃之所殺過半林邑乞降前後為所鈔掠者皆遣還降戸江翻鈔楚交翻慧度在交州為政纎密一如治家治直之翻吏民畏而愛之城門夜開道不拾遺己未魏主如雲中河西王䝉遜欲伐涼先引兵攻秦浩亹浩亹音告門旣至濳師還屯川巖涼公歆欲乗虛襲張掖宋繇張體順切諌不聽太后尹氏謂歆曰汝新造之國地狹民希自守猶懼不足何暇伐人先王臨終李暠卒見上卷晉安帝義熈十三年殷勤戒汝深慎用兵保境寧民以俟天時言猶在耳奈何棄之䝉遜善用兵非汝之敵數年以來常有兼并之志汝國雖小足為善政修徳養民靜以待之彼若昏暴民將歸汝若其休明休美也汝將事之豈得輕為舉動僥冀非望以吾觀之非但喪師喪息浪翻殆將亡國亦不聽宋繇歎曰今兹大事去矣歆將步騎三萬東出將即亮翻騎竒寄翻䝉遜聞之曰歆已入吾術中然聞吾旋師必不敢前乃露布西境云已克浩亹將進攻黄谷此露布非必建之漆竿如魏晉告捷之制但露檄布言其事耳歆聞之喜進入都瀆澗䝉遜引兵擊之戰於懐城歆大敗或勸歆還保酒泉歆曰吾違老母之言以取敗不殺此胡何面目復見我母復扶又翻遂勒兵戰於蓼泉為䝉遜所殺歆弟酒泉太守翻新城太守預領羽林右監密左將軍眺右將軍亮西奔敦煌䝉遜入酒泉安帝隆安四年李嵩據敦煌凡二主二十一年而滅敦徒門翻禁侵掠士民安堵以宋繇為吏部郎中委之選舉涼之舊臣有才望者咸禮而用之以其子牧犍為酒泉太守犍居言翻守式又翻敦煌太守李恂翻之弟也與翻等棄敦煌奔北山䝉遜以索嗣之子元緒行敦煌太守索嗣死事見一百十二卷晉安帝隆安四年索昔各翻䝉遜還姑臧見涼太后尹氏而勞之尹氏曰李氏為胡所滅知復何言蒙遜張掖盧水胡也勞力到翻復扶又翻下可復同或謂尹氏曰今母子之命在人掌握奈何傲之且國亡子死曾無憂色何也尹氏曰存亡死生皆有天命奈何更如凡人為兒女子之悲乎吾老婦人國亡家破豈可復惜餘生為人臣妾乎惟速死為幸耳䝉遜嘉而赦之娶其女為牧犍婦八月辛未追諡妃臧氏為敬皇后癸酉立王太子義符為皇太子閏月壬午詔晉帝諸陵悉署守衛九月秦振武將軍王基等襲河西王蒙遜胡園戍俘二千餘人而還還徒宣翻又如字李恂在敦煌有惠政索元緒麤險好殺大失人和好呼到翻郡人宋承張𢎞密信招恂冬恂帥數十騎入敦煌元緒東奔涼興涼興郡在唐𤓰州常樂縣界帥讀曰率承等推恂為冠軍將軍涼州刺史冠古玩翻改元永建河西王䝉遜遣世子政徳攻敦煌恂閉城不戰十二月丁亥杏城羌酋狄温子帥三千餘家降魏背夏降魏也酋慈由翻帥讀曰率降户江翻是歳魏姚夫人卒追諡昭哀皇后姚夫人歸魏見一百十七卷晉安帝義熙十一年二年春正月辛酉上祀南郊大赦裴子野論曰夫郊祀天地修歳事也赦彼有罪夫何為哉以揚州刺史廬陵王義真為司徒尚書僕射徐羨之為尚書令揚州刺史中書令傅亮為尚書僕射辛未魏主嗣行如公陽河西王䝉遜帥衆二萬攻李恂于敦煌秦王熾磐遣征北將軍木弈干輔國將軍元基攻上邽遇霖雨而還三月甲子魏陽平王熈卒魏主發代都六千人築苑東包白登周三十餘里河西王䝉遜築隄壅水以灌敦煌李恂乞降不許恂将宋承等舉城降恂自殺䝉遜屠其城獲恂弟子寳囚于姑臧李氏滅矣李寳卒由此開有唐之基天之所啓誰能廢之於是西域諸國皆詣䝉遜稱臣朝貢朝直遥翻夏四月己夘朔詔所在淫祠自蔣子文以下皆除之其先賢及以勲徳立祠者不在此例吐谷渾王阿柴遣使降秦使疏吏翻降户江翻秦王熾磐以阿柴為征西大將軍開府儀同三司安州牧白蘭王秦葢以吐谷渾之地為安州六月乙酉魏主北巡至蟠羊山蟠羊山在參合陂東秋七月西巡至河河西王䝉遜遣右衛將軍沮渠鄯善建節將軍沮渠茍生帥衆七千伐秦秦王熾磐遣征北將軍木奕干等帥步騎五千拒之敗鄯善等于五澗五澗在洪池嶺北水經註云五澗水出姑臧城東而西北流注馬城河敗補邁翻虜茍生斬首二千而還初帝以毒酒一甖甖於耕翻瓦器也授前琅邪郎中令張偉使酖零陵王偉歎曰酖君以求生不如死乃於道自飲而卒卒子恤翻偉邵之兄也初帝領揚州牧辟邵為僚屬太常褚秀之侍中褚淡之皆王之妃兄也王每生男帝輒令秀之兄弟方便殺之方便者隨宜處分不令其事彰露也王自遜位深慮禍及與禇妃共處一室處昌吕翻自煑食於牀前飲食所資皆出禇妃故宋人莫得伺其隙伺相吏翻九月帝令淡之與兄右衛將軍叔度往視妃妃出就别室相見兵人踰垣而入進藥於王王不肯飲曰佛教自殺者不復得人身兵人以被掩殺之復扶又翻本考異曰宋本紀九月己丑零陵王薨晉紀九月丁丑據長厯九月丙午朔無己丑丁丑今不書日帝帥百官臨於朝堂三日自是之後禪讓之君罕得全矣帥讀曰率臨力鴆翻朝直遙翻庚戌魏主還宫冬十月己亥詔以河西王䝉遜為鎮軍大將軍開府儀同三司涼州刺史己亥魏主如代十一月辛亥葬晉恭帝於沖平陵帝帥百官瞻送十二月丙申魏主西巡至雲中秦王熾磐遣征西將軍孔子等帥騎二萬擊契汗秃真於羅川契欺訖翻汗音寒河西王蒙遜所署晉昌太守唐契據郡叛䝉遜遣世子政徳討之契瑶之子也唐瑶見一百十一卷晉安帝隆安四年上之為宋公也謝瞻為宋臺中書侍郎其弟晦為右衛將軍時晦權遇已重自彭城還都迎家上為宋公時建宋臺於彭城賓客輻湊門巷填咽瞻在家驚駭謂晦曰汝名位未多而人歸趣乃爾趣七喻翻吾家素以恬退為業不願干豫時事交遊不過親朋而汝遂勢傾朝野朝直遙翻此豈門戶之福邪乃以籬隔門庭曰吾不忍見此及還彭城言於宋公曰臣本素士父祖位不過二千石瞻晦晉太常謝裒之𤣥孫於謝安為従孫是其髙曾與謝安同其所自出但名位不及耳弟年始三十志用凡近榮冠臺府冠古玩翻位任顯密福過災生其應無逺特乞降黜以保衰門前後屢陳之晦或以朝廷密事語瞻語牛倨翻瞻故向親舊陳説用為戲笑以絶其言及上即位晦以佐命功位任益重瞻愈憂懼是歲瞻為豫章太守遇病不療臨終遺晦書曰吾得啓體幸全亦何所恨遺于季翻曽子有疾召門弟子曰啓予足啓予手詩云戰戰兢兢如臨深淵如履薄氷而今而後吾知免夫小子孔子曰身體髪膚受之父母不敢毁傷父母全而生之子全而歸之弟思自勉勵為國為家居寵思危謝瞻有焉為謝晦殺身亡家張本為于偽翻三年春正月甲辰朔魏主自雲中西巡至屋竇城據北史屋竇城在薛林山東癸丑以徐羨之為司空録尚書事刺史如故江州刺史王𢎞為衛將軍開府儀同三司中領軍謝晦為領軍將軍兼散騎常侍入直殿省總統宿衛散悉亶翻騎竒寄翻徐羨之起自布衣徐羨之為桓修撫軍中兵參軍與帝同府深相親結及起義兵益見親任又無術學直以志力局度一旦居廊廟朝野推服咸謂有宰臣之望沈密寡言不以憂喜見色朝直遙翻沈持林翻見賢遍翻頗工奕棊觀戲常若未解解户買翻曉也當世倍以此推之傅亮蔡廓常言徐公曉萬事安異同常與傅亮謝晦宴聚亮晦才學辯博羨之風度詳整時然後言鄭鮮之歎曰觀徐傅言論不復以學問為長復扶又翻秦征西將軍孔子等大破契汗秃真契欺訖翻汗音寒秃吐谷翻獲男女二萬口牛羊五十餘萬頭禿真帥騎數千西走其别部樹奚帥户五千降秦帥讀曰率降戶江翻二月丁丑詔分豫州淮以東為南豫州治歴陽以彭城王義康為刺史義熈之初帝欲開拓河南綏定豫土至九年割揚州大江以西大雷以北悉屬豫州至是以淮西之地為北豫州治汝南沈約志南豫州領歴陽南譙盧江南汝隂南梁晉熙弋陽安豐南汝南新蔡東郡南潁潁川西汝隂汝陽陳留南陳左郡邊城左郡光城左郡十九郡案徐志及永初郡國志止領十三郡盖沈志有景平以後續置郡在其間也又分荆州十郡置湘州治臨湘晉安帝義熈十三年省湘州今復置臨湘漢舊縣唐為潭州長沙縣以左衛將軍張邵為刺史丙戌魏主還宫三月上不豫大尉長沙王道憐司空徐羨之尚書僕射傅亮領軍將軍謝晦䕶軍將軍檀道濟並入侍醫藥羣臣請祈禱神祇上不許唯使侍中謝方明以疾告宗廟而已上性不信竒怪微時多符瑞及貴史官審以所聞上拒而不答檀道濟出為鎮北將軍南兖州刺史鎮廣陵悉監淮南諸軍晉成帝立南兖州治京口自此治廣陵領廣陵海陵山陽盱眙秦川南沛等郡監工銜翻皇太子多狎羣小謝晦言於上曰陛下春秋既高宜思存萬世神器至重不可使負荷非才晦發此言已有廢昏立明之意荷下可翻又如字上曰廬陵何如晦曰臣請觀焉出造廬陵王義真造七到翻義真盛欲與談晦不甚答還曰徳輕於才非人主也丁未出義真為都督南豫豫雍司秦并六州諸軍事車騎將軍開府儀同三司南豫州刺史為晦等殺義真張本雍於用翻騎竒寄翻是後大州率加都督多者或至五十州不可復詳載矣迄宋之季境内惟二十二州至梁武帝時沿邊分置諸州始有五十州復扶又翻帝疾瘳瘳丑留翻己未大赦秦雍流民南入梁州庚申遣使送絹萬匹且漕荆雍之穀以賑之秦雍之雍古雍州也關中之地荆雍之雍晉末所置南雍州也治襄陽使疏吏翻賑之忍翻刁逵之誅也事見一百十三卷晉安帝元興三年其子彌亡命辛酉彌帥數十人入京口帥讀曰率太尉留府司馬陸仲元撃斬之時長沙王道憐以太尉鎮京口入侍醫藥故有留府乙丑魏河南王曜卒夏四月甲戌魏立皇子燾為太平王拜相國加大將軍丕為樂平王彌為安定王範為樂安王健為永昌王崇為建寧王俊為新興王乙亥詔封仇池公楊盛為武都王秦王熾磐以折衝將軍乞伏是辰為西胡校尉築列渾城於汁羅以鎮之汁羅盖即羅川之地五月帝疾甚召太子誡之曰檀道濟雖有幹畧而無逺志非如兄韶有難御之氣也徐羨之傅亮當無異圖謝晦數從征伐頗識機變若有同異必此人也帝固有疑晦之心矣數所角翻又為手詔曰後世若有幼主朝事一委宰相母后不煩臨朝朝直遙翻司空徐羨之中書令傅亮領軍將軍謝晦鎮北將軍檀道濟同被顧命癸亥帝殂於西殿年六十自是以後南北朝之君没皆稱殂被皮義翻顧音古帝清簡寡欲嚴整有法度被服居處儉於布素遊宴甚稀嬪御至少處昌吕翻少詩沼翻嘗得後秦髙祖従女後秦王興廟號髙祖従才用翻有盛寵頗以廢事謝晦㣲諌即時遣出財帛皆在外府内無私藏藏徂浪翻嶺南嘗獻入筒細布一端八丈帝惡其精麗勞人揚雄蜀都賦曰布則蜘蛛作絲不可見風䇶中黄潤一端數金言其細也惡烏路翻即付有司彈太守彈徒丹翻以布還之并制嶺南禁作此布公主出適遣送不過二十萬無錦繡之物内外奉禁莫敢為侈靡太子即皇帝位年十七大赦尊皇太后曰太皇太后立妃司馬氏為皇后晉恭帝女海鹽公主也魏主服寒食散頻年藥發災異屢見見賢遍翻頗以自憂遣中使宻問白馬公崔浩曰使疏吏翻屬者日食趙代之分屬者猶言比者近者屬之欲翻分扶問翻朕疾彌年不愈恐一旦不諱諸子竝少少詩照翻將若之何其為我思身後之計為于偽翻浩曰陛下春秋富盛行就平愈必不得已請陳瞽言自聖代龍興不崇儲貳是以永興之始社稷幾危事見一百十五卷晉安帝義熙五年幾居希翻又音祁今宜早建東宫選賢公卿以為師傅左右信臣以為賓友入總萬幾出撫戎政如此則陛下可以優游無為頥神養夀萬歳之後國有成主民有所歸姦宄息望禍無自生矣皇子燾年將周星嵗星十二年一周天明叡温和立子以長禮之大經若必待成人然後擇之倒錯天倫則召亂之道也倒錯謂廢長立少長知兩翻下同魏主復以問南平公長孫嵩復扶又翻對曰立長則順置賢則人服燾長且賢天所命也帝従之立太平王燾為皇太子使之居正殿臨朝為國副主朝直遙翻以長孫嵩及山陽公奚斤魏收官氏志後魏獻帝弟為達奚氏孝文改為奚氏北新公安同為左輔坐東廂西面崔浩與太尉穆觀散騎常侍代人丘堆為右弼後魏孝文以獻帝第五兄敦丘氏為丘氏坐西廂東面百官總已以聽焉坐東廂者西面坐西廂者東面皆朝拱皇太子帝避居西宫時隠而窺之自隠蔽其身而窺之也聽其決㫁㫁丁亂翻大悦謂侍臣曰嵩宿徳舊臣歴事四世功存社稷嵩事昭成帝及道武帝明元帝及太子燾為四世斤辯捷智謀名聞遐邇聞音問同曉解俗情明練於事觀達於政要識吾㫖趣浩博聞彊識精察天人堆雖無大用然在公専謹以此六人輔相太子吾與汝曹巡行四境伐叛柔服足以得志於天下矣解胡買翻行下孟翻魏嵩實姓拔拔斤姓達奚觀姓丘穆陵堆姓丘敦是時之羣臣出于代北者姓多重複及髙祖遷洛始皆改之舊史惡其煩雜難知故皆従後姓以就簡易今従之魏主又以典東西部劉絜門下奏事代人古弼重直龍翻惡烏路翻易以䜴翻道武天賜四年置侍官侍直左右出納詔命魏書官氏志内入諸姓吐奚氏為古氏直即徒河盧魯元拓跋與慕容段氏同出鮮卑其後强盛謂東種為徒河官氏志内入諸姓吐復伏盧氏為盧氏忠謹公勤使之給侍東宫分典機要宣納辭令太子聰明有大度羣臣時奏所疑帝曰此非我所知當決之汝曹國主也六月壬申以尚書僕射傅亮為中書監尚書令以領軍將軍謝晦領中書令侍中謝方明為丹陽尹方明善治郡治直之翻所至有能名承代前人不易其政必宜改者則以漸移變使無迹可尋戊子長沙景王道憐卒魏建義將軍刁雍冦青州州兵擊破之雍收散卒走保大鄉山魏收地形志濟隂郡乗氏縣有大鄉城雍於容翻秋七月己酉葬武皇帝於初寧陵陵在丹陽建康縣蔣山廟號髙祖河西王䝉遜遣前將軍沮渠成都帥衆一萬耀兵嶺南遂屯五澗盖耀兵于洪池嶺南而還屯五澗也沮子余翻帥讀曰率下同九月秦王熾磐遣征北將軍出連䖍等帥騎六千擊之初魏主聞髙祖克長安見上卷晉安帝義熈十三年大懼遣使請和自是每嵗交聘不絶及髙祖殂殿中將軍沈範等奉使在魏晉置二衛仍置殿中將軍使疏吏翻下同還及河魏主遣人追執之議發兵取洛陽虎牢滑臺崔浩諫曰陛下不以劉裕欻起納其使貢欻許勿翻裕亦敬事陛下不幸今死遽乗喪伐之雖得之不足為美且國家今日亦未能一舉取江南也而徒有伐喪之名禮不伐喪竊為陛下不取為于偽翻臣謂宜遣人弔祭存其孤弱恤其凶災使義聲布於天下則江南不攻自服矣况裕新死黨與未離兵臨其境必相帥拒戰帥讀曰率功不可必不如緩之待其彊臣爭權變難必起難乃旦翻然後命將出師可以兵不疲勞坐收淮北也將即亮翻魏主曰劉裕乗姚興之死而滅之事見一百十七卷晉安帝義熈十二年及上卷義熈十三年今我乗裕喪而伐之何為不可浩曰不然姚興死諸子交爭故裕乗舋伐之今江南無舋不可比也舋與釁同許覲翻魏主不従假司空奚斤節加晉兵大將軍行揚州刺史使督宋兵將軍交州刺史周幾後魏孝文以獻帝次兄普氏之後為周氏吳兵將軍廣州刺史公孫表同入冦晉兵宋兵吳兵鄭兵楚兵等將軍皆魏所置乙巳魏主如灅南宫遂如廣寗晉愍帝建興元年猗盧築新平城於灅北其後築宫於灅南酈道元曰廣寗去平城五十里廣寗縣漢屬上谷郡晉太康中立為郡灅力水翻辛亥魏人築平城外郭周圍三十二里魏主如喬山五代志喬山在涿郡懐戎縣劉昫曰唐媯州懐戎縣後漢上谷之潘縣也遂東如幽州冬十月甲戌還宫魏軍將發公卿集議於監國之前監工銜翻以先攻城與先略地奚斤欲先攻城崔浩曰南人長於守城昔苻氏攻襄陽經年不拔事見一百四卷晉孝武太元三年四年今以大兵坐攻小城若不時克挫傷軍勢敵得徐嚴而來我怠彼鋭此危道也不如分軍略地至淮為限列置守宰收歛租穀則洛陽滑臺虎牢更在軍北絶望南救必㳂河東走不則為囿中之物不讀曰否何憂其不獲也公孫表固請攻城魏主従之於是奚斤等帥步騎二萬帥讀曰率騎竒寄翻濟河營於滑臺之東時司州刺史毛徳祖戍虎牢東郡太守王景度告急於徳祖王景度以東郡太守戍滑臺徳祖遣司馬翟廣等將步騎三千救之翟長伯翻將即亮翻下同先是司馬楚之聚衆在陳留之境聞魏兵濟河遣使迎降魏先悉薦翻使疏吏翻降户江翻以楚之為征南將軍荆州刺史使侵擾北境北謂宋之北境徳祖遣長社令王法政將五百人戍邵陵邵陵縣漢屬汝南郡晉以後屬潁川郡杜佑曰蔡州郾陵縣有古召陵城將軍劉憐將二百騎戍雍丘以備之楚之引兵襲憐不克㑹臺送軍資憐出迎之酸棗民王玉馳以告魏酸棗縣自漢以來屬陳留郡唐屬滑州丁酉魏尚書滑稽引兵襲倉垣康曰滑户入切姓也本滑伯國姬姓其後因國為氏漢有詹事滑典兵吏悉踰城走陳留太守馮翊嚴稜詣斤降魏以王玉為陳留太守給兵守倉垣魏收地形志陳留郡治浚儀縣有倉垣城奚斤等攻滑臺不拔求益兵魏主怒切責之壬辰自將諸國兵五萬餘人南出天關踰恒嶺此即晉孝武大元二十一年燕主垂襲魏平城之路魏主珪既平中山自望都鐵閼鑿恒嶺至代五百餘里將即亮翻下同為斤等聲援秦出連䖍與河西沮渠成都戰禽之沮渠成都時屯五澗十一月魏太子燾將兵出屯塞上魏主南援攻河南之兵故大子屯塞上以備柔然使安定王彌與安同居守守式又翻庚戌奚斤等急攻滑臺拔之王景度岀走景度司馬陽瓚為魏所執不降而死瓚藏旱翻降戸江翻魏主以成皋侯茍兒為兖州刺史鎮滑臺魏書官氏志内入諸姓若干氏為茍氏斤等進擊翟廣等於土樓破之上樓在虎牢東九域志澶州臨河縣有土樓鎮乗勝進逼虎牢毛徳祖與戰屢破之魏主别遣黑矟將軍于栗磾將三千人屯河陽謀取金墉矟色角翻磾于奚翻徳祖遣鎮威將軍竇晃等縁河拒之十二月丙戌魏主至冀州遣楚兵將軍徐州刺史叔孫建將兵自平原濟河徇青兖豫州刺史劉粹遣治中髙道瑾將步騎五百據項城宋豫州領汝南新蔡譙梁陳南頓潁川汝陽汝隂陳留等郡徐州刺史王仲徳將兵屯湖陸徐州領彭城沛下邳蘭陵東海東莞東安琅邪淮陽陽平濟隂北濟隂鍾離馬頭等郡于栗磾濟河與奚斤并力攻竇晃等破之魏主遣中領軍代人娥清期思侯柔然閭大肥將兵七千人㑹周幾叔孫建南渡河軍於碻磝碻磝城臨河津後魏為濟州治所水經注曰城即故荏平縣也癸未兖州刺史徐琰棄尹卯南走水經濟水自須昌縣西北涇漁山東又北過穀城縣西註云濟水側岸有尹卯壘南去漁山四十餘里是穀城縣界故春秋之小穀城也於是泰山髙平金鄊等郡皆没於魏金鄊縣漢屬山陽晉屬髙平盖晉末分置郡也叔孫建等東入青州司馬愛之季之先聚衆於濟東皆降於魏濟水之東則青州界濟子禮翻戊子魏兵逼虎牢青州刺史東莞竺䕫鎮東陽城青州自曹嶷以來治廣固武帝克慕容超夷其城青州遷治東陽城在廣縣西南宋白曰今青州治益都縣州東城即東陽城晉武帝太康初分琅邪立東莞郡青州領齊濟南髙宻樂安平昌北海東萊太原長廣等郡莞音官遣使告急使疏吏翻己丑詔南兖州刺史檀道濟監征討諸軍事監工銜翻與王仲徳共救之廬陵王義真遣龍驤將軍沈叔狸將三千人就劉粹量宜赴援義真時鎮夀陽劉粹時鎮懸瓠驤思將翻量音良秦王熾磐徴秦州牧曇達為左丞相征東大將軍曇徒含翻營陽王諱義符小字車兵武帝長子也后考異曰宋本紀髙氏小史皆作滎陽臧謝晦蔡廓傳作營陽營陽南方郡名也今徒之景平元年春正月己亥朔大赦改元辛丑帝祀南郊魏于栗磾攻金墉癸夘河西太守王涓之棄城走魏主以栗磾為豫州刺史鎮洛陽磾丁奚翻魏主南巡恒嶽恒户登翻丙辰至鄴去年十二月已書魏主至冀州今又書南巡恒嶽必有一誤也己未詔徴豫章太守蔡廓為吏部尚書自晉以來謂吏部尚書為大尚書以其在諸曹之右且其權任要重也廓謂傅亮曰選事若悉以見付不論不論者不復置議論于辭受之際也不然不能拜也亮以語錄事尚書徐羨之語牛倨翻錄事尚書當作録尚書事羨之曰黄散以下悉以委蔡吾徒不復措懐黄散謂黄門侍郎及散騎常侍侍郎也復扶又翻自此以上故宜共參同異廓曰我不能為徐干木署紙尾為于偽翻遂不拜干木羨之小字也選案黄紙錄尚書與吏部尚書連名選案選曹文案也洪邁日葉石林言制敕用黄紙始高宗時非也晉㳟帝時王韶之遷黄門侍郎凡諸詔黄皆其辭也則東晉時已用黄紙冩詔矣又宋明帝時吏部尚書禇淵就赭圻行選是役也皆先戰授位版檄不供由是有黄紙札則宋世就軍補官賞功又多用黄紙矣又徐羨之召蔡廓為吏部尚書廓曰我不能為徐干木署紙尾則是宋世以黄紙為案矣至齊世立左右丞書案之制曰白案則右丞書名在上左丞次書黄案則左丞上書右丞下書雖世逺莫知何者之為黄案何者之為白案所可知者其紙已分黄白二色決矣至東晉時閹人以紙包裹魚肉還家並是五省黄案然則文書之用黄紙其來已乆高宗時凡謄冩詔制以下州縣始皆用黄紙耳槩言詔書用黄紙始於高宗不審也選須絹翻故廓云然沈約論曰蔡廓固辭銓衡恥為志屈豈不知選錄同體義無偏㫁乎吏部典選録尚書兼録諸曹尚書事㫁丁亂翻良以主闇時難不欲居通塞之任銓衡之任得其人則賢路通不得其人則賢路塞塞悉則翻逺矣哉庚申檀道濟軍於彭城魏叔孫建入臨淄所向城邑皆潰平考異曰索虜傳云虜又遣楚兵將軍徐州刺史安公涉歸幡能健越兵將軍青州刺史臨淄侯薛道千陳兵將軍淮州刺史夀張子張模所向城邑皆奔走本紀亦云安平公涉歸冦青州按後魏書無涉歸等姓名盖皆胡中舊名即叔孫建等也竺䕫聚民保東陽城其不入城者使各依據山險芟夷禾稼芟所銜翻魏軍至無所得食濟南太守垣苗帥衆依䕫垣苗棄歴城依䕫濟子禮翻帥讀曰率下同刁雍見魏主於鄴魏主曰叔孫建等入青州民皆藏避攻城不下彼素服卿威信雍先聚兵河濟之間雍于容翻今遣卿助之乃以雍為青州刺史給雍騎使行募兵以取青州魏兵濟河向青州者凡六萬騎騎竒寄翻刁雍募兵得五千人撫慰土民皆送租供軍柔然冦魏邊二月戊辰魏築長城自赤城西至五原延袤二千餘里袤音茂備置戍卒以備柔然丁丑太皇太后蕭氏殂河西王蒙遜及吐谷渾王阿柴皆遣使入貢使疏吏翻庚辰詔以䝉遜為都督涼秦河沙四州諸軍事驃騎太將軍涼州牧河西王以阿柴為督塞表諸軍事安西將軍沙州刺史澆河公吐谷渾據塞外沙漒之地故令督塞表諸軍事澆堅堯翻三月壬子葬孝懿皇后于興寜陵興寜陵在晉陵丹徒縣諌壁里雩山魏奚斤公孫表等共攻虎牢魏主自鄴遣兵助之毛徳祖於城内穴地入七丈分為六道出魏圍外募敢死之士四百人使參軍范道基等帥之從穴中出掩襲其後魏軍驚擾斬首數百級焚其攻具而還還従宣翻又如字魏兵雖退散隨復更合復扶又翻下復嬰未復復作復戰同攻之益急奚斤自虎牢將歩騎三千攻潁川太守李元徳等於許昌元徳等敗走魏以潁川人庾龍為潁川太守戍許昌毛徳祖出兵與公孫表大戰従朝至晡殺魏兵數百㑹奚斤自許昌還合撃徳祖大破之亡甲士千餘人復嬰城自守魏主又遣萬餘人従白沙渡河屯濮陽南濮陽對岸則頓丘之境白沙當在今澶州之界朝議以項城去魏不逺朝直遥翻下同非輕軍所抗使劉粹召高道瑾還夀陽若沈叔狸已進亦宜且追粹奏虜攻虎牢未復南向若遽攝軍捨項城則淮西諸郡無所凴依沈叔狸已頓肥口肥口肥水入淮之口又不宜遽退時李元徳帥散卒二百至項劉粹使助髙道瑾戍守請宥其奔敗之罪朝議並許之乙已魏主畋于韓陵山魏郡鄴縣有韓陵山遂如汲郡至枋頭初毛徳祖在北毛徳祖本滎陽人武帝未取關洛徳祖自北來歸與公孫表有舊表有權略徳祖患之乃與交通音問密遣人說奚斤云表與之連謀毎答表書多所治定此曹操間韓馬之智也説輸芮翻治直之翻表以書示斤斤疑之以告魏主先是表與太史令王亮少同營署好輕侮亮亮奏表置軍虎牢東不得便地故令賊不時滅魏主素好術數以為然積前後忿使人夜就帳中縊殺之先悉薦翻少詩照翻好呼到翻乙夘魏主濟自靈昌津靈昌津古延津也石勒襲劉曜塗出於此以河氷為神靈之助改曰靈昌津遂如東郡陳留叔孫建將三萬騎逼東陽城城中文武纔一千五百人竺䕫垣苗悉力固守時出竒兵擊魏破之魏步騎繞城列陳十餘里大治攻具䕫作四重塹魏人填其三重為橦車以攻城陳讀曰陣重直龍翻治直之也翻橦與撞同傳江翻擣䕫遣人従地道中出以大麻絙挽之令折絙居曽翻大索也又居鄧翻折而設翻魏人復作長圍進攻逾急歴時浸久城轉墮壊墮讀曰隳下隳其同戰士多死傷餘衆困乏旦暮且陷檀道濟至彭城以司青二州並急而所領兵少少詩沼翻不足分赴青州道近竺䕫兵弱乃與王仲徳兼行先敕之甲子劉粹遣李元徳襲許昌斬庾龍元徳因留綏撫并上租糧上時掌翻魏主至盟津于栗磾造浮橋於冶阪津郭緣生述征記曰踐土今冶阪城是水經註河陽縣故城在冶阪西北魏土地記云冶阪城舊名漢祖渡城險固南臨孟津在洛陽西北四十二里盟讀曰孟乙丑魏主引兵北濟西如河内娥清周幾閭大肥徇地至湖陸髙平民屯聚而射之射而亦翻清等盡攻破高平諸縣滅數千家虜掠萬餘口兖州刺史鄭順之戍湖陸以兵少不敢出魏主又遣并州刺史伊樓拔助奚斤攻虎牢伊婁虜複姓樓與婁同毛徳祖隨方抗拒頗殺魏兵而將士稍零落夏四月丁夘魏主如成臯絶虎牢汲河之路北史虎牢乏水城内懸綆汲河魏主令連艦上施轒輼絶其汲路停三日自督衆攻城竟不能下遂如洛陽觀石經石經後漢蔡邕所書者注詳見五十七卷漢靈帝熈平四年遣使祀嵩高使疏吏翻叔孫建攻東陽墮其北城三十許歩墮讀曰隳刁雍請速入建不許遂不克及聞檀道濟等將至雍又謂建曰賊畏官軍突騎以鎖連車為函陳函陳方陳也陳讀曰陣大峴已南處處狹隘車不得方軌雍請將所募兵五千據險以邀之破之必矣将即亮翻時天暑魏軍多疫建曰兵人疫病過半若相持不休兵自死盡何須復戰今全軍而返計之上也己巳道濟軍于臨朐朐音劬長考異曰裴子野宋略依乙巳按厯是月丁夘朔興乙巳必己巳也壬申建等燒營及器械而遁道濟至東陽粮盡不能追竺䕫以東陽城壊不可守移鎮不其城不其縣前漢屬琅邪郡後漢屬東萊􅇿晉屬長廣郡如淳曰其音基賢曰不其故城在今萊州即墨縣西南叔孫建自東陽趨滑臺趨七喻翻道濟分遣王仲徳向尹夘道濟停軍湖陸仲徳未至尹夘聞魏兵己逺還就道濟刁雍遂留鎮尹夘招集譙梁彭沛民五千餘家置二十七營以領之蠻王梅安帥渠帥數十人入貢於魏帥渠帥上讀曰率下所類翻初諸蠻本居江淮之間其後種落滋蔓種章勇翻蔓音萬布於數州東連夀春西通巴蜀北接汝潁徃徃有之在魏世不甚為患及晉稍益繁昌漸為冦暴及劉石亂中原諸蠻無所忌憚漸復北徙伊闕以南滿於山谷矣據史此諸蠻乃盤瓠之後也復扶又翻河西世子政徳攻晉昌克之唐契及弟和甥李寳同奔伊吾唐契以晉昌叛河西見武帝永初二年招集遺民歸附者至二千餘家臣於柔然柔然以契為伊吾王秦王熾磐謂其羣臣曰今宋雖奄有江南夏人雄據關中皆不足與也獨魏主奕世英武賢能為用且䜟云恒代之北當有真人吾將舉國而事之䜟楚譛翻乃遣尚書郎莫者阿胡等入見於魏見賢遍翻貢黄金二百斤并陳伐夏方略閏月丁未魏主如河内登太行至高都高都縣自漢以來屬上黨郡劉昫曰唐澤州晉城縣漢高都縣地行户剛翻叔孫建自滑臺西就奚斤共攻虎牢虎牢被圍二百日被皮義翻無日不戰勁兵戰死殆盡而魏増兵轉多魏人毁其外城毛徳祖於其内更築三重城以拒之魏人又毁其二重徳祖唯保一城晝夜相拒將士眼皆生創重直龍翻人夜不得睡則眼眊燥以手揩之則生創創初良翻下同徳祖撫之以恩終無離心時檀道濟軍湖陸劉粹軍項城沈叔貍軍髙橋皆畏兵彊不敢進丁已魏人作地道以洩虎牢城中井井深四十文深式禁翻山勢峻峭不可得防城中人馬渴乏被創者不復出血重以饑疫被皮義翻復扶又翻重直用翻魏仍急攻之己未城陷將士欲扶徳祖出走徳祖曰我誓與此城俱斃義不使城亡而身存也魏主命將士得徳祖者必生致之將軍代人豆代田執徳祖以獻豆姓也漢書有校尉豆如意將佐在城中者皆為魏所虜唯參軍范道基將二百人突圍南還將即亮翻魏士卒疫死者亦什二三奚斤等悉定司兖豫諸郡縣置守宰以撫之是時司州之地盡入於魏兖州之地自湖陸以南豫州之地自項城以南皆為宋守魏未能悉定諸郡縣也魏主命周幾鎮河南河南人安之徐羨之傅亮謝晦以亡失境土上表自劾劾户槩翻又户徳翻詔勿問徐羨之兄子吳郡太守珮之頗豫政事與侍中王韶之程道惠中書舎人邢安泰潘盛結為黨友時謝晦乆病不堪見客珮之等疑其詐疾有異圖乃稱羨之意以告傅亮欲令亮作詔誅之亮時進中書監中書掌詔命亮曰我等三人同受顧命豈可自相誅戮諸君果行此事亮當角巾步出掖門耳宫門正南門日端門左右二門謂之左掖門右掖門珮之等乃止五月魏主還平城庚考異曰後魏帝紀五月庚寅還次雁門寅車駕至自南廵必一誤今皆不取六月已亥魏宜都文成王穆觀卒丙辰魏主北巡至參合陂秋七月尊帝母張夫人為皇太后魏主如三會屋侯泉魏収地形志秀容郡肆盧縣治新會城真君七年併三㑹城屬焉八月辛丑如馬邑觀灅源灅力水翻柔然冦河西河西王䝉遜命世子政徳擊之政徳輕騎進戰騎竒寄翻為柔然所殺蒙遜立次子興為世子九月乙亥魏主還宫召奚斤還平城留兵守虎牢使娥清周幾鎮枋頭以司馬楚之所將戶口置汝南南陽南頓新蔡四郡晉惠帝分汝隂立新蔡郡分汝南立南頓郡魏未能有四郡之地僑置之耳以益豫州冬十月癸夘魏人廣西宫外垣周二十里平城西宫也魏主珪天賜元年所築秃髪傉檀之死也事見一百十六卷晉安帝義熙十年傉奴沃翻河西王䝉遜遣人誘其故太子虎臺許以番禾西安二郡處之誘音酉番音盤處昌吕翻且借之兵使伐秦報其父讎復取故地虎臺隂許之事泄而止秦王熾磐之后虎臺之妹也熾磐待之如初后密與虎臺謀曰秦本我之仇讎雖以婚姻待之盖時宜耳先王之薨又非天命遺令不治者欲全濟子孫故也治直之翻不治謂被鴆而不解也事見一百十六卷晉安帝義熈十年為人子者豈可臣妾於仇讎而不思報復乎乃與武衛將軍越質洛城謀弑熾磐后妹為熾磐左夫人知其謀而告之熾磐殺后及虎臺等十餘人十一月魏周幾冦許昌許昌潰潁川太守李元徳奔項戊辰魏人圍汝陽汝陽太守王公度亦奔項沈約曰晉太康地志王隠地道無汝陽郡應是江左分汝南立汝陽漢舊縣属汝南郡劉粹遣其將姚聳夫等將兵助守項城將即亮翻魏人夷許昌城毁鍾城以立封疆而還鍾城在泰山界夷許昌以立豫州封疆毁鍾城以立兖州封疆也還從宣翻又如字己巳魏太宗殂年三十二壬申世祖即位世祖諱燾明元皇帝之長子也蕭子顯曰燾字佛狸大赦十二月庚子魏葬明元帝于金陵此雲中之金陵據北史道武帝葬盛樂金陵葢魏諸陵皆曰金陵杜佑曰後魏盛樂縣在雲中郡廟號太宗魏主追尊其母杜貴嬪為密皇后密諡也自司徒長孫嵩以下普增爵位以襄城公盧魯元為中書監㑹稽公劉絜為尚書令㑹工外翻司衛監尉眷散騎侍郎劉庫仁等八人分典四部司衛監盖魏所置以掌宿衛此又一劉庫仁非什翼犍所用之劉庫仁也尉音紆勿翻散悉亶翻騎竒寄翻四部東西南北四部也眷古真之弟子也尉古真見一百六卷晉孝武太元十年以河内鎮將代人羅結為侍中外都大官魏書官氏志内入諸姓叱羅氏為羅氏魏有外都大官内都大官將即亮翻摠三十六曹事結時年一百七精爽不衰杜預曰爽明也魏主以其忠慤親任之使兼長秋卿監典後宫出入卧内監工銜翻年一百一十乃聽歸老朝廷毎有大事遣騎訪焉騎竒寄翻又十年乃卒左光禄大夫崔浩研精經術練習制度魏晉以來左右光禄大夫在光禄大夫上假金章紫綬研精者窮其精力凡朝廷禮儀軍國書詔無不關掌浩不好老莊之書曰此矯誣之說不近人情託聖賢以神其說謂之矯聖賢無是事寓言而加詆謂之誣好呼到翻近其靳翻老聃習禮仲尼所師史記及大戴記皆云仲尼問禮於老聃聃他甘翻豈肯為敗法之書以亂先王之治乎敗補邁翻治直吏翻尤不信佛法曰何為事此胡神及世祖即位左右多毁之帝不得已命浩以公歸第然素知其賢毎有疑議輒召問之浩纎妍潔白如美婦人纎細也妍美好也常自謂才比張良而稽古過之既歸第因修服食養性之術初嵩山道士冦謙之讃之弟也修張道陵之術自言嘗遇老子降命謙之繼道陵為天師張道陵後漢人修五斗米道俗所謂天師也授以辟穀輕身之術及科戒二十卷今道家科戒盖始於此使之清整道教又遇神人李譜文譜博古翻云老子之𤣥孫也授以圖籙真經六十餘卷使之輔佐北方太平真君出天宫靜輪之法其中數篇李君之手筆也謙之奉其書獻於魏主朝野多未之信朝直遙翻崔浩獨師事之従受其術且上書贊明其事曰臣聞聖王受命必有天應河圖洛書皆寄言於蟲獸之文河出圖伏羲象以畫八卦洛出書禹得之以叙九疇故曰龍圖授羲龜書畀姒又尚書中候曰堯沈璧於洛𤣥龜負書背中赤文朱字止于壇畔舜禮壇于河畔黄龍負卷舒圖出于水未若今日人神接對手筆粲然辭㫖深妙自古無比豈可以世俗常慮而忽上靈之命臣竊懼之帝欣然使謁者奉玉帛牲牢祭嵩嶽迎致謙之弟子在山中者以崇奉天師顯揚新法宣布天下起天師道埸於平城之東南重壇五層水經註濕水南逕平城之東水左有大道壇冦謙之所建也濕水即灅水給道士百二十人衣食毎月設厨㑹數千人臣光曰老莊之書大指欲同死生輕去就而為神僊者服餌修鍊以求輕舉鍊草石為金銀谷永説漢成帝曰諸言世有仙人服食不終之藥遙興輕舉登遐倒景覽觀縣圃浮遊蓬萊黄冶變化皆姦人惑衆挾左道懐詐偽以欺㒺世主服餌修鍊以求輕舉即谷永所謂服食不終之藥遙興輕舉者也鍊草石以為金銀即谷永所謂黄冶變化者也其為術正相戾矣是以劉歆七略叙道家為諸子神仙為方技以其相戾故七略不得合為一其後復有符水禁呪之術符水禁呪即張道陵之術至謙之遂合而為一至今循之其訛甚矣崔浩不喜佛老之書而信謙之之言其故何哉喜許記翻昔臧文仲祀爰居孔子以為不智海鳥爰居避風止于魯東門之外臧文仲使國人祀之孔子以為臧文仲不智者三祀爰居其一也如謙之者其為爰居亦大矣詩三百一言以蔽之曰思無邪君子之於擇術可不慎哉資治通鑑卷一百十九
