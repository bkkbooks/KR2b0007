  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷八十八宋司馬光撰胡三省音註晉紀十起𤣥黓涒灘盡昭陽作噩凡二年孝懷皇帝下永嘉六年春正月漢呼延后卒諡曰武元漢鎮北將軍靳冲平北將軍卜珝冦并州靳居焮翻姓也珝况羽翻辛未圍晉陽甲戌漢主聰以司空王育尚書令任顗女為左右昭儀任音壬顗魚豈翻中軍大將軍王彰中書監范隆左僕射馬景女皆為夫人右僕射朱紀女為貴妃皆金印紫綬綬音受聰將納太保劉殷女太弟义固諫聰以問太宰延年太傅景皆曰太保自云劉康公之後與陛下殊源劉康公周之卿士食采於劉其後因以為氏劉聰匈奴之後以漢之甥冒姓劉氏故云殊源納之何害聰恱拜殷二女英娥為左右貴嬪位在昭儀上嬪毗賓翻又納殷女孫四人皆為貴人位次貴妃於是六劉之寵傾後宫聰希復出外復扶又翻事皆中黄門奏决故新野王歆牙門將胡亢聚衆於竟陵亢音剛自號楚公冦掠荆土以歆南蠻司馬新野杜曽為竟陵太守曽勇冠三軍能被甲游於水中為曽亂荆州張本冠古玩翻被皮義翻二月壬子朔日有食之石勒築壘於葛陂皇覽曰汝南郡鮦陽縣有葛陂賢曰葛陂在今豫州新蔡縣西北課農造舟將攻建業琅邪王睿大集江南之衆於壽春以鎮東長史紀瞻為揚威將軍都督諸軍以討之睿為鎮東大將軍署瞻長史㑹大雨三月不止勒軍中饑疫死者大半聞晉軍將至集將佐議之右長史刁膺請先送欵於睿求掃平河朔以自贖俟其軍退徐更圖之勒愀然長嘯愀子小翻中堅將軍䕫安請就高避水中堅將軍葢石勒所置姓譜䕫徃春秋䕫子之後勒曰將軍何怯邪孔萇等三十餘將請各將兵分道夜攻壽春斬呉將頭據其城食其粟要以今年破丹陽定江南勒笑曰是勇將之計也言其不逆計勝敗但勇於赴敵耳將即亮翻各賜鎧馬一疋鎧可亥翻疋僻吉翻顧謂張賓曰於君意何如賓曰將軍攻陷京師囚執天子殺害王公妻略妃主擢將軍之髪不足以數將軍之罪擢抜也抜其髪以數其罪猶不足言其罪多也數所具翻奈何復相臣奉乎復扶又翻去年既殺王彌不當來此今天降霖雨於數百里中示將軍不應留此也鄴有三臺之固水經註鄴城西北有三臺皆因城為之基漢建安十五年魏武所起中曰銅臺高十丈其後石虎更増二丈南則金虎臺高八丈北則氷井臺亦高八丈西接平陽謂近漢都可以壯聲援山河四塞宜北徙據之以經營河北河北既定天下無處將軍之右者矣處昌吕翻晉之保壽春畏將軍徃攻之耳彼聞吾去喜於自全何暇追襲吾後為吾不利邪自古國於東南率多為自保之計亦自量其力之不足以進也賓料之審矣將軍宜使輜重從北道先發將軍引大兵向壽春輜重既逺重直用翻大兵徐還何憂進退無地乎勒攘袂鼓髯曰張君計是也責刁膺曰君既相輔佐當共成大功奈何遽勸孤降降户江翻此䇿應斬然素知君怯特相宥耳於是黜膺為將軍擢賓為右長史號曰右侯勒引兵發葛陂遣石虎帥騎二千向壽春帥讀曰率騎奇寄翻遇晉運船虎將士爭取之為紀瞻所敗敗補邁翻瞻追犇百里前及勒軍勒結陳待之陳讀曰陣瞻不敢擊退還壽春漢主聰封帝為㑹稽郡公㑹工外翻加儀同三司聰從容謂帝曰卿昔為豫章王朕與王武子造卿武子稱朕於卿從于容翻王濟字武子造七到翻卿言聞其名久矣贈朕柘弓銀研研與硯同卿頗記否帝曰臣安敢忘之但恨爾日不早識龍顔聰曰卿家骨肉何相殘如此帝曰大漢將應天受命故為陛下自相驅除為于偽翻此殆天意非人事也且臣家若能奉武皇帝之業九族敦睦陛下何由得之聰喜以小劉貴人妻帝妻七細翻曰此名公之孫也卿善遇之代公猗盧遣兵救晉陽三月乙未漢兵敗走卜珝之卒先奔靳冲擅收珝斬之聰大怒遣使持節斬冲使疏吏翻聰納其舅子輔漢將軍張寔二女徽光麗光為貴人此别一張寔非河西張軌之子太后張氏之意也張氏淵之側室生聰尊為太后涼州主簿馬魴說張軌魴符方翻說輸芮翻宜命將出師翼戴帝室軌從之馳檄關中共尊輔秦王且言今遣前鋒督䕶宋配帥步騎二萬徑趨長安帥讀曰率趨七喻翻西中郎將寔帥中軍三萬武威太守張琠帥胡騎二萬絡繹繼發琠它典翻絡繹相繼不絶之意夏四月丙寅征南將軍山簡卒漢王聰封其子敷為渤海王驥為濟南王鸞為燕王鴻為楚王勱為齊王勱音邁權為秦王操為魏王持為趙王聰以魚蟹不供斬左都水使者襄陵王攄襄陵縣漢屬河東郡晉屬平陽郡觀後所謂亟斬王公則攄亦劉氏也攄抽居翻作温明徽光二殿未成斬將作大匠望都公靳陵觀漁於汾水昏夜不歸中軍大將軍王彰諌曰比觀陛下所為臣實痛心疾首比毗至翻今愚民歸漢之志未專思晉之心猶盛劉琨咫尺刺客縱横謂平陽去晉陽不逺也縱子容翻帝王輕出一夫敵耳願陛下改徃修來則億兆幸甚聰大怒命斬之王夫人叩頭乞哀乃囚之王夫人彰女也太后張氏以聰刑罰過差三日不食太弟义單于粲輿櫬切諫聰怒曰吾豈桀紂而汝輩生來哭人太宰延年太保殷等公卿列矦百餘人皆免冠涕泣曰陛下功高徳厚曠世少比少詩沼翻徃也唐虞今則陛下而頃來以小小不供亟斬王公直言忤㫖遽囚大將王公謂劉攄靳陵大將謂王彰亟欺冀翻忤五故翻此臣等竊所未解解户買翻曉也故相與憂之忘寢與食聰慨然曰朕昨大醉非其本心微公等言之朕不聞過各賜帛百匹使侍中持節赦彰曰先帝頼君如左右手君著勲再世朕敢忘之此段之過希君蕩然君能盡懷憂國朕所望也今進君驃騎將軍定襄郡公驃匹妙翻後有不逮幸數匡之數所角翻王彌既死事見上卷上年漢安北將軍趙固平北將軍王桑恐為石勒所并欲引兵歸平陽軍中乏糧士卒相食乃自䂭磽津西渡䂭丘交翻磽牛交翻劉琨以兄子演為魏郡太守鎮鄴桑恐演邀之遣長史臨深為質於琨姓譜臨姓大臨之後質音致琨以固為雍州刺史雍於用翻下同桑為豫州刺史賈疋等圍長安數月漢中山王曜連戰皆敗驅掠士女八萬餘口犇于平陽秦王業自雍入于長安雍於用翻五月漢主聰貶曜為龍驤大將軍行大司馬驤思將翻聰使河内王粲攻傅祇於三渚據祇𫝊祇屯盟津小城盟冿河平矦祠有二渚又有淘渚故亦曰三渚右將軍劉參攻郭黙於懐㑹祇病薨城陷粲遷祇子孫并其士民二萬餘户于平陽六月漢主聰欲立責嬪劉英為皇后張太后欲立貴人張徽光聰不得已許之英尋卒漢大昌文獻公劉殷卒宋白曰隰州隰川縣漢蒲子縣劉淵僭亂置大昌郡殷為相不犯顔忤㫖忤五故翻然因事進規補益甚多漢主聰每與羣臣議政事殷無所是非羣臣出殷獨留為聰敷暢條理商榷事宜商度也榷者舉其略也為于偽翻榷古岳翻聰未嘗不從之殷常戒子孫曰事君當務㡬諫凡人尚不可面斥其過况萬乘乎夫㡬諫之功無異犯顔但不彰君之過所以為優耳㡬諫者見微而諫也侯希聖曰事君有顯諫者有㡬諫者然而温柔忠厚者其說多行訐直强勁者其說多忤夫是以貴㡬諫也㡬居希翻乗繩證翻官至侍中太保録尚書賜劒履上殿入朝不趨乘輿入殿然殷在公卿間常恂恂有卑讓之色故能處驕暴之國保其富貴不失令名以壽考自終處昌呂翻漢主聰以河間王易為車騎將軍彭城王翼為衛將軍並典兵宿衛高平王悝為征南將軍鎮離石悝苦回翻濟南王驥為征西將軍築西平城以居之西平城當築於平陽西濟子禮翻魏王操為征東將軍鎮蒲子趙固王桑自懐求迎於漢漢主聰遣鎮逺將軍梁伏疵將兵迎之未至長史臨深將軍牟穆帥衆一萬叛歸劉演固隨疵而西疵疾移翻帥讀曰率下同桑引其衆東奔青州固遣兵追殺之於曲梁曲梁縣屬廣平郡曹魏置廣平郡始曲梁城劉昫曰唐洺州永年縣漢曲梁縣地也桑將張鳳帥其餘衆歸演聰以固為荆州刺史領河南太守鎮洛陽石勒自葛陂北行所過皆堅壁清野虜掠無所獲軍中饑甚士卒相食至東燕據水經東燕城在酸棗縣東河水自酸棗東北過延津又逕東燕縣故城北余攷兩漢志東郡有燕縣無東燕縣其即是歟魏收地形志東燕縣晉屬濮陽國賢曰東燕故城今滑州胙城縣燕於賢翻聞汲郡向冰聚衆數千壁枋頭水經淇水至黎陽入河在遮害亭西十八里漢建安九年魏武於水口下大枋木以成堰遏淇水東入白溝以通漕運故時人號其處曰枋頭杜佑曰枋頭在今汲郡衛縣界宋白曰枋頭城在今衛縣南去河八里向式亮翻姓也枋音方勒將濟河恐氷邀之張賓曰聞冰船盡在瀆中未上未上者未上岸船不用則推之登陸使逺水而燥他日輕便於駕用上時掌翻宜遣輕兵間道襲取以濟大軍間古莧翻大軍既濟氷必可擒也秋七月勒使支雄孔萇自文石津縛筏潛渡取其船勒引兵自棘津濟河水經河水逕東燕縣故城北河水於是有棘津之名擊冰大破之盡得其資儲軍埶復振遂長驅至鄴劉演保三臺以自固臨深牟穆等復帥其衆降於勒復扶又翻帥讀曰率並下同降户江翻下同諸將欲攻三臺張賔曰演雖弱衆猶數千三臺險固攻之未易猝抜易以豉翻捨而去之彼將自潰方今王彭祖劉越石公之大敵也王浚字彭祖劉琨字越石宜先取之演不足顧也且天下饑亂明公雖擁大兵遊行羈旅人無定志非所以保萬全制四方也不若擇便地而據之廣聚糧儲西稟平陽以圖幽并幽王浚并劉琨此霸王之業也邯鄲襄國形勝之地邯鄲縣漢屬趙國晉屬廣平襄國縣秦為信都項羽改曰襄國漢屬趙國晉屬廣平而信都别為縣前漢屬信都國後漢屬安平國邯鄲音寒丹宋白曰隋改襄國為龍岡縣唐為邢州所治也請擇一而都之勒曰右矦之計是也遂進據襄國賓復言於勒曰今吾居此彭祖越石所深忌也恐城塹未固資儲未廣二冦交至塹七艷翻宜亟收野榖且遣使至平陽具陳鎮此之意使疏吏翻下同勒從之分命諸將攻冀州郡縣壁壘多降運其榖以輸襄國且表於漢主聰聰以勒為都督冀幽并營四州諸軍事營州不在晉太康地志十九州之數晉地理志咸寧二年分昌黎遼東𤣥莵帶方樂浪等郡國五置平州至慕容熈據和龍始於宿軍置營州以刺史鎮之拓抜魏置營州於和龍勒時未有營州也郡國志營州地當營室分故曰營州冀州牧進封上黨公劉琨移檄州郡期以十月㑹平陽擊漢琨素奢豪喜聲色喜許記翻河南徐潤以音律得幸於琨琨以為晉陽令潤驕恣干預政事䕶軍令狐盛數以為言令狐之令力丁翻數所角翻且勸琨殺之琨不從潤譖盛於琨琨收盛殺之琨母曰汝不能駕御豪傑以恢逺略而專除勝已禍必及我盛子泥奔漢具言虛實漢主聰大喜遣河内王粲中山王曜將兵冦并州以令狐泥為鄉導鄉讀曰嚮琨聞之東出收兵於常山及中山使其將郝詵張喬將兵拒粲郝呼各翻且遣使求救於代公猗盧詵喬俱敗死粲曜乗虛襲晉陽太原太守高喬并州别駕郝聿以晉陽降漢劉考異曰琨傳曰屬龎醇降于聰鴈門烏丸復反琨親出禦之粲乘虚襲取晉陽按琨上太子牋曰聰以七月十六日復决計送死臣即自東下率中山常山之卒並合樂平上黨諸軍未旋之間而晉陽傾潰十六國春秋亦云琨收兵常山本傳誤也八月庚戌琨還救晉陽不及帥左右數十騎奔常山辛亥粲曜入晉陽壬子令狐泥殺琨父母粲曜送尚書盧志侍中許遐太子右衛率崔瑋于平陽聰復以曜為車騎大將軍以前將軍劉豐為并州刺史鎮晉陽九月聰以盧志為太弟太師崔瑋為太傅謝遐為太保高喬令狐泥皆為武衛將軍己卯漢衛尉梁芬奔長安辛巳賈疋等奉秦王業為皇太子云考異曰懷帝紀賈疋討劉粲於三輔走之闗中小定奉秦王為太子按賈疋等以永嘉五年攻劉粲于新豐粲敗還平陽奉秦王入雍城六年三月劉曜弃長安走秦王入長安漢兵皆已退矣秦王為太子時劉粲方在晉陽懷紀誤建行臺於長安祭壇告類告類或攝或即位祭天之禮舜之攝也肆類于上帝孔安國注曰類謂攝位事類遂以攝告天及五帝湯黜夏命昭告于上天神后皆其事也建宗廟社稷大赦以閻鼎為太子詹事總攝百揆太子詹事統攝宫僚時太子建行臺故以詹事緫百揆時位號未正其實丞相之職也加賈疋征西大將軍以秦州刺史南陽王保為大司馬命司空荀藩督攝逺近光禄大夫荀組領司𨽻校尉行豫州刺史與藩共保開封開封縣漢屬河南郡晉屬滎陽郡秦州刺史裴苞據險以拒涼州兵張寔宋配等擊破之苞奔柔凶塢冬十月漢主聰封其子恒為代王恒户登翻逞為呉王朗為潁川王臯為零陵王旭為丹陽王京為蜀王坦為九江王晃為臨川王以王育為太保王彰為太尉任顗為司徒顗魚豈翻馬景為司空朱紀為尚書令范隆為左僕射呼延晏為右僕射代公猗盧遣其子六修及兄子普根將軍衛雄范班箕澹帥衆數萬為前鋒以攻晉陽澹徒覽翻又徒濫翻孫考異曰十六國春秋云遣其子利宥六須載記云賓六須劉琨集云左右賢王又云右賢王撲速根本從後魏書考異又曰箕澹十六國春秋後魏書作姬澹今從劉琨傳猗盧自帥衆二十萬繼之劉琨收散卒數千為之鄉導鄉讀曰嚮六修與漢中山王曜戰於汾東曜兵敗墜馬中七創中竹仲翻創初良翻下同討虜將軍傅虎以馬授曜曜不受曰卿當乘以自免吾創已重自分死此分扶問翻虎泣曰虎䝉大王識抜至此常思效命今其時矣且漢室初基天下可無虎不可無大王也乃扶曜上馬驅令渡汾自還戰死曜入晉陽夜與大將軍粲鎮北大將軍豐掠晉陽之民踰䝉山而歸五代志太原郡石艾縣有䝉山魏收曰石艾縣即漢晉之上艾縣也晉志上艾縣屬樂平郡又據五代志晉陽縣有䝉山此葢䝉山跨晉陽石艾二縣界也十一月猗盧追之戰於藍谷藍谷在䝉山西南漢兵大敗擒劉豐斬邢延等三千餘級邢延叛琨見上卷五年伏尸數百里猗盧因大獵壽陽山壽陽山在樂平壽陽縣魏收地形志作壽陽縣此縣葢晉置也宋白曰壽陽縣本漢榆次縣地晉置壽陽縣陳閱皮肉山為之赤劉琨自營門步入拜謝固請進軍猗盧曰吾不早來致卿父母見害誠以相愧今卿已復州境吾逺來士馬疲弊且待後舉劉聰未可滅也遺琨馬牛羊各千餘疋車百乗而還遺于季翻乗繩證翻留其將箕澹段繁等戌晉陽琨徙居陽曲陽曲縣屬太原郡在晉陽北招集亡散盧諶為劉粲參軍亡歸琨諶時壬翻漢人殺其父志考異曰劉聰載記志勸太弟义作亂被誅按志勸成都王穎起義兵諫穎攻長沙王义忠義敦篤始終不虧非勸义作亂者也今從盧諶傳及弟謐詵贈傅虎幽州刺史十二月漢主聰立皇后張氏以其父寔為左光禄大夫彭仲蕩之子天䕶帥羣胡攻賈疋天䕶陽不勝而走疋追之夜墜澗中天䕶執而殺之疋音雅疋殺彭仲蕩事見上卷五年考異曰帝紀曰疋討賊張連遇害疋𫝊天䕶攻之疋敗走墜澗死今從十六國春秋漢以天䕶為涼州刺史衆推始平太守麴允領雍州刺史閻鼎與京兆太守梁綜爭權鼎遂殺綜麴允與撫夷䕶軍索綝馮翊太守梁肅合兵攻鼎鼎出犇雍為氐竇首所殺胡羯方强賈閻麴索降心相從協力以輔晉室猶懼不能全况自相屠乎長安之敗徴見於此矣雍於用翻廣平游綸張豺擁衆數萬據苑鄉姓譜游廣平望姓鄭公子偃字子游其後以為氏魏收志廣平郡任縣有范鄉城宋白曰任縣後漢南􅒋縣地後趙石氏於此置苑鄉縣唐為任縣屬邢州受王浚假署假署者承制權宜而補署假以職名石勒遣䕫安支雄等七將攻之破其外壘浚遣督䕶王昌帥諸軍及遼西公段疾陸眷考異曰石勒載記及後魏書作就陸眷今從王浚傳疾陸眷弟匹磾文鴦從弟末柸磾丁奚翻從才用翻從考異曰後魏書作未破今王浚傳部衆五萬攻勒於襄國疾陸眷屯于渚陽班固地理志禹貢絳水在信都入海水經註絳瀆北逕信都城東散入澤渚西至信都城東連于廣川縣張甲故瀆同歸于海疾陸眷葢屯是渚之陽也勒遣諸將出戰皆為疾陸眷所敗敗補邁翻陸眷大造攻具將攻城勒衆甚懼勒召將佐謀之曰今城塹未固糧儲不多彼衆我寡外無救援吾欲悉衆與之决戰何如諸將皆曰不如堅守以疲敵待其退而擊之張賓孔萇曰鮮卑之種種章勇翻段氏最為勇悍悍下罕翻又矦肝翻而末柸尤甚其銳卒皆在末柸所今聞疾陸眷刻日攻北城其大衆逺來戰鬬連日謂我孤弱不敢出戰意必懈惰懈古隘翻宜且勿出示之以怯鑿北城為突門二十餘道墨子備突篇曰城百步一突門突門用車兩輪以木束之塗其上維置突門内度門廣狹之令人入門四尺中置窐突門旁為槖充竈狀又置艾冦即入下輪而塞之鼓槖薰之也杜佑曰突門鑿城内為闇門多少臨事令五六寸勿穿或於中夜於敵初來營列未定精騎從突門躍出擊其無備襲其不意俟其來至列守未定出其不意直衝末柸帳彼必震駭不暇為計破之必矣末柸敗則其餘不攻而潰矣勒從之宻為突門既而疾陸眷攻北城勒登城望之見其將士或釋仗而寢乃命孔萇督銳卒自突門出擊之見其釋仗而寢知其懈也乃命萇出戰所謂見兵執者也城上鼓譟以助其勢萇攻末柸帳不能克而退末柸逐之入其壘門為勒衆所獲疾陸眷等軍皆退走萇乘勝追擊枕尸三十餘里枕職任翻獲鎧馬五千匹鎧可亥翻疾陸眷收其餘衆還屯渚陽勒質末柸質音致下同遣使求和於疾陸眷使疏吏翻疾陸眷許之文鴦諫曰今以末柸一人之故而縱垂亡之虜得無為王彭祖所怨招後患乎疾陸眷不從復以鎧馬金銀賂勒復扶又翻下同且以末柸三弟為質而請末柸諸將皆勸勒殺末柸勒曰遼西鮮卑健國也與我素無仇讐為王浚所使耳今殺一人而結一國之怨非計也歸之必深德我不復為浚用矣乃厚以金帛報之遣石虎與疾陸眷盟于渚陽結為兄弟疾陸眷引歸王昌不能獨留亦引兵還薊勒召末柸與之燕飲誓為父子遣還遼西末柸在塗日南嚮而拜者三由是段氏專心附勒王浚之勢遂衰孫武所謂親而離之此其近之矣然段氏專心附勒者末柸也若匹磾文鴦則終身與勒抗游綸張豺請降於勒降户江翻勒攻信都殺冀州刺史王象浚復以邵舉行冀州刺史保信都是嵗大疫王澄少與兄衍名冠海内少詩照翻冠古玩翻劉琨謂澄曰卿形雖散朗而内實動俠言其心輕易動又豪俠自喜也以此處世處昌吕翻難得其死及在荆州悅成都内史王機謂為已亞使之内綜心膂綜機縷也所以持經而施緯使不失其條理者也故謂能統理衆事者為綜理外為爪牙澄屢為杜弢所敗弢土刀翻敗補邁翻望實俱損猶傲然自得無憂懼之意但與機日夜縱酒博奕由是上下離心南平太守應詹屢諫不聽澄自出軍擊杜弢軍于作塘作塘縣後漢屬武陵郡晉屬南平郡五代志澧陽郡孱陵縣舊曰作塘故山簡參軍王冲擁衆迎應詹為刺史詹以冲無賴棄之還南平南平郡治江安冲乃自稱刺史澄懼使其將杜㽔守江陵徙治孱陵孱陵縣漢屬武陵郡晉屬南平郡應劭曰孱音踐師古音士連翻劉昫曰澧州安鄉縣漢孱陵地尋又犇沓中此沓中非姜維種麥之沓中葢在孱陵之東别駕郭舒諫曰使君臨州雖無異政然一州人心所繫今西收華容之兵足以擒此小醜華容縣屬南郡奈何自棄遽為奔亡乎澄不從欲將舒東下舒曰舒為萬里紀綱舒為州别駕故自謂萬里紀綱不能匡正令使君犇亡誠不忍渡江乃留屯沌口水經註沌水南通沔陽縣之太白湖湖水東南通江謂之沌口沌持兖翻琅邪王睿聞之召澄為軍諮祭酒以軍諮祭酒周顗代之澄乃赴召顗始至州顗魚里翻建平流民傅宻等叛迎杜弢弢别將王真襲沔陽沔陽梁武帝時方置郡據沈約志陶侃為荆州刺史初治沔陽則是時已有沔陽城矣當屬竟陵郡界宋白曰復州沔陽縣漢縣也郡國志曰沔陽縣即楚王城顗狼狽失據征討都督王敦遣武昌太守陶侃尋陽太守周訪厯陽内史甘卓懷帝永嘉五年睿加敦都督征討諸軍事惠帝永興元年分淮南之烏江厯陽二縣置厯陽郡共擊弢郭進屯豫章為諸軍繼援敦考異曰王澄傳曰時王敦為江州鎮豫章按時為揚州刺史都督征討諸軍非為江州也王澄過詣敦自以名聲素出敦右猶以舊意侮敦敦怒誣其與杜弢通信遣壯士搤殺之搤乙革翻王機聞澄死懼禍以其父毅兄矩皆嘗為廣州刺史就敦求廣州敦不許㑹廣州將温邵等叛刺史郭訥迎機為刺史機遂將奴客門生千餘人入廣州豫考異曰王澄死周顗敗王敦鎮章機入廣州紀傳皆無年月按衛玠傳玠依敦於豫章以永嘉六年卒故附於此訥遣兵拒之將士皆機父兄時部曲王機父毅為廣州刺史甚得南越之情不戰迎降降户江翻下同訥乃避位以州授之王如軍中饑乏官軍討之其黨多降如計窮遂降於王敦考考異曰如降亦無年月明年有如餘黨入漢中故附此鎮東軍司顧榮前太子洗馬衛玠皆卒洗悉薦翻玠瓘之孫也美風神善清談常以為人有不及可以情恕非意相干可以理遣故終身不見喜愠之色見賢遍翻江陽太守張啟江陽縣漢屬犍為郡劉蜀分置江陽郡隋併入陵州隆山縣唐為眉州彭山縣殺益州刺史王異而代之異行三府事見上卷五年啟翼之孫也尋病卒三府文武共表涪陵太守向沈行西夷校尉南保涪陵沈持林翻涪音浮南安赤亭𦍑姚弋仲東徙榆眉水經註漢靈帝分獂道為南安郡赤亭水出郡之東山赤谷西流逕城北南入渭水謂之赤亭川榆眉即漢扶風之隃麋縣晉省宋白曰隴州汧源縣東有隃麋澤有古城呉山縣亦漢榆麋縣地戎夏襁負隨之者數萬自稱䕶𦍑校尉雍州刺史扶風公夏户雅翻雍於用翻孝愍皇帝上諱鄴字彦旗武帝孫呉孝王晏之子也出繼伯父秦王東後襲封秦王諡灋禍亂方作曰愍在國遭憂曰愍建興元年是年夏四月方改元建興春正月丁丑朔漢主聰宴羣臣於光極殿使懐帝著青衣行酒著陟略翻庾珉王雋等不勝悲憤因號哭聰惡之勝音升號户刀翻惡烏路翻有告珉等謀以平陽應劉琨者二月丁未聰殺珉雋等故晉臣十餘人永嘉三年珉雋與帝俱没于虜懷帝亦遇害年三十大赦復以㑹稽劉夫人為貴人永嘉六年聰以夫人妻帝聰封帝為㑹稽公故曰㑹稽劉夫人㑹工外翻荀崧曰懐帝天資清劭劭高也少著英猷少詩照翻若遇承平足為守文佳主而繼惠帝擾亂之後東海專政故無幽厲之釁而有流亡之禍矣乙亥漢太后張氏卒諡曰光獻張后不勝哀丁丑亦卒諡曰武孝張后張太后之姪女勝音升己卯漢定襄忠穆公王彰卒三月漢主聰立貴嬪劉娥為皇后為之起䳨儀殿雄曰鳳雌曰䳨書曰鳳凰來儀為于偽翻下更為下為同廷尉陳元達切諫以為天生民而樹之君使司牧之非以兆民之命窮一人之欲也晉氏失徳大漢受之蒼生引領庶㡬息肩是以光文皇帝劉淵諡光文㡬居希翻身衣大布居無重茵衣於既翻下同重直龍翻后妃不衣錦綺乘輿馬不食粟愛民故也乘繩證翻陛下踐阼以來已作殿觀四十餘所加之軍旅數興觀古玩翻數所角翻餽運不息饑饉疾疫死亡相繼而益思營繕豈為民父母之意乎今有晉遺類西據闗中南擅江表李雄奄有巴蜀王浚劉琨窺窬肘腋石勒曹嶷貢禀漸疎嶷魚力翻貢謂貢獻稟謂稟承詔命陛下釋此不憂乃更為中宫作殿豈目前之所急乎為于偽翻昔太宗居治安之世粟帛流衍猶愛百金之費免露臺之役事見十五卷漢文帝後七年治直吏翻陛下承荒亂之餘所有之地不過太宗之二郡時聰所有之地漢河東西河二郡耳戰守之備非特匈奴南越而已漢文帝時惟備匈奴南越而宫室之侈乃至於此臣所以不敢不冒死而言也聰大怒曰朕為天子營一殿何闗汝鼠子乎乃敢妄言沮衆沮在吕翻不殺此鼠子朕殿不成命左右曵出斬之并其妻子同梟首東市梟堅堯翻使羣鼠共宂時聰在逍遥園李中堂元達先鎖腰而入即以鎖鎖堂下樹呼曰臣所言者社稷之計而陛下殺臣朱雲有言臣得與龍逢比干遊足矣朱雲事見三十二卷漢成帝元延元年呼火故翻逢蒲江翻左右曵之不能動大司徒任顗任音壬顗魚豈翻光禄大夫朱紀范隆驃騎大將軍河間王易等叩頭出血曰元達為先帝所知受命之初即引置門下見八十五卷惠帝永興元年盡忠竭慮知無不言臣等竊禄偷安毎見之未嘗不發愧今所言雖狂直願陛下容之因諫諍而斬列卿其如後世何聰黙然劉后聞之宻敕左右停刑手䟽上言今宫室已備無煩更營四海未壹宜愛民力廷尉之言社稷之福也陛下宜加封賞而更誅之四海謂陛下何如哉夫忠臣進諫者固不顧其身也而人主拒諫者亦不顧其身也陛下為妾營殿而殺諫臣使忠良結舌者由妾逺近怨怒者由妾公私困弊者由妾社稷阽危者由妾為于偽翻阽服䖍音反玷之坫孟康音屋檐之檐如淳曰阽近邊知墮意天下之罪皆萃於妾妾何以當之妾觀自古敗國䘮家敗補邁翻䘮息浪翻未始不由婦人心常疾之不意今日身自為之使後世視妾由妾之視昔人也由與猶通洪氏𨽻釋曰古字多以由通為猶字樊毅修華嶽碑由復夕愓余謂樊碑之由其義尚也此由如也妾誠無面目復奉巾櫛櫛側瑟翻梳枇總名復扶又翻下同願賜死此堂以塞陛下之過塞悉則翻聰覽之變色任顗等叩頭流涕不已聰徐曰朕比年已來微得風疾比毗至翻喜怒過差不復自制元達忠臣也朕未之察諸公乃能破首明之誠得輔弼之義也朕愧戢于心戢側立翻藏也何敢忘之命顗等冠履就坐坐徂卧翻引元達上上時掌翻升堂也以劉氏表示之曰外輔如公内輔如后朕復何憂賜顗等榖帛各有差更命逍遥園曰納賢園李中堂曰愧賢堂更工衡翻聰謂元達曰卿當畏朕而反使朕畏卿耶西夷校尉向沈卒衆推汶山太守蘭維為西夷校尉向式亮翻姓也沈持林翻汶音岷姓譜鄭穆公名蘭支庶以為氏漢有武陵太守蘭廣又匈奴傳亦有蘭氏非此蘭也維率吏民北出欲向巴東欲歸晉也成將李恭費黒邀擊獲之將即亮翻費扶沸翻夏四月丙午懐帝凶問至長安皇太子舉哀因加元服鄭樵通志略曰魏氏天子冠一加其說曰古之士禮冠必三加彌尊所以喻其志至於天子諸侯無加數之文者將以踐阼臨人尊極徳成不復與士以加喻勉為義禮冠於廟自魏不復在廟矣冠太子再加是時蓋仍魏禮壬申即皇帝位大赦改元始改元建興以衛將軍梁芬為司徒雍州刺史麴允為尚書左僕射録尚書事雍於用翻京兆太守索綝為尚書右僕射領吏部京兆尹索昔各翻綝丑林翻是時長安城中户不盈百蒿棘成林公私有車四乗乗繩證翻百官無章服印綬唯桑版署號而已尋以索綝為衛將軍領太尉軍國之事悉以委之漢中山王曜司𨽻校尉喬智明冦長安平西將軍趙染帥衆赴之帥讀曰率下同詔麴允屯黄白城以拒之石勒使石虎攻鄴鄴潰劉演犇廩丘廩丘縣前漢屬東郡後漢屬濟隂郡晉屬濮陽國賢曰廩丘故城在今濮州雷澤縣北三臺流民皆降於勒降户江翻勒以桃豹為魏郡太守以撫之久之以石虎代豹鎮鄴初劉琨用陳留太守焦求為兖州刺史荀藩又用李述為兖州刺史述欲攻求琨召求還及鄴城失守琨復以劉演為兖州刺史鎮廩丘前中書侍郎郗鑒少以清節著名帥高平千餘家避亂保嶧山水經註嶧山在鄒縣北繹邑之所依以為名也山東西二十里高秀獨出積石相臨殆無土壤石間多孔穴洞達相通徃徃有如數間屋處其俗謂之嶧孔遭亂輒將家入嶧外冦雖衆無所施害晉永嘉中郗鑒保此山今山南有大嶧名曰鄒公嶧詩所謂保有鳬繹復扶又翻少詩照翻帥讀曰率嶧音亦琅邪王睿就用鑒為兖州刺史鎮鄒山鄒山在魯郡鄒縣相考異曰劉琨集建興二年十一月壬寅朔與丞牋曰焦求雖出寒鄉有文武膽幹茍晞用為陳留太守獨在河南距當石勒撫綏有方琨以求行領兖州刺史後聞荀公以李述為兖州以素論門望不可與求同日而論至於膽幹可以處危權一時之用李述亦不能及求而王𤣥年少便欲共討求琨以求已與𤣥構隙便召還而州界民物甚不安服連二千石及文武大姓連遣信使求刺史是以遣兄子演代求領兖州事徃年春正月遣詣鄴至是斬王桑走趙固云云今勒據襄國逼近鄴城故令演轉南演今治在廩丘而李述郗鑒並欲爭兖州或云為荀公所用或云為明公所用大冦未殄而自共尋干戈此以大潰也輒敕演謹自守而已按王桑趙固之敗及石勒攻鄴皆在永嘉六年琨牋又云傳長安消息主上是秦王又建興二年十一月丙申朔元年十一月壬申朔十二月壬寅朔然則琨發牋之日建興元年十二月壬寅朔也傳寫誤耳三人各屯一郡兖州吏民莫知所從琅邪王睿以前廬江内史華譚為軍諮祭酒華户化翻譚嘗在壽春依周馥睿謂譚曰周祖宣何故反周馥字祖宣譚曰周馥雖死天下尚有直言之士馥見冦賊滋蔓欲移都以紓國難難乃旦翻執政不悅興兵討之馥死未踰時而洛都淪没若謂之反不亦誣乎事見上卷永嘉四年五年睿曰馥位為征鎮握彊兵召之不入危而不持亦天下之罪人也譚曰然危而不持當與天下共受其責非但馥也睿參佐多避事自逸録事參軍陳頵録事參軍掌總録衆曹管其文案自上佐以下違失者彈正以法掌凡諸司察之事白氏六帖曰州主簿郡督郵並今録事參軍之職余據睿以頵為録事參軍自别有主簿詳見辨誤言於睿曰洛中承平之時朝士以小心恭恪為凡俗以偃蹇倨肆為優雅流風相染以至敗國朝直遥翻敗補邁翻今僚屬皆承西臺餘弊江東謂洛都為西臺養望自高是前車已覆而後車又將尋之也請自今臨使稱疾者皆免官睿不從三王之誅趙王倫也見八十四卷惠帝永寧元年制己亥格以賞功自是循而用之頵上言昔趙王簒逆惠皇失位三王起兵討之故厚賞以懷嚮義之心今功無大小皆以格斷斷丁亂翻决也言功之輕重差次皆以己亥格决之乃至金紫佩士卒之身符䇿委僕𨽻之門非所以重名器正紀綱也請一切停之頵出於寒微數為正論府中多惡之數所角翻惡烏路翻出頵為譙郡太守呉興太守周玘宗族彊盛玘墟里翻琅邪王睿頗疑憚之睿左右用事者多中州亡官失守之士駕御呉人呉人頗怨玘自以失職又為刁協所輕恥恚愈甚恚於避翻乃隂與其黨謀誅執政以諸南士代之事泄玘憂憤而卒將死謂其子勰曰殺我者諸傖子也勰音協傖助庚翻呉人謂中州人為傖能復之乃吾子也石勒攻李惲於上白斬之惲於粉翻王浚復以薄盛為青州刺史上白城在安平廣宗縣李惲薄盛皆乞活帥復扶又翻王浚使棗嵩督諸軍屯易水召段疾陸眷欲與之共擊石勒疾陸眷不至以釋其弟未柸徳石勒故不肯㑹浚兵浚怒以重弊賂拓抜猗盧并檄慕容廆等共討疾陸眷廆户罪翻猗盧遣右賢王六修將兵㑹之為疾陸眷所敗敗補邁翻廆遣慕容翰攻段氏取徒河新城至陽樂陽樂縣屬遼西郡賢曰陽樂在今平州東聞六修敗而還翰因留鎮徒河壁青山初中國士民避亂者多北依王浚浚不能存撫又政法不立士民徃徃復去之復扶又翻段氏兄弟專尚武勇不禮士大夫唯慕容廆政事修明愛重人物故士民多歸之廆舉其英俊隨才授任以河東裴嶷嶷魚力翻北平陽躭廬江黄泓代郡魯昌為謀主廣平游邃北海逢羡逢皮江翻北平西方䖍何氏姓苑少昊金天氏位主西方子孫以為氏西河宋奭及封抽裴開為股肱平原宋該安定皇甫岌岌弟真蘭陵繆愷繆靡㓜翻昌黎劉斌及封奕封裕典機要裕抽之子也裴嶷清方有幹略為昌黎太守兄武為𤣥莵太守武卒嶷與武子開以其䘮歸過廆自𤣥莵西歸道過棘城莵同都翻廆敬禮之及去厚加資送行及遼西道不通嶷欲還就庾開曰鄉里在南奈何北行且等為流寓段氏彊慕容氏弱何必去此而就彼也嶷曰中國䘮亂䘮息浪翻今徃就之是相帥而入虎口也帥讀曰率且道逺何由可達言昌黎去河東既逺又路梗無由得達若俟其清通又非嵗月可冀言天下方亂道路未有清通之時今欲求託足之地豈可不慎擇其人汝觀諸段豈有逺略且能待國士乎慕容公修行仁義有霸王之志加以國豐民安今徃從之高可以立功名下可以庇宗族汝何疑焉開乃從之既至廆大喜陽躭清直沈敏為遼西太守沈持林翻慕容翰破段氏於陽樂獲之廆禮而用之游邃逢羡宋奭皆嘗為昌黎太守逢皮江翻與黄泓俱避地於薊後歸廆王浚屢以手書召邃兄暢暢欲赴之邃曰彭祖刑政不修華戎離叛以邃度之必不能久兄且盤桓以俟之易屯卦初九爻辭曰盤桓利居貞王弼曰不可以進故盤桓也馬曰盤桓旋也度徒洛翻暢曰彭祖忍而多疑頃者流民北來命所在追殺之今手書殷勤我稽留不徃將累及卿累力瑞翻且亂世宗族宜分以冀遺種遂從之卒與浚俱没種章勇翻卒子恤翻宋該與平原杜羣劉翔先依王浚又依段氏皆以為不足託帥諸流寓同歸於廆東夷校尉崔毖請皇甫岌為長史卑辭說諭終莫能致廆招之岌與弟真即時俱至古語有之鳥則擇木木豈能擇鳥帥讀曰率說輸芮翻遼東張綂據樂浪帶方二郡與高句麗王乙弗利相攻連年不解樂浪王遵說綂帥其民千餘家歸廆廆為之置樂浪郡為于偽翻樂浪音洛琅句如字又音句驪力知翻以綂為太守遵參軍事王如餘黨涪陵李運巴西王建等自襄陽將三千餘家入漢中涪音浮梁州刺史張光遣參軍晉邈將兵拒之邈受運建賂勸光納其降降户江翻下同光從之使居成固既而邈見運建及其徒多珍寶欲盡取之復說光曰復扶又翻說輸芮翻運建之徒不修農事專治器仗其意難測不如悉掩殺之不然必為亂光又從之將貪於下帥闇於上梁州之禍復自此始治直之翻五月邈將兵攻運建殺之建婿楊虎收餘衆擊光屯于厄水光遣其子孟萇討之不能克壬辰以琅邪王睿為左丞相大都督督陜東諸軍事南陽王保為右丞相大都督督陜西諸軍事所謂分陜也陜失冉翻詔曰今當掃除鯨鯢鯨鯢大魚鈎網所不能制以比敵人之魁桀者鯨巨京翻鯢五兮翻奉迎梓宫謂懐帝遇害於平陽梓宫未返也令幽并兩州勒卒三十萬直造平陽造七到翻下同右丞相宜帥秦涼梁雍之師三十萬徑詣長安左丞相帥所領精兵二十萬徑造洛陽帥讀曰率雍於用翻同赴大期克成元勲漢中山王曜屯蒲坂石勒使孔萇擊定陵殺田徽定陵縣漢屬潁川郡晉屬襄城郡田徽王浚用為兖州刺史薄盛率所部降勒山東郡縣相繼為勒所取漢主聰以勒為侍中征東大將軍烏桓亦叛王浚潛附於勒史言王浚之勢浸以孤弱六月劉琨與代公猗盧㑹于陘北謀擊漢陘音刑秋七月琨進據藍谷猗盧遣拓跋普根屯于北屈北屈縣漢屬河東郡晉屬平陽郡春秋晉公子夷吾所居邑也宋白曰慈州夾城縣本漢北屈縣地師古曰屈居勿翻琨遣監軍韓據自西河而南將攻西平西平城在平陽西漢主聰築以居其子濟南王驥漢主聰遣大將軍粲等拒琨驃騎將軍易等拒普根蕩晉將軍蘭陽等助守西平琨等聞之引兵還還從宣翻又如字聰使諸軍仍屯所在為進取之計帝遣殿中都尉劉蜀詔左丞相睿以時進軍殿中都尉屬二衛與乗輿㑹除中原乗繩證翻八月癸亥蜀至建康睿辭以方平定江東未暇北伐以鎮東長史刁協為丞相左長史從事中郎彭城劉隗為司直隗五罪翻邵陵内史廣陵戴邈為軍諮祭酒呉孫皓寶鼎元年分零陵北部都尉立邵陵郡宋白曰邵陵漢之昭陵縣呉立邵陵郡唐為邵州參軍丹陽張闓為從事中郎闓音開又可亥翻尚書郎潁川鍾雅為記室參軍譙國桓宣為舎人豫章熊逺為主簿㑹稽孔愉為掾㑹工外翻掾以絹翻劉隗雅習文史善伺候睿意故睿特親愛之為刁劉間王敦兄弟張本伺相吏翻熊逺上書以為軍興以來處事不用律令處昌吕翻競作新意臨事立制朝作夕改至於主者不敢任灋毎輒闗諮闗白也非為政之體也愚謂凡為駁議者皆當引律令經𫝊駁北角翻𫝊直戀翻不得直以情言無所依凖以虧舊典若開塞隨宜塞悉則翻權道制物此是人君之所得行非臣子所宜專用也睿以時方多事不能從初范陽祖逖少有大志漢涿郡魏文帝更名曰范陽郡少詩照翻與劉琨俱為司州主簿同寢中夜聞鷄鳴蹵琨覺曰蹵子六翻蹋也覺居效翻寤也此非惡聲也因起舞及渡江左丞相睿以為軍諮祭酒逖居京口呉孫權自呉徙丹徒謂之京城有京峴山在其東其城因山為壘俯臨江津故曰京口紏合驍健繩三合為紏紏言合三為一也驍堅堯翻下同言於睿曰晉室之亂非上無道而下怨叛也由宗室爭權自相魚肉遂使戎狄乗隙毒流中土今遺民既遭殘賊人思自奮大王誠能命將出師使如逖者綂之以復中原郡國豪傑必有望風響應者矣睿素無北伐之志以逖為奮威將軍豫州刺史給千人廩布三千疋給千人糧廩及布三千疋而已不給鎧仗使自召募逖將其部曲百餘家渡江中流擊楫而誓曰祖逖不能清中原而復濟者有如大江復扶又翻遂屯淮隂淮隂縣前漢屬臨淮郡後漢屬下邳國晉屬廣陵郡起冶鑄兵募得二千餘人而後進胡亢性猜忌殺其驍將數人杜曽懼潛引王冲之兵使攻亢王亢荆州賊也亢悉精兵出拒之城中空虛曽因殺亢而并其衆周顗屯潯水城廬山記曰尋陽縣在大江之北尋水之陽潯水城無乃古之尋陽城乎為杜弢所困陶侃使明威將軍朱伺救之弢退保泠口沈約志魏置將軍四十號明威第三弢吐刀翻水經註泠水南出九疑山北流逕冷道縣西南又北流注于都溪水又西北入于營水所謂泠口也楊正衡曰泠郎丁翻余攷此泠口去武昌甚逺又水經註江水自蘄春故城南又東得銅零口此無乃是乎侃曰弢必步向武昌乃自徑道還郡以待之徑道捷出之路弢果來攻侃使朱伺逆擊大破之弢遁歸長沙周顗出潯水投王敦於豫章敦留之陶侃使參軍王貢告捷於敦敦曰若無陶矦便失荆州矣乃表侃為荆州刺史屯沔江水經註沌水上承沔陽之白湖東南流逕沔陽縣南注于江謂之沌口陸游曰江陵之建寧鎮葢沌口也王敦以陶侃為荆州鎮此明年徙林鄣侃傳云初鎮沌口移入沔江水經註林障故城在沔南沔江謂林障也左丞相睿召周顗復以為軍諮祭酒初氐王楊茂搜之子難敵遣養子販易於梁州私賣良人子一人張光鞭殺之難敵怨曰使君初來大荒之後兵民之命仰我氐活氐有小罪不能貰也貰始制翻貸也恕也又神夜翻及光與楊虎相攻各求救於茂搜茂搜遣難敵救光難敵求貨於光光不與楊虎厚賂難敵且曰流民珍貨悉在光所謂晉邈所殺奪者今伐我不如伐光難敵大喜光與虎戰使張孟萇居前難敵繼後難敵與虎夾擊孟萇大破之孟萇及其弟援皆死光嬰城自守九月光憤激成疾僚屬勸光退據魏興光按劒曰吾受國重任不能討賊今得死如登僊何謂退也聲絶而卒張光雖以信用晉邈致冦其氣烈亦可尚也州人推其少子邁領州事少詩照翻又與氐戰没衆推始平太守胡子序領梁州荀藩薨于開封荀藩傳祇相繼而没陜東二行臺惟荀組在耳考異曰帝紀曰薨于滎陽今從藩傳漢中山王曜趙染攻麴允于黄白城允累戰皆敗詔以索綝為征東大將軍將兵助允王貢自王敦所還至竟陵矯陶侃之命以杜曽為前鋒大都督擊王冲斬之悉降其衆降户江翻侃召曽曽不至貢恐以矯命獲罪遂與曾反擊侃冬十月侃兵大敗僅以身免敦表侃以白衣領職侃復帥周訪等進擊杜弢大破之復扶又翻敦乃奏復侃官漢趙染謂中山王曜曰麴允率大衆在外長安空虛可襲也曜使染帥精騎五千襲長安帥讀曰率下同庚寅夜入外城帝犇射鴈樓染焚龍尾及諸營龍尾者依城築道陂陁而漸高登陴所由之路也又水經曰秦時有黒龍從南山出飲渭水其行道因山成跡長六十餘里頭臨渭水尾達樊川漢蕭何起未央宫斬龍首山而營之頭高二十丈尾漸下高五六丈所謂龍尾者此山之尾也殺掠千餘人辛夘旦退屯逍遥園水經註沈水上承皇子陂於樊川北逕長安城西與昆明池水合沈水又東北流逕鄧艾祠南又東分為二水一水東入逍遥園壬辰將軍麴鑒自阿城帥衆五千救長安阿城即秦阿房宫城也癸巳染引還鑒追之與曜遇於零武鑒兵大敗前漢北地郡有靈武縣後漢晉省至後魏置咸陽郡池陽靈武二縣並屬焉黄白城在池陽則此零武為前漢北地郡魏咸陽郡之靈武明矣楊虎楊難敵急攻梁州胡子序棄城走難敵自稱刺史漢中山王曜恃勝而不設備十一月麴允引兵襲之漢兵大敗殺其冠軍將軍喬智明冠古玩翻曜引歸平陽王浚以其父字處道自謂應當塗高之䜟謀稱尊號王浚又一袁術也前勃海太守劉亮北海太守王摶摶徒官翻司空掾高柔切諫掾于絹翻此又一高柔非魏之高柔浚皆殺之燕國霍原志節清高屢辭徴辟浚以尊號事問之原不答浚誣原與羣盜通殺而梟其首梟堅堯翻於是士民駭怨而浚矜豪日甚不親政事所任皆苛刻小人棗嵩朱碩貪横尤甚横户孟翻北州謡曰府中赫赫朱丘伯十囊五囊入棗郎朱丘伯朱碩字也嵩浚之婿故曰棗郎調發殷煩下不堪命多叛入鮮卑調徒弔翻從事韓咸監䕶栁城栁城縣前漢屬遼西郡後漢晉省監工銜翻盛稱慕容廆能接納士民欲以諷浚浚怒殺之浚始者唯恃鮮卑烏桓以為彊既而皆叛之加以蝗旱連年兵勢益弱石勒欲襲之未知虚實將遣使覘之使疏吏翻覘癡亷翻又曰艶翻參佐請用羊祜陸抗故事致書於浚欲用敵國交鄰之禮勒以問張賔賔曰浚名為晉臣實欲廢晉自立但患四海英雄莫之從耳其欲得將軍猶項羽之欲得韓信也將軍威振天下今卑辭厚禮折節事之猶懼不信况為羊陸之亢敵乎折而設翻亢口浪翻夫謀人而使人覺其情難以得志矣勒曰善十二月勒遣舍人王子春董肇多齎珍寶奉表於浚曰勒本小胡遭世饑亂流離屯厄屯株倫翻難也竄命冀州竊相保聚以救性命今晉祚淪夷中原無主殿下州鄉貴望勒上黨武鄉人而浚太原人故云州鄉四海所宗為帝王者非公復誰復扶又翻勒所以捐軀起兵誅討暴亂者正為殿下驅除爾伏願殿下應天順人為于偽翻早登皇祚勒奉戴殿下如天地父母殿下察勒微心亦當視之如子也又遺棗嵩書厚賂之遺于季翻浚以段疾陸眷新叛士民多棄已去聞勒欲附之甚喜謂子春曰石公一時豪傑據有趙魏乃欲稱藩於孤其可信乎子春曰石將軍才力彊盛誠如聖㫖但以殿下中州貴望威行夷夏夏户雅翻自古胡人為輔佐名臣則有矣未有為帝王者也石將軍非惡帝王不為而讓於殿下惡烏路翻顧以帝王自有厯數非智力之所取雖彊取之彊其兩翻必不為天人之所與故也項羽雖彊終為漢有石將軍之比殿下猶隂精之與太陽是以逺鑒前事歸身殿下此乃石將軍之明識所以逺過於人也殿下又何怪乎浚大悅封子春肇皆為列矦遣使報聘以厚幣酬之游綸兄綂為浚司馬鎮范陽遣使私附於勒游綸保據苑鄉偽降於勒勒已襲禽之勒斬其使以送浚浚雖不罪綂益信勒為忠誠無復疑矣是嵗左丞相睿遣世子紹鎮廣陵以丞相掾蔡謨為參軍謨克之子也漢中山王曜圍河南尹魏浚於石梁石梁塢在洛水北兖州刺史劉演河内太守郭黙遣兵救之曜分兵逆戰於河北敗之河平大河之北即富平津之北也敗補邁翻浚夜走獲而殺之代公猗盧城盛樂以為北都治故平城為南都又作新平城於灅水之陽使右賢王六修鎮之綂領南部盛樂縣前漢屬定襄郡後漢屬雲中郡平城漢屬鴈門郡括地志曰朔州定襄縣本漢平城縣拓抜魏之盛也置朔州於盛樂置桓州於平城平城謂之代都自高祖遷洛其後被六韓抜陵作亂故都為墟恒州寄治肆州秀容郡城雲州寄治并州界魏收地形志自陘嶺以北所記略矣隋之盛也北逐突厥復漢故塞省併後魏所置郡縣盛樂葢在定襄郡大利縣界平城在馬邑郡雲内縣界唐破突厥北盡魏隋之路朔州善陽縣則漢定襄魏桑乾之地單于都䕶府金河縣則後魏道武所都也雲州雲中縣則後魏所都平城也然自單于都䕶府東北至朔州三百五十七里則盛樂距平城其道里可知矣杜佑曰雲中今馬邑郡北平城即今郡隋雲内縣恒安鎮魏書帝紀猗盧修故平城以為南都更南百里於灅水之陽黄𤓰堆築新平城晉人謂之小平城杜佑又曰朔州馬邑郡魏都平城於郡北置懐朔鎮及遷洛後置朔州後魏初雲中在今郡北三百餘里定襄故城北北齊置朔州在故都西南新城一名平城也後移於馬邑即今郡城也郡治善陽縣亦漢定襄縣地有秦馬邑城武周塞紫河發源於此宋白曰唐振武軍舊單于都䕶府即漢定襄郡之盛樂縣也在隂山之陽黄河之北後魏所都盛樂是也唐平突厥於此置雲中都督府後改單于府班固地理志右北平浚靡縣灅水南至無終東入庚師古曰灅方水翻又音郎賄翻酈道元水經註庚水與鮑丘水合浚靡在東與平城相去甚逺新平城不在此灅水之陽也據魏書道武帝西如馬邑觀灅源則灅水葢出於馬邑而東北流逕平城之南也酈道元魏人也其註水經叙代都之事宜詳初不言平城有灅水但言濕水逕平城南耳註曰濕水出鴈門隂館縣濕頭山一曰治水東北流出山逕隂館縣故城西故樓煩鄉也又有馬邑川水㑹桑乾水而注于濕水濕水東流過平城南又東流逕廣寗下洛縣南東至漁陽入笥溝又考班固地理志鴈門隂館縣樓煩鄉累頭山治水所出東至泉州入海師古曰累音力追翻治音弋之翻竊謂水出累頭山疑當時亦有累水之名師古音從平聲音相近也意道元所謂濕水即灅水也又考丁度集韻漯灅㶟三字同註云水出鴈門則亦有見於此矣灅類篇音魯水翻資治通鑑卷八十八
