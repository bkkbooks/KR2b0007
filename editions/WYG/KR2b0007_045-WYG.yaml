front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑巻四十五宋司馬光撰胡三省音註漢紀三十七起重光作噩盡旃蒙大淵獻凡十五年顯宗孝明皇帝下永平四年春帝近出觀覽城第城雒陽城第宅也賢曰有甲乙之次故曰第欲遂校獵河内河内郡在雒陽北百二十里東平王蒼上書諫帝覽奏即還宫秋九月戊寅千乗哀王建薨無子國除乗䋲證翻冬十月乙卯司徒郭丹司空馮魴免魴音房以河南尹沛國范遷為司徒太僕伏恭為司空恭湛之兄子也陵鄉矦梁松坐怨望縣飛書誹謗下獄死松嗣父綂爵為陵鄉矦縣讀曰懸下遐稼翻初上為太子太中大夫鄭興子衆以通經知名知名者有名於時人皆知之也太子及山陽王荆因梁松以縑帛請之衆曰太子儲君無外交之義儲副也漢有舊防蕃王不宜私通賔客松曰長者意不可逆衆曰犯禁觸罪不如守正而死遂不往及松敗賔客多坐之唯衆不染於辭于寘王廣徳將諸國兵三萬人攻莎車誘莎車王賢殺之寘徒賢翻莎素禾翻并其國匈奴發諸國兵圍于寘廣徳請降匈奴立賢質子不居徵為莎車王質音致廣徳又攻殺之更立其弟齊黎為莎車王更工衡翻東平王蒼自以至親輔政蒼輔政始上巻中元二年聲望日重意不自安前後累上䟽稱自漢興以來宗室子弟無得在公卿位者乞上驃騎將軍印綬退就藩國辭甚懇切帝乃許蒼還國而不聽上將軍印綬上時掌翻五年春二月蒼罷歸藩東平國在雒陽東六百七十二里帝以驃騎長史為東平太傅掾為中大夫令史為王家郎百官志將軍長史一人秩千石掾屬二十九人秩比四百石至比二百石令史及御屬三十一人百石帝特為蒼置掾史員四十人王國太傅秩二千石中大夫比六百石郎二百石掾俞絹翻加賜錢五千萬布十萬匹冬十月上行幸鄴是月還宮十一月北匈奴㓂五原十二月㓂雲中南單于擊却之是嵗發遣邊民在内郡者賜裝錢人二萬賜錢為辨裝也安豐戴矦竇融年老子孫縱誕多不灋長子穆尚内黄公主内黄縣屬魏郡矯稱隂太后詔令六安矦劉盱去婦以女妻之六安國屬廬江郡賢曰今之廬州按前漢以六安為王國後漢以六安為矦國屬廬江郡賢以唐之廬州為漢之廬江郡可也若漢之六安矦國實在唐夀州界劉昫地理志夀州安豐縣漢六國故城在縣南此為可据此後章帝元和二年徙江陵王恭為六安王以廬江郡為國却可以用賢注妻七細翻盱婦家上書言狀帝大怒盡免穆等官諸竇為郎吏者皆將家屬歸故郡竇氏故扶風平陵人獨留融京師融尋薨後數嵗穆等復坐事與子勲宣皆下獄死復扶又翻下遐稼翻乆之詔還融夫人與小孫一人居雒陽六年春二月王雒山出寳鼎獻之據本紀王雒山在廬江郡夏四月甲子詔曰祥瑞之降以應有徳方今政化多僻何以致兹易曰鼎象三公三公鼎足承君故云然此盖易緯之辭豈公卿奉職得其理邪其賜三公帛五十匹九卿二千石半之先帝詔書禁人上事言聖見四十二巻光武建武七年上時掌翻而間者章奏頗多浮詞自今若有過稱虛譽尚書皆宜抑而不省省悉景翻示不為諂子蚩也蚩笑也冬十月上行幸魯十二月還幸陽城陽城縣屬頴川壬午還宫是嵗南單于適死單于莫之子蘇立為丘除車林鞮單于鞮丁奚翻下同數月復死復扶又翻下同單于適之弟長立為湖邪尸逐矦鞮單于七年春正月癸卯皇太后隂氏崩二月庚申葬光烈皇后西京諸后皆從帝謚惟衛思后許恭哀后不以夀終而别追諡之從帝謚而又加一字自隂后始范曄曰漢世皇后皆因帝謚為稱明帝始建光烈之稱其後並以徳為配至於賢愚優劣混同一貫賢曰謚法執徳遵業曰烈北匈奴猶盛數㓂邊數所角翻遣使求合市上冀其交通不復為㓂許之以東海相宋均為尚書令初均為九江太守九江郡在雒陽東南一千五百里五日一聽事悉省掾史閉督郵府内屬縣無事郡有五部督郵監屬縣閉之府内者恐以伺察為功能侵擾屬縣適以多事故也百姓安業九江舊多虎暴常募設檻穽賢曰檻為機以捕獸穽謂穿地陷之而猶多傷害均下記屬縣曰夫江淮之有猛獸猶北土之有雞豚也今為民害咎在殘吏而勞勤張捕張設也設為機穽以伺鳥獸曰張裴炎猩猩銘所謂奴欲張我是也非憂恤之本也其務退姦貪思進忠善可一去檻穽去𦍑呂翻除削課制其後無復虎患復扶又翻帝聞均名故任以樞機均謂人曰國家喜文法亷吏以為足以止姦也喜許記翻然文吏習為欺謾而亷吏清在一已謾音慢又莫連翻無益百姓流亡盜賊為害也均欲叩頭爭之時未可改也乆將自苦之乃可言耳未及言㑹遷司𨽻校尉後上聞其言追善之八年春正月己卯司徒范遷薨三月辛卯以太尉虞延為司徒衛尉趙憙行太尉事越騎司馬鄭衆使北匈奴越騎校尉司馬一人秩千石單于欲令衆拜衆不為屈單于圍守閉之不與水火衆㧞刀自誓自誓以死不為單于屈也單于恐而止乃更發使隨衆還京師初大司農耿國上言宜置度遼將軍屯五原以防南匈奴逃亡朝廷不從南匈奴須卜骨都矦等知漢與北虜交使内懷嫌怨欲畔匈奴異姓大臣左右骨都矦也又異姓有呼衍氏須卜氏立林氏蘭氏皆匈奴國中名族常與單于婚姻宻使人詣北虜令遣兵迎之鄭衆出塞疑有異伺候果得須卜使人伺相吏翻使䟽吏翻乃上言宜更置大將以防二虜交通由是始置度遼營以中郎將吳棠行度遼將軍事將黎陽虎牙營士屯五原曼栢漢官儀曰光武以幽冀兵克定天下故於黎陽立營以謁者監領兵騎千人賢曰昭帝拜范明友為度遼將軍至此復置焉曼栢縣在今勝州銀城縣界秋郡國十四大水冬十月北宫成丙子募死罪繫囚詣度遼營有罪亡命者令贖罪各有差楚王英奉黄縑白紈詣國相曰漢成帝王國省内史令相治民職如太守秩二千石紈今之絹也師古曰紈素也縑并絲絹也相息亮翻託在藩輔過惡果積歡喜大恩奉送縑帛以贖愆罪國相以聞詔報曰楚王誦黄老之㣲言尚浮屠之仁慈潔齊三月齊讀曰齋與神為誓何嫌何疑當有悔吝其還贖以助伊蒲塞桑門之盛饌塞悉則翻饌雛戀翻又雛皖翻初帝聞西域有神其名曰佛因遣使之天竺求其道得其書及沙門以來其書大抵以虚無為宗貴慈悲不殺以為人死精神不滅隨復受形生時所行善惡皆有報應故所貴修煉精神以至為佛善為宏闊勝大之言以勸誘愚俗精於其道者號曰沙門於是中國始傳其術圗其形像而王公貴人獨楚王英最先好之袁宏漢紀浮屠佛也西域天竺國有佛道焉佛者漢言覺也將以覺悟羣生也其教以修善􅄌心為主不殺生專務清静其精者為沙門沙門漢言息也盖息意去欲以歸於無為長丈六尺黄金色初明帝夢見金人長大以問羣臣或曰西方有神其名曰佛陛下所夢得無是乎於是遣使天竺問其道術而圗其形像焉賢曰伊蒲塞即優婆塞也中國翻為近住言受戒行堪近僧住也桑門即沙門梵云沙門那或曰桑門唐言勤息秦譯云勤行又云善覺魏收曰漢武帝遣霍去病討匈奴獲休屠王金人以為大神列於甘泉宫不祭祀但燒香禮拜而已此則佛道流通之漸也張騫使大夏傳其旁有身毒國一名天竺始聞有浮屠之教哀帝元夀元年博士弟子秦景憲受大月氏王使伊存口授浮屠經中國聞之未信了也後明帝夜夢金人頂有白光飛行殿庭乃訪羣臣傅毅始以佛對帝遣郎中蔡愔等使天竺寫浮屠遺範仍與沙門攝摩騰竺法蘭東還洛陽中國有沙門跪拜之法自此始愔之還以白馬負經而至漢因立白馬寺於洛城雍關西好呼到翻壬寅晦日有食之旣既盡也詔羣司勉修職事極言無諱於是在位者皆上封事各言得失帝覽章深自引咎以所上班示百官上時掌翻詔曰羣僚所言皆朕之過民寃不能理吏黠不能禁黠下八翻而輕用民力繕修宫宇出入無節喜怒過差永覽前戒竦然兢懼徒恐薄徳乆而致怠耳人主能切已省察然後能有是言北匈奴雖遣使入貢而㓂鈔不息鈔楚交翻邊城書閉帝議遣使報其使者鄭衆上䟽諌曰臣聞北單于所以要致漢使者要一遥翻欲以離南單于之衆堅三十六國之心也賢曰武帝間通西域本三十六國余謂堅其心者欲使之專附匈奴又當揚漢和親誇示鄰敵令西域欲歸化者局足狐疑懷土之人絶望中國耳漢使旣到便偃蹇自信信音申若復遣之虜必自謂得謀得謀猶言得計復扶又翻下同其羣臣駁議者不敢復言賢曰駁議謂勸單于歸漢駁北角翻如是南庭動揺烏桓有離心矣南單于庭在西河美稷動揺謂欲出塞北去烏桓本附匈奴漢置校尉領䕶使不得與匈奴交通離心謂其心不親附漢而貳於匈奴也南單于乆居漢地具知形埶萬分離析旋為邊害今幸有度遼之衆揚威北垂雖勿報答不敢為患帝不從復遣衆往衆因上言臣前奉使不為匈奴拜為于偽翻下同單于恚恨遣兵圍臣恚於避翻今復銜命必見陵折臣誠不忍持大漢節對氈裘獨拜前書匈奴傳曰自君王以下皆食畜肉衣其皮革被旃裘旃與氈同如令匈奴遂能服臣將有損大漢之彊帝不聽衆不得已旣行在路連上書固争之詔切責衆追還繋廷尉㑹赦歸家其後帝見匈奴來者聞衆與單于爭禮之狀乃復召衆為軍司馬漢制大將軍營五部部校尉一人比二千石軍司馬一人比千石其不置校尉部但軍司馬一人帝召衆為軍司馬使與馬廖擊車師九年夏四月甲辰詔司𨽻校尉部刺史嵗上墨綬長吏視事三嵗已上治狀尤異者各一人與計偕上及尤不治者亦以聞杜佑曰後漢十三州部司𨽻治河南今府豫治譙今鄼縣兖治昌邑今魯郡金鄉縣徐治郯今臨淮郡下邳縣青治臨淄今北海郡縣涼治隴今天水郡隴城縣并治晉陽今太原府冀治鄗今趙郡鄗縣幽治薊今范陽郡揚治厯陽今郡縣荆治漢夀今武陵郡武陵縣交治廣信今蒼梧郡蒼梧縣漢制千石六百石墨綬三采青赤紺長丈六尺八十首四百石三百石長同此墨綬長吏謂大縣令以下上時掌翻治直吏翻是嵗大有年穀梁傳曰五穀皆熟書大有年賜皇子恭號曰靈夀王黨號曰重熹王賢曰取其美名也未有國邑帝崇尚儒學自皇太子諸王矦及大臣子弟功臣子孫莫不受經又為外戚樊氏郭氏隂氏馬氏諸子立學於南宫號四姓小矦賢曰以非列矦故曰小矦禮記曰庶方小矦亦其義也余據東平王蒼傳送列矦印十九枚諸王子年五嵗以上能趨拜者皆令帶之意四姓小矦亦猶是也置五經師搜選髙能以授其業自期門羽林之士悉令通孝經章句匈奴亦遣子入學廣陵王荆復呼相士謂曰我貌類先帝先帝三十得天下我今亦三十可起兵未相者詣吏告之相息亮翻荆惶恐自繫獄帝加恩不考極其事詔不得臣屬吏民唯食租如故恐其復謀不軌故不得臣屬吏民唯食國之租税使相中尉謹宿衛之荆又使巫祭祀祝詛祝職又翻詛莊助翻詔長水校尉樊鯈等雜治其獄鯈直留翻治直之翻事竟奏請誅荆帝怒曰諸卿以我弟故欲誅之即我子卿等敢爾邪鯈對曰天下者髙帝天下非陛下之天下也春秋之義君親無將將而必誅賢曰春秋公羊傳之文也將者將為弑逆之事也臣等以荆屬託母弟帝與荆皆出於隂后陛下留聖心加惻隠故敢請耳如令陛下子臣等專誅而已賢曰專謂不請也帝歎息善之鯈宏之子也十年春二月廣陵思王荆自殺諡法追悔前過曰思國除夏四月戊子赦天下閏月甲午上幸南陽召校官弟子作雅樂賢曰校學也戸教翻雅樂註見上奏鹿鳴帝自奏塤箎和之以娛嘉賔鄭𤣥註周禮云塤燒土為之大如鴈子鄭衆云有六孔世本曰暴辛公作箎以竹為之長尺四寸有八孔孔頴達曰土曰壎竹曰箎周禮小師職作塤古今字異耳釋樂云大塤謂之嘂音呌孫炎曰音大如呌呼也郭璞曰塤燒土為之大如鵞子鋭上平底形似稱鎚六孔小者如雞子釋樂又云大箎謂之沂李廵曰大箎其聲非一也郭璞曰箎以竹為之長尺四寸圍三寸一孔上出逕三分横吹之小者尺二寸廣雅云八孔鄭司農小師注云箎七孔盖不數其上出者故七也世本云暴辛公作塤蘇成公作箎譙周古史考云古有塤箎尚矣周幽王時暴辛公善塤蘓成公善箎記者因以為作繆矣釋名塤喧也聲濁喧然塤況袁翻箎音池和戸卧翻還幸南頓冬十二月甲午還宫初陵陽矦丁綝卒陵陽縣屬丹陽郡綝丑林翻子鴻當襲封上書稱病讓國於弟盛不報旣葬乃挂衰絰於冢廬而逃去衰倉回翻友人九江鮑駿遇鴻於東海東海郡在雒陽東一千五百里讓之曰昔伯夷吳札亂世權行故得申其志耳賢曰伯夷孤竹君之子讓其弟叔齊季札吳王夀夢之季子也諸兄欲讓以國季子乃舍其室而耕皆是權時所行非常道也伯夷當紂時季札當周末故言亂世也春秋之義不以家事廢王事春秋衛靈公卒孫輙立父蒯聵與輙爭國公羊傳曰輙者蒯聵之子然則曷為不立蒯聵而立輙蒯聵無道靈公逐之而立輙然則輙之義可以立乎曰可不以父命辭於王命不以家事辭於王事故駿引以為言今子以兄弟私恩而絶父不滅之基可乎鴻感悟垂涕乃還就國鮑駿因上書薦鴻經學至行行下孟翻上徴鴻為侍中十一年春正月東平王蒼與諸王俱來朝月餘還國帝臨送歸宫悽然懐思乃遣使手詔賜東平國中𫝊曰辭别之後獨坐不樂樂音洛下同因就車歸伏軾而吟瞻望永懷實勞我心誦及采菽以増歎息采菽詩小雅之章也其詩曰采菽采菽筐之筥之君子來朝何錫予之毛詩註云菽所以芼太牢而待君子羊則苦豕則薇箋云菽大豆也采其葉以為藿三牲牛羊豕芼以藿正義曰傳既言羊則苦豕則薇則菽不揔芼三牲而言菽所以芼太牢者舉牛之芼則羊豕之苦薇從可知矣日者問東平王處家何等最樂王言為善最樂處昌呂翻樂音洛其言甚大副是要腹矣要讀曰腰蒼腰帶十圍今送列矦印十九枚諸王子年五嵗已上能趨拜者皆令帶之十二年春哀牢王栁貌率其民五萬餘户内附以其地置哀牢博南二縣哀牢夷者九隆種也居牢山絶域荒外山川阻深未嘗通中國西南去雒陽七千里賢曰在今匡州匡川縣西張柬之曰姚州哀牢國地始通博南山度蘭倉水華陽國志曰博南縣西山髙三十里越之得蘭倉水有金沙洗取融為金行者苦之歌曰漢徳廣開不賔度蘭倉為它人為于偽翻初平帝時河汴決壞乆而不修建武十年光武欲修之浚儀令樂俊上言民新被兵革未宜興役乃止浚儀縣屬陳留郡被皮義翻其後汴渠東侵日月彌廣兖豫百姓怨歎以為縣官恒興他役不先民急㑹有薦樂浪王景能治水者樂浪在雒陽東北五千里恒戸登翻先悉薦翻樂浪音洛琅夏四月詔發卒數十萬遣景與將作謁者王吳脩汴渠隄自滎陽東至千乗海口千餘里謁者屬光祿勲王吳以謁者而將作故謂之將作謁者賢曰汴渠即莨蕩渠也汴自滎陽首受河所謂石門在滎陽山北一里過汴以東積石為隄亦號金隄成帝陽嘉中所作也十里立一水門令更相洄注爾雅曰逆流而上曰洄郭璞註云旋流也更工衡翻無復潰漏之患復扶又翻景雖減省役費然猶以百億計焉十萬曰億秋七月乙亥司空伏恭罷乙未以大司農牟融為司空風俗通牟子國祝融之後後因氏焉是時天下安平人無徭役嵗比登稔百姓殷富粟斛三十牛羊被野比毗至翻被皮義翻十三年夏四月汴渠成河汴分流復其舊迹河汴之隄決壞則汴水東侵而與河合今隄成則河東北入海而汴東南入泗是分流復其舊迹也辛巳帝行幸滎陽廵行河渠行下孟翻遂度河登太行幸上黨行戸剛翻壬寅還宫冬十月壬辰晦日有食之楚王英與方士作金龜玉鶴刻文字為符瑞男子燕廣姓譜燕召公之後為秦所滅子孫以國為氏燕於賢翻告英與漁陽王平顔忠等造作圗書有逆謀事下案驗下遐稼翻有司奏英大逆不道請誅之帝以親親不忍十一月廢英徙丹陽涇縣賢曰今宣州縣賜湯沐邑五百戸賢曰湯沐者取其賦税以供湯沐之具也男女為矦主者食邑如故許太后勿上璽綬留住楚宫許太后者英母許氏上時掌翻先是有私以英謀告司徒虞延者先悉薦翻延以英藩戚至親不然其言及英事覺詔書切讓延十四年春三月甲戍延自殺以太常周澤行司徒事頃之復為太常司考異曰澤傳云十二年按十二年不闕徒當是虞延免後邢穆未至閒澤行司徒事爾故云數月夏四月丁巳以鉅鹿太守南陽邢穆為司徒鉅鹿郡在雒陽北一千一百里邢本周公之𦙍為衛所滅子孫以國為氏楚王英至丹陽自殺詔以諸矦禮葬於涇封燕廣為折姦矦是時窮治楚獄遂至累年治直之翻下同其辭語相連自京師親戚諸矦州郡豪桀及考案吏阿附坐死徙者以千數而繫獄者尚數千人初樊鯈弟鮪鯈直留翻鮪于軌翻為其子賞求楚王英女為于偽翻鯈聞而止之曰建武中吾家並受榮寵一宗五矦謂宏封長羅矦弟丹射陽矦兄子尋𤣥鄉矦族兄忠更父矦宏又封夀張矦也時特進一言女可以配王男可以尚主賢曰宏為特進但以貴寵過盛即為禍患故不為也且爾一子柰何棄之於楚乎鮪不從及楚事覺鯈已卒上追念鯈謹恪故其諸子皆得不坐英隂䟽天下名士上得其錄有吳郡太守尹興名吳郡在雒陽東三千三百里乃徴興及掾史五百餘人詣廷尉就考掾俞絹翻諸吏不勝掠治勝音升掠音亮治直之翻死者太半唯門下掾陸續主簿梁宏功曹史駟勲備受五毒門下掾在郡門下緫錄衆事功曹史主選署功勞五毒四肢及身備受楚毒也或云鞭箠及灼及徽經為五毒肌肉消爛終無異辭續母自吳來雒陽作食以饋續續雖見考辭色未嘗變而對食悲泣不自勝治獄使者問其故續曰母來不得見故悲耳問何以知之續曰母截肉未嘗不方斷葱以寸為度斷丁管翻故知之使者以狀聞上乃赦興等禁錮終身顔忠王平辭引隧鄉矦耿建朗陵矦臧信濩澤矦鄧鯉曲成矦劉建耿純弟宿封隧鄉矦建盖紹封者也朗陵矦臧信宮之子也鄧鯉劉建皆無可考濩澤矦國屬河東郡曲成矦國屬東萊郡賢曰故城在今萊州掖縣西北師古曰濩音烏虢翻建等辭未嘗與忠平相見是時上怒甚吏皆惶恐諸所連及率一切䧟入無敢以情恕者侍御史寒朗心傷其寃異考曰范書作寒陸龜蒙離合詩云初寒朗詠徘徊立袁紀作寋按今有寋姓音件與袁紀合今從之余按姓譜有寒姓以為夏諸矦后寒之後又曰周武王子寒矦之後試以建等物色獨問忠平賢曰物色謂形狀也而二人錯㦍不能對賢曰錯㦍猶倉卒也錯音七故翻㦍音五故翻朗知其詐乃上言建等無姦專為忠平所誣疑天下無辜類多如此帝曰即如是忠平何故引之對曰忠平自知所犯不道漢法有大逆不道故多有虚引冀以自明帝曰即如是何不早奏對曰臣恐海内别有發其姦者帝怒曰吏持兩端促提下捶之捶止蕋翻左右方引去朗曰願一言而死帝曰誰與共為章對曰臣獨作之上曰何以不與三府議三府太尉司徒司空府也對曰臣自知當必族滅不敢多汙染人汙烏故翻上曰何故族滅對曰臣考事一年不能窮盡姦狀反為罪人訟寃為于偽翻下同故知當族滅然臣所以言者誠冀陛下一覺悟而已臣見考囚在事者咸共言妖惡大故故事也囚也妖於驕翻臣子所宜同疾今出之不如入之言出其罪不如入其罪也可無後責是以考一連十考十連百又公卿朝㑹陛下問以得失皆長跪言舊制大罪禍及九族陛下大恩裁止於身天下幸甚裁與纔同及其歸舎口雖不言而仰屋竊歎莫不知其多寃無敢牾陛下言者牾五故翻逆也臣今所陳誠死無悔帝意解詔遣朗出後二日車駕自幸洛陽獄錄囚徒師古曰省錄之知其情狀為寃滯為不也今之慮囚本錄聲之去者耳音力具翻而近俗不曉其意訛其文遂為思慮之慮失其源矣理出千餘人時天旱即大雨馬后亦以楚獄多濫乗間為帝言之間古莧翻帝惻然感悟夜起彷徨彷徨釋徘徊也莊子註猶翺翔也余謂彷徨不自安之貌由是多所降宥任城令汝南袁安遷楚郡太守任城縣屬東平國任音壬到郡不入府先往按楚王英獄事理其無明驗者條上出之上時掌翻府丞掾史皆叩頭爭以為阿附反虜法與同罪不可安曰如有不合太守自當坐之不以相及也遂分别具奏别彼列翻帝感悟即報許得出者四百餘家夏五月封故廣陵王荆子元夀為廣陵矦食六縣篤兄弟之恩也又封竇融孫嘉為安豐矦念功臣之世也初作夀陵制令流水而已無得起墳萬年之後埽地而祭杅水脯糒而已説文曰杅飲器音于方言曰盌謂之盂過百日唯四時設奠置吏卒數人供給灑掃灑所賣翻掃悉報翻又並如字敢有所興作者以擅議宗廟法從事前書曰擅議宗廟者棄市十五年春二月庚子上東廵癸亥耕于下邳下邳縣本屬東海郡是年以臨淮郡為下邳國下邳縣屬焉在雒陽東一千四百里三月至魯幸孔子宅親御講堂孔子宅在闕里講堂講授之堂魯共王升孔子堂聞金石絲竹之音即此命皇太子諸王説經又幸東平大梁浚儀縣本大梁夏四月庚子還宫封皇子恭為鉅鹿王黨為樂成王樂成國本信都郡帝更名在雒陽北二千里衍為下邳王暢為汝南王昞為常山王長為濟隂王濟子禮翻帝親定其封域裁令半楚淮陽馬后曰諸子數縣於制不亦儉乎帝曰我子豈宜與先帝子等嵗給二千萬足矣乙巳赦天下謁者僕射耿秉數上言請擊匈奴百官志謁者僕射秩比千石為謁者臺率主謁者古重習武有主射以督錄之故曰僕射數所角翻上以顯親矦竇固嘗從其世父融在河西爾雅曰父之昆弟先生為世父後生為叔父明習邊事乃使秉固與太僕祭肜虎賁中郎將馬廖廖音聊下博矦劉張張齊王縯之孫好畤矦耿忠等共議之畤音止耿秉曰昔者匈奴援引弓之類援于元翻并左袵之屬故不可得而制孝武旣得河西四郡及居延朔方居延武帝置縣屬張掖郡賢曰故城在今甘州張掖縣北虜失其肥饒畜兵之地𦍑胡分離唯有西域俄復内屬復扶又翻故呼韓邪單于請事欵塞其勢易乗也易以䜴翻今有南單于形勢相似然西域尚未内屬北虜未有釁隙臣愚以為當先撃白山西河舊事曰白山冬夏有雪故曰白山匈奴謂之天山過之皆下馬拜焉去蒲類海百里之内得伊吾賢曰伊吾即伊吾盧地本屬匈奴後取其地置宜禾都尉以為屯田今伊州細職縣伊吾故城是也又曰伊吾故城在今𤓰州晉昌縣北破車師通使烏孫諸國以斷其右臂使疏吏翻斷丁管翻伊吾亦有匈奴南呼衍一部破此復為折其左角復扶又翻折而設翻然後匈奴可撃也上善其言議者或以為今兵出白山匈奴必并兵相助又當分其東以離其衆上從之十二月以秉為駙馬都尉固為奉車都尉以騎都尉秦彭為秉副三都尉皆武帝置奉車都尉掌乗輿駙馬都尉掌天子之副馬師古曰駙副也一回近也疾也耿忠為固副皆置從事司馬出屯涼州秉國之子忠弇之子廖援之子也十六年春二月遣肜與度遼將軍吳棠將河東西河𦍑胡及南單于兵萬一千騎出髙闕塞髙闕在朔方北竇固耿忠率酒泉敦煌張掖甲卒及盧水𦍑胡萬二千騎出酒泉塞賢曰案湟水東經臨𦍑縣故城北又東盧溪水注之水出西南盧川郡其地也余據西南夷傳冉駹夷北有黄石北地盧水胡敦徒門翻耿秉秦彭率武威隴西天水募士及𦍑胡萬騎出張掖居延塞騎都尉來苖䕶烏桓校尉文穆將太原鴈門代郡上谷漁陽右北平定襄郡兵及烏桓鮮卑萬一千騎出平城塞伐北匈奴竇固耿忠至天山賢曰天山即祁連山一名雪山今名折羅漢山在伊州北漢一作漫撃呼衍王斬首千餘級追至蒲類海賢曰蒲類海今名婆悉海在今庭州蒲昌縣東南取伊吾盧地置宜禾都尉留吏士屯田伊吾盧城耿秉秦彭擊匈林王匈林恐當作句林建武時匈奴嘗遣句林王迎盧芳句音古矦翻絶幕六百餘里至三木樓山而還來苖文穆至匈河水上據前書匈河水去令居數千里臣瓉曰去令居千里虜皆犇走無所獲祭肜與南匈奴左賢王信不相得出髙闕塞九百餘里得小山信妄言以為涿邪山北史曰循弱水西行得涿邪山不見虜而還肜與呉棠坐逗留畏懦下獄免下遐稼翻常考異曰袁紀棠皆作今從范書肜自恨無功出獄數日歐血死臨終謂其子曰吾蒙國厚恩奉使不稱稱尺證翻身死誠慚恨義不可以無功受賞死後若悉簿上所得物若汝也皆為文簿而上之上時掌翻身自詣兵屯效死前行以副吾心旣卒行户剛翻卒子恤翻其子逢上䟽具陳遺言帝雅重肜方更任用聞之大驚嗟嘆良乆烏桓鮮卑每朝賀京師常過肜冢拜謁仰天號泣遼東吏民為立祠四時奉祭焉肜先為遼東太守威信行於烏桓鮮卑號户刀翻為于偽翻竇固獨有功加位特進固使假司馬班超與從事郭恂俱使西域百官志大將軍營五部部有校尉一人軍司馬一人又有軍假司馬為副貳使疏吏翻下同超行到鄯善鄯上扇翻鄯善王廣奉超禮敬甚備後忽更踈懈懈古隘翻超謂其官屬曰寧覺廣禮意薄乎官屬曰胡人不能常乆無它故也超曰此必有北虜使來狐疑未知所從故也明者睹未萌況已著邪乃召侍胡詐之曰匈奴使來數日今安在乎侍胡惶恐曰到已三日去此三十里超乃閉侍胡侍胡鄯善所遣侍超者使疏吏翻悉㑹其吏士三十六人與共飲酒酣因激怒之曰卿曹與我俱在絶域今虜使到裁數日而王廣禮敬即廢如令鄯善收吾屬送匈奴骸骨長為豺狼食矣為之奈何官屬皆曰今在危亡之地死生從司馬超曰不入虎穴不得虎子當今之計獨有因夜以火攻虜使彼不知我多少必大震怖可殄盡也怖普布翻滅此虜則鄯善破膽功成事立矣衆曰當與從事議之超怒曰吉凶決於今日從事文俗吏聞此必恐而謀泄死無所名非壯士也衆曰善初夜超遂將吏士往犇虜營初夜甲夜也㑹天大風超令十人持鼔藏虜舎後約曰見火然皆當鳴鼔大呼呼火故翻餘人悉持兵弩夾門而伏超乃順風縱火前後鼔噪虜衆驚亂超手格殺三人吏兵斬其使及從士三十餘級從才用翻餘衆百許人悉燒死明日乃還告郭恂還從宣翻又如字恂大驚旣而色動意欲分超功而不能自揜於外故色動超知其意舉手曰掾雖不行班超何心獨擅之乎從事掾也掾俞絹翻恂乃悦超於是召鄯善王廣以虜使首示之一國震怖超告以漢威徳自今以後勿復與北虜通復扶又翻廣叩頭願屬漢無二心遂納子為質還白竇固固大喜具上超功効質音致上時掌翻并求更選使使西域帝曰吏如班超何故不遣而更選乎今以超為軍司馬令遂前功固復使超使于寘復扶又翻下同寘徒賢翻欲益其兵超願但將本所從三十六人曰于寘國大而遠今將數百人無益於彊如有不虞多益為累耳累力瑞翻是時于寘王廣徳雄張南道賢曰雄張猶熾盛也張竹亮翻予謂張者自大之意而匈奴遣使監䕶其國監古銜翻超旣至于寘廣徳禮意甚踈且其俗信巫巫言神怒何故欲向漢漢使有騧馬急求取以祠我賢曰續漢及華蹻書並作騩説文馬淺黑色也音京媚翻予謂騧音𤓰黄馬黒喙曰騧讀如本字廣徳遣國相私來比就超請馬相息亮翻超宻知其狀報許之而令巫自來取馬有頃巫至超即斬其首收私來比鞭笞數百以巫首送廣徳因責讓之廣徳素聞超在鄯善誅滅虜使大惶恐即殺匈奴使者而降降戸江翻超重賜其王以下加鎮撫焉於是諸國皆遣子入侍西域與漢絶六十五載至是乃復通焉王莽天鳯三年焉耆撃教王駿西域遂絶至此五十八載耳此言與漢絶六十五載盖自始建國元年數之謂莽簒漢而西域遂與漢絶也復扶又翻載子亥翻超彪之子也淮陽王延性驕奢而遇下嚴烈有上書告延與姬兄謝弇及姊婿韓光招姦猾作圗䜟祠祭祝詛事下案驗䜟楚譖翻祝職救翻詛莊助翻下遐稼翻五月癸丑弇光及司徒邢穆皆坐死所連及死徙者甚衆戊午晦日有食之六月丙寅以大司農西河王敏為司徒有司奏請誅淮陽王延上以延罪薄於楚王英秋七月徙延為阜陵王食二縣賢曰阜陵縣名屬九江郡故城在今滁州全椒縣南是嵗北匈奴大入雲中雲中太守亷范拒之吏以衆少欲移書傍郡求救范不許㑹日暮范令軍士各交縳兩炬三頭爇火營中星列賢曰用兩炬交縳如十字爇其三頭手持一端使敵人望之疑兵士之多爇懦劣翻虜謂漢兵救至大驚待旦將退范令軍中蓐食晨往赴之賢曰蓐食早起食於寢蓐中也斬首數百級虜自相軫藉死者千餘人賢曰轔轢也藉相蹈藉也轢良力翻由此不敢復向雲中復扶又翻范丹之孫也亷丹為王莽將十七年春正月上當謁原陵夜夢先帝太后如平生歡旣寤悲不能寐即案厯明旦日吉遂率百官上陵上時掌翻其日降甘露於陵樹后考異曰帝紀云甘露降甘陵皇紀云謂原陵甘露降於樹然則實降原陵也帝紀誤以原為甘帝令百官采取以薦㑹畢帝從席前伏御床視太后鏡匳中物匳鏡匣也音亷感動悲涕令易脂澤裝具左右皆泣莫能仰視沈約曰三代以前無墓祭至秦始出寢起於墓側漢因秦上陵皆有園寢故稱寢殿起居衣服象生人之具古寢之意也北海敬王睦薨睦北海靖王興之子睦少好學少詩照翻好呼到翻下同光武及上皆愛之嘗遣中大夫詣京師朝賀賢曰中大夫王國官也掌奉玉使京師奉璧賀正月朝直遥翻召而謂之曰朝廷設問寡人賢曰朝廷謂天子也大夫將何辭以對使者曰大王忠孝慈仁敬賢樂士樂音洛臣敢不以實對睦曰吁子危我哉賢曰吁音于孔安國註尚書曰吁者疑怪之聲余按吁匈于翻此乃孤㓜時進趣之行也趣讀曰趨又七喻翻行下孟翻大夫其對以孤襲爵以來志意衰惰聲色是娛犬馬是好乃為相愛耳其智慮畏慎如此時禁切藩王法憲頗峻故睦慮及此二月乙巳司徒王敏薨三月癸丑以汝南太守鮑昱為司徒昱永之子也益州刺史梁國朱輔益州部漢中巴郡廣漢蜀郡犍為牂柯越嶲益州永昌等郡益州刺史治廣漢郡雒縣宣示漢徳威懐遠夷自汶山以西汶山在蜀郡湔氐道西徼外江水所出杜佑曰茂州漢汶山縣汶晉書音讀曰岷湔裴松之音剪前世所不至正朔所未加白狼槃木等百餘國皆舉種稱臣奉貢種章勇翻白狼王唐菆作詩三章歌頌漢徳菆側鳩翻又徂丸翻輔使犍為郡掾由恭譯而獻之犍為郡在雒陽西三千二百七十里夷言不與中國通故譯而後獻犍居言翻掾俞絹翻由姓也秦有由余或曰楚王孫由子之後初龜兹王建為匈奴所立龜兹音見前倚恃虜威據有北道攻殺䟽勒王立其臣兠題為䟽勒王班超從間道至䟽勒間古莧翻范史疏勒國去雒陽萬三百里去兠題所居槃槖城九十里逆遣吏田慮先往降之降戸江翻下同敕慮曰兠題本非䟽勒種種章勇翻國人必不用命若不即降便可執之慮旣到兠題見慮輕弱殊無降意降戸江翻慮因其無備遂前劫縳兠題左右出其不意皆驚懼奔走慮馳報超超即赴之悉召䟽勒將吏説以龜兹無道之狀因立其故王兄子忠為王求考異曰袁紀云索故王近屬得兄榆勒立之更名忠續漢書云求得故王兄子榆勒立之更名忠今從超傳國人大悦超問忠及官屬當殺兠題邪生遣之邪咸曰當殺之超曰殺之無益於事當令龜兹知漢威徳遂解遣之夏五月戊子公卿百官以帝威徳懷遠祥物顯應並集朝堂奉觴上夀班固西都賦左右廷中朝堂百僚之位蕭曹丙魏謀謨乎其上盖在殿庭左右也賢曰夀者人之所欲故卑下奉觴進酒皆言上夀朝直遥翻制曰天生神物以應王者遠人慕化實由有徳朕以虚薄何以享斯唯髙祖光武聖徳所被被皮義翻不敢有辭其敬舉觴太常擇吉日䇿告宗廟仍推恩賜民爵及粟有差時賜天下男子爵人二級三老孝悌力田人三級流人無名數欲占者人一級鰥寡孤獨篤癃貧不能自存者粟人三斛冬十一月遣奉車都尉竇固駙馬都尉耿秉騎都尉劉張出敦煌昆侖塞撃西域賢曰昆侖山名因以為塞在今肅州酒泉縣西南山有昆侖之體故名之周穆王見西王母于此山有石室王母臺又曰前書敦煌郡廣至縣有昆侖障宜禾都尉居也廣至故城在今𤓰州常樂縣東敦徒門翻侖盧昆翻秉張皆去符傳以屬固符傳皆合之以為信符兵符也張晏曰傳若今過所也如淳曰兩首書繒帛分持其一出入關合之乃得過謂之𫝊此傳盖亦行兵所用以為信非度關所用之傳也專將則有符傳今以兵屬固故去之去羌呂翻傳株戀翻合兵萬四千騎撃破白山虜於蒲類海上遂進撃車師車師前王即後王之子也其廷相去五百餘里車師前王居交河城後王居務塗谷固以後王道遠山谷深士卒寒苦欲攻前王秉以為先赴後王并力根本則前王自服固計未決秉奮身而起曰請行前乃上馬引兵北入衆軍不得已並進斬首數千級後王安得震怖走出門迎秉脱帽抱馬足降降戸江翻秉將以詣固其前王亦歸命遂定車師而還還從宣翻又如字於是固奏復置西域都䕶及戊巳校尉宣帝置都䕶元帝置戊巳校尉自王莽之亂西域與中國絶不復置今通西域復置之以陳睦為都䕶作考異曰袁紀睦穆今從范書司馬耿恭為戊校尉屯後王部金蒲城賢曰金蒲城車師後王城廷也今庭州蒲昌縣城是也杜佑曰金蒲城即車師後王所治務塗谷今北庭府蒲類縣也謁者關寵為己校尉屯前王部栁中城賢曰栁中今西州縣范考異曰袁紀作折中今從書屯各置數百人恭況之孫也耿況以上谷歸光武子孫多著功名十八年春二月詔竇固等寵兵還京師北單于遣左鹿蠡王率二萬騎擊車師蠡慮奚翻耿恭遣司馬將兵三百人救之皆為所沒匈奴遂破殺車師後王安得而攻金蒲城恭以毒藥傅矢語匈奴曰漢家箭神其中瘡者必有異虜中矢者視瘡皆沸傅音附語牛倨翻中竹仲翻大驚㑹天暴風雨隨雨擊之殺傷甚衆匈奴震怖怖普布翻相謂曰漢兵神真可畏也遂解去夏六月己未有星孛於太㣲晉天文志太㣲天子廷也十二諸矦府也孛蒲内翻耿恭以䟽勒城傍有澗水可固引兵據之此䟽勒城在車師後部非疏勒國城也據西域傳䟽勒國去長史所居五千里後部去長史所居五百里耿恭自後部金蒲城移據疏勒城其後范𦍑又自前部交河城從山北至䟽勒迎恭審觀本末則非䟽勒國城明矣秋七月匈奴復來攻復扶又翻擁絶澗水恭於城中穿井十五丈不得水吏士渇乏至笮馬糞汁而飲之賢曰笮謂壓笮也音側駕翻恭身自率士輓籠輓音晚師古曰籠所以盛土也音盧紅翻鄭氏周禮注竁土之器曰籠陸徳明音力董翻朱熹曰蕢土籠也有頃水泉奔出衆皆稱萬嵗乃令吏士揚水以示虜虜出不意以為神明遂引去八月壬子帝崩於東宫前殿年四十八遺詔無起寢廟藏主於光烈皇后更衣别室賢曰禮藏主於廟既不起寢廟故藏於后之易衣别室更易也更工衡翻下同帝遵奉建武制度無所變更后妃之家不得封矦與政館陶公主為子求郎館陶公主光武女紅夫也適駙馬都尉韓光與讀曰預為于偽翻不許而賜錢千萬謂羣臣曰即官上應列宿史記曰太㣲宮後二十五星郎位也宿音秀出宰百里茍非其人則民受其殃是以難之公車以反支日不受章奏隂陽書曰凡反支日用月朔為正戍亥朔一日反支申酉朔二日反支午未朔三日反支辰巳朔四日反支寅卯朔五日反支子丑朔六日反支帝聞而怪曰民廢農桑遠來詣闕而復拘以禁忌復扶又翻豈為政之意乎於是遂蠲其制尚書閻章二妹為貴人章精力曉舊典乆次當遷重職帝為後宫親屬竟不用是以吏得其人民樂其業樂音洛遠近畏服户口滋殖焉太子即位年十八尊皇后曰皇太后明帝初崩馬氏兄弟爭欲入宫北宮衛士令楊仁被甲持㦸嚴勒門衛人莫敢輕進者東都南北宫皆有衛士令一人秩六百石各掌其宫衛士漢官曰北宮員吏七十二人衛士四百七十一人朱爵司馬主南掖門員吏四人衛士百二十四人東明司馬主東門員吏十三人衛士百八十人朔平司馬主北門員吏五人衛士百一十七人凡員吏皆隊長佐凡居宮中者皆有口籍於門之所屬宫名兩字為鐡印文符案省符乃内之若外人以事當入本宫長吏為封棨傳其有官位者令御者言其官胡廣曰符用木長可二寸銕印以符之被皮義翻諸馬乃共譛仁於章帝言其峻刻帝知其忠愈善之拜為什邡令什邡縣屬廣漢郡此即髙帝封雍齒之什方也邡讀曰方壬戌葬孝明皇帝于顯節陵帝王紀曰顯節陵故富夀亭也西北去雒陽三十七里冬十月丁未赦天下詔以行太尉事節鄉矦熹為太傅司空融為太尉並錄尚書事光武不任三公事歸臺閣惟錄尚書事者權任稍重自是迄于齊梁謂之錄公賢曰武帝初以張子孺領尚書事錄尚書事由此始晉百官志曰漢武時左右曹諸吏分平尚書奏事知樞要者始領尚書事張安世以車騎將軍霍光以大將軍王鳯以大司馬師丹以左將軍並領尚書事後漢章帝以太傅趙熹太尉牟融並錄尚書事尚書有錄名自此始亦西京領尚書之任猶唐虞大麓之職也沈約曰漢東京每帝即位輙置太傅錄尚書事薨輙省十一月戊戌以蜀郡太守第五倫為司空倫在郡公清所舉吏多得其人故帝自遠郡用之續漢志蜀郡在雒陽西三千一百里守式又翻焉耆龜兹攻沒都䕶陳睦北匈奴圍關寵於栁中城㑹中國有大䘮救兵不至車師復叛復扶又翻下同與匈奴共攻耿恭恭率厲士衆禦之數月食盡窮困乃煑鎧弩食其筋革鎧可亥翻恭與士卒推誠同死生故皆無二心而稍稍死亡餘數十人單于知恭已困欲必降之遣使招恭曰若降者當封為白屋王按李廵注爾雅五狄有白屋一種降户江翻妻以女子妻七細翻恭誘其使上城手擊殺之炙諸城上單于大怒更益兵圍恭不能下關寵上書求救詔公卿㑹議司空倫以為不宜救司徒鮑昱曰今使人於危難之地急而棄之外則縱蠻夷之暴内則傷死難之臣難乃旦翻誠令權時後無邊事可也匈奴如復犯塞為冦陛下將何以使將將即亮翻又二部兵人裁各數十賢曰二部謂關寵及恭也匈奴圍之歴旬不下是其寡弱力盡之效也力盡猶言盡力也可令敦煌酒泉太守各將精騎二千多其幡幟倍道兼行以赴其急幟昌志翻匈奴疲極之兵必不敢當四十日間足還入塞帝然之乃遣征西將軍耿秉屯酒泉行太守事遣酒泉太守叚彭傳考異曰耿恭云秦彭今從帝紀與謁者王䝉皇甫援姓譜宋有皇甫充石宋之公族也漢初有皇甫鸞自魯徙居茂陵改父為甫余按詩周亦有皇父卿士發張掖酒泉敦煌三郡及鄯善兵合七千餘人以救之鄯上扇翻甲辰晦日有食之太后兄弟虎賁中郎廖及黄門郎防光百官志給事黄門侍郎六百石掌侍從左右漢舊儀曰黄門即屬黄門令日暮入對青𤨏門拜名曰夕郎終明帝世未嘗改官帝以廖為衛尉防為中郎將光為越騎校尉廖等傾身交結冠葢之士爭赴趣之趣七喻翻第五倫上䟽曰臣聞書曰臣無作威作福其害于而家凶于而國尚書洪範之言近世光烈皇后雖友愛天至而抑損隂氏不假以權勢謂隂后不為宗親求位也其後梁竇之家互有非法明帝即位竟多誅之謂梁松竇穆等也自是洛中無復權戚書記請託一皆斷絶復扶又翻斷丁管翻又諭諸外戚曰苦身待士不如為國為于偽翻戴盆望天事不兩施司馬遷書曰戴盆何以望天今之議者復以馬氏為言竊聞衛尉廖以布三千匹城門校尉防以錢三百萬私贍三輔衣冠知與不知莫不畢給又聞臘日亦遺其在雒中者錢各五千遺于季翻越騎校尉光臘用羊三百頭米四百斛肉五千斤臣愚以為不應經義惶恐不敢不以聞陛下情欲厚之亦宜所以安之臣今言此誠欲上忠陛下下全后家也是嵗京師及兗豫徐州大旱兖州部陳留東郡東平泰山濟北山陽濟隂等郡國豫州部汝南潁川二郡梁沛陳魯等國徐州部東海琅邪彭城廣陵下邳等郡國杜佑曰兖州盖以沇水為名又兖之為言端也信也端言陽氣端端故其氣纎殺也徐州盖取舒緩之義或云因徐丘以為名一資治通鑑巻四十五
