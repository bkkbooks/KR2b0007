  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷二十一宋司馬光撰胡三省音註漢紀十三起𤣥黓涒灘盡𤣥黓敦牂凡十一年世宗孝武皇帝下之上元封二年冬十月上行幸雍祠五畤還祝祠泰一以拜德星師古曰拜而祠之加祝辭春正月公孫卿言見神人東莱山若云欲見天子天子於是幸緱氏城緱工侯翻拜卿為中大夫遂至東莱宿留之數日無所見宿留音秀溜見大人迹云復遣方士求神怪採芝藥以千數復扶又翻時嵗旱天子既出無名乃禱萬里沙應劭曰萬里沙神祠也在東莱曲城孟康曰沙徑三百餘里杜佑通典萬里沙在莱州掖縣界夏四月還過祠泰山初河决瓠子河始决見十八卷元光二年後二十餘嵗不復塞復扶又翻塞悉則翻下同梁楚之地尤被其害被皮義翻是嵗上使汲仁郭昌二卿發卒數萬人塞瓠子河决天子自泰山還自臨决河沈白馬玉璧于河沈持林翻令羣臣從官自將軍以下皆負薪卒填决河從才用翻卒子恤翻築宮其上名曰宣防宮導河北行二渠復禹舊迹溝洫志禹導河自積石歴龍門南到華隂東下底柱及孟津洛汭至于大伾於是禹以為河所從来者髙水湍悍難以行平地數為敗乃釃二渠以引其河北載之髙地過洚水至於大陸播為九河同為迎河入渤海孟康曰二渠其一出貝丘西南南折者也其一則漯川也河自王莽時遂空惟用漯耳釃山支翻漯吐合翻而梁楚之地復寧無水災上還長安初令越巫祠上帝百鬼而用雞卜越俗用雞卜李奇曰持雞奇卜如䑕卜史記正義曰雞卜法用雞一狗一生祝願訖即殺雞狗煑熟又祭獨取雞兩眼骨上自有孔裂似人物形則吉不足則凶今嶺南猶行此法范成大桂海虞衡志雞卜南人占法以雄雞雛執其兩足焚香禱所占撲雞殺之㧞兩股骨淨洗線束之以竹筳挿束處使兩骨相背於筳端執竹再祝左骨為儂儂我也右骨為人人所占事也視兩骨之側所有細竅以細竹筳長寸餘偏挿之斜直偏正各隨竅之自然以定吉凶法有十八變大扺直而正或近骨者多吉曲而斜或逺骨者多凶亦有用雞卵卜者握卵以卜書墨於殻記其四維煑熟横截視當墨處辨殻中白之厚薄以定儂人吉凶公孫卿言僊人好樓居好呼到翻於是上令長安作蜚廉桂觀甘泉作益夀延夀觀應劭曰蜚廉神禽名能致風氣晉灼曰身似鹿頭如爵有角而蛇尾文如豹文桂觀漢志作桂舘師古曰蜚廉桂舘益壽延壽四舘名觀古玩翻使卿持節設具而候神人又作通天莖臺通天臺在甘泉宮漢舊儀曰臺髙五十丈去長安二百里望見長安城置祠具其下更置甘泉前殿益廣諸宮室初全燕之世嘗畧屬真番朝鮮徐廣曰遼東有番汙縣應劭曰𤣥莵本真番國番普安翻張晏曰朝鮮有濕水冽水汕水三水合為洌水疑樂浪朝鮮取名於此括地志髙麗都平壤城本樂浪郡王險城又古云朝鮮索應曰案朝音潮直驕翻鮮音仙以有汕水故也汕一音訕為置吏築障塞為于偽翻下同秦滅燕屬遼東外徼徼古弔翻漢興為其逺難守復修遼東故塞至浿水為界班志浿水出遼東塞外西南至樂浪縣西入海水經浿水出樂浪鏤方縣東南過臨浿縣東入海酈道元註曰滿自浿水而至朝鮮若浿水東流無渡浿之理余訪蕃使言城在浿水之陽其水西流逕樂浪郡朝鮮縣故志曰浿水西至增地縣入海經誤浿普盖翻又滂沛翻普大翻杜佑曰浿滂拜翻屬燕燕王盧綰反入匈奴見十二卷髙祖十三年燕人衞滿亡命聚黨千餘人椎髻蠻夷服而東走出塞渡浿水居秦故空地上下障稍役屬真番朝鮮蠻夷及燕亡命者王之王于况翻都王險韋昭曰王險故邑名應劭曰遼東有險瀆縣即滿所都因水險故曰險瀆臣瓚曰王險在樂浪郡浿水之東師古曰瓚説是貢曰即平壤城㑹孝惠髙后時天下初定遼東太守即約滿為外臣保塞外蠻夷無使盜邊諸蠻夷君欲入見天子勿得禁止見賢遍翻下同以故滿得以兵威財物侵降其旁小邑真番臨屯皆来服屬臨屯帝後開為郡註見下三年降户江翻方數千里傳子至孫右渠所誘漢亡人滋多又未嘗入見誘音酉見賢遍翻下同辰國欲上書見天子又雍閼不通師古曰辰國即辰韓之國雍讀曰壅閼一曷翻是嵗漢使涉何誘諭涉姓也左傳晉有大夫涉佗右渠終不肯奉詔何去至界上臨浿水使御刺殺送何者朝鮮裨王長刺七亦翻即渡馳入塞遂歸報天子曰殺朝鮮將上為其名美將即亮翻為于偽翻下同即不詰拜何為遼東東部都尉遼東東部都尉治武次縣朝鮮怨何發兵襲攻殺何六月甘泉房中産芝九莖時芝産於甘泉齋房九莖連葉論衡芝生於土土氣和則芝艸生瑞命記王者慈仁則芝草生上為之赦天下上以旱為憂公孫卿曰黄帝時封則天旱乾封三年上乃下詔曰天旱意乾封乎乾音干秋作明堂於汶上班志泰山郡莱蕪縣禹貢汶水出西南入濟桑欽所言又曰琅邪郡朱虛縣東泰山汶水所出東至安丘入濰有五帝祠師古曰前言汶水出莱蕪入濟此又言出朱虚入濰將桑欽所言有異或者有二汶水乎予據班志明堂在泰山奉髙縣西南四里又禹貢浮于汶達于濟此明堂當在濟之汶上琅邪之汶入于濰而濰入于海其地僻逺非立明堂處汶音問上募天下死罪為兵遣樓船將軍楊僕從齊浮渤海僕從齊浮渤海葢自青莱以北幽平以南皆濵于海其海通謂之渤海非指渤海郡而言也左將軍荀彘出遼東以討朝鮮初上使王然于以越破及誅南夷兵威喻滇王入朝滇王者其衆數萬人其旁東北有勞深靡莫皆同姓相仗未肯聽仗直亮翻勞深靡莫數侵犯使者吏卒數所角翻於是上遣將軍郭昌中郎將衞廣發巴蜀兵擊滅勞深靡莫以兵臨滇滇王舉國降請置吏入朝於是以為益州郡續漢志益州郡去雒陽五千六百里魏晉為南中寧州之地唐為昆州姚州之地後沒于南詔師古曰唐南寧州昆州裒州也降户江翻朝直遥翻賜滇王王印復長其民復扶又翻又如字長丁丈翻是時漢滅兩越平西南夷置初郡十七臣瓉曰元鼎六年定南越地以為南海欝林蒼梧合浦九真日南交趾珠厓儋耳郡定西南夷以為武都牂牁越巂沈黎汶山郡及地理志西南夷傳所置犍為零陵益州郡凡十七且以其故俗治毋賦税南陽漢中以往郡各以地比給初郡吏卒奉食幣物傳車馬被具師古曰地比謂依其次第自近及逺比頻寐翻奉扶用翻傳張戀翻被皮義翻而初郡時時小反殺吏漢發南方吏卒往誅之間嵗萬餘人費皆仰給大農大農以均輸調鹽鐵助賦故能贍之然兵所過縣為以訾給毋乏而已訾讀曰資不敢言擅賦法矣帝初擊胡大司農賦税専以奉戰士故有擅賦之法是嵗以御史中丞南陽杜周為廷尉姓譜杜本陶唐氏劉累之後在周為唐杜氏有杜伯周外寛内深次骨李奇曰其用法深刻至骨其治大放張湯言大抵依放張湯也放甫往翻時詔獄益多二千石繫者新故相因不減百餘人廷尉一嵗至千餘章章者諸獄告劾之書上之廷尉者也章大者連逮證案數百小者數十人逺者數千近者數百里㑹獄師古曰往赴對也廷尉及中都官詔獄逮至六七萬人師古曰中都官凡京師諸官府也獄辭所及進考問者六七萬人也吏所增加十萬餘人師古曰吏又於此外以文致之更增也三年冬十二月雷雨雹大如馬頭雨于具翻上遣將軍趙破奴擊車師破奴與輕騎七百餘先至虜樓蘭王遂破車師因舉兵威以困烏孫大宛之屬宛於元翻春正月甲申封破奴為浞野矦王恢佐破奴擊樓蘭封恢為浩矦從票侯趙破奴元鼎五年坐酎金失侯今以功復封浞野矦浞野矦浩矦功臣表不書所食邑浞士角翻於是酒泉列亭障至玉門矣初作角抵戲魚龍曼延之屬文頴曰名此樂為角扺兩兩相當角力角技藝射御葢襍技樂也師古曰魚龍者為舍利之獸先戲於庭極畢乃入殿前化成比目魚跳躍漱水作霧障曰畢化成黄龍八丈散戲於庭炫耀日光西京賦云海鱗變而成龍即謂此也曼延即西京賦所謂巨獸百尋是為曼延者也延弋戰翻漢兵入朝鮮境朝鮮王右渠發兵距險樓船將軍將齊兵七千人先至王險右渠城守窺知樓船軍少守式又翻少詩沼翻即出城擊樓船樓船軍敗散遁山中十餘日稍求退散卒復聚左將軍擊朝鮮浿水西軍未能破天子為兩將未有利為于偽翻乃使衛山因兵威徃諭右渠右渠見使者頓首謝願降恐兩將詐殺臣今見信節請復降復扶又翻降户江翻下同遣太子入謝獻馬五千匹及饋軍糧人衆萬餘持兵方渡浿水使者及左將軍疑其為變謂太子已服降宜令人毋持兵太子亦疑使者左將軍詐殺之遂不渡浿水復引歸山還報天子天子誅山左將軍破浿水上軍乃前至城下圍其西北樓船亦徃㑹居城南右渠遂堅守城數月未能下左將軍所將燕代卒多勁悍樓船將齊卒已嘗敗亡困辱卒皆恐將心慙將即亮翻悍下罕翻又矦旰翻其圍右渠嘗持和節左將軍急擊之朝鮮大臣乃隂間使人私約降樓船隂暗宻也間空隙也言暗宻遣使投空隙而出與樓船約降間古莧翻徃来言尚未肯决左將軍數與樓船期戰數所角翻下同樓船欲就其約不㑹左將軍亦使人求間隙降下朝鮮朝鮮不肯心附樓船以故兩將不相能左將軍心意樓船前有失軍罪意疑也億度也料也今與朝鮮私善而又不降疑其有反計未敢發天子以兩將圍城乖異兵乆不决使濟南太守公孫遂徃正之濟子禮翻考異曰史記作征之盖字誤今從漢書有便宜得以從事遂至左將軍曰朝鮮當下乆矣不下者樓船數期不㑹具以素所意告曰今如此不取恐為大害遂亦以為然乃以節召樓船將軍入左將軍營計事即命左將軍麾下執樓船將軍并其軍以報天子天子誅遂作考異曰漢書許遂按左將軍亦以爭功相嫉乖計棄市則武帝必以遂執樓船為非漢書作許盖字誤今從史記左將軍已并兩軍即急擊朝鮮朝鮮相路人相韓隂書考異曰漢隂作陶今從史記尼谿相參將軍王唊應劭曰凡五人戎狄不知官紀故皆稱相師古曰相路人一也相韓陶二也尼谿相參三也將軍王唊四也應氏乃云五人失之矣不當尋下文乎余據韓陶今作韓隂盖從史記相息量翻唊音頰相與謀曰始欲降樓船樓船今執獨左將軍并將將即亮翻戰益急恐不能與戰王又不肯降隂唊路人皆亡降漢路人道死夏尼谿參使人殺朝鮮王右渠来降王險城未下故右渠之大臣成已又反復攻吏復扶又翻左將軍使右渠子長降相路人之子最師古曰右渠之子名長路人先已降漢而死于道故謂之降相最者其子名告諭其民誅成已以故遂定朝鮮為樂浪臨屯𤣥莵真番四郡樂浪郡治朝鮮縣葢以右渠所都為治所也臣瓚曰茂陵書臨屯郡治東暆縣去長安六千一百三十八里領十五縣𤣥莵郡本髙句驪也既平朝鮮并開為郡治沃沮城後為夷貊所侵徙郡句驪西北真番郡治霅縣去長安七千六百四十里領十五縣余據後廢臨屯真番二郡班志東暆縣屬樂浪霅縣無所攷樂音洛浪音狼封參為澅清矦功臣表澅清矦食邑於齊澅音獲又户卦翻隂為荻苴矦班書功臣表作荻苴矦食邑於勃海此從史記作荻音狄苴子餘翻唊為平州矦功臣表平州矦食邑於泰山梁父縣長為幾矦功臣表作幾矦張洛食邑於河東最以父死頗有功為湼陽矦湼陽縣屬南陽郡湼乃結翻左將軍徴至坐爭功相嫉乖計棄市樓船將軍亦坐兵至列口班志列口縣屬樂浪郡郭璞曰山海經列水在遼東余謂其地當冽水入海之口當待左將軍擅先縱失亡多當誅贖為庶人班固曰𤣥莵樂浪本箕子所封武王封箕子於朝鮮昔箕子居朝鮮教其民以禮義田蠶織作為民設禁八條為于偽翻相殺以當時償殺相傷以榖償相盜者男沒入為其家奴女為婢欲自贖者人五十萬雖免為民俗猶羞之嫁娶無所售是以其民終不相盜無門户之閉婦人貞信不淫辟辟讀曰僻其田野飲食以籩豆都邑頗放效吏往往以杯器食於用往翻郡初取吏於遼東吏見民無閉臧臧讀曰藏及賈人往者賈音古夜則為盜俗稍益薄今於犯禁寖多至六十餘條可貴哉仁賢之化也然東夷天性柔順異於三方之外故孔子悼道不行設浮桴于海欲居九夷並見論語桴編竹木為之大者曰筏小者曰桴桴芳無翻有以也夫秋七月膠西于王端薨端景帝子三年受封諡法能優其德曰于考異曰荀紀端皆作瑞今從漢書武都氐反分徙酒泉杜佑曰氐者西戎别種四年冬十月上行幸雍祠五畤雍於用翻畤音止通回中道遂北出蕭闗師古曰冋中在安定髙平有險阻蕭闗在其北此盖自回中通道以出蕭闗歴獨鹿鳴澤服䖍曰獨鹿山名鳴澤澤名皆在涿郡遒縣北界水經註澤渚方十五里自代而還幸河東春三月祠后土赦汾隂夏陽中都死罪以下夏大旱匈奴自衞霍度幕以来度幕見十九卷元狩四年希復為冦復扶又翻下同逺徙北方休養士馬習射獵數使使於漢數色角翻使使下䟽吏翻好辭甘言求請和親漢使北地人王烏等窺匈奴烏從其俗去節入穹廬去𦍑吕翻師古曰穹廬氈帳也索隱曰盖以氈為廬崇穹然而宋均曰穹獸名亦異説也單于愛之佯許甘言為遣其太子入漢為質質音致漢使楊信於匈奴信不肯從其俗單于曰故約漢嘗遣翁主給繒絮食物有品以和親師古曰品謂等差也而匈奴亦不擾邊今乃欲反古師古曰反違也令吾太子為質無幾矣師古曰言遣太子為質則匈奴國中所餘者無幾皆當盡也余謂匈奴盖自謂本與漢為鄰敵之國今乃令以太子為質是其國勢削弱所餘無幾也幾居豈翻信既歸漢又使王烏徃而單于復讇以甘言師古曰讇古諂字欲多得漢財物紿謂王烏曰吾欲入漢見天子面相約為兄弟王烏歸報漢漢為單于築邸于長安漢為于偽翻匈奴曰非得漢貴人使吾不與誠語師古曰誠實也匈奴使其貴人至漢病漢予藥欲愈之予讀曰與不幸而死漢使路充國佩二千石印綬徃使因送其䘮厚𦵏直數千金曰此漢貴人也單于以為漢殺吾貴使者乃留路充國不歸諸所言者單于特空紿王烏師古曰特但也殊無意入漢及遣太子於是匈奴數使奇兵侵犯漢邊數所角翻乃拜郭昌為㧞胡將軍及浞野矦屯朔方以東備胡五年冬上南巡狩至于盛唐文頴曰案地理志不得疑當在廬江左右縣名韋昭曰在南郡余據唐地理志夀州有盛唐縣盖以古地名名縣宋白曰夀州六安縣楚之潛也在漢為盛唐縣西十五里有盛唐山望祀虞舜于九疑地理志九疑山在陵零營道縣南亦名蒼梧山九峯相似望而疑之故曰九疑相傳舜死于蒼梧因𦵏焉故望祀之登灊天柱山班志灊縣屬廬江郡天柱山在南帝以為南嶽灊音潜唐之舒州自尋陽浮江班志尋陽縣屬廬江郡禹貢九江在南皆東合為大江沈約曰尋陽因水名縣水南注江余據漢尋陽縣在大江北自晉立尋陽郡於江南之柴桑而江北尋陽之名遂晦杜佑曰漢舊尋陽縣在江北今蘄春郡界晉温嶠移於江南親射蛟江中獲之師古曰蛟龍屬也郭璞説其狀云似蛇而有脚細頸有白嬰大者數圍卵生子如二石大甕能吞人射而亦翻舳艫千里薄樅陽而出李斐曰舳船後持柁處艫船前刺櫂處言其船多前後相銜千里不絶也舳音逐艫音盧班志樅陽縣屬廬江郡宋白曰舒州桐城縣漢為樅陽縣梁置樅陽郡師古曰樅千容翻遂北至琅邪琅邪郡秦置唐為沂州其餘地入海莱宻州界並海並步浪翻所過禮祠其名山大川春三月還至太山增封甲子始祀上帝於明堂配以髙祖因朝諸侯王列矦受郡國計師古曰計若今之諸州計簿也朝直遥翻夏四月赦天下所幸縣毋出今年租賦還幸甘泉郊泰畤長平烈矦衛青薨考異曰漢武故事大將軍四子皆不才皇后每因太子涕泣請上削其封上曰吾自知之不令皇后憂也少子竟坐奢淫誅上遣謝后通削諸子封爵各留千户焉按青四子無坐奢淫誅者此説妄也起冢象廬山廬山盖即盧山揚雄所謂填盧山之壑者也師古曰盧山匈奴中山名衛青冢在茂陵東次霍去病冢之西相併者是也上既攘郤胡越開地斥境乃置交阯朔方之州及冀幽幷兖徐青揚荆豫益凉等州凡十三部皆置刺史焉續漢志秦有監郡御史監諸郡漢興省之但遣丞相史分刺諸州無常官孝武初置刺史十三人秩六百石古今注曰常以春分行部郡國各遣一吏迎界上漢舊儀曰詔書舊典刺史班宣周行郡國省察治政黜陟能否斷理寃獄以六條問事非條所問即不省一條强宗豪右田宅踰制以强陵弱以衆暴寡二條二千石不奉詔書遵承典制倍公向私㫄詔牟利侵漁百姓聚歛為姦三條二千石不恤疑獄風厲殺人怒則任刑喜則任賞煩擾苛暴剝戮黎元為百姓所疾山崩石裂妖祥訛言四條二千石選置不平茍阿所愛蔽賢寵頑五條二千石子弟怙恃榮勢請託所監六條二千石違公下比阿附豪强通行貨賂割損政令續漢志又曰諸州常以八月巡行郡國録囚徒考殿最初嵗盡詣京都奏事中興但因計吏與古今注異據晉志帝改禹貢雍州曰凉州梁州曰益州又置徐州復禹貢舊號北置朔方南置交阯與荆揚兖豫青冀幽幷為十三州春秋元命包及晉書地理志昴畢散為冀州其地有險有易帝王所都亂則冀安弱則冀强荒則冀豐箕星散為幽州言北方太隂故以幽㝠為號營室流為幷州不以衛水為號又不以恒山為稱而云并者盖以其在兩谷之間也五星流為兖州端也信也又云盖取沇水以名焉天氐流為徐州盖取舒緩之義或云因徐丘以立名虚危流為青州周禮曰正東曰青州盖取地居少陽其色青故名牽牛流為揚州以為江南之氣躁勁厥性輕揚亦云州界多水水波輕揚也軫星散為荆州强也言其氣躁强亦曰警也言南蠻數為冦逆其人有道後服無道先强常警備也又云取名於荆山鉤鈴星别為豫州豫者舒也言稟中和之氣性理安舒也參代流為益州益之言阨言其所在之地險阨亦曰疆壤益大故以名焉凉州以地處西方常寒凉也上以名臣文武欲盡乃下詔曰葢有非常之功必待非常之人故馬或奔踶而致千里師古曰奔走也踶蹈也奔踶者乘之則奔立則踶人踶徒計翻士或有負俗之累而立功名晉灼曰負俗謂被世譏論也累力瑞翻夫泛駕之馬師古曰泛覆也與覂同言馬有逸氣者多能覆車泛方勇翻跅㢮之士如淳曰士行有卓異不入俗㢮而見斥逐者師古曰跅者跅落無檢局也㢮者放廢不遵法度也跅音跖㢮式爾翻亦在御之而已其令州郡察吏民有茂才異等應劭曰舊言秀才避光武諱稱茂才異等者超等軼羣不與几同也師古曰茂美也可為將相及使絶國者使疏吏翻六年冬上行幸回中春作首山宮應劭曰首山在上郡於其下立宮廟也文穎曰在河東蒲反界師古註漢書曰尋此下詔文及依地理志文説是三月行幸河東祠后土赦汾隂殊死以下漢既通西南夷開五郡五郡犍為越巂沈黎汶山益州欲地接以前通大夏嵗遣使十餘輩出此初郡皆閉昆明杜佑曰昆明在越巂西南諸爨所居為所殺奪幣物於是天子赦京師亡命令從軍遣㧞胡將軍郭昌將以擊之斬首數十萬後復遣使竟不得通將即亮翻復扶又翻秋大旱蝗烏孫使者見漢廣大歸報其國元鼎二年烏孫遣使隨張騫入謝天子其國乃益重漢匈奴聞烏孫與漢通怒欲擊之又其㫄大宛月氏之屬皆事漢烏孫於是恐使使願得尚漢公主為昆弟天子與羣臣議許之烏孫以千匹馬徃聘漢女漢以江都王建女細君為公主徃妻烏孫江都王建易王非之子妻七細翻下同贈送甚盛烏孫王昆莫以為右夫人匈奴亦遣女妻昆莫以為左夫人公主自治宮室居治直之翻嵗時一再與昆莫會置酒飲食昆莫年老言語不通公主悲愁思歸天子聞而憐之間嵗遣使者以帷帳錦繡給遺焉師古曰間嵗者謂每隔一嵗而徃也間古莧翻遺于季翻昆莫曰我老欲使其孫岑娶尚公主史記作岑娶漢書作岑陬師古曰岑士林翻陬子矦翻余據漢書岑陬者其官名也本名軍須靡公主不聽上書言狀天子報曰從其國俗欲與烏孫共滅胡岑娶遂妻公主昆莫死岑娶代立為昆彌烏孫建國之王曰昆莫班史云昆莫王號也名獵驕靡後書昆彌云顔注云昆莫本是王號而其人名獵驕靡故書云昆彌昆取昆莫彌取驕靡彌靡音有輕重耳盖本一也後遂以昆彌為王號滅綿結翻是時漢使西踰葱嶺抵安息安息發使以大鳥卵及黎軒善胘人獻于漢應劭曰大鳥卵如一二石甕師古曰如汲水甕無一二石也郭義恭廣志曰大爵頸及身膺蹄都似槖駝舉頭髙七八尺張翅丈餘食大麥其卵如甕即今之駞鳥也黎軒亦曰黎靬東漢為大秦國唐為拂菻國在安息烏弋之西隔大海眩與幻同即今吞刀吐火植𤓰種樹屠人截鳥之術皆是魚豢魏畧曰大秦國俗善幻口中出火自縳自解跳十二丸巧妙非常靬音軒又鉅連翻及諸小國驩濳大益車師扜罙蘇䪥之屬據史記驩濳大益在大宛西扜罙國治杆罙城去長安九千二百八十里西通于寘三百九十里後漢曰寧罙蘇䪥康居小王國治蘇䪥城去陽闗凡八千二十五里扜音烏罙與冞同䪥下戒翻皆隨漢使獻見天子見賢遍翻天子大悦西國使更来更去師古曰逓互来去前後不絶更工衡翻天子每巡狩海上悉從外國客大都多人則過之散財帛以賞賜厚具以饒給之以覽示漢富厚焉師古曰言示之令其觀覽大角抵出奇戲諸怪物多聚觀者師古曰聚都邑人令觀㸔以誇示之觀工喚翻下同行賞賜酒池肉林令外國客徧觀名倉庫府藏之積見漢之廣大傾駭之師古曰見顯示也藏徂浪翻大宛左右多蒲萄可以為酒多苜蓿苜蓿草名苜音目蓿音宿天馬嗜之漢使采其實以来天子種之於離宮别觀㫄極望然西域以近匈奴常畏匈奴使待之過於漢使焉近其靳翻是嵗匈奴烏維單于死子烏師廬立年少號兒單于自此之後單于益西北徙左方兵直雲中右方兵直酒泉敦煌郡匈奴左方兵本直上谷以東右方兵直上郡以西單于庭直代雲中今徙去而西故改左右方亦徙太初元年應劭曰初用夏正以正月為嵗首故改元為太初冬十月上行幸泰山十一月甲子朔旦冬至祠上帝于明堂東至海上考入海及方士求神者莫驗然益遣冀遇之乙酉栢梁臺災天火曰災人火曰火十二月甲午朔上親禪髙里伏儼曰髙里山名在泰山下師古曰此髙字自作髙下之髙而死人之里謂之蒿里字即為蓬蒿之蒿或呼為下里者也或者既見泰山神靈之府髙里山又在其旁即誤以髙里為蒿里混同一事陸士衡尚不免况餘人乎今流俗漢書本有作蒿字者妄增耳祠后土臨渤海將以望祀蓬莱之屬冀至殊廷焉師古曰蓬莱僊人之庭也春上還以栢梁災故朝諸侯受計於甘泉師古曰受郡國所上計簿也朝直遥翻甘泉作諸侯邸越人勇之曰越俗有火災復起屋必以大用勝服之於是作建章宮師古曰建章宮在未央宮西俗所呼貞女樓即建章之闕余據戾大子傳建章宮在長安城西周回二十里上林之地也括地志建章宮在雍州長安縣西二十里長安故城西度為千門萬户度大各翻其東則鳯闕三輔黄圖曰鳯闕髙二十五丈闗中記曰一名别風闕以言别四方之風西京賦閶闔之内别風嶕嶢是也三輔舊事曰北有圜闕髙二十丈上有銅鳯凰故曰鳯闕也髙二十餘丈髙居豪翻其西則唐中數十里虎圈西都賦前唐中而後太液索隱曰如淳云中唐冇甓鄭𤣥註唐堂庭也爾雅以廟中路謂之唐西京賦前開唐中彌望廣是也毛氏詩傳曰唐堂塗也正義曰唐是門内之路釋宮云廟中路謂之唐堂塗謂之陳班史作商中師古曰商金也於序在秋如淳謂商中為商庭盖以西方之庭也數十里言廣於莵亦西方之獸故於此置圏圏求逺翻其北治大池漸臺髙二十餘丈命曰太液池治直之翻漸臺在太液池中師古曰為水所漸漬故曰漸臺漸子廉翻臣瓚曰太液池言承隂陽津液以作池也師古曰太液池者言其津潤所及廣也中有蓬莱方丈瀛洲壺梁象海中神山龜魚之屬三輔故事池北面有石魚長三丈髙五尺南岸有石龞三枚長六尺其南有玉堂璧門大鳥之屬漢武故事玉堂基與未央前殿等去地十二丈黄圖曰璧門薄以璧玉因曰璧門大鳥立條支所産大鳥之象立神明臺井幹樓度五十丈漢宮閣䟽神明臺髙五十丈上有九室置九天道士百人然則神明井幹俱髙五十丈也井幹樓積木而髙為樓若井幹之形也井幹者井上木欄也其形或四角或八角西京賦井幹疊而百層即此樓也輦道相屬焉屬之欲翻大中大夫公孫卿壺遂姓譜晉大夫受邑壺口其後以為氏太史令司馬遷等言厯紀壊廢箕子叙大法九章而五紀明厯法故自古以来創業改制咸正厯紀宜改正朔上詔兒寛與博士賜等共議以為宜用夏正漢初用秦正以建亥之月為嵗首夏正以建寅之月為嵗首夏五月詔卿遂遷等共造漢太初厯以正月為嵗首色尚黄數用五時議者謂漢以土德旺土色黄而數五故上黄而用五張晏曰用五謂印文也若丞相曰丞相之印章諸卿及守相印文不足五字者以之字足之定官名協音律定宗廟百官之儀以為典常垂之後世云匈奴兒單于好殺伐國人不安又有天災畜多死好呼到翻畜許救翻左大都尉使人間告漢曰間古莧翻我欲殺單于降漢降户江翻漢逺即兵来迎我我即發上乃遣因杅將軍公孫敖築塞外受降城以應之服䖍曰因杅匈奴地名因所征以為將軍之名杆與俱翻受降城在居延北秋八月上行幸安定元鼎二年置安定郡屬凉州唐為原㑹涇州地漢使入西域者言宛有善馬在貳師城張晏曰貳師大宛城名宛於元翻匿不肯與漢使天子使壯士車令等持千金及金馬以請之姓譜以為車姓本於田千秋據此則已自有車姓宛王與其羣臣謀曰漢去我逺而鹽水中數敗服䖍曰鹽水水名道從水中行師古曰沙磧之中不生草木水又鹹苦即今敦煌西北惡磧者也數冇敗言每自死亡也孔文祥曰鹽澤也言水廣逺或致風波而數敗也裴矩西域記曰鹽水在西州髙昌縣東東南去𤓰州一千三百里並砂磧之地道路不可凖惟以人畜駭骨及駞馬糞為標驗由此數有死亡出其北有胡冦出其南乏水草又且徃徃而絶邑師古曰言近道之處無城郭之居也乏食者多漢使數百人為輩来而常乏食死者過半是安能致大軍乎無奈我何貳師馬宛寶馬也遂不肯予漢使予讀曰與漢使怒妄言椎金馬而去謂妄發言以詬詈之且椎破金馬而去也宛貴人怒曰漢使至輕我遣漢使去令其東邊郁成王遮攻殺漢使取其財物於是天子大怒諸嘗使宛姚定漢等言宛兵弱姚舜姓也左傳有鄭大夫姚句耳誠以漢兵不過三千人彊弩射之射而亦翻可盡虜矣天子嘗使浞野矦以七百騎虜樓蘭王以定漢等言為然而欲矦寵􅁎李氏師古曰欲封其兄弟乃拜李夫人兄廣利為貳師將軍發屬國六千騎及郡國惡少年數萬人以徃伐宛師古曰惡少年謂無行義者期至貳師城取善馬故號貳師將軍趙始成為軍正故浩矦王恢使導軍而李哆為校尉制軍事哆昌也翻索隱音尺奢翻臣光曰武帝欲矦寵􅁎李氏而使廣利將兵伐宛其意以為非有功不矦不欲負髙帝之約也夫軍旅大事國之安危民之死生繫焉茍為不擇賢愚而授之欲徼幸咫尺之功藉以為名而私其所愛不若無功而矦之為愈也然則武帝有見於封國無見於置將髙祖曰置將不善一敗塗地將即亮翻謂之能守先帝之約臣曰過矣中尉王温舒坐為姦利罪當族自殺時兩弟及兩婚家婦家曰婚亦各自坐佗罪而族光禄勲徐自為曰帝改郎中令為光禄勲應劭曰光明也禄爵也勲功也如淳曰胡公曰勲之言閽也閽者古主門官也光禄主宮門師古曰應説是也悲夫古有三族而王温舒罪至同時而五族乎師古曰温舒與兄弟同三族而兩妻各一故曰五族也闗東蝗大起飛西至燉煌燉煌郡屬凉州唐𤓰州沙州地燉音屯二年春正月戊申牧丘恬矦石慶薨沈約曰恬亦謚法所不載閏月丁丑以太僕公孫賀為丞相封葛繹矦賀始以功封南奅矦元鼎五年坐酎金免今以為相封葛繹矦功臣表不書所食邑時朝廷多事督責大臣自公孫𢎞後丞相比坐事死元狩五年丞相李蔡有罪自殺元鼎二年丞相莊青翟自殺五年丞相趙周下獄死師古曰比頻也比毘寐翻石慶雖以謹得終然數被譴數所角翻被皮義翻賀引拜為丞相不受印綬頓首涕泣不肯起上乃起去賀不得已拜出曰我從是殆矣師古曰殆危也三月上行幸河東河東郡屬司𨽻三河之一也唐蒲晉解隰州地祠后土夏五月籍吏民馬補車騎馬秋蝗貳師將軍之西也既過鹽水當道小國各城守不肯給食攻之不能下下者得食不下者數日則去比至郁成比必寐翻及也士至者不過數千皆飢罷罷讀曰疲攻郁成郁成大破之所殺傷甚衆貳師將軍與李哆趙始成等計至郁成尚不能舉况至其王都乎引兵而還至燉煌燉音屯士不過什一二師古曰什人之中一二人得還使使上書言道逺乏食且士卒不患戰而患飢人少不足以拔宛願且罷兵益發而復徃復扶又翻天子聞之大怒使使遮玉門曰軍有敢入者輒斬之貳師恐因留燉煌上猶以受降城去匈奴逺遣浚稽將軍趙破奴將二萬餘騎出朔方西北二千餘里期至浚稽山而還應劭曰浚稽山在武威塞北匈奴常以為障蔽浚音峻稽音雞余據班史匈奴中有東西浚稽東浚稽山在龍勒水上浞野矦既至期左大都尉欲發而覺單于誅之發左方兵擊浞野矦浞野矦行捕首虜得數千人還未至受降城四百里匈奴兵八萬騎圍之浞野矦夜自出求水匈奴間捕生得浞野矦間古莧翻因急擊其軍軍吏畏亡將而誅莫相勸歸者軍遂沒於匈奴兒單于大喜因遣奇兵攻受降城不能下乃冦入邊而去冬十二月兒寛卒兒五兮翻三年春正月膠東太守延廣為御史大夫膠東郡屬青州唐入青莱州界延廣史逸其姓守式又翻上東巡海上考神仙之屬皆無驗令祠官禮東泰山東泰山在琅邪郡朱虛縣界夏四月還修封泰山禪石閭應劭曰石閭在泰山下阯南方方士以為仙人之閭匈奴兒單于死子年少匈奴立其季父右賢王呴犂湖為單于呴漢書作句師古曰音鉤史記作呴音同又音吁上遣光禄勲徐自為出五原塞數百里史記正義曰即五原郡榆林塞也在勝州榆林縣西北四十里逺者千餘里築城障列亭西北至廬朐晉灼曰地理志從五原稒陽縣北出石門障即得所築城師古曰廬朐山名杜佑曰廬朐在麟州銀城縣北猶謂之光禄塞銀城漢圁隂縣地而使游擊將軍韓説長平矦衛伉屯其旁使彊弩都尉路博德築居延澤上班志居延澤在張掖居延縣東北古文以為流沙括地志居延海在甘州張掖縣東北六十四里甘州在長安西北二千四百六十里説讀曰悦伉音抗秋匈奴大入定襄雲中定襄雲中二郡屬并州殺畧數千人敗數二千石而去行破壊光禄所築城列亭障敗補邁翻壞音怪又使右賢王入酒泉張掖酒泉張掖二郡屬凉州畧數千人㑹軍正任文擊救盡復失所得而去師古曰擊救者擊匈奴以救漢人任音壬是嵗睢陽矦張昌坐為太常乏祠國除班書功臣表及公卿表皆作睢陵矦髙祖功臣張敖封宣平矦傳國至曾孫壬失矦元光三年封其弟廣為睢陵矦紹國昌廣之子也睢陵縣屬陵淮郡師古曰乏祠祠事冇闕也睢音雖初髙祖封功臣為列矦百四十有三人時兵革之餘大城名都民人散亡户口可得而數裁什二三師古曰裁與纔同十分之内纔有二三也大矦不過萬家小者五六百户其封爵之誓曰使黄河如帶泰山若厲國以永存爰及苗裔應劭曰封爵之誓國家欲使功臣傳祚無窮也帶衣帶也厲砥石也河當何時如衣帶山當何時如厲石言如帶厲國猶永存以及後世之子孫也申以丹書之信重以白馬之盟及髙后時盡差第列矦位次藏諸宗廟副在有司師古曰副貳也其列矦功籍已藏於宗廟副貳之本又在有司建文景四五世間流民既歸户口亦息列矦大者至三四萬户小國自倍師古曰謂舊五百户今者至千户也曹參初封萬六百户至後嗣宗免時有户二萬三千是為户口蕃息故也他皆類此富厚如之師古曰言其資財亦益富厚如户口之多子孫驕逸多扺法禁隕身失國至是見矦裁四人鄼矦蕭夀成繆矦酈世宗汾陽矦靳石封并睢陵矦張昌為四人耳見賢遍翻罔亦少宻焉少詩沼翻漢既亡浞野之兵公卿議者皆願罷宛軍專力攻胡天子業出兵誅宛宛小國而不能下則大夏之屬漸輕漢而宛善馬絶不来烏孫輪臺易苦漢使晉灼曰易輕也師古曰輪臺亦國名余按輪臺在車師西千餘里又西即大宛易以豉翻為外國笑乃案言伐宛尤不便者鄧光等師古曰案其罪而行罰赦囚徒發惡少年及邊騎嵗餘而出燉煌者六萬人師古曰興發部署歳餘乃得行負私從者不與師古曰負私糧食及私從者不在六萬人數中也從才用翻與讀曰預牛十萬馬三萬匹驢槖駝以萬數齎糧兵弩甚設師古曰施張甚具也天下騷動轉相奉伐宛五十餘校尉宛城中無井汲城外流水於是遣水工徙其城下水空以穴其城師古曰空孔也徙其城下水者令從它道流不廹其城也空以穴其城者圍而攻之令作孔使空穴也下云决其水原移之又云圍其城攻之皆再叙其事也一曰既徙其水不令於城下流而因其舊引水入城之孔攻而穴之余謂此書遣水工將以徙水穴城也下書决水原攻城正行其初計耳非再叙其事也益發戍甲卒十八萬酒泉張掖北置居延休屠屯兵以衛酒泉班志居延縣屬張掖郡休屠縣屬武威郡屠音儲而發天下吏有罪者亡命者及贅婿賈人故有市籍父母大父母有市籍者凡七科適為兵贅之芮翻賈音古適讀曰讁及載糒給貳師師古曰糒乾飯也音備轉車人徒相連屬屬之欲翻而拜習馬者二人為執驅馬校尉師古曰習猶便也一人為執馬校尉一人為驅馬校尉備破宛擇取其善馬云於是貳師後復行復扶又翻兵多所至小國莫不迎出食給軍至輪臺輪臺不下攻數日屠之自此而西平行至宛城師古曰平行言無冦難兵到者三萬宛兵迎擊漢兵漢兵射敗之射而亦翻敗補邁翻宛兵走入保其城貳師欲攻郁成城恐留行而令宛益生詐師古曰留行謂留止軍廢其行乃先至宛决其水原移之則宛固已憂困圍其城攻之四十餘日宛貴人謀曰王母寡匿善馬殺漢使師古曰母寡宛王名今殺王而出善馬漢兵宜解即不解乃力戰而死未晩也宛貴人皆以為然共殺王其外城壊虜宛貴人勇將煎靡師古曰宛之貴人為將而勇者名煎靡煎子延翻宛大恐走入城中持王母寡頭遣人使貳師約曰漢無攻我我盡出善馬恣所取而給漢軍食即不聽我盡殺善馬康居之救又且至至我居内康居居外與漢軍戰孰計之何從師古曰令貳師孰計之而欲攻戰乎欲不攻而取馬乎孰與熟同古字通用是時康居矦視漢兵尚盛不敢進貳師聞宛城中新得漢人知穿井而其内食尚多計以為来誅首惡者母寡母寡頭已至如此不許則堅守而康居候漢兵罷来救宛罷讀曰疲破漢兵必矣乃許宛之約宛乃出其馬令漢自擇之而多出食食漢軍師古曰下食讀曰飤漢軍取其善馬數十匹中馬以下牝牡三千餘匹而立宛貴人之故時遇漢善者名昧蔡為宛王服䖍曰蔡音楚言蔡師古曰昧音本末之末蔡音千曷翻與盟而罷兵初貳師起燉煌西起發也謂發燉煌而西也分為數軍從南北道校尉王申生將千餘人别至郁成郁成王擊滅之數人脱亡走貳師走音奏下同貳師令搜粟都尉上官桀徃攻郁成帝置搜栗都尉屬大司農姓譜楚莊王少子為上官大夫其後以為氏秦滅楚徙隴西之上邽郁成王亡走康居桀追至康居康居聞漢已破宛出郁成王與桀桀令四騎士縛守詣貳師上邽騎士趙弟恐失郁成王班志上邽縣屬隴西郡故邽戎邑也邽音圭㧞劍擊斬其首追及貳師四年春貳師將軍来至京師貳師所過小國聞宛破皆使其子弟從入貢獻見天子見賢遍翻因為質焉質音至軍還入馬千餘匹漢書李廣利傳云軍還入玉門者萬餘人馬千餘匹文為詳眀後行既還敦煌而再出師故曰後行軍非乏食戰死不甚多而將吏貪不愛卒侵牟之師古曰言如牟賊之食苖也以此物故者衆天子為萬里而伐不録其過乃下詔封李廣利為海西矦班志海西縣屬東海郡封趙弟為新畤矦功臣表新畤矦食邑於齊地畤音止以上官桀為少府軍官吏為九卿者三人諸侯相郡守二千石百餘人千石以下千餘人奮行者官過其望孟康曰迅速也自樂而行者以謫過行皆黜其勞師古曰言以罪謫而行者免其所犯不叙其勞士卒賜直四萬錢師古曰或以它財物充之故云直匈奴聞貳師征大宛欲遮之貳師兵盛不敢當即遣騎因樓蘭候漢使後過者欲絶勿通時漢軍正任文將兵屯玉門闗捕得生口知狀以聞上詔文便道引兵捕樓蘭王將詣闕簿責王對曰小國在大國間不兩屬無以自安願徙國入居漢地上直其言師古曰以其言為直遣歸國亦因使候司匈奴司讀曰伺匈奴自是不甚親信樓蘭自大宛破後西域震懼漢使入西域者益得職師古曰賞其勤勞皆得拜職也余謂顔説非也此言漢使入西域諸國不敢輕辱為得其職耳得職者不失其職也於是自燉煌西至鹽澤往往起亭而輪臺渠犂渠犂在輔臺東東南與且末接南與精紀接皆有田卒數百人置使者校尉領䕶師古曰統領保䕶屯田之事也以給使外國者師古曰收其五穀以供之使䟽吏翻後歳餘宛貴人以為昧蔡善諛以其遇漢善而得王也使我國遇屠乃相與殺昧蔡立母寡昆弟蟬封為宛王而遣其子入侍於漢漢因使使賂賜以鎮撫之蟬封與漢約歳獻天馬二匹秋起眀光宮三輔黄圖明光宮在長樂宮後南與長樂宮相聫屬北通桂宮冬上行幸回中匈奴呴犂湖單于死匈奴立其弟左大都尉且鞮矦為單于師古曰且子餘翻鞮丁奚翻天子欲因伐宛之威遂困胡乃下詔曰髙皇帝遺朕平城之憂平城事見十一卷髙祖七年遺于季翻又如字髙后時單于書絶悖逆事見十二卷惠帝三年悖蒲内翻昔齊襄公復九世之讐春秋大之公羊傳莊四年春齊襄公滅紀復仇也襄公之九世祖為紀矦所譛而烹殺于周故襄公滅紀也九世猶可以復仇乎曰雖百世可也且鞮矦單于初立恐漢襲之乃曰我兒子安敢望漢天子漢天子我丈人行也師古曰丈人尊老之稱行户浪翻因盡歸漢使之不降者路充國等充國被留見上元封四年使使来獻天漢元年應劭曰時頻年苦旱故改元為天漢以祈甘雨師古曰大雅有雲漢之詩周大夫仍叔所作以美宣王遇旱災修德勤政而能致雨故依以為年號也春正月上行幸甘泉郊泰畤三月行幸河東祠后土上嘉匈奴單于之義遣中郎將蘇武送匈奴使留在漢者因厚賂單于答其善意武與副中郎將張勝及假吏常惠等俱師古曰假吏猶言兼吏也時權為使之吏若今之差人充使典矣姓譜常姓黄帝相常先之後既至匈奴置幣遺單于遺于季翻單于益驕非漢所望也漢望其回心鄉善今乃益驕故曰非漢所望㑹緱王與長水虞常等緱王者匈奴渾邪王姊子與渾邪王俱降漢後隨浞野侯沒匈奴中漢有長水校尉掌長水胡騎師古曰長水胡名其註戾太子傳則又曰今鄠縣東有長水余據水經註長水出杜縣白鹿原北入霸水胡騎盖屯於此非胡名也戻傳註是虞常盖亦先沒於匈奴緱工侯翻及衛律所將降者隂相與謀劫單于母閼氏歸漢降户江翻閼氏音煙支衛律者父故長水胡人律善協律都尉李延年延年薦言律使於匈奴使還聞延年家收遂亡降匈奴異考曰延年傳云誅延年兄弟宗族按是後李廣利尚為將帥盖止誅延年及弟季妻子耳單于愛之與謀國事立為丁靈王魏畧曰丁靈在康居北去匈奴廷接習水七千里匈奴盖以丁靈王封衛律耳虞常在漢時素與副張勝相知私候勝曰聞漢天子甚怨衛律常能為漢伏弩射殺之為于偽翻射而亦翻吾母弟在漢言其母與其弟也幸蒙其賞賜張勝許之以貨物與常後月餘單于出獵獨閼氏子弟在虞常等七十餘人欲發其一人夜亡告之單于子弟發兵與戰緱王等皆死虞常生得師古曰被執獲也單于使衛律治其事治直之翻張勝聞之恐前語發以狀語武狀語牛倨翻武曰事如此此必及我見犯乃死重負國欲自殺勝惠共止之虞常果引張勝見犯言被匈奴侵犯然後乃死是為更負漢國故欲先自殺而勝惠止之引謂辭及之也重直用翻單于怒召諸貴人議欲殺漢使者左伊秩訾曰即謀單于何以復加臣瓚曰左伊秩訾胡官之號余據匈奴傳呼韓邪之敗其右伊秩訾王使之降漢則此乃胡王之號師古曰言謀衛律而殺之其罰太重也復扶又翻宜皆降之降户江翻下同單于使衛律召武受辭師古曰致單于之命而取其對也武謂惠等謂猶語也武語恵等也屈節辱命雖生何面目以歸漢引佩刀自刺刺七亦翻衛律驚自抱持武馳召醫鑿地為坎置煴火師古曰煴謂聚火無燄者也煴于云翻覆武其上師古曰覆身於坎上也覆音方目翻蹈其背以出血武氣絶半日復息師古曰息謂出氣也惠等哭輿歸營單于壯其節朝夕遣人候問武而收繫張勝武益愈單于使使曉武欲降之師古曰喻説令武降也會論虞常欲因此時降武劒斬虞常已律曰漢使張勝謀殺單于近臣師古曰近臣衛律自謂也當死單于募降者赦罪舉劒欲擊之勝請降律謂武曰副有罪當相坐武曰本無謀又非親屬何謂相坐復舉劒擬之復扶又翻下同武不動律曰蘇君律前負漢歸匈奴幸䝉大恩賜號稱王擁衆數萬馬畜彌山師古曰彌滿也畜許又翻富貴如此蘇君今日降明日復然空以身膏艸野膏古號翻誰復知之武不應律曰君因我降與君為兄弟今不聽吾計後雖欲復見我尚可得乎武罵律曰汝為人臣子不顧恩義畔主背親背蒲妹翻為降虜於蠻夷何以汝為見師古曰言何用見汝為也且單于信汝使决人死生不平心持正反欲鬬兩主觀禍敗南越殺漢使者屠為九郡宛王殺漢使者頭縣北闕朝鮮殺漢使者即時誅滅南越事見上卷元鼎五年六年宛事見上太初三年朝鮮事見上元封二年縣讀曰懸獨匈奴未耳若知我不降明師古曰若汝也言汝知我不降明矣欲令兩國相攻匈奴之禍從我始矣律知武終不可脅白單于單于愈益欲降之乃幽武置大窖中師古曰舊米粟之窖而空者也窖工孝翻絶不飲食天雨雪武卧齧雪與旃毛幷咽之師古曰飲於禁翻食讀曰飤雨于具翻齧魚結翻咽音宴吞也數日不死匈奴以為神乃徙武北海上無人處使牧羝曰羝乳乃得歸師古曰羝牡羊也羝不當産乳故設此言示絶其事若燕太子丹烏白頭馬生角之比也羝音丁奚翻乳音人喻翻别其官屬常惠等各置他所天雨白氂師古曰氂毛之彊曲者音力之翻夏大旱五月赦天下發讁戍屯五原五原郡屬并州括地志勝州連谷縣本秦九原郡漢武帝更名五原浞野矦趙破奴自匈奴亡歸太初元年破奴為匈奴所獲是嵗濟南太守王卿為御史大夫濟南郡屬青州唐淄青齊州地濟子禮翻守式又翻考異曰七月閉城門大搜臣瓚註武帝紀曰漢帝記六月禁踰侈十月大搜則搜索踰侈者不必閉城門大搜葢搜姦人耳二年春上行幸東海東海郡屬徐州唐為海州地幸回中夏五月遣貳師將軍廣利以三萬騎出酒泉擊右賢王於天山晉灼曰天山在西域近蒲類國去長安八千里師古曰即祈連山也匈奴謂天曰祈連西河舊事白山冬夏有雪匈奴謂之天山括地志天山一名白山今名折羅漫山在伊吾縣北百二十里伊州在長安西北四千四百一十六里余據唐志祁山在甘州張掖縣與天山似是兩處騎音渠吏翻得胡首虜萬餘級而還還從宣翻又如字匈奴大圍貳師將軍漢軍乏食數日死傷者多假司馬隴西趙充國隴西郡屬凉州唐河渭岷州地與壯士百餘人潰圍陷陳陳讀曰陣貳師引兵隨之遂得解漢兵物故什六七充國身被二十餘創貳師奏狀詔徴充國詣行在所帝親見視其創被皮義翻創初良翻嗟嘆之拜為中郎漢復使因杅將軍敖出西河西河郡屬并州彊弩都尉路博德㑹涿涂山徐廣曰涂音邪索隠曰涿音卓邪以奢翻漢書作涿邪山在髙闕塞北千餘里無所得初李廣有孫陵為侍中善騎射愛人下士帝以為有廣之風拜騎都尉續漢志騎都尉比二千石杜佑曰奉車都尉駙馬都尉騎都尉並漢武帝置東晉省奉車騎都尉惟留駙馬尚主者為之使將丹陽楚人五千人丹陽秦鄣郡地元封二年更名丹陽屬揚州唐宣歙池昇睦州之地教射酒泉張掖以備胡及貳師擊匈奴上詔陵欲使為貳師將輜重將即亮翻下同重直用翻陵叩頭自請曰臣所將屯邊者皆荆楚勇士奇材劍客也力扼虎扼捉持也射命中師古曰所指名處即中之也中竹仲翻願得自當一隊到蘭于山南以分單于兵毋令專鄉貳師軍鄉讀曰嚮上曰將惡相屬邪將如字惡烏路翻吾發軍多無騎予汝陵對無所事騎師古曰猶言不須騎也予讀曰與女讀曰汝臣願以少擊衆歩兵五千人涉單于庭上壯而許之因詔路博德將兵半道迎陵軍博德亦羞為陵後距奏言方秋匈奴馬肥未可與戰願留陵至春俱出上怒疑陵悔不欲出而教博德上書乃詔博德引兵擊匈奴於西河詔陵以九月發出遮虜障遮虜障在張掖居延縣路博德所築括地志漢居延故城在甘州張掖縣之東北一千五百三十里有遮虜障至東浚稽山南龍勒水上班志敦煌龍勒縣有龍勒水出南羌中東北入澤溉民田葢其下流北至浚稽山下徘徊觀虜即無所見還抵受降城休士太初元年公孫敖築受降城陵於是將其步卒五千人出居延北行三十日至浚稽山止營舉圖所過山川地形使麾下騎陳步樂還以聞步樂召見道陵將率得士死力將率猶言將領也將即亮翻率如字上甚悦拜步樂為郎陵至浚稽山與單于相值騎可三萬圍陵軍軍居兩山間以大車為營陵引士出營外為陳陳讀曰陣前行持㦸盾後行持弓弩行户剛翻盾食尹翻虜見漢軍少直前就營陵摶戰攻之如淳曰手對戰也千弩俱發應弦而倒虜還走上山上時掌翻漢軍追擊殺數千人單于大驚召左右地兵八萬餘騎攻陵陵且戰且引南行數日抵山谷中師古曰抵當也至也連戰士卒中矢傷三創者載輦兩創者將車一創者持兵戰復斬首三千餘級中作仲翻創初良翻將如字詩無將大車鄭氏曰將猶扶進也復扶又翻引兵東南循故龍城道行四五日抵大澤葭葦中師古曰葭即蘆也釋名曰初生為葭長大為蘆成則名為葦虜從上風縱火陵亦令軍中縱火以自救師古曰預燒自陳前葭葦則虜火不得而延及也南行至山下單于在南山上使其子將騎擊陵陵軍步鬬樹木間復殺數千人因發連弩射單于服䖍曰三十弩共一弦也張晏曰三十絭共一臂也貢父曰皆無此理葢如今之合蟬或併兩弩共一弦之類余據魏氏春秋諸葛亮損益連弩以鉄為矢矢長八寸一弩十矢俱發今之划車弩梯弩葢亦損益連弩而為之雖不能三十臂共一弦亦十數臂共一弦射而亦翻單于下走是日捕得虜言單于曰此漢精兵擊之不能下日夜引吾南近塞得無有伏兵乎近其靳翻諸當户君長皆言師古曰當户匈奴官名余據匈奴之官有左右當户骨都矦几二十四長單于自將數萬騎擊漢數千人不能滅後無以復使邊臣復扶又翻下同令漢益輕匈奴復力戰山谷間尚四五十里得平地不能破乃還是時陵軍益急匈奴騎多戰一日數十合復傷殺虜二千餘人虜不利欲去㑹陵軍候管敢為校尉所辱續漢志凡領軍皆有部曲部有校尉部下有曲曲有軍候一人亡降匈奴具言陵軍無後救射矢且盡獨將軍麾下及校尉成安矦韓延年韓延年以父千秋死南越封事見上卷元鼎五年各八百人為前行以黄與白為幟當使精騎射之行户剛翻射而亦翻即破矣單于得敢大喜使騎並攻漢軍疾呼曰李陵韓延年趣䧏呼火故翻趣讀曰促遂遮道急攻陵陵居谷中虜在山上四面射矢如雨下漢軍南行未至鞮汗山一日五十萬矢皆盡師古曰鞮音丁奚翻漢書作百五十萬矢皆盡即棄車去士尚三千餘人徒斬車輻而持之師古曰徒但也輻音福軍吏持尺刀入陿谷單于遮其後乘隅下壘石服䖍曰壘石山名也師古曰此説非也言放石以投人因山隅曲而下也壘盧對翻士卒多死不得行昏後陵便衣獨步出營蘇林曰褰衣卷䄂而行也師古曰便衣謂著短衣小䄂也止左右毋隨我丈夫一取單于耳師古曰言一身獨取也良乆陵還太息曰兵敗死矣於是盡斬旌旗及珍寶埋地中陵嘆曰復得數十矢足以脱矣今無兵復戰師古曰兵即謂矢及矛㦸之屬也天明坐受縳矣各鳥獸散猶有得脱歸報天子者令軍士人持二升糒一片氷師古曰時冬寒有氷持之以備渴也糒音備期至遮虜障者相待與軍士期有先至遮虜障者留駐以待後至也夜半時擊鼓起士鼓不鳴陵與韓延年俱上馬壯士從者十餘人虜騎數千追之韓延年戰死陵曰無面目報陛下遂降軍人分散脱至塞者四百餘人陵敗處去塞百餘里史記正義曰遮虜障西北百八十里直居延北長老相傳云是李陵戰處邊塞以聞上欲陵死戰後聞陵降上怒甚責問陳步樂步樂自殺羣臣皆罪陵上以問太史令司馬遷遷盛言陵事親孝與士信常奮不顧身以狥國家之急師古曰狥營也一曰從也其素所畜積也言其胷中素所畜積者如上所言也有國士之風今舉事一不幸全軀保妻子之臣隨而媒糵其短服䖍曰媒音欺謂詆欺也孟康曰媒酒教糵麯也謂釀成其罪也師古曰孟説是也齊人名麴餅曰媒賈公彦曰齊人名麴餅為媒者麴麩和合得成酒醴名之為媒誠可痛也且陵提步卒不滿五千深蹂戎馬之地師古曰蹂人九翻踐也抑數萬之師虜救死扶傷不暇悉舉引弓之民共攻圍之轉鬬千里矢盡道窮士張空弮文頴曰弮弓弩弮也師古曰音去權翻又音眷冒白刃北首争死敵師古曰冒犯也北首北嚮也冒音莫北翻首音式救翻得人之死力雖古名將不過也身雖陷敗然其所摧敗亦足暴於天下師古曰所摧敗敗匈奴之兵也暴者猶章也摧敗補賣翻彼之不死宜欲得當以報漢也師古曰言欲立功以當罪也上以遷為誣罔欲沮貳師為陵游説下遷腐刑沮在呂翻為于偽翻説式芮翻下遐嫁翻如淳曰腐宮刑也丈夫割勢不復能生子如腐木不生實腐音附乆之上悔陵無救曰陵當發出塞乃詔彊弩都尉令迎軍坐預詔之得令老將生姦詐孟康曰坐預詔博德迎陵博徳老將出塞不至令陵見没也余謂此説非也帝意既悔追思前事以為當陵發出塞之時方可詔博德繼其後以迎陵軍乃於陵未行之時預詔之使博德羞為陵後距得生姦詐上奏而遂令傳德别出西河使陵軍無救也乃遣使勞賜陵餘軍得脱者勞力到翻上以法制御下好尊用酷吏好呼報翻而郡國二千石為治者大抵多酷暴治直之翻吏民益輕犯法東方盜賊滋起大羣至數千人攻城邑取庫兵漢郡國各有庫兵釋死罪縳辱郡太守都尉殺二千石小羣以百數掠鹵鄉里者不可勝數勝音升道路不通上始使御史中丞丞相長史督之弗能禁督察也禁居禽翻乃使光禄大夫范昆及故九卿張德等衣繡衣持節虎符發兵以興擊師古曰以軍興之法而討擊也衣繡於計翻斬首大郡或至萬餘級及以法誅通行飲食當連坐者諸郡甚者數千人數嵗乃頗得其渠率師古曰渠大也率所類翻散卒失亡復聚黨阻山川者往往而羣居無可奈何於是作沈命法應劭曰沈没也敢蔽匿盗賊者没其命也孟康曰沈藏匿也命亡逃也師古曰應説是沈持林翻曰羣盜起不發覺發覺而捕弗滿品者師古曰品率也以人數為率也二千石以下至小吏主者皆死其後小吏畏誅雖有盜不敢發恐不能得坐課累府府亦使其不言師古曰縣有盗賊府亦併坐故使縣不言之也累力瑞翻故盜賊寖多上下相為匿以文辭避灋焉是時暴勝之為直指使者所誅殺二千石以下尤多威震州郡暴周卿士暴公之後至渤海渤海郡屬幽州髙祖置師古曰在渤海之濵因以為名唐為滄景州之地聞郡人雋不疑賢師古曰雋咅徂兖翻又辭兖翻姓譜有雋姓請與相見不疑容貌尊嚴衣冠甚偉勝之躧履起迎文頴曰躧音纚師古曰履不著跟曰躧躧謂納履未正曳之而行躧音山爾翻登堂坐定不疑據地曰竊伏海瀕聞暴公子舊矣師古曰瀕厓也公子勝之字也舊乆也今乃承顔接辭凡為吏太剛則折折而設翻太柔則廢威行施之以恩然後樹功揚名樹立也永終天禄勝之深納其戒及還表薦不疑上召拜不疑為青州刺史濟南王賀亦為繡衣御史濟子禮翻逐捕魏郡羣盜魏郡髙帝置屬冀州唐為相魏澶衞州地多所縱捨以奉使不稱免師古曰不稱謂不副所委稱尺正翻歎曰吾聞活千人子孫有封吾所活者萬餘人後世其興乎為王氏子孫以外戚簒漢張本是嵗以匈奴降者介和王成娩為開陵矦降户江翻師古曰娩音晩又音免班志開陵矦國屬臨淮郡將樓蘭國兵擊車師匈奴遣右賢王將數萬騎救之漢兵不利引去資治通鑑卷二十一
