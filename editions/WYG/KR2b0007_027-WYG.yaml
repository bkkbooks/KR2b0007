body:
  text: 資治通鑑卷二十七宋司馬光撰胡三省音註漢紀十九起昭陽大淵獻盡𤣥黓涒灘凡十年中宗孝宣皇帝下神爵四年春二月以鳯皇甘露降集京師赦天下潁川太守黄霸在郡前後八年地節四年潁川太守讓入為左馮翊以霸為潁川太守至元康三年霸入守京兆尹數月還故官至是適九年中間入尹京是在潁川前後八年政事愈治治直吏翻下為治政治同是時鳯皇神爵數集郡國數所角翻潁川尤多夏四月詔曰潁川太守霸宣明詔令百姓鄉化孝子弟弟郷讀曰嚮弟弟上讀曰悌貞婦順孫日以衆多田者讓畔師古曰畔田界也道不拾遺養視鰥寡贍助貧窮獄或八年無重罪囚其賜爵闗内侯黄金百斤秩中二千石而潁川孝弟有行義民行下孟翻三老力田皆以差賜爵及帛後數月徵霸為太子太傅五月匈奴單于遣弟呼留若王勝之來朝師古曰呼留若者王之號也勝之其人名考異曰匈奴傳握衍朐鞮單于立復修和親遣弟伊酋若王勝之入漢獻見蓋即謂此也冬十月鳯皇十一集杜陵河南太守嚴延年為治隂鷙酷烈衆人所謂當死者一朝出之所謂當生者詭殺之師古曰詭違正理而殺也吏民莫能測其意深淺戰栗不敢犯禁冬月傳屬縣囚㑹論府上傳知戀翻又直戀翻師古曰總集郡府而論殺流血數里河内號曰屠伯鄧展曰言延年殺人如屠兒之殺六畜也伯長也延年素輕黄霸為人及比郡為守師古曰比接近也音頻二翻褒賞反在已前心内不服河南界中又有蝗蟲府丞義出行蝗行下孟翻還見延年延年曰此蝗豈鳯皇食邪義年老頗悖師古曰悖心惡惑也音布内翻素畏延年恐見中傷延年本嘗與義俱為丞相史實親厚之饋遺之甚厚中竹仲翻遺于季翻義愈益恐自筮得死卦忽忽不樂樂音洛取告至長安師古曰取告取休假也上書言延年罪名十事已拜奏因飲藥自殺以明不欺事下御史丞按驗百官表御史大夫有兩丞秩千石一曰中丞下遐稼翻得其語言怨望誹謗政治數事十一月延年坐不道棄市初延年母從東海來欲從延年臘風俗通引禮傳曰夏曰嘉平殷曰清祀周曰大蜡漢改曰臘臘者獵也因獵取獸以祭先祖或曰新故交接大祭以報功也蔡邕獨斷曰臘者嵗終大祭縱吏民飲宴高堂隆曰王者各以其行之盛祖以其終臘水始於申盛於子終於辰故水行之君以子祖辰臘火始於寅盛於午終於戌故大行之君以午祖戌臘木始於亥盛於夘終於未故木行之君以卯祖未臘金始於己盛於酉終於丑故金行之君以酉祖丑臘土始於未盛於戌終於辰故土行之君以戌祖辰臘師古曰建丑之月為臘祭因㑹飲若今之蜡節也到洛陽適見報囚師古曰奏報行決也原父曰檢尋前後直謂斷决囚為報耳非奏得報也如今有司書囚罪長吏判凖斷是所謂報也母大驚便止都亭凡郡縣皆有都亭秦法十里一亭郡縣治所則置都亭不肯入府延年出至都亭謁母母閉閤不見延年免冠頓首閤下良久母乃見之因數責延年數所具翻幸得偹郡守專治千里守式又翻治直之翻不聞仁愛教化有以全安愚民顧乘刑罰多刑殺人師古曰顧反也乘因也欲以立威豈為民父母意哉延年服罪重頓首謝師古曰重音直用翻因為母御歸府舍為于偽翻下同母畢正臘師古曰臘及正嵗禮畢也正音之盈翻謂延年曰天道神明人不可獨殺師古曰言多殺人者已亦當死也我不意當老見壮子被刑戮也師古曰言素意不謂如此也行矣去汝東歸埽除墓地耳師古曰言待其喪至也遂去歸郡見昆弟宗人復為言之後嵗餘果敗東海莫不賢智其母師古曰稱其賢智也匈奴握衍朐鞮單于暴虐好殺伐好呼到翻國中不附及太子左賢王數讒左地貴人左地貴人謂左谷蠡王以下至左大當户統兵者也數所角翻左地貴人皆怨㑹烏桓擊匈奴東邊姑夕王頗得人民單于怒姑夕王恐即與烏禪幕及左地貴人共立稽侯㹪為呼韓邪單于㹪先安翻又所姦翻發左地兵四五萬人西擊握衍朐鞮單于至姑且水北師古曰且音子余翻未戰握衍朐鞮單于兵敗走使人報其弟右賢王曰匈奴共攻我若肯發兵助我乎師古曰若汝也此下亦同右賢王曰若不愛人殺昆弟諸貴人各自死若處無來汙我師古曰言於汝所居處自死汙烏故翻握衍朐鞮單于恚自殺恚於避翻左大且渠都隆奇亡之右賢王所都隆奇本立握衍朐鞮單于故亡且子余翻其民盡降呼韓邪單于降户江翻呼韓邪單于歸庭數月罷兵使各歸故地乃收其兄呼屠吾斯在民間者立為左谷蠡王谷音鹿蠡盧奚翻下同使人告右賢貴人欲令殺右賢王其冬都隆奇與右賢王共立日逐王薄胥堂為屠耆單于發兵數萬人東襲呼韓邪單于呼韓邪單于兵敗走屠耆單于還以其長子都塗吾西為左谷蠡王少子姑瞀樓頭為右谷蠡王留居單于庭屠耆使二子守單于庭而身西還也師古曰瞀音莫構翻五鳯元年春正月上幸甘泉郊泰畤畤音止皇太子冠冠古玩翻考異曰按宣紀太子冠在此年而荀紀於元康三年疑二疏去位事已云皇太子冠至是又重複言之蓋誤也秋七月匈奴屠耆單于使先賢撣兄右奥鞬王與烏藉都尉各二萬騎屯東方以偹呼韓邪單于撣音纒又音田是時西方呼揭王來與唯犂當户謀師古曰揭音丘例翻唯音弋癸翻共讒右賢王言欲自立為單于屠耆單于殺右賢王父子後知其寃復殺唯犂當户復扶又翻於是呼揭王恐遂畔去自立為呼揭單于右奧鞬王聞之即自立為車犂單于奧音郁鞬居言翻烏藉都尉亦自立為烏藉單于凡五單于屠耆單于自将兵東擊車犂單于使都隆奇擊烏藉烏藉車犂皆敗西北走與呼揭單于兵合為四萬人烏藉呼揭皆去單于號去羗吕翻共并力尊輔車犂單于屠耆單于聞之使左大将都尉将四萬騎分屯東方以偹呼韓邪單于自将四萬騎西擊車犂單于車犂單于敗西北走屠耆單于即引兵西南留闒敦地師古曰闒音蹋敦音頓又音對漢議者多曰匈奴為害日久可因其壊亂舉兵滅之詔問御史大夫蕭望之對曰春秋晉士匄帥師侵齊聞齊侯卒引師而還君子大其不伐喪師古曰士匄晉大夫范宣子也公羊傳襄十九年齊侯環卒晉士匄帥師侵齊至榖聞齊侯卒乃還還者何善辭也大其不伐喪也卒子恤翻以為恩足以服孝子誼足以動諸侯前單于慕化鄉善稱弟蘇林曰弟順也師古曰郷讀曰嚮弟音悌仲馮曰漢與匃奴嘗約為兄弟此弟直自為弟耳遣使請求和親海内欣然夷狄莫不聞未終奉約不幸為賊臣所殺今而伐之是乘亂而幸災也彼必犇走逺遁不以義動兵恐勞而無功宜遣使者弔問輔其微弱救其災患四夷聞之咸貴中國之仁義如遂䝉恩得復其位必稱臣服從此德之盛也上從其議冬十有二月乙酉朔日有食之韓延夀代蕭望之為左馮翊望之聞延夀在東郡時放散官錢千餘萬使御史案之師古曰望之以延壽代己為馮翊而有能名出已之上故忌害之欲䧟以罪法延夀聞知即部吏案校望之在馮翊時廪犧官錢放散百餘萬左馮翊屬官有廪犧藏令丞尉師古曰廪主榖犧主養牲皆所以供祭祀也校居孝翻望之自奏職在總領天下聞事不敢不問而為延夀所拘持上由是不直延夀各令窮竟所考望之卒無事實卒子恤翻而望之遣御史案東郡者得其試騎士日奢僣踰制師古曰試騎士每嵗大試也余謂即都試也據延夀傳治飾兵車畫龍虎朱爵延壽衣黄紈方領駕四馬𫝊總建幢棨植羽葆鼔車歌車功曹引車皆駕四馬建棨㦸五騎為伍分左右部軍假司馬千人持幢旁轂歌者先居射室望見延夀車噭咷楚歌延夀坐射室騎吏持㦸夾陛列立騎士從者帶弓鞬羅後令騎士兵車四面營陳被甲鞮鍪居馬上抱弩負蘭又使騎士戯車弄馬盗驂所謂奢僣踰制者也噭音呌咷音它釣翻又取官銅物候月食鑄刀劒效尚方事據劉向傳上令典尚方鑄作事師古注曰尚方鑄巧作金銀之所若今之中尚署又漢制尚方主作御刀劒及取官錢私假傜使吏師古曰假謂顧賃也及治飾車甲三百萬以上治直之翻延夀竟坐狡猾不道棄市吏民數千人送至渭城老小扶持車轂争奏酒炙師古曰奏進也炙之夜翻燔肉也延夀不忍距逆人人為飲為于偽翻計飲酒石餘使掾史分謝送者逺苦吏民延夀死無所恨百姓莫不流涕二年春正月上幸甘泉郊泰畤考異曰宣紀云三月行幸甘泉荀紀作正月按漢制常以正月郊祀蓋荀悦作紀之時本猶未誤也又楊惲傳曰行必不至河東矣蓋時亦幸河東祠后土史脱之也車騎将軍韓增薨五月将軍許延夀為大司馬車騎大将軍丞相丙吉年老上重之蕭望之意常輕吉上由是不悦丞相司直奏望之遇丞相禮節倨慢時緐延夀為丞相司直師古曰緐音婆又使吏買賣私所附益凡十萬三千師古曰使其吏為望之家有所買賣而吏以其私錢增益之用潤望之也請逮捕繫治秋八月壬午詔左遷望之為太子太傅以太子太傅黄霸為御史大夫匈奴呼韓邪單于遣其弟右谷蠡王等西襲屠耆單于屯兵殺略萬餘人谷蠡音鹿黎屠耆單于聞之即自将六萬騎擊呼韓邪單于屠耆單于兵敗自殺都隆奇乃與屠耆少子右谷蠡王姑瞀樓頭亡歸漢車犂單于東降呼韓邪單于降户江翻下同冬十一月呼韓邪單于左大将烏厲屈與父呼遫累烏厲溫敦皆見匈奴亂率其衆數萬人降漢封烏厲屈為新城侯烏厲溫敦為義陽侯師古曰呼遫累其官號也遫古速字累音力追翻功臣侯表新城侯食邑於汝南之細陽義陽侯食邑於南陽之平氏王考異曰宣紀呼遫累單于帥衆來降功臣表信成侯定以匈奴烏桓屠驀單于子左大将軍率衆降侯義陽侯厲温敦以匈奴謼連累單于率衆降侯此即屈與敦也未嘗為單于或降時自稱單于或紀表二者誤也是時李陵子復立烏籍都尉為單于復扶又翻呼韓邪單于捕斬之遂復都單于庭然衆裁數萬人屠耆單于從弟休旬王自立為閏振單于在西邊從才用翻呼韓邪單于兄左賢王呼屠吾斯亦自立為郅支骨都侯單于在東邊光禄勲平通侯楊惲功臣侯表平通侯食邑於汝南之博陽廉潔無私然伐其行能伐矜也行身所行也能才所堪也行下孟翻又性刻害好發人隂伏好呼到翻由是多怨於朝廷與太僕戴長樂相失樂音洛人有上書告長樂罪長樂疑惲敎人告之亦上書告惲罪曰惲上書訟韓延夀郎中丘常謂惲曰聞君侯訟韓馮翊當得活乎惲曰事何容易易以䜴翻脛脛者未必全也師古曰脛脛直貌也脛下頂翻我不能自保師古曰言我尚不能自保訟人何以得活真人所謂䑕不容穴銜窶數者也李奇曰真人正人也如淳曰所以不容穴正坐銜窶數自妨故不得入穴也師古曰窶數戴盆器也以盆盛物戴於頭者則以窶數薦之今賣白團餅人所用者是也窶音其羽翻數音山羽翻又語長樂曰語牛倨翻正月以來天隂不雨此春秋所記夏侯君所言張晏曰夏侯勝諌昌邑王曰天久隂不雨臣下必有謀上者春秋無久隂不雨之異也漢史記勝所言故曰春秋所記謂説春秋災異耳師古曰春秋有不雨事説者因論久隂附著之也張晏謂漢史為春秋失之矣事下廷尉下遐稼翻廷尉定國奏惲怨望為訞惡言于定國也訞與妖同大逆不道上不忍加誅有詔皆免惲長樂為庶人考異曰宣紀十二月楊惲坐前為光禄勲有罪免為庶人不悔過怨望大逆不道要斬荀紀因而用之惲傳惲與孫㑹宗書曰臣之得罪己三年矣又因日食之變騶馬猥佐成上書告惲罪下獄死又楊譚稱杜延年為御史大夫按百官表惲以神爵元年為光禄勲五年免戴長樂亦以其年為太僕五年免杜延年以五鳯三年六月辛酉為御史大夫又按蕭望之傳使光禄勲惲策免望之其事在今年八月惲猶為光禄勲至四年四月乃有日蝕之變蓋惲以今年十二月免為庶人至四年乃死宣紀誤也三年春正月癸卯博陽定侯丙吉薨班固賛曰古之制名必由象類逺取諸物近取諸身易大傳有是言故經謂君為元首臣為股肱師古曰謂虞書益稷云元首明哉股肱良哉也明其一體相待而成也是故君臣相配古今常道自然之埶也近觀漢相髙祖開基蕭曹為冠師古曰名位在衆人之上也余謂此言其相業冠羣后耳冠古玩翻孝宣中興丙魏有聲是時黜陟有序黜降也陟陞也衆職修理公卿多稱其位稱尺證翻海内興於禮讓覽其行事豈虚虖哉師古曰言君明臣賢所以致治非徒然二月壬辰黄霸為丞相霸材長於治民及為丞相功名損於治郡治直之翻時京兆尹張敞舍鶡雀飛集丞相府蘇林曰今虎賁所著鶡也師古曰蘇説非也此鶡音芬本作鳻此通用耳鳻雀大而色青出羗中非武賁所著也武賁鶡者色黒出上黨以其鬪死不止故用其羽飾武臣首云今時俗所謂鶡雞者也音曷非此鳻雀也霸以為神雀議欲以聞敞奏霸曰竊見丞相謂與中二千石博士雜問郡國上計長史守丞為民興利除害成大化為于偽翻條其對有耕者讓畊男女異路道不拾遺及舉孝子貞婦者為一輩先上殿師古曰丞相所坐屋也古者屋之高嚴通呼為殿不必宫中也余據鄭𤣥周禮注漢司徒府有天子以下大㑹殿後漢之司徒府則前漢之丞相府也舉而不知其人數者次之不為條教者在後叩頭謝丞相口雖不言而心欲其為之也長史守丞對時臣敞舍有鶡雀飛止丞相府屋上丞相以下見者數百人邊吏多知鶡雀者問之皆陽不知丞相圖議上奏師古曰圖謀也曰臣問上計長史守丞以興化條師古曰凡言條者一一而疏舉之若木條然也皇天報下神爵後知從臣敞舍來乃止郡國吏竊笑丞相仁厚有知畧知與智同微信奇怪也臣敞非敢毁丞相也誠恐羣臣莫白恐羣臣莫敢白其事也而長史守丞畏丞相指歸舍法令各為私教師古曰舍廢也讀曰捨務相增加澆淳散樸師古曰不雜為淳以水澆之則味漓薄樸大質也割之散也並行偽貌有名亡實亡古無字通傾揺解怠師古曰解讀曰懈甚者為妖妖於驕翻假令京師先行讓畔異路道不拾遺其實亡益廉貪貞滛之行亡古無字通行下孟翻而以偽先天下先悉薦翻固未可也即諸侯先行之偽聲軼於京師師古曰軼過也音逸非細事也漢家承敝通變造起律令所以勸善禁姦條貫詳備不可復加復扶又翻宜令貴臣明飭長史守丞師古曰飭讀與敇同歸告二千石舉三老孝弟力田孝廉廉吏務得其人郡事皆以法令為檢式師古曰檢局也音居儉翻毋得擅為條教敢挾詐偽以奸名譽者必先受戮師古曰奸求也音干以正明好惡好呼到翻惡烏路翻天子嘉納敞言召上計吏使侍中臨飭如敞指意霸甚慙又樂陵侯史髙以外屬舊恩侍中貴重樂陵縣屬平原郡師古曰樂音來各翻史髙者帝祖母史良娣兄恭之長子霸薦髙可太尉天子使尚書召問霸太尉官罷久矣尚書屬少府成帝建始四年増置為五員自文帝罷太尉官至景帝以周亞夫為太尉尋罷至武帝以田蚡為太尉罷後不復除授夫宣明教化通逹幽隠使獄無寃刑邑無盗賊君之職也将相之官朕之任焉師古曰言欲拜将相自在朕也侍中樂陵侯高帷幄近臣朕之所自親師古曰言具知其材質君何越職而舉之丞相職總百官進賢退不肖霸薦史髙以為所薦非其人可也以為越職則非也蓋自武帝以來丞相之失其職也久矣尚書令受丞相對後漢志尚書令承秦所置武帝用宦者更為尚書謁者令成帝用士人復故掌凡選署及奏下尚書曹文書衆事帝既使尚書召問霸故使尚書令受其對也尚書令中書令沈約以為兩官注已見前霸免冠謝罪數日乃决師古曰乃得免罪也自是後不敢復有所請復扶又翻然自漢興言治民吏以霸為首治直之翻三月上幸河東祠后土減天下口錢如淳曰漢儀注民年七嵗至十四出口賦錢人二十三二十錢以食天子其三錢者武帝加口錢以補車騎馬赦天下殊死以下六月辛酉以西河太守杜延年為御史大夫考異曰荀紀作辛巳百官表作辛酉按長歴此月丙午朔無辛巳置西河北地屬國以處匈奴降者處昌吕翻廣陵厲王胥使巫李女須祝詛上求為天子師古曰女須者巫之名也祝職救翻詛芷助翻事覺藥殺巫及宫人二十餘人以絕口公卿請誅胥四年春胥自殺匈奴單于稱臣遣弟右谷蠡王入侍考異曰按匈奴傳呼韓邪稱臣即遣銖婁渠堂入侍事在明年時匈奴有三單于不知此單于為誰也余按通鑑據班紀而書此事又參考匈奴傳以明其異以邊塞亡寇亡古無字通減戍卒什二大司農中丞耿夀昌奏言嵗數豐穰榖賤農人少利時穀石五錢所謂榖賤傷農者也數所角翻少詩沼翻故事嵗漕闗東榖四百萬斛以給京師用卒六萬人宜糴三輔𢎞農河東上黨太原郡榖足供京師可以省闗東漕卒過半上從其計夀昌又白令邊郡皆築倉以榖賤增其賈而糴榖貴時減賈而糶賈讀曰價名曰常平倉常平倉始此民便之上乃下詔賜夀昌爵闗内侯夏四月辛丑朔日有食之楊惲既失爵位家居治産業以財自娯其友人安定太守西河孫㑹宗與惲書諫戒之為言大臣廢退當闔門惶懼為可憐之意師古曰闔閉也為于偽翻不當治産業通賔客有稱譽治直之翻惲宰相子惲宰相楊敞之子也有材能少顯朝廷少詩沼翻一朝以晻昧語言見廢晻與暗同内懐不服報㑹宗書曰竊自思念過已大矣行已虧矣行下孟翻常為農夫以沒世矣是故身率妻子戮力耕桑不意當復用此為譏議也復扶又翻夫人情所不能止者聖人弗禁故君父至尊親送其終也有時而既師古曰君至尊父至親張晏曰喪不過三年臣見放逐降居三月復初師古曰既已也原父曰惲但云送終三年本不及放逐三月也余謂惲之此言實因廢棄而有怨望之意臣之得罪已三年矣田家作苦嵗時伏臘作苦謂耕作勞苦也史記秦作伏祠改蜡曰臘釋名曰伏者金氣伏藏之日也金畏火故三伏皆庚日歴忌曰四時代謝皆以相生至於立秋以金代火金畏火故庚日必伏毛晃曰夏有三伏冬有臘故稱嵗時伏臘烹羊炰羔師古曰炰羔炙肉也即今所謂爊也余按羊子曰羔未離乳者也其肉嫩羙炰音歩交翻斗酒自勞勞音來到翻酒後耳熱仰天拊缶而呼烏烏應劭曰缶瓦器也秦人擊之以節歌師古曰缶即今之盆類也李斯上秦王書云擊甕叩缶彈筝搏髀而歌呼烏烏快耳者真秦聲也是闗中舊有此曲其詩曰田彼南山蕪穢不治種一頃豆落而為萁治田曰田音堂練翻詩云無田甫田張晏曰山髙而在陽人召之象也蕪穢不治言朝廷之荒亂也一頃百畆以喻百官也言豆貞實之物當在囷倉零落在野喻已見放棄也萁曲而不直言朝臣皆謟諛也師古曰萁豆莖也音基治直之翻人生行樂耳樂音洛須富貴何時師古曰須待也誠荒滛無度不知其不可也師古曰自謂為可也又惲兄子安平侯譚惲兄忠襲父敞爵安平侯忠死譚嗣謂惲曰侯罪薄又有功謂惲有發霍氏謀反之功也且復用復扶又翻惲曰有功何益縣官不足為盡力為于偽翻譚曰縣官實然蓋司𨽻韓馮翊皆盡力吏也俱坐事誅蓋司𨽻事見上卷神爵二年韓馮翊事見上元年蓋古盍翻㑹有日食之變騶馬猥佐成上書告惲驕奢不悔過如淳曰騶馬以給騶使乘之佐主猥馬吏也有史有佐名成也日食之咎此人所致章下廷尉按驗得所予㑹宗書帝見而惡之下遐稼翻予讀曰與惡烏路翻廷尉當惲大逆無道要斬師古曰當謂處斷其罪要與腰同妻子徙酒泉郡譚坐免為庶人諸在位與惲厚善者未央衛尉韋𤣥成及孫㑹宗等皆免官臣光曰以孝宣之明魏相丙吉為丞相于定國為廷尉而趙蓋韓楊之死皆不厭衆心厭於贍翻滿也其為善政之累大矣累力瑞翻周官司寇之法有議賢議能周官小司寇之職以八辟麗邦法附刑罰三曰議賢之辟四曰議能之辟鄭𤣥注曰賢謂有德行者能謂有道藝者鄭衆曰若今時亷吏有罪先請是也若廣漢延夀之治民可不謂能乎治直之翻寛饒惲之剛直可不謂賢乎然則雖有死罪猶将宥之况罪不足以死乎楊子以韓馮翊之愬蕭為臣之自失楊子或問臣之自失曰韓馮翊之愬蕭趙京兆之犯魏夫所以使延夀犯上者望之激之也上不之察而延夀獨䝉其辜不亦甚哉匈奴閏振單于率其衆東擊郅支單于郅支與戰殺之并其兵遂進攻呼韓邪呼韓邪兵敗走郅支都單于庭郅支忘呼韓邪樹立之恩以兄弟而尋干戈為漢所誅宜矣甘露元年以甘露降紀元説文露潤澤也五經通義和氣津疑為露也蔡邕月令曰露者隂之液也春正月行幸甘泉郊泰畤楊惲之誅也公卿奏京兆尹張敞惲之黨友不宜處位處昌吕翻上惜敞材獨寑其奏不下師古曰天子惜敞故留所奏事不出下遐稼翻敞使掾絮舜有所案驗李奇曰絮音挐師古曰絮姓也音女居翻又音人餘翻舜其名舜私歸其家曰五日京兆耳舜以敞被奏當免在位不久也安能復案事復扶又翻敞聞舜語即部吏收舜繫獄晝夜驗治竟致其死事罪不至死而以事致之所謂文致也治直之翻舜當出死敞使主簿持教告舜曰五日京兆竟何如冬月已盡延命乎主簿處郡閤下主文簿因以名官師古曰言汝不欲望延汝命乎乃棄舜市㑹立春行寃獄使者出行下孟翻舜家載尸并編敞教師古曰編聮也聮之於章前也自言使者使者奏敞賊殺不辜上欲令敞得自便師古曰從輕法以免也即先下敞前坐楊惲奏免為庶人下遐稼翻敞詣闕上印綬上時掌翻便從闕下亡命此即令之得自便也師古曰亡命不還其本縣邑也賢曰命名也謂脱其名籍而逃亡數月京師吏民解弛師古曰弛放也解讀曰懈或如字枹鼓數起盗賊多也枹音膚數所角翻下同而冀州部中有大賊天子思敞功効使使者即家在所召敞師古曰就其所居處而召之敞身被重劾師古曰謂前有賊殺不辜之事劾户槩翻下同及使者至妻子家室皆泣而敞獨笑曰吾身亡命為民郡吏當就捕今使者來此天子欲用我也裝隨使者治行裝而隨使者也詣公車上書曰臣前幸得偹位列卿待罪京兆西都之制為三輔者列於九卿待罪者謙言也謂身居其官而不稱職則将有瘝曠之罪故謂居職為待罪西都之臣率有是言坐殺掾絮舜舜本臣敞素所厚吏數䝉恩貸師古曰貸音土帶翻宥罪曰貸以臣有章劾當免受記考事師古曰記書也若今之州縣為符敎也便歸臥家謂臣五日京兆背恩忘義背蒲妹翻傷薄俗化臣竊以舜無状枉法以誅之臣敞賊殺不辜鞠獄故不直雖伏明法死無所恨天子引見敞見賢遍翻拜為冀州刺史冀州部魏郡鉅鹿常山清河等郡廣平真定中山信都河間等國考異曰荀紀載於五鳳二年因楊惲事并致此誤也百官表敞以神爵元年為京兆尹八年免敞傳云為京兆九嵗免敞到部盗賊屏迹屏必郢翻皇太子柔仁好儒見上所用多文法吏以刑繩下常侍燕從容言陛下持刑太深宜用儒生好呼到翻下同從千容翻帝作色曰師古曰作動也意怒故動色漢家自有制度本以霸王道雜之奈何純任德教用周政乎師古曰姬周之政且俗儒不逹時宜風俗通曰儒者區也言其區别古今居則翫聖哲之辭動則行典籍之道稽先王之制立當時之事此通儒也若能納而不能出能言而不能行講誦而已無能往來此俗儒也好是古非今使人眩於名實師古曰眩亂視也音胡眄翻不知所守何足委任乃歎曰亂我家者太子也臣光曰王霸無異道昔三代之隆禮樂征伐自天子出則謂之王天子微弱不能治諸侯諸侯有能率其與國同討不庭以尊王室者則謂之霸庭直也不庭不直也一説以諸侯不朝為不庭治直之翻其所以行之也皆本仁祖義任賢使能賞善罰惡禁暴誅亂顧名位有尊卑德澤有深淺功業有鉅細政令有廣狹耳非若白黑甘苦之相反也漢之所以不能復三代之治者由人主之不為非先王之道不可復行於後世也復扶又翻夫儒有君子有小人論語孔子謂子夏曰汝為君子儒母為小人儒謝顯道為之説曰志於義則大是以謂之君子志於利則小是以謂之小人彼俗儒者誠不足與為治也治直吏翻下同獨不可求真儒而用之乎稷契臯陶伯益伊尹周公孔子皆大儒也契息列翻陶音遥使漢得而用之功烈豈若是而止邪孝宣謂太子懦而不立闇於治體必亂我家則可矣乃曰王道不可行儒者不可用豈不過哉非所以訓示子孫垂法将來者也淮陽憲王好法律淮陽王欽上次子也好呼到翻聰逹有材王母張倢伃尤幸倢伃音接予上由是疏太子而愛淮陽憲王數嗟歎憲王曰真我子也常有意欲立憲王然用太子起於微細上少依倚許氏疏讀曰疎數所角翻少詩照翻依倚許氏事見二十四卷昭帝元平元年及即位而許后以殺死事見二十四卷本始三年故弗忍也久之上拜韋𤣥成為淮陽巾尉以𤣥成嘗讓爵於兄事見二十五卷元康四年欲以感諭憲王由是太子遂安匈奴呼韓邪單于之敗也左伊秩訾王為呼韓邪計師古曰訾音子移翻勸令稱臣入朝事漢從漢求助如此匈奴乃定呼韓邪問諸大臣皆曰不可匈奴之俗本上氣力而下服役師古曰以服役於人為下以馬上戰鬭為國故有威名於百蠻戰死壯士所有也師古曰言人皆有此事耳余謂壯士健闘則戰死乃本分必有之事今兄弟争國不在兄則在弟郢支兄也呼韓邪弟也雖死猶有威名子孫常長諸國師古曰為諸國之長帥也長知兩翻下同漢雖彊猶不能兼并匈奴奈何亂先古之制臣事於漢卑辱先單于師古曰言忝辱之更令卑下也余謂此言先單于與漢争為長雄而今單于臣事之是卑辱先單于於地下也為諸國所笑雖如是而安何以復長百蠻復扶又翻左伊秩訾曰不然彊弱有時今漢方盛烏孫城郭諸國皆為臣妾自且鞮侯單于以來匈奴日削不能取復且鞮侯單于呼韓邪之曽祖也復報也且子余翻雖屈彊於此師古曰屈音其勿翻未嘗一日安也今事漢則安存不事則危亡計何以過此諸大人相難久之難乃旦翻呼韓邪從其計從左伊秩訾王之計也引衆南近塞近其靳翻遣子右賢王銖婁渠堂入侍師古曰銖音殊婁音力于翻郅支單于亦遣子右大将駒于利受入侍二月丁巳樂成敬侯許延夀薨恩澤侯表樂成侯食邑於南陽之平氏夏四月黄龍見新豐見賢遍翻丙申太上皇廟火甲辰孝文廟火上素服五日烏孫狂王復尚楚主解憂復扶又翻生一男鴟靡不與主和又暴惡失衆漢使衛司馬魏和意副􅇋任昌至烏孫􅇋衛􅇋也為和意之副任音壬公主言狂王為烏孫所患苦易誅也易以䜴翻遂謀置酒使士拔劒擊之劒旁下師古曰不正下也狂王傷上馬馳去其子細沈瘦㑹兵圍和意昌及公主於赤谷城師古曰瘦音搜赤谷城烏孫國都去長安八千九百里數月都䕶鄭吉發諸國兵救之乃解去漢遣中郎将張遵持醫藥治狂王賜金帛治直之翻因收和意昌係𤨏係𤨏即今云鎻索也從尉犁檻車至長安斬之初肥王翁歸靡胡婦子烏就屠狂王傷時驚與諸翖侯俱去居北山中其山在烏孫之北也翖與翕同音許及翻揚言母家匈奴兵來故衆歸之後遂襲殺狂王自立為昆彌是嵗漢遣破羗将軍辛武賢将兵萬五千人至燉煌通渠積榖欲以討之時立表穿渠於卑鞮侯井以西孟康曰大井六通渠也下流湧出在白龍堆東上山下燉徒門翻初楚主侍者馮嫽師古曰嫽音了嫽者慧也故以為名能史書史吏也史書猶言吏書也習事内習漢事外習西域諸國事也嘗持漢節為公主使使疏吏翻城郭諸國敬信之號曰馮夫人為烏孫右大将妻烏孫國官相大禄之下有左右大将二人蓋貴人也右大将與烏就屠相愛都護鄭吉使馮夫人説烏就屠説輪芮翻以漢兵方出必見滅不如降烏就屠恐曰願得小號以自處處昌吕翻帝徴馮夫人自問状即此事與數詔問趙充國事參而觀之通鑑所紀一千三百餘年間明審之君一人而已遣謁者竺次期門甘延夀為副送馮夫人馮夫人錦車持節應劭曰錦車以錦衣車也詔烏就屠詣長羅侯赤谷城立元貴靡為大昆彌元貴靡肥王翁歸靡嫡長男楚主解憂所生也事見上卷神爵二年烏就屠為小昆彌皆賜印綬破羗将軍不出塞還後烏就屠不盡歸翖侯人衆漢復遣長羅侯将三校屯赤谷因為分别人民地界復扶又翻校户教翻别彼列翻大昆彌户六萬餘小昆彌户四萬餘然衆心皆附小昆彌為漢以兩昆彌憂勞張本二年春正月立皇子嚻為定陶王考異曰諸侯王表十月乙亥立今據宣紀詔赦天下减民筭三十師古曰一筭減錢三十也漢律人出一筭筭百二十錢珠厓郡反夏四月遣護軍都尉張禄将兵擊之百官表䕶軍都尉秦官武帝元狩四年屬大司馬杜延年以老病免五月己丑廷尉于定國為御史大夫秋七月立皇子宇為東平王冬十二月上行幸萯陽宫屬玉觀應劭曰萯陽宮在鄠秦文王所起伏儼曰在扶風李斐曰萯音倍師古曰應説李音是也服䖍曰屬玉觀以玉飾因名焉在扶風李奇曰屬玉音鸑鷟其上有此烏因以為名晉灼曰屬玉水鳥似鵁鶄以名觀也師古曰晉説是也屬音之欲翻觀工玩翻是嵗營平壮武侯趙充國薨恩澤侯表營平侯食邑於濟南夫以趙充國之賢之功而班史列之恩澤侯者以其初封以定策功也如衛青霍去病本以破匈奴功封而班史亦列於恩澤侯以其由衛思后戚屬得進也班史書法猶有古史官典刑後之為史者不復知此矣先是充國以老乞骸骨賜安車駟馬黄金罷就弟先悉薦翻弟與第同朝廷每有四夷大議常與參兵謀師古曰與讀曰豫問籌策焉匈奴呼韓邪單于欵五原塞師古曰欵叩也按班志漢五原郡即秦九原郡治稒陽别有五原縣宋白曰漢五原故城在今勝州榆林縣界願奉國珍朝三年正月師古曰欲於甘露三年正月行朝禮朝直遥翻詔有司議其儀丞相御史曰聖王之制先京師而後諸夏先諸夏而後夷狄匈奴單于朝賀其禮儀宜如諸侯王位次在下此議猶依傍成周盛時朝諸侯之制先後皆去聲太子太傅蕭望之以為單于非正朔所加言班歴所不及也故稱敵國宜待以不臣之禮位在諸侯王上外夷稽首稱藩中國讓而不臣此則羈縻之誼謙亨之福也望之此議取春秋傳王者不治夷狄之意馬絡曰羈牛靷曰縻言其在荒服待之若馬牛然取羈縻不絶而已師古曰易謙卦之辭曰謙亨天道下濟而光明地道卑而上行言謙之為徳無所不通也亨火庚翻書曰戎狄荒服師古曰逸書也余謂此語或者伏生之書有之今國語猶載此言言其來服荒忽亡常亡古無字通如使匈奴後嗣卒有鳥􅇡䑕伏闕於朝享朝朝見也享供時享也享獻也古者諸侯見於天子必以所貢助祭於廟孝經所謂四海之内各以其職來祭者也卒讀曰粹師古曰子恤翻不為畔臣師古曰卒終也謂本以客禮待之若後不來非叛臣萬世之長策也天子采之下詔曰匈奴單于稱北蕃朝正朔謂朝明年正月朔也朕之不德不能𢎞覆覆敷救翻其以客禮待之令單于位在諸侯王上贊謁稱臣而不名荀悦論曰春秋之義王者無外欲一於天下也春秋之義王者無外故天王有入無出大夫出不言奔欲一乎天下也戎狄道路遼逺人迹介絶故正朔不及禮教不加非尊之也其埶然也詩云自彼氐羌莫敢不來王商頌殷武之詩也故要荒之君必奉王貢若不供職則有辭讓號令加焉國語祭公謀父曰蠻夷要服戎狄荒服要服者貢荒服者王有不貢則修名有不王則修徳於是讓不貢告不王於是有威讓之令有文告之辭要一遥翻非敵國之謂也望之欲待以不臣之禮加之王公之上僣度失序以亂天常非禮也若以權時之宜則異論矣詔遣車騎都尉韓昌迎單于發所過七郡二千騎為陳道上按漢書郡下又有郡字師古注曰所過之郡每為發兵陳列於道以為寵衛也七郡謂過五原朔方西河上郡北地馮翊而後至長安也為于偽翻三年春正月上行幸甘泉郊泰畤匈奴呼韓邪單于來朝贊謁稱藩臣而不名賜以冠帶衣裳黄金璽盭綬白虎通衣者隠也裳者障也所以隱形自障蔽也璽斯氏翻綬音受師古曰盭古戾字戾草名也以戾染綬亦諸侯王之制也玉具劔佩刀弓一張矢四發孟康曰玉具劔摽首鐔衛盡用玉為之也師古曰鐔劒口旁横出者也衛劒鼻也鐔音淫衛字本作彘其音同耳服䖍曰發十二矢也韋昭曰射禮三而止每射四矢故以十二為一發也師古曰發猶今言箭一放兩放也今則以一矢為一放也棨㦸十師古曰棨有衣之㦸也棨音啟安車一乘鞍勒一具師古曰勒馬轡也馬十五匹黄金二十斤錢二十萬衣被七十七襲師古曰一稱為一襲猶今人之言一副衣服也錦繡綺縠雜帛八千匹絮六千斤禮畢使使者道單于先行宿長平師古曰道讀曰導導引也如淳曰長平阪名也在也陽南上原之阪有長平觀去長安五十里師古曰涇水之南原即今所謂睚城阪也上自甘泉宿池陽宫池陽縣屬左馮翊有離宫在馬賢曰池陽縣故城在今涇陽縣西北上登長平阪詔單于毋謁師古曰不令拜也其左右當户皆得列觀及諸蠻夷君長王侯數萬咸迎於渭橋下夾道陳陳如字陳列也又塗也上登渭橋咸稱萬嵗單于就邸長安置酒建章宫饗賜單于觀以珍寳師古曰觀示也觀古玩翻二月遣單于歸國單于自請願留居幕南光禄塞下師古曰徐自為所築者也余按築武帝遣光禄徐自為出五原塞亭障列城後人因謂之光禄塞有急保漢受降城恐郅支來攻故請有急入城自保漢遣長樂衛尉高昌侯董忠功臣表高昌侯食邑於千乘樂音洛車騎都尉韓昌将騎萬六千又發邊郡士馬以千數送單于出朔方鷄鹿塞師古曰雞鹿塞在朔方窳渾縣之西北詔忠等留衛單于助誅不服又轉邊榖米糒師古曰糒乾飯也音僃前後三萬四千斛給贍其食先是自烏孫以西至安息諸國近匈奴者皆畏匈奴而輕漢先悉薦翻近其靳翻及呼韓邪朝漢後咸尊漢矣上以戎狄賔服思股肱之美乃圖畫其人於麒麟閣麒麟閣在未央宮中張晏曰武帝獲麒麟時作此閣圖盡其像於閣遂以為名師古曰漢宮閣疏云蕭何造畫古畵字通法其容貌署其官爵姓名師古曰署表也題也唯霍光不名曰大司馬大将軍博陸侯姓霍氏其次張安世韓增趙充國魏相丙吉杜延年劉德梁丘賀蕭望之蘇武凡十一人圖畫功臣自此始觀麟閣股肱之次魏丙列於霍張韓趙之下則知漢之丞相在中朝諸将軍之後矣梁丘姓也左傳齊有梁丘據皆有功德知名當世是以表而揚之明著中興輔佐列於方叔召虎仲山甫焉師古曰三人皆周宣王之臣有文武之功佐宣王中興者也言宣帝亦重興漢室而霍光等並為名臣皆比於方叔之屬召讀曰邵鳳皇集新蔡新蔡縣屬汝南郡春秋蔡平侯自蔡徙此因名三月己巳建成安侯黄霸薨恩澤侯表建成侯食邑於沛五月甲午于定國為丞相封西平侯恩澤侯表西平侯食邑於臨淮太僕沛郡陳萬年為御史大夫詔諸儒講五經同異蕭望之等平奏其議上親稱制臨决焉乃立梁丘易大小夏侯尚書榖梁春秋博士梁丘賀大夏侯勝小夏侯建榖梁赤烏孫大昆彌元貴靡及鴟靡皆病死公主上書言年老土思土思者懐故鄉也願得歸骸骨𦵏漢地天子閔而迎之冬至京師待之一如公主之制楚主本以宗室女嫁烏孫今待之如公主之制儀比皇女後二嵗卒元貴靡子星靡代為大昆彌弱師古曰言其尚㓜小馮夫人上書願使烏孫鎮撫星靡漢遣之使疏吏翻都護奏烏孫大吏大禄大監皆可賜以金印紫綬以尊輔大昆彌初烏孫王昆莫中子大禄彊善将摠萬餘騎後遂以為官名又其國官有大監二人漢列侯金印紫綬今特賜之漢許之其後段㑹宗為都護乃招還亡叛安定之星靡死子雌栗靡代立皇太子所幸司馬良娣病且死謂太子曰妾死非天命乃諸娣妾良人更祝詛殺我漢嬪御之秩良人視八百石爵比左庶長師古曰更音工衡翻祝職救翻詛荘助翻太子以為然及死太子悲恚發病恚於避翻忽忽不樂樂音洛帝乃令皇后擇後宫家人子可以娯侍太子者得元城王政君元城縣屬魏郡應劭曰魏武侯公子元食邑於此因而遂氏焉送太子宮政君故繡衣御史賀之孫女也王賀事見二十一卷武帝天漢二年見於丙殿殿蓋以甲乙丙丁為次因名見賢遍翻壹幸有身是嵗生成帝於甲館畫堂應劭曰甲觀在太子宮甲地主用乳生也畫堂畫九子母如淳曰畫堂堂名甲觀觀名三輔黄圖云太子宮有甲觀師古曰甲者甲乙丙丁之次也元后傳見於丙殿此其例也而應氏以為在宫之甲地謬矣畫堂但畫飾耳豈必九子母乎霍光止畫飾室中是則宫殿中通冇畫彩之為世適皇孫帝愛之自名曰驁字大孫常置左右適讀曰嫡嫡正出也曰世適者謂正統繼世之重也政君之入太子宮亦姬侍耳以子貴遂為正妃鷔五到翻大讀曰太為王氏竊漢張本四年夏廣川王海陽坐禽獸行賊殺不辜廢徙房陵地節四年立廣川王文海陽文之子也内亂為禽獸行行下孟翻考異曰諸侯表作汝陽宣紀景十三王傳作海陽今從之冬十月未央宮宣室閣火是嵗徙定陶王嚻為楚王匈奴呼韓邪郅支兩單于俱遣使朝獻漢待呼韓邪使有加焉黄龍元年春正月上行幸甘泉郊泰畤匈奴呼韓邪單于來朝二月歸國始郅支單于以為呼韓邪兵弱降漢不能復自還復扶又翻即引其衆西欲攻定右地又屠耆單于小弟本侍呼韓邪亦亡之右地收兩兄餘兵兩兄屠耆閏振也得數千人自立為伊利目單于目漢書作自道逢郅支合戰郅支殺之并其兵五萬餘人郅支聞漢出兵榖助呼韓邪即遂留居右地自度力不能定匈奴度徒洛翻乃益西近烏孫近其靳翻欲其并力遣使見小昆彌烏就屠烏就屠殺其使發八千騎迎郅支郅支覺其謀勒兵逄擊烏孫破之師古曰以兵逆之相逄即擊故云逢擊因北擊烏掲堅昆丁令并三國掲音丘例翻數遣兵擊烏孫常勝之數所角翻堅昆東去單于庭七千里南至車師五千里郅支留都之三月有星孛于王良閣道營室曰離宮閣道漢中四星曰天駟旁一星曰王良又紫宮後十七星絶漢抵營室曰閣道孛蒲内翻入紫微帝寑疾選大臣可屬者屬之欲翻引外屬侍中樂陵侯史髙屬讀如本字外屬猶言外戚也太子太傅蕭望之少傅周堪至禁中拜髙為大司馬車騎将軍望之為前将軍光禄勲堪為光禄大夫皆受遺詔輔政領尚書事漢尚書職典樞機凡諸曹文書衆事皆由之自是之後凡受遺輔政皆領尚書事至東都曰録尚書事冬十二月甲戌帝崩于未央宫臣瓉曰帝年十八即位即位二十五年夀四十三班固贊曰孝宣之治信賞必罰師古曰有功必賞有罪必罰治直吏翻綜核名實政事文學法理之士咸精其能至於技巧工匠器械自元成閒鮮能及之師古曰械者器之摠名也一曰有盛為械無盛為器鮮少也言少有能及之者枝渠綺翻鮮息淺翻亦足以知吏稱其職民安其業也稱尺證翻遭值匈奴乖亂推亡固存李奇曰推亡者若紂為無道天下苦之有滅亡之形周武遂推而弊之固存譬如鄰國以道蒞民上下一心勢必能存因就而堅固之今匈奴内自紛争宣帝能朝呼韓邪而固存之走郅支使逺遁是謂推亡也師古曰尚書仲虺之誥曰推亡固存邦乃其昌言有亡道者則推而滅之有存道者則輔而固之王者如此國乃昌盛故此賛引之推吐雷翻信威北夷師古曰信讀曰申古字通用一説恩信及威並著北夷余謂前意是單于慕義稽首稱藩功光祖宗業垂後嗣可謂中興侔德殷宗周宣矣師古曰侔等殷之高宗及周之宣王也癸巳太子即皇帝位謁髙廟尊皇太后曰太皇太后蘇林曰上官后皇后曰皇太后資治通鑑卷二十七
