front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百十一宋司馬光撰胡三省音注晉紀三十三起屠維大淵獻盡上章困敦凡二年安皇帝丙隆安三年春正月辛酉大赦戊辰燕昌黎尹留忠謀反誅事連尚書令東陽公根尚書段成皆坐死遣中衞将軍衞雙就誅忠弟志於凡城以衞將軍平原公元為司徒尚書令庚午魏主珪北廵分命大将軍常山王遵等三軍從東道出長川長川在禦夷鎮西北大漠之東垂也下所謂西道中道盖絶漠分為三路鎮北將軍高凉王樂真等七軍從西道出牛川珪自將大軍從中道出駁髯水以襲高車將即亮翻駁北角翻髯而占翻壬午燕右將軍張真城門校尉和翰坐謀反誅癸未燕大赦改元長樂樂音洛燕主盛每十日一自决獄不加拷掠多得其情拷音考掠音亮史言慕容盛以聰察殺身武威王烏孤徙治樂都治直之翻樂音洛以其弟西平公利鹿孤鎮安夷安夷縣漢屬金城郡晉分屬西平郡廣武公傉檀鎮西平西平治樂都縣唐鄯州之湟水縣也傉奴沃翻叔父素渥鎮湟河若留鎮澆河從弟替引鎮嶺南嶺南即洪池嶺之南洛囘鎮亷川從叔吐若留鎮浩亹從才用翻浩亹在樂都之東隋唐併入湟水縣浩音誥亹音門夷夏俊傑夏户雅翻隨才授任内居顯位外典郡縣咸得其宜烏孤謂羣臣曰隴右河西本數郡之地漢時河西置武威張掖酒泉四郡隴右置隴西金城二郡遭亂分裂至十餘國吕氏乞伏氏段氏最彊今欲取之三者何先楊統曰乞伏氏本吾之部落終當服從乞伏與禿髪氏皆鮮卑也段氏書生無能為患且結好於我攻之不義好呼到翻吕光衰耄嗣子微弱謂光以子紹為嗣也纂𢎞雖有才而内相猜忌若使浩亹亷川乗虛迭出彼必疲於奔命不過二年兵勞民困則姑臧可圖也姑臧吕光所都姑臧舉則二冦不待攻而服矣烏孤曰善二月丁亥朔魏軍大破高車三十餘部獲七萬餘口馬三十餘萬匹牛羊百四十餘萬頭衞王儀别将三萬騎絶漠千餘里將即亮翻破其七部獲二萬餘口馬五萬餘匹牛羊二萬餘頭高車諸部大震林邑王范達陷日南九真遂冦交趾太守杜瑗擊破之瑗于眷翻庚戌魏征虜将軍庾岳破張超於勃海斬之張超據南皮見上卷上年段業即凉王位改元天璽是為北凉璽斯氏翻以沮渠蒙遜為尚書左丞沮子余翻梁中庸為右丞魏主珪大獵於牛川之南以髙車人為圍周七百餘里因驅其禽獸南抵平城使高車築鹿苑廣數十里廣古曠翻三月己未珪還平城甲子珪分尚書三十六曹及外署凡置三百六十曹令八部大夫主之八部大夫恐當作八部大人魏王珪天興元年置八部大人於皇城四方四維一面置一人以擬八座謂之八國各有屬官常侍待詔直左右出入王命吏部尚書崔宏通署三十六曹如令僕統事置五經博士增國子太學生員合三千人珪問博士李先曰天下何物最善可以益人神智對曰莫若書籍珪曰書籍凡有幾何如何可集對曰自書契以來世有滋益以至于今不可勝計茍人主所好何憂不集珪從之命郡縣大索書籍悉送平城魏主珪之崇文如此而魏之儒風及平凉州之後始振盖代北以右武為俗雖其君尚文未能回也嗚呼平凉之後儒風雖振而北人胡服至孝文遷洛之時未盡改也用夏變夷之難如是夫勝音升好呼到翻索晋客翻初秦王登之弟廣帥衆三千依南燕王徳徳以為冠軍將軍處之乞活堡帥讀曰率冠古玩翻乞活堡晉惠帝時諸賊保聚之地處昌吕翻㑹熒惑守東井或言秦當復興復扶又翻廣乃自稱秦王擊南燕北地王鍾破之是時滑臺孤弱徳徙滑臺事見上卷上年土無十城衆不過一萬鍾旣敗附徳者多去徳而附廣徳乃留魯陽王和守滑臺自帥衆討廣斬之帥讀曰率下同燕主寳之至黎陽也事見上卷上年魯陽王和長史李辯勸和納之和不從辯懼故潛引晉軍至管城事亦見上卷上年欲因徳出戰而作亂旣而徳不出辯愈不自安及徳討苻廣辯復勸和反復扶又翻下同和不從辯乃殺和以滑臺降魏降户江翻魏行臺尚書和跋在鄴帥輕騎自鄴赴之騎奇寄翻旣至辨悔之閉門拒守跋使尚書郎鄧暉説之鄧暉魏之鄴臺尚書郎也説輸芮翻辯乃開門内跋跋悉收徳宫人府庫徳遣兵擊跋跋逆擊破之又破徳将桂陽王鎮将即亮翻俘獲千餘人陳頴之民多附於魏陳頴陳郡頴川也南燕右衞將軍慕容雲斬李辯帥将士家屬二萬餘口出滑臺赴徳帥讀曰率徳欲攻滑臺韓範曰嚮也魏為客吾為主人今也吾為客魏為主人人心危懼不可復戰復扶又翻不如先據一方自立基本乃圖進取微韓範之言徳若進攻滑臺必至喪敗固不待慕容超之時也張華曰彭城楚之舊都項羽都彭城故云然可攻而據之北地王鍾等皆勸徳攻滑臺尚書潘聰曰滑臺四通八達之地滑臺當滑津之要魏自北渡河而南向晉從清水入河秦㳂渭順河而下皆湊於滑臺又其城旁無山陵可依車騎舟師皆可以騁故謂之四通八達之地北有魏南有晉西有秦居之未嘗一日安也彭城土曠人稀平夷無嶮且晉之舊鎮未易可取易以豉翻又密邇江淮夏秋多水乗舟而戰者呉之所長我之所短也青州沃野二千里精兵十餘萬左有負海之饒右有山河之固廣固城曹嶷所築嶷魚力翻地形阻峻足為帝王之都三齊英傑思得明主以立功於世久矣辟閭渾昔為燕臣孝武大元十九年辟閭渾為慕容農所破遂臣於燕今宜遣辯士馳説於前大兵繼踵於後若其不服取之如拾芥耳兼弱攻昧取亂侮亡自三代之時仲虺已有是言夫子定書弗之刪也後人泥古專言王者之師以仁義行之若宋襄公可以為鑒矣説輸芮翻旣得其地然後閉闗養鋭伺隙而動此乃陛下之闗中河内也用荀彧説魏武之言伺相吏翻徳猶豫未决沙門竺朗素善占候竺朗之俗姓徳使牙門蘇撫問之朗曰敬覽三策潘尚書之議興邦之言也且今歲之初彗星起奎婁掃虚危彗者除舊布新之象奎婁為魯虛危為齊晉天文志奎婁胃魯徐州虚危齊青州彗祥嵗翻又旋芮翻又徐醉翻宜先取兖州廵撫琅邪至秋乃北徇齊地此天道也撫又密問以年世朗以周易筮之曰燕衰庚戌年則一紀世則及子其後燕亡於義熙六年歲在上章閹茂上章庚也閹茂戌也撫還報徳徳乃引師而南兖州北鄙諸郡縣皆降之降户江翻下同徳置守宰以撫之禁軍士無得虜掠百姓大恱牛酒屬路屬之欲翻丙子魏主珪遣建義将軍庾真越騎校尉奚斤擊庫狄宥連侯莫陳三部皆破之其後庫狄侯莫陳二姓皆貴顯而宥連之種微矣追奔至大峨谷置戍而還還從宣翻又如字己邜追尊帝所生母陳夫人為徳皇太后夏四月鮮卑疊掘河内帥户五千降于西秦西秦王乾歸以河内為疊掘都統以宗女妻之疊掘亦鮮卑一種也河内其名掘其月翻妻七細翻甲午燕大赦㑹稽王道子有疾㑹工外翻且無日不醉世子元顯知朝望去之乃諷朝廷解道子司徒揚州刺史朝直遙翻下同乙未以元顯為揚州刺史道子醒而後知之大怒無如之何元顯以廬江太守㑹稽張灋順為謀主㑹工外翻多引樹親黨朝貴皆畏事之為元顯張灋順俱被誅張本燕散騎常侍餘超左將軍高和等坐謀反誅散悉亶翻騎竒寄翻凉太子紹太原公纂將兵伐北凉河西四郡張掖在北故號北凉将即亮翻北凉王業求救於武威王烏孤烏孤遣驃騎大将軍利鹿孤及楊軌救之驃匹妙翻騎奇寄翻業将戰沮渠蒙遜諫曰楊軌恃鮮卑之彊有窺窬之志秃髪本鮮卑種也沮子余翻紹纂深入置兵死地不可敵也今不戰則有泰山之安戰則有累卵之危業從之案兵不戰紹纂引兵歸六月烏孤以利鹿孤為凉州牧鎮西平召車騎大将軍傉檀入録府國事傉奴沃翻會稽世子元顯自以少年不欲頓居重任少詩照翻戊子以琅邪王徳文為司徒魏前河間太守盧溥帥其部曲數千家就食漁陽遂據有數郡秋七月己未燕主盛遣使拜溥幽州刺史為下魏黜張衮襲禽盧漙張本帥讀曰率使疏吏翻辛酉燕主盛下詔曰法例律公侯有罪得以金帛贖戰國時魏文侯師李悝撰次諸國法著法經以為王者之政莫急盜賊盜賊湏劾捕故著網捕二篇其輕狡越城博戯假借不亷淫侈踰制以為雜律一篇又以其律具其加減故所著六篇皆罪名之制也漢蕭何條益事律興廏户三篇合為九篇魏陳羣等采漢律制新律十八篇集罪例為刑名冠於律首盜律有劫略恐猲和賣買人科有持質皆非盜事分以為劫略律賊律有欺謾詐偽踰封矯制囚律有詐偽生死令丙有詐自復免事類衆多分為詐律賊律有賊伐樹木殺傷人畜産及諸亡印金布律有毁傷亡失縣官財物分為毁亡律囚律有告劾傳覆廏律有告反逮受科有登聞道辭分為告劾律囚律有繫囚鞠獄㫁獄之法興律有上獄之事科有考事報讞宜别為篇分為繋訊㫁獄律盜律有受所監受財枉法雜律有假借不亷令乙有呵人受錢科有使者驗賂其事相類分為請賕律盜律有勃辱强賊興律有擅興徭役具律有出賣科有擅作修舎事分為興擅律興律有乏徭稽留賊律有儲峙不辦廏律有乏軍乏興及舊典有奉法不謹不承用詔書漢氏施行不宜復以為灋别為之留律秦世舊有廏置乗傳副車食厨後漢但設騎置無車馬而律猶著其文則為虚設故除廏律取其可用合科者為郵驛令告劾律上言變事令以驚事告急與興律烽燧及科令者以為驚事律盜律有還贓卑主金布律有罸贖入責以呈黄金為價科有平庸坐贓事以為償贓律律之初制無免坐之文張湯趙禹始作監臨部主見知故縱之例其見知而故不舉劾以贖論其不見不知者不坐科條免坐繁多宜總為免例以省科文故更定以為免坐律晉初賈充定法就漢九章增十一篇改舊律為刑名法例辨囚律為告劾繋訊㫁獄分盜律為請賕詐偽水火毁亡因事類為衞禁違制撰周官為諸侯律合二十篇孔頴達曰古之贖罪皆用銅漢始改用黄金但少其斤兩令與金相敵漢及後魏贖罪皆用黄金後魏以金難得合金一兩收絹十匹今律乃復依古贖銅此不足以懲惡而利於王府甚無謂也自今皆令立功以自贖勿復輸金帛復扶又翻西秦丞相南川宣公出連乞都卒南川地名宣諡也秦齊公崇鎮東將軍楊佛嵩㓂洛陽河南太守隴西辛恭靖嬰城固守雍州刺史楊佺期遣使求救於魏常山王遵雍於用翻使疏吏翻下同魏主珪以散騎侍郎西河張濟為遵從事中郎以報之佺期問於濟曰魏之伐中山戎士幾何濟曰四十餘萬事見一百八卷孝武太元二十一年佺期曰以魏之彊小羌不足滅也且晉之與魏本為一家謂猗盧救劉琨時也今旣結好好呼到翻義無所隱此間兵弱糧寡洛陽之救恃魏而已若其保全必有厚報若其不守與其使羌得之不若使魏得之若楊佺期者豈可使之扞禦封疆哉濟還報八月珪遣太尉穆崇將六萬騎往救之燕遼西太守李朗在郡十年威行境内燕遼西郡治令支恐燕主盛疑之累徵不赴以其家在龍城未敢顯叛陰召魏兵許以郡降魏降户江翻下同遣使馳詣龍城廣張㓂勢盛曰此必詐也召使者詰問詰去吉翻果無事實盛盡滅朗族丁酉遣輔國將軍李旱討之初魏奮武將軍張衮以才謀為魏主珪所信重委以腹心珪問中州士人於衮衮薦盧􅄎及崔逞珪皆用之珪圍中山久未下軍食乏見一百九卷隆安元年問計於羣臣逞為御史中丞對曰桑椹可以佐糧飛鴞食椹而改音詩人所稱也珪雖用其言聽民以椹當租然以逞為侮慢心銜之詩翩彼飛鴞集于泮林食我桑椹懐我好音註云鴞惡聲之鳥也鴞恒惡鳴今食桑椹故改其鳴歸就我以善音珪本北人而入中原故銜逞以為侮慢秦人㓂襄陽雍州刺史郗恢以書求救於魏常山王遵曰賢兄虎步中原珪以恢無君臣之禮命衮及逞為復書必貶其主衮逞謂帝為貴主珪怒曰命汝貶之而謂之貴主何如賢兄也逞之降魏也見一百九卷隆安元年以天下方亂恐無復遺種種章勇翻使其妻張氏與四子留冀州逞獨與幼子賾詣平城賾士革翻所留妻子遂奔南燕珪并以是責逞賜逞死盧溥受燕爵命侵掠魏郡縣殺魏幽州刺史封沓干珪謂衮所舉皆非其人黜衮為尚書令史衮乃闔門不通人事惟手校經籍嵗餘而終燕主寶之敗也中書令民部尚書封懿降於魏珪以懿為給事黄門侍郎都坐大官魏官有三都大官都坐大官外都大官内都大官坐徂卧翻珪問懿以燕氏舊事懿應對疎慢亦坐廢於家珪盖自疑以為衣冠之士慢之也武威王秃髪烏孤醉走馬傷脇而卒遺令立長君長知兩翻國人立其弟利鹿孤諡烏孤曰武王廟號烈祖利鹿孤大赦徙治西平南燕王徳遣使説幽州刺史辟閭渾欲下之晉氏南渡僑立幽冀青并四州於江北秦圍幽州刺史田洛于三阿是其證也孝武太元之季復取齊地徙幽冀二州于齊是後鎮齊者率領青冀二州刺史渾領幽州刺史盖自北而南未純為晉臣使領幽州而鎮廣固也説輸芮翻渾不從徳遣北地王鍾帥步騎二萬擊之帥讀曰率徳進據琅邪徐兖之民歸附者十餘萬徳自琅邪引兵而北以南海王法為兖州刺史鎮梁父父音甫進攻莒城守将任安委城走徳以潘聰為徐州刺史鎮莒城莒縣前漢屬城陽國後漢屬琅邪晉分屬東莞郡将即亮翻任音壬蘭汗之亂燕吏部尚書封孚南奔辟閭渾渾表為勃海太守及徳至孚出降降户江翻下同徳大喜曰孤得青州不為喜喜得卿耳遂委以機密北地王鍾傳檄青州諸郡諭以禍福辟閭渾徙八千餘家入守廣固遣司馬崔誕戍薄荀固平原太守張豁戍栁泉薄荀盖人姓名遇亂聚衆保固此地因以為名齊人率謂保聚之地為固漢書地理志北海郡有栁泉侯國後漢晉省誕豁承檄皆降於徳渾懼携妻子奔魏徳遣射聲校尉劉綱追之及於莒城斬之渾子道秀自詣徳請與父俱死徳曰父雖不忠以辟閭渾背燕為不忠而子能孝特赦之渾參軍張瑛為渾作檄瑛音英為于偽翻辭多不遜徳執而讓之瑛神色自若徐曰渾之有臣猶韓信之有蒯通通遇漢祖而生事見十二卷高祖十二年臣遭陛下而死比之古人竊不不幸耳徳殺之遂定都廣固燕李旱行至建安燕主盛急召之羣臣莫測其故九月辛未復遣之李朗聞其家被誅被皮義翻擁二千餘户以自固及聞旱還謂有内變不復設備復扶又翻留其子養守令支應劭曰令音鈴師古曰音郎定翻孟康曰支音袛裴松支其兒翻自迎魏師於北平前漢北平郡治平剛後漢治土垠晉治徐無後魏治盧龍壬子旱襲令支克之遣廣威將軍孟廣平追及朗於無終斬之無終春秋無終子之國自漢以來為縣屬右北平劉昫曰唐薊州玉田縣漢無終縣地秦主興以災異屢見見賢遍翻降號稱王下詔令羣公卿士將牧守宰各降一等將即亮翻守式又翻下同大赦改元𢎞始存問孤貧舉拔賢俊簡省灋令清察獄訟守令之有政迹者賞之貪殘者誅之逺近肅然冬十月甲午燕中衞將軍衞雙有罪賜死李旱還聞雙死懼棄軍而亡至板陘陘音刑復還歸罪復扶又翻燕主盛復其爵位謂侍中孫勍曰旱為將而棄軍罪在不赦勍渠京翻将即亮翻然昔先帝蒙塵骨肉離心公卿失節惟旱以宦者忠勤不懈始終如一事見上卷二年故吾念其功而赦之耳辛恭靖固守百餘日魏救未至秦兵拔洛陽獲恭靖恭靖見秦王興不拜曰吾不為羌賊臣興囚之恭靖逃歸自淮漢以北諸城多請降送任於秦降户江翻魏主珪以穆崇為豫州刺史鎮野王秦旣克洛陽魏置鎮於野王以備其渡河侵軼會稽世子元顯性苛刻㑹工外翻生殺任意發東土諸郡免奴為客者奴戶者有罪沒為官奴公卿以下至九品官及宗室國賔先賢之後及士人子孫占䕃以為客戶是謂免奴為客號曰樂屬樂徒各翻移置京師以充兵役東土囂然苦之孫恩因民心騷動自海島帥其黨殺上虞令上虞縣自漢以來屬會稽郡西北距郡城百餘里帥讀曰率遂攻㑹稽㑹稽内史王凝之羲之之子也世奉天師道天師道即張道陵之所傳也㑹工外翻不出兵亦不設備日於道室稽顙跪呪道室奉道之室也稽音啟官屬請出兵討恩凝之曰我已請大道借鬼兵守諸津要各數萬賊不足憂也及恩漸近乃聽出兵恩已至郡下甲寅恩陷會稽凝之出走恩執而殺之并其諸子凝之妻謝道藴弈之女也聞冦至舉措自若命婢肩輿抽刀出門手殺數人乃被執被皮義翻呉國内史桓謙臨海太守新秦王崇晉書作新蔡王崇崇汝南王祐之曾孫自其祖父以來嗣新蔡國封秦當作蔡義興太守魏隱皆棄郡走於是會稽謝鍼呉郡陸瓌呉興丘尫鍼其亷翻瓌姑回翻尫烏光翻義興許允之臨海周胄永嘉張永等及東陽新安凡八郡人一時起兵殺長吏以應恩旬日之中衆數十萬呉興太守謝邈永嘉太守司馬逸嘉興公顧𦙍南康公謝明慧黄門郎謝冲張琨中書郎孔道等皆為恩黨所殺邈冲皆安之弟子也時三吳承平日久民不習戰故郡縣兵皆望風奔潰恩據㑹稽自稱征東將軍逼人士為官屬號其黨曰長生人民有不與之同者戮及嬰孩死者什七八醢諸縣令以食其妻子食祥吏翻不肯食者輙支解之支解者隨其支節解剥若解牛然所過掠財物燒邑屋焚倉廪刋木堙井孔安國曰刋槎其木也堙塞也相帥聚於㑹稽帥讀曰率下同婦人有嬰兒不能去者投於水中曰賀汝先登仙堂我當尋後就汝恩表㑹稽王道子及世子元顯之罪請誅之自帝即位以來内外乖異石頭以南皆為荆江所據以西皆豫州所專江水自荆江二州界入揚州界皆東北流厯陽在江西建康在江東孫權築石頭城盖據江津之要衝也京口及江北皆劉牢之及廣陵相髙雅之所制朝政所行惟三呉而已朝直遙翻及孫恩作亂八郡皆為恩有八郡㑹稽臨海永嘉東陽新安呉呉興義興也畿内諸縣盜賊處處蠭起恩黨亦有潜伏在建康者人情危懼常慮竊發於是内外戒嚴加道子黄鉞元顯領中軍将軍命徐州刺史謝琰兼督呉興義興軍事以討恩劉牢之亦發兵討恩拜表輙行牢之鎮京口西秦以金城太守辛靜為右丞相十二月甲午燕燕郡太守高湖帥户三千降魏湖泰之子也為後高歡簒魏張本降戶江翻丙午燕主盛封弟淵為章武公䖍為博陵公子定為遼西公丁未燕太后段氏卒諡曰惠徳皇后謝琰擊斬許允之迎魏隱還郡進擊丘尫破之與劉牢之轉鬬而前所向輙克琰留屯烏程烏程縣前漢屬㑹稽郡後漢屬呉郡魏晉以來屬吳興郡遣司馬高素助牢之進臨浙江浙之列翻詔以牢之都督呉郡諸軍事初彭城劉裕生而母死父翹僑居京口家貧将棄之同郡劉懐敬之母裕之從母也生懐敬未朞走往救之㫁懐敬乳而乳之從才用翻㫁丁管翻上乳如字下乳人喻翻及長勇健有大志僅識文字以賣履為業好樗蒲為鄉閭所賤長知兩翻好呼到翻劉牢之擊孫恩引裕參軍事晉宋之制參軍不署曹者無定員使將數十人覘賊遇賊數千人即迎擊之從者皆死覘丑亷翻從才用翻裕墜岸下賊臨岸欲下裕奮長刀仰斫殺數人乃得登岸仍大呼逐之呼火故翻賊皆走裕所殺傷甚衆劉敬宣怪裕久不返引兵尋之見裕獨驅數千人咸共歎息因進擊賊大破之斬獲千餘人劉裕事始此初恩聞八郡響應謂其屬曰天下無復事矣復扶又翻當與諸君朝服至建康言欲踐位也朝直遙翻旣而聞牢之臨江曰我割浙江以東不失作句踐欲如越王句踐保有㑹稽也句音鈎戊申牢之引兵濟江恩聞之曰孤不羞走江表傳周瑜之破魏軍也曹公曰孤不羞走故恩引以為言遂驅男女二十餘萬口東走多棄寶物子女於道官軍競取之恩由是得脱復逃入海島復扶又翻下同高素破恩黨於山陰山陰縣屬㑹稽郡郡城以北皆縣界斬恩所署呉郡太守陸瓌瓌工回翻呉興太守丘尫餘姚令呉與沈穆夫餘姚縣屬㑹稽郡在郡城東二百餘里東土遭亂企望官軍之至企去智翻既而牢之等縱軍士暴掠士民失望郡縣城中無復人跡月餘乃稍有還者朝廷憂恩復至以謝琰為會稽太守都督五郡軍事帥徐州文武戍海浦五郡㑹稽臨海東陽永嘉新安也今自龕山而東至蘭風石堰鳴鶴松浦蟹浦定海皆海浦也帥讀曰率以元顯録尚書事時人謂道子為東録元顯為西録西府車騎填輳東第門可張羅矣元顯無良師友所親信者率皆佞諛之人或以為一時英傑或以為風流名士由是元顯日益驕侈諷禮官立議以已徳隆望重既録百揆百揆皆應盡敬舜納于百揆禹宅百揆周官曰唐虞稽古建官維百内有百揆四岳外有州牧侯伯皆以百揆為官名孔安國曰揆度也舜舉八凱使揆度百事是古以百揆名官之義也晉人多以百揆為百官於是公卿以下見元顯皆拜時軍旅數起國用虚竭自司徒以下日廪七升而元顯聚斂不已富踰帝室為元顯亡國敗家張本數所角翻斂力贍翻殷仲堪恐桓𤣥跋扈乃與楊佺期結昏為援佺期屢欲攻𤣥仲堪每抑止之𤣥恐終為殷楊所滅乃告執政求廣其所統執政亦欲交構使之乖離乃加𤣥都督荆州四郡軍事執政謂元顯荆州四郡謂長沙衡楊湘東零陵也又以𤣥兄偉代佺期兄廣為南蠻校尉佺期忿懼楊廣欲拒桓偉仲堪不聽出廣為宜都建平二郡太守楊孜敬先為江夏相夏户雅翻相息亮翻𤣥以兵襲而劫之以為諮議參軍佺期勒兵建牙聲言援洛欲與仲堪共襲𤣥仲堪雖外結佺期而内疑其心苦止之猶慮弗能禁遣從弟遹屯于北境遹以律翻雍州治襄陽在江陵之北以遏佺期佺期旣不能獨舉又不測仲堪本意乃解兵仲堪多疑少決少詩沼翻諮議參軍羅企生謂其弟遵生曰殷侯仁而無㫁必及於難企去智翻㫁丁亂翻難乃旦翻吾䝉知遇義不可去必將死之是嵗荆州大水平地三丈仲堪竭倉廪以賑饑民賑之忍翻桓𤣥欲乗其虛而伐之乃發兵西上上時掌翻亦聲言救洛與仲堪書曰佺期受國恩而棄山陵宜共罪之晉復洛陽以屬雍州統内故𤣥以棄山陵罪佺期今當入沔討除佺期沔彌兖翻已頓兵江口若見與無貳與許也從也黨也心持兩端為貳可收楊廣殺之如其不爾便當帥兵入江入江則欲攻江陵帥讀曰率下同時巴陵有積穀𤣥先遣兵襲取之梁州刺史郭銓當之官路經夏口夏户雅翻𤣥詐稱朝廷遣銓為已前鋒乃授以江夏之衆使督諸軍竝進密報兄偉令為内應偉遑遽不知所為遑急也遽亦急也自齎疏示仲堪仲堪執偉為質質音致令與𤣥書辭甚苦至𤣥曰仲堪為人無決常懷成敗之計為兒子作慮為于偽翻我兄必無憂也仲堪遣殷遹帥水軍七千至西江口水經江水東至長沙下雋縣北湘水從南來注之江水又東左得二夏浦註云夏浦俗謂之西江口𤣥使郭銓苻宏擊之孝武太元十年苻宏來奔處之江州𤣥因以為将遹等敗走𤣥頓已陵食其穀仲堪遣楊廣及弟子道䕶等拒之皆為𤣥所敗敗補邁翻江陵震駭城中乏食以胡麻廪軍士胡麻今謂之芝麻粒小於粟而黑可以為油九炊九曝以為飯食之使人不飢廩當作稟給也𤣥乗勝至零口零口即靈溪入江之口去江陵二十里仲堪急召楊佺期以自救佺期曰江陵無食何以待敵可來見就共守襄陽仲堪志在全軍保境不欲棄州逆走乃紿之曰紿待亥翻比來收集已有儲矣比毗至翻近也佺期信之帥步騎八千精甲耀日至江陵仲堪唯以飯餉其軍佺期大怒曰今茲敗矣不見仲堪與其兄廣共擊𤣥𤣥畏其鋭退軍馬頭江陵縣南有江津戍戍南對馬頭岸明日佺期引兵急擊郭銓幾獲之幾居依翻會𤣥兵至佺期大敗單騎奔襄陽仲堪出奔鄼城鄼縣即蕭何所封之邑漢屬南陽郡晉分屬順陽郡鄼音賛𤣥遣將軍馮該追佺期及廣皆獲而殺之傳首建康佺期弟思平從弟尚保孜敬逃入蠻中從才用翻仲堪聞佺期死将數百人将奔長安至冠軍城冠軍縣即霍去病所封之邑屬南陽郡其地在唐鄧州臨湍縣南界冠古玩翻該追獲之還至柞溪水經註柞溪水出江陵縣北盖諸池散流咸所㑹合積以成川東流逕驛路水上有大橋仲堪縊處也又東注船官湖柞子各翻又在各翻逼令自殺并殺殷道䕶仲堪奉天師道禱請鬼神不吝財賄而嗇於周急好為小惠以恱人好呼到翻病者自為診脉分藥診止忍翻按脉以候病為診為于偽翻用計倚伏煩密而短於鑒略故至於敗仲堪之走也文武無送者惟羅企生從之路經家門弟遵生曰作如此分離何可不一執手企生旋馬授手遵生有力因牽下之曰家有老母去将何之企生揮淚曰今日之事我必死之汝等奉養企去智翻養羊尚翻下同不失子道一門之中有忠與孝亦復何恨復扶又翻遵生抱之愈急仲堪於路待之見企生無脱理策馬而去及𤣥至荆州人士無不詣𤣥者企生獨不往而營理仲堪家事或曰如此禍必至矣企生曰殷侯遇我以國士為弟所制不得隨之共殄醜逆復何面目就桓求生乎復扶又翻下同𤣥聞之怒然待企生素厚先遣人謂曰若謝我當釋汝企生曰吾為殷荆州吏荆州敗不能救尚何謝為𤣥乃收之復遣人問企生欲何言企生曰文帝殺嵇康嵇紹為晉忠臣殺嵇康事見七十八卷魏元帝景元三年嵇紹死事見八十五卷惠帝永興元年從公乞一弟以養老母𤣥乃殺企生而赦其弟凉王光疾甚立太子紹為天王自號太上皇帝以太原公纂為太尉常山公𢎞為司徒謂紹曰今國家多難三鄰伺隙三鄰謂秃髪乞伏段業也難乃旦翻吾沒之後使纂統六軍𢎞管朝政朝直遙翻汝恭已無為委重二兄庶幾可濟幾居依翻若内相猜忌則蕭牆之變旦夕至矣又謂纂𢎞曰永業才非撥亂吕紹字永業直以立嫡有常猥居元首君為元首今外有彊冦人心未寧汝兄弟緝睦則祚流萬世緝當作輯若内自相圖則禍不旋踵矣纂𢎞泣曰不敢又執纂手戒之曰汝性麤暴深為吾憂善輔永業勿聽讒言是日光卒年六十三紹秘不發喪纂排閤入哭盡哀而出紹懼以位讓之曰兄功髙年長長知兩翻宜承大統纂曰陛下國之冡嫡臣敢奸之奸音干紹固讓纂不許驃騎将軍吕超謂紹曰纂為将積年驃匹妙翻騎奇寄翻将即亮翻威震内外臨喪不哀步髙視逺必有異志宜早除之紹曰先帝言猶在耳奈何棄之吾以弱年負荷大任荷下可翻方賴二兄以寧家國縱其圖我我視死如歸終不忍有此意也卿勿復言復扶又翻下同纂見紹於湛露堂超執刀侍側目纂請收之紹弗許為超終殺纂張本超光弟寶之子也𢎞密遣尚書姜紀謂纂曰主上闇弱未堪多難難乃旦翻兄威恩素著宜為社稷計不可狥小節也纂於是夜帥壯士數百踰北城攻廣夏門𢎞帥東苑之衆斧洪範門王隐晉書曰凉州城東西三里南北七里本匈奴所築及張氏之世又増築四城箱各千歩東城命曰講武場北城命曰𤣥武圃皆殖園果有宫殿廣夏門洪範門皆中城門也帥讀曰率夏户雅翻左衛將軍齊從守融明觀觀古玩翻逆問之曰誰也衆曰太原公從曰國有大故主上新立太原公行不由道夜入禁城将為亂邪因抽劔直前斫纂中額中竹仲翻纂左右禽之纂曰義士也勿殺紹遣虎賁中郎将吕開帥禁兵拒戰於端門吕超帥卒二千赴之衆素憚纂皆不戰而潰纂入自青角門升謙光殿青角門盖凉州中城之東門也謙光殿張駿所起自以專制河右而世執臣節雖謙而光故以名殿紹登紫閣自殺吕超奔廣武纂憚𢎞兵彊以位讓𢎞𢎞曰𢎞以紹弟也而承大統衆心不順是以違先帝遺命而廢之慙負黄泉杜預曰地中之泉故曰黄泉今復踰兄而立豈𢎞之本志乎纂乃使𢎞出告衆曰先帝臨終受詔如此羣臣皆曰茍社稷有主誰敢違者纂遂即天王位纂字永緒光之庶長子也大赦改元咸寧諡光曰懿武皇帝廟號太祖諡紹曰隱王以𢎞為大都督督中外諸軍事大司馬車騎大将軍司𨽻校尉録尚書事改封番禾郡公番音盤纂謂齊從曰卿前斫我一何甚也從泣曰隱王先帝所立陛下雖應天順人而微心未達唯恐陛下不死何謂甚也纂賞其忠善遇之纂叔父征東将軍方鎮廣武纂遣使謂方曰使疏吏翻超實忠臣義勇可嘉但不識國家大體權變之宜方賴其用以濟世難難乃旦翻可以此意諭之超上疏陳謝纂復其爵位為超殺纂張本是嵗燕主盛以河間公熙為都督中外諸軍事尚書左僕射領中領軍劉衞辰子文陳降魏降户江翻魏主珪妻以宗女妻七細翻拜上将軍賜姓宿氏魏内入諸姓有宿六斤氏改為宿氏盖使文陳與之合族屬四年春正月壬子朔燕主盛大赦自貶號為庶人天王魏材官將軍和跋漢置材官將軍領郡國材官士以出征師還則省晉魏以後置材官將軍主工匠土木之事則漢右校令之任也襲盧溥於遼西戊午克之溥附燕見上年禽溥及其子煥送平城車裂之燕主盛遣廣威将軍孟廣平救溥不及斬魏遼西守宰而還乙亥大赦西秦王乾歸遷都苑川乞㐲氏本居苑川乾歸遷于金城今復都苑川秃髪利鹿孤大赦改元建和高句麗王安事燕禮慢句如字又音駒麗力知翻二月丙申燕王盛自将兵三萬襲之将即亮翻以驃騎大將軍熙為前鋒拔新城南蘇二城開境七百餘里徙五千餘户而還還從宣翻又如字熙勇冠諸將盛曰叔父雄果有世祖之風慕容垂廟號世祖冠古玩翻下同但𢎞略不如耳初魏主珪納劉頭眷之女寵冠後庭生子嗣及克中山克中山見一百九卷隆安元年獲燕主寶之幼女将立皇后用其國故事鑄金人以卜之劉氏所鑄不成慕容氏成三月戊午立慕容氏為皇后北史曰魏故事将立皇后必令手鑄金人以成者為吉不則不得立也桓𤣥既克荆雍雍於用翻表求領荆江二州詔以𤣥為都督荆司雍秦梁益寧七州諸軍事荆州刺史以中䕶軍桓脩為江州刺史𤣥上疏固求江州於是進𤣥督八州及揚豫八郡諸軍事復領江州刺史復扶又翻𤣥輙以兄偉為雍州刺史朝廷不能違又以從子振為淮南太守𤣥既督八州及揚豫八郡則西極岷嶓東盡厯陽蕪湖皆其統内矣漢晉淮南郡本治夀春成帝時祖約蘇峻為亂胡冦又屢至民南渡江者轉多乃於江南僑立淮南郡後又割丹陽之于湖為淮南境𤣥遣振守之是逼建康之漸也從才用翻凉王纂以大司馬𢎞功髙地逼忌之𢎞亦自疑遂以東苑之兵作亂攻纂纂遣其将焦辨擊之将即亮翻𢎞衆潰出走纂縱兵大掠悉以東苑婦女賞軍𢎞之妻子亦在中纂笑謂羣臣曰今日之戰何如侍中房晷對曰天禍凉室憂患仍臻先帝始崩隱王廢黜山陵甫訖大司馬稱兵京師流血昆弟接刃雖𢎞自取夷滅亦由陛下無常棣之恩左傳富辰曰召穆公思周徳之不類糾合宗族於成周而作詩曰常棣之華鄂不韡韡几今之人莫如兄弟其四章曰兄弟閱于牆外禦其侮如是則兄弟雖有小忿不廢懿親當省已責躬以謝百姓省悉景翻乃更縱兵大掠囚辱士女釁自𢎞起百姓何罪且𢎞妻陛下之弟婦𢎞女陛下之姪也奈何使無賴小人辱為婢妾天地神明豈忍見此遂歔欷流涕歔音虚欷許既翻又音希纂改容謝之召𢎞妻子寘於東宫厚撫之𢎞將犇秃髪利鹿孤道過廣武詣吕方方見之大哭曰天下甚寛汝何為至此乃執𢎞送獄纂遣力士康龍就拉殺之拉盧合翻纂立妃楊氏為后以后父桓為尚書左僕射凉都尹凉都姑臧改武威太守為凉都尹辛邜燕襄平令段登等謀反誅凉王纂将伐武威王利鹿孤中書令楊頴諫曰利鹿孤上下用命國未有釁不可伐也不從利鹿孤使其弟傉檀拒之傉奴沃翻夏四月傉檀敗凉兵於三堆三堆在浩亹河南敗補邁翻斬首二千餘級初隴西李暠好文學有令名暠古老翻好呼到翻嘗與郭黁及同母弟敦煌宋繇同宿黁奴昆翻敦徒門翻黁起謂繇曰君當位極人臣李君終當有國家有騍馬生白額駒騍馬牝馬也騍音課晉書作騧此其時也及孟敏為沙州刺史以暠為效穀令效穀縣自漢以來屬敦煌郡師古曰本魚澤障也桑欽説孝武元封六年濟南崔不意為魚澤尉教力田以勤效得穀因立為縣名後周併入敦煌縣宋繇事北凉王業為中散常侍以中散大夫常侍左右也散悉亶翻孟敏卒敦煌䕶軍馮翊郭謙沙州治中敦煌索仙等索昔各翻以暠溫毅有惠政推為敦煌太守敦徒門翻暠初難之㑹宋繇自張掖告歸謂暠曰段王無逺略終必無成兄忘郭黁之言邪白額駒今已生矣暠乃從之遣使請命於業使疏吏翻業因以暠為敦煌太守右衞將軍敦煌索嗣言於業曰李暠不可使處敦煌索昔各翻處昌吕翻業遂以嗣代暠為敦煌太守使帥五百騎之官帥讀曰率嗣未至二十里移暠迎己未至敦煌讒二十里移書於暠使迎已也暠驚疑將出迎之效穀令張邈及宋繇止之曰段王闇弱正是英豪有為之日将軍據一國成資奈何拱手授人嗣自恃本郡謂人情附已不意將軍猝能拒之可一戰擒也暠從之先遣繇見嗣啗以甘言啗徒敢翻又徒陷翻繇還謂暠曰嗣志驕兵弱易取也易以豉翻暠乃遣邈繇與其二子歆讓逆撃嗣嗣敗走還張掖暠素與嗣善尤恨之表業請誅嗣沮渠男成亦惡嗣勸業除之業乃殺嗣段業既失張掖又殺索嗣以自翦其羽翼所以終死於沮渠蒙遜之手惡烏路翻遣使謝暠進暠都督凉興以西諸軍事鎮西將軍段業分敦煌之凉興烏澤晉昌之宜禾為凉興郡至宇文氏併晉之廣至宜安淵泉合為凉興縣隋唐𤓰州之常樂縣即其地也吐谷渾視羆卒世子樹洛干方九歲弟烏紇堤立妻樹洛干之母念氏生慕璝慕延璝古回翻烏紇堤懦弱荒淫不能治國治直之翻念氏專制國事有膽智國人畏服之燕前將軍段璣太后段氏之兄子也為段登辭所連及五月壬子逃奔遼西為後段璣等弑盛張本盛懲蘭汗嚴刑以繩下亦終於身死人手人而不仁疾之已甚亂也丙寅衞將軍東亭獻侯王珣卒己巳魏主珪東如涿鹿西如馬邑觀灅源灅力水翻戊寅燕段璣復還歸罪復扶又翻燕王盛赦之賜號曰思悔侯使尚公主入直内殿謝琰以資望鎮會稽資謂門地成資望謂時望㑹工外翻不能綏懷又不為武備諸將咸諫曰賊近在海浦伺人形便宜開其自新之路琰不從曰苻堅之衆百萬尚送死淮南琰與謝𤣥同破苻堅遂輕孫恩孫恩小賊敗死入海何能復出復扶又翻下同若其果出是天欲殺之也旣而恩冦浹口浹口今在明州定海縣虎蹲山外浹即叶翻杜佑曰浹口在明州鄮縣東北七十里入餘姚破上虞進及邢浦晉書曰邢浦去山陰北三十五里琰遣參軍劉宣之擊破之恩退走少日復冦邢浦少詩沼翻復扶又翻下同官軍失利恩乗勝徑進己邜至㑹稽琰尚未食曰要當先滅此賊而後食因跨馬出戰兵敗為帳下都督張猛所殺吳興太守庾桓恐郡民復應恩殺男女數千人恩轉冦臨海朝廷大震遣冠軍将軍桓不才冠古玩翻輔國将軍孫無終寧朔将軍髙雅之拒之秦征西大将軍隴西公碩徳将兵五千伐西秦五千恐少當考入自南安峽南安峽在唐秦州隴城縣界徳將即亮翻西秦王乾歸帥諸將拒之帥讀曰率軍于隴西楊軌田𤣥明謀殺武威王利鹿孤利鹿孤殺之隆安二年楊軌降利鹿孤六月庚辰朔日有食之以琅邪王師何澄為尚書左僕射晉諸王置師友文學各一人初避景帝諱改師為傅後以桃廟不諱復為師澄準之子也何準見一百卷穆帝升平元年甲子燕大赦凉王纂将襲北凉姜紀諌曰盛夏農事方殷且宜息兵今逺出嶺西自姑臧西北出張掖其間有大嶺度嶺而西西郡當其要秃髪氏乗虚襲京師將若之何不從進圍張掖西掠建康秃髪傉檀聞之將萬騎襲姑臧纂弟隴西公緯憑北城以自固傉檀置酒朱明門上鳴鐘鼓饗将士曜兵於青陽門朱明門姑臧城南門也青陽門東門也傉奴沃翻掠八千餘户而去纂聞之引兵還秋七月壬子太皇太后李氏崩丁邜大赦西秦王乾歸使武衛將軍慕兀等屯守秦軍樵采路絶秦王興潜引兵救之乾歸聞之使慕兀帥中軍二萬屯栢楊水經註伯陽水出伯陽谷在董亭東又東有伯陽城城南謂之伯陽川盖李耳西入往逕所由故川原畎谷往往播其名後又訛為栢楊五代志天水郡秦嶺縣後魏置伯陽縣隋開皇中更名秦嶺唐併秦嶺入清水縣帥讀曰率下同鎮軍將軍羅敦帥外軍四萬屯侯辰谷乾歸自将輕騎數千前候秦兵将即亮翻騎奇寄翻下同㑹大風昏霧與中軍相失為追騎所逼入於外軍旦與秦戰大敗走歸苑川其部衆三萬六千皆降於秦興進軍枹罕降户江翻枹音膚乾歸奔金城謂諸豪帥曰帥所類翻吾不才叨竊名號已踰一紀孝武太元十三年乾歸嗣國至是十三年今敗散如此無以待敵欲西保允吾允吾縣漢屬金城郡晉志省劉昫曰唐鄯州龍支縣漢允吾縣允吾音鈆牙若舉國而去必不得免卿等留此各以其衆降秦以全宗族勿吾隨也皆曰死生願從陛下乾歸曰吾今将寄食於人若天未亡我庶幾異日克復舊業幾居希翻復與卿等相見今相隨而死無益也乃大哭而别乾歸獨引數百騎奔允吾乞降於武威王利鹿孤利鹿孤遣廣武公傉檀迎之置於晉興張軌分西平界置晉興郡闞駰曰允吾縣西四十里有小晉興城傉奴沃翻待以上賔之禮鎮北將軍秃髪俱延言於利鹿孤曰乾歸本吾之屬國因亂自尊今勢窮歸命非其誠欵若逃歸姚氏必為國患不如徙置乙弗之間乙弗亦鮮卑種居西北海史曰吐谷渾北有乙弗勿敵國國有曲海海周囬千餘里種有萬落風俗與吐谷渾同北史又曰乙弗世為吐谷渾渠帥居青海號青海王使不得去利鹿孤曰彼窮来歸我而逆疑其心何以勸來者俱延利鹿孤之弟也秦兵既退南羌梁戈等密招乾歸乾歸将應之其臣屋引阿洛以告晉興太守隂暢暢馳白利鹿孤利鹿孤遣其弟吐雷帥騎三千屯捫天嶺捫天嶺在允吾東南乾歸懼為利鹿孤所殺謂其太子熾磐曰熾昌志翻吾父子居此必不為利鹿孤所容今姚氏方强吾將歸之若盡室俱行必為追騎所及吾以汝兄弟及汝母為質質音致彼必不疑吾在長安彼終不敢害汝也乃送熾磐等於西平八月乾歸南奔枹罕遂降於秦丁亥尚書右僕射王雅卒九月癸丑地震凉吕方降於秦廣武民三千餘户奔武威王利鹿孤吕方鎮廣武既降於秦其民無主故奔秃髪氏冬十一月髙雅之與孫恩戰於餘姚雅之敗走山陰死者什七八詔以劉牢之都督會稽等五郡帥衆擊恩㑹工外翻帥讀曰率恩走入海牢之東屯上虞使劉裕戍句章句章縣自漢以來屬會稽郡今鄞縣以東定海昌國皆其地也呉國内史袁崧築滬瀆壘以備恩崧喬之孫也袁崧當作袁山松滬瀆今在平江府呉縣東陸龜蒙叙矢魚之具云列竹於海澨曰滬是瀆以此得名呉都記松江東瀉海名曰滬瀆輿地記曰扈業者濵海捕魚之名挿竹列於海中以䋲編之向岸張兩翼潮上即沒潮落即出魚隨海潮礙竹不得去名曰扈瀆范成大呉郡志曰列竹於海澨曰滬呉之滬瀆是也自滬瀆泝松江至呉郡將門將門今訛為匠門袁喬見九十七卷穆帝永和二年三年會稽世子元顯求領徐州詔以元顯為開府儀同三司都督揚豫徐兖青幽冀并荆江司雍梁益交廣十六州諸軍事領徐州刺史雍於用翻封其子彦瑋為東海王乞伏乾歸至長安秦王興以為都督河南諸軍事河州刺史歸義侯此河南謂金城河之南久之乞伏熾磐欲逃詣乾歸武威王利鹿孤追獲之利鹿孤將殺熾磐廣武公傉檀曰子而歸父無足深責宜宥之以示大度利鹿孤從之秃髪傉檀勸其兄宥熾磬而卒死於熾磐之手豈非養虎自遺患乎秦王興遣晉將劉嵩等二百餘人來歸劉嵩等盖因洛陽陷而沒於秦將即亮翻北凉晉昌太守唐瑶叛移檄六郡六郡盖敦煌酒泉晉昌凉興建康祁連也推李暠為冠軍大將軍沙州刺史凉公領敦煌太守暠古老翻冠古玩翻暠赦其境内改元庚子北凉之地至此又分為西凉以瑤為征東將軍郭謙為軍諮祭酒索仙為左長史索昔各翻張邈為右長史尹建興為左司馬張體順為右司馬遣從事中郎宋繇東伐凉興并擊玉門已西諸城皆下之酒泉太守王徳亦叛北凉自稱河州刺史北凉王業使沮渠蒙遜討之徳焚城将部曲奔唐瑤蒙遜追至沙頭大破之沙頭縣本屬酒泉郡惠帝分屬晉昌郡沮子余翻將子亮翻虜其妻子部落而還還從宣翻又如字十二月戊寅有星孛于天津天文志天津九星横河中一曰天漢一曰天江主四瀆津梁所以度神通四方也孛蒲内翻會稽世子元顯以星變解録尚書事㑹工外翻復加尚書令復扶又翻吏部尚書車𦙍以元顯驕恣車尺遮翻白㑹稽王道子請禁抑之元顯聞而未察以問道子曰車武子屏人言及何事車𦙍字武子屏必郢翻道子弗答固問之道子怒曰爾欲幽我不令我與朝士語邪朝直遙翻元顯出謂其徒曰車𦙍間我父子密遣人責之𦙍懼自殺間古莧翻壬辰燕主盛立燕臺統諸部雜夷二趙以來皆立單于臺以統雜夷盛仍此立之魏太史屢奏天文乖亂魏主珪自覽占書多云改王易政乃下詔風勵羣下以帝王繼統皆有天命不可妄干風讀曰諷又數變易官名欲以厭塞災異數所角翻厭於葉翻塞悉側翻儀曹郎董謐獻服餌仙經珪置仙人博士立仙坊煑鍊百藥封西山以供薪蒸西山平城西山也毛晃曰麄曰薪細曰蒸藥成令死罪者試服之多死不驗而珪猶信之訪求不已珪常以燕主垂諸子分據勢要使權柄下移遂至敗亡深非之博士公孫表希㫖上韓非書上時掌翻勸珪以法制御下左將軍李粟性簡慢粟或作栗常對珪舒放不肅咳唾任情咳口慨翻珪積其宿過遂誅之羣下震栗史言魏主珪悖暴于治丁酉燕王盛尊獻莊后丁氏為皇太后立遼西公定為皇太子大赦是嵗南燕王徳即皇帝位于廣固徳字𤣥明皝之少子也大赦改元建平更名備徳更工衡翻欲使吏民易避易以豉翻追諡燕主暐曰幽皇帝以北地王鍾為司徒慕輿拔為司空封孚為左僕射慕輿䕶為右僕射立妃段氏為皇后資治通鑑卷一百十一
