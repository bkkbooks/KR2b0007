front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百十七宋司馬光撰胡三省音注晉紀三十九起旃蒙單閼盡柔兆執徐凡三年安皇帝壬義熈十一年春正月丙辰魏主嗣還平城至自伐柔然也太尉裕收司馬休之次子文寳兄子文祖竝賜死發兵擊之詔加裕黄鉞領荆州刺史庚午大赦丁丑以吏部尚書謝裕為尚書左僕射辛巳太尉裕發建康以中軍將軍劉道憐監留府事監工銜翻劉穆之兼右僕射事無大小皆決於穆之又以髙陽内史劉鍾領石頭戍事屯冶亭冶亭今謂之東冶亭在半山寺後自建康東門往蔣山至此半道因以為名王安石詩遙望鍾山岑因知冶城路陸游曰今天慶觀在冶城山之麓休之府司馬張裕南平太守檀範之聞之皆逃歸建康守式又翻裕邵之兄也張邵見一百十五卷五年雍州刺史魯宗之自疑不為太尉裕所容雍於用翻與其子竟陵太守軌起兵應休之二月休之上表罪狀裕勒兵拒之裕宻書招休之府録事叅軍南陽韓延之延之復書曰承親帥戎馬逺履西畿周禮王畿千里之外曰侯畿甸畿男畿采畿衛畿蠻畿夷畿鎮畿蕃畿謂之畿者責以共王稅貢為職韓延之以荆楚為西畿取此義帥讀曰率闔境士庶莫不惶駭辱疏知以譙王前事良增歎息司馬平西體國忠貞休之為平西將軍故稱之欵懐待物以公有匡復之勲家國䝉賴推徳委誠毎事詢仰譙王往以微事見劾猶自表遜位事見上卷上年劾戸槩翻又戸得翻况以大過而當嘿然邪前已表奏廢之所不盡者命耳推寄相與正當如此推寄謂推心置人腹中也而遽興兵甲所謂欲加之罪其無辭乎左傳晉大夫里克之言劉裕足下海内之人誰不見足下此心而復欲欺誑國士誑居况翻來示云處懐期物自有由來復扶又翻處昌吕翻下同今伐人之君啗人以利真可謂處懐期物自有由來者乎啗土濫翻又土覽翻劉藩死於閶闔之門諸葛斃於左右之手劉藩事見上卷八年諸葛事見九年甘言詫方伯襲之以輕兵謂襲劉毅也事見上卷八年詫丑亞翻遂使席上靡欵懐之士閫外無自信諸侯以是為得算良可恥也貴府將佐及朝廷賢徳寄命過日將即亮翻朝直遙翻吾誠鄙劣嘗聞道於君子以平西之至徳寧可無授命之臣乎必未能自投虎口比迹郗僧施之徒明矣郗僧施事見上卷八年郗丑之翻假令天長喪亂九流渾濁太史談序九流班固曰儒家者流葢出於司徒之官助人君順隂陽明教化者也道家者流葢出於史官歴紀成敗禍福古今之道此人君南面之術也法家者流葢出於理官信賞必罰以輔禮制隂陽家者流葢出於羲和之官敬順昊天厯象日月星辰名家者流葢出於禮官古者名位不同禮亦異數孔子曰必也正名乎墨家者流葢出於清廟之守茅屋采椽是以貴儉養三老五更是以兼愛選士大射是以尚賢宗祀嚴父是以右鬼従横家者流葢出於行人之官雜家者流葢出於議官農家者流葢出於農稷之官皆六經之支與流裔有益於治道而不能無弊使其渾濁則無所取衷矣長知兩翻喪息浪翻當與臧洪逰於地下臧洪事見六十二卷漢獻帝興平二年不復多言復扶又翻裕視書歎息以示將佐曰事人當如此矣延之以裕父名翹字顯宗乃更其字曰顯宗更工衡翻名其子曰翹以示不臣劉氏瑯邪太守劉朗帥二千餘家降魏帥讀曰率降戸江翻庚子河西胡劉雲等帥數萬戸降魏太尉裕使叅軍檀道濟朱超石將步騎出襄陽將即亮翻騎竒寄翻超石齡石之弟也江夏太守劉䖍之將兵屯三連夏戸雅翻立橋聚糧以待道濟等積日不至魯軌襲擊䖍之殺之裕使其壻振威將軍東海徐逵之統叅軍蒯恩王允之沈淵子為前鋒出江夏口水經江水過江陵城南又東至華容縣西夏水出焉又東過公安縣北又東左合子夏口註云江水左迤北出通於夏水故曰子夏也蒯苦怪翻逵之等與魯軌戰於破冡兵敗逵之允之淵子皆死獨蒯恩勒兵不動蒯苦怪翻軌乘勝力攻之不能克乃退淵子林子之兄也裕軍於馬頭據水經注馬頭岸在大江之南北對江陵之江津戍聞逵之死怒甚三月壬午帥諸將濟江魯軌司馬文思將休之兵四萬臨峭岸置陳峭七笑翻陳讀曰陣軍士無能登者裕自被甲欲登被皮義翻諸將諫不從怒愈甚太尉主簿謝晦前抱持裕裕抽劒指晦曰我斬卿晦曰天下可無晦不可無公此裕所謂晦頗識機變者也建武將軍胡藩領逰兵在江津裕呼藩使登藩有疑色裕命左右録來欲斬之録敢也藩顧曰正欲擊賊不得奉教乃以刀頭穿岸劣容足指騰之而上劣少也上時掌翻隨之者稍多既登岸直前力戰休之兵不能當稍引却當胡藩之初登也精騎數十可以制之休之之兵不動故得以直前力戰又人心素懾服裕故藩既進而不能當也裕兵因而乘之休之兵大潰遂克江陵休之宗之俱北走軌留石城裕命閬中侯下邳趙倫之太尉叅軍沈林子攻之遣武陵内史王鎮惡以舟師追休之等有羣盜數百夜襲冶亭京師震駭劉鍾討平之秦廣平公弼譛姚宣於秦王興去年宣入朝力言弼罪弼銜而譛之宣司馬權丕至長安興責以不能輔導將誅之丕懼誣宣罪惡以求自免興怒遣使就杏城收宣下獄命弼將三萬人鎮秦州下遐稼翻將即亮翻尹昭曰廣平公與皇太子不平今握彊兵於外陛下一旦不諱社稷必危小不忍亂大謀論語載孔子之言陛下之謂也興不從夏王勃勃攻秦杏城拔之執守將姚逵阬士卒二萬人秦王興如北地遣廣平公弼及輔國將軍歛曼嵬向新平興還長安河西王蒙遜攻西秦廣武郡拔之西秦王熾磐遣將軍乞伏魋尼寅邀蒙遜於浩亹蒙遜擊斬之浩亹音告門又遣將軍折斐等帥騎一萬據勒姐嶺闞駰志金城安夷縣東有勒姐河與金城河合勒姐嶺葢勒姐河所出之山也漢時勒姐羌居之因以為名姐子也翻又音紫蒙遜擊禽之河西饑胡相聚於上黨推胡人白亞栗斯為單于單音蟬改元建平以司馬順宰為謀主順宰起兵見上卷二年寇魏河内夏四月魏主嗣命公孫表等五將討之將即亮翻下同青冀二州刺史劉敬宣叅軍司馬道賜宗室之疏屬也聞太尉裕攻司馬休之道賜與同府辟閭道秀道賜與道秀俱為敬宣僚屬故曰同府左右小將王猛子謀殺敬宣據廣固以應休之乙夘敬宣召道秀屏人語屏必郢翻左右悉出户猛子逡巡在後取敬宣備身刀殺敬宣文武佐吏即時討道賜等皆斬之己夘魏主嗣北巡西秦王熾磐子元基自長安逃歸元基葢從熾磐入秦以朝因留長安熾磐以為尚書左僕射五月丁亥魏主嗣如大甯趙倫之沈林子破魯軌於石城司馬休之魯宗之救之不及遂與軌奔襄陽宗之叅軍李應之閉門不納甲午休之宗之軌及譙王文思新蔡王道賜此又一司馬道賜也新蔡王晃以武陵王晞事廢後以道賜襲爵梁州刺史馬敬南陽太守魯範俱奔秦宗之素得士民心爭為之衛送出境王鎮惡等追之盡境而還不敢窮兵追之懼出境而遇伏也初休之等求救於秦魏秦征虜將軍姚成王及司馬國璠引兵至南陽璠孚袁翻魏長孫嵩至河東聞休之等敗皆引還休之至長安秦王興以為揚州刺史使侵擾襄陽侍御史唐盛言於興曰據符䜟之文司馬氏當復得河洛䜟楚譛翻今使休之擅兵於外猶縱魚於淵也不如以高爵厚禮留之京師興曰昔文王卒免羑里紂囚文王於羑里既而釋之復扶又翻卒子恤翻高祖不斃鴻門見九卷漢髙祖元年茍天命所在誰能違之脱如符䜟之言留之適足為害遂遣之史言姚興知命詔加太尉裕太傅揚州牧劒履上殿入朝不趨贊拜不名朝直遙翻以兖青二州刺史劉道憐為都督荆湘益秦寜梁雍七州諸軍事驃騎將軍荆州刺史雍於用翻驃匹妙翻騎竒寄翻道憐貪鄙無才能裕以中軍長史晉陵太守謝方明為驃騎長史南郡相道憐府中衆事皆諮決於方明方明冲之子也謝冲奕之從子方明裕之從祖弟也益州刺史朱齡石遣使詣河西王蒙遜使疏吏翻諭以朝廷威徳蒙遜遣舎人黄迅詣齡石且上表言伏聞車騎將軍裕欲清中原願為右翼驅除戎虜夏王勃勃遣御史中丞烏洛孤與蒙遜結盟蒙遜遣其弟湟河太守漢平莅盟于夏夏戸雅翻西秦王熾磐率衆三萬襲湟河沮渠漢平拒之遣司馬隗仁夜出擊熾磐破之沮子余翻隗五罪翻熾昌志翻熾磐將引去漢平長史焦昶將軍段景潜召熾磐熾磐復攻之昶丑兩翻復扶又翻昶景因説漢平出降説輸芮翻降戸江翻下同仁勒壯士百餘據南門樓三日不下力屈為熾磐所禽熾磐欲斬之散騎常侍武威段暉諫曰仁臨難不畏死散悉亶翻騎竒寄翻難乃旦翻忠臣也宜宥之以厲事君乃囚之熾磐以左衛將軍匹達為湟河太守擊乙弗窟乾降其三千餘戸而歸以尚書右僕射出連䖍為都督嶺北諸軍事嶺北洪地嶺北也涼州刺史以涼州刺史謙屯為鎮軍大將軍河州牧隗仁在西秦五年段暉又為之請史書武威段暉以别南燕之段暉也又為于偽翻熾磐免之使還姑臧戊午魏主嗣行如濡源遂至上谷涿鹿廣甯涿鹿縣漢屬上谷郡晉分屬廣甯郡魏土地記下洛縣東南六十里有涿鹿城西北百三十里有大甯城即漢廣甯縣也葢在唐媯州界濡乃官翻秋七月癸未還平城西秦王熾磐以秦州刺史曇達為尚書令曇徒含翻光禄勲王松夀為秦州刺史辛亥晦日有食之八月甲子太尉裕還建康固辭太傅州牧其餘受命以豫章公世子義符為兖州刺史丁未謝裕卒以劉穆之為左僕射九月己亥大赦魏比歳霜旱比毗至翻雲代之民多饑死雲代雲中代郡二郡之地太史令王亮蘇坦言於魏主嗣曰案䜟書魏當都鄴可得豐樂樂音洛嗣以問羣臣博士祭酒崔浩特進京兆周澹曰澹徒覽翻遷都於鄴可以救今年之饑非久長之計也山東之人以國家居廣漢之地廣漢據北史崔浩傳作廣漠當從之漠大也謂其民畜無涯號曰牛毛之衆今留兵守舊都謂平城也分家南徙不能滿諸州之地參居郡縣情見事露見賢遍翻恐四方皆有輕侮之心且百姓不便水土疾疫死傷者必多又舊都守兵既少少詩沼翻下同屈丐柔然將有窺窬之心舉國而來雲中平城必危朝廷隔恒代千里之險自恒山至代有飛狐之口倒馬之闗夏屋廣昌五迴之險難以赴救此則聲實俱損也今居北方假令山東有變我輕騎南下布濩林薄之間騎竒寄翻濩胡故翻郭璞曰布濩猶布露也毛晃曰布濩流散也草叢生曰薄孰能知其多少百姓望塵懾服此國家所以威制諸夏也懾之涉翻夏戸雅翻來春草生湩酪將出湩覩勇翻又多貢翻乳汁也酪歴各翻乳漿也西漢太僕屬官有挏馬應劭曰主乳馬取其汁挏治之味酢可飲因以名官如淳曰主乳馬以韋革為夾兜受數斗盛馬乳挏取其上肥因名挏馬今梁州名馬酪為馬酒師古曰挏音徒孔翻兼以菜果得及秋熟則事濟矣嗣曰今倉廩空竭既無以待來秋若來秋又饑將若之何對曰宜簡饑貧之戸使就食山東若來秋復饑當更圗之復扶又翻但方今不可遷都耳嗣恱曰唯二人與朕意同乃簡國人尤貧者詣山東三州就食拓跋氏起于漠北統國三十六姓九十九道武既并中原徙其豪傑於雲代與北人雜居以其北來部落為國人山東三州定相冀也遣左部尚書代人周幾帥衆鎮魯口以安集之魏初四方四維置八部大人分東西南北左右前後後又置八部尚書魏書官氏志拓跋鄰以次兄為普氏後改為周氏盖魏建代都周幾遂為代人帥讀曰率嗣躬耕籍田且命有司勸課農桑明年大熟民遂富安夏赫連建將兵擊秦執平涼太守姚軍都將即亮翻遂入新平廣平公弼與戰於龍尾堡劉昫地理志鳯翔府岐山縣唐武徳七年移治龍尾城禽之秦王興藥動廣平公弼稱疾不朝朝直遙翻聚兵於第興聞之怒收弼黨唐盛孫𤣥等殺之太子泓請曰臣不肖不能緝諧兄弟緝當作輯使至於此皆臣之罪也若臣死而國家安願賜臣死若陛下不忍殺臣乞退就藩興惻然憫之召姚讚梁喜尹昭斂曼嵬與之謀囚弼將殺之窮治黨與嵬五回翻治直之翻泓流涕固請乃并其黨赦之泓待弼如初無忿恨之色魏太史奏熒惑在匏𤓰中據晉書天文志匏𤓰在天津之南天漢分流夾之張淵觀象賦註曰匏𤓰五星在麗珠北天津九星在匏𤓰北忽亡不知所在於法當入危亡之國先為童謠妖言然後行其禍罰法謂推占之常法妖於驕翻魏主嗣召名儒十餘人使與太史議熒惑所詣崔浩對曰按春秋左氏傳神降于莘以其至之日推知其物浩葢據春秋左氏外傳也外傳曰周惠王十五年有神降於莘王問於内史過對曰其丹朱乎王曰其誰受之對曰在虢土王曰虢其幾何對曰昔堯臨民以五今其胄見神之見也不過其物若由是觀之不過五年十九年晉取虢傳直戀翻庚午之夕辛未之朝天有隂雲熒惑之亡當在二日庚之與午皆主於秦辛為西夷晉書天文志自東井十六度至桞八度為鶉首於辰在未秦之分野自栁九度至張十二度為鶉火於辰在午周之分野時姚秦兼有關洛之地故云皆主於秦庚辛西方也故為西夷今姚興據長安熒惑必入秦矣衆皆怒曰天上失星人間安知所詣浩笑而不應後八十餘日熒惑出東井留守句已久之乃去新唐書天文志曰去而復來是謂句已晉書天文志曰熒惑為亂為賊為疾為喪為飢為兵所居國受殃環繞鉤已芒角動搖變色乍前乍後乍左乍右其殃愈甚句讀曰鉤鉤已謂環繞而行如鉤又成已字也秦大旱昆明池竭童謠訛言徒歌謂之謠國人不安間一歳而秦亡衆乃服浩之精妙冬十月壬子秦王興使散騎常侍姚敞等送其女西平公主於魏散悉亶翻騎竒寄翻下同魏主嗣以后禮納之鑄金人不成魏丘嗣立后皆鑄金人以卜之乃以為夫人而寵遇甚厚辛酉魏主嗣如沮洳城沮將豫翻洳昌庶翻沮洳漸濕之地北方地高燥此城葢以下濕而得名癸亥還平城十一月丁亥復如豺山宫復扶又翻庚子還西秦王熾磐遣襄武侯曇達等將騎一萬擊南羌彌姐康薄于赤水降之水經註赤亭水出南安郡東山赤谷西流逕城北南入渭水曇徒含翻將即亮翻姐子也翻又音紫降戸江翻以王孟保為略陽太守鎮赤水燕尚書令孫護之弟伯仁為昌黎尹與其弟叱支乙拔皆有才勇從燕王跋起兵有功謂殺慕容熈時也事見一百十四卷三年求開府不得有怨言跋皆殺之進䕶開府儀同三司録尚書事以慰其心䕶怏怏不悦跋酖殺之怏於兩翻遼東太守務銀提自以有功出為邊郡怨望謀外叛跋亦殺之萬泥乳陳既死孫䕶兄弟及務銀提又誅馮跋亦少恩矣林邑冦交州州將擊敗之將即亮翻敗補邁翻十二年春正月甲申魏主嗣如豺山宫戊子還平城加太尉裕兖州刺史都督南秦州凡都督二十二州二十二州徐南徐豫南豫兖南兖青冀幽并司郢荆江湘雍梁益寧交廣南秦也以世子義符為豫州刺史秦王興使魯宗之將兵宼襄陽未至而卒卒子恤翻其子軌引兵入宼雍州刺史趙倫之擊敗之雍於用翻敗補邁翻西秦王熾磐攻秦洮陽公彭利和於漒川洮土刀翻漒其良翻沮渠蒙遜攻石泉以救之熾磐至沓中引還二月熾磐遣襄武侯曇達救石泉曇徒含翻蒙遜亦引去蒙遜遂與熾磐結和親自熾磐滅秃髪氏與蒙遜為鄰敵歳歳交兵今乃結和秦王興如華隂使太子泓監國華户化翻監工銜翻入居西宫太子居東宫西宫秦王所居也興疾篤還長安黄門侍郎尹冲謀因泓出迎而殺之興至泓將出迎宫臣諫曰凡東宫官屬皆曰宫臣主上疾篤姦臣在側姦臣謂尹冲等殿下今出進不得見主上退有不測之禍泓曰臣子聞君父疾篤而端居不出何以自安對曰全身以安社稷孝之大者也泓乃止尚書姚沙彌謂尹冲曰太子不出迎宜奉乗輿幸廣平公第宿衛將士聞乗輿所在自當來集乗繩證翻將即亮翻太子誰與守乎且吾屬以廣平公之故已陷名逆節將何所自容今奉乗輿以舉事乃杖大順不惟救廣平之禍吾屬前罪亦盡雪矣杖仗同冲以興死生未可知欲隨興入宫作亂不用沙彌之言興入宫命太子泓録尚書事東平公紹及右衛將軍胡翼度典兵禁中防制内外紹興之弟也遣殿中上將軍歛曼嵬收弼第中甲仗内之武庫晉置殿中將軍姚秦復有殿中上將軍使統殿中諸主帥興疾轉篤其妹南安長公主問疾不應長知兩翻幼子耕兒出吿其兄南陽公愔曰上已崩矣宜速決計愔即與尹冲帥甲士攻端門愔於今翻帥讀曰率歛曼嵬胡翼度等勒兵閉門拒戰愔等遣壯士登門縁屋而入及于馬道泓侍疾在諮議堂太子右衛率姚和都率東宫兵入屯馬道南愔等不得進遂燒端門興力疾臨前殿賜弼死禁兵見興喜躍爭進赴賊賊衆驚擾和都以東宫兵自後擊之愔等大敗愔逃于驪山其黨建康公吕隆犇雍雍於用翻尹冲及弟泓來犇興引東平公紹及姚讚梁喜尹昭歛曼嵬入内寢受遺詔輔政明日興卒年五十一三考異曰晉本紀十國晉春秋皆云義熈十一年二月姚興卒魏本紀北史本紀姚興姚泓載記皆云十二年按後魏書崔鴻傳太祖天興二年姚興改號鴻以為元年故晉本紀三十國晉春秋凡𢎞始後事皆在前一年由鴻之誤也泓祕不發喪捕南陽公愔及吕隆太將軍尹元等皆誅之乃發喪即皇帝位泓字元子興之長子也大赦改元永和泓命齊公恢殺安定太守吕超隆超兄弟也皆黨於弼齊公恢時鎮安定恢猶豫久之乃殺之泓疑恢有貳心恢由是懼隂聚兵謀作亂為後姚恢舉兵張本泓葬興于偶陵諡曰文桓皇帝廟號髙祖初興徙李閏羌三千戸於安定興卒羌酋党容叛孫愐曰党本去聲今為上聲本出西羌姚秦有將軍党耐虎自云夏后氏之後為羌豪酋慈由翻下同党底朗翻泓遣撫軍將軍姚讚討降之降戸江翻徙其酋豪于長安餘遣還李閏北地太守毛雍據趙氏塢以叛趙氏塢孝武太元九年秦主堅撃後秦所屯之地東平公紹討禽之時姚宣鎮李閏叅軍韋宗聞毛雍叛説宣曰主上新立威徳未著國家之難未可量也難乃旦翻殿下不可不為深慮邢望險要宜徙據之此霸王之資也宣従之帥户三萬八千棄李閏南保邢望帥讀曰率諸羌據李閏以叛東平公紹進討破之宣詣紹歸罪紹殺之二月加太尉裕中外大都督裕戒嚴將伐秦詔加裕領司豫二州刺史以其世子義符為徐兖二州刺史琅邪王徳文請啓行戎路詩曰元戎十乗以先啓行行戸剛翻修敬山陵詔許之夏四月壬子魏大赦改元泰常西秦襄武侯曇達等擊秦秦州刺史姚艾於上邽破之徙其民五千餘戸於枹罕曇徒含翻抱音膚五月癸巳加太尉裕領北雍州刺史晉初置雍州於長安永嘉之亂沒于劉石苻秦之亂雍州流民南出樊沔孝武始於襄陽僑立雍州今裕欲取長安故領北雍州刺史以别襄陽之雍州也雍於用翻下同六月丁巳魏主嗣北巡并州胡數萬落叛秦入于平陽推匈奴曹𢎞為大單于𢎞蓋匈奴右賢王曹轂子寅之後所謂東曹者也單音蟬攻立義將軍姚成都於匈奴堡此匈奴種落相率保聚之地因以為名征東將軍姚懿自蒲坂討之執𢎞送長安徙其豪右萬五千落於雍州秦雍州治安定氐王楊盛攻秦祁山拔之進逼秦州秦後將軍姚平救之盛引兵退平與上邽守將姚嵩追之將即亮翻夏王勃勃帥騎四萬襲上邽帥讀曰率騎奇寄翻未至嵩與盛戰於竹嶺敗死水經注籍水歴當亭川又東南流與竹嶺水合水出南山竹嶺東北入籍水籍水東北入上邽縣勃勃攻上邽二旬克之殺秦州刺史姚軍都及將士五千餘人因毁其城進攻隂宻隂宻古宻人之國詩所謂宻人不恭敢距大邦者也自漢以來為縣屬安定郡括地志隂宻故城在涇州鶉觚縣西其東接縣城即古宻國又殺秦將姚良子及將士萬餘人將即亮翻以其子昌為雍州刺史鎮隂宻征北將軍姚恢棄安定奔還長安安定人胡儼等帥戸五萬據城降於夏帥讀曰率降戸江翻勃勃使鎮東將軍羊茍兒將鮮卑五千鎮安定進攻秦鎮西將軍姚諶於雍城諶委鎮犇長安勃勃據雍進掠郿城將鮮即亮翻諶氏壬翻雍於用翻郿音媚又音眉秦東平公紹及征虜將軍尹昭等將步騎五萬擊之勃勃退趨安定趨七喻翻胡儼閉門拒之殺羊茍兒及所將鮮卑復以安定降秦復扶又翻下同紹進擊勃勃於馬鞍阪破之追至朝那不及而還還從宣翻又如字勃勃歸杏城楊盛復遣兄子倦擊秦至陳倉秦歛曼嵬擊却之夏王勃勃復遣兄子提南侵泄陽晉書載記作池陽當從之池陽縣屬扶風郡唐為京兆雲陽縣復扶又翻秦車騎將軍姚裕等擊却之涼司馬索承明上書勸涼公暠伐河西王蒙遜索昔各翻暠古老翻暠引見謂之曰蒙遜為百姓患孤豈忘之顧勢力未能除耳卿有必禽之䇿當為孤陳之為于偽翻直唱大言使孤東討此與言石虎小豎宜肆諸市朝者何異朝直遙翻承明慙懼而退秋七月魏主嗣大獵于牛川臨殷繁水而還北史曰登釜山臨殷繁水括地志曰釜山在媯州懐戎縣北三里戊戌至平城八月丙午大赦寜州獻琥珀枕於太尉裕琥珀出哀牢夷廣雅曰琥珀生地中其上及旁不生草深者八九尺大如斛削去皮尖琥珀如斗初時如桃膠凝堅乃成博物志松脂淪入地千年化為茯苓茯苓千年化為琥珀今太山有茯苓而無琥珀永昌有琥珀而無茯苓裕以琥珀治金創治直之翻創初良翻得之大喜命碎擣分賜北征將士裕以世子義符為中軍將軍監太尉留府事劉穆之為左僕射領監軍中軍二府軍司監軍謂義符監太尉留府軍也監工銜翻入居東府摠攝内外以太尉左司馬東海徐羨之為穆之之副左將軍朱齡石守衛殿省徐州刺史劉懐慎守衛京師揚州别駕從事史張裕任留州事任留州事任揚州留後事也懐慎懐敬之弟也劉穆之内摠朝政外供軍旅決㫁如流事無擁滯朝直遙翻㫁丁亂翻賓客輻湊求訴百端内外諮禀盈階滿室盈階滿室謂諮禀之文書也目覽辭訟手答牋書耳行聽受口並酬應不相參涉悉皆贍舉又喜賓客贍時艶翻喜許記翻言談賞笑彌日無倦裁有閒暇手自冩書尋覽校定性奢豪食必方丈旦輒為十人饌未嘗獨餐饌雛戀翻又雛皖翻嘗白裕曰穆之家本貧賤贍生多闕自叨沗以來叨卜刀翻雖每存約損而朝夕所須微為過豐自此外一毫不以負公中軍諮議叅軍張邵言於裕曰人生危脆必當逺慮穆之若邂逅不幸脆此芮翻邂戸隘翻逅胡茂翻誰可代之尊業如此尊業言裕已成之功業也尊者尊稱之也茍有不諱處分云何處昌吕翻分扶問翻裕曰此自委穆之及卿耳丁巳裕發建康遣龍驤將軍王鎮惡冠軍將軍檀道濟將步軍自淮淝向許洛驤思將翻冠古玩翻將步即亮翻新野太守朱超石寧朔將軍胡藩趨陽城振武將軍沈田子建威將軍傅𢎞之趨武關趨七喻翻建武將軍沈林子彭城内史劉遵考將水軍出石門自汴入河汴水首受濟東南與淮通漢書地理志所謂狼湯渠是也狼音浪湯音宕昔大禹塞熒澤開此渠以通淮泗禹貢所謂導沇水東流為濟入于河溢為滎東出于陶丘北者也漢修河隄始立石門以遏水水盛則通于河水耗則輟流以冀州刺史王仲徳督前鋒諸軍開鉅野入河水經濟水北至東燕縣與河合酈道元註曰濟水自乘氏縣承兩分東北入于鉅野濟之故瀆又北右合洪水洪水上鉅野薛訓渚自渚迄于北口一百二十里名曰洪水桓温以太和四年率衆北入掘渠通濟義熈十三年劉武帝西入長安又廣其功自洪口以上又謂桓公瀆濟自是北注也遵考裕之族弟也劉穆之謂王鎮惡曰公今委卿以伐秦之任卿其勉之鎮惡曰吾不克關中誓不復濟江復扶又翻裕既行青州刺史檀祇自廣陵輒率衆至涂中掩討亡命涂讀曰滁劉穆之恐祇為變議欲遣軍時檀韶為江州刺史張邵曰今韶據中流道濟為軍首謂為伐秦諸軍之首若有相疑之跡則大府立危大府謂太尉留府其實指建康也不如逆遣慰勞以觀其意必無患也勞力到翻穆之乃止初魏主嗣使公孫表討白亞栗斯事見上年曰必先與秦洛陽戍將相聞使備河南岸然後擊之表未至胡人廢白亞栗斯更立劉虎為率善王表以胡人内自攜貳勢必敗散遂不吿秦將而擊之大為虎所敗將即亮翻敗補邁翻士卒死傷甚衆嗣謀於羣臣曰胡叛踰年討之不克其衆繁多為患日深今盛秋不可復發兵妨民農務謂妨農收也復扶又翻將若之何白馬侯崔宏曰胡衆雖多無徤將御之將御即亮翻下同終不能成大患表等諸軍不為不足但法令不整處分失宜以致敗耳處昌吕翻分扶問翻得大將素有威望者將數百騎往攝表軍無不克矣攝持也相州刺史叔孫建前在并州為胡魏所畏服胡魏猶言胡晉也諸將莫及可遣也嗣從之以建為中領軍督表等討虎九月戊午大破之斬首萬餘級虎及司馬順宰皆死俘其衆十萬餘口太尉裕至彭城加領徐州刺史以太原王𤣥謨為從事史裕領徐州以𤣥謨為徐州從事史漢制諸州刺史皆有從事史假佐其後宋文帝用𤣥謨以喪師至孝武之初義宣臧質之變卒賴以寧則裕之用人猶有漢髙祖諸葛孔明之讖唐太宗託徐世勣喜薛仁貴未足以進此也初王廞之敗也事見一百九卷隆安元年廞許今翻沙門曇永匿其幼子華曇徒含翻使提衣襆自隨襆防玉翻帕也以裹衣物魏舒襆被而出韓文襆被入直皆此義也津邏疑之曇永呵華曰奴子何不速行棰之數十邏即佐翻棰止蘂翻由是得免遇赦還呉以其父存亡不測布衣蔬食絶交逰不仕十餘年裕聞華賢欲用之乃發廞喪使華制服服闋辟為徐州主簿裕用王華亦留以遺文帝闋苦穴翻王鎮惡檀道濟入秦境所向皆捷秦將王苟生以漆丘降鎮惡漆丘葢在梁郡䝉縣晋莊周為蒙漆園吏後人因以漆丘名城將即亮翻降戸江翻下同徐州刺史姚掌以項城降道濟諸屯守皆望風欵附惟新蔡太守董遵不下新蔡縣漢屬汝南郡蔡平侯自蔡徙此故曰新蔡魏分屬汝隂郡晉惠帝分汝隂立新蔡郡道濟攻拔其城執遵殺之進克許昌獲秦潁川太守姚垣及大將楊業沈林子自汴入河襄邑人董神虎聚衆千餘人來降太尉裕板為參軍林子與神虎共攻倉垣克之秦兖州刺史韋華降神虎擅還襄邑林子殺之秦東平公紹言於秦主泓曰晉兵已過許昌安定孤逺難以救衛宜遷其鎭戸内實京畿可得精兵十萬姚萇之興也以安定為根本後得闗中以安定為重鎮徙民以實之謂之鎮户雖晉夏交侵猶不亡國不然晉攻豫州夏攻安定將若之何夏戸雅翻事機已至宜在速決左僕射梁喜曰齊公恢有威名為嶺北所憚鎮人已與勃勃深仇謂鎮兵常與勃勃血戰有父兄子弟之仇理應守死無貳勃勃終不能越安定逺宼京畿若無安定虜馬必至於郿郿音媚又音眉今闗中兵足以拒晉無為豫自損削也泓從之吏部郎懿横宻言於泓曰恢於廣平之難有忠勲於陛下姓譜曰懿以諡為氏謂殺吕超也難乃旦翻自陛下龍飛紹統未有殊賞以答其意今外則置之死地内則不豫朝權朝直遙翻安定人自以孤危逼寇思南遷者十室而九若恢擁精兵數萬鼓行而向京師得不為社稷之累乎累力瑞翻宜徴還朝廷以慰其心泓曰恢若懐不逞之心徴之適所以速禍耳又不從王仲徳水軍入河將逼滑臺魏兖州刺史尉建畏懦帥衆棄城北渡河帥讀曰率仲徳入滑臺宣言曰晉本欲以布帛七萬匹假道于魏不謂魏之守將棄城遽去將即亮翻魏主嗣聞之遣叔孫建公孫表自河内向枋頭既破劉虎因遣建等引兵南向枋音方因引兵濟河斬尉建於城下投尸於河呼仲徳軍人問以侵寇之狀仲徳使司馬竺和之對曰劉太尉使王征虜自河入洛清掃山陵非敢為寇於魏也魏之守將自棄滑臺去王征虜借空城以息兵行當西引於晉魏之好無廢也好呼到翻下好持同何必揚旗鳴鼓以耀威乎嗣使建以問太尉裕裕遜辭謝之曰洛陽晉之舊都而羌據之晉欲修復山陵久矣諸桓宗族司馬休之國璠兄弟魯宗之父子皆晉之蠧也而羌收之以為晉患義熙元年桓謙等奔秦六年入寇十一年司馬休之魯宗之等奔秦秦使將兵擾襄陽六年司馬國璠等奔秦數帥衆擾邊璠孚袁翻今晉將伐之欲假道于魏非敢為不利也魏河内鎮將于栗磾有勇名築壘於河上以備侵軼將即亮翻磾丁奚翻軼宜結翻突也陸徳明曰又音逸裕以書與之題曰黑矟公麾下栗磾好操黑矟以自標故裕以此目之魏因拜栗磾為黑矟將軍矟色角翻通俗文矛長丈八者謂之矟冬十月壬戌魏主嗣如豺山宫初燕將庫傉官斌降魏既而復叛歸燕將即亮翻傉奴沃翻斌音彬降戸江翻下同復扶又翻魏主嗣遣驍騎將軍延普渡濡水擊斌斬之水經濡水從塞外來過遼西令支縣北又東南過海陽縣西南入于海驍堅堯翻騎奇寄翻魏書官氏志神元時餘部諸姓内入者可地延氏孝文時改為延氏濡乃官翻遂攻燕幽州刺史庫傉官昌征北將軍庫傉官提皆斬之秦陽城滎陽二城皆降晉兵進至成臯秦征南將軍陳留公洸鎮洛陽洸姑黄翻遣使求救于長安秦主泓遣越騎校尉閻生帥騎三千救之使疏吏翻帥讀曰率武衛將軍姚益男將步卒一萬助守洛陽又遣并州牧姚懿南屯陜津陜縣在大河之南攷之水經則陜縣故城在大河之北二城之間謂之陜津左傳秦伯伐晉自茅津濟封殽尸而還茅津即陜津也姚秦并冀二州治蒲阪陜式冉翻為之聲援寧朔將軍趙𤣥言於洸曰今晉宼益深人情駭動衆寡不敵若出戰不捷則大事去矣宜攝諸戍之兵固守金墉以待西師之救金墉不下晉必不敢越我而西是我不戰而坐收其弊也司馬姚禹隂與檀道濟通主簿閻恢楊䖍皆禹之黨也共嫉𤣥言於洸曰殿下以英武之畧受任方面今嬰城示弱得無為朝廷所責乎洸以為然乃遣趙𤣥將兵千餘南守柏谷塢水經注洛水東逕偃師縣南又東逕百谷塢北戴延之西征記曰塢在川南因高為塢髙一十餘丈杜佑曰柏谷塢在緱氏縣東北廣武將軍石無諱東戍鞏城𤣥泣謂洸曰𤣥受三帝重恩所守正有死耳萇興泓為三帝但明公不用忠臣之言為姦人所誤後必悔之既而成臯虎牢皆來降降戸江翻下同檀道濟等長驅而進無諱至石關犇還自洛城東至偃師四十五里偃師西山有漢廣野君酈食其廟廟東有二石闕龍驤司馬滎陽毛徳祖與𤣥戰于栢谷𤣥兵敗被十餘創據地大呼驤思將翻被皮義翻創初良翻呼火故翻𤣥司馬蹇鑒冒刃抱𤣥而泣𤣥曰吾創已重創初良翻君宜速去鑒曰將軍不濟鑒去安之與之皆死姚禹踰城犇道濟甲子道濟進逼洛陽丙寅洸出降道濟獲秦人四千餘人議者欲盡阬之以為京觀杜預曰積尸封土其上謂之京觀觀古亂翻道濟曰伐罪弔民正在今日皆釋而遣之於是夷夏感悦歸之者甚衆夏戸雅翻閻生姚益男未至聞洛陽已没不敢進己丑詔遣兼司空髙宻王恢之修謁五陵置守衛彭城王紘之子俊嗣髙宻王畧國恢之其孫也五陵宣帝陵在河隂曰髙原景帝陵曰峻平文帝陵曰崇陽武帝陵曰峻陽惠帝陵曰太陽太尉裕以冠軍將軍毛脩之為河南河内二郡太守行司州事戍洛陽冠古玩翻西秦王熾磐使秦州刺史王松夀鎮馬頭以逼秦之上邽丁度曰嶓冢山在古上邽縣西有神馬山十一月甲戌魏主嗣還平城太尉裕遣左長史王𢎞還建康諷朝廷求九錫時劉穆之掌留任而㫖從北來穆之由是愧懼發病劉穆之輔劉裕豈惟才智不及荀或而識又不及焉𢎞珣之子也王珣始見重於桓温後為孝武所親任十二月壬申詔以裕為相國總百揆揚州牧封十郡為宋公備九錫之禮位在諸侯王上領征西將軍司豫北徐雍四州刺史如故雍於用翻裕辭不受西秦王熾磐遣使詣太尉裕使疏吏翻下同求擊秦以自効裕拜熾磐平西將軍河南公秦姚懿司馬孫暢説懿使襲長安説輸芮翻誅東平公紹廢秦主泓而代之懿以為然乃散穀以賜河北夷夏河北縣自漢以來屬河東郡在蒲阪東時夷夏之民錯居之懿至陜津因散穀以賜焉夏戸雅翻欲樹私恩左常侍張敞侍郎左雅諫曰左常侍侍郎皆懿國官殿下以母弟居方面安危休戚與國同之今呉寇内侵四州傾没秦徐州鎮項城兖州鎮倉垣豫州鎮洛陽荆州當鎮上洛時悉為晉所取西虜擾邊秦涼覆敗謂赫連勃勃克上邽沮渠蒙遜入姑臧朝廷之危有如累卵穀者國之本也而殿下無故散之虛損國儲將若之何懿怒笞殺之泓聞之召東平公紹宻與之謀紹曰懿性識鄙淺從物推移造此謀者必孫暢也但馳使徴暢遣撫軍將軍讚據陜城臣向潼關為諸軍節度若暢奉詔而至臣當遣懿帥河東見兵共禦晉師帥讀曰率見賢遍翻若不受詔命便當聲其罪而討之泓曰叔父之言社稷之計也乃遣姚讃及冠軍將軍司馬國璠建義將軍虵𤣥屯陜津冠古玩翻璠孚袁翻虵以者翻又如字武衛將軍姚驢屯潼闗懿遂舉兵稱帝傳檄州郡欲運匈奴堡穀以給鎮人匈奴堡在平陽鎮人懿鎮蒲阪所領之衆也寧東將軍姚成都拒之懿卑辭誘之送佩刀為誓成都不従誘音酉懿遣驍騎將軍王國帥甲士數百攻成都成都擊禽之遣使讓懿曰明公以至親當重任國危不能救而更圖非望三祖之靈其肯佑明公乎姚弋仲廟號始祖萇廟號太祖興廟號髙祖所謂三祖也成都將糾合義兵往見明公於河上耳蒲阪臨河故曰河上於是傳檄諸城諭以逆順徴兵調食以討懿調徒釣翻懿亦發諸城兵莫有應者惟臨晉數千戸應懿成都引兵濟河擊臨晉叛者破之鎮人安定郭純等起兵圍懿東平公紹入蒲阪執懿誅孫暢等是歳魏衛將軍安城孝元王叔孫俊卒魏主嗣甚惜之謂其妻桓氏曰生同其榮能沒同其戚乎桓氏乃縊而祔焉嗣之立也叔孫俟有功事見一百一十五卷四年丁零翟猛雀驅掠吏民入白澗山為亂白澗山當在漢河東濩澤縣西水經註濩澤水出濩澤城西白澗嶺東逕濩澤濩澤唐澤州陽城縣即其地師古曰濩音烏虢翻魏内都大官河内張蒲與冀州刺史長孫道生討之道生嵩之從子也長知兩翻從才用翻道生欲進兵擊猛雀蒲曰吏民非樂為亂為猛雀所迫脅耳今不分别并擊之樂音洛别彼列翻雖欲返善其道無由必同心協力據險以拒官軍未易猝平也易以䜴翻不如先遣使諭之以不與猛雀同謀者皆不坐則必喜而離散矣使疏吏翻道生從之降者數千家使復舊業猛雀與其黨百餘人出走蒲等追斬猛雀首左部尚書周㡬窮討餘黨悉誅之資治通鑑卷一百十七
