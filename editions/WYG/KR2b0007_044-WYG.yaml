body:
  text: 資治通鑑巻四十四宋司馬光撰胡三省音註漢紀三十六起強圉協洽盡上章涒灘凡十四年世祖光武皇帝下建武二十三年春正月南郡蠻叛郡國志南郡在雒陽南一千五百里蠻即縁沔諸山蠻也杜佑曰時南郡潳山蠻反劉尚討破之徙其種人七千餘口置江夏界中其後沔中蠻是也遣武威將軍劉尚討破之夏五月丁卯大司徒蔡茂薨秋八月丙戍大司空杜林薨九月辛未以陳留玉況為大司徒賢曰玉音肅姓也冬十月丙申以太僕張純為大司空武陵蠻精夫相單程等反秦昭王使白起伐楚畧取蠻夷始置黔中郡漢興改為武陵范書曰長沙武陵蠻名渠帥曰精夫槃瓠之後也遣劉尚發兵萬餘人泝沅水入武谿擊之賢曰沅水出牂柯故且蘭東北經辰州潭州岳州經洞庭湖入江武谿在今辰州盧谿縣西百八十里即五谿之一也沅音元尚輕敵深入蠻乗險邀之尚一軍悉沒初匈奴單于輿弟右谷蠡王知牙師以次當為左賢王谷蠡音鹿黎左賢王次即當為單于單于欲傳其子遂殺知牙師烏珠留單于有子曰比為右薁鞬日逐王薁音郁鞬居言翻領南邊八部比見知牙師死出怨言曰以兄弟言之右谷蠡王次當立以子言之我前單于長子我當立呼韓邪單于約其諸子以兄弟次相傳單于輿殺其弟知牙師而立其子亂呼韓邪之約而比則烏珠留之長子也比自謂若父子相傳則烏珠留死比當立為單于何待至輿而始傳其子也師古曰谷音鹿蠡盧奚翻遂内懷猜懼庭㑹稀闊匈奴諸王嵗正月㑹單于庭單于疑之乃遣兩骨都矦監領比所部兵監古銜翻及單于蒲奴立比益恨望密遣漢人郭衡奉匈奴地圖詣西河太守求内附郡國志西河郡在雒陽北千二百里守式又翻兩骨都矦頗覺其意㑹五月龍祠匈奴諸王毎嵗五月㑹龍城祠南匈奴傳曰匈奴俗嵗有三龍祠常以正月五月九月戊日勸單于誅比比弟漸將王在單于帳下南匈奴傳大臣貴者左賢王次左谷蠡王次右賢王次右谷蠡王謂之四角次左右日逐王次左右温禺鞮王次左右斬將王是為六角漸當作斬傳寫誤加水旁耳聞之馳以報比比遂聚八部兵四五萬人待兩骨都矦還欲殺之骨都矦且到知其謀亡去單于遣萬騎擊之見比衆盛不敢進而還是嵗鬲矦朱祐卒范書朱祐傳二十四年卒祐為人質直尚儒學為將多受降將即亮翻降户江翻以克定城邑為本不存首級之功又禁制士卒不得虜掠百姓軍人樂放縱樂音洛多以此怨之二十四年春正月乙亥赦天下匈奴八部大人共議立日逐王比為呼韓邪單于欵五原塞願永為藩蔽扞禦北虜事下公卿下遐稼翻議者皆以為天下初定中國空虗夷狄情偽難知不可許五官中郎將耿國五官中郎將掌五官郎杜佑曰漢制三署郎年五十以上屬五官其次分屬左右署獨以為宜如孝宣故事受之事見二十七巻宣帝甘露黄龍間令東扞鮮卑北拒匈奴率厲四夷完復邊郡時邊郡皆創殘有南匈奴為扞蔽則可以完復矣帝從之秋七月武陵蠻㓂臨沅賢曰臨沅縣名屬武陵郡故城在今朗州武陵縣遣謁者李嵩中山太守馬成討之不克馬援請行帝愍其老未許援曰臣尚能被甲上馬被皮義翻帝令試之援據鞍顧眄以示可用帝笑曰矍鑠哉是翁賢曰矍鑠勇貌也遂遣援率中郎將馬武耿舒等將四萬餘人征五溪酈道元註水經云武陵有五溪謂雄溪樠溪酉溪潕溪辰溪悉是蠻夷所居故謂五溪皆槃瓠之子孫也土俗雄作熊樠作朗潕作武賢曰五溪在今辰州界援謂友人杜愔曰吾受厚恩年迫日索索盡也愔於今翻索昔各翻常恐不得死國事今獲所願甘心瞑目但畏長者家兒或在左右或與從事殊難得調介介獨惡是耳賢曰長者家兒謂權要子弟等介介猶耿耿也余謂調和也援固已慮耿舒之難與共事梁松竇固之邇言矣惡烏路翻冬十月匈奴日逐王比自立為南單于遣使詣闕奉藩稱臣上以問朗陵侯臧宫賢曰朗陵縣名屬汝南郡故城在今豫州朗山縣西南宫曰匈奴飢疫分爭臣願得五千騎以立功帝笑曰常勝之家難與慮敵吾方自思之二十五年春正月遼東徼外貊人㓂邊徼古弔翻貊莫百翻太守祭肜招降之降户江翻肜又以財利撫約鮮卑大都䕶偏何使招致異種駱驛欵塞種章勇翻駱驛相繼也欵叩也至也肜曰審欲立功當歸撃匈奴斬送頭首乃信耳偏何等即撃匈奴斬首二千餘級持頭詣郡其後嵗嵗相攻輙送首級受賞賜自是匈奴衰弱邊無㓂警鮮卑烏桓並入朝貢朝直遥翻肜為人質厚重毅撫夷狄以恩信故皆畏而愛之得其死力南單于遣其弟左賢王莫莫者左賢王之名將兵萬餘人擊北單于弟薁鞬左賢王生獲之北單于震怖怖普布翻却地千餘里北部薁鞬骨都矦與右骨都矦率衆三萬餘人歸南單于三月南單于復遣使詣闕貢獻求使者監䕶復扶又翻監古衘翻遣侍子修舊約舊約宣帝舊約戊申晦日有食之馬援軍至臨鄉水經註武陵郡沅南縣建武中所置縣在沅水之隂因以沅南為名縣治故城昔馬援討臨鄉所築也擊破蠻兵斬獲二千餘人初援嘗有疾虎賁中郎將梁松來候之虎賁中郎將掌虎賁郎賁音奔獨拜牀下援不答松去後諸子問曰梁伯孫帝婿梁松字伯孫尚帝女舞隂公主爾雅曰女子之夫為婿貴重朝廷公卿已下莫不憚之大人柰何獨不為禮援曰我乃松父友也雖貴何得失其序乎援兄子嚴敦並喜譏議賢曰喜許吏翻通輕俠援前在交阯還書誡之曰吾欲汝曹聞人過失如聞父母之名耳可得聞口不可得言也好論議人長短好呼到翻下同妄是非政灋賢曰謂譏刺時政也此吾所大惡也寧死不願聞子孫有此行也惡烏路翻行下孟翻下同龍伯髙敦厚周慎口無擇言謙約節儉亷公有威吾愛之重之願汝曹效之杜季良豪俠好義憂人之憂樂人之樂樂音洛父䘮致客數郡畢至吾愛之重之不願汝曹效也效伯髙不得猶為謹敕之士所謂刻鵠不成尚類鶩者也賢曰鶩鴨也鶩莫卜翻毛晃曰舒鳬俗謂之鴨可畜而不能髙飛者曰鴨野生而髙飛者曰鶩效季良不得䧟為天下輕薄子所謂畫虎不成反類狗者也伯髙者山都長龍述也龍姓述名賢曰山都縣名屬南陽郡舊南陽之赤鄉秦以為縣故城在今襄州義清縣東北長知兩翻季良者越騎司馬杜保也百官志越騎校尉其屬有司馬秩千石皆京兆人㑹保仇人上書訟保為行浮薄亂羣惑衆伏波將軍萬里還書以誡兄子而梁松竇固與之交結將扇其輕偽敗亂諸夏敗補邁翻書奏帝召責松固以訟書及援誡書示之松固叩頭流血而得不罪詔免保官擢拜龍述為零陵太守賢曰零陵今永州守式又翻松由是恨援及援討武陵蠻軍次下雋賢曰下雋縣名屬長沙國故城在今辰州沅陵縣宋白曰岳州巴陵縣漢地理志下雋縣属長沙郡在今卾州蒲沂縣界即此地按水經江水東至長沙下雋縣北澧水資水沅水合東流注之則宋説為是賢説非雋字兖翻有兩道可入從壺頭則路近而水嶮水經註夷水南出夷山北流注沅夷山東接壺頭山山下水際有馬援停軍處賢曰壺頭山在今辰州沅陵東從充則塗夷而運遠賢曰充縣名屬武陵郡充昌容翻耿舒欲從充道援以為棄日費糧不如進壼頭搤其喉咽搤持也咽音烟喉嚨也充賊自破以事上之上時掌翻下同帝從援策進營壼頭賊乗髙守隘水疾船不得上㑹暑甚士卒多疫死援亦中病乃穿岸為室以避炎氣武陵記曰壼頭山邊有石窟即援所穿室也中竹仲翻賊每升險鼔譟援輙曳足以觀之左右哀其壯意莫不為之流涕為于偽翻耿舒與兄好畤矦弇書曰好畤縣屬扶風畤音止前舒上書當先擊充糧雖難運而兵馬得用軍人數萬爭欲先奮今壼頭竟不得進大衆怫鬱行死師古曰怫欝憂不樂也怫符弗翻怫欝氣藴積而不得舒也行死謂行將疫死也誠可痛惜前到臨鄉賊無故自致若夜擊之即可殄滅伏波類西域賈胡到一處輙止賢曰言似商胡所至之處輙停留也賈音古以是失利今果疾疫皆如舒言弇得書奏之帝乃使梁松乗驛責問援因代監軍監古銜翻㑹援卒松因是構䧟援帝大怒追收援新息矦印綬郡國志新息矦國屬汝南郡應劭曰古息國其後東徙加新字初援在交阯常餌薏苡神農本草經曰薏苡味甘㣲寒主風濕痺下氣除筋骨邪氣乆服輕身益氣實能輕身勝障氣障與瘴同軍還載之一車及卒後有上書譖之者以為前所載還皆明珠文犀文犀犀之有文彩者帝益怒援妻孥惶懼孥音奴子也不敢以䘮還舊塋槀𦵏域西賢曰槀草也以不歸舊塋時權𦵏故稱槀馬援傳作城西説文曰塋墓地廣雅曰塋域塟地也賔客故人莫敢弔㑹不敢弔及㑹葬嚴與援妻子草索相連詣闕請罪索昔各翻帝乃出松書以示之方知所坐上書訴寃前後六上辭甚哀切上時掌翻下同前雲陽令扶風朱勃雲陽縣屬左馮翊有秦雲陽宫鈎弋夫人葬雲陽昭帝為起雲陵邑後為縣詣闕上書曰竊見故伏波將軍馬援㧞自西州欽慕聖義間關險難難乃旦翻觸冒萬死經營隴冀謂征隗囂時也謀如涌泉埶如轉規規圓也兵動有功師進輙克誅鋤先零飛矢貫脛零音憐建武十一年援擊破先零飛矢貫脛脛形定翻出征交阯與妻子生訣征交阯事見上巻十七年十八年十九年間復南討復扶又翻立䧟臨鄉師已有業業緒也未竟而死吏士雖疫援不獨存夫戰或以乆而立功或以速而致敗深入未必為得不進未必為非人情豈樂乆屯絶地不生歸哉樂音洛惟援得事朝廷二十二年北出塞漠謂討烏桓南度江海觸冒害氣僵死軍事名滅爵絶國土不傳海内不知其過衆庶未聞其毁家屬杜門𦵏不歸墓怨隙並興宗親怖慄怖普布翻死者不能自列生者莫為之訟為于偽翻臣竊傷之夫明主醲於用賞約於用刑髙祖嘗與陳平金四萬斤以間楚軍不問出入所為事見十巻髙帝三年間古莧翻豈復疑以錢榖間哉復扶又翻願下公卿平援功罪宜絶宜續以厭海内之望下遐稼翻厭一葉翻帝意稍解初勃年十二能誦詩書常候援兄況辭言􅈺雅賢曰􅈺音閑􅈺雅猶言沈静也余謂􅈺習也屈原𫝊􅈺於辭令援裁知書見之自失況知其意乃自酌酒慰援曰朱勃小器速成智盡此耳卒當從汝禀學卒子恤翻終也賢曰禀受也勿畏也勃未二十右扶風請試守渭城宰前書音義曰試守者試守一嵗乃為真食其全俸賢曰渭城縣名故城在今咸陽縣東北及援為將軍封侯而勃位不過縣令援後雖貴常待以舊恩而卑侮之勃愈身自親及援遇䜛唯勃能終焉謁者南陽宗均監援軍宗均列傳作宋均趙明誠金石錄有漢司空宗俱碑按後漢宋均𫝊均族子意意孫俱靈帝時為司空余嘗得宗資墓前碑龜􅈩上刻字因以後漢帝紀及姓苑姓纂諸書參考以謂自均以下其姓皆作宗而列𫝊轉寫為宋誤也後得此碑益知前言之不繆援旣卒軍士疫死者太半蠻亦飢困均乃與諸將議曰今道遠士病不可以戰欲權承制降之何如諸將皆伏地莫敢應降戸江翻均曰夫忠臣出竟有可以安國家專之可也公羊傳曰聘禮大夫受命不受辭出境有可以安社稷全國家者則專之可也竟讀曰境乃矯制調伏波司馬呂种守沅陵長調徒弔翻命种奉詔書入虜營告以恩信因勒兵隨其後蠻夷震怖冬十月共斬其大帥而降帥所類翻於是均入賊營散其衆遣歸本郡為置長吏而還為于偽翻還從宣翻又如字羣蠻遂平均未至先自劾矯制之罪劾户槩翻又戶得翻上嘉其功迎賜以金帛令過家上冡受命而出未復命則不當先過家今使過家上冡所以示寵榮也上時掌翻是嵗遼西烏桓大人郝旦等率衆内屬考異曰帝紀今春旣著烏桓來朝嵗末又紀是嵗烏桓朝貢内屬盖始獨大人來朝後乃率種族内屬耳詔封烏桓渠帥為矦王君長者八十一人帥所類翻長知兩翻使居塞内布於緣邊諸郡令招來種人種章勇翻給其衣食遂為漢偵候偵丑鄭翻助撃匈奴鮮卑時司徒掾班彪上言烏桓天性輕黠好為㓂賊若乆放縱而無總領者必復掠居人掾俞絹翻黠下八翻好呼到翻復扶又翻但委主降掾吏賢曰盖當時權置也降户江翻恐非所能制臣愚以為宜復置烏桓校尉西都置䕶烏桓校尉至王莽時烏桓叛校尉由是罷闞駰十三州志曰䕶烏桓擁節秩比二千石武帝置以䕶内附烏桓旣而并於匈奴中郎將余據匈奴中郎將亦此時方置未知并於匈奴中郎將果何時也校户教翻誠有益於附集省國家之邊慮帝從之於是始復置校尉於上谷寗城賢曰寗城縣名前書寗作寧寧寗兩字通也杜佑曰寗城在媯川郡懐戎縣西北俗名西吐㪍城開營府并領鮮卑賞賜質子嵗時互市焉質音致二十六年正月詔增百官奉百官志大將軍三公奉月三百五十斛秩中二千石俸月百八十斛二千石月百二十斛比二千石月百斛千石月九十斛比千石月八十斛六百石月七十斛比六百石月五十五斛四百石月五十斛比四百石月四十五斛三百石月四十斛比三百石月三十七斛二百石月三十斛比二百石月二十七斛百石月十六斛斗食月十一斛佐史月八斛凡諸受俸錢榖各半奉音扶用翻其千石已上減於西京舊制六百石已下增於舊秩初作夀陵賢曰初作陵未有名故號夀陵盖取乆長之義也帝曰古者帝王之葬皆陶人瓦器木車茅馬使後世之人不知其處太宗識終始之義景帝能述遵孝道遭天下反覆而霸陵獨完受其福豈不美哉謂赤眉入長安惟霸陵不掘今所制地不過二三頃無山陵陂池裁令流水而已賢曰言不起山陵裁令封土陂池不停水而已陂音普何翻池音徒河翻使迭興之後與丘隴同體迭興謂易姓而王者詔遣中郎將叚彬彬丑林翻副校尉王郁使南匈奴立其庭去五原西部塞八十里地理志五原西部都尉治田辟師古曰辟讀曰壁使者令單于伏拜受詔單于顧望有頃乃伏稱臣拜訖令譯曉使者曰單于新立誠慙於左右願使者衆中無相屈折也詔聽南單于入居雲中賢曰雲中郡名在今勝州北宋白曰漢雲中故城在勝州東北四十里榆林縣界趙武矦所築始置使匈奴中郎將將兵衛䕶之夏南單于所獲北虜薁鞬左賢王將其衆及南部五骨都矦韓氏骨都矦當干骨都矦呼衍骨都矦郎氏骨都矦粟藉骨都矦凡五薁音郁鞬居言翻合三萬餘人畔歸去北庭三百餘里自立為單于月餘日更相攻撃更工衡翻五骨都矦皆死左賢王自殺諸骨都矦子各擁兵自守秋南單于遣子入侍詔賜單于冠帶璽綬南匈奴傳黄金璽盭緺綬賢曰盭音戾草名以戾草染綬因以為名别漢諸矦王制戾綠色緺紫青色音𤓰璽斯氏翻綬音受車馬金帛甲兵什器賢曰古之師行二五為什食器之類必供之故曰什物食具今人通謂生生之具為什物又轉河東米糒二萬五千斛牛羊三萬六千頭以贍給之糒音備糗也令中郎將將弛刑五十人隨單于所處叅辭訟察動静弛刑者弛刑徒也説文弓解曰弛此謂解其罪而輸作者處昌吕翻將考異曰帝紀今年春使叚彬賜璽綬置使匈奴中郎據匈奴傳賜璽綬在秋其置中郎將亦未知決在何時或者今春置之至是更為之約束制度耳單于嵗盡輒遣奉奏送侍子入朝漢遣謁者送前侍子還單于庭賜單于及閼氏左右賢王以下繒綵合萬匹嵗以為常閼音煙氏音支於是雲中五原朔方北地定襄鴈門上谷代八郡民歸於本土前此避匈奴内徙者令皆歸復本土遣謁者分將弛刑補治城郭將即亮翻下同治直之翻發遣邊民在中國者布還諸縣皆賜以裝錢轉給糧食時城郭丘墟掃地更為上乃悔前徙之徙民見上巻十五年冬南匈奴五骨都矦子復將其衆三千人歸南部北單于使騎追撃悉獲其衆南單于遣兵拒之逆戰不利於是復詔單于徙居西河美稷復扶又翻因使叚彬王郁留西河擁䕶之使匈奴中郎將自是亦屯西河美稷杜佑曰汾州隰城縣有美稷郷即漢美稷縣也隰城漢之兹氏縣也令西河長史嵗將騎二千弛刑五百人助中郎將衛䕶單于冬屯夏罷自後以為常南單于旣居西河亦列置諸部王助漢扞戍北地朔方五原雲中定襄鴈門代郡皆領部衆為郡縣偵邏耳目偵丑鄭翻賢曰邏音力賀翻北單于惶恐頗還所掠漢民以示善意鈔兵每到南部下鈔楚交翻還過亭候輒謝曰自擊亡虜薁鞬日逐耳薁於六翻鞬居言翻非敢犯漢民也二十七年夏四月戊午大司徒王況薨五月丁丑詔司徒司空並去大名去𦍑吕翻改大司馬為太尉驃騎大將軍行大司馬劉隆即日罷以太僕趙熹為太尉大司農馮勤為司徒北匈奴遣使詣武威求和親自北地以東南部分居塞内北使不敢至塞下故詣武威求和賢曰武威郡故城在今涼州姑臧縣西北故涼城是也帝召公卿廷議不決皇太子言曰南單于新附北虜懼於見伐故傾耳而聽爭欲歸義耳今未能出兵而反交通北虜臣恐南單于將有二心北虜降者且不復來矣復扶又翻下同帝然之告武威太守勿受其使朗陵矦臧宫揚虚矦馬武上書曰朗陵矦國屬汝南郡水經註揚虚縣屬平原漯水逕其東商河發源於此匈奴貪利無有禮信窮則稽首安則侵盜稽音啓虜今人畜疫死旱蝗赤地疲困乏力不當中國一郡萬里死命縣在陛下縣讀曰懸下同福不再來時或易失豈宜固守文徳而墮武事乎左傳曰大福不再蒯通曰時難得而易失易以豉翻墮讀曰隳今命將臨塞厚縣購賞將即亮翻縣讀曰懸喻告髙句驪烏桓鮮卑攻其左句如字又音駒驪力知翻發河西四郡天水隴西𦍑胡擊其右如此北虜之滅不過數年臣恐陛下仁恩不忍謀臣狐疑令萬世刻石之功不立於聖世詔報曰黄石公記曰柔能制剛弱能制彊賢曰黄石公即張良於下邳圯上所見老父出一編書者舎近謀遠者勞而無功舎遠謀近者逸而有終舎讀曰捨故曰務廣地者荒務廣徳者彊有其有者安貪人有者殘殘滅之政雖成必敗今國無善政災變不息百姓驚惶人不自保而復欲遠事邊外乎孔子曰吾恐季孫之憂不在顓臾見論語且北狄尚彊而屯田警備傳聞之事恒多失實恒户登翻誠能舉天下之半以滅大㓂豈非至願茍非其時不如息民自是諸將莫敢復言兵事者上問趙憙以乆長之計憙請遣諸王就國冬上始遣魯王興齊王石就國興縯之次子石章之子縯之嫡孫也是嵗帝舅夀張恭矦樊宏薨夀張縣屬東平國春秋曰良漢曰夀良帝避叔父趙王良諱改曰夀張宏帝舅也謚敬矦曰恭矦温公避國諱也考異曰袁紀宏皆作宻今從范書宏為人謙柔畏慎每當朝㑹輒迎期先到俯伏待事所上便宜朝直遥翻下同上時掌翻手自書寫毁削草本公朝訪逮逮及也不敢衆對宗族染其化未嘗犯灋帝甚重之及病困遺令薄葬一無所用以為棺柩一藏不宜復見復扶又翻如有腐敗傷孝子之心使與夫人同墳異藏古夫婦合葬詩曰榖則異室死則同穴是也同墳異藏自宏始帝善其令以書示百官因曰今不順夀張矦意無以彰其徳且吾萬嵗之後欲以為式二十八年春正月己巳徙魯王興為北海王以魯益東海帝以東海王彊去就有禮謂以天下讓故優以大封食二十九縣賜虎賁旄頭設鍾虡之樂漢官儀曰虎賁千五百人戴鶡尾屬虎賁中郎將旄頭注見前爾雅木謂之虡所以懸鐘磬也説文曰虡飾為猛獸虡音巨擬於乗輿東䋲證翻夏六月丁夘沛太后郭氏薨初馬援兄子壻王磐平阿矦仁之子也王莽敗磐擁富貲為游俠俠戸頰翻有名江淮間後游京師與諸貴戚友善援謂姊子曹訓曰王氏廢姓也子石當屏居自守磐字子石屏必郢翻而反游京師長者賢曰長者謂豪俠者也余謂長者正指諸貴戚耳前所謂長者家兒可以槩推用氣自行多所陵折其敗必也後嵗餘磐坐事死磐子肅復出入王侯邸第復扶又翻時禁㒺尚䟽諸王皆在京師競脩名譽招游士馬援謂司馬呂种曰建武之元名為天下重開种持中翻重直龍翻自今以往海内日當安耳但憂國家諸子並壯而舊防未立若多通賔客則大獄起矣賢曰舊防諸矦王子不許交通賔客卿曹戒慎之至是有上書告肅等受誅之家為諸王賔客慮因事生亂㑹更始之子夀光侯鯉得幸於沛王賢曰夀光縣屬北海郡今青州縣怨劉盆子結客殺故式矦恭帝怒沛王坐繋詔獄三日乃得出因詔郡縣收捕諸王賔客更相牽引更工衡翻死者以千數吕种亦與其禍與讀曰豫臨命嘆曰馬將軍誠神人也秋八月戊寅東海王彊沛王輔楚王英濟南王康淮陽王延始就國濟子禮翻上大㑹羣臣問誰可傅太子者羣臣承望上意皆言太子舅執金吾原鹿矦隂識可原鹿縣屬汝南郡春秋之鹿上也可言可任也􅀶士張佚正色曰今陛下立太子為隂氏乎為天下乎即為隂氏則隂矦可為天下則固宜用天下之賢才為于偽翻帝稱善曰欲置傅者以輔太子也今博士不難正朕況太子乎即拜佚為太子太傅以博士桓榮為少傅賜以輜車乗馬乗䋲證翻榮大㑹諸生陳其車馬印綬曰今日所䝉稽古之力也可不勉哉北匈奴遣使貢馬及裘更乞和親并請音樂又求率西域諸國胡客俱獻見帝下三府議酬荅之宜三府太尉司徒司空府也見賢遍翻下遐稼翻司徒掾班彪曰臣聞孝宣皇帝敕邊守尉曰匈奴大國多變詐交接得其情則却敵折衝應對入其數則反為輕欺數術數也言入其術中也今北單于見南單于來附懼謀其國故數乞和親數所角翻下同又遠驅牛馬與漢合市合市與漢和合為市也重遣名王多所貢獻斯皆外示富彊以相欺誕也臣見其獻益重知其國益虚歸親愈數為懼愈多然今旣未獲助南則亦不宜絶北覊縻之義禮無不答謂可頗加賞賜略與所獻相當報答之辭令必有適賢曰適猶所也言報答之辭必令得所也余謂適當也言報答之辭必有當乎事情也今立稾草并上曰單于不忘漢恩追念先祖舊約謂呼韓邪舊約也上時掌翻欲修和親以輔身安國計議甚髙為單于嘉之為于偽翻往者匈奴數有乖亂呼韓邪郅支自相讎隙並蒙孝宣帝垂恩救䕶故各遣侍子稱藩保塞其後郅支忿戾自絶皇澤而呼韓附親忠孝彌著及漢滅郅支遂保國𫝊嗣子孫相繼事並見前紀今南單于攜衆向南欵塞歸命自以呼韓嫡長次第當立而侵奪失職猜疑相背數請兵將歸埽北庭長知兩翻背蒲妹翻將即亮翻䇿謀紛紜無所不至惟念斯言不可獨聽惟思也又以北單于比年貢獻比毗至翻欲修和親故拒而未許將以成單于忠孝之義漢秉威信總率萬國日月所照皆為臣妾殊俗百蠻義無親踈服順者褒賞畔逆者誅罰善惡之效呼韓郅支是也今單于欲修和親欵誠已達何嫌而欲率西域諸國俱來獻見西域國屬匈奴與屬漢何異單于數連兵亂國内虚耗貢物裁以通禮何必獻馬裘今齎雜繒五百匹弓鞬韥丸一賢曰鞬音居言翻方言曰藏弓為鞬藏箭為韥丸即箭箙也韥與韣同徒谷翻矢四發遺單于遺于季翻又賜獻馬左骨都矦右谷蠡王谷音鹿蠡音黎雜繒各四百匹斬馬劍各一單于前言先帝時所賜呼韓邪竽瑟空矦皆敗竽管三十六簧劉昫曰女媧氏造匏列管於匏上内簧其中爾雅謂之巢大者曰竽小者曰和竽煦也立春之氣煦生萬物也竽管三十六宫管在左和管十三宫管居中今之竽笙並以木代匏而漆之無復八音矣瑟註見前空矦世本云空國矦所造劉昫曰漢武帝使樂人矦調所作以祠太廟或曰矦暉所作其聲坎坎應節謂之坎矦聲訛為箜􅔃或謂師賢靡靡樂非也舊説一依琴制今案其形似瑟而小七絃用撥彈之如琵琶願復裁賜賢曰言更請裁賜也余謂裁量也量多少以賜也復扶又翻念單于國尚未安方厲武節以戰攻為務竽瑟之用不如良弓利劍故未以齎朕不愛小物於單于便宜所欲遣驛以聞帝悉納從之二十九年春二月丁巳朔日有食之三十年春二月車駕東廵羣臣上言即位三十年宜封禪泰山詔曰即位三十年百姓怨氣滿腹吾誰欺欺天乎曾謂泰山不如林放乎論語記孔子之言何事汚七十二代之編錄賢曰莊子曰易姓而王封於泰山禪於梁父者七十有二代其有形兆垠堮勒石凡千八百餘處許慎説文序曰蒼頡之初作書盖依類象形故謂之文其有形聲相益即謂之字字者言孶乳而滋多也著於竹帛謂之書書者如也以迄五帝三王之世改易殊體封於泰山者七十有二代靡有同焉汙烏故翻若郡縣遠遣吏上夀盛稱虛美必髠令屯田於是羣臣不敢復言復扶又翻甲子上幸魯濟南濟子禮翻閏月癸丑還宫有星孛于紫宫孛蒲内翻夏四月戊子徙左翊王焉為中山王五月大水秋七月丁酉上行幸魯冬十一月丁酉還宫膠東剛矦賈復薨謚法能補前過曰剛此直以賈復剛毅而謚之耳考異曰本傳在三十一年今從袁紀復從征伐未嘗䘮敗數與諸將潰圍解急身被十二創䘮息浪翻數所角翻被皮義翻創初良翻帝以復敢深入希令遠征而壯其勇節常自從之常以復自從也故復少方面之勲少詩沼翻諸將每論功伐復未嘗有言帝輒曰賈君之功我自知之三十一年夏五月大水癸酉晦日有食之蝗京兆掾第五倫倫之先齊諸田徙長陵諸田徙園陵者多故以次第為氏掾俞絹翻領長安市公平亷介市無姦枉每讀詔書常嘆息曰此聖主也一見決矣等軰笑之曰爾説將尚不能下賢曰將謂州將説輸芮翻將即亮翻安能動萬乗乎乗䋲證翻倫曰未遇知已道不同故耳後舉孝亷補淮陽王醫工長百官志王國官有禮樂長主樂人衛士長主衛士醫工長主醫藥永巷長主宫中婢使祠祀長主祠祀皆比四百石長知兩翻中元元年洪氏𨽻釋曰城都有漢蜀郡太守何君造尊楗閣碑其末云建武中元二年六月按范史本紀建武止三十一年次年改為中元直書為中元元年觀此所刻乃是雖别為中元猶冠以建武如文景中元後元之類也又祭祀志載封禪後赦天下詔明言云改建武三十二年為建武中元元年東夷倭國傳建武中元二年來奉貢證据甚明宋莒公紀元通譜云紀志俱出范史必傳寫脱誤學者失於精審以意剛去梁武帝大同大通俱有中字是亦憲章於此司馬公作通鑑不取其説余按考異温公非不取宋説也從袁范書中元者從簡易耳春正月淮陽王入朝第五倫隨官屬得㑹見見賢遍翻帝問以政事倫因此酬對帝大悦明日復特召入與語至夕復扶又翻帝謂倫曰聞卿為吏篣婦公篣音彭不過從兄飯寧有之邪過工禾翻從才用翻飯扶晚翻對曰臣三娶妻皆無父少遭飢亂少詩照翻實不敢妄過人食衆人以臣愚蔽故生是語耳帝大笑以倫為扶夷長賢曰扶夷縣屬零陵郡故城在今邵州武岡縣東北水經志夫夷縣在卲陵西未到官追拜㑹稽太守㑹古外翻守式又翻為政清而有惠百姓愛之上讀河圗㑹昌符曰赤劉之九㑹命岱宗風俗通曰岱始也泰山山之尊者一曰岱宗岱始也宗長也萬物之始隂陽交代故為五岳之長上感此文乃詔虎賁中郎將梁松等按察河雒讖文言九世當封禪者凡三十六事讖楚譛翻於是張純等復奏請封禪復扶又翻史記集註曰泰山上築土為壇以祭天報天之功故曰封泰山下小山上除地報地之功故曰禪上乃許焉詔有司求元封故事當用方石再累玉檢金泥元封故事武帝封禪故事也用方石再累置壇中皆方五尺厚一尺用玉牒書藏方石牒厚五寸長尺三寸廣五寸有玉檢又有石檢十枚列於石旁東西各三南北各二皆長五尺廣三尺厚七寸檢中刻三處深四寸方五寸有盖檢用金縷五周以水銀和金以為泥上以石功難就欲因孝武故封石置玉牒其中梁松等爭以為不可乃命石工取完青石無必五色舊制用石盖各依方色也丁卯車駕東廵二月己卯幸魯進幸泰山辛卯晨燎祭天於泰山下南方羣神皆從從從祀也從才用翻用樂如南郊事畢至食時天子御輦登山日中後到山上郭璞註山海經曰泰山從山下至頭四十八里二百歩更衣易服乃即事也更工衡翻晡時升壇北面尚書令奉玉牒檢天子以寸二分璽親封之璽斯氏翻訖太常命騶騎二千餘人騶側尤翻發壇上方石尚書令藏玉牒已復石覆訖覆敷救翻尚書令以五寸印封石檢事畢天子再拜羣臣稱萬嵗乃復道下謂復故道而下山也夜半後上乃到山下百官明旦乃訖甲午禪祭地於梁隂梁父之隂也禪時戰翻以髙后配山川羣神從從從祀也從才用翻如元始中北郊故事三月戊辰司空張純薨夏四月癸酉車駕還宫己卯赦天下改元建考異曰續漢志云以武三十二年為建武中元元年紀年通譜云據紀志俱出范氏而所載不同此必傳寫脱誤今官書累經校定學者失於精審但見紀元復有建武二字輒以意刪去斯為繆矣梁武帝大同大通之號俱有中字是亦憲章於此今從袁紀范書上行幸長安五月乙丑還宫六月辛卯以太僕馮魴為司空魴符方翻乙未司徒馮勤薨京師醴泉湧出爾雅甘雨時降萬物以嘉謂之醴泉又有赤草生於水崖䝨曰曰赤草朱草也也大戴禮曰朱草日生一葉至十五日以後日落一葉週而復始郡國頻上甘露上時掌翻下同羣臣奏言靈物仍降宜令太史撰集以傳來世賢曰太史史官之長也撰雛免翻帝不納帝自謙無徳每郡國所上輒抑而不當故史官罕得記焉秋郡國三蝗冬十月辛未以司𨽻校尉東萊李訢為司徒郡國志東萊郡在雒陽東三千一百二十八里訢許斤翻甲申使司空告祠髙廟上薄太后尊號曰髙皇后配食地祇上時掌翻遷呂太后廟主于園以呂太后幾危劉氏也賢曰園謂塋域也於中置寢四時上祭上時掌翻十一月甲子晦日有食之是嵗起明堂靈臺辟雍賢曰漢官儀明堂去平城門二里所天子出從平城門先厯明堂乃至郊祀又曰辟雍去明堂三百歩車駕臨辟雍從北門入三月九月皆於中行鄉射禮辟雍以水周其外以節觀者漢宫闕䟽曰靈臺髙三丈十二門楊􅃷之雒陽記曰平昌門直南大道東是明堂大道西是靈臺宣布圗䜟於天下初上以赤伏符即帝位見四十巻建武元年由是信用䜟文多以決定嫌疑給事中桓譚上䟽諌曰凡人情忽於見事而貴於異聞見賢遍翻觀先王之所記述咸以仁義正道為本非有竒怪虛誕之事盖天道性命聖人所難言也自子貢以下不得而聞論語子貢曰夫子之言性與天道不可得而聞也況後世淺儒能通之乎今諸巧慧小才伎數之人増益圖書矯稱䜟記伎謂方伎醫方之家也數謂數術明堂羲和史卜之官也圗書即䜟緯符命之類是也伎渠綺翻以欺惑貪邪詿誤人主焉可不抑遠之哉詿古賣翻又戸卦翻焉於䖍翻遠于願翻臣譚伏聞陛下窮折方士黄白之術甚為明矣黄白謂以藥化成金銀也方士有方術之士也而乃欲聽納䜟記又何誤也其事雖有時合譬猶卜數隻偶之類賢曰言偶中也陛下宜垂明聽發聖意屛羣小之曲説屏必郢翻又卑正翻述五經之正義䟽奏帝不悦㑹議靈臺所處處昌呂翻帝謂譚曰吾欲以䜟決之何如譚黙然良乆曰臣不讀䜟帝問其故譚復極言䜟之非經復扶又翻帝大怒曰桓譚非聖無法將下斬之將資良翻持也領也譚叩頭流血良乆乃得解出為六安郡丞賢曰六安郡故城在今夀州安豐縣南余據郡國志建武十六年省六安國以其縣屬廬江郡譚出為郡丞不必在是年通鑑因靈臺事併書於此道病卒范曄論曰桓譚以不善䜟流亡鄭興以遜辭僅免賈逵能傅㑹文致最差貴顯鄭興事見四十二巻七年明帝永平中賈逵上言左氏與圗䜟合明劉氏為堯後帝嘉之厯遷侍中領騎都尉甚見信用傅讀曰附世主以此論學悲哉逵扶風人也南單于比死弟左賢王莫立為丘浮尤鞮單于鞮丁奚翻帝遣使齎璽書拜授璽綬賜以衣冠及繒綵繒慈陵翻是後遂以為常二年春正月辛未初立北郊祀后土二月戊戍帝崩於南宮前殿年六十二帝毎旦視朝日昃乃罷日過中則昃朝直遥翻數引公卿郎將數所角翻講論經理夜分乃寐賢曰分猶半也皇太子見帝勤勞不怠承間諌曰間古莧翻陛下有禹湯之明而失黄老養性之福願頥愛精神優游自寧帝曰我自樂此不為疲也樂音洛雖以征伐濟大業及天下旣定乃退功臣而進文吏明慎政體總攬權綱量時度力量音良度徒洛翻舉無過事故能恢復前烈身致太平太尉趙憙典䘮事時經王莽之亂舊典不存皇太子與諸王雜止同席藩國官屬出入宫省宫省即宫禁也與百僚無别别彼列翻憙正色横劒殿階扶下諸王以明尊卑奏遣謁者將䕶官屬分止他縣諸王並令就邸諸王國各置邸洛陽唯得朝晡入臨臨臨哭也力鴆翻下同整禮儀嚴門衛賈公彦曰漢宫殿門毎門皆使司馬二人守門比千石皆號司馬殿門内外肅然太子即皇帝位尊皇后曰皇太后山陽王荆哭臨不哀而作飛書令蒼頭詐稱大鴻臚郭況書與東海王彊言其無罪被廢被皮義翻及郭后黜辱勸令東歸舉兵以取天下且曰髙祖起亭長陛下興白水謂光武起於南陽舂陵之白水卿也長知兩翻何況於王陛下長子故副主哉故副主謂舊為太子也長知兩翻當為秋霜毋為檻羊賢曰秋霜肅殺於物檻羊受制於人人主崩亡閭閻之伍尚為盜賊欲有所望何況王邪彊得書惶怖怖普故翻即執其使使䟽吏翻封書上之上時掌翻明帝以荆母弟帝及荆皆隂后所生祕其事遣荆出止河南宮宫在河南縣三月丁卯葬光武皇帝於原陵帝王紀曰原陵在臨平亭東南去雒陽十五里水經註光武𦵏臨平亭南西望平隂大河逕其北夏四月丙辰詔曰方今上無天子下無方伯若渉淵水而無舟楫夫萬乗至重而壯者慮輕實賴有徳左右小子帝謙言年尚少壯思慮輕淺故須賢人輔弼賴恃也左右助也左右音佐佑髙宻矦禹元功之首東平王蒼寛博有謀其以禹為太傅蒼為驃騎將軍蒼懇辭帝不許又詔驃騎將軍置長史掾史員四十人位在三公上賢曰四府掾史皆無四十人今特置以優之也驃匹妙翻掾俞絹翻蒼嘗薦西曹掾齊國吳良百官志西曹主府史署用掾秩比四百石帝曰薦賢助國宰相之職也蕭何舉韓信設壇而拜不復考試復扶又翻下同今以良為議郎初燒當𦍑豪滇良擊破先零奪居其地𦍑無弋爰劒𤣥孫研居湟中至豪健𦍑中號其種為研種至研十三世孫燒當復豪健其子孫更以燒當為種號滇良者燒當之𤣥孫也自燒當至滇良世居河北大允谷而先零卑湳並皆強富滇良集諸雜種掩擊先零卑湳大破之奪居大榆中地繇是始強滇音顛零音憐滇良卒子滇吾立附落轉盛秋滇吾與弟滇岸率衆㓂隴西敗太守劉盱於允街敗補邁翻賢曰允音鈆街音皆屬金城郡故城在今涼州昌松縣東南城臨麗水一名麗水城於是守塞諸羌皆叛詔謁者張鴻領諸郡兵撃之戰於允吾賢曰允吾縣名屬金城郡故城在今蘭州廣武縣西南允音鈆吾音牙杜佑曰西平郡龍支縣漢允吾縣地後漢為龍耆縣鴻軍敗沒冬十一月復遣中郎將竇固監捕虜將軍馬武等二將軍四萬人討之監古銜翻是嵗南單于莫死弟汗立為伊伐於慮鞮單于鞮丁奚翻顯宗孝明皇帝上㓜名陽後改名莊伏矦古今註曰莊之字曰嚴諡法照臨四方曰明光武第四子也永平元年春正月帝率公卿已下已下即以下孔頴達曰已與以字本同朝于原陵如元㑹儀朝陵如元㑹儀事死如事生也朝直遥翻乗輿拜神坐乗䋲證翻坐徂卧翻退坐東廂侍衛官皆在神坐後太官上食上時掌翻下同太常奏樂郡國上計吏以次前當神軒占其郡榖價及民所疾苦是後遂以為常夏五月髙宻元矦鄧禹薨諡法行義説民曰元主義行徳曰元此特以鄧禹中興元功而諡之耳後世謚法始有茂徳丕績曰元東海恭王彊病上遣使者太醫乗驛視疾駱驛不絶驛傳逓馬也左傳謂之乗驛者乗驛馬也西漢謂之置傳馳傳駱驛往來不絶也詔沛王輔濟南王康淮陽王延詣魯省疾省悉景翻戊寅彊薨臨終上書謝恩言身旣夭命孤弱復為皇太后陛下憂慮言身既夭死而子孫又貽上之人憂慮也夭於紹翻復扶又翻下同誠悲誠慙息政小人也息子也政其名猥當襲臣後必非所以全利之也願還東海郡今天下新罹大憂謂光武崩也惟陛下加供養皇太后數進御餐供居用翻養羊亮翻數所角翻臣彊困劣言不能盡意願並謝諸王不意永不復相見也帝覽書悲慟從太后出幸津門亭發哀賢曰津門雒陽城南面西頭門也一名津陽門毎門皆有亭李尤銘津門位未使大司空持節䕶䘮事百官志司空掌水土事大䘮掌將校復土今使䕶藩主䘮殊禮也贈送以殊禮詔楚王英趙王栩北海王興及京師親戚皆㑹葬栩況羽翻帝追惟彊深執謙儉惟思也不欲厚𦵏以違其意於是特詔遣送之物務從約省衣足歛形歛力贍翻茅車瓦器物減於制以彰王卓爾獨行之志將作大匠留起陵廟秦曰將作少府景帝改為將作大匠掌修作宗廟路寢宮室陵園土木之工并樹桐梓之類列於道側秋七月馬武等撃燒當𦍑大破之餘皆降散降戸江翻山陽王荆私迎能為星者與謀議冀天下有變帝聞之徙封荆廣陵王遣之國郡國志廣陵在雒陽東一千六百四十里遼東太守祭肜使偏何討赤山偏氏髙辛後急就章有偏呂何烏桓烏桓傳赤山在遼東西北數千里鮮卑傳云偏何撃漁陽赤山烏桓欽志賁盖歆志賁本赤山種而居漁陽塞外也大破之斬其魁帥帥所類翻塞外震讋讋之渉翻西自武威東盡𤣥莵郡國志武威郡在雒陽西三千五百里𤣥莵郡在雒陽東北四千里莵同都翻皆來内附野無風塵乃悉罷緣邊屯兵東平王蒼以為中興三十餘年四方無虞宜修禮樂乃與公卿共議定南北郊冠冕車服制度光武建武二年立南郊中元元年立北郊於雒陽城北四里今定其冠冕車服制度漢官儀曰北郊壇在城西北角去城一里所及光武廟登歌八佾舞數上之記曰歌者在上貴人聲也天子樂舞八佾六十四人八八六十四人也佾音逸舞行列也上時掌翻好畤愍矦耿弇薨畤音止諡法在國遭憂曰愍時國有大䘮故以諡弇言與國同戚也弇古含翻二年春正月辛未宗祀光武皇帝於明堂宗尊也尊而祀之以配上帝帝及公卿列矦始服冠冕玉佩以行事漢官儀曰天子冠通天諸矦王冠遠遊三公諸矦冠進賢三梁卿大夫尚書二千石博士冠兩梁千石以下至小吏冠一梁天子公卿特進諸矦祀天地明堂皆冠平冕天子十二旒三公九卿諸矦七其纓各如其綬色𤣥衣纁裳周禮曰王祀昊天上帝則服大裘而冕祀五帝亦如之三禮圗曰冕以三十升布漆而為之廣八寸長尺六寸前圜後方前下後髙有俛伏之形故謂之冕欲人之位彌髙而志彌下故以名焉董巴輿服志曰顯宗初服冕衣裳以祀天地衣裳以𤣥上纁下乗輿備文日月星辰十二章三公諸侯用山龍九章卿已下用華蟲七章皆五色采乗輿刺繡公卿已下皆織成陳留襄邑獻之徐廣車服注曰漢明帝按古禮備服章天子郊廟衣皁上絳下前三幅後四幅衣畫而裳繡禮記古之君子必佩玉君子於玉比徳焉天子佩白玉公侯佩山𤣥玉大夫佩水蒼玉世子佩瑜玉晉志曰周禮弁師掌六冕司服掌六服自后王至庶人各有等差秦變古制郊祭之服皆以袀𤣥舊法掃地盡矣漢承秦故二百餘年未能有所制立及中興後明帝乃始采周官禮記尚書及諸儒記説備衮冕之服天子車乗冠服從歐陽氏説公卿已下從大小夏矦氏説禮畢登靈臺望雲物春秋左氏傳曰分至啓閉必書雲物杜預註曰雲物氣色灾變也素察妖祥逆為之備前書天文志曰嵗正月旦旦至食為麥食至日昳為稷昳至晡為黍晡至下晡為菽下晡至日入為麻各以其時用雲色占種所宜赦天下三月臨辟雍初行大射禮儀禮曰大射之禮王將祭射宫擇士以助祭也張虎矦熊矦豹矦其制若今之射的也冬十月壬子上幸辟雍初行養老禮以李躬為三老桓榮為五更更工衡翻三老服都紵大袍冠進賢扶玉杖紵直呂翻説文曰紵檾屬績紵以為美布故曰都紵續漢志進賢冠古緇布冠也文儒者之服也前高七寸後髙三寸長八寸公矦三梁中二下石至博士兩梁自博士以下至小吏私學弟子皆一梁又仲春之月縣道皆案户比民民年始七十者授之以玉杖玉杖長九尺端以鳩鳥為飾鳩者不噎之鳥也欲老人不噎爾雅翼曰刻玉為鳩置之杖端謂之鳩杖亦曰玉杖五更亦如之不杖乗輿到辟雍禮殿乗䋲證翻御坐東廂遣使者安車迎三老五更於太學講堂天子迎于門屏交禮道自阼階道讀曰導三老升自賓階至階天子揖如禮三老升東面三公設几九卿正履天子親􅃝割牲執醬而饋饋進食也醬食味之主故執之而饋執爵而酳酳音𦙍又土覲翻祝鯁在前祝饐在後饐一結翻食窒氣不通五更南面三公進供禮亦如之賢曰宋均曰三老老人知天地人之事者五更老人知五行更代事者鄭康成曰三老五更皆年老更事致仕者也天子以父兄養之示天下之孝弟也名以三五者取象三辰五星天所以照明天下者都布布名進賢冠古緇布冠也文儒者之服前髙七寸後髙三寸長八寸禮殿先聖先師也阼階東階主階也賔階西階也賢曰醬醢也酳嗽也所以潔口也陸徳明曰以酒曰酳以水曰漱音義隠云飯畢盪口也音𦙍老人食多鯁饐故置人於前後祝之令其不鯁饐也都布之美者也進賢冠古緇布冠也玉杖長七尺端以鳩鳥為飾鳩者不噎之鳥也欲老人不噎更工衡翻禮畢引桓榮及弟子升堂上自為下説賢曰下説謂下語而講説也諸儒執經問難於前難乃旦翻冠帶縉紳之人圜橋門而觀聽者葢億萬計漢官儀曰辟雍四門外有水以節觀者門外皆有橋觀者在水外故云圜橋門也圜繞也於是下詔賜榮爵關内侯李考異曰帝紀載詔文上言躬而下獨封榮似脱躬字榮傳袁紀詔獨言桓榮不及李躬今闕疑三老五更皆以二千石祿養終厥身賜天下三老酒人一石肉四十斤上自為太子受尚書於桓榮及即帝位猶尊榮以師禮嘗幸太常府令榮坐東面設几杖㑹百官及榮門生數百人門生受業於門者也上親自執業執業猶執經也諸生或避位發難發難發疑難也難乃旦翻上謙曰大師在是旣罷悉以太官供具賜太常家榮每疾病帝輒遣使者存問太官太醫相望於道及篤上疏謝恩讓還爵土帝幸其家問起居入街下車擁經而前撫榮垂涕賜以牀茵帷帳刀劒衣被良乆乃去自是諸矦將軍大夫問疾者不敢復乗車到門復扶又翻皆拜牀下榮卒帝親自變服臨䘮送葬賜冢塋于首山之陽賢曰首陽山在今偃師縣西北子郁當嗣讓其兄子汎帝不許郁乃受封而悉以租入與之帝以郁為侍中上以中山王焉郭太后少子太后尤愛之故獨留京師至是始與諸王俱就國賜以虎賁官騎賢曰漢官儀騶騎王家名官騎余據焉傳時賜以北軍胡騎百人便兵善射騶側尤翻恩寵尤厚獨得往來京師帝禮待隂郭毎事必均數受賞賜數所角翻下同恩寵俱渥甲子上行幸長安十一月甲申遣使者以中牢祠蕭何霍光帝過式其墓進幸河東癸卯還宮十二月䕶𦍑校尉竇林坐欺㒺及臧罪下獄死時𦍑滇吾叛滇岸來降林奏以滇岸為大豪後滇吾復降林又奏其為第一豪帝怪其一種兩豪以詰林窮驗知之怒而免林官涼州刺史又奏林臧罪遂下獄死下遐稼翻林者融之從兄子也從才用翻於是竇氏一公兩矦三公主四二千石相與並時賢曰一公大司空也兩侯安豐顯親也四二千石衛尉城門校尉䕶𦍑校尉中郎將也余據融傳融子穆尚内黄公主穆子勲尚東海王彊女沘陽公主友子固尚光武女温陽公主自祖及孫官府邸第相望京邑於親戚功臣中莫與為比及林誅帝數下詔切責融融惶恐乞骸骨詔令歸第養病是嵗初迎氣於五郊續漢書曰迎氣五郊之兆四方之兆各依其位中央之兆在未壇皆三尺立春之日迎春於東郊祭青帝句芒車服皆青歌青陽八佾舞雲翹之舞立夏之日迎夏於南郊祭赤帝祝融車服皆赤歌朱明舞如迎春先立秋十八日迎黄靈於中兆祭黄帝后土車服皆黄歌朱明八佾舞雲翹育命之舞立秋之日迎秋於西郊祭白帝蓐收車服皆白歌白藏八佾舞育命之舞立冬之日迎冬於北郊祭黒帝𤣥𠖇車服皆黒歌𤣥㝠舞如迎秋新陽矦隂就子豐尚酈邑公主公主驕妬豐殺之被誅父母皆自殺公主光武女賢曰酈縣屬南陽郡酈音櫟南單于汗死單于比之子適立為䤈僮尸逐矦鞮單于賢曰䤈火奚翻三年春二月甲寅太尉趙憙司徒李訢免丙辰以左馮翊郭丹為司徒己未以南陽太守虞延為太尉甲子立貴人馬氏為皇后皇子炟為太子賢曰炟音丁達翻后援之女也光武時以選入太子宫能奉承隂后傍接同列禮則脩備上下安之遂見寵異及帝即位為貴人時后前母姊女賈氏亦以選入生皇子炟帝以后無子命養之謂曰人未必當自生子但患愛養不至耳后於是盡心撫育勞悴過於所生悴秦醉翻太子亦孝性淳篤母子慈愛始終無纎介之間賢曰纎介猶細㣲也間隙也間古莧翻后常以皇嗣未廣薦達左右若恐不及後宫有進見者每加慰納若數所寵引見賢遍翻數所角翻下同輙加隆遇及有司奏立長秋宫皇后宫謂之長秋宫帝未有所言皇太后曰馬貴人徳冠後宫冠古玩翻即其人也后旣正位宫闈愈自謙肅好讀書常衣大練賢曰大練大帛也杜預註左傳曰大帛厚繒也好呼到翻衣於旣翻裙不加緣緣俞絹翻朔望諸姬主朝請朝直遥翻望見后袍衣踈麄以為綺縠就視乃笑后曰此繒特宜染色故用之耳羣臣奏事有難平者平決也難平難決者也帝數以試后后輒分解趣理各得其情然未嘗以家私干政事帝由是寵敬始終無衰焉帝思中興功臣乃圗􅀞二十八將於南宫雲臺以鄧禹為首次馬成吳漢王梁賈復陳俊耿弇杜茂冦恂傅俊岑彭堅鐔馮異王霸朱祐任光祭遵李忠景丹萬修葢延邳肜銚期劉植耿純臧宫馬武劉隆又益以王常李通竇融卓茂合三十二人雲臺功臣之次以鄧禹吳漢賈復耿弇冦恂岑彭馮異朱祐祭遵景丹盖延銚期耿純臧宫馬武劉隆為一列馬成王梁陳俊杜茂傅俊堅鐔王霸任光李忠萬修邳肜劉植王常李通竇融卓茂為一列此序其次不與前史合鐔音覃又音尋祭則介翻盖古盍翻銚音姚馬援以椒房之親獨不與焉與讀曰預夏四月辛酉封皇子建為千乗王羡為廣平王郡國志髙帝以西平昌置千乗郡在雒陽東千五百三十里地理志武帝征和元年置為平于國宣帝五鳯二年復為廣平國郡國志光武建武十三年省廣平國以其縣屬鉅鹿郡賢曰廣平縣故城在今洛州永年縣北千乗今青州縣故城在今淄州髙苑縣北乗䋲證翻六月丁卯有星孛於天船北晉天文志大陵八星在胃北又北九星曰天船一曰舟星所以濟不通也天漢西南行絡大陵天船巻舌而南行孛蒲内翻帝大起北宫時天旱尚書僕射㑹稽鍾離意㑹古外翻詣闕免冠上䟽曰昔成湯遭旱以六事自責曰政不節邪使民疾邪宫室營邪營范書作榮女謁盛邪苞苴行邪讒夫昌邪帝王記曰成湯大旱七年齋戒剪髪斷爪以己為犧牲禱於桑林之社以六事自責竊見北宫大作民失農時自古非苦宫室小狹但患民不安寧宜且罷止以應天心帝䇿詔報曰湯引六事咎在一人其冠履勿謝策詔者書詔於䇿也又勑大匠止作諸宫減省不急詔因謝公卿百僚遂應時澍雨説文曰雨所以澍注萬物故曰澍音注意薦全椒長劉平全椒縣屬九江郡賢曰今滁州縣詔徴拜議郎平在全椒政有恩惠民或増貲就賦或減年從役刺史太守行部行戸孟翻獄無繋囚人自以得所不知所問唯班詔書而去帝性褊察好以耳目隠發為明賢曰隠猶私也余謂隠者人耳目之所不及帝好以耳目窺其隠而發之好呼到翻公卿大臣數被詆毁數所角翻下同近臣尚書以下至見提曵提讀如冐絮提文帝之提音大計翻擲物以撃之也曵讀曰拽音奚結翻拖也引也一説提曵讀皆如字常以事怒郎藥崧藥姓崧名以杖撞之撞直江翻崧走入牀下帝怒甚疾言曰郎出崧乃曰天子穆穆諸矦皇皇記曲禮之文鄭曰皆行容止之貌也賢曰穆穆美也皇皇盛也未聞人君自起撞郎帝乃赦之是時朝廷莫不悚慄爭為嚴切以避誅責唯鍾離意獨敢諌爭爭讀曰諍數封還詔書臣下過失輙救解之㑹連有變異上䟽曰陛下敬畏鬼神憂恤黎元而天氣未和寒暑違節者咎在羣臣不能宣化治職治直之翻而以苛刻為俗百官無相親之心吏民無雍雍之志爾雅曰雍雍和也至於感逆和氣以致天災百姓可以徳勝難以力服鹿鳴之詩必言宴樂者鹿鳴詩小雅宴羣臣也其詩曰呦呦鹿鳴食野之草我有嘉賔鼔瑟吹笙又曰我有㫖酒以宴樂嘉賔之心樂音洛以人神之心洽然後天氣和也願陛下垂聖徳緩刑罰順時氣以調隂陽帝雖不能時用然知其至誠終愛厚之秋八月戊辰詔改太樂官曰太予用讖文也賢曰尚書璇璣鈴曰有帝漢出徳洽作樂名予故據璇璣鈴改之漢官儀曰太予樂令一人秩六百石蔡邕禮樂志曰漢樂四品一曰太予樂典郊廟上陵殿諸食舉之樂一曰周頌雅樂典辟雍饗射六宗社稷之樂三曰黄門鼔吹天子所以宴樂羣臣四曰短簫鐃歌軍樂也壬申晦日有食之詔曰昔楚莊無灾以致戒懼説苑曰楚莊王見天不見妖而地不出孽則曰天其忘予歟此能求過於天必不逆諌矣魯哀禍大天不降譴春秋感精符曰魯哀公時政彌亂絶不日食政亂之類當致日食之變而不應者譴之何益告之不悟故哀公之篇絶無日食之異今之動變儻尚可救有司勉思厥職以匡無徳冬十月甲子車駕從皇太后幸章陵光武建武六年改舂陵鄉為章陵縣荆州刺史郭賀官有殊政荆州統南陽南郡江夏零陵桂陽武陵長沙等郡上賜以三公之服黼黻冕旒東漢之制冕冠垂旒前後邃延三公諸矦之旒青玉為珠敕行部去襜帷爾雅曰襜帷蔽前襜帷者車之前帷也孔穎達曰幨帷山東謂之裳或曰潼容泯之詩曰淇水湯湯漸車帷裳注帷裳潼容也其上有盖翻四方旁垂而下謂之襜行下孟翻去𦍑呂翻襜蚩占使百姓見其容服以章有徳戊辰還自章陵是嵗京師及郡國七大水莎車王賢以兵威逼奪于寘大宛媯塞王國媯塞國塞種臨媯水而居者因以為國名莎素禾翻寘徒賢翻宛於元翻媯居為翻塞悉則翻使其將守之于寘人殺其將君徳立大人休莫霸為王賢率諸國兵數萬擊之大為休莫霸所敗脱身走還休莫霸進圍莎車中流矢死敗蒲邁翻中竹仲翻于寘人復立其兄子廣徳為王廣徳使其弟仁攻賢廣徳父先拘在莎車賢乃歸其父以女妻之復扶又翻妻七細翻與之和親為廣徳殺賢張本資治通鑑巻四十四
