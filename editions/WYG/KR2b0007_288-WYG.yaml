body:
  text: 資治通鑑卷二百八十八宋司馬光撰胡三省音註後漢紀三起著雍涒灘三月盡屠維作噩凡一年有竒髙祖睿文聖武昭肅孝皇帝下乾祐元年三月丙辰史𢎞肇起復加兼侍中矦益家富於財厚賂執政及史𢎞肇等由是大臣爭譽之執政謂蘓逢吉楊邠等皆當時大臣也譽音余丙寅以益兼中書令行開封尹行者行尹事未正除也改廣晉為大名府左傳晉卜偃曰魏大名也取以名府晉昌軍為永興軍以革晉命故改廣晉與晉昌矦益盛毁王景崇於朝言其恣横矦益以王景崇欲殺已幸免而歸朝故毁之横户孟翻景崇聞益尹開封知事已變内不自安且怨朝廷怨朝廷不能體先帝遺㫖反聴矦益之䜛也㑹詔遣供奉官王益如鳯翔徴趙匡賛牙兵詣闕趙思綰等甚懼趙思綰趙匡賛牙校也見上卷景崇因以言激之思綰途中謂其黨常彦卿曰小太尉已落其手趙思綰等本趙延夀部曲故呼匡賛為小太尉言匡賛入朝為已落漢人之手也吾屬至京師并死矣奈何彦卿曰臨幾制變子勿復言復扶又翻癸酉至長安永興節度副使安友規巡檢喬守温出迎王益置酒於客亭諸州鎮皆有客亭以為迎送宴餞之所思綰前白曰壕寨使已定舎館於城東壕寨使掌營造浚築及次舍下寨今將士家屬皆在城中趙思綰部兵先從趙匡賛鎮長安故家屬在城中欲各入城挈家詣城東宿友規等然之時思綰等皆無鎧仗既入西門有州校坐門側思綰遽奪其劒斬之其徒因大譟持白梃校户教翻梃徒鼎翻殺守門者十餘人分遣其黨守諸門思綰入府開庫取鎧仗給之友規等皆逃去思綰遂據城集城中少年得四千餘人繕城隍葺樓堞旬日間戰守之具皆僃少詩照翻葺七入翻堞達恊翻王景崇諷鳯翔吏民表景崇知軍府事朝廷患之甲戌徙靜難節度使王守恩為永興節度使欲以制趙思綰難乃旦翻徙保義節度使趙暉為鳯翔節度使欲以制王景崇並同平章事以景崇為邠州留後令便道之官虢州伶人靖邊庭殺團練使田令方驅掠州民奔趙思綰靖姓也優伶之名與姓通取一義所以為謔也何氏姓苑曰靖姓齊靖郭君之後風俗通曰靖姓單靖公之後也至潼關虢州西北至潼關百有餘里潼關守將出擊之其衆皆潰初契丹主北歸至定州契丹主徳光北歸死于殺胡林此謂卾約北歸至定州也以義武節度副使耶律忠為節度使徙故節度使孫方簡為大同節度使晉齊王開運三年契丹主徳光以孫方簡為義武節度使實考異曰實録方簡作方諌按方簡避周諱改名方諌録誤也方簡怨恚且懼入朝為契丹所留遷延不受命恚於避翻朝直遥翻帥其黨三千人保狼山故寨孫方簡兄弟保狼山見二百八十五卷晉開運三年帥讀曰率下同控守要害契丹攻之不克未幾遣使請降幾居豈翻帝復其舊官以扞契丹復以為義武節度使邪律忠聞鄴都既平去年十一月杜重威降鄴都平事見上卷常懼華人為變詔以成徳留後劉在明為幽州道馬步都部署使出兵經略定州未行忠與滿達勒焚掠定州悉驅其人弃城北去定州東至鎮州止隔祁州耳契丹聞鎮州將出兵故弃城而去孫方簡自狼山帥其衆數百還據定州又奏以弟行友為易州刺史方遇為泰州刺史毎契丹入寇兄弟奔命奔命者奔走以救急也契丹頗畏之於是晉末州縣䧟契丹者皆復為漢有矣丙子以劉在明為成徳節度滿達勒至其國契丹主責失守滿達勒不服曰因朝廷徵漢官致亂耳謂徵馮道等也事見上卷上年契丹主鴆殺之蘇逢吉等為相多遷補官吏楊邠以為虚費國用所奏多抑之逢吉等不悦中書侍郎兼户部尚書同平章事李濤上疏言今關西紛擾外禦為急上時掌翻二樞密皆佐命功臣官雖貴而家未富宜授以要害大鎮李濤之疏承蘓逢吉之意也二樞密謂楊邠郭威樞機之務在陛下目前易以裁決易以䜴翻逢吉禹珪自先帝時任事皆可委也楊邠郭威聞之見太后泣訴稱臣等從先帝起艱難中今天子聴人言欲弃之於外况關西方有事謂岐雍舉兵反臣等何忍自取安逸不顧社稷若臣等必不任職乞留過山陵太后怒以讓帝曰國家勲舊之臣奈何聴人言而逐之帝曰此宰相所言也因詰責宰相詰去吉翻濤曰此疏臣獨為之它人無預丁丑罷濤政事勒歸私第為將相交惡張本是日邠涇同華四鎮邠帥王守恩涇帥史匡威同帥張彦威華帥扈從珂華户化翻俱上言䕶國節度使兼中書令李守貞與永興鳯翔同反趙思綰據永興王景崇據鳯翔始守貞聞杜重威死而懼杜重威死見上卷是年正月隂有異志自以晉世嘗為上將有戰功李守貞破契丹于馬家口而克青州又破契丹於陽城其功不細素好施得士卒心好呼到翻施式豉翻漢室新造天子年少初立少詩照翻執政皆後進有輕朝廷之志乃招納亡命養死士治城塹繕甲兵晝夜不息遣人間道齎蠟丸結契丹屢為邉吏所獲治直之翻間古莧翻浚儀人趙修已素善術數舊唐書地理志浚儀故縣隋置在今縣北三十里唐武徳四年移縣于州北羅城内貞觀元年移於州西一里後治郭下自守貞鎮滑州署司户參軍累從移鎮晉開運初李守貞鎮義成後徙鎮泰寜天平歸徳至是鎮䕶國為亂為守貞言時命不可勿妄動為于偽翻前後切諌非一守貞不聴乃稱疾歸鄉里僧摠倫以術媚守貞言其必為天子守貞信之又嘗㑹將佐置酒引弓指䑛掌虎圖曰吾有非常之福當中其舌一發中之䑛直氏翻中竹仲翻左右皆賀守貞益自負㑹趙思綰據長安奉表獻御衣於守貞守貞自謂天人恊契乃自稱秦王遣其驍將平陸王繼勲據潼關舊唐書地理志陜州平陸縣隋之河北縣也唐天寳三載陜郡太守李齊物開三門石下得㦸大刃有平陸篆字因改為平陸縣九域志平陸縣在陜州北五里以思綰為晉昌節度使同州距河中最近河中府西至同州六十里耳匡國節度使張彦威録考異曰周太祖實作彦成葢避周祖諱薛史因之今從廣本常詗守貞所為詗古永翻又翾正翻奏請先為之備詔滑州馬軍都指揮使羅金山將部兵戍同州故守貞起兵同州不為所併金山雲州人也定難節度使李彛殷發兵屯境上奏稱去三載前難乃旦翻去已往也羌族㖡母龍龕手鏡㖡音夜母讀如謨殺綏州刺史李仁裕叛去請討之慶州上言請益兵為備以備羌也詔以司天言今歲不利先舉兵諭止之夏四月辛巳陜州都監王玉奏克復潼關監古衘翻帝與左右謀以太后怒李濤離間間古莧翻欲更進用二樞密以明非帝意左右亦疾二蘓之專欲奪其權共勸之二樞密楊邠郭威二蘓逄吉禹珪壬午制以樞密使楊邠為中書侍郎兼吏部尚書同平章事樞密使郭威為樞密使又加三司使王章同平章事凡中書除官諸司奏事帝皆委邠斟酌自是三相拱手三相竇貞固蘇逢吉蘇禹珪政事盡決於邠事有未更邠所可否者更工衡翻經也莫敢施行遂成凝滯三相每進擬用人茍不出邠意雖簿尉亦不之與邠素不喜書生喜許記翻常言國家府廪實甲兵彊乃為急務至於文章禮樂何足介意既恨二蘇排已以其使李濤上疏請出二樞密為外鎮也又以其除官太濫為衆所非欲矯其弊由是艱於除拜士大夫往往有自漢興至亡不霑一命者此所謂士大夫指言内外在官之人命言漢朝之命凡門䕃及百司入仕者悉罷之門䕃謂任子也百司入仕所謂流外也雖由邠之愚蔽時人亦咎二蘇之不公所致云以鎮寧節度使郭從義充永興行營都部署將侍衞兵討趙思綰戊子以保義節度使白文珂為河中行營都部署内客省使王峻為都監辛卯削奪李守貞官爵命文珂等㑹兵討之乙未以寧江節度使侍衞步軍都指揮使尚洪遷為西面行營都虞侯寧江軍䕫州時屬蜀境尚洪遷遥領也王景崇遷延不之邠州閲集鳯翔丁壯詐言討趙思綰仍牒邠州㑹兵王景崇欲并岐邠之兵以舉事契丹主如遼陽漢遼東郡有遼陽縣大梁水與遼水㑹處也契丹于此置遼陽府歐史自黄龍府西北行一千三百里至遼陽府按遼陽府契丹之東京舊勃海地距燕京二千五百一十里故晉主與太后皇后皆謁見見賢遍翻有齊納爾者契丹主之妻兄也聞晉主有女未嫁詣晉主求之晉主辭以㓜後數日契丹主使人馳取其女而去與齊納爾王景崇遺蜀鳯州刺史徐彦書求通互市遺唯季翻壬戌蜀主使彦復書招之契丹主留晉翰林學士徐台符於幽州徐台符從契丹主北去見上卷上年台符逃歸五月乙亥滑州言河決魚池魚池地名河決之後謂之魚池口六月戊寅朔日有食之辛巳以奉國左廂都虞侯劉詞充河中行營馬步都虞侯乙酉王景崇遣使請降于蜀亦受李守貞官爵髙從誨既與漢絶見上卷天福十二年北方商旅不至境内貧乏乃遣使上表謝罪乞修職貢詔遣使慰撫之西面行營都虞侯尚洪遷攻長安傷重而卒卒子恤翻秋七月以工部侍郎李榖充西南面行營都轉運使為李榖見親任于周朝張本庚申加樞密使郭威同平章事蜀司空兼中書侍郎同平章事張業性豪侈强市人田宅以威力臨人人畏其威力不得已而就與為市是為强市藏匿亡命於私第置獄繫負債者或歴年至有瘐死者蘓林曰瘐病也囚徒病律名為瘐如淳曰律囚以飢寒死曰瘐音勇主翻其子檢校左僕射繼昭好擊劒好呼到翻嘗與僧歸信訪善劒者右匡聖都指揮使孫漢韶與業有隙密告業繼昭謀反翰林承㫖李昊奉聖控鶴馬步都指揮使安思謙復從而譛之復扶又翻甲子業入朝蜀主命壯士就都堂擊殺之下詔暴其罪惡籍没其家樞密使保寧節度使兼侍中王處回亦專權貪縱王處回以節兼侍中不在閬州賣官鬻獄四方饋獻皆先輸處回次及内府此所謂四方止以蜀之境上言之家貲巨萬子徳鈞亦驕横横户孟翻張業既死蜀主不忍殺處回聴歸私第處回惶恐辭位以為武徳節度使兼中書令王處回亦不得至梓州蜀主欲以普豐庫使髙延昭茶酒庫使王昭逺為樞密使普豐茶酒二庫使皆蜀所置以其名位素輕乃授通奏使知樞密院事通奏使亦蜀所置昭逺成都人㓜以僧童從其師入府蜀髙祖愛其敏慧令給事蜀主左右至是委以機務府庫金帛恣其取與不復㑹計復扶又翻㑹古外翻至于宋興蜀主遂以用王昭逺亡國戊辰以郭從義為永興節度使白文珂兼知河中行府事時郭從義討長安就以永興節授之白文珂討河中因使之知行府事蜀主以翰林承㫖尚書左丞李昊為門下侍郎兼户部尚書翰林學士兵部侍郎徐光溥為中書侍郎兼禮部尚書並同平章事蜀安思謙謀盡去舊將去羌吕翻又譛衞聖都指揮使兼中書令趙廷隱謀反欲代其位夜發兵圍其第㑹山南西道節度使李廷珪入朝極言廷隱無罪乃得免廷隱因稱疾固請解軍職甲戍蜀主許之史言蜀主以新間舊鳯翔節度使趙暉至長安乙亥表王景崇反狀益明請進兵擊之初髙祖鎮河東皇弟崇為馬步都指揮使與蕃漢都孔目官郭威爭權有隙及威執政崇憂之節度判官鄭珙勸崇為自全計崇從之珙青州人也珙居竦翻八月庚辰崇表募兵四指揮自是選募勇士招納亡命繕甲兵實府庫罷上供財賦皆以備契丹為名朝廷詔令多不稟承於是之時劉崇則為跋扈然郭威既立天下為周河東非素有備殆不能守也自河中永興鳯翔三鎮拒命以來朝廷繼遣諸將討之昭義節度使常思屯潼關白文珂屯同州趙暉屯咸陽常思白文珂不敢逼河中趙暉不敢逼鳯翔惟郭從義王峻置柵近長安而二人相惡如水火近其靳翻惡如字又烏路翻自春徂秋皆相仗莫肯攻戰帝患之欲遣重臣臨督壬午以郭威為西面軍前招慰安撫使章考異曰薛史周大祖記七月十三日授同平事即遣西征以安慰招撫為名八月六日發離京師按漢隱帝周太祖實録七月加平章事制詞無西征之言至八月壬午方受命出征葢薛史之誤諸軍皆受威節度威將行問䇿於太師馮道道曰守貞自謂舊将為士卒所附願公勿愛官物以賜士卒則奪其所恃矣威從之郭威以卒伍之雄而問䇿於馮道之老腐者觀其所以荅與威所以從則人之材識不合乎道者則有之若其量勢應物未可妄議由是衆心始附於威為郭威得天下張本詔白文珂趣河中趙暉趣鳯翔趣七喻翻甲申蜀主以趙廷隱為太傅賜爵宋王國有大事就第問之戊子蜀改鳯翔曰岐陽軍以鳯翔之地在岐山之陽也己丑以王景崇為岐陽節度使同平章事乙未以錢𢎞俶為東南兵馬都元帥鎮海鎮東節度使兼中書令吳越國王郭威與諸將議攻討諸將欲先取長安鳯翔鎮國節度使扈從珂曰今三叛連衡推守貞為主守貞亡則兩鎮自破矣若捨近而攻逺萬一王趙拒吾前守貞掎吾後掎居蟻翻此危道也威善之於是威自陜州白文珂及寧江節度使侍衞步軍都指揮使劉詞自同州常思自潼關三道攻河中九域志陜州北至河中二百三十七里同州東至河中六十里潼關度河至河中一百餘里陜失冉翻威撫養士卒與同苦樂小有功輒賞之微有傷常親視之士無賢不肖有所陳啟皆温辭色而受之違忤不怒小過不責樂音洛忤五故翻由是將卒咸歸心於威始李守貞以禁軍皆嘗在麾下受其恩施施式䜴翻下好施同又士卒素驕苦漢法之嚴謂其至則叩城奉迎可以坐而待之李守貞習見鳯翔太原之事以楊思權期漢兵耳既而士卒新受賜於郭威皆忘守貞舊恩己亥至城下揚旗伐鼓踊躍詬譟詬古侯翻又許侯翻守貞視之失色白文珂克西關城柵於河西河中西關城在河西所以䕶蒲津浮梁者也常思柵於城南威柵於城西常思郭威葢近城立柵未幾威以常思無将領才先遣歸鎮幾居豈翻將即亮翻下同遣常思歸潞州史言郭威能審人之能否諸將欲急攻城威曰守貞前朝宿将健鬭好施施式䜴翻屢立戰功况城臨大河樓堞完固未易輕也易以䜴翻且彼馮城而鬭馮讀曰慿吾仰而攻之何異帥士卒投湯火乎帥讀曰率夫勇有盛衰攻有緩急時有可否事有後先不若且設長圍而守之使飛走路絶吾洗兵牧馬坐食轉輸輸舂遇翻温飽有餘俟城中無食公帑家財皆竭帑它郎翻然後進梯衝以逼之飛羽檄以招之彼之將士脱身逃死父子且不相保况烏合之衆乎思綰景崇但分兵縻之不足慮也縻忙皮翻繫也史言郭威方畧亦因周之史官潤色已成之文乃發諸州民夫二萬餘人使白文珂等帥之刳長壕築連城列隊伍而圍之威又謂諸將曰守貞曏畏髙祖不敢鴟張曏謂昔時也鴟張言如鴟之張翼欲髙舉逺飛也以我輩崛起太原事功未著有輕我心故敢反耳正宜靜以制之乃偃旗卧鼓但循河設火鋪連延數十里畨步卒以守之遣水軍檥舟於岸冦有潜往來者無不擒之於是守貞如坐網中矣鋪普故翻檥魚倚翻畨步卒者使步卒分畨迭守張敬達之圍晉陽郭威之圍河中皆欲以持久制之然敬達以敗郭威以勝者晉陽有援而河中無援也司馬仲達急攻孟達而緩攻公孫淵亦以有援無援而為緩急耳蜀武徳節度使兼中書令王處回請老辛丑以太子太傅致仕南漢主中國既國號曰漢故嶺南之漢書南漢以别之遣知制誥宣化鍾允章宣化漢領方縣地晉置晉興郡隋廢郡置宣化縣及晉興縣唐以宣化為邕州治所晉興亦屬邕州求昏於楚楚王希廣不許南漢主怒問允章馬公復能經畧南土乎復扶又翻對曰馬氏兄弟方爭亡於不暇安能害我南漢主曰然希廣懦而吝嗇其士卒忘戰日久此乃吾進取之秋也為南漢舉兵攻楚張本武平節度使馬希萼請與楚王希廣各修職貢求朝廷别加官爵欲使潭朗如二國然希廣用天䇿府内都押牙歐𢎞練進奏官張仲荀謀厚賂執政使拒其請九月壬子賜希萼及楚王希廣詔書諭以兄弟宜相輯睦凡希萼所貢當附希廣以聞希萼不從蜀兵援王景崇軍于散關趙暉遣都監李彦從襲擊破之監考異曰實録戊辰郭諱上言都李彦從將兵掩襲州賊至大散關殺賊三千餘其餘弃甲而遁漢隱帝實録九月李彦從敗蜀兵于散關而蜀後主實録無之蜀實録十月安思謙敗漢兵於時家竹林遂焚蕩寳雞十二月又敗漢兵于玉女潭而漢實録無之葢兩國各舉其勝而諱其敗耳然漢實録言官軍不滿萬人而蜀兵數倍是二三萬人非小役也豈得全不書殺三千人非小敗也豈十月遽能再舉葢九月止是蜀邊將小出兵為漢所敗漢将因張大而奏之耳又蜀實録十月但云思謙退次鳯州不云歸興元十二月云思謙自興元進次鳯州葢十月脱畧耳蜀兵遁去蜀主以張業王處回執政事多壅蔽己未始置匭函匭居洧翻後改為獻納函王景崇盡殺矦益家屬七十餘人怨矦益之毁已於朝也益子前天平行軍司馬仁矩先在外得免庚申以仁矩為隰州刺史仁矩子延廣尚在襁褓乳母劉氏以己子易之凡擇乳母必取新生子者許之攜子故得以易抱延廣而逃乞食至于大梁歸子益家李守貞屢出兵欲突長圍皆敗而返遣人齎蠟丸求救于唐蜀契丹皆為邏者所獲邏郎佐翻城中食且盡殍死者日衆殍被表翻守貞憂形於色召摠倫詰之摠倫媚守貞見上三月詰去吉翻摠倫曰大王當為天子人不能奪但此分野有災分扶問翻待磨滅將盡只餘一人一騎乃大王鵲起之時也荘子曰鵲上髙城乗危而巢於髙枝之巔城壞巢折凌風而起故君子之居世也得時則義行失時則鵲起守貞猶以為然冬十月王景崇遣其子徳讓趙思綰遣其子懐乂見蜀主于成都戊寅景崇遣兵出西門趙暉擊破之遂取西關城景崇退守大城塹而圍之數挑戰不出數所角翻挑徒了翻暉潜遣千餘人擐甲執兵擐音宦効蜀旗幟循南山而下幟昌志翻令諸軍聲言蜀兵至矣景崇果遣兵數千出迎之暉設伏掩擊盡殪之殪壹計翻自是景崇不復敢出復扶又翻蜀主遣山南西道節度使安思謙將兵救鳯翔左僕射兼門下侍郎同平章事母昭裔上疏諫曰臣竊見莊宗皇帝志貪西顧前蜀主意欲北行志貪西顧言後唐莊宗利蜀之富而伐之也前蜀主謂王衍意欲北行言其鋭意幸秦州也事並見荘宗紀上時掌翻凡在庭臣皆貢諫疏殊無聴納有何所成只此兩朝可為鑒誡不聴又遣雄武節度使韓保貞引兵出汧陽以分漢兵之勢汧陽縣屬隴州九域志在州東六十七里汧苦堅翻王景崇遣前義成節度使酸棗李彦舜等逆蜀兵酸棗古縣唐屬汴州九域志在州東北九十里丙申安思謙屯右界右界葢寳雞西界漢蜀分彊處也漢兵屯寳雞思謙遣眉州刺史申貴將兵二千趣模壁趣七喻翻設伏於竹林丁酉旦貴以兵數百壓寳雞而陳陳讀曰陣漢兵逐之遇伏而敗蜀兵逐北破寳雞寨蜀兵去漢兵復入寳雞復扶又翻己亥思謙進屯渭水渭水過寳雞縣北漢益兵五千戍寳雞思謙畏之謂衆曰糧少敵强宜更為後圖辛丑退屯鳯州尋歸興元興元安思謙本鎮也貴潞州人也荆南節度使南平文獻王髙從誨寢疾以其子節度副使保融判内外兵馬事癸卯從誨卒年五十八保融知留後保融從誨第三子史不言其得立之因彰武節度使髙允權與定難節度使李彞殷有隙延州北至夏州三百八十里二鎮接境違言易生難乃旦翻李守貞密求援於彞殷發兵屯延丹境上聞官軍圍河中乃退甲辰允權以狀聞彞殷亦自訴朝廷和解之初髙祖入大梁太師馮道太子太傅李崧皆在真定事見上卷天福十二年髙祖以道第賜蘇禹珪崧第賜蘓逢吉崧第中瘞藏之物及洛陽别業瘞於計翻别置田園於它所謂之别業亦謂之莊逢吉盡有之及崧歸朝自以形迹孤危石晉之時漢髙祖夙有憾于李崧即位後崧始歸朝故内懼事漢權臣常惕惕謙謹多稱疾杜門而二弟嶼㠖嶼以與翻㠖宜﨑翻與逢吉子弟俱為朝士時乗酒出怨言云奪我居第家貲逢吉由是惡之未幾惡烏路翻幾居豈翻崧以兩京宅劵獻於逢吉逢吉愈不悦翰林學士陶榖先為崧所引用復從而譛之復扶又翻漢法既嚴而侍衞都指揮使史𢎞肇尤殘忍寵任孔目官解暉解户買翻姓也鄭樵姓氏畧曰自唐叔虞食邑于解今解縣也至春秋之時晉有解狐解揚凡入軍獄者使之隨意鍛錬無不自誣及三叛連兵三叛謂李守貞王景崇趙思綰羣情震動民間或訛言相驚駭𢎞肇掌部禁兵廵邏京城部者部分之也邏郎佐翻得罪人不問輕重於法何如皆専殺不請或決口斮筋折脛無虚日雖姦盜屛跡而寃死者甚衆莫敢辯訴斷音短斮側畧翻拆而設翻脛戸定翻屏卑郢翻又卑正翻李嶼僕夫葛延遇為嶼販鬻多所欺匿嶼抶之抶丑栗翻督其負甚急延遇與蘓逢吉之僕李澄謀上變告嶼謀反孔子有言治家者不敢失於臣妾而况居昏暴之朝乎上時掌翻逢吉聞而誘致之誘音酉因召崧至第收送侍衞獄侍衞獄即侍衛司獄所謂軍獄也嶼自誣云與兄崧弟㠖甥王凝及家僮合二十人謀因山陵發引引羊晉翻縱火焚京城作亂又遣人以蠟書入河中城結李守貞又遣人召契丹兵及具獄上上時掌翻逢吉取筆改二十為五十字十一月甲寅下詔誅崧兄弟家屬及辭所連及者皆陳尸於市蘓逢吉取李崧之家貲又從而夷其家曽未朞年逢吉亦身死而家破天道不逺人猶冒貨而不顧可哀也哉仍厚賞葛延遇等時人無不寃之自是士民家皆畏憚僕𨽻往往為所脅制它日祕書郎真定李昉詣陶榖昉甫兩翻榖曰君於李侍中近逺昉曰族叔父榖曰李氏之禍榖有力焉昉聞之汗出榖邠州人也本姓唐避晉髙祖諱改焉姓譜姓苑皆謂陶姓唐姓並出陶唐氏之後唐榖之改姓陶据此也史𢎞肇尤惡文士惡烏路翻常曰此屬輕人難耐每謂吾輩為卒此事亦誠有之但以此而例惡文士則過矣𢎞肇領歸徳節度使委親吏楊乙收屬府公利乙依勢驕横史𢎞肇領宋州節而掌侍衞留京師使節度副使治府事副使其屬也故謂之屬府公利言公取所當得者横户孟翻合境畏之如𢎞肇副使以下望風展敬乙皆下視之月率錢萬緡以輸𢎞肇士民不勝其苦史言史𢎞肇所謂公利其實皆虐民而取之輸舂遇翻勝音升初沈丘人舒元沈丘古寢丘也唐神龍二年改曰沈丘屬潁州九域志在州西一百一十里沈式荏翻嵩山道士楊訥俱以遊客干李守貞守貞為漢所攻遣元更姓朱訥更姓李名平間道奉表求救於唐朱元遂留為南唐用間古莧翻唐諌議大夫查文徽查鉏加翻兵部侍郎魏岑請出兵應之唐主命北面行營招討使李金全將兵救河中以清淮節度使劉彦貞副之唐置清淮軍于夀州文徽為監軍使岑為㳂淮巡檢使軍于沂州之境金全與諸將方㑹食􅇋騎白有漢兵數百在澗北皆羸弱羸倫為翻請掩之金全令曰敢言過澗者斬過音戈及暮伏兵四起金鼓聞十餘里聞音問金全曰曏可與之戰乎時唐士卒厭兵莫有鬭志又河中道逺勢不相及丙寅唐兵退保海州是時沂州屬漢海州屬唐九域志沂州之界東南至海州一百里唐主遺帝書謝請復通商旅與中國絶和故商旅不通今遺書謝前過請復通商旅遺唯季翻復扶又翻且請赦守貞朝廷不報壬申葬睿文聖武昭肅孝皇帝于睿陵睿陵在河南府告成縣廟號髙祖十二月丁丑以髙保融為荆南節度使同平章事辛巳南漢主以内常侍吳懐恩為開府儀同三司西北面招討使將兵擊楚攻賀州楚王希廣遣決勝指揮使徐知新等將兵五千救之未至南漢人已拔賀州鑿大穽於城外覆以竹箔加上以竹箔覆穽而加土於竹箔之上穽才性翻覆敷又翻箔白各翻下施機軸自塹中穿宂通穽中知新等至引兵攻城南漢遣人自穴中發機楚兵悉陷南漢出兵從而擊之楚兵死者以千數知新等遁歸希廣斬之南漢兵復陷昭州復扶又翻九域志賀州西至昭州三百餘里王景崇累表告急于蜀蜀主命安思謙再出兵救之壬午思謙自興元引兵屯鳯州請先運糧四十萬斛乃可出境蜀主曰觀思謙之意安肻為朕進取為于偽翻然亦發興州興元米數萬斛以饋之戊子思謙進屯散關遣馬步使髙彦儔眉州刺史申貴擊漢箭筈安都寨破之筈音括箭筈嶺名有箭筈關庚寅思謙敗漢兵於玉女潭敗補邁翻漢兵退屯寳雞思謙進屯模壁韓保貞出新關新關在隴州汧源縣西唐大中六年隴州防禦使薛逵徙築謂之安戎關汧隴之人謂大震為故關安戎為新關九域志隴州汧源縣有新關鎮壬辰軍于隴州神前漢兵不出保貞亦不敢進趙暉告急于郭威威自往赴之時李守貞遣副使周光遜禆將王繼勲聶知遇守城西聶尼輙翻姓也姓苑楚大夫食采於聶因以為氏威戒白文珂劉詞曰賊茍不能突圍終為我禽萬一得出則吾不得復留於此成敗之機於是乎在賊之驍鋭盡在城西我去必来突圍爾曹謹備之威至華州聞蜀兵食盡引去軍考異曰十國紀年蜀廣政十二年正月甲寅思謙以食匱竭自模壁退次鳯州上表待罪葢去年冬末已退軍明年正月表始到成都耳今從周太祖實錄模壁一作模壁威乃還還從宣翻韓保貞聞安思謙去亦退保弓川寨九域志秦州東一百六十五里有弓門寨蜀中書侍郎兼禮部尚書同平章事徐光溥坐以豔辭挑前蜀安康長公主桃徒了翻長知兩翻丁酉罷守本官隱皇帝上諱承祐髙祖第二子也乾祐二年春正月乙巳朔大赦郭威將至河中自華州還也白文珂出迎之戊申夜李守貞遣王繼勲等引精兵千餘人循河而南襲漢柵坎岸而登遂入之此漢兵柵於河西者也王繼勲知漢兵據河之西以臨河東守備必厚故循河而南坎岸而上以攻之縱火大譟軍中狼狽不知所為劉詞神色自若下令曰小盜不足驚也帥衆擊之帥讀曰率客省使閻晉卿曰梁有客省使副宋因之掌四方進奉及四夷朝貢牧伯朝覲賜酒饌甕餼宰相近臣禁軍將校節級諸州進奉使賜物回詔之事賊甲皆黄紙為火所照易辨耳易以䜴翻柰衆無鬬志何禆將李韜曰安有無事食君禄有急不死鬬者邪援矟先進援于元翻矟音槊衆從之河中兵退走死者七百人繼勲重傷僅以身免己酉郭威至劉詞迎馬首請罪威厚賞之曰吾所憂正在於此微兄健鬬微無也幾為虜嗤用漢光武語幾居依翻嗤丑之翻然虜伎殫於此矣伎渠綺翻晉卿忻州人也守貞之欲攻河西柵也先遣人出酤酒於村墅或貫與不責其直邏騎多醉酤音沽墅承與翻貫始制翻邏郎佐翻由是河中兵得潜行入寨幾至不守郭威乃下令將士非犒宴毋得私飲犒苦到翻愛將李審晨飲少酒少酒言所飲不多也少詩沼翻威怒曰汝為吾帳下首違軍令何以齊衆立斬以徇甲寅蜀安思謙退屯鳯州上表待罪蜀主釋不問軍行逗撓者必誅釋而不問為失刑詔以靜州𨽻定難軍唐置静邉州都督於銀州界以處党項降者難乃旦翻二月辛未李彛殷上表謝彛殷以中原多故有輕傲之志每藩鎮有叛者常隂助之邀其重賂朝廷知其事亦以恩澤羈縻之史言拓拔據銀夏漸以驁桀遂成宋朝繼遷之叛淮北羣盜多請命於唐唐主遣神衞都虞侯皇甫暉等將兵萬人出海泗以招納之皇甫暉即與趙在禮作亂以成後唐莊宗之禍者也奔南唐見二百八十六卷髙祖天福十二年海泗二州名蒙城鎮將咸師朗等降於暉䝉城隋之山桑縣唐天寳元年更名䝉城屬亳州九域志在州南一百六十里徐州將成徳欽敗唐兵於峒峿鎮峒達貢翻又嵸董翻峿五乎翻俘斬六百級暉等引歸晉李太后詣契丹主請依漢人城寨之側給田以耕桑自贍契丹主許之并晉主遷於建州歐史曰自遼陽府東南行千二百里至建州今按建州在遼陽之西北其南則義州其北則土河土河之北則契丹之中京大定府大定府南至燕京一千一百五十里北至上京臨潢府七百里金人疆域圖建州南至燕京一千二百四十五里遼陽府治遼陽縣至燕京二千二百一十里薛史曰自遼陽行十數日過儀州霸州至建州陳元靚曰大元建州領建平永霸二縣屬大定府路未至安太妃卒於路遺令必焚我骨南向颺之颺余章翻庶幾魂魄歸達于漢白虎通曰魂者沄也沄沄行不休也魄者迫也迫迫然著於人也既至建州得田五十餘頃晉主令從者耕其中以給食從才用翻頃之舒嚕王遣騎取晉主寵姬趙氏聶氏而去舒嚕王者契丹主徳光之子也三月己未以歸徳牙内指揮使史徳珫領忠州刺史珫昌中翻忠州時屬蜀徳珫𢎞肇之子也頗讀書常不樂父之所為樂音洛有舉人呼譟於貢院門蘓逢吉命執送侍衛司欲其痛箠而黥之呼火故翻箠止橤翻貢院門禮部貢院門也五季自梁以來雖皆右武之時而諸州取解禮部試進士未嘗廢唐明宗天成二年勑新及第進士有聞喜宴今後逐年賜錢四百貫其進士試詩賦文䇿帖經對義葢朝廷猶重科舉之士故史徳珫雖將家子亦愛䕶士流徳珫言於父曰書生無禮自有臺府治之非軍務也此乃公卿欲彰大人之過耳謂蘓逄吉知史𢎞肇不喜書假手以逞若堕其術是自彰已過治直之翻𢎞肇大然之即破械遣之楚將徐進敗蠻於風陽山斬首五千級敗補邁翻夏五月壬午太白晝見見賢遍翻民有仰視之者為邏卒所執邏郎佐翻史𢎞肇腰斬之河中城中食且盡民餓死者什五六癸卯李守貞出兵五千餘人齎梯橋分五道以攻長圍之西北隅郭威遣都監吳䖍裕引兵横擊之河中兵敗走殺傷大半奪其攻具五月丙午守貞復出兵又敗之復扶又翻擒其將魏延朗鄭賔壬子周光遜王繼勲聶知遇帥其衆千餘人來降周光遜王繼勲李守貞之驍将也帥讀曰率守貞將士降者相繼威乗其離散庚申督諸軍百道攻之此司馬文王取諸葛誕之故智趙思綰好食人肝嘗面剖而膾之好呼到翻按禮記内則聶而細切之者為膾盜跖膾人肝而餔之荘子寓言耳豈知後世真有趙思綰者乎膾盡人猶未死又好以酒吞人膽謂人曰吞此千枚則膽無敵矣及長安城中食盡取婦女㓜稚為軍糧椎直利翻日計數而給之毎犒軍輒屠數百人如羊豕法思綰計窮不知所出郭從義使人誘之初思綰少時犒苦到翻誘音酉少詩照翻求為左驍衞上將軍致仕李肅僕肅不納曰是人目亂而語誕誕徒旱翻大言謂之誕它日必為叛臣肅妻張氏全義之女也張全義鎮洛著功名于梁唐之間曰君今拒之後且為患乃厚以金帛遺之遺唯季翻及思綰據長安肅閒居在城中思綰數就見之拜伏如故禮天福十二年趙在禮自長安朝契丹其禆將留長安者作亂李肅討誅之是其威望必重趙思綰又懐其疇昔之惠故雖竊據其見肅也猶如奴事主之禮數所角翻肅曰是子亟來且汙我欲自殺亟去吏翻汚烏故翻妻曰曷若勸之歸國史言李肅之妻有智㑹思綰問自全之計肅乃與判官程讓能説思綰曰説式芮翻公本與國家無嫌但懼罪耳今國家三道用兵俱未有功三道用兵謂郭威攻河中趙暉攻鳯翔郭從義攻思綰也若以此時翻然改圖朝廷必喜自可不失富貴孰與坐而待斃乎思綰從之遣使詣闕請降乙丑以思綰為華州留後以為鎮國軍留後都指揮使常彦卿為虢州刺史令便道之官不使入朝所以安其反側之心吳越内牙都指揮使鈄淊胡進思之黨也吳考異曰越備史十國紀年鈄姓皆金旁斗按何氏姓苑元和姓纂皆無此姓今按字書鈄音他口徒口二切皆云姓也余又按廣韻云鈄姓出姓苑也或告其謀叛辭連丞相𢎞億吳越王𢎞俶不欲窮治貶滔於處州治直之翻六月癸酉朔日有食之秋七月甲辰趙思綰釋甲出城受詔郭從義以兵守其南門復遣還城復扶又翻還從宣翻又如字思綰求其牙兵及鎧仗從義亦給之思綰遷延收斂財賄三改行期從義等疑之密白郭威請圖之威許之壬子從義與都監南院宣徽使王峻當作宣徽南院使按轡入城處于府舍處昌吕翻召思綰酌别因執之并常彦卿及其父兄部曲三百人皆斬於市甲寅郭威攻河中克其外郭李守貞收餘衆退保子城諸將請急攻之威曰夫鳥窮則啄况一軍乎涸水取魚安用急為壬戌李守貞與妻及子崇勲等自焚威入城獲其子崇玉等及所署丞相靖􅀈孫愿樞密使劉苪國師總倫等送大梁磔於市靖姓也􅀈其名􅀈同都翻與嵞同説文禹㑹諸侯於塗山之塗作嵞磔音竹格翻徵趙修已為翰林天文以趙修己數諌李守貞也盛唐有天文博士天文生皆屬司天監其待詔於翰林院者曰翰林天文威閲守貞文書得朝廷權臣乃藩鎮與守貞交通書詞意悖逆欲奏之悖蒲妹翻又蒲沒翻祕書郎榆次王溥諫曰魑魅乗夜爭出見日自消魑丑知翻魅明祕翻魑魅野鬼山精之屬願一切焚之以安反側威從之王漙之進用於周由此言也郭威西征于外則得李榖王溥於内則得范質此豈一時倔彊武人之所能及哉三叛既平是時鳯翔猶未平也因帝驕縱而槩言之帝浸驕縱與左右狎暱暱尼質翻飛龍使瑕丘後匡賛後讀如字姓也鄭樵氏族畧云後姓望出東海開封有此姓茶酒使太原郭允明以謟媚得幸帝好與之為廋辭醜語廋辭隱語也好呼到翻廋所鳩翻太后屢戒之帝不以為意癸亥太常卿張昭上言宜親近儒臣講習經訓不聴近其靳翻昭即昭逺避髙祖諱改之戊辰加永興節度使郭從義同平章事徙鎮國節度使扈從珂為䕶國節度使以河中行營馬步都虞侯劉詞為鎮國節度使唐主復進用魏岑魏岑以罪黜見二百八十六卷髙祖天福十二年唐主之保大五年也吏部郎中㑹稽鍾謨尚書員外郎李徳明始以辯慧得幸參預國政㑹古外翻二人皆恃恩輕躁雖不與岑為黨而國人皆惡之户部員外郎范沖敏性狷介惡烏路翻狷吉掾翻乃教天威都虞侯王建封上書歴詆用事者請進用正人唐主謂建封武臣典兵不當干預國政大怒流建封於池州未至殺之沖敏弃市唐主聞河中破以朱元為駕部員外郎待詔文理院李平為尚書員外郎李守貞遣朱元李平至唐見去年十一月文理院南唐所置尚書員外郎無曹局葢於二十四司郎員外置也吳越王𢎞俶以丞相𢎞億判明州以鈄淊事出𢎞億西京留守同平章事王守恩性貪鄙專事聚斂斂力贍翻䘮車非輸錢不得出城下至抒厠行乞之人不免課率抒叙吕翻抒厠取人家虎子寫去穢惡渫水洗之者也或縱麾下令盜人財有富室娶婦守恩與俳優數人往為賔客得銀數鋌而返賔一作賀鋌徒鼎翻八月甲申郭威自河中還過洛陽守恩自恃位兼將相留守節度使同平章事所謂位兼将相也肩輿出迎威怒以為慢已辭以浴不見即以頭子命保義節度使同平章事白文珂代守恩為留守沈括曰後唐莊宗復樞密使郭崇韜安重誨相繼為之始分領政事不關由中書直行下者謂之宣如中書之勅小事則發頭子擬堂帖也文珂不敢違守恩猶坐客次客次猶今言客位也坐于客次以俟見吏白新留守已視事於府矣守恩大驚狼狽而歸見家屬數百已逐出府在通衢矣朝廷不之問以文珂兼侍中充西京留守歐陽修論曰自古亂亡之國必先壊其法制壊音怪而後亂從之此勢之然也五代之際是已文珂守恩皆漢大臣而周太祖以一樞密使頭子而易置之如更戍卒更工衡翻是時太祖未有無君之志而所為如此者葢習為常事故文珂不敢違守恩不敢拒太祖既處之不疑處昌吕翻而漢廷君臣亦置而不問豈非綱紀壊亂之極而至於此歟余按唐閔帝之初朱𢎞昭馮贇以樞密院宣易置諸鎮以致潞王之亂雖成敗不同而樞密權重則有自來矣是以善為天下慮者不敢忽於微而常杜其漸也可不戒哉守恩至大梁恐獲罪廣為貢獻重賂權貴朝廷亦以守恩首舉潞州歸漢事見二百八十六卷天福十二年故宥之但誅其用事者數人而已馬希萼悉調朗州丁壯為鄉兵調徒釣翻造號靜江軍造號言創立軍號也作戰艦七百艘艦户黯翻艘蘓遭翻將攻潭州其妻苑氏諫曰姓苑商武丁子子文受封於苑因以為氏左傳齊有大夫苑何忌趙明城金石録有漢荆州從事苑鎮碑曰其先出苑柏何為晉樂正世掌朝禮之制又有苑子園寔能掌隂陽之理按姓氏志皆云苑氏出苑何忌之後今此碑所謂苑柏何與子園左傳國語皆無其人故録之以傳知者兄弟相攻勝負皆為人笑不聴引兵趣長沙趣七喻翻馬希廣聞之曰朗州吾兄也不可與爭當以國讓之而已劉彦瑫李𢎞臯固爭以為不可乃以岳州刺史王贇為都部署戰棹指揮使以彦瑫監其軍己丑大破希萼於僕射洲獲其戰艦三百艘贇追希萼將及之希廣遣使召之曰勿傷吾兄贇引兵還贇環之子也還從宣翻又如字王環馬氏之良将也希萼自赤沙湖乗輕舟遁歸赤沙湖在洞庭湖西與洞庭湖通水經注云澧水與赤沙湖水㑹湖水北通江而南注澧苑氏泣曰禍將至矣余不忍見也赴井而死戊戌郭威至大梁入見帝勞之見賢遍翻勞力到翻賜金帛衣服玉帶鞍馬辭曰臣受命期年去年七月命郭威西征至是踰朞矣期讀曰朞僅克一城何功之有且臣將兵在外凡鎮安京師供億所須使兵食不乏皆諸大臣居中者之力也臣安敢獨膺此賜請徧賞之又議加方鎮辭曰楊邠位在臣上未有茅王時楊邠為樞密使位在郭威上未嘗領節鎮且帷幄之臣不可以𢎞肇為比郭威自言職居近密乃帷幄之臣史𢎞肇掌侍衞兵所以領節不可以為比九月壬寅徧賜宰相樞密宣徽三司侍衞使九人與威如一時宰相三人竇貞固蘓逢吉蘓禹珪樞密使楊邠宣徽使王峻吳䖍裕三司使王章侍衞使史𢎞肇凡八人餘一人則未之知也或者併郭威為九人歟帝欲特賞威辭曰運籌建畫出於廟堂發兵饋糧資於藩鎮暴露戰鬭在於將士而功獨歸臣臣何以堪之乙巳加威兼侍中史𢎞肇兼中書令辛亥加竇貞固司徒蘇逢吉司空蘇禹珪左僕射楊邠右僕射諸大臣議以朝廷執政溥加恩恐藩鎮觖望觖窺瑞翻又古宂翻怨望也乙卯加天雄節度使髙行周守太師山南東道節度使安審琦守太傅泰寧節度使符彦卿守太保河東節度使劉崇兼中書令己未加忠武節度使劉信天平節度使慕容彦超平盧節度使劉銖並兼侍中辛酉加朔方節度使馮暉定難節度使李彞殷難乃旦翻兼中書令冬十月壬申加義武節度使孫方簡武寧節度使劉贇同平章事壬午加吳越王𢎞俶尚書令楚王希廣太尉丙戌加荆南節度使髙保融兼侍中議者以為郭威不專有其功推以分人推吐雷翻又如字信為美矣而國家爵位以一人立功而覃及天下覃徒含翻布也廣也不亦濫乎吳越王𢎞俶募民能墾荒田者勿收其税由是境内無弃田或請糾民遺丁以増賦遺丁謂民年已成丁而户籍遺漏未嘗當賦役者仍自掌其事𢎞俶杖之國門國人皆悦楚靜江節度使馬希瞻以兄希萼希廣交爭屢遣使諌止不從知終覆族疽發于背丁亥卒契丹㓂河北所過殺掠節度使刺史各嬰城自守遊騎至貝州及鄴都之北境按九域志貝州之南三十里即鄴都北界帝憂之己丑遣樞密使郭威督諸將禦之以宣徽使王峻監其軍為王峻佐郭威舉兵向闕張本十一月契丹聞漢兵渡河乃引去辛亥郭威軍至鄴都令王峻分軍趣鎮定趣七喻翻戊午威至邢州唐兵度淮攻正陽九域志潁州潁上縣有正陽鎮臨淮津十二月潁州將白福進擊敗之敗補邁翻楊邠為政苛細初邢州人周璨為諸衞将軍罷秩無依從王景崇西征景崇叛遂為之謀主邠奏諸前資官喜揺動藩臣前資官謂官資皆前朝所授者也喜許記翻宜悉遣詣京師既而四方雲集日遮宰相馬求官辛卯邠復奏前資官宜分居兩京以俟有闕而補之漂泊失所者甚衆復扶又翻邠又奏行道往來者皆給過所盛唐之制天下關二十六度關者從司門郎中給過所猶漢時度關用傳也宋白曰古書之帛為繻刻木為契二物通謂過所也既而官司填咽民情大擾乃止趙暉急攻鳯翔周璨謂王景崇曰公曏與蒲雍相表裏蒲謂李守貞雍謂趙思綰雍於用翻今二鎮已平蜀兒不足恃王景崇求援於蜀而蜀兵不至故言不足恃不如降也景崇曰善吾更思之後數日外攻轉急景崇謂其黨曰事窮矣吾欲為急計乃謂其將公孫輦張思練曰趙暉精兵多在城北來日五鼓前爾二人燒城東門詐降勿令㓂入吾與周璨以牙兵出北門突暉軍縱無成而死猶勝束手皆曰善癸巳未明輦思練燒東門請降府牙火亦發二將遣人詗之詗古永翻又翾正翻景崇已與家人自焚矣璨亦降丁酉密州刺史王萬敢擊唐海州荻水鎮殘之金人疆域圖荻水鎮在海州贑榆縣是月南漢主如英州南漢以唐廣州湞陽縣之地置英州九域志廣州北至英州四百二十里是歲唐泉州刺史留從効兄南州副使從願酖刺史董思安而代之晉齊王開運二年唐改漳州為南州以董思安為刺史唐之保大三年也事見二百八十四卷唐主不能制置清源軍於泉州以從効為節度使資治通鑑卷二百八十八
