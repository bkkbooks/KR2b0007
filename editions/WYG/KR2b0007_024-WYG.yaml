  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷二十四宋司馬光撰胡三省音註漢紀十六起强圉協洽盡昭陽赤奮若凡七年孝昭皇帝下元平元年春二月詔減口賦錢什三如淳曰漢儀注民年七歲至十四出口賦錢人二十三二十錢以食天子其三錢者武帝加口錢以補車騎馬夏四月癸未帝崩于未央宫臣瓉曰夀二十三無嗣時武帝子獨有廣陵王胥大將軍光與羣臣議所立咸持廣陵王王本以行失道先帝所不用光内不自安郎有上書言周太王廢太伯立王季文王舍伯邑考立武王師古曰太伯者王季之兄伯邑考文王長子也舍讀曰捨唯在所宜雖廢長立少可也長知兩翻少時照翻廣陵王不可以承宗廟言合光意光以其書示丞相敞等擢郎為九江太守九江郡屬揚州唐濠夀廬滁和州地守式又翻即日承皇后詔遣行大鴻臚事少府樂成宗正徳光禄大夫吉中郎將利漢樂成史樂成徳劉徳吉丙吉利漢不知其姓迎昌邑王賀乗七乗傳文帝之入立也乗六乗傳今乘七乘傳傳張戀翻詣長安邸諸王國皆置邸長安此謂長安之昌邑邸也光又白皇后徙右將軍安世為車騎將軍賀昌邑哀王之子也哀王名髆武帝子也在國素狂縱動作無節武帝之䘮賀游獵不止甞游方與方與縣本屬山陽郡武帝以山陽為昌邑王國方與縣屬焉方音房與音豫不半日馳二百里中尉琅邪王吉上疏諌曰大王不好書術而樂逸游好呼到翻樂五孝翻馮式撙衘馮讀曰慿臣瓉曰撙促也師古曰撙挫也音子本翻馳騁不止口倦虖叱咤師古曰咤亦吒字也音竹駕翻手苦於箠轡師古曰箠馬䇿身勞虖車輿朝則冒霧露師古曰冒莫北翻犯也晝則被塵埃被皮義翻夏則為大暑之所㬥炙暴歩木翻冬則為風寒之所匽薄師古曰匽與偃同言遇疾風則偃靡也薄言廹也數以耎脆之玊軆師古曰耎柔也音而兖翻脆音此芮翻犯勤勞之煩毒非所以全夀命之宗也又非所以進仁義之隆也師古曰宗尊也隆髙也夫廣厦之下細旃之上師古曰廣厦大屋也旃與氈同明師居前勸誦在後上論唐虞之際下及殷周之盛考仁聖之風習治國之道治直之翻訢訢焉發憤忘食訢與欣同日新厥徳其樂豈衘橛之間哉樂音洛下同休則俛仰屈伸以利形師古曰形形體也俛音免進退歩趨以實下如淳曰今人不行則膝以下虛弱不實吸新吐故以練臧師古曰藏五藏也練練其氣也臧古藏字通音徂浪翻専意積精以適神師古曰適和也於以養生豈不長哉大王誠留意如此則心有堯舜之志體有喬松之夀師古曰仙人伯喬及赤松子也美聲廣譽登而上聞則福禄其臻師古曰臻至也而社稷安矣皇帝仁聖至今思慕未怠師古曰皇帝謂昭帝也言武帝晏駕未久故尚思慕於宫館囿池弋獵之樂未有所幸大王宜夙夜念此以承聖意諸侯骨肉莫親大王大王於屬則子也於位則臣也一身而二任之責加焉恩愛行義􅏽介有不具者行下孟翻下同孅與纎同息亷翻於以上聞非饗國之福也王乃下令曰寡人造行不能無惰中尉甚忠數輔吾過數所角翻使謁者千秋賜中尉牛肉五百斤酒五石脯五束孔穎達曰脯訓始始作即成也修訓治治之乃成鄭注腊人云薄析曰脯棰而施薑桂曰鍜修其後復放縱自若郎中令山陽龔遂忠厚剛毅有大節龔姓也左傳晉有大夫龔堅内諫爭於王外責傅相引經義陳禍福至于涕泣蹇蹇亡已爭讀曰諍相息亮翻亡古無字通師古曰蹇蹇不阿順之意易曰王臣蹇蹇面刺王過王至掩耳起走曰郎中令善媿人師古曰媿古愧字也媿辱也王甞久與騶奴宰人遊戲飲食騶導車而撝訶者也宰人掌膳食者也騶側鳩翻賞賜無度遂入見王涕泣䣛行左右侍御皆出涕王曰郎中令何為哭遂曰臣痛社稷危也願賜清閒竭愚王辟左右師古曰閒讀曰閑辟音闢遂曰大王知膠西王所以為無道亡乎膠西王謂于王端也王曰不知也曰臣聞膠西王有諛臣矦得王所為儗于桀紂也儗與擬同師古曰儗比也得以為堯舜也王說其謟䛕常與寑處說讀曰恱處昌吕翻唯得所言以至于是師古曰唯用得之邪言故至亡今大王親近羣小近其靳翻漸漬邪惡漸子亷翻漬疾智翻所習存亡之機不可不慎也臣請選郎通經有行義者與王起居坐則誦詩書立則習禮容宜有益王許之遂乃選郎中張安等十人侍王居數日王皆逐去安等去𦍑吕翻下同王嘗見大白犬頸以下似人冠方山冠而無尾方山冠以五采縠為之前髙七寸後髙三寸長八寸樂舞人服之冠方之冠古玩翻置考異曰昌邑王傳云無頭五行志云無尾且云不得後之象若頸以下似人而無頭何以辨其為犬且安所施冠盖傳誤也以問龔遂遂曰此天戒言在側者盡冠狗也言王左右之人皆狗而冠也去之則存不去則亡矣後又聞人聲曰熊視而見大熊左右莫見以問遂遂曰熊山野之獸而來入宫室王獨見之此天戒大王恐宫室將空危亡象也王仰天而嘆曰不祥何為數來遂叩頭曰臣不敢隠忠數言危亡之戒大王不說夫國之存亡豈在臣言哉願王内自揆度數所角翻下同說讀曰悅度徒洛翻大王誦詩三百五篇人事浹浹即恊翻洽也徹也王道備王之所行中詩一篇何等也中竹仲翻師古曰言王所行皆不合法度王自謂當于何詩之文也大王位為諸侯王行汙於庶人行下孟翻師古曰汙濁穢以存難以亡易易以豉翻宜深察之後又血汙王坐席王問遂遂呌然號汙烏故翻號戸髙翻曰宫空不久妖祥數至血者隂憂象也宜畏慎自省省悉景翻王終不改節及徴書至夜漏未盡一刻以火發書其日中王發晡時至定陶定陶縣為濟隂郡治所行百三十五里侍從者馬死相望於道從才用翻王吉奏書戒王曰臣聞髙宗諒闇三年不言闇讀與隂同今大王以䘮事徴宜日夜哭泣悲哀而已慎毋有所發師古曰發謂興舉衆事大將軍仁愛勇智忠信之徳天下莫不聞事孝武皇帝二十餘年未嘗有過先帝棄羣臣屬以天下屬之欲翻寄㓜孤焉大將軍抱持㓜君襁緥之中襁負兒衣論語曰襁負其子博物志曰織縷為之廣八寸長二尺以約小兒於背上李竒曰絡也以繒布為之絡負小兒孟康曰小兒綳師古曰孟說是緥小兒衣李竒曰緥小兒大籍又齊人名小兒被為緥繦舉兩翻緥博抱翻布政施教海内晏然雖周公伊尹無以加也今帝崩無嗣大將軍惟思可以奉宗廟者攀援而立大王師古曰援引也音爰其仁厚豈有量哉臣願大王事之敬之政事壹聽之大王垂拱南面而已願留意常以為念王至濟陽班志濟陽縣屬陳留郡杜佑曰濟陽縣故城在曹州莬旬縣西南濟子禮翻求長鳴雞師古曰雞之鳴聲長者也范成大曰長鳴雞自南詔諸蠻來形矮而大鳴聲圓長一鳴半刻終日啼號不絶蠻甚貴之一雞直銀一兩邕州谿洞亦有之道買積竹杖文頴曰合竹作杖也過𢎞農使大奴善以衣車載女子師古曰凡言大奴者謂奴之尤長大者也善其名也至湖使者以讓相安樂師古曰使者長安使人也讓責也安樂史逸其姓相息亮翻樂音洛安樂告龔遂遂入問王王曰無有遂曰即無有何愛一善以毁行義請收屬吏以湔洒大王師古曰以善付吏也湔澣也洒濯也行下孟翻屬之欲翻下同湔子顚翻洒先禮翻即捽善屬衛士長行法師古曰衛士長主衛之官捽持頭也音才兀翻長知兩翻王到覇上大鴻臚郊迎臚陵如翻騶奉乗輿車王使夀成御夀成人名昌邑太僕也乗䋲證翻下同郎中令遂參乗且至廣明東都門遂曰禮犇䘮望見國都哭此長安東郭門也廣明注見上卷元鳳元年三輔黄圖宣平門長安城東出北頭第一門其外郭名東都門王曰我嗌痛不能哭師古曰嗌喉咽也音益至城門遂復言復扶又翻王曰城門與郭門等耳且至未央宫東闕遂曰昌邑帳在是闕外馳道北文穎曰吊哭帳也未至帳所有南北行道馬足未至數歩大王宜下車郷闕西面伏哭盡哀止郷讀曰嚮王曰諾到哭如儀六月丙寅王受皇帝璽綬襲尊號璽斯氏翻綬音受尊皇后曰皇太后壬申葬孝昭皇帝于平陵平陵屬右扶風在長安西北七十里自崩至葬十日昌邑王既立滛戲無度昌邑官屬皆徴至長安徃徃超擢拜官相安樂遷長樂衛尉龔遂見安樂流涕謂曰王立為天子日益驕溢諌之不復聽今哀痛未盡師古曰謂新居䘮服日與近臣飲酒作樂鬬虎豹召皮軒車九旒漢大駕法駕前驅有雲䍐九斿皮軒鸞旗薛綜曰雲䍐旌旗名胡廣曰皮軒以虎皮為軒郭璞曰皮軒革車即曲禮前有士師則載虎皮師古曰皮軒之上以赤皮為重葢今此制尚存非用虎皮飾車驅馳東西所為誖道孔穎逹曰走馬謂之馳䇿馬謂之驅誖蒲内翻師古曰乖也古制寛大臣有隐退今去不得陽狂恐知身死為世戮柰何君陛下故相宜極諌争王夢青蠅之矢積西階東可五六石以屋版瓦覆之師古曰版瓦大瓦也覆敷又翻以問遂遂曰陛下之詩不云乎以昌邑王習詩故云然蘇林曰猶言陛下所讀之詩也營營青蠅止于藩愷悌君子毋信讒言陛下左側讒人衆多如是青蠅惡矣師古曰惡即矢也吳越春秋云越王勾踐為吳王甞惡即其義也宜進先帝大臣子孫親近以為左右近其靳翻如不忍昌邑故人師古曰如若也信用讒䛕必有凶咎願詭禍為福師古曰詭反也皆放逐之臣當先逐矣王不聽太僕丞河東張敞上書諌班表太僕有兩丞續漢志丞一人秩千石河東郡屬并州按此時河東郡當屬司𨽻曰孝昭皇帝蚤崩無嗣師古曰蚤古早字大臣憂懼選賢聖承宗廟東迎之日唯恐屬車之行遲師古曰不欲斥乗輿故但言屬車耳屬之欲翻今天子以盛年初即位天下莫不拭目傾耳觀化聽風師古曰言改易視聽欲急聞見善政化也拭音式國輔大臣未褒而昌邑小輦先遷李竒曰挽輦小臣也此過之大者也王不聽大將軍光憂懣懣母本翻又音滿又音悶煩懣也獨以問所親故吏大司農田延年延年曰將軍為國柱石師古曰柱者梁下之柱石承柱之礎言大臣負國重任如屋之柱及其石也審此人不可何不建白太后建議而白之也更選賢而立之光曰今欲如是於古嘗有此不師古曰光不渉學故有此問也不讀曰否延年曰伊尹相殷廢太甲以安宗廟後世稱其忠師古曰商書太甲篇太甲既立不明伊尹放諸桐也將軍若能行此亦漢之伊尹也光乃引延年給事中給事中給事禁中也西漢以為加官隂與車騎將軍張安世圖計師古曰圖謀也王出遊光禄大夫魯國夏侯勝當乗輿前諌曰天久隂而不雨臣下有謀上者陛下出欲何之之徃也王怒謂勝為祅言祅與妖同音於驕翻縛以屬吏屬之欲翻吏白霍光光不舉法光讓安世以為泄語安世實不言乃召問勝勝對言在鴻範傳曰皇之不極厥罰常隂漢儒作洪範傳以五事應五行皇之不極是謂不建厥罰常隂時則有下人伐上之痾皇君也極中也建立也人君貌言視聽思五事皆失不得其中則不能立萬事失在眊悖故其咎􅀈也王者承天理物雲起于山而彌于天天氣亂故其罰常隂也君亂且弱人之所叛故有下人伐上之痾也時則有下人伐上者惡察察言惡忌諱也察察言不敢明言之也惡烏路翻故云臣下有謀光安世大驚以此益重經術士侍中傅嘉數進諌數所角翻王亦縛嘉繫獄光安世既定議乃使田延年報丞相楊敞敞驚懼不知所言汗出洽背徒唯唯而已師古曰唯唯者恭應之辭也唯於癸翻延年起至更衣師古曰古者延賔必有更衣之處也更工衡翻敞夫人遽從東廂謂敞曰此國大事今大將軍議已定使九卿來報君矦君矦不疾應與大將軍同心猶與無决先事誅矣與讀曰豫先悉薦翻延年從更衣還敞夫人與延年參語許諾請奉大將軍教令師古曰三人共言故曰參語癸巳光召丞相御史將軍列矦中二千石大夫博士㑹議未央宫光曰昌邑王行昏亂恐危社稷如何羣臣皆驚鄂失色師古曰凡鄂者皆謂阻礙不依順也後字作愕其義亦同莫敢發言但唯唯而已田延年前離席按劍離力智翻曰先帝屬將軍以㓜孤寄將軍以天下以將軍忠賢能安劉氏也今羣下鼎沸社稷將傾且漢之傳諡常為孝者以長有天下令宗廟血食也如漢家絶祀將軍雖死何面目見先帝于地下乎今日之議不得旋踵師古曰宜速決羣臣後應者臣請劍斬之光謝曰九卿責光是也天下匈匈不安光當受難師古曰受其憂責也難乃旦翻於是議者皆叩頭曰萬姓之命在於將軍唯大將軍令師古曰言一聽之也光即與羣臣俱見見賢遍翻白太后具陳昌邑王不可以承宗廟狀皇太后乃車駕幸未央承明殿未央宫有承明殿天子於是延儒生學士武帝責莊助曰君厭承明之廬西都賦曰承明金馬著作之庭是也詔諸禁門母内昌邑羣臣王入朝太后還乗輦欲歸温室晉灼曰長樂宫有温室殿三輔黄圖温室殿在未央殿北武帝建余謂長樂宫固亦有温室但漢諸帝皆居未央則此當為未央之温室也中黄門宦者各持門扇中黄門屬少府黄門令師古曰中黄門謂奄人居禁中在黄門之内給事者也比百石王入門閉昌邑羣臣不得入王曰何為大將軍跪曰有皇太后詔毋内昌邑羣臣内讀曰納王曰徐之何乃驚人如是光使盡驅出昌邑羣臣置金馬門外車騎將軍安世將羽林騎將即亮翻騎竒寄翻收縳二百餘人皆送廷尉詔獄令故昭帝侍中中臣侍守王光勑左右謹宿衛卒有物故自裁師古曰卒讀曰猝物故死也自裁謂自殺也令我負天下有殺主名王尚未自知當廢謂左右我故羣臣從官安得罪而大將軍盡繫之乎從才用翻師古曰安焉也余謂安得罪猶言何所得罪也頃之有太后詔召王王聞召意恐乃曰我安得罪而召我哉太后被珠襦被皮義翻如淳曰以珠飾襦也晉灼曰貫珠以為襦形若今革􅃭矣師古曰晉說是也襦汝朱翻盛服坐武帳中侍御數百人皆持兵期門武士陛㦸陳列殿下期門屬光禄勲掌執兵送從武帝為㣲行與勇力之士期諸殿門故曰期門羣臣以次上殿召昌邑王伏前聽詔光與羣臣連名奏王尚書令讀奏曰丞相臣敞等臣敞下即連名史以等字約言之昩死言皇太后陛下孝昭皇帝早棄天下遣使徴昌邑王典䘮服斬衰師古曰典䘮言為䘮主也斬哀謂縗裳下不緶直斬割之而已緶歩千翻無悲哀之心廢禮誼居道上不素食師古曰素食菜食無肉也言王在道常肉食非居䘮之制也而鄭康成觧素食云平常之食失之逺矣使從官略女子載衣車内所居傳舍始至謁見傳張戀翻見賢遍翻立為皇太子常私買雞豚以食受皇帝信璽行璽大行前孟康曰漢初有三璽天子之璽自佩信璽行璽在符節臺大行前昭帝柩前也韋昭曰大行不反之辭也就次發璽不封師古曰璽既國器常當緘封而王於大行前受之退還所次遂爾發漏更不封之令凡人皆見言不重慎從官更持節引内昌邑從官騶宰官奴二百餘人常與居禁闥内敖戲更工衡翻敖讀曰傲為書曰皇帝問侍中君卿使中御府令髙昌奉黄金千斤賜君卿取十妻師古曰昌邑之侍中名君卿也大行在前殿發樂府樂器引内昌邑樂人擊皷歌吹作俳倡師古曰俳優諧戲也倡樂人也倡音昌召内泰壹宗廟樂人悉奏衆樂鄭氏曰祭泰一樂人也余據武帝祠泰一用樂舞召歌兒作二十五弦及空侯瑟又采詩夜誦有趙代秦楚之謳宗廟樂有文徳昭徳文始五行之舞嘉至永至登歌休成之樂房中祠樂安世樂昭容樂禮容樂其員八百二十九人駕法駕驅馳北宫桂宫師古曰北宫桂宫並在未央宫北三輔黄圖桂宫武帝造周回十餘里有紫房複道通未央宫三秦記未央宫漸臺西有桂宫弄彘鬬虎召皇太后御小馬車張晏曰皇太后所駕遊宫中輦車也漢廐有果下馬髙三尺以駕輦師古曰小馬可于果下乘之故曰果下馬使官奴騎乗遊戲掖庭中與孝昭皇帝宫人䝉等滛亂詔掖庭令敢泄言要斬掖庭令屬少府武帝太初元年更名本永巷令也要與腰同太后曰止師古曰令且止讀奏也為人臣子當悖亂如是邪王離席伏悖蒲内翻離力智翻尚書令復讀曰復扶又翻取諸矦王列矦二千石綬及墨綬黄綬以并佩昌邑郎官者免奴續漢志諸侯王赤綬四采青黄縹紺列矦紫綬二采紫白二千石青綬三采青白紅千石六百石墨綬三采青赤紺四百石三百石二百石黄綬師古曰免奴謂奴免放為良人者發御府金錢刀劍玉器采繒賞賜所與遊戲者與從官官奴夜飲湛沔于酒師古曰湛讀曰沈又讀曰耽湛沔者乃荒迷之義也沔與湎同獨夜設九賔温室師古曰于温室中設九賔之禮也延見姊夫昌邑關内矦祖宗廟祠未舉為璽書使使者持節以三太牢祠昌邑哀王園廟稱嗣子皇帝師古曰時在䘮服故未祠宗廟而私祭昌邑哀王也余謂賀入繼大宗不當於昌邑哀王稱嗣子皇帝既於禮悖三年不祭之義又悖為人後者為之子之義受璽以來二十七日使者旁午如淳曰旁午分布也師古曰一縱一横為旁午猶言交横也持節詔諸官署徴發凡一千一百二十七事荒滛迷惑失帝王禮誼亂漢制度臣敞等數進諌不變更數所角翻更工衡翻日以益甚恐危社稷天下不安臣敞等謹與博士議皆曰今陛下嗣孝昭皇帝後行滛辟不軌辟讀曰僻五辟之屬莫大不孝孝經孔子曰五刑之屬三千其罪莫大于不孝辟五刑之辟也辟頻亦翻周襄王不能事母春秋曰天王出居于鄭由不孝出之絶之於天下也僖二十四年經書天王出居於鄭公羊傳曰王者無外此其言出何不能於母也宗廟重于君陛下不可以承天序奉祖宗廟子萬姓當廢臣請有司以一太牢具告祠髙廟皇太后詔曰可光令王起拜受詔王曰聞天子有争臣七人雖亡道不失天下引孝經孔子之言爭讀曰諍亡古無字通光曰皇太后詔廢安得稱天子乃即持其手解脫其璽組師古曰即就也組則古翻說文曰組綬屬續漢志乗輿黄赤綬四采黄赤紺縹長丈有九尺九寸五百首奉上太后上時掌翻扶王下殿出金馬門羣臣隨送王西面拜曰愚戇不任漢事戇渉降翻任音壬起就乗輿副車乘繩證翻大將軍光送至昌邑邸光謝曰王行自絶於天臣寧負王不敢負社稷願王自愛臣長不復左右師古曰言不復得侍見于左右光涕泣而去羣臣奏言古者廢放之人屏于逺方屏必郢翻又卑正翻不及以政師古曰言不豫政令請徙王賀漢中房陵縣漢中郡屬益州房陵縣唐為房州太后詔歸賀昌邑賜湯沐邑二千户故王家財物皆與賀及哀王女四人各賜湯沐邑千户國除為山陽郡昌邑國本山陽郡也今國除復為郡昌邑羣臣坐在國時不舉奏王罪過令漢朝不聞知朝直遥翻又不能輔道道讀曰導䧟王大惡皆下獄誅殺二百餘人下遐嫁翻唯中尉吉郎中令遂以忠直數諌正數所角翻得减死髠為城旦師王式繫獄當死治事使者責問曰師何以無諫書王式時為昌邑王師以授王詩治事使者即治獄使者也治直之翻式對曰臣以詩三百五篇朝夕授王至于忠臣孝子之篇未嘗不為王反復誦之也為于偽翻下同師古曰復音方目翻至于危亡失道之君未嘗不流涕為王深陳之也臣以三百五篇諫是以無諫書使者以聞亦得減死論霍光以羣臣奏事東宫太后省政省悉景翻宜知經術白令夏矦勝用尚書授太后遷勝長信少府長信宫名少府掌其宫事班表長信詹事掌皇太后宫景帝中六年更名長信少府平帝元始四年更名長樂少府張晏曰以太后所居名也居長信宫則曰長信少府居長樂宮則曰長樂少府也三輔黄圖長信殿在長樂宫太后常居之余據表長信少府後改為長樂少府則長信長樂非兩宫也張說誤賜爵闗内矦初衛太子納魯國史良娣姓譜史周史佚之後師古曰太子有妃有良姊有孺子凡三等生子進師古曰進皇孫之名也號史皇孫皇孫納涿郡王夫人涿郡屬幽州王夫人名翁須生子病已師古曰盖以夙遭屯難而多病苦故名病已欲其速差也後以為鄙更改諱詢號皇曽孫皇曾孫生數月遭巫蠱事見二十三卷武帝征和二年太子三男一女及諸妻妾皆遇害獨皇曾孫在亦坐收擊郡邸獄師古曰漢舊儀郡邸獄治天下郡國上計者屬大鴻臚此盖巫蠱獄收繫者衆故皇曽孫寄在郡邸獄故廷尉監魯國丙吉班表廷尉有左右監秩千石丙姓也左傳齊有丙歜功臣表有髙􅁐矦丙倩受詔治巫蠱獄治直之翻吉心知太子無事實重哀皇曽孫無辜師古曰重音直用翻擇謹厚女徒渭城胡組淮陽郭徴卿令乳養曽孫置閒燥處李竒曰輕罪男子守邉一歲女子輭弱不任守復令作于官亦一嵗故班史謂之女徒復作復作者復為官作滿其本罪月日班志渭城縣屬扶風師古曰閒寛净之處也燥髙敞也閒讀曰閑燥蘇老翻吉日再省視省悉景翻巫蠱事連歲不决武帝疾來徃長楊五柞宫師古曰二宫並在盩厔皆以木名之水經注漏水出南山赤谷東北流逕長楊宫漏水又東北耿谷水注之水發南山耿谷北流與栁泉合東北逕五柞宫望氣者言長安獄中有天子氣於是武帝遣使者分條中都官詔獄繫者師古曰條謂疏録之無輕重一切皆殺之内謁者令郭穰夜到郡邸獄班表謁者令屬少府續漢志主宫中布張諸褻物漢官云秩千石盖當時權為此使吉閉門拒使者不納曰皇曾孫在他人無辜死者猶不可况親曽孫乎相守至天明不得入穰還以聞因劾奏吉劾戸槩翻武帝亦寤曰天使之也因赦天下郡邸獄繫者獨賴吉得生既而吉謂守丞誰如皇孫不當在官孟康曰郡守丞也來詣京師邸治獄姓誰名如文穎曰不當在官不當在郡邸獄也師古曰守丞守獄官之丞耳非郡丞也誰如者其人名本作譙字言姓又非也仲馮曰守丞盖郡邸守邸之丞也與朱買臣傳守丞同使誰如移書京兆尹遣與胡組俱送京兆尹不受復還及組日滿當去皇孫思慕吉以私錢雇組令留與郭徴卿並養數月乃遣組去後少内嗇夫白吉曰食皇孫無詔令師古曰少内掖庭主府藏之官也食讀曰飤詔令無文無從得其廪具而食之時吉得食米肉月月以給皇曽孫曽孫病幾不全者數焉吉數敕保養乳母加致醫藥幾居衣翻數所角翻視遇甚有恩惠吉聞史良娣有母貞君及兄恭乃載皇曾孫以付之貞君年老見孫孤甚哀之自養視焉後有詔掖庭養視上屬籍宗正應劭曰掖庭宫人之官有令丞宦者為之詔敕掖庭養視之始令宗正著其屬籍時掖庭令張賀嘗事戾太子思顧舊恩張賀安世兄也幸於衛太子太子敗賔客皆誅安世上書為賀請得下蠶室後為掖庭令師古曰顧念也哀曽孫奉養甚謹以私錢供給教書既壯賀欲以女孫妻之妻千細翻下同是時昭帝始冠冠古玩翻長八尺二寸長直亮翻賀弟安世為右將軍輔政聞賀稱譽皇曾孫欲妻以女譽音余怒曰曾孫乃衛太子後也幸得以庶人衣食縣官足矣勿復言予女事復扶又翻予讀曰與於是賀止時暴室嗇夫許廣漢有女暴室屬掖庭令師古曰取暴曬為名盖主織作染練之署應劭曰暴室宮人獄也今曰薄室許廣漢坐法腐為宦者作嗇夫也師古又曰暴室職務既多因為置獄主治罪人故徃徃云暴室獄耳然非獄名嗇夫者暴室屬官亦猶縣郷嗇夫姓譜許姓出髙陽本自姜姓炎帝之後太嶽之裔其後因封國為氏賀乃置酒請廣漢酒酣為言曽孫體近下乃關内矦師古曰言曽孫於帝為近親縱其人得下劣猶為闗内矦也為于偽翻可妻也廣漢許諾明日嫗聞之怒嫗謂廣漢妻也說文曰嫗母也音威遇翻廣漢重令人為介師古曰更令人作媒結婚姻重音直用翻遂與曾孫賀以家財聘之曾孫因依倚廣漢兄弟及祖母家史氏受詩于東海澓中翁服䖍曰澓音福師古曰姓澓字中翁澓房福翻中讀曰仲髙材好學好呼到翻然亦喜游俠師古曰喜許吏翻鬬雞走狗以是具知閭里姦邪吏治得失治直吏翻數上下諸陵師古曰諸陵皆據髙敞地為之縣即在其側帝每周游徃來去則上來則下故言上下諸陵數所角翻上時掌翻周徧三輔嘗困于蓮勺鹵中班志連勺縣属左馮翊賢曰故城在同州下邽縣東北如淳曰為人所困辱也蓮勺縣有鹽池縱横十餘里其郷人名為鹵中師古曰鹵者鹹地今在櫟陽縣東今其郷人謂此中為鹵鹽池程大昌曰蓮勺唐下邽縣蓮音輦勺音酌尤樂杜鄠之間班志杜縣屬京兆鄠縣屬扶風樂音洛鄠音戸率常在下杜孟康曰下杜在長安南師古曰即今之杜城括地志下杜城在雍州長安縣東南九里古杜伯國時㑹朝請舍長安尚冠里文穎曰以屬弟尚親故嵗時從宗室朝㑹也如淳曰春曰朝秋曰請師古曰尚冠者長安中里名帝㑹朝請之時即于此里中止息三輔黄圖曰京兆尹治尚冠里朝直遥翻舍如字請才性翻及昌邑王廢霍光與張安世諸大臣議所立未定丙吉奏記光曰將軍事孝武皇帝受襁褓之屬任天下之寄屬之欲翻孝昭皇帝早崩亡嗣亡古無字通海内憂懼欲亟聞嗣主發䘮之日以大誼立後所立非其人復以大誼廢之師古曰雖無嫡嗣旁立支屬今宗廟有奉既而恐危社稷故廢黜之皆以大誼而行也天下莫不服焉方今社稷宗廟羣生之命在將軍之壹舉竊伏聽於衆庶察其所言諸矦宗室在列位者未有所聞于民間也而遺詔所養武帝曽孫名病已在掖庭外家者蘇林曰外家猶言在外人民家不在宫中晉灼曰出郡邸獄歸在外家史氏後入掖庭耳師古曰晉說是也吉前使居郡邸時使疏吏翻見其㓜少至今十八九矣通經術有美材行安而節和行下孟翻願將軍詳大義參以蓍龜豈宜句斷言參以蓍龜卜其宜與不宜也褒顯先使入侍師古曰侍太后令天下昭然知之然後决定大䇿天下幸甚杜延年亦知曽孫徳美勸光安世立焉秋七月光坐庭中㑹丞相以下議所立遂復與丞相敞等上奏曰復扶又翻上時掌翻孝武皇帝曽孫病已年十八師受詩論語孝經躬行節儉慈仁愛人可以嗣孝昭皇帝後奉承祖宗廟子萬姓師古曰天子以萬姓為子故云子萬姓臣昧死以聞昧死冒死也皇太后詔曰可光遣宗正徳至曽孫家尚冠里洗沐賜御衣太僕以軨獵車迎曽孫文穎曰軨獵小車前有曲輿不衣近世謂之軨獵車孟康曰今之載獵車也前有曲軨特髙大獵時立其中格射禽獸李竒曰蘭輿輕車也師古曰文李二說是時未偹天子車駕故且取其輕便耳非取其髙大也孟說失之軨音零就齋宗正府庚申入未央宫見皇太后封為陽武矦班志陽武縣屬河南郡師古曰先封矦者不欲立庻人為天子也見賢遍翻已而羣臣奏上璽綬即皇帝位癸巳廢昌邑王庚申立寅帝漢朝無君二十七日天下不揺霍光處此誠難能也上時掌翻謁髙廟尊皇太后為太皇太后侍御史嚴延年班表侍御史屬御史大夫員十五人受公卿奏事舉劾按章此嚴非莊助之嚴自是一姓戰國時有濮陽嚴仲子劾奏大將軍光擅廢立主無人臣禮不道奏雖寑然朝廷肅然敬憚之八月己巳安平敬矦楊敞薨班表安平矦食邑于汝南九月大赦天下戊寅蔡義為丞相初許廣漢女適皇曾孫一嵗生子奭數月曾孫立為帝許氏為倢伃是時霍將軍有小女與皇太后親公卿議更立皇后皆心擬霍將軍女亦未有言上乃詔求微時故劒大臣知指白立許倢伃為皇后十一月壬子立皇后許氏霍光以后父廣漢刑人不宜君國嵗餘乃封為昌成君太皇太后歸長樂宫長樂宫初置屯衛漢太后常居長樂宫太皇太后自昌邑之廢居未央宫今宣帝既立復歸長樂宮樂音洛中宗孝宣皇帝上之上荀悅曰諱詢字次郷諱詢之字曰謀應劭曰諡法聖善周閒曰宣余據帝本名病已元康二年乃更名詢本始元年春詔有司論定䇿安宗廟功大將軍光益封萬七千戸與故所食凡二萬戸車騎將軍富平矦安世以下益封者十人封矦者五人賜爵關内侯者八人昭帝始元二年霍光以捕馬何羅功封博陸矦二千三百五十戸今益封萬七千二百户元鳳六年張安世封富平矦三千四十戸今益封萬六百户楊敞始封安平矦七百戸今益封其子忠四千八百四十七户蔡義始封陽平矦今益封通前凡七百户范明友始封平陵矦今益封通前凡二千九百二十户韓増始紹封龍雒矦今益封千户建平矦杜延年始封二千户今益封二千三百六十户蒲矦蘇昌始封千二十六户今益封王譚始紹封宜春矦今益封通前凡一千一百八户魏聖始紹封當塗矦今益封通前凡二千二百户屠耆堂始紹封杜矦千三百户今益封夏矦勝始賜爵闗内矦今益封千户凡十人封田廣明為昌水矦趙充國為營平矦田延年為陽城矦樂成為爰氏矦王遷為平丘矦凡五人周徳蘇武李光劉徳韋賢宋畸丙吉趙廣漢八人皆賜爵關内矦大將軍光稽首歸政稽音啟上謙讓不受諸事皆先關白光然後奏御自昭帝時光子禹及兄孫雲皆為中郎將雲弟山奉車都尉侍中領胡越兵光兩女壻為東西宫衛尉昆弟諸壻外孫皆奉朝請為諸曹大夫騎都尉給事中黨親連體根據於朝廷及昌邑王廢光權益重毎朝見上虛已歛容禮下之已甚胡越兵胡騎及越騎也東西宫衛尉長樂衛尉及未央衛尉也侍中得入禁中諸曹受尚書奏事給事中給事禁中皆加官也下胡稼翻已甚言過當也夏四月庚午地震五月鳳皇集膠東千乗赦天下勿收田租賦六月詔曰故皇太子在湖未有號諡戾太子死事見二十二卷武帝征和二年歲時祠其議諡置園邑有司奏請禮為人後者為之子也故降其父母不得祭師古曰謂本生之父母也尊祖之義也陛下為孝昭帝後承祖宗之祀愚以為親諡宜曰悼如淳曰親謂父也母曰悼后故皇太子諡曰戾史良娣曰戾夫人諡法不悔前過曰戾又不思念曰戾皆改𦵏焉秋七月詔立燕刺王太子建為廣陽王燕王旦死建為庶人事見二十三卷昭帝元鳳元年廣陽國屬幽州旦死燕國除為廣陽郡今因以為國名刺音來曷翻立廣陵王胥少子𢎞為髙宻王封胥子𢎞為王加親親之恩也初上官桀與霍光争權光既誅桀遂遵武帝法度以刑罰痛䋲羣下由是俗吏皆尚嚴酷以為能而河南太守丞淮陽黄霸獨用寛和為名上在民間時知百姓苦吏急也聞覇持法平乃召為廷尉正數决疑獄庭中稱平廷尉正秩千石庭中漢書作廷中師古曰此廷中謂廷尉之中也余謂通鑑作庭中言漢庭之中也數所角翻二年春大師農田延年有罪自殺昭帝之䘮大司農僦民車延年詐増僦直師古曰僦謂賃之與雇直也僦子就翻盗取錢三千萬為怨家所告怨於元翻霍將軍召問延年欲為道地師古曰為之開通道路使有安全之地也延年抵曰師古曰抵拒諱也抵丁禮翻無有是事光曰既無事當窮竟師古曰既無實事當令有司窮治盡其理御史大夫田廣明謂太僕杜延年曰春秋之義以功覆過公羊傳僖十七年夏滅項孰滅之齊滅之昌為不言齊滅之為桓公諱也桓公甞有存亡繼絶之功故君子為之諱當廢昌邑王時非田子賔之言大事不成延年字子賔事見上昭帝元平元年今縣官出三千萬自乞之何哉師古曰謂自乞與之也栁宗元曰哉疑辭也何哉猶曰何如也乞音氣願以愚言白大將軍延年言之大將軍大將軍曰誠然實勇士也當發大議時震動朝廷光因舉手自撫心曰使我至今病悸師古曰悸心動也音揆韻畧其季翻謝田大夫曉大司農通徃就獄得公議之師古曰曉者告白意指也通者從公家通理也光忿其拒諱故不佑之田大夫使人語延年語牛倨翻延年曰幸縣官寛我耳何面目入牢獄使衆人指笑我卒徒唾吾背乎即閉閣獨居齋舍偏袒持刀東西歩數日使者召延年詣廷尉聞鼓聲自刎死晉灼曰使者至司農司農發詔書故鳴鼔也師古曰刎謂斷頸也刎武粉翻夏五月詔曰孝武皇帝躬仁誼厲威武功徳茂盛而廟樂未稱師古曰稱副也稱尺證翻朕甚悼焉其與列矦二千石博士議于是羣臣大議庭中師古曰大議總㑹議也此庭中謂朝廷之中皆曰宜如詔書長信少府夏侯勝獨曰武帝雖有攘四夷廣土境之功然多殺士衆竭民財力奢泰無度天下虛耗百姓流離物故者半蝗蟲大起赤地數千里師古曰言無五榖之苖或人民相食畜積至今未復畜讀曰蓄無徳澤于民不宜為立廟樂公卿共難勝曰為于偽翻難乃旦翻此詔書也勝曰詔書不可用也人臣之誼宜直言正論非茍阿意順㫖議已出口雖死不悔於是丞相御史劾奏勝非議詔書毁先帝不道及丞相長史黄霸阿縱勝不舉劾俱下獄劾户槩翻下遐嫁翻有司遂請尊孝武帝廟為世宗廟奏盛徳文始五行之舞應劭曰宣帝復采昭徳之舞為盛徳舞以尊世宗廟也諸帝廟皆常奏文始四時五行舞也武帝廵狩所幸郡國皆立廟如髙祖太宗焉夏侯勝黄霸既久繫霸欲從勝受尚書勝辭以罪死霸曰朝聞道夕死可矣論語載孔子之言勝賢其言遂授之繫再更冬師古曰更歴也更音工衡翻講論不怠初烏孫公主死漢復以楚王戊之孫解憂為公主妻岑娶岑娶胡婦子泥靡尚小岑娶且死復扶又翻妻七細翻漢書作岑陬師古曰岑音仕林翻陬音子矦翻以國與季父大禄子翁歸靡曰泥靡大以國歸之翁歸靡既立號肥王復尚楚主生三男兩女長男曰元貴靡次曰萬年次曰大樂昭帝時公主上書言匈奴與車師共侵烏孫唯天子幸救之漢養士馬議擊匈奴㑹昭帝崩上遣光禄大夫常惠使烏孫烏孫公主及昆彌皆遣使上書言匈奴復連發大兵侵擊烏孫使使謂烏孫趣持公主來趣讀曰促欲隔絶漢昆彌願發國精兵五萬騎盡力擊匈奴唯天子出兵以救公主昆彌先是匈奴數侵漢邉先悉薦翻漢亦欲討之秋大發兵遣御史大夫田廣明為祁連將軍四萬餘騎出西河度遼將軍范明友三萬餘騎出張掖前將軍韓増三萬餘騎出雲中後將軍趙充國為蒲類將軍三萬餘騎出酒泉雲中太守田順為虎牙將軍三萬餘騎出五原期以出塞各二千餘里以常惠為校尉持節䕶烏孫兵共擊匈奴三年春正月癸亥恭哀許皇后崩張晏曰禮婦人從夫諡閔其見殺故兼二諡師古曰共讀曰恭余據班史自髙后以下皆從夫稱之未甞有諡也至帝諡孝武衛皇后口思亦以其不令終也至于東都如光烈明徳始從夫而加二諡時霍光夫人顯欲貴其小女成君道無從師古曰從因也由也無由得納其女㑹許后當娠病女醫淳于衍者姓譜淳于出於姜姓周公之後霍氏所愛嘗入宫侍皇后疾衍夫賞為掖庭戸衛掖庭戸衛掌衛掖庭門户戸郎主之也謂衍可過辭霍夫人行為我求安池監安池池名監掌池之官為于偽翻衍如言報顯顯因心生辟左右師古曰辟謂屛去之音闢字謂衍曰少夫幸報我以事如淳曰稱衍字曰少夫親之也晉灼曰報我以事謂求池監也少時照翻我亦欲報少夫可乎晉灼曰報少夫謀弑許后事衍曰夫人所言何等不可者師古曰無事而不可顯曰將軍素愛少女成君欲竒貴之願以累少夫師古曰累託也音力瑞翻衍曰何謂邪顯曰婦人免乳大故十死一生師古曰免乳謂産子也大故大事也乳音人喻翻今皇后當免身可因投毒藥去也師古曰去謂除去皇后也音丘吕翻成君即為皇后矣如䝉力事成富貴與少夫共之衍曰藥雜治常先嘗安可師古曰與衆醫共雜治之又有先甞者何可行毒治直之翻顯曰在少夫為之耳將軍領天下誰敢言者緩急相護但恐少夫無意耳衍良久曰願盡力即擣附子附子與天雄烏喙同出一種有大毒齎入長定宫皇后免身後衍取附子并合太醫大丸以飲皇后師古曰大丸今澤蘭丸之屬合音閤飲於禁翻有頃曰我頭岑岑也藥中得無有毒師古曰岑岑痺悶之意對曰無有遂加煩懣崩師古曰懣音滿又音悶衍出過見顯相勞問勞力到翻亦未敢重謝衍師古曰恐人知覺之後人有上書告諸醫侍疾無狀者皆收繫詔獄劾不道劾戸槩翻顯恐急即以狀具語光語牛據翻因曰既失計為之無令吏急衍光大驚欲自發舉不忍猶與師古曰猶與不决也與讀曰豫㑹奏上光署衍勿論李竒曰光題其奏也師古曰言之於帝故解釋耳光不自署也余據霍光傳光薨後帝始聞毒許后事光于是時安敢言之於帝邪李說為是上時掌翻顯因勸光内其女入宫戊辰五將軍發長安匈奴聞漢兵大出老弱犇走􅇌畜産逺遁逃師古曰􅇌與驅同是以五將少所得少詩沼翻夏五月軍罷度遼將軍出塞千二百餘里至蒲離候水自張掖出塞斬首捕虜七百餘級前將軍出塞千二百餘里至烏貟自雲中出塞師古曰烏員地名也音云斬首捕虜百餘級蒲類將軍出塞千八百餘里西至候山自酒泉出塞斬首捕虜得單于使者蒲隂王以下三百餘級聞虜已引去皆不至期還天子薄其過寛而不罪祈連將軍出塞千六百里至雞秩山自西河出塞斬首捕虜十九級逢漢使匈奴還者冉𢎞等姓譜楚大夫叔山冉之後案夫子弟子有冉伯牛冉有使疏吏翻還從宣翻又如字言雞秩山西有虜衆祈連即戒𢎞使言無虜欲還兵御史屬公孫益夀諌以為不可祈連不聽遂引兵還虎牙將軍出塞八百餘里至丹餘吾水上自五原出塞即止兵不進斬首捕虜千九百餘級引兵還上以虎牙將軍不至期詐增鹵獲而祈連知虜在前逗遛不進孟康曰逗遛律語也謂軍行頓止稽留不進也師古曰逗讀與住同又音豆皆下吏自殺擢公孫益夀為侍御史百官表侍御史員十五人受公卿奏事舉劾案章下遐嫁翻烏孫昆彌自將五萬騎與校尉常惠從西方入至右谷蠡王庭谷蠡音鹿黎獲單于父行行胡浪翻及嫂居次晉灼曰匈奴女號若言公主也名王犁汗都尉千長騎將以下四萬級犂汗都尉犂汗王之都尉也師古曰千長千人之長長知兩翻馬牛羊驢橐佗七十餘萬頭師古曰橐佗言能負橐囊而䭾物也佗音徒河翻考異曰常惠傳四萬級為三萬九千人七十餘萬頭為六十餘萬頭今從烏孫傳烏孫皆自取所虜獲上以五將皆無功獨惠奉使克獲封惠為長羅矦長羅矦國屬陳留郡賢曰故城在今滑州匡城縣東北次匈奴民衆傷而去者及畜産逺移死亡不可勝數勝音升於是匈奴遂衰耗怨烏孫上復遣常惠持金幣還賜烏孫貴人有功者復扶又翻惠因奏請龜兹國甞殺校尉頼丹未伏誅請便道擊之帝不許大將軍霍光風惠以便宜從事師古曰言至前所專命而行也風讀曰諷惠與吏士五百人俱至烏孫還還從宣翻又如字下同過發西國兵二萬人自烏孫還所過西國皆發其兵令副使發龜兹東國二萬人烏孫兵七千人從三面攻龜兹兵未合先遣人責其王以前殺漢使狀王謝曰乃我先王時為貴人姑翼所誤耳我無罪惠曰即如此縳姑翼來吾置王師古曰置猶放王執姑翼諸惠惠斬之而還龜兹殺賴丹事見上卷昭帝元鳳四年大旱六月己丑陽平節矦蔡義薨陽平屬東郡丑考異曰荀紀作乙誤甲辰長信少府韋賢為丞相大司農魏相為御史大夫冬匈奴單于自將數萬騎擊烏孫頗得老弱欲還㑹天大雨雪雨于具翻一日深丈餘深式鴆翻人民畜産凍死還者不能什一於是丁令乗弱攻其北令音零烏桓入其東烏孫擊其西凡三國所殺數萬級馬數萬匹牛羊甚衆又重以餓死重直用翻人民死者什三畜産什五匈奴大虚弱諸國覊屬者皆瓦解攻盗不能理其後漢遣三千餘騎為三道並入匈奴捕虜得數千人還匈奴終不敢取當師古曰當者報其直滋欲郷和親師古曰滋益也郷讀曰嚮而邉境少事矣是歲潁川太守趙廣漢為京兆尹潁川俗豪傑相朋黨廣漢為缿筩蘇林曰缿音項如瓶可受投書孟康曰筩竹筩也如今官受宻事筩也師古曰缿若今盛錢臧瓶為小孔可入而不可出或缿或筩皆為此制而用受書令投于中也筒音同受吏民投書使相告訐師古曰面相斥曰訐音居又翻又音居謁翻於是更相怨咎更工衡翻姦黨散落盗賊不敢發匈奴降者言匈奴中皆聞廣漢名降户江翻由是入為京兆尹廣漢遇吏殷勤甚備事推功善歸之於下行之發於至誠吏咸願為用僵仆無所避師古曰僵偃也仆頓也僵音薑仆音赴廣漢聰明皆知其能之所宜盡力與否其或負者輙收捕之無所逃案之罪立具即時伏辜尤善為鉤距以得事情蘇林曰鉤得其情使不得去也晉灼曰鉤致也距閉也使對者無疑若不問而自知衆莫覺所由以閉其術為鉤距也師古曰晉説是也閭里銖兩之姧皆知之長安少年數人㑹窮里空舍師古曰窮里里中之極隐處謀共刼人坐語未訖廣漢使吏捕治具服其發姦擿伏如神師古曰擿謂動發之也音它狄翻京兆政清吏民稱之不容口長老傳以為自漢興治京兆者莫能及長知兩翻治直之翻四年春三月乙夘立霍光女為皇后赦天下初許后起㣲賤登至尊日淺從官車服甚節儉及霍后立轝馬侍從益盛從才用翻賞賜官屬以千萬計與許后時縣絶矣縣讀曰懸夏四月壬寅郡國四十九同日地震或山崩壊城郭室屋殺六千餘人北海琅邪壊祖宗廟景帝元帝令郡國各立太祖髙皇帝廟太宗文皇帝廟壊音怪詔丞相御史與列矦中二千石博問經學之士有以應變師古曰謂禦塞災異也毋有所諱令三輔太常内郡國舉賢良方正各一人大赦天下上素服避正殿五日釋夏侯勝黄霸以勝為諌大夫給事中霸為揚州刺史揚州統盧江九江㑹稽丹陽豫章等郡勝為人質樸守正簡易無威儀易以䜴翻或時謂上為君誤相字於前師古曰前天子之前也君前臣名不當相呼字也上亦以是親信之師古曰知其質樸也甞見出道上語師古曰入見天子而以其言為外人道之見賢遍翻上聞而讓勝勝曰陛下所言善臣故揚之堯言布於天下至今見誦臣以為可傳故傳耳朝廷每有大議上知勝素直謂曰先生建正言無懲前事師古曰懲創也前事謂坐議廟樂事勝復為長信少府後遷太子太傅年九十卒太后賜錢二百萬為勝素服五日以報師傅之恩為于偽翻儒者以為榮五月鳳皇集北海安丘淳于安丘淳于二縣皆屬北海郡安丘春秋時之渠丘淳于春秋之州國廣川王去坐殺其師及姬妾十餘人或銷鈆錫灌口中或支解并毒藥煑之令糜盡廢徙上庸自殺廣川王去景帝子廣川惠王越之孫師古曰糜碎也地節元年應劭曰以先者地震山崩水出於是改元曰地節欲令地得其節春正月有星孛于西方孛蒲内翻楚王延夀景帝立平陸矦禮為楚王奉元王後傳子道孫注曽孫純延夀純之子也以廣陵王胥武帝子天下有變必得立隂附助之為其後母弟趙何齊取廣陵王女為妻因使何齊奉書遺廣陵王曰願長耳目師古曰言常伺聼勿失幾也取讀曰娶遺於季翻長如字毋後人有天下師古曰方争天下勿使在人後後户覯翻何齊父長年上書告之事下有司考驗辭服下遐嫁翻冬十一月延夀自殺胥勿治十二月癸亥晦日有食之是嵗于定國為廷尉姓譜周武王子封於䢴子孫以國為氏其後去邑單為于定國决疑平法務在哀鰥寡罪疑從輕加審慎之心朝廷稱之曰張釋之為廷尉天下無寃民師古曰言决罪皆當于定國為廷尉民自以不寃師古曰言知其寛平皆無寃枉之慮也二年春霍光病篤車駕自臨問上為之涕泣為于偽翻光上書謝恩願分國邑三千戸以封兄孫奉車都尉山為列矦奉兄去病祀霍去病封冠軍矦子嬗嗣封薨無後國除故光乞分國邑以封其孫即日拜光子禹為右將軍三月庚午光薨上及皇太后親臨光䘮中二千石治冡賜梓宫𦵏具皆如乗輿制度諡曰宣成矦發三河卒穿復土乗䋲證翻復如字置園邑三百家長丞奉守下詔復其後世復方目翻疇其爵邑應劭曰疇等也世世無有所與與讀曰豫御史大夫魏相上封事言事而不欲宣泄重封上之故曰封事漢官曰凡章表皆啟封其言宻事得用皁嚢曰國家新失大將軍宜顯明功臣以塡藩國塡古鎭字通毋空大位以塞争權師古曰大臣位空則起争奪之權也塞悉則翻宜以車騎將軍安世為大將軍毋令領光禄勲事以其子延夀為光禄勲上亦欲用之夏四月戊申以安世為大司馬車騎將軍領尚書事官考異曰百表地節三年四月戊申張安世為大司馬七月戊戌更為衛將軍霍禹為大司馬七月壬辰禹要斬荀紀三年四月戊辰安世為大司馬按明年四月無戊辰七月無戊戍又不當再言七月以宣紀張安世霍光傳考之安世為司馬當在今年為衛將軍當在明年十月禹死在四年七月盖年表旁行通連書之致此誤也鳳皇集魯羣鳥從之大赦天下上思報大將軍徳乃封光兄孫山為樂平矦使以奉車都尉領尚書事魏相因昌成君許廣漢奏封事言春秋譏世卿公羊傳隠三年夏四月辛卯尹氏卒尹氏者何天子之大夫也其稱尹氏何貶曷為貶譏世卿世卿非禮也惡宋三世為大夫公羊傳曰宋三世無大夫三世内取也師古曰三世謂襄公成公昭公也内取于國之大夫也為恐當作無惡烏路翻及魯季孫之専權魯自季友立僖公行父逐東門氏意如逐昭公世專魯國至哀公惡季氏之偪而不能去遂孫于邾皆危亂國家自後元以來禄去王室政由冢宰今光死子復為右將軍兄子秉樞機謂領尚書事也賢曰樞機近要之官也春秋運斗樞曰北斗第一天樞第二璇第三機也昆弟諸壻據權勢在兵官光夫人顯及諸女皆通籍長信宫師古曰通籍謂禁門之中皆有名籍恣出入也應劭曰籍者謂二尺竹牒設其年紀名字物色懸之宫門案省相應乃得入也或夜詔門出入驕奢放縱恐寖不制師古曰寖漸也不制不可制御也宜有以損奪其權破散隂謀以固萬世之基全功臣之世又故事諸上書者皆為二封署其一曰副領尚書者先發副封所言不善屛去不奏相復因許伯白去副封以防壅蔽屏必郢翻去丘呂翻帝善之詔相給事中皆從其議漢三公九卿皆外朝今魏相給事中則得入禁中預中朝之議帝興于閭閻師古曰閭里門也閻里中門也言從里巷而即天位也知民事之囏難囏古艱字霍光既薨始親政事厲精為治治直吏翻下同五日一聽事自丞相以下各奉職奏事敷奏其言考試功能應劭曰敷陳也各自奏陳其言然後試之以官考其功徳也侍中尚書功勞當遷及有異善厚加賞賜至于子孫終不改易師古曰言各久其職事也貢父曰至于子孫謂賞賜逮及子孫也非謂侍中尚書官至子孫不改易也樞機周密品式備具上下相安莫有苟且之意及拜刺史守相輙親見問觀其所由退而考察所行以質其言師古曰質正也有名實不相應必知其所以然常稱曰庶民所以安其田里而亡歎息愁恨之心者政平訟理也師古曰訟理言所訟見理而無寃滯也亡古無字通與我共此者其唯良二千石乎師守古曰謂郡諸矦相以為太守吏民之本數變易則下不安數所角翻民知其將久不可欺罔乃服從其教化故二千石有治理效輒以璽書勉厲増秩賜金或爵至闗内矦公卿缺則選諸所表以次用之師古曰所表謂增秩賜金爵也是以漢世良吏於是為盛稱中興焉匈奴壺衍鞮單于死弟左賢王立為虗閭權渠單于以右大將軍女為大閼氏而黜前單于所幸顓渠閼氏顓渠閼氏單于之元妃也其次為大閼氏將即亮翻閼氏音煙支顓渠閼氏父左大且渠怨望且子閭翻是時漢以匈奴不能為邉冦罷塞外諸城以休百姓師古曰外城塞外諸城也如光禄塞受降城遮虜障等城是也單于聞之喜召貴人謀欲與漢和親左大且渠心害其事曰前漢使來兵隨其後今亦效漢發兵先使使者入乃自請與呼盧訾王各將萬騎南旁塞獵相逢俱入訾子移翻旁歩浪翻行未到㑹三騎亡降漢言匈奴欲為冦降户江翻於是天子詔發邉騎屯要害處使大將軍軍監治衆等四人師古曰治衆者軍監之名余據軍監位次軍正將五千騎分三隊出塞各數百里捕得虜各數十人而還時匈奴亡其三騎不敢入即引去是歳匈奴饑人民畜産死什六七又發兩屯各萬騎以僃漢其秋匈奴前所得西嗕居左地者孟康曰嗕音辱匈奴種師古曰嗕音奴獨翻余謂西嗕自是一種為匈奴所得使居左地耳非匈奴種也其君長以下數千人皆驅畜産行與甌脫戰所殺傷甚衆遂南降漢資治通鑑卷二十四
