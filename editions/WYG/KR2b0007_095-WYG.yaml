  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷九十五宋司馬光撰胡三省音注晉紀十七起𤣥黓執徐盡彊圉作噩凡六年顯宗成皇帝中之上咸和七年春正月辛未大赦趙主勒大饗羣臣異考曰晉春秋云陶侃遣使聘後趙趙王勒饗之按侃與勒必無通使之理今不取載記云勒因饗高句麗宇文屋孤使今但云饗羣臣謂徐光曰朕可方自古何等主方比也對曰陛下神武謀畧過於漢高後世無可比者勒笑曰人豈不自知卿言太過朕若遇漢高祖當北面事之與韓彭比肩戴溪曰勒豈真知高帝者特自視不如韓彭故耳若遇光武當並驅中原未知鹿死誰手大丈夫行事宜礌礌落落如日月皎然礌落猥翻終不效曹孟徳司馬仲達欺人孤兒寡婦狐媚以取天下也狐妖獸也能蠱媚人石勒以此論曹馬使死者有知孟徳仲達其抱愧於地下矣羣臣皆頓首稱萬嵗勒雖不學好使諸生讀書而聴之好呼到翻時以其意論古今得失聞者莫不悦服嘗使人讀漢書聞酈食其勸立六國後事見十卷漢高帝三年驚曰此法當失何以遂得天下及聞留侯諌乃曰賴有此耳郭敬之退戍樊城也事見上卷五年晉人復取襄陽夏四月敬復攻㧞之敬復扶又翻留戍而歸趙右僕射程遐言於趙主勒曰中山王勇悍權畧羣臣莫及觀其志自陛下之外視之蔑如蔑無也言視之若無也加以殘賊安忍孟子曰賊仁者謂之賊賊義者謂之殘左傳衆仲曰安忍無親久為將帥威振内外其諸子年長皆典兵權虎子邃宣勒皆使之典兵將即亮翻帥所類翻長知兩翻陛下在自當無它恐非少主之臣也少詩照翻宜早除之以便大計勒曰今天下未安大雅冲幼宜得彊輔中山王骨肉至親有佐命之功方當委以伊霍之任何至如卿所言卿正恐不得擅帝舅之權耳吾亦當㕘卿顧命勿過憂也遐泣曰臣所慮者公家陛下乃以私計拒之忠言何自而入乎中山王雖為皇太后所養非陛下天屬載記曰虎勒之從子也祖曰㔨邪父曰冦覔勒父朱幼而子虎故或稱勒弟焉雖有微功陛下酬其父子恩榮亦足矣而其志願無極謂虎有窺覦天位之志豈將來有益者乎若不除之臣見宗廟不血食矣勒不聴遐退告徐光光曰中山王常切齒於吾二人恐非但危國亦將為家禍也它日光承閒言於勒曰閒古莧翻今國家無事而陛下神色若有不怡何也怡悅也勒曰呉蜀未平吾恐後世不以吾為受命之王也光曰魏承漢運劉備雖興於蜀漢豈得為不亡乎以喻晉也孫權在呉猶今之李氏也陛下苞括二都平蕩八州二都長安洛陽八州冀幽并青兖豫司雍也帝王之統不在陛下當復在誰復扶又翻下同且陛下不憂腹心之疾而更憂四支乎中山王藉陛下威畧所向輙克而天下皆言其英武亞於陛下且其資性不仁見利忘義父子並據權位埶傾王室而耿耿常有不滿之心近於東宮侍宴有輕皇太子之色臣恐陛下萬年之後不可復制也復扶又翻勒黙然始命太子省可尚書奏事省悉景翻且以中常侍嚴震參綜可否惟征伐斷斬大事乃呈之斷丁亂翻于是嚴震之權過於主相相息亮翻中山王虎之門可設雀羅矣漢書曰翟公為廷尉賓客填門及廢門外可設雀羅師古注云言其寂静無人行也虎愈怏怏不悅為後虎殺徐光程遐張本怏於兩翻秋趙郭敬南掠江西江西謂邾城以東至歴陽也太尉侃遣其子平西參軍斌斌音彬及南中郎將桓宣乘虚攻樊城悉俘其衆敬旋救樊宣與戰于湼水破之水經注涅水出涅陽縣西北岐棘山東南逕涅陽縣又東南逕安衆縣又東南至新野縣東入于淯涅奴結翻皆得其所掠侃兄子臻及竟陵太守李陽攻新野㧞之敬懼遁去宣遂㧞襄陽侃使宣鎮襄陽宣招懐初附簡刑罸畧威儀勸課農桑或載鉏耒於軺軒鉏立薅所用農器也耒盧對翻手耕曲木也孔穎逹曰耒以曲木為之長六尺六寸底長尺有一寸中央直者三尺有三寸句者二尺有二寸底謂耒下向前曲接耜者頭而著耜耜金銕為之鄭𤣥曰耜者耒之金也廣五寸田器鎡錤之屬軺音遥使者小車駕馬者也軒曲輈也闌板曰軒親帥民芸穫帥讀曰率在襄陽十餘年趙人再攻之宣以寡弱拒守趙人不能勝時人以為亞於祖逖周訪史終言宣守襄陽之功成大將軍壽㓂寧州以其征東將軍費黑為前鋒出廣漢鎮南將軍任回出越嶲以分寧州之兵費扶沸翻任音壬嶲音髓冬十月壽黒至朱提朱提太守董炳城守朱提音銖時寧州刺史尹奉遣建寧太守霍彪引兵助之壽欲逆拒彪黒曰城中食少少詩沼翻宜縱彪入城共消其榖何為拒之壽從之城久不下壽欲急攻之黑曰南中險阻難服當以日月制之待其智勇俱困然後取之溷牢之物何足汲汲也溷與圂同胡困翻圂厠也豕所居也牢亦犬豕所居也言城已受圍如犬豕在圂牢中不患其逸出也鄭氏曰牢閑也必有閑者防禽獸觸齧疏曰養馬者謂之閑養牛羊者謂之牢言閑見其閑衛言牢見其牢固所從言之異其實一物也壽不從攻果不利乃悉以軍事任黒十一月壬子朔進太尉侃為大將軍劒履上殿入朝不趨贊拜不名上時掌翻朝直遥翻侃固辭不受十二月庚戌帝遷于新宮五年作新宮至是而成乃遷居之是嵗凉州僚屬勸張駿稱凉王領秦凉二州牧置公卿百官如魏武晉文故事魏武事見六十七卷漢獻帝建安二十一年晉文事見七十九卷魏元帝咸熈元年駿曰此非人臣所宜言也敢言此者罪不赦然境内皆稱之為王駿立次子重華為世子重直龍翻八年春正月成大將軍李壽㧞朱提董炳霍彪皆降降戸江翻下同壽威震南中丙子趙主勒遣使來修好使疏吏翻好呼到翻詔焚其幣晉雖未能復君父之讐而焚幣一事猶足舒忠臣義士之氣三月寧州刺史尹奉降于成成盡有南中之地大赦以大將軍壽領寧州夏五月甲寅遼東武宣公慕容廆卒六月世子皝以平北將軍行平州刺史督攝部内皝字元真廆第三子廆戸罪翻皝呼廣翻赦繫囚以長史裴開為軍諮祭酒郎中令高詡為𤣥菟太守皝以帶方太守王誕為左長史誕以遼東太守陽騖為才而讓之皝從之以誕為右長史國之興也其臣推賢讓能國之衰也其臣矜已忌賢騖音務趙主勒寢疾中山王虎入侍禁中矯詔羣臣親戚皆不得入疾之増損外無知者又矯詔召秦王宏彭城王堪還襄國勒以宏都督中外諸軍事葢使之鎮鄴堪葢在河南勒疾小瘳見宏驚曰吾使王處藩鎮處昌吕翻正備今日有召王者邪將自來邪有召者當按誅之虎懼曰秦王思慕暫還耳今遣之仍留不遣數日復問之復扶又翻虎曰受詔即遣今已半道矣廣阿有蝗廣阿縣前漢屬鉅鹿郡後漢晉省後魏復置廣阿縣屬南趙郡隋改為大陸縣唐武徳間改為象城縣天寳初改為昭慶縣屬趙州虎密使其子冀州刺史邃帥騎三千遊於蝗所恐勒死有變使邃遊于蝗所若捕蝗者以為外應帥讀曰率騎奇寄翻秋七月勒疾篤遺命曰大雅兄弟宜善相保司馬氏汝曹之前車也前車之覆後車之戒戒其兄弟自相殘也中山王宜深思周霍勿為將來口實謂當如周公霍光之輔幼孤也勒謂此言可以縶虎之手足邪此數語亦徐光程遐為之耳戊辰勒卒年六十中山王虎刼太子𢎞使臨軒収右光祿大夫程遐中書令徐光下廷尉下遐稼翻召邃使將兵入宿衛將即亮翻文武皆奔散𢎞大懼自陳劣弱讓位于虎虎曰君終太子立禮之常也𢎞涕泣固讓虎怒曰若不堪重任天下自有大義何足豫論𢎞乃即位𢎞字大雅勒第二子大赦殺程遐徐光光遐固知禍之及已然亦不料如是之速夜以勒喪潛瘞山谷莫知其處己卯備儀衛虛葬于高平陵勒卒十一日而葬未有如是之速者也虎既潛葬勒其所以為身後之計者亦不過如此卒為女子所告果何益哉瘞於計翻諡曰明帝廟號高祖趙將石聰及譙郡太守彭彪各遣使來降聰時鎮譙城守式又翻降戸江翻聰本晉人冒姓石氏朝廷遣督䕶喬球將兵救之未至聰等為虎所誅慕容皝遣長史勃海王濟等來告喪皝呼廣翻八月趙王𢎞以中山王虎為丞相魏王大單于加九錫單音蟬以魏郡等十三郡為國總攝百揆虎赦其境内立妻鄭氏為魏王后子邃為魏太子加使持節侍中都督中外諸軍事大將軍錄尚書事次子宣為使持節車騎大將軍冀州刺史封河間王使疏吏翻韜為前鋒將軍司𨽻校尉封樂安王遵齊王鑒封代王苞封樂平王徙平原王斌為章武王斌音彬勒文武舊臣皆補散任虎之府寮親屬悉署臺省要職虎居鄴子邃都督中外諸軍宣據信都府寮親屬分領臺省𢎞處尊位特寄坐耳散悉亶翻以鎮軍將軍䕫安領左僕射尚書郭殷為右僕射更命太子宮曰崇訓宮更工衡翻太后劉氏以下皆徙居之選勒宫人及車馬服玩之美者皆入丞相府宇文乞得歸為其東部大人逸豆歸所逐走死于外慕容皝引兵討之軍于廣安廣安在棘城之北逸豆歸懼而請和遂築榆隂安晉二城而還榆隂城盖在大榆河之隂安晉城在威徳城東南成建寧牂柯二郡來降李壽復擊取之牂牁音臧哥降戸江翻復扶又翻下同趙劉太后謂彭城王堪曰先帝甫晏駕丞相遽相陵藉如此陵駕也轢也藉蹈也藉慈夜翻帝祚之亡殆不復久王將若之何堪曰先帝舊臣皆被疎斥軍旅不復由人謂虎諸子皆握兵權也被皮義翻宮省之内無可為者謂宿衛及臺省要職皆虎之府寮親屬無與共謀匡正者臣請奔兖州挾南陽王恢為盟主恢勒少子也時鎮廪丘據廩丘宣太后詔於牧守征鎮使各舉兵以誅暴逆庶幾猶有濟也幾居希翻劉氏曰事急矣當速為之九月堪微服輕騎襲兖州不克南奔譙城騎奇寄翻丞相虎遣其將郭太追之獲堪于城父父音甫送襄國炙而殺之徴南陽王恢還襄國劉氏謀泄虎廢而殺之尊𢎞母程氏為皇太后堪本田氏子數有功數所角翻趙主勒養以為子劉氏有膽畧勒每與之參决軍事佐勒建功業有呂后之風而不妬忌更過之呂后能誅韓信彭越劉氏不能制虎殆不及也趙河東王生鎮闗中石朗鎮洛陽劉𦙍之西奔也石生自洛陽鎮長安朗代生鎮洛陽冬十月生朗皆舉兵以討丞相虎生自稱秦州刺史遣使來降降戸江翻氐帥蒲洪自稱雍州刺史西附張駿咸和四年洪降于虎今以趙亂而叛帥所類翻虎留太子邃守襄國將步騎七萬攻朗于金墉金墉潰獲朗刖而斬之將即亮翻騎奇寄翻刖音月進向長安以梁王挺為前鋒大都督挺虎之干也生遣將軍郭權帥鮮卑涉璝衆二萬為前鋒以拒之帥讀曰率璝公回翻生將大軍繼發軍于蒲阪權與挺戰于潼闗大破之挺及丞相左長史劉隗皆死此劉隗意即自晉奔趙者虎還奔澠池澠彌兖翻枕尸三百餘里枕職任翻鮮卑潛與虎通謀反擊生生不知挺已死懼單騎奔長安權収餘衆退屯渭汭孔安國曰水北曰汭杜預曰水之隈曲曰汭音如鋭翻生遂弃長安匿於雞頭山張守節曰括地志云雞頭山在成州上禄縣東北二十里在長安西南九百六十里酈道元云葢大隴山異名也後漢書隗囂使王孟塞雞頭道即此也按原州平高縣西百里亦有笄頭山在長安西北八百里將軍蔣英據長安拒守虎進兵擊英斬之生麾下斬生以降權奔隴右虎分命諸將屯汧隴汧苦堅翻遣將軍麻秋討蒲洪風俗通麻齊大夫麻嬰之後洪帥戸二萬降于虎帥讀曰率降戸江翻虎迎拜洪光烈將軍前此未有光烈將軍號石虎創置也䕶氐校尉漢有䕶羌校尉虎以此官授洪使之監䕶羣氐洪至長安說虎徙闗中豪桀及氐羌以實東方說輸芮翻曰諸氐皆洪家部曲洪帥以從誰敢違者虎從之徙秦雍民及氐羌十餘萬戸于闗東雍於用翻以洪為龍驤將軍流民都督使居枋頭為苻洪子健自枋頭入闗中張本驤思將翻枋音方以羌帥姚弋仲為奮武將軍西羌大都督使帥其衆數萬徙居清河之灄頭羌帥所類翻灄目涉翻水經注清河過廣川縣東水側有羌壘姚氏之故居也為姚弋仲父子自灄頭起兵張本虎還襄國大赦趙主𢎞命虎建魏臺一如魏武王輔漢故事慕容皝初嗣位用法嚴峻國人多不自安主簿皇甫真切諫不聴皝庶兄建武將軍翰母弟征虜將軍仁有勇畧屢立戰功得士心季弟昭有才蓺皆有寵於廆皝忌之翰歎曰吾受事於先公不敢不盡力幸賴先公之靈所向有功此乃天贊吾國非人力也而人謂吾之所辦以為雄才難制吾豈可坐而待禍邪乃與其子出奔叚氏叚遼素聞其才冀収其用甚愛重之仁自平郭來奔喪漢志平郭縣屬遼東郡晉省晉東夷校尉治襄平崔毖之敗慕容廆以仁鎮遼東治平郭謂昭曰吾等素驕多無禮於嗣君嗣君剛嚴無罪猶可畏况有罪乎昭曰吾輩皆體正嫡於國有分昭自謂與仁皆正室之子分可以得國也分扶問翻兄素得士心我在内未為所疑伺其閒隙除之不難兄趣舉兵以來伺相吏翻閒古莧翻趣讀曰促我為内應事成之日與我遼東男子舉事不克則死不能效建威偷生異域也仁曰善遂還平郭閏月仁舉兵而西或以仁昭之謀告皝皝未之信遣使按驗仁兵已至黄水黄水即潢水在棘城東北距唐營州四百里據載記黄水當在漢遼東郡險瀆縣知事露殺使者還據平郭皝賜昭死遣軍祭酒封奕慰撫遼東以高詡為廣武將軍將兵五千與庶弟建武將軍幼稚廣威將軍軍寧逺將軍汗司馬遼東佟壽共討仁與仁戰於汶城北佟徒冬翻姓也汶漢古縣屬遼東郡前書作文皝兵大敗幼稚軍皆為仁所獲壽嘗為仁司馬遂降於仁降戸江翻下同前大農孫機等舉遼東城以應仁孫機盖王官之避地遼東者遼東城即襄平城封奕不得入與汗俱還東夷校尉封抽䕶軍平原乙逸乙姓也逸名也姓譜商湯宇天乙支孫以為氏遼東相太原韓矯皆弃城走於是仁盡有遼東之地叚遼及鮮卑諸部皆與仁遥相應援皝追思皇甫真之言以真為平州别駕皝領平州刺史以真為别駕十二月郭權據上邽遣使來降京兆新平扶風馮翊北地皆應之初張駿欲假道於成以通表建康成主雄不許駿乃遣治中從事張淳稱藩於成以假道雄偽許之將使盜覆諸東峽三峽在成都之東故云東峽蜀人橋贊密以告淳淳謂雄曰寡君使小臣行無迹之地蜀不許凉人假道則蜀地前此無凉人之迹萬里通誠於建康者以陛下嘉尚忠義能成人之美故也若欲殺臣者當斬之都市宣示衆目曰凉州不忘舊徳通使琅邪江左自琅邪中興故以稱之使疏吏翻主聖臣明發覺殺之如此則義聲逺播天下畏威今使盜殺之江中威刑不顯何足以示天下乎雄大驚曰安有此邪司𨽻校尉景騫蜀置司𨽻校尉於成都言於雄曰張淳壯士請留之雄曰壯士安肯留且試以卿意觀之騫謂淳曰卿體豐大天熱可且遣下吏小住須凉須待也淳曰寡君以皇輿播越梓宮未返謂懐愍蒙塵卒之見害梓宮未返也生民塗炭莫之振救振舉也故遣淳通誠上都上都謂建康也所論事重非下吏所能傳使下吏可了則淳亦不來矣雖火山湯海猶將赴之豈寒暑之足憚哉雄謂淳曰貴主英名葢世土險兵彊何不亦稱帝自娯一方淳曰寡君祖考以來世篤忠貞以讐恥未雪枕戈待旦枕職任翻何自娯之有雄甚慙曰我之祖考本亦晉臣遭天下大亂與六郡之民避難此州事見八十二卷惠帝元康八年難乃旦翻為衆所推遂有今日琅邪若能中興大晉於中國者亦當帥衆輔之帥讀曰率厚為淳禮而遣之淳卒致命於建康卒子恤翻致命致其君命也長安之失守也事見八十九卷愍帝建興四年敦煌計吏耿訪自漢中入江東耿訪敦煌所遣上計吏留長安未還而長安陷且河隴路絶因南入漢中自漢東下至建康敦徒門翻屢上書請遣大使慰撫凉州使疏吏翻下同朝廷以訪守持書御史拜張駿鎮西大將軍選隴西賈陵等十二人配之配侑也訪至梁州道不通以詔書付賈陵詐為賈客以達之賈音古是嵗陵始至凉州駿遣部曲督王豐等報謝九年春正月趙改元延熈詔以郭權為鎮西將軍雍州刺史雍於用翻仇池王楊難敵卒子毅立自稱龍驤將軍左賢王下辨公以叔父堅頭之子盤為冠軍將軍右賢王河池公驤思將翻辨步莧翻冠古玩翻遣使來稱藩二月丁卯詔遣耿訪王豐齎印綬授張駿大將軍都督陜西雍秦凉州諸軍事陜式冉翻自是每嵗使者不絶仇池稱藩梁凉之路通也慕容仁以司馬翟楷領東夷校尉前平州别駕龎鑒領遼東相龎皮江翻叚遼遣兵襲徒河不克復遣其弟蘭與慕容翰共攻栁城栁城縣漢屬遼西郡晉省唐為營州治所復扶又翻栁城都尉石琮城大慕輿埿并力拒守城大猶城主也一城之長故曰城大埿與泥同蘭等不克而退遼怒切責蘭等必令㧞之休息二旬復益兵來攻復扶又翻士皆重袍䝉楯重直龍翻楯食尹翻作飛梯飛梯即雲梯四面俱進晝夜不息琮埿拒守彌固殺傷千餘人卒不能㧞卒子恤翻慕容皝遣慕容汗及司馬封奕等共救之皝戒汗曰賊氣銳勿與争鋒汗性驍果以千餘騎為前鋒驍堅堯翻騎奇寄翻直進封奕止之汗不從與蘭遇于牛尾谷牛尾谷在栁城北汗兵大敗死者大半奕整陳力戰陳讀曰陣故得不没蘭欲乘勝窮追慕容翰恐遂滅其國止之曰夫為將當務慎重審已量敵量音良非萬全不可動今雖挫其偏師未能屈其大埶皝多權詐好為潛伏好呼到翻若悉國中之衆自將以拒我將即亮翻我縣軍深入縣讀曰懸衆寡不敵此危道也且受命之日止求此捷若違命貪進萬一取敗功名俱喪喪息浪翻何以返面蘭曰此已成禽無有餘理謂以事理策之皝必成禽無復遺餘也卿正慮遂滅卿國耳今千年在東若進而得志吾將迎之以為國嗣終不負卿使宗廟不祀也千年者慕容仁小字也翰曰吾投身相依無復還理復扶又翻國之存亡於我何有但欲為大國之計且相為惜功名耳為于偽翻乃命所部欲獨還蘭不得已而從之史言翰雖身在外乃心宗國三月成主雄分寧州置交州成分寧州之興古永昌牂柯越嶲夜郎等郡為交州以霍彪為寧州刺史㸑深為交州刺史趙丞相虎遣其將郭敖及章武王斌帥步騎四萬西擊郭權軍于華隂夏四月上邽豪族殺權以降斌音彬帥讀曰率騎奇寄翻華戸化翻降戸江翻虎徙秦州三萬餘戸于青并二州長安人陳良夫奔黑羌羌之别種有青羌黒羌與北羌王薄句大等侵擾北地馮翊句音鉤章武王斌樂安王韜合擊破之句大奔馬蘭山郭敖乘勝逐北為羌所敗敗補邁翻死者什七八斌等収軍還三城魏収地形志後魏太和初分雁門之廣武朔方之沃野置編城郡治廣武縣縣有三城偏城虎遣使誅郭敖秦王宏有怨言以其父疾而虎矯詔召之至于失職也虎幽之慕容仁自稱平州刺史遼東公長沙桓公陶侃晚年深以滿盈自懼不預朝權朝直遥翻屢欲告老歸國欲歸長沙國也佐吏等苦留之六月侃疾篤上表遜位遣左長史殷羨奉送所假節麾幢曲葢臨按節麾者敵之際三軍視以為進退者也幢幡幢方言曰幢翳也楚曰翿闗東西皆曰幢文選注幢以羽葆為之釋名曰幢童也其狀童童然幢傳江翻曲葢者葢為曲柄世說謝靈運好戴曲柄笠孔隱士曰何不能遺曲葢之貌晉制諸公任方面者皆給節麾緹幢曲葢侍中貂蟬太尉章章印章也荆江雍梁交廣益寧八州刺史印傳棨㦸自此以上皆朝廷所授故奉送之雍於用翻傳株戀翻棨音啓軍資器仗牛馬舟船皆有定簿封印倉庫侃自加管鑰以後事付右司馬王愆期加督䕶統領文武史言陶侃綜理精密雖病不亂甲寅輿車出臨津就船將歸長沙顧謂愆期曰老子婆娑正坐諸君娑桑何翻婆娑肢體緩縱不取之貌侃言不得早退至于困乏如此正坐參佐苦留之也乙卯薨於樊谿樊谿在武昌西三里北注大江觀陶侃在西藩顛末豈有非望之圖哉晉史所記决指之事折翼之夢葢庾亮之黨傳致之耳侃在軍四十一年惠帝太安二年侃擊張昌至是年凡四十一年明毅善斷斷丁亂翻識察纎密人不能欺自南陵迄于白帝南陵在宣城郡界梁置南陵郡陳置北江州於其地葢臨江渚江州東界盡於南陵今宣州南陵縣非古之南陵戌也自南陵迄于白帝總言侃所統大界宋白曰南陵本漢春穀縣地後併于湖縣尋又屬繁昌梁武帝始置南陵縣屬南陵郡臨江有城基見存去今縣一百三十里數千里中路不拾遺及薨尚書梅陶與親人曹識書曰親人其所親者也陶公機神明鑒似魏武忠順勤勞似孔明陸抗諸人不能及也謝安每言陶公雖用法而恒得法外意史言陶侃為名流所推重如此恒戸登翻安鯤之從子也謝鯤見九十二卷元帝永昌元年從才用翻成主雄生瘍於頭瘍余章翻頭瘡曰瘍身素多金創矢刃所傷為金創創初良翻及病舊㾗皆膿潰諸子皆惡而逺之惡烏路翻逺于願翻獨太子班晝夜侍側不脱衣冠親為吮膿為于偽翻吮徂兖翻雄召大將軍建寧王壽受遺詔輔政丁卯雄卒年六十一載記雄卒在去年太子班即位班字世文雄兄蕩之子也以建寧王壽錄尚書事政事皆委於壽及司徒何㸃尚書王􅉞􅉞古回翻班居中行喪禮一無所預李班豈可不謂之仁孝哉然不能包周身之防死於李越之手末俗澆漓固不可拘拘於古禮以啓奸非至于殞身亂國也辛未加平西將軍庾亮征西將軍假節都督江荆豫益梁雍六州諸軍事領江豫荆三州刺史鎮武昌陶侃既没庾亮始專制上流雍於用翻亮辟殷浩為記室㕘軍浩羡之子也與豫章太守褚裒裒蒲侯翻丹陽丞杜乂皆以識度清逺善談老易老易老子及易也擅名江東而浩尤為風流所宗裒䂮之孫禇䂮見七十七卷魏元帝景元元年䂮離灼翻乂錫之子也杜錫見八十三卷惠帝元康九年桓彛嘗謂裒曰季野有皮裏春秋禇裒字季野言其外無臧否否音鄙而内有褒貶也謝安曰裒雖不言而四時之氣亦備矣秋八月王濟還遼東詔遣侍御史王齊祭遼東公廆又遣謁者徐孟䇿拜慕容皝鎮軍大將軍平州刺史大單于遼東公持節承制封拜一如廆故事船下馬石津自建康出大江至于海轉料角至登州大洋東北行過大謝島龜歆島淤島烏胡島三百里北度烏湖海至馬石山東之都里鎮馬石津即此地也皆為慕容仁所留九月戊寅衛將軍江陵穆公陸􅁮卒成主雄之子車騎將軍越屯江陽奔喪至成都以太子班非雄所生意不服與其弟安東將軍期謀作亂班弟玝勸班遣越還江陽以期為梁州刺史鎮葭萌葭萌即晉夀之地玝阮古翻班以未葬不忍遣推心待之無所疑閒閒古莧翻遣玝出屯于涪涪音浮冬十月癸亥朔越因班夜哭弑之於殯宮卒如李驤之言菆塗曰殯將遷𦵏以賓遇之也并殺班兄領軍將軍都矯太后任氏令罪狀班而廢之任音壬初期母冉氏賤任氏母養之期多才蓺有令名及班死衆欲立越越奉期而立之甲子期即皇帝位期字世運雄第四子也諡班曰戾太子以越為相國封建寧王加大將軍壽大都督徙封漢王皆錄尚書事以兄霸為中領軍鎮南大將軍弟保為鎮西大將軍汶山太守汶讀曰岷從兄始為征東大將軍代越鎮江陽據載記始特之長子於期為伯父於壽為從兄從才用翻丙寅葬雄於安都陵諡曰武皇帝廟號太宗始欲與壽共攻期壽不敢發始怒反譖壽於期請殺之期欲藉壽以討李玝故不許遣壽將兵向涪壽先遣使告玝以去就利害開其去路玝遂來奔詔以玝為巴郡太守期以壽為梁州刺史屯涪為李壽自涪舉兵廢李期張本趙主𢎞自齎璽綬詣魏宮石虎為魏王其所居稱魏宮璽斯氏翻綬音受請禪位於丞相虎虎曰帝王大業天下自當有議何為自論此邪𢎞流涕還宮謂太后程氏曰先帝種真無復遺矣種章勇翻復扶又翻于是尚書奏魏臺請依唐虞禪讓故事此趙朝尚書奏也虎曰𢎞愚暗居喪無禮便當廢之何禪讓也十一月虎遣郭殷入宮廢𢎞為海陽王𢎞安步就車容色自若謂羣臣曰庸昧不堪纂承大統夫復何言復扶又翻羣臣莫不流涕宮人慟哭羣臣詣魏臺勸進虎曰皇帝者盛徳之號非所敢當且可稱居攝趙天王鴻考異曰三十國晉春秋虎即位改元永熈陳大統厯云石虎即位改建平五年為延興明年改建武按三十國晉春秋不記𢎞改元延熈虎之立實延熈元年也故誤云永熈𢎞既號延熈虎安肯稱永熈陳鴻云虎改建平五年為延興即是𢎞踰年不改元也恐鴻說誤幽𢎞及太后程氏秦王宏南陽王恢于崇訓宮尋皆殺之虎更太子宮曰崇訓宮𢎞時年二十一西羌大都督姚弋仲稱疾不賀虎累召之乃至正色謂虎曰弋仲常謂大王命世英雄奈何把臂受託而返奪之邪虎曰吾豈樂此哉樂音洛顧海陽年少少詩照翻恐不能了家事故代之耳心雖不平然察其誠實亦不之罪虎以䕫安為侍中太尉守尚書令郭殷為司空韓晞為尚書左僕射魏郡申鐘為侍中郎闓為光祿大夫闓苦亥翻又音開王波為中書令文武封拜各有差虎行如信都復還襄國載記曰虎以讖文天子當從東北來于是備法駕行自信都而還以應之天子當從東北來盖謂慕容氏將從遼碣入中國也秦始皇東游以厭天子氣初不能遏止漢高之興慕容皝討遼東甲申至襄平遼東人王岌密信請降師進入城翟楷龎鑒單騎走居就新昌等縣皆降居就新昌皆屬遼東郡降戸江翻下同皝欲悉阬遼東民高詡諌曰遼東之叛實非本圖直畏仁凶威不得不從今元惡猶存元惡謂仁也始克此城遽加夷滅則未下之城無歸善之路矣皝乃止分徙遼東大姓於棘城以杜羣為遼東相安輯遺民十二月趙徐州從事蘭陵朱縱斬刺史郭祥以彭城來降趙將王朗攻之縱奔淮南慕容仁遣兵襲新昌督䕶新興王㝢擊走之遂徙新昌入襄平遼東治襄平徙新昌吏民入襄平所以杜仁闚􅎿掩襲之心㝢王矩翻咸康元年春正月庚午朔帝加元服沈約禮志曰古者無天子冠禮故筮日筮賓冠於阼以著代醮於客位三加彌尊皆士禮耳漢順帝冠兼用曹褒新禮褒新禮今不存禮儀志又云乘輿初加緇布進賢次爵弁武弁次通天皆於高廟江左諸帝將冠金吾宿設百僚陪位又豫於殿上鋪大牀御府令奉冕幘簪導衮服以授侍中常侍太尉加幘太保加冕將加冕太尉跪讀祝文曰令月吉日始加元服皇帝穆穆思𢎞衮職欽若昊天六合是式率遵祖考永永無極眉壽無期介兹景福加冕訖侍中繋𤣥紞侍中脫絳紗服加㐮服冠事畢太保率羣臣奉觴上壽王以下三稱萬嵗乃退鄭樵曰用魏儀一加既加元服拜于太廟大赦改元成趙皆大赦成改元玉恒恒戸登翻趙改元建武成主期立皇后閻氏以衛將軍尹奉為右丞相驃騎將軍尚書令王􅉞為司徒驃匹妙翻􅉞古回翻趙王虎命太子邃省可尚書奏事省悉景翻惟祀郊廟選牧守征伐刑殺乃親之虎好治宮室鸛雀臺崩鸛雀臺在鄴即魏武所起銅雀臺好呼到翻殺典匠少府任汪典匠少府即漢將作大匠之職也少詩照翻任音壬復使修之倍於其舊邃保母劉芝封宜城君闗預朝權受納賄賂求仕進者多出其門朝直遥翻慕容皝置左右司馬以司馬韓矯軍祭酒封奕為之司徒導以羸疾不堪朝㑹羸倫為翻朝直遥翻三月乙酉帝幸其府與羣臣宴于内室拜導并拜其妻曹氏侍中孔坦密表切諫以為帝初加元服動宜顧禮帝從之坦又以帝委政於導從容言曰陛下春秋已長聖敬日躋從千容翻長知兩翻日躋猶日進也宜博納朝臣諮諏善道諏遵須翻導聞而惡之惡烏路翻出坦為廷尉坦不得意以疾去職丹陽尹桓景為人謟巧導親愛之㑹熒惑守南斗經旬晉天文志南斗六星天廟也丞相太宰之位導謂領軍將軍陶回曰斗揚州之分天文志斗牛女揚州九江入斗一度丹楊入斗十六度分扶問翻吾當遜位以厭天譴厭一葉翻回曰公以明徳作輔而與桓景造膝造七到翻使熒惑何以退舍導深愧之導辟太原王濛為掾濛莫紅翻掾于絹翻王述為中兵屬晉公府諸曹有參軍有掾有屬述昶之曽孫也王昶仕魏鎮荆州以功名自見昶丑兩翻濛不修小亷而以清約見稱與沛國劉惔齊名友善惔徒甘翻惔常稱濛性至通而自然有節濛曰劉君知我勝我自知當時稱風流者以惔濛為首述性沈静每坐客辯論蠭起而述處之恬如也沈持林翻坐徂臥翻處昌呂翻年三十尚未知名人謂之癡導以門地辟之昶之子湛湛之子承世有高名述承子也既見唯問江東米價述葢自東呉至建康述張目不荅導曰王掾不癡人何言癡也嘗見導每發言一坐莫不贊美坐徂臥翻述正色曰人非堯舜何得每事盡善導改容謝之趙王虎南遊臨江而還還從宣翻又如字有遊騎十餘至歴陽歴陽太守袁耽表上之上時掌翻不言騎多少朝廷震懼司徒導請出討之夏四月加導大司馬假黄鉞都督征討諸軍事癸丑帝觀兵廣莫門廣莫門建康城北門也分命諸將救歴陽及戍慈湖牛渚蕪湖司空郗鑒使廣陵相陳光將兵入衛京師俄聞趙騎至少又已去少詩沼翻戊午解嚴王導解大司馬袁耽坐輕妄免官趙征虜將軍石遇攻桓宣於襄陽不克大旱㑹稽餘姚米斗五百㑹工外翻秋七月慕容皝立子雋為世子九月趙王虎遷都于鄴趙王勒定都襄國虎遷于鄴大赦初趙主勒以天竺僧佛圖澄豫言成敗數有驗敬事之及虎即位奉之尤謹衣以綾錦乘以彫輦彫輦雕鏤以為飾數所角翻衣於既翻朝㑹之日太子諸公扶翼上殿朝直遥翻上時掌翻主者唱大和尚主者謂掌朝儀者也衆坐皆起使司空李農旦夕問起居太子諸公五日一朝諸公虎諸子也虎稱天王降諸子封王者爵為公國人化之率多事佛澄之所在無敢向其方面涕唾者争造寺廟削髪出家虎以其真偽雜糅糅汝救翻或避賦役為姦宄宄音軌乃下詔問中書曰佛國家所奉里閭小人無爵秩者應事佛不不讀曰否著作郎王度等晉職官志曰著作郎周左史之任也漢東京圖籍在東觀有其名尚未有官魏明帝太和中詔置著作郎於此始有其官𨽻中書省及晉受命制曰著作舊屬中書而祕書既典文籍今改中書省著作為祕書著作于是改𨽻祕書省自後别置省而猶𨽻祕書議曰王者祭祀典禮具存佛外國之神非天子諸華所應祠奉漢氏初傳其道事見四十五卷漢明帝永平八年唯聴西域人立寺都邑以奉之漢人初謂官府為寺後漢自西域白馬駞經來初止于鴻臚寺遂取寺名創置白馬寺漢人皆不得出家魏世亦然今宜禁公卿以下毋得詣寺燒香禮拜其趙人為沙門者皆返初服謂使還服華人之服虎詔曰朕生自邊鄙忝君諸夏夏戸雅翻至于饗祀應從本俗其夷趙百姓樂事佛者特聴之樂音洛趙章武王斌帥精騎二萬并秦雍二州兵以討薄句大平之去年斌等為薄句大所敗斌音彬帥讀曰率騎奇寄翻雍於用翻句音鉤成太子班之舅羅演與漢王相天水上官澹李壽封漢王相息亮翻澹徒覽翻謀殺成主期立班子事覺期殺演澹及班母羅氏期自以得志輕諸舊臣信任尚書令景騫尚書姚華田褒中常侍許涪等涪音浮刑賞大政皆决於數人希復闗公卿復扶又翻褒無他才嘗勸成主雄立期為太子故有寵由是紀綱隳紊紊音問雄業始衰冬十月乙未朔日有食之慕容仁遣王齊等南還去年齊等為慕容仁所留齊等自海道趣棘城趣七喻翻齊遇風不至十二月徐孟等至棘城慕容皝始受朝命朝直遥翻段氏宇文氏各遣使詣慕容仁館于平郭城外皝帳下督張英將百餘騎閒道潜行掩擊之閒古莧翻斬宇文氏使十餘人生擒段氏使以歸是嵗明帝母建安君荀氏卒荀氏在禁中尊重同於太后詔贈豫章郡君荀氏元帝宮人也生明帝自以位卑每懷怨望為帝所譴漸見疎薄及明帝即位封建安君別立第宅太寧元年迎還臺内供奉隆厚及帝立尊重同於太后代王翳槐以賀蘭藹頭不恭藹頭翳槐舅有擁䕶之功事見九十三卷咸和二年至四年逐紇那立翳槐又賀蘭部也挾親恃功所以不恭將召而戮之諸部皆叛代王紇那自宇文部入諸部復奉之紇那出奔見上卷咸和四年復扶又翻翳槐奔鄴趙人厚遇之初張軌及二子寔茂雖保據河右而軍旅之事無嵗無之及張駿嗣位境内漸平駿勤修庶政總御文武咸得其用民富兵彊逺近稱之以為賢君駿遣將楊宣伐龜兹鄯善於是西域諸國焉耆于窴之屬皆詣姑臧朝貢龜兹音丘慈鄯上扇翻窴徒賢翻又徒見翻駿於姑臧南作五殿駿起謙光殿四面各起一殿東曰宜陽青殿以春三月居之南曰朱陽赤殿夏三月居之西曰政刑白殿秋三月居之北曰𤣥武黑殿冬三月居之章服器物皆依方色官屬皆稱臣駿有兼秦雍之志雍於用翻遣參軍麴䕶上疏以為勒雄既死虎期繼逆兆庶離主離力智翻漸冉經世先老消落後生不識慕戀之心日逺日忘乞敕司空鑒征西亮等汎舟江沔首尾齊舉郗鑒時鎮京口庾亮時鎮武昌沔彌兖翻二年春正月辛巳彗星見于奎婁西方奎十六星天之武庫也主以兵禁暴又主溝瀆婁三星為天獄主苑牧犧牲供給郊祀奎婁胃魯徐州分彗祥嵗翻又旋芮翻又徐醉翻見賢遍翻慕容皝將討慕容仁司馬高詡曰仁叛弃君親民神共怒前此海未嘗凍自仁反以來連年凍者三矣且仁專備陸道天其或者欲使吾乘海氷以襲之也皝從之羣僚皆言涉氷危事不若從陸道皝曰吾計已决敢沮者斬沮在呂翻壬午皝帥其弟軍師將軍評等自昌黎東踐氷而進皝呼廣翻帥讀曰率下同凡三百餘里至歴林口歴林口海浦之口捨輜重輕兵趣平郭重直用翻趣七喻翻下同去城七里候騎以告仁騎奇寄翻仁狼狽出戰張英之俘二使也事見上年使疏吏翻仁恨不窮追及皝至仁以為皝復遣偏師輕出冦抄復扶又翻抄楚交翻不知皝自來謂左右曰今兹當不使其匹馬得返矣乙未仁悉衆陳于城之西北慕容軍帥所部降於皝咸和八年軍為仁所執陳讀曰陣降戸江翻仁衆沮動沮在呂翻皝從而縱擊大破之仁走其帳下皆叛遂擒之皝先為斬其帳下之叛者為于偽翻然後賜仁死丁衡游毅孫機等皆仁所信用也皝執而斬之王氷自殺慕容幼慕容稚佟壽郭充翟楷龎鑒皆東走幼中道而還皝兵追及楷鑒斬之壽充奔高麗麗力知翻自餘吏民為仁所詿誤者詿古賣翻皝皆赦之封高詡為汝陽侯二月尚書僕射王彬卒辛亥帝臨軒遣使備六禮逆故當陽侯杜乂女陵陽為皇后婚有六禮一曰納采者將為婚必先媒通其言乃後使人納其采擇之禮用雁為贄取其隂陽徃來之義也二曰問名者問名以卜其吉凶也三曰納吉者卜於廟得吉兆復使徃告婚姻之事也四曰納徴用𤣥纁不用雁五曰請期由夫家卜得吉日使人徃告之六曰親迎壻徃女家御輪三周御者代之壻自乘其車而先以導婦歸大赦羣臣畢賀夏六月叚遼遣中軍將軍李詠襲慕容皝詠趣武興武興城在今支東都尉張萌擊擒之遼别遣叚蘭將步騎數萬屯栁城西回水回水載記作曲水水經注陽樂水出上谷且居縣東北流逕女祁縣世謂之横水又謂之陽曲水又濡河從塞外來西北逕禦夷鎮城又東北逕孤山南又東南水流回曲謂之曲河鎮又據載記曲水當在好城西北將即亮翻騎奇寄翻宇文逸豆歸攻安晉以為蘭聲援皝帥步騎五萬向栁城蘭不戰而遁皝引兵北趣安晉咸安八年皝築安晉城趣七喻翻逸豆歸棄輜重走重直用翻皝遣司馬封奕帥輕騎追擊大破之皝謂諸將曰二虜恥無功必將復至復扶又翻宜於栁城左右設伏以待之乃遣封奕帥騎數千伏於馬兠山三月叚遼果將數千騎來冦抄抄楚交翻奕縱擊大破之斬其將榮伯保前廷尉孔坦卒坦先以疾解廷尉故曰前坦疾篤庾氷省之流涕省悉景翻坦慨然曰大丈夫將終不問以濟國安民之術乃為兒女子相泣邪氷深謝之九月慕容皝遣長史劉斌兼郎中令遼東陽景送徐孟等還建康晉制王國乃有郎中令皝未為王而僭置是官斌音彬冬十月廣州刺史鄧岳遣督䕶王隨等擊夜郎興古皆克之懐帝永嘉五年王遜分牂柯朱提建寧立夜郎郡太康地志曰蜀劉氏分建寧牂柯立興古郡加岳督寧州成王期以從子尚書僕射武陵公載有雋才忌之從才用翻誣以謀反殺之十一月詔建威將軍司馬勲將兵安集漢中成漢王壽擊敗之敗補邁翻壽遂置漢中守宰戍南鄭而還索頭郁鞠帥衆三萬降于趙索頭鮮卑種言索頭以别於黒匿郁鞠以其辮髪故謂之索頭索昔各翻帥讀曰率降戸江翻趙拜郁鞠等十三人為親趙王散其部衆於冀青等六州趙王虎作太武殿於襄國作東西宮於鄴東宮以居太子邃西宮虎自居之十二月皆成太武殿基高二丈八尺縱六十五步廣七十五步甃以文石高居號翻縱子容翻廣古曠翻甃側救翻下穿伏室伏室即窟室也置衛士五百人以漆灌瓦金璫銀楹司馬相如羽獵賦華榱璧璫注云璧璫以玉為掾頭當即所謂璇題者也三輔黄圖注云以璧飾瓦之當也又琅璫鐸也杜甫詩風動金琅璫此金璫盖以金飾瓦之當也楹柱也璫音當珠簾玉壁窮極工巧殿上施白玉牀流蘇帳為金蓮華以冠帳頂華讀曰花冠古玩翻又作九殿于顯陽殿後選士民之女以實之服珠玉被綺縠者萬餘人被皮義翻教宮人占星氣馬步射置女太史雜伎工巧皆與外同與外同者教宮人使執作如男子也伎渠綺翻以女騎千人為鹵簿車駕法從次第曰鹵簿騎奇寄翻皆著紫綸巾著陟畧翻陸徳明曰綸繩也葢合絲為綸其狀如䋲染紫以織巾也今鎮江金壇人能織線畨羅亦合絲為線以織之熟錦袴金銀鏤帶鏤郎豆翻五文織成鞾五文五色成文也廣雅曰天竺國出細織成魏畧曰大秦國用水羊毛木皮野繭絲作織成皆好此以五采織成為鞾也鞾許戈翻執羽儀羽儀氅眊之屬鳴鼓吹鼔吹軍樂也吹尺瑞翻遊宴以自隨於是趙大旱金一斤直粟二斗百姓嗷然而虎用兵不息百役並興使牙門張彌徙洛陽鐘虡九龍翁仲銅駞飛亷於鄴鐘虡九龍翁仲銅駞飛亷皆魏明帝所鑄虡音巨載以四輪纒􅡞車轍廣四尺深二尺攷之字書無􅡞字當作輞音罔車輮也轍車輪所碾跡也廣古曠翻深式禁翻一鐘没於河募浮没三百人浮没在水中能浮能没者入河繫以竹絙絙居登翻又居鄧翻大索也用牛百頭鹿櫨引之乃出鹿櫨形如汲水木立兩柱横木貫柱令圓滑可轉繫絙於横木絞而引之櫨音盧造萬斛之舟以濟之既至鄴虎大悅為之赦二嵗刑為于偽翻賚百官穀帛賜民爵一級又用尚方令解飛之言解姓也飛名也解戸買翻於鄴南投石於河以作飛橋功費數千萬億橋竟不成役夫飢甚乃止使令長帥民入山澤采橡及魚以佐食復為權豪所奪令力定翻長知兩翻帥讀曰率復扶又翻民無所得初日南夷帥范稚有奴曰范文帥所類翻常隨商賈徃來中國賈音古後至林邑教林邑王范逸作城郭宮室器械逸愛信之林邑國本漢象林縣馬援鑄銅柱之處也漢末縣功曹子區連殺今自立為王子孫相承其後無嗣外孫范熊繼立逸熊子也使為將將即亮翻文遂譖逸諸子或徙或逃是嵗逸卒文詐迎逸子於它國置毒於椰酒而殺之椰木出交趾高數十丈葉背面相似瓊臺志曰椰子無時而生樹似檳榔葉如鳯尾實大如爪剖之其中有酒其皮可為飲器交州記曰椰子生南海狀如海梭子大如椀外有麄皮如大腹子豆蔻之類中有漿似酒飲之得醉爾雅翼椰木似檳榔無枝條高十餘尋葉在其末如束蒲實大如瓠繫在樹頭實外有皮如胡桃核裏有膚白如雪厚半寸如猪膏味美如胡桃膚裏有汁升餘清如水美如蜜飲之可以愈渴核作飲器椰以嗟翻文自立為王於是出兵攻大岐界小岐界式僕徐狼屈都乾魯扶單等國皆滅之有衆四五萬遣使奉表入貢使疏吏翻趙左校令成公叚作庭燎於杠末姓譜衛成公之後為成公氏予按春秋之時魯晉皆有成公豈獨衛成公之後得專以為氏哉杠古雙翻高十餘丈上盤置燎古之人君昧旦視朝故設庭燎鄭氏云在地曰燎執之曰燭又云樹之門外曰大燭於内曰庭燎皆是照衆為明今成公叚懸盤於杠以置燎創意為之非有古法也燎力照翻徐又力燒翻高居傲翻下盤置人趙王虎試而悅之三年春正月庚辰趙太保䕫安等文武五百餘人入上尊號上時掌翻庭燎油灌下盤死者二十餘人記考異曰載云七人今從三十國春秋趙王虎惡之惡烏路翻腰斬成公叚辛巳虎依殷周之制稱大趙天王即位於南郊大赦立其后鄭氏為天王皇后古者稱王后稱皇帝后稱皇后未有天王皇后之稱也太子邃為天王皇太子古之王者其嫡長曰世子秦漢稱皇帝立皇太子未有天王皇太子之稱也諸子為王者皆降為郡公宗室為王者降為縣侯百官封署各有差國子祭酒袁􅉞􅉞公回翻太常馮懐以江左寖安請興學校校乃教翻帝從之辛卯立太學徴集生徒而士大夫習尚老莊儒術終不振瓌渙之曽孫也漢末劉備舉袁渙茂才後仕魏行御史大夫事三月慕容皝於乙連城東築好城以逼乙連乙連城叚國之東境也在曲水之西留折衝將軍蘭勃守之夏四月叚遼以車數千兩輸乙連粟兩力讓翻乘也蘭勃擊而取之六月遼又遣其從弟揚威將軍屈雲將精騎夜襲皝子遵於興國城興國城葢慕容氏所築從才用翻將即亮翻騎奇寄翻遵擊破之初北平陽裕事叚疾陸眷及遼五世疾陸眷涉復辰末柸牙遼凡五世皆見尊禮遼數與皝相攻數所角翻裕諌曰親仁善鄰國之寳也左傳陳五父之言况慕容氏與我世婚迭為甥舅廆皝皆娶于叚氏葢前此慕容氏亦女于叚也皝有才徳而我與之搆怨戰無虛月百姓彫弊利不補害臣恐社稷之憂將由此始願兩追前失通好如初好呼到翻下好妝同以安國息民遼不從出裕為北平相相息亮翻趙太子邃素驍勇驍堅堯翻趙王虎愛之常謂羣臣曰司馬氏父子兄弟自相殘滅故使朕得至此如朕有殺阿鐵理否阿鐵邃小字也阿讀從安入聲既而邃驕淫殘忍好妝飾美姬斬其首洗血置盤上與賓客傳觀之又烹其肉共食之好呼到翻河間公宣樂安公韜皆有寵於虎邃疾之如讎虎荒耽酒色喜怒無常使邃省可尚書事省悉景翻每有所闗白虎恚曰此小事何足白也時或不聞又恚曰何以不白恚於避翻恨怒也誚責笞棰誚才笑翻棰止蘂翻月至再三邃私謂中庶子李顔等曰官家難稱稱天子為官家始見於此西漢謂天子為縣官東漢謂天子為國家故兼而稱之或曰五帝官天下三王家天下故兼稱之難稱尺證翻吾欲行冒頓之事事見十一卷漢高帝六年冒莫北翻卿從我乎顔等伏不敢對秋七月邃稱疾不視事潜帥宮臣文武五百餘騎飲於李顔别舍帥讀曰率騎奇寄翻因謂顔等曰我欲至冀州冀州治信都殺河間公有不從者斬行數里騎皆逃散顔叩頭固諫邃亦昏醉而歸其母鄭氏聞之私遣中人誚讓邃邃怒殺之誚才笑翻佛圖澄謂虎曰陛下不宜數徃東宮數所角翻虎將視邃疾思澄言而還既而瞋目大言曰瞋七人翻我為天下主父子不相信乎乃命所親信女尚書徃察之邃呼前與語因抽劒擊之虎怒収李顔等詰問顔具言其狀殺顔等三十餘人幽邃于東宮既而赦之引見太武東堂水經注曰魏武居鄴為北宮宮有文昌殿石氏於故殿處起東西太武二殿見賢遍翻邃朝而不謝俄頃即出虎使謂之曰太子應朝中宮豈可遽去朝直遥翻邃徑出不顧虎大怒廢邃為庶人其夜殺邃文考異曰燕書明紀云咸康四年四月石虎至燕城下㑹鄴使至太子邃在後恣酒入宮殺害石主大恐狼狽引還又云初帳下呉胄使鄴還說四月浴佛日行像詣宮石太子邃騎出迎像徃來馳騁無有儲君體王曰古者觀威儀以定禍福此子虎之副貳而輕佻無禮將不得其死然及石主東歸留邃監國荒敗内亂以致誅戮按十六國晉春秋殺邃皆在咸康三年燕書恐誤今從十六國晉春秋及其妃張氏并男女二十六人同埋於一棺誅其宮臣支黨二百餘人廢鄭后為東海太妃立其子宣為天王皇太子宣母杜昭儀為天王皇后安定侯子光自稱佛太子云從大秦國來當王小秦國聚衆數千人於杜南山京兆杜陵縣之南山也自稱大皇帝改元龍興石廣討斬之九月鎮軍左長史封奕等帝拜皝鎮軍大將軍皝以奕為左長史勸慕容皝稱燕王皝從之於是備置羣司以封奕為國相相息亮翻韓壽為司馬裴開為奉常陽騖為司𨽻王㝢為太僕李洪為大理杜羣為納言令宋該劉睦石琮為常伯皇甫真陽協為冗騎常侍納言令晉之尚書令常伯晉之侍中冗騎常侍晉之散騎常侍冗而隴翻騎奇寄翻宋晃平熈張泓為將軍封裕為記室監洪臻之孫李臻見八十七卷懷帝永嘉三年晃奭之子也宋奭見八十八卷愍帝建興元年冬十月丁卯皝即燕王位大赦十一月甲寅追尊武宣公為武宣王廆諡武宣公夫人叚氏曰武宣后立夫人叚氏為王后世子雋為王太子如魏武晉文輔政故事叚遼數侵趙邊數所角翻燕王皝遣揚烈將軍宋回稱藩於趙乞師以討遼自請盡帥國中之衆以㑹之帥讀曰率并以其弟寧逺將軍汗為質沈約志寧逺將軍晉江左置盖始於此時質音致下同趙王虎大悅厚加慰答辭其質遣還密期以明年為趙燕攻段遼張本是嵗趙將李穆納拓䟦翳槐於大甯其故部落多歸之元年翳槐奔趙代王紇那奔燕國人復奉翳槐城盛樂而居之復扶又翻樂音洛仇池氐王楊毅族兄初襲殺毅并有其衆自立為仇池公稱臣于趙資治通鑑卷九十五
