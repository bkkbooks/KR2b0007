front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷七十四宋司馬光撰胡三省音註魏紀六起著雍敦牂盡旃䝉赤奮若凡八年烈祖明皇帝下景初二年春正月帝召司馬懿於長安使將兵四萬討遼東討公孫淵也留司馬懿於長安以備蜀也諸葛亮死乃敢召之逺略將即亮翻議臣或以為四萬兵多役費難供議臣當時謀議之臣也帝曰四千里征伐續漢志遼東郡在洛陽東北三千六百里雖云用竒亦當任力不當稍計役費也帝謂懿曰公孫淵將何計以待君對曰淵棄城豫走上計也據遼東拒大軍其次也遼東當作遼水坐守襄平此成禽耳襄平縣漢遼東郡治所公孫淵所都帝曰然則三者何出對曰唯明智能審量彼我量音良乃豫有所割棄此既非淵所及又謂今往孤逺言孤軍逺征也不能支久必先拒遼水後守襄平也帝曰還往幾日對曰往百日攻百日還百日以六十日為休息如此一年足矣公孫淵聞之復遣使稱臣求救於吳吳人欲戮其使欲報張彌許晏之忿也事見七十二卷青龍元年復扶又翻使疏吏翻羊衜曰衜古道字不可是肆匹夫之怒而捐霸王之計也不如因而厚之遣竒兵潛往以要其成要一遥翻若魏代不克而我軍逺赴是恩結遐夷義形萬里若兵連不解首尾離隔則我虜其傍郡驅略而歸亦足以致天之罰報雪曩事矣吳主曰善乃大勒兵謂淵使曰請俟後問當從簡書左傳狄伐邢管敬仲言於齊侯曰詩云豈不懐歸畏此簡書簡書同惡相恤之謂也請救邢以從簡書必與弟同休戚淵遣使謝吳自稱燕王求為兄弟之國故權因而稱之為弟又曰司馬懿所向無前深為弟憂之此晉史臣為此語耳權必無此言為于偽翻帝問於䕶軍將軍蔣濟曰孫權其救遼東乎濟曰彼知官備已固魏晉之間謂國家為官利不可得深入則非力所及淺入則勞而無獲權雖子弟在危猶將不動况異域之人兼以往者之辱乎亦謂斬張彌許晏也今所以外揚此聲者譎其行人譎古穴翻詐也疑之於我我之不克冀其折節事已耳然沓渚之間去淵尚逺若大軍相守事不速决則權之淺規或得輕兵掩襲未可測也淺規謂規圖淺攻不敢深入吳君臣之為謀已不逃蔣濟所料矣帝問吏部尚書盧毓誰可為司徒者毓薦處士管寧處昌吕翻帝不能用更問其次對曰敦篤至行則太中大夫韓暨行下孟翻亮直清方則司𨽻校尉崔林貞固純粹則太常常林二月癸卯以韓暨為司徒漢主立皇后張氏前后之妹也立王貴人子璿為皇太子璿旬縁翻瑶為安定王大司農河南孟光問太子讀書及情性好尚於祕書郎卻正東漢以馬融為祕書郎詣東觀典校書祕書郎蓋自融始好呼到翻下同卻綺㦸翻正曰奉親䖍恭夙夜匪懈有古世子之風懈古隘翻接待羣僚舉動出於仁恕光曰如君所道皆家户所有耳謂其才行不逾中人也吾今所問欲知其權略智謀何如也正曰世子之道在於承志竭歡承志謂承君父之志竭歡謂左右就養承顔順色以盡親之歡既不得妄有施為智謀藏於胸懐權略應時而發此之有無焉可豫知也焉於䖍翻光知正慎宜慎宜者謹言語擇其所宜言乃言也不為放談乃曰吾好直言無所回避今天下未定智意為先智意自然不可力彊致也彊其兩翻儲君讀書寧當傚吾等竭力博識以待訪問如博士探策講試以求爵位邪按漢書音義作簡策難問例置案上在試者意投射取而答之謂之射策即探策也若録政化得失顯而問之謂之對策探吐南翻當務其急者正深謂光言為然正儉之孫也儉為益州刺史漢靈帝中平五年為盜賊所殺吳人鑄當千大錢杜佑曰孫權赤烏元年鑄一當千大錢徑一寸四分重十六銖夏四月庚子南鄉恭侯韓暨卒庚戌大赦六月司馬懿軍至遼東公孫淵使大將軍卑衍楊祚姓譜卑卑耳國之後或云鮮卑之後蔡邕胡太傅碑有太傅掾雁門卑登將歩騎數萬屯遼隧圍塹二十餘里宣考異曰晉紀云南北六七十里今從淵傳諸將欲擊之懿曰賊所以堅壁欲老吾兵也今攻之正墮其計且賊大衆在此其巢窟空虚直指襄平破之必矣乃多張旗幟欲出其南幟昌志翻衍等盡銳趣之懿潛濟水出其北直趣襄平趣七喻翻衍等恐引兵夜走諸軍進至首山首山在襄平西南淵復使衍等逆戰復扶又翻下同懿擊大破之遂進圍襄平秋七月大霖雨遼水暴漲運船自遼口徑至城下遼口遼水津渡之口也雨月餘不止平地水數尺三軍恐欲移營懿令軍中敢有言徙者斬都督令史張静犯令斬之晉職官志魏制諸公加兵者置都督令史一人軍中乃定賊恃水樵牧自若諸將欲取之懿皆不聽司馬陳珪曰昔攻上庸八部俱進晝夜不息故能一旬之半拔堅城斬孟達事見七十一卷太和二年今者逺來而更安緩愚竊惑焉懿曰孟達衆少而食支一年將士四倍於達而糧不淹月淹留也言所留之糧不支一月也以一月圖一年安可不速以四擊一正令失半而克猶當為之是以不計死傷與糧競也競争也懿之語珪猶有廋辭蓋其急攻孟達豈特與糧競哉懼吳蜀救兵至耳今賊衆我寡賊饑我飽水雨乃爾爾如此也功力不設雖當促之亦何所為自發京師不憂賊攻但恐賊走今賊糧垂盡而圍落未合掠其牛馬抄其樵采抄楚交翻此故驅之走也夫兵者詭道善因事變言善兵者能因事而變化也賊憑衆恃雨故雖饑困未肯束手當示無能以安之取小利以驚之非計也懿知淵可禽欲以全取之朝廷聞師遇雨咸欲罷兵帝曰司馬懿臨危制變禽淵可計日待也雨霽懿乃合圍作土山地道楯櫓鉤衝楯干也攻城之士以扞蔽其身櫓樓車登之以望城中鉤鉤梯也所以鉤引上城者衝衝車也以衝城晝夜攻之矢石如雨淵窘急窘巨隕翻糧盡人相食死者甚多其將楊祚等降八月淵使相國王建御史大夫柳甫請解圍却兵當君臣面縳懿命斬之檄告淵曰楚鄭列國而鄭伯猶肉袒牽羊迎之左傳楚莊王圍鄭克之入自皇門至于逵路鄭伯肉袒牽羊以逆孤天子上公漢太傅位上公懿時為太尉而自謂上公以太尉於三公為上也而建等欲孤解圍退舍豈得禮邪二人老耄𫝊言失指已相為斬之為于偽翻若意有未已可更遣年少有明决者來少詩照翻淵復遣侍中衛演乞克日送任送任謂送質子也復扶又翻懿謂演曰軍事大要有五能戰當戰不能戰當守不能守當走餘二事但有降與死耳降户江翻汝不肯面縳此為决就死也不須送任壬午襄平潰淵與子脩將數百騎突圍東南走大兵急擊之斬淵父子於梁水之上班志遼東郡遼陽縣注云大梁水西南至遼陽入遼水水經注小遼水出𤣥莬髙句麗縣遼山西南流逕襄平縣入大梁水水出北塞外西南流而入于遼水懿既入城誅其公卿以下及兵民七千餘人築為京觀杜預曰積尸封土於其上謂之京觀觀古玩翻遼東帶方樂浪𤣥菟四郡皆平漢帶方縣屬樂浪郡公孫氏分立郡陳夀曰建安中公孫康分屯有以南荒地為帶方郡倭韓諸國羈屬焉樂浪音洛琅莬同都翻淵之將反也將軍綸直賈範等苦諫綸姓直名其先以邑為姓淵皆殺之懿乃封直等之墓顯其遺嗣釋淵叔父恭之囚淵囚恭事見七十一卷太和二年中國人欲還舊鄉者恣聽之遂班師司馬懿與諸葛亮相守閉壁若無能為者及討公孫淵智計横出鄙語有云棊逢敵手難藏行其是之謂乎初淵兄晃為恭任子在洛陽先淵未反時數陳其變先悉薦翻數所角翻下同欲令國家討淵及淵謀逆帝不忍市斬欲就獄殺之晃數陳淵之必反非同逆者也帝欲殺之以絶其類刑之於市則無名故欲就獄殺之廷尉髙柔上疏曰臣竊聞晃先數自歸陳淵禍萌雖為凶族原心可恕夫仲尼亮司馬牛之憂司馬牛宋司馬桓魋之弟也魋凶惡牛憂之曰人皆有兄弟我獨亡謂魋之積惡將死亡無日祁奚明叔向之過左傳晉人逐欒盈殺羊舌虎囚虎兄叔向祁奚見范宣子曰管蔡為戮周公右王若之何以虎也棄社稷宣子言諸公而免之在昔之美義也臣以為晃信有言宜貸其死茍自無言便當市斬今進不赦其命退不彰其罪閉著囹圄使自引分著直略翻引分即引决也四方觀國或疑此舉也帝不聽竟遣使齎金屑飲晃及其妻子飲於㺔翻賜以棺衣殯殮於宅宅晃所居者殮力贍翻九月吳改元赤烏權以赤烏集於殿前改元吳步夫人卒初吳主為討虜將軍在吳娶吳郡徐氏太子登所生庶賤吳主令徐氏母養之徐氏妬故無寵及吳主西徙謂自吳而西徙都武昌也徐氏留處吳而臨淮步夫人寵冠後庭步夫人隲之族也處昌吕翻冠古玩翻吳主欲立為皇后而羣臣議在徐氏吳主依違者十餘年依違不决也㑹步氏卒羣臣奏追贈皇后印綬綬音受徐氏竟廢卒於吳吳主使中書郎吕壹典校諸官府及州郡文書壹因此漸作威福深文巧詆排陷無辜毁短大臣纎介必聞太子登數諫數所角翻下同吳主不聽羣臣莫敢復言復扶又翻皆畏之側目壹誣白故江夏太守刁嘉謗訕國政訕山諫翻吳主怒收嘉繫獄驗問時同坐人皆畏怖壹其時與嘉同坐者坐徂卧翻並言聞之侍中北海是儀獨云無聞是姓儀名儀本姓氏孔融嘲儀以氏字為民上無頭遂改姓是遂見窮詰累日詔㫖轉厲羣臣為之屏息為于偽翻屛必郢翻屛息不敢舒氣也儀曰今刀鋸已在臣頸臣何敢為嘉隠諱自取夷滅為不忠之鬼顧以聞知當有本末據實答問辭不傾移吳主遂舍之舍讀曰捨嘉亦得免上大將軍陸遜太常潘濬憂壹亂國每言之輙流涕壹白丞相顧雍過失吳主怒詰責雍詰去吉翻黃門侍郎謝厷語次問壹厷與宏同乎萌翻顧公事何如壹曰不能佳厷又問若此公免退誰當代之壹未答厷曰得無潘太常得之乎壹曰君語近之也近其靳翻厷曰潘太常常切齒於君但道無因耳謂欲奏舉其罪而非太常之職故其道無因也今日代顧公恐明日便擊君矣漢制丞相御史舉奏百官有罪者壹大懼遂解散雍事潘濬求朝詣建業濬本留武昌朝直遥翻欲盡辭極諫至聞太子登已數言之至建業而知太子數言壹事而不見從濬乃大請百寮欲因㑹手刃殺壹以身當之以身當擅殺之罪為國除患為于偽翻下同壹宻聞知稱疾不行西陵督步隲上疏曰顧雍陸遜潘濬志在竭誠寢食不寧念欲安國利民建乆長之計可謂心膂股肱社稷之臣矣宜各委任不使他官監其所司課其殿最監古衘翻殿丁甸翻賢曰殿軍後也課居後也最凡要之先也課居先也此三臣思慮不到則已豈敢欺負所天乎君天也左將軍朱據部曲應受三萬緡工王遂詐而受之壹疑據實取考問主者主者據軍吏也死於杖下據哀其無辜厚棺斂之棺古玩翻斂力驗翻壹又表據吏為據隠故厚其殯吳主數責問據據無以自明藉草待罪數日典軍吏劉助覺言王遂所取劉助覺其事而言之吳主大感悟曰朱據見枉况吏民乎乃窮治壹罪治直之翻賞助百萬丞相雍至廷尉斷獄斷丁亂翻壹以囚見雍和顔色問其辭狀臨出又謂壹曰君意得無欲有所道乎道言也壹叩頭無言時尚書郎懐叙懐姓叙名姓譜無懐氏之後面詈辱壹雍責叙曰官有正法何至於此有司奏壹大辟辟毗亦翻或以為宜加焚裂用彰元惡殷紂用炮烙之刑項羽燒殺紀信漢武帝焚蘇文於横橋然未以為刑名也王莽作焚如之刑後世不復遵用裂謂車裂古之轘刑吳主以訪中書令㑹稽闞澤㑹古外翻闞姓也左傳齊有大夫闞止澤曰盛明之世不宜復有此刑復扶又翻下同吳主從之壹既伏誅吳主使中書郎袁禮告謝諸大將因問時事所當損益禮還復有詔責諸葛瑾步隲朱然吕岱等曰袁禮還云與子瑜子山義封定公相見諸葛瑾字子瑜步隲字子山朱然字義封吕岱字定公瑾渠吝翻隲職日翻並咨以時事當有所先後謂時事所當行何者為先何者為後也各自以不掌民事不肯便有所陳悉推之伯言承明推吐雷翻陸遜字伯言潘濬字承明伯言承明見禮泣涕懇惻辭㫖辛苦至乃懐執危怖有不自安之心怖普布翻聞之悵然深自刻怪刻怪也何者夫惟聖人能無過行行下孟翻明者能自見耳人之舉厝何能悉中中竹仲翻獨當已有以傷拒衆意忽不自覺故諸君有嫌難耳不爾何縁乃至於此乎與諸君從事自少至長髪有二色二色謂班白也少詩照翻長知兩翻以謂表裏足以明露公私分計足用相保分扶問翻義雖君臣恩猶骨肉榮福喜戚相與共之忠無匿情智無遺計事統是非言行事是則君臣同其是非則同其非也諸君豈得從容而已哉從于容翻同船濟水將誰與易易如字齊桓有善管子未嘗不歎有過未嘗不諫諫而不得終諫不止今孤自省無桓公之德省悉景翻而諸君諫諍未出於口仍執嫌難以此言之孤於齊桓良優未知諸君於管子何如耳下之於上不從其令而從其意孫權自謂優於齊桓而責其臣以管子使吳誠有管子亦不敢盡言於權觀諸陸遜可見矣冬十一月壬午以司空衛臻為司徒司𨽻校尉崔林為司空十二月漢蔣琬出屯漢中乙丑帝不豫辛巳立郭夫人為皇后初太祖為魏公以贊令劉放酇縣漢屬沛郡王莽改曰贊治魏分屬譙郡或曰贊相也凡出令使之贊相因以為官名蓋魏武霸府所置也參軍事孫資皆為祕書郎文帝即位更名祕書曰中書以放為監資為令遂掌機宻漢桓帝延熹二年置祕書監魏武為魏王置祕書令丞典尚書奏事黃初初改為中書置監令中書有監令自此始自魏及晉遂為要官荀朂所謂鳯凰池也更工衡翻帝即位尤見寵任皆加侍中光禄大夫封本縣侯放涿郡方城人資太原中都人是時帝親覽萬機數興軍旅數所角翻腹心之任皆二人管之每有大事朝臣㑹議常令决其是非擇而行之中䕶軍蔣濟上疏曰此疏亦是濟為中䕶軍時所上通鑑因叙放資事而書之於此臣聞大臣太重者國危左右太親者身蔽古之至戒也往者大臣秉事外内扇動蓋謂文帝時也或曰謂受遺大臣也陛下卓然自覽萬機莫不祇肅夫大臣非不忠也然威權在下則衆心慢上勢之常也陛下既已察之於大臣願無忘之於左右左右忠正逺慮未必賢於大臣至於便辟取合或能工之便毗連翻辟讀曰僻今外所言輙云中書雖使恭慎不敢外交但有此名猶惑世俗况實握事要日在目前儻因疲倦之間有所割制謂因人主疲倦之時有所剖割而制斷也衆臣見其能推移於事即亦因時而向之一有此端私招朋援臧否毁譽必有所興否音鄙譽音余功負賞罰必有所易負罪也易則賞罰不當乎功罪直道而上者或壅曲附左右者反達因微而入縁形而出意所狎信不復猜覺此宜聖智所當早聞外以經意則形際自見言放資日在左右狎而信之不復覺其為姦非若早聞忠言自覧萬機外以示經意國事則放資之形際必呈露而不可掩矣復扶又翻見賢遍翻或恐朝臣畏言不合而受左右之怨莫適以聞適丁歴翻臣竊亮陛下潛神黙思公聽並觀若事有未盡於理而物有未周於用將改曲易調調徒釣翻以琴瑟為喻也逺與黃唐角功角者兩兩相當也黄唐黃帝唐堯近昭武文之績豈牽近習而已哉然人君不可悉任天下之事必當有所付若委之一臣自非周公旦之忠管夷吾之公則有弄權敗官之敝敗補邁翻當今柱石之士雖少至於行稱一州少詩沼翻行户孟翻智效一官忠信竭命各奉其職可並驅䇿不使聖明之朝有専吏之名也専吏謂専任放資帝不聽自此以前皆非此年事通鑑因放資患失之心以誤帝託孤之事遂書之於此以先事及寢疾深念後事乃以武帝子燕王宇為大將軍與領軍將軍夏侯獻武衛將軍曹爽魏制領軍將軍主中壘五校武衛等三營武衛將軍蓋領武衛營也太祖以許禇典宿衛遷武衛中郎將武衛之號自此始後有遷武衛將軍於是武衛始有將軍之號晉泰始初罷武衛將軍官屯騎校尉曹肇驍騎將軍秦朗等對輔政爽真之子肇休之子也帝少與燕王宇善故以後事屬之少詩照翻屬之欲翻劉放孫資乆典機任獻肇心内不平殿中有雞棲樹二人相謂曰此亦乆矣其能復幾殿中畜雞以司晨棲於樹上因謂之雞棲樹獻肇指以喻放資一言而發司馬氏簒魏之機言之不可不謹也如是夫以此觀獻肇之輕脫又何足以託孤哉復扶又翻幾居豈翻放資懼有後害隂圖間之間古莧翻燕王性恭良陳誠固辭帝引放資入卧内問曰燕王正爾為言其性恭良為事正如此也對曰燕王實自知不堪大任故耳帝曰誰可任者時惟曹爽獨在側放資因薦爽且言宜召司馬懿與相參帝曰爽堪其事不不讀曰否爽流汗不能對放躡其足耳之曰附耳語之也臣以死奉社稷帝從放資言欲用爽懿既而中變敕停前命放資復入見說帝復扶又翻見賢遍翻說輸芮翻帝又從之放曰宜為手詔帝曰我困篤不能放即上牀執帝手強作之強其兩翻遂齎出大言曰有詔免燕王宇等官不得停省中皆流涕而出陳考異曰放傳曰宇性恭良誠固辭帝引見放資入卧内問曰燕王正爾為放資對曰燕王實自知不堪大任故耳帝曰曹爽可代字否放資因賛成之又添陳宜速召太尉司馬宣王帝納其言放資既出帝意復變詔止宣王勿來尋更見放資曰我自召太尉而曹肇等反使吾止之命更為詔帝獨召爽與放資俱受詔命遂免宇獻肇朗官按陳夀當晉世作魏志若言放資本惰則於時非美故遷就而為之諱也今依習鑿齒漢晉春秋郭頒世語似得其實甲申以曹爽為大將軍帝嫌爽才弱復拜尚書孫禮為大將軍長史以佐之為下爽出孫禮張本復扶又翻是時司馬懿在汲時自遼東還師次于汲也汲縣自漢以來屬河内郡帝令給使辟邪辟邪給使之名猶漢丞相倉頭呼為宜禄也齎手詔召之先是燕王為帝畫計先悉薦翻為于偽翻以為闗中事重宜遣懿便道自軹闗西還長安闗中事重謂備蜀及撫安氐羌也軹縣屬河内郡賢曰軹故城在洛州濟源縣東南五代志軹闗在河内郡王屋縣杜佑曰軹闗在河南府濟源縣界事已施行懿斯須得二詔前後相違疑京師有變乃疾驅入朝朝直遥翻三年春正月懿至入見見賢遍翻帝執其手曰吾以後事屬君見賢遍翻屬之欲翻君與曹爽輔少子少詩照翻死乃可忍吾忍死待君得相見無所復恨矣復扶又翻乃召齊秦二王以示懿别指齊王芳謂懿曰此是也君諦視之勿誤也諦丁計翻審也入教齊王令前抱懿頸懿頓首流涕旦日立齊王為皇太子帝尋殂陳夀曰年三十六嵗考異曰按魏武以建安九年七月定鄴文帝始納甄后明帝應以十年生至於是年正月整三十四年耳時改正朔以故年十二月為元年正月可強名三十五年不得三十六也帝沈毅明敏沈持林翻任心而行料簡功能料音聊屏絶浮偽屛必郢翻行師動衆論决大事謀臣將相咸服帝之大略性特強識雖左右小臣官簿性行名跡所履行户孟翻及其父兄子弟一經耳目終不遺忘忘巫放翻孫盛論曰聞之長老魏明帝天姿秀出立髪垂地口吃少言吃居乞翻言蹇也而沈毅好斷沈持林翻好呼到翻斷丁亂翻初諸公受遺輔導帝皆以方任處之謂使曹休鎮淮南曹真鎮閧中司馬懿屯宛也處昌吕翻政自己出優禮大臣開容善直雖犯顔極諫無所摧戮其君人之量如此其偉也然不思建德垂風不固維城之基詩曰宗子維城此言帝猜忌宗室以亡魏至使大權偏據社稷無衛悲夫太子即位年八嵗大赦尊皇后曰皇太后加曹爽司馬懿侍中假節鉞都督中外諸軍録尚書事晉職官志曰持節都督無定員前漢遣使始有持節光武建武初征伐四方始權時置督軍御史事竟罷建安中魏武為相始遣大將軍督之二十一年征孫權還遣夏侯惇督二十六軍是也文帝黃初三年始置都督諸州軍事或領刺史又上軍大將軍曹真都督中外諸軍事假黄鉞則總統内外諸軍矣録尚書事漢東都諸公之重任也今爽懿既督中外諸軍又録尚書事則文武大權盡歸之矣自此迄于六朝凡權臣壹是専制國命諸所興作宫室之役皆以遺詔罷之曰以者非遺詔真有此指也爽懿各領兵三千人更宿殿内更工衡翻爽以懿年位素髙常父事之每事諮訪不敢専行或問使爽能守此而不變可以免魏室之禍否曰猫䑕不可以同穴使爽能率此而行之亦終為懿所啖食耳初并州刺史東平畢軌姓譜畢本畢公髙之後及鄧颺李勝何晏丁謐颺余章翻又余亮翻皆有才名而急於富貴趨時附埶明帝惡其浮華趨七喻翻惡烏路翻皆抑而不用曹爽素與親善及輔政驟加引擢以為心腹晏進之孫謐斐之子也何進見漢靈帝紀丁斐事見六十六卷獻帝建安十六年晏等咸共推戴爽以為重權不可委之於人丁謐為爽畫策為于偽翻使爽白天子發詔轉司馬懿為太傅外以名號尊之内欲令尚書奏事先來由已得制其輕重也爽從之為下懿族爽等張本二月丁丑以司馬懿為太傅以爽弟羲為中領軍訓為武衛將軍彦為散騎常侍侍講以在少帝左右令侍講說侍講之官起乎此也其餘諸弟皆以列侯侍從從才用翻出入禁闥貴寵莫盛焉爽事太傅禮貌雖存而諸所興造希復由之復扶又翻下同爽徙吏部尚書盧毓為僕射毓余六翻而以何晏代之以鄧颺丁謐為尚書畢軌為司𨽻校尉晏等依埶用事附㑹者升進違忤者罷退内外望風莫敢忤㫖忤五故翻黃門侍郎𫝊嘏謂爽弟羲曰何平叔外静而内躁銛巧好利不念務本何晏字平叔銛思亷翻利也好呼到翻吾恐必先惑子兄弟仁人將逺而朝政廢矣逺于願翻晏等遂與嘏不平因微事免嘏官又出盧毓為廷尉尚書内朝官九卿外朝官故云出畢軌又枉奏毓免官衆論多訟之乃復以為光禄勲孫禮亮直不撓爽心不便出為揚州刺史傳嘏盧毓孫禮所以不合於曹爽者其心未背曹氏也及其甘於司馬懿則事不可言矣三子者豈本心所欲哉勢有必至事有固然也撓奴教翻三月以征東將軍滿寵為太尉夏四月吳督軍使者羊衜擊遼東守將俘人民而去果如蔣濟所料督軍使者漢官也魏黄初二年罷督軍官而吳猶仍漢制漢蔣琬為大司馬東曹掾犍為楊戲素性簡略琬與言論時不應答或謂琬曰公與戲言而不應其慢甚矣琬曰人心不同各如其面左傳鄭子産謂子皮曰人心不同各如其面吾豈敢謂子面如吾面乎面從後言古人所誡尚書舜禹君臣之相告戒其言曰汝無面從退有後言戲欲贊吾是邪則非其本心欲反吾言則顯吾之非是以黙然是戲之快也又督農楊敏嘗毁琬曰作事憒憒督農猶魏吳之典農也憒古悔翻悶悶也誠不及前人或以白琬主者請推治敏治直之翻琬曰吾實不如前人無可推也主者乞問其憒憒之狀琬曰茍其不如則事不理事不理則憒憒矣後敏坐事繫獄衆人猶懼其必死琬心無適莫論語孔子曰君子之於天下也無適也無莫也義之與比謝顯道曰適可也莫不可也適丁歴翻敏得免重罪此諸葛孔明所以屬琬也秋七月帝始親臨朝朝直遥翻八月大赦冬十月吳太常潘濬卒吳主以鎮南將軍吕岱代濬與陸遜共領荆州文書岱時年已八十體素精勤躬親王事與遜同心協規有善相讓南土稱之十二月吳將廖式殺臨賀太守嚴綱等臨賀縣漢屬蒼梧郡縣臨賀水因以為名吳分立為臨賀郡唐為賀州廖力救翻今力弔翻自稱平南將軍攻零陵桂陽揺動交州諸郡衆數萬人吕岱自表輙行星夜兼路吳主遣使追拜交州牧及遣諸將唐咨等絡繹相繼攻討一年破之斬式及其支黨郡縣悉平當方面者當如吕岱委人以方面者當如孫權岱復還武昌吳都鄉侯周𦙍將兵千人屯公安有罪徙廬陵諸葛瑾步隲為之請吳主曰昔𦙍年少初無功勞橫受精兵為于偽翻少詩照翻横户孟翻爵以侯將謂既受侯爵又將兵也將即亮翻蓋念公瑾以及於𦙍也而𦙍恃此酗淫自恣酗吁句翻前後告諭曽無悛改悛丑縁翻孤於公瑾義猶二君二君謂諸葛瑾步隲也樂𦙍成就豈有已哉樂音洛迫𦙍罪惡未宜便還且欲苦之使自知耳以公瑾之子而二君在中間茍使能改亦何患乎瑜兄子偏將軍峻卒全琮請使峻子䕶領其兵吳主曰昔走曹操拓有荆州皆是公瑾事見六十五卷漢獻帝建安十三年常不忘之初聞峻亡仍欲用䕶聞䕶性行危險用之適為作禍行下孟翻為于偽翻故更止之孤念公瑾豈有已哉十二月詔復以建寅之月為正用地正事見上卷景初元年是時仍用景初厯但不以十一月為正月耳邵陵厲公上諱芳字蘭卿明帝無子養以為子諡法殺戮無辜曰厲帝後以失權為司馬氏所廢以其不終加以一惡諡陳夀志三少帝紀皆書本爵此書見廢後之爵自此以後例如此惟髙貴鄉公書本爵蓋見弑之後不復有他號也帝之廢也歸藩于齊魏世譜曰晉受禪封齊王為邵陵縣公㤗始十年薨諡曰厲扈䝉曰暴慢無親曰厲正始元年春旱越嶲蠻夷數叛漢殺太守自諸葛亮平髙定之後越嶲夷數反殺太守龔禄焦璜嶲音髓數所角翻是後太守不敢之郡寄治安定縣去郡八百餘里安定縣不見于志當是因越嶲移治而蹔立也漢主以巴西張嶷為越嶲太守嶷招慰新附誅討強猾蠻夷畏服郡界悉平復還舊治漢越嶲郡治卭都縣嶷魚力翻冬吳饑二年春吳人將伐魏零陵太守殷札言於吳主曰今天棄曹氏喪誅累見殷札一作殷禮喪誅謂魏累有大喪蓋天誅也見賢遍翻虎爭之際而幼童涖事陛下身自御戎取亂侮亡書仲虺之誥之辭宜滌荆揚之地滌洗也言舉國興師後無留者其地如洗也舉強羸之數使強者執㦸羸者轉運羸倫為翻西命益州軍于隴右益州謂蜀也授諸葛瑾朱然大衆直指襄陽陸遜朱桓别征夀春大駕入淮陽歴青徐前漢之淮陽後漢章帝改曰陳郡此直謂淮水之陽也襄陽夀春困於受敵長安以西務禦蜀軍許洛之衆埶必分離掎角並進民必内應將帥對向或失便宜一軍敗績則三軍離心便當秣馬脂車陵蹈城邑乗勝逐北以定華夏若不悉軍動衆循前輕舉則不足大用易於屢退易以䜴翻民疲威消時往力竭非上策也吳主不能用傾國出師决勝負於一戰苻堅之所以亡也吳主非不能用殷札之計不肯用也夏四月吳全琮略淮南决芍陂賢曰芍陂今在夀州安豐縣東陂徑百里灌田萬頃華夷對境圖芍陂周回二百二十四里與陽泉大業並孫叔敖所作開溝引渒水為子午渠開六門灌田萬頃芍音鵲諸葛恪攻六安朱然圍樊諸葛瑾攻柤中襄陽記曰祖讀如租稅之租柤中在上黃界去襄陽一百五十里魏時夷正權敷兄弟三人部曲萬餘家屯此分布在中廬宜城西山􅋣沔二谷中土地平敞宜桑麻有水陸良田沔南之膏腴沃壤謂之柤中杜佑曰柤中在襄州南漳縣界楊正衡曰柤側𤓰翻征東將軍王凌揚州刺史孫禮與全琮戰於芍陂琮敗走荆州刺史胡質以輕兵救樊魏荆州統江夏襄陽南陽新城魏興上庸或曰賊盛不可迫質曰樊城卑兵少故當進軍為之外援不然危矣遂勒兵臨圍城中乃安五月吳太子登卒吳兵猶在荆州太傅懿曰柤中民夷十萬隔在水南流離無主樊城被攻歴月不解此危事也請自討之六月太傅懿督諸軍救樊吳軍聞之夜遁追至三州口三州口謂荆豫楊三州之口魏荆州之地東至江夏豫州之地南至弋陽揚州之地西至六安三州口當在其間又按王昶𫝊昶督荆豫諸軍事自宛徙屯新野習水軍於三州則三州蓋地名口水口大獲而還閏月吳大將軍諸葛瑾卒瑾太子恪先已封侯恪以適當為世子曰太子誤也恪以出山民功封侯事見上卷景初元年吳主以恪弟融襲爵攝兵業攝領也承也領父之兵承父之業也駐公安漢大司馬蔣琬以諸葛亮數出秦川闗中之地沃野千里秦之故國謂之秦川數所角翻道險運糧難卒無成功卒子恤翻乃多作舟船欲乘漢沔東下襲魏興上庸漢沔之水自漢中東歴魏興上庸以達于襄陽欲争天下則當出兵秦川魏興上庸非其地也㑹舊疾連動未時得行漢人咸以為事有不捷還路甚難非長策也漢主遣尚書令費禕費父沸翻中監軍姜維等喻指中監軍即中䕶軍之任也蜀置前監軍後監軍中監軍位三軍師之下琬乃上言今魏跨帶九州根蔕滋蔓平除未易易以䜴翻若東西并力首尾掎角掎居蟻翻雖未能速得如志且當分裂蠶食先摧其支黨然吳期二三連不克果克能也果决也言不能决然進兵也輙與費禕等議以凉州胡塞之要進退有資且羌胡乃心思漢如渇宜以姜維為凉州刺史凉州之地蜀惟得武都隂平二郡而已若維征行銜制河右臣當帥軍為維鎮繼帥讀曰率今涪水陸四通惟急是應若東西有虞赴之不難請徙屯涪涪縣漢屬廣漢郡蜀屬梓潼郡涪音浮漢主從之朝廷欲廣田畜榖於揚豫之間使尚書郎汝南鄧艾行陳項以東至夀春陳縣漢屬陳國項縣漢屬汝南郡晉志二縣並屬梁國行下孟翻艾以為昔太祖破黃巾因為屯田積榖許都以制四方事見六十二卷漢獻帝建安元年今三隅已定事在淮南每大軍出征運兵過半功費巨億陳蔡之間上下田良可省許昌左右諸稻田并水東下汝水潁水蒗蕩渠水滆水皆經陳蔡之間而東入淮令淮北二萬人淮南三萬人什二分休常有四萬人且田且守五萬人分一萬畨休迭戍周而復始是常有四萬人屯田益開河渠以増溉灌通漕運計除衆費嵗完五百萬斛以為軍資六七年間可積三千萬斛於淮上此則十萬之衆五年食也以此乗吳無不克矣太傅懿善之是嵗始開廣漕渠每東南有事大興軍衆汎舟而下達于江淮資食有餘而無水害史究言鄧艾興屯田之利管寧卒寧名行髙潔人望之者邈然若不可及即之熈熈和易行下孟翻易以䜴翻能因事導人於善人無不化服及卒天下知與不知無不嗟歎三年春正月漢姜維率偏軍自漢中還住涪蜀諸軍時皆屬蔣琬姜維所領偏軍耳吳主立其子和為太子大赦三月昌邑景侯滿寵卒秋七月乙酉以領軍將軍蔣濟為太尉吳主遣將軍聶友校尉陸凱將兵三萬擊儋耳珠崖儋耳珠崖漢武帝開以為郡屬交趾州元帝以後棄之聶尼輙翻儋都甘翻八月吳主封子霸為魯王霸和母弟也寵愛崇特與和無殊為後吳廢和誅霸張本尚書僕射是儀領魯王𫝊上疏諫曰臣竊以為魯王天挺懿德兼資文武當今之宜宜鎮四方為國藩輔宣揚德美廣耀威靈乃國家之良規海内所瞻望且二宫宜有降殺殺所戒翻以正上下之序明教化之本書三四上吳主不聽四上時掌翻四年春正月帝加元服吳諸葛恪襲六安漢六安國都六縣後漢為六安侯國屬廬江郡晉為六縣屬廬江郡掩其人民而去夏四月立皇后甄氏甄之人翻大赦后文昭皇后兄儼之孫也五月朔日有食之既冬十月漢蔣琬自漢中還住涪疾益甚以漢中太守王平為前監軍鎮北大將軍督漢中監古衘翻十一月漢主以尚書令費禕為大將軍録尚書事吳丞相顧雍卒吳諸葛恪逺遣諜人觀相徑要諜逵協翻相息亮翻欲圖夀春太傅懿將兵入舒舒縣屬廬江郡春秋之故國也時在吳魏境上棄而不耕去皖口甚近欲以攻恪吳主徙恪屯於柴桑柴桑縣漢屬豫章郡吳屬武昌郡有柴桑山在今江州德化西九十里杜佑曰江州尋陽縣南楚城驛即古之柴桑縣宋白曰江州瑞昌縣蓋柴桑之舊城步隲朱然各上疏於吳主曰自蜀還者咸言蜀欲背盟隲入日翻上時掌翻背蒲妹翻與魏交通多作舟船繕治城郭治直之翻又蔣琬守漢中聞司馬懿南向不出兵乗虚以掎角之掎居蟻翻反委漢中還近成都事已彰灼無所復疑近其靳翻復扶又翻宜為之備吳主答曰吾待蜀不薄聘享盟誓無所負之何以致此司馬懿前來入舒旬日便退蜀在萬里何知緩急而便出兵乎昔魏欲入漢川曹真欲入漢中事見七十一卷明帝太和四年此間始嚴亦未舉動謂嚴兵而未發也㑹聞魏還而止還從宣翻又如字蜀寧可復以此有疑邪人言苦不可信朕為諸君破家保之復扶又翻為于偽翻征東將軍都督楊豫諸軍事王昶據王昶傳楊當作荆上言地有常險守無常勢今屯宛去襄陽三百餘里有急不足相赴遂徙屯新野新野縣屬南陽郡宗室曹冏裴松之曰冏中常侍兄叔興之後少帝之族祖也上書曰古之王者必建同姓以明親親必樹異姓以明賢賢親親之道専用則其漸也微弱賢賢之道偏任則其敝也刼奪謂威權陵偪刼其君而奪之也先聖知其然也故博求親疎而並用之故能保其社稷歴紀長久紀年紀也今魏尊尊之法雖明親親之道未備或任而不重或釋而不任臣竊惟此惟思也寝不安席謹撰合所聞論其成敗撰具也述也音雛免翻曰昔夏商周歴世數十而秦二世而亡何則三代之君與天下共其民故天下同其憂吕延濟曰與天下共其民謂建立諸侯與之共理同有其利也故天下有難則諸侯同憂秦王獨制其民故傾危而莫救也秦觀周之敝以為小弱見奪於是廢五等之爵立郡縣之官吕向曰秦皇觀周所以敝者乃以埶弱而諸侯奪其國也遂廢五等之爵而立郡縣之吏五等公侯伯子男也内無宗子以自毗輔毗亦輔也外無諸侯以為藩衛譬猶芟刈股肱獨任胸腹觀者為之寒心芟所衛翻為于偽翻而始皇晏然自以為子孫帝王萬世之業也豈不悖哉悖蒲内翻故漢祖奮三尺之劒驅烏合之衆五年之中遂成帝業何則伐深根者難為功摧枯朽者易為力理勢然也用班固漢宗室諸侯王表文意易以䜴翻漢監秦之失封殖子弟及諸吕擅權圖危劉氏而天下所以不傾動者徒以諸侯彊大磐石膠固也然髙祖封建地過古制故賈誼以為欲天下之治安莫若衆建諸侯而少其力賈誼治安策之言見十四卷文帝六年少詩沼翻治直吏翻文帝不從至於孝景猥用鼂錯之計削黜諸侯遂有七國之患事見十六卷漢景帝三年蓋兆發髙帝釁鍾文景鍾聚也由寛之過制急之不漸故也所謂末大必折尾大難掉左傳由無宇之言折而設翻掉徒弔翻尾同於體猶或不從况乎非體之尾其可掉哉武帝從主父之策下推恩之令事見十八卷漢武帝元朔二年自是之後遂以陵夷子孫微弱衣食租稅不預政事至于哀平王氏秉權假周公之事而為田常之亂宗室諸侯或乃為之符命頌莽恩德事見三十六卷王莽初始元年豈不哀哉由斯言之非宗子獨忠孝於恵文之間而叛逆於哀平之際也徒權輕埶弱不能有定耳賴光武皇帝挺不世之姿擒王莽於己成紹漢嗣於既絶斯豈非宗子之力也嗣祥使翻而曽不監秦之失策襲周之舊制至於桓靈閹䆠用事君孤立於上臣弄權於下由是天下鼎沸姦宄並争宗廟焚為灰燼宫室變為榛藪謂董卓之亂也太祖皇帝龍飛鳯翔掃除凶逆大魏之興于今二十有四年矣自黃初受禪至是二十四年觀五代之存亡而不用其長策五代夏商周秦漢覩前車之傾覆而不改於轍迹子弟王空虚之地君有不使之民空虚謂有封國之名實不能有其地也君不使之民謂抗藩王之尊於國民之上不得而臣使也王于况翻宗室竄於閭閻不聞邦國之政權均匹夫埶齊凡庶内無深根不拔之固外無盤石宗盟之助吕延濟曰盤石大石也以其堅重不可轉易也宗盟謂同姓諸侯盟㑹者也非所以安社稷為萬世之業也且今之州牧郡守守式又翻古之方伯諸侯皆跨有千里之土兼軍武之任或比國數人比毗必翻又毗至翻或兄弟並據而宗室子弟曽無一人間厠其間人間古莧翻與相維制非所以彊榦弱枝備萬一之虞也今之用賢或超為名都之主或為偏師之帥帥所類翻而宗室有文者必限小縣之宰有武者必置百人之上張銑曰言宗室位卑也百人之上百夫長也非所以勸進賢能褒異宗室之禮也語曰百足之蟲至死不僵馬蚿百足僵居良翻以其扶之者衆也此言雖小可以譬大是以聖王安不忘危存不忘亡故天下有變而無傾危之患矣冏冀以此論感悟曹爽爽不能用以明帝之明且不能用陳思王之言况曹爽之愚闇哉五年春正月吳主以上大將軍陸遜為丞相其州牧都䕶領武昌事如故遜先為荆州牧右都䕶領武昌事征西將軍都督雍凉諸軍事夏侯𤣥雍於用翻大將軍爽之姑子也𤣥辟李勝為長史勝及尚書鄧颺欲令爽立威名於天下勸使伐蜀太傅懿止之不能得三月爽西至長安發卒十餘萬人與𤣥自駱口入漢中駱口駱谷口也駱谷在漢中成固縣東北北達扶風郿縣漢中守兵不滿三萬諸將皆恐欲守城不出以待涪兵自蔣琬屯涪蜀之重兵在焉王平曰漢中去涪垂千里賊若得闗便為深禍垂幾及也闗闗城也杜佑曰闗城俗名張魯城在西縣西四十里嗚呼王侯設險以守其國其後闗城失守鍾會遂平行至漢中王平謂賊若得闗遂為深禍斯言驗矣今宜先遣劉䕶軍據興埶水經注小成固城北百二十二里有興埶坂寰字記興埶山在洋州興道縣北四十三里今郡城所枕形如一盆外險而内有大谷為盤道上數里方及四門因名興埶東坡指掌圖以為在興元恐非也杜佑曰興埶即洋州興道縣寰字記與通典合矣宋白曰興勢山在今興道縣西北二十里劉䕶軍劉敏也平為後拒若賊分向黃金黄金谷在興道縣山有黃金峭黃金谷有黃金戍傍山依峭險折七里杜佑曰黄金戍在洋州黃金縣西北八十里張魯所築南接漢川北枕古道險固之極平帥千人下自臨之帥讀曰率下同比爾間涪軍亦至比必寐翻此計之上也諸將皆疑惟䕶軍劉敏與平意同遂帥所領據興埶多張旗幟彌亘百餘里幟昌志翻閏月漢主遣大將軍費禕督諸軍救漢中將行光禄大夫來敏詣禕别求共圍棊于時羽檄交至人馬擐甲嚴駕已訖擐胡慣翻貫甲也禕與敏對戲色無厭倦敏曰向聊觀試君耳君信可人必能辦賊者也夏四月丙辰朔日有食之大將軍爽兵距興埶不得進闗中及氐羌轉輸不能供牛馬騾驢多死民夷號泣道路騾盧戈翻號户髙翻涪軍及費禕兵繼至參軍楊偉為爽陳形埶為于偽翻宜急還不然將敗鄧颺李勝與偉争於爽前偉曰颺勝將敗國家事可斬也後將敗補邁翻爽不恱太傅懿與夏侯𤣥書曰春秋責大德重責責望也德恩德也言責望之甚大者其恩之為甚重也昔武皇帝再入漢中幾至大敗事見六十七卷漢獻帝建安二十年及六十八卷建安二十四年幾居希翻君所知也今興埶至險蜀已先據若進不獲戰退見邀絶覆軍必矣將何以任其責任音壬𤣥懼言於爽五月引軍還費禕進據三嶺以截爽自駱谷出扶風隔以中南山其間有三嶺一曰沈嶺近芒水一曰衙嶺一曰分水嶺爽争險苦戰僅乃得過失亡甚衆闗中為之虚耗為于偽翻秋八月秦王詢卒冬十二月安陽孝侯崔林卒諡法大慮行節曰孝五宗安之曰孝慈恵愛親曰孝是嵗漢大司馬琬以病固讓州職於大將軍禕漢主乃以禕為益州刺史以侍中董允守尚書令為禕之副時戰國多事戰國者謂國日有戰爭也公務煩猥猥雜也禕為尚書令識悟過人每省讀文書省悉京翻舉目暫視已究其意㫖其速數倍於人終亦不忘常以朝晡聽事其間接納賔客飲食嬉戲加之博弈毎盡人之歡事亦不廢及董允代禕欲斆禕之所行旬日之中事多愆滯愆違也允乃歎曰人才力相逺若此非吾之所及也乃聽事終日而猶有不暇焉六年春正月以票騎將軍趙儼為司空票匹妙翻吳太子和與魯王同宫禮秩如一羣臣多以為言是儀之諫見於是卷三年蓋諌者不特是儀也吳主乃命分宫别僚二子由是有隙史言和霸之隙亦兩宫僚屬交搆以成之别彼列翻衛將軍全琮遣其子寄事魯王以書告丞相陸遜遜報曰子弟茍有才不憂不用不宜私出以要榮利私出謂出私門也要一遥翻若其不佳終為取禍且聞二宫勢敵必有彼此此古人之厚忌也寄果阿附魯王輕為交搆遜書與琮曰卿不師日磾而宿留阿寄日磾事見二十一卷漢武帝後元二年宿音秀留音溜阿相𫝊從安入聲終為足下家門致禍矣琮既不答遜言更以致隙魯王曲意交結當時名士偏將軍朱績以膽力稱王自至其廨廨居隘翻公宇也就之坐欲與結好好呼到翻績下地住立辭而不當績然之子也於是自侍御賔客造為二端仇黨疑貳滋延大臣舉國中分吳主聞之假以精學禁斷賔客往來斷讀曰短督軍使者羊衜上疏曰聞明詔省奪二宫備衛抑絶賔客使四方禮敬不復得通復扶又翻逺近悚然大小失望或謂二宫不遵典式就如所嫌猶且補察宻加斟酌不使逺近得容異言臣懼積疑成謗乆將宣流而西北二隅蜀在西魏在北去國不逺將謂二宫有不順之愆不審陛下何以解之吳主長女魯班適左䕶軍全琮少女小虎適驃騎將軍朱據二女步夫人所生也全公主與太子母王夫人有隙吳主欲立王夫人為后公主阻之恐太子立怨已心不自安數譖毁太子吳主寢疾遣太子禱於長沙桓王廟孫策追諡長沙桓王杜佑曰孫權都建業立兄長沙桓王廟於朱雀橋南太子妃叔父張休居近廟邀太子過所居全公主使人覘視近其靳翻過工禾翻覘丑廉翻窺也因言太子不在廟中専就妃家計議又言王夫人見上寢疾有喜色吳主由是發怒夫人以憂死太子寵益衰魯王之黨楊笁全寄吳安孫竒等共譖毁太子吳主惑焉陸遜上疏諫曰太子正統宜有盤石之固魯王藩臣當使寵秩有差彼此得所上下獲安書三四上四上時掌翻辭情危切論語孔子曰邦有道危言危行程顥曰危獨也與衆異而不安之謂余按此所謂危者謂嫡庶無别則亡國之禍隨之人不敢言而遜獨言之所謂危也又欲詣都口陳嫡庶之義吳主不恱笁考異曰吳録曰權時見楊笁辟左右而論霸之才深述霸有文武英姿宜為嫡嗣於是權乃許立焉既而遜有表極諫權疑笁泄之乃斬笁按笁死在太子廢後吳録所述妄也太常顧譚遜之甥也亦上疏曰臣聞有國有家者必明嫡庶之端異尊卑之禮使髙下有差等級踰邈如此則骨肉之恩全覬覦之望絶覬音冀覦音俞昔賈誼陳治安之計論諸侯之埶以為埶重雖親必有逆節之累治直吏翻累力瑞翻埶輕雖疏必有保全之祚故淮南親弟不終饗國失之於勢重也吳芮疏臣𫝊祚長沙得之於埶輕也昔漢文帝使慎夫人與皇后同席袁盎退夫人之位帝有怒色及盎辨上下之義陳人彘之戒帝既恱懌夫人亦悟事見十三卷漢文帝二年今臣所陳非有所偏誠欲以安太子而便魯王也由是魯王與譚有隙芍陂之役二年全琮與魏戰于芍陂譚弟承及張休皆有功全琮子端緒與之爭功端緒琮之二子譖承休於吳主吳主徙譚承休於交州又追賜休死太子太傅吾粲請使魯王出鎮夏口姓譜吾本已姓夏昆吾氏之後夏户雅翻出楊笁等不得令在京師又數以消息語陸遜數所角翻下同語半倨翻魯王與楊笁共譖之吳主怒收粲下獄誅下遐稼翻數遣中使責問陸遜遜憤恚而卒恚於避翻其子抗為建武校尉代領遜衆送葬東還自荆州東還葬吳還從宣翻又如字吳主以楊笁所白遜二十事問抗抗事事條答吳主意乃稍解夏六月都鄉穆侯趙儼卒諡法中情見貌曰穆秋七月吳將軍馬茂謀殺吳主及大臣以應魏事泄并黨與皆伏誅吳歴曰茂本魏淮南鍾離長叛降吳八月以太常髙柔為司空漢甘太后殂甘太后後主之母據陳夀志先已卒於南郡此吳太后也吳懿之妹先主入蜀始納焉證以蜀志其殂在是年吳主遣校尉陳勲將屯田及作士三萬人鑿句容中道自小其至雲陽西城通㑹市作邸閣沈約曰句容漢舊縣屬丹陽郡今在建康府南九十里有茅山亦謂之句曲山班固曰㑹稽曲阿縣本秦雲陽縣也後漢屬吳郡沈約曰曲阿本曰雲陽秦始皇改曰曲阿吳嘉禾三年復曰雲陽今相𫝊秦時或言其地有天子氣始皇鑿坑以敗其勢截直道使阿曲故謂之曲阿劉昫曰潤州金壇縣本曲阿縣地㑹市者作市以㑹商旅句如字冬十一月漢大司馬琬卒十二月漢費禕至漢中行圍守魏延鎭漢中實兵諸圍以禦敵所謂圍守也行下孟翻漢尚書令董允卒以尚書吕乂為尚書令董允秉心公亮獻可替否備盡忠益漢主甚嚴憚之䆠人黃皓便僻佞慧便毗連翻漢主愛之允上則正色規主下則數責於皓數所具翻皓畏允不敢為非終允之世皓位不過黃門丞續漢志黃門令丞一人以䆠者為之費禕以選曹郎汝南陳祇代允為侍中漢六曹尚書一曹有郎六人選曹即屬選部選須絹翻祇矜厲有威容多技藝挾智數故禕以為賢越次而用之祇與皓相表裏皓始預政累遷至中常侍操弄威柄終以覆國自陳祇有寵而漢主追怨董允日深謂為自輕謂允為輕已也由祇阿意迎合而皓浸潤搆間故也間古莧翻資治通鑑卷七十四
