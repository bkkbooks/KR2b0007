body:
  text: 資治通鑑卷二百五宋司馬光撰胡三省音注唐紀二十一起𤣥黓執徐盡柔兆涒灘凡五年則天順聖皇后中之上長夀元年是年四月改元如意九月改元長夀自四月以前猶是天授三年正月戊辰朔太后享萬象神宫臘月立故于闐王尉遲伏闍雄之子瑕為于闐王闐徒賢翻尉紆勿翻闍視遮翻春一月丁夘太后引見存撫使所舉人遣存撫使見上卷天授元年見賢遍翻使疏吏翻無問賢愚悉加擢用髙者試鳯閣舍人給事中次試員外郎侍御史補闕拾遺校書郎唐校書郎正九品上月按考異曰統紀天授二年二十道舉人石艾縣令王山齡等六十人擢為拾遺補闕懐州録事参軍霍獻可等二十四人為御史并州録事參軍徐昕等二十四人為著作佐郎及評事内黄尉崔宣道等二十三人為衛佐疑與此只是一事試官自此始時人為之語曰補闕連車載拾遺平斗量容齋隨筆以為此語出於張鷟欋推侍御史欋其俱翻爾雅釋名曰齊魯謂四齒杷為欋推吐雷翻盌脱校書郎盌烏管翻坡詩但信櫝藏終自售豈知盌脱本無模有舉人沈全交續之曰􅭢心存撫使眯目聖神皇􅭢户吴翻麫粘也眯莫禮翻物入目中也老子曰播糠迷目為御史紀先知所禽劾其誹謗朝政請杖之朝堂然後付法劾戸槩翻又戸得翻誹敷尾翻朝直遥翻太后笑曰但使卿軰不濫何恤人言宜釋其罪先知大慙太后雖濫以禄位收天下人心然不稱職者尋亦黜之或加刑誅挾刑賞之柄以駕御天下政由己出明察善㫁故當時英賢亦競為之用稱尺證翻㫁丁亂翻寧陵丞廬江郭覇以諂䛕干太后寧陵縣属宋州本戰國時魏之寗城漢髙祖改為寜陵縣廬江漢龍舒縣地屬廬江郡梁置湖州隋廢州為廬江縣屬廬州紀考異曰新傳名𢎞霸舊傳御史䑓記皆單名霸唯統延載元年云𢎞霸僉載云應革命舉盖正謂此時也今從䑓記拜監察御史監古衘翻中丞魏元忠病霸往問之因甞其糞喜曰大夫糞甘則可憂中丞而呼為大夫過呼之也今苦無傷也元忠大惡之惡烏路翻遇人輙告之戊辰以夏官尚書楊執柔同平章事執柔恭仁弟之孫也太后以外族用之太后母楊氏尚辰羊翻初隋煬帝作東都見一百八十卷大業元年焬羊亮翻無外城僅有短垣而已至是鳯閣侍郎李昭徳始築之左䑓中丞來俊臣羅告同平章事任知古狄仁傑裴行本司禮卿崔宣禮前文昌左丞盧獻御史中丞魏元忠潞州刺史李嗣真謀反任音壬嗣祥吏翻云考異曰舊來俊臣傳地官尚書狄仁傑益州長史任令暉冬官尚書李遊道秋官尚書袁智𢎞司賓卿崔基文昌左史盧獻等六人並為羅告李嶠傳云太后使給事中李嶠與大理少卿張徳裕侍御史劉憲覆其獄徳裕等雖知其枉懼罪並從俊臣所奏嶠曰豈有知其枉濫而不為申明哉孔子曰見義不為無勇也乃與徳裕等列其枉状由是忤㫖出為潤州司馬按嶠平生行事恐不能如此今不取先是來俊臣奏請降敕一問即承反者得減死先悉薦翻及知古等下獄下遐嫁翻俊臣以此誘之誘音酉仁傑對曰大周革命萬物惟新唐室舊臣甘從誅戮反是實俊臣乃少寛之少詩沼翻下同判官王徳壽謂仁傑曰判官俊臣之屬官也尚書定減死矣徳壽業受驅䇿欲求少階級煩尚書引楊執柔可乎仁傑曰皇天后土遣狄仁傑為如此事以頭觸柱血流被面徳壽愳而謝之被皮義翻矦思止鞫魏元忠元忠辭氣不屈思止怒命倒曳之元忠曰我薄命譬如墜驢足絓於鐙為所曳耳絓户掛翻鐙都鄧翻思止愈怒更曳之元忠曰矦思止汝若湏魏元忠頭則截取何必使承反也狄仁傑既承反有司待報行刑不復嚴僃仁傑裂衾帛書寃状置棉衣中謂王徳壽曰天時方熱請授家人去其綿徳壽許之仁傑子光逺得書持之告變得召見復扶又翻去羗吕翻見賢遍翻則天覽之以問俊臣對曰仁傑等下獄臣未嘗褫其巾帯禠地爾翻寢處甚安處昌吕翻茍無事實安肯承反太后使通事舍人周綝往視之俊臣暫假仁傑等巾帶羅立於西使綝視之綝不敢視惟東顧唯諾而已綝丑林翻唯于癸翻俊臣又詐為仁傑等謝死表使綝奏之樂思晦男未十嵗沒入司農思晦死見上卷上年上變得召見上時掌翻見賢遍翻太后問状對曰臣父已死臣家已破但惜陛下法為俊臣等所㺯陛下不信臣言乞擇朝臣之忠清陛下素所信任者朝直遥翻為反状以付俊臣無不承反矣太后意稍寤召見仁傑等問曰卿承反何也對曰不承則已死於拷掠矣陸徳明經典釋文掠音亮太后曰何為作謝死表對曰無之出表示之乃知其詐於是出此七族庚午貶知古江夏令仁傑彭澤令宣禮夷陵令元忠涪陵令獻西鄉令江夏木漢沙羡縣地屬江夏郡晉改沙羡為沙陽江漢二水㑹于縣西春秋謂之夏汭晋宋謂之夏口宋置江夏郡治於此隋因郡名置江夏縣唐屬鄂州彭澤漢縣屬豫章隋更名龍城唐復曰彭澤屬江州涪陵縣漢屬巴郡劉蜀置涪陵郡隋涪陵縣屬渝州唐武徳元年分置涪州為州治所西鄉即漢成固縣地蜀置西鄉縣後魏為洋州治所夏户雅翻涪音浮流行本嗣真于嶺南俊臣與武承嗣等固請誅之太后不許俊臣乃獨稱行本罪尤重請誅之秋官郎中徐有功駮之駮比角翻以為明主有更生之恩更工衡翻俊臣不能將順虧損恩信殿中侍御史貴鄉霍獻可後魏分舘陶西界置貴鄉縣於趙城周建徳七年自趙城東南移三十里以孔思集寺為縣治所大象二年於縣置魏州宣禮之甥也言於太后曰陛下不殺崔宣禮臣請隕命於前以頭觸殿階血流霑地以示為人臣者不私其親太后皆不聼獻可常以緑帛裹其傷㣲露之於幞頭下續事始曰三代黔首以帛絹褁髪周武帝裁為四脚各以幞頭馬周請重繫前脚冀太后見之以為忠甲戌補闕薛謙光上䟽上時掌翻以為選舉之法宜得實才取舍之間風化所繫今之選人咸稱覓舉奔競相尚諠訴無慙選宣戀翻至於才應經邦惟令試䇿武能制敵止騐彎弧昔漢武帝見司馬相如賦恨不同時及置之朝廷終文園令漢司馬相如為子虚賦武帝讀而善之曰朕獨不得與此人同時楊得意曰臣邑人司馬相如自言為此賦上召以為郎後為孝文園令病免而卒知其不堪公卿之任故也吴起將戰左右進劍起曰將者提鼓揮桴臨敵决疑一劍之任非將事也將者非將即亮翻桴方無翻然則虚文豈足以佐時善射豈足以克敵要在文吏察其行能武吏觀其勇畧考居官之臧否行下孟翻否音鄙行舉者賞罸而已來俊臣求金於左衛大將軍泉獻誠不得誣以謀反下獄乙亥縊殺之下遐嫁翻縊於計翻庚辰司刑卿檢校陜州刺史李游道為冬官尚書同平章事陜失冉翻二月己亥吐蕃党項部落萬餘人内附吐從暾入聲党底浪翻分置十州戊午以秋官尚書袁智𢎞同平章事秋官刑部夏四月丙申赦天下改元如意如意元年起此五月丙寅禁天下屠殺及捕魚蝦江淮旱飢民不得采魚蝦餓死者甚衆后禁屠捕而殺人如刈草菅可以人而不如物乎蝦戸加翻右拾遺張徳生男三日私殺羊㑹同僚補闕杜肅懐一餤餤徒濫翻又弋廉翻徒甘翻上表告之上時掌翻明日太后對仗謂徳曰聞卿生男甚喜徳拜謝太后曰何從得肉徳叩頭服辠太后曰朕禁屠宰吉㓙不預然卿自今召客亦須擇人出肅表示之肅大慙舉朝欲唾其面朝直遥翻唾吐臥翻吐蕃酋長曷蘇帥部落請内附以右玉鈐衛將軍張𤣥遇為安撫使將精卒二萬迎之六月軍至大渡水西曷蘇事洩為國人所禽别部酋長昝捶帥羗蠻八千餘人内附𤣥遇以其部落置萊川州而還酋慈由翻長知兩翻帥讀曰率鈐其廉翻使疏吏翻将即亮翻又音如字昝子感翻捶止橤翻新書作挿黎州都督府所管覊縻州有米川州新書作葉州還從宣翻又音如字異曰唐紀作沓揺今從實録考辛亥萬年主簿徐堅上疏以為書有五聼之道上時掌翻疏所據翻周禮小司寇以五聼聼獄訟求民情一曰辭聼觀其所出言不直則煩二曰色聼觀其顔色不直則赧然三曰氣聼不直則喘四曰耳聼觀其聼聆不直則惑五曰目聼觀其眸子不直則眊然令著三覆之奏見一百九十三卷太宗貞觀五年竊見比有敕推按反者比毗至翻令使者得實即行斬决令力丁翻使疏吏翻人命至重死不再生萬一懐枉吞聲赤族豈不痛哉此不足肅姦逆而明典刑適所以長威福而生疑懼臣望絶此處分長知兩翻處昌吕翻下處事同分扶問翻依法覆奏又法官之任宜加簡擇有用法寛平為百姓所稱者願親而任之有處事深酷不允人望願踈而退之堅齊聃之子也處昌吕翻徐齊聃見二百一卷髙宗咸亨元年聃它甘翻夏官侍郎李昭徳密言於太后曰魏王承嗣權太重夏官兵部嗣祥吏翻太后曰吾姪也故委以腹心昭徳曰姪之於姑其親何如子之於父子猶有簒弑其父者况姪乎今承嗣既陛下之姪為親王又為宰相相息亮翻權侔人主臣恐陛下不得久安天位也太后矍然曰朕未之思矍九縳翻秋七月戊寅以文昌左相同鳯閣鸞䑓三品武承嗣為特進納言武攸寧為冬官尚書嗣祥吏翻冬官工部尚辰羊翻夏官尚書同平章事楊執柔為地官尚書並罷政事以秋官侍郎新鄭崔元綜為鸞䑓侍郎秋官刑部新鄭春秋鄭國都鄭武公隨周平王東遷邑於虢鄶之間荘公所謂吾先君新邑于此是也漢為新鄭縣屬河南郡晉魏省隋開皇十六復置屬鄭州夏官侍郎李昭徳為鳯閣侍郎檢校天官侍郎姚璹為文昌左丞夏官兵部鳯閣中書天官吏部改尚書為文昌璹殊六翻檢校地官侍郎李元素為文昌右丞與司賓卿崔神基地官户部司賓卿即鴻臚卿並同平章事考異曰舊昭徳傳舉明徳累遷至鳯閣侍郎長壽二年増置夏官侍郎以昭徳為之是嵗遷鳯閣鸞䑓平章事新紀表傳皆云昭徳自夏官侍郎遷鳯閣侍郎同平章事葢昭徳自鳯閣為夏官自夏官復為鳯閣也婁師徳傳長壽元年増置夏官侍郎今從之崔神基實録作崔基今從新紀表璹思廉之孫姚思廉事隋及唐元素敬𤣥之弟也李敬𤣥相髙宗辛巳以營繕大匠王璿為夏官尚書同平章事光宅改將作監為營繕監璿似宣翻承嗣亦毁昭徳於太后太后曰吾任昭徳始得安眠此代吾勞汝勿言也是時酷吏恣横横下孟翻百官畏之側足昭徳獨廷奏其姧太后好祥瑞好呼到翻有獻白石赤文者執政詰其異詰去吉翻對曰以其赤心昭徳怒曰此石赤心它石盡反邪邪音耶左右皆笑襄州人胡慶以丹漆書龜腹曰天子萬萬年詣闕獻之昭徳以刀刮盡奏請付法太后曰此心亦無惡命釋之太后習猫使與鸚鵡共處處昌吕翻出示百官傳觀未遍猫饑摶鸚鵡食之太后甚慙太后自垂拱以來任用酷吏先誅唐宗室貴戚數百人次及大臣數百家其刺史郎將以下不可勝數將即亮翻勝音升每除一官户婢竊相謂曰户婢官婢之直宫中門户者鬼朴又來矣不旬月輙遭掩捕族誅監察御史朝邑嚴善思後魏分馮翊置澄城郡仍置南五泉縣西魏改為朝邑縣隋唐屬司州監古衘翻朝直遥翻公直敢言時告密者不可勝數勝音升太后亦厭其煩命善思按問引虚伏辠者八百五十餘人羅織之黨為之不振為于偽翻乃相與搆陷善思坐流驩州舊志驩州至京師陸路一萬二千四百五十二里水路一萬七千里至東都一萬一千五百九十五里水路一萬六千二百二十里宋白曰驩州日南郡堯放驩兠于崇山即此太后知其枉尋復召為渾儀監丞后改司天監為渾儀監丞從七品下復扶又翻渾户本翻善思名譔以字行譔七免翻右補闕新鄭朱敬則以太后本任威刑以禁異議今既革命衆心已定宜省刑尚寛乃上疏以為李斯相秦用刻薄變詐以屠諸侯不知易之以寛和卒至土崩此不知變之祸也事見秦紀上時掌翻相息亮翻卒子恤翻漢髙祖定天下陸賈叔孫通説之以禮義𫝊世十二此知變之善也説輪芮翻事見漢紀自文明草昧天地屯象草造也昧䝉也造物之始始於㝠昧言后稱制之初改元文明造始之時也屯者物之始䝉者物之稺言后稱制之初猶天地生物之始屯渉倫翻三叔流言四凶搆難三叔指韓霍諸王四㐫指徐敬業等難乃旦翻不設鉤距無以應天順人不切刑名不可摧奸息暴故置神器開告端謂鑄匭以開告密之門也曲直之影必呈包藏之心盡露神道助直無罪不除蒼生晏然紫宸易主然而急趨無善迹以歩趨為諭也促柱少和聲以琴瑟為諭也少詩沼翻向時之妙策乃當今之芻狗也芻狗祭祀所用既祭則弃之矣伏願覽秦漢之得失考時事之合宜審糟粕之可遺以酒為喻也取其醇汁而去其糟粕覺蘧廬之須毁荘子曰蘧廬可以一宿而不可以久處郭象注云蘧廬傳舍也去萋斐之牙角詩云萋兮斐兮成是貝錦彼譛人者亦已大甚去羗吕翻頓奸險之鋒芒窒羅織之源掃朋黨之迹使天下蒼生坦然大悦豈不樂哉樂音洛太后善之賜帛三百叚侍御史周矩上疏曰推劾之吏皆相矜以虐泥耳籠頭枷研楔轂枷研以重枷研其頸楔轂以鐵圏轂其首而加楔楔先結翻轂呼角翻摺膺籖爪摺與拉同力答翻摧也折也膺胸也籖爪以竹籖其𤓰甲今鞫獄者十指下籖即其遺虐懸髪薰耳號曰獄持或累日節食連宵緩問晝夜揺撼使不得眠號曰宿囚此等既非木石且救目前茍求賖死賖遠也言伏法而死較死於獄中為稍賖也臣竊聽輿議皆稱天下太平何苦須反豈被告者盡是英䧺欲求帝王邪但不勝楚毒自誣耳被皮義翻勝音升願陛下察之今滿朝側息不安朝直遥翻皆以為陛下朝與之密夕與之讐不可保也周用仁而昌秦用刑而亡願陛下緩刑用仁天下幸甚太后頗采其言制獄稍衰䑓考異曰御史記云書奏遂授洛州司功舊薛懐義傳云矩劾奏懐義遷矩天官員外郎竟為懐義所搆下獄免官御史䑓記又云時天官選曹無緒敕矩監之侍郎李景謀為矩所制乃引為員外不閑於吏道自此左出矣據舊傳矩劾奏薛懐義在後若此年出為洛州司功則不當復劾懐義但舊傳矩疏在載初元年二月是時制獄未息今因朱敬則疏終言之太后春秋雖髙善自塗澤雖左右不覺其衰丙戌敕以齒落更生九月庚子御則天門赦天下改元至是方改元長夀自此以後方是長壽元年更以九月為社更工衡翻制於并州置北都癸丑同平章事李遊道王璿袁智𢎞崔神基李元素春官侍郎孔思元益州長史任令輝皆為王𢎞義所陷流嶺南璿似宣翻長知兩翻任音壬左羽林中郎將來子珣坐事流愛州尋卒愛州至京師八千八百里東都八千一百里将即亮翻卒子恤翻初新豐王孝傑從劉審禮撃吐蕃為副摠管與審禮皆没於吐蕃新豐縣屬雍州後改昭應劉審禮没見二百二卷髙宗儀鳯三年吐從瞰入聲贊普見孝傑泣曰貎類吾父厚禮之後竟得歸累遷右鷹揚衛將軍光宅改左右武衛為左右鷹揚衞孝傑久在吐蕃知其虚實㑹西州都督唐休璟請復取龜兹于闐踈勒碎葉四鎮復扶又翻又音如字龜兹音丘慈又音屈佳闐徒賢翻又徒見翻弃四鎮見二百一卷髙宗咸亨元年敕以孝傑為武威軍摠管與武衛大將軍阿史那忠蓈將兵撃吐蕃此時既改武衛為鷹揚衛不應復以舊官名命忠蓈豈史家仍襲舊官名而書之邪將又音如字冬十月丙戍大破吐蕃復取四鎮置安西都䕶府於龜兹發兵戍之二年正月壬辰朔太后享萬象神宫以魏王承嗣為亞獻梁王三思為終獻太后自制神宫樂用舞者九百人户婢團兒為太后所寵信有憾於皇嗣乃譛皇嗣妃劉氏徳妃竇氏為厭呪厭於恊翻又於琰翻癸巳妃與徳妃朝太后於嘉豫殿朝直遥翻既退同時殺之臘考異曰新本紀云月癸亥殺皇嗣妃竇氏舊傳云正月二日今從之今按徳妃竇氏即𤣥宗母也瘞於宫中莫知所在瘞於計翻徳妃抗之曾孫也竇抗太穆皇后之從兄皇嗣畏忤㫖不敢言忤五故翻居太后前容止自如團兒復欲害皇嗣有言其情於太后者太后乃殺團兒復扶又翻云考異曰劉子𤣥太上實錄韋國兒諂佞多端天后尢所信任欲私於上而拒焉怨望遂作桐人潜埋於二妃院内譛殺之又矯制按問上今從則天實錄是時告密者皆誘人奴婢告其主以求功賞徳妃父孝諶為潤州刺史有奴妄為妖異以恐徳妃母龎氏誘音酉諶氏壬翻妖於喬翻寵皮江翻龎氏懼奴請夜祠禱觧因發其事下監察御史龍門薛季昶按之監古衘翻下遐嫁翻季昶誣奏以為與徳妃同祝詛先涕泣不自勝祝職救翻勝音升乃言曰龎氏所為臣子所不忍道太后擢季昶為給事中龎氏當斬其子希瑊瑊古咸翻詣侍御史徐有功訟寃有功牒所司停刑上奏論之以為無罪季昶奏有功阿黨惡逆請付法法司處有功罪當絞令史以白有功侍御史之屬有令史十七人上時掌翻處昌吕翻有功歎曰豈我獨死諸人永不死邪既食掩扇而寢人以為有功苟自强必内憂懼密伺之方熟寢伺相吏翻太后召有功迎謂曰卿比按獄失出何多對曰失出人臣之小過好生聖人之大徳誤出人罪謂之失出比毗至翻好呼到翻太后黙然由是龎氏得減死與其三子皆流嶺南孝諶貶羅州司馬有功亦除名龎考異曰舊有功傳有功為御史坐氏除名尋起為左司郎中竇孝諶傳長夀二年龎氏為酷吏所䧟御史䑓記有功自秋官員外郎坐龎氏除名為流人月餘授御史按實録有功天授初累補司刑丞秋官員外郎稍遷郎中後以公事免萬嵗通天元年擢拜殿中侍御史今從之戊申姚璹奏請令宰相撰時政記㑹要璹以為帝王謨訓不可闕於紀述史官踈遠無因得書請自今以後所論軍國政要宰臣一人撰録號為時政記月送史舘從之時政記自此始臘月丁夘降皇孫成器為壽春王恒王成義為衡陽王恒戸登翻楚王隆基為臨淄王衛王隆範為巴陵王趙王隆業為彭城王皆睿宗之子也春一月庚子以夏官侍郎婁師徳同平章事師徳寛厚清慎犯而不校與李昭徳俱入朝朝直遥翻師徳體肥行緩昭徳屢待之不至怒罵曰田舍夫師徳徐笑曰師徳不為田舍夫誰當為之其弟除代州刺史将行師徳謂曰吾僃位宰相汝復為州牧復扶又翻榮寵過盛人所疾也將何以自免弟長跪曰自今雖有人唾某面某拭之而已庻不為兄憂師徳愀然曰愀七小翻此所以為吾憂也人唾汝面怒汝也汝拭之乃逆其意所以重其怒夫唾不拭自乾乾音干當笑而受之甲寅前尚方監裴匪躬内常侍范雲仙坐私謁皇嗣腰斬於市光宅改少府監為尚方監内侍省有内常侍六人正五品下漢中常侍之職也院考異曰舊來俊臣傳云按張䖍朂范雲仙於洛陽牧䖍朂等不堪其苦自訟於徐有功俊臣命衛士以亂刀斫殺之雲仙亦言歴事先朝稱所司寃苦俊臣命截去其舌士庶膽破無敢言者按張䖍朂天授二年被殺雲仙此年坐謁皇嗣斬今從實録自是公卿以下皆不得見又有告皇嗣潜有異謀者太后命來俊臣鞫其左右左右不勝楚毒皆欲自誣勝音升太常工人京兆安金藏時公卿不得見皇嗣唯金藏等工人得在左右大呼謂俊臣曰公既不信金藏之言請剖心以明皇嗣不反即引佩刀自剖其胸五藏皆出流血被地太后聞之令轝入宫中呼火故翻藏徂浪翻被皮義翻轝羊茹翻使醫内五藏以桑皮線縫之傅以藥經宿始蘇太后親臨視之歎曰吾有子不能自明使汝至此即命俊臣停推停其獄不復推鞫也睿宗由是得免罷舉人習老子更習太后所造臣軌更工衡翻習老子見二百二卷髙宗上元元年二月丙子新羅王政明卒遣使立其子理洪為王卒子恤翻使疏吏翻乙亥禁人間錦侍御史矦思止私畜錦李昭徳按之杖殺於朝堂朝直遥翻或告嶺南流人謀反太后遣司刑評事萬國俊攝監察御史就按之監古衘翻國俊至廣州悉召流人矯制賜自盡流人號呼不服號戸髙翻國俊驅就水曲盡斬之一朝殺三百餘人然後詐為反状還奏因言諸道流人亦必有怨望謀反者不可不早誅太后喜擢國俊為朝散大夫行侍御史朝直遥翻散悉亶翻更遣右翊衛兵曹叅軍劉光業按武徳四年已改左右翊衛為左右衛疑翊字衍兵曹參軍掌王府武官宿衛番第受其名數而大将軍配焉司刑評事王徳夀苑南面監丞鮑思恭唐京都苑各有四面監監各一人從六品下副監一人從七品下丞一人正八品下各掌所管面苑内宫舘園池與其種植修葺之事丞則掌判監事尚輦直長王大貞長知兩翻右武威衛兵曹參軍屈貞筠皆攝監察御史詣諸道按流人光業等以國俊多殺䝉賞爭効之光業殺七百人徳夀殺五百人自餘少者不減百人其遠年雜犯流人亦與之俱斃太后頗知其濫制六道流人未死者并家屬皆聽還鄉里國俊等亦相繼死或得罪流竄亦考異曰實録曰光業等受鸞䑓侍郎傳遊藝之㫖按天授二年遊藝已死舊遊藝傳曰遊藝請則天發六道使雖身死之後竟從其謀武后本遣萬國俊一使國俊還言諸道流人亦反故更遣五使耳遊藝豈豫知遣六道使此所謂天下之惡皆歸焉者也潘遠紀閒曰補闕李秦授寓直中書進封事曰陛下自登極誅斥李氏及諸大臣其家人親族流放在外以臣所料且數萬人如一旦同心招集為逆出陛下不意臣恐社稷必危䜟曰代武者劉夫劉者流也陛下不殺此軰臣恐為祸深焉天后納之夜中召入謂曰卿名秦授天以卿授朕也何啟予心即拜考功員外郎仍知制誥賜朱紱女妓十人金帛稱是與謀發敕使十人於十道安慰流者其實賜墨敕與牧守有流放者殺之天后度流人已死又使使者安撫流人曰吾前發十道使安慰流人何使者不曉吾意擅加殺害深為酷暴其輙殺流人使並所在鎻項将至害流人處斬之以快亡魂諸流人未死或它事繫者兼家口放還按當時止誅嶺南一道因萬國俊言更發五道使非併發十道使也十道在近地者何嘗冇流人也國俊既以多殺受賞餘使或病死或自以它罪流竄必無并斬之理今並從實録及舊傳來俊臣誣冬官尚書蘇幹云在魏州與琅邪王冲通謀冲舉兵見上卷垂拱四年夏四月乙未殺之五月癸丑棣州河溢棣州後漢樂安郡中廢唐武徳四年分滄州之厭次陽信滴河樂陵置棣州秋九月丁亥朔日有食之魏王承嗣等五千人表請加尊號曰金輪聖神皇帝乙未太后御萬象神宫受尊號赦天下作金輪等七寶七寶一曰金輪寶曰白象寶曰女寶曰馬寶曰珠寶曰主兵臣寶曰主藏臣寶每朝㑹陳之殿庭朝直遥翻庚子追尊昭安皇帝曰渾元昭安皇帝渾戸本翻文穆皇帝曰立極文穆皇帝孝明髙皇帝皇后從帝號后又追尊其三世辛丑以文昌左丞同平章事姚璹為司賓卿罷政事以司賓卿萬年豆盧欽望為内史新書宰相世系表豆盧氏本姓慕容氏北地王精降後魏北人謂歸義為豆盧因以為氏文昌左丞韋巨源同平章事秋官侍郎吴人陸元方為鸞臺侍郎同平章事巨源孝寛之𤣥孫也韋孝寛事宇文氏為名将延載元年是年五月改元正月丙戌太后享萬象神宫突厥可汗骨篤禄卒其子㓜弟黙啜自立為可汗臘月甲戌黙啜宼靈州室韋反北史曰室韋盖契丹之類其南者為契丹在北者為室韋新書室韋契丹别種東胡之北邉盖丁零苖裔也地據黄龍北傍峱越河直京師東北七千里東黒水靺鞨西突厥南契丹北渤海其國無君長惟大酋皆號莫賀咄筦攝其部而附於突厥遣右鷹揚衛大將軍李多祚擊破之春一月以婁師徳為河源等軍檢校營田大使使疏吏翻下同二月武威道摠管王孝傑破吐蕃㪍論贊刅突厥可汗俀子等於冷泉及大嶺俀子西突厥部所立也俀吐猥翻弱也大嶺谷名各三萬餘人碎葉鎮守使韓思忠破泥熟俟斤等萬餘人俟渠之翻考異曰此事諸書皆無唯統紀有之綂紀又破吐蕃萬泥勲沒䭾城此語不可暁今刪去庚午以僧懐義為代北道行軍大摠管考異曰實録新紀皆云伐逆道今從舊懐義傳以討黙啜三月甲申以鳯閣舍人蘇味道為鳯閣侍郎同平章事李昭徳檢校内史更以僧懐義為朔方道行軍大摠管以李昭徳為長史蘇味道為司馬帥契苾明曹仁師沙吒忠義等十八將軍以討黙啜帥讀曰率下同契欺訖翻苾毗必翻吒陟加翻未行虜退而止昭徳嘗與懐義議事失其㫖懐義撻之昭徳惶懼請罪夏四月壬戍以夏官尚書武威道大摠管王孝傑同鳯閣鸞臺三品五月魏王承嗣等二萬六千餘人上尊號曰越古金輪聖神皇帝上時掌翻甲午御則天門樓受尊號赦天下改元天授中遣監察御史夀春裴懐古安集西南蠻六月癸丑永昌蠻酋薫期帥部落二十餘萬戸内附姚州境冇永昌蠻居永昌郡地薫期新書作董期監古衘翻酋慈由翻河内有老尼居神都麟趾寺與嵩山人韋什方等以妖妄惑衆尼女夷翻妖於喬翻尼自號净光如來云能知未然什方自云吴赤烏年生又有老胡亦自言五百嵗云見薛師已二百年矣僧懐義本馮小實也太后使與薛紹通昭穆故考胡謂之薛師容貎愈少少詩照翻太后甚信重之賜什方姓武氏秋七月癸未以什方為正諌大夫同平章事制云邁軒代之廣成荘子曰廣成子居崆峒之上黄帝立於下風而問道廣成子曰吾修身千二百嵗矣吾形未嘗衰黄帝名軒轅因曰軒氏逾漢朝之河上葛洪曰河上公者莫知其姓名也漢文帝時結草庵于河之濱文帝從之問老子河上公曰余注是經以來千七百餘年朝直遥翻八月什方乞還山制罷遣之戊辰以王孝傑為瀚海道行軍摠管仍受朔方道行軍大摠管薛懐義節度己巳以司賓少卿姚璹為納言左肅政中丞原武楊再思為鸞臺侍郎洛州司馬杜景儉為鳯閣侍郎並同平章事豆盧欽望請京官九品以上輸兩月俸以贍軍唐制一品月俸八千食料一千八百雜用一千二百二品月俸六千五百食料一千五百雜用一千三品月俸五千一百食料一千一百雜用九百四品月俸三千五百食料七百雜用七百五品月俸三千食料雜用六百六品月俸二千食料雜用四百七品月俸一千七百五十食料雜用三百五十八品月俸一千三百食料三百雜用二百五十九品月俸一千五十食料二百五十雜用二百行署月俸一百四十食料三十俸扶用翻贍昌艶翻轉帖百官令拜表轉帖者止書一帖使吏以轉示百官百官但赴拜不知何事拾遺王求禮謂欽望曰明公禄厚輸之無傷卑官貧廹柰何不使其知而欺奪之乎欽望正色拒之既上表上時掌翻求禮進言曰陛下富有四海軍國有儲何藉貧官九品之俸而欺奪之姚璹曰求禮不識大體求禮曰如姚璹為識大體者邪事遂寢戊寅鸞臺侍郎同平章事崔元綜坐事流振州武三思帥四夷酋長請鑄銅銕為天樞立於端門之外端門洛陽皇城正南門銘紀功徳黜唐頌周以姚璹為督作使使疏吏翻諸胡聚錢百萬億買銅銕不能足賦民間農器以足之九月壬午朔日有食之殿中丞來俊臣坐贓貶同州參軍王𢎞義流瓊州曹魏初置殿中監隋煬帝置少監及丞舊志瓊州至兩京與崖州道里相類考異曰統紀云萬嵗通天元年五月監察御史紀履忠劾奏御史中丞來俊臣犯状有五請下獄理罪御史臺紀履忠與來俊臣不恊具衣冠而弹之不果黜授顔城尉俊臣誅授左領軍衛胄曹新傳云俊臣納賈人金為御史紀履忠所劾下獄當死后忠其上變得不誅免為民按舊傳云俊臣為履忠所告下獄長夀二年除殿中丞又坐贓出為同州參軍萬嵗通天元年召為合宫尉統紀云萬嵗通天元年紀履忠劾奏誤也王𢎞義傳云延載元年俊臣貶𢎞義亦流瓊州是俊臣長夀二年已前坐贓下獄此年又坐贓貶今從舊傳詐稱敕追還至漢北侍御史胡元禮遇之按驗得其姦状杖殺之内史李昭徳恃太后委遇頗專權使氣人多疾之前魯王府功曹參軍丘愔上疏攻之唐諸王府功曹參軍事正七品上掌文官簿書考課陳設愔于今翻上時掌翻下長上同䟽所據翻其畧曰陛下天授以前萬機獨斷斷丁亂翻自長夀以來委任昭徳參奉機密獻可替否事有便利不預諮謀要待畫日將行凡制敕皆進畫日而後行方乃别生駁異駁比角翻揚露專擅顯示於人歸羙引愆義不如此善則稱君過則稱已人臣之義也又曰臣觀其膽乃大於身鼻息所衝上拂雲漢又曰蠓宂壞隄針芒寫氣權重一去收之極難長上果毅鄧注唐六典長上折衝果毅應宿衛者並一日上兩日下又著石論數千言述昭徳專權之状鳯閣舍人逢𢎞敏取奏之逢皮江翻太后由是惡昭徳壬寅貶昭徳為南賓尉惡烏路翻南賓縣屬欽州本漢合浦縣地隋開皇十八年置南賓縣尋又免死流竄太后出黎花一枝以示宰相宰相皆以為瑞杜景儉獨曰今草木黄落而此更發榮隂陽不時咎在臣等因拜謝太后曰卿真宰相也相悉亮翻冬十月壬申以文昌右丞李元素為鳯閣侍郎左肅政中丞周允元檢校鳯閣侍郎並同平章事校古効翻允元豫州人也嶺南獠反以容州都督張𤣥遇為桂永等州經畧大使以討之容州漢合浦縣地隋為合浦郡之北流縣唐武徳四年分置銅州貞觀元年改容州因容山為名獠魯皓翻使疏吏翻天冊萬嵗元年是年九月改元天冊萬嵗正月辛巳朔太后加號慈氏越古金輪聖神皇帝赦天下改元證聖周允元與司刑少卿皇甫文僃奏内史豆盧欽望同平章事韋巨源杜景儉蘇味道陸元方附㑹李昭徳不能匡正欽望貶趙州舊志趙州至京師東北一千八百四十二里東都一千三十三里巨源貶麟州統考異曰舊紀傳新紀表傳皆作鄜州紀作瀛州實録唐歴作麟州今從之景儉貶溱州貞觀五年置麟州以處生羗屬松州都督府十六年開山洞置溱州屬黔州都督府舊志溱州至京師三千四百八十里東都四千二百里溱側詵翻味道貶集州元方貶綏州刺史舊志集州京師西南一千四百二十五里至東都二千六百里綏州京師東北一千里至東都一千八百一十九里初明堂既成太后命僧懐義作夾紵大像紵直吕翻檾屬今人謂之紵麻夾紵者以紵布夾縫為大像後所謂麻主是也其小指中猶容數十人於明堂北構天堂以貯之貯丁吕翻堂始構為風所摧更構之日役萬人采木江嶺數年之間所費以萬億計府藏為之耗竭藏徂浪翻為于偽翻懐義用財如糞土太后一聽之無所問每作無遮㑹用錢萬緡士女雲集又散錢十車使之爭拾相蹈踐有死者踐息淺翻所在公私田宅多為僧有懐義頗厭入宫多居白馬寺所度力士為僧者滿千人侍御史周矩疑有姦謀固請按之太后曰卿姑退朕即令往矩至臺懐義亦至乗馬就階而下坦腹於床矩召吏將按之遽躍馬而去矩具奏其状太后曰此道人病風不足詰所度僧惟卿所處詰去吉翻處昌吕翻悉流遠州遷矩天官員外郎乙未作無遮㑹於明堂鑿地為阬深五丈深式浸翻結綵為宫殿佛像皆於阬中引出之云自地涌出又殺牛取血畫大像首髙二百尺云懐義刺膝血為之髙居傲翻刺七亦翻丙申張像於天津橋南設齋時御醫沈南璆唐六典尚藥局屬殿中省冇侍御醫四人從六品上璆音求亦得幸於太后懐義心愠温於問翻是夕宻燒天堂延及明堂火照城中如晝比明皆盡比必利翻暴風裂血像為數百叚太后耻而諱之但云内作工徒誤燒麻主遂渉明堂時方酺宴左拾遺劉承慶請輟朝停酺以荅天譴酺音蒲朝直遥翻太后將從之姚璹曰㫺成周宣榭卜代愈隆漢武建章盛徳彌永左傳宣十五年夏成周宣榭火班書曰榭所以藏樂噐宣其名也漢武時柏梁臺災乃大營建章姚璹引二事傅以已説以逢君之惡今明堂布政之所非宗廟也不應自貶損太后乃御端門觀酺如平日命更造明堂天堂仍以懐義充使使疏吏翻又鑄銅為九州鼎神都鼎曰豫州髙一丈八尺受千八百石兾州鼎曰武興雍州鼎曰長安兖州鼎曰日觀青州鼎曰少陽徐州鼎曰車源揚州鼎曰江都荆州鼎曰江陵梁州鼎曰咸都八州鼎髙一丈四尺各受千二百石嵗考異曰舊傳云懐義帥人作號頭安置之按天冊萬元年二月懐義死神功元年九鼎始成舊傳誤也或懐義死時方鑄耳及十二神十二神子屬鼠丑屬牛寅屬虎夘屬兎辰屬龍巳屬蛇午屬馬未屬羊申屬猴酉屬鷄戌屬狗亥屬豬皆髙一丈髙古犒翻各置其方先是河内老尼晝食一麻一米夜則烹宰宴樂畜弟子百餘人滛穢靡所不為武什方自言能合長年藥先悉薦翻樂音洛畜吁玉翻合音閣太后遣乗驛於嶺南采藥及明堂火尼入唁太后唁魚變翻太后怒叱之曰汝常言能前知何以不言明堂火因斥還河内弟子及老胡等皆逃散又有發其姦者太后乃復召尼還麟趾寺弟子畢集敕給使掩捕盡獲之復扶又翻唐六典北齊内職有散給使五十人唐因之置内給使無常員屬宫闈局凡宦人無官品者稱内給使又冇小給使學生五十人皆沒為官婢什方還至偃師偃師縣屬河南府在洛城東六十里聞事露自絞死庚子以明堂火告廟下制求直言劉承慶上疏以為火發既從麻主後及總章所營佛舍恐勞無益請罷之又明堂所以統和天人統他綜翻一旦焚毁臣下何心猶為酺宴憂喜相爭傷於情性又陛下垂制愽訪許陳至理而左史張鼎以為今旣火流王屋彌顯大周之祥武王代紂既渡河有火至於王屋流為烏馬融曰王屋王所居屋通事舍人逢敏奏稱彌勒成道時有天魔燒宫七寶臺須㬰散壊魔莫婆翻考異曰僉載以七寳臺散壊為姚璹之語今從實録斯實謟妄之邪言非君臣之正論伏願陛下乾乾翼翼易曰君子終日乾乾夕惕若詩曰小心翼翼無戾天人之心而興不急之役則兆人䝉頼福禄無窮獲嘉主簿彭城劉知幾獲嘉縣本汲縣之新史鄉漢武帝行幸過此聞獲吕嘉因置獲嘉縣屬河内郡後周置修武郡隋置殷州尋廢州為獲嘉縣唐屬懐州彭城縣帯徐州幾居希翻表陳四事其一以為皇業權輿爾雅權輿始也天地開闢嗣君即位黎元更始更工衡翻時則藉非常之慶以申再造之恩今六合清晏而赦令不息近則一年再降遠則每嵗無遺至於違法悖禮之徒悖蒲内翻下同無頼不仁之軰編戸則寇攘為業當官則贓賄是求而元日之朝指期天澤重陽之莭佇降皇恩重直龍翻如其忖度咸果釋免或有名垂結正罪將㫁决度徒洛翻斷丁亂翻竊行貨賄方便規求故致稽延畢霑寛宥用使俗多頑悖時罕㢘隅為善者不預恩光作惡者獨承徼幸徼古堯翻古語曰小人之幸君子之不幸太宗亦嘗引是言斯之謂也望陛下而今而後頗節於赦使黎氓知禁姦宄肅清其二以為海内具僚九品以上每嵗逢赦必賜階勛唐制文散階二十九武散階亦二十九勲級十有二轉至於朝野宴集公私聚㑹緋服衆於青衣上元敕四品服深緋五品服淺緋九品服深青朝直遥翻下同象板多於木笏唐制五品以上笏用象九品以上用木皆榮非徳舉位罕才升不知何者為妍蚩何者為羙惡臣望自今以後稍息私恩使有善者逾效忠勤無才者咸知勉勵其三以為陛下臨朝踐極取士大廣六品以下軄事清官遂乃方之土芥比之沙礫礫音歴若遂不加沙汰臣恐有穢皇風其四以為今之牧伯遷代太速倐來忽往蓬轉萍流既懐茍且之謀何暇循良之政望自今刺史非三嵗以上不可遷官仍明察功過尤甄賞罰疏奏太后頗嘉之甄稽延翻别也疏所去翻是時官爵易得而法網嚴峻易以䜴翻故人競為趨進而多䧟刑戮知幾乃著思慎賦以刺時見志焉丙午以王孝傑為朔方道行軍摠管撃突厥春二月己酉朔日有食之僧懐義益驕恣太后惡之惡烏路翻既焚明堂心不自安言多不順太后宻選宫人有力者百餘人以防之壬子執之於瑶光殿前樹下使建昌王武攸寜帥壮士敺殺之帥讀曰率敺烏口翻夫考異曰舊傳云又有發其隂謀者太平公主乳母張人令壮士縳而縊殺之送尸白馬寺其侍者僧徒皆流竄遠惡處李啇隠宜都内人傳云武后簒既久頗放縱耽内習不敬宗廟四方日有叛逆防豫不暇時宜都内人以唾壺進思有以諌者后坐帷下倚檀几與語問四方事宜内人曰大家知女卑於男邪后曰知内人曰古有女媧亦不正是天子佐伏羲理九州耳後世孃姥冇越出房閤斷天下事皆不得其正多是輔昏主不然抱小兒獨大家改夫姓改去釵釧襲服冠冕符瑞日至大臣不敢動真天子也然今内之弄臣狎人朝夕進御者乆未屏去妾疑此未當天意后曰何内人曰女隂也男陽也陽尊而隂卑雖大家以隂事主天然宜體取剛亢明烈以銷群陽陽銷然後隂得志也今狎㺯日至處大家夫宫尊位其勢隂求陽也陽勝而隂亦㣲不可久也大家始今日能屛去男妾獨立天下則陽之剛亢明烈可有矣如是過萬萬世男子益削女子益專妾之願在此后雖不能盡用然即日下令誅作明堂者此盖文士寓言今從實録送尸白馬寺焚之以造塔甲子太后去慈氏越古之號去羗吕翻三月丙辰鳯閣侍郎同平章事周允元薨夏四月天樞成天樞其制若柱髙一百五尺髙占犒翻徑十二尺八面各徑五尺下為鐡山周百七十尺以銅為蟠龍麒麟縈繞之上為騰雲承露盤徑三丈四龍人立捧火珠髙一丈工人毛婆羅造模武三思為文刻百官及四夷酋長名髙古犒翻酋慈由翻長知兩翻太后自書其榜曰大周萬國頌徳天樞秋七月辛酉吐蕃寇臨洮臨洮洮州洮土刀翻以王孝傑為肅邉道行軍大摠管以討之九月甲寅太后合祭天地於南郊加號天冊金輪大聖皇帝赦天下改元改元天冊萬嵗冬十月突厥黙啜遣使請降使疏吏翻降戸江翻太后喜冊授左衛大將軍歸國公萬嵗通天元年是年九月始改元臘月甲戌太后發神都甲申封神嶽后以嵩山為神嶽制考異曰統紀作壬午實録作甲申按去嵗下云臘月十六日有事於神嶽長歷是月甲戌朔壬午九日甲申十一日皆非十六日今從實録赦天下改元萬嵗登封天下百姓無出今年租税大酺九日酺音蒲丁亥禪於少室戴延之曰嵩山三十六峯東曰太室西曰少室相去十七里嵩其總名也謂之室以其下各有石室焉少室髙八百六十丈方十里與太室相埒但小耳己丑御朝覲壇受賀朝直遥翻癸巳還宫甲午謁太廟右千牛衛將軍安平王武攸緒少有志行恬澹寡欲扈從封中嶽還少詩照翻行下孟翻從才用翻即求弃官隱於嵩山之陽太后疑其詐許之以觀其所為攸緒遂優游巖壑冬居茅椒茅椒編之為室性煖可以禦寒夏居石室一如山林之士太后所賜及王公所遺野服器玩遺才季翻攸緒一皆置之不用塵埃凝積買田使奴耕種與民無異弃考異曰舊傳云聖歴中官隠嵩山今從實録春一月甲寅以婁師徳為肅邉道行軍副總管撃吐蕃己巳以師徳為左肅政大夫知政事如故師考異曰實録云己巳秋官尚書婁徳為肅政御史大夫知政事如故舊傳曰萬嵗登封元年轉左肅政御史大夫仍依舊知政事證聖元年吐蕃寇洮州令師徳與夏官尚書王孝傑討之按證聖年號在登封前此傳尤為謬誤新𫝊云師徳為河源積石懐遠軍及河蘭鄯廓州檢校營田大使入遷秋官尚書改左肅政御史大夫並知政事證聖中與王孝傑拒吐蕃於洮州今據寔録延載元年一月自宰相出為營田大使新書宰相表長夀二年師徳平章事延載元年出軍營田大使萬嵗通天元年一月甲寅師徳為左肅政御史大夫肅邊道行軍總管統紀云秋官尚書知政事婁師徳充副總管討吐蕃盖師徳之出為營田大使不觧宰相之職也今從實録新本紀改長安崇尊廟為太廟崇尊廟見上卷天授元年二月辛巳尊神嶽天中王為神嶽天中黄帝靈妃為天中黄后啟為齊聖皇帝封啟母神為玉京太后夏后啟母石在嵩山三月壬寅王孝傑婁師徳與吐蕃將論欽陵賛婆戰於素羅汗山據婁師徳傳素羅汗山在洮州界将即亮翻唐兵大敗孝傑坐免為庶人師徳貶原州員外司馬異考曰新紀四月庚子貶師徳而無免孝傑日新表三月壬寅孝傑免按實録三月壬寅撫州火下言孝傑敗盖皆據奏到之日耳二人同罪貶必同時不容隔月不知果在何日今但依實録因其軍敗終言貶官之事而已師徳因署移牒驚曰官爵盡無邪既而曰亦善亦善不復介意復扶又翻丁巳新明堂成髙二百九十四尺方三百尺規模率小於舊上施金塗鐡鳯髙二丈髙古犒翻後為大風所損更為銅火珠羣龍捧之更工衡翻號曰通天宫赦天下改元萬嵗通天大食請獻師子姚璹上疏以為師子専食肉遠道傳致傳知戀翻肉既難得極為勞費陛下鷹犬不畜漁獵悉停豈容菲薄於身而厚給於獸乃却之以檢校夏官侍郎孫元亨同平章事夏五月壬子營州契丹松漠都督李盡忠歸誠州刺史孫萬榮舉兵反攻䧟營州開元十道志曰舜築栁城即虞舜已前已有栁城之地因有營州之稱郡國志云當營室分故曰營州後漢末遼西烏丸蹋頓所居後魏於平州界置遼西郡周平齊猶為髙寳寧所據隋討平寳寧始置營州松漠都督府及歸城州太宗以内屬契丹部落置殺都督趙文翽契欺訖翻又音喫翻呼㑹翻盡忠萬榮之妹夫也皆居於營州城側文翽剛愎契丹饑不加賑給視酋長如奴僕故二人怨而反愎弼力翻賑津忍翻酋慈由翻長知兩翻乙丑遣左鷹揚衛將軍曹仁師右金吾衛大将軍張𤣥遇左威衛大将軍李多祚司農少卿麻仁莭等二十八將討之八将即亮翻秋七月辛亥以春官尚書梁王武三思為榆闗道安撫大使榆闗在勝州界與突厥接非所以備契丹也營州城西四百八十里有榆闗守捉城所謂臨渝之險也榆當作渝史於此以後多以渝作榆讀者宜詳考使疏吏翻姚璹副之以僃契丹改李盡忠為李盡滅孫萬榮為孫萬斬武后改突厥骨咄禄為不卒禄又改李盡忠為李盡滅孫萬榮為孫萬斬此事何異王莾所為顧有成敗之異耳盡忠尋自稱無上可汗據營州可從刋入聲汗音寒以萬榮為前鋒略地所向皆下旬日兵至數萬進圍檀州檀州本漢漁陽郡傂奚縣地舊置安州後周改為𤣥州隋開皇十六年置檀州清邊前軍副總管張九節擊却之八月丁酉曹仁師張𤣥遇麻仁節與契丹戰於硤石谷平州有西硤石東硤石二戍唐兵大敗先是契丹破營州先悉薦翻獲唐俘數百囚之地牢聞唐兵將至使守牢霫紿之曰使霫守唐俘於地牢故曰守牢霫霫而立翻紿蕩亥翻吾軰家屬饑寒不能自存唯俟官軍至即降耳降户江翻下同既而契丹引出其俘飼以糠粥慰勞之曰飼祥吏翻勞力到翻吾養汝則無食殺汝又不忍今縱汝去遂釋之俘至幽州具言其狀諸軍聞之爭欲先入至黄麞谷據舊書黄麞谷在西硤石虜又遣老弱迎降故遺老牛瘦馬於道側仁師等三軍弃歩卒將騎兵先進契丹設伏横撃之飛索以䌈𤣥遇仁節生獲之將即亮翻騎竒寄翻索昔各翻字書無䌈字今讀與榻同徳盍翻或曰吐合翻將卒死者填山谷鮮有脱者鮮息淺翻契丹得軍印詐為牒令𤣥遇等署之牒總管燕匪石宗懐昌等云官軍已破賊若至營州軍將皆斬兵不叙勲燕因肩翻将即亮翻匪石等得牒晝夜兼行不遑寢食以赴之士馬疲弊契丹伏兵於中道邀之全軍皆沒九月制天下繋囚及庶士家奴驍勇者官償其直發以撃契丹驍堅堯翻初令山東近邊諸州置武騎團兵以同州刺史建安王武攸宜為右武威衛大將軍充清邊道行軍大總管以討契丹右拾遺陳子昻為攸宜府參謀以本官參謀軍事不列為品秩上疏曰恩制免天下罪人及募諸色奴充兵討撃契丹此乃㨗急之計非天子之兵且比來刑獄乆清罪人全少比毗至翻少詩沼翻奴多怯弱不慣征行慣古患翻縱其募集未足可用况今天下忠臣義士萬分未用其一契丹小孽孽魚列翻假命待誅何勞免罪贖奴損國大體臣恐此䇿不可威示天下丁巳突厥寇凉州執都督許欽明欽考異曰實録云吐蕃寇凉州都督許明為賊所殺按明年正月黙啜寇霛州以欽明自随又黙啜将襲孫萬榮殺欽明以祭天實録云吐蕃誤也欽明紹之曾孫也許紹預凌烟閣二十四功臣之列時出按部突厥數萬奄至城下欽明拒戰為所虜欽明兄欽寂時為龍山軍討擊副使與契丹戰於崇州龍山即慕容氏和龍之山也崇州奚州也武徳五年分饒樂都督府之可汗部置貞觀三年徙治營州之廢陽師鎮軍敗被擒虜將圍安東令欽寂説其屬城未下者説輸芮翻安東都護裴𤣥珪在城中髙宗總章元年置安東都䕶府於平壤城上元元年徙遼東郡故城儀鳯二年又徙新城開元二年徙平州天寶二年徙遼西故郡城疑此時已徙平州宋白曰營州東南二百七十里有保定軍舊安東都䕶府欽寂謂曰狂賊天殃滅在朝夕公但勵兵謹守以全忠節虜殺之吐蕃復遣使請和親復扶又翻太后遣右武衛胄曹參軍貴鄉郭元振往察其宜胄曹參軍掌兵械公廨興善罸讁大朝會行從則受黄質甲鎧弓矢於衛尉吐蕃將論欽陵請罷安西四鎮戍兵并求分十姓突厥之地長夀元年置四鎮戍兵十姓突厥五咄陸五弩失畢也元振曰四鎮十姓與吐蕃種類本殊種章勇翻今請罷唐兵豈非有兼并之志乎欽陵曰吐蕃茍貪土地欲為邊患則東侵甘凉豈肯規利於萬里之外邪乃遣使者隨元振入請之朝廷疑未决元振上疏使疏吏翻朝直遥翻上時掌翻以為欽陵求罷兵割地此乃利害之機誠不可輕舉措也今若直拒其善意則為邊患必深四鎮之利逺甘凉之害近不可不深圖也宜以計緩之使其和望未絶則善矣彼四鎮十姓吐蕃之所甚欲也而青海吐谷渾亦國家之要地也吐從瞰入聲谷音浴今報之宜曰四鎮十姓之地本無用於中國所以遣兵戍之欲以鎮撫西域分吐蕃之勢使不得併力東侵也今若果無東侵之志當歸我吐谷渾諸部及青海故地吐谷渾地沒吐蕃見二百二卷髙宗咸亨三年薛仁貴敗於大非州青海亦沒則五俟斤部亦當以歸吐蕃西突厥五弩失畢部各有酋長曰五俟斤俟渠之翻如此則足以塞欽陵之口塞悉則翻而亦未與之絶也若欽陵小有乖違則曲在彼矣且四鎮十姓欵附日乆今未察其情之向背事之利害背蒲妹翻遥割而弃之恐傷諸國之心非所以御四夷也太后從之四考異曰御史䑓記論欽陵必欲得鎮及益州通市乃和親朝廷不許制書至河源納言婁師徳患之曰制書到彼必入寇柰何監察御史南陽張彦先時按河源積石諸軍謂師徳曰但稽制書虜必狐疑吾乃先為之備虜至必不㨗矣師徳從之欽陵入寇果無功由是得罪於其國按師徳延載元年一月日同平章事充河源積石懐逺等軍營田大使萬嵗通天元年一月為肅邊道行軍總管與王孝傑同撃吐蕃敗於素羅汗山尋貶原州司馬是嵗吐蕃復求和欽陵請割四鎮之地神功元年正月師徳復同平章事九月乃守納言御史䑓記誤也元振又上言吐蕃百姓疲於徭戍早願和親欽陵利於統兵專制獨不欲歸欵若國家嵗發和親使使疏吏翻而欽陵常不從命則彼國之人怨欽陵日深望國恩日甚設欲大舉其徒固亦難矣斯亦離間之漸間古莧翻可使其上下猜阻禍亂内興矣太后深然之元振名震以字行庚申以并州長史王方慶為鸞䑓侍郎與殿中監萬年李道廣並同平章事突厥黙啜請為太后子并為其女求昏悉歸河西降戸帥其部衆為國討契丹并為衆為並于偽翻帥讀曰率太后遣豹韜衛大將軍閻知微龍朔改左右屯衛為左右武威衛光宅又改為左右豹韜衛左衛郎將攝司賓卿田歸道冊授黙啜左衛大將軍遷善可汗知㣲立徳之孫歸道仁㑹之子也閻立徳以巧思稱田仁㑹良吏也冬十月辛夘契丹李盡忠卒孫萬榮代領其衆突厥黙啜乘間襲松漠虜盡忠萬榮妻子而去卒子恤翻間古莧翻太后進拜黙啜為頡跌利施大單干立功報國可汗頡戸結翻跌徒結翻單音蟬孫萬榮收合餘衆軍埶復振復扶又翻遣别帥駱務整何阿小為前鋒帥所類翻阿烏葛翻攻䧟冀州殺刺史陸寶積屠吏民數千人又攻瀛州河北震動制起彭澤令狄仁傑長夀元年仁傑貶為魏州刺史前刺史獨孤思莊畏契丹猝至悉驅百姓入城繕修守備仁傑至悉遣還農曰賊猶在遠何煩如是萬一賊來吾自當之百姓大悦時契丹入寇軍書填委夏官郎中硤石姚元崇剖析如流皆有條理後魏太和十一年於崤陵置崤縣屬恒農郡隋并入熊耳縣屬河南郡唐武徳元年復置貞觀十四年移治硤石塢因更名硤石太后竒之擢為夏官侍郎太后思徐有功用法平長夀二年有功除名擢拜左䑓殿中侍御史聞者無不相賀鹿城主簿宗城潘好禮鹿城漢安定侯國時縣西七里故城是也周齊為安定縣隋改為鹿城縣唐屬冀州唐制上縣主簿正九品下中下縣從九品上好呼到翻著論稱有功蹈道依仁固守誠節不以貴賤死生易其操履設客問曰徐公於今誰與為比主人曰四海至廣人物至多或匿迹韜光僕不敢誣若所聞見則一人而已當於古人中求之客曰何如張釋之主人曰釋之所行者甚易徐公所行者甚難難易之間優劣見矣易以䜴翻下不易同見賢遍翻張公逢漢文之時天下無事至如盗髙廟玉環及渭橋驚馬守法而已事見十四卷漢文帝三年豈不易哉徐公逢革命之秋屬惟新之運屬之欲翻唐朝遺老或包藏祸心使人主有疑朝直遥翻如周興來俊臣乃堯年之四凶也崇飾惡言以誣盛徳而徐公守死善道深相明白幾䧟囹圄數挂網羅幾居希翻囹盧丁翻圄魚巨翻數所角翻此吾子所聞豈不難哉載考異曰朝野僉云時來俊臣羅織人罪皆先進状敕依即奏籍沒徐冇功出死囚亦先進状某人罪合免敕依然後斷雪冇功好出罪皆先奉進止非是自専盖時人見俊臣所誅有功所雪徃徃得其所欲疑以為先進状耳若有功一一先奉進止何至三䧟死刑乎今不取客曰使為司刑卿乃得展其才矣主人曰吾子徒見徐公用法平允謂可置司刑僕覩其人方寸之地何所不容若其用之何事不可豈直司刑而已哉資治通鑑卷二百五
