front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百五十五宋司馬光撰胡三省音註梁紀十一起重光大淵獻盡𤣥黓困敦凡二年髙祖武皇帝十一中大通三年春正月辛巳上祀南郊大赦魏尚書右僕射鄭先䕶聞洛陽不守士衆逃散遂来奔去年魏敬宗遣鄭先䕶討東郡丙申以先䕶為征北大將軍二月辛丑上祀明堂魏自敬宗被囚宫室空近百日被皮義翻近其靳翻去年十二月壬寅爾朱兆渡河囚敬宗甲寅遷晉陽是月己巳節閔帝即位始入宫爾朱世隆鎮洛陽商旅流通盜賊不作世隆兄弟宻議以長廣王疎逺又無人望欲更立近親更工衡翻儀同三司廣陵王恭羽之子也廣陵王羽魏孝文帝之弟好學有志度正光中領給事黃門侍郎以元乂擅權託瘖病居龍華佛寺好呼到翻瘖於今翻華讀曰花無所交通永安末有白敬宗言王陽瘖將有異志云考異曰伽藍記莊帝疑恭姦詐夜遣人盜掠衣物拔刀劒欲殺之恭張口以手拈舌竟乃不言莊帝信其真放令歸第今從魏書恭懼逃於上洛山上洛山在洛州上洛郡上洛縣界洛州刺史執送之魏洛州刺史治上洛繫治乆之以無狀獲免無狀者無反狀也治直之翻闗西大行臺郎中薛孝通説爾朱天光曰廣陵王髙祖猶子禮曰兄弟之子猶子也廣陵王羽髙祖之弟恭則猶子也髙祖孝文廟號説式芮翻夙有令望沈晦不言沈持林翻多歴年所若奉以為主必天人允叶天光與世隆等謀之疑其實瘖使爾朱彦伯潛往敦諭且脅之恭乃曰天何言哉用論語孔子之言世隆等大喜孝通聰之子也薛聰見一百四十卷齊明帝建武元年己巳長廣王至邙山南世隆等為之作禪文為於偽翻使泰山太守遼西竇瑗執鞭獨入守式又翻瑗於脊翻啓長廣王曰天人之望皆在廣陵願行堯舜之事遂署禪文廣陵王奉表三讓然後即位帝諱恭字脩業廣陵惠王羽之子也大赦改元普泰黃門侍郎邢子才為赦文叙敬宗枉殺太原王榮之狀節閔帝曰永安手翦彊臣非為失德直以天未厭亂故逢成濟之禍耳成濟弑髙貴鄉公事見七十七卷魏元帝景元元年因顧左右取筆自作赦文直言門下魏晉以来出命皆由門下省故其𤼵端必曰勑門下朕以寡德運屬樂推思與億兆同兹大慶肆眚之科一依常式屬之欲翻樂音洛春秋莊二十二年肆大眚杜預注曰赦有罪也易稱赦過宥罪書稱眚災肆赦傳稱肆眚圍鄭皆放赦罪人蕩滌衆故以新其心帝閉口八年至是乃言中外欣然以為明主望至太平至一作致庚午詔以三皇稱皇五帝稱帝三代稱王蓋遞為冲挹謂皇降稱帝帝降稱王蓋遞為謙下也自秦以来競稱皇帝予今但稱帝亦已褒矣加爾朱世隆儀同三司贈爾朱榮相國晉王加九錫世隆使百官議榮配饗司直劉季明曰社佑通典曰後魏永安三年髙道穆奏廷尉置司直十人位在正監上不署曹事唯覆理御史檢校事若配世宗於時無功宣武帝廟號世宗若配孝明親害其母謂殺胡后也若配莊帝為臣不終孝武帝始改謚敬宗曰莊帝此時當稱為懐帝以此論之無所可配世隆怒曰汝應死季明曰下官既為議首依禮而言不合聖心翦戮唯命世隆亦不之罪以榮配髙祖廟庭又為榮立廟於首陽山為於偽翻因周公舊廟而為之以為榮功可比周公廟成尋為火所焚因周公舊廟而祀爾朱榮周公豈以奪余饗為嫌哉天人之心固不許也爾朱兆以不預廢立之謀大怒欲攻世隆世隆使爾朱彦伯往諭之乃止初敬宗使安東將軍史仵龍平北將軍陽文義各領兵三千守太行嶺侍中源子恭鎮河内及爾朱兆南向仵龍文義帥衆先降由是子恭之軍望風亦潰兆遂乗勝直入洛陽事見上卷上年仵疑古翻行戸剛翻帥讀曰率降下江翻至是爾朱世隆論仵龍文義之功各封千戸侯魏主曰仵龍文義於王有功於國無勲竟不許爾朱仲逺鎮滑臺表用其下都督為西兖州刺史魏收志西兖州領沛濟隂郡先用後表詔荅曰已能近補何勞逺聞爾朱天光之滅万俟醜奴也事見上卷上年万莫北翻俟渠夷翻始獲波斯所獻師子送洛陽波斯獻師子見一百五十二卷大通二年及節閔帝即位詔曰禽獸囚之則違其性命送歸本國使者以波斯道逺不可達於路殺之而返有司劾違㫖帝曰豈可以獸而罪人遂赦之史言節閔帝賢明而不終者制於彊臣也使疏吏翻劾戸槩翻又戸得翻魏鎮逺將軍清河崔祖螭等聚青州七郡之衆圍東陽青州領齊北海樂安勃海髙陽河間樂陵七郡治東陽旬日之間衆十餘萬刺史東莱王貴平帥城民固守帥音率使太傅諮議參軍崔光伯出城慰勞其兄光韶曰城民陵縱日乆盖言東陽之民挾州家之勢陵暴屬郡恣縱之日乆矣勞力到翻衆怒甚盛非慰諭所能解家弟往必不全貴平彊之彊其兩翻既出外人射殺之射而亦翻幽安營幷四州行臺劉靈助自謂方術可以動人又推算知爾朱氏將衰乃起兵自稱燕王開府儀同三司大行臺聲言為敬宗復讎燕因肩翻為於偽翻且妄述圖䜟云劉氏當王䜟七譛翻由是幽瀛滄冀之民多從之魏熈平二年分瀛冀二州置滄州治饒安城領浮陽樂陵安德三郡從之者夜舉火為號不舉火者諸村共屠之引兵南至愽陵之安國城魏收志愽陵郡安國縣有安國城北平蒲隂縣亦有安國城故稱愽陵以别之爾朱兆遣監軍孫白鷂至冀州監工咸翻鷂弋照翻託言調𤼵民馬調徒釣翻欲俟髙乾兄弟送馬而收之乾等知之與前河内太守封隆之等合謀潛部勒壯士襲據信都殺白鷂白考異曰北史作鷄今從北齊書執刺史元嶷嶷魚力翻乾等欲推其父翼行州事翼曰和集鄉里我不如封皮皮封隆之小字也乃奉隆之行州事為敬宗舉哀為于偽翻將士皆縞素將即亮翻下同縞古勞翻升壇誓衆移檄州郡共討爾朱氏仍受劉靈助節度隆之磨奴之族孫也封磨奴見一百一十九卷宋髙祖永初元年殷州刺史爾朱羽生將五千人襲信都髙敖曹不暇擐甲將十餘騎馳擐音宦騎奇計翻擊之乾在城中繩下五百人追救未及敖曹已交兵羽生敗走敖曹馬矟絶世矟色角翻左右無不一當百時人比之項籍髙歡屯壺闗大王山魏收地形志上黨郡屯留縣有鳯凰山一名大王山按魏太平真君九年二月詔於壺闗東北大王山累石為三封又斬其北鳯凰山南足以斷之以其有王氣也後髙歡果屯兵於其地六旬乃引兵東出聲言討信都信都人皆懼髙乾曰吾聞髙晉州雄略蓋世爾朱榮用歡為晉州刺史故稱之其志不居人下且爾朱無道弑君虐民正是英雄立功之㑹今日之来必有深謀吾當輕馬迎之宻參意㫖參候也諸君勿懼也乃將十餘騎與封隆之子子繪潛謁歡於滏口説歡曰爾朱酷逆痛結人神凡曰有知孰不思奮明公威德素著天下傾心若兵以義立則屈彊之徒不足為明公敵矣屈與倔同其勿翻彊其兩翻屈彊之徒指爾朱氏之黨也鄙州雖小戸口不下十萬穀秸之税足濟軍資秸工八翻藁也願公熟思其計乾辭氣慷慨歡大悦與之同帳寢初河南太守趙郡李顯甫喜豪俠喜許既翻集諸李數千家於殷州西山方五六十里居之殷州西山廣阿之西山也顯甫卒子元忠繼之家素富多出貸求利元忠悉焚劵免責鄉人甚敬之契約也即古所謂劵也免責不責其償也時盜賊蠭起清河有五百人西戍還經趙郡以路梗共投元忠梗塞也元忠遣奴為導曰若逢賊但道李元忠遣言賊皆舍避舍讀曰捨及葛榮起元忠帥宗黨作壘以自保帥讀曰率坐大槲樹下槲胡谷翻前後斬違命者凡三百人賊至元忠輒擊却之葛榮曰我自中山至此連為趙李所破李氏趙郡之大姓時號為趙李何以能成大事乃悉衆攻圍執元忠以隨軍賊平就拜南趙郡太守此言爾朱榮平葛榮時事魏太和之十一年分趙郡之平鄉柏人中丘鉅鹿之南蠻鉅鹿廣阿為南鉅鹿郡後改為南趙郡屬殷州好酒無政蹟好呼到翻及爾朱兆弑敬宗元忠棄官歸謀舉兵討之㑹髙歡東出元忠乗露車載素箏濁酒以奉迎歡聞其酒客未即見之元忠下車獨坐酌酒擘脯食之謂門者曰本言公招延儁傑今聞國士到門不吐哺輟洗其人可知以周公漢祖之事責歡也洗先典翻還吾刺勿通也門者以告歡遽見之引入觴再行元忠車上取箏皷之長歌慷慨歌闋闋苦穴翻歌終也謂歡曰天下形勢可見明公猶事爾朱邪歡曰富貴皆因彼所致安敢不盡節元忠曰非英雄也髙乾邕兄弟来未髙乾字乾邕時乾己見歡歡紿之曰從叔輩麤何肯来歡與乾兄弟同出於勃海故稱從叔紿待亥翻從才用翻元忠曰雖麤竝解事解胡買翻曉也歡曰趙郡醉矣使人扶出元忠不肯起孫騰進曰此君天遣来不可違也歡乃復留與語復扶又翻元忠慷慨流涕歡亦悲不自勝勝音升元忠因進䇿曰殷州小無糧仗不足以濟大事若向冀州髙乾邕兄弟必為明公主人魏冀州治信都髙乾邕兄弟據之故云然殷州便以賜委冀殷既合滄瀛幽定自然弭服唯劉誕黠胡或當乖拒劉誕亦契胡種也時為相州刺史鎮鄴黠下八翻然非明公之敵歡急握元忠手而謝焉歡至山東約勒士卒絲毫之物不聽侵犯每過麥地歡輒步牽馬逺近聞之皆稱髙儀同將兵整肅益歸心焉爾朱氏加歡儀同三司故當時以稱之史言髙歡能收衆心以傾爾朱將即亮翻歡求糧於相州刺史劉誕誕不與相息亮翻有車營租米車營北齊紀作軍營歡掠取之進至信都封隆之髙乾等開門納之髙敖曹時在外略地聞之以乾為婦人遺以布裙裙渠云翻婦人下裳也遺於季翻歡使世子澄以子孫禮見之敖曹乃與俱来敖曹以歡叙羣從子侄之禮乃来孰謂其麤也癸酉魏封長廣王曄為東海王以青州刺史魯郡王肅為太師淮陽王欣為太傅爾朱世隆為太保長孫稚為太尉趙郡王諶為司空諶氏壬翻徐州刺史爾朱仲逺雍州刺史爾朱天光竝為大將軍幷州刺史爾朱兆為天柱大將軍賜髙歡爵渤海王徴使入朝髙歡之先本渤海人爾朱氏爵之為本郡王欲以誘致之朝直遙翻長孫稚固辭太尉世衷難作故辭乃以為驃騎大將軍開府儀同三司驃匹妙翻騎奇計翻爾朱兆辭天柱曰此叔父所終之官我何敢受固辭不拜尋加都督十州諸軍事十州南盡汾晉北極雲朔世襲幷州刺史髙歡辭不就徴爾朱仲逺徙鎮大梁復加兗州刺史大梁兖州統内故加兖州復扶又翻下無復不復同爾朱世隆之初為僕射也大通二年魏爾朱榮入洛以世隆為尚書僕射畏爾朱榮之威嚴深自刻厲留心几案案亦几屬應文書皆陳於几案而省覽之留心几案謂留心於尚書省文書也又案據也凡官文書留以為據者亦謂之案應接賔客有開敏之名及榮死無所顧憚為尚書令家居視事坐符臺省事無大小不先白世隆有司不敢行使尚書郎宋遊道邢昕在其聽事東西别坐受納辭訟稱命施行稱命者稱世隆之命也昕許斤翻聽讀曰㕔公為貪淫生殺自恣又欲收軍士之意汛加階級皆為將軍無復員限自是勳賞之官大致猥濫人不復貴猥雜也是時天光專制闗右兆奄有幷汾仲逺擅命徐兖世隆居中用事競為貪暴而仲逺尤甚所部富室大族多誣以謀反籍沒其婦女財物入私家私家謂仲逺私家也投其男子於河如是者不可勝數勝音升自滎陽已東租税悉入其軍不送洛陽東南州郡自牧守以下至士民畏仲逺如豺狼由是四方之人皆惡爾朱氏而憚其彊莫敢違也為爾朱氏敗張本守式又翻惡烏路翻己丑魏以涇州刺史賀㧞岳為岐州刺史渭州刺史侯莫陳悦為秦州刺史竝加儀同三司涇渭荒殘而秦岐差完故以内遷為進律魏使大都督侯淵驃騎大將軍代人叱列延慶討劉靈助至固城叱列虜複姓固城當在中山城東北安國城西南淵畏其衆欲引兵西入據闗拒險以待其變延慶曰靈助庸人假妖術以惑衆妖於驕翻大兵一臨彼皆恃其符厭厭一恊翻謂劉靈助書為符勑以厭勝也豈肯戮力致死與吾兵爭勝負哉不如出營城外詐言西歸靈助聞之必自寛縱然後潜軍擊之往則成擒矣淵從之出頓城西聲云欲還丙申簡精騎一千夜𤼵直抵靈助壘靈助戰敗斬之傳首洛陽初靈助起兵自占勝負曰三月之末我必入定州爾朱氏不乆當滅及靈助首函入定州果以是月之末史言用兵不可徒信占驗而無方略夏四月乙巳昭明太子統卒太子自加元服天監十四年太子加元服上即使省録朝政省悉井翻朝直遙翻百司進事填委於前太子辯析詐謬秋毫必睹但令改正不加案劾劾戸槩翻又戸得翻平斷灋獄多所全宥寛和容衆喜慍不形於色好讀書屬文斷丁亂翻好呼報翻屬之欲翻引接才俊賞愛無倦出宫二十餘年言自禁中出居東宫也不畜聲樂毎霖雨積雪遣左右周行閭巷視貧者賑之行下孟翻賑之忍翻此所謂好行小惠也天性孝謹在東宫雖燕居坐起恒西向必西向者不敢背上臺也恒戸登翻謹居忍翻或宿被召當入隔夜為宿被皮義翻危坐達旦及寢疾恐貽帝憂勑參問輒自力手書言帝出勑候問太子輒力疾手書自為奏荅及卒朝野惋愕建康男女奔走宫門號泣道路卒子䘏翻朝直遙翻惋烏貫翻愕五各翻奔甫門翻走音奏號戸到翻癸丑魏以髙歡為大都督東道大行臺冀州刺史東道謂太行恒山以東也又以安定王爾朱智虎為肆州刺史魏爾朱天光出夏州遣將討宿勤明達癸亥擒明達送洛陽斬之爾朱天光既擒万俟醜奴又擒宿勤明達河隴平矣不知乃以為宇文泰之資也夏戸雅翻將即亮翻丙寅魏以侍中驃騎大將軍爾朱彦伯為司徒魏詔有司不得復稱偽梁魏不競於梁故也復扶又翻下同五月丙子魏荆州城民斬趙修延復推李琰之行州事趙修延執李琰之見上卷上年魏爾朱仲逺使都督魏僧勗等討崔祖螭於東陽斬之圍考異曰北齊李渾傳普泰中崔社客反於海岱攻青州以渾為征東將軍都官尚書行臺赴援而社客宿將多謀諸城各自保固堅壁清野諸將議有異同渾曰社客賊之根本若簡練驍勇銜枚夜襲徑趨營下出其不意咄嗟之間便可擒殄如社客就擒則諸郡可傳檄而定諸將遲疑渾乃速行未明達城下賊徒驚散擒社客斬首送洛陽按其年時事迹與祖螭略同未知社客即祖螭為别一人也今從魏帝紀初昭明太子𦵏其母丁貴嬪普通七年丁貴嬪卒遣人求墓地之吉者或賂宦者俞三副求賣地云若得錢三百萬以百萬與之三副宻啓上言太子所得地不如今地於上為吉今地謂求賣之地也上年老多忌即命市之𦵏畢有道士云此地不利長子若厭之長子亮翻厭一恊翻又於琰翻下厭禱同或可申延申寛也乃為蠟鵝及諸物埋於墓側長子位宫監鮑邈之魏雅初皆有寵於太子五代志梁制東宫有外監殿局内監宫監者即唐内直局之職也龍朔二年改監曰内直郎邈之晩見疎於雅乃宻啟上云雅為太子厭禱上遣檢掘果得鵝物大驚將窮其事徐勉固諫而止但誅道士由是太子終身慙憤不能自明及卒上徴其長子南徐州刺史華容公歡至建康欲立以為嗣衘其前事猶豫乆之卒不立卒子恤翻庚寅遣還鎮史因帝不立孫究言事始嗚呼帝於豫章王綜臨賀王正德雖犯惡逆猶容忍之至於昭明被讒則終身衘其事蓋天奪其魄也為昭明子詧仇視諸父張本臣光曰君子之於正道不可少頃離也少詩沼翻離力智翻不可跬步失也跬窺婢翻以昭明太子之仁孝武帝之慈愛一染嫌疑之迹身以憂死罪及後昆求吉得凶不可湔滌可不戒哉湔將先翻是以詭誕之士奇邪之術君子逺之奇居宜翻異也逺于願翻丙申立太子母弟晉安王綱為皇太子朝野多以為不順立世適孫為順朝直遙翻司議侍郎周𢎞正按陳書周𢎞正傳普通中初置司文義郎直夀光省以𢎞正為司義侍郎議當作義嘗為晉安王主簿乃奏記曰謙讓道廢多歴年所伏惟明大王殿下天挺將聖論語太宰問于子貢曰夫子聖者歟子貢曰固天縱之將聖朱元晦注曰將殆也謙若不敢知之辭或曰將大也四海歸仁是以皇上𤼵徳音以大王為儲副意者願聞殿下抗目夷上仁之義左傳宋桓公疾太子兹父固請曰目夷長且仁君其立之公命子魚子魚辭曰能以國讓仁孰大焉臣弗及也遂走而退子魚目夷字也執子臧大賢之節左傳成十三年諸侯伐秦曹宣公卒于師曹人使公子負芻守公子欣時逆曹伯之喪負芻殺太子而自立既𦵏子臧將亡國人皆將從之成公乃懼告罪且請焉子臧乃反諸侯討曹成公執而歸諸京師將見子臧于王而立之辭曰聖達節次守節為君非吾節也雖不能聖敢失守乎遂逃奔宋負芻立是為成公子臧欣時是也逃玉輿而弗乗玉輿當作王輿莊子讓王篇曰越人三世弑其君王子搜患之逃乎丹宂而越國無君求王子搜不得從之丹宂王子搜不出越人董之以艾乗以王輿王子搜援綏登車仰天而呼曰君乎君獨不可以捨我乎棄萬乗如脱屣孟子曰舜視棄天下猶敝屣也乘䋲正翻屣所是翻庶改澆競之俗以大吳國之風謂太伯以天下讓逃而君吳也澆堅堯翻薄也古有其人今聞其語能行之者非殿下而誰使無為之化復生於遂古復扶又翻讓王之道不墜於来葉遂往也莊子外篇有讓王述堯舜以天下相讓来葉来世也豈不盛歟王不能從𢎞正捨之兄子也周捨柄用于天監之初太子以侍讀東海徐摛為家令晉王紹宗遷秘書少監仍侍皇太子讀書此侍讀之始也兼管記尋帶領直管記職同公府記室梁制上臺東宫皆有領直領直者領直衛兵也摛文體輕麗春坊盡學之東宫謂之春宫宫坊謂之春坊侍人謂之宫體上聞之怒召摛欲加誚責及見誚才笑翻見賢遍翻應對明敏辭義可觀意更釋然因問經史及釋敎摛商較從橫較古搉翻從子容翻應對如響上甚加歎異上崇信釋氏意謂徐摛業儒但知經史而已扣擊之餘及于釋敎商較從横應對如響遂加歎異殊不思上有好者下必有甚者焉釋敎盛行可以媒富貴利達江東人士孰不從風而靡乎寵遇曰隆領軍朱异不悦异羊至翻謂所親曰徐叟出入兩宫漸来見逼我須早為之所遂乗間白上曰摛年老又愛泉石意在一郡自養上謂摛真欲之乃召摛謂曰新安大好山水遂出為新安太守史言朱异固寵忌前間古莧翻六月癸丑立華容公歡為豫章王其弟枝江公譽為河東王曲阿公詧為岳陽王上以人言不息謂不順也故封歡兄弟以大郡用慰其心乆之鮑邈之坐誘掠人誘音酉罪不至死太子綱追思眧明之寃揮淚誅之魏髙歡將起兵討爾朱氏鎮南大將軍斛律金軍主善無庫狄千善無縣前漢屬鴈門郡後漢屬定襄郡魏晉省後魏天平二年始以善無為郡與歡妻弟婁昭妻之姊夫段榮皆勸成之歡乃詐為書稱爾朱兆將以六鎮人配契胡為部曲衆皆憂懼契欺訖翻又為幷州符徴兵討步落稽爾朱兆擅命幷汾此亦髙歡偽為兆符也步落稽即稽胡𤼵萬人將遣之孫騰與都督尉景為請留五日如此者再孫騰尉景既為鎮人請留必又因其願留之情扇動之於下此當以意㑹也為於偽翻歡親送之郊雪涕執别衆皆號慟聲震原野歡乃諭之先感動其心面後諭之號戸刀翻曰與爾俱為失鄉客義同一家髙歡亦鎮戸故云然不意在上徴發乃爾今直西向已當死自信都赴幷汾為西向後軍期又當死配國人又當死爾朱契胡種也故謂契胡為國人奈何衆曰唯有反耳歡曰反乃急計然當推一人為主誰可者衆共推歡歡曰爾鄉里難制不見葛榮乎雖有百萬之衆曾無灋度終自敗滅今以吾為主當與前異毋得陵漢人犯軍令生死任吾則可不然不能為天下笑髙歡先立法制以齊其衆故能成大事史言盜亦有道衆皆頓顙曰死生唯命歡乃椎牛饗士庚申起兵於信都於考異曰魏書帝紀起兵庚申北齊書帝紀在庚子北史魏紀齊紀亦然今從魏書紀亦未敢顯言叛爾朱氏也㑹李元忠舉兵逼殷州歡令髙乾帥衆救之髙乾預歡宻謀而使之救殷州此不過使之誘禽爾朱羽生耳乾輕騎入見爾朱羽生與指畫軍計騎奇計翻羽生與乾俱出因擒斬之持羽生首謁歡歡撫膺曰今日反决矣髙歡反謀非一日矣及爾朱羽生授首方言反决蓋其初猶有疑李元忠髙乾邕之心元忠既舉兵逼殷州乾邕又斬羽生歡於是深悉二人之心而冀殷之勢已合於是决反乃以元忠為殷州刺史鎮廣阿歡於是抗表罪狀爾朱氏爾朱世隆匿之不通世隆為尚書令故得匿歡表魏楊播及弟椿津皆有名德播剛毅椿津謙恭家世孝友緦服同㸑凡三從之服服緦麻男女百口人無間言間古莧翻異也椿津皆至三公一門七郡太守三十二州刺史史言楊氏貴盛敬宗之誅爾朱滎也播子侃預其謀事見上卷上年城陽王徽李彧皆其姻戚也爾朱兆入洛侃逃歸華隂華戸化翻爾朱天光使侃婦父韋義逺招之與盟許貰其罪貰貸也音始制翻侃曰彼雖食言死者不過一人猶冀全百口乃出應之天光殺之時椿致仕與其子昱在華隂椿弟冀州刺史順司空津順子東雍州刺史辨正平太守仲宣皆在洛雍於用翻秋七月爾朱世隆誣奏楊氏謀反請收治之治直之翻魏主不許世隆苦請帝不得己命有司檢案以聞壬申夜世隆遣兵圍津第天光亦遣兵掩椿家於華隂東西之族無少長皆殺之世隆天光先已約同夷楊氏故東西一時俱𤼵居華隂者為西族居洛者為東族少詩照翻長知兩翻籍沒其家世隆奏云楊氏實反與收兵相拒已皆格殺帝惋悵乆之不言而已惋烏貫翻悵丑亮翻朝野聞之無不痛憤津子逸為光州刺史爾朱仲逺遣使就殺之唯津子愔於被收時適出在外逃匿獲免往見髙歡於信都使疏吏翻愔於今翻被皮義翻任考異曰北齊書愔傳云愔父津為幷州刺史愔隨之俄而孝莊幽崩愔時適欲還都行達邯鄲過津義從楊寛家為寛所執至相州見刺史劉誕以愔名家盛德甚相哀念遣隊主鞏榮貴防禁送都至安陽亭榮貴遂與俱逃乃投髙昻兄弟潜竄累載屬齊神武至信都遂投刺轅門即署行臺郎中按時齊神武已在信都言潜竄累載誤矣又云孝莊幽崩而愔欲還都見執皆非也泣訴家禍因為言討爾朱氏之策為於偽翻歡甚重之即署行臺郎中楊愔門地既髙又有幹用髙歡起兵之初藉人望以為重藉才幹以為用所以擢而用之士無賢不肖入朝見嫉田横島之逃實基於此乙亥上臨軒策拜太子大赦丙戍魏司徒爾朱彦伯以旱遜位戊子以彦伯為侍中開府儀同三司彦伯於兄弟中差無過惡爾朱世隆固讓太保魏主特置儀同三司之官位次上公之下太師太傅太保為三司位上公庚寅以世隆為之斛斯椿譖朱瑞於世隆世隆殺之以朱瑞為敬宗所親遇也庚寅凡宗戚有服屬者有服屬諸緦麻以上竝可賜湯沐食鄉亭侯婦人賜湯沐邑男子食鄉侯亭侯也隨逺近為差隨服屬之逺近以為等差壬辰以吏部尚書何敬容為尚書右僕射敬容昌㝢之子也何昌寓尚之之弟子魏爾朱仲逺度律等聞髙歡起兵恃其彊不以為慮獨爾朱世隆憂之爾朱兆將步騎二萬出井陘趣殷州將即亮翻騎奇計翻陘音刑趣七喻翻李元忠棄城奔信都八月丙午爾朱仲逺度律將兵討髙歡九月己卯魏以仲逺為太宰庚辰以爾朱天光為大司馬癸巳魏主追尊父廣陵惠王為先帝支子入繼大宗尊所生父為皇自漢哀帝始尊之為帝自吳孫皓始母王氏為先太妃封弟永業為髙宻王子恕為勃海王冬十月己酉上幸同泰寺升灋坐講涅槃經涅奴結翻七日而罷樂山侯正則先有罪徙鬱林五代志樂山縣屬鬱林郡鬱林漢古郡唐為鬱林郡招誘亡命欲攻番禺誘音酉番禺音潘愚廣州刺史元仲景討斬之仲景當作景仲正則正德之弟也史言臨川王宏諸子皆兇悖孫騰説髙歡曰今朝廷隔絶號令無所稟説式芮翻受命曰稟音必錦翻不權有所立則衆將沮散沮在吕翻歡疑之騰再三固請乃立勃海太守元朗為帝朗融之子也章武王融為葛榮所殺壬寅朗即位於信都城西改元中興廢帝諱朗字仲哲章武王融第三子也以歡為侍中丞相都督中外諸軍事大將軍録尚書事大行臺髙乾為侍中司空髙敖曹為驃騎大將軍儀同三司冀州刺史時廢帝除昻為冀州刺史終其身驃匹妙翻騎奇計翻孫騰為尚書左僕射河北行臺魏蘭根為右僕射去年敬宗以魏蘭根為河北行臺己酉爾朱仲逺度律與驃騎大將軍斛斯椿車騎大將軍儀同三司賀㧞勝車騎大將軍賈顯智軍於陽平此陽平縣也漢時屬東郡魏晉以来屬陽平郡唐魏州莘縣陽平之地也顯智名智以字行顯度之弟也爾朱兆出井陘軍於廣阿衆號十萬髙歡縱反間云世隆兄弟謀殺兆復云兆與歡同謀殺仲逺等間古莧翻復扶又翻由是迭相猜貳徘徊不進仲逺等屢使斛斯椿賀拔勝往諭兆兆帥輕騎三百来就仲逺帥讀曰率同坐幕下意色不平手舞馬鞭長嘯凝望鄭𤣥曰嘯蹙口而出聲疑仲逺等有變遂趨出馳還仲逺遣椿勝等追曉説之兆執椿勝還營仲逺度律大懼引兵南遁兆數勝罪將斬之説式芮翻數所具翻曰爾殺衛可孤罪一也事見一百五十卷普通五年天柱薨爾不與世隆等俱来而東征仲逺罪二也事見上卷上年我欲殺爾乆矣今復何言復扶又翻勝曰可孤為國巨患勝父子誅之其功不小反以為罪乎天柱被戮以君誅臣被皮義翻勝寧負王不負朝廷今日之事生死在王但冦賊宻邇骨肉構隙自古及今未有如是而不亡者勝不憚死恐王失䇿兆乃捨之髙歡將與兆戰而畏其衆彊以問親信都督叚韶親信都督魏末諸將擅兵始置是官以領親兵韶曰所謂衆者得衆人之死言得衆人之死力也所謂彊者得天下之心爾朱氏上弑天子中屠公卿下暴百姓王以順討逆如湯沃雪何衆彊之有歡曰雖然吾以小敵大恐無天命不能濟也韶曰韶聞小能敵大小道大淫皇天無親惟德是輔小能敵大小道大淫左傳記隨大夫季梁之言也皇天無親惟徳是輔書蔡仲之命之辭也叚韶父子起於北邊以騎射為工安能作書語魏收以其於北齊為勳戚宗門彊盛從而為之辭耳孟子曰盡信書不如無書信哉爾朱氏外亂天下内失英雄心智者不為謀勇者不為鬭為於偽翻人心已去天意安有不從者哉韶榮之子也叚榮與髙歡親善辛亥歡大破兆於廣阿俘其甲卒五千餘人十一月乙未上幸同泰寺講般若經七日而罷般北末翻若人者翻庚辰魏髙歡引兵攻鄴相州刺史劉誕嬰城固守相息亮翻是嵗魏南兖州城民王乞得刼刺史劉世明舉州来降魏正光中置南兖州治譙城領陳留梁譙沛下蔡北梁馬頭等郡降戸江翻世明芳之族子也劉芳以儒學用於孝文宣武二帝上以侍中元樹為鎮北將軍都督北討諸軍事鎮譙城以世明為征西大將軍郢州刺史加儀同三司世明不受固請北歸上許之世明至洛陽奉送所持節歸鄉里不仕而卒陳力就列不能者止劉世明有焉劉氏世居彭城四年春正月丙寅以南平王偉為大司馬元灋僧為太尉袁昻為司空立西豐侯正德為臨賀王正德自結於朱异上既封昭明諸子异言正德失職言帝嘗養正德為子既而還本爵秩不得與諸子齒也异音羊至翻故王之以太子右衛率薛灋䕶為司州牧衛送魏王悦入洛庚午立太子綱之長子大器為宣城王長知兩翻魏髙歡攻鄴為地道施柱而焚之城䧟入地宂城下為地道而未成恐其土頺落而不得䆒功故施柱地道既成乃焚其柱故城陷入地壬午拔鄴擒劉誕以楊愔為行臺右丞時軍國多事文檄教令皆出於愔及開府諮議參軍崔㥄㥄逞之五世孫也㥄力應翻崔逞去燕歸魏為道武帝所殺二月以太尉元灋僧為東魏王上既以元悦為魏王使自西道入又使元法僧從東道入故謂之東魏王欲遣還北兖州刺史羊侃為軍司馬與灋僧偕行揚州刺史邵陵王綸遣人就市賖買錦綵絲布數百匹市人皆閉邸店不出少府丞何智通依事啟聞綸被責還弟被皮義翻弟與第同下於弟同乃遣防閤戴子髙等以槊刺智通於都巷都巷猶前言京巷也槊色角翻刺七亦翻刅出於背智通識子髙取其血以指畫車壁為邵陵字乃絶由是事覺庚戌綸坐免為庶人鎻之於第經二旬乃脱鎻頃之復封爵辛亥魏安定王追謚敬宗曰武懐皇帝朗既禪位孝武帝封為安定王甲子以髙歡為丞相柱國大將軍太師三月丙寅以髙澄為驃騎大將軍丁丑安定王帥百官入居於鄴帥讀曰率爾朱兆與爾朱世隆等互相猜阻世隆卑辭厚禮諭兆欲使之赴洛唯其所欲又請節閔帝納兆女為后兆乃悦幷與天光度律更立誓約復相親睦斛斯椿隂謂賀拔勝曰天下皆怨毒爾朱而吾等為之用亡無日矣不如圖之勝曰天光與兆各據一方欲盡去之甚難去之不盡必為後患柰何椿曰此易致耳乃説世隆追天光等赴洛共討髙歡復扶又翻去𦍑吕翻説式芮翻世隆屢徴天光天光不至使椿自往邀之曰髙歡作亂非王不能定豈可坐視宗族夷滅邪天光不得已將東出問䇿於雍州刺史賀拔岳賀拔岳自岐州遷刺雍州雍於用翻岳曰王家跨據三方兆北據幷汾天光西奄闗隴仲逺擅命徐兖是跨據三方士馬殷盛髙歡烏合之衆豈能為敵但能同心戮力往無不捷若骨肉相疑則圖存之不暇安能制人如下官所見莫若且鎮闗中以固根本分遣鋭師與衆軍合勢進可以克敵退可以自全天光不從閏月壬寅天光自長安兆自晉陽度律自洛陽仲逺自東郡皆㑹於鄴衆號二十萬夾洹水而軍水經注洹水逕鄴城南洹於元翻節閔帝以長孫稚為大行臺總督之髙歡令吏部尚書封隆之守鄴癸丑出頓紫陌水經注漳水東出山過鄴又北逕祭陌西戰國之時俗巫為河伯娶婦祭於此陌田融以為紫陌趙建武十一年造紫陌浮橋於水上大都督髙敖曹將鄉里部曲王桃湯等三千人以從將即亮翻下同從才用翻歡曰髙都督所將皆漢兵恐不足集事欲割鮮卑兵千餘人相雜用之何如敖曹曰敖曹所將練習已乆前後格鬭不減鮮卑今若雜之情不相洽勝則爭功退則推罪推吐雷翻不煩更配也庚申爾朱兆帥輕騎三千夜襲鄴城叩西門不克而退壬戌歡將戰馬不滿二千步兵不滿三萬衆寡不敵乃於韓陵為圓陳五代志鄴縣有韓陵山杜佑曰在相州安陽縣東北陳讀曰陣連繫牛驢以塞歸道塞息則翻於是將士皆有死志將即亮翻兆望見歡遙責歡以叛己歡曰本所以勠力者共輔帝室今天子何在兆曰永安枉害天柱我報讎耳敬宗年號永安故以稱之歡曰我昔聞天柱計汝在戸前立豈得言不反邪對兩軍𤼵其隂謀以正爾朱之罪且以君殺臣何報之有今日義絶矣遂戰歡將中軍髙敖曹將左軍歡從父弟岳將右軍將即亮翻從才用翻歡戰不利兆等乗之岳以五百騎衝其前别將斛律敦收散卒躡其後敖曹以千騎自栗園出横擊之兆等大敗賀拔勝與徐州刺史杜德於陳降歡陳音陣同兆對慕容紹宗撫膺曰不用公言以至於此謂紹宗諫兆使歡統州鎮兵而兆不用也欲輕騎西走自鄴西走歸晉陽紹宗反旗鳴角徐廣車服儀制曰角前代書記所不載或云本出𦍑胡以驚中國之馬杜佑曰大角即後魏簸邏迴是也收散卒成軍而去兆還晉陽仲逺奔東郡秦置東郡晉改為濮陽國後復曰東郡治滑臺城爾朱彦伯聞度律等敗欲自將兵守河橋將即亮翻世隆不從度律天光將之洛陽大都督斛斯椿謂都督賈顯度賈顯智曰今不先執爾朱氏吾屬死無類矣乃夜於桑下盟約倍道先還世隆使其外兵參軍陽叔淵馳赴北中北中即北中郎府城在河橋北岸簡閲敗卒以次内之内讀曰納椿至不得入城乃詭説叔淵曰説式芮翻天光部下皆是西人聞欲大掠洛邑遷都長安宜先内我以為之備叔淵信之夏四月甲子朔椿等入據河橋盡殺爾朱氏之黨度律天光欲攻之㑹大雨晝夜不止士馬疲頓弓矢不可施遂西走至灅陂津為人所擒送於椿所灅陂津在河橋西亦曰雷波即爾朱兆犯洛帥騎踏淺涉度之處灅力水翻椿使行臺長孫稚詣洛陽奏狀别遣賈顯智張歡帥騎掩襲世隆執之帥讀曰率騎奇計翻彦伯時在禁直長孫稚於神虎門啟陳髙歡義功既振請誅爾朱氏節閔帝使舍人郭崇報彦伯彦伯狼狽走出為人所執與世隆俱斬於閶闔門外送其首幷度律天光於髙歡節閔帝使中書含人盧辯勞歡於鄴勞力到翻歡使之見安定王辯抗辭不從歡不能奪乃捨之辯同之兄子也盧同始附元乂以進辛未驃騎大將軍行濟州事侯景降於安定王以景為尚書僕射南道大行臺濟州刺史濟子禮翻降戸江翻下同爾朱仲逺来奔仲逺帳下都督喬寧張子期自滑臺詣歡降歡責之曰汝事仲逺擅其榮利盟契百重許同生死契約也重直龍翻前仲逺自徐州為逆汝為戎首謂前年仲逺舉兵向洛時也今仲逺南走汝復叛之復扶又翻事天子則不忠事仲逺則無信犬馬尚識飼之者飼祥吏翻汝曾犬馬之不如遂斬之爾朱天光之東下也留其弟顯夀鎮長安召秦州刺史侯莫陳悦欲與之俱東賀拔岳知天光必敗欲留悦共圖顯夀以應髙歡計未有所出字文泰謂岳曰今天光尚近悦未必有貳心若以此告之恐其驚懼然悦雖為主將不能制物將即亮翻若先説其衆必人有留心悦進失爾朱之期退恐人情變動乘此説悦事無不遂岳大喜即令泰入悦軍説之悦遂與岳俱襲長安岳為雍州刺史本治長安蓋天光東下使之出捍西北也泰帥輕騎為前驅顯夀棄城走追至華隂擒之帥讀曰率騎奇計翻華戸化翻歡以岳為闗西大行臺曰考異北史薛孝通為中書郎以闗中險固秦漢舊都須預謀防遏以為後計縱河北失利猶足據之節閔帝深以為然問誰可任者孝通與賀拔岳同事天光又與周文帝有舊二人竝先在闗右竝推薦之乃超授岳督岐華秦雍諸軍事闗西大行臺雍州牧周文帝為左丞孝通為右丞齎詔書馳驛入闗授岳等同鎮長安後天光敗於韓陵節閔遂不得入闗為齊神武幽廢按天光尚在節閔安敢除岳鎮闗中今從魏書岳以泰為行臺左丞領府司馬事無巨細皆委之爾朱世隆之拒髙歡也使齊州行臺尚書房謨募兵趣四瀆四瀆津名在臨濟縣水經注河水東北流四瀆津津西側岸臨河有四瀆祠以其自河入濟自泗入淮自淮達江水徑周流故有四瀆之名趣七喻翻又使其弟青州刺史弼趣亂城揚聲北渡為掎角之勢掎居蟻翻及韓陵既敗弼還東陽聞世隆等死欲来奔數與左右割臂為盟帳下都督馮紹隆素為弼所信待説弼曰今方同契闊數所角翻説式芮翻詩擊鼓曰死生契闊毛萇注曰契闊勤苦也契苦結翻宜更割心前之血以盟衆弼從之大集部下披胸令紹隆割之紹隆因推刃殺之推吐雷翻傳首洛陽丙子安東將軍辛永以建州降於安定王辛巳安定王至邙山髙歡以安定王疎逺章武王太洛文成之子獻文之季弟也太洛生融融生安定王於孝明帝緦麻親也故以為疎逺魏收書章武王太洛景穆之子以彬為後彬子融審爾則愈疎逺矣使僕射魏蘭根慰諭洛邑且觀節閔帝之為人欲復奉之復扶又翻蘭根以帝神采髙明恐於後難制與髙乾兄弟及黄門侍郎崔㥄共勸歡廢之㥄力膺翻歡集百官問所宜立莫有應者太僕代人綦母儁盛稱節閔帝賢明宜主社稷歡欣然是之㥄作色曰若言賢明自可待我髙王徐登大位廣陵既為逆胡所立節閔帝本廣陵王何得猶為天子若從儁言王師何名義舉歡遂幽節閔帝於崇訓佛寺歡入洛陽斛斯椿謂賀拔勝曰今天下事在吾與君耳若不先制人將為人所制髙歡初至圖之不難勝曰彼有功於時害之不祥比數夜與歡同宿比毘至翻且序往昔之懐兼荷兄恩意甚多荷下可翻古以儋負為義故以受任為荷受恩為荷而感恩者亦曰荷何苦憚之椿乃止史言賀拔勝有才武而無逺識髙歡能以姦詐玩弄時輩而悦其心斛斯椿者小有才反覆人也其圖歡之志固在孝武帝未立之前矣歡以汝南王悦髙祖之子召欲立之聞其狂暴無常乃止悦考異曰魏書傳云神武令人示意悦既至清狂如故動為罪失不可扶立乃止按悦時猶在梁境比召至洛往返幾日蓋神武聞其所為而止耳時諸王多逃匿尚書左僕射平陽王修懐之子也廣平王懐髙祖之子修於孝明帝從兄弟也匿於田舍歡欲立之使斛斯椿求之椿見修所親員外散騎侍郎太原王思政問王所在思政曰須知問意椿曰欲立為天子思政乃言之椿從思政見修修色變謂思政曰得無賣我邪曰不也曰敢保之乎曰變態百端何可保也椿馳報歡歡遣四百騎迎修入氈帳騎奇計翻氈帳胡夷酋帥所居漢人謂之穹廬陳誠泣下霑襟修譲以寡徳歡再拜修亦拜歡出備服御進湯沐達夜嚴警嚴為警備也昧爽孔安國曰昧㝠爽明早旦馬曰昧未旦也陸徳明曰爽謂早旦也文武執鞭以朝軍中不能備朝服故執鞭以為敬朝直遙翻使斛斯椿奉勸進表椿入帷門磬折延首而不敢前張守節曰磬折謂曲體揖之若石磬之形曲折也磬形皆中屈垂兩頭言人屈腰則似也修令思政取表視之曰便不得不稱朕矣書曰天位艱哉又曰毋安厥位惟危雖天人樂推神器歸屬賢君處此之時慓慓乎懼其不勝也平陽王視勸進表而𤼵此言驕滿之氣溢出於肝鬲之上君子以是知其不能終乃為安定王作詔䇿而禪位焉為于偽翻戊子孝武帝即位於東郭之外帝諱修字孝則廣平武穆王懐之第三子也東郭洛城東郭也用代都舊制以黑氈䝉七人歡居其一帝於氈上西向拜天畢入御太極殿魏自孝文帝用夏變夷宣武孝明即位皆用漢魏之制今復用夷禮羣臣朝賀朝直遙翻下同升閶闔門大赦改元太昌以髙歡為大丞相天柱大將軍太師世襲定州刺史庚寅加髙澄侍中開府儀同三司初歡起兵信都爾朱世隆知司馬子如與歡有舊自侍中驃騎大將軍出為南岐州刺史歡入洛召子如為大行臺尚書朝夕左右參知軍國廣州刺史廣寧韓賢魏收志廣寕郡屬朔州領石門中川二縣五代志馬邑郡善陽縣後齊置朔州及廣寕郡素為歡所善歡入洛凡爾朱氏所除官爵例皆削奪唯賢如故以前御史中尉樊子鵠兼尚書左僕射為東南道大行臺與徐州刺史杜德追爾朱仲逺仲逺已出境逐攻元樹於譙丞相歡徴賀拔岳為冀州刺史岳畏歡欲單馬入朝行臺右丞薛孝通説説式芮翻岳曰髙王以數千鮮卑破爾朱百萬之衆誠亦難敵然諸將或素居其上或與之等夷屈首從之勢非獲已今或在京師或據州鎮髙王除之則失人望留之則為腹心之疾且吐萬人雖復敗走爾朱兆字吐萬人猶在幷州髙王方内撫羣雄外抗勍敵勍其京翻安能去其巢穴與公爭闗中之地乎今闗中豪俊皆屬心於公屬之欲翻願效其智力公以華山為城黄河為塹華戸化翻塹七艷翻進可以兼山東退可以封函谷後漢王元説隗囂曰元請以一丸泥為大王東封函谷闗柰何欲東手受制於人乎言未卒卒子恤翻岳執孝通手曰君言是也乃遜辭為啟而不就徴壬辰丞相歡還鄴送爾朱度律天光於洛陽斬之五月丙申魏主酖節閔帝於門下外省年三十五西魏謚帝曰節閔詔百司㑹喪𦵏用殊禮加九旒鑾輅黄屋左纛班劒百二十人蓋其禮特異于諸王之喪耳以沛郡王欣為太師趙郡王諶為太保諶世壬翻南陽王寶炬為太尉長孫稚為太傅寶炬愉之子也京兆王愉亦孝文帝之子丞相歡固辭天柱大將軍戊戌許之己酉清河王亶為司徒侍中河南髙隆之本徐氏養子丞相歡命以為弟恃歡勢驕公卿南陽王寶炬敺之曰鎮兵何敢爾魏遷洛陽北人留居北鎮者率𨽻尺籍故詈之曰鎮兵敺烏口翻魏主以歡故六月丁卯黜寶炬為驃騎大將軍歸第魏主避廣平武穆王之諱改謚武懐皇帝曰孝莊皇帝謚法武而不遂曰莊死於原野曰莊兵甲亟作曰莊廟號敬宗秋七月庚子魏復以南陽王寶炬為太尉壬寅魏丞相歡引兵入滏口大都督庫狄干入井陘擊爾朱兆滏音父陘音刑庚戌魏主使驃騎大將軍儀同三司髙隆之帥步騎十萬㑹丞相歡於太原因以隆之為丞相軍司歡軍於武鄉晉置武鄉縣屬上黨郡石勒分置武鄉郡唐為武鄉縣屬潞州我朝屬威勝軍爾朱兆大掠晉陽北走秀容幷州平走音奏歡以晉陽四塞太原郡之地東阻太行常山西有䝉山南有霍太山髙壁嶺北阨東陘西陘闗故亦以為四塞之地乃建大丞相府而居之自此至於髙齊建國遂以晉陽為陪都魏夏州遷民郭遷據青州反郭遷自夏州遷青州必叛黨也刺史元嶷棄城走嶷魚力翻詔行臺侯景等討之拔其城遷来奔魏東南道大行臺樊子鵠圍元樹於譙城分兵攻取䝉縣等五城去年梁遣元樹鎮譙城䝉縣漢晉屬梁國魏屬譙郡隋并入山桑縣唐改山桑為䝉城縣屬亳州以絶援兵之路樹請帥衆南歸以地還魏帥讀曰率子鵠等許之與之誓約樹衆半出子鵠擊之擒樹及譙州刺史朱文開以歸羊侃行至官竹水經注睢水自睢陽東南流歴竹圃水次綠竹䕃渚菁菁彌望世人謂之梁王竹園官收其利因曰官竹聞樹敗而還還音旋九月樹至洛陽乆之復欲南奔魏人殺之復扶又翻乙巳以司空袁昻領尚書令冬十一月丁酉日南至夏至之日日北至冬至之日日南至杜預曰冬至之日日南極班志日行光道夏至至於東井北近極故晷短冬至至於牽牛逺極故晷長司馬彪志曰日道𤼵南去極彌逺其景彌長逺長乃極冬乃至日道歛北去極彌近其景彌短近短乃極夏乃至焉魏主祀圜丘古者因天事天故祭天於圜丘其圜象天甲辰魏殺安定王朗東海王曄二王皆嘗擁立雖已廢退居嫌疑之地故見殺己酉以汝南王悦為侍中大司馬魏𦵏靈太后胡氏爾朱榮沈靈后於河今乃克𦵏上聞魏室已定十二月庚辰復以太尉元灋僧為郢州刺史是年春以元法僧為東魏王魏主以汝南王悦屬近地尊悦魏王之叔父也丁亥殺之魏大赦改元永興以與太宗同號永興魏太宗即位之初元也復改永熙復扶又翻魏主納丞相歡女為后命太常卿李元忠納幣於晉陽歡與之宴論及舊事元忠曰昔日建義轟轟大樂樂音洛比来寂寂無人問比毗至翻歡撫掌笑曰此人逼我起兵元忠戲曰若不與侍中當更求建義處歡曰建義不慮無止畏如此老翁不可遇耳元忠曰止為此翁難遇所以不去因捋歡須大笑為于偽翻捋盧括翻歡悉其雅意深重之悉諳究也知也雅素也爾朱兆既至秀容分守險隘出入冦抄抄楚交翻魏丞相歡揚聲討之師出復止者數四兆意怠歡揣其嵗首當宴㑹復扶又翻揣初委翻遣都督竇泰以精騎馳之一日一夜行三百里歡以大軍繼之為明年竇泰破爾朱兆張本騎奇計翻資治通鑑卷一百五十五
