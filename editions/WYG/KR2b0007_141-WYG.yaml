front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百四十一宋司馬光撰胡三省音註齊紀七起彊圉赤奮若盡著雍攝提格凡二年髙宗明皇帝下建武四年春正月大赦按考異曰齊帝紀云庚午大赦長厯是月己丑朔無庚午故不日丙申魏立皇子恪為太子魏主宴於清徽堂語及太子恂李冲謝曰臣忝師傅不能輔導帝曰朕尚不能化其惡師傅何謝也乙巳魏主北巡初尚書令王晏為世祖所寵任事見一百三十六卷世祖永明七年及上謀廢鬱林王晏即欣然推奉事見一百三十九卷元年鬱林王已廢上與晏宴於東府語及時事晏抵掌曰公常言晏怯今定何如上即位晏自謂佐命新朝常非薄世祖故事既居朝端尚書令位居朝臣之右朝直遥翻事多專决内外要職並用所親每與上爭用人上雖以事際須晏事際謂舉事之際須者倚其為用而心惡之惡烏路翻嘗料簡世祖中詔料音聊得與晏手敕三百餘紙皆論國家事又得晏啟諫世祖以上領選事見一百三十七卷永明八年選須絹翻以此愈猜薄之始安王遥光勸上誅晏上曰晏於我有功且未有罪遥光曰晏尚不能為武帝安能為陛下乎為于偽翻上黙然上遣腹心陳世範等出塗巷採聽異言晏輕淺無防意望開府數呼相工自視數所角翻相息亮翻云當大貴與賓客語好屏人請間好呼到翻屏必郢翻上聞之疑晏欲反遂有誅晏之意奉朝請鮮于文粲密探上㫖朝直遥翻探吐南翻告晏有異志世範又啟上云晏謀因四年南郊與世祖故主帥於道中竊𤼵帥所類翻㑹虎犯郊壇上愈懼未郊一日有敕停行先報晏及徐孝嗣孝嗣奉㫖而晏陳郊祀事大必宜自力上益信世範之言丙辰召晏於華林省誅之省在華林園因名丙考異曰晏𫝊云元㑹畢乃召晏誅之本紀辰晏伏誅丙辰正月二十八日也按郊禮必在正月既云未郊一日敕停則誅晏必非元㑹之日也本傳盖言元㑹禮後耳并北中郎司馬蕭毅臺隊主劉明達明達盖世祖時主帥及晏子徳元徳和下詔云晏與毅明達以河東王鉉識用微弱謀奉以為主使守虛器晏弟詡為廣州刺使上遣南中郎司馬蕭季敞襲殺之季敞上之從祖弟也從才用翻下晏從同蕭毅奢豪好弓馬為上所忌故因事陷之毅髙帝從子新吳侯景先之子也好呼到翻河東王鉉先以年少才弱故未為上所殺鉉朝見常鞠躬俯僂少詩照翻朝直遥翻見賢遍翻僂力主翻鞠躬曲身也俯低頭僂曲背不敢平行直視至是年稍長長知兩翻遂坐晏事免官禁不得與外人交通鬱林王之將廢也晏從弟御史中丞思逺謂晏曰兄荷世祖厚恩荷下可翻今一旦贊人如此事彼或可以權計相須未知兄將來何以自立若及此引决猶可保全門户不失後名欲使之死鬱林之難也晏曰方噉粥未暇此事及拜驃騎將軍帝初即位進宴為驃騎大將軍噉徒濫翻又徒覽翻驃匹妙翻騎奇寄翻集㑹子弟謂思逺兄思徵曰隆昌之末阿戎勸吾自裁若從其語豈有今日思逺遽應曰如阿戎所見今猶未晩也晉宋間人多謂從弟為阿戎至唐猶然如杜甫於從弟杜位宅守嵗詩云守嵗阿戎家是也思逺知上外待晏厚而内已疑異乘間謂晏曰時事稍異兄亦覺不間古莧翻不讀曰否凡人多拙於自謀而巧於謀人晏不應思逺退晏方歎曰世乃有勸人死者旬日而晏敗上聞思逺言故不之罪仍遷侍中晏外弟尉氏阮孝緒亦知晏必敗尉氏縣漢屬陳畱江左僑置於今六合縣界屬秦郡阮氏本尉氏人此時未必居秦郡界外弟妻弟也晏屢至其門逃匿不見甞食醬美問知得於晏家吐而覆之既吐其所食者又覆其所餘者及晏敗人為之懼為于偽翻孝緒曰親而不黨何懼之有卒免於罪卒子恤翻二月壬戌魏主至太原甲子以左僕射徐孝嗣為尚書令代王晏也征虜將軍蕭季敞為廣州刺史代晏弟詡也癸酉魏主至平城引見穆泰陸叡之黨問之見賢遍翻無一人稱枉者時人皆服任城王澄之明穆泰及其親黨皆伏誅賜陸叡死於獄宥其妻子徙遼西為民傳考異曰齊書魏虜云偽征北將軍恒州刺史鉅鹿孤賀鹿渾守桑乾宏從叔平陽王安夀戍懐柵在桑乾西北渾非宏任用中國人與偽定州刺史馮翊公自鄰安樂公主拓拔阿幹兒謀立安夀分據河北期久不遂安夀懼告宏殺渾等數百人任安夀如故與魏書名姓全不同今從魏書初魏主遷都變易舊俗并州刺史新興公丕皆所不樂樂音洛帝以其宗室耆舊亦不之逼但誘示大理令其不生同異而已示以事理之大歸而已不反覆告語之誘音酉及朝臣皆變衣冠朱衣滿坐朝直遥翻坐徂卧翻而丕獨胡服於其間晚乃稍加冠帶而不能修飾容儀帝亦不强也强其兩翻太子恂自平城將遷洛陽元隆與穆泰等密謀畱恂因舉兵斷關規據陘北陘北即恒朔二州之地闗即雁門之東陘西陘二闗也斷丁管翻陘音刑丕在并州隆等以其謀告之丕外慮不成口雖折難折之列翻難乃旦翻心頗然之及事覺丕從帝至平城帝毎推問泰等常令丕坐觀有司奏元業元隆元超罪當族丕應從坐帝以丕嘗受詔許以不死聽免死為民畱其後妻二子與居於太原殺隆超同產乙升同産同母兄弟餘子徙敦煌敦徒門翻初丕叡與僕射李冲領軍于烈俱受不死之詔叡既誅帝賜冲烈詔曰叡反逆之志自負幽㝠違誓在彼不闗朕也反逆既異餘犯雖欲矜恕如何可得然猶不忘前言聽自死别府不就恒州刺史府賜死而死於獄故曰别府免其孥戮書甘誓曰予則孥戮汝孔安國注曰孥子也免其孥戮謂叡妻子免死徙遼西也孥音奴元丕二子一弟首為賊端連坐應死特恕為民朕本期始終而彼自棄絶違心乖念一何可悲故此别示想無致怪謀反之外皎如白日耳冲烈皆上表謝臣光曰夫爵禄廢置殺生予奪人君所以馭臣之大柄也此周禮所謂八柄馭羣臣者也予讀曰與是故先王之制雖有親故賢能功貴勤賓茍有其罪不直赦也必議於槐棘之下此周禮所謂八議也槐棘公卿之位王制獄成大司寇聽之於棘木之下可赦則赦可宥則宥可刑則刑可殺則殺輕重視情寛猛隨時故君得以施恩而不失其威臣得以免罪而不敢自恃及魏則不然勳貴之臣往往豫許之以不死彼驕而觸罪又從而殺之是以不信之令誘之使陷於死地也誘音酉刑政之失無此為大焉是時代鄉舊族多與泰等連謀唯于烈無所染涉帝由是益重之帝以北方酋長及侍子畏暑酋自秋翻長知兩翻聽秋朝洛陽春還部落時人謂之鴈臣以鴈避寒而南來望暖而北還也朝直遥翻三月己酉魏主南至離石離石漢縣屬西河郡隋為離石郡唐為石州叛胡請降詔宥之降户江翻夏四月庚申至龍門遣使祀夏禹水經註龍門上口在漢河東北屈縣西所謂孟門也龍門下口在河東皮氏縣西北大禹所鑿故於此祀焉癸亥至蒲坂祀虞舜皇甫謐云舜都蒲坂故又於此祀焉坂音反辛未至長安魏太子恂既廢頗自悔過御史中尉李彪密表恂復與左右謀逆復扶又翻魏主使中書侍郎邢巒與咸陽王禧奉詔齎椒酒詣河陽賜恂死椒味辛大熱有毒其合口者尤甚漢桓思后之議李咸擣椒自隨帝煮椒二斛以殺髙武諸子孫皆是物也歛以麤棺常服瘞於河陽歛力贍翻瘞一計翻癸未魏大將軍宋明王劉昶卒於彭城葬以殊禮謚法思慮果逺曰明謂昶逺慮果於違難而歸魏也五月己丑魏主東還還從宣翻又如字汎渭入河壬辰遣使祀周文王於豐武王於鎬亦於故都祀之也周之豐鎬漢時悉在上林苑中使疏吏翻六月庚申還洛陽壬戌魏𤼵冀定瀛相濟五州兵二十萬魏太宗泰常八年置濟州於濟北碻磝城領濟北平原東平南清河郡相息亮翻濟子禮翻將入寇魏穆泰之反也中書監魏郡公穆羆與之通謀赦後事𤼵削官爵為民羆弟司空亮以府事付司馬慕容契上表自劾劾户槩翻又户得翻魏主優詔不許亮固請不己癸亥聽亮遜位丁夘魏分六師以定行畱秋七月魏立昭儀馮氏為皇后后欲母養太子恪恪母髙氏自代如洛陽暴卒於共縣馮昭儀既譛廢其妹又潜殺太子之母其心盖梟獍也以魏主之明而使之正位椒房他日不死於其手者幸耳共縣自漢以來屬河内郡晉及後魏屬汲郡唐衛州共城縣即其地共音恭戊辰魏以穆亮為征北大將軍開府儀同三司冀州刺史八月丙辰魏詔中外戒嚴將南伐也壬戌魏立皇子愉為京兆王懌為清河王懐為廣平王追尊景皇所生王氏為恭太后帝即位尊始安貞王曰景皇稱皇不稱帝用漢制也甲戌魏講武於華林園庚辰軍𤼵洛陽使吏部尚書任城王澄居守任城王澄至是始為真吏部尚書守式又翻以御史中丞李彪兼度支尚書中丞當作中尉度徒洛翻與僕射李冲參治畱臺事治直之翻假彭城王勰中軍大將軍勰音協勰辭曰親疎並用古之道也臣獨何人頻煩寵授昔陳思求而不允曹魏文帝時陳思王植上表求自試以攻吳蜀帝不許愚臣不請而得何否泰之相逺也天地交曰泰天地不交曰否陳思於魏文上下之情不通故曰否勰則君臣兄弟之情無間故曰泰否皮鄙翻魏主大笑執勰手曰二曹以才名相忌二曹謂魏文帝陳思王也吾與汝以道徳相親上遣軍主直閤將軍胡松助北襄城太守成公期戍赭陽赭音者軍主鮑舉助西汝南北義陽二郡太守黃瑶起戍舞陰蕭子顯齊志西汝南屬雍州北義陽屬雍州寧蠻府自宋未有雙頭郡太守率治一處舞陰縣自漢以來屬南陽郡為西汝南北義陽二郡治所魏以氐帥楊靈珍為南梁州刺史靈珍舉州來降魏置梁州於仇池置南梁州於武興帥所類翻降户江翻下同送其母及子於南鄭以為質質音致遣其弟婆羅阿卜珍將步騎萬餘襲魏武興王楊集始将即亮翻騎竒寄翻殺其二弟集同集衆集始窘急請降九月丁酉魏主以河南尹李崇為都督隴右諸軍事将兵數萬討之初魏遷洛陽荆州刺史薛真度勸魏主先取樊鄧此時魏荆州猶治魯陽樊鄧逼近洛陽欲先取之以廣封畧真度引兵寇南陽太守房伯玉擊敗之此謂去年沙堨之敗也擊敗補邁翻魏主怒以南陽小郡志必㓕之遂引兵向襄陽彭城王勰等三十六軍前後相繼衆號百萬吹脣沸地吹脣者以齒齧脣作氣吹之其聲如鷹隼其下者以指夾脣吹之然後有聲謂之嘯指辛丑魏主畱諸將攻赭陽自引兵南下癸夘至宛夜襲其郛克之宛於元翻郛芳無翻城之外郭曰郛房伯玉嬰内城拒守魏主遣中書舎人孫延景公考異曰齊書作孫雲今從魏書謂伯玉曰我今蕩壹六合非如曏時冬來春去不有所克終不還北卿此城當我六龍之首易曰時乘六龍以御天人君之象也無容不先攻取逺期一年近止一月封侯梟首事在俯仰宜善圖之梟堅堯翻且卿有三罪今令卿知卿先事武帝䝉殊常之寵不能建忠致命而盡節於其讐罪一也明帝夷㓕武帝子孫故謂之讐頃年薛真度來卿傷我偏師罪二也今鸞輅親臨不面縛麾下罪三也伯玉遣軍副樂稚柔對曰承欲攻圍期於必克卑微常人得抗大威真可謂獲其死所外臣䝉武帝採拔豈敢忘恩但嗣君失徳主上光紹大宗言帝自小宗入為髙帝第三子以紹大宗非唯副億兆之深望抑亦兼武皇之遺敕是以區區盡節不敢失墜往者北師深入寇擾邊民輒厲將士以修職業将即亮翻反已而言不應垂責宛城東南隅溝上有橋魏主引兵過之伯玉使勇士數人衣班衣戴虎頭㡌人衣如既翻虎頭㡌者㡌為虎頭形伏於竇下突出擊之魏主人馬俱驚召善射者原靈度射之度射而亦翻應弦而斃乃得免李崇槎山分道出氐不意表裏襲之槎士下翻逆斫木也羣氐皆棄楊靈珍散歸靈珍之衆减大半崇進據赤土魏收志南秦州武階郡有赤土縣五代志武都郡覆津縣後魏置武階郡靈珍遣從弟建屯龍門自帥精勇一萬屯鷲峽按魏收志東益州武興郡有石門縣五代志武都将利縣舊曰石門又仇池山下有飛龍峽以氐酋楊飛龍據仇池得名又今龍州江油縣東二十里有龍門山又江油縣東百里有石門戍武興今為興州龍州去興州甚逺楊建所屯者必非江油之龍門也水經注仇池東北有龍門戍此其是歟鷲峽當在龍門西南從才用翻帥讀曰率下同鷲音就龍門之北數十里中伐樹塞路鷲峽之口聚礌石臨崖下之以拒魏兵塞悉則翻礌盧對翻埤蒼曰推石自高而下也漢書李陵傳乘隅下壘石師古曰言放石以投人因山隅曲而下也壘音盧對翻與此礌音同崇命統軍慕容拒帥衆五千從它路入夜襲龍門破之崇自攻鷲峽靈珍連戰敗走俘其妻子遂克武興梁州刺史陰廣宗參軍鄭猷等將兵救靈珍崇進擊大破之斬楊婆羅阿卜珍生擒猷等靈珍奔還漢中魏主聞之喜曰使朕無西顧之憂者李崇也以崇為都督梁秦二州諸軍事梁州刺史以安集其地丁未魏主發南陽畱太尉咸陽王禧等攻之己酉魏主至新野新野太守劉思忌拒守冬十月丁巳魏軍攻之不克築長圍守之遣人謂城中曰房伯玉已降汝何為獨取糜碎思忌遣人對曰城中兵食猶多未暇從汝小虜語也魏右軍府長史韓顯宗將别軍屯赭陽右軍府右軍將軍府也将即亮翻下同成公期遣胡松引蠻兵攻其營胡松時助戍赭陽顯宗力戰破之斬其裨將髙法援顯宗至新野魏主謂曰卿破賊斬將殊益軍勢朕方攻堅城何為不作露布五代史志曰後魏每攻戰克捷欲天下聞知迺書帛建於竿上名曰露布魏主謂顯宗若露布上聞行在所則増益魏軍之勝勢可以揺城中堅守之心對曰頃聞鎮南將軍王肅獲賊二三人驢馬數匹皆為露布臣在東觀私常哂之韓顯宗對䇿甲科除著作郎故云在東觀觀古玩翻哂矢引翻笑不壊顔曰哂近雖仰憑威靈得摧醜虜兵寡力弱擒斬不多脱復髙曵長縑虚張功烈尤而效之其罪彌大左傳曰尤而效之罪又甚焉尤責也過也甚之之辭也復扶又翻臣所以不敢為之解上而已丁度集韻解居隘翻聞上也上時掌翻自下而閒於上謂之上魏主益賢之上詔徐州刺史裴叔業引兵救雍州雍於用翻下同叔業啟稱北人不樂逺行唯樂鈔掠樂音洛若侵虜境則司雍之寇自然分矣上從之叔業引兵攻虹城此即漢沛郡之虹縣城也師古曰虹音貢南北兵爭其地在下邳夏丘縣界唐復為虹縣屬泗州虹今讀如綘獲男女四千餘人甲戌遣太子中庶子蕭衍右軍司馬張稷救雍州十一月甲午前軍將軍韓秀方等十五將降於魏將即亮翻降戶江翻丁酉魏敗齊兵於沔北敗補邁翻將軍王伏保等為魏所獲丙辰以楊靈珍為北秦州刺史異考曰齊氐傳作北梁州今從齊書仇池公武都王新野人張䐗帥萬餘家據柵拒魏䐗與豬同陟魚翻帥讀曰率下同十二月庚申魏人攻拔之雍州刺史曹虎與房伯玉不協故緩救之頓軍樊城頓考異曰齊魏虜傳云均口今從虎傳亦余謂曹虎之軍樊城不特因與房伯玉不協而然由畏魏兵之彊而不敢進也丁丑詔遣度支尚書崔慧景救雍州假慧景節帥衆二萬騎千匹向襄陽雍州衆軍並受節度度徒洛翻雍於用翻騎竒寄翻庚午魏主南臨沔水沔彌兖翻戊寅還新野將軍王曇紛以萬餘人攻魏南青州黃郭戍魏收志東魏孝靜帝武定七年置義塘郡治黃郭城又按五代志海州懐仁縣梁置南北二青州東魏廢州立義塘郡及懐仁縣曇徒含翻魏戌主崔僧淵破之舉軍皆没將軍魯康祚趙公政將兵萬人侵魏太倉口據傅永傳太倉口在魏豫州界是時魏置豫州於汝南新息縣廣陵城與齊義陽隔淮對壘則太倉口當在淮北岸以魏人積倉粟於此而有是名也魏豫州刺史王肅使長史清河傅永將甲士三千擊之康祚等軍於淮南永軍於淮北相去十餘里永曰南人好夜斫營好呼到翻下好學同必於渡淮之所置火以記淺乃夜分兵為二部伏於營外又以瓠貯火瓠户悞翻匏也貯丁吕翻盛也密使人過淮南岸於深處置之戒曰見火起則亦然之然與燃同是夜康祚等果引兵斫永營伏兵夾擊之康祚等走趣淮水趣七喻翻火既競起不知所從溺死及斬首數千級溺奴狄翻生擒公政獲康祚之尸以歸豫州刺史裴叔業侵魏楚王戍裴叔業盖自徐州遷為豫州水經注鮦陽縣有葛陵城城東北有楚武王冢民謂之楚王瑟城魏盖於此置戍因謂之楚王戍肅復令永擊之復扶又翻永將心腹一人馳詣楚王戍令填外塹塹七艷翻夜伏戰士千人於城外曉而叔業等至城東部分將置長圍分扶問翻永伏兵擊其後軍破之叔業畱將佐守營自將精兵數千救之將即亮翻永登門樓望叔業南行數里即開門奮擊大破之獲叔業傘扇鼓幕甲仗萬餘叔業進退失據遂走左右欲追之永曰吾弱卒不滿三千彼精甲猶盛非力屈而敗自墮吾計中耳既不測我之虚實足使喪膽䘮息浪翻俘此足矣何更追之魏主遣謁者就拜永安逺將軍汝南太守封貝丘縣男守式又翻永有勇力好學能文魏主常歎曰上馬能擊賊下馬作露板唯傅脩期耳言永有武幹又有文才也𫝊永字脩期曲江公遥欣好武事好呼到翻上以諸子尚幼内親則仗遥欣兄弟外親則倚后弟西中郎長史彭城劉暄内弟太子詹事江袥帝母景皇后袥之姑也故曰内弟故以始安王遥光為揚州刺史居中用事遥欣為都督荆雍等七州諸軍事荆州刺史鎮據西面而遥欣在江陵多招材勇厚自封殖上甚惡之惡烏路翻遥欣侮南郡太守劉季連季連密表遥欣有異迹包蔵禍心者謂之異志形見於事者謂之異迹上乃以季連為益州刺史為後劉季連據益州張本使據遙欣上流以制之季連思考之子也思考劉遵考之弟是嵗髙昌王馬儒遣司馬王體𤣥入貢於魏請兵迎接求舉國内徙魏主遣明威將軍韓安保迎之割伊吾之地五百里以居儒衆儒遣左長史顧禮右長史金城麴嘉將步騎一千五百迎安保而安保不至将即亮翻騎竒寄翻禮嘉還髙昌安保亦還伊吾安保遣其屬朝興安等使髙昌朝姓也漢有鼂錯史記作朝錯朝直遥翻使疏吏翻儒復遣顧禮將世子義舒迎安保復扶又翻下同至白棘城去髙昌百六十里髙昌舊人戀土不願東遷相與殺儒魏太和五年馬儒始王髙昌至是為國人所殺立麴嘉為王麴氏得髙昌始此嘉字靈鳯金城榆中人復臣於柔然安保獨與顧禮馬義舒還洛陽永泰元年是年四月始改元春正月癸未朔大赦加中軍大將軍徐孝嗣開府儀同三司孝嗣固辭魏統軍李佐攻新野丁亥拔之縛劉思忌問之曰今欲降未降户江翻思忌曰寧為南鬼不為北臣史言劉思忌忠於所事乃殺之於是沔北大震沔彌兖翻戊子湖陽戍主蔡道福湖陽縣故蓼國漢屬南陽郡晉宋省齊於此置戍湖陽既入魏置西淮安郡唐為湖陽縣屬唐州辛夘赭陽戍主成公期壬辰舞陰戍主黃瑶起南鄉太守席謙相繼南遁瑶起為魏所獲魏主以賜王肅肅臠而食之黃瑶起殺王肅父奐見一百三十八卷世祖永明十一年乙巳命太尉陳顯達救雍州雍於用翻上有疾以近親寡弱忌髙武子孫時髙武子孫猶有十王十王下所殺者是也每朔朢入朝朝直遥翻上還後宫輒歎息曰我及司徒諸子皆不長意呼遥光為司徒也考之遥光傳時未拜司徒詳考齊史帝弟安陸昭王緬先帝卒建武元年贈此盖指言緬諸子徒髙武子孫日益長大長皆音丁丈翻今知兩翻上欲盡除髙武之族以微言問陳顯達對曰此等豈足介慮以問揚州刺史始安王遥光遥光以為當以次施行遥光有足疾遥光生而有躄疾上常令乘輿自望賢門入望賢門華林園門也本名鳯莊門以遥光父諱鳯改焉每與上屏人久語畢上索香火嗚咽流涕明日必有所誅左右以此覘知之屏必郢翻索山客翻㑹上疾暴甚絶而復蘇復扶又翻遥光遂行其策丁未殺河東王鉉臨賀王子岳西陽王子文永陽王子峻南康王子琳衡陽王子珉湘東王子建南郡王子夏桂陽王昭粲巴陵王昭秀於是太祖世祖及世宗諸子皆盡矣鉉太祖子子岳至子夏皆世祖子昭粲昭秀世宗子夏户雅翻鉉等已死乃使公卿奏其罪狀請誅之下詔不許再奏然後許之難将一人手掩盡天下目齊明帝之詔類如此南康侍讀濟陽江泌哭子琳淚盡繼之以血濟子禮翻泌薄必翻又兵媚翻親視殯葬畢乃去庚戌魏主如南陽二月癸丑詔左衞將軍蕭惠休等救夀陽是時魏不攻夀陽疑夀字悞甲子魏人拔宛北城房伯玉面縛出降宛於元翻降户江翻伯玉從父弟思安為魏中統軍數為伯玉泣請魏主乃赦之宋泰始三年房法夀降魏故房氏羣從多仕於魏而思安得為伯王請從才用翻數為上所角翻下於偽翻庚午魏主如新野辛巳以彭城王勰為使持節都督南征諸軍事中軍大將軍開府儀同三司勰音恊使疏吏翻三月壬午朔崔慧景蕭衍大敗於鄧城鄧縣漢屬南陽郡宋大明末割襄陽西界為京兆郡鄧縣屬焉其地在隋襄陽郡安養縣界唐貞元中又改安養縣為鄧城縣今鄧城縣在襄陽城北二十里隔漢水按南北對境圖自鄧城南過新河至樊城時慧景至襄陽五郡已陷没五郡謂南陽新野南鄉北襄城并西汝南北義陽二郡太守也慧景與衍及軍主劉山陽傅法憲等帥五千餘人進行鄧城魏數萬騎奄至帥讀曰率行下孟翻騎竒寄翻諸軍登城拒守時將士蓐食輕行皆有飢懼之色衍欲出戰慧景曰虜不夜圍人城待日暮自當去既而魏衆轉至慧景於南門拔軍去諸軍不相知相繼皆遁魏兵自北門入劉山陽與部曲數百人斷後死戰斷丁管翻且戰且却行慧景過閙溝據蕭子顯齊書閙溝近沙堨沙堨在宛縣界盖堨水入此溝南流逕鄧城界而入於漢也軍人相蹈藉藉慈夜翻橋皆斷壊魏兵夾路射之射而亦翻殺傅法憲士卒赴溝死者相枕枕之鴆翻山陽取襖仗填溝乘之得免魏主將大兵追之晡時至沔山陽據城苦戰沔北有樊城山陽所據盖即此城也至暮魏兵乃退諸軍恐懼是夕皆下船還襄陽庚寅魏主將十萬衆羽儀華盖以圍樊城曹虎閉門自守魏主臨沔水望襄陽岸乃去如湖陽辛亥如懸瓠魏鎮南將軍王肅攻義陽裴叔業將兵五萬圍渦陽以救義陽渦陽城在漢沛郡山桑縣東南渦水逕其南時為魏南兖州治所杜佑曰唐為亳州䝉城縣地渦音戈魏南兖州刺史濟北孟表守渦陽魏南兖州領下蔡及梁譙沛等郡濟子禮翻糧盡食草木皮葉叔業積所殺魏人髙五丈以示城内髙居傲翻别遣軍主蕭璝等攻龍亢龍亢縣漢屬沛郡晉屬譙國後省魏太和十九年置下蔡郡龍亢縣屬焉晉灼曰亢音剛龍亢城南臨渦水璝公回翻魏廣陵王羽救之叔業引兵擊羽大破之追獲其節魏主使安逺將軍𫝊永征虜將軍劉藻假輔國將軍髙聰救渦陽並受王肅節度叔業進擊大破之聰奔懸瓠永收敗卒徐還叔業再戰凡斬首萬級俘三千餘人獲器械雜畜財物以千萬計魏主命鎖三將詣懸瓠將即亮翻劉藻髙聰免死徙平州魏平州治肥如城領遼西北平二郡傅永奪官爵黜王肅為平南將軍肅表請更遣軍救渦陽魏主報曰觀卿意必以藻等新敗故難於更往朕今少分兵則不足制敵少詩沼翻多分兵則禁旅有闕卿審圖之義陽當止則止當下則下若失渦陽卿之過也肅乃解義陽之圍與統軍楊大眼奚康生等步騎十餘萬救渦陽叔業見魏兵盛夜引軍退明日士衆奔潰魏人追之殺傷不可勝數勝音升下不勝叔業還保渦口渦口渦水入淮之口也渦口對淮南岸即齊馬頭郡杜佑曰渦口今臨淮漣水縣非也初魏中尉李彪家世孤微李彪衞國頓丘人家素寒微少孤貧而好學朝無親援初遊代都以清淵文穆公李冲好士傾心附之清淵縣漢屬魏郡晉以來屬平陽郡朝直遥翻好呼到翻冲亦重其材學禮遇甚厚薦於魏主且為之延譽於朝為於偽翻延譽者為之聲譽使所聞者逺公私汲引既公言之於朝而薦之於上又私語同列引而進之引水而上曰汲取此義也及為中尉彈劾不避貴戚彈徒丹翻劾户槩翻又户得翻下同魏主賢之以比汲黯彪自以結知人主不復藉冲稍稍疎之唯公坐斂袂而已無復宗敬之意冲浸銜之復扶又翻坐徂卧翻及魏主南伐彪與冲及任城王澄共掌畱務彪性剛豪意議多所乖異數與冲爭辯形於聲色數所角翻自以身為法官他人莫能糾劾事多專恣冲不勝忿乃積其前後過惡禁彪於尚書省上表劾彪違傲髙亢勝音升亢苦浪翻公行僣逸坐輿禁省言坐輿而入禁省也漢法不下公門為不敬私取官材輒駕乘黃乘黃御馬也乘繩證翻杜佑曰漢有未央廐令魏改為乘黃廐乘黃古之神馬因以為名或亦名飛黃背有角日行萬里淮南子云天下有道飛黃伏皁無所憚懾臣輒集尚書已下令史已上於尚書都坐尚書都坐録今僕射尚書园坐處以彪所犯罪狀告彪訊其虛實彪皆伏罪請以見事免彪所居職付廷尉治罪見事謂彪見所犯之事也見賢遍翻治直之翻冲又表稱臣與彪相識以來垂二十載載子亥翻見其才優學博議論剛正愚意誠謂拔萃公清之人後稍察其人酷急猶謂益多損少自大駕南行以來彪兼尚書彪以中尉兼度支尚書日夕共事始知其專恣無忌尊身忽物聽其言如振古忠恕之賢振古自古也校其行寔天下佞暴之賊行下孟翻臣與任城卑躬曲己若順弟之奉暴兄其所欲者事雖非理無不屈從依事求實悉有成驗如臣列得實列謂陳列其事宜殛彪於北荒以除亂政之姦詩曰取彼譛人投畀有北毛注云北方寒凉而不毛所引無證宜投臣於四裔以息青蠅之譛詩曰營營青蠅止于棘讒人罔極交亂四國冲手自作表家人不知帝覽表歎悵久之曰不意畱臺乃至於此既而曰道固可謂溢矣而僕射亦為滿也李彪字道固僕射謂冲也黃門侍郎宋弁素怨冲而與彪同州相善弁廣平人彪頓丘人二郡皆屬相州陰左右之左音佐右音佑有司處彪大辟處昌吕翻下久處同辟毗亦翻帝宥之除名而已魏孝文於此可謂明矣冲雅性愠厚及收彪之際親數彪前後過失瞋目大呼投折几案御史皆泥首面縛數所具翻瞋昌真翻呼火故翻折而設翻中尉得罪而御史皆泥首面縛以謝冲以朝儀言之無是理也魏主所謂僕射亦為滿不亦信哉冲詈辱肆口遂𤼵病荒悸言語錯繆時扼腕大罵稱李彪小人悸其季翻腕烏貫翻醫藥皆不能療或以為肝裂怒氣傷肝怒甚𤼵病而醫不能療故以為肝裂旬餘而卒帝哭之悲不自勝勝音升贈司空冲勤敏彊力久處要劇處昌呂翻文案盈積終日視事未嘗厭倦職業修舉纔四十而髮白弟兄六人凡四毋少時毎多忿競少詩照翻及冲貴禄賜皆與共之更成敦睦然多援引族姻私以官爵一家歳禄萬匹有餘時人以此少之少詩沼翻下同魏主以彭城王勰為宗師魏置宗師見一百二十三卷晉安帝元興三年勰音協詔使督察宗室有不帥教者以聞帥讀曰率夏四月甲寅改元改元永泰大司馬㑹稽太守王敬則自以髙武舊將心不自安㑹工外翻將即亮翻上雖外禮甚厚而内相疑備疑備者疑其為變而為之防數訪問敬則飲食體幹堪宜堪勝也宜適也問其尚能勝兵及適用與否也數所角翻聞其衰老且以居内地故得少寛少詩沼翻前二嵗上遣領軍將軍蕭坦之將齋仗五百人行武進陵齊自武帝以上諸陵皆在武進行下孟翻敬則諸子在都憂怖無計怖普布翻上知之遣敬則世子仲雄入東安尉之自建康東入㑹稽尉與慰同仲雄善琴上以蔡邕焦尾琴借之蔡邕在吳吳人有燒桐以爨者邕聞火烈之聲知其良木因請而裁為琴果有美音而其尾猶焦時人因名焦尾琴白虎通曰琴禁也禁止於邪以正人心也廣雅曰琴長三尺六寸六分象三百六十六日五絃象五行桓譚新論五絃第一絃為宫其次商角徵羽文王武王各加一絃以為少宫少商仲雄於御前鼓琴作懊儂歌晉志曰懊儂歌者隆安初俗間訛謡之曲歌云春草可攬結女兒可攬擷杜佑曰懊儂歌石崇妾緑珠所作絲布澁難縫一曲而已懊於報翻儂如冬翻仲雄倣其曲而作歌曰常歎負情儂儂音農呉語也郎今果行許又曰君行不淨心那得惡人題惡烏路翻上愈猜愧上疾屢危乃以光禄大夫張瓌為平東將軍吳郡太守瓌古回翻守手又翻置兵佐以密防敬則中外傳言當有異處分處昌吕翻分扶問翻敬則聞之竊曰東今有誰只是欲平我耳東亦何易可平易以豉翻吾終不受金甖金甖謂鴆也賜死者以金甖盛鴆酒故云然敬則女為徐州行事謝朓妻朓土了翻敬則子太子洗馬幼隆遣正員將軍徐岳以情告脁官至將軍而未有軍號者為正員将軍次為員外将軍洗悉薦翻為計若同者當往報敬則朓執岳馳啟以聞敬則城局參軍徐庶家在京口其子密以報庶庶以告敬則五官掾王公林自晉以來諸郡有五官掾公林敬則族子也常所委信公林勸敬則急送啟賜兒死單舟星夜還都敬則令司馬張思祖草啟既而曰若爾諸郎在都要應有信且忍一夕言且遲一夜也其夜呼僚佐文武樗蒱謂衆曰卿諸人欲令我作何計莫敢先荅防閤丁興懐曰官衹應作爾言應作如此事謂應反也敬則不應明旦召山陰令王詢臺傳御史鍾離祖願臺傳御史臺所遣督諸郡錢穀者傳株戀翻敬則橫刀跂坐跂坐垂足而坐跟不及地跂去智翻問詢等發丁可得幾人庫見有幾錢物見賢遍翻詢稱縣丁猝不可集祖願稱庫物多未輸入敬則怒將出斬之将引也王公林又諫曰凡事皆可悔唯此事不可悔官詎不更思詎豈也敬則唾其面曰我作事何闗汝小子敬則舉兵反招集配衣配分給也衣於既翻分給袍甲以衣被之二三日便𤼵前中書令何𦙍棄官隠居若邪山若邪山在㑹稽東南四十里邪讀曰耶敬則欲刼以為尚書令長史王弄璋等諫曰何令髙蹈必不從不從便應殺之舉大事先殺名賢事必不濟敬則乃止𦙍尚之之孫也何尚之柄用於宋文武兩朝庚午魏發州郡兵二十萬人期八月中旬集懸瓠復欲南伐也魏趙郡靈王幹卒謚法亂而不損曰靈上聞王敬則反收王幼隆及其兄員外郎世雄此即敬則世子仲雄也仲世二字必有一悮記室參軍季哲敬則為大司馬以其子為記室參軍其弟太子舎人少安等皆殺之少詩照翻長子黃門郎元遷將千人在徐州撃魏長知兩翻将即亮翻敕徐州刺史徐𤣥慶殺之前吳郡太守南康侯子恪嶷之子也豫章王嶷武帝之弟嶷魚力翻敬則起兵以奉子恪為名子恪亡走未知所在始安王遥光勸上盡誅髙武子孫於是悉召諸王侯入宫晉安王寳義江陵公寳覽等處中書省寳義皇子寳覽姪也處昌吕翻下同髙武諸孫處西省據蕭子恪傳西省永福省也至唐分三省以門下省為西省中書省為東省敕人各從左右兩人過此依軍法孩幼者與乳母俱入其夜令太醫煮椒二斛都水辦棺材數十具前漢都水屬水衡都尉後漢光武省水衡都尉并少府都水屬郡國晉屬大司農蕭子顯志無都水都官尚書有水曹以此考之都水當屬將作大匠然齊大匠卿不常置故都水之官不見於志孩何開翻須三更當盡殺之須待也三更丙夜也更工衡翻子恪徒跣自歸二更達建陽門刺啟書姓名於奏白曰刺啟奏也既達姓名又啟陳其事時刻已至而上眠不起中書舎人沈徽孚與上所親左右單景雋共謀少畱其事須㬰上覺單上演翻少詩沼翻覺古孝翻寢而寤謂之覺景雋啟子恪已至上驚問曰未邪未邪景雋具以事對上撫牀曰遥光幾誤人事單景雋具以子恪所啟之事對上乃謂幾為遥光所誤而濫殺幾居希翻乃賜王侯供饌饌雛戀翻又雛晥翻明日悉遣還第以子恪為太子中庶子寳覽緬之子也緬上弟也緬彌兖翻敬則帥實甲萬人過浙江今之錢塘江也帥讀曰率張瓌遣兵三千拒敬則於松江松江在吳郡吳縣南古笠澤也今屬蘇州吳江縣聞敬則軍鼓聲一時散走瓌棄郡逃民間敬則以舊將舉事百姓擔篙荷鍤隨之者十餘萬衆將即亮翻擔都甘翻篙古勞翻竹竿也用以撑船荷下可翻鍤楚洽翻鍫也至晉陵南沙人范脩化殺縣令公上延孫以應之公上複姓也敬則本晉陵南沙人故范脩化舉縣應之敬則至武進陵口慟哭而過蕭氏之先葬武進髙帝之殂也從其先兆亦葬武進號泰安陵敬則懐髙帝恩故慟哭而過陸游曰自常州西北至吕城過陵口見大石獸偃仆道旁已殘缺盖南朝陵墓齊明帝時王敬則反至陵口慟哭而過是也距丹陽縣三十餘里丹陽古所謂曲阿或曰雲陽宋白曰吳大帝改丹陽為武進縣吳末併入晉陵縣烏程丘仲孚為曲阿令敬則前鋒奄至仲孚謂吏民曰賊乘勢雖鋭而烏合易離今若收船艦鑿長岡埭長岡在曲阿縣界今謂之上下夾堽埭即今之上金斗門易以豉翻艦户黯翻埭徒耐翻㵼瀆水以阻其路得畱數日臺軍必至如此則大事濟矣敬則軍至值瀆涸果頓兵不得進五月詔前軍司馬左興盛後軍將軍崔恭祖輔國將軍劉山陽龍驤將軍馬軍主胡松築壘於曲阿長岡驤思將翻右僕射沈文季為持節都督屯湖頭備京口路湖頭𤣥武湖頭也其地東接蔣山西巖下西抵𤣥武湖隄地勢坦平當京口大路恭祖慧景之族也前書後軍將軍崔恭祖接魏晉以來官制左右前後將軍是為四軍恭祖位號未能至此齊書王敬則傳作後軍將軍直閤將軍崔恭祖恭祖若為後軍將軍不應下帶直閤將軍此必有誤敬則急攻興盛山陽二壘臺軍不能敵欲退而圍不開各死戰胡松引騎兵突其後白丁無器仗皆驚散敬則軍大敗索馬再上不能得崔恭祖刺之仆地索山客翻上時掌翻刺七亦翻興盛軍客袁文曠斬之軍客齊書王敬則傳作軍容南史有軍容馬容如桓康為齊髙帝軍容蕭摩訶馬容陳智深斬陳叔陵盖皆簡拔魁健有武藝之士使之前驅以壯軍馬之容故以為名乙酉傳首建康是時上疾已篤敬則倉猝東起朝廷震懼太子寳卷使人上屋望見征虜亭失火上時掌翻征虜亭在方山南自𤣥武湖頭大路北出至征虜亭謂敬則至急裝欲走急裝謂縛袴也戎裝謂之急裝敬則聞之喜曰檀公三十六策走為上䇿計汝父子唯有走耳盖時人譏檀道濟避魏之語也敬則之來聲勢甚盛裁少日而敗裁少日謂不及二旬也少詩沼翻臺軍討賊黨晉陵民以附敬則應死者甚衆太守王瞻上言愚民易動不足窮法窮法謂盡法繩之易以豉翻上許之所全活以萬數瞻𢎞之從孫也王𢎞之以仕晉宋武帝辟召無所就從才用翻上賞謝脁之功遷尚書吏部郎唐六典曰吏部郎職在選舉魏晉用人妙於時選其諸曹郎功髙者遷吏部郎歴代品秩皆髙於諸曹郎魏晉宋齊吏部郎品第五諸曹郎品第六朓上表三讓上不許中書疑朓官未及讓國子祭酒沈約曰近世小官不讓遂成恒俗恒户登翻謝吏部今授超階讓别有意朓自兼殿中郎遷吏部郎故曰超階朓恥以告妻父得官故曰讓别有意夫讓出人情豈闗官之大小邪朓妻常懐刃欲殺朓朓不敢相見秋七月魏彭城王勰表以一嵗國秩職俸親恤裨軍國之用國秩彭城國秩也職俸勰所居職合受之俸也親恤亦魏朝給勰以恤親者勰音協魏主詔曰割身存國理為逺矣職俸便停親國聽三分受一親國謂親恤國秩也壬午又詔損皇后私府之半六宫嬪御五服男女供恤亦減半嬪毗賓翻在軍者三分省一以給軍賞癸夘以太子中庶子蕭衍為雍州刺史為後蕭衍以雍州起兵張本雍於用翻己酉上殂於正福殿年四十七遺詔徐令可重申前命徐令謂徐孝嗣也孝嗣為尚書令建武四年加開府儀同三司辭不受重直龍翻沈文季可左僕射江祏可右僕射江祀可侍中劉暄可衞尉軍政可委陳太尉陳太尉謂顯達内外衆事無大小委徐孝嗣遥光坦之江袥其大事與沈文季江祀劉暄參懐心膂之任可委劉悛蕭惠休崔慧景悛七倫翻又丑縁翻上性猜多慮簡於出入竟不郊天天子即位當奉珪幣以見上帝於南郊又深信巫覡覡刑狄翻每出先占利害東出云西南出云北初有疾甚袐之聽覽不輟久之敕臺省文簿中求白魚以為藥外始知之本草曰白魚味甘平無毒主胃氣開胃下食去水氣令人肥健大者六七尺色白頭昂生江湖中按此求文簿中白魚則所謂蠧書魚也本草謂之衣魚亦曰白魚利小便療偏風口喎衍義曰衣魚多在故書中久不動衣帛中或有之身有厚粉手搐之則粉落太子即位八月辛亥魏太子自洛陽朝於懸瓠朝直遥翻下同壬子奉朝請鄧學以齊興郡降魏武帝永明三年置齊興郡屬郢州其地當在西陽弋陽二郡界魏主之入寇也遣使𤼵高車兵髙車憚逺役奉袁紇樹者為主相帥北叛帥讀曰率魏主遣征北將軍宇文福討之大敗而還還從宣翻又如字福坐黜官更命平北將軍江陽王繼都督北討諸軍事以討之自懐朔以東悉稟節度仍攝鎮平城繼熈之曽孫也熙道武之子八月葬明皇帝於興安陵陵在曲阿廟號髙宗東昏侯惡靈在太極殿欲速葬惡烏路翻徐孝嗣固爭得踰月帝每當哭輒云喉痛太中大夫羊闡入臨臨力鴆翻哭也無髮號慟俯仰幘遂脱地帝輟哭大笑謂左右曰秃鶖啼來乎號户髙翻漢五行志曰鵜鶘或曰禿鶖師古曰鵜鶘一名淘河腹下胡大如數升囊好羣入澤中抒水食魚因名秃鶖亦水鳥也陸佃埤雅曰鶖性貪惡今俗呼秃鶖一名扶老狀如鶴而大長頸赤目其毛辟水毒頭髙八尺善與人鬬好㗖蛇鶖音秋九月己亥魏主聞髙宗殂下詔稱禮不伐喪春秋左氏傳曰晉士匃侵齊及穀聞喪而還禮也公羊傳曰還者何善辭也何善爾大其不伐喪也引兵還庚子詔北伐髙車魏主得疾甚篤旬日不見侍臣左右唯彭城王勰等數人而已勰内侍醫藥外總軍國之務逺近肅然人無異議右軍將軍丹陽徐謇善醫徐謇丹陽人宋明帝之世客青州慕容白曜克東陽謇遂為魏所獲謇九輦翻時在洛陽急召之既至勰涕泣執手謂曰君能已至尊之疾當獲意外之賞不然有不測之誅非但榮辱乃繫存亡勰又密為壇於汝水之濱依周公故事告天地及顯祖乞以身代魏主周公金縢之事以周公之至誠行之則可若王莽則偽也魏主疾有閒閒如字朱元晦曰閒少差也丙午發懸瓠舎於汝濱集百官坐徐謇於上席稱揚其功除鴻臚卿封金鄉縣伯賜錢萬緡臚陵如翻諸王别餉賚各不減千匹冬十一月辛巳魏主如鄴戊子立妃褚氏為皇后魏江陽王繼上言髙車頑昧避役遁逃若悉追戮恐遂擾亂請遣使鎮别推檢言六鎮各遣一使令各推檢一鎮使疏吏翻斬魁首一人自餘加以慰撫若悔悟從役者即令赴軍令赴南伐之軍也詔從之於是叛者往往自歸繼先遣人慰諭樹者樹者亡入柔然尋自悔相帥出降帥讀日率降户江翻魏主善之曰江陽可大任也十二月甲寅魏主自鄴班師北征至鄴而髙車已降遂班師林邑王諸農入朝海中值風溺死武帝永明十年范諸農得國朝直遥翻溺奴歴翻以其子文欵為林邑王資治通鑑卷一百四十一
