front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百五十一宋司馬光撰胡三省音註梁紀七起柔兆敦牂盡彊圉協洽凡二年髙祖武皇帝七普通七年春正月辛丑朔大赦壬子魏以汝南王悦領太尉魏安州石離宂城斛鹽三戍兵反應杜洛周衆合二萬洛周自松岍赴之水經注大榆河出禦夷鎮北塞中南流逕密雲戊西又南流逕孔山西又歴密雲戍東右合孟廣􅛜水􅛜水西逕孔山南上有洞宂開明故謂之孔山大榆河又東南流白楊泉水注之水北𤼵白楊溪望離石大榆河又東南流出峽逕安州舊漁陽郡之滑鹽縣南世謂之斛鹽城西北去禦夷鎮二百里岍輕煙翻或曰岍􅛜字之誤也讀作陘唐志營州西北百里曰松陘嶺行臺常景使别将崔仲哲屯軍都闗以邀之将即亮翻仲哲戰沒元譚軍夜潰元譚軍於居庸闗見上卷上年魏以别将李琚代譚為都督仲哲秉之子也崔秉時為燕州刺史初魏廣陽王深通於城陽王徽之妃徽為尚書令為胡太后所信任會恒州人請深為刺史徽言深心不可測及杜洛周反五原降户在恒州者謀奉深為主深懼上書求還洛陽時深軍于朔州恒户登翻降户江翻上時掌翻魏以左衛将軍楊津代深為北道大都督詔深為吏部尚書徽長夀之子也長夀景穆子也五原降户鮮于修禮等帥北鎮流民反於定州之左城按楊津𫝊左城當在博陵界又水經注中山唐縣有左人城帥讀曰率改元魯興引兵向州城州兵禦之不利楊津至靈丘靈丘縣漢屬代郡唐為蔚州聞定州危迫引兵救之入據州城修禮至津欲出擊之長史許被不聴津手劍擊手首又翻此以記檀弓子手弓釋之為據被走得免津開門出戰斬首數百賊退人心少安少詩沼翻詔尋以津為定安州刺史兼北道行臺魏以揚州刺史長孫稚為大都督北討諸軍事與河間王琛共討修禮長知兩翻琛丑林翻二月甲戌北伐衆軍解嚴魏西部敕勒斛律洛陽反於桑乾西乾音干與費也頭牧子相連結三月甲寅游擊将軍爾朱榮擊破洛陽於深井牧子於河西北河之西夏四月乙酉臨川靖惠王宏卒魏大赦癸巳魏以侍中車騎大将軍城陽王徽為儀同三司騎奇寄翻徽與給事黄門侍郎徐紇共毁侍中元順於太后出為䕶軍将軍太常卿順奉辭於西遊園紇侍側順指之謂太后曰此魏之宰噽宰噽吳太宰噽也好讒吳王夫差信而任之以至亡國噽匹鄙翻魏國不亡此終不死紇脅肩而出朱元晦曰脅肩竦體也小人側媚之態順抗聲叱之曰爾刀筆小才止堪供几案之用豈應汙辱門下斁我彞倫汙烏故翻斁多路翻敗也因振衣而起太后黙然魏朔州城民鮮于阿胡等據城反阿從安入聲杜洛周南出鈔掠薊城魏常景遣統軍梁仲禮擊破之丁未都督李琚與洛周戰于薊城之北敗沒常景帥衆拒之洛周引還上谷鈔楚交翻薊音計帥讀曰率長孫稚行至鄴詔解大都督以河間王琛代之稚上言曏與琛同在淮南琛敗臣全謂為裴邃所敗事見上卷上年遂成私隙今難以受其節度魏朝不聴朝直遥翻前至呼沱稚未欲戰琛不從鮮于修禮邀擊稚於五鹿杜預曰陽平元城縣東有五鹿即沙鹿也按呼沱不至元城界此别有五鹿非左氏所謂五鹿也沱徒河翻琛不赴救稚軍大敗稚琛並坐除名五月丁未魏主下詔将北討内外戒嚴既而不行衡州刺史元畧自至江南晨夕哭泣常如居喪及魏元乂死乂死見上卷上年喪息亦翻胡太后欲召之知畧因刁雙獲免事見一百四十九卷普通兀年徵雙為光禄大夫遣江革祖暅之南還以求略江革祖暅之沒魏見上卷上年暅古鄧翻上備禮遣之寵贈甚厚畧始濟淮魏拜畧為侍中賜爵義陽王以司馬始賔為給事中栗法光為本縣令刁昌為東平太守刁雙為西兖州刺史凡畧所過一飱一宿皆賞之畧來奔見一百四十九卷元年栗法光屯留人魏孝昌十年置西兖州於定陶領沛濟隂二郡是年則孝旻一年也魏以丞相髙陽王雍為大司馬復以廣陽王深為大都督討鮮于修禮復扶又翻章武王融為左都督裴衍為右都督並受深節度深以其子自随城陽王徽言於太后曰廣陽王攜其愛子握兵在外将有異志乃敕融衍潛為之備疑則勿任任則勿疑既以深為大督而又使小督備之何以責其殄冦乎融衍以敕示深深懼事無大小不敢自决太后使問其故對曰徽銜臣次骨李奇曰次骨者言深刻至骨臣疏逺在外徽之構臣無所不為自徽執政以來臣所表請多不從允徽非但害臣而已從臣将士有勲勞者皆見排抑不得比它軍仍深被憎嫉或因其有罪加以深文至於殊死以是從臣行者莫不悚懼有言臣善者視之如仇讐言臣惡者待之如親戚徽居中用事朝夕欲陷臣於不測之誅臣何以自安陛下若使徽出臨外州臣無内顧之憂庶可以畢命賊庭展其忠力太后不聴為深死于盜手張本徽與中書舍人鄭儼等更相阿黨更工衡翻外似柔謹内實忌克賞罰任情魏政由是愈亂戊申魏燕州刺史崔秉帥衆弃城奔定州燕州自去年八月為杜洛周所圍燕因肩翻乙丑魏以安西将軍宗正珍孫為都督宗正複姓漢楚元王交之子郢客孫徳世為宗正子孫因以為氏討汾州反胡討劉蠡升也六月魏絳蜀陳雙熾聚衆反蜀人徙居絳都者謂之絳蜀絳縣漢晉屬河東郡元魏分置絳郡魏收志郡屬東雍州自號始建王魏以假鎮西将軍長孫稚為討蜀都督曰考異費穆𫝊穆為都督平絳蜀不應有兩都督今從帝紀别将河東薛修義輕騎詣雙熾壘下曉以利害雙熾即降詔以修義為龍門鎮将此龍門在河東北屈縣西魏世祖神䴥元年禽赫連昌改北屈為禽昌縣将即亮翻降户江翻丙子魏徙義陽王略為東平王頃之遷大将軍尚書令為胡太后所委任與城陽王徽相埒埒力輟翻然徐鄭用事略亦不敢違也魏當時宗室畧其巨擘也史言其居淫昏之朝不能矯正杜洛周遣都督王曹紇真等将兵掠薊南時杜洛周葛榮等作亂其軍中将領無不加以王爵曹紇真以都督加王號故曰都督王秋七月丙午行臺常景遣都督于榮等擊之於栗園栗園當在范陽固安縣界固安之栗天下稱之大破之斬曹紇真及将卒三千餘級洛周帥衆南趣范陽范陽縣前漢屬涿郡後漢章帝改涿郡為范陽郡帥讀曰率趣七喻翻景與榮等又破之魏僕射元纂以行臺鎮恒州鮮于阿胡擁朔州流民冦恒州戊申陷平城纂奔冀州恒州治平城平城魏之故都亦陷於賊其不競甚矣恒户登翻上聞淮堰水盛夀陽城幾沒觀此蓋淮堰復成也復遣郢州刺史元樹等自北道攻黎漿豫州刺史夏侯亶等自南道攻夀陽復扶又翻下榮復同八月癸巳賊帥元洪業斬鮮于修禮請降于魏帥所類翻降户江翻賊黨葛榮復殺洪業自立廣考異曰北史陽王深𫝊云深以兵士頻經退散人無鬭情連營轉柵日行十里行達交津隔水而陳賊修禮常與葛榮謀後稍信朔州人毛普賢榮常銜之普賢昔為深統軍及在交津深使人諭之普賢乃有降意又使録事參軍元晏説賊程殺鬼果相猜貳榮遂殺普賢修禮而自立與魏帝紀全殊又其語雜亂難曉今從帝紀魏安北将軍都督恒朔討虜諸軍事爾朱榮過肆州肆州刺史尉慶賔忌之據城不出尉紆勿翻榮怒舉兵襲肆州執慶賔還秀容署其從叔羽生為刺史魏朝不能制此時爾朱榮已有無魏之心矣從才用翻朝直遥翻初賀拔允及弟勝岳從元纂在恒州平城之陷也允兄弟相失岳奔爾朱榮勝奔肆州榮克肆州得勝大喜曰得卿兄弟天下不足平也以為别将将即亮翻軍中大事多與之謀九月己酉鄱陽忠烈王恢卒葛榮既得杜洛周之衆魏主武泰元年葛榮方并杜洛周此得鮮于修禮之衆也北趣瀛州趣七喻翻魏廣陽忠武王深自交津引兵躡之水經注漳水過武安縣東清水自涉縣東南來注之世謂决入之所為交漳口辛亥榮至白牛邏據魏紀白牛邏在髙陽博野縣邏郎佐翻輕騎掩擊章武莊武王融殺之榮自稱天子國號齊改元廣安深聞融敗停車不進侍中元晏密言於太后曰廣陽王盤桓不進坐圖非望有于謹者智略過人為其謀主風塵之際恐非陛下之純臣也太后深然之詔牓尚書省門募能獲謹者有重賞謹聞之謂深曰今女主臨朝朝直遥翻信用讒佞茍不明白殿下素心恐禍至無日謹請束身詣闕歸罪有司遂徑詣牓下自稱于謹有司以聞太后引見大怒見賢遍翻謹備論深忠欵兼陳停車之狀太后意解遂捨之深引軍還趣定州趣七喻翻定州刺史楊津亦疑深有異志深聞之止於州南佛寺經二日深召都督毛諡等數人交臂為約危難之際期相拯恤諡神至翻難乃旦翻諡愈疑之密告津云深謀不軌津遣諡討深深走出諡呼噪逐深深與左右閒行至博陵界閒古莧翻漢桓帝置博陵郡元魏屬定州逢葛榮遊騎劫之詣榮騎奇寄翻賊徒見深頗有喜者榮新立惡之恐其徒有欲奉深為主者故惡之惡烏路翻遂殺深城陽王徽誣深降賊録其妻子降户江翻深府佐宋遊道為之訴理乃得釋遊道繇之𤣥孫也宋繇事西梁李氏李滅事沮渠氏沮渠滅入魏為于偽翻甲申魏行臺常景破杜洛周斬其武川王賀拔文興等捕虜四百人就徳興陷魏平州殺刺史王買奴魏平州治肥如即唐平州盧龍縣地天水民吕伯度本莫折念生之黨也後更據顯親以拒念生漢光武置顯親侯國以封竇友以其兄融以河西歸附且以顯其孝文竇后之親也屬漢陽郡後魏屬天水郡至唐時秦州成紀縣治顯親川已而不勝亡歸胡琛琛丑林翻琛以為大都督秦王資以士馬使擊念生伯度屢破念生軍復據顯親復扶又翻下生復同乃叛琛東引魏軍念生窘迫乞降於蕭寶寅窘渠隕翻寶寅使行臺左丞崔士和據秦州魏以伯度為涇州刺史封平秦郡公魏大延二年置平秦郡於雍縣屬岐州大都督元修義停軍隴口久不進隴口隴坻之口念生復反執士和送胡琛於道殺之久之伯度為万俟醜奴所殺万莫北翻俟渠之翻賊勢益盛寶寅不能制胡琛與莫折念生交通事破六韓拔陵浸慢琛應拔陵見上卷五年拔陵遣其臣費律至髙平誘琛斬之誘音酉醜奴盡并其衆冬十一月庚辰大赦丁貴嬪卒太子水漿不入口太子統丁貴妃所生也卒子恤翻上使謂之曰毁不滅性引孝經孔子之言况我在邪乃進粥數合合古沓翻漢志曰十龠為合合者龠之量也太子體素肥壯腰帶十圍至是減削過半過工禾翻夏侯亶等軍入魏境所向皆下辛巳魏揚州刺史李憲以夀陽降降户江翻下同宣猛将軍陳慶之入據其城凡降城五十二獲男女七萬五千口丁亥縱李憲還魏復以夀陽為豫州自宋以來以夀陽為豫州裴叔業叛齊降魏魏以夀陽為揚州復漢魏之舊也今復以夀陽為豫州復宋齊之舊也復以扶又翻又如字改合肥為南豫州天監五年徙豫州治合肥以夏侯亶為豫南豫二州刺史夀陽久罹兵革民多離散亶輕刑薄賦務農省役頃之民户充復杜洛周圍范陽戊戌民執魏幽州刺史王延年行臺常景送洛周開門納之常景擊杜洛周數戰數勝而終于為虜者民樂於從亂而疾視其上也魏齊州平原民劉樹等反宋武帝僑置平原郡于梁鄒屬冀州後入於魏改冀州為齊州平原為東平原郡攻陷郡縣頻敗州軍刺史元欣以平原房士達為将討平之敗補邁翻将即亮翻曹義宗據穰城以逼新野穰人羊翻魏遣都督魏承祖及尚書左丞南道行臺辛纂救之在考異曰梁書此年冬新野降魏書肅宗崩後新野猶恐梁書誤蓋梁自前年攻新野此年魏使魏承祖救之也又周于謹𫝊云孝昌二年與辛纂討義宗今以為據義宗戰不利不敢進纂雄之從父兄也魏盜賊日滋征討不息國用耗竭豫徵六年租調猶不足調徒弔翻乃罷百官所給酒肉又税入市者人一錢及邸店皆有税百姓嗟怨吏部郎中辛雄上疏以為華夷之民相聚為亂豈有餘憾哉正以守令不得其人守式又翻百姓不堪其命故也宜及此時早加慰撫但郡縣選舉由來共輕貴遊儁才莫肯居此宜改其弊分郡縣為三等清官選補之法妙盡才望如不可並後地先才不得拘以停年地門地也崔亮制停年格見一百四十九卷天監十八年後先並去聲三載黜陟載子亥翻有稱職者補在京名官稱尺證翻如不歴守令不得為内職則人思自勉枉屈可申彊暴自息矣不聴大通元年是年三月方改元大通春正月乙丑以尚書左僕射徐勉為僕射時右僕射缺故左僕射止為僕射辛未上祀南郊甲戌魏以司空皇甫度為司徒儀同三司蕭寶寅為司空魏分定相二州四郡置殷州按魏收志殷州止領趙郡鉅鹿南鉅鹿三郡蓋初置時兼領相州之廣宗郡也殷州治廣阿劉昫曰北齊改為趙州隋改廣阿為大陸唐武徳四年改為象城天寶二年改為昭慶以有建初啟運二陵也宋開寶五年改昭慶為隆平熙寧六年省隆平縣為隆平鎮入臨城縣相息亮翻以北道行臺博陵崔楷為刺史楷表稱州今新立尺刃斗糧皆所未有乞資以兵糧詔付外量聞使量計合給兵量之數以聞也量音良竟無所給或勸楷留家單騎之官騎奇寄翻楷曰吾聞食人之禄者憂人之憂若吾獨往則将士誰肯固志哉遂舉家之官葛榮逼州城或勸減弱小以避之楷遣幼子及一女夜出既而悔之曰人謂吾心不固虧忠而全愛也遂命追還賊至彊弱相懸又無守禦之具楷撫勉将士以拒之莫不争奮皆曰崔公尚不惜百口吾屬何愛一身連戰不息死者相枕枕職任翻終無叛志辛未城陷楷執節不屈榮殺之藩翰之任保境安民上也全城却敵次也死於城郭豈得己哉崔楷闔家并命其志節有可憐矣上之人實有罪焉遂圍冀州蕭寶寅出兵累年将士疲弊秦賊擊之寶寅大敗於涇州收散兵萬餘人屯逍遥園東秦州刺史潘義淵以汧城降賊秦州既為賊所據魏置東秦州于隴東郡治汧城即隋唐之汧源縣也将即亮翻汧口堅翻降户江翻莫折念生進逼岐州城人執刺史魏蘭根應之豳州刺史畢祖暉戰沒行臺辛深弃城走弃豳州城也北海王顥軍亦敗賊帥胡引祖據北華州引祖恐當作𢎞祖魏孝文帝太和十五年置東秦州於杏城後改為北華州領中部敷城郡帥所類翻華戸化翻叱干麒麟據豳州以應天生叱干虜複姓闗中大擾雍州刺史楊椿募兵得七千餘人帥以拒守雍於用翻帥讀曰率詔加椿侍中兼尚書右僕射為行臺節度闗西諸将北地功曹毛鴻賔引賊抄掠渭北抄楚交翻雍州録事參軍楊侃将兵三千掩擊之鴻賔懼請討賊自効遂擒送宿勤烏過仁烏過仁者明達之兄子也莫折天生乗勝冦雍州作考異曰羊侃𫝊莫遮今從魏書蕭寶寅部将羊侃隠身塹中射之應弦而斃塹七艷翻射而亦翻其衆遂潰侃祉之子也魏右民郎陽平路思令上疏晉武帝置尚書右民郎以為師出有功在於将帥得其人則六合唾掌可清人欲舉手有為先唾其掌六合天地東西南北也唾掌可清言其易也唾湯卧翻口液也失其人則三河方為戰地此指漢三河之地為言魏都洛陽三河則畿甸也竊以比年将帥多寵貴子孫銜杯躍馬志逸氣浮軒眉扼腕以攻戰自許及臨大敵憂怖交懐雄圖鋭氣一朝頓盡乃令羸弱在前以當冦彊壯居後以衛身兼復器械不精進止無節以當負險之衆敵數戰之虜腕烏貫翻怖普布翻羸倫為翻比毗至翻復扶又翻下復疑同數所角翻欲其不敗豈可得哉是以兵知必敗始集而先逃将帥畏敵遷延而不進國家謂官爵未滿屢加寵命復疑賞賚之輕日散金帛帑藏空竭民財殫盡帑它朗翻藏徂浪翻遂使賊徒益甚生民彫弊凡以此也夫徳可感義夫恩可勸死士今若黜陟幽明賞罰善惡簡練士卒繕修器械先遣辯士曉以禍福如其不悛以順討逆悛丑縁翻如此則何異厲蕭斧而伐朝菌戰國時雍門周有是言荘子曰朝菌不知晦朔音義云菌大芝也天隂生糞土見日則死梁簡文云菌欻生之芝也音其隕翻鼓洪爐而燎毛髮哉弗聴戊子魏以皇甫度為太尉己丑魏主以四方未平詔内外戒嚴将親出討竟亦不行譙州刺史湛僧智圍魏東豫州姓譜湛丈減翻姓也後漢有大司農湛重帝置譙州治新昌城領新昌髙塘臨徐南梁郡五代志江都郡清流縣郡置新昌郡考異曰魏帝紀及曹世表𫝊作湛僧今從梁夏侯䕫𫝊将軍彭羣王辯圍琅邪魏敕青南青二州救琅邪魏青州領齊北海樂安勃海髙陽河間樂陵郡南青州當又置于其南司州刺史夏侯䕫帥壯武将軍裴之禮等出義陽道攻魏平静穆陵隂山三闗皆克之水經注木陵闗在黄武山東北晉西陽城西南帥讀曰率下同䕫亶之弟之禮邃之子也魏東清河郡山賊羣起詔以齊州長史房景伯為東清河太守宋武帝僑置清河郡於盤陽屬冀州後入于魏為東清河郡屬齊州五代志齊州長山縣清河平原二郡併入焉郡民劉簡虎嘗無禮於景伯舉家亡去景伯窮捕禽之署其子為西曹掾令諭山賊賊以景伯不念舊惡皆相帥出降掾俞絹翻降戸江翻景伯母崔氏通經有明識貝丘婦人列其子不孝貝丘僑縣亦宋武帝置屬清河郡五代志齊州淄川縣舊曰貝丘置東清河郡按前注所謂清河郡置於盤陽者據魏收地形志宋郡也五代志長山之清河平原雙頭郡也房景伯所守者貝丘之東清河也景伯以白其母母曰吾聞聞名不如見面山民未知禮義何足深責乃召其母與之對榻共食使其子侍立堂下觀景伯供食未旬日悔過求還崔氏曰此雖面慙其心未也且置之凡二十餘日其子叩頭流血母涕泣乞還然後聴之卒以孝聞卒子恤翻景伯法夀之族子也房法夀見一百三十二卷宋明帝泰始三年二月秦賊據魏潼闗出蕭寳寅之後庚申魏東郡民趙顯徳反殺太守裴烟自號都督魏東郡治滑臺城屬西兖州烟俗煙字将軍成景儁攻魏彭城魏以前荆州刺史崔孝芬為徐州行臺以禦之先是孝芬坐元乂黨與盧同等俱除名盧同除名見上卷普通六年先悉薦翻及将赴徐州入辭太后太后謂孝芬曰我與卿姻戚時太后為魏主納孝芬女為世婦故云然奈何内頭元乂車中稱此老嫗會須去之嫗威遇翻去羌吕翻孝芬曰臣䝉國厚恩實無斯語假令有之誰能得聞若有聞者此於元乂親密過臣逺矣太后意解悵然有愧色景儁欲堰泗水以灌彭城孝芬與都督李叔仁等擊之景儁遁還三月甲子魏主詔将西討中外戒嚴會秦賊西走復得潼闗復扶又翻戊辰詔回駕北討其實皆不行葛榮久圍信都魏以金紫光禄大夫源子邕為北討大都督以救之初上作同泰寺又開大通門以對之取其反語相協同泰反為大大通反為同是反語相協也反音翻上晨夕幸寺皆出入是門辛未上幸寺捨身甲戌還宫大赦改元改是年為大通元年魏齊州廣川民劉鈞聚衆反宋武帝僑置廣川郡屬冀州入魏屬齊州五代志齊州長山縣舊曰武彊置廣川郡自署大行臺清河民房項自署大都督屯據昌國城魏收志東清河郡武城縣有昌國城夏四月魏将元斌之討東郡斬趙顯徳将即亮翻己酉柔然頭兵可汗遣使入貢於魏可從刋入聲汗音寒使䟽吏翻且請討羣賊魏人畏其反覆詔以盛暑且俟後敕魏蕭寳寅之敗也有司處以死刑詔免為庶人雍州刺史楊椿有疾求解復以寶寅為都督雍涇等四州諸軍事征西将軍雍州刺史開府儀同三司西討大都督自闗以西皆受節度處昌吕翻復扶又翻雍於用翻椿還鄉里楊椿世居華隂其子昱将適洛陽椿謂之曰當今雍州刺史亦無踰於寶寅者但其上佐朝廷應遣心膂重臣何得任其牒用此乃聖朝百慮之一失也朝直遥翻且寶寅不藉刺史為榮吾觀其得州喜悦特甚至於賞罰云為不依常憲恐有異心汝今赴京師當以吾此意啟二聖二聖謂胡太后魏主并白宰輔更遣長史司馬防城都督欲安關中正須三人耳如其不遣必成深憂昱面啟魏主及太后皆不聴是後寶寅以闗中叛魏如楊椿所料五月丙寅成景儁攻魏臨潼竹邑拔之魏置臨潼郡治臨潼城據水經城臨潼水故名竹邑即漢沛郡之竹縣也魏為南濟隂郡治所五代志下邳郡夏丘縣舊置臨潼郡彭城郡符離縣隋廢竹邑入焉宋白曰符離縣朝斛城西南七十里有竹邑城東宫直閤蘭欽攻魏蕭城厥固拔之東宫亦有直閤将軍魏收志魏沛郡治蕭縣黄陽城又領内相縣有厥城領内猶言管内也欽斬魏将曹龍牙将即亮翻六月魏都督李叔仁討劉鈞平之秋七月魏陳郡民劉獲鄭辯反於西華西華縣漢屬汝南郡晉屬潁川郡元魏屬陳郡改元天授與湛僧智通謀湛僧智時圍魏東豫州魏以行東豫州刺史譙國曹世表為東南道行臺以討之源子恭代世表為東豫州諸将以賊衆彊官軍弱且皆敗散之餘不敢戰欲保自固世表方病背腫轝出呼統軍是云寶是云姓也魏書官氏志内入諸姓有是云氏謂曰湛僧智所以敢深入為冦者以獲辯皆州民之望為之内應也曏聞獲引兵欲迎僧智去此八十里今出其不意一戰可破獲破則僧智自走矣乃選士馬付寶暮出城比曉而至比必利翻及也擊獲大破之窮討餘黨悉平僧智聞之遁還鄭辯與子恭親舊亡匿子恭所世表集将吏而責子恭收辯斬之魏相州刺史樂安王鑒與北道都督裴衍共救信都相息亮翻樂安當作安樂樂音洛鑒幸魏多故隂有異志遂據鄴叛降葛榮降户江翻下同己丑魏大赦初侍御史遼東髙道穆奉使相州使䟽吏翻下同前刺史李世哲奢縱不法道穆案之世哲弟神軌用事道穆兄謙之家奴訴良律禁壓良為賤謂本是良民壓為奴婢神軌收謙之繫廷尉赦将出神軌啟太后先賜謙之死朝士哀之朝直遥翻彭羣王辯圍琅邪自夏及秋魏青州刺史彭城王劭遣司馬鹿悆南青州刺史胡平遣長史劉仁之将兵擊羣辯破之羣戰沒劭勰之子也彭城王勰魏之賢王也死於髙肇之譖悆羊茹翻將即亮翻勰音協八月魏遣都督源子邕李神軌裴衍攻鄴子邕行及湯隂湯隂縣漢屬河内郡晉廢縣其地在汲郡界安樂王鑒遣弟斌之夜襲子邕營不克子邕乗勝進圍鄴城丁未拔之斬鑒𫝊首洛陽改姓拓拔氏魏因遣子邕裴衍討葛榮九月秦州城民杜粲殺莫折念生闔門皆盡粲自行州事南秦州城民辛琛亦自行州事遣使詣蕭寶寅請降琛丑林翻魏復以寶寅為尚書令還其舊封寳寅涇州之敗免為庶人舊封者寶寅自丹陽郡公徙封梁郡公復扶又翻譙州刺史湛僧智圍魏東豫州刺史元慶和於廣陵此廣陵城在新息縣界魏将軍元顯伯救之司州刺史夏侯䕫自武陽引兵助僧智武陽闗義陽三闗之一也冬十月䕫至城下慶和舉城降䕫以讓僧智僧智曰慶和欲降公不欲降僧智今往必乖其意且僧智所将應募烏合之人不可御以法公持軍素嚴必無侵暴受降納附深得其宜䕫乃登城拔魏幟建梁幟幟昌志翻慶和束兵而出吏民安堵獲男女四萬餘口臣光曰湛僧智可謂君子矣忘其積時攻戰之勞湛僧智自是年正月攻圍東豫州以授一朝新至之将知己之短不掩人之長功成不取以濟國事忠且無私可謂君子矣元顯伯宵遁諸軍追之斬獲萬計詔以僧智領東豫州刺史鎮廣陵䕫引軍屯安陽魏收志東豫州汝南郡有安陽縣五代志汝南真陽縣隋廢魏安陽縣入焉遣别将屠楚城魏收志梁置西楚州於楚城五代志汝南郡城陽縣梁置楚州由是義陽北道遂與魏絶領軍曹仲宗東宫直閤陳慶之攻魏渦陽渦古禾翻詔尋陽太守韋放将兵會之魏散騎常侍費穆引兵奄至散悉亶翻騎奇寄翻放營壘未立麾下止有二百餘人放免胄下馬據胡牀處分胡牀即今之交牀隋惡胡氏改曰交牀今之交倚是也處昌吕翻分扶問翻士皆殊死戰莫不一當百魏兵遂退放叡之子也梁之将帥韋叡一人而已魏又遣将軍元昭等衆五萬救渦陽前軍至駝澗去渦陽四十里今自肥河口泝江西上得駝澗灘其灘南對永夀館北至耶溪陳慶之欲逆戰韋放以魏之前鋒必皆輕鋭不如勿擊待其來至慶之曰魏兵逺來疲倦去我既逺必不見疑及其未集須挫其氣諸君若疑君或作軍慶之請獨取之於是帥麾下二百騎進擊破之帥讀曰率騎奇寄翻魏人驚駭慶之乃還與諸将連營而進背渦陽城與魏軍相持背蒲妹翻自春至冬數十百戰将士疲弊聞魏人欲築壘於軍後曹仲宗等恐腹背受敵議引軍還慶之杖節軍門曰共來至此涉歴一載去年慶之入夀陽至此涉歴一年糜費極多今諸君皆無鬬心唯謀退縮豈是欲立功名直聚為抄暴耳抄楚交翻吾聞置兵死地乃可求生兵法置之死地而後生須虜大合然後與戰審欲班師慶之别有密敕今日犯者當依敕行之仲宗等乃止魏人作十三城欲以控制梁軍慶之銜枚夜出陷其四城渦陽城主王緯乞降緯于貴翻以考異曰魏帝紀九月辛夘東豫州刺史元慶和城叛梁帝紀十月庚戌魏東豫州刺史元慶和以渦陽内屬夏侯䕫𫝊湛僧智圍元慶和于廣陵慶和請降詔以僧智為東豫州鎮廣陵韋放𫝊普通八年曹仲宗攻渦陽放會之城主王偉降陳慶之𫝊大通元年𨽻曹仲宗伐渦陽城主王偉降詔以渦陽置西徐州然則廣陵渦陽兩處兩事梁紀慶和渦陽之間或更有脱字耳魏紀九月據聞慶和始叛之時梁紀十月據慶和降欵到日按陳慶之𫝊云自春至冬今從梁紀十月為定此别一廣陵非南兖州之廣陵也王偉當作王緯蓋草書之誤也韋放簡遣降者三十餘人分報魏諸營陳慶之陳其俘馘鼓譟随之九城皆潰追擊之俘斬略盡尸咽渦水所降城中男女三萬餘口蕭寶寅之敗於涇州也或勸之歸罪洛陽或曰不若留闗中立功自効行臺都令史河間馮景曰擁兵不還此罪将大尚書有都令史故行臺亦置之寶寅不從自念出師累年糜費不貲一旦覆敗内不自安魏朝亦疑之朝直遥翻中尉酈道元素名嚴猛司州牧汝南王悦魏都洛陽置司州嬖人丘念弄權縱恣道元收念付獄悦請之於胡太后太后欲赦之道元殺之并以劾悦時寶寅反狀已露悦乃奏以道元為闗右大使嬖卑義翻又博計翻劾戸槩翻又戸得翻使疏吏翻寶寅聞之謂為取已甚懼長安輕薄子弟復勸使舉兵復扶又翻下不復寅復同寶寅以問河東栁楷楷曰大王齊明帝子天下所屬屬之欲翻今日之舉實允人望且謡言鸞生十子九子􅀈一子不􅀈闗中亂齊明帝諱鸞寶寅之父也􅀈徒玩翻卵壊也周秦以前以亂為治大王當治闗中何所疑道元至隂盤驛此隂盤縣驛也魏收地形志曰隂盤縣本屬安定晉屬京兆魏真君七年併新豐太和十一年復置隂盤縣鴻門戲水正屬縣界按漢安定郡與京兆相去遼逺中間為馮翊所隔自晉以後所置隂盤縣非漢安定之隂盤縣地也魏收不深考耳宋白曰京兆昭應縣東十三里有故城後漢靈帝末移安定郡隂盤縣寄理於此今亦謂之隂盤城後魏太和九年自此復移隂盤縣城於今昭應縣東三十二里零水西戲水東司馬村故城是也寶寅遣其将郭子恢攻殺之将即亮翻收殯其尸表言白賊所害秦人謂鮮卑為白虜自苻秦之亂鮮卑之種有因而留闗中者是時亦相梃為盜因謂之白賊或曰白賊謂白地之冦也又上表自理稱為楊椿父子所譖寶寅行臺郎中武功蘇湛卧病在家寶寅令湛從母弟開府屬天水姜儉説湛魏以寳寅為開府故有掾有屬從才用翻説式芮翻曰元略受蕭衍㫖欲見𠞰除略自梁還魏大見寵任故寶寅託以為言𠞰子小翻道元之來事不可測吾不能坐受死亡今須為身計不復作魏臣矣死生榮辱與卿共之湛聞之舉聲大哭儉遽止之曰何得便爾湛曰我百口今屠滅云何不哭哭數十聲徐謂儉曰為我白齊王寶寅歸魏封為齊王故稱之為于偽翻下口為同王本以窮鳥投人賴朝廷假王羽翼榮寵至此屬國步多虞屬之欲翻不能竭忠報徳乃欲乗人間隙間古莧翻信惑行路無識之語欲以羸敗之兵守闗問鼎守闗謂寶寅欲守潼闗之險割據闗中問鼎謂欲窺天位成王定鼎于郟鄏三代之世寶也楚莊問鼎之大小輕重欲以兵威脅取之故以諭窺天位者羸倫為翻今魏徳雖衰天命未改且王之恩義未洽於民但見其敗未見有成蘇湛不能以百口為王族滅寶寅復使謂曰我救死不得不爾所以不先相白者恐沮吾計耳沮在吕翻湛曰凡謀大事當得天下奇才與之從事今但與長安博徒謀之此有成理不不讀曰否湛恐荆棘必生於齋閤此亦用伍胥伍被語意願賜骸骨歸鄉里庶得病死下見先人寶寅素重湛且知其不為己用聴還武功甲寅寶寅自稱齊帝改元隆緒赦其所部置百官都督長史毛遐寳寅都督雍涇等四州又為西討大都督以遐為府長史鴻賔之兄也與鴻賔帥氐羌起兵於馬祇柵以拒寶寅帥讀曰率寶寅遣大将軍盧祖遷擊之為遐所殺寶寅方祀南郊行即位禮未畢聞敗色變不暇整部伍狼狽而歸以姜儉為尚書左丞委以心腹文安周惠達為寶寅使在洛陽文安縣前漢屬勃海後漢屬河間晉置章武郡文安屬焉使疏吏翻有司欲收之惠達逃歸長安寶寅以惠達為光禄勲丹陽王蕭贊聞寶寅反懼而出走趣白馬山趣七喻翻至河橋為人所獲魏主知其不預謀釋而慰之行臺郎封偉伯等與闗中豪傑謀舉兵誅寶寅事泄而死魏以尚書僕射長孫稚為行臺以討寶寅正平民薛鳳賢反魏收志世祖置太平郡於河東聞喜縣孝文太和十八年改曰正平郡屬雍雍州領聞喜曲沃二縣宗人薛修義亦聚衆河東分據鹽池攻圍蒲坂東西連結以應寶寅詔都督宗正珍孫討之十一月丁夘以䕶軍蕭淵藻為北討都督鎮渦陽戊辰以渦陽為西徐州渦陽魏置譙州梁改為西徐州領南譙汴龍亢靳城潁川臨渙䝉郡渦音戈葛榮圍信都自春及冬冀州刺史元孚帥勵将士晝夜拒守帥讀曰率下同糧儲既竭外無救援己丑城陷榮執孚逐出居民凍死者什六七孚兄祐為防城都督榮大集将士議其生死孚兄弟各自引咎争相為死為于偽翻都督潘紹等數百人皆叩頭請就法以活使君榮曰此皆魏之忠臣義士於是同禁者五百人皆得免魏以源子邕為冀州刺史将兵討榮将即亮翻裴衍表請同行詔許之子邕上言衍行臣請留臣行請留衍若逼使同行敗在旦夕不許十二月戊申行至陽平東北漳水曲榮帥軍十萬擊之子邕衍俱敗死相州吏民聞冀州已陷子邕等敗人不自保相州刺史恒農李神志氣自若魏顯祖諱𢎞改𢎞農曰恒農相息亮翻恒户登翻撫勉将士大小致力葛榮盡鋭攻之卒不能克卒子恤翻秦州民駱超殺杜粲請降於魏杜粲殺莫折念生駱超又殺杜粲羣盜互相屠滅以邀一時之利不足怪也降戸江翻資治通鑑卷一百五十一
