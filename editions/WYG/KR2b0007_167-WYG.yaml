front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百六十七宋司馬光撰胡三省音註陳紀一起彊圉赤奮若盡屠維單閼凡三年興武帝既有功於梁自以為姓出於陳自吳郡公進封陳公及受命國遂號曰東髙祖武皇帝諱霸先字興國小字法生姓陳氏吳興長城下若里人永定元年是年十月受禪始改元永定自十月以前猶是梁太平二年春正月辛丑周公即天王位諱覺字陁羅尼宇文泰第三子也宇文輔政慕倣周禮泰卒覺嗣遂封周公既受命國號曰周柴燎告天朝百官於露門露門即古之路門路大也宇文建國率倣古制故外朝曰路門鄭𤣥曰外門曰臯門朝門曰應門内有路門孔頴達曰爾雅門屛之間謂之宁郭曰人主視朝所宁立處李巡曰正門外兩塾間曰宁謂天子受朝於路門之外朝於門外而宁立以待諸侯之至故云當宁而立也然門外有屛者即樹塞門是也爾雅云正門謂之應門又云屛謂之樹李巡曰常當門自蔽名曰樹郭云小牆當門中案李郭二注以推驗禮文諸侯内屛在路門之内天子外屛在路門之外而近應門周制天子三朝其一在路門内謂之燕朝太僕掌之故太僕云王眂燕朝則正其位文王世子云公族朝於内朝親之也此則王與宗人圖其嘉事及王退侯大夫之朝也其一是路門外之朝謂之治朝司士掌之故司士云正朝儀之位此是毎日視朝之位其王與諸侯賔射亦與治朝同其三是臯門之内庫門之外謂之外朝朝士掌之此是詢衆庶之朝也朝直遥翻追尊王考文公為文王妣為文后大赦封魏恭帝為宋公以木徳承魏水行夏之時服色尚黑行夏之時用寅正也服色尚黑隨水行也夏户雅翻以李弼為太師趙貴為太傅大冢宰獨孤信為太保大宗伯中山公護為大司馬後周太祖初據關右宫名未改魏號及域内粗定改定章程命尚書令盧辯逺師周制置三公三孤以為論道之官次置六卿以分司庶務閔帝受禪大司馬掌兵宇文䕶居之以專兵要詔以王琳為司空驃騎大將軍驃匹妙翻騎奇寄翻以尚書右僕射王通為左僕射周王祀圜丘自謂先世出於神農以神農配二丘宇文氏自謂其先出於炎帝炎帝為黄帝所滅子孫遁去朔野其後有葛烏者雄武多算畧鮮卑奉以為主裔孫曰普囘因狩得玉璽三紐文曰皇帝璽以為天授其俗謂天子曰宇文遂以為氏及國號二丘圜丘方丘也始祖獻侯配南北郊普囘子莫那自隂山南徙始居遼西諡曰獻侯文王配明堂廟號太祖癸卯祀方丘甲辰祭太社五代志後周憲章姬周祭祀之式多依儀禮司量掌為壇之制圜丘三成崇一丈二尺深二丈上徑六丈十有二階毎等十有二節在國陽七里之郊圓壝徑三百歩内壝半之方一成下崇一丈徑六丈八尺上崇五尺方四丈八方方一階階十級級一尺方丘在國隂十里之郊丘一成八方下崇一丈方六丈八尺上崇五尺方四丈八方一階級一尺其壝八面徑百二十歩内壝半之南郊為方壇於國南五里其崇一丈二尺其廣二丈其壝方百二十歩内壝半之神州之壇崇一丈方四丈在北郊方丘之右其壝如方丘其祭圓丘及南郊並正月上辛右宗廟而左社稷皇帝親祀社稷冢宰亞獻宗伯終獻除市門稅魏末盗賊羣起國用不足稅入市門者人一錢今除之乙巳享太廟仍用鄭𤣥議立太祖與二昭二穆為五廟其有德者别為祧廟不毁記王制曰天子七廟三昭三穆與太祖之廟而七鄭元注云此周制七者太祖及文王武王之祧與親廟四决疑要注曰凡昭穆父南面故曰昭昭明也子北面故曰穆穆順也李涪曰昭本如字為漢諱昭改曰韶或曰晉文帝名昭故讀曰韶辛亥祀南郊壬子立王后元氏后魏文帝之女晉安公主也齊南安城主馮顯請降於周降戶江翻周柱國宇文貴使豐州刺史太原郭彦將兵迎之五代志永安郡黄岡縣齊曰南安又魏收志天平初置南安郡屬襄州後陷以地考之當在五代志之頴川郡葉縣界又五代志淅陽郡武當縣舊置武當郡及始平郡後改為齊興郡梁置興州後周改為豐州隋為均州將即亮翻遂據南安吐谷渾為宼於周攻凉鄯河三州武威郡凉州西平郡鄯州枹罕郡河州吐從暾入聲谷音浴鄯時戰翻秦州都督遣渭州刺史于翼赴援魏黄初三年始置都督諸州軍事又有都督中外諸軍其任尤重南北朝皆因之而軍行又有都督諸軍左右前後中軍大都督内而宿衞有正副都督散都督帥都督旅都督外而州郡有防城都督帳内都督都督之名雖同其位任懸絶矣此秦州都督盖都督河渭凉鄯諸州也後周九命之制都督八命其授柱國大將軍開府儀同者竝皆使持節大都督盖九命也翼不從僚屬咸以為言翼曰攻取之術非夷俗所長此宼之來不過抄掠邊牧掠而無獲勢將自走勞師而往必無所及翼揣之已了了明也抄楚交翻揣初委翻幸勿復言復扶又翻數日間至果如翼所策初梁世祖以始興郡為東衡州以歐陽頠為刺史乆之徙頠為郢州刺史蕭勃留頠不遣頠魚委翻世祖以王琳代勃為廣州刺史勃遣其將孫盪監廣州盡帥所部屯始興以避之見一百六十五卷梁元帝承聖三年將即亮翻下同監工銜翻帥讀曰率頠别據一城不往謁閉門自守勃怒遣兵襲之盡收其貨財馬仗尋赦之使復其所與之結盟江陵陷頠遂事勃二月庚午勃起兵於廣州遣頠及其將傅泰蕭孜為前軍孜勃之從子也從才用翻書考異曰陳南史周文育傳皆作子今從梁書帝紀南江州刺史余孝頃以兵會之孝頃據新吳盖就置南江州命為刺史書考異曰典畧作南康州刺史今從梁詔平西將軍周文育帥諸軍討之帥讀曰率癸酉周王朝日於東郊朝直遥翻下同戊寅祭大社周楚公趙貴衞公獨孤信故皆與太祖等夷宇文泰廟號太祖及晉公䕶專政宇文䕶自中山公進封晉公皆怏怏不服怏於兩翻貴謀殺護信止之開府儀同三司宇文盛告之丁亥貴入朝護執而殺之免信官此所謂主少國疑大臣未附之時也既殺趙貴護之威權成矣領軍將軍徐度出東關侵齊戊子至合肥燒齊船三千艘艘蘇遭翻歐陽頠等出南康頠屯豫章之苦竹灘傅泰據蹠口城蹠之石翻周文育傳作塶余孝頃遣其弟孝勱守郡城自出豫章據石頭水經注贑水逕豫章郡北水之西岸有石盤謂之石頭津歩之處也汪藻曰自豫章絶江而西有山屹然並江而出者石頭渚也阻江負城十里而近即殷羡投書處勱音邁巴山太守熊曇朗誘頠共襲髙州刺史黄灋􅉤又語灋􅉤約共破頠曇徒舍翻誘音酉語牛倨翻􅉤巨俱翻且曰事㨗與我馬仗遂出軍與頠俱進至灋􅉤城下曇朗陽敗走灋􅉤乘之頠失援而走曇朗取其馬仗歸於巴山周文育軍少船少詩沼翻余孝頃有船在上牢文育遣軍主焦僧度襲之盡取以歸仍於豫章立柵軍中食盡諸將欲退文育不許使人閒行遺周廸書閒古莧翻遺于季翻約為兄弟廸得書甚喜許饋以糧於是文育分遣老弱乘故船沿流俱下燒豫章柵偽若遁去者孝頃望之大喜不復設備文育由閒道兼行據芊韶復扶又翻閒古莧翻據姚思亷梁書芊韶在巴山界芊音千芊韶上流則歐陽頠蕭孜下流則傅泰余孝頃營文育據其中間築城饗士頠等大駭頠退入泥溪文育遣嚴威將軍周鐵虎等襲頠癸巳擒之文育盛陳兵甲與頠乘舟而宴廵蹠口城下使其將丁法洪攻泰擒之孜孝頃退走甲午周以于謹為太傅大宗伯侯莫陳崇為太保晉公䕶為大冢宰于謹侯莫陳崇既登公位宇文䕶若以序遷而為大冢宰實則周之元輔也柱國武川賀蘭祥為大司馬髙陽公達奚武為大司宼周人殺魏恭帝三月庚子周文育送歐陽頠傅泰於建康丞相霸先與頠有舊釋而厚待之霸先發身於嶺南故與頠有舊周晉公䕶以趙景公獨孤信名重不欲顯誅之己酉逼令自殺甲辰以司空王琳為湘郢二州刺史曲江侯勃在南康聞歐陽頠等敗軍中忷懼忷許拱翻甲寅德州刺史陳法武五代志日南郡梁置德州前衡州刺史譚世逺攻勃殺之夏四月己邜鑄四柱錢一當二十梁末有兩柱錢及鵝眼錢時人雜用其價同但兩柱重鵝眼輕至是鑄四柱錢一當細錢二十齊遣使請和使疏吏翻壬午周王謁成陵周太祖陵曰成陵乙酉還宫齊以太師斛律金為右丞相前大將軍可朱渾道元為太傅可朱渾道元前為車騎大將軍後齊置太師太傅太保是為三師擬古上公非勲德崇者不居次有大司馬大將軍是為二大並典司武事次置太尉司徒司空是為三公皆第一品其驃騎車騎二將軍加大者在開國郡公下開國郡公從一品開府儀同三司賀拔仁為太保尚書令常山王演為司空錄尚書事長廣王湛為尚書令右僕射楊愔為左僕射仍加開府儀同三司愔於今翻幷省尚書右僕射崔暹為左僕射上黨王渙錄尚書事自高歡居晉陽幷州有行臺尚書令僕等官及齊顯祖受魏禪遂以幷州行臺為并省位任亞於鄴省丁亥周王享太廟壬辰改四柱錢一當十丙申復閉細錢閉者閉絶不使行細錢民間私鑄者也時私錢細小交易以車載錢不復計數復扶又翻下復亦同故曲江侯勃主帥蘭敱襲殺譚世逺軍主夏侯明徹殺敱持勃首降帥所類翻敱五哀翻降戶江翻下同勃故記室李寳藏奉懐安侯任據廣州任亦蕭氏子封懐安侯何承天志鬱林郡有懐安縣蕭孜余孝頃猶據石頭為兩城各據其一多設船艦夾水而陳艦戶黯翻下同陳讀曰陣丞相霸先遣平南將軍侯安都助周文育擊之戊戍安都潜師夜燒其船艦文育帥水軍安都帥歩軍進攻之帥讀曰率蕭孜出降孝頃逃歸新吳文育等引兵還丞相霸先以歐陽頠聲著南土復以頠為衡州刺史衡上前有東字按五代志南海郡含洭縣梁置衡州始興縣梁置東衡州此時蓋命頠鎮含洭也使討嶺南未至其子紇已克始興頠至嶺南諸郡皆降遂克廣州嶺南悉平為歐陽頠父子世據嶺南張本周儀同三司齊軌謂御正中大夫薛善曰五代志御正中大夫屬大冢宰五命軍國之政當歸天子何得猶在權門善以告晉公䕶護殺之以善為中外府司馬中外府都督中外諸軍事府五月戊辰余孝頃遣使詣丞相府乞降使疏吏翻王琳既不就徵大治舟艦將攻陳霸先治直之翻六月戊寅霸先以開府儀同三司侯安都為西道都督周文育為南道都督將舟師二萬會武昌以擊之將即亮翻下同秋七月辛亥周王享太廟河南北大蝗齊主問魏郡丞崔叔瓚曰五代志齊制上郡丞六品中七品下八品瓚藏旱翻何故致蝗對曰五行志土功不時蝗蟲為災五行志言蟲蝗之災率歸之勞民動衆故叔瓚云然今外築長城内興三臺殆以此乎齊主怒使左右敺之敺烏口翻擢其髮以溷沃其頭擢拔也溷戶困翻不潔也曳足以出叔瓚季舒之兄也八月丁卯周人歸梁世祖之柩及諸將家屬千餘人於王琳柩音舊戊辰周王祭大社甲午進丞相霸先位太傅加黄鉞殊禮賛拜不名九月辛丑進丞相為相國總百揆封陳公備九錫陳國置百司周孝愍帝性剛果惡晉公護之專權惡烏路翻司會李植自太祖時為相府司錄參掌朝政周禮司會掌聽財用之會計以詔王及冢宰後周之制司會中大夫屬大冢宰五命柱國大將軍府長史司馬司錄正七命㑹古外翻相府司錄總錄相府之機務朝直遥翻軍司馬孫恒亦乆居權要唐六典周禮大司馬屬官有軍司馬下大夫蓋兵部郎中之任也後周依周置官軍司馬中大夫五命恒戶登翻及護執政植恒恐不見容乃與宫伯乙弗鳳賀拔提等共譖之於周王周禮宫伯掌王宫之士庶子凡在版者掌其政令行其秩叙作其徒役之事以時頒其衣裳掌其誅賞屬天官冢宰後周左宫伯中大夫五命植恒曰䕶自誅趙貴以来威權日盛謀臣宿將争往附之將即亮翻大小之政皆决於䕶以臣觀之將不守臣節願陛下早圖之王以為然鳳提曰以先王之明猶委植恒以朝政朝直遥翻今以事付二人何患不成且䕶常自比周公臣聞周公攝政七年書曰惟周公誕保文武受命惟七年陛下安能七年邑邑如此乎邑邑不得志之貌王愈信之數引武士於後園講習為執縛之勢此事何必講習耶宜其謀泄也數所角翻植等又引宫伯張光洛同謀光洛以告䕶䕶乃出植為梁州刺史恒為潼州刺史五代志漢川郡置梁州金山郡西魏置潼州隋開皇五年改曰綿州欲散其謀後王思植等毎欲召之䕶泣諫曰天下至親無過兄弟若兄弟尚相疑它人誰可信者太祖以陛下富於春秋屬臣後事屬之欲翻臣情兼家國以家則兄弟之親以國則君臣之義實願竭其股肱若陛下親覽萬機威加四海臣死之日猶生之年但恐除臣之後姦囘得志非唯不利陛下亦將傾覆社稷使臣無面目見太祖於九泉且臣既為天子之兄位至宰相尚復何求復扶又翻願陛下勿信讒臣之言踈棄骨肉王乃止不召而心猶疑之鳳等益懼宻謀滋甚刻日召羣公入醼醼伊甸翻合飲也因執䕶誅之張光洛又以告䕶䕶乃召柱國賀蘭祥周書祥傳曰其先與魏俱起有紇伏者為賀蘭莫何弗因以為氏領軍尉遲綱等謀之祥等勸䕶廢立時綱總領禁兵䕶遣綱入宫召鳳等議事及至以次執送䕶第因罷散宿衞兵王方悟獨在内殿令宫人執兵自守䕶遣賀蘭祥逼王遜位幽於舊第略陽公舊第也悉召公卿會議廢王為略陽公迎立岐州刺史寧都公毓五代志西城郡安康縣舊曰寧都公卿皆曰此公之家事敢不唯命是聽乃斬鳳等於門外宫門之外也孫恒亦伏誅時李植父柱國大將軍逺鎮𢎞農西魏之境東盡瀍洛以𢎞農為要地率用重將鎮之䕶召逺及植還朝召植於梁州朝直遥翻逺疑有變沈吟乆之沈持林翻乃曰大丈夫寜為忠鬼安可作叛臣邪遂就徵既至長安䕶以逺功名素重猶欲全之引與相見謂之曰公兒遂有異謀非止屠戮護身乃是傾危宗社叛臣賊子理宜同疾公可早為之所乃以植付逺逺素愛植植又口辯自陳初無此謀逺謂植信然詰朝將植謁䕶詰去吉翻將如字引也䕶謂植已死左右白植亦在門䕶大怒曰陽平公不信我李逺封陽平公乃召入仍命逺同坐令略陽公與植相質於逺前質證也夫君臣無獄略陽公雖廢猶舊君也烏有與舊臣相質之理宇文䕶不學無識如此求良死得乎植辭窮謂略陽曰略陽之下當有公字本為此謀欲安社稷利至尊耳今日至此何事云云逺聞之自投於牀曰若爾誠合萬死於是䕶乃害植并逼逺令自殺植弟叔詣叔謙叔讓亦死餘子以㓜得免初逺弟開府儀同三司穆知植非保家之主每勸逺除之逺不能用及逺臨刑泣謂穆曰吾不用汝言以至此穆當從坐以前言獲免除名為民及其子弟亦免官植弟浙州刺史基五代志浙陽郡西魏置浙州漢析縣地也尚義歸公主公主宇文泰之女也當從坐穆請以二子代基命護兩釋之後月餘䕶弑略陽公年十六黜王后元氏為尼癸亥寧都公自岐州至長安甲子即天王位諱毓小名統萬突安定公泰之長子也泰臨夏州帝生於統萬因以名之大赦冬十月戊辰進陳公爵為王辛未梁敬帝禪位於陳梁天監元年受禪四主五十六年而亡癸酉周魏武公李弼卒陳王使中書舍人劉師知引宣猛將軍沈恪勒兵入宫衞送梁主如别宫陳受禪後國之政事並由中書省有中書舍人五人分掌二十一局各當尚書諸曹並為上司總國内機要尚書唯聽受而已劉師知陳王所親任者也宣猛將軍班第九恪排闥見王叩頭謝曰恪身經事蕭氏侯景圍臺城恪為右軍將軍東土山主以拒戰功封東興縣侯今日不忍見此分受死耳分扶問翻决不奉命王嘉其意不復逼復扶又翻更以盪主王僧志代之盪主主驍銳跳盪之兵猶北齊之直盪都督也盪徒朗翻又吐浪翻乙亥王即皇帝位於南郊還宫大赦改元始改元為永定奉梁敬帝為江隂王梁太后為太妃皇后為妃以給事黄門侍郎蔡景厯為祕書監兼中書通事舍人是時政事皆由中書省置二十一局各當尚書諸曹總國機要尚書唯聽受而已史言蔡景厯委寄之重丙子上幸鍾山祠蔣帝廟庚辰上出佛牙於杜姥宅齊初僧統法獻於烏纒國得佛牙常在定林上寺梁天監末為攝山慶雲寺沙門慧興保藏慧興將終以屬弟慧志承聖末慧志宻送於帝至是乃出之設無遮大會帝親出闕前膜拜膜拜胡禮拜也膜莫湖翻辛巳追尊皇考文讃為景皇帝廟號太祖皇妣董氏曰安皇后追立前夫人錢氏為昭皇后帝先娶同郡錢仲方女早卒世子克為孝懐太子立夫人章氏為皇后章后烏程人也置刪定郎治律令刪定郎自晉宋以来多置之治直之翻乙酉周王祀圜丘丙戌祀方丘甲午祭太社戊子太祖神主祔太廟七廟始共用一太牢牛羊豕具為一太牢始祖薦首餘皆骨體侯安都至武昌王琳將樊猛棄城走將即亮翻下同周文育自豫章會之安都聞上受禪歎曰吾今兹必敗戰無名矣始者以王琳不應梁召而討之猶是挟天子以令諸侯今既受梁禪則安都之師為無名時兩將俱行不相統攝部下交争稍不相平軍至郢州琳將潘純陀於城中遙射官軍射而亦翻安都怒進軍圍之未克而王琳至弇口弇口弇水入江之口正對北岸大軍山安都乃釋郢州悉衆詣沌口沌柱兖翻留沈泰一軍守漢曲漢曲漢水之曲安都遇風不得進琳據東岸安都據西岸相持數日乃合戰安都等大敗異考曰典略云乙亥安都敗陳書云是月敗續按高祖以乙亥受禪安都聞之而歎豈同日乎今從陳書安都文育及裨將徐敬成周鐵虎程靈洗皆為琳所擒將即亮翻下同沈泰引軍奔歸琳引見諸將與語周鐵虎辭氣不屈琳殺鐵虎而囚安都等總以一長鏁繫之置琳所坐䑽下鏁蘇果翻䑽音榻大船也令所親宦者王子晉掌視之琳乃移湘州軍府就郢城又遣其將樊猛襲據江州十一月丙申上立兄子蒨為臨川王頊為始興王弟子曇朗已死而上未知遙立為南康王頊時在長安亦遙立也蒨倉甸翻頊呼玉翻曇徒含翻曇朗死見上卷上年庚子周王享太廟丁未祀圜丘十二月庚午謁成陵癸酉還宫譙淹帥水軍七千老弱三萬自蜀江東下譙淹自墊江東下為周所逼也言蜀江以别湘江帥讀曰率下皆帥同欲就王琳周使開府儀同三司賀若敦叱羅暉等擊之若人者翻叱羅虜複姓斬淹悉俘其衆是嵗詔給事黄門侍郎蕭乾招諭閩中時熊曇朗在豫章周廸在臨川留異在東陽陳寳應在晉安共相連結閩中豪帥往往立砦以自保帥所類翻砦柴夬翻依險立木壘石以自保守曰砦上患之使乾諭以禍福豪帥皆帥衆請降降戶江翻即以乾為建安太守按五代志閩州建安縣舊置建安郡南安縣舊曰晉安建安之地唐為建州晉安之地唐為泉州乾子範之子也蕭子範齊豫章王嶷之子初梁興州刺史席固以州降魏周太祖以固為豐州刺史五代志浙陽郡武當縣舊置武當郡及始平郡後改為齊興郡梁置興州後周改為豐州隋改為均州降戶江翻乆之固猶習梁法不遵北方制度周人宻欲代之而難其人乃以司憲中大夫令狐整權鎮豐州唐六典曰後周秋官置司憲中大夫二人掌丞司宼之法以左右刑罰盖比御史中丞之職也委以代固之略整廣布威恩傾身撫接數月之間化洽州府於是除整豐州刺史以固為湖州刺史五代志舂陵郡湖陽縣後魏置淮安郡及南襄州後改為南平州西魏改曰昇州後又改曰湖州整遷豐州於武當旬日之間城府周備遷者如歸固之去也其部曲多願留為整左右整諭以朝制弗許朝制謂周朝之法制朝直遙翻莫不流涕而去齊人於長城内築重城自庫洛枝東至鳴紇戍北史作庫洛枝塢紇戍重直龍翻凡四百餘里初齊有術士言亡髙者黑衣故髙祖每出不欲見沙門顯祖在晉陽問左右何物最黑對曰無過於漆帝以上黨王渙於兄弟第七使庫直都督破六韓伯昇之鄴徵渙渙至紫陌橋殺伯昇而逃浮河南度至濟州為人所執送鄴黑者宇文戎衣也齊顯祖乃因此以殺其弟何異秦以亡秦者胡而伐匈奴唐太宗以代唐者武氏而殺李君羡濟子禮翻帝之為太原公也與永安王浚皆見世宗見賢遍翻帝有時洟出鼻液曰洟浚責帝左右曰何不為二兄拭鼻顯祖於兄弟之次第二為干偽翻帝深銜之及即位浚為青州刺史聰明矜恕吏民悅之浚以帝嗜酒私謂親近曰二兄因酒敗德敗補邁翻朝臣無敢諫者朝直遙翻下同大敵未滅大敵謂周也吾甚以為憂欲乗驛至鄴面諫不知用吾不不讀曰否或密以白帝帝益銜之浚入朝從幸東山帝裸裎為樂裸裎露體也裸郎果翻䄇馳成翻樂音洛浚進諫曰此非人主所宜帝不悅浚又於屛處召楊愔屛必郢翻屛處隠蔽之處譏其不諫帝時不欲大臣與諸王交通愔懼奏之帝大怒曰小人由来難忍由来猶今人言從来遂罷酒還宫浚尋還州又上書切諫詔徵浚浚懼禍謝疾不至帝遣馳驛收浚老㓜泣送者數千人至鄴與上黨王渙皆盛以鐵籠盛時征翻寘於北城地牢飲食溲穢共在一所溲所鳩翻二年春正月王琳引兵下至湓城屯於白水浦帶甲十萬琳以北江州刺史魯悉達為鎮北將軍上亦以悉達為征西將軍各送鼓吹女樂吹尺瑞翻悉達兩受之遷延顧望皆不就上遣安西將軍沈泰襲之不克琳欲引軍東下而悉達制其中流琳遣使説誘終不從使疏吏翻説式芮翻下林説同誘音酉己亥琳遣記室宗虩求援於齊虩迄逆翻且請納梁永嘉王莊以主梁祀莊質齊見上卷梁敬帝紹泰元年衡州刺史周廸欲自據南川自南康至豫章之地謂之南川以南江所經言之也乃總召所部八郡守宰結盟齊言入赴廸所部八郡南康宜春安成廬陵臨川巴山豫章豫寜也姚思廉陳書作聲言入赴守式又翻上恐其為變厚慰撫之新吳洞主余孝頃遣沙門道林説琳曰周廸黄法􅉤皆依附金陵隂窺間隙􅉤巨俱翻間古莧翻大軍若下必為後患不如先定南川然後東下孝頃請席卷所部以從下吏卷讀曰捲琳乃遣輕車將軍樊猛平南將軍李孝欽平東將軍劉廣德將兵八千赴之使孝頃總督三將屯於臨川故郡臨川故郡周敷所屯也琳遣兵攻廸并以脅敷徵兵糧於廸以觀其所為以開府儀同三司侯瑱為司空衡州刺史歐陽頠為都督交廣等十九州諸軍事廣州刺史瑱他甸翻又音鎮頠魚委翻周以晉公護為太師辛丑上祀南郊大赦乙巳祀北郊辛亥周王耕籍田癸丑周立王后獨孤氏后獨孤信之女戊午上祀明堂二月壬申南豫州刺史沈泰奔齊泰進不能救侯安都之覆敗退不能制魯悉達之倔彊盖懼罪而北奔也考異曰北齊帝紀在八月今從陳帝紀齊北豫州刺史司馬消難以齊主昏虐滋甚隂為自全之計曲意撫循所部消難尚髙祖女難乃旦翻齊主尊其父歡廟號髙祖情好不睦公主訴之好呼到翻上黨王渙之亡也鄴中大擾疑其赴成臯齊北豫州治虎牢成臯之地也消難從弟子瑞為尚書左丞從才用翻與御史中丞畢義雲有隙義雲遣御史張子階詣北豫州采風聞先禁消難典籖家客等消難懼密令所親中兵參軍裴藻託以私假假居訝翻休假也間行入關請降於周間古莧翻下間道同降戶江翻三月甲午周遣柱國達奚武大將軍楊忠帥騎士五千迎消難帥讀曰率騎奇寄翻下同從間道馳入齊境五百里前後三遣使報消難皆不報使疏吏翻去虎牢三十里武疑有變欲還忠曰有進死無退生獨以千騎夜趣城下趣七喻翻城四面峭絶峭七笑翻但聞擊柝聲武親来麾數百騎西去忠勒餘騎不動俟門開而入馳遣召武齊鎮城伏敬逺勒甲士二千人據東城鎮城即防城大都督之任東城虎牢城之東偏也北史作東陴舉烽嚴警武憚之不欲保城乃多取財物以消難及其屬先歸忠以三千騎為殿殿丁練翻至洛南皆解鞍而臥齊衆來追至洛北忠謂將士曰但飽食今在死地賊必不敢度水已而果然乃徐引還武歎曰達奚武自謂天下健兒今日服矣周以消難為小司徒唐六典曰周之地官小司徒中大夫也後周依周官杜佑通典後周地官小司徒上大夫六命考異曰北齊帝紀四月消難叛今從周書典略丁酉齊主自晉陽還鄴紀考異曰北齊帝天保七年八月帝如晉陽不言其還八年四月帝在城東馬射敕京師婦女悉赴觀是在鄴也此月又言至自晉陽六月乙丑帝自晉陽北廵則又復在晉陽必有差互今不敢増損齊發兵援送梁永嘉王莊於江南冊拜王琳為梁丞相都督中外諸軍錄尚書事琳遣兄子叔寳率所部十州刺史子弟赴鄴琳奉莊即皇帝位立考異曰北齊帝紀十一月丁巳琳遣使請莊仍以江州内屬令莊居之十二月癸酉詔莊為梁主進居九派今從陳書及典略然陳書典略皆云立莊於郢州按琳時在湓城盖始居江州後遷郢州耳改元天啓追諡建安公淵明曰閔皇帝淵明廢見上卷梁敬帝紹泰元年卒見太平元年莊以琳為侍中大將軍中書監餘依齊朝之命朝直遙翻夏四月甲子上享太廟乙丑上使人害梁敬帝立梁武林侯諮之子季卿為江隂王己巳周以太師護為雍州牧後周雍州牧九命雍於用翻甲戌周王后獨孤氏殂辛巳齊大赦齊主以旱祈雨於西門豹祠不應毁之幷掘其冢戰國時魏以西門豹為鄴令鑿十二渠以利民故祠冢皆在鄴五月癸巳余孝頃等屯二萬軍於工塘連八城以逼周廸等下有衆字文意乃暢廸懼請和并送兵糧樊猛等欲受盟而還還從宣翻又如字孝頃貪其利不許樹柵圍之由是猛等與孝頃不協周以大司空侯莫陳崇為大宗伯癸丑齊廣陵南城主張顯和長史張僧那各帥所部來降帥讀曰率降戸江翻辛丑齊以尚書令長廣王湛錄尚書事驃騎大將軍平秦王歸彦為尚書左僕射驃匹妙翻騎奇寄翻甲辰以前左僕射楊愔為尚書令辛酉上幸大莊嚴寺捨身前車覆矣後車不知戒耳目習於事佛不知其非也壬戌羣臣表請還宫六月乙丑齊主北巡以太子殷監國監工銜翻因立大都督府與尚書省分理衆務仍開府置佐齊主特崇其選以趙郡王叡為侍中攝大都督府長史己巳詔司空侯瑱與領軍將軍徐度帥舟師為前軍以討王琳帥讀曰率齊主至祁連池祁連池即汾陽之天池北人謂天為祁連戊寅還晉陽秋戊戌上幸石頭送侯瑱等秋七月戊戌也髙州刺史黄法􅉤吳興太守沈恪寜州刺史周敷時盖即臨川故郡置寜州以敷為刺史合兵救周廸敷自臨川故郡斷江口斷音短分兵攻余孝頃别城樊猛等不救而没劉廣德乗流先下故獲全孝頃等皆棄舟引兵歩走廸追擊盡擒之送孝頃及李孝欽於建康歸樊猛於王琳甲辰上遣吏部尚書謝哲往諭王琳哲朏之孫也謝朏莊之子厯仕宋齊梁朏敷尾翻八月甲子周大赦乙丑齊主還鄴辛未詔臨川王蒨西討蒨倉甸翻以舟師五萬發建康上幸冶城寺送之甲戌齊主如晉陽王琳在白水浦周文育侯安都徐敬成許王子晉以厚賂子晉乃偽以小船依䑽而釣䑽音榻夜載之上岸入深草中歩投陳軍還建康自劾上引見並宥之上時掌翻劾戶槩翻又戶得翻見賢遍翻戊寅復其本官文育安都敗軍而不誅遽復其官何也二人當時名將誅之則無以為用故也謝哲返命王琳請還湘州詔追衆軍還癸未衆軍至自大雷九月甲申周封少師元羅為韓國公以紹魏後江陵之陷元羅還魏丁未周王如同州冬十月辛酉還長安余孝頃之弟孝勱及子公颺猶據舊柵不下新吳舊柵也勱音邁颺余章翻庚午詔開府儀同三司周文育都督衆軍出豫章討之齊三臺成更名銅爵曰金鳳金虎曰聖應氷井曰崇光魏武築三臺於鄴城西北皆因城為之基中曰銅爵臺高十丈石虎更増二丈南曰金虎臺北曰氷井臺皆高八丈更工衡翻十一月甲午齊主至鄴大赦齊主遊三臺戱以槊刺都督尉子輝應手而斃槊色角翻刺七亦翻考異曰北史作子耀今從北齊書典略常山王演以帝沈湎憂憤形於顏色帝覺之曰但令汝在我何為不縱樂沈持林翻樂音洛演唯涕泣拜伏竟無所言帝亦大悲抵盃於地曰汝似嫌我如是自今敢進酒者斬之因取所御盃盡壊棄壊音怪未幾沈湎益甚或於諸貴戚家角力批拉幾居豈翻沈持林翻批自結翻又偏迷翻手擊也拉盧合翻不限貴賤唯演至則内外肅然演又宻撰事條將諫其友王晞以為不可諸王宫寮有師有反演不從因間極言間古莧翻遂逢大怒演性頗嚴尚書郎中剖斷有失斷丁亂翻輒加捶楚令史姦慝即考竟演為尚書令故然捶止橤翻帝乃立演於前以刀鐶擬脇以刀鐶擬演脇示將築殺之召被演罰者被皮義翻臨以白刃求演之短咸無所陳乃釋之晞昕之弟也王昕見下昕許斤翻帝疑演假辭於晞以諫欲殺之王私謂晞曰王即演也通鑑因齊史修治有未純者耳王博士明日當作一條事為欲相活為于偽翻亦圖自全宜深體勿怪乃於衆中杖晞二十帝尋發怒聞晞得杖以故不殺以其得杖之故謂非敎演為之遂不殺髠鞭配甲坊居三年演又因諫爭大被敺撻爭讀曰諍被皮義翻敺烏口翻之考異曰北史孝昭紀云文宣賜帝魏時宫人醒而忘謂帝擅取遂令刀鐶亂築因此致困今從北史王晞傳閉口不食太后日夜涕泣帝不知所為曰儻小兒死奈我老母何於是數往問演疾謂曰努力彊食數所角翻彊其兩翻下强坐同當以王晞還汝乃釋晞令詣演演抱晞曰吾氣息惙然惙丑捩翻類篇曰困劣也恐不復相見復扶又翻晞流涕曰天道神明豈令殿下遂斃此舍言天道福善禍淫不應使演遂死於此至尊親為人兄尊為人主安可與計言難與計是非也殿下不食太后亦不食殿下縱不自惜獨不念太后乎言未卒演强坐而飯卒子恤翻飯扶晩翻晞由是免徒配甲坊徒刑也由此得免還為王友及演錄尚書事除官者皆詣演謝去必辭晞言於演曰受爵天朝拜恩私第晉羊祜之言朝直遙翻自古以為不可宜一切約絶演從之乆之演從容謂晞曰主上起居不恒卿宜耳目所具吾豈可以前逢一怒遂爾結舌卿宜為譔諫草從千容翻恒戶登翻為于偽翻吾當伺便極諫伺相吏翻晞遂條十餘事以呈因謂演曰今朝廷所恃者惟殿下乃欲學匹夫耿介輕一朝之命狂藥令人不自覺狂藥謂酒也刀箭豈復識親踈復扶又翻一旦禍出理外將奈殿下家業何奈皇太后何演欷歔不自勝欷音希又許氣翻歔音虛勝音升曰乃至是乎明日見晞曰吾長夜乆思今遂息意即命火對晞焚之焚諫草也後復承間苦諫帝使力士反接復扶又翻間古莧翻反接兩手向後也㧞白刄注頸罵曰小子何知是誰教汝演曰天下噤口非臣誰敢有言帝趣杖亂捶之數十噤巨禁翻趣讀曰促會醉臥得解帝䙝黷之遊徧于宗戚所往留連盤樂忘返謂之留連唯至常山第多無適而去適歡極也尚書左僕射崔暹屢諫演謂暹曰今太后不敢言吾兄弟杜口僕射獨能犯顔内外深相感愧常山齊之賢王文宣淫􅒬規正為多齊之史臣因其嗣祚亦多溢美觀者能於辭令之間詳其溢美者則幾矣太子殷自㓜温裕開朗禮士好學好呼到翻關覽時政甚有美名帝常嫌太子得漢家性質不似我欲廢之鮮卑謂中國人為漢帝登金鳳臺召太子使手刄囚太子惻然有難色再三不斷其首帝大怒親以馬鞭撞之斷丁管翻撞直江翻太子由是氣悸語吃悸其季翻吃居乞翻言蹇也精神昏擾帝因酣宴屢云太子性懦社稷事重終當傳位常山太子少傅魏收謂楊愔曰太子國之根本不可動搖至尊三爵之後每言傳位常山令臣下疑二若其實也當决行之此言非所以為戲恐徒使國家不安愔以收言白帝帝乃止帝既殘忍有司訊囚莫不嚴酷或燒犁耳使立其上或燒車釭釭姑紅翻車轂中鐵也使以臂貫之既不勝苦皆至誣伏勝音升唯三公郎中武强蘇瓊三公郎自魏晉以来有之五代志後齊尚書列曹三公郎中屬殿中尚書掌五時讀時令諸曹囚帳斷罪赦日建金雞等事劉昫曰武强漢武隧縣屬河間國晉改曰武彊屬安平國後魏屬廣宗郡又置武邑郡五代志曰齊廢郡為武彊縣至隋屬信都郡厯職中外所至皆以寛平為治治直吏翻時趙州及清河屢有人告謀反者前後皆付瓊推撿事多申雪尚書崔昻謂瓊曰若欲立功名當更思餘理數雪反逆數所角翻身命何輕瓊正色曰所雪者寃枉耳不縱反逆也昻大慙帝怒臨漳令稽曄晉避愍帝諱改鄴為臨漳尋没於石勒復曰鄴東魏天平初分鄴併内黄斤邱肥鄉置臨漳縣舍人李文思以賜臣下為奴中書侍郎彭城鄭頥私誘祠部尚書王昕曰自古無朝士為奴者昕曰箕子為之奴此論語孔子之言鄭頥誘王昕使言而陷之邦無道危行言孫聖人包周身之防也如此誘音酉朝直遙翻下同頥以白帝曰王元景比陛下於紂王昕字元景以字行帝銜之頃之帝與朝臣酣飲昕稱疾不至帝遣騎執之騎奇寄翻見方搖膝吟咏遂斬於殿前投尸漳水齊主北築長城南助蕭莊士馬死者以數十萬計重以修築臺殿重直用翻賜與無節府藏之積不足以供藏徂浪翻乃減百官之禄撤軍人常廩併省州郡縣鎮戍之職以莭費用焉十二月庚寅齊以可朱渾道元為太師尉粲為太尉冀州刺史段韶為司空常山王演為大司馬長廣王湛為司徒壬午周大赦齊主如北城因視永安簡平王浚上黨剛肅王渙於地牢帝臨穴謳歌令浚等和之浚等惶怖且悲不覺聲顫和胡卧翻怖普布翻顫之膳翻帝愴然為之下泣為于偽翻泣淚也將赦之長廣王湛素與浚不睦進曰猛虎安可出穴帝黙然浚等聞之呼湛小字曰歩落稽皇天見汝帝亦以浚與渙皆有雄略恐為後害乃自刺渙又使壯士劉桃枝就籠亂刺刺七亦翻槊毎下槊色角翻浚渙輒以手拉折之號哭呼天史言浚渙之多力折而設翻號戶髙翻於是薪火亂投燒殺之填以土石後出之皮髮皆盡尸色如炭逺近為之痛憤為于偽翻帝以儀同三司劉郁㨗殺浚以浚妃陸氏賜之馮文洛殺渙以渙妃李氏賜之為李妃撻馮文洛張本二人皆帝家舊奴也陸氏尋以無寵於浚得免髙凉太守馮寳卒海隅擾亂寳妻洗氏懐集部落數州晏然其子僕生九年是嵗遣僕帥諸酋長入朝洗息典翻帥讀曰率酋慈秋翻長知兩翻詔以僕為陽春太守五代志髙凉郡陽春縣梁置陽春郡後梁主遣其大將軍王操將兵略取王琳之長沙武陵南平等郡琳兵東下故後梁得以乗虛取之操將即亮翻三年春正月己酉周太師䕶上表歸政上時掌翻周王始親萬機軍旅之事䕶猶總之初改都督州軍事為總管諸州總管自此始王琳召桂州刺史淳于量五代志始安郡梁置桂州今為静江府量雖與琳合而濳通於陳二月辛酉以量為開府儀同三司壬午侯瑱引兵焚齊舟艦於合肥艦戶黯翻丙戌齊主於甘露寺禪居深觀據齊紀甘露寺在遼陽此鄙語所謂獼猴坐禪也唯軍國大事乃以聞尚書左僕射崔暹卒齊主幸其第哭之謂其妻李氏曰頗思暹乎對曰思之帝曰然則自往省之省悉景翻因手斬其妻擲首牆外齊斛律光將騎一萬將即亮翻下同騎奇寄翻擊周開府儀同三司曹囘公斬之柏谷城主薛禹生弃城走遂取文侯鎮立戍置柵而還還從宣翻又如字三月戊戌齊以髙德政為尚書右僕射吐谷渾宼周邉吐從暾入聲谷音浴庚戌周遣大司馬賀蘭祥擊之丙辰齊主至鄴梁永嘉王莊至郢州遣使入貢於齊使疏吏翻王琳遣其將雷文䇿襲後梁監利太守蔡大有殺之沈約曰監利縣疑是吳所立晉屬南郡宋屬巴陵郡後梁置監利郡今監利在江陵府東南百八十里齊主之為魏相也相息亮翻膠州刺史定陽文肅侯杜弼為長史五代志髙密郡舊置膠州唐武德五年改曰密州五代志文城郡吉昌縣後魏曰定陽帝將受禪弼諫止之見一百六十三卷簡文帝大寳元年帝問治國當用何人治直之翻對曰鮮卑車馬客會須用中國人帝以為譏已銜之髙德政用事弼不為之下嘗於衆前面折德政德政數言其短於帝弼恃舊不自疑折之舌翻數所角翻下同高德政讒杜弼而不知楊愔之忌已杜弼恃舊而不疑德政之讒已昏昏於利欲之場祗思害人而不知其身之受害者多矣夏帝因飲酒積其愆失遣使就州斬之使疏吏翻既而悔之驛追不及閏四月戊子周命有司更定新厯更工衡翻丁酉遣鎮北將軍徐度將兵城南皖口南皖口皖水入江之口也祝穆曰皖水自霍山縣流入經懐寧縣北二里又東南流三百四十里入大江吳地志皖口今舒州之山口鎮將即亮翻皖戶板翻齊髙德政與楊愔同為相愔常忌之髙德政事齊主於初濳禪代之際又德政勸成之權利所集故為楊愔所忌齊主酣飲德政數彊諫數所角翻齊主不悦謂左右曰髙德政恒以精神凌逼人恒戶登翻德政懼稱疾欲自退帝謂楊愔曰我大憂德政病對曰陛下若用為冀州刺史病當自差差叱駕翻病差猶言病瘳也帝從之德政見除書即起帝大怒召德政謂曰聞爾病我為爾針醫家按穴用針可以愈疾故云然為于偽翻親以小刀刺之血流霑地又使曵下斬去其足刺七亦翻去羌吕翻劉桃枝執刀不敢下帝責桃枝曰爾頭即墮地桃枝乃斬其足之三指帝怒不解囚德政於門下囚於門下省其夜以氊輿送還家明旦德政妻出珍寳滿四牀欲以寄人帝奄至其宅見之怒曰我御府猶無是物詰其所從得皆諸元賂之遂曵出斬之妻出拜又斬之高德政之禍猶宋之顏竣也詰去吉翻并其子伯堅以司州牧彭城王浟為司徒侍中髙陽王湜為尚書右僕射乙巳以浟兼太尉浟夷周翻湜常職翻齊主封子紹亷為長安王辛亥周以侯莫陳崇為大司徒達奚武為大宗伯武陽公豆盧寧為大司宼五代志犍為郡犍為縣後周曰武陽令狐德棻曰寜之先本慕容氏前燕之枝庶也歸魏賜姓豆盧氏柱國輔城公邕為大司空輔城郡名在汝州郟城縣乙卯周詔有司無得糾赦前事唯廐庫倉廩與海内所共若有侵盗雖經赦宥免其罪徵僃如法備償也今人猶言填備周賀蘭祥與吐谷渾戰破之㧞其洮陽洪和二城以其地為洮州李延夀曰賀蘭之先與魏俱起有乞伏為賀蘭莫何弗因以為氏劉昫唐志洮州臨潭縣本叶谷渾之洪和城後周攻得之置美相縣唐為臨潭縣洮州治焉後移治洮陽城仍於舊洪和城置美相縣天寳中廢美相併入臨潭洮土刀翻五月丙辰朔日有食之齊太史奏今年當除舊布新齊主問於特進彭城公元韶曰漢光武何故中興對曰為誅諸劉不盡為於偽翻於是齊主悉殺諸元以厭之厭於協翻癸未誅始平公元世哲等二十五家囚韶等十九家韶幽於地牢絶食㗖衣袖而死㗖徒敢翻又徒濫翻周文育周廸黄法􅉤共討余公颺公颺孝頃子也颺音揚豫章太守熊曇朗引兵㑹之衆且萬人文育軍於金口自豫章西南入象牙江至金溪口公颺詐降謀執文育文育覺之囚送建康降戶江翻文育進屯三陂王琳遣其將曹慶帥二千人救余孝勱將即亮翻下同帥讀曰率下自帥達帥同慶分遣主帥常衆愛與文育相拒帥所類翻自帥其衆攻周迪及安南將軍吳明徹迪等敗文育退據金口熊曇朗因其失利謀殺文育以應衆愛監軍孫白象聞其謀勸文育先之監工銜翻先悉薦翻文育不從時周迪棄船走不知所在乙酉文育得迪書自齎以示曇朗曇朗殺之於坐而併其衆坐徂卧翻因據新淦城新淦縣自漢至蕭齊屬豫章郡五代志屬廬陵郡唐屬吉州淦音紺又音甘曇朗將兵萬人襲周敷敷擊破之曇朗單騎奔巴山騎奇寄翻魯悉達部將梅天養等引齊軍入城魯悉達據新蔡城悉達帥麾下數千人濟江自歸拜平南將軍北江州刺史五代志宣城郡南陵縣陳置北江州六月戊子周以霖雨詔羣臣上封事極諫左光禄大夫猗氏樂遜上言四事猗氏縣漢以来屬河東郡古郇瑕氏之地後以猗頓居之以盬鹽致富遂改為猗氏上時掌翻其一以為比來守令代期既促比毘至翻守式又翻責其成效專務威猛今關東之民淪䧟塗炭若不布政優優詩商頌之辭毛萇曰優優和也聞諸境外聞音問何以使彼勞民歸就樂土樂音洛其二以為頃者魏都洛陽一時殷盛貴勢之家競為侈靡終使禍亂交興天下喪敗喪息淚翻比來朝貴器服稍華朝直遙翻百工造作務盡奇巧臣誠恐物逐好移有損政俗好呼到翻其三以為選曹補擬宜與衆共之今州郡選置猶集鄉閭况天下銓衡不取物望既非機事何足可密以此觀之選曹補擬皆宻奏於上盖自晉山濤啟事始也其選置之日宜令衆心明白然後呈奏其四以為髙洋據有山東未易猝制譬猶碁刼相持爭行先後奕碁有刼彼此爭行以相持以先後着决一枰之勝負易以豉翻若一行不當當丁浪翻或成彼利誠應捨小營大先保封域不宜貪利邉陲輕為舉動周處士韋夐處昌吕翻夐休正翻孝寛之兄也志尚夷簡魏周之際十徵不屈周太祖甚重之不奪其志世宗禮敬尤厚號曰逍遙公晉公䕶延之至第訪以政事䕶盛脩第舍夐仰視堂歎曰酣酒嗜音峻宇彫牆有一於此未或不亡夏書五子之歌之辭䕶不悦驃騎大將軍開府儀同三司宼儁㓂儁所居官後周之九命也讚之孫也㓂讚自秦歸魏見一百一十八卷晉安帝義熈十四年少有學行家人常賣物多得絹五匹儁於後知之曰得財失行少詩照翻行下孟翻吾所不取訪主還之敦睦宗族與同豐約敎訓子孫必先禮義先悉薦翻自大統中稱老疾不朝謁朝直遙翻下同世宗虛心欲見之儁不得已入見入見賢遍翻王引之同席而坐問以魏朝舊事載以御輿令於王前乘之以出顧謂左右曰如此之事唯積善者可以致之史言周王禮賢周文育之討余孝勱也帝令南豫州刺史侯安都繼之文育死安都還遇王琳將周炅周協南歸王琳使周炅助曹慶攻周迪自南川歸也將即亮翻炅古迥翻與戰擒之孝勱弟孝猷帥所部四千家詣安都降帥讀曰率降戶江翻安都進軍至左里擊曹慶常衆愛破之衆愛奔廬山庚寅廬山民斬之傳首詔臨川王蒨於南皖口置城蒨倉甸翻使東徐州刺史吳興錢道戢守之戢則立翻丁酉上不豫丙午殂年五十七上臨戎制勝英謀獨運而為政務崇寛簡非軍旅急務不輕調發性儉素常膳不過數品私宴用瓦器蚌盤調徒釣翻蚌盤者髹器以蚌為飾今謂之螺鈿蚌歩項翻殽核充事而已後宫無金翠之飾不設女樂時皇子昌在長安梁元帝承聖元年徵昌為領直江陵之䧟没於長安内無嫡嗣外有强敵宿將皆將兵在外朝無重臣將即亮翻朝直遙翻下同唯中領軍杜稜典宿衞兵在建康章皇后召稜及中書侍郎蔡景厯入禁中定議秘不發喪急召臨川王蒨於南皖景厯親與宦者宫人宻營歛具歛力贍翻時天暑須治梓宫治直之翻恐斧斤之聲聞於外乃以蠟為袐器蠟蜜滓也漢宫有東園祕器聞音問文書詔敕依舊宣行侯安都軍還適至南皖與臨川王俱還朝甲寅王至建康入居中書省安都與羣臣定議奉王嗣位王謙讓不敢當皇后以昌故未肯下令羣臣猶豫不能决安都曰今四方未定何暇及逺臨川王有大功於天下武帝既殺王僧辯使蒨平杜龕張彪等以定東土故云有大功須共立之今日之事後應者斬即按劒上殿白皇后出璽又手解蒨髮推就喪次上時掌翻璽斯氏翻推吐雷翻為侯安都恃定䇿之功以殺其身張本遷殯大行於太極西階皇后乃下令以蒨纂承大統是日即皇帝位大赦秋七月丙辰尊皇后為皇太后辛酉以侯瑱為太尉侯安都為司空齊顯祖將如晉陽乃盡誅諸元或祖父為王或身嘗貴顯皆斬於東市其嬰兒投於空中承之以矟稍所角翻與槊同前後死者凡七百二十一人悉棄尸漳水剖魚者往往得人爪甲鄴下為之乆不食魚為於偽翻使元黄頭與諸囚自金鳳臺各乘紙鴟以飛黄頭獨能至紫陌乃墮仍付御史中丞畢義雲餓殺之齊主每令死囚以席為翅從臺上飛下免其罪戮今欲夷諸元黄頭雖免殊死猶餓殺之唯開府儀同三司元蠻祠部郎中元文遙等數家獲免曹魏置祠部郎五代志齊尚書曹祠部郎掌祠祀醫藥贈賜等事蠻繼之子常山王演之妃父江陽王繼元又之父後徙封安定王文遙遵之五世孫也常山公遵佐道武帝定中原定襄令元景安此後漢新興郡之定襄也在隋秀容縣界䖍之𤣥孫也陳留王䖍亦佐道武帝與燕主垂戰敗而死欲請改姓髙氏其從兄景皓曰從才用翻安有棄其本宗而從人之姓者乎丈夫寜可玉碎何能瓦全景安以其言白帝帝收景皓誅之賜景安姓髙氏八月甲申葬武皇帝於萬安陵廟號髙祖戊戌齊封皇子紹義為廣陽王以尚書右僕射河間王孝琬為左僕射都官尚書崔昻為右僕射周御正中大夫崔猷建議以為聖人沿革因時制宜今天子稱王不足以威天下請遵秦漢舊制稱皇帝建年號乙亥周王始稱皇帝追尊文王曰文皇帝改元武成癸卯齊詔民間或有父祖冐姓元氏或假托攜養者不問世數逺近悉聽改復本姓初髙祖追諡兄道譚為始興昭烈王以其次子頊襲封及世祖即位頊在長安未還頊與昌俱在長安上以本宗乏饗始興王道譚二子上入纂皇緒而頊留長安故本宗無主祭者世祖即上廟號戊戌詔徙封頊為安成王皇子伯茂為始興王以奉道譚祀初周太祖平蜀見一百六十五卷梁元帝承聖二年以其形勝之地不欲使宿將居之將即亮翻問諸子誰可往者皆不對少子安成公憲請行少詩照翻太祖以其㓜不許壬子周人以憲為益州總管時年十六善於撫綏留心政術蜀人悦之九月乙卯以大將軍天水公廣為梁州總管廣導之子也宇文導周太祖之兄子辛酉立皇子伯宗為太子己巳齊主如晉陽辛未周主封其弟輔城公邕為魯公安成公憲為齊公純為陳公盛為越公達為代公通為冀公逌為滕公逌音由乙亥立太子母吳興沈妃為皇后周少保懷寜莊公蔡祐卒五代志蜀郡成都縣舊制懐寜等四郡齊顯祖嗜酒成疾不復能食復扶又翻自知不能乆謂李后曰人生必有死何足致惜但憐正道尚㓜人將奪之耳齊太子殷字正道又謂常山王演曰奪則任汝慎勿殺也尚書令開封王楊愔領軍大將軍平秦王歸彥侍中廣漢燕子獻五代志滎陽郡浚儀縣舊置開封郡扶風郡雍縣後魏置平秦郡蜀郡雒縣舊曰廣漢黄門侍郎鄭頥皆受遺詔輔政冬十月甲午殂年三十一癸卯發喪羣臣號哭無下泣者以其殘暴故哭而不哀號戶刀翻唯楊愔涕泗嗚咽太子殷即位殷字正道小字道人文宣帝嫡子也大赦庚戌尊皇太后為太皇太后皇后為皇太后詔諸土木金鐵雜作一切停罷王琳聞髙祖殂乃以少府卿吳郡孫瑒為郢州刺史總留任瑒雄杏翻又音暢奉梁永嘉王莊出屯濡須口齊揚州道行臺慕容儼帥衆臨江為之聲援帥讀曰率十一月乙卯琳㓂大雷五代志同安郡望江縣陳置大雷郡詔侯瑱侯安都及儀同徐度將兵禦之將即亮翻安州刺史吳明徹夜襲湓城五代志寜越郡梁置安州隋開皇十八年改曰欽州琳遣巴陵太守任忠擊明徹大破之明徹僅以身免琳因引兵東下齊以右丞相斛律金為左丞相常山王演為太傅長廣王湛為太尉段韶為司徒平原王淹為司空髙陽王湜為尚書左僕射河間王孝琬為司州牧侍中燕子獻為右僕射辛未齊顯祖之喪至鄴自晉陽至鄴十二月戊戌齊徙上黨王紹仁為漁陽王廣陽王紹義為范陽王長樂王紹廣為隴西王樂音洛資治通鑑卷一百六十七
