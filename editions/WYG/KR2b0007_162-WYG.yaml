body:
  text: 資治通鑑卷一百六十二宋司馬光撰胡三省音註梁紀十八屠維大荒落凡一年髙祖武皇帝十八太清三年春正月丁巳朔栁仲禮自新亭徙營大桁㑹大霧韋粲軍迷失道比及青塘比必利翻夜已過半立柵未合侯景望見之亟帥鋭卒攻粲過工禾翻帥讀曰率粲使軍主鄭逸逆擊之命劉叔𦙍以舟師截其後截其渡淮之路叔𦙍畏懦不敢進逸遂敗景乗勝入粲營左右牽粲避賊粲不動叱子弟力戰遂與子尼及三弟助警搆從弟昻皆戰死從才用翻親戚死者數百人史言韋粲忠勇仲禮方食投箸被甲與其麾下百騎馳往救之箸竹助翻被皮義翻騎竒寄翻與景戰於青塘大破之斬首數百級沈淮水死者千餘人沈持林翻仲禮矟将及景矟色角翻而賊将支伯仁自後斫仲禮中肩馬陷于淖支伯仁當作支化仁将即亮翻下同中竹仲翻淖奴教翻泥也賊聚矟刺之騎将郭山石救之得免仲禮被重瘡㑹稽人恵臶吮瘡斷血刺七亦翻被皮義翻臶徂悶翻吮徂兖翻故得不死自是景不敢復濟南㟁復扶又翻下不復綸復同仲禮亦氣索索蘇各翻不復言戰矣邵陵王綸復收散卒邵陵王綸敗走見上卷上年與東揚州刺史臨城公大連新淦公大成等自東道並至淦古暗翻庚申列營于桁南亦推栁仲禮為大都督大連大臨之弟也朝野以侯景之禍共尤朱异朝直遥翻异慙憤發疾庚申卒作考異曰梁帝紀乙丑今從太清紀典略故事尚書官不以為贈上痛惜异特贈尚書右僕射甲子湘東世子方等及王僧辯軍至紀考異曰梁帝作戊辰今從太清紀戊辰封山矦正表以北徐州降東魏東魏徐州刺史髙歸彦遣兵赴之歸彦歡之族弟也己巳太子遷居永福省永福省在禁中自宋以來太子居之取其福國于有永也髙州刺史李遷仕五代志髙凉郡梁置髙州天門太守樊文皎将援兵萬餘人至城下臺城與援軍信命久絶有羊車兒獻策作紙䲭紙䲭即紙鳶也今俗謂之紙鷂䲭丑之翻繫以長繩寫勑於内放以從風冀達衆軍題云得䲭送援軍賞銀百兩太子自出太極殿前乗西北風縱之賊怪之以為厭勝射而下之厭於恊翻射而亦翻援軍募人能入城送啟者鄱陽世子嗣左右李朗請先受鞭詐為得罪叛投賊因得入城城中方知援兵四集舉城鼓譟上以朗為直閤将軍賜金遣之朗縁鍾山之後宵行晝伏積日乃達癸未鄱陽世子嗣永安侯確荘鐵羊鴉仁栁敬禮李遷仕樊文皎将兵度淮攻東府前柵焚之侯景退衆軍營於青溪之東遷仕文皎帥鋭卒五千獨進帥讀曰率深入所向摧靡至菰首橋東橋在青溪上菰音孤菰首今人謂之茭白景将宋子仙伏兵擊之将即亮翻下同文皎戰死遷仕遁還敬禮仲禮之弟也仲禮神情傲狠陵蔑諸将邵陵王綸毎日執鞭至門亦移時弗見凡部将見諸帥執鞭以為禮狠户墾翻由是與綸及臨城公大連深相仇怨大連又與永安侯確有隙永安本漢彘縣順帝陽嘉元年更名永安魏晉屬平陽郡江左僑立南河東郡併僑立永安縣屬荆州注又見前諸軍互相猜阻莫有戰心援軍初至建康士民扶老擕幼以候之纔過淮即縱兵剽掠㔄匹妙翻由是士民失望賊中有謀應官軍者聞之亦止史言臺城覆陷之由王顯貴以夀陽降東魏侯景命王顯貴守夀陽見上卷上年臨賀王記室吳郡顧野王起兵討矦景二月己丑引兵来至初臺城之閉也公卿以食為念男女貴賤並出負米得四十萬斛收諸府藏錢帛五十萬億並聚徳陽堂藏徂浪翻而不備薪芻魚鹽至是壊尚書省為薪撒薦剉以飼馬薦盡又食以飯薦以藁秸為之所以藉寢壊音怪飼食並詳吏翻軍士無膎膎户皆翻脯也又肉食肴或煑鎧熏䑕捕雀而食之鎧可亥翻御甘露厨有乾苔味酸鹹分給戰士釋氏謂營膳之所曰甘露厨乾音干苔生于海其形如髪春二三月間海人採取之成片納土窖中出而曬之令乾南人多食之軍人屠馬於殿省間雜以人肉食者必病侯景衆亦飢抄掠無所獲抄楚交翻東城有米可支一年東城即東府城援軍斷其路㫁音短又聞荆州兵将至景甚患之王偉曰今臺城不可卒拔援兵日盛吾軍乏食若偽求和以緩其勢東城之米足支一年因求和之際運米入石頭援軍必不得動然後休士息馬繕脩器械伺其懈怠擊之一舉可取也伺相吏翻景從之遣其将任約于子悦至城下拜表求和乞復先鎮将即亮翻任音壬先鎮謂夀陽時已降齊矣太子以城中窮困白上請許之上怒曰和不如死太子固請曰侯景圍逼已久援軍相仗不戰仗除兩翻宜且許其和更為後圖上遲回久之乃曰汝自圖之勿令取笑千載遂報許之太子綱疑范桃棒之來降而信侯景之請和何其昧也載子亥翻景乞割江右四州之地江右四州南豫西豫合州光州并求宣城王大器出送然後濟江中領軍傅岐固争曰豈有賊舉兵圍宫闕而更與之和乎此特欲却援軍耳戎狄獸心必不可信且宣城嫡嗣之重國命所繫豈可為質梁之智士唯傅岐一人而已質音致下同上乃以大器之弟石城公大欵為侍中出質於景又勑諸軍不得復進復扶又翻下詔曰善兵不戰止戈為武可以景為大丞相都督江西四州諸軍事豫州牧河南王如故己亥設壇於西華門外遣僕射王克上甲侯韶吏部郎蕭瑳韶帝室也封上甲侯宋白曰江州徳安縣本蒲塘塲晉建興初始以為郡領尋陽上甲柴桑九江等縣義熈中以尋陽入柴桑上甲入彭凙瑳七何翻又七可翻與于子悦任約王偉登壇共盟太子詹事栁津出西華門景出柵門遥相對更殺牲歃血為盟更工衡翻歃色甲翻既盟而景長圍不解専脩鎧仗鎧可亥翻託云無船不得即發又云恐南軍見躡援軍時皆屯秦淮南岸故謂之南軍遣石城公還臺求宣城王出送邀求稍廣了無去志太子知其詐言猶羈縻不絶韶懿之孫也庚子前南兖州刺史南康王㑹理前青冀二州刺史湘潭侯退西昌侯世子彧衆合三萬至于馬卬洲馬卬洲盖即今王家沙老鸛觜一帶至考異曰梁帝紀作丁未今從太清紀典略典略云于琅邪今從太清紀梁帝紀前按晉置琅邪郡於江乗蒲洲上即所謂今王家沙也景慮其自白下而上上時掌翻啓云請北軍聚還南岸以地望言之馬卬洲在臺城之北故云北軍南岸即謂秦淮南岸不爾妨臣濟江太子即勒㑹理自白下城移軍江潭苑亭考異曰梁帝紀作蘭苑今從太清紀典略退恢之子也辛丑以邵陵王綸為司空鄱陽王範為征北将軍栁仲禮為侍中尚書右僕射景以于子悦任約傅士悊皆為儀同三司悊與哲同夏侯譒為豫州刺史諸補過翻董紹先為東徐州刺史徐思玉為北徐州刺史王偉為散騎常侍散悉覽翻騎竒寄翻上以偉為侍中乙夘景又啟曰適有西岸信至大江西岸即歴陽髙澄已得夀陽鍾離臣今無所投足求借廣陵并譙州俟得夀陽即奉還朝廷又云援軍既在南岸須於京口度江太子並荅許之癸夘大赦庚戍景又啟曰永安侯確直閤趙威方頻隔柵見詬云天子自與汝盟我終當破汝乞召侯及威方入即當引路言引兵就路還北詬古候翻又許候翻上遣吏部尚書張綰召確辛亥以確為廣州刺史威方為盱眙太守盱眙音吁怡守手又翻確累啟固辭不入上不許確先遣威方入城因欲南奔確盖欲南奔荆江二鎮邵陵王綸泣謂確曰圍城既久聖人憂危臣子之情切于湯火故欲且盟而遣之更申後計成命已决何得拒違時臺使周石珍東宫主書左法生在綸所使疏吏翻下同確謂之曰侯景雖云欲去而不解長圍意可見也今召僕入城何益于事石珍曰勑㫖如此郎那得辭確意尚堅綸大怒謂趙伯超曰譙州為我斬之為于偽翻持其首去伯超揮刃眄確眄眠見翻目斜視也曰伯超識君侯刀不識也確乃流涕入城景凡所請上父子無不從求以却其攻乃所以速其攻也上常蔬食及圍城日久上厨蔬茹皆絶乃食雞子綸因使者蹔通上雞子數百枚上雞時掌翻上時自料簡料音聊歔欷哽咽歔音虚欷許既翻又音希哽古杏翻湘東王繹軍於郢州之武城水經注武口水上通安陸之延頭南至武城入大江吳舊屯所在荆州界盡此盖今之沙武口即其地湘州刺史河東王譽軍於青草湖水經注湘水自汨羅口西北逕壘石山西北對青草湖祝穆曰青草湖一名巴丘湖北洞庭南瀟湘東納汨羅之水自昔與洞庭並稱按一湖之内南名青草北名洞庭中有沙洲間之所謂重湖也信州刺史桂陽王慥軍於西峽口五代志巴東郡梁置信州唐之䕫州也水經注江水自巴東魚復縣東逕廣溪峡斯乃三峡首也峡中有瞿塘黄龕二灘慥七到翻託云俟四方援兵淹留不進中記室參軍蕭賁骨鯁士也以繹不早下心非之嘗與繹雙六食子未下賁曰殿下都無下意雙六亦𫝊之一名續事始云陳思王製雙六局置骰子二唐末有葉子之戲遂加至六戰國策曰博之所以貴梟者便則食不便則止可以食子而未下者擬議其便否也賁因其未下借雙六以諷其不下救君父繹深銜之及得上勑繹欲旋師賁曰景以人臣舉兵向闕今若放兵未及渡江童子能斬之矣必不為也大王以十萬之衆未見賊而退柰何繹不悦未㡬因事殺之㡬居起翻慥懿之孫也東魏河内民四千餘家以魏北徐州刺史司馬裔其鄉里也相帥歸之卧讀曰率下同丞相泰欲封裔裔固辭曰士大夫逺歸皇化裔豈能帥之賣義士以求榮非所願也據周書裔司馬楚之之後司馬氏本河内温人魏孝武西遷裔始歸鄉里於温城起義附西魏與東魏交戰頻有克獲授河内郡守尋加持節平東将軍北徐州刺史帥讀曰率侯景運東府米入石頭既畢王偉聞荆州軍退謂湘東王繹旋師也援軍雖多不相統壹乃説景曰王以人臣舉兵圍守宫闕逼辱妃主殘穢宗廟擢王之髮不足數罪用史記須賈之言擢拔也説式芮翻數所角翻今日持此欲安所容身乎背盟而捷自古多矣背蒲妺翻願且觀其變臨賀王正徳亦謂景曰大功垂就豈可弃去景遂上啟陳帝十失且曰臣方事暌違所以冐陳讜直讜音黨陛下崇飾虚誕惡聞實録上時掌翻惡烏路翻以祅怪為嘉禎祅于驕翻禎音真祥也以天譴為無咎敷演六藝排擯前儒王莽之法也以鐵為貨輕重無常公孫之制也漢公孫述據蜀用鐡錢爛羊鐫印朝章鄙雜更始趙倫之化也漢更始濫授官爵長安為之語曰爛羊胃騎都尉爛羊頭闗内侯晉趙王倫篡位貂蟬盈坐時人為之語曰貂不足狗尾續朝直遥翻更工衡翻豫章以所天為血讎見一百五十卷普通六年邵陵以父存而冠布事見同上冠古玩翻又如字石虎之風也石虎父子事見晉成帝紀修建浮圖百度糜費使四民飢餒苲融姚興之代也苲融事佛事見漢獻帝紀姚興事佛事見晉安帝紀苲在各翻又言建康宫室崇侈陛下唯與主書參斷萬機政以賄成諸閹豪盛衆僧殷實皇太子珠玉是好酒色是耽斷丁亂翻好呼到翻吐言止於輕薄賦詠不出桑中桑中見詩衞國風淫放之詩也邵陵所在殘破湘東羣下貪縱南康定襄之屬皆如沐猴而冠耳南康王會理帝子續之子時鎮廣陵定襄侯祗南平王偉之子時鎮淮隂沐猴而冠用漢書語親為孫姪位則藩屏屏必郢翻臣至百日誰肯勤王此而靈長未之有也昔鬻拳兵諫王卒改善左傳鬻拳彊諫楚子楚子弗從臨之以兵懼而從之卒子恤翻今日之舉復奚罪乎復扶又翻伏願陛下小懲大戒引易大𫝊之言指斥甚矣放䜛納忠使臣無再舉之憂陛下無嬰城之辱則萬姓幸甚上覽啟且慙且怒言皆指實而無如之何有慙怒而已三月丙辰朔立壇於太極殿前告天地以景違盟舉烽鼓譟初閉城之日男女十餘萬擐甲者二萬餘人三考異曰南史作萬今從典略被圍既久人多身腫氣急氣急上氣喘急也被皮義翻死者什八九乗城者不滿四千人率皆羸喘横尸滿路不可瘞埋羸倫為翻喘昌兖翻瘞於計翻爛汁滿溝而衆心猶望外援栁仲禮唯聚妓妾置酒作樂妓渠綺翻諸将日往請戰仲禮不許安南侯駿説邵陵王綸曰説式芮翻仲考異曰典略云綸已下咸説栁禮如此今從太清紀城危如此而都督不救若萬一不虞殿下何顔自立于世今宜分軍為三道出賊不意攻之可以得志綸不從栁津登城謂仲禮曰汝君父在難難乃旦翻不能竭力百世之後謂汝為何仲禮亦不以為意上問策於津對曰陛下有邵陵臣有仲禮不忠不孝賊何由平禮考略曰典略云栁仲族兄暉謂仲禮曰天下事勢如此何不自取富貴仲禮曰兄今若為取之暉曰正當堅營不戰使賊平臺城囚天子徐而縱兵既破之後復挟天子令諸侯也仲禮納之按景既克城則人情皆去援軍自散仲禮安能帥以破景仲禮閉壁不出自為重傷而懼耳非用暉計也今從太清紀及南史太清紀又云景嘗登朱雀門樓與之語又遺以金自是以後閉壁不戰典略云景遺以金鐶亦又近誣今不取戊午南康王㑹理與羊鴉仁趙伯超等進營於東府城北約夜度軍既而鴉仁等暁猶未至景衆覺之營未立景使宋子仙擊之趙伯超望風退走寒山之敗𤣥武湖側之敗及此時之敗皆趙伯超為之也㑹理等兵大敗戰及溺死者五千人溺奴狄翻景積其首於闕下以示城中景又使于子悦求和上使御史中丞沈浚至景所景實無去志謂浚曰今天時方熱軍未可動乞且留京師立効浚發憤責之景不對横刀叱之示将殺浚也浚曰負恩忘義違弃詛盟詛荘助翻固天地所不容沈浚五十之年常恐不得死所何為以死相懼邪因徑去不顧景以其忠直捨之於是景決石闕前水石闕前水景決𤣥武湖以灌城者也百道攻城晝夜不息邵陵世子堅屯太陽門太陽門臺城六門之一也終日蒱飲蒱音蒲蒱飲樗蒱且飲酒也不恤吏士其書佐董勛熊曇朗恨之考之南史此熊曇朗非後來為盗于豫章之熊曇朗也南史侯景𫝊作白曇朗曇徒含翻丁夘夜向曉勛曇朗於城西北樓引景衆登城永安侯確力戰不能却乃排闥入啟上云城已陷上安臥不動曰猶可一戰乎確曰不可上嘆曰自我得之自我失之亦復何恨因謂確曰汝速去語汝父勿以二宫為念因使慰勞在外諸軍復扶又翻語牛倨翻勞力到翻俄而景遣王偉入文徳殿奉謁上命褰簾開户引偉入偉拜呈景啟稱為奸佞所蔽領衆入朝朝直遥翻驚動聖躬今詣闕待罪上問景何在可召來景入見於太極東堂以甲士五百人自衛景稽顙殿下典儀引就三公榻典儀典朝儀者也至唐猶有典儀之職掌殿上賛唱之節及設殿庭服位之次見賢遍翻稽音啓上神色不變問曰卿在軍中日久無乃為勞景不敢仰視汗流被面被皮義翻又曰卿何州人而敢至此妻子猶在北邪景皆不能對任約從旁代對曰臣景妻子皆為髙氏所屠唯以一身歸陛下自此以上上問景景猶慴伏上又問初度江有㡬人景曰千人圍臺城㡬人曰十萬今有㡬人曰率土之内莫非己有自此以上景之辭氣悖矣上俛首不言上辭窮勢屈故俛首不言嗚呼景復至永福省見太子太子亦無懼容侍衞皆驚散唯中庶子徐摛太子中庶子職如侍中摛丑知翻通事舎人陳郡殷不害側侍東宫通事舍人職如中書通事舎人摛謂景曰侯王當以禮見見賢遍翻何得如此景乃拜荀子曰善敗者不亡帝父子於此亦亡而不失其守者悲夫太子與言又不能對景退謂其廂公王僧貴曰景之親貴隆重者號曰左右廂公吾嘗跨鞌對陳陳讀曰陣矢刃交下而意氣安緩了無怖心今見蕭公使人自慴怖普布翻慴之涉翻豈非天威難犯吾不可以再見之於是悉撒兩宫侍衞兩宫謂上臺及東宫縱兵掠乗輿服御宫人皆盡收朝士王侯送永福省乗繩證翻朝直遥翻使王偉守武徳殿于子悦屯太極東堂矯詔大赦自加大都督中外諸軍録尚書事異考曰梁帝紀無赦加景官在庚午今從太清紀建康士民逃難四出難乃旦翻太子洗馬蕭允洗悉薦翻至京口端居不行曰死生有命如何可逃禍之所來皆生於利茍不求利禍從何生己巳景遣石城公大欵以詔命解外援軍五代志宣城郡秋浦縣舊曰石城考異曰典略在庚午梁帝紀在辛未今從太清紀栁仲禮召諸将議之将即亮翻邵陵王綸曰今日之命委之将軍仲禮熟視不對裴之髙王僧辯曰将軍擁衆百萬致宫闕淪沒正當悉力决戰何所多言仲禮竟無一言諸軍乃随方各散言諸軍各随所來之方散去也南兖州刺史臨城公大連按姚思亷梁書大連封臨城縣公自東揚州入援臺城既陷復還㑹稽參考通鑑前後所書皆然此誤以東揚州為南兖州當書南兖州刺史南康王會理東揚州刺史臨城公大連盖傳寫逸南康王㑹理東揚州刺史十字湘東世子方等鄱陽世子嗣北兖州刺史湘潭侯退亦當書北兖州刺史定襄侯祇前青冀二州刺史湘潭侯退五代志衡山郡有湘潭縣吴郡太守袁君正晉陵太守陸經等各還本鎮君正昻之子也帝平建康袁昻以節義見褒位至台司邵陵王綸奔㑹稽會工外翻仲禮及弟敬禮羊鴉仁王僧辯趙伯超並開營降降户江翻下同軍士莫不歎憤仲禮等入城先拜景而後見上見賢遍翻下見父同上不與言仲禮見父津津慟哭曰汝非我子何勞相見湘東王繹使全威将軍㑹稽王琳送米二十萬石以饋軍至姑孰聞臺城陷沈米於江而還沈待林翻景命燒臺内積尸病篤未絶者未絶謂猶有餘息者亦聚而焚之庚午詔征鎮牧守可復本任景留栁敬禮羊鴉仁而遣栁仲禮歸司州王僧辯歸竟陵王僧辯得歸竟陵為湘東王繹用之以平侯景張本初臨賀王正徳與景約平城之日不得全二宫及城開正徳帥衆揮刀欲入帥讀曰率景先使其徒守門故正徳不果入景更以正徳為侍中大司馬百官皆復舊職正徳入見上更工衡翻見賢遍翻拜且泣上曰啜其泣矣何嗟及矣詩中谷有蓷之辭啜張劣翻啜者泣多而不止也讀如輟秦郡陽平盱眙三郡皆降景沈約曰晉武帝分扶風為秦國中原亂其民南流寄居堂邑堂邑本為縣西漢屬臨淮郡後漢屬廣陵國晉恵帝永興元年以臨淮淮陵立堂邑郡安帝改堂邑為秦郡五代志曰江都郡六合縣舊曰蔚氏置秦郡又有安宜縣梁置陽平郡景改陽平為北滄州改秦郡為西兖州東徐州刺史湛海珍北青州刺史王奉伯五代志東海郡懐仁縣梁置南北二青州下邳郡梁置東徐州紀考異曰北青州典略作南冀州今從太清並以地降東魏青州刺史明少遐山陽太守蕭鄰棄城走五代志海州懐仁縣舊置南北二青州江都郡山陽縣舊置山陽郡考異曰梁紀在四月今從太清紀東魏據其地侯景以儀同三司蕭邕為南徐州刺史代西昌侯淵藻鎮京口又遣其将徐相攻晉陵将即亮翻陸經以郡降之初上以河東王譽為湘州刺史徙湘州刺史張纉為雍州刺史代岳陽王詧纉恃其才望輕譽少年迎候有闕譽至檢括州府付度事付度者前刺史以州府之若事若物付度後刺史雍於用翻少詩沼翻留纉不遣聞侯景作亂頗陵蹙纉纉恐為所害輕舟夜遁将之雍部復慮詧拒之復扶又翻纉與湘東王繹有舊欲因之以殺譽兄弟乃如江陵及臺城陷諸王各還州鎮譽自湖口歸湘州洞庭青草共為一湖湖口在巴陵桂陽王慥以荆州督府湘東王繹以荆州刺史都督荆雍等九州慥譽詧皆其屬也留軍江陵欲待繹至拜謁乃還信州纉遺繹書曰河東戴檣上水欲襲江陵檣船上桅竿也所以掛㠶㠶汎風則船行自洞庭至江陵泝江而上故曰上水遺于季翻上時掌翻岳陽在雍共謀不逞江陵游軍主朱榮游軍主領游軍之将也亦遣使告繹云桂陽留此欲應譽詧使疏吏翻繹懼鑿船沈米斬纜沈持林翻纜盧闞翻維舟索也自蠻中步道馳歸江陵囚慥殺之繹與譽詧自此隙矣侯景以前臨江太守董紹先為江北行臺五代志歴陽郡烏江縣梁置臨江郡董紹先降侯景見上卷上年使齎上手勑召南兖州刺史南康王㑹理壬午紹先至廣陵衆不滿二百皆積日飢疲㑹理士馬甚盛僚佐説㑹理曰説式芮翻景已陷京邑欲先除諸藩然後簒位若四方拒絶立當潰敗奈何委全州之地以資冦手不如殺紹先發兵固守與魏連和以待其變㑹理素懦即以城授之紹先既入衆莫敢動㑹理弟通理請先還建康謂其姊曰事既如此豈可闔家受斃前途亦思自効但未知天命如何耳紹先悉收廣陵文武部曲鎧仗金帛鎧可亥翻遣㑹理單馬還建康為㑹理兄弟謀誅王偉不克而死張本湘潭侯退與北兖州刺史定襄侯祗出奔東魏侯景以蕭㺯璋為北兖州刺史州民發兵拒之景遣直閣将軍羊海将兵助之海以其衆降東魏将即亮翻下同降户江翻東魏遂據淮隂祗偉之子也癸未侯景遣于子悦等将羸兵數百東略吳郡羸倫為翻新城戍主戴僧逷有精甲五千沈約曰浙江西南名曰相溪吴立為新城縣屬吳郡今杭州新城縣即其地逷他歴翻説太守袁君正曰説式芮翻賊今乏食臺中所得不支一旬若閉闗拒守立可餓死土豪陸映公恐不能勝而資産被掠皆勸君正迎之被皮義翻君正素怯載米及牛酒郊迎子悦執君正掠奪財物子女東人皆立堡拒之景又以任約為南道行臺鎮姑孰任音壬夏四月湘東世子方等至江陵湘東王繹始知臺城不守命於江陵四旁七里樹木為柵掘塹三重而守之塹七艶翻重直龍翻東魏髙岳等攻魏潁川不克大将軍澄益兵助之道路相繼踰年猶不下去年四月髙岳等攻潁川山鹿忠武公劉豐生建策堰洧水以灌之五代志朔方郡長澤縣後魏置闡熈郡及山鹿縣水經洧水出河南密縣西南馬領山東南過長社縣北堰於扇翻城多崩頺岳悉衆分休迭進言分兵為十數部甲休則乙進乙休則丙進丙休則丁進至於癸休則甲復進矣攻者得畨休而應者不勝其勞也王思政身當矢石與士卒同勞苦城中泉湧懸釡而炊太師泰遣大将軍趙貴督東南諸州兵救之自長社以北皆為陂澤兵至穰穰即穰城不得前東魏使善射者乗大艦臨城射之艦户黯翻射之而亦翻下射殺同城垂陷燕郡景恵公慕容紹宗與劉豐生臨堰視之燕因肩翻見東北塵起同入艦坐避之俄而暴風至逺近晦冥纜斷飄船徑向城纜盧瞰翻城上人以長鉤牽船弓弩亂發紹宗赴水溺死溺奴狄翻豐生游上向土山浮水而行曰游上時掌翻城上人射殺之甲辰東魏進大将軍勃海王澄位相國封齊王加殊禮時令澄賛拜不名入朝不趨劒履上殿丁未澄入朝於鄴固辭不許澄召将佐宻議之皆勸澄宜膺朝命朝直遥翻獨散騎常侍陳元康以為未可澄由是嫌之崔暹乃薦陸元規為大行臺郎以分元康之權湘東王繹之入援也令所督諸州皆發兵雍州刺史岳陽王詧遣府司馬劉方貴将兵出漢口雍於用翻将即亮翻繹召詧使自行詧不從方貴潛與繹相知謀襲襄陽未發㑹詧以他事召方貴方貴以為謀泄遂據樊城拒命詧遣軍攻之繹厚資遣張纉使赴鎮纉至大堤沈約志華山郡治大隄五代志襄陽郡漢南縣宋置華山郡唐併漢南入宜城縣九域志宜城在襄州南九十里曽鞏曰宋武帝築宜城之大隄為城今縣治是也詧已拔樊城斬方貴纉至襄陽詧推遷未去但以城西白馬寺處之處昌吕翻詧猶摠軍府之政聞臺城陷遂不受代助防杜岸紿纉曰觀岳陽勢不容使君不如且往西山以避禍西山謂萬山以西中廬縣諸山也紿待亥翻岸既襄陽豪族兄弟九人皆以驍勇著名杜氏兄弟嵩岑嶷岌巚岸崱嵸幼安凡九人驍堅尭翻纉乃與岸結盟著婦人衣著陟略翻乗青布輿逃入西山詧使岸将兵追擒之纉乞為沙門更名法纉詧許之張纉間搆譽詧兄弟於湘東凶于而身害于而國更工衡翻荆州長史王冲等上牋於湘東王繹請以太尉都督中外諸軍事承制主盟主盟者主諸藩之盟繹不許丙辰又請以司空主盟亦不許上雖外為侯景所制而内甚不平景欲以宋子仙為司空上曰調和隂陽焉用此物三公燮理隂陽言宋子仙非其人也景又請以其黨二人為便殿主帥梁禁中諸殿皆有主帥杜佑曰凡言便殿者皆非正大之處又曰便殿寝側之别殿帥所類翻上不許景不能强强其兩翻心甚憚之太子入泣諌上曰誰令汝來若社稷有靈猶當克復如其不然何事流涕景使其軍士入直省中或驅驢馬帶弓刀出入宫庭上怪而問之直閤将軍周石珍對曰侯丞相甲士上大怒叱石珍曰是侯景何謂丞相左右皆懼是後上所求多不遂志飲膳亦為所裁節憂憤成疾太子以幼子大圜屬湘東王繹屬之欲翻託也并剪爪髪以寄之五月丙辰上卧浄居殿口苦索蜜不得索山客翻再曰荷荷荷下可翻遂殂年八十六景祕不發䘮遷殯於昭陽殿侯景時居昭陽殿迎太子於永福省使如常入朝朝直遥翻王偉陳慶皆侍太子太子嗚咽流涕不敢泄聲殿外文武皆莫之知東魏髙岳既失慕容紹宗等志氣沮䘮不敢復逼長社城杜佑曰許州長葛縣故長社城王思政所守也沮在吕翻䘮息浪翻復扶又翻陳元康言於大将軍澄曰王自輔政以來未有殊功雖破侯景本非外賊太清元年髙澄輔政次年破侯景今潁川垂陷願王自以為功澄從之戊寅自将步騎十萬攻長社将即亮翻騎竒寄翻親臨作堰堰三決澄怒推負土者及囊并塞之推吐雷翻塞悉則翻辛巳發髙祖䘮帝殂二十六日而後發䘮升梓宫於太極殿是日太子即皇帝位大赦侯景出屯朝堂分兵守衞景自昭陽殿出屯朝堂朝堂盖在太極殿左右朝直遥翻壬午詔北人在南為奴婢者皆免之所免萬計景或更加超擢冀收其力髙祖之末建康士民服食器用争尚豪華糧無半年之儲常資四方委輸毛晃曰漢有三輔委輸官掌委輸者也凡以物送之曰輸則音平聲指所送之物曰輸則音去聲委輸之委亦音去聲自景作亂道路斷絶數月之間人至相食猶不免餓死存者百無一二金陵記曰梁都之時户二十八萬西石頭城東至倪塘南至石子岡北過蒋山南北各四十里侯景之亂至于陳時中外人物不迨宋齊之半貴戚豪族皆自出採稆稆音吕禾不因播種而生曰稆填委溝壑不可勝紀勝音升癸未景遣儀同三司來亮入宛陵宛陵縣漢屬丹陽郡晉分為宣城郡治所五代志宣城郡治宣城縣舊曰宛陵宣城太守楊白華誘而斬之甲申景遣其将李賢明攻之不克華讀曰花誘音酉将即亮翻下同考異曰典略在四月今從太清紀景又遣中軍侯子鑒入吴郡中軍中軍都督也以廂公蘇單于為吴郡太守單音蟬遣儀同宋子仙等将兵東屯錢塘新城戍主戴僧逷拒之御史中丞沈浚避難東歸難乃旦翻至吳興太守張嵊與之合謀舉兵討景嵊稷之子也嵊石證翻張稷弑齊東昏侯後死于鬰洲東揚州刺史臨城公大連亦據州不受景命五代志會稽郡梁置東揚州景號令所行唯吳郡以西南陵以北而已魏詔太和中代人改姓者皆復其舊改姓見一百四十卷齊明帝建武三年六月丙戌以南康王㑹理為侍中司空戊考異曰梁紀作戌今從太清紀丁亥立宣城王大器為皇太子日考異曰太清紀云七今從梁帝紀及典略初侯景将使太常卿南陽劉之遴授臨賀王正徳璽綬之遴剃髪僧服而逃之遴良刃翻璽斯氏翻綬音受剃他計翻之遴博學能文嘗為湘東王繹長史将歸江陵繹素嫉其才己丑之遴至夏口繹宻送藥殺之夏户雅翻而自為誌銘厚其贈賻賻音附壬辰封皇子大心為尋陽王大欵為江陵王大臨為南海王大連為南郡王大春為安陸王大成為山陽王大封為宜都王立考異曰太清紀典略並與太子同日今從梁帝紀長社城中無鹽人病攣腫孿吕縁翻死者什八九大風從西北起吹水入城城壊東魏大将軍澄令城中曰有能生致王大将軍者封侯若大将軍身有損傷親近左右皆斬太清元年西魏授王思政大将軍故以稱之王思政帥衆據土山東魏築土山以攻潁川思政奪而據之帥讀曰率告之曰吾力屈計窮唯當以死謝國因仰天大哭西向再拜欲自刎刎扶粉翻都督駱訓曰公常語訓等語牛倨翻汝齎我頭出降降户江翻非但得富貴亦完一城人今髙相既有此令相息亮翻公獨不哀士卒之死乎衆共執之不得引决澄遣通直散騎趙彦深就土山遺以白羽扇遺于季翻執手申意牽之以下澄不令拜延而禮之思政初入潁川将士八千人将即亮翻下同及城陷纔三千人卒無叛者卒子恤翻澄悉散配其将卒於逺方改潁州為鄭州按魏收志潁州本治長社既改鄭州徙治潁隂城領許昌潁川陽翟郡禮遇思政甚重西閣祭酒盧􅅗曰後齊之制三師二大三公各置東西閣祭酒二人大司馬大将軍也思政不能死節何足可重澄謂左右曰我有盧􅅗乃是更得一王思政􅅗度世之曽孫也盧度世事魏大武帝初思政屯襄城欲以長社為行臺治所遣使者魏仲啟陳於太師泰使疏吏翻并致書於浙州刺史崔猷魏收志浙州領修陽朱陽南上洛浙陽固郡五代志浙陽郡西魏置浙州唐志鄧州内鄉縣本浙陽郡治猷復書曰襄城控帶京洛實當今之要地如有動静易相應接潁川既鄰寇境又無山川之固賊若潛來徑至城下莫若頓兵襄城為行臺之所潁川置州遣良将鎮守則表裏膠固人心易安将即亮翻易以豉翻縱有不虞豈能為患仲見㤗具以啓聞具以思政所請崔猷所報二者皆啓聞也泰令依猷策思政固請且約賊水攻期年期讀曰朞陸攻三年之内朝廷不煩赴救泰乃許之及長社不守泰深悔之猷孝芬之子也崔孝芬為髙歡所殺子猷入闗事見一百五十六卷中大通六年侯景之南叛也事見一百六十卷元年丞相泰恐東魏復取景所部地復扶又翻使諸将分守諸城及潁川陷泰以諸城道路阻絶皆令拔軍還史言宇文泰不求廣地之名而審計利害之實上甲侯韶自建康出奔江陵稱受髙祖宻詔徴兵五考異曰梁帝紀在月今從太清紀以湘東王繹為侍中假黄鉞大都督中外諸軍事司徒承制自餘藩鎮並加位號宋子仙圍戴僧逷不克丙午吳盜陸緝等陸考異曰典略作戊子黯今從太清紀南史起兵襲吴郡殺蘇單于推前淮南太守文成侯寧為主臨賀王正徳怨侯景賣已宻書召鄱陽王範使以兵入景遮得其書癸丑縊殺正徳縊於賜翻又於計翻太考異曰典略五月正徳死今從清紀南史景以儀同三司郭元建為尚書僕射北道行臺摠江北諸軍事鎮新秦舊置秦郡於六合新秦即秦郡也簡文帝之廢也元建自秦郡馳還諌景此可證也封元羅等諸元十餘人皆為王月考異曰太清紀在八二十八日今從典略景愛永安侯確之勇常寘左右邵陵王綸􅅗遣人呼之確曰景輕佻佻土彫翻一夫力耳我欲手刃之正恨未得其便卿還啟家王勿以確為念景與確逰鍾山引弓射鳥因欲射景射而亦翻弦斷不發景覺而殺之確考異曰太清紀死在九月今從典略湘東王繹娶徐孝嗣孫女為妃生世子方等妃醜而妬又多失行行下孟翻下穢行同繹二三年一至其室妃聞繹當至以繹目眇為半面糚以待之繹怒而出故方等亦無寵及自建康還江陵繹見其御軍和整始歎其能入告徐妃妃不對垂泣而退繹怒疏其穢行牓于大閤方等見之益懼湘州刺史河東王譽驍勇得士心繹将討侯景遣使督其糧衆驍堅尭翻使疏吏翻下同譽曰各自軍府何忽𨽻人使者三返譽不與方等請討之繹乃以少子安南侯方矩為湘州刺史方等将精卒二萬送之少詩照翻将即亮翻報考異曰太清紀云初上遣諮議參軍周𢎞直往湘州河東王譽云侯景既須撲滅今欲遣荆州兵力使汝東往但使諸蕭有一人能匡國難吾無所惜譽對𢎞直攘􅃑云身始至鎮百度俱闕征伐之任便未能行又遣舎人虞預至譽所曰周𢎞直還知汝必不能自出師吾今便長驅席卷還望三湘兵糧以相資給譽又拒絶意色殊憤上又遣録事參軍劉㲄往雍宣㫖於岳陽王詧曰吾舟艦足乗唯糧仗闕少湘州有米已就譽求雍部精兵必能分遣行留之計爾自擇之詧答曰兵馬蕃扞所須非敢減徹襄陽形勝之地豈可暫虚㲄出謂雍州别駕甄𤣥成曰觀殿下辭色曽無匡復之意卿是股肱所寄可相毗賛邪答曰樊沔衝要王業所基人情驍勇山川險固君其雅識寧俟多言㲄曰本論東討共征獯逆義異西伯非敢聞命於是湘雍二藩成亂謀矣是月上遣世子方等往湘州具陳軍國之計誡方等曰吾近累遣使往湘並未相唇齒今故令汝至彼必望申吾意若能相随不可留王冲權知州事譽遂不受命潜圖搆逆此皆蕭韶為元帝隠惡飾辭耳今從梁書南史方等将行謂所親曰是行也吾必死之死得其所吾復奚恨方等不死于救臺城之時而死于伐湘州之日可謂得其死乎復扶又翻侯景以趙威方為豫章太守江州刺史尋陽王大心遣軍拒之擒威方繫州獄威方逃還建康湘東世子方等軍至麻溪據水經注麻溪水口在臨湘縣北瀏口戍南河東王譽将七千人撃之方等軍敗溺死溺奴狄翻安南侯方矩收餘衆還江陵湘東王繹無戚容繹寵姬王氏生子方諸王氏卒繹疑徐妃為之疑其毒殺之逼令自殺妃赴井死𦵏以庶人禮不聴諸子制服史言湘東猜薄西江督䕶陳霸先欲起兵討侯景景使人誘廣州刺史元景仲許奉以為主元景仲法僧之子普通六年父子歸梁誘音酉景仲由是附景隂圖霸先霸先知之與成州刺史王懐明等集兵南海五代志蒼梧郡梁置成州南海郡即廣州治所馳檄以討景仲曰元景仲與賊合從從子容翻朝廷遣曲陽侯勃為刺史軍已頓朝亭酈道元曰廣州城東北三十里有朝臺昔尉佗因罡作臺北而朝漢圓基千步直峭百丈頂上三畆複道環迴逶迤曲折朔望升拜名曰朝臺朝直遥翻景仲所部聞之皆弃景仲而散秋七月甲寅景仲縊於閤下縊於賜翻霸先迎定州刺史蕭勃鎮廣州前髙州刺史蘭裕欽之弟也五代志髙凉郡梁置髙州蘭欽見一百五十七卷大同元年與其諸弟扇誘始興等十郡攻監衡州事歐陽頠誘音酉監工銜翻下同頠魚毁翻勃使霸先救之悉擒裕等裕考異曰太清紀檎在八月今從陳書勃因以霸先監始興郡事湘東王繹遣竟陵太守王僧辯信州刺史東海鮑泉撃湘州分給兵糧刻日就道僧辯以竟陵部下未盡至欲俟衆集然後行與泉入白繹求申期申重也重為期日繹疑僧辯觀望案劒厲聲曰卿憚行拒命欲同賊邪今日唯有死耳因斫僧辯中其左髀中竹仲翻悶絶久之方蘓即送獄泉震怖不敢言怖普布翻僧辯母徒行流涕入謝自陳無訓繹意解賜以良藥故得不死丁夘鮑泉獨将兵伐湘州將即亮翻日考異曰太清紀作八日或者八受命丁夘乃行也陸緝等競為暴掠吳人不附宋子仙自錢塘旋軍擊之時宋子仙攻戴僧逷屯錢塘壬戌緝弃城奔海鹽吴記曰海鹽本名武原鄉秦以為縣屬吴郡今屬嘉興府在府東南八十里子仙復據吴郡復扶又翻戊辰侯景置吳州于吳郡以安陸王大春為刺史庚午以南康王㑹理兼尚書令月考異曰太清紀在八二十六日今從典略鄱陽王範聞建康不守戒嚴欲入僚佐或説之曰今魏人已據夀陽大王移足則虜騎必窺合肥前賊未平後城失守説式芮翻守式又翻将若之何不如待四方兵集使良将将精卒赴之将即亮翻下同進不失勤王退可固本根範乃止㑹東魏大将軍澄遣西兖州刺史李伯穆逼合肥又使魏收為書諭範範方謀討侯景藉東魏為援乃帥戰士二萬出東闗以合州輸伯穆帥讀曰率并遣諮議劉靈議送二子勤廣為質於東魏以乞師諮議者諮議參軍質音致範屯濡須以待上游之軍遣世子嗣将千餘人守安樂柵安樂柵者範所立柵以安樂名之然臺城覆陷父兄蒙塵此子弟沬血枕戈之時以安樂名柵非名也樂音洛上游諸軍皆不下範糧乏采苽稗菱藕以自給苽與菰同音孤雕菰米本草又謂之茭白嵗久中心生白臺謂之菰米其臺中有黒者謂之茭欎至後結實乃雕胡黒米也稗蒲賣翻稗者似稻其實尖圎而細勤廣至鄴東魏人竟不為出師為于偽翻範進退無計進則孤羸之軍不足以制侯景退則合肥已為東魏人所據乃泝流西上上時掌翻軍於樅陽樅陽縣漢屬廬江郡晉書五代志同安郡同安縣舊曰樅陽并置樅陽郡師古曰樅七容翻景出屯姑孰範将裴之悌以衆降之降户江翻之悌之髙之弟也東魏大将軍澄詣鄴辭爵位殊禮且請立太子澄謂濟隂王暉業曰比讀何書暉業曰數尋伊霍之𫝊不讀曹馬之書謂伊霍輔少主曹馬篡國也濟子禮翻比毗至翻數所角翻傳直戀翻八月甲申朔侯景遣其中軍都督侯子鑒等擊吴興己亥鮑泉軍於石椁寺河東王譽逆戰而敗辛丑又敗于橘洲晏公類要曰橘洲在長沙西南四十里湘江中四洲橘洲其一也水經注沅水東逕龍陽縣之汎洲洲長二十里吴丹陽太守李衡植柑於其上臨死勑其子曰吾州里有木奴千頭不責衣食嵗絹千匹今洲上猶有遺枿余按汎洲乃柑洲非橘洲水經注又云湘水北過臨湘縣西又北過南津城西西對橘洲此則是也類要亦指此張舜民郴行録橘洲東對潭洲城戰及溺死者萬餘人溺奴狄翻譽退保長沙泉引軍圍之辛夘東魏立皇子長仁為太子勃海文襄王澄以其弟太原公洋次長次長言於兄弟行澄居長而洋次之長竹丈翻意常忌之洋深自晦匿言不出口常自貶退與澄言無不順從澄輕之常曰此人亦得富貴相書亦何可解相息亮翻古之唐舉許負皆相視人之骨法狀貌以知吉凶貴賤有相書𫝊於世解户買翻洋為其夫人趙郡李氏營服玩小佳為于偽翻下為爾同澄輒奪取之夫人或恚未與恚於避翻洋笑曰此物猶應可求兄須何容吝惜須者意所欲亦求也澄或愧不取洋即受之亦無飾讓毎退朝還第朝直遥翻輒閉閤静坐雖對妻子能竟日不言或時􅃝跣奔躍夫人問其故洋曰為爾漫戯漫戲言漫爾作戲其實盖欲習勞也澄獲徐州刺史蘭欽子京以為膳奴蘭欽仕梁為徐州刺史固考異曰陳元康𫝊作蘭成今從北齊帝紀欽請贖之不許京屢自訴澄杖之曰更訴當殺汝京與其黨六人謀作亂澄在鄴居北城東柏堂嬖瑯邪公主琅邪公主事始見一百五十九卷大同十一年欲其往來無間間古莧翻侍衞者常遣出外辛夘澄與散騎常侍陳元康吏部尚書侍中楊愔黄門侍郎崔季舒屏左右謀受魏禪愔於今翻屏必郢翻署擬百官蘭京進食澄却之謂諸人曰昨夜夢此奴斫我當急殺之京聞之寘刀盤下冐言進食澄怒曰我未索食索山客翻求也何為遽來京揮刀曰來殺汝澄自投傷足入于牀下賊去牀弑之去羌吕翻愔狼狽走遺一靴靴詩戈翻季舒匿于厠中元康以身蔽澄與賊争刀被傷腸出被皮義翻下同庫直王紘冐刃禦賊紇奚舎樂鬬死時變起倉猝内外震駭太原公洋在城東雙堂聞之顔色不變指揮部分分扶問翻入討羣賊斬而臠之臠力兖翻割切其肉也徐出曰奴反大将軍被傷無大苦也内外莫不驚異洋素自晦匿今遇變而不為之變故皆驚而異之洋祕不發䘮陳元康手書辭母口占使功曹參軍祖珽作書陳便宜珽待鼎翻至夜而卒洋殯之第中詐云出使使疏吏翻虚除元康中書令并秘陳元康死問亦所以鎮安人情以王紘為領左右都督紘基之子也王基見一百五十六卷中大通六年勲貴以重兵皆在并州勸洋早如晉陽洋從之夜召大将軍督䕶太原唐邕使部分将士鎮遏四方分扶問翻邕支配須㬰而畢支分也配𨽻也支配猶今人言品配洋由是重之癸巳洋諷東魏主以立太子大赦託建儲大赦以安蘭京之黨心懐反側者澄死問漸露東魏主竊謂左右曰大将軍今死似是天意威權當復歸帝室矣復扶又翻下可復同洋留太尉髙岳太保髙隆之開府儀同三司司馬子如侍中楊愔守鄴餘勲貴皆自随甲午入謁東魏主於昭陽殿從甲士八千人登階者二百餘人皆攘􅃑扣刃若對嚴敵令主者𫝊奏曰臣有家事須詣晉陽主者主朝儀者也再拜而出東魏主失色目送之曰此人又似不相容朕不知死在何日晉陽舊臣宿将素輕洋及至大㑹文武神彩英暢言辭敏洽衆皆大驚晉陽文武之驚洋猶郼城内外也澄政令有不便者洋皆改之髙隆之司馬子如等惡度支尚書崔暹惡烏路翻奏暹及崔季舒過惡鞭二百徙邊二人素為澄所親任故隆之等惡之侯景以宋子仙為司徒郭子建為尚書左僕射與領軍任約等四十人並開府儀同三司仍詔自今開府儀同不須更加将軍梁制雖三公亦加将軍號今開府儀同三司亦不加是後開府儀同至多不可復記矣鄱陽王範自樅陽遣信告江州刺史尋陽王大心樅七容翻大心遣信邀之範引兵詣江州大心以湓城處之一棲不兩䧺為範與大心互相猜忌張本處昌吕翻吳興兵力寡弱張嵊書生不閑軍旅閑習也或勸嵊效袁君正以郡迎侯子鑒嵊歎曰袁氏世濟忠貞袁氏自淑至顗粲及昂皆以忠貞著節不意君正一旦隳之吾豈不知吳郡既沒吳興勢難久全但以身許國有死無貳耳九月癸丑朔子鑒軍至吳興嵊戰敗還府整服安坐子鑒執送建康侯景嘉其守節欲活之嵊曰吾忝任専城朝廷傾危不能匡復今日速死為幸景猶欲全其一子嵊曰吾一門己在鬼録魏文帝書曰觀其姓名已在鬼録録籍也不就爾虜求恩景怒盡殺之張嵊閣門死義以雪其父弑君之醜血祀絶矣并殺沈浚沈浚責侯景之時視死如歸其後與張嵊起兵豈望生邪河東王譽告急於岳陽王詧詧留諮議參軍濟陽蔡大寳守襄陽帥衆二萬騎二千伐江陵以救湘州濟子禮翻帥讀曰率騎竒寄翻湘東王繹大懼遣左右就獄中問計於王僧辯僧辯具陳方略繹乃赦之以為城中都督乙夘詧至江陵作十三營以攻之㑹大雨平地水深四尺深式浸翻詧軍氣沮沮在吕翻繹與新興太守杜崱有舊漢獻帝建安十二年省雲中定襄五原朔方四郡郡立一縣合為新興郡属并州晉江左僑立於荆州界領定襄廣牧等縣五代志南郡安興縣舊置廣牧定襄縣唐省安興縣入江陵則新興固荆州所統矣何待繹以舊好宻邀崱哉盖崱雖帶新興太守實從軍在襄陽也崱士力翻宻邀之乙丑崱與兄岌岸弟幼安兄子龕各帥所部降于繹岌魚及翻龕苦含翻降户江翻岸請以五百騎襲襄陽晝夜兼行去襄陽三十里城中覺之蔡大寳奉詧母龔保林保林宫中女官自漢以來有之顔師古曰保安也言其可安衆如林也齊髙帝建元三年太子宫置三内職良姊比開國侯保林比五等侯才人比駙馬都尉登城拒戰詧聞之夜遁弃糧食金帛鎧仗於湕水不可勝紀鎧可亥翻丁度曰湕紀偃切水名出南郡今荆門軍北百里有建水盖即此水也勝音升張纉病足詧載以随軍及敗走守者恐為追兵所及殺之弃尸而去文考異曰太清紀云詧使制檄纘曰吾蒙朝廷不世之榮又荷湘東王國士之眷今日雖死義無操筆及軍敗将殺之纘曰若使南師必振北賊将亡吾雖死無所恨遂殺之弃尸于江陵北湖又云諸将並欲追上以如子之情情所未忍曰彼不應來而來明其為逆我應逐不逐見我之𢎞此盖亦蕭韶之虚美今從南史詧至襄陽岸奔廣平依其兄南陽太守巚晉渡江南僑立廣平郡於襄陽宋以漢南陽郡之朝陽縣為實土水經注古朝陽縣在新野縣西巚與巘同魚蹇翻湘東王繹以鮑泉圍長沙久不克怒之以平南将軍王僧辯代為都督數泉十罪數所具翻命舎人羅重懽與僧辯偕行重直龍翻泉聞僧辯來愕然曰得王竟陵來助我賊不足平拂席待之僧辯入背泉而坐背蒲妹翻曰鮑郎卿有罪令㫖使我鎻卿時繹下書于所部稱令故曰令㫖卿弗以故意見期使重懽宣令鎻之牀側泉為啓自申申明也理也且謝淹緩之罪繹怒解遂釋之冬十月癸未朔東魏以開府儀同三司潘相樂為司空初歴陽太守荘鐵帥衆歸尋陽王大心鐵歸大心見一百六十一卷太清二年帥讀曰率大心以為豫章内史鐵至郡即叛推觀寜侯永為主永範之弟也丁酉鐵引兵襲尋陽大心遣其将徐嗣徽逆擊破之鐡走至建昌建昌縣漢和帝永元十六年分海昏立屬豫章郡光逺将軍韋構邀擊之鐵失其母弟妻子單騎還南昌南昌漢舊縣豫章郡治所大心遣構将兵追討之宋子仙自吳郡趣錢塘劉神茂自吳興趣富陽前武州刺史富陽孫國恩以城降之趣七喻翻降户江翻下同十一月乙夘𦵏武皇帝於脩陵曰考異太清紀云十四日梓宫達于修陵今從梁書廟號髙祖百濟遣使入貢使疏吏翻見城闕荒圮圮部鄙翻毀也異於曏來毛晃曰昔來謂之曏來也哭於端門端門臺城正南之中門侯景怒録送荘嚴寺録拘也收也荘嚴寺近建康南郊壇不聴出壬戌宋子仙急攻錢塘戴僧逷降之岳陽王詧使将軍薛暉攻廣平拔之獲杜岸送襄陽詧拔其舌鞭其面支解而烹之又發其祖父墓焚其骸而揚之以其頭為漆椀詧既與湘東王繹為敵恐不能自存遣使求援於魏請為附庸鄭康成曰附庸以國事附於大國也丞相泰令東閤祭酒榮權使於襄陽繹使司州刺史栁仲禮鎮竟陵以圖詧詧懼遣其妃王氏及世子嶚為質于魏嶚力么翻質音致丞相泰欲經略江漢以開府儀同三司楊忠都督三荆等十五州諸軍事鎮穰城仲禮至安陸安陸太守栁勰以城降之勰音協仲禮留長史馬岫與其弟子禮守之帥衆一萬趣襄陽泰遣楊忠及行臺僕射長孫儉将兵擊仲禮以救詧為西魏因詧而并繹張本宋子仙乗勝度浙江至㑹稽㑹工外翻邵陵王綸聞錢塘已敗出奔鄱陽史考異曰南云東土皆附綸臨城公大連懼将害己乃圖之綸覺之乃去今從典略鄱陽内史開建侯蕃以兵拒之五代志開建縣屬熙平郡隋以熙平郡為連州範進擊蕃破之範當作綸魏楊忠将至義陽太守馬伯符以下溠城降之五代志漢東郡唐城縣後魏曰㵐西置義陽郡西魏改㵐西為下溠杜佑曰下溠戌在漢東郡棗陽縣東南百餘里九域志唐城在随州西北八十五里左傳楚人除道梁溠營軍臨随即此溠水溠音側駕翻字林壮加翻忠以伯符為鄉導鄉讀曰嚮伯符岫之子也南郡王大連為東揚州刺史時㑹稽豐沃勝兵數萬㑹工外翻勝音升糧仗山積東土人懲侯景殘虐咸樂為用樂音洛而大連朝夕酣飲不恤軍事司馬東陽留異凶狡殘暴為衆所患大連悉以軍事委之十二月庚寅宋子仙攻㑹稽大連弃城走異奔還鄉里尋以其衆降於子仙大連欲奔鄱陽異為子仙鄉導追及大連於信安漢獻帝初平二年分太末立新安縣晉武帝太康元年更名信安五代志東陽郡信安縣有江山即今江山縣也宋白曰信安縣漢太末縣地漢末為新安晉為信安唐為衢州治所唐又分信安之南川為江山縣朔考異曰典略云十二月庚子朔擒大連按是月壬午今從太清紀執送建康帝聞之引帷自蔽掩袂而泣不忍見其子之俘執也於是三吳盡沒於景公侯在㑹稽者俱南度嶺景以留異為東陽太守為後留異據東陽張本收其妻子為質質音致乙酉東魏以并州刺史彭樂為司徒邵陵王綸進至九江尋陽王大心以江州讓之綸不受引兵西上上時掌翻始興太守陳霸先結郡中豪傑欲討侯景郡人侯安都張偲等各帥衆千餘人歸之偲新兹翻又倉才翻霸先遣主帥杜僧明将二千人頓于嶺上大庾嶺也帥所類翻将即亮翻廣州刺史蕭勃遣人止之曰侯景驍雄天下無敵驍堅堯翻前者援軍十萬士馬精彊猶不能克謂栁仲禮等君以區區之衆将何所之如聞嶺北王侯又皆鼎沸親尋干戈謂荆雍湘三州以君疎外詎可暗投漢鄒陽曰明月之珠夜光之璧以暗投人於道路人無不按劎而相眄者無因而至前也未若且留始興遥張聲勢保太山之安也霸先曰僕荷國恩往聞侯景渡江即欲赴援遭值元蘭梗我中道荷下可翻元蘭謂元景仲及蘭裕也今京都覆沒君辱臣死誰敢愛命君侯體則皇枝蕭勃武帝從弟吳平侯昺之子故云然任重方岳遣僕一軍猶賢乎己猶賢乎已用孔子語已止也此言猶勝乎止而不遣軍也乃更止之乎乃遣使間道詣江陵受湘東王繹節度使疏吏翻間古莧翻時南康土豪蔡路養起兵據郡勃乃以腹心譚世逺為曲江令曲江縣漢屬桂陽郡吴屬始興郡唐為韶州與路養相結同遏霸先為陳霸先破蔡路養張本魏楊忠拔随郡執太守桓和五代志漢東郡随縣舊置随郡東魏使金門公潘樂等将兵五萬襲司州刺史夏侯强降之於是東魏盡有淮南之地太清二年東魏使辛術略江淮之地至是方盡有淮南之地資治通鑑卷一百六十二
