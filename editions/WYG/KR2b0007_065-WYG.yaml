body:
  text: 資治通鑑巻六十五宋司馬光撰胡三省音註漢紀五十七起柔兆閹茂盡著雍困敦凡三年孝獻皇帝庚建安十一年春正月有星孛于北斗晉天文志北斗七星在太㣲北一曰天樞二曰璇三曰璣四曰權五曰玉衡六曰開陽七曰搖光一至四為魁五至七為杓孛蒲内翻曹操自將擊髙幹將即亮翻留其世子丕守鄴使别駕從事崔琰𫝊之操圍壺闗三月壺闗降降户江翻髙幹自入匈奴求救單于不受幹獨與數騎亡欲南犇荆州騎奇寄翻欲奔劉表也上洛都尉王琰捕斬之上洛縣前漢屬𢎞農後漢屬京兆嶢闗在縣西北故置都尉劉昫曰言縣在洛水之上故以為名并州悉平曹操使陳郡梁習以别部司馬領并州刺史時荒亂之餘胡狄雄張張知亮翻吏民亡叛入其部落南匈奴部落皆在并州界兵家擁衆各為寇害謂諸豪右擁衆自保者習到官誘喻招納誘音酉皆禮召其豪右稍稍薦舉使詣幕府豪右已盡次發諸丁彊以為義從言其以義從軍也從才用翻又因大軍出征令諸將分請以為勇力吏兵已去之後稍移其家前後送鄴凡數萬口其不從命者興兵致討斬首千數降附者萬計單于恭順名王稽顙名王即匈奴諸部王也降户江翻稽音啟服事供軄同於編户編聫次也編于民籍故曰編户邊境肅清百姓布野勤勸農桑令行禁止令之則行禁之則止長老稱詠以為自所聞識刺史未有如習者長知兩翻習乃貢達名士避地州界者河内常林楊俊王象荀緯及太原王凌之徒操悉以為縣長緯于貴翻長知兩翻後皆顯名於世初山陽仲長統遊學至并州過髙幹仲長複姓過工禾翻幹善遇之訪以世事統謂幹曰君有雄志而無雄材好士而不能擇人好呼到翻所以為君深戒也幹雅自多自以為多才也不悦統言統遂去之幹死荀彧舉統為尚書郎百官志尚書侍郎三十六人四百石一曹六人主作文書起草蔡質漢儀曰尚書郎初從三署詣臺試初上臺稱守尚書郎中歳滿稱尚書郎三年稱侍郎著論曰昌言孔安國曰昌當也當理之言其言治亂略曰豪傑之當天命者未始有天下之分者也治直吏翻分扶問翻無天下之分故戰爭者競起焉角智者皆窮角力者皆負角競也校也形不堪復伉復扶又翻伉口浪翻敵也埶不足復校乃始羈首係頸就我之御紲耳賢曰銜勒也紲羈也紲息列翻及繼體之時豪傑之心既絶士民之志已定貴有常家尊在一人當此之時雖下愚之才居之猶能使恩同天地威侔鬼神周孔數千無所復角其聖賁育百萬無所復奮其勇矣賁音奔彼後嗣之愚主見天下莫敢與之違自謂若天地之不可亡也乃奔其私嗜騁其邪欲君臣宣淫左傳泄冶曰公卿宣淫民無効焉杜預曰宣示也上下同惡荒廢庶政弃忘人物信任親愛者盡佞諂容説之人也説讀作悦寵貴隆豐者盡后妃姬妾之家也遂至熬天下之脂膏斵生民之骨髓怨毒無聊禍亂並起中國擾攘四夷侵叛土崩瓦解一朝而去昔之為我哺乳之子孫者今盡是我飲血之寇讐也至于運徙埶去猶不覺悟者豈非富貴生不仁沈溺致愚疾邪沈持林翻存亡以之迭代治亂從此周復左傳美惡周必復天之道也天道常然之大數也秋七月武威太守張猛殺雍州刺史邯鄲商興平元年分凉州河西四郡置雍州雍於用翻州兵討誅之猛奐之子也八月曹操東討海賊管承至淳于淳于縣屬北海國賢曰故城在今宻州安邱縣東北遣將樂進李典擊破之承走入海島昌豨復叛操遣于禁討斬之豨許豈翻又音希豨降見上卷建安六年復扶又翻是歳立故琅邪王容子熙為琅邪王齊北海阜陵下邳常山甘陵濟隂平原八國皆除容光武子琅邪孝王京之雲孫也容薨國絶今復立其子齊光武兄武王縯之後北海縯少子靖王興之後阜陵光武子質王延之後下邳明帝子惠王衍之後常山明帝子頃王昞之後甘陵章帝子清河孝王慶之後濟隂明帝子悼王長薨而無子國除久矣據范史當是濟北章帝子惠王壽之後亦以是年國除平原和帝子懐王勝始封薨而無子以河間王開子翼繼之翼廢為蠡吾侯子志立為桓帝復以帝兄碩為平原王奉翼後至是國亦除八國皆除而獨立熙繼琅邪者容先遣弟邈至長安貢獻操時在東郡邈盛稱其忠誠操以此徳容故為容立後除八國者漸以弱漢宗室也濟子禮翻烏桓乗天下亂畧有漢民十餘萬户袁紹皆立其酋豪為單于酋慈由翻以家人子為己女妻焉妻七細翻遼西烏桓蹋頓尤彊蹋徒臘翻為紹所厚故尚兄弟歸之數入塞為寇數所角翻欲助尚復故地曹操將擊之鑿平虜渠泉州渠以通運操紀云鑿渠自呼沱入𣲖水名平虜渠又從泃河口鑿入潞河名泉州渠以通海𣲖音孤泃音句賢曰呼沱河舊在饒陽南至曹操因饒河故瀆決令北注新溝水所以今在饒陽縣北説文𣲖水出雁門葰人戍夫山東北入海水經注泃水出右北平無終縣西山西北流過平谷縣而東南流又南流入於潞河又東合泉州渠口曹操所鑿也渠東至海陽縣樂安亭南與濡水合而入于海泉州平谷二縣皆屬漁陽郡賢曰泉州故城在今幽州雍奴縣南海陽縣屬遼西郡葰相維翻孫權擊山賊麻保二屯平之水經注江水過陸口而東左得麻屯口南直蒲圻洲水北入百有餘里吴所屯也十二年春二月曹操自淳于還鄴丁酉操奏封大功臣二十餘人皆為列侯因表萬歳亭侯荀彧功狀九域志鄭州有萬歳亭彧所封也三月増封彧千户又欲授以三公彧使荀攸深自陳讓至于十數乃止曹操將擊烏桓諸將皆曰袁尚亡虜耳夷狄貪而無親豈能為尚用今深入征之劉備必説劉表以襲許説輸芮翻萬一為變事不可悔郭嘉曰公雖威震天下胡恃其逺必不設備因其無備卒然擊之可破滅也卒讀曰猝且袁紹有恩於民夷而尚兄弟生存今四州之民徒以威附徳施未加施式豉翻舎而南征舎讀曰捨尚因烏桓之資招其死主之臣言欲為其主致死而留滯不得逞者胡人一動民夷俱應以生蹋頓之心成覬覦之計覬音冀覦音俞恐青冀非己之有也表坐談客耳自知才不足以御備重任之則恐不能制輕任之則備不為用雖虛國逺征公無憂矣操從之行至易易縣前漢屬涿郡後漢省宋白曰漢易縣故城在今涿州歸義縣東南十五里大易故城是郭嘉曰兵貴神速今千里襲人輜重多難以趨利重直用翻下同趨七喻翻且彼聞之必為備不如留輜重輕兵兼道以出掩其不意初袁紹數遣使召田疇於無終疇保無終見六十巻初元四年數所角翻又即授將軍印使安輯所統疇皆拒之及曹操定冀州河間邢顒謂疇曰黄巾起來二十餘年海内鼎沸百姓流離今聞曹公法令嚴民厭亂矣亂極則平請以身先遂裝還鄉里顒魚容翻顒從畤游積五年乃歸先悉荐翻疇曰邢顒天民之先覺者也伊尹曰予天民之先覺者也此以道自任者也若邢顒之先覺特幾見耳操以顒為冀州從事疇忿烏桓多殺其本郡冠盖謂郡中名勝之士意欲討之而力未能操遣使辟疇疇戒其門下趣治嚴趣讀曰促嚴即裝也自東都避明帝諱改裝曰嚴後遂因之門人皆曰袁公慕君禮命五至君義不屈今曹公使一來而君若恐弗及者何也使疏吏翻下同疇笑曰此非君所識也遂隨使者到軍拜為蓚令蓚縣前漢屬信都後漢屬勃海顔師古曰蓚音條隨軍次無終時方夏水雨而濵海洿下洿汪胡翻濘滯不通虜亦遮守蹊要蹊徑路也蹊要徑路要處也濘乃定翻軍不得進操患之以問田疇疇曰此道秋夏每常有水淺不通車馬深不載舟船為難久矣舊北平郡治在平岡道出盧龍達于栁城前漢右北平郡治平岡縣後漢省平岡縣改治土垠縣垠音銀賢曰土垠故城在今平州西南水經注曰自無終東出盧龍塞又東越青陘至凡城二百許里自几城東北出趣平岡可百八十里向黄龍則五百里故田疇引軍出盧龍塞塹山堙谷五百餘里逕白檀厯平岡登白狼山望栁城也自建武以來陷壊斷絶垂二百載載子亥翻而尚有㣲逕可從今虜將以大軍當由無終不得進而退懈弛無備若嘿回軍從盧龍口越白檀之險出空虛之地路近而便掩其不備蹋頓可不戰而禽也操曰善乃引軍還而署大木表於水側路傍曰方今夏暑道路不通且俟秋冬乃復進軍復扶又翻虜候騎見之誠以為大軍去也騎奇寄翻操令疇將其衆為鄉導將即亮翻鄉讀曰嚮上徐無山史記正義徐無山在右北平徐無縣西北徐無山即田疇所保聚處塹山堙谷五百餘里經白檀厯平崗涉鮮卑庭白檀縣屬右北平郡宋白曰白檀故城在檀州燕樂縣界此時鮮卑庭已在右北平郡界盖慕容廆之先也塹七艷翻東指栁城未至二百里虜乃知之尚熙與蹋頓及遼西單于樓班樓班丘力居之子也右北平單于能臣抵之等右北平單于曰烏延能臣抵之或者烏延之異名歟將數萬騎迎軍八月操登白狼山水經注白狼山在右北平石城縣西烏丸傳逆戰于凡城則白狼山盖在凡城卒與虜遇卒讀曰猝衆甚盛操車重在後車重即輜重重直用翻被甲者少左右皆懼被皮義翻少詩沼翻操登髙望虜陣不整乃縱兵擊之使張遼為前鋒虜衆大崩斬蹋頓及名王已下胡漢降者二十餘萬口降户江翻遼東單于速僕丸速僕丸即蘇僕延語有輕重耳與尚熙奔遼東太守公孫康其衆尚有數千騎或勸操遂擊之操曰吾方使康斬送尚熈首不煩兵矣九月操引兵自栁城還公孫康欲取尚熙以為功乃先置精勇于廏中然後請尚熙入未及坐康叱伏兵禽之遂斬尚熙并速僕丸首送之諸將或問操公還而康斬尚熙何也操曰彼素畏尚熙吾急之則并力緩之則自相圖其埶然也操梟尚首梟古堯翻令三軍敢有哭之者斬牽招獨設祭悲哭牽招先為袁氏從事故祭哭之操義之舉為茂才時天寒且旱二百里無水軍又乏食殺馬數千匹以為糧鑿地入三十餘丈方得水既還科問前諌者科條也問前諫者科具其姓名也衆莫知其故人人皆懼操皆厚賞之曰孤前行乗危以徼倖徼堅堯翻雖得之天所佐也顧不可以為常諸君之諫萬安之計是以相賞後勿難言之冬十月辛夘有星孛于鶉尾蔡邕曰自張十二度至軫六度謂之鶉尾之次陳卓曰自張十七度至軫十一度謂之鶉尾於辰在巳乙巳黄巾殺濟南王贇賢曰贇河間孝王開五代孫靈帝立其父康為濟南王以奉孝仁皇祀濟子理翻贇於倫翻十一月曹操至易水烏桓單于代郡普富盧上郡那樓皆來賀師還論功行賞還從宣翻又如字以五百户封田疇為亭侯疇曰吾始為劉公報仇率衆遁逃事見六十卷初平四年為于偽翻志義不立反以為利非本志也固讓不受操知其至心許而不奪不奪其志也孔子曰匹夫不可奪志操之北伐也劉備説劉表襲許説輸芮翻表不能用及聞操還表謂備曰不用君言故為失此大會猶言大機會也備曰今天下分裂日尋干戈事㑹之來豈有終極乎若能應之於後者則此未足為恨也豪傑之言故自與常人不同是歳孫權西擊黄祖虜其人民而還權母吴氏疾篤引見張昭等屬以後事而卒屬之欲翻卒子恤翻初琅邪諸葛亮寓居襄陽隆中亮從父𤣥為豫章太守將亮之官㑹漢朝以朱皓代𤣥𤣥與亮往依劉表漢晉春秋曰亮家于南陽之鄧縣在襄陽城西二十里號曰隆中按東坡詩萬山西北古隆中也故其萬山詩云回頭望西北隱隱龜背起傳云古隆中萬樹桑柘美每自比管仲樂毅時人莫之許也惟潁川徐庶與崔州平謂為信然州平烈之子也崔烈事靈帝以入錢為公劉備在荆州訪士於襄陽司馬徽徽曰儒生俗士豈識時務識時務者在乎俊傑此間自有伏龍鳳雛備問為誰曰諸葛孔明龎士元也諸葛亮字孔明龎統字士元龎皮江翻徐庶見備於新野備器之物之有用者謂之器器之者器重之也重其才之足以用世也庶謂備曰諸葛孔明臥龍也將軍豈願見之乎備曰君與俱來庶曰此人可就見不可屈致也將軍宜枉駕顧之備由是詣亮備以梟雄之才聞徐庶一言三枉駕以見孔明此必庶之材器有以取重于備備遂信之也庶自辭備歸操之後寂無所聞今觀其捨舊從新之言質天地而無愧則其人從可知矣凡三往乃見因屏人曰漢室傾頽姦臣竊命孤不度徳量力欲信大義于天下屏必郢翻度徒洛翻量音良信讀曰申而智術淺短遂用猖蹶猖披猖蹶顛蹶至于今日然志猶未已君謂計將安出亮曰今曹操已擁百萬之衆挾天子而令諸侯此誠不可與爭鋒孫權據有江東已厯三世國險而民附賢能為之用此可與為援而不可圖也荆州北據漢沔利盡南海謂自桂陽蒼梧跨有交州則利盡南海也東連吳㑹吳㑹者言吳為東南一都㑹也西通巴蜀此用武之國而其主不能守此殆天所以資將軍也益州險塞沃野千里天府之土劉璋闇弱張魯在北民殷國富而不知存恤智能之士思得明君張松法正之徒雖未與亮交際亮固逆知之也將軍既帝室之胄胄裔也信義著於四海若跨有荆益保其巖阻撫和戎越結好孫權好呼到翻下同内修政治外觀時變則覇業可成漢室可興矣所謂俊傑者量時審勢規畫定于胷中儻非其人未易與之言也治直吏翻備曰善於是與亮情好日宻好呼到翻闗羽張飛不悦備解之曰孤之有孔明猶魚之有水也魚有水則生無水則死願諸君勿復言復扶又翻羽飛乃止司馬徽清雅有知人之鑒同縣龎徳公素有重名徽兄事之諸葛亮每至徳公家獨拜牀下徳公初不令止觀孔明獨拜徳公於牀下孔明所以事徳公者為何如邪徳公初不令止徳公所以自居者為何如邪徳公於是不可及矣徳公從子統少時樸鈍未有識者從才用翻少詩沼翻惟徳公與徽重之徳公嘗謂孔明為臥龍士元為鳳雛徳操為水鑑故徳操與劉備語而稱之司馬徽字徳操十三年春正月司徒趙温辟曹操子丕操表温辟臣子弟選舉故不以實䇿免之操以温辟其子怒而免之駕言選舉不以實耳考異曰獻帝起居注在十五年范書帝紀在十三年按是年罷三公官温不至十五年也曹操還鄴作𤣥武池以肄舟師鄴城有𤣥武苑操鑿池其中肄以四翻習也初巴郡甘寜將僮客八百人歸劉表寧走荆州事見六十一巻興平元年表儒人不習軍事寧觀表事埶終必無成恐一朝衆散并受其禍聚而不用其禍必至欲東入吳黄祖在夏口應劭曰沔水自江夏别至南郡華容為夏水過江夏郡而入于江盖指夏水入江之地為夏口庾仲雍曰夏口一曰沔口或曰魯口水經注曰沔水南至江夏沙羨縣北南入于江然則曰夏口以夏水得名曰沔口以沔水得名曰魯口以魯山得名實一處也其地在江北自孫權置夏口督屯江南今鄂州治是也故何尚之云夏口在荆江之中正對沔口賢注亦謂夏口戍在今鄂州于是相承以鄂州為夏口而江北之夏口晦矣軍不得過乃留依祖三年祖以凡人畜之畜許六翻養也孫權擊祖祖軍敗走權校尉凌操將兵急追之姓譜衛康叔支子為周凌人子孫以為氏寧善射將兵在後射殺操射殺之射而亦翻祖由是得免軍罷還營待寧如初祖都督蘇飛數薦寧數所角翻祖不用寧欲去恐不免飛乃白祖以寧為邾長邾縣屬江夏郡地道記曰楚滅邾徙其君於此賢曰邾故城在今復州竟陵縣東飛盖開其奔吳之路也長知兩翻宋白曰黄州漢邾縣也寧遂亡奔孫權異考曰吴志孫權傳建安八年十二年皆嘗討黄祖凌統傳父操死時統年十五攝父兵後擊麻保屯刺殺陳勤按周瑜孫瑜傳以十一年擊麻保屯則操死似在八年然後五年寧乃奔權似晚今無年月可據追言之周瑜吕䝉共薦達之權禮異同於舊臣寧獻䇿於權曰今漢祚日㣲曹操終為簒盜南荆之地山川形便誠國之西埶也謂在吳之西據上流之形埶寧觀劉表慮既不逺兒子又劣言又弱於表也非能承業傳基者也至尊當早圖之不可後操言若不先圓劉表必為操所圖也後户遘翻圖之之計宜先取黄祖祖今昏耄已甚財榖並乏左右貪縱吏士心怨舟船戰具頓廢不修頓壊也左傳甲兵不頓頓讀曰鈍怠於耕農軍無法伍至尊今往其破可必一破祖軍鼓行而西據楚闗楚關扞關也蜀伐楚楚為扞闗以拒之故曰楚關大埶彌廣即可漸規巴蜀矣權深納之張昭時在坐難曰今吳下業業坐徂臥翻難乃旦翻業業危懼之意若軍果行恐必致亂寧謂昭曰國家以蕭何之任付君君居首而憂亂奚以希慕古人乎言固有攸當者張昭不得以彊辭距也守式又翻權舉酒屬寧曰興霸甘寧字興霸屬之欲翻今年行討如此酒矣决以付卿卿但當勉建方畧令必克祖則卿之功何嫌張長史之言乎昭為權長史權之此言既以奬甘寧之氣又以全張昭之體不有居者誰守社稷不有行者誰扞牧圉長知兩翻權遂西擊黄祖祖横兩䝉衝釋名曰船狹而長曰䝉衝以衝突敵船挾守沔口以栟閭大紲繫石為矴栟閭椶櫚也郭璞曰落穫也中作器索栟卑盈翻紲音薛長繩也矴丁定翻錘舟石上有千人以弩交射飛矢雨下軍不得前偏將軍董襲與别部司馬凌統俱為前部各將敢死百人人被兩鎧乗大舸將即亮翻被皮義翻方言南楚江湘凡船大者謂之舸小者謂之艖舸嘉我翻突入䝉衝裏襲身以刀斷兩紲斷丁管翻䝉衝乃横流大兵遂進祖令都督陳就以水軍逆戰平北都尉吕䝉䝉自别部司馬以功為平北都尉勒前鋒親梟就首梟堅堯翻于是將士乗勝水陸並進𫝊其城傅讀曰附盡鋭攻之遂屠其城祖挺身走追斬之挺拔也虜其男女數萬口權先作兩函欲以盛祖及蘇飛首盛時征翻權為諸將置酒甘寧下席叩頭血涕交流為權言飛疇昔舊恩舊恩謂薦而不用又開之使奔吳也為于偽翻下同寧不值飛固已捐骸於溝壑不得致命於麾下今飛罪當夷戮特從將軍乞其首領權感其言謂曰今為君置之若走去何寧曰飛免分裂之禍受更生之恩逐之尚必不走豈當圖亡哉亡謂亡走若爾爾猶言如此也寧頭當代入函權乃赦之凌統怨寧殺其父操常欲殺寧權命統不得讐之令寧將兵屯於它所夏六月罷三公官復置丞相御史大夫漢初以丞相御史大夫太尉為三公哀帝元夀二年以大司馬大司徒大司空為三公中興以來以太尉司徒司空為三公今復置丞相御史而操自為丞相事權出于一矣癸巳以曹操為丞相操以冀州别駕從事崔琰為丞相西曹掾司空東曹掾陳留毛玠為丞相東曹掾元城令河内司馬朗為主簿弟懿為文學掾冀州主簿盧􅗱為法曹議令史别駕從事州牧行部則奉引錄衆事漢制公府西曹掾主府史署用東曹掾主二千石長吏遷除及軍吏黄閣主簿錄省衆事文學掾漢郡曹有之操於公府創置也法曹主郵驛科程事時公府諸曹皆置議令史元城縣屬魏郡毓植之子也琰玠並典選舉其所舉用皆清正之士雖於時有盛名而行不由本者終莫得進拔敦實斥華偽進冲遜抑阿黨行下孟翻冲謙虚也和也由是天下之士莫不以亷節自勵雖貴寵之臣輿服不敢過度至乃長吏還者垢面羸衣獨乗柴車軍吏入府朝服徒行長知兩翻朝直遙翻吏潔於上俗移於下操聞之歎曰用人如此使天下人自治吾復何為哉復扶又翻司馬懿少聰達多大略少詩沼翻崔琰謂其兄朗曰君弟聰亮明允剛斷英特斷丁亂翻非子所及也操聞而辟之懿辭以風痺痺必至翻濕病也操怒欲收之懿懼就職司馬懿始此操使張遼屯長社臨發軍中有謀反者夜驚亂起火一軍盡擾遼謂左右曰勿動是不一營盡反必有造變者欲以驚動人耳乃令軍中其不反者安坐遼將親兵數十人中陳而立將即亮翻陳讀曰陣有頃皆定即得首謀者殺之遼在長社于禁屯潁隂樂進屯陽翟三將任氣多共不恊共相與也操使司空主簿趙儼并參三軍每事訓諭遂相親睦初前將軍馬騰與鎮西將軍韓遂結為異姓兄弟晉職官志曰四鎮通于柔逺盖漢末始置也後以部曲相侵更為讐敵朝廷使司𨽻校尉鍾繇凉州刺史韋端和解之徵騰入屯槐里曹操將征荆州使張既説騰令釋部曲還朝説輸芮翻騰許之已而更猶豫既恐其為變乃移諸縣促儲偫偫直里翻二千石郊迎騰不得已發東發而東入朝也操表騰為衛尉安考異曰典畧曰建十五年徴騰為衛尉按張既傳曹公將征荆州今既説騰入朝盖三字誤為五耳以其子超為偏將軍統其衆悉徙其家屬詣鄴為後十七年族騰張本秋七月曹操南擊劉表八月丁未以光祿勲山陽郗慮為御史大夫郗丑脂翻姓譜郗為髙平望姓壬子太中大夫孔融弃市融恃其才望數戲侮曹操數所角翻發辭偏宕賢曰偏邪跌宕不拘正理予謂此偏非邪之謂言其論議抑揚有所偏重也宕徒浪翻過也多致乖忤忤五故翻操以融名重天下外相容忍而内甚嫌之融又上書宜準古王畿之制千里寰内不以封建諸侯操疑融所論建漸廣益憚之周禮方千里曰國畿其外方五百里曰侯畿鄭𤣥曰畿限也千里寰内不以封建則操不可以居鄴矣故憚之融與郗慮有隙慮承操風㫖構成其罪令丞相軍謀祭酒路粹軍師祭酒軍謀祭酒皆操所置奏融昔在北海建安初融為北海相見王室不靜而招合徒衆欲規不軌及與孫權使語謗訕朝廷使疏吏翻又前與白衣禰衡跌蕩放言賢曰跌蕩無儀檢也故縱也禰乃禮翻更相贊揚更工衡翻衡謂融曰仲尼不死融答顏回復生復扶又翻大逆不道宜極重誅操遂收融并其妻子皆殺之初京兆脂習與融善脂姓也魏畧脂習字元升後為中大夫每戒融剛直太過必罹世患及融死許下莫敢收者習往撫尸曰文舉舎我死孔融字文舉舎讀曰捨吾何用生為操收習欲殺之既而赦之初劉表二子琦琮琦居宜翻琮徂宗翻表為琮娶其後妻蔡氏之姪蔡氏遂愛琮而惡琦為于偽翻惡烏路翻表妻弟蔡瑁瑁莫報翻外甥張允並得幸于表日相與毁琦而譽琮譽音余琦不自寧與諸葛亮謀自安之術亮不對後乃共升髙樓因令去梯去羌吕翻謂亮曰今日上不至天下不至地言出子口而入吾耳可以言未亮曰君不見申生在内而危重耳居外而安乎申生晉獻公之太子為驪姬所譛自縊而死重耳申生之弟懼驪姬之讒出奔獻公卒後重耳入是為文公遂為覇主重直龍翻琦意感悟隂規出計㑹黄祖死琦求代其任表乃以琦為江夏太守夏户雅翻表病甚琦歸省疾省悉景翻瑁允恐其見表而父子相感更有託後之意乃謂琦曰將軍命君撫臨江夏其任至重今釋衆擅來必見遣怒傷親之歡重増其疾重直用翻非孝敬之道也遂遏於户外使不得見琦流涕而去表卒瑁允等遂以琮為嗣琮以侯印授琦琦怒投之地將因犇喪作難難乃旦翻會曹操軍至琦犇江南按劉備敗於當陽濟沔與琦㑹然後俱到夏口琦奔江南在劉琮降後史究其終言之章陵太守蒯越四親園廟在章陵時以為郡置守及東曹掾𫝊㢲等勸劉琮降操降户江翻下同曰逆順有大體强弱有定埶以人臣而拒人主逆道也以新造之楚而禦中國必危也以劉備而敵曹公不當也當如字言不敵也三者皆短將何以待敵且將軍自料何如劉備若備不足禦曹公則雖全楚不能以自存也若足禦曹公則備不為將軍下也琮從之韓考異曰范書陳志表傳皆云嵩亦説琮降按嵩時被囚必不預謀九月操至新野琮遂舉州降以節迎操節漢節也琮父表受之於漢諸將皆疑其詐婁圭曰天下擾擾各貪王命以自重今以節來是必至誠操遂進兵時劉備屯樊樊城在襄陽東北臨漢水周大夫樊仲山甫之邑也唐為襄州安養縣琮不敢告備備乆之乃覺遣所親問琮琮令官屬宋忠詣備宣㫖時曹操已在宛備乃大驚駭謂忠曰卿諸人作事如此不早相語語牛倨翻今禍至方告我不亦太劇乎劇甚也引刀向忠曰今斷卿頭斷丁管翻不足以解忿亦恥丈夫臨别復殺卿輩復扶又翻遣忠去乃呼部曲共議或勸備攻琮荆州可得備曰劉荆州臨亡託我以孤遺無父曰孤遺弃也言父母弃之而去故曰孤遺今人謂孤獨無所依仰者為孤遺背信自濟背蒲妹翻吾所不為死何面目以見劉荆州乎備將其衆去過襄陽將即亮翻過工禾翻下同駐馬呼琮琮懼不能起琮左右及荆州人多歸備備過辭表墓涕泣而去比到當陽比必寐翻當陽縣屬南郡衆十餘萬人輜重數千兩重直用翻兩音亮日行十餘里别遣闗羽乗船數百艘艘蘇刀翻使㑹江陵或謂備曰宜速行保江陵江陵南郡治所今雖擁大衆被甲者少被皮義翻少詩沼翻若曹公兵至何以拒之備曰夫濟大事必以人為本今人歸吾吾何忍弃去習鑿齒論曰劉𤣥徳雖顛沛險難而信義愈明難乃旦翻埶偪事危而言不失道追景升之顧則情感三軍戀赴義之士則甘與同敗終濟大業不亦宜乎劉琮將王威説琮曰説輸芮翻曹操聞將軍既降劉備已走必懈弛無備輕行單進若給威奇兵數千徼之於險操可獲也徼一遙翻獲操即威震四海非徒保守今日而已琮不納使琮用威言操其殆哉操以江陵有軍實軍實糧儲器械之類恐劉備據之乃釋輜重重直用翻輕軍到襄陽聞備已過操將精騎五千急追之一日一夜行三百餘里及於當陽之長坂當陽長坂在今荆門軍當陽縣東南百二十里荆州記云當陽縣東有櫟林長坂宋白曰漢當陽舊城在今縣北春秋傳楚伐麋頴容釋例曰麋當陽也孔頴達曰陂者曰坂陂彼寄翻又普羅翻李巡曰陂者謂髙峯山坡備棄妻子與諸葛亮張飛趙雲等數十騎走操大獲其人衆輜重徐庶母為操所獲庶辭備指其心曰本欲與將軍共圖王霸之業者以此方寸之地也今已失老母方寸亂矣無益於事請從此别遂詣操張飛將二十騎拒後拒後即古之殿也飛據水斷橋瞋目横矛曰身是張益徳也瞋七人翻自此迄于梁陳士大夫率自謂曰身張飛字益徳可來共决死操兵無敢近者或謂備趙雲已北走備以手㦸擿之曰子龍不弃我走也擿讀與擲同趙雲字子龍頃之雲身抱備子禪與闗羽船㑹得濟沔遇劉琦衆萬餘人與俱到夏口曹操進軍江陵以劉琮為青州刺史封列侯并蒯越等侯者凡十五人釋韓嵩之囚囚韓嵩事見六十三巻建安四年待以交友之禮使條品州人優劣皆擢而用之以嵩為大鴻臚蒯越為光祿勲劉先為尚書鄧羲為侍中荆州大將南陽文聘别屯在外琮之降也呼聘欲與俱聘曰聘不能全州當待罪而已操濟漢漢即沔也漢書地理志注曰東漢水受氐道水一名沔過江夏謂之夏水入江如淳曰漢中人謂漢水為沔水師古曰漢上曰沔祝穆曰天下之大川以漢名者二班固謂之東漢西漢而黎州之漢水源於飛越嶺者不與焉固之所謂東漢則禹貢之漾漢其源出于今興元之西縣嶓冢山逕洋金房均襄郢復至漢陽入江者是也西漢則蘇代所謂漢中之甲輕舟出于巴乗夏水下漢四日而至五渚者其源出于西和州徼外徑階沔州與嘉陵水㑹俗謂之西漢又徑大安軍利劒閬果合與涪水㑹至渝州入江聘乃詣操操曰來何遲邪聘曰先日不能輔弼劉荆州以奉國家荆州雖沒常願據守漢川保全土境生不負於孤弱死無愧於地下而計不在己以至于此實懐悲慙無顏早見耳遂歔欷流涕歔音虚欷許既翻又音希操為之愴然為于偽翻愴七亮翻字謂之曰仲業文聘字仲業卿真忠臣也厚禮待之使統本兵為江夏太守初袁紹在冀州遣使迎汝南士大夫西平和洽姓譜和本羲和之後一云卞和之後以為冀州土平民彊英桀所利不如荆州土險民弱易依倚也易以䜴翻遂從劉表表以上客待之洽曰所以不從本初辟爭地也辟讀曰避昏世之主不可黷近近其靳翻乆而不去讒慝將興遂南之武陵表辟南陽劉望之為從事而其友二人皆以讒毁為表所誅望之又以正諫不合投傳告歸傳株戀翻望之弟廙謂望之曰廙逸職翻又羊至翻趙殺鳴犢仲尼回輪史記孔子將西見趙簡子至河而聞竇鳴犢舜華之死臨河而歎曰丘之不濟命也夫子貢進曰何謂也孔子曰竇鳴犢舜華晉之賢大夫也趙簡子未得志之時須此兩人而後從政丘聞之刳胎殺天則麒麟不至竭澤涸漁則蛟龍不合隂陽覆巢毀卵則鳯凰不翔何則君子諱傷其類夫鳥獸之於不義也尚知避之而况乎丘哉乃還今兄既不能法栁下惠和光同塵於内栁下惠為士師三黜而不去孟子曰栁下惠不羞汙君不卑小官遺佚而不怨阨窮而不憫故曰爾為爾我為我雖袒裼祼裎於我側爾焉能凂我哉故由由然與之偕而不自失焉所謂和光同塵也則宜模范蠡遷化於外謂范蠡去越而扁舟五湖卒居於陶隨其所遷而自為變化也坐而自絶於時殆不可也望之不從尋復見害復扶又翻廙犇揚州南陽韓暨避袁術之命徙居山都山劉表又辟之遂遁居孱陵山都山在南陽郡山都縣孱陵縣屬武陵郡後劉備改曰公安賢曰孱陵故城在荆州公安縣西南孱士顔翻表深恨之暨懼應命除宜城長河東裴潛亦為表所禮重潛私謂王暢之子粲及河内司馬芝曰劉牧非霸王之才王于况翻乃欲西伯自處處昌吕翻其敗無日矣遂南適長沙于是操以暨為丞相士曹屬丞相府有户曹賊曹兵曹鎧曹士曹掾屬各一人兵鎧十三曹盖操置也潛參丞相軍事時方用兵故丞相府置參軍事職官分紀漢三公府有參軍事盖亦謂此時所置耳洽廙粲皆為掾屬漢公府並有掾屬東西曹掾比四百石餘曹比三百石其屬比二百石三公為天子之股肱掾屬則三公之喉舌魏晉置多者或數十人芝為菅令菅縣屬濟南郡應劭曰菅音姦恐考異曰粲傳曰太祖置酒漢濱粲奉觴賀云云按操劉備據江陵至襄陽即過日行三百里引用名士皆至江陵後所為不得更置酒漢濵恐誤從人望也冬十月癸未朔日有食之初魯肅聞劉表卒言於孫權曰荆州與國鄰接江山險固沃野萬里士民殷富若據而有之此帝王之資也今劉表新亡二子不協軍中諸將各有彼此謂有附琦者有附琮者劉備天下梟雄與操有隙梟堅堯翻前書張良曰九江王布楚梟將師古曰梟言最勇徤也有隙謂備欲殺操不遂也寄寓於表表惡其能而不能用也惡烏路翻若備與彼協心上下齊同則宜撫安與結盟好好呼到翻如有離違離違言人有離心互相違異也宜别圖之以濟大事肅請得奉命弔表二子并慰勞其軍中用事者及説備使撫表衆勞力到翻説輸芮翻下同同心一意共治曹操治直之翻備必喜而從命如其克諧天下可定也今不速往恐為操所先權即遣肅行到夏口聞操已向荆州晨夜兼道比至南郡比必寐翻而琮已降備南走肅徑迎之與備㑹于當陽長坂肅宣權㫖論天下事勢致殷勤之意且問備曰豫州今欲何至備先為豫州牧故以稱之備曰與蒼梧太守吳巨有舊欲往投之肅曰孫討虜聰明仁惠敬賢禮士江表英豪咸歸附之曹操表權為討虜將軍故稱之已據有六郡兵精糧多足以立事今為君計莫若遣腹心自結於東以共濟世業荆州在西吳在東世業猶言世事也而欲投吳巨巨是凡人偏在逺郡行將為人所併豈足託乎備甚悦肅又謂諸葛亮曰我子瑜友也即共定交子瑜者亮兄瑾也諸葛瑾字子瑜瑾渠吝翻避亂江東為孫權長史備用肅計進住鄂縣之樊口住止軍也水經注江水過鄂縣北而東流右得樊口樊山下寒溪水所注也陸游曰黄州與樊口正相對郡國志鄂縣屬江夏郡孫䇿破黄祖於此改曰武昌今夀昌軍是也通鑑以為孫權所改曹操自江陵將順江東下諸葛亮謂劉備曰事急矣請奉命求救於孫將軍遂與魯肅俱詣孫權亮見權於柴桑柴桑縣屬豫章郡晉置尋陽郡於江南即此柴桑縣地也今江州徳化縣西南九十里冇柴桑山説權曰説式芮翻海内大亂將軍起兵江東劉豫州收衆漢南與曹操共爭天下今操芟夷大難畧已平矣杜預曰芟刈也夷殺也芟所銜翻難乃旦翻下同遂破荆州威震四海英雄無用武之地故豫州遁逃至此願將軍量力而處之量音良處昌吕翻若能以吳越之衆與中國抗衡衡以取平上下相當無所卑屈曰抗不如蚤與之絶若不能何不按兵束甲北面而事之今將軍外托服從之名而内懐猶豫之計事急而不斷斷丁亂翻禍至無日矣權曰茍如君言劉豫州何不遂事之乎亮曰田横齊之壯士耳猶守義不辱事見十一卷漢髙帝五年况劉豫州王室之胄冑系也英才盖世衆士慕仰若水之歸海若事之不濟此乃天也安能復為之下乎復扶又翻權勃然曰勃然作色慍怒也吾不能舉全吳之地十萬之衆受制於人吾計决矣非劉豫州莫可以當曹操者然豫州新敗之後安能抗此難乎難乃旦翻亮曰豫州軍雖敗於長坂今戰士還者及闗羽水軍精甲萬人劉琦合江夏戰士亦不下萬人曹操之衆逺來疲敝聞追豫州輕車一日一夜行三百餘里此所謂强弩之末勢不能穿魯縞者也前書韓安國曰衝風之衰不能起毛羽强弩之末力不能入魯縞師古注曰縞素也曲阜之地俗善作之尤為輕細故以取喻也故兵法忌之曰必蹶上將軍兵法百里而趨利者蹶上將且北方之人不習水戰又荆州之民附操者偪兵埶耳非心服也今將軍誠能命猛將統兵數萬與豫州協規同力破操軍必矣操軍破必北還如此則荆吳之埶强鼎足之形成矣荆謂備吳謂權鼎足之形謂三分天下也成敗之機在於今日權大悦與其羣下謀之是時曹操遺權書曰遺于李翻近者奉辭伐罪旌麾南指劉琮束手今治水軍八十萬衆方與將軍㑹獵於吳治直之翻權以示臣下莫不響震失色長史張昭等曰曹公豺虎也挾天子以征四方動以朝廷為辭今日拒之事更不順且將軍大埶可以拒操者長江也今操得荆州奄有其地劉表治水軍䝉衝鬬艦乃以千數杜佑曰䝉衝以生牛皮䝉船覆背兩廂開掣棹孔左右有弩窗矛穴敵不得近矢石不能敗此不用大船務於速疾乗人之所不及非戰之船也鬭艦船上設女牆可高三尺牆下開製棹孔船内五尺又建棚與女牆齊棚上又建女牆重列戰敵上無覆背前後左右樹牙旗幟旛金鼓此戰船也艦户黯翻操悉浮以沿江兼有步兵水陸俱下此為長江之險已與我共之矣而埶力衆寡又不可論愚謂大計不如迎之魯肅獨不言權起更衣更工衡翻肅追於宇下韓詩曰屋霤為宇陸徳明曰屋四垂為宇又隤下曰宇考工記曰宇欲卑權知其意執肅手曰卿欲何言肅曰向察衆人之議專欲誤將軍不足與圖大事今肅可迎操耳如將軍不可也何以言之今肅迎操操當以肅還付鄉黨品其名位猶不失下曹從事下曹從事諸曹從事之最下者乗犢車晉志曰犢車牛車也古之貴者不乗牛車漢武帝推恩之末諸侯寡弱貧者至乗牛車其後稍貴之自靈獻以來天子至士遂為常乗從吏卒交游士林士林多士之林謂京邑大都四方賢士所聚也累官故不失州郡也將軍迎操欲安所歸乎願早定大計莫用衆人之議也權歎息曰諸人持議甚失孤望今卿廓開大計正與孤同時周瑜受使至番陽肅勸權召瑜還瑜已受命出使盖行未逺也使疏吏翻番蒲何翻瑜至謂權曰操雖託名漢相其實漢賊也相息亮翻將軍以神武雄才兼仗父兄之烈割據江東地方數千里兵精足用英雄樂業英雄之事猶樂其業言無它志也樂音洛當横行天下為漢家除殘去穢為于偽翻去羌吕翻况操自送死而可迎之邪請為將軍籌之為于偽翻下保為同今北土未平馬超韓遂尚在闗西為操後患而操舎鞍馬仗舟楫與吳越爭衡舎讀曰捨北人便於鞍馬南人便於舟楫言操舎長就所短今又盛寒馬無藁草説文曰禾莖為藁音工老翻驅中國士衆逺涉江湖之間不習水土必生疾病此數者用兵之患也而操皆冒行之將軍禽操宜在今日瑜請得精兵數萬人進住夏口前書地理志曰夏水過江夏郡入江水水經注曰黄鵠山東北對夏口城亦沙羨縣治盖齊梁之魯山城今之漢陽軍即其地所謂漢口也祝穆曰夏口一名魯口似指漢水之口然何尚之云夏口在荆江之中正對沔口而章懐太子亦謂夏口戍在鄂州故唐史皆指鄂州為夏口盖本在江北自孫權取對岸夏口之名以名之而江北之名始晦保為將軍破之權曰老賊欲廢漢自立久矣徒忌二袁吕布劉表與孤耳今數雄已滅惟孤尚存孤與老賊勢不兩立君言當擊甚與孤合此天以君授孤也因抜刀砍前奏案曰諸將吏敢復有言當迎操者與此案同言欲斬之也復扶又翻乃罷會是夜瑜復見權曰諸人徒見操書言水步八十萬而各恐懾不復料其虚實便開此議甚無謂也謂迎操之議也懾之涉翻今以實校之彼所將中國人不過十五六萬且已久疲將即亮翻所得表衆亦極七八萬耳尚懐狐疑夫以疲病之卒御狐疑之衆言新附之人心懐狐疑未能出死命而為之力戰也衆數雖多甚未足畏瑜得精兵五萬自足制之願將軍勿慮權撫其背曰公瑾卿言至此甚合孤心子布元表諸人秦松字文表元恐當作文各顧妻子挾持私慮深失所望獨卿與子敬與孤同耳魯肅字子敬此天以卿二人贊孤也五萬兵難卒合卒讀曰猝已選三萬人船糧戰具俱辦卿與子敬程公程公程普也時江東諸將普年最長人皆呼程公便在前發孤當續發人衆多載資糧為卿後援卿能辦之者誠决謂能辦操則誠為能决勝也邂逅不如意不期而㑹曰邂逅謂兵之勝負或有不如本心之所期者也便還就孤孤當與孟徳决之遂以周瑜程普為左右督將兵與備并力逆操將即亮翻以魯肅為贊軍校尉使之贊軍謀因以為官稱助畫方略劉備在樊口日遣邏吏於水次候望權軍邏即佐翻巡也吏望見瑜船馳往白備備遣人慰勞之勞力到翻瑜曰有軍任不可得委署委弃也署置也儻能屈威謂能自屈其威而來見誠副其所望備乃乗單舸往見瑜曰今拒曹公深為得計戰卒有幾舸古我翻幾居豈翻瑜曰三萬人備曰恨少少詩沼翻瑜曰此自足用豫州但觀瑜破之備欲呼魯肅等共㑹語瑜曰受命不得妄委署若欲見子敬可别過之過音戈詩云不我過杜甫詩吟詩許見過皆從平聲備深愧喜愧者自愧呼肅之非喜者喜瑜之整也進與操遇於赤壁水經注江水自沙羨而東右逕赤壁山北郡縣志赤壁山在蒲圻西百二十里北岸烏林與赤壁相對即周瑜用黄盖策焚曹公船處杜佑曰赤壁在鄂州蒲圻縣武昌志曰曹操自江陵追劉備至巴丘遂至赤壁遇周瑜兵大敗取華容道歸赤壁山在今嘉魚縣對江北之烏林巴丘今巴陵華容今石首也黄州赤壁非是今之華容縣則晉之安南縣也時操軍衆已有疾疫初一交戰操軍不利引次江北瑜等在南㟁瑜部將黄盖曰今冦衆我寡難與持久操軍方連船艦首尾相接可燒而走也乃取䝉衝鬬艦十艘艘蘇曹翻船之總名載燥狄枯柴灌油其中裹以帷幙上建旌旗豫備走舸繫於其尾杜佑曰走舸舷上立女牆置棹夫多戰卒少皆選勇力精鋭者往返如飛鷗乗人之所不及金鼓旗幟列之於上此戰船也先以書遺操遺于季翻詐云欲降降户江翻下同時東南風急盖以十艦最著前著直畧翻中江舉帆餘船以次俱進操軍吏士皆出營立觀指言盖降去北軍二里餘同時發火火烈風猛船往如箭燒盡北船延及岸上營落頃之烟炎張天炎與燄同以贍翻張知亮翻人馬燒溺死者甚衆瑜等率輕鋭繼其後靁鼓大震靁盧對翻疾擊鼓也北軍大壊操引軍從華容道步走華容縣屬南郡從此道可至華容縣也杜佑曰古華容在竟陵郡監利縣遇泥濘道不通濘乃定翻天又大風悉使羸兵負屮填之騎乃得過羸兵為人馬所蹈藉陷泥中死者甚衆羸倫為翻劉備周瑜水陸並進追操至南郡時操軍兼以飢疫死者大半操乃留征南將軍曹仁横野將軍徐晃守江陵横野大將軍光武以命王常折衝將軍樂進守襄陽折衝將軍始此引軍北還周瑜程普將數萬衆與曹仁隔江未戰甘寧請先徑進取夷陵往即得其城因入守之益州將襲肅舉軍降先取夷陵則與益州為鄰故襲肅舉軍以降襲姓肅名周瑜表以肅兵益横野中郎將吕䝉横野本將軍號以資序未至故為中郎將䝉盛稱肅有膽用且慕化逺來於義宜益不宜奪也權善其言還肅兵曹仁遣兵圍甘寧寧困急求救于周瑜諸將以為兵少不足分吕䝉謂周瑜程普曰留凌公績於江陵凌統字公績䝉與君行解圍釋急埶亦不久䝉保公績能十日守也瑜從之大破仁兵于夷陵獲馬三百匹而還于是將士形勢自倍瑜乃渡江屯北岸與仁相拒十二月孫權自將圍合肥合肥曹操置揚州刺史治焉時刺史已移治夀春征考異曰魏志武紀十二月權為備攻合肥公自江陵備至巴丘遣張喜救合肥權聞喜至乃走公至赤壁與備戰不利孫盛異同評曰按吴志備先破公軍然後權攻合肥而北紀云先攻合肥後有赤壁之事二者不同吴志為是又陳矯傳云陳登為權所圍于匡竒令矯求救於曹操而先賢行狀云登為䇿所圍按䇿始欲攻登未濟江已為許貢客所殺吴書云權征合肥命張昭别討匡奇於時陳矯已為曹仁長史又陳登年三十六而卒必已不在不知登之被圍果在何時也使張昭攻九江之當塗不克此古當塗縣也劉備表劉琦為荆州刺史引兵南徇四郡武陵太守金旋長沙太守韓𤣥桂陽太守趙範零陵太守劉度皆降廬江營帥靁緒率部曲數萬口歸備帥所類翻備以諸葛亮為軍師中郎將軍師亦古將軍號曹操初置軍師祭酒而備置軍師中郎將皆以一時軍事創置官名也然軍師祭酒止决軍謀中郎將則有兵柄亮後又進軍師將軍使督零陵桂陽長沙三郡調其賦税以充軍實調徒弔翻以偏將軍趙雲領桂陽太守益州牧劉璋聞曹操克荆州遣别駕張松致敬於操松為人短小放蕩然識達精果操時已定荆州走劉備不復存録松復扶又翻主簿楊修白操辟松操不納松以此怨歸勸劉璋絶操與劉備相結璋從之為後十六年璋迎備張本習鑿齒論曰昔齊桓一矜其功而叛者九國公羊傳曰葵丘之㑹桓公震而矜之叛者九國曹操暫自驕伐而天下三分皆勤之於數十年之内而弃之於俯仰之頃豈不惜乎曹操追念田疇功恨前聽其讓事見上十二年曰是成一人之志而虧王法大制也乃復以前爵封疇復扶又翻下同疇上疏陳誠以死自誓操不聽欲引拜之至於數四終不受有司劾疇狷介違道茍立小節宜免官加刑操下世子及大臣博議劾户槩翻又户得翻狷吉縣翻下遐稼翻世子丕以疇同於子文辭祿國語鬭旦曰楚成王聞子文之朝不及夕也以令尹秩之成王每出子文之禄必逃王止而又復人謂子文曰人生求富而子逃之何也對曰夫從政者以庇民也民多曠者而我取富焉是勤民以自封也死無日矣我逃死非逃富也申胥逃賞左傳吴破楚入郢申包胥如秦乞師立依庭牆而哭日夜不絶聲勺飲不入口者七日秦師乃出大敗吴師楚子入于郢賞申包胥包胥曰吾為君也非為身也君既定矣又何求遂逃賞宜勿奪以優其節尚書荀彧司𨽻校尉鍾繇亦以為可聽操猶欲侯之疇素與夏侯惇善操使惇自以其情喻之惇就疇宿而勸之疇揣知其指揣初委翻不復發言惇臨去固邀疇疇曰疇負義逃竄之人耳謂不能為劉虞報讐自竄於徐無山也䝉恩全活為幸多矣豈可賣盧龍之塞以易賞祿哉縱國私疇疇獨不愧於心乎將軍雅知疇者猶復如此若必不得已請願效死刎首於前言未卒刎武粉翻卒子恤翻涕泣横流惇具以答操操喟然知不可屈乃拜為議郎操幼子倉舒卒操傷惜之甚司空掾邴原女早亡操欲求與倉舒合𦵏原辭曰嫁殤非禮也未成人而死曰殤生未為配偶而死合𦵏故曰非禮原之所以自容於明公公之所以待原者以能守訓典而不易也若聽明公之命則是凡庸也明公焉以為哉焉於䖍翻操乃止孫權使威武中郎將賀齊虞預曰賀氏本姓慶氏齊伯父純安帝時為侍中避帝父孝徳皇帝諱改為賀氏討丹陽黟歙賊黟帥陳僕祖山等二萬户屯林厯山魏氏春秋曰丹陽郡黟縣有林厯山歙縣亦屬丹陽郡師古曰黟音伊歙音攝帥所類翻四面壁立不可得攻軍住經月齊隂募輕捷士於隱險處夜以銕戈拓山潛上上時掌翻下同縣布以援下人縣讀曰懸援于元翻引也得上者百餘人令分布四面鳴鼓角賊大驚守路者皆逆走還依衆大軍因是得上大破之權乃分其地為新都郡權分歙縣為徙新新定休陽黎陽并黝為六縣置新都郡晉武帝太康元年更名新安郡唐睦州是也皇宋改徽州以齊為太守資治通鑑巻六十五
