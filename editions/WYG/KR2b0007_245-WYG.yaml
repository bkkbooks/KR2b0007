front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷二百四十五宋司馬光撰胡三省音注唐紀六十一起閼逢攝提格盡彊圉大荒落凡四年文宗元聖昭獻孝皇帝中大和八年春正月上疾小瘳丁巳御太和殿按閣本大明宫圖入左銀臺門稍北即太和殿又西即清思殿見近臣然神識耗減不能復故二月壬午朔日有食之夏六月丙戌莒王紓薨紓順宗子紓山於翻上以乆旱詔求致雨之方司門員外郎李中敏上表以為仍歲大旱非聖德不至直以宋申錫之寃濫宋申錫事見上卷五年鄭注之姦邪今致雨之方莫若斬注而雪申錫表留中中敏謝病歸東都皆考異曰新舊中敏傳云六年夏上此䟽今據開成紀事大和摧兇記皆云八年六月又中敏䟽言申錫臨終按申錫去年七月卒若六年則申錫尚在今從開成紀事郯王經薨經亦順宗子初李仲言流象州事見二百四十三卷敬宗寳歴元年遇赦還東都㑹留守李逢吉思復入相復扶又翻仲言自言與鄭注善逢吉使仲言厚賂之注引仲言見王守澄守澄薦於上云仲言善易上召見之時仲言有母服難入禁中乃使衣民服衣於既翻號王山人仲言儀狀秀偉倜儻尚氣倜他厯翻倜儻不覊也史炤曰卓異貎頗工文辭有口辨多權數上見之大恱以為竒士待遇日隆舊考異曰傳李訓初名仲言居洛中李逢吉為留守思入相訓揣知其意即以竒計動之自言與鄭注善逢吉遺訓金帛珍寳數百萬令持入長安以賂注又曰初注搆宋申錫事帝深惡之欲令京兆尹杖殺至是以藥稍效始善遇之獻替記曰先是上惡鄭注極甚甞謂樞密使曰卿知有善和端公無歎京兆尹懦弱不能斃於枯木開成紀事曰訓除名流象州㑹恩歸於東洛投謁諸處困乏逢吉叱之不顧㑹鄭注賔副上黨路經東都于道投之廣以古今義烈披述𠂻欵注本兇邪趨而附之自此豁然相然諾情契稠疊及注徴赴闕訓隨而到京别第安置注因陳奏言訓文學優盛無比上納之太和八年三月以布衣在翰林注之援也甘露記曰訓為人長大美貎口辯無前常以英雄自任㑹鄭注介工黨出洛陽訓慨然太息曰當世操權力者握齪苛細無足與言吾聞鄭注為人好義而求竒士且通於内官易為因緣乃徃說之注見訓大驚如舊相識遂結為死交及注赴闕請訓行京師為卜居供給日夕徃來乘間奏於上按實錄去年九月李欵彈鄭注云前邠州行軍司馬今年九月庚申王守澄宣召鄭注對於浴堂門獻替記八年春暮上對宰臣歎天下無名醫便及鄭注精於服食或欲置於技術或欲令為神䇿判官注皆不願此職守澄遂託從諫奏為行軍司馬又云去歲春夏李仲言猶䘮母已潛入城稱王山人兩度對於含元殿今年八月十三日欲與諫官至九月三日鄭注自絳州至便於宣徽對然則訓自去年已因注謁守澄得見上注今年暮春方從昭義辟然則訓舊與注善去春已入長安見上非注赴昭義時始定交亦非去年十一月徴注於潞州又非訓隨注到京也今從實錄獻替記仲言既除服秋八月辛夘上欲以仲言為諫官寘之翰林李德裕曰仲言曏所為計陛下必盡知之豈宜寘之近侍兩省官皆近侍也上曰然豈不容其改過對曰臣聞惟顔囘能不貳過彼聖賢之過但思慮不至或失中道耳至於仲言之惡著於心本安能悛改邪著直畧翻悛丑緣翻心本猶言心根也上曰李逢吉薦之朕不欲食言對曰逢吉身為宰相乃薦姦邪以誤國亦罪人也上曰然則别除一官對曰亦不可上顧王涯涯對曰可德裕揮手止之上囘顧適見色殊不懌而罷始涯聞上欲用仲言草諫䟽極憤激既而見上意堅且畏其黨盛遂中變尋以仲言為四門助教四門助教從八品給事中鄭肅韓佽封還敕書佽七四翻德裕將出中書謂涯曰且喜給事中封敕涯即召肅佽謂曰李公適留語令二閣老不用封敕留語謂將出之時所留下言語也兩省官相呼曰閣老二人即行下書牘而行下之也行户稼翻明日以白德裕德裕驚曰德裕不欲封還當面聞何必使人傳言且有司封駮駮比角翻豈復禀宰相意邪復扶又翻二人悵恨而去九月辛亥徴昭義節度副使鄭注至京師去年鄭注出佐昭義軍事見上卷王守澄李仲言鄭注皆惡李德裕以山南西道節度使李宗閔與德裕不相恱引宗閔以敵之壬戌詔徴宗閔於興元惡烏路翻李宗閔出帥興元見上卷元年興元府至京師一千二百二十三里冬十月辛巳幽州軍亂逐節度使楊志誠及監軍李懷仵仵疑古翻推兵馬使史元忠主留務庚寅以李宗閔為中書侍郎同平章事甲午以中書侍郎同平章事李德裕同平章事充山南西道節度使是日以李仲言為翰林侍講學士給事中髙銖鄭肅韓佽諫議大夫郭承嘏中書舍人權璩等争之不能得承嘏晞之孫晞郭子儀之子璩德輿之子也權德輿元和初為相璩求於翻乙巳貢院奏進士復試詩賦從之唐尚書省在朱雀門北正街之東自占一坊六部附麗其旁省前一坊别有禮部南院即貢院也罷詩賦見上卷上年李德裕罷相故復之李德裕見上自陳請留京師丙午以德裕為兵部尚書楊志誠過太原李載義自毆擊欲殺之楊志誠逐載義見上卷五年毆烏口翻幕僚諫救得免殺其妻子及從行將卒朝廷以載義有功不問李載義有平倉景之功將即亮翻載義母兄葬幽州志誠𤼵取其財載義奏乞取志誠心以祭母不許十一月成德節度使王庭湊薨軍中奉其子都知兵馬使元逵知留後元逵改父所為事朝廷禮甚謹史元忠獻楊志誠所造衮衣及諸僭物丁夘流志誠於嶺南道殺之李宗閔言李德裕制命己行不宜自便以德裕自請留京師也乙亥復以德裕為鎭海節度使不復兼平章事復扶又翻時德裕宗閔各有朋黨互相擠援非其黨則相擠同黨則相援擠子西翻又子細翻援于元翻又于春翻上患之每歎曰去河北賊易去朝廷朋黨難去羌呂翻下同臣光曰夫君子小人之不相容猶氷炭之不可同器而處也故君子得位則斥小人小人得勢則排君子此自然之理也然君子進賢退不肖其處心也公其指事也實小人譽其所好毁其所惡處昌呂翻譽音余好呼到翻惡烏路翻其處心也私其指事也誣公且實者謂之正直私且誣者謂之朋黨在人主所以辨之耳是以明主在上度德而叙位量能而授官荀卿子之言度徒洛翻量音良有功者賞有罪者刑奸不能惑佞不能移夫如是則朋黨何自而生哉彼昏主則不然明不能燭彊不能斷斷丁亂翻邪正並進毁譽交至取捨不在於己威福潛移於人於是讒慝得志而朋黨之議興矣夫木腐而蠧生醯酸而蜹集蜹而鋭翻故朝廷有朋黨則人主當自咎而不當以咎羣臣也文宗茍患羣臣之朋黨何不察其所毁譽者為實為誣譽音余所進退者為賢為不肖其心為公為私其人為君子為小人茍實也賢也公也君子也匪徒用其言又當進之誣也不肖也私也小人也匪徒棄其言又當刑之如是雖驅之使為朋黨孰敢哉釋是不為乃怨羣臣之難治治直之翻是猶不種不芸而怨田之蕪也朝中之黨且不能去况河北賊乎温公此論為熈豐𤼵也丙子李仲言請改名訓幽州奏莫州軍亂刺史張元汎不知所在十二月己夘以昭義節度副使鄭注為太僕卿郭承嘏累上䟽言其不可上不聽于是注詐上表固辭上遣中使再以告身賜之不受史極言鄭注之姦狀癸未以史元忠為盧龍留後奏考異曰實録十一月鎭州幽州留後史元忠為􅘵莫三軍逐出不知所在後不言元忠復歸幽州而至此有新命蓋因莫州軍亂鎭州承傳聞之誤而奏之耳初宋申錫與御史中丞宇文鼎受密詔誅鄭注使京兆尹王璠掩捕之璠密以堂帖示王守澄帖由政事堂出故謂之堂帖璠孚袁翻注由是得免深德璠璠又與李訓善于是訓注共薦之自浙西觀察使徴為尚書左丞王璠之險躁自可以得禍史言其預甘露之難亦有所自來九年春正月乙夘以王元逵為成德節度使巢公湊薨追贈齊王漳王湊貶巢公事見上卷五年鄭注上言秦地有災宜興役以禳之辛夘𤼵左右神䇿千五百人浚曲江及昆明池雍錄唐曲江本秦隑州至漢為樂遊苑基地最髙四望寛敞隋營京城宇文愷以其地在京城東南隅地髙不便故闕此地不為居人坊巷而鑿為池以厭勝之又㑹黄渠水自城外南來故隋世遂從城外包之入城為芙蓉池且為芙蓉園也漢武帝時池周囘六里餘唐周七里占地三千頃又加展拓矣其地在城東南昇道坊龍華寺之南昆明池漢武帝所鑿在長安西南周囘四十里三輔故事曰池周三百二十頃長安志曰今為民田夫既可以為民田則非有水之地矣然則漢於何取水也長安志引水經曰交水西至石堨武帝穿昆明池所造有石闥堰在縣西南三十二里則昆明之周三百餘頃者用此堰之水也昆明基髙故其下流尚可壅激以為都城之用於是並城䟽别三𣲖城内外皆賴之此池仍在括地志曰豐鎬二水皆已堰入昆明池無復流𣲖括地志作於太宗之世則唐初仍自壅堰不廢至文宗而猶嘗加濬也然則圖經之作當在文宗後故竭而為田也三月冀王絿薨緑順宗子丙辰以史元忠為盧龍節度使初李德裕為浙西觀察使漳王傅母杜仲陽坐宋申錫事放歸金陵詔德裕存處之㑹德裕已離浙西傅母女師也處昌呂翻離力智翻牒留後李蟾使如詔㫖德裕自浙西徵見上卷三年鎭蜀見四年宋申錫事見五年繋年差殊當考至是左丞王璠户部侍郎李漢奏德裕厚賂仲陽隂結漳王圖為不軌上怒甚召宰相及璠漢鄭注等面質之璠漢等極口誣之路隋曰德裕不至有此果如所言臣亦應得罪言者稍息夏四月以德裕為賔客分司癸巳以鄭注守太僕卿兼御史大夫注始受之仍舉倉部貟外郎李欵自代曰加臣之罪雖於理而無辜在欵之誠乃事君而盡節欵奏注見上卷上年注考異記曰時論或云欵外沽直名而隂事注按欵彈之文皆訐其隠慝豈有於人如此而能隂與之合乎此皆當時庸人見注舉欵自代遂有此疑耳今不取時人皆哂之笑不壞顔為哂丙申以門下侍郎同平章事路隋充鎭海節度使趣之赴鎭趣讀曰促不得靣辭坐救李徳裕故也傳考異曰舊隋曰德裕貶袁州長史隋不署奏狀始為鄭注所忌出鎮浙西按實錄隋出鎮在德裕貶前四日今不取初京兆尹河南賈餗餗蘓谷翻性褊躁輕率與李德裕有隙而善於李宗閔鄭注上已賜百官宴於曲江古者上巳正用三月之上巳日自魏以後但用三月三日不復用已唐貞元間置三令節使百官選勝行樂三月三日其一也故事尹於外門下馬揖御史餗恃其貴勢乘馬直入殿中侍御史楊儉蘇特與之争餗罵曰黄靣兒敢爾坐罰俸餗耻之求出詔以為浙西觀察使尚未行戊戌以餗為中書侍郎同平章事庚子制以曏日上初得疾謂七年冬也王涯呼李德裕奔問起居德裕竟不至又在西蜀徴逋懸錢三十萬緍百姓愁困貶德裕袁州長史初宋申錫獲辠事見上卷五年宦官益横横户孟翻上外雖包容内不能堪李訓鄭注既得幸揣知上意訓因進講數以微言動上揣初委翻數所角翻上見其才辨意訓可與謀大事且以訓注皆因王守澄以進冀宦官不之疑遂密以誠告之訓注遂以誅宦官為己任時考異曰舊傳以為上出易義以示羣臣之已與訓有誅宦官之謀按補國史云許康佐進新注春秋列國經傳六十卷上問閽弑吳子餘祭事康佐託以春秋義奥臣窮究未精不敢容易解陳後上以問李仲言仲言乃精為上言之工曰朕左右刑臣多矣餘祭之禍安得不慮仲言曰陛下留意於未萌臣願遵聖謀實録今年四月癸亥許康佐進纂集左氏傳三十卷五月乙巳朔以御集左氏列國經傳三十卷宣付史館然則上與訓謀誅宦官必在此際矣然文宗與訓語時宦官必盈左右恐亦未敢班班顯言如補國史所云也二人相挾朝夕計議所言於上無不從聲勢炟赫炟當割翻一作烜况逺翻注多在禁中或時休沐賔客填門賂遺山積遺唯季翻外人但知訓注倚宦官擅作威福不知其與上有密謀也上之立也右領軍將軍興寜仇士良有功興寜漢龍川縣地江左置興寜縣唐屬循州王守澄抑之由是有隙訓注為上謀為于偽翻進擢士良以分守澄之權五月乙丑以士良為左神䇿中尉出韋元素以士良代之守澄不恱戊辰以左丞王璠為户部尚書判度支京城訛言鄭注為上合金丹合音閤須小兒心肝民間驚懼上聞而惡之惡烏路翻下同鄭注素惡京兆尹楊虞卿與李訓共搆之云此語出於虞卿家人上怒六月下虞卿御史獄下户嫁翻注求為兩省官中書侍郎同平章事李宗閔不許注毁之於上㑹宗閔救楊虞卿上怒叱出之壬寅貶明州刺史明州後漢鄮縣地唐開元二十六年置明州京師東南四千三百里左神䇿中尉韋元素樞密使楊承和王踐言居中用事與王守澄争權不叶李訓鄭注因之出承和於西川元素於淮南踐言於河東皆為監軍秋七月甲辰朔貶楊虞卿䖍州司馬䖍州漢贑縣晉置南康郡隋為䖍州京師東南四千一十七里庚戌作紫雲樓於曲江紫雲樓在曲江之南洊經喪亂頺圯不修今再作之辛亥以御史大夫李固言為門下侍郎同平章事李訓鄭注為上畫太平之䇿為于偽翻以為當先除宦官次復河湟次清河北開陳方畧如指諸掌上以為信然寵任日隆初李宗閔為吏部侍郎因駙馬都尉沈􅔲結女學士宋若憲知樞密楊承和得為相􅔲宜寄翻宋若憲姊妹皆善屬文德宗召入宫不以妾侍命之呼學士及貶明州鄭注𤼵其事壬子再貶處州長史代宗大厯十四年改括州為處州京師東南四千二百七十八里著作郎分司舒元輿與李訓善訓用事召為右司郎中兼侍御史知雜鞫楊虞卿獄唐制侍御史六人以乆次者一人知雜事謂之知雜癸丑擢為御史中丞元輿元褒之兄也舒元褒見上卷五年貶吏部侍郎李漢為汾州刺史刑部侍郎蕭澣為遂州刺史汾州漢文帝封代王都中都即其地去京師一千二百六里遂州本漢德陽縣之舊壘東晉置遂寜郡後周置遂州去京師二千三百二十九里皆坐李宗閔之黨是時李訓鄭注連逐三相三相李德裕路隋李宗閔威震天下於是生平絲恩髪怨無不報者李訓奏僧尼猥多耗蠧公私丁巳詔所在試僧尼誦經不中格者皆勒歸俗中竹仲翻禁置寺及私度人時人皆言鄭注朝夕且為相侍御史李甘揚言於朝曰白麻出我必壞之於庭壞音怪癸亥貶甘封州司馬異考曰舊傳曰鄭注入翰林侍講舒元輿既作相注亦求入中書甘昌言於朝云云貶封州按是時元輿未作相舊傳誤也然李訓亦忌注不欲使為相事竟寢甲子以國子博士李訓為兵部郎中知制誥依前侍講學士貶左金吾大將軍沈􅔲為邵州刺史八月丙子又貶李宗閔潮州司户賜宋若憲死丁丑以太僕卿鄭注為工部尚書充翰林侍講學士注好服鹿裘以隠淪自處處昌呂翻上以師友待之注之初得幸上嘗問翰林學士户部侍郎李珏曰卿知有鄭注乎亦嘗與之言乎對曰臣豈特知其姓名兼深知其為人其人奸邪陛下寵之恐無益聖德臣忝在近宻安敢與此人交通戊寅貶珏江州刺史再貶沈􅔲栁州司户江州京師東南二千九百四十八里丙申詔以楊承和庇䕶宋申錫韋元素王踐言與李宗閔李德裕中外連結受其賂遺遺唯季翻承和可驩州安置元素可象州安置踐言可恩州安置令所在錮送錮送者枷錮而防送之象州至京師四千九百八十九里恩州至京師六千五百里楊虞卿李漢蕭澣為朋黨之首貶虞卿䖍州司户漢汾州司馬澣遂州司馬尋遣使追賜承和元素踐言死韋元素卒如李𢎞楚之言時崔潭峻已卒亦剖棺鞭尸己亥以前廬州刺史羅立言為司農少卿立言贓吏以賂結鄭注而得之鄭注之入翰林也中書舍人髙元裕草制言以醫藥奉君親注銜之奏元裕嘗出郊送李宗閔壬寅貶元裕閬州刺史閬州古巴子國秦為閬中縣西魏為隆州唐先天中避諱改閬州至京師一千九百二十五里元裕士廉之六世孫也髙士廉長孫無忌之舅事髙祖太宗時注與李訓所惡朝士皆指目為二李之黨惡烏路翻二李謂德裕宗閔貶逐無虚日班列殆空廷中洶洶上亦知之訓注恐為人所揺九月癸夘朔勸上下詔應與德裕宗閔親舊及門生故吏今日以前貶黜之外餘皆不問人情稍安鹽鐵使王涯奏改江淮嶺南茶法增其税德宗貞元九年初税茶於出茶州縣及茶山外商人要路委所由定三等時估每十税一長慶元年鹽鐵使王播奏茶税一百增之五十今又改法而增其税愈重矣庚申以鳳翔節度使李聽為忠武節度使代杜悰憲宗之崩也人皆言宦官陳𢎞志所為見二百四十一卷元和十五年時𢎞志為山南東道監軍李訓為上謀召之至青泥驛訓為于偽翻青泥驛在嶢關南癸亥封杖殺之内考異曰舊傳曰李訓既秉權衡即謀誅豎陳𢎞慶自元和末負弑逆之名遣人封杖决殺按此時李訓未為相今從實錄鄭注求為鳳翔節度使門下侍郎同平章事李固言不可丁夘以固言為山南西道節度使望考異曰宋敏求宣宗實錄曰固言性狷急無重時訓注用事雖相之中實惡與宗閔為黨乃出為興元節度按固言鍛鍊楊虞卿獄宗閔由是罷相而固言代之豈得為宗閔黨也今從開成紀事注為鳳翔節度使擢考異曰開成紀事注引舒元輿李訓俱相庭注自詣宰臣李固言求鳳翔節度使固言剛勁不許惟王涯賈餗賛從其事九月二十五日紀事誤今從實錄李訓雖因注得進及埶位俱盛心頗忌注謀欲中外協埶以誅宦官故出注於鳳翔其實俟既誅宦官并圗注也注欲取名家才望之士為參佐請禮部員外郎韋温為副使節度副使也温不可或曰拒之必為患温曰擇禍莫若輕拒之止於逺貶從之有不測之禍卒辭之卒子恤翻戊辰以右神䇿中尉行右衞上將軍知内侍省事王守澄為左右神䇿觀軍容使兼十二衞統軍唐因隋制置十六衞以十二衞統諸府之兵曰左右衞曰左右驍騎衞曰左右武衞曰左右威衞曰左右領軍衞曰左右候衞至開元間府兵之法寖壞乃募彍騎十二萬分𨽻十二衞每衞萬人其後洊更䘮亂十二衞之軍無復承平之舊李訓鄭注為上謀以虚名尊守澄實奪之權也為于偽翻下同己巳以御史中丞兼刑部侍郎舒元輿為刑部侍郎兵部郎中知制誥充翰林侍講學士李訓為禮部侍郎並同平章事仍命訓二三日一入翰林講易元輿為中丞凡訓注所惡者則為之弹擊惡烏路翻由是得為相又上懲李宗閔李德裕多朋黨以賈餗及元輿皆孤寒新進餗少孤客江淮間元輿地寒不與士齒故擢為相庶其無黨耳訓起流人期年致位宰相期讀曰朞天子傾意任之訓或在中書或在翰林天下事皆决於訓王涯輩承順其風指惟恐不逮自中尉樞密禁衞諸將見訓皆震慴迎拜叩首慴之渉翻壬申以刑部郎中兼御史知雜李孝本權知御史中丞孝本宗室之子依訓注得進李聽自恃勲舊不禮於鄭注注代聽鎮鳳翔先遣牙將丹駿至軍中慰勞丹姓駿名姓譜丹朱之後勞力到翻誣奏聽在鎮貪虐冬十月乙亥以聽為太子太保分司復以杜悰為忠武節度使鄭注每自負經濟之畧上問以富人之術注無以對乃請𣙜茶於是以王涯兼𣙜茶使𣙜古岳翻涯知不可而不敢違人甚苦之鄭注欲收僧尼之譽固請罷沙汰從之是年七月李訓乞沙汰僧尼李訓鄭注密言於上請除王守澄辛巳遣中使李好古就第賜酖殺之好呼到翻贈楊州大都督訓注本因守澄進注事見二百二十三卷穆宗長慶三年訓事見上八年卒謀而殺之卒子恤翻人皆快守澄之受佞而疾訓注之隂狡於是元和之逆黨畧盡矣乙酉鄭注赴鎮庚子以東都留守司徒兼侍中裴度兼中書令餘如故李訓所奬拔率皆狂險之士然亦時取天下重望以順人心如裴度令狐楚鄭覃皆累朝耆俊乆為當路所軋朝直遙翻軋乙轄翻置之散地散悉但翻訓皆引居崇秩由是士大夫亦有望其真能致太平者不惟天子惑之也然識者見其横甚横户孟翻知將敗矣十一月丙午以大理卿郭行餘為邠寜節度使癸丑以河東節度使同平章事李載義兼侍中丁巳以户部尚書判度支王璠為河東節度使戊午以京兆尹李石為户部侍郎判度支以京兆少尹羅立言權知府事石神符之五世孫也襄邑王神符淮安王神通之弟己未以太府卿韓約為左金吾衞大將軍始鄭注與李訓謀至鎮選壯士數百皆持白棓懷其斧以為親兵棓蒲項翻白棓猶言白梃也是月戊辰王守澄葬於滻水雍録滻水源出藍田縣境之西稍北行至白鹿原西即趨京城王守澄蓋葬於白鹿原西南注奏請入䕶葬事因以親兵自隨仍奏令内臣中尉以下盡集滻水送葬注因闔門令親兵斧之使無遺類約既定訓與其黨謀如此事成則注專有其功不若使行餘璠以赴鎮為名多募壯士為部曲并用金吾臺府吏卒先期誅宦者先悉薦翻已而并注去之去羌呂翻行餘璠立言約及中丞李孝本皆訓素所厚也故列置要地獨與是數人及舒元輿謀之他人皆莫之知也壬戌上御紫宸殿百官班定韓約不報平安唐制凡朝皇帝既升御座金吾將軍奏左右廂内外平安奏稱左金吾聽事後石榴夜有甘露臣逓門奏訖言夜中聞奏禁門已扁於隔門逓入以奏也因蹈舞再拜宰相亦帥百官稱賀帥讀曰率下同訓元輿勸上親往觀之以承天貺上許之百官退班於含元殿紫宸内殿也含元前殿也上欲往觀甘露故百官自紫宸退而出立班於含元殿以左右金吾仗在含元殿前左右也日加辰上乘軟輿出紫宸門軟輿蓋以裀褥積而為之下施掆令人舉之升含元殿先命宰相及兩省官詣左仗視之良乆而還還音旋又如字訓奏臣與衆人驗之殆非真甘露未可遽宣布瑞考異曰按訓與韓約共謀詐為甘露而自言非真者蓋欲使宦官盡往金吾覆視因伏兵誅之耳故二十二日令狐楚所草制書亦云兇渠仍請共覆視今從實録恐天下稱賀上曰豈有是邪顧左右中尉仇士良魚志𢎞帥諸宦者往視之帥讀曰率宦者既去訓遽召郭行餘王璠曰來受敕㫖璠股栗不敢前獨行餘拜殿下時二人部曲數百皆執兵立丹鳳門外訓已先使入召之令入受敕獨東兵入河東兵也東上逸河字邠寜兵竟不至仇士良等至左仗視甘露韓約變色流汗士良怪之曰將軍何為如是俄風吹幕起見執兵者甚衆又聞兵仗聲士良等驚駭走出門者欲閉之士良叱之關不得上關門牡也上時掌翻下來上同士良等奔詣上告變訓見之遽呼金吾衛士來上殿衛乘輿者人賞錢百緍宦者曰事急矣請陛下還宫即舉軟輿迎上扶升輿决殿後罘罳疾趨北出唐宫殿中罘罳以絲為之狀如網以捍燕雀非如漢宫闕之罘罳也今諸宦者能决之而出則可知矣程大昌曰罘罳者鏤木為之其中䟽通可以透明或為方空或為連鎻其狀扶䟽故曰罘罳讀如浮思猶曰䯱髵也因其形似而想其夲狀自可見矣罘罳之名既立於是隨其所施而附著以為之名其在宮闕則為闕上罘罳臣朝於君至闕下復思所奏是也在陵垣則為陵上罘罳王莽斫去陵上罘罳而曰使人無復思漢者是也却而求之上古則禮記䟽屏亦其物也䟽者刻為雲氣而中空玲瓏也又有網户刻為連文逓為綴屬其形如網也宋玉曰網户朱綴刻方連是也既曰刻則是雕木為之其狀如網耳後人因此遂有直織絲網而張之簷忩以䕶禽雀者文宗甘露之變出殿北門裂斷罘罳而去是真網也此又㳂放楚辭而施網焉者也元微之謂承㫖時詩曰蘂珠深處少人知網索西臨太液池浴殿曉開天語後歩廊騎馬笑相隨自注云網索在太液池上學士候對歇於此予按網索乃是無壁或有窓處以索掛網遮䕶飛雀故云網索猶掛鈴之索為鈴索也宋元獻喜子京召還為學士詩曰網索軒窓䆳鑾坡羽衛重用微之句也若並今世俗語求之則門屏鏤明格子其制與青鎻同類顧所施之地不同而名亦隨異耳訓攀輿呼曰呼火故翻臣奏事未竟陛下不可入宫金吾兵已登殿羅立言帥京兆邏卒三百餘自東來邏郎佐翻李孝本帥御史臺從人二百餘自西來從才用翻皆登殿縱擊宦官流血呼寃死傷者十餘人乘輿迤邐入宣政門迤移爾翻邐力爾翻宣政門宣政殿門也訓攀輿呼益急上叱之宦者郗志榮奮拳毆其胷偃於地郗丑之翻毆烏口翻偃者偃仰而仆也乘輿既入門隨闔宦者皆呼萬歲百官駭愕散出訓知事不濟脫從吏緑衫衣之衣於既翻走馬而出揚言於道曰我何罪而竄謫人不之疑王涯賈餗舒元輿還中書相謂曰上且開延英召吾屬議之兩省官詣宰相請其故皆曰不知何事諸公各自便士良等知上豫其謀怨憤出不遜語上慙懼不復言士良等命左右神䇿副使劉泰倫魏仲卿等各帥禁兵五百人露刃出閤門討賊復扶又翻帥讀曰率王涯等將㑹食諸宰相每日㑹食於政事堂吏白有兵自内出逢人輙殺涯等狼狽歩走兩省及金吾吏卒千餘人填門争出門尋闔其不得出者六百餘人皆死士良等分兵閉宫門索諸司捕賊黨索下客翻下同諸司吏卒及民酤販在中者皆死死者又千餘人横尸流血狼藉塗地諸司印及圖籍帷幕器皿俱盡又遣騎各千餘出城追亡者又遣兵大索城中舒元輿易服单騎出安化門安化門長安南靣西頭第一門禁兵追擒之王涯徒歩至永昌里茶肆禁兵擒入左軍涯時年七十餘被以桎梏掠治不勝苦被皮義翻桎職日翻梏古沃翻掠音亮治直之翻勝音升自誣服稱與李訓謀行大逆尊立鄭注王璠歸長興里私第閉門以其兵自防河東節度之兵也神䇿將至門呼曰王涯等謀反欲起尚書為相魚䕶軍令致意魚𢎞志時為左神䇿䕶軍中尉將即亮翻璠喜出見之將趨賀再三將即亮翻璠知見紿涕泣而行至左軍見王涯曰二十兄自反胡為見引涯曰五弟昔為京兆尹不漏言於王守澄王涯第二十王璠第五漏言事見工卷五年豈有今日邪璠俛首不言又收羅立言於太平里及涯等親屬奴婢皆入兩軍繫之户部貟外郎李元臯訓之再從弟也訓實與之無恩亦執而殺之故嶺南節度使胡証家鉅富証音正禁兵利其財託以搜賈餗入其家執其子溵殺之溵音殷又入左常侍羅讓詹事渾鐬翰林學士黎埴等家左常侍左散騎常侍也鐬火外翻掠其貲財掃地無遺鐬瑊之子也坊市惡少年因之報私仇殺人剽掠百貨剽匹妙翻互相攻刼塵埃蔽天癸亥百官入朝朝直遙翻日出始開建福門建福門在大明宫丹鳳門之右惟聽以從者一人自隨從才用翻禁兵露刃夾道至宣政門尚未開時無宰相御史知班百官無復班列新書儀衞志曰朝日殿上設黼扆躡席熏爐香案御史大夫領屬官至殿西廡從官朱衣傳呼促百官就列文武班於兩觀監察御史二人立於東西朝堂甎道以涖之平明傳㸃畢内門開監察御史領百官入夾堦監門校尉二人執門籍曰唱籍既視籍曰在入畢而止次門亦如之序班於通乾觀象門南武班居文班之次入宣政門文班自東門而入武班自西門而入至閤門亦如之夾堦校尉十人同唱入畢而止宰相兩省官對班於香案前百官班於殿庭左右廵使二人分涖於鼔鍾樓下先一品班次二品班次三品班次四品班次五品班每班尚書省官為首武班供奉者立於横街之北次千牛中郎將次千牛將軍次過狀中郎將一人次接狀中郎將一人次押柱中郎將一人次排階中郎將一人次押散手仗中郎將一人次左右金吾衞大將軍凡殿中省監少監尚夜尚舍尚輦奉御分左右隨繖扇而立東宫官居上臺之次王府官又次之唯三太三少賓客庶子王傳隨本品侍中奏外辦皇帝歩出西序門索扇扇合皇帝升御座扇開左右留扇各三左右金吾將軍一人奏左右廂内外平安通事舍人賛宰相兩省官再拜升殿朝罷皇帝歩入東序門觀此可以知甘露之亂蕩無朝儀矣上御紫宸殿問宰相何為不來仇士良曰王涯等謀反繫獄因以涯手狀呈上召左僕射令狐楚右僕射鄭覃等升殿示之上悲憤不自勝勝音升謂楚等曰是涯手書乎對曰是也誠如此罪不容誅因命楚覃留宿中書參决機務使楚草制宣告中外楚叙王涯賈餗反事浮汎其叙事浮汎蓋以王涯等非實反也仇士良等不恱由是不得為相時坊市剽掠者猶未止命左右神䇿將楊鎮靳遂良等各將五百人分屯通衢靳居焮翻擊鼓以警之斬十餘人然後定賈餗變服潛民間經宿自知無所逃素服乘驢詣興安門自言我宰相賈餗也為奸人所汚興安門大明宫南靣西來第一門汚烏故翻可送我詣兩軍門者執送西軍西軍右神䇿軍也在大明宫西西内苑中李孝本改衣緑衣於既翻猶服金帶以帽障面單騎奔鳳翔欲依鄭注也至咸陽西追擒之甲子以右僕射鄭覃同平章事李訓素與終南僧宗宻善往投之宗宻欲剃其髪而匿之其徒不可訓出山剃他計翻山即謂終南山將奔鳳翔為盩厔鎮遏使宋楚所擒盩厔音舟窒械送京師至昆明池訓恐至軍中更受酷辱謂送者曰得我則富貴矣聞禁兵所在搜捕汝必為所奪不若取我首送之送者從之斬其首以來乙丑以户部侍郎判度支李石同平章事仍判度支前河東節度使李載義復舊任王璠得罪故載義復舊任左神䇿出兵三百人以李訓首引王涯王璠羅立言郭行餘右神䇿出兵三百人擁賈餗舒元輿李孝本獻於廟社狥於兩市唐太廟在朱雀街東第一街之東北來第二坊太社在街西第一街之西北來第二坊兩市長安城中東市西市也命百官臨視腰斬於獨栁之下梟其首於興安門外親屬無問親踈皆死孩穉無遺穉直利翻妻女不死者没為官婢百姓觀者怨王涯𣙜茶或詬詈或投瓦礫擊之詬許候翻又古侯翻詈力智翻礫郎狄翻臣光曰論者皆謂涯餗有文學聲名初不知訓注之謀横罹覆族之禍横户孟翻臣獨以為不然夫顛危不扶焉用彼相論語載孔子之言焉於䖍翻涯餗安髙位飽重禄訓注小人窮奸究險究極也力取將相涯餗與之比肩不以為恥國家危殆不以為憂偷合茍容日復一日復扶又翻自謂得保身之良䇿莫我如也若使人人如此而無禍則奸臣孰不願之哉一旦禍生不虞足折刑剭易曰鼎折足覆公餗其刑剭凶剭音屋剭者誅殺不於市周制誅大臣適甸師謂之剭折而設翻蓋天誅之也士良安能族之哉王涯有再從弟沐從才用翻家於江南老且貧聞涯為相跨驢詣之欲求一簿尉留長安二歲餘始得一見涯待之殊落莫落冷落也莫薄也落莫唐人常語乆之沐因嬖奴以道所欲嬖卑義翻又博計翻涯許以微官自是旦夕造涯之門以俟命造七到翻及涯家被收被皮義翻沐適在其第與涯俱腰斬舒元輿有族子守謙愿而敏元輿愛之從元輿者十年一旦忽以非罪怒之日加譴責奴婢輩亦薄之守謙不自安求歸江南元輿亦不留守謙悲歎而去夕至昭應聞元輿收族守謙獨免王沐之并命躁之禍也舒守謙之幸免愿之餘福也禍福之應天豈爽哉是日以令狐楚為鹽鐵轉運使左散騎常侍張仲方權知京兆尹京考異曰實錄乙丑閤門使馬元贄已宣授仲方兆尹至此又言者蓋當時止是口宣至此乃降敕耳時數日之間殺生除拜皆决於兩中尉光考異曰皮業見聞錄曰崔慎由以元和元年登第至開成已入翰林因寓直之夕二更以來有中使宣召引入數重門至一處堂宇華煥簾幕俱垂見左右二廣燃蠟而坐謂慎由曰上不豫來已數日兼自登極後聖政多虧今奉太后中㫖命學士草廢立令慎由大驚曰某有中外親族數千口列在搢紳長行兄弟甥姪僅三百人一旦聞此覆族之言寜死不敢承命况聖上髙明之德覆於八荒豈可輕議二廣黙然無以為對良乆啟後户引慎由至一小殿見文宗坐於殿上二廣徑登階而䟽文宗過惡上唯俛首又曰不為此抝木枕措大不合更在此坐矣街談以好抝為抝木枕仍戒慎由曰事泄即是此措大也於是二廣自執炬送慎由出䆳殿門復令中使送至本院慎由尋以疾出翰林遂金縢其事付𦙍故𦙍切於勦絶北司者由此也誅北司後𦙍方彰其事新傳曰慎由記其事藏箱枕間將没以授其子𦙍故𦙍惡中官終討除之按舊傳崔慎由大中初始入朝為右拾遺員外郎知制誥文宗時未為翰林學士蓋崔𦙍欲重宦官之罪而誣之新傳承皮錄之誤也上不豫知初王守澄惡宦者田全操劉行深周元稹薛士幹似先義逸劉英誗等惡烏路翻似先姓義逸名誗直嚴翻李訓鄭注因之遣分詣鹽州靈武涇原夏州振武鳳翔廵邉夏户雅翻命翰林學士顧師邕為詔書賜六道使殺之㑹訓敗六道得詔皆廢不行六道即謂鹽靈夏涇原振武鳳翔也丙寅以師邕為矯詔下御史獄下遐稼翻先是鄭注將親兵五百已𤼵鳳翔至扶風宋白曰扶風縣本漢美陽縣地今京兆府武功縣北美陽故城是也隋開皇十六年於今岐陽縣置岐山縣武德三年分岐山縣於闈川城置圍川縣貞觀八年改扶風縣九域志鳳翔府東至扶風八十里先悉薦翻扶風令韓遼知其謀不供具攜印及吏卒奔武功注知訓已敗復還鳳翔仇士良等使人齎密敕授鳳翔監軍張仲清令取注仲清惶惑不知所為押牙李叔和說仲清曰叔和為公以好召注說式芮翻為于偽翻好如字以好召之言示之以無惡意也屏其從兵於坐取之屛必郢翻又畢正翻從才用翻坐徂卧翻事立定矣仲清從之伏甲以待注注恃其兵衛遂詣仲清叔和稍引其從兵享之於外注獨與數人入既啜茶啜樞恱翻飲也叔和抽刀斬注因閉外門悉誅其親兵乃出密敕宣示將士遂滅注家并殺副使錢可復節度判官盧簡能觀察判官蕭傑掌書記盧𢎞茂等及其枝黨死者千餘人可復徽之子錢徽見二百四十一卷穆宗長慶元年簡能綸之子盧綸與吉仲孚韓翃錢起司空曙苗𤼵崔峒耿緯夏侯審李端皆以詩齊名號大厯十才子傑俛之弟也蕭俛事憲穆位至宰相史言錢可復等皆名家子以託身非人併命朝廷未知注死丁夘詔削奪注官爵令鄰道按兵觀變以左神䇿大將軍陳君奕為鳳翔節度使戊辰夜張仲清遣李叔和等以注首入獻據考異曰實錄甲子以傳注首而開成紀事二十六日方下詔削官爵云鄭注初誅京師尚未知李潛用乙夘記亦云丁夘張仲清誘注而殺之與開成紀事同但開成紀事注傳云二十六日奏朝覲恐誤乙夘記注庚申日覲十九日也至扶風聞訓敗乃還似近之實錄恐太在前新本紀云戊辰張仲清殺注今不書日以傳疑梟於興安門人情稍安京師諸軍始各還營詔將士討賊有功及娖隊者官爵賜賚各有差娖則角翻右神䇿軍獲韓約於崇義坊己巳斬之仇士良等各進階遷官有差自是天下事皆决於北司宰相行文書而已宦官氣益盛迫脅天子下視宰相陵暴朝士如草芥每延英議事士良等動引訓注折宰相折之舌翻鄭覃李石曰訓注誠為亂首但不知訓注始因何人得進宦者稍屈搢紳頼之時中書惟有空垣破屋百物皆闕江西湖南獻衣糧百二十分充宰相召募從人分扶問翻從才用翻下導從同辛未李石上言宰相若忠正無邪神靈所祐縱遇盗賊亦不能傷若内懷奸㒺雖兵衞甚設鬼得而誅之臣願竭赤心以報國止循故事以金吾卒導從足矣從才用翻其兩道所獻衣粮並乞停寢從之十二月壬申朔顧師邕流儋州至商山賜死儋都甘翻儋州漢儋耳郡至京師七千四百四十二里商山即商嶺也所謂繞霤七盤是也貞元七年刺史李西華患此路之險自藍田至内鄉開新道七百餘里廻山取塗人不病渉謂之偏路行旅便之𣙜茶使令狐楚奏罷𣙜茶從之王涯誅乃罷𣙜茶度支奏籍鄭注家貲得絹百餘萬匹他物稱是稱尺證翻庚辰上問宰相坊市安未李石對曰漸安然比日寒冽特甚比毗至翻蓋刑殺太過所致鄭覃曰罪人周親前已皆死周親孔安國曰周至也其餘殆不足問時宦官深怨李訓等凡與之有瓜葛親瓜葛有所附麗言非至親或羣從中表相附麗以叙親好若瓜葛然或蹔䝉奬引者誅貶不已故二相言之李訓鄭注既誅召六道廵邉使田全操追忿訓注之謀在道揚言我入城凡儒服者無貴賤當盡殺之癸未全操等乘驛疾驅入金光門金光門長安城西面北來第二門京城訛言有寇至士民驚譟縱横走縱子容翻塵埃四起兩省諸司官聞之皆奔散有不及束帶韈而乘馬者韈勿𤼵翻鄭覃李石在中書顧吏卒稍稍逃去覃謂石曰耳目頗異宜且出避之石曰宰相位尊望重人心所屬屬之欲翻不可輕也今事虚實未可知堅坐鎮之庶㡬可定若宰相亦走則中外亂矣且果有禍亂避亦不免覃然之石坐視文案沛然自若敕使相繼傳呼閉皇城諸司門六典唐都城三重外一重名京城内一重名皇城又内一重名宫城亦名子城左金吾大將軍陳君賞帥其衆立望仙門下大明宫城南面五門望仙門在丹鳳門之左帥讀曰率謂敕使曰賊至閉門未晩請徐觀其變不宜示弱至晡後乃定是日坊市惡少年皆衣緋皂衣於既翻皂在早翻持弓刀北望見皇城門閉即欲剽掠非石與君賞鎮之京城㡬再亂矣剽匹妙翻㡬居衣翻時兩省官應入直者皆與其家人辭訣甲申敕罷修曲江亭館以鄭注之言而修之注誅乃罷丁亥詔逆人親黨自非前已就戮及指名收捕者餘一切不問諸司官雖為所脅從渉於詿誤詿古賣翻又户卦翻皆赦之他人無得相告言及相恐愒見亡匿者勿復追捕愒許葛翻見賢遍翻復扶又翻三日内各聽自歸本司時禁軍暴横横户孟翻京兆尹張仲方不敢詰宰相以其不勝任勝音升出為華州刺史華户化翻以司農卿薛元賞代之元賞常詣李石第聞石方坐聽事與一人争辯甚喧元賞使覘之覘丑廉翻云有神䇿軍將訴事元賞趨入責石曰相公輔佐天子紀綱四海今近不能制一軍將使無禮如此何以鎮服四夷即趨出上馬命左右擒軍將俟於下馬橋閣本大明宫圗下馬橋在建福門北元賞至則已解衣跽之矣跽其几翻其黨訴于仇士良士良遣宦者召之曰中尉屈大尹元賞曰屬有公事屬之欲翻行當繼至遂杖殺之㑹考異曰開成紀事以祕書少監王為京兆尹按薛元賞已為京兆尹紀事誤乃白服見士良白服即待罪之素服士良曰癡書生何敢杖殺禁軍大將元賞曰中尉大臣也宰相亦大臣也宰相之人若無禮於中尉如之何中尉之人無禮於宰相庸可恕乎中尉與國同體當為國惜法為于偽翻元賞已囚服而來惟中尉死生之士良知軍將已死無可如何乃呼酒與元賞歡飲而罷初武元衡之死詔出内庫弓矢陌刀給金吾仗使衛從宰相事見二百三十九卷憲宗元和十年從才用翻至建福門而退至是悉罷之開成元年春正月辛丑朔上御宣政殿赦天下改元仇士良請以神䇿仗衛殿門諫議大夫馮定言其不可南牙十六衛之兵至此雖名存實亡然以北軍衛南牙則外朝亦將聽命於北司既紊太宗之紀綱又増宦官之勢焰故馮定言其不可乃止定宿之弟也馮宿穆宗長慶初知制誥二月癸未上與宰相語患四方表奏華而不典李石對曰古人因事為文今人以文害事昭義節度使劉從諫上表請王涯等罪名且言涯等儒生荷國榮寵荷下可翻咸欲保身全族安肯搆逆訓等實欲討除内臣兩中尉自為救死之謀遂致相殺誣以反逆誠恐非辜設若宰相實有異圖當委之有司正其刑典豈有内臣擅領甲兵恣行剽刼延及士庶横被殺傷剽匹妙翻横户孟翻流血千門漢武帝起建章宫度為千門萬户後世遂謂宫門為千門僵尸萬計搜羅枝蔓中外恫疑恫音通痛也又勅動翻臣欲身詣闕庭靣陳臧否恐并陷孥戮否音鄙孥音奴子也孥戮戮及子也事亦無成謹當修飾封疆訓練士卒内為陛下心腹外為陛下藩垣如奸臣難制􅊎以死清君側丙申加從諫檢校司徒天德軍奏吐谷渾三千帳詣豐州降三月壬寅以袁州長史李德裕為滁州刺史袁州漢宜春縣地隋置袁州京師東南三千五百八十里滁州二千五百六十四里左僕射令狐楚從容奏王涯等既伏辜從千容翻其家夷滅遺骨棄捐請官為収瘞以順陽和之氣為于偽翻瘞於計翻月令孟春掩骼埋胔以死氣逆生也上慘然乆之命京兆収𦵏涯等十一人於城西各賜衣一襲考異曰開成紀事云京兆尹薛元賞於城西張村葬涯等七人今從新傳仇士良潛使人𤼵之棄骨於渭水丁未皇城留守郭皎按舊制車駕行幸則京城置留守今天子在上京而皇城置留守當考觀下奏則知置皇城留守宦官之意也奏諸司儀仗有鋒刃者請皆輸軍器使軍器使即軍器庫使内諸司使之一也遇立仗别給儀刀從之儀刀以木為之以銀裝之具刀之儀而已劉從諫復遣牙將焦楚長上表讓官讓檢校司徒復扶又翻稱臣之所陳繫國大體可聽則涯等宜䝉湔洗湔則前翻不可聽則賞典不宜妄加安有死寃不申而生者荷禄荷下可翻因暴揚仇士良等罪惡辛酉上召見楚長慰諭遣之時士良等恣横横户孟翻朝臣日憂破家及從諫表至士良等憚之由是鄭覃李石粗能秉政粗坐伍翻天子倚之亦差以自强夏四月乙夘以潮州司户李宗閔為衡州司馬凡李訓指為李德裕宗閔黨者稍収復之淄王協薨協憲宗子甲午以山南西道節度使李固言為門下侍郎同平章事以左僕射令狐楚代之戊戌上與宰相從容論詩之工拙從千容翻鄭覃曰詩之工者無若三百篇皆國人作之以刺美時政王者采之以觀風俗耳不聞王者為詩也後代辭人之詩華而不實無補於事陳後主隋煬帝皆工於詩不免亡國陛下何取焉史言鄭覃能守經學以輔其君覃篤於經術上甚重之己酉上御紫宸殿宰相因奏事拜謝外間因訛言天子欲令宰相掌禁兵已拜恩矣由是中外復有猜阻復扶又翻人情恟忷士民不敢解衣寢者數日乙丑李石奏請召仇士良等面釋其疑上為召士良等出為于偽翻上及石等共諭釋之使無疑懼然後事解閏月乙酉以太子太保分司李聽為河中節度使上嘗歎曰付之兵不疑置之散地不怨散蘇旱翻惟聽為可以然乙未李固言薦崔球為起居舍人鄭覃再三以為不可上曰公事勿相違覃曰若宰相盡同則事必有欺陛下者矣李孝本二女配没右軍右軍右神䇿軍上取之入宫秋七月右拾遺魏謩上䟽以為陛下不邇聲色屢出宫女以配鰥夫竊聞數月以來教坊選試以百數莊宅収市猶未巳唐内諸司有教坊使莊宅使皆宦者為之又召李孝本女入宫不避宗姓大興物論臣竊惜之昔漢光武一顧列女屏風宋𢎞猶正色抗言光武即撤之光武時宋𢎞為大司空嘗讌見御座新屏風圗畫列女帝數顧視之𢎞正容言曰未見好德如好色者帝即為撤之笑謂𢎞曰聞義則服可乎對曰陛下進德臣不勝其喜陛下豈可不思宋𢎞之言欲居光武之下乎上即出孝本女䟽考異曰實錄上云取孝本女二人入内下魏謩云取孝本次女一人入内所以如此不同者蓋孝本二女皆籍沒在右軍先取長女入内謩不之知又取次女謩乃知之上䟽故也擢謩為補闕曰朕選市女子以賜諸王耳憐孝本女髫齓孤露髫于􅂓翻小兒垂髪也齓初觀翻小兒毁齒也故収養宫中謩於疑似之間皆能盡言可謂愛我不忝厥祖矣命中書優為制辭以賞之謩徴之五世孫也魏徴以直事大宗鄜坊節度使蕭洪詐稱太后弟事見二百四十三卷太和二年事覺八月甲辰流驩州於道賜死趙縝吕璋等皆流嶺南縝止忍翻初李訓知洪之詐洪懼辟訓兄仲京置幕府先是自神䇿軍出為節度使者軍中皆資其行裝至鎮三倍償之有自左軍出鎮鄜坊左軍左神䇿軍未償而死者軍中徴之於洪洪恃訓之勢不與又徴於死者之子洪教其子遮宰相自言訓判絶之仇士良由是恨洪太后有異母弟在閩中孱弱不能自逹孱鉏山翻有閩人蕭本從之得其内外族諱因士良進逹於上且𤼵洪之詐洪由是得罪上以本為真太后弟戊申擢為右贊善大夫九月丁丑李石為上言宋申錫忠直為于偽翻為讒人所誣竄死遐荒未䝉昭雪上俛首乆之既而流涕泫然俛美辨翻俯也泫胡犬翻曰兹事朕乆知其誤奸人逼我以社稷大計兄弟㡬不能保謂漳王湊也㡬居衣翻况申錫僅全腰領耳非獨内臣外廷亦有助之者皆由朕之不明曏使遇漢昭帝必無此寃矣謂漢昭帝知燕蓋上官之詐也鄭覃李固言亦共言其寃上深痛恨有慙色庚辰詔悉復申錫官爵以其子慎微為成固尉成固縣屬興元府李石用金部員外郎韓益判度支桉桉與案同文案也句斷益坐􅂍三千餘緡繫獄石曰臣始以益頗曉錢榖故用之不知其貪乃如是上曰宰相但知人則用有過則懲如此則人易得易以䜴翻卿所用人不掩其惡可謂至公從前宰相用人好曲蔽其過不欲人彈劾此大病也冬十一月丁巳貶益梧州司户梧州因蒼梧郡而名至京師五千五百里好呼到翻劾户槩翻又户得翻上自甘露之變意忽忽不樂兩軍毬鞠之㑹十減六七樂音洛史炤曰鞠以皮為之今通謂之毬雖宴享音伎雜遝盈庭遝逹合翻未嘗解顔閒居或徘徊眺望眺它弔翻或獨語歎息壬午上於延英謂宰相曰朕每與卿等論天下事則不免愁對曰為理者不可以速成為理猶言為治也上曰朕每讀書恥為凡主李石曰方今内外之臣其間小人尚多疑阻願陛下更以寛御之彼有公清奉法如劉𢎞逸薛季稜者陛下亦宜褒賞以勸為善甲申上復謂宰相曰復扶又翻我與卿等論天下事有勢未得行者退但飲醇酒求醉耳對曰此皆臣等之罪也有司以左藏積弊日乆藏但浪翻請行檢勘且言官典罪在赦前者請宥之上許之既而果得繒帛妄稱漬汚者漬疾智翻汚烏故翻敕赦之給事中狄兼謩封還敕書曰官典犯􅂍理不可赦上諭之曰有司請檢之初朕既許之矣與其失信寜失罪人卿能奉軄朕甚嘉之十二月庚戌以華州刺史盧鈞為嶺南節度使李石言於上曰盧鈞除嶺南朝士皆相賀以為嶺南富饒之地近歲皆厚賂北司而得之今北司不撓朝權撓奴巧翻又奴教翻陛下亦宜有以褒之庶㡬内外奉法此致理之本也上從之鈞至鎮以清恵著名己未淑王縱薨縱順宗子二年春二月己未上謂宰相薦人勿問親踈朕聞竇易直為相竇易直為相於長慶寳厯未嘗用親故若親故果才避嫌而棄之是亦不為至公也均王緯薨緯順宗子三月有彗星出於張彗祥歲翻又旋芮翻又徐醉翻長八丈餘長直亮翻壬申詔撤樂減膳以一日之膳分充十日夏四月甲辰上對中書舍人翰林學士兼侍書栁公權於便殿栁公權先除翰林侍書學士今以翰林學士兼侍書上舉衫袖示之曰此衣已三澣矣澣户管翻衆皆美上之儉德公權獨無言上問其故對曰陛下貴為天子富有四海當進賢退不肖納諫諍明賞罰乃可以致雍熈服澣濯之衣乃末節耳上曰朕知舍人不應復為諫議杜佑通典曰中書舍人文士之極任朝廷之盛選諸官莫得比以卿有諍臣風采須屈卿為之乙巳以公權為諫議大夫餘如故戊戌以翰林學士工部侍郎陳夷行同平章事六月河陽軍亂節度使李泳奔懷州軍士焚府署殺泳二子大掠數日乃止泳長安市人寓籍禁軍以賂得方鎮所至恃所交結貪殘不法其下不堪命故作亂丁未貶泳澧州長史澧州京師東南一千八百九十三里澧音禮戊申以左金吾將軍李執方為河陽節度使秋七月癸亥振武奏党項三百餘帳剽掠逃去剽匹妙翻下同給事中韋温為太子侍讀晨詣東宫日中乃得見温諫曰太子當鷄鳴而起問安視膳記文王之為世子鷄初鳴而衣服至於寢門外問内䜿之御者曰今日安否何如内䜿曰安文王乃喜其有不安節則内䜿以告文王文王色憂行不能正履至於復初然後亦復初食上必在視寒暖之節史炤曰熱食曰饔具食曰膳膳之為言善也不宜專事晏安太子不能用其言為太子不令終張本温乃辭侍讀辛未罷守本官太考異曰舊傳曰兼子侍讀每晨至少陽院午見太子温云云太子不能行其言温稱疾上不恱改太常少卿未㡬拜給事中按温已為給事中乃兼太子侍讀舊傳誤今從新傳振武突厥百五十帳叛剽掠營田戊寅節度使劉沔擊破之八月庚戌以昭儀王氏為德妃昭容楊氏為賢妃唐因隋制有貴妃淑妃德妃賢妃各一人為夫人正一品立敬宗之子休復為梁王執中為襄王言楊為把王成美為陳王癸丑立皇子宗儉為蔣王蔣古國名左傳凡蔣邢茅胙祭河陽軍士既逐李泳日相扇欲為亂九月李執方索得首亂者七十餘人索山客翻悉斬之餘黨分𨽻外鎮然後定冬十月國子監石經成劉昫曰時上好文鄭覃以宰臣判國子祭酒依後漢蔡邕刋碑列於太學創立石壁九經諸儒校正訛謬上又令翰林勒字官校字體又乖師法故石經立後數十年名儒皆不窺之以為蕪累福建奏晉江百姓蕭𢎞稱太后族人晉冮故晉安郡晉安縣地吳置東安縣晉改曰晉安隋改曰南安開元八年分南安置晉江縣帶泉州詔御史臺按之戊申以門下侍郎同平章事李固言同平章事充西川節度使甲寅御史臺奏蕭𢎞詐妄詔逓歸鄉里令所過給食而逓之也不之罪冀得其真資治通鑑卷二百四十五
