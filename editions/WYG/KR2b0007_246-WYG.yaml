body:
  text: 資治通鑑卷二百四十六宋司馬光撰胡三省音註唐紀六十二起著雍敦牂盡𤣥黓閹茂凡五年文宗元聖昭獻孝皇帝下開成三年春正月甲子李石入朝中塗有盜射之射食亦翻微傷左右奔散石馬驚馳歸第又有盜邀擊于坊門斷其馬尾唐諸坊之南皆有門以時啓閉斷音短僅而得免上聞之大驚命神䇿六軍遣兵防衛敕中外捕盜甚急竟無所獲乙丑百官入朝者九人而已京城數日方安丁夘追贈故齊王湊為懷懿太子知湊之寃也湊被枉事見二百二十四卷太和五年戊申以鹽鐵轉運使户部尚書楊嗣復户部侍郎判户部李珏並同平章事以考異曰舊傳三年楊嗣復輔政薦珏本官同平章事按珏與嗣復並命今從實錄判使如故判謂判户部使謂鹽鐵轉運使嗣復於陵之子也楊於陵見二百三十七卷憲宗元和三年於音烏中書侍郎同平章事李石承甘露之亂人情危懼宦官恣横横户孟翻忘身徇國故紀綱粗立仇士良深惡之粗坐五翻惡烏路翻下同潛遣盜殺之不果石懼累表稱疾辭位上深知其故而無如之何丙子以石同平章事充荆南節度使陳夷行性介直惡楊嗣復為人每議政事多相詆斥壬辰夷行以足疾辭位不許上命起居舎人魏謩獻其祖文貞公笏魏徴諡曰文貞鄭覃曰在人不在笏上曰亦甘棠之比也言周人思召公愛其甘棠而不敢翦伐今思魏徴之正直則亦當寳愛其故笏楊嗣復欲援進李宗閔復扶又翻援于元翻下同恐為鄭覃所沮乃先令宦官諷上上臨朝謂宰相曰宗閔積年在外宜與一官李宗閔貶見上卷太和九年鄭覃曰陛下若憐宗閔之逺止可移近北數百里近其靳翻不宜再用用之臣請先避位陳夷行曰宗閔曏以朋黨亂政陛下何愛此纖人纖人猶言小人也楊嗣復曰事貴得中不可但徇愛憎上曰可與一州覃曰與州太優止可洪州司馬耳洪州京師東南三千九十里因與嗣復互相詆訐以為黨訐居謁翻上曰與一州無傷覃等退上謂起居郎周敬復舎人魏謩曰宰相諠爭如此可乎唐制起居郎起居舍人掌録天子起居法度天子御正殿則郎居左舍人居右有命俯陛以聽每仗下天子與宰相議政事郎舍人亦分侍左右若仗在紫宸内閣則夾香案分立殿下覃等諠爭既退故上因問之對曰誠為不可然覃等盡忠憤激不自覺耳丁酉以衡州司馬李宗閔為杭州刺史唐制衡州中洪州上都督府杭州上中州司馬從五品下大都督府司馬從四品下上州刺史從三品李固言與楊嗣復李珏善故引居大政以排鄭覃陳夷行每議政之際是非鋒起上不能决也史言文宗明不足以燭理三月牂柯寇涪州清溪鎮牂柯蠻在涪州東九百里東距辰州二千四百里涪音浮鎮兵擊却之初太和之末杜悰為鳯翔節度使有詔沙汰僧尼事見上卷太和八年時有五色雲見于岐山見賢遍翻下同近法門寺民間訛言佛骨降祥佛骨在法門寺故云然以僧尼不安之故監軍欲奏之悰曰雲物變色何常之有佛若果愛僧尼當見于京師未幾獲白兔幾居豈翻未幾言未得幾何時也監軍又欲奏之曰此西方之瑞也悰曰野獸未馴且宜畜之馴松倫翻畜吁玉翻旬日而斃監軍不悦以為掩蔽聖徳獨畫圖獻之及鄭注代悰鎮鳯翔按通鑑上卷太和八年九月庚申以鳯翔節度使李聽為忠武節度使代杜悰丁夘以鄭注為鳯翔節度使注誣奏聽在鳯翔貪虐冬十月乙亥以聽為太子太保分司復以杜悰為忠武節度使若如上卷所書則杜悰鎮忠武不在鳯翔奏紫雲見又獻白雉是嵗八月有甘露降于紫宸殿前櫻桃之上上親采而甞之百官稱賀其十一月遂有金吾甘露之變及悰為工部尚書判度支河中奏騶虞見詩注騶虞義獸白虎黒文不食生物有至信之徳則應之司馬相如封禪書曰般般之獸樂我君囿白質黒章其儀可喜師古注謂騶虞也山海經騶虞如虎五色尾長于身百官稱賀上謂悰曰李訓鄭注皆因瑞以售其亂乃知瑞物非國之慶卿前在鳯翔不奏白兔真先覺也對曰昔河出圖伏羲以畫八卦洛出書大禹以敘九疇皆有益於人故足尚也至于禽獸草木之瑞何時無之劉聰桀逆黄龍三見石季龍暴虐得蒼麟十六白鹿七以駕芝蓋石虎字季龍唐避廟諱故稱其字以是觀之瑞豈在徳𤣥宗甞為潞州别駕中宗時𤣥宗為潞州别駕及即位潞州奏十九瑞𤣥宗曰朕在潞州惟知勤職業此等瑞物皆不知也願陛下專以百姓富安為國慶自餘不足取也上善之他日謂宰相曰時和年豐是為上瑞嘉禾靈芝誠何益於事宰相因言春秋記災異以儆人君而不書祥瑞用此故也意此必鄭覃之言夏五月乙亥詔諸道有瑞皆無得以聞亦勿申牒所司其臘饗太廟唐制四孟及臘享于太廟唐臘用寅及饗太清宫𤣥宗天寳二年以西京𤣥元皇帝廟為太清宫元日受朝奏祥瑞皆停六典凡大祥瑞隨即表奏文武百寮詣闕奉賀其它並年終具表以聞有司告廟百寮詣闕奉賀又儀制令大瑞即隨表奏聞中瑞下瑞申報有司元日聞奏今皆停罷臣考異曰實録初上謂宰臣曰嵗豐人安豈非上瑞宰因言春秋不書祥瑞上深然之遂有此詔補國史以為因杜悰進言今兼取之初靈武節度使王晏平自盜贓七千餘緡上以其父智興有功王智興有討横海之功免死長流康州晏平密請於魏鎮幽三節度使魏帥何進滔鎮帥王元逵幽帥史元忠使上表雪已上不得已六月壬寅改永州司户八月己亥嘉王運薨運代宗子太子永之母王徳妃無寵為楊賢妃所譖而死唐因隋制有貴妃淑妃徳妃賢妃各一品為夫人正一品開元中𤣥宗以后妃四星一為后有后而復置四妃非典法乃置惠妃麗妃華妃以為三夫人其後復置貴妃蓋復唐初四妃之制太子頗好遊宴昵近小人好呼到翻昵尼質翻近其靳翻賢妃日夜毁之九月壬戌上開延英召宰相及兩省御史郎官疏太子過惡議廢之曰是宜為天子乎羣臣皆言太子年少少詩照翻下同容有改過國本至重豈可輕動御史中丞狄兼謩論之尤切至于涕泣給事中韋温曰陛下惟一子不教陷之至是豈獨太子之過乎癸亥翰林學士六人神䇿六軍軍使十六人復上表論之復扶又翻上意稍解是夕太子始得歸少陽院如京使王少華等唐置如京使以武臣為之内職也未知所職何事及宦官宫人坐流死者數十人義武節度使張璠在鎮十五年穆宗長慶三年璠代陳楚鎮義武為幽鎮所憚及有疾請入朝朝廷未及制置疾甚戒其子元益舉族歸朝毋得效河北故事及薨軍中欲立元益觀察留後李士季不可衆殺之又殺大將十餘人壬申以易州刺史李仲遷為義武節度使義武馬軍都虞候何清朝自拔歸朝癸酉以為儀州刺史宋白曰遼州樂平郡唐武徳三年置遼州八年改為箕州先天二年以𤣥宗嫌名改為儀州朝廷以義昌節度使李彦佐在鎮乆太和六年李彦佐代殷侑鎮義昌甲戌以徳州刺史劉約為節度副使欲以代之開成以來神策將吏遷官多不聞奏直牒中書令覆奏施行遷改殆無虛日甘露之變之後宦官專横遂至于此癸未始詔神策將吏改官皆先奏聞狀至中書然後檢勘施行先奏聞于上禁中以其狀付中書方與檢勘由歴而施行之冬十月易定監軍奏軍中不納李仲遷請以張元益為留後太子永猶不悛悛丑緣翻改也庚子暴薨宗考異曰按文後見緣橦者而泣曰朕為天子不能全一子遂殺劉楚材等然則太子非良死也但宫省事祕外人莫知其詳故實錄但云終不悛過是日暴薨諡曰莊恪乙巳以左金吾大將軍郭旼為邠寧節度使旼莫貧翻姪考異曰舊栁公權傳作皎按子儀子名皆連日旁今從實錄宰相議𤼵兵討易定上曰易定地狹人貧軍資半仰度支仰半向翻急之則靡所不為緩之則自生變但謹備四境以俟之乃除張元益代州刺史頃之軍中果有異議乃上表以不便李仲遷為辭朝廷為之罷仲遷為于偽翻十一月詔俟元益出定州其義武將士始謀立元益者皆赦不問以義昌節度使李彦佐為天平節度使以劉約為義昌節度使丁夘張元益出定州史考異曰補國曰易定張公璠卒三軍請公璠子元益繼統軍務公璠乃孝忠孫也公璠彌留之際誡元益歸闕三軍復效幽鎮魏三道自立連帥坐邀制命廟謀未决丞相衛公欲伐而克之貞穆公議未可興師且行弔贈禮追元益赴闕若拒命跋扈討之不遲上前互陳短長未行朝典貞穆公有宻疏進追元益詔意云敕張元益卿太祖孝忠功列鼎彛垂于不朽卿乃祖茂昭克荷遺訓不墜義風文宗覽詔意深叶睿謀詔下定州元益拜詔慟哭焚墨衰請死于衆三軍將士南向稽首蹈舞流涕扶元益就苫廬請監軍使幕府進諸道例各知留後公璠遂全家赴闕詔以神䇿軍使陳君賞為帥所謂貞穆公者李珏也按實録璠定州牙將非孝忠孫又李徳裕此年不為相補國史蓋傳聞之説不可據今從實録庚午上問翰林學士栁公權以外議對曰郭旼除邠寧外間頗以為疑上曰旼尚父之姪徳宗以郭子儀為尚父太后叔父太后即謂太皇郭太后在官無過自金吾作小鎮外間何尤焉對曰非謂旼不應為節度使也聞陛下近取旼二女入宫有之乎上曰然入參太皇太后耳公權曰外間不知皆云旼納女後宫故得方鎮上俛首良乆曰然則奈何對曰獨有自南内遣歸其家則外議自息矣是日太皇太后遣中使送二女還旼家太皇太后居興慶宫興慶宫謂之南内使疏吏翻還如字上好詩好呼到翻甞欲置詩學士李珏曰今之詩人浮薄無益于理乃止甲戌以蔡州刺史韓威為義武節度使張元益既出定州乃除韓威河東節度使司徒中書令裴度以疾求歸東都裴度治第東都集賢里號綠野堂十二月辛丑詔度入知政事遣中使敦諭上道上時掌翻鄭覃累表辭位丙午詔三五日一入中書是嵗吐蕃彛泰贊普卒弟達磨立彛泰多病委政大臣由是僅能自守乆不為邊患達磨荒淫殘虐國人不附災異相繼吐蕃益衰按吐蕃衰回鶻衰而唐亦衰矣㑹考異曰彜泰卒及達磨立實録不書舊傳續要皆無之今據補國史四年春閏正月己亥裴度至京師以疾歸第此長安平樂里第也不能入見見賢遍翻上勞問賜賚使者旁午勞力到翻三月丙戌薨諡曰文忠上怪度無遺表問其家得半藁以儲嗣未定為憂言不及私度身貌不踰中人而威望逺達四夷四夷見唐使輒問度老少用捨少詩照翻以身繫國家輕重如郭子儀者二十餘年夏四月戊辰上稱判度支杜悰之才楊嗣復李珏因請除悰户部尚書陳夷行曰恩㫖當由上出自古失其國未始不由權在臣下也珏曰陛下甞語臣云語牛倨翻人主當擇宰相不當疑宰相五月丁亥上與宰相論政事陳夷行復言不宜使威福在下復扶又翻李珏曰夷行意疑宰相中有弄陛下威權者耳臣屢求退茍得王傅臣之幸也王傅散地自宰執以下貶官者居之鄭覃曰陛下開成元年二年政事殊美三年四年漸不如前楊嗣復曰元年二年鄭覃夷行用事三年四年臣與李珏同之罪皆在臣因叩頭曰臣不敢更入中書政事堂在中書省遂趨出上遣使召還勞之勞力到翻曰鄭覃失言卿何遽爾覃起謝曰臣愚拙意亦不屬嗣復屬之欲翻而遽如是乃嗣復不容臣耳嗣復曰覃言政事一年不如一年非獨臣應得罪亦上累聖徳累良瑞翻退三上表辭位上遣中使召出之癸巳始入朝丙申門下侍郎同平章事鄭覃罷為右僕射陳夷行罷為吏部侍郎覃性清儉夷行亦耿介故嗣復等深疾之史言小人排君子不遺餘力上以鹽鐵推官檢校禮部貟外郎姚朂能鞠疑獄命權知職方貟外郎右丞韋温不聽上奏稱郎官朝廷清選不宜以賞能吏上乃以朂檢校禮部郎中依前鹽鐵推官姚朂權知職方貟外郎而韋温爭之檢校禮部郎中而温不復言者蓋唐制藩鎮及諸使僚屬率帶檢校官而權知則為職事官故也六月丁丑上以其事問宰相楊嗣復對曰温志在澄清流品若有吏能者皆不得清流則天下之事孰為陛下理之為于偽翻恐似衰晉之風然上素重温終不奪其所守秋七月癸未以張元益為左驍衛將軍以其母侯莫陳氏為趙國太夫人賜絹二百匹易定之亂侯莫陳氏説諭將士説式芮翻且戒元益以順朝命故賞之甲辰以太常卿崔鄲同中書門下平章事鄲郾之弟也鄲多寒翻崔郾見二百四十四卷太和五年八月辛亥鄜王憬薨憬憲宗之子癸酉昭義節度使劉從諫上言蕭本詐稱太后弟上下皆稱蕭𢎞是真以本來自左軍故𢎞為臺司所抑蕭本事見上卷元年蕭𢎞事見二年臺司謂御史臺官吏主案驗蕭𢎞者今𢎞詣臣求臣上聞上時掌翻乞追𢎞赴闕與本對推以正真偽詔三司鞫之冬十月乙夘上就起居舍人魏謩取記注觀之記注即起居注貞觀初以給事中諫議大夫兼知起居注或知起居事每仗下議記事起居郎一人執筆記錄于前史官隨之其後復置起居舍人分侍左右秉筆隨宰相入殿若仗在紫宸内閤則夾香案分立殿下直第二螭首和墨濡筆皆即坳處時號螭頭髙宗臨朝不决事有所奏惟辭見而已許敬宗李義府為相奏請多畏人之知也命起居郎舍人對仗承㫖仗下與百官皆出不敢聞機務矣長夀中宰相姚璹建議仗下後宰相一人錄軍國政要為時政記月送史館然率推美讓善事非其實未幾亦罷而起居郎因制勑稍稍筆削以廣國史之闕起居舍人本記言之職惟編詔書不及它事開元初復詔修史官非供奏者皆隨仗而入位于起居郎舍人之次及李林甫專權又廢太和九年詔起居郎舍人凡入閣日具紙筆立螭頭下復貞觀故事謩不可曰記注兼書善惡所以儆戒人君陛下但力為善不必觀史上曰朕曏甞觀之對曰此曏日史官之罪也若陛下自觀史則史官必有所諱避何以取信于後上乃止楊妃請立皇弟安王溶為嗣上謀于宰相李珏非之丙寅立敬宗少子陳王成美為皇太子為楊妃及成美見殺張本丁夘上幸㑹寧殿作樂有童子緣橦橦職容翻字様曰本音同今借為木橦字漢有都盧緣橦即此伎也一夫來往走其下如狂上怪之左右曰其父也上泫然流涕曰朕貴為天子不能全一子泫胡犬翻以太子永死于非命也召教坊劉楚材等四人宫人張十十等十人責之曰構㑹太子皆爾曹也今更立太子更工衡翻復欲爾邪復扶又翻執以付吏己巳皆殺之上因是感傷舊疾遂増十一月三司按蕭本蕭𢎞皆非真太后弟本除名流愛州𢎞流儋州愛州漢九真郡梁置愛州至京師八千八百里而太后真弟在閩中終不能自達乙亥上疾少閒閒讀如字坐思政殿召當直學士周墀賜之酒因問曰朕可方前代何主對曰陛下堯舜之主也上曰朕豈敢比堯舜所以問卿者何如周赧漢獻耳赧奴版翻墀驚曰彼亡國之主豈可比聖徳上曰赧獻受制于彊諸侯今朕受制于家奴以此言之朕殆不如因泣下霑襟墀伏地流涕自是不復視朝唐考異曰髙彦休闕史曰文宗開成後常鬱鬱不樂五年春風痺稍間坐思政殿問周墀云云既而龍姿掩抑淚落衣襟汝南公俯伏嗚咽再拜而退自是不復視朝以至厭代按實録明年正月朔上不康不受朝賀四日帝崩恐非五年春今從新傳仍置于此是嵗天下户口四百九十九萬六千七百五十二回鶻相安允合特勒柴革謀作亂彰信可汗殺之相掘羅勿將兵在外以馬三百賂沙陁朱邪赤心借其兵共攻可汗可汗兵敗自殺國人立㕎馺特勒為可汗㕎安盍翻馺先合翻帳考異曰後唐獻祖紀年録曰開成四年回鶻大饑族離復為􅃛戛斯所逼漸過磧口至于榆林天徳軍使温徳彛請帝為援遂帥騎赴之時胡特勒可汗牙帳在近帝遣使説回鶻相嗢沒斯為陳利害云云嗢沒斯然之决有歸國之約俄而回鶻宰相勿篤公叛可汗將圖歸義遣人獻良馬三百以求應接帝自天徳引軍至磧口援之為回鶻所薄帝一戰敗之進撃可汗牙帳胡特勒可汗勢窮自殺國昌因奏勿篤公為署颯可汗是嵗開成五年也文宗崩武宗即位遣嗣澤王溶告哀于回鶻使還始知特勒可汗易代按朱邪赤心若奏勿篤公為可汗安得因溶告哀始知易代乎此則自相違矣舊傳開成初其相有安允合者與特勒柴革欲篡薩特勒可汗可汗覺殺柴革及安允合又有回鶻相掘羅勿者擁兵在外怨誅柴革安允合又殺薩特勒可汗以㕎級特勒為可汗新傳云開成四年其相掘羅勿作難引沙陁共攻可汗可汗自殺國人立㕎馺特勒為可汗今從之㑹嵗疫大雪羊馬多死回鶻遂衰赤心執宜之子也五年春正月己夘詔立潁王瀍為皇太弟瀍直連翻應軍國事權令句當句古候翻當丁浪翻且言太子成美年尚冲幼未漸師資漸子㢘翻老子曰善人者不善人之師不善人者善人之資可復封陳王時上疾甚命知樞宻劉𢎞逸薛季稜引楊嗣復李珏至禁中欲奉太子監國中尉仇士良魚𢎞志以太子之立功不在已乃言太子幼且有疾更議所立更工衡翻李珏曰太子位已定豈得中變士良𢎞志遂矯詔立瀍為太弟異考曰唐闕史曰武宗皇帝王夫人者燕趙倡女也武宗為潁王獲愛幸文宗于十六宅西别建安王溶潁王瀍陀上數幸其中縱酒如家人禮及文宗晏駕後宫無子所立敬宗男陳王年幼且病未任軍國事中貴主禁掖者以安王大行親弟既賢且長遂起左右神䇿軍及飛龍羽林驍騎數千衆即藩邸奉迎安王中貴遥呼曰迎大者迎大者如是者數四意以安王為兄即大者也及兵仗至二王宅首兵士相語曰奉命迎大者不知安潁孰為大者王夫人竊聞之擁髻褰裙走出矯言曰大者潁王也大家左右以王魁梧頎長皆呼為大王且與中尉有死生之契汝曹或誤必赤族矣時安王心云其次第合立志少疑懦懼未敢出潁王神氣抑揚隠于屏間夫人自後聳出之衆惑其語遂扶上馬戈甲霜擁前至少陽院諸中貴知己誤無敢出言者遂羅拜馬前連呼萬嵗尋下詔以潁王瀍立為皇太弟權句當軍國事新后妃傳曰武宗賢妃王氏開成末王嗣帝位妃隂為助畫故進號才人蓋亦取於闕史也按立嗣大事豈容繆誤闕史難信今不取從文宗武宗實録是日士良𢎞志將兵詣十六宅迎潁王至少陽院百官謁見于思賢殿瀍沈毅有斷喜愠不形于色見賢遍翻沈持林翻斷丁亂翻愠於問翻與安王溶皆素為上所厚異于諸王辛巳上崩于太和殿年三十三以楊嗣復攝冢宰癸未仇士良説太弟賜楊貴妃安王溶陳王成美死説式芮翻第考異曰舊傳曰安王溶穆宗八子母楊賢妃武宗即位李徳裕秉政或告文宗崩時楊嗣復以與賢妃宗家欲立安王為嗣故王受禍復貶官按是時徳裕未入相今從武宗實録勅大行以十四日殯成服錄考異曰武宗實裴夷直上言伏見二日敕令有司以今月十四日攢斂成服按文宗以二日崩豈得二日遽有此敕必誤也諫議大夫裴夷直上言期日太逺不聽時仇士良等追怨文宗以甘露之事也凡樂工及内侍得幸于文宗者誅貶相繼夷直復上言陛下自藩維繼統是宜儼然在疚記檀弓秦穆公弔公子重耳曰儼然在憂服之中詩閔予小子嬛嬛在疚注疚病也在憂病之中復扶又翻以哀慕為心速行喪禮早議大政以慰天下而未及數日屢誅戮先帝近臣驚率土之視聽傷先帝之神靈人情何瞻國體至重若使此輩無罪固不可刑若其有罪彼已在天網之内無所逃伏旬日之外行之何晚不聽辛夘文宗始大歛大行十一日而始大歛非禮也歛力瞻翻武宗即位甲午追尊上母韋妃為皇太后二月乙夘赦天下丙寅諡韋太后曰宣懿夏五月己夘門下侍郎同平章事楊嗣復罷為吏部尚書以刑部尚書崔珙同平章事兼鹽鐵轉運使珙居竦翻秋八月壬戌葬元聖昭獻孝皇帝于章陵章陵在京兆富平縣西北二十里廟號文宗庚午門下侍郎同平章事李珏坐為山陵使龍輴陷輴敕倫翻記天子龍輴輴載柩車也畫龍于轅罷為太常卿貶京兆尹敬昕為郴州司馬郴丑林翻義武軍亂逐節度使陳君賞君賞募勇士數百人復入軍城誅亂者初上之立非宰相意故楊嗣復李珏相繼罷去召淮南節度使李徳裕入朝九月甲戌朔至京師丁丑以徳裕為門下侍郎同平章事庚辰徳裕入謝言于上曰致理之要致理猶言致治也在于辯羣臣之邪正夫邪正二者勢不相容正人指邪人為邪邪人亦指正人為邪人主辯之甚難臣以為正人如松柏特立不倚邪人如藤蘿非附他物不能自起故正人一心事君而邪人競為朋黨先帝深知朋黨之患然所用卒皆朋黨之人卒子恤翻良由執心不定故奸人得乗閒而入也閒古莧翻下疑間同夫宰相不能人人忠良或為欺罔主心始疑于是旁詢小臣以察執政如徳宗末年所聽任者惟裴延齡輩宰相署敕而已此政事所以日亂也陛下誠能慎擇賢才以為宰相有姧罔者立黜去去羌吕翻常令政事皆出中書推心委任堅定不移則天下何憂不理哉又曰先帝于大臣好為形迹好呼到翻小過皆含容不言日累月積累魯水翻以致禍敗兹事大誤願陛下以為戒臣等有罪陛下當面詰之詰起吉翻事茍無實得以辯明若其有實辭理自窮小過則容其悛改悛丑緣翻大罪則加之誅譴如此君臣之際無疑間矣上嘉納之初徳裕在淮南敕召監軍楊欽義人皆言必知樞密徳裕待之無加禮欽義心銜之一旦獨延欽義置酒中堂情禮極厚陳珍玩數牀罷酒皆以贈之欽義大喜過望行至汴州敕復還淮南復扶又翻欽義盡以所餉歸之徳裕曰此何直言此物所直能幾何也卒以與之卒子恤翻其後欽義竟知樞密徳裕柄用欽義頗有力焉史言李徳裕亦不免由宦官以入相初伊吾之西焉耆之北有􅃛戛斯部落􅃛下八翻戛紇􅃛翻即古之堅昆唐初結骨也後更號黠戛斯結骨入貢見二百九十八卷太宗貞觀二十二年今考異曰李徳裕㑹昌一品集安撫回鶻制作紇吃斯從㑹昌伐叛記杜牧集新舊傳實錄乾元中為回鶻所破自是隔閡不通中國閡牛代翻其君長曰阿熱建牙青山去回鶻牙槖駞行四十日青山在劒河西其人悍勇悍户罕翻又侯旰翻吐蕃回鶻常賂遺之遺唯季翻假以官號回鶻既衰阿熱始自稱可汗回鶻遣相國將兵擊之連兵二十餘年數為􅃛戛斯所敗數所角翻敗補邁翻詈回鶻曰詈力智翻汝運盡矣我必取汝金帳金帳者回鶻可汗所居帳也及掘羅勿殺彰信立㕎馺事見上年回鶻别將句錄莫賀引􅃛戛斯十萬騎攻回鶻大破之殺㕎馺及掘羅勿錄考異曰舊傳作句未賀今從新傳焚其牙帳蕩盡回鶻諸部逃散其相馺職特勒庬等十五部西奔葛邏祿一支奔吐蕃一支奔安西邏郎佐翻可汗兄弟嗢没斯等嗢烏没翻及其相赤心僕固特勒那頡啜啜樞悦翻各帥其衆抵天徳塞下就雜虜貿易榖食帥讀曰率貿音茂且求内附冬十月丙辰天徳軍使温徳彝奏回鶻潰兵侵逼西城西城朔方西受降城也亘六十里不見其後亘横亘也邊人以回鶻猥至恐懼不安詔振武節度使劉沔屯雲迦闗以備之新志單于府有雲伽闗振武節度治單于府迦古牙翻又居伽翻一考異曰新傳實錄作雲伽闗今從品集魏博節度使何進滔薨軍中推其子都知兵馬使重順知留後蕭太后徙居興慶宫積慶殿號積慶太后蕭太后文宗之母十二月癸酉朔上幸雲陽校獵故事新天子即位兩省官同署名上之即位也諫議大夫裴夷直漏名由是出為杭州刺史視考異曰新傳曰武宗立夷直冊牒不肯署今從武宗實錄開府儀同三司左衛上將軍兼内謁者監仇士良請以開府䕃其子為千牛唐制千牛備身掌執御刀服花鈿繡衣緑執象笏宿衛侍從宋白曰唐制千牛進馬並係資䕃給事中李中敏判曰開府階誠宜䕃子唐制從五品以上皆得䕃子開府從一品宜得䕃子謁者監何由有兒士良慙恚恚于避翻李徳裕亦以中敏為楊嗣復之黨惡之惡烏路翻出為婺州刺史婺州春秋越之西界漢為㑹稽郡烏傷縣地呉置東陽郡陳置縉州隋平陳為呉州其地于天文為婺女之分改婺州京師東南四千七百里婺亡遇翻十二月庚申以何重順知魏博留後事立皇子峻為把王武宗至道昭肅孝皇帝諱瀍穆宗第五子㑹昌元年春正月辛巳上祀圓丘赦天下改元劉沔奏回鶻已退詔沔還鎮自雲迦闗還鎮二月回鶻十三部近牙帳者立烏希特勒為烏介可汗南保錯子山新志鸊鵜泉北十里入磧經麚鹿山鹿耳山至錯甲山據李徳裕言錯子山東距釋迦泊三百里考異曰據伐叛記烏介立在二月今從之後唐獻祖繋年錄曰王子烏希特勒者曷薩之弟胡特勒之叔為􅃛戛斯所迫帥衆來歸至錯子山乃自立為可汗二年七月冊為烏介可汗三月甲戌以御史大夫陳夷行為門下侍郎同平章事初知樞密劉𢎞逸薛季稜有寵于文宗仇士良惡之惡烏路翻上之立非二人及宰相意故楊嗣復出為湖南觀察使李珏出為桂管觀察使士良屢譖𢎞逸等于上勸上除之乙未賜𢎞逸季稜死遣中使就潭桂州誅嗣復及珏湖南觀察使治潭州桂管觀察使治桂州潭州古長沙郡京師南二千四百四十五里秦取陸梁地為桂林郡呉于桂林置始安郡梁置桂州至京師水陸路四千七百六十里户部尚書杜悰奔馬見李徳裕曰天子年少少詩照翻新即位兹事不宜手滑丙申徳裕與崔珙崔鄲陳夷行三上奏又邀樞密使至中書使入奏以為徳宗疑劉晏動揺東宫而殺之中外咸以為寃兩河不臣者由兹恐懼得以為辭徳宗後悔錄其子孫劉晏之死見二百二十六卷徳宗建中元年李正已等請晏罪見上年興元初帝寤許晏歸葬貞元五年擢晏子執經太常博士宗經秘書郎文宗疑宋申錫交通藩邸竄謫至死既而追悔為之出涕宋申錫竄事見二百四十四卷太和五年追悔事見上卷開成元年為于偽翻嗣復珏等若有罪惡乞更加重貶必不可容亦當先行訊鞠俟罪狀著白誅之未晩今不謀于臣等遽遣使誅之人情莫不震駭願開延英賜對至晡時開延英召徳裕等入徳裕等泣涕極言陛下宜重慎此舉毋致後悔上曰朕不悔三命之坐徳裕等曰臣等願陛下免二人於死勿使既死而衆以為寃今未奉聖㫖臣等不敢坐乆之上乃曰特為卿等釋之特為于偽翻徳裕等躍下階舞蹈上召升坐坐徂卧翻歎曰朕嗣位之際宰相何甞比數李珏季稜志在陳王陳王成美也嗣復𢎞逸志在安王安王溶也陳王猶是文宗遺意安王則專附楊妃楊妃請立安王故云然嗣復仍與妃書云姑何不效則天臨朝曏使安王得志朕那復有今日復扶又翻徳裕等曰兹事曖昧虛實難知上曰楊妃甞有疾文宗聽其弟𤣥思入侍月餘以此得通指意朕細詢内人情狀皎然非虛也遂追還二使二使一往潭一往桂更貶嗣復為潮州刺史李珏為昭州刺史昭州至京師四千四百三十六里裴夷直為驩州司户文考異曰舊紀開成五年八月十七日𦵏宗于章陵知樞密劉𢎞逸薛季稜率禁軍䕶靈駕二人素為文宗奬遇仇士良惡之心不自安因是欲倒戈誅士良𢎞志鹵簿使王起山陵使崔鄲覺其謀先諭鹵簿諸軍是日𢎞逸季稜伏誅以楊嗣復為湖南觀察使李珏為桂管觀察使中丞裴夷直為杭州刺史皆坐𢎞逸季稜也賈緯唐年補錄曰五年八月云是月誅樞密使劉𢎞逸薛季稜帝即位尤忌宦官季稜𢎞逸深懼之及將葬文宗于章陵聚禁兵欲議廢立賴山陵使崔鄲鹵簿使王起拒而獲濟遂擒𢎞逸季稜殺之舊王起傳八月充山陵鹵簿使樞密使劉𢎞逸薛季稜懼誅欲因山陵兵士謀廢立起與山陵使知其謀密奏皆伏誅舊嗣復傳五年九月貶湖南明年誅季稜𢎞逸中人言二人頃附嗣復李珏不利于陛下武宗性急立命中使往湖南桂管殺嗣復與珏按去年八月若已誅𢎞逸季稜不當至此月始再貶嗣復等舊紀王起傳與嗣復傳自相違今從實錄實錄又曰時有再以其事動帝意者帝赫怒欲殺之中使既𤼵雖宰相亦不知之户部尚書判度支杜悰奔馬見徳裕云云舊嗣復傳曰宰相崔鄲崔珙等亟請開延英極言云云獻替記曰㑹昌元年三月二十四日遇假在宅向晚聞有中使一人向東一人向南處置二故相及裴夷直余遣人問鹽鐵崔相度支杜尚書京兆盧尹皆云聞有使去不知其故余遂草約奏狀二十五日早入中書崔相珙續至崔鄲次至陳相最後至己巳時矣余令三相㑹食自歸㕔寫狀請開延英賜對進狀後更無報答至午又自寫第二狀封進兼請得樞宻使至中書問有此事無樞密使對曰向者不敢言相既知只是二人嗣復李珏徳裕言此事至重陛下都不訪問便遣使去物情無不驚懼請附徳裕奏聖㫖若疑徳裕情故請先自逺貶惟此一事不可更行徳裕等至夜不敢離中書請早開延英賜對至中時報開延英余邀得丞相兩省官謂曰上性剛若有一人進狀伏問必不捨矣容徳裕極力救解繼以叩頭流血徳裕救不得它人固不可矣及召入延英徳裕率三相公立當御榻奏事嗚咽流涕云云上既捨之又令徳裕召丞郎兩省官宣示今從實錄亦采獻替記宋白曰天福六年修撰起居注賈緯奏伏覩史館唐髙祖至代宗已有紀傳徳宗亦存實錄武宗至濟隂廢帝凡六代惟有武宗實錄一卷餘皆闕落臣今采訪遺文及耆舊傳説編六十五卷目為唐年補遺錄以備將來史館修述詔褒美付史館夏六月乙巳詔自今臣下論人罪惡並應請付御史臺按問毋得乞留中以杜讒邪以魏博留後何重順為節度使上命道士趙歸真等于三殿建九天道場親授法籙道家符籙起于張道陵盛于冦謙之崇而信之則後魏世祖唐武宗也授當作受右拾遺王哲上疏切諫坐貶河南府士曹考異曰實錄道士趙歸真等八十一人于三殿建九天道場帝親傳法籙右拾遺王哲上疏請不度進士明經為道士不從又上書諫求仙事詞甚切直貶河南府士曹參軍舊紀以衡山道士劉𤣥靜為崇𤣥館學士令與道士趙歸真于禁中修法籙左補闕劉彦謨切諫貶彦謨河南府户曹實錄去年九月已命歸真建道場親受法籙哲疏言王業之始不宜崇信過篤至此又有此事與舊紀劉彦謨事相類今從實錄秋八月加仇士良觀軍容使天徳軍使田牟監軍韋仲平欲擊回鶻以求功奏稱回鶻叛將嗢沒斯等侵逼嗢烏沒翻塞下吐谷渾沙陀党項皆世與為仇請自出兵驅逐党底朗翻上命朝臣議之議者皆以為嗢沒斯叛可汗而來不可受宜如牟等所請擊之便上以問宰相李徳裕以為窮鳥入懷猶當活之况回鶻屢建大功謂助收兩京平安史之亂也今為鄰國所破部落離散窮無所歸逺依天子無秋毫犯塞奈何乗其困而擊之宜遣使者鎮撫運糧食以賜之此漢宣帝所以服呼韓邪也呼韓邪事見二十七卷漢宣帝之甘露三年陳夷行曰此所謂借冦兵資盜糧也史記秦李斯之言不如擊之徳裕曰彼吐谷渾等各有部落見利則鋭敏爭進不利則鳥驚魚散各走巢穴走音奏安肯守死為國家用今天徳城兵纔千餘若戰不利城陷必矣不若以恩義撫而安之必不為患縱使侵暴邊境亦須徴諸道大兵討之豈可獨使天徳擊之乎時詔以鴻臚卿張賈為巡邊使使察回鶻情偽臚陵如翻邊使疏吏翻徳考異曰一品集賜嗢沒斯等詔曰天軍遞至覽所奉表又曰方圖鎮撫己命使臣又知堅昆等五族深入陵虐可汗被害公主及新可汗播越它所特勒等相率遁逃萬里歸命又曰豈非欲討除外冦匡復本蕃又曰但緣未知指的難便聽從又曰又慮邊境守臣或懷疑沮又曰故遣張賈往安撫又曰秋熱然則詔下必在此際也未還上問徳裕曰嗢沒斯等請降可保信乎對曰朝中之人臣不敢保况敢保數千里外戎狄之心乎然謂之叛將則恐不可若可汗在國嗢沒斯等帥衆而來則于體固不可受今聞其國敗亂無主將相逃散或奔吐蕃或奔葛邏祿惟此一支逺依大國觀其表辭危迫懇切豈可謂之叛將乎降户江翻朝直遙翻將即亮翻况嗢沒斯等自去年九月至天徳今年二月始立烏介自無君臣之分分扶聞翻願且詔河東振武嚴兵保境以備之俟其攻犯城鎮然後以武力驅除或于吐谷渾等部中少有抄掠聽自讎報亦未可助以官軍先鬭之以離其交此在兵法習者不察耳抄楚交翻仍詔田牟仲平毋得邀功生事常令不失大信懷柔得宜彼雖戎狄必知感恩辛酉詔田牟約勒將士及雜虜雜虜即吐谷渾沙陀党項等部落毋得先犯回鶻為考異曰舊紀八月烏介遣使告故可汗死部人推可汗今奉公主南投大國時烏介至塞上嗢沒斯與赤心相攻殺赤心率數千帳近西城田牟以聞烏介又令其相頡干迦斯表借天徳城仍乞糧儲牛羊詔王㑹李師偃往宣慰令放公主入朝賑粟二萬石舊徳裕傳曰開成末回鶻為􅃛戛斯所破部族離散烏介奉太和公主南來㑹昌二年二月牙于塞上遣使求助兵糧收復本國權借天徳軍田牟請以沙陀退渾諸部擊之下百寮議議者多云如牟之奏徳裕云云帝以為然許借米三萬石伐叛記曰㑹昌元年二月回鶻逺涉沙漠饑餓尤甚將金寳于塞上部落博糴糧食邊人貪其財寳生攘奪之心至其年秋城使田牟監軍韋仲平上表稱退渾党項與回鶻宿有嫌怨願出本部兵馬驅逐其時天徳城内只有將士一千人職事又居其半上令宰臣商量徳裕面奏云云八月二十四日請賜田牟仲平詔漢兵及番渾不得先犯回鶻語在㑹要集奏狀中按舊紀實錄皆采集衆書為之事前後多差互今從伐叛記一品集九月戊辰朔詔河東振武嚴兵以備之牟布之弟也田布𢎞正之子死于史憲誠之亂癸巳盧龍軍亂殺節度使史元忠推陳行泰主留務李徳裕請遣使慰撫回鶻且運糧三萬斛以賜之上以為疑閏月己亥開延英召宰相議之陳夷行于候對之所唐自徳宗以後羣臣乞對延英率于延英門請對㑹要曰元和十五年詔于西上閤門西廊内開便門以通宰臣自閤中赴延英路宋申錫之得罪也召諸宰相自中書入對延英屢言資盜糧不可徳裕曰今徴兵未集天徳孤危儻不以此糧噉飢虜噉徒濫翻且使安靜萬一天徳陷沒咎將誰歸李徳裕之本計是也至于此言特以箝陳夷行之喙耳若以用兵大勢言之固將不計一城得失也此弊自唐及宋皆然嗚呼可易言哉夷行至上前遂不敢言上乃許以榖二萬斛賑之賑之忍翻考異曰伐叛記云降使賜米二萬石尋又烏介至天徳按實錄十一月初猶未知公主所在遣苖縝至嗢沒斯處訪問月末始云公主遣使言烏介可汗乞冊命及降使宣慰十二月庚辰制曰公主遣使入朝已知新立可汗寓居塞下宜令王㑹慰問仍賑米二萬斛然則閏九月中烏介未至天徳徳裕但欲賑嗢沒斯等耳上雖許賜米而未遣使㑹聞烏介在塞下因遣王㑹併賜之二萬斛耳非再賜也伐叛記終言其事非以閏九月中即降使賜米也以前山南東道節度使同平章事牛僧孺為太子太師先是漢水溢壞襄州民居先悉薦翻壞音怪故李徳裕以為僧孺罪而廢之廢之者使居散地也史言李徳裕以私怨而廢牛僧孺盧龍軍復亂復扶又翻下同殺陳行泰立牙將張絳十考異曰舊紀月幽州雄武軍使張絳遣軍吏呉仲舒入朝言行泰慘虐請以鎮軍加討許之是月誅行泰遂以絳知兵馬事二年正月以絳知留後仍賜名仲武以兩人為一人誤也今從舊仲武傳伐叛記實錄初陳行泰逐史元忠遣監軍傔傔苦念翻監軍傔監軍之傔從也以軍中大將表來求節鉞李徳裕曰河朔事勢臣所熟諳比來朝廷遣使賜詔常太速諳烏含翻比毗至翻故軍情遂固若置之數月不問必自生變今請留監軍傔勿遣使以觀之既而軍中果殺行泰立張絳復求節鉞朝廷亦不問㑹雄武軍使張仲武起兵擊絳雄武軍在薊州廣漢川且遣軍吏呉仲舒奉表詣京師稱絳慘虐請以本軍討之冬十月仲舒至京師詔宰相問狀仲舒言行泰絳皆遊客故人心不附仲武幽州舊將仲武范陽舊將張光朝之子性忠義通書習戎事人心嚮之曏者張絳初殺行泰召仲武欲以留務讓之牙中一二百人不可仲武行至昌平絳復却之今計仲武纔𤼵雄武軍中已逐絳矣李徳裕問雄武士卒幾何對曰軍士八百外有土團五百人團結土人為兵故謂之土團徳裕曰兵少何以立功對曰在得人心茍人心不從兵三萬何益徳裕又問萬一不克如何對曰幽州糧食皆在媯州及北邊七鎮媯州南至幽州二百九十里東至檀州二百五十里檀州有大王北來保要鹿固赤城邀虜石子齕七鎮媯居為翻萬一未能入則據居庸闗幽州昌平縣軍都陘西北三十五里有納款闗即居庸故闗亦謂之軍都闗按今居庸闗在燕京之北一百一十里絶其糧道幽州自困矣李徳裕因呉仲舒之言固心服張仲武之方畧矣命掌燕留務豈徒然哉徳裕奏行泰絳皆使大將上表脅朝廷邀節鉞故不可與今仲武先自𤼵兵為朝廷討亂為于偽翻與之則似有名徳裕既未敢保張仲武又恐與其初論河朔事勢者相違故然乃以仲武知盧龍留後仲武尋克幽州上校獵咸陽十一月李徳裕上言今回鶻破亡太和公主未知所在君不遣使訪問則戎狄必謂國家降主虜庭本非愛惜既負公主又傷虜情請遣通事舎人苖縝齎詔詣嗢沒斯縝正忍翻令轉達公主兼可卜嗢沒斯逆順之情從之上頗好田獵及武戲武戲謂毬鞠騎射手搏等好呼到翻五坊小兒得出入禁中賞賜甚厚甞謁郭太后郭太后憲宗妃于上為祖母時居興慶宫以養從容問為天子之道從千容翻太后勸以納諫上退悉取諫疏閱之多諫遊獵自是上出畋稍稀五坊無復横賜横下孟翻癸亥以中書侍郎同平章事崔鄲同平章事充西川節度使初􅃛戛斯既破回鶻得太和公主自謂李陵之後唐書曰􅃛戛斯人皆長大赤髮晳面綠瞳以黒髮者為不祥黒瞳者必曰李陵裔也與唐同姓遣達干十人奉公主歸之于唐回鶻烏介可汗引兵邀擊達干盡殺之質公主南度磧質音致磧七迹翻屯天徳軍境上天徳軍境北至磧口三百里公主遣使上表言可汗已立求冊命烏介又使其相頡干伽斯等上表借振武一城以居公主可汗主考異曰新傳曰達干奉來歸烏介怒撃達干殺之南度磧進攻天徳城劉沔屯雲伽闗拒却之按烏介方倚唐為援豈敢攻天徳今從舊紀傳實錄十二月庚辰制遣右金吾大將軍王㑹等慰問回鶻仍賑米二萬斛又賜烏介可汗敕書諭以宜帥部衆漸復舊疆帥讀曰率漂寓塞垣殊非良計又云欲借振武一城前代未有此比比毗至翻例也或欲别遷善地求大國聲援亦須于漠南駐止朕當許公主入覲親問事宜儻須應接必無所吝二年春正月以張仲武為盧龍節度使朝廷以回鶻屯天徳振武北境以兵部郎中李拭為巡邊使察將帥能否拭鄘之子也李鄘見二百四十卷元和十二年二月淮南節度使李紳入朝丁丑以紳為中書侍郎同平章事判度支河東節度使苻澈修杷頭烽舊戍以備回鶻杷頭烽北臨大磧東望雲朔西望振武杷蒲巴翻李徳裕奏請増兵鎮守及修東中二受降城以壯天徳形勢從之右散騎常侍栁公權素與李徳裕善崔珙奏為集賢學士判院事𤣥宗開元十三年改麗正修書院為集賢殿書院五品以上為學士六品以下為直學士宰相一人為學士知院事常侍一人為副知院事又置判院一人押院中使一人元和四年集賢御書院學士直學士皆用五品如開元故事以學士一人年髙者判院事徳裕以恩非已出因事左遷公權為太子詹事此徳裕所以不能免朋黨之禍也回鶻復奏求糧復扶又翻及尋勘吐谷渾党項所掠又借振武城詔遣内使楊觀賜可汗書諭以城不可借餘當應接處置處昌吕翻三月李拭巡邊還稱振武節度使劉沔有威畧可任大事時河東節度使苻澈疾病疾甚曰病庚申以沔代之以金吾上將軍李忠順為振武節度使遣將作少監苖縝冊命烏介可汗使徐行駐于河東俟可汗位定然後進既而可汗屢侵擾邉境縝竟不行回鶻嗢沒斯以赤心桀􅃛難知􅃛下八翻先告田牟云赤心謀犯塞乃誘赤心并僕固殺之那頡啜收赤心之衆七千帳東走欲考異曰伐叛記曰赤心宰相謀犯塞嗢沒斯先布誠于田牟然後誘赤心同謁可汗戮于可汗帳下赤心所領兵馬遂潰散東去歸投幽州一品集幽州紀聖功碑赤心怙力負氣潛圖厲階為嗢沒斯所紿誘以俱謁可汗戮于帳下其衆大潰東逼漁陽舊傳曰回鶻相赤心者與連位相姓僕固者與特那頡啜擁部衆不賔烏介赤心欲犯塞烏介遣其屬嗢沒斯先布誠于田牟然後誘赤心同謁烏介戮赤心于可汗帳下并僕固二人那頡戰勝全占赤心下七千帳東瞰振武大同據室韋黒沙榆林東南入幽州雄武軍西北界新傳曰嗢沒斯以赤心姧桀難得要領即密約田牟誘赤心斬帳下按一品集賜可汗敕書雖云去嵗嗢沒斯已至近界今可汗既立彼又降附然賜可汗書意又云嗢沒斯自本國破之初奔迸先至塞上不隨可汗公主已是二年是則嗢沒斯自有部衆雖遥降烏介身未甞往也安得斬赤心僕固于帳下乎且赤心若不賔烏介又安肯隨嗢沒斯同謁烏介乎蓋嗢沒斯自惡赤心桀􅃛誘至已之帳下而殺之耳今從新傳又伐叛記嗢沒斯殺赤心于烏介至天徳下連言之舊傳亦然新傳在召諸道兵討烏介下按一品集據回鶻到横水柵未知是那頡特下為復是可汗遣來蓋那頡特下脱勒字即那頡啜也然則虜犯横水在赤心死後故置于此河東奏回鶻兵至横水澈考異曰實錄苻奏回鶻掠横水事在正月李拭巡邊前按一品集此狀云宜密詔劉沔忠順則狀必在李忠順鎮振武之後也蓋澈在太原時奏之沔除河東後徳裕方有此奏故置于此殺掠兵民今退屯釋迦泊東李徳裕上言釋迦泊西距可汗帳三百里烏介時移帳保錯子山未知此兵為那頡所部為可汗遣來宜且指此兵云不受可汗指揮擅掠邊鄙密詔劉沔仲武仲武張仲武也先經畧此兵如可以討逐事亦有名摧此一支可汗必自知懼夏四月庚辰天徳都防禦使田牟奏回鶻侵擾不已不俟朝㫖已出兵三千拒之壬午李徳裕奏田牟殊不知兵戎狄長于野戰短于攻城牟但應堅守以待諸道兵集今全軍出戰萬一失利城中空虛何以自固望亟遣中使止之如已交鋒即詔雲朔天徳以來羌渾各出兵奮擊回鶻凡所虜獲並令自取回鶻羈旅二年糧食乏絶人心易動易以䜴翻宜詔田牟招誘降者給糧轉致太原不可留於天徳嗢沒斯情偽雖未可知然要早加官賞鶻考異曰一品集異域歸忠傳序云二年四月甲申回大特勒嗢沒斯率其國特勒宰相等内附而此四月十八日狀已言嗢沒斯送款者蓋嗢沒斯自欲誅赤心之時已送款于田牟至二十日乃率衆至天徳耳故其授左金吾大將軍制云屢獻款誠布于邊將尋執反虜不遺君親戢其餓殍之徒曽靡秋毫之犯旋觀所履大節甚明蓋回鶻亂亡嗢沒斯本與赤心等來歸唐而邊吏疑阻故赤心等怒欲犯塞而嗢沒斯先告邊吏誘赤心之衆東走而嗢沒斯帥其衆降唐也縱使不誠亦足為反閒閒古莧翻且欲奬其忠義為討伐之名令逺近諸番知但責可汗犯順非欲盡滅回鶻石雄善戰無敵請以為天徳都團練副使佐田牟用兵上皆從其言初太和中河西党項擾邊文宗召石雄于白州雄流白州見二百二十四卷太和三年𨽻振武軍為禆將屢立戰功以王智興故未甚進擢至是徳裕舉用之甲申嗢沒斯帥其國特勒宰相等二千二百餘人來降錄考異曰一品集嗢沒斯特勒等狀五月四日上實在五月丙申蓋據奏到之日也今從歸忠傳序上信任李徳裕觀軍容使仇士良惡之惡烏路翻㑹上將受尊號御丹鳯樓宣赦或告士良宰相與度支議草制減禁軍衣糧及馬芻粟士良揚言于衆曰如此至日軍士必于樓前諠譁徳裕聞之乙酉乞開延英自訴上怒遽遣中使宣諭兩軍赦書初無此事且赦書皆出朕意非由宰相爾安得此言士良乃惶愧稱謝丁亥羣臣上尊號曰仁聖文武至神大孝皇帝赦天下五月戊申遣鴻臚卿張賈安撫嗢沒斯等以嗢沒斯為左金吾大將軍懷化郡王其次酋長官賞有差酋慈由翻長知丈翻賜其部衆米五千斛絹三千匹那頡啜帥其衆自振武大同東因室韋黒沙南趣雄武軍窺幽州趣七喻翻盧龍節度使張仲武遣其弟仲至將兵三萬迎擊大破之斬首捕虜不可勝計勝音升悉收降其七千帳分配諸道那頡啜走烏介可汗獲而殺之下考異曰伐叛記曰仲武招降赤心潰兵及可汗下部落前後三萬餘人分配諸道回鶻種族遂至寡弱新舊紀皆無仲武破回鶻事舊回紇傳曰仲武大破那頡之衆全收七千帳殺戮收擒老小共九萬人那頡中箭透駝羣潛脱烏介獲而殺之一品集幽州紀聖功碑曰公前後受降三萬人特勒二人可汗妹一人大都督外宰相四人其他禆王騎將不可備載諸書皆不言仲武破那頡啜日月故附于此時烏介衆雖衰減尚號十萬駐牙于大同軍北閭門山楊觀自回鶻還還音旋可汗表求糧食牛羊因楊觀之還而上表且請執送嗢沒斯等詔報以糧食聽自以馬價于振武糴三千石回鶻自肅代以來以馬與中國互市隨其直而償其價牛稼穡之資中國禁人屠宰羊中國所鮮鮮息淺翻出于北邊雜虜國家未甞科調調徒弔翻嗢沒斯自本國初破先投塞下不隨可汗已及二年慮彼猜嫌彼謂烏介窮迫歸命前可汗正以猜虐無親致内離外叛今可汗失地逺客尤宜深矯前非若復骨肉相殘復扶又翻下同則可汗左右信臣誰敢自保朕務在兼愛已受其降謂受嗢沒斯降也于可汗不失恩慈于朝廷免虧信義豈不兩全事體深叶良圖嗢沒斯入朝六月甲申以嗢沒斯所部為歸義軍以嗢沒斯為左金吾大將軍充軍使門下侍郎同平章事陳夷行罷為左僕射秋七月以尚書右丞李讓夷為中書侍郎同平章事嵐州人田滿川據州城作亂劉沔討誅之嗢沒斯請置家太原與諸弟竭力扞邊詔劉沔存撫其家烏介可汗復遣其相上表借兵助復國又借天徳城詔不許初可汗往來天徳振武之間剽掠羌渾剽正妙翻又屯把頭烽北宋白曰把頭烽在朔州朝廷屢遣使諭之使還漠南可汗不奉詔李徳裕以為那頡啜屯于山北烏介恐其與奚契丹連謀邀遮故不敢逺離塞下離力智翻望敕張仲武諭奚契丹與回鶻共滅那頡啜使得北還及那頡啜死可汗猶不去議者又以為回鶻待馬價詔盡以馬價給之又不去八月可汗帥衆過把頭烽南突入大同川驅掠河東雜虜牛馬數萬轉鬭至雲州城門宋白曰雲州古平城之地北至長城三百里即蕃界今大元大同府治大同縣領雲中白登二縣又有雲内州領柔服蠻川二縣刺史張獻節閉城自守吐谷渾党項皆挈家入山避之庚午詔𤼵陳許徐汝襄陽等兵屯太原及振武天徳俟來春驅逐回鶻太考異曰實錄六月回鶻冦雲州劉沔出原兵禦之又云劉沔救雲州為回鶻所敗七月又云烏介過天徳至把頭烽突入大同川驅太原部落牛馬數萬轉戰至雲州新紀正月回鶻冦横水撫畧天徳振武軍三月回鶻冦雲朔六月劉沔及回鶻戰于雲州敗績按一品集奏回鶻事宜狀臣等見楊觀説緣回鶻赤心下兵馬多散在山北恐與奚契丹室韋同邀截可汗所以未敢逺去今因賜仲武詔令諭以朝㫖緣回鶻曽有忠效又因殘破歸附國家朝廷事體須有存恤令奚契丹等與其同力討除赤心下散卒遣可汗漸出漢界免有滯留此狀雖無日月約須在楊觀自回鶻還赤心死那頡啜未敗前也又賜可汗書云一昨數使却回皆言可汗只待馬價及令交付之次又聞所止屢遷則是可汗邀求馬價而朝廷于此盡以給之也又七月十九日狀云望賜可汗書得嗢沒斯表稱在本國之時各有本分馬其馬價絹並合落下請充進奉以可汗本國殘破乆在邉陲此已量與嗢沒斯優當其嗢沒斯以下本分馬價絹便賜可汗然則給其馬價必在七月十九日前當是時回鶻必未冦雲州敗劉沔突入大同川掠太原牛馬故朝廷曲徇所求欲其早離塞下北去尚未有攻討之意也又實錄八月壬戌朔李徳裕奏請遣石雄斫營取公主擒可汗戊辰又奏斫營事令且住辛未詔𤼵陳許徐汝襄陽兵屯太原振武天徳救援按一品集徳裕論討襲回紇狀云臣頻奉聖㫖緣回鶻漸逼杷頭烽早須討襲臣比知戎虜不解攻城只知馬上馳突臣料必無遊奕伏道又不㑹斫營儻令石雄以義武馬軍兼退渾馬騎精選步卒以為羽翼衘枚夜襲必易成功狀無月日實錄據七日狀云今月一日所商量石雄斫營事望且令住故置之朔日耳此時猶云漸逼杷頭烽則是尚未知過杷頭烽南也又八月七日論回鶻事宜狀云回鶻自至杷頭烽北已是數旬奏報寂然更無侵軼察其情狀只與在天徳振武界首不殊臣等今月一日所商量石雄斫營事望且令住更審候事勢據此狀意則是殊未知可汗深入犯雲州也又八月十日請𤼵陳許等兵狀云臣等昨日已于延英面奏請太原振武天徳各加兵備請更徴𤼵陳許徐汝襄陽等兵至河冰合時深慮可汗突出過河兼與吐蕃連結則為患不細深要防虞其所徴諸道兵恐不可停須令及冰未合各到所在然則回鶻突入大同川犯雲州必在八月之初一日七日猶未知九日始奏到故議𤼵兵守備驅逐實錄新紀皆誤今從舊紀丁丑賜嗢沒斯與其弟阿歴支習勿啜烏羅思皆姓李氏名思忠思貞思義思禮嗢沒斯曰思忠阿歴支曰思貞習勿啜曰思義烏羅思曰思禮歸考異曰舊紀六月嗢沒斯等至京師制以嗢沒斯充義軍使賜姓名李思忠以回鶻宰相受邪勿為歸義軍副使賜姓名李𢎞順舊回鶻傳曰二年冬三年春回鶻七部共三萬衆相次降于幽州詔配諸道有嗢沒斯受邪勿等諸部降振武皆賜姓李氏及名思忠思貞思義今從實錄國相愛邪勿姓愛名𢎞順仍以𢎞順為歸義軍副使上遣回鶻石誡直還其國賜可汗書在考異曰舊紀此詔劉沔張仲武為招討使下按一品集八月十八日狀兩日來臣等竊聞外議云石誡直乆在京城事無巨細靡不諳悉昨緣收入鴻臚懼朝廷處置因求奉使意在脫身又云石誡直先有兩男逃走必是已入回鶻料其此去豈肯盡心伏望速詔劉沔所在勒迥然則遣石誡直賜可汗書必在此狀之前未知後來果曽勒回否也諭以自彼國為紇吃斯所破􅃛戛斯一名紇吃斯蓋語音相近來投邊境撫納無所不至今可汗尚此近塞近其靳翻未議還蕃或侵掠雲朔等州或鈔擊羌渾諸部鈔楚交翻遥揣深意似恃姻好之情謂質太和公主以邀中國揣初委翻好呼到翻每觀蹤由時懷馳突之計中外將相咸請誅翦朕情深屈己未忍幸災可汗宜速擇良圖無貽後悔上又命李徳裕代劉沔答回鶻相頡干迦斯書以為回鶻逺來依投當效呼韓邪遣子入侍身自入朝呼韓邪事見漢宣帝紀及令太和公主入謁太皇太后求哀乞憐則我之救䘏無所愧懷言無所愧于懷也而乃睥睨邊城桀驁自若睥匹詣翻睨研計翻驁五到翻邀求過望如在本蕃又深入邊境侵暴不已求援繼好好呼到翻豈宜如是來書又云胡人易動難安若令忿怒不可復制復扶又翻下同回鶻為紇吃斯所破舉國將相遺骸弃于草莽累代可汗墳墓隔在天涯回鶻忿怒之心不施于彼彼謂紇吃斯而蔑弃仁義逞志中華天地神祇豈容如此昔郅支不事大漢竟自夷滅事見漢宣帝元帝紀往事之戒得不在懷戊子李徳裕等上言若如前詔河東等三道嚴兵守備三道河東盧龍振武也俟來春驅逐乗回鶻人困馬羸之時羸倫為翻又官軍免盛寒之苦則幽州兵宜令止屯本道以俟詔命若慮河冰既合回鶻復有馳突須早驅逐則當及天時未寒決䇿于數月之間以河朔兵益河東兵必令收功于兩月之内今聞外議紛紜互有異同儻一不詢羣情終為浮辭所撓撓奴教翻又奴巧翻望令公卿集議詔從之時議者多以為宜俟來春九月以劉沔兼招撫回鶻使如須驅逐其諸道行營兵權令指揮以張仲武為東面招撫回鶻使其當道行營兵及奚契丹室韋等並自指揮以李思忠為河西党項都將回鶻西南面招討使此河西謂河北之西皆㑹軍于太原令沔屯鴈門闗鴈門闗在代州鴈門縣即陘嶺闗初奚契丹羈屬回鶻各有監使嵗督其貢賦且詗唐事監古衘翻使疏吏翻詗火迥翻又翾正翻張仲武遣牙將石公緒統二部盡殺回鶻監使等八百餘人仲武破那頡啜得室韋酋長妻子酋慈由翻長知丈翻室韋以金帛羊馬贖之仲武不受曰但殺監使則歸之癸夘李徳裕等奏河東奏事官孫儔適至云回鶻移營近南四十里近其靳翻劉沔以為此必契丹不與之同恐為其掩襲故也據此事勢正堪驅除臣等問孫儔若與幽州合勢迫逐回鶻更須益幾兵儔言不須多益兵唯大同兵少得易定千人助之足矣上皆從之詔河東幽州振武天徳各出大兵移營稍前以迫回鶻上聞太子少傅白居易名欲相之易以䜴翻相息亮翻以問李徳裕徳裕素惡居易惡烏路翻乃言居易衰病不任朝謁任音壬其從父弟左司貟外郎敏中辭學不減居易且有器識甲辰以敏中為翰林學士為敏中排徳裕張本李思忠請與契苾沙陀吐谷渾六千騎合勢擊回鶻乙巳以銀州刺史何清朝蔚州刺史契苾通分將河東蕃兵詣振武受李思忠指揮通何力之五世孫契苾種帳太和中附于振武契苾何力太宗時來朝遂留宿衛蔚紆勿翻契欺訖翻冬十月丁夘立皇子峴為益王岐為兖王􅃛戛斯遣將軍踏布合祖等至天徳軍言先遣都吕施合等奉公主歸之大唐至今無聲問不知得達或為姧人所隔今出兵求索索山客翻上天入地期于必得上時掌翻又言將徙就合羅川居回鶻故國回鶻舊居薛延陀北娑陵水上去長安七千里開元中破突厥徙牙烏徳鞬山昆河之間南距漢髙闕塞一千七百里兼已得安西北庭䝉古等五部落李心傳曰蒙古之先世居斡難河靺鞨之後也靺鞨本臣髙麗唐滅髙麗其遺人迸入勃海惟黒水完彊及勃海盛靺鞨皆役屬後為奚契丹所攻部族分散其居混同江之上者其部落最為強盛焉其居隂山者自號為䝉古䝉古之人皆勇悍善戰其近漢地者性情多馴良尚能種秫穄以平底瓦釡煑而食之其逺者風俗多強武以射獵為生無器甲矢貫骨鏃而已余謂李心傳蜀人也安能知直北事特以所傳聞書之十一月辛夘朔昭義節度使劉從諫上言請出部兵五千討回鶻詔不許上遣使賜太和公主冬衣命李徳裕為書賜公主畧曰先朝割愛降婚義寧家國謂回鶻必能禦侮安靜塞垣今回鶻所為甚不循理每馬首南向姑得不畏髙祖太宗之威靈欲侵擾邊疆豈不思太皇太后之慈愛為其國母足得指揮若回鶻不能稟命則是弃絶姻好今日已後不得以姑為詞太和公主憲宗女也于上為姑上幸涇陽校獵乙夘諫議大夫髙少逸鄭朗于閤中諫曰陛下比來遊獵稍頻比毗志翻出城太逺侵星夜歸萬機曠廢上改容謝之少逸等出上謂宰相曰本置諫官使之論事朕欲時時聞之宰相皆賀己未以少逸為給事中朗為左諫議大夫劉沔張仲武固稱盛寒未可進兵請待嵗首唐以建寅之月為嵗首欲待來春進兵李忠順獨請與李思忠俱進十二月丙寅李徳裕奏請遣思忠進屯保大柵從之丁夘吐蕃遣其臣論普熱來告達磨贊普之喪㑹要㑹昌三年贊普卒至十二月遣論贊等來告喪考異曰實錄丁夘吐蕃贊普卒遣使告喪廢朝三日贊普立僅三十餘年有心疾不知國事委政大臣焉命將作少監李景為弔祭使據補國史彛泰卒後又有達磨贊普此年卒者達磨也文宗實錄不書彛泰贊普卒舊傳及續㑹要亦皆無達磨新書據補國史疑文宗實錄闊畧故它書皆因而誤彛泰以元和十一年立至此二十七年然開成三年已卒達磨立至此五年而實錄云僅三十年亦是誤以達磨為彛泰也命將作少監李璟為弔祭使劉沔奏移軍雲州李忠順奏擊回鶻破之丙戌立皇子嶧為徳王嵯為昌王嶧音亦嵯才何翻初吐蕃達磨贊普有佞幸之臣以為相達磨卒無子佞相立其妃綝氏兄尚延力之子乞離胡為贊普綝丑林翻纔三嵗佞相與妃共制國事吐蕃老臣數十人皆不得預政事首相結都那見乞離胡不拜曰贊普宗族甚多而立綝氏子國人誰服其令鬼神誰饗其祀國必亡矣比年災異之多乃為此也比毗至翻為于偽翻老夫無權不得正其亂以報先贊普之徳有死而已拔刀􅋇面慟哭而出佞相殺之滅其族國人憤怒又不遣使詣唐求冊立洛門川討擊使論恐熱洛門川在渭州隴西縣東南漢來歙破隗純于落門即此考異曰補國史曰恐熱姓末名農力吐蕃國法不呼本姓但王族則曰論官族則曰尚其中字即蕃號也熱者例皆言之如中華呼郎性悍忍多詐謀乃屬其徒告之曰屬之欲翻聚㑹其徒也賊捨國族立綝氏專害忠良以脅衆臣且無大唐冊命何名贊普吾當與汝屬舉義兵入誅綝妃及用事者以正國家天道助順功無不成遂說三部落得萬騎三部落蕃種落之分居河隴者或云吐渾党項嗢末說式芮翻是嵗與青海節度使同盟舉兵自稱國相至渭州遇國相尚思羅屯薄寒山恐熱擊之思羅弃輜重西奔松州王涯曰從龍州青川鎮入吐蕃界直抵故松州之城是吐蕃舊置節度之所恐熱遂屠渭州思羅𤼵蘓毗吐谷渾羊同等兵合八萬保洮水焚橋拒之洮土刀翻恐熱至隔水語蘓毗等曰語牛倨翻賊臣亂國天遣我來誅之汝曹奈何助逆我今已為宰相國内兵我皆得制之汝不從將滅汝部落蘓毗等疑不戰恐熱引驍騎涉水蘓毗等皆降思羅西走追獲殺之恐熱盡併其衆合十餘萬自渭州至松州所過殘滅尸相枕藉枕職任翻藉慈夜翻資治通鑑卷二百四十六
