body:
  text: 資治通鑑卷三十三宋司馬光撰胡三省音註漢紀二十五起閼逢攝提格盡旃䝉單閼凡二年孝成皇帝下綏和二年春正月上行幸甘泉郊泰畤二月荀考異紀云赦天下今本紀無之故不取壬子丞相方進薨時熒惑守心心為明堂熒惑守心王者惡之火曰熒惑星熒惑天子理也雖有明天子必視熒惑所在見天文志丞相府議曹平陵李尋議曹職在論議自公府至州郡皆有之奏記方進言災變廹切大責日加安得保斥逐之戮師古曰言其事重不但斥逐而已也闔府三百餘人師古曰三百餘人言丞相之官屬也唯君侯擇其中與盡節轉凶方進憂之不知所出㑹郎賁麗善為星善為甘石之學也師古曰賁姓也麗名也賁音肥言大臣宜當之上乃召見方進還歸未及引决師古曰引决自裁也還従宣翻上遂賜冊責讓以政事不治災害並臻百姓窮困冊即䇿書也説文冊符命也諸侯進受於王也象其札一長一短中有二䋲之形程大昌演繁露曰䇿制長二尺短者半之其次一長一短兩編下陮用篆書此漢䇿拜丞相之制也至䇿免則以尺一木兩行而𨽻書與䇿拜異矣治直吏翻曰欲退君位尚未忍使尚書令賜君上尊酒十石飬牛一君審處焉如淳曰漢儀注有天地大變天下大過皇帝使侍中持節乘四白馬賜上尊酒十斛牛一頭䇿告殃咎使者去半道丞相即上病使者還未白事尚書以丞相不起聞律稻米一斗得酒一斗為上尊稷米一斗得酒一斗為中尊粟米一斗得酒一斗為下尊師古曰稷即粟也宜為黍米不當言稷且作酒自有澆淳之異為上中下耳處昌吕翻方進即日自殺上秘之遣九卿䇿贈印綬賜乗輿祕器少府供張柱檻皆衣素乗繩證翻祕器東園祕器也供音居用翻張音竹亮翻師古曰柱屋柱也檻軒前闌版也皆以白素衣之衣音於既翻天子親臨弔者數至禮賜異於它相故事師古曰漢舊儀云丞相有疾皇帝法駕親至問疾從西門入即薨移居第中車駕徃弔賜棺槨及歛具贈錢塟地塟日公卿已下㑹塟數所角翻臣光曰晏嬰有言天命不慆不貳其命晏子對齊侯禳彗之辭也杜預曰慆疑也音他刀翻禍福之至安可移乎昔楚昭王宋景公不忍移災於卿佐曰移腹心之疾寘諸股肱何益也左傳哀六年有雲如衆赤鳥夹日而飛三日楚子使問諸周太史周太史曰其當王身乎若禜之可移於令尹司馬王曰移腹心之疾而寘諸股肱何益遂弗禜史記宋景公時熒惑守心景公憂之司星子韋曰可移於相公曰相吾之股肱曰可移於民公曰君者待民曰可移於嵗公曰嵗饑民困吾誰為君子韋曰天髙聴卑君有仁人之言三熒惑宜有動候之果徙三度藉其災可移藉之為言借也假也設為之言以發所欲言之意仁君猶不忍為况不可乎使方進罪不至死而誅之以當大變是誣天也方進有罪當刑隠其罪而厚其塟是誣人也孝成欲誣天人而卒無所益卒于恤翻可謂不知命矣三月上行幸河東祠后土丙戌帝崩于未央宫臣瓚曰帝年二十即位即位二十六年夀四十五師古曰即位明年乃改元耳夀四十六帝素彊無疾病自彊以為無疾病也是時楚思王衍梁王立來朝衍楚孝王囂之子明旦當辭去上宿供張白虎殿又欲拜左将軍孔光為丞相已刻侯印書賛師古曰賛謂廷拜之文賛進也廷進而拜之也書賛者書賛辭於策也昏夜平善鄉晨傅絝韈欲起應劭曰傅著也師古曰鄉讀曰嚮傅讀曰附絝古袴字也韈音武伐翻因失衣不能言攬衣而失手緩縦也晝漏上十刻而崩司漏之度有晝漏夜漏是時三月晝漏五十八刻上者漏箭浮而上也上時掌翻民間讙譁咸歸罪趙昭儀讙許元翻皇太后詔大司馬莽雜與御史丞相廷尉治問皇帝起居發病状趙昭儀自殺班彪賛曰臣姑充後宫為媫妤媫妤音接予父子昆弟侍帷幄數為臣言數所角翻為于偽翻成帝善修容儀升車正立不内顧不疾言不親指師古曰不内顧者儼然端嚴不廻眄也不疾言者為輕肆也不親指者為惑下也此三句者本論語鄉黨篇述孔子之事班氏引之今論語云車中不内顧不疾言不親指内顧者説者以為前視不過衡軶旁視不過輢較與此不同輢音於綺翻余謂此亦成帝學論語而有得於修容儀者也夫聖人道徳之容積于中而發於外帝則因論語之文而剛制其外而已損者三樂帝何不能服膺斯言乎嗚呼豈唯是哉論語二十篇修身齊家治國平天下盡在是矣臨朝淵嘿尊嚴若神可謂穆穆天子之容矣淵深嘿静也師古曰禮記云天子穆穆諸侯皇皇大夫濟濟士蹌蹌毛晃曰穆穆和敬貌朝直遥翻下同博覽古今容受直辭公卿奏議可述遭世承平上下和睦然湛于酒色師古曰湛讀曰耽孔穎達曰耽者過禮之樂趙氏亂内外家擅朝言之可為於邑師古曰於邑短氣貌讀如本字於又音烏邑又音烏合翻建始以來王氏始執國命哀平短祚莽遂簒位蓋其威福所由來者漸矣言王氏之禍始於成帝是日孔光於大行前拜受丞相博山侯印綬大行前謂大行皇帝柩前韋昭曰大行者不反之辭恩澤侯表博山侯國於南陽順陽富平侯張放聞帝崩思慕哭泣而死放自河東都尉徵為侍中光禄勲丞相翟方進奏免放遣就國荀悦論曰放非不愛上忠不存焉故愛而不忠仁之賊也皇太后詔南北郊長安如故永始三年復甘泉秦畤雍五畤汾隂后土祠罷長安南北郊夏四月丙午太子即皇帝位謁髙廟尊皇太后曰太皇太后皇后曰皇太后大赦天下哀帝初立躬行儉約省減諸用政事由已出朝廷翕然望至治焉治直吏翻己邜塟孝成皇帝于延陵臣瓉曰自崩至塟凡五十四日延陵在扶風去長安六十二里延考異曰成紀三月丙戌帝崩于未央宮四月己邜塟陵臣瓉曰自崩及塟凡五十四日漢紀乃云三月丙午帝崩四月己夘塟延陵自崩及塟三十四日按是年三月己巳朔無丙午四月己亥朔無己夘若依成紀當云五月己夘塟依荀紀當云閏三月丙午崩二者各冇差舛未知孰是按是年閏七月不當頓差四月今且従成紀之文太皇太后令傅太后丁姬十日一至未央宫有詔問丞相大司空定陶共王太后宜當何居共讀曰恭丞相孔光素聞傅太后為人剛暴長於權謀自帝在襁褓而飬長教道至於成人飬長知兩翻道讀曰導帝之立又有力事見上卷元延四年光心恐傅太后與政事師古曰與讀曰豫不欲與帝旦夕相近近其靳翻即議以為定陶太后宜改築宫大司空何武曰可居北宫上従武言北宫有紫房複道通未央宫長安記桂宫在未央宫北亦曰北宫余按漢書平帝紀成帝趙皇后退居北宫哀帝傅皇后退居桂宫則北宫桂宫自是兩宫傅太后果従􅃨道朝夕至帝所求欲稱尊號貴寵其親屬使上不得由直道行師古曰不得依正直之道也余謂小宗不得間大宗藩后不得位匹長樂私戚不得妄干恩澤所謂正道也髙昌侯董宏宏髙昌侯董忠子也功臣表髙昌侯國于千乗希指上書言秦荘襄王母本夏氏而為華陽夫人所子及即位俱稱太后事見六卷秦孝文王元年上時掌翻華户化翻宜立定陶共王后為帝太后事下有司下遐嫁翻大司馬王莽左将軍關内侯領尚書事師丹劾奏宏知皇太后至尊之號天下一綂而稱引亡秦以為比喻詿誤聖朝劾户槩翻詿户卦翻非所宜言大不道上新立謙讓納用莽丹言免宏為庶人傅太后大怒要上欲必稱尊號要一遥翻上乃白太皇太后令下詔尊定陶恭王為恭皇五月丙戌立皇后傅氏傅太后従弟晏之子也従才用翻詔曰春秋母以子貴見公羊春秋傳隠元年宜尊定陶太后曰恭皇太后丁姬曰恭皇后各置左右詹事食邑如長信宫中宫應劭曰成帝母王太后居長信宫李竒曰𫝊姬如長信丁姬如中宫也師古曰中宫皇后之宫追尊傅父為崇祖侯丁父為褒徳侯封舅丁明為陽安侯舅子滿為平周侯皇后父晏為孔鄉侯師古曰傅父傅太后之父丁父丁太后之父地理志汝南郡有陽安縣恩澤侯表平周侯食邑於南陽湖陽孔鄉侯食邑於沛郡夏丘皇太后弟侍中光禄大夫趙欽為新城侯地理志河南郡有新城縣太皇太后詔大司馬莽就第避帝外家莽上疏乞骸骨帝遣尚書令詔起莽又遣丞相孔光大司空何武左将軍師丹衛尉傅喜白太皇太后曰皇帝聞太后詔甚悲大司馬即不起皇帝即不敢聴政太后乃復令莽視事太皇太后止稱太后史省文復扶又翻成帝之世鄭聲尤甚周末有鄭衛之樂東門溱洧之詩鄭聲也桑中濮上之音衛聲也皆滛聲也其後凡滛聲通謂之鄭聲孔子曰鄭聲滛是也黄門名倡丙彊景武之屬富顯於世倡音齒良翻貴戚至與人主争女樂盖王氏五侯淳于長之屬也帝自為定陶王時疾之又性不好音好呼到翻六月詔曰孔子不云乎放鄭聲鄭聲滛師古曰論語載孔子之言鄭國有溱洧之水男女亟於其間聚㑹故俗亂而樂滛其罷樂府官立樂府見十九卷元狩三年郊祭樂及古兵法武樂在經非鄭衛之樂者别屬他官郊祭樂亦武帝置今以給祠南北郊大樂鼓嘉至鼓邯鄲鼓騎吹鼓江南鼓淮南鼓巴俞鼓歌鼓楚嚴鼓梁皇鼔臨淮鼓兹邡鼔朝賀置酒陳殿上應古兵法凡鼓十二人員百二十八人郊祭員十三人諸族樂人兼雲招給祠南北郊用六十七人兼給事雅樂用四人夜誦員五人剛别柎員二人給盛徳主調箎員二人聴工以日知律冬夏至一人鍾工磬工簫工員各一人僕射二人主領諸樂人皆不可罷竽工員三人罷一琴工員五人罷三柱工員二人罷一繩弦工員六人罷四鄭四㑹員六十二人留一人給事雅樂餘罷張瑟員八人留一安世樂鼓沛吹鼓族歌鼓陳吹鼔商樂鼓東海鼓長樂鼓縵樂鼔凡鼔八員百二十八人朝賀置酒陳前殿房中不應經法治竽員五人楚鼔員六人常従倡三十人常従象人四人詔隨常従倡十六人秦倡員三十九人秦倡象人員三人詔隨秦倡一人雅大人員九人朝賀置酒為樂楚四㑹員十七人巴四㑹員十二人銚四㑹員十二人齊四㑹員十九人蔡謳員三人齊謳員六人竽瑟鐘磬員五人皆鄭聲可罷師學百四十四人其七十二人給太官桐馬酒其七十二人可罷大凡八百二十九人其三百八十八人不可罷可領屬大樂其四百四十一人不應經法或鄭衛之聲皆可罷奏可晋灼曰邡音方師古曰招讀與翹同剛及别柎皆鼔名也柎音膚柱工主筝瑟之柱者弦琴瑟之弦繩言主糾合作之也縵樂雜樂也音漫挏音動李竒曰以馬乳為酒撞挏乃成孟康曰象人若今戲蝦魚師子者也韋昭曰著假面者也凡所罷省過半然百姓漸漬日乆又不制雅樂有以相變豪富吏民湛沔自若漸讀曰沾師古曰湛讀曰沈又讀曰耽自若言自如故也王莽薦中壘校尉劉歆有材行行下孟翻為侍中稍遷光禄大夫貴幸更名秀歆改名秀冀以應圗䜟更工衡翻上復令秀典領五經卒父前業秀父向典校書見三十卷河平三年師古曰卒終也復扶又翻卒子恤翻秀於是總羣書而奏其七畧有輯略有六藝略有諸子略有詩賦略有兵書略有術數略有方技略師古曰輯略謂羣書之摠要輯與集同六藝六經也諸子即下九流是也詩賦則自屈原荀卿至揚雄等所作也兵書則權謀技巧形勢隂陽之書也術數則天文歴譜五行蓍龜雜占形法之書也方技則醫經經方房中神仙之書也凡書六略三十八種種章勇翻五百九十六家萬三千二百六十九卷其叙諸子分為九流曰儒曰道曰隂陽曰法曰名曰墨曰從横曰雜曰農従子容翻以為九家皆起於王道既㣲諸侯力政時君世主好惡殊方好呼到翻惡烏路翻是以九家之術蠭出並作師古曰蠭與鋒同各引一端崇其所善以此馳説取合諸侯其言雖殊譬如水火相滅亦相生也水滅火而生木木復生火仁之與義敬之與和相反而皆相成也易曰天下同歸而殊途一致而百慮師古曰下繫之辭今異家者推所長窮知究慮以明其指雖有蔽短合其要歸亦六經之支與流裔師古曰裔衣末也其於六經如水之下流衣之末裔使其人遭明王聖主得其所折中中竹仲翻皆股肱之材已師古曰已語終辭仲尼有言禮失而求諸野師古曰言都邑失禮則於外野求之亦将有獲方今去聖乆逺道術缺廢無所更索師古曰索求也索山客翻彼九家者不猶愈於野乎師古曰愈勝也若能修六蓺之術而觀此九家之言舎短取長舎讀曰捨則可以通萬方之略矣河間恵王良能修獻王之行行下孟翻母太后薨服喪如禮詔益封萬户以為宗室儀表師古曰儀表者言為禮儀之表率余謂有儀可象謂之儀四外望之以正謂之表初董仲舒説武帝説輸芮翻以秦用商鞅之法除井田事見三卷周顯王十九年民得賣買富者田連阡陌貧者亡立錐之地亡讀與無同邑有人君之尊里有公侯之富小民安得不困古井田灋雖難卒行卒讀曰猝宜少近古少詩沼翻限民名田以贍不足師古曰名田占田也各為限制不使富者過制則可使貧弱之家足也塞并兼之路去奴婢除専殺之威服䖍曰不得専殺奴婢也塞悉則翻去羌吕翻薄賦歛省繇役歛力贍翻繇讀曰徭以寛民力然後可善治也治直吏翻及上即位師丹復建言復扶又翻今累世承平豪富吏民訾數鉅萬訾與貲同而貧弱愈困宜略為限天子下其議下遐稼翻丞相光大司空武奏請自諸侯王列侯公主名田各有限關内侯吏民名田皆毋過三十頃奴婢毋過三十人據哀帝紀有司條奏諸侯王列侯得名田國中列侯在長安及公主得名田縣道關内侯吏民名田皆毋得過三十頃諸侯王奴婢二百人列侯公主百人關内侯吏民三十人與此少異食貨志亦與紀同期盡三年犯者沒入官時田宅奴婢賈為減賤賈讀曰價貴戚近習皆不便也皆不以為便於己也詔書且須後師古曰須待也遂寝不行又詔齊三服官諸官織綺繡難成害女紅之物皆止無作輸齊三服官及諸織官皆無作難成之物以輸送也如淳曰紅亦工也其所作已成未成皆止無復作皆輸所近官府也師古曰如説非也謂未成者不作已成者不輸耳余謂如説固非顔説亦未若余説之為簡易明白也除任子令及誹謗詆欺灋應劭曰任子令者漢儀注吏二千石以上視事滿三年得任同産若子一人為郎不以徳選故除之師古曰任保也詆誣也掖庭宫人年三十以下出嫁之重絶人道也官奴婢五十以上免為庶人益吏三百石以下俸上置酒未央宫内者令為傅太后張幄坐於太皇太后坐旁百官志内者令屬少府以宦者為之掌中布張諸衣物為于偽翻師古曰坐音杜卧翻下同大司馬莽按行行下孟翻責内者令曰定陶太后藩妾何以得與至尊並徹去更設坐去𦍑吕翻更工衡翻傅太后聞之大怒不肯㑹重怨恚莽師古曰㑹謂至酒所也重音直用翻莽復乞骸骨復扶又翻秋七月丁夘上賜莽黄金五百斤安車駟馬罷就第一考異曰公卿表十月丁夘大司馬莽免庚午師丹為大司馬四月徙又曰十月癸酉丹為大司空又曰太子太傅師丹為左将軍五月遷荀紀七月丁巳大司馬莽免按丹若以十一月為司馬四月徙官不得以十月為司空也七月丁夘朔無丁巳年表月誤荀紀日誤公卿大夫多稱之者上乃加恩寵置中黄門為莽家給使蘇林曰使黄門在其家為使令十日一賜餐又下詔益封曲陽侯根安陽侯舜新都侯莽丞相光大司空武邑户各有差益封根二千户舜五百户舜音子也莽三百五十户光千户武更以南陽犨之博望鄉為汜鄉侯國益封千户以莽為特進給事中朝朔望見禮如三公朝直遥翻又還紅陽侯立於京師立就國見上卷去年傅太后従弟右将軍喜好學問有志行従才用翻好呼到翻行下孟翻下同王莽既罷退衆庶歸望於喜初上之官爵外親也外親外家之親喜獨執謙稱疾傅太后始與政事數諫之與讀曰豫數所角翻由是傅太后不欲令喜輔政庚午以左将軍師丹為大司馬封髙鄉亭侯按丹傅及恩澤侯表皆云封髙樂侯國於東海賜喜黄金百斤上右将軍印綬以光禄大夫飬病以光禄勲淮陽彭宣為右将軍大司空何武尚書令唐林皆上書言喜行義修潔忠誠憂國内輔之臣也言可為内朝輔弼之臣今以寝病一旦遣歸衆庶失望皆曰傅氏賢子以議論不合於定陶太后故退百寮莫不為國恨之為于偽翻忠臣社稷之衛魯以季友治亂師古曰謂季氏亡則魯不昌治直吏翻楚以子玉輕重師古曰謂楚殺子玉而晋侯喜可知魏以無忌折衝事見上卷秦荘襄王三年項以范増存亡事見髙帝紀百萬之衆不如一賢故秦行千金以間亷頗事見五卷周赧王五十五年間古莧翻漢散萬金以疏亞夫事見十卷髙帝三年疏與疎同喜立於朝陛下之光輝傅氏之廢興也如淳曰傅喜顯則傅氏興其廢亦如之晋灼曰用喜於陛下有光明而傅氏之廢復得興也師古曰如説是余謂晋説亦未可厚非上亦自重之故尋復進用焉明年復進用喜復扶又翻建平侯杜業上書詆曲陽侯根髙陽侯薛宣安昌侯張禹而薦朱博帝少而聞知王氏驕盛少詩照翻心不能善以初立故且優之後月餘司𨽻校尉解光解户買翻奏曲陽侯先帝山陵未成公聘取掖庭女樂五官殷嚴王飛君等置酒歌舞如淳曰五官官名也外戚傳云五官視三百石及根兄子成都侯况亦聘取故掖庭貴人以為妻况商子也皆無人臣禮大不敬不道於是天子曰先帝遇根况父子至厚也今乃背恩忘義背蒲妹翻以根嘗建社稷之䇿師古曰謂立哀帝為嗣也事見上卷元延四年遣歸國免况為庶人歸故郡王氏故魏郡元城人根及况父商所薦舉為官者皆罷以具黨也九月庚申地震自京師到北邊郡國三十餘處壞城郭壞音怪凡壓殺四百餘人上以災異問待詔李尋云考異曰尋𫝊使侍中衛尉傅喜問尋按公卿表傅喜為衛尉二月遷右将軍十一月罷地震在九月當是時喜已不為衛尉矣對曰夫日者衆陽之長長知兩翻人君之表也君不修道則日失其度晻昩亡光師古曰晻與暗同又音烏感翻間者日尤不精光明侵奪失色邪氣珥蜺數作孟康曰暈適背鐍抱珥虹蜺皆日旁氣也珥形㸃黒也如淳曰雄為虹雌為蜺凡氣在旁相對為珥在旁如半環向日為抱向外為背有氣刺日為鐍鐍映傷也適者日之将食先有黑之變也蜺讀曰齧珥音仍吏翻數所角翻下同小臣不知内事竊以日視陛下志操衰於始初多矣唯陛下執乾剛之德彊志守度謂守法度也毋聴女謁邪臣之態諸保阿乳母甘言卑辭之託斷而勿聴勉彊大義斷丁管翻彊其兩翻絶小不忍良有不得已良甚也可賜以貨財不可私以官位誠皇天之禁也臣聞月者衆隂之長長知兩翻妃后大臣諸侯之象也閒者月數為變此為母后與政亂朝與讀曰豫朝直遥翻下同隂陽俱傷兩不相便外臣不知朝事竊信天文即如此近臣已不足杖矣師古曰杖謂倚任也唯陛下親求賢士無彊所惡師古曰邪佞之人誠可賤惡勿得寵而異之令其盛彊也惡烏路翻以崇社稷尊彊本朝臣聞五行以水為本五行一曰水水者天一所生水為準平王道公正修明則百川理落脉通師古曰落謂經絡也偏黨失綱則湧溢為敗今汝潁漂涌地理志潁川郡陽城縣陽乾山潁水所出東至沛郡下蔡縣入淮過郡三行千五百里汝水出汝南郡定陵縣髙陵山東南至新蔡入淮過郡四行千三百四十里與雨水並為民害此詩所謂百川沸騰咎在皇甫卿士之屬師古曰詩小雅十月之交之詩也皇甫卿士周室女寵之族也唯陛下少抑外親大臣臣聞地道柔静隂之常義也聞者關東地數震數所角翻宜務崇陽抑隂以救其咎固志建威固志以用英俊建威以黜姦邪建立也閉絶私路拔進英雋退不任職以彊本朝夫本彊則精神折衝師古曰言有欲衝突為害者則折挫之本弱則招殃致凶為邪謀所陵聞徃者淮南王作謀之時其所難者獨有汲黯以為公孫𢎞等不足言也事見十九卷武帝元狩元年𢎞漢之名相於今無比而尚見輕何况亡𢎞之屬乎故曰朝廷亡人則為賊亂所輕亡讀曰無其道自然也騎都尉平當使領河隄師古曰為使而領其事使音疏吏翻奏九河今皆窴滅窴與填同按經義治水有決河深川師古曰決分泄也深浚治也治直之翻下同而無隄防壅塞之文塞悉則翻河從魏郡以東多溢決水迹難以分明四海之衆不可誣爾雅九夷八狄七戎六蠻謂之四海孔穎達曰東方曰夷者風俗通云東方人好生萬物觝觸地而出夷者觝也其類有九依東夷傳一曰𤣥莬二曰樂浪三曰髙麗四曰滿飾五曰鳬臾六曰索家七曰東屠八曰倭人九曰天鄙南方曰蠻者風俗通云君臣同川而浴極為簡慢蠻者慢也其類有八李廵注爾雅云一曰天竺二曰咳首三曰僬僥四曰跛踵五曰穿胷六曰儋耳七曰狗軹八曰旁舂西方曰戎者風俗通云斬伐殺生不得其中戎者兇也其類有六李廵注爾雅云一曰僥夷二曰戎央三曰老白四曰耆𦍑五曰鼻息六曰天剛北方曰狄者風俗通云父子嫂叔同宂無别狄者辟也其行邪辟其類有五李廵注爾雅云一曰月支二曰穢貊三曰匈奴四曰單于五曰白屋諸儒之説畧有異同然平當所謂四海之衆但言四海之内之人耳宜博求能浚川疏河者上従之待詔賈讓奏言治河有上中下䇿古者立國居民疆理土地必遺川澤之分度水埶所不及師古曰遺留也度計也言川澤水所流聚之處皆留而置之不以為居邑而妄墾殖必計水之所不及然後居而田之也分音扶問翻度音大各翻大川無防小水得入陂障卑下以為汙澤師古曰停水曰汙音一胡翻使秋水多得其所休息左右游波寛緩而不廹夫土之有川猶人之有口也治土而防其川猶止兒啼而塞其口豈不遽止然其死可立而待也塞悉則翻師古曰遽速也音其庶翻故曰善為川者決之使道善為民者宣之使言國語召公諫厲王監謗之辭師古曰道讀曰導導道引也盖隄防之作近起戰國雍防百川各以自利師古曰雍讀曰壅齊與趙魏以河為竟竟讀曰境趙魏瀕山師古曰瀕山猶言以山為邊界也瀕音頻又音賔余謂趙魏之地一邊接山則地勢髙非邊界也齊地卑下齊地瀕海故卑下也作隄去河二十五里河水東扺齊隄則西泛趙魏趙魏亦為隄去河二十五里雖非其正水尚有所遊盪時至而去則填淤肥美淤依據翻民耕田之或乆無害稍築宮宅遂成聚落大水時至漂沒則更起隄防以自救稍去其城郭排水澤而居之湛溺自其宜也師古曰湛讀曰沈音持林翻今隄防陿者去水數百步陿與狭同逺者數里於故大隄之内復有數重復扶又翻重直龍翻民居其間此皆前世所排也河従河内黎陽至魏郡昭陽東西互有石隄激水使還百餘里閒河再西三東廹阨如此不得安息地理志黎陽縣屬魏郡晉灼曰黎山在其南河水經其東其山上碑云縣取山之名取水之陽以為名按溝洫志具載讓奏曰河従河内北至黎陽為石隄激使扺東郡平剛又為石隄使西北扺黎陽觀下又為石隄使東北扺東郡津北又為石隄使西北扺魏郡昭陽又為石隄激使東北今行上䇿徙冀州之民當水衝者決黎陽遮害亭遮害亭在淇口東十八里有金隄隄髙一丈自淇口東地稍髙至遮害亭西五丈水經注曰舊有宿胥口河水於此北入放河使北入海河西薄大山東薄金隄埶不能逺泛濫期月自定薄伯各翻難者将曰若如此敗壞城郭田廬冡墓以萬數百姓怨恨難乃旦翻壞音怪敗補邁翻昔大禹治水山陵當路者毁之故鑿龍門闢伊闕析㡳柱破碣石墮斷天地之性師古曰闢開也析分也墮毁也音火規翻斷丁管翻此乃人功所造何足言也人功所造謂城郭田廬冡墓也今瀕河十郡治隄嵗費且萬萬河南河内東郡陳留魏郡平原千乗信都清河渤海凡十郡及其大決所殘無數如出數年治河之費以業所徙之民遵古聖之法定山川之位謂依禹迹也使神人各處其所而不相奸神謂川凟之神人謂居人也處昌吕翻師古曰奸音干且大漢方制萬里豈其與水争咫尺之地哉此功一立河定民安千載無患故謂之上策載子亥翻若乃多穿漕渠於冀州地使民得以溉田分殺水怒殺所介翻减也雖非聖人法然亦救敗術也可従淇口以東為石隄地理志淇水出河内共縣北山東至黎陽入河水經注曰魏晉之枋頭古淇口也共音恭多張水門恐議者疑河大川難禁制滎陽漕渠足以卜之如淳曰今礫谿口是也言作水門流水流不為害也師古曰礫谿谿名即水經所云濟水東過礫谿者冀州渠首盡當仰此水門仰牛向翻諸渠皆徃徃股引取之如淳曰肢支别也㨿如説股當作肢旱則開東方下水門溉冀州水則開西方髙門分河流民田適治河隄亦成此誠富國安民興利除害支數百嵗故謂之中䇿若乃繕完故隄増卑倍薄勞費無已數逢其害此最下䇿也讓所畫治河三䇿自漢至今未有能行之者大率古人論事畫為三策者其上䇿多孟浪駭俗而難行其中䇿則平實合宜而可用其下䇿則常人所知也數所角翻孔光何武奏迭毁之次當以時定自元帝時貢禹建毁廟之議韋𤣥成匡衡皆踵其説以為太祖以下五廟其親廟四親盡而迭毁迄於成帝終莫能定今二府復奏請與羣臣雜議於是光禄勲彭宣等五十三人皆以為孝武皇帝雖有功烈親盡宜毁太僕王舜中壘校尉劉歆議曰禮天子七廟七者其正法數可常數者也禮記曰天子七廟三昭三穆與太祖廟而七宗不在此數中宗變也師古曰言非當數故云變也苟有功徳則宗之不可預為設數臣愚以為孝武皇帝功烈如彼孝宣皇帝崇立之如此不宜毁立世宗廟見二十四卷宣帝本始元年上覽其議制曰太僕舜中壘校尉歆議可何武後母在蜀郡武蜀郡郫縣人遣吏歸迎㑹成帝崩吏恐道路有盗賊後母留止止不行也左右或譏武事親不篤師古曰左右謂天子側近之臣帝亦欲改易大臣冬十月䇿免武以列侯歸國癸酉以師丹為大司空丹見上多所匡改成帝之政乃上書言古者諒闇不言聴於冡宰師古曰論語云子張曰書云髙宗諒闇三年不言孔子曰何必髙宗古之人皆然君薨百官總已以聴于冡宰三年諒信也闇黙然也鄭𤣥曰周之六官皆摠屬於冡宰冡宰於百官無所不主爾雅曰冡大也冡宰太宰也乃上時掌翻三年無改於父之道師古曰論語稱孔子曰父在觀其志父沒觀其行三年無改於父之道可謂孝矣前大行屍柩在堂而官爵臣等以及親屬赫然皆貴寵封舅為陽安侯皇后尊號未定豫封父為孔鄉侯出侍中王邑射聲校尉王邯等王邑王邯太皇太后親屬也邯户甘翻詔書比下變動政事卒暴無漸師古曰比類也比毗至翻卒讀曰猝下倉卒同臣縦不能明陳大義復曽不能牢讓爵位師古曰牢堅也復扶又翻曽才登翻相隨空受封侯増益陛下之過閒者郡國多地動水出流殺人民日月不明五星失行此皆舉錯失中號令不定法度失理隂陽溷濁之應也錯千故翻師古曰溷音胡頓翻臣伏惟人情無子年雖六七十猶博取而廣求師古曰取讀曰娶孝成皇帝深見天命燭知至徳師古曰燭照也至徳指謂哀帝以壮年克己已者有我之私克去也立陛下為嗣先帝暴棄天下暴者言無疾而崩而陛下繼體四海安寧百姓不懼此先帝聖徳當合天人之功也臣聞天威不違顔咫尺左傳齊桓公對宰孔之言師古曰言常若在前宜自肅懼也願陛下深思先帝所以建立陛下之意且克己躬行以觀羣下之従化天下者陛下之家也胏附何患不富貴不宜倉卒若是其不乆長矣丹書數十上上時掌翻多切直之言傅太后従弟子遷在左右尤傾邪従才用翻上惡之惡烏路翻免官遣歸故郡傅氏本河内温人傅太后怒上不得已復留遷復扶又翻下同丞相光與大司空丹奏言詔書前後相反天下疑惑無所取信臣請歸遷故郡以銷姦黨卒不得遣卒子恤翻終也復為侍中其逼於傅太后皆此類也哀帝之時傅氏固為驕横然史家所記如此等語意其出於王氏愛憎之口議郎耿育上書寃訟陳湯成帝永始二年陳湯徙邊寃訟訟其寃也曰甘延夀陳湯為聖漢揚鈎深致逺之威言湯等深入康居逺誅郅支雖其竄伏荒外能揚威而鉤致之也為于偽翻雪國家累年之恥討絶域不羈之君不羈言不可羈屬也係萬里難制之虜豈有比哉先帝嘉之仍下明詔宣著其功改年垂歴師古曰謂改年為竟寧也不以此事蓋當其年上書者附著耳余按元紀詔曰匈奴郅支單于背叛禮義既服其辜呼韓邪單于修朝保塞邊垂長無兵革之事其改元為竟寧則改年亦以此事非附著也𫝊之無窮應是南郡獻白虎白虎西方之獸主威武故以為湯等之應邊垂無警備㑹先帝寑疾然猶垂意不忘數使尚書責問丞相趣立其功數所角翻趣使丞相御史立議以序其功也師古曰趣讀曰促獨丞相匡衡排而不予予讀曰與封延夀湯數百户事見二十九卷元帝竟寧元年此功臣戰士所以失望也孝成皇帝承建業之基乗征伐之威兵革不動國家無事而大臣傾邪欲専主威排妒有功妒與妬同使湯塊然被見拘囚師古曰塊然獨處之意如土塊也塊音口内翻被皮義翻不能自明卒以無罪老棄燉煌正當西域通道通道通行之路也卒子恤翻燉徒門翻令威名折衝之臣旋踵及身謂罪及其身也復為郅支遺虜所笑誠可悲也復扶又翻下同至今奉使外蠻者未甞不陳郅支之誅以揚漢國之盛夫援人之功以懼敵師古曰援引也音爰棄人之身以快讒豈不痛哉且安不忘危盛必慮衰今國家素無文帝累年節儉富饒之畜又無武帝薦延畜讀與蓄同如淳曰薦延使羣臣薦士而延納之梟俊禽敵之臣獨有一陳湯耳師古曰梟謂斬其首而縣之也俊謂敵之魁率郅支是也春秋左氏傳曰得俊曰克仲馮曰梟俊禽敵之臣宜與薦延通為一句則與上文相配而下言獨有一陳湯耳自不妨梟善鬬故云梟俊猶云梟将也梟堅亮翻假使異世不及陛下尚望國家追録其功封表其墓以勸後進也湯幸得身當聖世功曽未乆曽才登翻反聴邪臣鞭逐斥逺逺于願翻使亡逃分竄死無處所師古曰分謂散離也舜典曰分北三苗逺覽之士莫不計度以為湯功累世不可及而湯過人情所有師古曰言湯所犯之罪過人情共有不能免者非特詭異深可誅責也度徒洛翻湯尚如此雖復破絶筋骨暴露形骸猶復制於脣舌為嫉妒之臣所係虜耳言湯功如此之偉猶不免於罪徙繼今者雖復捐身為國終制於吏議䧟於係虜之罪也復扶又翻此臣所以為國家尤戚戚也為于偽翻書奏天子還湯卒於長安卒子恤翻孝哀皇帝上諱欣定陶恭王康之子也成帝立以為嗣荀悦曰諱欣之字曰喜應劭曰諡法恭仁短折曰哀建平元年春正月隕石于北地十六赦天下司𨽻校尉解光奏言臣聞許美人及故中宫史曹宫史女史也中宫皇后宫也趙皇后傳宫屬中宫為學事史通詩授皇后皆御幸孝成皇帝産子子隠不見見賢遍翻臣遣吏驗問皆得其状元延元年宫有身其十月宫乳掖庭牛官令舎師古曰乳産也音而具翻下皆類此中黄門田客續漢志中黄門比百石掌給事禁中以宦者為之持詔記與掖庭獄丞籍武令收置暴室獄掖庭令屬少府有左右丞暴室丞各一人皆宦者為之暴室丞主中婦人疾病者就此室其皇后貴人有罪亦就此室籍姓晉大夫籍氏之後其先有孫伯黶司晉之典籍以為大政故曰籍氏母問兒男女誰兒也宫曰善臧我兒胞臧古藏字通師古曰胞謂胎之衣也音苞丞知是何等兒也師古曰意言是天子兒耳後三日客持詔記與武問兒死未武對未死客曰上與昭儀大怒趙昭儀也奈何不殺武叩頭啼曰不殺兒自知當死殺之亦死不殺則為違詔命故知當死殺之則後人以害皇子之罪加之故知亦死即因客奏封事曰陛下未有繼嗣子無貴賤唯留意奏入客復持詔記取兒付中黄門王舜舜受詔内兒殿中為擇乳母復扶又翻為于偽翻吿善飬兒且有賞毋令漏泄舜擇官婢張棄為乳母官婢蓋以罪沒入掖庭男為官奴女為官婢鄭𤣥曰古者従坐男女沒入縣官為奴其少才知以為奚今之侍史官婢或謂之奚官女後三日客復持詔記并藥以飲宫師古曰飲音於禁翻宫曰果也欲姊弟擅天下我兒男也頟上有壮髪類孝元皇帝師古曰壮髪當頟前侵下而生今俗呼為圭頭者是也頟鄂格翻今兒安在危殺之矣師古曰危險也猶今人言險不殺耳奈何令長信得聞之師古曰長信謂太后遂飲藥死棄所飬兒師古曰棄謂張棄也十一月宫長李南以詔書取兒去晉灼曰漢儀注有女長御比侍中宫長豈此邪余謂宫長者盖老于宫中諸女御因稱之為宫長猶三署諸郎謂乆次者為郎署長也前持詔記此以詔書書之與記有以異乎曰有詔記手記也後世謂之手記光武所謂詔書手記不可數得手記出于上手詔書則下為之以璽為信長知兩翻不知所置師古曰終竟不知置何所也許美人元延二年懷子十一月乳乳如注翻㝃乳也昭儀謂帝曰常紿我言従中宫來即従中宫來許美人兒何従生中許氏竟當復立邪晉灼曰昭儀前要帝不得立許美人以為皇后而今有子中許氏竟當復立為皇后邪此前約之言也師古曰此説非也言美人在内中何従得兒而生也故言何従生中次此下乃始言約耳懟以手自擣師古曰懟怨怒也擣築也懟音直類翻以頭擊壁户柱従牀上自投地啼泣不肯食曰今當安置我我欲歸耳帝曰今故告之反怒為師古曰故以許美人生子告汝何為反怒殊不可曉也殊異甚也帝亦不食昭儀曰陛下自知是不食何為陛下甞自言約不負女師古曰女讀曰汝今美人有子竟負約謂何帝曰約以趙氏故不立許氏使天下無出趙氏上者毋憂也後詔使中黄門靳嚴従許美人取兒去盛以葦箧靳居􅀈翻盛時征翻葦葭類也織以為箧也置飾室簾南去飾室室之以金玉為飾者昭陽舎是也師古曰簾户簾也音亷帝與昭儀坐使御者于客子解箧緘未巳御者侍者也師古曰緘束箧之繩音古咸翻帝使客子及御者皆出自閉户獨與昭儀在須㬰開户嘑客子嘑古呼字使緘封箧及詔記令中黄門吴恭持以與籍武曰告武箧中有死兒埋屏處屏處有遮蔽處人所不見者屏必郢翻勿令人知武穿獄樓垣下為坎埋其中獄掖庭獄也其它飲藥傷墯者無數事皆在四月丙辰赦令前傳考異曰趙后作丙辰按哀帝紀四月丙午即位赦天下盖傳誤也或者即位後十日赦也臣謹案永光三年男子忠等發長陵傅夫人冡事更大赦更工衡翻孝元皇帝下詔曰此朕所不當得赦也窮治盡伏辜天下以為當當丁浪翻趙昭儀傾亂聖朝親滅繼嗣家屬當伏天誅而同産親屬皆在尊貴之位廹近帷幄近其靳翻天下寒心請事窮竟謂窮治其獄而竟其情丞相以下議正法令外朝大議以正其罪帝於是免新成侯趙欽欽兄子成陽侯訢皆為庶人訢臨之子也将家屬徙遼西郡議郎耿育上䟽言臣聞繼嗣失統廢適立庶師古曰適讀曰嫡下同聖人法禁古今至戒然太伯見歴知適師古曰歴謂王季即文王之父也知適謂知其當為適嗣也適丁歴翻逡循固讓委身吴粤謂太伯逃之吴粤以避季歴權變所設不計常法致位王季以崇聖嗣聖嗣謂文王卒有天下師古曰卒終也卒子恤翻子孫承業七八百載載子亥翻年也爾雅曰唐虞曰載取物終更始功冠三王冠古玩翻道徳最備是以尊號追及太王太王古公亶父也武王克商有天下追王太王王季故世必有非常之變然後乃有非常之謀孝成皇帝自知繼嗣不以時立念雖未有皇子萬嵗之後末能持國師古曰末晚暮也萬嵗言晏駕也余謂人之生也以死為諱故常人以死後為百年之後天子曰千秋萬嵗後權柄之重制於女主女主驕盛則耆欲無極如武帝為鉤弋夫人慮者是也師古曰耆讀曰嗜少主幼弱則大臣不使師古曰不使不可使従命也世無周公抱負之輔恐危社稷傾亂天下知陛下有賢聖通明之徳仁孝子愛之恩懷獨見之明内斷於身斷丁亂翻故廢後宫就館之漸絶㣲嗣禍亂之根師古曰㣲嗣者謂幼主也乃欲致位陛下以安宗廟愚臣既不能深援安危定金櫃之計師古曰愚臣謂解光等也金匱言長乆之法可藏于金匱石室者援音爰又不知推演聖徳師古曰演廣也音弋善翻述先帝之志乃反覆校省内暴露私燕師古曰私燕謂成帝閑燕之私也覆音方目翻余謂私燕袵席之私所謂専房燕即此燕也誣汙先帝傾惑之過汙烏故翻成結寵妾妬媢之誅媢莫報翻甚失聖賢逺見之明逆負先帝憂國之意夫論大徳不拘俗立大功不合衆用衛鞅語意此乃孝成皇帝至思所以萬萬於衆臣陛下聖徳盛茂所以符合於皇天也豈當世庸庸斗筲之臣所能及哉筲竹噐也容斗二升音所交翻且褒廣将順君父之美匡救銷滅既徃之過古今通義也事不當時固争防禍於未然各隨指阿従以求容媚晏駕之後尊號已定萬事已訖乃探追不及之事訐揚幽昩之過此臣所深痛也耿育之言是也春秋為尊者諱義正如此探吐南翻師古曰訐音居謁翻願下有司議下遐稼翻即如臣言宜宣布天下使咸曉知先帝聖意所起不然空使謗議上及山陵下流後世逺聞百蠻聞音問近布海内甚非先帝託後之意也盖孝者善述父之志善成人之事唯陛下省察省悉井翻帝亦以為太子頗得趙太后力事見上卷成帝元延四年遂不竟其事傅太后恩趙太后師古曰恩謂以厚恩接遇之一曰恩謂銜其立哀帝為嗣之恩也余謂一説是趙太后亦歸心故太皇太后及王氏皆怨之為趙后自殺張本丁酉光禄大夫傅喜為大司馬封髙武侯恩澤侯表髙武侯國於南陽杜衍縣考異曰公卿表綏和二年十一月庚午師丹為大司馬四月徙建平元年四月丁酉傅喜為大司馬喜傳云明年正月徙師丹為大司空而拜喜為大司馬荀紀亦在正月按長歴此年四月癸亥朔無丁酉今従喜傳漢紀秋九月甲辰隕石于虞二地理志虞縣屬梁國郎中令泠襃師古曰泠音零古者樂工謂之泠人因以為氏周有泠州鳩原父曰按此時無郎中令余謂令字衍黄門郎叚猶等復奏言定陶共王太后共皇后皆不宜復引定陶藩國之名以冠大號復扶又翻共讀曰恭冠古玩翻車馬衣服宜皆稱皇之意師古曰皇者至尊之號其服御宜皆副稱之也稱音尺孕翻置吏二千石以下各供厥職師古曰謂詹事太僕少府等衆官也又宜為共皇立廟京師為于偽翻下故為同上復下其議復扶又翻下遐稼翻羣下多順指言母以子貴宜立尊號以厚孝道唯丞相光大司馬喜大司空丹以為不可丹曰聖王制禮取法於天地尊卑者所以正天地之位不可亂也易繫辭曰天尊地卑君臣定矣卑髙以陳貴賤位矣又履卦大象曰上天下澤履君子以辯上下定民志履者禮也今定陶共皇太后共皇后以定陶共為號者母従子妻従夫之義也共皇太后之號為母従子共皇后之號為妻従夫欲立官置吏車服與太皇太后並非所以明尊無二上之義定陶共皇號諡已前定義不得復改復扶又翻禮父為士子為天子祭以天子其尸服以士服子無爵父之義尊父母也引禮記喪服小記之言古者祭祀必有尸服以生時之服事亡如事存也鄭𤣥曰祭以天子飬以子道也尸服士服父本無爵不敢以已爵加之嫌于卑之為人後者為之子故為所後服斬衰三年斬衰用麤布其下斬之不緶衰音七雷翻而降其父母期明尊本祖而重正統也本祖所後之祖孝成皇帝聖恩深逺故為共王立後事見上卷成帝綏和元年奉承祭祀令共皇長為一國太祖前稱共王後稱共皇隨其時之所稱而稱之也諸侯之國以始封之君為國太祖萬世不毁恩義已備陛下既繼體先帝持重大宗承宗廟天地社稷之祀義不可復奉定陶共皇祭入其廟復扶又翻下同今欲立廟於京師使臣下祭之是無主也又親盡當毁禮太祖以下親廟四親盡而迭毁匡衡曰孝莫大於嚴父故父之所尊子不敢不承父之所異子不敢同禮公子不得為母信為後則於子祭於孫止李竒曰不得信尊其父也公子去其所而為大宗後尚得私祭其母為孫則止不得祭公子母也明繼祖不復顧其私祖母此皆親盡當毁之義也師古曰信讀曰申空去一國太祖不墮之祀而就無主當毁不正之義共皇立廟于定陶則為一國太祖之廟萬世不毁立廟于京師則其祭莫適為主又親盡當毁而於禮又為不正也墮讀曰隳非所以尊厚共皇也丹由是浸不合上意㑹有上書言古者以龜貝為貨今以錢易之貝博盖翻海介蟲也居陸名贆在水名蜬古者貨貝而寳龜周有泉至秦廢貝而行錢其後王莽以龜貝為貨盖祖此説也埤雅獸為友貝二為朋貝中肉如科斗而有首尾貝之字従目従八言貝目之所背也鹽鐵論曰教與俗改敝與世易夏后氏以𤣥貝殷人以紫石孔頴達曰爾雅貝居陸猋在水蜬大者小者鰿今之細貝亦有紫色者出日南𤣥貝胎貝黒色者餘蚳黄白文餘泉白黄文白質黄文也詩成貝錦則紫貝也紫貝以紫為質黒為文㸃也蚆博而頯中廣兩頭鋭蜠大而儉􅜽小而惰惰狭而長贆音標蜬音含音况鰿音積蚳音治蚆音葩頯匡軌翻蜠音囷民以故貧宜可改幣上以問丹丹對言可改章下有司議下遐稼翻下同皆以為行錢以來乆難卒變易師古曰卒讀曰猝丹老人忘其前語年老神識衰減則健忘忘音巫放翻復従公卿議又丹使吏書奏吏私寫其草丁傅子弟聞之使人上書告丹上封事上時掌翻行道人徧持其書上以問将軍中朝臣朝直遥翻皆對曰忠臣不顯諫大臣奏事不宜漏泄宜下廷尉治下遐稼翻事下廷尉劾丹大不敬承丁傅風㫖也劾户槩翻事未决給事中博士申咸炔欽上書蘇林曰炔音桂姓也言丹經行無比行下孟翻師古曰比音必寐翻余謂讀如字義自通自近世大臣能若丹者少發憤懣奏封事懣音滿又莫困翻不及深思逺慮使主簿書漢三公府皆有主簿録省衆事簿文籍也以板書之漏泄之過不在丹以此貶黜恐不厭衆心師古曰厭音一贍翻上貶咸欽秩各二等博士秩比六百石貶二等則比四百石遂䇿免丹曰朕惟君位尊任重懷諼迷國師古曰諼詐也音虚爰翻進退違命反覆異言甚為君恥之為于偽翻下為賢同以君甞托傅位謂甞傅上於東宫也未忍考于理理理官也謂廷尉也言未召致廷尉而考問之也其上大司空髙樂侯印綬罷掃上時掌翻下同尚書令唐林上疏曰竊見免大司空丹䇿書泰深痛切君子作文為賢者諱春秋之義為賢者諱丹經為世儒宗言經學為當世儒者所宗也徳為國黄耉師古曰黄耉老人之稱也黄謂白髪落盡更生黄者也耉老人面色不浄如垢也親傅聖躬位在三公所坐者㣲海内未見其大過事既以徃丹𫝊以作已免爵太重京師識者咸以為宜復丹爵邑使奉朝請朝直遥翻師古曰識者謂有識之人也請音材性翻成帝尊禮張禹使奉朝請後遂以為官名沈約曰奉朝㑹請召而已請讀如字唯陛下裁覽衆心有以尉復師傅之臣尉與慰同安也復報也上従林言下詔賜丹爵關侯自蕭望之以讒間免官賜爵關内侯其後周堪等皆用此比雖曰以恩師傅其實倚閣之使之優閑耳上用杜業之言召見朱博起家復為光禄大夫朱博免官見上卷成帝綏和元年按杜業𫝊帝初即位業上書言王氏世權日乆薛宣張禹惑亂朝廷而薦朱博見賢遍翻遷京兆尹冬十月壬午以博為大司空中山王箕子幼有眚病箕子中山王興之子孟康曰災眚之眚謂妖病也服䖍曰身盡眚也蘇林曰名為肝厥發時唇口手足十指甲皆眚師古曰下云檮祠解舎孟説是也𤯝音所領翻字不作眚服説誤矣祖母馮太后自飬視數禱祠解數所角翻師古曰解音懈余按韻書解音懈者釋除也禱祠以除災也但顔注上云禱祠解舎則以解為廨舎之廨其説拘矣賈公彦曰求福曰禱禱禮輕得求曰祠祠禮重上遣中郎謁者張由将醫治之續漢志常侍謁者主殿上時節威儀比六百石給事謁者四百石灌謁者郎中比三百石掌賔賛受事及上章報問中郎謁者盖即灌謁者郎中也治直之翻下同由素有狂易病師古曰狂易者狂而變易常性也病發怒去西歸長安尚書簿責由擅去状師古曰簿責以文簿一一責問也由恐因誣言中山太后祝詛上及傅太后中山太后馮太后也即元帝馮昭儀祝職救翻詛荘助翻傅太后與馮太后並事元帝追怨之因是遣御史丁𤣥案驗數十日無所得更使中謁者令史立治之師古曰官為中謁者令姓史名立續漢志中官謁者令主報中章宦者為之更工衡翻立受傅太后指冀得封侯治馮太后女弟習及弟婦君之據馮昭儀傳君之寡弟婦也死者數十人誣奏云祝詛謀弑上立中山王責問馮太后無服辭立曰熊之上殿何其勇今何怯也當熊事見二十九卷元帝建昭元年之上時掌翻太后還謂左右此乃中語師古曰中語謂宫中之言語也吏何用知之欲䧟我效也師古曰效徴驗也乃飲藥自殺宜鄉侯參君之習及夫子按馮昭儀傳習夫及子也當相坐者或自殺或伏法伏法謂受刑而死凡死者十七人衆莫不憐之司𨽻孫寳奏請覆治馮氏獄傅太后大怒曰帝置司𨽻主使察我馮氏反事明白故欲擿抉以揚我惡師古曰剔抉謂挑發之也擿音他歴翻抉音一决翻挑音他聊翻我當坐之上乃順指下寳獄下遐稼翻尚書僕射唐林争之上以林朋黨比周比毗至翻左遷燉煌魚澤障侯師古曰燉煌效穀縣本魚澤障也大司馬傅喜光禄大夫龔勝固争上為言太后出寳復官為于偽翻張由以先告賜爵關内侯史立遷中大僕張由史立以此受賞豈知乃以此賈禍邪資治通鑑卷三十三
