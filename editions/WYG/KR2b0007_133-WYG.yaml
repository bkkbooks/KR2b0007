body:
  text: 資治通鑑卷一百三十三宋司馬光撰胡三省音註宋紀十五起重光大淵獻盡旃蒙單閼凡五年太宗明皇帝下㤗始七年春二月戊戌分交廣置越州治臨漳劉昫曰廉州治合浦縣秦象郡地吳改為珠官郡宋分置臨漳郡及越州領郡三治於此又據沈約志越州領百梁龍蘇永寧永昌富昌南流臨漳合浦宋夀九郡蕭子顯曰臨漳郡本合浦郡之北界也按沈約宋志作臨障宋白續通典作臨瘴以臨界内瘴江為名瘴江一名合浦江初上為諸王寛和有令譽獨為世祖所親即位之初義嘉之黨多䝉全宥晉安王子勛改元義嘉隨才引用有如舊臣及晩年更猜忌忍虐好鬼神好呼到翻多忌諱言語文書有禍敗凶䘮及疑似之言應囘避者數百千品有犯必加罪戮改騧字為􅚷騧古花翻以其似禍字故也左右忤意往往有刳斮者忤五故翻斮側畧翻斬也時淮泗用兵府藏空竭内外百官並斷俸祿藏徂浪翻斷丁管翻考異曰宋本紀云曰給料祿俸今従南史自失青徐之後宋魏交兵於淮泗之間而奢費過度每所造器用必為正御副御次副各三十枚嬖倖用事貨賂公行嬖卑義翻又傳計翻後同上素無子密取諸王􅁎有孕者内宫中生男則殺其母孕以證翻幽考異曰宋書云閉其母於房今從宋畧使寵􅁎子之至是寢疾以太子㓜弱深忌諸弟南徐州刺史晉平刺王休祐前鎭江陵貪虐無度休祐鎭江陵事始上百三十一卷二年刺來葛翻上不使之鎭留之建康遣上佐行府州事上佐謂長史司馬也休祐性剛狠前後忤上非一狠戸墾翻忤五故翻上積不能平且慮將來難制欲方便除之施方畧乗便利而殺之也甲寅休祐從上於巖山射雉據休祐傳巖山在建康城南又據宋紀巖山在秣陵縣界世祖景寧陵在焉射而亦翻左右從者並在仗後從才用翻日欲闇上遣左右壽寂之等數人逼休祐令墜馬因共敺拉殺之傳呼驃騎落馬敺烏口翻拉盧合翻驃匹妙翻騎奇寄翻上陽驚遣御醫絡驛就視絡驛猶絡繹也比其左右至休祐已絶比必寐翻及也絶氣絶也去車輪輿還第去羌吕翻下悉去同追贈司空葬之如禮建康民間訛言荆州刺史巴陵王休若有至貴之相上以此言報之休若憂懼戊午以休若代休祐為南徐州刺史休若腹心將佐皆謂休若還朝必不免禍中兵參軍京兆王敬先説休若曰相息亮翻將即亮翻朝直遥翻下同訖輸芮翻今主上彌留書顧命曰疾大漸惟幾病日臻既彌留呂祖謙曰疾大進而頻於死病日加則愈留夏撰曰重疾謂之病言重病日至而又乆留於體曽不减去將必死也政成省閤羣豎恟恟欲悉去宗支以便其私恟許拱翻去起吕翻殿下聲著海内受詔入朝必往而不返荆州帶甲十餘萬地方數千里上可以匡天子除姦臣下可以保境土全一身孰與賜劒邸第使臣妾飲泣而不敢葬乎呂向曰泣淚也淚入口曰飲休若素謹畏偽許之敬先出使人執之以白於上而誅之三月辛酉魏假員外散騎常侍邢祐來聘散悉亶翻騎竒寄翻魏主使殿中尚書胡莫寒簡西部敕勒為殿中武士魏書官氏志拓㧞鄰以兄為紇骨氏後改為胡氏自魏世祖破柔然高車敕勒皆來降其部落附塞下而居自武周塞外以西謂之西部以東謂之東部依漠南而居者謂之北部莫寒大納貨賂衆怒殺莫寒及高平假鎭將奚陵假鎭將者未得為眞將即亮翻下同夏四月諸部敕勒皆叛魏主使汝隂王天賜將兵討之以給事中羅雲為前鋒敕勒詐降襲雲殺之降户江翻天賜僅以身免晉平刺王旣死刺來逹翻建安王休仁益不自安上與嬖臣楊運長等為身後之計運長等亦慮上晏駕後休仁秉政已軰不得專權彌賛成之上疾嘗暴甚内外莫不屬意於休仁屬之欲翻主書以下皆往東府訪休仁所親信豫自結納其或在直不得出者皆恐懼上聞愈惡之惡烏路翻五月戊午召休仁入見見賢遍翻既而謂曰今夕停尚書下省宿明可早來其夜遣人齎藥賜死休仁罵曰上得天下誰之力邪事見一百三十一卷元年二年孝武以誅鉏兄弟子孫㓕絶孝武誅鉏兄弟謂殺南平王鑠竟陵王誕海陵王休茂也子孫㓕絶於㤗始之世事並見前今復為爾復扶又翻下已復同宋祚其能乆乎上慮有變力疾乘輿出端門休仁死乃入下詔稱休仁規結禁兵謀為亂逆朕未忍明法申詔詰厲詰起吉翻休仁慙恩懼罪遽自引决可宥其二子降為始安縣王聽其子伯融襲封上慮人情不悦乃與諸大臣及方鎭詔稱休仁與休祐深相親結語休祐云汝但作佞此法自足安身我從來頗得此力休祐之隕木欲為民除患而休仁從此日生嬈懼語牛倨翻為于偽翻嬈集韻爾紹翻擾也吾每呼令入省便入辤楊太妃楊太妃休仁所生母也吾春中多與之射雉射而亦翻或隂雨不出休仁輙語左右云我已復得今一日休仁既經南討謂南拒尋陽之兵故也與宿衛將帥經習狎共事將即亮翻帥所類翻吾前者積日失適失適謂體中不安和也休仁出入殿省無不和顔厚相撫勞如其意趣人莫能測事不獲已反覆思惟不得不有近日處分恐當不必即解勞力到翻處昌呂翻分扶問翻解戸買翻曉也故相報知上與休仁素厚雖殺之每謂人曰我與建安年時相鄰謂年齒不相遠也少便欵狎景和㤗始之間勲誠實重事計交切不得不相除痛念之至不能自已因流涕不自勝少詩照翻勝音升史言帝殘害骨肉不能自揜其天性之傷初上在藩與禇淵以風素相善風素相善者以其風標雅素而與之善也蕭子顯齊書風作夙及即位深相委仗上寢疾淵為吳郡太守蕭子顯齊書禇淵傳云為吳興太守按吳郡近畿大郡也吳興次郡也淵以大尚書出守當得大郡吳郡為是急召之既至入見見賢遍翻上流涕曰吾近危篤近其蘄翻故召卿欲使著黃􅘼耳黄􅘼者乳母服也著則畧翻􅘼力賀翻女人上衣也言託孤於淵上與淵謀誅建安王休仁淵以為不可上怒曰卿癡人不足與計事淵懼而從命復以淵為吏部尚書㤗始之初淵為吏部尚書今去郡還朝復為之復扶又翻庚午以尚書右僕射袁粲為尚書令禇淵為左僕射上惡太子屯騎校尉壽寂之勇徤會有司奏寂之擅殺邏尉徙越州惡烏路翻邏郎左翻徙合浦也於道殺之丙戌追廢晉平王休祐為庶人巴陵王休若至京口聞建安王死益懼上以休若和厚能諧輯物情恐將來傾奪㓜主欲追使殺之慮不奉詔欲徵入朝又恐猜駭使䟽吏翻朝直遇翻六月丁酉以江州刺史桂陽王休範為南徐州刺史以休若為江州刺史手書殷勤召休若使赴七月七日宴丁未魏主如河西秋七月巴陵哀王休若至建康乙丑賜死於第贈侍中司空復以桂陽王休範為江州刺史復扶又翻時上諸弟俱盡唯休範以人才凡劣不為上所忌故得全為後休範稱兵張本沈約論曰聖人立法垂制所以必稱先王盖由遺訓餘風足以貽之來世也太祖經國之義雖𢎞隆家之道不足彭城王照不窺古徒見昆弟之義未識君臣之禮冀以家情行之國道主猜而猶犯恩薄而未悟致以呵訓之微行遂成㓕親之大禍謂文帝殺彭城王義康也沈約言義康之罪文帝當呼而訓之不當遂殺之也行下孟翻開端樹隙垂之後人太宗因易隙之情據已行之典翦落洪枝謂據文帝已行之典而翦除兄弟也洪大也枝兄弟也嫡綂為本枝庶為枝易以豉翻不待顧慮既而本根無庇㓜主孤立神器以勢弱傾移靈命隨樂推囘改樂音洛斯盖履霜有漸堅氷自至所由來遠矣裴子野論曰夫噬虎之獸知愛己子摶狸之鳥非䕶異巢太宗保字螟蛉剿拉同氣既迷在原之天屬未識父子之自然詩曰螟蛉之子蜾羸負之教誨爾子式榖似之故世俗謂抱飬者為螟蛉又曰眷令在原兄弟急難剿子小翻絶也拉盧合翻宋徳告終非天廢也夫危亡之君未嘗不先弃本枝嫗煦旁孽鄭康成曰體曰嫗氣曰煦陸徳明曰嫗於具翻徐於甫翻煦許具翻徐况甫翻孽魚列翻説文庶子為孽旁孽旁枝之庶子也推誠嬖狎嬖卑義翻又愽計翻疾惡父兄惡烏路翻前乘覆車後來并轡借使仲叔有國猶不失配天而他人入室將七廟絶祀曾是莫懷甘心揃落揃子踐翻晉武背文明之託而覆中州者賈后事見晉武帝紀背蒲妹翻太祖棄初寧之誓而登合殿者元凶事見文帝紀禍福無門奚其豫擇友于兄弟不亦安乎丙寅魏主至隂山初吳喜之討會稽也言於上曰得尋陽王子房及諸賊帥皆即於東戮之㑹工外翻帥所類翻既而生送子房釋顧琛等事見一百三十一卷之二年上以其新立大功不問而心銜之及克荆州剽掠贓以萬計尋陽既平建安王休仁遣喜進克荆州剽匹妙翻壽寂之死喜為淮陵太守督豫州諸軍事淮陵漢縣屬臨淮郡後屬下邳國晉復屬臨淮惠帝永寧元年以為淮臨國宋為郡屬南徐州宋白曰泗州招信縣本漢淮陵縣聞之内懼啓乞中散大夫漢大夫掌論議中散大夫後漢志始有之魏晉以來以為冗散散悉亶翻上尤疑駭或譖蕭道成在淮隂有貳心於魏臣考異曰南齊書太祖紀云帝常嫌太祖非人相而民間流言蕭諱當為天子帝愈以為疑今從宋畧上封銀壺酒使喜自持賜道成道成懼欲逃喜以情告道成且先為之飲道成即飲之為于偽翻云考異曰南齊妃太祖戎服出門迎即酌飲之喜還帝意乃解宋畧云道成懼弗肯飲將出奔喜語以情先為之酌於是喜得罪而道成被徵盖南齊書欲成太祖之美故云爾今從宋畧喜還朝保證道成朝直遥翻或密以啓上上以喜多計數素得人情恐其不能事㓜主乃召喜入内殿與共言謔甚欵既出賜以名饌謔迄却翻饌雛戀翻又雛皖翻尋賜死然猶𤼵詔􅉠賜􅉠音附又與劉勔等詔曰吳喜輕狡萬端茍取物情昔大明中黟歙有亡命數千人攻縣邑殺官長劉子尚遣三千精甲討之再徃失利孝武第二子曰豫章王子尚與景和同母也黟音伊歙音攝長知兩翻孝武以喜將數十人至縣説誘羣賊將即亮翻説輸芮翻誘音酉賊即歸降詭數幻惑詭過委翻幻戸辦翻乃能如此及㤗始初東討止有三百人直造三吳造七到翻凡再經薄戰薄伯各翻而自破岡以東至海十郡無不清蕩十郡謂晉陵義興吳郡吳興南東海㑹稽東陽臨海永嘉新安等郡也百姓聞吳河東來便望風自退若非積取三吳人情何以得弭伏如此弭緜婢翻尋喜心迹豈可奉守文之主遭國家可乘之會邪譬如餌藥當人羸冷資散石以全身散如寒食散之類石謂丹石也羸倫為翻散悉但翻及熱勢發動去堅積以止患非忘其功勢不獲已耳用人如此人不自保其肯終為之用乎戊寅以淮隂為北兖州淮隂為南兖州事見上卷上年徴蕭道成入朝朝直遥翻下同道成所親以朝廷方誅大臣勸勿就徴道成曰諸卿殊不見事主上自以太子稚弱稚持利翻翦除諸弟何預它人今唯應速發淹留顧望必將見疑且骨肉相殘自非靈長之祚禍難將興方與卿等戮力耳史言骨肉相殘則姦雄生心因之而起為蕭氏取宋張本難乃旦翻既至拜散騎常侍太子左衛率散悉但翻騎竒寄翻率所律翻八月丁亥魏主還平城戊子以皇子躋繼江夏文獻王義恭景和之初義恭父子皆死事見一百三十一卷夏戸雅翻庚寅上疾有間間讀如字大赦戊戌立皇子凖為安成王實桂陽王休範之子也魏顯祖聰睿夙成剛毅有斷而好黃老浮屠之學每引朝士及沙門共談𤣥理雅薄富貴常有遺世之心以叔父中都大官京兆王子推沈雅仁厚素有時譽欲禪以帝位中都大官即闕沈持林穆帝之子斷丁亂翻翻時太尉源賀督諸軍屯漠南馳傳召之傳株戀翻既至㑹公卿大議皆莫敢先言任城王雲子推之弟也任音壬對曰陛下方隆太平臨覆四海覆敷又翻豈得上違宗廟下棄兆民且父子相傳其來乆矣陛下必欲委棄塵務則皇太子宜承正綂夫天下者祖宗之天下陛下若更授旁支恐非先聖之意啓姦亂之心斯乃禍福之原不可不愼也源賀曰陛下今欲禪位皇叔臣恐紊亂昭穆後世必有逆祀之譏春秋魯莊公薨子般弑季友立閔公閔公復弑立僖公閔公弟也僖公兄也及僖公薨魯人以先大後小為順遂躋僖公于閔公之上仲尼以臧文仲不知者三縱逆祀其一也言宗廟之祀姪為昭而叔為穆亂也後世必以逆祀貽譏更工衡翻紊亡運翻昭時招翻願深思任城之言東陽公丕等曰皇太子雖聖徳早彰然實冲㓜陛下富於春秋始覽萬機柰何欲隆獨善不以天下為心其若宗廟何其若億兆何尚書陸馛曰陛下若捨太子更議諸王臣請刎頸殿庭不敢奉詔馛蒲撥翻刎扶粉翻帝怒變色以問宦者選部尚書酒泉趙黒黒曰臣以死奉戴皇太子不知其它帝黙然陸馛之言則怒而變色趙黒之言則黙然心服者以衆屬於正嫡也但朝廷大議作色於陸馛而黙爾於宦官臣庻何觀魏之朝綱可想而見矣選須絹翻時太子宏生五年矣帝以其㓜故欲傳位子推中書令高允曰臣不敢多言願陛下上思宗廟託付之重追念周公抱成王之事帝乃曰然則立太子羣公輔之有何不可高允之言婉而當且𤼵於衆言交進之後故轉移上意為力差易又曰陸馛直臣也必能保吾子乃以馛為太保與源賀持節奉皇帝璽紱傳位於太子璽斯氏翻魏考異曰後天象志云上廹於太后傳位太子按馮太后若迫顯祖傳位當奪其大政安得猶縂萬機今從帝紀丙午高祖即皇帝位諱宏顯祖獻文皇帝之長子也大赦改元延興高祖㓜有至性前年顯祖病癕高祖親吮吮徂兖翻及受禪悲泣不自勝勝音升顯祖問其故對曰代親之感内切於心丁未顯祖下詔曰朕希心𤣥古志存澹泊爰命儲宫踐升大位澹徒覽翻踐慈衍翻朕得優游恭已栖心浩然羣臣奏曰昔漢高祖稱皇帝尊其父為太上皇明不綂天下也見十一卷漢高帝六年今皇帝㓜冲萬機大政猶宜陛下總之謹上尊號曰太上皇帝太上皇帝之號始此上時掌翻顯祖從之巳酉上皇徙居崇光宫采椽不斷徐廣曰采一名櫟一作柞索隠曰采木名即今之櫟木也余謂采椽者盖自山采來之椽因而用之不施斧斤示樸也椽重縁翻土階而已國之大事咸以聞崇光宫在北苑中又建鹿野浮圖於苑中之西山釋子相傳以為戸迦國波羅奈城東北十里許有鹿野苑本辟支佛住此常有野鹿故以名苑今倣西國而建浮圖也又據魏書道武帝天興二年破高車以其衆起鹿苑於南臺隂北距長城東苞白登屬之西山廣輪數百里盖因代都鹿苑之舊名附合西國鹿野之事而建此浮圖也與禪僧居之禪時連翻冬十月魏沃野綂萬二鎭勑勒叛沃野即漢朔方郡沃野縣也綂萬即赫連故都魏以為鎮置鎮將陸恭之風土記朔方故城後魏改為沃野鎮去綂萬八百餘里遣太尉源賀帥衆討之降二千餘落帥讀曰率降戸江翻追擊餘黨至枹罕金城大破之抱音膚斬首八千餘級虜男女萬餘口雜畜三萬餘頭詔賀都督三道諸軍屯于漠南先是魏每嵗秋冬𤼵軍三道並出以備柔然春中乃還還從宣翻又如字下同賀以為往來疲勞不可支乆請募諸州鎭武徤者三萬餘人築三城以處之先悉薦翻處昌呂翻使冬則講武春則耕種此即古屯田之説也不從庚寅魏以南安王楨為都督凉州及西戎諸軍事領䕶西域校尉鎭凉州校戸教翻上命北琅邪蘭陵二郡太守垣崇祖經畧淮北守式又翻崇祖自郁洲將數百人入魏境七百里據䝉山此指言舊琅邪蘭陵郡也本屬徐州彭城既沒崇祖率部曲據郁洲使領二郡太守未能有其地也魏收志䝉山在東安郡新㤗縣東南水經注朐山縣東北海中有大洲謂之郁洲山海經所謂郁山在海中者是也杜佑曰鬱洲在海州東海縣亦曰郁洲十一月魏東兖州刺史于洛侯擊之崇祖引還上以故第為湘宫寺始封湘東王故以故第為湘宫寺備極壯麗欲造十級浮圖而不能乃分為二新安大守巢尚之罷郡入見見賢遍翻上謂曰卿至湘宫寺未此是我大功徳用錢不少少詩沼翻通直散騎侍郎㑹稽虞愿侍側散騎侍郎曹魏初與散騎常侍同置至晉武帝置員外散騎侍郎及元帝太興元年使員外二人與散騎侍郎同員直故謂之通直散騎侍郎後増為四人散悉亶翻騎竒寄翻㑹工外翻曰此皆百姓賣兒貼婦錢所為貼婦謂夫先有婦苦於上之征求而不能贍縱之外求滛夫貼以贍之又貼亦賣也通典北齊武平以後聽人貼賣園田佛若有知當慈悲嗟愍罪高浮圖何功徳之有侍坐者失色坐徂卧翻上怒使人驅下殿愿徐去無異容上好圍棊好呼到翻下同棊甚拙與第一品彭城丞王抗圍棊當時圍棊之品王抗為第一抗每假借之曰皇帝飛棊臣抗不能斷圍棊之勢聯屬不斷然後可以勝人若為人斷之則為所勝斷如字上終不悟好之愈篤愿又曰堯以此教丹朱博物志堯造圍棊以教子丹朱或云舜以子商均愚故作圍棊以教之其法非智者不能也胡旦曰以棊為易則聰明者而或不能以為難則愚下小人往往精絶非人主所宜好也上雖怒甚以愿王國舊臣上為湘東王愿為國常侍每優容之王景文常以盛滿為憂屢辭位任上不許然中心以景文外戚貴盛張永累經軍旅疑其將來難信乃自為謡言曰一士不可親弓長射殺人射而亦翻景文彌懼自表解揚州情甚切至詔報曰人居貴要但問心若為耳言但問其存心何如耳大明之世巢徐二戴位不過執㦸權亢人主巢謂巢尚之徐謂徐爰二戴謂法興明寳亢口浪翻髙也今袁粲作僕射領選選須絹翻而人往往不知有粲粲遷為令居之不疑人情向粲淡然亦復不改常日以此居貴位要任當有致憂競不袁粲之簡淡雅素目足以鎮雅俗而明帝謂其可以託孤則眞違才易務矣然粲才雖不足以死繼之無愧於爲臣之大節其視禇淵相去豈不遠哉復扶又翻競當作兢不讀曰否夫貴高有危殆之懼卑賤有塡壑之憂有心於避禍不如無心於任運存亡之要巨細一揆耳㤗豫元年春正月甲寅朔上以疾乆不平改元戊午皇太子會四方朝賀者於東宮并受貢計朝直遥翻大陽蠻酋桓誕擁沔水以北滍葉以南八萬餘落降於魏此即五水蠻也宋置大陽成於蘄陽縣西此縣即漢江夏郡蘄春縣也沔水以北滍葉以南皆羣蠻所居誕擁以降魏而誕實大陽蠻酋也酋慈由翻沔彌兖翻滍直里翻葉式渉翻降戸江翻自云桓𤣥之子亡匿蠻中以智略為羣蠻所宗魏以誕為征南將軍東荆州刺史襄陽王東荆州治北陽縣聽自選郡縣吏使起部郎京兆韋珍與誕安集新民區置諸事皆得其所據晉志武帝置起部郎杜佑通典曰晉宋有起部而不常置起部工部也取虞書百工起哉為義自是之後諸蠻皆倚魏以侵擾南國二月柔然侵魏上皇遣將擊之將即亮翻下同柔然走東部敕勒叛奔柔然上皇自將追之至石磧磧七迹翻石磧即石漠不及而還上疾篤慮晏駕之後皇后臨朝江安懿矦王景文以元舅之勢必為宰相景文皇后兄也朝直遥翻相息亮翻門族彊盛或有異圖己未遣使齎藥賜景文死使䟽吏翻手敕曰與卿周旋欲全卿門戸故有此處分處昌呂翻分扶問翻敕至景文正與客棊叩函看己巳畢也復置局下神色不變方與客思行爭劫棊有行有劫行者欲擊東而聲出於西也劫者先有彼我兩急之勢彼欲出此則我劫彼以制之也行下孟翻局竟歛子内奩畢子棊子也奕戲既畢則歛而納諸奩中奩力鹽翻徐曰奉敕見賜以死方以敕示客句斷中直兵焦度趙智畧憤怒中直兵典親兵將官也洪适曰宋有中直兵外兵騎兵參軍曰大丈夫安能坐受死州中文武數百足以一奮王景文時為楊州刺史景文曰知卿至心若見念者為我百口計乃作墨啓荅敕致謝欽藥而卒卿考異曰南史云帝使謂景文曰朕不謂有罪然吾不能獨死請子先之若使者有此語則坐客不容不知更終棊局又曰景文酌酒謂客曰此酒不可相勸自仰而欽之按焦度勸拒命必不對坐客言之何得死時客猶在坐也今從宋書贈開府儀同三司上夢有人告曰豫章太守劉愔反既寤遣人就郡殺之愔於含翻魏顯祖還平城書顯祖以别魏主庚午魏主耕籍田夏四月以垣崇祖行徐州事徙戍龍沮魏收地形志東彭城郡有龍沮縣縣有即丘城五代志琅邪郡治臨沂縣舊曰即丘沮子余翻己亥上大漸書顧命云疾大漸呂祖謙注曰疾大進而瀕於死也以江州刺史桂陽王休範為司空又以尚書右僕射禇淵為䕶軍將軍加中領軍劉勔右僕射勔彌兖翻詔淵勔與尚書令袁粲荆州刺史蔡興宗郢州刺史沈攸之並受顧命禇淵素與蕭道成善引薦於上詔又以道成為右衛將軍領衛尉左右衛晉官衛尉漢官也史言禁衛兵柄皆歸道成與袁粲等共掌機事是夕上殂年三十四庚子太子即皇帝位大赦時蒼梧王方十嵗袁粲禇淵秉政承太宗奢侈之後務𢎞節儉欲救其弊而阮佃夫王道隆等用事貨賂公行不能禁也佃音田乙巳以安成王凖為揚州刺史五月戊寅葬明皇帝于高寧陵據南史陵在臨沂縣莫府山廟號太宗六月乙巳尊皇后曰皇太后作考異曰宋畧本紀癸木今從宋本紀立妃江氏為皇后秋七月柔然部帥無盧眞將三萬騎㓂魏敦煌鎭將尉多矦擊走之多侯眷之子也尉眷事魏太武有平赫連之功帥所類翻將即亮翻下同騎竒寄翻敦徒門翻尉紆勿翻又㓂晉昌守將薛奴擊走之魏書官氏志西方諸姓叱干氏改為薛氏戊午魏主如隂山戊辰尊帝母陳貴妃為皇太妃更以諸國太妃為太􅁎更工衡翻􅁎音怡右軍將軍王道隆以蔡興宗彊直不欲使居上流閠月甲辰以興宗為中書監更以沈攸之為都督荆襄等八州諸軍事荆州刺史興宗辭中書監不拜王道隆每詣興宗躡履到前不敢就席良乆去竟不呼坐沈攸之自以材畧過人自至夏口以來隂蓄異志夏口郢州也攸之鎭郢州見上卷五年夏户雅翻及徙荆州擇郢州士馬器仗精者多以自隨到官以討蠻為名大𤼵兵力招聚才勇部勒嚴整常如敵至重賦歛以繕器甲斂力贍翻舊應供臺者皆割留之飬馬至二千餘匹治戰艦近千艘治直之翻艦戸黯翻近其靳翻艘蘇遭翻倉廪府庫莫不充積士子商旅過荆州者多為所羈留四方亡命歸之者皆蔽匿擁䕶所部或有逃亡無遠近窮追必得而止舉錯專恣不復承用符敕錯千故翻復扶又翻朝廷疑而憚之為後攸之稱兵張本臺省所下者為符出命經中書門下者為敕為政刻暴或鞭撻士大夫上佐以下面加詈辱詈力智翻然吏事精明人不敢欺境内盗賊屏息屏必郢翻夜戸不閉攸之賧罰羣蠻太甚何承天纂文曰賧蠻夷贖罪貨也音徒濫翻又禁五溪魚鹽蠻怨叛酉溪蠻王田頭擬死水經酉水導源巴郡臨江縣東逕遷陵縣故城北又東逕酉陽故縣南又東逕沅陵縣北又南注沅水弟婁侯簒立其子田都走入獠中獠魯皓翻於是羣蠻大亂掠抄至武陵城下抄楚交翻武陵内史蕭嶷遣隊主張英兒擊破之誅婁侯立田都羣蠻乃定嶷􅄨之弟也史言蕭道成二子皆有幹時之用嶷魚力翻賾士革翻八月戊午樂安宣穆公蔡興宗卒九月辛巳魏主還平城冬十月柔然侵魏及五原十一月上皇自將討之將即亮翻將度漠柔然北走數千里上皇乃還還從宣翻又如字丁亥魏封上皇之弟略為廣川王己亥以郢州刺史劉秉為尚書左僕射秉道憐之孫也和弱無幹能以宗室清令令善也故袁禇引之史言袁禇尚虚名而無實用所以受制於姦雄也中書通事舍人阮佃夫晉初初置中書舍人通事各一人江左令舍人通事謂之中書通事舍人佃音田加給事中輔國將軍權任轉重欲用其所親吳郡張澹為武陵郡袁粲等皆不同佃夫稱敕施行粲等不敢執史言袁粲等撓於權倖不能裁之以正澹徒覽翻魏有司奏諸祠祀合一千七十五所嵗用牲七萬五千五百上皇惡其多殺惡烏路翻詔自今非天地宗廟社稷皆勿用牲薦以酒脯而已蒼梧王上諱昱字徳融明帝長子也小字慧震元徽元年春正月戊寅朔改元大赦庚辰魏員外散騎常侍崔演來聘散悉亶翻騎竒寄翻戊戌魏上皇還至雲中還自討柔然癸丑魏詔守令勸課農事同部之内貧富相通家有兼牛通借無者若不從詔一門終身不仕戊午魏上皇至平城自雲中至平城甲戌魏詔縣令能靜一縣刼盗者兼治二縣即食其祿能靜二縣者兼治三縣治直之翻下同三年遷為郡守守式又翻二千石能靜二郡上至三郡亦如之三年遷為刺史桂陽王休範素凡訥少知解凡庸常也訥言難也少詩沼翻解戸買翻解曉也不為諸兄所齒遇齒列也遇待也不以諸弟之列待之也物情亦不向之故太宗之末得免於禍及帝即位年在冲㓜素族秉政近習用權素族謂袁禇也近習謂阮佃夫王道隆楊運長也休範自謂尊親莫二帝諸父皆誅死唯休範在故謂尊親莫二應入為宰輔既不如志怨憤頗甚典籖新蔡許公輿為之謀主令休範折節下士折而設翻下戸嫁翻厚相資給於是遠近赴之嵗中萬計收養勇士繕治器械朝廷知其有異志亦隂為之備會夏口闕鎭夏戸雅翻朝廷以其地居尋陽上流欲使腹心居之二月乙亥以晉熈王爕為郢州刺史爕始四嵗以黃門郎王奐為長史行府州事黃門郎即黃門侍郎配以資力使鎭夏口夏戸雅翻復恐其過尋陽為休範所劫留復扶又翻使自太洑徑去南史休範傳作大子洑此盖即劉胡自江外趣沔口之路休範聞之大怒密與許公輿謀襲建康表治城隍多解材板而蓄之奐景文之兄子也吐谷渾王拾寅㓂魏澆河夏四月戊申魏以司空長孫觀為大都督𤼵兵討之吐從暾入聲谷音浴澆堅堯翻長如兩翻魏以孔子二十八世孫乘為崇聖大夫崇聖大夫以尊崇先聖名官給十戸以供洒掃洒所賣翻掃素報翻又並上聲秋七月魏詔河南六州之民河南六州青徐兖豫齊東徐也戸收絹一匹綿一斤租三十石乙亥魏主如隂山八月庚申魏上皇如河西長孫觀入吐谷渾境芻其秋稼吐谷渾王拾寅窘急請降窘巨隕翻降戸江翻遣子斤入侍自是嵗修職貢九月辛巳上皇還平城遣使如魏報聘也使䟽吏翻冬十月癸酉割南豫兖州之境置徐州治鍾離鍾離禹塗山氏之國春秋鍾離子之國漢為縣屬九江郡晉屬淮南郡晉安帝分立鍾離郡宋立徐州於此宋白曰今鍾離縣東四十里有鍾離城魏上皇將入㓂詔州郡之民十丁取一以充行以充征行也戸收租五十石以備軍糧魏武都氐反攻仇池詔長孫觀回師討之武都王楊僧嗣卒於葭蘆從弟文度自立為武興王從才用翻遣使降魏魏以文度為武興鎭將將即亮翻下同十一月丁丑尚書令袁粲以母憂去職癸巳魏上皇南廵至懷州魏天安二年以河内郡置懷州因古地名以名州也枋頭鎭將代人薛虎子先為馮太后所黜為門士魏有宰士門士宰士掌酒食門士守門户枋音方先悉薦翻時山東饑盗賊競起相州民孫誨等五百人稱虎子在鎭境内清晏乞還虎子上皇復以虎子為枋頭鎭將相息亮翻下同復扶又翻又如字即日之官數州盗賊皆息數州謂冀相懷等州十二月癸卯朔日有食之乙巳江州刺史桂陽王休範進位太尉詔起袁粲以衛軍將軍攝職所謂起復也粲固辭壬子柔然侵魏柔𤣥鎭二部敕勒應之據水經注柔𤣥鎭在長川城東城南小山於延水所出也此即六鎭之一魏州鎭十一水旱相州民餓死者二千八百餘人是嵗魏妖人劉舉聚衆自稱天子妖如遥翻齊州刺史武昌王平原討斬之平原提之子也武昌王提見一百二十五卷宋文帝元嘉二十四年二年春正月丁丑魏太尉源賀以疾罷二月甲辰魏上皇還平城三月丁亥魏員外散騎常侍許赤虎來聘夏五月壬午桂陽王休範反子考異曰宋書作壬按長歴此月辛未朔無壬子今從宋畧掠民船使軍隊稱力請受軍有軍主副隊有隊主副稱力請受者稱其衆力之多少而請船也稱尺證翻付以材板合手裝治合音閤治直之翻數日即辦丙戌休範率衆二萬騎五百發尋陽騎竒寄翻晝夜取道以書與諸執政稱楊運長王道隆蠱惑先帝使建安巴陵二王無罪被戮事見上明帝㤗始七年蠱音古被皮義翻望執錄二豎以謝寃魂豎常句翻庚寅大雷戍主杜道欣馳下告變朝廷惶駭䕶軍褚淵征北將軍張永領軍劉勔僕射劉秉右衛將軍蕭道成游擊將軍戴明寶驍騎將軍阮佃夫右軍將軍王道隆中書舍人孫千齡員外郎楊運長員外郎即員外散騎侍郎驍堅堯翻騎竒寄翻集中書省計事莫有言者道成曰昔上流謀逆皆因淹緩致敗謂南郡王義宣晉安王子勛等也休範必遠懲前失輕兵急下乘我無備今應變之術不宜遠出若偏師失律則大沮衆心沮在呂翻宜頓新亭白下堅守宫城東府石頭以待賊至千里孤軍後無委積委於偽翻積子智翻周禮遺人凡賔客會同師役掌其道路之委積注云少曰委多曰積又宰夫掌牢禮委積注云委積謂牢米薪芻左傳居則具一日之積杜預注云芻米薪求戰不得自然瓦解我請頓新亭以當其鋒征北守白下領軍屯宣陽門為諸軍節度諸貴安坐殿中不須競出我自破賊必矣因索筆下議衆並注同並注名同道成議也索山客翻孫千齡隂與休範通謀獨曰宜依舊遣軍據梁山道成正色曰賊今已近梁山豈可得至新亭既是兵衝所欲以死報國耳常時乃可屈曲相從今不得也坐起坐徂卧翻道成顧謂劉勔曰領軍已同鄙議不可改易袁粲聞難扶曵入殿袁粲居䘮毀瘠故扶曵而入難乃旦翻即日内外戒嚴道成將前鋒兵出屯新亭將即亮翻張永屯白下前南兖州刺史沈懷明戍石頭袁粲褚淵入衛殿省時倉猝不暇授甲開南北二武庫隨將士意所取蕭道成至新亭治城壘未畢將即亮翻下同治直之翻辛卯休範前軍已至新林新林浦去今建康城二十里道成方解衣高卧以安衆心徐索白虎幡索山客翻登西垣使寧朔將軍高道慶羽林監陳顯逹員外郎王敬則帥舟師與休範戰頗有殺獲帥讀曰率壬辰休範自新林捨舟歩上上時掌翻其將丁文豪請休範直攻臺城休範遣文豪别將兵趣臺城趣七喻翻自以大衆攻新亭壘道成率將士悉力拒戰自己至午外勢愈盛衆皆失色道成曰賊雖多而亂尋當破矣休範白服乘肩輿自登城南臨滄觀臨滄觀在勞山上江寕縣南十五里亦曰勞勞亭觀古玩翻以數十人自衛人考異曰張敬兒傳云左右數百皆散走按休範左右若有數百人黄回敬兒雖勇何敢徑徃取之今從休範傳屯騎校尉黃回與越騎校尉張敬兒謀詐降以取之騎竒寄翻校户教翻降户江翻下同囘謂敬兒曰卿可取之我誓不殺諸王敬兒以白道成道成曰卿能辦事當以本州相賞敬兒南陽冠軍人本州謂雍州也為後敬兒求雍州張本乃與囘出城南放仗走大呼稱降休範喜召至輿側囘陽致道成密意休範信之以二子徳宣徳嗣付道成為質呼火故翻質音致二子至道成即斬之休範置囘敬兒於左右所親李恒鍾爽諌不聴恒戸登翻時休範日飲醇酒囘見休範無備目敬兒敬兒奪休範防身刀斬休範首左右皆散走敬兒騎馬持首歸新亭道成遣隊主陳靈寶送休範首還臺靈寳道逄休範兵弃首於水考異曰南齊書云埋首道側宋畧云弃諸溝中今從宋書挺身得逹唱云已平而無以為驗衆莫之信休範將士亦不之知其將杜黒騾攻新亭甚急將即亮翻騾盧戈翻作考異曰宋書南齊書黒蠡而今從宋畧蕭道成在射堂司空主簿蕭惠朗帥敢死士數十人突入東門休範先為司空以惠朗為主簿帥讀曰率下同至射堂下道成上馬帥麾下摶戰惠朗乃退道成復得保城復扶又翻惠朗惠開之弟也蕭惠開見一百三十一卷明帝㤗始之元年二年其姊為休範妃惠朗兄黃門郎惠明時為道成軍副在城内了不自疑左傳宋元公與華氏戰于新里翟僂新居于新里既戰説甲于公而歸華姓居于公里亦如之杜預注曰古之為軍不呰小忿僂力主翻姓他口翻呰于斯翻又音紫道成與黒騾拒戰自晡逹旦矢石不息其夜大雨鼓呌不復相聞復扶又翻將士積日不得寢食軍中馬夜驚城内亂走道成秉燭正坐厲聲呵之如是者數四丁文豪破臺軍於皂莢橋皂莢橋當在新亭之北直至朱雀桁南朱雀桁即大航也在秦淮水上以其在朱雀門外故名桁與航同音户剛翻杜黒騾亦捨新亭北趣朱雀桁趣七喻翻右軍將軍王道隆將羽林精兵在朱雀門内急召鄱陽忠昭公劉勔於石頭勔至命撤桁以折南軍之勢道隆怒曰賊至但當急擊寧可開桁自弱邪勔不敢復言道隆趣勔進戰折之舌翻復扶又翻趣讀曰促勔度桁南戰敗而死黑騾等乘勝度淮道隆弃衆走還臺黒騾兵追殺之蕭道成所謂諸貴不須競出者正慮此也黃門侍郎王藴重傷踣於御溝之側踣蒲北翻或扶之以免藴景文之兄子也於是中外大震道路皆云臺城已陷白下石頭之衆皆潰張永沈懷明逃還宫中傳新亭亦䧟太后執帝手泣曰天下敗矣先是月犯右執法太白犯上將先悉薦翻太微南蕃中二星曰端門東曰左執法西曰右執法東蕃四星其北星曰上將西蕃四星南第一星亦曰上將或勸劉勔解職勔曰吾執心行已無愧幽明若災𤯝必至避豈得免勔晩年頗慕高尚立園宅名為東山遺落世務罷遣部曲蕭道成謂勔曰將軍受顧命輔㓜主當此艱難之日而深尚從容從千容翻廢省羽翼一朝事至悔可追乎勔不從而敗甲午撫軍長史禇澄開東府門納南軍籖考異曰宋書作撫軍興茅恬開東府納賊南齊書作車騎典韯茅恬盖皆為禇澄諱耳今從宋畧擁安成王凖據東府稱桂陽王教曰安成王吾子也勿得侵犯澄淵之弟也杜黒騾徑進至杜姥宅晉成帝杜皇后母裴氏立第南掖門外世謂之杜姥宅姥莫補翻中書舍人孫千齡開承明門出降文帝元嘉二十五年新作閭闔廣莫二門改廣莫門曰承明門降戸江翻宫省恇擾恇去王翻時府藏已竭藏徂浪翻皇太后太妃剔取宫中金銀器物以充賞衆莫有鬭志俄而丁文豪之衆知休範已死稍欲退散文豪厲聲曰我獨不能定天下邪許公輿詐稱桂陽王在新亭士民惶惑詣蕭道成壘投刺者以千數凡求見之禮先投刺以自逹毛晃曰書姓名以自白故曰刺道成得皆焚之登北城謂曰劉休範父子昨已就戮尸在南岡下南岡即勞山之岡也以在新亭城南故謂之南岡身是蕭平南道成之出屯新亭也加平南將軍諸君諦視之諦音帝審也名刺皆已焚勿憂懼也道成遣陳顯逹張敬兒及輔師將軍任農夫馬軍主東平周盤龍等將兵自石頭濟淮從承明門入衛宫省袁粲慷慨謂諸將曰今㓂賊已逼而衆情離沮孤子受先帝付託不能綏靜國家粲時居䘮故自稱孤子任音壬將即亮翻沮在呂翻請與諸君同死社稷被甲上馬將驅之被皮義翻於是陳顯逹等引兵出戰大破杜黒騾於杜姥宅飛矢貫顯逹目丙申張敬兒等又破黒騾等於宣陽門斬黒騾及丁文豪進克東府餘黨悉平蕭道成振旅還建康還從宣翻又如字百姓緣道聚觀曰全國家者此公也道成與袁粲褚淵劉秉皆上表引咎解職不許丁酉解嚴大赦柔然遣使來聘使䟽吏翻六月庚子以平南將軍蕭道成為中領軍南兖州刺史留衛建康道成自此得政矣與袁粲褚淵劉秉更日入直决事號為四貴桂陽王休範之反也使道士陳公昭作天公書題云沈丞相付荆州刺史沈攸之門者攸之不開視推得公昭送之朝廷桂考異曰宋畧云陽遺攸之書署曰沈丞相攸之斬其使今從宋畧及休範反攸之謂僚佐曰桂陽必聲言我與之同若不顛沛勤王顛沛勤王者危難之際奔走顛沛以從王事也必增朝野之惑乃與南徐州刺史建平王景素郢州刺史晉熈王爕湘州刺史王僧虔雍州刺史張興世雍於用翻同舉兵討休範休範留中兵參軍毛惠連等守尋陽爕遣中兵參軍馮景祖襲之癸卯惠連等開門請降降戸江翻考異曰宋畧作癸亥按下有戊申今從宋書殺休範二子諸鎮皆罷兵景素宏之子也建平王宏文帝之子也乙卯魏詔曰下民兇戾不顧親戚一人為惡殃及闔門朕為民父母深所愍悼自今非謀反大逆外叛罪止其身於是始罷門房之誅門誅者誅其一門房誅者誅其一房時河北大族如崔如李子孫分沠各自為房魏顯祖勤於為治冶直吏翻賞罰嚴明愼擇牧守守式又翻進亷退貪諸曹疑事舊多奏决又口傳詔敕或致矯擅上皇命事無大小皆據律正名不得為疑奏合則制可違則彈詰盡用墨詔制可者手詔可其所奏彈詰者劾問之合謂與律合也違謂悖於律也詰去吉翻由是事皆精審尤重刑罰大刑多令覆鞫大刑謂死罪或囚繫積年羣臣頗以為言上皇曰滯獄誠非善治治直吏翻不猶愈於倉猝而濫乎夫人幽苦則思善故智者以囹圄為福堂囹盧丁翻圄音語朕特苦之欲其改悔而加矜恕爾由是囚繫雖滯而所刑多得其宜又以赦令長姦故自延興以後不復有赦㤗始七年魏改元延興長知兩翻復扶又翻秋七月庚辰立皇弟友為邵陵王乙酉加荆州刺史沈攸之開府儀同三司攸之固辭執政欲徵攸之而憚於發命乃以太后令遣中使謂曰使䟽吏翻公乆勞於外宜還京師任寄實重未欲輕之進退可否在公所擇攸之曰臣無廊廟之資居中實非其才至於撲討蠻蜑蜑亦蠻屬音蕩旱翻毛晃曰蜑南夷海種也范成大桂海漁衡志曰蜑海上水居蠻也以舟為家㳂海蜑有三種漁蜑取魚蠔蛋取蠔木蜑伐山取材大率皆取海物為糧生食之入水能視陳師道曰二廣居山谷間不𨽻州縣謂之傜人舟居謂之蜑人島居謂之黎人余謂巴黔亦自有蜑人克清江漢不敢有辭雖自上如此上時掌翻去留伏聽朝㫖朝直遥翻乃止癸巳柔然㓂魏敦煌尉多矦擊破之尚書奏敦煌僻遠介居西北强㓂之間西謂吐谷渾北柔然也敦徒門翻尉紆勿翻恐不能自固請内徙就凉州羣臣集議皆以為然給事中昌黎韓秀獨以為敦煌之置為日已乆雖逼彊㓂人習戰鬬縱有草竊不為大害循常置戍足以自全而能隔閡西北二虜使不得相通閡五慨翻今徙就凉州不唯有蹙國之名且姑臧去敦煌千有餘里防邏甚難邏力佐翻二虜必有交通闚􅎿之志漢武帝開河西四郡以隔絶西𦍑月氏不得與匈奴通其規畫正如此也􅎿音俞若騷動凉州則關中不得安枕又士民或安土重遷招引外㓂為國深患不可不慮也乃止九月假考異曰後魏帝紀使將軍元蘭五將三萬騎及東陽王丕為後繼伐蜀漢不言勝負列傳及宋書皆無之今不取丁酉以尚書令袁粲為中書監領司徒加禇淵尚書令劉秉丹陽尹粲固辭求反居墓所不許粲受遺輔政適罹艱棘國有大難釋衰經以從金革之事大難既平求歸終䘮禮也淵以禇澄為吳郡太守司徒左長史蕭惠明言於朝朝直遥翻朗考異曰宋畧作惠按惠朗不為司徒長史今從南史曰禇澄開門納賊更為股肱大郡王藴力戰㡬死棄而不收㡬居希翻又音祁賞罰如此何憂不亂淵甚慙冬十月庚申以侍中王藴為湘州刺史十一月丙戍帝加元服大赦十二月癸亥立皇弟躋為江夏王贊為武陵王躋牋西翻夏户雅翻是嵗魏建安貞王陸馛卒馛蒲撥翻三年春正月辛巳帝祀南郊明堂二祀並舉也蕭道成以襄陽重鎭張敬兒人位俱輕不欲使居之而敬兒求之不已盖道成先許之也謂道成曰沈攸之在荆州公知其欲何所作不出敬兒以表裏制之恐非公之利道成笑而無言道成居内敬兒居外以制其後故曰表裏制之也三月己巳以驍騎將軍張敬兒為都督雍梁二州諸軍事雍州刺史驍堅堯翻騎竒寄翻雍於用翻沈攸之聞敬兒上上時掌翻恐其見襲隂為之備敬兒既至奉事攸之親敬甚至動輙咨禀信饋不絶攸之以為誠然酬報欵厚累書欲因遊獵㑹境上敬兒報以為心期有在影迹不宜過敦謂動則有影行則有迹人將窺見之也敦厚也攸之益信之敬兒得其事迹皆密白道成道成與攸之書問張雍州遷代之日將欲誰擬攸之即以示敬兒欲以間之史言攸之墮敬兒術中而不悟且為襲江陵張本問古莧翻夏五月丙午魏主使員外散騎常侍許赤虎來聘丁未魏主如武州山辛酉如車輪山地形志秀容郡敷城縣有車輪泉車尺􅃒翻六月庚午魏初禁殺牛馬牛者農之所資馬者兵之所資禁殺當也槐興於北荒畜收蕃庻殺之者不禁今始禁之袁粲禇淵皆固讓新官秋七月庚戌復以粲為尚書令復扶又翻八月庚子加䕶軍將軍褚淵中書監冬十二月丙寅魏徙建昌王長樂為安樂王樂音洛己丑魏城陽王長壽卒南徐州刺史建平王景素孝友清令服用儉素又好文學好呼到翻禮接士大夫由是有美譽太宗特愛之異其禮秩時太祖諸子俱盡諸孫唯景素為長帝凶狂失徳朝野皆屬意於景素帝外家陳氏深惡之長知两翻屬之欲翻惡烏路翻楊運長阮佃夫等欲專權勢不利立長君亦欲除之其腹心將佐多勸景素舉兵鎭軍參軍濟陽江淹獨諌之景素時以鎮北將軍鎮京口以淹為主簿鎭軍當作鎭北齊子禮翻景素不悦是嵗防閤將軍王季符得罪於景素江左之制禁衛有直閤將軍王國有防閤將軍單騎亡奔建康告景素謀反騎竒寄翻運長等即欲𤼵兵討之袁粲蕭道成以為不可景素亦遣世子延齡詣闕自陳乃徙季符於梁州奪景素征北將軍開府儀同三司征北亦當作鎭北資治通鑑卷一百三十三
