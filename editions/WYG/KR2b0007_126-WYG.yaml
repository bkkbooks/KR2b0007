  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百二十六宋司馬光撰胡三省音註宋紀八起重光單閼盡𤣥黓執徐凡二年太祖文皇帝下之上元嘉二十八年春正月丙戌朔魏主大㑹羣臣於𤓰歩山上班爵行賞有差魏人縁江舉火太子左衛率尹𢎞言於上曰六夷如此必走北兵欲退慮南兵之追截故舉火以示威尹弘習知北人軍情因言于上自晉氏失馭劉石以來始有六夷之名率所律翻丁亥魏掠居民焚廬舍而去胡誕世之反也見上卷二十四年江夏王義恭等奏彭城王義康數有怨言揺動民聽故不逞之族因以生心夏戶雅翻數所角翻不逞之族謂廢放之家不得逞志于時者也請徙義康廣州上將徙義康先遣使語之使䟽吏翻語牛倨翻義康曰人生㑹死吾豈愛生必為亂階雖逺何益請死於此恥復屢遷復扶又翻屢力住翻又如字竟未及徃魏師至𤓰歩人情忷懼忷許拱翻上慮不逞之人復奉義康為亂太子劭及武陵王駿尚書左僕射何尚之屢啓宜早為之所武陵王駿時在彭城葢馳宻啓言之也上乃遣中書舍人嚴龍齎藥賜義康死義康不肯服曰佛教不許自殺佛教謂自殺者不復得人身願随宜處分處昌吕翻分扶問翻使者以被揜殺之江夏王義恭以碻磝不可守召王𤣥謨還歴城魏人追擊敗之遂取碻磝敗蒲賣翻去年蕭斌使王𤣥謨戍碻磝初上聞魏將入寇命廣陵太守劉懐之逆燒城府船乗守手又翻敵未至而先燒故曰逆乗謂車也音繩證翻盡帥其民渡江帥讀曰率山陽太守蕭僧珍悉斂其民入城臺送糧仗詣盱眙及滑臺者以路不通皆留山陽晉安帝義熈中土斷分廣陵立山陽郡境内有地名山陽因以名郡今楚州即其地盱眙音吁怡蓄陂水令滿須魏人至決以灌之須待也魏人過山陽不敢留因攻盱眙魏主就臧質求酒質封溲便與之溲踈鳩翻便毗連翻魏主怒築長圍一夕而合運東山土石以填塹作浮橋於君山絶水陸道今盱眙縣北七里有長圍山圖經云臧質守盱眙魏太武于都梁山築長城造浮橋絶水路即此塹七艷翻魏主遺質書曰遺于季翻吾今所遣鬬兵盡非我國人國人謂與拓㧞氏同出北荒之子孫也凡九十九姓城東北是丁零與胡南是氐羌設使丁零死正可減常山趙郡賊丁零自翟真叛慕容皆投常山趙郡界阻山而居故云然胡死減并州賊自後漢納南匈奴分居并州界其地率皆雜處胡漢西河離石以西則皆稽胡據之為寇氐羌死減闗中賊自苻姚據闗中其種類蕃滋雖有國已滅而其種實繁卿若殺之無所不利言於魏國無所不利質復書曰省示具悉姦懐省示省來書所示也悉詳也盡也省悉景翻爾自恃四足屢犯邉恃四足謂負戎馬足也王𤣥謨退於東申坦散於西按王𤣥謨自滑臺敗退蕭斌使申坦據清口戴延之所謂清口在夀張縣西界安民亭南以水經注考之其地不在滑臺之西此當謂梁坦出上蔡之師至虎牢潰散耳爾知其所以然邪爾獨不聞童謡之言乎葢卯年未至故以二軍開飲河之路耳冥期使然非復人事謂㝠㝠之中大期將至天使之然非由人事為之也復扶又翻下容復同寡人受命相滅古者諸侯自稱曰寡人質自以當藩方之任自稱寡人期之白登師行未逺爾自送死豈容復令爾生全饗有桑乾哉白登山桑乾川皆在平城左右質言本期直指白登師行至淮而逢魏兵要當勦滅不容令魏主生歸饗有桑乾之地也此嫚書也兩陣相向惡聲至必反之毋庸以此為據也乾音干爾有幸得為亂兵所殺不幸則生相鎖縛載以一驢直送都市耳我本不圖全若天地無靈力屈於爾韲之粉之細切薑韮謂之韲研碎米麥謂之粉韲牋西翻屠之裂之猶未足以謝本朝朝直遥翻爾智識及衆力豈能勝苻堅邪今春雨已降兵方四集爾但安意攻城勿遽走糧食乏者可見語語牛倨翻下爾語同當出廩相貽得所送劍刃欲令我揮之爾身邪魏主大怒作鐡床於其上施鐡鑱鑱士衫翻又士懴翻刺也錐也曰破城得質當坐之此上質又與魏衆書曰爾語虜中諸士庶佛狸所與書相待如此以魏主書言其兵鬭死正減國中賊也因而擕之術莫近乎此矣魏主得質此書豈不悔前所與質書乎爾等正朔之民何為自取糜滅豈可不知轉禍為福邪中原之民本禀漢晉正朔故謂之正朔之民并寫臺格以與之云斬佛狸首封萬戸侯賜布絹各萬匹臺格宋臺所立賞格也佛讀如弼魏人以鉤車鉤城樓城内繫以彄絙彄格矦翻絙古恒翻大索也數百人呌呼引之車不能退既夜縋桶懸卒出截其鉤獲之縋馳偽翻桶他董翻箍木為之明旦又以衝車攻城城土堅宻毎至句絶謂衝車至著城身也頽落不過數升魏人乃肉薄登城分畨相代墜而復升復扶又翻莫有退者殺傷萬計尸與城平凡攻之三旬不㧞㑹魏軍中多疾疫或告以建康遣水軍自海入淮水軍自建康下江自江出海轉料角則入淮又勑彭城斷其歸路斷丁管翻二月丙辰朔魏主燒攻具退走盱眙人欲追之沈璞曰今兵不多雖可固守不可出戰但整舟楫示若欲北渡者示若欲自盱眙渡淮而北以追截其後者以速其走計不須實行也臧質以璞城主使之上露板露板者書獲捷之狀露板上聞使天下悉知之也上時掌翻璞固辭歸功於質上聞益嘉之已嘉璞之功又益嘉其讓魏師過彭城江夏王義恭震懼不敢擊夏戸雅翻或告虜驅南口萬餘夕應宿安王陂去城數十里今追之可悉得諸將皆請行義恭禁不許明日驛使至使䟽吏翻上勑義恭悉力急追魏師已逺義恭乃遣鎮軍司馬檀和之向蕭城魏人先已聞之盡殺所驅者而去程天祚逃歸天祚為魏所禽見上卷二十六年魏人凡破南兖徐兖豫青冀六州殘破六州之生聚耳六州城守未甞失也殺傷不可勝計勝音升丁壯者即加斬截嬰兒貫于槊上槊色角翻盤舞以為戯所過郡縣赤地無餘春燕歸巢於林木室廬焚蕩燕無所歸故巢林木魏之士馬死傷亦過半國人皆尤之上毎命將出師常授以成律交戰日時亦待中詔是以將帥趑趄莫敢自决將即亮翻帥所類翻趑取私翻趄七余翻趑趄不進也又江南白丁輕易進退易以䜴翻此其所以敗也自是邑里蕭條元嘉之政衰矣史言亟用兵之禍癸酉詔賑恤郡縣民遭寇者蠲其稅調賑津忍翻蠲工𤣥翻調徒釣翻甲戌降太尉義恭為驃騎將軍開府儀同三司驃匹妙翻騎竒寄翻戊寅魏主濟河自丙辰盱眙退師一十三日始濟河辛巳降鎮軍將軍武陵王駿為北中郎將壬午上如𤓰歩是日解嚴初魏中書學生盧度世𤣥之子也魏神䴥四年徵盧𤣥坐崔浩事亡命匿髙陽鄭羆家崔浩事見上卷二十七年髙陽縣前漢屬涿郡後漢屬河間國晉分屬髙陽郡吏囚羆子掠治之掠音亮羆戒其子曰君子殺身成仁論語載孔子之言雖死不可言其子奉父命吏以火爇其體爇如恱翻終不言而死及魏主臨江上遣殿上將軍黄延年使於魏自晉以來有殿中將軍殿上將軍當是宋所置使䟽吏翻魏主問曰盧度世亡命已應至彼延年曰都下不聞有度世也魏主乃赦度世及其族逃亡籍没者凡度世之族逃亡而籍没其家者並赦之度世自出魏主以為中書侍郎鄉考異曰宋栁元景傳元景從祖弟光世先留里索虜以為折衝將軍河北太守封西陵男光世姊夫為司徒崔浩虜之相也元嘉二十七年虜主拓㧞燾南寇汝潁浩宻有異圖光世要河北義士與浩應接謀泄被誅河東大姓坐連謀夷族者甚衆光世南奔得免太祖以為振武將軍與魏事不同今從魏書度世為其弟娶鄭羆妹以報徳為于偽翻三月乙酉帝還宫己亥魏主還平城魏主戊寅濟河行二十二日至平城飲至告廟左傳凡公行告于廟反行飲至舍爵䇿勲焉禮也又曰三年而治兵入而振旅歸而飲至以數軍實杜預注曰飲于廟以數車徒噐械及所獲也以降民五萬餘家分置近畿近畿謂還平城千里之地降戸江翻初魏主過彭城遣人語城中曰語牛倨翻食盡且去須麥熟更來及期江夏王義恭議欲芟麥翦苗移民堡聚芟所衘翻鎮軍録事參軍王孝孫曰白氏六帖曰州主簿郡督郵並今録事參軍余按晉瑯邪王睿都督揚州以陳頵為録事參軍當時自别有州主簿督郵之吏亦猶存古而録事之職掌正違失蒞符印虜不能復來復扶又翻既自可保如其更至此議亦不可立百姓閉在内城飢饉日久方春之月野採自資一入堡聚餓死立至民知必死何可制邪虜若必來芟麥無晚四坐黙然莫之敢對坐徂卧翻長史張暢曰孝孫之議實有可尋尋繹理也用也左傳將尋師焉又曰日尋干戈杜預注皆云尋用也鎮軍府典籖董元嗣侍武陵王駿之側進曰王録事議不可奪别駕王子夏曰此論誠然暢斂板白駿曰板手板僚佐于府公之前斂板白事崇敬也下官欲命孝孫彈子夏録事參軍掌糾彈故云然彈徒丹翻駿曰王别駕有何事邪暢曰芟麥移民可謂大議一方安危事繫於此子夏親為州端州别駕居羣僚之右故曰州端曽無同異及聞元嗣之言則懽笑酬答阿意左右何以事君子夏元嗣皆大慙義恭之議遂寢初魯宗之奔魏晉安帝義熈十一年魯宗之自襄陽奔秦十三年秦亡奔魏其子軌為魏荆州刺史襄陽公鎮長社常思南歸以昔殺劉康祖及徐湛之父劉康祖父䖍之徐湛之父達之義熈十一年為魯軌所殺故不敢來軌卒子爽襲父官爵爽少有武幹少詩照翻與弟秀皆有寵於魏主既而兄弟各有罪魏主詰責之爽麤中使酒多過失秀以檢校鄴人謀反事因病還遲並為魏主所詰責詰去吉翻爽秀懼誅從魏主自𤓰歩還至湖陸請曰奴與南有仇毎兵來常恐禍及墳墓爽祖父皆葬長社乞共迎䘮還葬平城魏主許之爽至長社殺魏戍兵數百人帥部曲及願從者千餘家奉汝南自長社至汝南不及三百里帥讀曰率夏四月爽遣秀詣夀陽奉書於南平王鑠以請降鑠式灼翻降戸江翻上聞之大喜以爽為司州刺史鎮義陽沈約曰司州刺史漢之司𨽻校尉也晉江左以來淪没戎寇雖永和大元王化蹔及及大和隆安還復湮䧟武帝北平闗洛河南底定置司州刺史治虎牢領河南滎陽𢎞農實土三郡少帝景平初司州復没元嘉末僑立治汝南是後遂治羲陽領義陽随陽安陸南汝南郡秀為潁川太守予考異曰宋畧云滎陽郡太守今從宋書謂帝蓋以秀兄弟自潁川來降遂因以潁川太守授秀餘弟姪並授官爵賞賜甚厚魏人毁其墳墓徐湛之以為廟筭逺圖特所奬納不敢茍申私怨乞屏居田里不許屏必郢翻青州民司馬順則自稱晉室近屬聚衆號齊王梁鄒戌主崔勲之詣州五月乙酉順則乗虛襲梁鄒城梁鄒縣漢屬濟南郡晉省宋置梁鄒戍為平原太守治所水經注濟水自管縣東過梁鄒縣北又東北過臨濟縣南參而考之其地在唐齊州臨濟縣界又有沙門自稱司馬百年亦聚衆號安定王以應之壬寅魏大赦己巳以江夏王義恭領南兖州刺史徙鎮盱眙増督十二州諸軍事戊申以尚書左僕射何尚之為尚書令太子詹事徐湛之為僕射䕶軍將軍晉志曰自魏晉迄于江左僕射置二則分左右或不兩置但曰尚書僕射令闕則左為省主若左右並闕則置尚書僕射以主左事今湛之葢以尚書僕射領䕶軍將軍也尚之以湛之國戚湛之帝之甥㑹稽公主之子任遇隆重毎事推之詔湛之與尚之並受辭訴尚之雖為令而朝事悉歸湛之朝直遥翻六月壬戌魏改元正平魏主命太子少傅游雅中書侍郎胡方回等更定律令多所増損凡三百九十一條魏太子晃監國監工衘翻頗信任左右又營園田收其利髙允諌曰天地無私故能覆載覆敷又翻王者無私故能容養今殿下國之儲貳萬方所則而營立私田畜養鷄犬畜許六翻乃至酤販市㕓與民爭利㕓市中空地一曰居也説文曰㕓一畆半一家之居也孔頴達曰市㕓而不税者㕓謂公家邸舎使商人停物于中直税其所舍之處不稅其在市所賣之物市内空地曰㕓城内空地曰肆按載師云以㕓里任國中之地鄭注云㕓里邑居里矣㕓民居之區城也司農云㕓市中空地未有肆城中空地未有宅者也遂人授民田夫一㕓田百畆詩胡取禾三百㕓兮傳云一夫之居曰㕓謂一夫之田百畆也揚子云有田一㕓謂百畆之居與詩傳同夫田之㕓與市㕓之㕓其義不同各有攸當也謗聲流布不可追掩夫天下者殿下之天下富有四海何求而無乃與販夫販婦競此尺寸之利乎昔虢之將亡神賜之土田注見前漢靈帝私立府藏事見五千七卷光和元年藏徂浪翻皆有顛覆之禍前鑒若此甚可畏也武王愛周召齊畢所以王天下史記周紀武王即位太公望為師周公旦為輔召公畢公之徒左右王師一戎衣而天下大定王于况翻殷紂愛飛㢘惡來所以䘮其國飛㢘多力惡來善走父子俱以才力事紂惡來善毀䜛諸侯以此益疏䘮息浪翻今東宫儁乂不少頃來侍御左右者恐非在朝之選少詩沼翻朝直遥翻願殿下斥去佞邪親近忠良去羗吕翻近其靳翻所在田園分給貧下販賣之物以時收散收謂收藏其物散謂散與貧民一曰以時收散者言穫斂之時民力可以償稱通負則收之停滯居物至民所欲得之時則散之如此則休聲日至謗議可除矣不聽太子為政精察而中常侍宗愛性險暴多不法太子惡之惡烏路翻給事中仇尼道盛侍郎任平城侍郎即給事黄門侍郎仇尼複姓出於徒河任音壬有寵於太子頗用事皆與愛不協愛恐為道盛等所糾遂構告其罪魏主怒斬道盛等於都街都街即都市東宫官屬多坐死帝怒甚戊辰太子以憂卒晃考異曰宋索虜傳云燾至汝南𤓰歩私遣取諸營鹵獲甚衆燾歸聞知大加搜撿晃懼謀殺燾燾乃詐死使其近習召晃迎䘮於道執之及國罩以鉄籠尋殺之蕭子顯齊書亦云晃謀殺佛狸見殺宋畧曰燾既南侵晃淫于内謀欲殺燾燾知之歸而詐死召晃迎䘮晃至執之罩以鐡籠捶之三百曳于樷棘以殺焉又索虜傳云晃弟秦王烏奕盱與晃對掌國事晃疾之訴其貪暴燾鞭之二百遣鎮枹罕此皆江南傳聞之誤今從後魏書壬申葬金陵諡曰景穆帝徐知太子無臯甚悔之為後宗愛弑帝張本秋七月丁亥魏主如隂山青冀二州刺史蕭斌遣振武將軍劉武之等擊司馬順則司馬百年皆斬之斌音彬癸亥梁鄒平蕭斌王𤣥謨皆坐退敗免官上問沈慶之曰斌欲斬𤣥謨而卿止之何也對曰諸將奔退莫不懼罪將即亮翻自歸而死將至逃散故止之慶之諫斬𤣥謨事見上卷上年九月癸巳魏主還平城冬十月庚申復如隂山復扶又翻上遣使至魏魏遣殿中將軍郎法祐來修好好呼到翻己巳魏上黨靖王長孫道生卒十二月丁丑魏主封景穆太子之子濬為髙陽王既而以皇孫世嫡不當為藩王乃止觀此則魏世祖立孫之意定矣時濬生四年聰達過人魏主愛之常置左右徙秦王翰為東平王燕王譚為臨淮王楚王建為廣陽王吳王余為南安王翰等皆魏主子以國王徙封郡王當考帝使沈慶之徙彭城流民數千家于𤓰歩征北參軍程天祚徙江西流民數千家於姑孰彭城江西流民皆避魏寇而南者帝以吏部郎王僧綽為侍中僧綽曇首之子也曇首輔政于元嘉之初曇徒含翻幼有大成之度衆皆以國噐許之好學有思理好呼到翻思相吏翻思理猶言思致也練悉朝典朝直遥翻下同尚帝女東陽獻公主在吏部諳悉人物舉㧞咸得其分諳烏含翻分扶問翻言能随其分量而授任也及為侍中年二十九沈深有局度有局則能處事有度則能容物沈持林翻不以才能髙人帝頗以後事為念以其年少少詩照翻欲大相付託朝政大小皆與參焉帝之始親政事也委任王華王曇首殷景仁謝𢎞微劉湛次則范曄沈演之庾炳之最後江湛徐湛之何瑀之及僧綽凡十二人何瑀之恐當作何尚之唐和入朝于魏魏主厚禮之唐和鎮焉耆有撫安西域之功故厚禮之二十九年春正月魏所得宋民五千餘家在中山者謀叛州軍討誅之州軍定州之軍也冀州刺史張掖王沮渠萬年坐與叛者通謀賜死沮子余翻魏世祖追悼景穆太子不已中常侍宗愛懼誅二月甲寅弑帝年四十五諡曰太武皇帝考異曰宋書作庚申今從魏書尚書左僕射蘭延魏書官氏志北方諸姓烏洛蘭氏改為蘭氏侍中和疋薛提等祕不發䘮疋以皇孫濬冲㓜欲立長君疋五下翻長知兩翻徵秦王翰置之祕室祕室祕宻之室提以濬嫡皇孫不可廢議久不决宗愛知之自以得罪於景穆太子而素惡秦王翰惡烏路翻善南安王余乃宻迎余自中宫便門入禁中矯稱赫連皇后令召延等赫連皇后夏主勃勃之女也延等以愛素賤不以為疑皆随入愛先使宦者三十人持兵伏於禁中延等入以次收縛斬之殺秦王翰於永巷而立余大赦改元承平尊皇后為皇太后以愛為大司馬大將軍太師都督中外諸軍事領中秘書封馮翊王史言魏亂庚午立皇子休仁為建安王三月辛卯魏葬太武皇帝于金陵葬雲中金陵廟號世祖上聞魏世祖殂更謀北伐魯爽等復勸之復扶又翻上訪於羣臣太子中庶子何偃以為淮泗數州淮泗數州謂青冀徐兖司豫也瘡痍未復不宜輕動上不從偃尚之之子也夏五月丙申詔曰虐虜窮凶著於自昔未勞資斧已伏天誅拯溺蕩穢今其㑹也可符驃騎司空二府時江夏王義恭降號驃騎將軍鎮盱眙南譙王義宣鎮江陵進位司空驃匹妙翻騎竒計翻各部分所統分扶問翻東西應接歸義建績者随勞酬奬于是遣撫軍將軍蕭思話督冀州刺史張永等向碻磝魯爽魯秀程天祚將荆州甲士四萬出許洛據魯爽傳天祚去年助戍彭城為魏所獲勸爽弟秀南歸是年遂與爽秀俱來奔故並用之將即亮翻雍州刺史臧質帥所領趣潼闗帥讀曰率並考異曰索虜徐爰張永傳云王𤣥謨亦北伐𤣥謨傳中不曽行葢脫誤魏紀載六月劉義隆將檀和之寇濟州梁坦及魯安生軍于京索龎萌薛安都寇􅁪農都不言蕭思話等而宋紀亦無此數人者至七月云韓元興討之和之退梁坦安生亦走不言思話之歸宋畧有臧質遣栁元景狥蒲阪元景傳亦有之今從宋書宋畧今按考異所謂索虜徐爰張永傳亦宋書也永茂度之子也張裕字茂度避武帝諱以字行沈慶之固諌北伐上以其異議不使行青州刺史劉興祖上言以為河南阻飢書曰黎民阻飢孔安國注曰阻難也野無所掠脱諸城固守非旬月可㧞稽留大衆轉輸方勞應機乗勢事存急速今偽帥始死帥所類翻兼逼暑時國内猜擾不暇逺赴愚謂宜長驅中山據其闗要自中山至代有倒馬闗飛狐關冀州以北民人尚豐兼麥已向熟因資為易謂因敵取資於事為易易弋豉翻嚮義之徒必應響赴若中州震動黄河以南自當消潰臣請發青冀七千兵遣將領之將即亮翻直入其心腹若前驅克勝張永及河南衆軍宜一時濟河使聲實兼舉並建司牧撫柔初附西拒太行北塞軍都欲因山險置兵以苞舉相定幽冀之地行户剛翻塞息則翻因事指揮随宜加授加授謂仕於魏有官者加其官未有官而能聚衆以應宋師者先授之以官畏威欣寵人百其懐言其懐恩百倍於常時也若能成功清壹可待謂河南北肅清混壹之功可待也若不克㨗不為大傷並催促裝束伏聽勑㫖上意止存河南亦不從劉興祖之言上䇿也上䇿非命世之英不可行上又使貟外散騎侍郎琅邪徐爰随軍向碻磝銜中㫖授諸將方畧臨時宣示散悉亶翻騎竒計翻尚書令何尚之以老請致仕退居方山方山在建康東北有方山埭截淮立埭于山南曰方山者山形方如印議者咸謂尚之不能固志既而詔書敦諭者數四六月戊申朔尚之復起視事復扶又翻御史中丞袁淑録自古隠士有迹無名者為真隠傳以嗤之有迹無名如晨門荷蕢荷蓧野王二老漢隂丈人之類秋七月張永等至碻磝引兵圍之考異曰宋畧七月壬辰永師及碻磝下又有乙酉壬辰按長厯此月丁丑朔四日庚辰六日壬午十六日壬辰疑永以庚辰壬午至碻磝非壬辰也壬辰徙汝隂王渾為武昌王淮陽王彧為湘東王彧於六翻初潘淑妃生始興王濬劭考異曰太子傳云濬母卒使潘淑妃養之濬傳及宋九王傳皆云濬實潘子南史亦云淑妃養為子淑妃愛濬濬心不附今從濬本傳元皇后性妬以淑妃有寵於上恚恨而殂袁皇后諡曰元后殂於十七年恚於避翻淑妃專總内政由是太子劭深惡淑妃及濬惡烏故翻濬懼為將來之禍乃曲意事劭劭更與之善吳興巫嚴道育嚴道育女巫也其夫為劫坐没入奚官自言能辟穀服食役使鬼物因東陽公主婢王鸚鵡出入主家道育謂主曰神將有符賜主主夜卧見流光若螢飛入書笥笥相吏翻竹噐也篋也圎曰簞方曰笥開視得二青珠由是主與劭濬皆信惑之劭濬並多過失數為上所詰責使道育祈請欲令過不上聞數所角翻詰去吉翻聞音問道育曰我已為上天陳請為于偽翻上時掌翻必不泄露劭等敬事之號曰天師其後遂與道育鸚鵡及東陽主奴陳天與黄門陳慶國共為巫蠱琢玉為上形像埋於含章殿前劭補天與為隊主東陽主卒卒子恤翻鸚鵡應出嫁劭濬恐語泄慮巫蠱之語泄也濬府佐吳興沈懐逺素為濬所厚以鸚鵡嫁之為妾上聞天與領隊以讓劭曰汝所用隊主副並是奴邪劭懼以書告濬濬復書曰彼人若所為不已正可促其餘命或是大慶之漸耳據此則弑逆之謀濬實啓之劭在都濬在京口故以書徃來詳察書意則劭濬逆謀豈一朝一夕之故哉其所由來者漸矣此書乃賛决其逆謀非啓之也劭濬相與徃來書疏常謂上為彼人或曰其人謂江夏王義恭為佞人夏戸雅翻鸚鵡先與天與私通既適懐逺恐事泄白劭使宻殺之陳慶國懼曰巫蠱事惟我與天與宣傳徃來今天與死我其危哉乃具以其事白上上大驚即遣收鸚鵡封籍其家得劭濬書數百紙皆呪咀巫蠱之言呪職救翻咀莊助翻又得所埋玉人命有司窮治其事治直之翻道育亡命捕之不獲先是濬自揚州出鎮京口十八年濬為揚州刺史出鎮京口史逸其事始先息薦翻及廬陵王紹以疾解揚州紹帝第五子出繼廬陵王義真後意謂已必復得之既而上用南譙王義宣濬殊不樂乃求鎮江陵濬求代義宣鎮江陵然義宣未及離江陵濬自京口至都則弑逆之禍𤼵矣復扶又翻下同樂音洛上許之濬入朝朝直遥翻遣還京口為行留處分至京口數日而巫蠱事𤼵上惋歎彌日處昌吕翻分扶問翻惋烏貫翻驚惋也謂潘淑妃曰太子圖富貴更是一理虎頭復如此濬小字虎頭非復思慮所及汝母子豈可一日無我邪言一日無帝則淑妃及濬將為劭所殺也遣中使切責劭濬使疏吏翻劭濬惶懼無辭惟陳謝而已上雖怒甚猶未忍罪也當斷不斷反受其亂文帝之謂也諸軍攻碻磝治三攻道張永等當東道濟南太守申坦等當西道揚武司馬崔訓當南道攻之累旬不㧞自帝經畧河南到彦之之出師四鎮皆斂戍北去王𤣥謨之出師碻磝望風而下滑臺則堅壁矣今之出師碻磝亦固守以抗張永等魏人固習知宋人之情態以為無能為也治直之翻濟子禮翻八月辛亥夜魏人自地道潛出燒崔訓營及攻具癸丑夜又燒東圍及攻具尋復毁崔訓攻道復扶又翻張永夜撤圍退軍不告諸將將即亮翻士卒驚擾魏人乗之死傷塗地蕭思話自徃増兵力攻旬餘不㧞是時青徐不稔軍食乏丁卯思話命諸軍皆退屯歴城斬崔訓繫張永申坦於獄魯爽至長社魏戍主秃髠幡棄城走秃髠恐當作秃髪魯爽父子兄弟先居長社以南兵來聲勢既盛秃髪幡恐其有内應故不能守而走臧質頓兵近郊謂頓兵襄陽之近郊也杜子春周禮注曰五十里為近郊百里為逺郊不以時𤼵獨遣冠軍司馬栁元景臧質以冠軍將軍鎮襄陽以栁元景為司馬冠古玩翻下同帥後軍行參軍薛安都等進據洪闗水經注洛水自上洛縣東北于拒城之西北分為二水枝渠東北出為門水門水又北歴陽華之山又東北歴峽謂之鴻闗水水東有城即闗亭也水西有堡謂之鴻闗堡帥讀曰率梁州刺史劉秀之遣司馬馬汪與左軍中兵參軍蕭道成將兵向長安道成承之之子也蕭道成始見於此蕭承之有復漢中之功見一百二十二卷元嘉十年將即亮翻魏冠軍將軍封禮自浢津南渡赴𢎞農水經注門水自鴻闗東北流又北逕𢎞農縣故城東故城即故函谷闗也其水側城北流而注于河河水于此有浢津之名浢音豆九月司空髙平公兒烏于屯潼闗魏書官氏志内入諸姓賀兒氏為兒氏平南將軍黎公遼屯河内吐谷渾王慕利延卒樹洛干之子拾寅立樹洛干卒于晉安帝義熈十三年始居伏羅川居伏羅川猶未敢逺離白蘭之險也遣使來請命亦請命于魏丁亥以拾寅為安西將軍西秦河沙三州刺史河南王魏以拾寅為鎮西大將軍沙州刺史西平王庚寅魯爽與魏豫州刺史拓㧞僕蘭戰于大索破之杜預曰成臯東有大索城京相璠曰京縣有大索亭小索亭大小索氏兄弟居之故有大小之號括地志曰滎陽即大索城小索故城在滎陽縣北四里進攻虎牢聞碻磝敗退與栁元景皆引兵還蕭道成馬汪等聞魏救兵將至還趣仇池趣七喻翻己丑詔解蕭思話徐州更領冀州刺史鎮歴城更工衡翻上以諸將屢出無功不可專責張永等賜思話詔曰虜既乗利方向盛冬若脱敢送死兄弟父子自共當之耳言諸將皆不可任也言及増憤可以示張永申坦使示永坦以激厲之又與江夏王義恭書曰早知諸將軰如此恨不以白刃驅之今者悔何所及亦憤憤之辭也義恭尋奏免思話官從之魏南安隠王余自以違次而立余以少子為宗愛所立非次也諡法不顯尸國曰隠厚賜羣下欲以收衆心旬月之間府藏虛竭藏徂浪翻又好酣飲及聲樂畋獵不恤政事好呼到翻宗愛為宰相録三省魏蓋以尚書侍中中秘書為三省亦猶今以尚書門下中書為三省也總宿衛坐召公卿專恣日甚余患之謀奪其權愛憤怒冬十月丙午朔余夜祭東廟魏書明元帝永興四年立太祖道武廟於白登山嵗一祭具太牢無常月又於白登山西太祖舊遊之處立昭成獻明太祖廟常以九月十月之交帝親祭牲用馬牛羊白登在平城東故曰東廟愛使小黄門賈周等就弑余而祕之余立纔二百二十餘日惟羽林郎中代人劉尼知之羽林郎自漢以來有之漢羽林郎秩比三百石郎中可以槩推矣魏以劉尼為羽林郎中與殿中尚書俱典兵宿衛則其位任葢重於漢朝也尼勸愛立皇孫濬愛驚曰君大癡人皇孫若立豈㤀正平時事乎景穆太子之死魏正平元年也正平元年即上年尼曰若爾今當立誰愛曰待還宫當擇諸王賢者立之尼恐愛為變宻以狀告殿中尚書源賀賀時與尼俱典兵宿衛乃與南部尚書陸麗謀曰宗愛既立南安還復殺之復扶又翻今又不立皇孫將不利於社稷遂與麗定謀共立皇孫麗俟之子也史言陸侯父子皆有智畧忠于後魏戊申賀與尚書長孫渴侯嚴兵守衛宫禁使尼麗迎皇孫於苑中魏都平城有鹿苑麗抱皇孫於馬上入平城賀渴侯開門納之尼馳還東廟大呼曰宗愛弑南安王大逆不道呼火故翻劉尼僅以弑南安王為宗愛罪不能正其弑世祖之罪也皇孫已登大位有詔宿衛之士皆還宫衆咸呼萬嵗遂執宗愛賈周等勒兵而入奉皇孫即皇帝位帝諱濬太武皇帝之嫡孫景穆太子之長子也蕭子顯曰濬字烏雷直勤登永安殿北史魏太武帝始光二年改東宫為萬夀宫起永安安樂二殿大赦改元興安烏考異曰宋索虜傳燾以弈旰有武畧用以為太子㑹燾死使嬖人宗愛立可博真為後宗愛博真恐為弈旰所危矯殺之而自立號年承平博真懦弱不為國人所附晃子濬字烏雷直勤素為燾所愛燕王謂國人曰博真非正不宜立直勤嫡孫應立耳乃殺博真及宗愛而立濬為主號年正平與後魏書不同又云在二十八年皆宋書之誤也殺愛周皆具五刑夷三族西陽五水羣蠻反水經注蘄水出江夏蘄春縣北山水首受希水枝津西南流歴蘄山出蠻中故以此水為五水蠻五水謂巴水蘄水希水赤亭水西歸水蠻左憑阻山川世為抄暴宋沈慶之於西陽上下誅討即五水蠻也自淮汝至於江沔咸被其患南史曰蠻所在深阻種落熾盛北接淮汝南極江漢地方數千里沔迷逺翻被皮義翻下同詔太尉中兵叅軍沈慶之督江豫荆雍四州兵討之為沈慶之以討蠻之兵輔武陵王駿起義張本雍於用翻魏以驃騎大將軍拓㧞壽樂為太宰都督中外諸軍録尚書事壽樂拓㧞悉鹿之後驃匹妙翻騎竒計翻樂音洛長孫渴侯為尚書令加儀同三司賞定䇿之功也十一月壽樂渴侯坐爭權並賜死癸未魏廣陽簡王建臨淮宣王譚皆卒甲申魏主母閭氏卒按北史魏主母姓郁久閭氏河東王毗之妹也魏南安王余之立也以古弼為司徒張黎為太尉及髙宗立弼黎議不合㫖黜為外都大官坐有怨言且家人告其為巫蠱皆被誅古弼張黎魏世祖之所親任者也宗愛弑逆不能聲其罪而誅之南安之立首居公位雖不為巫蠱罪固不容於死矣被皮義反壬寅廬陵昭王紹卒魏追尊景穆太子為景穆皇帝皇妣閭氏為恭皇后尊乳母常氏為保太后隴西屠各王景文叛魏屠直於翻署置王侯魏統萬鎮將南陽王恵壽外都大官于洛㧞督四州之衆討平之四州謂秦雍河涼徙其黨三千餘家於趙魏此言戰國時趙魏大界十二月戊申魏葬恭皇后于金陵魏世祖晩年佛禁稍弛魏禁佛見一百二十四卷二十三年民間徃徃有私習者及髙宗即位羣臣多請復之乙卯詔州郡縣衆居之所各聽建佛圖一區民欲為沙門者聽出家捨俗為僧謂之出家大州五十人小州四十人於是曏所毁佛圖率皆修復佛圖即浮屠或白佛圖即佛寺魏主親為沙門師賢等五人下髪為于偽翻下髪剃髪也亦謂之祝髪以師賢為道人統道人統猶宋之都僧録北人謂之僧總攝魏書沙門師賢本罽賓國王種人少入道東遊凉州凉平赴代罷佛法時師賢假為毉術還俗而守道不改於修復日即反沙門為道人統和平初師賢卒曇曜代之更名沙門統丁巳魏以樂陵王周忸為太尉忸女九翻南部尚書陸麗為司徒鎮西將軍杜元寳為司空麗以迎立之功受心膂之寄朝臣無出其右者朝直遥翻下同賜爵平原王麗辭曰陛下國之正統世嫡皇孫故曰正紈當承基緒效順奉迎臣子常職不敢慆天之功慆義與叨同貪也以干大賞再三不受魏主不許麗曰臣父奉事先朝忠勤著效陸俟事世祖威行北鎮功著闗中今年逼桑榆桑榆晚景也願以臣爵授之帝曰朕為天下主豈不能使卿父子為二王邪戊午進其父建業公俟爵為東平王曰考異魏紀曰戊申按上有丁巳下有癸亥不當中有戊申葢戊午字誤耳又命麗妻為妃復其子孫復方目翻麗力辭不受帝益嘉之以東安公劉尼為尚書僕射西平公源賀為征北將軍並進爵為王帝班賜羣臣謂源賀曰卿任意取之賀辭曰南北未賓府庫不可虛也謂魏南有宋北有柔然不可一日弛備府庫所以供軍國之用不可虛於賞賜固與之乃取戎馬一匹示欲宣力於邉垂髙宗之立也髙允預其謀陸麗等皆受重賞而不及允允終身不言髙允不言功其後位遇隆厚天豈嗇其報也甲子周忸坐事賜死時魏法深峻源賀奏謀反之家男子十三以下本不預謀者宜免死没官從之江夏王義恭還朝自盱眙還也夏戸雅翻朝直遥翻辛未以義恭為大將軍南徐州刺史欲以代始興王濬也録尚書如故初魏入中原晉孝武帝太元二十一年魏伐燕至安帝隆安二年克中山始得中原用景初厯景初厯楊偉所造曹魏明帝景初元年行之世祖克沮渠氏見二百二十三卷十六年沮子余翻得趙􅜫𤣥始厯徧考字書無􅜫字以偏傍從匪從文離而合之於上下讀如斐字時人以為宻是嵗始行之資治通鑑卷一百二十六
