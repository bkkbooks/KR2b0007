body:
  text: 資治通鑑卷一百六十五宋司馬光撰胡三省音註梁紀二十一起昭陽作噩盡閼逢閹茂凡二年世祖孝元皇帝下承聖二年春正月王僧辯發建康承制使陳霸先代鎮揚州使陳霸先自京口代鎮揚州丙子山胡圍齊離石戊寅齊主討之未至胡已走因廵三堆魏收地形志永安郡平冦縣魏真君七年併三堆屬焉隋鴈門郡崞縣有平冦縣大獵而歸以吏部尚書王褒為左僕射己丑齊改鑄錢文曰常平五銖五代志齊文宣除魏永安五銖改鑄常平五銖重如其文其錢甚貴且制造甚精二月庚子李洪雅力屈以空雲城降陸納去年呉蔵攻李洪雅降户江翻下同納囚洪雅殺丁道貴納以沙門寳誌詩䜟有十八子以為李氏當王天監中寳誌為䜟云太嵗龍將無理蕭經霜草應死餘人散十八子時言蕭氏當滅李氏代興䜟楚譛翻甲辰推洪雅為主號大將軍使乗平肩輿列鼓吹納帥衆數千左右翼從吹尺瑞翻帥讀曰率下同從才用翻魏太師泰去丞相大行臺去羌吕翻為都督中外諸軍事王雄至東梁州黄衆寳帥衆降黄衆寳反見上卷上年太師泰赦之遷其豪帥於雍州帥所類翻雍於用翻齊主送柔然可汗鐵伐之父登注及兄庫提還其國登注等奔齊見上卷上年可從刋入聲汗音寒鐵伐尋為契丹所殺契欺訖翻又音喫國人立登注為可汗登注復為其大人阿富提所殺復扶又翻國人立庫提突厥伊利可汗卒子科羅立號乙息記可汗厥君勿翻書考異曰顔師古隋突厥𫝊云弟逸可汗立今從周書及北史三月遣使獻馬五萬于魏使疏吏翻柔然别部又立阿那瓌叔父鄧叔子為可汗蠕考異曰魏書北史蠕傳皆云立鐵伐為可汗突厥𫝊皆云立鄧叔子為可汗葢諸部分散各有所立也乙息記撃破鄧叔子於沃野北木頼山乙息記卒捨其子攝圖而立其弟俟斤號木杆可汗俟渠之翻杆公旦翻為後佗鉢卒攝圖爭國張本考異曰周書作术汗隋書作俟斗木杆今從北史木杆狀貌竒異性剛勇多智畧善用兵鄰國畏之上聞武陵王紀東下使方士畫版為紀像畫與畵同親釘支體以厭之釘丁定翻厭於叶翻又執侯景之俘以報紀初紀之舉兵皆太子圎照之謀也圎照時鎮巴東巴東信州執留使者啓紀云矦景未平宜急進討已聞荆鎮為景所破紀從之趣兵東下使䟽吏翻趣讀曰促上甚懼與魏書曰子糾親也請君討之左傳齊無知弑其君雍廩殺無知公子小白自莒入於齊魯莊公伐齊納子糾魯師敗績齊鮑叔帥師來言曰子糾親也請君討之乃殺子糾太師泰曰取蜀制梁在兹一舉諸將咸難之咸以為難也大將軍代人尉遲迥泰之甥也迥傳其先魏之别種號尉遟部因氏焉尉紆勿翻獨以為可克泰問以方略迥曰蜀與中國隔絶百有餘年恃其險不虞我至若以鐵騎兼行襲之無不克矣騎竒寄翻下同泰乃遣迥督開府儀同三司原珍等六軍甲士萬二千騎萬匹自散闗伐蜀考異曰典略在正月戊辰今從周紀陸納遣其將吳藏潘烏黒李賢明等下據車輪將即亮翻下同按下文陸納夾岸為城甲子王僧辯攻㧞之乙丑進圍長沙則車輪之地葢據湘江之要去長沙不遠也丙考異曰梁紀云二月丙子按長厯二月無子梁紀誤王僧辯至巴陵厯考異曰典略云三月辛酉按長是月癸亥朔無辛酉典略誤宜豐侯循讓都督於僧辯霸考異曰僧辯𫝊云與陳先讓都督今從典略僧辯弗受上乃以僧辯循為東西都督夏四月丙申僧辯軍于車輪異考曰典略作甲子非也今從梁紀吐谷渾可汗夸吕雖通使于魏而冦抄不息吐從暾入聲谷音浴使䟽吏翻下同抄楚交翻宇文泰將騎三萬踰隴至姑臧討之夸吕懼請服既而復通使於齊凉州刺史史寧覘知其還襲之於赤泉唐志凉州姑臧縣有赤水軍本赤烏鎮有赤烏泉因名幅員五千一百八十里軍之最大者也復扶又翻覘丑鹽翻又丑艶翻獲其僕射乞伏觸狀陸納夾岸為城以拒王僧辯納士卒皆百戰之餘僧辯憚之不敢輕進稍作連城以逼之納以僧辯為怯不設備五月甲子僧辯命諸軍水陸齊進急攻之僧辯親執旗鼓宜豐侯循親受矢石拔其二城納衆大敗歩走保長沙乙丑僧辯進圍之僧辯坐壟上視築圍壘吳藏李賢明帥銳卒千人開門突出蒙楯直進趨僧辯帥讀曰率楯食尹翻趨七喻翻時杜崱杜龕並侍左右甲士衛者止百餘人力戰拒之崱士力翻龕苦含翻僧辯據胡牀不動裴之横從旁擊藏等藏等敗退賢明死李賢明本矦景將也景敗歸王琳藏脫走入城武陵王紀至巴郡聞有魏兵遣前梁州刺史巴西譙淹還軍救蜀初楊乾運求為梁州刺史紀以為潼州刺史五代志金山郡西魏置潼州葢梁已置此州也治涪城楊灋琛求為黎州刺史以為沙州葢即以平興為沙州也潼音同琛丑林翻二人皆不悅乾運兄子畧說乾運曰今矦景初平宜同心戮力說式芮翻戮音留又音六并力也保國寧民而兄弟尋戈左傳子産曰昔高辛氏有二子伯曰閼伯季曰實沈不相能也日尋干戈以相征討此自亡之道也夫木朽不雕論語孔子曰朽木不可雕也世衰難佐不如送欵闗中可以功名兩全乾運然之令略將二千人鎮劍閣又遣其壻樂廣鎮安州五代志普安郡梁置南安州後改為安州普安舊曰南安西魏改普安將即亮翻與灋琛皆濳通於魏魏太師泰宻賜乾運鐵劵授驃騎大將軍開府儀同三司梁州刺史西魏之官驃騎大將軍開府儀同三司位次柱國大將軍驃匹妙翻尉遟迥以開府儀同三司矦吕陵始為前軍矦吕陵虜三字姓至劔閣畧退就樂廣翻城應始始入據安州甲戌迥至涪水涪水自龍州入潼州界潼州治涪其城西臨涪水涪音浮乾運以州降降户江翻迥分軍守之進襲成都時成都見兵不滿萬人見賢遍翻倉庫空竭永豐侯撝嬰城自守迥圍之譙淹遣江州刺史景欣幽州刺史趙抜扈援成都五代志隆山郡隆山縣舊曰犍為縣置江州迥使原珍等擊走之武陵王紀至巴東聞矦景已平乃自悔召太子圓照責之對曰矦景雖平江陵未服紀亦以既稱尊號紀稱尊號見上卷上年不可復為人下復扶又翻下上復復送乃復無復同欲遂東進將卒日夜思歸其江州刺史王開業以為宜還救根本更思後圖諸將皆以為然將即亮翻圓照及劉孝勝固言不可紀從之宣言於衆曰敢諫者死己丑紀至西陵軍勢甚盛舳艫翳川舳音逐艫音盧翳蔽也䕶軍陸灋和築二城於峽口兩岸運石塡江鐵鎻斷之斷音短帝抜任約於獄以為晉安王司馬帝封子方智為晉安王任音壬使助灋和拒紀赤亭之戰法和活約是有舊恩故使助之謂之曰汝罪不容誅我不殺本為今日因撤禁兵以配之仍許妻以廬陵王續之女使宣猛將軍劉棻與之俱為于偽翻妻七細翻棻符分翻庚辰巴州刺史余孝頃將兵萬人會王僧辯於長沙將即亮翻下同豫章太守觀寧矦永昏而少斷少詩沼翻斷丁亂翻左右武蠻奴用事軍主文重疾之永將兵討陸納至宫亭湖重殺蠻奴永軍潰奔江陵重將其衆奔開建矦蕃蕃殺之而有其衆開建矦蕃時鎮鄱陽沈約曰宋文帝分臨賀郡之封陽縣立開建縣六月壬辰武陵王紀築連城攻絶鐵鎻陸法和告急相繼上復抜謝答仁於獄去年矦景敗得謝答仁不殺而囚之以為歩兵校尉梁東宫有步兵等三校尉校戶敎翻配兵使助法和又遣使送王琳令說輸陸納使䟽吏翻說式芮翻乙未琳至長沙僧辯使送示之納衆悉拜且泣使謂僧辯曰朝廷若赦王郎乞聽入城僧辯不許復送江陵陸法和求救不已上欲召長沙兵恐失陸納乃復遣琳許其入城琳既入納遂降湘州平降戶江翻平考異曰梁紀乙酉湘州按長歴是月無乙酉梁紀誤上復琳官爵使將兵西援峽口將即亮翻甲辰齊章武景王庫狄干卒武陵王紀遣將軍矦叡將衆七千築壘與陸法和相拒上遣使與紀書許其還蜀專制一方紀不從報書如家人禮不肯定君臣之分而用兄弟之禮使䟽吏翻下同陸納既平湘州諸軍相繼西上上時掌翻上復與紀書曰吾年為一日之長屬有平亂之功膺此樂推事歸當璧長陟丈翻屬之欲翻樂音洛左傳楚共王無冡適有寵子五人無適立焉乃大有事於羣望而祈曰請神擇於五人者使主社稷乃徧以璧見於羣望曰當璧而拜者神所立也既乃宻埋璧於太室之庭使五人者齊而長入拜康王跨之靈王肘加焉子干子晳皆遠之平王弱抱以入再拜皆壓紐後平王卒有楚國儻遣使乎良所遟也遟直利翻待也如曰不然於此投筆友于兄弟分形共氣兄肥弟瘦無復相見之期讓棗推梨永罷懽愉之日漢孔融兄弟七人融第六四歲時與諸兄共食梨棗輙引小者人問其故答曰我小兒法當取小者人皆異之推吐雷翻心乎愛矣書不盡言言兄弟之愛存之於心非書翰之間所能盡言也紀頓兵日乆頻戰不利又聞魏冦深入成都孤危憂懣不知所為懣音悶又音滿乃遣其度支尚書樂奉業詣江陵求和請依前㫖還蜀度徒洛翻奉業知紀必敗啓上曰蜀軍乏糧士卒多死危亡可待上遂不許其和史言上兄弟皆阻兵而安忍紀以黄金一斤為餅餅百為篋至有百篋銀五倍於金錦􅄢繒綵稱是每戰懸示將士不以為賞罽音計繒慈陵翻稱尺證翻將即亮翻下同寧州刺史陳智祖請散之以募勇士弗聽智祖哭而死有請事者紀稱疾不見由是將卒解體秋七月辛未巴東民符昇等斬峽口城主公孫晃降於王琳將即亮翻降戶江翻梁考異曰典畧作丙戌今從書謝荅仁任約進攻矦叡破之抜其三壘於是兩岸十四城俱降紀不獲退諸城已降江陵兵斷道故不獲退順流東下遊擊將軍樊猛追擊之紀衆大潰赴水死者八千餘人猛圍而守之上宻敕猛曰生還不成功也猛引兵至紀所紀在舟中繞牀而走以金囊擲猛曰以此雇卿送我一見七官猛曰天子何由可見殺足下金將安之之徃也遂斬紀及其幼子圓滿陸法和收太子圓照兄弟三人送江陵上絶紀屬籍賜姓饕餮氏饕他刀翻餮他結翻貪財為饕貪食為餮以帝鴻氏不才子比紀也下劉孝勝獄已而釋之紀之稱帝舉兵劉孝勝實鼓成之此而不誅亦失刑也下遐稼翻上使謂江安侯圓正曰西軍已敗汝父不知存亡意欲使其自裁圓正見囚見上卷簡文帝大寳二年圓正聞之號哭稱世子不絶聲咎圓照之誤紀也號戸刀翻上頻使覘之知不能死移送廷尉獄見圓照曰兄何乃亂人骨肉使痛酷如此圓照唯云計誤上並命絶食於獄至齧臂啖之十三日而死遠近聞而悲之覘丑亷翻又丑艶翻齧魚結翻啖徒敢翻又徒濫翻乙未王僧辯還江陵詔諸軍各還所鎭魏尉遟迥圍成都五旬永豐侯撝屢出戰皆敗乃請降諸將欲不許迥曰降之則將士全遠人恱攻之則將士傷遠人懼遂受之八月戊戌撝與宜都王圓肅帥文武詣軍門降撝許韋翻降戶江翻將即亮翻帥讀曰率迥以禮接之與盟於益州城北吏民皆復其業唯收奴婢及儲積以賞將士軍無私焉史言尉遟迥能凝蜀人之心魏以撝及圓肅並為開府儀同三司以迥為大都督益潼等十二州諸軍事益州刺史庚子下詔將還建康領軍將軍胡僧祐太府卿黄羅漢吏部尚書宗懔懔力荏翻又巨禁翻御史中丞劉㲄㲄音訖岳翻諫曰建業王氣已盡與虜止隔一江若有不虞悔無及也建業與齊止隔一江固也獨不思江陵介在江北逼近襄陽岳陽有復讐之志宇文有啓疆之思乎且古老相承云荆州洲數滿百當出天子今枝江生洲百數已滿盛𢎞之荆州記曰自枝江縣西至上明東及江津其中有九十九洲楚諺云洲不百故不出王者陛下龍飛是其應也上令朝臣議之朝直遥翻黄門侍郎周𢎞正尚書右僕射王褒曰今百姓未見輿駕入建康謂是列國諸王願陛下從四海之望時羣臣多荆州人皆曰𢎞正等東人也周覬王𨗳自南渡以來世居建康故謂為東人志願東下恐非良計𢎞正面折之曰折之舌翻東人勸東謂非良計西人欲西豈成長策上笑又議於後堂會者五百人上問之曰吾欲還建康諸卿以為如何衆莫敢先對上曰勸吾去者左袒左袒者過半武昌太守朱買臣言於上曰建康舊都山陵所在梁氏自簡文以上𦵏建康武帝以上𦵏晉陵守式又翻荆鎮邊疆非王者之宅荆州被邊自晉以來為重鎮願陛下勿疑以致後悔臣家在荆州豈不願陛下居此但恐是臣富貴非陛下富貴耳上使術士杜景豪卜之不吉對上曰未去退而言曰此兆為鬼賊所留也上以建康彫殘江陵全盛意亦安之卒從僧祐等議史言上懷居違卜以成亡國之禍卒子恤翻以湘州刺史王琳為衡州刺史九月庚午詔王僧辯還鎮建康陳霸先復還京口復扶又翻丙子以䕶軍將軍陸法和為郢州刺史法和為政不用刑獄專以沙門法及西域幻術幻胡辦翻敎化部曲數千人通謂之弟子契丹冦齊邊契欺訖翻壬午齊主北廵冀定幽安冀定幽安四州名遂伐契丹齊主使郭元建治水軍二萬餘人於合肥治直之翻將襲建康納湘潭矦退退北奔見一百六十二卷武帝太清二年又遣將軍邢景遠歩大汗薩帥衆繼之步大汗虜三字姓汗音寒薩桑葛翻考異曰梁書作邢杲遠歩六汗薩今從北齊書北史陳霸先在建康聞之白上上詔王僧辯鎮姑孰以禦之冬十月丁酉齊主至平州從西道趣長塹曹操征烏桓出盧龍塞塹山堙谷五百餘里後人因謂之長塹趣七喻翻塹七艶翻使司徒潘相樂帥精騎五千自東道趣青山辛丑至白狼城壬寅至昌黎城使安德王韓軌帥精騎四千東斷契丹走路魏收地志營州統内建德郡治白狼城中興初分樂陵置安德郡治般縣帥讀曰率騎竒寄翻癸卯至陽師水唐志貞觀三年以契丹室韋部落置師州及陽師縣於營州之廢陽師鎮即此倍道兼行掩襲契丹齊主露髻肉袒晝夜不息行千餘里踰越山嶺為士卒先唯食肉飲水壯氣彌厲甲辰與契丹遇奮擊大破之虜獲十餘萬口雜畜數百萬頭畜許救翻潘相樂又於青山破契丹别部丁未齊主還至營州己酉王僧辯至姑孰遣婺州刺史矦瑱東陽郡梁置婺州瑱他甸翻又音鎮吳郡太守張彪吳興太守裴之横築壘東闗以待齊師丁巳齊主登碣石山臨滄海遂如晉陽以肆州刺史斛律金為太師召還晉陽拜其子豐樂為武衛大將軍樂音洛命其孫武都尚義寧公主寵待之厚羣臣莫及金子羡字豐樂武都光之子也樂音洛閏月丁丑南豫州刺史侯瑱南豫州時治姑孰瑱他甸翻又音鎮與郭元建戰於東闗齊師大敗溺死者萬計溺奴狄翻湘潭侯退復歸於鄴復扶又翻王僧辯還建康吳州刺史開建侯蕃恃其兵彊貢獻不入五代志鄱陽郡梁置吳州上宻令其將徐佛受圖之將即亮翻佛受使其徒詐為訟者詣蕃遂執之上以佛受為建安太守以侍中王質為吳州刺史質至鄱陽佛受置之金城自據羅城掌門管左傳秦把子曰鄭人使我掌北門之管杜預注曰管籥也繕治舟艦甲兵治直之翻艦戶黯翻質不敢與爭故開建侯部曲數千人攻佛受佛受奔南豫州矦瑱殺之質始得行州事十一月戊戌以尚書右僕射王褒為左僕射湘東太守張綰為右僕射己未突厥復攻柔然柔然舉國奔齊復扶又翻癸亥齊主自晉陽北擊突厥迎納柔然廢其可汗庫提立阿那瓌子菴羅辰為可汗置之馬邑川給其廩餼繒帛餼許氣翻繒慈陵翻親追突厥於朔州突厥請降降戸江翻下同許之而還還從宣翻又如字自是貢獻相繼魏尚書元烈謀殺宇文泰事泄泰殺之宇文泰於此獨不書其官因舊史成文也丙寅上使侍中王琛使於魏琛丑林翻使䟽吏翻太師㤗隂有圖江陵之志梁王詧聞之益重其貢獻梁王詧欲倚魏以報河東王譽之仇通鑑至此復書梁王詧十二月齊宿預民東方白額以城降江西州郡皆起兵應之江淮之民苦於齊之虐政欲相率而歸江南三年春正月癸巳齊主自離石討山胡遣斛律金從顯州道魏收地形志永安中置顯州治汾州六壁城葢在隋西河郡界常山王演從晉州道夹攻大破之男子十三以上皆斬十考異曰北史作二以上今從典畧女子及㓜弱以賞軍遂平石樓石樓絶險自魏世所不能至水經河水東逕蒲川石樓山南又南逕蒲城東葢其地在蒲子縣西五代志汾州樓山縣有北石樓山又有石樓縣舊置吐京郡宋白曰石樓縣本漢土軍縣後魏置吐京郡葢胡俗譯言音訛變故曰吐京也隋改縣曰石樓於是遠近山胡莫不懾服懾之渉翻有都督戰傷其什長路暉禮不能救帝命刳其五藏什長十人之長也五藏心肺肝膽腎長陟丈翻藏徂浪翻令九人食之肉及穢惡皆盡自是始為威虐陳霸先自丹徒濟江圍齊廣陵秦州刺史嚴超達自秦郡進圍涇州五代志江都郡永福縣舊曰沛梁置涇州領涇城東陽二郡陳廢涇州併二郡為沛郡後周改沛郡為石梁縣唐併石梁縣入六合北史梁涇州在石梁杜佑曰楊州天長縣梁於石梁置涇州南豫州刺史侯瑱吳郡太守張彪皆出石梁為之聲援辛丑使晉陵太守杜僧明帥三千人助東方白額帥讀曰率魏太師泰始作九命之典以叙内外官爵改流外品為九秩五代志曰泰命尚書盧辯遠師周之建職置三公三孤以為論道之官次置六卿以分司庻務其内命謂王朝之臣三公九命三孤八命六卿七命上大夫六命中大夫五命下大夫四命上士三命中士再命下士一命外命謂諸侯及其臣諸公九命諸侯八命諸伯七命諸子六命諸男五命諸公之孤卿四命侯之孤卿公之大夫三命子男之孤卿侯伯之大夫公之上士再命公之中士侯伯之上士一命公之下士侯伯之中士下士子男之士不命其制禄秩下士一百二十五石中士以上至於上大夫各倍之上大夫是為四千石卿二分孤三分公四分各益其一公因盈數為一萬石其九秩一百二十石八秩至於七秩每二秩六分而下