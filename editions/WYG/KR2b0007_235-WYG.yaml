front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷二百三十五宋司馬光撰胡三省音註唐紀五十一起閼逢閹茂六月盡上章執徐凡六年有奇徳宗神武聖文皇帝十貞元十年六月壬寅朔昭義節使李抱真薨其子殿中侍御史緘與抱真從甥元仲經謀祕不𤼵䘮詐為抱真表求以職事授緘又詐為其父書遣禆將陳榮詣王武俊假貨財武俊怒曰吾與乃公厚善欲同奬王室耳豈與汝同惡耶聞乃公已亡乃猶汝也公猶翁也乃敢不俟朝命而自立朝直遥翻又敢告我況有求也使榮歸寄聲質責緘質正也以正義責之也昭義步軍都虞候王延貴汝州梁人也梁縣漢晉屬河南郡後魏置汝北郡隋分置承休縣而梁縣仍故唐以承休縣帶汝州故梁縣在其西南四十五里素以義勇聞上知抱真已薨遣中使第五守進往觀變且以軍事委王延貴守進至上黨昭義軍治上黨緘稱抱真有疾不能見三日緘乃嚴兵詣守進守進謂之曰朝廷已知相公捐館捐弃也言死者弃其館舍而逝也令王延貴權知軍事侍御宜𤼵喪行服緘愕然出謂諸將曰朝廷不許緘掌事諸君意如何莫對緘愳乃歸𤼵喪以使印及管鑰授監軍使印節度之印也監古銜翻守進召延貴宣口詔令視事口宣所受詔旨故曰口詔趣緘赴東都趣赴東都歸私第趣讀曰促元仲經出走延貴悉歸罪於仲經捕斬之詔以延貴權知昭義軍事雲南王異牟尋遣其弟湊羅棟棟郎甸翻獻地圖土貢及吐蕃所給金印請復號南詔夷語以王為詔其先渠帥有六自號六詔曰䝉巂詔越析詔浪穹詔邆睒詔施浪詔䝉舍詔䝉舍詔在諸部南故稱南詔至䝉歸義𤣥宗封為雲南王因號雲南癸丑以祠部郎中袁滋為冊南詔使八考異曰舊南詔傳十年月遣溱羅棟獻吐蕃印新傳曰異牟尋與崔佐時盟㸃蒼山敗突厥於神川明年六月冊異牟尋為南詔王按實錄乃今年六月新舊傳皆誤也韋臯奏狀皆稱雲南王而竇滂雲南别錄曰詔袁滋冊異牟尋為南詔葢從其請南詔之名自此始也蠻語詔即王也新傳云南詔王亦誤厥余按異牟尋破吐蕃於神川考異誤作突賜銀窠金印文曰貞元冊南詔印滋至其國異牟尋北靣跪受冊印稽首再拜因與使者宴出𤣥宗所賜銀平脱馬頭盤二以示滋又指老笛工歌女曰皇帝所賜龜兹樂唐十部樂有龜兹樂有彈箏豎箜􅔃琵琶五絃横笛笙簫觱篥荅臘鼓毛員鼓都曇鼔侯提鼔雞婁鼔腰鼔擔鼔齊鼔貝皆一銅鈸二舞者四人設五方師子高丈餘飾以方色每師子有十二人畫衣執紅拂首加紅袜謂之師子郎龜兹音㐀慈惟二人在耳滋曰南詔當深思祖考子子孫孫盡忠於唐異牟尋拜曰敢不謹承使者之命賜義武節度使張昇雲名茂昭時考異曰舊傳於其父孝忠卒言改名年代記在此年九月今從實錄御史中丞穆賛按度支吏贓罪度徒洛翻裴延齡欲出之庇吏欲出其罪賛不從延齡譛之貶饒州别駕朝士畏延齡側目畏之不敢正視賛寧之子也天寶末安祿山反穆寧起兵於河北以討之韋臯奏破吐蕃於峨和城武徳元年以漢蠶陵縣地置翼州管内有峨和城秋七月壬申朔以王延貴為昭義留後賜名䖍休昭義行軍司馬攝洺州刺史元誼聞䖍休為留後意不平表請以磁邢洺别為一鎮昭義精兵多在山東昭義軍鎮潞州謂磁邢洺三州為山東誼厚賚以悅之上屢遣中使諭之不從臨洺守將夏侯仲宣以城歸䖍休䖍休遣磁州刺史馬正卿督禆將石定蕃等將兵五千擊洺州定蕃帥其衆二千叛歸誼帥讀曰率正卿退還詔以誼為饒州刺史誼不行䖍休自將兵攻之引洺水以灌城黄少卿陷欽横潯貴等州攻孫公器於邕州九月王䖍休破元誼兵進拔鷄澤鷄澤漢廣平縣地武徳四年置鷄澤縣屬洺州九域志在州東北六十里裴延齡奏稱官吏太多自今缺員請且勿補收其俸以實府庫上欲修神龍寺須五十尺松不可得延齡曰臣近見同州一谷木數千株皆可八十尺上曰開元天寶間求美材於近畿猶不可得今安得有之對曰天生珍材固待聖君乃出開元天寶何從得之延齡奏左藏庫司多有失落近因檢閲使置薄書乃於糞土之中得銀十三萬兩其匹段雜貨百萬有餘匹段雜貨使在糞土之中已應腐爛不可用雖甚愚之人亦知其妄誕也徳宗不加之罪延齡復何所忌憚乎此皆已弃之物即是羨餘羨代線翻悉應移入雜庫以供别勅支用太府少卿韋少華不伏抗表稱此皆每月申奏見在之物見賢遍翻請加推驗執政請令三司詳覆上不許亦不罪少華延齡每奏對恣為詭譎皆衆所不敢言亦未嘗聞者延齡處之不疑處昌吕翻上亦頗知其誕妄但以其好詆毁人好呼到翻冀聞外事故親厚之徳宗親厚裴延齡不特冀聞外事也亦以進奉逢其欲耳羣臣畏延齡有寵莫敢言惟鹽鐵轉運使張滂京兆尹李充司農卿李銛銛息廉翻以職事相闗時證其妄而陸䞇獨以身當之日陳其不可用十一月壬申䞇上書極陳延齡姦詐數其罪惡數所角翻其畧曰延齡以聚歛為長䇿歛力贍翻以詭妄為嘉謀以掊克歛怨為匪躬掊蒲侯翻以靖譛服讒為盡節左傳少皥氏有不才子毁信廢忠崇飾惡言服讒蒐慝以誣盛徳天下之民謂之窮奇摠典籍之所惡以為智術冒聖哲之所戒以為行能惡鳥路翻行下孟翻可謂堯代之共工書堯典帝曰疇咨若予采驩兠曰共工方鳩僝功帝曰吁靜言庸違象恭滔天共音恭魯邦之少夘也家語孔子為魯司寇攝行相事七日而誅少正夘戮之于兩觀之下子貢進曰夫少正卯魯之聞人也夫子為政而始誅之或者為失乎孔子曰天下有大惡者五而竊盜不豫焉一曰心逆而險二曰行僻而堅三曰言偽而辯四曰記醜而博五曰順非而澤此五者有一於人則不免君子之誅而少正夘皆兼有之其居處足以撮徒成黨其談説足以飭褒榮衆其彊禦足以反是獨立此乃人之姦雄有不可以不除蹟其姦蠧日長月滋長知丈翻隂祕者固未盡彰敗露者尤難悉數又曰陛下若意其負謗則誠宜亟為辨明為于偽翻陛下若知其無良又安可曲加容掩又曰陛下姑欲保持曾無詰問延齡謂能蔽惑不復懼思移東就西便為課績取此適彼遂號羨餘愚弄朝廷有同兒戲又曰矯詭之能誣罔之辭遇事輒行應口便𤼵靡日不有靡時不為又難以備陳也又曰昔趙高指鹿為馬事見八卷秦二世三年臣謂鹿之與馬物理猶同豈若延齡掩有為無指無為有又曰延齡凶妄流布寰區上自公卿近臣下逮輿臺賤品左傳芊尹無宇曰王臣公公臣大夫大夫臣士士臣皁皁臣輿輿臣隸隸臣僚僚臣僕僕臣臺諠諠談議億萬為徒能以上言上時掌翻其人有幾臣以卑鄙任當台衡情激于衷雖欲罷而不能自黙也書奏上不悦待延齡益厚十二月王䖍休乗氷合度壕急攻洺州元誼出兵擊之䖍休不勝而返日暮氷解士卒死者太半中書侍郎同平章事陸䞇以上知待之厚事有不可常力爭之所親或規其太鋭䞇曰吾上不負天子下不負所學它無所恤裴延齡日短䞇於上趙憬之入相也䞇實引之既而有憾於贄事見上卷八年九年密以䞇所譏彈延齡事告延齡故延齡益得以為計上由是信延齡而不直贄贄與憬約至上前極論延齡姦邪上怒形於色憬黙而無言壬戌贄罷為太子賓客曰考異韓愈順宗實錄曰徳宗在位稍久益自攬機柄親治細事失人君大體宰相益不得行其職而議者乃云由贄而然按凡為宰相者皆欲專權安肯自求失職不任宰相乃徳宗之失而歸咎於贄豈人情也又贄論朝官缺員狀云頃之輔臣鮮克勝任過䝉容養茍備職員致勞睿思巨細經慮此乃諫徳宗不任宰相親治細事之辭也初渤海文王欽茂卒子宏臨早死族弟元義立元義猜虐國人殺之立臨宏之子華嶼是為成王改元中興華嶼卒復立欽茂少子嵩鄰復扶又翻是為康王改元正歴渤海自大祚榮立國開元之間其子武藝立益以彊盛東北諸夷皆畏而臣之故元仁安更五代以至於宋耶律雖數加兵不能服也故通鑑歴叙其世為詳十一年春二月乙巳冊拜嵩鄰為忽汗州都督勃海王嵩考異曰實錄云乙巳冊大嶺鄰為勃海郡王今從新傳陸贄既罷相裴延齡因譛京兆尹李充衛尉卿張滂前司農卿李銛黨於䞇會旱延齡奏言贄等失埶怨望言於衆曰天下旱百姓且流亡度支多欠諸軍芻糧軍中人馬無所食其事奈何言其事勢將奈之何以動搖衆心其意非止欲中傷臣而已中竹仲翻言不獨以此為延齡罪且欲危社稷後數日上獵苑中適有神䇿軍士訴云度支不給馬芻上意延齡言為信遽還宫夏四月壬戌貶䞇為忠州别駕充為涪州長史滂為汀州長史開元二十四年開撫福二州山洞置汀州舊志忠州京師南二千一百二十二里汀州京師東南六千一百七十二里譙周巴記曰後漢初平六年江臨江縣屬永寧郡今忠州城東臨江古城是也後魏廢帝二年改為臨州因臨江縣以名州也隋廢州以其地併入巴東郡貞觀四年置忠州以其地連巴徼心懐忠信為名浪州漢涪陵縣地隋置涪州京師南二千三百五十里銛為邵州長史邵州京師東南三千四百里宋白曰邵州漢為昭陵縣吴改邵陵分零陵比部為邵陵郡隋立建州尋廢州以邵陵縣屬潭州唐貞觀十一年置邵州初陽城自處士徵為諌議大夫見二百三十二卷二年處昌吕翻拜官不辭未至京師人皆想望風采曰城必諌諍死職下及至諸諌官紛紛言事細碎天子益厭苦之而城方與二弟及客日夜痛飲人莫能窺其際皆以為虚得名耳前進士河南韓愈作爭臣論以譏之爭讀曰諍城亦不以屑意有欲造城而問者屑潔也顧也造七到翻城揣知其意輒强與酒揣初委翻强其兩翻客或時先醉仆席上城或時先醉卧客懐中不能聽客語及陸䞇等坐貶上怒未解中外惴恐惴之睡翻以為罪且不測無敢救者城聞而起曰不可令天子信用姦臣殺無罪人即帥拾遺王仲舒歸登右補闕熊執易崔邠等守延英門延英門延英殿門也程大昌曰案六典宣政殿門西上閤門之西即為延英門門之左曰延英殿故陽城欲救陸䞇約王仲舒等守延英殿閤上書伏閤不去也帥讀曰上䟽論延齡姦佞贄等無罪上大怒欲加城等罪太子為之營救為于偽翻上意乃解令宰相諭遣之於是金吾將軍張萬福聞諌官伏閣諌趨往至延英門大言賀曰朝廷有直臣天下必太平矣遂遍拜城與仲舒等已而連呼太平萬嵗太平萬嵗萬福武人年八十餘自此名重天下登崇敬之子也崇敬明禮家學厯事𤣥肅代及帝四世時朝夕相延齡陽城曰脱以延齡為相城當取白麻壊之唐故事中書用黄白二麻為綸命輕重之辯其後翰林學士專掌内命中書用黄麻其白皆在翰林院拜授將相徳音赦宥則用之宋白曰唐故事白麻皆内庭代言命輔臣除節將恤災患討不庭則用之宰臣於正衙受付若命相之書則通事舍人承旨皆宣讃訖始下有司翰林志凡赦書徳音立后建儲行大誅討拜免三公宰相命將日並使白麻紙不使印雙日起草候閤門鑰入而後進呈至隻日百寮並班於宣政殿樞宻使引按自東上閤門出若拜免宰相即便付通事舍人餘付中書門下並通事舍人宣示若機務急速亦雙日甚速者雖休假亦追班宣示按制按也册則有册按冊公主亦作閤門出按壊音怪慟哭於庭有李繁者泌之子也城盡疏延齡過惡欲宻論之以繁故人子陽城之除諌議李泌之薦也使之繕寫繁徑以告延齡延齡先詣上一一自解疏入上以為妄不之省省悉景翻丙寅幽州奏破奚王啜利等六萬餘衆回鶻奉誠可汗卒無子國人立其相骨咄祿為可汗骨咄祿本姓􅎤跌氏􅎤奚結翻跌徒結翻􅎤跌與回紇同出鐵勒而異種辨慧有勇略自天親時回鶻天親可汗合骨咄祿也典兵馬用事大臣諸酋長皆畏服之既為可汗冒姓藥葛羅氏回紇可汗姓藥葛羅骨咄祿捨其本姓冒其姓以嗣其國酋慈由翻長知兩翻遣使來告喪自天親可汗以上子孫幼穉者皆内之闕庭唐之闕庭也五月丁丑以宣武留後李萬榮昭義左司馬領留後王䖍休皆為節度使甲申河東節度使李自良薨戊子監軍王定遠奏請以行軍司馬李說為留後説神通之五世孫也淮安王神通高祖之從弟起兵闗西首應義旗説讀為悦下同庚寅遣祕書監張薦冊拜回鶻可汗骨咄祿為騰里邏羽錄没宻施合胡祿毗伽懐信可汗咄當没翻邏郎佐翻癸巳以李説為河東留後知府事説深徳王定遠請鑄監軍印監軍有印自定遠始秋七月丙寅朔陽城改國子司業坐言裴延齡故也王定遠自恃有功於李說專河東軍政易置諸將説不能盡從由是有隙定遠以私怒拉殺大將彭令茵拉盧合翻埋馬矢中將士皆憤怒説奏其狀定遠聞之直詣説拔刀刺之刺七亦翻説走免定逺召諸將以箱貯敕及告身二十餘通箱竹笥也貯丁吕翻示之曰有敕令説詣京師以行軍司馬李景略為留後李景略為李説所忌蓋起於此諸君皆遷官衆皆拜大將馬良輔竊視箱中皆定遠告身及所受敕也乃麾衆曰敕告皆偽不可受也定遠走登乾陽樓乾陽樓葢晉陽宫城南門樓呼其麾下莫應踰城而墜為枯枿所傷而死枿五葛翻木之伐去者其遺餘為枿事考異曰舊説傳曰定遠殺彭令茵説具以聞徳宗以定遠有奉天扈從功恕死停任制未至定逺怒説奏聞趨府謀殺説昇堂未坐抽刀刺説説走而獲免又曰定逺墜城下槎枿傷而不死尋有詔削奪長流崖州今從實錄八月辛亥司徒兼侍中北平莊武王馬燧薨閏月戊辰元誼以洺州詐降王䖍休遣裨將將二千人入城誼皆殺之降户江翻將郎亮翻九月丁巳加韋臯雲南安撫使以安撫南詔為官名横海節度使程懐直不恤士卒獵於野數日不歸懐直從父兄懐信為兵馬使因衆心之怨閉門拒之懐直奔歸京師冬十月丁丑以懐信為横海留後南詔攻吐蕃昆明城取之昆明城在西㸑西北有鹽池之利又虜施順二蠻王施順二蠻皆烏蠻種施蠻在鐵橋西北居大施睒歛尋睒順蠻在劒睒西北四百里睒失冉翻十二年春正月庚子元誼石定蕃等帥洺州兵五千人及其家人萬餘口奔魏州帥讀曰率上釋不問命田緒安撫之乙丑以渾瑊王武俊並兼中書令己巳加嚴震田緒劉濟韋臯並同平章事天下節度觀察使悉加檢校官以悦其意三月甲午韋臯奏降西南蠻高萬唐等二萬餘口降户江翻乙巳以閑廄宫苑使李齊運為禮部尚書閑廄宫苑二使李齊運葢兼為之户部侍郎裴延齡為户部尚書使職如故齊運無才能學術専以柔佞得幸于上每宰相對罷則齊運次進決其議或病卧家上欲有所除授往往遣中使就問之丙子韶王暹薨暹皇弟也魏博節度使田緒尚嘉城公主有庶子三人季安最幼公主子之以為副大使夏四月庚午緒暴薨左右匿之使季安領軍事年十五乙亥𤼵喪推季安為留後庚辰上生日故事命沙門道士講論於麟徳殿至是始命以儒士參之四門博士韋渠牟嘲談給後魏劉芳表云太和二十年立四門博士於四門置學按禮記云天子設四學鄭注云周四郊之虞庠也今以其遼逺故置於四門請移與太學同處從之唐百官志四門館博士正七品上掌教七品以上侯伯子男子為生及庶人子為俊士生者上悦之旬月遷右補闕始有寵五月丙申邠寧節度使張獻甫暴薨監軍楊明義請都虞候楊朝晟權知留後丙辰以朝晟為邠寧節度使六月乙丑以監句當左神䇿竇文場監句當右神䇿霍仙鳴皆為護軍中尉監左神威軍使張尚進監右神威軍使焦希望皆為中䕶軍句古􅇋翻當丁浪翻左右神䇿中尉始於竇霍自此宦官之權日以益重不可復制矣下護軍中尉一等為中護軍此職事官之掌禁兵者非如唐初所置勲級所謂上護軍護軍也宋白曰徳宗以梁洋扈從之功舉西漢謁者隨何下淮南功拜為中尉事故命神䇿監軍為中尉初上置六統軍視六尚書以處節度使罷鎮者興元元年置六統軍事見二百二十九卷處昌吕翻相承用麻紙寫制至是文場諷宰相比統軍降麻翰林學士鄭絪絪音因奏言故事惟封王命相用白麻今以命中尉不識陛下特以寵文場邪遂為著令也著令者定著為令上乃謂文場曰武徳貞觀時中人不過員外將軍同正耳衣緋者無幾自輔國以來墮壊制度衣於既翻墮讀曰隳壊音怪朕今用爾不謂無私若復以麻制宣告天下必謂爾脅我為之矣復扶又翻文場叩頭謝遂焚其麻命并統軍自今中書降敕明日上謂絪曰宰相不能違拒中人朕得卿言方悟耳是時竇霍埶傾中外藩鎮將帥多出神䇿軍臺省清要亦有出其門者矣宣武節度使李萬榮病風昏不知事霍仙鳴薦宣武押牙劉沐可委軍政辛巳以沐為行軍司馬宣歙觀察使劉贊卒初上以奉天窘乏故還宫以來尤專意聚歛歛力贍翻下同藩鎮多以進奉市恩皆云稅外方圓折則成方轉則成圓言於常税之外别自轉折以致貨財也亦云用度羨餘其實或割留常賦或増歛百姓或減刻利祿或販鬻蔬果往往私自入所進纔什一二李兼在江西有月進韋臯在四川有日進其後常州刺史濟源裴肅以進奉遷浙東觀察使刺史進奉自肅始濟子禮翻及劉賛卒判官嚴綬掌留務竭府庫以進奉徵為刑部員外郎幕僚進奉自綬始綬蜀人也史不能審其郡縣故止云蜀人李萬榮疾病其子迺為兵馬使甲申迺集諸將責李湛伊婁説張丕以不憂軍事斥之外縣説讀為悦上遣中使第五守進至汴州宣慰始畢軍士十餘人呼曰呼火故翻下同兵馬使勤勞無賞劉沐何人為行軍司馬沐懼陽中風舁出中竹仲翻舁余又羊茹翻軍士又呼曰倉官劉叔何給納有姦殺而食之又欲斫守進迺止之迺又殺伊婁説張丕説讀曰悦都虞􅇋城鄧惟恭與萬榮鄉里相善萬榮常委以腹心迺亦倚之至是惟恭與監軍俱文珍謀執迺送京師秋七月乙未以東都留守董晉同平章事兼宣武節度使以萬榮為太子少保貶迺䖍州司馬丙申萬榮薨鄧惟恭既執李迺遂權軍事自謂當代萬榮不遣人迎董晉晉既受詔即與傔從十餘人赴鎮傔苦念翻從才用翻不用兵衛至鄭州迎者不至九域志鄭州東至汴州一百五十里鄭州人為晉懼為于偽翻或勸晉且留觀變有自汴州出者言於晉曰不可入晉不對遂行惟恭以晉來之速不及謀晉去城十餘里惟恭乃帥諸將出迎帥讀曰率晉命惟恭勿下馬氣色甚和惟恭差自安既入仍委惟恭以軍政初劉𤣥佐増汴州兵至十萬遇之厚李萬榮鄧惟恭每加厚焉士卒驕不能禦禦一作御乃置腹心之士幕於公庭廡下挾弓執劒以備之時勞賜酒肉廡音武勞力到翻晉至之明日悉罷之董晉之意以謂此士前帥之腹心吾新來為帥若亦恃為腹心不足為吾衛而適足以生變罷之則待諸軍如一且示無所猜間戊戌韓王迥薨迥上弟也壬子詔以宣武將士鄧惟恭等有執送李迺功各遷官賜錢其為迺所脅邀逼制使者皆勿問脅所謂脅從也言李迺以威力脅使其下以邀逼中使唐時謂中使為敕使亦謂之制使使疏吏翻八月乙未朔日有食之己巳以田季安為魏博節度使丙子以汝州刺史陸長源為宣武行軍司馬朝議以董晉柔仁多可恐不能集事朝議謂朝廷之議多可言凡人有請悉從不能裁以理法故以長源佐之長源性剛刻多更張舊事更工衡翻晉初皆許之案成則命且罷由是軍中得安為長源以剛刻致祸張本丙戌門下侍郎同平章事趙憬薨初上不欲生代節度使常自擇行軍司馬以為儲帥行軍司馬掌弼戎政居則習蒐狩有役則申戰守之法器械糧備軍籍賜予皆專焉帥所類翻李景略為河東行軍司馬李説忌之回鶻梅錄入貢過太原説與之宴梅錄爭坐次説不能遏景略叱之梅錄識其聲趨前拜之曰非豐州李端公邪李景略折梅錄見二百三十三卷三年唐人呼侍御為端公李肇國史補曰宰相相呼曰堂老兩省曰閣老尚書曰院長御史曰端公又拜遂就下坐座中皆屬目於景略屬之欲翻説益不平乃厚賂中尉竇文場使去之去羌吕翻㑹有傳回鶻將入寇者上憂之以豐州當虜衝擇可守者文場因薦景略九月甲午以景略為豐州都防禦使窮邊氣寒土瘠民貧景略以勤儉帥衆帥讀曰率二嵗之後儲備完實雄於北邊盧邁得風疾庚子賈躭私忌父母及祖父母曾祖父母死日為私忌宰相絶班言宰相班絶無一人上遣中使召主書承旨唐制尚書省主書從八品下中書省從七品上堂吏也丙午户部尚書判度支裴延齡卒中外相賀上獨悼惜之壬子吐蕃寇慶州冬十月甲戌以諌議大夫崔損給事中趙宗儒並同平章事損𤣥暐之弟孫也崔𤣥暐有誅二張復中宗之功嘗為裴延齡所薦故用之十一月乙未以右補闕韋渠牟為左諌議大夫上自陸贄貶官去年四月陸䞇貶尤不任宰相自御史刺史縣令以上皆自選用中書行文書而已然深居禁中所取信者裴延齡李齊運户部郎中王紹司農卿李實翰林學士韋執誼及渠牟皆權傾宰相趨附盈門紹謹密無損益實狡險掊克執誼以文章與上唱和掊蒲矦翻和胡卧翻年二十餘自右拾遺召入翰林渠牟形神恌躁恌他彫翻尤為上所親狎上每對執政漏不過三刻渠牟奏事率至六刻語笑欵狎往往聞外聞音問所薦引咸不次遷擢率皆庸鄙之士宣武都虞候鄧惟恭内不自安潜結將士二百餘人謀作亂事覺董晉悉捕斬其黨械惟恭送京師己未詔免死汀州安置投竄於荒逺州郡謂之安置十三年春正月壬寅吐蕃遣使請和親上以吐蕃數負約數所角翻不許上以方渠合道木波皆吐蕃要路欲城之九域志環州治通逺縣唐方渠縣地有木波馬嶺石昌合道四鎮使問邠寧節度使楊朝晟須幾何兵對曰邠寧兵足以城之不煩他道上復使問之曰曏城鹽州城鹽州見上卷九年復扶又翻用兵七萬僅能集事今三城尤逼虜境兵當倍之事更相反何也對曰城鹽州之衆虜皆知之今𤼵本鎮兵不旬日至塞下出其不意而城之虜謂吾衆亦不減七萬其衆未集不敢輕來犯我不過三旬吾城已畢留兵戍之虜雖至無能為也此後周韋孝寛城汾石之故智也城旁草盡不能久留虜退則運芻糧以實之此萬全之䇿也若大集諸道兵踰月始至虜亦集衆而來與我爭戰勝負未可知何暇築城哉上從之二月朝晟分軍為三各築一城軍吏曰方渠無井不可屯軍判官孟子周曰方渠承平之時居人成市無井何以聚人乎命浚眢井眢井廢井也眢烏歡翻果得甘泉方渠縣鹹河從土橋歸徳川同家谷三處𤼵源来鹹苦不可食甜河在城西從蕃部鼻家族北界來供人飲食三月三城成木考異曰實錄先是邠寧楊朝晟奏方渠合道波皆賊路也請城其地以備之詔問須幾何人邠志曰十三年春詔問楊公曰方渠合道木波皆賊路也城之可乎若以為可更要幾兵二月十一日起復除本官十四日制書到軍十八日𤼵軍二十六日軍次石堂谷二十八日功就三城今從邠志而不取其日夏四月庚申楊朝晟軍還至馬嶺唐馬嶺縣屬慶州劉昫曰馬嶺隋縣治天家堡貞觀八年移理新城以縣西有馬嶺坂宋白曰鹽州治五原即漢馬嶺縣地今州南抵慶州馬嶺縣北界杜佑馬嶺縣漢舊牧地川形似馬嶺吐蕃始出兵追之相拒數日而去朝晟遂城馬嶺而還開地三百里皆如其素皆如其素所慮之期也建中間朔方兵破李納軍朝晟為之也葢其智畧誠有足稱者還從宣翻又如字庚午義成節度使李復薨庚辰以陜虢觀察使姚南仲為義成節度使監軍薛盈珍方大會聞之言曰姚大夫書生豈將才也將即亮翻判官盧坦私謂人曰姚大夫外雖柔中甚剛監軍侵之必不受軍府之禍自此始矣吾恐為所留遂自它道潛去南仲果以牒請之不遇得免既而盈珍與南仲有隙幕府多以罪貶有死者事見後十六年史言盧坦庶乎見幾吐蕃賛普乞立賛卒子足之煎立六月壬午韋臯奏吐蕃入寇嶲州刺史曹高仕破之於臺登城下臺登漢縣唐屬嶲州由清溪闗西南至臺登五百五十里光祿少卿同正張茂宗員外置同正員起於高宗之時茂昭之弟也茂昭時為義武節度使許尚義章公主義章公主上女也義章縣名屬彬州宋白曰漢彬縣地隋末蕭銑分彬縣立未成昏茂宗母卒遺表請終嘉禮上許之秋八月癸酉起復茂宗左衛將軍同正左拾遺義興蔣乂上疏諌武考異曰實錄作蔣按舊傳乂本名武以為兵革之急古有墨衰從事者衰倉回翻左傳晉文公卒未葬秦穆公伐鄭晉襄公墨衰絰以敗秦師于殽未聞駙馬起復尚主也上遣中使諭之不止乃特召對於延英唐中世以後召對宰輔乃開延英今蔣乂特以拾遺召對謂曰人間多借吉成昏者卿何執此之堅對曰昏姻喪紀人之大倫吉凶不可凟也委巷之家不知禮教委巷曲巷也言其屈曲僻陋其女孤貧無恃言貧而喪其親也或有借吉從人未聞男子借吉娶婦者也太常博士韋彤裴堪復上䟽諌復扶又翻上不悦命趣下嫁之期趣讀曰促辛巳成婚九月己丑中書侍郎同平章事盧邁以病罷為太子賓客冬十月淮西節度使呉少誠擅開刀溝入汝刀溝新舊書皆作司洧水上遣中使諭止之不從命兵部郎中盧羣往詰之詰去吉翻少誠曰開此水大利於人羣曰君令臣行雖利人臣敢專乎公承天子之令而不從何以使下吏從公之令乎少誠遽為之罷役為于偽翻史言杖大義者獷悍不能不為之革面十二月徐州節度使張建封入朝先是宫中市外間物令官吏主之隨給其直先悉薦翻比嵗以宦者為使比毗至翻近也謂之宫市抑買人物稍不如本估估者價也其後不復行文書復扶又翻下同置白望數百人於兩市白望者言使人於市中左右望白取其物不還本價也兩市長安城中東市西市也隋名東市曰都會西市曰利人及要閙坊曲閲人所賣物但稱宫市則歛手付與真偽不復可無敢問所從來及論價之高下者率用直百錢物買人直數千物多以紅紫染故衣敗繒繒慈陵翻尺寸裂而給之仍索進奉門户及脚價錢索山客翻進奉門户者言進奉所經由門户皆有費用如漢靈帝時所謂導行費也脚價謂僦人負荷進奉物入内有雇脚之費人將物詣市將齎持也至有空手而歸者名為宫市其實奪之商賈有良貨皆深匿之賈音古每敕使出雖沽漿賣餅者皆撤業閉門嘗有農夫以驢負柴宦者稱宫市取之與絹數尺又就索門户索山客翻仍邀驢送柴至内農夫啼泣以所得絹與之不肻受曰須得爾驢須者意所欲也農夫曰我有父母妻子待此然後食言待此驢負物貿易然後可以給食今以柴與汝不取直而歸汝尚不肻我有死而已遂敺宦者街吏擒以聞吾烏口翻街吏即金左右街使之屬吏詔黜宦者賜農夫絹十匹然宫市亦不為之改諌官御史數諌不聽為于偽翻數所角翻建封入朝具奏之上頗嘉納以問户部侍郎判度支蘇弁弁希宦者意對曰京師游手萬家無土著生業著直畧翻仰宫市取給仰牛向翻上信之故凡言宫市者皆不聽十四年春二月乙亥名申光蔡軍曰彰義呉少誠時據淮西有申光蔡三州夏閏五月庚申以神䇿行營節度使韓全義為夏綏銀宥節度使全義時屯長武城詔帥其衆赴鎮帥讀曰率士卒以夏州磧鹵磧沙磧鹵醎鹵磧鹵之地五穀不生磧七迹翻又盛夏不樂徙居樂音洛辛酉軍亂殺大將王栖巖全義踰城走史言韓全義駑怯無御衆之略徒以慿結宦官致節鉞都虞候高崇文誅首亂者衆然後定崇文幽州人也丙子以崇文為長武城都知兵馬使不降敕令中使口宣授之口宣聖旨而授之官使掌兵史言徳宗重宦臣而輕詔命秋七月壬申給事中同平章事趙宗儒罷為右庶子以工部侍郎鄭餘慶為中書侍郎同平章事八月初置左右神䇿統軍觀此則知神䇿在六軍之外時禁軍戍邊稟賜優厚稟給也諸將多請遙隸神䇿軍稱行營皆統於中尉其軍遂至十五萬人京兆尹呉湊屢言宫市之弊宦者言湊屢奏宫市皆右金吾都知趙洽田秀嵓之謀也丙午洽秀嵓坐流天徳軍都知金吾府吏右職也九月丙申以陜虢觀察使于頔為山南東道節度使頔音迪丁夘把王倕薨倕肅宗子倕音垂彰武節度使呉少誠遣兵掠壽州霍山彰武當作彰義霍山本漢廬江之灊城縣梁置霍州隋置霍山縣唐屬壽州開元二十七年改霍山曰盛唐天寳初析盛唐别置霍山縣其地屬今壽州六安縣界殺鎮遏使謝詳宋白曰貞元六年初置藍田渭橋等鎮遏使侵地五十餘里置兵鎮守太學生薛約師事司業陽城坐言事徙連州城送之郊外上以城黨罪人己巳左遷城道州刺史傳考異曰實錄新舊無年月栁宗元陽公遺愛碣曰四年五月皇帝以銀印赤紱即隠所起陽公為諫議大夫後七年廷諍懇至帝尤嘉異遷國子司業又四年九月己巳出拜道州刺史太學魯郡季償廬江何蕃等百六十人投業奔走稽首闕下呌閽顯天願乞復舊朝廷重更其事如己巳詔今從之城治民如治家州之賦税不登觀察使數加誚讓治直之翻數所角翻誚才笑翻城自署其考曰撫字心勞徵科政拙考下下觀察使遣判官督其賦至州城先自囚於獄判官大驚馳入謁城於獄曰使君何罪某奉命來候安否耳留一二日未去城不復歸復扶又翻館門外有故門扇横地城書夜坐卧其上判官不自安辭去其後又遣他判官往按之他判官載妻子中道逸去陽城之名徳人知敬之彼不之知而使按之者果何人也冬十月丁酉通王諶薨諶上子也音氏壬翻庚子夏州節度使韓全義奏破吐蕃於鹽州西北明州鎮將栗鍠姓譜栗姓栗陸氏之後漢長安有富室栗氏殺刺史盧雲誘山越作亂攻䧟浙東州縣明州山越今慈溪鄞縣南界奉化縣西北界山民也鍠户盲翻又音皇誘音酉十五年春正月甲寅雅王逸薨逸皇弟也二月丁丑宣武節度使董晉薨乙酉以其行軍司馬陸長源為節度使長源性刻急恃才傲物判官孟叔度輕佻淫縱佻他彫翻好慢侮將士軍中皆惡之惡烏路翻董晉薨長源知留後揚言曰將士弛慢日久當以法齊之耳衆皆懼或勸之發財以勞軍勞力到翻長源曰我豈河北賊以錢買健兒求節鉞邪故事主帥薨帥所類翻給軍士布以制服長源命給其直叔度高鹽直下布直人不過得鹽三二斤軍中怨怒長源亦不為之備是日軍士作亂殺長源叔度臠食之立盡史言陸長源之死唐朝用違其才耳若孟叔度則死有餘罪監軍俱文珍以宋州刺史劉逸準久為宣武大將得衆心密書召之逸準引兵徑入汴州亂衆乃定以常州刺史李錡為浙西觀察使諸道鹽鐵轉運使錡國貞之子也錡魚豈翻又音奇肅宗末李國貞為絳州行營兵所殺閑廄宫苑使李齊運受其賂數十萬薦之於上故用之錡刻剝以事進奉上由是悦之為李錡以浙西叛張本庚辰浙東觀察使裴肅擒栗鍠於台州斬之己丑以劉逸準為宣武節度使賜名全諒三月甲寅呉少誠遣兵襲唐州殺監軍邵國朝鎮遏使張嘉瑜掠百姓千餘人而去戊午昭義節度使王䖍休薨戊辰以河陽懐州節度使李元淳為昭義節度使癸巳山南西道節度使嚴震薨南詔異牟尋遣使與韋臯約共擊吐蕃臯以兵糧未集請俟它年韋臯有智畧恐南詔貌與而未悉其心也故以兵糧未集辭此可與智者道山南西道都虞候嚴礪謟事嚴震震病使知留後遺表薦之秋七月乙巳以礪為山南西道節度使八月陳許節度使曲環薨乙未呉少誠遣兵掠臨潁臨潁漢古縣唐屬許州九域志在許州東南六十里宋白曰隋大業四年自故城移於臨穎臯其地實岡阜也陳州刺史上官涚知陳許留後遣大將王令忠將兵三千救之皆為少誠所虜丙午以涚為陳許節度使涚舒芮翻少誠遂圍許州涚欲弃城走營田副使劉昌裔止之曰城中兵足以辦賊但閉城勿與戰不過數日賊氣自衰吾以全制其弊蔑不克矣蔑無也少誠晝夜急攻昌裔募勇士千人鑿城出擊少誠大破之城由是全昌裔兖州人也少誠又寇西華西華漢縣唐屬陳州九域志在州西八十里陳許大將孟元陽拒却之陳許都知兵馬使安國寧與上官涚不叶謀翻城應少誠劉昌裔以計斬之召其麾下人給二縑伏兵要巷見持縑者悉斬之無得脱者庚辰宣武節度使劉全諒薨軍中思劉𤣥佐之恩推其甥都知兵馬使匡城韓𢎞為留後𢎞將兵識其材鄙勇怯指顧必堪其事丙辰詔削奪呉少誠官爵令諸道進兵討之辛酉以韓𢎞為宣武節度使先是少誠與劉全諒約共攻陳許先悉薦翻以陳州歸宣武使者數輩猶在館𢎞悉驅出斬之選卒三千會諸軍擊少誠於許下少誠由是失埶無同惡相濟故失勢冬十月乙丑邕王謜薨謜徐園翻太子之子也上愛而子之及薨諡曰文敬太子山南東道節度使于頔安黄節度使伊慎知壽州事王宗與上官涗韓𢎞進擊呉少誠屢破之十一月壬子于頔奏拔呉房朗山後魏置襄城郡於漢汝南西平之地仍置遂寧縣隋大業初改曰呉房吴房本漢縣名應劭曰本房子國楚以封呉夫概王故曰呉房朗山漢安昌縣地後魏置初安郡隋開皇十八年改安昌為朗山唐並屬蔡州宋朝避聖祖諱改朗山為確山九域志呉房在蔡州西北七十里朗山在蔡州西南七十五里十二月辛未中書令咸寧王渾瑊薨于河中渾瑊封咸寧郡王瑊性謙謹雖位窮將相無自矜大之色毎貢物必躬自閲視受賜如在上前由是為上所親愛上還自興元雖一州一鎮有兵者皆務姑息瑊每奏事不過唐制凡奏事得可者皆過門下省中書省不過者寢其奏不下也輒私喜曰上不疑我故能以功名終六州党項自永泰以來居于石州代宗永泰之後改為大厯六州党項部落曰野利越詩野利龍兒野利厥律兒黄野海野窣等居慶州號東山部夏州號平夏部永泰之後稍徙石州永安鎮將阿史那思暕侵漁不已唐葢置永安鎮將於石州以綏御党項暕古限翻党項部落悉逃奔河西諸軍討呉少誠者既無統帥帥所類翻每出兵人自規利規圖也進退不壹乙未諸軍自潰於小溵水溵與㶏同音殷又音隠水經注潁水東南過臨潁縣小㶏水注之又東過西華縣北又南過汝陽縣北又東南過南頓縣北大㶏水從西來注之宋白曰蔡州汝陽縣隋開皇十七年改為溵水今界内水有大溵小溵之名其年又於上蔡縣東北别置汝陽縣委弃器械資糧皆為少誠所有於是始議置招討使吐蕃衆五萬分擊南詔及嶲州異牟尋與韋臯各𤼵兵禦之吐蕃無功而還還音旋又如字十六年春正月恒冀易定陳許河陽四軍與呉少誠戰皆不利而退夏綏節度使韓全義本出神䇿軍中尉竇文場愛厚之薦於上使統諸軍討呉少誠二月乙酉以全義為蔡州四靣行營招討使十七道兵皆受全義節度為韓全義喪師張本宣武軍自劉𤣥佐薨凡五作亂貞元八年𤣥佐薨汴卒拒呉湊而立其子士寧李萬榮既逐士寧十年韓惟清等亂十二年萬榮死其子迺以兵亂董晉既入汴鄧惟恭復謀亂十四年晉薨兵又亂殺留後凡五亂士卒益驕縱輕其主帥帥所類翻韓𢎞視事數月皆知其主名有郎將劉鍔常為唱首三月𢎞陳兵牙門召鍔及其黨三百人數之以數預於亂數之之數音所具翻數預之數所角翻自以為功悉斬之血流丹道自是至𢎞入朝憲宗元和十四年韓𢎞入朝二十一年士卒無一人敢讙呼於城郭者讙許元翻呼火故翻義成監軍薛盈珍為上所寵信欲奪節度使姚南仲軍政南仲不從由是有隙盈珍譛其幕僚馬摠貶泉州别駕福建觀察使栁冕謀害摠以媚盈珍遣幕僚寶鼎薛戎攝泉州事使按致摠罪戎為辨析其無辜為于偽翻冕怒召戎囚之使守卒恣為侵辱如此彌月徐誘之使誣摠戎終不從摠由是獲免冕芳之子也栁芳有史學事𤣥宗肅宗盈珍屢毁南仲於上上疑之盈珍乃遣小吏程務盈乘驛誣奏南仲罪牙將曹文洽亦奏事長安知之晨夜兼行追及務盈於長樂驛長樂驛在長安城東滻坡與之同宿中夜殺之沈盈珍表於厠中自作表雪南仲之寃且首專殺之罪首式又翻亦作狀白南仲遂自殺明旦門不啟驛吏排之入得表狀於文洽尸旁上聞而異之徵盈珍入朝南仲恐盈珍讒之益深亦請入朝夏四月丙子南仲至京師待罪於金吾金吾左右仗凡内外官之待罪者詣焉詔釋之召見見賢遍翻上問盈珍擾卿邪對曰盈珍不擾臣但亂陛下法耳且天下如盈珍輩何可勝數勝音升數所具翻雖使羊杜復生羊杜謂羊祜杜預復扶又翻亦不能行愷悌之政成攻取之功也上黙然竟不罪盈珍乃使掌機密盈珍又言於上曰南仲惡政皆幕僚馬少微贊之也詔貶少微江南官遣中使送之推墜江中而死推吐雷翻黔中觀察使韋士宗政令苛刻黔渠今翻丁亥牙將𫝊近等逐之出奔施州九域志黔州東北至施州四百一十一里新羅王敬則卒庚寅冊命其嫡孫俊邕為新羅王韓全義素無勇畧專以巧佞貨賂結宦官得為大帥帥所類翻每議軍事宦者為監軍者數十人坐帳中爭論紛然莫能決而罷天漸暑士卒久屯沮洳之地沮將預翻洳人恕翻沮洳漸濕也多病疫人有離心五月庚戌與呉少誠將呉秀呉少陽等戰于溵南廣利原溵南溵水之南也鋒鏑纔交諸軍大潰秀等乗之全義退保五樓五樓在溵水縣西南少陽滄州清池人也宋白曰漢浮陽縣隋開皇十八年改曰清池因縣東南有清池為名山南東道節度使于頔因討呉少誠大募戰士繕甲厲兵聚歛貨財恣行誅殺有據漢南之志專以慢上陵下為事上方姑息藩鎮知其所為無如之何頔誣鄧州刺史元洪贓罪至徳元載升襄陽防禦使為山南東道節度使領襄鄧隨唐安均房金商九州貞元元年以鄧州隸東都畿以此觀之此時復領鄧州矣朝廷不得已流洪端州遣中使護送至􅀥陽􅀥陽漢舂陵之地隋置􅀥陽縣唐初屬唐州貞觀十一年廢屬隨州九域志在州西北一百六十里距襄州一百三十五里頔遣兵劫取歸襄州中使奔歸頔表洪責太重上復以洪為吉州長史乃遣之復扶又翻又怒判官薛正倫奏貶峽州長史比敕下比必利翻及也頔怒已解復奏畱為判官上一一從之徐泗濠節度使張建封鎮彭城十餘年貞元四年張建封鎮彭城軍府稱治治直吏翻病篤請除代人辛亥以蘇州刺史韋夏卿為徐泗濠行軍司馬敕下建封已薨夏卿執誼之從祖兄也徐州判官鄭通誠知留後恐軍士為變會浙西兵過彭城通誠欲引入城為援軍士怒壬子數千人斧庫門出甲兵擐執之擐音患圍牙城刼建封子前虢州叅軍愔令知軍府事愔挹淫翻殺通誠及大將段伯熊等數人械繫監軍上聞之以吏部員外郎李鄘為徐州宣慰使鄘直抵其軍鄘余封翻召將士宣朝旨諭以禍福朝直遙翻下同脱監軍械使復其位凶黨不敢犯愔上表稱兵馬留後鄘以非朝命不受使削去然後受之以歸去羌吕翻霛州破吐蕃於烏蘭橋唐書地理志㑹州烏蘭縣有烏蘭闗橋當在闗外黄河上丙寅韋士宗復入黔中是年四月韋士宗為牙將傅近所逐黔音禽又其廉翻湖南觀察使河中吕渭奏𤼵永州刺史陽履􅂍賄履表稱所歛物皆備進奉上召詣長安丁丑命三司使鞫之詰其物費用所歸履曰己市馬進之矣又詰馬主為誰馬齒幾何對曰馬主東西南北之人今不知所之按禮齒路馬有誅曲禮之言故不知其齒所對率如此上悅其進奉之言釋之但免官而已徳宗之猜忌如楊炎竇參位居宰輔皆以歸過於君不置之地上陽履以􅂍敗而表稱進奉謂非歸過於君可乎徳宗悦其進奉之言而釋其罪夫好貨非美名也人雖有好貨者茍加以好貨之名則必怫然而不受徳宗果何為而安受此名也余意陽履於􅂍賄既敗之後必有所進以求免於罪徳宗不徒悦其言而已丙戌加淄青節度使李師古同平章事徐州亂兵為張愔表求旄節為于偽翻朝廷不許加淮南節度使杜佑同平章事兼徐濠泗節度使使討之佑大具舟艦遣牙將孟準為前鋒濟淮而敗佑不敢進泗州刺史張伾出兵攻埇橋大敗而還朝廷不得已除愔徐州團練使以伾為泗州留後濠州刺史杜兼為濠州留後仍加佑兼濠泗觀察使分濠泗隸淮南以弱徐州之權宣考異曰實錄十二月癸夘泗州濠州令淮南觀察使收管今因此終言之兼正倫五世孫也杜正倫相太宗高宗性狡險彊忍建封之疾亟也兼隂圖代之自濠州疾驅至府幕僚李藩與同列入問建封疾出見之泣曰僕射疾危如此張建封加僕射故稱之公宜在州防遏今弃州此來欲何為也宜速去不然當奏之兼錯愕出不意遂徑歸建封薨藩歸揚州兼誣奏藩於建封之薨搖動軍情上大怒宻詔杜佑使殺之佑素重藩懐詔旬日不忍𤼵因引藩論佛經曰佛言果報有諸藩曰有之佛經言人所造作善惡為果隨其所作而應之以禍福為報佑曰審如此君宜遇事無恐因出詔示藩藩神色不變曰此真報也佑曰君慎勿出口吾已宻論用百口保君矣人謂其家之親屬為百口上猶疑之召藩詣長安望見藩儀度安雅乃曰此豈為惡者邪即除祕書郎新羅王俊邕卒國人立其子重熙重直龍翻秋七月呉少誠進擊韓全義於五樓諸軍復大敗復扶又翻下同全義夜遁保溵水溵水縣漢汝陽縣地隋置溵水縣廢汝陽入焉唐屬陳州九域志在州西南八十里盧龍節度使劉濟弟源為涿州刺史不受濟命濟引兵擊擒之九月癸夘義成節度使盧羣薨甲戌以尚書左丞李元素代之賈躭曰凡就軍中除節度使必有愛憎向背背蒲妹翻喜懼者相半故衆心多不安自今願陛下只自朝廷除人庶無它變上以為然中書侍郎同平章事鄭餘慶與户部侍郎判度支于䪹素善䪹所奏事餘慶多勸上從之上以為朋比䪹薄諧翻又蒲回翻比毗至翻庚戌貶餘慶郴州司馬䪹泉州司户郴丑林翻宋白曰泉州江左之晉安郡隋置泉州舊理閩縣後移於南安縣唐聖厯元年分泉州之南安莆田龍溪三縣置武榮州景雲二年改泉州舊志泉州京師東南七千三百里十考異曰舊傳曰時嵗旱人饑與宰相議將賑給禁衛軍事未行為中書吏所洩餘慶貶郴州司馬按實錄餘慶與于䪹同貶餘慶制辭云乃乖正直有涉比周弃法弄情公行黨庇䪹制辭云性本纎狡行惟黨附奏對毎乖於事實傾邪有蠧于彜章今從之䪹頔之兄也癸丑呉少誠進逼溵水數里置營韓全義復帥諸軍退保陳州帥讀曰率下同宣武河陽兵私歸本道獨陳許將孟元陽神䇿將蘇光榮帥所部留軍溵水全義以詐誘昭義將夏侯仲宣義成將時昂河陽將權文變河中將郭湘等斬之欲以威衆全義至陳州刺史劉昌裔登城謂之曰天子命公討蔡州今乃來此昌裔不敢納請舍於城外既而昌裔齎牛酒入全義營犒師全義驚喜心服之己未孟元陽等與呉少誠戰殺二千餘人庚申以太常卿齊抗為中書舍人同平章事新書宰相表齊抗為中書侍郎同平章事癸亥以張愔為徐州留後冬十月呉少誠引兵還蔡州孟元陽折其鋒故退先是韋臯聞諸軍討少誠無功先悉薦翻上言請以渾瑊賈躭為元帥統諸軍渾瑊薨於去年十二月韋臯葢上言於瑊未薨之前若重煩元老重難也則臣請以精鋭萬人下巴峽出荆楚以翦凶逆臯欲為元帥然亦以大言􅃷朝廷耳彼豈肯去西川邪不然因其請罪而赦之罷兩河諸軍以休息公私亦䇿之次也若少誠一旦罪盈惡稔為麾下所殺則又當以其爵位授之是除一少誠生一少誠為患無窮矣賈躭言于上曰賊意葢亦望恩貸恐須開其生路上從之會少誠致書幣於監官軍者求昭洗監軍奏之戊子詔赦少誠及彰義將士復其官爵韓考異曰實錄九月壬寅宰相對於延英賈躭奏曰昨全義五樓退軍賊不敢追趂者應望國家恩貸恐須開其生路上是之按全義自五樓退保溵水少誠逼溵水下營全義又退保陳州非不敢追趂也又云諸軍討蔡州未嘗整陣交鋒而王師累挫潰呉少誠知王師無能為致書幣以告監軍願求昭洗上既納賈躭之議又得監軍善奏遂復其官爵按少誠知王師無能為則愈當侵軼豈肯從監軍求昭洗葢少誠起兵以來不能無疲弊故求休息耳今不取己丑河東節度使李說薨甲午以其行軍司馬鄭儋為節度使儋都甘翻上擇可以代儋者以刑部員外郎嚴綬嘗以幕僚進奉嚴綬進奉事見上十二年記其名史言徳宗好貨惟進奉者則牢記其姓名即用為行軍司馬吐蕃數為韋臯所敗數所角翻下同敗補邁翻是嵗其曩貢臘城等九節度嬰籠官馬定徳帥其部落來降定徳有智略吐蕃諸將行兵皆稟其謀䇿常乘驛計事至是以兵數不利恐獲罪遂來奔據舊書云吐蕃酋帥兼監統曩貢臘城等九節度籠宜馬定徳與其大將八十七人舉部落來降定徳有計畫知兵法及山川地形至是以邊功不立慁得罪而來如此則别是一人籠官馬定徳又是一人考之字書亦無字然通鑑所書全用舊書韋臯傳文葢舊書韋臯傳與吐蕃傳自相牴牾帥讀曰率資治通鑑卷二百三十五
