front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百八宋司馬光撰胡三省音註晉紀三十起𤣥黓執徐盡柔兆涒灘凡五年烈宗孝武皇帝下太元十七年春正月己巳朔大赦秦主登立昭儀隴西李氏為皇后二月壬寅燕主垂自魯口如河間勃海平原翟釗遣其將翟都侵舘陶屯蘇康壘蘇康人姓名舘陶縣漢屬魏郡晉屬陽平郡將即亮翻下同三月垂引兵南擊釗秦驃騎將軍没奕干帥衆降于後秦驃匹妙翻騎竒寄翻帥讀曰率降户江翻後秦以為車騎將軍封髙平公後秦主萇寢疾命姚碩德鎮李潤尹緯守長安召太子興詣行營萇時屯安定萇音長征南將軍姚方成言於興曰今冦敵未滅上復寢疾復扶又翻王統等皆有部曲終為人患宜盡除之興從之殺王統王廣苻𦙍徐成毛盛皆苻氏舊臣也萇怒曰王統兄弟吾之州里實無他志徐成等皆前朝名將朝直遥翻吾方用之奈何輒殺之使萇果以殺統等為非罪當按誅始造謀者但怒而已豈真怒邪燕主垂進逼蘇康壘夏四月翟都南走滑臺走音奏翟釗求救於西燕西燕主永謀於羣臣尚書郎勃海鮑遵曰使兩冦相弊吾承其後此卞莊子之策也中書侍郎太原張騰曰垂彊釗弱何弊之承不如速救之以成鼎足之勢今我引兵趨中山趨七喻翻下趣同晝多疑兵夜多火炬垂必懼而自救我衝其前釗躡其後此天授之機不可失也永不從翟釗敗則西燕之亡形成矣燕大赦五月丁卯朔日有食之六月燕主垂軍黎陽臨河欲濟翟釗列兵南岸以拒之辛亥垂徙營就西津去黎陽西四十里為牛皮船百餘艘偽列兵仗泝流而上艘蘇遭翻上時掌翻釗亟引兵趣西津趣七喻翻垂潜遣中壘將軍桂林王鎮等自黎陽津夜濟營于河南比明而營成比必寐翻及也釗聞之亟還攻鎮等營垂命鎮等堅壁勿戰釗兵往來疲暍暍於歇翻傷暑也攻營不能㧞將引去鎮等引兵出戰驃騎將軍農自西津濟與鎮等夾擊大破之燕主垂用兵於河上者再温詳則引兵徑濟而取之翟釗則張疑兵於西而潜軍東渡亦以决勝視敵之堅脆何如也驃匹妙翻騎竒寄翻農燕之驃騎大將軍此逸大字釗走還滑臺將妻子收遺衆北濟河登白鹿山水經注河内脩武縣北有白鹿山慿險自守燕兵不得進農曰釗無糧不能久居山中乃引兵還留騎􅇋之釗果下山還兵掩擊盡獲其衆釗單騎犇長子西燕主永以釗為車騎大將軍兖州牧封東郡王歳餘釗謀反永殺之初郝晷崔逞及清河崔宏新興張卓遼東䕫騰䕫姓也石趙之臣有䕫安陽平路纂皆仕於秦避秦亂來犇詔以為冀州諸郡各將部曲營於河南將即亮翻既而受翟氏官爵翟氏敗皆降於燕降户江翻燕主垂各隨其材而用之釗所統七郡三萬餘户皆按堵如故以章武王宙為兖豫二州刺史鎮滑臺徙徐州民七千餘户于黎陽以彭城王脱為徐州刺史鎮黎陽徐州之民葢為翟釗所掠者脱垂之弟子也垂以崔䕃為宙司馬初陳留王紹為鎮南將軍太原王楷為征西將軍樂浪王温為征東將軍樂浪音洛琅垂皆以䕃為之佐䕃才幹明敏强正善規諫四王皆嚴憚之所至簡刑法輕賦役流民歸之户口滋息秋七月垂如鄴以太原王楷為冀州牧右光祿大夫餘蔚為左僕射蔚紆勿翻秦主登聞後秦主萇疾病大喜疾甚曰病告祠世祖神主苻堅廟號世祖大赦百官進位二等秣馬厲兵進逼安定去城九十餘里八月萇疾小瘳出拒之登引兵出營將逆戰萇遣安南將軍姚熈隆别攻秦營登懼而還還從宣翻又如字萇夜引兵旁出以躡其後旦而􅇋騎告曰騎竒寄翻賊諸營已空不知所向登驚曰彼為何人去令我不知來令我不覺謂其將死忽然復來復扶又翻朕與此羌同世何其厄哉苻登屢為姚萇所挫故有懼萇之心葢至于是登氣衰矣登遂還雍雍於用翻下同萇亦還安定三河王光遣其弟右將軍寳等攻金城王乾歸寳及將士死者萬餘人又遣其子虎賁中郎將纂擊南羌彭奚念纂亦敗歸光自將擊奚念於枹罕克之奚念奔甘松甘松郡乞伏國仁所置及將即亮翻下同賁音奔枹音膚冬十月辛亥荆州刺史王忱卒忱是壬翻雍州刺史朱序以老病求解職詔以太子右衞率郗恢為雍州刺史代序鎮襄陽恢曇之子也郗曇見一百卷穆帝升平三年率所律翻郗丑之翻曇徒含翻巴蜀人在關中者皆叛後秦據𢎞農以附秦秦主登以竇衝為左丞相衝徙屯華隂華户化翻郗恢遣將軍趙睦守金墉河南太守楊佺期帥衆軍湖城帥讀曰率擊衝走之十一月癸酉以黄門郎殷仲堪為都督荆益寧三州諸軍事荆州刺史鎮江陵仲堪雖有英譽資望猶淺議者不以為允到官好行小惠好呼到翻綱目不舉南郡公桓𤣥負其才地以雄豪自處負其才與其門地也處昌吕翻朝廷疑而不用年二十三始拜太子洗馬洗悉薦翻𤣥嘗詣琅邪王道子值其酣醉酣戸甘翻張目謂衆客曰桓温晩塗欲作賊云何𤣥伏地流汗不能起由是益不自安常切齒於道子後出補義興太守守式又翻鬱鬱不得志歎曰父為九州伯兒為五湖長虞翻曰太湖有五湖隔湖洮湖射湖貴湖及太湖為五湖並太湖之小支俱連太湖故太湖兼得五湖之名韋昭曰胥湖蠡湖洮湖隔湖就太湖而五酈善長謂長塘湖射湖貴湖隔湖與太湖而五吳中志謂貢湖遊湖胥湖梅梁湖金鼎湖為五也長知兩翻遂棄官歸國𤣥襲封南郡公上疏自訟曰先臣勤王匡復之勲朝廷遺之臣不復計上時掌翻復扶又翻下同至於先帝龍飛陛下繼明謂桓温廢海西立簡文帝而帝繼統也易曰明兩作離大人以繼明照四方請問談者誰之由耶䟽寢不報𤣥在江陵仲堪甚敬憚之桓氏累世臨荆州𤣥復豪横横户孟翻士民畏之過於仲堪嘗於仲堪聴事前戲馬以矟擬仲堪聴讀曰㕔矟色角翻通俗文長丈八者謂之矟擬者舉矟向之若將刺之也仲堪中兵參軍彭城劉邁謂𤣥曰元帝謂江東置參軍十三曹有中兵外兵騎兵馬矟有餘精理不足𤣥不悦仲堪為之失色為於偽翻𤣥出仲堪謂邁曰卿狂人也𤣥夜遣殺卿我豈能相救邪使邁下都避之都謂建康𤣥使人追之邁僅而獲免征虜將軍豫章胡藩過江陵見仲堪説之曰説輸芮翻桓𤣥志趣不常每怏怏於失職怏於兩翻節下崇待太過恐非將來之計也仲堪不悦藩内弟羅企生為仲堪功曹藩退謂企生曰殷侯倒戈以授人必及於禍君不早圖去就後悔無及矣為後桓𤣥殺企生仲堪張本企區智翻庚寅立皇子德文為琅邪王徙琅邪王道子為㑹稽王㑹王外翻十二月燕主垂還中山以遼西王農為都督兖豫荆徐雍五州諸軍事鎮鄴雍於用翻休官權千成據顯親自稱秦州牧休官雜夷部落之名顯親縣漢光武置屬漢陽郡晉改顯親為顯新復漢陽為天水郡晉書姚興載記權千成作權干成略陽豪族也清河人李遼上表請敕兖州脩孔子廟孔子廟在魯魯郡前漢屬徐州後漢晉屬豫州江表始分屬兖州給户灑掃灑所賣翻掃素報翻又各如字仍立庠序收教學者曰事有如賖而寔急者此寔義與虚實之實同此之謂也表不見省省悉景翻十八年春正月燕陽平孝王柔卒權千成為秦所逼請降於金城王乾歸降户江翻乾歸以為東秦州刺史休官大都統顯親公夏四月庚子燕主垂加太子寳大單于以安定王庫傉官偉為太尉單音蟬傉奴沃翻范陽王德為司徒太原王楷為司空陳留王紹為尚書右僕射五月立子熈為河間王朗為勃海王鑒為博陵王秦右丞相竇衝矜才尚人尚人者陵人而出其上自請封天水王秦主登不許六月衝自稱秦王改元元光金城王乾歸立其子熾磐為太子熾昌志翻熾磐勇略明决過於其父秋七月秦主登攻竇衝於野人堡衝求救於後秦尹緯言於後秦主萇曰太子仁厚之稱緯于貴翻稱尺證翻名稱也著於逺近而英略未著請使擊苻登以著之萇從之太子興將兵攻胡空堡登解衝圍以赴之興因襲平凉大獲而歸苻登自大界之敗以平凉為根本萇使興還鎮長安魏王珪以薛干太悉伏不送劉勃勃事見上卷十六年八月襲其城屠之太悉伏犇秦氐帥楊佛嵩叛犇後秦帥所類翻楊佺期趙睦追之佺且縁翻九月丙戌敗佛嵩於潼闗後秦將姚崇救佛嵩敗晉兵敗補邁翻趙睦死冬十月後秦王萇疾甚還長安燕主垂議伐西燕諸將皆曰永未有釁我連年征討士卒疲弊未可也范陽王德曰永既國之枝葉又僣舉位號惑民視聴宜先除之以壹民心士卒雖疲庸得已乎垂曰司徒意正與吾同吾比老叩囊底智足以取之比必寐翻及也終不復留此賊以累子孫也垂不欲留慕容永以累子孫而不知拓㧞珪已窺􅎿於代北矣是以有國有家者不恃無敵國外患恃吾所以傳國承家者足以待之耳累力瑞翻復扶又翻遂戒嚴十一月垂發中山步騎七萬遣鎮西將軍丹楊王纉纉當作瓉龍驤將軍張崇出井陘驤思將翻陘音刑攻西燕武鄉公友于晉陽征東將軍平規攻鎮東將軍段平于沙亭沙亭在鄴西南西燕主永遣其尚書令刁雲車騎將軍慕容鍾帥衆五萬守潞川帥讀曰率友永之弟也十二月垂至鄴己亥後秦主萇召太尉姚旻僕射尹緯姚晃將軍姚大目尚書狄伯支入禁中受遺詔輔政萇謂太子興曰有毁此諸公者慎勿受之汝撫骨肉以恩接大臣以禮待物以信遇民以仁四者不失吾無憂矣姚萇所以詔其子者勝于苻徤姚晃垂涕問取苻登之䇿萇曰今大業垂成興才智足辦奚所復問復扶又翻庚子萇卒年六十四興祕不發䘮以其叔父緒鎮安定碩德鎮隂宻弟崇守長安或謂碩德曰公威名素重部曲最彊今易世之際必為朝廷所疑不如且犇秦州碩德本起兵隴上據冀城觀望事勢碩德曰太子志度寛明必無他慮今苻登未滅而骨肉相攻是自亡也吾有死而已終不為也遂往見興興優禮而遣之興自稱大將軍以尹緯為長史狄伯支為司馬帥衆伐秦帥讀曰率十九年春秦主登聞後秦主萇卒卒子恤翻下同喜曰姚興小兒吾折杖笞之耳乃大赦盡衆而東輕敵者敗宜苻登所以不亡於姚萇之時而亡於姚興之初立也留司徒安成王廣守雍雍於用翻太子崇守胡空堡遣使拜金城王乾歸為左丞相河南王領秦梁益凉沙五州牧加九錫使疏吏翻下同初秃髪思復鞬卒鞬居言翻子烏孤立烏孤雄勇有大志與大將紛陁謀取凉州欲并吕光也將即亮翻紛陁曰公必欲得凉州宜先務農講武禮俊賢修政刑然後可也烏孤從之三河王光遣使拜烏孤冠軍大將軍河西鮮卑大都統冠古玩翻烏孤與其羣下謀之曰可受乎皆曰吾士馬衆多何為屬人石真若留不對烏孤曰卿畏吕光邪石真若留曰吾根本未固小大非敵若光致死於我何以待之不如受以驕之俟釁而動蔑不克矣烏孤乃受之紛陁與石真若留皆能審宜應事者也史言秃髪烏孤所以興紛與石真葢皆夷姓二月秦主登攻屠各姚奴帛蒲二堡克之二堡在胡空堡之東屠直於翻燕主垂留清河公㑹鎮鄴發司冀青兖兵遣太原王楷出滏口滏音釡遼西王農出壺關垂自出沙庭以擊西燕庭當作亭其地在鄴西南標榜所趣軍各就頓分處置兵以疑敵使不知所備趣七喻翻下同西燕主永聞之嚴兵分道拒守聚粮臺壁水經註潞縣北對故臺壁漳水出其南本潞子所立也魏收地形志襄垣郡刈陵縣漢晉之潞縣也有臺壁遣從子征東將軍小逸豆歸時西燕之臣有二逸豆歸故此稱小逸豆歸從才用翻鎮東將軍王次多右將軍勒馬駒帥衆萬餘人戍之帥讀曰率夏秦主登自六陌趣廢橋趣七喻翻後秦始平太守姚詳據馬嵬堡以拒之嵬五囘翻太子興遣尹緯將兵救詳將即亮翻緯據廢橋以待秦秦兵爭水不能得渴死者什二三因急攻緯興馳遣狄伯支謂緯曰苻登窮冦宜持重以挫之緯曰先帝登遐鄭𤣥曰登上也遐已也上已者若僊去云耳上時掌翻人情擾懼今不因思奮之力以禽敵大事去矣遂與秦戰秦兵大敗其夜秦衆潰登單騎犇雍騎竒寄翻雍於用翻太子崇及安成王廣聞敗皆棄城走登至無所歸乃犇平凉收集遺衆入馬毛山平凉城在漢安定鶉隂縣界後周始置平凉郡及縣唐為原州縣赫連定之敗魏亦據馬髦嶺以禽奚斤葢平凉之險要處也燕主垂頓軍鄴西南月餘不進西燕主永怪之以為太行道寛行户剛翻疑垂欲詭道取之乃悉歛諸軍屯軹闗軹知氏翻杜太行口惟留臺壁一軍甲戌垂引大軍出滏口入天井闗前漢書地理志上黨郡高都縣有天井闗蔡邕曰太行山上有天井闗在井北遂因名焉余按今澤州晉城縣有太行闗闗内有天井泉三所即天井闗也五月乙酉燕軍至臺壁永遣從兄太尉大逸豆歸救之從才用翻平規擊破之小逸豆歸出戰遼西王農又擊破之斬勒馬駒禽王次多遂圍臺壁永召太行軍還自將精兵五萬以拒之刁雲慕容鍾震怖帥衆降燕永誅其妻子將即亮翻怖普布翻帥讀曰率降户江翻己亥垂陳于臺壁南陳讀曰陣遣驍騎將軍慕容國伏千騎於澗下驍堅堯翻騎竒寄翻庚子與永合戰垂偽退永衆追之行數里國騎從澗中出斷其後斷丁管翻諸軍四面俱進大破之斬首八千餘級永走歸長子晉陽守將聞之棄城走丹楊王瓉等進取晉陽瓉蔵旱翻後秦太子興始發䘮即皇帝位于槐里興字子畧萇之長子也槐里縣漢屬扶風晉屬始平郡宋白曰漢槐里縣故城在唐岐州興平縣東南七里興既破苻登始發䘮襲位大赦改元皇初遂如安定諡後秦主萇曰武昭皇帝廟號太祖六月壬子追尊㑹稽王太妃鄭氏曰簡文宣太后會工外翻諡法聖善周聞曰宣羣臣謂宣太后應配食元帝太子前率徐邈曰晉志惠帝建東宫稱中衛率泰始五年分為左右各領一軍惠帝時愍懐太子在東宫又加前後二率江左省前後二率孝武太元中又置率所類翻宣太后平素之時不伉儷於先帝言非正妃伉苦浪翻敵也儷力計翻並也至於子孫豈可為祖考立配為于偽翻國學明教東莞臧燾曰據晉書儒林傳元帝運鍾百六光啟中興雖尊儒勸學亟降於綸言然東序西膠未聞于絃誦明皇雅愛流畧簡文敦悦典墳乃招集學徒𢎞奬風烈國學明教之官當置於明帝簡文時也莞音官今尊號既正則罔極之情申别建寢廟則嚴禰之義顯嚴尊也禰父廟也繫子為稱兼明貴之所由繫子為稱簡文繫之宣太后之上也春秋傳曰母以子貴稱尺證翻一舉而允三義不亦善乎乃立廟於太廟路西燕主垂進軍圍長子西燕主永欲犇後秦侍中蘭英曰昔石虎伐龍都太祖堅守不去事見九十六卷晉成帝咸康四年卒成大燕之基卒子恤翻今垂七十老翁厭苦兵革終不能頓兵連嵗以攻我也但當城守以疲之永從之兵交之變其應無窮惟知彼知己者乃能百戰不殆耳慕容永欲以棘城之事自况當時與之共守長子者果能效死不去若慕容皝之諸臣乎秦主登遣其子汝隂王宗為質於河南王乾歸以請救質音致進封乾歸梁王納其妹為梁王后乾歸遣前軍將軍乞伏益州等帥騎一萬救之帥讀曰率騎竒寄翻秋七月登引兵出迎乾歸兵後秦主興自安定如涇陽與登戰于山南馬髦山南也執登殺之年五十二悉散其部衆使歸農業徙隂宻三萬戸於長安以李后賜姚晃益州等聞之引兵還還從宣翻又如字秦太子崇奔湟中即帝位改元延初諡登曰髙皇帝廟號太宗後秦安南將軍强熈鎮逺將軍强多叛推竇衝為主後秦主興自將討之軍至武功多兄子良國殺多而降强其兩翻將即亮翻降户江翻熈犇秦州衝犇汧川汧川即扶風汧縣之地汧苦堅翻汧川氐仇髙執送之三河王光以子覆為都督玉門以西諸軍事西域大都䕶鎮高昌命大臣子弟隨之八月己巳尊皇太妃李氐為皇太后居崇訓宫西燕主永困急遣其子常山公𢎞等求救於雍州刺史郗恢郗丑之翻并獻玉璽一紐璽斯氏翻恢上言垂若并永為患益深不如兩存之可以乘機雙斃帝以為然詔青兖二州刺史王恭豫州刺史庾楷救之楷亮之孫也庾氏為桓温所誅楷復不能振自此微矣永恐晉兵不出又遣其太子亮來為質質音致平規追亮及於高都獲之高都縣屬上黨郡隋為澤州丹川縣唐為晉城縣永又告急於魏魏王珪遣陳留公䖍將軍庾岳帥騎五萬東渡河屯秀容以救之此北秀容也在漢定襄郡界後魏置秀容郡秀容縣又立秀容護軍於汾水西北六十里徙北秀容胡人居之此南秀容也劉昫曰忻州秀容縣漢汾陽縣也隋自秀容故城移於此因更名帥讀曰率騎竒寄翻䖍紇根之子也紇根見一百四卷元年紇户骨翻晉魏兵皆未至大逸豆歸部將伐勤等開門內燕兵燕人執永斬之并斬其公卿大將刁雲大逸豆歸等三十餘人將即亮翻得永所統八郡七萬餘户及秦乘輿服御伎樂珍寳甚衆乘䋲證翻燕主垂以丹楊王瓉為并州刺史鎮晉陽宜都王鳳為雍州刺史鎮長子永尚書僕射昌黎屈遵瓉藏旱翻雍於用翻屈居勿翻尚書陽平王德祕書監中山李先太子詹事勃海封則黄門郎太山胡母亮中書郎張騰尚書郎燕郡公孫表皆隨才擢叙李先公孫表後皆仕魏位通顯九月垂自長子如鄴冬十月秦主崇為梁王乾歸所逐犇隴西王楊定定留司馬邵彊守秦州帥衆二萬與崇共攻乾歸乾歸遣凉州牧軻彈秦州牧益州立義將軍詰歸帥騎三萬拒之軻彈益州詰歸皆乞伏氐也凉秦二州牧乾歸所置非能有其地軻彈晉書載記作軻殫帥讀曰率下同益州與定戰敗於平州載記作平川當從之軻彈詰歸皆引退軻彈司馬翟瑥奮劔怒曰瑥音温主上以雄武開基所向無敵威振秦蜀將軍以宗室居元帥之任帥所類翻當竭力致命以佐國家今秦州雖敗二軍尚全奈何望風退衂衂女六翻將何面以見主上乎瑥雖無任獨不能以便宜斬將軍乎軻彈謝曰向者未知衆心何如耳果能若是吾敢愛死乃帥騎進戰益州詰歸亦勒兵繼之大敗定兵敗補邁翻殺定及崇斬首萬七千級穆帝永和七年秦王健改元即位歴六主四十三年而亡乾歸於是盡有隴西之地乞伏始得秦州定無子其叔父佛狗之子盛先守仇池自稱征西將軍秦州刺史仇池公諡定為武王仍遣使來稱藩使疏吏翻秦太子宣犇盛分氐羌為二十部䕶軍各為鎮戍不置郡縣燕主垂東巡陽平平原命遼西王農濟河與安南將軍尹國畧地青兖農攻廪丘國攻陽城皆㧞之東平太守韋簡戰死髙平泰山琅邪諸郡皆委城犇潰農進軍臨海臨東海也徧置守宰柔然曷多汗棄其父與社崘率衆西走柔然降魏見上卷十六年汗音寒崘盧昆翻魏長孫肥追之及於上郡䟦那山斬曷多汗社崘收其餘衆數百犇疋候䟦疋候䟦處之南鄙處昌吕翻社崘襲疋候䟦殺之疋候䟦子啟䟦吳頡等皆犇魏社崘掠五原以西諸部走度漠北柔然自此遂為魏患據載記以社崘為河西鮮卑則柔然亦鮮卑種也十一月燕遼西王農敗辟閭渾於龍水郭緣生述征記曰逢山在廣固南三十里洋水歴其隂而東北流世謂之石溝水出委粟山北而東注于巨洋水謂之石溝口然是水下流亦有時通塞及其春夏水泛川瀾無輟亦或謂之龍泉水敗補邁翻遂入臨淄十二月燕主垂召農等還秦主興遣使與燕結好使疏吏翻好呼到翻是歳前秦滅通鑑始書後秦為秦并送太子寳之子敏於燕燕封敏為河東公梁王乾歸自稱秦王大赦自此以後史以西秦别之二十年春正月燕主垂遣散騎常侍封則報聘于秦散悉亶翻騎竒寄翻遂自平原狩于廣川勃海長樂而歸漢髙祖置信都郡景帝三年為廣川國明帝更名樂成安帝改曰安平晉改曰長樂郡又别立廣川郡樂音洛西秦王乾歸以太子熾磐領尚書令熾昌志翻左長史邊芮為左僕射右長史袐宜為右僕射置官皆如魏武晉文故事然猶稱大單于大將軍單音蟬邊芮等領府佐如故薛于太悉伏自長安亡歸嶺北嶺北謂九嵕嶺北十八年太悉伏犇秦上郡以西鮮卑雜胡皆應之二月甲寅尚書令陸納卒三月庚辰朔日有食之皇太子出就東宫以丹陽尹王雅領少傅時會稽王道子專權奢縱嬖人趙牙本出倡優少詩照翻㑹工外翻倡音昌茹千秋本錢唐捕賊吏錢唐縣前漢屬會稽郡後漢屬吳郡錢唐記曰郡議曹華信議立此塘以防海水始開募能致土一斛者即與錢一千旬月之間來者雲集塘未成而不復取於是載土石者皆委之而去塘以之成故名錢塘楊正衡曰茹音如又而據翻浙間舊有此姓皆以謟賂得進道子以牙為魏郡太守千秋為驃騎諮議參軍驃頻召翻今匹妙翻騎竒寄翻牙為道子開東第築山穿池為于偽翻功用鉅萬帝嘗幸其第謂道子曰府内乃有山甚善然修飾太過道子無以對帝去道子謂牙曰上若知山是人力所為爾必死矣牙曰公在牙何敢死營作彌甚千秋賣官招權聚貨累億博平令吳興聞人奭上疏言之博平縣漢屬東郡晉屬平原郡江左屬魏郡與郡皆僑置帝益惡道子惡烏路翻而逼於太后不忍廢黜乃擢時望及所親幸王恭郗恢殷仲堪王珣王雅等使居内外要任以防道子道子亦引王國寳及國寳從弟琅邪内史緒以為心腹從才用翻由是朋黨競起無復曏時友愛之驩矣太后每和解之中書侍郎徐邈從容言於帝曰從千容翻漢文明主猶悔淮南世祖聰達負愧齊王淮南事見十四卷漢文帝六年齊王事見八十一卷武帝太康四年兄弟之際實為深慎㑹稽王雖有酣媟之累媟私列翻累力瑞翻宜加𢎞貸消散羣議外為國家之計内慰太后之心帝納之復委任道子如故復扶又翻初楊定之死也天水姜乳襲據上邽夏四月西秦王乾歸遣乞伏益州帥騎六千討之左僕射邊芮民部尚書王松壽曰益州屢勝而驕不可專任必以輕敵取敗乾歸曰益州驍勇諸將莫及帥讀曰率騎竒寄翻驍堅堯翻將即亮翻當以重佐輔之耳乃以平北將軍韋䖍為長史左禁將軍務和為司馬務姓也古有務光至大寒嶺大寒嶺在上邽西益州不設部伍聽將士遊畋縱飲令曰敢言軍事者斬䖍等諫不聽乳逆擊大破之魏王珪叛燕侵逼附塞諸部五月甲戌燕主垂遣太子寳遼西王農趙王麟帥衆八萬自五原伐魏范陽王德陳留王紹别將步騎萬八千為後繼散騎常侍髙湖諫曰散悉亶翻騎竒寄翻魏與燕世為昏姻代王什翼犍兩娶于慕容皆早卒哀帝隆和元年什翼犍納女于燕燕又以女妻之彼有内難燕實存之事見一百六卷十一年及一百七卷十二年難乃旦翻其施德厚矣結好久矣間以求馬不獲而留其弟事見上卷十六年好呼到翻下同曲在於我奈何遽興兵擊之拓䟦涉圭沈勇有謀蕭子顯曰珪字涉圭沈持林翻㓜歴艱難兵精馬彊未易輕也皇太子富於春秋志果氣鋭今委之專任必小魏而易之易以䜴翻萬一不如所欲傷威毁重願陛下深圖之言頗激切垂怒免湖官湖泰之子也前燕時垂為車騎將軍以泰為從事中郎六月癸丑燕太原元王楷卒西秦王乾歸遷于西城苑川西城也秋七月三河王光帥衆十萬伐西秦帥讀曰率西秦左輔宻貴周左衛將軍莫者羖羝宻以國為氏姓譜漢有尚書宻忠據通鑑下文則以宻貴為姓莫者夷複姓勸西秦王乾歸稱藩於光以子敕勃為質質音致光引兵還乾歸悔之殺周及羖羝羖音古羝音氐魏張衮聞燕軍將至言於魏王珪曰燕狃於滑臺長子之捷滑臺事見上十七年長子事見上年狃與忸同杜預曰忸忲也竭國之資力以來有輕我之心宜羸形以驕之乃可克也羸倫為翻珪從之悉徙部落畜産西渡河千餘里以避之燕軍至五原降魏别部三萬餘家降户江翻收穄田百餘萬斛置黑城黑城在五原河北按魏書帝紀登國五年劉衛辰遣子直力鞮出稒陽塞侵及黑城從可知矣進軍臨河水經河水自新秦中屈而南流過五原西安陽成宜宣梁臨沃稒陽等縣南造船為濟具珪遣右司馬許謙乞師於秦秃髪烏孤擊乙弗折掘等諸部皆破降之築亷川堡而都之乙弗折掘二部皆在禿髪氏之西亷川在湟中降户江翻廣武趙振少好竒畧少詩照翻好呼到翻聞烏孤在亷川棄家從之烏孤喜曰吾得趙生大事濟矣拜左司馬三河王光封烏孤為廣武郡公有長星見自須女至于哭星天文志須女四星須賤妾之稱婦職之卑者也斗牛女揚州分虛二星危三星皆主死䘮哭泣墳墓四星屬危之下主死䘮哭泣為墳墓也見賢遍翻帝心惡之於華林園舉酒祝之曰晉都建康倣洛都起華林園惡烏路翻長星勸汝一盃酒自古何有萬歳天子邪八月魏王珪治兵河南治直之翻九月進軍臨河燕太子寳列兵將濟暴風起漂其船數十艘泊南岸漂紕招翻艘蘇遭翻魏獲其甲士三百餘人皆釋而遣之寳之發中山也燕主垂已有疾既至五原珪使人邀中山之路伺其使者盡執之伺相吏翻使疏吏翻寳等數月不聞垂起居珪使所執使者臨河告之曰若父已死何不早歸寳等憂恐士卒駭動珪使陳留公䖍將五萬騎屯河東東平公儀將十萬騎屯河北河水自金城過武威天水安定北地郡界率東北流至朔方沃野縣界始屈而東南流䖍屯河東儀屯河北皆河曲之地未渡河也北史曰儀據朔方將即亮翻下同畧陽公遵將七萬騎塞燕軍之南遵壽鳩之子也壽鳩見一百四卷元年秦主興遣楊佛嵩將兵救魏燕術士靳安言於太子寳曰靳居焮翻天時不利燕必大敗速去可免寳不聽安退告人曰吾輩皆當棄尸草野不得歸矣燕魏相持積旬趙王麟將慕輿嵩等以垂為實死謀作亂奉麟為主事泄嵩等皆死寳麟等内自疑冬十月辛未燒船夜遁時河冰未結寳以魏兵必不能度不設斥候十一月己卯暴風冰合魏王珪引兵濟河留輜重重直用翻選精鋭二萬餘騎急追之燕軍至參合陂有大風黑氣如堤自軍後來臨覆軍上覆扶九翻沙門支曇猛支者曇猛之俗姓曇徒含翻言於寳曰風氣暴迅魏兵將至之候宜遣兵禦之寳以去魏軍已逺矣而不應曇猛固請不已麟怒曰以殿下神武師徒之盛足以横行沙漠索虜何敢逺來太元十八年慕容麟已知拓䟦珪之必為燕患矣今乃輕之如此豈其心自疑而欲敗寳之師邪其後寶不能守中山而麟亦不能自立同歸于亂而已矣索昔各翻而曇猛妄言驚衆當斬以狥曇猛泣曰苻氏以百萬之師敗於淮南正由恃衆輕敵不信天道故也事見一百四卷五卷七年八年司徒德勸寳從曇猛言寳乃遣麟帥騎三萬居軍後以備非常帥讀曰率騎竒寄翻下同麟以曇猛為妄縱騎遊獵不肯設備寳遣騎還詗魏兵詗古永翻又翾正翻騎行十餘里即解鞍寢魏軍晨夜兼行乙酉暮至參合陂西燕軍在陂東營於蟠羊山南水上水經註可不埿水出鴈門沃陽縣東南六十里山下西北流注沃水合流而東逕參合縣南魏王珪夜部分諸將分扶問翻掩覆燕軍士卒衘枚束馬口潛進丙戌日出魏軍登山下臨燕營燕軍將東引引而東行也顧見之士卒大驚擾亂珪縱兵擊之燕兵走赴水人馬相騰躡壓溺死者以萬數略陽公遵以兵邀其前燕兵四五萬人一時放仗斂手就禽其遺迸去者不過數千人迸北孟翻太子寳等皆單騎僅免殺燕右僕射陳留悼王紹生禽魯陽王倭奴倭烏禾翻桂林王道成濟隂公尹國等文武將吏數千人濟子禮翻兵甲糧貨以鉅萬計道成垂之弟子也魏王珪擇燕臣之有才用者代郡太守廣川賈閏閏從弟驃騎長史昌黎太守彛太史郎晁崇等留之晁直遥翻其餘欲悉給衣糧遣還以招懐中州之人中部大人王建曰燕衆彊盛今傾國而來我幸而大捷不如悉殺之則其國空虚取之為易易以䜴翻且獲冦而縱之無乃不可乎乃盡阬之十二月珪還雲中之盛樂通鑑於惠帝元康五年書定襄之盛樂故城此書雲中之盛樂葢歴代郡縣廢徙無常前漢成樂縣屬定襄後漢成樂縣屬雲中前書定襄之盛樂此前漢之故城也此書雲中之盛樂此後漢之故城也燕太子寳恥於參合之敗請更擊魏司徒德言於燕主垂曰虜以參合之捷有輕太子之心宜及陛下神略以服之不然將為後患垂乃以清河公會録留臺事領幽州刺史代高陽王隆鎮龍城以陽城王蘭汗為北中郎將代長樂公盛鎮薊樂音洛薊音計命隆盛悉引其精兵還中山期以明年大舉擊魏是歳秦主興封其叔父緒為晉王碩德為隴西王弟崇為齊公顯為常山公二十一年春正月燕高陽王隆引龍城之甲入中山軍容精整燕人之氣稍振漢人有言戰勝之威士氣百倍敗軍之卒没世不復正此之謂也休官權萬世帥衆降西秦前年乞伏乾歸稱秦王故稱西秦以别於姚秦帥讀曰率降户江翻燕主垂遣征東將軍平規發兵冀州二月規以博陵武邑長樂三郡兵反於魯口其從子冀州刺史喜諫不聽從才用翻規弟海陽令翰亦起兵於遼西以應之海陽縣自漢以來屬遼西郡平規兄弟以燕兵敗故叛之垂遣鎮東將軍餘嵩擊規嵩敗死垂自將擊規至魯口規棄衆將妻子及平喜等數十人走渡河垂引兵還翰引兵趣龍城趣七喻翻清河公會遣東陽公根等擊翰破之翰走山南白狼徐無等山之南三月庚子燕主垂留范陽王德守中山引兵宻發踰青嶺經天門青嶺葢即廣昌嶺在代郡廣昌縣南所謂五迴道也其南層崖刺天積石之峻壁立直上葢即天門也鑿山通道出魏不意直指雲中魏陳留公䖍帥部落三萬餘家鎮平城垂至獵嶺獵嶺在夏屋山東北魏都平城常獵於此以遼西王農高陽王隆為前鋒以襲之是時燕兵新敗皆畏魏惟龍城兵勇鋭爭先䖍素不設備閏月乙卯燕軍至平城䖍乃覺之帥麾下出戰敗死燕軍盡收其部落魏王珪震怖欲走諸部聞䖍死皆有貳心珪不知所適䖍勇葢代北既敗而死故諸部皆貳然天將亡燕垂繼以殞此固非人力所能為也帥讀曰率怖普布翻垂之過參合陂也見積骸如山為之設祭為于偽翻軍士皆慟哭聲震山谷垂慙憤嘔血由是發疾乘馬輿而進頓平城西北三十里太子寳等聞之皆引還燕軍叛者犇告於魏云垂已死輿尸在軍魏王珪欲追之聞平城已没乃引還隂山魏人有言死諸葛走生仲達拓䟦珪聞慕容垂之死而不敢進亦類是耳垂在平城積十日疾轉篤乃築燕昌城而還水經燕昌城在平城北四十里夏四月癸未卒於上谷之沮陽賢曰沮陽縣故城在今媯州東沮音阻垂年七十一袐不發䘮丙申至中山戊戌發䘮諡曰成武皇帝廟號世祖壬寅太子寳即位寳字道祐垂第四子也大赦改元永康五月辛亥以范陽王德為都督冀兖青徐荆豫六州諸軍事車騎大將軍冀州牧鎮鄴遼西王農為都督并雍益梁秦凉六州諸軍事并州牧鎮晉陽雍於用翻又以安定王庫傉官偉為太師傉沃奴翻夫餘王蔚為太傅餘蔚夫餘王子也燕王皝破夫餘得之燕亡入秦秦亂復歸燕燕主垂封為扶餘王甲寅以趙王麟領尚書左僕射高陽王隆領右僕射長樂公盛為司𨽻校尉宜都王鳳為冀州刺史乙卯以散騎常侍彭城劉該為徐州刺史鎮鄄城散悉亶翻騎竒寄翻鄄吉掾翻甲子以望蔡公謝琰為尚書左僕射望蔡縣屬豫章郡沈約曰漢靈帝中平中汝南上蔡民分徙此城立縣名上蔡晉武帝太康元年更名宋白曰以上蔡人思本土故曰望蔡初燕主垂先段后生子令寳後段后生子朗鑒愛諸姬子麟農隆柔熈寳初為太子有美稱稱昌孕翻名譽也已而荒怠中外失望後段后嘗言於垂曰燕主垂初娶段氏以可足渾后之讒而死後即位追尊為后復納段氏為后故史書後段后以别之太子遭承平之世足為守成之主今國步艱難恐非濟世之才遼西高陽二王陛下之賢子宜擇一人付以大業趙王麟姦詐彊愎愎弼力翻異日必為國家之患宜早圖之寳善事垂左右左右多譽之譽音余故垂以為賢謂段氏曰汝欲使我為晉獻公乎晉獻公信驪姬之䜛殺太子申生段氏泣而退告其妹范陽王妃曰太子不才天下所知吾為社稷言之為于偽翻主上乃以吾為驪姬何其苦哉觀太子必䘮社稷䘮息浪翻范陽王有非常器度若燕祚未盡其在王乎寳及麟聞而恨之乙丑寳使麟謂段氏曰后常謂主上不能守大業今竟能不不讀曰否宜早自裁以全段宗段氏怒曰汝兄弟不難逼殺其母况能守先業乎吾豈愛死但念國亡不久耳遂自殺寳議以段后謀廢適統適讀曰嫡無母后之道不宜成䘮羣臣咸以為然中書令眭邃颺言於朝曰眭息惟翻颺音揚大言而疾曰颺朝直遥翻子無廢母之義漢安帝閻后親廢順帝事見五十卷漢安帝延光三年猶得配饗太廟况先后曖昧之言虚實未可知乎乃成䘮六月癸酉魏王珪遣將軍王建等擊燕廣寗太守劉亢泥斬之廣寗縣漢屬上谷郡晉太康中分置廣寗郡亢苦浪翻徙其部落於平城燕上谷太守開封公詳棄郡走詳皝之曾孫也丁亥魏賀太妃卒魏王珪之母也燕主寳定士族舊籍分辨清濁校閲戸口罷軍營封䕃之户悉屬郡縣軍營封䕃之户葢諸軍庇占以為部曲者由是士民嗟怨始有離心斯事行之未必非也但慕容寳即位之初國師新敗又遭大䘮下之懐反側者多未可遽行耳大學曰物有本末事有終始知所先後則近道矣三河王吕光即天王位國號大凉大赦改元龍飛吕光字世明畧陽氏也父婆樓為苻堅佐命備置百官以世子紹為太子封子弟為公侯者二十人以中書令王詳為尚書左僕射著作郎段業等五人為尚書光遣使者拜秃髪烏孤為征南大將軍益州牧左賢王烏孤謂使者曰吕王諸子貪淫光諸子見於史者纂𢎞紹覆三甥暴虐光甥石聰譛殺杜進餘二人當攷逺近愁苦吾安可違百姓之心受不義之爵乎吾當為帝王之事耳乃留其鼓吹羽儀吹昌瑞翻謝而遣之平規収合餘黨據髙唐髙唐縣自漢以來屬平原郡燕主寳遣高陽王隆將兵討之將即亮翻東土之民素懐隆惠迎候者屬路相屬於路也屬之欲翻秋七月隆進軍臨河規棄髙唐走隆遣建威將軍慕容進等濟河追之斬規於濟北於濟子禮翻平喜犇彭城納故中書令王獻之女為太子妃獻之羲之之子也羲之王導之從子魏羣臣勸魏王珪稱尊號珪始建天子旌旗出警入蹕改元皇始珪什翼犍之嫡孫寔之子詳見一百四卷元年自苻堅淮淝之敗至是十有四年矣闗河之間戎狄之長更興迭作晉人視之漠然不闗乎其心拓䟦珪興而南北之形定矣南北之形既定卒之南為北所并嗚呼自隋以後名稱揚于時者代北之子孫十居六七矣氏族之辨果何益哉參軍事上谷張恂勸珪進取中原珪善之燕遼西王農悉將部曲數萬口之并州將即亮翻之徃也并州素乏儲㣥㣥文里翻是歳早霜民不能供其食又遣諸部䕶軍分監諸胡監工銜翻由是民夷俱怨潜召魏軍八月己亥魏王珪大舉伐燕兵無内應與必勝之計不可大舉步騎四十餘萬南出馬邑踰句注句音鉤旌旗二千餘里鼓行而進左將軍鴈門李栗將五萬騎為前驅别遣將軍封真等從東道出軍都襲燕幽州魏書官氏志拓䟦詰汾時餘部諸姓内入者有是賁氏後改為封氏軍都縣前漢屬上谷郡後漢屬廣陽郡晉屬燕國有軍都闗賢曰今幽州昌平縣有軍都山在西北燕征北大將軍幽平二州牧清河公會母賤而年長長知兩翻雄俊有器藝燕主垂愛之寳之伐魏也垂命會攝東宫事摠錄禮遇一如太子總錄謂總錄朝政也及垂伐魏命會鎮龍城委以東北之任國官府佐皆選一時才望垂疾篤遺言命寳以會為嗣而寳愛少子濮陽公策意不在會長樂公盛與㑹同年恥為之下少詩沼翻濮博木翻樂音洛乃與趙王麟共勸寳立策寳從之乙亥立妃段氏為皇后策為皇太子會盛皆進爵為王策年十一素憃弱憃與戇同陟降翻愚也會聞之心愠懟愠於問翻懟直類翻九月章武王宙奉燕主垂及成哀段后之䘮葬于龍城宣平陵成哀后即寶所殺後母段氏也寳詔宙悉徙高陽王隆參佐部曲家屬還中山隆去年自龍城還中山會實代之故令遣還其部曲參佐會違詔多留部曲不遣宙年長屬尊長知兩翻會每事陵侮之見者皆知其有異志為寳㑹父子相圖張本戊午魏軍至陽曲陽曲縣自漢以來屬太原郡宋白曰陽曲縣故城在太原郡北四十五里後漢末所移也隋文帝改為陽直尋又改為汾陽縣乘西山臨晉陽遣騎環城大譟而去騎竒寄翻環音宦燕遼西王農出戰大敗犇還晉陽司馬慕輿嵩閉門拒之前有慕輿嵩以謀奉趙王麟為變而誅此又一人農將妻子帥數千騎東走魏中領將軍長孫肥追之中領將軍魏所置猶魏晉之中領軍也帥讀曰率及於潞川獲農妻子燕軍盡没農被創獨與三騎逃歸中山被皮義翻創初良翻魏王珪遂取并州初建臺省置刺史太守尚書郎以下官悉用儒生為之士大夫詣軍門無少長皆引入存慰使人人盡言少詩照翻長知兩翻少有才用咸加擢叙史言拓䟦珪所以能取中原少詩沼翻己未遣輔國將軍奚收畧地汾川奚收當作奚牧獲燕丹楊王買德及離石䕶軍高秀和離石縣自漢以來屬西河郡燕置䕶軍以統稽胡以中書侍郎張恂等為諸郡太守招撫離散勸課農桑燕主寳聞魏軍將至議于東堂中山尹苻謨曰今魏軍衆彊千里逺鬭乘勝氣鋭若縱之使入平土不可敵也宜杜險以拒之苻謨見燕見一百六卷十一年中書令眭邃曰魏多騎兵往來剽速剽匹妙翻馬上齎糧不過旬日宜令郡縣聚民千家為一堡深溝高壘清野以待之彼至無所掠不過六旬食盡自退尚書封懿曰今魏兵數十萬天下之勍敵也勍渠京翻民雖築堡不足以自固是聚兵及粮以資之也且動揺民心示之以弱不如阻闗拒戰計之上也趙王麟曰魏今乘勝氣鋭其鋒不可當宜完守中山待其弊而乘之於是修城積粟為持久之備不據險拒戰而嬰城自守此慕容寶所以敗也命遼西王農出屯安喜安喜前漢之安險縣也後漢章帝改曰安喜屬中山郡軍事動靜悉以委麟為麟叛張本帝嗜酒流連内殿醒治既少言昏醉之時多醒而治事之時少也外人罕得進見見賢遍翻張貴人寵冠後宫冠古玩翻後宫皆畏之庚申帝與後宫宴妓樂盡侍妓渠綺翻時貴人年近三十帝戲之曰汝以年亦當廢矣吾意更屬少者近其靳翻屬之欲翻少詩照翻貴人潜怒向夕帝醉寢於清暑殿清暑殿帝所作貴人徧飲宦者酒散遣之使婢以被蒙帝面弑之重賂左右云因魘暴崩飲於鴆翻魘于琰翻廣韻曰睡中魘毛晃曰氣窒心懼而神亂則魘時太子闇弱會稽王道子昏荒㑹工外翻遂不復推問復扶又翻下同王國寳夜叩禁門欲入為遺詔侍中王爽拒之曰大行晏駕皇太子未至敢入者斬國寳乃止爽恭之弟也辛酉太子即皇帝位大赦癸亥有司奏會稽王道子宜進位太傅揚州牧假黄鉞詔内外衆事動靜咨之安帝幼而不慧杜預曰不慧世所謂白癡口不能言至于寒暑飢飽亦不能辨飲食寢興皆非已出母弟琅邪王德文性㳟謹常侍左右為之節適始得其宜節適謂事為之節以適其口體為于偽翻初王國寳黨附會稽王道子王國寳黨附道子事始一百五卷八年驕縱不法屢為御史中丞褚粲所糾國寳起齋侔清暑殿孝武帝甚惡之惡烏路翻國寳懼遂更求媚於帝而踈道子帝復寵昵之昵尼質翻道子大怒嘗於内省面責國寳以劔擲之舊好盡矣好呼到翻及帝崩國寳復事道子與王緒共為邪謟道子更惑之倚為心腹遂參管朝權威震内外並為時之所疾王㳟入赴山陵每正色直言道子深憚之㳟罷朝歎曰榱棟雖新朝直遥翻下同榱所追翻秦曰屋椽齊魯曰桷周曰榱便有黍離之歎周大夫行役過故宗廟宫室盡為禾黍故作黍離之詩緒説國寳説輸芮翻因㳟入朝勸相王伏兵殺之國寳不許道子欲輯和内外乃深布腹心於㳟冀除舊惡而㳟每言及時政輒厲聲色道子知㳟不可和恊遂有相圖之志或勸㳟因入朝以兵誅國寳㳟以豫州刺史庾楷士馬甚盛黨於國寳憚之不敢發王珣謂㳟曰國寳雖終為禍亂要之罪逆未彰今遽先事而發必大失朝野之望况擁彊兵竊發於京輦誰謂非逆國寳若遂不改惡布天下然後順衆心以除之亦無憂不濟也㳟乃止既而謂珣曰比來視君一似胡廣謂依違於權姦之間以保禄位比毗至翻近也珣曰王陵廷爭陳平慎黙但問歳晏何如耳謂王陵以廷爭失位陳平以慎黙終能安劉爭讀曰諍冬十月甲申葬孝武帝于隆平陵王㳟還鎮將行謂道子曰主上諒闇闇讀如隂冢宰之任伊周所難願大王親萬幾納直言放鄭聲逺佞人幾與機同逺於願翻國寳等愈懼魏王珪使冠軍將軍代人于栗磾魏書官氏志拓䟦詰汾時餘部諸姓内入者有勿忸於氏後改為于氏冠古玩翻磾丁奚翻寧朔將軍公孫蘭帥步騎二萬潜自晉陽開韓信故道韓信自井陘伐趙之故路也帥讀曰率騎竒寄翻己酉珪自井陘趨中山李先降魏去年李先自西燕歸燕趨七喻翻降戸江翻珪以為征東左長史西秦凉州牧軻彈與秦州牧益州不平軻彈犇凉魏王珪進攻常山㧞之獲太守茍延自常山以東守宰或走或降諸郡縣皆附於魏惟中山鄴信都三城為燕守中山燕都慕容德守鄴慕容鳳守信都皆重鎮也為于偽翻十一月珪命東平公儀將五萬騎攻鄴冠軍將軍王建左將軍李栗攻信都戊午珪進軍中山己未攻之燕高陽王隆守南郭帥衆力戰自旦至晡殺傷數千人魏兵乃退珪謂諸將曰中山城固寳必不肯出戰急攻則傷士久圍則費粮不如先取鄴信都然後圖之丁卯珪引兵而南章武王宙自龍城還聞有魏冦馳入薊與鎮北將軍陽城王蘭乘城固守蘭垂之從弟也從才用翻魏别將石河頭攻之不克魏書官氏志拓䟦詰汾時餘部諸姓内入者有嗢石蘭氏後為石氏退屯漁陽漁陽縣漢屬漁陽郡晉省珪軍于魯口博陵太守申永犇河南高陽太守崔宏犇海渚海渚海中州也珪素聞宏名遣騎追求獲之以為黄門侍郎與給事黄門侍郎張衮對掌機要創立制度為崔宏父子貴顯於魏張本博陵令屈遵降魏屈居勿翻降戸江翻珪以為中書令出納號令兼總文誥燕范陽王德使南安王青等夜擊魏軍於鄴下破之魏軍退屯新城新城即燕主垂攻鄴所築者也青等請追擊之别駕韓􅒲曰􅒲音卓古人先計而後戰魏軍不可擊者四懸軍逺客利在野戰一也深入近畿頓兵死地二也前鋒既敗後陣方固三也彼衆我寡四也官軍不宜動者三自戰其地一也自戰其地者衆易敗散動而不勝衆心難固二也城隍未修敵來無備三也今魏無資糧不如深壘固軍以老之德從之召青還青詳之兄也十二月魏遼西公賀頼盧帥騎二萬會東平公儀攻鄴頼盧訥之弟也為賀頼盧降慕容德張本按魏書官氏志内入諸姓有賀頼氏北方有賀蘭氏後皆為賀氏葢内入者為賀頼氏留北方者為賀蘭氏蘭頼語轉耳又匈奴諸種亦有賀頼氏魏别部大人没根有膽勇魏王珪惡之惡烏路翻没根懼誅己丑將親兵數十人降燕燕主寳以為鎮東大將軍封鴈門公没根求還襲魏寳難與重兵給百餘騎没根效其號令夜入魏營至中仗珪乃覺之狼狽驚走没根以所從人少不能壊其大衆多獲首虜而還史言慕容寶不能因降人為問以破魏少詩沼翻壊音怪楊盛遣使來請命詔拜盛鎮南將軍仇池公盛表苻宣為平北將軍是歳越質詰歸帥户二萬叛西秦降于秦越質詰歸降西秦見上卷十六年帥讀曰率下同秦人處之成紀成紀縣自漢以來屬天水郡處昌吕翻拜鎮西將軍平襄公秦隴西王碩德攻姜乳於上邽乳率衆降秦以碩德為秦州牧鎮上邽徵乳為尚書彊熈權千成帥衆三萬共圍上邽碩德擊破之熈犇仇池遂來犇碩德西擊千成於畧陽千成降西燕既亡其所署河東太守柳㳟等各擁兵自守秦主興遣晉王緒攻之㳟等臨河拒守緒不得濟初永嘉之亂汾隂薛氏聚其族黨阻河自固不仕劉石及苻氏興乃以禮聘薛彊拜鎮東將軍彊引秦兵自龍門濟魏土地記曰梁山北有龍門山大禹所鑿通孟津河口廣八十步巖際鐫迹遺功尚存梁山在馮翊夏陽縣西北遂入蒲阪㳟等皆降興以緒為并冀二州牧鎮蒲阪資治通鑑卷一百八
