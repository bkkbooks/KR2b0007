嶂山已行數千諸將議欲息兵道宗固請追討李靖然之而君集不從道宗遂帥偏師并行兼道去大軍十日追及之賊據險苦戰道宗潛遣千餘騎踰山襲其後賊表裏受敵一時奔潰庫山嶂山不知其所以為同異據嶂山已行數千里今不取今即以為庫山之戰也吐谷渾可汗伏允悉燒野草輕兵走入磧磧七迹翻諸將以為馬無草疲瘦未可深入侯君集曰不然曏者段志𤣥軍還纔及鄯州虜已至其城下蓋虜猶完實衆為之用故也今一敗之後䑕逃鳥散斥候亦絶君臣攜離父子相失取之易於拾芥易以䜴翻此而不乘後必悔之李靖從之之考異曰舊道宗傳云道宗固請追討李靖然而君集不從靖傳云軍次伏俟城吐谷渾燒去野草以餒我師退保大非川諸將咸言春草未生馬已羸瘦不可赴敵唯靖決計而進深入敵境遂踰積石山按實錄庫山之捷可汗謀將入磧以避官軍道宗復曰柏海近河源古來罕有至者賊既西走未知的處今段之行實資馬力今馬疲糧少逺入為難未若且向鄯州待馬肥之後更圖進取君集曰不然段志𤣥曩者纔至鄯州賊衆便到城下良由彼國尚完兇徒阻命今者一敗以後斥候亦絶君臣相失父子攜離乘其迫懼取同俯拾柏海雖遥便可鼓行而至也靖又然之道宗傳與實錄相違今從實錄中分其軍為兩道靖與薛萬均李大亮由北道君集與任城王道宗由南道戊子靖部將薛孤兒敗吐谷渾於曼頭山斬其名王大獲雜畜以充軍食畜許救翻癸巳靖等敗吐谷渾於牛心堆水經注湟水自臨羌縣東流合龍駒川水又東合晉昌川水又東合長寧川水又東合牛心川水水出西南逺山東北流逕牛心堆又東逕西平亭西東北入於湟水又敗諸赤水源異考曰實錄癸巳李靖侯君集任城王道宗等破吐谷渾於赤水源按本文自庫山中分士馬為兩道靖趣北路出曼頭山踰赤水君集道宗趣南路歴破邏真谷然則赤水之戰君集道宗不在彼也今刪去其名又吐谷渾傳獲其髙昌王慕容孝儁不知在何戰今亦刪去侯君集任城王道宗引兵行無人之境二千餘里盛夏降霜經破邏真谷其地無水人齕冰馬噉雪邏郎佐翻齕下没翻又戸結翻五月追及伏允於烏海隋志河源郡有烏海在漢哭山西與戰大破之獲其名王薛萬均薛萬徹又敗天柱王於赤海赤海蓋即赤水深廣處苾考異曰舊萬徹傳作赤水源契何力傳作赤水川今從實錄上皇自去秋得風疾庚子崩於垂拱殿舊書帝紀崩於大安宫之垂拱前殿年七十甲辰羣臣請上準遺誥視軍國大事上不許乙巳詔太子承乾於東宫平決庶政赤水之戰薛萬均薛萬徹輕騎先進為吐谷渾所圍兄弟皆中槍騎竒寄翻下同中竹仲翻失馬步鬭從騎死者什六七左領軍將軍契苾何力將數百騎救之竭力奮擊所向披靡萬均萬徹由是得免從才用翻披丕彼翻李大亮敗吐谷渾於蜀渾山山在赤海西獲其名王二十人將軍執失思力敗吐谷渾於居茹川李靖督諸軍經積石山河源至且末窮其西境聞伏允在突倫川圖考異曰吐谷渾傳云伏允西走倫磧蓋即突倫川虜語轉耳今從契苾何力傳將奔于闐契苾何力欲追襲之薛萬均懲其前敗固言不可何力曰虜非有城郭隨水草遷徙若不因其聚居襲取之一朝雲散豈得復傾其巢穴邪復扶又翻自選驍騎千餘直趣突倫川萬均乃引兵從之驍堅堯翻趣七喻翻百考異曰吐谷渾傳云萬均率輕銳追奔入磧數里及其餘黨破之蓋何力先進而萬均從之也磧中乏水將士刺馬血飲之刺七亦翻襲破伏允牙帳斬首數千級獲雜畜二十餘萬伏允脫身走俘其妻子侯君集等進逾星宿川至柏海還與李靖軍合畜許救翻宿音秀柏考異曰吐谷渾傳海作柏梁今從實錄實錄及吐谷渾傳皆云君集與李靖㑹於大非川按十道圖大非川在青海南烏海星宿海柏海並在其西且末又在其西極逺據靖已至且末又過烏海星宿川至柏海豈得復㑹於大非川於事可疑故不敢著其地吐谷渾傳又云兩軍㑹於大非川至破邏真谷大寧王順乃降按實錄歴破邏真谷又行月餘日乃至星宿川然則破邏真谷在星宿川東甚逺矣豈得返至其處邪今從實錄大寧王順隋氏之甥伏允之嫡子也為侍中於隋久不得歸伏允立侍子為太子及歸意常怏怏順歸見一百八十七卷髙祖武德二年怏於兩翻㑹李靖破其國國人窮蹙怨天柱王順因衆心斬天柱王舉國請降伏允帥千餘騎逃磧中十餘日衆散稍盡為左右所殺降戸江翻帥讀曰率今考異曰吐谷渾傳云自縊而死從實錄國人立順為可汗壬子李靖奏平吐谷渾乙卯詔復其國以慕容順為西平郡王趉故吕烏甘豆可汗趉渠詘翻又九勿翻杜佑巨屈翻上慮順未能服其衆仍命李大亮將精兵數千為其聲援六月己丑羣臣復請聽政上許之其細務仍委太子太子頗能聽斷是後上每出行幸常令居守監國復扶又翻斷丁亂翻守手又翻監工銜翻秋七月庚子鹽澤道行軍副總管劉德敏擊叛羌破之丁巳詔山陵依漢長陵故事長陵漢髙祖陵也皇甫謐曰長陵東西廣百二十步髙十三丈房𤣥齡云髙九丈蓋尺度之長短有古今之異也務存隆厚期限既促功不能及祕書監虞世南上疏以為聖人薄葬其親非不孝也深思逺慮以厚葬適足為親之累上時掌翻累力瑞翻故不為耳昔張釋之有言使其中有可欲雖錮南山猶有隙見十四卷漢文帝三年劉向言死者無終極而國家有廢興釋之之言為無窮計也見三十一卷漢成帝永始元年其言深切誠合至理伏惟陛下聖德度越唐虞而厚葬其親乃以秦漢為法臣竊為陛下不取雖復不藏金玉為于偽翻復扶又翻下同後世但見丘壟如此其大安知無金玉邪且今釋服已依霸陵用漢文帝遺詔三十六日釋服也而丘壟之制獨依長陵恐非所宜伏願依白虎通班固等述白虎通義六卷為三仞之墳器物制度率皆節損仍刻石立之陵旁别書一通藏之宗廟用為子孫永久之灋疏奏不報世南復上疏以為漢天子即位即營山陵逺者五十餘年今以數月之間為數十年之功恐於人力有所不逮上乃以世南疏授有司令詳處其宜復扶又翻處昌吕翻房𤣥齡等議以為漢長陵髙九丈原陵髙六丈原陵漢光武陵也髙去聲今九丈則太崇三仭則太卑請依原陵之制從之辛亥詔國初草創宗廟之制未備今將遷祔宜令禮官詳議諫議大夫朱子奢請立三昭三穆而虚太祖之位昭時招翻於是增修太廟祔𢎞農府君及髙祖并舊神主四為六室𢎞農府君諱重耳房𤣥齡等議以涼武昭王為始祖涼王李暠諡武昭左庶子于志寧議以為武昭王非王業所因不可為始祖上從之党項寇疊州李靖之擊吐谷渾也厚賂党項使為鄉導鄉讀曰嚮党項酋長拓跋赤辭來謂諸將曰隋人無信喜暴掠我喜許記翻今諸軍茍無異心我請供其資糧如或不然我將據險以塞諸軍之道塞悉則翻諸將與之盟而遣之赤水道行軍總管李道彦行至闊水闊水在党項羈縻闊州界見赤辭無備襲之獲牛羊數千頭於是羣羌怨怒屯野狐峽道彦不得進赤辭擊之道彦大敗死者數萬退保松州左驍衞將軍樊興逗遛失軍期遛音留士卒失亡多乙卯道彦興皆坐減死徙邊上遣使勞諸將於大斗拔谷勞力到翻薛萬均排毁契苾何力自稱已功何力不勝忿勝音升拔刀起欲殺萬均諸將救止之上聞之以讓何力何力具言其狀具言赤水之戰拔萬均兄弟於圍中及見排毁之狀也上怒欲解萬均官以授何力何力固辭曰陛下以臣之故解萬均官羣胡無知以陛下為重胡輕漢轉相誣告馳競必多且使胡人謂諸將皆如萬均將有輕漢之心上善之而止尋令宿衞北門檢校屯營事北門𤣥武門也按㑹要貞觀十二年於𤣥武門置左右屯營以諸衞將軍領之其兵名曰飛騎何力檢校屯營蓋十二年以後事史究言之尚宗女臨洮縣主洮土刀翻岷州都督鹽澤道行軍總管髙甑生後軍期李靖按之甑生恨靖誣告靖謀反按驗無狀八月庚辰甑生坐減死徙邊或言甑生秦府功臣寛其罪上曰甑生違李靖節度又誣其反此而可寛法將安施且國家自起晉陽功臣多矣若甑生獲免則人人犯法安可復禁乎復扶又翻我於舊勲未嘗忘也為此不敢赦耳為于偽翻李靖自是闔門杜絶賓客雖親戚不得妄見也以李靖事太宗然猶如此豈非功名之際難居哉上欲自詣園陵園陵謂獻陵羣臣以上哀毁羸瘠固諫而止羸倫為翻瘠而尺翻冬十月乙亥處月初遣使入貢處月處密皆西突厥之别部也庚寅葬太武皇帝於獻陵獻陵在京兆三原縣東之十八里廟號髙祖以穆皇后祔葬太穆皇后竇氏初葬夀安陵今祔獻陵加號太穆皇后十一月庚戌詔議於太原立髙祖廟祕書監顔師古議以為寢廟應在京師漢世郡國立廟非禮乃止戊午以光祿大夫蕭瑀為特進復令參預政事蕭瑀罷預聞朝政見上卷貞觀四年復扶又翻上曰武德六年以後髙祖有廢立之心而未定我不為兄弟所容實有功髙不賞之懼斯人也不可以利誘不可以死脅真社稷臣也誘音酉因賜瑀詩曰疾風知勁草板蕩識誠臣又謂瑀曰卿之忠直古人不過然善惡太明亦有時而失瑀再拜謝魏徵曰瑀違衆孤立唯陛下知其忠勁曏不遇聖明求免難矣特進李靖唐六典正二品曰特進注曰二漢及魏以為加官從本官服無吏卒品第二位次諸公在開府驃騎上江左皆兼官梁班第十七北齊特進第二品隋特進為正二品散官唐因之上書請依遺誥御常服臨正殿弗許上時掌翻吐谷渾甘豆可汗久質中國質音致國人不附竟為其下所殺子燕王諾曷鉢立諾曷鉢幼大臣爭權國中大亂十二月詔兵部尚書侯君集等將兵援之先遣使者諭解將即亮翻使疏吏翻有不奉詔者隨宜討之十年春正月甲午上始親聽政辛丑以突厥拓設阿史那社爾為左驍衞大將軍驍堅堯翻社爾處羅可汗之子也年十一以智略聞可汗以為拓設建牙於磧北與欲谷設分統敕勒諸部居官十年未嘗有所賦斂斂力贍翻諸設或鄙其不能為富貴社爾曰部落茍豐於我足矣諸設慙服突厥謂子弟典兵者為設與社爾同時典兵者非一人故曰諸設及薛延陁叛攻破欲谷設事見一百九十二卷元年社爾兵亦敗將其餘衆走保西陲將即亮翻頡利可汗既亡見上卷四年西突厥亦亂咄陸可汗兄弟爭國事見同上社爾詐往降之引兵襲破西突厥取其地幾半降戸江翻幾居希翻有衆十餘萬自稱答布可汗社爾乃謂諸部曰首為亂破我國者薛延陁也我當為先可汗報仇擊滅之為于偽翻諸部皆諫曰新得西方宜且留鎮撫今遽捨之逺去西突厥必來取其故地社爾不從擊薛延陁於磧北連兵百餘日㑹咥利失可汗立見上八年社爾之衆苦於人役多棄社爾逃歸逃歸咥利失薛延陀縱兵擊之社爾大敗走保髙昌其舊兵在者纔萬餘家又畏西突厥之逼遂帥衆來降帥讀曰率降戸江翻敕處其部落於靈州之北處昌吕翻留社爾於長安尚皇妹南陽長公主新舊書皆作衡陽長公主陽長如兩翻典屯兵於苑内癸丑徙趙王元景為荆王魯王元昌為漢王鄭王元禮為徐王徐王元嘉為韓王荆王元則為彭王滕王元懿為鄭王吳王元軌為霍王豳王元鳳為虢王陳王元慶為道王魏王靈虁為燕王自此以上皆皇弟也蜀王恪為吳王越王泰為魏王燕王佑為齊王梁王愔為蜀王郯王惲為蔣王漢王貞為越王申王慎為紀王自恪以下皇子也燕因肩翻愔於今翻郯音談惲於粉翻二月乙丑以元景為荆州都督元昌為梁州都督元禮為徐州都督元嘉為潞州都督元則為遂州都督靈蘷為幽州都督恪為潭州都督泰為相州都督佑為齊州都督愔為益州都督惲為安州都督貞為揚州都督泰不之官以金紫光祿大夫張亮行都督事唐制凡注官階卑而擬髙者則曰守階髙而擬卑則曰行今張亮行都督事乃用宋齊諸王典方面置行事之例與注官之行不同上以泰好文學好呼到翻禮接士大夫特命於其府别置文學館聽自引召學士為泰圖東宫張本三月丁酉吐谷渾王諾曷鉢遣使請頒厯行年號遣子弟入侍並從之使疏吏翻丁未以諾曷鉢為河源郡王烏地也拔勤豆可汗癸丑諸王之藩上與之别曰兄弟之情豈不欲常共處邪但以天下之重不得不爾諸子尚可復有兄弟不可復得處昌吕翻復扶又翻因流涕嗚咽不能止上之流涕嗚咽者抑思建成元吉之事乎夏六月壬申以温彦博為右僕射太常卿楊師道為侍中侍中魏徵屢以目疾求為散官散悉亶翻上不得已以徵為特進仍知門下事雖不居侍中之職猶令知門下事朝章國典參議得失朝直遥翻徒流以上罪詳事聞奏其祿賜吏卒並同職事特進散官也祿賜吏卒同職事官所以優賢也長孫皇后性仁孝儉素好讀書常與上從容商畧言事好呼到翻從千容翻因而獻替裨益𢎞多上或以非罪譴怒宫人后亦陽怒請自推鞫因命囚繫候上怒息徐為申理由是宫壼之中刑無枉濫豫章公主早喪其母后収養之慈愛逾於所生豫章公主上女也後下嫁唐儀識為于偽翻壼苦本翻喪息浪翻妃嬪以下有疾后親撫視輟己之藥膳以資之宫中無不愛戴訓諸子常以謙儉為先太子乳母遂安夫人唐制太子乳母封郡夫人睦州遂安郡嘗白后以東宫器用少請奏益之少詩沼翻后不許曰為太子患在德不立名不揚何患無器用邪上得疾累年不愈后侍奉晝夜不離側離力智翻常繫毒藥於衣帶曰若有不諱義不獨生后素有氣疾前年從上幸九成宫柴紹等中夕告變上擐甲出閣問狀后扶疾以從擐音宦從才用翻左右止之后曰上既震驚吾何心自安由是疾遂甚太子言於后曰醫藥備盡而疾不瘳瘳丑留翻請奏赦罪人及度人入道庶獲㝠福后曰死生有命非智力所移若為善有福則吾不為惡如其不然妄求何益赦者國之大事不可數下數所角翻道釋異端之教蠧國病民皆上素所不為奈何以吾一婦人使上為所不為乎必行汝言吾不如速死太子不敢奏私以語房𤣥齡語牛倨翻𤣥齡白上上哀之欲為之赦為于偽翻后固止之及疾篤與上訣時房𤣥齡以譴歸第后言於帝曰𤣥齡事陛下久小心慎密竒謀祕計未嘗宣泄茍無大故願勿棄之妾之本宗因緣葭莩以致祿位漢書曰非有葭莩之親張晏曰葭蘆葉也莩葉裏白皮也晉灼曰莩葭裏之白皮也皆取喻於輕薄也師古曰葭蘆也莩者其筩中白皮至薄者也葭莩喻薄莩音孚張言葉裏白皮非也既非德舉易致顛危欲使其子孫保全慎勿處之權要但以外戚奉朝請足矣以無忌之賢不能自保則后之所慮為深逺矣易以豉翻處昌吕翻朝直遥翻妾生無益於人不可以死害人用記檀弓成子髙語意願勿以丘壟勞費天下但因山為墳器用瓦木而已仍願陛下親君子逺小人納忠諫屏讒慝省作役止遊畋逺于願翻屛必郢翻妾雖没於九泉誠無所恨兒女輩不必令來見其悲哀徒亂人意因取衣中毒藥以視上曰妾於陛下不豫之日誓以死從乘輿不能當吕后之地耳吕后事見漢紀乘繩證翻己卯崩于立政殿閣本太極宫圖東上閣門之東有萬春殿萬春殿之東有立政殿唐六典太極殿之北有兩儀殿兩儀殿之東曰萬春殿兩儀之左曰獻春門獻春門之左曰立政門其内曰立政殿后嘗采自古婦人得失事為女則三十卷又嘗著論駮漢明德馬后以不能抑退外親使當朝貴盛徒戒其車如流水馬如龍見四十六卷漢章帝建初二年駮北角翻朝直遥翻是開其禍敗之源而防其末流也及崩宫司并女則奏之唐内職有宫正糾􅄽彤史記功書過六典尚儀局有司籍二人掌經史教學奏女則者蓋司籍也上覽之悲慟以示近臣曰皇后此書足以垂範百世朕非不知天命而為無益之悲但入宫不復聞規諫之言復扶又翻下今復同失一良佐故不能忘懷耳乃召房𤣥齡使復其位秋八月丙子上謂羣臣曰朕開直言之路以利國也而比來上封事者多訐人細事比毗至翻上時掌翻訐居謁翻自今復有為是者朕當以讒人罪之冬十一月庚午葬文德皇后於昭陵昭陵在京兆醴泉縣西北六十里將軍段志𤣥宇文士及分統士衆出肅章門唐六典曰西内太極殿次北曰朱明門門之左曰䖍化門右曰肅章門肅章之西曰揮政門又曰兩儀殿蓋古之内朝也承天之門東曰長樂門北入恭禮門又北入䖍化門則宫内也承天門之西曰永安門北入安仁門又北入肅章門則宫内也帝夜使宫官至二人所士及開營内之志𤣥閉門不納曰軍門不可夜開使者曰此有手敕志𤣥曰夜中不辨真偽竟留使者至明帝聞而歎曰真將軍也帝復為文刻之石使疏吏翻復扶又翻下復何亦復同稱皇后節儉遺言薄葬以為盜賊之心止求珍貨既無珍貨復何所求朕之本志亦復如此王者以天下為家何必物在陵中乃為己有今因九嵕山為陵嵕祖紅翻鑿石之工纔百餘人數十日而畢不藏金玉人馬器皿皆用土木形具而已庶幾姦盜息心存没無累幾居希翻累力瑞翻當使百世子孫奉以為法上念后不已於苑中作層觀觀古玩翻以望昭陵嘗引魏徵同登使視之徵熟視之曰臣昏眊不能見眊莫報翻上指示之徵曰臣以為陛下望獻陵若昭陵則臣固見之矣上泣為之毁觀為于偽翻十二月戊寅朱俱波甘棠遣使入貢朱俱波在葱嶺之北去𤓰州二千八百里甘棠在大海南朱俱波亦曰朱俱槃漢子合國也甘棠在西海之南崑崙人也二國皆在西域使疏吏翻上曰中國既安四夷自服然朕不能無懼昔秦始皇威振胡越二世而亡唯諸公匡其不逮耳魏王泰有寵於上或言三品以上多輕魏王上怒引三品以上作色讓之曰隋文帝時一品以下皆為諸王所顛躓躓音致彼豈非天子兒邪邪音耶朕但不聽諸子縱横耳縱如字又子容翻横戸孟翻又如字聞三品以上皆輕之我若縱之豈不能折辱公輩乎折之舌翻房𤣥齡等皆惶懼流汗拜謝魏徵獨正色曰臣竊計當今羣臣必無敢輕魏王者在禮臣子一也春秋王人雖微序於諸侯之上春秋僖七年公㑹王人齊侯宋公衞侯許男曹伯陳世子款鄭世子華盟於洮公羊傳曰王人者何微者也曷為序乎諸侯之上先王命也三品以上皆公卿陛下所尊禮若紀綱大壞固所不論聖明在上魏王必無頓辱羣臣之理隋文帝驕其諸子使多行無禮卒皆夷滅又足法乎卒子恤翻上悅曰理到之語不得不服朕以私愛忘公義曏者之忿自謂不疑及聞徵言方知理屈人主發言何得容易乎易以豉翻上曰灋令不可數變數變則煩官長不能盡記數所角翻長知兩翻又前後差違吏得以為姦自今變灋皆宜詳慎而行之治書侍御史權萬紀上言宣饒二州銀大發采之歲可得數百萬緡治直之翻宋白曰饒州漢為鄱陽縣呉置鄱陽郡梁置吳州陳廢州復為郡隋平陳罷郡為饒州徐湛鄱陽記云北有堯山又以地饒衍遂加食為饒今郡圖又云以山川藴物珍竒故名饒上曰朕貴為天子所乏者非財也但恨無嘉言可以利民耳與其多得數百萬緡何如得一賢才卿未嘗進一賢退一不肖而專言稅銀之利昔堯舜抵璧於山投珠於谷陸賈新語曰聖人不用珠玉而寶其身故舜棄黄金於巉巖之山捐珠玉於五湖之川以杜淫邪之欲也漢之桓靈乃聚錢為私藏事見五十七卷漢靈帝光和元年藏徂浪翻卿欲以桓靈俟我邪邪音耶是日黜萬紀使還家是嵗更命統軍為折衝都尉别將為果毅都尉唐制上府折衝都尉正四品上中府正四品下下府正五品下上府果毅都尉從五品下中府正六品上下府從六品下更工衡翻將即亮翻凡十道置府六百三十四而關内二百六十一皆𨽻諸衞及東宫六率東宫六率者左右衞率擬上臺左右衞將軍左右宗衞率擬左右領軍將軍左右監門率擬左右監門將軍後又置左右虞候率擬左右金吾將軍左右内率擬左右千牛將軍通謂之十率凡上府兵千二百人中府千人下府八百人三百人為團團有校尉校戸教翻五十人為隊隊有正十人為火火有長長知兩翻毎人兵甲糧裝各有數皆自備輸之庫有征行則給之年二十為兵六十而免其能騎射者為越騎越騎者言其勁勇能超越也騎竒寄翻其餘為步兵每歲季冬折衝都尉帥其屬教戰帥讀曰率當給馬者官予其直市之予讀曰與凡當宿衞者畨上兵部以逺近給畨逺疎近數皆二月而更時制五百里為五畨千里七畨一千五百里八畨二千里十畨外為十二畨若簡留宿衞者五百里為七畨千里八畨二千里十畨外為十二畨上時掌翻數所角翻更工衡翻十一年春正月徙鄶王元裕為鄧王鄶工外翻譙王元名為舒王辛卯以吳王恪為安州都督晉王治為并州都督紀王慎為秦州都督將之官上賜書戒敕曰吾欲遺汝珍玩恐益驕奢遺于季翻不如得此一言耳上作飛山宫觀明年廢明德宫及飛山宮之𤣥圃院以給洛人之遭水壊廬舍者則知飛山宮亦在洛陽庚子特進魏徵上疏上時掌翻以為煬帝恃其富彊不虞後患窮奢極欲使百姓困窮以至身死人手社稷為墟陛下撥亂返正宜思隋之所以失我之所以得撤其峻宇安於卑宮若因基而增廣襲舊而加飾此則以亂易亂殃咎必至難得易失可不念哉易以䜴翻房𤣥齡等先受詔定律令先悉薦翻以為舊法兄弟異居蔭不相及而謀反連坐皆死祖孫有蔭而止應配流據禮論情深為未愜今定律祖孫與兄弟緣坐者俱配没從之自是比古死刑除其大半天下稱賴焉𤣥齡等定律五百條立刑名二十等笞刑五自十至於五十杖刑五自六十至於百徒刑五自一年至於三年流刑三自千里至於三千里死刑二絞斬比隋律減大辟九十二條辟毗亦翻減流入徒者七十一條凡削煩去蠧變重為輕者不可勝紀去羌吕翻勝音升又定令一千五百九十餘條武德舊制釋奠於太學以周公為先聖孔子配饗𤣥齡等建議停祭周公以孔子為先聖顔囘配饗又刪武德以來敕格定留七百條至是頒行之又定枷杻鉗鏁杖笞皆有長短廣狹之制械其頸曰枷械其手曰杻鉗以鉄刼束之也鏁以鉄琅當之也杖長三尺五寸削去節目訊杖大頭徑三分二釐小頭一分二釐常行杖大頭二分七釐小頭一分七釐笞杖大頭二分小頭一分有半杻女九翻自張藴古之死見上卷五年法官以出罪為戒時有失入者又不加罪上嘗問大理卿劉德威曰近日刑網稍密何也對曰此在主上不在羣臣人主好寛則寛好急則急律文失入減三等失出減五等今失入無辜失出更復大罪是以吏各自免競就深文非有教使之然畏罪故耳陛下儻一斷以律則此風立變矣上悦從之由是斷獄平允好呼到翻斷丁亂翻上以漢世豫作山陵免子孫倉猝勞費又志在儉葬恐子孫從俗奢靡二月丁巳自為終制因山為陵容棺而已甲子上行幸洛陽宫上至顯仁宫隋志河南夀安縣有顯仁宫煬帝大業元年所起官吏以缺儲偫有被譴者偫直里翻被皮義翻魏徵諫曰陛下以儲偫譴官吏臣恐承風相扇異日民不聊生殆非行幸之本意也昔煬帝諷郡縣獻食視其豐儉以為賞罰見一百八十三卷大業十二年故海内叛之此陛下所親見奈何欲效之乎上驚曰非公不聞此言因謂長孫無忌等曰朕昔過此買飯而食僦舍而宿僦子就翻今供頓如此豈得嫌不足乎三月丙戌朔日有食之庚子上宴洛陽宫西苑泛積翠池洛陽西苑北距北邙西至孝水南帶洛水支渠穀洛二水㑹於其間慮其泛溢為三陂以禦之一曰積翠二曰月陂三曰上陽苑墻周迴一百二十六里顧謂侍臣曰煬帝作此宫苑結怨於民築西苑見一百八十卷大業元年今悉為我有正由宇文述虞世基裴藴之徒内為諂諛外蔽聰明故也可不戒哉按隋煬帝大業二年令宇文愷作洛陽西苑述恐當作愷房𤣥齡魏徵上所定新禮一百三十八篇上時掌翻丙午詔行之以禮部尚書王珪為魏王泰師唐初因魏晉之制諸王置師一人開元改曰傅上謂泰曰汝事珪當如事我泰見珪輒先拜珪亦以師道自居珪子敬直尚南平公主公主上女也先是公主下嫁先悉薦翻皆不以婦禮事舅姑珪曰今主上欽明動循禮法吾受公主謁見豈為身榮所以成國家之美耳乃與其妻就席坐令公主執笲行盥饋之禮笲音煩竹器也以盛棗栗腶脩盥音管以盤水沃洗手也婦以特豚饋士昏禮曰舅坐於阼階西面姑坐於房外南面婦執笲棗栗東面拜奠於舅席訖婦又執腶脩升進北面拜奠於姑席舅姑入於室婦盥饋特豚明婦順也右胖載之舅俎左胖載之姑俎各以南為上是後公主始行婦禮自珪始羣臣復請封禪五年諸州朝集使請封禪六年文武官請今羣臣復請復扶又翻上使秘書監顔師古等議其禮房𤣥齡裁定之夏四月己卯魏徵上疏以為人主善始者多克終者寡豈取之易而守之難乎上時掌翻易以豉翻蓋以殷憂則竭誠以盡下殷音隠安逸則驕恣而輕物盡下則胡越同心輕物則六親離德雖震之以威怒亦皆貌從而心不服故也人主誠能見可欲則思知足將興繕則思知止處髙危則思謙降臨滿盈則思挹損遇逸樂則思撙節處昌吕翻樂音洛撙慈損翻在宴安則思後患防壅蔽則思延納疾讒邪則思正己行爵賞則思因喜而僭施刑罰則思因怒而濫僭僭差濫濫溢也兼是十思而選賢任能固可以無為而治治直之翻又何必勞神苦體以代百司之任哉資治通鑑卷一百九十四
