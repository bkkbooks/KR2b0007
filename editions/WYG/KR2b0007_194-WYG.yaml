front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百九十四宋司馬光撰胡三省音注唐紀十起𤣥黓執徐盡彊圉作噩四月凡五年有竒太宗文武大聖大廣孝皇帝上之下貞觀六年觀古玩翻春正月乙卯朔日有食之癸酉靜州獠反將軍李子和討平之獠魯皓翻文武官復請封禪復扶又翻去年諸州朝集使請封禪上曰卿輩皆以封禪為帝王盛事朕意不然若天下乂安家給人足雖不封禪庸何傷乎昔秦始皇封禪見七卷始皇二十八年而漢文帝不封禪後世豈以文帝之賢不及始皇邪邪音耶且事天掃地而祭禮記郊特牲曰郊之祭也大報天也兆於南郊就陽位也掃地而祭於其質也何必登泰山之巔封數尺之土然後可以展其誠敬乎羣臣猶請之不已上亦欲從之魏徵獨以為不可紀考異曰實錄唐書志及唐統皆以為太宗自不欲封禪而魏文貞公故事及王方慶文貞公傳錄以為太宗欲封太山徵諫而止意頗不同今兩存之上曰公不欲朕封禪者以功未髙邪曰髙矣德未厚邪曰厚矣中國未安邪曰安矣四夷未服邪曰服矣年穀未豐邪曰豐矣符瑞未至邪曰至矣然則何為不可封禪對曰陛下雖有此六者然承隋末大亂之後户口未復倉廩尚虚而車駕東巡千乘萬騎乘繩證翻騎竒寄翻其供頓勞費未易任也易以豉翻任音壬且陛下封禪則萬國咸集逺夷君長皆當扈從長知兩翻從才用翻今自伊洛以東至於海岱煙火尚希灌莽極目灌木叢生也莽草深茂也此乃引戎狄入腹中示之以虚弱也况賞賚不貲未厭逺人之望給復連年不償百姓之勞厭於協翻復方目翻崇虚名而受實害陛下將焉用之焉於䖍翻㑹河南北數州大水事遂寢上將幸九成宫通直散騎常侍姚思亷諫散悉亶翻騎竒寄翻上曰朕有氣疾暑輒頓劇往避之耳賜思廉絹五十匹監察御史馬周上疏監古銜翻上時掌翻以為東宫在宫城之中而大安宫乃在宫城之西此因大安宫在西遂謂帝所居為東宫耳制度比於宸居尚為卑小於四方觀聽有所不足宜增修髙大以稱中外之望稱尺證翻又太上皇春秋已髙陛下宜朝夕視膳今九成宫去京師三百餘里太上皇或時思念陛下陛下何以赴之又車駕此行欲以避暑太上皇尚留暑中而陛下獨居涼處温凊之禮竊所未安記曲禮凡為人子之禮冬温而夏凊凊音七正翻今行計已成不可復止復扶又翻願速示返期以解衆惑又王長通白明達皆樂工韋槃提斛斯正止能調馬縱使技能出衆止可賚之金帛豈得超授官爵鳴玉曳履與士君子比肩而立同坐而食技渠綺翻坐徂卧翻臣竊恥之上深納之上以新令無三師官二月丙戌詔特置之唐以太師太傅太保為三師正一品天子所師法無所總職三月戊辰上幸九成宮庚午吐谷渾寇蘭州吐從暾入聲谷音浴州兵擊走之長樂公主將出降唐㑹要長樂公主下嫁長孫沖樂音洛上以公主皇后所生特愛之勑有司資送倍於永嘉長公主永嘉長公主髙祖女下嫁竇奉節又嫁賀蘭僧伽唐制皇姑為大長公主正一品姊為長公主女為公主皆視一品長知兩翻下同魏徵諫曰昔漢明帝欲封皇子曰我子豈得與先帝子比皆令半楚淮陽事見四十五卷漢明帝永平十五年今資送公主倍於長主得無異於明帝之意乎上然其言入告皇后后歎曰妾亟聞陛下稱重魏徵亟去吏翻不知其故今觀其引禮義以抑人主之情乃知真社稷之臣也妾與陛下結髮為夫婦曲承恩禮每言必先候顔色不敢輕犯威嚴况以人臣之疏逺乃能抗言如是陛下不可不從自請遣中使齎錢四百緍絹四百匹以賜徵使疏吏翻帛考異曰舊文德皇后傳云使齎五百匹詣徵第賜之魏文貞公故事云遣中使齎錢二十萬絹百匹詣公宅宣命今從舊魏徵傳且語之曰語牛倨翻開公正直乃今見之故以相賞公宜常秉此心勿轉移也上嘗罷朝怒曰㑹須殺此田舍翁朝直遥翻后問為誰上曰魏徵毎廷辱我后退具朝服立於庭唐制皇后之服褘衣者受册助祭朝㑹大事之服也深青織成為之畫翬赤質五色十二等素紗中單黼領朱羅縠褾襈蔽膝隨裳色以緅領為緣用翟為章三等青衣革帶大帶隨衣色裨紐約佩綬如天子青襪舄加金飾首飾大小華十二樹以象袞冕之旒又有兩博鬢朝直遥翻褾彼小翻袖耑襈皺戀翻緣也緅仄鳩翻上驚問其故后曰妾聞主明臣直今魏徵直由陛下之明故也妾敢不賀上乃悅夏四月辛卯襄州都督鄒襄公張公謹卒卒子恤翻明日上出次發哀有司奏辰日忌哭彭祖百忌辰不哭泣上曰君之於臣猶父子也情發於衷安避辰日遂哭之六月己亥金州刺史酆悼王元亨薨金州西城郡梁置南梁州西魏置東梁州尋改曰金州辛亥江王囂薨秋七月丙辰焉耆王突騎支遣使入貢初焉耆入中國由磧路隋末閉塞道由髙昌突騎支請復開磧路以便往來騎竒寄翻使疏吏翻磧七迹翻塞悉則翻復扶又翻又音如字上許之由是髙昌恨之遣兵襲焉耆大掠而去焉耆國東鄰髙昌為討髙昌張本辛未宴三品已上於丹霄殿上從容言曰從千容翻中外乂安皆公卿之力然隋煬帝威加夷夏夏户雅翻頡利跨有北荒頡奚結翻統葉䕶雄據西域今皆覆亡此乃朕與公等所親見勿矜彊盛以自滿也西突厥肆葉䕶可汗發兵擊薛延陁為薛延陁所敗厥九勿翻可從刋入聲汗音寒敗補邁翻肆葉䕶性猜狠信讒有乙利可汗功最多乙利西突厥小可汗也狠戸墾翻肆葉護以非其族類誅滅之由是諸部皆不自保肆葉䕶又忌莫賀設之子泥孰陰欲圖之泥孰奔焉耆設卑逵官與弩失畢二部攻之舊傳作設卑逵官新傳作没卑逵干傳考異曰今從舊肆葉䕶輕騎奔康居尋卒肆葉䕶立見上卷三年騎竒寄翻卒子恤翻國人迎泥孰於焉耆而立之是為咄陸可汗遣使内附咄常没翻可從刋入聲汗音寒使疏吏翻丁酉遣鴻臚少卿劉善因立咄陸為奚利邲咄陸可汗臚陵如翻少始照翻邲毗必翻咄陸即阿史那彌射此當參觀髙宗顯慶二年考異而詳辯之册考異曰舊傳册為吞阿妻狀奚利邲咄陸可汗新傳號吞阿婁拔利邲咄陸可汗今從實錄閏月乙卯上宴近臣於丹霄殿長孫無忌曰王珪魏徵昔為仇讎謂其事隠太子勸之圖帝也不謂今日得此同宴上曰徵珪盡心所事故我用之然徵每諫我不從我與之言輒不應何也魏徵對曰臣以事為不可故諫陛下不從而臣應之則事遂施行故不敢應上曰且應而復諫庸何傷復扶又翻對曰昔舜戒羣臣爾無面從退有後言書益稷之言臣心知其非而口應陛下乃面從也豈稷契事舜之意邪契息列翻上大笑曰人言魏徵舉止疏慢我視之更覺娬媚娬罔甫翻娬亦媚也正為此耳為於偽翻徵起拜謝曰陛下開臣使言故臣得盡其愚若陛下拒而不受臣何敢數犯顔色乎數所角翻戊辰秘書少監虞世南上聖德論上時掌翻上賜手詔稱卿論太髙朕何敢擬上古但比近世差勝耳然卿適覩其始未知其終若朕能慎終如始則此論可傳如或不然恐徒使後世笑卿也九月己酉幸慶善宫上生時故宅也以髙祖武功舊第為慶善宫因與貴人宴賦詩起居郎清平吕才清平縣屬博州劉昫曰本漢貝丘縣隋曰清平被之管絃被皮義翻命曰功成慶善樂使童子八佾為九功之舞大宴㑹與破陳舞偕奏於庭才有巧思故命以所賦詩被之管絃以為樂章以童子六十四人冠進德冠紫袴褶長袖漆髻屣履而舞號九功舞進蹈安徐以象文德破陳樂號七德舞擊刺往來發揚蹈厲以象武功陳讀曰陣同州刺史尉遲敬德預宴同州馮翊郡尉紆勿翻有班在其上者敬德怒曰汝何功坐我上任城王道宗次其下諭解之敬德拳毆道宗目幾眇任音壬毆烏口翻幾居希翻有考異曰唐厯云嘗因内宴於御前毆宇文士及曰汝何功合居吾上太宗慰諭之方止今從舊傳上不懌而罷謂敬德曰朕見漢髙祖誅滅功臣意常尤之故欲與卿等共保富貴令子孫不絶令力丁翻然卿居官數犯法乃知韓彭葅醢非髙祖之罪也國家綱紀唯賞與罰非分之恩不可數得分扶問翻數所角翻勉自修飾無貽後悔敬德由是始懼而自戢戢阻立翻冬十月乙卯車駕還京師帝侍上皇宴於大安宫帝與皇后更獻飲膳及服御之物更工衡翻夜久乃罷帝親為上皇捧輿至殿門為于偽翻上皇不許命太子代之突厥頡利可汗鬱鬱不得意數與家人相對悲泣容貌羸憊厥九勿翻頡奚結翻可從刋入聲汗音寒數所角翻羸倫為翻憊蒲拜翻上見而憐之以虢州地多麋鹿義寜元年分𢎞農二縣置虢州虢郡宋白曰帝王世紀云虢有三周封虢仲於西虢虢州之地也封虢叔於東虢今成臯也陜郡平陸是北虢可以游獵乃以頡利為虢州刺史頡利辭不願往癸未復以為右衞大將軍復扶又翻下勿復不復同又音如字十一月辛巳契苾酋長何力帥部落六千餘家詣沙州降詔處之於甘涼之間契欺結翻苾毗必翻酋慈由翻長知兩翻帥讀曰率降戸江翻處昌吕翻甘涼相去五百里以何力為左領軍將軍庚寅以左光祿大夫陳叔達為禮部尚書帝謂叔達曰卿武德中有讜言見一百九十一卷髙祖武德九年讜音黨善言直言也故以此官相報對曰臣見隋室父子相殘以取亂亡當日之言非為陛下為于偽翻乃社稷之計耳十二月癸丑帝與侍臣論安危之本中書令温彦博曰伏願陛下常如貞觀初則善矣帝曰朕比來怠於為政乎觀古玩翻比毗至翻魏徵曰貞觀之初陛下志在節儉求諫不倦比來營繕微多諫者頗有忤旨此其所以異耳比毗至翻忤五故翻帝拊掌大笑曰誠有是事辛未帝親錄繫囚見應死者憫之縱使歸家期以來秋來就死仍敕天下死囚皆縱遣使至期來詣京師是歲党項羌前後内屬者三十萬口党底朗翻公卿以下請封禪者前後相屬屬之欲翻上諭以舊有氣疾恐登髙增劇公等勿復言復扶又翻上謂侍臣曰朕比來決事或不能皆如律令公輩以為事小不復執奏夫事無不由小而致大此乃危亡之端也比毗至翻夫音扶昔關龍逢忠諫而死逢皮江翻朕毎痛之煬帝驕暴而亡公輩所親見也公輩常宜為朕思煬帝之亡朕常為公輩念關龍逢之死為于偽翻何患君臣不相保乎上謂魏徵曰為官擇人不可造次朱元晦曰造次急遽茍且之時造七到翻用一君子則君子皆至用一小人則小人競進矣對曰然天下未定則專取其才不考其行喪亂既平行下孟翻下同喪悤浪翻則非才行兼備不可用也觀此則天下已定之後可不為官擇人乎七年春正月更名破陳樂曰七德舞更工衡翻左傳楚莊王曰武有七德禁暴戢兵保大定功安民和衆豐財故以為樂舞之名新志七德舞圖左圓右方先偏後伍交錯屈伸以象魚麗鵝鸛命吕才以圖教樂工百二十八人被銀甲執㦸而舞凡三變毎變為四陣象擊刺往來歌者和曰秦王破陳樂杜佑曰破陳樂舞圖左圓右方先偏後伍魚麗鵝鸛箕張翼舒交錯屈伸首尾囘互以象戰陳之形凡為三變每變有四陣有來往疾徐擊刺之象以應歌節發揚蹈厲聲韻慷慨陳讀曰陣癸巳宴三品已上及州牧蠻夷酋長於𤣥武門奏七德九功之舞酋慈由翻長知兩翻太常卿蕭瑀上言七德舞形容聖功有所未盡瑀音禹上時掌翻請寫劉武周薛仁杲竇建德王世充等擒獲之狀上曰彼皆一時英雄今朝廷之臣往往嘗北面事之若覩其故主屈辱之狀能不傷其心乎瑀謝曰此非臣愚慮所及魏徵欲上偃武修文毎侍宴見七德舞輒俛首不視見九功舞則諦觀之俛音免諦都計翻審也三月戊子侍中王珪坐漏泄禁中語左遷同州刺史庚寅以祕書監魏徵為侍中直太史雍人李淳風雍縣屬岐州雍於用翻奏靈臺候儀制度疏畧但有赤道請更造渾天黄道儀更工衡翻渾户本翻許之癸巳成而奏之時李淳風上言舜在璿璣玉衡以齊七政則渾天儀也周禮土圭正日景以求地中有以見日行黄道之騐也暨於周末此器乃亡漢洛下閎作渾儀其後賈逵張衡亦有之而推騐七曜並循赤道按冬至極南夏至極北而赤道常定於中國無南北之異蓋渾儀無黄道久矣上異其說因詔為之儀表裏三重下據準基上如十字末樹鼇足以張四表一曰六合儀有天經雙規金渾緯規金常規相結於四極之内列二十八宿十日十二辰經緯三百六十五度二曰三辰儀圓徑八尺有璿璣規日游規列宿所行轉於六合之内三曰四游儀圓樞為軸以連結玉衡游筩而貫約矩規又𤣥極北樹北辰南矩地軸傍轉於内玉衡在𤣥樞之間而南北游仰以觀天之辰宿下以識器之晷度皆用銅為之夏五月癸未上幸九成宫雅州道行軍總管張士貴擊反獠破之雅州漢嚴道縣地隋廢州置臨邛郡唐復為雅州獠魯皓翻秋八月乙丑左屯衞大將軍譙敬公周範卒上行幸常令範與房𤣥齡居守卒子恤翻守式又翻範為人忠篤嚴正疾甚不肯出外竟終於内省與𤣥齡相抱而訣曰所恨不獲再奉聖顔辛未以張士貴為龔州道行軍總管使擊反獠龔州臨江郡漢猛陵縣地隋為永平郡武林縣貞觀三年置鷰州於今州東仍於鷰州之故所置龔州九月山東河南四十餘州水遣使賑之使疏吏翻賑津忍翻去歲所縱天下死囚凡三百九十人無人督帥皆如期自詣朝堂帥讀曰率朝直遥翻人考異曰四年實錄云天下斷死罪止二十九今年實錄乃有二百九十九人何頓多如此事已可疑又白居易樂府云死囚四百來歸獄舊本紀統紀年代記皆云二百九十人今從新書刑法志無一人亡匿者上皆赦之冬十月庚申上還京師十一月壬辰以開府儀同三司長孫無忌為司空長知兩翻無忌固辭曰臣忝預外戚恐天下謂陛下為私上不許曰吾為官擇人惟才是與為于偽翻茍或不才雖親不用襄邑王神符是也神符少威嚴不為下所畏又足不良於行由是歸第如其有才雖讎不棄魏徵等是也今日所舉非私親也十二月甲寅上幸芙蓉園景龍文舘記芙蓉園在京師羅城東南隅本隋世之離宫也青林重複綠水瀰漫帝城勝景也丙辰校獵少陵原少陵原在長安城南屬萬年縣界少始照翻戊午還宫從上皇置酒故漢未央宫漢故未央宫在長安宫城北禁苑之西偏還考異曰舊髙祖紀八年閱武於城西髙祖親自臨視置酒於未央宫髙祖實錄不記年月據太宗實錄八年正月頡利可汗死今從唐厯上皇命突厥頡利可汗起舞又命南蠻酋長馮智戴詠詩厥九勿翻頡奚結翻可從刋入聲汗音寒酋慈由翻長知兩翻既而笑曰胡越一家自古未有也帝奉觴上夀上時掌翻曰今四夷入臣皆陛下教誨非臣智力所及昔漢髙祖亦從太上皇置酒此宫妄自矜大漢髙祖十年置酒未央宫奉玉巵為太上皇夀曰始大人常以臣亡賴不能治産業不如仲力今某之業所就孰與仲多臣所不取也上皇大悅殿上皆呼萬歲帝謂左庶子于志寧右庶子杜正倫曰朕年十八猶在民間民之疾苦情偽無不知之及居大位區處世務猶有差失况太子生長深宫處昌吕翻長知兩翻百姓艱難耳目所未涉能無驕逸乎卿等不可不極諫太子好嬉戲頗虧禮法志寧與右庶子孔頴達數直諫好呼到翻數所角翻上聞而嘉之各賜金一斤帛五百匹工部尚書段綸奏徵巧工楊思齊上令試之綸使先造傀儡傀儡木偶戯也杜佑曰窟􅓓子亦曰傀磊子作偶人以戲善歌舞本喪樂也漢末始用之於嘉㑹北齊髙緯尤所好閭市盛行焉余按列子偃師以此伎奉周穆王其來久矣傀口猥翻儡落猥翻上曰得巧工庶供國事卿令先造戲具豈百工相戒無作淫巧之意邪月令孟春之月百工咸理監工日號毋或作為淫巧以蕩上心邪音耶乃削綸階唐制工部尚書正三品削其階則不得立於三品班中嘉陵州獠反嘉州眉山郡漢犍為南安縣地陵州陵山郡漢蜀郡廣都犍為郡武陽二縣東界之地獠魯皓翻命邗江府統軍牛進達擊破之唐揚州有䢴江府兵䢴胡安翻上問魏徵曰羣臣上書可采及召對多失次何也臣上時掌翻對曰臣觀百司奏常事數日思之及至上前三分不能道一况諫者拂意觸忌拂與咈同非陛下借之辭色豈敢盡其情哉上由是接羣臣辭色愈温嘗曰煬帝多猜忌臨朝對羣臣多不語朝直遥翻朕則不然與羣臣相親如一體耳八年春正月癸未突厥頡利可汗卒厥九勿翻頡奚結翻可從刋入聲汗音寒卒子恤翻命國人從其俗焚尸葬之辛丑行軍總管張士貴討東西王洞反獠平之東西王洞獠蓋在龔州界上欲分遣大臣為諸道黜陟大使使疏吏翻蕭考異曰實錄舊本紀但云遣瑀等巡省天下按時止有十道而㑹要統紀皆云發十六道黜陟大使據姓名止有十三人皆所未詳故但云諸道未得其人李靖薦魏徵上曰徵箴規朕失不可一日離左右離力智翻乃命靖與太常卿蕭瑀等凡十三人分行天下察長吏賢不肖行下孟翻長知兩翻問民間疾苦禮髙年賑窮乏賑津忍翻起淹滯俾使者所至如朕親覩三月庚辰上幸九成宫夏五月辛未朔日有食之初吐谷渾可汗伏允吐從暾入聲谷音浴可從刋入聲汗音寒鉢考異曰實錄十年立諾曷鉢詔稱伏允為順步薩今從舊傳遣使入貢未返大掠鄯州而去使疏吏翻宋白曰鄯州西南至廓州廣城縣故承風嶺吐谷渾界百九十五里上遣使讓之徵伏允入朝稱疾不至鄯時戰翻朝直遥翻仍為其子尊王求婚上許之令其親迎為于偽翻迎魚敬翻尊王又不至乃絶婚伏允又遣兵寇蘭廓二州蘭州金城郡以臯蘭山名州伏允年老信其臣天柱王之謀數犯邊數所角翻又執唐使者趙德楷上遣使諭之十返又引其使者臨軒親諭以禍福伏允終無悛心悛丑緣翻六月遣左驍衞大將軍段志𤣥為西海道行軍總管左驍衞將軍樊興為赤水道行軍總管將邊兵及契苾党項