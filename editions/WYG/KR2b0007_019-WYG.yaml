  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷十九宋司馬光撰胡三省音註漢紀十一起彊圉大荒落盡𤣥黓閹茂凡六年世宗孝武皇帝中之上元朔五年冬十一月乙丑薛澤免以公孫𢎞為丞相封平津侯勃海郡髙成縣有平津鄉宋白曰滄州鹽山縣勃海髙成縣也冇平津郷考異曰史記将相名臣表漢書公卿百官表𢎞為相皆在今年建元以來侯者表恩澤侯表皆云元朔三年封侯按三年𢎞始為御史大夫盖誤書五為三因置于三年耳丞相封侯自𢎞始漢初常以列侯為丞相𢎞則既相而後封侯故丞相封侯自𢎞始時上方興功業𢎞于是開東閣以延賢人師古曰閣小門也東向開之避當庭門而引客别於掾史官屬也與參謀議每朝覲奏事因言國家便冝上亦使左右文學之臣與之論難難乃旦翻𢎞嘗奏言十賊彍弩張晏曰彍音郭師古曰引滿曰彍百吏不敢前請禁民毋得挾弓弩便上下其議下遐嫁翻侍中吾丘夀王對曰臣聞古者作五兵師古曰五兵謂矛㦸弓劒戈吾讀曰虞非以相害以禁暴討邪也秦兼天下銷甲兵折鋒刅其後民以耰鉏箠梃相撻擊師古曰耰摩田之器也箠馬撾也梃大杖也折而設翻耰音憂梃大鼎翻撻音闥犯法滋衆盗賊不勝師古曰滋益也不勝言不可勝也卒以亂亡卒子恤翻故聖王務教化而省禁防知其不足恃也禮曰男子生桑弧蓬矢以舉之眀示有事也記内則國君世子生三日射人以桑弧蓬矢六射天地四方注云天地四方男子之所有事也大射之禮自天子降及庶人三代之道也古者天子射豹侯諸侯射熊侯卿大夫射麋侯士射鹿侯豕侯周官又以郷射之禮詢衆庶愚聞聖王合射以眀教矣未聞弓矢之為禁也且所為禁者為盗賊之以攻奪也為盗之為于偽翻攻奪之罪死然而不止者大姧之於重誅固不避也臣恐邪人挾之而吏不能止良民以自備而抵法禁師古曰抵觸也是擅賊威而奪民救也竊以為大不便書奏上以難𢎞𢎞詘服焉難乃旦翻詘與屈同𢎞性意忌外寛内深諸嘗與𢎞有隙無近逺雖陽與善後竟報其過董仲舒為人㢘直以𢎞為従諛𢎞嫉之膠西王端驕恣數犯汝端景帝子前三年受封數所角翻下同所殺傷二千石甚衆𢎞乃薦仲舒為膠西相仲舒以病免汲黯常毁儒靣觸𢎞𢎞欲誅之以事以事致其罪而誅之乃言上曰右内史界部中多貴臣宗室難治非素重臣不能任請徙黯為右内史右内史後為右扶風治直之翻任音壬上從之春大旱匈奴右賢王數侵擾朔方天子令車騎将軍青将三萬騎出髙闕衛尉蘇建為游擊将軍左内史李沮為彊弩将軍沮音俎太僕公孫賀為衛騎将軍代相李蔡為輕車将軍皆領屬車騎将軍俱出朔方大行李息岸頭侯張次公為将軍俱出右北平凡十餘萬人擊匈奴右賢王以為漢兵逺不能至飲酒醉衛青等兵出塞六七百里夜至圍右賢王右賢王驚夜逃獨與壮騎數百馳潰圍北去得右賢禆王十餘人師古曰禆王小王也猶禆将也禆頻移翻衆男女萬五千餘人畜數十百萬師古曰數十萬以至百萬畜許敕翻于是引兵而還至塞天子使使者持大将軍印即軍中拜衛青為大将軍諸将皆屬焉夏四月乙未復益封青八千七百户復扶又翻封青三子伉不疑登皆為列侯師古曰伉音抗又工郎翻伉為冝春侯不疑為隂安侯登為發干侯青固謝曰師古曰固謂再三也臣幸得待罪行間行户剛翻賴陛下神靈軍大㨗皆諸校尉力戰之功也陛下幸已益封臣青臣青子在襁褓中未有勤勞上列地封為三侯列漢書作裂非臣待罪行間所以勸士力戰之意也天子曰我非忘諸校尉功也乃封䕶軍都尉公孫敖為合騎侯晉灼曰合騎侯猶冠軍從票之名也予據功臣表合騎侯食邑于勃海髙成都尉韓説為龍頟侯班志龍頟侯國属平原郡頟音洛公孫賀為南窌侯窌匹孝翻又普孝翻李蔡為樂安侯樂安功臣表作安樂食邑於琅邪之昌縣校尉李朔為渉軹侯渉軹班史衛青𫝊作陟軹功臣表作軹食邑于齊郡之西安趙不虞為隨成侯隨成侯功臣表食邑于干乘縣公孫戎奴為從平侯從平侯食邑於東郡樂昌李沮李息及校尉豆如意班史豆作竇皆賜爵闗内侯於是青尊寵於羣臣無二公卿以下皆卑奉之獨汲黯與亢禮亢音抗人或説黯曰自天子欲羣臣下大将軍説式芮翻師古曰下遐嫁翻大将軍尊重君不可以不拜黯曰夫以大将軍有揖客反不重邪師古曰言能降貴以禮士最為重也大将軍聞愈賢黯數請問國家朝廷所疑數所角翻遇黯加於平日大将軍青雖貴有時侍中上踞厠而視之如淳曰厠溷也孟康曰厠牀邊側也師古曰如説是也仲馮曰厠當從孟説占者見大臣則御坐為起然則踞厠者輕之也丞相𢎞燕見上或時不冠至如汲黯見見賢遍翻上不冠不見也上嘗坐武帳中應劭曰武帳織成帳為武士象也孟康曰今御武帳置兵䦨五兵于帳中也師古曰孟説是韋昭曰以武名之示威黯前奏事上不冠望見黯避帳中使人可其奏其見敬禮如此夏六月詔曰盖聞導民以禮風之以樂師古曰風教也詩序曰上以風化下今禮壊樂崩朕甚閔焉其令禮官勸學興禮以為天下先于是丞相𢎞等奏請為博士官置弟子五十人復其身為于偽翻復方目翻第其髙下以補郎中文學掌故兒寛以射䇿為掌故功次補廷尉文學卒史蘇林曰卒史秩六百石臣瓚曰漢注卒史秩百石師古曰瓚説是予謂掌故掌故府之典籍者也以兒寛自掌故補卒史推之則掌故之品秩從可知也即有秀才異等輒以名聞秀才異等謂冇俊秀之才異於常等者其不事學若下材輒罷之又吏通一蓺以上者請皆選擇以補右職吏謂百石已上及比百石以下也右職謂中二千石二千石之卒史也上從之自此公卿大夫士吏彬彬多文學之士矣秋匈奴萬騎入代殺都尉朱英略千餘人初淮南王安好讀書屬文喜立名譽好呼到翻屬之欲翻喜許記翻招致賓客方術之士數千人其羣臣賓客多江淮間輕薄士常以厲王遷死感激安遷死見十四卷文帝前六年建元六年彗星見彗祥嵗翻又徐醉翻又旋芮翻見賢遍翻或説王曰先吳軍時彗星出長數尺然尚流血千里説式芮翻先悉薦翻長直亮翻謂吳王濞起兵時也今彗星竟天天下兵當大起王心以為然乃益治攻戰具積金錢治直之翻下同郎中雷被獲罪于太子遷雷被善用劒與太子戲誤中太子故得罪師古曰被皮義翻姓譜雷古方雷氏後時有詔欲從軍者輒詣長安被即願奮擊匈奴太子惡被於王惡毁惡也如字斥免之欲以禁後師古曰令後人更不敢效之也是嵗被亡之長安上書自眀事下廷尉治下遐嫁翻蹤跡連王公卿請逮捕治王太子遷謀令人衣衛士衣持㦸居王旁漢使有非是者即刺殺之人衣於既翻刺七亦翻因發兵反天子使中尉宏即訊王師古曰即就也就問也王視中尉顔色和遂不發公卿奏安壅閼奮擊匈奴者格眀詔當弃市閼音遏師古曰格音閣謂閣止不行之詔削二縣既而安自傷曰吾行仁義反見削地耻之于是為反謀益甚安與衡山王賜相責望禮節間不相能賜即安之弟也孝文十六年與安同受封師古曰兄弟相責故有嫌衡山王聞淮南王有反謀恐為所并亦結賓客為反具以為淮南已西欲發兵定江淮之間而有之衡山王后徐來譛太子爽於王欲廢之而立其弟孝王囚太子而佩孝以王印令招致賓客賓客來者㣲知淮南衡山有逆計日夜從容勸之從千容翻王乃使孝客江都人枚赫陳喜作輣車鍜矢輣薄庚翻兵車也樓車也鍛都元翻冶鐵也刻天子璽将相軍吏印秋衡山王當入朝過淮南淮南王乃昆弟語師古曰為相親愛之言除前隙約束反具師古曰共契約為反具衡山王即上書謝病上賜書不朝六年春二月大将軍青出定襄擊匈奴杜佔曰漢定襄郡在今馬邑北三百餘里後魏置雲中郡以合騎侯公孫敖為中将軍太僕公孫賀為左将軍翕侯趙信為前将軍功臣表翕侯國在魏郡内黄界衛尉蘇建為右将軍郎中令李廣為後将軍左内史李沮為彊弩将軍師古曰沮音爼咸屬大将軍斬首數千級而還賢曰秦法斬首一賜爵一級故因謂斬首為級休士馬于定襄雲中雁門赦天下夏四月衛青復将六将軍出定襄擊匈奴復扶又翻斬首虜萬餘人右将軍建前将軍信并軍三千餘騎獨逢單于兵與戰一日餘漢兵且盡信故胡小王降漢漢封為翕侯信元光四年十月壬午受封及敗匈奴誘之遂将其餘騎可八百降匈奴誘音酉将即亮翻降户江翻建盡亡其軍脱身亡自歸大将軍議郎周覇曰班表議郎屬郎中令秩比六百石自大将軍出未嘗斬裨将今建棄軍可斬以眀将軍之威軍正閎長史安曰不然凡軍行置軍正掌舉軍法以正軍中軍法曰正無屬将軍将軍有罪以聞劉昭志大将軍長史秩千石如淳曰律都軍官長史一人兵法小敵之堅大敵之禽也孫子之言言大小不敵小雖堅於戰終必為大所禽今建以數千當單于數萬力戰一日餘士盡不敢有二心自歸而斬之是示後無反意也不當斬大将軍曰青幸得以肺腑待罪行間不患無威而覇説我以眀威甚失臣意言失為臣之意也行户剛翻説式芮翻且使臣職雖當斬将将即亮翻以臣之尊寵而不敢擅誅於境外而具歸天子天子自裁之於以見為人臣不敢専權不亦可乎軍吏皆曰善遂囚建詣行在所蔡邕獨斷曰天子以四海為家故謂所居為行在所初平陽縣吏霍仲孺給事平陽侯家與青姊衛少兒私通生霍去病霍姓以國為氏去病年十八為侍中善騎射再從大将軍擊匈奴為票姚校尉服䖍曰票姚音飄揺師古曰票匹妙翻姚羊召翻票姚勁疾之貌茍悦漢紀作票鷂字去病後為票騎将軍尚取票姚之字耳今讀者音飄揺則不當其義也與輕勇騎八百直棄大軍數百里赴利斬捕首虜過當師古曰計其所将人數則捕斬首為多過於所當一曰漢軍失亡者少而殺獲匈奴數多故曰過當也於是天子曰票姚校尉去病斬首虜二千餘級得相國當户斬單于大父行藉若侯産生捕季父羅姑匈奴左右大當户在左右大都尉之下左右骨都侯之上大父行單于祖行也張晏曰藉若胡侯也産其名也師古曰此人單于祖父之行也季父亦單于季父也羅姑其名行户郎翻比再冠軍師古曰比頻也比毗至翻冠古玩翻封去病為冠軍侯帝以去病功冠諸軍以南陽穰縣盧陽郷宛縣臨駣聚為冠軍侯國駣音桃上谷太守郝賢四從大将軍捕斬首虜二千餘級封賢為衆利侯姓譜殷帝乙有子期封太原郝郷後因氏焉功臣表衆利侯食邑于琅邪郡姑幕縣是嵗失兩将軍亡翕侯軍功不多故大将軍不益封止賜千金右将軍建至天子不誅贖為庶人單于既得翕侯以為自次王師古曰自次者尊重次於單于用其姊妻之妻七細翻與謀漢信教單于益北絶幕師古曰直度曰絶幕與漠同隂山以北皆大漠不生草木以誘罷漢兵徼極而取之師古曰罷讀曰疲徼要也誘令疲徼其困極然後取之徼一遥翻無近塞單于從其計近其靳翻是時漢比嵗發十餘萬衆擊胡比毗至翻斬捕首虜之士受賜黄金二十餘萬斤而漢軍士馬死者十餘萬兵甲轉漕之費不與焉與讀曰預于是大司農經用竭不足以奉戰士六月詔令民得買爵及贖禁錮免臧罪置賞官名曰武功爵級十七萬凡直三十餘萬金諸買武功爵至千夫者得先除為吏禁錮重擊也臣瓉曰茂陵中書有武功爵一級曰造士二級曰閑輿衛三級曰良士四級曰元戎士五級曰官首六級曰秉鐸七級曰千夫八級曰樂卿九級曰執戎十級曰政戾庶長十一級曰軍衛此武帝所制以寵軍功師古曰下云級十七萬凡直三十餘萬金今瓚引茂陵中書説之不盡也貢父曰直三十餘萬金其價之差殊不可詳也或説七當作一與茂陵書合矣予謂賣爵當級級稍増其價豈可例云級十七萬若每級十七萬比至三十餘萬金當一萬七千餘級又非也然則誤衍此萬字盖武功爵其級十七參考顔劉注皆因求其説而不得遂疑茂陵書所謂十一級為不足又疑史之正文萬字為衍皆未為允也盖級十七萬者賣爵一級為錢十七萬至二級則三十四萬矣自此以上烏得不每級而増乎王莽時黄金一斤直錢萬以此推之則三十萬金為錢三十餘萬萬矣此當時鬻武功爵所直之數也夫民入錢買爵隨其錢之多少為爵級之髙下爵之髙下有定直而民錢之多少無定數若比而同之其失彌逺矣史記作直八十萬金索隠曰一金萬錢初一級十七萬自此以上每級加二萬至十七級合成三十四萬也吏道雜而多端官職耗廢矣師古曰耗亂也音莫報翻元狩元年冬十月上行幸雍祠五畤雍於用翻畤音止獲獸一角而足有五蹄有司言陛下肅祗郊祀上帝報享錫一角獸盖麟云麟麋身牛尾馬足五色圜蹄一角角端有肉音中鍾呂行中規矩游必擇地詳而後處不履生蟲不踐生草不羣居不侶行不入陷穽不罹羅網王者至仁則出今并州界有麟大小如鹿非瑞應麟也京房易傳曰麟麕身牛尾馬蹄有五采腹下黄髙丈二爾雅麟麕身牛尾一角盖麟似麕圓頂一角曰盖云者意其為麟而未知其果為麟也於是以慶五畤畤加一牛以燎畤音止久之有司又言元宜以天瑞命不宜以一二數一元曰建二元以長星曰光今元以郊得一角獸曰狩云於是濟北王濟北王勃淮南厲王子孝文十六年封衡山王孝景四年徙封濟北今王勃子成王胡也濟北王都盧後天漢四年國除入漢為太山郡濟子禮翻以為天子且封禪上書獻太山及其旁邑天子以他縣償之淮南王安與賓客左吳等日夜為反謀姓譜齊公族冇左右公子後因氏馬予按衛亦有左右公子姓譜之説非是魯冇左丘眀案輿地圖蘇林曰輿猶盡載之意索隠曰志林云輿地圖漢家所畫非出逺也部署兵所從入諸使者道長安來為妄言言上無男漢不治即喜即言漢廷治有男王怒以為妄言非也治直吏翻王召中郎伍被被皮義翻姓譜伍姓出于楚伍舉與謀反事被曰王安得此亡國之言乎臣見宫中生荆棘露霑衣也王怒繫伍被父母囚之三月復召問之復扶又翻被曰㫺秦為無道窮奢極虐百姓思亂者十家而六七髙皇帝起於行陳之中行户剛翻陳讀曰陣立為天子此所謂蹈瑕候間間古莧翻因秦之亡而動者也今大王見髙皇帝得天下之易也易以䜴翻獨不觀近世之吳楚乎事見十五卷景帝三年夫吳王王四郡四郡束陽郡鄣郡吳郡豫章郡王王下于况翻國冨民衆計定謀成舉兵而西然破於大梁謂為梁孝王所破也奔走而東身死祀絶者何誠逆天道而不知時也方今大王之兵衆不能十分吳楚之一天下安寜萬倍吳楚之時大王不從臣之計今見大王棄千乘之君賜絶命之書為羣臣先死於東宫也如淳曰東宫淮南王所居也王涕泣而起王有孽子不害最長庶生曰孽長知兩翻王弗愛王后太子皆不以為子兄數言后不以為子大子不以為兄數秩數也不害有子建材髙有氣常怨望太子隂使人告太子謀殺漢中尉事事見上元朔五年下廷尉治下遐嫁翻王患之欲發復問伍被曰復扶又翻公以為吳興兵是邪非邪被曰非也臣聞吳王悔之甚願王無為吳王之所悔王曰吳何知反漢将一日過成臯者四十餘人今我絶成臯之口據三川之險漢河南秦三川郡也其地當伊洛河三川之㑹招山東之兵舉事如此左吳趙賢朱驕如皆以為什事九成公獨以為有禍無福何也必如公言不可儌幸邪師古曰徼要也幸非妄之福也徼一堯翻被曰必不得已被有愚計當今諸侯無異心百姓無怨氣可偽為丞相御史請書言偽為丞相御史奏請于天子之書徙郡國豪傑髙貲於朔方益發甲卒急其㑹日又偽為詔獄書漢時左右都司空上林中都官皆有詔獄盖奉詔以鞫囚因以為名逮諸侯太子幸臣逮追對獄也如此則民怨諸侯懼即使辨士隨而説之説式芮翻下同儻可儌幸什得一乎王曰此可也雖然吾以為不至若此言不須為此也于是王乃作皇帝璽丞相御史大夫将軍軍吏中二千石及旁近郡太守都尉印漢使節使疏吏翻欲使人偽得罪而西言使人詐為得罪而逃去西如京師事大将軍一日發兵一日猶言一旦即刺殺大将軍刺七亦翻且曰漢廷大臣獨汲黯好直諫好呼到翻守節死義難惑以非至如説丞相𢎞等如發䝉振落耳發䝉謂物所䝉覆發而去之振落謂木葉将落振而墜之皆言其易説式芮翻王欲發國中兵恐其相二千石不聽王乃與伍被謀先殺相二千石又欲令人衣求盗衣求盗卒也掌逐捕盗賊漢書本紀髙帝時為亭長令求盗之薛治竹皮冠人衣於既翻持羽檄從東方來呼曰南越兵入界呼火故翻欲因以發兵會廷尉逮捕淮南太子淮南王聞之與太子謀召相二千石欲殺而發兵召相相至内史中尉皆不至王念獨殺相無益也即罷相罷遣出去也相息亮翻王猶豫計未决太子即自剄不殊晉灼曰不殊不死也師古曰言雖自刑而身首不能絶也剄古頂翻下同伍被自詣吏告與淮南王謀反蹤跡如此吏因捕太子王后圍王宫盡求捕王所與謀反賓客在國中者索得反具以聞上下公卿治其黨與索山客翻求也搜也上時掌翻下遐嫁翻聞上句斷使宗正以符節治王未至淮南王安自剄殺王后荼太子遷諸所與謀反者皆族天子以伍被雅辭多引漢之美欲勿誅雅素也雅辭素來言語也廷尉湯曰被首為王畫反計為于偽翻罪不可赦乃誅被侍中荘助素與淮南王相結交私論議王厚賂遺助遺于季翻上薄其罪欲勿誅張湯争以為助出入禁門腹心之臣而外與諸侯交私如此不誅後不可治助竟棄市衡山王上書請廢太子爽立其弟孝為太子爽聞即遣所善白嬴之長安上書言孝作輣車鍜矢與王御者姦欲以敗孝敗蒲邁翻會有司捕所與淮南王謀反者得陳喜于衡山王子孝家吏劾孝首匿喜師古曰為頭首而蔵匿之孝聞律先自告除其罪即先自告所與謀反者枚赫陳喜等公卿請逮捕衡山王治之王自剄死王后徐來太子爽及孝皆棄市所與謀反者皆族凡淮南衡山二獄所連引列侯二千石豪傑等死者數萬人夏四月赦天下丁卯立皇子據為太子年七嵗五月乙巳晦日有食之匈奴萬人入上谷殺數百人初張騫自月氏還事見上卷元朔四年氏音支具為天子言西域諸國風俗為于偽翻大宛在漢正西可萬里其俗土著耕田土著謂有城郭常居不隨水草移徙也宛於元翻著直畧翻多善馬馬汗血孟康曰大宛國有髙山其上有馬不可得因取五色母馬置其下與集生駒皆汗血因號天馬子云一説汗血者汗從肩􅈩出如血號能一日千里有城郭室屋如中國其東北則烏孫東則于窴于窴國在南山下居西城窴徒賢翻又徒見翻于窴之西則水皆西流注西海水經註崑崙山西有大水名新頭河度葱嶺入北天竺境又西南流屈而東南流逕中天竺國又西逕安息南注於雷翥海雷翥海即西海在安息之西犂軒之東東南連交州海其東水東流注鹽澤水經註河水一源出于窴國南山北流與葱嶺河合東注蒲昌海西域傳鹽澤一名蒲昌海去玉門陽闗三百餘里廣袤三百里其水停居冬夏不増减皆以為潜行地下南出於積石為中國河云玉門陽闗皆在敦煌西界括地志蒲昌海一名泑澤亦名鹽澤亦名輔日海亦名穿蘭亦名臨海在沙州西南玉門闗在沙州夀昌縣西六里鹽澤濳行地下其南則河源出焉索隠曰按漢書西南夷傳云河有兩源其一出葱嶺一出于窴山海經云河出崑崙東北隅郭璞云河出崑崙潜行地下至蒽嶺山于窴國復分流岐出合而東注泑澤已而復行積石為中國河泑澤即鹽澤也西域傳云于窴在南山下與郭璞註山海經不同廣志云蒲昌海在蒲類海東唐長慶中劉元鼎為盟㑹使言河之上流由洪濟西南行二千里水益狹冬春可渉夏秋乃勝舟其南三百里三山中髙四下曰歴山直大羊同國古所謂昆侖者也虜曰問摩黎山東距長安五千里河源其間流澄緩下稍合衆流色赤行益逺它水并注則濁河源東北直莫賀延磧尾隠測其地盖劔南之西鹽澤去長安可五千里匈奴右方居鹽澤以東至隴西長城即秦所築長城也秦築長城起臨洮臨洮縣漢屬隴西郡南接𦍑鬲漢道焉鬲與隔同烏孫康居奄蔡大月氏皆行國隨畜牧奄蔡國在康居西北臨大澤無涯盖北海云隨畜牧逐水草而居無城郭常處故曰行國與匈奴同俗大夏在大宛西南與大宛同俗臣在大夏時見卭竹杖蜀布臣瓚曰卭山名生竹髙節可作杖服䖍曰蜀布細布也史記正義曰卭都卭山出此竹因名卭竹節髙實中或竒生可為杖布土蘆布卭渠容翻問曰安得此大夏國人曰吾賈人往市之身毒孟康曰身毒即天竺也所謂浮屠胡也鄧展曰毒音篤李竒曰一名天篤師古曰亦曰捐毒賈音古索隠曰身音乾身毒在大夏東南可數千里其俗土著與大夏同以騫度之著直畧翻度徒洛翻大夏去漢萬二千里居漢西南今身毒國又居大夏東南數千里有蜀物此其去蜀不逺矣今使大夏從𦍑中險𦍑人惡之使䟽吏翻惡烏路翻少北則為匈奴所得少詩沼翻從蜀宜徑又無寇師古曰宜當也逕直也從蜀向大夏其道當直天子既聞大宛及大夏安息之屬安息治番兠城臨媯水去長安萬一千六百里其俗亦土著皆大國多竒物土著頗與中國同業而兵弱貴漢財物其北有大月氏康居之屬兵强可以賂遺設利朝也師古曰設施也施之以利誘令入朝遺于季翻朝直遥翻誠得而以義屬之師古曰謂不以兵革則廣地萬里重九譯譯傳言之人周官象胥之職也逺方之人言語不同更歴九譯乃能通於中國重直龍翻致殊俗威德徧於四海欣然以騫言為然乃令騫因蜀犍為發間使王然于等四道並出師古曰間使者求問隙而行間古莧翻使䟽吏翻出駹出冉出徙出卭僰指求身毒國徙斯榆也以手㸃物為指使之出求路指身毒而行徙讀與斯同僰蒲墨翻各行一二千里其北方閉氐莋南方閉嶲昆眀服䖍曰漢使見閉於夷也師古曰嶲即今嶲州也昆眀又在其西南即今南寜州諸㸑所居是其地莋音昨又音作嶲先蕊翻昆眀之屬無君長善寇盗輒殺畧漢使終莫得通於是漢以求身毒道始通滇國滇國地有滇池因以名國楚使莊蹻以兵定夜郎諸國至滇池因留王其地華陽國志滇池周回三百里所出深廣下流淺狹如倒流故謂之滇池漢為益州郡後改為永昌郡魏晉之間為晉寜郡唐為昆州括地志滇池澤在昆州晉寜縣西南三十里長知兩翻滇音顛滇王當𦍑謂漢使者曰漢孰與我大及夜郎侯亦然以道不通故各自以為一州主不知漢廣大使者還因盛言滇大國足事親附天子注意焉乃復事西南夷元朔四年罷西夷至是復通師古曰事謂經畧通之専以為事也復扶又翻二年冬十月上幸雍祠五畤雍於用翻畤音止三月戊寅平津獻侯公孫𢎞薨壬辰以御史大夫樂安侯李蔡為丞相廷尉張湯為御史大夫考異曰漢書百官公卿表元狩三年三月壬辰廷尉張湯為御史大夫六年有罪自殺史記将相名臣表元狩二年御史大夫湯按李蔡既遷湯即應補其缺豈可留之朞年復與李蔡為丞相月日正同乎又按長歴三年三月無壬辰又以得罪之年推之在今年眀矣今從史記表霍去病為票騎将軍票騎将軍始此票頻妙翻将萬騎出隴西擊匈奴歴五王國轉戰六日過焉支山千餘里括地志焉支山一名刪丹山在甘州刪丹縣東南五十里焉音烟殺折蘭王斬盧侯王張晏曰折蘭盧侯胡國名也殺者殺之而已斬者獲其首也師古曰折蘭匈奴中姓也今鮮卑中有是蘭姓者即其種也折上列翻執渾邪王子師古曰渾下昆翻及相國都尉獲首虜八千九百餘級收休屠王祭天金人孟康曰匈奴祭天處本在雲陽甘泉山下秦擊奪其地後徙之休屠王右地故休屠王有祭天金人像也如淳曰祭天以金人為主也張晏曰佛徒祠金人也師古曰作金人以為天神之像而祭之今之佛像是其遺法屠音儲詔益封去病二千户夏去病復與合騎侯公孫敖将數萬騎俱出北地異道復扶又翻衛尉張騫郎中令李廣俱出右北平異道廣将四千騎先行可數百里騫将萬騎在後匈奴左賢王将四萬騎圍廣廣軍士皆恐廣乃使其子敢獨與數十騎馳貫胡騎貫穿也出其左右而還告廣曰胡虜易與耳易以䜴翻軍士乃安廣為圜陳外嚮陳讀曰陣胡急擊之矢下如雨漢兵死者過半漢矢且盡廣乃令士持滿毋發師古曰注矢於弓弩而引滿之不發矢也而廣身自以大黄射其裨将殺數人徐廣曰南都賦黄間機張善弩之名裴駰曰案鄭德曰黄肩弩淵中黄朱之孟康曰太公六韜云陷堅敗强敵用大黄連弩韋昭曰角弩色黄而體大也射而亦翻胡虜益解會日暮吏士皆無人色師古曰言懼甚而廣意氣自如師古曰自如猶云如舊益治軍師古曰廵部曲整行陳也治直之翻軍中皆服其勇眀日復力戰復扶又翻死者過半所殺亦過當會博望侯軍亦至張騫從大将軍撃匈奴知水艸處軍得以不乏封博望侯師古曰取其能廣博瞻望班志博望侯國属南陽郡括地志博望故城在鄧州向城縣東南四十五里匈奴軍乃解去漢軍罷罷讀曰疲弗能追罷歸漢法博望侯留遲後期當死贖為庶人廣軍功自如無賞自如言功過正相當也廣軍失亡多而殺虜亦過當故曰自如而票騎将軍去病深入二千餘里與合騎侯失不相得票騎将軍踰居延居延澤古文以為流沙帝開置居延縣屬張掖郡使路博德築遮虜障于其北過小月氐匈奴破大月氐月氐西擊大夏而臣之其餘小衆不能去者保南山𦍑號小月氐至祁連山得單桓酋涂王張晏曰單桓酋涂皆胡王也師古曰酋才猶翻涂音塗及相國都尉以衆降者二千五百人降户江翻斬首虜三萬二百級獲裨小王七十餘人天子益封去病五千户封其裨将有功者鷹擊司馬趙破奴為從票侯以從票騎有功因以為號功臣侯表不書食邑之地校尉髙不識為冝冠侯功臣表宜冠侯食邑於琅邪之昌縣校尉僕多為煇渠侯僕多本匈奴種來降漢功臣表僕多作僕朋煇渠侯食邑于南陽之魯陽縣合騎侯敖坐行留不與票騎會當斬贖為庶人是時諸宿将所将士馬兵皆不如票騎票騎所将常選師古曰選取驍鋭索隠曰選宣變翻然亦敢深入常與壮騎先其大軍先悉薦翻軍亦有天幸未嘗困絶也而諸宿将常留落不偶師古曰留謂遲留落謂墜落故不諧耦而無功也由此票騎日以親貴比大将軍矣匈奴入代雁門殺畧數百人江都王建建易王非之子景帝之孫與其父易王所幸淖姬等及女弟徴臣姦淖鄭氏音卓師古音奴教翻淖姓也戰國時楚有淖齒建游雷陂雷陂即廣陵之雷塘在今揚州堡城之北平岡之上天大風建使郎二人乘小船入陂中船覆兩郎溺攀船乍見乍没見賢徧翻建臨觀大笑令勿救皆死凡殺不辜三十五人専為滛虐自知罪多恐誅與其后成光共使越婢下神祝詛上祝織救翻詛荘助翻又聞淮南衡山隂謀建亦作兵器刻皇帝璽為反具事發覺有司請捕誅建自殺后成光等皆棄市國除膠東康王寄薨寄景帝子中二年受封秋匈奴渾邪王降是時單于怒渾邪王休屠王居西方為漢所殺虜數萬人欲召誅之渾邪王與休屠王恐謀降漢先遣使向邊境要遮漢人要一遥翻令報天子是時大行李息将城河上得渾邪王使使疏吏翻馳傳以聞傳張戀翻下同天子聞之恐其以詐降而襲邊乃令票騎将軍将兵往迎之休屠王後悔渾邪王殺之并其衆票騎既渡河與渾邪王衆相望渾邪王禆将見漢軍而多不欲降者師古曰恐被掩覆也頗遁去票騎乃馳入得與渾邪王相見斬其欲亡者八千人遂獨遣渾邪王乘傳詣至行在所傳音張戀翻盡将其衆渡河降者四萬餘人號稱十萬既至長安天子所以賞賜者數十巨萬封渾邪王萬户為漯隂侯班志漯隂縣屬平原郡漯他合翻封其禆王呼毒尼等四人皆為列侯呼毒尼為下摩侯雁疪為煇渠侯禽黎為河綦侯文當户調雖為常樂侯文穎曰雁音鷹疪音庇廕之庇師古曰疪匹履翻益封票騎千七百户渾邪之降也漢發車二萬乘以迎之考異曰漢書食貨志云三萬兩今侯史記平凖書汲黯傳縣官無錢從民貰馬貰始制翻貸也師古曰賖買也民或匿馬馬不具上怒欲斬長安令右内史汲黯曰長安令無罪獨斬臣黯民乃肻出馬且匈奴畔其主而降漢漢徐以縣次傳之何至令天下騷動罷敝中國罷讀曰疲而以事夷狄之人乎上黙然及渾邪至賈人與市者坐當死五百餘人黯請間見髙門晉灼曰三輔黄圖未央宫中有髙門殿賈音古見賢遍翻曰夫匈奴攻當路塞言塞障當匈奴所入之路也絶和親中國興兵誅之死傷者不可勝計勝音升而費以巨萬百數師古曰即數百鉅萬也臣愚以為陛下得胡人皆以為奴婢以賜從軍死事者家所鹵獲因予之鹵與虜同予讀曰與以謝天下之苦塞百姓之心師古曰塞滿也塞悉則翻今縱不能渾邪率數萬之衆來降虚府庫賞賜發良民侍養譬若奉驕子愚民安知市買長安中物而文吏繩以為闌出財物于邊闗乎應劭曰闌妄也律胡市吏民不得持兵器及錢出闗雖於京師市買其法一也臣瓉曰無符傳出入為闌也陛下縱不能得匈奴之資以謝天下又以㣲文殺無知者五百餘人是所謂庇其葉而傷其枝者也臣竊為陛下不取也為于偽翻上黙然不許曰吾久不聞汲黯之言今又復妄發矣居頃之乃分徙降者邊五郡故塞外而皆在河南因其故俗為五屬國五郡謂隴西北地丄郡朔方雲中也故塞秦之先與匈奴所闗之塞自秦使蒙恬奪匈奴地而邊闗益斥秦項之亂冐頓南侵與中國闗於故塞及衛青收河南而邊關復䝉恬之舊所謂故塞外其地在北河之南也師古曰凡言屬國存其國號而屬漢朝故曰屬國史記正義曰以來降之民徙置五郡各依本國之俗而屬於漢故曰屬國而金城河西河水出金城河闗縣西南塞外積石山東流逕金城郡界自允吾以西通謂之金城河渡河而西則武威等四郡之地然金城郡昭帝於元始六年方置史追書也西並南山至鹽澤空無匈奴並歩浪翻匈奴時有候者到而希矣休屠王太子日磾與母閼氏弟倫俱没入官輸黄門養馬久之磾丁奚翻班表黄門屬少府師古曰黄門之署職任親近以供天子百物在焉閼氏音烟支帝游宴見馬師古曰方於游宴之時而召閲諸馬後宫滿側日磾等數十人牽馬過殿下莫不竊視師古曰視宫人至日磾獨不敢日磾長八尺二寸長直亮翻容貌甚嚴馬又肥好上異而問之具以本状對上竒焉即日賜湯沐衣冠拜為馬監黄門有馬監狗監遷侍中駙馬都尉光禄大夫侍中得出入禁中駙馬都尉帝所置秩比二千石師古曰駙副馬也非正駕車皆為副馬一曰駙近也疾也光禄大夫本中大夫帝改其名日磾既親近近其靳翻未嘗有過失上甚信愛之賞賜累千金出則驂乘乘繩正翻入侍左右貴戚多竊怨曰陛下妄得一胡兒反貴重之上聞愈厚焉以休屠作金人為祭天主故賜日磾姓金氏為金氏貴顯張本三年春有星孛于東方孛蒲内翻夏五月赦天下淮南王之謀反也膠東康王寄㣲聞其事私作戰守僃及吏治淮南事辭出之師古曰獄辭所連發出其事寄母王夫人即皇太后之女弟也於上㝡親意自傷發病而死不敢置後上聞而憐之立其長子賢為膠東王康王寄去年薨今年方置後又封其所愛少子慶為六安王王故衡山王地衡山國都六故改為六安秋匈奴入右北平定襄各數萬騎殺畧千餘人山東大水民多飢乏天子遣使者虛郡國倉廥以振貧民廥工外翻芻藁之蔵也一曰庫廐名猶不足又募豪冨吏民能假貸貧民者以名聞尚不能相救乃徙貧民於闗以西及充朔方以南新秦中應劭曰秦遣蒙恬却匈奴得其河南造陽之地千里地甚好于是為築城郭徙民充之名曰新秦四方錯雜奢險不同今俗名新富貴者為新秦由是名也七十餘萬口衣食皆仰給縣官數嵗假予産業使者分部䕶之仰牛向翻予讀曰與分扶問翻冠盖相望其費以億計不可勝數勝音升漢既得渾邪王地隴西北地上郡益少胡冦詔减三郡戍卒之半以寛天下之繇繇讀曰徭上将討昆眀以其閉漢使故也以昆眀有滇池方三百里乃作昆眀池以習水戰昆眀池在長安西南周回四十里三輔舊事昆眀池盖地三百二十頃是時法既益嚴吏多廢免兵革數動數所角翻民多買復師古曰入財于官以取優復復方目翻及五大夫五大夫舊爵二十等之第九級也漢法至此始免徭役徴發之士益鮮鮮少也先淺翻於是除千夫五大夫為吏不欲者出馬師古曰千夫五大夫不欲為吏者使之出馬也干大武功爵第七級以故吏弄法皆謫令伐棘上林穿昆眀池是嵗得神馬於渥洼水中李斐曰南陽新野有暴利長當武帝時遭刑屯田敦煌界數於此水旁見羣野馬中冇竒馬與凡馬異來飲此水利長先作土人持勒絆於水傍後馬玩習久之代土人持勒絆収得其馬獻之欲神異此馬云從水中出渥音握洼於佳翻上方立樂府樂府冇安世房中歌十七章郊祀歌十九章使童男女七十人歌之師古曰始置之也樂府之名盖起於此哀帝時罷之使司馬相如等造為詩賦以宦者李延年為協律都尉協律都尉先無此官武帝始置於此佩二千石印絃次初詩以合八音之調詩多爾雅之文初詩新造之詩也八音金石􅁝竹匏土革木也調徒釣翻爾惟三卷二千篇文帝時列於學官張晏曰爾近也雅正也通一經之士不能獨知其辭必集會五經家相與共講習讀之乃能通知其意漢時五經之學各専門名家故通一經者不能盡通歌詩之辭意必集五經家相與講讀乃得通也及得神馬次以為歌汲黯曰凡王者作樂上以承祖宗下以化兆民今陛下得馬詩以為歌協於宗廟先帝百姓豈能知其音邪詩大序曰聲成文謂之音注云聲謂宫商角徵羽也成文謂五聲上下相應鄭康成曰五聲雜比曰音單出曰聲上黙然不説説讀曰悦九考異曰史記樂書武帝作十章歌常以正月上辛祠太乙甘泉使僮男僮女七十人俱歌又常得神馬渥洼水中復次以為太一之歌後伐大宛得千里馬次以為歌中尉汲黯進曰陛下得馬詩以為歌云云丞相公孫𢎞曰黯毁謗聖制當族漢書禮樂志武帝定郊祀之禮祠太一於甘泉祭后土於汾隂乃立樂府作十九章之歌以正月上辛用事甘泉圜丘按天馬歌本志云元狩三年馬生渥洼水中作武紀云元鼎四年秋馬生渥洼水中五年十一月立泰畤於甘泉太初四年貳師獲汗血馬作西極天馬之歌公孫𢎞以元狩二年甍汲黯以元狩三年免右内史五年為淮陽太守元鼎五年卒又黯未嘗為中尉或者馬生渥洼水作歌在元狩三年汲黯為右内史而譏之言當族者非公孫𢎞也雖未立泰畤或以歌之於郊廟其十九章之歌當時未能盡備也上招延士大夫常如不足然性嚴峻羣臣雖素所愛信者或小有犯法或欺罔輒按誅之無所寛假汲黯諌曰陛下求賢甚勞未盡其用輒已殺之以有限之士恣無已之誅臣恐天下賢才将盡陛下誰與共為治乎黯言之甚怒上笑而諭之黯言之甚怒上乃笑而諭之即其笑怒之間而觀其君臣相與之意則帝之於黯非但能容其直而從容不迫方喻之以其所見使他人處此固将順之不暇矣而黯自言其心猶以為非此豈靣從退有後言者哉黯之事君固人所難能而帝之容黯亦非後世之君所可及矣治直吏翻曰何世無才患人不能識之耳茍能識之何患無人夫所謂才者猶有用之器也有才而不肻盡用與無才同不殺何施黯曰臣雖不能以言屈陛下而心猶以為非願陛下自今改之無以臣為愚而不知理也上顧羣臣曰黯自言為便辟則不可朱熹曰便者便人之所好辟者避人之所惡便毗連翻辟讀曰僻自言為愚豈不信然乎四年冬有司言縣官用度太空而冨商大賈冶鑄煮鹽財或絫萬金不佐國家之急賈音古絫古累字請更錢造幣以贍用而摧浮淫并兼之徒是時禁苑有白鹿而少府多銀錫乃以白鹿皮方尺縁以藻繢縁以絹翻師古曰繢繡也繢五采而為之繢黄外翻為皮幣直四十萬王侯宗室朝覲聘享必以皮幣薦璧然后得行后與後同又造銀錫為白金三品如淳曰雜銀錫為白金大者圜之其文龍直三千次方之其文馬直五百小者橢之其文龜直三百時議以為天用莫如龍地用莫如馬人用莫如龜故以為白金三品之文師古曰橢圜而長也音他果翻令縣官銷半兩錢更鑄三銖錢建元五年廢三銖錢行半兩錢更工衡翻盗鑄諸金錢罪皆死而吏民之盗鑄白金者不可勝數勝音升於是以東郭咸陽孔僅為大農丞領鹽鐡事師古曰二人也姓東郭名咸陽姓孔名僅班表大農令有兩丞齊有大夫東郭氏桑𢎞羊以計筭用事姓譜桑秦大夫子桑之後咸陽齊之大煮鹽僅南陽大冶皆致生絫千金𢎞羊洛陽賈人子以心計心計者不必用籌筭而知其數也賈音古下同年十三侍中三人言利事析秋毫矣毫至秋而鋭小言其剖析微細雖秋毫之小亦可分而為二也詔禁民敢私鑄鐡器煮鹽者􅎂左趾韋昭曰釱以鐡為之著左足以代刖也索隠曰三蒼云􅎂踏脚鉗也張斐漢晉律序状如跟衣著足下重六斤以代刖至魏武改以滅代􅎂也晉律鉗重二斤長翹一尺五寸師古曰􅎂徒計翻没入其器物公卿又請令諸賈人末作各以其物自占師古曰占隠度也各隠度其財物之多少而為名簿送之於官也占之贍翻下同率緡錢二千而一算李斐曰緡􅁝也以貫錢一貫千錢出算二十也瓉曰此緡錢為是儲緡錢也故隨其用所施而出筭予謂率計緡錢二千而出一筭筭百二十錢緡眉巾翻及民有軺車若船五丈以上者皆有算軺小車也弋招翻匿不自占占不悉戍邊一嵗没入緡錢匿蔵也悉盡也蔵匿而不自占占而不盡者罸戌邊一嵗没其官入錢有能告者以其半畀之其法大抵出張湯湯每朝奏事語國家用日晏師古曰論事既多至于日晚朝直遥翻天子忘食丞相充位但充其位無所建眀天下事皆决于湯百姓騷動不安其生咸指怨湯初河南人卜式數請輸財縣官以助邊數所角翻天子使使問式欲官乎式曰臣少田牧不習仕宦不願也少詩照翻使者問曰家豈有寃欲言事乎式曰臣生與人無分争邑人貧者貸之不善者教之所居人皆從式式何故見寃於人無所欲言也使者曰茍如此子何欲而然式曰天子誅匈奴愚以為賢者宜死節于邊有財者宜輸委委于偽翻蓄也宜輸其所蓄也如此而匈奴可滅也上由是賢之欲尊顯以風百姓師古曰風讀曰諷又如字乃召拜式為中郎爵左庶長賜田十頃布告天下使眀知之未㡬又擢式為齊太傅齊王次昌元朔三年薨無後國除元狩六年始封皇子閎為齊王式盖傅閎也史因其輸財得官而終書之㡬居豈翻春有星孛于東北孛蒲内翻夏有長星出于西北上與諸将議曰翕侯趙信為單于畫計為于偽翻常以為漢兵不能度幕輕留幕沙漠也師古曰言輕易漢軍留而不去也一曰謂漢軍不能輕入而久留也予謂後説是今大發士卒其埶必得所欲乃粟馬十萬師古曰以粟秣馬也令大将軍青票騎将軍去病各将五萬騎私負從馬復四萬匹師古曰私負衣装及私将馬自從者皆非公家所發之限從才用翻歩兵轉者踵軍後又數十萬人師古曰轉者謂運輜重也踵接也而敢力戰深入之士皆屬票騎票騎始為出定襄當單于捕虜言單于東乃更令票騎出代郡令大将軍出定襄郎中令李廣數自請行數所角翻天子以為老弗許良久乃許之以為前将軍太僕公孫賀為左将軍主爵都尉趙食其為右将軍食其音異箕平陽侯曹襄為後将軍皆屬大将軍趙信為單于謀曰漢兵既度幕人馬罷匈奴可坐收虜耳師古曰言收虜漢軍人馬可不費力故言坐罷讀曰疲乃悉逺北其輜重師古曰送輜重逺去令處北也以精兵待幕比大将軍既出塞捕虜知單于所居乃自以精兵走之走音奏而令前将軍廣并於右将軍軍出東道師古曰并合也合軍而同道東道回逺而水草少師古曰回繞也曲也户悔翻廣自請曰臣部為前将軍今大将軍乃徙令臣出東道且臣結髮而與匈奴戰今乃一得當單于結髪者言始勝冠即在戰陣及今得當單于也臣願居前先死單于師古曰致死而取單于大将軍亦隂受上誡以為李廣老數竒孟康曰竒隻不偶也如淳曰數為匈奴所敗為竒不耦師古曰言廣命隻不耦合也孟説是矣數所角翻竒居宜翻毋令當單于恐不得所欲師古曰謂不勝敵也余謂指欲禽單于脱有邂逅失之為不得所欲而公孫敖新失侯大将軍亦欲使敖與俱當單于敖失侯見上二年青本與敖友又脱青于阸故青欲使當單于而立功故徙前将軍廣廣知之固自辭於大将軍大将軍不聽廣不謝而起行意甚愠怒愠于運翻大将軍出塞千餘里度幕見單于兵陳而待言結陳以待敵也陳與陣同于是大将軍令武剛車自環為營張晏曰武剛車兵車也師古曰環繞也續漢志諸軍有矛㦸其飾幡斿旗幟有巾有盖謂之武剛車環音宦而縱五千騎往當匈奴匈奴亦縱可萬騎會日且入言日欲没也大風起砂礫擊面師古曰礫小石也音歴兩軍不相見漢益縱左右翼繞單于師古曰翼謂左右舒引其兵如烏之張翼單于視漢兵多而士馬尚彊自度戰不能如漢兵度徒洛翻單于遂乘六騾壮騎可數百直冒漢圍西北馳去師古曰騾者驢種馬子堅忍單于自乘善走騾而壮騎隨之也冒犯也騾來戈翻冐莫克翻時已昏漢匈奴相紛拏師古曰紛拏亂相持摶也拏女居翻殺傷大當殺傷各大相當漢軍左校捕虜言單于未昏而去漢軍發輕騎夜追之大将軍軍因隨其後匈奴兵亦散走遲眀遲直二翻行二百餘里不得單于捕斬首虜萬九千級遂至窴顔山趙信城窴徒賢翻如淳曰趙信降匈奴築城居之得匈奴積粟食軍師古曰食讀曰飤留一日悉燒其城餘粟而歸前将軍廣與右将軍食其軍無導惑失道後大将軍師古曰惑迷也在後不及期也不及單于戰大将軍引還過幕南乃遇二将軍大将軍使長史責問廣食其失道状急責廣之幕府對簿師古曰簿謂文状也廣曰諸校尉無罪乃我自失道吾今自上簿至幕府上時掌翻廣謂其麾下曰廣結髪與匈奴大小七十餘戰今幸從大将軍出接單于兵而大将軍徙廣部行回逺而又迷失道豈非天哉且廣年六十餘矣終不能復對刀筆之吏復扶又翻遂引刀自剄剄古頂翻廣為人㢘得賞賜輒分其麾下飲食與士共之為二千石四十餘年家無餘財猨臂善射如淳曰臂如猨臂通肩也度不中不發度徒洛翻中竹仲翻将兵乏絶之處孔穎達曰暫無曰乏不續曰絶見水士卒不盡飲廣不近水近其靳翻士卒不盡食廣不嘗食士以此愛樂為用樂音洛及死一軍皆哭百姓聞之知與不知無老壮皆為垂涕師古曰知謂素相䜟知也為于偽翻而右将軍獨下吏下遐嫁翻當死贖為庶人單于之遁走其兵往往與漢兵相亂而隨單于單于久不與其大衆相得其右谷蠡王以為單于死乃自立為單于谷蠡音鹿黎十餘日真單于復得其衆而右谷蠡王乃去其單于號師古曰去除也羗呂翻票騎将軍騎兵車重與大将軍軍等重直用翻而無裨将悉以李敢等為大校當裨将校户教翻出代右北平二千餘里絶大幕直左方兵師古曰直當也匈奴分其國為左右諸左王将居東方直上谷以東接濊貃朝鮮右王将居西方直上郡以西接氐羌故謂之左右方亦謂之左右地獲屯頭王韓王等三人将軍相國當户都尉八十三人封狼居胥山禪于姑衍登臨翰海張晏曰登海邊山以望海也有大功故增山而廣地也如淳曰翰海北海名崔浩曰羣鳥之所解羽故曰翰海廣志瀚海在沙漠北師古曰積土増髙曰封為墠祭地曰禪鹵獲七萬四百四十三級天子以五千八百户益封票騎将軍又封其所部右北平太守路博德等四人為列侯路博徳為邳離侯衛山為義陽侯復陸支為杜侯伊即靬為衆利侯從票侯破奴等二人益封校尉敢為闗内侯食邑軍吏卒為官賞賜甚多而大将軍不得益封軍吏卒皆無封侯者兩軍之出塞塞閲官及私馬凡十四萬匹而復入塞者不滿三萬匹乃益置大司馬位大将軍票騎将軍皆為大司馬定令令票騎将軍秩禄與大将軍等應劭曰司馬主武事諸武官亦以為號漢官儀曰時議者以為軍中有侯司馬故加大為大司馬以别異之自此票騎将軍同大将軍品秩位亞丞相自是之後大将軍青日退而票騎日益貴大将軍故人門下士多去事票騎輙得官爵唯任安不肻票騎将軍為人少言不泄孔文祥曰謂質重少言膽氣在中也有氣敢往天子嘗欲教之孫吳兵法孫孫武吳吳起也對曰顧方略何如耳不至學古兵法天子為治第令票騎視之對曰匈奴未滅無以家為也治直之翻由此上益重愛之然少貴不省士師古曰省視也言不恤視軍士也少詩沼翻其從軍天子為遣太官齎數十乘班表太官有令有丞主膳食師古曰齎與資同予謂音則兮翻亦通裝也為于偽翻乘繩證翻既還重車餘棄粱肉師古曰重直用翻粱粟類也米之善者而士有飢者其在塞外卒乏糧或不能自振而票騎尚穿域蹋鞠服䖍曰穿域作鞠室也師古曰鞫以皮為之實以毛蹴蹋為戲也劉向别録曰蹴鞫相傳以為黄帝所作或曰起戰國之時所以講武知有材也蹋徒臘翻鞠居六翻事多此類大将軍為人仁喜士􅅲讓師古曰喜許吏翻以和柔自媚於上兩人志操如此操七到翻是時漢所殺虜匈奴合八九萬而漢士卒物故亦數萬魏臺訪議髙堂隆曰聞之先師物無也故事也言無復所能於事也索隠曰漢以來謂死為物故就朽故也師古曰物故謂死也言其同於鬼物而故也盖漢軍死者亦數萬是後匈奴逺遁而幕南無王庭冒頓之强盡取蒙恬所奪匈奴地而王庭列置於幕南今匈奴為漢所攻逺遁幕北故幕南無王庭也漢渡河自朔方以西至令居班志令居縣屬金城郡令音零往往通渠置田官置官以主屯田吏卒五六萬人稍蠶食匈奴以北蠶食言如蠶之食葉以漸而侵其地也然亦以馬少不復大出擊匈奴矣少詩沼翻復扶又翻匈奴用趙信計遣使於漢好辭請和親天子下其議下遐嫁翻或言和親或言遂臣之丞相長史任敞曰班表丞相冇二長史秩二千石任音壬匈奴新破困宜可使為外臣朝請於邊漢使任敞於單于單于大怒留之不遣朝直遥翻請才性翻使疏吏翻是時博士狄山議以為和親便姓譜狄春秋狄國之後又曰周文王封少子於狄城上以問張湯湯曰此愚儒無知狄山曰臣固愚愚忠若御史大夫湯乃詐忠于是上作色曰吾使生居一郡師古曰博士儒官也故呼為生能無使虜入盗乎曰不能曰居一縣對曰不能復曰居一障間師古曰障謂塞上要險之處别築為城因置吏士而為蔽障以禦冦也障之尚翻又漢制每塞要處别築為城置人鎮守謂之候城此即障也山自度辯窮且下吏師古曰度計也見詰辯而辭窮當下吏也下遐嫁翻曰能於是上遣山乘障師古曰乘登也登而守之至月餘匈奴斬山頭而去自是之後羣臣震慴師古曰震動也慴失氣也慴之涉翻無敢忤湯者忤五故翻是嵗汲黯坐法免以定襄太守義縱為右内史河内太守王温舒為中尉守式又翻先是寗成為闗都尉函谷闗都尉也先悉薦翻吏民出入闗者號曰寜見乳虎無值寗成之怒師古曰猛虎産乳䕶養其子則博噬過當故以為喻乳人喻翻及義縱為南陽太守義姓也縱其名至闗寗成側行送迎側行不敢正行言恭甚至郡遂按寗氏破碎其家南陽吏民重足一迹言絫足也畏懼之甚重直龍翻後徙定襄太守初至掩定襄獄中重罪輕繫二百餘人及賓客昆弟私入視亦二百餘人一捕鞫日為死罪解脱一切皆捕而鞫問之也服䖍曰律諸囚徒私解脱桎梏鉗赭加罪一等為人解脱與同罪縱鞫相賂餉者二百人以為解脱死罪盡殺之師古曰鞫窮也謂窮治也是日皆報殺四百餘人師古曰奏請得報而論殺原父曰縱掩定襄獄一切捕鞫而云是日皆報殺則非奏請報可之報矣然則以論次為報也其後郡中不寒而栗是時趙禹張湯以深刻為九卿然其治尚輔法而行縱専以鷹擊為治師古曰言如鷹隼之擊也治直吏翻王温舒始為廣平都尉廣平本屬趙國景武之間分為廣平郡征和元年立為平王國擇郡中豪敢往吏十餘人師古曰豪桀而性果敢一往無所顧者以為吏也以為爪牙皆把其隂重罪而縱使督盗賊師古曰縱放也督察視也快其意所欲得此人雖有百罪弗法師古曰言所捕盗賊得其人而快温舒意則不問其先所犯罪也弗法謂弗行法也即有避因其事夷之亦滅宗師古曰避謂不盡意捕擊也以其故齊趙之郊盗賊不敢近廣平近其靳翻廣平聲為道不拾遺遷河内太守以九月至令郡具馬五十匹為驛師古曰以私馬於道上往往置驛自河内至長安捕郡中豪猾相連坐千餘家上書請大者至族小者乃死家盡没入償臧師古曰以臧獲罪者既没入之又令出倍臧或收入官或還其主也予謂没入共家以償所受之臧其義似逕臧讀曰贓奏行不過二三日得可奏而天子可之謂之得可事論報至流血十餘里河内皆怪其奏以為神速盡十二月郡中毋聲毋敢夜行古毋無通野無犬吠之盗其頗不得失之旁郡國追求會春温舒􅉐足歎曰嗟乎令冬月益展一月足吾事矣師古曰立春之後不復行刑故云然展伸也天子聞之皆以為能故擢為中二千石郡守二千石正卿及列卿皆中二千石齊人少翁以鬼神方見上上有所幸王夫人卒上夫人齊王閎之母少翁以方夜致鬼如王夫人之貌天子自帷中望見焉考異曰漢書以此事置李夫人𫝊中古今相承皆以為李夫人事史記封禪書少翁見上上有所幸王夫人卒少翁以方夜致王夫人及竈鬼之貌云按李夫人卒時少翁死已久漢書誤也今從史記于是乃拜少翁為文成将軍賞賜甚多以客禮禮之文成又勸上作甘泉宫中為臺室畫天地太一諸鬼神而置祭具以致天神居嵗餘其方益衰神不至乃為帛書以飯牛師古曰謂雜艸以飯牛也飯扶晚翻佯不知言曰此牛腹中有竒殺視得書書言甚怪天子識其手書謂識其親書手蹟也問其人果是偽書于是誅文成将軍而隠之隠謂秘誅文成之事不令人知之也資治通鑑卷十九
