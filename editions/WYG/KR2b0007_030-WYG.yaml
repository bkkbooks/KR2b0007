front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷三十宋司馬光撰胡三省音註漢紀二十二起屠維赤奮若盡著雍閹茂凡十年孝成皇帝上之上荀悦曰諱驁字太孫驁之字曰俊應劭曰諡法安民立政曰成建始元年春正月乙丑悼考廟災宣帝尊史皇孫曰悼廟石顯遷長信中太僕百官表長信中太僕掌皇太后輿馬不常置秩中二千石顯既失倚離權顯嬖於元帝帝崩為失倚自中書令樞機之官遷太后宮官為離權離力智翻於是丞相御史條奏顯舊惡及其黨牢梁陳順皆免官顯與妻子徙歸故郡憂懣不食道死顯故濟南人師古曰懣音悶諸所交結以顯為官者皆廢罷少府五鹿充宗左遷𤣥菟太守菟音塗守式又翻御史中丞伊嘉為鴈門都尉姓譜伊姓出於伊尹司𨽻校尉涿郡王尊劾奏丞相衡御史大夫譚劾户槩翻又户得翻知顯等顓權擅執大作威福為海内患害不以時白奏行罰而阿諛曲從附下罔上懷邪迷國無大臣輔政之義皆不道在赦令前去年七月大赦赦後衡譚舉奏顯不自陳不忠之罪而反揚著先帝任用傾覆之徒妄言百官畏之甚於主上卑君尊臣非所宜稱失大臣體於是衡慙懼免冠謝罪上丞相侯印綬衡封樂安侯天子以新即位重傷大臣乃左遷尊為髙陵令然羣下多是尊者衡嘿嘿不自安每有水旱連乞骸骨讓位上輒以詔書慰撫不許立故河間王元弟上郡庫令良為河間王元廢事見上卷元帝建昭元年如淳曰漢北邊郡庫官兵器之所藏故置令有星孛于營室晉書天文志營室二星天子之宮也一曰𤣥宮一曰清廟又為軍糧之府及士功事孛蒲内翻赦天下壬子封舅諸吏光禄大夫關内侯王崇為安成侯恩澤侯表安成侯食邑於汝南賜舅譚商立根逢時爵闗内侯夏四月黃霧四塞元命包曰隂陽亂為霧爾雅曰地氣發天不應曰霧釋名曰霧冒也氣蒙冒地之物也師古曰塞滿也言四方皆滿塞悉則翻詔博問公卿大夫無有所諱諌大夫楊興博士駟勝等皆以為隂盛侵陽之氣也髙祖之約非功臣不侯今太后諸弟皆以無功為侯外戚未曽有也故天為見異師古曰見顯示也為于偽翻見賢遍翻於是大将軍鳳懼上書乞骸骨辭職上優詔不許御史中丞東海薛宣上疏曰陛下至徳仁厚而嘉氣尚凝師古曰凝謂不通也隂陽不和殆吏多苛政部刺史或不循守條職師古曰刺史所察本有六條今則踰越故事信意舉劾妄為苛刻也漢官典職儀云刺史班宣周行郡國省察治状黜陟能否斷治寃獄以六條問事非條所問即不省一條强宗豪右田宅踰制以彊陵弱以衆暴寡二條二千石不奉詔書遵承典制倍公向私旁詔牟利侵漁百姓聚歛為姦三條二千石不恤疑獄風厲殺人怒則任刑喜則淫賞煩擾刻暴剥截黎元為百姓所疾山崩石裂妖祥訛言四條二千石選署不平茍阿所愛蔽賢寵頑五條二千石子弟恃怙榮埶請托所監六條二千石違公下比阿附豪彊通行貨賂割損正令舉錯各以其意多與郡縣事師古曰錯置也音千故翻與讀曰豫豫干也至開私門聴讒佞以求吏民過譴呵及細㣲責義不量力師古曰言求備於人量音良郡縣相迫促亦内相刻流及衆庶是故鄉黨闕於嘉賔之歡九族忘其親親之恩飲食周急之厚彌衰送徃勞來之禮不行師古曰勞郎到翻來郎代翻余謂來讀如字亦通夫人道不通則隂陽否隔否皮鄙翻和氣不通未必不由此也詩云民之失徳乾餱以愆小雅伐木之詩也毛氏曰餱食也鄭氏曰失徳謂見謗訕也民尚以乾餱之食獲愆過於人况上之人乎乾音干餱音侯鄙語曰苛政不親煩苦傷恩方刺史奏事時宜明申敕師古曰申束也謂約束也使昭然知本朝之要務上嘉納之八月有兩月相承晨見東方服䖍曰相承在上下也應劭曰案京房易傳云君弱如婦為隂所乗則兩月出見賢遍翻冬十二月作長安南北郊罷甘泉汾陰祠匡衡奏祭天於南郊就陽之義也瘞地於北郊即陰之象也甘泉郊見皇天反北之太陰汾陰祠后土反東之少陽甘泉河東之祠宜徙就正陽太隂之䖏於長安定南北郊上從之及紫壇偽飾女樂鸞路騂駒龍馬石壇之屬衡又言甘泉泰畤紫壇有文章采鏤黼黻之飾及玉女樂石壇仙人祠瘞鸞路騂駒寓龍非古於是悉罷之師古曰漢舊儀云祭天用六綵綺席六重用玉几玉飾器凡七十女樂即禮樂志所云使童男童女俱歌也二年春正月罷雍五畤及陳寳祠秦作畤於雍以祠上帝有白青黄赤帝之祠至漢髙帝立北畤祠黒帝而五畤具有司進祠上不親徃至文帝時始幸雍郊見五畤陳寳者秦文公獲若石於陳倉北阪上祠之其神來常以夜光輝若流星從東方來集於祠城若雄雉其聲殷殷云野雞皆鳴以應之祠以一牢名曰陳寳衡以為不應禮皆奏罷之雍於用翻畤音止皆從匡衡之請也辛巳上始郊祀長安南郊赦奉郊縣應劭曰天郊在長安城南地郊在長安城北長陵界中二縣有奉郊之勤故並赦之余按帝紀二縣長安及長陵也及中都官耐罪徒師古曰中都官京師諸官府應劭曰輕罪不至於髠完其耏鬢故曰耏古耏字從彡髮膚之意也杜林以為法度之字皆從寸後改如字耐音若能如淳曰耐猶任也任其事也師古曰依應氏之説耏當音而如氏之説則音乃代翻其義亦兩通耏謂頬旁毛也彡毛髪貌也音所廉翻又先亷翻而功臣表宣曲侯通耏為鬼薪則應氏之説斯為長矣減天下賦錢筭四十孟康曰本筭百二十今減四十為八十閏月以渭城延陵亭部為初陵三月辛丑上始祠后土于北郊丙午立皇后許氏后車騎将軍嘉之女也元帝傷母恭哀后居位日淺而遭霍氏之辜事見二十四卷宣帝本始三年故選嘉女以配太子上自為太子時以好色聞好呼倒翻聞音問及即位皇太后詔采良家女以備後宮大将軍武庫令杜欽此大将軍之軍中武庫令也欽傳軍下更有軍字説王鳳曰禮一娶九女所以廣嗣重祖也張晏曰陽數一三五七九九數之極也臣瓚曰天子一娶九女夏殷之制也欽故舉古之約以刺今之奢也説輸芮翻娣姪雖缺不復補所以養夀塞争也師古曰媵女之内兄弟之女則謂之姪己之女弟則謂之娣塞絶也復扶又翻塞悉則翻故后妃有貞淑之行行下孟翻下同則𦙍嗣有賢聖之君制度有威儀之節則人君有夀考之福廢而不由則女徳不厭師古曰由用也從也女徳不厭言好色之甚也女徳不厭則夀命不究於髙年師古曰究竟也男子五十好色未衰婦人四十容貌改前以改前之容侍於未衰之年而不以禮為制則其原不可救而後來異態後來異態則正后自疑而支庶有間適之心師古曰間代也音居莧翻適讀曰嫡下亦同是以晉獻被納讒之謗申生䝉無罪之辜晉獻公嬖驪姬驪姬欲立其子讒世子申生獻公信之申生雉經而死被皮義翻今聖主富於春秋未有適嗣方鄉術入學鄉讀曰嚮未親后妃之議将軍輔政宜因始初之隆建九女之制詳擇有行義之家行下孟翻求淑女之質毋必有聲色技能為萬世大法師古曰惟求淑質無論美色及音聲技能如此則可為萬世法技渠綺翻夫少戒之在色師古曰論語孔子曰君子有三戒少之時血氣未定戒之在色言好色無節則致損敗故戒之也少詩照翻小卞之作可為寒心詩小雅也張晏曰小卞刺幽王廢申后而立褒姒黜太子宜臼而立伯服也臣瓚曰小卞之詩太子之傅作也哀太子之放逐愍周室之大壞也卞音盤唯将軍常以為憂鳳白之太后太后以為故事無有鳳不能自立法度循故事而己鳳素重欽故置之莫府國家政謀常與欽慮之師古曰慮計也數稱達名士裨正闕失數所角翻當世善政多出於欽者夏大旱匈奴呼韓邪單于嬖左伊秩訾兄女二人長女顓渠閼氏長知兩翻下同閼於乾翻氏音支下同生二子長曰且莫車師古曰且音子余翻下且麋胥同車昌遮翻次曰囊知牙斯少女為大閼氏少詩照翻下同生四子長曰雕陶莫臯次曰且麋胥皆長於且莫車少子咸樂二人皆小於囊知牙斯又它閼氏子十餘人顓渠閼氏貴且莫車愛呼韓邪病且死欲立且莫車顓渠閼氏曰匈奴亂十餘年不絶如髮賴䝉漢力故得復安復扶又翻下同今平定未乆人民創艾戰鬬師古曰創音初亮翻艾讀曰乂且莫車年少少詩照翻下同百姓未附恐復危國我與大閼氏一家共子師古曰一家言親姊妹也共子兩人所生恩慈無别也不如立雕陶莫臯大閼氏曰且莫車雖少大臣共持國事今舎貴立賤師古曰舎謂棄置也舎讀曰捨後世必亂單于卒從顓渠閼氏計立雕陶莫臯卒子恤翻約令𫝊國與弟呼韓邪死雕陶莫臯立為復株累若鞮單于師古曰復音服累力追翻賢曰匈奴謂孝為若鞮自呼韓邪降後與漢親宻見漢帝諡常為孝慕之至其子復株累單于以下皆稱若鞮復株累若鞮單于以且麋胥為左賢王且莫車為左谷蠡王谷音鹿蠡盧奚翻囊知牙斯為右賢王復株累單于復妻王昭君生二女長女云為須卜居次小女為當于居次文頴曰須卜氏匈奴貴族也當于亦匈奴大族也師古曰須卜當于皆其夫家氏族三年春三月赦天下徒秋關内大雨四十餘日京師民相驚言大水至百姓犇走相蹂躪師古曰蹂踐也躪轢也蹂音人九翻躪音藺老弱呼號號户髙翻呼火故翻長安中大亂天子親御前殿召公卿議大将軍鳳以為太后與上及後宮可御船令吏民上長安城以避水上時掌翻下同羣臣皆從鳳議左将軍王商獨曰自古無道之國水猶不冒城郭師古曰冒䝉覆也今政治和平世無兵革上下相安何因當有大水一日暴至此必訛言也師古曰訛偽也治直吏翻不宜令上城重驚百姓師古曰重音直用翻上乃止有頃長安中稍定問之果訛言上於是美壮商之固守數稱其議數所角翻而鳳大慙自恨失言為王鳳排斥王商張本上欲専委任王鳳八月䇿免車騎将軍許嘉以特進侯就朝位漢制列侯奉朝請在長安者位次三公賜位特進者在凡列侯之上位亦次三公朝直遥翻張譚坐選舉不實免冬十月光禄大夫尹忠為御史大夫十二月戊申朔日有食之其夜地震未央宮殿中詔舉賢良方正能直言極諫之士杜欽及太常丞谷永上對續漢志太常丞比千石掌凡行禮及祭祀小事總署曹事漢舊儀曰丞舉廟中非法者皆以為後宮女寵太盛嫉妬専上将害繼嗣之咎此盖指許后及班倢伃也越巂山崩丁丑匡衡坐多取封邑四百頃監臨盜所主守直十金以上免為庶人衡本封臨淮郡僮縣之樂安鄉鄉本田提封三千一百頃南以閩陌為界後誤封平陵陌為界多四百頃師古曰十金以上當時律定罪之次若今律條言一尺以上一匹以上四年春正月癸夘隕石于亳四隕于肥累二漢書五行志亳作槀孟康曰槀肥累皆縣名故屬真定師古曰槀音工老翻累音力追翻罷中書宦官初置尚書員五人臣瓚曰漢初中人有中謁者令孝武加中謁者令為中書謁者令置僕射宣帝時任中書官𢎞恭為令石顯為僕射元帝即位數年恭死顯代為中書令専權用事至帝乃罷其官師古曰漢舊儀云尚書四人為四曹常侍尚書主丞相御史事二千石尚書主刺史二千石事户曹尚書主庶人上書事主客尚書主外國事帝置五人有三公曹主斷獄事三月甲申以左将軍樂昌侯王商為丞相夏上悉召前所舉直言之士詣白虎殿對䇿師古曰此殿在未央宮是時上委政王鳳議者多歸咎焉谷永知鳳方見柄用師古曰柄用言任用之授以權也隂欲自託乃曰方今四夷賔服皆為臣妾北無葷粥冒頓之患葷許云翻師古曰粥音弋六翻太史公曰唐虞以上有葷粥孟子曰太王事獯粥冒頓為患見髙恵呂后紀南無趙佗呂嘉之難趙佗見髙恵呂后孝文紀呂嘉見孝武紀難乃旦翻三垂晏然靡有兵革之警諸侯大者乃食數縣漢吏制其權柄不得有為無吴楚燕梁之埶吴楚梁見孝景紀燕見孝昭紀百官盤互親疏相錯師古曰盤互盤結而交互也錯間雜也骨肉大臣有申伯之忠師古曰申伯周申后之父余據詩崧髙云不顯申伯王之元舅是則申伯乃宣王之舅永正以之况王鳳也洞洞屬屬師古曰洞洞敬肅也屬屬専謹也洞音動屬音之欲翻小心畏忌無重合安陽博陸之亂師古曰重合侯莽通安陽侯上官桀博陸侯霍禹也余按莽通即馬通事見二十二卷武帝後元元年安陽侯事見二十三卷昭帝元鳳元年霍禹事見二十五卷宣帝地節四年三者無毛髮之辜竊恐陛下舎昭昭之白過忽天地之明戒聽晻昧之瞽説師古曰舎謂畱也晻與暗同又音一感翻瞽説言不中道若無目之人也余謂舎置也讀曰舎歸咎乎無辜倚異乎政事師古曰倚依也重失天心師古曰重音直用翻不可之大者也師古曰此則為大不可也陛下誠深察愚臣之言抗湛溺之意解偏駁之愛師古曰抗舉也湛讀曰沈駁不周普也湛持林翻奮乾剛之威平天覆之施使列妾得人人更進覆敷又翻施式智翻更工衡翻益納宜子婦人毋擇好醜毋避嘗字如淳曰王鳳上小妻弟以納後宮以甞字乳王章言之坐死今永及此為鳳洗前過也仲馮曰按王章言事坐誅在陽朔初而永此對乃是建始四年則非為鳳而言也然觀永前後之文實若為鳳但班固於此對後乃云永為上第擢為光禄大夫則同是建始四年中事余謂此時鳳盖已納張美人於後宮故永為之言若王章指言鳳過則在陽朔初也毋論年齒推法言之陛下得繼嗣於微賤之間乃反為福得繼嗣而已母非有賤也師古曰茍得子耳勿論其母之貴賤後宮女史使令有直意者鄭𤣥曰女史女奴曉書者使令給役後宮無爵秩者也師古曰直當也令音力成翻廣求於㣲賤之間以遇天所開右師古曰右讀曰佑佑助也慰釋皇太后之憂愠師古曰釋散也愠於問翻解謝上帝之譴怒則繼嗣蕃滋災異訖息師古曰蕃多也訖止也蕃音扶元翻杜欽亦倣此意上皆以其書示後宮擢永為光禄大夫夏四月雨雪雨于具翻秋桃李實大雨水十餘日河决東郡金隄師古曰金隄者河隄之名今在滑州界先是清河都尉馮逡奏言郡承河下流據溝洫志逡言清河郡承河下流與兖州東郡分水為界先悉薦翻逡七倫翻土壤輕脆易傷易以豉翻頃所以濶無大害者以屯氏河通兩川分流也師古曰濶稀也今屯氏河塞靈鳴犢口又益不利屯氏河塞見上卷元帝永光五年塞悉則翻獨一川兼受數河之任雖髙増隄防終不能泄如有霖雨旬日不霽必盈溢師古曰雨止曰霽音子詣翻又音才詣翻九河故迹今既滅難明夏禹疏九河孔安國曰河水分九道在兖州界爾雅曰徒駭一太史二馬頰三覆釡四胡蘓五簡六㓗七鉤盤八鬲津九屯氏河新絶未久其處易浚師古曰浚謂治導之令其深也浚音峻又其口所居髙於以分殺水力道里便宜殺音所介翻減也可復浚以助大河復扶又翻泄暴水備非常不豫修治治直之翻北决病四五郡南决病十餘郡然後憂之晚矣事下丞相御史白遣博士許商行視下遐稼翻師古曰白白於天子也行音下更翻以為方用度不足師古曰言國家少財役也可且勿浚後三嵗河果决于館陶及東郡金隄泛濫兖豫及平原千乗濟南乗繩證翻濟子禮翻凡灌四郡三十二縣水居地十五萬餘頃深者三丈壞敗官亭室廬且四萬所壞音怪敗補邁翻冬十一月御史大夫尹忠以對方略疏闊上切責其不憂職自殺遣大司農非調師古曰大司農名非調也姓譜非姓也秦非子之後調均錢穀河决所灌之郡師古曰令其調發均平錢穀遭水之郡使存給也調音徒釣翻謁者二人發河南以東船五百㮴師古曰一船為一㮴音先勞翻其字從木徙民避水居丘陵九萬七千餘口壬戌以少府張忠為御史大夫南山羣盗傰宗等數百人為吏民害蘇林曰傰音朋晉灼曰音倍師古曰晉音是也詔發兵千人逐捕嵗餘不能禽或説大将軍鳳説輸納翻以賊數百人在轂下師古曰在天子輦轂之下明其逼近也討不能得難以示四夷獨選賢京兆乃可於是鳳薦故髙陵令王尊徵為諌大夫守京輔都尉武帝元鼎四年更置三輔都尉京兆曰京輔都尉馮翊曰左輔都尉扶風曰右輔都尉行京兆尹事旬月間盜賊清後拜為京兆尹上即位之初丞相匡衡復奏射聲校尉陳湯武帝置北軍八校尉射聲其一也秩二千石掌待詔射聲士服䖍曰工射者也冥冥中聞聲則中之因以名也復扶又翻以吏二千石奉使湯為西域副校尉秩比二千石顓命蠻夷中不正身以先下先悉薦翻而盗所收康居財物戒官屬曰絶域事不覆校言外域之事漢朝務存寛大必不考覆也雖在赦前言其事在竟寧元年七月赦前也不宜處位處昌呂翻湯坐免後湯上言康居王侍子非王子按驗實王子也湯下獄當死下遐稼翻太中大夫谷永按是年夏谷永方擢為光禄大夫河平二年議受伊邪莫演降永猶為光禄大夫此書太中大夫谷永據陳湯傳也上疏訟湯曰臣聞楚有子玉得臣文公為之仄席而坐師古曰子玉楚大夫也得臣其名也春秋僖十八年子玉帥師與晉文公戰於城濮楚師敗績晉師三月館穀而文公猶有憂色曰得臣猶在憂未歇也及楚殺子玉公喜而後可知也禮記口有憂者仄席而坐盖自貶也為于偽翻仄古側翻趙有亷頗馬服彊秦不敢窺兵井陘師古曰亷頗趙将也馬服君趙奢亦趙将也井陘之口趙之西界山險道也陘音刑近漢有郅都魏尚匈奴不敢南鄉沙幕景帝以郅都為鴈門太守匈奴素聞都節舉邊為引兵去竟都死不敢近鴈門魏尚事見十五卷文帝十四年鄉讀曰嚮由是言之戰克之将國之爪牙不可不重也盖君子聞鼓鼙之聲則思将帥之臣師古曰禮之樂記曰鼔鼙之聲讙讙以立動動以進衆君子聽鼔鼙之聲則思将帥之臣鼙駢迷翻将即亮翻帥所類翻竊見關内侯陳湯前斬郅支威震百蠻武暢西海漢元以來征伐方外之将未甞有也漢元謂漢初也今湯坐言事非是幽囚久繫歴時不决執憲之吏欲致之大辟辟毗亦翻昔白起為秦将南拔郢都北阬趙括以纎介之過賜死杜郵秦民憐之莫不隕涕事見周赧王紀今湯親秉鉞席卷喋血萬里之外師古曰如席之卷言其疾也服䖍曰喋音蹀屣履之蹀如淳曰殺人流血滂沱為喋血師古曰喋音大類翻本字當作蹀蹀謂履渉之耳薦功祖廟告類上帝張晏曰謂以所征之國事類告天也介胄之士靡不慕義以言事為罪無赫赫之惡周書曰記人之功忘人之過宜為君者也師古曰尚書之外間書也夫犬馬有勞於人尚加帷盖之報師古曰禮記稱孔子云敝帷弗棄為埋馬也敝盖弗棄為埋狗也况國之功臣者哉竊恐陛下忽於鼙鼔之聲不察周書之意而忘帷盖之施施式智翻庸臣遇湯卒從吏議師古曰以待庸臣者待湯也卒猶終也卒子恤翻使百姓介然有秦民之恨師古曰介然猶耿耿非所以厲死難之臣也難乃旦翻書奏天子出湯奪爵為士伍㑹西域都護段㑹宗為烏孫兵所圍驛騎上書願發城郭燉煌兵以自救城郭謂西域城郭諸國也燉音屯徒門翻丞相商大将軍鳳及百寮議數日不决鳳言陳湯多籌䇿習外國事可問上召湯見宣室湯擊郅支時中寒見賢遍翻中竹仲翻病兩臂不屈申湯入見有詔毋拜示以㑹宗奏湯對曰臣以為此必無可憂也上曰何以言之湯曰夫胡兵五而當漢兵一何者兵刃朴鈍弓弩不利今聞頗得漢巧然猶三而當一又兵法曰客倍而主人半然後敵此言憑城而守者主人之半可以敵客之倍今圍㑹宗者人衆不足以勝㑹宗唯陛下勿憂且兵輕行五十里重行三十里今㑹宗欲發城郭燉煌歴時乃至所謂報讐之兵非救急之用也上曰奈何其解可必乎度何時解度徒洛翻湯知烏孫瓦合不能久攻師古曰謂如碎瓦之雜居不齊同故事不過數日師古曰故事謂以舊事測之因對曰已解矣屈指計其日曰不出五日當有吉語聞師古曰吉善也善謂兵解之事居四日軍書到言已解大将軍鳳奏以為從事中郎莫府事壹决於湯續漢志大将軍府有從事中郎二人秩六百石職參謀議河平元年以河决隄塞輒平改元春杜欽薦犍為王延世於王鳳使塞决河犍居言翻塞悉則翻鳳以延世為河隄使者延世以竹落長四丈大九圍盛以小石長直亮翻盛時征翻兩船夾載而下之三十六日河隄成三月詔以延世為光禄大夫秩中二千石賜爵關内侯黄金百斤夏四月己亥晦日有食之詔公卿百僚陳過失無有所諱大赦天下光禄大夫劉向對曰四月交於五月月同孝恵日同孝昭孝恵七年五月丁夘先晦一日日食今四月己亥晦而日食故曰故四月交於五月月同孝恵孝昭元年七月己亥晦日食曰日同孝昭二帝尋皆晏駕而無嗣其占恐害繼嗣是時許皇后専寵後宮希得進見見賢遍翻中外皆憂上無繼嗣故杜欽谷永及向所對皆及之上於是減省椒房掖庭用度師古曰椒房殿皇后所居以椒和泥塗壁取其温且芬也服御輿駕所發諸官署及所造作遺賜外家羣臣妾師古曰外家謂后之家族言在外也劉向曰婦人内夫家而外父母家遺于季翻皆如竟寧以前故事皇后上書自陳以為時世異制長短相補不出漢制而已纎微之間未必可同若竟寧前與黄龍前豈相放哉晉灼曰竟寧元帝時也黄龍宣帝時也言二帝奢儉不同豈相放哉師古曰放依也音甫徃翻家吏不曉師古曰家吏皇后之官屬今壹受詔如此且使妾揺手不得設妾欲作某屏風張於某所曰故事無有或不能得則必繩妾以詔書矣師古曰言或有所求吏不肯備因云詔書不許也繩約也此誠不可行唯陛下省察省悉井翻故事以特牛祠大父母戴侯敬侯皆得䝉恩以太牢祠一牲曰特三牲備為一牢平恩戴侯許廣漢后父嘉紹其封於后為祖樂成敬侯許延夀后父嘉所自出也嘉繼大宗延夀於后為叔祖今當率如故事謂将復以特牛祠也唯陛下哀之今吏甫受詔讀記師古曰甫始也直豫言使后知之非可復若私府有所取也師古曰若謂如未奉詔之前也復扶又翻下同其萌牙所以約制妾者恐失人理師古曰萌牙言其初始發意若草木之方生也唯陛下深察焉上於是采谷永劉向所言災異咎驗皆在後宮之意以報之且曰吏拘於法亦安足過過罪過也言何足以為罪也盖矯枉者過直古今同之師古曰矯正也枉曲也言意在正曲遂過於直且財幣之省特牛之祠其於皇后所以扶助徳美為華寵也咎根不除災變相襲師古曰襲重累也祖宗且不血食何戴侯也𫝊不云乎以約失之者鮮師古曰論語載孔子之言鮮少也謂能行儉約而有過失之事如此者少也鮮音先踐翻審皇后欲從其奢與師古曰與讀曰歟朕亦當法孝武皇帝也如此則甘泉建章可復興矣孝文皇帝朕之師也皇太后皇后成法也假使太后在彼時不如職今見親厚又惡可以踰乎師古曰言假令太后昔時不得其志不依常理而皇后今被親厚何可踰於太后制度乎婦不可踰姑也烏音惡皇后其刻心秉德謙約為右師古曰以謙約為先垂則列妾使有法焉師古曰言垂法於後宮使皆遵行也給事中平陵平當上言太上皇漢之始祖廢其寝廟園非是事見上卷元帝竟寧元年上亦以無繼嗣遂納當言秋九月復太上皇寝廟園詔曰今大辟之刑千有餘條律令煩多百有餘萬言竒請它比日以益滋師古曰竒請謂常文之外主者别有所請以定罪也它比謂引它類以比附之稍增律條也竒音居宜翻自明習者不知所由欲以曉喻衆庶不亦難乎於以羅元元之民夭絶無辜豈不哀哉由從也羅謂設禁綱而民無所逃罪也夭絶亡辜謂無罪而陷於刑辟死於非命至於短折也夭於紹翻其議減死刑及可蠲除約省者令較然易知條奏易以豉翻時有司不能廣宣上意徒鉤摭微細毛舉數事以塞詔而已師古曰毛舉言舉毫毛之事輕小之甚塞猶當也塞悉則翻匈奴單于遣右臯林王伊邪莫演等奉獻朝正月師古曰演音衍朝直遥翻單考異曰匈奴傳河平元年于遣莫演朝正月下云明年單于上書願朝河平四年正月遂入朝據此則是莫演以元年至漢朝二年正月也而荀紀繫于元年正月之下恐誤漢紀又以莫演為黄渾今從漢書二年春伊邪莫演罷歸朝罷遣歸也自言欲降降户江翻下同即不受我我自殺終不敢還歸使者以聞下公卿議下遐稼翻議者或言宜如故事受其降光禄大夫谷永議郎杜欽以為漢興匈奴數為邊害數所角翻故設金爵之賞以待降者今單于屈體稱臣列為北藩遣使朝賀無有二心漢家接之宜異于徃時今既享單于聘貢之質師古曰享當也質誠也而更受其逋逃之臣是貪一夫之得而失一國之心擁有罪之臣而絶慕義之君也假令單于初立師古曰假令猶言或當也欲委身中國未知利害私使伊邪莫演詐降以卜吉凶受之虧徳沮善令單于自疏疏與疎同不親邊吏或者設為反間間居莧翻欲因以生隙受之適合其䇿使得歸曲而責直師古曰歸曲於漢而以直義來責也此誠邊境安危之原師旅動静之首不可不詳也不如勿受以昭日月之信抑詐諼之謀懷附親之心便師古曰諼詐辭也音許逺翻又許元翻對奏天子從之遣中郎将王舜徃問降状伊邪莫演曰我病狂妄言耳遣去歸到官位如故不肯令見漢使史言永欽能得匈奴之情夏四月楚國雨雹雨于具翻大如釜徙山陽王康為定陶王六月上悉封諸舅王譚為平阿侯商為成都侯立為紅陽侯根為曲陽侯逢時為髙平侯恩澤侯表平阿侯食邑於沛成都侯食邑於山陽紅陽侯食邑於南陽曲陽侯食邑於九江髙平侯食邑於臨淮五人同日封故世謂之五侯太后母李氏更嫁為河内茍賔妻據太后𫝊母李以妬去更嫁更工衡翻生子參太后欲以田蚡為比而封之李竒曰田蚡與孝景王后同母異父得封故也蚡扶粉翻師古曰比例也音頻寐翻上曰封田氏非正也以參為侍中水衡都尉御史大夫張忠奏京兆尹王尊暴虐倨慢尊坐免官吏民多稱惜之湖三老公乗興等師古曰湖縣名也今虢州湖城縣取其名地理志湖縣屬京兆公乗以爵為姓乗繩證翻上書訟尊治京兆撥劇整亂誅暴禁邪皆前所希有名将所不及此将謂郡将也治直之翻将即亮翻雖拜為真尊自行尹事為真未有殊絶褒賞加於尊身今御史大夫奏尊傷害隂陽為國家憂無承用詔書意靖言庸違象恭滔天師古曰引虞書堯典之辭也靖治也庸用也違僻也滔漫也謂其言假托於治實用違僻貌象恭敬過惡漫天也漫音莫干翻一曰慆慢也原其所以出御史丞楊輔御史大夫有兩丞秩千石一曰中丞素與尊有私怨外依公事建畫為此議傅致奏文師古曰建立謀畫為此議也傅讀曰附謂益其事而引致於罪状據尊𫝊輔故為尊書佐嘗醉過尊大奴利家利家捽搏其頰兄子閎拔刀欲剄之以故深怨欲傷害尊浸潤加誣師古曰浸潤猶漸染也臣等竊痛傷尊修身潔己砥節首公師古曰砥厲也首向也砥音指首音式救翻刺譏不憚将相誅惡不避豪彊誅不制之賊賊謂傰宗等解國家之憂功著職修威信不廢誠國家爪牙之吏折衝之臣今一旦無辜制於仇人之手傷於詆欺之文上不得以功除罪下不得䝉棘木之聽張晏曰周禮三槐九棘公卿於下聽訟王制大司冦聽獄於棘木之下棘者欲其赤心而留意于三刺也獨掩怨讐之偏奏被共工之大惡仲馮曰共工之大惡謂上劾奏云靖言庸違象恭滔天是也被皮義翻共音恭無所陳寃愬罪尊以京師廢亂羣盜並興選賢徵用起家為卿賊亂既除豪猾伏辜即以佞巧廢黜一尊之身三期之間師古曰期年也期音基乍賢乍佞豈不甚哉孔子曰愛之欲其生惡之欲其死是惑也論語所載答樊遲之言惡路烏翻浸潤之譖不行焉可謂明矣答子張之言願下公卿大夫博士議郎定尊素行下户嫁翻行下孟翻夫人臣而傷害隂陽死誅之罪也靖言庸違放殛之刑也師古曰殛誅也音居力翻審如御史章尊乃當伏觀闕之誅張晏曰孔子誅少正卯於兩觀之間觀古玩翻放於無人之域不得茍免師古曰非止坐免官而已也及任舉尊者當獲選舉之辜不可但已任保也漢法選舉而其人不稱者與同罪即不如章飾文深詆以愬無罪亦宜有誅以懲讒賊之口絶詐欺之路師古曰懲創也唯明主參詳使白黑分别别彼列翻書奏天子復以尊為徐州刺史徐州部琅邪東海臨淮等郡及楚廣陵等國復扶又翻下同夜郎王興鉤町王禹漏卧侯俞更舉兵相攻孟康曰漏卧夷邑名後為縣地理志夜郎鉤町漏卧三縣皆屬䍧柯郡鉤町音劬挺師古曰俞音踰䍧柯太守請發兵誅興等䍧柯音臧哥議者以為道逺不可擊乃遣太中大夫蜀郡張匡持節和解興等不從命刻木象漢吏立道旁射之射而亦翻杜欽説大将軍王鳳曰蠻夷王侯輕易漢使不憚國威説輸芮翻易以豉翻恐議者選耎復守和解師古曰選耎怯不前之意也選音息兖翻耎音人兖翻太守察動静有變乃以聞如此則復曠一時師古曰曠空也一時三月也言空廢一時不早發兵也王侯得收獵其衆申固其謀黨助衆多各不勝忿勝音升下同必相殄滅自知罪成狂犯守尉師古曰言起狂悖之心而殺守尉也逺臧温暑毒草之地臧古藏字通雖有孫吴将賁育士師古曰孫孫武吴吴起賁孟賁育夏育也将即亮翻賁音奔若入水火徃必焦没智勇亡所施亡讀曰無屯田守之費不可勝量量音良宜因其罪惡未成未疑漢家加誅隂敕旁郡守尉練士馬師古曰練簡也守式又翻下同大司農豫調穀積要害處調徒釣翻選任職太守徃以秋凉時入誅其王侯尤不軌者即以為不毛之地無用之民聖王不以勞中國師古曰即猶若也不毛言不生草木宜罷郡放棄其民絶其王侯勿復通復扶又翻如以先帝所立累世之功不可墮壊師古曰墮音火規翻毀也亦宜因其萌牙早斷絶之及已成形然後戰師則萬姓被害斷丁管翻下同被皮義翻於是鳳薦金城司馬臨卭陳立為䍧柯太守漢列郡守尉之下有長史司馬地理志臨卭縣屬蜀郡卭音渠容翻立至䍧柯諭告夜郎王興興不從命立請誅之未報乃從吏數十人出行縣行下孟翻至興國且同亭師古曰且音子餘翻按地理志夜郎縣王莽改曰同亭盖因亭以名縣也召興興将數千人徃至亭從邑君數十人入見立按西南夷傳夷人椎結耕田有邑聚各有君長立數責因斷頭數所具翻邑君曰将軍誅無状為民除害為于偽翻願出曉士衆以興頭示之皆釋兵降師古曰釋解也降户江翻鉤町王禹漏卧侯俞震恐入粟千斛牛羊勞吏士勞力到翻立還歸郡興妻父翁指與子邪務收餘兵廹脅旁二十二邑反至冬立奏募諸夷與都尉長史分将攻翁指等将即亮翻翁指據阸為壘立使竒兵絶其饟道饟與餉同音息亮翻縱反間以誘其衆間居莧翻誘音酉都尉萬年曰兵乆不决費不可共師古曰共讀曰供引兵獨進敗走趨立營師古曰趨讀曰趣趣向也音七喻翻立怒叱戲下令格之戲讀曰麾都尉復還戰立救之時天大旱立攻絶其水道蠻夷共斬翁指持首出降西夷遂平漢考異曰西夷傳但云河平中而胡旦春秋云在此年十一月未知何据也三年春正月楚王囂來朝囂宣帝子於帝為叔父二月乙亥詔以囂素行純茂特加顯異封其子勲為廣戚侯廣戚侯國屬沛郡行下孟翻丙戌犍為地震山崩壅江水水逆流犍居言翻秋八月乙卯晦日有食之上以中秘書頗散亡師古曰言中以别外藝文志曰武帝建藏書之䇿劉歆曰外則有太常太史博士之藏内則有延閣廣内祕室之府使謁者陳農求遺書於天下詔光禄大夫劉向校經傳諸子詩賦歩兵校尉任宏校兵書百官表歩兵校尉掌上林苑門屯兵武帝所置八校尉之一也任音壬校尉之校户教翻餘並居效翻太史令尹咸校數術百官表太史令屬太常師古曰數術占卜之書侍醫李柱國校方技侍醫屬太醫令在天子左右者也師古曰方技醫藥之書也技音渠綺翻毎一書已向輒條其篇目撮其指意録而奏之已終也竟也師古曰撮摠取也音千括翻劉向以王氏權位太盛而上方嚮詩書古文向乃因尚書洪範集合上古以來歴春秋六國至秦漢符瑞災異之記推迹行事連傅禍福傅讀曰附著其占驗比類相從各有條目凡十一篇號曰洪範五行傳論奏之天子心知向忠精故為鳳兄弟起此論也為于偽翻然終不能奪王氏權河復决平原流入濟南千乗所壊敗者半建始時復扶又翻下同濟子禮翻乗繩證翻壊音怪敗補邁翻復遣王延世與丞相史楊焉及将作大匠許商百官表曰将作少府秦官掌治宮室景帝中六年更名将作大匠諫大夫乗馬延年同作治孟康曰乗馬姓也師古曰乗音食證翻六月乃成復賜延世黄金百斤治河卒非受平賈者為著外繇六月蘇林曰平賈以錢取人作卒顧其時庸之平賈也如淳曰律説平賈一月得錢二千又律説戍邊一嵗當罷若有急當留守六月今以卒治河之故復留六月孟康曰外繇戍邊也治水不復戍邊也師古曰如孟二説皆非也以卒治河有勞雖執役日近皆得比繇戍六月也著謂著簿籍也治直之翻賈讀曰價著音竹助翻繇讀曰徭四年春正月匈奴單于來朝赦天下徒三月癸丑朔日有食之琅琊太守楊肜與王鳳連昏如淳曰連昏者昏家之姻親也肜音以中翻其郡有災害丞相王商按問之鳳以為請商不聽竟奏免肜奏果寝不下下遐嫁翻下同鳳以是怨商隂求其短使頻陽耿定上書頻陽縣屬左馮翊言商與父傅婢通及女弟淫亂奴殺其私夫師古曰私夫女弟之私與姦通者疑商教使天子以為暗昩之過不足以傷大臣鳳固争下其事司𨽻句斷下遐嫁翻太中大夫蜀郡張匡素佞巧復上書極言詆毁商復扶又翻有司奏請召商詣詔獄上素重商知匡言多險制曰勿治治直之翻鳳固争之夏四月壬寅詔收商丞相印綬商免相三日發病歐血薨諡曰戾侯而商子弟親屬為駙馬都尉侍中中常侍諸曹大夫郎吏者皆出補吏莫得留給事宿衞者有司奏請除國邑有詔長子安嗣爵為樂昌侯宣帝之母黨㣲矣上之為太子也受論語於蓮勺張禹蓮勺音輦酌及即位賜爵關内侯拜為諸吏光禄大夫秩中二千石給事中領尚書事禹與王鳳並領尚書内不自安數病上書乞骸骨數所角翻下同欲退避鳳上不許撫待愈厚六月丙戌以禹為丞相封安昌侯恩澤侯表安昌侯食邑於汝南庚戌楚孝王囂薨初武帝通西域罽賔自以絶逺漢兵不能至獨不服罽賔國治循鮮城去長安萬二千二百里不屬都䕶罽音計數剽殺漢使數所角翻師古曰剽刼也音頻妙翻乆之漢使者文忠與容屈王子隂末赴合謀攻殺其王王曰烏頭勞即數殺漢使者也立隂末赴為罽賔王後軍候趙徳使罽賔與隂末赴相失隂末赴鎖琅當德師古曰相失相失意也琅當長鎖也若今之禁繫人鎖矣琅音郎殺副已下七十餘人遣使者上書謝孝元帝以其絶域不録放其使者於縣度縣度在烏秅國西縣度者石山也谿谷不通以繩索相引而度縣古懸字通師古曰懸繩而度也烏秅鄭氏音鷃拏師古曰烏音一加翻秅音直加翻急言之聲如鷃拏耳非正音也絶而不通及帝即位復遣使謝罪復扶又翻下同漢欲遣使者報送其使杜欽説王鳳曰前罽賔王隂末赴本漢所立後卒畔逆説輸芮翻卒子恤翻夫德莫大於有國子民罪莫大於執殺使者所以不報恩不懼誅者自知絶逺兵不至也有求則卑辭無欲則驕慢終不可懷服凡中國所以為通厚蠻夷㥦快其求者為壤比而為寇師古曰比近也為其土壤接近能為寇也㥦音苦頰翻為壤之為于偽翻比毗寐翻今縣度之阸非罽賔所能越也其鄉慕不足以安西域鄉讀曰嚮雖不附不能危城郭前親逆節惡暴西域師古曰暴謂章露也故絶而不通今悔過來而無親屬貴人奉獻者皆行賈賤人賈音古下同欲通貨市買以獻為名故煩使者送至縣度恐失實見欺凡遣使送客者欲為防護寇害也為于偽翻起皮山南更不屬漢之國四五皮山國去長安萬五千里師古曰言經歴不屬漢者凡四五國更音工衡翻斥候士百餘人五分夜擊刁斗自守師古曰夜有五更分而持之尚時為所侵盜驢畜負糧須諸國稟食得以自贍師古曰稟給也贍足也食讀曰飤下同國或貧小不能食或桀黠不肯給黠下八翻擁彊漢之節餒山谷之閒乞匄無所得師古曰匄亦乞也音工大翻離一二旬則人畜棄捐曠野而不反又歴大頭痛小頭痛之山赤土身熱之阪令人身熱無色頭痛嘔吐驢畜盡然嘔一口翻吐土故翻畜許救翻下同又有三池盤石阪道陿者尺六七寸長者徑三十里臨峥嶸不測之深陿與狭同師古曰峥嶸深險之貌峥音仕耕翻嶸音宏余謂峥嶸山峻貌行者騎歩相持騎竒寄翻繩索相引索昔各翻二千餘里乃到縣度畜墜未半阬谷盡靡碎師古曰靡散也音縻人墮勢不得相收視險阻危害不可勝言勝音升聖王分九州制五服師古曰九州冀兖豫青徐荆揚梁雍也五服甸侯綏要荒余謂此言禹迹也周職方九州有幽并無徐梁又分為九服務盛内不求外今遣使者承至尊之命送蠻夷之賈勞吏士之衆渉危難之路賈音古難乃旦翻罷敝所恃以事無用師古曰罷讀曰疲所恃謂中國之人無用謂逺方蠻夷之國非乆長計也使者業已受節可至皮山而還師古曰言已立計遣之不能即止可至皮山也於是鳳白從欽言罽賔實利賞賜賈市賈音古其使數年而壹至云陽朔元年應劭曰時隂盛陽㣲故改元曰陽朔欲陽氣之蘇息也師古曰應説非也朔始也以山陽火生石中言陽氣之始春二月丁未晦日有食之三月赦天下徒冬京兆尹泰山王章下獄死下遐稼翻時大将軍鳳用事上謙讓無所顓左右嘗薦光禄大夫劉向少子歆通逹有異材上召見歆誦讀詩賦甚悦之欲以為中常侍百官表中常侍加官得出入禁中盖此時以士人為之東都始純用宦者召取衣冠臨當拜左右皆曰未曉大将軍師古曰曉猶白余謂曉開諭也上曰此小事何須闗大将軍左右叩頭争之上於是語鳳鳳以為不可乃止劉向忠於漢室子歆附從王莽得無由此邪爵賞之柄不自上出則貪爵禄茍富貴之人視其柄所在而趨之矣語牛倨翻王氏子弟皆卿大夫侍中諸曹分據埶官滿朝廷杜欽見鳳専政泰重戒之曰願将軍由周公之謙懼損穰侯之威放武安之欲毋使范睢之徒得間其説周公相成王管蔡流言周公狼跋而東其懼可知矣吐握以下士其謙可知矣穰侯范睢事見周紀武安侯田蚡事見武帝紀間居莧翻鳳不聽時上無繼嗣體常不平師古曰言多疾疢定陶共王來朝共讀曰恭下同太后與上承先帝意遇共王甚厚賞賜十倍於它王不以徃事為纎介師古曰徃事謂先帝時欲以代太子也言無纎介之嫌留之京師不遣歸國上謂共王我未有子人命不諱師古曰人命無常不可諱一朝有它師古曰它謂晏駕也且不復相見復扶又翻爾長留侍我矣其後天子疾益有瘳共王因留國邸定陶邸也旦夕侍上上甚親重之大将軍鳳心不便共王在京師㑹日食鳳因言日食隂盛之象定陶王雖親於禮當奉藩在國今留侍京師詭正非常師古曰詭違也故天見戒見賢遍翻宜遣王之國上不得已於鳳而許之共王辭去上與相對涕泣而決決與訣同别也王章素剛直敢言雖為鳳所舉章以選為京兆鳳所舉也非鳳専權不親附鳳乃奏封事言日食之咎皆鳳専權蔽主之過上召見章延問以事見賢遍翻章對曰天道聰明佑善而災惡以瑞應而符效今陛下以未有繼嗣引近定陶王近其靳翻所以承宗廟重社稷上順天心下安百姓此正議善事當有祥瑞何故致災異災異之發為大臣専政者也為于偽翻今聞大将軍猥歸日食之咎於定陶王師古曰猥猶曲也建遣之國師古曰建立其議也茍欲使天子孤立於上顓擅朝事以便其私非忠臣也朝直遥翻且日食隂侵陽臣顓君之咎今政事大小皆自鳳出天子曽不壹舉手鳳不内省責省悉井翻反歸咎善人推逺定陶王推吐雷翻逺于願翻且鳳誣罔不忠非一事也前丞相樂昌侯商本以先帝外屬商宣帝舅王武之子内行篤行下孟翻有威重位歴将相國家柱石臣也其人守正不肯屈節隨鳳委曲卒用閨門之事為鳳所罷卒子恤翻身以憂死衆庶愍之又鳳知其小婦弟張美人己嘗適人師古曰小婦妾也弟謂女弟即妹也今俗猶謂妾為小妻於禮不宜配御至尊託以為宜子内之後宮茍以私其妻弟聞張美人未嘗任身就館也師古曰是則不為宜子明鳳所言非實婦人将生子及月辰出就他館任讀曰姙且羌胡尚殺首子以盪腸正世師古曰盪洗滌也言婦初來所生之子或他姓况於天子而近已出之女也已出謂己出嫁也近其靳翻此三者皆大事陛下所自見足以知其餘及它所不見者師古曰以所見者譬之則不見者可知鳳不可令乆典事宜退使就第選忠賢以代之自鳳之白罷商後遣定陶王也上不能平及聞章言天子感寤納之謂章曰㣲京兆尹直言師古曰㣲無也吾不聞社稷計且唯賢知賢君試為朕求可以自輔者為于偽翻下同於是章奏封事薦信都王舅琅邪太守馮野王忠信質直智謀有餘上自為太子時數聞野王名數所角翻方倚以代鳳章每召見上輒辟左右見賢遍翻師古曰辟讀曰闢時太后從弟子侍中音元后傳曰太后從弟長樂衛尉𢎞子侍中音師古曰𢎞者太后之叔父也音則從父弟余據後云音以從舅用事則顔注良是獨側聴具知章言以語鳳語牛倨翻鳳聞之甚憂懼杜欽令鳳出就第上疏乞骸骨其辭指甚哀太后聞之為垂涕不御食為于偽翻御進也上少而親倚鳳少詩照翻弗忍廢乃優詔報鳳彊起之彊其兩翻於是鳳起視事上使尚書劾奏章知野王前以王舅出補吏而私薦之成帝立有司奏野王王舅不宜備九卿出為上郡太守欲令在朝阿附諸侯朝直遥翻又知張美人體御至尊而妄稱引羌胡殺子盪腸非所宜言下章吏下遐稼翻廷尉致其大逆罪致文致也以為比上夷狄欲絶繼嗣之端背畔天子背蒲妹翻私為定陶王章竟死獄中妻子徙合浦合音蛤自是公卿見鳳側目而視馮野王懼不自安遂病滿三月賜告與妻子歸杜陵就醫藥大将軍鳳風御史中丞劾奏野王師古曰風讀曰諷劾户槩翻又户得翻賜告養病而私自便師古曰便安也音頻面翻持虎符出界歸家奉詔不敬杜欽奏記於鳳曰二千石病賜告得歸有故事不得去郡亡著令如淳曰律施行無不得去郡之文也亡讀曰無傳曰賞疑従予所以廣恩勸功也師古曰疑當賞不當賞則與之疑厚薄則從厚予讀曰與罰疑從去所以慎刑闕難知也師古曰疑當罰不當罰則赦之疑輕重則從輕去謂赦之也今釋令與故事而假不敬之法師古曰釋廢去也假謂假託法律以致其罪甚違闕疑從去之意即以二千石守千里之地任兵馬之重任音壬不宜去郡将以制刑為後法者則野王之罪在未制令前也刑賞大信不可不慎鳳不聴竟免野王官時衆庶多寃王章譏朝廷者欽欲救其過復説鳳曰京兆尹章所坐事宻自京師不曉况於逺方恐天下不知章實有罪而以為坐言事如是塞争引之原復扶又翻下同説輸芮翻塞悉則翻争讀曰諍師古曰争引謂引事類以諌争之也一曰下有諌争之言上引而納之也損寛明之徳欽愚以為宜因章事舉直言極諌並見郎従官従才用翻展盡其意加於徃前以明示四方使天下咸知主上聖明不以言罪下也若此則流言消釋疑惑著明鳳白行其䇿焉杜欽之罪浮於谷永以其與王鳳計議為之文過也是嵗陳留太守薛宣為左馮翊宣為郡所至有聲迹宣子恵為彭城令宣嘗過其縣心知恵不能不問以吏事或問宣何不教戒恵以吏職宣笑曰吏道以法令為師可問而知及能與不能自有資材何可學也衆人傳稱以宣言為然時人雖以宣言為然實未必然也二年春三月大赦天下御史大夫張忠卒夏四月丁卯以侍中太僕王音為御史大夫於是王氏愈盛郡國守相刺史皆出其門下師古曰言為其家寮屬者皆得大官五侯羣弟争為奢侈按元后傳王鳳兄弟八人鳳崇以與元后同母先侯譚商立根逢時同日侯世謂之五侯曼乃五侯之兄早死不侯五侯無羣弟疑羣字當作兄賂遺珍寳四面而至皆通敏人事好士養賢傾財施予以相髙尚遺于季翻好呼到翻施式䜴翻予讀曰與賔客滿門競為之聲譽劉向謂陳湯曰今災異如此而外家日盛其漸必危劉氏吾幸得以同姓末屬累世䝉漢厚恩身為宗室遺老歴事三主三主宣元成上以我先帝舊臣每進見常加優禮見賢遍翻吾而不言孰當言者遂上封事極諫曰臣聞人君莫不欲安然而常危莫不欲存然而常亡失御臣之術也夫大臣操權柄持國政未有不為害者也操千髙翻故書曰臣之有作威作福害于而家凶于而國師古曰周書洪範也而汝也言唯君得作威作福臣下為之則致凶害也孔子曰禄去公室政逮大夫危亡之兆也臣瓚曰政不由君下及大夫也師古曰論語孔子曰禄之去公室五世矣政逮於大夫四世矣故夫三桓之子孫㣲矣今王氏一姓乗朱輪華轂者二十三人青紫貂蟬充盈幄内魚鱗左右漢制列侯紫綬二千石青綬侍中中常侍皆銀璫左貂金附蟬師古曰言在帝之左右相次若魚鱗也大将軍秉事用權五侯驕奢僣盛並作威福擊斷自恣行汚而寄治身私而託公師古曰内為汚私之行而外則寄託治公之道也斷丁亂翻行下孟翻依東宮之尊師古曰東宮太后所居也余按漢制太后率居長樂宮在未央宮東故曰東宮假甥舅之親以為威重尚書九卿州牧郡守皆出其門筦執樞機朋黨比周比毗至翻稱譽者登進忤恨者誅傷游談者助之説執政者為之言譽音余忤五故翻為于偽翻排擯宗室孤弱公族其有智能者尤非毁而不進逺絶宗室之任不令得給事朝省逺于願翻朝直遥翻恐其與己分權數稱燕王蓋主以疑上心燕盖事見昭帝紀師古曰以示宗室親近而反逆也數所角翻避諱呂霍而弗肯稱呂氏事見呂后紀霍氏事見宣帝紀師古曰呂霍二家皆坐専擅誅滅故為王氏諱而不言也内有管蔡之萌外假周公之論兄弟據重宗族磐互歴上古至秦漢外戚僣貴未有如王氏者也物盛必有非常之變先見為其人㣲象言伏於㣲而著於象也見賢遍翻孝昭帝時冠石立於泰山仆柳起於上林事見二十三卷昭帝元鳳三年而孝宣帝即位今王氏先祖墳墓在濟南者王氏本濟南東平陵人武帝時繡衣御史王賀既免官乃徙居魏郡元城其梓柱生枝葉扶疏上出屋根地中康曰則洽切余按字書測洽之臿從千從臼與今臿字不同漢書作根垂地中意即垂字也雖立石起栁無以過此之明也事埶不兩大王氏與劉氏亦且不並立如下有泰山之安則上有累卵之危陛下為人子孫守持宗廟而令國祚移於外親降為皁𨽻師古曰皁𨽻卑賤之人也春秋左氏傳曰大夫臣士士臣皁皁臣輿輿臣𨽻也縦不為身為于偽翻奈宗廟何婦人内夫家而外父母家此亦非皇太后之福也如淳曰内猶親也而皇太后反外夫家也孝宣皇帝不與舅平昌侯權所以安全之也平昌侯王無故宣帝舅也夫明者起福於無形銷患於未然宜發明詔吐徳音援近宗室親而納信師古曰援引也謂升引而附近之也援音爰近其靳翻黜逺外戚毋授以政師古曰逺謂疏而離之也音于萬翻皆罷令就弟弟與第同漢書率作弟孟康曰第宅也有甲乙次第也亦作弟以則效先帝之所行厚安外戚全其宗族誠東宮之意外家之福也王氏永存保其爵禄劉氏長安不失社稷所以褒睦外内之姓子子孫孫無疆之計也如不行此䇿田氏復見於今六卿必起於漢田氏篡齊六卿分晉言漢亦将有此禍也復扶又翻為後嗣憂昭昭甚明唯陛下深留聖思書奏天子召見向歎息悲傷其意謂曰君且休矣吾将思之然終不能用其言秋闗東大水八月甲申定陶共王康薨是嵗徙信都王興為中山王資治通鑑卷三十
