front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷一百八十二宋司馬光撰胡三省音註隋紀六起昭陽作噩盡旃䝉大淵獻凡三年煬皇帝中大業九年春正月丁丑詔徴天下兵集涿郡始募民為驍果為驍果作逆張本驍古堯翻修遼東古城以貯軍糧漢晉以來遼東郡皆治襄平慕容氏始鎮平郭前伐髙麗圍遼東言即漢襄平城今言復修古城盖城郭有遷徙也貯下吕翻靈武賊帥白瑜娑帝改靈州為靈武郡帥所類翻娑桑何翻考異曰隋書作白榆妄今從略記劫掠牧馬北連突厥厥九勿翻隴右多被其患被皮義翻謂之奴賊戊戍赦天下己亥命刑部尚書衛文昇等輔代王侑留守西京是後李淵得以尊立代王守手又翻二月壬午詔宇文述以兵糧不繼遂陷王師事見上卷上年乃軍吏失於支科非述之罪宜復其官爵年考異曰雜記在去十二月今從隋書尋又加開府儀同三司帝謂侍臣曰髙麗小虜侮慢上國今抜海移山猶望克果克能也果决也麗力知翻况此虜乎乃復議伐髙麗復扶又翻左光祿大夫郭榮諫曰戎狄失禮臣下之事千鈞之弩不為鼷䑕發機杜襲諫曹操嘗有是言鼷音奚小䑕也柰何親辱萬乘以敵小冦乎乘䋲證翻帝不聽二月丙子濟隂孟海公起為盗保㨿周橋帝改曹州為濟隂郡濟子禮翻衆至數萬見人稱引書史輙殺之丁丑發丁男十萬城大興大興城西京城戊寅帝幸遼東命民部尚書樊子葢等開皇三年改度支尚書為户部尚書帝又改為民部尚書併曹郎亦改之輔越王侗留守東都是後遂階王世充僭竊侗他紅翻時所在盗起齊郡王薄孟讓北海郭方預清河張金稱平原郝孝徳河間格謙勃海孫宣雅各聚衆攻剽帝改青州為北海郡瀛州為河間郡滄州為勃海郡姓苑格姓允格之後東觀漢記有侍御史東平相格班稱尺證翻郝呼各翻格古百翻剽匹妙翻多者十餘萬少者數萬人少詩沼翻山東苦之天下承平曰乆人不習戰郡縣吏每與賊戰望風沮敗沮在吕翻唯齊郡丞閺鄉張須陀隋志閺鄉縣屬河南郡本湖城開皇十六年改焉閺音旻得士衆心勇决善戰將郡兵擊王薄於泰山下隋志泰山在魯郡慱城縣湏陀葢越郡城而戰將即亮翻薄恃其驟勝不設備須陀掩擊大破之薄收餘兵北度河湏陀追擊於臨邑又破之隋志臨邑縣屬齊郡薄北連孫宣雅郝孝徳等十餘萬攻章丘隋志章丘縣舊曰髙唐開皇十六年改焉亦屬齊郡須陀帥歩騎二萬擊之賊衆大敗賊帥裴長才等衆二萬掩至城下大掠須陀未暇集兵帥五騎與戰帥讀曰率賊帥所類翻騎竒寄翻賊競赴之圍百餘重身中數創重直龍翻中竹仲翻創初良翻勇氣彌厲㑹城中兵至賊稍却須陀督衆擊之長才等敗走庚子郭方預等合軍攻陷北海大掠而去須陀謂官屬曰賊恃其彊謂我不能救吾今速行破之必矣乃簡精兵倍道進擊大破之斬數萬級前後獲賊輜重不可勝計重直用翻勝音升歴城羅士信厯城縣舊置濟南郡隋為齊郡治所年十四從須陀擊賊於濰水上隋志濰水在北海郡下宻縣濰音維賊始布陳士信馳至陳前刺殺數人陳讀曰陣下同刺七亦翻斬一人首擲空中以稍盛之掲以畧陳賊徒愕眙莫敢近矟色角翻盛受也時征翻掲其謁翻擔掲也眙丑吏翻近其靳翻須陀因引兵奮擊賊衆大潰士信逐北每殺一人劓其鼻懐之劓魚器翻還以騐殺賊之數須陀歎賞引置左右每戰須陀先登士信為副帝遣使慰諭并畫須陀士信戰陳之狀而觀之使疏吏翻畫與晝通夏四月庚午車駕度遼壬申遣宇文述與上大將軍楊義臣趣平壤趣七喻翻左光祿大夫王仁恭出扶餘道仁恭進軍至新城新城在南蘇城之西髙麗兵數萬拒戰仁恭帥勁騎一千擊破之髙麗嬰城固守帝命諸將攻遼東聽以便宜從事麗力知翻帥讀曰率騎竒寄翻將即亮翻飛樓橦雲梯地道四面俱進橦宅江翻晝夜不息而髙麗應變拒之二十餘日不拔主客死者甚衆守者為主攻者為客衝梯竿長十五丈驍果吳興沈光升其端隋志吳郡烏程縣舊置吳興郡史以舊郡名書長直亮翻驍堅堯翻下同臨城與髙麗戰短兵接殺十數人髙麗競擊之而墜未及地適遇竿有垂絙絙古恒翻索也光接而復上復扶又翻上時掌翻帝望見壯之即拜朝散大夫朝直遙翻散悉但翻恒置左右恒户登翻禮部尚書楊𤣥感驍勇便騎射好讀書喜賔客騎竒寄翻好呼到翻下同喜許記翻海内知名之士多與之遊與蒲山公李密善密弼之曾孫也李密襲爵蒲山郡公蒲山郡闕李弼宇文氏佐命功臣少有才略志氣雄遠輕財好士為左親侍隋制左右翊衛府領親勲武三侍左親侍屬左翊衛少詩照翻帝見之謂宇文述曰向者左仗下黑色小兒聸視異常勿令宿衛述乃諷密使稱病自免密遂屏人事屏必郢翻專務讀書嘗乘黄牛讀漢書楊素遇而異之因召至家與語大悦謂其子𤣥感等曰李密識度如此汝等不及也由是𤣥感與為深交時或侮之密曰人言當指實寧可面諛若决機兩陳之間喑嗚咄嗟使敵人震懾陳讀曰陣喑於今翻咄當没翻懾之渉翻密不如公驅䇿天下賢俊各申其用公不如密豈可以階級稍崇而輕天下士大夫邪𤣥感笑而服之李密事始此素恃功驕倨朝宴之際或失臣禮朝直遙翻下司帝心銜而不言素亦覺之及素薨帝謂近臣曰使素不死終當族滅𤣥感頗知之且自以累世貴顯在朝文武多父之故吏見朝政日紊紊音問而帝多猜忌内不自安乃與諸弟濳謀作亂帝方事征伐𤣥感自言世荷國恩願為將領帝喜曰將門必有將相門必有相固不虚也荷下可翻將即亮翻相悉亮翻由是寵遇日隆頗預朝政帝伐髙麗命𤣥感於黎陽督運遂與虎賁郎將王仲伯汲郡贊治趙懐義等謀按隋志帝改州為郡郡置太守罷長史司馬置賛務一人以貳之賛務即賛治也隋書成於唐臣避髙宗名故改治為務治直吏翻故逗遛漕運不時進發逗音豆遛音留欲令度遼諸軍乏食帝遣使者促之令力丁翻使疏吏翻𤣥感揚言水路多盗不可前後而發𤣥感弟虎賁郎將𤣥縱鷹揚郎將萬石並從幸遼東𤣥感濳遣人召之二人皆亡還萬石至髙陽高陽縣屬河間郡為監事許華所執按唐六典武庫署太倉署皆有監事葢因隋制也監工銜翻斬於涿郡時右驍衛大將軍來䕶兒以舟師自東萊將入海趣平壤𤣥感遣家奴偽為使者從東方來詐稱䕶兒反驍堅堯翻六月乙巳𤣥感入黎陽閉城大索男夫索山客翻取帆布為牟甲帆施於船上以汎風時軍興織蒲不給擬布為之牟兠牟也署官屬皆凖開皇之舊不用帝所改官制移書傍郡以討䕶兒為名各令發兵㑹於倉所倉謂黎陽倉郡縣官有幹用者𤣥感皆以運糧追集之以趙懐義為衛州刺史東光尉元務本為黎州刺史河内郡主簿唐禕為懐州刺史復開皇之制以郡為州以太守為刺史隋志州郡皆置主簿東光縣屬平原郡宋白曰今定遠軍治東光縣漢舊縣也故城在今縣東二十里齊天保七年移於今縣東南三十里陶氏故城隋開皇三年又移於後魏廢勃海郡城縣置令丞尉正禕許韋翻考異曰雜記作懐州司功書佐今從隋書治書侍御史游元隋御史臺置治書侍御史二員帝增為正五品治直之翻督運在黎陽𤣥感謂曰獨夫肆虐陷身絶域此天亡之時也我今親帥義兵以誅無道卿意如何元正色曰尊公荷國寵靈近古無比公之弟兄青紫交映當謂竭誠盡節上荅鴻恩豈意墳土未乾帥讀曰率荷下可翻乾音干親圖反噬僕有死而已不敢聞命𤣥感怒而囚之屢脅以兵不能屈乃殺之元明根之孫也游明根元魏太和中以儒名𤣥感選運夫少壯者得五千餘人少詩照翻丹陽宣城篙梢三千餘人帝改蔣州為丹陽郡改宣州為宣城郡篙梢習於用舟者篙音髙進船竿也刑三牲誓衆且諭之曰主上無道不以百姓為念天下騷擾死遼東者以萬計今與君等起兵以救兆民之弊何如衆皆踴躍稱萬嵗乃勒兵部分分扶問翻唐禕自𤣥感所逃歸河内先是𤣥感隂遣家僮至長安先悉薦翻召李密及弟𤣥挺赴黎陽及舉兵密適至𤣥感大喜以為謀主謂密曰子常以濟物為己任今其時矣計將安出密曰天子出征逺在遼外去幽州猶隔千里南有巨海北有强胡中間一道理極艱危公擁兵出其不意長驅入薊據臨渝之險臨渝闗隋屬平州盧龍縣即所謂盧龍之險也顔師古曰渝音喻今多讀如榆扼其咽喉咽於賢翻歸路既絶髙麗聞之必躡其後不過旬月資糧皆盡其衆不降則潰可不戰而擒此上計也麗力知翻降户江翻𤣥感曰更言其次密曰關中四塞天府之國雖有衛文昇不足為意今帥衆鼓行而西帥讀曰率下同經城勿攻直取長安收其豪傑撫其士民據險而守之天子雖還失其根本可徐圖也𤣥感曰更言其次密曰簡精鋭晝夜倍道襲取東都以號令四方但恐唐禕告之先已固守禕許韋翻若引兵攻之百日不克天下之兵四面而至非僕所知也𤣥感曰不然今百官家口並在東都若先取之足以動其心且經城不拔何以示威其後𤣥感攻𢎞農自速敗亡其識度已見於此公之下計乃上䇿也遂引兵向洛陽遣楊𤣥挺將驍勇千人為前鋒將即亮翻下同驍堅堯翻先取河内唐禕㨿城拒守𤣥挺無所獲禕又使人告東都越王侗與樊子葢等勒兵為備果如李密所料侗他紅翻修武民相帥守臨清關修武縣屬河内郡𤣥感不得度乃於汲郡南渡河從之者如市使弟積善將兵三千自偃師南緣洛水西入隋志偃師縣舊廢開皇十六年復置屬河南郡𤣥挺自白司馬坂逾邙山南入白司馬坂在邙山北邙山在洛城北坂音反𤣥感將三千餘人隨其後相去十里許自稱大軍其兵皆執單刀栁楯楯食尹翻干也以扜弓矢無弓矢甲胄東都遣河南令達奚善意隋志河南縣帶河南郡將精兵五千人拒積善將作監河南贊治裴𢎞䇿將八千人拒𤣥挺治直吏翻善意度洛南營於漢王寺明日積善兵至不戰自潰鎧仗皆為積善所取𢎞䇿出至白司馬坂一戰敗走棄鎧仗者大半鎧可亥翻𤣥挺亦不追𢎞䇿退三四里收散兵復結陳以待之復扶又翻陳讀曰陣𤣥挺徐至坐息良乆忽起擊之𢎞䇿又敗如是五戰丙辰𤣥挺直抵太陽門𢎞䇿將十餘騎馳入宫城自餘無一人返者皆歸於𤣥感𤣥感屯上春門隋志河南郡舊置洛州大業元年移都改曰豫州東面三門北曰上春中曰建陽無太陽門當考將即亮翻劉考異曰𤣥感傳云屯兵上春門又云屯兵尚書省按仁軌河洛記東都羅郭東面北頭第一曰上春門唐改曰上東門又尚書省在宣仁門内𤣥感不容至此每誓衆曰我身為上柱國家累鉅萬金至於富貴無所求也今不顧滅族者但為天下解倒懸之急耳為于偽翻衆皆悦父老爭獻牛酒子弟詣軍門請自効者日以千數内史舍人韋福嗣洸之兄子也韋洸著聲績於平陳之後洸古黄翻從軍出拒𤣥感為𤣥感所獲𤣥感厚禮之使與其黨胡師耽共掌文翰𤣥感令福嗣為書遺樊子葢數帝罪惡遺于季翻數所具翻云今欲廢昏立明願勿拒小禮自貽伊戚樊子葢新自外藩入為京官樊子葢自涿郡留守為東都留守東都舊官多慢之至於部分軍事未甚承稟分扶問翻裴𢎞䇿與子葢同班賛治次留守立班故言同班前出討賊失利子葢更使出戰不肯行子葢命引出斬之以狥國子祭酒河東楊汪小有不恭楊汪傳本𢎞農華隂人曾祖順徙河東子葢又將斬之汪頓首流血乃得免於是將吏震肅無敢仰視是將子亮翻令行禁止𤣥感盡鋭攻城子葢隨方拒守𤣥感不能克然達官子弟應募從軍者聞𢎞䇿死皆不敢入城韓擒虎子世咢咢五各翻觀王雄子恭道虞世基子柔來䕶兒子淵裴藴子爽大理卿鄭善果子儼周羅㬋子仲等四十餘人皆降於𤣥感降户江翻下同𤣥感悉以親重要任委之善果譯之兄子也鄭譯髙祖佐命𤣥感收兵得五萬餘人分五千守慈磵道隋志河南郡壽安縣有慈磵五千守伊闕道隋志河南郡伊闕縣舊曰新城開皇十八年改名以伊闕山名縣也遣韓世咢將三千人圍滎陽隋志滎陽縣屬滎陽郡郡治管城滎陽在郡西顧覺將五千人取虎牢隋志滎陽郡汜水縣舊曰成臯即虎牢也開皇十八年改曰汜水大業初置虎牢都尉府虎牢降降户江翻以覺為鄭州刺史鎮虎牢代王侑使刑部尚書衛文昇帥兵四萬救東都代王侑時守長安帥讀曰率衆考異曰隋書云歩騎七萬按𤣥感不過十萬而下云衆寡不敵今從雜記文昇至華隂掘楊素冢隋志華隂縣屬京兆郡楊素世居華隂死葬焉華户化翻焚其骸骨示士卒以必死遂鼓行出崤澠直趨東都城北崤崤谷澠澠池澠彌兖翻趨七喻翻𤣥感逆拒之文昇且戰且行屯於金谷金谷即晉石崇之金谷也水經注榖水自千金堨東逕睪門橋又東左㑹金谷水水出太白原東南流厯金谷謂之金谷澗在河南縣界遼東城乆不拔帝遣造布囊百餘萬口滿貯土貯丁吕翻欲積為魚梁大道築道若魚梁然闊三十歩髙與城齊使戰士登而攻之又作八輪樓車樓車下施八輪髙出於城夾魚梁道欲俯射城内射而亦翻指期將攻城内危蹙㑹楊𤣥感反書至帝大懼引納言蘇威入帳中謂曰此兒聰明得無為患威曰人識是非審成敗乃謂之聰明夫音扶𤣥感麤疎必無所慮但恐因此寖成亂階耳帝又聞達官子弟皆在𤣥感所益憂之兵部侍郎斛斯政素與𤣥感善𤣥感之反政與之通謀𤣥縱兄弟亡歸政濳遣之帝將窮治𤣥縱等黨與治直之翻政内不自安戊辰亡奔髙麗史言叚文振之言驗麗力知翻庚午夜二更二更乙夜也甲乙丙丁戊分為五夜守卒分畨守漏鳴鼓以相警謂之持更更工衡翻帝密召諸將使引軍還還從宣翻又音如字軍資器械攻具積如丘山營壘帳幕案堵不動皆棄之而去衆心忷懼忷許拱翻無復部分諸道分散復扶又翻部分扶問翻髙麗即時覺之然不敢出但於城内鼓譟至來日午時方漸出外四遠覘偵覘丑亷翻又丑塹翻偵丑鄭翻猶疑隋軍詐之經二日乃出數千兵追躡畏隋兵之衆不敢逼常相去八九十里將至遼水知御營畢度乃敢逼後軍時後軍猶數萬人髙麗隨而抄擊最後羸弱數千人為所殺略麗力知翻抄楚交翻羸倫為翻初帝再征髙麗復問太史令庾質曰今叚何如今叚言自今以後一叚事也復扶又翻對曰臣實愚迷猶執前見庾質前對見上卷八年陛下若親動萬乘勞費實多乘繩證翻帝怒曰我自行猶不克直遣人去安得有功及還謂質曰卿前不欲我行當為此耳還從宣翻又音如字為于偽翻𤣥感其有成乎質曰𤣥感地勢雖隆素非人望因百姓之勞兾幸成功今天下一家未易可動易以䜴翻帝遣虎賁郎將陳稜攻元務本於黎陽又遣左翊衛大將軍宇文述右候衛將軍屈突通乘傳發兵以討𤣥感屈區勿翻傳株戀翻來䕶兒至東萊聞𤣥感圍東都召諸將議旋軍救之諸將咸以無敕不宜擅還固執不從䕶兒厲聲曰洛陽被圍心腹之疾髙麗逆命猶疥癬耳將即亮翻被皮義翻疥癬皮膚之疾公家之事知無不為專擅在吾不關諸人有沮議者軍法從事沮在吕翻即日廻軍令子𢎞整馳驛奏聞帝時還至涿郡已敕䕶兒救東都見𢎞整甚悦按隋書來䕶兒傳𢎞整䕶兒之二子賜䕶兒璽書曰公旋師之時是朕敕公之日君臣意合遠同符契先是右武候大將軍李子雄坐事除名今從軍自効從來䕶兒在東萊帝疑之按隋書子雄傳因𤣥感反而疑之璽斯氏翻先悉薦翻詔鎻子雄送行在所子雄殺使者逃奔𤣥感使䟽吏翻衛文昇以歩騎二萬度瀍水水經瀍水出河南榖城縣北山東過洛陽偃師而入于洛騎竒寄翻瀍音㕓與𤣥感戰𤣥感屢破之𤣥感每戰身先士卒先悉薦翻所向摧陷又善撫悦其下皆樂為致死樂音洛為于偽翻由是每戰多捷衆益盛至十萬人文昇衆寡不敵死傷大半且盡地考異曰雜記曰每戰刄纔接官軍皆坐棄甲以白布裹頭聴賊所掠前後十三戰皆不利今從文昇傳乃更進屯邙山之陽與𤣥感决戰一日十餘合㑹楊𤣥挺中流矢死中竹仲翻𤣥感軍乃稍却秋七月癸未餘杭民劉元進起兵以應𤣥感元進手長尺餘手長尺餘言自指至掌腕横紋之長長直亮翻臂垂過膝言臂垂則其手過膝過古禾翻自以相表非常相息亮翻隂有異志㑹帝再發三吳兵征髙麗三吳兵皆相謂曰往嵗天下全盛吾輩父兄征髙麗者猶大半不返此指八年事今已罷弊復為此行罷讀曰疲復扶又翻吾屬無遺類矣由是多亡命郡縣捕之急聞元進舉兵亡命者雲集旬月間衆至數萬始楊𤣥感至東都自謂天下響應得韋福嗣委以心膂不復專任李密復扶又翻福嗣每畫䇿皆持兩端密揣知其意揣初委翻謂𤣥感曰福嗣元非同盟實懐觀望明公初起大事而姦人在側聽其是非必為所誤請斬之𤣥感曰何至於此密退謂所親曰楚公好反而不欲勝𤣥感襲爵楚國公故稱之好呼到翻吾屬今為虜矣李子雄勸𤣥感速稱尊號𤣥感以問密密曰昔陳勝自欲稱王張耳諫而被外事見七卷秦二世元年被皮義翻魏武將求九錫荀彧止而見誅事見六十六卷漢獻帝建安十七年今者密欲正言還恐追縱二子阿䛕順意又非密之本圖何者兵起以來雖復頻捷復扶又翻下葢復同至於郡縣未有從者東都守禦尚彊天下救兵益至公當挺身力戰早定關中廼亟欲自尊何示人不廣也亟已力翻𤣥感笑而止屈突通引兵屯河陽宇文述繼之𤣥感問計於李子雄子雄曰通曉習兵事若一得度河則勝負難决不如分兵拒之通不能濟則樊衛失援樊衛謂樊子葢衛文昇也𤣥感然之將拒通樊子葢知其謀數擊其營𤣥感不得往斯亦伐謀之一也使援兵不合樊子葢堅守都城兵何由解數所角翻下軍數同通濟河軍於破陵破陵當在河陽南岸洛城東北𤣥感分為兩軍西抗文昇東拒通子葢復出兵大戰𤣥感軍屢敗與其黨謀之李子雄曰東都援軍益至我軍數敗不可乆留不如直入闗中開永豐倉以振貧乏新唐志華隂縣有永豐倉葢隋所置也三輔可指麾而定此指言漢三輔之地據有府庫東面而爭天下亦霸王之業也李密曰𢎞化留守元𢎞嗣握彊兵在隴右帝改慶州為𢎞化郡其地屬隴右可聲言其反遣使迎公因此入關可以紿衆使疏吏翻紿徒亥翻㑹華隂諸楊請為鄉導華隂諸楊𤣥感之宗黨也華户化翻鄉讀曰嚮壬辰𤣥感解東都圍引兵西趣潼闗潼關在華隂縣趣七喻翻宣言我已破東都取闗西矣宇文述等諸軍躡之至𢎞農宫隋志河南郡陜縣後魏置陜州恒農郡開皇初廢郡大業初廢州置𢎞農宫恒農即𢎞農後魏避諱改曰恒農父老遮説𤣥感曰宫城空虚又多積粟攻之易下説式芮翻易以豉翻𤣥感以為然𢎞農太守蔡王智積觀此則帝廢陜州改為𢎞農郡也智積高祖弟整之子守式又翻謂官屬曰𤣥感聞大將軍至欲西圖關中若成其計則難克也當以計縻之使不得進不出一旬可以成擒及𤣥感軍至城下智積登陴詈之陴符支翻城上女垣詈力智翻罵也𤣥感怒留攻之李密諫曰公今詐衆西入軍事貴速况乃追兵將至安可稽留若前不得據關謂據潼關也退無所守大衆一散何以自全𤣥感不從遂攻之燒其城門智積於内益火𤣥感兵不得入三日不拔乃引而西至閺鄉閺音旻宇文述衛文昇來䕶兒屈突通等軍追及於皇天原水經注玉澗水南出王溪北流逕皇天原西周固記開山東首上平慱方可里餘三面壁立高千許仭漢世祭天於其上名之為皇天原上有漢武思子臺又北逕閺鄉城西又有全鳩澗水出南山北逕皇天原東隋志閺鄉縣有玉澗全鳩澗𤣥感上槃豆即西魏將于謹所攻拔盤豆也上時掌翻布陳亘五十里陳讀曰陣下同亘古鄧翻且戰且行𤣥感一日三敗八月壬寅𤣥感陳於董杜原諸軍擊之𤣥感大敗獨與十餘騎奔上洛帝改商州為上洛郡𤣥感欲由華陽以奔上洛也騎竒寄翻下同追騎至𤣥感叱之皆反走至葭蘆戍葭音加獨與弟積善徒步走自度不免度徒洛翻謂積善曰我不能受人戮辱汝可殺我積善抽刀斫殺之因自刺不死刺七亦翻為追兵所執與𤣥感首俱送行在所磔𤣥感尸於東都市三日復臠而焚之磔陟格翻復扶又翻臠力兖翻𤣥感弟𤣥奬為義陽太守隋志義陽郡齊梁之司州後魏改曰郢州後周改曰申州大業初改義州尋改為義陽郡守式又翻將赴𤣥感為郡丞周旋玉所殺隋書楊𤣥感傳作周旋玉仁行為朝請大夫伏誅於長安楊素之門於是滅矣朝直遙翻𤣥感之圍東都也梁郡民韓相國舉兵應之帝改宋州為梁郡相息亮翻𤣥感以為河南道元帥帥所類翻旬月間衆十餘萬攻剽郡縣至襄城隋志襄城郡東魏置北荆州後周改曰和州開皇初改為伊州大業初改為汝州尋改為郡剽匹妙翻聞𤣥感敗衆稍散為吏所獲傳首東都帝以元𢎞嗣斛斯政之親也留守𢎞化郡隋書元𢎞嗣傳云屯兵安定遣衛尉少卿李淵馳徃執之少始照翻因代為留守關右十三郡兵皆受徴發十三郡天水隴西金城枹罕臨洮漢陽靈武朔方平凉𢎞化延安雕隂上郡也淵御衆寛簡人多附之帝以淵相表竒異相息譛翻又名應圖䜟忌之䜟楚譛翻未幾徴詣行在所淵遇疾未謁謁見也幾居豈翻其甥王氏在後宫帝問曰汝舅來何遲王氏以疾對帝曰可得死否淵聞之懼因縱酒納賂以自晦李淵事始此癸夘吳郡朱爕晉陵管崇聚衆冦掠江左隋志吳郡陳置吳州平陳改曰蘇州大業初復曰吳州尋改為吳郡毗陵郡平陳置常州帝改為晉陵郡爕本還俗道人渉獵經史頗知兵灋形容眇小為崑山縣慱士劉昫曰崑山本漢婁縣地梁分婁縣置信義縣又分信義置崑山縣取縣界山名時屬吳郡隋制縣慱士不見于志葢在曹佐市令之下與數十學生起兵民苦役者赴之如歸崇長大美姿容志氣倜儻倜他狄翻隠居常熟常熟吳晉南沙之地本屬吳縣晉分吳縣置海虞縣梁置常熟縣劉昫曰今崑山縣東一百三十里常熟故城是也隋治南沙城屬吳郡自言有王者相相息亮翻故羣盗相與奉之時帝在涿郡命虎牙郎將趙六兒將兵萬人屯楊子楊子地名時屬江都縣將即亮翻下同分為五營以備南賊南賊謂劉元進及崇爕等崇遣其將陸顗度江夜襲六兒破其兩營收其器械軍資而去顗魚豈翻衆益盛至十萬辛酉司農卿雲陽趙元淑坐楊𤣥感黨伏誅隋書楊𤣥感傳作博陵趙元淑此言雲陽隋志博陵郡舊定州雲陽縣屬京兆郡地理相去逺甚當考帝使大理卿鄭善果御史大夫裴藴刑部侍郎骨儀與留守樊子葢推𤣥感黨與帝置六部侍郎以貳尚書之職守式又翻推尋也考鞠也考異曰雜記作滑儀今從隋書雜記推𤣥感黨在十月疑太晩今因誅趙元淑言之儀本天竺胡人也隋書隂壽傳言骨儀京兆長安人葢本天竺胡人而居京兆長安也帝謂藴曰𤣥感一呼而從者十萬呼火故翻益知天下人不欲多多即相聚為盗耳不盡加誅無以懲後子葢性既殘酷藴復受此㫖復扶又翻由是峻灋治之治直之翻所殺三萬餘人皆籍没其家枉死者大半流徙者六千餘人𤣥感之圍東都也開倉賑給百姓凡受米者皆阬之於都城之南𤣥感所善文士㑹稽虞綽琅邪王胄隋志㑹稽郡梁置東楊州平陳改曰吳州大業初改越州尋復改為㑹稽郡琅邪郡舊置北徐州後周改曰沂州帝復改為琅邪郡㑹古外翻邪讀曰耶俱坐徙邊綽胄亡命捕得誅之帝善屬文屬之欲翻不欲人出其右薛道衡死道衡死見上卷五年帝曰更能作空梁落燕泥否王胄死帝誦其佳句曰庭草無人隨意綠復能作此語邪復扶又翻帝自負才學每驕天下之士嘗謂侍臣曰天下皆謂朕承籍緒餘而有四海設令朕與士大夫髙選亦當為天子矣令力丁翻帝從容謂秘書郎虞世南曰我性不喜人諫從千容翻喜許記翻若位望通顯而諫以求名彌所不耐至於卑賤之士雖少寛假然不置之地上少詩沼翻卒子恤翻汝其知之世南世基之弟也帝使裴矩安集隴右因之㑹寧存問曷薩那可汗部落八年帝處曷薩那部落于㑹寧今遣矩存問之薩桑葛翻可從刋入聲汗音寒遣闕度設冦掠吐谷渾以自富還而奏狀帝大賞之吐從暾入聲谷音浴還音旋又如字賞稱奬也九月己夘東海民彭孝才起為盗帝改海州為東海郡有衆數萬甲午車駕至上谷隋志開皇元年以易縣置易州帝改為上谷郡按秦置上谷郡本治沮易王隠晉書地道志曰郡在谷之頭故因以上谷名焉隋之易縣則漢涿郡故安縣地也非古上谷以供費不給免太守虞荷等官守武又翻閏月己巳幸博陵冬十月丁丑賊帥吕明星圍東郡東郡古白馬之地隋開皇九年置杞州十六年改滑州大業二年改為兖州尋改為東郡帥所類翻虎賁郎將費青奴擊破之賁音奔將即亮翻陳湘姓林曰費氏音蜚夏禹之後趙明誠曰費字有兩姓音讀不同源流亦異其一音蜚嬴姓出於伯益之後史記所載費昌費中楚費無極漢費將軍費直費長房費禕之徒是其後也其一音秘出於魯季友姓苑所載琅邪費氏則是其後也劉元進帥其衆將度江帥讀曰率㑹楊𤣥感敗朱爕管崇共迎元進推以為主㨿吳郡稱天子爕崇俱為尚書僕射署置百官毗陵東陽㑹稽建安豪傑多執長吏以應之帝改婺州為東陽郡大業初改泉州為閩州尋改為建安郡長知兩翻㑹工外翻帝遣左屯衛大將軍代人吐萬緒隋書吐萬緒代郡鮮卑人吐萬葢鮮卑複姓也隋志大業初於馬邑善陽縣置代郡光祿大夫下邽魚俱羅隋志下邽縣屬馮翊郡風俗通魚姓宋公子魚之後將兵討之將即亮翻又音如字十一月己酉右候衛將軍馮孝慈討張金稱於清河孝慈敗死稱尺證翻帝改貝州為清河郡楊𤣥感之西也韋福嗣亡詣東都歸首嗣祥吏翻首手又翻是時如其比者皆不問樊子葢收𤣥感文簿得其書草即福嗣所草遺子葢之書封以呈帝帝命執送行在李密亡命為人所獲亦送東都詢考異曰隋書密傳云密間行入關與𤣥感從叔相隨匿於馮翊詢妻之舍尋為鄰人所告遂捕獲囚於京兆獄又云及出關外防禁漸弛又云至邯鄲密等七人皆穿墻而遁唐書雖不云囚於京兆獄亦云出闗按密若自關中送髙陽不當與韋福嗣同行今從賈閏甫蒲山公傳及劉仁軌河洛行年記樊子葢鎻送福嗣密及楊積善王仲伯等十餘人詣髙陽密與王仲伯等竊謀亡去悉使出其所齎金以示使者曰吾等死日此金並留付公幸用相瘞使疏吏翻下同瘞於計翻其餘即皆報徳使者利其金許諾防禁漸弛密請通市酒食每宴飲諠譁竟夕使者不以為意行至魏郡石梁驛飲防守者皆醉穿墻而逸帝改相州為魏郡飲防之飲於禁翻考異曰河洛記曰左梁驛今從蒲山公傳密呼韋福嗣同去福嗣曰我無罪天子不過一面責我耳至髙陽帝以書草示福嗣收付大理宇文述奏凶逆之徒臣下所當同疾若不為重灋無以肅將來帝曰聽公所為十二月甲申述就野外縛諸應刑者於格上以車輪括其頸使文武九品以上皆持兵斫射射而亦翻亂發矢如蝟毛支體糜碎猶在車輪中積善福嗣仍加車裂皆焚而揚之積善自言手殺𤣥感冀得免死帝曰然則梟類耳因更其姓曰梟氏梟食母説文曰不孝鳥更工衡翻梟古堯翻唐縣人宋子賢善幻術隋志唐縣屬博陵郡幻術者化無為有以眩惑人幻户辦翻能變佛形自稱彌勒出世遠近信惑遂謀因無遮大㑹舉兵襲乘輿天子曰乘輿乘繩證翻事泄伏誅并誅黨與千餘家扶風桑門向海明亦自稱彌勒出世人有歸心者輙獲吉夢由是三輔人翕然奉之帝改岐州為扶風郡扶風漢三輔之一也因舉兵反衆至數萬丁亥海明自稱皇帝改元白烏詔太僕卿楊義臣擊破之帝召衛文昇樊子葢詣行在慰勞之賞賜極厚遣還所任賞其拒討楊𤣥感之功遣各還留臺勞力到翻劉元進攻丹陽隋書吐萬緒傳云時元進以兵攻潤州按唐志武徳三年始以延陵縣地置潤州而潤州管下丹陽縣本曲阿亦唐改名元進所攻葢此丹陽非隋志之丹陽郡隋之丹陽郡治石頭城隋書成於武徳之後書潤州書丹陽皆以唐州縣書之也吐萬緒濟江擊破之元進解圍去緒進屯曲阿觀此及以隋書證之則元進所攻正潤州元進結栅拒緒相持百餘日緒擊之賊衆大潰死者以萬數元進挺身夜遁保其壘朱爕管崇等屯毗陵連營百餘里緒乘勝進擊復破之賊退保黄山隋志吳縣有黄山緒圍之元進爕僅以身免於陳斬崇及其將卒五千餘人陳讀曰陣將即亮翻收其子女三萬餘口進解㑹稽圍㑹古外翻魚俱羅與緒偕行戰無不捷然百姓從亂者如歸市賊敗而復聚復扶又翻下同其勢益盛元進退據建安帝令緒進討緒以士卒疲弊請息甲待來春克考異曰帝紀云緒與俱羅連年不能按緒請待來春而王世充十年又擊孟讓然則元進敗正在今年冬春之交矣元進退據建安而得拒世充於江上者葢復來也帝不悦俱羅亦以賊非嵗月可平諸子在洛京洛陽為東都故謂之洛京濳遣家僕迎之帝怒有司希㫖奏緒怯懦俱羅敗衂懦乃卧翻又奴亂翻衂女六翻俱羅坐斬徴緒詣行在緒憂憤道卒卒子恤翻帝更遣江都丞王世充王世充為江都郡丞帝又改郡贊治為丞更江衡翻發淮南兵數萬人討元進世充度江頻戰皆捷元進爕敗死於吳隋志吳縣吳郡治所其餘衆或降或散世充召先降者於通𤣥寺瑞像前焚香為誓約降者不殺降户江翻散者始欲入海為盗聞之旬月之間歸首略盡首手又翻世充悉阬之於黄亭澗死者三萬餘人於考異曰略記阬其衆二十餘萬黄亭澗澗長數里深濶數丈積屍與之平雜記世充貪而無信利在子女資財並阬歸首八千餘人於黄山之下今從隋書由是餘黨復相聚為盗官軍不能討以至隋亡帝以世充有將帥才益加寵任將即亮翻帥所類翻是嵗詔為盗者籍没其家時羣盗所在皆滿郡縣官因之各專威福生殺任情矣章丘杜伏威與臨濟輔公祏為刎頸交章丘臨濟二縣隋志皆屬齊郡章丘漢陽丘縣宋魏之髙唐也開皇十六年改為章丘宋白曰髙齊天保七年移髙唐縣治古黄巾城隋改章丘縣因縣東南章丘為名臨濟漢之管縣乆廢開皇六年置朝陽縣十六年改曰臨濟輔姓出於晉大夫輔躒又智果别族為輔氏顔師古曰刎斷也刎頸交言託契深重雖斷頸絶頭無所顧也濟子禮翻祏音石刎武粉翻俱亡命為羣盗唐書杜伏威傳公祏數盗姑家牧羊以餽伏威縣迹捕急乃相與亡命為盗伏威年十六每出則居前入則殿後殿丁練翻由是其徒推以為帥下邳苗海潮亦聚衆為盗隋志下邳郡後魏置南徐州梁改為東徐州東魏改為東楚州陳改為安州後周改為泗州帝改為下邳郡風俗通曰楚大夫伯棼之後賁皇奔晉食采於苗因為苗氏伏威使公祏謂之曰今我與君同苦隋政各舉大義力分勢弱常恐被擒被皮義翻若合為一則足以敵隋矣君能為主吾當敬從自揆不堪宜來聴命不則一戰以决雌雄不讀曰否海潮懼即帥其衆降之帥讀曰率降户江翻伏威轉掠淮南自稱將軍江都留守遣校尉宋顥討之帝置鷹揚府郎將副郎將毎府置越騎校尉二人掌騎士歩兵校尉二人掌步兵守式又翻校户教翻伏威與戰陽為不勝引顥衆入葭葦中因從上風縱火顥衆皆燒死海陵賊帥趙破陳以伏威兵少輕之海陵漢縣屬臨淮郡梁置海陵郡開皇初廢郡為縣隋志屬江都郡帥所類翻陳讀曰陣少詩沼翻召與并力伏威使公祏嚴兵居外自與左右十人齎牛酒入謁於座殺破陳并其衆史言杜伏威寖强十年春元考異曰雜記是年正月又以許公宇文述為帥將兵十六萬刻到鴨綠水乙支文徳遣行人為請降以緩我師又求與述相見以觀我軍形勢述與之歡飲良乆乃去停五日王師食盡燒甲札食之病不能興文徳乃縱兵大戰敗績死者十餘萬此葢序八年事誤在此耳二月辛未詔百僚議伐髙麗數日無敢言者戊子詔復徴天下兵復扶又翻百道俱進丁酉扶風賊帥唐弼立李𢎞芝為天子帥所類翻𢎞考異曰隋帝紀作李今從唐書薛舉傳有衆十萬自稱唐王三月壬子帝行幸涿郡士卒在道亡者相繼癸亥至臨渝宫隋志北平郡盧龍縣有臨渝宫諭音俞又音榆禡祭黄帝鄭𤣥曰禡師祭也在野曰禡應劭曰黄帝戰于阪泉以定天下故祭以求福祥杜佑曰禡師祭也為兵禱也其神葢蚩尤或云黄帝北齊之制天子親征將屇戰所卜剛日備𤣥牲列軍容設於辰地為墠而禡祭大司馬奠矢有司奠毛血樂奏大濩之音禮畢徹牲柴燎按記王制天子出征禡於所征之地其禮亡矣杜佑所載者北齊之禮耳禡馬嫁翻斬叛軍者以釁鼓斬人以血塗鼓亡者亦不止夏四月榆林太守成紀董純帝改勝州為榆林郡隋志成紀縣屬天水郡守式又翻與彭城賊帥張大虎戰於昌慮帝改徐州為彭城郡昌慮漢縣晉宋魏志皆有之隋已廢省其地當入彭城郡蘭陵縣界帥所類翻下同慮音廬大破之斬首萬餘級甲午車駕至北平帝改平州為北平郡五月庚申延安賊帥劉迦論隋志延安郡後魏置東夏州西魏改為延州帝改為延安郡迦音加今考異曰唐書作安定人按安定去上郡太遠從隋書自稱皇王建元大世有衆十萬與稽胡相表裏為冦詔以左驍衛大將軍屈突通為闗内討捕大使發兵擊之戰於上郡隋志上郡後魏置東秦州後改為北華州西魏改為敷州大業二年改為鄜城郡後改為上郡驍堅堯翻屈居勿翻使疏吏翻鄜音膚斬迦論將卒萬餘級將即亮翻虜男女數萬口而還還從宣翻又如字秋七月癸丑車駕次懐遠鎮時天下已亂所徴兵多失期不至髙麗亦困弊來䕶兒至畢奢城即卑沙城自登萊海道趨平壤先至卑沙城唐貞觀未程名振亦由此道麗力知翻髙麗舉兵逆戰䕶兒擊破之將趣平壤趣七喻翻髙麗王元懼甲子遣使乞降囚送斛斯政斛斯政去年奔髙麗使疏吏翻下同降户江翻帝大悦遣使持節召䕶兒還䕶兒集衆曰大軍三出未能平賊此還不可復來還從宣翻復扶又翻勞而無功吾竊耻之今髙麗實困以此衆擊之不日可克吾欲進兵徑圍平壤取髙元獻捷而歸不亦善乎答表請行不肯奉詔長史崔君肅固爭長知兩翻䕶兒不可曰賊勢破矣獨以相任自足辦之吾在閫外事當專决寧得髙元還而獲譴捨此成功所不能矣君肅告衆曰若從元帥違拒詔書必當聞奏皆應獲罪諸將懼俱請還乃始奉詔帥所類翻下賊帥將帥同將即亮翻下同八月己巳帝自懐遠鎮班師邯鄲賊帥楊公卿帥其黨八千人隋志邯鄲縣屬武安郡帥讀曰率抄駕後第八隊得飛黄上廐馬四十二匹而去抄楚交翻帝置殿内省統尚食尚藥尚衣尚舍尚乘尚輦等六局尚乘局置左右六閑一曰左右飛黄閑二左右吉良閑三左右龍媒閑四左右騊駼閑五左右駃騠閑六左右天苑閑冬十月丁夘上至東都己丑還西京以髙麗使者及斛斯政告太廟仍徴髙麗王元入朝元竟不至朝直遙翻下同敕將帥嚴裝更圖後舉竟不果行初開皇之末國家殷盛朝野皆以髙麗為意劉炫獨以為不可炫榮絹翻作撫夷論以刺之至是其言始驗十一月丙申殺斛斯政於金光門外金光門大興城西面三門之中門如楊積善之法去年殺楊積善仍烹其肉使百官噉之佞者或噉之至飽噉與啗同徒濫翻收其餘骨焚而揚之乙巳有事于南郊上不齋于次鄭氏曰次自修正之處詰朝備法駕漢仍秦制大駕八十一乘法駕三十六乘隋開皇中大駕十二乘法駕减半帝更定其制大駕用三十六法駕用十二詰去吉翻至即行禮是日大風上獨獻上帝三公分獻五帝禮畢御馬疾驅而歸乙夘離石胡劉苗王反隋志離石郡後齊置西汾州後周改為汾州帝改離石郡自稱天子衆至數萬將軍潘長文討之不克長知兩翻汲郡賊帥王徳仁擁衆數萬保林慮山為盗隋志汲郡東魏置義州後周為衛州帝改汲郡林慮山在魏郡林慮縣帥所類翻下同慮音廬帝將如東都太史令庾質諫曰比嵗伐遼比毗至翻民實勞弊陛下宜鎮撫關中使百姓盡力農桑三五年間四海稍豐實然後廵省省悉景翻於事為宜帝不悦質辭疾不從從才用翻帝怒下質獄下遐嫁翻竟死獄中十二月壬申帝如東都赦天下戊子入東都東海賊帥彭孝才轉掠沂水劉昫曰沂水漢東莞縣隋改為東安縣尋改為沂水屬琅邪郡彭城留守董純討擒之守式又翻純戰雖屢㨗而盗賊日滋或譖純怯懦懦乃卧翻又乃亂翻帝怒鎻純詣東都誅之孟讓自長白山冦掠諸郡至盱眙衆十餘萬據都梁宫隋志盱眙縣屬江都郡有都梁山都梁宫在焉山出都梁香故名盱眙音吁怡阻淮為固江都丞王世充將兵拒之為五栅以塞險要將即亮翻下同塞悉則翻羸形示弱羸倫為翻讓笑曰世充文法小吏安能將兵吾今生縳取鼓行入江都耳時民皆結堡自固野無所掠賊衆漸餒乃少留兵圍五栅分人於南方抄掠世充伺其懈少詩沼翻抄楚交翻伺相吏翻懈居隘翻縱兵出擊大破之讓以數十騎遁去騎竒寄翻下同斬首萬餘級齊郡賊帥左孝友衆十萬屯蹲狗山蹲狗者以形得名蹲徂尊翻郡丞張須陀列營逼之孝友窘迫出降須陀威振東夏降户江翻窘巨隕翻夏户雅翻以功遷齊郡通守帝罷州置郡郡置太守其後諸郡各加置通守一人位次太守守式又翻領河南道十二郡黜陟討捕大使涿郡賊帥盧明月衆十餘萬軍祝阿隋志祝阿縣屬齊郡唐改為禹城縣隋考異曰唐秦叔寶傳作下邳今從書須陀將萬人邀之將即亮翻下謂將分將同相持十餘日糧盡將退謂將士曰賊見吾退必悉衆來追若以千人襲據其營可有大利此誠危事誰能往者衆莫對唯羅士信及厯城秦叔寶請行隋志歴城縣帯齊郡於是須陀委栅而遁使二人分將千兵伏葭葦中明月悉衆追之士信叔寶馳至其栅柵門閉二人超升其樓各殺數人營中大亂二人斬關以納外兵因縱火焚其三十餘栅烟熖漲天明月奔還須陀回軍奮擊大破之明月以數百騎遁去所俘斬無筭叔寶名瓊以字行十一年春正月增祕書省官百二十員隋制秘書省監丞各一人郎四人校書郎十二人正字四人著作郎二人佐郎八人校書郎正字各二人帝增少監一人减校書郎為十人加置佐郎四人又置儒林郎十人文林郎二十人増校書郎員四十人加置楷書郎員二十人凡百一十七人並以學士補之帝好讀書著述自為揚州總管開皇十年帝為揚州總管好呼到翻置王府學士至百人常令修撰以至為帝前後近二十載近其靳翻載作亥翻修撰未嘗暫停自經術文章兵農地理醫卜釋道乃至蒱博鷹狗蒱音蒲摴蒱也皆為新書無不精洽共成三十一部萬七千餘卷初西京嘉則殿有書三十七萬卷帝命祕書監栁顧言等詮次除其複重猥雜詮此緣翻説文具也重直龍翻得正御本三萬七千餘卷納於東都修文殿又寫五十副本簡為三品分置西京東都宫省官府其正書皆裝翦華淨寶軸錦褾褾方小翻卷端也於觀文殿前為書室十四間窻户牀褥厨幔幔莫半翻咸極珍麗每三間開方户垂錦幔上有二飛仙户外地中施機發帝幸書室有宫人執香爐香爐始於漢漢官典職曰尚書郎給女史二人著潔衣服執香爐燒薰前行踐機則飛仙下收幔而上踐慈演翻上時掌翻户扉及厨扉皆自啓帝出則垂閉復故帝以户口逃亡盗賊繁多二月庚午詔民悉城居田隨近給郡縣驛亭村塢皆築城上谷賊帥王須拔自稱漫天王帥所類翻幔謨官翻國號燕賊帥魏刀兒自稱厯山飛衆各十餘萬北連突厥南冦燕趙燕因肩翻初髙祖夢洪水没都城意惡之惡烏路翻故遷都大興開皇三年遷新都申明公李穆薨穆薨見一百七十六卷陳長城公至徳四年孫筠襲爵叔父渾忿其吝嗇使兄子善衡賊殺之而證其從父弟瞿曇從才用翻曇徒含翻使之償死渾謂其妻兄左衛率宇文述曰若得紹封當嵗奉國賦之半述為之言於太子率所律翻為于偽翻奏髙祖以渾為穆嗣二嵗之後不復以國賦與述復扶又翻述大恨之帝即位渾累官至右驍衛大將軍改封郕公驍堅堯翻帝以其門族彊盛忌之㑹有方士安伽陁伽求加翻言李氏當為天子勸帝盡誅海内凡李姓者渾從子將作監敏小名洪兒從才用翻帝疑其名應䜟常面告之冀其引决敏大懼數與渾及善衡屏人私語數所角翻屏必郢翻述譖之於帝仍遣虎賁郎將河東裴仁基表告渾反帝改蒲州為河東郡賁音奔將即亮翻下同帝收渾等家遣尚書左丞元文都御史大夫裴藴雜治之治直之翻下同按問數日不得反狀以實奏聞帝更遣述窮治之述誘教敏妻宇文氏為表誣告渾謀因度遼與其家子弟為將領者共襲取御營立敏為天子述持入奏之帝泣曰吾宗社幾傾幾居依翻頼公獲全耳三月丁酉殺渾敏善衡及宗族三十二人自三從以上皆徙邊徼從才用翻徼吉弔翻後數月敏妻亦鴆死敏妻宇文氏周天元之女帝之姊子也有二孔雀自西苑飛集寶城朝堂前西苑在洛城西元年所築也後唐兵攻王世充世充使其弟世偉守寳城則寶城在洛城羅郭之内自為一城既朝堂在焉則百司廨署皆在焉自為一城附於宫城之東南也唐因隋制亦以洛陽為東京六典云東城在皇城之東皇城在東城之内百僚廨署如京城之制皇宫在皇城之北吾以此推之皇城葢即隋之寶城在宫城東南也朝直遙翻下同親衛校尉髙徳儒等十餘人見之奏以為鸞帝置親侍鷹揚府領親勲武三侍三侍即三衛也各置越騎校尉歩兵校尉年考異曰雜記云五年三月馬徳儒奏孔雀為鸞今月及姓皆從畧記并温大雅創業起居注時孔雀已飛去無可得驗於是百僚稱賀詔以徳儒誠心㝠㑹肇見嘉祥擢拜朝散大夫朝直遙翻散悉亶翻賜物百叚餘人皆賜束帛仍於其地造儀鸞殿己酉帝行幸太原夏四月幸汾陽宫避暑宫城迫隘百官士卒布散山谷間結草為營而居之以衛尉少卿李淵為山西河東撫慰大使少始照翻使疏吏翻衛考異曰創業注云帝自衛尉少卿轉右驍將軍奉詔為太原道安撫大使即隋大業十二年煬帝幸樓煩時也按十二年帝未嘗幸樓煩今從高祖實錄在幸汾陽宫時余按隋志汾陽宫正屬樓煩郡自可以言幸樓煩但有十二年十一年之差耳承制黜陟選補郡縣文武官仍發河東兵討捕羣盗淵行至龍門擊賊帥毋端兒破之劉昫曰龍門漢艾氏縣後魏改為龍門隋志屬河東郡帥所類翻毋音無姓也秋八月乙丑帝廵北塞入考異曰雜記六月突厥賊嵐城鎮抄掠遣范安貴討擊之王師敗績安貴死百司震懼七月帝幸鴈門先至天池值雨山谷泥深二尺從官狼狽帳幕多不至一夜並露坐雨中至曉多死宫人無食貸糒於衛士今從隋書初裴矩以突厥始畢可汗部衆漸盛厥九勿翻可從刋入聲汗音寒獻策分其勢欲以宗女嫁其弟叱吉設拜為南面可汗叱吉不敢受始畢聞而漸怨突厥之臣史蜀胡悉多謀略為始畢所寵任矩詐與為互市誘至馬邑下殺之帝改朔州為馬邑郡誘音酉遣使詔始畢曰史蜀胡悉叛可汗來降我已相為斬之使疏吏翻降户江翻為于偽翻始畢知其狀由是不朝戊辰始畢帥騎數十萬謀襲乘輿朝直遙翻帥讀曰率騎竒寄翻下同乘繩證翻下同義成公主先遣使者告變壬申車駕馳入鴈門隋志鴈門郡後周置肆州開皇五年改為代州帝改鴈門郡齊王􅌔以後軍保崞縣崞漢縣後魏置石城縣開皇十年改曰平冦大業初改為崞縣屬鴈門郡􅌔古限翻崞音郭癸酉突厥圍鴈門上下惶怖怖普布翻撤民屋為守禦之具城中兵民十五萬口食僅可支二旬鴈門四十一城突厥克其三十九唯鴈門崞不下突厥急攻鴈門矢及御前上大懼抱趙王杲而泣目盡腫左衛大將軍宇文述勸帝簡精鋭數千騎潰圍而出納言蘇威曰城守則我有餘力輕騎乃彼之所長陛下萬乘之主豈宜輕動乘繩證翻民部尚書樊子葢曰陛下乘危徼幸徼堅堯翻徼幸覬非望也一朝狼狽悔之何及不若據堅城以挫其鋭坐徴四方兵使入援陛下親撫循士卒諭以不復征遼復扶又翻厚為勲格必人人自奮何憂不濟内史侍郎蕭瑀以為突厥之俗可賀敦預知軍謀突厥可汗之妻為可賀敦可從刋入聲且義成公主以帝女嫁外夷必恃大國之援若使一介告之借使無益庸有何損又將士之意恐陛下既免突厥之患還事髙麗麗力知翻若發明詔諭以赦髙麗專討突厥則衆心皆安人自為戰矣瑀皇后之弟也虞世基亦勸帝重為賞格下詔停遼東之役帝從之帝親廵將士謂之曰努力擊賊將即亮翻下將士同茍能保全凡在行陳行户剛翻陳讀曰陣並下同勿憂富貴必不使有司弄刀筆破汝勲勞乃下令守城有功者無官直除六品賜物百段有官以次增益使者慰勞相望於道使疏吏翻勞力到翻於是衆皆踊躍晝夜拒戰死傷甚衆甲申詔天下募兵守令競來赴難守式又翻難乃旦翻李淵之子世民年十六應募𨽻屯衛將軍雲定興説定興多齎旗鼓為疑兵説式苪翻曰始畢敢舉兵圍天子必謂我倉猝不能赴援故也宜晝則引旌旗數十里不絶夜則鉦鼓相應虜必謂救兵大至望風遁去不然彼衆我寡若悉軍來戰必不能支定興從之帝遣間使求救於義成公主間古莧翻使疏吏翻下同公主遣使告始畢云北邊有急東都及諸郡援兵亦至忻口九域志忻州秀容縣有忻口寨隋志秀容屬樓煩郡杜佑曰隋置忻州因忻口為名九月甲辰始畢解圍去帝使人出偵山谷皆空無胡馬偵丑鄭翻乃遣二千騎追躡至馬邑得突厥老弱二千餘人而還丁未車駕還至太原帝改并州為太原郡騎竒寄翻還從宣翻又如字蘇威言於帝曰今盗賊不息士馬疲弊願陛下亟還西京深根固本為社稷計帝初然之宇文述曰從官妻子多在東都亟紀力翻從才用翻宜便道向洛陽自潼關而入帝從之冬十月壬戌帝至東都曰考異畧記九月辛未帝入東都今從隋帝記顧盻街衢盻莫甸翻斜視謂侍臣曰猶大有人在意謂曏日平楊𤣥感殺人尚少故也少詩沼翻蘇威追論勲格太重宜加斟酌樊子葢固請以為不宜失信帝曰公欲收物情邪邪音耶子葢懼不敢對帝性吝官賞初平楊𤣥感應授勲者多乃更置戎秩建節尉為正六品次奮武宣惠綏徳懐仁秉義奉誠立信等尉遞降一階將士守鴈門者萬七千人得勲者纔千五百人皆凖平𤣥感勲一戰得第一勲者進一階其先無戎秩者止得立信尉三戰得第一勲者至秉義尉其在行陳而無勲者四戰進一階亦無賜㑹仍議伐髙麗由是將士無不憤怨行户剛翻陳讀曰陣麗力知翻將即亮翻初蕭瑀以外戚有才行行下孟翻嘗事帝於東宫累遷至内史侍郎委以機務瑀性剛鯁數言事忤㫖數所角翻忤五故翻帝漸疎之及鴈門圍解帝謂羣臣曰突厥狂悖厥九勿翻悖蒲妹翻又蒲没翻勢何能為少時未散少詩沼翻蕭瑀遽相恐動情不可恕出為河池郡守隋志河池郡後魏置南岐州後周改曰鳯州帝改河池郡守式又翻即日遣之候衛將軍楊子崇從帝在汾陽宫知突厥必為冦屢請早還京師帝怒曰子崇怯懦驚動衆心懦乃卧翻又乃亂翻不可居爪牙之官出為離石郡守子崇髙祖之族弟也楊𤣥感之亂龍舟水殿皆為所焚詔江都更造凡數千艘艘蘇遭翻制度仍大於舊者壬申盧明月帥衆十萬冦陳汝陳州淮揚郡汝州襄城郡帥讀曰率東海李子通有勇力先依長白山賊帥左才相帥所類翻相息亮翻羣盗皆殘忍而子通獨寛仁由是人多歸之未半嵗有衆萬人才相忌之子通引去度淮與杜伏威合伏威選軍中壯士養為假子凡三十餘人濟隂王雄誕臨濟闞稜為之冠隋志濟隂郡後魏置西兖州後周改曰曹州帝改濟隂郡闞姓也左傳齊有大夫闞止濟子禮翻冠古玩翻既而李子通謀殺伏威遣兵襲之伏威被重創墜馬被皮義翻創初良翻雄誕負之逃葭葦中收散兵復振將軍來整擊伏威破之其將西門君儀之妻王氏勇而多力負伏威以逃雄誕帥壯士十餘人衛之將即亮翻帥讀曰率下同與隋兵力戰由是得免來整又擊李子通破之子通帥其餘衆奔海陵復收兵得二萬人自稱將軍城父朱粲隋志城父縣屬譙郡父音甫始為縣佐史隋郡縣皆有佐史從軍遂亡命聚衆為盗謂之可達寒賊自稱迦樓羅王迦音加衆至十餘萬引兵轉掠荆沔荆州南郡沔州沔陽郡沔彌兖翻及山南郡縣山南者長安南山之南所過噍類無遺噍才笑翻十二月庚寅詔民部尚書樊子葢發關中兵數萬擊絳賊敬盤陀等絳賊絳郡賊也風俗通敬姓陳敬仲之後姓苑黄帝孫敬康之後子葢不分臧否否音鄙自汾水之北村塢盡焚之賊有降者皆阬之百姓怨憤益相聚為盗詔以李淵代之有降者淵引置左右由是賊衆多降前後數萬人餘黨散入他郡降户江翻資治通鑑卷一百八十二
