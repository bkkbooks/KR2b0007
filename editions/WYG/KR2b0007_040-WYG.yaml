body:
  text: 資治通鑑卷四十宋司馬光撰胡三省音註漢紀三十二起旃蒙作噩盡柔兆閹茂凡二年世祖光武皇帝上之上諱秀字文叔賢曰禮祖有功而宗有徳光武中葉興故廟稱世祖謚法能紹前業曰光克定禍亂曰武伏矦古今註曰秀之字曰茂伯仲叔季兄弟之次長兄伯升次仲故字文叔焉建武元年是年六月即位改元春正月方望與安陵人弓林姓譜弓魯大夫叔弓之後又孔子弟子有仲弓又有馯臂子弓共立前定安公嬰為天子聚黨數千人居臨涇臨涇縣屬安定郡賢曰今涇州縣更始遣丞相松等擊破皆斬之鄧禹至箕關賢曰箕關在今王屋縣東余據唐王屋縣屬懐州水經註箕關故城在垣縣擊破河東都尉進圍安邑縣名屬河東郡赤睂二部俱㑹𢎞農更始遣討難將軍蘇茂拒之難乃旦翻茂軍大敗赤睂衆遂大集乃分萬人為一營凡三十營三月更始遣丞相松與赤睂戰於蓩鄉賢曰蓩音莫老翻字林曰毒草也因以為地名續漢志𢎞農有蓩鄉東觀記曰崇等入至𢎞農枯樅山下與茂戰崇比至蓩鄉轉至湖湖即湖城縣也以此而言其地蓋在今虢州湖城縣之間松等大敗死者三萬餘人赤睂遂轉北至湖蜀郡功曹李熊説公孫述宜稱天子説輸芮翻夏四月述即帝位號成家賢曰以起成都故號成家改元龍興時有龍出其府因以紀元李熊為大司徒述弟光為大司馬恢為大司空越嶲任貴據郡降述王莽天鳯三年任貴據越嶲嶲音髓任音壬蕭王北擊尤來大槍五幡於元氏地理志元氏縣屬常山郡闞駰曰趙公子元之封邑故曰元氏追至北平連破之賢曰北平縣屬中山國今易州永樂縣也又戰於順水北賢曰水經註云徐水經北平縣故城北光武追銅馬五幡破之於順水即徐水之别名也今在易州括地志徐水過北平縣界而東流又東逕清􅁐城乗勝輕進反為所敗敗補邁翻王自投髙岸突騎王豐下馬授王騎奇寄翻下同王僅而得免散兵歸保范陽賢曰縣名在范水之陽屬涿郡范陽故城在今易州易縣東南軍中不見王或云已歿諸將不知所為呉漢曰卿曹努力王兄子在南陽何憂無主兄子謂伯升子章及興也衆恐懼數日乃定賊雖戰勝而憚王威名夜遂引去大軍復進至安次連戰破之復扶又翻賢曰安次縣名屬渤海郡今幽州縣也故城在縣東按我宋朝霸州文安縣本漢安次縣地賊退入漁陽所過虜掠彊弩將軍陳俊言於王曰賊無輜重重直用翻宐令輕騎出賊前使百姓各自堅壁以絶其食可不戰而殄也王然之遣俊將輕騎馳出賊前視人保壁堅完者敕令固守放散在野者因掠取之賊至無所得遂散敗王謂俊曰困此虜者將軍䇿也馮異遺李軼書為陳禍福遺于季翻為于偽翻勸令歸附蕭王軼知長安已危而以伯升之死心不自安事見上卷更始元年乃報書曰軼本與蕭王首謀造漢事見三十八卷王莽地皇三年今軼守洛陽將軍鎮孟津俱據機軸賢曰機弩牙也軸車軸也皆在物之要故取喻焉千載一㑹思成斷金易曰二人同心其利斷金陸徳明曰斷丁亂翻王肅丁管翻唯深達蕭王願進愚䇿以佐國安民軼自通書之後不復與異爭鋒復扶又翻故異得北攻天井關劉昭志曰上黨髙都縣有天井關賢曰在今澤州晉城縣南今太行山上關南有天井泉三所拔上黨兩城又南下河南成臯以東十三縣降者十餘萬武勃將萬餘人攻諸畔者異與戰於士鄉下劉昭志河南雒陽縣有士鄉聚續漢志曰士鄉亭名屬河南郡大破斬勃軼閉門不救異見其信效具以白王王報異曰季文多詐李軼字季文人不能得其要領要一遥翻令移其書告守尉當警備者衆皆怪王宣露軼書朱鮪聞之鮪于軌翻使人刺殺軼刺七亦翻由是城中乖離多有降者降户江翻朱鮪聞王北征而河内孤乃遣其將蘇茂賈彊將兵三萬餘人度鞏河攻溫鞏縣屬河南郡周鞏伯之國也河水過鞏縣北謂之鞏河即五社津也温縣屬河内郡周大夫蘇子邑賢曰鞏温並今洛州縣也鮪自將數萬人攻平隂以綴異賢曰平隂縣名屬河南郡杜佑曰漢平隂縣城在今洛陽縣北五十里水經註平隂即晉之隂地故隂戎所居魏文帝改曰河隂綴謂連綴也將即亮翻檄書至河内宼恂即勒軍馳出並移告屬縣發兵㑹溫下軍吏皆諫曰今洛陽兵度河前後不絶宐待衆軍畢集乃可出也恂曰溫郡之藩蔽失溫則郡不可守遂馳赴之且日合戰而馮異遣救及諸縣兵適至恂令士卒乗城鼓譟大呼言曰劉公兵到蘇茂軍聞之陳動呼火故翻陳讀曰陣恂因奔擊大破之馮異亦渡河擊朱鮪鮪走異與恂追至洛陽環城一帀而歸環音宦帀作荅翻周回也自是洛陽震恐城門晝閉異恂移檄上狀諸將入賀因上尊號上時掌翻下同將軍南陽馬武先進曰大王雖執謙退奈宗廟社稷何宐先即尊位乃議征伐今此誰賊而馳騖擊之乎賢曰誰謂未有主也前書音義曰直馳曰馳亂馳曰騖余謂誰賊者蓋謂位號未正指誰為賊也王驚曰何將軍出此言可斬也乃引軍還薊復遣吳漢率耿弇景丹等十三將軍追尤來等復扶又翻下除賈復外皆同斬首萬三千餘級遂窮追至浚靡而還賢曰浚靡縣名屬右北平郡故城在今漁陽縣北靡音麻賊散入遼西遼東為烏桓貊人所鈔擊畧盡貊莫白翻鈔楚交翻都䕶將軍賈復漢宣帝置西域都䕶盡䕶南北道諸國甘延壽之擊郅支也自謂為都䕶將軍漢朝未以為將軍號也至光武乃以命賈復與五校戰於眞定復傷創甚校户教翻創初良翻王大驚曰我所以不令賈復别將者將即亮翻為其輕敵也為于偽翻果然失吾名將聞其婦有孕生女邪我子娶之生男邪我女嫁之不令其憂妻子也復病尋愈追及王於薊相見甚驩薊音計還至中山諸將復上尊號王又不聽行到南平棘賢曰縣名屬常山郡今趙州縣故城在縣南諸將復固請之王不許諸將且出耿純進曰天下士大夫捐親戚棄土壤從大王於矢石之間者其計固望攀龍鱗附鳯翼以成其所志耳今大王留時逆衆不正號位純恐士大夫望絶計窮則有去歸之思無為乆自苦也大衆一散難可復合純言甚誠切王深感曰吾將思之行至鄗續漢志鄗縣屬常山國帝於此即位改曰髙邑鄗呼各翻召馮異問四方動静異曰更始必敗宗廟之憂在於大王宐從衆議㑹儒生彊華自關中奉赤伏符來詣王曰劉秀發兵捕不道四夷雲集龍鬭野四七之際火為主賢曰彊音其兩翻姓譜其良翻風俗通作疆華系之曰晉有大夫疆劒四七二十八也自髙祖至光武初起合二百二十八年即四七之際也漢火徳故火為主也羣臣因復奏請六月己未王即皇帝位于鄗南時設壇於鄗南千秋亭五城陌賢曰其地在今趙州栢鄉縣考異曰光武本紀馮異破蘇茂諸將上尊號光武還至薊皆在四月前而馮異傳異與李軼書云長安壞亂赤睂臨郊王矦構難大臣乖離綱紀已絶又勸光武稱尊號亦曰三王反叛更始敗亡按是年六月己未光武即位是月甲子鄧禹破王匡等於安邑王匡張卭等還奔長安乃謀以立秋貙膢時共刼更始然則三王反叛應在光武即位之後夏秋之交馮異安得於四月之前已言之也或者史家潤色其言致此差失耳改元大赦鄧禹圍安邑數月未下更始大將軍樊參將數萬人度大陽賢曰大陽縣屬河東郡前書音義曰大河之陽春秋秦伯伐晉自茅津濟杜預曰河東大陽縣也欲攻禹禹逆擊於解南斬之賢曰解縣屬河東郡故城在今蒲州桑泉縣東南也師古曰解音蟹王匡成丹劉均合軍十餘萬復共擊禹禹軍不利明日癸亥匡等以六甲窮日不出禹因得更治兵治直之翻甲子匡悉軍出攻禹禹令軍中毋得妄動既至營下因傳發諸將孟康曰傳令軍中使發也鼓而並進大破之匡等皆走禹追斬均及河東太守楊寳遂定河東匡等犇還長安𤣥考異曰劉傳王匡張卭守河東為鄧禹所破奔還長安鄧禹傳無張卭名今從之張卬與諸將議曰赤睂旦暮且至見滅不久不如掠長安東歸南陽事若不集復入湖池中為盜耳乃共入説更始説輸芮翻更始怒不應莫敢復言復扶又翻更始使王匡陳牧成丹趙萌屯新豐李松軍掫以拒赤睂賢曰掫音子侯翻及續漢志新豐有鴻門亭掫城即此也張卬廖湛胡殷申屠建與隗囂合謀欲以立秋日貙膢時賢曰前書音義曰貙獸以立秋日祭獸王者亦此日出獵用祭宗廟冀州北郡以八月朝作飲食為膢其俗語曰膢臘社伏風俗通嘗新始殺食曰貙膢漢儀立秋日郊禮畢始揚威武乃祀先虞告以烹鮮天子御戎輅白馬朱鬛躬執弩射牲牲以鹿麛斬牲於郊東門載獲車馳駟以薦陵廟名貙劉劉殺也貙於時殺物故以應之又謂之貙膢廖力弔翻貙去于翻膢音婁共刼更始俱成前計屠考異曰袁紀云申建等勸更始讓帝位更始不應建等謀劫之今従范書更始知之託病不出召張卭等入將悉誅之唯隗囂稱疾不入㑹客王遵周宗等勒兵自守更始狐疑不決卬湛殷疑有變遂突出獨申屠建在更始斬建使執金吾鄧曅將兵圍隗囂第卬湛殷勒兵燒門入戰宫中更始大敗囂亦潰圍走歸天水明旦更始東犇趙萌於新豐更始復疑王匡陳牧成丹與張卬等同謀乃並召入牧丹先至即斬之王匡懼將兵入長安與張卬等合赤睂進至華隂華戸化翻軍中有齊巫齊巫齊國之巫常鼔舞祠城陽景王城陽景王章有誅諸呂之功故齊人祠之以求福助巫狂言景王大怒曰當為縣官何故為賊賢曰縣官謂天子也有笑巫者輒病軍中驚動方望弟陽説樊崇等曰今將軍擁百萬之衆西向帝城而無稱號説輸芮翻稱尺證翻名為羣賊不可以乆不如立宗室挾義誅伐以此號令誰敢不從崇等以為然而巫言益甚前至鄭鄭縣屬京兆賢曰今華州縣乃相與議曰今迫近長安而鬼神若此當求劉氏共尊立之先是赤睂過式地理志式縣屬泰山郡近其靳翻先悉薦翻掠故式矦萌之子恭茂盆子三人自隨萌之父曰憲城陽景王五世孫荒王順之子元帝時封式矦恭少習尚書少詩照翻隨樊崇等降更始於洛陽樊崇等降見上卷更始元年降户江翻復封式矦為侍中在長安茂與盆子留軍中屬右校卒史劉俠卿主牧牛漢注卒史秩百石九卿寺及諸郡及軍行部校皆有之校户教翻俠戸頰翻及崇等欲立帝求軍中景王後得七十餘人唯茂盆子及前西安矦孝最為近屬崇等曰聞古者天子將兵稱上將軍乃書札為符曰上將軍又以兩空札置笥中賢曰札簡也笥箧也於鄭北設壇場祠城陽景王諸三老從事皆大㑹赤睂諸帥最尊者號三老次從事列盆子等三人居中立以年次探札盆子最幼後探得符探吐南翻諸將皆稱臣拜盆子時年十五被髪徒跣敝衣赭汗見衆拜恐畏欲啼被皮義翻茂謂曰善臧符臧讀曰藏盆子即齧折棄之折而設翻以徐宣為丞相樊崇為御史大夫逢安為左大司馬逢皮江翻謝禄為右大司馬其餘皆列卿將軍盆子雖立猶朝夕拜劉俠卿時欲出從牧兒戲俠卿怒止之崇等亦不復􅇋視也復扶又翻秋七月辛未帝使使持節拜鄧禹為大司徒封鄼矦食邑萬户賢曰鄼縣屬南陽郡故城在今襄州榖城縣東北余謂蓋以禹功比蕭何故封之鄼鄼音賛禹時年二十四又議選大司空帝以赤伏符曰王梁主衛作𤣥武丁丑以野王令王梁為大司空帝以野王衛之所徙𤣥武水神之名司空水土之官也於是用梁賢曰𤣥武北方之神龜蛇合體野王縣屬河内郡宋白曰懐州河内縣古野王也又欲以䜟文用平狄將軍孫咸行大司馬衆咸不悦䜟楚譛翻壬午以吳漢為大司馬初更始以琅邪伏湛為平原太守姓譜伏本自伏羲之後漢初有濟南伏生守式又翻時天下兵起湛獨晏然撫循百姓門下督謀為湛起兵湛收斬之諸郡各有門下督主兵衛為于偽翻於是吏民信向平原一境頼湛以全帝徴湛為尚書使典定舊制又以鄧禹西征拜湛為司直行大司徒事東都之司徒西都之丞相也司直即丞相司直車駕每出征伐常留鎮守鄧禹自汾隂渡河入夏陽汾隂縣屬河東夏陽縣屬馮翊更始左輔都尉公乗歙引其衆十萬與左馮翊兵共拒禹於衙地理志左輔都尉治髙陵賢曰左輔即左馮翊也三輔皆有都尉衙縣名屬左馮翊故城在今同州白水縣東北左傳秦晉戰于彭衙即此地公乗姓也以秦爵為氏乗繩證翻歙許及翻禹復破走之復扶又翻宗室劉茂聚衆京宻間茂元氏王歙從父弟也賢曰京縣屬河南郡鄭之京邑故城在今鄭州滎陽縣東南宻縣屬河南郡故城在今宻縣東南自稱厭新將軍厭一葉翻厭伏也新謂新室也攻下潁川汝南衆十餘萬人帝使驃騎大將軍景丹建威大將軍耿弇彊弩將軍陳俊攻之茂來降降户江翻封為中山王己亥帝幸懐懐故城在武陟縣西南十餘里賢曰縣名屬河内郡故城在懐州武陟縣西余據河内郡治懐在雒陽北百四十里遣耿弇陳俊軍五社津即鞏河也水經注河水東過鞏縣北於此有五社渡為五社津杜佑曰一名五渡津備滎陽以東使呉漢率建議大將軍朱祜等十一將軍圍朱鮪於洛陽八月進幸河陽地理志河陽縣屬河内郡李松自掫引兵還從更始與趙萌共攻王匡張卬於長安連戰月餘匡等敗走更始徙居長信宫三輔黄圖曰従洛門至周廟門有長信宫在其中赤睂至髙陵地理志髙陵縣屬馮翊王匡張卬等迎降之遂共連兵進攻東都門李松出戰赤睂生得松松弟況為城門校尉開門納之九月赤睂入長安更始單騎走從厨城門出三輔黄圖曰洛城門王莽改曰建子門其内有長安厨官俗名之為厨城門今長安故城北面之中門是也騎竒寄翻式矦恭以赤睂立其弟自繫詔獄聞更始敗走乃出見定陶王祉祉為之除械為于偽翻相與從更始於渭濵右輔都尉嚴本恐失更始為赤睂所誅即將更始至髙陵將如字領也携也挾也本將兵宿衛其實圍之右輔都尉治郿髙陵左輔都尉治所也右恐當作左更始將相皆降赤睂獨丞相曹竟不降手劒格死手守又翻辛未詔封更始為淮陽王吏民敢有賊害者罪同大逆其送詣吏者封列矦初宛人卓茂卓姓也史記貨殖傳有蜀卓氏宛於元翻寛仁恭愛恬蕩樂道恬安恬蕩坦蕩蕩也樂音洛雅實不為華貌行已在於清濁之間自束髮至白首未嘗與人有爭競鄉黨故舊雖行能與茂不同行下孟翻而皆愛慕欣欣焉哀平間為宻令宋白續通典曰宻縣古鄶國宻國之地左傳諸矦伐鄭圍新宻漢為縣屬河南郡今縣東南三十里有故宻城即漢理所視民如子舉善而教口無惡言吏民親愛不忍欺之民嘗有言部亭長受其米肉遺者賢曰部謂所部也遺于季翻下同茂曰亭長為從汝求乎為汝有事囑之而受乎囑之欲翻託也私請也將平居自以恩意遺之乎民曰往遺之耳茂曰遺之而受何故言邪民曰竊聞賢明之君使民不畏吏吏不取民今我畏吏是以遺之吏既卒受卒終也音子恤翻故來言耳茂曰汝為敝民矣凡人所以羣居不亂異於禽獸者以有仁愛禮義知相敬事也汝獨不欲修之寧能髙飛逺走不在人間邪吏顧不當乗威力彊請求耳亭長素善吏嵗時遺之禮也民曰茍如此律何故禁之茂笑曰律設大法禮順人情今我以禮教汝汝必無怨惡以律治汝汝何所措其手足乎治直之翻下同一門之内小者可論大者可殺也且歸念之初茂到縣有所廢置吏民笑之鄰城聞者皆蚩其不能蚩笑也河南郡為置守令茂不為嫌治事自若茂正為令郡復置守令使與茂並居郡為于偽翻數年教化大行道不拾遺遷京部丞王莽秉政置大司農部丞十三人勸課農桑京部丞主司𨽻所部宻人老少皆涕泣隨送及王莽居攝以病免歸上即位先訪求茂茂時年七十餘甲申詔曰夫名冠天下冠古玩翻當受天下重賞今以茂為太傅東都之制太傳位上公絶席在三公之右封褒徳矦臣光曰孔子稱舉善而教不能則勸論語孔子荅季康子之言是以堯舉臯陶湯舉伊尹而不仁者遠論語子夏荅樊遟之言陶音遙有徳故也光武即位之初羣雄競逐四海鼎沸彼摧堅陷敵之人權略詭辯之士方見重於世而獨能取忠厚之臣旌循良之吏抜於草萊之中寘諸羣公之首宐其光復舊物享祚乆長蓋由知所先務而得其本原故也諸將圍洛陽數月朱鮪堅守不下帝以廷尉岑彭嘗為鮪校尉朱鮪為大司馬以彭為校尉後從邑人韓歆于河内遂歸光武校户教翻令往説之説輸芮翻鮪在城上彭在城下為陳成敗為于偽翻鮪曰大司徒被害時鮪與其謀又諫更始無遣蕭王北伐事並見上卷更始元年與讀曰預誠自知罪深不敢降彭還具言於帝還從宣翻又如字帝曰舉大事者不忌小怨鮪今若降官爵可保况誅罰乎河水在此吾不食言賢曰指河以為信言其明白也索隠曰左傳日食言多矣能無肥乎是謂食言為妄言彭復往告鮪鮪從城上下索復扶又翻下遐稼翻索昔各翻曰必信可乗此上上時掌翻下同彭趣索欲上賢曰趣向也春遇翻鮪見其誠即許降辛卯朱鮪面縛與岑彭俱詣河陽帝解其縛召見之復令彭夜送鮪歸城明旦與蘇茂等悉其衆出降拜鮪為平狄將軍封扶溝矦地理志扶溝縣屬淮陽郡陳留風俗傳小扶亭有洧水之溝因以名縣後為少府傳封累世帝使侍御史河内杜詩安集洛陽將軍蕭廣縱兵士暴横横户孟翻詩敕曉不改敕戒也曉開諭也遂格殺廣還以狀聞上召見賜以棨㦸漢雜事曰漢制假棨㦸以代斧鉞崔豹古今注曰棨㦸前驅之噐也以木為之後代刻偽無復典刑以赤油韜之亦謂之油㦸亦曰棨㦸王公以下通用之以前驅遂擢任之冬十月癸丑車駕入洛陽幸南宫遂定都焉蔡質漢儀曰南宫至北宫中央作大屋複道三道行天子從中道從官夾左右十歩一衛兩宫相去七里赤睂下書曰聖公降者封為長沙王過二十日勿受更始遣劉恭請降赤睂使其將謝禄往受之更始隨祿肉袒上璽綬於盆子璽斯氏翻綬音受赤睂坐更始置庭中將殺之劉恭謝禄為請不能得為于偽翻下同遂引更始出劉恭追呼曰呼火故翻臣誠力極請得先死拔劒欲自刎刎武粉翻樊崇等遽共救止之乃赦更始封為畏威矦劉恭復為固請復扶又翻竟得封長沙王更始常依謝禄居劉恭亦擁䕶之劉盆子居長樂宫樂音洛三輔郡縣營長遣使貢獻時三輔豪傑處處屯聚各有營長長知兩翻兵士輒剽奪之又數暴掠吏民由是皆復固守剽匹妙翻數所角翻復扶又翻百姓不知所歸聞鄧禹乗勝獨克而師行有紀賢曰紀綱紀也言有條貫而不殘暴皆望風相攜負以迎軍降者日以千數衆號百萬禹所止輙停車拄節以勞來之勞力到翻來力代翻父老童稺垂髪戴白滿其車下莫不感悦賢曰垂髪童幼也戴白父老也稺直利翻於是名震關西諸將豪桀皆勸禹徑攻長安禹曰不然今吾衆雖多能戰者少前無可仰之積賢曰仰魚向翻後無轉饋之資赤睂新抜長安財榖充實鋒鋭未可當也夫盜賊羣居無終日之計財榖雖多變故萬端寧能堅守者也上郡北地安定三郡土廣人稀饒榖多畜畜許救翻謂六畜也吾且休兵北道就糧養士以觀其敝乃可圗也於是引軍北至栒邑賢曰栒邑縣屬右扶風故城在今豳州三水縣東北宋白曰三水縣東北二十五里邠邑原上有栒邑故城栒音荀按考異曰袁紀禹曰璽書每至輒曰無與窮赤睂争鋒世祖賜禹書責其不攻長安不容有此語二年十一月詔徴禹還乃曰毋與窮宼争鋒袁紀誤也所到諸營保郡邑皆開門歸附上遣岑彭擊荆州羣賊下犨葉等十餘城地理志犨葉二縣皆屬南陽郡賢曰犨故城在今汝州魯山縣東南葉今許州葉縣也師古曰犨音昌牛翻葉音式渉翻十一月甲午上幸懷梁王永稱帝於睢陽睢音雖十二月丙戌上還洛陽三輔苦赤睂暴虐皆憐更始欲盜出之張卬等深以為慮卬等攻更始恐其得位而禍及已故深以為慮使謝禄縊殺之劉恭夜往收藏其尸帝詔鄧禹葬之於霸陵中郎將宛人趙熹將出武關宛於元翻熹許計翻又許里翻道遇更始親屬皆裸跣飢困裸郎果翻熹竭其資糧以與之將䕶而前將送也宛王賜聞之迎還鄉里還從宣翻又如字隗囂歸天水復招聚其衆復扶又翻興修故業自稱西州上將軍三輔士大夫避亂者多歸囂囂傾身引接為布衣交以平陵范逡為師友逡七倫翻前涼州刺史河内鄭興為祭酒前書音義曰禮飲酒必祭示有先也故稱祭酒祭祀時唯長者以酒沃酹茂陵申屠剛杜林為治書賢曰治書即治書侍御史治直之翻馬援為綏徳將軍楊廣王遵周宗及平襄行廵阿陽王㨗地理志平襄縣阿陽縣屬天水郡行姓廵名姓譜周有大行人之官其後氏焉長陵王元為大將軍安陵班彪之屬為賓客由此名震西州聞於山東聞音問馬援少時以家用不足辭其兄況欲就邊郡田牧況曰汝大才當晚成良工不示人以朴且從所好賢曰從其所請也少詩照翻好呼到翻下同遂之北地田牧常謂賔客曰丈夫為志窮當益堅老當益壯後有畜數千頭榖數萬斛畜許救翻旣而歎曰凡殖財産貴其能賑施也施式䜴翻否則守錢虜耳乃盡散於親舊聞隗囂好士往從之囂甚敬重與決籌䇿班彪稺之子也班稺見三十六卷平帝元始元年初平陵竇融累世仕宦河西知其土俗與更始右大司馬趙萌善私謂兄弟曰天下安危未可知河西殷富帶河為固張掖屬國精兵萬騎漢邊郡皆置屬國有都尉以領之一旦緩急杜絶河津足以自守此遺種處也賢曰遺留也可以保全不畏絶滅種章勇翻乃因萌求往河西萌薦融於更始以為張掖屬國都尉融旣到撫結雄桀懷輯羌虜輯和也甚得其歡心是時酒泉太守安定梁統姓譜梁姓本自秦仲周平王封其少子康於夏陽梁山是為梁伯後為秦所併子孫以國為氏金城太守庫鈞賢曰前書音義曰庫姓即倉庫吏後也今羌中有姓庫者音舍承鈞之後也張掖都尉茂陵史苞酒泉都尉竺曽姓譜竺孤竹君之後本姓竺後漢擬陽矦竺晏報怨有仇以胄始名賢不改其族乃加二字以存夷齊一曰天竺國之後敦煌都尉辛肜敦徒門翻肜余中翻並州郡英俊融皆與厚善及更始敗融與梁統等計議曰今天下擾亂未知所歸河西斗絶在羌胡中賢曰斗峻絶也余謂斗僻絶也不同心戮力則不能自守權鈞力齊復無以相率復扶又翻當推一人為大將軍共全五郡觀時變動議旣定而各謙讓以位次咸共推梁統統固辭乃推融行河西五郡大將軍事武威太守馬期張掖太守任仲任音壬並孤立無黨乃共移書告示之二人即解印綬去於是以梁統為武威太守史苞為張掖太守竺曽為酒泉太守辛肜為敦煌太守融居屬國領都尉職如故置從事監察五郡監古衘翻河西民俗質樸而融等政亦寛和上下相親晏然富殖脩兵馬習戰射明烽燧羌胡犯塞融輒自將與諸郡相救皆如符要賢曰赴敵不失期契也將即亮翻每輒破之其後羌胡皆震服親附内郡流民避凶飢者歸之不絶王莽之世天下咸思漢徳安定三水盧芳居左谷中續漢志曰三水縣有左右谷故城在今涇州安定縣南水經註肥水出髙平西北牽條山東北出峽注于髙平川水東有山山東有三水縣故城本屬國都尉治詐稱武帝曽孫劉文伯云曽祖母匈奴渾邪王之姊也常以是言誑惑安定間王莽末乃與三水屬國羌胡起兵更始至長安徴芳為騎都尉使鎮撫安定以西更始敗三水豪桀共立芳為上將軍西平王賢曰欲平定西方故以為號使使與西羌匈奴結和親單于以為漢氏中絶劉氏來歸我亦當如呼韓邪立之令尊事我乃使句林王將數千騎迎芳兄弟入匈奴賢曰句古矦翻立芳為漢帝以芳弟程為中郎將將胡騎還入安定帝以關中未定而鄧禹乆不進兵賜書責之曰司徒堯也亡賊桀也長安吏民遑遑無所依歸宐以時進討鎮慰西京繫百姓之心禹猶執前意别攻上郡諸縣更徴兵引榖歸至大要賢曰大要縣屬北地郡積弩將軍馮愔車騎將軍宗歆守栒邑二人爭權相攻愔遂殺歆愔於今翻因反擊禹禹遣使以聞帝問使人使疏吏翻愔所親愛為誰對曰䕶軍黄防帝度愔防不能乆和埶必相忤度徒洛翻忤五故翻因報禹曰縛馮愔者必黄防也乃遣尚書宗廣持節往降之降户江翻後月餘防果執愔將其衆歸罪更始諸將王匡胡殷成丹等皆詣廣降廣與東歸至安邑道欲亡廣悉斬之愔之叛也引兵西向天水隗囂逆擊破之於髙平地理志髙平縣屬安定郡賢曰今原州髙平縣杜佑曰原州他樓縣漢髙平縣地又曰原州平髙縣即漢髙平縣蓋考異曰鄧禹傳愔叛在建武元年隗囂傳在二年愔以元年冬末叛延及二年囂拜官在二年也盡獲其輜重重直用翻於是禹承制遣使持節命囂為西州大將軍得專制涼州朔方事鄧禹西征任專方面權宐命囂故曰承制言承制詔而命之也後之承制始此臘日赤睂設樂大㑹酒未行羣臣更相辯鬬更工衡翻而兵衆遂各踰宫斬關入掠酒肉互相殺傷衛尉諸葛稺聞之稺直利翻勒兵入格殺百餘人乃定劉盆子惶恐日夜啼泣從官皆憐之從才用翻帝遣宗正劉延攻天井關與田邑連戰十餘合延不得進及更始敗邑遣使請降即拜為上黨太守帝又遣諫議大夫儲大伯持節徴鮑永永未知更始存亡疑不肯從收繫大伯遣使馳至長安詗問虛實詗翾正翻􅇋伺也又古迥翻初帝從更始在宛宛於元翻納新野隂氏之女麗華風俗通管脩自齊適楚為隂大夫其後氏焉是嵗遣使迎麗華與帝姊湖陽公主妹寧平公主俱到洛陽賢曰寧平縣屬淮陽故城在今亳州谷陽縣西南以麗華為貴人更始西平王李通先娶寧平公主上徴通為衛尉初更始以王閎為琅邪太守張歩據郡拒之閎諭降得贛榆等六縣地理志贛榆縣屬琅邪郡師古曰贛音紺榆音踰賢曰贛音貢今海州東海縣也余據今人皆從顔音收兵與歩戰不勝歩旣受劉永官號治兵於劇地理志劇縣屬北海郡賢曰故城在今青州夀光縣南故紀國城也治直之翻遣將徇泰山東萊城陽膠東北海濟南齊郡皆下之閎力不敵乃詣歩相見歩大陳兵而見之怒曰歩有何罪君前見攻之甚閎按劒曰太守奉朝命朝直遥翻而文公擁兵相拒張歩字文公閎攻賊耳何謂甚邪歩起跪謝與之宴飲待為上賓令閎關掌郡事賢曰關通也二年春正月甲子朔日有食之劉恭知赤睂必敗宻教弟盆子歸璽綬習為辭讓之言及正旦大㑹恭先曰諸君共立恭弟為帝徳誠深厚立且一年殽亂日甚誠不足以相成恐死而無益願得退為庶人更求賢知唯諸君省察知讀曰智省悉景翻樊崇等謝曰此皆崇等罪也恭復固請復扶又翻下同或曰此寧式矦事邪賢曰劉恭為式矦言衆立天子非恭所預恭惶恐起去盆子乃下牀解璽綬叩頭曰今設置縣官而為賊如故四方怨恨不復信向此皆立非其人所致願乞骸骨避賢聖路必欲殺盆子以塞責者無所離死賢曰離避也塞悉則翻因涕泣嘘唏賢曰唏與欷同崇等及㑹者數百人莫不哀憐之乃皆避席頓首曰臣無狀負陛下無狀無善狀也請自今已後不敢復放縱因共抱持盆子帶以璽綬盆子號呼不得已號户刀翻旣罷出各閉營自守三輔翕然稱天子聰明百姓爭還長安市里且滿後二十餘日復出大掠如故力子都為其部曲所殺餘黨與諸賊㑹檀鄉號檀鄉賊力依考異當作刁賢曰今兖州瑕丘縣東北有檀鄉宼魏郡清河魏郡大吏李熊弟陸謀反城迎檀鄉反音翻或以告魏郡太守潁川銚期賢曰鈍音姚姓也魏郡秦置故城在今相州安陽縣東北期召問熊熊叩頭首服首式救翻願與老母俱就死期曰為吏儻不若為賊樂者可歸與老母往就陸也賢曰必以在城中為吏不如為賊之樂即任將母往就弟樂音洛使吏送出城熊行求得陸將詣鄴城西門魏城治鄴城將如字陸不勝愧感勝音升自殺以謝期期嗟歎以禮葬之而還熊故職於是郡中服其威信帝遣吳漢率王梁等九將軍擊檀鄉於鄴東漳水上水經漳水源出上黨長子縣西發鳩山東過壺關屯留潞武安等縣又東出山過鄴縣大破之十餘萬衆皆降又使梁與大將軍杜茂將兵安輯魏郡清河東郡悉平諸營保保與堡同三郡清静邊路流通自雒陽至漁陽上谷路出三郡三郡旣平則邊路流通矣范史杜茂傳邊作道庚辰悉封諸功臣為列矦盤州洪氏曰西京列矦其傳國皆有世次東都枝葉不蕃而史筆又簡畧梁矦鄧禹禹始封鄼是年改封梁矦地理志梁縣屬河南郡唐汝州治梁縣宋白曰漢梁縣故城在汝水之南廣平矦吳漢賢曰廣平縣屬廣平郡故城在今洺州永年縣西北皆食四縣博士丁恭議曰古者封諸矦不過百里強幹弱枝所以為治也治直吏翻今封四縣不合法制帝曰古之亡國皆以無道未嘗聞功臣地多而滅亡者也隂鄉矦隂識貴人之兄也以軍功當増封識叩頭讓曰天下初定將帥有功者衆臣託屬掖廷仍加爵邑不可以示天下此為親戚受賞國人計功也戰國公孫龍告平原君之言帝從之帝令諸將各言所樂樂音洛皆占美縣占之瞻翻河南太守潁川丁綝獨求封本鄉或問其故綝曰綝能薄功微得鄉亭厚矣帝從其志封新安鄉矦綝丑林翻漢法大縣矦位視三公小縣矦位視上卿鄉亭矦位視中二千石綝潁川定陵人新安鄉蓋在定陵帝使郎中魏郡馮勤典諸矦封事勤差量功次輕重國土遠近地埶豐薄不相踰越莫不厭服焉量音良厭於艷翻帝以為能尚書衆事皆令總録之故事尚書郎以令史乆次補之帝始用孝廉為尚書郎百官志尚書令史十八人秩二百石侍郎三十六人秩四百石主作文書起草蔡質漢儀曰尚書郎初從三署詣臺試初上臺稱守尚書郎中嵗滿稱尚書郎三年稱侍郎起髙廟於洛陽正考異曰帝紀正月壬子按月甲子朔不應有壬子誤四時合祀髙祖太宗世宗建社稷于宗廟之右立郊兆于城南續漢志曰立社稷於雒陽在宗廟之右皆方壇四面及中各依方色無屋有牆門而已白虎通曰天子之壇方五丈諸矦之壇半天子之壇社者土也人非土不立非穀不食故封土立社示有上也稷者五穀之長得隂陽中和之氣故祭之也沈約曰禮云共工氏之霸九州其子句龍曰后土能平九土故祀以為社烈山氏之有天下其子曰神農能殖百榖其裔曰柱佐顓頊為稷官主農事周弃繼之法施於人故祀以為稷禮王為羣姓立社曰太社王自為立社曰王社故國有二社而稷亦有二也漢魏則有官社無稷故常二社一稷也傅咸曰天子親耕以供粢盛親耕自報故自為立社為籍而報也國以人為本人以國為命故又為百姓立社而祈報也此社之所以有二也王肅論王社謂春祈籍田秋而報之也其論太社則曰王者布下圻内為百姓立之謂之太社不自立之京師也杜佑曰社者五土之神五土者山林川澤丘陵墳衍原隰等各有所育羣生賴之故特於吐生物處别立其名為社稷者於五土之中特指原隰之祗以五土雖各有所生而山林川澤丘陵墳衍此四者雜出材用等物於五穀之功則少且生人所急者食故於五土之中别旌異原隰之祗以報之以其能生五榖名其神但五榖不可遍言以稷為五榖之長春生秋成之主稷者原隰之中能生五榖之祗是也續漢書曰制郊兆於雒陽城南七里為壇八階中又為重壇天地位皆在壇上其外壇上為五帝位青帝位在甲寅赤帝位在丙巳黄帝位在丁未白帝位在庚申黒帝位在壬亥其外為壝重營皆紫以象紫宫營有通道以為門日月在營内南道日在東月在西北斗在北道之西外營中營凡千五百一十四神髙皇帝配食焉長安城中糧盡赤睂收載珍寳大縱火燒宫室市里恣行殺掠長安城中無復人行復扶又翻乃引兵而西衆號百萬自南山轉掠城邑遂入安定北地鄧禹引兵南至長安軍昆明池謁祠髙廟收十一帝神主送詣洛陽髙惠文景武昭宣元成哀平十一帝賢曰神主以木為之方尺二寸穿中央達四方諸矦王長一尺虞主用桑練主用栗衛宏漢舊儀曰已葬收主為木函藏廟太室中西壁坎中去地六尺一寸祭則立主於坎下因廵行園陵為置吏士奉守焉行下孟翻為于偽翻真定王楊造䜟記曰赤九之後癭楊為主賢曰漢以火徳故云赤也光武於髙祖九代孫故云九癭於郢翻癭生於頸而附於咽楊病癭欲以惑衆與綿曼賊交通賢曰綿曼縣名屬真定國故城在今恒州石邑縣西北俗音訛謂之人文故城也帝遣騎都尉陳副游擊將軍鄧隆徵之楊閉城門不内帝復遣前將軍耿純持節行幽冀所過勞慰王矦復扶又翻行下孟翻勞力到翻宻敕收楊純至真定止傳舍傳株戀翻邀楊相見純眞定宗室之出也故楊不以為疑且自恃衆強而純意安静即從官屬詣之賢曰男子謂姊妹之子為出純母蓋真定宗室之女故楊不疑而來見純楊兄弟並將輕兵在門外將即亮翻楊入見純純接以禮敬因延請其兄弟皆入乃閉閤悉誅之因勒兵而出眞定震怖無敢動者怖普布翻帝憐楊謀未發而誅復封其子為眞定王楊子徳二月己酉車駕幸脩武賢曰縣名屬河内郡本殷之甯邑韓詩外傳曰武王伐紂勒兵于甯故曰修武今懷州縣也鮑永馮衍審知更始已亡乃發喪出儲大伯等封上印綬悉罷兵幅巾詣河内杜佑曰按巾六國時趙魏之間通謂之承露庶人及軍旅皆服之賢曰幅巾謂不著冠但幅巾束首也傅𤣥子曰漢末王公卿士多委王服以幅巾為雅是以袁紹崔鈞之徒雖為將帥皆著㡘巾上時掌翻曰考異曰鮑永傳稱永降於河内時攻懷未拔帝謂永我攻懐三日而城不下關東畏服卿可且將故人自往城下譬之即拜永諫議大夫至懷乃説更始河内太守於是開城而降按光武未都洛陽以前屢幸懷又祠髙祖於懷宫並無更始河内太守據懷事本紀亦無攻懷一節按田邑書稱主亡一嵗莫知定所則永衍之降必在此年而帝紀光武此年不曽幸河内但有幸脩武事然則永衍實降于脩武脩武亦河内縣也其稱降懷等事當是史誤故皆畧之帝見永問曰卿衆安在永離席叩頭曰離力智翻臣事更始不能令全誠慙以其衆幸富貴故悉罷之帝曰卿言大而意不悦帝雖謂永言大而以其降晚意懷不悦也旣而永以立功見用賢曰謂説下懷余按考異不取下懷事當以永討平魯郡為功也按永傳時董憲裨將討魯侵害百姓乃拜永為魯郡太守永到討擊大破之唯别帥彭豐虡休皮常等各千餘人稱將軍不肯下永以計誘手格殺豐等禽破黨與以功封關内矦遷揚州牧衍遂廢棄永謂衍曰昔髙祖賞季布之罪誅丁固之功事見十一卷髙帝五年丁固即丁公今遭明主亦何憂哉衍曰人有挑其鄰人之妻者其長者罵而少者報之挑徒了翻長知兩翻少詩沼翻下同後其夫死取其長者或謂之曰夫非罵爾者邪夫非之夫音扶曰在人欲其報我在我欲其罵人也賢曰此並陳軫對秦王之辭見戰國䇿引之者言已為故主守節亦冀新帝重之也為于偽翻夫天命難知人道易守易以䜴翻守道之臣何患死亡大司空王梁屢違詔命梁與吳漢俱擊檀鄉詔軍事一屬漢而梁輒發野王兵帝以其不奉詔勅令止在所縣而梁復以便宐進軍是屢違詔命也帝怒遣尚書宗廣持節即軍中斬梁廣檻車送京師旣至赦之以為中郎將北守箕關水經註濝水出河東垣縣王屋西山濝溪夾山東南流逕故城東即濝關也光武遣王梁守之壬子以太中大夫京兆宋𢎞為大司空𢎞薦沛國桓譚為議郎給事中帝以沛郡為沛國帝令譚鼔琴愛其繁聲𢎞聞之不悦伺譚内出内出從禁中出也伺相吏翻正朝服坐府上朝直遥翻遣吏召之譚至不與席而讓之且曰能自改邪將令相舉以法乎譚頓首辭謝良乆乃遣之後大㑹羣臣帝使譚鼓琴譚見𢎞失其常度帝怪而問之𢎞乃離席免冠謝曰離力智翻臣所以薦桓譚者望能以忠正導主而令朝廷耽悦鄭聲臣之罪也帝改容謝之湖陽公主新寡帝與共論朝臣㣲觀其意主曰宋公威容徳器羣臣莫及帝曰方且圗之後𢎞被引見被皮義翻見賢遍翻帝令主坐屏風後釋名屏風障風也因謂𢎞曰諺言貴易交富易妻人情乎𢎞曰臣聞貧賤之知不可忘糟糠之妻不下堂帝顧謂主曰事不諧矣帝之討王郎也彭寵發突騎以助軍事見上卷二年轉糧食前後不絶及帝追銅馬至薊寵自負其功意望甚髙帝接之不能滿以此懷不平賢曰負恃也不能滿其望故心不平也按寵傳先是吳漢北發兵帝遺寵以所服劒倚為北道主人及追銅馬北至薊寵來謁謂當迎閤握手交歡並坐帝接之不能滿其意所以失望及即位吳漢王梁寵之所遣事見上卷更始二年並為三公而寵獨無所加愈怏怏不得志怏於兩翻歎曰如此我當為王但爾者陛下忘我邪爾猶言如此也是時北州破散而漁陽差完有舊鐵官地理志漁陽郡漁陽有鐵官寵轉以貿榖積珍寳益富彊貿音茂幽州牧朱浮年少有俊才欲厲風迹賢曰風化之迹也少詩照翻收士心辟召州中名宿有名耆宿之士及王莽時故吏二千石皆引置幕府多發諸郡倉榖稟贍其妻子寵以為天下未定師旅方起不宐多置官屬以損軍實賢曰謂甲兵糧儲也左傳曰隳軍實也不從其令浮性矜急自多賢曰矜誇多自取也寵亦狠彊嫌怨轉積浮數譛構之宻奏寵多聚兵榖意計難量狠戸墾翻數所角翻量音良上輒漏泄令寵聞以脅恐之恐欺用翻又如字至是有詔徴寵寵上疏願與浮俱徴帝不許寵益以自疑其妻素剛不堪抑屈固勸無受徴曰天下未定四方各自為雄漁陽大郡兵馬㝡精何故為人所奏而棄此去乎寵又與所親信吏計議皆懐怨於浮莫有勸行者帝遣寵從弟子后蘭卿喻之寵因留子后蘭卿遂發兵反拜署將帥自將二萬餘人攻朱浮於薊又以與耿況俱有重功而恩賞並薄數遣使邀誘況要一遥翻況不受斬其使延岑復反圍南鄭岑降嘉見上卷更始二年復扶又翻下同漢中王嘉兵敗走岑遂據漢中進兵武都地理志武都縣屬武都郡為更始柱功矦李寳所破岑走天水走音奏公孫述遣將矦丹取南鄭嘉收散卒得數萬人以李寳為相從武都南擊矦丹不利還軍河池下辨賢曰河池縣屬武都郡一名仇池今鳯州縣也下辨道亦屬武都郡今成州同谷縣師古曰辨音皮莧翻復與延岑連戰岑引北入散關至陳倉賢曰散關故城在今陳倉縣南十里有散谷水因取名焉地理志陳倉縣屬右抉風唐為寳雞縣屬岐州嘉追擊破之公孫述又遣將軍任滿從閬中下江州東據扞關賢曰閬中江州皆縣名並屬巴郡閬中今隆州縣也江州故城在渝州巴縣西宋白曰今渝州江津縣本漢江州縣史記曰楚肅王為扞關以拒蜀故基在今峽州巴山縣於是盡有益州之地漢益州部漢中巴郡廣漢蜀郡犍為牂柯越嶲益州等郡辛夘上還洛陽三月乙未大赦更始諸大將在南方未降者尚多帝召諸將議兵事以檄叩地曰郾最彊宛為次誰當擊之叩去后翻又丘候翻師古曰郾一戰翻宛於元翻賈復率然對曰率然輕遽之貌臣請擊郾帝笑曰執金吾擊郾吾復何憂復扶又翻大司馬當擊宛遂遣復擊郾破之尹尊降又東擊更始淮陽太守暴汜汜降賢曰淮陽故城在今陳州宛邱縣東南汜音汎又音凡降戸江翻夏四月虎牙大將軍蓋延蓋古盍翻督駙馬都尉馬武等四將軍擊劉永破之遂圍永於睢陽故更始將蘇茂反茂隨朱鮪降今復反殺淮陽太守潘蹇姓譜周文王之子季孫食采於潘因氏焉晉有潘父楚有潘崇據廣樂而臣於永賢曰廣樂地闕今宋州虞城縣有長樂故城蓋避隋煬帝諱改永以茂為大司馬淮陽王吳漢擊宛宛王賜奉更始妻子詣洛陽降帝封賜為慎矦賢曰慎縣屬汝南郡故城在今潁州潁上縣西北叔父良族父歙族兄祉皆自長安來甲午封良為廣陽王祉為城陽王宛王賜於光武為族兄更始近屬也歙許及翻亦更始近屬更始封為元氏王祉族兄舂陵康矦敞之子光武之族姪而舂陵節矦買之嫡曽孫也更始封為定陶王又封兄縯子章為太原王興為魯王更始三子求歆鯉皆為列矦求為襄邑矦歆為穀熟矦鯉為夀光矦鄧王王常降帝見之甚歡曰吾見王廷尉不憂南方矣更始以王常為廷尉故帝稱之常降則得南陽一郡故云不憂南方拜為左曹前書百官表左右曹加官受尚書事此時蓋為專官也封山桑矦賢曰山桑縣屬沛郡今亳州縣五月庚辰封族父歙為泗水王帝以隂貴人雅性寛仁欲立以為后貴人以郭貴人有子西都後宫之號十四等未有貴人光武中興斵琱為樸六宫稱號唯有皇后貴人貴人金印紫綬奉不過數十斛終不肯當六月戊戌立貴人郭氏為皇后立其子彊為皇太子大赦丙午封泗水王子終為淄川王終歙子也與帝少相親愛故封為王秋賈復南擊召陵新息平之召陵新息二縣並屬汝南郡賢曰新息故城在今豫州新息縣西南復部將殺人於潁川潁川太守宼恂捕得繫獄時尚草創軍營犯法率多相容恂戮之於市復以為恥還過潁川謂左右曰吾與寇恂並列將帥而為其所䧟今見恂必手劒之恂知其謀不欲與相見姊子谷崇曰崇將也得帶劒侍側卒有變足以相當卒讀曰猝恂曰不然昔藺相如不畏秦王而屈於亷頗者為國也事見四卷周赧王三十六年為于偽翻乃敕屬縣盛供具儲酒醪説文曰醪兼汁滓酒執金吾軍入界一人皆兼二人之饌賢曰饌具也雛晥翻又音雛戀翻恂出迎於道稱疾而還復勒兵欲追之而吏士皆醉遂過去恂遣谷崇以狀聞帝乃徴恂恂至引見時賈復先在坐坐徂卧翻欲起相避帝曰天下未定兩虎安得私鬬今日朕分之分猶解也於是並坐極歡遂共車同出結友而去八月帝自率諸將征五校校戸敎翻丙辰幸内黄賢曰内黄縣屬魏郡今相州縣大破五校於羛陽降其衆五萬人賢曰羛陽縣名屬魏郡故城在今相州堯城縣東余據左傳晉荀盈如齊逆女還卒於戲陽杜預註内黄縣北有戲陽城堯城縣本漢内黄縣隋開皇十八年更名唐未改宋定縣戲與羛同許宐翻降户江翻下同帝遣游擊將軍鄧隆助朱浮討彭寵隆軍潞南浮軍雍奴遣吏奏狀潞雍奴二縣皆屬漁陽郡水經曰鮑邱水過潞縣南曰潞河鄧隆軍於是水之南為彭寵所破宋白曰幽州武清縣本漢雍奴縣水經注云雍奴藪澤之名四面有水曰雍水不流曰奴帝讀檄怒謂使吏曰遣吏來使故曰使吏使疏吏翻營相去百里其埶豈可得相及比若還若汝也比必寐翻及也北軍必敗矣彭寵果遣輕兵擊隆軍大破之浮逺遂不能救蓋延圍睢陽數月克之蓋古盍翻劉永走至虞賢曰虞縣屬梁國故城在今宋州虞城縣虞人反殺其母妻永與麾下數十人奔譙地理志譙縣屬沛郡賢曰今亳州縣蘇茂佼彊周建合軍三萬餘人救永延與戰於沛西地理志沛縣屬沛郡賢曰今徐州縣佼音絞又音効大破之永彊建走保湖陵地理志湖陵縣屬山陽郡茂犇還廣樂延遂定沛楚臨淮三郡也帝使太中大夫伏隆持節使青徐二州招降郡國青徐羣盜聞劉永破敗皆惶怖請降怖普布翻張歩遣其掾孫昱隨隆詣闕上書獻鰒魚鰒歩各翻隆湛之子也堵鄉人董訢反宛城水經註曰堵水南經小堵鄉賢曰在今唐州方城縣堵音者宛於元翻執南陽太守劉驎揚化將軍堅鐔攻宛拔之驎離珍翻鐔徒含翻堅姓鐔名訢走還堵鄉呉漢徇南陽諸縣所過多侵暴破虜將軍鄧奉謁歸新野謁歸謁告而歸也怒漢掠其鄉里遂反擊破漢軍屯據淯陽與諸賊合從從子容翻九月壬戌帝自内黄還陜賊蘇况攻破𢎞農陜失冉翻帝使景丹討之㑹丹薨征虜將軍祭遵擊𢎞農栢華蠻中賊皆平之東觀記曰栢華聚也酈道元曰河南郡新城縣故蠻子國也縣有鄤聚今名蠻中括地志故麻城謂之蠻中在汝州梁縣界祭則介翻赤睂引兵欲西上隴隴縣屬天水郡有大坂名隴坻三秦記曰其坂九回不知髙幾許欲上者七日乃越髙處可容百餘家清水四注下郭仲産秦州記曰隴山東西百八十里登山嶺東望秦川四五百里極目泯然山東人行役升此而顧瞻者莫不悲思故歌曰隴頭流水分離四下念我行役飄然曠野登髙逺望涕零雙墮度汧隴無蠶桑八月乃麥五月乃凍解隗囂遣將軍楊廣迎擊破之又追敗之於烏氏涇陽間烏氏涇陽二縣屬安定郡賢曰烏氏故城在今涇州安定縣東四十里涇陽故城在今原州平髙縣之南敗補邁翻氏音支赤睂至陽城番須中酈道元曰陽城在安民縣成帝永始二年罷安定呼他􅁐以為安民縣賢曰番須口與回中相近並在汧番音盤逢大雪坑谷皆滿士多凍死乃復還發掘諸陵復扶又翻下同取其寳貨凡有玉匣殮者率皆如生殮力贍翻賊遂汙辱呂后尸汙烏故翻關中記呂后合葬長陵髙祖陵在西呂后陵在東鄧禹遣兵擊之於郁夷地理志郁夷縣屬右扶風反為所敗敗補邁翻禹乃出之雲陽地理志雲陽縣屬左馮翊赤睂復入長安延岑屯杜陵賢曰縣名屬京兆周之杜伯國在今萬年縣東南赤睂將逢安擊之鄧禹以安精兵在外引兵襲長安㑹謝禄救至禹兵敗走延岑擊逢安大破之逢音龎死者十餘萬人廖湛將赤睂十八萬攻漢中王嘉嘉與戰於谷口地理志谷口縣屬馮翊賢曰故城在今醴泉縣東北四十里水經註曰涇水東經九嵕山東中山西謂之谷口杜佑曰谷口今雲陽縣治谷是宋白曰當涇水所出之處故謂之谷口廖力弔翻又力救翻大破之嘉手殺湛遂到雲陽就榖嘉妻兄新野來歙帝之姑子也帝令鄧禹招嘉嘉因歙詣禹降歙許及翻李寳倨慢禹斬之始考異曰更柱功矦李寳時為劉嘉相此蓋别一人同姓名余參考范書究其本末漢中王嘉即以更始柱功矦李寳為相禹誅之非别一人也冬十一月以廷尉岑彭為征南大將軍帝於大㑹中指王常謂羣臣曰此家率下江諸將輔翼漢室心如金石眞忠臣也此家猶言此人也即日拜常為漢忠將軍使與岑彭率建義大將軍朱祜等七將軍討鄧奉董訢彭等先擊堵鄉堵音者鄧奉救之朱祜軍敗為奉所獲銅馬青犢尤來餘賊共立孫登為天子登將樂𤣥殺登以其衆五萬餘人降鄧禹自馮愔叛後威名稍損又乏糧食戰數不利數所角翻歸附者日益離散赤睂延岑暴亂三輔郡縣大姓各擁兵衆禹不能定帝乃遣偏將軍馮異代禹討之車駕送至河南地理志河南縣屬河南郡故郟鄏地周武王遷九鼎周公營以為都是為王城雒陽周公遷殷民是為成周晉地道記河南城去雒城四十里宋白曰河南縣周平王徙居于此至敬王乃徙居成周漢為河南縣歴魏晉及後魏皆理於唐􅁐城東北隅敕異曰三輔遭王莽更始之亂重以赤睂延岑之醜重直用翻元元塗炭賢曰塗炭者若䧟泥墜火喻窮困之極也無所依訴將軍今奉辭討諸不軌營保降者遣其渠帥詣京師帥所類翻散其小民令就農桑壊其營壁無使復聚壊音怪復扶又翻征伐非必畧地屠城要在平定安集之耳諸將非不健鬬然好虜掠好呼到翻卿本能御吏士念自修敕無為郡縣所苦異頓首受命引而西所至布威信羣盜多降臣光曰昔周人頌武王之徳曰敷時繹思我徂惟求定周頌賚之詩也敷布也繹陳也徂往也求定謂安天下也言王者之兵志在布陳威徳安民而已觀光武之所以取關中用是道也豈不美哉又詔徴鄧禹還曰慎毋與窮宼爭鋒窮宼者言其勢已窮埶必致死也兵法曰窮宼勿追赤睂無榖自當來東吾以飽待飢以逸待勞孫武子之言也折箠笞之箠杖也折杖笞之言易也非諸將憂也無得復妄進兵復扶又翻下同帝以伏隆為光禄大夫復使於張歩使疏吏翻拜歩東萊太守并與新除青州牧守都尉俱東詔隆輒拜令長以下令力政翻長知兩翻十二月戊午詔宗室列矦為王莽所絶者皆復故國王莽始建國二年免漢宗室列矦為民事見三十七卷復如字三輔大饑人相食城郭皆空白骨蔽野遺民往往聚為營保各堅壁清野赤睂虜掠無所得乃引而東歸衆尚二十餘萬隨道復散復扶又翻帝遣破姦將軍矦進等屯新安建威大將軍耿弇等屯宐陽以要其還路地理志新安宐陽二縣皆屬𢎞農郡要與邀同敕諸將曰賊若東走可引宐陽兵㑹新安賊若南走可引新安兵㑹宐陽馮異與赤睂遇於華隂華户化翻相距六十餘日戰數十合降其將卒五千餘人資治通鑑卷四十
