front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
body:
  text: 資治通鑑卷五十四宋司馬光撰胡三省音註漢紀四十六起彊圉作噩盡昭陽單閼凡七年孝桓皇帝上之下永壽三年春正月己未赦天下居風令貪暴無度居風縣屬九真郡交州記曰山有風門常有風縣人朱達等與蠻夷同反攻殺令聚衆至四五千人夏四月進攻九真九真太守兒式戰死守式又翻兒五兮翻詔九真都尉魏朗討破之閏月庚辰晦日有食之京師蝗或上言民之貧困以貨輕錢薄宜改鑄大錢事下四府下遐稼翻四府三公府及大將軍府羣僚及太學能言之士議之太學生劉陶上議曰當今之憂不在於貨在乎民飢竊見比年已來比毗至翻良苗盡於蝗螟之口杼軸空於公私之求民所患者豈謂錢貨之厚薄銖兩之輕重哉就使當今沙礫化為南金瓦石變為和玉賢曰詩曰大賂南金和玉卞和之玉礫郎狄翻使百姓渇無所飲飢無所食雖皇羲之純徳天地初立有天皇氏澹泊無所施為而民自化伏羲氏始畫八卦造書契以代結繩之政去洪荒之世未逺故其風朴畧唐虞之文明猶不能以保蕭牆之内也鄭氏曰蕭肅也牆謂屛也君臣相見之禮至屛而加肅敬焉是以謂之蕭牆葢民可百年無貨不可一朝有飢故食為至急也議者不達農殖之本多言鑄冶之便葢萬人鑄之一人奪之猶不能給况今一人鑄之則萬人奪之乎雖以隂陽為炭萬物為銅賈誼鵩賦之言役不食之民使不飢之士猶不能足無猒之求也猒於鹽翻下同夫欲民殷財阜楊子曰君人者務在殷民阜財要在止役禁奪則百姓不勞而足陛下愍海内之憂戚欲鑄錢齊貨以救其弊猶養魚沸鼎之中棲鳥烈火之上水木本魚鳥之所生也用之不時必至焦爛願陛下寛鍥薄之禁賢曰鍥刻也音口結翻後冶鑄之議聽民庶之謠吟問路叟之所憂通下情也賢曰列子曰昔堯理天下五十年不知天下理亂堯乃微服遊於康衢兒童謠曰立我蒸民莫匪爾極不識不知順帝之則説苑曰孔子行遊中路聞哭者其音甚悲孔子避車而問之曰夫子非有喪也何哭之悲虞丘子對曰吾有三失吾少好學周徧天下還後吾親喪是一失也事君驕奢不遂是二失也厚交友而後絶是三失也瞰三光之文耀視山河之分流瞰苦鑒翻視也賢曰三光日月星也分謂山流謂河言日月有讁食之變星辰有錯行之異故視其文耀也山崩川竭皆亡之徵不可不察天下之心國家大事粲然皆見無有遺惑者矣伏念當今地廣而不得耕民衆而無所食羣小競進秉國之位鷹揚天下鳥鈔求飽鈔楚交翻吞肌及骨並噬無猒誠恐卒有役夫窮匠起於板築之間卒讀曰猝賢曰役夫謂如陳涉起蘄也窮匠謂如驪山之徒也余謂陳涉黥布皆可以言役夫窮匠則山陽鐵官徒蘇令等是也投斤攘臂登髙逺呼呼火故翻使愁怨之民響應雲合雖方尺之錢何有能救其危也言雖錢大方尺亦不能救天下之亂也遂不改錢冬十一月司徒尹頌薨六考異曰袁紀在月今從范書長沙蠻反冦益陽益陽縣屬長沙郡賢曰縣在益水之陽今潭州縣故城在縣東以司空韓縯為司徒縯以善翻以太常北海孫朗為司空延熹元年夏五月甲辰晦日有食之太史令陳授因小黄門徐璜陳日食之變咎在大將軍冀冀聞之諷雒陽收考授諷雒陽令收考之也死於獄帝由是怒冀曰考異曰袁紀冀以私憾專殺議郎邴尊上益怒今從范書京師蝗六月戊寅赦天下改元大雩公羊傳曰大雩旱祭也何休注曰君親之南郊以以六事謝過自責曰政不善歟民失職歟宫室榮歟婦謁盛歟苞苴行歟讒夫昌歟使童男女各八人舞而呼雩故謂之雩鄭𤣥曰雩吁嗟求雨之祭也服䖍曰雩逺也逺為百穀祈膏雨也陸佃曰雩雨不雨未定也秋七月甲子太尉黄瓊免以太常胡廣為太尉冬十月帝校獵廣成廣成苑在河南新城縣遂幸上林苑此上林苑在雒陽西十二月南匈奴諸部並叛與烏桓鮮卑冦縁邊九郡帝以京兆尹陳龜為度遼將軍及考異曰按匈奴傳每除度遼將軍輒書之此陳龜前李膺後种暠皆不記一時既不當有兩官今約其事分著前後龜臨行上疏曰臣聞三辰不軌言三辰之行不順軌也擢士為相蠻夷不恭拔卒為將臣無文武之材而忝鷹揚之任詩曰維師尚父時維鷹揚爾雅翼鷹好揚隼好翔故以比尚父之武雖殁軀體無所云補今西州邊鄙土地塉埆塉秦昔翻賢曰埆音覺又音確土薄也民數更冦虜數所角翻更工衡翻下租更同室家殘破雖含生氣實同枯朽徃嵗并州水雨災螟互生稼穡荒耗租更空闕賢曰更謂卒更錢也陛下以百姓為子焉可不垂撫循之恩哉焉於䖍翻古公西伯天下歸仁古公亶父避狄去邠居岐從之者如歸市帝王世紀曰西伯至仁百姓襁負而至豈復輿金輦寳以為民惠乎復扶又翻陛下繼中興之統承光武之業臨朝聽政而未留聖意且牧守不良或出中官謂牧守出於中官之所引用也懼逆上㫖取過目前過度也呼嗟之聲招致災害胡虜凶悍悍下罕翻又侯旰翻因衰縁隙而令倉庫單於豺狼之口單與殫同盡也功業無銖兩之効十絫為銖二十四銖為兩皆由將帥不忠聚姦所致前凉州刺史祝良初除到州多所糾罰太守令長貶黜將半長知兩翻政未踰時功効卓然實應賞異以勸功能改任牧守去斥姦殘去羌吕翻又宜更選匈奴烏桓䕶羌中郎將校尉䕶匈奴中郎將䕶烏桓䕶羌校尉更工衡翻校户教翻簡練文武授之灋令除并凉二州今年租更租賦也更役也更工衡翻下同寛赦罪隸掃除更始則善吏知奉公之祐惡者覺營私之禍胡馬可不窺長城塞下無候望之患矣帝乃更選幽并刺史自營郡太守都尉以下多所革易京兆虎牙營扶風雍營皆都尉領之諸郡各有太守都尉下詔為陳將軍除并凉一年租賦以賜吏民為于偽翻龜到職州郡重足震栗言重足而立也重音直龍翻省息經用嵗以億計詔拜安定屬國都尉張奐為北中郎將按奐傳即䕶匈奴中郎將以討匈奴烏桓等匈奴烏桓燒度遼將軍門賢曰時度遼將軍屯五原引屯赤阬煙火相望兵衆大恐各欲亡去奐安坐帷中與弟子講誦自若軍士稍安乃潛誘烏桓隂與和通誘音酉遂使斬匈奴屠各渠帥屠各匈奴别種也屠直於翻帥所類翻襲破其衆諸胡悉降奐以南單于車兒不能統理國事乃拘之奏立左谷蠡王為單于谷蠡音鹿黎詔曰春秋大居正車兒一心向化何罪而黜其遣還庭言春秋之義大居正賢曰春秋法五始之要故經曰元年春正月言王者即位之年宜大開恩宥其居正車兒即是桓帝即位之建和元年立自立以來一心向化宜厚宥之考異曰袁紀元康元年四月中郎將張奐以車兒不能治國事上言更立左鹿蠡王都紺為單于詔不許范書匈奴傳在延熹元年今從之大將軍冀與陳龜素有隙譖其沮毁國威挑取功譽沮在吕翻賢曰挑猶取也獨取其名如挑戰之義音徒了翻不為胡虜所畏坐徵還以种暠為度遼將軍种音冲暠工老翻龜遂乞骸骨歸田里復徵為尚書復扶又翻冀暴虐日甚龜上疏言其罪狀請誅之帝不省省息景翻龜自知必為冀所害不食七日而死東都之臣以死攻外戚者鄭𢎞陳龜二人而已种暠到營所先宣恩信誘降諸胡其有不服然後加討羌虜先時有生見獲質於郡縣者質音致悉遣還之誠心懐撫信賞分明由是羌胡皆來順服暠乃去烽燧除候望去羌吕翻邊方晏然無警入為大司農二年春二月鮮卑冦鴈門蜀郡夷冦蠶陵賢曰蠶陵縣屬蜀郡故城在今翼州翼水縣西有蠶陵山因以名焉宋白曰翼州衛山縣本漢蠶陵縣地故城在縣西有蠶陵山三月復斷刺史二千石行三年喪永興二年聽行三年喪斷丁管翻夏京師大水六月鮮卑冦遼東梁皇后恃姊兄䕃埶姊順烈皇后兄大將軍冀也䕃庇也今人謂憑藉世資得官者為䕃官葢取木為喻言能䕃庇其本根也恣極奢靡兼倍前世專寵妬忌六宫莫得進見及太后崩恩寵頓衰后既無嗣每宫人孕育鮮得全者鮮息淺翻帝雖迫畏梁冀不敢譴怒然進御轉希按周禮注鄭衆云六宫後五前一王之妃百二十人后一人夫人三人嬪九人世婦二十七人女御八十一人鄭𤣥曰六宫謂后也婦人稱寢曰宫宫隠蔽之言后象王立六宫而居之亦正寢一燕寢五夫人以下分居后之六宫每宫九嬪一人世婦三人女御九人其餘九嬪三人世婦九人女御二十七人從后唯所燕息焉從后者五日而沐浴其次又上十五日而徧云夫人如三公從容論婦禮此禮所謂以時御叙于王所者也鄭𤣥又曰凡羣妃御見之法月與后妃其象也卑者宜先尊者宜後女御八十一人當九夕世婦二十七人當三夕九嬪九人當一夕三夫人當一夕后當一夕十五日而徧自望後反之案二鄭所云漢之宫中貫魚無序專房之讌蔽固後宫寧復有此制乎后益憂恚恚於避翻秋七月丙午皇后梁氏崩乙丑葬懿獻皇后於懿陵賢曰諡法温和聖善曰懿聰明叡知曰獻梁冀一門前後七侯三皇后冀祖雍封乘氏侯冀封襄邑侯及嗣乘氏侯又封其子􅏷襄邑侯弟不疑潁陽侯䝉西平侯不疑子馬潁隂侯􅏷子挑城父侯是七封侯也恭懐順烈懿獻三皇后六貴人二大將軍夫人女食邑稱君者七人尚公主者三人其餘卿將尹校五十七人卿九卿也將中郎將也尹河南京兆尹也校諸校尉也校户教翻冀專擅威柄凶恣日積宫衛近侍並樹所親賢曰樹置也禁省起居纎微必知其四方調發調徒弔翻嵗時貢獻皆先輸上第於冀賢曰上第第一也乘輿乃其次焉乘繩證翻吏民齎貨求官請罪者道路相望請罪謂請求以脱罪也百官遷召皆先到冀門牋檄謝恩字書牋表也識也書也左雄傳文吏課牋奏自後世言之奏者達之天子牋者用之中宫東宫將相犬臣檄者徵召傳令用之非所以謝恩也竊意自蔡倫造紙之後用紙書者曰牋用木書者曰檄故言牋檄謝恩也然後敢詣尚書下邳吳樹為宛令宛於元翻之官辭冀冀賔客布在縣界以情託樹樹曰小人姦蠧比屋可誅明將軍處上將之位宜崇賢善以補朝闕比部必翻又毗寐翻連次也補朝闕謂補朝政之闕也處昌吕翻朝直遙翻自侍坐以來坐徂卧翻未聞稱一長者而多託非人誠非敢聞冀黙然不悦樹到縣遂誅殺冀客為人害者數十人樹後為荆州刺史辭冀冀鴆之出死車上遼東太守侯猛初拜不謁冀冀託以他事腰斬之郎中汝南袁著年十九詣闕上書曰夫四時之運功成則退蔡澤之言髙爵厚寵鮮不致災鮮息淺翻今大將軍位極功成可為至戒宜遵縣車之禮縣讀曰懸髙枕頥神傳曰木實繁者披枝害心范睢曰木殖繁者披其枝披其枝者傷其心若不抑損盛權將無以全其身矣冀聞而宻遣掩捕著乃變易姓名託病偽死結蒲為人市棺殯送冀知其詐求得笞殺之太原郝絜胡武好危言髙論好呼到翻與著友善絜武嘗連名奏記三府薦海内髙士而不詣冀冀追怒之敇中都官移檄禽捕司隸校尉領中都官徒千二百人冀葢敇都官從事使移檄禽捕也遂誅武家死者六十餘人絜初逃亡知不得免因輿櫬奏書冀門書入仰藥而死家乃得全安帝嫡母耿貴人薨冀從貴人從子林慮侯承求貴人珍玩不能得冀怒并族其家十餘人人從才用翻涿郡崔琦以文章為冀所善琦作外戚箴白鵠賦以風外戚箴曰赫赫外戚華寵煌煌昔在帝舜徳隆英皇周興三母有莘崇湯宣王晏起姜后脱簪齊桓好樂衛姬不音皆輔主以禮扶君以仁達才進善以義濟身爰暨末葉漸已穨虧貫魚不序九御差池晉國之難祻起於驪惟家之索牝雞之晨專權擅愛顯已蔽人陵長間舊圮剥至親並后匹嫡淫女斃陳匪賢是上番為司徒荷爵負乘采食名都詩人是刺徳用不憮暴辛惑婦拒諌自孤蝮蛇其心縱毒不辜諸父是殺孕子是刳天怒地忿人謀鬼圖甲子昧爽身首分離初為天子後為人螭非但耽色母后尤然不相率以禮而競奬以權先笑後號卒以辱殘家國泯絶宗廟燒燔妹喜喪夏褒姒斃周妲己亡殷趙靈沙丘戚姬人豕吕宗以敗陳后作巫卒死于外霍欲鴆子身乃罹廢故曰無謂我貴天將爾摧無恃常好色有歇微無怙常幸愛有陵遲無曰我能天人爾違患生不徳福有慎機日不常中月盈有虧履道者固仗埶者危微臣司戚敢告在斯箴言外戚之禍深切故具載之憮音呼風讀曰諷冀怒琦曰昔管仲相齊樂聞譏諫之言樂音洛蕭何佐漢乃設書過之吏今將軍屢世台輔任齊伊周而徳政未聞黎元塗炭不能結納貞良以救禍敗反欲鉗塞士口塞悉則翻杜蔽主聽將使𤣥黄改色鹿馬易形乎𤣥黄者天地之色也使之改色言將使天地顛倒也鹿馬易形指趙髙秦二世之事琦之論可謂深切矣冀無以對因遣琦歸琦懼而亡匿冀捕得殺之冀秉政幾二十年順帝永和六年冀為大將軍至是嵗凡十九年幾居希翻威行内外天子拱手不得有所親與與讀曰豫帝既不平之及陳授死帝愈怒和熹皇后從兄子郎中鄧香妻宣生女猛從才用翻香卒宣更適梁紀紀孫壽之舅也壽以猛色美引入掖庭為貴人冀欲認猛為其女易猛姓為梁冀恐猛姊壻議郎邴尊沮敗宣意賢曰沮壊也恐尊壊敗宣意不從其改梁姓也敗補邁翻遣客刺殺之刺七亦翻又欲殺宣宣家與中常侍袁赦相比賢曰相鄰比也比音毗至翻又音毗冀客登赦屋欲入宣家赦覺之鳴鼓㑹衆以告宣宣馳入白帝帝大怒因如厠獨呼小黄門史唐衡小黄門史小黄門之掌書者也問左右與外舍不相得者誰乎左右謂宦官也賢曰外舍謂皇后家也衡對中常侍單超單音善小黄門史左悺與梁不疑有隙悺工喚翻又音綰中常侍徐璜黄門令具瑗具姓也左傳有具丙瑗于眷翻梁考異曰宦者傳作中常侍具瑗今從冀傳常私忿疾外舍放横横户孟翻口不敢道於是帝呼超悺入室謂曰梁將軍兄弟專朝朝直遙翻迫脅内外公卿以下從其風㫖今欲誅之於常侍意如何超等對曰誠國姦賊當誅日乆臣等弱劣未知聖意如何耳帝曰審然者常侍宻圖之對曰圖之不難但恐陛下腹中狐疑帝曰姦臣脇國當伏其罪何疑乎於是召璜瑗五人共定其議帝齧超臂出血為盟齧倪結翻噬也超等曰陛下今計已决勿復更言復扶又翻恐為人所疑冀心疑超等八月丁丑使中黄門張惲入省宿以防其變使惲入禁中直宿以防超等而無上㫖徑使惲入自恃威行宫省故敢然惲於粉翻具瑗敇吏收惲以輒從外入欲圖不軌言欲謀逆不由軌道也帝御前殿召諸尚書入發其事使尚書令尹勲持節勒丞郎以下皆操兵守省閤丞郎尚書左右丞及尚書郎也操七刀翻斂諸符節送省中使具瑗將左右廐騶賢曰騶騎士也余按續漢志太僕舊有六廐中興省約但置一厩曰未央廐主乘與及廐中諸馬後又置左駿廐令别主乘輿御馬未央廐卒騶二十人右駿廐從可知也虎賁羽林都候劒㦸士續漢志左右都候各一人秩六百石主劒㦸士徼循宫中及天子有所收考屬衛尉合千餘人與司隸校尉張彪共圍冀第使光禄勲袁盱持節收冀大將軍印綬盱音吁徙封比景都鄉侯冀及妻壽即日皆自殺不疑䝉先卒悉收梁氏孫氏中外宗親送詔獄無少長皆棄市少詩照翻長知兩翻他所連及公卿列校刺史二千石死者數十人校户教翻太尉胡廣司徒韓縯司空孫朗皆坐阿附梁冀不衛宫止長壽亭減死一等免為庶人故吏賔客免黜者三百餘人朝廷為空為于偽翻是時事猝從中發使者交馳公卿失其度官府市里鼎沸數日乃定百姓莫不稱慶收冀財貨縣官斥賣合三十餘萬萬以充王府用減天下税租之半散其苑囿以業窮民壬午立梁貴人為皇后追廢懿陵為貴人冡帝惡梁氏惡烏路翻改皇后姓為薄氏以文帝薄太后家謹良也乆之知為鄧香女乃復姓鄧氏詔賞誅梁冀之功封單超徐璜具瑗左悺唐衡皆為縣侯超食二萬户璜等各萬餘户世謂之五侯單超新豐侯徐璜武原侯具瑗東武陽侯左悺上蔡侯唐衡汝陽侯也仍以悺衡為中常侍又封尚書令尹勲等七人皆為亭侯賢曰尹勲宜陽都鄉霍諝鄴都亭張敬山陽曲鄉歐陽參修武仁亭李瑋宜陽金門虞放寃句吕都亭周永下邳髙遷鄉以大司農黄瓊為太尉光祿大夫中山祝恬為司徒大鴻臚梁國盛允為司空臚陵如翻按西羌傳有北海太守盛苞其先姓奭避元帝諱改姓盛按戰國時秦有盛橋則先自有盛是時新誅梁冀天下想望異政黄瓊首居公位乃舉奏州郡素行暴汙至死徙者十餘人行下孟翻海内翕然稱之瓊辟汝南范滂滂少厲清節為州里所服滂普郎翻少詩照翻嘗為清詔使風俗通曰汝南周勃辟太尉清詔使范史第五種以司徒清詔使冀州賢注云葢三公府有清詔員以承詔使也使疏吏翻案察冀州滂傳曰時冀州飢荒盜賊羣起以滂為清詔使案察之滂登車攬轡慨然有澄清天下之志守令臧汙者皆望風解印綬去其所舉奏莫不厭塞衆議塞悉則翻㑹詔三府掾屬舉謠言漢官儀曰三公聽採長吏臧否民所疾苦還條奏之是為舉謠言也頃者舉謠言掾屬令史都㑹殿上主者大言州郡行狀云何善者同聲稱之不善者黙爾銜枚滂奏刺史二千石權豪之黨二十餘人尚書責滂所劾猥多劾户槩翻又户得翻疑有私故滂對曰臣之所舉自非叨穢姦暴深為民害豈以汙簡札哉汙烏故翻間以㑹日迫促㑹日謂三府椽屬㑹于朝堂之日也故先舉所急其未審者方更參實參考以究其實也臣聞農夫去草去羌吕翻嘉穀必茂忠臣除姦王道以清若臣言有貳甘受顯戮尚書不能詰詰去吉翻尚書令陳蕃上疏薦五處士處昌吕翻豫章徐穉彭城姜肱姓譜本自炎帝居於姜水因以為氏汝南袁閎京兆韋著潁川李曇曇徒含翻延考異曰范書徐穉傳云熹二年尚書令陳蕃僕射胡廣等上書薦穉袁紀五年尚書令陳蕃薦五處士按二年胡廣已為太尉五年蕃已為光祿勲今置在是年從范書去廣名從袁紀帝悉以安車𤣥纁備禮徵之皆不至穉家貧常自耕稼非其力不食恭儉義讓所居服其徳屢辟公府不起陳蕃為豫章太守以禮請署功曹穉不之免不辭免也既謁而退蕃性方峻不接賔客唯穉來特設一榻去則縣之榻坐榻也亦謂之牀縣讀曰懸後舉有道有道舉見五十卷安帝建光元年家拜太原太守賢曰就家而拜之也皆不就穉雖不應諸公之辟然聞其死喪輒負笈赴弔笈極曄翻常於家豫灸雞一隻以一兩綿絮漬酒中暴乾暴步木翻日曬也乾音干以裹雞徑到所赴冢隧外以水漬綿使有酒氣斗米飯白茅為藉以雞置前醊酒畢醊株衛翻酹酒也留謁則去謁猶刺也不見喪主肱與二弟仲海季江俱以孝友著聞聞音問常同被而寢不應徵聘肱嘗與弟季江俱詣郡夜於道為盜所刼欲殺之肱曰弟年幼父母所憐又未聘娶願殺身濟弟季江曰兄年徳在前家之珍寳國之英俊乞自受戮以代兄命盜遂兩釋焉但掠奪衣資而已既至郡中見肱無衣服怪問其故肱託以他辭終不言盜盜聞而感悔就精廬求見徵君賢曰精廬即精舍也以其嘗䝉徵聘故稱為徴君叩頭謝罪還所略物肱不受勞以酒食而遣之勞力到翻帝既徵肱不至乃下彭城下遐稼翻使畫工圖其形狀肱卧於幽闇以被韜面賢曰韜藏也言患眩疾不欲出風工竟不得見之閎安之𤣥孫也袁安歴事明章和以忠篤稱苦身修節不應辟召著隠居講授不修世務曇繼母苦烈曇奉之逾謹得四時珍玩未嘗不先拜而後進鄉里以為灋帝又徵安陽魏桓安陽縣屬汝南郡其鄉人勸之行桓曰夫干祿求進所以行其志也今後宫千數其可損乎廐馬萬匹其可減乎左右權豪其可去乎去羌吕翻皆對曰不可桓乃慨然歎曰使桓生行死歸於諸子何有哉賢曰若迕時强諫死而後歸於諸勸行者復何益也遂隠身不出帝既誅梁冀故舊恩私多受封爵追贈皇后父鄧香為車騎將軍封安陽侯更封后母宣為昆陽君兄子康秉皆為列侯宗族皆列校郎將列校謂北軍五校尉郎將即三署中郎將校户教翻賞賜以巨萬計中常侍侯覽上縑五千匹上時掌翻下同帝賜爵關内侯又託以與議誅冀與讀曰豫進封高鄉侯又封小黄門劉普趙忠等八人為鄉侯自是權埶專歸宦官矣五侯尤貪縱傾動内外時災異數見數所角翻見賢遍翻白馬令甘陵李雲露布上書移副三府白馬縣屬東郡賢曰露布謂不封之也并以副本上三公府也曰梁冀雖恃權專擅虐流天下今以罪行誅猶召家臣搤殺之耳家臣謂猶古之家相也搤乙革翻而猥封謀臣萬户以上謂單超等五侯也髙祖聞之得無見非謂髙祖之約非有功不侯西北列將得無解體賢曰列將謂皇甫規叚熲等孔子曰帝者諦也春秋運斗樞曰五帝修名立功修徳成化統調隂陽招類使神故稱帝帝之為言諦也鄭𤣥注云審諦於物色也今官位錯亂小人諂進財貨公行政化日損尺一拜用賢曰尺一之板謂詔策也見漢官儀又曰尺一謂板長尺一以寫詔書也不經御省御進也省悉井翻猶今言省審也是帝欲不諦乎帝得奏震怒下有司逮雲下遐稼翻下同詔尚書都䕶劒㦸送黄門北寺獄都總也䕶監也詔尚書總監左右都候劒㦸士防送雲詔獄也或曰都䕶當作都候賢曰前書音義曰北寺獄即若盧獄使中常侍管霸與御史廷尉雜考之時𢎞農五官掾杜衆傷雲以忠諫獲罪續漢志郡有五官掾署功曹及諸曹事上書願與雲同日死帝愈怒遂并下廷尉大鴻臚陳蕃上疏曰李雲所言雖不識禁忌干上逆㫖其意歸於忠國而已昔髙祖忍周昌不諱之諫謂周昌比髙祖於桀紂也成帝赦朱雲腰領之誅事見三十二卷成帝元延元年今日殺雲臣恐剖心之譏復議於世矣謂暴如商受剖賢人之心也復扶又翻下同太常楊秉雒陽市長沐茂漢官儀曰雒陽市長秩四百石屬大司農沐音木集韻曰姓也風俗通漢有東平太守沐寵郎中上官資並上疏請雲帝恚甚恚於避翻有司奏以為大不敬葢三公及尚書奏也詔切責蕃秉免歸田里茂資貶秩二等時帝在濯龍池濯龍池在濯龍園中近北宫管霸奏雲等事霸跪言曰李雲草澤愚儒杜衆郡中小吏出於狂戇不足加罪戇陟降翻帝謂霸曰帝欲不諦是何等語而常侍欲原之邪顧使小黄門可其奏雲衆皆死獄中霸跪奏若為雲等言而獄辭則致之死也於是嬖寵益横太尉瓊自度力不能制横户孟翻度徒洛翻乃稱疾不起上疏曰陛下即位以來未有勝政言政事未有以勝於前朝也諸梁秉權豎宦充朝朝直遙翻李固杜喬既以忠言横見殘滅而李雲杜衆復以直道繼踵受誅横户孟翻復扶又翻海内傷懼益以怨結朝野之人以忠為諱尚書周永素事梁冀假其威勢見冀將衰乃陽毁示忠陽毁梁氏以示忠於帝室遂因姦計亦取封侯周永與尹勲同封侯注見上又黄門挾邪羣輩相黨自冀興盛腹背相親朝夕圖謀共搆姦軌臨冀當誅無可設巧復託其惡以要爵賞要一遙翻陛下不加清徵范書黄瓊傳徵作澂澂與澄同譬之水也若清澂則塵翳在上滓濁在下不可得而混矣審别真偽别彼列翻復與忠臣並時顯封粉墨雜糅糅汝救翻所謂抵金玉於砂礫賢曰抵投也音紙碎珪璧於泥塗四方聞之莫不憤歎臣世荷國恩瓊父香為尚書令甚為和帝所親重荷下可翻身輕位重敢以垂絶之日陳不諱之言書奏不納冬十月壬申上行幸長安中常侍單超疾病壬寅以超為車騎將軍孫程之死追贈車騎將軍今及超之生存授之十二月己巳上還自長安燒當燒何當煎勒姐等八種羌冦隴西金城塞姐音紫又音且也翻種章勇翻䕶羌校尉叚熲擊破之追至羅亭賢曰東觀記曰追到積石山即與羅亭相近在今鄯州斬其酋豪以下二千級獲生口萬餘人酋慈由翻詔復以陳蕃為光祿勲楊秉為河南尹單超兄子匡為濟隂太守濟子禮翻負埶貪放兖州刺史第五種使從事衛羽案之百官志十二州刺史皆有從事史員職畧與司隸同無都官從事其功曹從事為治中從事其部郡國從事每郡國各一人主督促文書察舉非法皆州自辟除通為百石得臧五六千萬種即奏匡并以劾超匡窘迫賂客任方刺羽劾户槩翻又户得翻羽覺其姦捕方囚繫雒陽匡慮楊秉窮竟其事宻令方等突獄亡走尚書召秉詰責秉對曰方等無狀釁由單匡乞檻車徵匡考覈其事則姦慝蹤緒必可立得秉竟坐論作左校校户教翻時泰山賊叔孫無忌冦暴徐兖州郡不能討單超以是陷第五種坐徙朔方作考異曰楊秉傳作超弟宦者傳弟子今從第五種傳范書李雲死在延熹三年春袁紀在二年秋按楊秉傳三年坐救雲免歸田里其年冬復徴拜河南尹坐單匡使客任方刺衛羽繫獄亡走論作左校第五種傳匡遣客刺羽超積忿以事陷種若如范書則雲死時單超已卒何得更能陷種又雲書所論者立鄧后與封五侯事皆在二年袁紀似近之種傳又云衛羽為種説叔孫無忌無忌率其黨與三千餘人降按帝紀延熹三年十一月無忌攻殺都尉侯章又臧旻訟種書稱種所坐盜賊公負筋力未就然則種必不能降無忌此説妄也超外孫董援為朔方太守稸怒以待之稸與蓄同種故吏孫斌知種必死斌與彬同結客追種及於太原刼之以歸亡命數年㑹赦得免種倫之曽孫也第五倫歴事光明是時封賞踰制内寵猥盛陳蕃上疏曰夫諸侯上象四七賢曰上象四七謂二十八宿各主諸侯之分野藩屏上國屏必郢翻髙祖之約非功臣不侯而聞追録河南尹鄧萬世父遵之微功帝以鄧后故録遵破羌之功紹封萬世為南鄉侯更爵尚書令黄雋先人之絶封近習以非義授邑左右以無功傳賞至乃一門之内侯者數人故緯象失度隂陽謬序緯于貴翻臣知封事已行封事謂封爵之事也言之無及誠欲陛下從是而止又采女數千皇后紀曰光武中興六宫稱號唯皇后貴人貴人金印紫綬奉不過粟數十斛又置美人宫人采女三等並無爵嵗時賞賜充給今采女數千女寵盛矣食肉衣綺脂油粉黛不可貲計賢曰貲量也衣於既翻鄙諺言盜不過五女門以女貧家也今後宫之女豈不貧國乎帝頗采其言為出宫女五百餘人為于偽翻但賜雋爵關内侯而封萬世南鄉侯帝從容問侍中陳留爰延朕何如主也從千容翻對曰陛下為漢中主中主為中材之主言可以上可以下顧輔佐者何如耳帝曰何以言之對曰尚書令陳蕃任事則治中常侍黄門與政則亂與讀曰豫是以陛下可與為善可與為非前書曰齊桓公管仲相之則霸豎刁輔之則亂可與為善可與為惡是謂中人帝曰昔朱雲廷折欄檻折而設翻今侍中面稱朕違敬聞闕矣拜五官中郎將累遷大鴻臚臚陵如翻㑹客星經帝坐帝坐一星在太微宫中坐徂卧翻帝宻以問延延上封事曰陛下以河南尹鄧萬世有龍潛之舊封為通侯恩重公卿惠豐宗室加頃引見與之對博博塞之戲也上下媟黷有虧尊嚴媟私列翻臣聞之帝左右者所以咨政徳也善人同處則日聞嘉訓處昌吕翻惡人從游則日生邪情惟陛下逺讒䛕之人逺于願翻納謇謇之士則災變可除帝不能用延稱病免歸三年春正月丙申赦天下詔求李固後嗣初固既策罷事見上卷質帝本初元年知不免禍乃遣三子基兹燮皆歸鄉里時燮年十三姊文姬為同郡趙伯英妻見二兄歸具知事本事本謂事之所由生也黙然獨悲曰李氏滅矣自太公已來賢曰太公謂祖父郃也積徳累仁何以遇此宻與二兄謀豫藏匿燮先事而圖之曰豫託言還京師人咸信之有頃難作難乃旦翻州郡收基兹皆死獄中文姬乃告父門生王成曰君執義先公有古人之節今委君以六尺之孤賢曰六尺謂年十五以下李氏存滅其在君矣成乃將燮乘江東下入徐州界變姓名為酒家傭而成賣卜於市各為異人隂相徃來積十餘年梁冀既誅燮乃以夲末告酒家酒家具車重厚遣之重直用翻下重至同燮皆不受遂還鄉里追行喪服姊弟相見悲感傍人姊戒燮曰吾家血食將絶弟幸而得濟豈非天邪宜杜絶衆人勿妄徃來慎無一言加於梁氏加梁氏則連主上禍重至矣唯引咎而已婦人之識丈夫有所不及焉燮謹從其誨後王成卒燮以禮葬之每四節為設上賔之位而祠焉四節之祠謂四時之祭也為于偽翻丙午新豐侯單超卒賜東園祕器棺中玉具玉具即玉匣也及葬發五營騎士將作大匠起冢塋其後四侯轉横横户孟翻天下為之語曰左回天具獨坐回天言權力能回天也賢曰獨坐言驕貴無偶也徐卧虎唐雨墯卧虎言無人敢攖之也雨之所墯無不沾濕言其流毒徧於天下也定考異曰太子賢註范書雨墯作兩墯云隨意所為不也諸夲兩或作雨按雨墯者謂其性急暴如雨之墯無有常處也皆競起第宅以華侈相尚其僕從皆乘牛車而從列騎僕從才用翻兄弟姻戚宰州臨郡辜較百姓與盜無異較與𣙜同音角虐徧天下民不堪命故多為盜賊焉中常侍侯覽小黄門段珪皆有田業近濟北界近其靳翻濟子禮翻僕從賔客劫掠行旅濟北相滕延一切收捕殺數十人陳尸路衢覽珪以事訴帝延坐徵詣廷尉免左悺兄勝為河東太守皮氏長京兆趙岐恥之皮氏縣屬河東郡賢曰故城在今絳州龍門縣西長知兩翻即日棄官西歸唐衡兄玹為京兆尹玹音𤣥素與岐有隙收岐家屬宗親陷以重灋盡殺之岐逃難四方難乃旦翻靡所不歴自匿姓名賣餅北海市中安丘孫嵩見而異之安丘縣屬北海郡載與俱歸藏於複壁中及諸唐死遇赦乃敢出今孟子古註岐所註也其發題辭亦敘逃難之事閏月西羌餘衆復與燒何大豪冦張掖復扶又翻晨薄校尉段熲軍熲下馬大戰至日中刀折矢盡折而設翻虜亦引退熲追之且鬬且行晝夜相攻割肉食雪四十餘日遂至積石山郡國志積石山在隴西郡河關縣西南賢曰積石山在今鄯州龍支縣南禹貢云導河積石即此是也出塞二千餘里斬燒何大帥降其餘衆而還帥師類翻降户江翻下同夏五月甲戌漢中山崩六月辛丑司徒祝恬薨秋七月以司空盛允為司徒太常虞放為司空長沙蠻反屯益陽零陵蠻冦長沙九真餘賊屯據日南衆轉强盛詔復拜桂陽太守夏方為交趾刺史復扶又翻夏户雅翻方威惠素著冬十一月日南賊二萬餘人相率詣方降勒姐零吾種羌圍允街姐音紫又且也翻零音憐種章勇翻允音鈆段熲擊破之泰山賊叔孫無忌攻殺都尉侯章遣中郎將宗資討破之詔徵皇甫規拜泰山太守規到官廣設方畧冦虜悉平四年春正月辛酉南宫嘉徳殿火戊子丙署火百官志丙署長七人秩四百石黄綬宦者為之主中宫别處大疫二月壬辰武庫火司徒盛允免以大司農种暠為司徒年考異曰袁紀在去按祝恬薨後有盛允允免暠為司徒相去半年袁紀誤也今從范書三月太尉黄瓊免夏四月以太常沛國劉矩為太尉初矩為雍丘令雍丘屬陳留郡故杞國也以禮讓化民有訟者常引之於前提耳訓告以為忿恚可忍恚於避翻縣官不可入使歸更思訟者感之輒各罷去甲寅封河間孝王子參户亭侯博為任城王奉孝王後賢曰杜預註左傳曰今丹水縣北有三户亭故城在今鄧州内鄉縣西南元嘉元年任城王崇薨無子國絶今以博紹封河間孝王開也任城孝王尚也五月辛酉有星孛于心晉書天文志心三星中星曰明堂天子位前星為太子後星為庶子孛蒲内翻丁卯原陵長壽門火原陵光武陵己卯京師雨雹雨于具翻六月京兆扶風及涼州地震庚子岱山及博尤來山並穨裂岱山在博縣西北賢曰徂來山一名尤來山博今博城縣余按二山並在博縣界而先書岱山以尤來山繫之博者岱宗人皆知之而尤來山則容有不知其在博縣界者故書法如此己酉赦天下司空虞放免以前太尉黄瓊為司空犍為屬國夷冦鈔百姓永初元年以犍為南部都尉為犍為屬國都尉領朱提漢陽二縣犍居言翻益州刺史山昱擊破之姓譜山古烈山氏之後一曰周有山師掌山林後以官為氏零吾羌與先零諸種反冦三輔種章勇翻秋七月京師雩公羊傳曰雩旱祭也減公卿已下奉貣王侯半租孔穎達曰已與以字本同洪氏𨽻釋曰濟隂太守孟郁修堯廟碑其文有曰非所以表神聖曰以一太牢春秋秩祠曰是以好道之徒自逺方集其字皆作以曰已章聖徳曰敦我已徳厲我已仁字皆作已已以義同而字搆異體足以知自漢至唐已以二字通用矣奉扶用翻貣吐得翻假借也占賣關内侯占之贍翻虎賁羽林緹騎營士五大夫錢各有差緹他弟翻又音啼九月司空黄瓊免以大鴻臚東萊劉寵為司空寵嘗為㑹稽太守㑹工外翻守式又翻簡除煩苛禁察非法郡中大治治直吏翻徵為將作大匠山隂縣有五六老叟自若邪山谷間出賢曰若邪在今越州㑹稽縣東南邪讀曰耶人齎百錢以送寵曰山谷鄙生未嘗識郡朝朝直遙翻郡聽事曰郡朝公府聽事曰府朝他守時吏發求民間至夜不絶或狗吠竟夕民不得安自明府下車以來狗不夜吠民不見吏年老遭值聖明今聞當見棄去故自扶奉送寵曰吾政何能及公言邪勤苦父老為人選一大錢受之今越州城西四十五里錢清鎮即父老送寵處為于偽翻冬先零沈氐羌與諸種羌冦并涼二州種章勇翻下同校尉段熲將湟中義從討之湟中有義從胡即小月氐胡也從才用翻涼州刺史郭閎貪共其功稽固熲軍賢曰稽固猶停留也使不得進義從役乆戀鄉舊皆悉叛歸郭閎歸罪於熲熲坐徵下獄輸作左校下遐稼翻以濟南相胡閎代為校尉胡閎無威略羌遂陸梁覆沒營塢賢曰説文曰塢小障也一曰庳城也音烏古翻轉相招結唐突諸郡冦患轉盛泰山太守皇甫規上疏曰今猾賊就滅泰山略平復聞羣羌並皆反逆復扶又翻臣生長邠岐年五十有九長知兩翻邠悲中翻昔為郡吏再更叛羌豫籌其事有誤中之言謂知馬賢必敗也事見五十二卷順帝永和五年更工衡翻中竹仲翻臣素有痼疾恐犬馬齒窮不報大恩願乞宂官宂而隴翻備單車一介之使勞來三輔使疏吏翻勞力到翻來力代翻宣國威澤以所習地形兵埶佐助諸軍臣窮居孤危之中坐觀郡將已數十年自鳥䑕至于東岱其病一也賢曰郡將郡守也鳥䑕山名在今渭州西即先零羌冦鈔處也東岱為㤗山叔孫無忌反處也皆由郡守不加綏撫致使反叛其病一也爾雅翼鳥䑕同穴之中渭水出焉其鳥為鵌其䑕為鼵鼵如人家䑕而短尾䳜似鵽而小黄黑色入地三四尺䑕在内鳥在外在隴西首陽縣沙州記云寒嶺去太陽川三十里有鳥䑕同穴之山將即亮翻力求猛敵不如清平勤明孫吳未若奉法賢曰言若求猛敵不如撫以清平之政明習兵書不如郡守奉法使之無反也前變未逺臣誠戚之賢曰戚憂也前變謂羌反是以越職盡其區區詔以規為中郎將持節監關西兵討零吾等監古銜翻十一月規擊羌破之斬首八百級先零諸種羌慕規威信相勸降者十餘萬降户江翻下同五年春正月壬午南宫丙署火三月沈氐羌冦張掖酒泉皇甫規發先零諸種羌共討隴右零音憐而道路隔絶軍中大疫死者十三四規親入庵廬庵草屋廬寄舍也毛晃曰結草木曰菴在野曰廬巡視將士三軍感悦東羌遂遣使乞降涼州復通復扶乂翻下同先是安定太守孫雋受取狼藉屬國都尉李翕督軍御史張禀多殺降羌李翕葢安定屬國都尉然志無安定屬國以御史督軍故曰督軍御史先悉薦翻爾雅翼狼貪猛之獸聚物而不整故稱狼籍涼州刺史郭閎漢陽太守趙熹並老弱不任職任音壬而皆倚恃權貴不遵法度規到悉條奏其罪或免或誅羌人聞之翕然反善沈氐大豪滇昌飢恬等十餘萬口復詣規降滇音顛復扶又翻夏四月長沙賊起冦桂陽蒼梧乙丑恭陵東闕火恭陵安帝陵戊辰虎賁掖門火賁音奔五月康陵園寢火康陵殤帝陵長沙零陵賊入桂陽蒼梧南海交趾刺史及蒼梧太守望風逃犇遣御史中丞盛修督州郡募兵討之不能克乙亥京師地震甲申中藏府丞祿署火百官志中藏府掌中幣帛金銀諸貨物秋七月己未南宫承善闥火鳥吾羌冦漢陽隴西金城諸郡兵討破之艾縣賊攻長沙郡縣艾縣屬豫章郡賢曰故城在今洪州建昌縣按今洪州分寧夲漢艾縣又按宋白續通典分寧縣夲武寧縣武寧縣夲漢西安縣西安縣後漢建安中分海昏縣立而建昌縣乃永元中分海昏立在建安之前當是時艾縣故在宋元嘉二年廢海昏移建昌居焉艾故城在建昌界賢注是也殺益陽令衆至萬餘人謁者馬睦督荆州刺史劉度撃之軍敗睦度犇走零陵蠻亦反冬十月武陵蠻反冦江陵南郡太守李肅犇走主簿胡爽扣馬首諫曰蠻夷見郡無儆備故敢乘間而進間古莧翻明府為國大臣連城千里舉旗鳴鼓應聲十萬奈何委符守之重而為逋逃之人乎肅拔刃向爽曰掾促去掾俞絹翻太守今急何暇此計爽抱馬固諫肅遂殺爽而走帝聞之徵肅棄市度睦減死一等復爽門閭復方目翻除其賦役也拜家一人為郎尚書朱穆舉右校令山陽度尚為荆州刺史右校令掌右工徒秩六百石屬將作大匠趙明誠金石録有荆州刺史度尚碑云其先出自顓頊與楚同姓熊缺之後又曰統國法度按元和姓纂古掌度之官因以命氏不言其與楚同姓也辛丑以太常馮緄為車騎將軍將兵十餘萬討武陵蠻緄古夲翻騎考異曰帝紀三年十二月武陵蠻冦江陵車將軍馮緄討皆降散荆州刺史度尚討長沙蠻平之此事當在今年三月重出誤也先是所遣將帥宦官多陷以折耗軍資徃徃抵罪先悉薦翻折而設翻緄願請中常侍一人監軍財費尚書朱穆奏緄以財自嫌失大臣之節有詔勿劾監古衘翻劾户槩翻又户得翻緄請前武陵太守應奉與俱拜從事中郎將軍出征從事中郎職參謀議十一月緄軍至長沙賊聞之悉詣營乞降進撃武陵蠻夷斬首四千餘級受降十餘萬人荆州平定降户江翻詔書賜錢一億固讓不受振旅還京師推功於應奉薦以為司隸校尉而上書乞骸骨朝廷不許滇那羌冦武威張掖酒泉滇音顛太尉劉矩免以太常楊秉為太尉皇甫規持節為將還督鄉里既無他私惠而多所舉奏又惡絶宦官不與交通惡烏路翻於是中外並怨遂共誣規貨賂羣羌令其文降賢曰謂以文簿虚降非真心也降户江翻帝璽書誚讓相屬屬之欲翻規上書自訟曰四年之秋戎醜蠢戾賢曰蠢動也戾乖也舊都懼駭舊都謂長安朝廷西顧臣振國威靈羌戎稽首稽音啟所省之費一億以上以為忠臣之義不敢告勞詩小雅曰宻勿從事不敢告勞無罪無辜讒口囂囂故恥以片言自及微効然比方先事賢曰先事謂前輩敗將也庶免罪悔前踐州界先奏孫雋李翕張禀旋師南征又上郭閎趙熹陳其過惡埶據大辟上時掌翻辟毗亦翻凡此五臣支黨半國其餘墨綬下至小吏所連及者復有百餘吏託報將之怨郡守謂之郡將復扶又翻將即亮翻子思復父之恥載贄馳車懐糧步走交構豪門競流謗讟云臣私報諸羌讎以錢貨讎是周翻償也若臣以私財則家無擔石擔都濫翻如物出於官則文簿易考易以豉翻就臣愚惑信如言者前世尚遺匈奴以宫姬謂元帝以王昭君賜呼韓邪單于也遺于季翻鎮烏孫以公主謂武帝以江都王建女細君妻烏孫王昆莫也今臣但費千萬以懐叛羌則良臣之才畧兵家之所貴將有何罪負義違理乎自永初以來將出不少將出即亮翻少詩沼翻覆軍有五謂鄧隲敗於冀西任尚敗於平襄司馬鈞敗於丁奚城馬賢敗於射姑山趙冲敗於鸇隂河動資巨億有旋車完封賢曰言覆軍之將旋師之日多載珍寳封印完全便入權門余謂此言以朝廷供軍之金幣不發封識而輸之權門也寫之權門而名成功立厚加爵封今臣還督本土糾舉諸郡絶交離親戮辱舊故衆謗隂害固其宜也帝乃徵規還拜議郎論功當封而中常侍徐璜左悺欲從求貨數遣賔客就問功狀數所角翻規終不答璜等忿怒陷以前事前事即誣毁之事也下之於吏官屬欲賦斂請謝下遐稼翻斂力贍翻規誓而不聽遂以餘冦不絶坐繫廷尉論輸左校校户教翻諸公及太學生張鳳等三百餘人詣闕訟之㑹赦歸家六年春二月戊午司徒种暠薨三月戊戌赦天下以衛尉潁川許栩為司徒夏四月辛亥康陵東署火五月鮮卑冦遼東屬國秋七月甲申平陵園寢火平陵昭帝陵桂陽賊李研等冦郡界武陵蠻復反太守陳奉討平之宦官素惡馮緄復扶又翻惡烏路翻八月緄坐軍還盜賊復發免冬十月丙辰上校獵廣成遂幸函谷關上林苑光祿勲陳蕃上疏諫曰安平之時遊畋宜有節况今有三空之戹哉田野空朝廷空倉庫空加之兵戎未戢四方離散是陛下焦心毁顏坐以待旦之時也毁顏謂面有憂色臨于臣民之上無以為顏也豈宜揚旗曜武騁心輿馬之觀乎又前秋多雨民始種麥今失其勸種之時而令給驅禽除路之役非賢聖恤民之意也書奏不納十一月司空劉寵免十二月以衛尉周景為司空景榮之孫也時宦官方熾景與太尉楊秉上言内外吏職多非其人舊典中臣子弟不得居位秉埶而今枝葉賔客枝葉謂中臣族親也布列職署署官舍也或年少庸人典據守宰上下忿患四方愁毒可遵用舊章退貪殘塞災謗塞悉則翻請下司隸校尉中二千石城門五營校尉北軍中候各實覈所部司隸校尉部三輔三河𢎞農中二千石列卿也各率其屬城門校尉部十二城門司馬門候五營校尉屯騎越騎步兵長水射聲也各有司馬員吏北軍中候掌監五營下遐稼翻應當斥罷自以狀言三府㢘察有遺漏續上言各官實覈所部以當斥罷者言之公府更察其遺漏者續上狀使無有佚罰者上時掌翻帝從之於是秉條奏牧守青州刺史羊亮等五十餘人或死或免天下莫不肅然詔徵皇甫規為度遼將軍初張奐坐梁冀故吏免官禁錮凡諸交舊莫敢為言唯規薦舉前後七上為于偽翻上時掌翻由是拜武威太守及規為度遼到營數月上書薦奐才畧兼優宜正元帥元帥謂度遼將軍也以從衆望若猶謂愚臣宜充舉事者願乞宂官以為奐副朝廷從之以奐代規為度遼將軍以規為使匈奴中郎將使疏吏翻西州吏民守闕為前䕶羌校尉段熲訟寃者甚衆㑹滇那等諸種羌益熾涼州幾亡滇音顛種章勇翻幾居希翻乃復以熲為䕶羌校尉尚書朱穆疾宦官恣横横户孟翻上疏曰按漢故事中常侍參選士人建武以後乃悉用宦者自延平以來浸益貴盛假貂璫之飾處常伯之任賢曰璫以金為之當冠前附以金蟬也漢官儀曰中常侍秦官也漢興或用士人銀璫左貂光武以後專任宦者右貂金璫常伯侍中處昌吕翻天朝政事一更其手朝直遙翻更工衡翻權傾海内寵貴無極子弟親戚並荷榮任荷下可翻放濫驕溢莫能禁禦窮破天下空竭小民愚臣以為可悉罷省遵復徃初更選海内清淳之士明達國體者以補其處即兆庶黎萌䝉被聖化矣被皮義翻帝不納後穆因進見見賢遍翻復口陳曰臣聞漢家舊典置侍中中常侍各一人省尚書事復扶又翻賢曰省覽也省悉井翻黄門侍郎一人傳發書奏賢曰傳通也皆用姓族賢曰引用士人有族望者自和熹太后以女主稱制不接公卿乃以閹人為常侍小黄門通命兩宫自此以來權傾人主窮困天下宜皆罷遣博選耆儒宿徳與參政事帝怒不應穆伏不肯起左右傳出賢曰傳聲令出良乆乃趨而去自此中官數因事稱詔詆毁之數所角翻穆素剛不得意居無幾憤懣發疽卒幾居豈翻資治通鑑卷五十四
