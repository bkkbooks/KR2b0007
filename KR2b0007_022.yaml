body:
  text: 資治通鑑卷第二十二翰林學士朝散大夫右諫議大夫知制誥兼侍講同提舉萬壽觀公事兼判集賢院上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣奉敕編集後學天台音註漢紀十四天漢三年世宗孝武皇帝下之下天漢三年癸未前九八天漢三年春二月王卿有罪自殺以執金吾杜周為御史大夫班表中尉掌徼循京師太初元年更名執金吾應劭曰吾禦也掌執金革以禦非常師古曰金吾鳥名主辟不祥天子出行主先導以備非常故執此鳥之象因以名官天漢三年初榷酒酤如淳曰榷音較應劭曰縣官自酤榷賣酒小民不復得酤也韋昭曰以木渡水曰榷謂禁民酤釀獨官開置如道路設木為榷獨取利也師古曰榷者步渡橋爾雅謂之石杠今之略彴是也禁閉其事總利入官而下無由以得有若渡水之榷因立名焉酤工護翻彴音酌天漢三年三月上行幸泰山脩封祀明堂因受計還祠常山瘞玄玉鄧展曰瘞埋也爾雅曰祭地曰瘞薶薶其物者示歸於地也瘞音於例翻而公孫卿猶以大人跡為解大人跡見二十卷元封元年然猶羈縻不絕師古曰羈縻牽聯之意馬絡頭曰羈牛靷曰縻自此之後方士言神祠者彌衆然其效可睹矣天漢三年夏四月大旱赦天下天漢三年秋匈奴入鴈門鴈門郡屬幷州如淳曰軍法行逗留畏愞者要斬愞如椽翻師古曰又音乃館翻四年四年春正月朝諸侯王于甘泉宮四年發天下七科讁張晏曰吏有罪一亡命二贅壻三賈人四故有市籍五父母有市籍六大父母有市籍七凡七科也遣貳師將軍李廣利將騎六萬步兵七萬出朔方朔方郡屬朔方州唐靈夏州地游擊將軍韓說將步兵三萬人出五原因杅將軍公孫敖將騎萬步兵三萬人出鴈門匈奴聞之悉遠其累重於余吾水北師古曰累重謂妻子資產也累力瑞翻重直用翻余吾水在朔方北山海經曰北鮮之山鮮水出焉北流注于余吾與貳師接戰貳師解而引歸與單于連鬬十餘日考異曰史記匈奴傳云廣利於此降匈奴誤因杅與左賢王戰不利引歸時上遣敖深入匈奴迎李陵敖軍無功還因曰捕得生口言李陵教單于為兵以備漢軍故臣無所得上於是族陵家既而聞之乃漢將降匈奴者李緒非陵也陵使人刺殺緒降戶江翻刺七亦翻大閼氏欲殺陵師古曰大閼氏單于之母閼氏音煙支大閼氏死乃還單于以女妻陵妻千細翻立為右校王校戶教翻與衞律皆貴用事衞律常在單于左右陵居外有大事乃入議四年夏四月立皇子髆為昌邑王髆音博昌邑國屬兗州即山陽郡地其地在唐之宋亳單鄆四州間考異曰表云六月乙丑立今從武紀太始元年乙酉前九六應劭曰言盪滌天下與民更始故以冠元四年春正月公孫敖坐妻為巫蠱要斬巫祝也蠱厭也惑也謂使巫祠祭祝詛厭魅以蠱惑人也蠱音古孔穎達曰蠱者損壞之名故左傳云皿蟲為蠱是蠱食器皿巫行邪術損壞於人要與腰同四年徙郡國豪桀于茂陵四年夏六月赦天下四年是歲匈奴且鞮侯單于死且子余翻鞮田黎翻有兩子長為左賢王次為左大將匈奴二十四長左賢王位第一左大將位第五長知兩翻貴人以為有病更立左大將為單于左賢王聞之不敢進左大將使人召左賢王而讓位焉左賢王辭以病左大將不聽謂曰即不幸死傳之於我左賢王許之遂立為狐鹿姑單于以左大將為左賢王數年病死其子先賢撣不得代更以為日逐王師古曰撣音廛日逐王居匈奴西邊以日入於西故以為名至宣帝神爵二年撣來降單于自以其子為左賢王二年二年春正月上行幸回中二年杜周卒光祿大夫暴勝之為御史大夫二年秋旱二年趙中大夫白公奏穿渠引涇水首起谷口尾入櫟陽班志谷口櫟陽二縣屬左馮翊師古曰谷口即今雲陽縣杜佑曰今雲陽縣治谷是又曰醴泉漢谷口縣地隋為醴泉縣谷口縣故城在縣西北櫟音藥袤二百里師古曰袤音茂長也溉田四千五百餘頃因名曰白渠民得其饒三年三年春正月上行幸甘泉宮二月幸東海獲赤鴈幸琅邪東海琅邪二郡皆屬徐州琅邪唐沂密州也孟康曰禮日拜日也如淳曰拜日於成山師古曰成山在東萊不夜縣斗入海臣瓚曰地理志東萊腄縣有之罘山師古曰罘音浮還從宣翻又如字三年是歲皇子弗陵生弗陵母曰河間趙倢伃河間國屬冀州唐瀛莫州地帝置倢伃位視上卿爵比列侯師古曰倢言接幸於上也伃美貌倢音接伃音予師古曰黃圖鉤弋宮在城外漢武故事在直門南任讀曰姙上曰聞昔堯十四月而生今鉤弋亦然乃命其所生門曰堯母門臣光曰為人君者動靜舉措不可不慎發於中必形於外天下無不知之當是時也皇后太子皆無恙恙余亮翻而命鉤弋之門曰堯母非名也是以姦人章十四行本人作臣乙十一行本同孔本同逆探上意知其奇愛少子欲以為嗣少詩照翻遂有危皇后太子之心卒成巫蠱之禍卒子恤翻悲夫三年趙人江充為水衡都尉趙國屬冀州唐為冀州其地又分入深州德州界元鼎二年初置水衡都尉掌上林苑應劭曰古山林之官曰衡掌諸池苑故稱水衡張晏曰主都水及上林故稱水衡主諸官故曰都有卒徒武事故曰尉師古曰衡平也主平其稅入位列九卿秩中二千石充為趙敬肅王客敬肅王名彭祖薨諡敬肅亡逃詣闕告趙太子陰事太子坐廢上召充入見見賢遍翻充容貌魁岸被服輕靡師古曰魁大也岸者有廉稜如崖岸之狀被服衣服也輕輕細也靡靡麗也被皮義翻與語政事大悅由是有寵拜為直指繡衣使者使督察貴戚近臣踰侈者充舉劾無所避劾戶概翻上以為忠直所言皆中意師古曰中當也中竹仲翻上時掌翻逢太子家使乘車馬行馳道中充以屬吏應劭曰馳道天子所行道也若今之中道也孔穎達曰馳道正道御路也是天子馳走車馬之處故曰馳道如淳曰令乙騎乘車馬行馳道中已論者沒入車馬被具師古曰家使太子遣人之甘泉請問者也使疏吏翻屬之欲翻使人謝充曰非愛車馬誠不欲令上聞之以教敕亡素者師古曰言素不教敕左右古字亡與無通充不聽遂白奏上曰人臣當如是矣大見信用威震京師四年四年春三月上行幸泰山壬午祀高祖于明堂以配上帝因受計癸未祀孝景皇帝于明堂甲申修封丙戌禪石閭夏四月幸不其如淳曰其音基不其山名因以為縣應劭曰東萊縣也余據班志不其縣屬琅邪郡五月還幸建章宮赦天下四年冬十月甲寅晦日有食之四年十二月上行幸雍祠五畤雍於用翻畤音止西至安定北地二郡屬朔方州安定唐涇原之地北地唐邠寧環慶鹽宥州地征和元年己丑前九二應劭曰言征伐四夷而天下和平四年春正月上還幸建章宮四年三月趙敬肅王彭祖薨彭祖取江都易王所幸淖姬彭祖景帝子前二年封廣川五年徙趙淖姬事見十九卷元狩二年淖奴教翻號淖子時淖姬兄為漢宦者上召問淖子何如對曰為人多欲上曰多欲不宜君國子民問武始侯昌昌亦彭祖之子班志武始縣屬魏郡無咎無譽譽音余上曰如是可矣遣使者立昌為趙王四年夏大旱四年上居建章宮見一男子帶劍入中龍華門疑其異人命收之男子捐劍走逐之弗獲上怒斬門候門候掌宮門出入之禁續漢志秩六百石十一月發三輔騎士大搜上林閉長安城門索臣瓚曰搜謂索姦人也上林苑周回數百里恐姦人藏匿其中故大搜索索山客翻巫蠱始起四年丞相公孫賀夫人君孺衞皇后姊也賀由是有寵賀子敬聲代父為太僕驕奢不奉法亶用北軍錢千九百萬發覺下獄下遐嫁翻下同是時詔捕陽陵大俠朱安世甚急賀自請逐捕安世以贖敬聲罪上許之後果得安世安世笑曰丞相禍及宗矣遂從獄中上書告敬聲與陽石公主私通陽石公主帝女也班志陽石屬北海郡上書時掌翻下且上同使巫當馳道埋偶人祝詛上有惡言師古曰刻木為人象人之形謂之偶人偶並也對也祝職救翻詛莊助翻二年二年春正月下賀獄案驗父子死獄中家族其家皆族誅也章十四行本為下有左字乙十一行本同丞相封澎侯涿郡高帝置屬幽州唐瀛莫幽涿深祁州地屈丘勿翻氂力之翻晉灼曰澎東海縣今考班志無之服虔曰澎音彭中山靖王子也靖王勝景帝子二年夏四月大風發屋折木折而設翻二年閏月諸邑公主陽石公主及皇后弟子長平侯伉皆坐巫蠱誅諸琅邪縣以封公主故謂之邑與陽石公主皆衞皇后之女長平侯伉衞青子也伉音抗又音剛二年上行幸甘泉二年初上年二十九乃生戾太子甚愛之及長性仁恕溫謹長知兩翻上嫌其材能少不類己而所幸王夫人生子閎李姬生子旦胥李夫人生子髆少詩沼翻髆音博皇后太子寵浸衰常有不自安之意上覺之謂大將軍青曰漢家庶事草創朱熹曰草略也創造也朕不變更制度後世無法不出師征伐天下不安為此者不得不勞民更工衡翻為于偽翻若後世又如朕所為是襲亡秦之跡也太子敦重好靜好呼到翻必能安天下不使朕憂欲求守文之主安有賢於太子者乎聞皇后與太子有不安之意豈有之邪可以意曉之大將軍頓首謝皇后聞之脫簪請罪脫簪去飾也上笑曰吾當其勞以逸遺汝遺于季翻不亦可乎上每行幸常以後事付太子宮內付皇后有所平決還白其最最大最也有時不省也無所違異也不省不視也省悉景翻多任深刻吏太子寬厚多所平反如淳曰反音幡幡奏使從輕也雖得百姓心而用法大臣皆不悅皇后恐久獲罪每戒太子宜留取上意言留其事取上意裁決也亶上聞之是太子而非皇后㣥臣寬厚長者皆附太子而深酷用法者皆毀之邪臣多黨與故太子譽少而毀多譽音余少詩沼翻衞青薨章乙十一行本薨下有後字孔本同臣下無復外家為據競欲構太子言自衞青既薨之後姦臣以太子無復外家以為憑依競欲構成其罪上與諸子疏疏讀曰疎皇后希得見見賢遍翻太子嘗謁皇后移日乃出移日言日景移也黃門屬少府以宦者為之太子與宮人戲上益太子宮人滿二百人太子後知之心銜文文與小黃門常融王弼等常微伺太子過輒增加白之皇后切齒切齒者怨憤之甚兩齒相摩切也太子曰第勿為過何畏文等上聰明不信邪佞不足憂也上嘗小不平小不平者體中微有不適也融言太子有喜色上嘿然及太子至上察其貌有涕泣處而佯語笑上怪之更微問知其情乃誅融皇后亦善自防閑避嫌疑雖久無寵尚被禮遇被皮義翻是時方士及諸神巫多聚京師率皆左道惑衆盧植曰左道謂邪道也地道尊右右為貴故漢書云右賢左愚右貴左賤故正道為右不正道為左若巫蠱及俗禁者女巫往來宮中教美人度戹每屋輒埋木人祭祀之因妬忌恚詈恚於避翻更相告訐以為祝詛上無道更工衡翻訐居謁翻鄭玄曰詛謂祝之使沮敗也漢法有大逆無道之科祝職救翻詛莊助翻上怒所殺後宮延及大臣死者數百人上心既以為疑嘗晝寢夢木人數千持杖欲擊上上驚寤因是體不平遂苦忽忽善忘忘巫放翻遺忘也江充自以與太子及衞氏有隙見上年老恐晏駕後為太子所誅因是為姦言上疾祟在巫蠱師古曰祟謂禍咎之徵也故其字從出從示言鬼神所以示人者也音息遂翻治巫蠱獄充將胡巫掘地求偶人捕蠱及夜祠視鬼染汙令有處輒收捕驗治燒鐵鉗灼強服之張晏曰充捕巫蠱及夜祭祀祝詛者令胡巫視鬼詐以酒醊地令有處也師古曰捕夜祠及視鬼之人而充遣巫汙染地上為祠祭之處以誣其人又以燒鐵或鉗之或灼之強使之服鉗鑷也灼炙也汙烏故翻鉗其炎翻強其兩翻吏輒劾以為大逆無道劾戶概翻自京師三輔連及郡國坐而死者前後數萬人是時上春秋高疑左右皆為蠱祝詛有與無莫敢訟其冤者充既知上意因胡巫檀何言宮中有蠱氣不除之上終不差差愈也至省中壞御座掘地求蠱又使按道侯韓說御史章贛師古曰說讀曰悅贛音貢姓譜齊人降鄣子孫去邑為章氏黃門蘇文等助充充先治後宮希幸夫人以次及皇后太子宮掘地縱橫縱子容翻太子皇后無復施床處充云於太子宮得木人尤多師古曰三輔舊事云充使胡巫作桐木人而薶之所言不道當奏聞太子懼問少傅石德德懼為師傅幷誅因謂太子曰前丞相父子兩公主及衞氏皆坐此今巫與使者掘地得徵驗不知巫置之邪將實有也無以自明可矯以節收捕充等繫獄師古曰矯託也託詔命也且上疾在甘泉皇后及家吏請問皆不報蘇林曰家吏皇后吏也臣瓚曰太子稱家家吏是太子吏也師古曰既言皇后及家吏此為皇后吏及太子吏耳瓚說是也而姦臣如此太子將不念秦扶蘇事邪事見七卷始皇三十七年吾人子安得亶誅不如歸謝幸得無罪太子將往之甘泉而江充持太子甚急太子計不知所出遂從石德計秋七月壬午太子使客詐為使者收捕充等按道侯說疑使者有詐不肯受詔客格殺說格古陌翻擊也太子自臨斬充罵曰趙虜前亂乃國王父子不足邪江充趙人故罵為趙虜乃汝也謂充前告趙太子陰事使太子見廢也復扶又翻又炙胡巫上林中太子使舍人無且師古曰且音子閭翻持節夜入未央宮殿長秋門因長御倚華具白皇后鄭氏曰長音長者之長如淳曰漢儀注女長御比侍中皇后見娙娥以下長御稱謝倚華字也師古曰倚音於綺翻發中广既車載射士師古曰中广既皇后車馬所在也余謂中广既者天子之內广既也秦二世時公子高曰中广既之寶馬臣得賜之非專主皇后車馬也發長樂宮衞卒長安擾亂言太子反蘇文迸走得亡歸甘泉說太子無狀迸北孟翻上曰太子必懼又忿充等故有此變乃使使召太子使者不敢進歸報云太子反已成欲斬臣臣逃歸上大怒丞相屈氂聞變挺身逃師古曰挺引也獨引身而逃也余謂挺拔也拔身而逃也使長史乘疾置以聞師古曰置謂所置驛也疾置急傳也丞相何為對曰丞相祕之未敢發兵上怒曰事籍籍如此師古曰籍籍猶紛紛也丞相無周公之風矣周公不誅管蔡乎屈氂於太子為兄弟故以周公之事責之捕斬反者自有賞罰以牛車為櫓師古曰櫓盾也遠與敵戰故以車為櫓用自蔽也一說櫓望敵之樓多殺傷士衆堅閉城門毋令反者得出太子宣言告令百官云帝在甘泉病困疑有變姦臣欲作亂上於是從甘泉來幸城西建章宮詔發三輔近縣兵部中二千石以下丞相兼將之太子亦遣使者矯制赦長安中都官囚徒命少傅石德及賓客張光等分將使長安囚如侯持節發長水及宣曲胡騎皆以裝會師古曰長水宣曲並胡騎所屯今鄠縣東長水鄉即舊營校之地馬通漢書作莽通通及弟何羅以反誅明德馬皇后惡其先有反者故易其姓為莽姓譜馬本自伯益之裔趙奢封馬服君後因氏焉告胡人曰節有詐勿聽也遂斬如侯引騎入長安又發楫棹士以予大鴻臚商丘成師古曰楫棹士主用楫及棹行船者也短曰楫長曰棹余據班表水衡都尉有楫棹令丞蓋掌楫棹士之官也太初元年改典客為大鴻臚鴻臚者凡朝會使之鴻聲臚傳以贊導九賓予讀曰與臚音閭漢節純赤以太子持赤節故更為黃旄加上以相別更工衡翻別彼列翻太子立車北軍南門外召護北軍使者任安與節令發兵安拜受節入閉門不出任音壬太子引兵去敺四市人二都及二京賦皆謂長安城中有九市廟記曰長安市有九各方二百六十五步六市在道西三市在道東凡四里為一市此言四市蓋以東西南北分為市也一說四市者東市西市直市柳市師古曰敺與驅同至長樂西闕下逢丞相軍合戰五日死者數萬人血流入溝中街衢之側有溝以通水太子反以故衆不附太子丞相附兵寖多庚寅太子兵敗南奔覆盎城門師古曰長安城南出東頭第一門曰覆盎城門一曰杜門三輔黃圖曰長樂宮在東直杜門故戾太子戰敗於長樂闕下南奔覆盎城門而出亡也班表元狩五年初置司直掌佐丞相舉不法秩比二千石不欲急之太子由是得出亡丞相欲斬仁御史大夫暴勝之謂丞相曰司直吏二千石當先請柰何亶斬之丞相釋仁上聞而大怒下吏責問御史大夫曰下遐稼翻司直縱反者丞相斬之法也大夫何以亶止之勝之惶恐自殺詔遣宗正劉長執金吾劉敢奉策收皇后璽綬后自殺璽斯氏翻上以為任安老吏見兵事起欲坐觀成敗見勝者合從之言與之合而從之也與田仁皆要斬要與腰同長安男子景建從通獲石德商丘成力戰獲張光姓譜商丘衞大夫以邑為氏班志重合侯國屬勃海郡班表德侯食邑於濟南界班志秺侯國屬濟陰郡孟康曰今濟陰成武有秺亭秺音妬皆坐誅其隨太子發兵以反法族吏士劫略者皆徙敦煌郡師古曰非其本心然被太子劫略故徙之也敦音屯始置屯兵長安諸城門上怒甚㣥下憂懼不知所出壺關三老茂上書曰班志壺關縣屬上黨郡荀悅漢紀茂姓令狐臣聞父者猶天母者猶地子猶萬物也故天平地安物乃茂成父慈母愛子乃孝順今皇太子為漢適嗣承萬世之業體祖宗之重親則皇帝之宗子也適子承大宗故謂之宗子適讀曰嫡布衣之人閭閻之隸臣耳隸賤也銜至尊之命以迫蹴皇太子蹴子六翻造飾姦詐㣥邪錯繆是以親戚之路鬲塞而不通鬲與隔同塞悉則翻退則困於亂臣獨冤結而無告不忍忿忿之心起而殺充恐懼逋逃子盜父兵以救難自免耳難乃旦翻臣竊以為無邪心詩曰營營青蠅止于藩愷悌君子無信讒言讒言罔極交亂四國師古曰小雅青蠅之詩也營營往來之貌也藩籬也愷悌樂易也言青蠅往來止於藩籬變白作黑讒人構毀間親令疏樂易之君子不當信用若讒言無極則四國亦以交亂宜深察也天下莫不聞陛下不省察深過太子師古曰以太子為罪過而深責之省悉景翻舉大兵而求之三公自將漢丞相位三公將即亮翻辯士不敢說說式芮翻唯陛下寬心慰意少察所親少詩沼翻毋患太子之非亟罷甲兵無令太子久亡臣不勝惓惓勝音升師古曰惓惓忠切之意惓讀曰拳出一旦之命待罪建章宮下書奏天子感寤然尚未敢顯言赦之也以文理觀之不必有敢字章十四行本正無敢字乙十一行本同孔本同張校同退齋校同太子亡東至湖湖縣屬京兆師古曰今虢州湖城閺鄉二縣皆其地師古曰泉鳩水今在閺鄉縣東南十五里見有戾太子冢冢在澗東常賣屨以給太子太子有故人在湖聞其富贍使人呼之而發覺八月辛亥吏圍捕太子太子自度不得脫度徒洛翻即入室距戶自經孫愐曰頸在前項在後故引繩經其頸謂之自經以刀割其頸謂之自剄山陽時為昌邑國新安令史李壽趨抱解太子班志新安縣屬弘農郡續漢志縣有斗食令史皇孫二人幷皆遇害考異曰漢武故事云治隨太子反者外連郡國數十萬人壺關三老鄭茂上書上感寤赦反者拜鄭茂為宣慈校尉持節徇三輔赦太子太子欲出疑弗實吏捕太子急太子自殺按上若赦太子當詔吏弗捕此說恐妄也乃封李壽為邘侯班志河內野王縣有邘亭邘音于班表題侯食邑於鉅鹿初上為太子立博望苑三輔黃圖曰博望苑在長安杜門外五里師古曰取其廣博觀望也為于偽翻下同從其所好好呼到翻故賓客多以異端進者臣光曰古之明王教養太子為之擇方正敦良之士為于偽翻以為保傅師友使朝夕與之遊處處昌呂翻左右前後無非正人出入起居無非正道然猶有淫放邪僻而陷於禍敗者焉今乃使太子自通賓客從其所好夫正直難親諂諛易合易以豉翻此固中人之常情宜太子之不終也二年癸亥地震二年九月商丘成為御史大夫二年立趙敬肅王小子偃為平干王平干國屬冀州本廣平也宣帝五鳳二年復舊名二年匈奴入上谷五原殺掠吏民上谷郡屬幽州唐媯州地也三年三年春正月上行幸雍至安定北地雍於用翻三年匈奴入五原酒泉殺兩都尉三月遣李廣利將七萬人出五原商丘成將二萬人出西河馬通將四萬騎出酒泉擊匈奴三年夏五月赦天下三年匈奴單于聞漢兵大出悉徙其輜重北邸郅居水重直用翻師古曰邸至也音丁禮翻郅之日翻左賢王驅其人民度余吾水六七百里居兜銜山單于自將精兵渡姑且水將即亮翻師古曰且子余翻商丘成軍至追邪徑無所見還師古曰從疾道而追之不見虜而還也邪音士嗟翻轉戰九日至蒲奴水蒲奴水又在龍勒水南還去馬通軍至天山匈奴使大將偃渠將二萬餘騎要漢兵要一遙翻下同見漢兵強引去通無所得失是時漢恐車師章十四行本師下有兵字乙十一行本同孔本同遮馬通軍遣開陵侯成娩將樓蘭尉犂危須等六國兵危須國治危須城去長安七千二百九十里西至焉耆百里娩音晚又音免盡得其王民衆而還貳師將軍出塞匈奴使右大都尉與衞律將五千騎要擊漢軍於夫羊句山陿要讀曰邀服虔曰夫羊地名也師古曰句山西山也句音鉤貳師擊破之乘勝追北至范夫人城應劭曰本漢將築此城將亡其妻率餘衆完保之因以為名也張晏曰范氏能胡詛者莫敢距敵初貳師之出也丞相劉屈氂為祖道祖軷祭也崔氏云宮內之軷祭古之行神城外之軷祭山川與道路之神記曾子問諸侯適天子道而出註云祖道也聘禮曰出祖釋軷祭酒脯也註云祖始也行出國門正陳車騎釋酒脯之奠為行始也師古曰祖者送行之祭因設宴飲昔黃帝之子纍祖好遠遊而死於道故祀以為行神為于偽翻廣利曰願君侯早請昌邑王為太子如立為帝君侯長何憂乎當時列侯通呼為君侯尊稱之也昌邑王者貳師將軍女弟李夫人子也貳師女為屈氂子妻故共欲立焉會內者令郭穰班表內者令屬少府又據昭紀內謁者令郭穰內者謁者各有令丞皆屬少府豈其時穰兼兩令乎丞相夫人祝詛上及與貳師共禱祠欲令昌邑王為帝按驗罪至大逆不道六月詔載屈氂廚車以徇師古曰廚車載食之車徇行示也要與腰同梟堅堯翻長安城中八街華陽其一也華戶化翻貳師妻子亦收貳師聞之憂懼其掾胡亞夫亦避罪從軍說貳師曰夫人室家皆在吏若還不稱意適與獄會掾于絹翻說式芮翻稱尺證翻郅居以北可復得見乎如淳曰以就誅後雖欲復降匈奴不可得復扶又翻深入要功要一遙翻遂北至郅居水上虜已去貳師遣護軍將二萬騎度郅居之水逢左賢王左大將將二萬騎與漢兵合戰一日漢軍殺左大將虜死傷甚衆軍長史與決眭都尉煇渠侯謀曰晉灼曰決眭都尉匈奴官也功臣表歸義侯僕朋子雷電以擊匈奴功封煇渠侯煇渠魯陽縣也余據班表僕朋侯煇渠食邑於魯陽雷電嗣爵雷電不自匈奴來降則決眭都尉非匈奴官也師古曰眭息隨翻煇音輝將軍懷異心欲危衆求功恐必敗謀共執貳師貳師聞之斬長史引兵還至燕然山據匈奴傳燕然山在匈奴中速邪烏地師古曰燕一千翻自將五萬騎遮擊貳師相殺傷甚衆夜塹漢軍前深數尺塹七艷翻深式禁翻度深曰深從後急擊之軍大亂章十四行本亂下有敗字乙十一行本同孔本同張校同貳師遂降單于素知其漢大將以女妻之降戶江翻妻千細翻尊寵在衞律上宗族遂滅三年秋蝗三年九月故城父令公孫勇班志城父縣屬沛郡父音甫師古曰倩音千見翻倩詐稱光祿大夫言使督盜賊淮陽太守田廣明覺知使疏吏翻守式又翻高祖十一年置淮陽國時為郡屬兗州唐陳州地賢曰淮陽故城在今陳州宛丘縣東南發兵捕斬焉公孫勇衣繡衣乘駟馬車至圉師古曰陳留圉縣余據班志圉縣屬淮陽勇衣於既翻封不害等四人為侯不害當塗侯江德轑陽侯蘇昌蒲侯圉縣小史關內侯食邑圉之遺鄉三年吏民以巫蠱相告言者案驗多不實上頗知太子惶恐無他意言為江充所迫惶恐無以自明而起兵殺江充非有他意也訟太子冤師古曰高廟衞寢之郎所告非常故云急變上時掌翻子弄父兵罪當笞天子之子過誤殺人當何罪哉臣嘗夢一白頭翁教臣言上乃大感寤召見千秋謂曰父子之間人所難言也公獨明其不然此高廟神靈使公教我公當遂為吾輔佐立拜千秋為大鴻臚師古曰當其立見而即拜之言不移時也臚陵如翻焚蘇文於橫橋上即橫門外渭橋也橫音光初為北地太守後族上憐太子無辜乃作思子宮為歸來望思之臺於湖師古曰言己望而思之庶太子之魂歸來也其臺在今湖城縣之西閺鄉縣之東基址猶存四年四年春正月上行幸東萊臨大海欲浮海求神山㣥臣諫上弗聽而大風晦冥海水沸湧上留十餘日不得御樓船乃還四年二月丁酉雍縣無雲如雷者三雍於用翻經典如而字通隕石二黑如黳師古曰黳烏兮翻小黑也江南人以油煎漆滓以飾物曰黳四年三月上耕于鉅定地理志鉅定縣屬齊國水經註作巨淀縣故城在淄水北縣東南有巨澱湖蓋以水受名也幸泰山脩封庚寅祀于明堂癸巳禪石閭見㣥臣上乃言曰朕即位以來所為狂悖悖蒲妹翻使天下愁苦不可追悔自今事有傷害百姓糜費天下者悉罷之田千秋曰方士言神仙者甚衆而無顯功臣請皆罷斥遣之上曰大鴻臚言是也於是悉罷諸方士候神人者是後上每對㣥臣自歎曏時愚惑為方士所欺天下豈有仙人盡妖妄耳妖於遙翻節食服藥差可少病而已少詩沼翻夏六月還幸甘泉四年丁巳以大鴻臚田千秋為丞相封富民侯恩澤侯表富民侯食邑於沛郡蘄縣師古曰欲百姓之殷實故取其嘉名也章十四行本能下有術學二字乙十一行本同孔本同張校同退齋校同又無伐閱功勞太史公曰古者人臣功有五品以德立宗廟定社稷曰勳以言曰勞角力曰功明其等曰伐積日曰閱師古曰伐積功也閱經歷也數月取宰相封侯世未嘗有也然為人敦厚有智居位自稱師古曰言稱其職也稱尺證翻先是搜粟都尉桑弘羊與丞相御史奏先悉薦翻言輪臺東有溉田五千頃以上杜佑曰輪臺渠犂地今在交河北庭界中其地相連置校尉三人分護益種五穀張掖酒泉遣騎假司馬為斥候斥拓也候望也言開拓道路候望也益墾溉田稍築列亭連城而西以威西國輔烏孫時烏孫王尚公主故欲屯田列亭連城以輔之深陳既往之悔曰前有司奏欲益民賦三十助邊用師古曰三十者每口轉增三十錢也重直用翻而今又請遣卒田輪臺輪臺西於車師千餘里前開陵侯擊車師時雖勝降其王降戶江翻以遼遠乏食道死者尚數千人況益西乎曩者朕之不明以軍候弘上書言匈奴縛馬前後足置城下馳言秦人我匄若馬據漢時匈奴謂中國人為秦人至唐及國朝則謂中國為漢如漢人漢兒之類皆習故而言師古曰匄乞與也若汝也乞音氣漢使者久留不還故興遣貳師將軍久留不還謂蘇武等也師古曰興遣興軍而遣之古者卿大夫與謀參以蓍龜不吉不行師古曰謂共卿大夫謀事尚不專決猶雜問蓍龜也蓍筮也龜卜也孔穎達曰卜筮必用龜蓍者按劉向云蓍之言耆龜之言久龜千歲而靈蓍百年而神以其長久故能辯吉凶也說文蓍蒿屬也生千歲三百莖易以為數天子九尺諸侯七尺大夫五尺士三尺陸璣草木疏云似藾蕭青色科生洪範五行傳曰蓍生百年一本生百莖論衡云七十年生一莖七百年十莖神靈之物故生遲也史記曰滿百莖者其下必有神龜守之其上常有雲氣覆之淮南子云上有藂蓍下有伏龜卜筮實問於神龜筮能傳神命以告人故金縢告太王王季文王乃卜三龜一襲吉是能傳神命也又鄭註天府云卜筮實問於鬼神龜筮能出其卦兆之占耳按白虎通稱禮三正記天子龜一尺二寸諸侯一尺大夫八寸士六寸龜陰也故其數偶蓍陽也故其數奇所以謂之卜筮者師說云卜覆也以覆審吉凶筮決也以決定其惑劉向以為卜赴也赴來者之心筮問也問筮者之事赴問互言之易繫辭云定天下之吉凶成天下之亹亹者莫大乎蓍龜又曰蓍之德圓而神又說卦云幽贊於神明而生蓍據此諸文蓍龜知靈相似傳云蓍短龜長不如從長者史蘇欲止獻公之意託云爾實無優劣也杜預鄭玄因是言以為實有長短杜預註傳云物生而後有象象而後有滋滋而後有數龜象筮數故象長數短是也象所以長者以物初生則有象去初既近且包羅萬形故為長數短者數是終去初既遠推尋事數始能求象故為短也鄭註占人云占人亦占筮掌占龜者筮短龜長主於長者是也凡卜筮天子諸侯若大事則卜筮並用皆先筮後卜大事則卜立君卜大封大祭祀出軍旅喪事及龜之八命一曰征二曰象三曰與四曰謀五曰果六曰至七曰雨八曰瘳此等皆為大事鄭註占人云將卜八事皆先以筮筮之是也若次事則惟卜不筮故表記云天子無筮小事無卜惟筮筮人掌九筮之言一曰筮更謂遷都邑也二曰筮咸咸猶僉也謂筮衆心歡不也三曰筮式謂筮作法式也四曰筮目謂事衆筮其所要當也五曰筮易謂民衆不說筮所改易也六曰筮比謂與民和比也七曰筮祠謂筮牲與日也八曰筮參謂筮御與右也九曰筮環謂筮可致師不鄭註古人不卜而徒筮者則用九筮是也僖十五年晉卜納襄王得黃帝戰阪泉之兆又筮之得大有之睽哀九年卜伐宋亦卜而後筮是大事卜筮並用也與讀曰預蓍音升脂翻師古曰視讀曰示為文學謂學經書之人乃至郡屬國都尉等皆以虜自縛其馬不祥甚哉或以為欲以見強師古曰見顯示見賢遍翻師古曰言其夸張也視亦讀曰示公車方士方士之待詔公車者太史屬太常治星習為天文之家望氣如周官之眡祲者皆屬太史太卜屬太常有令丞治直之翻時不可再得也師古曰今便利之時後不可再得也於鬴山必克師古曰行將謂遣將率行也鬴山山名也將即亮翻下同鬴古釜字諸將貳師最吉卜遣諸將而於卦中貳師最為吉也詔之必毋深入今計謀卦兆皆反繆師古曰言不效也繆妄也乃言縛馬者匈奴詛軍事也據班史匈奴聞漢軍當來使巫埋羊牛所出諸道及水上以詛軍詛莊助翻然不耐飢渴失一狼走千羊乃者貳師敗軍士死略離散師古曰言死及被虜略併自離散也今又請遠田輪臺欲起亭隧師古曰隧者依深險之處開通行道也非所以優民也朕不忍聞大鴻臚等又議欲募囚徒送匈奴使者明封侯之賞以報忿此五伯所弗為也蓋欲使刺單于以報忿也師古曰言五伯尚恥不為況今大漢也伯讀曰霸降戶江翻索山客翻提謂提挈之也掖謂兩人夾持其兩掖掖羊益翻師古曰搜索者恐其或私齎文書也余謂恐其挾兵刃問以所聞豈得行其計乎當今務在禁苛暴止亶賦力本農脩馬復令漢有亶賦法今止不行孟康曰先是令長吏各以秩養馬亭有牝馬名養馬者皆復不事後馬多絕乏至此復脩之也師古曰此說非也馬復因養馬以免徭賦也復方目翻郡國二千石各上進畜馬方略補邊狀與計對師古曰與上計者同來赴對也上時掌翻畜許六翻由是不復出軍復扶又翻而封田千秋為富民侯以明休息思富養民也又以趙過為搜粟都尉過能為代田班志一畝三甽歲代處故曰代田古法也后稷始甽田以二耜為耦廣尺深尺曰甽長終畝一畝三甽一夫三百甽而播種於三甽中師古曰代易也余謂此即周禮一易再易之田之類以教民用力少而得穀多民皆便之臣光曰天下信未嘗無士也武帝好四夷之功而勇銳輕死之士充滿朝廷闢土廣地無不如意及後息民重農而趙過之儔教民耕耘民亦被其利好呼到翻被皮義翻此一君之身趣好殊別而士輒應之誠使武帝兼三王之量以興商周之治治直吏翻其無三代之臣乎四年秋八月辛酉晦日有食之考異曰荀紀作七月漢書作八月按長曆是年九月壬戌朔言八月是也四年衞律害貳師之寵會匈奴單于母閼氏病閼氏音煙支律飭胡巫言先單于怒曰胡故時祠兵常言得貳師以社師古曰飭與敕同社祠社也於是收貳師貳師罵曰我死必滅匈奴遂屠貳師以祠後元元年癸巳前八八四年春正月上行幸甘泉郊泰畤遂幸安定四年昌邑哀王髆薨髆音博四年二月赦天下四年夏六月商丘成坐祝詛自殺考異曰功臣表云坐為詹事祠孝文廟醉歌堂下曰出居安能鬱鬱大不敬自殺公卿表云坐祝詛按成不為詹事功臣表誤也四年初侍中僕射馬何羅與江充相善班表侍中僕射秦官自侍中尚書郎軍屯騶宰永巷宦者皆有僕射古者重武官有主射以課督之取其領事之號沈約曰侍中本秦丞相史也使五人往來殿內東廂奏事故謂之侍中漢西京無員多至數十人入侍禁中分掌乘輿御物下至褻器虎子之屬武帝世孔安國為侍中以其儒者特令掌御唾壺朝廷榮之久次者為僕射東京又屬少府猶無員掌侍左右贊導衆事顧問應答法駕出則多識者一人負傳國璽操斬白蛇劍參乘餘皆騎在乘輿車後光武改僕射為祭酒漢世與中官俱止禁中武帝時侍中馬何羅為逆由是侍中出禁外有事乃得入事畢即出王莽秉政侍中復入與中官俱止章帝元和中侍中郭舉與後宮通拔佩刀驚御舉伏誅侍中由是復出外何羅弟通以力戰封重合侯後上夷滅充宗族黨與何羅兄弟懼及及謂及於禍也侍中駙馬都尉金日磾視其志意有非常心疑之陰獨察其動靜與俱上下師古曰上下於殿也磾丁奚翻上時掌翻下廂上同以故久不得發是時上行幸林光宮服虔曰甘泉一名林光師古曰秦之林光宮胡亥所造漢又於其旁起甘泉宮師古曰殿中所止曰廬共殺使者發兵明旦上未起何羅無何從外入無何猶言無幾時也心動師古曰奏向也日磾方向廁而心動坐內戶下須臾何羅袖白刃從東廂上見日磾色變走趨臥內欲入師古曰趨讀曰趣向也臥內天子臥處行觸寶瑟僵日磾得抱何羅因傳曰馬何羅反傳謂傳聲而唱之左右拔刃欲格之上恐幷中日磾中竹仲翻止勿格日磾投何羅殿下得禽縛之窮治皆伏辜四年秋七月地震四年燕王旦自以次第當為太子燕王旦元狩六年受封上怒斬其使於北闕又坐藏匿亡命削良鄉安次文安三縣班志良鄉縣屬涿郡安次文安屬勃海郡良鄉安次二縣唐皆屬幽州文安縣唐為莫州惡烏路翻旦辯慧博學其弟廣陵王胥有勇力胥亦以元狩六年受封多過失故上皆不立時鉤弋夫人之子弗陵年數歲形體壯大多知師古曰壯大者言其形體偉大心欲立焉以其年穉母少少詩沼翻下同猶與久之與讀曰豫欲以大臣輔之察㣥臣唯奉車都尉光祿大夫霍光忠厚可任大事上乃使黃門畫周公負成王朝諸侯以賜光師古曰黃門之署職任親近以供天子百物在焉故亦有畫工畫讀曰一帝譴責鉤弋夫人夫人脫簪珥珥仍吏翻耳飾也叩頭句斷引持去送掖庭獄掖庭屬少府有祕獄凡宮人有罪者下之帝曰趣行趣讀曰促汝不得活卒賜死卒子恤翻頃之帝閒居問左右曰外人言云何左右對曰人言且立其子何去其母乎去羌呂翻下同帝曰然是非兒曹愚人之所知也往古國家所以亂由主少母壯也女主獨居驕蹇淫亂自恣莫能禁也汝不聞呂后邪故不得不先去之也二年二年春正月上朝諸侯王于甘泉宮二月行幸盩厔五柞宮班志盩厔縣屬扶風山曲曰盩水曲曰厔師古曰盩張流翻厔竹乙翻張晏曰五柞宮有五柞樹因名水經註五柞宮在長楊宮東北八里柞即各翻二年上病篤霍光涕泣問曰如有不諱賢曰不諱謂死也死者人之常故言不諱也師古曰不諱言不可諱也上曰君未諭前畫意邪立少子君行周公之事光頓首讓曰臣不如金日磾日磾亦曰臣外國人日磾休屠王子故云然且使匈奴輕漢矣乙丑詔立弗陵為皇太子時年八歲丙寅以光為大司馬大將軍日磾為車騎將軍太僕上官桀為左將軍受遺詔輔少主又以搜粟都尉桑弘羊為御史大夫皆拜臥內牀下光出入禁闥二十餘年出則奉車入侍左右小心謹慎未嘗有過為人沈靜詳審沈持林翻每出入下殿門止進有常處郎僕射竊識視之師古曰識記也音式志翻又職吏翻不失尺寸日磾在上左右日不忤視者數十年忤逆也五故翻賜出宮女不敢近上欲內其女後宮內讀曰納不肯其篤慎如此上尤奇異之日磾長子為帝弄兒帝甚愛之其後弄兒壯大不謹自殿下與宮人戲日磾適見之惡其淫亂惡烏路翻遂殺弄兒上聞之大怒日磾頓首謝具言所以殺弄兒狀上甚哀為之泣為于偽翻已而心敬日磾上官桀始以材力得幸桀少時為羽林期門郎從帝上甘泉天大風車不得行解蓋授桀桀奉蓋雖風常屬車雨下蓋輒御上奇其材力广既未央广既令屬太僕及愈見馬師古曰見謂呈見之音胡電翻馬多瘦上大怒曰令以我不復見馬邪欲下吏復扶又翻下遐嫁翻桀頓首曰臣聞聖體不安日夜憂懼意誠不在馬師古曰誠實也泣數行下卒子恤翻行戶剛翻上以為愛己由是親近近其靳翻為侍中稍遷至太僕三人皆上素所愛信者故特舉之授以後事丁卯帝崩于五柞宮臣瓚曰壽七十一帝聰明能斷斷丁亂翻善用人行法無所假貸隆慮公主子昭平君隆慮公主景帝女班志隆慮縣屬河內郡慮音閭班志夷安縣屬膠西國以金千斤錢千萬為昭平君豫贖死罪上許之為于偽翻下同隆慮主卒昭平君日驕醉殺主傅服虔曰主傅主之官也如淳曰禮有傅姆說者又曰傅老大夫也漢使中行說傅翁主是也師古曰傅姆是廷尉以公主子上請上時掌翻左右人人為言前又入贖陛下許之上曰吾弟老有是一子死以屬我弟謂女弟師古曰老乃有子言其晚孕育也屬音之欲翻歎息良久曰法令者先帝所造也用弟故而誣先帝之法吾何面目入高廟乎又下負萬民乃可其奏哀不能自止左右盡悲待詔東方朔前上壽時有待詔公車者有待詔金馬門者朔時待詔宦者署臣聞聖王為政賞不避仇讎誅不擇骨肉書曰不偏不黨王道蕩蕩師古曰周書洪範之辭蕩蕩平坦貌五帝所重三王所難也陛下行之天下幸甚臣朔奉觴昧死再拜上萬章十四行本萬下有歲字乙十一行本同孔本同退齋校同壽上初怒朔既而善之以朔為中郎班固贊曰漢承百王之弊高祖撥亂反正文景務在養民至于稽古禮文之事猶多闕焉孝武初立卓然罷黜百家表章六經師古曰百家謂諸子雜說違背六經六經謂易詩書春秋禮樂也舉其俊茂師古曰疇誰也咨謀也言謀於衆人誰可為事者也興太學修郊祀改正朔師古曰正音之成翻定曆數協音律作詩樂建封禪禮百神紹周後號令文章煥然可述後嗣得遵洪業而有三代之風如武帝之雄材大略不改文景之恭儉以濟斯民雖詩書所稱何有加焉師古曰美其雄材大略而非其不恭儉也臣光曰孝武窮奢極欲繁刑重斂斂力贍翻內侈宮室外事四夷信惑神怪巡遊無度使百姓疲敝起為盜賊其所以異於秦始皇者無幾矣幾居豈翻然秦以之亡漢以之興者孝武能尊先王之道知所統守受忠直之言惡人欺蔽好賢不倦惡烏路翻好呼到翻晚而改過顧託得人此其所以有亡秦之失而免亡秦之禍乎二年戊辰太子即皇帝位帝姊鄂邑公主共養省中班志鄂縣屬江夏郡公主所食之邑伏儼曰蔡邕云本為禁中門閣有禁非侍御之臣不得妄入行道豹尾中亦為禁中孝元皇后父名禁避之故曰省中師古曰省察也言入此中者皆當察視不可妄也余據鄂邑公主即蓋長公主鄂五各翻共居用翻養弋亮翻光輔幼主政自己出天下想聞其風采殿中嘗有怪一夜㣥臣相驚光召尚符璽郎續漢志本註符璽郎中二人在中主璽及虎符竹符之半者璽斯氏翻師古曰恐有變難欲收取璽光欲奪之郎按劍曰臣頭可得璽不可得也光甚誼之明日詔增此郎秩二等衆庶莫不多光多猶重也以此事為多足重也二年三月甲辰葬孝武皇帝于茂陵二年夏六月赦天下二年秋七月有星孛于東方孛蒲內翻二年濟北王寬坐禽獸行自殺淮南厲王子勃徙封濟北王寬其孫也漢法內亂者為禽獸行濟子禮翻行下孟翻二年冬匈奴入朔方殺略吏民發軍屯西河左將軍桀行北邊行下孟翻顧頡剛標點聶崇岐覆校
