body:
  text: 資治通鑑卷第二百二端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀十八高宗天皇大聖大弘孝皇帝中之下咸亨二年咸亨二年辛未六七一咸亨二年春正月甲子上幸東都考異曰舊本紀及太子弘傳正月乙巳幸東都留太子於京師監國明年十月己未又云皇太子監國新本紀唐曆統紀皆連歲言太子監國按離長安時已留太子監國及自東都將還豈得又令監國按實録此月無監國事唯明年十月有之今從之咸亨二年夏四月甲申以西突厥阿史那都支為左驍衛大將軍兼匐延都督顯慶二年平賀魯以處木昆部為匐延都督府厥九勿翻驍堅堯翻匐蒲北翻咄當沒翻咸亨二年初武元慶等既死事見上卷乾封元年彠一虢翻襲爵周公改姓武氏纍遷弘文館學士左散騎常侍太宗在藩於秦府置文學館學士其後弘文崇文二館皆有學士散悉亶翻騎奇寄翻亦見乾封元年悲泣曰嚮吾出視朝猶無恙退朝已不救何蒼猝如此朝直遙翻敏之號哭不對后聞之曰此兒疑我由是惡之敏之貌美蒸於太原王及居喪釋衰絰奏妓號戶高翻惡烏路翻衰倉回翻妓渠綺翻司衛少卿楊思儉女有殊色上及后自選以為太子婚有日矣敏之逼而淫之后於是表言敏之前後罪惡請加竄逐六月丙子敕流雷州復其本姓至韶州以馬韁絞死雷州漢徐聞縣地梁置南合州隋曰合州仍置海康縣大業廢州唐武德五年復置貞觀八年改曰雷州韶州漢南野縣地吳孫晧甘露元年分立始興郡唐武德初置番州貞觀元年改韶州舊志雷州至京師六千五百四十七里至東都五千八百三十六里韶州至京師四千九百三十二里至東都四千一百四十二里韁居良翻流嶺南者甚衆朝直遙翻咸亨二年秋七月乙未朔高侃破高麗餘衆於安市城麗力知翻咸亨二年九月丙申潞州刺史徐王元禮薨咸亨二年冬十一月甲午朔日有食之咸亨二年車駕自東都幸許汝十二月癸酉校獵於葉縣舊志東都至許州四百里至汝州百八十里葉縣舊屬南陽郡後並省後齊置襄州後周廢州置南襄城郡隋廢郡為葉縣屬許州葉式涉翻丙戌還東都三年三年春正月辛丑以太子左衛副率梁積壽為姚州道行軍總管太子十率府各有副率位四品率所律翻將即亮翻三年庚戌昆明蠻十四姓二萬三千戶內附置殷敦總三州爨蠻西有昆明蠻一曰昆彌蠻以西洱河為境即葉榆河也去長安九千里殷州居戎州西北總州居西南敦州居南遠不過五百餘里近三百里三年二月庚午徙吐谷渾於鄯州浩亹水南漢書地理志浩亹水東至允吾入湟允吾唐為鄯州龍支縣水經注浩亹河出允吾西北塞外東徑浩亹縣故城南又東流注于湟水俗呼為閣門河吐從暾入聲谷音浴鄯時戰翻浩音誥亹音門不安其居又鄯州地狹尋徙靈州以其部落置安樂州時以靈州鳴沙縣地置安樂州樂音洛可從刊入聲汗音寒三年己卯侍中永安郡公薑恪薨三年夏四月庚午上幸合璧宮三年吐蕃遣其大臣仲琮入貢上問以吐蕃風俗對曰吐蕃地薄氣寒風俗朴魯然法令嚴整上下一心議事常自下而起因人所利而行之斯所以能持久也上詰以吞滅吐谷渾見上卷龍朔三年詰去吉翻見上卷咸亨元年敗補邁翻吐蕃既滅吐谷渾又破西域則寇逼涼州矣臣受命貢獻而已軍旅之事非所聞也上厚賜而遣之癸未遣都水使者黃仁素使于吐蕃使疏吏翻三年秋八月壬午特進高陽郡公許敬宗卒卒子恤翻太常博士袁思古議敬宗棄長子於荒徼徼吉弔翻嫁少女於夷貊少詩沼翻貊莫白翻按諡法名與實爽曰繆請諡為繆繆靡幼翻敬宗孫太子舍人彥伯訟思古與許氏有怨請改諡太常博士王福畤議畤音止以為章十二行本為下有諡者二字乙十一行本同孔本同張校同得失一朝榮辱千載太常博士擬諡皆迹其功行為之褒貶大行大名之小行小名之載子亥翻當據法推繩如其不然義不可奪戶部尚書戴至德謂福畤曰高陽公任遇如是何以諡之為繆對曰昔晉司空何曾既忠且孝徒以日食萬錢秦秀諡之為繆見八十卷晉武帝咸寧四年而飲食男女之纍過之纍力瑞翻諡之曰繆無負許氏矣詔集五品已上更議禮部尚書陽思敬議按諡法既過能改曰恭請諡曰恭詔從之敬宗嘗奏流其子昂于嶺南又以女嫁蠻酋馮盎之子多納其貨酋慈由翻故思古議及之福畤勃之父也王勃見二百卷龍朔元年三年九月癸卯徙沛王賢為雍王雍於用翻三年冬十月己未詔太子監國監古銜翻三年壬戌車駕發東都三年十一月戊子朔日有食之三年甲辰車駕至京師三年十二月高侃與高麗餘衆戰于白水山破之新羅遣兵救高麗侃擊破之三年癸卯以左庶子劉仁軌同中書門下三品三年太子罕接宮臣典膳丞全椒邢文偉輒減所供膳東宮典膳局郎正六品上丞正八品上掌進膳嘗食全椒縣時屬滁州太子復書謝以多疾及入侍少暇嘉納其意上時掌翻頃之右史缺上曰邢文偉事吾子能撤膳進諫此直士也擢為右史起居舍人從六品上屬中書省掌修記言之史録天子之制誥德音如記言之制以紀時政之損益季終則授之於國史龍朔改曰右史太子因宴集命宮臣擲倒唐散樂有舞盤伎舞輪伎長蹻伎跳鈴伎擲倒伎跳劍伎吞劍伎皆梁之遺伎也隋置太子內率府擬上臺千牛衛掌東宮千牛備身侍奉之事龍朔改為左右奉裕率率所律翻擲倒自有伶官伶盧經翻臣若奉令恐非所以羽翼殿下也太子謝之上聞之賜及善縑百匹尋遷左千牛衛將軍千牛刀即人主防身刀也取莊子庖丁解數千牛而芒刃不頓之義後魏有千牛備身掌宿衛侍從隋煬帝置備身府唐改千牛府四年四年春正月丙辰絳州刺史鄭惠王元懿薨四年三月丙申詔劉仁軌等改修國史以許敬宗等所記多不實故也四年夏四月丙子車駕幸九成宮四年閏五月燕山道總管右領軍大將軍李謹行大破高麗叛者於瓠蘆河之西胡嶠曰黑車子之北有牛蹄突厥人身牛足其地尤寒水曰瓠河夏秋冰厚二尺秋冬冰徹底常燒器銷冰乃得飲余按唐書劉仁軌傳此瓠蘆河當在高麗南界新羅七重城之北燕因肩翻下同餘衆皆奔新羅時謹行妻劉氏留伐奴城高麗引靺鞨攻之劉氏擐甲帥衆守城久之虜退靺鞨音末曷擐音宦帥讀曰率上嘉其功封燕國夫人謹行靺鞨人突地稽之子也突地稽見一百八十九卷高祖武德四年為衆夷所憚四年秋七月章十二行本月下有辛巳二字乙十一行本同孔本同退齋校同婺州大水溺死者五千人婺亡遇翻溺奴狄翻四年八月辛丑上以瘧疾令太子於延福殿受諸司啓事瘧迸約翻四年冬十月壬午中書令閻立本薨四年乙巳車駕還京師四年十二月丙午弓月疏勒二王來降降江戶翻下同西突厥興昔亡可汗之世諸部離散弓月及阿悉吉皆叛阿悉吉即阿悉結弩失畢五俟斤之一也見二百卷顯慶二年弓月南結吐蕃北招咽麥丏咽麥丏亦鐵勒種居得嶷海咽於甸翻麥丏眠見翻降之上遣鴻臚卿蕭嗣業發兵討之嗣業兵未至弓月懼與疏勒皆入朝上赦其罪遣歸國臚陵如翻朝直遙翻上元元年上元元年春正月壬午以左庶子同中書門下三品劉仁軌為雞林道大總管帝以新羅國為雞林州發兵討新羅時新羅王法敏既納高麗叛衆又據百濟故地使人守之上大怒詔削法敏官爵其弟右驍衛員外大將軍臨海郡公仁問在京師驍堅堯翻立以為新羅王使歸國上元元年三月辛亥朔日有食之上元元年賀蘭敏之既得罪皇后奏召武元爽之子承嗣於嶺南乾封元年元爽流振州拜尚衣奉御尚衣奉御屬殿中省掌衣服詳其制度辨其名數四月辛卯遷宗正卿上元元年秋八月壬辰追尊宣簡公為宣皇帝妣張氏為宣莊皇后懿王為光皇帝妣賈氏為光懿皇后後魏金門鎮將熙太祖虎之祖也諡宣簡公魏幢主天賜太祖虎之父也諡懿王太穆皇后為太穆神皇后文皇帝為太宗文武聖皇帝文德皇后為文德聖皇后皇帝稱天皇皇后稱天后以避先帝先后之稱實欲自尊而以避先帝先后之稱為言武后之意也之稱尺證翻赦天下上元元年戊戌敕文武官三品以上服紫金玉帶四品服深緋金帶五品服淺緋金帶六品服深緑七品服淺緑並銀帶八品服深青九品服淺青並鍮石帶鍮石似金而非金鍮託侯翻銅鐵帶自非庶人不聽服黃非庶人謂工商雜戶上元元年九月癸丑詔追復長孫晟長孫無忌官爵以無忌曾孫翼襲爵趙公聽無忌喪歸陪葬昭陵無忌削官爵而死見二百卷顯慶四年上元元年甲寅上御翔鸞閣據舊書郝處俊傳翔鸞閣在含元殿東唐六典含元殿翼以二閣左曰翔鸞右曰棲鳳二閣之下為東西朝堂酺薄胡翻分音樂為東西朋使雍王賢主東朋周王顯主西朋角勝為樂郝處俊諫曰二王春秋尚少志趣未定當推梨讓棗梁元帝遺武陵王書有是言樂音洛少詩沼翻推吐雷翻今分二朋遞相誇競俳優小人言辭無度恐其交爭勝負譏誚失禮非所以崇禮義勸敦睦也上瞿然曰誚才笑翻瞿九遇翻驚視貌卿遠識非衆人所及也遽止之是日衛尉卿李弼暴卒于宴所為之廢酺一日為于偽翻上元元年冬十一月丙午朔車駕發京師己酉校獵華山之曲武原華山在華州華陰縣南曲武原在華山下華戶化翻戊辰至東都上元元年箕州録事參軍張君徹等誣告刺史蔣王惲及其子汝南郡王煒謀反惲於粉翻煒于鬼翻敕通事舍人薛思貞馳傳往按之傳張戀翻十二月癸未惲惶懼自縊死縊於計翻上知其非罪深痛惜之斬君徹等四人上元元年戊子于闐王伏闍雄來朝闐徒賢翻闍視遮翻朝直遙翻下同上元元年辛卯波斯王卑路斯來朝上元元年壬寅天后上表以為國家聖緒出自玄元皇帝老子姓李名耳唐祖之乾封元年尊為玄元皇帝上時掌翻下同每歲明經準孝經論語策試又請自今父在為母服齊衰三年古禮父在為母服期為于偽翻齊音咨衰倉回翻京官八品以上宜量加俸祿京官在京官也量音良合十二條詔書褒美皆行之上元元年是歲有劉曉者上疏論選選須絹翻下同考異曰會要作劉嶢今從統紀以為今選曹以檢勘為公道檢勘者謂考其功過察其假名承偽隱冒升降殊不知考其德行才能況書判借人者衆矣又禮部取士專用文章為甲乙故天下之士皆捨德行而趨文藝有朝登甲科而夕陷刑辟者雖日誦萬言何關理體理體即治道行下孟翻趨七喻翻下同辟毗亦翻未足化人況盡心卉木之間極筆煙霞之際以斯成俗豈非大謬夫人之慕名如水趨下上有所好下必甚焉陛下若取士以德行為先文藝為末則多士雷奔四方風動矣趨七喻翻好呼到翻下憐好同二年上元二年春正月丙寅以于闐國為毗沙都督府分其境內為十州以于闐王尉遲伏闍雄為毗沙都督闐徒賢翻又徒見翻尉紆勿翻闍視遮翻上元二年辛未吐蕃遣其大臣論吐渾彌來請和且請與吐谷渾復修鄰好吐從暾入聲下同復扶又翻谷音浴上元二年二月劉仁軌大破新羅之衆於七重城重直龍翻又使靺鞨浮海略新羅之南境斬獲甚衆仁軌引兵還靺音末鞨音曷還從宣翻又音如字詔以李謹行為安東鎮撫大使使疏吏翻下同屯新羅之買肖城以經略之三戰皆捷新羅乃遣使入貢且謝罪上赦之復新羅王法敏官爵金仁問中道而還使疏吏翻還音旋又如字改封臨海郡公上元二年三月丁巳天后祀先蠶於邙山之陽漢儀三月桑始生皇后親桑於苑中蠶室養蠶千薄以上祠以中牢羊豕續漢志三月皇后帥公卿諸侯夫人蠶祠先蠶禮以少牢注云今蠶神曰苑疏窳寓氏公主唐制皇后歲祀一季春吉巳享先蠶遂以親桑蜀注曰通典先蠶天駟也百官及朝集使皆陪位朝直遙翻下同上元二年上苦風眩甚議使天后攝知國政中書侍郎同三品郝處俊曰天子理外后理內天之道也記昏義曰天子聽男教后聽女順天子理陽道后治陰德天子聽外治后聽內職教順成俗外內和順國家理治此之謂盛德雖有幼主不許皇后臨朝所以杜禍亂之萌也事見六十九卷魏文帝黃初三年不傳之子孫而委之天后乎中書侍郎昌樂李義琰曰處俊之言至忠陛下宜聽之樂音洛上乃止上元二年天后多引文學之士著作郎元萬頃唐著作郎從五品上掌修撰碑志祝文祭文屬祕書省龍朔改起居郎為左史凡千餘卷撰士免翻朝廷奏議及百司表疏時密令參決以分宰相之權疏所去翻時人謂之北門學士不經南衙於北門出入故云然子翼之子也劉子翼仕隋以學行著上元二年夏四月庚辰以司農少卿韋弘機為司農卿弘機兼知東都營田受詔完葺宮苑有宦者於苑中犯法弘機杖之然後奏聞上以為能賜絹數十匹曰更有犯者卿即杖之不必奏也上元二年初左千牛將軍長安趙王褱尚高祖女常樂公主生女為周王顯公主頗為上所厚天后惡之樂音洛惡烏路翻辛巳坐廢幽閉於內侍省食料給生者防人候其突煙而已數日煙不出開視死腐矣王褱自定州刺史貶栝州刺史令公主隨之官仍絶其朝謁朝直遙翻上元二年太子弘仁孝謙謹上甚愛之禮接士大夫中外屬心屬之欲翻天后方逞其志太子奏請數忤旨忤逆也數所角翻忤五故翻義陽宣城二公主蕭淑之女也坐母得罪幽于掖庭年踰三十不嫁太子見之驚惻遽奏請出降上許之天后怒即日以公主配當上翊衛權毅王遂古親勳翊三衛皆番上上時掌翻己亥太子薨于合璧宮時人以為天后鴆之也考異曰新書本紀云己亥天后殺皇太子新傳云后將逞志弘奏請數怫旨從幸合璧宮遇鴆薨唐曆云弘仁孝英果深為上所鍾愛自升為太子敬禮大臣鴻儒之士未嘗居有過之地以請嫁二公主失愛於天后不以壽終實録舊傳皆不言弘遇鴆按李泌對肅宗云高宗有八子睿宗最幼天后所生四子自為行第故睿宗第四長曰孝敬皇帝為太子監國仁明孝悌天后方圖臨朝乃鴆殺孝敬立雍王賢為太子新書蓋據此及唐曆也按弘之死其事難明今但云時人以為天后鴆之疑以傳疑壬寅車駕還洛陽宮五月戊申下詔朕方欲禪位皇太子而疾遽不起宜申往命加以尊名可諡為孝敬皇帝帝子諡皇帝始此諡神至翻六月戊寅立雍王賢為皇太子赦天下雍於用翻上元二年天后惡慈州刺史王上金宋白曰慈州春秋牆咎如之國漢為北屈縣隋為汾州唐武德元年為西汾州五年改南汾州貞觀八年改南汾州為慈州以州近慈烏戍故名孫愐曰因慈氏縣名之上金帝後宮劉氏所生惡烏路翻秋七月上金坐解官澧州安置上元二年八月庚寅葬孝敬皇帝于恭陵恭陵在洛州緱氏縣懊來山改名太平山上元二年戊戌以戴至德為右僕射庚子以劉仁軌為左僕射並同中書門下三品如故張文瓘為侍中郝處俊為中書令李敬玄為吏部尚書兼左庶子同中書門下三品如故劉仁軌戴至德更日受牒訴尚辰羊翻更工衡翻仁軌常以美言許之至德必據理難詰難乃旦翻詰去吉翻未嘗與奪實有冤結者密為奏辨為于偽翻由是時譽皆歸仁軌或問其故至德曰威福者人主之柄人臣安得盜取之上聞深重之有老嫗欲詣仁軌陳牒誤詣至德至德覽之未終嫗曰本謂是解事僕射乃不解事僕射邪嫗威遇翻解戶買翻歸我牒至德笑而授之時人稱其長者長知兩翻文瓘時兼大理卿囚聞改官皆慟哭文瓘性嚴正諸司奏議多所糾駮上甚委之駮北角翻儀鳳元年丙子六七六是年十一月方改元上元二年春正月壬戌徙冀王輪為相王上元二年納州獠反唐制儀鳳二年開山洞置納州屬瀘州都督府獠魯皓翻黔音琴上元二年二月甲戌徙安東都護府於遼東故城考異曰實録咸亨元年楊昉高侃討安舜始拔安東都護府自平壤城移於遼東州儀鳳元年二月甲戌以高麗餘衆反叛移安東都護府於遼東城蓋咸亨元年言移府者終言之也儀鳳元年言高麗反者本其所以移也會要無咸亨元年移府事此年云移於遼東故城今從之章十二行本任下有安字乙十一行本同孔本同張校同東官者悉罷之先悉薦翻徙熊津都督府於建安故城其百濟戶口先徙於徐兗等州者皆置於建安上元二年天后勸上封中嶽癸未詔以今冬有事于嵩山中嶽嵩山在河南陽城縣上元二年丁亥上幸汝州之溫湯汝州梁縣西南五十里有溫湯可以熟米又有黃女湯帝置溫泉頓上元二年三月癸卯黃門侍郎來恆中書侍郎薛元超並同中書門下三品恆濟之兄元超收之子也來濟盡忠而又死於封疆薛收事太宗於潛躍恆戶登翻上元二年甲辰上還東都還從宣翻又音如字上元二年閏月吐蕃寇鄯廓河芳等州宋白曰疊州常芬縣舊為吐谷渾所據周武成三年逐諸羌始有其地乃於三交築城置甘松防又為三川縣以隸常香郡建德三年改三川為常芬縣仍立芳州以邑隸焉取地多芳草以名州隋廢州唐復置吐從暾入聲鄯時戰翻興州漢武都沮縣地後魏改為略陽縣江左為武興藩王國後魏以為武興郡置興州改略陽縣為順政縣鳳州漢故道河池縣地晉為仇池氐所據後魏置梁泉縣西魏廢帝置鳳州鄯時戰翻監古銜翻將即亮翻己卯詔以吐蕃犯塞停封中嶽乙酉以洛州牧周王顯為洮州道行軍元帥將工部尚書劉審禮等十二總管並州大都督相王輪為涼州道行軍元帥將左衛大將軍契苾何力等以討吐蕃洮土刀翻帥所類翻將即亮翻並卑經翻契欺訖翻苾毗必翻二王皆不行上元二年庚寅車駕西還上元二年甲寅中書侍郎李義琰同中書門下三品上元二年戊午車駕至九成宮上元二年六月癸亥黃門侍郎晉陵高智周同中書門下三品上元二年秋八月乙未吐蕃寇疊州上元二年壬寅敕桂廣交黔等都督府比來注擬土人簡擇未精自今每四年遣五品已上清正官充使仍令御史同往注擬時人謂之南選黔音琴比毗至翻使疏吏翻令力丁翻選須絹翻上元二年九月壬申大理奏左威衛大將軍權善才左監門中郎將范懷義誤斫昭陵柏罪當除名監古銜翻將即亮翻上特命殺之大理丞太原狄仁傑奏二人罪不當死太原漢晉陽縣隋改為太原縣而以後齊所置龍山縣為晉陽縣並帶並州善才等斫陵柏我不殺則為不孝仁傑固執不已上作色令出仁傑曰犯顏直諫自古以為難臣以為遇桀紂則難遇堯舜則易易以豉翻今法不至死而陛下特殺之是法不信於人也人何所措其手足且張釋之有言設有盜長陵一抔土陛下何以處之釋之言見十四卷漢文帝三年抔薄侯翻處昌呂翻後代謂陛下為何如矣臣不敢奉詔者恐陷陛下於不道且羞見釋之於地下故也上怒稍解二人除名流嶺南後數日擢仁傑為侍御史初仁傑為並州法曹同僚鄭崇質當使絶域使疏吏翻崇質母老且病仁傑曰彼母如此豈可使之有萬里之憂詣長史藺仁基請代之行長知兩翻藺良刃翻仁基素與司馬李孝廉不叶因相謂曰吾輩豈可不自愧乎遂相與輯睦上元二年冬十月車駕還京師還從宣翻又音如字上元二年丁酉祫享太廟用太學博士史璨議禘後三年而祫祫後二年而禘歐陽修曰禘祫大祭也祫以昭穆合食於太祖而禘以審諦其尊卑此禘祫之義而為禮者失之至於年數不同祖宗失位議者莫知所從禮曰三年一祫五年一禘傳曰五年再殷祭高宗上元三年十月當祫而有司議其年數史璨等議以為新君喪畢而祫明年而禘自是之後五年而再祭蓋後禘去前禘五年而祫常在禘後三年禘常在祫後二年魯宣公八年禘僖公蓋三年喪畢而祫明年而禘至八年而再禘昭公二十年禘至二十五年又禘此可知也時以其言有經據遂從之唐制國子博士正五品上掌教文武官二品已上國公子孫二品已上曾孫為生者太學博士正六品上掌教文武官五品已上郡縣公子孫從三品曾孫之為生者祫胡夾翻璨倉按翻禘大計翻上元二年郇王素節蕭淑之子也郇音荀警敏好學天后惡之好呼到翻惡烏路翻自岐州刺史左遷申州刺史申州漢平氏鄳縣地晉分置義陽郡南齊置司州後魏改郢州後周改申州隋改義州唐復曰申州岐州在京師西三百一十五里至東都一千一百七十里申州至京師一千七百九十六里東都九百四十三里敕曰素節既有舊疾不須入朝朝直遙翻而素節實無疾自以久不得入覲乃著忠孝論王府倉曹參軍張柬之因使潛封其論以進后見之誣以贓賄丙午降封鄱陽王袁州安置柬之封論以進欲以感動帝心豈知適所以速素節之罪乎袁州在京師東南三千五百八十里至東都二千一百六十一里上元二年十一月壬申改元赦天下上元二年庚寅以李敬玄為中書令上元二年十二月戊午以來恆為河南道大使薛元超為河北道大使尚書左丞鄢陵崔知悌國子司業鄭祖玄為江南道大使隋大業三年始置國子司業唐從四品下所職與祭酒同使疏吏翻鄢謁晚翻又於建翻又音偃二年上元二年春正月乙亥上耕藉田上元二年初劉仁軌引兵自熊津還見上卷麟德二年不敢留尋亦還朝朝直遙翻二月丁巳以工部尚書高藏為遼東州都督封朝鮮王朝音潮鮮音仙遣歸遼東安輯高麗餘衆高麗先在諸州者皆遣與藏俱歸又以司農卿扶餘隆為熊津都督封帶方王亦遣歸安輯百濟餘衆仍移安東都護府於新城以統之去年春移安東都護府於遼東故城今又移於新城統他綜翻命隆寓居高麗之境藏至遼東謀叛潛與靺鞨通召還徙邛州而死麗力知翻還從宣翻又音如字靺鞨音末曷邛渠容翻散徙其人於河南隴右諸州貧者留安東城傍高麗舊城沒於新羅餘衆散入靺鞨及突厥厥九勿翻隆亦竟不敢還故地高氏扶餘氏遂亡上元二年三月癸亥朔以郝處俊高智周並為左庶子李義琰為右庶子郝呼各翻處昌呂翻唐制東宮左右庶子各二員夏四月左庶子張大安同中書門下三品大安公謹之子也張公謹太宗朝功臣上元二年詔以河南北旱遣御史中丞崔謐等分道存問賑給侍御史寧陵劉思立上疏寧陵縣漢屬陳留郡曹魏至元魏屬譙郡後齊廢隋開皇六年復置屬宋州賑津忍翻上時掌翻疏所據翻今麥秀蠶老農事方殷敕使撫巡人皆竦抃忘其家業冀此天恩聚集參迎妨廢不少使疏吏翻少詩沼翻既緣賑給須立簿書本欲安存更成煩擾望且委州縣賑給待秋務間出使褒貶疏奏謐等遂不行使疏吏翻上元二年五月吐蕃寇扶州之臨河鎮擒鎮將杜孝升令齎書説松州都督武居寂使降孝升固執不從吐蕃軍還捨孝升而去孝升復帥餘衆拒守吐從暾入聲將即亮翻説輸芮翻降戶江翻復扶又翻帥讀曰率晉官品令遊擊將軍第四品唐從五品下上元二年秋八月徙周王顯為英王更名哲更工衡翻上元二年命劉仁軌鎮洮河軍鄯州城內有臨洮軍洮土刀翻十二月乙卯詔大發兵討吐蕃上元二年詔以顯慶新禮多不師古顯慶三年行新禮見二百卷自是禮官益無憑守每有大禮臨時撰定撰士免翻三年上元三年春正月辛酉百官及蠻夷酋長朝天后于光順門酋慈由翻長知兩翻朝直遙翻上元三年劉仁軌鎮洮河每有奏請多為李敬玄所抑由是怨之仁軌知敬玄非將帥才欲中傷之仁軌以私怨奏用敬玄以至敗國殄民矯情以容袁異式挾怨以陷李敬玄得為賢乎將即亮翻帥所類翻中竹仲翻奏言西邊鎮守非敬玄不可敬玄固辭上曰仁軌須朕朕亦自往卿安得辭丙子以敬玄代仁軌為洮河道大總管兼安撫大使仍檢校鄯州都督使疏吏翻鄯時戰翻考異曰實録云與仁軌相知鎮守而敬玄之敗仁軌不預新舊傳皆云以代仁軌今從之又命益州大都督府長史李孝逸等發劍南山南兵以赴之孝逸神通之子也淮安王神通癸未遣金吾將軍曹懷舜等分往河南北募猛士不問布衣及仕宦上元三年夏四月戊申赦天下改來年元為通乾上元三年五月壬戌上幸九成宮丙寅山中雨大寒從兵有凍死者從才用翻上元三年秋七月李敬玄奏破吐蕃於龍支龍支縣屬鄯州漢允吾縣地後漢改為龍耆縣後魏改為金城縣又改為龍支積石山在今縣南上元三年上初即位不忍觀破陳樂命撤之辛酉太常少卿韋萬石奏久寢不作懼成廢缺請自今大宴會復奏之上從之陳讀曰陳少詩照翻復扶又翻又如字上元三年九月辛酉車駕還京師上元三年上將發兵討新羅侍中張文瓘臥疾在家自輿入見見賢遍翻諫曰今吐蕃為寇方發兵西討新羅雖云不順未嘗犯邊若又東征臣恐公私不勝其弊上乃止勝音升癸亥文瓘薨上元三年丙寅李敬玄將兵十八萬與吐蕃將論欽陵戰於青海之上將即亮翻下同兵敗工部尚書右衛大將軍彭城僖公劉審禮為吐蕃所虜諡法剛克曰僖又小心畏忌曰僖又戴記有伐有還曰僖頓于濠所為虜所攻敬玄懦怯按兵不救聞審禮戰沒狼狽還走頓于承風嶺杜佑曰承風嶺在廓州廣威縣西南東北去鄯州三百一十三里故吐谷渾界虜屯兵高岡以壓之左領軍員外將軍黑齒常之夜帥敢死之士五百人襲擊虜營虜衆潰亂其將跋地設引兵遁去帥讀曰率將即亮翻敬玄乃收餘衆還鄯州考異曰朝野僉載曰中書令李敬玄為元帥吐蕃至樹敦城聞劉尚書沒蕃著鞾不得狼狽而走遺卻麥飯首尾千里地上尺餘言之太過今不取審禮諸子自縛詣闕請入吐蕃贖其父敕聽次子易從詣吐蕃省之比至審禮已病卒易以豉翻省悉景翻比必利翻卒子恤翻考異曰新本紀審禮死之按舊傳審禮永隆二年卒于蕃中新紀誤也今終言之易從晝夜號哭不絶聲號戶高翻吐蕃哀之還其尸易從徒跣負之以歸上嘉黑齒常之之功擢拜左武衛將軍充河源軍副使杜佑曰河源軍在鄯州西一百二十里使疏吏翻下同李敬玄之西征也監察御史原武婁師德應猛士詔從軍時詔募猛士以討吐蕃師德應募從軍監古銜翻敕師德收集散亡軍乃復振復扶又翻又如字因命使于吐蕃吐蕃將論贊婆迎之赤嶺宋白曰石堡城西三十里有山土石皆赤北接大山南連小雪山號曰赤嶺去長安三千五百里自鄯州鄯城縣西行二百里至赤嶺將即亮翻諭以禍福贊婆甚悅為之數年不犯邊為于偽翻師德遷殿中侍御史充河源軍司馬考異曰御史臺記充河源軍使今從舊傳上以吐蕃為憂悉召侍臣謀之或欲和親以息民或欲嚴設守備俟公私富實而討之或欲亟發兵擊之議竟不決賜食而遣之太學生宋城魏元忠上封事宋城縣帶宋州舊睢陽縣也隋開皇十八年更名上時掌翻以為理國之要在文與武今言文者則以辭華為首而不及經綸言武者則以騎射為先而不及方略騎奇寄翻是皆何益於理亂哉故陸機著辨亡之論無救河橋之敗陸機痛吳之亡著辨亡論迹吳之所以興及其所以亡其論甚悉河橋之敗見八十五卷晉惠帝太安二年不濟鄢陵之師左傳晉楚遇於鄢陵楚大夫養由基潘黨蹲甲而射之徹七札焉以示楚共王曰君有二臣何憂於戰王怒曰大辱國詰朝爾射死藝及戰楚師敗杜預曰濟益也古語有之人無常俗政有理亂兵無強弱將有巧拙故選將當以智略為本勇力為末今朝廷用人類取將門子弟及死事之家將即亮翻下同彼皆庸人豈足當閫外之任李左車陳湯呂蒙孟觀皆出貧賤而立殊功李左車見十卷漢高帝三年陳湯見二十九卷元帝建昭三年呂蒙見獻帝紀六十五卷至六十八卷孟觀見八十三卷晉惠帝元康九年夫賞罰者軍國之切務苟有功不賞有罪不誅雖堯舜不能以致理議者皆云近日征伐虛有賞格而無事實蓋由小才之吏不知大體徒惜勳庸恐虛倉庫不知士不用命所損幾何黔首雖微不可欺罔豈得懸不信之令設虛賞之科而望其立功乎自蘇定方征遼東見二百卷龍朔元年二年見上卷總章元年勳仍淹滯不聞斬一臺郎戮一令史以謝勳人尚書諸曹郎皆謂之臺郎勳轉淹滯則司勳之責耳司勳令史三十三人薛仁貴郭待封等不即重誅見上卷咸亨元年即就也則自餘諸將豈敢失利於後哉臣恐吐蕃之平非旦夕可冀也又出師之要全資馬力臣請開畜馬之禁使百姓皆得畜馬畜吁玉翻若官軍大舉委州縣長吏以官錢增價市之則皆為官有彼胡虜恃馬力以為強若聽人間市而畜之乃是損彼之強為中國之利也先是禁百姓畜馬長知兩翻畜吁玉翻先悉薦翻故元忠言之上善其言召見令直中書省仗內供奉仗內供奉朝會得隨百官入見上元三年冬十月丙午徐州刺史密貞王元曉薨上元三年十一月壬子黃門侍郎同中書門下三品來恆薨恆戶登翻上元三年十二月詔停來年通乾之號以反語不善故也通乾反語為天窮調露元年己卯六七九按會要是年六月十三日方改元調露上元三年春正月己酉上幸東都司農卿韋弘機作宿羽高山上陽等宮按六典宿羽高山二宮皆在東都禁苑中上陽宮臨洛水為長廊亙一里宮成上徙御之侍御史狄仁傑劾奏弘機導上為奢泰弘機坐免官劾戶概翻又戶得翻考異曰舊傳云儀鳳中機坐家人犯盜為憲司所劾免官狄仁傑傳云時司農卿韋機兼領將作少府造宿羽高山上陽等宮莫不壯麗仁傑奏其太過機竟坐免官統紀云駕幸東都上遊韋弘機所造宿羽高山等宮乘高臨深有登眺之美乃敕弘機造高館及成臨幸即上陽宮也今據實録營宮在前左司郎中王本立隋煬帝大業三年尚書都司始置左右司郎各一人掌都省之職唐置左右司郎中各掌付十有二司之事以舉正稽違省署符目朝廷畏之仁傑奏其姦請付法司上特原之仁傑曰國家雖乏英才豈少本立輦少詩沼翻陛下何惜罪人以虧王法必欲曲赦本立請棄臣於無人之境為忠貞將來之戒本立竟得罪考異曰御史臺記曰狄仁傑以司農發太原運句會欠米萬餘斛高宗怒曰仁傑偷我米命殺之吏部侍郎魏玄同曰仁傑健而疏只是句當失所臣委知不偷請以官爵保明久之高宗意解仁傑不坐按仁傑傳未嘗為司農今不取上元三年庚戌右僕射太子賓客道恭公戴至德薨道古國名左傳之江黃道柏是也顯慶元年始置太子賓客四員正三品掌侍從規諫贊相禮儀諡法尊賢讓善曰恭上元三年二月壬戌吐蕃贊普卒子器弩悉弄立生八年矣時器弩悉弄與其舅麴薩若詣羊同發兵羊同西戎國名宋祁載劉元鼎之言曰黃河上流由洪濟橋西南行二千里水益狹春可涉秋夏乃勝舟其南三百里三山中高而四下曰紫山直大羊同國古所謂崑崙者也虜曰悶摩黎山東距長安五千里河源出其間唐會要曰大羊同國東接吐番西接小羊同北直于闐東西千里薩桑割翻在論欽陵軍中國人畏欽陵之強欲立之欽陵不可與薩若共立器弩悉弄上聞贊普卒章十二行本卒下有嗣主未定四字乙十一行本同孔本同張校同命裴行儉乘間圖之卒子恤翻間古莧翻行儉曰欽陵為政大臣輯睦未可圖也乃止上元三年夏四月辛酉郝處俊為侍中上元三年偃師人明崇儼以符呪幻術為上及天后所重呪職救翻幻戶辦翻官至正諫大夫五月壬午崇儼為盜所殺求賊竟不得考異曰御史臺記鄭仁恭本滎陽人也自監察纍遷刑部郎中儀鳳中明崇儼以奇術承恩寵夜遇刺客敕三司亟推鞫妄承引連坐者甚衆高宗怒促有司行刑仁恭奏曰此輩必死之囚願假其數日之命高宗曰卿以為枉邪仁恭曰臣識慮淺短非的以為枉恐萬一非實則怨氣生遂緩之旬餘果獲賊矣朝廷稱之今從實録上元三年丙戌命太子監國監古銜翻太子處事明審處昌呂翻時人稱之上元三年戊戌作紫桂宮於澠池之西紫桂宮在澠池之西五里澠彌兗翻上元三年六月辛亥赦天下改元上元三年初西突厥十姓可汗阿史那都支及其別帥李遮匐與吐蕃連和侵逼安西帥所類翻匐蒲北翻朝議欲發兵討之吏部侍郎裴行儉曰吐蕃為寇審禮覆沒干戈未息豈可復出師西方今波斯王卒其子泥洹師為質在京師波斯為大食所滅其王卑路斯入朝授武衛將軍而死其子為質在京師朝直遙翻復扶又翻卒子恤翻洹戶官翻質音致考異曰實録作泥浬師舊傳作泥湟師唐曆作泥汨師今從統紀使疏吏翻下同道過二虜以便宜取之可不血刃而擒也上從之命行儉册立波斯王過工禾翻考異曰唐紀云波斯王卑路斯入朝未還請遣使送歸今從實録唐曆統紀舊傳仍為安撫大食使行儉奏肅州刺史王方翼以為己副仍令檢校安西都護使疏吏翻令力丁翻上元三年秋七月己卯朔詔以今年冬至有事于嵩山上元三年初裴行儉嘗為西州長史見一百九十九卷永徽五年長知兩翻吏人郊迎行儉悉召其豪傑子弟千餘人自隨且揚言天時方熱未可涉遠須稍涼乃西上上時掌翻阿史那都支覘知之遂不設備覘丑廉翻又丑豔翻行儉徐召四鎮諸胡酋長四鎮龜茲毗沙焉耆疏勒四都督府也酋慈由翻昔在西州縱獵甚樂樂音洛今欲尋舊賞誰能從吾獵者諸胡子弟爭請從行近得萬人行儉陽為畋獵校勒部伍校古效翻遂倍道西進去都支部落十餘里先遣都支所親問其安否外示間暇似非討襲續使促召相見都支先與李遮匐約秋中拒漢使漢家威加四夷故夷人率謂中國人為漢人猶漢時胸奴謂漢人為秦人也使疏吏翻下同計無所出帥其子弟迎謁遂擒之帥讀曰率因傳其契箭悉召諸部酋長夷狄無符信以箭為契信西突厥沙鉢嘻利失可汗分其國為十部部以一人統之人授一箭號十設亦曰十箭左五咄陸部置五大啜居碎葉東右五弩失畢部置五大俟斤居碎葉西簡其精騎輕齎晝夜進掩遮匐途中獲都支還使與遮匐使者同來行儉釋遮匐使者使先往諭遮匐以都支已就擒遮匐亦降騎奇寄翻齎則兮翻匐蒲北翻降戶江翻於是囚都支遮匐以歸遣波斯王自還其國留王方翼於安西使築碎葉城碎葉城焉耆都督府治所也方翼築四面十二門為屈曲隱出伏沒之狀上元三年冬十月單于大都護府突厥阿史德溫傅奉職二部俱反阿史德姓也溫傅其名奉職亦一部酋長之名單音蟬厥九勿翻二十四州酋長皆叛應之衆數十萬置二十四州見一百九十九卷永徽元年何承天姓苑有花姓臚陵如翻單音蟬長知兩翻嗣祥吏翻將兵即亮翻又音如字嗣業等先戰屢捷因不設備會大雪突厥夜襲其營嗣業狼狽拔營走衆遂大亂為虜所敗死者不可勝數厥九勿翻敗補邁翻勝音升大智景嘉引步兵且行且戰得入單于都護府嗣業減死流桂州大智景嘉並免官突厥寇定州刺史霍王元軌命開門偃旗虜疑有伏懼而宵遁州人李嘉運與虜通謀事泄泄息列翻上令元軌窮其黨與元軌曰強寇在境人心不安若多所逮繫是驅之使叛也乃獨殺嘉運餘無所問因自劾違制上覽表大喜謂使者曰朕亦悔之向無王失定州矣劾戶概翻又戶得翻使疏吏翻自是朝廷有大事上多密敕問之朝直遙翻上元三年壬子遣左金吾衛將軍曹懷舜屯井陘井陘縣漢晉後魏皆屬常山郡唐屬恆州陘音刑以備突厥突厥扇誘奚契丹侵掠營州誘羊久翻契欺訖翻又音喫都督周道務遣戶曹始平唐休璟將兵擊破之曹魏置始平縣晉武帝置始平郡後魏廢郡以縣屬扶風隋唐屬雍州上元三年庚申詔以突厥背誕罷封嵩山背蒲妹翻上元三年癸亥吐蕃文成公主遣其大臣論塞調傍來告喪並請和親上遣郎將宋令文詣吐蕃會贊普之葬將即亮翻下管將同上元三年十一月戊寅朔以太子左庶子同中書門下三品高智周為御史大夫罷知政事上元三年癸未上宴裴行儉謂之曰卿有文武兼資今授卿二職乃除禮部尚書兼檢校右衛大將軍甲辰以行儉為定襄道行軍大總管將兵十八萬並西軍檢校豐州都督程務挺東軍幽州都督李文暕暕古限翻總三十餘萬以討突厥並受行儉節度務挺名振之子也程名振為將著功名於貞觀永徽之間永隆元年庚辰六八按會要是年八月二十三日改元永隆上元三年春二月癸丑上幸汝州之溫湯戊午幸嵩山處士三原田遊巖所居處昌呂翻己未幸道士宗城潘師正所居考異曰舊傳師正趙州贊皇人今從實録史言帝崇信異端乙丑還東都上元三年三月裴行儉大破突厥於黑山黑山一名殺胡山在豐州中受降城正北如東八十里亦謂之呼延谷句絶以其首來降降戶江翻初行儉行至朔川考異曰舊傳作朔州今依實録及統紀余按唐朔州治善陽縣漢定襄縣地單于府治金河縣漢雲中郡城也自朔州至單于府三百五十七里以裴行儉軍行次舍考之先至朔州而後至單于府北則舊傳朔州為是用兵之道撫士貴誠制敵貴詐前日蕭嗣業糧運為突厥所掠士卒凍餒故敗今突厥必復為此謀復扶又翻下復為可復同宜有以詐之乃詐為糧車三百乘每車伏壯士五人各持陌刀徑弩陌刀大刀也一舉刀可殺數人唐六典曰陌刀長刀也步兵所持蓋古之斬馬劍釋名曰弩怒也有怒勢也其柄曰臂似人臂也鉤弦者曰牙似牙齒也牙外曰郭為牙之規郭也合名之曰機言如機之巧也亦言如門戶樞機開闔有節也乘繩證翻羸倫為翻且伏精兵於險要以待之虜果至羸兵棄車散走虜驅車就水草解鞍牧馬欲取糧壯士自車中躍出擊之虜驚走復為伏兵所邀殺獲殆盡自是糧運行者虜莫敢近近其靳翻軍至單于府北抵暮下營掘塹已周掘其月翻塹七豔翻行儉遽命移就高岡諸將皆言士卒已安堵不可復動行儉不從趣使移趣讀曰促是夜風雨暴至前所營地水深丈餘深式禁翻諸將驚服問其故行儉笑曰自今但從我命不必問其所由知也奉職既就擒餘黨走保狼山狼山歌邏祿右廂部落所居也永徽元年置狼山州屬雲中都護府且區處餘寇傳知戀翻處昌呂翻行儉引軍還上元三年夏四月乙丑上幸紫桂宮上元三年戊辰黃門侍郎聞喜裴炎崔知溫聞喜縣漢屬河東郡隋以漢聞喜縣為絳縣以漢絳縣為曲沃縣以桐鄉置聞喜縣尋改為桐鄉縣武德元年復曰聞喜屬絳州知溫知悌之弟也上元三年秋七月吐蕃寇河源左武衛將軍黑齒常之擊卻之考異曰實録吐蕃大將贊婆及素和貴等帥衆三萬進寇河源屯兵于良非川辛巳河西鎮撫大使中書令李敬玄統衆與賊戰于湟川官軍敗績副使左武衛將軍黑齒常之帥精騎三千夜襲賊營殺獲二千餘級贊婆等遂退擢常之為河源軍經略大使詔敬玄留鎮鄯州以為之援按儀鳳三年九月敬玄已與吐蕃戰敗于青海常之夜襲賊營賊乃退與此事頗相類舊書敬玄傳止一敗無再敗常之傳儀鳳中從敬玄擊吐蕃走跋地設充河源軍副使時贊婆等屯良非川常之夜襲賊營走之擢為大使事似同時新書敬玄傳戰青海又戰湟川凡再敗常之傳儀鳳三年襲跋地設調露中襲贊婆唐曆統紀皆無今年敬玄敗事又實録今年八月丁巳敬玄貶衡州刺史辛巳至丁巳才三十七日賈耽皇華四達記自長安至鄯州約一千七百餘里時高宗又在東都若敬玄敗後纍表稱疾得報乃來至東都必數日乃貶非三十七日之內所能容也今略去敬玄湟川敗事但云吐蕃寇河源常之擊卻之而已今按劉昫唐書地理志鄯州在京師西一千九百一十三里常之以河源衝要欲加兵戍之而轉輸險遠乃廣置烽戍七十餘所開屯田五千餘頃歲收五百餘萬石由是戰守有備焉先是劍南募兵於茂州西南築安戎城以斷吐蕃通蠻之路宋白曰茂州本冉駹之國漢開為汶山郡華陽國志云宣帝地節三年武都白馬羌反使駱武平定之汶山吏民詣武自訟一歲再度更賦至重邊人貧苦無以供給求省郡遂省汶山郡復置都尉今州即漢蜀郡汶江縣梁普通三年置繩州取桃關之路以繩作橋以名州後周為汶州置汶山縣唐改茂州取界內茂滋山而名先悉薦翻斷丁管翻鄉讀曰嚮攻陷其城以兵據之由是西洱諸蠻皆降於吐蕃洱而志翻降戶江翻吐蕃盡據羊同黨項及諸羌之地東接涼松茂巂等州南鄰天竺西陷龜茲疏勒等四鎮黨底朗翻巂音髓龜茲音丘慈北抵突厥地方萬餘里諸胡之盛莫與為比上元三年丙申鄭州刺史江王元祥薨鄭州漢滎陽縣地漢滎陽屬河南郡晉分為滎陽郡後魏屬北豫州後置鄭州隋開皇十六年改曰管州大業初復曰鄭州上元三年突厥餘衆圍雲州雲州漢平城縣地後魏為代都北齊及後周為恆安鎮貞觀七年置雲州及定襄縣哲與哲同將即亮翻上元三年八月丁未上還東都上元三年中書令檢校鄯州都督李敬玄軍既敗屢稱疾請還上許之既至無疾詣中書視事上怒丁巳貶衡州刺史衡州漢酃縣蒸陽耒陽茶陵縣地吳置湘東郡梁陳置衡山郡隋平陳置衡州京師東南三千四百三里至東都二千七百六十里上元三年太子賢聞宮中竊議以賢為天后姊韓國夫人所生內自疑懼明崇儼以厭勝之術為天后所信厭於葉翻常密稱太子不堪承繼英王貌類太宗又言相王相最貴相悉亮翻天后嘗命北門學士撰少陽正範顏延之曲水詩序曰正體育德於少陽注云東宮少陽位也少詩照翻傳直戀翻又數作書誚讓之數所角翻誚才笑翻太子愈不自安及崇儼死賊不得天后疑太子所為太子頗好聲色與戶奴趙道生等狎昵好呼到翻昵尼質翻多賜之金帛司議郎韋承慶上書諫不聽上時掌翻天后使人告其事詔薛元超裴炎與御史大夫高智周等雜鞫之於東宮馬坊搜得皂甲數百領以為反具道生又款稱太子使道生殺崇儼上素愛太子遲回欲宥之天后曰為人子懷逆謀天地所不容大義滅親何可赦也甲子廢太子賢為庶人遣右監門中郎將令狐智通等送賢詣京師監古銜翻將即亮翻幽於別所黨與皆伏誅仍焚其甲於天津橋南以示士民劉昫曰東都周之王城平王東遷所都也故城在今苑內東北隅自赧王以後及東漢魏文晉武皆都於今故洛城隋大業元年自故洛城西移十八里置新都今都城是也北據邙山南對伊闕洛水貫都有河漢之象跨洛為橋曰天津橋唐世人主往來東都西京而實都長安以長安為京師思謙之子也韋思謙見一百九十九卷永徽元年乙丑立左衛大將軍雍州牧英王哲為皇太子雍於用翻改元赦天下太子洗馬劉訥言常撰俳諧集以獻賢賢敗搜得之上怒曰以六經教人猶恐不化乃進俳諧鄙説豈輔導之義邪流訥言於振州舊志振州與崖州同在大海洲中至京師八千六百六里至東都七千七百九十七里洗悉薦翻撰士免翻俳蒲皆翻考異曰新傳云除名為民復坐事流死振州今從實録左衛將軍高真行之子政為太子典膳丞事與賢連上以付其父使自訓責政入門真行以佩刀刺其喉真行兄戶部侍郎審行又刺其腹真行兄子琁斷其首棄之道中刺七亦翻琁從宣翻斷丁管翻上聞之不悅貶真行為睦州刺史審行為渝州刺史真行士廉之子也舊志睦州京師東南三千六百五十九里至東都二千八百二十一里渝州漢末之巴東郡隋置渝州京師西南二千七百四十八里至東都三千四百三十里高士廉長孫無忌之舅左庶子中章十二行本中上有同字乙十一行本同孔本同書門下三品張大安坐阿附太子左遷普州刺史舊志普州至京師二千三百六十里至東都三千二百三里上皆釋其罪使復位左庶子薛元超等皆舞蹈拜恩右庶子李義琰獨引咎涕泣時論美之上元三年九月甲申以中書侍郎同中書門下三品王德真為相王府長史罷政事唐制王府置長史司馬長史從四品上司馬從四品下長史司馬統領府僚紀綱職務相悉亮翻上元三年冬十月壬寅蘇州刺史曹王明蘇州古吳國東漢為吳郡隋置蘇州因姑蘇山而名沂州漢琅邪國後魏置北徐州後周改沂州以沂水名隋為琅邪郡唐復以琅邪郡置沂州煒于鬼翻明降封零陵郡王黔州安置煒除名道州安置道州漢零陵郡泠道馮乘之地隋以零陵郡置永州武德四年分置營州貞觀八年改曰道州舊志黔州京師南三千一百九十三里至東都二千二百七十七里上元三年丙午文成公主薨于吐蕃上元三年己酉車駕西還上元三年十一月壬申朔日有食之開耀元年辛巳六八一是年十月方改元新書作九月上元三年春正月突厥寇原慶等州乙亥遣右衛將軍李知十等屯涇慶二州以備突厥上元三年庚辰以初立太子敕宴百官及命婦於宣政殿西京東內正殿曰含元後殿曰宣政杜佑曰散樂即百戲也伎渠綺翻散悉亶翻以為正寢非命婦宴會之地路門非倡優進御之所上時掌翻倡音昌請命婦會於別殿九部伎自東西門入其散樂伏望停省上乃更命置宴於麟德殿麟德殿麟德中所作也閣本大明宮圖翰林院密邇麟德殿韋執誼曰翰林院在右銀臺門內麟德殿在西重廊之後更工衡翻賜利貞帛百段利貞昂之曾孫也利貞族孫誼為蘇州刺史自以其先自宋太尉淑以來盡忠帝室袁淑死於宋元凶之難袁顗以死奉子勛袁昂盡節於齊室袁憲盡忠於陳後主而為歷代佐命琅邪王氏股肱晉室而王弘為宋室佐命王儉為齊室佐命梁室之興侯景之篡王亮王克為勸進之首嘗曰所貴於名家者為其世篤忠貞才行相繼故也為于偽翻行下孟翻彼鬻婚姻求祿利者又烏足貴乎時人是其言因袁利貞併著袁誼之言以其有益於名教也上元三年裴行儉軍既還突厥阿史那伏念復自立為可汗復扶又翻杜佑曰伏念頡利從兄之子與阿史德溫傅連兵為寇癸巳以行儉為定襄道大總管以右武衛將軍曹懷舜幽州都督李文暕為副將兵討之暕古限翻將即亮翻上元三年二月天后表請赦王上金鄱陽王素節之罪以上金為沔州刺史沔州漢安陸之地晉置沔陽縣江左為魯山鎮隋開皇十七年置漢陽縣屬復州復州治沔陽大業初改復州曰沔州唐復以沔州為復州分漢陽置沔州嶽州漢下雋縣地吳置巴陵縣晉置建昌郡梁置巴州隋改曰嶽州因天嶽山以名州大業初改羅州唐復曰嶽州舊志嶽州京師東南二千二百三十七里至東都一千八百一十六里朝直遙翻上元三年三月辛卯以劉仁軌兼太子少傅餘如故仁軌先為尚書左僕射同中書門下三品罷政事少府監裴匪舒善營利少詩照翻奏賣苑中馬糞歲得錢二十萬緡上以問劉仁軌對曰利則厚矣恐後代稱唐家賣馬糞非嘉名也乃止匪舒又為上造鏡殿成為于偽翻上與仁軌觀之仁軌驚趨下殿上問其故對曰天無二日土無二王孟子載孔子之言不祥孰甚焉上遽令剔去去羌呂翻上元三年曹懷舜與裨將竇義昭將前軍擊突厥將即亮翻下同又音如字或告阿史那伏念與阿史德溫傅在黑沙章十二行本沙下有北字乙十一行本同孔本同黑沙城後突厥默啜以為南庭左右才二十騎以下可徑往取也騎奇寄翻懷舜等信之留老弱於瓠蘆泊水白為泊至黑沙無所見人馬疲頓乃引兵還會薛延陀部落欲西詣伏念遇懷舜軍因請降帥讀曰率降戶江翻懷舜等引兵徐還至長城北遇溫傅小戰各引去至橫水橫水去金河一百四十許里懷舜義昭與李文暕及裨將劉敬同四軍合為方陳陳讀曰陳且戰且行經一日伏念乘便風擊之軍中擾亂懷舜等棄軍走軍遂大敗死者不可勝數勝音升懷舜等收散卒斂金帛以賂伏念與之約和殺牛為盟伏念北去懷舜等乃得還還從宣翻又音如字夏五月丙戌懷舜免死流嶺南上元三年己丑河源道經略大使黑齒常之將兵擊吐蕃論贊婆於良非川破之收其糧畜而還畜許救翻常之在軍七年吐蕃深畏之不敢犯邊上元三年初太原王之薨也武士彠封太原王從其爵咸亨元年薨公主天后女也請尚太平公主上乃為立太平觀以公主為觀主以拒之為于偽翻觀古玩翻至是始選光祿卿汾陰薛曜之子紹尚焉紹母太宗女城陽公主也據會要城陽公主先降杜荷荷誅降薛瓘新書亦然秋七月公主適薛氏自興安門南至宣陽坊西燎炬相屬自興安門而南歷三坊至宣陽坊萬年縣治在焉屬之欲翻紹兄顗以公主寵盛深憂之顗魚豈翻以問族祖戶部郎中克構唐戶部郎掌分理戶口井田之事凡天下十道任土所出為貢賦之差帝甥尚主國家故事苟以恭慎行之亦何傷然諺曰娶婦得公主無事取官府不得不為之懼也天后以顗妻蕭氏及顗弟緒妻成氏非貴族欲出之曰我女豈可使與田舍女為妯娌邪為于偽翻妯直六翻娌兩耳翻妯娌娣姒婦也或曰蕭氏瑀之姪孫國家舊姻蕭瑀子鋭尚太宗女襄城公主上元三年夏州㣥牧使安元壽奏自調露元年九月以來喪馬一十八萬餘匹監牧吏卒為虜所殺掠者八百餘人夏戶雅翻使疏吏翻喪息浪翻唐諸牧監掌㣥牧孳課之事凡諸㣥牧立南北東西四使以分統之其馬皆印每歲終監牧使巡按孳數以功過相除為之考課此止夏州所喪失之數上元三年薛延陀達渾等五州四萬餘帳來降達渾都督領姑衍州步訖若州溪彈州鶻州低粟州降戶江翻上元三年甲午左僕射兼太子少傅同中書門下三品劉仁軌固請解僕射許之上元三年閏七月丁未裴炎為侍中崔知溫薛元超並守中書令上元三年上徵田遊巖為太子洗馬在東宮無所規益右衛副率蔣儼右衛副率從四品上洗悉薦翻率所律翻足下負巢由之俊節傲唐虞之聖主聲出區宇名流海內主上屈萬乘之重申三顧之榮三顧用諸葛亮事上幸嵩山嘗至遊巖所居故云然乘繩證翻漢四皓隱於商山將以輔導儲二漸染芝蘭耳漸子廉翻皇太子春秋鼎盛聖道未周僕以不才猶參庭諍足下受調護之寄漢高帝謂四皓曰煩公卒調護太子唯唯而無一談悠悠以卒年歲唯于癸翻卒子恤翻向使不餐周粟夷齊採薇西山不食周粟餐千安翻祿及親矣以何酬塞遊巖有母塞悉則翻謹書起豫孔子謂子夏曰起豫者商也為于偽翻上元三年庚申上以服餌令太子監國監古銜翻上元三年裴行儉軍于代州之陘口即鴈門之陘嶺關口陘音刑由是阿史那伏念與阿史德溫傅浸相猜二伏念留妻子輜重於金牙山突厥之初建牙於金山其後分為東西突厥凡建牙之地率謂之金牙山蘇定方直抵金牙山擒賀魯此西突厥可汗所居之金牙山也裴行儉遣程務挺等掩金牙山取伏念妻子此東突厥可汗所居之金牙山也可汗所居謂之金帳故亦以金牙言之間古莧翻下同重直龍翻下同行儉遣裨將何迦密自通漠道程務挺自石地道掩取之騎奇寄翻將即亮翻下同迦居牙翻又居伽翻伏念與曹懷舜約和而還比至金牙山還從宣翻比必利翻失其妻子輜重士卒多疾疫乃引兵北走細沙行儉又使副總管劉敬同程務挺等將單于府兵追躡之伏念請執溫傅以自效然尚猶豫又自恃道遠唐兵必不能至不復設備走音奏躡泥輒翻復扶又翻單音蟬敬同等軍到伏念狼狽不能整其衆遂執溫傅從間道詣行儉降候騎告以塵埃漲天而至將士皆震恐行儉曰此乃伏念執溫傅來降非他盜也然受降如受敵不可無備乃命嚴備遣單使迎前勞之少選間古莧翻降戶江翻下同騎奇寄翻使疏吏翻勞力到翻少選猶言少頃也伏念果帥酋長縛溫傅詣軍門請罪帥讀曰率酋慈由翻長知兩翻行儉盡平突厥餘黨以伏念溫傅歸京師厥九勿翻上元三年冬十月丙寅朔日有食之上元三年壬戌裴行儉等獻定襄之俘乙丑改元改元開耀丙寅斬阿史那伏念阿史德溫傅等五十四人於都市既書十月丙寅朔日食方書壬戌裴行儉獻俘乙丑改元又書丙寅斬阿史那伏念等是十月一月內有二丙寅矣此舊史之誤通鑑因之失於檢點也新書是年九月乙丑改元蓋壬戌獻俘亦九月事前年命行儉為定襄道行軍大總管以討突厥故曰獻定襄之俘初行儉許伏念以不死故降裴炎疾行儉之功奏言伏念為副將張虔勗程務挺所逼又回紇等自磧北南向逼之窮窘而降耳紇下沒翻磧七迹翻遂誅之行儉歎曰渾濬爭功事見八十一卷晉武帝太康元年言若爭伏念之死則是與張虔勗程務挺爭功但恐殺降無復來者復扶又翻因稱疾不出上元三年丁亥新羅王法敏卒卒子恤翻遣使立其子政明上元三年十一月癸卯徙故太子賢於巴州舊志巴州至京師二千三百六十里東都二千五百八十二里王崇武標點容肇祖聶崇岐覆校
