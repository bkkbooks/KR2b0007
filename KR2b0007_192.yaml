body:
  text: 資治通鑑卷第一百九十二端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀八高祖神堯大聖光孝皇帝下之下武德九年武德九年丙戌六二六武德九年九月突厥頡利獻馬三千匹羊萬口上不受自是年八月甲子以後凡稱上者皆太宗也厥九勿翻徵溫彥博還朝彥博沒於突厥見上卷八年朝直遙翻丁未上引諸衛將卒習射於顯德殿庭是年八月上即位於東宮顯德殿是後常御之將即亮翻下同戎狄侵盜自古有之患在邊境少安則人主逸遊忘戰少詩照翻下同是以寇來莫之能禦今朕不使汝曹穿池築苑專習弓矢居閒無事則為汝師突厥入寇則為汝將庶幾中國之民可以少安乎將即亮翻幾居希翻少始紹翻於是日引數百人教射於殿庭上親臨試中多者賞以弓刀帛其將帥亦加上考唐考功之法上中下皆分三等中多之中竹仲翻帥所類翻於律以兵刃至御在所者絞今使卑碎之人張弓挾矢於軒陛之側陛下親在其間萬一有狂夫竊發出於不意非所以重社稷也韓州刺史封同人詐乘驛馬入朝切諫唐舊志武德三年分同州之河西韓城郃陽置西韓州又於陝州界置南韓州封同人當是自韓城乘驛入朝也曰王者視四海如一家封域之內皆朕赤子朕一一推心置其腹中奈何宿衛之士亦加猜忌乎由是人思自勵數年之間悉為精鋭上嘗言吾自少經略四方頗知用兵之要少詩照翻每觀敵陳則知其強弱陳讀曰陳下其陳同常以吾弱當其強強當其弱彼乘吾弱逐奔不過數十百步吾乘其弱必出其陳後反擊之無不潰敗所以取勝多在此也武德九年己酉上面定勳臣長孫無忌等爵邑長知兩翻命陳叔達於殿下唱名示之且曰朕敍卿等勳賞或未當宜各自言當丁浪翻於是諸將爭功紛紜不已將即亮翻淮安王神通曰臣舉兵關西首應義旗事見一百八十四卷隋恭帝義寧元年功居臣上臣竊不服上曰義旗初起叔父雖首唱舉兵蓋亦自營脫禍及竇建德吞噬山東叔父全軍覆沒事見一百八十八卷武德二年叔父望風奔北事見一百八十九卷四年坐安社稷論功行賞固宜居叔父之先叔父國之至親朕誠無所愛但不可以私恩濫與勳臣同賞耳諸將乃相謂曰陛下至公雖淮安王尚無所私吾儕何敢不安其分遂皆悅服儕士皆翻分扶問翻房玄齡嘗言秦府舊人未遷官者皆嗟怨曰吾屬奉事左右幾何年矣今除官返出前宮齊府人之後上曰王者至公無私故能服天下之心朕與卿輩日所衣食皆取諸民者也故設官分職以為民也為于僞翻當擇賢才而用之豈以新舊為先後哉必也新而賢舊而不肖安可捨新而取舊乎今不論其賢不肖而直言嗟怨豈為政之體乎武德九年詔民間不得妄立妖祠妖於驕翻自非卜筮正術其餘雜占悉從禁絶武德九年上於弘文殿聚四部書二十餘萬卷歐陽修曰歷代盛衰文章與時高下然其變態百出不可窮極何其多也自漢以來史官列其名氏篇第以為六藝七略至唐始分為四類曰經史子集以甲乙丙丁為次謂之四庫書亦曰四部書唐會要武德四年於門下省置修文館至九年三月改為弘文館至其年九月太宗即位於弘文殿聚四部書二十餘萬卷於殿側置弘文館貞觀三年移於納義門西按閣本太極宮圖弘文館在門下省東而不載弘文殿納義門在嘉德門之西即我朝之崇文館也避宣祖諱改弘為崇以本官兼學士令更日宿直聽朝之隙引入內殿講論前言往行商榷政事或至夜分乃罷唐太宗以武定禍亂出入行間與之俱者皆西北驍武之士至天下既定精選弘文館學生日夕與之議論商榷者皆東南儒生也然則欲守成者捨儒何以哉更工衡翻朝直遙翻行下孟翻榷訖嶽翻章十二行本士作生乙十一行本同孔本同武德九年冬十月丙辰朔日有食之武德九年詔追封故太子建成為息王諡曰隱齊王元吉為刺章十二行本剌作海陵二字王下有諡曰剌三字乙十一行本同孔本同退齊校同王息古國名諡法隱拂不成曰隱不思忘愛曰剌暴戾無親曰剌諡神至翻剌盧達翻葬日上哭之於宜秋門甚哀太極宮圖宜秋門在千秋殿之西百福門之東考異曰高祖實録建成元吉傳太宗踐阼改葬加諡太宗實録及本紀皆不書葬月日唯唐曆在此年十月貞觀政要此表在二年據此年七月魏徵為諫議大夫宣慰山東王圭亦未為黃門侍郎葬建成元吉恐在後但別無年月日可附今且從唐曆命宮府舊僚皆送葬武德九年癸亥立皇子中山王承乾為太子生八年矣生於承乾殿因以名之武德九年庚辰初定功臣實封有差唐爵九等一曰王食邑萬戶正一品二曰嗣王郡王食邑五千戶從一品三曰國公食邑三千戶從一品四曰開國郡公食邑二千戶正二品五曰開國縣公食邑千五百戶從二品六曰開國縣侯食邑千戶從三品七曰開國縣伯食邑七百戶正四品上八曰開國縣子食邑五百戶正五品上九曰開國縣男食邑三百戶從五品上凡封戶三丁以上為率歲租三之一入于朝廷食實封者得真戶分食諸州武德九年初蕭瑀薦封德彞於上皇上皇以為中書令及上即位瑀為左僕射德彞為右僕射議事已定德彞數反章十二行本反下有之字乙十一行本同孔本同張校同退齊校同於上前瑀音禹射寅謝翻數所角翻由是有隙時房玄齡杜如晦新用事皆疏瑀而親德彞太宗初政之時以房杜之賢蕭瑀之直而不相親乃親封德彞者蓋以瑀之疏直難與共事於危疑之時而封德彞之狡數不與之親密則不能得其情也後之為相者其心無所權量但曰親君子遠小人未有能濟者也遂上封事論之上時掌翻辭指寥落由是忤旨忤五故翻會瑀與陳叔達忿爭於上前庚辰瑀叔達皆坐不敬免官考異曰舊傳太宗以玄齡等功高由是忤旨廢于家俄拜少師復為左僕射坐與叔達忿爭免按實録忿爭在作少師前今從之武德九年甲申民部尚書裴矩奏民遭突厥暴踐者厥九勿翻踐慈演翻請戶給絹一匹上曰朕以誠信御下不欲虛有存恤之名而無其實戶有大小豈得雷同給賜乎於是計口為率武德九年初上皇欲強宗室以鎮天下故皇再從三從弟同曾祖為再從兄弟同高祖為三從兄弟從才用翻雖童孺皆為王王者數十人封宗室為郡王見一百九十卷五年遍封宗子於天下利乎從千容翻封德彞對曰前世唯皇子及兄弟乃為王自餘非有大功無為王者上皇敦睦九族大封宗室自兩漢以來未有如今之多者爵命既崇多給力役力役蓋防閣庶僕白直之類上曰然朕為天子所以養百姓也豈可勞百姓以養己之宗族乎十一月庚寅降宗室郡王皆為縣公惟有功者數人不降武德九年丙午上與㣥臣論止盜或請重法以禁之上哂之笑不壞顏為哂哂式忍翻民之所以為盜者由賦繁役重官吏貪求飢寒切身故不暇顧廉恥耳朕當去奢省費去羌呂翻輕徭薄賦選用廉吏使民衣食有餘則自不為盜安用重法邪邪音耶自是數年之後海內升平路不拾遺外戶不閉商旅野宿焉上又嘗謂侍臣曰君依於國國依於民刻民以奉君猶割肉以充腹腹飽而身斃君富而國亡故人君之患不自外來常由身出夫欲盛則費廣費廣則賦重賦重則民愁民愁則國危國危則君喪矣夫音扶喪息浪翻朕常以此思之故不敢縱欲也武德九年十二月己巳益州大都督竇軌奏稱獠反是年六月廢大行臺置大都督府是後分諸州都督府為上中下三等大州都督從二品長史從三品司馬從四品中州都督正三品別駕正四品長史正五品上司馬正五品下下州都督從三品別駕長史司馬亦皆遞降一品獠魯皓翻上曰獠依阻山林時出鼠竊乃其常俗牧守苟能撫以恩信自然帥服守式又翻帥與率同安可輕動干戈漁獵其民比之禽獸豈為民父母之意邪邪音耶竟不許武德九年上謂裴寂曰比多上書言事者比毗志翻朕皆粘之屋壁粘女廉翻得出入省覽省悉景翻每思治道或深夜方寢公輩亦當恪勤職業副朕此意上厲精求治數引魏徵入臥內訪以得失治直吏翻數所角翻下者數同徵知無不言上皆欣然嘉納上遣使點兵使疏吏翻封德彞奏中男雖未十八其軀幹壯大者亦可並點唐制民年十六為中男十八始成丁二十一為丁充力役敕出魏徵固執以為不可不肯署敕按唐制中書舍人則署敕魏徵時為諫議大夫抑太宗亦使之連署邪上怒召而讓之曰中男壯大者乃姦民詐妄以避征役取之何害而卿固執至此對曰夫兵在御之得其道不在衆多陛下取其壯健以道御之足以無敵於天下何必多取細弱以增虛數乎且陛下每云吾以誠信御天下欲使臣民皆無欺詐今即位未幾失信者數矣幾居豈翻數所角翻上愕然曰朕何為失信對曰陛下初即位下詔云逋負官物悉令蠲免蠲圭淵翻有司以為負秦府國司者非官物徵督如故陛下以秦王升為天子國司之物非官物而何又曰關中免二年租調關外給復一年既而繼有敕云已役已輸者以來年為始散還之後方復更徵調徒弔翻給復方目翻方復扶又翻下復點同言既散還其已輸之物而復徵之百姓固已不能無怪今既徵得物復點為兵何謂以來年為始乎又陛下所與共治天下者在於守宰治直之翻守式又翻居常簡閲咸以委之至於點兵獨疑其詐豈所謂以誠信為治乎治直吏翻下同上悅曰嚮者朕以卿固執疑卿不達政事今卿論國家大體誠盡其精要夫號令不信則民不知所從天下何由而治乎夫音扶治直吏翻下同朕過深矣乃不點中男賜徵金甕一上聞景州録事參軍張玄素名景州漢平原郡鬲縣地隋置弓高縣屬觀州唐平河北分弓高置景州上州録事參軍從七品上掌勾稽省署抄目録事掌受事發辰兼勾稽失問以政道對曰隋主好自專庶務好呼到翻不任㣥臣㣥臣恐懼唯知稟受奉行而已莫之敢違以一人之智決天下之務借使得失相半乖謬已多下諛上蔽不亡何待陛下誠能謹擇㣥臣而分任以事高拱穆清而考其成敗以施刑賞何憂不治又臣觀隋末亂離其欲爭天下者不過十餘人而已其餘皆保鄉黨全妻子以待有道而歸之耳乃知百姓好亂者亦鮮但人主不能安之耳好呼到翻鮮息善翻上善其言擢為侍御史前幽州記室直中書省張蘊古上大寶針唐諸州無記室唯王國有記室參軍從六品上蘊古蓋廬江王瑗督幽州時為記室也唐制資序未至以他官入省者為直上時掌翻聖人受命拯溺亨屯屯陟倫翻故以一人治天下不以天下奉一人又曰壯九重於內所居不過容膝治直之翻重直龍翻彼昏不知瑤其臺而瓊其室羅八珍於前所食不過適口周禮膳夫珍用八物注云珍謂淳熬淳毋炮豚炮牂搗珍漬熬肝膋也淳之純翻毋莫胡翻一音武由翻牂作郎翻膋力雕翻丘其糟而池其酒又曰勿沒沒而暗勿察察而明雖冕旒蔽目而視於未形雖黈纊塞耳而聽於無聲冕而前旒所以蔽明黈纊充耳所以塞聰師古曰以黃帛丿糸為圜用兩組掛之於冕垂兩耳旁示不外聽也黈他口翻塞悉則翻賜以束帛唐制凡賜十段其率絹三匹布三端綿四屯若雜綵十段則絲布二匹紬二匹綾二匹縵四匹若賜蕃客錦綵率十段則錦一張綾二匹縵四匹綿四屯凡時服稱一具者全給之一副者減給之正冬之會稱賜束帛有差者五品已上五匹六品已下二匹命婦視其夫子大理丞正六品掌分判寺事武德九年上召傅奕賜之食謂曰汝前所奏幾為吾禍事見上卷是年六月幾居依翻卿宜盡言皆如此勿以前事為懲也上嘗謂奕曰佛之為教玄妙可師卿何獨不悟其理對曰佛乃胡中桀黠黠戶八翻誑耀彼土中國邪僻之人取莊老玄談飾以妖幻之語用欺愚俗無益於民有害於國臣非不悟鄙不學也上頗然之武德九年上患吏多受賕枉法受賂曰賕賕音求有司門令史受絹一匹司門郎屬刑部掌天下門關出入往來之籍賦而審其政有令史六人唐令布帛皆闊尺八寸長四丈為匹民部尚書裴矩諫曰為吏受賂罪誠當死但陛下使人遺之而受遺于季翻乃陷人於法也恐非所謂道之以德齊之以禮引論語孔子之言道讀曰導召文武五品已上告之曰裴矩能當官力爭不為面從儻每事皆然何憂不治治直吏翻臣光曰古人有言君明臣直裴矩佞於隋而忠於唐非其性之有變也君惡聞其過則忠化為佞君樂聞直言則佞化為忠惡烏路翻樂音洛是知君者表也臣者景也表動則景隨矣武德九年是歲進皇子長沙郡王恪為漢王宜陽郡王祐為楚王武德九年新羅百濟高麗三國有宿仇北史曰新羅本辰韓種在高麗東南亦曰秦韓相傳秦世亡人避役來適馬韓割東界居之故名秦韓始有六國稍分為十二新羅其一也或稱魏毌丘儉破高麗奔沃沮後復國其留者為新羅兼有沃沮不耐韓濊之地其王本百濟人自海逃入新羅遂王其國附庸百濟後致強盛因與百濟為敵百濟伐高麗來請救悉兵往破之自是相攻不置後獲百濟王殺之滋結怨麗力知翻上遣國子助教朱子奢往諭指晉武帝咸寧四年立國子學置祭酒博士各一人助教十五人以教生徒孝武太元十年損助教為十人唐助教五人從六品上掌佐博士分經教授上時掌翻太宗文武大聖大廣孝皇帝上之上諱世民高祖次子也帝初諡文皇帝廟號太宗咸亨五年追諡太宗文武聖皇帝天寶八載追尊太宗文武大聖皇帝十三載又加尊太宗文武大聖大廣孝皇帝貞觀元年丁亥六二七觀古玩翻武德九年春正月乙酉改元武德九年丁亥上宴㣥臣奏秦王破陳樂陳讀曰陳新志太宗為秦王破劉武周軍中相與作秦王破陳樂曲上曰朕昔受委專征民間遂有此曲雖非文德之雍容然功業由茲而成不敢忘本封德彞曰陛下以神武平海內豈文德之足比上曰戡亂以武守成以文文武之用各隨其時卿謂文不及武斯言過矣德彞頓首謝武德九年己亥制自今中書門下及三品以上入閣議事皆命諫官隨之有失輒諫程大昌曰唐西內太極殿即朔望受朝之所蓋正殿也太極之北有兩儀殿即常日視朝之所太極殿兩廡有東西二上閣則是兩閣皆有門可入已又可轉北而入兩儀也此太宗時入閣之制也至高宗以後多居東內御宣政前殿則謂之衙衙有仗御紫宸便殿則謂之入閣其不御宣政前殿而御紫宸也乃自正衙喚仗由閣門而入百官候朝于衛者因隨而入見謂之入閣武德九年上命吏部尚書長孫無忌等與學士法官更議定律令長知兩翻寬絞刑五十條為斷右趾斷丁管翻上猶嫌其慘曰肉刑廢已久宜有以易之蜀王法曹參軍裴弘獻唐制諸王有功倉戶兵騎法士等七曹參軍正七品上徙三千里居作三年詔從之考異曰新舊刑法志皆云居作二年今從王溥會要武德九年上以兵部郎中戴胄忠清公直兵部郎中掌判帳及天下武官之階品衛府之名數少始照翻上以選人多詐冒資蔭敕令自首不首者死選息絹翻下同首手又翻未幾有詐冒事覺者幾居豈翻上欲殺之胄奏據法應流上怒曰卿欲守法而使朕失信乎對曰敕者出於一時之喜怒法者國家所以布大信於天下也陛下忿選人之多詐故欲殺之而既知其不可復斷之以法斷丁亂翻此乃忍小忿而存大信也上曰卿能執法朕復何憂復扶又翻下不復朕復何復同胄前後犯顏執法言如涌泉上皆從之天下無冤獄武德九年上令封德彞舉賢久無所舉上詰之詰去吉翻對曰非不盡心但於今未有奇才耳上曰君子用人如器各取所長古之致治者豈借才於異代乎治直吏翻正患己不能知安可誣一世之人德彞慚而退御史大夫杜淹奏諸司文案恐有稽失請令御史就司檢校上以問封德彞對曰設官分職各有所司果有愆違御史自應糾舉若遍歷諸司搜擲疵纇擲他狄翻纇盧對翻太為煩碎淹默然上問淹何故不復論執對曰天下之務當盡至公善則從之德彞所言真得大體臣誠心服不敢遂非上悅曰公等各能如是朕復何憂武德九年右驍衛大將軍長孫順德受人餽絹事覺長知兩翻驍堅堯翻上曰順德果能有益國家朕與之共有府庫耳何至貪冒如是乎冒莫北翻猶惜其有功不之罪但於殿庭賜絹數十匹大理少卿胡演曰順德枉法受財罪不可赦奈何復賜之絹上曰彼有人性得絹之辱甚於受刑如不知愧一禽獸耳殺之何益武德九年辛丑天節將軍燕郡王李藝據涇州反宜州道為天節軍置將軍一人燕因肩翻藝之初入朝也武德五年藝引兵與太子建成會討劉黑闥遂入朝朝直遙翻秦王左右至其營藝無故毆之毆烏口翻上皇怒收藝繫獄既而釋之上即位藝內不自安曹州妖巫李五戒妖於驕翻謂藝曰王貴色已發勸之反藝乃詐稱奉密敕勒兵入朝遂引兵至豳州豳州治中趙慈皓馳出謁之諸州治中即別駕詔吏部尚書長孫無忌等為行軍總管以討之長知兩翻趙慈皓聞官軍將至密與統軍楊岌圖之岌魚及翻事泄藝囚慈皓岌在城外覺變勒兵攻之藝衆潰棄妻子將奔突厥至烏氏厥九勿翻漢烏氏縣屬安定郡故城在彈箏峽東氏音支左右斬之傳首長安弟壽為利州都督亦坐誅武德九年初隋末喪亂喪息浪翻豪桀並起擁衆據地自相雄長唐興相帥來歸上皇為之割置州縣以寵祿之帥讀曰率長知兩翻為于僞翻由是州縣之數倍於開皇大業之間上以民少吏多思革其弊少詩沼翻二月命大加人併省因山川形便分為十道一曰關內二曰河南三曰河東四曰河北五曰山南六曰隴右七曰淮南八曰江南九曰劍南十曰嶺南京兆同華商岐邠隴涇原寧慶鄜坊丹延靈會鹽夏綏銀豐勝為關內道洛汝陝虢鄭滑許潁陳蔡汴宋亳徐濠宿鄆齊曹濮青淄登萊棣兗海沂密為河南道蒲晉絳汾隰並南汾遼沁嵐石欣代朔蔚澤潞為河東道懷孟魏博相衛澶貝邢洺磁恆冀深趙滄景德易定幽涿瀛莫燕檀營平為河北道荊峽歸夔澧朗忠涪萬襄唐隨鄧均房郢復金梁洋利鳳興成扶文壁巴蓬通開隆果渠為山南道秦渭河鄯蘭階洮岷廓疊宕涼瓜沙甘肅為隴右道楊楚滁和壽廬舒光蘄黃安申為淮南道潤常蘇湖杭睦越衢婺括台福建泉宣歙池洪江鄂嶽饒信虔吉袁撫潭衡永道郴邵黔辰夷思僰為江南道益嘉眉邛簡資巂雅南會翼維松姚恭戎梓遂綿劍合龍普渝陵榮瀘為劍南道廣番循潮南康瀧端新封南宕春羅南石高南合崖振雍南方南簡淳欽南尹象藤桂梧賀連南昆靜樂南恭融容牢南林南扶南越南義交陸峯愛南德為嶺南道武德九年三月癸巳皇后帥內外命婦親蠶內命婦宮內女官自貴至侍巾亦分九品外命婦有六王嗣王郡王之母妻為一品之國公母妻為國夫人三品以上母妻為郡夫人四品母妻為郡君五品母妻為縣君勳官四品有封者母妻為鄉君凡外命婦朝參視夫子之品唐制皇后以季春吉巳享先蠶遂以親桑輿服志皇后親蠶服鞠衣黃羅為之帥讀曰率武德九年閏月癸丑朔日有食之武德九年壬申上謂太子少師蕭瑀曰朕少好弓矢少詩照翻瑀音禹好呼到翻得良弓十數自謂無以加近以示弓工乃曰皆非良材朕問其故工曰木心不直則脈理皆邪弓雖徑而發矢不直朕始寤嚮者辨之未精也朕以弓矢定四方識之猶未能盡況天下之務其能遍知乎乃令京官五品以上京官即在京職事官也更工衡翻數延見問以民間疾苦政事得失數所角翻下數與同武德九年涼州都督長樂王幼良性粗暴樂音洛左右百餘人皆無賴子弟侵暴百姓又與羌胡互市或告幼良有異志上遣中書令宇文士及馳驛代之並按其事左右懼謀劫幼良入北虜又欲殺士及據有河西復有告其謀者復扶又翻下汗復復與同夏四月癸巳賜幼良死武德九年五月苑君璋帥衆來降帥讀曰率降江戶翻下同初君璋引突厥陷馬邑殺高滿政事見一百九十卷高祖武德六年厥九勿翻隋朔州雲內縣之恆安鎮即後魏所都之平城也唐後置雲州及雲中縣恆戶登翻多棄君璋來降君璋懼亦降請捍北邊以贖罪上皇許之君璋請約契上皇使鴈門人元普賜之金券鴈門縣帶代州漢廣武縣地頡奚結翻可從刊入聲汗音寒君璋猶豫未決恆安人郭子威說君璋以恆安地險城堅說輸芮翻突厥方強且當倚之以觀變未可束手於人君璋乃執元普送突厥復與之合數與突厥入寇數所角翻至是見頡利政亂知其不足恃遂帥衆來降苑君璋與劉武周同起至是始降芮古國名武德九年有上書請去佞臣者上時掌翻去羌呂翻上問佞臣為誰對曰臣居草澤不能的知其人願陛下與㣥臣言或陽怒以試之彼執理不屈者直臣也畏威順旨者佞臣也上曰君源也臣流也濁其源而求其流之清不可得矣君自為詐何以責臣下之直乎朕方以至誠治天下見前世帝王好以權譎小數接其臣下者常竊恥之治直之翻好呼到翻譎古穴翻卿策雖善朕不取也武德九年六月辛巳右僕射密明公封德彞薨諡法思慮果遠曰明注云自任近乎專武德九年壬辰復以太子少師蕭瑀為左僕射蕭瑀去年免官復扶又翻下弟復同少始照翻瑀音禹武德九年戊申上與侍臣論周秦修短蕭瑀對曰紂為不道武王征之周及六國無罪始皇滅之得天下雖同人心則異上曰公知其一未知其二周得天下增修仁義秦得天下益尚詐力此修短之所以殊也蓋取之或可以逆得守之不可以不順故也瑀謝不及武德九年山東大旱詔所在賑恤無出今年租賦賑忍津翻武德九年秋七月壬子以吏部尚書長孫無忌為右僕射無忌與上為布衣交加以外戚有佐命功無忌皇后之兄以佐誅建成元吉為功長知兩翻其禮遇㣥臣莫及欲用為宰相者數矣歐陽修曰唐因隋制以三省之長尚書令侍中中書令共議國政此宰相職也後以太宗為尚書令臣下避不敢居其職由是僕射為尚書省長官與侍中中書令號為宰相其品位既崇不欲輕以授人故常以他官居宰相職而假以他名如杜淹以吏部尚書參議朝政魏徵以祕書監參預朝政或曰參議得失參知政事之類其名非一皆宰相職也數所角翻妾備位椒房家之貴寵極矣誠不願兄弟復執國政呂霍上官可為切骨之戒幸陛下矜察上不聽卒用之卒子恤翻武德九年初突厥性淳厚政令質略頡利可汗得華人趙德言委用之厥九勿翻頡奚結翻可從刊入聲汗音寒華人謂中國人也華讀如字德言專其威福多變更舊俗政令煩苛國人始不悅頡利又好信任諸胡而疏突厥胡人貪冒多反覆兵革歲動數興兵討其反覆者故無寧歲更工衡翻好呼到翻冒莫北翻深數尺深式鴆翻雜畜多死連年饑饉民皆凍餒頡利用度不給重斂諸部畜許救翻斂力贍翻由是內外離怨諸部多叛兵浸弱言事者多請擊之上以問蕭瑀長孫無忌瑀音禹長知兩翻曰頡利君臣昏虐危亡可必今擊之則新與之盟不擊恐失機會如何而可瑀請擊之無忌對曰虜不犯塞而棄信勞民非王者之師也上乃止武德九年上問公卿以享國久長之策蕭瑀言三代封建而久長秦孤立而速亡上以為然於是始有封建之議武德九年黃門侍郎王圭有密奏附侍中高士廉寢而不言上聞之八月戊戌出士廉為安州大都督武德九年九月庚戌朔日有食之武德九年辛酉中書令宇文士及罷為殿中監御史大夫杜淹參豫朝政朝直遙翻考異曰實録云杜淹署位不知所謂署位何也今從新書宰相表是時宰相無定名或云參預朝政或云參知機務之類甚衆不知其入銜否也如李靖三兩日一至門下中書平章政事魏徵朝章國典參議得失之類則決不入銜矣他官參豫政事自此始淹薦刑部員外郎邸懷道刑部郎掌二尚書侍郎舉其典憲而辨其輕重邸丁禮翻姓也後魏有邸珍嚴邸改郅行下孟翻對曰煬帝將幸江都召百官問行留之計懷道為吏部主事唐承隋制尚書諸司皆有主事從九品上臣親見之上曰卿稱懷道為是何為自不正諫對曰臣爾時不居重任又知諫不從徒死無益上曰卿知煬帝不可諫何為立其朝既立其朝何得不諫卿仕隋容可云位卑後仕王世充尊顯矣何得亦不諫對曰臣於世充非不諫但不從耳上曰世充若賢而納諫不應亡國若暴而拒諫卿何得免禍淹不能對上曰今日可謂尊任矣可以諫未對曰願盡死上笑武德九年辛未幽州都督王君廓謀叛道死君廓在州驕縱多不法徵入朝朝直遙翻下同長史李玄道房玄齡從甥也從才用翻憑君廓附書君廓私發之不識草書疑其告己罪行至渭南後魏於新豐鄭縣之間置渭南郡隋廢郡為縣屬京兆尹在長安東一百一十五里將奔突厥厥九勿翻為野人所殺武德九年嶺南酋長馮盎談殿等迭相攻擊談姓殿名姓譜蜀録云晉有征東將軍談巴酋慈由翻長知兩翻朝直遙翻諸州奏稱盎反前後以十數上命將軍藺謨等發江嶺數十州兵討之魏徵諫曰中國初定嶺南瘴癘險遠不可以宿大兵且盎反狀未成未宜動衆上曰告者道路不絶何云反狀未成對曰盎若反必分兵據險攻掠州縣今告者已數年而兵不出境此不反明矣諸州既疑其反陛下又不遣使鎮撫使疏吏翻下同彼畏死故不敢入朝若遣信臣示以至誠彼喜於免禍可不煩兵而服上乃罷兵冬十月乙酉遣員外散騎侍郎李公掩持節慰諭之散悉亶翻騎奇寄翻考異曰魏文貞公故事作李公淹又有前蒲州刺史韋叔諧偕行今從實録上曰魏徵令我發一介之使而嶺表遂安使疏吏翻朝直遙翻勝十萬之師不可不賞賜徵絹五百匹武德九年十二月壬午左僕射蕭瑀坐事免瑀音禹武德九年戊申利州都督章十二行本督下有義安王三字乙十一行本同孔本同張校同李孝常等謀反伏誅孝常因入朝留京師與右武衛將軍劉德裕及其甥統軍元弘善監門將軍長孫安業互說符命謀以宿衛兵作亂監工銜翻長知兩翻安業皇后之異母兄也嗜酒無賴父晟卒卒子恤翻弟無忌及后並幼安業斥還舅氏高士廉無忌及后之舅也后不以舊怨為意恩禮甚厚及反事覺后涕泣為之固請曰泣為于僞翻安業罪誠當萬死然不慈於妾天下知之今置以極刑人必謂妾所為恐亦為聖朝之纍纍力瑞翻由是得減死流巂州巂音髓武德九年或告右丞魏徵私其親戚上使御史大夫溫彥博按之無狀言無其事狀徵不存形迹遠避嫌疑遠于願翻心雖無私亦有可責上令彥博讓徵且曰自今宜存形迹他日徵入見見賢遍翻下進見同言於上曰臣聞君臣同體宜相與盡誠若上下俱存形迹則國之興喪尚未可知喪息浪翻臣不敢奉詔上瞿然曰吾已悔之瞿九遇翻徵再拜曰臣幸得奉事陛下願使臣為良臣勿為忠臣上曰忠良有以異乎對曰稷契皋陶君臣協心俱享尊榮所謂良臣契息列翻陶音遙龍逄比干面折廷爭身誅國亡所謂忠臣逄皮江翻折之舌翻爭讀曰諍上悅賜絹五百匹上神采英毅㣥臣進見者皆失舉措上知之每見人奏事必假以辭色冀聞規諫嘗謂公卿曰人欲自見其形必資明鏡君欲自知其過必待忠臣苟其君愎諫自賢愎符逼翻其臣阿諛順旨君既失國臣豈能獨全如虞世基等諂事煬帝以保富貴煬帝既弒世基等亦誅事見一百八十五卷高祖武德元年事有得失毋惜盡言武德九年或上言秦府舊兵宜盡除武職追入宿衛上時掌翻上謂之曰朕以天下為家惟賢是與豈舊兵之外皆無可信者乎汝之此意非所以廣朕德於天下也武德九年上謂公卿曰昔禹鑿山治水而民無謗讟者與人同利故也治直之翻秦始皇營宮室而人怨叛者病人以利己故也夫靡麗珍奇固人之所欲夫音扶若縱之不已則危亡立至朕欲營一殿材用已具鑒秦而止王公已下宜體朕此意由是二十年間風俗素朴衣無錦繡公私富給武德九年上謂黃門侍郎王圭曰國家本置中書門下以相檢察中書詔敕或有差失則門下當行駮正中書出命門下審駮按唐制凡詔旨制敕璽書冊命皆中書舍人起草進畫既下則署行而過門下省有不便者塗竄而奏還謂之塗歸駮北角翻互有不同苟論難往來務求至當難乃旦翻當丁悢翻捨己從人亦復何傷比來或護己之短遂成怨隙復扶又翻比毗至翻或苟避私怨知非不正言知其非而不加駮正也為兆民之深患此乃亡國之政也煬帝之世內外庶官務相順從當是之時皆自謂有智禍不及身及天下大亂家國兩亡雖其間萬一有得免者亦為時論所貶終古不磨卿曹各當徇公忘私勿雷同也武德九年上謂侍臣曰吾聞西域賈胡得美珠剖身以藏之賈音古有諸侍臣曰有之上曰人皆知章十二行本知下有笑字乙十一行本同張校同云無注本亦無彼之愛珠而不愛其身也吏受賕抵法與帝王徇奢欲而亡國者何以異於彼胡之可笑邪賕音求邪音耶魏徵曰昔魯哀公謂孔子曰人有好忘者徙宅而忘其妻孔子曰又有甚者桀紂乃忘其身亦猶是也好呼到翻忘巫放翻上曰然朕與公輩宜戮力相輔庶免為人所笑也武德九年青州有謀反者州縣逮捕支黨收繫滿獄詔殿中侍御史安喜崔仁師覆按之曹魏時蘭臺遣御史二人居殿中伺察姦非遂稱殿中侍御史唐從七品下掌朝廷供奉之儀式安喜縣屬定州漢為盧奴安險二縣地章帝改為安喜慕容垂改安喜為不連後魏復曰安喜後齊廢盧奴縣入安喜隋改曰鮮虞唐復曰安喜悉脫去杻械去羌呂翻杻女九翻與飲食湯沐寬慰之止坐其魁首十餘人餘皆釋之還報敕使將往決之此時敕使非官官凡奉敕出使者則謂之敕使使疏吏翻足下平反者多少始照翻反音翻人情誰不貪生恐見徒侶得免未肯甘心深為足下憂之為于僞翻下不為竊為同仁師曰凡治獄當以平恕為本豈可自規免罪規圖也治直之翻邪音耶萬一暗短誤有所縱以一身易十囚之死亦所願也伏伽慚而退及敕使至更訊諸囚皆曰崔公平恕事無枉濫請速就死無一人異辭者武德九年上好騎射好呼到翻下同騎奇寄翻孫伏伽諫以為天子居則九門天門九重人主之門亦曰九重所謂禁衛九重虎豹九關皆言九門也非欲苟自尊嚴乃為社稷生民之計也陛下好自走馬射的以娛悅近臣此乃少年為諸王時所為少詩照翻非今日天子事業也既非所以安養聖躬又非所以儀刑後世臣竊為陛下不取上悅未幾以伏伽為諫議大夫幾居豈翻考異曰韓琬御史臺記伏伽武德中自萬年主簿上疏極諫太宗怒命引出斬之伏伽曰臣寧與關龍逄遊於地下不願事陛下太宗曰朕試卿耳卿能若是朕何憂社稷命授之三品宰臣曰伏伽匡陛下之過自主簿授之三品彰陛下之過深矣請授之五品遂拜為諫議大夫按高祖實録武德元年伏伽自萬年縣法曹上書高祖詔授治書侍御史御史臺記誤也今據魏徵故事武德九年隋世選人十一月集至春而罷人患其期促至是吏部侍郎觀城劉林甫觀縣古之觀國國語注曰夏啓子太康之弟所封也觀縣漢屬東郡光武改曰衛縣晉魏屬頓丘郡曰衛國縣隋開皇六年改曰觀城縣屬魏州唐屬澶州選須絹翻下同觀古玩翻隨闕注擬人以為便唐初士大夫以亂離之後不樂仕進官員不充省符下諸州差人赴選州府及詔使樂音洛下遐稼翻使疏吏翻詔使即前所謂敕使多以赤牒補官至是盡省之勒赴省選集者七千餘人林甫隨才銓敍各得其所時人稱之詔以關中米貴始分人於洛州選上謂房玄齡曰官在得人不在員多命玄齡人併省留文武總六百四十三員武德九年隋祕書監晉陵劉子翼晉陵縣帶常州性剛直朋友有過常面責之李百藥常稱劉四雖復罵人劉子翼第四唐人多以第行相呼學行下孟翻復扶又翻是歲有詔徵之辭以母老不至武德九年鄃令裴仁軌鄃縣漢晉屬清河郡中廢隋開皇十六年置屬貝州鄃音輸上怒欲斬之殿中侍御史長安李乾祐諫曰法者陛下所與天下共也非陛下所獨有也今仁軌坐輕罪而抵極刑臣恐人無所措手足上悅免仁軌死以乾祐為侍御史唐制殿中侍御史從七品下侍御史從六品下武德九年上嘗語及關中山東人意有同異殿中侍御史義豐張行成跪奏曰義豐漢中山安國縣隋開皇六年改曰義豐屬定州天子以四海為家不當有東西之異恐示人以隘上善其言厚賜之自是每有大政常使預議武德九年初突厥既強敕勒諸部分散有薛延陀回紇都播骨利幹多濫葛同羅僕固拔野古思結渾斛薛結阿跌契苾白霫等十五部皆居磧北風俗大抵與突厥同厥九勿翻敕勒即鐵勒也薛延陀先與薛種雜居後滅延陀部有之號薛延陀姓一利嘻氏回紇先曰袁紇亦曰烏護曰烏紇至隋曰韋紇後稱回紇姓藥葛羅氏居薛延陀北娑陵水上距長安七千里都播亦曰都波其地北瀕小海西堅昆南回紇骨利幹居瀚海北多濫葛亦曰多覽葛在薛延陀東瀕同羅水同羅在薛延陀北多濫葛之東距長安七千里而贏僕固亦曰僕骨在多濫葛之東地最北拔野古一曰拔野固或為拔曳固漫散磧北地千里直僕固鄰于靺鞨思結在延陀故牙渾在諸部最南斛薛居多濫葛北奚結在同羅北阿跌一曰訶跌或為跌契苾一曰契苾羽在焉耆西北鷹娑川多濫葛之南白霫居鮮卑故地直京師東北五千里與同羅僕固接避薛延陀保奧支水冷陘山斛薛之下結之上當有奚字紇音鶻跌徒結翻契欺訖翻苾毗必翻又蒲結翻霫似入翻磧七迹翻考異曰舊書敕勒作鐵勒新書云即元魏時高車或曰敕勒訛為鐵勒今從新書舊書多濫葛作多覽葛又作多臘葛今從實録唐統紀又舊書僕固或作僕骨按胡語難明以中國字寫之故訛謬不一今從陳子昂集及僕固懷恩傳薛延陀於諸部為最強西突厥曷薩那可汗方強敕勒諸部皆臣之曷薩那徵稅無度諸部皆怨曷薩那誅其渠帥百餘人敕勒相帥叛之薩桑葛翻可從刊入聲汗音寒渠帥所類翻相帥讀曰率共推契苾哥楞為易勿真莫賀可汗居貪于山北楞盧登翻貪于山新書作貪汗山又以薛延陀乙失鉢為也嘻小可汗嘻徒結翻居燕末山北燕因肩翻及射匱可汗兵復振復扶又翻薛延陀契苾二部並去可汗之號以臣之此上皆序隋時事去羌呂翻回紇等六部在鬱督軍山者東屬始畢可汗鬱督軍山在大漠外直長安西北六千里乙失鉢之孫夷男帥部落七萬餘家附于頡利可汗帥讀曰率下同頡奚結翻考異曰舊鐵勒傳云貞觀二年葉護可汗死其國大亂夷男始附于頡利按突厥傳元年薛延陀已叛頡利擊走其欲谷設安得二年始附頡利乎頡利政亂薛延陀與回紇拔野古等相帥叛之頡利遣其兄子欲谷設將十萬騎討之新書阿史那社爾傳以欲谷設為頡利子與戰於馬鬣山大破之將即亮翻騎奇寄翻酋慈由翻長知兩翻菩薄乎翻薩桑葛翻欲谷設走菩薩追至天山部衆多為所虜回紇由是大振薛延陀又破其四設突厥號典兵者為設四設四部帥之典兵者也頡利益衰國人離散會大雪平地數尺羊馬多死民大飢頡利恐唐乘其弊引兵入朔州境上揚言會獵實設備焉鴻臚卿鄭元璹使突厥還周有大行人之官秦為典客漢景帝曰大行武帝曰大鴻臚梁置十二卿鴻臚為冬卿去大字唐因之掌賓客及凶儀之事璹殊玉翻臚陵如翻戎狄興衰專以羊馬為候今突厥民飢畜瘦畜許救翻下同此將亡之兆也不過三年上然之㣥臣多勸上乘間擊突厥上曰新與人盟而背之不信間古莧翻背蒲妹翻利人之災不仁乘人之危以取勝不武縱使其種落盡叛六畜無餘朕終不擊必待有罪然後討之種章勇翻畜許救翻西突厥統葉護可汗厥九勿翻可從刊入聲汗音寒考異曰高祖實録止云葉護舊傳作統葉護今從之遣真珠統俟斤與高平王道立來高平王道立使西突厥見上卷高祖武德八年俟渠之翻馬五千匹以迎公主頡利不欲中國與之和親數遣兵入寇數所角翻又遣人謂統葉護曰汝迎唐公主要須經我國中過統葉護患之未成婚二年二年春正月辛亥右僕射長孫無忌罷從無忌之請也考下文可見長知兩翻上以表示之曰朕於卿洞然無疑若各懷所聞而不言則君臣之意有不通又召百官謂之曰朕諸子皆幼視無忌如子非他人所能間也無忌自懼滿盈固求遜位皇后又力為之請間古莧翻為于僞翻上乃許之以為開府儀同三司二年置六司侍郎副六尚書六司侍郎吏部正四品上餘皆正四品下左右司郎中從五品上尚書左丞勾吏戶禮十二司右丞管兵刑工十二司左右司郎中各掌副十二司之事以舉正稽違省署符目二年癸丑吐谷渾寇岷州都督李道彥擊走之吐從暾入聲谷音浴二年丁巳徙漢王恪為蜀王衛王泰為越王楚王祐為燕王燕因肩翻二年上問魏徵曰人主何為而明何為而暗對曰兼聽則明偏信則暗昔堯清問下民故有苗之惡得以上聞書呂刑曰皇帝清問下民鰥寡有辭于苗上時掌翻達四聰故共鯀歡兜不能蔽也舜明目達聰而難任人故四凶不能逃其罪也共音恭以成望夷之禍事見秦紀以取臺城之辱事見梁紀以致彭城閣之變事見隋煬帝紀及高祖武德元年則貴臣不得擁蔽而下情得以上通也上曰善上謂黃門侍郎王圭曰開皇十四年大旱隋文帝不許賑給而令百姓就食山東比至末年賑津忍翻比必利翻及也天下儲積可供五十年煬帝恃其富饒侈心無厭厭於鹽翻卒亡天下卒子恤翻下同但使倉廩之積足以備凶年其餘何用哉二年二月上謂侍臣曰人言天子至尊無所畏憚朕則不然上畏皇天之監臨下憚㣥臣之瞻仰兢兢業業猶恐不合天意未副人望魏徵曰此誠致治之要治直吏翻下同願陛下慎終如始則善矣二年上謂房玄齡等曰為政莫若至公昔諸葛亮竄廖立李嚴於南夷亮卒而立嚴皆悲泣有死者事見七十二卷魏明帝青龍二年廖力救翻又力弔翻卒子恤翻又高熲為隋相公平識治體隋之興亡繫熲之存沒事見隋紀卿等不可不法前世之賢相也相息亮翻二年三月戊寅嚴寅改申朔日有食之二年壬子大理少卿胡演進每月囚帳少始照翻囚帳具每月禁繫罪囚之姓名猶今之禁曆也上命自今大辟辟毗亦翻皆令中書門下四品已上自二省長二而下至諫議大夫也庶無冤濫既而引囚至岐州刺史鄭善果上謂胡演曰善果雖復有罪復扶又翻官品不卑豈可使與諸囚為伍自今三品已上犯罪不須引過聽於朝堂俟進止太極宮承天門左右有東西朝堂朝直遙翻下同二年關內旱饑民多賣子以接衣食己巳詔出御府金帛為贖之歸其父母為于僞翻庚午詔以去歲霖雨今茲旱蝗赦天下詔書略曰若使年穀豐稔天下乂安移災朕身以存萬國是所願也甘心無吝會所在有雨民大悅二年夏四月己卯詔以隋末亂離因之饑饉暴骸滿野傷人心目宜令所在官司收瘞瘞於計翻二年初突厥突利可汗建牙直幽州之北主東偏奚霫等數十部多叛突厥來降厥九勿翻可從刊入聲汗音寒霫先立翻降戶江翻頡利可汗以其失衆責之及薛延陀回紇等敗欲谷設頡奚結翻紇下沒翻敗補邁翻頡利遣突利討之突利兵又敗輕騎奔還騎奇寄翻還從宣翻頡利怒拘之十餘日而撻之突利由是怨陰欲叛頡利頡利數徵兵於突利數所角翻突利不與表請入朝上謂侍臣曰嚮者突厥之強控弦百萬憑陵中夏夏戶雅翻用是驕恣以失其民今自請入朝非困窮肯如是乎朕聞之且喜且懼何則突厥衰則邊境安矣故喜然朕或失道他日亦將如突厥能無懼乎卿曹宜不惜苦諫以輔朕之不逮也頡利發兵攻突利丁亥突利遣使來求救頡奚結翻使疏吏翻下同上謀於大臣曰朕與突利為兄弟有急不可不救結兄弟事見上卷高祖武德七年謂渭橋之盟也見上卷武德九年兵部尚書杜如晦曰戎狄無信終當負約今不因其亂而取之後悔無及夫取亂侮亡書仲虺之誥之辭夫音扶丙申契丹酋長帥其部落來降契欺訖翻又音喫酋慈由翻長知兩翻降江戶翻下同頡利遣使請以梁師都易契丹上謂使者曰契丹與突厥異類今來歸附何故索之索山客翻師都中國之人盜我土地暴我百姓突厥受而庇之我興兵致討輒來救之彼如魚游釜中何患不為我有借使不得亦終不以降附之民易之也先是上知突厥政亂不能庇梁師都先悉薦翻以書諭之師都不從上遣夏州都督長史劉旻司馬劉蘭成圖之夏戶雅翻長知兩翻旻等數遣輕騎踐其禾稼多縱反間離其君臣其國漸虛降者相屬數所角翻騎奇寄翻踐慈演翻間古莧翻屬之欲翻其名將李正寶等謀執師都事泄來奔將即亮翻泄息列翻由是上下益相疑旻等知可取上表請兵上時掌翻上遣右衛大將軍柴紹殿中少監薛萬均擊之少始照翻又遣旻等據朔方東城以逼之克東城見一百九十卷武德五年劉蘭成偃旗臥鼓不出師都宵遁蘭成追擊破之突厥大發兵救師都柴紹等未至朔方數十里與突厥遇奮擊大破之遂圍朔方突厥不敢救城中食盡壬寅師都從父弟洛仁殺師都以城降梁師都隋大業末起兵至是而滅從才用翻夏戶雅翻二年太常少卿祖孝孫以梁陳之音多吳楚周齊之音多胡夷於是斟酌南北考以古聲少始照翻作唐雅樂凡八十四調三十一曲十二和律有七聲十二律凡八十四調隋有皇夏十四曲孝孫制十二和以法天之成數凡三十一曲十二和者一曰豫和二曰順和三曰永和四曰肅和五曰雍和六曰壽和七曰舒和八曰太和九曰昭和十曰休和十一曰正和十二曰承和調徒弔翻和如字漢協律都尉佩二千石印綬唐協律郎正八品上屬太常寺乙酉孝孫等奏新樂上曰禮樂者蓋聖人緣情以設教耳治之隆替豈由於此治直吏翻御史大夫杜淹曰齊之將亡作伴侶曲北齊之時陽俊之多作六言歌辭淫蕩而拙世俗流傳名為陽五伴侶作玉樹後庭花杜佑曰玉樹後庭花堂堂黃鸝留金叉兩鬢垂並陳後主所造恆與宮中女學士及朝臣唱和為詩太樂令何胥採其尤輕豔者為此曲思相吏翻行路聞之皆悲泣何得言治之隆替不在樂也上曰不然夫樂能感人故樂者聞之則喜夫音扶故樂音洛憂者聞之則悲悲喜在人心非由樂也將亡之政民必愁苦故聞樂而悲耳今二曲具存朕為公奏之為于僞翻公豈悲乎右丞魏徵曰古人稱禮云禮云玉帛云乎哉樂云樂云鍾鼓云乎哉論語載孔子之言不在聲音也臣光曰臣聞垂能目制方圓心度曲直垂古之巧人度徒洛翻其所以教人者必規矩而已矣聖人不勉而中中竹仲翻不思而得然不能以授人其所以授人者必禮樂而已矣禮者聖人之所履也樂者聖人之所樂也聖人履中正而樂和平所樂音洛下所樂哀樂同又思與四海共之百世傳之於是乎作禮樂焉故工人執垂之規矩而施之器是亦垂之功已王者執五帝三王之禮樂而施之世是亦五帝三王之治已治直吏翻下同五帝三王其違世已久後之人見其禮知其所履聞其樂知其所樂炳然若猶存於世焉此非禮樂之功邪所樂音洛邪音耶夫禮樂有本有文夫音扶中和者本也容聲者末也二者不可偏廢先王守禮樂之本未嘗須臾去於心行禮樂之文未嘗須臾遠於身興於閨門著於朝廷被於鄉遂比鄰遠于願翻被皮義翻朝直遙翻比毗至翻又音毗達於諸侯流於四海自祭祀軍旅至於飲食起居未嘗不在禮樂之中如此數十百年然後治化周浹鳳凰來儀也浹即協翻苟無其本而徒有其末一日行之而百日捨之求以移風易俗誠亦難矣是以漢武帝置協律歌天瑞非不美也不能免哀痛之詔見本紀考律呂非不精也不能救漸臺之禍王莽令劉歆考定律呂羲和掌之班固取以志律曆漸臺事見漢淮陽王紀漸子廉翻調金石非不詳也不能弭平陽之災晉武帝使荀勗定鍾律平陽之災謂懷愍二帝蒙塵也非不察也不能免臺城之辱四器謂制四通也事見一百四十五卷天監元年臺城之辱見一百六十二卷太清三年具存於世舜樂曰韶禹樂曰夏湯樂曰濩周武王樂曰武夏戶雅翻濩戶故翻張餘作德不足以稱之稱尺證翻曾不能化一夫況四海乎是猶執垂之規矩而無工與材坐而待器之成終不可得也況齊陳淫昏之主亡國之音暫奏於庭烏能變一世之哀樂乎暫與暫同樂音洛何發言之易易以豉翻而果於非聖人也如此夫禮非威儀之謂也夫音扶然無威儀則禮不可得而行矣樂非聲音之謂也然無聲音則樂不可得而見矣譬諸山取其一土一石而謂之山則不可然土石皆去山於何在哉故曰無本不立無文不行記禮器之言何異睹拳石而輕泰山乎必若所言則是五帝三王之作樂皆妄也君子於其所不知蓋闕如也論語載孔子之言二年戊子上謂侍臣曰朕觀隋煬帝集文辭奧博亦知是堯舜而非桀紂然行事何其反也魏徵對曰人君雖聖哲猶當虛己以受人故智者獻其謀勇者竭其力煬帝恃其俊才驕矜自用故口誦堯舜之言而身為桀紂之行行下孟翻曾不自知以至覆亡也上曰前事不遠吾屬之師也二年畿內有蝗辛卯上入苑中出玄武門北入禁苑掇數枚掇丁活翻又陟劣翻拾取也祝之曰民以穀為命而汝食之寧食吾之肺腸舉手欲吞之左右諫曰惡物或成疾上曰朕為民受災為于僞翻何疾之避遂吞之是歲蝗不為災二年上曰朕每臨朝欲發一言未嘗不三思朝直遙翻三息暫翻又如字恐為民害是以不多言給事中知起居事杜正倫曰臣職在記言古者有左右史天子言則左史書之動則右史書之隋始置起居舍人貞觀二年省起居舍人移其職於門下省置起居郎二員其以他官兼者謂之知起居注知起居事臣必書之豈徒有害於今亦恐貽譏於後上悅賜帛二百段二年上曰梁武帝君臣惟談苦空言所談者惟苦行空寂也百官不能乘馬元帝為周師所圍猶講老子百官戎服以聽事見一百六十五卷梁元帝承聖三年朕所好者好呼到翻唯堯舜周孔之道以為如鳥有翼如魚有水失之則死不可暫無耳二年以辰州刺史裴虔通隋煬帝故人特蒙寵任而身為弒逆事見一百八十五卷高祖武德元年按通鑑紀事各為段凡改段處率空一字別為一節此段頭既空字以字之上合有上字文乃明屢更赦令更工衡翻幸免族夷不可猶使牧民乃下詔除名流歡州貞觀元年改德州日南郡曰歡州身除隋室以啓大唐自以為功頗有觖望之色觖窺瑞翻又於決翻怨望也及得罪怨憤而死二年秋七月詔宇文化及之黨萊州刺史牛方裕絳州刺史薛世良廣州都督長史唐奉義隋武牙郎將元禮並除名徙邊長知兩翻武牙郎將即虎牙郎將唐避諱改虎曰武將即亮翻二年上謂侍臣曰古語有之赦者小人之幸君子之不幸一歲再赦善人喑啞喑於今翻啞烏下翻夫養稂莠者害嘉穀夫音扶稂魯當翻莠與久翻稂莠皆惡草害稼赦有罪者賊良民故朕即位以來不欲數赦數所角翻恐小人恃之輕犯憲章故也王崇武標點容肇祖聶崇岐覆校
