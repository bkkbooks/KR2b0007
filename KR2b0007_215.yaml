body:
  text: 資治通鑑卷第二百一十五端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註唐紀三十一玄宗至道大聖大明孝皇帝中之下天寶元年天寶元年壬午七四二天寶元年春正月丁未朔上御勤政樓帝於興慶宮西南隅建二樓花萼相輝樓在西臨街以燕兄弟勤政務本樓在南以脩政事朝直遙翻赦天下改元天寶元年壬子分平盧別為節度以安祿山為節度使使疏吏翻下同是時天下聲教所被之州三百三十一被皮義翻考異曰舊紀云三百六十二按地理志開元二十八年州府三百二十八至此纔二年不應遽增三十餘州今從唐曆會要統紀羈縻之州八百置十節度經略使以備邊安西節度撫寧西域統龜茲焉耆于闐疏勒四鎮治龜茲城兵二萬四千焉耆治所在安西府東八百里于闐在南二千里疏勒在西二千餘里龜茲音丘慈又音屈佳闐徒賢翻又徒見翻統瀚海天山伊吾三軍屯伊西二州之境治北庭都護府兵二萬人突騎施牙帳在北庭府西北三千餘里堅昆在北七千里瀚海軍在北庭府城內兵萬二千人天山軍在西州城內兵五千人伊吾軍在伊州西北三百里甘露川兵三千人騎奇寄翻斷丁管翻吐從暾入聲厥九勿翻統赤水大斗建康寧寇玉門墨離豆盧新泉八軍張掖交城白亭三守捉屯涼肅瓜沙會五州之境治涼州兵七萬三千人赤水軍在涼州城內兵三萬三千人大斗軍在涼州西二百餘里甘肅二州界兵七千五百人建康軍在涼州西二百里兵五千三百人寧寇軍在涼州東北千餘里兵八千五百人玉門軍在肅州西二百里管兵五千二百人墨離軍本月氏國在瓜州西北干里管兵五千人豆盧軍在沙州城內管兵四千三百人新泉軍在會州西北二百里管兵千人張掖守捉在涼州南二百里管兵五百人交城守捉在涼州西二百里管兵千人白亭守捉在涼州西北五百里管兵千七百人唐制大曰軍小曰守捉趙珣聚米圖經自甘州西至肅州五百里自肅州西至瓜州四百五十里自瓜州西至沙州二百八十里自沙州西至伊州四百里會州東至鹽州八百里西至涼州六百里南至宋鎮戎軍一百四十里北至靈州六百里統經略豐安定遠三軍三受降城安北單于二都護府屯靈夏豐三州之境治靈州兵六萬四千七百人經略軍在靈州城內兵二萬七百人豐安軍在靈州西黃河外百八十里兵八千人定遠軍在靈州東北二百里黃河外兵七千人西受降城在豐州北黃河外八十里兵七千人安北都護府治中受降城黃河北岸兵六千人東受降城在勝州東北二百里兵七千人振武軍在單于都護府城內兵九千人降戶江翻單音蟬夏戶雅翻統天兵大同橫野岢嵐四軍雲中守捉屯太原府忻代嵐三州之境治太原府兵五萬五千人天兵軍在太原城內兵三萬人大同軍在代州北三百里兵九千五百人橫野軍在蔚州東北一百四十里兵三千人岢嵐軍在嵐州北百里兵一千人雲中守捉在單于府西北二百七十里兵七千七百人忻州在太原府北八十里兵七千八百人代州至太原五百里兵四千人嵐州在太原府西北二百五十里兵三千人岢枯我翻嵐盧含翻統經略威武清夷靜塞恆陽北平高陽唐興橫海九軍屯幽薊媯檀易恆定漠滄九州之境治幽州兵九萬一千四百人經略軍在幽州城內兵三萬人威武軍在檀州城內兵萬人清夷軍在媯州城內兵萬人靜塞軍在薊州城內兵萬六千人恆陽軍在恆州城東兵六千五百人北平軍在定州城西兵六千人高陽軍在易州城內兵六千人唐興軍在莫州城內兵六千人橫海軍在滄州城內兵六千人景雲元年以嬴州鄚縣置鄚州開元十三年以鄚字類鄭字改為漠州尋又改莫州契欺訖翻又音喫恆戶登翻薊音計媯居為翻統平盧盧龍二軍榆關守捉安東都護府屯營平二州之境治營州兵三萬七千五百人平盧軍在營州城內兵萬六千人盧龍軍在平州城內兵萬人榆關守捉在營州城西四百八十里兵三千人安東都護府在營州東二百里兵八千五百人靺鞨音末曷榆當作渝註詳見上卷統臨洮河源白水安人振威威戎漠門寧塞積石鎮西十軍綏和合川平夷三守捉屯鄯廓洮河之境治鄯州兵七萬五千人臨洮軍在鄯州城內兵萬五千人河源軍在鄯州西百三十里兵四千人白水軍在鄯州西北二百三十里兵四千人安人軍在鄯州界星宿川西兵萬人振威軍在鄯州西三百里兵千人威戎軍在鄯州西北三百五十里兵千人漠門軍在洮州城內兵五千五百人寧塞軍在廓州城內兵五百人積石軍在廓州西百八十里兵七千人鎮西軍在河州城內兵萬一千人綏和守捉在鄯州西南二百五十里兵千人合川守捉在鄯州南百八十里兵千人平夷守捉在河州西南四十里兵三千人洮土刀翻鄯時戰翻又音善南撫蠻獠統天寶平戎昆明寧遠澄川南江六軍屯益翼茂當巂柘松維恭雅黎姚悉十三州之境治益州兵三萬九百人團結營在成都府城內兵萬四千人天寶軍在恭州東南九十里兵千人平戎軍在恭州南八十里兵千人昆明軍在巂州南兵五千一百人寧遠軍在巂州西兵三百人澄川守捉在姚州東六百里管兵二千人南江軍兵三百人翼州兵五百人茂州兵三百人維州兵五百人柘州兵五百人松州兵二千八百人當州兵五百人雅州兵四百人黎州兵千人姚州兵三百人悉州兵五千人杜佑曰當州江源郡在翼州西二百七十里西北到故通軌縣二百里以西即是生羌悉州在當州南八十里黎州漢沈黎郡也東去一里高山萬重更無郡縣西南去郡一里高山萬重東北去郡五里西北去郡二里皆高山萬重茂州劉昫曰隋汶山郡武德元年改曰會州貞觀八年改曰茂州以郡界茂濕山為名松州東至茂州三百里西南至當州三百里西北至吐蕃界九十里南至翼州一百八十里恭州開元二十四年分靜州廣平縣置東至柘州一百里悉州西北至當州八十里獠魯皓翻巂音髓統經略清海二軍桂容邕交四管治廣州兵萬五千四百人經略軍在廣州城內兵五千四百人清海軍在恩州城內兵二千人桂府兵千人容府兵千一百人邕府兵千七百人安南府兵四千二百人已上兵輕稅本鎮以自給福州領之樂音洛兵千五百人東萊守捉萊州領之東牟守捉登州領之兵各千人凡鎮兵四十九萬人捉仄角翻考異曰此兵數唐曆所載也舊紀是歲天下健兒團結彍騎等總五十七萬四千七百三十三此蓋止言邊兵彼幷京畿諸州彍騎數之耳馬八萬餘匹安西府馬二千七百匹北庭瀚海軍馬四千二百匹天山軍馬五百匹伊吾軍馬三百匹河西赤水軍馬萬三千匹大斗軍馬二千四百匹建康軍馬五百匹寧寇玉門軍共管馬六百匹墨離軍馬四百匹豆盧軍馬四百匹朔方經略軍馬三千匹豐安軍馬千三百匹定遠軍馬二千匹西受降城馬千七百匹中受降城馬二千匹東受降城馬千七百匹振武軍馬千六百匹河東天兵軍馬五千五百匹雲中守捉馬二千匹大同軍馬五千五百匹橫野軍馬千八百匹范陽經略軍馬五千四百匹威武軍馬三百匹清夷軍馬三百匹靜塞軍馬五百匹平盧軍馬四千二百匹盧龍軍馬五百匹渝關守捉馬百匹安東府馬七百匹隴右臨洮軍馬八千匹河源軍馬六百五十匹白水軍馬五百匹安人軍馬二百五十匹威戎軍馬五十匹漠門軍馬二百匹寧塞軍馬五十匹積石軍馬三百匹劍南團結營馬千八百匹昆明軍馬二百匹每歲供邊兵衣糧費不過二百萬天寶之後邊將奏益兵浸多每歲用衣千二十萬匹糧百九十萬斛安西衣賜六十二萬疋段北庭衣賜四十八萬疋段河西衣賜百八十萬疋段朔方衣賜二百萬疋段河東衣賜百二十六萬疋段糧五十萬石范陽衣賜八十萬疋段糧五十萬石平盧失衣糧數隴右衣賜二百五十萬疋段劍南衣賜八十萬疋段糧七十萬石將即亮翻民始困苦矣天寶元年甲寅陳王府參軍田同秀皇子陳王珪府參軍也見玄元皇帝於丹鳳門之空中告以我藏靈符在尹喜故宅上時掌翻下上表同上遣使於故函谷關尹喜臺旁求得之列仙傳曰關令尹喜者周大夫也老子西游喜先見其氣候物色而迹之果得老子老子亦知其旨為著道德經使疏吏翻天寶元年陝州刺史李齊物穿三門運渠辛未渠成新書曰齊物鑿砥柱為門以通漕開其山嶺為輓路沃醯而鑿之然棄石入河水益湍怒舟不能入新門候水漲以人輓舟而上天子疑之遣宦者按視齊物厚賂宦者還言其便陝失冉翻神通之曾孫也淮安王神通天寶元年壬辰㣥臣上表以函谷靈符潛應年號先天不違易曰先天而天不違先悉薦翻字從之二月辛卯上享玄元皇帝於新廟時置玄元廟於大寧坊西南角甲午享太廟丙申合祀天地於南郊赦天下改侍中為左相中書令為右相尚書左右丞相復為僕射開元初改左右僕射為尚書左右丞相復扶又翻下清復同州為郡刺史為太守改桃林縣曰靈寶隋開皇十六年置桃林縣取古者桃林之野以為縣名屬洛州唐屬陝州今以得玄元靈符改曰靈寶守式又翻朝直遙翻散悉亶翻時人皆疑寶符同秀所為間一歲清河人崔以清復言見玄元皇帝於天津橋北云藏符在武城紫微山武城即漢之東武城縣與清河縣皆屬清河郡亦得之東都留守王倕知其詐按問果首服使疏吏翻守式又翻下太守同倕音垂首式又翻奏之上亦不深罪流之而已天寶元年三月以長安令韋堅為陝郡太守陝郡陝州陝失冉翻先天中李傑為陝州刺史領水陸發運使置使自傑始也裴耀卿之後命堅始以租庸使入銜使疏吏翻下同初宇文融既敗言利者稍息事見二百十三卷開元十八年事始二百十三卷二十一年鉷戶公翻競以利進百司有利權者稍稍別置使以領之舊官充位而已史言諸使所由始太子之兄也為吏以幹敏稱上使之督江淮租運歲增巨萬上以為能故擢任之王鉷方翼之曾孫也自高宗至武后朝王方翼著功名於西域治直之翻天寶元年李林甫為相凡才望功業出己右及為上所厚勢位將逼己者必百計去之去羌呂翻尤忌文學之士或陽與之善啗以甘言而陰陷之世謂李林甫口有蜜謂其言甘也啗徒濫翻又徒覽翻謂其心在害人也上嘗陳樂於勤政樓垂簾觀之兵部侍郎盧絢謂上已起垂鞭按轡橫過樓下絢風標清粹上目送之深歎其蘊藉絢許縣翻蘊於運翻林甫常厚以金帛賂上左右上舉動必知之乃召絢子弟謂曰尊君素望清崇今交廣藉才聖上欲以尊君為之可乎若憚遠行則當左遷不然則以賓詹分務東洛謂以太子賓客詹事分司東都也何如絢懼以賓詹為請林甫恐乖衆望乃除華州刺史華戶化翻到官未幾誣其有疾州事不理除詹事員外同正幾居豈翻上又嘗問林甫以嚴挺之今安在是人亦可用挺之時為絳州刺史林甫退召挺之弟損之諭以上待尊兄意甚厚盍為見上之策奏稱風疾求還京師就醫挺之從之林甫以其奏白上云挺之衰老得風疾宜且授以散秩使便醫藥上歎吒久之散悉亶翻吒陟駕翻四月壬寅以為詹事又以汴州刺史河南采訪使齊澣為少詹事唐少詹事正四品上汴皮變翻使疏吏翻於東京養疾澣亦朝廷宿望故幷忌之天寶元年上發兵納十姓可汗阿史那昕於突騎施至俱蘭城俱蘭國所都城也俱蘭或曰俱羅弩或曰屈浪拏與吐火羅接可從刊入聲汗音寒騎奇寄翻考異曰會要作俱南城胡語不明耳突騎施大纛官都摩度來降纛徒到翻降戶江翻六月乙未冊都摩度為三姓葉護天寶元年秋七月癸卯朔日有食之天寶元年辛未左相牛仙客薨八月丁丑以刑部尚書李適之為左相天寶元年突厥拔悉密回紇葛邏祿三部共攻骨咄葉護殺之推拔悉密酋長為頡跌伊施可汗回紇葛邏祿自為左右葉護厥九勿翻紇下沒翻邏郎佐翻咄當沒翻酋慈由翻頡奚結翻跌徒結翻突厥餘衆共立判闕特勒之子為烏蘇米施可汗以其子葛臘哆為西殺哆昌者翻突厥以其親屬分掌東西兵號左右殺亦曰東西殺西殺右殺也上遣使諭烏蘇令內附烏蘇不從朔方節度使王忠嗣盛兵磧口以威之使疏吏翻磧七迹翻考異曰新舊書忠嗣傳皆曰是歲忠嗣北伐與奚怒皆戰于桑乾河三敗之大虜其衆又曰明年再破怒皆及突厥之衆自是塞外晏然按朔方不與奚相接不知所云奚怒皆何也今闕之烏蘇懼請降而遷延不至忠嗣知其詐乃遣使說拔悉密回紇葛邏祿使攻之烏蘇遁去忠嗣因出兵擊之取其右廂以歸擊垂亡之虜猶不肯輕用其兵此王忠嗣所以為善將也突厥左右殺所部謂之左右廂降戶江翻說輸芮翻紇下沒翻邏郎佐翻丁亥突厥西葉護阿布思及西殺葛臘哆默啜之孫勃德支伊然小妻毗伽登利之女帥部衆千餘帳相次來降意此皆突厥右廂之衆也啜陟劣翻伽求迦翻帥讀曰率考異曰實錄舊紀皆云突厥阿布思及默啜可汗唐曆云烏蘇米施可汗遁逃其西葉護阿布思及毗伽可汗可敦男西殺葛臘哆率其部千餘帳來降舊王忠嗣傳云三部落攻米施可汗走之忠嗣因出兵伐之取其右廂而歸其西葉護及毗伽可敦男葛臘哆率其部落千餘帳入朝突厥傳云西殺妻子及默啜之孫勃德支特勒毗伽可汗女大洛公主伊然可汗小妻余塞匐登利可汗女余燭公主及阿布思頡利發等並帥其部衆相次來降今參取用之突厥遂微九月辛亥上御花萼樓宴突厥降者考異曰本紀作辛卯按長曆是月癸卯朔無辛卯唐曆云九月辛卯亦誤也天寶元年護密先附吐蕃戊午其王頡吉里匐遣使請降頡奚結翻匐蒲北翻天寶元年冬十月丁酉上幸驪山溫泉張泉下脫十一月己巳還宮天寶元年十二月隴右節度使皇甫惟明奏破吐蕃大嶺等軍戊戌又奏破青海道莽布支營三萬餘衆斬獲五千餘級庚子河西節度使王倕奏破吐蕃漁海及遊弈等軍史言明皇喜邊功故邊帥告捷者相繼倕音垂天寶元年是歲天下縣一千五百二十八鄉一萬六千八百二十九戶八百五十二萬五千七百六十三口四千八百九十萬九千八百天寶元年回紇葉護骨力裴羅遣使入貢考異曰舊傳云天寶初其酋長葉護頡利吐發遣使入朝封奉義王唐曆天寶三載突厥拔志蜜可汗又為回紇葛羅祿等部落襲殺之立回紇為主是為骨咄祿毗伽闕可汗遣使立為奉義王又加懷仁可汗新突厥傳云回紇葛邏祿殺拔悉蜜可汗奉回紇骨力裴羅定其國是為國咄祿毗伽闕可汗按奉義王懷仁可汗是一人而新突厥回紇傳其名不同然新傳自吐迷度以來世系皆可譜今從之明未冊為可汗也二年天寶二年春正月安祿山入朝朝直遙翻上寵待甚厚謁見無時見賢遍翻祿山奏言去年營州蟲食苗臣焚香祝天云臣若操心不正事君不忠願使蟲食臣心若不負神祇願使蟲散即有㣥鳥從北來食蟲立盡請宣付史官從之操千高翻天寶二年李林甫領吏部尚書日在政府政府謂政事堂御史中丞張倚新得幸於上遙晉卿欲附之時選人集者以萬計選須絹翻入等者六十四人倚子奭為之首㣥議沸騰前薊令蘇孝韞以告安祿山薊縣帶幽州涿郡時改涿郡為范陽郡薊音計上悉召入等人面試之奭手持試紙終日不成一字時人謂之曳白癸亥遙貶武當太守晉卿貶安康太守倚貶淮陽太守武當郡均州安康郡金州本西城郡元年更郡名淮陽郡陳州舊志金州京師南七百三十七里陳州一千五百二十里晉卿壺關人也壺關縣自漢以來屬上黨郡而唐上黨縣乃漢壺關縣隋分置上黨縣帶郡唐武德四年分隋之上黨縣置壺關縣治高望堡貞觀十七年移治進流川朏音敷尾翻天寶二年三月壬子追尊玄元皇帝父周上御大夫為先天太皇又尊皋繇為德明皇帝涼武昭王為興聖皇帝唐虞之世皋陶為理唐以為李氏得姓之始故追尊為德明皇帝涼武昭王暠高祖之七世祖建國於瓜沙李氏由是而興故尊為興聖皇帝繇余招翻天寶二年江淮南租庸等使韋堅引滻水抵苑東望春樓下為潭苑禁苑也潭在長安城東九里滻音產役夫匠通漕渠發人丘壟自江淮至京城民間蕭然愁怨二年而成丙寅上幸望春樓觀新潭堅以新船數百艘扁榜郡名各陳郡中珍貨於船背陝尉崔成甫著錦半臂鈌胯綠衫以裼之艘蘇遭翻扁補典翻陝失冉翻著陟略翻胯苦瓦翻裼先擊翻袒衣也紅袹首袹莫白翻袹首今人謂之抹額居前船唱得寶歌先是民間唱俚歌曰得體紇那邪其後得寶符於桃林成甫乃更紇體歌為得寶弘農野歌曰得寶弘農野弘農得寶耶潭裏舟船鬧揚州銅器多三郎當殿坐聽唱得寶歌其俚又甚焉和戶臥翻連檣數里堅跪進諸郡輕貨仍上百牙盤食程大昌演繁露曰唐少府監御饌器用九飣食以牙盤九枚裝食味於上置上前亦謂之看食仍上時掌翻竟日而罷觀者山積夏四月加堅左散騎常侍散悉亶翻騎奇寄翻名其潭曰廣運時京兆尹韓朝宗亦引渭水置潭於西街以貯材木朝直遙翻貯丁呂翻天寶二年丁亥皇甫惟明引軍出西平西平郡即鄯州行千餘里攻洪濟城破之杜佑曰廓州達化縣有洪濟鎮周武帝逐吐谷渾所築在縣西二百七十里長慶中劉元鼎為盟會使言河之上流由洪濟西行二千里水益狹冬春可涉夏秋乃勝舟其南三百里三山中高四下曰歷山直大羊同國古所謂昆侖者也虜曰悶摩黎山東距長安五千里河源其間流澄緩下稍合衆流色赤行益遠他水幷注則濁河源東北直莫賀延磧尾隱測其地蓋在劍南之西此劉元鼎因洪濟城而上敍河源附見于此天寶二年上以右贊善大夫楊慎矜龍朔二年改太子中允為贊善大夫咸亨元年復置中允而贊善大夫不廢後又分左右各置五員班左右諭德下諭德掌諭太子以道德贊善掌翊贊太子以規諷時李林甫專權公卿之進有不出其門者必以罪去之去羌呂翻慎矜由是固辭不敢受五月辛丑以慎矜為諫議大夫天寶二年冬十月戊寅上幸驪山溫泉乙卯還宮戊寅至乙卯三十八日史言帝耽樂而忘返驪力知翻還從宣翻又音如字考異曰舊紀十月戊寅幸溫泉宮十一月乙卯還宮與實錄同十二月戊申又幸溫泉宮丙辰還宮實錄無按十二月丙寅朔無戊申丙辰唐曆十一月戊申幸溫泉宮丙辰還京又與實錄本紀不同今皆不取三載甲申七四四天寶二年春正月丙申朔改年曰載載子亥翻天寶二年辛丑上幸驪山溫泉二月庚午還宮往還亦幾三旬天寶二年辛卯太子更名亨更工衡翻天寶二年海賊吳令光等抄掠台明明州漢句章鄮縣之地屬會稽郡開元二十六年采訪使齊澣奏以越州之鄮縣置明州以境內有四明山因名抄楚交翻將即亮翻天寶二年三月己巳以平盧節度使安祿山兼范陽節度使以范陽節度使裴寬為戶部尚書使疏吏翻尚辰羊翻禮部尚書席建侯為河北黜陟使稱祿山公直李林甫裴寬皆順旨稱其美三人皆上所信任由是祿山之寵益固不搖矣天寶二年夏四月裴敦復破吳令光擒之天寶二年五月河西節度使夫蒙靈詧討突騎施莫賀達干斬之按元和姓纂云夫蒙本西羌姓後秦有建威將軍夫蒙羌今蒲同二州多此姓或改姓馬氏考異曰會要作馬靈詧今從實錄咄當沒翻伽求迦翻考異曰會要作伊地米里骨咄祿毗伽今從實錄六月甲辰冊拜骨咄祿毗伽為十姓可汗可從刊入聲汗音寒天寶二年秋八月拔悉蜜攻斬突厥烏蘇可汗傳首京師國人立其弟鶻隴匐白眉特勒是為白眉可汗於是突厥大亂敕朔方節度使王忠嗣出兵乘之至薩河內山厥九勿翻嗣祥吏翻薩桑葛翻破其左廂阿波達干等十一部右廂未下會回紇葛邏祿共攻拔悉蜜頡跌伊施可汗殺之回紇骨力裴羅自立為骨咄祿毗伽闕可汗遣使言狀上冊拜裴羅為懷仁可汗於是懷仁南據突厥故地立牙帳於烏德犍山回紇牙帳東有平野西據烏德犍山南依嗢昆水犍居言翻其後又幷拔悉蜜葛邏祿凡十一部各置都督每戰則以二客部為先天寶二年李林甫以楊慎矜屈附於己九月甲戌復以慎矜為御史中丞充諸道鑄錢使復扶又翻又如字天寶二年冬十月癸巳上幸驪山溫泉十一月丁卯還宮天寶二年術士蘇嘉慶上言遯甲術有九宮貴神九宮貴人蓋易乾鑿度所謂太一也註已見五十二卷漢順帝陽嘉三年時置九宮貴神壇其壇三成成三尺四階其上依位置九壇壇尺五寸東面曰招搖正東曰軒轅東北曰太陰正南曰天一中央曰天符正北曰太一西南曰攝提正西曰咸池西北曰青龍五為中戴九履一左三右七二四為上六八為下符於遁甲仍編於敕曰九宮貴神實司水旱功佐上帝德庇下人又黃帝九宮經一宮其神太一其星天蓬其卦坎其行水其方白二宮其神攝提其星天芮其卦坤其行土其方黑三宮其神軒轅其星天衝其卦震其行木其方碧四宮其神招搖其星天輔其卦巽其行木其方綠五宮其神天符其星天禽其卦離其行土其方黃六宮其神青龍其星天心其卦乾其行金其方白七宮其神咸池其星天柱其卦兌其行金其方赤八宮其神太陰其星天任其卦艮其行土其方白九宮其神天一其星天英其卦離其行火其方紫上時掌翻請立壇於東郊祀以四孟月從之禮在昊天上帝下太清宮太廟上所用牲玉皆侔天地天寶二年十二月癸巳置會昌縣於溫泉宮下時分新豐萬年置會昌縣雍錄溫湯在臨潼縣南一百五十步在驪山西北十道志曰泉有三所其一處即皇堂石井後周宇文護所造隋文帝又修屋宇種松柏千餘株唐貞觀十八年詔閻立德營建宮殿御湯名湯泉宮咸亨三年名溫泉宮元和志則曰開元十一年置溫泉宮天寶六載改為華清宮於驪山上益治湯井為池臺殿環列山谷自開元來每歲十月臨幸歲盡乃歸以新豐縣去泉稍遠即於湯所置會昌縣又置百司及公卿邸第焉臨潼縣唐之新豐慶山皆其地也按通鑑開元十一年書作溫泉宮與元和志合天寶二年戶部尚書裴寬素為上所重李林甫恐其入相忌之相息亮翻刑部尚書裴敦復擊海賊還受請託廣序軍功寬微奏其事林甫以告敦復敦復言寬亦嘗以親故屬敦復屬之欲翻林甫曰君速奏之勿後於人敦復乃以五百金賂女官楊太真之姊使言於上甲午寬坐貶睢陽太守睢陽郡宋州本梁郡天寶元年更郡名睢音雖初武惠薨開元二十五年惠薨後宮數千無當意者或言壽王楊氏之美絕世無雙上見而悅之乃令自以其意乞為女官號太真更為壽王娶左衞郎將韋昭訓女更工衡翻將即亮翻潛內太真宮中太真肌態豐豔曉音律性警穎善承迎上意不期歲寵遇如惠宮中號曰娘子凡儀體皆如皇后天寶二年癸卯以宗女為和義公主嫁寧遠奉化王阿悉爛達干帝以拔汗那助平吐火仙冊其王為奉化王改其國曰寧遠天寶二年癸丑上祀九宮貴神赦天下天寶二年初令百姓十八為中二十三成丁天寶二年初上自東都還李林甫知上厭巡幸乃與牛仙客謀增近道粟賦及和糴以實關中數年蓄積稍豐上從容謂高力士曰朕不出長安近十年開元二十四年上自東都還自是不復東幸從千容翻近其靳翻朕欲高居無為悉以政事委林甫何如對曰天子巡狩古之制也且天下大柄不可假人彼威勢既成誰敢復議之者上不悅力士頓首自陳臣狂疾發妄言罪當死上乃為力士置酒復扶又翻為于偽翻下為百同左右皆呼萬歲力士自是不敢深言天下事矣力士之不敢言以李林甫機穽可畏也四載乙酉七四五天寶二年春正月庚午上謂宰相曰朕比以甲子日比毗至翻於宮中為壇為百姓祈福朕自草黃素置案上俄飛升天聞空中語云聖壽延長又朕於嵩山鍊藥成亦置壇上及夜左右欲收之又聞空中語云藥未須收此自守護達曙乃收之太子諸王宰相皆上表賀史言唐之君誕妄而臣佞諛天寶二年回紇懷仁可汗擊突厥白眉可汗殺之傳首京師突厥毗伽可敦帥衆來降可從刊入聲帥讀曰率降戶江翻烽燧無警矣回紇斥地愈廣東際室韋西抵金山南跨大漠盡有突厥故地史言回紇至此強盛子磨延啜立號葛勒可汗天寶二年二月己酉以朔方節度使王忠嗣兼河東節度使忠嗣少以勇敢自負少詩照翻及鎮方面專以持重安邊為務常曰太平之將但當撫循訓練士卒而已不可疲中國之力以邀功名將即亮翻有漆弓百五十斤常貯之櫜中以示不用貯丁呂翻軍中日夜思戰忠嗣多遣諜人伺其間隙諜達協翻伺相吏翻間古莧翻見可勝然後興師故出必有功既兼兩道節制自朔方至雲中邊陲數千里陲音垂要害之地悉列置城堡斥地各數百里邊人以為自張仁亶之後將帥皆不及張仁愿本名仁亶以睿宗諱旦音近亶避之改名仁愿將即亮翻帥所類翻天寶二年三月壬申上以外孫獨孤氏為靜樂公主嫁契丹王李懷節樂音洛甥楊氏為宜芳公主嫁奚王李延寵宜芳縣屬嵐州天寶二年乙巳以刑部尚書裴敦復充嶺南五府經略等使五月壬申敦復坐逗留不之官貶淄川太守淄川郡淄州舊志淄州京師東北二千一百三十三里守式又翻章十二行本果作杲乙十一行本同孔本同代之上嘉敦復平海賊之功故李林甫陷之天寶二年李適之與李林甫爭權有隙適之領兵部尚書駙馬張垍為侍郎垍其冀翻林甫亦惡之惡烏路翻使人發兵部銓曹姦利事收吏六十餘人付京兆與御史對鞫之數日竟不得其情京兆尹蕭炅使法曹吉溫鞫之法曹司法參軍事掌鞫獄麗法知贓賄沒入炅火迥翻置兵部吏於外先於後廳取二重囚訊之或杖或壓號呼之聲所不忍聞號戶高翻皆曰苟存餘生乞紙盡答兵部吏素聞溫之慘酷引入皆自誣服無敢違溫意者頃刻而獄成驗囚無榜掠之迹榜音彭掠音亮六月辛亥敕誚責前後知銓侍郎及判南曹郎官而宥之文宗開成二年宰相李石奏定長宀儿選格吏部請加置南曹郎中一人別置印以新置南曹之印為文蓋吏部先以郎官判南曹開成間因置南曹郎也宋白曰南曹起於總章二年司列常伯李敬玄奏置未置已前銓中自勘責故事兩轉廳至建中元年侍郎邵說奏挾闕替南曹郎中王鋗已後遂不轉廳貞元十一年侍郎杜黃裳請準舊例轉廳後云云同上誚才笑翻均之兄溫頊之弟子也吉頊進用於武后之時溫始為新豐丞太子文學薛嶷薦溫才唐六典曰魏置太子文學魏武為丞相命司馬宣王為文學掾甚為世子所信與吳質朱鑠陳㣥為太子四友自晉之後不置至後周建德三年置太子文學十人後廢唐顯慶中始置太子文學二人屬司經局掌分知經籍侍奉文章總緝經籍繕寫裝染之功筆札給用之數皆料度之嶷魚力翻見賢遍翻顧嶷曰是一不良人朕不用也蕭炅為河南尹嘗坐事西臺遣溫往按之西臺西京御史臺也治直之翻下同及溫為萬年丞未幾炅為京兆尹幾居豈翻溫素與高力士相結力士自禁中歸溫度炅必往謝官度徒洛翻乃先詣力士與之談謔握手甚歡謔迄卻翻炅後至溫陽為驚避力士呼曰吉七不須避吉溫第七此亦吾故人也召還與炅坐炅接之甚恭不敢以前事為怨他日溫謁炅曰曩者溫不敢隳國家法自今請洗心事公炅遂與盡歡引為法曹考異曰唐曆云溫聯按大獄倚法附邪以出入人命者凡十餘年性巧詆忍而不忌失意眉睫者必引而陷之其欲膠固之雖王公大人立可親也初蕭炅以贓下獄溫深竟其罪後為萬年縣丞炅拜京兆尹溫見炅於高力士第乃與之相結為膠漆之交引為法曹而薦於林甫溫之進也反以炅力舊傳云炅為河南尹有事京臺差溫推詰堅執不捨及溫選炅已為京兆尹一唱萬年尉即就其官人為危之今參取二書用之及林甫欲除不附己者求治獄吏炅薦溫於林甫林甫得之大喜溫常曰若遇知己南山白額虎不足縛也時又有杭州人羅希奭為吏深刻林甫引之自御史臺主簿再遷殿中侍御史唐御史臺主簿從七品上掌印及受事發辰勾檢稽失兼知官廚及黃卷鍛鍊成獄無能自脫者時人謂之羅鉗吉網以鐵劫束物曰鉗鉗其廉翻天寶二年秋七月壬午冊韋昭訓女為壽王八月壬寅冊楊太真為貴考異曰統紀八月冊女道士楊氏為貴本紀甲辰唐曆甲寅今據實錄壬寅贈太真父玄琰等官甲辰甲寅皆在後恐冊在贈官前新本紀亦云八月壬寅立太真為貴今從之以其叔父玄珪為光祿卿從兄銛為殿中少監錡為駙馬都尉從才用翻下之從同銛息廉翻錡渠綺翻又魚綺翻又音奇癸卯冊武惠女為太華公主命錡尚之考異曰實錄舊傳皆以銛錡為再從兄國忠為從祖兄然則從祖亦再從也推恩之時何以及銛錡而不及國忠新傳謂之宗兄唐曆以銛為玄琰之子借使非子比於國忠必應稍親今但謂之從兄舊傳云錡為侍御史今從實錄皆賜第京師寵貴赫然楊釗貴之從祖兄也不學無行釗音昭行下孟翻為宗黨所鄙從軍於蜀得新都尉考滿家貧不能自歸新政富民鮮于仲通常資給之新都縣漢屬廣漢郡梁置始康郡西魏廢郡隋開皇十八年改新都曰興樂尋廢縣唐初復置屬蜀郡武德四年分南部相如二縣置新城縣尋避隱太子名改曰新政時屬閬中郡卒子恤翻釗往來其家遂與其中女通中讀曰仲鮮于仲通名向以字行頗讀書有材智劍南節度使章仇兼瓊引為采訪支使考異曰唐曆云為節度巡官按顏真卿所作仲通碑見存云為采訪支使今從之唐采訪節度等使幕屬有判官有支使有掌書記推官巡官衙推等宋朝始定制書記支使不得並置有出身者為書記無出身者為支使嘗從容謂仲通曰今吾獨為上所厚苟無內援必為李林甫所危聞楊新得幸人未敢附之子能為我至長安與其家相結吾無患矣仲通曰仲通蜀人未嘗遊上國恐敗公事今為公更求得一人因言釗本末兼瓊引見釗儀觀豐偉言辭敏給從千容翻為于偽翻敗補邁翻觀古玩翻兼瓊大喜即辟為推官往來浸親密乃使人獻春綈於京師將別謂曰有少物在郫少詩沼翻郫縣自漢以來屬蜀郡九域志郫縣在成都府西四十五里師古曰郫音疲以具一日之糧子過可取之釗至郫兼瓊使親信大齎蜀貨精美者遺之遺于季翻可直萬緡釗大喜過望晝夜兼行至長安歷抵諸妹以蜀貨遺之曰此章仇公所贈也時中女新寡釗遂館於其室中分蜀貨以與之於是諸楊日夜譽兼瓊且言釗善樗蒲引之見上館古玩翻譽音余見賢遍翻得隨供奉官出入禁中唐制中書門下省官皆供奉官也外官得隨朝士入見者謂之仗內供奉隨翰林院官班者謂之翰林供奉宦官謂之內供奉又有朝士供奉禁中者天寶二年九月癸未以陝郡太守江淮租庸轉運使韋堅為刑部尚書罷其諸使以御史中丞楊慎矜代之陝失冉翻使疏吏翻考異曰舊食貨志三載以楊釗為水陸運使誤也今從實錄堅妻姜氏皎之女林甫之舅子也故林甫昵之昵尼質翻及堅以通漕有寵於上遂有入相之志相息亮翻又與李適之善林甫由是惡之惡烏路翻故遷以美官實奪之權也天寶二年安祿山欲以邊功市寵數侵掠奚契丹奚契丹各殺公主以叛數所角翻下欲數數徵同所殺者蓋即靜樂宜芳也祿山討破之天寶二年隴右節度使皇甫惟明與吐蕃戰于石堡城為虜所敗副將褚誗戰死敗補邁翻誗直廉翻考異曰新傳作諸葛詡今從實錄天寶二年冬十月甲午安祿山奏臣討契丹至北平郡北平郡平州朝直遙翻將即亮翻下同遂命立廟又奏薦奠之日廟梁產芝通鑑不語怪而書安祿山飛鳥食蝗廟梁產芝之事以著祿山之欺罔明皇之昏蔽天寶二年丁酉上幸驪山溫泉天寶二年上以戶部郎中王鉷為戶口色役使敕賜百姓復除鉷戶公翻使疏吏翻復方目翻鉷奏徵其輦運之費廣張錢數又使市本郡輕貨百姓所輸乃甚於不復除舊制戍邊者免其租庸六歲而更更工衡翻時邊將恥敗士卒死者皆不申牒貫籍不除貫籍本貫之籍也斂力贍翻以有籍無人者皆為避課按籍戍邊六歲之外悉徵其租庸有併徵三十年者民無所訴上在位久用度日侈後宮賞賜無節不欲數於左右藏取之唐有左藏右藏藏徂浪翻歲貢額外錢章十二行本錢下有帛字乙十一行本同張校同云無註本亦無百億萬貯於內庫以供宮中宴賜曰此皆不出於租庸調無預經費貯丁呂翻調徒弔翻上以鉷為能富國益厚遇之鉷務為割剝以求媚中外嗟怨丙子以鉷為御史中丞京畿采訪使楊釗侍宴禁中專掌樗蒲文簿鉤校精密上賞其強明曰好度支郎唐度支郎掌判天下租賦多少之數物產豐約之宜水陸道塗之利每歲計其所出而度其所用轉運徵斂送納皆準程而節其遲速凡和糴和市皆量其貴賤均天下之貨以利於人凡金銀寶貨綾羅之屬皆折庸調以造凡天下舟車水陸載運皆具為腳直輕重貴賤平易險止而為之制凡天下邊軍有支度使以計軍資糧仗之用每歲所費皆申度支會計以長行旨為準度徒洛翻徵讀曰證又以屬王鉷鉷因奏充判官屬之欲翻天寶二年十二月戊戌上還宮還自溫泉宮還從宣翻又音如字五載丙戌七四六天寶二年春正月乙丑以隴右節度使皇甫惟明兼河西節度使李適之性疏率李林甫嘗謂適之曰華山有金礦華戶化翻西山記曰太華之山削成而四方其高五千仞其廣十里礦古猛翻采之可以富國主上未之知也他日適之因奏事言之上以問林甫對曰臣久知之但華山陛下本命王氣所在帝製華嶽碑曰予小子之生也歲景戌月仲秋膺少皞之盛德協太華之本命故常寤寐靈嶽肸響神交林甫知此旨故以誤適之而陷之王于況翻故不敢言上以林甫為愛己薄適之慮事不熟謂曰自今奏事宜先與林甫議之無得輕脫適之由是束手矣適之既失恩韋堅失權益相親密林甫愈惡之惡烏路翻初太子之立非林甫意事見二百十卷開元二十六年常有動搖東宮之志而堅又太子之兄也皇甫惟明嘗為忠王友見二百十三卷開元十八年入獻捷見林甫專權意頗不平時因見上乘間微勸上去林甫吐從暾入聲因見賢遍翻間古莧翻去羌呂翻使楊慎矜密伺其所為伺相吏翻會正月望夜太子出遊與堅相見堅又與惟明會於景龍觀道士之室景龍觀在長安城中崇仁坊申公高士廉宅西北左金吾衞神龍元年併為長寧公主宅韋庶人敗後遂立為觀仍以中宗年號為名觀古玩翻以為堅戚里不應與邊將狎暱林甫因奏堅與惟明結謀欲共立太子堅惟明下獄將即亮翻暱尼質翻下遐嫁翻林甫使慎矜與御史中丞王鉷京兆府法曹吉溫共鞫之考異曰舊林甫傳云林甫潛令慎矜伺堅隙奏上慎矜傳云鉷推堅慎矜引身中立以候望鉷恨之林甫亦憾焉二傳自相矛楯今從唐曆癸酉下制責堅以干進不已貶縉雲太守縉雲郡本括州永嘉郡元年更郡名考異曰舊紀貶括蒼太守今從實錄及舊傳間古莧翻貶播川太守播川郡播州天寶二年以王忠嗣為河西隴右節度使兼知朔方河東節度事忠嗣始在朔方河東每互市高估馬價諸胡聞之爭賣馬於唐忠嗣皆買之由是胡馬少少詩沼翻唐兵益壯及徙隴右河西復請分朔方河東馬九千匹以實之復扶又翻其軍亦壯忠嗣杖四節控制萬里天下勁兵重鎮皆在掌握與吐蕃戰於青海積石皆大捷又討吐谷渾於墨離軍虜其全部而歸吐從暾入聲谷音浴天寶二年夏四月癸未立奚酋娑固為昭信王契丹酋楷洛為恭仁王酋慈由翻娑素禾翻天寶二年己亥制自今四孟月皆擇吉日祀天地九宮天寶二年韋堅等既貶左相李適之懼自求散地散悉但翻庚寅以適之為太子少保罷政事其子衞尉少卿霅嘗盛饌召客霅文甲翻饌雛皖翻又雛戀翻客畏李林甫竟日無一人敢往者天寶二年以門下侍郎崇玄館大學士陳希烈同平章事後魏置崇玄署掌僧尼道士女冠隋以崇玄署隸鴻臚唐置諸寺觀監隸鴻臚每寺觀有監一人貞觀中廢寺觀監上元二年置漆園監尋廢開元二十五年置崇玄學於玄元皇帝廟天寶元年兩京置博士助教各一員二年改崇玄學曰崇玄館博士曰學士助教曰直學士置大學士以宰相為之領兩京玄元宮及道院宋州人以講老莊得進專用神仙符瑞取媚於上李林甫以希烈為上所愛且柔佞易制易以豉翻故引以為相凡政事一決於林甫希烈但給唯諾唯于癸翻故事宰相午後六刻乃出林甫奏今太平無事巳時即還第軍國機務皆決於私家主書抱成案詣希烈書名而已天寶二年五月壬子朔日有食之天寶二年乙亥以劍南節度使章仇兼瓊為戶部尚書諸楊引之也天寶二年秋七月丙辰敕流貶人多在道逗留自今左降官日馳十驛以上上時掌翻是後流貶者多不全矣天寶二年楊貴方有寵每乘馬則高力士執轡授鞭織繡之工專供貴院者七百人中外爭獻器服珍玩嶺南經略使張九章廣陵長史王翼廣陵郡揚州長知兩翻九章加三品翼入為戶部侍郎天下從風而靡民間歌之曰生男勿喜女勿悲君今看女作門楣凡人作室自外至者見其門楣宏敞則為壯觀言楊家因生女而宗門崇顯也或曰門以楣而撐拄言生女能撐拄門戶也歲命嶺南馳驛致之自蘇軾諸人皆云此時荔支自涪州致之非嶺南也色味不變白居易曰荔支生巴峽間樹形團團如帷蓋葉如冬青華如橘春榮實如丹夏熟朶如蒲萄核如枇杷殼如紅繒膜如紫綃瓤肉潔白如冰雪漿液甘酸如醴酪大略如彼其實過之若離本枝一日而色變二日而香變四五日外色香味盡去矣至是以妬悍不遜上怒命送歸兄銛之第悍戶罕翻又戶旰翻是日上不懌比日中猶未食左右動不稱旨橫被棰撻比必利翻及也稱尺證翻棰止橤翻橫戶孟翻高力士欲嘗上意請悉載院中儲偫送貴凡百餘車上自分御膳以賜之偫直里翻及夜力士伏奏請迎貴歸院遂開禁門而入唐六典城門郎掌京城皇城宮殿諸門開闔之節承天門擊曉鼓聽擊鐘後一刻鼓聲絕皇城門開第一鼕鼕鼓聲絕宮城門及左右延明門乾化門開第二鼕鼕鼓聲絕宮殿門開夜第一鼕鼕鼓聲絕宮殿門閉第二鼕鼕鼓聲絕宮城門閉及左右延明門皇城門閉其京城門開閉與皇城門同刻承天門擊鼓皆聽漏刻契契至乃擊待漏刻所牌到鼓聲乃絕凡皇城闔門之鑰先酉而出後戌而入開門之鑰後丑而出夜盡而入京城闔門之鑰後申而出先子而入開門之鑰後子而出先卯而入若非其時而有命啟閉則詣閤覆奏奉旨合符而開闔之殿門及城門若有敕夜開受敕人具錄須開之門宣送中書門下偫直里翻後宮莫得進矣天寶二年將作少匠韋蘭兵部員外郎韋芝為其兄堅訟冤少始照翻為于偽翻且引太子為言上益怒太子懼表請與離婚乞不以親廢法丙子再貶堅江夏別駕江夏郡鄂州舊志鄂州京師東南二千三百四十六里夏戶雅翻然上素知太子孝謹故譴怒不及李林甫因言堅與李適之等為朋黨後數日堅長流臨封適之貶宜春太守太常少卿韋斌貶巴陵太守嗣薛王琄貶夷陵別駕睢陽太守裴寬貶安陸別駕河南尹李齊物貶竟陵太守臨封郡本封州廣信郡元年更郡名宜春郡袁州巴陵郡岳州夷陵郡峽州安陸郡安州竟陵郡本復州沔陽郡元年更郡名舊志封州至京師水陸四千五百一十里岳州二千二百三十七里峽州一千八百八十八里安州京師東南二千五十一里復州一千八百里斌音彬琄胡畎翻斌安石之子琄業之子堅之甥也琄母亦令隨琄之官韋安石事武后中睿三朝業上之弟也天寶二年冬十月戊戌上幸驪山溫泉十一月乙巳還宮天寶二年贊善大夫杜有鄰唐贊善大夫正五品上掌諷誦規諫太子唐太子內官良娣正三品娣特計翻驍堅堯翻勣性狂疏好功名喜交結豪俊好呼到翻喜許記翻淄川太守裴敦復薦於北海太守李邕北海郡青州勣至京師與著作郎王曾等為友皆當時名士也勣與妻族不協欲陷之為飛語告有鄰妄稱圖讖交構東宮指斥乘輿乘繩證翻林甫令京兆士曹吉溫與御史鞫之士曹司士參軍事掌津梁舟車舍宅工藝溫令勣連引曾等入臺十二月甲戌有鄰勣及曾等皆杖死積尸大理考異曰舊紀唐曆皆作辛未今從實錄實錄云勣與其黨並伏法詔書則曰猶寬極刑俾從杖罪其王曾等各決重杖一百杜有鄰柳勣念以微親特寬殊死決一頓貶嶺南新興尉吉溫傳則云勣等杖死積尸於大理寺蓋詔雖與杖其實皆死杖下也中外震慄嗣虢王巨貶義陽司馬義陽郡申州舊志申州至京師一千七百九十六里邕之子也高祖之子虢王鳳鳳嫡孫曰嗣虢王邕監古銜翻太子亦出良娣為庶人乙亥鄴郡太守王琚坐贓貶江華司馬鄴郡本相州魏郡元年更名江華郡道州與李邕皆自謂耆舊久在外意怏怏李林甫惡其負材使氣故因事除之王琚事上於東宮贊決誅太平公主惡烏路翻六載丁亥七四七天寶二年春正月辛巳李邕裴敦復皆杖死邕才藝出衆盧藏用常語之曰君如干將莫邪語牛倨翻干將莫邪吳王所鑄寶劍難與爭鋒然終虞缺折耳折而設翻邕不能用林甫又奏分遣御史即貶所賜皇甫惟明韋堅兄弟等死羅希奭自青州如嶺南所過殺遷謫者希奭既殺李邕於青州遂如嶺南也排馬牒至宜春御史所過沿路郡縣給驛馬故未至先有排馬牒仰藥自殺至江華王琚仰藥不死聞希奭已至即自縊希奭又迂路過安陸欲怖殺裴寬怖普布翻寬向希奭叩頭祈生希奭不宿而過乃得免李適之子霅迎父喪至東京李林甫令人誣告霅杖死於河南府給事中房琯坐與適之善貶宜春太守琯融之子也房融見二百七卷武后長安四年林甫恨韋堅不已遣使於循河及江淮州縣求堅罪使疏吏翻收章十二行本收上有所在二字乙十一行本同張校同繫綱典船夫溢於牢獄十船為一綱以吏為綱典船夫輓船及駕船之夫也延及鄰伍皆裸露死於公府裸郎果翻至林甫薨乃止天寶二年丁亥上享太廟戊子合祭天地於南郊赦天下制免百姓今載田租又令削絞斬條上慕好生之名故令應絞斬者皆重杖流嶺南其實有司率杖殺之又令天下為嫁母服三載載子亥翻好呼到翻為于偽翻下即為同上欲廣求天下之士命通一藝以上皆詣京師李林甫恐草野之士對策斥言其姦惡建言舉人多卑賤愚聵聵五怪翻恐有俚言汚濁聖聽乃令郡縣長官精加試練灼然超絕者具名送省委尚書覆試御史中丞監之監古銜翻取名實相副者聞奏既而至者皆試以詩賦論遂無一人及第者林甫乃上表賀野無遺賢天寶二年戊寅以范陽平盧節度使安祿山兼御史大夫祿山體充肥腹垂過膝嘗自稱腹章十二行本無腹字乙十一行本同重三百斤外若癡直內實狡黠常令其將劉駱谷留京師詗朝廷指趣動靜皆報之黠下八翻詗翾正翻有所候伺也或應有牋表者駱谷即為代作通之歲獻俘虜雜畜奇禽異獸珍玩之物畜許救翻不絕於路郡縣疲於遞運祿山在上前應對敏給雜以詼諧上嘗戲指其腹曰此胡腹中何所有其大乃爾對曰更無餘物正有赤心耳上悅又嘗命見太子祿山不拜左右趣之拜趣讀曰促祿山拱立曰臣胡人不習朝儀不知太子者何官朝直遙翻上曰此儲君也朕千秋萬歲後代朕君汝者也祿山曰臣愚曏者惟知有陛下一人不知乃更有儲君不得已然後拜上以為信然益愛之上嘗宴勤政樓百官列坐樓下獨為祿山於御座東間設金雞障障坐障也畫金雞為飾為于偽翻仍命卷簾以示榮寵卷讀曰捲命楊銛楊錡貴三姊皆與祿山敍兄弟祿山得出入禁中因請為貴兒上與貴共坐祿山先拜貴上問何故對曰胡人先母而後父上悅天寶二年李林甫以王忠嗣功名日盛恐其入相相息亮翻忌之安祿山潛蓄異志託以禦寇築雄武城薊州廣漢川有雄武軍貯丁呂翻請忠嗣助役因欲留其兵忠嗣先期而往不見祿山而還數上言祿山必反林甫益惡之為王忠嗣得罪張本先悉薦翻數所角翻上時掌翻惡烏路翻四月忠嗣固辭兼河東朔方節度許之天寶二年冬十月己酉上幸驪山溫泉考異曰舊紀唐曆皆作戊申今從之天寶二年河西隴右節度使王忠嗣以部將哥舒翰為大斗軍副使李光弼為河西兵馬使充赤水軍使兵馬使節鎮衙前軍職也總兵權任甚重至德以後都知兵馬使率為藩鎮儲帥將即亮翻使疏吏翻西突厥五弩失畢有哥舒闕俟斤騎奇寄翻酋慈由翻長知兩翻契丹王楷洛之子也開元初李楷洛封為契丹王忠嗣使翰擊吐蕃有同列為之副倨慢不為用翰檛殺之軍中股慄檛則瓜翻累功至隴右節度副使每歲積石軍麥熟吐蕃輒來穫之穫戶郭翻無能禦者邊人謂之吐蕃麥莊翰先伏兵於其側虜至斷其後夾擊之斷音短無一人得返者自是不敢復來復扶又翻上欲使王忠嗣攻吐蕃石堡城石堡城陷見上卷開元二十九年石堡險固吐蕃舉國守之今頓兵其下非殺數萬人不能克臣恐所得不如所亡不如且厲兵秣馬俟其有釁然後取之上意不快將軍董延光自請將兵取石堡城請將即亮翻上命忠嗣分兵助之忠嗣不得已奉詔而不盡副延光所欲延光怨之李光弼言於忠嗣曰大夫以愛士卒之故不欲成延光之功唐中世以前率呼將帥為大夫白居易詩所謂武官稱大夫是也實奪其謀也何以知之今以數萬衆授之而不立重賞士卒安肯為之盡力乎為于偽翻然此天子意也彼無功必歸罪於大夫大夫軍府充牣何愛數萬段帛不以杜其讒口乎忠嗣曰今以數萬之衆爭一城得之未足以制敵不得亦無害於國故忠嗣不欲為之忠嗣今受責天子不過以金吾羽林一將軍歸宿衞其次不過黔中上佐黔中一道皆溪峒蠻傜雜居貶謫而不過嶺者處之上佐長史司馬也黔音琴李將軍子誠愛我矣然吾志決矣子勿復言光弼曰曏者恐為大夫之累復扶又翻累力瑞翻故不敢不言今大夫能行古人之事非光弼所及也遂趨出延光過期不克言忠嗣沮撓軍計沮在呂翻撓女教翻上怒李林甫因使濟陽別駕魏林告忠嗣嘗自言我幼養宮中與忠王相愛狎武德四年分東平之盧縣置濟州隋之濟北郡也天寶元年改曰濟陽郡忠嗣年九歲父海賓戰死於渭源長城堡帝養忠嗣宮中太子時為忠王與之遊處魏林先為朔州刺史忠嗣節度河東朔州其巡屬也故使林譖之以示言有所自來濟子禮翻敕徵忠嗣入朝朝直遙翻委三司鞫之上聞哥舒翰名召見華清宮見賢遍翻與語悅之十一月辛卯以翰判西平太守充隴右節度使以朔方節度使安思順判武威郡事充河西節度使西平郡鄯州武威郡涼州天寶二年戶部侍郎兼御史中丞楊慎矜為上所厚李林甫浸忌之慎矜與王鉷父晉中表兄弟也少與鉷狎少詩照翻鉷之入臺頗因慎矜推引及鉷遷中丞慎矜與語猶名之鉷自恃與林甫善意稍不平慎矜奪鉷職田俱為中丞因併鉷職田奪而有之慎矜嘗以語人語牛倨翻鉷深銜之慎矜猶以故意待之嘗與之私語讖書讖楚譖翻慎矜與術士史敬忠善敬忠言天下將亂勸慎矜於臨汝山中買莊為避亂之所臨汝郡本伊州襄城郡貞觀八年更伊州曰汝州天寶元年更郡名為臨汝郡慎矜惡之惡烏路翻以問敬忠敬忠請禳之禳如羊翻設道場於後園慎矜退朝輒躶貫桎梏坐其中朝直遙翻躶郎果翻旬日血止慎矜德之慎矜有侍婢明珠色美敬忠屢目之慎矜即以遺敬忠車載過貴姊柳氏樓下姊邀敬忠上樓求車中美人敬忠不敢拒明日姊入宮以明珠自隨上見而異之問所從來明珠具以實對上以慎矜與術士為妖法惡之含怒未發楊釗以告鉷鉷心喜因侮慢慎矜慎矜怒林甫知鉷與慎矜有隙密誘使圖之遺于季翻上時掌翻惡烏路翻誘音酉考異曰明皇雜錄曰慎矜父墓封域之內草木流血慎矜大懼問術者史敬思敬思曰禳之可以免於慎矜後園大陳法事令貫桎梏坐於叢林間以厭之唐曆云敬思本胡人出家還俗涉獵書傳陰陽玄象慎矜與之善每言天下將亂居於臨汝山中亦勸慎矜於臨汝買得山莊良田數十頃嘗於慎矜第夜坐談宴怒婢春草將杖殺之敬思曰七郎何須虛殺卻十頭壯牛慎矜曰何謂也敬思曰賣卻買牛每年耕田十頃慎矜雅厚敬思曰任公收取明旦至市賣與太真柳氏姊得錢百二十千文買牛以歸柳氏數將春草來往宮中玄宗見其狀貌壯大應對分明數目之謂柳曰幾錢買得此婢以實對遂留之玄宗曾晝寢問春草曰汝本何人何以得至柳家春草曰本楊慎矜婢賣與柳家玄宗曰慎矜豈少錢而賣你春草曰不是要錢本將殺某敬思救得不殺所以賣之玄宗素聞敬思名因詰問春草以實對曰每夜坐中庭或說天文遙指宿曜某亦盡知其言玄宗怒變色良久後王鉷因奏事言引慎矜玄宗悖然曰慎矜與卿有親更不須相往來鉷初內怨慎矜淩己常忍隱不泄至是覺上意異楊釗先知之以告鉷鉷心喜數悖慢以侵之慎矜尤怒明皇雜錄又曰慎矜之侍婢有美者字明珠敬思數目之慎矜即以遺之兼以囊裝甚厚以車送之敬思乘馬隨之路經貴妹八姨樓下方登樓張樂姨素與敬思相識固邀敬思登樓乃曰車中美人請以見遺敬思不敢拒姨明日入宮婢從上見而異之問所從來明珠曰本楊慎矜家人也近贈史敬思上曰敬思何人而慎矜輒贈以婢明珠乃具言厭勝之事上大怒曰彼為妖乎遂告林甫林甫素忌慎矜才恐其作相以告中丞吉溫溫險害亦有憾於慎矜因構成其事今參取書之鉷乃遣人以飛語告慎矜隋煬帝孫慎矜隋煬帝之玄孫家有讖書謀復祖業上大怒收慎矜繫獄命刑部大理與侍御史楊釗殿中侍御史盧鉉同鞫之太府少卿張瑄慎矜所薦也盧鉉誣瑄嘗與慎矜論讖拷掠百端瑄不肯答辯瑄音宣掠音亮辯者鞫問之辭今人謂之問頭乃以木綴其足使人引其枷柄向前挽之身加長數尺腰細欲絕眼鼻出血瑄竟不答又使吉溫捕史敬忠於汝州敬忠與溫父素善溫之幼也敬忠常抱撫之及捕獲溫不與交言鎖其頸以布蒙首驅之馬前至戲水戲水在新豐東戲許宜翻楊慎矜已款服惟須子一辯若解人意則生解戶買翻不然必死前至溫湯則求首不獲矣溫湯即謂會昌時置會昌縣於溫泉宮下首式救翻謂自首其事或曰首如字七郎求一紙溫陽不應去溫湯十餘里敬忠祈請哀切乃於桑下令答三紙辯皆如溫意溫徐謂曰丈人且勿怪因起拜之至會昌天寶元年改驪山曰會昌山三載以新豐縣去華清宮遠分新豐萬年置會昌縣是年改溫泉曰華清宮治湯井為池環山列宮室又築羅城置百司及十宅以敬忠為證慎矜皆引服惟搜讖書不獲林甫危之使盧鉉入長安搜慎矜家鉉袖讖書入闇中詬而出曰詬古候翻逆賊深藏祕記至會昌以示慎矜慎矜歎曰吾不蓄讖書此何從在吾家哉吾應死而已丁酉賜慎矜及兄少府少監慎餘洛陽令慎名自盡敬忠杖百妻子皆流嶺南瑄杖六十流臨封死於會昌嗣虢王巨雖不預謀坐與敬忠相識解官南賓安置南賓郡忠州本巴郡之臨江縣隋義寧二年置臨州貞觀八年改忠州天寶元年改為郡舊志忠州京師南二千一百二十二里慎名聞敕神色不變為書別姊慎餘合掌指天而縊天寶二年三司按王忠嗣上曰吾兒居深宮安得與外人通謀此必妄也考異曰新傳李林甫屢白太子宜有謀上云云按林甫雖志欲害太子亦未肯自言之今不取劾戶概翻又戶得翻沮在呂翻撓奴巧翻又奴教翻哥舒翰之入朝也或勸多齎金帛以救忠嗣翰曰若直道尚存王公必不冤死如其將喪喪息浪翻多賂何為遂單囊而行三司奏忠嗣罪當死翰始遇知於上力陳忠嗣之冤且請以己官爵贖忠嗣罪上起入禁中翰叩頭隨之言與淚俱上感寤己亥貶忠嗣漢陽太守漢陽郡沔州天寶二年李林甫屢起大獄別置推事院於長安以楊釗有掖庭之親掖音亦出入禁闥所言多聽乃引以為援擢為御史事有微涉東宮者皆指擿使之奏劾付羅希奭吉溫鞫之釗因得逞其私志所擠陷誅夷者數百家皆釗發之擿他歷翻擠子西翻又子細翻幸太子仁孝謹靜張垍高力士常保護於上前故林甫終不能間也間古莧翻考異曰明皇雜錄云上與李林甫議立太子意屬忠王林甫從容言於上曰古者建立儲君必推賢德苟非有大勳於社稷則惟元子上默然曰朕長子琮往年因獵苑中所傷面目尤甚林甫曰破面不猶愈於破國乎陛下其圖之上微感其言徐思之林甫亦素知其有疾意欲動搖肅宗而託附武惠因以壽王瑁為請竟以肅宗孝友聰明中外所屬故姦邪之計莫得行焉按是時忠王若未為太子上用林甫之言則琮為太子矣安能及瑁新書李林甫傳云林甫數危太子未得志一日從容曰古者立儲君非有大勳於宗稷則莫若元子帝久之曰慶王往年獵為豽傷面甚答曰破面不愈於破國乎帝頗惑曰朕徐思之此則情理似近然新書此事必出於雜錄若太子已立則不當云上與林甫議立太子意屬忠王也今雜錄本於所傷字上脫為豽兩字別本必有之按說文豽獸名無前足此非常有之物或者豹字誤為豽字耳事既可疑今不取天寶二年十二月壬戌發馮翊華陰民夫築會昌城置百司華陰郡華州馮翊郡同州華戶化翻土畝直千金癸亥上還宮天寶二年丙寅命百官閱天下歲貢物於尚書省既而悉以車載賜李林甫家上或時不視朝朝直遙翻百司悉集林甫第門臺省為空陳希烈雖坐府無一人入謁者林甫子岫為將作監唐初曰將作大匠龍朔改曰繕工監光宅改曰營繕監神龍復曰將作監嘗從林甫遊後園指役夫言於林甫曰大人久處鈞軸怨仇滿天下一朝禍至欲為此得乎林甫不樂曰勢已如此將若之何先是宰相皆以德度自處不事威勢騶從不過數人士民或不之避林甫自以多結怨常虞刺客出則步騎百餘人為左右翼金吾靜街前驅在數百步外公卿走避居則重關複壁處昌呂翻樂音洛先悉薦翻騶則尤翻從才用翻騎奇寄翻下同重直龍翻以石甃地甃則又翻牆中置板如防大敵一夕屢徙牀雖家人莫知其處宰相騶從之盛自林甫始天寶二年初將軍高仙芝本高麗人麗力知翻從軍安西仙芝驍勇善騎射驍堅堯翻節度使夫蒙靈詧屢薦至安西副都護都知兵馬使充四鎮節度副使吐蕃以女妻小勃律王小勃律去長安九千里而贏距吐蕃贊普牙三千里妻七細翻皆附吐蕃貢獻不入前後節度使討之皆不能克制以仙芝為行營節度使將萬騎討之將即亮翻自安西行百餘日乃至特勒滿川分軍為三道特勒滿川即五識匿國所居三道一由北谷道一由赤佛道仙芝自由護密道自護密勒城南至小勃律國都五百里連雲堡南依山北據娑勒川以為固近其靳翻不意唐兵猝至大驚依山拒戰礮櫑如雨仙芝以郎將高陵李嗣業為陌刀將礮匹貌翻櫑盧對翻礮即砲石杜佑曰櫑木長五尺徑一尺小至六七寸唐六典武庫令掌兵器辨其名數以備國用刀之制有四曰儀刀曰障刀曰橫刀曰陌刀儀刀蓋古斑劍之類宋晉以來謂之御刀後魏曰長刀皆施龍鳳環至隋謂之儀刀裝飾以金銀羽儀所執鄣刀蓋用以鄣身以禦敵橫刀佩刀也兵士所佩名亦起於隋陌刀長刀也步兵所持蓋古之斬馬劍令之曰不及日中決須破虜嗣業執一旗引陌刀緣險先登力戰自辰至巳大破之考異曰舊嗣業傳云天寶七載今從實錄及封常清傳捕虜千餘人餘皆逃潰中使邊令誠以入虜境已深懼不敢進邊令誠時為監軍使疏吏翻羸倫為翻復進三日至坦駒嶺下峻阪四十餘里復扶又翻前有阿弩越城仙芝恐士卒憚險不肯下先令人胡服詐為阿弩越城守者迎降降戶江翻云阿弩越赤心歸唐娑夷水藤橋已斫斷矣娑夷水即弱水也小勃律王居孽多城臨娑夷水娑素禾翻勝音升藤橋者通吐蕃之路也仙芝陽喜士卒乃下又三日阿弩越城迎者果至明日仙芝入阿弩越城遣將軍席元慶將千騎前行謂曰小勃律聞大軍至其君臣百姓必走山谷走音奏第呼出取繒帛稱敕賜之繒慈陵翻大臣至盡縛之以待我元慶如其言悉縛諸大臣王及吐蕃公主逃入石窟取不可得仙芝至斬其附吐蕃者大臣數人藤橋去城猶六十里仙芝急遣元慶往斫之甫畢吐蕃兵大至已無及矣藤橋闊盡一矢力脩之期年乃成八月仙芝虜小勃律王及吐蕃公主而還九月至連雲堡與邊令誠俱月末至播密川遣使奏狀奏捷狀於京師使疏吏翻至河西此河西白馬河西也自安西西出柘厥關渡白馬河一不迎勞一猶言一切也勞力到翻噉狗糞高麗奴噉徒濫翻又徒覽翻汝官皆因誰得而不待我處分處昌呂翻分扶問翻亶奏捷書高麗奴汝罪當斬但以汝新有功不忍耳仙芝但謝罪邊令誠奏仙芝深入萬里立奇功今旦夕憂死齊思和標點聶崇岐覆校
