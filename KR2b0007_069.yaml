body:
  text: 資治通鑑卷第六十九翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註魏紀一盡玄黓攝提格壬寅凡三年黃初元年操破袁尚得冀州遂居於鄴鄴漢之魏郡治所魏大名也遂封為魏公又讖云代漢者當塗高當塗高者魏也文帝受漢禪國遂號魏世祖文皇帝上諱丕字子桓武王操長子也諡法學勤好問曰文世祖廟號也禮祖有功而宗有德諡法景物四方曰世承命不遷曰世靖民則法曰皇明一德者曰皇明一合道曰皇德象天地曰帝按道無為曰帝黃初元年庚子二二魏受漢禪推五德之運以土繼火土色黃故紀元曰黃初是年十月受禪方改元黃初元年春正月武王至洛陽庚子薨魏王操諡曰武難眩以偽眩者目無常主難眩以偽謂人不能亂其明不拘微賤隨能任使皆獲其用與敵對陳陳讀曰陣意思安閑思相吏翻如不欲戰然及至決機乘勝氣勢盈溢勳勞宜賞不吝千金無功望施施式豉翻分豪不與豪即毫字有犯必戮或對之流涕然終無所赦雅性節儉不好華麗好呼到翻故能芟刈㣥雄幾平海內曰幾者以不能幷吳蜀也芟所銜翻幾居希翻是時太子在鄴軍中騷動㣥僚欲祕不發喪諫議大夫賈逵以為事不可祕乃發喪或言宜易諸城守悉用譙沛人曹氏沛國譙人小見者以鄉人為可信也守式又翻下同今者遠近一統人懷效節何必專任譙沛以沮宿衞者之心乃止沮在呂翻青州兵亶擊鼓相引去青州兵獻帝初平三年操破黃巾所降者不從者討之賈逵曰不可為作長檄令所在給其稟食為于偽翻下上為下為同稟讀日廩食如字長檄猶今軍行所至幫券也鄢陵侯彰從長安來赴操自漢中還師而東彰定代而西迎操因留彰長安鄢陸德明謁晚翻又於建翻師古音偃璽斯氏翻綬音受逵正色曰國有儲副先王璽綬非君侯所宜問也凶問至鄴太子號哭不已號戶刀翻中庶子司馬孚諫曰續漢志太子中庶子秩六百石職如侍中君王晏駕天下恃殿下為命當上為宗廟下為萬國柰何效匹夫孝也太子良久乃止曰卿言是也時㣥臣初聞王薨相聚哭無復行列行戶剛翻孚厲聲於朝曰朝直遙翻今君王違世天下震動當早拜嗣君以鎮萬國而但哭邪乃罷㣥臣備禁衞治喪事孚懿之弟也治直之翻㣥臣以為太子即位當須詔命謂須待漢帝詔命也王薨于外天下惶懼太子宜割哀即位以繫遠近之望且又愛子在側愛子謂鄢陵侯彰也則社稷危矣即具官備禮一日皆辨辨與辦同蜀本作辦以王后令策太子即王位大赦漢帝尋遣御史大夫華歆奉策詔授太子丞相印綬魏王璽綬領冀州牧華戶化翻於是尊王后曰王太后黃初元年改元延康此漢改元魏志也黃初元年二月丁未朔日有食之黃初元年壬戌以太中大夫賈詡為太尉御史大夫華歆為相國大理王朗為御史大夫黃初元年丁卯葬武王于高陵高陵在鄴城西操遺令曰汝等時時登銅雀臺望吾西陵墓田魏紀載操令曰規西門豹祠西原上為陵黃初元年王弟鄢陵侯彰等皆就國臨菑監國謁者灌均希指奏臨菑侯植醉酒悖慢劫脅使者時禁切藩侯使謁者監其國監古銜翻悖蒲內翻又蒲沒翻王貶植為安鄉侯誅右刺姦掾沛國丁儀王莽置左右刺姦以督姦猾光武中興亦置刺姦將軍然公府掾無其員也魏晉公府始有營軍刺姦等員掾俞絹翻幷男口誅之絕其世也廙逸職翻又羊至翻魚豢論曰諺言貧不學儉卑不學恭非人性分殊也分扶問翻勢使然耳假令太祖防遏植等在於疇昔此賢之心何緣有窺望乎彰之挾恨尚無所至至於植者豈能興難難乃旦翻乃令楊脩以倚注遇害丁儀以希意族滅哀夫黃初元年初置散騎常侍侍郎各四人散騎常侍秦官也秦置散騎又置中常侍散騎騎從乘輿車後中常侍得入禁中皆以為加官漢東京初省散騎而中常侍用宦者至是初置散騎合之於中常侍為一官曰散騎常侍掌規諫不典事貂璫插右騎而散從後遂為顯職散騎侍郎自魏至晉與散騎常侍侍中黃門侍郎共平尚書奏事江左乃罷謂左右中尚方中黃左右藏左校甄官奚官黃門掖庭永巷御府鉤盾中藏府內者等署也藏之石室時當選侍中常侍王左右舊人諷主者便欲就用不調餘人調徒弔翻司馬孚曰今嗣王新立當進用海內英賢如何欲因際會自相薦舉邪官失其任得者亦不足貴也遂他選黃初元年尚書陳㣥以天朝選用不盡人才天朝謂漢朝也朝直遙翻州郡皆置中正以定其選擇州郡之賢有識鑒者為之區別人物第其高下九品中正自此始九品上上上中上下中上中中中下下上下中下下也別彼列翻黃初元年夏五月戊寅漢帝追尊王祖太尉曰太王王祖漢太尉曹嵩也黃初元年王以安定太守鄒岐為涼州刺史西平麴演結旁郡作亂以拒岐張掖張進執太守杜通酒泉黃華不受太守辛機皆自稱太守以應演誅韓遂者麴演也蓋威行涼部久矣故進等皆應之種章勇翻復扶又翻武威太守毋丘興毌丘複姓也則將救之郡人皆以為賊勢方盛宜須大軍時將軍郝昭魏平先屯金城受詔不得西渡金城與武威張掖酒泉隔河今賊雖盛然皆新合或有脅從未必同心因釁擊之善惡必離離而歸我我增而彼損矣既獲益衆之實且有倍氣之勢率以進討破之必矣若待大軍曠日彌久善人無歸必合於惡善惡既合勢難卒離卒讀曰猝雖有詔命違而合權專之可也昭等從之乃發兵救武威降其三種胡降戶江翻下同與毋丘興擊張進於張掖麴演聞之將步騎三千迎則辭來助軍實欲為變則誘而斬之誘音酉出以徇軍其黨皆散走則遂與諸軍圍張掖破之斬進黃華懼乞降據裴松之註華即後為兗州刺史奏王淩者也事見七十五卷邵陵厲公嘉平三年初敦煌太守馬艾卒官敦徒門翻卒子恤翻下同郡人推功曹張恭行長史事恭遣其子就詣朝廷請太守會黃華張進叛欲與敦煌幷勢執就劫以白刃就終不回私與恭疏曰大人率厲敦煌忠義顯然豈以就在困厄之中而替之哉今大軍垂至但當促兵以掎之耳掎舉綺翻從後牽曰掎又云偏引曰掎願不以下流之愛使就有恨於黃壤也論語曰君子惡居下流天下之惡皆歸焉謂下流當惡居而不當愛也一曰流輩也牽於父子之愛而廢君臣之義是常人之流下一等見識故曰下流之愛別遣鐵騎二百及官屬緣酒泉北塞東迎太守尹奉黃華欲救張進而西顧恭兵恐擊其後故不得往而降就卒平安奉得之郡詔賜恭爵關內侯黃初元年六月庚午王引軍南巡黃初元年秋七月孫權遣使奉獻黃初元年蜀將軍孟達屯上庸與副軍中郎將劉封不協封侵陵之達率部曲四千餘家來降達有容止才觀觀工玩翻王甚器愛之引與同輦以達為散騎常侍建武將軍封平陽亭侯合房陵上庸西城三郡為新城蜀分三郡見上卷漢獻帝建安二十四年委以西南之任行軍長史劉曄曰時魏王引軍南巡以曄為長史達有苟得之心而恃才好術好呼到翻必不能感恩懷義新城與孫劉接連蜀之漢中吳之宜都皆與新城接連為國生患王不聽為孟達叛魏張本為于偽翻上庸太守申耽叛封來降封破走還成都初封本羅侯寇氏之子漢中王初至荊州以未有繼嗣養之為子諸葛亮慮封剛猛易世之後終難制御勸漢中王因此際除之遂賜封死黃初元年武都氐王楊僕率種人內附種章勇翻黃初元年甲午王次于譙大饗六軍及譙父老于邑東設伎樂百戲伎巨綺翻吏民上壽日夕而罷孫盛曰三年之喪自天子達于庶人故雖三季之末謂三代之季也秦趙韓魏齊楚燕為戰國七雄釋麻杖於反哭之日者也麻絰也居父喪苴杖禮既葬而反哭檀弓曰反哭升堂反諸其所作也反哭之弔也哀之至也反而亡焉失之矣於是為甚衰倉回翻變易古制事見十五卷文帝後七年一旦而廢固已道薄於當年風頹於百代矣魏王既追漢制替其大禮處莫重之哀處昌呂翻而設饗宴之樂居貽厥之始而墮王化之基夏書曰有典有則貽厥子孫墮讀曰隳顯納二女獻帝之禪也冊詔魏王曰漢承堯運有傳聖之義釐降二女以嬪于魏卜世之期促也黃初元年王以丞相祭酒賈逵為豫州刺史豫州統潁川汝陰汝南梁國沛郡譙郡魯郡弋陽安豐等郡晉地理志曰魏武分沛郡立譙郡分汝南立汝陰郡合陳郡於梁國沈約志曰弋陽縣本屬汝南魏文帝分立郡又分廬江為安豐郡刺史多不能攝郡攝總錄也州本以六條詔書察二千石以下舉漢制也有督察之才不言安靜寬仁有愷悌之德也今長吏慢法盜賊公行州知而不糾天下復何取正乎復扶又翻其二千石以下阿縱不如法者皆舉奏免之外脩軍旅內治民事治直之翻興陂田通運渠吏民稱之王曰逵真刺史矣布告天下當以豫州為法賜逵爵關內侯黃初元年左中郎將李伏太史丞許芝表言魏當代漢見於圖緯其事衆甚據獻帝傳李伏引孔子玉板許芝引春秋漢含孳玉板讖佐助期孝經中黃讖易運期讖時勸進者辛毗劉曄傅巽衞臻桓階陳矯陳㣥蘇林董巴繼之者司馬懿鄭渾羊祕鮑勛冬十月乙卯漢帝告祠高廟使行御史大夫張音持節奉璽綬詔冊禪位于魏王三上書辭讓乃為壇於繁陽時南巡至潁川潁陰縣築壇於曲蠡之繁陽亭述征記曰其地在許南七十里東有臺高七丈方五十步南有壇高二丈方三十步即受終之壇也是年以繁陽為繁昌縣辛未升壇受璽綬即皇帝位考異曰陳志云丙午行至曲蠡漢帝禪位庚午升壇即祚袁紀亦云庚午魏王即位按獻帝紀乙卯始發禪冊二十九日登壇受命又文帝受禪碑至今尚在亦云辛未受禪陳志袁紀誤也范書云魏遣使求璽綬曹皇后不與如此數輩后乃呼使者以璽抵軒下因涕泣橫流曰天不祚爾左右皆莫能仰視按此乃前漢元后事且璽綬無容在曹后之所此說妄也改元大赦十一月癸酉奉漢帝為山陽公山陽縣屬河內郡用天子禮樂封公四子為列侯追尊太王曰太皇帝武王曰武皇帝廟號太祖尊王太后曰皇太后以漢諸侯王為崇德侯列侯為關中侯㣥臣封爵增位各有差改相國為司徒御史大夫為司空漢獻帝建安十三年罷三公官今復舊帝欲改正朔侍中辛毗曰魏氏遵舜禹之統應天順民至於湯武以戰伐定天下乃改正朔孔子曰行夏之時左氏傳曰夏數為得天正何必期於相反帝善而從之自是之後遂皆以建寅為正傳直戀翻多抑損前朝朝直遙翻散騎常侍衞臻獨明禪授之義稱揚漢美帝數目臻曰數所角翻天下之珍當與山陽共之帝欲追封太后父母尚書陳㣥奏曰陛下以聖德應運受命創業革制當永為後式按典籍之文無婦人分土命爵之制在禮典婦因夫爵禮記婦人無爵從夫之爵漢氏因之非先王之令典也帝曰此議是也其勿施行仍著定制藏之臺閣臺閣尚書中藏故事之處黃初元年十二月初營洛陽宮戊午帝如洛陽裴松之曰按諸書記是時帝居北宮以建始殿朝㣥臣門曰承明陳思王植詩謁帝承明廬是也至明帝時始於漢南宮崇德殿處起太極昭陽諸殿魏略曰漢火行也火忌水故洛去水而加隹魏於行次為土土水之牡也水得土而流土得水而柔故除隹加水變雒為洛黃初元年帝謂侍中蘇則曰前破酒泉張掖西域通使敦煌使疏吏翻敦徒門翻獻徑寸大珠可復求市益得不復扶又翻不讀曰否則對曰若陛下化洽中國德流沙幕即不求自至求而得之不足貴也帝嘿然黃初元年帝召東中郎將蔣濟為散騎常侍時有詔賜征南將軍夏侯尚曰卿腹心重將重將即亮翻特當任使作威作福殺人活人尚以示濟濟至帝問以所聞見對曰未有他善但見亡國之語耳帝忿然作色而問其故濟具以答因曰夫作威作福書之明誡書洪範曰臣無有作威作福臣而有作威作福其害于而家凶于而國古人所慎惟陛下察之帝即遣追取前詔黃初元年帝欲徙冀州士卒家十萬戶實河南時營洛陽故欲徙冀州士卒家以實之民饑㣥司以為不可而帝意甚盛侍中辛毗與朝臣俱求見見賢遍翻帝知其欲諫作色以待之皆莫敢言毗曰陛下欲徙士家其計安出帝曰卿謂我徙之非邪毗曰誠以為非也帝曰吾不與卿議也毗曰陛下不以臣不肖置之左右廁之謀議之官侍中於周為常伯之任在天子左右備切問近對拾遺補闕臣所言非私也乃社稷之慮也安得怒臣帝不答起入內毗隨而引其裾帝遂奮衣不還良久乃出曰佐治卿持我何太急邪辛毗字佐治治直吏翻今徙既失民心又無以食也故臣不敢不力爭帝乃徙其半帝嘗出射雉顧㣥臣曰射雉樂哉毗對曰於陛下甚樂於㣥下甚苦帝默然後遂為之稀出射而亦翻樂音洛為于偽翻二年黃初二年春正月以議郎孔羨為宗聖侯奉孔子祀漢平帝元始元年封褒成君孔霸曾孫均為褒成侯奉孔子祀王莽敗失國光武建武十三年復封均子志為褒成侯志子損和帝永元四年徙封褒亭侯世世相傳至獻帝初國絕魏封孔子二十一世孫羨為宗聖侯邑百戶晉封二十三世孫震為奉聖亭侯後魏封二十七世孫乘為崇聖大夫孝文太和十九年幸魯又改封二十八世孫珍為崇聖侯北齊改封三十一世孫為恭聖侯周武帝平齊改封鄒國公隋文帝仍舊封鄒國公煬帝改封為紹聖侯唐太宗貞觀十一年封孔子裔孫倫為褒聖侯黃初二年三月加遼東太守公孫恭車騎將軍恭公孫度次子康之弟也黃初二年初復五銖錢漢獻帝初平元年董卓壞五銖錢今復之黃初二年蜀中傳言漢帝已遇害於是漢中王發喪制服諡曰孝愍皇帝㣥下競言符瑞勸漢中王稱尊號前部司馬費詩上疏曰時費詩為益州前部司馬費父沸翻殿下以曹操父子偪主篡位故乃羈旅萬里糾合士衆將以討賊今大敵未克而先自立恐人心疑惑昔高祖與楚約先破秦者王之王于況翻及屠咸陽獲子嬰猶懷推讓推吐雷翻況今殿下未出門庭便欲自立邪愚臣誠不為殿下取也為于偽翻王不悅左遷詩為部永昌從事為益州刺史部從事部永昌郡四月丙午漢中王即皇帝位於武擔之南蜀本紀曰武都有丈夫化為女子顏色美好蓋山精也蜀王娶以為妻不習水土疾病欲歸國蜀王留之無幾物故蜀王發卒之武都擔土於成都郭中葬蓋地數畝高十丈號曰武擔也裴松之曰按武擔山在成都西北蓋以乾位在西北故就之以即祚杜佑曰武擔山在蜀郡西改元章武以諸葛亮為丞相許靖為司徒臣光曰天生烝民其勢不能自治必相與戴君以治之治直之翻苟能禁暴除害以保全其生賞善罰惡使不至於亂斯可謂之君矣溫公之說正祖周書所謂撫我則后虐我則讎之意白虎通曰君者㣥也㣥下之所歸心也海內諸侯何啻萬國黃帝置左右大監監于萬國禹會諸侯於塗山執玉帛者萬國有民人社稷者通謂之君合萬國而君之立法度班號令而天下莫敢違者乃謂之王王德既衰強大之國能帥諸侯以尊天子者則謂之霸帥讀曰率故自古天下無道諸侯力爭或曠世無王者固亦多矣如共工氏在伏羲神農之間秦在周漢之間皆謂之霸而不王所謂曠世無王也又如有窮之於夏共和之於周亦曠世而無王也漢興學者始推五德生勝以秦為閏位在木火之間霸而不王於是正閏之論興矣孟康曰秦推五勝以周為火用水勝之漢儒以庖犧繼天而王為百王首德始於木共工氏霸九域雖有水德在木火之間非其序也故霸而不王神農氏以火承木故為炎帝神農氏沒黃帝氏作火生土故為土德少昊黃帝之子土生金故為金德少昊之衰顓頊受之金生水故為水德顓頊之所建帝嚳受之水生木故為木德高辛氏衰天下歸堯木生火故為火德堯嬗舜火生土故為土德舜嬗禹土生金故為金德湯伐桀纘禹金生水故為水德周伐商水生木故為木德漢伐秦繼周木生火故為火德共工及秦不在五德相生之正運故曰閏位三國鼎跱晉氏失馭五胡雲擾宋魏以降南北分治各有國史互相排黜南謂北為索虜北為章甲十六行本為作謂乙十一行本同熊校同南為島夷索虜者以北人辮髮謂之索頭也島夷者以東南際海土地卑下謂之島中也四方幅裂朱邪入汴比之窮新唐莊宗自以為繼唐比朱梁於有窮篡夏新室篡漢皆棄而不數此皆私己之偏辭非大公之通論也臣愚誠不足以識前代之正閏竊以為苟不能使九州合為一統皆有天子之名而無其實者也雖華夏章甲十六行本夏作夷乙十一行本同張校同仁暴大小強弱或時不同夏戶雅翻要皆與古之列國無異豈得獨尊獎一國謂之正統而其餘皆為僭偽哉若以自上相授受者為正邪則陳氏何所受章甲十六行本受作授乙十一行本同拓跋氏何所受若以居中夏者為正邪夏戶雅翻則劉石慕容苻姚赫連所得之土皆五帝三王之舊都也若以有道德者為正邪則蕞爾之國必有令主蕞徂外翻小貌三代之季豈無僻王是以正閏之論自古及今未有能通其義確然使人不可移奪者也臣今所述止欲敍國家之興衰著生民之休戚使觀者自擇其善惡得失以為勸戒非若春秋立褒貶之法撥亂世反諸正也正閏之際非所敢知但據其功業之實而言之周秦漢晉隋唐皆嘗混壹九州傳祚於後子孫雖微弱播遷猶承祖宗之業有紹復之望四方與之爭衡者皆其故臣也故全用天子之制以臨之其餘地醜德齊醜類也言地之廣狹相類也名號不異本非君臣者皆以列國之制處之處昌呂翻彼此均敵無所抑揚庶幾不誣事實近於至公近其靳翻然天下離析之際不可無歲時月日以識事之先後識音誌據漢傳於魏而晉受之晉傳于宋以至於陳而隋取之唐傳於梁以至於周而大宋承之故不得不取魏宋齊梁陳後梁後唐後晉後漢後周年號以紀諸國之事魏下當有晉字有正閏之辨也昭烈之於漢雖云中山靖王之後而族屬疏遠不能紀其世數名位亦猶宋高祖稱楚元王後宋高祖彭城人自謂漢楚元王交二十一世孫蓋以彭城楚都故其苗裔家於此地也南唐初欲祖吳王恪或請祖鄭王元懿唐主命考二王苗裔以吳王孫禕有功禕子峴為丞相遂祖吳王故不敢以光武及晉元帝為比使得紹漢氏之遺統也溫公紀年之意具於此論黃初二年孫權自公安徙都鄂更名鄂曰武昌更工衡翻黃初二年五月辛巳漢主立夫人吳氏為皇后后偏將軍懿之妹故劉璋兄瑁之妻也瑁莫報翻立子禪為皇太子娶車騎將軍張飛女為皇太子黃初二年太祖之入鄴也入鄴見六十四卷漢建安十年見袁熙妻中山甄氏美而悅之甄之人翻太祖為之聘焉為于偽翻生子叡及即皇帝位安平郭貴嬪有寵據陳壽志郭嬪安平廣宗人漢廣宗縣屬鉅鹿郡晉志廣宗始屬安平蓋魏氏割度也六宮置貴嬪始此孔穎達曰嬪婦人之美稱可賓敬也嬪毗賓翻失意有怨言郭貴嬪譖之帝大怒六月丁卯遣使賜夫人死為明帝立郭太后以憂崩張本黃初二年帝以宗廟在鄴武王之封魏王建宗廟於鄴如家人禮建始殿帝所起以建國之始命名父為士子為天子祭以天子安有用家人禮者哉黃初二年戊辰晦日有食之有司奏免太尉仍東漢中世之制也災異之作以譴元首而歸過股肱豈禹湯罪己之義乎左傳臧文仲曰禹湯罪己其興也勃焉後有天地之眚勿復劾三公復扶又翻黃初二年漢主立其子永為魯王理為梁王晉書地理志劉備以郡國封建諸王或遙采嘉名不由檢其土地所出孫權亦取中州嘉號封建諸王自此迄於南北朝大率類此黃初二年漢主恥關羽之沒將擊孫權翊軍將軍趙雲曰國賊曹操非孫權也若先滅魏則權自服今操身雖斃子丕篡盜當因衆心早圖關中居河渭上流以討凶逆關東義士必裹糧策馬以迎王師不應置魏先與吳戰兵勢一交不得卒解非策之上也趙雲之言可謂知所先後矣卒讀曰猝漢主皆不聽廣漢處士秦宓處昌呂翻宓莫必翻通作密不應州郡辟命故曰處士陳天時必無利坐下獄幽閉然後貸出貸原也赦也下遐稼翻初車騎將軍張飛雄壯威猛亞於關羽羽善待卒伍而驕於士大夫飛愛禮君子而不恤軍人漢主常戒飛曰卿刑殺既過差差次也過差猶今人言過次也檛陟加翻箠也此取禍之道也飛猶不悛悛丑緣翻改也漢主將伐孫權飛當率兵萬人自閬中會江州閬中縣屬巴西郡此亦由內水下江州也杜佑曰漢江州縣故城在巴縣西其帳下將張達范彊殺飛以其首順流奔孫權漢主聞飛營都督有表曰噫飛死矣表當自飛上而都督越次上之故知其必死也凡用兵必觀人事既失關羽又喪張飛兵可以無出矣陳壽評曰關羽張飛皆稱萬人之敵為世虎臣羽報效曹公事見六十三卷獻帝建安五年事見六十七卷建安十九年然羽剛而自矜飛暴而無恩以短取敗理數之常也黃初二年秋七月漢主自率諸軍擊孫權權遣使求和於漢南郡太守諸葛瑾遺漢主牋曰遺于季翻陛下以關羽之親何如先帝時蜀人傳漢帝已遇害因稱之為先帝孰與海內俱應仇疾誰當先後若審此數易於反掌矣漢主不聽諸葛瑾之言天下之公也使漢主因此與吳解仇繼好魏氏其旰食乎易以豉翻權曰孤與子瑜有死生不易之誓子瑜之不負孤猶孤之不負子瑜也然謗言流聞於外陸遜表明瑾必無此宜有以散其意權報曰子瑜與孤從事積年恩如骨肉深相明究其為人非道不行非義不言玄德昔遣孔明至吳蓋謂亮至吳求救時也語牛倨翻卿與孔明同產且弟隨兄於義為順何以不留孔明孔明若留從卿者孤當以書解玄德意自隨人耳意料度也權自言料度備意必當相從委質定分質如字分扶問翻弟之不留猶瑾之不往也其言足貫神明今豈當有此乎前得妄語文疏即封示子瑜幷手筆與之孤與子瑜可謂神交非外言所間間古莧翻知卿意至輒封來表以示子瑜使知卿意觀孫權君臣之間推誠相與讒間不行於其間所以能保有江東也漢主遣將軍吳班馮習攻破權將李異劉阿等於巫巫縣漢屬南郡吳初屬宜都郡後孫休分立建平郡巫屬焉賢曰巫故城在今夔州巫山縣北杜佑曰巫歸州巴東縣是又曰巫山縣楚之巫郡漢為巫縣故城在今縣北晉置建平郡於此兵四萬餘人武陵蠻夷皆遣使往請兵權以鎮西將軍陸遜為大都督假節督將軍朱然潘璋宋謙韓當徐盛鮮于丹孫桓等五萬人拒之孫權始命呂蒙為大督以取關羽今又復命陸遜為大都督以拒劉備大都督之號蓋昉此黃初二年皇弟鄢陵侯彰宛侯據魯陽侯宇譙侯林贊侯袞襄邑侯峻弘農侯幹壽春侯彪歷城侯徽平輿侯茂皆進爵為公鄢謁晚翻又於建翻又音偃宛於元翻魯陽縣屬南陽郡譙縣酇縣屬譙郡襄邑屬陳留郡壽春屬淮南郡歷城屬濟南郡平輿屬汝南郡應劭曰輿音預安鄉侯植改封甄城侯植以見忌貶侯今乃改封縣侯甄城屬東郡蜀本作鄄城當從之鄄音絹黃初二年築陵雲臺據水經註陵雲臺在洛陽城中金市之東黃初二年初帝詔㣥臣令料劉備當為關羽出報孫權否為于偽翻下同衆議咸云蜀小國耳名將唯羽羽死軍破國內憂懼無緣復出復扶又翻侍中劉曄獨曰蜀雖陿弱陿即狹字勢必用衆以示有餘且關羽與備義為君臣恩猶父子羽死不能為興軍報敵於終始之分不足矣分扶問翻八月孫權遣使稱臣卑辭奉章幷送于禁等還權破南郡得于禁事見上卷獻帝建安二十四年朝直遙翻劉曄獨曰權無故求降降戶江翻下同必內有急權前襲殺關羽劉備必大興師伐之外有強寇衆心不安又恐中國往乘其釁故委地求降一以卻中國之兵二假中國之援以強其衆而疑敵人耳劉曄之言曲盡權之情偽中國十有其八吳蜀各保一州約而言之謂吳保揚蜀保益也有急相救此小國之利也今還自相攻天亡之也宜大興師徑渡江襲之蜀攻其外我襲其內吳之亡不出旬日章甲十六行本日作月乙十一行本同孔本同張校同矣吳亡則蜀孤若割吳之半以與蜀蜀固不能久存況蜀得其外我得其內乎帝曰人稱臣降而伐之疑天下欲來者心不若且受吳降而襲蜀之後也對曰蜀遠吳近又聞中國伐之便還軍不能止也今備已怒興兵擊吳聞我伐吳知吳必亡將喜而進與我爭割吳地必不改計抑怒救吳也抑按止也遂受吳降若魏用劉曄之言吳其殆矣于禁須髮皓白形容憔顇顇與悴同秦醉翻見帝泣涕頓首帝慰諭以荀林父孟明視故事晉大夫荀林父與楚戰敗于邲晉景公復用之以取赤狄秦大夫孟明為晉禽于殽秦穆公復用之以霸西戎父音甫安遠將軍號亦前此未有也帝使豫於陵屋畫關羽戰克龐德憤怒禁降伏之狀畫古畫字通慙恚發病死恚於避翻臣光曰于禁將數萬衆敗不能死生降於敵既而復歸文帝廢之可也殺之可也乃畫陵屋以辱之斯為不君矣賞慶刑威曰君黃初二年丁巳遣太常邢貞奉策即拜孫權為吳王加九錫即就也不可先帝征伐天下十兼其八威震海內陛下受禪即真德合天地聲暨四遠權雖有雄才故漢票騎將軍南昌侯耳票騎南昌操挾漢而命之也事見上卷漢建安二十四年士民有畏中國心不可強迫與成所謀也強其兩翻不得已受其降可進其將軍號封十萬戶侯不可即以為王也夫王位去天子一階耳其禮秩服御相亂也漢自景武以後裁削藩王不使與京師同制自曹操為魏王加九錫禮秩服御與天子相亂矣江南士民未有君臣之分分扶問翻我信其偽降就封殖之封增土以培之殖養之使蕃茂也定其君臣是為虎傅翼也傅讀曰附權既受王位卻蜀兵之後外盡禮以事中國使其國內皆聞內為無禮以怒陛下陛下赫然發怒興兵討之乃徐告其民曰我委身事中國不愛珍貨重寶隨時貢獻不敢失臣禮而無故伐我必欲殘我國家俘我人民以為僕妾吳民無緣不信其言也信其言而感怒上下同心戰加十倍矣又不聽史言帝再不聽劉曄之言為後伐吳無功張本意皆縱緩獨征南大將軍夏侯尚益修攻守之備山陽曹偉素有才名此山陽郡也屬兗州以白衣與吳王交書求賂欲以交結京師帝聞而誅之黃初二年吳又城武昌既城石頭又城武昌此吳人保江之根本也黃初二年初帝欲以楊彪為太尉彪辭曰嘗為漢朝三公朝直遙翻值世衰亂不能立尺寸之益若復為魏臣復扶又翻於國之選亦不為榮也帝乃止冬十月己亥公卿朝朔旦幷引彪待以客禮賜延年杖詩其檉其椐傳云椐樻孫炎云樻腫節可以作杖陸璣疏云節中腫以扶老今人以為馬鞭及杖弘農共北山甚有之陸曰即今靈壽杖是也師古曰木似竹有枝節長不過八九尺圍三四寸自然有合杖制不煩削治陳藏器云生劍南山谷圓長皮紫作杖令人延年益壽使著布單衣皮弁以見馮讀曰憑著直略翻見賢遍翻拜光祿大夫秩中二千石漢制光祿大夫比二千石晉志曰光祿大夫漢置無定員多以為拜假賻贈之使及監護喪事魏氏以來轉復優重不復以為使命之官其諸公告老者皆家拜此位及在朝顯職復用加之位次三公朝直遙翻見賢遍翻又令門施行馬魏晉之制三公及位從公門施行馬程大昌曰行馬者一木橫中兩木互穿以施四角施之於門以為約禁也周禮謂之梐枑今官府前叉子是也以優崇之年八十四而卒楊彪有愧於龔勝多矣黃初二年以穀貴罷五銖錢復五銖錢無幾何而罷黃初二年涼州盧水胡治元多等反河西大擾帝召鄒岐還以京兆尹張既為涼州刺史遣護軍夏侯儒將軍費曜等繼其後費父沸翻胡七千餘騎逆拒既於鸇陰口鸇陰縣前漢屬安定郡後漢屬武威郡鸇陰口鸇陰河口也乃潛由且次出武威二漢志武威有揟次縣孟康曰揟音子如翻次音咨即且次也引還顯美顯美縣前漢屬張掖郡後漢及魏晉屬武威郡曜乃至儒等猶未達既勞賜將士勞力到翻欲進軍擊胡諸將皆曰士卒疲倦虜衆氣銳難與爭鋒既曰今軍無見糧見賢遍翻當因敵為資若虜見兵合退依深山追之則道險窮餓兵還則出候寇鈔鈔楚交翻如此兵不得解所謂一日縱敵患在數世也左傳先軫曰一日縱敵數世之患也十一月胡騎數千因大風欲放火燒營將士皆恐既夜藏精卒三千人為伏使參軍成公英督千餘騎挑戰姓譜衞成公之後為成公氏余不敢謂之傳信胡果爭奔之因發伏截其後首尾進擊大破之斬首獲生以萬數河西悉平後西平麴光反殺其郡守諸將欲擊之既曰唯光等造反郡人未必悉同若便以軍臨之吏民羌胡必謂國家不別是非別彼列翻更使皆相持著著直略翻此為虎傅翼也為于偽翻傅讀曰附光等欲以羌胡為援今先使羌胡鈔擊鈔楚交翻重其賞募所虜獲者皆以畀之外沮其勢沮在呂翻內離其交必不戰而定乃移檄告諭諸羌為光等所詿誤者原之詿古賣翻能斬賊帥送首者當加封賞帥所類翻於是光部黨斬送光首其餘皆安堵如故黃初二年邢貞至吳吳人以為宜稱上將軍九州伯王制九州其一州為天子之縣內八州八伯吳王曰九州伯於古未聞也昔沛公亦受項羽封為漢王事見九卷漢高帝元年復何損邪復扶又翻後同遂受之吳王出都亭候貞貞入門不下車張昭謂貞曰夫禮無不敬法無不行而君敢自尊大豈以江南寡弱無方寸之刃故乎貞即遽下車中郎將琅邪徐盛忿憤顧謂同列曰盛等不能奮身出命為國家幷許洛吞巴蜀為于偽翻而令吾君與貞盟不亦辱乎因涕泣橫流貞聞之謂其徒曰江東將相如此非久下人者也觀貞此言善覘國者也使還之日嘗以復於魏主否然觀貞以張昭之言而下車則其氣已奪矣吳主遣中大夫南陽趙咨入謝帝問曰吳主章甲十六行本主作王乙十一行本同下均同何等主也對曰聰明仁智雄略之主也帝問其狀對曰納魯肅於凡品是其聰也拔呂蒙於行陳是其明也行戶剛翻陳讀曰陣獲于禁而不害是其仁也取荊州兵不血刃是其智也據三州虎視於天下三州荊揚交也屈身於陛下是其略也帝曰吳王頗知學乎咨曰吳王浮江萬艘艘蘇刀翻帶甲百萬任賢使能志存經略雖有餘閒博覽書傳傳直戀翻歷史籍采奇異張奇異作微奧不效書生尋章摘句而已帝好文章故趙咨以此言譏之摘蜀本作擿吳可征否對曰大國有征伐之兵小國有備禦之固此二語本之管子吳難魏乎對曰帶甲百萬江漢為池何難之有帝曰吳如大夫者幾人對曰聰明特達者八九十人如臣之比車載斗量不可勝數量音良勝音升帝遣使求雀頭香大貝明珠象牙犀角玳瑁孔雀翡翠鬬鴨長鳴雞於吳本草以香附子為雀頭香此物處處有之非珍也恐別是一物貝質白如玉紫點為文皆行列相當明珠出合浦大者徑寸象出交趾雄者有兩長牙長丈餘犀亦出交趾惟通天犀最貴角有白理如線置米㣥雞中雞往啄米見犀輒驚卻南人呼為駭雞犀玳瑁狀如龜腹背甲有烘點其大者如盤盂諸蕃志瑁形如龜黿背甲十三片黑白班文間錯邊欄缺齧如鋸無足而有四鬣前長後短以鬣棹水而行鬣與首斑文如甲老者甲厚而黑白分明少者甲薄而花字模糊世傳鞭血成斑者妄也孔雀生羅州雄者尾金翠色光耀可愛埤雅曰博物志云孔雀尾多變色或紅或黃諭如雲霞其色不定人拍其尾則舞尾有金翠五年而後成始生三年金翠尚小初春乃生三四月後復凋與花萼俱衰榮人採其尾以飾扇拂生取則金翠之色不減南人取其尾者握刀蔽于叢竹潛隱之處伺過急斬其尾若不即斷回首一顧金翠無復光彩每欲小棲先擇置尾之地故欲生捕候雨甚則往擒之尾霑而重不能高翔人雖至且愛其尾不復騫揚也翡翠大小一如雀雄赤曰翡雌青曰翠羽可為飾鴨馴狎能鬬者難得長鳴雞者其鳴聲長也荊揚二州貢有常典禹別九州任土作貢此常典也非禮也宜勿與吳王曰方有事於西北謂與蜀相距復須備魏也恃主為命彼所求者於我瓦石耳孤何惜焉且彼在諒闇之中闇音陰而所求若此寧可與言禮哉皆具以與之史言帝為敵國所窺黃初二年吳王以其子登為太子妙選師友以南郡太守諸葛瑾之子恪綏遠將軍張昭之子休沈約志四十號將軍綏遠第十四入講詩書出從騎射騎奇寄翻謂之四友登接待僚屬略用布衣之禮黃初二年十二月帝行東巡黃初二年帝欲封吳王子登為萬戶侯吳王以登年幼上書辭不受復遣西曹掾吳興章甲十六行本興作郡乙十一行本同孔本同沈珩入謝姓譜沈姓出吳興本自周文王第十子耼季食采於沈即汝南平輿沈亭是也子孫以國為氏及楚莊王之子公子真封於沈鹿其後有沈尹戍沈諸梁珩音行帝問曰吳嫌魏東向乎珩曰不嫌曰何以曰信恃舊盟言歸于好好呼到翻是以不嫌若魏渝盟自有豫備又問聞太子當來寧然乎珩曰臣在東朝朝不坐宴不與吳在江東故曰東朝朝不坐宴不與記檀弓記尹商陽之言朝直遙翻無所聞也帝善之吳王於武昌臨釣臺水經武昌有樊山北背大江江上有釣臺大醉使人以水灑㣥臣醉者以水灑之醒然後能飲今日酣飲惟醉墮臺中乃當止耳張昭正色不言出外車中坐王遣人呼昭還入謂曰為共作樂耳樂音洛下同公何為怒乎昭對曰昔紂為糟丘酒池長夜之飲紂以酒為池糟丘足以望七里一鼓而牛飲者三千人懸肉為林使男女倮逐於其間為長夜之飲不以為惡也王默然慙遂罷酒吳王與㣥臣飲自起行酒虞翻伏地陽醉不持王去翻起坐翻為是者所以諫也王大怒手劍欲擊之手劍手援劍也記曰子手弓手守又翻坐徂臥翻惟大司農劉基起抱王諫曰大王以三爵之後手殺善士雖翻有罪天下孰知之古者臣侍君宴不過三爵懼其失節也故海內望風今一朝棄之可乎王曰曹孟德尚殺孔文舉事見六十五卷漢獻帝建安十三年基曰孟德輕害士人天下非之大王躬行德義欲與堯舜比隆何得自喻於彼乎翻由是得免王因敕左右自今酒後言殺皆不得殺基繇之子也劉繇為孫策所襲走死黃初二年初太祖既克蹋頓事見六十五卷漢獻帝建安十二年蹋徒臘翻鮮卑大人步度根軻比能素利彌加厥機等因閻柔上貢獻求通市通關市以其土物與中國互市也上時掌翻軻比能本小種鮮卑種章勇翻以勇健廉平為衆所服由是能威制諸部最為強盛徒勇健而不廉平未必能制諸部也皆為鮮卑庭軻比能與素利彌加割地統御各有分界分扶問翻軻比能部落近塞近其靳翻中國人多亡叛歸之素利等在遼西右北平漁陽塞外道遠故不為邊患帝以平虜校尉牽招為護鮮卑校尉南陽太守田豫為護烏桓校尉使鎮撫之三年黃初三年春正月丙寅朔日有食之黃初三年庚午帝行如許昌晉志曰漢獻帝都許魏受禪徙都洛陽許宮室武庫存焉改為許昌黃初三年詔曰今之計孝計孝上計吏及孝廉也若限年然後取士是呂尚周晉不顯於前世也呂尚年八十餘文王以為師周太子晉少有令名勿拘老幼儒通經術吏達文法到皆試用有司糾故不以實者故不以實謂用意為姦欺者黃初三年二月鄯善龜茲于闐王各遣使奉獻鄯上扇翻龜茲音丘慈闐徒賢翻又徒見翻是後西域復通置戊己校尉漢自安帝以後未嘗不欲通西域訖不能通今雖置戊己校尉亦不能如漢之屯田車師也復扶又翻黃初三年漢主自秭歸將進擊吳治中從事黃權諫曰吳人悍戰而水軍沿流進易退難悍下罕翻下旰翻易以豉翻臣請為先驅以當寇陛下宜為後鎮漢主不從以權為鎮北將軍使督江北諸軍為漢主兵敗權不能自反張本自江南緣山截領領古嶺字通裴松之曰猇許交翻夷道縣漢屬南郡吳屬宜都郡吳將皆欲迎擊之將即亮翻陸遜曰備舉軍東下銳氣始盛且乘高守險難可卒攻卒讀曰猝攻之縱下猶難盡克若有不利損我大勢非小故也今但且奬厲將士廣施方略以觀其變若此間是平原曠野當恐有顛沛交逐之憂今緣山行軍勢不得展自當罷於木石之間徐制其敝耳罷讀曰疲魏人言陸議見兵勢正由此耳諸將不解解古買翻曉也以為遜畏之各懷憤恨漢人自佷山通武陵佷山縣前漢屬武陵郡後漢屬南郡吳屬宜都郡孟康曰佷音桓唐峽州辰陽縣有佷山佷音銀杜佑曰峽州長楊縣漢佷山縣余按唐志辰陽誤也當作長陽授以官爵為馬良不得還蜀張本黃初三年三月乙丑立皇子齊公叡為平原王皇弟鄢陵公彰等皆進爵為王甲戌立皇子霖為河東王黃初三年甲午帝行如襄邑黃初三年夏四月戊申立鄄城侯植為鄄城王鄄音絹是時諸侯王皆寄地空名而無其實王國各有老兵百餘人以為守衞隔絕千里之外不聽朝聘為設防輔監國之官以伺察之防輔者言防其為非而輔之以正也監國即監國謁者也朝直遙翻為于偽翻儕士皆翻皆思為布衣而不能得法既峻切諸侯王過惡日聞獨北海王袞謹慎好學好呼到翻未嘗有失文學防輔相與言曰晉百官志王國置師友文學各一人防輔不書者魏氏防制藩國過差晉武帝懲其失而不置也受詔察王舉措有過當奏有善亦宜以聞遂共表稱陳袞美袞聞之大驚懼責讓文學曰脩身自守常人之行耳行下孟翻而諸君乃以上聞是適所以增其負累也累力瑞翻且如有善何患不聞而遽共如是是非所以為益也袞之言漢北海王睦之故智也黃初三年癸亥帝還許昌黃初三年五月以江南八郡為荊州江北諸郡為郢州既以孫權為荊州牧統江南八郡故以江北諸郡置郢州吳自立則郢州廢矣黃初三年漢人自巫峽建平連營至夷陵界水經註巫峽首尾一百六十里巫縣屬建平郡則巫峽正在建平郡界至夷陵則為宜都郡界然孫休永安三年始分宜都立建平郡此時未有建平也史追書耳杜佑曰吳建平今巴東郡以馮習為大督張南為前部督自正月與吳相拒至六月不決漢主遣吳班將數千人於平地立營吳將帥皆欲擊之陸遜曰此必有譎且觀之譎古穴翻漢主知其計不行乃引伏兵八千從谷中出遜曰所以不聽諸君擊班者揣之必有巧故也揣初委翻遜上疏於吳王曰夷陵要害國之關限自三峽下夷陵連山疊嶂江行其中迴旋湍激至西陵峽口始漫為平流夷陵正當峽口故以為吳之關限亦復易失易以豉翻復扶又翻下同失之非徒損一郡之地荊州可憂今日爭之當令必諧備干天常不守窟穴而敢自送臣雖不材憑奉威靈以順討逆破壞在近無可憂者臣初嫌之水陸俱進今反捨船就步處處結營察其布置必無他變伏願至尊高枕不以為念也枕職任翻閏月遜將進攻漢軍諸將並曰攻備當在初今乃令入五六百里相守經七八月其諸要害皆已固守擊之必無利矣遜曰備是猾虜更嘗事多更工衡翻其軍始集思慮精專未可干也今住已久不得我便兵疲意沮計不復生掎角此寇左傳晉人角之諸戎掎之角者當前與之角掎者從後掎其足也沮在呂翻掎居蟻翻乃先攻一營不利諸將皆曰空殺兵耳遜曰吾已曉破之之術乃敕各持一把茅以火攻拔之一爾勢成言一拔營之頃而兵之勝勢成也一爾猶言一如此也同時俱攻斬張南馮習及胡王沙摩柯等首破其四十餘營漢將杜路劉寧等窮逼請降降戶江翻下同漢主升馬鞍山今峽州夷陵縣有馬鞍山遜督促諸軍四面蹙之土崩瓦解死者萬數漢主夜遁驛人自擔燒鐃鎧斷後僅得入白帝城漢主初連兵入夷陵界沿路置驛以達于白帝及兵敗諸軍潰散惟驛人自擔所棄鐃鎧燒之于隘以斷後僅得脫也據水經註燒鎧斷道處地名石門在秭歸縣西杜佑曰歸州巴東縣有石門山劉備斷道處鐃尼交翻如鈴無舌而有秉周禮以金鐃止鼓軍中所用也斷丁管翻水步軍資一時略盡尸骸塞江而下塞悉則翻漢主大慙恚曰吾乃為陸遜所折辱豈非天耶依險行兵敵扼其衝情見勢屈敵乘其懈至於失師此非天也魏文帝分南陽郡立義陽郡又立義陽縣屬焉此在肜入蜀之後史追書也肜余中翻殿丁練翻肜氣益烈吳人諭之使降肜罵曰吳狗安有漢將軍而降者遂死之從事祭酒程畿泝江而退從事祭酒諸從事之長也後追將至宜解舫輕行舫甫妄翻方舟曰舫又並兩舟曰舫畿曰吾在軍未習為敵之走也亦死之言擐甲執兵以臨敵固欲就死未嘗習走也初吳安東中郎將孫桓別擊漢前鋒於夷道夷道縣漢屬南郡吳屬宜都郡求救於陸遜遜曰未可諸將曰孫安東公族見圍已困柰何不救遜曰安東得士衆心城牢糧足無可憂也待吾計展欲不救安東安東自解及方略大施漢果奔潰桓後見遜曰前實怨不見救定至今日言至今日而事始定調徒弔翻初遜為大都督諸將或討逆時舊將討逆謂孫策也各自矜持章甲十六行本持作恃乙十一行本同張校同不相聽從遜按劍曰劉備天下知名曹操所憚今在疆界此強對也強對猶言強敵荷下可翻當相輯睦共翦此虜上報所受高爵厚祿受恩多矣總兵扞敵受任重矣皆當有以上報何也僕雖書生受命主上國家所以屈諸君使相承望者以僕尺寸可稱能忍辱負重故也忍辱言能容諸將負重則自任也豈復得辭復扶又翻軍令有常不可犯也言將行軍法也計多出遜諸將乃服吳王聞之曰公何以初不啟諸將違節度者邪對曰受恩深重此諸將或任腹心或堪爪牙或是功臣皆國家所當與共克定大事者臣竊慕相如寇恂相下之義以濟國事相如事見四卷周赧王三十六年寇恂事見四十卷漢光武建武二年加遜輔國將軍晉職官志輔國大將軍位從公其號蓋始於漢獻帝以命伏完然猶未加大改封江陵侯初諸葛亮與尚書令法正好尚不同好呼到翻而以公義相取亮每奇正智術及漢主伐吳而敗時正已卒亮嘆曰孝直若在必能制主上東行就使東行必不傾危矣觀孔明此言不以漢主伐吳為可然而不諫者以漢主怒盛而不可阻且得上流可以勝也兵勢無常在於觀變出奇故曰孝直在必不傾危徐盛潘璋宋謙等各競表言備必可禽乞復攻之復扶又翻吳王以問陸遜遜與朱然駱統上言曰曹丕大合士衆外託助國討備內實有姦心謹決計輒還曹公不追關羽陸遜不再攻劉備其所見固同也以智遇智三國所以鼎立歟初帝聞漢兵樹柵連營七百餘里謂㣥臣曰備不曉兵豈有七百里營可以拒敵者乎苞原隰險阻而為軍者為敵所禽此兵忌也孫權上事今至矣上事謂上奏言兵事也上時掌翻吳破漢書到黃初三年秋七月冀州大蝗饑黃初三年漢主既敗走黃權在江北道絕不得還八月率其衆來降降戶江翻下同漢有司請收權妻子漢主曰孤負黃權權不負孤也以不能用權言也帝謂權曰君捨逆效順欲追蹤陳韓邪陳韓謂韓信陳平去楚歸漢臣過受劉主殊遇降吳不可還蜀無路是以歸命且敗軍之將免死為幸何古人之可慕也帝善之拜為鎮南將軍封育陽侯自此以後皆名號侯不復註其國邑其地名難知者猶為之註使陪乘陪乘猶驂乘也乘繩證翻帝詔權發喪權曰臣與劉葛推誠相信葛謂諸葛孔明竊疑未實請須須待也果如所言馬良亦死於五谿黃初三年九月甲午詔曰夫婦人與政亂之本也與讀曰豫自今以後㣥臣不得奏事太后后族之家不得當輔政之任又不得橫受茅土之爵橫戶孟翻以此詔傳之後世若有背違背蒲妹翻天下共誅之卞太后每見外親不假以顏色常言居處當節儉處昌呂翻不當望賞念自佚也外舍當怪吾遇之太薄后謂其外家為外舍吾事武帝四五十年行儉日久不能自變為奢有犯科禁者吾且能加罪一等耳言罪加於常人犯法者一等也黃初三年帝將立郭貴嬪為后中郎棧潛上疏曰漢三署中郎及虎賁羽林中郎皆秩比六百石魏文帝自五官中郎將登極省五官將惟左右中郎及虎賁羽林中郎棧仕限翻丁度曰姓也何氏姓苑棧姓出任城棧潛任城人也蓋自潛始著棧士限翻夫后之德盛衰治亂所由生也是以聖哲慎立元必取先代世族之家擇其令淑以統六宮虔奉宗廟易曰家道正而天下定易家人曰夫夫婦婦而家道正家道正而天下定矣先王之令典也春秋書宗人釁夏云無以妾為夫人之禮賈公彥曰襄二十四年公子荊之母嬖將以為夫人使宗人釁夏獻其立夫人之禮對曰無之公怒曰汝為宗司立夫人國之大禮也何故無之對曰周公武公娶于薛孝公惠公娶于商自桓以下娶于齊此禮也則有若以妾為夫人則固無其禮也公卒立之亦曰無以妾為妻見孟子常亞乘輿嬖卑義翻又博計翻乘繩證翻若因愛登后使賤人暴貴臣恐後世下陵上替開張非度非度猶言非法帝不從庚子立皇后郭氏黃初三年初吳王遣于禁護軍浩周浩姓也姓譜漢有青州刺史浩賞東里之先以居里為氏自陳誠款辭甚恭売心帝問周等權可信乎周以為權必臣服而袞謂其不可必服帝悅周言以為有以知之故立為吳王復使周至吳復扶又翻周謂吳王曰陛下未信王遣子入侍周以闔門百口明之吳王為之流涕霑襟為于偽翻指天為誓周還而侍子不至但多設虛辭帝欲遣侍中辛毗尚書桓階往與盟誓幷責任子吳王辭讓不受帝怒欲伐之劉曄曰彼新得志上下齊心而阻帶江湖不可倉卒制也卒讀曰猝帝不從九月命征東大將軍曹休前將軍張遼鎮東將軍臧霸出洞口據張遼傳帝遣遼與曹休至海陵臨江與諸將破呂範又據賀齊傳齊督扶州以上至皖黃武初魏使曹休來伐齊住新市會洞口諸軍遭風流溺賴齊未濟諸將倚以為勢休等憚之遂引軍還又據王淩傳遼等至廣陵臨江蓋廣陵即海陵也蕭子顯曰南兗州刺史每以秋月出海陵觀濤與京口對岸又據晉書譙王尚之傳桓玄攻尚之于歷陽使馮該斷洞浦焚舟艦則洞口在歷陽江邊明矣上軍大將軍曹真征南大將軍夏侯尚左將軍張郃右將軍徐晃圍南郡郃古合翻吳建威將軍呂範督五軍以舟軍拒休等左將軍諸葛瑾平北將軍潘璋將軍楊粲救南郡裨將軍朱桓以濡須督拒曹仁黃初三年冬十月甲子表首陽山東為壽陵首陽山在洛陽東北務從儉薄不臧金玉臧讀曰藏一用瓦器令以此詔藏之宗廟副在尚書祕書三府其副本在尚書及祕書及三公府也前臧字因舊史後藏字用今字黃初三年吳王以揚越蠻夷多未平集乃卑辭上書求自改厲若罪在難除必不見置當奉還土地民人寄命交州以終餘年又與浩周書云欲為子登求昏宗室為于偽翻又云以登年弱欲遣孫長緒張子布隨登俱來孫卲字長緒吳王稱尊號以卲為丞相朕之與君大義已定豈樂勞師遠臨江漢樂音洛若登身朝到夕召兵還耳於是吳王改元黃武吳改元黃武亦以五德之運承漢為土德也帝自許昌南征復郢州為荊州是年二月置郢州吳畔復為荊州辛丑帝如宛宛於元翻曹休在洞口自陳願將銳卒將即亮翻虎步江南因敵取資事必克捷若其無臣不須為念帝恐休便渡江驛馬止之侍中董昭侍側曰竊見陛下有憂色獨以休濟江故乎今者渡江人情所難就休有此志勢不獨行當須諸將臧霸等既富且貴無復他望復扶又翻但欲終其天年保守祿祚而已何肯乘危自投死地以求徼倖徼堅堯翻苟霸等不進休意自沮沮在呂翻臣恐陛下雖有敕渡之詔猶必沈吟未便從命也沈持林翻頃之會暴風吹吳呂範等船綆纜悉斷綆古杏翻纜盧瞰翻皆索也所以維舟者也直詣休等營下斬首獲生以千數吳兵迸散迸北孟翻帝聞之敕諸軍促渡軍未時進吳救船遂至收軍還江南曹休使臧霸追之不利將軍尹盧戰死黃初三年庚申晦日有食之黃初三年吳王使太中大夫鄭泉聘于漢漢太中大夫宗瑋報之吳漢復通黃初三年漢主聞魏師大出遺陸遜書曰賊今已在江漢吾將復東遺于季翻復扶又翻下同將軍謂其能然否遜答曰但恐軍新破創夷未復始求通親通親謂通使而交親也創初良翻復如字未暇窮兵耳若不推算欲復以傾覆之餘遠送以來者無所逃命黃初三年漢漢嘉太守黃元叛漢嘉郡本前漢青衣縣地屬蜀郡後漢順帝陽嘉二年改為漢嘉縣屬蜀郡屬國蜀分為漢嘉郡黃初三年吳將孫盛督萬人據江陵中洲據潘璋傳則江陵中洲即百里洲也其洲自枝江縣西至上明東及江津江津北岸即江陵故城何茲全標點容肇祖聶崇岐覆校
