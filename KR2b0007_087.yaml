body:
  text: 資治通鑑卷第八十七端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰權判西京留司御史臺上柱國河內郡開國侯食邑一千三百戶食實封四百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注晉紀九永嘉三年孝懷皇帝中永嘉三年己巳三九永嘉三年春正月辛丑朔熒惑犯紫微紫微即紫宮也考異曰晉春秋作鮮于修之今從載記十六國春秋余按姓氏諸書有鮮于而無宣于不出三年必克洛陽蒲子崎嶇難以久安崎丘奇翻嶇丘于翻平陽氣象方昌請徙都之淵從之大赦改元河瑞時汾水得玉璽淵因改元河瑞永嘉三年三月戊申高密孝王略薨以尚書左僕射山簡為征南將軍都督荊湘交廣四州諸軍事鎮襄陽代略也濤之子也嗜酒不恤政事表順陽內史劉璠得衆心恐百姓劫璠為主詔徵璠為越騎校尉璠扶元翻南州由是遂亂父老莫不追思劉弘史言劉弘父子得江漢間民心永嘉三年丁巳太傅越自滎陽入京師越自去年徙屯滎陽太傅專執威權而選用表請尚書猶以舊制裁之今日之來必有所誅帝之為太弟也與中庶子繆播親善及即位以播為中書監繆胤為太僕卿太僕九卿也但晉官未有卿字卿字衍帝舅散騎常侍王延尚書何綏太史令高堂沖並參機密越疑朝臣二於己散悉亶翻騎奇寄翻朝直遙翻劉輿潘滔勸越悉誅播等越乃誣播等欲為亂乙丑遣平東將軍王秉帥甲士三千入宮執播等十餘人於帝側付廷尉殺之越因繆播兄弟以克河間今又殺之權勢之爭可畏哉帥讀曰率帝歎息流涕而已綏曾之孫也初何曾侍武帝宴退謂諸子曰主上開創大業吾每宴見見賢遍翻未嘗聞經國遠圖惟説平生常事非貽厥孫謀之道也及身而已後嗣其殆乎嗣祥吏翻汝輩猶可以免指諸孫曰此屬必及於難難乃旦翻及綏死兄嵩哭之曰我祖其殆聖乎曾日食萬錢猶云無下箸處箸遲據翻梜也子劭日食二萬綏及弟機羡汰侈尤甚與人書疏詞禮簡傲河內王尼見綏書謂人曰伯蔚居亂世而矜豪乃爾其能免乎人曰伯蔚聞卿言必相危害尼曰伯蔚比聞我言自已死矣何綏字伯蔚比必寐翻及也蔚紆勿翻何氏無遺種種章勇翻臣光曰何曾議章甲十行本議作譏乙十一行本同孔本同武帝偷惰取過目前不為遠慮知天下將亂子孫必與其憂與讀曰預何其明也然身為僭侈使子孫承流卒以驕奢亡族卒子恤翻其明安在哉且身為宰相知其君之過不以告而私語於家非忠臣也永嘉三年太傅越以王敦為楊州刺史為敦亂東晉張本永嘉三年劉實連年請老朝廷不許尚書左丞劉坦上言古之養老以不事為優不事謂不使任事也謂宜聽實所守丁卯詔實以侯就第以王衍為太尉太傅越解兗州牧領司徒越以頃來興事多由殿省謂誅楊駿廢賈后誅趙王倫齊王冏及討成都王穎及羊后太子覃屢廢屢立皆殿中人為之時殿中武官並封侯由是出者略盡皆泣涕而去更使右衛將軍何倫左衛將軍王秉領東海國兵數百人宿衛自是帝左右皆越私人永嘉三年左積弩將軍朱誕奔漢武帝泰始四年罷振威揚威護軍置左右積弩將軍勸漢主淵攻之淵以誕為前鋒都督以滅晉大將軍劉景為大都督將兵攻黎陽克之又敗王堪於延津沈男女三萬餘人於河敗補邁翻沈持林翻淵聞之怒曰景何面復見朕復扶又翻且天道豈能容之吾所欲除者司馬氏耳細民何罪黜景為平虜將軍劉淵之識略非聰曜所能及也永嘉三年夏大旱江漢河洛皆竭可涉川竭亡國之徵永嘉三年漢安東大將軍石勒寇巨鹿常山衆至十餘萬集衣冠人物別為君子營石勒起於胡羯餓隸而能如此此其所以能跨有中原也刁膺為股肱夔安孔萇支雄桃豹逯明為爪牙姓譜夔子之後以國為姓後趙支雄傳云其先月支胡人也桃春秋魯邑以邑為姓一曰古高士左伯桃之後逯盧谷翻羯居謁翻初張賓好讀書好呼到翻闊達有大志常自比張子房及石勒徇山東賓謂所親曰吾歷觀諸將無如此胡將軍者勒本胡也故謂之胡將軍乃提劍詣軍門大呼請見勒亦未之奇也賓數以策干勒呼火故翻數所角翻已而皆如所言勒由是奇之署為軍功曹動靜咨之永嘉三年漢主淵以王彌為侍中都督青徐兗豫荊揚六州諸軍事征東大將軍青州牧與楚王聰共攻壺關以石勒為前鋒都督劉琨遣護軍黃肅韓述救之聰敗述於西澗勒敗肅於封田皆殺之西澗封田皆當在壺關東南敗補邁翻考異曰石勒載記肅作秀封作白今從十六國春秋及劉琨集太傅越遣淮南內史王曠考異曰十六國春秋作王廣今從帝紀曠濟河欲長驅而前融曰彼乘險間出間古莧翻我雖有數萬之衆猶是一軍獨受敵也且當阻水為固以量形勢量音良然後圖之曠怒曰君欲沮衆邪沮在呂翻融退曰彼善用兵曠暗於事勢吾屬今必死矣曠等於章甲十一行本於作踰乙十一行本同孔本同張校同退齋校同太行行戶剛翻與聰遇戰於長平之間曠兵大敗融超皆死聰遂破屯留長子屯音純凡斬獲萬九千級上黨太守龐淳以壺關降漢降戶江翻考異曰十六國春秋作劉惇劉琨傳作襲醇今從帝紀劉琨以都尉張倚領上黨太守據襄垣襄垣縣屬上黨郡宋白曰襄垣趙襄子所築因以為名初胸奴劉猛死見七十九卷武帝泰始八年誥升爰卒子虎立居新興號鐵弗氏鐵弗氏之後為赫連勃勃考異曰劉琨集作百部今從後魏書晉書將即亮翻考異曰帝紀七月劉聰及王彌圍壺關琨使兵救之為聰所敗王廣等及聰戰又敗龐惇以郡降賊十六國春秋淵五月遣聰攻壺關敗韓述黃肅六月晉遣王廣等來討七月戰於長平晉師敗劉惇以壼關降按劉琨集載六月癸巳琨答太傅府書曰聰彌入上黨龐惇不能禦又曰安居失利韓述授首封田之敗黃肅不還浹辰之間名將仍殄又曰即重遣江陶都尉張倚領上黨太守疾據襄垣續遣鷹揚將軍趙擬梁余都尉李茂與倚併力輕行夜襲賊捐棄輜車宵遁而退追尋討截獲三分之二當聰彌之未走烏丸劉虎構為變逆西招白部遣使致任稱臣於淵殘州困弱內外受敵輒背聰而討虎自四月八日攻圍然則琨討虎以上事皆在四月以前也蓋晉漢二史皆據奏報事畢而言之今依琨集為定劉聰遣兵襲晉陽不克永嘉三年五月漢主淵封子裕為齊王隆為魯王永嘉三年秋八月漢主淵命楚王聰等進攻洛陽詔平北將軍曹武等拒之皆為聰所敗敗補邁翻聰長驅至宜陽自恃驟勝怠不設備九月弘農太守垣延詐降垣姓延名降戶江翻聰大敗而還王浚遣祁弘與鮮卑段務勿塵擊石勒于飛龍山隋地理志恆山郡石邑縣有飛龍山括地志封龍山一名飛龍山在恆山鹿泉縣南四十五里勒退屯黎陽永嘉三年冬十月漢主淵復遣楚王聰王彌始安王曜汝陰王景帥精騎五萬寇洛陽復扶又翻帥讀曰率騎奇寄翻大司空鴈門剛穆公呼延翼帥步卒繼之北狄傳胸奴四姓有呼延氏卜氏蘭氏喬氏而呼延氏最貴丙辰聰等至宜陽朝廷以漢兵新敗不意其復至大懼辛酉聰屯西明門西明門洛城西面南頭第二門也斬其征虜將軍呼延皓壬戌聰南屯洛水洛水過洛城南乙丑呼延翼為其下所殺其衆自大陽潰歸淵敕聰等還師聰表稱晉兵微弱不可以翼皓死故還師固請留攻洛陽淵許之太傅越嬰城自守戊寅聰親祈嵩山嵩山在河南陽城縣冠古玩翻太傅參軍孫詢説越乘虛出擊朗斬之説輸芮翻厲赴水死王彌謂聰曰今軍既失利洛陽守備猶固運車在陝糧食不支數日聰自宜陽而東又南進屯于洛水既為晉所敗運車在陝糧道隔絶陝失冉翻淵以族子曜為龍驤大將軍驤思將翻更為後舉下官亦收兵穀待命於兗豫不亦可乎聰自以請留未敢還宣于修之言於淵曰歲在辛未乃得洛陽今晉氣猶盛大軍不歸必敗淵乃召聰等還永嘉三年天水人訇琦等訇呼宏翻殺成太尉李離尚書令閻式以梓潼降羅尚降戶江翻成主雄遣太傅驤司徒雲司空璜攻之不克雲璜戰死初譙周有子居巴西成巴西太守馬脫殺之其子登詣劉弘請兵以復讎弘表登為梓潼內史使自募巴蜀流民得二千人西上上時掌翻至巴郡從羅尚求益兵不得登進攻宕渠宕渠縣漢屬巴郡自蜀以來屬巴西郡賢曰宕渠故城在今渠州流江縣東北宕徒浪翻食其肝會梓潼降登進據涪城涪音浮雄自攻之為登所敗敗補邁翻永嘉三年十一月甲申漢楚王聰始安王曜歸于平陽王彌南出轘轅轘音環流民之在潁川襄城汝南南陽河南者數萬家襄陽縣漢屬潁川郡武帝泰始二年分立襄城郡皆燒城邑殺二千石長吏以應彌長知兩翻永嘉三年石勒寇信都信都縣漢屬信都國後漢屬安平國晉同斌音彬王浚自領冀州詔車騎將軍王堪北中郎將裴憲將兵討勒勒引兵還拒之魏郡太守劉矩以郡降勒降戶江翻勒至黎陽裴憲棄軍奔淮南王堪退保倉垣倉垣城在陳留浚儀縣水經汴水出浚儀縣北東徑倉垣城南即大梁縣之倉垣亭也城臨汴水永嘉三年十二月漢主淵以陳留王歡樂為太傅樂音洛楚王聰為大司徒江都王延年為大司空遣都護大將軍曲陽王賢與征北大將軍劉靈安北將軍趙固平北將軍王桑東屯內黃內黃縣屬魏郡應劭曰陳留有外黃故加內云東徇青州且迎其家淵許之嶷魚力翻為曹嶷據青州張本王彌家在東萊永嘉三年初東夷校尉勃海李臻與王浚約共輔晉室浚內有異志臻恨之和演之死也見八十五卷惠帝永興元年説臻舉兵討浚臻遣其子成將兵擊浚考異曰燕書王誕傳成作咸今從李洪傳説輸芮翻素與臻有隙乘虛襲殺臻遣人殺成於無慮無慮縣前漢屬遼東後漢屬遼東屬國晉省應劭曰慮音閭周禮所謂其山醫巫閭是也詔以勃海封釋代臻為東夷校尉龐本復謀殺之廆乎罪翻復扶又翻釋子悛勸釋伏兵請本收斬之悉誅其家悛七倫翻又且緣翻四年四年春正月乙丑朔大赦四年漢主淵立單徵女為皇后單徵氐酋也歸漢見上卷二年單音善大赦封子義為北海王以長樂王洋為大司馬樂音洛四年漢鎮東大將軍石勒濟河拔白馬王彌以三萬衆會之共寇徐豫兗州二月勒襲鄄城鄄音絹殺兗州刺史袁孚遂拔倉垣殺王堪復北濟河攻冀州諸郡復扶又翻民從之者九萬餘口四年成太尉李國鎮巴西帳下文石殺國以巴西降羅尚降戶江翻四年太傅越徵建威將軍吳興錢璯吳分吳郡丹陽置吳興郡以自烏程興故也璯黃外翻璯謀殺敦以反敦奔建業告琅邪王睿璯遂反進寇陽羡陽羡縣前漢屬會稽郡後漢屬吳郡自吳以來分屬吳興郡賢曰陽羡故城在今常州義興縣南周糾合鄉里與逸等共討璯斬之三定江南惠帝永興元年討石冰永嘉元年討陳敏今又誅璯是三定江南於其鄉里置義興郡以旌之時分吳興之陽羡及長城縣之西鄉丹陽之永世為義興郡四年曹嶷自大梁引兵而東所至皆下遂克東平進攻琅邪四年夏四月王浚將祁弘敗漢冀州刺史劉靈於廣宗殺之將即亮翻下同廣宗縣漢屬巨鹿郡晉屬安平國敗補邁翻四年成主雄謂其將張寶曰汝能得梓潼吾以李離之官賞汝寶乃先殺人而亡奔梓潼訇琦等信之委以心腹會羅尚遣使至梓潼使疏吏翻琦等出送嚴送改迎之寶從後閉門琦等奔巴西雄以寶為太尉四年幽並司冀秦雍六州大蝗食草木牛馬毛皆盡雍於用翻四年秋七月漢楚王聰始安王曜石勒及安北大將軍趙國嚴國改固圍河內太守裴整于懷詔征虜將軍宋抽救懷勒與平北大將軍王桑逆擊抽殺之河內人執整以降降戶江翻漢主淵以整為尚書左丞河內督將郭默收整餘衆自為塢主城之小者曰塢天下兵爭聚衆築塢以自守未有朝命故自為塢主將即亮翻四年羅尚卒於巴郡詔以長沙太守下邳皮素代之姓譜皮姓樊仲皮之後四年庚午漢主淵寢疾辛未以陳留王歡樂為太宰長樂王洋為太傅樂音洛江都王延年為太保楚王聰為大司馬大單于並録尚書事置單于臺於平陽西單音蟬以齊王裕為大司徒魯王隆為尚書令北海王義為撫軍大將軍領司隸校尉始安王曜為征討大都督領單于左輔廷尉喬智明為冠軍大將軍領單于右輔光祿大夫劉殷為左僕射王育為右僕射任顗為吏部尚書任音壬顗魚豈翻朱紀為中書監護軍馬景領左衛將軍永安王安國領右衛將軍安昌王盛安邑王欽西陽王璿皆領武衛將軍分典禁兵璿旬緣翻初盛少時不好讀書少詩照翻好呼到翻唯讀孝經論語曰誦此能行足矣安用多誦而不行乎李熹見之歎曰望之如可易易弋豉翻慢易也及至肅如嚴君可謂君子矣淵以其忠篤故臨終委以要任丁丑淵召太宰歡樂等入禁中受遺詔輔政己卯淵卒考異曰十六國春秋八月丁丑淵召太宰歡樂等受遺詔己卯卒辛未葬按長曆七月壬戌朔十六日丁丑十八日己卯八月辛卯朔無丁丑己卯及辛未辛未乃九月十一日蓋淵以七月卒九月葬十六國春秋誤也和字玄泰淵之嫡子和性猜忌無恩宗正呼延攸翼之子也淵以其無才行終身不遷官侍中劉乘素惡楚王聰衛尉西昌王鋭恥不預顧命乃相與謀説和曰先帝不惟輕重之勢使三王總強兵於內惟思也三王謂安昌王盛安邑王欽西陽王璿也或曰三王謂齊王裕魯王隆北海王義行下孟翻惡烏路翻説輸芮翻謂聰屯平陽西也言大權非己出託位於臣民之上勢同寄寓也坐徂臥翻和攸之甥也深信之辛巳夜召安昌王盛安邑王欽等告之盛曰先帝梓宮在殯四王未有逆節聰淵之第四子故曰四王或曰謂聰裕隆義也天下謂陛下何且大業甫爾陛下勿信讒夫之言以疑兄弟兄弟尚不可信他人誰足信哉攸鋭怒之曰今日之議理無有二領軍是何言乎命左右刃之盛既死欽懼曰惟陛下命壬午鋭帥馬景攻楚王聰于單于臺單音蟬攸帥永安王安國攻齊王裕于司徒府乘帥安邑王欽攻魯王隆使尚書田密武衛將軍劉璿攻北海王義密璿挾義斬關歸于聰聰命貫甲以待之貫甲擐甲也帥讀曰率馳還與攸乘共攻隆裕攸乘疑安國欽有異志殺之是日斬裕癸未斬隆甲申聰攻西明門克之劉淵都平陽諸城門皆用洛陽諸城門名前鋒隨之乙酉殺和於光極西室劉淵起光極殿於平陽梟首通衢梟堅堯翻㣥臣請聰即帝位聰以北海王義單后之子也以位讓之考異曰載記作乂按十六國春秋作義今從之聰久而許之曰義及㣥公正以禍難尚殷貪孤年長故耳難乃旦翻長知兩翻此家國之事孤何敢辭俟義年長當以大業歸之遂即位聰字玄明淵第四子改元光興尊單氏曰皇太后其母張氏曰帝太后以義為皇太弟領大單于大司徒立其妻呼延氏為皇后呼延氏淵后之從父妹也從才用翻封其子粲為河內王易為河間王翼為彭城王悝為高平王悝苦回翻仍以粲為撫軍大將軍都督中外諸軍事以石勒為並州刺史封汲郡公四年略陽臨渭氐酋蒲洪驍勇多權略㣥氐畏服之晉志略陽郡有臨渭縣蓋魏所置也載記曰氐之先蓋有扈氏之苗裔世為西戎酋長洪家池中生蒲長五丈五節如竹形時咸謂之蒲家因以為氏其後洪以讖文有草付應王又其孫堅背文有草付字遂改姓苻氏洪不受自稱護氐校尉秦州刺史略陽公蒲洪事始此四年九月辛未葬漢主淵于永光陵諡曰光文皇帝廟號高祖四年雍州流民多在南陽詔書遣還鄉里流民以關中荒殘皆不願歸征南將軍山簡南中郎將杜蕤各遣兵送之促期令發京兆王如遂潛結壯士夜襲二軍破之二軍山簡及杜蕤所遣之軍也嶷魚力翻京兆侯脫各聚衆攻城鎮殺令長以應之長知兩翻未幾衆至四五萬幾居豈翻自號大將軍領司雍二州牧雍於用翻稱藩于漢四年冬十月漢河內王粲始安王曜及王彌帥衆四萬寇洛陽石勒帥騎二萬會粲于大陽敗監軍裴邈于澠池帥讀曰率敗補邁翻下同澠彌兗翻遂長驅入洛川粲出轘轅掠梁陳汝潁間轘音還勒出成皋關晉志河南成皋縣有關壬寅圍陳留太守王讚於倉垣為讚所敗退屯文石津據帝紀文石津在河北又據永嘉六年勒自葛陂北行至東燕使孔萇自文石津潛渡枋頭取向水船則文石津在東燕之東北枋頭之東南四年劉琨自將討劉虎及白部白部鮮卑也琨以劉虎及白部皆附漢故討之説輸芮翻猗盧使其弟弗之子鬱律帥騎二萬助之遂破劉虎白部屠其營琨與猗盧結為兄弟表猗盧為大單于以代郡封之為代公時代郡屬幽州王浚不許遣兵擊猗盧猗盧拒破之浚由是與琨有隙猗盧以封邑去國懸遠民不相接乃帥部落萬餘家自雲中入鴈門從琨求陘北之地陘北石陘關之北也陘音刑且欲倚之為援乃徙樓煩馬邑陰館繁畤崞五縣民於陘南樓煩胸奴之所居其地在北河之南今嵐州樓煩郡非古樓煩也漢馬邑縣唐之大同軍是其地漢陰館縣在句注西北繁畤縣在武州川崞縣為北齊北顯州平寇縣今五縣雖存皆非古縣地矣陘謂陘嶺陘音刑考異曰懷帝紀永嘉五年十一月猗盧寇太原劉琨徙五縣居之六年八月辛亥劉琨乞師于猗盧表盧為代公宋書索虜傳在永嘉三年晉春秋在永嘉四年且云猗盧率萬餘家避難自雲中入鴈門後魏序紀在穆帝三年即永嘉四年也琨集永嘉四年六月癸巳上太傅府箋云盧感封代之恩故知在四年六月之前又琨與丞相箋曰昔車騎感猗色救州之勳表以代郡封色為代公見聽時大駕在長安會值戎事道路不通竟未施行盧以封事見託琨實為表上追述車騎前意即蒙聽許遣兼謁者僕射拜盧賜印及符册浚以此見責戎狄封華郡誠為失禮然蓋以救弊耳亦猶浚先以遼西封務勿塵此禮之失浚實啓之浚遂與盧爭代郡舉兵擊盧為所破紛錯之由始結於此鴈門郡有五縣在陘北盧新並塵官國甚強盛從琨求陘北地以並遣三萬餘家散在五縣間既非所制又於琨殘弱之計得相聚集未為失宜即徙陘北五縣著陘南盧因移頗侵逼浚西陲圍塞諸軍營浚不復見恕危弱而見罪責以此觀之盧非避難而來也琨遣使言於太傅越請出兵共討劉聰石勒越忌苟晞及豫州刺史馮嵩越晞有隙事見上卷二年嵩蓋亦不心附越者不許琨乃謝猗盧之兵遣歸國考異曰後魏序紀曰劉琨乞師救洛穆帝遣步騎二萬助之東海王越以洛陽飢荒不許按琨與丞相箋曰琨傾身竭辭北和猗盧遂引大衆躬啓戎行即具白太傅切陳愚見取賊之計聰宜時討勒不可縱而宰相意異所慮不同更憂苟晞馮嵩之徒而稽二寇之誅遣使節抑挫臣鋭氣臣即解甲遣盧衆歸國若猗盧果遣衆赴洛琨箋安得不言也劉虎收餘衆西渡河居朔方肆盧川肆盧川在朔方塞內後拓跋氏於其地置肆盧郡真君七年併入秀容郡魏收地形志秀容郡秀容縣有肆盧城封樓煩公四年壬子以劉琨為平北大將軍王浚為司空進鮮卑段務勿塵為大單于單音蟬四年京師飢困日甚太傅越遣使以羽檄徵天下兵使入援京師帝謂使者曰為我語諸征鎮今日尚可救後則無及矣既而卒無至者為于偽翻語牛倨翻卒子恤翻征南將軍山簡遣督護王萬將兵入援軍于涅陽涅陽縣屬南陽郡應劭曰在涅水之陽師古曰涅音乃結翻敗補邁翻如遂大掠沔漢進逼襄陽簡嬰城自守荊州刺史王澄澄時治江陵欲援京師至沶口水經注零水上通梁州沔陽縣東徑新城郡之沶鄉縣謂之沶水又東歷宜城西山謂之沶溪東流合於夷水謂之沶口楊正衡曰沶音怡衆散而還還從宣翻又如字朝議多欲遷都以避難朝直遙翻難乃旦翻王衍以為不可賣車牛以安衆心山簡為嚴嶷所逼自襄陽徙屯夏口夏戶雅翻四年石勒引兵濟河將趣南陽趣七喻翻王如侯脫嚴嶷等聞之遣衆一萬屯襄城以拒勒勒擊之盡俘其衆進屯宛北是時侯脫據宛宛於元翻王如據穰穰縣漢屬南陽郡晉屬義陽郡遣使重賂勒結為兄弟説勒使攻脫説輸芮翻勒攻宛克之嚴嶷引兵救宛不及而降降戶江翻勒斬脫囚嶷送于平陽盡並其衆遂南寇襄陽攻拔江西壘壁三十餘所勒既南寇襄陽循漢而下攻掠江西趣襄城王如遣弟璃襲勒勒迎擊滅之復屯江西復扶又翻江西大江之西也趣七喻翻四年太傅越既殺王延等見上永嘉三年又以胡寇益盛內不自安乃戎服入見見賢遍翻請討石勒且鎮集兗豫帝曰今胡虜侵逼郊畿人無固志朝廷社稷倚賴於公豈可遠出以孤根本對曰臣出幸而破賊則國威可振猶愈於坐待困窮也十一月甲戌越帥甲士四萬向許昌留裴氏世子毗及龍驤將軍李惲右衛將軍何倫守衛京師帥讀曰率惲於粉翻防察宮省以潘滔為河南尹總留事越表以行臺自隨用太尉衍為軍司朝賢素望悉為佐吏名將徑卒咸入其府朝直遙翻將即亮翻於是宮省無復守衛荒饉日甚殿內死人交橫盜賊公行府寺營署並掘塹自守塹七豔翻越東屯項以馮嵩為左司馬自領豫州牧竟陵王楙白帝遣兵襲何倫不克帝委罪於楙楙逃竄得免楙即東平王楙帝踐阼改封竟陵王四年揚州都督周馥以洛陽孤危上書請遷都壽春太傅越以馥不先白己而直上書大怒召馥及淮南太守裴碩馥不肯行令碩帥兵先進帥讀曰率碩詐稱受越密旨襲馥為馥所敗敗補邁翻退保東城東城縣漢屬九江郡後漢屬下邳國晉屬淮南郡宋白曰濠州定遠縣漢東城縣地四年詔加張軌鎮西將軍都督隴右諸軍事考異曰帝紀云安西按惠帝永興二年已加軌安西將軍今從本傳遺于季翻告以京師飢匱軌遣參軍杜勳獻馬五百匹毯布三萬匹毯布織毳為布也毯吐敢翻四年成太傅驤攻譙登於涪城羅尚子宇及參佐素惡登不給其糧涪音浮惡烏路翻益州刺史皮素怒欲治其罪治直之翻十二月素至巴郡羅宇使人夜殺素建平都尉暴重殺宇巴郡亂驤知登食盡援絶攻涪愈急士民皆熏鼠食之餓死甚衆無一人離叛者驤子壽先在登所登乃歸之永興元年羅尚掠得驤妻及其子壽因在登所三府平西將軍府益州刺史府西戎校尉府皆羅尚兼領者也監古銜翻四年初帝以王彌石勒侵逼京畿詔苟晞督帥州郡討之帥讀曰率會曹嶷破琅邪嶷魚力翻北收齊地兵勢甚盛苟純閉城自守晞還救青州與嶷連戰破之永嘉元年苟晞討魏植留弟純守青州四年是歲寧州刺史王遜到官表李釗為朱提太守朱提音銖時時寧州外逼於成內有夷寇城邑丘墟遜惡衣菜食招集離散勞來不倦勞力到翻來力代翻數年之間州境復安誅豪右不奉法者十餘家以五苓夷昔為亂首見八十五卷惠帝太安二年苓力丁翻內外震服四年漢主聰自以越次而立忌其嫡兄恭因恭寢穴其壁間刺而殺之刺七亦翻四年漢太后單氏卒單音善漢主聰尊母張氏為皇太后單氏年少美色聰蒸焉下淫上曰蒸上淫下曰報少詩照翻單氏慙恚而死恚於避翻義寵由是漸衰然以單氏故尚未之廢也呼延后言於聰曰父死子繼古今常道陛下承高祖之業劉淵廟號高祖陛下百年後粲兄弟必無種矣種章勇翻聰曰然吾當徐思之呼延氏曰事留變生太弟見粲兄弟浸長長知兩翻下齒長同必有不安之志萬一有小人交構其間未必不禍發于今日也言義將殺聰為元帝建武元年聰殺義張本疏不間親主上有意於河內王矣殿下何不避之義曰河瑞之末主上自惟嫡庶之分間古莧翻分扶問翻惟思也以大位讓義義以主上齒長故相推奉天下者高祖之天下兄終弟及何為不可粲兄弟既壯猶今日也且子弟之間親疏詎幾主上寧可有此意乎聰讓義事見上義此言必不發於是年通鑑因呼延氏之言遂連書之幾居豈翻五年五年春正月壬申苟晞為曹嶷所敗敗補邁翻棄城奔高平高平縣舊屬梁國晉為高平國泗水徑其西有高平山山東西十里南北五里高四里其山最高頂上方平故謂之高平山縣亦取名焉五年石勒謀保據江漢參軍都尉張賓以為不可會軍中飢疫死者太半乃渡沔寇江夏夏戶雅翻癸酉拔之五年乙亥成太傅驤拔涪城涪音浮獲譙登太保始拔巴西殺文石於是成主雄大赦改元玉衡譙登至成都雄欲宥之登詞氣不屈雄殺之五年巴蜀流民布在荊湘間數為土民所侵苦數所角翻蜀人李驤聚衆據樂鄉反此又一李驤也非成太傅之李驤醴陵縣屬長沙郡韜土刀翻惠帝時蜀亂割南郡之華容州陵監利三縣別立豐都一縣置成都郡為成都王穎國降戶江翻澄偽許而襲殺之以其妻子為賞沈八千餘人於江流民益怨忿沈持林翻蜀人杜疇等復反復扶又翻湘州參軍馮素與蜀人汝班有隙汝姓也商有汝鳩汝方晉有汝寬汝齊巴蜀流民皆欲反眺信之眺他弔翻欲盡誅流民流民大懼四五萬家一時俱反以杜韜州里重望韜蜀郡人以才學著稱於西州韜他刀翻共推為主韜自稱梁益二州牧領湘州刺史五年裴碩求救於琅邪王睿睿使揚威將軍甘卓等攻周馥於壽春馥衆潰奔項考異曰帝紀戊寅睿使卓攻馥於壽春馥衆潰未知其為命卓之日與攻日潰日故闕之馥憂憤而卒確騰之子也五年揚州刺史劉陶卒琅邪王睿復以安東軍咨祭酒王敦為揚州刺史尋加都督征討諸軍事去年敦奔建業五年庚辰平原王幹薨五年二月石勒攻新蔡殺新蔡莊王確於南頓進拔許昌殺平東將軍王康五年氐苻成隗文復叛苻成等歸羅尚見八十五卷惠帝太安二年復扶又翻趣七喻翻建平都尉暴重討之重因殺韓松自領三府事五年東海孝獻王越既與苟晞有隙事始上卷永嘉二年復扶又翻晞怒表求滔等首揚言司馬元超為宰相不平東海王越字元超苟道將豈可以不義使之乃移檄諸州自稱功伐陳越罪狀帝亦惡越專權多違詔命所留將士何倫等抄掠公卿逼辱公主抄楚交翻密賜晞手詔使討之晞數與帝文書往來惡烏路翻數所角翻越疑之使遊騎於成皋間伺之騎奇寄翻下同伺相吏翻果獲晞使及詔書使疏吏翻乃下檄罪狀晞以從事中郎楊瑁為兗州刺史瑁莫報翻使與徐州刺史裴盾共討晞盾徒損翻晞遣騎收潘滔滔夜遁得免執尚書劉曾侍中程延斬之越憂憤成疾以後事付王衍三月丙子薨于項考異曰帝紀五年正月帝密詔苟晞討越乙未越遣楊瑁裴盾共擊晞三月戊午詔下越罪狀告方鎮討之以晞為大將軍丙子越薨晞傳晞移告諸州陳越罪狀帝惡越專權乃詔晞施檄六州協同大舉晞移諸征鎮帝又密詔晞討越晞復上表稱李初至奉被手詔卷甲長驅次于倉垣五年帝復詔晞陳越罪惡詔至之日宣告天下率齊大舉晞表稱輒遣王讚將兵詣項越使騎於成皋間獲晞使遂大搆嫌隙晉春秋五年正月上遣李初詔晞討越按越若已得晞使則帝亦不能自安潘滔何倫等不容晏然在洛且滔等未去則帝亦不敢明言使晞討越年月事迹既前後參差如此今並置於越薨之時庶為不失衆共推衍為元帥帥所類翻衍不敢當以讓襄陽王範範亦不受範瑋之子也於是衍等相與奉越喪還葬東海何倫李惲等聞越薨奉裴及世子毗自洛陽東走城中士民爭隨之帝追貶越為縣王以苟晞為大將軍大都督督青徐兗豫荊揚六州諸軍事五年益州將吏共殺暴重表巴郡太守張羅行三府事羅與隗文等戰死文等驅掠吏民西降於成降戶江翻三府文武共表平西司馬蜀郡王異行三府事益州殘兵自不足以進取未及期年而五易帥適為秦氐兼並之資耳五年初梁州刺史張光會諸郡守於魏興共謀進取張燕唱言漢中荒敗迫近大賊近其靳翻克復之事當俟英雄光以燕受鄧定賂致失漢中事見上卷永嘉元年復扶又翻沮在呂翻呵出斬之治兵進戰呵虎何翻治直之翻纍年乃得至漢中綏撫荒殘百姓悅服光為梁州刺史見上卷二年五年夏四月石勒率輕騎追太傅越之喪及於苦縣寧平城苦縣屬陳郡水經注寧平城在沙水北本前漢淮陽國之寧平縣也後漢改淮陽為陳國晉省寧平縣而故城猶在賢曰寧平故城在今亳州谷陽縣西南騎奇寄翻下同縱騎圍而射之敗補邁翻射而亦翻將士十餘萬人相踐如山無一人得免者執太尉衍襄陽王範任城王濟武陵莊王淡任音壬淡徒覽翻又徒濫翻西河王喜梁懷王禧齊王超西河王喜宣帝弟西河繆王斌之後超齊王冏之子敳魚開翻坐之幕下問以晉故衍具陳禍敗之由云計不在己且自言少無宦情不豫世事因勸勒稱尊號冀以自免勒曰君少壯登朝名蓋四海身居重任何得言無宦情邪破壞天下非君而誰少詩照翻壞音怪命左右扶出衆人畏死多自陳述獨襄陽王範神色儼然顧呵之曰今日之事何復紛紜復扶又翻勒謂孔萇曰吾行天下多矣未嘗見此輩人當可存乎勒欲存之以諸人儀觀之清楚耳彼皆晉之王公終不為吾用勒曰雖然要不可加以鋒刃夜使人排牆殺之濟宣帝弟子景王陵之子禧淡之子也剖越柩焚其尸曰亂天下者此人也吾為天下報之故焚其骨以告天地何倫等至洧倉水經洧水東南過潁川長社縣分一枝東流過許昌縣又東入汶倉城內俗以是水為汶水故有汶倉之名蓋洧水之邸閣耳戰敗東海世子及宗室四十八王皆沒於勒考異曰東海王越傳云三十六王今從帝紀李惲奔廣宗惲於粉翻裴為人所掠賣久之渡江初琅邪王睿之鎮建業裴意也故睿德之厚加存撫以其子沖繼越後五年漢趙固王桑攻裴盾殺之盾時在彭城盾徒損翻五年杜韜攻長沙五月荀眺棄城奔廣州韜追擒之於是韜南破零桂東掠武昌殺二千石長吏甚衆韜土刀翻五年以太子太傅傅祗為司徒尚書令荀藩為司空加王浚大司馬侍中大都督督幽冀諸軍事南陽王模為太尉大都督張軌為車騎大將軍琅邪王睿為鎮東大將軍兼督揚江湘交廣五州諸軍事初太傅越以南陽王模不能綏撫關中時關中飢荒疾癘盜賊公行模不能制將軍淳于定説模使不就徵説輸芮翻模從之表遣世子保為平西中郎將鎮上邽秦州刺史裴苞拒之模使帳下都尉陳安攻苞苞奔安定太守賈匹納之匹音雅五年苟晞表請遷都倉垣使從事中郎劉會將船數十艘艘蘇刀翻宿衛五百人穀千斛迎帝帝將從之公卿猶豫左右戀資財遂不果行既而洛陽飢困人相食百官流亡者什八九帝召公卿議將行而衛從不備從才用翻下導從同帝撫手歎曰如何曾無車輿乃使傅祗出詣河陰治舟楫河陰本漢平陰縣魏文帝改曰河陰在洛陽東北屬河南郡治直之翻從才用翻帝步出西掖門至銅駝街水經注洛陽城中太尉司徒兩坊間謂之銅駝街魏明帝置銅駝於閶闔南街即此陸機洛陽記曰洛陽有銅駝街漢鑄銅駝二枚在宮南四會道相對俗語曰金馬門外集衆賢銅駝陌上集少年不得進而還藉使帝得至倉垣亦遭石勒禽矣水經注河南新安縣東有千秋亭亭東有雍谷溪回岫縈紆石路阻峽故亦有峽石之稱獻之帝以為揚威將軍平陽太守度支如故度徒洛翻五年漢主聰使前軍大將軍呼延晏將兵二萬七千寇洛陽比及河南河南縣屬河南尹周東都王城郟鄏也比必寐翻死者三萬餘人始安王曜王彌石勒皆引兵會之未至晏留輜重於張方故壘張方故壘在洛陽西七里重直用翻癸未先至洛陽甲申攻平昌門平昌門洛城南面東頭第一門丙戌克之遂焚東陽門及諸府寺六月丁亥朔晏以外繼不至俘掠而去帝具舟於洛水將東走晏盡焚之庚寅荀藩及弟光祿大夫組奔轘轅轘音環辛卯王彌至宣陽門宣陽門洛城南面東來第四門亦謂之謻門壬辰始安王曜至西明門丁酉王彌呼延晏克宣陽門入南宮升太極前殿縱兵大掠悉收宮人珍寶帝出華林園門欲奔長安漢兵追執之幽於端門曜自西明門入屯武庫戊戌曜殺太子詮吳孝王晏竟陵王楙右僕射曹馥尚書閭丘沖河南尹劉默等士民死者三萬餘人遂發掘諸陵焚宮廟官府皆盡曜納惠帝羊皇后遷帝及六璽於平陽璽斯氏翻石勒引兵出轘轅屯許昌光祿大夫劉蕃尚書盧志奔並州從劉琨也蕃琨之父也丁未漢主聰大赦改元嘉平以帝為特進左光祿大夫封平阿公考異曰帝紀聰以帝為會稽公載記三十國春秋云平阿公晉春秋云平河公河字蓋誤十六國三十國晉春秋明年二月乃封帝會稽公蓋先封平阿後進會稽帝紀闕略今從諸書敳之兄也敳魚開翻初始安王曜以王彌不待己至先入洛陽怨之彌説曜曰説輸芮翻下暾説同洛陽天下之中山河四塞城池宮室不假修營宜白主上自平陽徙都之曜以天下未定洛陽四面受敵不可守不用彌策而焚之彌罵曰屠各子豈有帝王之意邪晉書曰北狄以部落為類其入居塞內者有屠各等十九種皆有部落不相雜錯屠各最豪貴故得為單于統理諸種屠直於翻杜佑曰頭曼冒頓即屠各種也引兵東屯項關陳郡項縣有項關暾他昆翻今九州糜沸㣥雄競逐將軍於漢建不世之功又與始安王相失將何以自容不如東據本州彌青州東萊人上可以混一四海下不失鼎峙之業策之上者也彌心然之五年司徒傅祗建行臺於河陰司空荀藩在陽城陽城縣漢屬潁川郡晉屬河南郡汝陰太守平陽李矩為之立屋輸穀以給之薈歆之曾孫也華戶化翻汝陰縣漢屬汝南郡魏分置汝陰郡後廢武帝泰始二年復為郡薈烏外翻為于偽翻藩與弟組族子中護軍嵩薈與弟中領軍恆建行臺於密密縣漢屬河南郡晉屬滎陽郡推琅邪王睿為盟主藩承制以嵩為襄城太守矩為滎陽太守前冠軍將軍河南褚翜為梁國內史冠古玩翻翜山立翻又所甲翻揚威將軍魏浚屯洛北石梁塢劉琨承制假浚河南尹浚詣荀藩咨謀軍事藩邀李矩同會矩夜赴之矩官屬皆曰浚不可信不宜夜往矩曰忠臣同心何所疑乎遂往相與結歡而去浚族子該聚衆據一泉塢水經注洛水過盧丘縣南又東徑一合塢南城在川北原上高二十丈南北東三箱天險峭絶惟築西面即為全固一合之名起於是矣劉曜之攻河南也晉將軍魏該奔於此該傳曰一泉塢在宜陽沈約志魏置將軍四十號威武第十無武威豫章王端太子詮之弟也詮且緣翻東奔倉垣苟晞率㣥官奉以為皇太子置行臺端承制以晞領太子太傅都督中外諸軍録尚書事自倉垣徙屯蒙城蒙縣屬梁國撫軍將軍秦王業吳孝王之子荀藩之甥也年十二南奔密考異曰晉書愍帝諱鄴又改建鄴為建康按三十國晉春秋愍帝名子業或作鄴又吳志孫權改秣陵為建業取興建基業為名皆不為鄴字今從之南趣許昌趣七喻翻前豫州刺史天水閻鼎聚西州流民數千人於密欲還鄉里荀藩以鼎有才而擁衆用鼎為豫州刺史以中書令李緪緪居登翻考異曰閻鼎傳作李恆今從王浚傳司徒左長史彭城劉疇鎮軍長史周顗東海王越子毗為鎮軍將軍以顗為長史顗魚豈翻顗浚之子也時海內大亂獨江東差安中國士民避亂者多南渡江鎮東司馬王導説琅邪王睿收其賢俊與之共事睿從之辟掾屬百餘人自漢以來公府有掾有屬職官分紀曰掾屬常敦明信義肅清風俗非禮不言非法不行以訓㣥吏説輸芮翻掾以絹翻下同以前潁川太守勃海刁協為軍咨祭酒前東海太守王承廣陵相卞壼為從事中郎江寧令諸葛恢壺苦本翻吳孫權改秣陵為建業晉平吳復曰秣陵武帝太康二年分秣陵立江寧縣歷陽參軍陳國陳頵為行參軍頵居筠翻前太傅掾庾亮為西曹掾承渾之弟子恢靚之子靚疾正翻亮兗章甲十一行本兗作袞乙十一行本同張校同之弟子也五年江州刺史華軼華戶化翻軼音逸歆之曾孫也自以受朝廷之命軼永嘉中除江州多不受其教令郡縣多諫之軼曰吾欲見詔書耳及睿承荀藩檄承制署置官司改易長吏長知兩翻軼與豫州刺史裴憲皆不從命睿遣揚州刺史王敦歷陽內史甘卓與揚烈將軍廬江周訪合兵擊軼軼兵敗奔安成吳孫晧寶鼎二年分豫章廬陵長沙立安成郡宋白曰吉州安福縣本漢安成縣今縣西六十里有安成故城及其五子裴憲奔幽州睿以甘卓為湘州刺史周訪為尋陽太守又以揚武將軍陶侃為武昌太守吳孫權改鄂曰武昌晉武帝太康元年復立鄂縣而武昌如故改吳之江夏曰武昌郡漢尋陽縣屬廬江郡其地在江北惠帝永興元年分廬江武昌立尋陽郡治豫章之柴桑尋陽遂在江南五年秋七月王浚設壇告類告類祭也以事類告天及五帝也考異曰晉書初無其名劉琨與丞相箋曰浚設壇場有所建立稱皇太子不知為誰稱受中詔承制封拜備置百官列署征鎮以荀藩為太尉琅邪王睿為大將軍浚自領尚書令以裴憲及其壻棗嵩為尚書以田徽為兗州刺史李惲為青州刺史惲於粉翻五年南陽王模使牙門趙染戍蒲坂劉聰在平陽欲窺關中蒲坂兵衝也坂音反帥衆降漢帥讀曰率降戶江翻漢主聰以染為平西將軍八月聰遣染與安西將軍劉雅帥騎二萬攻模于長安河內王粲始安王曜帥大衆繼之染敗模兵於潼關長驅至下邽敗補邁翻下邽縣前漢屬京兆後漢省併入鄭縣桓帝復置晉屬馮翊郡應劭曰有上邽故稱下秦武公伐邽戎置宋白曰四夷縣道記下邽縣東南二十五里有下邽故城在渭水北師古曰邽音圭涼州將北宮純自長安帥其衆降漢將即亮翻漢兵圍長安模遣淳于定出戰而敗模倉庫虛竭士卒離散遂降於漢趙染送模於河內王粲九月粲殺模考異曰帝紀八月模遇害按劉琨上丞相箋曰平昌以九月遇禍世子時鎮隴右故得無恙今以為據白骨蔽野士民存者百無一二聰以始安王曜為車騎大將軍雍州牧更封中山王鎮長安雍於用翻以王彌為大將軍封齊公五年苟晞驕奢苛暴前遼西太守閻亨纘之子也數諫晞晞殺之數所角翻從事中郎明預有疾姓譜明秦大夫孟明之後為平原望姓晞怒曰我殺閻亨何關人事而輿病罵我輿羊茹翻預曰明公以禮待預故預以禮自盡今明公怒預其如遠近怒明公何桀為天子猶以驕暴而亡況人臣乎願明公且置是怒思預之言晞不從由是衆心離怨加以疾疫飢饉石勒攻王讚於陽夏擒之陽夏縣屬陳郡夏音賈遂襲蒙城執晞及豫章王端鎖晞頸以為左司馬漢主聰拜勒幽州牧王彌與勒外相親而內相忌劉暾説彌使召曹嶷之兵以圖勒説輸芮翻彌為書使暾召嶷且邀勒共向青州暾至東阿東阿縣漢屬東郡晉屬濟北國勒潛殺暾而彌不知會彌將徐邈高梁輒引所部兵去彌兵漸衰將即亮翻彌聞勒擒苟晞心惡之惡烏路翻以書賀勒曰公獲苟晞而用之何其神也使晞為公左彌為公右天下不足定也勒謂張賓曰王公位重而言卑其圖我必矣賓因勸勒乘彌小衰誘而取之誘音酉時勒方與乞活陳午相攻於蓬關蓬關在陳留浚儀縣班志曰蓬澤在河南開封縣東北臣瓚曰今浚儀有蓬陂是也彌請救於勒勒未之許張賓曰公常恐不得王公之便今天以王公授我矣陳午小豎不足憂王公人傑當早除之勒乃引兵擊瑞斬之彌大喜謂勒實親己不復疑也冬十月勒請彌燕于己吾己吾縣後漢屬陳留郡魏晉省陳留風俗傳曰縣故宋地雜以陳楚之地故梁國寧陵縣之徙種龍鄉也以成哀之世戶至八九千冠帶之士求置縣永元十一年陳王削地以大棘鄉直陽鄉自隸之命以嘉名曰己吾猶有陳楚之俗焉長史張嵩諫不聽酒酣勒手斬彌而並其衆表漢主聰稱彌叛逆聰大怒遣使讓勒專害公輔有無君之心然猶加勒鎮東大將軍督並幽二州諸軍事領並州刺史以慰其心苟晞王讚潛謀叛勒勒殺之並晞弟純勒引兵掠豫州諸郡臨江而還還從宣翻又如字屯于葛陂續漢書郡國志汝南郡鮦陽縣有葛陂賢曰葛陂在今豫州新蔡縣西北初勒之為人所掠賣也事見上卷惠帝永興二年劉琨得之章甲十一行本之下有遣使二字乙十一行本同孔本同張校同並其從子虎送於勒因遺勒書曰從才用翻遺于季翻下同將軍用兵如神所向無敵所以周流天下而無容足之地百戰百勝而無尺寸之功者蓋得主則為義兵附逆則為賊衆故也成敗之數有似呼吸吹之則寒噓之則溫今相授侍中車騎大將軍領護胸奴中郎將襄城郡公將軍其受之勒報書曰事功殊途非腐儒所知君當逞節本朝吾自夷難為效勒書意度雄爽此必張賓為之難乃旦翻厚禮其使謝而絶之時虎年十七殘忍無度為軍中患勒白母曰此兒凶暴無賴應劭曰賴者恃也晉灼曰許慎曰賴利也無利入於家也或曰江淮之間謂小兒多詐狡獪為無賴師古曰晉説是也聲名可惜不若自除之母曰快牛為犢多能破車汝小忍之及長便弓馬勇冠當時勒以為征虜將軍每屠城邑鮮有遺類長知兩翻冠古玩翻鮮息淺翻然御衆嚴而不煩莫敢犯者指授攻討所向無前勒遂寵任之石虎始此為虎誅夷勒諸子張本矩擊卻之五年初南陽王模以從事中郎索綝為馮翊太守綝靖之子也模死綝與安夷護軍金城麴允頻陽令梁肅俱奔安定索昔各翻姓也綝丑林翻頻陽縣屬馮翊郡秦厲公置應劭曰在頻水之陽杜佑曰京兆同官縣漢祋祤縣晉為頻陽縣時綝等自京兆南山奔安定安夷護軍蓋亦置司於長安時安定太守賈匹與諸氐羌皆送任子於漢綝等遇之於陰密擁還臨涇陰密縣屬安定郡商之密國詩所謂密人不恭敢距大邦者也臨涇縣時為安定郡治所匹從之乃共推匹為平西將軍率衆五萬向長安雍州刺史麴特新平太守竺恢皆不降於漢特與恢同守新平雍於用翻與扶風太守梁綜帥衆十萬會之帥讀曰率綜肅之兄也漢河內王粲在新豐使其將劉雅趙染攻新平不克索綝救新平大小百戰雅等敗退中山王曜與匹等戰於黃丘黃丘在馮翊雲陽縣黃嶔山下匹遂襲漢梁州刺史彭蕩仲殺之蕩仲安定盧水胡也據後蕩仲子天護漢以為涼州刺史此梁當作涼粲還平陽於是匹等兵勢大振關西胡晉翕然響應閻鼎欲奉秦王業入關據長安以號令四方河陰令傅暢祗之子也亦以書勸之鼎遂行荀藩劉疇周顗李述等皆山東人不欲西行中塗逃散鼎遣兵追之不及殺李緪等緪居登翻鼎與業自宛趣武關遇盜於上洛上洛縣漢屬弘農郡漢元鼎四年置居洛水上因以為名晉初改為京兆南部武帝泰始二年分京兆南部置上洛郡杜佑曰上洛漢長利縣宛於元翻趣七喻翻收其餘衆進至藍田使人告賈匹匹遣兵迎之十二月入于雍城雍於用翻使梁綜將兵衛之周顗奔琅邪王睿睿以顗為軍咨祭酒前騎都尉譙國桓彞亦避亂過江見睿微弱謂顗曰我以中州多故來此求全而單弱如此將何以濟既而見王導共論世事退謂顗曰向見管夷吾無復憂矣以王導比管仲也諸名士相與登新亭遊宴金陵覽古曰新亭在江寧縣十里近臨江渚按新亭蓋近勞勞亭風景不殊舉目有江河之異言洛都遊宴多在河濱而新亭臨江渚也坐徂臥翻王導愀然變色曰愀七小翻當共戮力王室克復神州戰國時騶衍以為中國者於天下乃八十一分居其一分耳中國名曰赤縣神州赤縣神州內自有九州禹之所序九州是也孔穎達曰按地統書括地象云地中央曰昆崙又云其東南方五千里曰神州以此言之昆崙在西北別統四方九州其神州者是昆崙東南一州耳於一州中更分九州則禹貢之九州是也又隋祭北郊有神州迎州冀州戎州拾州柱州宮州咸州揚州從祀其昆崙所統之四方九州歟衆皆收淚謝之陳頵遺王導書曰頵紆倫翻又居筠翻中華所以傾弊者正以取才失所先白望而後實事白望猶虛名也互相貢薦言重者先顯言輕者後敘遂相波扇以水為譬也波者水之動也風起則波生相扇而動加有莊老之俗傾惑朝廷養望者為弘雅政事者為俗人王職不恤法物墜喪喪息浪翻夫欲制遠先由近始今宜改張漢董仲舒論政曰譬猶琴瑟必改而更張之乃可鼓也拔卓茂於密縣事見四十卷漢光武建武元年朱邑為舒桐鄉嗇夫廉平不苛以愛利為行漢宣帝舉而用之官至大司農中興可冀耳導不能從五年劉琨長於招懷而短於撫御一日之中雖歸者數千而去者亦相繼琨遣子遵請兵於代公猗盧又遣族人高陽內史希合衆於中山幽州所統代郡上谷廣寧之民多歸之廣寧縣漢屬上谷郡晉武帝太康中分立廣寧郡唐屬媯州界王浚怒遣燕相胡矩督諸軍燕於賢翻相息亮翻與遼西公段疾陸眷共攻希殺之驅略三郡士女而去疾陸眷務勿塵之子也猗盧遣其子六修將兵助琨戍新興考異曰晉春秋作利孫按利孫即六修也胡語訛轉耳余按孔穎達曰聲相近者聲轉字異琨牙門將邢延以碧石獻琨琨以與六修六修復就延求之復扶又翻不得執延妻子延怒以所部兵襲六修六修走延遂以新興附漢請兵以攻並州李張李上脫初東夷校尉五字臻之死也事見上永嘉三年素喜連木丸津二部也為于偽翻殺掠士民屢敗郡兵敗補邁翻連年為寇東夷校尉封釋不能討請與連和連津不從民失業歸慕容廆者甚衆廆稟給遣還願留者即撫存之廆少子鷹揚將軍翰廆戶罪翻據載記翰於皓為庶兄皓廆第三子則翰非少子也少詩照翻言於廆曰自古有為之君莫不尊天子以從民望成大業今連津外以龐本為名內實幸災為亂封使君已誅本請和誅龐本見上永嘉三年龐皮江翻中原離亂州師不振州師謂平州之兵東夷校尉所統者是也莫之救恤單于不若數其罪而討之廆自稱鮮卑大單于下則並吞二部二部謂素喜連及木丸津也朝直遙翻私利歸於我國此霸王之基也廆笑曰孺子乃能及此乎遂帥衆東擊連津帥讀曰率以翰為前鋒破斬之盡併二部之衆得所掠民三千餘家及前歸廆者悉以付郡遼東賴以復存復扶又翻封釋疾病屬其孫奕於廆屬之欲翻釋卒廆召奕與語説之曰奇士也補小都督釋子冀州主簿悛幽州參軍抽來奔喪説與悅同悛丑緣翻又七倫翻此家抎抎千斤犍也抎羽敏翻説文從高而下也犍居言翻犗牛也言千斤之犍人間不可多得若從天而下也以道不通喪不得還皆留仕廆廆以抽為長史悛為參軍史言封氏諸子遂為慕容佐命之臣王浚以妻舅崔毖為東夷校尉毖琰之曾孫也為毖與慕容氏搆怨張本崔琰事曹公毖音祕何茲全標點容肇祖聶崇岐覆校
