body:
  text: 資治通鑑卷第十四翰林學士朝散大夫右諫議大夫知制誥兼侍講同提舉萬壽觀公事兼判集賢院上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣奉敕編集後學天台音注漢紀六前三年太宗孝文皇帝中前三年甲子前一七七前三年冬十月丁酉晦日有食之前三年十一月丁卯晦日有食之前三年詔曰前遣列侯之國事見上卷上年丞相朕之所重其為朕率列侯之國為于僞翻十二月免丞相勃遣就國乙亥以太尉灌嬰為丞相罷太尉官屬丞相漢承秦制以丞相太尉御史大夫為三公今周勃自丞相罷就國灌嬰自太尉為丞相因罷太尉官蓋三公不必備之意且兵柄難以輕屬也前三年夏四月城陽景王章薨諡法由義而濟曰景耆意大慮曰景布義行剛曰景前三年初趙王敖獻美人於高祖得幸有娠娠音身及貫高事發見十二卷高祖九年美人母弟趙兼因辟陽侯審食其言呂后食其音異基呂后妬弗肯白美人已生子恚即自殺恚於避翻吏奉其子詣上上悔名之曰長令呂后母之而葬其母真定後封長為淮南王見十二卷高祖十一年淮南王蚤失母常附呂后故孝惠呂后時得無患而常心怨辟陽侯以為不強爭之於呂后使其母恨而死也及帝即位淮南王自以最親時高祖諸子惟帝及長在故自以為最親數不奉法驕蹇謂不順也數所角翻是歲入朝朝直遙翻從上入苑囿獵與上同車常謂上大兄王有材力能扛鼎扛音江舉也乃往見辟陽侯自袖鐵椎椎辟陽侯令從者魏敬剄之從才用翻剄古頂翻馳走闕下肉袒謝罪帝傷其志為親故赦弗治為于僞翻治直之翻當是時薄太后及太子諸大臣皆憚淮南王淮南王以此歸國益驕恣出入稱警蹕稱制擬於天子袁盎諫曰諸侯太驕必生患上不聽為淮南王謀反廢張本前三年五月胸奴右賢王入居河南地右賢王胸奴貴王也居西方直上郡以西接氐羌師古曰北地郡之北黃河之南即白羊王所居余謂其地在北河之南蒙恬所收衛青所奪皆是地也殺掠章甲十五行本掠作略乙十一行本同孔本同人民上幸甘泉蔡雍曰天子車駕所至臣民以為僥幸故曰幸見令長三老官屬親臨軒作樂賜以酒食帛葛越巾佩帶之屬民爵有級數或賜田租之半故因謂之幸也師古曰甘泉宮在雲陽本秦林光宮括地志在雍州雲陽縣西北三十八里元和郡國志雲陽縣西北三十八里有車箱阪縈紆曲折財通單軌上阪即平原宏敞甘泉宮之地亦曰車盤嶺沈宋山有甘泉遣丞相灌嬰發車騎八萬五千詣高奴擊右賢王發中尉材官屬衛將軍軍長安此中尉所掌材官士也觀此益足以明二年罷衛將軍軍衛將軍之官本不罷也前三年上自甘泉之高奴因幸太原見故㣥臣皆賜之復晉陽中都民三歲租班志晉陽中都二縣皆屬太原郡高帝十一年立帝為代王都晉陽如淳注曰文紀又帝復晉陽中都二歲似遷都於中都也括地志中都故城在汾州平遙縣西南十三里宋白曰漢文帝為代王都中都故介休縣東南中都城也史記諸侯年表高帝十年封子恆為代王都中都復方目翻留游太原十餘日前三年初大臣之誅諸呂也朱虛侯功尤大大臣許盡以趙地王朱虛侯盡以梁地王東牟侯王于況翻下以義推及帝立聞朱虛東牟之初欲立齊王事見上卷呂后八年絀敕律翻貶下也及王諸子乃割齊二郡以王之興居自以失職奪功頗怏怏聞帝幸太原以為天子且自擊胡遂發兵反帝聞之罷丞相及行兵皆歸長安行兵行擊胸奴之兵也將四將軍十萬衆擊之祁侯繒賀為將軍軍滎陽應劭曰棘蒲即常山平棘縣師古非之余據靳歙傳則棘蒲趙地也在安陽以東宋白曰棘蒲春秋時晉邑漢初為棘蒲後改為平棘蓋亦本應說也班志祁縣屬太原郡晉大夫賈辛邑括地志並州祁縣城是也柴武繒賀皆高帝功臣姓譜柴姓高柴之後繒亦姓也以國為氏國語云申繒方強韋昭注繒出於姒姓七月上自太原至長安詔濟北吏民兵未至先自定及以軍城邑降者皆赦之復官爵與王興居去來者赦之師古曰雖始與興居共反今棄之去而來降者亦赦之貢父曰高帝詔曰與綰居去來歸者赦之今此文當云與王興居居去來者赦之蓋脫一居字也余謂貢父說是濟子禮翻降戶江翻濟北王興居兵敗自殺前三年初南陽張釋之為騎郎秦置南陽郡漢因之郎屬郎中令掌守門戶出充車騎郎中有車騎戶三將主車曰車郎主騎曰騎郎主戶衛曰戶郎皆以中郎將主之騎奇寄翻調徒釣翻選也欲免歸袁盎知其賢而薦之為謁者僕射班表謁者掌賓讚受事秩比六百石有僕射秩比千石應劭曰謁請也白也僕主也漢官儀曰僕射秦官也僕主也古者主武事每官必有主射者以督課之釋之從行登虎圈上問上林尉諸禽獸簿虎圈養虎之所在上林圈求遠翻班表有令有八丞十二尉武帝以後屬水衡都尉禽獸簿謂簿録禽獸之大數也尉左右視盡不能對蓋帝問之而不能對故倉皇失措而左右視也師古曰視其屬官盡不能對非也上所問禽獸簿甚悉欲以觀其能師古曰能謂材也能本獸名形似羆足似鹿為物堅中而強力故人之有賢材者皆謂之能無窮者虎圈嗇夫掌虎圈之吏也悉詳盡也響應者如響應聲言其捷也吏不當若是邪尉無賴言其才無足恃賴也援神契曰蝟多賴故不使超揚賴才也孟子富歲子弟多賴朱子曰賴藉也釋之久之前曰陛下以絳侯周勃何如人也上曰長者也長知兩翻又復問東陽侯張相如何如人也班志東陽縣屬臨淮郡長者復扶又翻釋之曰夫絳侯東陽侯稱為長者此兩人言事曾不能出口豈效此嗇夫喋喋利口捷給哉晉灼曰喋音牒且秦以任刀筆之吏師古曰刀所以削書也古者用簡牒故吏皆以刀筆自隨也揚子曰刀不利筆不銛說文楚謂之聿吳謂之不律燕謂之弗秦謂之筆釋名筆述也述事而書之也亟居力翻急也其敝徒文具而無實不聞其過陵遲至於土崩師古曰陵丘陵也陵遲言如丘陵之逶遲稍卑下也又曰陵夷夷平也言其頽替若丘陵之漸平也臣恐天下隨風而靡爭為口辨而無其實夫下之化上疾於景響舉錯不可不審也錯七故翻後以義推帝曰善乃不拜嗇夫上就車召釋之參乘乘繩證翻徐行問釋之秦之敝具以質言如淳曰質誠也上拜釋之為公車令頃之太子與梁王共車入朝不下司馬門於是釋之追止太子梁王無得入殿門遂劾不下公門不敬奏之班表公車令屬衛尉漢官儀公車司馬令掌殿司馬門如淳曰宮衛令諸出入殿門公車司馬門者皆下不如令者罰金四兩程大昌曰通典衛尉公車令曰胡廣云諸門各陳屯夾道其旁設兵以示威武交節立戟以遮訶出入劾戶概翻又戶得翻帝免冠謝教兒子不謹薄太后乃使使承詔赦太子梁王然後得入帝由是奇釋之拜為中大夫中大夫掌論議屬郎中令其位在太中大夫之下諫大夫之上武帝太初元年更名中大夫曰光祿大夫秩比二千石太中大夫秩比千石如故至後漢志有光祿大夫太中大夫中散大夫諫議大夫胡廣曰光祿大夫本為中大夫武帝元狩五年置為光祿大夫諫大夫世祖中興以為諫議大夫又有太中中散大夫此四等於古皆為天子之下大夫視列國之上卿至中郎將從行至霸陵上謂㣥臣曰嗟乎以北山石為椁用紵絮斫陳漆其間師古曰美石出京師北山今宜州石是斫絮以漆著其間也紵竹呂翻康曰紵檾屬細者為絟粗者為紵陸璣草木疏曰紵亦麻也科生數十莖宿根在地中至春自生不歲種也荊揚之間一歲三收今官園種之歲再刈刈便生剝之以鐵若竹挾之表厚皮自脫但得其裹韌如筋者謂之徽紵今南越紵布皆用此麻檾口穎翻斫側略翻左右皆曰善釋之曰使其中有可欲者雖錮南山猶有隙使其中無可欲者雖無石槨又何戚焉錮音固冶銅鑄塞以為固也師古曰有可欲謂多藏金玉而厚葬之人皆欲發取之也是有間隙也無可欲謂不置器備而薄葬人無欲攻掘取之者故無憂戚也帝稱善是歲釋之為廷尉上行出中渭橋張晏曰中渭橋在渭橋中路臣瓚曰中渭橋兩岸之中索隱曰張晏臣瓚之說皆非也按今渭橋有三所一所在城西北咸陽路曰西渭橋一所在城東北高陵路曰東渭橋其中渭橋在長安故城之北乘輿馬驚乘繩證翻於是使騎捕之屬廷尉屬之欲翻下同釋之奏當此人犯蹕當罰金崔浩曰奏當謂處其罪也索隱曰按百官志云廷尉掌平刑罰奏當一應郡國讞疑罪皆處當以報之也如淳曰蹕止行人乙令蹕先至而犯者罰金四兩此人親驚吾馬馬賴和柔令他馬固不敗傷我乎而廷尉乃當之罰金釋之曰法者天下公共也今法如是更重之是法不信於民也且方其時上使使誅之則已今已下廷尉下遐嫁翻廷尉天下之平也一傾天下用法皆為之輕重民安所錯其手足錯七故翻唯陛下察之上良久曰廷尉當是也其後人有盜高廟坐前玉環得得言捕得也坐徂臥翻下廷尉治釋之按盜宗廟服御物者為奏當棄市上大怒曰人無道乃盜先帝器吾屬廷尉者欲致之族而君以法奏之索隱曰謂依律而斷也屬之欲翻共讀曰恭釋之免冠頓首謝曰法如是足也且罪等然以逆順為差如淳曰罪等俱死罪也盜玉環不若長陵土之逆仲馮曰此等讀如等級之等言凡罪之等差有如萬分一假令愚民取長陵一抔土長陵高祖陵也張晏曰不欲指言故以取土喻之也師古曰抔謂以手掬之也抔步侯翻帝乃白太后許之四年四年冬十二月潁陰懿侯灌嬰薨四年春正月甲午以御史大夫陽武張蒼為丞相班志陽武縣屬河南郡博聞尤邃律曆好呼到翻四年上召河東守季布河東本韓魏之地秦置郡有言其勇使酒難近者應劭曰使酒酗酒也師古曰言因酒霑洽而使氣也近謂附近天子而為大臣近其靳翻留邸一月見罷師古曰既引見而罷令還郡也貢父曰見罷猶言見逐見棄耳非引見也臣無功竊寵待罪河東陛下無故召臣此人必有以臣欺陛下者師古曰謂妄言其賢故云欺也無所受事罷去此人必有毀臣者夫陛下以一人之譽而召臣以一人之毀而去臣譽音余去羌呂翻臣恐天下有識聞之有以窺陛下之淺深也上默然慚良久曰河東吾股肱郡故特召君耳四年上議以賈誼任公卿之位大臣多短之曰洛陽之人年少初學少詩照翻專欲亶權紛亂諸事於是天子後亦疏之不用其議以為長沙王太傳長沙王吳差也漢制諸侯王國有太傅輔王疏與疏同四年絳侯周勃既就國每河東守尉行縣至絳漢承秦制郡有守有尉守掌治其郡尉掌佐守典武職甲卒行縣循行屬縣也行下孟翻常被甲令家人持兵以見之被皮義翻其後人有上書告勃欲反下廷尉上時掌翻下遐嫁翻廷尉逮捕勃治之勃恐不知置辭師古曰置立也辭對獄之辭勃以千金與獄吏吏章甲十五行本下吏字上重獄字乙十一行本同孔本同乃書牘背示之曰牘木簡也以書獄辭李奇曰牘吏所執簿韋昭曰牘版也索隱曰簿即牘也故魏志秦宓以簿擊頰則亦簡牘之類也以公主為證公主者帝女也勃太子勝之尚之韋昭曰尚奉也不敢言娶也帝朝太后太后以冒絮提帝曰應劭曰冒絮陌額絮也如淳曰太后恚怒遭得左右物提之也晉灼曰巴蜀異物志謂頭上巾為冒絮師古曰冒覆也老人所以覆其頭提擊之也提徒計翻索隱音抵擲也絳侯始誅諸呂綰皇帝璽綰烏版翻將兵於北軍不以此時反今居一小縣顧欲反邪帝既見絳侯獄辭乃謝曰吏方驗而出之於是使使持節赦絳侯復爵邑絳侯既出曰吾嘗將百萬軍然安知獄吏之貴乎四年作顧成廟服虔曰顧成廟在長安城南還顧見城故名之應劭曰帝自為廟制度卑狹若顧望而成猶文王靈臺不日成之故曰顧成也如淳曰身存而為廟若周之顧命也景帝廟號德陽武帝廟號龍淵昭帝廟號徘徊宣帝廟號樂遊元帝廟號長壽成帝廟號陽池師古曰以還顧見城於義無取又書本不作城郭字應說近之五年五年春二月地震五年初秦用半兩錢秦半兩錢重如其文難用更鑄莢錢更工衡翻下同如淳曰如榆莢也莢音頰杜佑曰莢錢如榆莢重一銖半徑五分文曰漢興即應劭所謂五分錢於是物價騰踊米至石萬錢夏四月更造四銖錢應劭曰文帝以五分錢太輕小更作四銖錢文亦曰半兩今民間半兩錢最輕小者是也使民得自鑄賈誼諫曰法使天下公得雇租鑄銅錫為錢師古曰雇租謂雇傭之直或租其本其罪黥然鑄錢之情非殽雜為巧則不可得贏師古曰殽謂亂雜也不得贏謂無餘利也言不雜鉛鐵則無利也殽音爻為利甚厚師古曰微謂精妙也言殽雜鉛鐵其術精妙不可覺知而得利甚厚故令人輕犯姦而不可止也余謂微細也言姦民殽雜鉛鐵其所費甚微而得利甚厚也今令細民人操造幣之勢師古曰操持也人人皆得鑄錢也操千高翻屏必郢翻蔽也言各自隱蔽而鑄錢也因欲禁其厚利微姦雖黥罪日報其勢不止蘇林曰報論余據張湯傳有訊鞫論報嚴延年傳有報囚師古注皆以為論奏獲報原父注則謂報者為斷決囚若今有司書囚罪長吏判準斷是也民人抵罪多者一縣百數及吏之所疑搒笞奔走者甚衆搒音彭夫縣法以誘民縣讀曰懸師古曰懸謂開立之使入陷阱孰多於此師古曰阱穿地以陷獸也阱才性翻郡縣不同或用輕錢百加若干應劭曰時錢重四銖法錢百文當重一斤十六銖輕則以錢足之若干枚令滿平也師古曰若干且設數之言也干猶箇也謂當如此箇數也而胡廣云若順也干求也當順所求而與之矣平稱不受應劭曰用重錢則平稱有餘不能受也臣瓚曰秦錢重半兩漢初鑄莢錢文帝更鑄四銖錢秦錢與莢錢皆當廢而故與四銖並行民以其見廢故用輕錢則百加若干用重錢則雖一當一猶復不受是以郡縣不同也師古曰應說是也稱尺孕翻師古曰依法之錢也則大為煩苛而力不能勝縱而弗呵乎則市肆異用錢文大亂苟非其術何鄉而可哉今農事棄捐而采銅者日蕃勝音升鄉讀曰嚮蕃扶元翻釋其耒耨冶鎔炊炭姦錢日多五穀不為多言民棄其農而冶銅炊炭故五穀不為多為于僞翻願民陷而之刑戮刑戮將甚不詳奈何而忽怵先律翻又音黜誘也言動心於為姦邪也願謹也師古曰詳平也忽忽忘也國知患此吏議必曰禁之禁之不得其術其傷必大令禁鑄錢則錢必重師古曰令謂法令也盜鑄如雲而起棄市之罪又不足以禁矣姦數不勝而法禁數潰銅使之然也數所角翻銅布於天下其為禍博矣故不如收之賈山亦上書諫以為錢者亡用器也亡與無通富貴者人主之操柄也令民為之是與人主共操柄不可長也上不聽操千高翻長知兩翻是時太中大夫鄧通方寵幸上欲其富賜之蜀嚴道銅山使鑄錢班志嚴道屬蜀郡括地志雅州榮經縣北三里有銅山即鄧通得賜銅山鑄錢者也唐榮經即漢嚴道也豫章秦鄣郡地高帝分置豫章郡東煮海水為鹽以故無賦而國用饒足史言吳以強富致叛五年初帝分代為二國事見上卷一年參為太原王是歲徙代王武為淮陽王以太原王參為代王盡得故地故代國之地六年六年冬十月桃李華華讀如花六年淮南厲王長自作法令行於其國逐漢所置吏請自置相二千石王國自相至內史中尉皆吏二千石漢為置之餘得自置今長驕橫逐漢所置吏而請自置之又亶刑殺不辜及爵人至關內侯關內侯爵第十九爵自上出非侯王所亶數所角翻帝重自切責之師古曰重難也引管蔡及代頃王濟北王興居以為警戒周公誅管叔蔡叔代頃王高祖兄仲也諡法甄心動懼曰頃敏以敬慎曰頃廢為侯事見十一卷高祖七年興居事見上三年風讀曰諷頃音傾王不說說讀曰悅令大夫但士伍開章等七十人開姓也姓譜衛公子開方之後師古曰輦車古人挽行以載兵器也谷口在長安北處多險阻班志谷口縣屬左馮翊括地志谷口故城在雍州醴泉縣東北四十里乘繩證翻事覺有司治之使疏吏翻下以義推使使召淮南王王至長安丞相張蒼典客馮敬行御史大夫事與宗正廷尉奏長罪當棄市制曰其赦長死罪廢勿王徙處蜀郡嚴道邛郵邛郵置名師古曰郵行書之舍余據班志嚴道有邛來山邛水所出蓋於其地置郵驛也杜佑曰邛州臨邛縣南有邛來山在雅州百丈縣嚴道今雅州宋白曰秦滅楚徙嚴王之族以實此地故曰嚴道勿王于況翻處昌呂翻邛渠容翻郵音尤載長以輜車令縣以次傳之傳直戀翻下同袁盎諫曰上素驕淮南王弗為置嚴傅相為于僞翻相息亮翻以故致章甲十五行本致作至乙十一行本同孔本同此淮南王為人剛今暴摧折之臣恐卒逢霧露病死卒讀曰猝又音子恤翻終也陛下有殺弟之名奈何上曰吾特苦之耳今復之師古曰暫困苦之令其自悔即追還也淮南王果憤恚不食死縣傳至雍班志雍縣屬扶風雍於用翻以死聞輜車有封前此所經縣傳莫敢發至雍令乃發之謂袁盎曰吾不聽公言卒亡淮南王卒子恤翻今為奈何盎曰獨斬丞相御史以謝天下乃可上即令丞相御史逮考諸縣傳送淮南王不發封餽侍者皆棄市以列侯葬淮南王於雍置守冢三十戶六年胸奴單于遺漢書曰前時皇帝言和親事稱書意合歡遺于季翻下同師古曰稱副也言與所遺書意相副而共結歡親稱尺證翻下同漢邊吏侵侮右賢王右賢王不請聽後義盧侯難支等計索隱曰難支胸奴將名也絶二主之約離兄弟之親故罰右賢王使之西求月氏擊之以天之福吏卒良馬力強以夷滅月氏盡斬殺降下定之氏音支降戶江翻樓蘭烏孫呼揭樓蘭國在西域之東垂後曰鄯善自武帝開河西之後地最近漢當白龍堆之道烏孫國治赤谷城師古曰烏孫於西域諸戎其形最異今之胡人青眼赤須狀類獼猴是其種也史記正義呼揭國在瓜州西北余據班史胸奴北服丁零呼揭之國宣帝時胸奴乖亂其西方呼揭王自立為呼揭單于西域傳呼揭不在三十六國之數而烏孫國東與胸奴接則呼揭蓋在烏孫之東胸奴西北也師古曰揭丘例翻索隱其列翻正義音犂皆已為胸奴諸引弓之民釋名曰弓穹也張之穹穹然也北州以定願寢兵休士卒養馬除前事復故約以安邊民皇帝即不欲胸奴近塞則且詔吏民遠舍近其靳翻帝報書曰單于欲除前事復故約朕甚嘉之此古聖王之志也漢與胸奴約為兄弟所以遺單于甚厚倍約離兄弟之親者常在胸奴倍蒲妹翻然右賢王事已在赦前單于勿深誅單于若稱書意明告諸吏使無負約有信敬如單于書後頃之冒頓死子稽粥立稽音雞粥音育號曰老上單于老上單于初立帝復遣宗室女翁主為單于閼氏復扶又翻閼氏音煙支使宦者燕人中行說傅翁主中行姓說名中行本出荀氏晉荀林父將中行因以為氏行戶江翻說讀曰悅漢強使之強其兩翻說曰必我也為漢患者言為漢患者必我也史倒其文因當時語因降單于單于甚親幸之初胸奴好漢繒絮食物繒帛也絮綿也好呼到翻下同胸奴人衆不能當漢之一郡然所以強者以衣食異無仰於漢也今單于變俗好漢物漢物不過什二則胸奴盡歸於漢矣師古曰言漢費物十分之二則胸奴之衆將盡歸於漢矣以馳草棘中衣袴皆裂敝以示不如旃裘之完善也得漢食物皆去之去丘呂翻棄也以示不如湩酪之便美也湩竹用翻又都奉翻乳汁也酪盧各翻以乳為之於是說教單于左右疏記以計課其人衆畜牧其遺漢書牘及印封皆令長大倨傲其辭遺于季翻自稱天地所生日月所置胸奴大單于漢使或訾笑胸奴俗無禮義者訾將此翻毀也中行說輒窮漢使曰胸奴約束徑易行易以豉翻君臣簡可久一國之政猶一體也故胸奴雖亂必立宗種種章勇翻今中國雖云有禮義及親屬益疏則相殺奪以至易姓皆從此類也嗟土室之人胸奴之人逐水草居廬帳非如中國有室屋故謂中國人為土室之人師古曰嗟者歎愍之言喋喋占占師古曰顧思念也喋喋利口也占占衣裳貌也言漢人且當思念無為喋喋占占占昌占翻令其量中必善美而已矣師古曰顧念也中猶滿也量中者滿其數也中竹仲翻且所給備善則已不備苦惡則候秋熟以騎馳蹂而稼穡耳師古曰苦猶粗也蹂踐也而汝也韋昭曰苦音靡盬之盬蹂人九翻六年梁太傅賈誼誼自長沙徵為梁懷王太傅臣竊惟今之事勢可為痛哭者一可為流涕者二可為長太息者六若其他背理而傷道者難遍以疏舉背蒲妹翻進言者皆曰天下已安已治矣臣獨以為未也曰安且治者非愚則諛皆非事實知治亂之體者也治直吏翻下同夫抱火厝之積薪之下而寢其上厝千故翻置也火未及然因謂之安方今之勢何以異此陛下何不一令臣得孰數之於前孰古熟字通試詳擇焉使為治勞志章甲十五行本志作智乙十一行本同孔本同慮苦身體乏鐘鼓之樂勿為可也樂與今同而加之諸侯軌道師古曰軌道言遵法制也樂音洛胸奴賓服百姓素朴生為明帝沒為明神名譽之美垂於無窮使顧成之廟稱為太宗上配太祖與漢亡極亡古無字通為萬世法雖有愚幼不肖之嗣猶得蒙業而安以陛下之明達因使少知治體者得佐下風致此非難也夫樹國固必相疑之勢鄭氏曰今建立國泰大其勢固必相疑也臣瓚曰樹國於險固諸侯強大則必與天子有相疑之勢也師古曰鄭說是上數爽其憂如淳曰爽忒也數所角翻今或親弟謀為東帝親兄之子西鄉而擊親弟謂淮南厲王長謀反親兄之子謂齊悼惠王子濟北王興居欲西擊滎陽鄉讀曰嚮如淳曰時吳王濞不循漢法有告之者應劭曰鼎方也德澤有加焉行下孟翻猶尚如是況莫大諸侯權力且十此者呼師古莫大謂無有大於其國者言最大也十此謂十倍於此余謂誼之大意蓋謂淮南濟北當文帝之時尚敢以一國為變使諸侯相合襲是跡而動則其權力十倍於此為患莫大焉然而天下少安何也大國之王幼弱未壯漢之所置傅相方握其事數年之後諸侯之王大抵皆冠師古曰大抵猶言大略也冠古玩翻漢之傅相稱病而賜罷彼自丞尉以上遍置私人如此有異淮南濟北之為邪此時而欲為治安雖堯舜不治黃帝曰日中必操刀必割孟康曰音衛日中盛者必暴也臣瓚曰太公曰日中不是謂失時操刀不割失利之期言當及時也師古曰謂暴曬之也易以豉翻不肯蚤為已乃墮骨肉之屬而抗剄之應劭曰抗其頭而剄之也師古曰墮毀也抗舉也剄割頸也墮許規翻剄工頂翻呼古乎字漢已幸而勝之矣又不易其所以然同姓襲是跡而動既有徵矣徵證驗也殃禍之變未知所移明帝處之尚不能以安處昌呂翻後世將如之何臣竊跡前事師古曰尋前事之蹤跡長沙乃二萬五千戶耳功少而最完勢疏而最忠漢初功臣封王者獨長沙王吳芮傳國至文帝時亦形勢然也曩令樊酈絳灌據數十城而王今雖以殘亡可也令信越之倫列為徹侯而居雖至今存可也然則天下之大計可知已欲諸王之皆忠附則莫若令如長沙王欲臣子勿菹醢則莫若令如樊酈等菹臻魚翻虀也醢呼改翻肉醬也欲天下之治安莫若衆建諸侯而少其力力少則易使以義師古曰使以義使之遵禮義也少詩沼翻令海內之勢如身之使臂臂之使指莫不制從諸侯之君不敢有異心輻湊並進而歸命天子割地定制令齊趙楚各為若干國使悼惠王幽王元王之子孫畢以次各受祖之分地分扶問翻地盡而止其分地衆而子孫少者建以為國空而置之須其子孫生者舉使君之須待也一人之衆天子亡所利焉亡古無字通下同如此則臥赤子天下之上而安植遺腹朝委裘而天下不亂服虔曰言天下安雖赤子遺腹在位猶不危也應劭曰植遺腹朝委裘皆未有所知也孟康曰委裘若容衣天子未坐朝事先帝裘衣也植音值朝直遙翻當時大治後世誦聖師古曰稱其聖明天下之勢方病大瘇如淳曰腫足曰瘇師古曰瘇止勇翻脛戶定翻腳脛釋名曰脛莖也直而長似物莖也幾居依翻下同一指之大幾如股平居不可屈伸一二指慉身慮無聊師古曰慉謂動而痛也聊賴也慉丑六翻必為錮疾師古曰錮疾堅久之疾不能為已師古曰扁鵲良醫也為治也已語終辭又苦盩師古曰古跖字之石翻足下曰跖今所呼腳掌是也盩古戾字言足跖反戾不可行也帝之從弟也今之王者從弟之子也惠王之子親兄子也今之王者兄子之子也楚元王交高帝之弟其子於文帝為從弟齊悼惠王肥高帝之庶長子其子於文帝為親兄子從才用翻疏者或制大權以逼天子師古曰廣立藩屏則天下安故曰以安天下逼古逼字又苦盩可痛哭者此病是也天下之勢方倒縣縣古懸字通下同天下之首何也上也蠻夷者天下之足何也下也今胸奴嫚侮侵掠至不敬也而漢歲致金絮采繒以奉之足反居上首顧居下師古曰顧亦反也莫之能解猶為國有人乎師古曰顛倒如此而不能解救豈謂國有明智之人乎今不獵猛敵而獵田彘不搏反寇而搏畜菟玩細娛而不圖大患德可遠加而直數百里外威令不勝章甲十五行本勝作伸乙十一行本同孔本同張校同退齊校同可為流涕者此也今庶人屋壁得為帝服倡優下賤得為后飾且帝之身自衣皂綈綈徒奚翻厚繒也衣於既翻下能衣同而富民牆屋被文繡被皮義翻天子之后以緣其領庶人孽妾以緣其履師古曰緣熒絹翻孽庶賤者此臣所謂舛也夫百人作之不能衣一人欲天下亡寒胡可得也一人耕之十人聚而食之欲天下亡飢不可得也飢寒切於民之肌膚欲其亡為姦邪不可得也可為長太息者此也商君遺禮義棄仁恩並心於進取行之二歲秦俗日敗故秦人家富子壯則出分分扶問翻家貧子壯則出贅借父耰鉏慮有德色師古曰耰摩田器言以耰及鉏借與其父而容色自矜以為恩德也耰音憂立而誶語服虔曰誶猶罵也張晏曰誶語讓也誶音碎與公併倨師古曰哺飼也言婦抱其子而哺之乃與其舅併倨無禮之甚也哺音步併步鼎翻說讀曰悅則反脣而相稽應劭曰稽計也相與計校也稽工奚翻不同禽獸者亡幾耳師古曰惟有慈愛其子而貪嗜財利不異於禽獸也無幾言不多也幾居豈翻仲馮曰誼謂秦人不知孝義但知愛子貪利而已此其去禽獸無幾也耆古嗜字通用猶尚未改棄禮義捐廉恥日甚可謂月異而歲不同矣逐利不耳慮非顧行也師古曰言其所追赴惟計利與不耳念慮之中非顧所行之善惡貢父曰慮大率也不讀曰否而大臣特以簿書不報期會之間以為大故至於俗流失世壞敗因恬而不知怪師古曰恬安也徒兼翻慮不動於耳目以為是適然耳師古曰適當也謂事理當然使天下回心而鄉道鄉讀曰嚮類非俗吏之所能為也俗吏之所務在於刀筆筐篋師古曰刀所以削書札筐篋所以盛書也篋音古頰翻陛下又不自憂竊為陛下惜之為于僞翻豈如今定經制令君君臣臣上下有差父子六親各得其宜賢曰六親謂父子兄弟夫婦也世世常安而後有所持循矣師古曰執持而順行之是猶渡江河亡維楫師古曰維所以繫船楫所以剌船也詩曰紼縭維之楫音集又音接船必覆矣可為長太息者此也夏殷周為天子皆數十世秦為天子二世而亡人性不甚相遠也遠于萬翻何三代之君有道之長而秦無道之暴也其故可知也古之王者太子乃生師古曰乃始也有司齊肅端冕見之南郊齊讀曰齊見戶電翻過闕則下過廟則趨故自為赤子仲馮曰嬰兒體色赤故曰赤子孩提有識師古曰孩小兒也提謂提撕之太師太傅太保為三公少師少傅少保為三少少詩照翻不使見惡行去羌呂翻行下孟翻於是皆選天下之端士孝弟博聞有道術者以衛翼之使與太子居處出入處昌呂翻故太子乃生而見正事聞正言行正道左右前後皆正人也夫習與正人居之不能毋正猶生長於齊不能不齊言也習與不正人居之不能毋不正猶生長於楚之地不能不楚言也孔子曰少成若天性習貫如自然師古曰貫亦習也工宦翻下積貫同習與智長故切而不愧師古曰每被切磋故無大過可愧恥之事長知兩翻故中道若性夫三代之所以長久者以其輔翼太子有此具也及秦而不然使趙高傅胡亥而教之獄所習者非斬劓人則夷人之三族也劓魚器翻割鼻也胡亥今日即位而明日射人射而亦翻忠諫者謂之誹謗深計者謂之妖言其視殺人若艾草菅然艾與刈同師古曰菅茅也音姦彼其所以道之者非其理故也道讀曰導鄙諺曰前車覆後車誡秦世之所以亟絶者其轍跡可見也師古曰亟急也車跡曰轍是後車又將覆也天下之命縣於太子縣讀曰懸太子之善在於早諭教與選左右師古曰諭曉告也與猶及也則化易成也易以豉翻開於道術智誼之指則教之力也若其服習積貫則左右而已夫胡粵之人生而同聲嗜欲不異及其長而成俗纍數譯而不能相通譯傳言也夷狄與中國言語不同故使通夷狄之言者譯之周禮象胥是也長知兩翻蘇林曰言其人不能易事相為處臣故曰選左右早諭教最急夫教得而左右正則太子正矣太子正而天下定矣書曰一人有慶兆民賴之師古曰周書呂刑之辭也一人天子也言天子有善則兆庶獲其利凡人之智能見已然不能見將然夫禮者禁於將然之前師古曰將然謂欲有其事是故法之所為用易見而禮之所為生難知也易以豉翻若夫慶賞以勸善刑罰以懲惡先王執此之政堅如金石行此之令信如四時據此之公無私如天地豈顧不用哉然而曰禮云禮云者貴絶惡於未萌而起教於微眇師古曰眇細小也遠于願翻孔子曰聽訟吾猶人也必也使毋訟乎師古曰論語載孔子之言也言使吾聽訟與衆人齊等然能先以德義化之使無訟莫如先審取舍師古曰取所擇用也舍所棄置也舍讀曰捨下同師古曰極中也萌始生也與湯武同然而湯武廣大其德行六七百歲而弗失秦王治天下十餘歲則大敗治直之翻此亡他故矣亡古無字通下同夫天下大器也今人之置器置諸安處則安置諸危處則危天下之情與器無以異在天子之所置之湯武置天下於仁義禮樂纍子孫數十世此天下所共聞也秦王置天下於法令刑罰禍幾及身幾居依翻子孫誅絶此天下之所共見也是非其明效大驗邪人之言曰聽言之道必以其事觀之則言者莫敢妄言今或言禮誼之不如法令教化之不如刑罰人主胡不引殷周秦事以觀之也胡何也㣥臣如陛衆庶如地故陛九級上廉遠地則堂高遠于願翻下同陛無級廉近地則堂卑高者難攀卑者易陵師古曰級等也廉側隅也陵乘也故古者聖王制為等列內有公卿大夫士外有公侯伯子男然後有官師小吏師古曰官師一官之長等級分明而天子加焉故其尊不可及也里諺曰欲投鼠而忌器此善諭也鼠近於器尚憚不投恐傷其器況於貴臣之近主乎近其靳翻廉恥節禮以治君子故有賜死而無戮辱是以黥劓之罪不及大夫杜佑曰刑不上大夫者古之大夫有坐不廉汙穢者則曰簠簋不飾淫亂男女無別者則曰帷薄不修罔上不忠者則曰臣節未著罷軟不勝任者則曰下官不職干國之紀則曰行事不請此五者大夫定罪之名矣不忍斥然正以呼之其在五刑之域者云云如後誼所云離力智翻禮不敢齒君之路馬蹴其芻者有罰齒謂審其齒歲也蹴踏也芻馬所食草記曲禮以足蹴路馬芻有誅齒路馬有誅蹴千六翻所以為主上豫遠不敬也今自王侯三公之貴皆天子之所改容而禮之也古天子之所謂伯父伯舅也師古曰天子呼諸侯長者同姓則曰伯父異姓則曰伯舅伯長也髡苦昆翻刖音月斷足也笞丑之翻傌音罵毛晃曰戮辱也然則堂不無陛呼被戮辱者不泰迫呼師古曰迫天子也大臣無乃握重權大官而有徒隸無恥之心呼夫望夷之事二世見當以重法者如淳曰決罪曰當閻樂殺二世於望夷宮本由秦制無忌上之風也仲馮曰趙高殺二世蓋又以法定其罪臣聞之履雖鮮不加於枕冠雖敝不以苴履師古曰苴者履中之藉苴子余翻天子改容而禮貌之矣師古曰禮貌謂加禮容而敬之也今而有過帝令廢之可也退之可也賜之死可也滅之可也若夫束縛之係緤之師古曰緤謂以長繩係之也緤先列翻編之徒官師古曰司寇主刑罰之官編次列也徒官謂刑徒輸作於官者搒音彭殆非所以令衆庶見也夫卑賤者習知尊貴者之一旦吾亦乃可以加此也蘇林曰知有一旦之刑古者大臣有坐不廉而廢者不謂不廉曰簠簋不飾師古曰簠簋所以盛飯也方曰簠圓曰簋埤雅曰龜有靈德伏匿而噎善潛而不志於養故古者簠簋皆為龜形於其上而大臣以貪墨坐廢者曰簠簋不飾賈公彥曰簠內圓外方簋內方外圓皆受斗二升簠音甫又音扶簋音軌不曰汙穢曰帷薄不修坐罷軟不勝任者不謂罷軟曰下官不職師古曰罷廢於事也軟弱也罷讀曰疲軟人兗翻勝音升猶未斥然正以呼之也尚遷就而為之諱也故其在大譴大何之域者師古曰譴責也何問也域界局也鄭氏曰以毛作纓白冠喪服也造請室而請罪耳應劭曰請室請罪之室蘇林曰音潔清之清胡公漢官車駕出有清室令在前先驅此官有別獄也如淳曰水性平若己有正罪君以平法治之也加劍當以自刎也或曰殺牲以盤水取頸血故示若此也造七到翻其有中罪者聞命而自弛上不使人頸盩而加也師古曰中罪非大非小也弛廢也自廢而死蘇林曰不戾其頸而親加刀鋸弛式爾翻盩古戾字音盧計翻聞命則北面再拜跪而自裁師古曰裁謂自刑殺也師古曰捽持頭髮也抑按也捽才兀翻吾遇子有禮矣服虔曰子者男子美號故㣥臣自喜師古曰喜讀曰喜許吏翻喜好也好為志氣也故人矜節行師古曰嬰加也矜尚也行下孟翻下同而臣不以節行報其上者則非人類也故化成俗定則為人臣者皆顧行而忘利守節而伏義故可以託不御之權可以寄六尺之孤言臣下矜尚節行故可託以權柄不須復加制御應劭曰六尺之孤未能自立者也主上何喪焉師古曰喪失也言如此則於主上無所失喪息浪翻此謂以禮義廉恥遇其臣彼謂戮辱貴臣言不為此而反久行彼也誼以絳侯前逮繫獄卒無事卒子恤翻故以此譏上上深納其言養臣下有節是後大臣有罪皆自殺不受刑漢人相傳以大臣不對理陳冤為故事多有聞命而引決者然詣獄受刑者亦多有之史特大概言之耳七年七年冬十月令列侯太夫人如淳曰列侯之妻稱夫人列侯死子復為列侯乃得稱太夫人子不為列侯不得稱也亶七年夏四月赦天下七年六月癸酉未央宮東闕罘罳災如淳曰東闕與其兩旁罘罳皆災也晉灼曰東闕之罘罳獨災也師古曰罘罳謂連闕曲閣也以覆重刻垣墉處其形罘罳然一曰屏也崔豹古今注曰罘罳屏也又云罘者復也罳者思也臣朝君至屏外復思所奏之事於其下孔穎達曰屏謂之樹今浮思也釋宮文漢時謂屏為浮思解者以為天子外屏人臣至屏俯伏思念其事按匠人城隅謂角浮思也漢時東闕浮思災以此諸文參之則浮思小樓也故城隅闕上皆有之然則屏上亦為屋以覆屏牆故稱屏曰浮思蘇鶚演義曰罘者浮也罳者思也謂織絲之文輕疏虛浮之貌蓋宮殿門闕有此物也余謂蘇鶚之說有見於唐禁中之罘罳唐太和甘露之變宦者奉乘輿決罘罳北出者也此罘罳當以舊注為正七年民有歌淮南王者曰一尺布尚可縫一斗粟尚可舂兄弟二人不相容帝聞而病之臣瓚曰一尺布可縫而共衣一斗粟可舂而共食況以天下之廣而兄弟不相容乎八年八年夏封淮南厲王子安等四人為列侯淮南厲王長子安封阜陵侯勃封安陽侯賜封陽周侯良封東城侯上疏諫曰淮南王之悖逆無道悖蒲內翻天下孰不知其罪陛下幸而赦遷之自疾而死天下孰以王死之不當當丁浪翻今奉尊罪人之子適足以負謗於天下耳師古曰言若尊王其子則是淮南王無罪漢枉殺之也師古曰少壯猶言稍長大少詩沼翻白公勝所為父報仇者大父與叔父也為于僞翻白公為亂非欲取國代主發忿快志剡手以衝仇人之胸固為俱靡而已白公勝楚平王之孫太子建之子建得罪於平王出奔而死於鄭勝又奔吳子胥以吳師入郢勝蓋預焉是讎其大父也及其還楚殺子西子期是讎其叔父也剡式冉翻利也靡武彼翻師古曰言與讎人俱斃康曰武皮切碎也黥布嘗用之矣事見十二卷高祖十一年特幸耳師古曰言漢之勝布得存此直天幸耳亶於策不便師古曰言假四子以資權則當危漢豫讀曰與此非有子胥白公報於廣都之中即疑有剸諸荊軻起於兩柱之間剸諸吳人為闔閭刺殺王僚荊軻事見七卷始皇二十年兩柱之間南面鄉明人君聽政正坐之處剸音專為虎翼者也應劭曰周書云無為虎傅翼將飛入邑擇人而食之少詩沼翻上弗聽八年有長星出于東方文穎曰孛彗長三星其占略同然其形象少異孛星光芒短其光四出蓬蓬孛孛也彗星光芒參參如掃彗長星有一直指或竟天或三丈二丈無常也大法彗孛星多為除舊布新長星多為兵革事九年九年春大旱十年十年冬上行幸甘泉十年將軍薄昭殺漢使者帝不忍加誅使公卿從之飲酒欲令自引分引分猶言引決也使㣥臣喪服往哭之乃自殺臣光曰李德裕以為漢文帝誅薄昭斷則明矣斷丁亂翻下同於義則未安也秦康送晉文興如存之感詩小序曰秦康公之母晉獻公之女文公遭驪姬之難未反而秦姬卒穆公納文公康公時為太子贈送文公于渭之陽念母之不見也我見舅氏如母存焉唯一弟薄昭斷之不疑非所以慰母氏之心也臣愚以為法者天下之公器惟善持法者親疏如一無所不行則人莫敢有所恃而犯之也夫薄昭雖素稱長者文帝不為置賢師傅而用之典兵驕而犯上至於殺漢使者非有恃而然乎若又從而赦之則與成哀之世何異哉魏文帝嘗稱漢文帝之美而不取其殺薄昭曰舅后之家但當養育以恩而不當假借以權既觸罪法又不得不害譏文帝之始不防間昭也斯言得之矣然則欲慰母心者將慎之於始乎聶崇岐標點容肇祖覆校
