body:
  text: 資治通鑑卷第二百四十一端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀五十七憲宗昭文章武大聖至神孝皇帝下元和十四年元和十四年己亥八一九元和十四年二月李聽襲海州克東海胊山懷仁等縣海州治胊山本漢胊縣後人加山字東海漢贛榆縣地後齊置東海縣屬東海郡隋廢郡及縣入廣饒縣隋仁壽元年改廣饒曰東海避太子諱也唐屬海州九域志在州東一十里懷仁縣梁置南北二青州東魏廢州置義塘郡及懷仁縣隋廢郡以縣屬海州九域志在州北八十里宋白曰海州懷仁縣本漢贛餘縣地按漢贛餘今縣東北三十里贛餘古城是也梁於此置黃郭戍後魏置義塘郡理黃郭城領義唐歸義懷仁三縣高齊移義唐郡及懷仁縣並理今密州莒縣界隋開皇廢郡移懷仁縣理此今縣理是也拔丞縣丞漢縣後魏置蘭陵郡隋廢郡為蘭陵縣武德四年改曰丞縣後屬沂州九域志在州西南一百八十里宋白曰丞漢舊縣春秋時鄫國也晉置蘭陵郡理丞城按前此丞縣理在今縣西一里漢丞縣故城是也隋開皇十六年置鄫州及丞縣尋廢州及縣仍移蘭陵縣置於廢鄫州故城中唐又改蘭陵為丞縣縣西北有丞水敗補邁翻丞時證翻李師道聞官軍侵逼發民治鄆州城塹修守備治直之翻塹七豔翻役及婦人民益懼且怨都知兵馬使劉悟正臣之孫也劉正臣見二百一十七卷肅宗至德元載悟務為寬惠使士卒人人自便軍中號曰劉父及田弘正渡河悟軍無備戰又數敗數所角翻或謂師道曰劉悟不修軍法專收衆心恐有他志宜早圖之師道召悟計事欲殺之或諫曰今官軍四合悟無逆狀用一人言殺之諸將誰肯為用是自脫其爪牙也師道留悟旬日復遣之厚贈金帛以安其意悟知之還營陰為之備師道以悟將兵在外署悟子從諫門下別奏門下別奏者使廁員牙門下俟別奏補官也唐六典凡諸軍鎮大使三品已上傔二十五人別奏十人副使傔二十人別奏八人總管三品已上傔十八人別奏六人子總管四品已上傔十一人別奏三人若討擊防禦遊奕使副傔準品各減三人別奏各減二人總管及子總管傔準品各減二人別奏各減一人若鎮守已下無副使或隸屬大軍鎮者使已下傔奏並四分減一所補傔奏皆令自召以充頗得其陰謀密疏以白父又有謂師道者曰劉悟終為患不如早除之丙辰師道潛遣二使齎帖授行營兵馬副使張暹令斬悟首獻之勒暹權領行營時悟方據高丘張幕置酒去營二三里二使至營密以帖授暹暹素與悟善陽與使者謀曰悟自使府還還音旋又如字頗為備不可匆匆暹請先往白之云司空遣使存問將士兼有賜物請都頭速歸軍中稱都將為都頭傳語謂師道遣使者所傳言語也則彼不疑乃可圖也使者然之暹懷帖走詣悟屏人示之屏必郢翻又卑正翻悟潛遣人先執二使殺之時已向暮悟按轡徐行還營坐帳下嚴兵自衛召諸將厲色謂之曰悟與公等不顧死亡以抗官軍誠無負於司空今司空信讒言來取悟首悟死諸公其次矣且天子所欲誅者獨司空一人今軍勢日蹙吾曹何為隨之族滅欲與諸公卷旗束甲卷與捲同奉行天子之命言奉行詔旨以誅李師道富貴可圖也諸公以為何如兵馬使趙垂棘立於衆首良久對曰事章十二行本事上有如此二字乙十一行本同孔本同張校同果濟否悟應聲罵曰汝與司空合謀邪立斬之遍問其次有遲疑未言者悉斬之並斬軍中素為衆所惡者惡烏路翻凡三十餘尸於帳前餘皆股栗曰惟都頭命願盡死乃令士卒曰入鄆人賞錢百緡惟不得近軍帑近其靳翻帑他朗翻其使宅及逆黨家財任自掠取使宅謂節度使所居也使士皆飽食執兵夜半聽鼓三聲絶即行人銜枚馬縛口遇行人執留之恐行人遇兵走還城報師道令執留之距城數里天未明悟駐軍使聽城上柝聲絶天明則柝聲絶宣言劉都頭奉帖追入城主帥文書下諸將謂之帖古者聯竹為簡策以寫書後世因謂書為簡白使謂白節度使使疏吏翻皆竄匿悟引大軍繼至城中譟譁動地比至比必利翻及也子城已洞開惟牙城拒守凡大城謂之羅城小城謂之子城又有第三重城以衛節度使居宅謂之牙城牙中兵不過數百始猶有發弓矢者俄知力不支皆投於地悟勒兵升聽事使捕索師道索山客翻師道與二子伏廁牀下索得之索山客翻悟命置牙門外隙地使人謂曰悟奉密詔送司空歸闕然司空亦何顏復見天子復扶又翻師道猶有幸生之意其子弘方仰曰事已至此速死為幸尋皆斬之代宗永泰元年李正己得淄青四世五十四年而滅悟乃命兩都虞候巡坊市禁掠者即時皆定大集兵民於毬場親乘馬巡繞慰安之斬贊師道逆謀者二十餘家文武將吏且懼且喜章十二行本喜下有皆入賀三字乙十一行本同孔本同張校同悟見李公度執手歔欷出賈直言於獄直言被囚見上卷上年悟之自陽穀還兵趨鄆也趨七喻翻潛使人以其謀告田弘正事成當舉烽相白萬一城中有備不能入願公引兵為助功成之日皆歸於公悟何敢有之且使弘正進據己營弘正見烽知得城遣使往賀悟函師道父子三首遣使送弘正營弘正大喜露布以聞淄青等十二州皆平弘正初得師道首疑其非真召夏侯澄使識之澄熟視其面長號隕絶者久之乃抱其首舐其目中塵垢復慟哭弘正為之改容義而不責識如字辨識也號戶刀翻舐直氏翻復扶又翻為于僞翻夏侯澄禽見上卷上年元和十四年壬戌田弘正捷奏至乙丑命戶部侍郎楊於陵為淄青宣撫使己巳李師道首函至自廣德以來垂六十年藩鎮跋扈河南北三十餘州自除官吏不供貢賦至是盡遵朝廷約束嗚呼兼並易也堅凝之難讀史至此盍亦知其所以得鑒其所以失則知資治通鑑一書不苟作矣上命楊於陵分李師道地於陵按圖籍視土地遠邇計士馬衆寡校倉庫虛實分為三道使之適均於音烏以鄆曹濮為一道鄆音運濮音卜淄青齊登萊為一道兗海沂密為一道上從之劉悟以初討李師道詔云部將有能殺師道以衆降者師道官爵悉以與之意謂盡得十二州之地遂補署文武將佐更易州縣長吏更工衡翻謂其下曰軍府之政一切循舊自今但與諸公抱子弄孫夫復何憂復扶又翻下復須同上欲移悟他鎮恐悟不受代復須用兵密詔田弘正察之弘正日遣使者詣悟託言修好實觀其所為悟多力好手搏好呼到翻得鄆州三日則教軍中壯士手搏與魏博使者庭觀之自搖肩攘臂離坐以助其勢離力智翻坐徂臥翻弘正聞之笑曰是聞除改除改謂除書改授他鎮言登時即行也庚午以悟為義成節度使悟聞制下手足失墜言驚遽失守不知所為遂行弘正已將數道比至城西二里與悟相見於客亭客亭即驛亭送迎使客之所馳詣滑州辟李公度李存郭昈賈直言以自隨悟素與李文會善既得鄆州使召之未至李文會出登州見上卷上年昈存謀曰文會佞人敗亂淄青一道敗補邁翻滅李司空之族萬人所共讎也不乘此際誅之田相公至務施寬大將何以雪三齊之憤怨乎自項羽分齊為三以王田市田都田安遂有三齊之名後人因而言之遣使即文會所至取其首以來使者遇文會於豐齊驛斬之據梁敬翔編遺録豐齊驛當在齊州東南三十里宋白曰齊州禹城縣有漢祝阿故城在豐齊驛東北二里比必利翻及也還音旋又如字悟及昈存已去無所復命矣文會二子一亡去一死於獄家資悉為人所掠田宅沒官詔以淄青行營副使張暹為戎州刺史劉悟奏言其功也癸酉加田弘正檢校司徒同平章事先是李師道將敗數月先悉薦翻聞風動鳥飛皆疑有變禁鄆人親識宴聚及道路偶語犯者有刑弘正既入鄆悉除苛禁縱人遊樂樂音洛寒食七晝夜不禁行人弘正特為此示鄆人以寬大耳按寒食之說不同初學記曰周禮司烜氏仲春以木鐸徇火禁於國中注云為季春將出火也今寒食準節氣是仲春之末清明是三月之初然則禁火並周制也洪容齊曰先賢傳曰太原舊俗以介子推焚骸一月寒食鄴中記曰並州俗冬至後一百五日為子推斷火冷食三日魏武以太原上黨西河皆沍寒之地令人不得寒食此注已見前鄆人久為寇敵今雖平人心未安不可不備弘正曰今為暴者既除宜施以寬惠若復為嚴察是以桀易桀也庸何愈焉愈賢也勝也復扶又翻先是賊數遣人入關截陵戟焚倉場流矢飛書以震駭京師沮撓官軍事見二百三十九卷十年數所角翻沮在呂翻撓奴巧翻潼關吏至發人囊篋以索之索山客翻然終不能絶及田弘正入鄆閲李師道簿書有賞殺武元衡人王士元等及賞潼關蒲津吏卒案乃知嚮者皆吏卒受賂於賊容其姦也案文案也亦謂之案牘史言關津不足以禁姦乃所以容姦裴度纂述蔡鄆用兵以來上之憂勤機略因侍宴獻之請內印出付史官請自禁中用印而出付史官如此似出朕志非所欲也弗許史言憲宗此事得為君之體三月戊子以華州刺史馬總為鄆曹濮等州節度使己丑以義成節度使薛平為平盧節度淄青齊登萊等州觀察使自是之後淄青專平盧之號而鄆尋賜號天平軍矣為王遂以嚴酷召亂張本元和十四年橫海節度使烏重胤奏河朔藩鎮所以能旅拒朝命六十餘年者由諸州縣各置鎮將領事收刺史縣令之權自作威福嚮使刺史各得行其職則雖有奸雄如安史必不能以一州獨反也臣所領德棣景三州已舉牒各還刺史職事應在州兵並令刺史領之夏四月丙寅詔諸道節度都團練都防禦經略等使所統支郡兵馬並令刺史領之自至德以來節度使權重所統諸州各置鎮兵以大將主之暴橫為患橫戶孟翻故重胤論之其後河北諸鎮惟橫海最為順命由重胤處之得宜故也史言反側之地擇帥不可不詳處昌呂翻元和十四年辛未工部侍郎同平章事程薨元和十四年裴度在相位知無不言皇甫鎛之黨陰擠之擠子細翻又子西翻考異曰舊傳曰鎛與宰相李逢吉令狐楚合勢擠度故出鎮按逢吉時在東川楚在昭義皆不為相今不取按後昭義當作河陽丙子詔度以門下侍郎同平章事充河東節度使皇甫鎛專以掊克取媚掊蒲侯翻人無敢言者獨諫議大夫武儒衡上疏言之鎛自訴於上上曰卿以儒衡上疏將報怨邪鎛乃不敢言儒衡元衡之從父弟也從才用翻元和十四年史館修撰李翺上言貞觀三年置史館於門下省有修撰四人掌修國史定禍亂者武功也興太平者文德也今陛下既以武功定海內若遂革弊事復高祖太宗舊制用忠正而不疑屏邪佞而不邇屏必郢翻又卑正翻改稅法不督錢而納布帛自建中初楊炎定兩稅法不令民輸其土之所産而督錢寬百姓租賦厚邊兵以制戎狄侵盜數訪問待制官以通塞蔽數所角翻塞悉則翻此六者政之根本太平之所以興也陛下既已能行其難若何不為其易乎以陛下天資上聖如不惑近習容悅之辭任骨鯁正直之士與之興大化可不勞而成也若不以此為事臣恐大功之後逸欲易生易以豉翻進言者必曰天下既平矣陛下可以高枕自安逸枕職任翻如是則太平未可期矣元和十四年秋七月丁丑朔田弘正送殺武元衡賊王士元等十六人詔使章十二行本使作仗乙十一行本同孔本同熊校同內京兆府御史臺遍鞫之皆款服款誠也言吐誠而伏罪也則多異同元略問其故對曰恆鄆同謀遣客刺元衡恆戶登翻刺七亦翻而士元等後期聞恆人事已成遂竊以為己功還報受賞耳今自度為罪均度徒洛翻終不免死故承之上亦不欲復辨正悉殺之復扶又翻元和十四年戊寅宣武節度使韓弘始入朝蔡鄆既平韓弘始入朝弘獻馬三千絹五千張五千作五十萬雜繒三萬金銀器千繒慈陵翻而汴之庫廣既尚有錢百餘萬緡絹百餘萬匹馬七千匹糧三百萬斛史言韓弘善完聚元和十四年己丑㣥臣上尊號曰元和聖文神武法天應道皇帝赦天下元和十四年兗海沂密觀察使王遂本錢穀吏性狷急無遠識狷古掾翻時軍府草創是年三月方分四州置觀察遂專以嚴酷為治治直吏翻所用杖絶大於常行者唐制凡杖皆長三尺五寸削去節目訊杖大頭徑三分三釐小頭二分二釐常行杖大頭二分七釐小頭一分七釐笞杖大頭二分小頭一分有半輒曰反虜又盛夏役士卒營府舍督責峻急將卒憤怨辛卯役卒王辨與其徒四人浴於沂水沂州治臨沂縣以臨沂水名之也曰今服役觸罪亦死奮命立事亦死死於立事不猶愈乎明日常侍與監軍副使有宴軍將皆在告直兵多休息常侍謂王遂也副使謂觀察副使也在告謂休假在私室也直兵直衛之兵也可以萬全四人皆以為然約事成推辨為留後壬辰遂方宴飲日過中辨等五人突入於直房前取弓刀直房直兵之所舍之室也殺之射而亦翻遂與監軍狼狽起走辨執遂數之以盛暑興役用刑刻暴數所具翻立斬之傳聲勿驚監軍辨即自稱留後升廳號令與監軍抗禮召集將吏參賀衆莫敢不從監軍具以狀聞元和十四年甲午韓弘又獻絹二十五萬匹絁三萬匹絁式支翻銀器二百七十左右軍中尉各獻錢萬緡自淮西用兵以來度支鹽鐵及四方爭進奉謂之助軍賊平又進奉謂之賀禮後又進奉謂之助賞上加尊號又進奉亦謂之賀禮史歷言元和進奉之弊元和十四年丁酉以河陽節度使令狐楚為中書侍郎同平章事楚與皇甫鎛同年進士故鎛引以為相裴度之視師也令狐楚出翰林今皇甫鎛引而相之亦所以杜度之再入元和十四年朝廷聞沂州軍亂甲辰以棣州刺史曹華為沂海兗密觀察使元和十四年韓弘纍表請留京師八月己酉以弘守司徒兼中書令癸丑以吏部尚書張弘靖同平章事充宣武節度使弘靖宰相子弘靖張延賞之子延賞相德宗少詩照翻聞音問立朝簡默河東宣武闕帥帥所類翻朝廷以其位望素重使鎮之弘靖承王鍔聚斂之餘韓弘嚴猛之後王鍔鎮河東韓弘鎮宣武弘靖皆承其後斂力贍翻下同故上下安之張弘靖之簡貴施之並汴可也施之幽燕則敗矣元和十四年己未田弘正入朝上待之尤厚元和十四年戊辰陳許節度使郗士美薨以庫部員外郎李渤為弔祭使渤上言臣過渭南聞長源鄉舊四百戶今才百餘戶闅鄉縣舊三千戶今才千戶闅音旻其他州縣大率相似迹其所以然皆由以逃戶稅攤於比鄰攤他干翻比音毗又毗至翻致驅迫俱逃此皆聚斂之臣剝下媚上斂力贍翻惟思竭澤不慮無魚呂氏春秋曰竭澤而漁豈不得魚而明年無魚絶攤逃之弊盡逃戶之産償稅不足者乞免之計不數年人皆復於農矣執政見而惡之執政謂皇甫鎛惡烏路翻歸東都元和十四年癸酉吐蕃寇慶州慶州隋弘化郡開皇十六年改為慶州以慶美取其嘉名漢歸德富平縣地舊志京師西北五百七十三里元和十四年朝廷議興兵討王辨恐青鄆相扇繼變青鄆與兗海沂密本一鎮也故恐其相扇而動遣中使賜以告身中使紿之曰開州計已有人迎候道路留後宜速發辨即日發沂州導從尚百餘人從才用翻入徐州境所在減之其衆亦稍逃散遂加以杻械杻敕久翻乘驢入關九月戊寅腰斬東市先是三分鄆兵以隸三鎮此言鄆青沂分為三鎮之初先悉薦翻朝廷以為師道餘黨凶態未除命曹華引棣州兵赴鎮以討之沂州將士迎候者華皆以好言撫之使先入城慰安其餘衆皆不疑華視事三日大饗將士伏甲士千人於幕下乃集衆而諭之曰天子以鄆人有遷徙之勞特加優給宜令鄆人處左沂人處右處昌呂翻下聚處同既定令沂人皆出因闔門謂鄆人曰王常侍以天子之命為帥於此將士何得輒害之語未畢伏者出圍而殺之死者千二百人無一得脫者門屏間赤霧高丈餘久之方散兵死之氣凝為赤霧臣光曰春秋書楚子虔誘蔡侯般殺之于申見昭十一年般音班孔子猶深貶之惡其誘討也惡烏路翻況為天子而誘匹夫乎王遂以聚斂之才殿新造之邦殿多見翻鎮也用苛虐致亂王辨庸夫乘釁竊發釁隙也戮之易於犬豕耳帥所類翻易以豉翻何必以天子詔書為誘人之餌乎且作亂者五人耳乃使曹華設詐屠千餘人不亦濫乎然則自今士卒孰不猜其將帥將帥何以令其士卒上下盻盻盻盻恨視也說文音五計翻孫奭音五禮翻又普莧翻如寇讎聚處處昌呂翻得間則更相魚肉間古莧翻更工衡翻惟先發者為雄耳禍亂何時而弭哉惜夫憲宗削平僭亂幾致升平幾巨依翻其美業所以不終由苟徇近功不敦大信故也元和十四年甲辰以田弘正兼侍中魏博節度使如故弘正三表請留上不許弘正常恐一旦物故魏人猶以故事繼襲故兄弟子姪皆仕諸朝上皆擢居顯列朱紫盈庭時人榮之元和十四年乙巳上問宰相玄宗之政先理而後亂何也崔㣥對曰玄宗用姚崇宋璟盧懷慎蘇頲韓休張九齡則理用宇文融李林甫楊國忠則亂故用人得失所繫非輕人皆以天寶十四年安祿山反為亂之始臣獨以為開元二十四年罷張九齡相專任李林甫此理亂之所分也願陛下以開元初為法以天寶末為戒乃社稷無疆之福皇甫鎛深恨之皇甫鎛自知以姦諂忝相位故深恨崔㣥之言元和十四年冬十月壬戌容管奏安南賊楊清陷都護府安南都護府治交州象古道古之兄也以貪縱苛刻失衆心清世為蠻酋象古召為牙將清鬱鬱不得志象古命清將兵三千討黃洞蠻黃洞蠻即西原蠻其屬黃氏者謂之黃洞蠻引兵夜還襲府城陷之初蠻賊黃少卿自貞元以來數反覆數所角翻桂管觀察使裴行立數所角翻唐桂管管桂昭蒙富梧潯龔鬱林平琴賓澄繡象柳融等州容管經略使陽旻欲徼幸立功徼堅堯翻爭請討之上從之嶺南節度使孔戣屢諫曰此禽獸耳但可自計利害不足與論是非上不聽大發江湖兵會容桂二管入討士卒被瘴癘死者不可勝計被皮義翻勝音升安南乘之遂殺都護行立旻竟無功二管雕弊惟戣所部晏然嶺南節度雖兼統五管而廣州所管自為巡屬劉昫曰廣州管韶循岡賀端新康封瀧恩春高藤義竇勤等州戣渠龜翻丙寅以唐州刺史桂仲武為安南都護赦楊清以為瓊州刺史元和十四年是歲吐蕃節度論三摩等將十五萬衆圍鹽州党項亦發兵助之刺史李文悅竭力拒守凡二十七日吐蕃不能克靈武牙將史奉敬嚴奉敬改敬奉下同言於朔方節度使杜叔良請兵三千齎三十日糧深入吐蕃以解鹽州之圍叔良以二千五百人與之奉敬行旬餘無聲問朔方人以為俱沒矣以為與鹽州俱沒言無何時也吐蕃大驚潰去奉敬奮擊大破不可勝計當曰奮擊大破之殺獲不可勝計文意乃為明暢吐蕃憚之新舊書皆作史敬奉元和十四年柳泌至台州驅吏民采藥歲餘無所得而懼泌知台州見上卷上年浙東觀察使捕送京師皇甫鎛李道古保護之上復使待詔翰林服其藥日加躁渴躁則到翻起居舍人裴潾上言以為除天下之害者受天下之利同天下之樂者饗天下之福樂音洛自黃帝至於文武享國壽考皆用此道也自去歲以來所在多薦方士轉相汲引其數浸繁借令天下真有神仙彼必深潛巖壑惟畏人知凡候伺權貴之門以大言自衒奇技驚衆者伺相吏翻衒熒絹翻伎渠錡翻皆不軌徇利之人豈可信其說而餌其藥邪夫藥以愈疾非朝夕常餌之物況金石酷烈有毒又益以火氣殆非人五藏之所能勝也藏徂浪翻勝音升古者君飲藥臣先嘗之記曲禮之言則真僞自可辨矣上怒十一月己亥貶潾江陵令元和十四年初㣥臣議上尊號皇甫鎛欲增孝德字中書侍郎同平章事崔㣥曰言聖則孝在其中矣鎛譖㣥於上曰㣥於陛下惜孝德二字上怒時鎛給邊軍賜與多不時得又所給多陳敗陳舊也軍士怨怒流言欲為亂流言放言也欲自殺李光顏時帥邠寧上不信京師恟懼㣥具以中外人情上聞上聞時掌翻鎛密言於上曰邊賜皆如舊制而人情忽如此者由㣥鼓扇將以賣直歸怨於上也上以為然十二月乙卯以㣥為湖南觀察使於是中外切齒於鎛矣小人去君子以為自安之謀不知適所以自危也元和十四年中書舍人武儒衡有氣節好直言好呼到翻上器之顧待甚渥人皆言且入相令狐楚忌之思有以沮之者沮在呂翻乃薦山南東道節度推官狄兼謨才行行戶孟翻癸亥擢兼謨左拾遺內供奉以資序尚淺未除正官令於左拾遺班內供奉猶監察御史裏行也仁傑之族曾孫也楚自草制辭盛言天后竊位姦臣亶權賴仁傑保佑中宗克復明辟事見武后紀且言臣曾祖平一在天后朝辭榮終老平一在武后時畏禍居嵩山修浮屠法纍詔不起十五年十五年春正月沂海兗密觀察使曹華請徙理兗州自沂州徙治兗州十五年義成節度使劉悟入朝十五年初左軍中尉吐突承璀謀立澧王惲為太子惲於粉翻上不許及上寢疾承璀謀尚未息太子聞而憂之密遣人問計於司農卿郭釗釗曰殿下但盡孝謹以俟之勿恤其他釗太子之舅也釗音昭上服金丹多躁怒左右宦官往往獲罪有死者人人自危庚子暴崩於中和殿年四十三考異曰實録但云上崩於大明宮之中和殿舊紀曰時帝暴崩皆言內官陳弘志弒逆史氏諱而不書王守澄傳曰憲宗疾大漸內官陳弘慶等弒逆憲宗英武威德在人內官祕之不敢除討但云藥發暴崩新傳曰守澄與內常侍陳弘志弒帝於中和殿裴廷裕東觀奏記云宣宗追恨光陵商臣之酷郭太后亦以此暴崩然茲事曖昧終不能測其虛實故但云暴崩不敢討賊但云藥發外人莫能明也中尉梁守謙與諸宦官馬進潭劉承偕韋元素王守澄等共立太子殺吐突承璀及澧王惲賜左右神策軍士錢人五十緡六軍威遠人三十緡按新志左右龍武左右神武左右神策號六軍今神策軍賜錢既厚而復有六軍則明唐中世以後以左右羽林龍武神武為六軍也威遠別是一軍閏月丙午穆宗即位于太極殿東序是日召翰林學士段文昌等及兵部郎中薛放駕部員外郎丁公著對于思政殿以嗣君即位于太極殿東序及下文輟西宮朝臨徵之中和殿思政殿疑皆在西內實録言憲宗崩于大明宮之中和殿則在東內戎之弟薛戎見二百三十五卷德宗貞元十六年蘇州人皆太子侍讀也上未聽政放公著常侍禁中參預機密上欲以為相二人固辭十五年丁未輟西宮朝臨西宮即西內大行在殯臣子朝夕臨臨哭也朝如字音陟遙翻臨力浸翻唐東西內皆有月華門西內則太極門內之東廂有日華門西廂有月華門東內則宣政殿東廊有日華門西廊有月華門市井皆相賀十五年上議命相令狐楚薦御史中丞蕭俯辛亥以俯及段文昌皆為中書侍郎同平章事楚俯與皇甫鎛皆同年進士上欲誅鎛以其附吐突承璀欲立澧王也故得免壬子杖殺柳泌及僧大通自餘方士皆流嶺表貶左金吾將軍李道古循州司馬以其薦柳泌且保護之也十五年癸丑以薛放為工部侍郎丁公著為給事中十五年乙卯尊郭貴為皇太后十五年丁卯上與㣥臣皆釋服從吉用漢文帝遺制也十五年二月丁丑上御丹鳳門樓赦天下事畢盛陳倡優雜戲於門內而觀之倡音昌丁亥上幸左神策軍觀手搏雜戲庚寅監察御史楊虞卿上疏以為陛下宜延對㣥臣周遍顧問惠以氣色使進忠若趨利趨七喻翻論政若訴冤如此而不致升平者未之有也衡山人趙知微亦上疏諫上遊畋無節上雖不能用亦不罪也吳分湘南縣置衡山縣唐初屬潭州神龍三年度屬衡州九域志在州東北二百三十里十五年壬辰廢雍管命容管經略使陽旻兼領之十五年安南都護桂仲武至安南楊清拒境不納清用刑慘虐其黨離心仲武遣人說其酋豪說式芮翻數月間降者相繼得兵七千餘人朝廷以仲武為逗遛甲午以桂管觀察使裴行立為安南都護乙未以太僕卿杜式方為桂管觀察使丙申貶仲武為安州刺史十五年丹王逾薨逾代宗子十五年吐蕃寇靈武十五年憲宗之末回鶻遣合達干來求昏尤切憲宗許之三月癸卯朔遣合達干歸國十五年上見夏州觀察判官柳公權書跡愛之辛酉以公權為右拾遺翰林侍書學士使之侍書而已不使任代言之職卿書何能如是之善對曰用筆在心心正則筆正上默然改容知其以筆諫也公權公綽之弟也十五年辛未安南將士開城納桂仲武執楊清斬之裴行立至海門而卒海門鎮在白州博白縣東南卒子恤翻十五年吐蕃寇鹽州十五年初膳部員外郎元稹為江陵士曹憲宗元和五年元稹貶江陵士曹事見二百三十八卷上在東宮聞宮人誦稹歌詩而善之及即位潭峻歸朝獻稹歌詩百餘篇上問稹安在對曰今為散郎郎中謂之正郎員外郎謂之散郎散悉亶翻五月庚戌以稹為祠部郎中知制誥唐制中書舍人六人一人知制誥開元初以他官掌詔敕未命謂之兼知制誥朝直遙翻會同僚食瓜於閣下中書省曰鳳閣又有紫微閣中書舍人武儒衡以扇揮之曰適從何來遽集於此以蠅喻稹儒衡意氣自若十五年庚申葬神聖章武孝皇帝于景陵景陵在同州奉先縣西北二十里金熾山古者祖有功而宗有德商之中宗高宗是也西漢以文帝為太宗武帝為世宗宣帝為中宗猶倣佛古意東漢自明帝至桓帝廟號皆稱宗非古也唐十七宗今人所稱者三宗而已十五年六月以湖南觀察使崔㣥為吏部侍郎召對別殿上曰朕升儲副知卿為羽翼事見二百三十八卷憲宗元和七年先帝之意久屬聖明臣何力之有崔㣥之對詞氣和而正處送往事居之間當以為法十五年太后居興慶宮每朔望上帥百官詣宮上壽帥讀曰率宮上時掌翻上性侈所以奉養太后尤為華靡淮西既平憲宗之政衰矣況穆宗欲有以加之邪十五年秋七月乙巳以鄆曹濮節度為天平軍鄆音運濮博木翻鄆州古須句國秦為薛郡漢為東平國隋置鄆州京師東北一千六百九十七里曹州漢濟陰國後魏置西兗州後周改曹州取古國名也京師東北一千四百五十三里濮州漢東郡鄄城縣地後魏置濮陽郡隋為濮州京師東北一千五百七十里十五年門下侍郎同平章事令狐楚坐為山陵使部吏盜官物又不給工人傭直收其錢十五萬緡為羡餘獻之羡式面翻怨訴盈路丁卯罷為宣歙池觀察使以史氏所書令狐楚此事言之則罷相誠是也以宣宗之用令狐綯言之則罷楚為非矣觀史必有能辨其是非者宣州秦鄣郡地漢為丹楊郡順帝改為宣城郡隋為宣州京師東南三千五百五十一里歙州吳新都郡晉改新安郡隋為歙州京師東南三千六百六十七里池州漢石城縣地梁昭明太子以其水出魚美改名貴池唐置池州東至宣州三百五里歙書涉翻十五年八月癸巳發神策兵二千浚魚藻池魚藻池在魚藻宮程大昌曰禁池中有山山中建魚藻宮王建宮詞云魚藻宮中鎖翠娥先皇幸處不曾過而今池底休鋪錦菱葉雞頭漸漸多先皇謂德宗也自東內苑玄化門入禁苑魚藻宮在其西十五年戊戌以御史中丞崔植為中書侍郎同平章事十五年己亥再貶令狐楚衡州刺史十五年上甫過公除遵漢制三十七日釋服謂之公除按此時以二十七日公除下所謂易月也賜與無節九月欲以重陽大宴九月九日謂之重陽九陽數也故云貞元五年詔以二月一日三月三日九月九日為三令節任文武百寮選勝地追賞為樂王玉伏以元朔未改王玉古嶽翻元朔未改謂未踰年也春秋書元年春王正月即位園陵尚新雖陛下就易月之期俯從人欲而禮經著三年之制猶服心喪謂公除易服為天下也而三年之慕內切於心不可變也左傳天子七月而葬同軌畢至離力智翻唐制國有大喪遣使宣遺詔於四夷謂之告哀使蓋為齊人書舜典曰三載四海遏密八音孔安國注遏絶也密靜也齊人猶言齊民為于僞翻合樂後庭事將未可上不聽十五年戊午加邠寧節度使李光顏武寧節度使李訴並同平章事十五年冬十月王承宗薨其下祕不發喪子知感知信皆在朝憲宗元和十三年王承宗以二子為質於朝事見上卷帥所類翻下同參謀崔燧以承宗祖母涼國夫人命告諭諸將及親兵涼國夫人蓋王武俊之妻承元時年二十考異曰舊傳作年十八按承元大和七年卒年三十三則於今年二十矣今從實録承元不受泣且拜諸將固請不已承元曰天子遣中使監軍有事當與之議及監軍至亦勸之承元曰諸公未忘先德不以承元年少少詩照翻欲使之攝軍務承元請盡節章十二行本節下有天子二字乙十一行本同孔本同張校同以遵忠烈章十二行本烈下有王字乙十一行本同張校同之志王武俊封清河郡王諡忠烈衆許諾承元乃視事於都將聽事聽讀曰廳都將聽事都知兵馬使之聽事也令左右不得謂己為留後委事於參佐密表請朝廷除帥庚辰監軍奏承宗疾亟弟承元權知留後並以承元表聞十五年党項復引吐蕃寇涇州復扶又翻連營五十里十五年辛巳遣起居舍人柏耆詣鎮州宣慰是年改恆州為鎮州避上名也十五年壬午㣥臣入閣歐陽修曰唐故事天子日御殿見㣥臣曰常參朔望薦食諸陵寢有思慕之心不能臨前殿則御便殿見㣥臣曰入閣宣政前殿也謂之衙衙有仗紫宸便殿也謂之閣其不御前殿而御紫宸也乃自正衙喚仗由閣門而入百官俟朝于衙者因隨而入見故謂之入閣程大昌曰宣政之左有東上閣宣政之右有西上閣二閣在殿左右而入閣者由之而入也西內太極宮兩儀殿左右有東西閣門而兩廊下有日華月華門其曰閣者即內殿也非真有閣也又曰西內太極殿北有兩儀殿即常日視朝之所太極殿兩廡有東西二上閣則是兩閣皆有門可入已又可轉北而入兩儀按程大昌言西內二閣門後說較為明白而宣政殿入閣則東內也陛下宴樂過多郾音偃樂音洛畋遊無度今胡寇壓境謂吐蕃入寇也不知乘輿所在乘繩證翻又晨夕與章十二行本與下有近習二字乙十一行本同孔本同張校同退齊校同倡優狎昵倡音昌昵尼質翻賜與過厚夫金帛皆百姓膏血非有功不可與雖內藏有餘藏徂浪翻願陛下愛之萬一四方有事不復使有司重斂百姓復扶又翻斂力贍翻時久無閣中論事者入閣諫官論事太宗之制也訝驚疑也此輩何人對曰諫官上乃使人慰勞之勞力到翻曰當依卿言宰相皆賀然實不能用也考異曰舊崔郾傳曰上即位荒於禽酒坐朝常晚郾與同列鄭覃等延英切諫上甚嘉之畋游稍簡杜牧郾行狀曰穆宗皇帝春秋富盛稍以畋游聲色為事公晨朝正殿揮同列進而言曰十一聖之功德四海之大萬國之衆之治之亂懸於陛下自山已東百城千里昨日得之今日失之西望戎壘距宗廟十舍百姓憔悴蓄積無有願陛下稍親政事天下幸甚誠至氣直天子為之動容斂袖慰而謝之按是時未失山東杜牧直取穆宗時事文飾以為郾諫辭耳新傳承而用之皆誤也今從實録舊傳珣瑜之子也鄭珣瑜永貞間為相十五年上嘗謂給事中丁公著曰聞外間人多宴樂樂音洛此乃時和人安足用為慰公著對曰此非佳事恐漸勞聖慮上曰何故對曰自天寶以來公卿大夫競為遊宴沈酣晝夜優雜子女沈持林翻樂記獶雜子女鄭注曰獶或為優孔穎達曰獶雜謂獮猴也言舞戲之時狀如獮猴間雜男子婦人無別也不愧左右如此不已則百職皆廢陛下能無獨憂勞乎願少加禁止乃天下之福也考異曰實録明年二月景子觀神策雜伎因云上嘗召公著問云云舊紀遂云其日上歡甚顧公著云云此誤也今因覃等諫荒宴事言之十五年癸未涇州奏吐蕃進營距州三十里告急求救以右軍中尉梁守謙為左右神策京西北行營都監將兵四千人並發八鎮全軍救之左右神策軍分屯近畿凡八鎮長武興平好畤普閏郃陽良原定平奉天也宋白所記與此稍異以郯王府長史邵同為太府少卿兼御史中丞充答吐蕃請和好使郯王經順宗子也將即亮翻緡彌巾翻郯音談長知兩翻少始照翻好呼到翻使疏吏翻初祕書少監田洎入吐蕃為弔祭使按新書吐蕃傳帝即位遣田洎往告哀則以洎為告哀使非弔祭使洎恐吐蕃留之不得還唯阿而已還音旋唯于癸翻老子曰唯之與阿相去幾何既而吐蕃為党項所引入寇因以為辭曰田洎許我將兵赴盟於是貶洎郴州司戶党底朗翻洎其冀翻將即亮翻又音如字郴丑林翻十五年成德軍始奏王承宗薨乙酉徙田弘正為成德節度使以王承元為義成節度使劉悟為昭義節度李訴為魏博節度使田弘正自魏博徙成德劉悟自義成徙昭義李訴初自武寧徙昭義尋改魏博十五年渭州刺史郝玼數出兵襲吐蕃營所殺甚衆元和四年以原州之平涼縣置行渭州數所角翻考異曰舊傳光顏救涇州事在十四年今從實録皆慍曰人給五十緡而不識戰鬬者彼何人邪謂上即位之賞也慍於問翻此何人邪洶洶不可止光顏親為開陳大義以諭之為于僞翻言與涕俱然後軍士感悅而行將至涇州吐蕃懼而退丙戌罷神策行營罷梁守謙之軍也西川奏吐蕃寇雅州辛卯鹽州奏吐蕃營於烏白池鹽州五原縣有烏白池唐時鹽州元管四池烏池白池瓦窰池細項池青白鹽池在鹽州北十五年十一月癸卯遣諫議大夫鄭覃詣鎮州宣慰賜錢一百萬緡以賞將士王承元既請朝命諸將及鄰道爭以故事勸之承元皆不聽及移鎮義成將士喧譁不受命承元與柏耆召諸將以詔旨諭之諸將號哭不從號戶刀翻承元出家財以散之擇其有勞者擢之謂曰諸公以先代之故不欲承元去此意甚厚然使承元違天子之詔其罪大矣昔李師道之未敗也朝廷嘗赦其罪師道欲行諸將固留之其後殺師道者亦諸將也事見上卷元和十三年十四年則幸矣因涕泣不自勝且拜之勝音升十嚴十改牙將李寂等十餘人固留承元承元斬以徇軍中乃定丁未承元赴滑州考異曰舊承元傳曰承元與柏耆召諸將於館驛諭之斬李寂等軍中始定舊鄭覃傳曰王承元移授鄭滑鎮之三軍留承元不能赴鎮承元乞重臣宣諭乃以覃為宣諭使初鎮卒辭語不遜覃至宣詔諭以大義軍人釋然聽命按實録辛亥田弘正奏今月九日王承元領兵二千人赴滑州計覃於時猶未能到鎮州作傳者推以為覃功耳今從承元傳承元悉命留之十五年上將幸華清宮戊午宰相率兩省供奉官詣延英門兩省以中書門下言也兩省官自左右常侍以下至遺補起居郎舍人皆供奉官也延英門延英殿門且言如此臣輩當扈從從才用翻下同求面對皆不聽諫官伏門下門下謂延英門下乃退己未未明上自復道出城幸華清宮自復道至興慶宮因而出城不欲出皇城使百官知之而扈從也晡時還宮帥讀曰率十五年十二月己巳朔鹽州奏吐蕃千餘人圍烏白池十五年庚辰西川奏南詔二萬人入界請討吐蕃十五年癸未容管奏破黃少卿萬餘衆拔營柵三十六時少卿久未平國子祭酒韓愈上言臣去年貶嶺外謂貶潮州也其賊無城郭可居依山傍險傍蒲浪翻自稱洞主尋常亦各營生急則屯聚相保比緣雍管經略使比毗至翻多不得人德既不能綏懷威又不能臨制侵欺虜縛以致怨恨遂攻劫州縣侵暴平人或復私讎或貪小利或聚或散終亦不能為事言不能為大事也事見上十四年意在邀功求賞亦緣見賊未屯聚之時將謂單弱爭獻謀計自用兵以來已經二年前後所奏殺獲計不下二萬餘人儻皆非虛賊已尋盡至今賊猶依舊足明欺罔朝廷雍容兩管經此凋弊殺傷疾疫十室九空如此不已臣恐嶺南一道未有寧息之時自南討已來賊徒亦甚傷損察其情理厭苦必深賊所處荒僻處昌呂翻假如盡殺其人盡得其地在於國計不為有益若因改元大慶謂即位踰年改元大赦天下遣使宣諭必望風降伏仍為選擇有威信者為經略使降戶江翻仍為于僞翻苟處置得宜處昌呂翻自然永無侵叛之事上不能用穆宗睿聖文惠孝皇帝上諱恆憲宗第三子長慶元年辛丑八二一十五年春正月辛丑上祀圓丘赦天下改元河北諸道各令均定兩稅以河北諸鎮各奉圖請吏輸賦稅故令均定之十五年門下侍郎同平章事蕭俯介潔疾惡為相重惜官職少所引拔俯音免少詩沼翻西川節度使王播大修貢奉且以賂結宦官求為相段文昌復左右之復扶又翻左音佐右音佑詔徵播詣京師俯屢於延英力爭言播纖邪物論沸騰不可以汚台司汚烏故翻涴也上不聽俯遂辭位己未播至京師壬戌俯罷為右僕射俯固辭僕射二月癸酉改吏部尚書十五年盧龍節度使劉總既殺其父兄事見二百三十八卷憲宗元和五年數見父兄為祟數所角翻祟雖遂翻常於府舍飯僧數百飯扶晚翻使晝夜為佛事每視事退則處其中或處他室則驚悸不敢寐處昌呂翻悸其季翻晚年恐懼尤甚亦見河南北皆從化己卯奏乞棄官為僧考異曰舊溫造傳曰長慶元年奉使河朔稱旨遷殿中侍御史既而幽州劉總請以所部九州聽朝旨穆宗選可使者或薦造乃拜起居舍人充太原幽州鎮州宣諭使造初至范陽劉總具櫜鞬郊迎乃宣聖旨示以禍福總俯伏流汗若兵加於頸矣及造使還總遂移家入覲按實録長慶元年正月己巳以造為太原鎮州等道宣慰使二月己卯劉總奏乞為僧計造奉使尚未還三月癸亥總已卒八月丁亥以殿中侍御史溫造為起居舍人充鎮州四面諸軍宣慰使造前以京兆司録宣慰兩河衆推其材故有是命舊傳誤也十五年上面諭西川節度使王播令歸鎮播纍表乞留京師會中書侍郎同平章事段文昌請退壬申以文昌同平章事充西川節度使以翰林學士杜元穎為戶部侍郎同平章事以播為刑部尚書充鹽鐵轉運使元穎淹之六世孫也杜淹太宗朝為相十五年回鶻保義可汗卒十五年三月癸丑以劉總兼侍中充天平節度使以宣武節度使張弘靖為盧龍節度使十五年乙卯以權知京兆尹盧士玫為瀛莫觀察使玫莫杯翻丁巳詔劉總兄弟子姪皆除官大將僚佐亦宜超擢百姓給復一年復方目翻軍士賜錢一百萬緡十五年戊午立皇弟憬為鄜王悅為瓊王惸為沔王懌為婺王愔為茂王怡為光王協為淄王憺為衢王惋為澶王憬居永翻惸渠營翻愔挹淫翻憺徒覽翻又徒濫翻惋烏貫翻澶時連翻皇子湛為景王涵為江王湊為漳王溶為安王瀍為潁王十五年劉總奏懇乞為僧且以其私第為佛寺詔賜總名大覺寺名報恩遣中使以紫僧服及天平節鉞侍中告身並賜之惟其所擇詔未至總已削髮為僧將士欲遮留之總殺其唱帥者十餘人遮留者遮道而留行唱帥者作唱以帥衆帥讀曰率以印節授留後張遁去張與總同謀殺其父兄者也軍中始知之奏總不知所在考異曰新傳總以節付張皋皋之兄為涿州刺史總之妻父也按實録幽州留後張奏總以剃髮為僧不知所在然則不以節付皋也癸亥卒于定州之境德宗貞元元年劉怦得幽州三世三十六年而滅十五年翰林學士李德裕吉甫之子也以中書舍人李宗閔嘗對策譏切其父恨之譏切事見二百三十七卷憲宗元和三年右補闕楊汝士與禮部侍郎錢徽掌貢舉西川節度使段文昌翰林學士李紳各以書屬所善進士於徽及榜出文昌紳所屬皆不預屬之欲翻下屬書同榜者書取中進士姓名而揭示之及第者取中進士謂之及第言其文學及等第也覃之弟裴撰度之子蘇巢宗閔之壻楊殷士汝士之弟也文昌言於上曰今歲禮部殊不公殊絶也言皆公卿子弟無藝能也唐人謂相屬請為關節此語至今猶然德裕稹紳皆曰誠如文昌言上乃命中書舍人王起等覆試覆審也再引試取中進士以審其實才曰覆試四月丁丑詔黜朗等十人考異曰鄭覃傳曰朗長慶元年登進士甲科此蓋言其始者登科耳宗閔劍州刺史汝士開江令江州京師東南二千九百四十八里劍州京師南一千六百六十二里開江漢胊䏰縣地梁置漢豐縣西魏改曰永寧縣隋改曰盛山唐代宗廣德元年改曰開江帶開州或勸徽奏文昌紳屬書上必悟徽曰苟無愧心得喪一致喪息浪翻奈何奏人私書豈士君子所為邪取而焚之時人多之紳敬玄之曾孫李敬玄高宗朝為相播之弟也自是德裕宗閔各分朋黨更相傾軋垂四十年更工衡翻十五年丙戌冊回鶻嗣君為登囉羽録沒密施句主毗伽崇德可汗按通鑑例回鶻新可汗未嘗書嗣君唐會要曰冊回鶻可汗為君登里囉羽録密施句主毗伽崇德可汗囉魯何翻十五年五月丙申朔回鶻遣都督宰相等五百餘人來逆公主十五年壬子鹽鐵使王播奏約榷茶額每百錢加稅五十右拾遺李王玉等上疏以為榷茶近起貞元多事之際見二百三十四卷德宗貞元九年所宜寬橫斂之目橫戶孟翻斂力贍翻而更增之百姓何時當得息肩不從十五年丙辰建王恪薨恪上弟也十五年癸亥以太和長公主嫁回鶻公主上之妹也吐蕃聞唐與回鶻婚六月辛未寇青塞堡新書吐蕃傳作清塞堡戊寅回鶻奏以萬騎出北庭萬騎出安西拒吐蕃以迎公主十五年初劉總奏分所屬為三道以幽涿營為一道請除張弘靖為節度使平薊媯檀為一道請除平盧節度使薛平為節度使瀛莫為一道請除權知京兆尹盧士玫為觀察使釋名曰幽州在北幽昧之地故曰幽西南至涿州一百二十里營州以營室分為名幽涿接境營州治柳城道里絶遠劉總奏以為一道必有說平州西至薊州二百里薊州西北至檀州二百十七里檀州西至媯州二百五十里瀛州北至莫州二百一十里玫莫回翻弘靖先在河東以寬簡得衆弘靖鎮河東見二百三十九卷憲宗元和十一年幽並二鎮接壤以燕人桀驁日久燕於賢翻故舉弘靖自代以安輯之平嵩之子薛嵩從史思明為將代宗初來降而盡誠於國故舉之士玫則總妻族之親也總又盡擇麾下章十二行本下下有宿將有功四字乙十一行本同退齊校同張校同云無注本亦無伉健難制者都知兵馬使朱克融等送之京師伉口浪翻無所卑屈曰伉乞加獎拔使燕人有慕羡朝廷祿位之志又獻征馬萬五千匹征馬戰馬也委棄也滔之孫也朱滔畔換於德宗之時是時上方酣宴不留意天下之務崔植杜元穎無遠略不知安危大體苟欲崇重弘靖惟割瀛莫二州以士玫領之自餘皆統於弘靖朱克融等久羈旅京師至假丐衣食日詣中書求官植元穎不之省丐居大翻乞也省悉景翻察也及除弘靖幽州勒克融輩歸本軍驅使克融輩皆憤怨先是河北節度使皆親冒寒暑與士卒均勞逸先悉薦翻及弘靖至雍容驕貴肩輿於萬衆之中燕人訝之訝者見之而驚疑也燕於賢翻下同涉旬乃一出坐決事賓客將吏罕得聞其言情意不接政事多委之幕僚而所辟判官韋雍輩多年少輕薄之士嗜酒豪縱出入傳呼甚盛或夜歸燭火滿街皆燕人所不習也詔以錢百萬緡賜將士弘靖留其二十萬緡充軍府雜用雍輩復裁刻軍士糧賜復扶又翻繩之以法數以反虜詬責吏卒數所角翻詬許候翻又古候翻謂軍士曰今天下太平汝曹能挽兩石弓不若識一丁字由是軍中人人怨怒撫柔荒獷宣流德化適其俗修其政者易為功駭之以其所未嘗見懼之以其所未嘗聞鮮不速禍容肇祖標點聶崇岐覆校
