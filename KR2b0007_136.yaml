body:
  text: 資治通鑑卷第一百三十六端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注齊紀二世祖武皇帝上之下永明二年甲子四八四春正月乙亥以後將軍柳世隆為尚書右僕射竟陵王子良為護軍將軍兼司徒領兵置佐鎮西州子良少有清尚少詩照翻傾意賓客才雋之士皆遊集其門開西邸據子良傳西邸在雞籠山記室參軍范雲蕭琛樂安任昉法曹參軍王融衛軍東閣祭酒蕭衍記室參軍掌書記法曹參軍掌刑法此皆子良府屬也時王儉為衛將軍辟蕭衍為東閣祭酒自晉以來公府屬長史之下有東西閣祭酒琛丑林翻任音壬昉孚往翻朓土了翻步兵校尉沈約揚州秀才吳郡陸倕校戶教翻倕是為翻並以文學尤見親待號曰八友法曹參軍柳惲惲於粉翻太學博士王僧孺晉武帝置太學博士太常博士國子博士革南徐州所舉秀才也濟陽郡時屬南徐州濟子禮翻魏晉以來尚書諸曹殿中郎為諸曹之首縝章忍翻會工外翻琛惠開之從子蕭惠開見一百三十一卷宋明帝泰始元年二年從才用翻下同元景之從孫融僧達之孫柳元景以武功顯於宋文武二朝王僧達以世資才俊進順之之子蕭順之太祖族弟述之孫約璞之子僧孺雅之曾孫謝述見一百二十三卷宋文帝元嘉十七年沈璞守盱眙有功元嘉二十七年孝武孝建之初以不迎義師戮王雅見一百七卷晉孝武太元十五年雲之從兄也縝章忍翻子良篤好釋氏招致名僧講論佛法道俗之盛江左未有或親為衆僧賦食行水好呼到翻為于僞翻賦分畀也世頗以為失宰相體范縝盛稱無佛子良曰君不信因果釋氏有因緣果報之說縝曰人生如樹花同發隨風而散或拂簾幌墜茵席之上幌呼廣翻或關籬牆落糞溷之中墜茵席者殿下是也落糞溷者下官是也貴賤雖復殊途復扶又翻因果竟在何處子良無以難難乃旦翻下難之同縝又著神滅論以為形者神之質神者形之用也神之於形猶利之於刀未聞刀沒而利存豈容形亡而神在哉此論出朝野喧譁難之終不能屈朝直遙翻太原王琰著論譏縝曰嗚呼范子曾不知其先祖神靈所在欲以杜縝後對縝對曰嗚呼王子知其先祖神靈所在而不能殺身以從之子良使王融謂之曰以卿才美何患不至中書郎而故乖剌為此論中書郎即謂中書侍郎也剌來葛翻宜急毀棄之縝大笑曰使范縝賣論取官已至令僕矣令僕謂尚書令及兩僕射蕭衍好籌略有文武才幹好呼到翻王儉深器異之曰蕭郎出三十貴不可言蕭衍事始此壬寅以柳世隆為尚書左僕射丹楊尹李安民為右僕射王儉領丹楊尹夏四月甲寅魏主如方山戊午還宮庚申如鴻池鴻池即旋鴻池也水經注涼城郡旋鴻縣東山下水積成池東西二里南北四里又太祖天興二年穿鴻鴈池於平城丁卯還宮五月甲申魏遣員外散騎常侍李彪等來聘散悉亶翻騎奇寄翻六月壬寅朔中書舍人吳興茹法亮封望蔡男康曰茹人諸切姓也望蔡縣屬豫章郡沈約曰漢靈帝中平中汝南上蔡民分徙此城立縣名曰上蔡晉武帝太康元年更名望蔡宋白曰望蔡縣本漢建成縣靈帝分置上蔡縣晉武帝以上蔡人思本土改為望蔡今為高安縣瑞州治所各住一省謂之四戶以法亮及臨海呂文顯等為之既總重權勢傾朝廷守宰數遷換去來四方餉遺歲數百萬法亮嘗於衆中語人曰何須求外祿此一戶中年辦百萬蓋約言之也數所角翻遺于季翻語牛倨翻李延壽曰中書所司掌在機務漢元以令僕用事魏明以監令專權至宋孝武以來士庶雜選及明帝世胡母皓阮佃夫之徒專為佞幸矣齊初亦用久勞及以親信關讞表啓發署詔敕頗涉辭翰亦為詔文侍郎之局復見侵矣建武詔命始不關中書專出舍人省內舍人四人所直四省據此四戶則舍人分住四省自法亮等始後因天文有變王儉極言文顯等專權徇私上天見異禍由四戶見賢遍翻上手詔酬答而不能改也魏舊制戶調帛二匹絮二斤絲一斤穀二十斛又入帛一匹二丈委之州庫以供調外之費所調各隨土之所出丁卯詔曰置官班祿行之尚矣自中原喪亂茲制中絶朕憲章舊典始班俸祿戶增調帛三匹穀二斛九斗以為官司之祿增調外帛二匹祿行之後贓滿一匹者死變法改度宜為更始調徒弔翻俸扶用翻更工衡翻其大赦天下秋七月甲申立皇子子倫為巴陵王乙未魏主如武州山石窟寺九月魏詔班祿以十月為始季別受之三月為一季枉法十匹義贓二十匹罪死至是義贓一匹枉法無多少皆死枉法謂受賕枉法而出入人罪者義贓謂人私情相饋遺雖非乞取亦計所受論贓糾按守宰之貪者秦益二州刺史恆農李洪之以外戚貴顯魏顯祖高祖皆李氏出也魏避顯祖諱改弘農為恆農治直吏翻班祿之後洪之首以贓敗魏主命鎖赴平城集百官親臨數之數所具翻數其罪也猶以其大臣聽在家自裁自餘守宰坐贓死者四十餘人受祿者無不局蹐局音局蹐音脊賕賂殆絶然吏民犯他罪者魏主率寬之疑罪奏讞多減死徙邊歲以千計都下決大辟歲不過五六人州鎮亦簡讞魚列翻又魚蹇翻久之淮南王他張他作陀奏請依舊斷祿辟毗亦翻斷丁管翻文明太后召㣥臣議之中書監高閭以為飢寒切身慈母不能保其子今給祿則廉者足以無濫貪者足以勸慕不給則貪者得肆其姦廉者不能自保淮南之議不亦謬乎詔從閭議閭又上表以為北狄悍愚同於禽獸悍侯旰翻又下罕翻所長者野戰所短者攻城北狄指蠕蠕也則雖衆不能成患雖來不能深入又狄散居野澤隨逐水草戰則與家業並至奔則與畜牧俱逃不齎資糧而飲食自足是以歷代能為邊患六鎮勢分倍衆不鬬謂敵人衆力加倍則鎮人不敢鬬也難以制之請依秦漢故事於六鎮之北築長城魏世祖破蠕蠕列置降人於漠南東至濡源西暨五原陰山竟三千里分為六鎮今武川撫冥懷朔懷荒柔玄禦夷也下云六鎮東西不過千里則當自代都北塞而東至濡源耳杜佑曰後魏六鎮並在馬邑雲中單于府界往往開門造小城於其側置兵扞守狄既不攻城野掠無獲草盡則走終必懲艾計六鎮東西不過千里一夫一月之功可城三步之地強弱相兼不過用十萬人一月可就雖有暫勞可以永逸凡長城有五利罷遊防之苦一也北部放牧無抄掠之患二也抄楚交翻登城觀敵以逸待勞三也息無時之備四也歲常遊運遊行也行運芻糧以實塞下五也魏主優詔答之冬十月丁巳以南徐州刺史長沙王晃為中書監初太祖臨終以晃屬帝使處於輦下或近藩屬之欲翻處昌呂翻勿令遠出且曰宋氏若非骨肉相殘他族豈得乘其弊汝深誡之舊制諸王在都唯得置捉刀左右四十人捉刀執刀以衛左右者也及罷南徐州私載數百人仗還建康為禁司所覺投之江水禁司主防禁諸王好呼到翻下同大怒將糾以法豫章王嶷叩頭流涕曰晃罪誠不足宥陛下當憶先朝念晃帝亦垂泣由是終無異意然亦不被親寵論者謂帝優於魏文減於漢明魏文防禁任城陳諸王漢明友愛東海東平諸王嶷魚力翻朝直遙翻被皮義翻武陵王曅多材藝而疏悻悻直也狠也音胡頂翻亦無寵於帝嘗侍宴醉伏地貂抄肉柈抄楚交翻柈薄官翻帝笑曰肉汙貂汙烏故翻對曰陛下愛羽毛而疏骨肉帝不悅曅輕財好施施式智翻故無蓄積名後堂山曰首陽蓋怨貧薄也高麗王璉遣使入貢於魏亦入貢於齊時高麗方強魏置諸國使邸齊使第一高麗次之麗力知翻使疏吏翻下同益州大度獠恃險驕恣水經注南安縣有濛水即大度水東入于江寰宇記大度河自吐蕃界經雅州諸部落至黎州東界流入通望界獠魯皓翻及陳顯達為刺史遣使責其租賧賧吐濫翻夷人以財贖罪曰賧獠帥曰兩眼刺史尚不敢調我帥所類翻調徒弔翻況一眼乎遂殺其使顯達分部將吏聲言出獵夜往襲之男女無少長皆斬之分扶問翻將即亮翻下同少詩照翻長知兩翻晉氏以來益州刺史皆以名將為之十一月丁亥帝始以始興王鑑為督益寧諸軍事益州刺史徵顯達為中護軍先是劫帥韓武方聚黨千餘人斷流為暴先悉薦翻斷丁管翻郡縣不能禁鑑行至上明武方出降降戶江翻下同長史虞悰等咸請殺之悰徂宗翻鑑曰殺之失信且無以勸善乃啓臺而宥之於是巴西蠻夷為寇暴者皆望風降附鑑時年十四行至新城新城今房州云陳顯達大選士馬不肯就徵乃停新城遣典籤張曇皙往觀形勢俄而顯達遣使詣鑑咸勸鑑執之鑑曰顯達立節本朝必自無此曇徒含翻皙先擊翻使疏吏翻朝直遙翻下同居二日曇皙還具言顯達已遷家出城日夕望殿下至於是乃前鑑喜文學喜許記翻器服如素士蜀人悅之乙未魏員外散騎常侍李彪等來聘散悉亶翻騎奇寄翻考異曰齊紀十二月庚申虜使李道固至今從後魏帝紀是歲詔增豫章王嶷封邑為四千戶宋元嘉之世諸王入齊閣得白服裙帽見人主宋齊之間制高屋帽下裙蓋裙渠云翻見賢遍翻乃備朝服太極殿前殿也有四廂上於嶷友愛宮中曲宴聽依元嘉故事嶷固辭不敢唯車駕至其第乃白服烏紗帽以侍宴至於衣服器用制度動皆陳啓事無專制務從減省上並不許嶷常慮盛滿求解揚州以授竟陵王子良上終不許曰畢汝一世無所多言嶷長七尺八寸善修容範文物衛從禮冠百僚長直亮翻從才用翻冠古玩翻每出入殿省瞻望者無不肅然交州刺史李叔獻既受命命叔獻為交州刺史見上卷太祖建元元年上欲討之斷丁管翻三年乙丑四八五春正月丙辰以大司農劉楷為交州刺史發南康廬陵始興兵以討叔獻叔獻聞之遣使乞更申數年獻十二隊純銀兜鍪及孔雀毦毦仍吏翻以孔雀毛為飾也上不許叔獻懼為楷所襲間道自湘州還朝不敢取道南康始興避劉楷之兵故也間古莧翻戊寅魏詔曰圖讖之興出於三季三代之季也讖楚譖翻徒為妖邪所憑自今圖讖祕緯一皆焚之妖於遙翻緯于貴翻留者以大辟論律凡言以論者罪同真犯辟毗亦翻直曰街曲曰巷委即曲也鄭玄曰委巷猶街里委曲所為也覡刑狄翻魏馮太后作皇誥十八篇癸未大饗㣥臣于太華殿班皇誥魏高宗興光四年起太華殿辛卯上祀南郊大赦詔復立國學罷國學見上卷高帝建元四年李延壽曰江左草創日不暇給以迄宋齊國學時或開置而勸課未博建之不能十年蓋取文具而已復扶又翻二月己亥魏制皇子皇孫有封爵者歲祿各有差辛丑上祭北郊三月丙申魏封皇弟禧為咸陽王幹為河南王羽為廣陵王雍為潁川王協為始平王協音協詳為北海王自禧以下皆魏主之弟選師傅以教諸王協於兄弟最賢敏而好學善屬文好呼到翻屬之欲翻魏主尤奇愛之夏四月癸丑魏主如方山甲寅還宮初宋太宗置總明觀以集學士亦謂之東觀上以國學既立五月乙未省總明觀時王儉領國子祭酒詔於儉宅開學士館以總明四部書充之分經史子集為甲乙丙丁四部又據宋紀明帝泰始六年立總明觀徵學士以充之舉士二十人分為儒道文史陰陽五部學言陰陽者遂無其人然則四部書者其儒道文史之書歟觀古玩翻自宋世祖好文章士大夫悉以文章相尚無以專經為業者儉少好禮學及春秋言論造次必於儒者好呼到翻造七到翻由是衣冠翕然更尚儒術儉撰次朝儀國典自晉宋以來故事無不諳憶憶記也朝直遙翻下同諳烏含翻斷決如流每博議引證八坐丞郎無能異者八坐丞郎自八坐至左右丞諸曹郎也斷丁亂翻坐徂臥翻賓客滿席儉應接辨析傍無留滯發言下筆皆有音彩十日一還學監試諸生巾卷在庭監工銜翻卷巨員翻冠武也鄭注禮記云武冠卷也音起權翻劍衛令史儀容甚盛作解散髻據南史儉傳作解散幘蕭子顯齊書作解散髻斜插幘簪朝野慕之相與倣效儉常謂人曰江左風流宰相唯有謝安意以自比也上深委仗之士流選用奏無不可六月庚戌進河南王度易侯為車騎將軍遣給事中吳興丘冠先使河南並送柔然使騎奇寄翻冠古玩翻使疏吏翻辛亥魏主如方山丁巳還宮秋七月癸未魏遣使拜宕昌王梁彌機兄子彌承為宕昌王宕徒浪翻考異曰齊書是歲八月丁巳以行宕昌王梁彌頡為河梁二州刺史六年五月甲午以彌承為河涼二州刺史今從魏書初彌機死子彌博立為吐谷渾所逼奔仇池吐從暾入聲谷音浴矜其滅亡彌博凶悖所部惡之將即亮翻悖蒲內翻又蒲沒翻惡烏路翻彌承為衆所附表請納之詔許之亮帥騎三萬軍于龍鵠龍鵠蓋即龍涸也在甘松界宇文氏於此置龍涸防隋為扶州嘉誠縣唐為松州杜佑曰龍涸城吐谷渾南界也去成都千餘里周武帝天和初其王率衆降以為扶州帥讀曰率騎奇寄翻立彌承而還還從宣翻又如字亮崇之曾孫也穆崇見一百一十一卷晉安帝隆安三年戊子魏主如魚池魏太宗永登五年穿魚池於平城北苑甲午還宮八月己亥如彌澤甲寅登牛頭山甲子還宮魏初民多蔭附蔭附者自附於豪強之家以求蔭庇而豪強徵斂倍於公賦斂力贍翻給事中李安世上言歲饑民流田業多為豪右所占奪占之贍翻雖桑井難復桑井謂古者井田之制五畝之宅樹牆下以桑也使力業相稱又所爭之田宜限年斷量音良稱尺證翻斷丁亂翻事久難明悉歸今主以絶詐妄魏主善之由是始議均田冬十月丁未詔遣使者循行州郡行下孟翻與牧守均給天下之田守式又翻諸男夫十五以上受露田四十畝婦人二十畝杜佑通典注曰不栽樹者謂之露田良丁謂良人成丁者受田三十畝限止四牛所授之田率倍之三易之田再倍之以供耕作及還受之盈縮倍之者合受四十畝授以八十畝此一易之田也三易之田三年耕然後復故故再倍以授之老免及身沒則還田奴婢牛隨有無以還受初受田者男夫給二十畝課種桑五十株桑田皆為世業身終不還恆計見口有盈者無受無還不足者受種如法盈者得賣其盈恆戶登翻見賢遍翻口分世業之法始此諸宰民之官各隨近給公田有差更代相付更工衡翻賣者坐如律辛酉魏魏郡王陳建卒魏員外散騎常侍李彪等來聘十二月乙卯魏以侍中淮南王他為司徒柔然犯魏塞魏任城王澄帥衆拒之柔然遁去澄雲之子也任城王雲見一百三十三卷宋明帝泰始七年任音壬帥讀曰率詔以澄為都督梁益荊三州諸軍事梁州刺史魏高祖始置梁益二州於仇池討叛柔服氐羌皆平初太祖命黃門郎虞玩之等檢定黃籍見上卷太祖建元二年別立校籍官置令史限人一日得數巧巧謂姦僞也民愁怨不安外監會稽呂文度外監屬中領軍而親任過於領軍會工外翻籍被卻者悉充遠戍被皮義翻民多逃亡避罪富陽民唐㝢之因以妖術惑衆作亂攻陷富陽富陽即漢富春縣也本屬會稽後屬吳郡晉簡文鄭太后諱春孝武改曰富陽妖於驕翻衆至三萬文度與茹法亮呂文顯皆以姦諂有寵於上茹音如文度為外監專制兵權領軍守虛位而已法亮為中書通事舍人權勢尤盛王儉常曰我雖有大位權寄豈及茹公邪是歲柔然部真可汗卒子豆崙立可從刊入聲汗音寒崙盧昆翻魏收曰伏名敦魏言恆也四年丙寅四八六六月春正月癸亥朔魏高祖朝會始服袞冕史言魏孝文用夏變夷朝直遙翻六月壬午柔然寇魏邊六月唐㝢之攻陷錢唐吳郡諸縣令多棄城走㝢之稱帝於錢唐立太子置百官遣其將高道度等攻陷東陽將即亮翻殺東陽太守蕭崇之崇之太祖族弟也又遣其將孫泓寇山陰至浦陽江據水經注浦陽江即今曹娥江也水發剡溪皆西流至曹娥鎮始折而東流入海浹即叶翻馬數百匹東擊㝢之臺軍至錢唐㝢之衆烏合畏騎兵騎奇寄翻一戰而潰擒斬㝢之進平諸郡縣臺軍乘勝頗縱抄掠抄楚交翻軍還還從宣翻又如字上聞之章十二行本之下有丁酉二字乙十一行本同孔本同張校同收軍主前軍將軍陳天福棄市左軍將軍劉明徹免官削爵付東冶建康有東西二冶今冶城即其地亦曰東冶亭上寵將也將即亮翻既伏誅內外莫不震肅使通事舍人丹陽劉係宗隨軍慰勞勞力到翻遍至遭賊郡縣百姓被驅逼者悉無所問六月閏月癸巳立皇子子貞為邵陵王皇孫昭文為臨汝公六月氐王楊後起卒丁未詔以白水太守楊集始為北秦州刺史武都王集始文弘之子也後起弟後明為白水太守魏亦以集始為武都王集始入朝于魏朝直遙翻魏以為南秦州刺史六月辛亥帝耕籍田六月二月己未立皇弟銶為晉熙王銶音求鉉為河東王六月魏無鄉黨之法唯立宗主督護民多隱冒三五十家始為一戶內祕書令李沖上言祕書省在禁中故謂之內祕書令亦謂之中祕上時掌翻宜準古法五家立鄰長五鄰立里長五里立黨長取鄉人強謹者為之鄰長復一夫里長二夫黨長三夫長知兩翻復方目翻三載無過則升一等其民調一夫一婦帛一匹粟二石大率十匹為公調二匹為調外費三匹為百官俸此外復有雜調調徒弔翻俸扶用翻復扶又翻民年八十已上聽一子不從役孤獨癃老篤疾貧窮不能自存者三長內迭養食之食讀曰飼書奏詔百官通議中書令鄭羲等皆以為不可太尉丕曰臣謂此法若行於公私有益但方有事之月校比戶口民必勞怨請過今秋至冬乃遣使者於事為宜沖曰民可使由之不可使知之論語孔子之言調時所謂調課之月未見均徭省賦之益心必生怨宜及調課之月令知賦稅之均既識其事又得其利行之差易易以豉翻㣥臣多言九品差調為日已久九品上中下各分為三品事見一百三十二卷宋明帝泰始五年恐成擾亂文明太后曰立三長則課調有常準苞蔭之戶可出僥幸之人可止何為不可僥堅堯翻甲戌初立黨里鄰三長定民戶籍民始皆愁苦豪強者尤不願既而課調省費十餘倍上下安之六月三月丙申柔然遣使者牟提如魏時敕勒叛柔然柔然伏名敦可汗自將討之追奔至西漠西漠者大漠之西偏也將即亮翻中書監高閭曰秦漢之世海內一統故可遠征胸奴今南有吳寇何可捨之深入虜庭魏主曰兵者凶器聖人不得已而用之老子之言以有未賓之虜故也今朕承太平之業奈何無故動兵革乎厚禮其使者而歸之六月夏四月辛酉朔魏始制五等公服甲子初以法服御輦祀南郊公服朝廷之服五等朱紫緋緑青法服袞冕以見郊廟之服六月癸酉魏主如靈泉池魏於方山之南起靈泉宮引如渾水為靈泉池東西一百步南北二百步戊寅還宮六月湘州蠻反刺史呂安國有疾不能討丁亥以尚書左僕射柳世隆為湘州刺史討平之六月六月辛酉魏主如方山考異曰魏帝紀是日幸方山七月戊戌又云幸方山皆不言還宮蓋闕文耳六月己卯魏文明太后賜皇子恂名大赦六月秋七月戊戌魏主如方山六月八月乙亥魏給尚書五等爵已上朱衣玉佩大小組綬組綬者組織以成綬鄭玄曰綬所以貫佩玉相承受者也漢制印綬先合單紡為一系四系為一扶五扶為一首五首成一文文采淳為一圭首多者系細少者系粗皆廣一尺六寸組則古翻綬音受六月九月辛卯魏作明堂辟雍六月冬十一月魏議定民官依戶給俸以所領民戶之多少為給俸之差也六月十二月柔然寇魏邊六月是歲魏改中書學曰國子學魏先置中書博士及中書學生今改曰國子學從晉制也凡三十八州二十五在河南十三在河北河南二十五州青南青兗齊濟光豫洛徐東徐雍秦南秦梁益荊涼河沙時又置華陝夏岐班郢凡二十五河北十三州司並肆定相冀幽燕營平安時又置瀛汾凡十三蕭子顯曰雍涼秦沙涇華岐河西華寧陝洛荊郢北豫東荊南豫西兗東兗南徐東徐青齊濟光二十五州在河南相汾懷東雍肆定瀛朔並冀幽平司等十三州在河北五年丁卯四八七春正月丁亥朔魏主詔定樂章非雅者除之戊子以豫章王嶷為大司馬竟陵王子良為司徒臨川王映衛將軍王儉中軍將軍王敬則並加開府儀同三司子良啓記室范雲為郡上曰聞其常相賣弄朕不復窮法當宥之以遠復扶又翻子良曰不然雲動相規誨諫書具存遂取以奏凡百餘紙辭皆切直上歎息謂子良曰不謂雲能爾方使弼汝何宜出守守式又翻文惠太子嘗出東田觀穫時太子作東田於東宮之東綿亙華遠壯麗極目又齊紀太子立樓館於鍾山下號曰東田刈此亦殊可觀衆皆曰唯唯唯于癸翻雲獨曰三時之務實為長勤三時之務謂春耕夏耘秋穫也無徇一朝之宴逸荒人桓天生自稱桓玄宗族與雍司二州蠻相扇動雍於用翻據南陽故城請兵於魏將入寇丁酉詔假丹楊尹蕭景先節總帥步騎直指義陽司州諸軍皆受節度帥讀曰率騎奇寄翻又假護軍將軍陳顯達節帥征虜將軍戴僧靜等水軍向宛葉宛於元翻葉式涉翻雍司諸軍皆受顯達節度以討之魏光祿大夫咸陽文公高允歷事五帝太武景穆文成獻文及高祖為五帝三省尚書省中書省祕書省也未嘗有譴馮太后及魏主甚重之常命中黃門蘇興壽扶侍允仁恕簡靜雖處貴重處昌呂翻情同寒素執書吟覽晝夜不去手誨人以善恂恂不倦楊中立曰恂恂一於誠也朱元晦曰恂恂信實之貌無所遺棄顯祖平青徐悉徙其望族於代事見一百三十二卷宋明帝泰始五年流離飢寒允傾家賑施賑之忍翻施式智翻咸得其所又隨其才行薦之於朝行下孟翻朝直遙翻議者多以初附間之間古莧翻允曰任賢使能何有新舊必若有用豈可以此抑之允體素無疾至是微有不適猶起居如常數日而卒年九十八贈侍中司空賻襚甚厚布帛曰賻衣被曰襚賻音附襚徐醉翻存亡蒙賚皆莫及也桓天生引魏兵萬餘人至沘陽漢沘陽縣屬南陽郡應劭曰沘水所出魏太和中置東荊州於沘陽故城宋白曰今唐州沘陽縣即州故城九域志沘陽縣在唐州東北七十五里戴僧靜傳深橋距沘陽四十里沘音比殺獲萬計天生退保沘陽僧靜圍之不克而還還從宣翻又如字荒人胡丘生起兵懸瓠以應齊魏人擊破之丘生來奔天生又引魏兵寇舞陰舞陰戍主殷公愍拒擊破之殺其副張麒麟天生被創退走被皮義翻創初良翻三月丁未以陳顯達為雍州刺史雍於用翻顯達進據舞陽城夏五月壬辰魏主如靈泉池癸巳魏南平王渾卒甲午魏主還平城詔復七廟子孫及外戚緦麻服已上賦役無所與復方目翻七廟子孫自太祖已下緦麻三月服五服至緦麻而服盡與讀當曰預魏南部尚書公孫邃上谷公張倏帥衆與桓天生復寇舞陰殷公愍擊破之倏式竹翻帥讀曰率復扶又翻考異曰齊書魏虜傳云僞安南將軍遼東公平南將軍上谷公又攻舞陰魏書帝紀云詔南部尚書公孫文慶上谷公張伏干南討舞陰按公孫邃傳邃字文慶與內都幢將上谷公張倏討蕭賾舞陰戍蓋伏干亦倏字也天生還竄荒中邃表之孫也公孫表事魏明元為將魏春夏大旱代地尤甚加以牛疫民餒死者多六月癸未詔內外之臣極言無隱齊州刺史韓麒麟上表曰古先哲王儲積九稔古者三年耕餘一年食九年耕餘三年食以三十年之通制國用則當有九年之蓄國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也稔而廩翻亦崇斯業入粟者與斬敵同爵力田者與孝悌均賞漢令民入粟拜爵又有孝悌力田之科不田者多遊食之口參分居二自承平日久豐穰積年競相矜夸遂成侈俗貴富之家童妾袨服袨黃練翻袨服美衣也工商之族僕隸玉食張晏曰玉食珍食也蠶婦乏短褐故令耕者日少少詩沼翻下同田有荒蕪穀帛罄於府庫寶貨盈於市里衣食匱於室麗服溢於路飢寒之本實在於斯愚謂凡珍異之物皆宜禁斷斷丁管翻吉凶之禮備為格式勸課農桑嚴加賞罰數年之中必有盈贍往年校比戶貫毛晃曰貫鄉籍也臣所統齊州租粟才可給俸略無入倉俸扶用翻雖於民為利而不可長久脫有戎役或遭天災恐供給之方無所取濟可減絹布增益穀租年豐多積歲儉出賑歲入約少為儉賑之忍翻下同寄積於官官有宿積則民無荒年矣宿積子智翻秋七月己丑詔有司開倉賑貸聽民出關就食魏都平城郊畿之外置關於要路以譏征分遣去留所過給糧廩所至三長贍養之柔然伏名敦可汗殘暴可從刊入聲汗音寒垔伊真翻數所角翻且勸其與魏和親伏名敦怒族誅之由是部衆離心八月柔然寇魏邊魏以尚書陸睿為都督擊柔然大破之睿麗之子也陸麗陸俟之子於乙渾之難死也初高車阿伏至羅有部落十餘萬役屬柔然伏名敦之侵魏也阿伏至羅諫不聽阿伏至羅怒與從弟窮奇帥部落西走至前部西北從才用翻帥讀曰率前部漢車師前王地也自立為王考異曰魏書高車傳云在太和十一年蠕蠕在十六年今從高車傳按蠕蠕下當有傳字候婁匐勒夏言天子也號窮奇曰候倍夏言太子也夏言謂中華之言夏戶雅翻分部而立阿伏至羅居北窮奇居南伏名敦追擊之屢為阿伏至羅所敗乃引衆東徙史言柔然浸衰敗補邁翻九月嚴九月改冬十月辛未魏詔罷起部無益之作起部掌百工之事書曰百工起哉冬十月嚴冬十月改十一月丁未又詔罷尚方錦繡綾羅之工四民欲造任之無禁四民士農工商也魏久無事府藏盈積詔盡出御府衣服珍寶太官雜器太僕乘具內庫弓矢刀鈐十分之八藏徂浪翻乘繩證翻鈐與鉗同其廉翻刃也唐有玉鈐衛外府衣物繒布絲纊繒慈陵翻帛也纊苦謗翻纊絮也非供國用者以其太半班賚百司下至工商皂隸逮于六鎮邊戍畿內鰥寡孤獨貧癃皆有差劉熙釋名曰無妻曰鰥憂悒不能寐目常鰥鰥然其字從魚魚目常不閉無夫曰寡寡倮也倮然單獨也無父曰孤孤顧也顧望無所瞻見也無子曰獨獨鹿也鹿鹿無所依也無財曰貧疲病曰癃魏祕書令高祐丞李彪奏請改國書編年為紀傳表志傳直戀翻魏主從之祐允之從祖弟也十二月詔彪與著作郎崔光改修國書光道固之從孫也從才用翻宋明帝泰始五年崔道固降魏魏主問高祐曰何以止盜對曰昔宋均立德猛虎渡河卓茂行化蝗不入境宋均事見四十五卷漢明帝永平七年卓茂為密令教化大行漢平帝時天下大蝗獨不入密縣界人也苟守宰得人治化有方止之易矣守式又翻治直吏翻易以豉翻祐又上疏言今之選舉不採識治之優劣專簡年勞之多少少詩沼翻斯非盡才之謂宜停此薄藝棄彼朽勞唯才是舉則官方斯穆方道也穆和也清也雖年勤可録而才非撫民者可加之以爵賞不宜委之以方任所謂王者可私人以財不私人以官者也王者不私人以官前漢書佞幸傳贊之辭祐出為西兗州刺史鎮滑臺以郡國雖有學縣黨亦宜有之乃命縣立講學黨立小學六年戊辰四八八春正月乙未魏詔犯死刑者父母祖父母年老更無成人子孫旁無期親者具狀以聞期親為之服期者初皇子右衛將軍子響出繼豫章王嶷嶷魚力翻嶷後有子表留為世子子響每入朝朝直遙翻以車服異於諸王每拳擊車壁上聞之詔車服與皇子同於是有司奏子響宜還本三月己亥立子響為巴東王角城戍將張蒲因大霧乘船入清中採樵清中清水中也將即亮翻戍主皇甫仲賢覺之帥衆拒戰於門中僅能卻之魏步騎三千餘人已至塹外帥讀曰率騎奇寄翻塹七豔翻淮陰軍主王僧慶等引兵救之魏人乃退夏四月桓天生復引魏兵出據隔城復扶又翻詔游擊將軍下邳曹虎督諸軍討之輔國將軍朱公恩將兵踏伏將即亮翻下同踏與踏同遇天生遊軍與戰破之遂進圍隔城天生引魏兵步騎萬餘人來戰虎奮擊大破之俘斬二千餘人明日攻拔隔城斬其襄城太守帛烏祝復俘斬二千餘人天生棄平氏城走平氏漢縣屬南陽郡晉宋屬義陽郡縣西南有桐柏山淮源所出也五代志淮安郡平氏縣魏置漢廣郡我朝開寶五年省平氏縣為鎮入唐州泌陽縣陳顯達侵魏甲寅魏遣豫州刺史拓跋斤將兵拒之甲子魏大赦乙丑魏主如靈泉池丁卯如方山己巳還宮魏築城於醴陽醴陽蓋在醴水之北水經注醴水出桐柏山與淮同源而別流西注徑平氏縣東北又西流注于沘水進攻沘陽城中將士皆欲出戰鎮將韋珍曰魏樂陵鎮將鎮沘陽將即亮翻彼初至氣鋭未可與爭且共堅守待其力攻疲弊然後擊之乃憑城拒戰旬有二日珍夜開門掩擊顯達還還從宣翻又如字五月甲午以宕昌王梁彌承為河涼二州刺史宕徒浪翻秋七月己丑魏主如靈泉池遂如方山己亥還宮九月壬寅上如琅邪城講武蕭子顯曰南琅邪郡本治金城永明乃徙治白下沈約曰晉亂琅邪國人隨元帝過江者千餘戶太興三年立懷德縣丹楊雖有琅邪相而無其地成帝咸康元年桓溫領郡鎮江乘之蒲洲金城上求割丹楊之江乘縣境立郡癸卯魏淮南靖王他卒他徒河翻魏主方享宗廟始薦聞之為廢祭臨視哀慟為于僞翻冬十月庚申立冬初臨太極殿讀時令漢儀太史每歲上其年曆先立春立夏大暑立秋立冬常讀五時令皇帝所服各隨五時之色帝升御坐尚書令以下就席位尚書三公郎以令置按上奏以入就席伏讀訖賜酒一卮閏月辛酉以尚書僕射王奐為領軍將軍辛未魏主如靈泉池癸酉還宮十二月柔然伊吾戍主高羔子帥衆三千以城附魏帥讀曰率上以中外穀帛至賤用尚書右丞江夏李圭之議夏戶雅翻出上庫錢五千萬及出諸州錢皆令糴買西陵戍主杜元懿建言吳興無秋會稽豐登會工外翻商旅往來倍多常歲西陵牛埭稅官格日三千五百如臣所見日可增倍西陵在今越州蕭山縣西十二里西興渡是也吳越王錢鏐以西陵非吉語改曰西興牛埭即今西興堰用牛挽船因曰牛埭埭徒耐翻浦陽江南津埭則今之梁湖堰是也北津埭則今之曹娥堰是也柳浦埭則今杭州江干浙江亭北跨浦橋埭是也為于僞翻格外可長四百許萬長丁丈翻今知兩翻增也又音直亮翻多也西陵戍前檢稅無妨戍事餘三埭自舉腹心上以其事下會稽下戶嫁翻會稽行事吳郡顧憲之議以為始立牛埭之意非苟逼蹴以取稅也蹴子六翻乃以風濤迅險濟急利物耳後之監領者不達其本各務己功監古銜翻或禁遏他道或空稅江行按吳興頻歲失稔今茲尤甚去之從豐良由饑棘去之當作去乏棘急也依格弗降舊格新減尚未議登格外加倍將以何術皇慈恤隱振稟蠲調左傳楚大饑振稟同食杜預注曰振發也廩倉也調徒釣翻重增困瘼榷古嶽翻瘼病也重直用翻人而不仁古今共疾若事不副言懼貽譴詰譴去戰翻詰去吉翻必百方侵苦為公賈怨元懿稟性苛刻已彰往效任以物土譬以狼將羊其所欲舉腹心亦當虎而冠耳為于僞翻賈音古狼將羊虎而冠皆漢書語以狼將羊則羊必為狼所噬食虎而冠者言其人惡戾如虎著冠書云與其有聚斂之臣寧有盜臣記大學記孟獻子之言斂力贍翻斂民所害乃大也愚又以便宜者蓋謂便於公宜於民也竊見頃之言便宜者非能於民力之外用天分地用天之道分地之利此孝經第六章之言方來不便於公名與實反有乖政體凡如此等誠宜深察上納之而止魏主訪㣥臣以安民之術祕書丞李彪上封事以為豪貴之家奢僭過度第宅車服宜為之等制又國之興亡在冢嗣之善惡冢嗣之善惡在教諭之得失冢大也周禮疏曰冢大之上也冢知隴翻年尚幼沖情未能專既臨萬機不遑溫習今日思之豈唯豫咎抑亦師傅之不勤尚書李欣免冠謝欣許斤翻此近事之可鑒者也臣謂宜準古立師傅之官以訓導太子蓋此時恂之失德已著故彪有是言又漢置常平倉以救匱乏見二十七卷漢宣帝五鳳四年移民就豐既廢營生困而後達又於國體實有虛損曷若豫儲倉粟安而給之豈不愈於驅督老弱糊口千里之外哉糊音胡說文曰寄食鬻也余據正考父鼎銘饘於是粥於是以糊余口則糊者食饘粥之義許慎所謂寄食者蓋因左傳糊口於四方以為說今此當依許義宜析州郡常調九分之二京師度支歲用之餘調徒弔翻度徒洛翻各立官司年豐糴粟積之於倉儉則加私之二糶之於人糶他弔翻如此民必力田以取官絹積財以取官粟年登則常積歲凶則直給數年之中穀積而人足雖災不為害矣又宜於河表七州人中擢其門才引令赴闕依中州官比隨能序之河表七州秦雍岐華陝河涼也以下文懷江漢歸有道之情證之則七州當謂荊兗豫洛青徐齊也河表直謂大河之外門才者因其世家敍其才用中州謂代都東至海南距大河諸州比毗至翻比例也朝直遙翻二可以懷江漢歸有道之情又父子兄弟異體同氣罪不相及乃君上之厚恩至於憂懼相連固自然之恆理也恆戶登翻無情之人父兄繫獄子弟無慘惕之容子弟逃刑父兄無愧恧之色恧女六翻宴安榮位遊從自若車馬衣冠不變華飾骨肉之恩豈當然也臣愚以為父兄有犯宜令子弟素服肉袒詣闕請罪子弟有坐宜令父兄露版引咎乞解所司若職任必要不宜許者慰勉留之如此足以敦厲凡薄使人知所恥矣又朝臣遭親喪者假滿赴職朝直遙翻假古訝翻時魏不聽朝臣終喪給假而已衣錦乘軒從郊廟之祀衣於既翻鳴玉垂緌同慶賜之燕緌如佳翻傷人子之道虧天地之經愚謂凡遭大父母父母喪者皆聽終服若無其人職業有曠者則優旨慰諭起令視事但綜司出納敷奏而已國之吉慶一令無預其軍旅之警墨縗從役春秋時晉襄公居文公之喪墨縗絰以敗秦師于殽自是之後以墨縗從戎縗倉回翻事所宜行也魏主皆從之由是公私豐贍雖時有水旱而民不困窮魏遣兵擊百濟為百濟所敗陳壽曰三韓凡七十八國百濟其一也據李延壽史其先以百家濟海後浸強盛以立國故曰百濟晉世句麗略有遼東百濟亦據有遼西晉平二郡地七年己巳四八九春正月辛亥上祀南郊大赦魏主祀南郊始備大駕漢儀大駕公卿奉引太僕御大將軍驂乘屬車八十一乘備千乘萬騎祀天郊甘泉乃備之謂之甘泉鹵簿東都惟大行備大駕晉中朝大駕鹵簿先象車鼓吹一部十三人中道次靜室令駕一中道式道候二人駕一分左右次洛陽尉二人騎分左右次洛陽亭長九人赤車駕一分三道各吹正二人引次洛陽令駕一中道次河南中部椽中道河橋椽在左功曹史在右並駕一次河南尹駕駟戟吏六人次河南主簿駕一中道次司隸部河南從事中道都部從事居左別駕從事居右並駕一次司隸校尉駕三戟吏八人次司隸主簿駕一中道次司隸主記駕一中道次廷尉明法椽中道五官椽居左功曹史居右並駕一次廷尉卿駕駟戟吏六人次廷尉主簿主記並駕一在左太僕引從如廷尉在中宗正引從如廷尉在右次太常駕駟中道戟吏六人太常外部椽居左五官椽功曹史居右並駕一次光祿引從中道太常主簿主記居左衛尉引從居右並駕一次太尉外督令史駕一中道次西東賊倉戶等曹屬並駕一引從次太尉駕駟中道太尉主簿舍人各一人祭酒二人並駕一在左右次司徒引從駕駟中道次司空引從駕駟中道三公騎令史戟各八人鼓吹各一部七人次中護軍中道駕駟鹵簿左右各三行戟楯在外弓矢在內鼓吹一部七人次步兵校尉在左長水校尉在右並駕一各鹵簿左右二行戟楯在外刀楯在內鼓吹各一部七人次射聲校尉在左翊軍校尉在右並