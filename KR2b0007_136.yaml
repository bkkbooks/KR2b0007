亥上如琅邪城魏懷朔鎮將汝陰靈王天賜魏置懷朔鎮於漢五原郡界是後六鎮叛改為朔州而不能有舊鎮之地杜佑曰魏都平城於馬邑郡北三百餘里置懷朔鎮及遷洛後置朔州將即亮翻下同雍於用翻皆坐贓當死馮太后及魏主臨皇信堂水經注曰太極殿南對承賢門門南即皇信堂也魏書帝紀太和七年十月皇信堂成十六年以安昌殿為內寢皇信堂為中寢見賢遍翻太后令曰卿等以為當存親以毀令邪當滅親以明法邪㣥臣皆言二王景穆皇帝之子景穆皇帝世祖之子薨諡曰景穆皇帝未即尊位也二王於高祖為叔祖太后不應魏主乃下詔稱二王所犯難恕而太皇太后追惟高宗孔懷之恩二王於文成帝為兄弟詩曰兄弟孔懷惟思也聞於中外聞音問並特免死削奪官爵禁錮終身初魏朝聞楨貪暴遣中散閭文祖詣長安察之中散中散大夫也散悉亶翻為之隱為于偽翻事覺文祖亦抵罪馮太后謂㣥臣曰文祖前自謂廉今竟犯法以此言之人心信不可知魏主曰古有待放之臣春秋公羊傳晉放其大夫胥甲父于衛放之者何猶曰無去是云爾然則何言爾近正也此其為近正奈何古者大夫已去三年待放君放之非也大夫待放正也聽辭位歸第宰官中散慕容契進曰契蓋以宰官帶中散大夫也小人之心無常而帝王之法有常以無常之心奉有常之法非所克堪乞從退黜魏主曰契知心不可常則知貪之可惡矣惡烏路翻何必求退遷宰官令契白曜之弟子也慕容白曜有平齊之功秋七月丙寅魏主如靈泉池魏主使㣥臣議久與齊絶今欲通使何如使疏吏翻下同尚書遊明根曰朝廷不遣使者又築醴陽深入彼境皆直在蕭賾今復遣使不亦可乎復扶又翻魏主從之八月乙亥遣兼員外散騎常侍邢産等來聘九月魏出宮人以賜北鎮人貧無妻者北鎮六鎮也一曰懷朔鎮直平城北冬十一月己未魏安豐匡王猛卒十二月丙子魏河東王苟頽卒平南參軍顏幼明等聘於魏魏以尚書令尉元為司徒左僕射穆亮為司空豫章王嶷自以地位隆重深懷退素是歲啓求還第上令其世子子廉代鎮東府太子詹事張緒領揚州中正長沙王晃屬用吳興聞人雍為州議曹屬之欲翻州議曹自漢以來率儒士為之緒不許晃使書佐固請緒正色曰此是身家州鄉殿下何得見逼自魏晉以來中正率用本州人望為之侍中江斆為都官尚書斆音效中書舍人紀僧真得幸於上容表有士風請於上曰臣出自本縣武吏邀逢聖時邀南史江斆傳作憿説文曰幸也集韻憿僥徼通音堅堯翻為兒昏得荀昭光女即時無復所須為于偽翻復扶又翻唯就陛下乞作士大夫上曰此由江斆謝瀹我不得措意可自詣之僧真承旨詣斆登榻坐定斆顧命左右曰移吾牀遠客遠于願翻僧真喪氣而退告上曰士大夫故非天子所命斆湛之孫瀹朏之弟也二家以名義自將至於甄別流品雖萬乘之主不可得而奪喪息浪翻朏敷尾翻柔然別帥叱呂勤帥衆降魏別帥所類翻勤帥讀曰率降戶江翻聶崇岐標點王崇武覆校
