body:
  text: 資治通鑑卷第一百四十端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注齊紀六高宗明皇帝中建武二年乙亥四九五春正月壬申遣鎮南將軍王廣之督司州右衛將軍蕭坦之督徐州尚書右僕射沈文季督豫州諸軍以拒魏癸酉魏詔淮北之人不得侵掠犯者以大辟論淮北時已屬魏故詔不得侵掠其人辟毗亦翻乙未拓跋衍攻鍾離徐州刺史蕭惠休乘城拒守間出襲擊魏兵破之惠休惠明之弟也間古莧翻蕭惠明見一百三十三卷宋蒼梧王元徽二年劉昶王肅攻義陽昶知兩翻司州刺史蕭誕拒之肅屢破誕兵招降萬餘人降戶江翻魏以肅為豫州刺史劉昶性褊躁御軍嚴暴褊補典翻躁則到翻人莫敢言法曹行參軍北平陽固苦諫昶怒欲斬之使當攻道攻道攻城之道矢石之所集也臨敵勇決昶始奇之丁酉中外纂嚴以太尉陳顯達為使持節都督西北討諸軍事往來新亭白下以張聲勢使疏吏翻下同己亥魏主濟淮二月至壽陽衆號三十萬鐵騎彌望彌望猶言極望也孔穎達曰人目所望三十里而天地合於三十里外不復見之是為極望騎奇寄翻甲辰魏主登八公山賦詩道遇甚雨命去蓋去羌呂翻見軍士病者親撫慰之魏主遣使呼城中人豐城公遙昌使崔章十二行本崔上有參軍二字乙十一行本同孔本同慶遠出應之慶遠問師故左傳齊桓公以諸侯之師伐楚楚子使與師言曰不虞君之涉吾地也何故固當有故卿欲我斥言之乎斥指也直言以指人之罪過無所回避謂之斥慶遠曰未承來命無所含垢左傳曰國君含垢杜預注曰含垢忍垢恥齊主何故廢立慶遠曰廢昏立明古今非一未審何疑魏主曰武帝子孫今皆安在慶遠曰七王同惡已伏管蔡之誅子隆子懋子敬子真子倫並鬱林海陵為七王或內列清要或外典方牧魏主曰卿主若不忘忠義何以不立近親如周公之輔成王而自取之乎慶遠曰成王有亞聖之德故周公得而相之相息亮翻今近親皆非成王之比故不可立且霍光亦捨武帝近親而立宣帝唯其賢也魏主曰霍光何以不自立慶遠曰非其類也主上正可比宣帝安得比霍光若爾武王伐紂不立微子而輔之亦為苟貪天下乎史言崔慶遠之機辨朕來問罪如卿之言便可釋然慶遠曰見可而進知難而退左傳載晉大夫隨武子之言魏主曰卿欲吾和親為不欲乎慶遠曰和親則二國交歡生民蒙福否則二國交惡生民塗炭和親與否裁自聖衷魏主賜慶遠酒殽衣服而遣之戊申魏主循淮而東過壽陽不攻引兵東下租運屬路屬之欲翻此謂淮北之民耳丙辰至鍾離自壽陽至鍾離三百三十餘里上遣左衛將軍崔慧景寧朔將軍裴叔業救鍾離劉昶王肅衆號二十萬塹柵三重塹七豔翻重直龍翻並力攻義陽城中負楯而立攻城甚急矢石交至故負楯而立以自蔽楯食尹翻去城百餘里畏魏強不敢進城中益急黃門侍郎蕭衍請先進廣之分麾下精兵配之衍間道夜發間古莧翻與太子右率蕭誄等率所律翻右率太子右衛率也誄魯水翻徑上賢首山水經注溮水南出大潰山北徑賢首山西又北出東南屈徑義陽縣郡城南上時掌翻魏人出不意未測多少不敢逼少詩沼翻黎明城中望見援軍至蕭誕遣長史王伯瑜出攻魏柵因風縱火衍等衆軍自外擊之魏不能支解圍去己未誕等追擊破之誄諶之弟也先是上以義陽危急先悉薦翻詔都督青冀二州諸軍事張沖出軍攻魏以分其兵勢沖遣軍主桑係祖攻魏建陵驛馬厚丘三城又遣軍主杜僧護攻魏虎坑馮時即丘三城皆拔之青冀二州刺史王洪範遣軍主崔延襲魏紀城據之宋泰始初青冀二州入于魏乃置青冀二州刺史治胊山杜佑曰宋明帝立青冀二州寄治贛榆齊青州治胊山冀州理漣口今臨淮郡漣水縣魏收志郯郡有建陵縣漢古縣也宋白曰厚丘故城在海州沭陽縣北四十五里又東彭城郡龍沮縣有即丘城即丘亦漢縣本屬琅邪郡賢曰即丘即左傳之祝丘故城在今沂州臨沂縣東南紀城春秋之紀鄣故城也杜預曰東海贛榆縣東北有故紀城魏主欲南臨江水辛酉發鍾離司徒長樂元懿公馮誕病不能從樂音洛從才用翻魏主與之泣訣行五十里聞誕卒時崔慧景等軍去魏主營不過百里魏主輕將數千人夜還鍾離將即亮翻拊尸而哭達旦聲淚不絶壬戌敕諸軍罷臨江之行葬誕依晉齊獻王故事齊獻王攸葬事見八十一卷晉武帝太康四年幼同硯席尚帝妹樂安長公主長知兩翻雖無學術而資性淳篤故特有寵丁卯魏主遣使臨江數上罪惡使疏吏翻數所具翻魏久攻鍾離不克士卒多死三月戊寅魏主如邵陽築城於洲上邵陽洲在鍾離城北淮水中夾築二城既築城於洲上又於淮水南北兩岸夾築二城樹柵水中以斷援兵之路斷丁管翻下先斷邀斷欲斷同拔之魏主欲築城置戍於淮南以撫新附之民賜相州刺史高閭璽書具論其狀相息亮翻璽斯氏翻閭上表以為兵法十則圍之五則攻之孫子兵法有是言謂欲受曹虎降也降戶江翻下同東西遼闊難以成功今又欲置戍淮南招撫新附昔世祖以回山倒海之威步騎數十萬南臨瓜步諸郡盡降而盱眙小城攻之不克事見一百二十五卷宋文帝元嘉二十七年騎奇寄翻盱眙音吁怡兵不戍一城土不闢一廛說文曰廛一畝半一家之居地以為大鎮未平宋時淮上以壽陽廣陵為大鎮夫壅水者先塞其原塞悉則翻伐木者先斷其本本原尚在而攻其末流終無益也壽陽盱眙淮陰淮南之本原也壽陽盱眙淮陰皆淮津之要地齊皆以重兵守之故云本原而留守孤城其不能自全明矣敵之大鎮逼其外長淮隔其內少置兵則不足以自固少詩沼翻多置兵則糧運難通大軍既還士心孤怯夏水盛漲救援甚難以新擊舊以勞禦逸久於屯戍魏師已老齊以生兵攻之是之謂以新擊舊魏以孤軍守孤城勞於備禦齊師迭出而攻之士有餘力是之謂以勞禦逸必為敵擒雖忠勇奮發終何益哉言將士效死弗去而城破身沒雖忠勇奮發而無益於國事人之常情昔彭城之役既克大鎮城戍已定而不服思叛者猶踰數萬宋明帝泰始二年魏得彭城至高帝建元之初淮北之民猶不樂屬魏思歸江南遂有五固之役蕞徂外翻小貌處昌呂翻去淮陽十八里五固之役攻圍歷時卒不能克事見一百二十五卷高帝建元三年卒子恤翻事兼數倍天時尚熱尚當作向願陛下踵世祖之成規旋轅返旆經營洛邑蓄力觀釁釁許覲翻布德行化中國既和遠人自服矣尚書令陸睿上表以為長江浩蕩彼之巨防又南土昏霧暑氣鬱蒸師人經夏必多疾病而遷鼎草創武王遷九鼎于洛邑故引以為言臺省無論政之館府寺靡聽治之所治直吏翻百僚居止事等行路沈雨炎陽自成癘疫沈與雨沈同持林翻說文久陰曰沈炎陽炎日也聖王所難今介胄之士外攻寇讎羸弱之夫內勤土木運給之費日損千金驅罷弊之兵討堅城之虜將何以取勝乎羸倫為翻罷讀與疲同陛下去冬之舉正欲曜武江漢耳今自春幾夏幾居希翻近也理宜釋甲願早還洛邑使根本深固聖懷無內顧之憂兆民休斤板之役斤謂斧斤之役板謂板築之役將即亮翻下同何憂不服魏主納其言崔慧景以魏人城邵陽患之張欣泰曰彼有去志所以築城者外自誇大懼我躡其後耳今若說之以兩願罷兵說輸芮翻彼無不聽矣慧景從之使欣泰詣城下語魏人語牛倨翻魏主乃還濟淮餘五將未濟齊人據渚邀斷津路斷丁管翻下同魏主募能破中渚兵者以為直閣將軍軍主代人奚康生應募據北史康生本姓達奚魏孝文改復姓於是姓奚因風縱火燒齊船艦艦戶黯翻依煙直進飛刀亂斫中渚兵遂潰魏主假康生直閣將軍魏主使前將軍楊播將步卒三千騎五百為殿將步即亮翻騎奇寄翻下同殿丁練翻斷後曰殿時春水方長齊兵大至戰艦塞川播結陳於南岸以禦之長知兩翻艦戶黯翻塞悉則翻陳讀曰陳下為陳同諸軍盡濟齊兵四集圍播播為圓陳以禦之身自搏戰所殺甚衆相拒再宿軍中食盡圍兵愈急魏主在北岸望之以水盛不能救既而水稍減播引精騎三百歷齊艦大呼曰呼火故翻我今欲渡能戰者來遂擁衆而濟播椿之兄也楊椿見一百三十七卷武帝永明八年魏軍既退邵陽洲上餘兵萬人求輸馬五百匹假道以歸崔慧景欲斷路攻之張欣泰曰歸師勿遏古人畏之兵法歸師勿遏窮寇勿追不可輕也今勝之不足為武不勝徒喪前功喪息浪翻不如許之慧景從之蕭坦之還言於上曰邵陽洲有死賊萬人慧景欣泰縱而不取由是皆不加賞甲申解嚴魏師已退故解嚴初上聞魏主欲飲馬於江懼敕廣陵太守行南兗州事蕭穎胄移居民入城民驚恐欲席卷南渡卷讀曰捲穎胄以魏寇尚遠不即施行魏兵竟不至穎胄太祖之從子也蕭穎胄太祖從弟赤斧之子從才用翻上遣尚書左章十二行本左作右乙十一行本同僕射沈文季助豐城公遙昌守壽陽是年春正月遣沈文季督豫州諸軍豫州治壽陽止游兵不聽出洞開城門嚴加守備魏兵尋退魏之入寇也盧昶等猶在建康海陵王即位魏遣昶來聘昶至建康而帝已立飼以蒸豆飼祥吏翻馬牛待之昶怖懼食之怖普布翻淚汗交橫謁者張思寧辭氣不屈死於館下及還魏主讓昶曰人誰不死何至自同牛馬屈身辱國縱不遠慙蘇武蘇武使胸奴十九年不屈節乃黜為民戊子魏太師京兆武公馮熙卒于平城乙未魏主如下邳夏四月庚子如彭城辛丑為馮熙舉哀為于僞翻太傅録尚書事平陽公丕不樂南遷樂音洛與陸睿表請魏主還臨熙葬丕睿時留守平城開闢以來安有天子遠奔舅喪者乎今經始洛邑經度之也始初也詩云經始靈臺陷君不義令僕以下可付法官貶之此平城留臺令僕也法官謂御史誘音酉長知兩翻柩巨救翻南葬洛陽禮如晉安平獻王故事晉安平王孚葬見七十九卷武帝泰始八年魏之葬熙其禮又加於誕魏主之在鍾離仇池鎮都大將梁州刺史拓跋英請以州兵會劉藻擊漢中去年十一月魏遣劉藻向南鄭魏梁州刺史治仇池齊梁州刺史治南鄭將即亮翻下同梁州刺史蕭懿遣部將尹紹祖梁季㣥等將兵二萬據險立五柵以拒之據蕭子顯齊書時據角弩谷白馬沮水立五柵彼帥賤莫相統一帥所類翻我選精卒並攻一營彼必不相救若克一營四營皆走矣乃引兵急攻一營拔之四營俱潰生擒梁季㣥斬三千餘級俘七百餘人乘勝長驅進逼南鄭懿又遣其將姜修擊英英掩擊盡獲之將還懿別軍繼至將士皆已疲不意其至大懼欲走英故緩轡徐行神色自若登高望敵東西指麾狀若處分處昌呂翻然後整列而前懿軍疑有伏兵遷延引退英追擊破之遂圍南鄭禁將士毋得侵暴遠近悅附爭供租運懿嬰城自守軍主范潔先將三千餘人在外還救南鄭英掩擊盡獲之圍城數十日城中恟懼將即亮翻恟許拱翻録事參軍新野庾域封題空倉數十指示將士曰此中粟皆滿足支二年但努力固守衆心乃安會魏主召兵還英使老弱先行自將精兵為後拒殿軍後以拒追兵曰後拒使疏吏翻懿以為詐英去一日猶不開門二日乃遣將追之英與士卒下馬交戰懿兵不敢逼行四日四夜懿兵乃返英入斜谷會天大雨士卒截竹貯米執炬火於馬上炊之貯丁呂翻先是懿遣人誘說仇池諸氐使起兵斷英運道及歸路英勒兵奮擊且戰且前矢中英頰卒全軍還仇池英乘勝深入後無繼援雖僅獲全軍而返亦已危矣先悉薦翻說輸芮翻斷丁管翻中竹仲翻卒子恤翻平之英楨之子南安王楨見一百三十八卷武帝永明十一年衍之兄也英之攻南鄭也魏主詔雍涇岐三州發兵六千人戍南鄭魏雍州治長安領京兆馮翊扶風咸陽北地等郡太和中置涇州治臨涇城領安定隴東新平平涼平原等郡十一年置岐州治雍城鎮領平秦武功武都郡雍於用翻侍中兼左僕射李沖表諫曰秦川險厄地接羌夷自西師出後餉援連續加氐胡叛逆所在奔命運糧擐甲迄茲未已今復豫差戍卒復扶又翻差初皆翻下差遣同懸擬山外漢中之地在關中南山之南故曰山外復方目翻恐猶驚駭脫終攻不克徒動民情連胡結夷事或難測輒依旨密下刺史待軍克鄭城下戶嫁翻鄭城謂南鄭城然後差遣如臣愚見猶謂未足何者西道險厄單徑千里謂褒斜之道也孤據㣥賊之中敵攻不可猝援食盡不可運糧古人有言雖鞭之長不及馬腹左傳晉伯宗之言實為馬腹也且魏境所掩九州過八此指禹貢九州為言十分而九所未民者唯漠北之與江外耳漠北謂柔然江外謂齊言唯此二國未為魏民謂以繩羈係其君而致之在近言不遠也宜待疆宇既廣糧食既足然後置邦樹將樹立也將帥也將即亮翻今壽陽鍾離密邇未拔赭城新野跬步弗降赭城即赭陽城也降戶江翻西藩寧可以遠兵固李沖蓋謂淮漢之地為東道謂南鄭為西藩臣恐終以資敵也又建都土中洛陽為土中方須大收死士平蕩江會建康為江南都會之地故曰江會棄令陷沒恐後舉之日衆以留守致懼求其死效未易可獲易以豉翻推此而論不戍為上魏主從之癸丑魏主如小沛己未如瑕丘庚申如魯城魏收地形志魯郡魯縣之魯城辛酉拜孔氏四人顏氏二人官仍選諸孔宗子一人封崇聖侯奉孔子祀命兗州修孔子墓大宗之子為宗子孔子墓亦在魯縣戊辰魏主如碻磝命謁者僕射成淹具舟楫欲自泗入河泝流還洛淹諫以為河流悍猛非萬乘所宜乘泝蘇故翻悍侯旰翻又下罕翻萬乘繩證翻帝曰我以平城無漕運之路故京邑民貧今遷都洛陽欲通四方之運而民猶憚河流之險故朕有此行所以開百姓之心也魏城陽王鸞等攻赭陽諸將不相統一圍守百餘日諸將欲按甲不戰以疲之李佐獨晝夜攻擊士卒死者甚衆帝遣太子右衛率垣歷生救之諸將以衆寡不敵欲退佐獨帥騎二千逆戰而敗將即亮翻率所律翻帥讀曰率騎奇寄翻盧淵等引去歷生追擊大破之歷生榮祖之從弟也垣榮祖著名於宋泰始之間從才用翻下同敗補邁翻考異曰齊書魏虜傳真度敗在建武元年下魏帝紀城陽王鸞以敗軍獲罪在太和十九年五月今從之鸞等見魏主於瑕丘見賢遍翻魏主責之曰卿等沮辱威靈罪當大辟沮在呂翻辟毗亦翻朕以新遷洛邑特從寬典五月己巳降封鸞為定襄縣王削戶五百盧淵李佐韋珍皆削官爵為民佐仍徙瀛州太和十一年分定州河間高陽冀州章武浮陽置瀛州治趙都軍城謂以彭城降魏也從才用翻聽存其爵及荊州刺史餘皆削奪曰進足明功退足彰罪矣魏廣川剛王諧卒諧略之子也魏廣川王略見一百三十五卷高帝之建元二年諡法追補前過曰剛古者大臣之喪有三臨之禮賈山曰古者賢君之於臣也死則往弔哭之臨其小斂大斂已棺除而為之服錫衰麻絰而三臨其喪王公之喪哭於東堂自今諸王之喪期親三臨期親期喪之親期讀曰朞小功緦麻一臨大功九月服小功五月服緦麻三月服廣川王於朕大功也廣川王略顯祖之弟諧於魏主從兄弟也其服大功斂力贍翻素服深衣往哭之甲戌魏主如滑臺丙子舍于石濟庚申章十二行本申作辰乙十一行本同孔本同張校同太子出迎於平桃城魏收志濟陰郡離狐縣有桃城水經注曰滎陽縣有虢亭俗謂之平田兆城趙郡王幹在洛陽貪淫不法御史中尉李彪私戒之魏置御史中尉以糾察百官猶御史中丞也殿下不悛不敢不以聞幹悠然不以為意悠遠也悠然夷曠自得之意悛七緣翻彈徒丹翻魏主詔幹與北海王詳俱從太子詣行在既至見詳而不見幹陰使左右察其意色知無憂悔言既無憂色又無悔過之意杖之一百免官還第數所具翻癸未魏主還洛陽告于太廟甲申減宀兒官之祿以助軍國之用乙酉行飲至之禮左傳臧僖伯曰三年而治兵入而振旅歸而飲至以數軍實又曰反行飲至舍爵策勳焉飲至者告至于廟而飲酒也班南伐之賞也甲午魏太子冠於廟記冠義曰古者重冠冠故行之於廟行之於廟者所以自卑而尊先祖也鄭樵曰曹魏冠太子再加宋一加余謂魏孝文好古其必用三加之禮冠於廟禮也曹魏以來不復在廟冠古玩翻引見㣥臣見賢遍翻謂曰卿等欲朕遠追商周為欲不及漢晉邪咸陽王禧對曰㣥臣願陛下度越前王耳帝曰然則當變風易俗當因循守故邪對曰願聖政日新帝曰為止於一身為欲傳之子孫邪對曰願傳之百世帝曰然則必當改作卿等不得違也對曰上令下從其誰敢違帝曰夫名不正言不順則禮樂不可興用論語孔子之言一從正音斷音短正音華言也其年三十已上習性已久容不可猝革三十已下見在朝廷之人見賢遍翻語音不聽仍舊若有故為謂故意為北語不肯從華言者各宜深戒王公卿士以為然不不讀曰否對曰實如聖旨帝曰朕嘗與李沖論此沖曰四方之語竟知誰是謂四方之人言語不同不知當以誰為是即為正矣沖之此言其罪當死因顧沖曰卿負社稷當令御史牽下沖免冠頓首謝又責留守之官曰守手又翻昨望見婦女猶服夾領小袖卿等何為不遵前詔皆謝罪帝曰朕言非是卿等當庭爭爭讀曰諍如何入則順旨退則不從乎六月己亥下詔不得為北俗之語於朝廷違者免所居官癸卯魏主使太子如平城赴太師熙之喪癸丑魏詔求遺書祕閣所無漢時書府在外則有太常太史博士掌之內則有延閣廣內石渠之藏後漢則藏之東觀晉有中外三閣經書陸機謝表云身登三閣謂為祕書郎掌中外三閣祕書也此祕閣之名所由始加以優賞魏有司奏廣川王葬於代都未審以新尊從舊卑以舊卑就新尊夫尊婦卑廣川王諧新卒故曰新尊其先卒故曰舊卑代人遷洛者宜悉葬邙山邙山在洛城北邙謨郎翻聽妻還葬夫死於洛者不得還代就妻其餘州之人自聽從便丙辰詔遷洛之民死葬河南不得還北於是代人遷洛者悉為河南洛陽人戊午魏改用長尺大斗其法依漢志為之漢律曆志以子穀秬黍中者一黍之廣度之九十分黃鍾之長一為一分十分為寸十寸為尺又以子穀秬黍中者千有二百實其籥十籥為合十合為升十升為斗上之廢鬱林王也見上卷上年既而除領軍將軍南徐州刺史諶恚曰見炊飯推以與人諶氏壬翻恚於避翻見賢遍翻推吐雷翻諶恃功頗干預朝政朝直遙翻所欲選用輒命尚書使為申論為于僞翻上聞而忌之以蕭誕蕭誄方將兵拒魏誄魯水翻將即亮翻隱忍不發壬戌上遊華林園與諶及尚書令王晏等數人宴盡歡坐罷留諶晚出至華林閣仗身執還省仗身執仗之衛士也天子禁衛有齊內仗身見齊書蕭諶傳又按杜佑通典曰唐制鎮戍之官給仗身其人數視鎮戍之上中下為差京官五品已上亦有仗身職員隆昌之際非卿無有今日今一門二州兄弟三封諶為南徐州誕為司州所謂二州也諶封衡陽郡公誄封西昌侯誕封安復侯所謂三封也數所具翻止可極此卿恆懷怨望恆戶登翻乃云炊飯已熟合甑與人邪今賜卿死遂殺之並其弟誄以黃門郎蕭衍為司州別駕往執誕殺之諶好術數吳興沈文猷常語之曰君相不減高帝好呼到翻語牛倨翻相息亮翻相貌也諶死文猷亦伏誅諶死之日上又殺西陽王子明南海王子罕邵陵王子貞三王皆武帝子也乙丑以右衛將軍蕭坦之為領軍將軍魏高閭上言鄴城密皇后廟頽圮請更葺治若謂已配饗太廟即宜罷毀詔罷之密皇后世祖母杜皇后也后鄴人神䴥三年立廟于鄴高閭為相州刺史相州治鄴故上言之圮部鄙翻毀也治直之翻魏拓跋英之寇漢中也沮水氐楊馥之為齊擊武興氐楊集始破之按漢志武都郡沮縣有東狼谷沮水所出也水在廣業郡界唐鳳州同谷縣魏之廣業郡地也氐居沮水上因以為種落之名沮子余翻為于僞翻七月辛卯以馥之為北秦州刺史蕭子顯曰永明郡國志秦州寄治漢中南鄭不曰南北元嘉計偕亦曰秦州而荊州刺史嘗督二秦梁是則志所載秦州為南秦氐為北秦然是時秦州所領諸郡皆僑郡與荒郡也八月乙巳魏選武勇之士十五萬人為羽林虎賁以充宿衛為後虎賁羽林作亂殺張彞父子張本賁音奔魏金墉宮成立國子太學四門小學於洛陽四門學始此魏高祖遊華林園觀故景陽山華林園及景陽山皆魏明帝所築山水者仁智之所樂論語孔子曰仁者樂山智者樂水故郭祚引以為言樂魚教翻復扶又翻帝曰魏明帝以奢失之於前朕豈可襲之於後乎帝好讀書手不釋卷在輿據鞍不忘講道善屬文好呼到翻下好賢同屬之欲翻多於馬上口占既成不更一字更工衡翻自太和十年以後詔策皆自為之好賢樂善情如飢渴所與遊接常寄以布素之意樂音洛言寄以布衣雅素相與之意如李沖李彪高閭王肅郭祚宋辨劉芳崔光邢巒之徒皆以文雅見親貴顯用事制禮作樂鬱然可觀有太平之風焉史言魏高祖能以文治治書侍御史薛聰辨之曾孫也薛辨見一百二十四卷宋文帝元嘉二十一年治直之翻彈徒丹翻劾戶概翻又戶得翻帝或欲寬貸者聰輒爭之帝每曰朕見薛聰不能不憚何況諸人也自是貴戚斂手纍遷直閣將軍兼給事黃門侍郎散騎常侍散悉亶翻騎奇寄翻帝外以德器遇之內以心膂為寄親衛禁兵悉聰管領故終太和之世恆帶直閣將軍㣥臣罷朝之後聰恆陪侍帷幄言兼晝夜時政得失動輒匡諫事多聽允而重厚沈密恆戶登翻朝直遙翻沈持林翻外莫窺其際帝欲進以名位輒苦讓不受帝亦雅相體悉謂之曰卿天爵自高固非人爵所能榮也孟子曰公卿大夫此人爵也仁義忠信此天爵也九月庚午魏六宮文武悉遷于洛陽六宮后夫人嬪御也文武內外文武百官也丙戌魏主如鄴屢至相州刺史高閭之館館謂刺史官舍相息亮翻治直吏翻賞賜甚厚閭數請本州數所角翻詔曰閭以懸車之年方求衣錦漢薛廣漢致仕懸其安車以示子孫古人有言富貴不歸故鄉如衣錦夜行衣於既翻有塵謙德可降號平北將軍朝之老成宜遂情願徙授幽州刺史高閭漁陽雍奴人幽州統內也朝直遙翻恩法並舉從所請以勸善示恩降號以存法戒之曰作牧亦易亦難其身正不令而行所以易其身不正雖令不從所以難用孔子之言而發難易之論易以豉翻己丑徙南平王寶攸為邵陵王蜀郡王子文為西陽王廣漢王子峻為衡陽王臨海王昭秀為巴陵王永嘉王昭粲為桂陽王寶攸皇子餘皆高武子孫乙未魏主自鄴還還洛陽十月丙辰至洛陽壬戌魏詔諸州精品屬官考其得失為三等以聞又詔徐兗光南青荊洛六州嚴纂戎備應須赴集魏徐州領彭城南陽平沛蘭陵北濟陰等郡兗州領泰山魯高平任城東平東陽平等郡光州治掖城皇興四年分青州置領東萊長廣東牟等郡南青州即東徐州魏主更名領東安東莞郡魏先置荊州於上洛領上洛上庸魏興等郡太和十一年改為洛州置荊州於穰城領南陽順陽新野襄城等郡詔纂戎備將復南伐也十一月丁卯詔罷世宗東田毀興光樓東田見武帝紀興光樓蓋亦文惠太子所建己卯納太子褚氏大赦澄之女也褚澄見一百三十三卷宋蒼梧王元徽二年庚午魏主如委粟山定圜丘己卯帝引諸儒議圜丘禮祕書令李彪建言魯人將有事于上帝必先有事于泮宮記禮器之言鄭玄注曰泮宮郊學也從之甲申魏主祀圜丘大章十二行本大上有丙戌二字乙十一行本同孔本同張校同赦十二月乙未朔魏主見㣥臣於光極堂宣下品令為大選之始下遐稼翻品令九品之令也大選者謂將大選㣥臣也光祿勳于烈子登引例求遷官烈上表曰方今聖明之朝理應廉讓而臣子登引人求進引人謂引他人之例也朝直遙翻乞行黜落黜落謂黜官落職也此乃有識之言不謂烈能辦此乃引見登謂曰朕將流化天下以卿父有謙遜之美直士之風故進卿為太子翊軍校尉又加烈散騎常侍封聊城縣子校戶教翻散悉亶翻騎奇寄翻魏主謂㣥臣曰國家從來有一事可歎臣下莫肯公言得失是也夫人君患不能納諫人臣患不能盡忠自今朕舉一人如有不可卿等直言其失若有才能而朕所不識卿等亦當舉之如是得人者有賞不言者有罪卿等當知之以魏孝文之求諫求才如此而一時之臣猶未能稱上意豈非朝廷之議帝務騁辭氣以加之故有有懷而不敢盡者丁酉詔修晉帝諸陵增置守衛此晉帝諸陵謂在江南者甲子魏主引見㣥臣於光極堂頒賜冠服賜冠服以易胡服先是魏人未嘗用錢先悉薦翻魏主始命鑄太和五銖是歲鼓鑄粗備粗坐五翻詔公私用之魏以光城蠻帥田益光嚴光改宗為南司州刺史帥所類翻所統守宰聽其銓置後更於新蔡立東豫州以益光為刺史據北史益光當作益宗魏以益宗既渡淮北不可仍為司州乃於新蔡立東豫州又按五代志及水經注新蔡當作新息氐王楊炅卒炅古迥翻又古惠翻三年丙子四九六春春正月丁卯以楊炅子崇祖為沙州刺史封陰平王考異曰齊本紀作丁酉按長曆是月乙丑朔無丁酉下有己巳當作丁卯春魏主下詔以為北人謂土為拓后為跋魏之先出於黃帝以土德王王于況翻故為拓跋氏夫土者黃中之色萬物之元也宜改姓元氏諸功臣舊族自代來者姓或重復皆改之重直龍翻於是始改拔拔氏為長孫氏達奚氏為奚氏乙旃氏為叔孫氏丘穆陵氏為穆氏步六孤氏為陸氏賀賴氏為賀氏獨孤氏為劉氏賀樓氏為樓氏勿忸于氏為于氏尉遲氏為尉氏其餘所改不可勝紀如長孫嵩奚斤叔孫建穆崇于栗磾之類史皆因其後改姓從簡便而書之非其舊也其餘北人諸姓改從後姓注已略見於前蓋其所改後姓有與華人舊姓相犯者也忸女九翻又女六翻考異曰魏初功臣姓皆復重奇僻孝文太和中變胡俗始改之魏收作魏書已盡用新姓不用舊姓宋書索虜傳南齊書魏虜傳所稱者蓋其舊姓名耳今並從魏書以就簡易魏主雅重門族以范陽盧敏清河崔宗伯滎陽鄭羲太原王瓊四姓衣冠所推咸納其女以充後宮隴西李沖以才識見任當朝貴重所結姻㜕莫非清望朝直遙翻㜕音連史記南越傳呂嘉宗室兄弟及蒼梧秦王有連漢書音義曰連親婚也史記索隱曰有連者皆親姻也後人因以姻連之連其旁加女遂為㜕字帝亦以其女為夫人詔黃門郎司徒左長史宋辨定諸州士族多所升降又詔以代人先無姓族雖功賢之胤無異寒賤故宦達者位極公卿其功衰之親仍居猥任功衰自小功大功以上至齊衰也猥卑下也衰倉回翻猥烏賄翻鄙也嵇恐當作奚今按魏書官氏志自有嵇姓嵇敬之嵇是也尉紆勿翻勳著當世位盡王公灼然可知者且下司州吏部勿充猥官一同四姓四姓盧崔鄭王也下戶嫁翻應班士流者尋續別敕其舊為部落大人而皇始已來三世官在給事已上及品登王公者為姓若本非大人而皇始已來三世官在尚書已上及品登王公者亦為姓其大人之後而官不顯者為族若本非大人而官顯者亦為族凡此姓族皆應審核勿容僞冒核戶革翻令司空穆亮尚書陸琇等詳定務令平允琇馛之子也魏孝文受內禪陸馛傅之故其子皆通顯琇音秀馛蒲撥翻魏舊制王國舍人皆應娶八族及清修之門王國舍人舍謂諸王嬪之舍其人即嬪也八族即前自代來八姓隸戶謂沒入為奴隸之戶因下詔為六弟聘室為于僞翻前者所納可為妾媵媵以證翻咸陽王禧可聘故潁川太守隴西李輔女河南王幹可聘故中散大夫代郡穆明樂女太和十八年河南王幹已徙封趙郡王史蓋以舊封書之散悉亶翻可聘驃騎咨議參軍滎陽鄭平城女驃匹妙翻騎奇寄翻潁川王雍可聘故中書博士范陽盧神寶女潁川王雍亦以太和十八年徙封高陽史以舊封書之可聘廷尉卿隴西李沖女協音協北海王詳可聘吏部郎中滎陽鄭懿女魏定氏族固亦未能盡允清議至令詔諸王改納室則大悖於人倫夫妻者齊也一與之齊終身不改富而易妻人士猶或羞之況天子之弟乎此詔一出天下何觀羲之子也宋泰始之初鄭羲從拓跋石平汝潁時趙郡諸李人物尤多各盛家風故世之言高華者以五姓為首盧崔鄭王並李為五姓趙郡諸李北人謂之趙李李靈李順李孝伯㣥從子姪皆趙李也衆議以薛氏為河東茂族帝曰薛氏蜀也豈可入郡姓直閣薛宗起執戟在殿下出次對曰臣之先人漢末仕蜀二世復歸河東今六世相襲非蜀人也伏以陛下黃帝之胤受封北土豈可亦謂之胡邪今不預郡姓何以生為乃碎戟於地帝徐曰然則朕甲卿乙乎乃入郡姓仍曰卿非宗起乃起宗也郡姓者郡之大姓著姓也今百氏郡望蓋始於此考異曰北史薛聰傳為羽林監帝曾與朝臣論海內姓地人物戲謂聰曰人謂卿諸薛是蜀人定是蜀人不聰對曰臣遠祖廣德世事漢朝時人呼為漢臣九世祖永隨劉備入蜀時人呼為蜀臣今事陛下是虜非蜀也帝撫掌笑曰卿可自明非蜀何乃遂復苦朕聰因投戟而出帝曰薛監醉耳其見知如此今從元行沖後魏國典帝與㣥臣論選調選須絹翻調徒弔翻曰近世高卑出身各有常分分扶問翻此果如何李沖對曰未審上古以來張官列位為膏粱子弟乎為致治乎為于僞翻治直吏翻帝曰欲為治耳沖曰然則陛下章十二行本下下有今日二字乙十一行本同孔本同何為專取門品不拔才能乎帝曰苟有過人之才不患不知然君子之門借使無當世之用要自德行純篤朕故用之沖曰傅說呂望豈可以門地得之謂傅說起於版築呂望起於屠釣也行下孟翻說讀曰悅非常之人曠世乃有一二耳祕書令李彪曰陛下若專取門地不審魯之三卿孰若四科魯三卿季孫孟孫叔孫氏也孔門四科德行言語政事文學也陛下豈可以貴襲貴以賤襲賤帝曰必有高明卓然出類拔萃者朕亦不拘此制頃之劉昶入朝劉昶自彭城入朝朝直遙翻或言唯能是寄不必拘門朕以為不爾何者清濁同流混齊一等君子小人名器無別別彼列翻此殊為不可我今八族以上士人品第有九九品之外小人之官復有七等後之流內銓流外銓蓋分於此復扶又翻可起家為三公正恐賢才難得不可止為一人渾我典制也為于僞翻渾胡本翻臣光曰選舉之法先門地而後賢才先後皆去聲而歷代相因莫之能改也夫君子小人不在於世祿與側微書序虞舜側微孔穎達疏曰不在朝庭謂之側其人貧賤謂之微愚智所同知也當是之時雖魏孝文之賢猶不免斯蔽故夫明辨是非而不惑於世俗者誠鮮矣鮮息淺翻春壬辰魏徙始平王協為彭城王復定襄縣王鸞為城陽王鸞以赭陽之敗降封今復之協音協春二月壬寅魏詔㣥臣自非金革聽終三年喪春丙午魏詔畿內七十已上暮春赴京師行養老之禮三月丙寅宴㣥臣及國老庶老於華林園詔國老黃耇已上假中散大夫郡守耆年已上假給事中縣令庶老直假郡縣各賜鳩杖衣裳熊氏曰國老謂卿大夫致仕者庶老謂士也皇氏曰庶老兼庶人在官者毛萇曰黃黃髮也耇老艾也陸德明曰耆至也言至老境也漢儀仲秋之月縣道皆按戶比民年始七十者授以玉杖餔之糜粥八十者禮有加賜玉杖長九尺端以鳩鳥為飾鳩者不噎之鳥也欲老人不噎耇音苟郡縣之下當有逸字春丁丑魏詔諸州中正各舉其鄉之民望年五十以上守素衡門者授以令長毛萇曰衡門橫木為門言淺陋也長知兩翻春壬午詔乘輿有金銀飾校者皆剔除之乘繩證翻校戶教翻校欄格也飾其校飾其欄格也又居效翻義與鉸同以金飾器謂之鉸春上志慕節儉太官嘗進裹蒸上曰我食此不盡可四破之餘充晚食今之裹蒸以糖和糯米入香藥松子胡桃仁等物以竹籜裹而蒸之大才二指許不勞四破也以餘濼授左右曰此可更用皂莢木極高大莢形如豬牙去垢膩洗沐多用之濼郎狄翻更居孟翻再也有銀酒鎗上欲壞之太平御覽云鎗即鐺字壞音怪下同衛尉蕭穎胄曰朝廷盛禮莫若三元玉燭寶典曰正月為端月其一日為上日亦云三元謂歲之元月之元時之元也不足為侈上不悅後預曲宴銀器滿席內宴於宮中謂之曲宴陛下前欲壞酒鎗恐宜移在此器上甚慚上躬親細務綱目亦密於是郡縣及六署九府常行職事莫不啓聞取決詔敕按蕭子顯齊志六署者尚書左右僕射左右丞所通署除署功論封爵貶黜八議疑讞六案也九府太常光祿勳衛尉廷尉大司農少府將作大匠太僕大鴻臚九卿府也皆不歸選部選須絹翻親戚憑藉互相通進人君之務過繁密南康王侍郎潁川鍾嶸上書言古者明君揆才頒政量能授職三公坐而論道九卿作而成務嶸乎萌翻古者三公論道六卿分職周官考工記坐而論道謂之三公作而行之謂之士大夫注云親受其職居其官也天子唯恭己南面而已書奏上不懌謂太中大夫顧皓曰鍾嶸何人欲斷朕機務卿識之不皓古老翻斷音短不讀曰否對曰嶸雖位末名卑而所言或有可采且繁碎職事各有司存今人主總而親之是人主愈勞而人臣愈逸所謂代庖人宰而為大匠斫也上不顧而言他齊明帝以吏事權詐得國猜防㣥下故親攬機務王莽之親御燈火其計慮亦如此耳為于僞翻春夏四月甲辰魏廣州刺史薛法護求降以蕭子顯齊書考之廣州不在太和十年分置三十八州之數魏收地形志永安中置廣州治魯陽意此時廣州亦當置於魯陽也降戶江翻春魏寇司州櫟城戍主魏僧珉拒破之櫟城即左傳吳伐楚入棘櫟麻之櫟杜預注曰汝陰新蔡縣東北有櫟亭春五月丙戌魏營方澤於河陰又詔漢魏晉諸帝陵百步內禁樵蘇此諸陵皆謂在河南者丁亥魏主有事於方澤春秋七月魏廢皇后馮氏初文明太后欲其家貴重簡馮熙二女入掖庭其一早卒其一得幸於魏主未幾有疾還家為尼及太后殂帝立熙少女為皇后幾居豈翻少詩照翻既而其姊疾愈帝思之復迎入宮拜左昭儀后寵浸衰昭儀自以年長且先入宮不率妾禮復扶又翻長丁丈翻今知兩翻率循也后頗愧恨昭儀因譖而廢之為後昭儀為后及不終張本遂居瑤光寺為練行尼練行謂修練戒行也瑤光寺在洛陽宮側行下孟翻春魏主以久旱自癸未不食至于乙酉㣥臣皆詣中書省請見帝在崇虛樓武帝永明九年魏移道壇於桑乾之陰改曰崇虛寺此蓋遷洛後建崇虛樓於禁中齊戒則居之見賢遍翻且問來故舍人即中書舍人問其所以來請見之故今四郊雨已霑洽獨京城微少細民未乏一餐而陛下輟膳三日臣下惶惶無復情地少詩沼翻復扶又翻帝使舍人應之曰朕不食數日猶無所感比來中外貴賤皆言四郊有雨比毗至翻朕疑其欲相寬勉未必有實方將遣使視之使疏吏翻果如所言即當進膳如其不然朕何以生為當以身為萬民塞咎耳塞悉則翻是夕大雨春魏太子恂不好學體素肥大苦河南地熱常思北歸魏主賜之衣冠恂常私著胡服好呼到翻著陟略翻中庶子遼東高道悅數切諫恂惡之數所角翻惡烏路翻八月戊戌帝如嵩高恂與左右密謀召牧馬輕騎奔平城手刃道悅於禁中中章十二行本無中字乙十一行本同退齊校同張校云無注本脫一中字熊校云北史無中字領軍元儼勒門防遏嚴勒門衛以防遏其變騎奇寄翻詰旦尚書陸琇馳以啓帝詰去吉翻琇音秀帝大駭祕其事仍至汴口而還汴口汴水與河通之口至此而後還以安人心還從宣翻甲寅入宮引見恂數其罪親與咸陽王禧更代杖之百餘下見賢遍翻數所具翻更工衡翻扶曳出外囚於城西月餘乃能起春丁巳魏相州刺史南安惠王楨卒相息亮翻諡法柔質愛民曰惠愛民好與曰惠春九月戊辰魏主講武於小平津癸酉還宮春冬十月戊戌魏詔軍士自代來者皆以為羽林虎賁賁音奔司州民十二夫調一吏以供公私力役此時魏以洛為司州調徒弔翻春魏吐京胡反魏世祖太平真君九年置吐京郡水經注曰吐京即漢西河郡土軍縣夷夏俗音訛也帥並肆之衆以討之太和十二年置汾州治蒲子縣西河吐京定陽北鄉正平五城中陽絳郡皆屬焉並州領太原上黨樂平鄉郡太平真君七年置肆州領新興秀容鴈門郡帥讀曰率下同楨之子也彬遣統軍奚康生擊叛胡破之追至車突谷又破之五代史志離石郡太和縣後周置烏突郡烏突縣蓋因車突谷而名之也畜許救翻詔以彬為汾州刺史胡去居等六百餘人保險不服彬請兵二萬以討之有司奏許之魏主大怒曰小寇何有發兵之理可隨宜討治治直之翻若不能克必須大兵者則先斬刺史然後發兵彬大懼督帥州兵身先將士身先悉薦翻討去居平之春魏主引見㣥臣於清徽堂見賢遍翻議廢太子恂太子太傅穆亮少保李沖免冠頓首謝帝曰卿所謝者私也我所議者國也大義滅親古人所貴左傳以是語美石碏跨據恆朔魏太祖天興中置司州治代都平城太和都洛改為恆州杜佑曰魏恆州在唐代郡安邊馬邑縣界朔朔州也宋白曰後魏都平城置司州及代尹及遷洛陽置司州於洛以平城為恆州隋雲中郡恆安鎮即其地後魏懷朔鎮孝文遷洛於定襄故城置朔州在唐朔州北三百八十里恆戶登翻下同若不去之去羌呂翻乃社稷之憂也閏月丙寅廢恂為庶人考異曰齊書魏虜傳云大馮有寵日夜讒恂魏書無之又魏帝紀在十二月丙寅按長曆魏閏十一月齊閏十二月今從齊曆水經湨水出河內軹縣原山南流注于河水東有無辟邑謂之無鼻城蕭子顯曰在河橋北二里服食所供粗免飢寒而已粗坐五翻春戊辰魏置常平倉春戊寅太子寶卷冠卷讀曰捲冠古玩翻春初魏文明太后欲廢魏主穆泰切諫而止見一百三十七卷世祖永明八年及帝南遷洛陽所親任者多中州儒士宗室及代人往往不樂樂音洛泰自尚書右僕射出為定州刺史自陳久病土溫張溫作濕則甚乞為恆州帝為之徙恆州刺史陸睿為定州以泰代之為于僞翻下強為同泰至睿未發遂相與謀作亂陰結鎮北大將軍樂陵王思譽安樂侯隆撫冥鎮將魯郡侯業驍騎將軍超等共推朔州刺史陽平王頤為主思譽天賜之子汝陰王天賜景穆太子之子於魏主為叔祖樂音洛將即亮翻驍堅堯翻騎奇寄翻丕之弟隆超皆丕之子也睿以為洛陽休明左傳楚子伐陸渾之戎遂至于洛觀兵于周疆定王使王孫滿勞楚子楚子問鼎之大小輕重焉王孫滿曰德之休明雖小重也其姦回昏亂雖大輕也天祚明德有所底止周德雖衰天命未改鼎之輕重未可問也泰由是未發頤僞許泰等以安其意而密以狀聞行吏部尚書任城王澄有疾行吏部尚書者行吏部尚書事未為真也任音壬見賢遍翻謂之曰穆泰謀為不軌扇誘宗室誘音酉脫或必然今遷都甫爾北人戀舊南北紛擾朕洛陽不立也此國家大事非卿不能辦卿雖疾強為我北行強其兩翻為于僞翻審觀其勢儻其微弱直往擒之若已強盛可承制發並肆兵擊之對曰泰等愚惑正由戀舊為此計耳非有深謀遠慮臣雖駑怯足以制之駑音奴願陛下勿憂雖有犬馬之疾何敢辭也帝笑曰任城肯行朕復何憂復扶又翻下正復同遂授澄節銅虎竹使符御仗左右漢文帝二年初與郡守為銅虎符竹使符應劭曰銅虎符第一至第五國家當發兵遣使者至郡合符符合乃聽受之竹使符皆以竹箭五枚長五寸鐫刻篆書第一至第五魏晉以下竹使符第一至第十御仗左右帶御仗在天子左右者授澄以為衛使疏吏翻行至鴈門鴈門太守夜告云泰已引兵西就陽平陽平王頤刺朔州在平城西宋白曰朔州東北至平城二百六十里右丞孟斌曰事未可量宜依敕召並肆兵然後徐進澄曰泰既謀亂應據堅城而更迎陽平度其所為當似勢弱斌音彬量音良度徒洛翻泰既不相拒無故發兵非宜也但速往鎮之民心自定遂倍道兼行先遣治書侍御史李煥單騎入代漢宣帝幸宣室齊居而決事令侍御史二人治書侍側後因別置謂之治書侍御史魏謂平城為代都治直之翻騎奇寄翻曉諭泰黨示以禍福皆莫為之用泰計無所出帥麾下數百人攻煥不克帥讀曰率走出城西追擒之澄亦尋至尋繼也收陸睿等百餘人皆繫獄民間帖然澄具狀表聞帝喜召公卿以表示之曰任城可謂社稷臣也觀其獄辭正復皋陶何以過之陶餘招翻顧謂咸陽王禧等曰汝曹當此不能辦也春魏主謀入寇引見公卿於清徽堂曰朕卜宅土中綱條粗舉書說命曰若網在綱有條而不紊見賢遍翻粗坐五翻安能效近世天子下帷於深宮之中乎朕今南征決矣但未知早晚之期比來術者皆云今往必克比毗至翻此國之大事宜君臣各盡所見勿以朕先言而依違於前同異於後也李沖對曰凡用兵之法宜先論人事後察天道今卜筮雖吉而人事未備遷都尚新秋穀不稔未可以興師旅如臣所見宜俟來秋帝曰去十七年朕擁兵二十萬齊世祖永明十一年魏高祖之太和十七年也魏定遷洛之議而止南伐之師至去年方入寇蓋十九年也二十萬亦當作三十萬事並見上年去猶昨也又按當時衆號三十萬實則二十萬耳而天時不利今天時既從復云人事未備復扶又翻如僕射之言是終無征伐之期也寇戎咫尺異日將為社稷之憂朕何敢自安若秋行不捷諸君當盡付司寇不可不盡懷也魏既都洛逼近淮漢故急於南伐以攘斥境土春魏主以有罪徙邊者多逋亡乃制一人逋亡闔門充役光州刺史博陵崔挺上書諫曰天下善人少惡人多少詩沼翻若一人有罪延及闔門則司馬牛受桓魋之罰柳下惠嬰盜跖之誅司馬牛之於桓魋柳下惠之於盜跖皆兄弟賢不肖既相遠而兄弟罪不相及古法也魋徒回翻跖之石翻帝善之遂除其制聶崇岐標點王崇武覆校
