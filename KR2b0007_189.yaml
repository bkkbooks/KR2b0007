body:
  text: 資治通鑑卷第一百八十九端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀五高祖神堯大聖光孝皇帝中之中武德四年武德四年辛巳六二一武德四年三月庚申以靺鞨渠帥突地稽為燕州總管靺鞨有七種粟末靺鞨居最南本附高麗隋煬帝初其渠帥突地稽率其部來降居之柳城新志曰隋於營州之境汝羅故城置遼西郡以處靺鞨降人武德元年曰燕州突地稽隋書作度地稽帥所類翻靺音末鞨音曷燕因肩翻武德四年太子建成獲稽胡千餘人釋其酋帥數十人酋才由翻帥所類翻授以官爵使還招其餘黨劉仚成亦降仚許延翻降戶江翻下同建成詐稱增置州縣築城邑命降胡年二十以上皆集以兵圍而殺之死者六千餘人考異曰實録前言四千餘戶後云六千餘計蓋前言戶後言口也亡奔梁師都武德四年行軍總管劉世讓攻竇建德黃州拔之黃州闕世讓不得進會突厥將入寇上召世讓還竇建德所署普樂令平恩程名振來降上遙除名振永寧令新志平恩縣屬洺州又所領雞澤縣有普樂縣竇建德平後廢入雞澤永寧縣屬洛州本熊耳義寧二年更名時屬熊州按舊書除名振永年令此承新書之誤永年漢廣平縣也隋仁壽元年改曰永年帶洺州舊志曰永年本漢曲梁縣地杜佑曰洺州春秋赤狄之地洺彌並翻厥九勿翻還從宣翻又音如字樂音洛名振夜襲鄴舊志鄴縣屬相州後魏於鄴置相州周末尉遲迥既平乃焚鄴以安陽為相州理所煬帝復於鄴故都大慈寺置鄴縣將即亮翻去鄴八十里閲婦人乳有湩者九十餘人悉縱遣之鄴人感其仁為之飯僧湩竹用翻乳汁為于僞翻飯扶晚翻武德四年突厥頡利可汗承父兄之資頡利者啓民之子始畢處羅之弟厥九勿翻可從刊入聲汗音寒有憑陵中國之志妻隋義成公主公主從弟善經從才用翻避亂在突厥與王世充使者王文素共說頡利曰使疏吏翻下同說式芮翻昔啓民為兄弟所逼脫身奔隋賴文皇帝之力有此土宇事見隋文帝紀今唐天子非文皇帝子孫可汗宜奉楊政道以伐之楊政道時居定襄頡利然之上以中國未寧待突厥甚厚而頡利求請無厭厭於鹽翻言辭驕慢甲戌突厥寇汾陰汾陰縣本屬蒲州時為泰州治所武德四年唐兵圍洛陽掘塹築壘而守之塹七豔翻城中乏食絹一匹直粟三升布十匹直鹽一升服飾珍玩賤如土芥民食草根木葉皆盡相與澄取浮泥投米屑作餅食之皆病身腫腳弱死者相枕倚於道枕職任翻皇泰主之遷民入宮城也見一百八十三卷隋義寧元年四月至是無三千家雖貴為公卿糠核不充孟康曰核麥糠中不破者也晉灼曰核音紇京師人謂粗屑為紇頭親自負戴負以肩背戴以首竇建德使其將范願守曹州將即亮翻下同悉發孟海公徐圓朗之衆西救洛陽至滑州王世充行臺僕射韓洪開門納之己卯軍于酸棗酸棗縣隋屬鄭州此時屬東梁州武德四年壬午突厥寇石州石州隋之離石郡武德四年竇建德陷管州殺刺史郭士安又陷滎陽陽翟等縣滎陽縣屬鄭州陽翟縣隋屬汝州時屬嵩州泛舟運糧泝河西上上時掌翻王世充之弟徐州行臺世辨徐州隋之彭城郡將即亮翻合十餘萬號三十萬軍於成皋之東原築宮板渚成皋即虎牢東原即東廣武水經河水過成皋而東合汜水又東徑板城北注云有津謂之板城渚口先是建德遺秦王世民書使疏吏翻先悉薦翻遺于僞翻請退軍潼關返鄭侵地復修前好好呼到翻世民集將佐議之將即亮翻皆請避其鋒郭孝恪曰世充窮蹙垂將面縛建德遠來助之此天意欲兩亡之也宜據武牢之險以拒之唐諱虎改虎牢為武牢破之必矣間古莧翻記室薛收曰世充保據東都府庫充實所將之兵皆江淮精鋭即日之患但乏糧食耳以是之故為我所持求戰不得守則難久建德親帥大衆遠來赴援帥讀曰率亦當極其精鋭若章十二行本若上有致死於我四字乙十一行本同孔本同張校同退齊校同縱之至此兩寇合從從子容翻轉河北之粟以饋洛陽則戰爭方始偃兵無日混一之期殊未有涯也今宜分兵守洛陽深溝高壘世充出兵慎勿與戰大王親帥驍鋭先據成皋帥讀曰率驍堅堯翻厲兵訓士以待其至以逸待勞決可克也建德既破世充自下不過二旬兩主就縛矣世民善之收道衡之子也薛道衡為隋煬帝所殺隋之伐陳道衡知其必克收之識時審勢蓋有父風吾兵疲老世充憑守堅城未易猝拔瑀音禹屈居勿翻易以豉翻下同建德席勝而來鋒鋭氣盛吾腹背受敵非完策也不若退保新安以承其弊世民曰世充兵摧食盡上下離心不煩力攻可以坐克建德新破海公將驕卒惰吾據武牢扼其咽喉將即亮翻下同咽音煙彼若冒險爭鋒吾取之甚易易弋豉翻若狐疑不戰旬月之間世充自潰城破兵強氣勢自倍一舉兩克在此行矣若不速進賊入武牢諸城新附必不能守兩賊人併力其勢必強何弊之承吾計決矣通等又請解圍據險以觀其變世民不許中分麾下使通等副齊王元吉圍守東都世民將驍勇三千五百人東趣武牢驍堅堯翻趣七喻翻又逡須翻時正晝出兵歷北邙抵河陽趨鞏而去鞏在東都之東一百一十里時世民大軍據都城西北以臨世充而圍之故出兵向武牢歷北邙抵河陽而趨鞏趨與趣同音七喻翻莫之測也竟不敢出癸未世民入武牢甲申將驍騎五百出武牢東二十餘里覘建德之營覘丑廉翻又丑豔翻緣道分留從騎從才用翻下同使李世績程知節秦叔寶分將之伏於道旁才餘四騎與之偕進世民謂尉遲敬德曰騎奇寄翻尉紆勿翻吾執弓矢公執槊相隨槊色角翻雖百萬衆若我何又曰賊見我而還上策也還從宣翻去建德營三里所建德遊兵遇之以為斥候也世民大呼曰我秦王也引弓射之呼火故翻射而亦翻下同斃其一將將即亮翻建德軍中大驚出五六千騎逐之從者咸失色從才用翻世民曰汝弟前行吾自與敬德為殿弟大計翻但也漢書多用此弟字可考也殿丁練翻於是按轡徐行追騎將至則引弓射之輒斃一人追者懼而止止而復來復扶又翻下同如是再三每來必有斃者世民前後射殺數人敬德殺十許人追者不敢復逼世民逡巡稍卻以誘之逡七荀翻誘音酉下同入於伏內世績等奮擊大破之斬首三百餘級獲其驍將殷秋石瓚以歸瓚藏旱翻乃為書報建德諭以趙魏之地久為我有為足下所侵奪但以淮安見禮公主得歸故相與坦懷釋怨武德二年竇建德盡取趙魏虜淮安王神通及同安公主待淮安以客禮次年八月遣公主歸已嘗反覆武德二年王竇結好世充篡建德絶之尋有疆埸之爭好呼到翻更飾辭相誘足下乃以三軍之衆仰哺他人千金之資坐供外費兵法曰興師十萬日費千金今前茅相遇彼遽崩摧左傳隨武子曰前茅慮無杜預注云軍行前有斥候踏伏茅明也備慮有無也或曰以茅為旌識能無懷愧古者諸侯相見有郊勞之禮言建德來救世充阻於唐兵使命不得通也勞力到翻冀聞擇善欲使之擇善而從恐雖悔難追武德四年立秦王世民之子泰為衛王武德四年夏四月己丑豐州總管張長遜入朝時言事者多云長遜久居豐州張長遜隋末守豐州唐興來降至是入朝豐州至長安二千六百六里朝直遙翻下同非國家之利厥九勿翻長遜聞之請入朝上許之會太子建成北伐稽胡長遜帥所部會之因入朝拜右武候將軍帥讀曰率下同益州行臺左僕射竇軌帥巴蜀兵來會秦王擊王世充以長遜檢校益州行臺右僕射武德四年己亥突厥頡利可汗寇鴈門李大恩擊走之可從刊入聲汗音寒武德四年壬寅王世充騎將楊公卿單雄信引兵出戰騎奇寄翻將即亮翻單音善齊王元吉擊之不利行軍總管盧君諤戰死武德四年太子還長安武德四年王世充平州刺史周仲隱以城來降洛州河陰縣古平陰也王世充當於此置平州降戶江翻武德四年戊申突厥寇並州初處羅可汗與劉武周相表裏寇並州上遣太常卿鄭元璹往諭以禍福處羅不從未幾處羅遇疾卒處昌呂翻璹殊玉翻幾居豈翻卒子恤翻考異曰舊書鄭元璹傳作叱羅可汗今從實録國人疑元璹毒之留不遣上又遣漢陽公王褱賂頡利可汗以金帛頡利欲令王褱拜王褱不從亦留之王褱古回翻又留左驍衛大將軍長孫順德驍堅堯翻長知兩翻上怒亦留其使者王褱孝恭之弟也孝恭時鎮夔州武德四年甲寅封皇子元方為周王元禮為鄭王元嘉為宋王元則為荊王元茂為越王武德四年竇建德迫於武牢不得進留屯纍月考異曰舊書停留七十餘日新書六十餘日按二月戊午沈悅始以武牢降唐至五月己未建德敗才六十二日若沈悅今日降唐明日建德即至亦不能自固又吳兢太宗勳史三月己卯建德率兵十二萬次于酸棗去敗才四十一日故但云留屯纍月數所角翻將士思歸丁巳秦王世民遣王君廓將輕騎千餘抄其糧運抄楚交翻又破之獲其大將軍張青特凌敬言於建德曰大王悉兵濟河攻取懷州河陽使重將守之更鳴鼓建旗踰太行入上黨行戶剛翻徇汾晉趣蒲津趣七喻翻如此有三利一則蹈無人之境取勝可以萬全二則拓地收衆形勢益強三則關中震駭鄭圍自解為今之策無以易此凌敬之策善矣當是時洛城危急秦王定計而堅守之蓋計日而收功吾恐建德未得至蒲州洛城已破矣而王世充遣使告急相繼於道王琬長孫安世朝夕涕泣請救洛陽使疏吏翻長知兩翻又陰以金玉啖建德諸將以撓其謀啖徒濫翻將即亮翻撓奴巧翻又奴教翻諸將皆曰凌敬書生安知戰事其言豈可用也建德乃謝敬曰今衆心甚鋭天贊我也因之決戰必將大捷不得從公言敬固爭之建德怒令扶出令力丁翻其妻曹氏謂建德曰祭酒之言不可違也凌敬蓋為建德國子祭酒連營漸進以取山北建德都洺州時在山南並代汾晉皆山北也滏音釜唐必還師自救厥九勿翻抄楚交翻還從宣翻又音如字鄭圍何憂不解若頓兵於此老師費財欲求成功在於何日建德曰此非女子所知吾來救鄭鄭今倒懸亡在朝夕吾乃捨之而去是畏敵而棄信也不可諜者告曰建德伺唐軍芻盡牧馬於河北將襲武牢諜達協翻伺相吏翻五月戊午秦王世民北濟河南臨廣武此西廣武也因留馬千餘匹牧於河渚以誘之誘音酉夕還武牢己未建德果悉衆而至此所謂善戰者因其勢而利導之也北距大河西薄汜水南屬鵲山水經注汜水南出浮戲山亦謂之方山北徑虎牢城東又北流注于河陳讀曰陳下同汜音祀屬之欲翻鼓行而進諸將皆懼將即亮翻懼其衆也世民將數騎升高丘而望之將音如字領也騎奇寄翻謂諸將曰賊起山東未嘗見大敵今度險而囂囂虛驕翻喧也是無紀律逼城而陳有輕我心我按甲不出彼勇氣自衰陳久卒飢勢將自退所謂以計稽之也無不克者與公等約甫過日中必破之矣甫始也才也遣三百騎涉汜水距唐營一里所止遣使與世民相聞曰請選鋭士數百與之劇汜音祀使疏吏翻劇戲也今俗謂戲為則劇世民遣王君廓將長槊二百以應之槊色角翻相與交戰乍進乍退兩無勝負各引還還從宣翻又音如字王琬乘隋煬帝驄馬煬余尚翻馬青白曰驄鎧仗甚鮮迥出陳前以誇衆鎧可亥翻迥戶頂翻陳讀曰陳世民曰彼所乘真良馬也尉遲敬德請往取之世民止之曰豈可以一馬喪猛士尉紆勿翻喪息浪翻敬德不從與高甑生梁建方三騎直入其陳擒琬引其馬馳歸衆無敢當者騎奇寄翻世民使召河北馬待其至乃出戰建德列陳自辰至午士卒飢倦皆坐列杜預曰士皆坐列言無鬬志逡巡欲退逡七倫翻世民命宇文士及將三百騎經建德陳西馳而南上所以嘗敵也將即亮翻又音如字騎奇寄翻下同上時掌翻賊若不動爾宜引歸動則引兵東出士及至陳前陳果動世民曰可擊矣時河渚馬亦至乃命出戰世民帥輕騎先進帥讀曰率下同大軍繼之東涉汜水直薄其陳薄迫也唐騎猝來朝臣趨就建德建德召騎兵使拒唐兵騎兵阻朝臣不得過建德揮朝臣令卻朝直遙翻進退之間唐兵已至建德窘迫退依東陂竇抗引兵擊之戰小不利世民帥騎赴之所向皆靡淮陽王道玄挺身陷陳直出其後復突陳而歸窘渠隕翻復扶又翻又音如字再入再出飛矢集其身如蝟毛蝟于貴翻蟲似豪者而小爾雅曰彙毛刺是也勇氣不衰射人皆應弦而仆世民給以副馬使從己於是諸軍大戰塵埃漲天世民帥史大奈程知節秦叔寶宇文歆等卷旆而入歆許今翻卷讀曰捲出其陳後陳讀曰陳張唐旗幟幟昌志翻建德將士顧見之大潰將即亮翻追奔三十里斬首三千餘級建德中槊中竹仲翻槊色角翻竄匿於牛口渚車騎將軍白士讓楊武威逐之建德墜馬士讓援槊欲刺之騎奇寄翻援于元翻刺七亦翻建德曰勿殺我我夏王也能富貴汝言得我以獻則富貴也夏戶雅翻下馬擒之也從才用翻來見世民世民讓之曰我自討王世充何預汝事而來越境犯我兵鋒建德曰今不自來恐煩遠取建德將士皆潰去所俘獲五萬人世民即日散遣之使還鄉里封德彞入賀世民笑曰不用公言得有今日智者千慮不免一失乎用李左車之言建德妻曹氏與左僕射齊善行將數百騎遁歸洺州洺彌並翻甲子世充偃師鞏縣皆降乙丑以太子左庶子鄭善果為山東道撫慰大使降戶江翻下同使疏吏翻世充將王德仁棄故洛陽城而遁此漢魏故都之城也秦王世民囚竇建德王琬長孫安世郭士衡等至洛陽城下以示世充世充與建德語而泣仍遣安世等入城言敗狀世充召諸將議突圍南走襄陽欲走襄陽就王弘烈王泰走音奏吾所恃者夏王夏王今已為擒雖得出終必無成考異曰舊書世充傳云諸將皆不答今從河洛記丙寅世充素服帥其太子㣥臣二千餘人詣軍門降帥讀曰率降戶江翻世民禮接之世充俯伏流汗世民曰卿常以童子見處處昌呂翻今見童子何恭之甚邪邪音耶世充頓首謝罪於是部分諸軍分扶問翻先入洛陽分守市肆禁止侵掠無敢犯者丁卯世民入宮城命記室房玄齡先入中書門下省收隋圖籍制詔已為世充所毀無所獲命蕭瑀竇軌等封府庫收其金帛頒賜將士瑀音禹將即亮翻收世充之黨罪尤大者段達王隆崔洪丹薛德音楊汪孟孝義單雄信楊公卿郭什柱郭士衡董睿張童兒王德仁朱粲郭善才等十餘人斬於洛水之上單慈淺翻新書云薛德音以移檄慢逆崔弘丹以造弩多傷士前誅之次收段達等斬洛渚上溫公避國諱改弘丹為洪丹郭什柱意當作什住初李世績與單雄信友善誓同生死及洛陽平世績言雄信驍健絶倫驍堅堯翻請盡輸己之官爵以贖之世民不許考異曰舊傳云高祖不許按太宗得洛城即誅雄信何嘗稟命於高祖蓋太宗時史臣敍高祖時事有誅殺不厭衆心者皆稱高祖之命以掩太宗之失如屠夏縣之類皆是也涕泣而退雄信曰我固知汝不辦事世績曰吾不惜餘生與兄俱死但既以此身許國事無兩遂且吾死之後誰復視兄之妻子乎復扶又翻乃割股肉以啖雄信曰使此肉隨兄為土庶幾不負昔誓也幾居希翻士民疾朱粲殘忍競投瓦礫擊其尸須臾如冢礫郎擊翻囚韋節楊續長孫安世等十餘人送長安長孫之長知兩翻士民無罪為世充所囚者皆釋之所殺者祭而誄之古者卿大夫歿則君命有司纍其功德為文以哀之曰誄今誄之者哀其無罪而死也誄魯水翻初秦王府屬杜如晦叔父淹事王世充淹素與如晦兄弟不協譖如晦兄殺之又囚其弟楚客餓幾死幾居依翻又音祁楚客終無怨色及洛陽平淹當死楚客涕泣請如晦救之如晦不從楚客曰曩者叔已殺兄今兄又殺叔一門之內自相殘而盡豈不痛哉欲自剄剄古頂翻如晦乃為之請於世民淹得免死為于僞翻秦王世民坐閶闔門晉都洛陽其城西面北來第三門曰閶闔隋營新都唐六典所載都城皇城宮城苑城諸門皆無閶闔蓋唐改之也闔戶臘翻稱老病不能拜世民遣人數之曰見賢遍翻數所具翻又所主翻公隋室宰相危不能扶使君弒國亡見李密王世充皆拜伏舞蹈今既老病無勞相見及至長安又請見不許既老且貧無復官爵卒於家年八十二史言蘇威之壽不若早夭卒子恤翻秦王世民觀隋宮殿歎曰逞侈心窮人欲無亡得乎命撤端門樓焚乾陽殿毀則天門及闕唐六典東都皇城南面三門中曰端門乾陽殿唐後於此起乾元殿宮城南面三門中曰應天門蓋隋之則天門也唐六典曰毀建國門隋志東都城南面二門正南曰建國城中僧尼留有名德者各三十人餘皆返初返初服也尼女夷翻武德四年前真定令周法明真定縣隋帶恆山郡唐改郡為恆州周法尚自陳入隋為將襲據黃梅隋志黃梅縣舊曰永興開皇初改曰新蔡十八年改曰黃梅因黃梅山以名縣也劉昫曰黃梅漢蘄春縣地宋分置新蔡郡隋為縣屬蘄春郡蘄春漢縣屬江夏郡吳為蘄春郡晉改為西陽又改為蘄陽梁改曰蘄水後齊改曰齊昌隋開皇十八年復曰蘄春帶郡蘄音渠之翻安陸漢縣屬江夏郡宋分置安陸郡梁置南司州西魏置安州隋復為安陸郡沔陽漢竟陵縣地屬江夏郡後周置復州大業初改沔州尋改為沔陽郡沔彌兗翻庚午以四郡來降降戶江翻下同武德四年壬申齊善行以洺相魏等州來降洺音名相息亮翻考異曰革命記云五月七日善行等至洺州實録云壬申洺相魏等州降者蓋降使到之日也月末又云裴矩等以八璽降蓋璽到之日也時建德餘衆走至洺州欲立建德養子為主徵兵以拒唐又欲剽掠居民還向海隅為盜善行獨以為不可曰隋末喪亂剽匹妙翻喪息浪翻下同故吾屬相聚草野苟求生耳以夏王之英武平定河朔士馬精強一朝為擒易如反掌豈非天命有所屬夏戶雅翻易以豉翻屬之欲翻非人力所能爭邪邪音耶今喪敗如此守亦無成逃亦不免等為亡國豈可復遺毒於民復扶又翻不若委心請命於唐必欲得繒帛者繒慈陵翻當盡散府庫之物勿復殘民也復扶又翻於是運府庫之帛數十萬段置萬春宮東街萬春宮竇建德所築凡三晝夜乃畢將即亮翻仍布兵守坊巷得物者即出無得更入人家士卒散盡然後與僕射裴矩行臺曹旦帥其百官奉建德妻曹氏及傳國八璽並破宇文化及所得珍寶請降于唐武德二年建德破化及得八璽及珍寶帥讀曰率璽斯氏翻降戶江翻秦王所統置左三府右三府各有統軍護軍初竇建德之誅宇文化及也隋南陽公主有子曰禪師建德虎賁郎將於士澄問之曰何承天姓苑有於姓今浙間有此姓禪市連翻賁音奔將即亮翻於如字化及大逆兄弟之子皆當從坐若不能捨禪師當相為留之為于僞翻公主泣曰虎賁既隋室貴臣按隋書帝紀大業初造龍舟於士澄已為上儀同往江南採木建德竟殺之公主尋請為尼及建德敗公主將歸長安與宇文士及遇於洛陽士及請與相見公主不可士及立於戶外請復為夫婦公主曰我與君仇家今所以不手刃君者但謀逆之日察君不預知耳訶令速去訶虎何翻士及固請公主怒曰必欲就死可相見也士及知不可屈乃拜辭而去武德四年乙亥以周法明為黃州總管黃州治黃岡縣漢江夏郡西陵縣地齊曰南安又置齊安郡隋置黃州尋改永安郡武德四年戊寅王世充徐州行臺王世辨以徐宋等三十八州詣河南道安撫大使任王褱請降使疏吏翻任音壬王褱古回翻降戶江翻世充故地悉平武德四年竇建德博州刺史馮士羡隋志武陽郡聊城縣開皇十六年置博州徇下三十餘州建德之地悉平武德四年己卯代州總管李大恩擊苑君璋破之武德四年突厥寇邊長平靖王叔良督五將擊之叔良中流矢厥九勿翻將即亮翻中竹仲翻師旋六月戊子卒於道卒子恤翻武德四年戊戌孟海公餘黨蔣善合以鄆州孟噉鬼以曹州來降鄆州隋之東平郡曹州隋之濟陰郡鄆音運噉徒濫翻降戶江翻海公之從兄也從才用翻武德四年庚子營州人石世則執總管晉文衍營州隋志之遼西郡奉靺鞨突地稽為主靺音末鞨音曷武德四年黃州總管周法明攻蕭銑安州拔之蕭銑蓋亦置安州於隋安陸郡界武德四年乙巳以右驍衛將軍盛彥師為宋州總管安撫河南驍堅堯翻武德四年乙卯海州賊帥臧君相以五州來降拜海州總管海州隋志之東海郡宋白曰魏武定七年置海州帥所類翻武德四年秋七月庚申王世充行臺王弘烈王泰左僕射豆盧行褒右僕射蘇世長以襄州來降襄州隋志之襄陽郡宋白曰襄州春秋穀鄧鄾盧羅鄀之地秦為南陽郡地魏置襄陽郡以其地在襄山之陽也江左置雍州西魏改襄州先是屢以書招之先悉薦翻行褒輒殺使者既至長安上誅行褒而責世長世長曰隋失其鹿天下共逐之陛下既得之矣豈可復忿同獵之徒問爭肉之罪乎使疏吏翻復扶又翻上笑而釋之以為諫議大夫考異曰舊本紀及唐曆年代記唐會要皆云五年六月置諫議大夫按世長自諫議歷陝州長史天策府軍咨祭酒四年十一月已預十八學士據舊職官志四年置諫議大夫今從之余按唐六典秦漢曰諫大夫光武加議字北齊集書省置諫議大夫七人隋氏門下省亦置諫議大夫七人四年以前唐未及置今始置之耳如淳曰合軍聚衆有幡校擊鼓也周禮校人掌王田獵之馬故謂之校獵師古曰如說非也此校謂以木相貫穿為闌校耳校人職云六廣既成校是則以遮闌為義也校獵者大為闌校以遮禽獸而獵取也軍之幡旗雖有校名本因部校此無豫也原父曰豫謂校讀如犯而不校亦競逐獵也高陵縣屬京兆府上顧㣥臣曰今日畋樂乎世長對曰陛下遊獵薄廢萬機不滿十旬未足為樂樂音洛上變色既而笑曰狂態復發邪復扶又翻邪音耶對曰於臣則狂於陛下甚忠嘗侍宴披香殿程大昌雍録慶善宮有披香殿又云慶善宮高祖舊第也在武功渭水北余按下文世長言昔侍於武功若此殿正在武功舊宅世長縱是譎諫不應引以為言恐此殿不在慶善宮謂上曰此殿煬帝之所為邪上曰卿諫似直而實多詐豈不知此殿朕所為而謂之煬帝乎對曰臣實不知但見其華侈如傾宮鹿臺紂為傾宮鹿臺若陛下為之誠非所宜臣昔侍陛下於武功見所居宅僅庇風雨當時亦以為足今因隋之宮室已極侈矣而又增之將何以矯其失乎上深然之武德四年甲子秦王世民至長安世民被黃金甲齊王元吉李世績等二十五將從其後鐵騎萬匹章十二行本匹下有甲士三萬人五字乙十一行本同孔本同張校同被皮義翻將即亮翻騎奇寄翻前後部鼓吹鼓吹軍樂也漢制萬人將軍得之司馬法軍中有鼓笛所以發壯勇薛居正曰義鏡問鼓吹十二案合於何所答云周禮鼓人掌六鼓四金漢朝乃有黃門鼓吹崔豹古今注云張騫使西域得摩訶兜勒一曲李延年增之分為二十八曲梁置鼓吹清商令二人唐又有掆鼓金鉦大鼓長鳴歌簫笳笛合為鼓吹十二案吹昌瑞翻乘繩證翻考異曰李績傳云太宗為上將績為下將與太宗俱服金甲乘戎輅告捷于太廟今從唐曆行飲至之禮以饗之左傳歸而飲至以數軍實杜預注曰飲於廟以數車徒器械及所獲也武德四年乙丑高句麗王建武遣使入貢句音駒麗鄰知翻建武元之弟也高元見隋紀武德四年上見王世充而數之數所具翻又所主翻世充曰臣罪固當誅然秦王許臣不死丙寅詔赦世充為庶人與兄弟子姪章十二行本姪下有徙字乙十一行本同孔本同處蜀處昌呂翻斬竇建德於市武德四年丁卯以天下略定大赦百姓給復一年復方目翻下同陝鼎函虢虞芮六州轉輸勞費陝州治陝弘農縣本隋弘農郡義寧元年曰鳳林領弘農閿鄉湖城武德元年曰鼎州因鼎湖為名武德三年以永寧崤置函州又義寧元年分盧氏長水桃林置虢郡武德元年曰虢州義寧元年以安邑虞鄉夏置安邑郡武德元年曰虞州二年以芮城河北永樂置芮州久隔寇戎並給復二年律令格式且用開皇舊制赦令既下而王竇餘黨尚有遠徙者治書侍御史孫伏伽上言兵食可去信不可去陛下已赦而復徙之治直之翻伽求加翻上時掌翻去羌呂翻復扶又翻又音如字是自違本心使臣民何所憑依且世充尚蒙寬宥況於餘黨所宜縱釋考異曰伏伽表云今月二日發雲雨之制而赦書乃十二日或脫十字也又云常赦所不免咸赦除之今赦無此文豈實録録赦文不盡歟王世充以防夫未備置雍州廨舍按雍録都城坊里圖雍州廨舍後為京兆府在光德坊雍於用翻廨古隘翻帥讀曰率矯稱敕呼鄭王世充與兄世惲趨出修德等殺之武德二年正月獨孤機兄弟為世充所殺故修德報仇惲於粉翻考異曰舊傳作獨孤修今從河洛記其餘兄弟子姪等於道亦以謀反誅武德四年隋末錢弊濫薄言錢之弊也民間不勝其弊勝音升至是初行開元通寶錢重章十二行重上有徑八分三字乙十一行本同孔本同退齊校同二銖四參按漢書律曆志權輕重者不失黍絫應劭注曰十黍為絫十絫為銖師古曰絫孟音來戈翻此字讀亦音纍紲之纍二銖四絫二百四十黍也參當作絫蓋筆誤也輕重大小最為折衷衷竹仲翻遠近便之命給事中歐陽詢撰其文並書回環可讀六典漢書百官表云給事中亦加官所加或博士大夫議郎漢儀注諸給事中日上朝謁平尚書奏事分為左右以有事殿中故曰給事中魏氏或為加官或為正員晉氏隸散騎省宋齊隸集書省後周天官府置給事中士隋曰給事郎唐曰給事中屬門下省掌侍奉左右分判省事凡百司奏抄侍中審定則先讀而署之以駁正違失撰其文者撰為八分篆隸二體考異曰薛璫唐聖運圖云初進蠟樣文德皇后掐一甲故錢上有甲痕云淩璠唐録政要云竇皇后按時竇皇后已崩文德皇后未立今皆不取武德四年以屈突通為陝東道大行臺右僕射鎮洛陽以淮陽王道玄為洛州總管李世績父蓋竟無恙而還詔復其官爵屈居勿翻陝失冉翻李蓋被虜見一百八十七卷武德二年十月恙余亮翻還從宣翻竇軌還益州自平洛還或經旬月不解甲性嚴酷將佐有犯無貴賤立斬之鞭撻吏民常流血滿庭所部重足屏息將即亮翻重直龍翻屏必郢翻武德四年癸酉置錢監於洛並幽益等諸州秦王世民齊王元吉賜三爐裴寂賜一爐聽鑄錢賜以官爐也爐音爐爐冶也身死家口配沒武德四年河北既平上以陳君賓為洺州刺史將軍秦武通等將兵屯洺州欲使分鎮東方諸州又以鄭善果等為慰撫大使就洺州選補山東州縣官竇建德之敗也其諸將多盜匿庫物及居閭里暴橫為民患洺彌並翻將即亮翻下同使疏吏翻橫戶孟翻或加捶撻捶止蕊翻建德故將皆驚懼不安高雅賢王小胡家在洺州欲竊其家以逃官吏捕之雅賢等亡命至貝州貝州隋志之清河郡於是願等相謂曰王世充以洛陽降唐降戶江翻其將相大臣段達單雄信等皆夷滅相息亮翻單慈淺翻吾屬至長安必不免矣吾屬自十年以來身經百戰當死久矣今何惜餘生不以之立事且夏王得淮安王遇以客禮見一百八十七卷二年十月夏戶雅翻吾屬皆為夏王所厚今不為之報仇為于僞翻將無以見天下之士乃謀作亂卜之以劉氏為主吉因相與之漳南之往也舊志漳南縣屬貝州漢之東陽縣隋開皇十八年分棗強清平二縣地置漳南縣於古東陽城以其謀告之雅曰天下適安定吾將老於耕桑不願復起兵復扶又翻衆怒且恐泄其謀遂殺之故漢東公劉黑闥時屏居漳南漢東公竇建德所封爵也屏必郢翻告以其謀黑闥欣然從之黑闥方種蔬即殺耕牛與之共飲食定計聚衆得百人甲戌襲漳南縣據之考異曰革命記七月二十七日衆立黑闥為漢東王建元天造即入漳南城鎖縣官於獄發使告貝州及諸鎮戍等云今漢東王為夏王起義兵於漳南請軍會戰今據實録甲戌七月十九日又黑闥陷相州乃稱王改元在五年正月今不取諸道有事則置行臺尚書省無事則罷之朝廷聞黑闥作亂乃置山東道行臺於洺州朝直遙翻洺彌並翻魏冀定滄並置總管府滄州隋志之勃海郡丁丑以淮安王神通為山東道行臺右僕射武德四年辛巳褒州道安撫使郭行方攻蕭銑鄀州拔之褒州當作襄州詳見辨誤新志武德四年以竟陵之樂鄉及襄州之率道上洪置鄀州上書郡下書州竟陵之樂鄉蓋蕭銑地也鄀音若武德四年孟海公與竇建德同伏誅戴州刺史孟噉鬼不自安新志武德四年以曹州之成武宋州之單父楚丘置戴州敢徒濫翻以禹城令蔣善合為腹心禹城縣屬齊州隋之祝阿也新舊志皆云天寶元年改祝阿為禹城此時未有禹城當考又前言蔣善合以鄆州來降此以禹城令書之亦未知為誰所命也武德四年八月丙戌朔日有食之武德四年丁亥命太子安撫北邊武德四年丁酉劉黑闥陷鄃縣鄃縣屬貝州鄃音輸魏州隋志之武陽郡皆敗死黑闥悉取其餘衆及器械竇建德舊黨稍稍出歸之衆至二千人為壇於漳南祭建德告以舉兵之意自稱大將軍詔發關中步騎三千使將軍秦武通定州總管藍田李玄通擊之藍田縣屬雍州騎奇寄翻武德四年癸卯突厥寇代州厥九勿翻總管李大恩遣行軍總管王孝基拒之舉軍皆沒甲辰進圍崞縣崞縣屬代州崞音郭乙巳王孝基自突厥逃歸李大恩衆少少詩沼翻據城自守突厥不敢逼月餘引去武德四年上以南方寇盜尚多丙午以左武候將軍張鎮周為淮南道行軍總管大將軍陳智略為嶺南道行軍總管鎮撫之武德四年丁未劉黑闥陷歷亭舊志歷亭漢東陽地隋開皇十六年分鄃縣置隋志曰分武城置時屬貝州使之拜不可遂殺之武德四年初洛陽既平徐圓朗請降拜兗州總管兗州隋志之魯郡降戶江翻劉黑闥作亂陰與圓朗通謀上使葛公盛彥師安集河南行至任城任城縣屬兗州任音壬辛亥圓朗執彥師舉兵反黑闥以圓朗為大行臺元帥帥所類翻兗鄆陳伊洛曹戴等八州豪右皆應之圓朗厚禮彥師使作書與其弟令舉虞城降舊志虞城縣屬宋州隋分下邑縣置時置東虞州令力丁翻吾奉使無狀為賊所擒使疏吏翻下同為臣不忠誓之以死汝善侍老母勿以吾為念圓朗初色動而彥師自若圓朗乃笑曰盛將軍有壯節不可殺也待之如舊河南道安撫大使任王褱行至宋州屬圓朗反宋州治睢陽時為宋城縣使疏吏翻王褱古回翻屬之欲翻王褱宋州西至汴州二百八十五里王褱柳公何怯也圓朗又攻陷楚丘楚丘縣後魏之己氏縣隋開皇六年更名時屬戴州王褱遣部將崔樞張公謹自鄢陵帥諸豪右質子百餘人守虞城鄢陵縣時屬洧州將即亮翻下同鄢謁晚翻又於建翻又音偃帥讀曰率質音致下同樞與公謹皆王世充將諸州質子父兄皆反恐必為變王褱不應樞至虞城分質子使與土人合隊共守城合音閣賊稍近質子有叛者樞斬其隊帥於是諸隊帥皆懼帥所類翻下同各殺其質子樞不禁梟其首於門外遣使白王褱梟堅堯翻使疏吏翻王褱陽怒曰吾所以使與質子俱者欲招其父兄耳何罪而殺之退謂濬曰吾固知崔樞能辦此也縣人既殺質子與賊深仇吾何患乎賊攻虞城果不克而去武德四年初竇建德以鄱陽崔元遜為深州刺史鄱陽縣屬饒州隋開皇十六年以定州安平置深州大業初廢新志武德四年以定州之安平瀛州之饒陽置深州蓋竇建德置而唐因之耳宋白曰以州城西故深城名州元遜與其黨數十人謀於野伏甲士於車中以禾覆其上覆敷又翻章十二行本上下有詐為農人四字乙十一行本同孔本同退齊校同直入聽事聽讀曰廳自禾中呼譟而出執刺史裴晞殺之傳首黑闥武德四年九月乙卯文登賊帥淳于難請降置登州以難為刺史文登本漢牟平縣地後齊置文登縣因文登山而名隋志屬東萊郡時置登州兼領萊州之觀陽縣降戶江翻下同武德四年突厥寇並州厥九勿翻並卑名翻遣左屯衛大將軍竇琮等擊之戊午突厥寇原州遣行軍總管尉遲敬德等擊之琮徂宗翻尉紆勿翻武德四年辛酉徐圓朗自稱魯王武德四年隋末歙州賊汪華據黟歙等五州有衆一萬歙州本新安郡隋平陳置歙州黟歙二縣屬焉歙音攝黟音伊劉昫曰音同䃜縣南石墨嶺出石墨故也甲子遣使來降使疏吏翻降江戶翻拜歙州總管武德四年隋末弋陽盧祖尚糾合壯士以衛鄉里部分嚴整㣥盜畏之及煬帝遇弒鄉人奉之為光州刺史弋陽漢縣南齊為郡梁置光州分扶問翻奉表於皇泰主及王世充自立祖尚來降丙子以祖尚為光州總管考異曰實録丙子以光州豪右盧祖尚為光州總管按舊傳世充自立祖尚遂舉州歸款而實録至此始見之蓋當時止為刺史至此遷總管耳武德四年己卯詔括天下戶口武德四年徐圓朗寇濟州治中吳伋論擊走之濟州隋之濟北郡漢置州刺史其屬有治中從事別駕從事自是兩官唐武德元年改郡太守曰州刺史郡丞曰別駕未嘗置治中今書濟州治中吳伋論豈即以別駕為治中邪下文又書徐圓朗昌州治中蓋此時官稱猶未定于一濟子禮翻武德四年癸未詔以太常樂工皆前代因罪配沒子孫相承多歷年所所謂樂戶也宜並蠲除為民蠲吉淵翻且令執事若仕宦入流令力丁翻入流者為流內官勿更追集武德四年甲申靈州總管楊師道擊突厥破之師道恭仁之弟也楊恭仁時鎮涼州厥九勿翻武德四年詔發巴蜀兵以趙郡王孝恭為荊湘道行軍總管荊州南郡湘州長沙郡荊湘道以南朝荊湘所部言之下荊郢道類此長知兩翻統十二總管自夔州順流東下以廬江王瑗為荊郢道行軍元帥章十二行本帥下有出襄州道四字乙十一行本同孔本同張校同退齊校同郢州隋之竟陵郡瑗于眷翻帥所類翻黔州刺史田世康出辰州道舊志漢辰陽縣隋改辰陽為辰溪縣仍分置沅陵縣沅陵郡唐改為辰州以沅陵為理所黔音琴夏口即漢口夏戶雅翻是月孝恭發夔州時峽江方漲蜀江徑三峽謂之峽江將即亮翻下同李靖曰兵貴神速今吾兵始集銑尚未知若乘江漲忽抵其城下掩其不備此必成擒不可失也孝恭從之武德四年淮安王神通將關內兵至冀州與李藝兵合又發邢洺相魏恆趙等兵合五萬餘人與劉黑闥戰於饒陽城南布陳十餘里黑闥衆少依隄單行而陳以當之宋白曰饒陽漢縣在饒河之陽今縣東北二十里饒陽故城是也齊天保五年移於今理按饒陽縣則魏虜渠口置虜口鎮於此後為縣理洺音名相息亮翻恆戶登翻陳讀曰陳行戶剛翻神通乘風擊之既而風返神通大敗士馬軍資失亡三分之二李藝居西偏擊高雅賢破之逐奔數里聞大軍不利退保藳城藳城縣本屬恆州時屬廉州藝亦敗薛萬均萬徹皆為所虜截髮驅之萬均兄弟亡歸藝引兵歸幽州黑闥兵勢大振武德四年上以秦王章十二行本王下有世民二字乙十一行本同孔本同功大前代官皆不足以稱之特置天策上將位在王公上冬十月以世民為天策上將領司徒陝東道大行臺尚書令增邑二萬戶唐爵九等王食邑萬戶今倍之陝失冉翻置官屬天策府置長史司馬各一人從事中郎二人並掌通判府事軍咨祭酒二人謀軍事贊相禮儀應接賓客典籤四人掌宣傳導引之事主簿二人掌省覆教命録事二人記室參軍事二人掌書疏表啓宣行教命功倉兵騎鎧士六曹參軍各二人參軍事六人世民以海內浸平乃開館於宮西延四方文學之士出教以王府屬杜如晦記室房玄齡虞世南文學褚亮姚思廉主簿李玄道參軍蔡允恭薛元敬顏相時咨議典籤蘇勗天策府從事中郎于志寧軍咨祭酒蘇世長記室薛收倉曹李守素國子助教陸德明孔穎達信都蓋文達宋州總管府戶曹許敬宗諸王出命稱教相息亮翻蓋古盍翻考異曰舊書參軍薛元敬承許敬宗下今從太宗實録咨議典籤蘇勉舊書作軍咨典籤今從實録宋州總管府戶曹許敬宗舊書褚亮傳作著作佐郎攝記室敬宗傳擬漣州別駕今從實録更日直宿更工衡翻供給珍膳恩禮優厚世民朝謁公事之暇輒至館中引諸學士討論文籍朝直遙翻論盧昆翻或夜分乃寢又使庫直閻立本圖像庫直隸親事府號十八學士士大夫得預其選者時人謂之登瀛州自來相傳海中有三神山蓬萊方丈瀛洲人不能至至則成仙矣故以為喻大寶之弟子蔡大寶輔後梁主蕭察收之從子從才用翻相時師古之弟顏師古以碩學名毗之子也閻毗以巧思事隋煬帝初杜如晦為秦王府兵曹參軍俄遷陝州長史陝失冉翻長知兩翻時府僚多補外官世民患之房玄齡曰餘人不足惜至於杜如晦王佐之才大王欲經營四方非如晦不可世民驚曰微公言幾失之幾居依翻即奏為府屬與玄齡常從世民征伐參謀帷幄軍中多事如晦剖決如流世民每破軍克城諸將佐爭取寶貨玄齡獨收采人物致之幕府又將佐有勇略者玄齡必與之深相結將即亮翻使為世民盡死力為于僞翻下同世民每令玄齡入奏事上歎曰玄齡為吾兒陳事雖隔千里皆如面談李玄道嘗事李密為記室密敗官屬為王世充所虜懼死皆達曙不寐獨玄道起居自若曰死生有命非憂可免衆服其識量武德四年庚寅劉黑闥陷瀛州殺刺史盧士睿觀州人執刺史雷德備以城降之隋以東光縣置觀州大業初廢武德四年以德州之弓高胡蘇東光冀州之阜陵蓨安陵觀津置觀州觀古喚翻降戶江翻下同武德四年辛卯蕭銑鄂州刺史雷長穎以魯山來降隋平陳以江夏郡置鄂州治江南之江夏大業初復為郡蕭銑蓋置州於魯山武德四年趙郡王孝恭帥戰艦二千餘艘東下帥讀曰率艦戶黯翻艘蘇遭翻蕭銑以江水方漲殊不為備孝恭等拔其荊門宜都二鎮進至夷陵蕭銑置宜都鎮於峽州夷道縣夷陵縣帶峽州將即亮翻按水經注清江即佷山夷水也水色清照十丈分沙蜀人見其澄清因名清江吳分漢南郡之巫縣立沙渠縣後周於縣立施州清江郡隋廢郡及州為清江縣癸巳孝恭擊走之獲戰艦三百餘艘殺溺死者萬計追奔至百里洲自清江而東過歸州峽州而後至百里洲復扶又翻又敗之進入北江百里洲在枝江縣江中江水至此分流出百里洲北而東流者因謂之北江敗補邁翻梁以漢夷道縣置宜都郡宜昌縣後周置江州隋廢為巴山縣屬清江郡蕭銑蓋復置江州於此蓋古盍翻武德四年毛州刺史趙元愷魏州館陶縣舊置毛州隋大業初州廢竇建德復置唐因之領魏州之館陶冠氏博州之堂邑貝州之臨清清水下不堪命丁卯州民董燈明等作亂殺元愷以應劉黑闥武德四年盛彥師自徐圓朗所逃歸王薄因說青萊密諸州皆下之萊州東萊郡後魏之光州也密州高密郡後魏之膠州也說輸芮翻武德四年蕭銑之罷兵營農也見上卷三年聞唐兵至文士弘敗大懼倉猝徵兵皆在江嶺之外道塗阻遠不能遽集乃悉見兵出拒戰見賢遍翻孝恭將擊之李靖止之曰彼救敗之師策非素立勢不能久不若且泊南岸江陵南岸即馬頭岸彼必分其兵或留拒我或歸自守兵分勢弱我乘其懈而擊之懈古隘翻蔑不勝矣今若急之彼則人併力死戰楚兵剽鋭未易當也剽匹妙翻易以豉翻孝恭不從留靖守營自帥鋭師出戰果敗走趣南岸帥讀曰率趣七喻翻又逡須翻銑衆委舟收掠軍資人皆負重靖見其衆亂縱兵奮擊大破之乘勝直抵江陵入其外郭又攻水城拔之大獲舟艦李靖使孝恭盡散之江中諸將皆曰將即亮翻破敵所獲當藉其用奈何棄以資敵靖曰蕭銑之地南出嶺表東距洞庭洞庭湖在嶽州巴陵縣若攻城未拔援軍四集吾表裏受敵進退不獲雖有舟楫將安用之今棄舟艦使塞江而下塞悉則翻援兵見之必謂江陵已破未敢輕進往來覘伺覘丑廉翻又丑豔翻伺相吏翻動淹旬月吾取之必矣銑援兵見舟艦果疑不進其交州刺史章十二行本作總管乙十一行本同孔本同張校同丘和長史高士廉司馬杜之松將朝江陵交州隋交趾郡長知兩翻朝直遙翻悉詣孝恭降降戶江翻下同孝恭勒兵圍江陵銑內外阻絶問策於中書侍郎岑文本文本勸銑降銑乃謂㣥下曰天不祚梁不可復支矣復扶又翻若必待力屈則百姓蒙患奈何以我一人之故陷百姓於塗炭乎乙巳銑以太牢告于太廟下令開門出降考異曰高祖實録癸巳趙郡王孝恭與蕭銑將文士弘相遇於清江合口擊之獲其戰艦千餘艘下宜昌當陽枝江松滋四縣舊書孝恭傳攻其水城克之所得船散於江中諸將皆曰虜得賊船當藉其用何為棄之無乃資賊邪孝恭曰不然蕭銑僞境南極嶺外東至洞庭若攻城未拔援兵復到我則內外受敵進退不可雖有舟楫何所用之今銑緣江州鎮忽見船舸亂下必知銑敗未敢進兵來去覘伺動淹旬月用緩其救吾克之必矣銑救兵至巴陵見船被江而下果狐疑不敢輕進太宗實録孝恭傳進師至清江銑遣其將文士弘以兵拒戰擊走之追奔至于百里洲士弘收兵復戰又敗之追入北江銑悉兵以拒之孝恭將戰李靖止之曰楚人輕鋭難與爭鋒今新失荊門盡兵出戰此救敗之師也非其本圖勢不能久一日不戰賊必兩分留輕兵抗我退羸師以自守此即勢攜力弱擊之必捷孝恭不從遣靖撫營自以鋭師水戰孝恭果敗奔于南岸賊委舟大掠人皆負重靖見其軍亂進兵擊之賊大敗乘勝進軍入其郛郭攻其水城剋之悉取其舟楫散於江中賊救兵見之謂城已陷莫敢輕進銑內外阻絶城中攜二由是懼而出降唐曆孝恭靖乘勝進兵攻其水城剋之悉取其船艦散於江中諸將曰棄之無乃資敵靖曰不然云云如舊書所載孝恭語既而銑救兵見之謂城已陷莫敢輕進銑由是懼而出降按十道志荊門在峽州宜都縣界夷陵峽州縣名清江在峽州巴山縣界百里州在荊州枝江縣界江自此洲派別去江陵已近故銑悉兵死戰太宗實録近為得實今從之其餘則參取四書之語孝恭以李靖為謀主蓋靖畫策而孝恭為諸將言之今從唐曆銑帥㣥臣緦縗布幘詣軍門帥讀曰率縗倉回翻曰當死者唯銑耳百姓無罪願不殺掠孝恭入據其城諸將欲大掠岑文本說孝恭曰江南之民自隋末以來困於虐政重以㣥雄虎爭將即亮翻說輸芮翻重直用翻今之存者皆鋒鏑之餘跂踵延頸以望真主踵不至地曰跂音去智翻是以蕭氏君臣江陵父老決計歸命庶幾有所息肩今若縱兵俘掠章十二行本掠下有使士民失望五字乙十一行本同孔本同張校同退齊校同恐自此以南無復向化之心矣幾居希翻復扶又翻孝恭稱善遽禁止之諸將又言梁之將帥與官軍拒鬬死者其罪既深請籍沒其家以賞將士李靖曰王者之師宜使義聲先路彼為其主鬬死將即亮翻帥所類翻先悉薦翻下同為于僞翻乃忠臣也豈可同叛逆之科籍其家乎於是城中安堵秋毫無犯南方州縣聞之皆望風款附銑降數日援兵至者十餘萬聞江陵不守皆釋甲而降孝恭送銑於長安上數之銑曰隋失其鹿天下共逐之銑無天命故至此若以為罪無所逃死竟斬於都市詔以孝恭為荊州總管李靖為上柱國賜爵永康縣公永康縣屬婺州得承制拜授先是銑遣黃門侍郎江陵劉洎略地嶺表得五十餘城未還而銑敗洎以所得城來降除南康州都督府長史是年分端州之端溪置南康州仍置都督府督端康封新宋瀧等州時改總管府為都督府貞觀初始分上中下州洎其冀翻長知兩翻武德四年戊申徐圓朗昌州治中劉善行以須昌來降圓朗蓋以鄆州之須昌置昌州降戶江翻武德四年庚戌詔陝東道大行臺尚書省自令僕至郎中主事六典曰漢官云光祿勳有南北廬主事三署主事於諸郎之中察茂才高弟者為之秩四百石次補尚書郎出宰百里謝承後漢書胡伯蕃范滂公沙穆並以俊才舉孝廉除郎中光祿勳主事後魏尚書吏部儀曹三公虞曹都官二千石比部各量事置掌故主事員門下置主事令史並從八品上隋初臺省並置主事令史煬帝三年並去令史之名其主事隨曹間劇而置每十令史置一主事不滿十者亦置一人雜用才術之士至唐並用流外入流者補之陝失冉翻而員數差少少詩沼翻山東行臺及總管府諸州並隸焉其益州襄州山東淮南河北等道令僕以下各降京師一等員數又減焉行臺尚書令得承制補署其秦王齊王府官之外各置左右六護軍府及左右親事帳內府護軍惟秦齊二府有之他國不得置也親王親事府及帳內府各置典軍二人正五品上副典軍二人從五品上武德四年閏月乙卯上幸稷州武德三年以京兆之武功好畤盩厔置稷州又廢郇州以郿鳳泉二縣屬焉己未幸武功舊墅壬戌獵于好畤武德二年分醴泉置好畤縣屬雍州因漢舊名也乙丑獵于九嵕九嵕山在雍州醴泉縣嵕子紅翻丁卯獵于仲山戊辰獵于清水谷隋志京兆宜君縣有清水三原本屬漢池陽縣界後周置建忠郡隋置三原縣唐屬雍州辛未幸周氏陂壬申還長安武德四年十一月甲申上祀圜丘貞觀禮冬至祀昊天上帝於圜丘武德四年杜伏威使其將王雄誕擊李子通子通以精兵守獨松嶺自宣州廣德縣東南過獨松嶺至湖州嶺路險狹將即亮翻下同陳當之下合有世字蓋唐史避太宗諱去世字也乘高據險以逼之多張旗幟夜則縛炬火於樹布滿山澤子通懼燒營走保杭州雄誕追擊之又敗之於城下敗補邁翻庚寅子通窮蹙請降降戶江翻考異曰實録是月景申會稽賊帥李子通伏誅按子通因杜伏威入朝始謀叛伏誅於時未也舊紀是月子通以其地來降新紀庚寅李子通降丙申謀反亦不寤伏威未入朝也伏威執子通並其左僕射樂伯通送長安上釋之先是汪華據黟歙稱王十餘年雄誕還軍擊之華拒之於新安洞口唐歙州隋之新安郡也新安洞口即歙州隘道之口先悉薦翻黟音伊歙音攝雄誕伏精兵於山谷帥羸弱數千犯其陳帥讀曰率下同羸倫為翻陳讀曰陳戰才合陽不勝走還營華進攻之不能克會日暮引還伏兵已據其洞口華不得入窘迫請降聞人遂安據崑山無所屬伏威使雄誕擊之雄誕以崑山險隘難以力勝乃單騎造其城下騎奇寄翻造七到翻陳國威靈陳唐國之威靈也遂安感悅帥諸將出降於是伏威盡有淮南江東之地南至嶺東距海雄誕以功除歙州總管賜爵宜春郡公袁州宜春郡武德四年壬辰林州總管劉旻擊劉仚成仚許延翻大破之舊志慶州華池縣隋置武德四年置林州總管府部落皆降降戶江翻武德四年李靖度嶺遣使分道招撫諸州所至皆下使疏吏翻蕭銑桂州總管李襲志帥所部章十二行本部下有諸州二字乙十一行本同孔本同來降桂州隋志之始安郡明年入朝朝直遙翻以李靖為嶺南撫慰大使檢校桂州總管引兵下九十六州得戶六十餘萬武德四年壬寅劉黑闥陷定州執總管李玄通黑闥愛其才欲以為大將將即亮翻下同玄通不可故吏有以酒肉饋之者玄通曰諸君哀吾幽辱幸以酒肉來相開慰當為諸君一醉為于僞翻酒酣謂守者曰吾能劍舞願假吾刀守者與之玄通舞竟太息曰大丈夫受國厚恩鎮撫方面不能保全所守亦何面目視息世間哉即引刀自刺刺七亦翻潰腹而死上聞為之流涕為于僞翻拜其子伏護為大將武德四年庚戌州人周文舉殺刺史王文矩以城應徐圓朗武德四年幽州大饑高開道許以粟賑之賑津忍翻李藝遣老弱詣開道就食開道皆厚遇之藝喜於是發民三千人車數百乘驢馬千餘匹往受粟開道悉留之告絶於藝復稱燕王賑津忍翻乘繩證翻復扶又翻又音如字燕因肩翻南與劉黑闥相結引兵攻易州不克大掠而去又遣其將謝稜詐降於藝請兵援接藝出兵應之將至懷戎舊志北燕州懷戎縣後漢上谷之潘縣也北齊改為懷戎媯水經其中州所治也貞觀八年改北燕州為媯州開道與突厥連兵數入為寇厥九勿翻數所角翻恆定幽易咸被其患恆戶登翻被皮義翻武德四年十二月乙卯劉黑闥陷冀州殺刺史麴稜黑闥既破淮安王神通移書趙魏以戰國時趙魏大界言之庚申遣右屯衛大將軍義安王孝常將兵討黑闥黑闥將兵數萬進逼宗城將即亮翻黎州總管李世績先屯宗城棄城走保洺州新志武德二年以黎陽縣置黎州宗城本廣宗縣隋仁壽初改為宗城縣避煬帝名也屬清河郡時置宗州洺彌並翻考異曰實録世績與黑闥戰於宋州我師敗績革命記李績為大總管張仕貴為副領兵二萬人入宋州績以五百騎自探聞黑闥到南宮馳至宋州不入城而西過至洺州騎馬於南門外喚陳君賓党仁弘秦武通等棄城西拔永年縣令程名振見武通狼狽走出騎馬向縣取家口入城城人恐相劫掠即閉城門自守名振乃於城北門上以繩懸下將母妻男女步走西去不踰四五里母妻等被劫散失名振脫身而免黑闥攻宋城破之仕貴以輕騎突圍而走投相州數日黑闥大軍至洺州按舊地里志武德四年置宗州於宗城縣宋字皆當作宗世績名將必不至如革命記所云但力不能拒而棄城耳今從舊書黑闥傳甲子黑闥追擊世績等破之殺步卒五千人世績僅以身免丙寅洺州土豪翻城應黑闥黑闥於章十二行本於上有築壇二字乙十一行本同孔本同張校同退齊校同城東南告天及祭竇建德而後入後旬日引兵攻拔相州相息亮翻考異曰實録黑闥陷相州在來年正月乙酉蓋奏到之日也今從革命記執刺史房晃右武衛將軍張士貴潰圍走黑闥南取黎衛二州半歲之間盡復建德舊境又遣使北連突厥頡利可汗遣俟斤宋邪那張宋作末帥胡騎從之使疏吏翻下同厥九勿翻俟渠之翻邪讀曰耶帥讀曰率騎奇寄翻右武衛將軍秦武通洺州刺史陳君賓永寧令程名振永寧當作永年武德四年丁卯命秦王世民齊王元吉討黑闥武德四年昆彌遣使內附昆彌即漢之昆明也昆明蠻在爨蠻西以西洱河為境西洱河即葉榆河也巂州漢越巂郡地後周置嚴州開皇六年改西寧州十八年改巂州南寧古南中味升麻諸縣之地武德四年置南寧州巂音髓遂來降說輸芮翻降戶江翻武德四年己巳劉黑闥陷邢州趙州庚午陷魏州殺總管潘道毅辛未陷莘州隋開皇十六年以魏州之莘縣置莘州大業初廢是年復以魏州之莘臨黃武陽博州之武水置莘州考異曰實録作華州新書作業州按地里志無業州必莘州也十道志開皇十六年於莘縣置莘州舊志武德五年置武德四年壬申徙宋王元嘉為徐王王崇武標點容肇祖聶崇岐覆校
