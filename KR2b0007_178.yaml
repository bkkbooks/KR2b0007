body:
  text: 資治通鑑卷第一百七十八端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國侯食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注隋紀二高祖文皇帝上之下開皇十二年開皇十二年壬子五九二開皇十二年春二月己巳以蜀王秀為內史令兼右領軍大將軍開皇十二年國子博士何妥與尚書右僕射邳公蘇威爭議事積不相能威子夔為太子通事舍人隋制太子通事舍人八人屬典書坊有盛名少詩沼翻士大夫多附之及議樂夔與妥各有所持詔百僚署其所同百僚以威故同夔者什八九妥恚曰吾席間函丈四十餘年禮侍坐於先生席間函丈何妥周武帝時已為太學博士故云然恚於避翻邪音耶遂奏威與禮部尚書盧愷吏部侍郎薛道衡尚書右丞王弘考功侍郎李同和等共為朋黨吏部侍郎考功侍郎皆屬吏部尚書尚書左右丞分司管轄隋制尚書二十四曹侍郎獨吏部侍郎班左右丞之上吏部侍郎正四品左右丞從四品同和為叔言二人如威之子弟也復言威以曲道任其從父弟徹肅罔冒為官等數事復扶又翻從才用翻上命蜀王秀上柱國虞慶則等雜按之事頗有狀上大怒秋七月乙巳威坐免官爵以開府儀同三司就第盧愷除名知名之士坐威得罪者百餘人初周室以來選無清濁選宣絹翻及愷攝吏部按愷傳開皇九年拜禮部尚書攝吏部尚書別彼列翻故涉朋黨之謗以至得罪未幾幾居豈翻上曰蘇威德行者行下孟翻但為人所誤耳命之通籍通籍殿中則得預朝請好呼到翻每歲責民間五品不遜孔安國曰五品謂五常遜順也管內無五品之家其不相應領類多如此又為餘糧簿欲使有無相贍民部侍郎郎茂以為煩迂不急皆奏罷之茂基之子也郎基見一百六十五卷梁世祖承聖三年有民張元預兄弟不睦丞尉請加嚴刑隋志縣置令丞尉元預兄弟本相憎疾又坐得罪彌益其忿非化民之意也乃徐諭之以義元預等各感悔頓首請罪遂相親睦稱為友悌開皇十二年己巳上享太廟隋立四親廟各以孟月享以太牢開皇十二年壬申晦日有食之開皇十二年帝以天下用律者多踳駮踳乖也駮錯也踳尺允翻駮北角翻八月甲戌制諸州死罪不得輒決悉移大理按覆事盡盡竟也上時掌翻開皇十二年冬十月壬午上享太廟十一月辛亥祀南郊開皇十二年己未新義公韓擒虎卒擒虎襲父雄爵新義郡公平陳之功以吏議不加封爵卒子恤翻開皇十二年十二月乙酉以內史令楊素為尚書右僕射與高熲專掌朝政素性疏辨高下在心朝臣之內朝直遙翻頗推高熲敬牛弘厚接薛道衡視蘇威蔑如也蔑無也視之如無也又輕易也多被陵轢陵乘也犯也侮也侵也轢陵踐也又車踐為轢轢郎擊翻調徒釣翻至於推誠體國處物平當處昌呂翻當丁浪翻有宰相識度不如熲遠矣右領軍大將軍賀若弼自謂功名出朝臣之右每以宰相自許既而楊素為僕射弼仍為將軍甚不平形於言色由是坐免官怨望愈甚久之上下弼獄下戶嫁翻謂之曰我以高熲楊素為宰相汝每昌言曰此二人惟堪啖飯耳昌言明言於廣衆啖徒濫翻又徒覽翻弼曰熲臣之故人素臣舅子臣並知其為人誠有此語公卿奏弼怨望罪當死上曰臣下守法不移公可自求活理弼曰臣恃至尊威靈將八千兵渡江將即亮翻擒陳叔寶竊以此望活上曰此已格外重賞何用追論弼曰臣已蒙格外重賞今還格外望活既而上低回數日低降意也回轉心也特令除名歲餘復其爵位上亦忌之不復任使復扶又翻然每宴賜遇之甚厚開皇十二年有司上言府藏皆滿上時掌翻藏徂浪翻無所容積於廊廡廡罔甫翻帝曰朕既薄賦於民又大經賜用謂賞平陳將士爾猶言如此入者常多於出略計每年賜用至數百萬段曾無減損於是更闢左藏院以受之漢官有中藏令晉有中黃左右藏令隋初有右藏黃藏令至是始闢左藏院藏徂浪翻寧積於人無藏府庫河北河東今年田租三分減一兵減半功調全免田出租丁出調詳已見前兵受田計畝為功以其所出修器械備糗糧今亦減其半調徒弔翻京輔及三河地少而人衆京輔謂關內三河謂河東河南河北少與小同帝乃發使四出均天下之田其狹鄉每丁才至二十畝老少又少焉使疏吏翻老少詩照翻又少詩沼翻十三年十三年春正月壬子上祀感生帝隋以火德王以赤帝赤熛怒為感生帝十三年壬戌行幸岐州岐州扶風郡十三年二月丙午詔營仁壽宮於岐州之北仁壽宮在岐州普閏縣監古銜翻素奏前萊州刺史宇文愷檢校將作大匠隋志東萊郡舊置光州開皇五年更名萊州隋制未除授正官而領其務者為檢校官將作大匠掌工作宇文愷有巧思奏使之領作土木監掌土木之事以營宮暫置之非常設之官崇臺纍榭宛轉相屬屬之欲翻役使嚴急丁夫多死疲頓顛仆推填坑坎覆以土石推吐雷翻覆敷又翻因而築為平地死者以萬數十三年丁亥上至自岐州十三年己卯立皇孫暕為豫章王暕廣之子也暕古限翻十三年丁酉制私家不得藏緯候圖讖讖楚譖翻十三年秋七月戊辰晦日有食之十三年是歲上命禮部尚書牛弘等議明堂制度宇文愷獻明堂木樣上命有司規度安業里地將立之而諸儒異議久之不決乃罷之隋志宇文愷依月令文造明堂木樣重檐復廟五房四達丈尺規矩皆有準憑帝異之命有司於安業里為規兆蓋在長安南郭內也既以異議罷至大業中愷復奏明堂議及木樣其議云尚書帝命驗曰帝者承天立五府以尊天重象赤曰文祖黃曰神斗白曰顯紀黑曰玄矩蒼曰靈府注曰唐虞之天府夏之世室殷之重屋周之明堂皆同矣尸子曰有虞氏曰總章周官考工記曰夏后氏世室堂修四二博四修一注云修南北之深也夏度以步今堂修十四步其博益以四分修之一則明堂博十七步半也臣愷按三王之世夏最為近古從質尚文理應漸就寬大何因夏室乃大殷堂相形為論理恐不爾記云堂修七博四修若夏度以步則應修七步注云今堂修十四步乃是增益記文殷周二堂獨無加字便是其義類例不同山東禮本輒加二七之字何得殷無加尋之文周闕增筵之義研核其趣或是不然讎校古書並無二字此乃桑間俗儒信情加減黃圖議云夏后氏益其堂之大一百四十四尺周人明堂以為兩杼間馬宮之言止論堂之一面據此為準則三代堂基並方得為上圓之制諸書所說並為下方鄭注周官獨為此義非直與古違異亦乃乖背禮文尋文求理深恐未愜尸子曰殷人陽館考工記曰殷人重屋堂修七尋堂崇三尺四阿重屋注曰其修七尋五丈六尺放夏周則其博九尋七丈二尺又曰周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡二筵禮記明堂位曰天子之廟復廟重檐鄭注云復廟重屋也注玉藻云天子廟及路寢皆如明堂制禮圖云於內室之上起通天之觀觀八十一尺得宮之數其聲濁君之象也大戴禮云明堂者古有之凡九室一室有四戶八牖以茅蓋上圓下方外水曰璧雍赤綴戶白綴牖堂高三尺東西九仞南北七筵其宮方三百步周書明堂曰堂方百一十二尺高四尺階博六尺三寸室居內方百尺室內方六十尺戶高八尺博四尺作洛曰明堂太廟路寢咸有四阿重亢重廊孔氏注云重亢纍棟重廊纍屋也禮圖曰秦明堂九室十二階各有所居呂氏春秋曰有十二堂與月令同並不論尺丈臣愷按十二階雖不與禮合一月一階非無理思黃圖曰堂方百四十四尺法方象地屋圓楣徑二百一十六尺法乾之策也圓象天室九宮法九州太室方六丈法坤之變數十二堂法十二月三十六戶法極陰之變數七十二牖法五行所行日數八達象八風法八卦通天臺徑九尺象法以九覆六高八十一尺法黃鍾九九之數二十八柱象二十八宿堂高三尺土階三等法三統堂四向五色法四時五行殿門去殿七十二步法五行所行門堂長四丈取太室三之二垣高無蔽目之照目恐當作日牖六尺其外倍之殿垣方在水內法地陰也水四周於外象四海圓法陽也水闊二十四丈象二十四氣水內徑三丈應覲禮經武帝立明堂汶上無室其外略依此制泰山通議今亡不可得而辨也元始四年起明堂辟雍長安城南門制度如儀一殿垣四面門八觀水外周堤壤高四尺禮圖曰建武三十年作明堂上圓下方上圓法天下方法地十二堂法日辰九室法九州室八窗八九七十二法一時之王室有二戶二九十八戶法土王十八日內堂正壇高三尺土階三等胡伯始注漢官云古清廟蓋以茅今蓋以瓦下藉茅以存古制自晉以前未有鵄尾其圓牆璧水一依本圖晉堂方構不合天文既缺重樓又無璧水空堂乖五室之義直殿違九階之文非古欺天一何過甚後魏於北臺城南造圓牆在璧水外門在水內迥立不與牆相連其堂上九室三三相重不依古制室間通巷違舛處多其室皆用墼纍極成褊陋宋起居注曰孝武帝大明五年立明堂其牆宇規範擬則太廟唯十二間以應朞數梁武帝移宋時太極殿以為明堂無室十二間自古明堂圖惟有二本一是宗周劉熙阮諶劉昌宗等作三圖略同一是後漢建武三十年作禮圖有本不詳撰人臣遠尋經傳傍求子史研究衆說總撰今圖其樣以木為之下為方堂堂有五室上為圓觀觀有四門會遼東之役不果行十三年上之滅陳也以陳叔寶屏風賜突厥大義公主厥九勿翻公主以其宗國之覆謂周亡也書屏風為詩敍陳亡以自寄上聞而惡之惡烏路翻禮賜漸薄彭公劉昶先尚周公主流人楊欽亡入突厥詐言昶欲與其妻作亂攻隋遣欽密告大義公主發兵擾邊都藍可汗信之乃不修職貢頗為邊患可從刊入聲汗音寒隋制車騎將軍階正五品非職事官騎奇寄翻使疏吏翻長知兩翻晟承正翻公主見晟言辭不遜又遣所私胡人安遂迦與楊欽計議迦求伽翻扇惑都藍晟至京師具以狀聞上遣晟往索欽索山客翻都藍不與曰檢校客內無此色人晟乃賂其達官知欽所在夜掩獲之以示都藍因發公主私事國人大以為恥都藍執安遂迦等並以付晟上大喜加授開府儀同三司仍遣入突厥廢公主內史侍郎裴矩請說都藍使殺公主說輸芮翻時處羅侯之子染干號突利可汗考異曰突厥傳云沙鉢略子今從長孫晟傳遣使求婚使疏吏翻上使裴矩謂之曰當殺大義公主乃許婚突利復譖之於都藍復扶又翻都藍因發怒殺公主更表請婚朝議將許之朝直遙翻長孫晟曰臣觀雍虞閭反覆無信直以與玷厥有隙雍虞閭都藍玷厥達頭也雖與為婚終當叛去今若得尚公主承藉威靈玷厥染干必受其徵發強而更反後恐難圖且染干者處羅侯之子素有誠款於今兩代前乞通婚不如許之招令南徙兵少力弱易可撫馴少詩沼翻易以豉翻馴松倫翻使敵雍虞閭以為邊捍上曰善復遣晟慰諭染干許尚公主為隋破都藍樹立染干張本復扶又翻十三年牛弘使協律郎范陽祖孝孫等參定雅樂隋制太常有協律郎二人隋志涿郡涿縣舊置范陽郡開皇初郡廢又上谷郡淶水縣舊曰遒開皇元年以范陽為遒縣更置范陽於此從字之上更有孝孫二字文意乃明隋志南海郡含洭縣梁置陽山郡順月皆驗又每律生五音十二律為六十音因而六之為三百六十音分直一歲之日以配七音而旋相為宮之法由是著名名一作明上猶記何妥之言妥言見上卷九年不聽作旋宮但用黃鍾一宮於是弘等復為奏附順上意其前代金石並銷毀之以息異議弘等又作武舞以象隋之功德郊廟饗用一調迎氣用五調郊廟用一調止用黃鍾一宮迎氣用五調春用角夏用徵中央用宮秋用商冬用羽調徒釣翻其餘聲律皆不復通復扶又翻十四年十四年春三月樂成夏四月乙丑詔行新樂且曰民間音樂流僻日久棄其舊體競造繁聲宜加禁約務存其本萬寶常聽太常所奏樂泫然泣曰樂聲淫厲而哀天下不久將盡時四海全盛聞者皆謂不然大業之末其言卒驗卒子恤翻寶常貧而無子久之竟餓死且死悉取其書燒之寶常撰樂譜六十四卷具論八音旋相為宮之法改絃移柱之變為八十四調一百四十四律終於千八百聲為之應手成曲曰用此何為十四年先是臺省府寺及諸州皆置公廨錢先悉薦翻廨古隘翻收息取給工部尚書章甲十一行本書下有扶風二字乙十一行本同孔本同蘇孝慈唐六典工部尚書周之冬官卿也漢五曹尚書其三曰民曹後漢以民曹兼主繕修工作鹽池園苑之事自晉宋齊梁陳營宗廟則權置起部尚書事畢省之後周依周官置大司空卿一人隋開皇二年始置工部尚書官司出舉興生煩擾百姓敗損風俗敗補邁翻請皆禁止給地以營農上從之六月丁卯始詔公卿以下皆給職田職分田起於後周頃畝以品為差下至隋唐代有增減與民爭利治直之翻十四年秋七月乙未以邳公蘇威為納言十四年初張賓曆既行開皇四年行張賓曆見一百七十六卷陳長城公至德二年隋志武安郡永平縣舊曰廣平置廣平郡仁壽元年改永平縣信都郡置冀州焯職略翻賓方有寵於上劉暉附會之共短孝孫斥罷之後賓卒孝孫為掖縣丞隋志萊州東萊郡治掖縣上其事詔留直太史以他官入太史曹為直太史上時掌翻調徒釣翻乃抱其書使弟子輿櫬來詣闕下櫬初覲翻伏而慟哭執法拘而奏之帝異焉以問國子祭酒何妥妥言其善乃遣與賓曆比校短長直太史勃海張胄玄隋志勃海郡開皇六年置棣州異論鋒起久之不定上令參問日食事楊素等奏太史凡奏日食二十有五率皆無驗胄玄所刻前後妙中刻刻定也中竹中翻驗亦過半於是上引孝孫胄玄等親自勞徠勞力到翻孝孫請先斬劉暉乃可定曆帝不懌又罷之孝孫尋卒卒子恤翻十四年關中大旱民飢上遣左右視民食得豆屑雜糠以獻上流涕以示㣥臣深自咎責為之不御酒肉為于僞翻殆將一朞八月辛未上帥民就食於洛陽帥讀曰率敕斥候不得輒有驅逼男女參廁於仗衛之間遇扶老攜幼者輒引馬避之慰勉而去至艱險之處見負擔者擔都濫翻令左右扶助之十四年冬閏十月甲寅詔以齊梁陳宗祀廢絶命高仁英蕭琮陳叔寶以時修祭所須器物有司給之陳叔寶從帝登邙山邙山在洛陽城北賦詩曰日月光天德山河壯帝居太平無以報願上東封書上時掌翻並表請封禪帝優詔答之他日復侍宴復扶又翻及出帝目之曰此敗豈不由酒以作詩之功何如思安時事當賀若弼渡京口彼人密啓告急渡京口事見上卷九年遂不之省省悉井翻高熲至日猶見啓在牀下未開封此誠可笑蓋天亡之也昔苻氏征伐所得國皆榮貴其主謂苻堅也事見晉紀不知違天令與之官乃違天也十四年齊州刺史盧賁隋志齊郡舊曰齊州治歷城糶他弔翻除名帝後復欲授以一州賁對詔失旨又有怨言帝大怒遂不用皇太子為言此輩並有佐命功雖性行輕險為于僞翻行下孟翻誠不可棄帝曰我抑屈之全其命也微劉昉鄭譯盧賁柳裘皇甫績等則我不至此然此等皆反覆子也當周宣帝時以無賴得幸及帝大漸顏之儀等請以趙王輔政此輩行詐顧命於我事見一百七十四卷陳宣帝太建十二年又欲亂之故昉謀大逆譯為巫蠱考異曰盧賁傳云昉為大逆於前譯為巫蠱於後按譯傳譯以開皇元年坐巫蠱廢昉以六年坐謀反誅賁傳誤也皆不滿志任之則不遜置之則怨望自為難信非我棄之衆人見此謂我薄於功臣斯不然矣賁遂廢卒於家卒子恤翻十四年晉王廣帥百官抗表固請封禪帥讀曰率帝令牛弘創定儀注既成帝視之曰茲事體大朕何德以堪之但當東巡因致祭泰山耳十二月乙未車駕東巡十四年上好禨祥小數好呼到翻禨居希翻上儀同三司蕭吉上書曰甲寅乙卯天地之合也吉上時掌翻今茲甲寅之年以辛酉朔旦冬至來年乙卯以甲子夏至冬至陽始郊天之日即至尊本命夏至陰始祀地之辰即皇后本命至尊德並乾之覆育覆敷又翻皇后仁同地之載養所以二儀元氣並會本辰上大悅賜物五百段吉懿之孫也蕭懿梁武帝之兄追封長沙王劭云乾鑿度云泰表戴干鄭玄注云表者人形體之彰識也干盾也泰人之表戴干散悉亶翻騎奇寄翻上悅拜著作郎隋志祕書省領太史著作二曹著作曹置郎二人上時掌翻言上受命符瑞甚衆又採民間歌謠引圖書讖緯捃托佛經讖楚譖翻捃居運翻托之石翻回易文字曲加誣飾撰皇隋靈感志三十卷奏之上令宣示天下劭集諸州朝集使盥手焚香章甲十一行本香下有閉目二字乙十一行本同孔本同張校同而讀之曲折其聲有如歌詠經涉旬朔遍而後罷上益喜前後賞賜優洽洽音狹朝直遙翻使疏吏翻十五年十五年春正月壬戌車駕頓齊州庚午為壇於泰山柴燎祀天以歲旱謝愆咎禮如南郊又親祀青帝壇赦天下十五年二月丙辰收天下兵器敢私造者坐之關中緣邊不在其例十五年三月己未至自東巡十五年仁壽宮成丁亥上幸仁壽宮時天暑役夫死者相次於道楊素悉焚除之上聞之不悅及至見制度壯麗大怒曰楊素殫民力為離宮為吾結怨天下為吾于僞翻素聞之惶恐慮獲譴以告封德彞曰公勿憂俟皇后至必有恩詔考異曰隋書北史皆曰宮成上令高熲前視奏稱頗傷綺麗大損人丁帝不悅素懼即於北門啓獨孤皇后曰帝王法有離宮別館今天下太平造一宮何足損費后以此理諭上上乃解今從唐書上果召素入對獨孤后勞之曰勞力到翻公知吾夫婦老無以自娛盛飾此宮豈非忠孝賜錢百萬錦絹三千段素負貴恃才多所陵侮唯賞重德彞每引之與論宰相職務終日忘倦因撫其牀曰封郎必須據吾此坐楊素賞重封德彞非但以其算略蓋心術亦相似帝擢為內史舍人十五年夏四月己丑朔赦天下十五年六月戊子詔鑿底柱底柱山在陝縣北大河中水經曰河水過砥柱門注云砥柱山名也昔禹治洪水山陵當水者鑿之故破山以通河河水分流包山而過山見水中若柱然故曰砥柱三穿既決水流疏分指狀表目亦謂之三門十五年庚寅相州刺史豆盧通貢綾文布燕慕容精歸魏北人謂歸義為豆盧子孫以為氏相息亮翻朝直遙翻十五年秋七月納言蘇威坐從祠泰山不敬免俄而復位上謂㣥臣曰世人言蘇威詐清家纍金玉此妄言也然其性狠戾狠戶墾翻不切世要求名太甚從己則悅違之必怒此其大病耳十五年戊寅上至自仁壽宮十五年冬十月戊子以吏部尚書韋世康為荊州總管世康洸之弟也韋洸安輯嶺南卒于官按隋書世康傳世康洸之兄洸古黃翻在吏部十餘年時稱廉平按世康傳自禮部尚書轉吏部尚書在開皇四年之前七年拜襄州刺史歷安州信州總管十三年入朝復拜吏部尚書出入踐揚前後十餘年不專在吏部也謂子弟曰祿豈須多防滿則退年不待暮有疾便辭因懇乞骸骨帝不許使鎮荊州時天下惟有四總管並揚益荊以晉秦蜀三王及世康為之當時以為榮十五年十一月辛酉上幸溫湯驪山溫湯也程大昌曰皇堂石井後周宇文護所造隋文帝又修屋宇並植松柏千餘株十五年十二月戊子敕盜邊糧一升已上皆斬考異曰刑法志事在十六年今從帝紀十五年己丑詔文武官以四考受代唐虞以三年為一考後世以一年為一考十五年汴州刺史令狐熙來朝隋志滎陽郡浚儀縣東魏置梁州後周改曰汴州令狐出於魏氏春秋晉大夫魏顆封於令狐子孫以為氏汴皮變翻賜帛三百匹雜物為段純物為匹熙整之子也令狐整見一百五十九卷梁武帝中大同元年十六年十六年春正月丁亥以皇孫裕為平原王筠為安成王嶷為安平王嶷魚力翻恪為襄城王該為高陽王韶為建安王煚為潁川王煚居永翻皆勇之子也十六年夏六月甲午初制工商不得仕進十六年秋八月丙戌詔決死罪者三奏然後行刑考異曰刑法志在十五年今從帝紀十六年冬十月己丑上幸長春宮隋志同州朝邑縣有長春宮壬子還長安十六年党項寇會州隋志汶山郡後周置汶州開皇初改曰蜀州尋為會州党底朗翻十六年帝以光化公主妻吐谷渾可汗世伏妻七細翻吐從暾入聲谷音浴可從刊入聲汗音寒世伏上表請稱公主為天后上不許伏上時掌翻十七年十七年春二月癸未太平公史萬歲擊南寧羌平之史萬歲襲爵太平縣公隋志太平縣屬絳郡南寧之地漢屬牂柯蜀漢屬南中晉屬寧州梁為南寧州其後為爨氏所據自云本安邑人七世祖晉南寧太守中國亂遂王蠻中考之晉志未始有南寧郡西爨蠻也非羌也通鑑因隋紀成文梁睿之克王謙也見一百七十四卷陳宣帝太建十二年唯南寧州酋帥爨震恃遠不服獠魯皓翻酋慈秋翻帥所類翻爨七亂翻睿上疏以為南寧州漢世牂柯之地牂柯音臧柯上時掌翻戶口殷衆金寶富饒梁南寧州刺史徐文盛為湘東王徵赴荊州徵兵以討侯景文盛赴之未遑遠略屬之欲翻夏戶雅翻土民爨瓚遂竊據一方瓚從旱翻國家遙授刺史其子震相承至今而震臣禮多虧貢賦不入乞因平蜀之衆略定南寧章甲十一行本寧下有帝以天下初定未之許九字乙十一行本同孔本同其後南寧夷爨玩來降拜昆州刺史就其地置昆州降戶江翻下同乃以左領軍將軍史萬歲為行軍總管帥衆擊之復扶又翻帥讀曰率入自蜻蛉川至于南中蜻蛉川漢蜻蛉縣之地蜻倉經翻蛉郎丁翻萬歲皆擊破之過諸葛亮紀功碑唐史南詔王鳳迦異築柘東城有諸葛亮石刻故在按唐史太宗擊西爨開蜻蛉弄棟為縣弄棟西有大勃弄小勃弄二州蠻其西與黃瓜葉榆西洱河接西洱河即葉榆河也蘇軾曰南詔有西洱河即牂柯江也河形如月抱珥故名之為西洱河洱而止翻又而志翻行千餘里破其三十餘部虜獲男女二萬餘口諸夷大懼遣使請降獻明珠徑寸於是勒石頌美隋德萬歲請將爨玩入朝使疏吏翻朝直遙翻請將音如字攜也領也詔許之爨玩陰有二心不欲詣闕賂萬歲以金寶萬歲於是捨玩而還為史萬歲得罪張本還從宣翻又如字十七年庚寅上幸仁壽宮十七年桂州俚帥李光仕作亂始安郡梁置桂州俚音里帥所類翻下渠帥同法尚發嶺南兵世積發嶺北兵俱會尹州隋志鬱林郡梁置定州後改為南定州平陳改尹州不能進瘴之亮翻熱病頓于衡州隋志衡山郡平陳置衡州光仕戰敗帥徑兵走保白石洞白石洞在今尋州南六十里帥讀曰率下同其黨有來降者輒以妻子還之居旬日降者數千人降戶江翻光仕衆潰而走追斬之帝又遣員外散騎侍郎何稠募兵討光仕稠諭降其黨莫崇等姓苑何氏出自周成王母弟唐叔虞其後封於韓韓滅子孫分散江淮間音以韓為何字隨音變後遂為何氏莫姓楚莫敖之後散悉亶翻騎奇寄翻承制署首領為州縣官稠妥之兄子也妥他果翻上以嶺南夷越數反數所角翻以汴州刺史令狐熙為桂州總管十七州諸軍事許以便宜從事刺史以下官得承制補授熙至部大弘恩信其溪洞渠帥更相謂曰令力丁翻帥所類翻更工衡翻前時總管皆以兵威相脅今者乃以手教相諭我輩其可違乎於是相帥歸附先是州縣生梗先悉薦翻長吏多不得之官長知兩翻寄政於總管府熙悉遣之為建城邑為于僞翻開設學校華夷感化焉俚帥帥所類翻寧猛力在陳世已據南海隋因而撫之拜安州刺史猛力恃險驕倨未嘗參謁熙諭以恩信猛力感之詣府請謁不敢為非熙奏改安州為欽州隋志寧越郡梁置安州今改欽州十七年帝以所在屬官不敬憚其上事難克舉三月壬辰詔諸司論屬官罪有律輕情重者聽於律外斟酌決杖於是上下相驅迭行捶楚以殘暴為幹能以守法為懦弱捶止蕊翻懦乃臥翻又奴亂翻帝以盜賊繁多命盜一錢以上皆棄市或三人共盜一瓜事發即死於是行旅皆晏起早宿恐邂逅觸罪也考異曰刑法志作晚宿必早字誤耳有數人劫執事而謂之曰吾豈求財者邪邪音耶但為枉人來耳而為我奏至尊自古以來體國立法未有盜一錢而死者也而不為我以聞吾更來而屬無類矣帝聞之為停此法自古以來閭里姦豪持吏短長者則有之矣未聞持其上至此者宜隋季之多盜也天下之富一錢之積是以古之為政欲其平易近民為于僞翻而為而不而屬之而猶言汝也帝嘗乘怒欲以六月杖殺人大理少卿河東趙綽固爭隋制九寺各置卿少卿各一人河東縣蒲州河東郡治少始照翻季夏之月天地成長庶類長知兩翻下同不可以此時誅殺帝報曰六月雖曰生長此時必有雷霆我則天而行有何不可遂殺之大理掌固來曠上言大理官司太寬掌固蓋即漢之掌故唐省臺寺監皆有掌固因隋制也上時掌翻遣每旦於五品行中參見遣猶使也行戶剛翻見賢遍翻帝使信臣推驗初無阿曲帝怒命斬之綽固爭以為曠不合死帝拂衣入閣綽矯言臣更不理曠自有他事未及奏聞帝命引入閣綽再拜請曰臣有死罪三臣為大理少卿不能制御掌固使曠觸挂天刑一也囚不合死而臣不能死爭二也臣本無他事而妄言求入三也帝解顏會獨孤后在坐坐徂臥翻命賜綽二金杯酒並杯賜之曠因免死徙廣州蕭摩訶子世略在江南作亂摩訶當從坐上曰世略年未二十亦何能為以其名將之子為人所逼耳將即亮翻因赦摩訶綽固諫不可上不能奪欲綽去而赦之因命綽退食綽曰臣奏獄未決不敢退上曰大理其為朕特赦摩訶也因命左右釋之為于僞翻刑部侍郎辛亶嘗衣緋褌衣於既翻褌古渾翻褻衣也俗云利官上以為厭蠱厭一協翻又於琰翻將斬之綽曰法不當死臣不敢奉詔上怒甚曰卿惜辛亶而不自惜也命引綽斬之綽曰陛下寧殺臣不可殺辛亶至朝堂解衣當斬上使人謂綽曰竟何如對曰執法一心不敢惜死上拂衣而入良久乃釋之明日謝綽勞勉之賜物三百段勞力到翻時上禁行惡錢有二人在市以惡錢易好者武候執以聞武候屬左右武候將軍掌晝夜巡察執捕姦非也綽進諫曰此人所坐當杖殺之非法上曰不關卿事綽曰陛下不以臣愚暗置在法司欲妄殺人豈得不關臣事上曰撼大木不動者當退對曰臣望感天心何論動木上復曰啜羹者熱則置之復扶又翻下同啜昌悅翻天子之威欲相挫邪邪音耶綽拜而益前訶之不肯退訶虎何翻上遂入治書侍御史柳彧復上奏切諫上乃止治直之翻復上時掌翻上以綽有誠直之心每引入閣中或遇上與皇后同榻即呼綽坐評論得失前後賞賜萬計與大理卿薛胄同時俱名平恕然胄斷獄以情而綽守法俱為稱職斷丁亂翻稱尺證翻胄端之子也薛端仕周為蔡州刺史無他異稱帝晚節用法益峻御史於元日不劾武官衣劍之不齊者劾戶蓋翻又戶得翻帝曰爾為御史縱捨自由命殺之諫議大夫毛思祖諫又殺之隋門下省置諫議大夫七人麥肙麥肙圭玄翻類篇曰麥莖也武庫令以署庭荒蕪武庫令屬衛尉寺或授牧宰馬鞭鸚鵡使疏吏翻授當作受帝察知並親臨斬之帝既喜怒不恆不復依準科律恆戶登翻復扶又翻下同信任楊素素復任情不平與鴻臚少卿陳延有隙少始照翻嘗經蕃客館庭中有馬屎又衆僕於氈上樗蒲以白帝帝大怒主客令及樗蒲者皆杖殺之棰陳延幾死隋志鴻臚寺統典客令即主客也屎式爾翻糞也棰止蕊翻幾居依翻又音祁帝遣親衛大都督長安屈突通往隴西檢覆㣥牧隋氏置左右親衛左右勳衛左右翊衛有大都督帥都督都督等官煬帝改大都督為校尉帥都督為旅帥都督為隊正屈突虜復姓其先昌黎徒河人徙家長安隴西郡渭州屈九勿翻帝大怒將斬太僕卿慕容悉達及諸監官千五百人太僕卿掌牧畜之政故欲誅之人命至重陛下奈何以畜産之故殺千有餘人臣敢以死請帝瞋目叱之瞋昌真翻通又頓首曰臣一身分死分扶問翻就陛下丐千餘人命帝感寤曰朕之不明以至於此賴有卿忠言耳於是悉達等皆減死論擢通為左武候將軍隋志左右武候掌車駕出先驅後殿晝夜巡察執捕姦非烽候道路水草所置巡狩師田則掌其營禁也十七年上柱國章甲十一行本國下有彭公二字乙十一行本同孔本同劉昶與帝有舊帝甚親之其子居士任俠不遵法度數有罪數所角翻上以昶故每原之居士轉驕恣取公卿子弟雄健者輒將至家以車輪括其頸而棒之棒蒲項翻殆死能不屈者稱為壯士釋而與交黨與三百人毆擊路人毆烏口翻多所侵奪至於公卿主莫敢與校或告居士謀為不軌帝怒斬之公卿子弟坐居士除名者甚衆十七年楊素牛弘等復薦張胄玄曆術去年帝勞徠胄玄既而罷之復扶又翻皆舊法久難通者令劉暉等與胄玄等辨析暉杜口一無所答胄玄通者五十四上乃拜胄玄員外散騎侍郎兼太史令賜物千段令參定新術散悉亶翻騎奇寄翻胄玄曆成夏四月戊寅詔頒新曆前造曆者劉暉四人並除名十七年秋七月桂州人李世賢反上議討之諸將數人請行將即亮翻上不許顧右武候大將軍虞慶則曰位居宰相爵乃上公開皇初慶則嘗為尚書右僕射宰相之職也授上柱國封魯國公上公也遂無行意何也慶則拜謝恐懼乃以慶則為桂州道行軍總管討平之十七年秦王俊幼仁恕喜佛教喜許記翻嘗請為沙門不許及為並州總管俊為並州總管見上卷十年違越制度盛治宮室俊好內治直之翻好呼報翻其崔氏弘度之妹也性妬於瓜中進毒由是得疾徵還京師上以其奢縱丁亥免俊官以王就第崔以毒王廢絶賜死於家左武衛將軍劉升曹魏置武衛將軍自晉至于高齊並屬左右衛至隋始與左右衛並列於十二衛府秦王非有他過但費官物營廨舍而已廨古隘翻臣謂可容上曰法不可違楊素諫曰秦王之過不應至此願陛下詳之復扶又翻上曰我是五兒之父上五子太子勇晉王廣秦王俊蜀王秀漢王諒若如公意何不別制天子兒律以周公之為人尚誅管蔡我誠不及周公遠矣安能虧法乎卒不許楊素逢君之惡者也他日贊決以廢勇立廣蓋有見於此卒子恤翻十七年戊戌突厥突利可汗來逆女厥九勿翻可從刊入聲汗音寒上舍之太常教習六禮六禮納采問名納吉納徵請期親迎上欲離間都藍故特厚其禮妻七細翻間古莧翻遣太常卿牛弘納言蘇威民部尚書斛律孝卿相繼為使開皇三年改度支尚書為民部尚書使疏吏翻突利本居北方既尚主長孫晟說其帥衆南徙居度斤舊鎮度斤舊鎮蓋即都斤山突厥沙鉢略舊所居也帥讀曰率賚來代翻都藍怒曰我大可汗也反不如染干於是朝貢遂絶亟來抄掠邊鄙朝直遙翻下同亟去吏翻抄楚交翻突利伺知動靜輒遣奏聞由是邊鄙每先有備伺相吏翻十七年九月甲申上至自仁壽宮十七年何稠之自嶺南還也是年二月何稠討嶺南稠見其疾篤遣還欽州與之約曰八九月間可詣京師相見使還奏狀上意不懌使疏吏翻下同冬十月猛力病卒上謂稠曰汝前不將猛力來今竟死矣稠曰猛力與臣約假令身死當遣子入侍令力丁翻越人性直其子必來猛力臨終果戒其子長真曰我與大使約不可失信使疏吏翻汝葬我畢宜即登路長真嗣為刺史如言入朝嗣祥吏翻上大悅曰何稠著信蠻夷乃至於此十七年魯公虞慶則之討李世賢也以婦弟趙什住為隨府長史長知兩翻什住通於慶則愛妾恐事泄乃宣言慶則不欲此行上聞之禮賜甚薄慶則還至潭州臨桂嶺隋書虞慶則傳作潭州臨桂嶺宋白曰隋平陳改湘州為潭州杜佑曰取昭潭為名曰此誠險固加以足糧若守得其人攻不可拔使什住馳詣京師奏事觀上顏色什住因告慶則謀反下有司按驗下遐稼翻十二月壬子慶則坐死拜什住為柱國十七年高麗王湯聞陳亡大懼治兵積穀為拒守之策麗力知翻治直之翻是歲上賜湯璽書責以雖稱藩附誠節未盡且曰彼之一方雖地狹人少璽斯氏翻少詩沼翻下同今若黜王不可虛置終須更選官屬就彼安撫王若灑心易行灑讀曰洗行下孟翻率由憲章即是朕之良臣何勞別遣才彥王謂遼水之廣何如長江高麗之人多少陳國少詩沼翻朕若不存含育責王前愆命一將軍何待多力殷勤曉示許王自新耳湯得書惶恐將奉表陳謝會病卒卒子恤翻子元嗣立上使使拜元為上開府儀同三司襲爵遼東公使使疏吏翻下同因請封王上許之自時隋終以高麗為意後遂以佳兵亡國十七年吐谷渾大亂吐從暾入聲谷音浴立其弟伏允為主遣使陳廢立之事並謝專命之罪且請依俗尚主上從之自是朝貢歲至朝直遙翻十八年十八年春二月甲辰上幸仁壽宮十八年高麗王元帥靺鞨之衆萬餘寇遼西隋書靺鞨在高麗之北凡有七種其一號栗末部與高麗接其二曰伯咄部在栗末之北其三曰安車骨部在伯咄東北其四曰拂涅部在伯咄東其五曰號室部在拂涅東其六曰黑水部在安車骨西北其七曰白山部在栗末東南而黑水部猶為徑健即古之肅慎氏也遼西郡治柳城隋置營州總管府靺莫撥翻鞨戶葛翻上聞而大怒乙巳以漢王諒王世積並為行軍元帥將水陸三十萬伐高麗帥所類翻將即亮翻以尚書左僕射高熲為漢王長史長知兩翻周羅睺為水軍總管十八年延州刺史獨孤陀隋志延安郡後魏置東夏州西魏改延州陀徒河翻阿烏葛翻尼女夷翻下同事貓鬼能使之殺人云每殺人則死家財物潛移於畜貓鬼家會獨孤后及楊素妻鄭氏俱有疾醫皆曰貓鬼疾也隋書陀傳云徐阿尼事貓鬼每以子夜祀之言子者鼠也陀嘗從家中索酒其妻曰無錢可酤陀因謂阿尼曰可令貓鬼向越公家使我足錢也阿尼便呪之居數日貓鬼向素家十一年上初從並州還陀謂阿尼曰可令貓鬼向皇后所使多賜吾物阿尼復呪之遂入宮中大理丞楊遠乃於門下外省遺阿尼呼貓鬼阿尼於是夜中置香粥一盆以匙扣而呼之曰貓女可來無住宮中久之阿尼色正青若被牽曳者云貓鬼已至由是其事具得實畜吁玉翻下同后之異母弟陀妻楊素異母妹由是意陀所為令高熲等雜治之具得其實治直之翻上怒令以犢車載陀夫妻將賜死章甲十一行本死下有於家二字乙十一行本同孔本同獨孤后三日不食為之請命曰為于僞翻下同陀若蠹政害民者妾不敢言今坐為妾身敢請其命陀弟司勳侍郎整詣闕求哀司勳侍郎屬吏部尚書除名為民以其妻楊氏為尼先是有人訟其母為貓鬼所殺者上以為妖妄怒而遣之妖於驕翻至是詔誅被訟行貓鬼家先悉薦翻被皮義翻夏四月辛亥詔畜貓鬼蠱毒厭媚野道之家隋書志江南諸郡往往畜蠱而宜春偏甚其法以五月五日聚百種蟲大者至蛇小者至蝨合置器中令自相啖餘一種存者留之蛇則曰蛇蠱蝨則曰蝨蠱行以殺人因食入人腹內食其五藏死則其産移入蠱主之家三年不殺他人則畜者自鍾其弊纍世子孫相傳不絶亦有隨女子嫁者厭於琰翻魅音媚十八年六月丙寅下詔黜高麗王元官爵麗力知翻漢王諒軍出臨渝關臨渝關在柳城西四百八十里所謂盧龍之險也渝漢書音喻餽運不繼軍中乏食復遇疾疫復扶又翻周羅睺自東萊泛海趣平壤城隋書平壤城東西六里隨山屈曲南臨浿水杜佑曰平壤城則故朝鮮國王險城也趣七喻翻船多飄沒秋九月己丑師還死者什八九高麗王元亦惶懼遣使謝罪使疏吏翻下同上表稱遼東糞土臣元上於是罷兵待之如初百濟王昌遣使奉表請為軍導帝下詔諭以高麗服罪朕已赦之不可致伐厚其使而遣之高麗頗知其事以兵侵掠其境十八年辛卯上至自仁壽宮十八年冬十一月癸未上祀南郊十八年十二月自京師至仁壽宮置行宮十有二所十八年南寧夷爨玩復反復扶又翻蜀王秀奏史萬歲受賂縱賊致生邊患上責萬歲萬歲詆讕讕落干翻又力誕翻詆拒諱也讕逸辭也上怒命斬之高熲及左衛大將軍元旻等固請曰萬歲雄略過人將士樂為致力雖古名將未能過也上意少解於是除名為民將即亮翻樂音洛少詩沼翻十九年十九年春正月癸酉赦天下十九年二月甲寅上幸仁壽宮仁壽宮成於開皇十五年方其成也文帝怒欲罪楊素獨孤后喜而賞之繼此屢幸仁壽宮至仁壽之末卒死於仁壽宮仁者壽帝窮民力以作離宮可謂仁乎其不得死於是宮宜矣帝怒楊素而不加之罪其后喜則亦從而喜之豈非奢侈之能移人觸境而動至於流連而不知反卒詒萬世笑是知君德以節儉為貴也十九年突厥突利可汗因長孫晟奏言都藍可汗作攻具欲攻大同城唐志自夏州北渡烏水行五百三十餘里過橫水又行百一十九里至安樂戍戍在河西壖東壖有古大同城今大同城古永濟柵也厥九勿翻可從刊入聲汗音寒長知兩翻晟承正翻帥所類翻尚書左僕射高熲出朔州道隋志馬邑郡舊置朔州靈武郡後魏置靈州燕因肩翻皆取漢王節度然漢王竟不臨戎都藍聞之與達頭可汗結盟合兵掩襲突利大戰長城下突利大敗都藍盡殺其兄弟子姪遂渡河入蔚州隋志鴈門郡靈丘縣後周置蔚州蔚紆勿翻夜與長孫晟以五騎南走騎奇寄翻下同比旦行百餘里比必寐翻及也收得數百騎突利與其下謀曰今兵敗入朝一降人耳朝直遙翻下同降戶剛翻大隋天子豈禮我乎玷厥雖來本無冤隙冤猶怨也必相存濟晟知之密遣使者入伏遠鎮使疏吏翻令速舉烽突利見四烽俱發以問晟晟紿之曰城高地迥必遙見賊來我國家法若賊少舉二烽紿蕩亥翻少詩沼翻來多舉三烽大逼舉四烽彼見賊多而又近耳突利大懼謂其衆曰追兵已逼且可投城既入鎮晟留其達官執室領其衆自將突利馳驛入朝將如字四月丁酉突利至長安帝大喜以晟為左勳衛驃騎將軍隋制驃騎將軍正四品驃匹妙翻騎奇寄翻上令突利與都藍使者因頭特勒相辨詰突利辭直上乃厚待之都藍弟郁章甲十一行本郁作都乙十一行本同孔本同速六棄其妻子與突利歸朝使疏吏翻朝直遙翻上嘉之使突利多遺之珍寶以慰其心遺于季翻高熲使上柱國趙仲卿將兵三千為前鋒至族蠡山將即亮翻蠡音黎與突厥遇交戰七日大破之追奔至乞伏泊復破之虜千餘口雜畜萬計突厥復大舉而至仲卿為方陳厥九勿翻下同畜許又翻復扶又翻陳讀曰陳下同四面拒戰凡五日會高熲大兵至合擊之突厥敗走追度白道踰秦山七百餘里而還還從宣翻又如字楊素軍與達頭遇先是諸將與突厥戰慮其騎兵奔突皆以戎車步騎相參設鹿角為方陳騎在其內此古法也雖衛青劉裕未之能易也所謂先為不可勝以待敵之可勝者也先悉薦翻騎奇寄翻下同此乃自固之道未足以取勝也於是悉除舊法令諸軍為騎陳達頭聞之大喜曰天賜我也下馬仰天而拜帥騎兵十餘萬直前上儀同三司周羅睺曰賊陳未整請擊之帥精騎逆戰素以大兵繼之突厥大敗達頭被重創而遁殺傷不可勝計其衆號哭而去魏舒毀車崇卒以敗狄楊素除戎車為騎陳以破突厥皆鼓儳而勝耳帥讀曰率勝音升號戶高翻十九年六月丁酉以豫章王暕為內史令暕古限翻十九年宜陽公王世積為涼州總管其親信安定皇甫孝諧有罪王世積封宜陽郡公隋志河南郡宜陽縣後魏置宜陽郡武威郡舊置涼州安定郡舊置涇州亡抵世積世積不納孝諧配防桂州配防者配隸軍伍使之防守稱世積嘗令道人相其貴不上時掌翻令力丁翻相息亮翻不讀曰否道人答曰公當為國主又將之涼州之往也可圖大事世積曰涼州土曠人希非用武之國世積坐誅拜孝諧上大將軍十九年獨孤后性妬忌後宮莫敢進御尉遲迥女孫有美色先沒宮中尉紆勿翻先悉薦翻下同上於仁壽宮見而悅之因得幸后伺上聽朝伺相吏翻朝直遙翻陰殺之上由是大怒單騎從苑中出不由徑路入山谷間二十餘里高熲楊素等追及上扣馬苦諫上太息曰吾貴為天子不得自由高熲曰陛下豈以一婦人而輕天下上意少解少詩沼翻駐馬良久中夜方還宮后俟上於閣內及至后流涕拜謝熲素等和解之還音旋又如字因置酒極歡先是后以高熲父之家客甚見親禮熲父賓為獨孤信參佐信被誅后以賓父之故吏數往來其家聞熲謂己為一婦人遂銜之時太子勇失愛於上潛有廢立之志從容謂熲曰從千容翻有神告晉王言王必有天下若之何熲長跪曰長幼有序其可廢乎章甲十一行本乎下有上默然而止五字乙十一行本同孔本同長幼之長知兩翻獨孤后知熲不可奪陰欲去之為后譖熲張本去羌呂翻會上令選東宮衛士以入上臺熲奏稱若盡取強者恐東宮宿衛太劣上作色曰我有時出入宿衛須得勇毅太子育德春宮左右何須壯士此極弊法如我意者恆於交番之日分向東宮上下團伍不別三百人為團五人為伍恆戶登翻上時掌翻下遐嫁翻別彼列翻我熟見前代公不須仍踵舊風熲子表仁娶太子女故上以此言防之熲夫人卒卒子恤翻獨孤后言於上曰高僕射老矣而喪夫人喪息浪翻陛下何能不為之娶為于僞翻下同上以后言告熲熲流涕謝曰臣今已老退朝唯齊居讀佛經而已朝直遙翻雖陛下垂哀之深至於納室非臣所願上乃止既而熲愛妾生男上聞之極喜后甚不悅上問其故后曰陛下尚復信高熲邪復扶又翻邪音耶始陛下欲為熲娶熲心存愛妾面欺陛下今其詐已見見賢遍翻安得信之上由是疏熲伐遼之役去年伐遼不從及師無功后言於上曰熲初不欲行陛下強遣之強其兩翻妾固知其無功矣又上以漢王年少少詩照翻專委軍事於熲熲以任寄隆重每懷至公無自疑之意諒所言多不用諒甚銜之及還泣言於后曰兒幸免高熲所殺上聞之彌不平及擊突厥出白道進圖入磧磧大磧也即所謂大漠磧七迹翻使疏吏翻近臣緣此言熲欲反上未有所答熲已破突厥而還此即謂前破突厥事還從宣翻音旋又如字推核之際有宮禁中事云於熲處得之上大驚有司又奏熲及左右衛大將軍元旻元胄並與世積交通受其名馬之贈旻胄坐免官上柱國賀若弼吳州總管宇文㢸若人者翻㢸古弼字刑部尚書薛胄開皇三年改都官尚書為刑部尚書上愈怒皆以屬吏屬之欲翻自是朝臣無敢言者朝直遙翻秋八月癸卯熲坐免上柱國左僕射以齊公就第未幾上幸秦王俊第召熲侍宴熲歔欷悲不自勝幾居豈翻歔音虛欷音希又許既翻勝音升獨孤后亦對之泣上謂熲曰朕不負公公自負也因謂侍臣曰我於高熲勝於兒子雖或不見常似目前自其解落瞑然忘之解落謂解官落職也暝莫定翻人臣不可以身要君要一遙翻自云第一也頃之熲國令上熲陰事隋制王國公國皆有令有尉上時掌翻司馬仲達初託疾不朝遂有天下司馬懿字仲達事見魏邵陵厲公紀朝直遙翻焉知非福熲國官承望上指以此誣熲蓋亦習見趙什住皇甫孝諧受賞而利之也焉於虔翻囚熲於內史省而鞫之憲司復奏沙門真覺嘗謂熲云明年國有大喪憲司法司也復扶又翻喪息郎翻十七十八年皇帝有大厄十九年不可過上聞而益怒顧謂㣥臣曰帝王豈可力求孔子以大聖之才猶不得天下熲與子言自比晉帝此何心乎有司請斬之上曰去年殺虞慶則今茲斬王世積如更誅熲天下其謂我何於是除名為民熲初為僕射帝受禪熲即為僕射汝富貴已極但有一斫頭耳爾其慎之熲由是常恐禍變至是熲歡然無恨色先是國子祭酒元善言於上曰楊素粗疏蘇威怯懦元胄元旻正似鴨耳楚辭曰寧泛泛若水中之鳧與波上下以全吾軀乎元善之意謂此先悉薦翻唯獨高熲上初然之及熲得罪上深責之善憂懼而卒卒子恤翻十九年九月章甲十一行本月下有乙丑二字乙十一行本同孔本同張校同退齊校同以太常卿牛弘為吏部尚書弘選舉先德行而後文才務在審慎雖致停緩其所進用並多稱職先悉薦翻行下孟翻後戶遘翻稱尺證翻吏部侍郎高孝基鑒賞機晤清慎絶倫然爽俊有餘迹似輕薄時宰多以此疑之唯弘深識其真推心任委隋之選舉得人於斯為最時論彌服弘識度之遠十九年冬十月甲午以突厥突利可汗為意利珍豆啓民可汗華言意智健也厥九勿翻可從刊入聲汗音寒突厥歸啓民者男女萬餘口上命長孫晟將五萬人於朔州築大利城以處之長知兩翻晟承正翻將即亮翻下同大利城在雲內縣東北隋志定襄郡治大利縣處昌呂翻下同時安義公主已卒十七年安義公主嫁突厥卒子恤翻復扶又翻妻七細翻晟奏染干部落歸者益衆雖在長城之內猶被雍虞閭抄掠不得寧居抄楚交翻請徙五原以河為固鹽州五原之地隋志朔方郡後魏置夏州榆林郡開皇二十年置勝州杜佑曰勝州治榆林縣漢沙南縣地有雲中城拂雲堆金河紫河自馬邑郡善陽界流入縣西有漢五原城夏戶雅翻南北四百里掘為橫塹塹七豔翻令處其內令力丁翻處昌呂翻使得任情畜牧上從之又令上柱國趙仲卿屯兵二萬為啓民防達頭為于僞翻代州總管韓洪等將步騎一萬鎮恆安隋志鴈門後周置肆州開皇五年改曰代州舊唐志恆安鎮在隋馬邑郡雲內縣界唐為雲州雲中縣即後魏所都平城之地恆戶登翻韓洪軍大敗騎奇寄翻仲卿自樂寧鎮邀擊斬首千餘級十九年帝遣越公楊素出靈州行軍總管韓僧壽出慶州弘化郡開皇十六年置慶州涿郡懷戎縣後齊置北燕州後周去北字燕因肩翻枹罕郡舊置河州師未出塞十二月乙未都藍為部下所殺達頭自立為步迦音加可汗其國大亂長孫晟言於上曰今官軍臨境戰數有功數所角翻虜內自攜離其主被殺乘此招撫可以盡降請遣染干部下分道招慰上從之降者甚衆被皮義翻降戶江翻王崇武標點容肇祖聶崇岐覆校
