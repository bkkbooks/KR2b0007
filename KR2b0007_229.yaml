body:
  text: 資治通鑑卷第二百二十九端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀四十五德宗神武聖文皇帝四建中四年建中四年癸亥七八三建中四年十一月乙亥以隴州為奉義軍擢皋為節度使泚又使中使劉海廣許皋鳳翔節度使皋斬之史言韋皋以此發身使疏吏翻泚且禮翻建中四年靈武留後杜希全鹽州刺史戴休顏夏州刺史時常春會渭北節度使李建徽合兵萬人入援靈武節度使治靈州夏州治朔方縣鹽州治五原縣皆鄰境相接渭北節度使本治坊州時徙治鄜州夏戶雅翻上召將相議道所從出關播渾瑊曰漠谷道險狹召將即亮翻相息亮翻渾戶昆翻又戶本翻瑊古銜翻漠谷在奉天城西北恐為賊所邀不若自乾陵北過附柏城而行山陵樹柏成行以遮迾陵寢故謂之柏城宋白曰唐諸陵皆栽柏環之貞元六年十一月敕諸陵柏城四面各三里內不得安葬過古禾翻又古臥翻與城中掎角相應掎居蟻翻且分賊勢盧曰漠谷道近若為賊所邀則城中出兵應接可也儻出乾陵恐驚陵寢瑊曰自泚攻城斬乾陵松柏以夜繼晝其驚多矣今城中危急諸道救兵未至惟希全等來所繫非輕若得營據要地則泚可破也曰陛下行師豈比逆賊若令希全等過之是自驚陵寢泚且禮翻又音此令力丁翻上乃命希全等自漠谷進丙子希全等軍至漠谷果為賊所邀乘高以大弩巨石擊之死傷甚衆城中出兵應接為賊所敗是夕四軍潰退保邠州泚閲其輜重於城下從官相視失色自兩河兵興以至乘輿播遷盧之言無一不誤國而德宗信之如故庸昏甚矣敗補邁翻從才用翻邠卑旻翻泚且禮翻又音此輜莊持翻重直用翻夏州人也夏戶雅翻泚攻城益急穿塹環之泚移帳於乾陵下視城中動靜皆見之時遣使環城塹七豔翻使疏吏翻環音宦招誘士民笑其不識天命誘音酉建中四年神策河北行營節度使李晟疾愈前年五月李晟疾甚自易州還保定州事見上卷晟成正翻帥衆將奔命帥讀曰率張孝忠迫於朱滔王武俊倚晟為援不欲晟行數沮止之數所角翻沮在呂翻晟乃留其子憑使娶孝忠女為婦又解玉帶賂孝忠親信使說之說式芮翻孝忠乃聽晟西歸遣大將楊榮國將鋭兵六百與晟俱晟引兵出飛狐道晝夜兼行至代州沈存中曰北嶽常岑謂之大茂山者是也半屬契丹以大茂山脊為界飛狐路在茂之西自銀冶寨北出倒馬關度虜界卻自石門子令水鋪入瓶形梅回兩寨之間至代州今此路已不通惟北寨西出承天關路可至河東然路極峭狹按存中所謂地界乃石晉與契丹所分地界也丁丑加晟神策行營節度使史言李晟前只節度河北神策出征兵行營今又加節度神策行營兵出征河南者此其所以得誅劉德信也建中四年王武俊馬實攻趙州不克辛巳實歸瀛州武俊送之五里犒贈甚厚武俊亦歸恆州恆戶登翻建中四年上之出幸奉天也陝虢觀察使姚明揚陝失冉翻揚與揚同以軍事委都防禦副使張勸去詣行在勸募兵得數萬人甲申以勸為陝虢節度使建中四年朱泚攻圍奉天經月是年十月上出奉天才至奉天數日而朱泚繼至攻圍至是月為經月上嘗遣健步出城覘賊健步今之急腳子是也覘丑廉翻跪奏乞一襦袴襦汝朱翻短衣上為之尋求不獲為于僞翻竟憫默而遣之憫者矜其寒默者無以為辭也每伺賊之休息夜縋人於城外采蕪菁根而進之本草曰蕪菁及蘆蔔南北通有之蕪菁即蔓菁蘆蔔即蘿蔔也陶隱居云蘆蔔是今溫菘其根可食葉不中噉蕪菁根乃細於溫菘而葉似菘好食日華子曰梗長葉瘦高者為菘闊厚短肥而庳及梗細者為蕪菁葉也陸佃埤雅曰舊說菘菜北種初年半為蕪菁二年菘種都絶蕪菁南種亦然菘之不生北土猶橘柚之變於淮北矣蕪菁似菘而小有臺一名葑一名須史照曰本草注云蕪菁北人又名蔓菁根葉及子乃是菘類詩云采葑采菲疏云陸璣云葑蕪菁幽州人或謂之芥方言云豐蕘蕪菁也陳楚謂之葑齊魯謂之蕘關西謂之蕪菁趙魏之部謂之大芥糲盧達翻伺相吏翻縋馳僞翻朕以不德自陷危亡固其宜也公輩無罪宜早降以救室家降戶江翻㣥臣皆頓首流涕期盡死力故將士雖困急而鋭氣不衰上之幸奉天也糧料使崔縱勸李懷光令入援崔縱為魏縣行營糧料使縱悉斂軍資與懷光皆來懷光晝夜倍道至河中力疲休兵三日河中尹李齊運傾力犒宴犒口到翻軍章十二行本軍下有士字乙十一行本同孔本同張校同退齊校同尚欲遷延崔縱先輦貨財渡河謂衆曰至河西悉以分賜開元八年析河東縣自蒲津以西為河西縣西屯蒲城有衆五萬齊運惲之孫也蔣王惲太宗子也惲於粉翻李晟行且收兵亦自蒲津濟軍於東渭橋其始有卒四千晟善於撫御與士卒同甘苦人樂從之晟成正翻樂音洛旬月間至萬餘人神策兵馬使尚可孤討李希烈將三千人在襄陽自武關入援軍于七盤使疏吏翻將即亮翻又音如字七盤即古繞霤之險敗泚將仇敬仇敬即仇敬忠此因舊史書之敗補邁翻可孤宇文部之別種也種章勇翻鎮國軍副使駱元光肅宗上元元年置鎮國軍於華州駱奉先養以為子將兵守潼關近十年為衆所服潼音童近其靳翻朱泚遣其將何望之襲華州刺史董晉棄州走行在華戶化翻下同走音奏望之據其城將聚兵以絶東道元光引關下兵襲望之走還長安還從宣翻又音如字元光遂軍華州召募士卒數日得萬餘人泚數遣兵攻元光泚且禮翻又音此數所角翻元光皆擊卻之賊由是不能東出上即以元光為鎮國軍節度使鎮國軍節度治華州馬燧遣其行軍司馬王權及其子彙將兵五千人入援屯中渭橋燧音遂彙于季翻宋敏求長安志引三輔黃圖曰渭水貫都以象天漢橫橋南渡以法牽牛蓋指此之中橋而為若言也橋之廣至及六丈其柱之多至於七百五十約其地望即唐太極宮之西而太倉之北也程大昌曰此橋舊止單名渭橋水經敍渭曰水上有梁謂之橋者是也後世加中以冠橋上者為長安之西別有便門橋渡渭萬年縣之東更有東渭橋故不得不以中別之也於是泚黨所據惟長安而已援軍遊騎時至望春樓下李忠臣等屢出兵皆敗求援於泚泚恐民間乘弊抄之望春樓近長樂城臨廣運潭玄宗所立騎奇寄翻抄楚交翻泚內以長安為憂乃急攻奉天使僧法堅造雲梯嚴梯改橋下同高廣各數丈高居傲翻廣古曠翻近世學者多各以音如字讀之考異曰劇談録曰高九十餘尺下瞰城中今從實録裹以兕革史照曰兕色如野牛而青一說雌犀也余按山海經兕角重百斤身重千斤黃帝得之以其皮冒鼓聲震百里其說固誕矣國語叔向曰唐叔殪兕以為大甲周官考工記犀甲壽百年兕甲壽二百年兕甲固堅於犀甲矣左傳宋華元之言曰犀兕尚多則兕者世之常有也然兕者今不常見史言朱泚裹雲梯以兕革不過用牛皮耳兕序姊翻上容壯士五百人城中望之忷懼上以問㣥臣渾瑊侯仲莊對曰臣觀雲梯勢甚重重則易陷忷許拱翻渾戶昆翻又戶本翻瑊古銜翻易以豉翻臣請迎其所來鑿地道積薪蓄火以待之神武軍使韓澄曰開元二十六年分左右羽林置左右神武軍使疏吏翻雲梯小伎不足上勞聖慮伎渠綺翻臣請禦之乃度梯之所傃度徒洛翻傃桑故翻向也鄭玄曰攻城攻其所傃傃猶嚮也廣城東北隅三十步多儲膏油松脂薪葦於其上丁亥泚盛兵鼓譟攻南城韓遊王褱曰此欲分吾力也乃引兵嚴備東北戊子北風甚迅譟則竈翻王褱古回翻迅疾也推吐雷翻上施濕氈懸水囊載壯士攻城翼以轒轀轒扶云翻轀於云翻轒轀攻城車也兵法修轒轀距堙者三月而後成置人其下抱薪負土填塹而前矢石火炬所不能傷賊併兵攻城東北隅矢石如雨城中死傷者不可勝數塹七豔翻勝音升賊已有登城者上與渾瑊對泣㣥臣惟仰首祝天上以無名告身自御史大夫實食五百戶以下千餘通授瑊無名告身即空名告身有功者則書填姓名以授之實食食實封也仍賜御筆使視其功之大小書名給之告身不足則書其身謂若立功者多所給告身千餘通酬功而不足則書陳前所喝轉階勳於其身以為照驗出給告身今便與卿別期望渾瑊死戰也上拊其背歔欷不自勝瑊古銜翻歔音虛欷許既翻又音希勝音升時士卒凍餒又乏甲胄瑊撫諭激以忠義皆鼓譟力戰瑊中流矢譟則竈翻中竹仲翻初不言痛會雲梯輾地道一輪偏陷不能前卻輾豬輦翻又尼展翻地道者渾瑊等所鑿以迎雲梯者也火從地中出火亦渾瑊等所蓄以待雲梯者城上人投葦炬散松脂沃以膏油歡呼震地歡許元翻須臾雲梯及梯上人皆為灰燼臭聞數里聞音問賊乃引退於是三門皆出兵時朱泚攻奉天城東南北三面故三門皆出兵與戰賊徒大敗死者數千人將士傷者太子親為裹瘡將即亮翻為于僞翻入夜泚復來攻城泚且禮翻又音此復扶又翻又音如字矢及御前三步而墜上大驚李懷光自蒲城引兵趣涇陽趣七喻翻並北山而西並讀曰傍步浪翻先遣兵馬使張韶微服間行詣行在間古莧翻下得間同藏表於蠟丸韶至奉天值賊方攻城見韶以為賤人驅之使與民俱填塹韶得間踰塹抵城下呼曰我朔方軍使者也塹七豔翻呼火故翻使疏吏翻城上人下繩引之比登比必利翻及也身中數十矢中竹仲翻得表於衣中而進之上大喜舁韶以徇城四隅歡聲如雷舁音余又羊茹翻癸巳懷光敗泚兵於澧泉敗補邁翻泚聞之懼引兵遁歸長安衆以為懷光復三日不至則城不守矣史言李懷光解奉天之圍不為無功泚且禮翻又音此泚既退從臣皆賀從才用翻汴滑行營兵馬使賈隱林進言陛下性太急不能容物若此性未改雖朱泚敗亡憂未艾也上不以為忤甚稱之使疏吏翻汴皮變翻使德宗果能以此心而受諫何至追仇陸贄之盡言乎忤五故翻侍御史萬俟著開金商運路萬當作万莫北翻俟渠之翻万俟虜復姓也開金商運路轉江淮財賦以至奉天重圍既解重直龍翻諸道貢賦繼至用度始振朱泚至長安但為城守之計時遣人自城外來周走呼曰呼火故翻奉天破矣欲以惑衆泚既據府庫之富不愛金帛以悅將士公卿家屬在城者皆給月俸將即亮翻俸扶用翻神策及六軍從車駕及哥舒曜李晟者泚皆給其家糧加以繕完器械日費甚廣及長安平府庫尚有餘蓄見者皆追怨有司之暴斂焉以此觀之趙贊輩不足責也杜佑判度支安能逃其罪乎斂力贍翻或謂泚曰陛下既受命唐之陵廟不宜復存復扶又翻泚曰朕嘗北面事唐豈忍為此又曰百官多缺請以兵脅士人補之泚曰強授之則人懼強其兩翻但欲仕者則與之何必叩戶拜官邪邪音耶泚所用者惟范陽神策團練兵團練兵即團結兵事見二百二十五卷代宗大曆十二年皆不為用但守其所掠資貨不肯出戰又密謀殺泚不果而止泚且禮翻又音此李懷光性粗疏粗讀與粗同自山東來赴難自魏縣行營來赴奉天之難魏縣屬魏州其地在河山之東難乃旦翻下同數所角翻且曰天下之亂皆此曹所為也吾見上當請誅之既解奉天之圍自矜其功謂上必接以殊禮禮絶百僚謂之殊禮說式芮翻翃戶萌翻懷光緣道憤歎以為宰相謀議乖方乖方猶言失所也京尹犒賜刻薄致乘輿播遷者三臣之罪也宰相指盧度支指趙贊京尹指王翃度徒洛翻斂力贍翻乘繩證翻上必披襟布誠詢章十二行本詢下有訪字乙十一行本同孔本同張校同得失使其言入豈不殆哉殆危也懼從容言於上曰從千容翻下同懷光勳業社稷是賴賊徒破膽皆無守心若使之乘勝取長安則一舉可以滅賊此破竹之勢也今聽其入朝必當賜宴留連纍日使賊入京城得從容成備恐難圖矣上以為然懷光矜功厚望其上而求逞其欲德宗欲速逼使其下而不閔其勞盧之心自營免罪而捭闔於其間是以雖急於平賊而不知更生一賊也朝直遙翻與李建徽李晟及神策兵馬使楊惠元刻期共取長安懷光自以數千里竭誠赴難破朱泚解重圍而咫尺不得見天子意殊怏怏晟成正翻使疏吏翻難乃旦翻泚且禮翻又音此重直龍翻怏於兩翻曰吾今已為姦臣所排事可知矣遂引兵去至魯店魯店在奉天東南咸陽陳濤斜西北為李懷光反與朱泚連兵張本建中四年劍南西山兵馬使張朏以所部兵作亂入成都使疏吏翻劍南宿重兵於西山以備吐蕃崔寧以是兵殺郭英乂張朏以是兵逐張延賞朏敷尾翻西川節度使張延賞棄城奔漢州武后垂拱二年分益州置漢州九域志成都北至漢州九十五里鹿頭關在漢州德陽縣劉昫曰成都北一百五十里有鹿頭山扼兩川之要將即亮翻叱尺栗翻延賞復歸成都建中四年淮南節度使陳少遊將兵討李希烈屯盱眙盱眙漢縣唐初屬楚州建中四年度屬泗州少始照翻盱音吁眙音怡歸廣陵修塹壘繕甲兵浙江東西節度使韓滉閉關梁禁馬牛出境築石頭城穿井近百所繕館第數十修塢壁泚且禮翻又音此塹七豔翻滉呼廣翻近其靳翻通俗文營居曰塢壁壘也釋名曰壁辟也所以辟禦寇盜也起建業抵京峴京峴山在潤州州治東五里峴戶蹇翻屬之欲翻聯屬也堞達協翻以備車駕渡江且自固也少遊發兵三千大閲於江北滉亦發舟師三千曜武於京江以應之大江徑京口城北謂之京江鹽鐵使包佶佶巨乙翻有錢帛八百萬將輸京師陳少遊以為賊據長安未期收復言收復未有期也強如字少遊欲殺之佶懼匿妻子於案牘中急濟江少遊悉收其錢帛考異曰奉天記曰佶以財幣一百八十萬欲轉輸入城少遊強收之今從舊傳少遊亦奪之佶才與數十人俱至上元復為韓滉所奪上元縣時帶升州宋白曰上元縣晉江寧縣地貞觀七年移還舊郭即今所置縣也九年改為江寧縣玄宗置升州因縣宇為州城縣元治鳳皇山南今移治會府時包佶蓋在揚子巡院也史言天子播遷藩鎮阻兵陵轢王人復扶又翻時南方藩鎮各閉境自守惟曹王皋數遣使間道貢獻曹王皋時節度江南西道史言曹王皋悉心於帝室數所角翻使疏吏翻間古莧翻江淮路絶朝貢皆自宣饒荊襄趣武關汴皮變翻朝直遙翻趣逡喻翻下同皋治郵驛平道路由是往來之使通行無阻此謂江浙往來之使治直之翻郵音尤建中四年上問陸贄以當今切務贄以嚮日致亂由上下之情不通勸上接下從諫乃上疏上時掌翻疏所據翻其略曰臣謂當今急務在於審察㣥情若㣥情之所甚欲者陛下先行之所甚惡者陛下先去之此即孟子所欲與之聚之所惡勿施之意惡烏路翻下同去羌呂翻自古及今未之有也夫理亂之本繫於人心夫音扶況乎當變故動搖之時在危疑向背之際背蒲妹翻人之所歸則植植立也陛下安可不審察㣥情同其欲惡使億兆歸趣以靖邦家乎趣嚮也又曰頃者竊聞輿議輿衆也四方則患於中外意乖百辟又患於君臣道隔郡國之志不達於朝廷朝廷之誠不升於軒陛上澤闕於下布下情壅於上聞實事不必知知事不必實上下否隔於其際真僞雜糅於其間朝直遙翻否皮鄙翻糅女救翻聚怨囂囂騰謗籍籍欲無疑阻其可得乎又曰總天下之智以助聰明順天下之心以施教令則君臣同志何有不從遠邇歸心孰與為亂又曰慮有愚而近道近其靳翻事有要而似迂疏奏旬日上無所施行亦不詰問詰去吉翻贄又上疏上疏音並同前其略曰臣聞立國之本在乎得衆得衆之要在乎見情言洞見人情也記禮運以為仲尼之言理道猶言治道也唐人避高宗諱率以治為理易乾下坤上曰泰坤下乾上曰否損上益下曰益損下益上曰損夫天在下而地處上於位乖矣而反謂之泰者上下交故也君在上而臣處下否皮鄙翻下同夫音扶處昌呂翻於義順矣而反謂之否者上下不交故也上約己而裕於人人必說而奉上矣說讀曰悅豈不謂之益乎上蔑人而肆諸己人必怨而叛上矣豈不謂之損乎陸贄此言深究否泰損益之義誠足以針砭德宗之失舟即君道水即人情舟順水之道乃浮違則沒君得人之情乃固失則危是以古先聖王之居人上也必以其欲從天下之心而不敢以天下之人從其欲祖左傳臧文仲所謂以欲從人則可以人從欲鮮濟之語之意陛下憤習俗以妨理理治也言德宗憤強藩之跋扈習以成俗有妨為治以明威照臨以嚴法制斷斷丁亂翻流弊自久浚恆太深易恆之初六曰浚恆貞凶無攸利象曰浚恆之凶始求深也王弼注曰始求深者求深窮底令物無餘蘊漸以至此人猶不堪而況始求深者乎以此為恆無所施而利也近者畏懾而偷容避罪之態生躡質涉翻君臣意乖上下情隔君務致理而下防誅夷臣將納忠又上慮欺誕此數語亦深中當時君臣之病誕妄也物情不達於睿聰臣於往年曾任御史德宗初年陸贄為監察御史僅欲半年朝直遙翻陛下嚴邃高居未嘗降旨臨問此可以見德宗初年臨朝氣象局音局蹐音脊亦不列事奏陳軒陛之間且未相諭宇宙之廣何由自通雖復例對使臣別延宰輔復扶又翻又音如字使疏吏翻例對使臣謂功臣節度及諸軍使待制者得隨例以次對也別延宰輔謂朝謁之外別延之與議天下事也復扶又翻既殊師錫書堯典師錫帝曰孔安國注云師衆也錫與也未行者則戒以樞密勿論已行者又謂之遂事不諫論語載孔子責宰我之言動涉猜嫌由是人各隱情以言為諱至於變亂將起億兆同憂獨陛下恬然不知方謂太平可致德宗致亂之事誠如贄言孰真孰虛何得何失則事之通塞備詳之矣塞悉則翻人之情僞盡知之矣上乃遣中使諭之曰朕本性甚好推誠好呼到翻亦能納諫將謂君臣一體全不隄防緣推誠不疑多被姦人賣弄今所致患害朕思亦無他其失反在推誠此德宗猜防之心發於言而不能自掩者也被皮義翻諫官論事少能慎密例自矜衒少詩沼翻衒音炫歸過於朕以自取名朕從即位以來見奏對論事者甚多大抵皆是雷同道聽塗說孔子有言道聽而塗說德之棄也馬融注曰謂聞於道路則傳而說之遽即辭窮若有奇才異能在朕豈惜拔擢朕見從前已來事祗如此所以近來不多取次對人言次對人敷奏緣此多不取用其言或曰取次唐人語也卿宜深悉此意悉詳也當以誠信為本諫者雖辭情鄙拙亦當優容以開言路若震之以威折之以辨則臣下何敢盡言乃復上疏折之舌翻復扶又翻上時掌翻疏所據翻其略曰天子之道與天同方天不以地有惡木而廢發生天子不以時有小人而廢聽納又曰唯信與誠有失無補言人君所為有失於誠信則無補於治道一不信則言莫之行陛下所謂失於誠信以致患害者臣竊以斯言為過矣又曰馭之以智則人詐示之以疑則人偷上行之則下從之上施之則下報之施式豉翻或讀如字若誠不盡於己而望盡於人衆必怠而不從矣不誠於前而曰誠於後衆必疑而不信矣是知誠信之道不可斯須而去身願陛下慎守而行之有加恐非所以為悔者也因德宗之言以為失在推誠故陸贄極言誠信之不可去身以開廣上意臣聞仲虺贊揚成湯不稱其無過而稱其改過書仲虺之誥曰惟王改過不吝虺許偉翻不美其無闕而美其補闕詩蒸民曰袞職有闕惟仲山甫補之尹吉甫所以美宣王之任賢使能也惟以改過為能不以無過為貴蓋為人之行己必有過差蓋為于僞翻上智下愚俱所不免智者改過而遷善愚者恥過而遂非遷善則其德日新遂非則其惡彌積又曰諫官不密自矜信非忠厚其於聖德固亦無虧陛下若納諫不違則傳之適足增美陛下若違諫不納又安能禁之勿傳陸贄告君之言可謂深切著明侈言無驗不必用德宗之信裴延齡以侈言也德宗之罷柳渾以質言也當丁浪翻如蕭復之諫幸鳳翔是也趙贊竇滂之苛征重斂是也慮之以終其用無他唯善所在又曰陛下所謂比見奏對論事皆是雷同道聽塗說者比毗至翻臣竊以衆多之議足見人情必有可行亦有可畏恐不宜一概輕侮而莫之省納也省悉景翻察也陛下又謂試加質問即便辭窮臣但以陛下雖窮其辭而未窮其理能服其口而未服其心但以若依上文作竊以又覺文從字順為下者莫不願忠為上者莫不求理然而下每苦上之不理上每苦下之不忠若是者何兩情不通故也下之情莫不願達於上上之情莫不求知於下然而下恆苦上之難達上恆苦下之難知恆戶登翻若是者何九弊不去故也所謂九弊者上有其六而下有其三好勝人好呼到翻下同恥聞過騁辨給眩聰明厲威嚴恣強愎愎符逼翻很也此六者君上之弊也諂諛顧望畏愞愞奴亂翻此三者臣下之弊也上好勝必甘於佞辭上恥過必忌於直諫如是則下之諂諛者順指而忠實之語不聞矣上騁辨必勦說而折人以言勦初交翻又初教翻此所謂勦說者人言未竟勦絶其說而伸己之說也折之舌翻上眩明必臆度而虞人以詐度徒洛翻以胸臆之見料度人如是則下之顧望者自便而切磨之辭不盡矣上厲威必不能降情以接物上恣愎必不能引咎以受規如是則下之畏愞者避辜而情理之說不申矣夫以區域之廣大生靈之衆多宮闕之重深夫音扶重直龍翻高卑之限隔自黎獻而上獲覩至尊之光景者踰億兆而無一焉黎獻衆賢也又千萬不一幸而得接者猶有九弊居其間則上下之情所通鮮矣鮮息淺翻上情不通於下則人惑下情不通於上則君疑疑則不納其誠惑則不從其令誠而不見納則應之以悖令而不見從則加之以刑下悖上刑不敗何待悖蒲內翻又蒲沒翻是使亂多理少從古以然少始紹翻或謂從古以然當作從古而然今觀文意陸宣公所謂從古至今亂多治少者正以下悖上刑故也以之與而辭義相去遠矣又曰昔趙武訥訥而為晉賢臣晉趙文子名武其言訥訥然如不出其口為晉正卿晉國以強諸侯不叛訥訥舒小貌音如悅翻又奴劣翻絳侯事見漢文帝紀程氏曰木者質朴訥者遲鈍辭屈者理或未窮人之難知堯舜所病書皋陶曰在知人在安民禹曰吁惟帝其難之詰去吉翻以此察天下之情固多失實以此輕天下之士必有遺才德宗所以成段平仲之名者正如此諫者多表我之能好諫者直示我之能容諫者之狂誣明我之能恕諫者之漏泄彰我之能從極言納諫之美以誘掖其君好呼到翻章十二行本是上有有一于斯皆為盛德八字乙十一行本同孔本同張校同退齊校同則人君與諫者交相益之道也諫者有爵賞之利君亦有理安之利諫者得獻替之名君亦得采納之名然猶諫者有失中而君無不美唯恐讜言之有不切天下之不聞如此則納諫之德光矣讜音黨上頗采用其言建中四年李懷光頓兵不進數上表暴揚盧等罪惡數所角翻上時掌翻衆論喧騰亦咎等上不得已十二月壬戌貶為新州司馬白志貞為恩州司馬恩州屬漢合浦郡地蕭齊為齊安郡隋廢郡為海安縣唐貞觀二十三年以高州之西平海安杜陵置恩州海安改曰恩平天寶曰恩平郡乾元復為恩州宋平王則改貝州曰恩州遂以此州為南恩州宋白謂此恩州瀕海最為蒸濕當海南五郡泛海路此路自廣泛海行數日方登陸人憚海波不由此路多由新州陸去唯健步出使與遞符牒經過耳新州治新興縣秦取陸梁地置象郡今州即其地晉永和分蒼梧郡於此置新寧郡梁武帝立新州所謂新興縣漢合浦郡臨元縣也又按舊志云恩州京師東南六千六百里西北六十里接廣州界新州至京師五千五十二里播州隋牂柯縣京師南四千四百五十里上所信任也翟萇伯翻懷光又言其罪上亦為殺之亦為于僞翻建中四年乙丑以翰林學士祠部員外郎陸贄為考功郎中金部員外郎吳通微為職方郎中祠部屬禮部掌祠祀考功屬吏部掌文武官功過考法以官職言之祠部比考功職方為清要郎中正五品上員外郎從六品上辭以初到奉天扈從將吏上時掌翻從才用翻例加兩階今翰林獨遷官唐自至德以後勳階輕而職事官重故云然夫行罰先貴近而後卑遠則令不犯行賞先卑遠而後貴近則功不遺夫音扶先悉薦翻後戶構翻望先録大勞次遍㣥品則臣亦不敢獨辭上不許建中四年上在奉天使人說田悅王武俊李納赦其罪說式芮翻考異曰燕南記十二月二十四日前已云赦武俊等罪而實録明年正月改元乃赦武俊等蓋上先已諭旨赦罪及赦書出始明言之耳厚賂以官爵悅等皆密歸款而猶未敢絶朱滔各稱王如故滔使其虎牙將軍王郅說悅曰朱滔等倣漢官置虎牙將軍按唐書滔等之相王也以左將軍曰虎牙右將軍曰豹略徵以新書虎牙將軍蓋王郅也日者八郎有急滔與趙王不敢愛其死竭力赴救幸而解圍田悅第八解圍事見二百一十七卷三年朱泚第三願八郎治兵與滔渡河共取大梁紇下沒翻治直之翻大梁汴州宣武節度治所悅心不欲行而未忍絶滔乃許之滔復遣其內史舍人李琯見悅審其可否內史舍人猶天朝中書舍人復扶又翻琯古緩翻密召扈崿議之司武侍郎許士則曰司武侍郎猶天朝兵部侍郎也朱滔昔事李懷仙為牙將與兄泚及朱希彩共殺懷仙而立希彩將即亮翻泚且禮翻又音如字殺李懷仙事見二百二十四卷代宗大曆三年考異曰燕南記作朱寀今從舊傳希彩所以寵信其兄弟至矣滔又與判官李子瑗謀殺希彩而立泚事見二百二十四卷大曆七年瑗于眷翻帥所類翻滔乃勸泚入朝而自為留後事見二百二十五卷大曆九年實奪之權也平生與之同謀共功如李子瑗之徒負而殺之者二十餘人今又與泚東西相應使滔得志泚亦不為所容況同盟乎滔為人如此大王何從得其肺腑而信之邪觀時審勢量度彼己世不為無其人特其言有用不用耳泚且禮翻又音此邪音耶紇下沒翻幽陵即幽州坰古熒翻邑外謂之郊野外謂之林林外謂之坰大王出迎則成擒矣彼囚大王兼魏國之兵南向渡河與關中相應天下其孰能當之大王於時悔之無及為大王計不若陽許偕行而陰為之備厚加迎勞勞力到翻至則託以他故遣將分兵而隨之如此大王外不失報德之名而內無倉猝之憂矣扈崿等皆以為然王武俊聞李琯適魏遣其司刑員外郎田秀馳見悅曰崿五各翻琯古瑗翻司刑員外郎猶天朝刑部員外郎武俊嚮以宰相處事失宜相息亮翻處昌呂翻恐禍及身又八郎困於重圍重直龍翻故與滔合兵救之今天子方在隱憂以德綏我我曹何得不悔過而歸之邪捨九葉天子不事而事章十二行本事下有泚及二字乙十一行本同孔本同張校同退齊校同滔乎自高祖太宗高宗中宗睿宗玄宗肅宗代宗至帝凡九葉滔與我曹比肩為王固已輕我曹矣事見上卷本年與泚連衡汴皮變翻汴州宣武軍洛州東都也衡讀曰橫吾屬皆為虜矣八郎慎勿與之俱南但閉城拒守武俊請伺其隙連昭義之兵擊而滅之伺相吏翻與八郎再清河朔復為節度使共事天子不亦善乎復扶又翻又音如字使疏吏翻悅意遂決紿滔云從行必如前約紿蕩亥翻丁卯滔將范陽步騎五萬人私從者復萬餘人將即亮翻又音如字騎奇寄翻私從才用翻復扶又翻回紇三千人發河間而南輜重首尾四十里紇下沒翻瀛州治河間縣重直用翻建中四年李希烈攻李勉於汴州李勉以宣武節度使鎮汴州築壘道以攻城忿其未就並人填之謂之濕薪勉城守纍月外救不至將其衆萬餘人奔宋州將音同上勉奔宋州依劉洽也庚午希烈陷大梁滑州刺史李澄以城降希烈希烈以澄為尚書令兼永平節度使勉上表請罪滑州治白馬縣降戶江翻尚辰羊翻上時掌翻朕猶失守宗廟勉宜自安待之如初劉洽遣其將高翼將精兵五千保襄邑九域志襄邑在汴州東南一百七十里翼赴水死希烈乘勝攻寧陵九域志寧陵縣在宋州西四十五里陳少遊遣參謀溫述送款於希烈曰濠壽舒廬已令弛備韜戈卷甲伏俟指麾又遣巡官趙詵結李納於鄆州少始照翻濠壽舒廬四州之地在淮蔡東南送款遂言使弛備令力丁翻使也卷讀與捲同詵疏臻翻鄆音運建中四年中書侍郎同平章事關播罷為刑部尚書建中四年以給事中孔巢父為淄青宣慰使國子祭酒董晉為河北宣慰使宣慰者宣上命以慰安反側也父音甫淄莊持翻建中四年陸贄言於上曰今盜遍天下輿駕播遷陛下宜痛自引過以感人心昔成湯以罪己勃興左傳臧文仲曰禹湯罪己其興也勃焉楚昭王遭闔閭之禍國滅出亡父老送之王曰父老反矣何患無君父老曰有君如是其賢也相與從之或奔走赴秦號哭請救秦人憐之為之出兵二國並力遂走吳師昭王復國以言謝天下使書詔無所避忌臣雖愚陋可以仰副聖情庶令反側之徒革心向化上然之故奉天所下書詔雖驕將悍卒聞之無不感激揮涕令力丁翻下遐稼翻將即亮翻術者上言國家厄運宜有變更以應時數上時掌翻下贄上音同更工衡翻㣥臣請更加尊號一二字上以問贄贄上奏以為不可其略曰尊號之興本非古制上尊號事始於開元元年已纍謙沖纍力瑞翻襲乎喪亂之時喪息浪翻尤傷事體又曰嬴秦德衰兼皇與帝始總稱之見七卷秦始皇二十六年昏僻之君乃有聖劉天元之號聖劉見三十四卷漢哀帝建平二年天元見一百七十二卷陳宣帝太建十一年不在名稱稱尺證翻下美稱同損之有謙光稽古之善崇之獲矜能納諂之譏又曰必也俯稽術數須有變更更工衡翻與其增美稱而失人心不若黜舊號以祗天戒上納其言但改年號而已謂改明年號為興元也上又以中書所撰赦文示贄撰如免翻贄上言以為動人以言所感已淺言又不切人誰肯懷今茲德音悔過之意不得不深引咎之辭不得不盡洗刷疵垢宣暢鬱堙疵才支翻使人人各得所欲則何有不從者乎應須改革事條謹具別狀同進捨此之外尚有所虞竊以知過非難改過為難言善非難行善為難假使赦文至精止於知過言善猶願聖慮更思所難上然之興元元年甲子七八四建中四年春正月癸酉朔赦天下改元制曰致理興化必在推誠忘己濟人不吝改過朕嗣服丕構丕大也構立屋也書大誥曰若考作室既底法厥子乃弗肯堂矧肯構丕構之語本諸此失守宗祧宗者百世不毀之廟遠廟為祧祧他雕翻用左傳語誠莫追於既往永言思咎期有復於將來明徵其義以示天下徵證也明徵其義言無所掩覆也小子懼德弗嗣懼己德弗能嗣承先業嗣祥吏翻然以長于深宮之中用禮記魯哀公之言長知丈翻積習易溺易以豉翻居安忘危不知稼穡之艱難書無逸周公告成王之語澤靡下究情未上通事既擁隔人懷疑阻猶昧省己擁恐當作壅省悉景翻戎兵也轉餉千里賦車籍馬遠近騷然行齎居送衆庶勞止或一日屢交鋒刃或連年不解甲胄祀奠乏主室家靡依死生流離怨氣凝結力役不息田萊多荒鄭玄曰田萊多荒茨棘不除也陸德明曰田廢生草曰萊疲氓空於杼軸詩小東大東杼軸其空杼持緯器布帛已織成者以機軸卷之離去鄉閭離力智翻邑里丘墟人煙斷絶天譴於上而朕不寤人怨於下而朕不知馴致亂階變興都邑馴從也言從此而致亂也九廟震驚歐陽修曰書云七世之廟可以觀德而禮家之說世數不同然自禮記王制祭法禮器大儒荀卿劉歆班固王肅之徒以為七廟者多蓋自漢魏以來創業之君特起其上世又微無功德以備祖宗故其初皆不能立七廟唐武德元年始立四廟高祖崩朱子奢請立七廟虛太祖之室以待尚書八座議禮曰天子三昭三穆與太祖之廟而七晉宋齊梁皆立親廟六此故事也於是宣簡公懿王景元二帝四廟更祔弘農府君及高祖為六室太宗崩弘農以世遠毀而祔太宗高宗崩又遷宣簡而祔高宗皆為六室中宗神龍初以景帝為始祖而元帝不遷而祔孝敬帝由是為七室中宗崩孝敬別立廟而祔中宗遂為七室至睿宗崩中宗立別廟而祔睿宗開元十年詔宣皇帝復祔正室諡為獻祖並諡光帝為懿祖又以中宗還祔太廟於是太廟為九室寶應二年祧獻懿而祔玄宗肅宗代宗崩又遷元皇帝而祔代宗自是常為九室纍力瑞翻下負于蒸庶痛心靦貌靦他典翻慙恧也罪實在豫永言愧悼若墜泉谷唐避高祖諱改淵為泉不得更言聖神文武之號建中元年㣥臣上尊號曰聖神文武皇帝見二百二十六卷李希烈田悅王武俊李納等咸以勳舊各守藩維朕撫御乖方致其疑懼皆由上失其道而下罹其災朕實不君人則何罪此等言語強藩悍將聞之宜其感服易心朱滔雖緣朱泚連坐路遠必不同謀念其舊勳務在弘貸弘大也亦與惟新朱泚反易天常君臣上下天秩有典之常也暴犯陵寢所不忍言獲罪祖宗朕不敢赦此等言語可與誥誓相表裏但官軍未到京城以前去逆效順並散歸本道本軍者並從赦例所以攜從逆之黨將即亮翻下同諸軍諸道應赴奉天及進收京城將士並賜名奉天定難功臣所以作勤王之心難乃旦翻悉宜停罷所以順人情之欲惡墊陌錢即趙贊所行除陌錢也墊丁念翻榷古嶽翻赦下四方人心大悅及上還長安明年上還長安之明年貞元元年也下遐稼翻還從宣翻又音如字朝直遙翻為于僞翻山東宣布赦書士卒皆感泣臣見人情如此知賊不足平也史究言興元赦書感動人心之效建中四年命兵部員外郎李充為恆冀宣慰使唐兵部員外郎二人一人掌貢舉雜請一人判南曹歲選出使非本職命以郎官出使耳恆戶登翻使疏吏翻建中四年朱泚更國號曰漢泚且禮翻又音此朱泚初僭號國號秦更工衡翻自號漢元天皇改元天皇建中四年王武俊田悅李納見赦令皆去王號去羌呂翻上表謝罪上時掌翻惟李希烈自恃兵強財富遂謀稱帝遣人問儀於顏真卿真卿曰老夫嘗為禮官所記惟諸侯朝天子禮耳顏真卿所以答李希烈者辭不迫切而義甚嚴正朝直遙翻考異曰希烈稱帝實録舊希烈傳顏真卿傳皆無年月今據奉天記幸奉天録皆云赦令既行諸方莫不向化惟李希烈長惡不悛國號大楚又實録今年閏月庚午詔曰朕苟存拯物不憚屈身故於歲首特布新令赦其殊死待以初誠使臣才及於郊畿巨猾已聞於僭竊然則希烈稱帝必在正月初也改元武成置百官以其黨鄭賁為侍中孫廣為中書令李緩李元平同平章事李緩新書作李綬分其境內為四節度希烈遣其將辛景臻謂顏真卿曰不能屈節當自焚積薪灌油於其庭真卿趨赴火景臻遽止之希烈又遣其將楊峯將即亮翻考異曰舊傳作楊豐今從奉天記齎赦賜陳少遊及壽州刺史張建封建封執峯徇於軍腰斬於市少遊聞之駭懼建封具以少遊與希烈交通之狀聞上悅以建封為濠壽廬三州都團練使少始照翻使疏吏翻希烈乃以其將杜少誠為淮南節度使使將步騎萬餘人先取壽州後之江都使將即亮翻又音如字騎奇寄翻壽州治壽春縣之往也淮南節度治江都建封遣其將賀蘭元均邵怡守霍丘秋柵後周書賀蘭祥傳其先與後魏俱起有紇伏者為賀蘭莫弗遂以為氏霍丘漢廬江松滋縣地梁置安豐郡東魏廢郡隋開皇十六年置霍丘縣唐屬壽州九域志在州東一百二十里宋白曰霍丘本春秋時蓼國梁置霍丘戍隋廢戍為縣遂南寇蘄黃欲斷江路蘄渠希翻斷音短時上命包佶自督江淮財賦泝江詣行在至蘄口水經注蘄水源出蘄春縣北大浮山南過其縣西又南至蘄口入于江佶其吉翻泝蘇故翻曹王皋遣蘄州刺史伊慎將兵七千拒之戰於永安戍永安戍在黃州黃岡縣界梁嘗置永安郡後廢為戍少誠脫身走斬首萬級包佶乃得前後佶入朝具奏陳少遊奪財賦事奪財賦事見上年佶巨乙翻朝直遙翻厚斂所部以償之斂力贍翻李希烈以夏口上流要地鄂州治夏口當江漢之會夏戶雅翻刺史李兼偃旗臥鼓閉門以待之侍撤屋材以焚門兼帥士卒出戰大破之驍堅堯翻將即亮翻鄂逆各翻鄂州治江夏縣即夏口帥讀曰率上以兼為鄂嶽沔都團練使沔彌兗翻使疏吏翻於是希烈東畏曹王皋西畏李兼不敢復有窺江淮之志矣史言李希烈兵勢稍挫復扶又翻建中四年朱滔引兵入趙境王武俊大具犒享犒口到翻入魏境田悅供承倍豐使者迎候相望於道丁丑滔至永濟宋白曰永濟縣本漢貝丘縣地隋已後為臨清縣地大曆七年田承嗣奏分臨清置永濟縣屬貝州以縣西臨永濟渠為名約會館陶偕行渡河館陶縣屬魏州在州城東稍北悅固願從五兄南行昨日將出軍將士勒兵不聽悅出曰國兵新破謂先為馬燧等所破也資儲竭矣謂守魏州與馬燧等相持也何以全軍遠征大王日自撫循猶不能安若捨城邑而去朝出暮必有變悅之志非敢有二也如將士何已令孟祐備步騎五千從五兄供芻牧之役騎奇寄翻因遣其司禮侍郎裴抗等往謝滔司禮侍郎猶天朝禮部侍郎大怒曰田悅逆賊嚮在重圍重直龍翻命如絲髮使我叛君棄兄發兵晝夜赴之事見二百二十七卷建中三年許我貝州我辭不取尊我為天子我辭不受事見同上年誤我遠來飾辭不出即日遣馬實攻宗城經城經城漢古縣時屬貝州宋白曰後漢分前漢堂陽縣於今縣西北二十里置經縣後魏省併南宮縣太和十年又於今理置經縣尋置廣宗郡於此北齊省郡及縣移武強縣於此後周復於此置廣宗郡隋開皇三年罷郡復於此置經城縣宋省縣為鎮入宗城去年張孝忠遣其將楊榮國與李晟俱赴國難及晟收京城諸將中獨楊榮國不見於史今朱滔遣楊榮國攻冠氏乃建中三年以深州降于朱滔者冠氏春秋邑名隋分館陶東界置冠氏縣唐屬魏州九域志在州東北六十里又縱回紇掠館陶頓幄帟器皿車牛以去紇下沒翻帟音亦三禮圖在上曰帟四旁及上曰帷上下四旁悉周曰幄又曰帟平帳也帟主在幕若幄中坐上承塵悅閉城自守壬午滔遣裴抗等還還從宣翻又音如字分兵置吏守平恩永濟平恩縣屬洺州治平恩川建中四年丙戌以吏部侍郎盧翰為兵部侍郎同平章事考異曰實録新舊紀表皆同蓋翰罷領選故自吏部遷兵部耳義僖之七世孫也盧義僖仕元魏當靈后臨朝時不附徐鄭建中四年朱滔引兵北圍貝州引水環之環音宦刺史邢曹俊嬰城拒守縱范陽及回紇兵大掠諸縣滔縱兵大掠武城即漢東武城縣地唐屬貝州九域志在州東五十里使給軍食建中二年朱滔據有德棣建中四年以給事中杜黃裳為江淮宣慰副使考異曰實録去年十二月癸酉已云黃裳使江淮此又有之按舊紀去年十二月黃裳為給事耳實録誤也建中四年上於行宮廡下貯諸道貢獻之物榜曰瓊林大盈庫貯直呂翻陸贄以為戰守之功賞賚未行而遽私別庫則士卒怨望無復鬬志上疏諫復扶又翻又音如字上時掌翻疏所據翻其略曰天子與天同德以四海為家何必橈廢公方橈奴教翻屈曲也方法也崇聚私貨降至尊而代有司之守辱萬乘以效匹夫之藏乘繩證翻虧法失人誘姦聚慝以斯制事豈不過哉誘羊久翻慝吐得翻又曰頃者六師初降降讀如字天子之行必有六師以為營衛不敢指言自京師出居奉天故微其辭曰六師初降百物無儲外扞凶徒內防危堞晝夜不息殆將五旬凍餒交侵死傷相枕堞達協翻枕職任翻畢命同力竟夷大艱良以陛下不厚其身不私其欲絶甘以同卒伍輟食以啖功勞啖徒濫翻又徒覽翻無猛制而人不攜懷所感也無厚賞而人不怨悉所無也悉詳體也衣食已豐而謠讟方興讟怨謗也豈不以勇夫恆性嗜利矜功恆戶登翻其患難既與之同憂而好樂不與之同利難乃旦翻好呼到翻樂音洛苟異恬默能無怨咨咨咨嗟也陛下誠能近想重圍之殷憂重直龍翻殷於謹翻追戒平居之專欲凡在二庫貨賄盡令出賜有功每獲珍華令力丁翻珍華猶言珍麗也先給軍賞如此則亂必靖賊必平徐駕六龍旋復都邑天子之貴豈當憂貧是乃散其小儲而成其大儲損其小寶而固其大寶也上即命去其榜去羌呂翻建中四年蕭復嘗言於上曰宦官自艱難以來多為監軍恃恩縱橫監工銜翻橫戶孟翻此屬但應掌宮掖之事不宜委以兵權國政上不悅又嘗言陛下踐阼之初聖德光被應乙陵翻當也掖音亦被皮義翻自楊炎盧黷亂朝政以致今日朝直遙翻陛下誠能變更睿志臣敢不竭力此必盧貶逐之後蕭復方有是言更工衡翻臣實不能蕭復蓋朴而直者順上旨復正色曰盧言不正上愕然退謂左右曰蕭復輕朕此事必在蕭復盧同列之時史因德宗命復出使而序其事於此耳戊子命復充山南東西荊湖淮南江西鄂嶽浙江東西福建嶺南等道宣慰安撫使實疏之也鄂五各翻使疏吏翻既而劉從一及朝士往往奏留復上謂陸贄曰朕思遷幸以來江淮遠方或傳聞過實欲遣重臣宣慰謀於宰相及朝士僉謂宜然今乃反覆如是朕為之悵恨纍日朝直遙翻相息亮翻為于僞翻意復悔行使之論奏邪意者以意度之也此亦德宗猜防臣下之一事其不欲行意趣安在贄上奏以為復痛自修勵慕為清貞用雖不周行則可保上時掌翻行下孟翻至於輕詐如此復必不為借使復欲逗留從一安肯附會今所言矛楯韓非子有鬻矛楯者自譽其矛曰吾矛之利物無不陷也又自譽其楯曰吾楯之堅物莫能陷也或謂之曰以子之矛陷子之楯可乎其人不能答故後世謂議論自相反及為事自相反者為自相矛楯楯食尹翻詰去吉翻若蕭復有所請求則從一何容為隱為于僞翻若從一自有回互則蕭復不當受疑陛下何憚而不辨明乃直為此悵恨也夫明則罔惑辨則罔冤惑莫甚於逆詐而不與明夫音扶逆者未至而迎之也詐謂人欺己也未見其詐而逆以為詐謂之逆詐冤莫痛於見疑而不與辨是使情僞相糅糅女救翻忠邪靡分茲實居上御下之要樞惟陛下留意上亦竟不復辨也復扶又翻建中四年辛卯以王武俊為恆冀深趙節度使壬辰加李抱真張孝忠並同平章事丙申加田悅檢校左僕射恆戶登翻使疏吏翻校古效翻射寅謝翻以山南東道行軍司馬樊澤為本道節度使前深趙觀察使康日知為同州刺史奉誠軍節度使以趙州與王武俊故徙康日知乾元初以同州為匡國軍節度使今又為奉誠軍李納本為曹州刺史建中二年其父正己卒納自領軍務未有朝命今方命以旌節故先敍其本職而加以新命鄆音運建中四年戊戌加劉洽汴滑宋亳都統副使知都統事李勉悉以其衆授之李勉既失守汴州命劉洽知都統事汴皮變翻統他綜翻俗多從上聲建中四年辛丑六軍各置統軍此北門左右羽林龍武神武六軍也考異曰實録云詔六軍各置軍使一員又云因置統軍按舊紀獨置統軍耳今從之以寵勳臣從才用翻建中四年吐蕃尚結贊請出兵助唐收京城庚子遣祕書監崔漢衡使吐蕃發其兵吐從暾入聲容肇祖標點聶崇岐覆校
