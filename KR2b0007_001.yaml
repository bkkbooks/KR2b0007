body:
  text: 資治通鑑卷第一朝散大夫右諫議大夫權御史中丞充理檢使上護軍賜紫金魚袋臣奉敕編集後學天台音注周紀一爾雅太歲在甲曰閼逢在乙曰旃蒙在丙曰柔兆在丁曰強圉在戊曰著雍在己曰屠維在庚曰上章在辛曰重光在壬曰玄黓在癸曰昭陽是為歲陽在寅曰攝提格在卯曰單閼在辰曰執徐在巳曰大荒落在午曰敦牂在未曰協洽在申曰涒灘在酉曰作噩在戌曰掩茂在亥曰大淵獻在子曰困敦在丑曰赤奮若是為歲名周紀分注起著雍攝提格起戊寅也盡玄黓困敦盡壬子也閼讀如字史記作焉於乾翻著陳如翻雍於容翻黓逸職翻單閼上音丹又特連翻下烏葛翻又於連翻牂作郎翻涒吐魂翻灘吐丹翻困敦音頓杜預世族譜曰周黃帝之苗裔姬姓后稷之後封於邰及夏衰稷子不窋竄於西戎至十二代孫太王避狄遷岐至孫文王受命武王克商而有天下自武王至平王凡十三世自平王至威烈王又十八世自威烈王至赧王又五世張守節曰因太王居周原國號曰周地理志云右扶風美陽縣岐山西北中水鄉周太王所邑括地志云故周城一名美陽城在雍州武功縣西北二十五里紀理也統理衆事而繫之年月溫公繫年用春秋之法因史漢本紀而謂之紀邰湯來翻夏戶雅翻窋竹律翻在雍於用翻威烈王名午考王之子諡法猛以剛果曰威有功安民曰烈沈約曰諸復諡有諡人無諡法二十三年二十三年初命晉大夫魏斯趙籍韓虔為諸侯此溫公書法所由始也魏之先畢公高後與周同姓其苗裔曰畢萬始封於魏至魏舒始為晉正卿三世至斯趙之先造父後至叔帶始自周適晉至趙夙始封於耿至趙盾始為晉正卿六世至籍韓之先出於周武王至韓武子事晉封於韓原至韓厥為晉正卿六世至虔三家者世為晉大夫於周則陪臣也周室既衰晉主夏盟以尊王室故命之為伯三卿竊晉之權暴蔑其君剖分其國此王法所必誅也威烈王不惟不能誅之又命之為諸侯是崇獎奸名犯分之臣也通鑑始於此其所以謹名分歟臣光曰臣聞天子之職莫大於禮禮莫大於分分莫大於名分扶問翻下同何謂禮紀綱是也何謂分君臣是也何謂名公侯卿大夫是也夫以四海之廣夫以音扶兆民之衆受制於一人雖有絶倫之力高世之智莫章十二行本莫下有敢字乙十一行本同孔本同不奔走而服役者豈非以禮為之紀綱哉章十二行本二字互乙乙十一行本同孔本同是故天子統三公統他綜翻三公率諸侯諸侯制卿大夫卿大夫治士庶人治直之翻貴以臨賤賤以承貴上之使下猶心腹之運手足根本之制支葉下之事上猶手足之衛心腹支葉之庇本根然後能上下相保而國家治安治直吏翻故曰天子之職莫大於禮也文王序易以乾坤為首孔子繫之曰天尊地卑乾坤定矣卑高以陳貴賤位矣繫戶計翻言君臣之位猶天地之不可易也春秋抑諸侯尊王室章十二行本王作周乙十一行本同孔本同退齊校同王人雖微序於諸侯之上以是見聖人於君臣之際未嘗不惓惓也惓逵員翻漢劉向傳忠臣畎畝猶不忘君惓惓之義也惓惓猶言勤勤也非有桀紂之暴湯武之仁人歸之天命之君臣之分當守節伏死而已矣是故以微子而代紂則成湯配天矣史紀商帝乙生三子長曰微子啓次曰中衍季曰紂紂之母為后帝乙欲立啓為太子太史據法爭之曰有妻之子不可立妾之子乃立紂紂卒以暴虐亡殷國孔鄭推父比天與之相配行孝之大莫大於此所謂嚴父莫大於配天也又孔氏曰禮記稱萬物本乎天人本乎祖俱為其本可以相配故王者皆以祖配天諡法除殘去虐曰湯然諡法起於周蓋殷人先有此號周人遂引以為諡法分扶問翻長知兩翻卒子恤翻以季札而君吳則太伯血食矣吳王壽夢有子四人長曰諸樊次曰餘祭次曰餘味次曰季札季札賢壽夢欲立之季札讓不可於是立諸樊諸樊卒以授餘祭欲兄弟以次相傳必致國於季札季札終讓而逃之其後諸樊之子光與餘味之子僚爭國至於夫差吳遂以亡宗廟之祭用牲故曰血食太伯吳立國之君范寧曰太者善大之稱伯者長也周太王之元子故曰太伯陸德明曰壽夢莫公翻餘祭側介翻餘味音末誠以禮之大節不可亂也故曰禮莫大於分也夫禮辨貴賤序親疏裁㣥物制庶事非名不著非器不形名以命之器以別之夫音扶別彼列翻然後上下粲然有倫此禮之大經也名器既亡則禮安得獨在哉昔仲叔于奚有功於衛辭邑而請繁纓孔子以為不如多與之邑惟名與器不可以假人君子所司也政亡則國家從之左傳衛孫桓子帥師與齊師戰于新築衛師敗績新築人仲叔于奚救孫桓子桓子是以免既而衛人賞之邑辭請曲縣繁纓以朝許之孔子聞之曰不如多與之邑惟名與器不可以假人繁纓馬飾也繁馬鬣上飾纓馬膺前飾晉志注曰纓在馬膺如索君巾繁音蒲官翻纓伊盈翻索昔各翻孔子欲先正名以為名不正則民無所措手足見論語小物也而孔子惜之正名細務也而孔子先之先悉薦翻誠以名器既亂則上下無以相保故也夫事未有不生於微而成於著聖人之慮遠故能謹其微而治之治直之翻下同衆人之識近故必待其著而後救之治其微則用力寡而功多救其著則竭力而不能及也易曰履霜堅冰至坤初六爻辭象曰履霜堅冰陰始凝也馴致其道至堅冰也一日二日萬幾皋陶謨之辭孔安國注曰幾微也言當戒懼萬事之微幾居依翻故曰分莫大於名也分扶問翻嗚呼幽厲失德周道日衰綱紀散壞下陵上替諸侯專征謂齊桓公晉文公至悼公以及楚莊王吳夫差之類亶謂晉六卿魯三家齊田氏之類喪息浪翻然文武之祀猶帛丿糸帛丿糸相屬者屬聯屬也音之欲翻凡聯屬之屬皆同音蓋以周之子孫尚能守其名分故也何以言之昔晉文公有大功於王室請隧於襄王襄王不許曰王章也未有代德而有二王亦叔父之所惡也不然叔父有地而隧又何請焉文公於是懼而不敢違太叔帶之難襄王出居于泛晉文公帥師納王殺太叔帶既定襄王于郟王勞之以地辭請隧焉王弗許云云杜預曰闕地通路曰隧此乃王者葬禮也諸侯皆縣柩而下王章者章顯王者異於諸侯古者天子謂同姓諸侯為伯父叔父隧音遂惡烏路翻難乃旦翻泛音泛勞力到翻闕其月翻縣音玄柩其久翻以周之民則不衆於邾莒曹滕邾莒春秋時小國莒居許翻宗主天下雖以晉楚齊秦之強不敢加者何哉徒以名分尚存故也至於季氏之於魯田常之於齊白公之於楚智伯之於晉魯大夫季氏自季友以來世執魯國之政季平子逐昭公季康子逐哀公然終身北面不敢篡國田常即陳恆田氏本陳氏溫公避國諱改恆曰常陳成子得齊國之政殺闞止弒簡公而亦不敢自立史記世家以陳敬仲完為田敬仲完陳成子恆為田常故通鑑因以為據白公勝殺楚令尹子西司馬子期石乞曰焚庫弒王不然不濟白公曰弒王不祥焚庫無聚智伯當晉之衰專其國政侵伐鄰國於晉大夫為最強攻晉出公出公道死智伯欲並晉而不敢乃奉哀公驕立之然而卒不敢者卒子恤翻終也豈其力不足而心不忍哉乃畏奸名犯分而天下共誅之也奸居寒翻亦犯也分扶問翻今晉大夫暴蔑其君剖分晉國史記六國年表定王十六年趙魏韓滅智伯遂三分晉國又寵秩之使列於諸侯是區區之名分復不能守而並棄之也陸德明經典釋文凡復字其義訓又者並音扶又翻先王之禮於斯盡矣或者以為當是之時周室微弱三晉強盛三家分晉國時因謂之三晉猶後之三秦三齊也其可得乎是大不然夫三晉雖強苟不顧天下之誅而犯義侵禮則不請於天子而自立矣不請於天子而自立則為悖逆之臣夫音扶悖蒲內翻又蒲沒翻天下苟有桓文之君必奉禮義而征之今請於天子而天子許之是受天子命而為諸侯也誰得而討之故三晉之列於諸侯非三晉之壞禮乃天子自壞之也壞音怪人毀之也烏呼君臣之禮既壞矣此壞其義為成壞之壞讀如字則天下以智力相雄長長知兩翻遂使聖賢之後為諸侯者社稷無不泯絶謂齊宋亡於田氏魯陳越亡於楚鄭亡於韓也泯彌忍翻盡也又彌鄰翻毛晃曰沒也滅也說文曰糜糝也取糜爛之義音忙皮翻幾居依翻又渠希翻近也豈不哀哉二十三年初智宣子將以瑤為後智果曰不如宵也韋昭曰智宣子晉卿荀躒之子申也瑤宣子之子智伯也諡曰襄子智果智氏之族也宵宣子之庶子也按諡法聖善周聞曰宣智氏溢美也其不逮者一也韋昭曰不仁也通鑑俗傳寫者多作美鬚非也國語作美鬢今從之章十二行本正作鬢孔本同乙十一行本作鬚伎藝畢給則賢巧文辨惠則賢韋昭曰給足也巧文巧於文辭伎渠綺翻如是而甚不仁夫以其五賢陵人而以不仁行之其誰能待之韋昭曰待猶假也智宗必滅弗聽智果別族於太史為輔氏此事見國語按左傳哀公二十三年晉荀瑤伐齊始見于傳哀二十三年史記元王五年也荀躒智文子也定十四年智文子猶見于傳智宣子之事傳無所考立瑤之議當在元王五年之前韋昭曰太史掌氏姓周禮春官之屬小史掌定世繫辨昭穆鄭司農注云史官主書故韓宣子聘魯觀書于太史世繫謂帝繫世本之屬是也小史主定之賈公彥疏曰注引太史證之者太史史官之長共其事故也蓋周之制小史定姓氏其書則太史掌之智果欲避智氏之禍故於太史別族宋祁國語補音別彼列翻又如字趙簡子之子長曰伯魯幼曰無恤趙簡子文子之孫鞅也諡法一德不懈曰簡白虎通曰子孳也孳孳無已也趙岐曰子者男子之通稱也長知兩翻不知所立乃書訓戒之辭於二簡孔穎達曰書者舒也書緯璇璣鈐云書者如也則書者寫其言如其意得展舒也世本曰沮誦蒼頡作書釋之名庶也紀庶物也亦言著也著之簡紙求不滅也簡竹策也以授二子曰謹識之識職吏翻記也三年而問之伯魯不能舉其辭求其簡已失之矣問無恤誦其辭甚習習熟也出諸袖中而奏之毛晃曰奏進上也立以為後簡子使尹鐸為晉陽姓譜尹少昊之子封於尹城子孫因為氏章昭曰晉陽趙氏邑為治也班志曰晉陽故詩唐國周成王滅唐封弟叔虞龍山在西晉水所出東入汾臣瓚曰所謂唐今河東永安縣是也去晉四百里括地志曰晉陽故城今名晉城在蒲州虞鄉縣西今按水經注晉水出晉陽縣西龍山昔智伯遏晉水以灌晉陽其水分為二流北瀆即智氏故渠也同過水出沾縣北山西過榆次縣南又西到晉陽縣南榆次縣南水側有鑿臺戰國策所謂智伯死於鑿臺之下即此處也參而考之晉陽故城恐不在蒲州水經注又云叔虞封於唐縣有晉水故改名為晉子夏序詩此晉也而謂之唐是也與班志合瓚說及括地志未知何據以為繭絲乎抑為保障乎簡子曰保障哉繭絲謂浚民之膏澤如抽繭之緒不盡則不止保障謂厚民之生如築堡以自障愈培則愈厚宋祁曰障之亮翻又音章韋昭曰損其戶則民優而稅少晉國有難而無以尹鐸為少而汝也難乃旦翻患也厄也少音多少之少重之為多輕之為少必以為歸及智宣子卒卒子恤翻智襄子為政諡法有勞定國曰襄為政為晉國之政韓康子韓宣子之曾孫莊子之子虔也魏桓子魏獻子之子曼多之孫駒也諡法溫柔好樂曰康辟土服遠曰桓爾雅四方而高曰臺姓譜段鄭共叔段之後諫曰主不備難章十二行本無難字乙十一行本同難必至矣春秋以來大夫之家臣謂大夫曰主難乃旦翻下同難將由我我不為難誰敢興之對曰不然夏書有之一人三失怨豈在明不見是圖書五子之歌之辭夏戶雅翻見賢遍翻發見也著也形也故無大患今主一宴而恥人之君相夫音扶段規韓康子之相也相息醬翻下同又弗備曰不敢興難無乃不可乎蚋蟻蜂蠆皆能害人宋祁曰蚋如鋭翻又宋林人劣翻秦人謂蚊為蚋今按蚋小蟲日中㣥集人之肌膚而嘬其血蚊之類也蜂細腰而能螫人蠆亦毒蟲長尾音丑邁翻弗聽智伯請地於韓康子康子欲弗與段規曰智伯好利而愎不與將伐我不如與之彼狃於得地好呼到翻愎弼力翻狠也狃女九翻驕忲也又相狎也必請於他人他人不與必嚮之以兵然後章十二行本後作則乙十一行本同我得免於患而待事之變矣康子曰善使使者致萬家之邑於智伯毛晃曰邑都邑四井為邑四邑為丘邑方二里丘方四里載師以公邑之田任甸地以家邑之田任稍地注公邑謂六遂餘地家邑大夫之采地此又與四井之邑不同又都國都邑縣也左傳凡邑有先君宗廟之主曰都無曰邑邑曰築都曰城此謂大縣邑也杜預引周禮四縣為都四井為邑恐誤四井之邑方二里豈能容宗廟城郭如論語十室之邑西都賦都都相望邑邑相屬則是四縣四井之都邑也若千室之邑萬家之邑則非井邑矣項安世曰小司徒井牧田野以四井為邑凡三十六家除公田四夫凡三十二家遂大夫會為邑者之政以里為邑凡二十五家遂大夫蓋論里井之制二十五家共一里門即六鄉之二十五家為一閭也小司徒蓋論溝洫之制四井為邑共用一溝即匠人所謂井間廣四尺深四尺謂之溝也居則度人之衆寡溝則度水之衆寡此其所以異歟毛項二說皆明周制參而考之戰國之所謂邑非周制矣致送至也又求地於魏桓子桓子欲弗與任章曰何故弗與任章魏桓子之相也姓譜黃帝二十五子十二人各以德為姓第一曰任氏又任為風姓之國實太昊之後主濟祀今濟州任城即其地任市林翻無故索地故弗與任章曰無故索地諸大夫必懼索山客翻求也吾與之地智伯必驕彼驕而輕敵此懼而相親以相親之兵待輕敵之人智氏之命必不長矣周書曰將欲敗之必姑輔之將欲取之必姑與之逸書也敗補邁翻以驕智伯然後可以擇交而圖智氏矣奈何獨以吾為智氏質乎質脂利翻物相綴當也又質讀如字亦通質謂椹質也質的也椹質受斧質的受矢言智伯怒魏桓子必加兵於魏如椹質之受斧質的之受矢也桓子曰善復與之萬家之邑一復扶又翻智伯又求蔡皋狼之地於趙襄子康曰皋姑勞切狼盧當切春秋蔡地後為趙邑余據春秋之時晉楚爭盟晉不能越鄭而服蔡三家分晉韓得成皋因以並鄭時祭已為楚所滅鄭之南境亦入于楚就使皋狼為蔡地趙襄子安得而有之漢書地理志西河郡有皋狼縣又有藺縣漢之西河春秋以來皆為晉境而古文藺字與蔡字近或者蔡字其藺字之訛也智伯怒帥韓魏之甲以攻趙氏帥讀曰率襄子將出曰吾何走乎走則豆翻疾趨之也趨七喻翻從者曰長子近且城厚完從才用翻長子縣周史辛伯所封邑班志屬上黨郡陸德明曰長子之長丁丈翻顏師古曰長讀為短長之長今讀為長幼之長非也崔豹古今注曰城盛也所以盛受民物也淮南子曰鯀作城盛時征翻民罷力以完之罷讀曰疲又斃死以守之其誰與我韋昭曰謂誰與我同力也邯鄲之倉庫實邯鄲即春秋邯鄲午之邑也班志邯鄲縣屬趙國張晏曰邯鄲山在東城下單盡也城郭從邑故旁加邑宋白曰邯鄲本衛地後屬晉七國時為趙都趙敬侯自晉陽始都邯鄲余按史記六國年表周安王之十六年趙敬侯之元年烈王之二年趙成侯之元年成侯二十二年魏克邯鄲是年顯王之十六年也二十四年魏歸邯鄲若敬侯已都邯鄲魏克其國都而趙不亡何也至顯王二十二年公子范襲邯鄲不勝而死是年肅侯之三年也意此時趙方都邯鄲蓋肅侯徙都非敬侯也邯音寒鄲音丹康多寒切浚民之膏澤以實之韋昭曰浚煎也讀曰醮宋祁曰浚蘇俊翻醮子召翻余謂浚讀當如宋音浚者疏瀹也淘也深也又因而殺之其誰與我其晉陽乎先主之所屬也古者諸侯之大夫其家之臣子皆稱之曰主死則曰先主考左傳可見已屬陟玉翻民必和矣乃走晉陽三家以國人圍而灌之城不浸者三版高二尺為一版三版六尺民無叛意沈持林翻顏師古漢書音義曰蛙黽也似蝦蟇而長腳其色青史游急就章曰蛙蝦蟇陸佃埤雅曰蛙似蝦蟇而長踦瞋目如怒蛙與蛙同音下媧翻智伯行水據經典擇文凡巡行之行音下孟翻後倣此魏桓子御韓康子驂乘兵車尊者居左執弓矢御者居中有力者居右持矛以備傾側所謂車右是也韓魏畏智氏之強一為之御一為之右驂與參同參者三也三人同車則曰驂乘四人同車則曰駟乘左傳齊伐晉燭庸之越駟乘杜預注曰四人共乘者殿車乘石證翻君乃今知水可以亡人國也桓子肘康子康子履桓子之跗以汾水可以灌安邑絳水可以灌平陽也跗音夫足趾也班志汾水出汾陽北山汾陽縣屬太原郡安邑縣屬河東郡史記正義曰安邑故城在絳州夏縣東北十五里應劭曰絳水出河東絳縣西南平陽縣亦屬河東郡安邑魏絳始居邑平陽韓武子玄孫貞子始居之桓康二子之肘足接蓋各為都邑慮也水經注曰絳水出絳縣西南蓋以故絳為言其水出絳山東西北流而合于澮猶在絳縣界中智伯所謂汾水可以灌安邑或亦有之絳水可以灌平陽耒識所由余謂自春秋之季至于元魏歷年滋多郡縣之離合川谷之遷改有不可以一時所睹為據者史記正義曰韓初都平陽今晉州也括地志曰絳水一名白今名沸泉源出絳山飛泉奮湧揚波注縣積壑三十餘丈望之極為奇觀可接引北灌平陽城酈道元父範歷仕三齊少長齊地熟其山川後入關死於道未嘗至河東也此蓋因耳學而致疑括地志成於唐之魏王泰泰者太宗之愛子羅致天下一時名儒以作此書其考據宜詳當取以為據絺疵謂智伯曰韓魏必反矣智伯曰子何以知之絺疵曰以人事知之夫從韓魏之兵以攻趙趙亡難必及韓魏矣夫音扶難乃旦翻今約勝趙而三分其地城不沒者三版人馬相食城降有日而二子無喜志有憂色是非反而何明日智伯以絺疵之言告二子二子曰此夫讒人欲為趙氏游說使主疑於二家而懈於攻趙氏也不然夫二家豈不利朝夕分趙氏之田而欲為危難不可成之事乎二子出絺疵入曰主何以臣之言告二子也智伯曰子何以知之對曰臣見其視臣端而趨疾知臣得其情故也智伯不悛絺疵請使於齊夫音扶餘並同難乃旦翻降戶江翻下也服也說輸芮翻懈居隘翻怠也危難如字悛丑緣翻改也止也絺抽遲翻姓也康曰絺當作郗姓譜諸書未有從絲者疑借字余按姓譜絺姓周蘇忿生支子封於絺因氏焉為趙之為音于僞翻使疏吏翻疵請出使以避禍也趙襄子使張孟談潛出見二子曰臣聞脣亡則齒寒今智伯帥韓魏以攻趙趙亡則韓魏為之次矣帥讀曰率二子曰我心知其然也恐事未遂而謀泄則禍立至矣張孟談曰謀出二主之口入臣之耳何傷也二子乃潛與張孟談約為之期日而遣之姓譜張氏本自軒轅第五子揮始造弦實張網羅世掌其職後因氏焉風俗傳云張王李趙黃帝所賜姓也又晉有解張字張侯自此晉國有張氏唐姓氏譜張氏出自姬姓黃帝子少昊青陽氏第五子揮正始制弓矢子孫賜姓張周宣王卿士張仲其後裔事晉為大夫而決水灌智伯軍智伯軍救水而亂韓魏翼而擊之襄子將卒犯其前將即亮翻又音如字將領也卒臧沒翻說文吏人給事者衣為卒卒衣有題識其字從衣從十大敗智伯之衆以此敗彼曰敗敗比邁翻盡滅智氏之族史記六國年表三晉滅智氏在周定王十六年上距獲麟二十七年皇甫謐曰元王十一年癸未三晉滅智伯以別族也臣光曰智伯之亡也才勝德也夫才與德異而世俗莫之能辨夫音扶通謂之賢此其所以失人也夫聰察強毅之謂才正直中和之謂德才者德之資也德者才之帥也夫音扶帥所類翻雲夢之竹天下之徑也書禹貢雲土夢作乂孔安國注云雲夢之澤在江南左傳楚王以鄭伯田江南之夢杜預注云楚之雲夢跨江南北班志雲夢澤在南郡華容縣南祝穆曰據左傳䢵夫人廾子文於夢中言夢而不言雲楚子避吳入于雲中言雲而不言夢則知雲夢二澤也漢陽志雲在江之北夢在江之南又安陸有雲夢澤枝江有雲夢城蓋古之雲夢澤甚廣而後世悉為邑居聚落故地之以雲夢得名者非一處竹箭之産荊楚為良雲夢楚之地也夢如字又莫公翻不羽括則不能以入堅矯舉夭翻揉如久翻康曰揉曲為矯揉所以橈曲而使之直也羽者箭翎括者箭窟受弦處括音聒通作筈棠溪之金天下之利也左傳楚封吳夫概王於棠溪戰國之時其地屬韓出金甚精利劉昭郡國志汝南郡吳房縣有棠溪亭杜佑通典曰棠溪在今汝州郾城縣界九域志蔡州有冶爐城韓國鑄劍之地不砥礪則不能以擊強毛晃曰鎔銷也鑄也說文鑄器法也董仲舒傳猶金在鎔注鎔謂鑄器之模範範法也式也禮運範金合土砥軫氏翻柔石也礪力制翻䃺也聖人才德兼亡謂之愚人德勝才謂之君子才勝德謂之小人凡取人之術苟不得聖人君子而與之與其得小人不若得愚人何則君子挾才以為善小人挾才以為惡挾才以為善者善無不至矣挾才以為惡者惡亦無不至矣挾檄頰翻愚者雖欲為不善智不能周力不能勝譬如乳狗搏人人得而制之挾戶頰翻朱元晦曰挾者兼有而恃之之稱勝音升乳儒遇翻乳育也乳狗育子之狗也搏伯各翻小人智足以遂其姦勇足以決其暴是虎而翼者也其為害豈不多哉虎而傅翼其為害也愈甚嚴敬也愛者易親嚴者易疏易以鼓翻是以察者多蔽於才而遺於德自古昔以來國之亂臣家之敗子才有餘而德不足以至於顛覆者多矣豈特智伯哉故為國為家者苟能審於才德之分而知所先後先悉薦翻後戶遘翻又何失人之足患哉二十三年三家分智氏之田趙襄子漆智伯之頭以為飲器說文漆木汁可以䰍物下從水象漆如水滴而下也漢書張騫傳胸奴破月氏王以其頭為飲器韋昭注曰飲器椑榼也晉灼曰飲器虎子屬也或曰飲酒之器也師古曰胸奴嘗以月氏王頭與漢使歃血盟然則飲酒之器是也韋云椑榼晉云虎子皆非也椑榼即今之偏榼所以盛酒耳非用飲者也虎子褻器所以溲便者椑音鼙榼克合翻氏音支使疏吏翻歃色甲翻盛時征翻褻息列翻溲疏鳩翻便毗連翻豫姓也讓名也戰國之時又有豫且不知其同時否也為音于僞翻下同挾匕首入襄子宮中塗廁挾持也劉向曰匕首短劍鹽鐵論曰匕首長尺八寸頭類匕故云匕首匕音比廁初吏翻圊也長直亮翻索之獲豫讓索山客翻左右欲殺之襄子曰智伯死無後而此人欲為報仇真義士也吾謹避之耳乃舍之舍讀曰捨豫讓又漆身為癩吞炭為啞癩落蓋翻惡疾也啞倚下翻瘖也行乞於市神農日中為市致天下之民聚天下之貨交易而退此立市之始也鄭氏周禮注曰市雜聚之處行見其友其友識之為之泣曰以子之才臣事趙孟必得近幸自春秋之時趙宣子謂之宣孟趙文子謂之趙孟其後遂襲而呼為趙孟孟長也顧不易邪易以豉翻何乃自苦如此求以報仇不亦難乎豫讓曰章十二行本曰下有不可二字乙十一行本同孔本同張校同退齊校同既已委質為臣經典釋文曰質職日翻委質委其體以事君也後漢書注委質屈膝而又求殺之是二心也凡吾所為者極難耳然所以為此者將以愧天下後世之為人臣懷二心者也襄子出豫讓伏於橋下襄子至橋馬驚索之得豫讓遂殺之自智宣子立瑤至豫讓報仇其事皆在威烈王二十三年之前故先以初字發之溫公之意蓋以天下莫大於名分觀命三大夫為諸侯之事則知周之所以益微七雄之所以益盛莫重於宗社觀智趙立後之事則知智宣子之所以失趙簡子之所以得君臣之義當守節伏死而已觀豫讓之事則知策名委質者必有霣而無二其為後世之鑑豈不昭昭也哉襄子為伯魯之不立也有子五人不肯置後封伯魯之子於代代國在夏屋句注之北趙襄子滅之班志有代郡代縣為于僞翻夏戶雅翻早卒成諡也諡法安民立政曰成浣戶管翻襄子卒弟桓子逐浣而自立史記六國表威烈王元年襄子卒二年趙桓子元年卒明年國人立獻侯浣浣索隱作晚卒子恤翻下同趙氏之人曰桓子立非襄主意乃共殺其子復迎浣而立之是為獻子復扶又翻又音如字獻子即獻侯六國表威烈王三年獻侯之元年蓋分晉之後三晉僭侯久矣諡法知質有聖曰獻獻子生籍是為烈侯諡法有功安民曰烈秉德尊業曰烈魏桓子之孫也是為文侯諡法學勤好問曰文慈惠安民曰文武子生虔是為景侯諡法克定禍亂曰武布義行剛曰景六國表威烈王二年魏文侯斯元年十八年韓景侯虔元年蓋其在國僭爵已久不敢以通王室威烈王遂因而命之識者重為周惜通鑑於此序三家之世也魏文侯以卜子夏田子方為師卜以官為氏田本出於陳陳敬仲以陳為田氏徐廣曰始食采地由是改姓田氏索隱曰陳田二聲相近遂為田氏夏戶雅翻過工禾翻唐人志氏族曰李耳字伯陽一字聃其後有李宗魏封於段為干木大夫是以段為氏也余按通鑑赧王四十二年魏有段干子則段干復姓也書武王式商容閭注云式其閭巷以禮賢記曲禮國君撫式士下之注云升車必正立據式小俯崇敬也師古曰式車前橫木古者立乘凡言式車者謂俯首撫式以禮敬人孔穎達曰式謂俯下頭也古者車箱長四尺四寸而三分前一後二橫一木下去車牀三尺三寸謂之為式又於式上二尺二寸橫一木謂之較較去車牀凡五尺五寸於時立乘若平常則憑較故詩云倚重較兮是也若應為敬則落隱下式而頭得俯俯故記云式視馬尾是也較訖嶽翻四方賢士多歸之文侯與㣥臣飲酒樂而天雨命駕將適野左右曰今日飲酒樂天又雨君將安之文侯曰吾與虞人期獵雖樂豈可無一會期哉乃往身自罷之周禮有山虞澤虞以掌山澤注云虞度也度知山林之大小及其所生身自罷之者身往告之以雨而罷獵也樂音洛韓借師於魏以伐趙文侯曰寡人與趙兄弟也不敢聞命趙借師於魏以伐韓文侯應之亦然二國皆怒而去已而知文侯以講於己也講和也朝直遙翻魏於是始大於三晉諸侯莫能與之爭使樂羊伐中山克之樂姓也本自有殷微子之後宋戴公四世孫樂呂為大司寇中山春秋之鮮虞也漢為中山郡宋白曰唐定州春秋白狄鮮虞之地隋圖經曰中山城在今唐昌縣東北三十一里中山故城是也杜佑曰城中有山故曰中山文侯問於㣥臣曰我何如主皆曰仁君任座曰君得中山不以封君之弟而以封君之子何謂仁君文侯怒任座趨出任座亦習見當時鄰國之事而為是言耳任音壬座一作痤音才戈翻翟姓也音直格翻又音狄姓譜翟為晉所滅子孫以國為氏今人多讀從上音璜戶光翻對曰仁君文侯曰何以知之對曰臣聞君仁則臣直嚮者任座之言直臣是以知之文侯悅使翟璜召任座而反之親下堂迎之以為上客文侯與田子方飲文侯曰鍾聲不比乎比音毗不比言不和也左高此蓋編鍾之懸左高故其聲不和文侯曰何笑子方曰臣聞之君明樂官不明樂音今君審於音臣恐其聾於官也明樂官知其才不才明樂音知其和不和五聲合和然後成音詩大序曰聲成文謂之音文侯曰善子擊出遭田子方於道下車伏謁古文史引重致遠少昊氏加牛禹時奚仲加馬釋名曰車居也韋昭曰古唯尺遮翻自漢以來始有居音蕭子顯曰三皇氏乘祗車出谷口車之始也祗翹移翻子方不為禮子擊怒謂子方曰富貴者驕人乎貧賤者驕人乎子方曰亦貧賤者驕人耳富貴者安敢驕人國君而驕人則失其國大夫而驕人則失其家失其國者未聞有以國待之者也失其家者未聞有以家待之者也夫士貧賤者言不用行不合則納履而去耳安往而不得貧賤哉子擊乃謝之夫音扶行下孟翻文侯謂李克曰先生嘗有言曰家貧思良妻國亂思良相今所置非成則璜二子何如李氏出自顓頊曾孫皋陶為堯大理以官命族為理氏商紂時裔孫利貞逃難食木子得全改為李氏置言置相也相息亮翻難乃旦翻卑不謀尊疏不謀戚臣在闕門之外不敢當命在闕門之外謂疏遠也先生臨事勿讓克曰君弗察故也居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取五者足以定之矣何待克哉文侯曰先生就舍吾之相定矣相息亮翻李克出見翟璜翟璜曰今者聞君召先生而卜相果誰為之克曰魏成翟璜忿然作色曰西河守吳起臣所進也班志魏地其界自高陵以東盡河東河內高陵縣漢屬馮翊其地在河西所謂西河之外者也魏初使吳起守之秦兵不敢東向至惠王時秦使衛鞅擊虜其將公子卬遂獻西河之外於秦吳以國為姓相息亮翻守式又翻臣進西門豹班志鄴縣屬魏郡西門豹為鄴令鑿渠以利民王符潛夫論姓氏篇曰如有東門西郭南宮北郭皆因居以為姓西門蓋亦此類鄴魚怯翻臣進樂羊中山已拔無使守之臣進先生君之子無傅臣進屈侯鮒傅者傅之以德義因以為官名傅芳遇翻屈九勿翻姓也余按屈晉地時屬魏鮒蓋魏封屈侯也鮒音符遇翻臣何負於魏成不勝為負子章十二行本子下有之字乙十一行本同孔本同言克於子之君者豈將比周以求大官哉比毗至翻阿黨為比君問相於克克之對如是李克自叙其答魏文侯之言也魏成食祿千鍾孔穎達曰祿者穀也故鄭注司祿云録也言穀年穀豐然後制祿援神契云祿者録也白虎通曰上以收録接下下以名録謹以事上是也六斛四斗為一鍾什一在內是以東得卜子夏田子方段干木夏戶雅翻此三人者君皆師之子所進五人者君皆臣之子惡得與魏成比也惡讀曰烏何也翟璜逡巡再拜曰璜鄙人也失對願卒為弟子逡七偷翻逡巡却退貌卒子恤翻終也孔穎達曰先生師也謂師為先生者言彼先己而生其德多厚也自稱為弟子者言己自處如弟子則尊其師如父兄也吳起者衛人仕於魯齊人伐魯魯人欲以為將起取齊女為妻將即亮翻下同取讀曰娶孔穎達曰妻之為言齊也以禮見問得與夫敵體也魯人疑之起殺妻以求將大破齊師或譖之魯侯曰起始事曾參世本曰曾姓出自鄫國陸德明曰參所金翻一音七南翻曾參絶之今又殺妻以求為君將起殘忍薄行人也行下孟翻且以魯國區區而有勝敵之名則諸侯圖魯矣起恐得罪聞魏文侯賢乃往歸之文侯問諸李克李克曰起貪而好色好呼到翻然用兵司馬穰苴弗能過也司馬官名穰苴本齊田姓仕齊為是官故以稱之齊景公之賢將也穰如羊翻苴子余翻擊秦拔五城起之為將與士卒最下者同衣食臥不設席行不騎乘騎馬為騎乘車為乘言起與士卒同其勞苦行不用車馬也師古曰贏擔也此言起親裹士卒所齎擔之糧贏怡成翻卒有病疽者起為吮之疽七余翻癰也吮徐兗翻說文嗽也康所角切卒母聞而哭之人曰子卒也而將軍自吮其疽何哭為母曰非然也往年吳公吮其父疽章十二行本無疽字乙十一行本同孔本同其父戰不旋踵遂死於敵吳公今又吮其子妾不知其死所矣是以哭之二十三年燕湣公薨子僖公立燕自召公奭受封於北燕其地則唐幽州薊縣故城是也自召公至湣公三十二世燕因肩翻湣讀與閔同諡法使民悲傷曰閔小心畏忌曰僖二十四年二十四年王崩子安王驕立二十四年盜殺楚聲王國人立其子悼王周成王封熊繹於楚姓羋氏居丹陽今枝江縣故丹陽城是也括地志曰歸州秭歸縣丹陽城熊繹之始國其後強大北封畛於汝南並吳越地方五千里自熊繹至聲王三十世索隱曰聲王名當悼王名疑諡法不生其國曰聲注云生於外家年中早夭曰悼注云年不稱志又云恐懼從處曰悼注云從處言險也安王諡法好和不爭曰安元年元年秦伐魏至陽孤周孝王邑非子於秦徐廣曰今隴西縣秦亭是也括地志曰秦州清水縣本名秦十三州志曰秦亭秦谷是也至襄公取周地穆公霸西戎日以強大是年秦簡公之十四年也自非子至簡公二十八世陽孤史記作陽狐章乙十一行本正作狐正義引括地志曰陽狐郭在魏州元城縣東北三十里余按此時西河之外皆為魏境若秦兵至元城則是越魏都安邑而東矣水經注河東垣縣有陽壺城九域志絳州有陽壺城識之以廣異聞且俟知者二年二年魏韓趙伐楚至桑丘水經注澺水自葛陂東南徑新蔡縣故城東而東南流注于汝水又東南徑下桑里左迆為橫塘陂史記作乘丘正義地理志乘丘故城在兗州瑕丘縣西北三十五里當從之二年鄭圍韓陽翟周宣王封其弟友於鄭杜預世族譜曰封於咸林今京兆鄭邑是也幽王無道友徙其人於虢鄶之間遂有其地今河南新鄭是也友諡桓公是年鄭繻公駘之二十三年自桓公至繻公二十二世班志陽翟縣屬潁川郡索隱曰翟音狄溫公類篇音萇伯切繻詢趨翻駘堂來翻二年韓景侯薨子烈侯取立二年趙烈侯薨國人立其弟武侯二年秦簡公薨子惠公立諡法愛民好與曰惠三年三年王子定奔晉三年虢山崩壅河徐廣曰虢山在陝裴駰曰弘農陝縣故虢國北虢在大陽東虢在滎陽括地志曰虢山在陝州陝縣西臨黃河今臨河有岡阜似是頽山之餘水經注曰陝城西北帶河水湧起方數十丈父老云石虎載銅翁仲至此沈沒水所以湧洪河巨瀆宜不為金狄梗流蓋魏文侯時虢山崩壅河所致耳陝失冉翻四年四年楚圍鄭鄭人殺其相駟子陽鄭穆公之子騑字子駟古者以王父之字為氏子陽其後也相息亮翻騑芳菲翻五年五年日有食之杜預曰日行遲一歲一周天月行速一月一周天一歲凡十二交會然日月動物雖行度有大量不能不小有贏縮故有雖交會而不食者或有頻交而食者孔穎達曰日月交會謂朔也周天三百六十五度四分度之一日月皆右行於天一晝一夜日行一度月行十三度十九分度之七二十九日日有餘而月行天一周追及於日而與之會交會而日月同道則食月或在日道表或在日道裏則不食矣又曆家為交食之法大率以一百七十有三日有奇為限然月先在裏則依限而食者多若月在表則依限而食者少杜預見其參差乃云雖行度有大量不能不小有贏縮故有雖交會而不食者或有頻交而食者此得之矣蘇氏曰交當朔則日食然亦有交而不食者交而食陽微而陰乘之也交而不食陽盛而陰不能掩也朱元晦曰此則繫乎人事之感蓋臣子背君父妾婦乘其夫小人陵君子夷狄侵中國所感如是則陰盛陽微而日為之食矣是以聖人於春秋每食必書而詩人亦以為醜也今此書年而不書月與晦朔史失之也釋名曰日月虧曰食稍小侵虧如蟲食草木之葉也亦作蝕五年三月盜殺韓相俠纍俠纍與濮陽嚴仲子有惡仲子聞軹人聶政之勇以黃金百溢為政母壽欲因以報仇相息亮翻俠戶頰翻纍力追翻濮陽春秋之帝丘漢為濮陽縣屬東郡應劭曰濮水南入巨野水北為陽濮博木翻惡如字不善也康烏故切非軹春秋原邑晉文公所圍者漢為軹縣屬河內郡音只姓譜曰楚大夫食采於聶因以為氏聶尼輒翻溢夷質翻二十四兩為溢政不受曰老母在政身未敢以許人也及母卒仲子乃使政刺俠纍卒子恤翻刺七亦翻又如字俠纍方坐府上兵衛甚衆聶政直入上階上時掌翻刺殺俠纍因自皮面決章乙十一行本作抉眼自屠出腸韓人暴其尸於市暴步木翻又音如字露也購問莫能識其姊嫈聞而往哭之曰是軹深井里聶政也史記正義曰深井里在懷州濟源縣南三十里重自刑以絶從妾奈何畏歿身之誅終滅賢弟之名遂死於政尸之旁皮面以刀剺面而去其皮懸賞以募告者曰購購古候翻嫈烏莖翻絶從之從讀曰蹤謂自絶其蹤跡或曰從讀如字謂絶其從坐之罪也六年六年鄭駟子陽之黨弒繻公繻者諡法所不載史記注繻或作繚繻詢趨翻白虎通曰弟悌也心順行篤也行下孟翻六年宋悼公薨子休公田立武王封微子啓於宋唐宋州之睢陽縣是也自微子二十七世至悼公名購由休亦諡法所不載八年八年齊伐魯取最章十二行本最下有韓救魯三字乙十一行本同孔本同張校同退齊校同武王封太公於齊唐青州之臨淄是也括地志曰天齊水在臨淄東南十五里封禪書曰齊之所以為齊者以天齊是年康公貸之十一年自太公至康公二十九世成王封伯禽於魯唐兗州之曲阜是也是年穆公之十六年自伯禽至穆公凡二十八世八年鄭負黍叛復歸韓據史記繻公之十六年敗韓於負黍蓋以此時取之而今復叛歸韓也劉昭郡國志潁川郡陽城縣有負黍聚古今地名云負黍山在陽城縣西南二十七里或云在西南三十五里九年九年魏伐鄭九年晉烈公薨子孝公傾立周成王封弟叔虞於唐括地志曰故唐城在並州晉陽縣北二里堯所築也都城記曰唐叔虞之子燮父徙居晉水旁今並州理故唐城即燮父初徙之處其城南半入州城中毛詩譜曰燮父以堯墟南有晉水改曰晉侯自唐叔至烈公三十七世烈公名止諡法慈惠愛親曰孝十一年十一年秦伐韓宜陽取六邑班志宜陽縣屬弘農郡史記正義曰宜陽縣故城在河南府福昌縣東十四里故韓城是也此邑即周禮四井為邑之邑十一年初田常生襄子盤盤生莊子白白生太公和此序齊田氏之世也田常即左傳陳成子恆也溫公避仁廟諱改恆曰常自陳公子完奔齊五世至常得政諡法勝敵志強曰莊齊田和遷齊康公於海上使食一城以奉其先祀十二年十二年秦晉戰于武城此非魯之武城左傳晉陰飴甥會秦伯盟于王城杜預曰馮翊臨晉縣東有王城今名武鄉括地志故武城一名武平城在華州鄭縣東北十三里十二年齊伐魏取襄陽陽當作陵徐廣曰今之南平陽也余據晉志南平陽縣屬山陽郡班志陳留郡有襄邑縣師古曰圈稱云襄邑宋地本承匡襄陵鄉也宋襄公所葬故曰襄陵秦始皇以承匡卑濕徙縣襄陵因曰襄邑十二年魯敗齊師于平陸班志東平國有東平陸縣戰國時之平陸也史記正義曰平陸兗州縣即古厥國宋白曰鄆州中都縣漢為平陸縣史記魯敗齊師于平陸是也敗補邁翻十三年十三年秦侵晉十三年齊田和會魏文侯楚人衛人于濁澤康曰濁水名漢志濁水出齊郡廣縣媯山余謂康說誤矣徐廣史記注曰長社有濁澤水經注曰皇陂水出胡城西北胡城潁陰之狐人亭也皇陂古長社之濁澤也記諸侯相見於郤地曰會孔穎達曰諸侯未及期而相見曰遇會者謂及期之禮既及期又至所期之地魏文侯為之請於王及諸侯王許之為之之為于僞翻十五年十五年秦伐蜀取南鄭譜記普疑衍肇自人皇之際黃帝子昌意娶蜀山氏女生帝嚳既立封其支庶於蜀歷虞夏商周周衰先稱王者蠶叢余據武王伐紂庸蜀諸國皆會于牧野孔安國曰蜀叟也春秋之時不與中國通班志南鄭縣屬漢中郡唐為梁州治所嚳通作嚳音括沃翻十五年魏文侯薨太子擊立王者以嫡長子為太子謂之國儲副君諸侯曰世子周衰率上僭孔穎達曰太者大中之大也上時掌翻長知兩翻武侯浮西河而下西河即禹貢之龍門西河美哉山河之固此魏國之寶也對曰在德不在險昔三苗氏左洞庭右彭蠡德義不修禹滅之武陵長沙零桂之水匯為洞庭周七百里彭蠡澤在漢豫章郡彭澤縣西書有苗弗率汝徂征三苗所居蓋今江南西道之地蠡里弟翻左河濟右泰華伊闕在其南羊腸在其北修政不仁湯放之濟水出河東垣縣王屋山南流貫河而南合于滎瀆禹貢所謂導沇水東流為濟溢為滎者也自漢築滎陽石門而濟與河合流而注于海不入滎瀆禹貢所謂導沇水東流為濟入于河桀都安邑蓋恃以為險泰華山在京兆華陰縣南水經伊水出南陽縣西荀渠山東北流至河南新城縣又東南過伊闕中大禹所鑿也兩山相對望之若闕左傳女寬守闕塞即其地括地志伊闕山在洛州南十九里班志上黨壺關縣有羊腸阪此安邑四履所憑山河之固也書曰成湯放桀于南巢濟子禮翻華戶化翻左孟門右太行常山在其北大河經其南修政不德武王殺之水經注孟門在河東北屈縣西即龍門上口也淮南子曰龍門未闢呂梁未鑿河出孟門之上溢而逆流無有丘陵名曰洪水太行山在河內野王縣西北常山在常山郡上曲陽縣西北河水自孟門南抵華陰屈而東流紂都朝歌河經其南北屈之孟門在朝歌西北恐不可言左索隱曰孟門別一山在朝歌東邊此特左右二字之差而誤耳春秋說題辭河之為言荷也荷精分布懷陰引度也釋名河下也隨地下處而通流也書曰武王勝殷殺紂太行之行戶剛翻北屈陸求忽翻顏居勿翻在德不在險若君不修德舟中之人皆敵國也武侯曰善魏置相相田文相息亮翻此田文非齊之田文吳起不悅謂田文曰請與子論功可乎田文曰可起曰將三軍使士卒樂死敵國不敢謀子孰與起文曰不如子將即亮翻樂音洛起曰治百官親萬民實府庫子孰與起文曰不如子治直之翻起曰守西河秦兵不敢東鄉韓趙賓從子孰與起文曰不如子鄉讀曰向賓從猶言賓服也起曰此三者子皆出吾下而位居吾上何也文曰主少國疑大臣未附百姓不信方是之時屬之子乎屬之我乎少詩照翻屬子欲翻起默然良久曰屬之子矣久之魏相公叔尚章十二行本尚下有魏公二字乙十一行本同孔本同張校同退齊校同主而害吳起如淳曰天子嫁女於諸侯必使諸侯同姓者主之故謂之公主帝姊妹曰長公主諸王女曰翁主師古曰如說得之天子不親主婚故謂之公主諸王則自主婚故其女曰翁主翁者父也言父主其婚也亦曰王主言王自主其婚也揚雄方言云周晉秦隴謂父曰翁而臣瓚王楙或云公者比於上爵或云主者婦人尊稱皆失之劉貢父曰豫謂公主之稱本出秦舊男為公子女為公主古者大夫妻稱主故以公配之若謂同姓主之故謂之公主則周之事秦不知用也古之嫁女禮當如周使大夫主之何不謂之夫主乎然則謂之王主者猶言王子也謂之公主者緣公而生耳毛晃曰尚崇也高也貴也飾也加也尊也娶公主謂之尚言帝王之女尊而尚之不敢言娶也相息亮翻起易去也起為人剛徑自喜易以豉翻去起呂翻師古曰喜許吏翻子先言於君曰吳起賢人也而君之國小臣恐起之無留心也君盍試延以女起無留心則必辭矣子因與起歸而使公主辱子起見公主之賤子也必辭則子之計中矣中竹仲翻公叔從之吳起果辭公主魏武侯疑之而未信起懼誅遂奔楚楚悼王素聞其賢至則任之為相起明法審令相息亮翻法古法字捐不急之官廢公族疏遠者以撫養戰鬬之士要在強兵破遊說之言從橫者捐余專翻廾也除去也漢書音義曰以利合曰從以威力相脅曰橫或曰南北曰從從者連南北為一西鄉以擯秦東西曰橫橫者離山東之交使之西鄉以事秦說式芮翻從即容翻橫亦作衡音同於是南平百越韋昭曰越有百邑西伐秦諸侯皆患楚之強而楚之貴戚大臣多怨吳起者十五年秦惠公薨子出公立出非諡也以其失國出死故曰出公十五年趙武侯薨國人復立烈侯之太子章是為敬侯諡法夙夜警戒曰敬十五年韓烈侯薨子文侯立十六年十六年初命齊大夫田和為諸侯田氏自此遂有齊國田和是為太公十六年趙公子朝作亂章乙十一行本亂下有出字孔本同退齊校同此處百衲本缺奔魏與魏襲邯鄲不克邯音寒鄲音丹十七年十七年秦庶長改逆獻公于河西而立之殺出子及其母沈之淵旁後秦制爵一級曰公士二上造三簪裊四不更五大夫六官大夫七公大夫八公乘九五大夫十左庶長十一右庶長十二左更十三中更十四右更十五少上造十六大上造十七駟車庶長十八大庶長十九關內侯二十徹侯師古曰庶長言衆列之長注又詳見下卷顯王十年前據史記威烈王十一年秦靈公卒子獻公師隰不得立立靈公季父悼子是為簡公出子簡公之孫也今庶長改迎獻公而殺出子正義曰西者秦州西縣秦之舊地時獻公在西縣故迎立之余謂此言河西非西縣也靈公之卒獻公不得立出居河西河西者黃河之西蓋漢涼州之地裊當作裊乃了翻更工衡翻乘繩證翻長知丈翻十七年齊伐魯十七年韓伐鄭取陽城漢陽城縣屬潁川郡是為地中成周於此以土圭測日景執宋公十七年齊太公薨子桓公午立十九年十九年魏敗趙師于兔臺史記趙世家曰魏敗我兔臺築剛平正義曰兔臺剛平並在河北敗補邁翻二十年二十年日有食之既既盡也二十一年二十一年楚悼王薨貴戚大臣作亂攻吳起起走之王尸而伏之之往也往赴王尸而伏其側並中王尸射而亦翻刺七亦翻中竹仲翻既葬肅王即位諡法剛德克就曰肅執心決斷曰肅令尹楚相也夷殺也夷宗者殺其同宗也二十二年二十二年齊伐燕取桑丘魏韓趙伐齊至桑丘此桑丘非二年所書楚之桑丘括地志曰桑丘故城俗名敬城在易州遂城縣蓋燕之南界也二十三年二十三年趙襲衛不克成王封康叔於衛居河淇之間故殷墟也至懿公為狄所滅東徙度河文公徙居楚丘遂國於濮陽是年慎公頽之三十五年自康叔至慎公凡三十二世二十三年齊康公薨無子田氏遂並齊而有之姜氏至此滅矣是歲齊桓公亦薨子威王因齊立諡法強毅言九正曰威言九渠留翻齊桓公田午言九謀也二十四年二十四年狄敗魏師于澮漢之中山上黨西河上郡自春秋以來狄皆居之此亦其種也水經澮水出河東絳縣東澮山西過絳縣南又西南過虒祁宮南又西南至王橋入汾水括地志澮山在絳州翼城縣東北敗補邁翻澮古外翻二十四年魏韓趙伐齊至靈丘史記正義曰靈丘河東蔚州縣余按蔚州之靈丘即漢代郡之靈丘此時齊境安能至代北邪此即孟子謂蚳蛙辭靈丘請士師之地班志曰齊地北有千乘清河以南漢清河郡有靈縣清河北接趙魏之境此為近之蚳音遲蛙烏花翻二十四年晉孝公薨子靖公俱酒立諡法柔衆安民曰靖又恭己鮮言曰靖二十五年二十五年蜀伐楚取茲方據史記蜀伐楚取茲方楚為扞關以拒之則茲方之地在扞關之西劉昭志巴郡魚復縣有扞關二十五年子思言苟變於衛侯曰其才可將五百乘古者兵車一乘甲士三人步卒七十二人五百乘三萬七千五百人國語曰苟本自黃帝之子將即亮翻下同乘繩證翻吾知其可將然變也嘗為吏賦於民而食人二雞子故弗用也子思曰夫聖人之官人猶匠之用木也夫音扶取其所長棄其所短故梓連抱而有數尺之朽良工不棄今君處戰國之世處昌呂翻選爪牙之士而以二卵棄干城之將詩赳赳武夫公侯干城毛氏傳曰干扞也音戶旦翻鄭氏箋曰干也城也皆所以禦難也干讀如字公再拜曰謹受教矣衛侯言計非是而㣥臣和者如出一口和戶臥翻子思曰以吾觀衛所謂君不君臣不臣者也君不君臣不臣論語載齊景公之言何乃若是公丘復姓諡法溫柔賢善曰懿人主自臧則衆謀不進臧善也猶卻衆謀況和非以長惡乎和戶臥翻長知丈翻夫不察事之是非而悅人讚己暗莫甚焉不度理之所在而阿諛求容諂莫甚焉度徒洛翻君暗臣諂以居百姓之上民不與也若此不已國無類矣子思言於衛侯曰君之國事將日非矣公曰何故對曰有由然焉君出言自以為是而卿大夫莫敢矯其非卿大夫出言亦自以為是而士庶人莫敢矯其非君臣既自賢矣白虎通曰君㣥也㣥下之所歸心也臣堅也厲志自堅也賢之則順而有福矯之則逆而有禍如此則善安從生詩曰具曰豫聖誰知烏之雌雄詩正月之辭毛氏傳曰君臣俱自謂聖也鄭氏箋曰時君臣賢愚適同如烏之雌雄相似誰能別異之乎又曰烏鳥以翼知之右掩左雄左掩右雌陰陽相下之義也抑亦似君之君臣乎二十五年魯穆公薨子共公奮立諡法布德就義曰穆中情見貌曰穆尊賢敬讓曰共既過能改曰共執事堅固曰共共讀曰恭考異曰司馬遷史記六國表周威烈王十九年甲戌魯穆公元年烈王元年丙午共公元年顯王十七年己巳康公元年二十六年戊寅景公元年赧王元年丁未平公元年二十年丙寅文公元年四十三年己丑頃公元年五十九年乙巳周亡秦莊襄王元年壬子楚滅魯按魯世家穆公三十三年卒若元甲戌終乙巳則是三十二年也共公二十二年卒若元丙午終戊辰則是二十三年也康公九年卒景公二十五年卒平公二十二年卒若元丁未終乙丑則是十九年也文公二十三年卒頃公二十四年楚滅魯班固漢書律曆志文公作緡公其在位之年與世家異者惟平公二十年耳本志自魯僖公五年正月辛亥朔旦冬至推之至成公十二年正月庚寅朔旦冬至定公七年正月己巳朔旦冬至元公四年正月戊申朔旦冬至康公四年正月丁亥朔旦冬至緡公二十二年正月丙寅朔旦多至漢高祖八年十一月乙巳朔旦冬至武帝元朔六年十一月甲申朔旦冬至元帝初元二年十一月癸亥朔旦冬至其間相距皆七十六年此最為得實又與魯世家注皇甫謐所紀歲次皆合今從之六國表差謬難可盡據也余按考異自魯僖公五年至漢元帝初元二年六百餘年間十二月朔旦冬至相距皆七十六年此最為得實又與魯世家注皇甫謐所紀歲次皆合蓋謂劉彞叟長曆也且言史記六國表差謬難可盡據又按通鑑目録編年用劉彞叟長曆漢武帝太初元年初用夏正定曆史記曆書是年書閼逢攝提格目録書強圉赤奮若閼逢攝提格甲寅也強圉赤奮若丁丑也有二十四年之差溫公用彞叟曆邵康節皇極經世書亦用彞叟曆康節少自雄其才既學力慕高遠一見李之才遂從而受學廬於共城百源冬不爐夏不扇夜不就席者數年覃思於易經也皇極經世書不能違彞叟曆及其來居於洛而溫公亦奉祠以書局在洛相過從稔又夙所敬者也余意其講明之間必嘗及此而決於用彞叟曆讀考異此一段辭意可見二十五年韓文侯薨子哀侯立二十六年二十六年王崩子烈王喜立二十六年魏韓趙共廢晉靖公為家人而分其地唐叔不祀矣烈王名喜安王之子元年元年日有食之元年韓滅鄭因徙都之韓本都平陽其地屬漢之河東郡中間徙都陽翟鄭都新鄭其地屬漢之河南郡鄭桓公始封於鄭其地屬漢之京兆後滅虢鄶而國於溱洧之間故曰新鄭左傳鄭莊公所謂吾先君新邑於此是也今韓既滅鄭自陽翟徙都之韓既都鄭故時人亦謂韓王為鄭王考之戰國策韓非子可見元年趙敬侯薨子成侯種立種章勇翻三年三年燕敗齊師於林狐敗補邁翻魯伐齊入陽關徐廣曰陽關在巨平班志巨平縣屬泰山郡括地志陽關故城在兗州博城縣南二十九里其城之西臨汶水汶音問魏伐齊至博陵史記正義曰博陵在濟州西界宋白曰史記齊威王伐晉至博陵徐廣曰東郡之博平漢為縣三年燕僖公薨子桓公立三年宋休公薨子辟公立辟亦諡法之所不載三年衛慎公薨子聲公訓立諡法敏以敬曰慎戴記思慮深遠曰慎四年四年趙伐衛取都鄙七十三周禮太宰以八則治都鄙注云都之所居曰鄙都鄙卿大夫之采邑蓋周之制四縣為都方四十里一千六百井積一萬四千四百夫五酇為鄙鄙五百家也此時衛國褊小若都鄙七十三以成周之制率之其地廣矣盡衛之提封未必能及此數也更俟博考四年魏敗趙師于北藺班志西河郡有藺縣史記正義曰在石州其地於趙為西北故曰北藺藺離進翻五年五年魏伐楚取魯陽左傳所謂劉纍遷于魯縣即魯陽也班志魯陽縣屬南陽郡史記正義曰今汝州魯山縣五年韓嚴遂弒哀侯國人立其子懿侯初哀侯以韓廆為相而愛嚴遂二人甚相害也嚴遂令人刺韓廆於朝廆走哀侯哀侯抱之人刺韓廆兼及哀侯戰國策以聶政刺韓相事及並中哀侯為一事此從史記蜀本注曰按太史公年表及韓世家於韓烈侯三年皆書聶政殺韓相俠纍於哀侯六年又皆書嚴遂弒哀侯以刺客傳考之聶政殺俠纍事在哀侯時以戰國策考之亦然從傳與戰國策則是年表世家於烈侯三年書盜殺俠纍誤矣通鑑於烈侯三年載聶政殺俠纍事又於哀侯六年載嚴遂殺其君哀侯是從年表世家所書蓋刺客傳初不言併殺哀侯止戰國策言之通鑑豈以此疑之歟故載併刺哀侯不書聶政止曰使人以此求之則通鑑之意不以嚴仲子為嚴遂亦不以俠纍為韓廆止從年表世家而不信其傳也余按溫公與劉道原書亦疑此事廆戶賄翻相息亮翻刺七亦翻朝直遙翻走音奏五年魏武侯薨不立太子子罃與公中緩爭立國內亂罃於耕翻中讀曰仲六年六年齊威王來朝是時周室微弱諸侯莫朝而齊獨朝之天下以此益賢威王朝直遙翻六年趙伐齊至鄄班志濟陰郡有鄄城縣鄄工掾翻六年魏敗趙師于懷班志河內郡有懷縣魏收地形志懷州武德郡有懷縣縣管內有懷城敗補邁翻六年齊威王召即墨大夫語之曰自子之居即墨也毀言日至班志即墨縣屬膠東國括地志即墨故城在萊州膠水縣南六十里宋白曰城臨墨水故曰即墨語牛倨翻下同田野辟辟讀曰闢下同人民給官無事東方以寧是子不事吾左右以求助也封之萬家召阿大夫語之曰自子守阿譽言日至阿即東阿縣班志屬東郡譽音余稱其美也田野不辟人民貧餒昔日趙攻鄄子不救鄄工掾翻衛取薛陵子不知薛陵春秋薛國之墟也班地薛縣屬魯國而衛國在漢東郡陳留界薛陵屬齊而近於衛故為所取齊後封田嬰於此是日烹阿大夫及左右嘗譽者於是㣥臣聳懼莫敢飾詐務盡其情齊國大治強於天下譽音余治直吏翻六年楚肅王薨無子立其弟良夫是為宣王六年宋辟公薨子剔成立剔他歷翻七年七年日有食之七年王崩弟扁立據班書古今人表師古注扁音篇是為顯王七年魏大夫王錯出奔韓姓譜王氏之所自出非一出太原琅邪者周靈王太子晉之後北海陳留齊王田和之後東海出自姬姓高平京兆魏信陵君之後天水東平新蔡新野山陽中山章武東萊河東者殷王子比干為紂所害子孫以王者之後號曰王氏余謂此皆後世以諸郡著姓言之耳春秋之時自有王姓莫能審其所自出魏亂可取也公孫姓也黃帝公孫氏頎渠希翻戰于濁澤大破之遂圍魏史記正義曰徐廣以為長社濁澤非也括地志云濁水源出蒲州解縣東北平地爾時魏都安邑韓趙伐魏豈至河南長社邪解縣濁水近於魏都當是也殺罃立公中緩割地而退我二國之利也懿侯曰不可殺魏君暴也割地而退貪也不如兩分之魏分為兩不強於宋衛則我終無魏患矣趙人不聽懿侯不悅以其兵夜去趙成侯亦去罃遂殺公中緩而立中讀曰仲是為惠王太史公曰魏惠王所以身不死國不分者二國之謀不和也若從一家之謀魏必分矣故曰君終無適子其國可破也索隱曰蓋古人之言及俗說故云故曰適讀曰嫡齊思和標點顧頡剛聶崇岐覆校
