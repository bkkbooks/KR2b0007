body:
  text: 資治通鑑卷第二百三十二端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註唐紀四十八德宗神武聖文皇帝七貞元元年貞元元年乙丑七八五貞元元年八月甲子詔凡不急之費及人宀儿食者皆罷之宀儿而隴翻貞元元年馬燧至行營與諸將謀曰長春宮不下燧音遂將即亮翻圍長春宮事始上卷是年四月則懷光不可得長春宮守備甚嚴攻之曠日持久我當身往諭之遂徑造城下造七到翻呼懷光守將徐庭光庭光帥將士羅拜城上將即亮翻帥讀曰率燧知其心屈徐謂之曰我自朝廷來可西向受命庭光等復西向拜復扶又翻燧曰汝曹自祿山已來徇國立功四十餘年天寶十四載安祿山反郭子儀李光弼皆以朔方軍討賊立大功其後回紇吐蕃深入京畿諸鎮叛亂外禦內討亦倚朔方軍以成功至是年凡三十一年今曰四十餘年四字誤也當作三從吾言非止免禍富貴可圖也衆不對燧披襟曰汝不信吾言何不射我射而亦翻將士皆伏泣燧曰此皆懷光所為汝曹無罪弟堅守勿出弟讀曰第但也皆曰諾壬申燧與渾瑊韓遊王褱進軍逼河中至焦籬堡渾戶昆翻又戶本翻瑊戶咸翻王褱古回翻焦籬堡在河中府河西縣西守將尉珪以七百人降尉紆勿翻本複姓尉遲後單姓尉以從便易降戶江翻下同是夕懷光舉火諸營不應駱元光在長春宮下使人招徐庭光庭光素輕元光遣卒罵之又為優胡於城上以侮之駱元光本安息胡人故徐庭光為優胡以侮之我降漢將耳元光使白燧燧還至城下庭光開門降燧以數騎入城慰撫其衆大呼曰還從宣翻又音如字騎奇寄翻呼火故翻吾輩復為王人矣復扶又翻又音如字渾瑊謂僚佐曰始吾謂馬公用兵不吾遠也今乃知吾不逮多矣渾戶昆翻又戶本翻瑊古銜翻不逮不及也詔以庭光試殿中監兼御史大夫此謂之試官兼官以寄祿且憲銜也甲戌燧帥諸軍至河西宋白曰河西縣本同州舊朝邑之地唐上元元年以朝邑地置河西縣大曆三年復置朝邑縣仍析朝邑五鄉幷割河東三鄉依舊為河西縣縣境東西十四里帥讀曰率考異曰舊燧傳曰燧帥諸軍濟河兵凡八萬陳於城下是日牛名俊斬懷光首以城降今從邠志西城擐甲矣又曰東城娖隊矣河中夾河為兩城西城河西縣東城河東縣河中府治焉擐音宦娖側角翻軍士皆易其號為太平字懷光不知所為乃縊而死縊於計翻又於賜翻初懷光之解奉天圍也事見二百二十九卷建中四年璀七罪翻監古銜翻寵待甚厚及懷光屯咸陽不進事見上卷興元元年臣父必負陛下願早為之備臣聞君父一也人生在三事之如一謂君父師也陛下未能誅臣父而臣父足以危陛下陛下待臣厚胡章乙十六行本胡上有臣字乙十一行本同孔本同人性直故不忍不言耳上驚曰知卿大臣愛子當為朕委曲彌縫而密奏之為于偽翻下同言璀當委曲彌縫使君臣之間無隙不當密奏其事對曰臣父非不愛臣臣非不愛其父與宗族也顧臣力竭不能回耳上曰然則卿以何策自免對曰臣之進言非苟求生臣父敗則臣與之俱死矣復有何策哉復扶又翻下同又音如字下同使臣賣父求生陛下亦安用之上曰卿勿死為朕更至咸陽諭卿父使君臣父子俱全不亦善乎璀至咸陽而還更古孟翻還音旋又如字曰無益也願陛下備之勿信人言臣今往說諭萬方說式芮翻臣父言汝小子何知主上無信吾非貪富貴也直畏死耳汝豈可陷吾入死地邪邪音耶及李泌赴陝李泌赴陝見上卷是年七月泌薄必翻陝失冉翻朕所以再三欲全懷光者誠惜璀也卿至陝試為朕招之對曰陛下未幸梁洋懷光猶可降也陝失冉翻為于季翻洋音祥降戶江翻今則不然豈有人臣迫逐其君迫逐其君謂懷光逼帝自奉天幸山南也縱彼顏厚無慚人知愧者色見於面不知愧者謂之顏厚復扶又翻又音如字朝直遙翻下同何心見之臣得入陝借使懷光請降臣不敢受況招之乎李璀固賢者必與父俱死矣若其不死則亦無足貴也及懷光死璀先刃其二弟乃自殺楚令尹子南之子與李璀者皆處君臣父子大倫之變以死繼之可哀也已朔方將牛名俊斷懷光首出降將即亮翻斷音短河中兵猶萬六千人燧斬其將閻晏等七人閻晏勸懷光東保河中稱兵犯同州者也考異曰邠志云八人今從舊馬燧傳燧自辭行至河中平凡二十七日戊申至甲戌二十七日史言馬燧期以一月平懷光不愆于素懷光囚郢鄘見上卷本年郢以井翻鄘余封翻韓遊王褱之攻懷光也楊懷賓戰甚力上命特原其子朝晟李懷光囚楊朝晟見二百三十卷元年三月王褱古回翻朝直遙翻晟成正翻王褱為楊朝晟後帥邠寧張本上使問陸贄河中既平復有何事所宜區處處昌呂翻令悉條奏令力丁翻贄以河中既平慮必有希旨生事之人以為王師所向無敵請乘勝討淮西者李希烈必誘諭其所部及新附諸帥曰新附諸帥謂李納王武俊田緒等誘音酉奉天息兵之旨乃因窘章乙十六行本窘下有急字乙十一行本同孔本同退齋校同而言朝廷稍安必復誅伐如此則四方負罪者孰不自疑河朔青齊固當響應窘臣隕翻復扶又翻又音如字河朔謂王武俊田緒劉怦青齊謂李納兵連禍結賦役繁興建中之憂行將復起乃上奏其略曰福不可以屢徼幸不可以常覬上時掌翻徼一遙翻覬音冀臣章乙十六行本臣上有又曰二字乙十一行本同孔本同姑以生禍為憂未敢以獲福為賀又曰陛下懷悔過之深誠實心為誠此謂興元赦書也聞者莫不涕流敭與揚同削偽號以請罪王武俊田悅李納去王號謝罪見二百二十九卷興元元年一純誠以效勤謂馬燧韓滉陳少遊讀通鑑者因其事而觀其心迹則知之矣曩討之而愈叛今釋之而畢來曩以百萬之師而力殫今以咫尺之詔而化洽是則聖王之敷理道服暴人理道即治道避高宗諱改之明矣㣥帥之悖臣禮拒天誅圖活而不圖王又明矣帥所類翻下同悖蒲內翻是則好生以及物者乃自生之方施安以及物者乃自安之術擠彼於死地擠子細翻又子西翻而求此之久生也措彼於危地而求此之久安也從古及今未之有焉又曰一夫不率率循也不率謂不循上之教令也一境不寧普天致擾又曰億兆汙人汙烏瓜翻汙下也四三叛帥感陛下自新之旨悅陛下盛德之言革面易辭且脩臣禮其於深言密議固亦未盡坦然必當聚心而謀傾耳而聽觀陛下所行之事考陛下所誓之言若言與事符則遷善之心漸固儻事與言背則慮禍之態復興陸贄斯言亦可以謂之深切當時事情背蒲妹翻復扶又翻朱泚滅而懷光戮懷光戮而希烈征希烈儻平禍將次及則彼之蓄素疑而懷宿負者能不為之動心哉為于偽翻又曰今皇運中興天禍將悔以逆泚之偷居上國泚且禮翻又音此唐都長安故謂之上國以懷光之竊保中畿開元八年以河中為中都河東河西二縣為次赤縣諸縣為次畿縣相次梟殄去年六月斬朱泚今年八月平懷光梟殄謂梟其首而殄絕其類梟堅堯翻衆慝猶言衆惡也慝吐得翻觀古玩翻又音如字威則已行惠猶未洽誠宜上副天眷下收物情布恤人之惠以濟威乘滅賊之威以行惠又曰臣所未敢保其必從唯希烈一人而已揆其私心非不願從也想其潛慮非不追悔也興元赦文李希烈不與朱泚同科亦在肆赦之數已竊大號雖荷陛下全宥之恩然不能不自靦於天地之間耳荷下可翻靦他典翻慚顏也縱未順命斯為獨夫孟子曰殘賊之人謂之獨夫言人無親輔之者外則無類以求助其計不過厚撫部曲偷容歲時心雖陸梁勢必不致陛下但敕諸鎮各守封疆彼既氣奪算窮是乃狴牢之類狴邊迷翻又部禮翻狴犴牢獄所以拘囚有罪不有人禍則當鬼誅陸贄論李希烈事曲盡情勢此之謂歟兵法百戰百勝不如不戰而屈人之兵丁卯詔以李懷光嘗有功宥其一男使續其後賜之田宅歸其首及尸使葬加馬燧兼侍中渾瑊檢校司空餘將卒賞賚各有差燧音遂渾戶昆翻又戶本翻瑊古咸翻校古孝翻將即亮翻賚來戴翻諸道與淮西連接者宜各守封疆非彼侵軼不須進討軼徒結翻突也李希烈若降當待以不死自餘將士百姓一無所問行陸贄之言也貞元元年初李晟嘗將神策軍戍成都蓋大曆十四年救蜀時也將即亮翻又音如字晟成正翻以營妓高洪自隨還從宣翻妓渠綺翻西川節度使張延賞怒追而還之由是有隙使疏吏翻至是劉從一有疾上召延賞入相晟表陳其過惡上重違其意相息亮翻重難也以延賞為左僕射李晟居功名之際以一婦人之故脩怨於嚮用之臣且天子命相而勳臣以私怨間之其能自安乎斯不學之由也為延賞讒晟張本射寅謝翻貞元元年駱元光將殺徐庭光謀於韓遊王褱王褱古回翻曰庭光辱吾祖考謂為優胡以戲侮之也馬公必怒公能救其死乎遊王褱曰諾壬午遇庭光於軍門之外揖而數其罪數所具翻又所主翻命左右碎斬之考異曰實錄甲申駱元光專殺徐庭光上令宰相諭諫官勿論邠志曰二十日駱公謀於韓公曰徐庭光見詬辱及祖父義不同天是日遂殺之按是月癸亥朔甲申二十二日蓋奏到之日也今從邠志頓首請罪燧大怒曰庭光已降受朝廷官爵公不告輒殺之是無統帥也燧音遂降戶江翻朝直遙翻統他綜翻俗從上聲帥所類翻欲斬之遊王褱曰元光殺裨將公猶怒如此公殺節度使天子其謂何燧默然渾瑊亦為之請為于偽翻乃捨之渾瑊鎮河中盡得李懷光之衆朔方軍自是分居邠蒲矣自郭子儀以來朔方軍亦分屯邠蒲而統於一帥今居邠者韓遊王褱帥之居蒲者渾瑊帥之不相統屬故史言其始分渾戶昆翻又戶本翻邠卑旻翻貞元元年盧龍節度使劉怦疾病使疏吏翻怦普耕翻疾甚曰病九月己亥詔以其子行軍司馬濟權知節度事怦尋薨薨呼肱翻貞元元年己未中書侍郎同平章事劉從一罷為戶部尚書庚申薨以疾罷而薨尚辰羊翻貞元元年冬十月癸卯上祀圜丘赦天下貞元元年十二月甲戌戶部奏今歲入貢者凡百五十州時河朔諸鎮及淄青淮西皆不入貢河隴諸州又沒于吐蕃貞元元年于闐王曜上言兄勝讓國於臣事見二百二十一卷肅宗上元元年闐徒賢翻又徒見翻上時掌翻上以銳檢校光祿卿還其國勝固辭曰曜久行國事國人悅服銳生長京華復扶又翻又音如字校古孝翻還從宣翻又音如字長知兩翻不習其俗不可往上嘉之以銳為韶王諮議韶王暹代宗子也唐制王府官諮議參軍正五品上二年貞元二年春正月壬寅以吏部侍郎劉滋為左散騎常侍與給事中崔造中書舍人齊映並同平章事滋子玄之孫也散悉亶翻騎奇寄翻劉子玄以史筆事武后中宗造少居上元少始照翻上元縣帶昇州與韓會盧東美張正則為友以王佐自許時人謂之四夔夔者唐虞之良臣時人重四人者以四夔稱之故不次用之朝直遙翻滋映多讓事於造造久在江外疾錢穀諸使罔上之弊奏罷水陸運使度支巡院江淮轉運使等諸道租賦悉委觀察使刺史遣官部送詣京師令宰相分判尚書六曹齊映判兵部李勉判刑部劉滋判吏部禮部造判戶部工部又以戶部侍郎元琇判諸道鹽鐵榷酒使疏吏翻度徒洛翻尚辰羊翻琇音秀榷古岳翻吉中孚判度支兩稅貞元二年李希烈將杜文朝寇襄州二月癸亥山南東道節度使樊澤擊擒之將即亮翻朝直遙翻山南東道節度治襄州貞元二年崔造與元琇善故使判鹽鐵韓滉奏論鹽鐵過失為崔造元琇得罪張本滉呼廣翻甲戌以琇為尚書右丞陝州水陸運使李泌奏自集津至三門泌薄必翻集津倉在三門東三門倉在三門西鑿山開車道十八里以避底柱之險底柱兩山屹立河中河水分流包山而過世謂之三門車道者陸運之道捨舟而車運也貞元二年三月李希烈別將寇鄭州義成節度使李澄擊破之代宗大曆七年賜滑亳節度為永平節度貞元元年永平軍節度更號義成軍節度興元元年李澄得鄭州會有疾夏四月丙寅大將陳仙奇使醫陳山甫毒殺之果如陸贄所料舉衆來降降戶江翻考異曰杜牧竇烈女傳曰初希烈入汴州聞戶曹參軍竇良女美使甲士至良門取桂娘以去將出門顧其父曰慎無戚必能滅賊使大人取富貴於天子桂娘以才色在希烈側復能巧曲取信凡希烈之密謀雖妻子不知者悉皆得聞希烈歸蔡州桂娘謂希烈曰忠而勇一軍莫如陳先奇其妻竇氏先奇寵且信之願得相往來以姊妹敍齒因徐說之使堅先奇之心希烈然之桂娘因以姊事先奇妻嘗間曰為賊遲晚必敗姊宜早圖遺種之地先奇妻然之興元元年四月希烈暴死其子不發喪欲盡誅老將校以卑少者代之計未決有獻含桃者桂娘白希烈子請分遺先奇妻且以示無事於外因為蠟帛書曰前日已死殯在後堂欲誅大臣須自為計以朱染帛丸如含桃先奇發丸見之言於薛育育曰兩日希烈稱疾但怪樂曲雜發晝夜不絕此乃有誅未定示暇於外事不疑矣明日先奇薛育各以所部譟於牙門請見希烈希烈子迫出拜曰願去偽號一如李納先奇曰爾父勃逆天子有命誅之因斬希烈及妻子函七首以獻暴其尸於市後兩月吳少誠殺先奇知桂娘謀因亦殺之今從實錄及舊傳甲申以仙奇為淮西節度使貞元二年關中倉廩竭禁軍或自脫巾呼於道曰呼火故翻拘吾於軍而不給糧吾罪人也上憂之甚會韓滉運米三萬斛至陝李泌即奏之上喜遽至東宮謂太子曰米已至陝吾父子得生矣滉呼廣翻陝失冉翻泌薄必翻記王制曰國無六年之蓄曰急無三年之蓄曰國非其國也況日闋無儲者乎日闋無儲有以繼之猶可況漕運不繼朝不及夕者乎唐都關中仰給東南之餫德宗於兵荒之餘其窘乏尤不可言觀其父子相與語亦懲涇卒之變發之於言語有不能以自揜者裴延齡知之故得因以排陸贄時禁中不釀命於坊市取酒為樂樂音洛又遣中使諭神策六軍軍士皆呼萬歲時比歲饑饉比毗至翻兵民率皆瘦黑至是麥始熟市有醉人當時以為嘉瑞人乍飽食死者復伍之一復扶又翻數月人膚色乃復故貞元二年以橫海軍使程日華為節度使滄州始別為節鎮以此觀之則以程日華為橫海軍副大使上卷衍大字明矣貞元二年秋七月淮西兵馬使吳少誠殺陳仙奇自為留後少誠素狡險為李希烈所寵任故為之報仇使疏吏翻少始照翻故為于偽翻下因為同己酉以虔王諒為申光隨蔡節度大使以少誠為留後貞元二年以隴右行營節度使曲環為陳許節度使曲環時以隴西行營兵戍陳許戶口流散曲環以勤儉率下政令寬簡賦役平均數年之間流亡復業兵食皆足貞元二年八月癸未義成節度使李澄薨其子士章乙十六行本士作克乙十一行本同退齋校同張校同云無註本誤士寧謀總軍務祕不發喪貞元二年丙戌吐蕃尚結贊大舉寇涇隴邠寧掠人畜芟禾稼西鄙騷然州縣各城守詔渾瑊將萬人駱元光將八千人屯咸陽以備之貞元二年初上與章乙十六行本與下有常侍二字乙十一行本同張校同云無註本亦無李泌議復府兵泌因為上歷敍府兵自西魏以來興廢之由西魏置府兵見一百六十三卷梁簡文帝大寶元年府兵廢見二百一十二卷玄宗開元十年府兵平日皆安居田畝每府有折衝領之折衝以農隙教習戰陳陳讀曰陣國家有事徵發則以符契下其州及府府者折衝果毅府下遐稼翻至所期處發兵刻期所會之地有教習不精者罪其折衝甚者罪及刺史軍還則賜勳加賞便道罷之罷兵使各隨便道歸農不必還至京師而後罷遠不經歲高宗以劉仁軌為洮河鎮守使以圖吐蕃見二百二卷高宗儀鳳二年武后以來承平日久府兵浸墮墮讀曰隳為人所賤百姓恥之至蒸熨手足以避其役又牛仙客以積財得宰相事見二百一十四卷玄宗開元二十四年山東戍卒多齎繒帛自隨邊將誘之寄於府庫晝則苦役夜縶地牢繒慈陵翻誘音酉縶音執縛也利其死而沒入其財故自天寶以後山東戍卒還者什無二三其殘虐如此然未嘗有外叛內侮殺帥自亶者誠以顧戀田園恐累宗族故也累良瑞翻自開元之末張說始募長征兵謂之彍騎事見一百一十二卷開元十年十三年六軍分左右為十二軍奏諸軍皆募人為之見二百一十六卷天寶八載著直略翻又無宗族不自重惜忘身徇利禍亂遂生至今為梗毛萇曰梗惡也鄭玄曰始生此禍乃至今日相梗不止安有如此下陵上替之患哉侵犯為陵偏下為替此乃社稷之福太平有日矣上曰俟平河中當與卿議之因置十六衞上將軍先敍議復府兵之事九月丁亥詔十六衞各置上將軍以寵功臣改神策左右廂為左右神策軍殿前射生左右廂為殿前左右射生軍各置大將軍二人將軍二人十六衞上將軍從二品神策大將軍正二品統軍從三品將軍從五品貞元二年庚寅李克寧始發父澄之喪殺行軍司馬馬鉉墨縗出視事墨縗自晉襄公始縗倉回翻劉玄佐出師屯境上以制之且使告諭切至克寧迺不敢襲位丁酉以東都留守賈耽為義成節度使克寧悉取府庫之財夜出軍士從而剽之比明殆盡剽匹妙翻比必利翻及也淄青兵數千自行營歸過滑州自李正己以來淄青兵未嘗應調發赴行營也此必李納遣兵自戍守其境亦稱行營耳李納雖外奉朝命內蓄兼幷之志請館其兵於城外朝直遙翻館古玩翻賈耽曰柰何與人鄰道而野處其將士乎處昌呂翻命館於城中耽時引百騎獵於納境納聞之大喜服其度量不敢犯也騎奇寄翻貞元二年吐蕃遊騎及好畤畤音止乙巳京城戒嚴復遣左金吾將軍張獻甫屯咸陽民間傳言上復欲出幸以避吐蕃復扶又翻齊映見上言曰外間皆言陛下已理裝具糗糧見賢遍翻理裝治裝也糗去久翻乾飯屑也人情恟懼夫大福不再左傳楚靈王之言恟許拱翻夫音扶因伏地流涕上亦為之動容為于偽翻李晟遣其將王佖將驍勇三千伏於汧城晟成正翻其將即亮翻佖毗必翻佖將音同上又音如字驍堅堯翻隴州之東有汧陽縣汧城在其旁汧口堅翻戒之曰虜過城下勿擊其首首雖敗彼全軍而至汝弗能當也不若俟前軍已過見五方旗虎豹衣言其軍士所服之衣畫為虎豹文出其不意擊之必大捷佖用其言尚結贊敗走軍士不識尚結贊僅而獲免尚結贊謂其徒曰唐之良將李晟馬燧渾瑊而已當以計去之燧音遂渾戶昆翻又戶本翻瑊古咸翻為尚結贊間李晟劫渾瑊賣馬燧張本去羌呂翻入鳳翔境內無所俘掠以兵二萬直抵城下曰李令公召我來俘芳無翻李晟時為中書令故稱之為令公此尚結贊所以間晟也何不出犒我經宿乃引退犒口到翻冬十月癸亥李晟遣蕃落使野詩良輔使疏吏翻野詩蕃姓也良輔其名與王佖將步騎五千襲吐蕃摧砂堡壬申遇吐蕃衆二萬與戰破之乘勝逐北至堡下攻拔之斬其將扈屈律悉蒙焚其蓄積而還騎奇寄翻扈屈律蕃人三字姓還從宣翻又如字尚結贊引兵自寧慶北去寧慶二州名癸酉軍於合水之北合水縣屬慶州隋開皇十六年置九域志合水縣在慶州東北四十五里王褱殺數百人吐蕃追之遊王褱陳于平川邠卑旻翻使疏吏翻王褱古回翻將即亮翻吐從暾入聲陳讀曰陣潛使人鼓於西山虜驚棄所掠而去貞元二年十一月甲午立淑王氏為皇后貞元二年乙未韓滉入朝滉呼廣翻自京口入朝朝直遙翻貞元二年丁酉皇后崩貞元二年辛丑吐蕃寇鹽州鹽州五原郡漢五原縣地我欲得城聽爾率人去彥光悉衆奔鄜州九域志慶州東至鄜州三百五十里考異曰邠志曰十二月三日吐蕃圍鹽州刺史杜彥光請委城以其衆去吐蕃許之分軍竊據今據實錄在此月劉玄佐在汴習鄰道故事習淄青淮西及河朔故事韓滉過汴玄佐重其才望以屬吏禮謁之汴皮變翻朝直遙翻滉呼廣翻過古禾翻又古臥翻韓滉鎮二浙雖王室播遷而巡屬寧晏轉輸絡繹劉玄佐以是重其才滉父休以剛直致位宰輔滉所歷任皆著聲績劉玄佐以是重其望滉為江淮河南諸道轉運使玄佐賜履之地乃漕運之所經以職分言之則非屬吏也玄佐敬滉故以屬吏禮脩謁滉相約為兄弟請拜玄佐母其母喜置酒見之酒半滉曰弟何時入朝玄佐曰久欲入朝但力未辦耳滉曰滉力可及弟宜早入朝丈母垂白諸父執行謂之丈人行韓滉與劉玄佐結為兄弟則視其父為丈人行故呼其母謂之丈母也凡反者家屬皆沒入掖庭故云然帥讀曰率勝音升滉乃遺玄佐錢二十萬緡遺唯季翻備行裝滉留大梁三日大出金帛賞勞勞力到翻緡眉巾翻考異曰柳氏敍訓云以綾二十萬匹犒軍今從國史補一軍為之傾動為于偽翻玄佐驚服既而遣人密聽之滉問孔目吏孔目吏今州部皆有之謂之孔目官亦謂之都吏言一孔一目無不總也今日所費幾何詰責甚細詰去吉翻細纖詳也玄佐笑曰吾知之矣壬寅玄佐與陳許節度使曲環俱入朝韓滉既遺劉玄佐以入朝之資又大出賞勞以動其一軍之心玄佐雖欲不入朝得乎使疏吏翻朝直遙翻考異曰鄴侯家傳曰韓相將入朝覲先公令人報比在闕庭已奏來則必能致大梁入朝今來所望善諭以致之十二月劉玄佐果入朝此蓋李繁掠美今從柳氏敍訓貞元二年崔造改錢穀法事多不集諸使之職行之已久中外安之諸使謂鹽鐵轉運諸使也謂解判鹽鐵而為右丞也琇音秀不視事既而江淮運米大至上嘉韓滉之功十二月丁巳以滉兼度支諸道鹽鐵轉運等使造所條奏皆改之是年正月崔造為相改錢穀法及罷諸使今更從舊貞元二年吐蕃又寇夏州亦令刺史托跋乾暉帥衆去遂據其城托與拓同托跋起於鮮卑之裔自謂托天而生拔地而長故以為姓此後魏所本者也若唐時党項諸部亦自有拓跋一姓我朝西夏其後也夏戶雅翻州素無城吏民皆潰吐蕃亦棄之又陷麟州宋白曰銀州漢為西河郡圁陰縣地周武帝保定二年於縣城置銀防三年置銀州因谷為名舊有人收驄馬於此谷虜語驄馬為乞銀故名西北至夏州二百三十里北至麟州三百里貞元二年韓滉屢短元琇於上庚申崔造罷為右庶子琇貶雷州司戶舊志雷州至京師六千五百一十二里考異曰實錄曰初元琇判度支關輔旱儉請運江淮租米以給京師上以韓滉素著威名加江淮轉運使欲令專督運務琇以滉性剛愎難與集事乃條奏令滉督運江南米至揚子凡一百十八里自揚子以北皆琇主之滉深怒於琇琇以京師錢重貨輕乃於江東監院收獲見錢四十餘萬貫令轉送入關滉不許誣奏以為運千錢至京師費錢萬上以問琇琇奏曰千錢之重約與一斗米均自江南水路至京師所費三二百耳上然之遣中使齎手詔令運錢滉堅執以為不可及滉總度支遂逞宿心累誣奏琇至是而貶焉舊崔造傳曰造與元琇素厚罷使之後以鹽鐵委之而韓滉以司務久行不可遽改德宗復以滉為江淮轉運使餘如造所條奏其年秋初江淮漕米大至京師德宗嘉其功以滉專領度支諸道鹽鐵轉運等使造所條奏皆改乃罷造知政事貶琇雷州司戶鄴侯家傳曰時元琇判度支江淮進米相次已入汴州而淄青及魏府蝗旱尤甚人皆相食李納無計欲束身入朝元琇迺支米十五萬石與之納軍遂濟三月入河運第一綱米三萬石自集津車般至三門十日而畢造入渭船亦成米至陝俄而度支牒至支充河中軍糧先公憂迫不知所為欲使人聞奏先令走馬與韓相謀之韓相報曰慎不可奏某判度支來在外勢不禁他反被他更鼓作言語待某今冬運畢當請朝覲此時面奏時蝗旱運路阻澀自四月初後有一日之內七奉手詔者皆為催米且言軍國糧儲自今月半後悉盡此米所藉公忠副朕憂屬星夜發遣以濟憂勤其旨如此而不知米皆被外支蓋琇及時宰忌韓相及先公運米功成而不為朝廷大計幾至再亂十月韓相以饋運功成請入朝及對見上大悅言無不從遂奏運事且言元琇支米與淄青河中臣在外與先公皆不敢奏上大驚即日貶琇為雷州司戶二說相違恐各有所私今但取其大要度徒洛翻使疏吏翻貞元二年韓遊王褱奏請發兵攻鹽州吐蕃救之則使河東襲其背丙寅詔駱元光及陳許兵馬使韓全義將步騎萬二千人會邠寧軍趣鹽州王褱古回翻吐從暾入聲將即亮翻又音如字騎奇寄翻邠卑旻翻趣七喻翻又命馬燧以河東軍擊吐蕃燧至石州河曲六胡州皆降遷於雲朔之間燧音遂石州昌化郡漢離石地河曲六胡州時已為宥州蓋諸部酋長各以舊州名帶刺史故於時猶有六胡州之名雲州雲中郡本魏平城地朔州馬邑郡漢馬邑縣地降戶江翻貞元二年工部侍郎張彧李晟之壻也晟在鳳翔以女嫁幕客崔樞禮重樞過於彧彧怒遂附於張延賞給事中鄭雲逵嘗為晟行軍司馬失晟意亦附延賞上亦忌晟功名會吐蕃有離間之言彧於六翻晟成正翻過古禾翻又古臥翻吐從暾入聲間古莧翻離間之言見上延賞等騰謗於朝無所不至朝直遙翻下同晟聞之晝夜泣目為之腫蘇軾有言木必先蠹而後蟲生之人必先疑也而後讒入之張延賞之讒間亦因帝有忌晟之心而入之也為于偽翻表請削髮為僧上慰諭不許辛未入朝見上自陳足疾懇辭方鎮上不許韓滉素與晟善上命滉與劉玄佐諭旨於晟使與延賞釋怨晟奉詔滉等引延賞詣晟第謝結為兄弟因宴飲盡歡又宴於滉玄佐之第亦如之滉因使晟表薦延賞為相朝直遙翻見賢遍翻滉呼廣翻相息亮翻三年貞元三年春正月壬寅以左僕射張延賞同平章事李晟為其子請婚於延賞射寅謝翻為于偽翻延賞不許晟謂人曰武夫性快釋怨於杯酒間則不復貯胸中矣貯丁呂翻非如文士難犯外雖和解內蓄憾如故吾得無懼哉張延賞心事李晟蓋已洞見之矣貞元三年初李希烈據淮西選騎兵尤精者為左右門槍奉國四將步兵尤精者為左右克平十將李希烈自建中初據淮西騎奇寄翻槍千羊翻將即亮翻門槍奉國各分左右凡四將左右克平軍則分十將領之少詩紹翻精兵皆乘騾謂之騾軍騾力戈翻陳仙奇舉淮西降纔數月詔發其兵於京西防秋仙奇遣都知兵馬使蘇浦悉將淮西精兵五千人以行不會仙奇為吳少誠所殺少誠密遣人召門槍兵馬使吳法超等使引兵歸浦之知法超等引步騎四千自鄜州叛歸渾瑊使其將白娑勒追之娑素和翻反為所敗敗補邁翻丙午上急遣中使敕陝虢觀察使李泌發兵防遏勿令濟河吳法超等自鄜州亶歸自鄜州即東北濟河下棧蓋道蒲趨陝若從同華至陝則不必濟河矣九域志靈寶縣在陝州西四十五里趣七喻翻陳讀曰陣泌乃命靈寶給其食淮西兵亦不敢剽掠剽匹妙翻明日宿陝西七里陝西者陝州之西也距城七里遣將將選士四百人選士簡選其驍勇者伏於太原倉之隘道令之曰賊十隊過東伏則大呼擊之西伏亦大呼應之呼火故翻勿遮道勿留行常讓以半道隨而擊之遮道留行賊必人自為戰讓以半道隨而擊之前者得脫後者務進心不在戰此泌所以制勝聞呼亦應而追之又遣唐英岸將千五百人夜出南門陳于澗北陳讀曰陣明日四鼓淮西兵起行入隘兩伏發賊衆驚亂且戰且走死者四之一進遇唐英岸邀而擊之賊衆大敗擒其騾軍兵馬使張崇獻泌以賊必分兵自山路南遁又遣都將燕子楚將兵四百自炭竇谷趣長水長水本隋弘農郡長淵縣唐初避高祖名更為長水五代志曰長淵縣後魏曰南陝西魏更今名唐志長水縣屬洛州河南府宋白曰長水縣本漢盧氏縣地後魏延昌二年分盧氏東境庫谷已西沙渠谷已東為南陝縣廢帝改為長淵縣以縣洛水長淵為名唐改長水九域志在府西二百四十里燕於虔翻趣七喻翻下同屢戰皆敗英岸追至永寧東賊皆潰入山谷吳法超果帥其衆太半趣長水帥讀曰率燕子楚擊之斬法超殺其士卒三分之二上以陜兵少發神策軍步騎五千往助泌至赤水聞賊已破而還上命劉玄佐乘驛歸汴以詔書緣道誘之得百三十餘人至汴州盡殺之其潰兵在道復為村民所殺復扶又翻得至蔡者纔四十七人吳少誠以其少少詩紹翻悉斬之以聞且遣使以幣謝李泌為其誅叛卒也為于偽翻泌執張崇獻等六十餘人送京師詔悉腰斬於鄜州軍門以令防秋之衆貞元三年初雲南王閤羅鳳陷巂州肅宗至德元載巂州陷事見二百一十八卷西瀘縣屬巂州本漢邛都縣地江左置宣化郡隋廢郡置可泉縣天寶元年改曰西瀘相州人通經術閤羅鳳愛重之其子鳳迦異迦求加翻及孫異牟尋曾孫尋夢湊皆師事之每授學回得撻之及異牟尋為王大曆十四年異牟尋立見二百二十六卷清平官者蠻相也南詔官曰坦綽曰布燮曰久贊謂之清平官所以決國事輕重猶唐宰相也而國事專決於回五人者事回甚卑謹有過則回撻之雲南有衆數十萬吐蕃每入寇常以雲南為前鋒賦斂重數斂力贍翻重數所角翻又奪其險要立城堡歲徵兵助防雲南苦之回因說異牟尋復自歸於唐說式芮翻曰中國尚禮義有惠澤無賦役異牟尋以為然而無路自致凡十餘年及西川節度使韋皋至鎮招撫境上㣥蠻異牟尋潛遣人因㣥蠻求內附皋奏今吐蕃棄好好呼到翻暴亂鹽夏夏戶雅翻宜因雲南及八國生羌有歸化之心八國生羌白狗君哥鄰君逋租君南水君弱水君悉董君清遠君咄霸君以離吐蕃之黨分其勢上命皋先作邊將書以諭之微觀其趣為南詔內附張本貞元三年張延賞與齊映有隙映在諸相中頗稱敢言上浸不悅延賞言映非宰相器壬子映貶夔州刺史劉滋罷為左散騎常侍以兵部侍郎柳渾同平章事韓滉性苛暴方為上所任言無不從他相充位而已百章乙十六行本百下有官㣥二字乙十一行本同孔本同吏救過不贍渾雖為滉所引薦正色讓之曰先相公以褊察為相不滿歲而罷先相公謂滉父休也罷相事見二百一十三卷開元二十一年柰何榜吏於省中榜音彭至有死者且作福作威豈人臣所宜書洪範曰臣無有作威作福其害于而家凶于而國為之少霽威嚴為于偽翻貞元三年二月壬戌以檢校左庶子崔澣充入吐蕃使貞元三年戊寅鎮海節度使同平章事充江淮轉運使韓滉薨滉久在二浙大曆十四年滉觀察二浙建中二年建節各隨其長無不得人嘗有故人子謁之考其能一無所長滉與之宴竟席未嘗左右視及與並坐交言並坐謂並肩而坐者坐徂臥翻署為隨軍使監庫門監古銜翻其人終日危坐吏卒無敢妄出入者分浙江東西道為三浙西治潤州浙東治越州宣歙池治宣州武德四年以宣州之秋浦南陵二縣置池州貞觀元年州廢永泰元年復分宣州之秋浦青陽饒州之至德置池州治秋浦秋浦漢石城縣地宣歙池三州屬江南東道唐初分十道江南東西道與二浙總為江南道乾元置浙江西道觀度使兼領宣歙饒三州其後罷領復領不一自分二浙為三道而宣歙池三州屬江南東道上以果州刺史白志貞為浙西觀察使果州南充郡治南充縣建中四年十二月白志貞貶恩州司馬中間蓋轉果州刺史今自刺史復欲用為觀察使志貞憸人憸利於上佞人也又曰憸詖也音息廉翻復扶又翻下同會渾疾不視事辛巳詔下用之渾疾間間如字以言不用也貞元三年甲申葬昭德皇后于靖陵王后諡昭德靖陵在奉天縣東北十里貞元三年三月丁酉以左庶子李銛充入吐蕃使銛思廉翻吐從暾入聲初吐蕃尚結贊得鹽夏州各留千餘人戍之退屯鳴沙去年冬吐蕃留兵戍鹽夏州鳴沙縣屬靈州漢富平縣地宋白曰見後夏戶雅翻羊馬多死糧運不繼又聞李晟克摧沙馬燧渾瑊等各舉兵臨之大懼晟成正翻燧音遂渾戶昆翻又戶本翻瑊古咸翻屢遣使求和上未之許乃遣使卑辭厚禮求和於馬燧且請脩清水之盟而歸侵地清水盟見二百二十八卷建中四年燧信其言留屯石州不復濟河為之請於朝為于偽翻以馬燧智略功名而信尚結贊為之請使其劫盟之謀獲遂則自損功名而智略不足言李晟曰戎狄無信不如擊之韓遊王褱曰吐蕃弱則求盟強則入寇今深入塞內而求盟此必詐也韓滉曰今兩河無虞若城原鄯洮渭四州使李晟劉玄佐之徒將十萬衆戍之河湟二十餘州可復也其資糧之費臣請主辦上由是不聽燧計趣使進兵燧請與吐蕃使論頰熱俱入朝論之滉呼廣翻鄯以戰翻又音善洮土刀翻將即亮翻又音如字趣讀曰促使疏吏翻朝直遙翻考異曰邠志作論莽熱今從實錄會滉薨燧延賞皆與晟有隙欲反其謀爭言和親便上亦恨回紇謂陝州之辱也共擊之得二人言正會己意計遂定史言馬燧張延賞以私隙誤國延賞數言晟不宜久典兵數所角翻請以鄭雲逵代之上曰當令自擇代者令力丁翻乃謂晟曰朕以百姓之故與吐蕃和親決矣大臣既與吐蕃有怨不可復之鳳翔帝敬禮李晟謂之大臣之往也史言帝忌李晟因吐蕃請和將相有隙而奪其兵柄朝夕輔朕自擇一人可代鳳翔者晟薦都虞候邢君牙君牙樂壽人也樂壽本漢河間樂城縣故城在今縣東南十六里後魏移縣近古樂壽亭因改為樂壽唐初屬瀛州永泰中度屬深州丙午以君牙為鳳翔尹兼團練使丁未加晟太尉中書令勳封如故勳上柱國封西平王晟在鳳翔嘗謂僚佐曰魏徵好直諫好呼到翻余竊慕之行軍司馬李叔度曰此乃儒者所為非勳德所宜晟斂容曰司馬失言晟任兼將相知朝廷得失不言何以為臣叔度慚而退余謂李晟欲忠於君李叔度之言亦可謂忠於李晟上有所顧問極言無隱性沈密未嘗泄於人朝直遙翻沈持林翻辛亥馬燧入朝燧既來諸軍皆閉壁不戰尚結贊遽自鳴沙引歸宋白曰鳴沙縣屬靈州本漢富平縣地後周保定二年於此置會州建德六年立鳴沙鎮隋文帝立環州以大河環曲為名仍立鳴沙縣屬焉此地人馬行沙有聲異於餘沙故曰鳴沙多徒行者崔澣見尚結贊責以負約尚結贊曰吐蕃破朱泚以武亭之功邀唐事見二百三十卷元年四月泚且禮翻又音此是以來而諸州各城守無由自達鹽夏守將以城授我而遁非我取之也夏戶雅翻將即亮翻今明公來欲踐脩舊好言欲踐前言以脩舊好一曰欲踐前迹以脩前好踐慈演翻好呼到翻今吐蕃將相以下來者二十一人渾侍中嘗與之共事言嘗與渾瑊共討朱泚靈州節度使杜希全涇原節度使李觀皆信厚聞於異域請使之主盟尚結贊欲因盟劫執二帥以取涇靈耳使疏吏翻觀古玩翻夏四月丙寅澣至長安辛未以澣為鴻臚卿復使入吐蕃語尚結贊曰臚陵如翻復扶又翻下同語牛倨翻希全守靈不可出境李觀已改官今遣渾瑊盟於清水清水漢故縣唐屬秦州考異曰實錄崔澣至自鳴沙傳尚結贊言盟會之期及定界之所唯命是聽君歸奏決定當以鹽夏相還又云清水之會同盟者少是以和好輕慢不成今蕃相及元帥已下凡二十一人赴盟靈州節度使杜希全稟性和善外境所知請令主此盟會涇原節度使李觀亦請同主之辛未以澣為鴻臚卿充入吐蕃使令澣報尚結贊希全職在靈州不可出境李觀又已改官遣侍中渾瑊充會盟使約以五月二十四日復盟於清水按尚結贊本怨渾瑊故欲劫而執之然則求瑊主盟乃吐蕃意非由唐出也今從鄴侯家傳令力丁翻夏戶雅翻五月甲申渾瑊自咸陽入朝以為清水會盟使戊子以兵部尚書崔漢衡為副使司封員外郎鄭叔矩為判官特進宋奉朝為都監宋奉朝宦者也朝直遙翻下同己丑瑊將二萬餘人赴盟所乙巳尚結贊遣其屬論泣贊來言清水非吉地請盟於原州之土梨樹既盟而歸鹽夏二州上皆許之神策將馬有麟奏土梨樹多阻險恐吐蕃設伏兵不如平涼川坦夷新唐書地理志平涼西北五里有吐蕃會盟壇丁未遣使追告之貞元三年申蔡留後吳少誠繕兵完城欲拒朝命朝直遙翻判官鄭常大將楊冀謀逐之詐為手詔賜諸將申州刺史張伯元等事泄少誠殺常冀伯元大將宋旻曹濟奔長安貞元三年閏月己未韋皋復與東蠻和義王苴那時書東蠻跨地二千里勿鄧豐琶兩林各有大鬼主為之長苴那時勿鄧鬼主也苴子魚翻詗翾正翻又火迥翻詗伺刺探之人也貞元三年庚申大省州縣官員收其祿以給戰士張延賞之謀也時新除官千五百人而當減者千餘人怨嗟盈路貞元三年初韓滉薦劉玄佐可使將兵復河湟上以問玄佐玄佐亦贊成之滉薨玄佐奏言吐蕃方強未可與爭上遣中使勞問玄佐勞力到翻玄佐臥而受命張延賞知玄佐不可用奏以河湟事委李抱真抱真亦固辭皆由延賞罷李晟兵柄故武臣皆憤怒解體不肯為用故也史言張延賞妒功疾能之罪貞元三年上以襄鄧扼淮西衝要癸亥以荊南節度使曹王皋為山南東道節度使以襄鄧復郢安隨唐七州隸之貞元三年渾瑊之發長安也李晟深戒之以盟所為備不可不嚴張延賞言於上曰晟不欲盟好之成好呼到翻下同故戒瑊以嚴備我有疑彼之形則彼亦疑我矣盟何由成上乃召瑊切戒以推誠待虜勿自為猜貳以阻虜情瑊奏吐蕃決以辛未盟延賞集百官以瑊表稱詔示之稱詔以渾瑊表徧示百官李太尉謂吐蕃和好必不成李晟時加太尉故以稱之吐從暾入聲好呼到翻盟日定矣晟聞之泣謂所親曰吾生長西陲李晟洮州人長事王忠嗣李抱玉皆有功名長知兩翻諳烏含翻諳悉也所以論奏但恥朝廷為犬戎所侮耳朝直遙翻自古以來謂西戎為犬戎上始命駱元光屯潘原韓遊王褱屯洛口潘原縣屬原州本陰盤也天寶更名時其地已沒於吐蕃王褱古回翻洛口即水洛口在瓦亭川東北元光謂瑊曰潘原距盟所且七十里公有急元光何從知之請與公俱瑊以詔指固止之元光不從與瑊連營相次距盟所三十餘里元光壕柵深固瑊壕柵皆可踰也壕音豪塹也柵測革翻元光伏兵於營西韓遊王褱亦遣五百騎伏於其側曰若有變則汝曹西趣柏泉以分其勢騎奇寄翻趣逡諭翻唐書地理志原州有百泉縣五代史志曰後魏分平涼置長城郡及黃石縣隋大業初改黃石為百泉宋白曰時已沒蕃界尚結贊與瑊約各以甲士三千人列於壇之東西常服者四百人從至壇下辛未將盟尚結贊又請各遣遊騎數十更相覘索更工衡翻覘丑廉翻索山客翻瑊皆許之吐蕃伏精騎數萬於壇西遊騎貫穿唐軍穿尺絹翻出入無禁唐騎入虜軍悉為所擒瑊等皆不知入幕易禮服禮服盟會之服伐鼓擊鼓也殺宋奉朝等於幕中譟則竈翻朝直遙翻偶得他馬乘之伏鬣入其銜馳十餘里銜方及馬口故矢過其背而不傷唐將卒皆東走虜縱兵追擊或殺或擒之銜戶監翻過古禾翻又古臥翻將即亮翻死者數百人是後劉昌為涇原帥收聚劫盟將士亡沒者骸骨具棺槥衣服葬于淺水原崔漢衡為虜騎所擒渾瑊至其營則將卒皆遁去營空矣駱元光發伏成陳以待之陳讀曰陣下同虜追騎愕眙眙丑吏翻驚視也瑊入元光營追騎顧見邠寧軍西馳乃還西馳者韓遊王褱所遣趣柏泉之軍也重直用翻與瑊收散卒勒兵整陳而還是日上臨朝謂諸相曰今日和戎息兵社稷之福馬燧曰然柳渾曰戎狄豺狼也非盟誓可結今日之事臣竊憂之李晟曰誠如渾言上變色曰柳渾書生不知邊計大臣亦為此言邪皆伏地頓首謝因罷朝朝直遙翻是夕韓遊王褱表言虜劫盟者兵臨近鎮近鎮言邠寧之近鎮街遞其表以示渾倉猝之際不及遣中使令街使遞其表以示渾謂渾曰卿書生乃能料敵如此其審乎上欲出幸以避吐蕃大臣諫而止李晟大安園多竹復有為飛語者復扶又翻云晟伏兵大安亭謀因倉猝為變晟遂伐其竹癸酉上遣中使王子恆齎詔遺尚結贊遺唯季翻至吐蕃境不納而還渾瑊留屯奉天甲戌尚結贊至故原州原州自廣德初沒於吐蕃城邑墟矣故曰故吾飾金械欲械瑊以獻贊普今失瑊虛致公輩又謂馬燧之姪弇曰胡以馬為命吾在河曲春草未生馬不能舉足當是時侍中渡河掩之吾全軍覆沒矣在河曲謂屯鳴沙時馬燧時屯石州不渡河燧加侍中故以稱之蒙侍中力今全軍得歸今當作令命弇與宦官俱文珍渾瑊將馬寧俱歸獨遣弇歸尚結贊雖有此言馬燧諱之掩覆而不傳矣俱文珍歸則必言之於帝馬寧歸則必言之於渾瑊中外傳播燧不可得而掩也所以間燧者可謂巧矣上聞尚結贊之言由是惡馬燧馬燧信尚結贊之言而為之請和既墮其計矣德宗又信尚結贊之間而惡馬燧又墮其計焉然德宗但知惡馬燧而不知惡張延賞又何也惡烏路翻六月丙戌以馬燧為司徒兼侍中罷其副元帥節度使初吐蕃尚結贊惡李晟馬燧渾瑊曰去三人則唐可圖也於是離間李晟惡烏路翻去羌呂翻間古莧翻因馬燧以求和欲執渾瑊以賣燧使幷獲罪因縱兵直犯長安會失渾瑊而止張延賞慚懼謝病不視事貞元三年以陝虢觀察使李泌為中書侍郎同平章事貞元三年河東都虞候李自良從馬燧入朝上欲以為河東節度使自良固辭曰臣事燧日久馬燧初鎮河東即親任李自良帥所類翻乃以為右龍武大將軍明日自良入謝上謂之曰卿於馬燧存軍中事分分扶問翻誠為得禮然北門之任非卿不可卒以自良為河東節度使卒子恤翻貞元三年吐蕃之戍鹽夏者饋運不繼人多病疫思歸尚結贊遣三千騎逆之悉焚其廬舍毀其城驅其民而去靈鹽節度使杜希全遣兵分守之貞元三年韋皋以雲南頗知書壬辰自以書招諭之令趣遣使入見趣讀曰促見賢遍翻下同貞元三年李泌初視事入政事堂視事也壬寅與李晟馬燧柳渾俱入見上謂泌曰卿昔在靈武已應為此官卿自退讓事見二百一十九卷肅宗至德元載欲與卿有約此亦帝猜忌發見之一端也有恩者朕當為卿報之為于偽翻對曰臣素奉道不與人為仇李輔國元載皆害臣者今自斃矣素所善及有恩者率已顯達或多零落臣無可報也上曰雖然有小恩者亦當報之對曰臣今日亦願與陛下為約可乎上曰何不可泌曰願陛下勿害功臣臣受陛下厚恩固無形迹李晟馬燧有大功於國聞有讒之者雖陛下必不聽然臣今日對二人言之欲其不自疑耳陛下萬一害之則宿衞之士方鎮之臣無不憤惋而反仄惋烏貫翻恐中外之變不日復生也復扶又翻人臣苟蒙人主愛信則幸矣官於何有臣在靈武之日未嘗有官而將相皆受臣指畫陛下以李懷光為太尉而懷光愈懼遂至於叛此皆陛下所親見也今晟燧富貴已足苟陛下坦然待之使其自保無虞國家有事則出從征伐無事則入奉朝請何樂如之樂音洛故臣願陛下勿以二臣功大而忌之二臣勿以位高而自疑則天下永無事矣惋烏貫翻樂音洛李泌不特欲使李晟馬燧無自疑之心亦以德宗猜忌開廣而言之耳上曰朕始聞卿言聳然不知所謂及聽卿剖析乃知社稷之至計也朕謹當書紳二大臣亦當共保之晟燧皆起泣謝上因謂泌曰自今凡軍旅糧儲事卿主之吏禮委延賞刑法委渾泌曰不可陛下不以臣不才使待罪宰相宰相之職不可分也非如給事則有吏過兵過吏部兵部主文武選凡奏擬皆過門下省百司奏抄侍中既審給事中讀之有違失則駮正唐制中書舍人六員佐宰相判案同署乃奏六典中書舍人六人分押六司署天下之事咸共平章若各有所主是乃有司非宰相也上笑曰朕適失辭卿言是也泌請復所減州縣官是年閏月用張延賞之言大省州縣官置吏以為人也為于偽翻下誰為第為具為同今戶口減於承平之時三分之二而吏員更增可乎對曰戶口雖減而事多於承平且十倍吏得無增乎且所減皆有職而宀儿官不減此所以為未當也當丁浪翻至德以來置額外官敵正官三分之一若聽使計日得資然後停加兩選授同類正員官停字句斷謂計其在官之日敍資然後隨所減員而停其官又加以文武兩選授以正員官與其元所居官同類者則不惟不怨兼使之喜矣又請諸王未出閤者不除府官此泌所謂宀儿官不減者因請減而不除乙卯詔先所減官並復故貞元三年初張延賞在西川與東川節度使李叔明有隙上入駱谷謂上自奉天幸山南時也道塗險滑衞士多亡歸朱泚叔明之子昇考異曰鄴侯家傳及舊叔明傳皆作昪今從實錄及舊蕭復傳恐有姦人危乘輿相與齧臂為盟著行幐釘鞵乘繩證翻著陟略翻幐當作縢徒登翻行縢以邪幅纏足膞腸詩采菽斜幅在下傳云幅偪也所以自偪束也箋云邪幅如今行縢也偪束其脛自足至膝正義曰邪纏於足謂之邪幅釘鞵以皮為之外施油蠟底著鐵釘鞵音戶皆翻更鞚上馬以至梁州更工衡翻鞚苦貢翻他人皆不得近近其靳翻及還長安上皆以為禁衞將軍寵遇甚厚張延賞知昇私出入郜國大長公主第郜國肅宗之女初嫁裴徽又嫁蕭昇唐制皇姑為大長公主正一品郜古到翻長知丈翻上謂李泌曰郜國已老昇年少何為如是泌薄必翻少始照翻殆必有故卿宜察之泌曰此必有欲動搖東宮者誰為陛下言之上曰卿勿問第為朕察之為于偽翻泌曰必延賞也上曰何以知之泌具為上言二人之隙言延賞與昇父叔明有隙昇承恩顧典禁兵延賞無以中傷中竹仲翻而郜國乃太子蕭之母也故欲以此陷之耳上笑曰是也泌因請除昇他官勿令宿衞以遠嫌遠于願翻秋七月以昇為詹事郜國肅宗之女也貞元三年甲子割振武之綏銀二州以右羽林將軍韓潭為夏綏銀節度使帥神策之士五千朔方河東之士三千鎮夏州夏戶雅翻使疏吏翻帥讀曰率貞元三年時關東防秋兵大集國用不充李泌奏自變兩稅法以來兩稅事始見二百二十六卷建中元年繼以朱泚之亂爭榷率徵罰以為軍資點募自防斂力贍翻泚且禮翻又音此榷率者拘榷而敷率徵罰者吏民有罪罰使納錢穀以免罪而如數徵之也凡此皆州鎮以充軍資點募強壯以自防衞榷古岳翻泚既平自懼違法匿不敢言請遣使以詔旨赦其罪但令革正自非於法應留使留州之外悉輸京師令力丁翻留使者留以應本道節度觀察使徵調留州者留以給本州經用其官典逋負可徵者徵之難徵者釋之以示寬大敢有隱沒者重設告賞之科而罪之重設賞格告者依格給賞而罪其隱沒者卿策甚長然立法太寬恐所得無幾對曰茲事臣固熟思之寬則獲多而速急則獲少而遲蓋以寬則人喜於免罪而樂輸少始紹翻樂音洛急則競為蔽匿非推鞫不能得其實財不足濟今日之急而皆入於姦吏矣上曰善以度支員外郎元友直為河南江淮南句勘兩稅錢帛使度徒洛翻句音勾使疏吏翻初河隴既沒於吐蕃代宗初年河隴陷沒吐從暾入聲安西北庭奏事及西域使人在長安者歸路既絕人馬皆仰給於鴻臚禮賓委府縣供之仰牛向翻臚陵如翻鴻臚掌四夷之客有禮賓院府縣謂京兆府及其所屬赤縣畿縣也於度支受直度支不時付直長安市肆不勝其弊度徒洛翻勝音升李泌知胡客留長安久者或四十餘年皆有妻子買田宅舉質取利舉者舉貸以取倍稱之利也質者以物質錢計月而取其利也命檢括胡客有田宅者停其給凡得四千人將停其給胡客皆詣政府訴之政府謂相府也此皆從來宰相之過豈有外國朝貢使者留京師數十年不聽歸乎朝直遙翻今當假道於回紇或自海道各遣歸國有不願歸當於鴻臚自陳授以職位給俸祿為唐臣人生當乘時展用豈可終身客死邪於是胡客無一人願歸者泌皆分隸神策兩軍王子使者為散兵馬使或押牙散悉亶翻禁旅益壯鴻臚所給胡客纔十餘人歲省度支錢五十萬緡市人皆喜免供億故喜上復問泌以復府兵之策上復扶又翻對曰今歲徵關東卒戍京西者十七萬人計歲食粟二百四萬斛今粟斗直百五十為錢三百六萬緡國家比遭饑亂比毗至翻經費不充就使有錢亦無粟可糴未暇議復府兵也上曰然則柰何亟減戍卒歸之何如對曰陛下章乙十六行本下下有誠能二字乙十一行本同孔本同張校同用臣之言可以不減戍卒不擾百姓糧食皆足粟麥日賤府兵亦成上曰苟能如是何為不用對曰此須急為之過旬日則不及矣今吐蕃久居原會之間章乙十六行本會作蘭乙十一行本同退齋校同以牛運糧糧盡牛無所用請發左藏惡繒染為綵纈藏徂浪翻惡繒積於庫藏年深以致脆惡者纈戶結翻撮綵以線結之而後染色既染則解其結凡結處皆元色餘則入染色矣其色斑斕謂之纈因党項以市之每頭不過二三匹計十八萬匹可致六萬餘頭又命諸冶鑄農器糴麥種種章勇翻下其種同分賜沿邊軍鎮募戍卒耕荒田而種之約明年麥熟倍償其種其餘據時價五分增一官為糴之為于偽翻來春種禾亦如之關中土沃而久荒所收必厚戍卒獲利耕者浸多邊地居人至少軍士月食官糧粟麥無所售其價必賤名為增價實比今歲所減多矣上曰善即命行之泌又言邊地官多闕請募人入粟以補之可足今歲之糧上亦從之因問曰卿言府兵亦集如何對曰戍卒因屯田致富則安於其土不復思歸復扶又翻舊制戍卒三年而代及其將滿下令有願留者即以所開田為永業家人願來者本貫給長牒續食而遣之戍兵家口發赴邊鎮者本貫為給長牒所過郡縣續食以至戍所移報本道雖河朔諸帥得免更代之煩帥所類翻更工衡翻亦喜聞矣喜許記翻不過數番則戍卒章乙十六行本卒下有皆字乙十一行本同孔本同張校同土著著直略翻乃悉以府兵之法理之理治也上喜曰如此天下無復事矣泌所謂復府兵之策當以積漸而成帝遽謂之天下無復事是但喜其言之可聽而不察其事非旦暮之可集也未也臣能不用中國之兵使吐蕃自困上曰計將安出對曰臣未敢言之俟麥禾有效然後可議也上固問不對泌意欲結回紇大食雲南與共圖吐蕃令吐蕃所備者多知上素恨回紇恐聞之不悅幷屯田之議不行故不肯言既而戍卒應募願耕屯田者什五六自李泌為相觀其處置天下事姚崇以來未之有也史臣謂其出入中禁事四君數為權倖所疾常以智免好縱橫大言時時讜議能寤移人主意然常持黃老鬼神說故為人所譏余謂泌以智免信如史臣言矣然其縱橫大言持黃老鬼神說亦智也泌處肅代父子之間其論興復形勢言無不效及張李之間所以保右代宗者言無不行元載之讒疾卒能自免可謂智矣至其與德宗論天下事若指諸掌以肅代之信泌而泌不肯為相以德宗之猜忌而泌夷然當之亦智也嗚呼仕而得君諫行言聽則致身宰輔宜也歷事三世潔身遠害筋力向衰乃方入政事堂與新貴人伍所謂經濟之略曏未能為肅代吐者盡為德宗吐之豈德宗之度弘於祖父邪泌蓋量而後入耳彼德宗之猜忌刻薄直如蕭姜謂之輕己賣直功如李馬忌而置之散地而泌也恣言無憚彼其心以泌為祖父舊人智略無方弘濟中興其敬信之也久矣泌之所以敢當相位者其自量亦審矣庸非智乎其持黃老鬼神說則子房欲從赤松游之故智也但子房功成後為之泌終始篤好之耳貞元三年壬申賜駱元光姓名李元諒貞元三年左僕射同平章事張延賞薨射寅謝翻薨呼肱翻容肇祖標點聶崇岐覆校
