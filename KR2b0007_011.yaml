body:
  text: 資治通鑑卷第十一翰林學士朝散大夫右諫議大夫知制誥兼侍講同提舉萬壽觀公事兼判集賢院上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣奉敕編集後學天台音注漢紀三太祖高皇帝中五年五年冬十月漢王追項羽至固陵徐廣曰固陵在陽夏晉灼曰即固始縣余據班志固始與陽夏為兩縣皆屬淮陽國劉昭志陳國陽夏縣有固陵聚括地志固陵縣名在陳州宛丘縣西北四十二里信越不至楚擊漢軍大破之漢王復堅壁自守謂張良曰諸侯不從奈何對曰楚兵且破二人未有分地李奇曰言信越未有益地之分也韋昭曰信等雖名為王未為分畫疆界分扶問翻余謂韋説是君王能與共天下可立致也齊王信之立非君王意言信自請為假王乃立之耳非君王本意彭越本定梁地始君王以魏豹故拜越為相國見上卷二年越亦望王而君王不早定今能取睢陽以北至穀城皆以王彭越班志睢陽縣屬梁國劉昭志穀城縣屬東郡春秋之小穀也括地志穀城故城在濟州東阿縣東二十六里睢陽宋州也自宋州以北至濟州穀城際黃河盡以封彭越章甲十五行本韓作齊乙十一行本同孔本同王信陳古陳國班志之淮陽國也唐為陳州自陳以東至于海並齊舊地盡以與齊王信其意欲復得故邑能出捐此地以許兩人使各自為戰則楚易破也易以豉翻漢王從之於是韓信彭越皆引兵來十一月劉賈南渡淮圍壽春遣人誘楚大司馬周殷殷畔楚以舒屠六舒春秋之舒國也班志舒縣屬廬江郡括地志舒今廬江之故舒城是也史記正義曰九江郡即壽州楚考烈王二十二年徙壽春號曰郢至王負芻為秦所滅置九江郡至唐為廬壽滁濠等州之地隨劉賈皆會十二月項王至垓下李奇曰沛洨縣聚邑名洨下交翻張揖三蒼注垓堤名在沛郡史記正義曰按垓下是高岡絶巖今猶高三四丈其聚邑及堤在垓之側因取名焉今在亳州真源縣東十里垓音該食盡與漢戰不勝入壁漢軍及諸侯兵圍之數重重直龍翻項王夜聞漢軍四面皆楚歌應劭曰楚歌者雞鳴歌也漢已略得楚地故楚歌者多雞鳴時歌也師古曰楚歌者為楚人之歌猶吳歈越吟耳若以雞鳴為歌曲之名於理則可不得云雞鳴時也高祖令戚夫人楚舞自為作楚歌豈有雞鳴時乎漢皆已得楚乎是何楚人之多也則夜起飲帳中悲歌慷慨泣數行下慷苦廣翻行戶剛翻泣目中淚也左右皆泣莫能仰視於是項王乘其駿馬名騅騅朱惟翻蒼白雜毛曰騅孔穎達曰雜毛是體有二種之色相間雜麾下壯士騎從者八百餘人直夜潰圍南出馳走平明漢軍乃覺之令騎將灌嬰以五千騎追之項王渡淮騎能屬者才百餘人屬之欲翻至陰陵班志陰陵縣屬九江郡括地志陰陵故城在濠州定遠縣西北六十里問一田父田父紿曰左給蕩亥翻欺誑也左乃陷大澤中以故漢追及之項王乃復引兵而東至東城班志東城縣屬九江郡括地志東城故城在定遠東南五十里漢騎追者數千人項王自度不得脫度徒洛翻謂其騎曰吾起兵至今八歲矣身七十餘戰未嘗敗北遂霸有天下然今卒困於此卒子恤翻此天之亡我非戰之罪也今日固決死願為諸君快戰必潰圍斬將刈旗三勝之令諸君知天亡我非戰之罪也乃分其騎以為四隊四鄉鄉讀曰嚮漢軍圍之數重項王謂其騎曰吾為公取彼一將令四面騎馳下期山東為三處於是項王大呼馳下漢軍皆披靡呼火故翻披普彼翻史記正義曰靡言精體低垂遂斬漢一將是時郎中騎楊喜追項王郎中騎即漢官所謂騎郎喜人馬俱驚辟易數里辟頻益翻易如字師古曰辟易謂開張而易其故處宋祁國語補音易以豉翻未知其何據項王與其騎會為三處漢軍不知項王所在乃分軍為三復圍之項王乃馳復斬漢一都尉殺數十百人復聚其騎亡其兩騎耳乃謂其騎曰何如騎皆伏曰如大王言於是項王欲東渡烏江臣瓚曰烏江在牛渚索隱曰按晉初屬臨淮括地志烏江亭即和州烏江縣是也晉初為縣水經曰江水又北得黃律口漢書所謂烏江亭長檥船待項王即此地余據烏江浦在今和州烏江縣東五十里即亭長檥船待羽處徐廣曰檥音儀一音俄應劭曰檥正也孟康曰檥音蟻附也附船著岸也如淳曰南方謂整船向岸曰檥索隱曰檥字諸家各以意解耳鄒誕本作樣船以尚翻劉氏亦有此音謂項王曰江東雖小地方千里衆數十萬人亦足王也願大王急渡今獨臣有船漢軍至無以渡項王笑曰天之亡我我何渡為且籍與江東子弟八千人渡江而西今無一人還縱江東父兄憐而王我我何面目見之縱彼不言籍獨不愧於心乎乃以所乘騅馬賜亭長令騎皆下馬步行持短兵接戰獨籍所殺漢軍數百人身亦被十餘創被皮義翻創初良翻顧見漢騎司馬呂馬童曰若非吾故人乎馬童面之張晏曰以故人難親斫之故背之也如淳曰面謂不正視也師古曰如説非面謂背之不正向也面縛亦反偝而縛之杜元凱以為但見其面非也貢父曰面之直向之耳此項王也項王乃曰吾聞溝購我頭千金邑萬戶史記正義曰漢以一斤金為千金當一萬錢也余謂一斤金與萬戶邑多少不稱正義之説未可為據也班書德作得鄧展曰令公得我以為功也史記作德徐廣曰亦可是功德之德史記正義曰為于偽翻言呂馬童與己是故人舊有恩德於己余謂羽蓋謂我為汝自刎以德汝章甲十五行本無自字乙十一行本同孔本同刎而死刎武粉翻王翳取其頭餘騎相蹂踐蹂人九翻爭項王相殺者數十人最其後楊喜呂馬童及郎中呂勝楊武各得其一體五人共會其體皆是故分其戶封五人皆為列侯呂馬童封中水侯王翳封杜衍侯楊喜封赤泉侯楊武封吳防侯呂勝封涅陽侯楚地悉定獨魯不下秦魯縣屬薛郡項羽初封於此漢為魯國至其城下猶聞絃誦之聲為其守禮義之國為主死節乃持項王頭以示魯父兄魯乃降漢王以魯公禮葬項王於穀城宋白曰宋州穀熟縣古穀城也漢於此置薄縣又改為穀陽縣哭之而去為于偽翻諸項氏枝屬皆不誅封項伯等四人皆為列侯賜姓劉氏諸民略在楚者皆歸之太史公曰羽起隴畝之中畝古畝字遂將五諸侯滅秦此時山東六國而齊趙韓魏燕並起從羽伐秦故云五諸侯政由羽出位雖不終近古以來未嘗有也及羽背關懷楚師古曰背關謂背約不王沛公於關中懷楚謂思東歸彭城也余謂背關懷楚文意一貫言羽棄背關中之形勝而懷鄉歸楚也不必分為兩節背蒲妹翻怨王侯叛己難矣自矜功伐奮其私智而不師古謂霸王之業欲以力征經營天下五年卒亡其國卒子恤翻身死東城尚不覺悟而不自責乃引天亡我非用兵之罪也豈不謬哉揚子法言或問楚敗垓下方死曰天也諒乎曰漢屈㣥策㣥策屈㣥力諒信也屈盡也憞徒對翻惡也屈人者克自屈者負天曷故焉溫公曰何預天事五年漢王還至定陶班志定陶縣屬濟陰郡古之陶邑宋為廣濟軍理所奪其軍五年臨江王共尉不降共敖項羽封為臨江王尉其子也五年春正月更立齊王信為楚王王淮北都下邳更工衡翻封魏相國建城侯彭越為梁王王魏故地都定陶五年令曰兵不得休八年萬民與苦甚如淳師古皆曰與弋庶翻貢父曰與讀曰歟助辭今天下事畢其赦天下殊死以下如淳曰殊死死罪之明白也左傳曰斬其木而弗殊韋昭曰殊死斬刑也師古曰殊絶也異也言其身首離絶而異處貢父曰豫按説文漢蠻夷殊然則殊自死刑之名五年諸侯王皆上疏請尊漢王為皇帝二月甲午王即皇帝位于泛水之陽蔡雍曰上古天子稱皇其次稱帝其次稱王秦承三王之末自以德兼三皇五帝故並以為號漢高受命因而不改張晏曰泛水在濟陰界取其泛愛弘大而潤下也師古曰據叔孫通傳為皇帝於定陶則此水在濟陰是也括地志漢高祖即位壇在曹州濟陰縣界泛敷劍翻太子曰皇太子追尊先媼曰昭靈夫人高祖母曰劉媼文穎曰幽州及漢中皆謂老嫗為媼師古曰媼女老稱音烏老翻詔曰如淳曰詔告也自秦漢以下惟天子獨稱之漢制度帝之下書有四一曰策書二曰制書三曰詔書四曰誡敕策書者編簡也其制長二尺短者半之篆書起年月日稱皇帝以命諸侯王三公以罪免亦賜策而以隸書用尺一木兩行此為異也制書帝者制度之命其文曰制詔三公皆璽封尚書令印重封露布州郡也詔書詔告也其文曰告某官如故事誡敕謂敕刺史太守其文曰有詔敕某官他皆倣此故衡山王吳芮從百粵之兵佐諸侯誅暴秦有大功諸侯立以為王項羽侵奪之地謂之番君其以芮為長沙王吳芮封衡山王都邾今封長沙王都臨湘番蒲何翻故粵王無諸世奉粵祀秦侵奪其地使其社稷不得血食諸侯伐秦無諸身率閩中兵以佐滅秦項羽廢而弗立今以為閩粵王王閩中地粵王無諸句踐之後秦取其地置閩中郡今復以封之師古曰閩越今泉州建安是其地徐廣曰今建安侯官地史記正義曰今閩州又改為福應劭曰閩音文飾之文師古曰非也音緡閩人本蛇種故其字從蟲五年帝西都洛陽五年夏五月兵皆罷歸家五年詔民前或相聚保山澤不書名數今天下已定令各歸其縣復故爵田宅復扶目翻還也吏以文法教訓辨告師古曰辨告者分別義理以曉喻之爵及七大夫以上皆令食邑臣瓚曰秦制列侯乃得食邑今七大夫以上皆食邑所以寵之也師古曰七大夫公大夫也爵第七故謂之七大夫皆復其身及戶勿事應劭曰不輸戶賦也如淳曰事謂役使也師古曰復其身及一戶之內皆不徭賦也復方目翻五年帝置酒洛陽南宮括地志南宮在洛州洛陽縣東北二十六里洛陽故城中輿地志秦時洛陽已有南北宮蔡雍曰上者尊位所在也但言上不敢言尊號耳徹侯諸將毋敢隱朕皆言其情徹通也應劭曰言其功德通於王室也後避武諱改曰通侯亦曰列侯項氏之所以失天下者何高起王陵對曰張晏曰詔使高官者起故陵先對臣瓚曰漢帝年紀有信平侯臣陵都武侯臣起魏相邴吉奏高祖時奏事有將軍臣陵臣起師古曰張説非也若言高官者起則丞相蕭何太尉盧綰及張良陳平之屬皆在陵不得而先對也姓譜齊太公之後食采於高因氏焉陛下使人攻城略地因以與之與天下同其利項羽不然有功者害之賢者疑之此其所以失天下也上曰公知其一未知其二夫運籌帷幄之中決勝千里之外吾不如子房填國家撫百姓給餉餽不絶糧道吾不如蕭何填讀曰鎮餽與饋同連百萬之衆戰必勝攻必取吾不如韓信三者皆人傑吾能用之此吾所以取天下者也項羽有一范增而不能用此所以為我禽也㣥臣説服説讀曰悅韓信至楚召漂母賜千金召辱己少年令出跨下者以為中尉事見九卷元年漂匹妙翻此壯士也方辱我時我寧不能殺之邪殺之無名故忍而就此五年彭越既受漢封田橫懼誅與其徒屬五百餘人入海居島中海中山曰島史記正義曰海州東海縣有島山去岸八十里余按北史楊愔避讒東入田橫島是島以橫居之而得名島丁老翻齊賢者多附焉今在海中不取後恐為亂乃使使赦橫罪召之橫謝曰臣烹陛下之使酈生事見上卷四年臣恐懼不敢奉詔請為庶人守海島中使還報帝乃詔衛尉酈商曰班表衛尉秦官掌宮門衛屯兵齊王田橫即至人馬從者敢動搖者致族夷從才用翻言誅夷其族也乃復使使持節具告以詔商狀周禮司節掌守邦節辨其用以輔王命注云節者執以行為信邦節珍圭牙璋穀圭琬圭琰圭也守邦國用玉節以玉為之守都鄙用角節以角為之邦國之使節用金門關之節用符貨賄之節用璽道路之節用旌審此則古之所執以為信者皆謂之節自秦以來有璽符節則璽自璽符自符節自節分為三矣漢之節即古之旌節也鄭氏注以符節為漢宮中諸宮詔符璽節為漢之印章旌節為漢使者所持節則知漢所謂節蓋古之旌節也賢曰節者所以為信以竹為之柄長八尺以旄牛尾為之毦三重此漢制也田橫來大者王小者乃侯耳不來且舉兵加誅焉橫乃與其客二人乘傳詣洛陽如淳曰四馬高足為置傳中足為馳傳下足為乘傳一馬二馬為軺傳急者乘一乘傳師古曰蓋今之驛古者以車謂之傳車其後單置馬謂之驛騎漢律諸當乘傳及發駕置傳者皆持尺五寸木傳信封以御史大夫印章其乘傳參封之參三也有期會纍封兩端端各兩封凡四封乘置馳傳五封之兩端各二中央一軺傳兩馬再封之一馬一封以馬駕軺車而乘傳曰一封軺傳史照所謂依乘符傳而行者本此但擇焉而不精語焉而不詳耳終不若顏説簡而明傳張戀翻至尸鄉廣既置應劭曰尸鄉在偃師城西臣瓚曰按廣既置謂置馬以傳驛者人臣見天子當洗沐因止留謂其客曰橫始與漢王俱南面稱孤師古曰王者自稱曰孤蓋為謙也老子道德經曰貴以賤為本高以下為基是以侯王自謂孤寡不穀而橫乃為亡虜北面事之其恥固已甚矣且吾烹人之兄與其弟併肩而事主併步頂翻縱彼畏天子之詔不敢動我獨不愧於心乎且陛下所以欲見我者不過欲一見吾面貌耳今斬吾頭馳三十里間形容尚未能敗猶可觀也遂自剄令客奉其頭從使者馳奏之帝曰嗟乎起自布衣兄弟三人更王豈不賢哉更工衡翻為之流涕而拜其二客為都尉發卒二千人以王者禮葬之史記正義曰田橫墓在偃師西十五里二客穿其冢傍孔皆自剄下從之帝聞之大驚以橫客皆賢餘五百人尚在海中使使召之至則聞田橫死亦皆自殺五年初楚人季布為項籍將季姓也周八士有季隨季騧魯有季氏數所角翻窘巨隕翻困也項籍滅帝購求布千金敢有舍匿罪三族舍止也匿隱也自賣於魯朱家髡枯昆翻鬄其髮也鉗其炎翻以鐵束項朱家魯之大俠朱家心知其季布也買置田舍身之洛陽見滕公説曰季布何罪臣各為其主用職耳師古曰職常也言此乃常道也一曰職主掌其事也為于偽翻今上始得天下而以私怨求一人何示不廣也且以季布之賢漢求之急此不北走胡南走越耳夫忌壯士以資敵國此伍子胥所以鞭荊平之墓也伍子胥楚大夫伍奢之子也楚平王信讒而殺伍奢子胥奔吳藉吳師以破楚入郢發平王墓而鞭其尸從千容翻滕公待間言於上如朱家指上乃赦布召拜郎中朱家遂不復見之復扶又翻布母弟丁公亦為項羽將逐窘帝彭城西短兵接帝急顧謂丁公曰兩賢豈相厄哉孟康曰丁公及彭城賴齮追上故曰兩賢也師古曰孟説非也兩賢者高祖自謂併與固也言吾與固俱是賢豈相厄困哉故固感此言而止也雖與賴齮同追而高祖獨與固言也姓譜丁本自薑姓齊太公子諡丁公因以命氏及項王滅丁公謁見見賢遍翻帝以丁公徇軍中徇辭峻翻師古曰行示也曰丁公為項王臣不忠使項王失天下者也遂斬之曰使後為人臣無效丁公也臣光曰高祖起豐沛以來罔羅豪桀招亡納叛亦已多矣及即帝位而丁公獨以不忠受戮何哉夫進取之與守成其勢不同當㣥雄角逐之際民無定主來者受之固其宜也及貴為天子四海之內無不為臣苟不明禮義以示之使為臣者人懷二心以徼大利則國家其能久安乎是故斷以大義斷丁亂翻使天下曉然皆知為臣不忠者無所自容而懷私結恩者雖至於活己猶以義不與也戮一人而千萬人懼其慮事豈不深且遠哉子孫享有天祿四百餘年宜矣五年齊人婁敬戍隴西姓譜婁邾婁國之後一曰離婁之後脫挽輅蘇林曰輅音凍之一木橫遮車前一人挽之三人推之師古曰挽音晚輅胡格翻音同衣羊裘因齊人虞將軍求見上虞將軍欲與之鮮衣婁敬曰臣衣帛衣帛見衣褐衣褐見衣著也帛繒也褐織毛布之衣也於是虞將軍入言上上召見問之婁敬曰陛下都洛陽豈欲與周室比隆哉上曰然婁敬曰陛下取天下與周異周之先自后稷封邰班志邰縣屬右扶風師古曰即今武功故城是史記正義曰雍州武功縣西南二十三里故漦城是也説文曰邰炎帝之後薑姓所封國棄外家也毛萇云邰薑嫄國堯以天因邰而生后稷故因封之於邰音吐才翻絫古纍字至于太王王季文王武王而諸侯自歸之遂滅殷為天子及成王即位周公相焉乃營洛邑以為此天下之中也諸侯四方納貢職道里均矣有德則易以王無德則易以亡故周之盛時天下和洽諸侯四夷莫不賓服效其貢職及其衰也天下莫朝朝直遙翻周不能制也非唯其德薄也形勢弱也今陛下起豐沛卷蜀漢定三秦卷讀曰捲與項羽戰滎陽成皋之間大戰七十小戰四十使天下之民肝腦塗地父子暴骨中野不可勝數勝音升哭泣之聲未絶傷夷者未起夷與痍同創也音延知翻而欲比隆於成康之時臣竊以為不侔也且夫秦地被山帶河四塞以為固卒然有急卒讀曰猝百萬之衆可立具也因秦之故資甚美膏腴之地此所謂天府者也府聚也萬物所聚謂之天府山東雖亂秦之故地可全而有也夫與人鬬不扼其亢拊其背未能全其勝也張晏曰扼與扼同促持之也亢音岡又下郎翻喉嚨也此亦扼天下之亢而拊其背也帝問㣥臣㣥臣皆山東人爭言周王數百年秦二世即亡洛陽東有成皋西有殽澠師古曰殽謂殽山今陝州東二殽山是也澠即澠池鄉伊洛河在洛陽城北故曰倍伊洛二水在洛陽城南故曰鄉倍蒲妹翻鄉讀曰嚮上問張良良曰洛陽雖有此固其中小不過數百里田地薄四面受敵此非用武之國也關中左殽函右隴蜀沃野千里師古曰沃者溉灌也言其土地皆有溉灌之利故曰沃野北有胡苑之利師古曰謂安定北地上郡之北與胡相接之地可以畜牧者也養禽獸謂之苑音於阮翻獨以一面東制諸侯諸侯安定河渭漕挽天下西給京師漢漕關東之時自河入渭自渭而上輸之長安順流而下足以委輸康曰委於偽切即委積之委輸即轉輸之輸輸舂遇翻天府之國也府者物所聚也天物所聚不假人力故曰天府上即日車駕西都長安拜婁敬為郎中號曰奉春君賜姓劉氏師古曰凡言車駕謂天子乘車而行不敢指斥也長安本秦之鄉名也高祖作都奉春君張晏曰春歲之始也今婁敬發事之始故曰奉春君也五年張良素多病從上入關即道引不食穀孟康曰道讀曰導服辟穀藥而靜居行氣杜門不出曰家世相韓及韓滅不愛黃金之資為韓報讎強秦天下振動事見七卷秦始皇二十九年封萬戶侯此布衣之極於良足矣願棄人間事欲從赤松子遊耳師古曰赤松子仙人號也神農時為雨師服水玉教神農能入火自燒至昆山上常止西王母石室隨風雨上下炎帝少女追之亦得仙俱去臣光曰夫生之有死譬猶夜旦之必然自古及今固未章甲十五行本未下有嘗字乙十一行本同孔本同有超然而獨存者也以子房之明辨達理足以知神仙之為虛詭矣然其欲從赤松子遊者其智可知也夫功名之際人臣之所難處處昌呂翻如高帝所稱者三傑而已淮陰誅夷蕭何繫獄非以履盛滿而不止耶故子房託於神仙遺棄人間等功名於外物置榮利而不顧所謂明哲保身者詩云既明且哲以保其身五年六月壬辰大赦天下五年秋七月燕王臧荼反上自將征之五年趙景王耳長沙文王芮皆薨五年九月虜臧荼壬子立太尉長安侯盧綰為燕王班表太尉秦官掌武事漢制與丞相御史大夫為三公應劭曰自上安下曰尉據史記盧綰傳長安故咸陽也正義曰秦咸陽在渭北長安在渭南蕭何起未央宮之處閈音汗閭也里門曰閈綰生又與上同日上寵幸綰㣥臣莫敢望故特王之考異曰史記漢書高紀於此皆云使丞相噲將兵平代地按樊噲傳從平韓王信乃遷左丞相是時未為丞相又代地無反者噲傳亦無此事疑紀誤五年項王故將利幾反利幾以陳令降上侯之潁川上至洛陽召之利幾恐而反風俗通利姓也姓譜楚公子食采於利後以為氏五年後九月治長樂宮程大昌雍録曰長樂宮本秦之興樂宮周回二十里高祖改修而居之在長安城東隅樂音洛五年項王將鍾離昧素與楚王信善昧莫曷翻下同項王死後亡歸信漢王怨昧聞其在楚詔楚捕昧信初之國行縣邑陳兵出入行下孟翻六年六年冬十月人有上書告楚王信反者帝以問諸將皆曰亟發兵坑豎子耳帝默然又問陳平陳平曰人上書言信反信知之乎曰不知陳平曰陛下精兵孰與楚上曰不能過平曰陛下諸將用兵有能過韓信者乎上曰莫及也平曰今兵不如楚精而將不能及舉兵攻之是趣之戰也趣讀曰促竊為陛下危之上曰為之奈何平曰古者天子有巡狩會諸侯白虎通曰天子所以巡狩者何巡者循也狩者收也謂循行天下收人道德太平恐遠近不同政化幽隱有不得其所者故必自行之謹敬重民之意也孟子曰天子適諸侯曰巡守巡守者巡所守也偽遊雲夢第但也陳楚之西界信聞天子以好出遊其勢必無事而郊迎謁謁而陛下因禽之此特一力士之事耳帝以為然乃發使告諸侯會陳吾將南遊雲夢上因隨以行楚王信聞之自疑懼不知所為或説信曰斬鍾離昧以謁上上必喜無患信從之十二月上會諸侯於陳信持昧首謁上上令武士縛信載後車信曰果若人言狡兔死走狗烹高鳥盡良弓藏敵國破謀臣亡師古曰黃石公三略之言我固當烹上曰人告公反遂械繫信以歸械者加以杻械繫者加以徽索田肯賀上曰陛下得韓信又治秦中如淳曰山東人謂關中為秦中師古曰謂關中秦地也形勝之國也張晏曰得形勢之勝便也地勢便利其以下兵於諸侯譬猶居高屋之上建瓴水也如淳曰瓴盛水瓶也居高屋之上而翻瓴水言其向下之勢順也建居偃翻瓴音鈴東有琅邪即墨之饒師古曰二縣近海財用之所出泰山在齊之南境齊負以為固晉灼曰齊西有平原河水東北過高唐高唐即平原也孟津號黃河故曰濁河也余謂孟津在河內去平原甚遠晉説失之拘蓋河流渾濁故謂之濁河也索隱曰崔浩云勃旁跌也旁跌出者橫在濟北故齊都賦云海旁出為勃名曰勃海郡余據班志齊地北至勃海有高樂高城陽信重合之地持戟百萬此東西秦也言齊地形勝與秦亢衡也莫可使王齊者上曰善賜金五百斤上還至洛陽赦韓信封為淮陰侯信知漢王畏惡其能惡烏路翻多稱病不朝從朝直遙翻朝見也從才用翻從遊也居常鞅鞅羞與絳灌等列鞅鞅志不滿也音於兩翻絳侯周勃灌將軍嬰嘗過樊將軍噲噲跪拜送迎言稱臣曰大王乃肯臨臣信出門笑曰生乃與噲等為伍為信怨望謀反張本上嘗從容與信言諸將能將兵多少從千容翻將即亮翻下同上問曰如我能將幾何信曰陛下不過能將十萬上曰於君何如曰臣多多而益善耳上笑曰多多益善何為為我禽信曰陛下不能將兵而善將將此乃信之所以為陛下禽也且陛下所謂天授非人力也六年甲申始剖符封諸功臣為徹侯師古曰剖破也與其合符而分授之也剖普口翻班志酇縣屬南陽郡孟康曰酇音讚按班書功臣表蕭何封酇八千戶而曹參封平陽張良封留皆萬戶宜不得言何封邑獨多蓋參以十二月甲申封何以正月丙午封功臣言何居上其意不能平者特同日受封樊酈絳灌諸人耳張良亦以丙午封諸人言何而不言良者蓋高祖先使良自擇齊三萬戶而良止受留萬戶故不敢言也臣等身被堅執鋭被皮義翻多者百餘戰小者數十合今蕭何未嘗有汗馬之勞徒持文墨議論顧反居臣等上何也帝曰諸君知獵乎夫獵追殺獸兔者狗也而發縱指示獸處者人也今諸君徒能得走獸耳功狗也至如蕭何發縱指示功人也師古曰發縱謂解紲而放之也指示以手指示之今俗言放狗縱子用翻而讀者乃為蹤迹之蹤非也書本皆不為蹤字自有逐蹤之狗不待人發也洪氏隸釋曰元祐中洛州治河堤得漢北海淳于長夏君碑其辭有曰紹縱先軌又北軍中候郭仲奇碑云有山甫之縱又云徽縱顯又司隸校尉魯峻碑云比縱豹産又圉令趙君碑云羡其縱外黃令高彪碑云莫與比縱皆以縱為蹤蕭何傳發縱指示獸處顏師古注云書本皆不為蹤字讀者乃為蹤迹之蹤非也據此數碑則漢人固多借用顏氏之注殆未然也張良為謀臣亦無戰鬬功帝使自擇齊三萬戶良曰始臣起下邳與上會留見八卷秦二世二年陛下用臣計幸而時中中竹仲翻臣願封留足矣不敢當三萬戶乃封張良為留侯封陳平為戶牖侯戶牖鄉名屬陳留郡陽武縣徐廣曰陽武屬魏地戶牖今為東昏縣屬陳留索隱曰徐廣云陽武屬魏而地理志屬河南郡蓋後陽武屬梁國耳徐又云戶牖今為東昏縣屬陳留與班書地理志同按是秦時戶牖鄉屬陽武至漢以戶牖鄉為東昏縣隸陳留郡也括地志東昏故城在汴州陳留縣東北九十里陳平亦十二月甲申封此非臣之功也上曰吾用先生謀戰勝克敵非功而何平曰非魏無知臣安得進上曰若子可謂不背本矣乃復賞魏無知平因無知見上事見九卷二年背蒲妹翻復扶又翻六年帝以天下初定子幼昆弟少懲秦孤立而亡欲大封同姓以填撫天下填讀曰鎮春正月丙午分楚王信地為二國以淮東五十三縣立從兄將軍賈為荊王索隱曰乃王吳地在淮東也余據班史時以故東陽郡鄣郡吳郡五十三縣王賈東陽漢下邳地鄣郡漢丹陽地吳郡即會稽地蓋其地自淮東而南盡丹陽會稽也賈死後以其地王吳王濞故索隱云王吳地也如淳曰荊亦楚也賈逵曰秦莊襄王名楚故改曰荊遂行於世晉灼曰奮伐荊楚自秦之先固已稱荊索隱曰姚察按虞喜云總言荊者以山命國也今西南有荊山在陽羡界賈分封吳地而號荊王指取此義太康地志陽羡縣本名荊溪從才用翻薛郡漢之魯國東海秦之郯郡彭城後為楚國蓋封交之時得三郡地景武之後楚國僅彭城數縣耳壬子以雲中鴈門代郡五十三縣立兄宜信侯喜為代王以膠東膠西臨災濟北博陽城陽郡七十三縣立微時外婦之子肥為齊王據此則博陽於秦楚漢兵爭之時亦嘗置郡矣自淮東至此雜用古地名固不純用秦漢所置郡名也師古曰外婦謂與旁通者孟康曰此時民流移故使能齊言者還齊也史記正義曰按言齊國形勝次於秦中故以封子肥七十餘城近齊城邑能齊言者咸割屬齊親子故大其都也孟説恐非六年上以韓王信材武所王北近鞏洛南迫宛葉東有淮陽韓之分晉其地南至宛葉西北包鞏洛接于新安宜陽東有潁川而淮陽之地則屬于楚及漢定天下韓王信剖符王潁川其地東兼有淮陽所謂北近南迫言其境相迫近耳不屬韓也宛於元翻葉式涉翻乃以太原郡三十一縣為韓國徙韓王信王太原以北備禦胡都晉陽信上書曰國被邊胸奴數入寇晉陽去塞遠請治馬邑班志太原郡領二十一縣今以三十一縣為韓國蓋定襄未置郡故太原之境北被邊兼有鴈門之馬邑也晉太康地記曰秦時建此城輒崩不成有馬周旋走反覆父老異之因依以築城遂名馬邑杜佑曰秦馬邑城在朔州善陽縣界李奇曰被音被馬之被師古曰被猶帶也皮義翻數所角翻六年上已封大功臣二十餘人其餘日夜爭功不決未得行封上在洛陽南宮從復道望見諸將往往相與坐沙中語上曰此何語留侯曰陛下不知乎此謀反耳上曰天下屬安定屬近也言近方安定也屬之欲翻留侯曰陛下起布衣以此屬取天下屬殊玉翻今陛下為天子而所封皆故人所親愛所誅皆生平所仇怨今軍吏計功以天下不足遍封此屬畏陛下不能盡封恐又見疑平生過失及誅故即相聚謀反耳上乃憂曰為之奈何留侯曰上平生所憎㣥臣所共知誰最甚者上曰雍齒與我有故怨數嘗窘辱我服虔曰未起之時與我有故怨也師古曰每以勇力困辱高祖余觀帝初起令雍齒守豐齒雅不欲屬帝即以豐降魏可以見其有故怨矣雍於用翻數所角翻為其功多故不忍為于偽翻留侯曰今急先封雍齒則㣥臣人人自堅矣於是上乃置酒封雍齒為什方侯蘇林曰什方漢中縣也師古曰地理志屬廣漢非漢中也今則屬益州什音十余按唐志什邡縣屬漢州蓋垂拱又分益州置漢州也宋白曰什方縣舊治雍齒城今於城北四十步立縣趨讀曰促漢之三公丞相職無不總御史大夫掌副丞相㣥臣罷酒皆喜曰雍齒尚為侯我屬無患矣臣光曰張良為高帝謀臣委以心腹宜其知無不言安有聞諸將謀反必待高帝目見偶語然後乃言之邪蓋以高帝初得天下數用愛憎行誅賞數所角翻或時害至公㣥臣往往有觖望自危之心觖古穴翻師古曰音決觖謂相觖也望怨望也韋昭曰觖猶冀也音冀索隱音企故良因事納忠以變移帝意使上無阿私之失下無猜懼之謀國家無虞利及後世若良者可謂善諫矣六年列侯畢已受封詔定元功十八人位次師古曰謂蕭何曹參張敖周勃樊噲酈商奚涓夏侯嬰灌嬰傅寬靳斂王陵陳武王吸薛歐周昌丁復蟲達自第一至十八也余謂此但定蕭何等元功十八人位次耳至呂后時乃詔作高祖功臣位次凡一百四十餘人師古所謂自蕭何至蟲達十八人呂后所定位次也張敖於高祖九年始自趙王廢為宣平侯安得預元功十八人之數哉故師古注功臣位次云張耳及敖並為無大功蓋以魯元之故呂后曲升之耳此説則得之平陽侯曹參身被七十創攻城略地功最多宜第一被皮義翻創初良翻謁者關內侯鄂千秋進曰㣥臣議皆誤鄂本出姬姓晉鄂侯之後關內侯位次列侯爵第十九師古曰言有侯號而居京畿無國邑此特一時之事耳上與楚相距五歲失軍亡衆跳身遁者數矣師古曰謂輕身走出也數所角翻下同非上所詔令召而數萬衆會上之乏絶者數矣又軍無見糧見賢遍翻蕭何轉漕關中給食不乏陛下雖數亡山東蕭何常全關中以待陛下此萬世之功也今雖無曹參等百數何缺於漢漢得之不必待以全奈何欲以一旦之功而加萬世之功哉蕭何第一曹參次之上曰善於是乃賜蕭何帶劍履上殿入朝不趨古者君子必帶劍所以衛身且昭武備也秦法㣥臣上殿不得持尺寸之兵草曰菲麻曰屨皮曰履屨履所以從軍軍容不入國故皆不許以上殿君前必趨崇敬也今賜何劍履上殿入朝不趨殊禮也吾聞進賢受上賞蕭何功雖高得鄂君乃益明於是因鄂千秋所章甲十五行本所上有故字乙十一行本同孔本同食邑封為安平侯索隱曰安平縣屬涿郡非災川之東安平縣悉封何父子兄弟十餘人皆有食邑益封何二千戶六年上歸櫟陽六年夏五月丙午尊太公為太上皇師古曰太上者極尊之稱也皇君也天子之父故號曰皇不預治國故不言帝六年初胸奴畏秦北徙十餘年及秦滅胸奴復稍南渡河此北河也在朔方北單于頭曼有太子曰冒頓韋昭曰曼音瞞師古曰莫安翻索隱曰冒音墨又莫報翻後有所愛閼氏胸奴之閼氏猶中國之皇后閼於連翻氏音支下月氏同頭曼欲立之少詩照翻是時東胡強而月氏盛括地志涼肅甘沙庭州本月氏地質音致既而頭曼急擊月氏月氏欲殺冒頓冒頓盜其善馬騎之亡歸頭曼以為壯令將萬騎冒頓乃作鳴鏑應劭曰髐箭也韋昭曰矢鏑飛則鳴余見今軍中亦有鳴鏑於近笴之處開小竅矢飛急則凌風而鳴鏑音嫡髐呼交翻勒其所部使習其令也鳴鏑所射而不悉射者斬之冒頓乃以鳴鏑自射其善馬既又射其愛妻左右或不敢射者皆斬之最後以鳴鏑射單于善馬左右皆射之於是冒頓知其可用從頭曼獵以鳴鏑射頭曼其左右亦皆隨鳴鏑而射射而亦翻遂殺頭曼盡誅其後母與弟及大臣不聽從者冒頓自立為單于東胡聞冒頓立乃使使謂冒頓欲得頭曼時千里馬冒頓問㣥臣㣥臣皆曰此胸奴寶馬也勿與冒頓曰奈何與人鄰國而愛一馬乎遂與之居頃之東胡又使使謂冒頓欲得單于一閼氏冒頓復問左右復扶又翻左右皆怒曰東胡無道乃求閼氏請擊之冒頓曰奈何與人鄰國愛一女子乎遂取所愛閼氏豫東胡豫讀曰與下同東胡王愈益驕東胡與胸奴中間有棄地莫居千餘里各居其邊為甌脫服虔曰甌脫作土室以同也師古曰境上候望之處若今之伏宿處也甌一侯翻脫土活翻此棄地欲有之冒頓問㣥臣㣥臣或曰此棄地豫之亦可勿與亦可於是冒頓大怒曰地者國之本也奈何豫之諸言豫之者皆斬之冒頓上馬令國中有後出者斬遂襲擊東胡東胡初輕冒頓不為備冒頓遂滅東胡既歸又西擊走月氏南並樓煩白羊河南王師古曰樓煩白羊二王之居在河南悉復收蒙恬所奪胸奴故地蒙恬奪胸奴地見七卷秦始皇三十一年班志朝那縣屬安定郡膚施縣屬上郡史記正義曰漢朝那故城在原州百泉縣西七十里膚施縣趙置秦因而不改今屬延州漢兵方與項羽相距中國罷於兵革罷讀曰疲以故冒頓得自強控弦之士三十餘萬控弦引弓也控口弄翻秋胸奴圍韓王信於馬邑信數使使胡求和解漢發兵救之疑信數間使有二心數所角翻間古莧翻使疏吏翻使人責讓信信恐誅九月以馬邑降胸奴胸奴冒頓因引兵南踰句注郡國志句注山險名在鴈門陰館縣括地志句注山在代州鴈門縣西北三十里杜佑曰句注山即代州鴈門縣西陘嶺句音鉤又如字又音拘至晉陽六年帝悉去秦苛儀法為簡易去羌呂翻除也後以義推易以豉翻下同㣥臣飲酒爭功醉或妄呼拔劍擊柱呼火故翻帝益厭之叔孫通説上曰叔孫本出姬姓魯叔孫氏之後夫儒者難與進取可與守成臣願徵魯諸生與臣弟子共起朝儀朝直遙翻帝曰得無難乎叔孫通曰五帝異樂三王不同禮禮者因時世人情為之節文者也臣願頗采古禮與秦儀雜就之上曰可試為之令易知度吾所能行者為之易以豉翻度徒洛翻於是叔孫通使徵魯諸生三十餘人師古曰通為使者而徵魯諸生使疏吏翻曰公所事者且十主皆面諛以得親貴通事秦始皇二世陳涉項梁楚懷王項羽及帝凡七主且幾也言幾及十主也死者未葬傷者未起又欲起禮樂禮樂所由起積德百年而後可興也師古曰言行德教百年然後可起禮樂公去矣無汙我汙烏故翻叔孫通笑曰若真鄙儒也不知時變師古曰若汝也鄙言不通師古曰西入關師古曰左右謂近臣也為學謂素有學術與其弟子百餘人為綿蕞野外習之應劭曰立竹及茅索營之習禮儀其中也如淳曰謂以茅剪樹地為纂位尊卑之次也春秋傳曰置茅蕝師古曰蕝與蕞同子悅翻如説是韋昭曰引繩為綿立表為蕞蕞茲會翻賈逵曰束茅以立表位為蕝纂文曰蕝今之纂字即悅翻又音纂言於上曰可試觀矣上使行禮曰吾能為此乃令㣥臣習肄肄弋二翻亦習也七年七年冬十月長樂宮成諸侯㣥臣皆朝賀時未起未央宮故帝御長樂宮受朝賀及蕭何既起未央前殿自惠帝以後皆御未央而長樂為太后所居謂之東朝樂音洛師古曰未平明之前先悉薦翻以次引入殿門陳東西鄉治直之翻鄉讀曰嚮衛官俠陛衛官侍衛之官郎中及中郎執戟侍衛者是也俠與挾同挾殿陛之兩旁也或音夾皆執兵張旗幟幟昌志翻於是皇帝傳警漢儀云帝輦動則左右侍帷幄者稱警是也漢書音義天子出稱警傳聲而唱以警外也沈約曰輦車周禮王后五路之卑者也后從容宮中所乘非王車也漢制乘輿御之或使人挽或駕果下馬不知何代去其輪漢吏六百石銅印墨綬奉月七十斛莫不振恐肅敬至禮畢復置法酒禮畢謂朝禮畢也師古曰法酒猶言禮爵謂不飲之至醉皆伏抑首師古曰抑屈也謂依禮法不敢平坐而視觴九行謁者言罷酒御史執法舉不如儀者輒引去執法即御史也杜佑曰御史之名周官有之蓋掌贊書而授法令非今任也戰國時亦有御史秦趙澠池之會各令書其事秦漢為糾察之任秦以御史監郡漢初定禮義御史執法舉不如儀者輒引去是也無敢歡譁失禮者竟朝言行朝禮至禮畢也朝直遙翻歡與喧同許元翻吾乃今日知為皇帝之貴也乃拜叔孫通為太常班表奉常秦官掌宗廟禮儀景帝中六年改曰太常此不書奉常而書太常者使人易知初秦有天下悉內六國禮儀采擇其尊君抑臣者存之及通制禮頗有所增損大抵皆襲秦故自天子稱號下至佐僚及宮室官名少所變改其書後與律令同録藏於理官師古曰理官即法官也民臣莫有言者焉臣光曰禮之為物大矣用之於身則動靜有法而百行備焉用之於家則內外有別而九族睦焉行下孟翻別彼列翻用之於鄉則長幼有倫而俗化美焉用之於國則君臣有敘而政治成焉治直吏翻用之於天下則諸侯順服而紀綱正焉豈直几席之上戶庭之間得之而不亂哉夫以高祖之明達聞陸賈之言而稱善見下卷十一年然所以不能肩張肩上脫比字於三代之王者病於不學而已當是之時得大儒而佐之與之以禮為天下其功烈豈若是而止哉惜夫叔孫生之章甲十五行本之下有為字乙十一行本同器小也徒竊禮之粳粃以依世諧俗取寵而已穀皮曰粳穀不成曰粃粃與秕同以迄于今豈不痛甚矣哉是以揚子譏之曰昔者魯有大臣史失其名曰何如其大也曰叔孫通欲制君臣之儀召先生於魯所不能致者二人曰若是則仲尼之開迹諸侯也非邪曰仲尼開迹將以自用也宋咸曰謂開布其迹於諸侯之國猶言歷聘也雖有規矩準繩焉得而用之焉於虔翻善乎揚子之言也夫大儒者惡肯毀其規矩準繩以趨一時之功哉惡音烏趨七喻翻七年上自將擊韓王信破其軍於銅鞮班志銅鞮縣屬上黨郡上黨記晉銅鞮伯華所邑去銅鞮故宮二十里唐屬潞州宋白曰縣有銅鞮水故名鞮丁奚翻信亡走胸奴白土人曼丘臣王黃等立趙苗裔趙利為王班志白土縣屬上郡括地志白土故城在鹽州白池東北九十里又云近延州余據班志圜水出白土縣西東入河師古曰圜音銀今銀州銀水是則白土縣在唐銀州界按圜字乃圁字之誤通典圁水在銀州儒林縣東北今謂之無定河師古又曰曼丘毌丘本一姓也語有緩急耳曼音萬姓譜齊有曼丘不擇與信及胸奴謀攻漢胸奴使左右賢王將萬餘騎與王黃等屯廣武以南至晉陽班史胸奴置左右賢王左右谷蠡王最為大國班志廣武縣屬太原郡史記正義廣武故城在代州鴈門界句注山南杜佑曰代州鴈門郡治鴈門縣漢廣武縣故城在西南宋白曰隋改廣武縣為鴈門避太子諱也胸奴輒敗走已復屯聚漢兵乘勝追之會天大寒雨雪大戴記曰盛陰之氣在雨水則凝滯而為雪雨于具翻自上而下曰雨後以義推師古曰什人之中二三墮指上居晉陽聞冒頓居代谷史記正義曰代谷今媯州余據唐媯州在幽州西北此代谷在句注之北後魏都平城建為代都蓋因代谷而名也唐屬雲州界使人覘胸奴覘丑廉翻又敕艷翻窺偵也冒頓匿其壯士肥牛馬但見老弱及羸畜羸倫為翻畜許救翻使者十輩來皆言胸奴可擊上復使劉敬往使胸奴復扶又翻未還漢悉兵三十二萬北逐之踰句注劉敬還報曰兩國相擊此宜夸矜見所長見賢遍翻示也下欲見同今臣往徒見羸瘠老弱此必欲見短伏奇兵以爭利愚以為胸奴不可擊也是時漢兵已業行凡事已為而未成曰業罵劉敬曰齊虜以口舌得官今乃妄言沮吾軍沮才汝翻止也械繫敬廣武帝先至平城兵未盡到冒頓縱精兵四十萬騎圍帝於白登七日班志平城縣屬鴈門郡服虔曰白登臺名去平城七里師古曰白登在平城東南去平城十餘里括地志朔州定襄縣本漢平城縣東北三十里有白登山山上有臺名曰白登臺帝用陳平祕計使使間厚遺閼氏應劭曰陳平使畫工圖美女間遣閼氏曰漢有美女如此今皇帝困急欲獻之閼氏畏其奪己寵言於冒頓令解圍余謂祕計者以其失中國之體故祕而不傳間古莧翻遺于季翻兩主不相困今得漢地而單于終非能居之也且漢主亦有神靈單于察之冒頓與王黃趙利期而黃利兵不來疑其與漢有謀乃解圍之一角會天大霧漢使人往來胸奴不覺陳平請令強弩傅兩矢外鄉師古曰傅讀曰附每一弩而加兩矢外嚮以禦敵也鄉讀曰嚮從解角直出帝出圍欲驅太僕滕公固徐行至平城漢大軍亦到胡騎遂解去漢亦罷兵歸令樊噲止定代地上至廣武赦劉敬曰吾不用公言以困平城吾皆已斬前使十輩矣乃封敬二千戶為關內侯號為建信侯帝南過曲逆班志曲逆縣屬中山國張晏曰濡水於城北曲而西流故曰曲逆後漢章帝醜其名改曰蒲陰杜佑曰中山郡北平縣秦曲逆縣後漢蒲陰縣曲逆讀皆如字文選高祖功臣贊注曰曲區句翻逆音遇非也顏之推曰俗儒讀曲逆侯為去遇票姚校尉曰飄搖票姚諸儒有兩音最無謂者曲逆為去遇也壯哉縣吾行天下獨見洛陽與是耳乃更封陳平為曲逆侯盡食之平從帝征伐凡六出奇計輒益封邑焉七年十二月上還過趙趙王敖執子壻禮甚卑敖尚帝女魯元公主故執子壻禮師古曰箕倨者謂伸兩腳其形如箕曲禮曰坐毋箕孔穎達曰箕謂舒展兩足狀如箕舌也貫姓也原伯貫之後吾王孱王也孟康曰孱音潺湲之潺冀州謂懦弱者為孱師古音士連翻乃説王曰天下豪傑並起能者先立今王事帝甚恭而帝無禮請為王殺之張敖齧其指出血曰師古曰自齧其指出血以表至誠而為誓約不背漢也為于偽翻君何言之誤先人亡國賴帝得復國張耳亡國事見九卷元年復國事見十卷三年秋豪皆帝力也豪至秋而纖鋭秋豪言其細微也復扶又翻貫高趙午等皆相謂曰乃吾等非也吾王長者不倍德長知兩翻倍蒲妹翻且吾等義不辱今帝辱我王故欲殺之何汙王為汙烏故翻染涴也事成歸王事敗獨身坐耳言獨以身坐弒帝之罪七年胸奴攻代代王喜棄國自歸喜即帝兄仲也六年春正月以代地立喜為代王韓王信故國班志郃陽縣屬左馮翊詩所謂在郃之陽者也括地志郃陽故城在同州河西縣南三十里郃音合辛卯立皇子如意為代王如意戚夫人之子後徙王趙七年春二月上至長安蕭何治未央宮未央宮在長安城西南隅周迥二十八里元和志曰東距長樂宮一里中隔武庫括地志未央宮在雍州長安縣西北十里長安故城中甚怒謂何曰天下胸胸勞苦數歲成敗未可知是何治宮室過度也何曰天下方未定故可因以就宮室且夫天子以四海為家非壯麗無以重威且無令後世有以加也上説説讀曰悅臣光曰王者以仁義為麗道德為威未聞其以宮室填服天下也填讀曰鎮天下未定當克己節用以趨民之急趨七喻翻而顧以宮室為先豈可謂之知所務哉昔禹卑宮室而桀為傾宮孔子曰禹卑宮室而盡力乎溝洫桀為傾宮瑤臺以殫百姓之財躬行節儉以示子孫其末流猶入於淫靡況示之以侈乎乃云無令後世有以加豈不謬哉至于孝武卒以宮室罷敝天下卒子恤翻罷讀曰疲未必不由酇侯啓之也七年上自櫟陽徙都長安先雖以婁敬張良之言西都關中然都邑未成則猶居櫟陽今未央宮成始自櫟陽徙都長安七年初置宗正官以序九族班表宗正秦官掌親屬平帝元始元年更名宗伯七年夏四月帝行如洛陽聶崇岐標點容肇祖覆校
