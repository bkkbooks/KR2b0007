body:
  text: 資治通鑑卷第五十五翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注漢紀四十七延熹七年孝桓皇帝中延熹七年甲辰一六四延熹七年春二月丙戌邟鄉忠侯黃瓊薨賢曰説文云邟潁川縣也漢潁川有周承休侯國元始二年更名曰邟音亢考異曰范書四年瓊免司空至七年卒袁紀七年瓊以太尉薨范書楊秉五年代劉矩為太尉袁紀此年瓊卒秉乃為太尉今從范書四方遠近名士會者六七千人初瓊之教授於家徐稚從之咨訪大義及瓊貴稚絶不復交至是稚往弔之進酹哀哭而去稚直利翻復扶又翻酹盧對翻醊祭以酒沃地曰酹人莫知者諸名士推問喪宰喪宰典喪者也先時有一書生來衣粗薄而哭之哀不記姓字衆曰必徐孺子也徐稚字孺子先悉薦翻衣於既翻及於塗容為沽酒市肉稚為飲食為于偽翻下同容問國家之事稚不答更問稼穡之事稚乃答之容還以語諸人語牛倨翻或曰孔子云可與言而不與言失人論語載孔子之言太原郭泰曰不然孺子之為人清潔高廉飢不可得食寒不可得衣食讀曰飼衣於既翻而為季偉飲酒食肉此為已知季偉之賢故也茅容字季偉此為如字是其智可及其愚不可及也亦以孔子之言語諸人蓋以寧武子況徐孺子泰博學善談論初遊雒陽時人莫識陳留符融符姓也此符從竹從付非草付之苻因以介於河南尹李膺古者主有儐客有介孔叢子曰士無介不見介因也曰吾見士多矣未有如郭林宗者也郭泰字林宗高邪密博今之華夏鮮見其儔夏戶雅翻鮮息淺翻遂與為友於是名震京師後歸鄉里衣冠諸儒送至河上車數千兩兩音亮膺唯與泰同舟而濟衆賓望之以為神仙焉自雒陽歸太原渡河而西北泰性明知人好獎訓士類好呼到翻周遊郡國茅容年四十餘耕於野與等輩避雨樹下衆皆夷踞相對賢曰夷平也説文曰踞蹲也論語曰原壤夷俟言平坐踞傲也危坐正襟盡前而坐因請寓宿旦日容殺雞為饌饌雛晥翻又雛戀翻泰謂為己設容分半食母餘半庋置食讀曰飼毛晃曰板為閣以藏物曰庋舉綺翻自以草蔬與客同飯賢曰草粗也飯父遠翻卿賢哉遠矣既言賢哉又言遠矣言其賢去常人甚遠三牲之具謂養親之具也孝經曰日用三牲之養賓旅猶言賓客也乃我友也起對之揖勸令從學卒為盛德卒子恤翻巨鹿孟敏客居太原荷甑墮地不顧而去荷下可翻甑子孕翻譙周古史考曰黃帝始作甑周官考工記甑實二釜注云六斗四升曰釜古者陶而為甑釋器云鬲曾謂之鬵鬵鉹也孫炎曰關東人謂甑為鬵涼州人謂甑為鉹鬲曾即甑字泰見而問其意對曰甑已破矣視之何益泰以為有分決與之言知其德性因勸令遊學遂知名當世陳留申屠蟠家貧傭為漆工鄢陵庾乘少給事縣廷為門士鄢陵縣屬潁川郡師古曰鄢音偃陸德明曰鄢謁晚翻又於建翻賢曰門士即門卒少詩照翻其後皆為名士自餘或出於屠沽卒伍因泰獎進成名者甚衆陳國童子魏昭請於泰曰經師易遇人師難遭經師謂專門名家教授有師法者人師謂謹身修行足以範俗者易以豉翻供給灑掃灑所賣翻又山寄翻掃悉報翻泰許之泰嘗不佳謂體中有不節適也語曰不佳微有疾也粥成進泰泰呵之曰呵責怒也音虎何翻為長者作粥不加意敬使不可食以杯擲地昭更為粥重進泰復呵之為于偽翻重直龍翻復扶又翻如此者三昭姿容無變泰乃曰吾始見子之面而今而後知卿心耳遂友而善之陳留左原為郡學生犯法見斥泰遇諸路為設酒肴以慰之謂曰昔顏涿聚梁甫之巨盜段干木晉國之大駔卒為齊之忠臣魏之名賢呂氏春秋曰顏涿聚梁父大盜也學於孔子左傳晉伐齊戰于黎丘齊師敗績知伯親禽顏庚杜預注曰黎丘隰也顏庚齊大夫顏涿聚也又曰晉荀瑤伐鄭鄭請救於齊齊師將興陳成子設乘車兩馬繫五邑焉召顏涿聚之子晉曰隰之役而父死焉今君命汝是邑服車而朝毋廢前勞呂氏春秋曰段干木晉國之駔説文曰駔會也謂合兩家之買賣如今之度市也新序曰魏文侯過段干木之閭而軾之國人誦之曰吾君好正段干木之敬吾君好忠段干木之隆秦欲攻魏司馬唐諫曰段干木賢者也而魏禮之天下莫不聞毋乃不可加兵乎駔子朗翻卒子恤翻論語曰蘧伯玉使人於孔子子問之曰夫子何為對曰夫子欲寡其過而未能也又語曰顏回好學不二過蘧求於翻瑗于眷翻慎勿恚恨責躬而已恚於避翻原納其言而去或有譏泰不絶惡人者泰曰人而不仁疾之已甚亂也賢曰論語孔子之言也鄭玄注云不仁之人當以風化之若疾之甚是益使為亂也欲報諸生其日泰在學原愧負前言因遂罷去後事露衆人咸謝服焉或問范滂曰郭林宗何如人滂曰隱不違親賢曰介推之類賢曰柳下惠之類諸侯不得友吾不知其他泰嘗舉有道不就舉有道事始五十卷安帝建光元年以為自漢元以來未見其匹嘗勸之仕漢元謂漢初也匹儔也等也偶也吾夜觀乾象晝察人事天之所廢不可支也吾將優遊卒歲而已卒子恤翻然猶周旋京師誨誘不息誘音酉徐稚以書戒之曰大木將顛非一繩所維何為栖栖不遑寧處賢曰顛仆也維繫也喻時將衰季非一人所能救也尹焞曰栖栖猶皇皇也處昌呂翻謹拜斯言以為師表濟陰黃允以雋才知名濟子禮翻泰見而謂曰卿高才絶人足成偉器年過四十聲名著矣然至於此際當深自匡持不然將失之矣後司徒袁隗欲為從女求姻為于偽翻從才用翻見允歎曰得壻如是足矣允聞而黜遣其妻允妻夏侯氏允黜其妻欲壻于袁也因於衆中攘袂數允隱慝十五事而去允以此廢於時當時清議為何如哉數所具翻慝吐得翻初允與漢中晉文經並恃其才智曜名遠近徵辟不就託言療病京師不通賓客公卿大夫遣門生旦暮問疾郎吏雜坐其門猶不得見三公所辟召者輒以詢訪之隨所臧否否音鄙以為與奪符融謂李膺曰二子行業無聞行下孟翻下同以豪桀自置遂使公卿問疾王臣坐門融恐其小道破義空譽違實特宜察焉膺然之二人自是名論漸衰賓徒稍省旬日之間慚歎逃去後並以罪廢棄陳留仇香至行純默姓譜仇姓宋大夫仇牧之後行下孟翻下同年四十為蒲亭長蒲亭屬陳留郡考城縣獨與母居母詣香告元不孝香驚曰吾近日過元舍廬落整頓賢曰落居也今人謂院為落此非惡人當是教化未至耳母守寡養孤苦身投老奈何以一旦之忿棄歷年之勤乎且母養人遺孤不能成濟若死者有知百歲之後當何以見亡者母涕泣而起香乃親到元家為陳人倫孝行譬以禍福之言元感悟卒為孝子為于偽翻卒子恤翻考城令河內王奐署香主簿考城縣屬陳留郡故災縣章帝惡其名改曰考城聞在蒲亭陳元不罰而化之得無少鷹鸇之志邪鷹鸇以鷙擊為事左傳見無禮者誅之如鷹鸇之逐鳥雀也少詩沼翻以為鷹鸇不若鸞鳳故不為也奐曰枳棘之林非鸞鳳所集百里非大賢之路賢曰時奐為縣令故自稱百里也奉讀曰俸使入太學郭泰符融齎刺謁之書姓名以自通求見曰刺秦漢之間謂之謁明旦泰起下牀拜之曰君泰之師非泰之友也香學畢歸鄉里雖在宴居賢曰宴安也朱子曰宴居間暇無事之時妻子事之若嚴君妻子有過免冠自責妻子庭謝思過香冠妻子乃敢升堂終不見其喜怒聲色之異不應徵辟卒於家延熹七年三月癸亥隕石于鄠鄠縣屬扶風鄠音戶延熹七年夏五月己丑京師雨雹延熹七年荊州刺史度尚募諸蠻夷擊艾縣賊大破之降者數萬人桂陽宿賊卜陽潘鴻等逃入深山宿賊言積久為賊者破其三屯多獲珍寶陽鴻黨衆猶盛尚欲擊之而士卒驕富莫有鬬志尚計緩之則不戰逼之必逃亡乃宣言卜陽潘鴻作賊十年習於攻守今兵寡少未易可進易以豉翻當須諸郡所發悉至乃並力攻之申令軍中恣聽射獵申令者既下令而申言之申重也大小皆出尚乃密使所親客潛焚其營珍積皆盡獵者來還莫不泣涕尚人人慰勞深自咎責以失火自咎責也勞力到翻卜陽等財寶足富數世諸卿但不並力耳所亡少少少詩沼翻何足介意衆咸憤踴尚敕令秣馬蓐食明旦徑赴賊屯陽鴻等自以深固不復設備復扶又翻吏士乘鋭遂破平之尚出兵三年延熹五年尚刺荊州至是三年矣封右鄉侯延熹七年冬十月壬寅帝南巡庚申幸章陵戊辰幸雲夢臨漢水還幸新野時公卿貴戚車騎萬計徵求費役不可勝極勝音升護駕從事桂陽胡騰上言護駕從事蓋荊州刺史所遣護車駕者也天子無外春秋公羊傳曰王者無外即為京師臣請以荊州刺史比司隸校尉臣自同都官從事帝從之自是肅然莫敢妄干擾郡縣荊州刺史得察舉所部郡縣而不可得察舉扈從之臣若比司隸校尉則得察舉其姦故肅然也左右並通姦利詔書多除人為郎太尉楊秉上疏曰太微積星名為郎位賢曰史記天官書曰太微宮五帝坐後聚二十五星蔚然曰郎位積聚也出牧百姓宜割不忍之恩以斷求欲之路斷丁管翻於是詔除乃止延熹七年護羌校尉段熲擊當煎羌破之延熹七年十二月辛丑車駕還宮延熹七年中常侍汝陽侯唐衡武原侯徐璜皆卒汝陽縣屬汝南郡武原縣屬彭城國延熹七年初侍中寇榮恂之曾孫也性矜潔少所與少詩沼翻以此為權寵所疾榮從兄子尚帝妹益陽長公主帝又納其從孫女於後宮從才用翻長知兩翻左右益忌之遂共陷以罪與宗族免歸故郡寇氏本上谷昌平人持之浸急榮恐不免詣闕自訟未至刺史張敬追劾榮以亶去邊刺史蓋幽州刺史也劾戶概翻又戶得翻榮逃竄數年會赦不得除積窮困乃自亡命中上書曰陛下統天理物作民父母自生齒以上咸蒙德澤大戴禮曰男子八月生齒女子七月生齒為專權之臣所見批抵賢曰説文曰抵側擊也批音片支翻余按前書音義批音蒲結翻抵諸氏翻詩曰營營青蠅止于樊豈弟君子無信讒言青蠅能汚白使黑汚黑使白喻佞人變亂善惡也發投杼之怒事見三卷周赧王七年張設機網並驅爭先若赴仇敵罰及死沒髡剔墳墓謂剪伐松柏如人之髡剔也朝直遙翻是以不敢觸突天威而自竄山林以俟陛下發神聖之聽啓獨覩之明救可濟之人援沒溺之命不意滯怒不為春夏息賢曰春夏生長萬物故不宜怒為于偽翻下同滯怒淹恚言怒恚積蓄久而不化也恚於避翻布告遠近嚴文克寸剝痛於霜雪逐臣者窮人途張途作迹追臣者極車軌雖楚購伍員史記楚人伍奢為平王太子建太傅費無極譖殺奢奢子員字子胥奔吳楚購之得伍員者賜粟五萬石爵執圭員音云事見十卷高祖五年臣遇罰以來三赦再贖無驗之罪足以蠲除賢曰無驗謂無罪狀可案驗也有司咎臣甫力賢曰甫始也力甚也行則為亡虜苟生則為窮人極死則為冤鬼天廣而無以自覆覆敷救翻地厚而無以自載蹈陸土而有沈淪之憂遠巖牆而有鎮壓之患遠于願翻如臣犯元惡大憝賢曰憝惡言元惡之人大為人之所惡也憝徒對翻備刀鋸賢曰鋸刖刑也國語曰刑有五大者陳諸原野以解衆論之疑臣思入國門坐於肺石之上使三槐九棘平臣之罪周禮秋官曰左九棘孤卿大夫位焉右九棘公侯伯子男位焉面三槐三公位焉左嘉石平罷民右肺石達窮民注肺石赤石也槐取其懷來棘取其赤心外刺賢曰閶闔天門也重直龍翻舉趾觸罘罝賢曰穽坑穽也説文罘兔網也罝亦兔網也音浮嗟絓古賣翻罥也無緣至萬乘之前乘繩證翻永無見信之期悲夫久生亦復何聊復扶又翻蓋忠臣殺身以解君怒孝子殞命以寧親怨故大舜不避塗廩浚井之難史記舜父瞽叟常欲殺舜使舜塗廩從下焚廩舜乃以兩笠自扞而下又使穿井舜為匿空旁出舜既入深父乃下土實之舜從旁空出去難乃旦翻左傳驪姬嬖於晉獻公欲殺太子申生謂申生曰君夢齊妾必速祭之太子祭于曲沃歸胙于公公田姬置諸宮六日公至毒而獻之公祭之地地墳與犬犬斃與小臣小臣斃姬泣曰賊由太子太子奔新城或謂太子子辭君必辨焉太子曰我辭姬必有罪遂縊而死不自斃以解明朝之忿哉乞以身塞責朝直遙翻塞悉則翻願陛下丐兄弟死命賢曰丐乞也音蓋以崇陛下寬饒之惠先死陳情臨章泣血帝省章愈怒先悉薦翻省悉井翻遂誅榮寇氏由是衰廢考異曰袁紀置此事於延熹元年按范書榮傳云延熹中被罪榮書又云遇罰以來三赦再贖不知榮死果在何年按襄楷竇武上書皆言梁孫寇鄧之誅今置於此八年八年春正月帝遣中常侍左悺之苦縣祠老子賢曰史記曰老子者楚苦縣厲鄉曲仁里人也名耳字聃姓李為周守藏吏有神廟故就祠之苦縣屬陳國故城在今亳州谷陽縣苦音戶又如字八年勃海王悝素行險僻悝苦回翻行下孟翻多僭傲不法北軍中候陳留史弼上封事曰臣聞帝王之於親戚愛雖隆必示之以威體雖貴必禁之以度如是和睦之道興骨肉之恩遂矣窮聞勃海王悝外聚剽輕不逞之徒賢曰剽悍也逞快也謂被侵枉不快之人也左傳曰率㣥不逞之人余謂不逞謂包藏禍心而不得逞者剽匹妙翻出入無常所與㣥居皆家之棄子朝之斥臣朝直遙翻下同必有羊勝伍被之變羊勝事見十六卷景帝中二年伍被事見十九卷武帝元狩元年州司謂州刺史之屬陛下隆於友于書曰惟孝友于兄弟恐遂滋蔓滋長也蔓延也左傳曰無使滋蔓蔓難圖也乞露臣奏宣示百僚平處其法處昌呂翻法決罪定乃下不忍之詔臣下固執然後少有所許少詩沼翻如是則聖朝無傷親之譏勃海有享國之慶不然懼大獄將興矣上不聽悝果謀為不道帝紀曰悝謀反詔貶為癭陶王食一縣賢曰癭陶縣屬巨鹿郡故城在今趙州癭陶縣西南癭於郢翻八年丙申晦日有食之詔公卿校尉舉賢良方正校戶教翻八年千秋萬歲殿火八年中常侍侯覽兄張兄作弟參為益州刺史殘暴貪婪婪盧含翻纍臧億計太尉楊秉奏檻車徵參參於道自殺閲其車重三百餘兩皆金銀錦帛重直用翻秉因奏曰臣案舊典宦者本在給使省闥司昏守夜而今猥受過寵執政操權操七刀翻附會者因公褒舉違忤者求事中傷忤五故翻中竹仲翻居法王公富擬國家飲食極肴膳僕妾盈紈素中常侍侯覽弟參貪殘元惡自取禍滅覽顧知釁重必有自疑之意臣愚以為不宜復見親近復扶又翻近其靳翻昔懿公刑邴之父奪閻職之妻而使二人參乘卒有竹中之難左氏傳齊懿公之為公子也與邴之父爭田弗勝及即位乃掘而刖之而使僕納閻職之妻而使職參乘公遊于申池二人浴于池以鞭抶職職怒曰人奪汝妻而不怒一抶汝庸何傷職曰與刖其父而不能病者何如乃謀弒公納諸竹中音丙又彼病翻左傳作歜昌欲翻卒子恤翻難乃旦翻投畀有虎畀與也詩曰取彼讒人投畀豺虎屏必郢翻非恩所宥請免官送歸本郡書奏尚書召對秉掾屬詰之曰賢曰召秉掾屬問之詰去吉翻設官分職各有司存三公統外御史察內今越奏近官經典漢制何所依據其開公具對秉使對曰春秋傳曰除君之惡唯力是視左傳載寺人披之言此經典也申屠嘉召通詰責文帝從而請之事見十五卷文帝後二年此漢制也三公之職無所不統尚書不能詰帝不得已竟免覽官司隸校尉韓縯因奏左悺罪惡及其兄太僕南鄉侯稱請託州郡聚斂為姦斂力贍翻賓客放縱侵犯吏民悺稱皆自殺縯又奏中常侍具瑗兄沛相恭臧罪徵詣廷尉瑗詣獄謝上還東武侯印綬東武城屬清河郡據宦者傳瑗封東武陽侯東武陽屬東郡上時掌翻超及璜衡襲封者並降為鄉侯考異曰楊秉傳南巡之明年秉劾侯覽則是在此年矣宦者傳韓縯奏具瑗瑗坐奪國為鄉侯與秉傳所云削瑗國共是一事明矣而袁紀載在去年春與范不同今從范書悉奪爵土劉普等貶為關內侯尹勳等亦皆奪爵八年帝多內寵宮女至五六千人及驅役從使復兼倍於此驅役者嬖幸挾勢驅掠良人以供掖庭私役者也從使者趨勢附力樂從而為之使者也復扶又翻與帝所幸郭貴人更相譖訴更工衡翻癸亥廢皇后鄧氏送暴室以憂死漢官儀曰暴室在掖庭內丞一人主宮中婦人疾病者其皇后貴人有罪者亦就此室下遐稼翻八年護羌校尉段熲擊罕張罕作勒姐羌破之姐且也翻又音紫八年三月辛巳赦天下八年宛陵大姓羊元㣥罷北海郡宛陵縣屬河南尹郡舍溷軒有奇巧賢曰溷軒廁屋河南尹李膺表按其罪元㣥行賂宦官膺竟反坐反坐按其罪而不得行反自坐罪以罪繫獄廷尉馮緄考致其死考鞠而致其死罪也緄古本翻共飛章誣緄以罪中常侍蘇康管霸固天下良田美業固障固也大司農劉祐移書所在依科品沒入之帝大怒與膺緄俱輸作左校八年夏四月甲寅安陵園寢火安陵惠帝陵也八年丁巳詔壞郡國諸淫祀壞音怪特留雒陽王渙密縣卓茂二祠八年五月丙戌太尉楊秉薨秉為人清白寡欲嘗稱我有三不惑酒色財也秉既沒所舉賢良廣陵劉瑜乃至京師上書言中官不當比肩裂土競立胤嗣繼體傳爵順帝陽嘉四年著令聽中官以養子襲爵嬖女充積冗食空宮無事而食謂之冗食冗而隴翻又第舍增多窮極奇巧掘山攻石促以嚴刑州郡官府各自考事姦情賕賂皆為吏餌民愁鬱結起入賊黨官輒興兵誅討其罪貧困之民或有賣其首級以要酬賞要一遙翻父兄相代殘身妻孥相視分裂又陛下好微行近習之家好呼到翻私幸宦者之舍賓客市買熏灼道路因此暴縱無所不容惟陛下開廣諫道諫道謂言路也遠佞邪之人遠于願翻放鄭衛之聲則政致和平德感祥風矣孝經援神契曰德至八方則祥風至執政者欲令瑜依違其辭乃更策以他事瑜復悉心對八千餘言有切於前復扶又翻下同拜為議郎八年荊州兵朱蓋等叛與桂陽賊胡蘭等復攻桂陽太守任胤棄城走任音壬賊衆遂至數萬轉攻零陵太守下邳陳球固守拒之零陵下溼編木為城零陵郡武帝置宋白曰郡古理在今全州清湘縣南七十八里古城存焉掾史白球遣家避難難乃旦翻球怒曰太守分國虎符受任一邦豈顧妻孥而沮國威乎孥音奴沮在呂翻復言者斬乃弦大木為弓羽矛為矢引機發之多所殺傷此則今划車弩之類球輒於內因地勢反決水淹賊相拒十餘日不能下時度尚徵還京師詔以尚為中郎將率步騎二萬餘人救球發諸郡兵並勢討擊大破之斬蘭等首三千餘級復以尚為荊州刺史蒼梧太守張敘為賊所執及任胤皆徵棄市胡蘭餘黨南走蒼梧交趾刺史張磐擊破之賊復還入荊州界度尚懼為己負負罪負也懼以不能盡滅㣥賊為罪於是徵磐下廷尉上時掌翻下遐稼翻辭狀未正會赦見原磐不肯出獄方更牢持械節竹約為節械節亦械之刻約處也考異曰按張磐會赦得原檢帝紀此後未有赦不知會何赦也六年三月赦前此二年永康元年六月赦後此二年今從帝紀天恩曠然而君不出可乎磐曰磐備位方伯古者八州八伯漢州刺史古方伯之任也受罪牢獄夫事有虛實法有是非磐實不辜赦無所除如忍以苟免永受侵辱之恥生為惡吏死為敝鬼乞傳尚詣廷尉以傳車召致廷尉也傳株戀翻又直戀翻足明真偽尚不徵者磐埋骨牢檻終不虛出望塵受枉廷尉以其狀上上時掌翻詔書徵尚到廷尉辭窮受罪以先有功得原八年閏月甲午南宮朔平署火此朔平司馬署也百官志朔平司馬主北宮北門八年段熲擊破西羌進兵窮追展轉山谷間自春及秋無日不戰虜遂敗散凡斬首二萬三千級獲生口數萬人降者萬餘落降戶江翻封熲都鄉侯八年秋七月以太中大夫陳蕃為太尉蕃讓於太常胡廣議郎王暢弛刑徒李膺帝不許暢龔之子也王龔事安帝為公疾其多貴戚豪族下車奮厲威猛大姓有犯或使吏發屋伐樹堙井夷竈破其家業也文翁召父卓茂之徒召讀曰邵皆以溫厚為政流聞後世發屋伐樹將為嚴烈雖欲懲惡難以聞遠離音問那為舊都侯甸之國古者天子之制規方千里以為甸服又其外五百里為侯服光武起於南陽其後謂之南都又於雒陽在侯甸之內故云然三后生自新野賢曰南頓君以上四廟在章陵光烈皇后和帝陰后鄧后並新野人功臣將相繼世而隆愚以為懇懇用刑不知行恩孳孳求姦孳孳猶汲汲也舜舉皋陶不仁者遠論語載子夏之言陶音遙不在用刑暢深納其言更崇寬政教化大行八年八月戊辰初令郡國有田者畝斂稅錢賢曰畝十錢也余據宦者傳張讓等説靈帝斂天下田畝稅十錢非此時事也蓋漢田租三十稅一而計畝斂錢則自此始八年九月丁未京師地震八年冬十月司空周景免以太常劉茂為司空茂愷之子也劉愷以讓國重於時位至公八年郎中竇武融之玄孫也有女為貴人采女田聖有寵於帝帝將立之為后司隸校尉應奉上書曰母后之重興廢所因漢立飛燕胤祀泯絶事見三十三卷哀帝建平元年關雎樂得淑女以配君子韓詩外傳曰婦人有五不娶喪婦之長女不娶為其不受命也世有惡疾不娶棄於天也世有刑人不娶棄於人也亂家女不娶類不正也逆家女不娶廢人倫也遠于願翻竇族良家爭之甚固帝不得已辛巳立竇貴人為皇后拜武為特進城門校尉封槐里侯八年十一月壬子黃門北寺火八年陳蕃數言李膺馮緄劉祐之枉數所解翻下同請加原宥升之爵任言及反覆誠辭懇切以至流涕帝不聽應奉上疏曰夫忠賢武將國之心膂將即亮翻竊見左校弛刑徒馮緄劉祐李膺等誅舉邪臣肆之以法賢曰肆陳也而猥受譖訴遂令忠臣同愆元惡自春迄冬不蒙降恕遐邇觀聽為之歎息為于偽翻夫立政之要記功忘失是以武帝捨張捨作拔安國於徒中賢曰景帝時韓安國為梁大夫坐法抵罪後梁內史缺起徒中為二千石此言武帝誤也事見二十七卷宣帝甘露元年均吉甫之功詩曰顯允方叔征伐玁狁蠻荊來威鄭玄注云方叔先與吉甫征伐玁狁今特征伐蠻荊皆使來服宣王之威緄以順帝時討武陵長沙蠻夷有功故以吉甫比之有不吐茹之節賢曰謂祐奏梁冀弟旻又為司隸校尉權豪畏之也詩曰柔亦不茹剛亦不吐數所角翻遺愛度遼膺為漁陽太守為烏桓校尉皆幽部也度遼將軍則屯並部是其著威遺愛之地王旅未振乞原膺等以備不虞書奏乃悉免其刑久之李膺復拜司隸校尉復扶又翻下同時小黃門張讓弟朔為野王令貪殘無道畏膺威嚴逃還京師野王縣屬河內郡而河內郡屬司部畏膺察舉其罪故逃還京師也合木為柱安足以容人合柱謂兩柱相直兩屋相合處也率吏卒破柱取朔付雒陽獄受辭畢即殺之讓訴冤於帝帝召膺詰以不先請便加誅之意對曰昔仲尼為魯司寇七日而誅少正卯今臣到官已積一旬私懼以稽留為愆不意獲速疾之罪誠自知釁責死不旋踵特乞留五日克寸殄元惡退就鼎鑊始生之願也帝無復言顧謂讓曰此汝弟之罪司隸何愆乃遣出自此諸黃門常侍皆鞠躬屏氣屏必郢翻休沐不敢出宮省帝怪問其故並叩頭泣曰畏李校尉時朝廷日亂綱紀頽阤章乙十一行本阤作弛阤丈爾翻壞也而膺獨持風裁賢曰裁音才代翻以聲名自高士有被其容接者名為登龍門云賢曰以魚為喻也龍門河水所下之口在今絳州龍門縣辛氏三秦紀曰河津一名龍門水險不通魚鱉之屬莫能上江海大魚數千薄集龍門下不得上上則為龍被皮義翻八年徵東海相劉寬為尚書令寬崎之子也劉崎事順帝為司徒崎丘宜翻賢曰東海王強曾孫臻之相也按寬傳云是年自東海相徵為尚書令遷南陽太守典歷三郡雖在倉卒卒讀曰猝未嘗疾言遽色吏民有過但用蒲鞭罰之古者鞭用生皮為之終不加苦每見父老尉以農里之言少年勉以孝悌之訓人皆悅而化之九年九年春正月辛卯朔日有食之詔公卿郡國舉至孝太常趙典所舉荀爽對策曰昔者聖人建天地之中而謂之禮衆禮之中昏禮為首陽性純而能施陰體順而能化以禮濟樂節宣其氣爽言正指帝多內寵也左傳晉侯有疾醫和視之曰疾不可為也是謂疾如蠱非鬼非食惑以喪志公曰女不可近乎對曰節之先王之樂所以節百事也天有六氣過則為災於是乎節宣其氣也施式智翻致老壽之福及三代之季淫而無節陽竭於上陰隔於下故周公之戒曰時亦罔或克壽尚書無逸之辭雀戈孰云其愚何與斯人追欲喪軀誠可痛也賢曰適猶從也言喪身之愚甚於雀戈趾也喪息浪翻從官侍使復在其外從才用翻從官謂後宮有爵秩而常從者侍使則侍后貴人左右而給使令未有爵秩者也復扶又翻下同空賦不辜之民以供無用之女百姓窮困於外陰陽隔塞于內塞悉則翻故感動和氣災異屢臻臣愚以為諸未幸御者一皆遣出使成合讀曰配此誠國家之大福也詔拜郎中九年司隸豫州飢死者什四五至有滅戶者戶謂著戶籍於官者也滅戶則無老無弱皆死於飢無復遺種也九年詔徵張奐為大司農復以皇甫規代為度遼將軍規自以為連在大位欲求退避數上病不見聽數所角翻上時掌翻會友人喪至規越界迎之因令客密告並州刺史胡芳言規亶遠軍營遠于願翻當急舉奏芳曰威明欲避第什塗度遼將軍屯西河界並州刺史所部也皇甫規字威明賢曰言欲歸第避仕宦之途也吾當為朝廷愛才為于偽翻何能申此子計邪遂無所問九年夏四月濟陰東郡濟北平原河水清濟子禮翻九年司徒許栩免五月以太常胡廣為司徒九年庚午上親祠老子於濯龍宮以文罽為壇飾罽居例翻西夷織毛為布曰罽淳金扣器扣去厚翻説文金飾器口設華蓋之坐用郊天樂史言其非禮坐徂臥翻九年鮮卑聞張奐去招結南胸奴及烏桓司叛六月南胸奴烏桓鮮卑數道入塞寇掠緣邊九郡秋七月鮮卑復入塞誘引東羌與共盟詛詛莊助翻於上郡沈氐安定先零諸種種章勇翻共寇武威張掖緣邊大被其毒被皮義翻詔復以張奐為護胸奴中郎將以九卿秩護胸奴中郎將秩比二千石九卿秩中二千石度遼將軍及護烏桓校尉營也九年初帝為蠡吾侯受學於甘陵周福及即位擢福為尚書時同郡河南尹房植有名當朝朝直遙翻鄉人為之謠曰天下規矩房伯武因師獲印周仲進房植字伯武周福字仲進互相譏揣揣初委翻揣度也量也度量其輕重長短而為譏議也遂各樹朋徒漸成尤隙由是甘陵有南北部黨人之議自此始矣汝南太守宗資以范滂為功曹南陽太守成以岑晊為功曹即刃翻晊音質皆委心聽任使之褒善糾違肅清朝府朝郡朝也公卿牧守所居皆曰府朝直遙翻疾惡如讎滂甥李頌素無行中常侍唐衡張衡作儉以屬資行下孟翻屬之欲翻資用為吏滂寢而不召資遷怒捶書佐朱零百官志郡閣下及諸曹各有書佐幹主文書范滂清裁賢曰裁音才代翻裁制也言其清而有制也今日寧受笞而死滂不可違資乃止郡中中人以下莫不怨之於是二郡為謠曰汝南太守范孟博南陽宗資主畫諾孟博范滂字也諾者隨言而應無所違也畫諾猶畫可也弘農成但坐嘯公孝岑晊字也嘯吟也言但坐而吟嘯於郡事無所豫也太學諸生三萬餘人郭泰及潁川賈彪為其冠冠古玩翻與李膺陳蕃王暢更相褒重更工衡翻學中語曰天下模楷李元禮不畏強禦陳仲舉天下俊秀王叔茂李膺字元禮陳蕃字仲舉王暢字叔茂競以臧否相尚否音鄙自公卿以下莫不畏其貶議屣履到門屣履者履不躡跟也宛有富賈張泛者宛於元翻賈音古考異曰陳蕃傳作張汜謝承書作張子禁今從岑晊傳與後宮有親又善雕鏤玩好之物頗以賂遺中官以此得顯位用勢縱橫鏤郎豆翻好呼到翻遺于季翻橫戶孟翻岑晊與賊曹史張牧賊曹主盜賊事既而遇赦竟誅之並收其宗族賓客殺二百餘人後乃奏聞小黃門晉陽趙津貪暴放恣為一縣巨患太原太守平原劉瓆丁度集韻瓆職日翻亦於赦後殺之於是中常侍侯覽使張泛妻上書訟冤宦者因緣譖訴瓆帝大怒徵瓆皆下獄下遐稼翻有司承旨奏瓆罪當棄市山陽太守翟超翟萇伯翻以郡人張儉為東部督郵侯覽家在防東百官志郡有五部督郵監屬縣郡國志防東縣屬山陽郡賢曰故城在今兗州金鄉縣南覽喪母還家喪息浪翻大起塋冢塋音營儉舉奏覽罪而覽伺候遮雀戈雀戈昨結翻後乃作截章竟不上上時掌翻儉遂破覽冢宅藉沒資財具奏其狀復不得御復扶又翻御進也謂其奏不得進也考異曰袁紀儉行部下平陵逢覽母儉按劍怒曰何等女子干督郵此非賊邪使吏卒收覽母殺之追擒覽家屬賓客死者百餘人皆僵尸道路伐其園宅井堙木刊雞犬器物悉無餘苑康傳亦云張儉殺侯覽母按其宗黨或有迸匿太山界者康窮相收掩無得遺脫覽大怨之徵詣廷尉坐徙日南按侯覽傳云覽喪母還家陳蕃傳云翟超沒入侯覽財産坐髡鉗皆不云儉殺其母若果殺之則苑康不止徙日南也侯覽傳又云建寧二年喪母蓋以誅黨人在其年致此誤耳徐璜兄子宣為下邳令暴虐尤甚嘗求故汝南太守李皓女不能得皓古老翻遂將吏卒至皓家載其女歸戲射殺之將即亮翻射而亦翻東海相汝南黃浮聞之收宣家屬無少長悉考之少詩照翻長知兩翻掾史以下固爭浮曰徐宣國賊今日殺之明日坐死足以瞑目矣即案宣罪棄市暴其尸暴步木翻於是宦官訴冤於帝帝大怒超浮並坐髡鉗輸作左校校戶教翻太尉陳蕃司空劉茂共諫請瓆超浮等罪考異曰陳蕃傳又有司徒劉矩按時胡廣為司徒非矩也有司劾奏之茂不敢復言劾戶概翻又戶得翻復扶又翻下同蕃乃獨上疏曰今寇賊在外四支之疾內政不理心腹之患臣寢不能寐食不能飽實憂左右日親忠言日疏內患漸積外難方深難乃旦翻陛下超從列侯繼承天位賢曰言帝以蠡吾侯即位子孫尚恥愧失其先業況乃産兼天下受之先帝而欲懈怠以自輕忽乎誠不愛己不當念先帝得之勤苦邪前梁氏五侯毒遍海內天啓聖意收而戮之賢曰五侯謂胤讓淑忠戟與冀同時誅事見冀傳冀當小平明鑒未遠覆車如昨而近習之權復相扇結小黃門趙津大猾張泛等肆行貪虐姦媚左右前太原太守劉瓆南陽太守成糾而戮之雖言赦後不當誅殺原其誠心在乎去惡去羌呂翻至於陛下有何悁悁説文曰悁悁恚忿也悁縈年翻熒惑聖聽遂使天威為之發怒長知兩翻為于偽翻必加刑譴已為過甚況乃重罰令伏歐刀乎又前山陽太守翟超東海相黃浮奉公不橈疾惡如讎超沒侯覽財物浮誅徐宣之罪並蒙刑坐不逢赦恕覽之從橫從子用翻橫戶孟翻沒財已幸宣犯釁過死有餘辜昔丞相申屠嘉召責鄧通雒陽令董宣折辱公主而文帝從而請之光武加以重賞申屠嘉事見十四卷文帝後二年董宣事見四十三卷光武建武十九年而今左右㣥豎惡傷黨類惡烏路翻妄相交構致此刑譴聞臣是言當復啼訴陛下深宜割塞近習與政之源啼與啼同塞悉則翻與讀曰豫朝直遙翻簡練清高斥黜佞邪如是天和於上地洽於下休禎符瑞豈遠乎哉帝不納宦官由此疾蕃彌甚選舉奏議輒以中詔譴卻長史以下多至抵罪猶以蕃名臣不敢加害平原襄楷詣闕上疏曰臣聞皇天不言以文象設教臣竊見太微天廷五帝之坐而金火罰星揚光其中天文志太微天子庭也五帝之坐也賢曰太白金也熒惑火也天文志曰逆夏令傷火氣罰見熒惑逆秋令傷金氣罰見太白故金火並為罰星也坐徂臥翻天子凶又俱入房心天文志房四星為明堂天子布政之宮也心三星天王正位也中星曰明堂天子位焉前星為太子後星為庶子前年冬大寒殺鳥獸害魚鱉城榜竹柏之葉有傷枯者續漢志曰延熹七年雒陽城旁竹柏葉有傷枯者考異曰帝紀此年十二月書雒城傍竹柏枯傷誤也不出二年天子當之今自春夏以來連有霜雹及大雨雷雹臣作威作福刑罰急刻之所感也太原太守劉瓆南陽太守成志除姦邪其所誅翦皆合人望而陛下受閹豎之譖乃遠加考逮三公上書乞哀瓆等不見採察而嚴被譴讓憂國之臣將遂杜口矣臣聞殺無罪誅賢者禍及三世黃石公三略曰傷賢者殃及三世蔽賢者身當其害達賢者福流子孫疾賢者名不全頻行誅罰梁寇孫鄧並見族滅賢曰梁冀寇榮孫壽鄧萬世等也李雲上書明主所不當諱杜衆乞死諒以感悟聖朝曾無赦宥而並被殘戮天下之人咸知其冤事見上卷二年被皮義翻未有拒諫誅賢用刑太深如今者也昔文王一妻誕致十子史記太姒文王正也其長子伯邑考次武王發次管叔鮮次周公旦次蔡叔度次曹叔振鐸次成叔武次霍叔處次康叔封次聘季載同母兄弟十人未聞慶育宜修德省刑以廣螽斯之祚螽斯言后不妬忌子孫衆多也及古帝王未有河清臣以為河者諸侯位也孝經援神契曰五嶽視三公四漢視諸侯屬陽濁者屬陰河當濁而反清者陰欲為陽諸侯欲為帝也京房易傳曰河水清天下平今天垂異地吐妖人癘疫三者並時而有河清猶春秋麟不當見而見孔子書之以為異也公羊傳西狩獲麟有以告者孔子曰孰為來哉孰為來哉蓋以為異也見賢遍翻極盡所言書奏不省間讀曰間省悉井翻十餘日復上書曰臣聞殷紂好色妲己是出好呼到翻下同殷紂冒色有蘇氏以妲己女之妲當割翻葉公好龍真龍遊廷葉公子高好龍天龍聞而降之窺頭於牖天刑之人謂已受熏腐之刑得罪於天者也兼倍常寵係張係作繼嗣未兆豈不為此為于偽翻又聞宮中立黃老浮屠之祠賢曰浮屠即佛陀聲之轉耳謂佛也貴尚無為好生惡殺省欲去奢惡烏路翻去羌呂翻今陛下耆欲不去耆讀曰嗜殺罰過理既乖其道豈獲其祚哉浮屠不三宿桑下不欲久生恩愛精之至也賢曰言浮屠之人寄桑下者不經三宿便即移去示無愛戀之心也乃能成道今陛下淫女豔婦極天下之麗甘肥飲美單天下之味單與殫同書上即召入詔尚書問狀楷言古者本無宦臣武帝末數遊後宮始置之耳數所角翻尚書承旨承旨謂承宦官風指也楷不正辭理而違背經藝假借星宿背蒲妹翻宿音秀造合私意合音閣牽合也誣上罔事請下司隸正楷罪法下遐稼翻收送雒陽獄帝以楷言雖激切然皆天文恆象之數故不誅猶司寇論刑司寇二歲刑也臣民雖有習浮屠術者而天子未之好至帝始篤好之好呼到翻常躬自禱祠由是其法浸盛故楷言及之符節令汝南蔡衍百官志符節令秩六百石為符節臺率主符節事屬少府言甚切厲亦坐免官瓆竟死獄中瓆素剛直有經術知名當時故天下惜之岑晊張牧逃竄獲免晊之亡也親友競匿之賈彪獨閉門不納時人望之賢曰望怨也余謂望責望也傳言相時而動無纍後人左傳之文相息亮翻纍力瑞翻要一遙翻自遺其咎遺于季翻吾已不能奮戈相待反可容隱之乎於是咸服其裁正彪嘗為新息長新息縣屬汝南郡賢曰今豫州縣長知兩翻多不養子彪嚴為其制與殺人同罪城南有盜劫害人者北有婦人殺子者彪出按驗掾吏欲引南引南者引車南行者賊寇害人此則常理母子相殘逆天違道遂驅車北行按致其罪城南賊聞之亦面縛自首首式救翻數年間人養子者以千數曰此賈父所生也皆名之為賈九年河南章乙十六行本南作內乙十一行本同孔本同張校同張成善風角賢曰風角謂候四方四隅之風以占吉凶也教子殺人司隸李膺督促收捕既而逢宥獲免膺愈懷憤疾竟按殺之考異曰黨錮傳云膺為河南尹按膺此事非作尹時也伎渠綺翻帝亦頗訊其占訊問也告膺等養太學遊士交結諸郡生徒更相驅馳共為部黨誹訕朝廷更工衡翻説文曰誹謗也蒼頡篇誹非也疑亂風俗考異曰袁紀作牢順今從范書班下郡國下遐稼翻下同逮捕黨人布告天下使同忿疾案經三府案文案也以考驗為義今所按者皆海內人譽憂國忠公之臣此等猶將十世宥也左傳晉范宣子囚叔向祁奚見宣子曰謀而鮮過惠訓不倦者叔向有焉猶將十世宥之以勸能者掠音亮不肯平署賢曰平署猶連署也遂下膺等於黃門北寺獄時宦官專權置黃門北寺獄自武帝以來中都官詔獄所未有也下遐嫁翻太僕潁川杜密御史中丞陳翔及陳實范滂之徒二百餘人或逃遁不獲皆懸金購募使者四出相望陳實曰吾不就獄衆無所恃乃自往請囚范滂至獄獄吏謂曰凡坐繫者皆祭皋陶滂曰皋陶古之直臣知滂無罪將理之於帝賢曰帝謂天也陶音遙祭之何益衆人由此亦止陳蕃復上書極諫復扶又翻帝諱其言切託以蕃辟召非其人策免之考異曰袁紀李膺下獄在九月范書蕃免在七月蕃傳上書極諫曰膺等或禁錮閉隔或死徙非所云云按膺等赦出在明年六月再下獄死徙在建寧二年十月蕃既以此年七月免則蕃傳所云疑非蕃書也又袁紀無陳蕃免事靈帝即位以太尉陳蕃為太傅按蕃免後有太尉周景蓋袁紀誤也時黨人獄所染逮者皆天下名賢染謂獄辭所汙染也逮謂連及也自以西州豪桀恥不得與與讀曰預乃自上言臣前薦故大司農張奐是附黨也又臣昔論輸左校時太學生張鳳等上書訟臣是為黨人所附也薦張奐事見上卷六年張鳳上書事見五年朝廷知而不問杜密素與李膺名行相次行下孟翻下同時人謂之李杜故同時被繫密嘗為北海相行春到高密百官志凡郡國守相常以春行所主縣勸民農桑振救乏絶高密縣屬北海國知其異器即召署郡職遂遣就學卒成大儒卒子恤翻後密去官還家每謁守令多所陳託同郡劉勝亦自蜀郡告歸鄉里閉門掃軌賢曰軌車迹也言絶人事太守王昱謂密曰劉季陵清高士劉勝字季陵密知昱以激己對曰劉勝位為大夫見禮上賓位為大夫謂在朝列也見禮上賓謂郡守接遇之也聞惡無言隱情惜己自同寒蟬賢曰寒蟬謂寂默也楚辭曰悲哉秋之為氣也蟬寂漠而無聲今志義力行之賢而密達之違道失節之士而密糾之使明府賞刑得中令問休揚不亦萬分之一乎昱慚服待之彌厚九年九月以光祿勳周景為太尉九年司空劉茂免冬十二月以光祿勳汝南昌酆為司空姓譜宣以諡為氏九年以越騎校尉竇武為城門校尉武在位多辟名士清身疾惡禮賂不通妻子衣食裁充足而已得兩宮賞賜兩宮謂天子及皇后丐居太翻與也施式豉翻由是衆譽歸之九年胸奴烏桓聞張奐至皆相率還降降戶江翻凡二十萬口奐但誅其首惡餘皆慰納之唯鮮卑出塞去朝廷患檀石槐不能制遣使持印綬封為王欲與和親檀石槐不肯受而寇抄滋甚抄楚少翻自分其地為三部從右北平以東至遼東接夫餘濊貊二十餘邑為東部夫音扶濊音穢貊莫百翻從右北平以西至上谷十餘邑為中部從上谷以西至敦煌烏孫二十餘邑為西部各置大人領之觀此則夷狄亦有邑居矣檀石槐蓋盡有胸奴故地敦徒門翻王崇武標點容肇祖聶崇岐覆校
