body:
  text: 資治通鑑卷第二百六十一端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀七十七昭宗聖穆景文孝皇帝中之上乾寧四年乾寧四年丁巳八九七乾寧四年春正月甲申韓建奏防城將張行思等張行思華州防城將也將即亮翻皆嗣王也睦韶韓代宗之後彭肅宗之後陳文宗之後史皆逸其名及其世系劫車駕幸河中建惡諸王典兵惡烏路翻故使行思等告之上大驚召建諭之建稱疾不入令諸王詣建自陳建表稱諸王忽詣臣理所不測事端建言諸王為變事出不測也不應與諸王相見又稱諸王當自避嫌疑不可輕為舉措陛下若以友愛含容請依舊制令歸十六宅妙選師傅教以詩書不令典兵預政援開元天寶舊制不令諸王出閣乞散彼烏合之兵用光麟趾之化詩序曰關雎之化行雖衰世之公子皆信厚如麟趾之時引麾下精兵圍行宮以兵脅君上時掌翻上不得已是夕詔諸王所領軍士並縱歸田里諸王勒歸十六宅其甲兵並委韓建收掌建又奏陛下選賢任能足清禍亂何必別置殿後四軍四軍即安聖捧宸保寧宣化也置見上卷上年乖無偏無黨之道書曰無偏無黨王道蕩蕩韓建安識書語李巨川教之耳宜其不免於誅也一本厚下更有有字平居猶思禍變臨難必不為用難乃旦翻而使之張弓挾刃密邇皇輿臣竊寒心乞皆罷詔章十二行本詔上有遣字乙十一行本同張校同孔本有遣字無亦字亦從之於是殿後四軍二萬餘人悉散天子之親軍盡矣捧日都頭李筠石門扈從功第一石門扈從事見上卷二年從才用翻復扶又翻大雲橋在華州大雲寺前武后時令天下諸州各置大雲寺以藏大雲經著受命之符也建又奏玄宗之末永王璘暫出江南遽謀不軌事見肅宗紀至德元載二載光啓中朱玫亂常皆援立宗支以繫人望謂吐蕃立廣武王承宏朱玫立襄王熅也事各見前紀援于元翻乞皆召還指言延王戒丕等諸方士出入禁庭眩惑聖聽宜皆禁止無得入宮指言許巖士等建既幽諸王於別第知上意不悅乃奏請立德王為太子欲以解之丁亥詔立德王祐為皇太子仍更名裕更工衡翻考異曰勤王録曰公以儲副之設國之大本上表云云敕宜從允時正月十一日也當四日之間而儲君奉冢祀宗室歸藩邸蓬頭突鬢之士不入於禁門文成五利之徒不陳其左道君父開悟遐邇詠歌人不震驚市無易肆公之力也李巨川著書矯誣善惡乃至於此今從實録乾寧四年龐師古葛從周併兵攻鄆州朱瑄兵少食盡不復出戰但引水為深壕以自固辛卯師古等營於水西南命為浮梁癸巳潛決濠水丙申浮梁成師古夜以中軍先濟瑄聞之棄城奔中都按九域志中都縣在鄆州東南六十里野人執瑄及妻子以獻僖宗中和二年朱瑄得鄆州至是而亡考異曰薛居正五代史梁太祖紀辛卯營于濟水之次龐師古令諸將撤木為橋乙未夜師古以中軍先濟朱瑄棄壁夜走葛從周擒瑄並妻男以獻按濟水自王莽時大旱不復能絶河而南自是河南無濟水編遺録曰五月遣騎於鄆州軍前追從周徑往洹水董師以代侯言師古留攻鄆梁太祖實録四年正月復以洹水之師大舉伐鄆十五日辛卯營其西南河外龐師古命諸將撤木為橋以圖宵濟癸巳前軍以心膂百人盜決河口甲午浮橋集水次乙未夜師古中軍先濟聲振壁內朱瑄聞之棄壁走編遺録四年正月己卯朱瑄兵少糧盡不敢出戰然深溝高壘難越也從周師古乃取清河內小舟採野葛草茅索之以為巨纜乃於其牆南建浮橋丙申功就我師渡橋朱瑄奔遁皆不云濟水師古去年三月已敗鄆兵于馬頰追至西門據故洛亭子為寨乙未夜先濟蓋鄆城下清河水疑朱瑄引之以環城固守故師古等為浮橋以濟師河既可決明非自然之水也舊紀癸未龐師古陷鄆州朱瑄與妻榮氏潰圍走瑄至中都為野人所殺榮氏俘於軍新紀丙申全忠陷鄆州實録二月丙午朔陷鄆州瑄至中都為亂兵所殺妻榮至汴為尼據薛史辛卯營於濟水則癸未鄆未破也新紀云丙申陷鄆實録二月蓋約奏到今從編遺録新紀乾寧四年己亥罷孫偓鳳翔四面行營節度等使赦李茂貞故罷鳳翔四面行營按方鎮表光化元年更延州保塞節度為寧塞節度乾寧四年錢鏐使行軍司馬杜稜救婺州安仁義移兵攻睦州不克而還安仁義攻婺州見上卷上年還從宣翻又如字乾寧四年朱全忠入鄆州以龐師古為天平留後考異曰舊紀梁太祖實録薛居正五代史師古傳皆云師古為鄆州留後編遺録薛史梁紀皆云友裕按編遺録三月丙子以友裕為鄆州留後師古為徐州留後蓋初以師古守鄆州後以友裕代之而徙師古於徐州也朱瑾留大將康懷貞守兗州與河東將史儼李承嗣掠徐州之境以給軍食九域志兗州南一百一十里即徐州界遣葛從周將兵襲兗州懷貞聞鄆州已失守汴兵奄至遂降二月戊申從周入兗州獲瑾妻子朱瑾還無所歸帥其衆趨沂州刺史尹處賓不納走保海州降戶江翻帥讀曰率趨七喻翻九域志兗州三百四十五里東至沂州沂古琅邪也沂州東至海州一百八十里為汴兵所逼與史儼李承嗣擁州民渡淮奔楊行密光啓二年朱瑾取兗州至是而敗表瑾領武寧節度使領遙領也全忠納瑾之妻引兵還張夫人逆於封丘九域志封丘縣在汴州北六十里夫人請見之瑾妻拜夫人答拜且泣曰兗鄆與司空同姓約為兄弟以小故恨望起兵相攻使吾姒辱於此他日汴州失守吾亦如吾姒之今日乎姒詳里翻長婦曰姒又兄弟之妻相呼曰姒互相尊稱之辭也全忠乃送瑾妻於佛寺為尼斬朱瑄於汴橋於是鄆齊曹棣兗沂密徐宿陳許鄭滑濮皆入于全忠鄆齊曹棣天平軍兗沂密泰寧軍徐宿感化軍陳許忠武軍鄭滑濮宣義軍此五鎮之地也亦服於全忠李存信在魏州聞兗鄆皆陷引兵還淮南舊善水戰不知騎射及得河東兗鄆兵軍聲大振史儼李承嗣皆河東驍將李克用深惜之遣使間道詣楊行密請之間古莧翻行密許之亦遣使詣克用修好好呼到翻乾寧四年戊午王建遣邛州刺史華洪彭州刺史王宗祐將兵五萬攻東川邛渠容翻華戶化翻以戎州刺史王宗謹為鳳翔西面行營先鋒使敗鳳翔將李繼徽等於玄武玄武漢氐道縣晉改曰玄武唐初屬益州時屬梓州宋朝改曰中江在梓州西九十里敗補邁翻名崇本茂貞之假子也乾寧四年己未赦天下考異曰實録降德音曲赦天下云德音即非赦既云曲赦即不及天下實録誤也乾寧四年上饗行廟時駐蹕華州太常禮院請權立行廟以備告饗乾寧四年庚申王建以決雲都知兵馬使王宗侃為應援開峽都指揮使將兵八千趨渝州決勝都知兵馬使王宗阮為開江防送進奉使將兵七千趨瀘州辛酉章十二行本酉作未乙十一行本同宗侃取渝州降刺史牟崇厚癸酉宗阮拔瀘州斬刺史馬敬儒峽路始通渝瀘皆東川巡屬王建志在廣地假通峽路進奉以為名耳趨七喻翻鳳翔將李繼昭救梓州留偏將守劍門西川將王宗播擊擒之乾寧四年乙亥門下侍郎同平章事孫偓罷守本官中書侍郎同平章事朱朴罷為祕書監朴既秉政所言皆不效朱朴自詭月餘可致太平見上卷上年太子詹事馬道殷以天文將作監許巖士以醫得幸於上韓建誣二人以罪而殺之且言偓朴與二人交通故罷相馬道殷許巖士在上左右二相因之以白事此必有之乾寧四年詔以楊行密為江南諸道行營都統以討武昌節度使杜洪按新書洪傳洪附朱全忠絶東南貢獻路命楊行密討之者以此乾寧四年張佶克邵州擒蔣勛潭兵攻蔣勛事始上卷三年正月佶巨乙翻乾寧四年三月丙子朱全忠表曹州刺史葛從周為泰寧留後朱友裕為天平留後龐師古為武寧留後朱全忠表以三鎮授三將以樹黨此時蓋復改感化為武寧乾寧四年保義節度使王珙攻護國節度使王珂珂求援於李克用珙求援於朱全忠宣武將張存敬楊師厚敗河中兵於猗氏南河東將李嗣昭敗陝兵於猗氏又敗之於張店遂解河中之圍敗補邁翻陝失冉翻師厚斤溝人九域志潁州萬壽縣有斤溝鎮萬壽唐汝陰縣之百尺鎮也宋朝開寶六年置縣克用弟克柔之假子也乾寧四年更名感義軍曰昭武更工衡翻治利州以前靜難節度使蘇文建為節度使難乃旦翻乾寧四年夏四月以同州防禦使李繼瑭為匡國節度使考異曰實録賜同州號匡國軍以防禦使李繼瑭為匡國節度使按新方鎮表乾寧二年賜同州號匡國軍王行約已嘗為匡國節度使蓋行約死繼瑭但為防禦使今始復舊名耳茂貞之養子也乾寧四年以右諫議大夫李洵為兩川宣諭使和解王建及顧彥暉乾寧四年辛亥錢鏐遣顧全武等將兵三千自海道救嘉興己未至城下擊淮南兵大破之淮南圍嘉興始上卷二年乾寧四年杜洪為楊行密所攻求救於朱全忠全忠遣其將聶金掠泗州聶尼輒翻姓也朱友恭攻黃州行密遣右黑雲都指揮使馬珣等救黃州黃州刺史瞿章聞友恭至棄城擁衆南保武昌寨武昌漢古縣唐屬鄂州九域志在州東北一百八十里今置壽昌軍乾寧四年癸亥兩浙將顧全武等破淮南十八營虜淮南將士魏約等三千人淮南將田頵屯驛亭埭埭徒耐翻兩浙兵乘勝逐之甲戌頵自湖州奔還自嘉興退軍取道湖州還宣州敗補邁翻頵衆死者千餘人乾寧四年韓建惡刑部尚書張禕等數人皆誣奏貶之惡烏路翻褘吁韋翻考異曰實録貶刑部尚書張禕趙崇蘇循等為衡州司馬韓建惡之誣奏貶焉禕等必不皆為刑部尚書皆貶衡州司馬實録誤也乾寧四年五月加奉國節度使崔洪同平章事乾寧四年辛巳朱友恭為浮梁於樊港武昌西三里有樊山山下有樊溪注于江謂之樊口朱友恭蓋跨江為浮梁抵樊口以攻武昌也壬午拔之執瞿章遂取黃州考異曰薛居正五代史梁紀五月丁丑朱友恭遣使上言大破淮寇於武昌收復黃鄂二州新紀壬午全忠陷黃州刺史瞿章死之朱友恭傳云翟章十國紀年作瞿章吳録云執刺史瞿章當可據乾寧四年丙戌王建以節度副使張琳守成都張琳王建之腹心建之攻陳敬瑄也亦使之守邛州更華洪姓名曰王宗滌華洪纍戰有功王建於是養以為子以收其力用然殺洪之心蓋已萌於此時矣華戶化翻乾寧四年六月己酉錢鏐如越州受鎮東節鉞乾寧四年李茂貞表王建攻東川連兵纍歲不聽詔命王建豈特攻東川哉李茂貞山南巡屬諸州建取之亦多矣力不能制欲挾天子之令以臨之甲寅貶建南州刺史新志武德三年開黔南蠻置南州宋白曰南州戰國時為巴國界秦則巴郡之地漢為江州之境唐武德三年割渝州之東界置南州乙卯以茂貞為西川節度使以覃王嗣周為鳳翔節度使乾寧四年癸亥王建克梓州南寨執其將李繼寧丙寅宣諭使李洵至梓州四月李洵受命而使六月始至己巳見建于張杷寨建指執旗者曰戰士之情不可奪也乾寧四年覃王赴鎮李茂貞不受代李茂貞之狡悍豈肯以鳳翔授人涉險而爭蜀邪乾寧四年置寧遠軍於容州以李克用大將蓋寓領節度使李克用之平王行瑜也蓋寓以功領容管觀察使今升領節度使乾寧四年秋七月加荊南節度使成汭兼侍中乾寧四年韓建移書李茂貞茂貞解奉天之圍覃王歸華州乾寧四年以天雄節度使李繼徽為靜難節度使李繼徽自秦州徙邠州邠寧亦為李茂貞有矣難乃旦翻乾寧四年庚戌錢鏐還杭州自越還杭乙未拔松江松江在蘇州南四十里淮南立寨以守之戊戌拔無錫無錫漢縣唐屬常州九域志在州東九十一里辛丑拔常熟華亭宋白曰常熟縣後漢至吳為司鹽都尉晉置南沙縣梁置常熟縣今崑山縣東一百三十里常熟故城是也九域志在蘇州北七十五里天寶十載分嘉興置華亭縣屬蘇州在州西南今屬秀州乾寧四年初李克用取幽州見二百五十九卷乾寧元年留戍兵及腹心將十人典其機要租賦供軍之外悉輸晉陽及上幸華州克用徵兵於仁恭又遺成德節度使王鎔義武節度使王郜書遺唯季翻郜音告欲與之共定關中奉天子還長安仁恭辭以契丹入寇洪遵曰契丹之讀如喫惟新唐書有音今從欺訖翻須兵扞禦請俟虜退然後承命克用屢趣之趣讀曰促使者相繼數月兵不出克用移書責之仁恭抵書於地慢罵囚其使者欲殺河東戍將戍將遁逃獲免克用留兵戍幽州見上卷乾寧二年八月自將擊仁恭為克用計者先舉河東之甲以勤王事定之後然後移兵臨燕以問罪劉仁恭安所逃其死乎不知出此遽興忿兵其敗宜矣乾寧四年上欲幸奉天親討李茂貞令宰相議之宰相切諫乃止議者率謂昭宗忿不思難然亦可悲矣乾寧四年延王戒丕還自晉陽戒丕使晉陽見上卷上年自陛下即位以來與近輔交惡近輔邠岐同華也凶徒樂禍樂音洛致鑾輿不安比者臣奏罷兵權比毗至翻近也實慮不測之變今聞延王覃王尚苞陰計願陛下聖斷不疑斷丁亂翻制於未亂周書云制治於未亂建奏引之李巨川之辭也韓建欲殺諸王久矣憚李克用故未敢發延王既還知克用之兵不能至故決請殺之何至於是數日不報建乃與知樞密劉季述矯制發兵圍十六宅諸王被髮或緣垣或升屋呼章十二行本升作登呼上有或升木三字乙十一行本同張校同云無注本脫誤與吳本同曰宅家救兒被皮義翻呼火故翻唐末宮中率稱天子曰宅家建擁通沂睦濟韶彭韓陳覃延丹十一王至石隄谷盡殺之石隄谷在華州西歐陽修集古録云殽坑君祠今謂之五部神廟其像有石隄西戍樹谷五樓先生東臺御史王剪將軍莫曉其義其碑云石隄樹谷南通商雒又云前世通利吏民興貴有御史大夫將軍牧伯故為立祠以報其功乃知五部之號自漢有之如此則石隄者石隄谷之神五部神之一也唐韓建殺諸王於石隄谷蓋此谷也殽坑神祠在華州鄭縣考異曰舊紀是日通覃以下十一王並其侍者皆為建兵所擁至石隄谷無長少皆殺之唐補紀曰六宅諸王准前商量請置殿後都韓建怨怒進狀爭論與諸王互說短長上乃縛韓王克良已下十人送韓建府建以棘刺圍於大廳經宿不與相見軍吏諫遂請諸王歸宮散卻殿後都新紀八月韓建殺通王滋沂王湮韶王彭王嗣韓王嗣陳王嗣覃王嗣周嗣延王戒丕嗣丹王允按舊紀韓建奏睦王濟王韶王通王彭王韓王儀王陳王八人新宗室傳初帝遣嗣延王戒丕嗣丹王允往見李克用又有覃王嗣周則是十一人新紀傳儀作沂按昭宗子禋封沂王不應更封宗室舊紀儀王恐可據乾寧四年貶禮部尚書孫偓為南州司馬祕書監朱朴先貶夔州司馬再貶郴州司戶考異曰實録朴貶郴州司戶薛廷圭鳳閣書詞有朴自祕書監責除蜀王傅分司東都制云苞藏莫顧於朝綱進見不由於相府復云猶希顧問之間來撓澄清之化又貶渠州司馬制云爭臣條奏憲府極言指陳負固之謀忿嫉崇姦之計與此稍異今從實録何迎驟遷至右諫議大夫至是亦貶湖州司馬何迎薦朱朴見上卷上年乾寧四年鍾傳欲討吉州刺史襄陽周琲琲帥其衆奔廣陵琲部免翻又蒲昧翻帥讀曰率乾寧四年王建與顧彥暉五十餘戰九月癸酉朔圍梓州蜀州刺史周德權言於建曰公與彥暉爭東川三年士卒疲於矢石百姓困於輸挽挽音晚東川㣥盜多據州縣彥暉懦而無謀欲為偷安之計皆啖以厚利啖徒濫翻恃其救援故堅守不下今若遣人諭賊帥以禍福帥所類翻來者賞之以官不服者威之以兵則彼之所恃反為我用矣建從之彥暉勢益孤德權許州人也乾寧四年丁丑李克用至安塞軍安塞軍在蔚州之東媯州之西新志幽州丁零川西南有安塞軍辛巳攻之幽州將單可及引騎兵至單上演翻姓也又都寒翻亦姓也元魏孝文帝改代北內入諸渴單氏為單氏克用方飲酒前鋒白賊至矣克用醉曰仁恭何在對曰但見可及輩克用瞋目曰瞋昌真翻可及輩何足為敵亟命擊之是日大霧不辨人物幽州將楊師侃伏兵於木瓜澗據新書木瓜澗亦在蔚州界失亡太半史言李克用輕敵又不得天時故敗幽州兵解去史言克用敗而得免者亦天也責大將李存信等曰吾以醉廢事汝曹何不力爭邢州之叛莘縣之潰木瓜澗之敗皆李存信之罪也克用終親任之可謂失刑矣乾寧四年湖州刺史李彥徽欲以州附於楊行密去年楊行密表彥徽知湖州故欲附之彥徽奔廣陵都指揮使沈攸以州歸錢鏐錢鏐自此遂有湖州乾寧四年以彰義節度使張璉為鳳翔西北行營招討使以討李茂貞乾寧四年復以王建為西川節度使同平章事加義武節度使王郜同平章事削奪新西川節度使李茂貞官爵復姓名宋文通始以李茂貞之請而討王建既而又以茂貞拒命赦王建而討茂貞朝廷號令朝出而暮改諸侯其孰尊而信之皇威不振自取之也李茂貞賜姓名見二百五十六卷光啓二年乾寧四年朱全忠既得兗鄆甲兵益盛乃大舉擊楊行密遣龐師古以徐宿宋滑之兵七萬壁清口清口即今之清河口趨七喻翻下同葛從周以兗鄆曹濮之兵壁安豐將趨壽州安豐漢六縣故城在縣南後漢置安豐縣至唐屬壽州九域志曰安豐縣在州東南六十餘里蓋唐之壽州治壽春縣即六朝壽陽之地五代之末周世宗克壽州徙治下蔡故宋朝安豐在壽州東南淮南震恐乾寧四年匡國節度使李繼瑭聞朝廷討李茂貞而懼韓建復從而搖之復扶又翻繼瑭奔鳳翔冬十月以建為鎮國匡國兩軍節度使韓建始兼有同華乾寧四年壬子知遂州侯紹帥衆二萬乙卯知合州王仁威帥衆千人戊午鳳翔李繼溥以援兵二千皆降於王建帥讀曰率建攻梓州益急庚申顧彥暉聚其宗族及假子共飲遣王宗弼自歸于建王宗弼為東川兵所擒事見上卷二年命其假子瑤殺己及同飲者然後自殺僖宗光啓三年顧彥朗得東川傳至弟彥暉至是而滅乾寧二年王建始攻東川蓋三年而後克之建命王宗綰分兵徇昌普等州以王宗滌為東川留後乾寧四年劉仁恭奏稱李克用無故稱兵見討本道大破其黨于木瓜澗請自為統帥以討克用帥所類翻詔不許又遺朱全忠書遺唯季翻全忠奏加仁恭同平章事朝廷從之仁恭又遣使謝克用陳去就不自安之意克用復書略曰今公仗鉞控兵理民立法擢士則欲其報德選將則望彼酬恩己尚不然人何足信克用言仁恭背己人亦將背之也將即亮翻嫌忌生於屏帷持干將而不敢授人捧盟盤而何詞著誓乾寧四年甲子立皇子祕為景王祚為輝王祺為祁王乾寧四年加彰義節度使張璉同平章事乾寧四年楊行密與朱瑾將兵三萬拒汴軍於楚州別將張訓自漣水引兵會之乾寧二年楊行密始取漣水令張訓守之龐師古營於清口或曰營地汙下不可久處不聽汙烏瓜翻處昌呂翻師古恃衆輕敵居常奕棊朱瑾壅淮上流欲灌之或以告師古師古以為惑衆斬之十一月癸酉瑾與淮南將侯瓚瓚才旱翻將五千騎潛渡淮用汴人旗幟自北來趣其中軍趣七喻翻張訓踰柵而入士卒蒼黃拒戰淮水大至汴軍駭亂行密引大軍濟淮與瑾等夾攻之汴軍大敗斬師古及將士首萬餘級餘衆皆潰葛從周營於壽州西北壽州團練使朱延壽擊破之退屯濠州聞師古敗奔還行密瑾延壽乘勝追之及於淠水水經注淠水出廬江潛縣西南霍山東北又東北過六縣東又西北過安豐縣故城西北入于淮類篇淠必至切水名在弋陽按今淠河在來遠鎮西十里來遠鎮即東正陽也東至壽州二百里淮南兵擊之殺溺殆盡從周走免遏後都指揮使牛存節棄馬步鬬諸軍稍得濟淮凡四日不食會大雪汴卒緣道凍餒死還者不滿千人全忠聞敗亦奔還行密遺全忠書曰龐師古葛從周非敵也公宜自來淮上決戰遺于季翻行密大會諸將謂行軍副使李承嗣曰始吾欲先趣壽州趣七喻翻副使云不如先向清口師古敗從周自走今果如所料賞之錢萬緡賞其勝算先定行密待承嗣及史儼甚厚第舍姬妾咸選其尤者賜之故二人為行密盡力屢立功竟卒於淮南為于僞翻卒子恤翻史言楊行密能用人安仁義亦沙陀也行密待之非不厚而終於叛行密狼子野心固自有難馴養者行密由是遂保據江淮之間全忠不能與之爭乾寧四年戊寅立淑何氏為皇后后東川人生德王輝王乾寧四年威武節度使王潮弟審知為觀察副使有過潮猶加捶撻捶止蕊翻審知無怨色潮寢疾捨其子延興延虹延豐延休命審知知軍府事十二月丁未潮薨審知以讓其兄泉州刺史審邽審邽以審知有功辭不受審知自稱福建留後表于朝廷乾寧四年壬戌王建自梓州還戊辰至成都是歲南詔驃信舜化有上皇帝書函及督爽牒中書木夾年號中興朝廷欲以詔書報之王建上言南詔小夷不足辱詔書臣在西南彼必不敢犯塞從之黎雅間有淺蠻曰劉王郝王楊王各有部落黎雅西南大山長谷皆蠻居之所在深遠而三王部落居近漢界故曰淺蠻使覘南詔亦受南詔賂詗成都虛實繒慈陵翻覘丑廉翻又丑豔翻詗古迥翻又翾正翻每節度使到官三王帥酋長詣府帥讀曰率酋慈由翻長知兩翻節度使自謂威德所致表于朝廷而三王陰與大將相表裏節度使或失大將心則教諸蠻紛擾先是節度使多文臣先悉薦翻不欲生事故大將常藉此以邀姑息而南詔亦憑之屢為邊患及王建鎮西川絶其舊賜斬都押牙山行章以懲之山行章陳田舊將王建因其與淺蠻表裏而斬之既以威示諸蠻亦除舊務盡不置鄣候不戍一卒謂邛崍關以南也其後遣王宗播擊南詔三王漏泄軍事召而斬之史言安邊之術惟洞知近塞蕃落情僞而折其姦則外夷不敢有所侮而動乾寧四年右拾遺張道古上疏稱國家有五危二亂昔漢文帝即位未幾明習國家事幾居豈翻見十三卷漢文帝元年今陛下登極已十年帝文德元年踐阼至此十年若以即位踰年改元數之則九年太宗內安中原外開四夷海表之國莫不入臣今先朝封域日蹙幾盡幾居依翻臣雖微賤竊傷陛下朝廷社稷始為姦臣所弄終為賊臣所有也漢唐之亡誠如張道古之言貶道古施州司戶宋白曰施州漢巫縣地吳大帝分巫縣立沙渠縣後周建德三年於此置施州唐因之舊志施州京師南二千七百九里宣示諫官昭宗處艱危之中猶罪言者其亡宜矣青州人也張道古見於通鑑者惟此事著其州里蓋傷之光化元年戊午八九八是年八月還京方改元乾寧四年春正月兩浙江西武昌淄青各遣使詣闕請以朱全忠為都統討楊行密兩浙錢鏐江西鍾傳武昌杜洪淄青王師範皆憚楊行密之強而黨附朱全忠者也乾寧四年加平盧節度使王師範同平章事淄青平盧軍乾寧四年以兵部尚書劉崇望同平章事充東川節度使以昭信防禦使馮行襲為昭信節度使方鎮表光化元年置昭信防禦使治金州與此異乾寧四年上下詔罪己息兵復李茂貞姓名官爵應諸道討鳳翔兵皆罷之韓建之志也乾寧四年壬辰河中節度使王珂親迎於晉陽迎魚敬翻李克用遣其將李嗣昭守河中乾寧四年李茂貞韓建皆致書於李克用言大駕出幸纍年乞修和好好呼到翻同獎王室兼乞丁匠助修宮室克用許之乾寧四年初王建攻東川顧彥暉求救於李茂貞茂貞命將出兵救之事見上詐稱改過與韓建共翼戴天子及聞朱全忠營洛陽宮纍表迎車駕茂貞韓建懼請修復宮闕奉上歸長安詔以韓建為修宮闕使考異曰實録建以行宮卑庳無眺覽之所表獻城南別墅建初修南莊起樓觀疏池沼欲為南內行廢立之事其叔父豐見其跋扈謂建曰汝陳許間一民乘時危亂位至方鎮不能感君父之惠而欲以同華兩州百里之地行廢立覆族在旦莫矣吾不如先自裁免為汝所纍由是建稍弭其志及李茂貞表請助營宮苑又聞朱全忠繕治洛陽纍表迎駕建懼故急營葺長安率諸道助役而又親程功焉按建若欲廢立何必先營南內今不取建使都將蔡敬思督其役既成二月建自往視之乾寧四年錢鏐請徙鎮海軍於杭州從之鎮海軍本治潤州今徙軍額於杭州乾寧四年復以李茂貞為鳳翔節度使乾寧四年三月己丑以王審知充威武留後乾寧四年朱全忠遣副使萬年韋震入奏事求兼鎮天平朝廷未之許震力爭之穆敬以後威令已不振然藩鎮所遣奏事官不敢力爭於朝也以全忠為宣武宣義天平三鎮節度使全忠以震為天平留後以前台州刺史李振為天平節度副使按歐史李振傳振為金吾衛將軍拜台州刺史盜起浙東不果行乃西歸過汴以策干朱全忠全忠留之遂為全忠用抱真之曾孫也代德之間李抱真鎮昭義有大功乾寧四年淮南將周本救蘇州兩浙將顧全武擊破之淮南將秦裴以兵三千人拔崑山而戍之崑山漢婁縣地梁分婁縣置信義縣又分信義置崑山縣取縣界崑山為名唐屬蘇州九域志在州東七十里乾寧四年以潭州刺史判湖南軍府事馬殷知武安留後時湖南管內七州賊帥楊師遠據衡州唐世旻據永州蔡結據道州陳彥謙據郴州魯景仁據連州路振九國志唐旻蔡結皆以郡人聚兵據郡陳彥謙桂陽人殺刺史黃嶽據郴州魯景仁本從黃巢以病留連州遂據之帥所類翻郴丑林翻為馬殷盡取諸州張本乾寧四年義昌節度使盧彥威性殘虐又不禮於鄰道與盧龍節度使劉仁恭爭鹽利仁恭遣其子守文將兵襲滄州彥威棄城挈家奔魏州羅弘信不納乃奔汴州光啓元年盧彥威得滄景至是而亡以守文為義昌留後仁恭兵勢益盛併幽滄兩鎮之兵故勢益盛有併吞河朔之志為守文請旌節為于僞翻下為吾同朝廷未許會中使至范陽仁恭語之曰語牛倨翻旌節吾自有之但欲得長安本色耳何為纍章見拒為吾言之其悖慢如此悖蒲內翻又蒲沒翻乾寧四年朱全忠與劉仁恭修好好呼到翻會魏博兵擊李克用夏四月丁未全忠至巨鹿城下敗河東兵萬餘人逐北至青山口五代志邢州龍岡縣隋文帝開皇十六年置青山縣煬帝大業初省入龍岡敗補邁翻乾寧四年以護國節度使王珂兼侍中珂丘何翻乾寧四年丁卯朱全忠遣葛從周分兵攻洺州戊辰拔之斬刺史邢善益乾寧四年五月己巳朔赦天下乾寧四年葛從周攻邢州刺史馬師素棄城走辛未磁州刺史袁奉滔自剄全忠以從周為昭義留後守邢洺磁三州而還並汴自此歲爭邢洺磁三州乾寧四年以武定節度使李繼密為山南西道節度使李繼密自洋州徙興元乾寧四年朝廷聞王建已用王宗滌為東川留後乃召劉崇望還為兵部尚書仍以宗滌為留後乾寧四年湖南將姚彥章言於馬殷請取衡永道連郴五州仍薦李瓊為將殷以瓊及秦彥暉為嶺北七州游奕使張圖英李唐副之五州併潭邵為七斬楊師遠引兵趣永州趣七喻翻圍之月餘唐世旻走死殷以李唐為永州刺史乾寧四年六月以濠州刺史趙珝為忠武節度使珝犨之弟也珝況羽翻犨昌牛翻乾寧四年秋七月加武貞節度使雷滿同平章事方鎮表光化元年置武貞節度領澧朗溆三州治澧州乾寧四年忠義節度使趙匡凝聞朱全忠有清口之敗忠義軍山南東道清口之敗見去年十一月全忠遣宿州刺史尉氏氏叔琮將兵伐之丙申拔唐州擒隨州刺史趙匡璘敗襄州兵於鄧城敗補邁翻乾寧四年八月庚戌改華州為興德府以車駕駐蹕故也乾寧四年戊午汴將康懷貞襲鄧州克之擒刺史國湘趙匡凝懼遣使請服於朱全忠全忠許之為朱全忠再攻趙匡凝張本乾寧四年己未車駕發華州壬戌至長安甲子赦天下改元改元光化上欲藩鎮相與輯睦以太子賓客張有孚為河東汴州宣慰使賜李克用朱全忠詔又令宰相與之書使之和解克用欲奉詔而恥於先自屈乃致書王鎔使通於全忠全忠不從朱全忠兵力方強故不從乾寧四年九月乙亥加韓建守太傅興德尹先是上駐蹕華州因以華州為興德府羅弘信守侍中乾寧四年己丑東川留後王宗滌言於王建以東川封疆五千里文移往還動踰數月請分遂合瀘渝昌五州別為一鎮建表言之乾寧四年顧全武攻蘇州城中及援兵食皆盡甲申淮南所署蘇州刺史臺濛棄城走金城湯池非粟不守臺濛雖淮南良將奈之何哉全武克蘇州乾寧三年淮南陷蘇州今果如顧全武之言而復之九域志常州無錫縣有望亭鎮在蘇州北四十五里又四十五里至無錫敗補邁翻全武帥萬餘人攻之帥讀曰率裴屢出戰使病者被甲執矛壯者彀弓弩全武每為之卻見其弓弩之力及遠故為之卻彀居候翻為于僞翻降戶江翻下同全武嘗為僧裴封函納款全武喜召諸將發函乃佛經一卷全武大慙曰裴不憂死何暇戲豫益兵攻城引水灌之城壞食盡裴乃降錢鏐設千人饌以待之饌雛晥翻又雛戀翻乃出乃當作及章乙十一行本正作及觀通鑑上文秦裴以三千人取崑山而守之及其降也羸兵不滿百人則其兵死於戰守者殆盡其存者僅三十之一耳單弱如此何敢久為旅拒旅衆也怙衆而拒捍曰旅拒裴義不負楊公今力屈而降耳非心降也鏐善其言顧全武亦勸鏐宥之鏐從之時人稱全武長者顧全武甚識而度所以能佐錢鏐保據一方長知兩翻乾寧四年魏博節度使羅弘信薨考異曰薛居正五代史梁紀弘信傳太祖紀年録皆云弘信八月卒按八月昭宗還京弘信猶加官舊紀傳九月卒今從之實録十月約奏到也乾寧四年汴將朱友恭將兵還自江淮過安州朱友恭克黃州還過安州九域志黃州西至安州三百里謀取汴軍冬十月己亥友恭攻而殺之乾寧四年李克用遣其將李嗣昭周德威將步騎二萬出青山將復山東三州山東三州邢洺磁也是年五月葛從周取之壬寅進攻邢州葛從周出戰大破之嗣昭等引兵退入青山從周追之將扼其歸路步兵自潰嗣昭不能制會橫衝都將李嗣源以所部兵至薛史明宗紀曰羅弘信襲破李存信於莘縣帝奮命殿軍而還武皇嘉其功即以所屬五百騎號曰橫衝都吾輩亦去則勢不可支矣我試為公擊之為于僞翻嗣昭曰善我請從公後嗣源乃解鞍厲鏃乘高布陳陳讀曰陳左右指畫邢人莫之測嗣源直前奮擊嗣昭繼之從周乃退德威馬邑人也馬邑秦漢舊縣名久廢開元五年分朔州善陽縣置馬邑縣於古大同軍城屬朔州乾寧四年癸卯以威武留後王審知為節度使乾寧四年以羅紹威知魏博留後乾寧四年丁巳以東川留後王宗滌為節度使乾寧四年加佑國節度使張全義兼侍中乾寧四年王珙引汴兵寇河中珙居勇翻王珂告急於李克用克用遣李嗣昭救之敗汴兵於胡壁九域志河中府榮河縣有胡壁鎮榮河唐寶鼎縣也宋祥符中更名敗補邁翻前常州刺史王柷柷之六翻性剛介有時望詔徵之時人以為且入相相息亮翻過陝王柷就徵道過陝州陝失冉翻請敍子姪之禮拜之柷固辭不受珙怒珙以柷同姓年輩在前行且入相請敍子姪之禮以親結之而柷辭不受珙以柷薄其門地本出寒微而絶之也故怒考異曰柷為給事中並遇害舊紀實録皆無年月今因珙伐河中事附此掠其資裝以覆舟聞朝廷不敢詰史言唐之威令不行藩鎮暴橫王柷罹其虐殺而不敢問詰去吉翻乾寧四年閏月錢鏐以其將曹圭為蘇州制置使遣王球攻婺州乾寧四年十一月甲寅立皇子禎為雅王祥為瓊王乾寧四年以魏博留後羅紹威為節度使乾寧四年衢州刺史陳岌請降于楊行密錢鏐使顧全武討之降戶江翻乾寧四年朱全忠以奉國節度使崔洪與楊行密交通淮西淮南鄰道也洪懼請以弟都指揮使賢為質質音致考異曰十國紀年洪託以將士不受節制遣兄賢質於汴按舊紀十月汴將張存敬以兵襲蔡州刺史崔洪納款請以弟賢質干汴許之實録亦云弟賢今從之且言將士頑悍悍下罕翻又侯旰翻不受節制請遣二千人詣麾下從征伐全忠許之為朱全忠遣崔賢徵兵蔡將殺賢劫洪奔淮南張本存敬曹州人也乾寧四年十二月昭義節度使薛志勤薨李克用之平王行瑜也見上卷乾寧二年克用曰行瑜恃功邀君故吾與公討而誅之昨破賊之日吾首奏趣蘇文建赴鎮事見同上趣讀曰促遽復二三復扶又翻下同朝野之論必喧然謂吾輩復如行瑜所為也吾與公情如同體固無所愛俟還鎮當更為公論功賞耳為于僞翻下同罕之不悅而退私於蓋寓曰罕之自河陽失守依託大庇蓋古盍翻李罕之失河陽見二百五十七卷僖宗文德元年歲月已深比來衰老比毗至翻近也倦於軍旅若蒙吾王與太傅哀愍王謂李克用太傅謂蓋寓使數年之間休兵養疾然後歸老閭閻幸矣寓為之言克用不應每藩鎮缺議不及罕之罕之甚鬱鬱寓恐其有他志亟為之言亟去吏翻頻也數也克用曰吾於罕之豈愛一鎮但罕之鷹也飢則為用飽則背飛祖曹操駕御呂布之意而言之背蒲妹翻及志勤薨旬日無帥罕之亶引澤州兵夜入潞州據之九域志澤州北至潞州一百六十五里帥所類翻曰薛鐵山死薛志勤從克用起代北初名鐵山慮不逞者為變故罕之專命鎮撫取王裁旨裁旨者旨裁其可否也遣人讓之罕之遂遣其子章十二行本子下有皓字乙十一行本同孔本同張校同請降於朱全忠執河東將馬溉等及沁州刺史傅瑤送汴州克用遣李嗣昭將兵討之自此李克用不能與朱全忠爭邢洺磁而爭澤潞矣收罕之家屬送晉陽先取澤州既掩李罕之不備且俘其家史言李嗣昭用兵有方略乾寧四年楊行密遣成及章十二行本及下有等字乙十一行本同歸兩浙以易魏約等淮南禽成及見上卷乾寧三年兩浙擒魏約見上去年四月楊錢爭蘇州臺濛周本秦裴皆淮南名將也為浙人所困終不能守楊行密知錢鏐未易可輕故歸成及以易魏約意在講解也錢鏐亦自知不如楊行密之強故許之之速乾寧四年韶州刺史曾袞舉兵攻廣州州將王王褱帥戰艦應之帥讀曰率清海行軍司馬劉隱一戰破之韶州將劉潼復據湞浛復扶又翻湞浛當在韶州湞昌縣界或曰劉潼據湞陽浛洭二縣之間湞癡貞翻浛胡南翻隱討斬之二年二年春正月丁未中書侍郎兼吏部尚書章十二行本書下有同平章事四字乙十一行本同孔本同張校同崔胤罷守本官以兵部尚書陸扆同平章事崔胤陸扆迭為拜罷二年朱全忠表李罕之為昭義節度使又表權知河陽留後丁會武寧留後王敬蕘蕘如招翻彰義留後張珂並為節度使河陽武寧皆附屬朱全忠獨張珂在涇州而為之請節鉞亦所以結之二年楊行密與朱瑾將兵數萬攻徐州軍于呂梁朱全忠遣騎將張歸厚救之二年劉仁恭發幽滄等十二州兵十萬十二州幽涿瀛莫平營薊媯檀滄景德也幽州巡屬更有蔚新武三州劉仁恭留以備河東不發其兵攻貝州拔之城中萬餘戶盡屠之投尸清水清水即清河之水仁恭進攻魏州營于城北魏博節度使羅紹威求救於朱全忠二年朱全忠遣崔賢還蔡州崔洪以弟賢為質見上年二月蔡將崔景思等殺賢劫崔洪悉驅兵民渡淮奔楊行密兵民稍稍遁歸安土重遷人情之常也全忠命許州刺史朱友裕守蔡州二年朱全忠自將救徐州楊行密聞之引兵去汴人追及之於下邳下邳古縣唐屬徐州九域志在徐州東一百八十里全忠行至輝州是年朱全忠表以宋州之碭山虞城單父曹州之成武置輝州即單州之封域也乃還二年三月朱全忠遣其將李思安張存敬將兵救魏博屯于內黃九域志內黃縣在魏州西南二百一十四里癸卯全忠以中軍軍于滑州劉仁恭謂其子守文曰汝勇十倍於思安當先虜鼠輩後擒紹威耳乃遣守文及其妹壻單可及將精兵五萬擊思安於內黃丁未思安使其將袁象先伏兵於清水之右淇水東過內黃謂之白溝水亦謂之清河水繁陽漢古縣唐併省入內黃杜佑曰漢繁陽縣故城在內黃縣西北守文逐之及內黃之北思安勒兵還戰伏兵發夾擊之幽州兵大敗斬可及殺獲三萬人守文僅以身免可及幽州驍將號單無敵燕軍失之喪氣李克用輕單可及而有木瓜澗之敗劉仁恭輕李思安而單可及喪元是以用兵者戒於輕敵喪息浪翻陳留人也時葛從周自邢州將精騎八百已入魏州戊申仁恭攻上水關館陶門館陶門魏州城北門由此門出趣館陶縣因以為門名顧門者曰前有大敵不可返顧命闔其扉闔轄臘翻扉門扇也從周等殊死戰仁恭復大敗復扶又翻下同擒其將薛突厥王鄶郎鄶古外翻明日汴魏乘勝合兵擊仁恭破其八寨仁恭父子燒營而遁汴魏之人長驅追之至臨清擁其衆入永濟渠殺溺不可勝紀勝音升鎮人亦出兵邀擊於東境鎮人王鎔之兵深冀趙之東境僵尸相枕僵居良翻枕職任翻仁恭自是不振而全忠益橫矣幽並之兵勢皆挫故全忠益橫橫戶孟翻河西胡人也薛史賀德倫其先河西部落人父懷慶隸滑州軍為小校故德倫少為滑牙將劉仁恭之攻魏州也羅紹威遣使修好於河東好呼到翻且求救壬午李克用遣李嗣昭將兵救之會仁恭已為汴兵所敗敗補邁翻紹威復與河東絶自李存信莘縣之敗魏與並絶矣今因求救而通好並兵未至而汴人有功故復與並絶二年葛從周乘破幽州之勢自土門攻河東拔承天軍別將氏叔琮自馬嶺入馬嶺在太原府太谷縣東南八十里晉分漢沾縣置樂平縣唐屬遼州榆次古縣唐屬太原府叔琮有驍將陳章號陳夜叉為前鋒俗言陰府有鬼使曰夜叉時人以陳章鷙悍可畏如夜叉然因稱之河東所恃者周楊五周德威小字楊五求一州為賞克用聞之以戒德威德威曰彼大言耳戰于洞渦洞渦水出沾縣北山東流南屈過受陽縣故城東西過榆次縣南此據水經注也魏收地形志洞渦水一出木瓜嶺一出沾嶺一出大廉山一出原過祠下五水合流故曰同過後語轉為洞渦按高歡建大丞相府于晉陽魏收已策名霸府齊受魏禪以晉陽為別都魏收多從其主往來晉陽宮宜知地名之的挑徒了翻謂其屬曰汝見陳夜叉即走章果逐之德威奮鐵檛擊之墜馬檛側瓜翻生擒以獻因擊叔琮大破之斬首三千級叔琮棄營走德威追之出石會關又斬千餘級從周亦引還二年丁巳朱全忠遣河陽節度使丁會攻澤州下之去年十二月河東兵取澤州考異曰實録丁巳葛從周復取澤州按編遺録丁巳河陽丁會收復澤州實録云從周誤也唐太祖紀年録三月周德威敗氏叔琮於洞渦驛先是逆溫令丁會將兵助李罕之戍潞州至是葛從周復入潞州以代丁會賊復陷我澤州梁實録薛史梁紀皆云六月方遣從周入潞州紀年録於此連言後事耳二年婺州刺史王壇為兩浙所圍去年閏月兩浙兵攻婺州按宣歙觀察先是已升寧國軍以田頵為節度使歙書涉翻四月頵遣行營都指揮使康儒等救之二年五月甲午置武信軍於遂州以遂合等五州隸之王建之志也二年李克用遣蕃漢馬步都指揮使李君慶將兵攻李罕之己亥圍潞州朱全忠出屯河陽辛丑遣其將張存敬救之壬寅又遣丁會將兵繼之大破河東兵君慶解圍去克用誅君慶及其裨將伊審李弘襲以李嗣昭為蕃漢馬步都指揮使代之攻潞州二年庚戌康儒等敗兩浙兵於龍丘龍丘本漢太末縣貞觀八年更名龍丘即今龍遊縣九域志屬衢州在州東七十五里敗補邁翻王球為主將以攻婺州而見擒於龍丘蓋以浙兵逆與宣兵戰也景福元年王壇得婺州至是失之二年六月乙丑李罕之疾亟亟紀力翻丁卯全忠表罕之為河陽節度使以丁會為昭義節度使未幾幾居豈翻又以其將張歸霸守邢州遣葛從周代會守潞州考異曰編遺録六月乙丑李罕之疾甚請歸河陽丁卯上令抽大軍回以丁會權制置綏懷上黨上乃東歸不言遣從周入潞薛居正五代史梁紀六月帝表丁會為潞州節度使以李罕之疾亟故也又遣葛從周由固鎮路入于潞州以援丁會梁實録後唐紀皆云代會自此至潞州破賀德倫走不復見會名或者李罕之既卒復召會守河陽以從周代之不可知也今因會鎮潞終言之二年以西川大將王宗佶為武信節度使王建之請也本姓甘洪州人也二年丁丑李罕之薨于懷州李罕之自潞州赴河陽至懷州而卒二年保義節度使王珙性猜忍雖妻子親近常不自保至是軍亂為麾下所殺僖宗中和初王重盈鎮陝傳子珙至是而亡璠音煩二年秋七月朱全忠海州戍將陳漢賓請降于楊行密淮海遊奕使張訓以漢賓心未可知與漣水防遏使廬江王綰將兵二千直趣海州遂據其城楊行密自此遂有海州趣七喻翻二年加荊南節度使成汭兼中書令二年馬殷遣其將李唐攻道州蔡結聚㣥蠻伏兵于隘以擊之大破唐兵唐曰蠻所恃者山林耳若戰平地安能敗我敗補邁翻乃命因風燔林火燭天地㣥蠻驚遁遂拔道州擒結斬之二年朱全忠召葛從周於潞州使賀德倫守之八月丙寅李嗣昭引兵至潞州城下分兵攻澤州己巳汴將劉棄澤州走河東兵進拔天井關以李孝璋為澤州刺史李孝璋當作李存璋李嗣昭日以鐵騎環其城捕芻牧者環音宦附城三十里禾黍皆刈之乙酉德倫等棄城宵遁趣壺關賀德倫之兵既不得出城芻牧城外禾黍又空糧援俱絶宜其遁也九域志壺關縣在潞州東二十五里趣七喻翻李存審即符存審殺獲甚衆葛從周以援兵至聞德倫等已敗乃還二年九月癸卯以鳳翔節度使李茂貞為鳳翔彰義節度使是年春正月朱全忠表張珂為彰義節度使張氏鎮涇州凡三帥矣今命李茂貞兼領之二年李克用表汾州刺史孟遷為昭義留後為孟遷以潞州叛李克用張本二年淄青節度使王師範以沂密內叛當是時朱全忠盡有河南一道之地王師範亦附屬焉若沂密內叛將安歸邪又不乞師於全忠而乞師於楊行密此事當考冬十月行密遣海州刺史臺濛副使王綰將兵助之拔密州歸于師範將攻沂州先使覘之覘丑廉翻曰城中皆偃旗息鼓綰曰此必有備而救兵近不可擊也諸將曰密已下矣沂何能為綰不能止乃伏兵林中以待之諸將攻沂州不克救兵至引退此救兵果誰兵歟綰發伏擊敗之敗補邁翻二年十一月陝州都將朱簡殺李璠自稱留後附朱全忠仍請更名友謙預於子姪朱全忠又兼有陝虢更工衡翻二年加忠義節度使趙匡凝兼中書令二年馬殷遣其將李瓊攻郴州執陳彥謙斬之進攻連州魯景仁自殺湖南皆平馬殷始盡有湖南之地二年十二月加魏博節度使羅紹威同平章事王崇武標點容肇祖聶崇岐覆校
