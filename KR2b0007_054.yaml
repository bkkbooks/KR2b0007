body:
  text: 資治通鑑卷第五十四翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注漢紀四十六永壽三年孝桓皇帝上之下永壽三年丁酉一五七永壽三年春正月己未赦天下永壽三年居風令貪暴無度居風縣屬九真郡交州記曰山有風門常有風攻殺令聚衆至四五千人夏四月進攻九真九真太守兒式戰死守式又翻兒五兮翻詔九真都尉魏郎討破之永壽三年閏月庚辰晦日有食之永壽三年京師蝗永壽三年或上言民之貧困以貨輕錢薄宜改鑄大錢事下四府下遐稼翻四府三公府及大將軍府㣥僚及太學能言之士議之太學生劉陶上議曰當今之憂不在於貨在乎民飢窮見比年已來比毗至翻良苗盡於蝗螟之口杼軸空於公私之求民所患者豈謂錢貨之厚薄銖兩之輕重哉就使當今沙礫化為南金瓦石變為和玉賢曰詩曰大賂南金和玉卞和之玉礫郎狄翻飢無所食雖皇羲之純德天地初立有天皇氏淡泊無所施為而民自化伏羲氏始畫八卦造書契以代結繩之政去洪荒之世未遠故其風朴略猶不能以保蕭牆之內也鄭氏曰蕭肅也牆謂屏也君臣相見之禮至屏而加肅敬焉是以謂之蕭牆不可一朝有飢故食為至急也議者不達農殖之本多言鑄冶之便蓋萬人鑄之一人奪之猶不能給況今一人鑄之則萬人奪之乎雖以陰陽為炭萬物為銅賈誼服賦之言使不飢之士猶不能足無厭之求也厭於鹽翻下同夫欲民殷財阜揚子曰君人者務在殷民阜財則百姓不勞而足陛下愍海內之憂戚欲鑄錢齊貨以救其弊猶養魚沸鼎之中棲鳥烈火之上水木本魚鳥之所生也用之不時必至焦爛願陛下寬鍥薄之禁賢曰鍥刻也音口結翻後冶鑄之議聽民庶之謠吟問路叟之所憂通下情也賢曰列子曰昔堯理天下五十年不知天下理亂堯乃微服遊於康衢兒童謠曰立我蒸民莫匪爾極不識不知順帝之則說苑曰孔子行遊中路聞哭者其音甚悲孔子避車而問之曰夫子非有喪也何哭之悲虞丘子對曰吾有三失吾少好學周遍天下還後吾親喪是一失也事君驕奢不遂是二失也厚交友而後絶是三失也視山河之分流瞰苦鑒翻視也賢曰三光日月星也分謂山流謂河言日月有謫食之變星辰有錯行之異故視其文耀也山崩川竭皆亡之徵不可不察天下之心國家大事粲然皆見無有遺惑者矣伏念當今地廣而不得耕民衆而無所食㣥小競進秉國之位鷹揚天下鳥鈔求飽鈔楚交翻吞肌及骨並噬無厭誠恐卒有役夫窮匠起於版築之間卒讀曰猝賢曰役夫謂如陳涉起蘄也窮匠謂如驪山之徒也余謂陳涉黥布皆可以言役夫窮匠則山陽鐵官徒蘇令等是也投斤攘臂登高遠呼呼火故翻使愁怨之民響應雲合雖方尺之錢何有能救其危也言雖錢大方尺亦不能救天下之亂也永壽三年冬十一月司徒尹頌薨考異曰袁紀在六月今從范書永壽三年長沙蠻反寇益陽益陽縣屬長沙郡賢曰縣在益水之陽今潭州縣故城在縣東永壽三年以司空韓縯為司徒演以善翻以太常北海孫朗為司空延熹元年戊戌一五八永壽三年夏五月甲戌晦日有食之太史令陳授因小黃門徐璜陳日食之變咎在大將軍冀冀聞之諷雒陽收考授諷雒陽令收考之也帝由是怒冀考異曰袁紀曰冀以私憾專殺議郎邴尊上益怒今從范書永壽三年京師蝗永壽三年六月戊寅赦天下改元永壽三年大雩公羊傳曰大雩旱祭也何休注曰君親之南郊以六事謝過自責曰政不善歟民失職歟宮室崇歟婦謁盛歟苞苴行歟讒夫昌歟使童男女各八人舞而呼雩故謂之雩鄭玄曰雩吁嗟求雨之祭也服虔曰雩遠也遠為百穀祈膏雨也陸佃曰雩雨不雨未定也永壽三年秋七月甲子太尉黃瓊免以太常胡廣為太尉永壽三年冬十月帝校獵廣成廣成苑在河南新城縣此上林苑在雒陽西永壽三年十二月南胸奴諸部並叛與烏桓鮮卑寇緣邊九郡帝以京兆尹陳龜為度遼將軍考異曰按胸奴傳每除度遼將軍輒書之此陳龜及前李膺後种皓皆不記一時既不當有兩官今約其事分著前後上疏曰臣聞三辰不軌言三辰之行不順軌也蠻夷不恭拔卒為將臣無文武之材而忝夭鷹揚之任詩曰維師尚父時維鷹揚爾雅翼鷹好揚隼好翔故以比尚父之武無所云補今西州邊鄙土地塉埆塉秦昔翻賢曰埆音覺又音確土薄也民數更寇虜數所角翻更工衡翻下租更同室家殘破雖含生氣實同枯朽往歲並州水雨災螟互生稼穡荒耗租更空闕賢曰更謂卒更錢也焉可不垂撫循之恩哉焉於虔翻古公西伯天下歸仁古公亶父避狄去邠居岐從之者如歸市帝王世紀曰西伯至仁百姓襁負而至復扶又翻陛下繼中興之統承光武之業臨朝聽政而未留聖意且牧守不良或出中官謂牧守出於中官之所引用也取過目前過度也招致災害胡虜凶悍悍下罕翻又侯旰翻因衰緣隙而令倉庫單於豺狼之口單與殫同盡也十絫為銖二十四銖為兩聚姦所致前涼州刺史祝良初除到州多所糾罰太守令長貶黜將半長知兩翻政未踰時功效卓然實應賞異以勸功能改任牧守去斥姦殘去羌呂翻又宜更選胸奴烏桓護羌中郎將校尉護胸奴中郎將護烏桓護羌校尉更工衡翻校戶教翻授之法令除並涼二州今年租更租賦也更役也更工衡翻下同掃除更始則善吏知奉公之祐惡者覺營私之禍胡馬可不窺長城塞下無候望之患矣帝乃更選幽並刺史自營郡太守都尉以下多所革易京兆虎牙營扶風雍營皆都尉領之諸郡各有太守都尉以賜吏民為于僞翻龜到職州郡重足震栗言重足而立也重音直龍翻歲以億計詔拜安定屬國都尉張奐為北中郎將按奐傳即護胸奴中郎將胸奴烏桓燒度遼將軍門賢曰時度遼將軍屯五原煙火相望兵衆大恐各欲亡去奐安坐帷中與弟子講誦自若軍士稍安乃潛誘烏桓陰與和通誘音酉遂使斬胸奴屠各渠帥屠各胸奴別種也屠直於翻帥所類翻諸胡悉降奐以南單于車兒不能統理國事乃拘之奏立左右蠡王為單于谷蠡音鹿黎詔曰春秋大居正車兒一心向化何罪而黜其遣還庭言春秋之義大居正賢曰春秋法五始之要故經曰元年春正月言王者即位之年宜大開恩宥其居正車兒即是桓帝即位之建和元年立自立以來一心向化宜寬宥之考異曰袁紀元康元年四月中郎將張奐以車兒不能治國事上言更立左鹿蠡王都紺為單于詔不許范書胸奴傳在延熹元年今從之永壽三年大將軍冀與陳龜素有隙譖其沮毀國威挑取功譽沮在呂翻賢曰挑猶取也獨取其名如挑戰之義音徒了翻不為胡虜所畏坐徵還以种皓為度遼將軍种音沖皓工老翻龜遂乞骸骨歸田里復徵為尚書復扶又翻冀暴虐日甚龜上疏言其罪狀請誅之帝不省省悉景翻龜自知必為冀所害不食七日而死東都之臣以死攻外戚者鄭弘陳龜二人而已先宣恩信誘降諸胡其有不服然後加討羌虜先時有生見獲質於郡縣者質音致悉遣還之誠心懷撫信賞分明由是羌胡皆來順服皓乃去烽燧除候望去羌呂翻邊方晏然無警入為大司農二年二年春二月鮮卑寇鴈門二年蜀郡夷寇蠶陵賢曰蠶陵縣屬蜀郡故城在今翼州翼水縣西有蠶陵山因以名焉宋白曰翼州衛山縣本漢蠶陵縣地故城在縣西有蠶陵山二年三月復斷刺史二千石行三年喪永興二年聽行三年喪斷丁管翻二年夏京師大水二年六月鮮卑寇遼東二年梁皇后恃姊兄蔭勢姊順烈皇后兄大將軍冀也蔭庇也今人謂憑藉世資得官者為蔭官蓋取木為喻言能蔭庇其本根也兼倍前世專寵妬忌六宮莫得進見及太后崩恩寵頓衰后既無嗣每宮人孕育鮮得全者鮮息淺翻帝雖迫畏梁冀不敢譴怒然進御轉希按周禮注鄭衆云六宮後五前一王之百二十人后一人夫人三人嬪九人世婦二十七人女御八十一人鄭玄曰六宮謂后也婦人稱寢曰宮宮隱蔽之言后象王立六宮而居之亦正寢一燕寢五夫人以下分居后之六宮每宮九嬪一人世婦三人女御九人其餘九嬪三人世婦九人女御二十七人從后唯所燕息焉從后者五日而沐浴其次又上十五日而遍云夫人如三公從容論婦禮此禮所謂以時御敘于王所者也鄭玄又曰凡㣥御見之法月與后其象也卑者宜先尊者宜後女御八十一人當九夕世婦二十七人當三夕九嬪九人當一夕三夫人當一夕后當一夕十五日而遍自望後反之按二鄭所云漢之宮中貫魚無序專房之宴蔽固後宮寧復有此制乎恚於避翻秋七月丙午皇后梁氏崩乙丑葬懿獻皇后於懿陵賢曰諡法溫和聖善曰懿聰明睿知曰獻梁冀一門前後七侯三皇后冀祖雍封乘氏侯冀封襄邑侯及嗣乘氏侯又封其子胤襄邑侯弟不疑潁陽侯蒙西平侯不疑子馬潁陰侯胤子桃城父侯是七封侯也恭懷順烈懿獻三皇后二大將軍夫人女食邑稱君者七人尚公主者三人其餘卿將尹校五十七人卿九卿也將中郎將也尹河南京兆尹也校諸校尉也校戶教翻亶凶恣日積宮衛近侍並樹所親賢曰樹置也纖微必知其四方調發調徒弔翻歲時貢獻皆先輸上第於冀賢曰上第第一也乘繩證翻吏民齎貨求官請罪者道路相望請罪謂請求以脫罪也皆先到冀門箋檄謝恩字書箋表也識也書也左雄傳文吏課箋奏自後世言之奏者達之天子箋者用之中宮東宮將相大臣檄者徵召傳令用之非所以謝恩也窮意自蔡倫造紙之後用紙書者曰箋用木書者曰檄故言箋檄謝恩也下邳吳樹為宛令宛於元翻之官辭冀冀賓客布在縣界以情託樹樹曰小人姦蠹比屋可誅明將軍處上將之位宜崇賢善以補朝闕比部必翻又毗寐翻連次也補朝闕謂補朝政之闕也處昌呂翻朝直遙翻自侍坐以來坐徂臥翻未聞稱一長者而多託非人誠非敢聞冀默然不悅樹到縣遂誅殺冀客為人害者數十人樹後為荊州刺史辭冀冀鴆之出死車上遼東太守侯猛初拜不謁冀冀託以他事腰斬之郎中汝南袁著年十九詣闕上書曰夫四時之運功成則退蔡澤之言鮮不致災鮮息淺翻今大將軍位極功成可為至戒宜遵縣車之禮縣讀曰懸高枕頤神傳曰木實繁者披枝害心范睢曰木殖繁者披其枝披其枝者傷其心將無以全其身矣冀聞而密遣掩捕著乃變易姓名託病僞死結蒲為人市棺殯送冀知其詐求得笞殺之太原郝潔胡武好危言高論好呼到翻與著友善潔武嘗連名奏記三府薦海內高士而不詣冀冀追怒之敕中都官移檄禽捕司隸校尉領中都官徒千二百人冀蓋敕都官從事使移檄禽捕也死者六十餘人潔初逃亡知不得免因輿櫬奏書冀門書入仰藥而死家乃得全安帝嫡母耿貴人薨冀從貴人從子林慮侯承求貴人珍玩不能得冀怒並族其家十餘人人從才用翻涿郡崔琦以文章為冀所善琦作外戚針白鵠賦以風外戚針曰赫赫外戚華寵煌煌昔在帝舜德隆英皇周興三母有莘崇湯宣王晏起姜后脫簪齊桓好樂衛姬不音皆輔主以禮扶君以仁達才進善以義濟身爰暨末葉漸已頽虧貫魚不序九御差池晉國之難禍起於麗惟家之索牝雞之晨專權亶愛顯己蔽人陵長間舊圮剝至親並后匹嫡淫女斃陳匪賢是上番為司徒荷爵負乘采食名都時人是刺德用不憮暴辛惑婦拒諫自孤蝮蛇其心縱毒不辜諸父是殺孕子是刳天怒地忿人謀鬼圖甲子昧爽身首分離初為天子第秋人螭非但耽色母后尤然不相率以禮而競獎以權先笑後號卒以辱殘家國泯絶宗廟燒燔末嬉喪夏褒姒斃周妲己亡殷趙靈沙丘戚姬人豕呂宗以敗陳后作巫卒死於外霍欲鴆子身乃罹廢故曰無謂我貴天將爾摧無恃常好色有歇微無怙常幸愛有陵遲無曰我能天人爾違患生不德福有慎機日不常中月盈有虧履道有者固仗勢者危微臣司戚敢告在斯針言外戚之禍深切故具載之憮音呼風讀曰諷琦曰昔管仲相齊樂聞譏諫之言樂音洛蕭何佐漢乃設書過之吏今將軍屢世台輔任齊伊周而德政未聞黎元塗炭不能結納貞良以救禍敗反欲鉗塞士口塞悉則翻杜蔽主聽將使玄黃改色鹿馬易形乎玄黃者天地之色也使之改色言將使天地顛倒也鹿馬易形指趙高秦二世之事琦之論可謂深切矣因遣琦歸琦懼而亡匿冀捕得殺之冀秉政幾二十年順帝永和六年冀為大將軍至是歲凡十九年幾居希翻天子拱手不得有所親與與讀曰豫帝既不平之及陳授死帝愈怒和熹皇后從兄子郎中鄧香妻宣生女猛從才用翻香卒宣更適梁紀紀孫壽之舅也壽以猛色美引入掖庭為貴人冀欲認猛為其女易猛姓為梁冀恐猛姊壻議郎邴尊沮敗宣意賢曰沮壞也恐尊害敗宣意不從其改梁姓也敗補邁翻刺七亦翻又欲殺宣宣家與中常侍袁赦相比賢曰相鄰林也比音毗至翻又音毗欲入宣家赦覺之鳴鼓會衆以告宣宣馳入白帝帝大怒因如廁獨呼小黃門史唐衡小黃門史小黃門之掌書者也左右與外舍不相得者誰乎左右謂宦官也賢曰外舍謂皇后家也中常侍單超單音善小黃門史左悺與梁不疑有隙悺工喚翻又音綰中常侍徐璜黃門令具瑗具姓也左傳有具丙瑗于眷翻考異曰宦者傳作中常侍貝瑗今從梁冀傳橫戶孟翻口不敢道於是帝呼超悺入室謂曰梁將軍兄弟專朝朝直遙翻迫脅內外公卿以下從其風旨今欲誅之於常侍意如何超等對曰誠國姦賊當誅日久臣等弱劣未知聖意如何耳帝曰審然者常侍密圖之對曰圖之不難但恐陛下腹中狐疑帝曰姦臣脅國當伏其罪何疑乎於是召璜瑗五人共定其議帝齧超臂出血為盟齧倪結翻噬也超等曰陛下今計已決勿復更言復扶又翻恐為人所疑冀心疑超等八月丁丑使中黃門張惲入省宿以防其變使惲入禁中直宿以防超等而無上旨徑使惲入自恃威行宮省故敢然惲於粉翻以輒從外入欲圖不軌言欲謀逆不由軌道也召諸尚書入發其事使尚書令尹勳持節勒丞郎以下皆操兵守省閣丞郎尚書左右丞及尚書郎也操七刀翻使具瑗將左右廣既騶賢曰騶騎士也余按續漢志太僕舊有六廣既中興省約但置一廣既曰未央廣既主乘輿及廣既中諸馬後又置左駿令廣既別主乘輿御馬未英廣既卒騶二十人右駿廣既從可知也續漢志左右都候各一人秩六百石主劍戟士徼循宮中及天子有所收考屬衛尉與司隸校尉張彪共圍冀第使光祿勳袁盱持節收冀大將軍印綬盱音吁徙封比景都鄉侯冀及妻壽即日皆自殺不疑蒙先卒悉收梁氏孫氏中外宗親送詔獄無少長皆棄市少詩照翻長知兩翻他所連及公卿列校刺史二千石死者數十人校戶教翻太尉胡廣司徒韓縯司空孫朗皆坐阿附梁冀不衛宮止長壽亭減死一等免為庶人故吏賓客免黜者三百餘人朝廷為空為于僞翻是時事猝從中發使者交馳公卿失其度官府市里鼎沸數日乃定百姓莫不稱慶收冀財貨縣官斥賣合三十餘萬萬以充王府用減天下稅租之半數其苑囿以業窮民二年壬午立梁貴人為皇后追廢懿陵為貴人冢帝惡梁氏惡烏路翻改皇后姓為薄氏以文帝薄太后家謹良也知為鄧香女乃復姓鄧氏二年詔賞誅梁冀之功封單超徐璜具瑗左悺唐衡皆為縣侯超食二萬戶璜等各萬餘戶世謂之五侯單超新豐侯徐璜武原侯具瑗東武陽侯左悺上蔡侯唐衡汝陽侯也又封尚書令尹勳等七人皆為亭侯賢曰尹勳宜陽都鄉霍諝鄴都亭張敬山陽曲鄉歐陽參修武仁亭李瑋宜陽金門虞放冤句呂都亭周永下邳高遷鄉二年以大司農黃瓊為太尉光祿大夫中山祝恬為司徒大鴻臚梁國盛允為司空臚陵如翻按西羌傳有北海太守盛苞茯先姓奭避元帝諱改姓盛按戰國時秦有盛橋則先自有盛姓是時新誅梁冀天下想望異政黃瓊首居公位乃舉奏州郡素行暴汙至死徙者十餘人行下孟翻海內翕然稱之瓊辟汝南范滂滂少厲清節為州里所服滂普郎翻少詩照翻嘗為清詔使風俗通曰汝南周勃辟太尉清詔使范史第五種以司徒清詔使冀州賢注云蓋三公府有清詔員以承詔使也使疏吏翻滂傳曰時冀州饑荒盜賊㣥起以滂為清詔使案察之慨然有澄清天下之志守令臧汙者皆望風解印綬去其所舉奏莫不厭塞衆議塞悉則翻會詔三戶章乙十六行本戶作府乙十一行本同孔本同熊校同掾屬舉謠言漢官儀曰三公聽採長吏臧否民所疾苦還條奏之是為舉謠言也頃者舉謠言掾屬令史都會殿上主者大言州郡行狀云何善者同聲稱之不善者默爾銜枚尚書責滂所劾猥多劾戶概翻又戶得翻疑有私故滂對曰臣之所舉自非叨穢姦暴深為民害豈以汙簡札哉汙烏故翻間以會日追促會日謂三府掾屬會于朝堂之日也其未審者方更參實參考以究其實也去羌呂翻嘉穀必茂忠臣除姦王道以清若臣言有二甘受顯戮尚書不能詰詰去吉翻二年尚書令陳蕃上疏薦五處士處昌呂翻豫章徐稚彭城姜肱姓譜本自炎帝居於姜水因以為氏曇徒含翻考異曰范書徐稚傳云延熹二年尚書令陳蕃僕射胡廣等上書薦稚袁紀五年尚書令陳蕃薦五處士按二年胡廣已為太尉五年蕃已為光祿勳今置在二年從范書去廣名從袁紀帝悉以安車玄纁備禮徵之皆不至稚家貧常自耕稼非其力不食恭儉義讓所居服其德屢辟公府不起陳蕃為豫章太守以禮請署功曹稚不之免不辭免也蕃性方峻不接賓客唯稚來特設一榻去則縣之榻坐榻也亦謂之牀縣讀曰懸有道舉見五十卷安帝建光元年賢曰就家而拜之也稚雖不應諸公之辟然聞其死喪輒負笈赴弔笈極曄翻常於家豫炙雞一隻以一兩綿絮漬酒中暴乾暴步木翻日曬也乾音干以裹雞徑到所赴冢隧外以水漬綿使有酒氣斗米飯白茅為藉以雞置前醊酒畢醊株衛翻酹酒也謁猶刺也肱與二弟仲海季江俱以孝友著聞聞音問常同被而寢不應徵聘肱嘗與弟季江俱詣郡夜於道為盜所劫欲殺之肱曰弟年幼父母所憐又未聘娶願殺身濟弟季江曰兄年德在前家之珍寶國之英俊乞自受戮以代兄命盜遂兩釋焉但掠奪衣資而已既至郡中見肱無衣服怪問其故肱託以他辭終不言盜盜聞而感悔就精廬求見徵君賢曰精廬即精舍也以其嘗蒙徵聘故稱為徵君還所略物肱不受勞以酒食而遣之勞力到翻帝既徵肱不至乃下彭城下遐稼翻使畫工圖其形狀肱臥於幽暗以被韜面賢曰韜藏也不欲出風工竟不得見之閎安之玄孫也袁安歷事明章和以忠篤稱不應辟召著隱居講授不修世務曇繼母苦章乙十六行本苦作酷乙十一行本同孔本同退齊校同烈曇奉之逾謹得四時珍玩未嘗不先拜而後進鄉里以為法帝又徵安陽魏桓安陽縣屬汝南郡桓曰夫干祿求進所以行其志也今後宮千數其可損乎廣既馬萬匹其可減乎左右權豪其可去乎去羌呂翻皆對曰不可桓乃慨然歎曰使桓生行死歸於諸子何有哉賢曰若忤時強諫死而後歸於諸勸行者復何益也二年帝既誅梁冀故舊恩私多受封爵追贈皇后父鄧香為車騎將軍封安陽侯更封后母宣為昆陽君兄子康秉皆為列侯宗族皆列校郎將列校謂北軍五校尉郎將即三署中郎將校戶教翻中常侍侯覽上縑五千匹上時掌翻下同帝賜爵關內侯又託以與議誅冀與讀曰豫進封高鄉侯又封小黃門劉普趙忠等八人為鄉侯自是權勢專歸宦官矣五侯尤貪縱傾動內外時災異數見數所角翻見賢遍翻白馬令甘陵李雲露布上書移副三府白馬縣屬東郡賢曰露布謂不封之也並以副本上三公府也梁冀雖恃章乙十六行本恃作持乙十一行本同權專亶虐流天下今以罪行誅猶召家臣扼殺之耳家臣謂猶古之家相也扼乙革翻謂單超等五侯也得無見非謂高祖之約非有功不侯得無解體賢曰列將謂皇甫規段熲等諦也春秋運斗樞曰五帝修名立功修德成化統調陰陽招類使神故稱帝帝之為言諦也鄭玄注云審諦於物色也小人諂進財貨公行政化日損尺一拜用賢曰尺一之板謂詔策也見漢官儀又曰尺一謂板長尺一以寫詔書也御進也省悉井翻猶今言省審也帝得奏震怒下有司逮雲下遐稼翻下同詔尚書都護劍戟送黃門北寺獄都總也護監也詔尚書總監左右都候劍戟士防送雲詣獄也或曰都護當作都候賢曰前書音義曰北寺獄即若盧獄時弘農五官掾杜衆傷雲以忠諫獲罪續漢志郡有五官掾署功曹及諸曹事願與雲同日死帝愈怒遂並下廷尉大鴻臚陳蕃上疏曰李雲所言雖不識禁忌干上逆旨其意歸於忠國而已昔高祖忍周昌不諱之諫謂周昌比高祖於桀紂也事見三十二卷成帝元延元年臣恐剖心之譏復議於世矣謂暴如商受剖賢人之心也復扶又翻下同漢官曰雒陽市長秩四百石屬大司農沐音木集韻曰姓也風俗通漢有東平太守沐寵帝恚甚恚於避翻有司奏以為大不敬蓋三公及尚書奏也免歸田里茂資貶秩二等時帝在濯龍池濯龍池在濯龍園中近北宮霸跪言曰李雲草澤愚儒杜衆郡中小吏出於狂戇不足加罪戇陟降翻帝謂霸曰帝欲不諦是何等語而常侍欲原之邪顧使小黃門可其奏雲衆皆死獄中霸跪奏若為雲等言而獄辭則致之死也太尉瓊自度力不能制橫戶孟翻度徒洛翻乃稱疾不起上疏曰陛下即位以來未有勝政言政事未有以勝於前朝也豎宦充朝朝直遙翻李固杜喬既以忠言橫見殘滅而李雲杜衆復以直道繼踵受誅橫戶孟翻復扶又翻海內傷懼益以怨結朝野之人以忠為諱尚書周永素事梁冀假其威勢見冀將衰乃陽毀示忠陽毀梁氏以示忠於帝室亦取封侯周永與尹勳同封侯注見上黃門挾邪㣥輩相黨自冀興盛腹背相親朝夕圖謀共搆姦軌臨冀當誅無可設巧復託其惡以要爵賞要一遙翻陛下不加清徵范書黃瓊傳徵作澄澄與澄同譬之水也若清澄則塵翳在上滓濁在下不可得而混矣別彼列翻復與忠臣並時顯封章乙十六行本封下有使朱紫共色五字乙十一行本同孔本同張校同退齊校同粉墨雜糅糅汝救翻所謂抵金玉於砂礫賢曰抵投也音紙碎圭璧於泥塗四方聞之莫不憤歎臣世荷國恩瓊父香為尚書令甚為和帝所親重荷下可翻敢以垂絶之日陳不諱之言書奏不納二年冬十月壬申上行幸長安二年中常侍單超疾病壬寅以超為車騎將軍孫程之死追贈車騎將軍今及超之生存授之二年十二月己巳上還自長安二年燒當燒何當煎勒姐等八種羌寇隴西金城塞姐音紫又音且也翻種章勇翻護羌校尉段熲擊破之追至羅亭賢曰東觀記曰追到積石山即與羅亭相近在今鄯州獲生口萬餘人酋慈由翻二年詔復以陳蕃為光祿勳楊秉為河南尹單超兄子匡為濟陰太守濟子禮翻負勢貪放兗州刺史第五種使從事衛羽案之百官志十二州刺史皆有從事史員職略與司隸同無都官從事其功曹從事為治中從事其部郡國從事每郡國各一人主督促文書察舉非法皆州自辟除通為百石種即奏匡並以劾超匡窘迫賂客任方刺羽劾戶概翻又戶得翻羽覺其姦捕方囚繫雒陽匡慮楊秉窮竟其事密令方等突獄亡走尚書召秉詰責秉對曰方等無狀釁由單匡乞檻車徵匡考核其事則姦慝蹤緒必可立得秉竟坐論作左校校戶教翻時泰山賊叔孫無忌寇暴徐兗州郡不能討單超以是陷第五種坐徙朔方考異曰楊秉傳作超弟宦者傳作弟子今從第五種傳范書李雲死在延熹三年春袁紀在二年秋按楊秉傳三年坐救雲免歸田里其年冬復徵拜河南尹坐單匡使客任方刺衛羽繫獄亡走論作左校第五種傳匡遣客刺羽超積忿以事陷種若如范書則雲死時單超已卒何得更能陷種又雲書所論者立鄧后與封五侯事皆在二年袁紀似近之種傳又云衛羽為種說叔孫無忌無忌率其黨與三十餘人降按帝紀延熹三年十一月無忌攻殺都尉侯章又臧旻訟種書稱種所坐盜賊公負筋力未就然則種必不能降無忌此說妄也稸怒以待之稸與蓄同斌與彬同及於太原劫之以歸亡命數年會赦得免種倫之曾孫也第五倫歷事光明是時封賞踰制內寵猥盛陳蕃上疏曰夫諸侯上象四七賢曰上象四七謂二十八宿各主諸侯之分野屏必郢翻高祖之約非功臣不侯而聞追録河南尹鄧萬世父遵之微功帝以鄧后故録遵破羌之功紹封萬世為南鄉侯章乙十六行本紹作絶乙十一行本同孔本同退齊校同封近習以非義授邑左右以無功傳賞至乃一門之內侯者數人故緯象失度陰陽謬序緯于貴翻臣知封事已行封事謂封爵之事也誠欲陛下從是而止又采女數千皇后紀曰光武中興六宮稱號唯皇后貴人貴人金印紫綬奉不過粟數十斛又置美人宮人采女三等並無爵歲時賞賜充給今采女數千女寵盛矣脂油粉黛不可資計賢曰資量也衣於既翻以女貧家也今後宮之女豈不貧國乎帝頗采其言為出宮女五百餘人為于僞翻但賜雋爵關內侯而封萬世南鄉侯帝從容問侍中陳留爰延朕何如主也從于容翻對曰陛下為漢中主中主為中材之主言可以上可以下顧輔佐者何如耳何以言之對曰尚書令陳蕃任事則治中常侍黃門與政則亂與讀曰豫是以章乙十六行本以下有知字乙十一行本同孔本同陛下可與為善可與為非前書曰齊桓公管仲相之則霸豎刁輔之則亂可與為善可與為惡是謂中人昔朱雲廷折欄檻折而設翻今侍中面稱朕違敬聞闕矣拜五官中郎將纍遷大鴻臚臚陵如翻會客星經帝坐帝坐一星在太微宮中坐徂臥翻延上封事曰陛下以河南尹鄧萬世有龍潛之舊封為通侯恩重公卿惠豐宗室加頃引見與之對博博塞之戲也有虧尊嚴媟私列翻臣聞之帝左右者所以咨政德也善人同處則日聞嘉訓處昌呂翻惡人從游則日生邪情惟陛下遠讒諛之人遠于願翻納謇謇之士則災變可除帝不能用延稱病免歸三年三年春正月丙申赦天下詔求李固後嗣初固既策罷事見上卷質帝本初元年乃遣三子基茲燮皆歸鄉里時燮年十三姊文姬為同郡趙伯英妻見二兄歸具知事本事本謂事之所由生也李氏滅矣自太公已來賢曰太公謂祖父郃也何以遇此密與二兄謀豫藏匿燮先事而圖之曰豫人咸信之有頃難作難乃旦翻州郡收基茲皆死獄中文姬乃告父門生王成曰君執義先公有古人之節今委君以六尺之孤賢曰六尺謂年十五以下其在君矣成乃將燮乘江東下入徐州界變姓名為酒家傭而成賣止於市各為異人陰相往來積十餘年梁冀既誅燮乃以本末告酒家酒家具車重厚遣之重直用翻下重至同燮皆不受遂還鄉里追行喪服姊弟相見悲感傍人姊戒燮曰吾家血食將絶弟幸而得濟豈非天邪宜杜絶衆人勿妄往來慎無一言加於梁氏加梁氏則連主上禍重至矣唯引咎而已婦人之識丈夫有所不及焉後王成卒燮以禮葬之每四節為設上賓之位而祠焉四節之祠謂四時之祭也為于僞翻三年丙午新豐侯單超卒賜東園祕器棺中玉具玉具即玉匣也發五營騎士將作大匠起冢塋其後四侯轉橫橫戶孟翻天下為之語曰左回天具獨坐回天言權力能回天也賢曰獨坐言驕貴無偶也唐雨墮臥虎言無人敢攖之也雨之所墮無不沾濕言其流毒遍於天下也考異曰太子賢注范書雨墮作兩墮云隨意所為不定也諸本兩或作雨按雨墮者謂其性急暴如雨之墮無有常處也以華侈相尚其僕從皆乘牛車而從列騎僕從才用翻兄弟姻戚宰州臨郡辜較百姓與盜無異較與權同音角虐遍天下民不堪命故多為盜賊焉中常侍侯覽小黃門段圭皆有田業近濟北界近其靳翻濟子禮翻僕從賓客劫掠行旅濟北相滕延一切收捕殺數十人陳尸路衢覽圭以事訴帝延坐徵詣廷尉免左悺兄勝為河東太守皮氏長京兆趙岐恥之皮氏縣屬河東郡賢曰故城在今絳州龍門縣西長知兩翻唐衡兄玹為京兆尹玹音玄素與岐有隙收岐家屬宗親陷以重法盡殺之岐逃難四方難乃旦翻靡所不歷自匿姓名賣餅北海市中安丘孫嵩見而異之安丘縣屬北海郡藏於復壁中及諸唐死遇赦乃敢出今孟子古注岐所注也其發題辭亦敘逃難之事三年閏月西羌餘衆復與燒何大豪寇張掖復扶又翻晨薄校尉段熲軍熲下馬大戰至日中刀折矢盡折而設翻虜亦引退熲追之且鬬且行晝夜相攻割肉食雪四十餘日遂至積石山郡國志積石山在隴西郡河關縣西南賢曰積石山在今鄯州龍支縣南禹貢云導河積石即此是也斬燒何大帥降其餘衆而還帥師類翻降戶江翻下同三年夏五月甲戌漢中山崩三年六月辛丑司徒祝恬薨三年秋七月以司空盛允為司徒太常虞放為司空三年長沙蠻反屯益陽張陽下脫與字零陵蠻寇長沙三年九真餘賊屯據日南衆轉強盛詔復拜桂陽太守夏方為交趾刺史復扶又翻夏戶雅翻方威惠素著冬十一月日南賊二萬餘人相率詣方降三年勒姐零吾種羌圍允街姐音紫又且也翻零音憐種章勇翻允音鉛段熲擊破之三年泰山賊叔孫無忌攻殺都尉侯章遣中郎將宗資討破之詔徵皇甫規拜泰山太守規到官廣設方略寇虜悉平四年四年春正月辛酉南宮嘉德殿火戊子丙署火百官志丙署長七人秩四百石黃綬宦者為之主中宮別處四年大疫四年二月壬辰武庫火四年司徒盛允免以大司農种皓為司徒考異曰袁紀在去年按祝恬薨後有盛允允免皓為司徒相去半年袁紀誤也今從范書四年三月太尉黃瓊免夏四月以太常沛國劉矩為太尉初矩為雍丘令雍丘屬陳留郡故國也有訟者常引之於前提耳訓告以為忿恚可忍恚於避翻縣官不可入使歸更思訟者感之輒各罷去四年甲寅封河間孝王子參戶亭侯博為任城王奉孝王後賢曰杜預注左傳曰今丹水縣北有三戶亭故城在今鄧州內鄉縣西南元嘉元年任城王崇薨無子國絶今以博紹封河間孝王開也任城孝王尚也四年五月辛酉有星孛于心晉書天文志心三星中星曰明堂天子位前星為太子後星為庶子孛蒲內翻四年丁卯原陵長壽門火願陵光武陵四年己卯京師雨雹雨于具翻四年六月京兆扶風及涼州地震四年庚子岱山及博尤來山並穨裂岱山在博縣西北賢曰徂來山一名尤來山博今博城縣余據二山並在博縣界而先書岱山以尤來山繫之博者岱宗人皆知之而尤來山則容有不知其在博縣界者故書法如此四年己酉赦天下四年司空虞放免以前太尉黃瓊為司空四年犍為屬國夷寇鈔百姓永初元年以犍為南部都尉為犍為屬國都尉領朱提漢陽二縣犍居言翻姓譜山古烈山氏之後一曰周有山師掌山林後以官為氏四年零吾羌與先零諸種反寇三輔種章勇翻四年秋七月京師雩公羊傳曰雩旱祭也四年減公卿已下奉貣王侯半租孔穎達曰已與以字本同洪氏隸釋曰濟陰太守孟郁修堯廟碑其文有曰非所以表神聖曰以一太牢春秋秩祠曰是以好道之徒自遠方集其字皆作以曰已章聖德曰敦我已德厲我已仁字皆作已已以義同而字構異體足以知自漢至唐已以二字通用矣奉扶用翻貣吐得翻假借也占之贍翻虎賁羽林緹騎營士五大夫錢各有差緹他弟翻又音啼四年九月司空黃瓊免以大鴻臚東萊劉寵為司空寵嘗為會稽太守會工外翻守式又翻簡除煩苛禁察非法郡中大治治直吏翻徵為將作大匠山陰縣有五六老叟自若邪山谷開出賢曰若邪在今越州會稽縣東南邪讀曰耶山谷鄙生未嘗識郡朝朝直遙翻郡聽事曰郡朝公府聽事曰府朝他守時吏發求民間至夜不絶或狗吠竟夕民不得安自明府下車以來狗不夜吠民不見吏年老遭值聖明今聞當見棄去故自扶奉送寵曰吾政何能及公言邪勤苦父老為人選一大錢受之今越州城西四十五里錢清鎮即父老送寵處為于僞翻四年冬先零沈氐羌與諸種羌寇並涼二州種章勇翻下同校尉段熲將湟中義從討之湟中有義從胡即小月氏胡也從才用翻稽固熲軍賢曰稽固猶停留也義從役久戀鄉舊皆悉叛歸郭閎歸罪於熲熲坐徵下獄輸作左校下遐稼翻以濟南相胡閎代為校尉胡閎無威略羌遂陸梁覆沒營塢賢曰說文曰塢小障也一曰庳城也音烏古翻轉相招結唐突諸郡寇患轉盛泰山太守皇甫規上疏曰今猾賊就滅泰山略平復聞㣥羌並皆反逆復扶又翻臣生長邠岐年五十有九長知兩翻邠悲巾翻昔為郡吏再更叛羌豫籌其事有誤中之言謂知馬賢必敗也事見五十二卷順帝永和五年更工衡翻中竹仲翻恐犬馬齒窮不報大恩願乞冗官冗而隴翻備單車一介之使勞來三輔使疏吏翻勞力到翻來力代翻宣國威澤以所習地形兵勢佐助諸軍臣窮居孤危之中坐觀郡將已數十年自鳥鼠至于東岱其病一也賢曰郡將郡守也鳥鼠山名在今渭州西即先零羌寇鈔處也東岱為泰山叔孫無忌反處也皆由郡守不加綏撫致使反叛其病一也爾雅翼鳥鼠同穴之中渭水出焉其鳥為鵌其鼠為鼵鼵如人家鼠而短尾鵌似鵽而小黃黑色入地三四尺鼠在內鳥在外在隴西首陽縣沙州記云寒嶺去太陽川三十里有鳥鼠同穴之山將即亮翻不如清平勤明孫吳未若奉法賢曰言若求猛敵不如撫以清平之政明習兵書不如郡守奉法使之無反也臣誠戚之賢曰戚憂也前變謂羌反詔以規為中郎將持節監關西兵討零吾等監古銜翻十一月規擊羌破之斬首八百級先零諸種羌慕規威信相勸降者十餘萬降戶江翻下同五年五年春正月壬午南宮丙署火五年三月沈氐羌寇張掖酒泉皇甫規發先零諸種羌共討隴右零音憐而道路隔絶軍中大疫死者十三四規親入庵廬庵草屋廬寄舍也毛晃曰結草木曰庵在野曰廬三軍感悅東羌遂遣使乞降涼州復通復扶又翻下同先是安定太守孫雋受取狼藉屬國都尉李翕督軍御史張稟多殺降羌李翕蓋安定屬國都尉然志無安定屬國以御史督軍故曰督軍御史先悉薦翻爾雅翼狼食猛之獸聚物而不整故稱狼藉任音王而皆倚恃權貴不遵法度規到悉條奏其罪或免或誅羌人聞之翕然反善沈氐大豪滇昌飢恬等十餘萬口復詣規降滇音顛復扶又翻五年夏四月長沙賊起寇桂陽蒼梧五年乙丑恭陵東闕火恭陵安帝陵戊辰虎賁掖門火賁音奔五月康陵園寢火康陵殤帝陵五年長沙零陵賊入桂陽蒼梧南海交趾刺史及蒼梧太守望風逃奔遣御史中丞盛修督州郡募兵討之不能克五年乙亥京師地震五年甲申中藏府丞祿署火百官志中藏府掌中幣帛金銀諸貨物己未南宮承善闥火五年鳥吾羌寇漢陽隴西金城諸郡兵討破之五年艾縣賊攻長沙郡縣艾縣屬豫章郡賢曰故城在今洪州建昌縣按今洪州分寧本漢艾縣又按宋白續通典分寧縣本武寧縣武寧縣本漢西安縣西安縣後漢建安中分海昏縣立而建昌縣乃永元中分海昏立在建安之前當是時艾縣故在宋元嘉二年廢海昏移建昌居焉艾故城在建昌界賢注是也衆至萬餘人謁者馬睦督荊州刺史劉度擊之軍敗睦度奔走零陵蠻亦反冬十月武陵蠻反寇江陵南郡太守李肅奔走主簿胡爽扣馬首諫曰蠻夷見郡無警備故敢乘間而進間古莧翻明府為國大臣連城千里舉旗鳴鼓應聲十萬奈何委符守之重而為逋逃之人乎肅拔刃向爽曰掾促去掾俞絹翻太守今急何暇此計爽抱馬固諫肅遂殺爽而走帝聞之徵肅棄市度睦減死一等復爽門閭復方目翻除其賦役也拜家一人為郎尚書朱穆舉右校令山陽度尚為荊州刺史右校令掌右工徒秩六百石屬將作大匠趙明誠金石録有荊州刺史度尚碑云其先出自顓頊與楚同姓熊缺之後又曰統國法度按元和姓纂古掌度之官因以命氏不言其與楚同姓也辛丑以太常馮緄為車騎將軍將兵十餘萬討武陵蠻緄古本翻考異曰帝紀三年十二月武陵蠻寇江陵車騎將軍馮緄討皆降散荊州刺史度尚討長沙蠻平之此事當在今年三月重出誤也先是所遣將帥宦官多陷以折耗軍資往往抵罪先悉薦翻折而設翻緄願請中常侍一人監軍財費尚書朱穆奏緄以財自嫌失大臣之節有詔勿劾監古銜翻劾戶概翻又戶得翻緄請前武陵太守應奉與俱拜從事中郎將軍出征從事中郎職參謀議緄軍至長沙賊聞之悉詣營乞降進擊武陵蠻夷斬首四千餘級受降十餘萬人荊州平定降戶江翻詔書賜錢一億固讓不受振旅還京師推功於應奉薦以為司隸校尉而上書乞骸骨朝廷不許五年滇那羌寇武威張掖酒泉滇音顛五年太尉劉矩免以太常楊秉為太尉五年皇甫規持節為將還督鄉里既無他私惠而多所舉奏又惡絶宦官不與交通惡烏路翻於是中外並怨遂共誣規貨賂㣥羌令其文降賢曰謂以文簿虛降非真心也降戶江翻屬之欲翻規上書自訟曰四年之秋戎醜蠢戾賢曰蠢動也戾乖也舊都謂長安臣振國威靈羌戎稽首稽音啓所省之費一億以上以為忠臣之義不敢告勞詩小雅曰密勿從事不敢告勞無罪無辜讒口囂囂然比方先事賢曰先事謂前輩敗將也前踐州界先奏孫雋李翕張稟旋師南征又上郭閎趙熹陳其過惡執據大辟上時黨翻辟毗亦翻凡此五臣支黨半國其餘墨綬下至小吏所連及者復有百餘吏託報將之怨郡守謂之郡將復扶又翻將即亮翻載贄馳車懷糧步走交構豪門競流謗讟云臣私報諸羌讎以錢貨讎是周翻償也若臣以私財則家無擔石擔都濫翻如物出於官則文簿易考易以豉翻就臣愚惑信如言者前世尚遺胸奴以宮姬謂元帝以王昭君賜呼韓邪單于也遺于季翻謂武帝以江都王建女細君妻烏孫王昆莫也則良臣之才略兵家之所貴將有何罪負義違理乎自永初以來將出不少將出即亮翻少詩沼翻覆軍有五謂鄧騭敗於冀西任尚敗於平襄司馬鈞敗於丁奚城馬賢敗於射姑山趙沖敗於鸇陰河有旋車完封賢曰言覆軍之將旋師之日多載珍寶封印完全便入權門余謂此言以朝廷供軍之金幣不發封識而輸之權門也而名成功立厚加爵封今臣還本土糾舉諸郡絶交離親戮辱舊故衆謗陰害固其宜也帝乃徵規還拜議郎論功當封而中常侍徐璜左悺欲從求貨數遣賓客就問功狀數所角翻規終不答璜等忿怒陷以前事前事即誣毀之事也官屬欲賦斂請謝下遐稼翻斂力贍翻規誓而不聽遂以餘寇不絶坐繫廷尉論輸左校校戶教翻諸公及太學生張鳳等三百餘人詣闕訟之會赦歸家六年六年春二月戊午司徒种皓薨六年三月戊戌赦天下六年以衛尉潁川許栩為司徒六年夏四月辛亥康陵東署火六年五月鮮卑寇遼東屬國六年秋七月甲申平陵園寢火平陵昭帝陵六年桂陽賊李研等寇郡界武陵蠻復反太守陳舉章乙十六行本舉作奉乙十一行本同孔本同退齊校同熊校同討平之宦官素惡馮緄復扶又翻惡烏路翻八月緄坐軍還盜賊復發免六年冬十月丙辰上校獵廣成遂幸函谷關上林苑光祿勳陳蕃上疏諫曰安平之時遊畋宜有節況今有三空之厄哉田野空朝廷空倉庫空加之兵戎未戢四方離散是陛下焦心毀顏坐以待旦之時也毀顏謂面有憂色臨于臣民之上無以為顏也騁心輿馬之觀乎又前秋多雨民始種麥今失其勸種之時而令給驅禽除路之役非賢聖恤民之意也書奏不納六年十一月司空劉寵免十二月以衛尉周景為司空景榮之孫也時宦官方熾景與太尉楊秉上言內外吏職多非其人舊典中臣子弟不得居位秉勢而今枝葉賓客枝葉謂中臣族親也署官舍也典據守宰上下忿患四方愁毒可遵用舊章退貪殘塞災謗塞悉則翻請下司隸校尉中二千石城門五營校尉北軍中候各實核所部司隸校尉部三輔三河弘農中二千石列卿也各率其屬城門校尉部十二城門司馬門候五營校尉屯騎越騎步兵長水射聲也各有司馬員吏北軍中候掌監五營下遐稼翻自以狀言三府廉察有遺漏續上言各官實核所部以當斥罷者言之公府更察其遺漏者續上狀使無有佚罰者上時掌翻於是秉條奏牧守青州刺史羊亮等五十餘人或死或免天下莫不肅然六年詔徵皇甫規為度遼將軍初張奐坐梁冀故吏免官禁錮凡諸交舊莫敢為言唯規薦舉前後七上為于僞翻上時掌翻由是拜武威太守及規為度遼到營數月上書薦奐才略兼優宜正元帥元帥謂度遼將軍也若猶謂愚臣宜充舉張舉作軍事者願乞冗官以為奐副朝廷從之以奐代規為度遼將軍以規為使胸奴中郎將使疏吏翻六年西州吏民守闕為前護羌校尉段熲訟冤者甚衆會滇那等諸種羌益熾涼州幾亡滇音顛種章勇翻幾居希翻六年尚書朱穆疾宦官恣橫橫戶孟翻上疏曰按漢故事中常侍參選士人建武以後乃悉用宦者自延平以來浸益貴盛假貂璫之飾處常伯之任賢曰璫以金為之當冠前附以金蟬也漢官儀曰中常侍秦官也漢興或用士人銀璫左貂光武以後專任宦者右貂金璫常伯侍中處昌呂翻一更其手朝直遙翻更工衡翻權傾海內寵貴無極子弟親戚並荷榮任荷下可翻放濫驕溢莫能禁禦窮破天下空竭小民愚臣以為可悉罷省遵復往初更選海內清淳之士明達國體者以補其處即兆庶黎萌蒙被聖化矣被皮義翻帝不納後穆因進見見賢遍翻復口陳曰臣聞漢家舊典置侍中中常侍各一人省尚書事復扶又翻賢曰省覽也省悉井翻黃門侍郎一人傳發書奏賢曰傳通也賢曰引用士人有族望者不接公卿乃以閹人為常侍小黃門通命兩宮自此以來權傾人主窮困天下宜皆罷遣博選耆儒宿德與參政事帝怒不應穆伏不肯起左右傳出賢曰傳聲令出乃趨而去自此中官數因事稱詔詆毀之數所角翻穆素剛不得意居無幾憤悶發疽卒幾居豈翻王崇武標點容肇祖聶崇岐覆校
