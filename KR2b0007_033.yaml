body:
  text: 資治通鑑卷第三十三翰林學士朝散大夫右諫議大夫知制誥兼侍講同提舉萬壽觀公事兼判集賢院上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣奉敕編集後學天台音註漢紀二十五綏和二年孝成皇帝下綏和二年甲寅前七綏和二年春正月上行幸甘泉郊泰畤綏和二年二月考異荀紀云赦天下今本紀無之故不取壬子丞相方進薨時熒惑守心心為明堂熒惑守心王者惡之火曰熒惑星熒惑天子理也雖有明天子必視熒惑所在見天文志議曹職在論議自公府至州郡皆有之言災變迫切大責日加安得保斥逐之戮師古曰言其事重不但斥逐而已也師古曰三百餘人言丞相之官屬也與盡節轉凶方進憂之不知所出會郎賁麗善為星善為甘石之學也師古曰賁姓也麗名也賁音肥上乃召見方進還歸未及引決師古曰別決自裁也還從宜翻責讓以政事不治災害並臻百姓窮困冊即策書也說文冊符命也諸侯進受於王也象其札一長一短中有二繩之形程大昌演繁露曰策制長二尺短者半之其次一長一短兩編下唯用篆書此漢策拜丞相之制也至策免則以尺一木兩行而隸書與策拜異矣治直吏翻欲退君位尚未忍使尚書令賜君上尊酒十石養牛一君審處焉如淳曰漢儀注有天地大變天下大過皇帝使侍中持節乘四白馬賜上尊酒十斛牛一頭策告殃咎使者去半道丞相即上病使者還未白事尚書以丞相不起聞律稻米一斗得酒一斗為上尊稷米一斗得酒一斗為中尊粟米一斗得酒一斗為下尊師古曰稷即粟也宜為黍米不當言稷且作酒自有澆淳之異分上中下耳處昌呂翻上祕之遣九卿策贈印綬賜乘輿祕器少府供張柱檻皆衣素乘繩證翻祕器東園祕器也供音居用翻張音竹亮翻師古曰柱屋柱也檻軒前闌版也皆以白素衣之衣音於既翻天子親臨弔者數至禮賜異於他相故事師古曰漢舊儀云丞相有疾皇帝法駕親至問疾從西門入即薨移居第中車駕往弔賜棺棺斂斂具贈錢葬地葬日公卿已下會葬數所角翻臣光曰晏嬰有言天命不慆不貳其命晏子對齊侯禳彗之辭也杜預曰慆疑也音他刀翻安可移乎昔楚昭王宋景公不忍移災於卿佐曰移腹心之疾寘諸股肱何益也左傳哀六年有雲如衆赤鳥夾日而飛三日楚子使問諸周太史周太史曰其當王身乎若禜之可移於令尹司馬王曰移腹心之疾而寘股肱何益遂弗禜史記宋景公時熒惑守心景公憂之司星子韋曰可移於相公曰相吾之股肱曰可移於民公曰君者待民曰可移於歲公曰歲饑民困吾誰為君子韋曰天高聽卑君有仁人之言三熒惑宜有動候之果徙三度藉之為言借也假也設為之言以發所欲言之意章十四行本忍作肯乙十一行本同孔本同為況不可乎使方進罪不至死而誅之以當大變是誣天也方進有罪當刑隱其誅而厚其葬是誣人也孝成欲誣天人而卒無所益卒子恤翻可謂不知命矣綏和二年三月上行幸河東祠后土綏和二年丙戌帝崩于未央宮臣瓚曰帝年二十即位即位二十六年壽四十五師古曰即位明年乃改元耳壽四十六帝素強無疾病自強以為無疾病也楚思王衍梁王立來朝衍楚孝王囂之子當辭去上宿供張白虎殿又欲拜左將軍孔光為丞相已刻侯印書贊師古曰贊謂延拜之文贊進也延進而拜之也書贊者書贊辭於策也平善鄉晨傅絝韈欲起應劭曰傅著也師古曰鄉讀曰嚮傅讀曰附絝古袴字也韈音武伐翻不能言攬衣而失手緩縱也司漏之度有晝漏夜漏是時三月晝漏五十八刻上者漏箭浮而上也上時掌翻咸歸罪趙昭儀讙許元翻皇太后詔大司馬莽雜與御史丞相廷尉治問皇帝起居發病狀趙昭儀自殺班彪贊曰臣姑充後宮為婕妤婕妤音接予父子昆弟侍帷幄數為臣言數所角翻為于偽翻成帝善修容儀升車正立不內顧不疾言不親指師古曰不內顧者儼然端嚴不迴眄也不疾言者為輕肆也不親指者為惑下也此三句者本論語鄉黨篇述孔子之事班氏引之今論語云車中不內顧不疾言不親指內顧者說者以為前視不過衡軛旁視不過輢較與此不同輢音於綺翻余謂此亦成帝學論語而有得於脩容儀者也夫聖人道德之容積於中而發於外帝則因論語之文而剛制其外而已損者三樂帝何不能服膺斯言乎嗚呼豈唯是哉論語二十篇脩身齊家治國平天下盡在是矣尊嚴若神可謂章十四行本謂下有有字乙十一行本同孔本同穆穆天子之容章十四行本容下有者字乙十一行本同孔本同矣淵深嘿靜也師古曰禮記云天子穆穆諸侯皇皇大夫濟濟士蹌蹌毛晃曰穆穆和敬貌朝直遙翻下同容受直辭公卿奏議可述遭世承平上下和睦然湛于章十四行本于作乎乙十一行本同孔本同酒色師古曰湛讀曰耽孔穎達曰耽者過禮之樂趙氏亂內外家亶朝言之可為於邑師古曰於邑短氣貌讀如本字於又音烏邑又音烏合翻建始以來王氏始執國命哀平短祚莽遂篡位蓋其威福所由來者漸矣言王氏之禍始於成帝綏和二年是日孔光於大行前拜受丞相博山侯印綬大行前謂大行皇帝柩前韋昭曰大行者不反之辭恩澤侯表博山侯國於南陽順陽綏和二年富平侯張放聞帝崩思慕哭泣而死放自河東都尉徵為侍中光祿勳丞相翟方進奏免放遣就國荀悅論曰放非不愛上忠不存焉故愛而不忠仁之賊也綏和二年皇太后詔南北郊長安如故永始三年復甘泉泰畤雍五畤汾陰后土祠罷長安南北郊綏和二年夏四月丙午太子即皇帝位謁高廟尊皇太后曰太皇太后皇后曰皇太后大赦天下哀帝初立躬行儉約省減諸用政事由己出朝廷翕然望至治焉治直吏翻綏和二年己卯葬孝成皇帝于延陵臣瓚曰自崩至葬凡五十四日延陵在扶風去長安六十二里考異曰成紀三月丙戌帝崩于未央宮四月己卯葬延陵臣瓚曰自崩及葬凡五十四日漢紀三月丙午帝崩四月己卯葬延陵自崩及葬三十四日按是年三月己巳朔無丙午四月己亥朔無己卯若依成紀則當云五月己卯葬依荀紀當云閏三月丙午崩二者各有差舛未知孰是按是年閏七月不當頓差四月今且從成紀之文綏和二年太皇太后令傅太后丁姬十日一至未央宮有詔問丞相大司空定陶共王太后宜當何居共讀曰恭丞相孔光素聞傅太后為人剛暴長於權謀自帝在襁褓而養長教道至於成人養長知兩翻道讀曰導帝之立又有力事見上卷元延四年師古曰與讀曰豫不欲與帝旦夕相近近其靳翻即議以為定陶太后宜改築宮大司空何武曰可居北宮上從武言北宮有紫房複道通未央宮長安記桂宮在未央宮北亦曰北宮余按漢書平帝紀成帝趙皇后退居北宮哀帝傅皇后退居桂宮則北宮桂宮自是兩宮求欲稱尊號貴寵其親屬使上不得由直道行師古曰不得依正直之道也余謂小宗不得間大宗藩后不得位匹長樂私戚不得妄干恩澤所謂正道也宏高昌侯董忠子也功臣表高昌侯國於千乘上書言秦莊襄王母本夏氏而為華陽夫人所子及即位後俱稱太后事見六卷秦孝文王元年上時掌翻華戶化翻事下有司下遐稼翻大司馬王莽左將軍關內侯領尚書事師丹劾奏宏知皇太后至尊之號天下一統而稱引亡秦以為比喻詿誤聖朝劾戶概翻詿戶卦翻非所宜言大不道上新立謙讓納用莽丹言免宏為庶人傅太后大怒要上欲必稱尊號要一遙翻上乃白太皇太后令下詔尊定陶恭王為恭皇綏和二年五月丙戌立皇后傅氏傅太后從弟晏之子也從才用翻綏和二年詔曰春秋母以子貴見公羊春秋傳隱元年各置左右詹事食邑如長信宮中宮應劭曰成帝母王太后居長信宮李奇曰傅姬如長信丁姬如中宮也師古曰中宮皇后之宮丁父為褒德侯封舅丁明為陽安侯舅子滿為平周侯皇后父晏為孔鄉侯師古曰傅父傅太后之父丁父丁太后之父地理志汝南郡有陽安縣恩澤侯表平周侯食邑於南陽湖陽孔鄉侯食邑於沛郡夏丘地理志河南郡有新城縣避帝外家莽上疏乞骸骨帝遣尚書令詔起莽又遣丞相孔光大司空何武左將軍師丹衞尉傅喜白太皇太后曰皇帝聞太后詔甚悲大司馬即不起皇帝即不敢聽政太后乃復令莽視事太皇太后止稱太后史省文復扶又翻綏和二年成帝之世鄭聲尤甚周末有鄭衞之樂東門溱洧之詩鄭聲也桑中濮上之音衞聲也皆淫聲也其後凡淫聲通謂之鄭聲孔子曰鄭聲淫是也倡音齒良翻貴戚至與人主爭女樂蓋王氏五侯淳于長之屬也又性不好音好呼到翻六月詔曰孔子不云乎放鄭聲鄭聲淫師古曰論語載孔子之言鄭國有溱洧之水男女亟於其間聚會故俗亂而樂淫立樂府見十九卷元狩三年非鄭衞之樂者別章十四行本別上有條奏二字乙十一行本同孔本同張校同退齋校同屬他官郊祭樂亦武帝置今以給祠南北郊大樂鼓嘉至鼓邯鄲鼓騎吹鼓江南鼓淮南鼓巴俞鼓歌鼓楚嚴鼓梁皇鼓臨淮鼓茲邡鼓朝賀置酒陳殿上應古兵法凡鼓十二人員百一十八人郊祭員十三人諸族樂人兼雲招給祠南北郊用六十七人兼給事雅樂用四人夜誦員五人剛別柎員二人給盛德主調箎員二人聽工以日知律冬夏至一人鍾工磬工簫工員各一人僕射二人主領諸樂人皆不可罷竽工員三人罷一琴工員五人罷三柱工員二人罷一繩弦工員六人罷四鄭四會員六十二人留一人給事雅樂餘罷張瑟員八人留一安世樂鼓沛吹鼓族歌鼓陳吹鼓商樂鼓東海鼓長樂鼓縵樂鼓凡鼓八員百二十八人朝賀置酒陳前殿房中不應經法治竽員五人楚鼓員六人常從倡三十人常從象人四人詔隨常從倡十六人秦倡員二十九人秦倡象人員三人詔隨秦倡一人雅大人員九人朝賀置酒為樂楚四會員十七人巴四會員十二人銚四會員十二人齊四會員十九人蔡謳員三人齊謳員六人竽瑟鍾磬員五人皆鄭聲可罷師學百四十四人其七十二人給太官挏馬酒其七十二人可罷大凡八百二十九人其三百八十八人不可罷可領屬大樂其四百四十一人不應經法或鄭衞之聲皆可罷奏可晉灼曰邡音方師古曰招讀與翹同剛及別柎皆鼓名也柎音膚柱工主箏瑟之柱者弦琴瑟之弦繩言主糾合作之也縵樂雜樂也音漫挏音動李奇曰以馬乳為酒撞挏乃民孟康曰象人若今戲蝦魚師子者也韋昭曰著假面者也然百姓漸漬日久又不制雅樂有以相變豪富吏民湛沔自若漸讀曰沾師古曰湛讀曰沈又讀曰耽自若言自如故也綏和二年王莽薦中壘校尉劉歆有材行行下孟翻為侍中稍遷光祿大夫貴幸更名秀歆改名秀冀以應圖讖更工衡翻卒父前業秀父向典校書見三十卷河平三年師古曰卒終也復扶又翻卒子恤翻有輯略有六藝略有諸子略有詩賦略有兵書略有術數略有方技略師古曰輯略謂㣥書之總要輯與集同六藝六經也諸子即下九流是也詩賦則自屈原荀鄉至揚雄等所作也兵書則權謀技巧形勢陰陽之書也術數則天文曆譜五行蓍龜雜占形法之書也方技則醫經經方房中神仙之書也三十八種種章勇翻五百九十六家萬三千二百六十九卷其敘諸子分為九流曰儒曰道曰陰陽曰法曰名曰墨曰從橫曰雜曰農從子容翻以為九家皆起於王道既微諸侯力政時君世主好惡殊方好呼到翻惡烏路翻是以九家之術出並作師古曰與鋒同崇其所善以此馳說取合諸侯其言雖殊譬如水火相滅亦相生也水滅火而生木木復生火敬之與和相反而皆相成也易曰天下同歸而殊塗一致而百慮師古曰下繫之辭窮知究慮以明其指雖有蔽短合其要歸亦六經之支與流裔師古曰裔衣末也其於六經如水之下流衣之末裔得其所折中中竹仲翻皆股肱之材已師古曰已語終辭師古曰言都邑失禮則於外野求之亦將有獲道術缺廢無所更索師古曰索求也索山客翻不猶愈於野乎師古曰愈勝也舍短取長舍讀曰捨則可以通萬方之略矣綏和二年河間惠王良能脩獻王之行行下孟翻母太后薨服喪如禮詔益封萬戶以為宗室儀表師古曰儀表者言為禮儀之表率余謂有儀可象謂之儀四外望之以取正謂之表綏和二年初董仲舒說武帝說輸芮翻以秦用商鞅之法除井田事見二卷周顯王十九年富者田連阡陌貧者亡立錐之地亡讀與無同邑有人君之尊里有公侯之富小民安得不困古井田法雖難卒行卒讀曰猝宜少近古少詩沼翻限民名田以贍不足師古曰名田占田也各為立限不使富者過制則可使貧弱之家足也去奴婢除專殺之威服虔曰不得專殺奴婢也塞悉則翻去羌呂翻省繇役斂力贍翻繇讀曰傜以寬民力然後可善治也治直吏翻及上即位師丹復建言復扶又翻今累世承平豪富吏民訾數鉅萬訾與貲同宜略為限天子下其議下遐稼翻丞相光大司空武奏請自諸侯王列侯公主名田各有限關內侯吏民名田皆毋過三十頃奴婢毋過三十人據哀帝紀有司條奏諸侯王列侯得名田國中列侯在長安及公主得名田縣道關內侯吏民名田皆毋得過三十頃諸侯王奴婢二百人列侯公主百人關內侯吏民三十人與此少異食貨志亦與紀同犯者沒入官時田宅奴婢賈為減賤賈讀曰價貴戚近習皆不便也皆不以為便於己也師古曰須待也又詔齊三服官諸官織綺繡難成害女紅之物皆止無作輸齊三服官及諸織官皆無作難成之物以輸送也如淳曰紅亦工也其所作已成未成皆止無復作皆輸所近官府也師古曰如說非也謂未成者不作已成者不輸耳余謂如說固非顏說亦未若余說之為簡易明白也應劭曰任子令者漢儀注吏二千石以上視事滿三年得任同產若子一人為郎不以德選故除之師古曰任保也詆誣也出嫁之重絕人道也免為庶人益吏三百石以下俸綏和二年上置酒未央宮內者令為傅太后張幄坐於太皇太后坐旁百官志內者令屬少府以宦者為之掌中布張諸衣物為于偽翻師古曰坐音材臥翻下同行下孟翻責內者令曰定陶太后藩妾何以得與至尊並徹去更設坐去羌呂翻更工衡翻傅太后聞之大怒不肯會重怨恚莽師古曰會謂至酒所也重音直用翻復扶又翻秋七月丁卯上賜莽黃金五百斤安車駟馬罷就第考異曰公卿表十一月丁卯大司馬莽免庚午師丹為大司馬四月徙又曰十月癸酉凡為大司空又曰太子太傅師丹為左將軍五月遷荀紀七月丁巳大司馬莽免按丹若以十一月為司馬四月徙官不得以十月為司空也七月丁卯朔無丁巳年表月誤荀紀日誤上乃加恩寵置中黃門為莽家給使蘇林曰使黃門在其家為使令又下詔益封曲陽侯根安陽侯舜新都侯莽丞相光大司空武邑戶各有差益封根二千戶舜五百戶舜音子也莽三百五十戶光千戶武更以南陽犨之博望鄉為氾鄉侯國益封千戶以莽為特進給事中朝朔望見禮如三公朝直遙翻又還紅陽侯立於京師立就國見上卷去年傅太后從弟右將軍喜好學問有志行從才用翻好呼到翻行下孟翻下同王莽既罷退衆庶歸望於喜初上之官爵外親也外親外家之親傅太后始與政事數諫之與讀曰豫數所角翻由是傅太后不欲令喜輔政庚午以左將軍師丹為大司馬封高鄉亭侯按丹傳及恩澤侯表皆云封高樂侯國於東海上右將軍印綬以光祿大夫養病以光祿勳淮陽彭宣為右將軍大司空何武尚書令唐林皆上書言喜行義修潔忠誠憂國內輔之臣也言可為內朝輔弼之臣衆庶失望皆曰傅氏賢子以論議不合於定陶太后故退百寮莫不為國恨之為于偽翻忠臣社稷之衞魯以季友治亂師古曰謂季氏亡則魯不昌治直吏翻師古曰謂楚殺子玉而晉侯喜可知事見上卷秦莊襄王三年事見高帝紀不如一賢故秦行千金以間廉頗事見五卷周赧王五十五年間古莧翻事見十卷高帝三年疏與疎同陛下之光輝傅氏之廢興也如淳曰傅喜顯則傅氏興其廢亦如之晉灼曰用喜於陛下有光明而傅氏之廢復得興也師古曰如說是余謂晉說亦未可厚非故尋復進用焉明年復進用喜復扶又翻綏和二年建平侯杜業上書詆曲陽侯章十四行本侯下有王字乙十一行本同孔本同張校同根高陽侯薛宣安昌侯張禹而薦朱博帝少而聞知王氏驕盛少詩照翻心不能善以初立故且優之後月餘司隸校尉解光解戶買翻奏曲陽侯先帝山陵未成公聘取章十四行本取下有故字乙十一行本同孔本同張校同掖庭女樂五官殷嚴王飛君等置酒歌舞如淳曰五官官名也外戚傳云五官視三百石亦聘取故掖庭貴人以為妻況商子也大不敬不道於是天子曰先帝遇根況父子至厚也今乃背恩忘義背蒲妹翻以根嘗建社稷之策師古曰謂立哀帝為嗣也事見上卷元延四年免況為庶人歸故郡王氏故魏郡元城人以其黨也綏和二年九月庚申地震自京師到北邊郡國三十餘處壞城郭壞音怪凡壓殺四百餘人上以災異問待詔李尋考異曰尋傳云使侍中衞尉傅喜問尋按公卿表傅喜為衞尉二月遷右將軍十一月罷地震在九月當是時喜已不為衞尉矣夫日者衆陽之長長知兩翻人君之表也君不修道則日失其度晻昧亡光師古曰晻與暗同又音烏感翻間者日尤不精光明侵奪失色邪氣珥蜺數作孟康曰暈適背鐍抱珥虹蜺皆日旁氣也珥形點黑也如淳曰雄為虹雌為蜺凡氣在旁相對為珥在旁如半鐶向日為抱向外為背有氣刺日為鐍鐍映傷也適者日之將食先有黑之變也蜺讀曰齧珥音仍吏翻數所角翻下同竊以日視陛下志操衰於始初多矣唯陛下執乾剛之德強志守度謂守法度也諸保阿乳母甘言卑章十四行本卑作悲乙十一行本同孔本同辭之託斷而勿聽勉強大義斷丁管翻強其兩翻絕小不忍良有不得已良甚也不可私以官位誠皇天之禁也臣聞月者衆陰之長長知兩翻后大臣諸侯之象也間者月數為變此為母后與政亂朝與讀曰豫朝直遙翻下同陰陽俱傷兩不相便外臣不知朝事竊信天文即如此近臣已不足杖矣師古曰杖謂倚任也無強所惡師古曰邪佞之人誠可賤惡勿得寵而異之令其盛強也惡烏路翻尊強本朝臣聞五行以水為本五行一曰水水者天一所生王道公正脩明則百川理落脈通師古曰落謂經絡也則涌溢為敗今汝潁漂涌地理志潁川郡陽城縣陽乾山潁水所出東至沛郡下蔡縣入淮過郡三行千五百里汝水出汝南郡定陵縣高陵山東南至新蔡入淮過郡四行千三百四十里此詩所謂百川沸騰咎在皇甫卿士之屬師古曰詩小雅十月之交之詩也皇甫卿士周室女寵之族也臣聞地道柔靜陰之常義也間者關東地數震數所角翻宜務崇陽抑陰以救其咎固志建威固志以用英俊建威以黜姦邪建立也拔進英雋退不任職以強本朝夫本強則精神折衝師古曰言有欲衝突為害者則折挫之為邪謀所陵聞往者淮南王作謀之時其所難者獨有汲黯以為公孫弘等不足言也事見十九卷武帝元狩元年漢之名相於今無比而尚見輕何況亡弘之屬乎故曰朝廷亡人則為賊亂所輕亡讀曰無其道自然也綏和二年騎都尉平當使領河隄師古曰為使而領其事使音疏吏翻九河今皆寘滅寘與填同治水有決河深川師古曰決分泄也深浚治也治直之翻下同塞悉則翻河從魏郡以東多溢決水迹難以分明四海之衆不可誣爾雅九夷八狄七戎六蠻謂之四海孔穎達曰東方曰夷者風俗通云東方人好生萬物觝觸地而出夷者觝也其類有九依東夷傳一曰玄菟二曰樂浪三曰高麗四曰滿飾五曰鳧臾六曰索家七曰東屠八曰倭人九曰天鄙南方曰蠻者風俗通云君臣同川而浴極為簡慢蠻者慢也其類有八李巡註爾雅云一曰天竺二曰咳首三曰僬僥四曰跛踵五曰穿胸六曰儋耳七曰狗軹八曰旁春西方曰戎者風俗通云斬伐殺生不得其中戎者兇也其類有六李巡註爾雅云一曰僥夷二曰戎央三曰老白四曰耆羌五曰鼻息六曰天剛北方曰狄者風俗通云父子嫂叔同穴無別狄者辟也其行邪辟其類有五李巡註爾雅云一曰月支二曰穢貊三曰匈奴四曰單于五曰白屋諸儒之說略有異同然平當所謂四海之衆但言四海之內之人耳上從之待詔賈讓奏言治河有上中下策古者立國居民疆理土地必遺川澤之分度水勢所不及師古曰遺留也度計也言川澤水所流聚之處皆留而置之不以為居邑而妄墾殖必計水之所不及然後居而田之也分音扶問翻度音大各翻小水得入陂障卑下以為汙澤師古曰停水曰汙音一胡翻使秋水多得其所休息左右游波寬緩而不迫夫土之有川猶人之有口也治土而防其川猶止兒啼而塞其口豈不遽止然其死可立而待也塞悉則翻師古曰遽速也音其庶翻故曰善為川者決之使道善為民者宣之使言國語召公諫厲王監謗之辭師古曰道讀曰導導通引也近起戰國壅防百川各以自利師古曰雍讀曰壅齊與趙魏以河為竟竟讀曰境趙魏瀕山師古曰瀕山猶言以山為邊界也瀕音頻又音賓余謂趙魏之地一邊接山則地勢高非邊界也齊地瀕海故卑下也河水東抵齊隄則西泛趙魏趙魏亦為隄去河二十五里雖非其正水尚有所遊盪時至而去則填淤肥美淤依據翻民耕田之或久無害稍築宮嚴宮改室宅遂成聚落大水時至漂沒則更起隄防以自救稍去其城郭排水澤而居之湛溺自其宜也師古曰湛讀曰沈音持林翻今隄防陿者去水數百步陿與狹同於故大隄之內復有數重復扶又翻重直龍翻民居其間此皆前世所排也河從河內黎陽至魏郡昭陽東西互有石隄激水使還百餘里間河再西三東迫阨如此不得安息地理志黎陽縣屬魏郡晉灼曰黎山在其南河水經其東其山上碑云縣取山之名取水之陽以為名按溝洫志具載讓奏曰河從河內北至黎陽為石隄激使抵東郡平剛又為石隄使西北抵黎陽觀下又為石隄使東北抵東郡津北又為石隄使西北抵魏郡昭陽又為石隄激使東北今行上策徙冀州之民當水衝者決黎陽遮害亭遮害亭在淇口東十八里有金隄隄高一丈自淇口東地稍高至遮害亭西五丈水經註曰舊有宿胥口河水於此北入河西薄大山東薄金隄勢不能遠泛濫期月自定薄伯各翻難者將曰若如此敗壞城郭田廬冢墓以萬數百姓怨恨難乃旦翻壞音怪敗補邁翻昔大禹治水山陵當路者毀之故鑿龍門闢伊闕析厎柱破碣石墮斷天地之性師古曰闢開也析分也墮毀也音火規翻斷丁管翻何足言也人功所造謂城郭田廬冢墓也治隄歲費且萬萬河南河內東郡陳留魏郡平原千乘信都清河勃海凡十郡所殘無數如出數年治河之費以業所徙之民尊古聖之法定山川之位謂依禹迹也使神人各處其所而不相奸神謂川瀆之神人謂居人也處昌呂翻師古曰奸音干豈其與水爭咫尺之地哉此功一立河定民安千載無患故謂之上策載子亥翻若乃多穿漕渠於冀州地使民得以溉田分殺水怒殺所介翻減也雖非聖人法然亦救敗術也可從淇口以東為石隄地理志淇水出河內共縣北山東至黎陽入河水經註曰魏晉之枋頭古淇口也共音恭恐議者疑河大川難禁制滎陽漕渠足以卜之如淳曰今礫谿口是也言作水門流水流不為害也師古曰礙谿谿名即水經所云濟水東過礫谿者當仰此水門仰牛向翻諸渠皆往往股引取之如淳曰肢支別也據如說股當作肢溉冀州水則開西方高門分河流民田適治河隄亦成此誠富國安民興利除害支數百歲故謂之中策若乃繕完故隄增卑倍薄勞費無已數逢其害此最下策也讓所畫治河三策自漢至今未有能行之者大率古人論事畫為三策者其上策多孟浪駭俗而難行其中策則平實合宜而可用其下策則常人所知也數所角翻綏和二年孔光何武奏迭毀之次當以時定自元帝時貢禹建毀廟之議韋玄成匡衡皆踵其說以為太祖以下五廟其親廟四親盡而迭毀迄于成帝終莫能定今二府復奏於是光祿勳彭宣等五十三人皆以為孝武皇帝雖有功烈親盡宜毀太僕王舜中壘校尉劉歆議曰禮天子七廟七者其正法數可常數者也禮記曰天子七廟三昭三穆與太祖廟而七宗變也師古曰言非常數故云變也不可預為設數臣愚以為孝武皇帝功烈如彼孝宣皇帝崇立之如此不宜毀立世宗廟見二十四卷宣帝本始元年制曰太僕舜中壘校尉歆議可綏和二年何武後母在蜀郡武蜀郡郫縣人會成帝崩吏恐道路有盜賊後母留止止不行也師古曰左右謂天子側近之臣冬十月策免武以列侯歸國癸酉以師丹為大司空丹見上多所匡改成帝之政乃上書言古者諒闇不言聽於冢宰師古曰論語云子張曰書云高宗諒闇三年不言孔子曰何必高宗古之人皆然君薨百官總己以聽於冢宰三年諒信也闇默然也鄭玄曰周之六官皆總屬於冢宰冢宰於百官無所不主爾雅曰冢大也冢宰太宰也乃上時掌翻師古曰論語稱孔子曰父在觀其志父沒觀其行三年無改於父之道可謂孝矣而官爵臣等以及親屬赫然皆貴寵封舅為陽安侯皇后尊號未定豫封父為孔鄉侯出侍中王邑射聲校尉王邯等王邑王邯太皇太后親屬也邯戶甘翻變動政事卒暴無漸師古曰比頻也比毗至翻卒讀曰猝下倉卒同復曾不能牢讓爵位師古曰牢堅也復扶又翻曾才登翻增益陛下之過間者郡國多地動水出流殺人民日月不明五星失行此皆舉錯失中號令不定法度失理陰陽溷濁之應也錯音千故翻師古曰溷音胡頓翻臣伏惟人情無子年雖六七十猶博取而廣求師古曰取讀曰娶孝成皇帝深見天命燭知至德師古曰燭照也至德指謂哀帝己者有我之私克去也先帝暴棄天下暴者言無疾而崩四海安寧百姓不懼此先帝聖德當合天人之功也臣聞天威不違顏咫尺左傳齊桓公對宰孔之言師古曰言常若在前宜自肅懼也且克己躬行以觀㣥下之從化天下者陛下之家也胏附何患不富貴不宜倉卒若是其不久長矣丹書數十上上時掌翻多切直之言傅太后從弟子遷在左右尤傾邪從才用翻上惡之惡烏路翻免官遣故郡傅氏本河內溫人上不得已復留遷復扶又翻下同丞相光與大司空丹奏言詔書前後相反天下疑惑無所取信臣請歸遷故郡以銷姦黨卒不得遣卒子恤翻終也復為侍中其逼於傅太后皆此類也哀帝之時傅氏固為驕橫然史家所記如此等語意其出於王氏愛憎之口綏和二年議郎耿育上書冤訟陳湯成帝永始二年陳湯徙邊冤訟訟其冤也甘延壽陳湯為聖漢揚鉤深致遠之威言湯等深入康居遠誅郅支雖其竄伏荒外能揚威而鉤致之也為于偽翻討絕域不羈之君不羈言不可羈屬也豈有比哉先帝嘉之仍下明詔宣著其功改年垂曆師古曰謂改年為竟寧也不以此事蓋當其年上書者附著耳余按元紀詔曰匈奴郅支單于背叛禮義既伏其辜呼韓邪單于修朝保塞邊垂長無兵革之事其改元為竟寧則改年亦以此事非附著也應是南郡獻白虎白虎西方之獸主威武故以為湯等之應會先帝寢疾然猶垂意不忘數使尚書責問丞相趣立其功數所角翻趣使丞相御史立議以序其功也師古曰趣讀曰促獨丞相匡衡排而不予予讀曰與封延壽湯數百戶事見二十九卷元帝竟寧元年孝成皇帝承建業之基乘征伐之威兵革不動國家無事而大臣傾邪欲專主威排妒有功妒與妬同師古曰塊然獨處之意如土塊也塊音口內翻被皮義翻卒以無罪老棄敦煌正當西域通道通道通行之路也卒子恤翻敦徒門翻旋踵及身謂罪及其身也誠可悲也復扶又翻下同至今奉使外蠻者未嘗不陳郅支之誅以揚漢國之盛夫援人之功以懼敵師古曰援引也音爰豈不痛哉且安不忘危盛必慮衰今國家素無文帝累年節儉富饒之畜又無武帝薦延畜讀與蓄同如淳曰薦延使㣥臣薦士而延納之梟俊禽敵之臣獨有一陳湯耳師古曰梟謂斬其首而縣之也俊謂敵之魁率郅支是也春秋左氏傳曰得俊曰克仲馮曰梟俊禽敵之臣宜與薦延通為一句則與上文相配而下言獨有一陳湯耳自不妨梟善鬬故云梟俊猶云梟將也梟堅堯翻尚望國家追錄其功封表其墓以勸後進也湯幸得身當聖世功曾未久曾才登翻反聽邪臣鞭逐斥遠遠于願翻使亡逃分竄死無處所師古曰分謂散離也舜典曰分北三苗莫不計度以為湯功累世不可及而湯過人情所有師古曰言湯所犯之罪過人情共有不能免者非特詭異深可誅責也度徒洛翻雖復破絕筋骨暴露形骸猶復制於脣舌為嫉妒之臣所係虜耳言湯功如此之偉猶不免於罪徙繼今者雖復捐身為國終制於吏議陷於係虜之罪也復扶又翻為于偽翻書奏天子還湯卒於長安卒子恤翻孝哀皇帝上諱欣定陶恭王康之子也成帝立以為嗣荀悅曰諱欣之字曰喜應劭曰諡法恭仁短折曰哀建平元年乙卯前六綏和二年春正月隕石于北地十六綏和二年赦天下綏和二年司隸校尉解光奏言臣聞許美人及故中宮史曹宮史女史也中宮皇后宮也趙皇后傳宮屬中宮為學事史通詩授皇后產子子隱不見見賢遍翻臣遣吏驗問皆得其狀元延元年宮有身其十月宮乳掖庭牛官令舍師古曰乳產也音而具翻下皆類此中黃門田客續漢志中黃門比百石掌給事禁中以宦者為之令收置暴室獄掖庭令屬少府有左右丞暴室丞各一人皆宦者者為之暴室丞主中婦人疾病者就此室其皇后貴人有罪亦就此室籍姓晉大夫籍氏之後其先有孫伯黶司晉之典籍以為大政故曰籍氏誰兒也宮曰善臧我兒胞臧古藏字通師古曰胞謂胎之衣也音苞師古曰意言是天子兒耳客持詔記與武問兒死未武對未死客曰上與昭儀大怒趙昭儀也武叩頭啼曰不殺兒自知當死殺之亦死不殺則為違詔命故知當死殺之則後人以害皇子之罪加之故知亦死子無貴賤唯留意奏入客復持詔記取兒付中黃門王舜舜受詔內兒殿中為擇乳母復扶又翻為于偽翻告善養兒且有賞毋令漏泄舜擇官婢張棄為乳母官婢蓋以罪沒入掖庭男為官奴女為官婢鄭玄曰古者從坐男女沒入縣官為奴其少才知以為奚今之侍史官婢或謂之奚官女客復持詔記幷藥以飲宮師古曰飲音於禁翻宮曰果也欲姊弟亶天下我兒男也頟上有壯髮類孝元皇帝師古曰壯髮當頟前侵下而生今俗呼為圭頭者是也頟鄂格翻危殺之矣師古曰危險也猶今人言險不殺耳師古曰長信謂太后棄所養兒師古曰棄謂張棄也宮長李南以詔書取兒去晉灼曰漢儀注有女長御比侍中宮長豈此邪余謂宮長者蓋老於宮中諸女御因稱之為宮長猶三署諸郎謂久次者為郎署長也前持詔記此以詔書書之與記有以異乎曰有詔記手記也後世謂之手記光武所謂詔書手記不可數得手記出於上手詔書則下為之以璽為信長知兩翻師古曰終竟不知置何所也許美人元延二年懷子十一月乳乳如注翻子免乳也昭儀謂帝曰常紿我言從中宮來即從中宮來許美人兒何從生中許氏竟當復立邪晉灼曰昭儀前要帝不得立許美人以為皇后而今有子中許氏竟當復立為皇后邪此前約之言也師古曰此說非也言美人在內中何從得兒而生也故言何從生中次此下乃始言約耳以手自擣師古曰懟怨怒也擣築也懟音直類翻從牀上自投地啼泣不肯食曰今當安置我我欲歸耳帝曰今故告之反怒為師古曰故以許美人生子告汝何為反怒殊異甚也昭儀曰陛下自知是不食何為陛下嘗自言約不負女師古曰女讀曰汝今美人有子竟負約謂何帝曰約以趙氏故不立許氏使天下無出趙氏上者毋憂也後詔使中黃門靳嚴從許美人取兒去盛以葦篋靳居焮翻盛時征翻葦葭類也織以為篋也置飾室簾南去飾室室之以金玉為飾者昭陽舍是也師古曰簾戶簾也音廉使御者于客子解篋緘未已御者侍者也師古曰緘東篋之繩音古咸翻自閉戶獨與昭儀在須臾開戶嘑客子嘑古呼字及詔記令中黃門吳恭持以與籍武曰告武篋中有死兒埋屏處屏處有遮蔽處人所不見者屏必郢翻武穿獄樓垣下為坎埋其中獄掖庭獄也其他飲藥傷墮者無數事皆在四月丙辰赦令前考異曰趙后傳作丙辰按哀帝紀四月丙午即位赦天下蓋傳誤也或者即位十日後赦也男子忠等發長陵傅夫人冢事更大赦更工衡翻孝元皇帝下詔曰此朕所不當得赦也窮治盡伏辜天下以為當當丁浪翻趙昭儀傾亂聖朝親滅繼嗣家屬當伏天誅而同產親屬皆在尊貴之位迫近帷幄近其靳翻天下寒心請事窮竟謂窮治其獄而竟其情令外朝大議以正其罪訢臨之子也議郎耿育上疏言臣聞繼嗣失統廢適立庶師古曰適讀曰嫡下同聖人法禁古今至戒然太伯見歷知適師古曰歷謂王季即文王之父也知適謂知其當為適嗣也適丁歷翻委身吳粵謂太伯逃之吳粵以避季歷不計常法致位王季以崇聖嗣聖嗣謂文王師古曰卒終卒子恤翻子孫承業七八百載載子亥翻年也爾雅曰唐虞曰載取物終更始功冠三王冠古玩翻道德最備是以尊號追及太王太王古公亶父也武王克商有天下追王太王王季然後乃有非常之謀孝成皇帝自知繼嗣不以時立念雖末有皇子萬歲之後未能持國師古曰末晚暮也萬歲言晏駕也余謂人之生也以死為諱故常人以死後為百年之後天子曰千秋萬歲後制於女主女主驕盛則耆欲無極如武帝為鉤弋夫人慮者是也師古曰耆讀曰嗜師古曰不使不可使從命也恐危社稷傾亂天下知陛下有賢聖通明之德仁孝子愛之恩懷獨見之明內斷於身斷丁亂翻故廢後宮就館之漸絕微嗣禍亂之根師古曰微嗣者謂幼主也愚臣既不能深援安危定金匱之計師古曰愚臣謂解光等也金匱言長久之法可藏於金匱石室者援音爰師古曰演廣也音弋善翻述先帝之志乃反覆校省內暴露私燕師古曰私燕謂成帝閒燕之私也覆音方目翻余謂私燕衽席之私所謂專房燕即此燕也汙烏故翻成結寵妾妬娼之誅娼莫報翻甚失賢聖遠見之明逆負先帝憂國之意夫論大德不拘俗立大功不合衆用衞鞅語意陛下聖德盛茂所以符合於皇天也豈當世庸庸斗筲之臣所能及哉筲竹器也容斗二升音所交翻且褒廣將順君父之美匡救銷滅既往之過古今通義也事不當時固爭防禍於未然各隨指阿從以求容媚晏駕之後尊號已定萬事已訖乃探追不及之事訐揚幽昧之過此臣所深痛也耿育之言是也春秋為尊者諱義正如此探吐南翻師古曰訐音居謁翻下遐稼翻即如臣言宜宣布天下使咸曉知先帝聖意所起不然空使謗議上及山陵下流後世遠聞百蠻聞音問近布海內甚非先帝託後之意也蓋孝者章十四行本者作子乙十一行本同孔本同善述父之志善成人之事唯陛下省察省悉井翻帝亦以為太子頗得趙太后力事見上卷成帝元延四年傅太后恩趙太后師古曰恩謂以厚恩接遇之一曰恩謂銜其立哀帝為嗣之恩也余謂一說是故太皇太后及王氏皆怨之為趙后自殺張本綏和二年丁酉光祿大夫傅喜為大司馬封高武侯恩澤侯表高武侯國於南陽杜衍縣考異曰公卿表綏和二年十一月庚午師丹為大司馬四月徙建平元年四月丁酉傅喜為大司馬喜傳云明年正月徙師丹為大司空而拜喜為大司馬荀紀亦在正月按長曆此年四月癸亥朔無丁酉今從喜傳漢紀綏和二年秋九月甲辰隕石于虞二地理志虞縣屬梁國綏和二年郎中令泠褒師古曰泠音零古者樂工謂之泠人因以為氏周有泠州鳩原父曰按此時無郎中令余謂令字衍黃門郎段猶等復奏言定陶共皇太后共皇后皆不宜復引定陶藩國之名以冠大號復扶又翻共讀曰恭冠古玩翻車馬衣服宜皆稱皇之意師古曰皇者至尊之號其服御宜皆副稱之也稱音尺孕翻各供厥職師古曰謂詹事太僕少府等衆官也為于偽翻下故為同上復下其議復扶又翻下遐稼翻㣥下多順指言母以子貴宜立尊號以厚孝道唯丞相光大司馬喜大司空丹以為不可丹曰聖王制禮取法於天地尊卑者所以正天地之位不可亂也易繫辭曰天尊地卑君臣定矣卑高以陳貴賤位矣又履卦大象曰上天下澤履君子以辯上下定民志履者禮也為號者母從子妻從夫之義也共皇太后之號為母從子共皇后之號為妻從夫車服與太皇太后並非所以明尊無二上之義也定陶共皇號諡已前定義不得復改復扶又翻禮父為士子為天子祭以天子其尸服以士服子無爵父之義尊父母也引禮記喪服小記之言古者祭祀必有尸服以生時之服事亡如事存也鄭玄曰祭以天子養以子道也尸服士服父本無爵不敢以己爵加之嫌於卑之故為所後服斬衰三年斬衰用麤布其下斬之不緶衰音七雷翻明尊本祖而重正統也本祖所後之祖故為共王立後事見上卷成帝綏和元年令共皇長為一國太祖前稱共王後稱共皇隨其時之所稱而稱之也諸侯之國以始封之君為國太祖恩義已備陛下既繼體先帝持重大宗承宗廟天地社稷之祀義不可復奉定陶共皇祭入其廟復扶又翻下同今欲立廟於京師使臣下祭之是無主也又親盡當毀禮太祖以下親廟四親盡而迭毀匡衡曰孝莫大於嚴父故父之所尊子不敢不承父之所異子不敢同禮公子不得為母信為後則於子祭於孫止李奇曰不得信尊其父也公子去其所而為大宗後尚得私祭其母為孫則止不得祭公子母也明繼祖不復顧其私祖母此皆親盡當毀之義也師古曰信讀曰申共皇立廟於定陶則為一國太祖之廟萬世不毀立廟於京師則其祭莫適為主又親盡當毀而於禮又為不正也墮讀曰隳丹由是浸不合上意會有上書言古者以龜貝為貨今以錢易之貝博蓋翻海介蟲也居陸名贆在水名蜬古者貨貝而寶龜周有泉至秦廢貝而行錢其後王莽以龜貝為貨蓋祖此說也埤雅獸為友貝二為朋貝中肉如科斗而有首尾貝之字從目從八言貝目之所背也鹽鐵論曰教與俗改敝與世易夏后氏以玄貝殷人以紫石孔穎達曰爾雅貝居陸猋在水蜬大者魚兄小者鰿今之細貝亦有紫色者出日南玄貝胎貝黑色者餘蚳黃白文餘泉白黃文白質黃文也詩成貝錦則紫貝也紫貝以紫為質黑為文點也蚆博而頯中廣兩頭銳蜠大而儉鰿小而惰惰狹而長贆音標蜬音含魚兄音況鰿音積蚳音治蚆音葩頯匡軌翻蜠音囷民以故貧宜可改幣上以問丹丹對言可改章下有司議下遐稼翻下同皆以為行錢以來久難卒變易師古曰卒讀曰猝丹老人忘其前語年老神識衰減則健忘忘音巫放翻又丹使吏書奏吏私寫其草丁傅子弟聞之使人上書告丹上封事上時掌翻行道人徧持其書上以問將軍中朝臣朝直遙翻皆對曰忠臣不顯諫大臣奏事不宜漏泄宜下廷尉治下遐稼翻事下廷尉劾丹大不敬承丁傅風旨也劾戶概翻給事中博士申咸炔欽上書蘇林曰炔音桂姓也言丹經行無比行下孟翻師古曰比音必寐翻余謂讀如字義自通自近世大臣能若丹者少發憤懣奏封事懣音滿又莫困翻不及深思遠慮使主簿書漢三公府皆有主薄錄省衆事簿文籍也以版書之以此貶黜恐不厭衆心師古曰厭音一贍翻博士秩比六百石貶二等則比四百石朕惟君位尊任重懷諼迷國師古曰諼詐也音虛爰翻進退違命反覆異言甚為君恥之為于偽翻下為賢同以君嘗託傅位謂嘗傅上於東宮也理理官也謂廷尉也言未召致廷尉而考問之也罷歸上時掌翻下同尚書令唐林上疏曰竊見免大司空丹策書泰深痛切君子作文為賢者諱春秋之義為賢者諱經為世儒宗言經學為當世儒者所宗也師古曰黃耉老人之稱也黃謂白髮落盡更生黃者也耉老人面色不淨如垢也位在三公所坐者微海內未見其大過事既以往丹傳以作巳京師識者咸以為宜復丹爵邑使奉朝請朝直遙翻師古曰識者謂有識之人也請音材性翻成帝尊禮張禹使奉朝請後遂以為官名沈約曰奉朝會請召而已請讀如字唯陛下裁覽衆心有以尉復師傅之臣尉與慰同安也復報也下詔賜丹爵關內侯自蕭望之以讒間免官賜爵關內侯其後周堪等皆用此比雖曰以恩師傅其實倚閣之使之優閒耳上用杜業之言召見朱博起家復為光祿大夫朱博免官見上卷成帝綏和元年按杜業傳帝初即位業上書言王氏世權日久薛宣張禹惑亂朝廷而薦朱博見賢遍翻冬十月壬午以博為大司空綏和二年中山王箕子幼有眚病箕子中山王興之子孟康曰災眚之眚謂妖病也服虔曰身盡青也蘇林曰名為肝厥發時脣口手足十指甲皆青師古曰下云禱祠解舍孟說是也眚音所領翻字不作青服蘇祖母馮太后自養視數禱祠解數所角翻師古曰解音懈余按韻書解音懈者釋除也禱祠以除災也但顏註上云禱祠解舍則以解為廨舍之廨其說拘矣賈公彥曰求福曰禱禱禮輕得求曰祠祠禮重上遣中郎謁者張由將醫治之續漢志常侍謁者主殿上時節威儀比六百石給事謁者四百石灌謁者郎中比三百石掌賓贊受事及上章報問中郎謁者蓋即灌謁者郎中也治直之翻下同師古曰狂易者狂而變易常性也怒去西歸長安尚書簿責由亶去狀師古曰簿責以文簿一一責問也因誣言中山太后祝詛上及傅太后中山太后馮太后也即元帝馮昭儀祝職救翻詛莊助翻追怨之因是遣御史丁玄按驗數十日無所得更使中謁者令史立治之師古曰官為中謁者令姓史名立續漢志中宮謁者令主報中章宦者為之更工衡翻冀得封侯治馮太后女弟習及弟婦君之據馮昭儀傳君之寡弟婦也誣奏云祝詛謀弒上立中山王責問馮太后無服辭立曰熊之上殿何其勇今何怯也當熊事見二十九卷元帝建昭元年之上時掌翻此乃中語章十四行本語下有前世事三字乙十一行本同孔本同退齋校同師古曰中語謂宮中之言語也吏何用知之欲陷我效也師古曰效徵驗也宜鄉侯參君之習及夫子按馮昭儀傳習夫及子也或自殺或伏法伏法謂受刑而死衆莫不憐之司隸孫寶奏請覆治馮氏獄傅太后大怒曰帝置司隸主使察我馮氏反事明白故欲擿抉以揚我惡師古曰剔抉謂挑發之也擿音他歷翻抉音一決翻挑音他聊翻上乃順指下寶獄下遐稼翻尚書僕射唐林爭之上以林朋黨比周比毗至翻左遷敦煌魚澤障候師古曰敦煌效穀縣本魚澤障也上為言太后出寶復官為于偽翻張由以先告賜爵關內侯史立遷中太僕張由史立以此受賞豈知乃以此賈禍邪容肇祖標點顧頡剛聶崇岐覆校
