body:
  text: 資治通鑑卷第一百一十三端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑二千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注晉紀三十五安皇帝戊元興二年癸卯四三春正月盧循使司馬徐道覆寇東陽二月辛丑建武將軍劉裕擊破之道覆循之姊夫也乙卯以太尉玄為大將軍大將軍自漢以來職名崇重居其位者皆亶朝權晉初以司馬孚為太尉奏以大將軍位太尉下後復舊在三司上丁巳玄殺冀州刺史孫無終孫無終亦北府舊將也玄上表請帥諸軍掃平關洛既而諷朝廷下詔不許上時掌翻帥讀曰率朝直遙翻乃云奉詔故止玄初欲飭裝先命作輕舸載服玩書畫舸加我翻大船也方言南楚江湖謂之舸畫與畫同或問其故玄曰兵凶戰危脫有意外當使輕而易運衆皆笑之桓玄意態終始如此耳時人誤以為雄豪而憚之故每遇輒敗崢嶸洲之戰劉道規等知其為人而徑突之一敗而不能復振矣易以豉翻夏四月癸巳朔日有食之南燕主備德故吏趙融自長安來始得母兄凶問備德號慟吐血號戶刀翻吐土故翻因而寢疾司隸校尉慕容達謀反遣牙門皇璆攻端門璆渠尤翻殿中帥侯赤眉開門應之殿中帥猶晉之殿中三部督也帥所類翻段宏等聞宮中有變勒兵屯四門廣固城四門也誅赤眉等達出奔魏備德優遷徙之民使之長復不役復方目翻復除也民緣此迭相蔭冒或百室合戶或千丁共籍以避課役尚書韓請加隱核合音閣竹角翻隱度也核實也隱核度其實也備德從之使巡行郡縣行下孟翻得蔭戶五萬八千泰山賊王始聚衆數萬自稱太平皇帝署置公卿南燕桂林王鎮討禽之臨刑或問其父及兄弟安在始曰太上皇蒙塵于外征東征西為亂兵所害其妻怒之曰君正坐此口奈何尚爾始曰皇后不知自古豈有不亡之國朕則崩矣終不改號史言王始僭舉大號至敗亡而不悔五月燕王熙作龍騰苑方十餘里役徒二萬人築景雲山於苑內基廣五百步峯高十七丈廣古曠翻高古號翻秋七月戊子魏主圭北巡作離宮於豺山平原太守和跋奢豪喜名喜許記翻圭惡而殺之惡烏路翻使其弟毗等就與訣跋曰灅北土瘠可遷水南勉為生計灅力水翻且使之背己背蒲妹翻曰汝何忍視吾之死也毗等諭其意詐稱使者逃入秦圭怒滅其家中壘將軍鄧淵從弟尚書暉與跋善從才用翻或譖諸圭曰毗之出亡暉實送之圭疑淵知其謀賜淵死南涼王傉檀及沮渠蒙遜互出兵攻呂隆傉奴沃翻沮子余翻隆患之秦之謀臣言於秦王興曰隆藉先世之資專制河外今雖飢窘尚能自支窘渠隕翻若將來豐贍終不為吾有涼州險絶土田饒沃不如因其危而取之興乃遣使徵呂超入侍使疏吏翻隆念姑臧終無以自存乃因超請迎于秦興遣尚書左僕射齊難鎮西將軍姚詰左賢王乞伏乾歸鎮遠將軍趙曜帥步騎四萬迎隆于河西詰去吉翻帥讀曰率騎奇寄翻南涼王傉檀攝昌松魏安二戍以避之攝收也傉奴沃翻齊難等至姑臧隆素車白馬迎于道旁隆勸難擊沮渠蒙遜沮子余翻蒙遜使臧莫孩拒之敗其前軍孩何開翻敗補邁翻難乃與蒙遜結盟蒙遜遣弟拿入貢于秦拿女居翻難以司馬王尚行涼州刺史配兵三千鎮姑臧以將軍閻松為倉松太守倉松即漢昌松縣番音盤分戍二城徙隆宗族僚屬及民萬戶于長安載記曰自光至隆十三載而滅散悉亶翻騎奇寄翻自餘文武隨才擢敍初郭黁常言代呂者王故其起兵先推王詳後推王乞基事見一百九卷元年黁奴昆翻王尚卒代之黁從乞伏乾歸降秦卒子恤翻降戶江翻以為滅秦者晉也遂來奔秦人追得殺之郭黁自信其術幸亂以徼福而卒以殺身足以明天道之難知矣沮渠蒙遜伯父中田護軍親信臨松太守孔篤皆驕恣為民患據晉書蒙遜載記中田護軍蓋呂光所置鎮臨松亂吾法者二伯父也皆逼之使自殺秦遣使者梁構至張掖蒙遜問曰禿髮傉檀為公而身為侯何也秦封傉檀為廣武公封蒙遜為西海侯事見上卷上年傉檀凶狡款誠未著故朝廷以重爵虛名羈縻之將軍忠貫白日當入贊帝室豈可以不信相待也聖朝爵必稱功朝直遙翻稱尺證翻如尹緯姚晃佐命之臣齊難徐洛一時猛將爵皆不過侯伯緯于貴翻將即亮翻將軍何以先之乎先悉薦翻昔竇融殷勤固讓不欲居舊臣之右事見四十三卷漢光武建武十三年蒙遜曰朝廷何不即封張掖而更遠封西海邪構曰張掖將軍已自有之所以遠授西海者欲廣大將軍之國耳蒙遜悅乃受命荊州刺史桓偉卒大將軍玄以桓修代之從事中郎曹靖之說玄曰說輸芮翻謙修兄弟專據內外權勢太重玄乃以南郡相桓石康為荊州刺史石康豁之子也桓豁溫之次弟劉裕破盧循於永嘉追至晉安武帝太康三年分建安立晉安郡今泉州南安縣即其地宋白曰東晉南渡衣冠士族多萃此地以求安堵因立晉安郡隋為泉州循浮海南走何無忌潛詣裕勸裕於山陰起兵討桓玄裕謀於土豪孔靖靖曰山陰去都道遠舉事難成且玄未篡位不如待其已篡於京口圖之裕從之靖愈之孫也孔愈歷事元明成三帝九月魏主圭如南平城愍帝建興元年代公猗盧城盛樂以為北都修故平城以為南都更南百里於灅水之陽黃瓜堆築新平城所謂南平城也唐朔州西南有新城即其地自灅水南抵夏屋山皆灅南地也度徒洛翻灅力水翻侍中殷仲文散騎常侍卞範之勸大將軍玄早受禪陰撰九錫文及冊命散悉亶翻騎奇寄翻禪時戰翻撰士免翻王謐為中書監領司徒桓胤為中書令加桓修撫軍大將軍胤沖之孫也丙子冊命玄為相國總百揆封十郡為楚王加九錫楚國置丞相以下官桓謙私問彭城內史劉裕曰楚王勳德隆重朝廷之情咸謂宜有揖讓卿以為何如裕曰楚王宣武之子桓溫諡曰宜武晉室微弱民望久移乘運禪代有何不可謙喜曰卿謂之可即可耳劉裕一世之雄桓謙問之以決可否裕詭辭以順其意故喜新野人庾仄殷仲堪之黨也新野縣漢屬南陽郡晉武帝太康中分屬義陽郡惠帝又分立新野郡仄阻力翻從廠不從石康未至乃起兵襲雍州刺史馮該於襄陽走之雍於用翻仄有衆七千設壇祭七廟云欲討桓玄江陵震動石康至州發兵攻襄陽仄敗奔秦高雅之表南燕主備德請伐桓玄曰縱未能廓清吳會亦可收江北之地中書侍郎韓範亦上疏曰今晉室衰亂江淮南北戶口無幾戎馬單弱重以桓玄悖逆重直用翻悖蒲內翻又蒲沒翻上下離心以陛下神武發步騎一萬臨之彼必土崩瓦解兵不留行矣得而有之秦魏不足敵也拓地定功正在今日失時不取彼之豪傑誅滅桓玄更修德政豈惟建康不可得江北亦無望矣備德曰朕以舊邦覆沒欲先定中原乃平蕩荊揚故未南征耳其令公卿議之因講武城西步卒三十七萬人騎五萬三千匹車萬七千乘乘繩證翻公卿皆以為玄新得志未可圖乃止慕容德取青州至是才五年耳有衆如此不能乘時而用之自審其才不足以辨桓玄也冬十月楚王玄上表請歸藩使帝作手詔固留之又詐言錢塘臨平湖開臨平湖草常蓁塞開則天下太平使百僚集賀用為己受命之符又以前世皆有隱士恥於己時獨無求得西朝隱士安定皇甫謐六世孫希之晉氏東遷以洛陽為西朝皇甫謐在魏晉之間徵辟不行自號玄晏先生朝直遙翻使隱居山林徵為著作郎使希之固辭不就然後下詔旌禮號曰高士時人謂之充隱實非隱者而以之備數故謂之充隱制作紛紜志無一定變更回復更工衡翻卒無所施行性復貪鄙人士有法書好畫卒子恤翻性復扶又翻法書謂如史籀程邈李斯張芝師宜梁鵠衛瓘索靖鍾繇諸人真蹟各有家法者畫與一同及佳園宅必假蒲博而取之尤愛珠玉未嘗離手離力智翻史言桓玄志度凡近乙卯魏主圭立其子嗣為齊王加位相國紹為清河王加征南大將軍熙為陽平王曜為河南王丁巳魏將軍伊謂帥騎二萬襲高車餘種袁紇烏頻十一月庚午大破之帥讀曰率騎奇寄翻種章勇翻紇戶骨翻詔楚王玄行天子禮樂為王后世子為太子丁丑卞範之為禪詔禪時戰翻下同使臨川王寶逼帝書之寶晞之曾孫也武陵王晞死於桓溫廢立之際庚辰帝臨軒遣兼太保領司徒王謐奉璽綬禪位于楚璽斯氏翻綬音受壬午帝出居永安宮癸未遷太廟神主干琅邪國永嘉之亂琅邪國人隨元帝過江者千餘戶太興三年立懷德縣丹楊雖有琅邪相而無其地成帝咸康元年桓溫領琅邪太守鎮江乘之蒲洲金城求割江乘縣境立郡始有實土百官詣姑孰勸進十二月庚寅朔玄築壇於九井山北九域志太平州有九井山今太平州古姑孰之地也蕪湖縣南有溪猶曰姑孰溪北征記云九井山在丹楊南壬辰即皇帝位冊文多非薄晉室或諫之玄曰揖讓之文正可陳之於下民耳豈可欺上帝乎大赦改元永始以南康之平固縣武帝太康三年以廬陵南部都尉立南康郡平固吳所置平陽縣也太康元年更名平固九域志虔州贛縣有平固鎮降何后為零陵縣君琅邪王德文為石陽縣公武陵王遵為彭澤縣侯追尊父溫為宣武皇帝廟號太祖南康公主為宣皇后封子升為豫章王以會稽內史王愈為尚書僕射愈子相國左長史綏為中書令綏桓氏之甥也戊戌玄入建康宮登御坐而牀忽陷坐讀曰座㣥下失色殷仲文曰將由聖德深厚地不能載玄大悅梁王珍之國臣孔朴奉珍之奔壽陽珍之晞之曾孫也晞子㻱出繼梁國珍之之祖也戊申燕王熙尊燕主垂之貴嬪段氏為皇太后段氏熙之慈母也己酉立苻貴嬪為皇后嬪毗賓翻大赦辛亥桓玄遷帝於尋陽尋陽郡時治柴桑燕以衛尉悅真為青州刺史鎮新城光祿大夫衛駒為並州刺史鎮凡城癸丑納桓溫神主于太廟桓玄臨聽訟觀閲囚徒洛都華林園北有聽訟觀本平望觀也魏明帝以刑獄天下大命也每斷大獄常幸觀聽之大和三年更名聽訟觀建康倣洛都之制亦置之觀古玩翻多得原放有干輿乞者時或恤之其好行小惠如此干犯也干輿行犯乘輿也乞者丐衣食之物好呼到翻是歲魏主圭始命有司制冠服以品秩為差然法度草創多不稽古三年甲辰四四春正月桓玄立其妻劉氏為皇后劉氏喬之曾孫也劉喬見八十六卷惠帝永興二年不復追尊立廟復扶又翻散騎常侍徐廣曰敬其父則子悅孝經載孔子之言玄曰禮太祖東向左昭右穆禮天子七廟太祖正東向之位左三昭右三穆決疑要録曰父南面故曰昭昭明也子北面故曰穆穆順也昭本如字為漢諱昭改音韶或云晉文帝名昭改音韶宣帝不得正東向之位何足法也祕書監卞承之謂廣曰若宗廟之祭果不及祖有以知楚德之不長矣廣邈之弟也徐邈以文學為孝武所親信玄自即位心常不自安二月己丑朔夜濤水入石頭流殺人甚多歡譁震天歡許元翻玄聞之懼曰奴輩作矣玄性苛細好自矜伐好呼到翻下性好同主者奏事或一字不體謂字之上下偏傍不合體也必加糾擲以示聰明擲他狄翻尚書答詔誤書春搜為春菟菟同都翻自左丞王納之以下凡所關署關通也被皮義翻或手注直官直官入直者也令史尚書令僕所署用有司奉答不暇而紀綱不治奏案停積不能知也又性好遊畋或一日數出數所角翻遷居東宮更繕宮室更工衡翻土木並興督迫嚴促朝野騷然思亂者衆玄遣使加益州刺史毛璩散騎常侍左將軍璩執留玄使不受其命璩寶之孫也使疏吏翻散悉亶翻騎奇寄翻璩強魚翻玄以桓希為梁州刺史分命諸將戍三巴以備之三巴巴郡巴東巴西也杜佑曰渝州古巴國謂之三巴以閬白二水東南流曲折三回如巴字也列玄罪狀遣巴東太守柳約之建平太守羅述征虜司馬甄季之擊破希等甄之人翻仍帥衆進屯白帝史言劉裕未起毛璩已仗義舉兵討玄帥讀曰率劉裕從徐兗二州刺史安成王桓修入朝朝直遙翻玄謂王謐曰裕風骨不常蓋人傑也每遊集必引接殷勤贈賜甚厚玄后劉氏有智鑒謂玄曰劉裕龍行虎步視瞻不凡恐終不為人下不如早除之玄曰我方平蕩中原非裕莫可用者俟關河平定然後別議之耳玄以桓弘為青州刺史鎮廣陵刁逵為豫州刺史鎮歷陽弘修之弟逵彞之子也刁彞見一百三卷簡文帝咸安二年劉裕與何無忌同舟還京口密謀興復晉室劉邁弟毅家於京口亦與無忌謀討玄無忌曰桓氏強盛其可圖乎毅曰天下自有強弱苟為失道雖強易弱易以豉翻正患事主難得耳謂舉大事難得一人為主天下草澤之中非無英雄也毅曰所見唯有劉下邳裕先領下邳太守故稱之還以告裕遂與毅定謀初太原王元德及弟仲德為苻氏起兵攻燕主垂不克來奔王睿字元德王懿字仲德名犯宣元二帝諱故以字行仲德為燕所敗渡河依段遼自遼所來奔為于僞翻仲德見桓玄稱帝謂人曰自古革命誠非一族然今之起者恐不足以成大事平昌孟昶為青州主簿平昌縣漢屬城陽國魏文帝分城陽立平昌郡後省晉惠帝又立平昌郡其地今屬密州安丘縣界昶丑兩翻玄見而悅之謂劉邁曰素士中得一尚書郎起於白屋者謂之素士寧相識否孟昶平昌人平昌郡屬青州劉邁彭城沛人彭城屬徐州蓋二人並僑居京口故謂之同州里對曰臣在京口不聞昶有異能唯聞父子紛紛更相贈詩耳更工衡翻玄笑而止昶聞而恨之既還京口裕謂昶曰草間當有英雄起卿頗聞乎昶曰今日英雄有誰正當是卿耳於是裕毅無忌元德仲德昶及裕弟道規任城魏詠之任城縣前漢屬東平國後漢章帝元和元年分東平為任城國而任城縣屬焉晉氏南渡省任城郡為任城縣屬高平郡任音壬莞音官相與合謀起兵道規為桓弘中兵參軍裕使毅就道規及昶於江北共殺弘據廣陵長民為刁逵參軍使長民殺逵據歷陽元德扈興厚之在建康使之聚衆攻玄為內應刻期齊發孟昶妻周氏富於財昶謂之曰劉邁毀我於桓公使我一生淪陷我決當作賊卿幸早離絶脫得富貴相迎不晚也周氏曰君父母在堂欲建非常之謀豈婦人所能諫事之不成當於奚官中奉養大家奚如字又胡禮翻周禮注曰古者從坐男女沒入縣官為奴其少才智以為奚今之侍史官婢或曰奚官女此言事若敗沒為官婢當於奚官中養姑晉志奚官令屬少府晉宋間子婦稱其姑曰大家考南史孝義孫棘傳可見義無歸志也昶悵然久之而起悵丑亮翻悵然失志貌周氏追昶坐曰觀君舉措非謀及婦人者不過欲得財物耳因指懷中兒示之曰此而可賣亦當不惜遂傾資以給之昶弟顗妻周氏之從妹也顗魚豈翻從才用翻周氏紿之曰昨夜夢殊不祥紿待亥翻門內絳色物宜悉取以為厭勝厭於涉翻又於檢翻妹信而與之遂盡縫以為軍士袍何無忌夜於屏風裏草檄文其母劉牢之姊也登橙密窺之橙都鄧翻床屬泣曰吾不及東海呂母明矣呂母事見三十八卷王莽天鳳四年吾復何恨問所與同謀者曰劉裕母尤喜因為言玄必敗舉事必成之理以勸之復扶又翻為于僞翻乙卯裕託以遊獵與無忌收合徒衆得百餘人丙辰詰旦京口城開無忌著傳詔服詰去吉翻著側略翻著傳詔之服因自稱敕使稱敕使居前使疏吏翻徒衆隨之齊入即斬桓修以徇修司馬刁弘帥文武佐吏來赴帥讀曰率裕登城謂之曰城謂京口之金城郭江州已奉乘輿返正於尋陽郭江州謂郭昶之也時帝在尋陽裕詭言以誑弘等乘繩證翻誅除逆黨被皮義翻今日賊玄之首已當梟於大航矣梟堅堯翻說文曰日至捕梟磔之以頭掛木上今謂掛首為梟諸君非大晉之臣乎今來欲何為弘等信之收衆而退裕問無忌曰今急須一府主簿何由得之無忌曰無過劉道民道民者東莞劉穆之也晉陵有南東莞郡故穆之居京口莞音官吾亦識之即馳信召焉時穆之聞京口歡噪聲歡許元翻噪當作譟晨起出陌頭屬與信會信使也屬之欲翻使疏吏翻直視注目直視不他屬壞布裳為袴袴脛衣也晉志曰袴褶之制未詳所起近世以為戎服壞音怪裕曰始舉大義方造艱難言造事之初事事艱難也卿謂誰堪其選穆之曰貴府始建軍吏實須其才倉猝之際略當無見踰者裕笑曰卿能自屈吾事濟矣即於坐署主簿坐讀曰座孟昶勸桓弘其日出獵天未明開門出獵人昶與劉毅劉道規帥壯士數十人直入帥讀曰率下同弘方噉粥即斬之因收衆濟江噉徒濫翻裕使毅誅刁弘先是裕遣同謀周安穆入建康報劉邁先悉薦翻邁雖酬許意甚惶懼安穆慮事泄乃馳歸玄以邁為竟陵太守邁欲亟之郡是夜玄與邁書曰北府人情云何卿近見劉裕何所道邁謂玄已知其謀晨起白之玄大驚封邁為重安侯重直龍翻既而嫌邁不執安穆使得逃去乃殺之悉誅元德扈興厚之等衆推劉裕為盟主總督徐州事以孟昶為長史守京口檀憑之為司馬彭城人應募者裕悉使郡主簿劉鍾統之丁巳裕帥二州之衆千七百人二州兗徐也移檄遠近聲言益州刺史毛璩已定荊楚江州刺史郭昶之奉迎主上返正於尋陽鎮北參軍王元德等並帥部曲保據石頭揚武將軍諸葛長民已據歷陽玄移還上宮玄始遷東宮今以裕起移還上宮侍官自侍中下至黃散之屬以殷仲文代桓修為徐兗二州刺史謙等請亟遣兵擊裕玄曰彼兵鋭甚計出萬死若有蹉跌蹉七何翻跌徒結翻則彼氣成而吾事去矣不如屯大衆於覆舟山以待之成帝咸康八年於覆舟山南立北郊山蓋在建康城北也形如覆舟故名無所得鋭氣已挫忽見大軍必驚愕我按兵堅陳勿與交鋒彼求戰不得自然散走此策之上也謙等固請擊之乃遣頓丘太守吳甫之右衛將軍皇甫敷相繼北上自建康趣京口為北上上時掌翻玄憂懼特甚或曰裕等烏合微弱勢必無成陛下何慮之深玄曰劉裕足為一世之雄劉毅家無檐石之儲檐與儋同下都言一儋一石也儲無儋石家貧之至也楊雄家無儋石之儲應劭注曰齊人名小罌為儋石受二斛晉灼曰石斗石也前書音義曰儋言一斗之儲方言曰儋罌也齊東北海岱之間謂之儋余據今江淮人謂一石為一擔樗蒲一擲百萬何無忌酷似其舅共舉大事何謂無成南涼王傉檀畏秦之強乃去年號傉奴沃翻元興元年傉檀改元弘昌去羌呂翻罷尚書丞郎官遣參軍關尚使于秦使疏吏翻秦王興曰車騎獻款稱藩而亶興兵造大城豈為臣之道乎興拜傉檀為車騎將軍故稱之王公設險以守其國易坎卦彖辭車騎僻在遐藩密邇勍寇勍渠京翻蓋為國家重門之防重直龍翻不圖陛下忽以為嫌興善之傉檀求領涼州興不許初袁真殺朱憲見一百二卷海西公太和五年溫克壽陽綽輒發真棺戮其尸溫怒將殺之桓沖請而免之綽事沖如父沖薨綽嘔血而卒卒子恤翻劉裕克京口以綽子齡石為建武參軍裕本為建武將軍以齡石參軍事戊午朔裕軍與吳甫之遇於江乘江乘漢舊縣屬丹楊郡成帝咸康元年桓溫領琅邪太守鎮江乘之蒲洲奏割丹楊之江乘立南琅邪郡江乘縣屬焉齡石言於裕曰齡石世受桓氏厚恩不欲以兵刃相向乞在軍後裕義而許之甫之玄驍將也驍堅堯翻將即亮翻其兵甚鋭裕手執長刀大呼以衝之衆皆披靡呼火故翻披普彼翻即斬甫之進至羅落橋羅落橋在江乘縣南蓋緣水設羅落因以為名帥讀曰率寧遠將軍檀憑之敗死裕進戰彌厲敷圍之數重裕倚大樹挺戰重直龍翻挺戰挺身獨戰也挺他鼎翻直也敷曰汝欲作何死拔戟將刺之裕瞋目叱之敷辟易刺七亦翻瞋七人翻辟讀曰闢易如字裕黨俄至射敷中額而踣射而亦翻中竹仲翻踣蒲北翻裕援刀直進援于元翻敷曰君有天命以子孫為託裕斬之厚撫其孤裕以檀憑之所領兵配參軍檀祗祗憑之之從子也從才用翻玄聞二將死大懼召諸道術人推算及為厭勝將即亮翻厭於叶翻又一琰翻問㣥臣曰朕其敗乎吏部郎曹靖之對曰民怨神怒臣實懼焉玄曰民或可怨神何為怒對曰晉氏宗廟飄泊江濱謂遷晉宗廟主於琅邪國尋又隨帝上尋陽也上不及祖謂止祭桓溫於太廟玄曰卿何不諫對曰輦上君子皆以為堯舜之世臣何敢言玄默然使桓謙及游擊將軍何淡之屯東陵游擊將軍漢雜號將軍也魏置為中軍及晉以領護左右衛驍騎游擊為六軍建康之西有西陵其東有東陵東陵在覆舟山東北淡徒覽翻衆合二萬己未裕軍食畢悉棄其餘糧進至覆舟山東使羸弱登山張旗幟為疑兵羸倫為翻幟昌志翻數道並前布滿山谷玄偵候者還云裕軍四塞偵丑鄭翻塞悉則翻不知多少玄益憂恐遣武衛將軍庾賾之帥精卒副援諸軍魏文帝踐阼置領軍將軍主五校中壘武衛等三營後遂各置將軍賾士革翻素畏伏裕莫有鬬志裕與劉毅等分為數隊進突謙陳裕以身先之陳讀曰陳先悉薦翻將士皆殊死戰無不一當百呼聲動天地時東北風急因縱火焚之煙炎熛天呼火故翻炎讀曰焰熛必遙翻鼓噪之音震動京邑謙等諸軍大潰玄時雖遣軍拒裕而走意已決潛使領軍將軍殷仲文具舟於石頭聞謙等敗帥親信數千人聲言赴戰帥讀曰率下同遂將其子升兄子濬出南掖門遇前相國參軍胡藩執馬鞚諫曰今羽林射手猶有八百皆是義故西人受纍世之恩鞚音控馬勒也桓氏世居荊楚西人皆其義舊此蓋從玄東下玄既篡因以為羽林不驅令一戰一旦捨此欲安之乎玄不對但舉策指天玄舉策指天亦項羽所謂天之亡我之意西趨石頭與仲文等浮江南走經日不食左右進粗飯趨七喻翻粗與粗同玄咽不能下升抱其胸而撫之玄悲不自勝咽於甸翻勝音升裕入建康王仲德抱元德子方回出候裕裕於馬上抱方回與仲德對哭追贈元德給事中以仲德為中兵參軍裕止桓謙故營遣劉鍾據東府庚申裕屯石頭城立留臺百官焚桓溫神主於宣陽門外造晉新主納于太廟桓玄初篡遷七廟神主于琅邪國既而遷帝於尋陽宗廟主祏皆隨帝西上故權造新主尚書王嘏帥百官奉迎乘輿乘繩證翻誅玄宗族在建康者裕使臧熹入宮收圖書器物封閉府庫有金飾樂器裕問熹卿得無欲此乎熹正色曰皇上幽逼播越非所將軍首建大義劬勞王家雖復不肖實無情於樂復扶又翻裕笑曰聊以戲卿耳熹燾之弟也劉裕娶于臧氏壬戌玄司徒王謐與衆議推裕領揚州裕固辭乃以謐為侍中領司徒揚州刺史録尚書事謐推裕為使持節都督揚徐兗豫青冀幽並八州諸軍事徐州刺史使疏吏翻劉毅為青州刺史何無忌為琅邪內史孟昶為丹楊尹劉道規為義昌太守宋永初郡國志安豐有義昌縣蓋晉末嘗立郡宋初廢為縣也裕取義昌美名使道規領太守裕始至建康諸大處分皆委於劉穆之處昌呂翻分扶問翻倉猝立定無不允愜愜苦叶翻動止咨焉穆之亦竭節盡誠無所遺隱時晉政寬弛綱紀不立豪族陵縱小民窮蹙重以司馬元顯政令違舛重直用翻桓玄雖欲釐整而科條繁密衆莫之從穆之斟酌時宜隨方矯正揉曲為矯言隨事矯揉使歸於正先以威禁內外百官皆肅然奉職不盈旬日風俗頓改史言劉裕有撥亂反正之才初諸葛長民至豫州失期不得發刁逵執長民檻車送桓玄至當利而玄敗當利浦名還趣歷陽趣七喻翻逵棄城走為其下所執斬於石頭子姪無少長皆死少詩照翻長知兩翻唯赦其季弟給事中騁逵故吏匿其弟子雍送洛陽刁雍後自秦入魏雍於容翻裕以魏詠之為豫州刺史鎮歷陽諸葛長民為宣城內史初裕名微位薄輕狡無行盛流皆不與相知行下孟翻盛流謂當時貴盛之流惟王謐獨奇貴之謂裕曰卿當為一代英雄裕嘗與刁逵樗蒲不時輸直樗蒲不勝而不即納其所負之直此亦博徒輕狡之常態枊魚浪翻繫馬柱也又五剛翻謐見之責逵而釋之代之還直由是裕深憾逵而德謐蕭方等曰蕭方等梁元帝之嫡長子撰三十國春秋魚蝦褻之是以漢高赦雍齒魏武免梁鵠雍齒事見十一卷漢高帝十一年漢靈帝時梁鵠為選部尚書魏武欲為洛陽令鵠以為北部尉董卓之亂鵠奔劉表魏武破荊州鵠懼而自縛詣門使在祕書以勤書自效雍於用翻乘繩證翻今王謐為公刁逵亡族酬恩報怨何其狹哉尚書左僕射王愈及子荊州刺史綏謀襲裕事泄族誅綏弟子慧龍為僧彬所匿得免慧龍後遂逃奔秦又自秦奔魏魏以中土蕭條詔縣戶不滿百者罷之丁卯劉裕還鎮東府桓玄至尋陽郭昶之給其器用兵力辛未玄逼帝西上上時掌翻劉毅帥何無忌劉道規等諸軍追之帥讀曰率玄留龍驤將軍何淡之前將軍郭銓與郭昶之守湓口驤思將翻淡徒覽翻昶丑兩翻湓蒲奔翻玄於道自作起居注杜佑通典曰周官有左右史蓋今起居注之本動則左史書之言則右史書之左史記言右史記事漢武帝有禁中起居注後漢馬皇后撰明帝起居注則漢起居注似在宮中為女史之任其後起居皆近侍之臣録記也歷代有其職而無其官後魏始置起居令史每行幸宴會則在御左右記録帝言後又別置修起居注自謂經略舉無遺策諸軍違節度以致奔敗專覃思著述覃深也廣也思相吏翻起居注既成宣示遠近丙戌劉裕稱受帝密詔以武陵王遵承制總百官行事加侍中大將軍因大赦惟桓玄一族不宥劉敬宣高雅之結青州大姓及鮮卑豪帥謀殺南燕王備德帥所類翻推司馬休之為主備德以劉軌為司空甚寵信之雅之欲邀軌同謀敬宣曰劉公衰老有安齊之志不可告也雅之卒告之卒子恤翻軌不從謀頗泄敬宣等南走南燕人收軌殺之追及雅之又殺之敬宣休之至淮泗間聞桓玄敗遂來歸敬宣等奔南燕事見上卷元興元年南燕主備德聞桓玄敗命北地王鍾等將兵欲取江南會備德有疾而止昔魯莊公伐齊納子糾小白自莒先入所以有乾時之敗當此之時建康已定使慕容鍾等之師果進劉裕固有以待之矣將即亮翻夏四月己丑武陵王遵入居東宮內外畢敬遷除百官稱制書教稱令書以司馬休之監荊益梁寧秦雍六州諸軍事領荊州刺史劉毅等之兵既進故預以休之鎮南蕃監工銜翻雍於用翻庚寅桓玄挾帝至江陵桓石康納之玄更署置百官以卞範之為尚書僕射自以奔敗之後恐威令不行乃更增峻刑罰衆益離怨殷仲文諫玄怒曰今以諸將失律天文不利故還都舊楚而㣥小紛紛妄興異議方當糾之以猛未可施之以寬也荊江諸郡聞玄播越有上表奔問起居者玄皆不受更令所在賀遷新都唐人所謂難將一人手掩盡天下目桓玄是也初王謐為玄佐命元臣玄之受禪禪時戰翻謐手解帝璽綬璽斯氏翻綬音受及玄敗衆謂謐宜誅劉裕特保全之劉毅嘗因朝會問謐璽綬所在璽斯氏翻綬音受朝直遙翻謐內不自安逃奔曲阿劉昫曰唐潤州丹楊縣古曲阿縣地迎還復位桓玄兄子歆引氐帥楊秋寇歷陽帥所類翻魏詠之帥諸葛長民劉敬宣劉鍾共擊破之帥讀曰率下同斬楊秋於練固練固在歷陽西北玄使武衛將軍庾稚祖江夏太守桓道恭帥數千人就何淡之等共守湓口何無忌劉道規至桑落洲桑落洲在湓城東北大江中杜佑曰桑落洲在江州都昌縣漢之彭澤縣也庚戌淡之等引舟師逆戰淡之常所乘舫舫甫妄翻方舟也羽儀旗幟甚盛幟昌志翻無忌曰賊帥必不居此帥所類翻欲詐我耳宜亟攻之衆曰淡之不在其中得之無益無忌曰今衆寡不敵戰無全勝淡之既不居此舫戰士必弱我以徑兵攻之必得之得之則彼勢沮而我氣倍因而薄之破賊必矣沮在呂翻道規曰善遂往攻而得之因傳呼曰已得何淡之矣淡之軍中驚擾無忌之衆亦以為然乘勝進攻淡之等大破之無忌等克湓口進據尋陽遣使奉送宗廟主祏還京師祏音石廟中臧木主石室也既克尋陽宗廟主祏乃得還加劉裕都督江州諸軍事桑落之戰胡藩所乘艦為官軍所燒藩全鎧入水潛行三十許步乃得登岸艦戶黯翻鎧苦亥翻時江陵路已絶官軍既克尋陽故江陵之路絶劉裕素聞藩為人忠直引參領軍軍事桓玄收集荊州兵曾未三旬有衆二萬樓船器械甚盛甲寅玄復帥諸軍挾帝東下以苻宏領梁州刺史為前鋒又使散騎常侍徐放先行說劉裕等曰若能旋軍散甲當與之更始各授位任令不失分復扶又翻說輸芮翻更工衡翻分扶問翻劉裕以諸葛長民都督淮北諸軍事鎮山陽以劉敬宣為江州刺史柔然可汗社崙從弟悅代大冉謀殺社崙崙盧昆翻從才用翻冉與那同奴何翻不克奔魏燕王熙於龍騰苑起逍遙宮連房數百鑿曲光海盛夏士卒不得休息暍死者太半去年熙起龍騰苑暍於歇翻傷暑也西涼世子談卒劉毅何無忌劉道規下邳太守平昌孟懷玉帥衆自尋陽西上帥讀曰率上時掌翻五月癸酉與桓玄遇於崢嶸洲水經注江水東過武口又東右得李姥浦北對崢嶸洲劉毅破桓玄處在今黃州壽昌軍之間杜佑曰崢嶸洲在鄂州武昌縣崢仕耕翻嶸戶萌翻而玄戰士數萬衆憚之欲退還尋陽道規曰不可彼衆我寡強弱異勢今若畏懦不進必為所乘雖至尋陽豈能自固玄雖竊名雄豪內實恇怯恇曲陽翻亦怯也加之已經奔敗衆無固心決機兩陳將雄者克將即亮翻不在衆也因麾衆先進毅等從之玄常漾舸於舫側以備敗走舸古我翻由是衆莫有鬬心毅等乘風縱火盡鋭爭先玄衆大潰燒輜重夜遁重直用翻郭銓詣毅降玄故將劉統馮稚等聚黨四百人襲破尋陽城降戶江翻將即亮翻毅遣建威將軍劉懷肅討平之懷肅懷敬之弟也劉懷敬見一百一十一卷隆安三年玄挾帝單舸西走留永安何皇后及王皇后於巴陵永安何皇后穆帝章皇后也王皇后帝之后也求出別船收集散卒因叛玄奉二后奔夏口夏戶雅翻遂還建康己卯玄與帝入江陵馮該勸使更下戰玄不從欲奔漢中就桓希桓希時為梁州刺史號令不行沮在呂翻庚辰夜中處分欲發處昌呂翻分扶問翻城內已亂乃與親近腹心百餘人乘馬出城西走至城門左右於暗中斫玄不中不中竹仲翻其徒更相殺害更工衡翻前後交橫玄僅得至船左右分散惟卞範之在側辛巳荊州別駕王康産奉帝入南郡府舍太守王騰之帥文武為侍衛帥讀曰率下同玄將之漢中屯騎校尉毛修之璩之弟子也誘玄入蜀玄從之誘音酉寧州刺史毛璠璠音繁璩之弟也卒於官璩使其兄孫祐之及參軍費恬帥數百人送璠喪歸江陵費扶沸翻壬午遇玄於枚回洲水經注江水徑江陵縣南有洲曰枚回洲矢下如雨玄嬖人丁仙期萬蓋等以身蔽玄皆死嬖卑義翻又博計翻益州督護漢嘉馮遷抽刀前欲擊玄玄拔頭上玉導與之魏晉以來冠幘有簪有導至尊以玉為之導引也所以引髮入冠幘之內也汝何人敢殺天子遷曰我殺天子之賊耳遂斬之又斬桓石康桓濬庾賾章甲十一行本賾作頤乙十一行本同退齊校同賾士革翻之執桓升送江陵斬於市乘輿返正於江陵以毛修之為驍騎將軍乘繩證翻驍堅堯翻騎奇寄翻甲申大赦諸以畏逼從逆者一無所問戊寅奉神主于太廟納尋陽所奉送宗廟主祏也梟于大桁傳株戀翻梟堅堯翻毅等既戰勝以為大事已定不急追躡又遇風船未能進玄死幾一旬幾居希翻又音祈諸軍猶未至時桓謙匿於沮中沿沮水上下為沮中臨沮上黃二縣皆其地也沮子余翻華容縣自漢以來屬南郡水經注江水左迤為中夏口右則中郎浦出焉華容縣今在監利縣界晉書振傳曰匿於華容之涌中左傳閻敖游涌而逸杜預注云涌水在南郡華容縣涌音勇遣人報振云桓歆已克京邑馮稚復克尋陽將即亮翻復扶又翻下復陷同劉毅諸軍並中路敗退振大喜聚黨得二百人襲江陵桓謙亦聚衆應之閏月己丑復陷江陵殺王康産王騰之掁見帝於行宮躍馬奮戈直至階下問桓升所在聞其已死瞋目謂帝曰瞋七人翻臣門戶何負國家而屠滅若是琅邪王德文下牀謂曰此豈我兄弟意邪振欲殺帝謙苦禁之乃下馬斂容致拜而出壬辰振為玄舉哀立喪庭諡曰武悼皇帝為于僞翻癸巳謙等帥㣥臣奉璽綬於帝曰帥讀曰率主上法堯禪舜今楚祚不終百姓之心復歸於晉矣以琅邪王德文領徐州刺史振為都督八郡諸軍事荊州刺史謙復為侍中衛將軍加江豫二州刺史帝侍御左右皆振之腹心振少薄行玄不以子妷齒之行下孟翻以年敍長幼為齒又齒列也言不使預子姪之列至是歎曰公昔不早用我遂致此敗若使公在我為前鋒天下不足定也今獨作此安歸乎遂縱意酒色肆行誅殺謙勸振引兵下戰己守江陵振素輕謙不從其言劉毅至巴陵誅王稚徽何無忌劉道規進攻桓謙於馬頭馬頭岸在大江南岸北對江津口水經注靈溪之東有龍陂廣員二百餘步水至淵深有龍見于其中故曰龍陂蔚祕之子也桓祕見一百三卷孝武寧康元年無忌欲乘勝直趣江陵趣七喻翻道規曰兵法屈申有時不可苟進諸桓世居西楚㣥小皆為竭力振勇冠三軍為于僞翻冠古玩翻難與爭鋒且可息兵養鋭徐以計策縻之不憂不克無忌不從振逆戰於靈溪水經注江水自江陵縣南東徑燕尾洲北合靈溪水江溪之會有靈溪戍背阿面江西帶靈溪無忌等大敗死者千餘人退還尋陽與劉毅等上箋請罪上時掌翻劉裕以毅節度諸軍免其青州刺史桓振以桓蔚為雍州刺史鎮襄陽雍於用翻柳約之羅述甄季之聞桓玄死自白帝進軍至枝江枝江縣自漢以來屬南郡我朝省為鎮屬松滋縣甄之人翻亦引兵退俄而述季之皆病約之詣桓振僞降欲謀襲振事泄振殺之約之司馬時延祖時姓也保涪陵處昌呂翻涪音浮六月毛璩遣將攻漢中斬桓希璩自領梁州秋七月戊申永安皇后何氏崩燕苻昭儀有疾龍城人王榮自言能療之昭儀卒卒子恤翻燕王熙立榮於公車門支解而焚之八月癸酉葬穆章皇后于永平陵魏置六謁官準古六卿九月刁騁謀反伏誅刁氏遂亡刁逵之誅惟赦騁而雍得逃走投北騁又誅則江南之刁氏亡矣奴客縱橫橫戶孟翻專固山澤為京口之患劉裕散其資蓄令民稱力而取之稱尺證翻彌日不盡時州郡饑弊民賴之以濟乞伏乾歸及楊盛戰于竹嶺上邽西南有南山竹嶺敗補邁翻西涼公皓立子歆為世子皓古老翻魏主圭臨昭陽殿改補百官引朝臣文武親加銓擇隨才授任朝直遙翻列爵四等王封大郡公封小郡侯封大縣伯封小縣其品第一至第四舊臣有功無爵者追封之宗室疏遠及異姓襲封者降爵有差又置散官五等其品第五至第九散悉亶翻其品亦比第五至第九將即亮翻帥所類翻百官有闕則取於其中以補之其官名多不用漢魏之舊倣上古龍官鳥官左傳郯子曰昔太皞氏以龍紀故為龍師而龍名我高祖少皞摯之立也鳳鳥適至故為鳥師而鳥名鳳鳥氏曆正也玄鳥氏司分者也伯趙氏司至者也青鳥氏司啓者也丹鳥氏司閉者也祝鳩氏司徒也且鳥鳩氏司馬也鳲鳩氏司空也爽鳩氏司寇也鶻鳩氏司事也五鳩鳩民者也五雉為五工正九扈為九農正杜預注曰太皡氏有龍瑞故以龍名官應劭曰以龍紀其官長春官為青龍夏官為赤龍秋官為白龍冬官為黑龍中官為黃龍張晏曰庖犧將興神龍負圖而至因以名官與師也魏書官氏志作諸曹走使謂候官伺察者為白鷺取其延頸遠望也餘皆類此盧循寇南海攻番禺番音潘禺音愚廣州刺史濮陽吳隱之拒守百餘日濮博木翻冬十月壬戌循夜襲城而陷之燒府舍民室俱盡執吳隱之循自稱平南將軍攝廣州事聚燒骨為共冢葬於洲上得髑髏三萬餘枚髑徒谷翻髏郎侯翻說文曰髑髏頂也又使徐道覆攻始興吳孫晧甘露元年分桂陽南部都尉立始興郡唐為韶州相息亮翻腆他典翻劉裕領青州刺史劉毅免青州裕自領之劉敬宣在尋陽聚糧繕船未嘗無備故何無忌等雖敗退賴以復振復扶又翻下復自同桓玄兄子亮自稱江州刺史寇豫章敬宣擊破之劉毅何無忌劉道規復自尋陽西上至夏口夏戶雅翻桓振遣鎮東將軍馮該守東岸揚武將軍孟山圖據魯山城輔國將軍桓仙客守偃月壘衆合萬人水陸相援毅攻魯山城道規攻偃月壘無忌遏中流自辰至午二城俱潰漢水與江會于魯山西南漢水之左有卻月城亦曰偃月壘故曲陵縣也後更為沙羡縣治該走石城走音奏竟陵縣古石城戍也郢州圖經曰子城三面墉基皆天造正西絶壁下臨漢江石城之名蓋本於此辛巳魏大赦改元天賜築西宮十一月魏主圭如西宮命宗室置宗師八國置大師小師州郡亦各置師以辨宗黨舉才行如魏晉中正之職魏書官氏志曰以八國姓族難分故國立大師小師令辨其宗黨品舉人才自八國以外郡各立師職分如八國比今之中正也宗室立宗師亦如州郡八國之職行下孟翻燕王熙與苻后遊畋北登白鹿山東踰青嶺水經注大遼水東南過遼東郡房縣西又右會白狼水水出右北平白狼縣東南北屈徑白鹿山西即白狼山也青嶺即青陘在龍城東南四百餘里魏收地形志建德郡石城縣有白鹿山祠滄海在遼西郡海陽縣南還從宣翻又如字十二月劉毅等進克巴陵毅號令嚴整所過百姓安悅劉裕復以毅為兗州刺史桓振以桓放之為益州刺史屯西陵文處茂擊破之放之走還江陵高句麗侵燕句如字又音駒麗力知翻戊辰魏主圭如豺山宮是歲晉民避亂襁負之淮北者道路相屬襁居兩翻屬之欲翻聶崇岐標點王崇武覆校
