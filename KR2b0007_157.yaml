body:
  text: 資治通鑑卷第一百五十七端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注梁紀十三高祖武皇帝十三大同元年乙卯五三五春正月戊申朔大赦改元是日魏文帝即位於城西城西長安城西也古者天子即位御前殿魏自高歡立孝武帝復用夷禮於郊拜天而後即位改元大統追尊父京兆王為文景皇帝妣楊氏為皇后魏渭州刺史可朱渾道元先附侯莫陳悅悅死悅死見上卷中大通六年不能克與盟而罷道元世居懷朔與東魏丞相歡善又母兄皆在鄴由是常與歡通泰欲擊之道元帥所部三千戶西北渡烏蘭津抵靈州烏蘭津在平涼西北唐分平涼之會寧鎮置會州又置烏蘭縣屬焉縣西南有烏蘭關帥讀曰率歡聞之遣資糧迎候拜車騎大將軍騎奇寄翻道元至晉陽歡始聞孝武帝之喪魏孝武去年十二月殂東魏主使㣥臣議之太學博士潘崇和以為君遇臣不以禮則無反服記檀弓魯繆公問於子思曰為舊君反服古與子思曰古之君子進人以禮退人以禮故有舊君反服之禮也今之君子進人若將加諸膝退人若將隊諸淵毋為戎首不亦善乎又何反服之禮之有孟子齊宣王曰禮為舊君有服何如斯可為之服矣孟子曰諫行言聽膏澤下於民有故而去則君使人導之出疆又先之於其所往去三年不反然後收其田里此之謂三有禮焉如此則為之服矣今也為臣諫則不行言則不聽膏澤不下於民有故而去則君搏執之又極之於其所往去之日遂收其田里此之謂寇讎寇讎何服之有周武之民不服紂國子博士衛既隆李同軌議以為高后於永熙離絶未彰宜為之服東魏從之歡初立孝武納其長女以為皇后帝之西奔后留不從魏驍騎大將軍儀同三司李虎等招諭費也頭之衆與之共攻靈州凡四旬曹泥請降驍堅堯翻騎奇寄翻降戶江翻己酉魏進丞相略陽公泰為都督中外諸軍録尚書事大行臺封安定王泰固辭王爵及録尚書乃封安定公以尚書令斛斯椿為太保廣平王贊為司徒乙卯魏主立乙弗氏為皇后乙弗之先世為吐谷渾渠帥居青海即禿髮傉儃所襲者也魏平涼州后之高祖莫王褱擁部落入附其後從孝文遷洛遂家焉后仁恕節儉不妬忌帝甚重之以魏文帝之重乙弗后而卒迫於強敵使后不得其死悲夫稽胡劉蠡升自孝昌以來自稱天子改元神嘉居雲陽谷李延壽曰稽胡一曰步落稽蓋胸奴別種劉元海五部之苗裔也或云山戎赤狄之後自離石以西安定以東方七八百里居山谷間種落繁熾謂之胡荒言其本胡種侵擾漢民若在荒服之外者也被皮義翻壬戌東魏丞相歡襲擊大破之勃海世子澄通於歡妾鄭氏歡封勃海王以澄為世子歸自襲稽胡二婢為證歡杖澄一百而幽之婁亦隔絶不得見歡納魏敬宗之后爾朱氏有寵生子浟浟夷周翻歡欲立之澄求救於司馬子如子如入見歡僞為不知者請見婁歡告其故子如曰消難亦通子如妾此事正可掩覆難乃旦翻覆敷又翻是王結髮婦常以父母家財奉王程正叔曰古人言結髮為夫婦如言結髮事君結髮戰胸奴只言初上頭時也豈謂合髻子邪按婁本傳少見歡在城上執役慕之使婢通意又數致私財使以聘己父母不得已而許焉背無完皮晝夜供侍後避葛賊葛賊謂葛榮也貧困然馬矢然與燃同隋志靴胡履也取便於事施於戎服夫婦相宜女配至尊二女長配孝武帝次配孝靜帝謂澄為世子也何宜搖動弟昭時為領軍將軍況婢言不必信邪歡因使子如更鞫之子如見澄尤之曰男兒何意畏威自誣因教二婢反其辭反音翻脅告者自縊縊於賜翻又於計翻乃啓歡曰果虛言也歡大悅召婁及澄遙見歡一步一叩頭澄且拜且進父子夫婦相泣復如初復扶又翻歡置酒曰全我父子者司馬子如也賜之黃金百三十斤甲子魏以廣陵王欣為太傅儀同三司万俟壽洛干為司空万莫北翻俟渠之翻壽洛干即受洛干己巳東魏以丞相歡為相國假黃鉞殊禮固辭東魏大行臺尚書司馬子如帥大都督竇泰太州刺史韓軌等攻潼關按韓軌傳為秦州刺史又考魏收志東魏置秦州於河東領河東北鄉二郡史蓋誤以秦為泰緣泰之誤又以泰為太帥讀曰率子如與軌回軍從蒲津宵濟攻華州五代志後魏置東雍州於鄭縣西魏改曰華州華戶化翻梯倚城外比曉東魏人乘梯而入刺史王羆臥尚未起聞閣外胸胸有聲比必利翻胸許容翻胸胸喧擾之聲袒身露髻徒跣持白梃大呼而出梃待鼎翻杖也白梃即今人所謂白棓也呼火故翻東魏人見之驚卻羆逐至東門左右稍集合戰破之子如等遂引去兵以氣勢為用兵之勇怯恃主帥以為氣勢王羆勇於赴敵而其左右又勇於戰此其所以於不備不虞之中而能卻敵也二月辛巳上祀明堂壬午東魏以咸陽王坦為太傅西河王悰為太尉悰徂宗翻東魏使尚書右僕射高隆之發十萬夫撤洛陽宮殿運其材入鄴丁亥上耕藉田東魏儀同三司婁昭等攻兗州樊子鵠使前膠州刺史嚴思達守東平魏收志泰常中置東平郡太和末罷建義中復置治秦城屬濟州秦城在范縣界遂引兵圍瑕丘久不下昭以水灌城己丑大野拔見子鵠計事因斬其首以降始子鵠以衆少降戶江翻少詩沼翻悉驅老弱為兵子鵠死各散走諸將勸婁昭盡捕誅之昭曰此州不幸橫被殘賊跂望官軍以救塗炭橫戶孟翻跂去智翻舉踵也今復誅之復扶又翻下衆復同民將誰訴皆捨之戊戌司州刺史陳慶之伐東魏與豫州刺史堯雄戰不利而還東魏豫州治汝南堯姓雄名三月辛酉東魏以高盛為太尉高敖曹為司徒濟陰王暉業為司空濟子禮翻東魏丞相歡僞與劉蠡升約和許以女妻其太子妻七細翻下后妻同蠡升不設備歡舉兵襲之辛酉蠡升北部王斬蠡升首以降降戶江翻餘衆復立其子南海王歡進擊擒之俘其皇后諸王公卿以下四百餘人華夷五萬餘戶壬申歡入朝于鄴朝直遙翻以孝武帝后妻彭城王韶孝武帝后歡長女也魏丞相泰以軍旅未息吏民勞弊命所司斟酌古今可以便時適治者為二十四條新制奏行之治直吏翻泰用武功蘇綽為行臺郎中魏收志太和十一年分扶風置武功郡屬岐州即漢魏武功縣之地泰未之知也而臺中皆稱其能有疑事皆就決之就蘇綽以決疑也此就即孟子欲有謀焉則就之之就惠達不能對請出議之出以告綽綽為之區處為于為翻處昌呂翻惠達入白之泰稱善曰誰與卿為此議者惠達以綽對且稱綽有王佐之才泰乃擢綽為著作郎泰與公卿如昆明池觀漁行至漢故倉池水經注泬水枝渠至章門西飛渠引水入城東為倉池池在未央宮西池有漸臺漢兵起王莽死於此臺蘇綽傳亦云行至長安城西漢故倉池莫有知者泰召綽問之具以狀對泰悅因問天地造化之始歷代興亡之迹綽應對如流泰與綽並馬徐行至池竟不設網罟而還意在問綽不在觀漁還從宣翻又如字問以政事臥而聽之綽指陳為治之要治直吏翻泰起整衣危坐不覺膝之前席初臥而聽繼起而整衣危坐又不覺膝之前席蓋綽之言深有以當泰心久而愈敬也天曉為曙謂周惠達曰蘇綽真奇士吾方任之以政詰去吉翻即拜大行臺左丞參典機密自是寵遇日隆綽始制文案程式朱出墨入及計帳戶籍之法計帳者具來歲課役之大數以報度支戶籍者戶口之籍世有有為之主必有能者出為之用若謂天下無才吾不信也東魏以封延之為青州刺史代侯淵淵既失州任而懼行及廣川沈約曰廣川縣本屬信都後漢屬清河魏屬勃海晉還清河江左僑立廣川郡縣於濟南非舊所也魏收曰齊郡廣川縣有牛山齊桓公冢管仲冢五代志齊州長山縣舊置廣川郡夜襲青州南郭劫掠郡縣夏四月丞相歡使濟州刺史蔡俊討之濟子禮翻淵部下多叛淵欲南奔於道為賣漿者所斬送首於鄴元慶和攻東魏城父魏收志陳留郡浚儀縣有城父城至隋改浚儀為城父縣屬譙郡五代志譙郡城父縣宋置浚儀縣又考沈約志陳留浚儀縣並寄治譙郡長垣縣界則知諸志所謂浚儀非我朝開封府之浚儀也魏收志梁州陳留郡浚儀縣則我朝開封之浚儀也真宗改浚儀曰祥符所謂城父則今亳州之城父縣是也父音甫竇泰帥三萬人趣城父侯景帥三萬人趣彭城帥讀曰率趣七喻翻以任祥為東南道行臺僕射節度諸軍任音壬五月魏加丞相泰柱國即柱國大將軍之官元慶和引兵逼東魏南兗州東魏洛州刺史韓賢拒之東魏既遷鄴以洛陽為洛州領洛陽河陰新安中川河南陽城郡慶和攻南頓豫州刺史堯雄破之秋七月甲戌魏以開府儀同三司念賢為太尉万俟壽洛干為司徒開府儀同三司越勒肱為司空越勒出於越勒部因以為姓益州刺史鄱陽王範南梁州刺史樊文熾五代志普安郡梁置南梁州後改為安州西魏改曰始州至唐改始州曰劍州魏東益州刺史傅敬和來降降戶江翻範恢之子鄱陽王恢費之子上之弟也豎眼之子也傅豎眼著功梁益而子為降虜隤其家聲忽諸豎而庾翻魏下詔數高歡二十罪數所具翻且曰朕將親總六軍與丞相掃除凶醜歡亦移檄於魏謂宇文黑獺斛斯椿為逆徒且言今分命諸將領兵百萬刻期西討將即亮翻東魏遣行臺元晏擊元慶和或告東魏司空濟陰王暉業與七兵尚書薛琡二於魏曹魏置五兵尚書謂中兵外兵騎兵別兵都兵也及晉分中兵外兵為左右與舊五兵為七曹然尚書唯置五兵而已無七兵尚書之名至後魏始有七兵尚書北齊復為五兵琡昌六翻濟子禮翻辛卯執送晉陽皆免官時東魏丞相歡居晉陽執送二人取其裁決春秋晉為方伯執列國君臣之違命者歸之京師經猶貶之況自京師而執送晉陽乎甲午東魏發民七萬六千人作新宮於鄴使僕射高隆之與司空胄曹參軍辛術共營之元魏公府有法墨田水鎧胄集士等曹皆行參軍也術琛之子也辛琛見一百四十七卷天監六年琛丑林翻趙剛自蠻中往見東魏東荊州刺史趙郡李愍勸令附魏愍從之剛由是得至長安丞相泰以剛為左光祿大夫剛說泰召賀拔勝獨孤信等於梁剛沒蠻中勝信奔梁並見上卷上年說式芮翻九月丁巳東魏以開府儀同三司襄城王旭為司空旭吁玉翻冬十月魏太師上黨文宣王長孫稚卒長知兩翻魏秦州刺史王超世丞相泰之內兄也母黨以兄弟齒謂之內兄內弟泰奏請加法詔賜死十一月丁未侍中中衛將軍徐勉卒卒子恤翻勉雖骨鯁不及范雲亦不阿意苟合故梁世言賢相者稱范徐云范徐既沒專任朱梁殆矣癸丑東魏主祀圜丘甲午東魏閶闔門災門之初成也高隆之乘馬遠望謂其匠曰西南獨高一寸量之果然高居奧翻量音良太府卿任欣集自矜其巧不肯改任音壬隆之恨之至是譖於丞相歡曰欣集潛通西魏令人故燒之歡斬之北梁州刺史蘭欽引兵攻南鄭梁以南鄭為北梁州蓋以欽為刺史使之圖南鄭也降戶江翻考異曰典略在七月今從梁帝紀東魏以丞相歡之子洋為驃騎大將軍開府儀同三司封太原公洋音羊又音祥驃匹妙翻騎奇寄翻下同洋內明決而外如不慧兄弟及衆人皆嗤鄙之嗤丑之翻獨歡異之謂長史薛琡曰此兒識慮過吾幼時歡嘗欲觀諸子意識使各治亂絲治直之翻下同洋獨抽刀斬之曰亂者必斬又各配兵四出使都督彭樂帥甲騎僞攻之兄澄等皆怖橈帥讀曰率怖普布翻橈奴教翻洋獨勒衆與樂相格樂免胄言情猶擒之以獻初大行臺右丞楊愔從兄岐州刺史幼卿以直言為孝武帝所殺愔於今翻從才用翻愔同列郭秀害其能恐之曰高王欲送卿於帝所愔懼變姓名逃於田橫島五代志東萊郡即墨縣有田橫