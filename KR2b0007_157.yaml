我急擊泰必可擒也擒泰則歡勢自沮沮在呂翻回師擊之可以決勝丞相泰曰此吾心也乃聲言欲保隴右辛亥謁魏主而潛軍東出癸丑旦至小關竇泰猝聞軍至自風陵渡丞相泰出馬牧澤水經注曰桃林之塞湖水出焉其中多野馬三秦記曰桃林塞在長安東四百里若有軍馬經過則牧華山休息林下馬牧澤蓋即此地也大破之士衆皆盡竇泰自殺傳首長安丞相歡以河冰薄不得赴救撤浮橋而退儀同代人薛孤延為殿通志略作薩孤復姓殿丁練翻章甲十一行本日下有之中二字乙十一行本同孔本同張校同退齊校同斫十五刀折乃得免折而設翻丞相泰亦引軍還此一段皆書丞相泰所以別竇泰也歷考前後高歡宇文泰皆書丞相於此尤為有別高敖曹自商山轉鬬而進杜佑曰商山在商州上洛縣遂攻上洛郡人泉嶽及弟猛略與順陽人杜窋等謀翻城應之窋竹律翻又丁骨翻洛州刺史泉企知之此魏太和中所改洛州也治上洛時屬西魏企字思道音去智翻杜窋走歸敖曹敖曹以為鄉導而攻之敖曹被流矢通中者三鄉讀曰嚮被皮義翻中竹仲翻殞絶良久復上馬免胄巡城企固守旬餘二子元禮仲遵力戰拒之仲遵傷目不堪復戰城遂陷企見敖曹曰吾力屈非心服也敖曹以杜窋為洛州刺史敖曹創甚復扶又翻創初良翻曰恨不見季式作刺史季式敖曹弟也即以季式為濟州刺史敖曹欲入藍田關唐志京兆藍田縣有藍田關故嶢關也濟子禮翻竇泰軍沒人心恐動宜速還路險賊盛拔身可也敖曹不忍棄衆力戰全軍而還以泉企泉元禮自隨泉仲遵以傷重不行企私戒二子曰吾餘生無幾汝曹才器足以立功勿以吾在東遂虧臣節元禮於路逃還泉杜雖皆為土豪鄉人輕杜而重泉元禮仲遵陰結豪右襲窋殺之魏以元禮世襲洛州刺史東魏丞相歡將兵二十萬自壺口趣蒲津二月丁亥上耕藉田藉秦昔翻東魏丞相歡將兵二十萬自壺口趣蒲津己丑以尚書左僕射何敬容為中權將軍中權將軍二百四十號之一也右僕射謝舉為右光祿大夫東魏丞相歡將兵二十萬自壺口趣蒲津魏槐里獲神璽槐里縣漢屬扶風晉屬始平郡後魏復屬扶風璽斯氏翻東魏丞相歡將兵二十萬自壺口趣蒲津三月辛未東魏遷七帝神主入新廟七帝道武明元太武文成獻文孝文宣武東魏丞相歡將兵二十萬自壺口趣蒲津魏斛斯椿卒時斛斯椿為魏太傅按椿居爾朱高歡之間以智數間搆其君臣之際爾朱氏既為所夷而高歡亦不能制也及入關之後與宇文泰同列若無能為者權不在己無以舞弄其智數也東魏丞相歡將兵二十萬自壺口趣蒲津夏五月魏以廣陵王欣為太宰賀拔勝為太師東魏丞相歡將兵二十萬自壺口趣蒲津六月魏以扶風王孚為太保梁景睿為太傅廣平王贊為太尉開府儀同三司武川王盟為司空東魏丞相歡將兵二十萬自壺口趣蒲津東魏丞相歡遊汾陽之天池水經注太原汾陽縣北燕京山上有大池池在山原之上世謂之天池方里餘其水澄渟鏡淨而不流隱起成文曰六王三川以問行臺郎中陽休之對曰六者大王之字歡字賀六渾故云然當王天下河洛伊為三川涇渭洛亦為三川涇渭洛之洛指關中之洛水今徑鄜坊同三州而入于渭當王于況翻終應奄有關洛歡曰世人無事常言我反況聞此乎慎勿妄言休之固之子也陽固事魏孝文帝嘗從劉昶南伐歡舉杖擊走之高歡之志蓋如曹操所謂吾為周文王者非真無移魏鼎之心也間古莧翻東魏丞相歡將兵二十萬自壺口趣蒲津東魏遣兼散騎常侍李諧來聘以吏部郎盧元明通直侍郎李業興副之通直侍郎即通直散騎侍郎散悉亶翻騎奇寄翻平之孫李平崇之從弟事孝文宣武昶之子也盧昶盧玄之孫七月諧等至建康上引見與語見賢遍翻應對如流諧等出上目送之謂左右曰朕今日遇勍敵勍其京翻卿輩嘗言北間全無人物此等何自而來是時鄴下言風流者以諧及隴西李神俊范陽盧元明北海王元景弘農楊遵彥清河崔贍為首贍而豔翻神俊名挺寶之孫李寶自敦煌歸魏其後貴盛憲之曾孫也王憲猛之孫皇始中歸魏贍㥄之子也㥄力膺翻時南北通好好呼到翻務以俊乂相誇銜命接客必盡一時之選銜命奉使者也接客主客也與讀曰預每梁使至鄴使疏吏翻下同鄴下為之傾動貴勝子弟盛飾聚觀禮贈優渥館門成市宴日高澄常使左右覘之一言制勝澄為之拊掌魏使至建康亦然兩國通使各務夸矜以見所長自古然矣昭奚恤之事猶可以服覘國者之心為于僞翻覘丑廉翻又丑豔翻東魏丞相歡將兵二十萬自壺口趣蒲津獨孤信求還北上許之信父母皆在山東魏孝武西遷信棄父母追從之信曰事君者不敢顧私親而懷二心上以為義禮送甚厚信與楊忠皆至長安上書謝罪魏以信有定三荊之功定三荊見上卷中大通六年加侍中開府儀同三司餘官爵如故驃匹妙翻騎奇寄翻丞相泰愛楊忠之勇留置帳下東魏丞相歡將兵二十萬自壺口趣蒲津魏宇文深勸丞相泰取恆農八月丁丑泰帥李弼等十二將伐東魏以北雍州刺史于謹為前鋒攻盤豆拔之恆戶登翻帥讀曰率將即亮翻雍於用翻五代志雍州華原縣後魏置北雍州恆農湖城閺鄉之西有皇天原原西有盤豆城戊子至恆農庚寅拔之擒東魏陝州刺史李徽伯魏收志太和十一年置陝州治陝城帶恆農郡領西恆農澠池石城河北郡陝式冉翻時河北諸城多附東魏左丞楊檦自言父猛嘗為邵郡白水令左丞行臺左丞也魏收志皇興四年置邵郡治白水縣五代志絳郡垣縣後魏置邵郡及白水縣裴慶孫傳邵郡治陽胡城去軹關二百餘里孔穎達曰垣縣有召亭因以名郡宋白曰絳州垣縣其地即周召分陝之所今縣東六十里有邵原祠廟與古棠樹春秋襄二十三年齊侯伐晉取朝歌入孟門登太行張武軍於熒庭戍郫邵後魏獻文四年置邵州檦與標同請往說之以取邵郡說式芮翻下諜說同泰許之檦乃與土豪王覆憐等舉兵收邵郡守程保及縣令四人斬之表覆憐為郡守守式又翻遣諜說諭東魏城堡旬月之間歸附甚衆諜達協翻東魏以東雍州刺史司馬恭鎮正平正平本漢晉之臨汾縣地魏真君七年分置太平縣神䴥元年改為正平太和十八年置正平郡帶聞喜縣屬東雍州杜佑曰絳州治正平縣恭棄城走泰以楊檦行正平郡事東魏丞相歡將兵二十萬自壺口趣蒲津上修長干寺阿育王塔出佛爪髮舍利辛卯上幸寺設無礙食今建康府上元縣有長干里去縣五里李白長干行所謂同居長干里乃秣陵縣東里巷江東謂山壠之間曰干僧家載國事曰佛泥洹後天人以新白緤裹佛以香花供養滿七日盛以金棺送出王宮可三里許在宮各以旃檀木為薪天人各以火燒薪斂舍利得八斛四斗諸國王各得少許齎還本國以造佛寺阿育王起浮屠於佛泥洹處李延壽扶南傳曰長干寺塔吳時有尼居其地為小精舍孫綝毀除之吳平後諸道人復於舊處建立晉簡文咸安中造塔孝武太元九年上金相輪及承露其後有西河離石縣胡人劉薩何遇疾暴亡七日而蘇因此出家名慧達遊行至丹楊長干里有阿育王塔掘入一丈得金函盛三舍利及佛爪髮遷舍利近北對簡文所造塔西造塔及帝開之初穿土四尺得龍窟及昔人所捨金銀叉釧環鑷等諸雜寶物可深九尺許至石磉之下有石函函內有鐵壺以盛銀坩坩內有金縷罌盛三舍利如粟粒大圓正光潔函內有玻璃碗碗心得四舍利及髮爪爪有四枚並為沈香色髮青紺色衆僧以手伸之隨手長短放之則旋屈為蠡形帝乃設無礙大會豎二剎各以金罌次玉罌重盛舍利及爪髮內七寶塔內又以石函盛寶塔分入兩剎剎下東魏丞相歡將兵二十萬自壺口趣蒲津九月柔然為魏侵東魏三堆魏收志肆州永安郡平寇縣真君七年並三堆縣屬焉有三堆戍隋改平寇縣為崞縣屬鴈門郡宋白曰嵐州靜樂縣本漢汾陽縣地城內有堆阜三俗名三堆城為于僞翻柔然退走行臺郎中杜弼以文武在位多貪汙言於丞相歡請治之治直之翻歡曰弼來我語爾語牛倨翻天下貪汙習俗已久今督將家屬多在關西此指言可朱渾道元万俟普劉豐生等部曲也將即亮翻人情去留未定獺他達翻誘音酉江東復有吳翁蕭衍專事衣冠禮樂復扶又翻中原士大夫望之以為正朔所在我若急正綱紀不相假借恐督將盡歸黑獺士子悉奔蕭衍人物流散何以為國爾宜少待吾不忘之史言高歡權時施宜以凝固其衆捨小過以成大功少詩沼翻歡將出兵拒魏杜弼請先除內賊歡問內賊為誰弼曰諸勳貴掠奪百姓者是也歡不應使軍士皆張弓注矢舉刀按矟夾道羅列命弼冒出其間弼戰栗流汗歡乃徐諭之曰矢雖注不射刀雖舉不擊矟雖按不刺矟色角翻射而亦翻刺七亦翻爾猶亡魄失膽諸勳人身犯鋒鏑百死一生雖或貪鄙所取者大豈可同之常人也弼乃頓首謝不及歡每號令軍士常令丞相屬代郡張華原宣旨其語鮮卑則曰漢民是汝奴夫為汝耕婦為汝織輸汝粟帛令汝溫飽汝何為陵之其語華人則曰鮮卑是汝作客言如傭作之客也語牛倨翻為于僞翻下同為汝擊賊令汝安寧汝何為疾之史言高歡雜用夷夏有撫御之術時鮮卑共輕華人唯憚高敖曹歡號令將士常鮮卑語敖曹在列則為之華言敖曹返自上洛歡復以為軍司大都督統七十六都督復扶又翻以司空侯景為西道大行臺使景經略關西也任音壬万莫北翻俟渠之翻治直之翻下同敖曹與北豫州刺史鄭嚴祖握槊魏泰常中置豫州治虎牢後得汝南置豫州以虎牢為北豫州領廣武滎陽成皋郡握槊亦博塞之戲也劉禹錫觀博曰初主人執握槊之器置于廡下曰主進者要約之既揖讓即次有博齒齒異乎古之齒其制用骨觚稜四均鏤以朱墨耦而合數取應日月視其轉止依以爭道是制也行之久矣莫詳所祖以其用必投擲以博投詔之又爾朱世隆與元世俊握槊忽聞局上詨然有聲一局子盡倒立世隆甚惡之既而及禍李延壽曰握槊此蓋胡戲近入中國云胡王有弟一人遇罪將殺之從獄中為此戲上之意言孤則易死也敖曹不時遣枷其使者使者曰枷則易脫則難枷居牙翻易弋豉翻敖曹以刀就枷刎之曰又何難貴不敢校明日貴與敖曹坐外白治河役夫多溺死溺奴狄翻貴曰一錢漢言漢人之賤也敖曹怒拔刀斫貴貴走出還營敖曹鳴鼓會兵欲攻之侯景万俟洛共解諭久之乃止敖曹嘗詣相府門者不納敖曹引弓射之射而亦翻歡知而不責東魏丞相歡將兵二十萬自壺口趣蒲津閏月甲子以武陵王紀為都督益梁等十三州諸軍事益州刺史為後紀與湘東爭國張本東魏丞相歡將兵二十萬自壺口趣蒲津東魏丞相歡將兵二十萬自壺口趣蒲津班志壺口山在河東郡北屈縣東南北屈後魏改為禽昌縣屬平陽郡隋改禽昌為襄陵縣將即亮翻下同趣七喻翻時關中饑魏丞相泰所將將士不滿萬人館穀於恆農五十餘日聞歡將濟河乃引兵入關高敖曹遂圍恆農恆戶登翻歡右長史薛琡言於歡曰琡齒育翻西賊連年饑饉故冒死來入陝州欲取倉粟今敖曹已圍陝城粟不得出陝式冉翻但置兵諸道勿與野戰比及麥秋比必利翻記月令孟夏之月麥秋至其民自應餓死寶炬黑獺何憂不降降戶江翻願勿渡河侯景曰今茲舉兵形勢極大萬一不捷猝難收斂不如分為二軍相繼而進前軍若勝後軍全力前軍若敗後軍承之歡不從自蒲津濟河考異曰北齊帝紀十一月壬辰神武自蒲津濟魏帝紀十月壬辰敗于沙苑按長曆十月壬辰朔北齊紀誤也丞相泰遣使戒華州刺史王羆羆語使者曰老羆當道臥貉子那得過歡至馮翊城下使疏吏翻華戶化翻語牛倨翻五代志馮翌郡後魏曰華州西魏後改曰同州馮翊縣後魏曰華陰貉曷各翻北方有之似狐善睡康曰貉莫白切說文云北方豸種也鄭玄曰貉子曰貆郭璞曰今江東通呼貉為豸史豸史余按北方豸種乃指夷貉之貉孟子所謂大貉小貉者也此乃狐貉之貉當從諸家之說謂羆曰何不早降降戶江翻羆大呼曰呼火故翻此城是王羆冢死生在此欲死者來歡知不可攻乃涉洛軍於許原西漢志馮翊懷德縣南有荊山山下有強梁原洛水東南入渭許原蓋在洛水之南泰至渭南徵諸州兵皆未會欲進擊歡諸將以衆寡不敵請待歡更西以觀其勢泰曰歡若至長安則人情大擾今及其遠來新至可擊也即造浮橋於渭令軍士齎三日糧輕騎渡渭輜重自渭南夾渭而西重直用翻冬十月壬辰泰至沙苑水經注沙苑在渭北沙苑之南即漢懷德縣故城五代志馮翊縣有沙苑諸將皆懼宇文深獨賀泰問其故對曰歡鎮撫河北甚得衆心以此自守未易可圖易弋豉翻今懸師渡河非衆所欲獨歡恥失竇泰愎諫而來所謂忿兵愎弼力翻戾也漢魏相曰爭恨細故不忍憤怒者謂之忿兵兵忿者敗可一戰擒也事理昭然何為不賀願假深一節發王羆之兵邀其走路使無遺類泰遣須昌縣公達奚武覘歡軍覘丑廉翻又丑豔翻武從三騎皆效歡將士衣服日暮去營數百步下馬潛聽得其軍號因上馬歷營若警夜者有不如法往往撻之具知敵之情狀而還還從宣翻又如字歡聞泰至癸巳引兵會之候騎告歡軍且至泰召諸將謀之開府儀同三司李弼曰彼衆我寡不可平地置陳此東十里有渭曲可先據以待之泰從之背水東西為陳陳讀曰陳下陷陳魏陳同李弼為右拒趙貴為左拒杜預曰拒方陳陸德明曰拒俱甫翻約聞鼓聲而起晡時東魏兵至渭曲晡奔謨翻都督太安斛律羌舉曰黑獺舉國而來欲一死決言欲盡死力戰以決勝負或能噬人猘漢書音義征例翻又居例翻狂犬也左傳曰國犬之瘈無不噬也且渭曲葦深土濘無所用力濘乃定翻泥淖也不如緩與相持密分精鋭徑掩長安巢穴既傾則黑獺不戰成擒矣使斛律羌舉之計行西魏殆哉縱火焚之何如侯景曰當生擒黑獺以示百姓若衆中燒死誰復信之侯景此言固亦有恃衆輕敵之心復扶又翻下復戰可復同曰我衆賊寡百人擒一何憂不克歡從之東魏兵望見魏兵少爭進擊之無復行列史言東魏將士皆恃衆輕敵故敗少詩沼翻復扶又翻行戶剛翻丞相泰鳴鼓士皆奮起于謹等六軍與之合戰李弼帥鐵騎橫擊之時東魏之師萃于左拒于謹等與之合戰李弼引右拒之騎兵橫擊之帥讀曰率遂大破之李弼弟檦身小而勇檦與標同隱身鞍甲之中敵見皆曰避此小兒泰歎曰膽決如此何必八尺之軀征虜將軍武川耿令貴殺傷多甲裳盡赤左傳晉楚戰于邲屈蕩搏趙旃得其甲裳杜預注曰下曰裳觀其甲裳足知令貴之勇何必數級謂不必數其斬獲首級之多少魏人刺之刺七亦翻腸出內之復戰丞相歡欲收兵更戰使張華原以簿歷營點兵簿者軍之名籍還白歡曰衆盡去營皆空矣歡猶未肯去阜城侯斛律金曰衆心離散不可復用宜急向河東歡據鞍未動金以鞭拂馬乃馳去夜渡河船去岸遠歡跨橐駝就船乃得渡喪甲士八萬人喪息浪翻棄鎧仗十有八萬鎧可亥翻丞相泰追歡至河上選留甲士二萬餘人餘悉縱歸都督李穆曰高歡破膽矣速追之可獲泰不聽沙苑之戰宇文泰不敢乘勝追高歡邙山之戰歡不敢乘勝追泰蓋二人者智力相敵足以相持而不足以相斃也所徵之兵甫至甫方也侯景言於歡曰黑獺新勝而驕必不為備願得精騎二萬徑往取之歡以告婁曰設如其言景豈有還理得黑獺而失景何利之有歡乃止魏加丞相泰柱國大將軍李弼十二將皆進爵增邑有差十二將李弼獨孤信梁禦趙貴于謹若干惠怡峯劉亮王德侯莫陳崇李遠達奚武也高敖曹聞歡敗釋恆農退保洛陽己酉魏行臺宮景壽等向洛陽宮姓也左傳虞大夫有宮之奇州民韓木蘭作亂賢擊破之一賊匿尸間賢自按檢收鎧仗賊欻起斫之斷脛而卒欻許勿翻斷丁管翻下兵斷同脛胡定翻魏復遣行臺馮翊王季海與獨孤信將步騎二萬趣洛陽復扶又翻趣七喻翻下同洛州刺史李顯趣三荊西魏洛州治上洛東魏丞相歡之西伐也蒲坂民敬珍謂其從祖兄祥曰高歡迫逐乘輿乘繩證翻天下忠義之士皆欲剚刃於其腹從才用翻剚側吏翻賈公彥曰剚猶立也齊人謂立物地中為剚今又稱兵西上上時掌翻吾欲與兄起兵斷其歸路此千載一時也斷丁管翻祥從之糾合鄉里數日有衆萬餘會歡自沙苑敗歸祥珍帥衆邀之斬獲甚衆賀拔勝李弼至河東祥珍帥猗氏等六縣十餘萬戶歸之猗氏縣自漢以來屬河東郡丁度曰猗氏本郇國也後以猗頓居於此因為猗氏按左傳所謂郇瑕氏之地沃而近鹽其後猗頓居之用盬鹽起富遂以猗氏名縣而郇瑕氏隱矣帥讀曰率祥為行臺郎中東魏秦州刺史薛崇禮守蒲坂別駕薛善崇禮之族弟也言於崇禮曰高歡有逐君之罪善與兄忝衣冠緒餘世荷國恩今大軍已臨而猶為高氏固守荷下可翻為于僞翻一旦城陷函首送長安署為逆賊死有餘愧及今歸款猶為愈也崇禮猶豫不決善與族人斬關納魏師崇禮出走追獲之丞相泰進軍蒲坂略定汾絳五代志文城郡東魏置南汾州後周改為汾州絳郡後魏置東雍州後周改為絳州皆賜五等爵善曰背逆歸順背蒲妹翻臣子常節豈容闔門大小俱叨封邑與其弟慎固辭不受東魏行晉州事封祖業棄城走儀同三司薛修義追至洪洞杜佑曰洪洞故城在平陽北四固重復控據要險劉昫曰晉州洪洞縣古陽縣也隋義寧元年改曰洪洞取縣北洪洞嶺以名縣孫恆曰洞音同又徒弄翻說式芮翻守手又翻下固守同祖業不從修義還據晉州安集固守魏儀同三司長孫子彥引兵至城下修義開門伏甲以待之子彥不測虛實遂退走丞相歡以修義為晉州刺史史言河東諸薛各行其志為東西魏宣力獨孤信至新安新安縣漢屬弘農郡晉屬河南尹魏天平初置新安郡屬洛州信逼洛陽洛州刺史廣陽王湛棄城歸鄴信遂據金墉城孝武之西遷也西遷見上卷中大通六年天子既西吾不可以東附高氏帥家屬逃於大石嶺水經注洛陽之南有新城縣縣界有大石嶺來儒之水徑其南乃出見之時洛陽荒廢人士流散惟河東柳虯在陽城陽城縣漢屬潁川郡晉屬河南尹魏孝昌二年置陽城郡屬洛州隋廢郡為陽城縣唐登封元年將有事嵩山改為告成縣我朝屬西京登封縣界信俱徵之以虯為行臺郎中諏之為開府屬諏將侯翻又逡須翻東魏潁州長史賀若統執刺史田迄舉城降魏魏收志天平初置潁州治長社城領許昌潁川陽翟郡武定七年改為鄭州賀若復姓魏書官氏志內入諸姓有賀若氏北俗謂忠貞為賀若因以為氏若人者翻章甲十一行本迥作回乙十一行本同下同孔本同入據其城前通直散騎侍郎鄭偉起兵陳留攻東魏梁州執其刺史鹿永吉魏收志天平初置梁州治大梁城領陽夏開封陳留汝南潁川汝陽義陽新蔡初安襄陽城陽廣陵郡鹿姓也風俗通漢有巴郡太守鹿旗魏收官氏志阿鹿桓氏後改為鹿氏執其太守蘇淑與廣州長史劉志皆降於魏降戶江翻偉先護之子也鄭先護見一百五十二卷大通二年彥穆為滎陽太守十一月東魏行臺任祥帥督將堯雄趙育是云寶攻潁川帥讀曰率將即亮翻丞相泰使大都督宇文貴樂陵公遼西怡峯怡姓峯名峯遼西怡寬之子軍至陽翟陽翟縣漢屬潁川郡晉屬河南尹後魏置陽翟郡九域志陽翟在長社西北九十里言雄等軍逼潁川相去三十里諸將咸以為彼衆我寡不可爭鋒貴曰雄等謂吾兵少必不敢進少詩沼翻彼與任祥合兵攻潁川城必危矣若賀若統陷沒吾輩坐此何為今進據潁川有城可守又出其不意破之必矣遂疾趨據潁川背城為陳以待背蒲妹翻陳讀曰陳雄等至合戰大破之雄走趙育請降降戶江翻下同俘其士卒萬餘人悉縱遣之任祥聞雄敗不敢進貴與怡峯乘勝逼之祥退保宛陵宛陵縣漢屬河南尹晉屬滎陽郡魏天平初分屬廣武郡隋開皇十六年併宛陵縣入新鄭擊之祥軍大敗是云寶殺其陽州刺史那椿以州降魏魏收志天平初置陽州治宜陽領宜陽金門郡那椿人姓名是云寶趙育為車騎大將軍都督杜陵韋孝寬攻東魏豫州拔之執其行臺馮雍孝寬名叔裕以字行東魏丞相歡將兵二十萬自壺口趣蒲津丙子東魏以驃騎大將軍儀同三司万俟普為太尉東魏丞相歡將兵二十萬自壺口趣蒲津司農張樂皋等聘于東魏司農之下恐有脫字東魏丞相歡將兵二十萬自壺口趣蒲津十二月魏行臺楊白駒與東魏陽州刺史段粲戰於蓼塢水經注蓼水出河北縣襄山蓼谷當時之人於此谷築塢因謂之蓼塢漢書音義曰襄山在潼關北十餘里東魏丞相歡將兵二十萬自壺口趣蒲津魏荊州刺史郭鸞攻東魏東荊州刺史清都慕容儼東魏都鄴以魏郡為清都尹二百餘日乘間出繫鸞大破之間古莧翻時河南諸州多失守唯東荊獲全河間邢磨納范陽盧仲禮仲禮從弟仲裕等皆起兵海隅以應魏從才用翻東魏濟州刺史高季式有部曲千餘人馬八百匹鎧仗皆備濟子禮翻鎧可亥翻濮陽民杜靈椿等為盜聚衆近萬人濮博木翻近其靳翻攻城剽野剽匹妙翻季式遣騎三百一戰擒之又擊陽平賊路文徒嚴文徒改叔文等悉平之於是遠近肅清或謂季式曰濮陽陽平乃畿內之郡二郡東魏皆以屬司州故云然又不侵境言無詔命使季式討賊而賊又不來侵濟州境萬一失利豈不獲罪乎季式所自養部曲不衣食於官故謂之私軍君何言之不忠也我與國家同安共危豈有見賊而不討乎且賊知臺軍猝不能來又不疑外州有兵擊之乘其無備破之必矣以此獲罪吾亦無恨張政烺標點容肇祖聶崇岐覆校
