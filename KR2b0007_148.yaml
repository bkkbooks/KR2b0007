body:
  text: 資治通鑑卷第一百四十八端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注梁紀四高祖武皇帝四天監十四年乙未五一五春正月乙巳朔上冠太子於太極殿古者冠於廟冠古玩翻辛亥上祀南郊甲寅魏主有疾丁巳殂于式乾殿年三十三諡宣武皇帝廟號世宗至顯陽殿王顯欲須明行即位禮須待也天位不可暫曠何待至明顯曰須奏中宮光曰帝崩太子立國之常典何須中宮令也於是光等請太子止哭立於東序于忠與黃門郎元昭扶太子西面哭十餘聲止光攝太尉奉策進璽綬璽斯氏翻綬音受太子跪受服袞冕之服御太極殿即皇帝位帝諱詡宣武皇帝之第三子北面稽首稱萬歲蒼猝不暇集百官備高氏也稽音啓遵之曾孫也魏略陽公遵見一百八卷晉孝武太元一二高后欲殺胡貴嬪中給事譙郡劉騰以告侯剛中給事宦官也北齊之制中侍中省有中侍中中常侍中給事中蓋因魏制忠問計於崔光光使置貴嬪於別所嚴加守衛由是貴嬪深德四人為劉騰等亂政崔光尊寵而不能矯正張本戊午魏大赦己未悉召西伐東防兵西伐謂伐蜀之兵東防謂防淮之兵驃騎大將軍廣平王懷扶疾入臨驃匹妙翻騎奇寄翻臨力鴆翻徑至太極西廡哀慟呼侍中領軍黃門二衛二衛始於晉初左右衛將軍統之此二衛即謂左右衛將軍廡音武身欲上殿哭大行又須入見主上衆皆愕然相視無敢對者崔光攘衰振杖見賢遍翻衰叱雷翻振舉也引漢光武崩趙熹扶諸王下殿故事事見四十四卷光武中元二年聞者莫不稱善懷聲淚俱止曰侍中以古義裁我我敢不服遂還仍頻遣左右致謝先是高肇亶權尤忌宗室有時望者太子太傅任城王澄數為肇所譖懼不自全懲彭城王協之禍也先悉薦翻任音壬數所角翻酣戶甘翻所為如狂朝廷機要無所關豫及世宗殂肇擁兵於外謂高肇方擁伐蜀之兵也于忠與門下議門下省侍中等官居之朝直遙翻未能親政宜使太保高陽王雍入居西柏堂省決庶政省悉景翻以任城王澄為尚書令總攝百揆奏皇后請即敕授請即以手敕授二王倉猝不及下詔慮有沮閣者也恃勢使威為衆所疾恐不為澄等所容與中常侍孫伏連等密謀寢門下之奏矯皇后令以高肇録尚書事以顯與勃海公高猛同為侍中于忠等聞之託以侍療無效執顯於禁中觀此則侍御師王顯詹事王顯又似一人顯臨執呼冤直閣以刀鐶撞其掖下撞直江翻掖與腋同送右衛府一宿而死庚申下詔如門下所奏百官總己聽於二王中外悅服二月庚辰尊皇后為皇太后魏主稱名為書告哀於高肇且召之還肇承變憂懼承告哀之變也至於贏悴羸倫為翻悴秦醉翻歸至瀍澗書我乃卜澗水東瀍水西水經瀍水出河南穀城縣北山東與千金渠合又東過洛陽縣南又東過偃師縣又東入于洛澗水出新安縣南白石山東南入于洛此瀍澗直謂瀍水非如書及水經之瀍澗為二水也瀍直連翻不與相見辛巳至闕下衰服號哭衰七回翻號戶刀翻升太極殿盡哀高陽王雍與于忠密謀伏直寢邢豹等十餘人於舍人省下舍人省即中書省通事舍人宿直之所引入西廡廡音武清河諸王皆竊言目之肇入省豹等扼殺之扼於革翻下詔暴其罪惡稱肇自盡自餘親黨悉無所問削除職爵葬以士禮逮昏於廁門出尸歸其家魏之伐蜀也軍至晉壽蜀人震恐傅豎眼將步兵三萬擊巴北上遣寧州刺史任太洪自陰平間道入其州傅豎眼以益州刺史鎮晉壽此陰平非鄧艾所由之陰平今利州之陰平縣是也間古莧翻豎而庾翻將即亮翻任音壬絶魏運路氐蜀氐人及蜀人也誘音酉太洪襲破魏東洛除口二戍唐利州景谷縣舊白水縣也置東洛郡後周省郡入平興郡隋又廢平興為景谷縣水經漢水過大小黃金南東合蘧蒢口注云蘧蒢水出就谷南歷蘧蒢溪又南流注于漢謂之蒢口氐蜀翕然從之太洪進圍關城豎眼遣統軍薑喜等擊太洪大破之太洪棄關城走還關城即白水關城癸未魏以高陽王雍為太傅領太尉清河王懌為司徒廣平王懷為司空甲午魏葬宣武皇帝于景陵廟號世宗己亥尊胡貴嬪為皇太三月甲辰朔以高太后為尼徙居金墉瑤光寺子無廢母之義魏之亂亡宜矣按魏廢后率居瑤光寺馮后高后是也不得入宮魏左僕射郭祚表稱蕭衍狂悖謀斷川瀆謂築浮山堰也悖蒲妹翻斷丁管翻危亡已兆宜命將出師長驅撲討將即亮翻撲普木翻魏詔平南將軍楊大眼督諸軍鎮荊山水經淮水過塗山北而後至荊山今塗山在鍾離縣西九十五里荊山在鍾離縣西八十三里魏于忠既居門下又總宿衛門下謂為侍中宿衛謂為領軍權傾一時朝直遙翻初太和中軍國多事高祖以用度不足百官之祿四分減一忠悉命歸所減之祿舊制民稅絹一匹別輸綿八兩布一匹別輸麻十五斤忠悉罷之乙丑詔文武㣥官各進位一級史言于忠亶魏欲收衆心夏四月浮山堰成而復潰或言蛟龍能乘風雨破堰其性惡鐵復扶又翻惡烏路翻乃運東西冶鐵器數千萬斤沈之建康有東西二冶各置冶令以掌之沈持林翻乃伐樹為井幹井幹井欄也言疊木為井幹之形幹揚子注及西都賦注音寒莊子音如字加土其上緣淮百里內木石無巨細皆盡負簷者肩上皆穿夏日疾疫死者相枕簷都濫翻枕職任翻蠅蟲晝夜聲合魏梁州刺史薛懷吉破叛氐於沮水水經沔水出武都沮縣東狼谷中又東南流徑沮水戍注云沔水一名沮水闞駰曰以其初出沮洳然故曰沮水師古曰沮子余翻真度之子也薛真度見一百四十卷齊明帝建武二年甲寅南秦州刺史崔暹又破叛氐解武興之圍魏南秦州治駱谷城領天水漢陽武都武階修武仇池郡此時蓋叛氐圍武興也六月魏冀州沙門法慶以妖幻惑衆妖於驕翻幻戶辦翻與勃海人李歸伯作亂推法慶為主法慶以尼惠暉為妻以歸伯為十住菩薩平魔軍司定漢王魏書法慶以殺一人者為一住菩薩殺十人者為十住菩薩菩薄乎翻薩桑葛翻又合狂藥合音閣令人服之父子兄弟不復相識復扶又翻唯以殺害為事刺史蕭寶寅遣兼長史崔伯驎擊之伯驎敗死驎力珍翻賊衆益盛所在毀寺舍斬僧尼燒經像云新佛出世除去衆魔去羌呂翻秋七月丁未詔假右光祿大夫元遙征北大將軍以討之假者未正以征北大將軍授之魏尚書裴植自謂人門不後王肅植裴叔業之兄子也後戶遘翻處昌呂翻意常怏怏怏於兩翻表請解官隱嵩山世宗不許深怪之及為尚書志氣驕滿每謂人曰非我須尚書尚書亦須我每入參議論好面譏毀㣥官好呼到翻又表征南將軍田益宗言華夷異類不應在百世衣冠之上于忠元昭見之切齒忠昭皆北人故深諱此言尚書左僕射郭祚冒進不已自以東宮師傅章十二行本傅下有列辭尚書四字乙十一行本同孔本同張校同退齋校同望封侯儀同天監十年魏以祚領太子少師魏太和十一年置岐州治雍城鎮領平秦武都武功三郡雍於用翻華戶化翻祚與植皆惡于忠專橫密勸高陽王雍使出之忠聞之大怒令有司誣奏其罪尚書奏羊祉告植姑子皇甫仲達云受植旨詐稱被詔惡烏路翻橫戶孟翻被皮義翻帥合部曲欲圖于忠帥讀曰率下同臣等窮治辭不伏引伏引猶引伏也治直之翻昞音丙準律當死衆證雖不見植皆言仲達為植所使植召仲達責問而不告列推論情狀不同之理不可分明不得同之常獄有所降減計同仲達處植死刑處昌呂翻下裁處同植親帥城衆附從王化謂齊東昏侯永元二年植以壽陽降魏謂依八議之律也上時掌翻處昌呂翻忠矯詔曰凶謀既爾罪不當恕雖有歸化之誠無容上議亦不須待秋分魏舊制秋分然後決死刑己張己作乙亥植與郭祚及都水使者杜陵韋俊皆賜死俊祚之婚家也忠又欲殺高陽王雍崔光固執不從乃免雍官以王還第朝野冤憤莫不切齒使疏吏翻朝直遙翻丙子魏尊胡太為皇太后居崇訓宮于忠領崇訓衛尉劉騰為崇訓太僕加侍中侯剛為侍中撫軍將軍三人者胡后所深德者也庚辰定州刺史田超秀帥衆三千降魏超秀叛魏見上卷上年帥讀曰率降戶江翻戊子魏大赦己丑魏清河王懌進位太傅領太尉廣平王懷為太保領司徒任城王澄為司空庚寅魏以車騎大將軍于忠為尚書令特進崔光為車騎大將軍並加開府儀同三司任音壬騎奇寄翻下同魏江陽王繼熙之曾孫也熙道武之子坐以良人為婢奪爵繼子叉娶胡太后妹壬辰詔復繼本封以叉為通直散騎侍郎叉妻為新平郡君仍拜女侍中為元叉囚靈太后張本散悉亶翻㣥臣奏請太后臨朝稱制九月乙未靈太后始臨朝聽政胡太后諡曰靈㣥臣上書稱殿下太后聰悟頗好讀書屬文射能中針孔好呼到翻屬之欲翻中竹仲翻政事皆手筆自決加胡國珍侍中封安定公自郭祚等死詔令生殺皆出于忠王公畏之重足脅息重直龍翻脅息者屏氣鼻不敢息唯兩脅潛動以舒氣息耳太后既親政乃解忠侍中領軍崇訓衛尉止為儀同三司尚書令後旬餘太后引門下侍官於崇訓宮門下侍官自侍中至散騎常侍侍郎崇訓宮蓋太后所居宮也忠在端揆聲望何如咸曰不稱厥任稱尺證翻乃出忠為都督冀定瀛三州諸軍事征北大將軍冀州刺史以司空澄領尚書令澄奏安定公宜出入禁中參咨大務詔從之人之老也戒之在得任城王澄血氣衰矣甲寅魏元遙破大乘賊擒法慶並渠帥百餘人帥所類翻傳首洛陽左遊擊將軍趙祖悅襲魏西硤石水經淮水東過壽春縣北又北徑山峽中謂之峽石對岸山上結二城以防津要在淮水西岸者謂之西硤石杜佑曰潁州下蔡縣有硤石山梁築城以拒魏今縣城也更築外城徙緣淮之民以實城內將軍田道龍等散攻諸戍魏揚州刺史李崇分遣諸將拒之將即亮翻癸亥魏遣假鎮南將軍崔亮攻西硤石又遣鎮東將軍蕭寶寅決淮堰冬十月乙酉魏以胡國珍為中書監儀同三司侍中如故甲午弘化太守杜桂舉郡降魏弘化地闕蓋亦緣邊蠻郡也降戶江翻初魏于忠用事自言世宗許其優轉太傅雍等皆不敢違加忠車騎大將軍忠又自謂新故之際有定社稷之功諷百僚令加己賞雍等議封忠常山郡公忠又難於獨受乃諷朝廷同在門下者皆加封邑雍等不得已復封崔光為博平縣公而尚書元昭等上訴不已魏主之立也元昭亦同在門下故上訴不已復扶又翻上時掌翻太傅懌等上言先帝升遐記曲禮曰告喪曰天王登假注云登上也遐已也上已者若仙去云耳登即升也假讀與遐同侍衛省闥乃臣子常職乘繩證翻不容以此為功臣等前議授忠茅土正以畏其威權苟免暴戾故也若以功過相除悉不應賞請皆追奪崔光亦奉送章綬茅土表十餘上太后從之高陽王雍上表自劾稱臣初入柏堂見詔旨之行一由門下臣出君行深知其不可而不能禁謂殺生豫奪皆出於于忠之意而以詔旨行之上時掌翻劾戶概翻又戶得翻生殺自恣而臣不能違忠規欲殺臣賴在事執拒在事謂在位任事之臣此指言崔光執拒謂執不可而拒忠在心未行返為忠廢忝官尸祿孤負恩私請返私門伏聽司敗司敗即司寇也不問其罪十二月辛丑以忠嚴忠改雍為太師領司州牧尋復録尚書事與太傅懌太保懷侍中胡國珍入居門下同釐庶政復扶又翻釐力之翻治也己酉魏崔亮至硤石趙祖悅逆戰而敗閉城自守亮進圍之丁卯魏主及太后謁景陵是冬寒甚淮泗盡凍浮山堰士卒死者什七八魏益州刺史傅豎眼性清素民獠懷之龍驤將軍元法僧代豎眼為益州刺史此魏之東益州也豎而庾翻獠魯皓翻驤思將翻加以貪殘治直吏翻王賈諸姓本州士族法僧皆召為兵葭萌民任令宗因衆心之患魏也殺魏晉壽太守以城來降民獠多應之葭音家任音壬守式又翻降戶江翻獠魯皓翻益州刺史鄱陽王恢遣巴西梓潼二郡太守張齊將兵三萬迎之將即亮翻法僧熙之曾孫也魏岐州刺史趙王謐幹之子也趙郡王幹見一百四十卷齊明帝建武二年此於王謐之上逸郡字一旦閉城門大索執人而掠之索山客翻掠音亮楚毒備至又無故斬六人闔城凶懼衆遂大呼屯門凶許拱翻呼火故翻謐登樓毀梯以自固胡太后遣遊擊將軍王靖馳馹諭城人城人開門謝罪奉送管籥乃罷謐刺史謐太后從女也至洛除大司農卿史言魏母后亶朝城狐社鼠有所依憑馹音日從才用翻太后以魏主尚幼未能親祭欲代行祭事禮官博議以為不可太后以問侍中崔光光引漢和熹鄧太后祭宗廟故事太后大悅遂攝行祭事史言崔光逢女主之惡魏南荊州刺史桓叔興表請不隸東荊州許之南荊隸東荊見上卷十一年十五年丙申五一六春正月戊辰朔魏大赦改元熙平魏崔亮攻硤石未下與李崇約水陸俱進崇屢違期不至李崇時鎮壽陽乃以吏部尚書李平為使持節鎮軍大將軍兼尚書右僕射將步騎二千赴壽陽別為行臺節度諸軍將即亮翻使疏吏翻騎奇寄翻如有乖異以軍法從事蕭寶寅遣輕車將軍劉智文等渡淮攻破三壘二月乙巳又敗將軍垣孟孫等於淮北敗補邁翻李平至硤石督李崇崔亮等水章十二行本水上有刻日二字乙十一行本同陸進攻無敢乖互乖異也互差也上使左衛將軍昌義之將兵救浮山未至康絢已擊魏兵卻之絢許縣翻考異曰絢傳十二月魏遣李曇定督衆軍來戰按魏帝紀此年正月乃遣李平節度諸軍絢傳誤也曇定即平字也上使義之與直閣王神念泝淮救硤石泝蘇故翻考異曰李崇傳衍遣趙祖悅襲據西硤石又遣義之神念帥水軍泝淮而上規取壽春按義之傳絢破魏軍義之乃救硤石今從之崔亮遣將軍博陵崔延伯守下蔡下蔡縣漢屬沛郡梁置下蔡郡屬豫州水經注淮水自峽石北徑下蔡故城東本州來之城也吳季札始邑延陵後邑州來故曰延州來季子春秋襄二年蔡成公自新蔡遷于州來謂之下蔡淮之東岸又有一城下蔡新城也二城對據翼帶淮濆按蔡有三蔡州上蔡縣蔡仲始封之邑也又有新蔡蔡平侯自上蔡遷都于此又有下蔡縣蔡成公所遷也延伯取車輪去輞削鋭其輻兩兩接對揉竹為緪將即亮翻去羌呂翻輞扶紡翻車之牙車輮也輻方目翻輪轑也揉人九翻緪古恆翻大索也貫連相屬並十餘道橫水為橋兩頭施大鹿盧鹿盧圓轉之木屬之欲翻不可燒斫既斷趙祖悅走路又令戰艦不通義之神念屯梁城不得進嗚呼吾國之失襄陽亦以水陸援斷而諸將不進也斷丁管翻艦戶黯翻李平部分水陸攻硤石分扶問翻克其外城乙丑祖悅出降斬之盡俘其衆降戶江翻胡太后賜崔亮書使乘勝深入平部分諸將水陸並進攻浮山堰亮違平節度以疾請還隨表輒發平奏處亮死刑處昌呂翻太后令曰亮去留自亶違我經略雖有小捷豈免大咎但吾攝御萬機庶幾惡殺幾居依翻惡烏故翻亮崔光之族弟也故平奏不行可聽特以功補過魏師遂還還從宣翻又如字魏中尉元匡奏彈于忠幸國大災專亶朝命裴郭受冤謂裴植郭祚彈徒丹翻朝直遙翻謂高陽王雍被黜後又以授忠茅土乞自貶退也領崇訓衛尉原其此意欲以無上自處處昌呂翻下尉處同既事在恩後恩後謂赦恩之後也請遣御史一人就州行決于忠時為冀州刺史欲就州戮之皇太后未親覽以前諸不由階級或發門下詔書或由中書宣敕亶相拜授者已經恩宥正可免罪並宜追奪太后令曰忠已蒙特原無宜追罪餘如奏匡又彈侍中侯剛掠殺羽林掠音亮下同剛本以善烹調為尚食典御嘗食典御魏官也掌調和御食溫涼寒熱以時供進則嘗之或曰嘗當作尚平去二字通用以有德於太后事見上年王公皆畏附之廷尉處剛大辟辟毗亦翻太后曰剛因公事掠人邂逅致死於律不坐少卿陳郡袁翻曰邂逅謂情狀已露隱避不引不引謂不引伏也邂戶介翻逅戶遘翻今此羽林問則具首首式又翻剛口唱打殺撾築非理安得謂之邂逅撾則瓜翻太后乃削剛戶三百解嘗嚴嘗改尚食典御三月戊戌朔日有食之魏論西硤石之功辛未以李崇為驃騎將軍加儀同三司驃匹妙翻騎奇寄翻李平為尚書右僕射崔亮進號鎮北將軍亮與平爭功於禁中太后以亮為殿中尚書魏蕭寶寅在淮堰上為手書誘之使襲彭城許送其國廟及室家諸從還北諸從猶㣥從也從才用翻上時掌翻朝直遙翻夏四月淮堰成長九里下廣一百四十丈上廣四十五丈高二十丈樹以柳長直亮翻廣古曠翻高居號翻柳匱柳也或謂康絢曰四瀆天所以節宣其氣不可久塞國語周太子晉曰古之長民者不墮山不崇藪不防川不竇澤夫山土之聚也藪物之歸也川氣之導也澤水之鍾也天地成而聚於高歸物於下疏為川谷以導其氣陂塘汚庳以鍾其美塞悉則翻則遊波寬緩堰得不壞絢乃開秋水東注又縱反間於魏曰梁人所懼開秋水不畏野戰蕭寶寅信之鑿山深五丈開秋水北注水日夜分流猶不減丁度集韻秋水與湫同將由翻間古莧翻深式浸翻水之所及夾淮方數百里李崇作浮橋於硤石戍間又築魏昌城於八公山東南以備壽陽城壞居民散就岡隴山脊為岡高丘為隴俯視廬舍冢墓了然在下初堰起於徐州境內浮山在鍾離郡界梁置徐州於鍾離謂己必掌其事既而康絢以他官來監作監古銜翻豹子甚慙俄而敕豹子受絢節度豹子遂譖絢與魏交通上雖不納猶以事畢徵絢還絢還則堰壞矣魏胡太后追思于忠之功曰豈宜以一謬棄其餘勳胡后以于忠擁護為功若忠之專橫其謬固非一也復扶又翻亦封崔光為平恩縣侯魏元法僧遣其子景隆將兵拒張齊將即亮翻下同齊與戰於葭萌大破之屠十餘城遂圍武興法僧嬰城自守境內皆叛法僧遣使間道告急於魏使疏吏翻間古莧翻魏驛召鎮南軍司傅豎眼於淮南以為益州刺史西征都督將步騎三千以赴之豎而庾翻騎奇寄翻豎眼入境轉戰三日行二百餘里九遇皆捷五月豎眼擊殺梁州刺史任太洪民獠聞豎眼至皆喜迎拜於路者相繼民獠惡法僧而懷豎眼故迎之者屬路任音壬獠魯皓翻豎眼入州入武興也魏梓潼太守苟金龍領關城戍主梁兵至金龍疾病不堪部分分扶問翻其妻劉氏帥厲城民乘城拒戰帥讀曰率百有餘日士卒死傷過半戍副高景謀叛劉氏斬景及其黨與數千人數千當作數十分衣減食勞逸必同莫不畏而懷之井在城外為梁兵所據會天大雨劉氏命出公私布絹及衣服懸之絞而取水城中所有雜物悉儲之雜物謂瓶罌甕盎之屬梁兵乃退魏人封其子為平昌縣子六月庚子以尚書令王瑩為左光祿大夫開府儀同三司尚書右僕射袁昂為左僕射吏部尚書王暕為右僕射暕儉之子也暕古限翻王儉齊初佐命張齊數出白水侵魏葭萌傅豎眼遣虎威將軍強虯攻信義將軍楊興起殺之復取白水數所角翻強其兩翻又如字復扶又翻下州復不復同寧朔將軍王光昭又敗於陰平張齊親帥驍勇二萬餘人與傅豎眼戰驍堅堯翻秋七月齊軍大敗走還小劍大劍諸戍皆棄城走今劍州劍門縣有大劍山又有小劍山在其西北三十里又有小劍故城在益昌縣西南五十里大劍雖號天險有厄塞可守崇墉之間徑路頗夷小劍則鑿石架閣有不容越李白所謂一夫當關萬夫莫開者是也八月乙巳魏以胡國珍為驃騎大將軍開府儀同三司雍州刺史驃匹妙翻騎奇寄翻雍於用翻國珍年老太后實不欲令出止欲示以方面之榮竟不行康絢既還張豹子不復修淮堰九月丁丑淮水暴漲堰壞其聲如雷聞三百里聞音問緣淮城戍村落十餘萬口皆漂入海初魏人患淮堰以任城王澄為大將軍大都督南討諸軍事勒衆十萬將出徐州來攻堰尚書右僕射李平以為不假兵力終當自壞及聞破太后大喜賞平甚厚澄遂不行壬辰大赦魏胡太后數幸宗戚勳貴之家數所角翻侍中崔光表諫曰禮諸侯非問疾弔喪而入諸臣之家謂之君臣為謔記禮運之辭也注云無故而相之是戲謔也陳靈公與孔寧儀行父數如夏氏以取弒焉明無適臣家之義夫人父母在有歸寧沒則使卿寧左傳莊二十七年冬伯姬來歸寧也杜預注曰寧問父母安否襄十二年楚司馬子庚聘于秦為夫人寧禮也注曰諸侯夫人父母既沒歸寧使卿故曰禮霍光外祖也親為宰輔后猶御武帳以接㣥臣事見二十四卷漢昭帝元平元年別彼列翻今帝族方衍勳貴增遷祗請遂多將成彞式方衍謂生子也增遷謂增秩遷官也祗敬也謂宗戚勳貴之家凡有吉慶皆請太后臨幸則率土屬賴含生仰悅矣屬之欲翻下請屬同任城王澄以北邊鎮將選舉彌輕將即亮翻恐賊虜窺邊山陵危迫魏自顯祖以上山陵皆在雲中修警備之嚴詔公卿議之廷尉少卿袁翻議秦漢以來九卿各一卿魏太和十五年九卿各置少卿蓋倣周官六卿有小宰小司徒小宗伯小司馬小司寇小司空之遺制也比緣邊州郡官不擇人唯論資級或值貪汚之人廣開戍邏多置帥領或用其左右姻親或受人貨財請屬皆無防寇之心唯有聚斂之意比毗至翻邏郎佐翻帥所類翻屬之欲翻斂力贍翻其勇力之兵驅令抄掠若遇強敵即為奴虜如有執獲奪為己富其羸弱老小之輩微解金鐵之工少間草木之作抄楚交翻羸倫為翻解戶買翻曉也間習也無不搜營窮壘苦役百端自餘或伐木深山或藝草平陸販貿往還相望道路此等祿既不多資亦有限皆收其實絹給其虛粟窮其力薄其衣用其功節其食綿冬歷夏加之疾苦死於溝瀆者什常七八自古至今守邊之兵皆病於此貿音茂擾我疆埸皆由邊任不得其人故也愚謂自今已後南北邊諸藩及所統郡縣府佐統軍至于戍主皆令朝臣王公已下各舉所知必選其才不拘階級若稱職及敗官並所舉之人隨事賞罰太后不能用間古莧翻埸音亦朝直遙翻稱尺證翻敗補邁翻及正光之末北邊盜賊㣥起遂逼舊都犯山陵如澄所慮正光四年破六韓拔陵衛可孤等反孝昌初年雲中沒矣冬十一月交州刺史李畟斬交州反者阮宗孝傳首建康畟察色翻初魏世宗作瑤光寺未就是歲胡太后又作永寧寺水經注穀渠南流出太尉司徒兩坊間水西有永寧寺又作石窟寺於伊闕口皆極土木之美而永寧尤盛有金像高丈八者一如中人者十玉像二為九層浮圖掘地築基下及黃泉杜預曰地中之泉故曰黃泉上剎復高十丈高居報翻剎所轄翻剎柱也浮圖上柱今謂之相輪復扶又翻每夜靜鈴鐸聲聞十里聞音問佛殿如太極殿南門如端門僧房千間珠玉錦繡駭人心目自佛法入中國塔廟之盛未之有也漢永明平佛法入中國佛弟子收奉舍利建宮宇號為塔亦胡言猶宗廟也故世稱塔廟揚州刺史李崇上表以為高祖遷都垂三十年遷都見一百三十八卷齊世宗永明十一年太學荒廢城闕府寺頗亦頽壞非所以追隆堂構書大誥曰若考作室既底法厥子乃弗肯堂矧肯構今國子雖有學官之名而無教授之實何異兔絲燕麥南箕北斗爾雅曰唐蒙女蘿兔絲釋名曰唐也蒙也女蘿也兔絲也一物四名毛氏詩傳曰女蘿兔絲兔絲松蘿也陸璣草木疏曰兔絲蔓連草上生黃赤如金合藥兔絲子是也松蘿自蔓松上生枝正青與兔絲殊異本草曰兔絲生川澤田野蔓延草木之上瞿麥一名燕麥又名雀麥其苗與麥同但穗細長而疏言兔絲有絲之名而不可以織燕麥有麥之名而不可以食古歌曰田中兔絲如何可絡道邊燕麥何嘗可穫詩云維南有箕不可以簸揚維北有斗不可以挹酒漿皆謂有名無實也須有進退宜罷尚方雕靡之作省永寧土木之功減瑤光材瓦之力分石窟鐫琢之勞及諸事役非急者於三時農隙修此數條使國容嚴顯禮化興行不亦休哉太后優令答之而不用其言太后好事佛民多絶戶為沙門家有一子出為沙門其戶絶矣好呼到翻三千之罪莫大於不孝不孝之大無過於絶祀孔子曰五刑之屬三千其罪莫大於不孝孟子曰不孝有三無後為大瑒杖梗翻又音暢肆其向法之意一身親老棄家絶養缺當世之禮而求將來之益佛法以今世修種為來生因果背蒲妹翻養余亮翻焉知死論語載孔子答子路之言焉於虔翻又今南服未靜衆役仍煩百姓之情實多避役若復聽之恐捐棄孝慈比屋皆為沙門矣復扶又翻比毗必翻又毗至翻都統僧暹等忿瑒謂之鬼教以為謗佛魏有沙門統謂之都統猶今都僧録太后責之瑒曰天曰神地曰祇人曰鬼傳曰明則有禮樂幽則有鬼神然則明者為堂堂幽者為鬼教佛本出於人名之為鬼愚謂非謗太后雖知瑒言為允難違暹等之意罰瑒金一兩魏征南大將軍田益宗求為東豫州刺史以招二子太后不許竟卒於洛陽田益宗二子叛見上卷十三年卒子恤翻柔然伏跋可汗壯健善用兵可從刊入聲汗音寒西擊高車大破之執其王彌俄突繫其足於駑馬頓曳殺之漆其頭為飲器彌俄突殺柔然他汗見上卷七年伏跋皆擊滅之其國復強復扶又翻下賊復同十六年丁酉五一七詔以宗廟用牲春正月辛未上祀南郊詔以宗廟用牲魏大乘餘賊復相聚沙門法慶之餘黨也刺史宇文福之子員外散騎侍郎延帥奴客拒之散悉亶翻騎奇寄翻帥讀曰率賊燒齋閣延突火抱福出外肌髮皆焦勒衆苦戰賊遂散走追討平之詔以宗廟用牲甲戌魏大赦詔以宗廟用牲魏初民間皆不用錢高祖太和十九年始鑄太和五銖錢遣錢工在所鼓鑄民有欲鑄錢者聽就官爐銅必精練無得殽雜世宗永平三年又鑄五銖錢禁天下用錢不依準式者既而洛陽及諸州鎮所用錢各不同商貨不通尚書令任城王澄上言以為不行之錢律有明式指謂雞眼鐶鑿雞眼者謂錢薄小其眼如雞眼也鐶鑿云者謂鑿好以取銅僅存其肉也鐶戶關翻計河南諸州今所行悉非制限昔來繩禁愚竊惑焉又河北既無新錢復禁舊者專以單絲之縑疏縷之布狹幅促度不中常式復扶又翻中竹仲翻裂匹為尺以濟有無徒成杼軸之勞杼直呂翻説文機之持緯者不免飢寒之苦殆非所以救恤凍餒子育黎元之意也錢之為用貫繈相屬繈居兩翻亦錢貫也屬之欲翻不假度量平均簡易濟世之宜謂為深允乞並下諸方州鎮易以豉翻下遐稼翻其太和與新鑄五銖及古諸錢方俗所便用者但內外全好雖有大小之異並得通行貴賤之差自依鄉價庶貨環海內公私無壅其雞眼鐶鑿及盜鑄毀大為小生新巧偽不如法者據律罪之詔從之然河北少錢少詩沼翻民猶用物交易錢不入市詔以宗廟用牲魏人多竊冒軍功尚書左丞盧同閲吏部勳書因加檢核核戶革翻得竊階者三百餘人乃奏乞集吏部中兵二局勳簿對句奏案句古侯翻考也稽也更造兩通更工衡翻一關吏部一留兵局又在軍斬首成一階以上者即令行臺軍司給券當中豎裂一支付勳人一支送門下此韓愈寄崔立之詩所謂當如合分支者也今人亦謂析産文契為分支帳豎而庾翻太后從之同玄之族孫也盧玄見一百二十二卷宋文帝元嘉八年內外考簿吏部除書中兵勳案並諸殿最殿丁練翻欲以案校竊階盜官之人太后許之尚書令任城王澄表以為法忌煩苛治貴清約治直吏翻御史之體風聞是司若聞有冒勳妄階止應攝其一簿研檢虛實繩以典刑豈有移一省之案取尚書省之案赴御史臺所謂移也自景明元年至是年凡十八年今言兩紀之事蓋景明初所敘階勳皆太和末淮漢用兵所上勳人名籍也誰堪其罪斯實聖朝所宜重慎也太后乃止又以匡所言數不從慮其辭解朝直遙翻數所角翻辭解者辭職解官也乃加鎮東將軍二月丁未立匡為東平王為匡治棺攻澄張本詔以宗廟用牲三月丙子敕織官文錦不得為仙人鳥獸之形織官猶漢之織室令丞也有乖仁恕為于偽翻詔以宗廟用牲丁亥魏廣平文穆王懷卒詔以宗廟用牲夏四月戊申魏以中書監胡國珍為司徒詔以宗廟用牲詔以宗廟用牲有纍冥道冥幽也幽則有鬼神冥道鬼神之道也纍力瑞翻考異曰梁帝紀此詔在四月甲子南史云在二月云祈告天地宗廟以去殺之理欲被之含識郊廟牲牷皆代以麵其山川諸祀則否按長曆是月辛卯朔無甲子隋志但云四月亦不云郊祀去牲今從之以為宗廟去牲乃是不復血食去羌呂翻復扶又翻帝竟不從八坐乃議以大脯代一元大武記曲禮牛曰一元大武鄭玄曰元頭也武迹也坐祖臥翻詔以宗廟用牲秋八月丁未詔魏太師高陽王雍入居門下參決尚書奏事魏字當在詔字之上詔以宗廟用牲冬十月詔以宗廟猶用脯修鄭玄曰脯乾肉也修鍛修也薄析曰脯捶之而施薑桂曰鍛修於是以大餅代大脯其餘盡用蔬果又起至敬殿景陽臺置七廟座每月中再設淨饌饌雛戀翻又雛睆翻詔以宗廟用牲乙卯魏詔北京士民未遷者悉聽留居為永業魏以代都為北京詔以宗廟用牲十一月甲子巴州刺史牟漢寵叛降魏五代志巴西郡梁置南梁州北巴州降戶江翻詔以宗廟用牲十二月柔然伏跋可汗遣俟斤尉比建等請和於魏俟斤柔然大臣之號俟渠希翻尉紆勿翻詔以宗廟用牲是歲以右衛將軍馮道根為豫州刺史道根謹厚木訥行軍能檢敕士卒諸將爭功道根獨默然為政清簡吏民懷之上嘗歎曰道根所在令朝廷不復憶有一州復扶又翻詔以宗廟用牲魏尚書崔亮奏請於王屋等山採銅鑄錢從之五代志河內郡王屋縣有王屋山錢稍薄小用之益輕是時錢輕南北皆然豈天時邪十七年戊戌五一八春正月甲子魏以氐酋楊定為陰平王酋慈由翻魏秦州羌反二月癸巳安成康王秀卒卒子恤翻秀雖與上布衣昆弟及為君臣小心畏敬過於疏賤上益以此賢之秀與弟始興王憺尤相友愛憺久為荊州常章十二行本常上有刺史二字乙十一行本同張校同中分其祿以給秀秀憺皆吳太之子齊和帝中興元年憺督雍州天監元年進督荊州五年徵至都荊州總西夏之寄俸入優厚憺徒敢翻又徒覽翻稱尺證翻亦不辭多也甲辰大赦己酉魏大赦改元神龜魏東益州氐反魏主引見柔然使者見賢遍翻使疏吏翻讓之以藩禮不備議依漢待胸奴故事遣使報之漢宣帝待呼韓邪位在諸侯王上蓋稱臣也按張倫表諫與為昆弟蓋用漢文景故事以為太祖經啓帝圖日有不暇遂令豎子遊魂一方謂道武南略社崙得以雄跨漠北急諸華而緩夷狄也高祖方事南轅未遑北伐謂孝文南都洛陽用兵淮漢未暇伐柔然也虜使之來受而弗答見百四十六卷六年國富兵強抗敵之禮何憚而為之何求而行之今虜雖慕德而來亦欲觀我強弱若使王人銜命虜庭與為昆弟恐非祖宗之意也苟事不獲已應為制詔示以上下之儀命宰臣致書諭以歸順之道觀其從違徐以恩威進退之則王者之體正矣豈可以戎狄兼並謂伏跋新破高車及滅鄰國之叛者也不從倫白澤之子也張白澤見一百三十四卷宋順帝升明元年三月辛未魏靈壽武敬公于忠卒魏南秦州氐反遣龍驤將軍崔襲持節諭之驤思將翻夏四月丁酉魏秦文宣公胡國珍卒贈假黃鉞相國都督中外諸軍事太師號曰太上秦公章十二行本公下有加九錫三字乙十一行本同孔本同退齋校同葬以殊禮贈襚儀衛事極優厚又迎太后母皇甫氏之柩與國珍合葬謂之太上秦孝穆君柩音舊諫議大夫常山張普惠以為前世后父無稱太上者太上之名不可施於人臣詣闕上疏陳之左右莫敢為通為于偽翻會胡氏穿壙下有磐石乃密表以為天無二日土無二王太上者因上而生名也皇太后稱令以繫敕下蓋取三從之道遠同文母列於十亂武王曰豫有亂臣十人孔子曰才難有婦人焉九人而已先儒以為十亂太公望周公旦召公奭畢公高榮公太顛閎夭散宜生南宮括及文母恐乖繫敕之意孔子稱必也正名乎論語載孔子答子路之言比毗至翻而以淺改卜亦或天地神靈所以垂至戒啓聖情也伏願停逼上之號以邀謙光之福太后乃親至國珍宅召集五品以上博議王公皆希太后意爭詰難普惠詰去吉翻難乃旦翻普惠應機辨析無能屈者太后使元叉宣令於普惠曰朕之所行孝子之志卿之所陳忠臣之道㣥公已有成議卿不得苦奪朕懷後有所見勿難言也太后為太上君造寺壯麗埒於永寧尚書奏復徵民綿麻之稅為于偽翻埒力輟翻復扶又翻下浸復復欲無復欲復復見同張普惠上疏以為高祖廢大斗去長尺改重稱去羌呂翻下去天下同稱尺證翻下稱尺同事見一百四十卷齊明帝建武二年以愛民薄賦知軍國須綿麻之用故於絹增稅綿八兩於布增稅麻十五斤民以稱尺所減不啻綿麻故鼓舞供調調徒釣翻自茲以降所稅絹布浸復長闊百姓嗟怨聞於朝野聞音問朝直遙翻宰輔不尋其本在於幅廣度長遽罷綿麻于忠罷綿麻見上十四年復欲徵斂去天下之大信棄已行之成詔斂力贍翻去羌呂翻追前之非遂後之失不思庫中大有綿麻而㣥臣共竊之也何則所輸之物或斤羡百銖羡延面翻餘也未聞有司依律以罪州郡或小有濫惡則坐戶主連及三長戶主者一家之長則為一戶之主三長見一百三十六卷齊世祖永明四年踰制者多㣥臣受俸人求長闊厚重無復準極未聞以端幅有餘還求輸官者也布帛六丈為端爾雅倍丈謂之端倍端謂之兩倍兩謂之匹杜預曰二丈為端二端為兩所謂匹也説文幅布帛廣也俸扶用翻當先正稱尺明立嚴禁無得放溢使天下知二聖之心愛民惜法如此則太和之政復見於神龜矣普惠又以魏主好遊騁苑囿好呼到翻不親視朝朝直遙翻過崇佛法郊廟之事多委有司上疏切諫以為殖不思之冥業損巨費於生民減祿削力近供無事之僧崇飾雲殿遠邀未然之報昧爽之臣稽首於外謂㣥臣入朝者也孔安國曰昧冥爽明早旦稽音啓愆禮忤時忤五故翻人靈未穆愚謂修朝夕之因求祇劫之果祇巨支翻釋氏之言祇劫猶云無數劫也未若收萬國之歡心以事其親使天下和平災害不生也用孝經文意淑善也躬致郊廟之虔親紆朔望之禮紆縈也屈也五帝之學曰成均鄭玄曰釋菜奠幣禮先師也又曰釋奠者設薦饌酌奠而已孔穎達曰釋奠有牲牢有幣帛釋菜則惟釋蘋藻而已千畝謂藉田也還復百官久折之秩量音良折而設翻已造者務令簡約速成未造者一切不復更為則孝弟可以通神明弟讀曰悌德教可以光四海節用愛人法俗俱賴矣尋敕外議釋奠之禮又自是每月一陛見㣥臣皆用普惠之言也普惠復表論時政得失太后與帝引普惠於宣光殿隨事詰難復扶又翻見賢遍翻難乃旦翻臨川王宏妾弟吳法壽殺人而匿於宏府中上敕宏出之即日伏辜南司奏免宏官御史臺曰南臺亦曰南司愛宏者兄弟私親免宏者王者正法所奏可五月戊寅司徒驃騎大將軍揚州刺史臨川王宏免驃匹妙翻騎奇寄翻宏自洛口之敗事見一百四十六卷五年都下每有竊發輒以宏為名屢為有司所奏上每赦之上幸光宅寺帝以三橋舊宅為光宅寺三橋在秣陵縣同夏里宏府面秦淮於府前為浮橋謂之驃騎航以宏官名航也上將行心動乃於朱雀航過事發稱為宏所使上泣謂宏曰我人才勝汝百倍當此猶恐不堪汝何為者我非不能為漢文帝謂誅淮南厲王長也宏頓首稱無之故因匿法壽免宏官宏奢僭過度殖貨無厭厭於鹽翻庫屋垂百間垂幾及也關籥甚嚴籥與鑰同關牡也密以聞鎧可亥翻上於友愛甚厚殊不悅他日送盛饌與宏愛妾江氏曰當來就汝歡宴饌雛戀翻又雛睆翻獨攜故人射聲校尉丘他卿往與宏及江大飲半醉後謂曰我今欲履行汝後房行下孟翻即呼輿徑往堂後宏恐上見其貨賄顏色怖懼賄呼罪翻怖普布翻上意益疑之於是屋屋檢視每錢百萬為一聚黃榜標之千萬為一庫懸一紫標如此三十餘間上與他卿屈指計見錢三億餘萬見賢遍翻餘屋貯布絹絲綿漆蜜紵蠟等雜貨但見滿庫不知多少貯丁呂翻紵直呂翻紵麻屬而細於麻少詩沼翻上始知非仗大悅謂曰阿六汝生計大可宏於諸弟次第六阿從安入聲舉燭而還還從宣翻又如字兄弟方更敦睦宏都下有數十邸出懸錢立券每以田宅邸店懸上文契上時掌翻期訖便驅券主奪其宅都下東土百姓失業非一上後知之制懸券不得復驅奪自此始復扶又翻侍中領軍將軍吳平侯昺雅有風力為上所重軍國大事皆與議決以為安右將軍監揚州安右將軍帝所置百號將軍之一也昺音丙監工銜翻昺帝從父弟揚州京邑昺自以為越同氣之親而居之故懇讓上不許在州尤稱明斷斷丁亂翻符教嚴整辛巳以宏為中軍將軍中書監六月乙酉又以本號行司徒本號中軍將軍號也臣光曰宏為將則覆三軍將即亮翻為臣則涉大逆高祖貸其死罪可矣數旬之間還為三公於兄弟之恩誠厚矣王者之法果安在哉初洛陽有漢所立三字石經石經事見四十七卷漢靈帝熹平四年酈道元曰蔡雍正定五經文字刻石立於太學門外魏正始中又立古篆隸三字石經喪息浪翻及魏馮熙常伯夫相繼為洛州刺史魏都平城以洛陽為洛州既遷洛始改為司州遂大致頽落所存者委於榛莽道俗隨意取之侍中領國子祭酒崔光請遣官守視命國子博士李郁等補其殘缺胡太后許之會元叉劉騰作亂事遂寢叉騰作亂事見下卷普通二年秋七月魏河州羌卻鐵忽章十二行本忽作匆乙十一行本同下同孔本均同反自稱水池王河州治枹罕領金城武始洪和臨洮郡水池縣魏真君四年置郡後改為縣屬洪和郡隋併洪和郡為當夷縣其地在唐洮州臨潭縣界曹魏置尚書主客郎嚴勒州郡及諸軍毋得犯民一物亦不得輕與賊戰然後示以威恩使知悔懼八月鐵忽等相帥詣子恭降首尾不及二旬言自子恭至河州及于賊降首尾不及二旬也帥讀曰率降戶江翻懷之子也源懷源賀之子歷事文成獻文孝文宣武魏宦者劉騰手不解書解戶買翻而多姦謀善揣人意揣初委翻胡太后以其保護之功事見上十四年遂干預政事納賂為人求官無不效者為于偽翻河間王琛簡之子也齊郡王簡見一百三十七卷齊武帝永明九年琛丑林翻以貪縱著名及罷州還太后詔曰琛在定州唯不將中山宮來後燕都中山建宮室魏克中山因以為中山宮何可更復敘用復扶又翻遂廢于家琛乃求為騰養息養息即養子也騰為之言於太后為于偽翻得兼都官尚書出為秦州刺史會騰疾篤太后欲及其生而貴之九月癸未朔以騰為衛將軍加儀同三司魏胡太后以天文有變欲以崇憲高太后當之戊申夜高太后暴卒冬十月丁卯以尼禮葬於北邙尼女夷翻下同諡曰順皇后百官單衣邪巾古者二十成人士冠庶人巾邪巾者邪厭於首捨衰絰喪冠而單衣邪巾示不成喪也事訖而除乙亥以臨川王宏為司徒魏胡太后遣使者宋雲與比丘惠生如西域求佛經比丘僧也比毗至翻下連比同昔高祖遷都制城內唯聽置僧尼寺各一餘皆置於城外蓋以道俗殊歸欲其淨居塵外故也正始三年沙門統惠深始違前禁自是卷詔不行卷讀曰捲私謁彌衆都城之中寺踰五百占奪民居三分且一屠沽塵穢連比雜居占之贍翻比毗至翻往者代北有法秀之謀事見一百三十五卷齊太祖建元三年太和景明之制非徒使緇素殊途蓋亦以防微杜漸昔如來闡教多依山林如來佛也戀著城邑著直略翻正以誘於利欲不能自已誘音酉此乃釋氏之糟粳法王之社鼠法王謂佛釋氏有五戒臣謂都城內寺未成可徙者宜悉徙於郭外僧不滿五十者併小從大外州亦準此章十二行本此下有詔從之三字乙十一行本同孔本同張校同退齋校同然卒不能行卒子恤翻是歲魏太師雍等奏鹽池天藏藏徂浪翻資育㣥生先朝為之禁限朝直遙翻亦非苟與細民爭利但利起天池取用無法或豪貴封護或近民吝守貧弱遠來邈然絶望因置主司令其裁察強弱相兼務令得所什一之稅自古有之所務者遠近齊平公私兩宜耳及甄琛啓求禁集章十二行本作罷禁乙十一行本同孔本同退齋校同事見一百四十六卷五年甄之人翻琛丑林翻乃為繞池之民尉保光等亶自固護語其障禁倍於官司取與自由貴賤任口言鹽價賤貴任其口之所出也詔從之張政烺標點王崇武聶崇岐覆校
