body:
  text: 資治通鑑卷第一百四十二端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注齊紀八東昏侯上諱寶卷字智藏明帝第二子也本名明賢明帝輔政後改焉明帝長子寶義有廢疾故立帝為太子其後蕭衍蕭穎胄以荊雍起兵輔南康王寶融以攻帝廢帝為東昏侯荊雍在西謂帝以昏虐居東故廢為東昏侯永元元年己卯四九九春正月戊寅朔大赦改元太尉陳顯達督平北將軍崔慧景軍四萬擊魏欲復雍州諸郡去年魏克雍州五郡雍於用翻癸未魏遣前將軍元英拒之元英即拓跋英魏既改姓元氏史因而書之乙酉魏主發鄴去年十二月甲寅魏主自鄴班師今車駕始自鄴發辛卯帝祀南郊戊戌魏主至洛陽過李沖冢沖死見上卷上年魏主令葬沖於洛陽覆舟山近杜預冢今自鄴還過其冢按魏主詔代人遷洛者葬洛餘州從便沖隴西人也以其貴寵亦令葬洛望之而泣見留守官語及沖輒流涕李沖與任城王澄等同守留臺魏主還洛見留守官而沖已死故語及輒流涕念之之甚也守式又翻魏主謂任城王澄曰朕離京以來舊俗少變不任音壬離力智翻少詩沼翻下同不讀曰否對曰聖化日新帝曰朕入城見車上婦人猶戴帽著小襖此代北婦人之服也乘車婦人皆貴臣之家也著陟略翻襖烏浩翻夾衣也對曰著者少不著者多帝曰任城此何言也必欲使滿城盡著邪澄與留守官皆免冠謝史言魏主汲汲於用夏變夷甲辰魏大赦魏主之幸鄴也李彪迎拜於鄴南且謝罪彪既得罪歸鄉里故迎魏主於鄴南朕欲用卿思李僕射而止慰而遣之會御史臺令史龍文觀告太子恂被收之日恂被收見一百四十卷明帝建武三年被皮義翻彪不以聞尚書表收彪赴洛陽帝以為彪必不然以牛車散載詣洛陽散悉但翻散載者不加縶縛會赦得免魏太保齊郡靈王簡卒二月辛亥魏以咸陽王禧為太尉魏主連年在外魏主自明帝建武元年南伐至是首尾四年菩蓬晡翻薩桑葛翻及帝在懸瓠病篤事見上卷上年中常侍雙蒙等為之心腹雙姓蒙名姓譜顓帝後封於雙蒙城其後以為氏彭城公主為宋王劉昶子婦寡居昶丑兩翻后為其母弟北平公馮夙求婚帝許之公主不願后強之后為于偽翻強其兩翻公主密與家僮冒雨詣懸瓠訴於帝且具道后所為帝疑而祕之后聞之始懼陰與母常氏使女巫厭禱厭於葉翻又於琰翻曰帝疾若不起一旦得如文明太后輔少主稱制者文明太后后之姑也其包藏禍心若此豈非姑之教邪少詩照翻當賞報不資資即移翻資之為言量也不資言無量之可比也帝還洛收高菩薩雙蒙等案問具伏帝在含溫室夜引后入賜坐東楹去御榻二丈餘命菩薩等陳狀陳后淫泆之狀協音協曰昔為汝嫂今是路人但入勿避又曰此嫗欲手刃吾脅嫗威遇翻老婦曰嫗吾以文明太后家女不能廢但虛置宮中有心庶能自死言若有人心必當自取盡也二王出賜后辭訣后再拜稽首涕泣稽音啓入居後宮諸嬪御奉之猶如后禮嬪毗賓翻唯命太子不復朝謁而已太子儲君也命不復朝謁絶之不使以母禮事之復扶又翻朝直遙翻初馮熙以文明太后之兄尚恭宗女博陵長公主景穆太子廟號恭宗長知兩翻二為皇后一為左昭儀二后廢后及幽后也昭儀早卒瑤光寺之練行尼魏主忍為之廢后非得罪於宗廟也幽后所為彰灼如此乃不能正其罪廢后獨非文明家女邪賞賜纍巨萬漢書音義曰巨萬萬萬也冠古玩翻公主生二子誕修熙為太保誕為司徒修為侍中尚書庶子聿為黃門郎黃門侍郎崔光與聿同直庶子妾御所生以此觀之魏以黃門郎與黃門侍郎為兩官同直同直禁中也君家富貴太盛終必衰敗聿曰我家何所負而君無故詛我詛莊助翻呪也光曰不然物盛必衰此天地之常理若以古事推之不可不慎後歲餘而修敗修性浮競誕屢戒之不悛悛丑緣翻乃白於太后及帝而杖之修由是恨誕求藥使誕左右毒之事覺帝欲誅之誕自引咎懇乞其生帝亦以其父老杖修百餘黜為平城民及誕熙繼卒太和十九年馮誕卒是年二月也四月馮熙又卒太和二十年幽后廢馮氏遂衰史言外戚罕有能全保其福祿者魏章十二行本魏上有癸亥二字乙十一行本同孔本同退齋校同以彭城王協為司徒協音協陳顯達與魏元英戰屢破之攻馬圈城四十日按陳顯達傳馬圈在南鄉界杜佑曰馬圈城去襄陽三百里在今南陽郡界穰縣北杜佑曰後魏馬圈鎮漢陽縣地圈渠篆翻噉死人肉及樹皮噉徒濫翻又徒覽翻癸酉魏人突圍走斬獲千計顯達入城將士競取城中絹遂不窮追史言齊師貪鹵掠以縱敵將即亮翻拔之莊丘復姓也蕭子顯曰南鄉城順陽舊治也魏主謂任城王澄曰顯達侵擾朕不親行無以制之任音壬三月庚辰魏主發洛陽命于烈居守守音狩凡留守太守之守皆同以右衛將軍宋辨兼祠部尚書攝七兵事以佐之攝七兵事者攝尚書七兵曹事也杜佑曰魏始置五兵尚書謂中兵外兵別兵都兵騎兵也晉又分中外兵各為左右後魏遂為七兵尚書治直吏翻恩遇亞於李沖癸未魏主至梁城魏收志北荊州汝北郡有梁縣汝源縣五代志襄城郡承休縣舊曰汝源置汝北郡唐志汝州臨汝郡本襄城郡治梁縣又有梁縣故城在西南四十五里順陽太守清河張烈固守五代志鄧州順陽縣舊置順陽郡唐武德六年省順陽入冠軍貞觀元年省冠軍入新城其地在今鄧州菊潭臨湍二縣之間也杜佑曰漢順陽故城在鄧州穰縣西亦後漢穰縣地甲申魏主遣振威將軍慕容平城將騎五千救之將即亮翻騎奇寄翻自魏主有疾彭城王協常居中侍醫藥晝夜不離左右離力智翻飲食必先嘗而後進蓬首垢面衣不解帶帝久疾多忿近侍失指動欲誅斬協承顏伺間多所匡救伺相吏翻間古莧翻下間道同丙戌以協為使持節都督中外諸軍事使疏吏翻協辭曰臣侍疾無暇安能治軍願更請一王使總軍要軍要猶言軍權也左傳曰握兵之要杜預注云威權在己治直之翻帝曰侍疾治軍皆憑於汝吾病如此深慮不濟安六軍保社稷者捨汝而誰何容方更請人以違心寄乎心寄謂推心以託之也丁酉魏主至馬圈命荊州刺史廣陽王嘉斷均口水經曰均水出淅縣北山南流過其縣之東又南當涉都縣邑北南入于沔注云即郡國志築陽縣之涉都鄉均水於此入沔謂之均口斷丁管翻嘉建之子也楚王建見一百二十五卷宋文帝元嘉十七年陳顯達引兵渡水西均水之西也人情沮恐沮在呂翻與魏戰屢敗魏武衛將軍元嵩免胄陷陳陳讀曰陳將士隨之齊兵大敗嵩澄之弟也戊戌軍章十二行本軍上有夜字乙十一行本同孔本同張校同退齋校同主崔恭祖胡松以烏布幔盛顯達數人擔之幔莫半翻盛時征翻擔都甘翻負也間道自分磧山出均水口南走磧七迹翻己亥魏收顯達軍資億計班賜將士追奔至漢水而還還從宣翻又如字下同左軍將軍張千戰死考異曰魏書作張千達今從齊書顯達之北伐軍入汋均口水經注順陽縣西有石山南臨汋水汋水又南流注于沔水謂之汋口詳考經及注汋水均水實一水也故謂之汋均口汋實若翻沈約宋志廣平太守江左僑立治襄陽宋為實土以漢朝陽縣地立廣平郡及廣平縣領酇陰比陽等縣按水經注朝陽在新野西白水又出其西汋均水迅急易進難退説輸芮翻易以豉翻魏若守隘則首尾俱急不如悉棄船於酇城陸道步進酇縣即漢蕭何所封之邑屬南陽郡晉屬順陽郡江左僑立廣平郡酇縣屬焉馮道根廣平酇人也水經沔水自均口東南過酇縣之西南五代志襄州陰城縣西魏置酇城郡隘烏懈翻酇音贊鼓行而前破之必矣顯達不從道根以私屬從軍私屬者家之奴客及其親黨非官之所調發者軍人不知山路道根每及險要輒停馬指示之衆賴以全詔以道根為汋均口戍副凡邊戍有戍主戍副至是大損陳顯達之敗固是弱不可以敵強亦天為之也齊師潰於戊戌魏主殂於丙午儻顯達更能支持數日安知不能轉敗為功邪顯達亦自表解職皆不許更以顯達為江州刺史考異曰齊明帝紀永泰元年七月癸卯以顯達為江州本傳顯達敗於馬圈求降號不許乃除江州又云東昏立顯達彌不樂京師得此授甚喜按明帝末顯達方以三公將兵擊魏不容無故除江州今從本傳庚子魏主疾甚北還至穀塘原謂司徒協曰後宮久乖陰德記曰天子理陽道后治陰德鄭注云陰德謂主陰事陰令也可賜自盡葬以后禮庶免馮門之醜又曰吾病益惡殆必不起雖摧破顯達而天下未平嗣子幼弱社稷所倚唯在於汝霍子孟諸葛孔明以異姓章十二行本姓下有猶字乙十一行本同孔本同受顧託漢武帝託昭帝於霍光昭烈帝託後主於諸葛亮事並見前可不勉之協泣曰布衣之士猶為知己畢命古語有之士為知己者死為于偽翻依陛下之末光乎託靈託體皆兄弟同氣之謂也久參機要寵靈輝赫海內莫及所以敢受而不辭正恃陛下日月之明恕臣忘退之過耳今復任以元宰復扶又翻總握機政震主之聲取罪必矣昔周公大聖成王至明猶不免疑而況臣乎如此則陛下愛臣更為未盡始終之美彭城王協慮禍避權如此猶終不免於高肇之手況咸陽王禧北海王詳等邪曰詳思汝言理實難奪乃手詔太子曰汝叔父協清規懋賞懋美也厭榮捨紱以松竹為心吾少與綢繆紱音弗少詩照翻鄭康成曰綢繆猶纏綿也綢直留翻繆莫侯翻未忍暌離百年之後其聽協辭蟬捨冕遂其沖挹之性以侍中護軍將軍北海王詳為司空鎮南將軍王肅為尚書令鎮南大將軍廣陽王嘉為左僕射尚書宋辨為吏部尚書與侍中太尉禧尚書右僕射澄等六人輔政夏四月丙午朔殂于穀塘原年三十三諡孝文皇帝廟號高祖高祖友愛諸弟終始無間間古莧翻嘗從容謂咸陽王禧等曰從千容翻我後子孫邂逅不肖不期而會曰邂逅肖似也不似其先曰不肖邂戶懈翻逅胡豆翻可輔則輔之不可輔則取之勿為他人有也以禧之驕貪如此孝文以此語之是啓其姦心也景明之禍帝實胎之從善如流精勤庶務朝夕不倦常曰人主患不能處心公平推誠於物處昌呂翻能是二者則胡越之人皆可使如兄弟矣用法雖嚴於大臣無所容貸然人有小過常多闊略嘗於食中得蟲又左右進羹誤傷帝手皆笑而赦之天地五郊宗廟二分之祭五郊謂迎氣五郊也按鄭康成説古者天子春分朝日秋分夕月故曰二分之祭魏則朝日以朔夕月以朏猶仍古謂之二分之祭每出巡遊及用兵有司奏修道路帝輒曰粗修橋梁通車馬而已勿去草剗令平也粗坐五翻去羌呂翻剗楚限翻在淮南行兵如在境內禁士卒無得踐傷粟稻踐息淺翻或伐民樹以供軍用皆留絹償之宮室非不得已不修衣弊浣濯而服之鞍勒用鐵木而已幼多力善射能以指彈碎羊骨魏紀云能以指彈碎羊髆骨羊骨唯髆骨頗脆他骨未易彈碎也彈徒丹翻先命其處而後射中之謂之命中射而亦翻遂不復畋獵復扶又翻下同常謂史官曰時事不可以不直書人君威福在己無能制之者若史策復不書其惡將何所畏忌邪自此以上史言魏孝文德美彭城王協與任城王澄謀以陳顯達去尚未遠恐其覆相掩逼覆反也恐凶問外露陳顯達知之反兵追掩以相逼徙御臥輿唯二王與左右數人知之協出入神色無異奉膳進藥可決外奏一如平日數日至宛城宛於元翻夜進臥輿於郡聽事得加棺斂魏書禮志臥輦飾如乾象輦丹漆駕六馬聽他經翻聽受也中庭曰聽事言受事察訟於是也漢晉皆作聽事六朝以後乃始加作廳棺古玩翻斂力贍翻外莫有知者遣中書舍人張儒奉詔徵太子密以凶問告留守于烈烈處分行留舉止無變史言魏孝文之殂執羈絏守社稷者皆能以常處變不動聲色蓋其善用人之效也處昌呂翻分扶問翻魯陽縣漢晉屬南陽郡魏太和十一年置魯陽鎮十八年改為荊州二十年罷州置魯陽郡唐汝州魯山縣本魯陽縣也乃發喪丁巳即位帝諱恪孝文皇帝第二子也彭城王協跪授遺敕數紙東宮官屬多疑協有異志密防之而協推誠盡禮卒無間隙推誠謂推誠於東宮官屬也盡禮謂事嗣君盡禮也卒子恤翻間古莧翻留城外以察其變久之乃入亦疑協有異志也汝此行不唯勤勞亦實危險協曰兄年長識高故知有夷險長知兩翻彥和握蛇騎虎不覺艱難協字彥和蛇螫虎噬握之騎之罕有能免於螫噬者故以為喻汝恨吾後至耳協等以高祖遺詔賜馮后死北海王詳使長秋卿白整入授后藥長秋卿皇后宮卿也即漢之大長秋不肯飲走且呼也呼火故翻官豈有此是諸王輩殺我耳整執持強之乃飲藥而卒強其兩翻考異曰元嵩傳曰將遣使者賜馮后死而難其人顧任城王澄曰任城不負我嵩亦當不負任城可使嵩也乃引高平侯嵩入內親詔遣之高祖紀曰詔司徒協徵太子與喪會魯陽踐阼按馮后傳梓宮至魯陽乃行遺詔賜后死安有高祖遣嵩之事又協傳高祖崩協遏祕喪事遣張儒徵世宗亦無高祖詔協徵太子事喪至洛城南咸陽王禧等知后審死相視曰設無遺詔我兄弟亦當決策去之豈可令失行婦人宰制天下殺我輩也去羌呂翻行下孟翻諡曰幽皇后諡法壅遏不通曰幽五月癸亥加撫軍大將軍始安王遙光開府儀同三司丙申魏葬孝文帝於長陵長陵在瀍西魏世宗欲以彭城王協為相協屢陳遺旨請遂素懷帝對之悲慟協懇請不已乃以協為使持節侍中都督冀定等七州諸軍事驃騎大將軍開府儀同三司定州刺史使疏吏翻驃匹妙翻騎奇寄翻七州冀定相瀛幽平營也協猶固辭帝不許乃之官魏任城王澄以王肅羇旅位加己上王肅本江南人而奔魏故以為羈旅肅為尚書令而澄為右僕射故以為位加己上會齊人降者嚴叔懋告肅謀逃還江南降戶江翻澄輒禁止肅禁止不令入宮省案驗無實咸陽王禧等奏澄亶禁宰輔免官還第尋出為雍州刺史按史官稱任城王澄之才略魏宗室中之巨擘也太和之間朝廷有大議澄每出辭氣加萬乘而軼其上孝文外雖容之內實憚之況咸陽王禧等乎因王肅而斥逐之耳主少國疑之時澄之能全其身者幸也雍於用翻六月戊辰魏追尊皇妣高氏為文昭皇后高氏卒見上卷明帝建武四年增修舊冢號終寧陵據后傳陵在長陵東南諡曰敬揚余章翻以其嫡孫猛襲爵封后兄肇為平原公肇弟顯為澄城公澄城漢馮翊之徵縣左傳之北徵也魏真君七年置澄城郡魏主素未識諸舅始賜衣幘引見見賢遍翻皆惶懼失措數日之間富貴赫奕赫明也奕盛也為高肇以亶權致禍張本秋八月戊申魏用高祖遺詔三夫人以下皆遣還家魏高祖始定內官左右昭儀位視大司馬三夫人位視三公帝自在東宮不好學好呼到翻唯嬉戲無度性重澀少言澀色入翻及即位不與朝士相接朝直遙翻下同專親信宦官及左右御刀應敕等御刀捉御刀在左右者應敕在左右祗應敕命者應於證翻是時揚州刺史始安王遙光尚書令徐孝嗣右僕射江祏祏音石右將軍蕭坦之侍中江祀衛尉劉暄更直內省分日帖敕內省在禁中以別華林省及下省帖敕者於敕後聯紙書行所謂畫敕也更工衡翻謂從舅録事參軍范陽張弘策曰張弘策范陽方城人衍母張氏弘策之從父弟雍於用翻從才用翻一國三公猶不堪左傳晉士蒍曰狐裘蒙茸一國三公吾誰適從勢必相圖亂將作矣避禍圖福無如此州但諸弟在都恐罹世患當更與益州圖之耳衍兄懿時為益州刺史他人皆不得預謀招聚驍勇以萬數多伐材竹沈之檀溪水經注檀溪水出襄陽縣西柳子山下溪去城里餘北流注于沔即劉備乘的盧墮處也驍堅堯翻沈直禁翻又持林翻大脊曰岡大陵曰阜中兵參軍東平呂僧珍覺其意亦私具櫓數百張先是僧珍為羽林監羽林監漢官監羽林兵先悉薦翻僧珍知孝嗣不能久固求從衍是時衍兄懿罷益州刺史還仍行郢州事衍使弘策説懿曰説輸芮翻下又自説同今六貴比肩人自畫敕爭權睚眥理相圖滅圖謀也謀相滅也或曰圖當作屠睚五懈翻眥士懈翻媟近左右慓輕忍虐媟私列翻近其靳翻慓匹妙翻急疾也輕區竟翻安肯委政諸公虛坐主諾言必不肯付朝政以聽於六貴但擁虛位有可無否唯主作諾而已必大行誅戮始安欲為趙王倫形迹已見趙王倫事見八十四卷晉惠帝永寧元年見賢遍翻徒為禍階蕭坦之忌克陵人徐孝嗣聽人穿鼻言如牛然聽人穿鼻而受制於人斷丁管翻劉暄暗弱一朝禍發中外土崩吾兄弟幸守外藩宜為身計及今猜防未生當悉召諸弟恐異時拔足無路矣後卒如衍所料史言朝政不綱則姦雄生心郢州當荊湘下流二州之所赴集也世治則竭誠本朝治直吏翻朝直遙翻世亂則足以匡濟與時進退此萬全之策也若不早圖後悔無及弘策又自説懿曰以卿兄弟英武天下無敵據郢雍二州為百姓請命廢昏立明易於反掌為于偽翻易以豉翻此桓文之業也勿為豎子所欺取笑身後雍州揣之已熟揣初委翻願善圖之懿不從衍乃迎其弟驃騎外兵參軍偉及西中郎外兵參軍憺至襄陽憺徙濫翻初高宗雖顧命㣥公而多寄腹心在江祏兄弟顧命見上卷上年江祏江祀兄弟高宗母景皇后之姪也故寄以腹心更工衡翻更迭也動止關之帝稍欲行意徐孝嗣不能奪蕭坦之時有異同而祏執制堅確帝深忿之帝左右會稽茹法珍吳興梅蟲兒等為帝所委任會工外翻茹音如祏常裁折之法珍等切齒徐孝嗣謂祏曰主上稍有異同詎可盡相乖反立異為乖不順指為反但以見付必無所憂帝失德寖彰祏議廢帝立江夏王寶玄夏戶雅翻劉暄嘗為寶玄郢州行事執事過刻有人獻馬寶玄欲觀之暄曰馬何用觀索煮肫肫之春翻鳥藏曰肫又徒渾翻豕也帳下咨暄暄曰旦已煮鵝不煩復此復扶又翻又也寶玄恚曰舅殊無渭陽情詩渭陽序曰秦康公之母晉獻公之女文公遭驪姬之難未反而秦姬卒穆公納文公康公時為太子贈送文公于渭之陽念母之不見也我見舅氏如母存焉劉暄明帝劉皇后之弟故寶玄呼之為舅今按詩小序渭陽之事乃甥用情於舅後世率以舅不能用情於甥者為無渭陽情誤矣恚於避翻不同祏議更欲立建安王寶寅祏密謀於始安王遙光遙光自以年長欲自取以徵旨動祏祏弟祀亦以少主難保長知兩翻少詩照翻下同勸祏立遙光祏意回惑以問蕭坦之坦之時居母喪起復為領軍將軍起復者起之於苫塊之中使復其位也明帝立已非次天下至今不服若復為此復扶又翻下可復復能不復生復同恐四方瓦解我期不敢言耳遂還宅行喪蕭坦之冒于榮勢豈能終喪者直以廢立大事不欲預其禍託此以引避耳祏祀密謂吏部郎謝朓曰江夏年少脫不堪負荷朓土了翻荷下可翻又如字豈可復行廢立始安年長入纂不乖物望非以此要富貴要讀如邀政是求安國家耳政與正同渢房戎翻欲引以為黨朓不答頃之遙光以朓兼知衛尉事朓懼以郎兼卿事本無足懼其所懼者以為為遙光所引用將罹其難也率所律翻興盛不敢發朓又説劉暄曰始安一旦南面則劉渢劉晏居卿今地但以卿為反覆人耳晏者遙光城局參軍也暄陽驚馳告遙光及祏遙光欲出朓為東陽郡朓常輕祏謝朓以人門輕江祏遙光乃收朓付廷尉與孝嗣祏暄等連名啓朓扇動內外妄貶乘輿竊論宮禁間謗親賢乘繩證翻間古莧翻輕議朝宰朓遂死獄中謝朓以告王敬則超擢而死於遙光之手行險以徼幸一之謂甚其可再乎朝直遙翻暄以遙光若立己失元舅之尊不肯同祏議故祏遲疑久不決遙光大怒遣左右黃曇慶刺暄於青溪橋曇徒含翻刺七亦翻曇慶見暄部伍多不敢發暄覺之遂發祏謀帝命收祏兄弟時祀直內殿疑有異遣信報祏曰劉暄似有異謀今作何計祏曰政當靜以鎮之俄有詔召祏入見停中書省見賢遍翻初袁文曠以斬王敬則功當封斬敬則見上卷明帝永泰元年時崔恭祖以刺仆敬則與文曠爭功祏執不與當為此也取謂殺之也復能奪我封不不讀曰否並弟祀皆死劉暄聞祏等死眠中大驚投出戶外問左右收至未良久意定還坐大悲曰不念江行自痛也暄自知禍將及己帝自是無所忌憚益得自恣日夜與近習於後堂鼓叫張叫作吹戲馬常以五更就寢至晡乃起㣥臣節朔朝見朔謂每月朔旦朔旦朝參之外一月之內又自有朝參日分因謂之節或際暗遣出晡後造朝帝復不出故際暗而遣退月數十日乃報或不知所在宦者以裹魚肉還家並是五省黃案魏晉以來有六曹尚書江左有吏部祠部五兵左民度支五尚書各為一省謂之尚書五省案文案也藏之以為案據尚書用黃札故曰黃案致極也適歡適也江祏常禁吾乘馬小子若在吾豈能得此因問祏親戚餘誰對曰江祥今在冶帝誅祏兄弟獨祥免死配東冶賜祥死始安王遙光素有異志與其弟荊州刺史遙欣密謀舉兵據東府使遙欣引兵自江陵急下刻期將發而遙欣病卒江祏被誅被皮義翻帝召遙光入殿告以祏罪遙光懼懼禍及也省謂中書省也遙光時為中書令遂稱疾不復入臺還東府遂稱疾不復入臺城號戶高翻遙光弟豫州刺史遙昌卒先悉薦翻卒子恤翻其部曲皆歸遙光及遙欣喪還停東府前渚荊州衆力送者甚盛前渚秦淮渚也東府前臨秦淮慮遙光不自安欲遷為司徒使還第遷司徒以崇其位望而使還第養疾遙光恐見殺乙卯晡時收集二州部曲於東府東門二州部曲自荊州豫州來者以討劉暄為名夜遣數百人破東冶出囚於尚方取仗仗兵仗也驍堅堯翻歷生隨信而至蕭坦之宅在東府城東遙光遣人掩取之坦之露袒踰牆走露者露髻袒者肉袒向臺而走欲入言其事遊邏主將兵在臺城外巡邏者也邏郎佐翻見坦之露袒挺身走疑其得罪逃竄故執之章十二行本告上有坦之二字乙十一行本同孔本同以遙光反不信自往詗問知實詗火迥翻又翾正翻有所候伺謂之詗乃以馬與坦之相隨入臺遙光又掩取尚書左僕射沈文季於其宅欲以為都督會文季已入臺垣歷生説遙光帥城內兵夜攻臺輦荻燒城門荻亭歷翻萑也説輸芮翻帥讀曰率下同曰公但乘輿隨後輿與輿同遙光狐疑不敢出天稍曉遙光戎服出聽事命上仗登城行賞賜上時掌翻歷生復勸出軍遙光不肯冀臺中自有變及日出臺軍稍至臺中始聞亂衆情惶惑向曉有詔召徐孝嗣孝嗣入人心乃安左將軍沈約聞變據梁書沈約傳約時為左衛將軍此逸衛字掖音亦或勸戎服約曰臺中方擾攘見我戎服或者謂同遙光乃朱衣而入丙辰詔曲赦建康中外戒嚴徐孝嗣以下屯衛宮城蕭坦之帥臺軍討遙光孝嗣內自疑懼與沈文季戎服共坐南掖門上欲與之共論世事文季輒引以他辭終不得及蕭坦之屯湘宮寺湘宮寺宋明帝所起臺城外城六門皆設籬門而已無郛郭東府在臺城東故命興盛屯東籬門以討遙光按曹虎傳大橋青溪中橋也三面燒司徒府宋元嘉中彭城王義康為司徒徙居東府於東府之側起司徒府臺軍屢敗殺軍主桑天愛遙光之起兵也問咨議參軍蕭暢暢正色不從戊午暢與撫軍長史沈昭略潛自南門出詣臺自歸衆情大沮東府之衆情也沮在呂翻衍之弟昭略文季之兄子也己未垣歷生從南門出戰因棄矟降曹虎虎命斬之矟色角翻降戶江翻考異曰南史云歷生出戰為曹虎所禽謂虎曰卿以主上為聖明梅茹為賢相我當死且我今死卿明日亦死遂殺之按歷生若見獲遙光不當殺其子今從齊書遙光大怒於牀上自踊使殺歷生子其晚臺軍以火箭燒東北角樓至夜城潰遙光還小齋帳中著衣帢坐秉燭自照令人反拒齋閣皆重關著陟略翻帢苦洽翻重直龍翻左右並踰屋散出臺軍主劉國寶等先入遙光聞外兵至滅燭扶匐牀下扶音蒲匐蒲北翻軍人排閣入於暗中牽出斬之臺軍入城焚燒室屋且盡劉渢走還家為人所殺荊州將潘紹聞遙光作亂謀欲應之欲以江陵應之也將即亮翻時南康王寶融以西中郎將鎮江陵以夏侯詳為司馬夏戶雅翻因斬之州府以安州荊州府西中郎府也己巳以徐孝嗣為司空加沈文季鎮軍將軍侍中僕射如故沈文季加鎮軍將軍號本職如故右將軍如故帝即位之初坦之為右將軍遙光既平使為右僕射丹楊尹而右將軍軍號如故曹虎為散騎常侍右衛將軍散悉亶翻騎奇寄翻皆賞平始安之功也魏南徐州刺史沈陵來降魏高祖置南徐州於宿豫降戶江翻文季之族子也沈文秀為宋守東陽明帝泰始五年沒於魏文秀文季㣥從也陵之入魏當在是時少詩照翻府事皆決於長史盧淵淵知陵將叛敕諸城潛為之備敕戒也魏朝不聽陵遂殺將佐帥宿預之衆來奔朝直遙翻將即亮翻帥讀曰率濱淮諸戍以有備得全陵在邊歷年陰結邊州豪傑陵既叛郡縣多捕送陵黨淵皆撫而赦之唯歸罪於陵衆心乃安根連株逮則沿邊豪傑懼罪必相帥南奔故悉赦之以安反側閏月丙子立江陵公寶覽為始安王奉靖王後遙光既誅靖王無後故也始安貞王道生長子鳳卒于宋世明帝建武元年贈始安靖王遙光靖王子也以沈陵為北徐州刺史齊南徐州治京口北徐州治鍾離今沈陵自魏南徐州來降因其位任改曰北徐江祏等既敗帝左右捉刀應敕之徒皆恣橫用事橫戶孟翻時人謂之刀敕蕭坦之剛狠而專嬖幸畏而憎之遙光死二十餘日帝遣延明主帥黃文濟將兵圍坦之宅殺之延明主帥蓋延明殿主帥也狠戶墾翻嬖卑義翻又博計翻帥所類翻將即亮翻下同坦之從兄翼宗為海陵太守沈約志晉安帝分廣陵立海陵郡今泰州即其地從才用翻守式又翻受海陵之命而未行也從兄海陵宅故應無他無他言無他變猶今人言無事也海陵宅在何處坦之以告文濟白帝帝仍遣收之檢其家至貧唯有質錢帖數百質錢帖者以物質錢錢主給帖與之以為照驗他日出子本錢收贖原其死繫尚方茹法珍等譖劉暄有異志茹音如帝曰暄是我舅豈應有此直閣新蔡徐世標曰明帝乃武帝同堂明帝高帝兄子於武帝同堂兄弟也猶滅武帝之後恩遇事見一百三十八卷武帝永明十一年滅武帝後見明帝紀焉於虔翻何也遂殺之曹虎善於誘納日食荒客常數百人誘音酉食讀曰飼荒客自蠻中及化外來者晚節吝嗇罷雍州有錢五千萬他物稱是雍於用翻稱尺證翻帝疑虎舊將且利其財遂殺之坦之暄虎所新除官坦之虎新除官見上初高宗章十二行本宗下有臨字乙十一行本同孔本同殂以隆昌事戒帝曰作事不可在人後謂鬱林王欲殺高宗持疑不發以及禍高宗以是而戒帝自謂密矣而非所以貽謀燕翼子也數所角翻皆發於倉猝決意無疑於是大臣人人莫能自保史言帝昏暴果於誅殺上下搖心九月丁未以豫州刺史裴叔業為南兗州刺史征虜長史張沖為豫州刺史壬戌以頻誅大臣大赦丙戌魏主謁長陵欲引白衣左右吳人茹皓同車雖引在左右未命以官故曰白衣左右茹音如給事黃門侍郎元匡進諫帝推之使下推吐雷翻皓失色而退匡新城之子也陽平王新城魏高宗之弟益州刺史劉季連聞帝失德遂自驕恣用刑嚴酷蜀人怨之是月遣兵襲中水不克沈約宋書資江為中水涪江為內水今謂之中江在資州資陽縣西資州漢犍為郡之資中縣地季連不能制枝江文忠公徐孝嗣以文士不顯同異言依違取容於昏暴之朝猶得久存虎賁中郎將許準為孝嗣陳説事機賁音奔將即亮翻為于偽翻勸行廢立孝嗣持章十二行本持作遲乙十一行本同孔本同疑久之謂必無用干戈之理須帝出遊須待也召百官集議廢之雖有此懷終不能決諸嬖幸亦稍憎之西豐忠憲侯沈文季自託老疾不豫朝權嬖卑義翻又博計翻朝直遙翻侍中沈昭略謂文季曰叔父行年六十為員外僕射文季雖為僕射而不預事故昭略謂之員外僕射豈可得乎文季笑而不應冬十月乙未帝召孝嗣文季昭略入華林省文季登車顧曰此行恐往而不反帝使外監茹法珍賜以藥酒昭略怒罵孝嗣曰廢昏立明古今令典宰相無才致有今日以甌擲其面甌小器也所以盛酒使作破面鬼孝嗣飲藥酒至斗餘乃卒卒子恤翻孝嗣子演尚武康公主況尚山陰公主武康公主武帝女山陰公主明帝女昭略弟昭光聞收至家人勸之逃昭光不忍捨其母入執母手悲泣收者殺之昭光兄子曇亮逃已得免聞昭光死歎曰家門屠滅何以生為絶吭而死曇徒含翻吭戶郎翻又戶浪翻沈慶之沈文季皆託老疾不預朝權而終不免於死國無道而富貴則進退皆陷危機也初太尉陳顯達自以高武舊將將即亮翻下同當高宗之世內懷危懼深自貶損常乘朽弊車道從鹵簿止用羸小者十數人道讀曰導從才用翻羸倫為翻嘗侍宴酒酣啓高宗借枕高宗令與之顯達撫枕曰臣年衰老富貴已足唯欠枕枕死酣戶江翻枕枕上如字下之任翻特就陛下乞之高宗失色曰公醉矣顯達以年禮告退禮大夫七十而致事時顯達年已七十矣及王敬則反時顯達將兵拒魏事見上卷高宗永泰元年啓高宗欲追軍還會敬則平乃止及帝即位顯達彌不樂在建康得江州甚喜樂音洛顯達自馬圈敗還除江州刺史嘗有疾不令治既而自愈意甚不悅蓋求死不得死以至於反也悲夫治直之翻傳云當遣兵襲江州十一月丙辰顯達舉兵於尋陽令長史庾弘遠等與朝貴書數帝罪惡朝直遙翻數所具翻云欲奉建安王為主帝弟寶寅封建安王時為郢州刺史西迎大駕郢州治夏口在尋陽西乙丑以護軍將軍崔慧景為平南將軍督衆軍擊顯達後軍將軍胡松驍騎將軍李叔獻帥水軍據梁山驍堅堯翻騎奇寄翻帥讀曰率下同左衛將軍左興盛督前鋒軍屯杜姥宅姥莫補翻十二月癸未以前輔國將軍楊集始為秦州刺史楊集始請降見上卷明帝建武四年陳顯達發尋陽敗胡松於采石采石山在今太平州當塗縣北八十里山下有采石磯敗補邁翻甲申軍于新林左興盛帥諸軍拒之顯達多置屯火於岸側潛軍夜渡襲宮城乙酉顯達以數千人登落星岡石頭城西有橫壠謂之落星岡奔還宮城大駭閉門設守守舒救翻顯達執馬矟從步兵數百於西州前與臺軍戰再合顯達大勝手殺數人矟折矟色角翻折而設翻臺軍繼至顯達不能抗走至西州後據蕭子顯齊書顯達走至西州後烏榜村斬之顯達傳云潭注矟刺顯達落馬蓋盡力注矟而刺之也騎官蓋在馬隊主副之下猶今傔官也騎奇寄翻刺七亦翻長史庾弘遠炳之之子也庾炳之柄用於宋元嘉之季將刑索帽著之曰子路結纓索山客翻著陟略翻左傳衛侯輒既立其父蒯聵入爭國劫衛卿孔悝與之登臺子路曰太子無勇若燔臺半必舍孔叔太子懼下石乞孟黶以敵子路以戈擊之斷纓子路曰君子死冠不免結纓而死吾不可以不冠而死謂觀者曰吾非賊乃是義兵為諸軍請命耳為于偽翻軍當作君陳公太輕事若用吾言天下將免塗炭弘遠子子曜抱父乞代命並殺之帝既誅顯達益自驕恣漸出遊走又不欲人見之每出先驅斥所過人家唯置空宅所謂屏除也晉初洛陽置六部尉江左建康亦置六部尉聞音問便應奔走不暇衣履犯禁者應手格殺格擊也出輒不言定所東西南北無處不驅常以三四更中更工衡翻鼓聲四出火光照天幡戟橫路士民喧走相隨老小震驚啼號塞路處處禁斷號戶高翻塞悉則翻斷音短不知所過言雖奔走而路斷不知何所可過樵蘇路斷吉凶失時吉謂冠婚凶謂喪葬皆不得以時而行事乳儒遇翻育也或輿病棄尸不得殯葬巷陌懸幔為高鄣置仗人防守謂之屏除幔莫半翻仗人謂執仗之人屏必郢翻亦謂之長圍嘗至沈公城有一婦人臨産不去因剖腹視其男女又嘗至定林寺定林寺舊基在蔣山應潮井後藏草間命左右射之百箭俱發射七亦翻帝有膂力牽弓至三斛五斗又好擔幢白虎幢高七丈五尺於齒上擔之折齒不倦好呼到翻擔都甘翻幢傳江翻幡也高居號翻自制擔幢校具校具猶言器械也伎渠綺翻侍衛滿側逞諸變態曾無愧色學乘馬於東冶營兵俞靈韻常著織成袴褶金薄帽著則略翻褶音習執七寶矟急裝縛袴凌冒雨雪不避坑穽馳騁渴乏輒下馬解取腰邊蠡器酌水飲之冒莫北翻又如字穽疾正翻騁丑郢翻蠡憐題翻瓠瓢也今謂之馬杓爾雅翼曰螺古字通於蠡螺之為量小傳曰以蠡測海言不能極其量也復上馬馳去復扶又翻上時掌翻又選無賴小人善走者為逐馬左右五百人常以自隨或於市側過親幸家環回宛轉周遍城邑或出郊射雉置射雉場二百九十六處奔走往來略不暇息史言帝之昏狂甚於宋鬱林王射而亦翻王肅為魏制官品百司皆如江南之制凡九品品各有二九品每品各有正從二品歷隋唐至今猶然祚清謹重惜官位每有銓授雖得其人必徘徊久之然後下筆曰此人便已貴矣人以是多怨之然所用者無不稱職稱尺證翻聶崇岐標點王崇武覆校
