body:
  text: 資治通鑑卷第五十三翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣奉敕編集後學天台音注漢紀四十五本初元年孝質皇帝諱纘章帝曾孫勃海孝王鴻之子也諡法忠正無邪曰質伏侯古今注曰纘之字曰繼本初元年丙戌一四六本初元年夏四月庚辰令郡國舉明經詣太學自大將軍以下皆遣子受業歲滿課試拜官有差又千石六百石四府掾屬三署郎三署郎五官署郎及左右署郎也屬光祿勳掾俞絹翻各令隨家法其高第者上名牒此時蓋以梁氏入四姓陰竇諸后族衰廢者未必得預也名牒者書名於牒上之上時掌翻自是遊學增盛至三萬餘生此鄧后臨朝之故智梁后踵而行之耳遊學增盛亦干名蹈利之徒何足尚也或問曰太學諸生三萬人漢末互相標榜清議此乎出子盡以為干名蹈利之徒可乎答曰積水成淵蛟龍生焉謂其間無其人則不可然互相標榜者實干名蹈利之徒所為也禍李膺諸人者非太學諸生諸生見其立節從而標榜以重清議耳不然則郭泰仇香亦遊太學泰且拜香而欲師之泰為八顧之首仇香曾不預標榜之列豈清議不足尚歟抑香隱德無能名歟本初元年五月庚寅徙樂安王鴻為勃海王本初元年海水溢漂沒民居本初元年六月丁巳赦天下本初元年帝少而聰慧少詩照翻嘗因朝會目梁冀曰目者眨目而注視之朝直遙翻此跋扈將軍也賢曰跋扈猶強梁也余按爾雅山卑而大扈跋者不由蹊隧而行言強梁之人行不由正路山卑而大且欲跋而踰之故曰跋扈蜀本注甚鄙淺茲不復録詳見辨誤深惡之惡烏路翻下同閏月甲申冀使左右置毒於煮餅而進之煮餅今湯餅也釋名餅並也溲麥麵使合並也束晢曰禮仲春之月大子食麥而朝事之籩煮麥為麵內則諸饌不説麥并麥并之作也其來近矣湯麥并煮麵也黃庭堅文煮麥深注湯章乙十六行本盛作甚乙十一行本同張校同使促召太尉李固固入前問帝得患所由帝尚能言曰食煮餅今腹中悶得水尚可活時冀亦在側曰恐吐不可飲水吐土故翻嘔也語未絶而崩年九歲言伏地而號哭其狀如尸也號戶高翻冀慮其事泄大惡之推舉者劾舉其侍疾無狀而推究其姦也設於此時固能窮冀弒君之罪儻不能正其誅以身死之豈不忠壯既不能然又且俯首於其間欲以立長之議矯而正之卒死於凶豎之手可謂忠有餘而才不足矣惡烏路翻將議立嗣固與司徒胡廣司空趙戒先與冀書曰天下不幸頻年之間國祚三絶賢曰順帝崩沖帝立一年崩質帝立一年崩凡三絶天下重器誠知太后垂心將軍勞慮詳擇其人務存聖明然愚情眷眷窮獨有懷遠尋先世廢立舊儀近見國家踐祚前事未嘗不詢訪公卿廣求㣥議令上應天心下合衆望傳曰以天下與人易為天下得人難孟子之言為于偽翻昏亂日滋霍光憂愧發憤悔之折骨折而設翻自非博陸忠勇延年奮發大漢之祀幾將傾矣事見二十四卷昭帝元平元年幾居希翻可不熟慮悠悠萬事唯此為大就冀而言萬事皆可付之悠悠至於立嗣關天下國家之大在此一舉冀得書乃召三公中二千石列侯大議所立固廣戒及大鴻臚杜喬皆以為清河王蒜明德著聞又屬最尊親蒜於質帝為兄尊也同出樂安王寵親也臚陵如翻朝廷章乙十六行本廷作臣乙十一行本同孔本同張校同莫不歸心而中常侍曹騰嘗謁蒜蒜不為禮宦者由此惡之惡烏露翻初平原王翼既貶歸河間事見五十卷安帝建光元年蠡吾縣前漢屬涿郡時屬河間國賢曰蠡吾故城在今瀛州博野縣西蠡音禮翼父河間孝王開也翼卒子志嗣梁太后欲以女弟妻志妻七細翻徵到夏門亭會帝崩梁冀欲立志衆論既異憤憤不得意而未有以相奪賢曰未有別理而易奪之夜往説冀曰將軍纍世有椒房之親説輸芮翻下同纍世椒房謂恭懷后及太后也秉攝萬機賓客縱橫橫戶孟翻多有過差清河王嚴明若果立則將軍受禍不久矣不如立蠡吾侯富貴可長保也冀然其言明日重會公卿重直用翻再也冀意氣凶凶凶凶言意氣惡暴也自胡廣趙戒以下莫不懾憚懾之舌翻皆曰惟大將軍令獨李固杜喬堅守本議冀厲聲曰罷會固猶望衆心可立以衆心屬於清河王猶望可立也復扶又翻冀愈激怒丁亥冀説太后先策免固為殺李固杜喬張本戊子以司徒胡廣為太尉司空趙戒為司徒與大將軍冀參録尚書事太僕袁湯為司空湯安之孫也庚寅使大將軍冀持節以王青蓋車迎蠡吾侯志入南宮其中即皇帝位時年十五太后猶臨朝政本初元年秋七月乙卯葬孝質皇帝於靜陵賢曰靜陵在雒陽東南三十里本初元年大將軍掾朱穆奏記勸戒梁冀曰明年丁亥之歲刑德合於乾位賢曰曆法太歲在丁壬歲德在北宮太歲在亥卯歲刑亦在北宮故曰合於乾位掾俞絹翻易坤卦上六龍戰于野陰疑於陽也陰道將負願將軍專心公朝朝直遙翻割除私欲廣求賢能斥遠佞惡為皇帝置師傅遠于願翻為于偽翻得小心忠篤敦禮之士將軍與之俱入參勸講授師賢法古此猶倚南山坐平原也喻其安而無傾議郎大夫之位本以式序儒術高行之士式用也九卿之中亦有乖其任者惟將軍察焉又薦种皓欒巴等冀不能用穆暉之孫也朱暉事章帝本初元年九月戊戌追尊河間孝王為孝穆皇夫人趙氏曰孝穆后諡法布德執義曰穆中情見貌曰穆陵曰樂成陵樂成縣屬河間國沈約曰諡法所不載者如孝崇皇之類是也陵曰博陵賢曰博陵本蠡吾縣之地也陵在今瀛州博野縣西使司徒持節奉策書璽綬祠以太牢璽斯氏翻綬音受本初元年冬十月甲午尊帝母匽氏為博園貴人匽音偃史記匽姓咎繇之後貴人諱明本蠡吾侯之媵妾博園博陵寢園本初元年滕撫性方直不交權勢為宦官所惡論討賊功當封討揚徐賊之功也惡烏路翻卒於家孝桓皇帝上之上諱志章帝曾孫蠡吾侯翼之子諡法克敵服遠曰桓伏侯古今注志之字曰意建和元年丁亥一四七本初元年春正月辛亥朔日有食之本初元年戊午赦天下本初元年三月龍見譙譙縣屬沛國見賢遍翻本初元年夏四月庚寅京師地震本初元年立阜陵王代兄勃遒亭侯便為阜陵王阜陵王延傳國五世至代代薨無子國絶今以便紹封遒才由翻本初元年六月太尉胡廣罷光祿勳杜喬為太尉考異曰帝紀云大司農杜喬喬傳喬自司農纍遷為大鴻臚光祿勳乃為太尉袁紀亦然荀淑傳云光祿勳杜喬舉淑方正今從之朝野喪氣喪息浪翻㣥臣側足而立唯喬正色無所回橈賢曰回邪也橈曲也橈音奴高翻本初元年秋七月渤海孝王鴻薨無子太后立帝弟蠡吾侯悝為渤海王以奉鴻祀悝苦回翻本初元年詔以定策功益封梁冀萬三千戶封冀弟不疑為潁陽侯潁陽縣屬潁川郡冀子胤為襄邑侯胡廣為安樂侯按廣傳封淯陽縣之安樂鄉樂音洛袁湯為安國侯安國亦亭侯按曹騰傳廣騰及州輔等七人皆封亭侯杜喬諫曰古之明君皆以用賢賞罰為務失國之主其朝豈無貞幹之臣貞與楨同幹與幹同築垣牆必須楨幹以喻立國必須賢才朝直遙翻謂封爵之典策詔誥以授有功具有故事韜書不施其教聞善不信其義聽讒不審其理也陛下自藩臣即位天人屬心屬之欲翻下冀屬同不急忠賢之禮而先左右之封先悉薦翻梁氏一門宦者微孽並帶無功之紱裂勞臣之土孽魚列翻紱音弗其為乖濫胡可勝言勝音升夫有功不賞為善失其望姦回不詰為惡肆其凶詰去吉翻故陳資斧而人靡畏前書音義曰資利也班爵位而物無勸苟遂斯道豈伊傷政為亂而已喪身亡國可不慎哉書奏不省喪息浪翻省悉景翻考異曰喬傳此章在為太尉前袁紀在為太尉後今從袁紀本初元年八月乙未立皇后梁氏考異曰皇后紀袁紀皆云八月而無日帝紀云七月乙未以長曆考之七月戊申朔無乙未乙未八月十八日也蓋帝紀脫八月字杜喬據執舊典不聽漢書舊儀聘皇后黃金萬斤呂后為惠帝娶魯元公主女特優其禮為二萬斤儀禮納采用鴈鄭玄注云納其采擇之禮用鴈取順陰陽往來也周禮王者穀圭以聘女鄭玄曰士大夫以上乃以玄纁束帛天子加以穀圭諸侯加以大璋禮言以圭而漢用璧形制雖異為玉同也時依孝惠納后故事聘黃金二萬斤納采鴈璧乘馬束帛一依舊典乘馬馬四匹也雜記曰納幣一束束五兩兩五尋蓋每端二丈也屬之欲翻泛符咸翻姓也皇甫謐曰本姓凡氏遭秦亂避地於泛水因氏焉喬以宮為臧罪不用臧古臧字通忤五故翻九月丁卯京師地震喬以災異策免冬十月以司徒趙戒為太尉司空袁湯為司徒前太尉胡廣為司空本初元年宦者唐衡左悺共譖杜喬於帝賢曰悺音工喚翻又音綰曰陛下前當即位喬與李固抗議以為不堪奉漢宗祀賢曰抗舉也宗祀大宗之祀也十一月清河劉文與南郡妖賊劉鮪交通鮪于軌翻妄言清河王當統天下欲共立蒜事覺文等遂劫清河相謝皓曰當立王為天子以皓為公皓罵之文刺殺皓於是捕文鮪誅之有司劾奏蒜皓工老翻刺七亦翻劾戶概翻又戶得翻坐貶爵為尉氏侯尉氏縣屬陳留郡應劭曰古獄官曰尉氏鄭之別獄也臣瓚曰鄭大夫尉氏之邑故以為邑名自殺梁冀因誣李固杜喬云與文鮪等交通請逮按罪太后素知喬忠不許考異曰喬傳云策免而已喬前已免官傳誤也下遐稼翻門生渤海王調貫械上書證固之枉河內趙承等數十人亦要鈇鑕詣闕通訴要讀曰腰鈇斧也鑕音質椹也太后詔敕之及出獄京師市里皆稱萬歲冀聞之大驚畏固名德終為己害乃更據奏前事前事即文鮪事也與冀爭之冀怒不從從事中郎馬融主為冀作章表融時在坐為于偽翻坐左臥翻祐謂融曰李公之罪成於卿手李公若誅卿何面目視天下人言為冀誣陷忠良將無顏以見人也起入室祐亦徑去固遂死於獄中臨命與胡廣趙戒書曰固受國厚恩是以竭其股肱不顧死亡志欲扶持王室比隆文宣賢曰文帝宣帝皆㣥臣迎立能興漢祚公等曲從以吉為凶成事為敗乎漢家衰微從此始矣公等受主厚祿顛而不扶傾覆大事後之良史豈有所私固身已矣於義得矣夫復何言復扶又翻廣戒得書悲慙皆長歎流涕而已冀使人脅杜喬曰早從宜賢曰從宜令其自盡也喬不肯明日冀遣騎至其門騎奇寄翻不聞哭者遂白太后收繫之亦死獄中冀暴固喬尸於城北四衝令令敢臨者加其罪爾雅曰四達謂之衢城北即夏門亭也臨力鴆翻哭也左提章鉞冠古玩翻賢曰章謂所上章也鉞斧也右秉鈇鑕詣闕上書乞收固尸不報與南陽董班俱往臨哭守喪不去夏門亭長呵之曰卿曹何等腐生賢曰腐生猶言腐儒也欲干試有司乎亮曰義之所動豈知性命何為以死相懼邪太后聞之皆赦不誅杜喬故掾陳留楊匡號泣星行掾俞絹翻號戶刀翻星行者見星而行見星而舍或曰星行者言戴星而行夜不遑息也到雒陽著故赤幘託為夏門亭吏吏著赤幘著則略翻積十二日都官從事執之以聞都官從事司隸校尉之屬官也掌舉中都官非法者匡因詣闕上書並乞李杜二公骸骨使得歸葬太后許之匡送喬喪還家喬家河內行服遂與郭亮董班皆隱匿終身不仕梁冀出吳祐為河間相祐自免歸卒於家卒子恤翻冀以劉鮪之亂思朱穆之言於是請种皓為從事中郎薦欒巴為議郎舉穆高第為侍御史穆於大將軍府掾為高第也本初元年是歲南單于兜樓儲死伊陵尸逐就單于車兒立車音尺遮翻二年本初二年春正月甲子帝加元服庚午赦天下本初二年三月戊辰帝從皇太后幸大將軍冀府本初二年白馬羌寇廣漢屬國安帝以蜀郡北部都尉為廣漢屬國都尉益州刺史率板楯蠻討破之楯食尹翻本初二年夏四月丙子封帝弟顧為平原王奉孝崇皇祀尊孝崇皇夫人為章乙十六行本為上有馬氏二字乙十一行本同孔本同退齋校同孝崇園貴人本初二年五月癸丑北宮掖庭中德陽殿及左掖門火車駕移幸南宮本初二年六月改清河為甘陵以孝德皇陵為國名經縣屬安平國賢曰今貝州經城縣本初二年秋七月京師大水三年本初三年夏四月丁卯晦日有食之本初三年秋八月乙丑有星孛于天市前書天文志旗星中四星曰天市又晉書天文志天市垣二十二星在房心東彗星除之為徙市易都孛蒲內翻本初三年京師大水本初三年九月己卯地震庚寅地又震本初三年郡國五山崩本初三年冬十月太尉趙戒免以司徒袁湯為太尉大司農河內張歆為司徒本初三年是歲前朗陵侯相荀淑卒朗陵侯國屬汝南郡少詩照翻行下孟翻當世名賢李固李膺皆師宗之在朗陵涖事明治治直吏翻稱為神君有子八人儉緄靖燾汪爽肅專賢曰緄音昆燾音導汪烏光翻專本或作敷音敷並有名稱時人謂之八龍稱尺證翻所居里舊名西豪潁陰令渤海苑康以為昔高陽氏有才子八人更命其里曰高陽里杜佑曰潁川郡城西南有荀淑故宅相傳云即西豪里更工衡翻潁陰縣屬汝南郡淑縣人也姓譜商武丁子子文受封於苑因以為氏左傳有齊大夫苑何忌趙明誠金石録有漢荊州從事苑鎮碑曰其先苑柏何為晉樂正世掌朝禮又有苑子園實能掌陰陽之理皆其胄也按姓氏志皆以為出於齊大夫苑何忌之後今此碑所謂苑柏何與子園左傳國語皆無其人故録之以待知者左傳曰昔高陽氏有才子八人蒼舒隤敱檮戭大臨厖降庭堅仲容叔達隤徒回翻敱五才翻一音五回翻韋昭音瑰檮直由翻韋昭音桃戭以善翻韋昭以震翻厖莫江翻降下江翻膺性簡亢亢口浪翻高也無所交接唯以淑為師以同郡陳實為友荀爽嘗就謁膺因為其御既還喜曰今日乃得御李君矣其見慕如此陳實出於單微單獨也孤也薄也同郡鍾皓以篤行稱行下孟翻前後九辟公府年輩遠在實前引與為友皓為郡功曹辟司徒府臨辭太守間誰可代卿者皓曰明府欲必得其人西門亭長陳實可實聞之曰鍾君似不察人不知何獨識我太守遂以實為功曹時中常侍章乙十六行本侍下有山陽二字乙十一行本同孔本同張校同退齋校同侯覽託太守高倫用吏倫教署為文學掾郡守所出命曰教百官志注郡有文學守助掾六十人掾俞絹翻懷檄請見賢曰檄板書以高倫之教書之於檄而懷之者懼泄事也此人不宜用而侯常侍不可違實乞從外署功曹主選署實乞從外自署用若不出於倫者賢曰不欲陷倫於請託也倫從之於是鄉論怪其非舉實終無所言倫後被徵為尚書郡中士大夫送至綸氏賢曰綸氏縣屬潁川郡今嵩陽縣是吾前為侯常侍用吏為于偽翻陳君密持教還而於外白署比聞議者以此少之比毗至翻少詩沼翻此咎由故人畏憚強禦故人倫自謂也漢人於門生故吏之前率自稱故人楊震謂王密曰故人知君君不知故人是也詩曰不畏強禦過則稱己者也禮記坊記曰善則稱君過則稱己則民作忠坊音防聞者方歎息由是天下服其德後為太丘長賢曰太丘縣屬沛國故城在今亳州永城縣西北百姓以安鄰縣民歸附者實輒訓導譬解發遣各令還本司官行部賢曰司官謂主司之官也行下孟翻白欲禁之實曰訟以求直禁之理將何申其勿有所拘司官聞而歎息曰陳君所言若是豈有冤於人乎亦竟無訟者以沛相賦斂違法解印綬去相息亮翻斂力贍翻吏民追思之鍾皓素與荀淑齊名李膺常歎曰荀君清識難尚鍾君至德可師皓兄子瑾母膺之姑也瑾好學慕古有退讓風好呼到翻與膺同年俱有聲名膺祖太尉修常言瑾似我家性瑾李氏之出而退讓故修云然不廢邦無道免於刑戮論語孔子以此言與南容妻子細翻膺謂瑾曰孟子以為人無是非之心非人也弟於是何太無皂白邪皂白易分無皂白言無分別也皓曰元禮祖父在位李膺字元禮膺祖修為太尉父益為趙相故得然乎昔國子好招人過以致怨惡國語齊國佐見單襄公其語盡單子曰立於淫亂之國而好盡言以招人過怨之本也其後齊殺國武子招音翹必欲保身全家爾道為貴和平元年庚寅一五本初三年春正月甲子赦天下改元本初三年乙丑太后詔歸政於帝始罷稱制二月甲寅太后梁氏崩本初三年三月車駕徙幸北宮本初三年甲午葬順烈皇后增封大將軍冀萬戶並前合三萬戶封冀妻孫壽為襄城君兼食陽翟租襄城陽翟二縣皆屬潁川郡加賜赤紱比長公主漢制公主儀服同公侯紫紱長公主儀服同諸王赤紱四采赤黃縹紺長二丈一尺三百首紱音弗長知兩翻冀甚寵憚之壽作愁眉啼粧墮馬髻折腰步齲齒笑妖於驕翻官至太倉令太倉令秩六百石主受郡國傳漕穀屬大司農威權大震刺史二千石皆謁辭之冀與壽對街為宅殫極土木互相誇競金玉珍怪充積藏室藏徂浪翻下守藏同又廣開園圃採土築山十里九阪深林絶澗有若自然冀傳云築山以象二崤十里九阪阪音反冀壽共乘輦車遊觀第內晉志曰羊車一名輦車毛晃曰輦步挽車也漢書主駕人以行曰輦倡音昌伎渠綺翻酣謳竟路或連日繼夜以騁娛恣客到門不得通皆請謝門者門者纍千金又多拓林苑周遍近縣起兔苑於河南城西經亙數十里移檄所在調發生兔刻其毛以為識調徒弔翻識識吏翻人有犯者罪至死刑嘗有西域賈胡賈音古不知禁忌誤殺一兔轉相告言坐死者十餘人又起別第於城西以納姦亡謂姦民及亡命者至數千口名曰自賣人冀用壽言多斥奪諸梁在位者外以示謙讓而實崇孫氏孫氏宗親冒名為侍中卿校郡守長吏者十餘人皆貪叨凶淫校戶教翻叨土刀翻各使私客籍屬縣富人賢曰籍謂疏録之也被皮義翻閉獄掠拷掠音亮拷音考使出錢自贖資物少者至於死又章乙十六行本又作徙乙十一行本同孔本同熊校同扶風人士孫奮居富而性吝士孫姓也奮名也乘繩證翻遺于季翻從貸錢五千萬奮以三千萬與之冀大怒乃告郡縣認奮母為其守藏婢藏徂浪翻云盜白珠十斛紫金千斤以叛紫金紫磨金也亦謂之鏐兄弟死於獄中悉沒其資財億七千餘萬摯虞三輔決録曰士孫奮家資一億七千餘萬余按此以萬萬為億也遠至塞外廣求異物而使人復乘勢橫暴妻略婦女毆擊吏卒使疏吏翻復扶又翻妻者私他人之婦女若己妻然不以道取之曰略橫戶孟翻毆烏口翻所在怨毒毒痛也侍御史朱穆自以冀故吏奏記諫曰明將軍地有申伯之尊賢曰申國之伯周宣王之元舅賢曰冀絶席於三公天下歸仁終朝為惡四海傾覆頃者官民俱匱加以水蟲為害賢曰水災及蝗蟲也詔書發調或至十倍調徒弔翻各言官無見財見賢遍翻皆當出民搒掠割剝強令充足搒音彭掠音亮強其兩翻公賦既重私斂又深斂力贍翻牧守長吏多非德選貪聚無厭厭於鹽翻遇民如虜或絶命於箠楚之下或自賊於迫切之求賢曰賊殺也箠止蕊翻皆託之尊府尊府指大將軍府吏民酸毒道路歎嗟昔永和之末綱紀少弛頗失人望四五歲耳而財空戶散下有離心馬勉之徒乘敝而起荊揚之間幾成大患事見上卷幾居希翻僅乃討定今百姓戚戚困於永和內非仁愛之心可得容忍外非守國之計所宜久安也夫將相大臣均體元首共輿而馳同舟而濟輿傾舟覆患實共之豈可以去明即昧賢曰即就也主孤時困而莫之恤乎宜時易宰守非其人者減省第宅園池之費拒絶郡國諸所奉送內以自明外解人惑使挾姦之吏無所依託司察之臣得盡耳目憲度既張遠邇清一則將軍身尊事顯德耀無窮矣冀不納冀雖專朝縱橫朝直遙翻橫戶孟翻而猶交結左右宦官任其子弟賓客為州郡要職欲以自固恩寵穆又奏記極諫冀終不悟報書云如此僕亦無一可邪然素重穆亦不甚罪也冀遣書詣樂安太守陳蕃樂安郡本千乘郡和帝永元七年改為樂安國屬青州不得通使者詐稱他客求謁蕃蕃怒笞殺之坐左轉修武令修武縣屬河內郡時皇子有疾下郡縣市珍藥下遐稼翻而冀遣客齎書詣京兆並貨牛黃吳普本草曰牛黃牛出入呻者有之夜有光走角中牛死入膽中如雞子黃神農本草曰療驚癇除邪逐鬼陶弘景曰舊云神牛出入鳴吼者有之伺其出角上以盆水盛而吐之即墮落水中今人多就膽中得之藥中之貴莫復過此本草圖經曰伺其吐出乃喝迫即落水中既得之陰乾百日一云子如雞子黃其重疊司揭輕虛而氛香為佳又云此有四種喝迫而得者名生黃其殺死而在角中得者名角中黃心中剝得者名心黃肝膽中得之者名肝黃大抵不及喝迫得者最勝曰大將軍椒房外家而皇子有疾必應陳進醫方豈當使客千里求利乎遂殺之冀慙而不得言有司承旨求其事篤以病免本初三年夏五月庚辰尊博園匽貴人曰孝崇后宮曰永樂續漢志曰德陽前殿西北入門內有永樂宮樂音洛下長樂同皆如長樂宮故事分巨鹿九縣為后湯沐邑本初三年秋七月梓潼山崩梓潼縣屬廣漢郡賢曰今始州縣也有梓潼水元嘉元年辛卯一五一本初三年春正月朔㣥臣朝會大將軍冀帶劍入省省即禁中也敕虎賁羽林奪劍冀跪謝陵不應即劾奏冀請廷尉論罪劾戶概翻又戶得翻有詔以一歲俸贖百僚肅然河南尹不疑嘗舉陵孝廉乃謂陵曰昔舉君適所以自罰也陵曰明府不以陵不肖誤見擢序今申公憲以報私恩不疑有愧色本初三年癸酉赦天下改元本初三年梁不疑好經書喜待士好呼到翻喜許記翻梁冀疾之轉不疑為光祿勳以其子胤為河南尹胤年十六容貌甚陋不勝冠帶勝音升道路見者莫不蚩笑不疑自恥兄弟有隙遂讓位歸第與弟蒙閉門自守冀不欲令與賓客交通陰使人變服至門記往來者南郡太守馬融江夏太守田明初除過謁不疑言過其門因而謁之禮不專也夏戶雅翻及以他事陷明皆髡笞徙朔方融自刺不殊刺七亦翻明遂死於路本初三年夏四月己丑上微行幸河南尹梁胤府舍考異曰袁紀作梁不疑府今從范書大風拔樹晝昏尚書楊秉上疏曰臣聞天不言語以災異譴告王者至尊出入有常警蹕而行靜室而止賢曰蹕止行人也靜室謂先使清宮也前書音義曰漢有靜室令則鑾旗不駕漢官儀曰前驅有雲罕皮軒鑾旗車春秋尚列其誡左傳陳靈公如夏徵舒之家為徵舒所弒齊莊公如崔杼之家亦為杼所弒降亂尊卑等威無序賢曰等威謂威儀有等差也左氏傳曰貴有常尊賤有等威璽紱委女妾璽斯氏翻紱音弗設有非常之變任章之謀宣帝時任宣坐謀反誅宣子章亡在渭城界中夜玄服入廟居廊間執戟立於廟門待上至欲為逆發覺伏誅任音壬下悔靡及帝不納秉震之子也本初三年京師旱任城梁國飢民相食任音壬本初三年司徒張歆罷以光祿勳吳雄為司徒本初三年北胸奴呼衍王寇伊吾敗伊吾司馬毛愷敗蒲邁翻攻伊吾屯城詔敦煌太守馬達將兵救之敦徒門翻至蒲類海呼衍王引去本初三年秋七月武陵蠻反本初三年冬十月司空胡廣致仕本初三年十一月辛巳京師地震詔百官舉獨行之士涿郡舉崔實詣公車稱病不對策退而論世事名曰政論其辭曰凡天下所以不治者常由人主承平日久俗漸敝而不悟政寖衰而不改習亂安危怢不自覩賢曰怢音他沒翻怢忽忘也或荒耽耆欲耆讀曰嗜不恤萬機或耳蔽針誨厭偽忽真賢曰厭飫姦偽輕忽至真莫適所從爾雅路二達謂之岐郭璞曰岐道旁出也此言人主見道不明於人之邪正事之是非莫知所適從也適丁歷翻括囊守祿賢曰易曰括囊無咎無譽括結也結囊不言持祿而已言以賤廢是以王綱縱弛於上智士鬱伊於下賢曰鬱伊不申之貌楚辭曰獨伊鬱而誰語悲夫自漢興以來三百五十餘歲矣政令垢玩上下怠懈懈古隘翻百姓囂然咸復思中興之救矣復扶又翻且濟時拯世之術在於補綻決壞枝拄邪傾賢曰綻音直莧翻禮記衣裳綻裂紉針請補綴余謂綻裂之綻非此義此綻釋補縫也韓詩云破襖請來綻是其義也拄陟柱翻要措斯世於安寧之域而已故聖人執權遭時定制賢曰權謂變也遭遇其時而定法制不循於舊也余謂權稱錘也執權者隨物之輕重為權之進退以取平也各有云設不強人以不能背急切而慕所聞也賢曰背當時之急切而慕所聞之事則非濟時之要強其兩翻背蒲妹翻哀公以臨人景公以節禮賢曰韓子曰葉公問政於孔子孔子曰政在悅近而來遠魯哀公問政於孔子孔子曰政在選賢齊景公問政於孔子孔子曰政在節財此云臨人節禮文不同也葉式涉翻所急異務也俗人拘文牽古不達權制奇偉所聞簡忽所見烏可與論國家之大事哉故言事者雖合聖聽輒見掎奪賢曰掎居蟻翻賈逵注國語曰從後牽曰掎何者其頑士暗於時權安習所見不知樂成樂音洛況可慮始苟云率由舊章而已其達者或矜名妒能妒與妬同舞筆奮辭以破其義寡不勝衆遂見擯棄雖稷契復存猶將困焉契息列翻復扶又翻斯賢智之論所以常憤鬱而不伸者也凡為天下者自非上德嚴之則治寬之則亂治直吏翻何以明其然也近孝宣皇帝明於君人之道審於為政之理故嚴刑峻法破姦軌之膽左傳曰亂在外為姦在內為軌天下密如賢曰密靜也優於孝文見賢遍翻及元帝即位多行寬政卒以墮損卒子恤翻墮讀曰隳威權始奪遂為漢室基禍之主政道得失於斯可鑒昔孔子作春秋褒齊桓懿晉文歎管仲之功懿美也誠達權救敝之理也聖章乙十六行本聖上有故字乙十一行本同孔本同張校同人能與世推移楚辭聖人不凝滯於物而能與世推移以為結繩之約可復治亂秦之緒干戚之舞足以解平城之圍上古結繩而治後世聖人易之以書契亂秦之後俗益澆薄非結繩之約所能理也干盾也戚鉞也記曰朱干玉戚冕而舞大武所以象武王之伐功也書禹舞干羽於兩階而有苗格高帝為胸奴圍於平城用陳平祕計得出非舞干戚所能解也治直之翻下治亂同治平亦同雖延曆之術非傷寒之理呼吸吐納雖度紀之道非續骨之膏賢曰莊子曰吹詬呼吸吐故納新熊經鳥伸此道引之士養形之人也黃帝素問曰人傷於寒而轉為熱何也夫寒盛則生熱也度紀猶延年也言鳥伸不能療傷寒吸氣不能續斷骨也成公英莊子疏曰如熊縣木而自經鳥飛空而伸足爾雅冀曰熊類大豕人足黑色好緣高木見人自投而下亦以革厚而筋駑用此自快故稱熊經有似理身平則致養疾則攻焉夫刑罰者治亂之藥石也德教者興平之梁肉也夫以德教除殘是以梁肉養疾也以刑罰治平是以藥石供養也供音恭養余兩翻方今承百王之敝值厄運之會自數世以來政多恩貸馭委其轡馬駘其銜説文曰駘馬鈍也音達來翻毛晃曰駘脫也四牡橫奔皇路險傾賢曰皇路天路也豈暇鳴和鑾調節奏哉賢曰何休注公羊傳曰拑以木銜其口也拑音巨炎翻勒馬轡輈車轅鞬猶束也説苑曰鑾設於鑣和設於軾馬動鑾鳴鑾鳴則和應也當斬右趾者棄市笞者往往至死見十五卷文帝十三年景帝元年非以寬致平也實瑗之子也崔瑗見五十一卷安帝延光四年瑗于眷翻歎曰凡為人主宜為一通置之坐側坐才臥翻臣光曰漢家之法已嚴矣而崔實猶病其寬何哉蓋衰世之君率多柔懦凡愚之佐唯知姑息姑且也息安也且苟目前之安也豪猾之民犯法不誅仁恩所施止於目前姦宄得志紀綱不立故崔實之論以矯一時之枉非百世之通義也孔子曰政寬則民慢慢則糾之以猛猛則民殘殘則施之以寬寬以濟猛猛以濟寬政是以和左傳載孔子善子太叔之辭杜預曰糾攝也本初三年閏月庚午任城節王崇薨無子國絶章帝元和元年分東平國為任城國以封東平王蒼之少子尚崇尚之姪也諡法好廉自克曰節本初三年以太常黃瓊為司空本初三年帝欲褒崇梁冀使中朝二千石以上會議其禮西都中世以後以三公九卿為外朝官東都無中外朝之別也此中朝直謂朝廷朝直遙翻錫之山川土田附庸此西都諸臣所以尊王莽者今廣復欲以崇冀微黃瓊之言殆哉冀前以親迎之勞增邑萬三千戶又其子胤亦加封賞今諸侯以戶邑為制不以里數為限冀可比鄧禹合食四縣朝廷從之於是有司奏冀入朝不趨劍履上殿謁讚不名禮儀比蕭何蕭何唯劍履上殿入朝不趨何嘗謁贊不名也君前臣名禮也冀何如人而寵秩之至此乎讚與擯贊之贊同比鄧禹賢曰冀初封襄邑縣襲封乘氏更增以定陶陽城是為四縣余謂陽成當作成陽與定陶乘氏皆屬濟陰郡比霍光以殊元勳每朝會與三公絶席賢曰絶席別也平尚書事宣布天下為萬世法冀猶以所奏禮薄意不悅二年本初二年春正月西域長史王敬為于填所殺初西域長史趙評在于填病癰死按西域傳評元嘉元年死填徒賢翻道經拘彌拘彌王成國與于填王建素有隙謂評子曰于填王令胡醫持毒藥著創中著陟略翻創初良翻故致死耳評子信之還以告敦煌太守馬達敦徒門翻考異曰車師傳作司馬達今從于置傳會敬代為長史馬達令敬隱核于填事隱度也核考也實也成國復説云復扶又翻説輸芮翻于填國人欲以我為王今可因此罪誅建謂以評死為建罪也敬貪立功名前到于填設供具請建而陰圖之供具宴饗之具也建不信曰我無罪王長史何為欲殺我旦日建從官屬數十人詣敬坐定建起行酒敬叱左右執之吏士並無殺建意官屬悉得突走時成國主簿秦牧隨敬在會持刀出曰大事已定何為復疑即前斬建于填侯將輸僰等遂會兵攻敬按前書西域諸國各置輔國侯左右將復扶又翻僰蒲北翻天子使我誅建耳輸僰不聽上樓斬敬縣首於市縣讀曰懸輸僰自立為王國人殺之而立建子安國馬達聞王敬死欲將諸郡兵出塞擊于填帝不聽徵達還而以宋亮代為敦煌太守亮到開募于填令自斬輸僰開于填國人自新之路仍募使斬輸僰也僰蒲北翻乃斷死人頭送敦煌而不言其狀斷丁管翻亮後知其詐而竟不能討也史言漢之威令不復行於西域本初二年丙辰京師地震本初二年夏四月甲辰孝崇皇后匽氏崩以帝弟平原王石為喪王斂送制度比恭懷皇后恭懷皇后和帝母梁氏斂力贍翻辛卯葬于博陵本初二年秋七月庚辰日有食之本初二年冬十月乙亥京師地震本初二年十一月司空黃瓊免十二月以特進趙戒為司空永興元年癸巳一五三本初二年春三月丁亥帝幸鴻池百官志注鴻池在雒陽東二十里水經注穀水東注鴻池陂池東西千步南北千一百步本初二年夏四張四作五月丙申赦天下改元本初二年丁酉濟南悼王廣薨無子國除廣濟南王顯之子也紹封見五十一卷順帝永建元年濟子禮翻本初二年秋七月郡國三十二蝗河水溢百姓飢窮流冗者數十萬戶冗散也而隴翻冀州尤甚詔以侍御史朱穆為冀州刺史冀部令長聞穆濟河解印綬去者四十餘人及到奏劾諸郡貪汙者劾戶概翻又戶得翻有至自殺或死獄中宦者趙忠喪父歸葬安平安平國屬冀州喪息浪翻穆下郡案驗下遐稼翻吏畏其嚴遂發墓剖棺陳尸出之帝聞大怒徵捎穆詣廷尉輸作左校不以趙忠玉匣為僭而以朱穆發墓為罪昏暗之君豈有真是非哉賢曰左校署名屬將作掌左工徒校戶教翻伏見弛刑徒朱穆處公憂國處昌呂翻拜州之日志清姦惡誠以常侍貴寵父子兄弟布在州郡競為虎狼噬食小民故穆張理天綱補綴漏目羅取殘禍以塞天意塞悉則翻由是內官咸共恚疾內官即中官恚於避翻讒隙仍作極其刑謫輸作左校天下有識皆以穆同勤禹稷而被共鯀之戾共音恭若死者有知則唐帝怒於崇山重華忿於蒼墓矣賢曰尚書放歡兜於崇山孔安國注曰崇山南裔也山海經曰有歡頭之國帝堯葬焉郭璞注曰歡頭歡兜也禮記曰舜葬蒼梧之野竊持國柄手握王爵口銜天憲天憲王法也謂刑戮出於其口也賢曰運行也論語曰季氏富於周公吸與吸同亢音抗非惡榮而好辱惡生而好死也惡烏路翻好呼到翻徒感王綱之不攝賢曰攝接也余謂攝飭整也故竭心懷憂為上深計臣願黥首繫趾賢曰黥首謂鑿額涅墨也繫趾謂釱其足也以鐵著足曰釱章乙十六行本輸作校乙十一行本同作帝覽其奏乃赦之本初二年冬十月太尉袁湯免以太常胡廣為太尉司徒吳雄司空趙戒免以太僕黃瓊為司徒光祿勳房植為司空本初二年武陵蠻詹山等反武陵太守汝南應奉招降之本初二年車師後部王阿羅多與戊部候嚴皓不相得戊己兩部各置校尉各有部候西域傳曰和帝置戊部候居車師後部候城攻圍屯田殺傷吏士後部侯炭遮領餘民畔阿羅多詣漢吏降前書車師後國有擊胡侯漢賜印綬降戶江翻下同從百餘騎亡入北胸奴敦煌太守宋亮上立後故王軍就質子卑君為王上時掌翻上奏而立之安帝延光四年班勇斬後部王軍就其質子在敦煌質音致後阿羅多復從胸奴中還與卑君爭國復扶又翻頗收其國人成校尉嚴章乙十六行本嚴作閻乙十一行本同退齋校同詳慮其招引北虜將亂西域乃開信告示開信者開以丹青之信阿羅多乃詣詳降降戶江翻於是更立阿羅多為王將卑君還敦煌以後部人三百帳與之西域傳曰帳者猶中國之戶數也將如字二年本初二年春正月甲午赦天下本初二年二月辛丑復聽刺史二千石行三年喪安帝建光元年斷行三年喪事見四十九卷本初二年癸卯京師地震本初二年夏蝗本初二年東海胊山崩賢曰胊山在今海州胊山縣南本初二年乙卯封乳母馬惠子初為列侯本初二年秋九月丁卯朔日有食之本初二年太尉胡廣免以司徒黃瓊為太尉閏月以光祿勳尹頌為司徒本初二年冬十一月甲辰帝校獵上林苑遂至函谷關校戶孝翻闌校也所以遮獸而獵取之謂之校獵東漢開上林苑於雒陽西函谷關在河南穀城縣本初二年泰山琅邪賊公孫舉東郭竇等反殺長吏永壽元年乙未一五五本初二年春正月戊申赦天下改元本初二年二月司隸冀州飢人相食本初二年太學生劉陶上疏陳事曰夫天之與帝帝之與民猶頭之與足相須而行也陛下目不視鳴條之事耳不聞檀車之聲賢曰鳴條地名在安邑之西湯與桀戰于鳴條之野檀車兵車也詩曰檀車嘽嘽余按大雅大明之詩曰牧野洋洋檀車煌煌維師尚父時維鷹揚涼彼武王肆伐大商陶蓋用此檀事事言桀紂貴為天子得罪於天流毒於民而湯武伐之亡國之事不接於帝之耳目帝不知以為戒也毛氏詩傳曰檀強韌之木陸璣疏檀木皮正青滑澤與檕迷相似又似駮馬駮馬梓檎故里語斫檀不諦得檕迷檕迷尚可得駮馬檕迷一名挈橀故齊人諺曰上山伐檀挈橀先殫蓋檀木強韌可為兵車嘽吐丹翻涼力尚翻震食不即損於聖體震食謂地震日食也輕上天之怒伏念高祖之起始自布衣合散扶傷克成帝業勤亦至矣流福遺祚至於陛下陛下既不能增明烈考之軌而忽高祖之勤妄假利器委授國柄使㣥醜刑隸芟刈小民芟所銜翻虎豹窟於麑場賢曰鹿子曰麑音研奚翻豺狼乳於春囿乳人喻翻産也貨殖者為窮冤之魂貧餒者作飢寒之鬼言無貧富皆不得其死杜預曰窀厚也穸夜也厚夜猶長夜也窀株倫翻是愚臣所為咨嗟長懷歎息者也朝直遙翻為于偽翻且秦之將亡正諫者誅諛進者賞嘉言結於忠舌國命出於讒口亶閻樂於咸陽授趙高以車府閻樂為咸陽令趙高為中車府令威離身而不顧離力智翻古今一揆成敗同勢願陛下遠覽強秦之傾近察哀平之變得失昭然禍福可見臣又聞危非仁不扶亂非智不救竊見故冀州刺史南陽朱穆前烏桓校尉臣同郡李膺皆履正清平貞高絶俗斯實中興之良佐國家之柱臣也宜還本朝夾輔王室前年朱穆得罪李膺時亦免居綸氏賢曰不時謂不合於時也必至消滅臣始悲天下之可悲今天下亦悲臣之愚惑也書奏不省省悉景翻本初二年夏南陽大水本初二年司空房植免以太常韓縯為司空縯以淺翻本初二年巴郡益州郡山崩本初二年秋南胸奴左薁鞬臺耆且渠伯德等反薁於六翻鞬居言翻且子余翻考異曰帝紀作左臺且渠伯德等叛今從張奐傳寇美稷東羌復舉種應之復扶又翻種章勇翻安定屬國都尉敦煌張奐初到職賢曰屬國都尉其秩比二千石水經注安定屬國都尉治三水縣聞之即勒兵而出軍吏以為力不敵叩頭爭止之奐不聽遂進屯長城此即秦蒙恬所築長城在上郡界遣將王衛招誘東羌因據龜茲縣前書上郡龜茲縣上郡屬國都尉治所師古曰龜茲國人來降附者處之於此故以名云東羌諸豪遂相率與奐共擊薁鞬等破之伯德惶恐將其衆降郡界以寧羌豪遺奐馬二十匹金鐻八攻遺于季翻賢曰郭璞注山海經云鐻音渠金食器名未詳形制也韻書曰鐻戎夷貫耳奐於諸羌前以酒酹地賢曰以酒沃地謂之酹音力外翻余謂蓋自誓也曰使馬如羊不以入廣既使金如粟不以入懷悉以還之前此八都尉率好財貨好呼到翻為羌所患苦及奐正身潔己無不悅服威化大行二年本初二年春三月蜀郡屬國夷反延光元年以蜀郡西部都尉為屬國都尉本初二年初鮮卑檀石槐勇健有智略部落畏服乃施法禁平曲直無敢犯者遂推以為大人檀石槐立庭於彈汙山啜仇水上汙范書作汗章乙十一行本正作汗啜音昌悅翻兵馬甚盛東西部大人皆歸焉因南抄緣邊北拒丁零東卻夫餘抄楚交翻夫音扶西擊烏孫盡據胸奴故地東西萬四千餘里秋七月檀石槐寇雲中以故烏桓校尉李膺為度遼將軍膺到邊羌胡皆望風畏服先所掠男女悉詣塞下送還之考異曰袁紀延熹二年六月鮮卑寇遼東度遼將軍李膺擊破之今從范書本初二年公孫舉東郭竇等聚衆至三萬人寇青兗徐三州破壞郡縣壞音怪連年討之不能克尚書選能治劇者以司徒掾潁川韓韶為嬴長嬴縣屬泰山郡賢曰故城在今兗州博城縣東北治直之翻掾俞絹翻長知兩翻相戒不入嬴境餘縣流民萬餘戶入縣界韶開倉賑之主者爭謂不可主者主倉粟之吏也長活溝壑之人而以此伏罪含笑入地矣太守素知韶名德竟無所坐韶與同郡荀淑鍾皓陳實皆嘗為縣長所至以德政稱時人謂之潁川四長賢曰謂荀淑為當塗長韓韶為嬴長陳實為太丘長鍾皓為林慮長也長知兩翻本初二年初鮮卑寇遼東屬國都尉段章乙十六行本段上有武威二字乙十一行本同孔本同張校同熲率所領馳赴之熲古迥翻既而恐賊驚去乃使驛騎詐齎璽書召熲熲於道偽退潛於還路設伏虜以為信然乃入追熲熲因大縱兵悉斬獲之坐詐為璽書當伏重刑以有功論司寇刑竟拜議郎司寇二歲刑璽斯氏翻詔以東方盜賊昌熾熾尺志翻令公卿選將帥有文武材者司徒尹頌薦熲段熲傳作訟帝紀作頌作頌為是擊舉竇等大破斬之獲首萬餘級餘黨降散降戶江翻封熲為列侯本初二年冬十二月地章乙十六行本地上有京師二字乙十一行本同震本初二年封梁不疑子馬為潁陰侯梁胤子桃為城父侯城父縣屬汝南郡考異曰袁紀馬桃封在建和元年馬作焉桃作祧今從范書容肇祖標點顧頡剛聶崇岐覆校
