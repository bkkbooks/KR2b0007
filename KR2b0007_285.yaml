body:
  text: 資治通鑑卷第二百八十五端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千六百戶食實封一千戶臣司馬光奉敕編集後學天台音注後晉紀六齊王下開運二年乙巳九四五八月甲子朔日有食之丙寅右僕射兼中書侍郎同平章事和凝罷守本官加樞密使戶部尚書馮玉中書侍郎同平章事事無大小悉以委之帝自陽城之捷謂天下無虞驕侈益甚陽城之捷見上卷上年夫勝之不可恃也尚矣紂之百克而卒無後夫差數戰數勝終以亡國桑田之捷滅虢之兆也方城之勝破庸之基也項梁死於定陶而嬴秦墟宇文化及摧於黎陽而李密敗皆恃勝之禍也陽城之戰危而後克契丹折翅北歸蓄憤愈甚為謀愈深晉主乃偃然以為無虞石氏宗廟宜其不祀也皆歸內府多造器玩廣宮室崇飾後庭近朝莫之及近朝謂近世如梁如唐也朝直遙翻用織工數百期年乃成期讀曰期又賞賜優伶無度桑維翰諫曰嚮者陛下親禦胡寇謂元年澶州之戰也事見上卷賞不過帛數端今優人一談一笑稱旨稱尺正翻往往賜束帛萬錢錦袍銀帶唐制帛以十端為束能不觖望曰我曹冒白刃絶筋折骨觖古穴翻觖望怨望也冒莫北翻折而設翻曾不如一談一笑之功乎如此則士卒解體陛下誰與衛社稷乎帝不聽馮玉每善承迎帝意由是益有寵嘗有疾在家帝謂諸宰相曰自刺史以上俟馮玉出乃得除其倚任如此竇廣德有賢行漢文帝以其后弟恐天下議其私不敢相也馮玉何人斯晉出帝昌言於朝以昭親任之意臨亂之君各賢其臣其此謂乎四方賂遺輻輳其門遺唯季翻由是朝政益壞史言晉亡形已成朝直遙翻唐兵圍建州既久是年二月唐兵攻建州事始見上卷或謂董思安謂誨語之也宜早擇去就思安曰吾世事王氏危而叛之天下其誰容我衆感其言無叛者丁亥唐先鋒橋道使上元王建封先登上元本江寧縣唐肅宗上元間更名帶江寧府閩主延政降閩自唐末王潮得福建傳審知延翰鏻昶曦至延政而亡董思安整衆奔泉州史言泉州二將事閩主有始終初唐兵之來建人苦王氏之亂與楊思恭之重斂楊思恭重斂事見二百八十三卷天福八年斂力贍翻及破建州縱兵大掠焚宮室廬舍俱盡是夕寒雨凍死者相枕枕職任翻建人失望唐主以其有功皆不問漢主殺韶王弘雅弘雅漢主之弟也九月許文稹以汀州王繼勳以泉州王繼成以漳州皆降於唐荀子有言兼並易也堅凝之難唐能取閩不能終有閩也為閩人叛唐張本丙申以西京留守兼侍中景延廣充北面行營副招討使殿中監王欽祚權知恆州事恆戶登翻會乏軍儲詔欽祚括糴民粟杜威有粟十餘萬斛在恆州欽祚舉籍以聞威大怒表稱臣有何罪欽祚籍沒臣粟朝廷為之召欽祚還杜威恆州之粟豈非前者表獻之數乎使其出於表獻之外亦掊克軍民所積者耳舉而籍之夫何過朝廷之法不行於貴近第能虐貧下以供調度國非其國矣為于偽翻還從宣翻戊申置威信軍於曹州遣侍衛馬步都指揮使李守貞戍澶州乙卯遣彰德節度使張彥澤戍恆州漢主殺劉思潮林少強林少良何昌廷章十二行本廷作延乙十一行本同孔本同天福八年漢主使劉思潮等四人弒其兄弘度而自立事見二百八十三卷今又殺四人以除其逼少詩照翻以左僕射王翷章十二行本翷作翻乙十一行本同嘗與高祖謀立弘昌事見二百八十三卷天福七年英州漢桂陽郡湞陽縣之地唐以湞陽縣隸廣州漢主劉龑分湞陽縣置英州九域志廣州北至英州四百二十里賜死內外皆懼不自保冬十月癸巳置鎮安軍於陳州唐元敬宋太后殂王延政至金陵唐主以為羽林大將軍斬楊思恭以謝建人以楊思恭厚斂也崇文治以寬簡建人遂安撫寧荒餘其政當爾自蓋公授此法於曹參參以相齊又以相漢後人知此法者鮮矣治直之翻初高麗王建用兵吞滅鄰國頗強大事見二百八十一卷高祖天福元年麗力之翻勃海我婚姻也其王為契丹所虜請與朝廷共擊取之高祖不報及帝與契丹為仇襪囉復言之襪望發翻囉魯何翻復扶又翻帝欲使高麗擾契丹東邊以分其兵勢會建卒子武自稱權知國事上表告喪十一月戊戌以武為大義軍使高麗王遣通事舍人郭仁遇使其國使疏吏翻諭指使擊契丹畏契丹知之不形諸詔命以詔指諭之而已見其兵極弱嚮者襪囉之言特建為誇誕耳實不敢與契丹為敵宋白曰晉天福中有西域僧襪囉來朝善火卜俄辭高祖請遊高麗王建甚禮之時契丹併勃海之地有年矣建因從容謂襪囉曰勃海本吾親戚之國其王為契丹所虜吾欲為朝廷攻而取之且欲平其舊怨師回為言於天子當定期兩襲之襪囉還具奏高祖不報出帝與契丹交兵襪囉復奏之帝遣郭仁遇飛詔諭建深攻其地以牽脅之會建已卒武知國事與其父之大臣不叶自相魚肉內難稍平兵威未振且夷人怯懦襪囉之言皆建虛誕耳還從宣翻武更以他故為解為説以自解乙卯吳越王弘佐誅內都監使杜昭達己未誅內牙上統軍使明州刺史闞璠璠音翻昭達建徽之孫也杜建徽佐吳越王錢鏐有功好呼到翻錢塘富人程昭悅以貨結二人得侍弘佐左右昭悅為人狡佞王悅之寵待踰於舊將璠不能平昭悅知之詣璠頓首謝罪璠責讓久之乃曰吾始者決欲殺汝今既悔過吾亦釋然昭悅懼謀去璠去羌呂翻璠專而愎國人惡之者衆章十二行本衆下有王亦惡之四字乙十一行本同孔本同張校同退齋校同愎蒲逼翻惡烏路翻昭悅欲出璠於外恐璠覺之私謂右統軍使胡進思曰今欲除公及璠各為本州使璠不疑可乎進思許之乃以璠為明州刺史進思為湖州刺史闞璠明州人胡進思湖州人也出我於外是棄我也進思曰老兵得大州幸矣不行何為璠乃受命既而復以他故留進思復扶又翻內外馬步都統軍使錢仁俊母杜昭達之姑也昭悅因譖璠昭達謀奉仁俊作亂下獄鍛鍊成之下戶駕翻璠昭達既誅奪仁俊官幽于東府於是昭悅治闞杜之黨凡權任章十二行本任作位乙十一行本同孔本同張校同與己侔意所忌者誅放百餘人國人畏之側目為弘佐誅昭悅張本治直之翻昭悅以為戇故獨存之胡進思獨存所以階錢氏廢立之禍昭悅收仁俊故吏慎溫其慎姓也古有慎到溫其名也拷掠備至拷音考掠音亮溫其堅守不屈弘佐嘉之擢為國官國官吳越國官也慎溫其自藩府吏職擢為國官衢州人也十二月乙丑加吳越王弘佐東南面兵馬都元帥辛未以前中書舍人廣晉陰章十二行本陰作殷乙十一行本同孔本同鵬為給事中樞密直學士唐改魏州為興唐府高祖改為廣晉府馮玉之黨也朝廷每有遷除玉皆與鵬議之由是請謁賂遺充滿其門遺惟季翻初帝疾未平去年冬帝有疾見上卷謂今年正月朔旦女僕即女奴也唐人謂參候為起居今人之言猶爾皇弟睿近讀書否睿即重睿也避帝名去重字以告馮玉玉因譖維翰有廢立之志帝疑之帝固忌重睿因桑維翰女僕之間已疑維翰矣馮玉又從而譖之其疑愈不可破矣李守貞素惡維翰惡烏路翻馮玉李彥韜與守貞合謀排之以中書令行開封尹趙瑩柔而易制易以豉翻共薦以代維翰丁亥罷維翰政事為開封尹以瑩為中書令李嵩為樞密使守侍中維翰遂稱足疾希復朝謁杜絶賓客亦所以遠猜嫌也復扶又翻朝直遙翻或謂馮玉曰桑公元老今既解其樞務縱不留之相位猶當優以大藩奈何使之尹京親猥細之務乎猥雜也恐其反耳言所以不授維翰大鎮者恐其阻兵而反儒生安能反玉曰縱不自反恐其教人耳此指維翰贊成晉祖晉陽舉兵之謀楚湘陰處士戴偃劉昫曰湘陰漢羅縣宋置湘陰縣唐屬嶽州宋淳化四年以湘陰縣隸潭州九域志在州東北一百一十五里楚王希範囚之天策副都軍使丁思瑾上書切諫希範削其官爵唐齊王景達府屬謝仲宣言於景達曰宋齊丘先帝布衣之交今棄之草萊不厭衆心景達為之言於唐主曰厭於葉翻伏也又於豔翻滿也為于偽翻齊丘宿望勿用可也何必棄之以為名唐主乃使景達自至青陽召之齊丘隱青陽見二百八十三卷天福八年三年丙午九四六春正月以齊丘為太傅兼中書令但奉朝請不預政事奉朝會請召而已與中書侍郎馮延己皆同平章事建勳練習吏事而懦怯少斷延己工文辭而狡佞喜大言多樹朋黨斷丁亂翻喜許記翻惟世宦則練習吏事懦怯少斷則亦因練習之久而巧於避就者然也若馮延己所為乃少年書生之常態多大言而少成事樹朋黨以濟己私此二種人皆不可以相也水部郎中高越上書指延己兄弟過惡唐主怒貶越蘄州司士初唐主置宣政院於禁中以翰林學士給事中常夢錫領之專典機密與中書侍郎嚴續皆忠直無私唐主謂夢錫曰大臣惟嚴續中立然無才恐不勝其黨卿宜左右之未幾夢錫罷宣政院左右讀為佐佑幾居豈翻續亦出為池州觀察使夢錫於是移疾縱酒不復預朝廷事史言正邪雜處正終為邪所勝復扶又翻可求之子也嚴可求徐溫之謀主也二月壬戌朔日有食之晉昌節度使兼侍中趙在禮晉以京兆府為晉昌軍更工衡翻趙在禮起於鄴都徙義成不行後歷橫海泰寧匡國天平忠武武寧歸德晉昌凡十鎮所至貪暴家資為諸帥之最帥所類翻帝利其富三月庚申為皇子鎮寧節度使延煦娶其女為于偽翻鎮寧軍澶州煦吁句翻在禮自費緡錢十萬縣官之費數倍過之延煦及弟延寶皆高祖諸孫帝養以為子唐泉州刺史王繼勳致書修好於威武節度使李弘義好呼到翻弘義以泉州故隸威武軍怒其抗禮王繼勳與李弘義同事南唐弘義雖建節然比肩事主固不可修巡屬之禮李弘義以此起兵端耳四月遣弟弘通將兵萬人伐之初朔方節度使馮暉在靈州留黨項酋長拓跋彥超於州下事見二百八十二卷天福四年黨底朗翻酋慈由翻長知兩翻及將罷鎮而縱之前彰武節度使王令溫代暉鎮朔方不存撫羌胡以中國法繩之昔周之封衛疆以周索以其地居中國也其封晉則疆以戎索以其地近戎狄也戎狄不可繩以中國之法尚矣章十二行本怒下有皆叛二字乙十一行本同孔本同張校同競為寇鈔鈔楚交翻拓跋彥超石存也廝褒三族共攻靈州殺令溫弟令周戊午令溫上表告急泉州都指揮使留從效謂刺史王繼勳曰李弘通兵勢甚盛士卒以使君賞罰不當當丁浪翻莫肯力戰使君宜避位自省省昔景翻乃廢繼勳歸私第留從效立王繼勳見上卷上年勒兵擊李弘通大破之表聞于唐唐主以從效為泉州刺史召繼勳還金陵遣將將兵戍泉州為留從效遣唐戍將歸張本汀州刺史許文稹為蘄州刺史稹止忍翻定州西北二百里有狼山胸奴須知狼山寨東北至易州八十里東南至廣信軍界堡中有佛舍尼孫深意居之以妖術惑衆妖於遙翻言事頗驗遠近信奉之中山人孫方簡歐史作孫方諫蓋孫方簡後避周太祖皇考諱遂改名方諫也考異曰周世宗實録云清苑人今從漢高祖實録自言深意之姪不飲酒食肉事深意甚謹深意卒方簡嗣行其術稱深意坐化崇信釋氏而學其學專一而靜者其死也能結趺端坐如生謂之坐化事之如生其徒日滋薛史曰宋乾德中遷其尼枯骨赴京焚於北郊妖徒遂息會晉與契丹絶好好呼到翻北邊賦役煩重寇盜充斥民不安其業方簡行友因帥鄉里豪健者據寺為寨以自保契丹入寇方簡帥衆邀擊帥讀曰率頗獲其甲兵牛馬軍資人挈家往依之者日益衆久之至千餘家遂為㣥盜懼為吏所討乃歸款朝廷朝廷亦資其禦寇署東北招收指揮使方簡時入契丹境鈔掠鈔楚交翻多所殺獲既而邀求不已朝廷小不副其意則舉寨降於契丹請為鄉道以入寇邊境之上姦民如此者不特孫方簡唐人所謂兩面也降戶江翻鄉讀曰嚮道讀曰導民餓死者所在以萬數兗鄆滄貝之間盜賊起吏不能禁天雄節度使杜威遣元隨軍將劉延翰市馬於邊方簡執之獻於契丹延翰逃歸六月壬戌至大梁言方簡欲乘中國凶飢引契丹入寇宜為之備為孫方簡乘中國無主契丹北歸入據定州張本初朔方節度使馮暉在靈武得羌胡心市馬期年得五千匹朝廷忌之徙鎮邠州及陝州陝失冉翻入為侍衛步軍都指揮使領河陽節度使暉知朝廷之意悔離靈武離力智翻求復鎮靈州朝廷亦以羌胡方擾丙寅復以暉為朔方節度使將關西兵擊羌胡以威州刺史藥元福為行營馬步軍都指揮使威州唐之安樂州也中世沒於吐蕃大中三年收復更名威州梁唐棄之晉復置後周改為環州以大河環曲為名亦唐初之舊州名也趙珣聚米圖經靈州南至環州五百里按薛史天福四年五月敕靈州方渠鎮宜升為威州割寧州木波馬嶺二縣隸之後周改為環州顯德四年降為通遠軍乙丑定州言契丹勒兵壓境詔以天平節度使侍衛馬步都指揮使李守貞為北面行營都部署義成節度使皇甫遇副之彰德節度使張彥澤充馬軍都指揮使兼都虞候義武節度使薊人李殷充步軍都指揮使兼都排陳使薊音計陳讀曰陳遣護聖指揮使臨清王彥超太原白延遇以部兵十營詣邢州時馬軍都指揮使鎮安節度使李彥韜方用事時以陳州置鎮安軍守貞在外所為事無大小彥韜必知之守貞外雖敬奉而內恨之為李守貞與杜威降契丹張本初唐人既克建州去年八月唐克建州唐主不許樞密使陳覺請自往説李弘義説式芮翻必令入朝宋齊丘薦覺才辨可不煩寸刃坐致弘義唐主乃拜弘義母妻皆為國夫人四弟皆遷官以覺為福州宣諭使厚賜弘義金帛欲啖李弘義以祿利而誘致之見覺辭色甚倨待之疏薄覺不敢言入朝事而還為陳覺興兵攻福州喪敗而還張本還從宣翻又如字秋七月河決楊劉西入莘縣廣四十里自朝城北流莘縣在魏州之東朝城在魏州東南相去四十里廣古曠翻有自幽州來者言趙延壽有意歸國樞密使李嵩馮玉信之命天雄節度使杜威致書於延壽具述朝旨啖以厚利朝直遙翻啖徒濫翻洛章十二行本洛作洺乙十一行本同孔本同州軍將趙行實嘗事延壽遣齎書潛往遺之延壽復書言久處異域遺惟季翻處昌呂翻思歸中國乞發大軍應接拔身南去辭旨懇密朝廷欣然復遣行實詣延壽與為期約晉人自此墮趙延壽計中矣復扶又翻八月李守貞言與契丹千餘騎遇於長城北此戰國時燕所築長城也在涿州固安縣南薛史李守貞奏大軍至望都縣相次至長城北遇虜轉鬬斬其酋帥解里酋慈秋翻解戶買翻擁餘衆入水溺死者甚衆丁卯詔李守貞還屯澶州還從宣翻帝既與契丹絶好數召吐谷渾酋長白承福入朝好呼到翻數所角翻宴賜甚厚承福從帝與契丹戰澶州澶時連翻又與張從恩戍滑州屬歲大熱屬之欲翻遣其部落還太原畜牧於嵐石之境嵐盧含翻部落多犯法劉知遠無所縱捨部落知朝廷微弱且畏知遠之嚴謀相與遁歸故地吐谷渾部落既知朝廷微弱又畏劉知遠之嚴然不敢於太原作亂者憚劉知遠之威略無所肆其姦故欲遁歸故地位亞承福帥所部先亡歸契丹帥讀曰率契丹用為雲州觀察使以誘承福誘音酉知遠與郭威謀曰今天下多事置此屬於太原乃腹心之疾也不如去之承福家甚富飼馬用銀槽去羌呂翻飼祥吏翻威勸知遠誅之收其貨以贍軍知遠密表吐谷渾反覆難保請遷於內地帝遣使發其部落千九百人分置河陽及諸州知遠遣威誘承福等入居太原城中因誣承福等五族謀叛以兵圍而殺之合四百口籍沒其家資詔褒賞之吐谷渾由是遂微五代會要曰吐谷渾酋長有赫連鐸者唐咸通中從太原節度使康承訓平徐方有功朝廷授振武節度使復盜據雲中後唐太祖逐之乃歸幽州李匡儔其部落散居蔚州界互為君長其氏不常有白承福者自同光初代為都督依中山北石門為柵莊宗賜其額為寧朔奉化兩府以都督為節度使仍賜承福姓李名紹魯其畜牧就善水草丁壯常數千人羊馬生息入市中土朝廷常存恤之潞王清泰三年白可久為寧朔奉化留後始見於史晉天福元年高祖以契丹有助立之功割鴈門以北及幽州之地以賂之由是吐谷渾部族皆隸於契丹其後苦契丹之虐政復為鎮州節度使安重榮所誘乃背契丹率車帳羊馬取五臺路歸國契丹大怒以朝廷招納叛亡遣使責讓至六年正月高祖命供奉官張澄等率兵二千搜索並鎮欣代四州山谷吐渾還其舊地然亦以契丹誅求無厭心不平之命漢高祖出鎮太原潛加慰撫其年五月大首領白承福及麾下來朝九月又遣首領白可久來朝少主嗣位絶契丹之好數召其酋長入朝厚加錫賜每大宴會皆命列坐於勳臣之次至開運捍虜於澶州召承福等帥其部衆從行屬歲多暑熱部下多死復遣歸太原移帳於嵐石州然承福馭下無法多干軍令其族白可久在承福之亞因牧馬帥本帳北遁契丹授以官爵復遣潛誘承福承福亦思叛去事未果漢祖知之乃以兵環其部族擒承福與其族白鐵匱赫連海龍等五家凡四百有餘人伏誅籍其牛馬命別部長王義宗統其餘屬濮州刺史慕容彥超坐違法科斂斂力贍翻亶取官麥五百斛造麴賦與部民李彥韜素與彥超有隙發其事罪應死彥韜趣馮玉使殺之趣讀曰促劉知遠上表論救慕容彥超劉知遠之同産弟故救之上時掌翻如彥超之罪今天下藩侯皆有之若盡其法恐人人不自安甲戌敕免彥超死削官爵流房州唐陳覺自福州還至劍州劍州即殷主王延政所置之鐔州也南唐既克建州分延平建浦富沙三縣置劍州至宋混一天下以蜀中亦有劍州乃加南字為南劍州恥自詭説李弘義入朝而不能致也侍衛官在人主左右直衛者也猶盛唐之侍官亶發汀建撫信州兵及戍卒命建州監軍使馮延魯將之趣福州迎弘義趣七喻翻延魯先遺弘義書遺惟季翻諭以禍福弘義復書請戰遣樓船指揮使楊崇保將州師拒之一本州師作舟師建溪東流歷劍州至福州皆大江也故土人亦謂之為江福州孤危旦夕可克唐主以覺專命甚怒㣥臣多言兵已傅城下傅音附不可中止當發兵助之丁丑覺延魯敗楊崇保於候官閩及候官二縣皆治福州郭下此戰於候官縣界也敗補賣翻戊寅乘勝進攻福州西關弘義出擊大破之執唐左神威指揮使楊匡鄴唐主以永安節度使王崇文為東南面都招討使去年十月唐置永安軍於建州延魯為南面監軍使會兵攻福州克其外郭弘義固守第二城第二重城也馮暉引兵過旱海至輝德張洎曰自威州抵靈州旱海七百里斥鹵枯澤無溪澗川谷輝德地名在靈武南張舜民云今旱江平即旱海在清遠軍北趙珣聚米圖經曰鹽夏清遠軍間並係沙磧俗謂之旱海自環州出青剛川本靈州大路自此過美利寨漸入平夏經旱海中難得水泉至耀德清邊鎮入靈州糗去久翻拓跋彥超衆數萬為三陳扼要路據水泉以待之陳讀曰陳下同軍中大懼暉以賂求和於彥超彥超許之自旦至日中使者往返數四兵未解藥元福曰虜知我飢渴陽許和以困我耳若至暮則吾輩成擒矣今虜雖衆精兵不多依西山而陳者是也其餘步卒不足為患請公嚴陳以待我嚴陳者嚴兵整陳也小勝則舉黃旗大軍合勢擊之破之必矣乃帥騎先進用短兵力戰彥超小卻元福舉黃旗暉引兵赴之彥超大敗馮暉圈養拓跋彥超於靈武城中彥超固心知其故而懷怨暉去鎮而彥超得出彥超既得出而暉復來出柙之虎苟可以肆反噬者無所不至也非力戰而克寸之馮暉之威令不可復行於朔方矣帥讀曰率暉入靈州九月契丹三萬寇河東壬辰劉知遠敗之於陽武谷敗補賣翻斬首七千級漢劉思潮等既死陳道庠內不自安陳道庠與劉思潮等同弒漢主弘度者也殺劉思潮等見去年九月按路振九國志陳道庠父璫與鄧伸有舊故然伸曰憨獠遺惟季翻憨呼談翻癡也獠盧皓翻又竹絞翻此書有誅韓信醢彭越事宜審讀之漢主聞之族道庠及伸李弘義自稱威武留後章十二行本後下有權知閩國事五字乙十一行本同孔本同張校同退齋校同更名弘達奉表請命于晉李弘義本名仁達弘義者唐所賜名也既叛唐遂更其名甲午以弘達為威武節度使同平章事知閩國事張彥澤奏敗契丹於定州北又敗之於泰州斬首二千級敗補賣翻辛丑福州排陳使馬捷陳讀曰陳引唐兵自馬牧山拔寨而入至善化門橋都指揮使丁彥貞以兵百人拒之弘達退保善化門外城再重皆為唐兵所據弘達更名達弘達更名達以吳越王名上從弘避之也重直龍翻更工衡翻乞師於吳越楚王希範知帝好奢靡好呼到翻屢以珍玩為獻求都元帥甲辰以希範為諸道兵馬都元帥丙辰河決澶州臨黃臨黃春秋衛河上之邑漢為東郡觀縣有衛宣公新臺後魏置臨黃縣唐屬澶州宋端拱元年省臨黃入觀城縣契丹使瀛州刺史劉延祚遺樂壽監軍王巒書請舉城內附遺惟季翻考異曰歐史作高牟翰按陷蕃記前云延祚詐輸誠款後云大軍至瀛州偵知蕃將高模翰潛師而出蓋延祚為刺史模翰乃戍將耳今從陷蕃記且云城中契丹兵不滿千人乞朝廷發輕兵襲之己為內應又今秋多雨自瓦橋以北積水無際契丹主已歸牙帳雖聞關南有變瀛莫二州晉割屬契丹在瓦橋關南不能救也巒與天雄節度使兼中書令杜威屢奏瀛莫乘此可取深州刺史慕容遷獻瀛莫圖馮玉李嵩信以為然欲發大兵迎趙延壽及延祚先是趙延壽亦詐通款先是侍衛馬步都指揮使天平節度使李守貞數將兵過廣晉先昔薦翻數所角翻過音戈魏州廣晉府杜威厚待之贈金帛甲兵動以萬計守貞由是與威親善守貞入朝帝勞之曰勞力到翻聞卿為將常費私財以賞戰士對曰此皆杜威盡忠於國以金帛資臣臣安敢掠有其美因言陛下若他日用兵臣願與威戮力以清沙漠帝由是亦賢之及將北征帝與馮玉李嵩議以威為元帥守貞副之趙瑩私謂馮李曰杜令國戚謂尚公主也而所欲未厭心常慊慊位兼將相謂居大鎮兼中書令未厭未滿所欲也慊慊亦不滿之意慊苦簟翻復扶又翻必若有事北方不若止任守貞為愈也杜威之心迹雖趙瑩猶知之冬十月辛未以威為北面行營都指揮使章十二行本作招討使乙十一行本同孔本同以守貞為兵馬都監監古銜翻泰寧節度使安審琦為左右廂都指揮使武寧節度使符彥卿為馬軍左廂都指揮使義成節度使皇甫遇為馬軍右廂都指揮使永清節度使梁漢璋為馬軍都排陳使前威勝節度使宋彥筠為步軍左廂都指揮使奉國左廂都指揮使王饒為步軍右廂都指揮使洺州團練使薛懷讓為先鋒都指揮使仍下敕榜曰專發大軍往平黠虜黠下八翻先取瀛莫安定關南次復幽燕蕩平塞北又曰有擒獲虜主者除上鎮節度使賞錢萬緡絹萬匹銀萬兩談何容易晉之君臣恃陽城之捷有輕視契丹之心兵驕者敗自古而然至是未止軍行及饋運者甚艱苦唐漳州將林贊堯作亂殺監軍使周承義劍州刺史陳誨泉州刺史留從效舉兵逐贊堯以泉州裨將董思安權知漳州唐主以思安為漳州刺史思安辭以父名章唐主改漳州為南州命思安及留從效將州兵會攻福州庚辰圍之福州使者至錢塘乞師之使錢塘吳越國都皆曰道險遠難救惟內都監使臨安水丘昭券以為當救水丘復姓也何氏姓苑云漢有司隸校尉水丘岑今為臨安著姓脣亡齒寒古語多有之曾不能救鄰道將安用之諸君但樂飽身章十二行本身作食乙十一行本同張校同安坐邪樂音洛壬午遣統軍章十二行本軍下有使字乙十一行本同孔本同張校同張筠趙承泰將兵三萬水陸救福州吳越救福州自婺衢至建劍順流可至福州是時劍建已為南唐守此道不可由也自溫州之平陽渡海浦至福州界當由此道耳先是募兵久無應者弘佐命糾之曰糾而為兵者糧賜減半明日應募者雲集弘佐命昭券專掌用兵昭券憚程昭悅以用兵事讓之程昭悅時為弘佐所寵任故水丘昭券憚而讓之而以軍謀委元德昭德昭危仔倡之子也危仔倡見二百六十三卷梁太祖開平三年弘佐議鑄鐵錢以益將士祿賜其弟牙內都虞候弘億諫曰鑄鐵錢有八害新錢既行舊錢皆流入鄰國一也舊錢謂銅錢則商賈不行百貨不通二也賈音古銅禁至嚴民猶盜鑄況家有鐺釜野有鏵犂犯法必多三也鐺楚耕翻鏵戶花翻鏵鍬也閩人鑄鐵錢而亂亡不足為法四也閩鑄鐵錢見二百八十三卷天福七年及上卷元年五也言鄰國聞之必將以為國用空乏而鑄鐵錢六也厭於鹽翻法變而弊不可遽復七也錢者國姓易之不祥八也弘佐乃止杜威李守貞會兵於廣晉而北行李守貞引兵會杜威於魏州相與北行請益兵公主者杜威妻宋國長公主帝之姑也今深入虜境必資衆力由是禁軍皆在其麾下杜威之計即趙德鈞請併范延光軍之計也德鈞不得請而威得請耳其志圖非望而敗國亡身則一也而宿衛空虛十一月丁酉以李守貞權知幽州行府事己亥杜威等至瀛州城門洞啓寂若無人威等不敢進聞契丹將高謨翰先已引兵潛出威遣梁漢璋將二千騎追之遇契丹於南陽務敗死威等聞之引兵而南時束城等數縣請降束城漢束州縣隋曰束城唐屬瀛州宋熙寧六年省束城縣為束城鎮屬河間縣掠其婦女而還還從宣翻又如字己酉吳越兵至福州自罾浦南潛入州城罾作滕翻魚網也福州之人就此罾魚因以得名唐兵進據東武門李達與吳越兵共禦之不利自是內外斷絶城中益危唐主遣信州刺史王建封助攻福州時王崇文雖為元帥而陳覺馮延魯魏岑爭用事留從效王建封倔強不用命留從效起於泉州斬黃紹頗破李弘通唐人憚其威名王建封雖本唐將恃建州先登之功故皆倔強不用命倔其勿翻強其兩翻進退不相應由是將士皆解體故攻城不克唐主以江州觀察使杜昌業為吏部尚書判省事先是昌業自兵部尚書判省事出江州判省事者判尚書省事閲簿籍撫案歎曰未數年而所章十二行本所上有府庫二字乙十一行本同孔本同張校同耗者半言昌業出入之間未及數年而府庫之積已耗其半言不能以支久也史言唐之府庫耗於用兵契丹主大舉入寇自易定趣恆州趣七喻翻恆戶登翻杜威等至武強九域志武強縣在深州西四十五里宋白曰武強六國時武隧地屬趙故城在今縣東北三十里是為漢武強縣郡國縣道記云古武強縣城在今縣西南二十五里是為晉武強縣高齊移縣於後魏武邑郡故城今縣理是也將自貝冀而南彰德節度使張彥澤時在恆州去年九月遣張彥澤戍恆州以備契丹恆戶登翻言契丹可破之狀威等復趣恆州復扶又翻趣七喻翻以彥澤為前鋒考異曰備史曰彥澤狼子其心密已變矣乃通款邪律氏請為前導因促騎説威引軍沿滹沱水西援常山及至真定東垣渡與威通謀先遣步衆跨水不之救致敗將沮人心以行詭計因促監者高勳請降於虜按彥澤與威若已通款於契丹則彥澤何故猶奪橋契丹何故猶議回旋今不取甲寅威等至中度橋滹沱水徑恆州東南恆州之人各隨便為津渡之所此為中度者明上下流各有度也彥澤帥騎爭之帥讀曰率契丹焚橋而退晉兵與契丹夾滹沱而軍始契丹見晉軍大至又爭橋不勝恐晉軍急渡滹沱與恆州合勢擊之議引兵還還從宣翻又如字及聞晉軍築壘為持久之計遂不去知晉軍不敢戰也蜀施州刺史田行皋叛遣供奉官耿彥珣將兵討之杜威雖以貴戚為上將性懦怯偏裨皆節度使自李守貞至宋彥筠皆節度使也置酒作樂罕議軍事磁州刺史兼北面轉運使李穀説威及李守貞曰磁牆之翻説式芮翻今大軍去恆州咫尺煙火相望若多以三股木置水中積薪布土其上橋可立成三股木者用木三條交股縛之其下撑開為三足以置水中夜募將士斫虜營而入表裏合勢虜必遁逃諸將皆以為然獨杜威不可遣穀南至懷孟督軍糧契丹以大軍當晉軍之前潛遣其將蕭翰通事劉重進將百騎及羸卒並西山出晉軍之後斷晉糧道及歸路羸倫為翻並步浪翻斷音短樵采者遇之盡為所掠有逸歸者皆稱虜衆之盛軍中忷懼翰等至欒城忷許勇翻舊唐書地理志曰欒城縣漢常山郡之開縣也後魏於開縣古城置欒城縣屬趙州唐屬恆州九域志欒城縣在恆州南六十三里范成大北使録曰趙州三十里至欒城金人改趙州為沃州城中戍兵千餘人不覺其至狼狽降之契丹獲晉民皆黥其面曰奉敕不殺縱之南走運夫在道遇之皆棄車驚潰翰契丹主之舅也契丹后族皆以蕭為氏歐史曰翰契丹之大族其號阿鉢翰之妹亦嫁契丹主德光而阿鉢本無姓氏契丹呼翰為國舅既入汴將北歸以為宣武節度使李嵩為製姓名曰蕭翰於是始姓蕭宋白曰蕭翰述律阿鉢之子十二月丁巳朔李穀自書密奏具言大軍危急之勢請車駕幸滑州遣高行周符彥卿扈從及發兵守澶州河陽以備虜之奔衝遣軍將關勳走馬上之高行周符彥卿一時名將也滑澶及河陽河津之要也使晉主能用李穀之言安得有張彥澤輕騎入汴之禍乎走馬上之急報也宋自寶元康定以前凡邊鎮率有走馬承受之官從才用翻澶時連翻上時兩翻己未帝始聞大軍屯中度甲寅杜威等至中度己未大梁始聞之強寇深入諸軍孤危而驛報七日始達晉之為兵可知矣關勳至庚申杜威奏請益兵詔悉發守宮禁者得數百人赴之自古以來重戰輕防未有不敗者也發數百人不足以增大軍之勢而重閉之防闕矣五十萬合束石之數言之所在鼎沸辛酉威又遣從者張祚等來告急從才用翻祚等還還從宣翻為契丹所獲自是朝廷與軍前聲問兩不相通時宿衛兵皆在行營人心懍懍懍力錦翻莫知為計開封尹桑維翰以國家危在旦夕求見帝言事見賢遍翻帝方在苑中調鷹調鷹者調習之也使馴狎而附人又詣執政言之執政不以為然執政謂馮玉李彥韜等謂所親曰晉氏不血食矣言晉必亡宗廟不祀蓋晉氏之亡不獨桑維翰知之通國之人皆知之帝欲自將北征李彥韜諫而止將即亮翻時符彥卿雖任行營職事帝留之使戍荊州口壬戌詔以歸德節度使高行周為北面都部署以彥卿副之共戍澶州以西京留守景延廣戍河陽且張形勢史言三將戍河津雖張形勢而兵力甚弱奉國都指揮使王清言於杜威曰今大軍去恆州五里守此何為營孤食盡勢將自潰請以步卒二千為前鋒奪橋開道公帥諸軍繼之得入恆州則無憂矣帥讀曰率下同威許諾遣清與宋彥筠俱進清戰甚鋭契丹不能支勢小卻諸將請以大軍繼之威不許彥筠為契丹所敗敗補賣翻浮水抵岸得免章十二行本免下有因退走三字乙十一行本同孔本同清獨帥麾下陳於水北力戰互有殺傷屢請救於威威竟不遣一騎助之清謂其衆曰上將握兵將即亮翻坐觀吾輩困急而不救此必有異志吾輩當以死報國耳衆感其言莫有退者至暮戰不息契丹以新兵繼之清及士衆盡死李穀為杜威畫計而不行猶可曰言之易而行之難至於王清力戰而不救則其欲賣國以圖己利心迹呈露人皆知之矣清洺州人也甲子契丹遙以兵環晉營環音宦內外斷絶軍中食且盡杜威與李守貞宋彥筠謀降契丹威潛遣腹心詣契丹牙帳邀求重賞契丹主紿之曰趙延壽威望素淺恐不能帝中國汝果降者當以汝為之威喜遂定降計趙延壽父子以是陷契丹杜威之才智未足以企延壽其墮契丹之計無足怪者覆轍相尋豈天意邪丙寅伏甲召諸將出降表示之使署名諸將駭愕莫敢言者但唯唯聽命唯于癸翻威遣閣門使高勳齎詣契丹契丹主賜詔慰納之是日威悉命軍士出陳於外陳讀曰陳軍士皆踴躍以為且戰威親諭之曰今食盡塗窮當與汝曹共求生計因命釋甲軍士皆慟哭聲振原野史言晉軍之心皆不欲降契丹迫於其帥而從之耳主上失德信任姦邪猜忌於己聞者無不切齒契丹主遣趙延壽衣赭袍至晉營慰撫士卒曰彼皆汝物也杜威以下皆迎謁於馬前亦以赭袍衣威以示晉軍其實皆戲之耳契丹主非特戲杜威趙延壽也亦以愚晉軍彼其心知晉軍之不誠服也駕言將以華人為中國主是二人者必居一於此晉人謂喪君有君皆華人也夫是以不生心其計巧矣然契丹主巧於愚弄而入汴之後大不能制河東小不能制㣥盜豈非挾數用術者有時而窮乎衣於既翻李守貞為司徒威引契丹主至恆州城下諭順國節度使王周以己降之狀周亦出降戊辰契丹主入恆州遣兵襲代州刺史王暉以城降之契丹以勝勢脅降代州而太原不為之動以劉知遠郭威在也九域志恆州西北至代州三百四十里先是契丹屢攻易州刺史郭璘固守拒之先悉薦翻璘離珍翻契丹主每過城下指而歎曰吾能吞併天下而為此人所扼及杜威既降契丹主遣通事耿崇美至易州誘諭其衆誘音酉衆皆降璘不能制遂為崇美所殺史言大廈之顛非一木所能支邢州人也義武節度使李殷安國留後方太皆降於契丹契丹主以孫方簡為義武節度使麻答為安國節度使宋白曰麻答本名解里阿保機之從子也其父曰撒剌歸梁死於汴契丹翰林承旨吏部尚書張礪言於契丹主曰今大遼已得天下高祖天福二年契丹改國號大遼事見二百八十一卷不宜用北人及左右近習苟政令乖失則人心不服雖得之猶將失之契丹主不從使契丹主用張礪言事未可知也引兵自邢相而南契丹之兵依山南下以臨晉相息亮翻從才用翻或問杜威不降契丹晉可保乎曰設使杜威藉將士之力擊退契丹契丹主歸北完聚必復南來晉不能支也使其間有英雄之才奮然出力擊破契丹使之不敢南向則負震主之威挾不賞之功將士又將扶立以成篡事石氏必不能高枕大梁劉知遠亦不可得而狙伺其旁也遣張彥澤將二千騎先取大梁且撫安吏民以通事傅住兒為都監監古銜翻杜威之降也皇甫遇初不預謀契丹主欲遣遇先將兵入大梁遇辭退謂所親曰吾位為將相敗不能死忍復圖其主乎復扶又翻下同至平棘平棘漢古縣唐帶趙州九域志曰平棘故城春秋棘蒲邑十三州志云戰國時改為平棘吾不食纍日矣何面目復南行遂扼吭而死從才用翻吭古郎翻張彥澤倍道疾驅夜渡白馬津張彥澤以澶孟有戍兵故從白馬津渡壬申帝始聞杜威等降是夕又聞彥澤至滑州召李嵩馮玉李彥韜入禁中計事欲詔劉知遠發兵入援太原距洛陽一千二百里洛陽至大梁又三百八十里就使劉知遠聞命投袂而起亦無及矣癸酉未明彥澤自封丘門斬關而入李彥韜帥禁兵五百赴之不能遏帥讀曰率彥澤頓兵明德門外五代會要曰明德門大梁皇城南門薛史天福三年十月改大寧宮門為明德門帝於宮中起火自攜劍驅後宮十餘人將赴火為親軍將薛超所持俄而彥澤自寬仁門傳契丹主與太后書慰撫之五代會要曰大梁皇城之東門為寬仁門帝乃命滅火悉開宮城門帝坐苑中與后相聚而泣召翰林學士范質草降表自稱孫男臣重貴禍至神惑運盡天亡今與太后及妻馮氏舉族於郊野面縛待罪次遣男鎮寧節度使延煦威信節度使延寶奉國寶一金印三出迎國寶即高祖天福三年所制受命寶也煦吁句翻新婦李氏妾臣妾之辱惟晉宋為然嗚呼痛哉上時掌翻傅住兒入宣契丹主命帝脫黃袍服素衫再拜受宣左右皆掩泣帝使召張彥澤欲與計事彥澤曰臣無面目見陛下帝復召之復扶又翻彥澤微笑不應或勸桑維翰逃去維翰曰吾大臣逃將安之坐而俟命彥澤以帝命召維翰維翰至天街宮城正南門外之都街謂之天街經途也駐馬語未畢有軍吏於馬前揖維翰赴侍衛司揖赴侍衛司示將囚繫之也一曰時張彥澤處侍衛司署舍顧謂嵩曰侍中當國李嵩官侍中反令維翰死之何也嵩有愧色彥澤踞坐見維翰維翰責之曰去年拔公於罪人之中復領大鎮授以兵權謂高祖時朝野皆請誅張彥澤自涇州罷歸宿衛去年桑維翰拔使同禦契丹復領彰國節度使帥兵戍常山彥澤無以應遣兵守之宣徽使孟承誨素以佞巧有寵於帝至是帝召承誨欲與之謀承誨伏匿不至張彥澤捕而殺之彥澤縱兵大掠貧民乘之亦爭入富室殺人取其貨二日方止都城為之一空為于偽翻下為主同彥澤所居山章十二行本山上有寶貨二字乙十一行本同孔本同退齋校同積自謂有功於契丹張彥澤自以疾驅入汴為功出入騎從常數百人從才用翻其旗幟皆題赤心為主見者笑之軍士擒罪人至前彥澤不問所犯但瞋目豎三指即驅出斷其腰領瞋昌真翻豎而主翻三指中指也示以中指言中斷之即腰斬也此蓋五代軍中虐帥相仍為此以示其下罪之輕重決於一指屈伸之間及漢史弘肇掌兵有抵罪者弘肇以三指示吏即腰斬之正此類也彥澤素與閣門使高勳不協乘醉至其家殺其叔父及弟尸諸門首士民不寒而栗中書舍人李濤謂人曰吾與其逃於溝瀆而不免不若往見之乃投刺謁彥澤曰上書請殺太尉人李濤謹來請死李濤請殺張彥澤事見二百八十三卷高祖天福七年謂濤曰舍人今日懼乎濤曰濤今日之懼亦猶足下昔年之懼也嚮使高祖用濤言事安至此彥澤大笑命酒飲之飲於禁翻濤引滿而去旁若無人李濤者回之族曾孫明辨有膽氣固自有種甲戌張彥澤遷帝於開封府頃刻不得留宮中慟哭帝與太后皇后乘肩輿宮人宦者十餘人步從從才用翻見者流涕亡國之恥言之者為之痛心矧見之者乎此程正叔所謂真知者也天乎人乎彥澤使人諷之曰契丹主至此物不可匿也帝悉歸之亦分以遺彥澤遺唯季翻彥澤擇取其奇貨而封其餘以待契丹彥澤遣控鶴指揮使李筠以兵守帝內外不通帝姑烏氏公主賂守門者入與帝訣章十二行本訣下有相持而泣四字乙十一行本同孔本同歸第自經氏音支按薛史烏氏公主高祖第十一妹也帝與太后所上契丹主表章上時掌翻下同皆先示彥澤然後敢發帝使取內庫帛數段主者不與曰此非帝物也又求酒於李嵩嵩亦辭以他故不進又欲見李彥韜彥韜亦辭不往帝惆悵久之當是時晉朝之臣已視出帝為路人雖惆悵亦何及矣惆丑鳩翻馮玉佞張彥澤求自送傳國寶冀契丹復任用亡國之臣其識正如此耳復扶又翻楚國夫人丁氏延煦之母也有美色彥澤使人取之太后遲回未與彥澤詬詈立載之去詬苦候翻又許候翻詈力智翻是夕彥澤殺桑維翰考異曰薛史帝思維翰在相時纍貢謀畫請與虜和盧戎主到京則顯彰己過欲殺維翰以滅口因令張彥澤殺之按是時彥澤豈肯復從少帝之命今不取白契丹主云其自經契丹主曰吾無意殺維翰何為如是命厚撫其家高行周符彥卿皆詣契丹牙帳降二人自澶州來降詰之陽城之戰見上卷上年敗補賣翻詰去吉翻臣當時惟知為晉主竭力今日死生惟命契丹主笑而釋之符彥卿言直契丹主無以罪也為于偽翻己卯延煦延寶自牙帳還還從宣翻又如字契丹主賜帝手詔且遣解里謂帝曰孫勿憂必使汝有噉飯之所噉徒濫翻帝心稍安上表謝恩契丹以所獻傳國寶追琢非工又不與前史相應追都回翻其文不與前史相應也疑其非真以詔書詰帝使獻真者李心傳曰秦璽者李斯之蟲魚篆也其圍四寸按玉璽圖以此璽為趙璧所刻璧本卞和所獻之璞藺相如所奪者是也余嘗以禮制考之璧五寸而有好則不得復刻為璽此説謬矣秦璽至漢謂之傳國璽自是迄于漢帝所寶用者秦璽也子嬰所封元后所投王憲所得赤眉所上皆是物也董卓之亂失之吳書謂孫堅得之洛陽甄官井中復為袁術所奪徐璆得而上之殆不然也若然則魏氏何不寶用而自刻璽乎厥後歷世皆用其名永嘉之亂沒于劉石永和之世復歸江左者晉璽也魏氏有國刻傳國璽如秦之文但秦璽讀自右魏璽讀自左耳晉有天下又自刻璽其文曰受命于天皇帝壽昌本書輿服志乃以為漢所傳秦璽實甚誤矣此璽更劉聰石勒逮石祗死其臣蔣幹求援於謝尚乃以璽送江南王彪之辨之亦不云秦璽也太元之末得自西燕更涉六朝至于隋代者慕容燕璽也晉孝武太元十九年西燕主永求救於郤恢併獻玉璽一紐方闊六寸高四寸六分文如秦璽自是歷宋齊梁皆寶之侯景既死北齊辛術得之廣陵獻之高氏後歷周隋皆誤指為秦璽後平江南知其非是乃更謂之神璽焉劉裕北伐得之關中歷晉暨陳復為隋有者姚秦璽也晉義熙十三年劉裕入關得傳國璽上之大四寸文與秦同然隱起而不深刻隋滅陳得此指為真璽遂以宇文所傳神璽為非是識者又謂古璽深刻以印泥後人隱起以印紙則隱起者非秦璽也姚氏取其文作之耳開運之亂沒于耶律女真獲之以為大寶者石晉璽也唐太宗貞觀十六年刻受命璽文曰皇帝景命有德者昌後歸朱全忠及從珂自焚璽亦隨失德光入汴重貴以璽上之云先帝所刻蓋指敬瑭也蓋在唐時皆誤以為秦璽而秦璽之亡則久矣今按石祗死當作冉閔死李心傳之説與唐六典異今並存之以俟知者及周又製二寶有司所奏其説亦祖六典詳注于後詰其吉翻頃王從珂自焚事見二百八十卷高祖天福元年必與之俱燼此寶先帝所為事見二百八十一卷天福三年臣今日焉敢匿寶乃止焉於虔翻帝聞契丹主將渡河欲與太后於前途奉迎張彥澤先奏之契丹主不許有司又欲使帝銜璧牽羊大臣輿櫬迎於郊外先具儀注白契丹主契丹主曰吾遣奇兵直取大梁非受降也亦不許降戶江翻又詔晉文武㣥官一切如故朝廷制度並用漢禮北方謂中國為漢契丹主報曰吾方擐甲總戎擐音宦太常儀衛未暇施也皆卻之用太常儀衛則當改胡服而華服故言未暇先是契丹主至相州即遣兵趣河陽捕景延廣延廣蒼猝無所逃伏不料其遽見捕也先昔薦翻相息亮翻趣七喻翻九域志封丘縣在大梁北六十里致兩主失歡皆汝所為也十萬橫磨劍安在召喬榮使相辨證事凡十條延廣初不服榮以紙所記語示之景延廣記其所言以授喬榮見二百八十三卷天福八年每服一事輒授一籌至八籌延廣但以面伏地請死乃鎖之丙戌晦百官宿於封禪寺迎契丹主也封禪寺在大梁城東章錫琛標點聶崇岐覆校
