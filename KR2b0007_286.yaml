body:
  text: 資治通鑑卷第二百八十六端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千六百戶食實封一千戶臣司馬光奉敕編集後學天台音註後漢紀一高祖本沙陀部人居于太原及得中國自以姓劉遂言為東漢顯宗第八子淮陽王昞之後國號曰漢通鑑以前已有漢紀此以後漢紀書之高祖睿文聖武昭肅孝皇帝上延州錄事參軍高允權天福十二年丁未九四七漢復以天福紀年詳見後延州錄事參軍高允權春正月丁亥朔百官遙辭晉主於城北大梁城之北迎契丹主伏路側請罪契丹主貂帽貂裘衷甲駐馬高阜命起改服撫慰之按歐史時晉百官迎契丹主于赤岡按薛史安叔千沙陀三部落之種也故習胡語汝安沒字邪安叔千狀貌堂堂而不通文字所為鄙陋人謂之沒字碑已累表輸誠我不忘也叔千拜謝呼躍而退呼躍蓋夷禮猶華人舞蹈也晉主與太后已下迎於封丘門外契丹主辭不見考異曰漢高祖實錄少帝帥族候於野邪律氏疏之帝指陳前事乃大臣同謀皆歷歷能對無撓屈色邪律氏亦假以顏色陷蕃記薛史帝紀五代通錄云戎主不與帝相見少帝實錄帝舉族待罪於野虜長面撫之遣泊封禪寺今從陷蕃記契丹主入門民皆驚呼而走呼火故翻契丹主登城樓遣通事諭之曰我亦人也汝曹勿懼會當使汝曹蘇息氣絕而復息曰蘇氣一出入為息一曰更息曰蘇漢兵引我至此耳歸罪於杜威等下馬拜而後入宮以其樞密副使劉密權開封尹事先易置京尹以彈壓華人契丹主復出屯於赤岡懼人心未一未敢居城中延州錄事參軍高允權戊子執鄭州防禦使楊承勳至大梁責以殺父叛契丹楊承勳囚父以降晉事見二百八十四卷齊王開運元年未幾臠力兗翻幾居豈翻以其弟右羽林將軍承信為平盧節度使悉以其父舊兵授之既授之以其父舊鎮復授之以其父舊兵延州錄事參軍高允權高勳訴張彥澤殺其家人於契丹主張彥澤殺高勳家見上卷上年勳為杜威奉降表者也先已為契丹主所親故得訴其事幷傅住兒鎖之彥澤剽掠事亦見上卷上年傅住兒監彥澤軍者也剽匹妙翻問應死否皆言應死百姓亦投牒爭疏彥澤罪己丑斬彥澤住兒於北市仍命高勳監刑彥澤前所殺士大夫子孫皆絰杖號哭隨而詬詈以杖扑之絰徒結翻有親喪者絰杖號戶刀翻詬苦候翻又許候翻詈力智翻扑普卜翻擊也勳命斷腕出鎖斷音短腕烏貫翻剖其心以祭死者市人爭破其腦取髓髓悉委翻臠其肉而食之延州錄事參軍高允權契丹送景延廣歸其國庚寅宿陳橋九域志開封府浚儀縣有陳橋鎮伺守者稍怠扼吭而死伺相吏翻吭居郎翻人頸曰吭延州錄事參軍高允權辛卯契丹以晉主為負義侯置於黃龍府黃龍府即慕容氏和龍城也歐史曰自幽州行十餘日過平州出榆關行沙磧中七八日至錦州又行五六日過海北州又行十餘日渡遼水至勃海國鐵州又行七八日過南海府遂至黃龍府按契丹後改黃龍府為隆州北至混同江一百三十里又按慕容氏之和龍城若據晉書及酈道元水經註當在漢遼西郡界今晉主陷蕃渡遼水而後至黃龍府又其地近混同江疑非慕容氏之和龍城聞重貴不用母命以至於此可求自便勿與俱行太后曰重貴事妾甚謹所失者違先君之志絕兩國之歡耳今幸蒙大恩全生保家母不隨子欲何所歸癸巳契丹遷晉主及其家人於封禪寺遣大同節度使兼侍中此契丹所授官宋白曰崔廷勳本河內人少陷虜數所角翻晉主每聞使至舉家憂恐恐見殺也外無供億毛居正曰供儗儗有儲偫之意供億猶供儗也億度也料度其所須之物隨多少而供之以待其乏也太后使人謂寺僧曰吾嘗於此飯僧數萬飯扶晚翻僧辭以虜意難測不敢獻食噫孰知緇黃變色其徒所為有甚於不敢獻食者耶有國有家者崇奉釋氏以求福田利益可以監矣乃稍得食是日契丹主自赤岡引兵入宮入晉宮皆以契丹守衞晝夜不釋兵仗懼有變也以竿懸羊皮於庭為厭勝磔陟格翻厭於葉翻契丹主謂章十二行本謂下有晉字乙十一行本同孔本同退齋校同㣥臣曰自今不脩甲兵不市戰馬輕賦省役天下太平矣談何容易斯言甫脫口而打草穀繼之矣天下果太平乎降開封府為汴州尹為防禦使乙未契丹主改服中國衣冠百官起居皆如舊制史言契丹主猶知用夏變夷趙延壽張礪共薦李崧之才會威勝節度使馮道自鄧州入朝契丹主素聞二人名皆禮重之二人歷唐晉位極人臣國亡不能死視其君如路人何足重哉以崧為太子太師充樞密使道守太傅於樞密院祗候以備顧問契丹主分遣使者以詔書賜晉之藩鎮晉之藩鎮爭上表稱臣被召者無不奔馳而至被皮義翻惟彰義節度使史匡威據涇州不受命匡威建瑭之子也史建瑭事晉王克用以及莊宗皆有戰功以秦階成三州降蜀史匡威不降契丹以其地遠契丹兵威不能至也何重建則以其鎮與蜀接境遂棄遼而附蜀耳初杜重威既以晉軍降契丹杜重威初避晉主重貴名去重單名威及晉既亡國重威即復舊名其忘恩背主此特末節耳貯丁呂翻恆戶登翻驅馬數萬歸其國遣重威將其衆從己而南將即亮翻及河契丹主以晉兵之衆恐其為變欲悉以胡騎擁而納之河流或諫曰晉兵在他所者尚多彼聞降者盡死必皆拒命章十二行本命下有為患二字乙十一行本同不若且撫之徐思其策契丹主乃使重威以其衆屯陳橋陳橋在陳橋門外有陳橋驛官無所給士卒凍餒咸怨重威相聚而泣重威每出道旁人皆罵之契丹主猶欲誅晉兵趙延壽言於契丹主曰皇帝親冒矢石以取晉國欲自有之乎將為他人取之乎冒莫北翻為于偽翻下同趙延壽志在帝中國以此言覘契丹主之意不特為晉兵發也契丹主變色曰朕舉國南征五年不解甲天福八年契丹始攻晉至是五年豈為他人乎趙延壽聞契丹主此言可以絕望矣晉國南有唐西有蜀常為仇敵皇帝亦知之乎曰知之延壽曰晉國東自沂密西及秦鳳延袤數千里袤音茂邊於吳蜀常以兵戍之南方暑濕上國之人不能居也時偏方割據者謂中原為上國晉奉契丹又稱契丹為上國以晉國如此之大無兵守之吳蜀必相與乘虛入寇如此豈非為他人取之乎契丹主曰我不知也然則柰何延壽曰陳橋降卒可分以戍南邊則吳蜀不能為患矣契丹主曰吾昔在上黨失於斷割悉以唐兵授晉事見二百八十卷晉高祖天福元年斷丁亂翻北向與吾戰辛勤累年僅能勝之今幸入吾手不因此時悉除之豈可復留以為後患乎復扶又翻延壽曰曏留晉兵於河南不質其妻子質音致故有此憂今若悉徙其家於恆定雲朔之間每歲分番使戍南邊何憂其為變哉此上策也契丹主悅曰善惟大王所以處之契丹封趙延壽為燕王故稱之為大王處昌呂翻分遣還營延州錄事參軍高允權契丹主殺右金吾衞大將軍李彥紳宦者秦繼旻以其為唐潞王殺東丹王故也殺東丹王見二百八十卷晉高祖天福元年唐潞王之清泰三年也為于偽翻兀欲眇一目為人雄健好施兀欲始見於此為後得國張本施式豉翻延州錄事參軍高允權癸卯晉主與李太后安太馮后及弟睿子延煦延寶俱北遷後宮左右從者百餘人從才用翻契丹遣三百騎援送之援送者送其行以為防援晉主在塗供饋不繼或時與太后俱絕食舊臣無敢進謁者獨磁州刺史李穀迎謁於路相對泣下穀曰臣無狀負陛下因傾貲以獻天下之士苟有所負者其所為必有異於人磁牆之翻晉主至中度橋見杜重威寨歎曰天乎我家何負為此賊所破慟哭而去於晉之時通國上下皆知杜重威之不可用乃違衆用之以致亡國詩云啜其泣矣何嗟及矣今至於慟庸有及乎延州錄事參軍高允權癸丑蜀主以左千牛衞上將軍李繼勳為秦州宣慰使蜀以何重建降遣使宣慰之延州錄事參軍高允權契丹主以前燕京留守劉晞為西京留守薛史曰劉晞者涿州人陷虜歷官至平章事兼侍中考異曰實錄作禧或云名晞今從陷蕃記兀章十二行本兀上有族人郎五為鎮寧節度使十字乙十一行本同孔本同張校同退齋校同熊校同欲姊壻潘聿撚為橫海節度使聿以律翻撚乃殄翻考異曰周太祖實錄聿撚作聿湼今從陷蕃記趙延壽之子匡贊為護國節度使為趙匡贊後以河中歸漢張本史佺為彰義節度使客省副使劉晏僧為忠武節度使前護國節度使侯益為鳳翔節度使權知鳳翔府事侯益後亦以鳳翔歸漢晞涿州人也既而何重建附蜀秦州附蜀張彥超無所詣史匡威據涇州以拒史佺沮在呂翻延州錄事參軍高允權晉昌節度使趙在禮入朝自長安入朝于大梁節度副使建人李肅討誅之軍府以安延州錄事參軍高允權晉主之絕契丹也事見二百八十三卷晉高祖天福七年頗豫其謀契丹主入汴繼勳入朝契丹主責之時馮道在殿上繼勳急指道曰馮道為首相與景延廣實為此謀臣位卑何敢發言契丹主曰此叟非多事者勿妄引之馮道以依阿免禍有國家者焉用彼相哉然歷事七姓皆以德望待之亦持身謹靜有以動其敬心耳將送黃龍府趙在禮至洛陽舊唐書地理志自長安東至洛陽八百五十里契丹主嘗言莊宗之亂由我所致謂皇甫暉之亂也事見二百七十四卷唐明宗天成元年莊宗之同光四年也契丹遣契丹將述軋書契丹將以別漢將與勃海將拽羊列翻剌盧達翻勃海將高謨翰戍洛陽在禮入謁拜於庭下拽剌等皆踞坐受之乙卯在禮至鄭州九域志自洛陽東至鄭州二百六十里大驚夜自經於馬櫪間櫪音歷馬棧也契丹主聞在禮死乃釋繼勳繼勳憂憤而卒劉晞在契丹嘗為樞密使同平章事至洛陽詬奚王曰詬苦候翻又許候翻趙在禮漢家大臣爾北方一酋長耳酋慈秋翻長知兩翻安得慢之如此立於庭下以挫之由是洛人稍安契丹主廣受四方貢獻大縱酒作樂每謂晉臣曰中國事我皆知之吾國事汝曹不知也契丹主自謂周防之密以夸晉臣然東丹之來已胎兀欲奪國之禍雖甚愚者知之而契丹主不知也善覘國者不觀一時之強弱而觀其治亂之大致趙延壽請給上國兵廩食契丹主曰吾國無此法乃縱胡騎四出以牧馬為名分番剽掠剽妙匹翻謂之打草穀丁壯斃於鋒刃老弱委於溝壑自東西兩畿大梁之屬縣為東畿洛陽之屬縣為西畿此唐制也唐制兩京除赤縣外餘屬縣為畿縣數百里間財畜殆盡鄭滑曹濮皆大梁之旁郡以及言之明上文所謂東西兩畿為畿縣濮博木翻契丹主謂判三司劉昫曰契丹兵三十萬既平晉國應有優賜速宜營辦時府庫空竭昫不知所出請括借都城士民錢帛都城大梁都城又分遣使者數十人詣諸州括借皆迫以嚴誅人不聊生其實無所頒給皆蓄之內庫欲輦歸其國於是內外怨憤始患苦契丹皆思逐之矣為契丹北歸張本延州錄事參軍高允權初晉主與河東節度使中書令北平王劉知遠相猜忌雖以為北面行營都統徒尊以虛名而諸軍進止實不得預聞事見二百八十四卷晉齊王開運元年天福八年齊王與契丹搆隙之初劉知遠已奏募兵矣事見二百八十三卷諸軍散卒歸之者數千人陽城之戰見二百八十四卷晉齊王開運二年按陽城之戰晉師大捷無緣有散卒歸河東此必杜重威降契丹時也事亦見開運二年畜吁玉翻冠古玩翻步騎至五萬人晉主與契丹結怨知遠知其必危而未嘗論諫契丹屢深入知遠初無邀遮入援之志既不據險要以邀遮契丹之兵又不遣兵入援也知遠分兵守四境以防侵軼軼徒結翻遣客將安陽王峻舊唐書地理志相州漢魏郡也治安陽縣安陽漢侯國故城在湯陰東曹魏時廢安陽併入鄴後周移鄴置縣於安陽故城仍為鄴縣隋又改為安陽縣州所治也若漢魏郡城則在縣之西北七里將即亮翻賀入汴二以太原夷夏雜居戍兵所聚未敢離鎮夏戶雅翻離力智翻三以應有貢物值契丹將劉九一軍自土門西入屯於南川南川謂晉陽城南之地俟召還此軍道路始通可以入貢契丹主賜詔褒美及進畫親加兒字於知遠姓名之上仍賜以木柺胡法優禮大臣則賜之如漢賜几杖之比惟偉王以叔父之尊得之柺乖買翻老人拄杖也歐史曰王峻持柺歸虜人望之皆避道知遠又遣北都副留守太原白文珂入獻奇繒名馬繒慈陵翻契丹主知知遠觀望不至及文珂還還從宣翻又如字使謂知遠曰汝不事南朝又不事北朝意欲何所俟邪朝直遙翻蕃漢孔目官郭威言於知遠曰虜恨我深矣王峻言契丹貪殘失人心必不能久有中國或勸知遠舉兵進取知遠曰用兵有緩有急當隨時制宜今契丹新降晉兵十萬虎據京邑未有他變豈可輕動哉且觀其所利止於貨財貨財既足必將北去況冰雪已消勢難久留宜待其去然後取之可以萬全劉知遠料之審矣所以舉兵南向契丹不能與之爭昭義節度使張從恩以地迫懷洛昭義治潞州自潞州至澤州又至懷州渡河則洛州河南府舊唐書地理志潞州至洛州四百七十里遣使謀於知遠知遠曰我以一隅之地安敢抗天下之大君宜先行我當繼往從恩以為然判官高防諫曰公晉室懿親按五代會要晉少帝前張氏天福八年進冊皇后張從恩蓋后族也從恩不從左驍衞大將軍王守恩與從恩姻家時在上黨從恩以副使趙行遷知留後副使者節度副使也與高防佐之章十二行本之下有遂行二字乙十一行本同守恩建立之子也王建立事唐明宗見親任及事晉高祖延州錄事參軍高允權荊南節度使高從誨遣使入貢於契丹契丹遣使以馬賜之從誨亦遣使詣河東勸進荊南高氏父子事大以保其國為謀大率如此延州錄事參軍高允權唐主立齊王景遂為皇太弟徙燕王景達為齊王領諸道兵馬元帥徙南昌王弘冀為燕王為之副燕於堅翻景遂嘗與宮僚燕集贊善大夫元城張易有所規諫張易北人而仕江南弗之顧易怒曰殿下重寶而輕士取玉杯抵地碎之衆皆失色景遂斂容謝之待易益厚景遂之遷善敬士亦難能也景達性剛直唐主與宗室近臣飲馮延己延魯魏岑陳覺輩極傾諂之態或乘酒喧笑景達屢訶責之復極言諫唐主以不宜親近佞臣屢力主翻復扶又翻近巨靳翻延己以二弟立非己意欲以虛言德之嘗宴東宮陽醉撫景達背曰爾不可忘我景達大怒拂衣入禁中白唐主請斬之唐主諭解乃止按是時陳覺馮延魯攻福州史言其侍飲極傾諂之態概言其常時非必拘此時也㣥小交構禍福所繫殿下力未能去數面折之去羌呂翻數所角翻折之舌翻使彼懼而為備何所不至自是每遊宴景達多辭疾不預唐主遣使賀契丹滅晉且請詣長安脩復章十二行本復下有唐室二字乙十一行本同諸陵唐末喪亂諸陵多遭發掘南唐自謂纂唐之緒故請脩復也而遣使報之晉密州刺史皇甫暉棣州刺史王建皆避契丹帥衆奔唐帥讀曰率淮北賊帥多請命於唐帥所類翻唐虞部員外郎韓章十二行本韓上有史館脩撰四字乙十一行本同熙載上疏以為陛下恢復祖業今也其時若虜主北歸中原有主則未易圖也易以豉翻韓熙載以定中原自期僅見此疏耳自古以來多大言少成事者何可勝數時方連兵福州未暇北顧唐人皆以為恨唐主亦悔之使唐無福州之役舉兵北向亦喪師而已矣延州錄事參軍高允權契丹主召晉百官悉集於庭問曰吾國廣大方數萬里有君長二十七人長知兩翻今中國之俗異於吾國吾欲擇一人君之如何皆曰天無二日孟子引孔子之言皆願推戴皇帝如是者再契丹主乃曰汝曹既欲君我今茲所行何事為先對曰王者初有天下應大赦二月丁巳朔契丹主服通天冠絳紗袍登正殿設樂懸儀衞於庭百官朝賀華人皆法服胡人仍胡服立於文武班中間文官班於東武官班於西胡人立於中間大赦仍云自今節度使刺史毋得置牙兵市戰馬其心固虞諸鎮有與之作敵者趙延壽以契丹主負約心怏怏趙延壽之求為帝不得不止此其所以終為兀欲所鎖也怏於兩翻漢天子所不敢望乞為皇太子崧不得已為言之為言于偽翻下令為同契丹主曰我於燕王雖割吾肉有用於燕王吾無所愛然吾聞皇太子當以天子兒為之豈燕王所可為也因令為燕王遷官時契丹以恆州為中京恆戶登翻翰林承旨張礪奏擬燕王中京留守大丞相錄尚書事都督中外諸軍事樞密使如故契丹主取筆塗去錄尚書事都督中外諸軍事而行之去羌呂翻孰謂契丹主起於塞北而不知中國之事體哉延州錄事參軍高允權壬戌蜀李繼勳與興州刺史劉景攻固鎮拔之章十二行本之下有乙丑二字乙十一行本同孔本同何重建請出蜀兵與階成兵共扼散關以取鳳州扼散關則北兵不能入鳳州可坐取也丙寅蜀主發山南兵三千七百赴之山南兵興元兵也延州錄事參軍高允權劉知遠聞何重建降蜀歎曰戎狄憑陵中原無主令藩鎮外附吾為方伯良可愧也古者除王畿之外八州八伯所謂三十國而為連連有帥二百一十國以為州州有伯者也周分天下以為二伯自陝以西召伯主之自陝以東周公主之及其衰也齊桓晉文糾合諸侯以尊王室亦以方伯之任自居晉人所謂我為伯者也石晉以劉知遠為北面都統故亦自謂為方伯於是將佐勸知遠稱尊號以號令四方觀諸侯去就諸侯謂當時諸藩鎮聞晉主北遷聲言欲出兵井陘迎歸晉陽陘音刑丁卯命武節都指揮使滎澤史弘肇武節軍劉知遠所置見二百八十三卷晉齊王天福八年隋置滎澤縣唐屬鄭州九域志滎澤縣在鄭州西北四十五里告以出軍之期軍士皆曰今契丹陷京城執天子天下無主主天下者非我王而誰劉知遠封北平王故稱之然後出師爭呼萬歲不已知遠曰虜勢尚強吾軍威未振當且建功業士卒何知命左右遏止之己巳行軍司馬潞城張彥威等三上牋勸進潞古邑也隋置潞城縣唐屬潞州九域志潞城縣在潞州東北四十里郭威與都押牙冠氏楊邠入說知遠曰劉昫曰冠氏春秋邑名隋分館陶東界置冠氏縣唐屬魏州九域志在州東北六十里說音稅今遠近之心不謀而同此天意也王不乘此際取之謙讓不居恐人心且移移則反受其咎矣知遠從之延州錄事參軍高允權契丹以其將劉愿為保義節度副使陝人苦其暴虐陝失冉翻奉國都頭王晏與指揮使趙暉都頭侯章謀曰今胡虜亂華乃吾屬奮發之秋河東劉公威德遠著劉知遠河東帥故稱之舉陝城歸之為天下唱取富貴如返掌耳返當作反晏與壯士數人夜踰牙城入府出庫兵以給衆庚午旦斬愿首懸諸府門又殺契丹監軍奉暉為留後晏徐州暉澶州章太原人也澶時連翻延州錄事參軍高允權辛未劉知遠即皇帝位自言未忍改晉又惡開運之名乃更稱天福十二年惡烏路翻更工衡翻歐陽修曰人君即位稱元年常事爾古不以為重也孔子未脩春秋其前固已如此雖暴君昏主妄庸之史其紀事先後遠近莫不以歲月一二數之乃理之自然也其謂一為元未嘗有法焉古人之語爾古謂歲之一月亦不云一而曰正月國語言六呂曰元間大呂周易列六爻曰初九大抵古人言數多不云一不獨謂年為元也及後世曲學之士始謂孔子書元年為春秋大法遂以改元為重事自漢以後又名年以建元而正偽紛雜稱號遂多不勝其紀也五代亂世也其事無法而不合於理者多矣至其年號乖錯以惑後世則不可以不明梁太祖以乾化二年遇弒明年末帝誅友珪黜其鳳曆之號稱乾化三年尚為有說至漢高祖建國黜晉出帝開運四年復稱天福十二年者何哉蓋以愛憎之私耳方出帝時漢高祖居太原常憤憤下視晉晉亦陽優禮之幸而未見其隙及契丹滅晉漢未嘗有赴難之意出帝已北遷方陽以兵聲言追之至土門而還及其即位改元而黜開運之號則其用心可知矣蓋其於出帝無復君臣之義而幸禍以為利者其素志也可勝嘆哉壬申詔諸道為契丹括率錢帛者皆罷之括率錢帛見上正月令詣行在被皮義翻自餘契丹所在誅之延州錄事參軍高允權何重建遣宮苑使崔延琛將兵攻鳳州不克退保固鎮何重建為蜀圖取鳳州事始見上延州錄事參軍高允權甲戌帝自將東迎晉主及太后至壽陽晉置壽陽縣後魏改曰受陽隋開皇十年改幷州南受陽為文水分州東故壽陽置壽陽縣唐屬太原府乃留兵戍承天軍而還還從宣翻又如字承天軍在井陘縣娘子關西南太原府廣陽縣界宋朝太平興國四年改廣陽為平定縣置平定軍縣有承天軍寨在太原府南三百五十里晉主既出塞契丹無復供給從官宮女皆自采木實草葉而食之至錦州契丹令晉主及后拜契丹主阿保機墓從才用翻契丹置錦州近木葉山金人疆域圖錦州南至燕京一千四百一十五里陳元靚曰大元於錦州置臨海節度領永樂安昌興城神水四縣屬大定府路晉主不勝屈辱泣曰薛超誤我勝音升謂薛超持之不令赴火也事見上卷開運三年馮后陰令左右求毒藥欲與晉主俱自殺不果延州錄事參軍高允權契丹主聞帝即位以通事耿崇美為昭義節度使高唐英為彰德節度使崔廷勳為河陽節度使以控扼要害昭義軍潞州彰德軍相州河陽軍孟州帝自太原西南出兵潞州兵衝也自潞州東下壼關則至相州南下太行則至孟州故皆命將控扼初晉置鄉兵號天威軍見二百八十四卷晉出帝開運元年村民不閑軍旅竟不可用悉罷之但令七戶輸錢十千其鎧仗悉輸官而無賴子弟不復肯復農業不復之復扶又翻再也肯復之復讀如字反也山林之盜自是而繁及契丹入汴縱胡騎打草穀事見上正月不通政事華人之狡獪者多往依其麾下教之妄作威福掊斂貨財民不堪命狡古巧翻獪古外翻掊蒲侯翻斂力贍翻於是所在相聚為盜多者數萬人少者不減千百攻陷州縣殺掠吏民滏陽賊帥梁暉有衆數百送款晉陽求效用帝許之磁州刺史李穀密通表於帝令暉襲相州舊唐書地理志滏陽漢武安縣地隋置滏陽縣唐屬磁州為州治所九域志滏陽南至相州六十里帥所類翻偵丑鄭翻相州積兵器無守備丁丑夜遣壯士踰城入啟關納其衆殺契丹數百其守將突圍走暉據州自稱留後表言其狀表言於晉陽將即亮翻延州錄事參軍高允權戊寅帝還至晉陽自承天軍還晉陽還從宣翻又如字夫人李氏諫曰陛下因河東創大業未有以惠澤其民而先奪其生生之資殆非新天子所以救民之意也今宮中所有請悉出之以勞軍雖復不厚人無怨言勞力到翻帝曰善即罷率民傾內府蓄積以賜將士中外聞之大悅李氏晉陽人也婦人之智及此異乎唐莊宗之劉后矣鄙語有之福至心靈禍來神昧二人者各居一焉延州錄事參軍高允權吳越內都監程昭悅多聚賓客畜兵器畜讀曰蓄與術士遊吳越王弘佐欲誅之謂水丘昭券曰汝今夕帥甲士千人圍昭悅第帥讀曰率昭券曰昭悅家臣也有罪當顯戮不宜夜興兵弘佐曰善命內牙指揮使諸溫諸姓溫名漢書地理志琅邪郡有諸縣蓋以邑為氏也執送東府伺相吏翻己卯斬之釋錢仁俊之囚錢仁俊之囚見上卷開運二年延州錄事參軍高允權武節都指揮使史弘肇攻代州拔之斬王暉王暉降契丹見上卷上年延州錄事參軍高允權建雄留後劉在明朝于契丹以節度副使駱從朗知州事帝遣使者張晏洪等如晉州諭以己即帝位從朗皆囚之大將藥可儔殺從朗推晏洪權留後庚辰遣使以聞契丹主遣右諫議大夫趙熙使晉州括率錢帛徵督甚急從朗既死民相帥共殺熙帥讀曰率下同契丹主賜趙暉詔即以為保義留後暉斬契丹使者焚其詔遣支使河間趙矩奉表詣晉陽契丹遣其將高謨翰攻暉不克謨一本作模甚喜曰子挈咽喉之地以歸我天下不足定也陝州據河潼之要自河東入洛汴此其咽喉也咽因肩翻帝善之辛巳以暉為保義節度使侯章為鎮國節度使保義軍馬步都指揮使王晏為絳州防禦使保義軍馬步副指揮使按王晏先已為保義軍馬步都指揮使既賞其功不應為副指揮使恐誤延州錄事參軍高允權高防與王守恩謀遣指揮使李萬超白晝帥衆大譟入府斬趙行遷推守恩權知昭義留後守恩殺契丹使者舉鎮來降帝既得陝又得上黨足以示契丹形制之勢重以澶州梗其南北之路虜氣奪而心搖矣延州錄事參軍高允權鎮寧節度使邪律郎五性殘虐契丹主阿保機以其所居橫帳地名為姓曰世里世里譯者謂之邪律史因之賊帥王瓊帥其徒千餘人夜襲據南城北度浮航浮航即德勝浮梁賊帥所類翻瓊帥讀曰率航戶剛翻圍郎五於牙城澶州牙城蓋在北城甚懼始遣天平節度使李守貞天雄節度使杜重威還鎮李守貞杜重威既降契丹從契丹主南入汴遂為所留遣兵救澶州瓊退屯近郊去城三十里為近郊癸未帝厚賜超遣還還從宣翻又如字瓊兵敗為契丹所殺延州錄事參軍高允權蜀主加雄武節度使何重建同平章事延州錄事參軍高允權延州錄事參軍高允權萬金之子也彰武節度使周密闇音暗而貪將士作亂攻之密敗保東城衆以允權家世延帥高萬金兄弟自梁以來帥延州帥所類翻考異曰周太祖實錄允權為膚施令陷蕃記云前錄事參軍退居田里漢高祖實錄云允權為延川令周密以允權故將之子恐與邊人締結移為州主簿密後以闇而黨下惟誅掠是務允權乘其民怨時以言間之復遣親黨潛構諸部衆心遂搖廣本云允權為延川令密徙為錄事參軍今從之周太祖實錄又曰契丹犯闕以周密為延帥按晉少帝實錄開運三年八月辛未以右龍武統軍周密為彰武節度使非契丹所授今從漢高祖實錄薛史曰延州有東西二城其中限以深澗應州人也延州錄事參軍高允權丹州都指揮使高彥珣殺契丹所署刺史自領州事延州錄事參軍高允權契丹述律太后遣使以其國中酒饌脯果賜契丹主賀平晉國饌徂皖翻又雛戀翻契丹主與㣥臣宴於永福殿每舉酒立而飲之曰太后所賜不敢坐飲延州錄事參軍高允權唐王淑與郇公從益居洛陽趙延壽娶明宗女為夫人淑詣大梁會禮趙延壽妻唐明宗女燕國長公主也晉高祖天福元年契丹已遣使至洛陽取之入北矣今復從延壽至大梁故王淑詣之會禮吾嫂也契丹主以唐明宗年長於齒為兄故拜王淑為嫂劉遂凝以劉鄩舊恩因王淑以求節鉞遂凝為安遠節度使淑以從益幼辭不赴鎮復歸于洛延州錄事參軍高允權契丹主以張礪為右僕射兼門下侍郎同平章事左僕射和凝兼中書侍郎同平章事司空兼門下侍郎同平章事劉昫以目疾辭位罷為太保延州錄事參軍高允權東方㣥盜大起陷宋亳密三州契丹主謂左右曰我不知中國之人難制如此中國之人困於契丹之陵暴掊克咸不聊生起而為盜烏有難制者乎盍亦反其本矣澶州亂而遣李守貞杜重威歸鎮宋亳密三州陷而遣安審琦符彥卿歸鎮契丹主之北歸決矣彥卿至埇橋埇橋在宿州埇余隴翻賊帥所類翻恕帥讀曰率下同彥卿與數十騎至城下揚鞭欲招諭之仁恕控彥卿馬請從相公入城欲劫符彥卿為質以取徐州也自城中遣軍校陳守習縋而出呼於賊中校戶教翻縋馳偽翻呼火故翻曰相公已陷虎口聽相公助賊攻城城不可得也賊知不可劫乃相率羅拜於彥卿馬前乞赦其罪彥卿與之誓乃解去延州錄事參軍高允權三月丙戌朔契丹主服赭袍坐崇元殿百官行入閤禮歐陽修曰唐故事天子日御殿見㣥臣曰常參朔望薦食諸陵寢有思慕之心不能臨前殿則御便殿見㣥臣曰入閤宣政前殿也謂之衙衙有仗紫宸便殿也謂之閤其不御前殿而御紫宸也乃自正衙喚仗由閤門而入百官俟朝于衙者因隨而入見故謂之入閤然衙朝也其禮尊閤宴見也其事殺自乾符以後因亂禮缺天子不能日見㣥臣而見朔望故正衙常日廢仗而朔望入閤有仗其後習見遂以入閤為重至出御前殿猶謂之入閤五代之時㣥臣五日一入見中興殿便殿也此入閤之遺制而謂之起居朔望一出御文明殿前殿也反謂之入閤今按五代會要有入閤儀司天進時刻牌閤門進班齊牌皇帝自內著袍衫穿靴乘輦至常朝殿門駐輦受樞密使已下起居訖引駕至正朝殿皇帝坐定卷簾殿上添香喝控鶴官拜次雞叫次閤門勘契次閤門承旨喚仗次閤門使引金吾將軍南班拜訖分引至位對揖次細仗相次入次執文武班簿至位對揖次宰臣南班拜訖分引至位對揖次金吾將軍奏平安次文武百官入通事舍人揖殿靸靴入沙墀兩拜立定次引宰臣及兩省官金吾將軍合班立定閤門使喝拜搢笏舞蹈三拜奏聖躬萬福又引宰臣班首一人至近前又兩拜舞跪三拜引至位對揖通事舍人引宰臣於東西踏道下立次文武百官出次兩省官南班揖殿出次翰林學士南班揖殿出次執文武班簿南班揖殿出次金吾將軍南班揖殿出次細仗出次引宰臣香案前奏事訖宣徽使喝好去南班揖殿出次閤門使引待制官到位兩拜引近前奏事訖卻歸位罄折宣徽使宣所奏知又兩拜舞跪三拜舍人喝好去南班揖殿出次刑法官奏事准上次監奏御史南班揖殿出次閤門承旨放仗次閤門使奏衙內無事次喝控鶴官門外祗候次下簾皇帝上輦歸內又按歐史梁太祖乾化元年九月辛巳朔御文明殿入閤則入閤儀梁所定也視唐之正牙朝會其儀略而野而五代謂之行禮會要又詳載而為書則其儀為一時之上儀矣姑備錄之以志朝儀之變文明殿洛陽宮之正衙殿也崇元殿汴宮之正衙殿也薛史曰梁制每月初入閤望日延英聽政後唐之制朔望皆入閤延州錄事參軍高允權戊子帝遣使以詔書安集農民保聚山谷避契丹之患者此時務之所當急先者延州錄事參軍高允權辛卯高允權奉表來降帝諭允權聽周密詣行在密遂棄東城來奔延州錄事參軍高允權壬辰高彥詢章十二行本詢作珣乙十一行本同以丹州來降丹延亦歸於漢矣延州錄事參軍高允權蜀翰林承旨李昊謂王章十二行本王上有樞密使三字乙十一行本同退齋校同處回曰敵復據固鎮則興州道絕不復能救秦州矣復扶又翻請遣山南西道節度使孫漢韶將兵急攻鳳州癸巳蜀主命漢韶詣鳳州行營延州錄事參軍高允權契丹主復召晉百官復扶又翻諭之曰天時向熱吾難久留欲暫至上國省太后契丹自謂其國為上國中國之人亦以稱之契丹既畏暑又畏四方㣥起而攻之故急欲北歸果如劉知遠所料百官請迎太后契丹主曰太后族大如古柏根不可移也契丹主欲盡以晉之百官自隨或曰舉國北遷恐搖人心不如稍稍遷之乃詔有職事者從行餘留大梁復以汴州為宣武軍契丹之入大梁也降開封府為汴州防禦使今復盛唐之舊以為節鎮欲兼華夷而撫制之也翰述律太后之兄子其妹復為契丹主后翰始以蕭為姓自是契丹后族皆稱蕭氏延州錄事參軍高允權吳越復發水軍遣其將余安將之自海道救福州己亥至白蝦浦將即亮翻蝦當作鰕海岸泥淖須布竹簀乃可行唐之諸軍在城南者聚而射之簀不得施淖奴教翻簀測革翻射而亦翻馮延魯曰城所以不降者恃此救也今相持不戰徒老我師不若縱其登岸盡殺之則城不攻自降矣裨將孟堅曰浙兵至此章十二行本此下有已久二字乙十一行本同張校同不能進退吳越國本唐兩浙地故謂之浙兵若縱其登岸彼必致死於我其鋒不可當安能盡殺乎延魯不聽曰吾自擊之吳越兵既登岸大呼奮擊呼火故翻延魯不能禦棄衆而走孟堅戰死吳越兵乘勝而進城中兵亦出夾擊唐兵大破之唐城南諸軍皆遁吳越兵追之王崇文以牙兵三百拒之諸軍陳於崇文之後追者乃還陳讀曰陣還從宣翻或言浙兵欲棄福州拔李達之衆歸錢唐東南守將劉洪進等白王建封請縱其盡出而取其城唐兵攻福州劉洪進當東南面故書為東南守將泉福相為脣齒福州平則泉州為之次矣此留從效之所不欲也橫戶孟翻乃曰吾軍敗矣安能與人爭城是夕燒營而遁城北諸軍亦相顧而潰馮延魯引佩刀自刺刺七亦翻親吏救之不死唐兵死者二萬餘人委棄軍資器械數十萬府庫為之耗竭謂唐之府庫罄於奉軍為于偽翻余安引兵入福州李達舉所部授之何承天姓苑余姓戎由余之後延州錄事參軍高允權留從效引兵還泉州自福州還也泉州與福州世為仇敵唐末王潮兄弟自泉州攻福州留從效先是以泉州兵擊破福州兵又會南唐兵圍福州故云然漳泉之地東南際海西南接潮州嶺南之境也比年軍旅屢興農桑廢業冬徵夏斂僅能自贍秋穀成熟徵租至冬春蠶畢收斂帛於夏即謂二稅也比毗至翻斂力贍翻贍時斂翻置酒餞之戍將不得已引兵歸唐主不能制加從效檢校太傅唐兵新敗自知無以制留從效遂加其官以安之留從效自此據有漳泉延州錄事參軍高允權壬寅契丹主發大梁晉文武諸司從者數千人從才用翻諸軍吏卒又數千人宮女宦官數百人盡載府庫之實以行所留樂器儀仗而已夕宿赤岡契丹主見村落皆空命有司發牓數百通所在招撫百姓然竟不禁胡騎剽掠呼雞而縱狸奴雞其敢前乎剽匹妙翻丙午契丹自白馬渡河謂宣徽使高勳曰吾在上國以射獵為樂至此令人悒悒契丹之下當逸主字樂音洛悒於及翻悒悒憂愁不得志也死無恨矣契丹主不惟土思亦見諸鎮及㣥盜舉兵者皆歸心河東恐不得正丘首也獨不見涉珪與徒河相持於中山之時乎以此言之其才識相去遠矣延州錄事參軍高允權蜀孫漢韶將兵二萬攻鳳州軍于固鎮分兵扼散關以絕援路何重建請扼散關猶慮契丹威令行於關西能發援兵也至是契丹歸北中國無主雖出兵取岐雍可也何必扼散關乎延州錄事參軍高允權張筠余安皆還錢唐吳越王弘佐遣東南安撫使鮑脩讓將兵戍福州以東府安撫使錢弘倧為丞相吳越以越州為東府為弘倧嗣國張本倧作冬翻延州錄事參軍高允權庚戌以皇弟北京馬步都指揮使崇行太原尹知府事劉崇有太原始此考異曰薛史云崇高祖從弟王保衡晉陽見聞錄云仲弟歐陽史云母弟今從實錄延州錄事參軍高允權辛亥契丹主將攻相州梁暉請降契丹主赦之許以為防禦使暉疑其詐復乘城拒守夏四月己未未明契丹主命蕃漢諸軍急攻相州食時克之相悉亮翻悉殺城中男子驅其婦女而北胡人擲嬰孩於空中舉刃接之以為樂觀佛貍之飲江侯景之亂江南其肆毒類如此不嗜殺人然後能一天下孟子之言豈欺我哉樂音洛唐英閱城中遺民男女得七百餘人其後節度使王繼弘斂城中髑髏瘞之髑徒木翻髏音婁瘞於計翻凡得十餘萬或告磁州刺史李穀謀舉州應漢契丹主執而詰之詰其吉翻穀不服契丹主引手於車中若取所獲文書者穀知其詐因請曰必有其驗乞顯示之凡六詰穀辭氣不屈乃釋之史言李穀有膽氣延州錄事參軍高允權帝以從弟北京馬軍都指揮使信領義成節度使充侍衞馬軍都指揮使武節都指揮使史弘肇領忠武節度使充步軍都指揮使右都押牙楊邠權樞密使蕃漢兵馬都孔目官郭威權副樞密使兩使都孔目官南樂王章權三司使兩使節度觀察也樂音洛延州錄事參軍高允權癸亥立魏國夫人李氏為皇后延州錄事參軍高允權契丹主見所過城邑丘墟謂蕃漢㣥臣曰致中國如此皆燕王之罪也燕王謂趙延壽爾亦有力焉張礪隨趙延壽入北又與趙延壽俱南以殘中國契丹主猶知其罪況中國之人乎延州錄事參軍高允權甲子帝以河東節度判官長安蘇逢吉觀察判官蘇禹珪為中書侍郎同平章事禹珪密州人也振武節度使府州團練使折從遠入朝更名從阮避帝名更遠名阮更工衡翻以從阮為節度使折從阮本領振武節又就府州置節鎮以寵之薛史曰升府州為永安軍析振武之勝州幷沿河五鎮以隸之銖陝人也陝失冉翻延州錄事參軍高允權契丹昭義節度使耿崇美屯澤州將攻潞州乙丑詔史弘肇將步騎萬人救之延州錄事參軍高允權丙寅以王守恩為昭義節度使高允權為彰武節度使又以岢嵐軍使鄭謙為忻州刺史領彰國節度使彰國軍應州時屬契丹岢枯我翻丁卯以緣河巡檢使閻萬進為嵐州刺史領振武節度使兼嵐憲二州義軍都制置使憲州本樓煩監嵐州刺史領之唐貞元十五年別置監牧使昭宗龍紀元年李克用表置憲州九域志憲州治靜樂縣靜樂古汾陽縣地嵐憲二州相去五十里而已嵐盧含翻欲經略河南故以弘肇為前驅又遣閻章十二行本閻作謙乙十一行本同孔本同張校同萬進出北方以分契丹兵勢萬進幷州人也延州錄事參軍高允權契丹主以船數十艘載晉鎧仗將自汴泝河歸其國自汴泝河自河陽取太行路以歸其國也艘蘇遭翻河陰在河陽東南相去百六十二里今為虜所制將遠去鄉里人生會有死安能為異域之鬼乎虜勢不能久留中國不若共逐其黨堅守河陽以俟天命之所歸者而臣之豈非長策乎衆以為然行德即以鎧仗授之相與殺契丹監軍使會契丹河陽節度使崔廷勳以兵送耿崇美之潞州行德遂乘虛入據河陽衆推行德為河陽都部署行德遣弟行友奉蠟表間道詣晉陽作表置之蠟丸中故謂之蠟表間古莧翻契丹遣武定節度使方太詣洛陽巡檢至鄭州州有戍兵共迫太為鄭王去年方太以安國留後降契丹契丹主蓋命之領武定節度使武定軍洋州時屬蜀梁太祖兄存之子友倫封密王乙蓋梁亡之後避禍為僧也立以為天子取嵩岳神袞冕以衣之帥所類翻下賊帥同衣於既翻帥衆萬餘襲鄭州太擊走之太以契丹尚強恐事不濟說諭戍兵欲與俱西帥讀曰率說式芮翻欲與戍兵俱西至洛陽衆不從太自西門逃奔洛陽戍兵既失太反譖太於契丹云脅我為亂太遣子師朗自訴於契丹契丹將麻荅殺之將即亮翻太無以自明會㣥盜攻洛陽契丹留守劉晞棄城奔許州太乃入府行留守事與巡檢使潘環擊㣥盜卻之張遇殺朱乙請降伊闕賊帥自稱天子誓衆於南郊壇後唐郊天壇在洛陽城南太逆擊走之考異曰實錄方太傳云劉禧走許田復有潁陽妖巫姓朱號嗣密王誓衆於洛南郊天壇號萬餘人太帥部曲與朝士輩虛張旗幟一舉而逐之洛師遂安今從陷蕃記太欲自歸於晉陽武行德使人誘太曰我裨校也公舊鎮此地由此觀之契丹嘗命方太鎮河陽史逸之也校戶教翻太信之至河陽為行德所殺蕭翰遣高謨翰援送劉晞自許還洛陽蕭翰時鎮大梁使謨翰殺之戊辰武行友至晉陽庚午史弘肇奏遣先鋒將馬誨擊契丹斬首千餘級時耿崇美崔廷勳至澤州聞弘肇兵已入潞州不敢進引兵而南弘肇遣誨追擊破之崇美廷勳與奚王拽剌退保懷州崔廷勳欲歸河陽河陽已為武行德所據故保懷州以逼河陽九域志懷州南至河陽七十里辛未以武行德為河陽節度使契丹主聞河陽亂歎曰我有三失宜天下之叛我也諸道括錢一失也令上國人打草穀二失也不早遣諸節度使還鎮三失也三失並見上延州錄事參軍高允權唐主以矯詔敗軍皆陳覺馮延魯之罪陳覺矯詔事見上卷晉出帝開運三年唐主之保大四年也覺延魯敗軍之罪其事見上壬申詔赦諸將議斬二人以謝中外御史中丞江文蔚對仗彈馮延己魏岑曰陛下踐阼以來所信任者延己延魯岑覺四人而已皆陰狡弄權壅蔽聰明排斥忠良引用㣥小諫爭者逐蔚於勿翻爭讀曰諍竊議者刑上下相蒙道路以目言道路相遇但以目相視而不敢言而延己岑猶在本根未殄枝幹復生同罪異誅復扶又翻左傳宋子罕曰同罪異罰非刑也人心疑惑又曰上之視聽惟在數人雖日接㣥臣終成孤立又曰在外者握兵居中者當國又曰岑覺延魯更相違戾更工衡翻彼前則我卻彼東則我西天生五材國之利器天生五材民並用之出左傳杜預曰五材謂金木水火土也又曰征討之柄在岑折簡帑藏取與繫岑一言折之舌翻帑他朗翻藏徂浪翻唐主以文蔚所言為太過怒貶江州司士參軍械送覺延魯至金陵宋齊丘以嘗薦覺使福州事見上卷晉齊王開運三年上時掌翻下同詔流覺於蘄州延魯於舒州知制誥會稽徐鉉史館脩撰韓熙載上疏曰覺延魯罪不容誅但齊丘延己為之陳請蘄渠希翻會工外翻為于偽翻故陛下赦之亶興者不罪則疆場有生事者矣喪師者獲存則行陳無效死者矣無詔旨而亶發兵謂之亶興厥罪死場音亦喪息浪翻行戶剛翻陳讀曰陣不從中書侍郎同平章事馮延己罷為太弟少保貶魏岑為太子洗馬洗昔薦翻韓熙載屢言宋齊丘黨與必為禍亂齊丘奏熙載嗜酒猖狂猖齒良翻貶和州司士參軍延州錄事參軍高允權乙亥鳳州防禦使石奉頵舉州降蜀蜀自是盡有秦鳳階成之地頵於倫翻晉之宗屬也延州錄事參軍高允權契丹主至臨城得疾及欒城病甚臨城縣屬趙州本房子縣唐天寶元年改為臨城縣宋白曰欒城縣本漢開縣後魏太和十一年於開縣故城置欒城縣九域志古欒城晉欒氏別邑臨城縣在趙州西南一百三里欒城縣在鎮州南六十三里聚冰於胸腹手足且啖之啖徒濫翻丙子至殺胡林而卒殺胡林蓋以契丹主死於此時人遂以為地名宋白曰殺胡林唐天后時襲突厥㣥胡死於此故名考異曰實錄云二十日乙亥卒今從陷蕃記實鹽數斗載之北去晉人謂之帝羓羓邦加翻趙延壽恨契丹主負約謂人曰我不復入龍沙矣盧龍山後即大漠故謂之龍沙復扶又翻先引兵入恆州契丹永康王兀欲及南北二王各以所部兵相繼而入范成大北使錄自欒城至恆州六十里恆戶登翻恐失大援乃納之時契丹諸將已密議奉兀欲為主兀欲登鼓角樓受叔兄拜而延壽不之知自稱受契丹皇帝遺詔權知南朝軍國事仍下教布告諸道所以供給兀欲與諸將同兀欲銜之恆州諸門管鑰及倉庫出納兀欲皆自主之延壽使人請之不與兀欲不與諸門管鍵事可知矣趙延壽殊不知陰為之備其鎖固當契丹主喪至國述律太后不哭曰待諸部寧壹如故則葬汝矣咎其傾國南伐至於耗竭部落不安也延州錄事參軍高允權帝之自壽陽還也見上二月戍兵聞契丹北還不為備契丹襲擊之戍兵驚潰契丹焚其市邑一日狼煙百餘舉陸佃埤雅曰古之烽火用狼糞取其煙直而聚雖風吹之不斜余謂今之烽燧豈必皆用狼糞哉此虜將遁張虛勢也遣親將葉仁魯將步騎三千赴之親將即亮翻會契丹出剽掠剽匹妙翻仁魯乘虛大破之丁丑復取承天軍延州錄事參軍高允權冀州人殺契丹刺史何行通推牢城指揮使張廷翰知州事廷翰冀州人符習之甥也符習成德將歷事唐莊宗及明宗延州錄事參軍高允權或說趙延壽曰說式芮翻契丹諸大人數日聚謀此必有變今漢兵不下萬人不若先事圖之先悉薦翻延壽猶豫不決壬午延壽下令以來月朔日於待賢館上事上事者言欲禮上以領權知南朝軍國事上時掌翻其儀宰相樞密使拜於階上節度使以下拜於階下李崧以虜意不同事理難測固請趙延壽未行此禮乃止章錫琛標點聶崇岐覆校
