body:
  text: 資治通鑑卷第九十五端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰權判西京留司御史臺上柱國河內郡開國侯食邑一千三百戶食實封四百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注晉紀十七咸和七年顯宗成皇帝中之上咸和七年壬辰三三二咸和七年春正月辛未大赦咸和七年趙主勒大饗㣥臣考異曰晉春秋云陶侃遣使聘後趙趙王勒饗之按侃與勒必無通使之理今不取載記云勒因饗高句麗宇文屋孤使今但云饗㣥臣朕可方自古何等主方比也陛下神武謀略過於漢高後世無可比者勒笑曰人豈不自知卿言太過朕若遇漢高祖當北面事之與韓彭比肩戴溪曰勒豈真知高帝者特自視不如韓彭故耳當並驅中原未知鹿死誰手大丈夫行事宜礌礌落落如日月皎然礌落猥翻終不效曹孟德司馬仲達欺人孤兒寡婦狐媚以取天下也狐妖獸也能蠱媚人石勒以此論曹馬使死者有知孟德仲達其抱愧於地下矣勒雖不學好使諸生讀書而聽之好呼到翻時以其意論古今得失聞者莫不悅服嘗使人讀漢書聞酈食其勸立六國後事見十卷漢高帝三年此法當失何以遂得天下及聞留侯諫乃曰賴有此耳咸和七年郭敬之退戍樊城也事見上卷五年夏四月敬復攻拔之敬復扶又翻留戍而歸咸和七年趙右僕射程遐言於趙主勒曰中山王勇悍權略㣥臣莫及觀其志自陛下之外視之蔑如蔑無也言視之若無也孟子曰賊人者謂之賊賊義者謂之殘左傳衆仲曰安忍無親威振內外其諸子年長皆典兵權虎子邃宣勒皆使之典兵將即亮翻帥所類翻長知兩翻自當無他恐非少主之臣也少詩照翻宜早除之以便大計勒曰今天下未安大雅沖幼宜得強輔中山王骨肉至親有佐命之功方當委以伊霍之任何至如卿所言卿正恐不得亶帝舅之權耳吾亦當參卿顧命勿過憂也遐泣曰臣所慮者公家陛下乃以私計拒之忠言何自而入乎中山王雖為皇太后所養非陛下天屬載記曰虎勒之從子也祖曰㔨邪父曰寇覓勒父朱幼而子虎故或稱勒弟焉陛下酬其父子恩榮亦足矣而其志願無極謂虎有窺覦天位之志若不除之臣見宗廟不血食矣勒不聽遐退告徐光光曰中山王常切齒於吾二人恐非但危國亦將為家禍也他日光承間言於勒曰間古莧翻今國家無事而陛下神色若有不怡何也怡悅也吳蜀未平吾恐後世不以吾為受命之王也光曰魏承漢運劉備雖興於蜀漢豈得為不亡乎以喻晉也猶今之李氏也陛下苞括二都平蕩八州二都長安洛陽八州冀幽並青兗豫司雍也當復在誰復扶又翻下同且陛下不憂腹心之疾而更憂四支乎中山王藉陛下威略所向輒克而天下皆言其英武亞於陛下且其資性不仁見利忘義父子並據權位勢傾王室而耿耿常有不滿之心近於東宮侍宴有輕皇太子之色臣恐陛下萬年之後不可復制也復扶又翻勒默然始命太子省可尚書奏事省悉景翻且以中常侍嚴震參綜可否惟征伐斷斬大事乃呈之斷丁亂翻於是嚴震之權過於主相相息亮翻中山王虎之門可設雀羅矣漢書曰翟公為廷尉賓客填門及廢門外可設雀羅師古注云言其寂靜無人行也為後虎殺徐光程遐張本怏於兩翻咸和七年秋趙郭敬南掠江西江西謂邾城以東至歷陽也斌音彬及南中郎將桓宣乘虛攻樊城悉俘其衆敬旋救樊宣與戰于涅水破之水經注涅水出涅陽縣西北岐棘山東南徑涅陽縣又東南徑安衆縣又東南至新野縣東入于淯涅奴結翻侃兄子臻及竟陵太守李陽攻新野拔之敬懼遁去宣章十二行本宣下有陽字乙十一行本同退齋校同遂拔襄陽侃使宣鎮襄陽宣招懷初附簡刑罰略威儀勸課農桑或載鉏耒於軺軒鉏立薅所用農器也耒盧對翻手耕曲木也孔穎達曰耒以曲木為之長六尺六寸底長尺有一寸中央直者三尺有三寸句者二尺有二寸底謂耒下向前曲接耜者頭而著耜耜金鐵為之鄭玄曰耜者耒之金也廣五寸田器鎡錤之屬軺音遙使者小車駕馬者也軒曲輈也闌板曰軒帥讀曰率在襄陽十餘年趙人再攻之宣以寡弱拒守趙人不能勝時人以為亞於祖逖周訪史終言宣守襄陽之功咸和七年成大將軍壽寇寧州以其征東將軍費黑為前鋒出廣漢鎮南將軍任回出越雟以分寧州之兵費扶沸翻任音壬雟音髓咸和七年冬十月壽黑至朱提朱提太守董炳城守朱提音銖時寧州刺史尹奉遣建寧太守霍彪引兵助之壽欲逆拒彪黑曰城中食少少詩沼翻宜縱彪入城共消其穀何為拒之壽從之城久不下壽欲急攻之黑曰南中險阻難服當以日月制之待其智勇俱困然後取之溷牢之物何足汲汲也溷與圂同胡困翻圂廁也豕所居也牢亦犬豕所居也言城已受圍如犬豕在圂牢中不患其逸出也鄭氏曰牢間也必有間者防禽獸觸齧疏曰養馬者謂之間養牛羊者謂之牢言間見其間衛言牢見其牢固所從言之異其實一物也壽不從攻果不利乃悉以軍事任黑咸和七年十一月壬子朔進太尉侃為大將軍劍履上殿入朝不趨贊拜不名上時掌翻朝直遙翻侃固辭不受咸和七年十二月庚戌帝遷于新宮五年作新宮至是而成乃遷居之咸和七年是歲涼州僚屬勸張駿稱涼王領秦涼二州牧置公卿百官如魏武晉文故事魏武事見六十七卷漢獻帝建安二十一年晉文事見七十九卷魏元帝咸熙元年此非人臣所宜言也敢言此者罪不赦然境內皆稱之為王駿立次子重華為世子重直龍翻八年八年春正月成大將軍李壽拔朱提董炳霍彪皆降降戶江翻下同壽威震南中八年丙子趙主勒遣使來修好使疏吏翻好呼到翻詔焚其幣晉雖未能復君父之讎而焚幣一事猶足舒忠臣義士之氣八年三月寧州刺史尹奉降于成成盡有南中之地大赦以大將軍壽領寧州八年夏五月甲寅遼東武宣公慕容廆卒六月世子皓以平北將軍行平州刺史督攝部內皓字元真廆第三子廆戶罪翻皓呼廣翻以長史裴開為軍咨祭酒郎中令高詡為玄菟太守皓以帶方太守王誕為左長史誕以遼東太守陽騖為才而讓之皓從之以誕為右長史國之興也其臣推賢讓能國之衰也其臣矜己忌前騖音務八年趙主勒寢疾中山王虎入侍禁中矯詔㣥臣親戚皆不得入疾之增損外無知者又矯詔召秦王宏彭城王堪還襄國勒以宏都督中外諸軍事蓋使之鎮鄴堪蓋在河南見宏驚曰吾使王處藩鎮處昌呂翻正備今日有召王者邪將自來邪有召者當按誅之虎懼曰秦王思慕暫還耳今遣之仍留不遣數日復問之復扶又翻虎曰受詔即遣今已半道矣廣阿有蝗廣阿縣前漢屬巨鹿郡後漢晉省後魏復置廣阿縣屬南趙郡隋改為大陸縣唐武德間改為象城縣天寶初改為昭慶縣屬趙州恐勒死有變使邃遊于蝗所若捕蝗者以為外應帥讀曰率騎奇寄翻秋七月勒疾篤遺命曰大雅兄弟宜善相保司馬氏汝曹之前車也前車之覆後車之戒戒其兄弟自相殘也勿為將來口實謂當如周公霍光之輔幼孤也勒謂此言可以縶虎之手足邪此數語亦徐光程遐為之耳戊辰勒卒年六十收右光祿大夫程遐中書令徐光下廷尉下遐稼翻召邃使將兵入宿衛將即亮翻文武皆奔散弘大懼自陳劣弱讓位於虎虎曰君終太子立禮之常也弘涕泣固讓虎怒曰若不堪重任天下自有大義何足豫論弘乃即位弘字大雅勒第二子殺程遐徐光光遐固知禍之及己然亦不料如是之速以勒喪潛瘞山谷莫知其處己卯備儀衛虛葬于高平陵勒卒十二日而葬未有如是之速者也虎既潛葬勒其所以為身後之計者亦不過如此卒為女子所告果何益哉瘞於計翻廟號高祖趙將石聰及譙郡太守彭彪各遣使來降聰時鎮譙城守式又翻降戶江翻冒姓石氏朝廷遣督護喬球將兵救之未至聰等為虎所誅八年慕容皓遣長史勃海王濟等來告喪皓呼廣翻八年八月趙主弘以中山王虎為丞相魏王大單于加九錫單音蟬以魏郡等十三郡為國總攝百揆虎赦其境內立妻鄭氏為魏王后子邃為魏太子加使持節侍中都督中外諸軍事大將軍録尚書事次子宣為使持節車騎大將軍冀州刺史封河間王使疏吏翻韜為前鋒將軍司隸校尉封樂安王遵封齊王鑒封代王苞封樂平王徙平原嚴平原改太原王斌為章武王斌音彬勒文武舊臣皆補散任虎之府寮親屬悉署臺省要職虎居鄴子邃都督中外諸軍宣據信都府寮親屬分領臺省弘處尊位特寄坐耳散悉亶翻尚書郭殷為右僕射更命太子宮曰崇訓宮更工衡翻太后劉氏以下皆徙居之選勒宮人及車馬服玩之美者皆入丞相府八年宇文乞得歸為其東部大人逸豆歸所逐走死于外慕容皓引兵討之軍于廣安廣安在棘城之北遂築榆陰安晉二城而還榆陰城蓋在大榆河之陰安晉城在威德城東南八年成建寧牂柯二郡來降李壽復擊取之牂柯音臧哥降戶江翻復扶又翻下同八年趙劉太后謂彭城王堪曰先帝甫晏駕丞相遽相陵藉如此陵駕也轢也藉蹈也藉慈夜翻殆不復久王將若之何堪曰先帝舊臣皆被疏斥軍旅不復由人謂虎諸子皆握兵權也被皮義翻無可為者謂宿衛及臺省要職皆虎之府寮親屬無與共謀匡正者挾南陽王恢為盟主恢勒少子也時鎮廩丘宣太后詔於牧守征鎮使各舉兵以誅暴逆庶幾猶有濟也幾居希翻劉氏曰事急矣當速為之九月堪微服輕騎襲兗州不克南奔譙城騎奇寄翻丞相虎遣其將郭太追之獲堪于城父父音甫送襄國炙而殺之徵南陽王恢還襄國劉氏謀泄虎廢而殺之尊弘母程氏為皇太后堪本田氏子數有功數所角翻趙主勒養以為子劉氏有膽略勒每與之參決軍事佐勒建功業有呂后之風而不妬忌更過之呂后能誅韓信彭越劉氏不能制虎殆不及也趙河東王生鎮關中石朗鎮洛陽劉胤之西奔也石生自洛陽鎮長安朗代生鎮洛陽十月生朗皆舉兵以討丞相虎生自稱秦州刺史遣使來降降戶江翻氐帥蒲洪自稱雍州刺史西附張駿咸和四年洪降于虎今以趙亂而叛帥所類翻虎留太子邃守襄國將步騎七萬攻朗于金墉金墉潰獲朗刖而斬之將即亮翻騎奇寄翻刖音月進向長安以梁王挺為前鋒大都督挺虎之子也帥讀曰率璝公回翻生將大軍繼發軍于蒲阪權與挺戰於潼關大破之挺及丞相左長史劉隗皆死此劉隗意即自晉奔趙者澠彌兗翻枕尸三百餘里枕職任翻鮮卑潛與虎通謀反擊生生不知挺已死懼單騎奔長安權收餘衆退屯渭汭孔安國曰水北曰汭杜預曰水之隈曲曰汭音如鋭翻匿於雞頭山張守節曰括地志云雞頭山在成州上祿縣東北二十里在長安西南九百六十里酈道元云蓋大隴山異名也後漢書隗囂使王孟塞雞頭道即此也按原州平高縣西百里亦有笄頭山在長安西北八百里虎進兵擊英斬之生麾下斬生以降權奔隴右虎分命諸將屯汧隴汧苦堅翻遣將軍麻秋討蒲洪風俗通麻齊大夫麻嬰之後帥讀曰率降戶江翻虎迎拜洪光烈將軍前此未有光烈將軍號石虎創置也漢有護羌校尉虎以此官授洪使之監護㣥氐説虎徙關中豪傑及氐羌以實東方説輸芮翻曰諸氐皆洪家部曲洪帥以從誰敢違者虎從之徙秦雍民及氐羌十餘萬戶于關東雍於用翻以洪為龍驤將軍流民都督使居枋頭為苻洪子健自枋頭入關中張本驤思將翻枋音方使帥其衆數萬徙居清河之灄頭羌帥所類翻灄日涉翻水經注清河過廣川縣東水側有羌壘姚氏之故居也為姚弋仲父子自灄頭起兵張本虎還襄國大赦趙主弘命虎建魏臺一如魏武王輔漢故事八年慕容皓初嗣位用法嚴峻國人多不自安主簿皇甫真切諫不聽皓庶兄建威將軍翰母弟征虜將軍仁有勇略屢立戰功得士心季弟昭有才藝皆有寵於廆皓忌之翰歎曰吾受事於先公不敢不盡力幸賴先公之靈所向有功此乃天贊吾國非人力也而人謂吾之所辦以為雄才難制吾豈可坐而待禍邪乃與其子出奔段氏段遼素聞其才冀收其用甚愛重之仁自平郭來奔喪漢志平郭縣屬遼東郡晉省晉東夷校尉治襄平崔毖之敗慕容廆以仁鎮遼東治平郭吾等素驕多無禮於嗣君嗣君剛嚴無罪猶可畏況有罪乎昭曰吾輩皆體正嫡於國有分昭自謂與仁皆正室之子分可以得國也分扶問翻我在內未為所疑伺其間隙除之不難兄趣舉兵以來伺相吏翻間古莧翻趣讀曰促我為內應事成之日與我遼東男子舉事不克則死不能效建威偷生異域也仁曰善遂還平郭閏月仁舉兵而西或以仁昭之謀告皓皓未之信遣使按驗仁兵已至黃水黃水即潢水在棘城東北距唐營州四百里據載記黃水當在漢遼東郡險瀆縣殺使者還據平郭皓賜昭死遣軍祭酒封奕慰撫遼東以高詡為廣武將軍將兵五千與庶弟建武將軍幼稚廣威將軍軍寧遠將軍汗司馬遼東佟壽共討仁與仁戰於汶城北佟徒冬翻姓也汶漢古縣屬遼東郡前書作文皓兵大敗幼稚軍皆為仁所獲壽嘗為仁司馬遂降於仁降戶江翻下同前大農孫機等舉遼東城以應仁孫機蓋王官之避地遼東者遼東城即襄平城與汗俱還東夷校尉封抽護軍平原乙逸乙姓也逸名也姓譜商湯字天乙支孫以為氏於是仁盡有遼東之地段遼及鮮卑諸部皆與仁遙相應援皓追思皇甫真之言以真為平州別駕皓領平州刺史以真為別駕八年十二月郭權據上邽遣使來降京兆新平扶風馮翊北地皆應之八年初張駿欲假道於成以通表建康成主雄不許駿乃遣治中從事張淳稱藩於成以假道雄偽許之將使盜覆諸東峽三峽在成都之東故云東峽淳謂雄曰寡君使小臣行無迹之地蜀不許涼人假道則蜀地前此無涼人之迹以陛下嘉尚忠義能成人之美故也若欲殺臣者當斬之都市宣示衆目曰涼州不忘舊德通使琅邪江左自琅邪中興故以稱之使疏吏翻發覺殺之如此則義聲遠播天下畏威今使盜殺之江中威刑不顯何足以示天下乎雄大驚曰安有此邪司隸校尉景騫蜀置司隸校尉於成都張淳壯士請留之雄曰壯士安肯留且試以卿意觀之騫謂淳曰卿體豐大天熱可且遣下吏小住須涼須待也寡君以皇輿播越梓宮未返謂懷愍蒙塵卒之見害梓宮未返也莫之振救振舉也上都謂建康也非下吏所能傳使下吏可了則淳亦不來矣雖火山湯海猶將赴之豈寒暑之足憚哉雄謂淳曰貴主英名蓋世土險兵強何不亦稱帝自娛一方淳曰寡君祖考以來世篤忠貞以讎恥未雪枕戈待旦枕職任翻何自娛之有雄甚慙曰我之祖考本亦晉臣遭天下大亂與六郡之民避難此州事見八十二卷惠帝元康八年難乃旦翻遂有今日琅邪若能中興大晉於中國者亦當帥衆輔之帥讀曰率厚為淳禮而遣之淳卒致命於建康卒子恤翻致命致其君命也長安之失守也事見八十九卷愍帝建興四年耿訪敦煌所遣上計吏留長安未還而長安陷且河隴路絶因南入漢中自漢東下至建康敦徒門翻使疏吏翻下同朝廷以訪守侍章十二行本侍作持乙十一行本同熊校同嚴侍改治書御史拜張駿鎮西大將軍選隴西賈陵等十二人配之配侑也道不通以詔書付賈陵詐為賈客以達之賈音古是歲陵始至涼州駿遣部曲督王豐等報謝九年九年春正月趙改元延熙九年詔以郭權為鎮西將軍雍州刺史雍於用翻九年仇池王楊難敵卒子毅立自稱龍驤將軍左賢王下辨公以叔父堅頭之子盤為冠軍將軍右賢王河池公驤思將翻辨步莧翻冠古玩翻遣使來稱藩九年二月丁卯詔遣耿訪王豐齎印綬授張駿大將軍都督陝西雍秦涼州諸軍事陝式冉翻自是每歲使者不絶仇池稱藩梁涼之路通也九年慕容仁以司馬翟楷領東夷校尉前平州別駕龐鑒領遼東相龐皮江翻九年段遼遣兵襲徒河不克復遣其弟蘭與慕容翰共攻柳城柳城縣漢屬遼西郡晉省唐為營州治所復扶又翻城大猶城主也一城之長故曰城大埿與泥同遼怒切責蘭等必令拔之休息二旬復益兵來攻復扶又翻士皆重袍蒙楯重直龍翻楯食尹翻作飛梯飛梯即雲梯晝夜不息琮埿拒守彌固殺傷千餘人卒不能拔卒子恤翻慕容皓遣慕容汗及司馬封奕等共救之皓戒汗曰賊氣鋭勿與爭鋒汗性驍果以千餘騎為前鋒驍堅堯翻騎奇寄翻直進封奕止之汗不從與蘭遇於牛尾谷牛尾谷在柳城北死者太半奕整陳力戰陳讀曰陳故得不沒蘭欲乘勝窮追慕容翰恐遂滅其國止之曰夫為將當務慎重審己量敵量音良非萬全不可動今雖挫其偏師未能屈其大勢皓多權詐好為潛伏好呼到翻若悉國中之衆自將以拒我將即亮翻我縣軍深入縣讀曰懸衆寡不敵此危道也且受命之日正求此捷若違命貪進萬一取敗功名俱喪喪息浪翻何以返面蘭曰此已成擒無有餘理謂以事理策之皓必成擒無復遺餘也今千年在東若進而得志吾將迎之以為國嗣終不負卿使宗廟不祀也千年者慕容仁小字也翰曰吾投身相依無復還理復扶又翻國之存亡於我何有但欲為大國之計且相為惜功名耳為于偽翻乃命所部欲獨還蘭不得已而從之史言翰雖身在外乃心宗國九年三月成主雄分寧州置交州成分寧州之興古永昌牂柯越巂夜郎等郡為交州爨深為交州刺史九年趙丞相虎遣其將郭敖及章武王斌帥步騎四萬西擊郭權軍于華陰夏四月上邽豪族殺權以降斌音彬帥讀曰率騎奇寄翻華戶化翻降戶江翻虎徙秦州三萬餘戶于青並二州長安人陳良夫奔黑羌羌之別種有青羌黑羌句音鉤章武王斌樂安王韜合擊破之句大奔馬蘭山郭敖乘勝逐北為羌所敗敗補邁翻死者什七八斌等收軍還三城魏收地形志後魏太和初分鴈門之廣武朔方之沃野置遍城郡治廣武縣縣有三城遍城秦王宏有怨言以其父疾而虎矯詔召之至於失職也九年慕容仁自稱平州刺史遼東公九年長沙桓公陶侃晚年深以滿盈自懼不預朝權朝直遙翻屢欲告老歸國欲歸長沙國也六月侃疾篤上表遜位遣左長史殷羡奉送所假節麾幢曲蓋麾大將旌旗臨敵之際三軍視以為進退者也幢幡幢方言曰幢翳也楚曰翿關東西皆曰幢文選注幢以羽葆為之釋名曰幢童也其狀童童然幢傳江翻曲蓋者蓋為曲柄世説謝靈運好戴曲柄笠孔隱士曰何不能遺曲蓋之貌晉制諸公任方面者皆給節麾緹幢曲蓋章印章也自此以上皆朝廷所授故奉送之雍於用翻傳株戀翻棨音啓皆有定簿封印倉庫侃自加管鑰以後事付右司馬王愆期加督護統領文武史言陶侃綜理精密雖病不亂甲寅輿車出臨津就船將歸長沙顧謂愆期曰老子婆娑正坐諸君娑桑何翻婆娑肢體緩縱不收之貌侃言不得早退至於困乏如此正坐參佐苦留之也乙卯薨於樊溪樊溪在武昌西三里北注大江觀陶侃在西藩顛末豈有非望之圖哉晉史所記決指之事折翼之夢蓋庾亮之黨傅致之耳惠帝太安二年侃擊張昌至是年凡四十一年斷丁亂翻識察纖密人不能欺自南陵迄于白帝南陵在宣城郡界梁置南陵郡陳置北江州於其地蓋臨江渚江州東界盡於南陵今宣州南陵縣非古之南陵戍也自南陵迄于白帝總言侃所統大界宋白曰南陵本漢舂穀縣地後併于湖縣尋又屬繁昌梁武帝始置南陵縣屬南陵郡臨江有城基見存去今縣一百三十里路不拾遺及薨尚書梅陶與親人曹識書曰親人其所親者也陶公機神明鑒似魏武忠順勤勞似孔明陸抗諸人不能及也謝安每言陶公雖用法而恆得法外意史言陶侃為名流所推重如此恆戶登翻鯤之從子也謝鯤見九十二卷元帝永昌元年從才用翻九年成主雄生瘍於頭瘍余章翻頭瘡曰瘍身素多金創矢刃所傷為金創創初良翻舊痕皆膿潰諸子皆惡而遠之惡烏路翻遠于願翻獨太子班晝夜侍側不脫衣冠親為吮膿為于偽翻吮徂兗翻雄召大將軍建寧王壽受遺詔輔政丁卯雄卒年六十一載記雄卒在去年班字世文雄兄蕩之子也政事皆委於壽及司徒何點尚書章十二行本書下有令字乙十一行本同孔本同張校同王王褱王褱古回翻班居中行喪禮一無所預李班豈可不謂之仁孝哉然不能包周身之防死於李越之手末俗澆漓固不可拘拘於古禮以啓姦非至於殞身亂國也九年辛未加平西將軍庾亮征西將軍假節都督江荊豫益梁雍六州諸軍事領江豫荊三州刺史鎮武昌陶侃既沒庾亮始專制上流雍於用翻浩羡之子也與豫章太守褚裒裒蒲侯翻丹陽丞杜乂皆以識度清遠善談老易老易老子及易也亶而浩尤為風流所宗裒丰刀石之孫褚丰刀石見七十七卷魏元帝景元元年丰刀石離灼翻錫之子也杜錫見八十三卷惠帝元康九年季野有皮裏春秋褚裒字季野否音鄙而內有褒貶也謝安曰裒雖不言而四時之氣亦備矣九年秋八月王濟還遼東詔遣侍御史王齊祭遼東公廆又遣謁者徐孟策拜慕容皓鎮軍大將軍平州刺史大單于遼東公持節章十二行本節下有都督二字乙十一行本同孔本同張校同承制封拜一如廆故事船下馬石津自建康出大江至于海轉料角至登州大洋東北行過大謝島龜歆島淤島烏湖島三百里北渡烏湖海至馬石山東之都里鎮馬石津即此地也九年九月戊寅衛將軍江陵穆公陸曄卒九年成主雄之子車騎將軍越屯江陽奔喪至成都以太子班非雄所生意不服與其弟安東將軍期謀作亂班弟玝勸班遣越還江陽以期為梁州刺史鎮葭萌葭萌即晉壽之地玝阮古翻不忍遣推心待之無所疑間間古莧翻遣玝出屯於涪涪音浮冬十月癸亥朔越因班夜哭弒之於殯宮卒如李驤之言菆塗曰殯將遷葬以賓遇之也矯太后任氏令罪狀班而廢之任音壬初期母冉氏賤任氏母養之期多才藝有令名及班死衆欲立越越奉期而立之甲子期即皇帝位期字世運雄第四子也以越為相國封建寧王加大將軍壽大都督徙封漢王皆録尚書事以兄霸為中領軍鎮南大將軍弟保為鎮西大將軍汶山太守汶讀曰岷從兄始為征東大將軍代越鎮江陽據載記始特之長子於期為伯父於壽為從兄從才用翻丙寅葬雄於安都陵諡曰武皇帝廟號太宗始欲與壽共攻期壽不敢發始怒反譖壽於期請殺之期欲藉壽以討李玝故不許遣壽將兵向涪壽先遣使告玝以去就利害開其去路玝遂來奔詔以玝為巴郡太守期以壽為梁州刺史屯涪為李壽自涪舉兵廢李期張本九年趙主弘自齎璽綬詣魏宮石虎為魏王其所居稱魏宮璽斯氏翻綬音受虎曰帝王大業天下自當有議何為自論此邪弘流涕還宮謂太后程氏曰先帝種真無復遺矣種章勇翻復扶又翻於是尚書奏魏臺請依唐虞禪讓故事此趙朝尚書奏也弘愚暗居喪無禮章十二行本禮下有不可以君萬國六字乙十一行本同孔本同退齋校同便當廢之何禪讓也十一月虎遣郭殷入章十二行本入上有持節二字乙十一行本同孔本同退齋校同宮廢弘為海陽王弘安步就車容色自若謂㣥臣曰庸昧不堪纂承大統夫復何言復扶又翻㣥臣莫不流涕宮人慟哭㣥臣詣魏臺勸進虎曰皇帝者盛德之號非所敢當且可稱居攝趙天王考異曰三十國晉春秋虎即位改元永熙陳鴻大統曆云石虎即位改建平五年為延興明年改建武按三十國晉春秋不記弘改元延熙虎之立實延熙元年也故誤云永熙弘既號延熙虎安肯稱永熙陳鴻云虎改建平五年為延興即是弘踰年不改元也恐鴻説誤尋皆殺之虎更太子宮曰崇訓宮弘時年二十一西羌大都督姚弋仲稱疾不賀虎纍召之乃至正色謂虎曰弋仲常謂大王命世英雄奈何把臂受託而返奪之邪虎曰吾豈樂此哉樂音洛顧海陽年少少詩照翻恐不能了家事故代之耳心雖不平然察其誠實亦不之罪虎以夔安為侍中太尉守尚書令郭殷為司空韓晞為尚書左僕射魏郡申鐘為侍中郎闓為光祿大夫闓苦亥翻又音開王波為中書令文武封拜各有差虎行如信都復還襄國載記曰虎以讖文天子當從東北來於是備法駕行自信都而還以應之天子當從東北來蓋謂慕容氏將從遼碣入中國也秦始皇東遊以厭天子氣初不能遏止漢高之興九年慕容皓討遼東甲申至襄平遼東人王岌密信請降師進入城翟楷龐鑒單騎走居就新昌等縣皆降居就新昌皆屬遼東郡降戶江翻下同高詡諫曰遼東之叛實非本圖直畏仁凶威不得不從今元惡猶存元惡謂仁也遽加夷滅則未下之城無歸善之路矣皓乃止分徙遼東大姓於棘城以杜㣥為遼東相安輯遺民九年十二月趙徐州從事蘭陵朱縱斬刺史郭祥以彭城來降趙將王朗攻之縱奔淮南九年慕容仁遣兵襲新昌督護新興王宇擊走之遂徙新昌入襄平遼東治襄平徙新昌吏民入襄平所以杜仁窺掩襲之心宇王矩翻咸康元年乙未三三五九年春正月庚午朔帝加元服沈約禮志曰古者無天子冠禮故筮日筮賓冠於阼以著代醮於客位三加彌尊皆士禮耳漢順帝冠兼用曹褒新禮褒新禮今不存禮儀志又云乘輿初加緇布進賢次爵辨武辨次通天皆於高廟江左諸帝將冠金石宿設百僚陪位又豫於殿上鋪大牀御府令奉冕幘簪導袞服以授侍中常侍太尉加幘太保加冕將加冕太尉跪讀祝文曰令月吉日始加元服皇帝穆穆思弘袞職欽若昊天六合是式率遵祖考永永無極眉壽無期介茲景福加冕訖侍中繫玄紞侍中脫絳紗服加袞服冠事畢太保率㣥臣奉觴上壽王以下三稱萬歲乃退鄭樵曰用魏儀一加既加元服拜于太廟改元九年成趙皆大赦成改元玉恆恆戶登翻趙改元建武九年成主期立皇后閻氏以衛將軍尹奉為右丞相驃騎將軍尚書令王王褱為司徒驃匹妙翻王褱古回翻九年趙王虎命太子邃省可尚書奏事省悉景翻惟祀郊廟選牧守征伐刑殺乃親之虎好治宮室鸛雀臺崩鸛雀臺在鄴即魏武所起銅雀臺好呼到翻典匠少府即漢將作大匠之職也少詩照翻任音壬倍於其舊邃保母劉芝封宜城君關預朝權受納賄賂求仕進者多出其門朝直遙翻九年慕容皓置左右司馬以司馬韓矯軍祭酒封奕為之九年司徒導以羸疾不堪朝會羸倫為翻朝直遙翻三月乙酉帝幸其府與㣥臣宴于內室拜導並拜其妻曹氏侍中孔坦密表切諫以為帝初加元服動宜顧禮帝從之坦又以帝委政於導從容言曰陛下春秋已長聖敬日躋從千容翻長知兩翻日躋猶日進也宜博納朝臣咨諏善道諏遵須翻導聞而惡之惡烏路翻出坦為廷尉坦不得意以疾去職丹陽尹桓景為人諂巧導親愛之會熒惑守南斗經旬晉天文志南斗六星天廟也丞相太宰之位斗揚州之分天文志斗牛女揚州九江入斗一度丹陽入斗十六度分扶問翻厭一葉翻回曰公以明德作輔而與桓景造膝造七到翻使熒惑何以退舍導深愧之導辟太原王濛為掾濛莫紅翻掾于絹翻王述為中兵屬晉公府諸曹有參軍有掾有屬昶之曾孫也王昶仕魏鎮荊州以功名自見昶丑兩翻而以清約見稱與沛國劉惔齊名友善惔徒甘翻惔常稱濛性至通而自然有節濛曰劉君知我勝我自知當時稱風流者以惔濛為首述性沈靜每坐客辨論起而述處之恬如也沈持林翻坐徂臥翻處昌呂翻年三十尚未知名人謂之癡導以門地辟之昶之子湛湛之子承世有高名述承子也唯問在東米價述蓋自東吳至建康導曰王掾不癡人何言癡也嘗見導每發言一坐莫不贊美坐徂臥翻述正色曰人非堯舜何得每事盡善導改容謝之九年趙王虎南遊臨江而還還從宣翻又如字有遊騎十餘至歷陽歷陽太守袁耽表上之上時掌翻不言騎多少朝廷震懼司徒導請出討之夏四月加導大司馬假黃鉞都督征討諸軍事癸丑帝觀兵廣莫門廣莫門建康城北門也司空郗鑒使廣陵相陳光將兵入衛京師俄聞趙騎至少又已去少詩沼翻戊午解嚴王導解大司馬袁耽坐輕妄免官九年趙征虜將軍石遇攻桓宣於襄陽不克九年大旱會稽餘姚米斗五百會工外翻九年秋七月慕容皓立子俊為世子九年九月趙王虎遷都于鄴趙王勒定都襄國虎遷于鄴九年初趙主勒以天竺僧佛圖澄豫言成敗數有驗敬事之及虎即位奉之尤謹衣以綾錦乘以雕輦雕輦雕鏤以為飾數所角翻衣於既翻太子諸公扶翼上殿朝直遙翻上時掌翻主者唱大和尚主者謂掌朝儀者也使司空李農旦夕問起居太子諸公五日一朝諸公虎諸子也虎稱天王降諸子封王者爵為公率多事佛澄之所在無敢向其方面涕唾者爭造寺廟削髮出家虎以其真偽雜糅糅汝救翻或避賦役為姦宄宄音軌乃下詔問中書曰佛國家所奉里閭小人無爵秩者應事佛不不讀曰否著作郎王度等晉職官志曰著作郎周左史之任也漢東京圖籍在東觀有其名尚未有官魏明帝太和中詔置著作郎於此始有其官隸中書省及晉受命制曰著作舊屬中書而祕書既典文籍今改中書省著作為祕書著作於是改隸祕書省自後別置省而猶隸祕書王者祭祀典禮具存佛外國之神非天子諸華所應祠奉漢氏初傳其道事見四十五卷漢明帝永平八年漢人初謂官府為寺後漢自西域白馬駝經來初止於鴻臚寺遂取寺名創置白馬寺魏世亦然今宜禁公卿以下毋得詣寺燒香禮拜其趙人為沙門者皆返初服謂使還服華人之服朕生自邊鄙忝君諸夏夏戶雅翻至於饗祀應從本俗其夷趙百姓樂事佛者特聽之樂音洛九年趙章武王斌帥精騎二萬並秦雍二州兵以討薄句大平之去年斌等為薄句大所敗斌音彬帥讀曰率騎奇寄翻雍於用翻句音鉤九年成太子班之舅羅演與漢王相天水上官淡李壽封漢王相息亮翻淡徒覽翻立班子事覺期殺演淡及班母羅氏期自以得志輕諸舊臣信任尚書令景騫尚書姚華田褒中常侍許涪等涪音浮刑賞大政皆決於數人希復關公卿復扶又翻褒無他才嘗勸成主雄立期為太子故有寵由是紀綱隳紊紊音問雄業始衰九年冬十月乙未朔日有食之九年慕容仁遣王齊等南還去年齊等為慕容仁所留趣七喻翻齊遇風不至十二月徐孟等至棘城慕容皓始受朝命朝直遙翻段氏宇文氏各遣使詣慕容仁館于平郭城外皓帳下督張英將百餘騎間道潛行掩擊之間古莧翻斬宇文氏使十餘人生擒段氏使以歸九年是歲明帝母建安君荀氏卒荀氏在禁中尊重同於太后詔贈豫章郡君荀氏元帝宮人也生明帝自以位卑每懷怨望為帝所譴漸見疏薄及明帝即位封建安君別立第宅太寧元年迎還臺內供奉隆厚及帝立尊重同於太后九年代王翳槐以賀蘭藹頭不恭藹頭翳槐舅有擁護之功事見九十三卷咸和二年至四年逐紇那立翳槐又賀蘭部也挾親恃功所以不恭諸部皆叛代王紇那自宇文部入諸部復奉之紇那出奔見上卷咸和四年復扶又翻趙人厚遇之九年初張軌及二子實茂雖保據河右而軍旅之事無歲無之及張駿嗣位境內漸平駿勤修庶政總御文武咸得其用民富兵強遠近稱之以為賢君駿遣將楊宣伐龜茲鄯善於是西域諸國焉耆于填之屬皆詣姑臧朝貢龜茲音丘慈鄯上扇翻填徒賢翻又徒見翻駿於姑臧南作五殿駿起謙光殿四面各起一殿東曰宜陽青殿以春三月居之南曰朱陽赤殿夏三月居之西曰政刑白殿秋三月居之北曰玄武黑殿冬三月居之章服器物皆依方色駿有兼秦雍之志雍於用翻遣參軍麴護上疏以為勒雄既死虎期繼逆兆庶離主離力智翻漸冉經世先老消落後生不識慕戀之心日遠日忘乞敕司空鑒征西亮等泛舟江沔首尾齊舉郗鑒時鎮京口庾亮時鎮武昌沔彌兗翻二二原誤作三章十二行本三作二乙十一行本同退齋校同年丙申三三六九年春正月辛巳彗星見于奎婁西方奎十六星天之武庫也主以兵禁暴又主溝瀆婁三星為天獄主苑牧犧牲供給郊祀奎婁胄魯徐州分彗祥歲翻又旋芮翻又徐醉翻見賢遍翻九年慕容皓將討慕容仁司馬高詡曰仁叛棄君親民神共怒前此海未嘗凍自仁反以來連年凍者三矣且仁專備陸道天其或者欲使吾乘海冰以襲之也皓從之㣥僚皆言涉冰危事不若從陸道皓曰吾計已決敢沮者斬沮在呂翻壬午皓帥其弟軍師將軍評等自昌黎東踐冰而進皓呼廣翻帥讀曰率下同凡三百餘里至歷林口歷林口海浦之口輕兵趣平郭重直用翻趣七喻翻下同去城七里候騎以告仁騎奇寄翻仁狼狽出戰張英之俘二使也事見上年使疏吏翻及皓至仁以為皓復遣偏師輕出寇抄復扶又翻抄楚交翻不知皓自來謂左右曰今茲當不使其匹馬得返矣乙未仁悉衆陳於城之西北慕容軍帥所部降於皓咸和八年軍為仁所執陳讀曰陳降戶江翻沮在呂翻皓從而縱擊大破之仁走其帳下皆叛遂擒之皓先為斬其帳下之叛者為于偽翻然後賜仁死丁衡遊毅孫機等皆仁所信用也皓執而斬之王冰自殺慕容幼慕容稚佟壽郭充翟楷龐鑒皆東走幼中道而還皓兵追及楷鑒斬之壽充奔高麗麗力知翻自餘吏民為仁所詿誤者詿古賣翻皓皆赦之封高詡為汝陽侯九年二月尚書僕射王彬卒九年辛亥帝臨軒遣使備六禮逆故當陽侯杜乂女陵陽為皇后婚有六禮一曰納采者將為婚必先媒通其言乃後使人納其采擇之禮用鴈為贄取其陰陽往來之義也二曰問名者問名以卜其吉凶也三曰納吉者卜於廟得吉兆復使往告婚姻之事也四曰納徵用玄纁不用鴈五曰請期由夫家卜得吉日使人往告之六曰親迎壻往女家御輪三周御者代之壻自乘其車而先以導婦歸㣥臣畢賀九年夏六月段遼遣中軍將軍李詠襲慕容皓詠趣武興武興城在令支東遼別遣段蘭將步騎數萬屯柳城西回水回水載記作曲水水經注陽樂水出上谷且居縣東北流徑女祁縣世謂之橫水又謂之陽曲水又濡河從塞外來西北徑禦夷鎮城又東北徑孤山南又東南水流回曲謂之曲河鎮又據載記曲水當在好城西北將即亮翻騎奇寄翻皓帥步騎五萬向柳城蘭不戰而遁皓引兵北趣安晉咸安八年皓築安晉城趣七喻翻重直用翻皓遣司馬封奕帥輕騎追擊大破之皓謂諸將曰二虜恥無功必將復至復扶又翻宜於柳城左右設伏以待之乃遣封奕帥騎數千伏於馬兜山三月張三月作七月段遼果將數千騎來寇抄抄楚交翻奕縱擊大破之斬其將榮伯保九年前廷尉孔坦卒坦先以疾解廷尉故曰前庾冰省之流涕省悉景翻坦慨然曰大丈夫將終不問以濟國安民之術乃為兒女子相泣邪冰深謝之九年九月慕容皓遣長史劉斌兼郎中令遼東陽景送徐孟等還建康晉制王國乃有郎中令皓未為王而僭置是官斌音彬九年冬十月廣州刺史鄧嶽遣督護王隨等擊夜郎興古皆克之懷帝永嘉五年王遜分牂柯朱提建寧立夜郎郡太康地志曰蜀劉氏分建寧牂柯立興古郡九年成主期以從子尚書僕射武陵公載有雋才忌之從才用翻誣以謀反殺之九年十一月詔建威將軍司馬勳將兵安集漢中成漢王壽擊敗之敗補邁翻壽遂置漢中守宰戍南鄭而還九年索頭郁鞠帥衆三萬降於趙索頭鮮卑種言索頭以別於黑匿郁鞠以其辮髮故謂之索頭索昔各翻帥讀曰率降戶江翻散其部衆於冀青等六州九年趙王虎作太武殿於襄國作東西宮於鄴東宮以居太子邃西宮虎自居之皆成太武殿基高二丈八尺縱六十五步廣七十五步甃以文石高居號翻縱子容翻廣古曠翻甃側救翻下穿伏室伏室即窟室也以漆灌瓦金璫銀楹司馬相如羽獵賦華榱璧璫注云璧璫以玉為椽頭當即所謂璇題者也三輔黃圖注云以璧飾瓦之當也又琅璫鐸也杜甫詩風動金琅璫此金璫蓋以金飾瓦之當也楹柱也璫音當玉壁窮極工巧殿上施白玉牀流蘇帳為金蓮華以冠帳頂華讀曰花冠古玩翻又作九殿于顯陽殿後選士民之女以實之服珠玉被綺縠者萬餘人被皮義翻教宮人占星氣馬步射置女太史雜伎工巧皆與外同與外同者教宮人使執作如男子也伎渠綺翻車駕法從次第曰鹵簿騎奇寄翻著陟略翻陸德明曰綸繩也蓋合絲為綸其狀如繩染紫以織巾也今鎮江金壇人能織線番羅亦合絲為線以織之熟錦袴金銀鏤帶鏤即豆翻五文織成鞾五文五色成文也廣雅曰天竺國出細織成魏略曰大秦國用水羊毛木皮野繭絲作織成皆好此以五采織成為鞾也鞾許戈翻羽儀氅毦之屬鼓吹軍樂也吹尺瑞翻於是趙大旱金一斤直粟二斗百姓嗷然而虎用兵不息百役並興使牙門張彌徙洛陽鍾虡九龍翁仲銅駝飛廉於鄴鍾虡九龍翁仲銅駝飛廉皆魏明帝所鑄虡音巨轍廣四尺深二尺考之字書無車岡字當作輞音罔車輮也轍車輪所碾迹也廣古曠翻深式禁翻募浮沒三百人浮沒在水中能浮能沒者繫以竹緪緪居登翻又居鄧翻大索也用牛百頭鹿櫨引之乃出鹿櫨形如汲水木立兩柱橫木貫柱令圓滑可轉繫緪於橫木絞而引之櫨音盧既至鄴虎大悅為之赦二歲刑為于偽翻賚百官穀帛賜民爵一級又用尚方令解飛之言解姓也飛名也解戶買翻以作飛橋功費數千萬億橋竟不成役夫飢甚乃止使令長帥民入山澤采橡及魚以佐食復為權豪所奪令力定翻長知兩翻帥讀曰率復扶又翻民無所得九年初日南夷帥范稚有奴曰范文帥所類翻常隨商賈往來中國賈音古後至林邑教林邑王范逸作城郭宮室器械逸愛信之林邑國本漢象林縣馬援鑄銅柱之處也漢末縣功曹子區連殺令自立為王子孫相承其後無嗣外孫范熊繼立逸熊子也將即亮翻文遂譖逸諸子或徙或逃是歲逸卒文詐迎逸子於他國置毒於椰酒而殺之椰木出交趾高數十丈葉背面相似瓊臺志曰椰子無時而生樹似檳榔葉如鳳尾實大如瓜剖之其中有酒其皮可為飲器交州記曰椰子生南海狀如海棕子大如碗外有粗皮如大腹子豆寇之類中有漿似酒飲之得醉爾雅翼椰木似檳榔無枝條高十餘尋葉在其末如束蒲實大如瓠繫在樹頭實外有皮如胡桃核裏有膚白如雪厚半寸如者膏味美如胡桃膚裏有汁升餘清如水美如蜜飲之可以愈渴核作飲器椰以嗟翻於是出兵攻大岐界小岐界式僕徐狼屈都乾魯扶單等國皆滅之有衆四五萬遣使奉表入貢使疏吏翻九年趙左校令成公段作庭燎於杠末姓譜衛成公之後為成公氏余按春秋之時魯晉皆有成公豈獨衛成公之後得專以為氏哉杠古雙翻上盤置燎古之人君昧旦視朝故設庭燎鄭氏云在地曰燎執之曰燭又云樹之門外曰大燭於內曰庭燎皆是照衆為明今成公段懸盤於杠以置燎創意為之非有古法也燎力照翻徐又力燒翻高居傲翻趙王虎試而悅之三年三年春正月庚辰趙太保夔安等文武五百餘人入上尊號上時掌翻庭燎油灌下盤死者二十餘人考異曰載記云七人今從三十國春秋惡烏路翻腰斬成公段辛巳虎依殷周之制稱大趙天王即位於南郊大赦立其后鄭氏為天王皇后古者稱王后稱王后稱皇帝后稱皇后未有天王皇后之稱也古之王者其嫡長曰世子秦漢稱皇帝立皇太子未有天王皇太子之稱也宗室為王者降為縣侯百官封署各有差三年國子祭酒袁王褱王褱公回翻太常馮懷以江左寖安請興學校校戶教翻帝從之辛卯立太學徵集生徒而士大夫習尚老莊儒術終不振王褱渙之曾孫也漢末劉備舉袁渙茂才後仕魏行御史大夫事三年三月慕容皓於乙連城東築好城以逼乙連乙連城段國之東境也在曲水之西夏四月段遼以車數千兩輸乙連粟兩力讓翻乘也蘭勃擊而取之六月遼又遣其從弟揚威將軍屈雲將精騎夜襲皓子遵於興國城興國城蓋慕容氏所築從才用翻將即亮翻騎奇寄翻初北平陽裕事段疾陸眷及遼五世疾陸眷涉復辰末柸牙遼凡五世遼數與皓相攻數所角翻裕諫曰親仁善鄰國之寶也左傳陳五父之言迭為甥舅廆皓皆娶于段氏蓋前此慕容氏亦女于段也而我與之搆怨戰無虛月百姓雕弊利不補害臣恐社稷之憂將由此始願兩追前失通好如初好呼到翻下好妝同以安國息民遼不從出裕為北平相相息亮翻三年趙太子邃素驍勇驍堅堯翻趙王虎愛之常謂㣥臣曰司馬氏父子兄弟自相殘滅故使朕得至此如朕有殺阿鐵理否阿鐵邃小字也阿讀從安入聲好妝飾美姬斬其首洗血置盤上與賓客傳觀之又烹其肉共食之好呼到翻河間公宣樂安公韜皆有寵於虎邃疾之如讎虎荒耽酒色喜怒無常使邃省可尚書事省悉景翻每有所關白虎恚曰此小事何足白也時或不聞又恚曰何以不白恚於避翻恨怒也誚責笞捶誚才笑翻捶止蕊翻月至再三邃私謂中庶子李顏等曰官家難稱稱天子為官家始見於此西漢謂天子為縣官東漢謂天子為國家故兼而稱之或曰五帝官天下三王家天下故兼稱之難稱尺證翻事見十一卷漢高帝六年冒莫北翻顏等伏不敢對秋七月邃稱疾不視事潛帥宮臣文武五百餘騎飲於李顏別舍帥讀曰率騎奇寄翻因謂顏等曰我欲至冀州冀州治信都有不從者斬行數里騎皆逃散顏叩頭固諫邃亦昏醉而歸其母鄭氏聞之私遣中人誚讓邃邃怒殺之誚才笑翻佛圖澄謂虎曰陛下不宜數往東宮數所角翻虎將視邃疾思澄言而還既而瞋目大言曰瞋七人翻我為天下主父子不相信乎乃命所親信女尚書往察之邃呼前與語因抽劍擊之虎怒收李顏等詰問顏具言其狀殺顏等三十餘人幽邃于東宮既而赦之引見太武東堂水經注曰魏武居鄴為北宮宮有文昌殿石氏於故殿處起東西太武二殿見賢遍翻俄頃即出虎使謂之曰太子應朝中宮豈可遽去朝直遙翻邃徑出不顧虎大怒廢邃為庶人其夜殺邃考異曰燕書文明紀云咸康四年四月石虎至燕城下會鄴使至太子邃在後恣酒入宮殺害石主大恐狼狽引還又云初帳下吳胄使鄴還説四月浴佛日行像詣宮石太子邃騎出迎像往來馳騁無有儲君體王曰古者觀威儀以定禍福此子虎之副二而輕佻無禮將不得其死然及石主東歸留邃監國荒敗內亂以致誅戮按十六國晉春秋殺邃皆在咸康三年燕書恐誤今從十六國晉春秋並男女二十六人同埋於一棺誅其宮臣支黨二百餘人廢鄭后為東海太立其子宣為天王皇太子宣母杜昭儀為天王皇后三年安定侯子光自稱佛太子云從大秦國來當王小秦國聚衆數千人於杜南山京兆杜陵縣之南山也改元龍興石廣討斬之三年九月鎮軍左長史封奕等帝拜皓鎮軍大將軍皓以奕為左長史皓從之於是備置㣥司以封奕為國相相息亮翻韓壽為司馬裴開為奉常陽騖為司隸王宇為太僕李洪為大理杜㣥為納言令宋該劉睦石琮為常伯皇甫真陽協為宀兒騎常侍納言令晉之尚書令常伯晉之侍中宀兒騎常侍晉之散騎常侍宀兒而隴翻騎奇寄翻封裕為記室監洪臻之孫李臻見八十七卷懷帝永嘉三年奭之子也宋奭見八十八卷愍帝建興元年十月丁卯皓即燕王位大赦十一月甲寅追尊武宣公為武宣王廆諡武宣公立夫人段氏為王后世子俊為王太子如魏武晉文輔政故事三年段遼數侵趙邊數所角翻燕王皓遣揚烈將軍宋回稱藩於趙乞師以討遼自請盡帥國中之衆以會之帥讀曰率並以其弟寧遠將軍汗為質沈約志寧遠將軍晉江左置蓋始於此時質音致下同厚加慰答辭其質遣還密期以明年為趙燕攻段遼張本三年是歲趙將李穆納拓跋翳槐於大寧其故部落多歸之元年翳槐奔趙國人復奉翳槐章十二行本槐下有為代王翳槐五字乙十一行本同孔本同張校同退齋校同城盛樂而居之復扶又翻樂音洛三年仇池氐王楊毅族兄初襲殺毅並有其衆自立為仇池公稱臣於趙何茲全標點王崇武聶崇岐覆校
