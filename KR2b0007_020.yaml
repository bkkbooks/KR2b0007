body:
  text: 資治通鑑卷第二十翰林學士朝散大夫右諫議大夫知制誥兼侍講同提舉萬壽觀公事兼判集賢院上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣奉敕編集後學天台音注漢紀十二元狩五年世宗孝武皇帝中之下元狩五年癸亥前一一八元狩五年春三月甲午丞相李蔡坐盜孝景園堧地葬其中當下吏自殺堧而緣翻下遐嫁翻元狩五年罷三銖錢更鑄五銖錢去年廢半兩錢行三銖錢更工衡翻考異曰漢書食貨志前以銷半兩錢鑄三銖錢明年以三銖錢輕更鑄五銖錢武帝元狩五年乃云罷半兩錢行五銖錢誤也楚地尤甚上以為淮陽楚地之郊師古曰郊謂交迫衝要之處黯去年免故召拜之守式又翻詔數強豫強其兩翻豫讀曰與然後奉詔黯為上泣曰為于偽翻下正為同臣自以為填溝壑不復見陛下復扶又翻填大賢翻不意陛下復收用之臣常有狗馬病力不能任郡事任音壬臣願為中郎出入禁闥補過拾遺臣之願也上曰君薄淮陽邪吾今召君矣師古曰言後即召也師古曰顧思念也言吏民不相安而失其所也師古曰徒但也重威重也黯既辭行過大行李息曰黯棄逐居郡不得與朝廷議矣過古禾翻與讀曰預御史大夫湯智足以拒諫詐足以飾非務巧佞之語辨數之辭非肯正為天下言專阿主意主意所不欲因而毀之主意所欲因而譽之譽音餘好興事舞文法好呼到翻內懷詐以御主心外挾賊吏以為威重公列九卿不早言之公與之俱受其戮矣息畏湯終不敢言及湯敗上抵息罪師古曰抵至也致之於罪也使黯以諸侯相秩居淮陽如淳曰諸侯王相在郡守上秩真二千石月得百五十斛歲凡得千八百石二千石月得百二十斛歲凡得千四百四十石耳元狩五年詔徙姦猾吏民於邊元狩五年夏四月乙卯以太子少傅武強侯莊青翟為丞相武強侯莊不識高祖功臣青翟其孫也班志武強縣屬廣川唐冀州武強縣是也元狩五年天子病鼎湖甚晉灼曰黃圖鼎湖宮名在京兆班志湖本在京兆後分屬弘農索隱曰昔黃帝採首山銅鑄鼎於湖曰鼎湖即今之湖城縣也不愈遊水發根言上郡有巫病而鬼神下之服虔曰遊水縣名發根人名晉灼曰地理志遊水水名在臨淮師古曰二説皆非也遊水姓也發根名也蓋因水為姓也本嘗遇病而神下之故為巫也下戶嫁翻降附也祠之甘泉及病使人問神君神君言曰天子無憂病病少愈強與我會甘泉少詩沼翻強其兩翻於是病愈遂起幸甘泉病良已孟康曰良已善已謂愈也帝置壽宮以奉神君臣瓚曰壽宮奉神之宮也楚辭曰蹇將淡兮壽宮括地志壽宮在雍州長安縣西北三十里長安故城中聞其言言與人音等時去時來來則風肅然居室帷中神君所言上使人受書其言命之曰畫法孟康曰策畫之法也世俗之所知也無絶殊者而天子心獨喜其事祕世莫知也師古曰喜好也音許吏翻時上卒起幸甘泉卒讀曰猝過右內史界中道多不治上怒曰義縱以我為不復行此道乎銜之師古曰銜含也包含在心以為過也復扶又翻六年六年冬十月雨水無冰雨于具翻六年上既下緡錢令而尊卜式事見上卷四年於是楊可告緡錢縱矣縱放也肆也部吏捕其為可使者天子以縱為廢格沮事孟康曰武帝使楊可主告緡沒入其財物縱捕其為可使者此為廢格詔書沮已成之事也格音閣沮才汝翻壞也考異曰漢書武紀元鼎三年十一月令民告緡據義縱傳則在今冬六年郎中令李敢怨大將軍之恨其父怨大將軍衛青也恨其父事見上卷四年師古曰令其父抱恨而死也大將軍匿諱之居無何師古曰無何謂未多時也師古曰雍之所在地形積高故曰上也上時掌翻雍於用翻票騎將軍去病射殺敢射而亦翻考異曰史記封禪書云明年天子病鼎湖甚病愈幸甘泉大赦莫知其為何年本紀皆無其事獨義縱傳有之按漢書百官公卿表義縱李敢死皆在今年敢傳云從上雍至甘泉宮雍蓋衍字也平準書云自造白金五銖錢後五歲赦按武紀元狩四年造白金元鼎元年赦首尾四年若今年更有赦則四年再赦與平準書不合今從百官表去病時方貴幸上為諱云鹿觸殺之為于偽翻六年夏四月乙巳廟立皇子閎為齊王旦為燕王胥為廣陵王初作誥策師古曰於廟中策命之服虔曰誥敕王如尚書諸誥李奇曰今敕封拜諸王策文起於此毛晃曰漢制天子之策長二尺釋名曰策書教令於上所以驅策於下也六年自造白金五銖錢後吏民之坐盜鑄金錢死者數十萬人其不發覺者不可勝計勝音升天下大抵無慮皆鑄金錢矣師古曰抵歸也大歸猶言大凡也無慮亦謂大率無少計慮云耳吏不能盡誅六年六月詔遣博士褚大徐偃等六人姓譜宋恭公子石食采於褚其德可師號曰褚師因以命氏舉兼並之徒及守相為吏有罪者守郡守相諸侯相也六年秋九月冠軍景桓侯霍去病薨冠古玩翻天子甚悼之為冢像祁連山初霍仲孺吏畢歸家霍仲孺本河東平陽縣吏給事平陽侯家與侍者衛少兒私通而生去病吏畢言為吏畢免歸家也生子光去病既壯大乃自知父為霍仲孺會為票騎將軍擊胸奴道出河東遣吏迎仲孺而見之大為買田宅奴婢而去為于偽翻及還因將光西至長安任以為郎稍遷至奉車都尉任保任也帝置奉車都尉掌御乘輿車秩比二千石六年是歲大農令顏異誅景帝後元年更治粟內史為大農令考異曰徐廣注史記平準書云異誅在元狩四年壬戌歲廣見漢書百官公卿表其年注云大農令顏異二年坐腹非誅不思有二年字致此誤也初異以廉直稍遷至九卿上與張湯既造白鹿皮幣見上卷四年異曰今王侯朝賀以蒼璧直數千而以皮薦反四十萬時王侯朝賀以皮幣薦璧故曰皮薦朝直遙翻天子不説稱尺證翻説讀曰悅張湯又與異有郤郤讀曰隙及人有告異以他事下張湯治異下遐嫁翻異與客語初令下有不便者李奇曰異與客語詔令初下有不便處微反脣師古曰蓋非也異九卿見令不便不入言而腹誹論死自是之後有腹誹之法比師古曰比則例也讀如字又頻寐翻而公卿大夫多諂諛取容矣元鼎元年乙丑前一一六應劭曰得寶鼎故因是改元考異曰漢書武紀此年云得鼎汾水上漢紀云六月得寶鼎于河東汾水上吾丘壽王對云云按封禪書欒大封樂通侯之歲其夏六月汾陰巫錦為民祠魏脽后土營旁得鼎詔曰間者巡祭后土云云武紀元鼎四年十月幸汾陰十一月立后土祠於汾陰脽上六月得寶鼎后土祠旁禮樂志又云元鼎五年得寶鼎恩澤侯表元鼎四年四月乙巳欒大封侯然則得鼎應在四年蓋武紀因今年改元而誤增此得鼎一事耳非兩曾得鼎於汾水上也封禪書天子封泰山反至甘泉有司言寶鼎出為元鼎以今年為元封元年然則元鼎年號亦如建元元光皆後來追改之耳六年夏五月赦天下六年濟東王彭離驕悍彭離梁孝王子景帝中六年受封濟子禮翻悍下罕翻又侯旰翻與其奴亡命少年數十人行剽殺人取財物以為好如淳曰以是為好喜之事也剽匹妙翻劫也好呼到翻坐廢徙上庸班志上庸縣屬漢中郡二年二年冬十一月張湯有罪自殺初御史中丞李文與湯有郤班表御史大夫有兩丞一曰中丞在殿中蘭臺掌圖籍祕書外督部刺史內領侍御史員十五人受公卿奏事舉劾按章成帝綏和元年更名御史大夫為大司空置長史而中丞官職如故哀帝建平二年復為御史大夫元壽二年又為大司空而中丞出外為御史臺主歷漢東京至魏晉以下皆然郤讀曰隙下同事下湯治論殺之上時掌翻下遐嫁翻下同湯心知謁居為之上問變事蹤迹安起湯佯驚曰此殆文故人怨之師古曰殆近也湯親為之摩足為于偽翻趙王素怨湯上書告湯大臣乃與吏摩足疑與為大姦事下廷尉謁居病死事連其弟弟繫導官蘇林曰漢儀注獄二十六所導官無獄也師古曰蘇説非也導擇也以主擇米故曰導官時或以諸獄皆滿故權寄此署繫之非本獄所也班表導官屬少府見謁居弟欲陰為之而佯不省囚徐尤翻為于偽翻省心景翻謁居弟弗知怨湯使人上書告湯與謁居謀共變告李文事下減宣減宣人姓名減古斬翻及得此事窮竟其事未奏也會人有盜發孝文園瘞錢如淳曰瘞埋也埋錢於園陵以送死也瘞於計翻與湯約俱謝師古曰將入朝之時為此要約朝直遙翻至帝之前也湯以丞相四時行園陵當謝御史大夫不豫園陵事故不謝湯欲致其文丞相見知欲以見知故縱之罪罪丞相丞相長史朱買臣王朝邊通皆故九卿二千石朱買臣嘗為主爵都尉王朝至右內史邊通至濟南相陳留風俗傳邊祖于宋平公子戎字子邊余按左傳周有大夫邊伯湯數行丞相事數所角翻知三長史素貴故陵折丞史遇之三長史皆怨恨欲死之欲以死發湯之姦也使吏捕案賈人田信等曰湯且欲奏請信輒先知之居物致富服虔曰居謂儲也賈音古下同事辭頗聞師古曰聞於天子也吾所為賈人輒先知之益居其物師古曰益多也師古曰類似也又佯驚曰固宜有減宣亦奏謁居等事天子以湯懷詐面欺師古曰對面欺誣也湯乃為書謝因曰陷臣者三長史也遂自殺湯既死家産直不過五百金昆弟諸子欲厚葬湯湯母曰湯為天子大臣被汙惡言而死被皮義翻汙烏故翻何厚葬乎載以牛車有棺無槨天子聞之乃盡按誅三長史十二月壬辰丞相青翟下獄自殺二年春起柏梁臺服虔曰用百頭梁作臺因名焉師古曰三輔舊事云以香柏為之今書皆作柏服説非也高二十丈高居號翻大七圍以銅為之上有仙人掌以承露和玉屑飲之云可以長生宮室之修自此日盛二年二月以太子太傅趙周為丞相二年三月辛亥以太子太傅石慶為御史大夫衛有大夫石氏二年大雨雪雨于具翻二年夏大水關東餓死者以千數二年是歲孔僅為大農令而桑弘羊為大農中丞班表大農有兩丞元狩四年以東郭咸陽及孔僅為之今置中丞其位當在兩丞上以通貨物時置均輸官於郡國令遠方各以其物而灌輸置平準於京師都受天下委輸貴則賣之賤則買之使富商大賈無所牟利杜佑曰漢武帝置均輸謂所當輸於官者皆令輸其土地所饒平其所在時價官更於他處賣之輸者既便而官有利二年白金稍賤民不寶用竟廢之鑄白金見上卷元狩四年專令上林三官鑄錢令天下非三官錢不得行裴駰曰百官表水衡都尉掌上林苑屬官有上林均輸鍾官辨銅令然則上林三官其是此三令乎計其費不能相當惟真工大姦乃盜為之二年渾邪王既降漢見上卷元狩元年見上卷元狩元年西域道可通於是張騫建言烏孫王昆莫本為胸奴臣後兵稍強不肯復朝事胸奴胸奴攻不勝而遠之朝直遙翻遠于願翻今單于新困於漢而故渾邪地空無人蠻夷俗戀故地又貪漢財物今誠以此時厚幣賂烏孫招以益東居故渾邪之地張騫傳昆莫父難兜靡本與大月氏同在敦煌祁連間小國也大月氏攻殺難兜靡奪其地而大月氏又為胸奴所破西擊塞王而奪其國昆莫報父怨西攻破大月氏國因留居為烏孫國騫欲誘之復歸故地其勢宜聽聽則是斷胸奴右臂也斷丁管翻既連烏孫自其西大夏之屬皆可招來而為外臣天子以為然拜騫為中郎將將三百人馬各二匹牛羊以萬數齎金幣帛直數千巨萬多持節副使師古曰為騫之副而各令持節也遣之他旁國沿道有便可通使他國者即遣之騫既至烏孫昆莫見騫禮節甚倨騫諭指曰師古曰以天子意指曉告之烏孫能東居故地則漢遣公主為夫人結為兄弟共距胸奴胸奴不足破也烏孫自以遠漢未知其大小素服屬胸奴日久且又近之近其靳翻其大臣皆畏胸奴不欲移徙騫留久之不能得其要領要讀曰腰因分遣副使使大宛康居大月氏大夏安息身毒于闐及諸旁國烏孫發譯道送騫還宛於元翻氏音支身毒音捐篤闐徒賢翻又徒見翻師古曰道讀曰導使數十人馬數十匹隨騫報謝因令窺漢大小是歲騫還到拜為大行後歲餘騫所遣使通大夏之屬者皆頗與其人俱來晉灼曰其國人西域凡三十六國南北有大山中央有河西域始通於漢凡三十六國其後分置五十餘國婼羌鄯善且末小宛精絶戎盧扜彌渠勒皮山烏秅西夜蒲犁子合依耐無雷難兜罽賓烏弋山離犁鞬條支安息大月氏大夏康居奄蔡大宛桃槐休循捐篤莎車疏勒尉頭烏孫姑墨溫宿龜茲烏壘渠犂尉犂危須焉耆烏貪訾離卑陸卑陸後國郁立師單桓蒲類蒲類後國西且彌東且彌劫國山國狐胡車師前後王是也南北有大山者南山在于填之南東出金城與漢南山接北山在車師之北即唐志所謂西州交河縣北柳谷金沙嶺等山是也中央有河者河有兩源一出蔥嶺一出于填南山其河北流與蔥嶺河合注蒲昌海自于填以西水皆西流徑休循罽賓大月氏安息等國而入于西海蒲昌之水潛行地下南出積石為中國河西海之水東南合于交州漲海南北千餘里東則接漢玉門陽關班志敦煌郡龍勒縣有玉門關陽關酒泉郡有玉門縣闞駰曰漢罷玉門關屯置其人於此括地志沙州龍勒山在縣南百六十五里玉門關在縣西北百一十八里西河舊事蔥嶺其山高大上悉生蔥故以名焉一出蔥嶺一出于填章十四行本填作闐乙十一行本同孔本同合流東注鹽澤鹽澤去玉門陽關三百餘里自玉門陽關出西域有兩道從鄯善傍南山北循河西行至莎車為南道鄯善亦曰樓蘭國治杅尼城去陽關千六百里鄯上扇翻傍步浪翻莎車治莎車城去長安九千九百五十里莎素河翻則出大月氏安息自車師前王廷隨北山循河西行至疏勒為北道車師前王治交河城去長安八千一百五十里唐西州交河縣是也疏勒治疏勒城去長安九千三百五十里西當大月氏大宛康居之道則出大宛康居奄蔡焉杜佑曰奄蔡後為肅粟故皆役屬胸奴胸奴西邊日逐王置僮僕都尉胸奴蓋以僮僕視西域諸國故以名官常居焉耆危須尉黎間焉耆治員渠城去長安七千三百里危須治危須城在焉耆東百里去長安七千二百九十里尉犂治尉犂城去長安六千七百五十里南接鄯善且末二國取富給焉烏孫王既不肯東還漢乃於渾邪王故地置酒泉郡應劭曰其水如酒故曰酒泉師古曰城下有金泉泉味如酒唐為肅州宋白曰東南至長安二千九百里後又分置武威郡本胸奴休屠王所居地太初四年分置武威郡唐之涼州即其地宋白曰東南至長安二千八百里天子得宛汗血馬愛之名曰天馬使者相望於道以求之諸使外國一輩大者數百少者百餘人人所齎操大放博望侯時齎資也操持也放依也言遣使所將節幣大概依遣博望侯時也放讀曰倣師古曰以其串習故不多發人少詩沼翻少者五六輩遠者八九歲近者數歲而反三年三年冬徙函谷關於新安據班史以故關為弘農縣應劭曰弘農去新安三百里述征記新安縣今猶謂之新關三年春正月戊子陽陵園火三年夏四月雨雹雨于具翻三年關東郡國十餘飢人相食三年常山憲王舜薨舜景帝子中五年受封諡法博聞多能曰憲坐憲王病不侍病及居喪無禮廢徙房陵班志房陵縣屬漢中郡宋白曰闞駰云即春秋防渚地漢獻帝改防為房兼立房陵郡今為房州天子更封憲王子平為真定王真定縣本屬常山今分真定綿曼藳城肥纍四縣為王國於是五嶽皆在天子之邦矣華山嵩高本在天子之郡南嶽霍山屬廬江淮南衡山謀反國除入漢為郡元狩元年濟北王獻太山及其旁邑今又以常山為郡然後皆在天子之邦三年徙代王義為清河王義文帝子代王參之孫王登之子清河王乘孝景之子薨無子國除徙代王王焉三年是歲胸奴伊稚斜單于死子烏維單于立四年四年冬十月上行幸雍祠五畤雍於用翻畤音止詔曰今上帝朕親郊而后土無祀則禮不答也師古曰答對也郊天而不祀地失對偶之義一曰闕地祇之祀不為神所答應立后土祠於澤中圜丘郊祀志有司議祠后土宜於澤中圜丘為五壇班志夏陽縣屬左馮翊汾陰縣屬河東郡天子始巡郡國河東守不意行至不辦自殺不意天子行幸至郡供具不能備也甲子立后土祠於汾陰脽上如淳曰脽者河之東岸特堆堀長四五里廣二里餘高十餘丈汾陰縣治脽之上后土祠在縣西汾在脽之北西流與河合師古曰脽者以其形高起如人尻脽故以名云一説此臨汾水之上地本名鄈音與葵同彼鄉人呼葵音如誰故轉而為脽字耳故漢舊儀曰鄈上脽音誰如上帝禮禮畢行幸滎陽還至洛陽班志滎陽洛陽並屬河南郡臣瓚曰汲冢古文謂衛將軍文子為子南彌牟其後有子南固子南徑紀年徑朝於魏後惠成王如衛命子南為侯秦並六國衛最後亡疑嘉是衛後故氏子南而稱君也師古曰子南其封邑之號以為周後故總言周子南君瓚説非也例不先言姓而後稱君且自嘉以下皆姓姬著於史傳余據恩澤侯表周子南君食邑於潁川長社四年春二月中山靖王勝薨勝景帝子中二年受封四年樂成侯丁義義高祖功臣丁禮之曾孫班志樂成侯國屬南陽郡考異曰漢書郊祀志作樂成侯登按史記漢書功臣表當為丁義云與文成將軍同師上方悔誅文成誅文成見上卷元狩四年大説説讀曰悅大先事膠東康王康王寄上弟也師古曰善為甘美之言而敢為大言處之不疑處昌呂翻大言曰臣常往來海中見安期羡門之屬顧以臣為賤不信臣又以為康王諸侯耳不足與方臣之師曰黃金可成而河決可塞塞悉則翻不死之藥可得仙人可致也然臣恐效文成則方士皆掩口惡敢言方哉惡音烏上曰文成食馬肝死耳索隱曰論衡云氣勃而毒盛故食走馬肝馬肝殺人儒林傳食肉無食馬肝是也我何愛乎大曰臣師非有求人人者求之陛下必欲致之則貴其使者令為親屬以客禮待之乃可使通言於神人於是上使驗小方鬬旗旗自相觸擊考異曰封禪書郊祀志皆作棊獨史記孝武紀作旗按漢武故事云大嘗於殿前樹旍數百枚大令旍自相擊翻翻竟庭中去地十餘丈觀者皆駭然則作旗字者是也上方憂河決而黃金不就乃拜大為五利將軍又拜為天士將軍地士將軍大通將軍夏四月乙巳封大為樂通侯恩澤侯表樂通侯食邑於安定郡高平縣賜甲第僮千人乘輿斥車馬帷帳器物以充其家師古曰斥不用者也乘繩證翻長知兩翻孟康曰衛太子妹如淳曰衛太子姊也師古曰外戚傳云子夫生三女元朔三年生男據是則衛太子之姊也孟説非妻七細翻齎金十萬斤天子親如五利之第使者存問共給共讀曰供相屬於道屬之欲翻自太主將相以下太主帝姑竇太主也獻遺之遺于季翻天子又刻玉印曰天道將軍據前史下文言為天子道天神則道讀曰導使使衣羽衣夜立白茅上五利將軍亦衣羽衣立白茅上受印以示不臣羽衣緝羽毛為衣也今道士服被之使衣亦衣於既翻佩六印五利天士地士大通天道五將軍併樂通侯為六印於是海上燕齊之間莫不扼腕自言有禁方能神仙矣扼音厄腕烏貫翻四年六月汾陰巫錦應劭曰錦巫名師古曰汾脽本魏地之墳故曰魏脽也營謂后土祠之兆域天子使驗問巫得鼎無姦詐乃以禮祠迎鼎至甘泉從上行如淳曰以鼎從行上甘泉藏於甘泉宮㣥臣皆上壽賀四年秋立常山憲王子商為泗水王泗水統淩泗陽于三縣本屬東海郡帝分為王國四年初條侯周亞夫為丞相周亞夫景帝前七年為相中三年罷府中皆稱其廉平然亞夫弗任曰極知禹無害漢書音義曰文無所枉害蕭何以文無害為沛主吏掾章懷太子賢曰按律有無害都吏如今言公平吏蘇林曰無害若言無比也一曰害勝也無能勝害之者師古曰傷害也無人能傷害之者貢父曰持法者或以私意陷人謂之害故貴於文無害無害者取其為人無害於行則可以為吏矣然文深不可以居大府應劭曰禹持文法深劾比九卿為酷急言以當時九卿同列者比之禹為酷急也吏務為嚴峻而禹更名寬平中尉尹齊素以敢斬伐著名姓譜少昊之子封於尹城子孫因以為氏按尹氏周之世卿吏民益雕敝是歲齊坐不勝任抵罪勝音升上乃復以王溫舒為中尉趙禹為廷尉後四年禹以老貶為燕相是時吏治皆以慘刻相尚治直吏翻獨左內史兒寬勸農業緩刑罰理獄訟務在得人心擇用仁厚士推情與下不求名聲吏民大信愛之收租稅時裁闊狹與民相假貸師古曰謂有貧弱農要之時不即徵收也余謂闊謂征斂稍寬禁防疏闊之時狹謂督促迫急之時闊時不急征收假貸與民使營生業後有軍發左內史以負租課殿當免殿丁練翻課下下曰殿民聞當免皆恐失之大家牛車小家擔負輸租繈屬不絶師古曰繈索也言輸者接連不絶於道若繩索之相屬也猶今言續索矣屬之欲翻課上上曰最四年初南越文王遣其子嬰齊入宿衛南越王胡薨諡文王嬰齊入宿衛見十七卷建元元年取讀曰娶邯鄲屬趙國師古曰樛居虯翻生子興文王薨嬰齊立乃藏其先武帝璽趙他自號南越武帝李奇曰去其僭號興為嗣漢數使使者風諭嬰齊入朝數所角翻師古曰風讀曰諷諷諭令入朝嬰齊尚樂亶殺生自恣懼入見要用漢法比內諸侯樂音洛見賢遍翻下同要讀曰邀恐漢邀之以用朝廷之法如內諸侯王固稱病遂不入見嬰齊薨諡曰明王太子興代立其母為太后太后自未為嬰齊姬時嘗與霸陵人安國少季通師古曰姓安國字少季少詩照翻上使安國少季往諭王王太后以入朝比內諸侯令辨士諫大夫終軍等宣其辭百官表元狩五年初置諫大夫秩八百石師古曰助令決策也班志桂陽縣屬桂陽郡唐為連州桂陽連山二縣地南越王年少太后中國人安國少季往復與私通國人頗知之多不附太后太后恐亂起亦欲倚漢威數勸王及㣥臣求內屬數所角翻即因使者上書請比內諸侯三歲一朝朝直遙翻除邊關於是天子許之賜其丞相呂嘉銀印及內史中尉太傅印餘得自置除其故黥劓刑用漢法比內諸侯使者皆留填撫之漢制諸侯王國二千石以上皆漢朝所命餘得自置今賜南越丞相內史中尉太傅印使之比內諸侯也漢自文帝除肉刑不用黥劓之法故亦令南越除之劓魚器翻又牛例翻填讀曰鎮為呂嘉反張本四年上行幸雍雍於用翻且郊或曰五帝泰一之佐也宜立泰一而上親郊上疑未定齊人公孫卿曰今年得寶鼎其冬辛巳朔旦冬至與黃帝時等卿有札書師古曰等同也札木簡之薄小者也黃帝得寶鼎是歲己酉朔旦冬至凡三百八十年黃帝仙登于天因嬖人奏之嬖卑義翻又博計翻上大悅召問卿對曰受此書申公申公曰漢興復當黃帝之時漢之聖者在高祖之孫且曾孫也寶鼎出而與神通黃帝接萬靈明庭明庭者甘泉也黃帝采首山銅班志河東蒲坂縣有首山班志馮翊懷德縣有荊山有龍垂胡髯下迎黃帝師古曰胡謂頷下垂肉也髯其毛也髯人占翻與㣥臣後宮七十餘人俱登天於是天子曰嗟乎誠得如黃帝吾視去妻子如脫屣耳師古曰屣小履也脫屣者言其便易無所顧也屣山爾翻使東候神於太室師古曰太室山在潁川崇高縣是為中嶽五年五年冬十月上祠五畤於雍遂踰隴隴坻也在天水郡隴縣三秦記曰其坂九曲上隴者七日乃越唐地理志崆洞在岷州溢樂縣西岷州漢臨洮之地史記作空桐正義曰空桐山在原州平高縣西百里卒讀曰猝天子從官不得食惶恐自殺從才用翻於是上北出蕭關從數萬騎獵新秦中以勒邊兵而歸新秦中或千里無亭徼於是誅北地太守以下唐麟州治新秦杜佑漢新秦中地余謂唐取漢新秦中之名以名郡耳麟州不能盡有漢新秦中之地也北地與朔方接境時朔方新置郡蓋使北地並力以營築亭徼也徼吉弔翻立泰一祠壇所用祠具如雍一畤而有加焉雍有五畤今祠太一所用如雍一畤之祠具也有加者加醴棗脯之屬為醊食㣥神從者及北斗云説文醊祭酎也師古曰謂聯屬而祭也醊竹芮翻食讀曰飼從才用翻辛巳朔冬至昧爽昧冥也爽明也謂日尚昧昧而天色漸明也朝朝日夕夕月則揖應劭曰天子春朝日秋夕月朝日以朝夕月以夕臣瓚曰漢儀注郊泰畤皇帝平旦出竹宮東向揖日其夕西南向揖月便用郊日不用春秋也師古曰春朝朝日秋暮夕月蓋常禮郊泰畤而揖日月此又別儀朝朝下直遙翻下同列火滿壇壇旁亨炊具亨讀曰烹有司云祠上有光又云晝有黃氣上屬天屬之欲翻太史令談祠官寬舒等班表太史令屬太常劉昭志秩六百石掌天時星曆凡國祭祀喪娶之事談即司馬談也祠官掌祠祀之官寬舒史逸其姓見賢遍翻詔從之五年南越王王太后飭治行裝重齎治直之翻齎讀曰資為入朝具其相呂嘉年長矣相三王宗族仕宦為長吏者七十餘人男盡尚王女女盡嫁王子弟宗室及蒼梧秦王有連孟康曰蒼梧越中王自名為秦王連親婚也晉灼曰秦王即後趙光趙本與秦同姓故曰秦王余據南越王姓趙曷為不稱南越秦王晉説未為通長知兩翻得衆心愈於王師古曰愈勝也數諫止王王弗聽有畔心數稱病不見漢使者數所角翻使者皆注意嘉勢未能誅王王太后亦恐嘉等先事發先悉薦翻欲介漢使者權謀誅嘉等韋昭曰恃使者為介胄也索隱曰志林云介者因也欲因使者權誅呂嘉也韋昭以介為恃介者間也以言間恃漢使之權意即得矣然云恃為介胄則非也虞喜以介為因亦有所由介者賓主所因也大臣皆侍坐飲坐徂臥翻嘉弟為將將卒居宮外將即亮翻酒行太后謂嘉曰南越內屬國之利也而相君苦不便者何也以激怒使者使者狐疑相杖杖直亮翻遂莫敢發嘉見耳目非是師古曰言異於常也太后怒欲鏦嘉以矛鏦楚江翻王止太后嘉遂出介其弟兵就舍李奇曰介被也師古曰介甲也被甲以自衛也弟兵即上所云弟將卒居外者不肯見王及使者陰與大臣謀作亂王素無意誅嘉嘉知之以故數月不發天子聞嘉不聽命王王太后孤弱不能制使者怯無決又以為王王太后已附漢獨呂嘉為亂不足以興兵欲使莊參以二千人往使往使疏吏翻參曰以好往數人足矣以武往二千人無足以為也辭不可天子罷參郟壯士故濟北相韓千秋班志郟縣屬潁川郡史記正義曰今汝州郟城縣郟音夾千秋蓋相濟北成王胡也胡貞王勃之子以區區之越又有王王太后應獨相呂嘉為害願得勇士三百人必斬嘉以報於是天子遣千秋與王太后弟樛樂將二千人往入越境樛居虯翻呂嘉等乃遂反下令國中曰王年少太后中國人也又與使者亂專欲內屬盡持先王寶器入獻天子以自媚多從人行至長安虜賣以為僮僕取自脫一時之利無顧趙氏社稷為萬世慮計之意乃與其弟將卒攻殺王王太后及漢使者遣人告蒼梧秦王及其諸郡縣立明王長男越妻子術陽侯建德為王建德降漢始封術陽侯史蓋追書也班表術陽侯食邑於東海之下邳長知兩翻破數小邑其後越開直道給食師古曰縱之令深入然後擊滅之番禺南越都番音潘遂滅之使人函封漢使者節置塞上好為謾辭謝罪師古曰謾誑也音慢又莫連翻發兵守要害處春三月壬午天子聞南越反曰韓千秋雖無功亦軍鋒之冠冠古玩翻封其子延年為成安侯班表成安侯食邑於潁川郡之郟縣首願屬漢封其子廣德為龍亢侯班志龍亢縣屬沛國亢音剛考異曰漢書功臣表作龍侯南越傳作龍侯晉灼曰龍古龍字史記建元以來侯者表及南越傳皆作龍亢侯今從之五年夏四月赦天下五年丁丑晦日有食之五年秋遣伏波將軍路博德環濟要略曰伏波將軍者船涉江海欲使波濤伏息也下湟水水經匯水出桂陽縣盧聚南出貞女峽合洭水東南過含洭縣南出洭浦關為桂水山海經以洭水為湟水徐廣曰湟水一名洭水出桂陽通四會師古曰湟音皇下湞水應劭曰湞水出南海龍川西入秦水水經湞水徑桂陽郡之湞陽縣南而右注溱水湞鄭氏曰湞音柳孟康曰湞音貞師古曰湞丈庚翻出零陵下離水張晏曰嚴故越人降為歸義侯越人於水中負人船又有蛟龍之害故置戈於船下因以為名臣瓚曰伍子胥書有戈船以載干戈因謂之戈船也師古曰以樓船之例言之非謂載干戈也此蓋船下安戈以禦蛟鼉水蟲之害張説近之貢父曰船下安戈既難措置又不可以行今造舟船甚多未嘗有置戈者顏北人不曉行船故信張説蓋瓚説是余據表無歸義越侯嚴零陵本屬桂陽帝分置郡唐為永道二州灕水班志出零陵縣陽海山東南至廣信入鬱水下蒼梧服虔曰甲故越人歸漢者臣瓚曰瀨湍也吳越謂之瀨中國謂之磧伍子胥書有下瀨船瀨音賴蒼梧本越地帝始置郡有灕水關唐梧賀康端封之地江淮以南樓船十萬人越馳義侯遺別將巴蜀罪人發夜郎兵下牂柯江咸會番禺齊相卜式上書請父子與齊習船者往死南越天子下詔褒美式賜爵關內侯金六十斤田十頃布告天下天下莫應是時列侯以百數皆莫求從軍擊越會九月嘗酎祭宗廟列侯以令獻金助祭少府省金金有輕及色惡者上皆令劾以不敬奪爵者百六人如淳曰漢儀注王子為侯歲以黃金嘗酎於漢廟皇帝臨受獻金金少不如斤兩色惡王削縣侯免國余據當時失侯者列侯王子侯共一百六人蓋不特王子侯有酎金也酎直又翻省悉景翻劾戶概翻辛巳丞相趙周坐知列侯酎金輕下獄自殺下遐嫁翻五年丙申以御史大夫石慶為丞相封牧丘侯恩澤侯表牧丘侯食邑平原桑弘羊等致利王溫舒之屬峻法而兒寬等推文學皆為九卿更進用事更工衡翻事不關決於丞相丞相慶醇謹而已師古曰醇專厚也五年五利將軍裝治行東入海求其師既而不敢入海之太山祠上使人隨驗實無所見五利妄言見其師其方盡多不售師古曰售應當也不售者無驗也腰斬樂成侯亦棄市五年西羌衆十萬人反與胸奴通使使疏吏翻攻故安圍枹罕故安縣屬涿郡西羌之兵安能至此當作安故班志安故枹罕二縣皆屬隴西郡枹罕故罕羌邑宋白曰安故故城在蘭州南枹罕今河州治所枹音膚罕如字五原即秦九原郡帝更名唐為鹽州宋白曰五原郡有原五所故名謂龍遊原乞地于原青嶺原岢嵐真原橫槽原也五原故城在今榆林縣界守式又翻下同六年六年冬發卒十萬人遣將軍李息郎中令徐自為征西羌平之六年樓船將軍楊僕入越地先陷尋狹狹作陝音姚氏曰尋狹在始興西三百里近連口也狹音狹破石門石門在番禺西北二十里郡國志呂嘉拒漢積石江中為門因名石門以數萬人待伏波將軍路博德至俱進樓船居前至番禺南越王建德相呂嘉城守樓船居東南面伏波居西北面會暮樓船攻敗越人縱火燒城敗蒲賣翻伏波為營師古曰設營壘以待降者賜印綬復縱令相招師古曰來降者即賜以侯印而放令還更相招諭復扶又翻驅而入伏波營中黎旦城中皆降建德嘉已夜亡入海伏波遣人追之校尉司馬蘇弘得建德越郎都稽得嘉孟康曰越中所自置郎也考異曰史記漢書表皆作孫都南越傳皆云都稽今從傳南越已平矣遂以其地為南海蒼梧鬱林合浦交趾九真日南珠崖儋耳九郡南海唐廣州循州之地蒼梧注見上鬱林唐桂州鬱林黨繡州之地合浦唐廉雷潘州之地交趾唐安南之地杜佑曰南方夷人其足大指開廣若並足而立其指交故名交趾劉欣期交州記曰交趾之人出南定縣足骨無節身有毛臥者更扶乃得起山海經交脛國為人交脛郭璞曰腳脛曲戾相交所謂雕題交趾也九真唐愛州之地日南唐歡州之地師古曰言其在日之南所謂開北戶以向日者珠崖儋耳唐瓊管之地應劭曰二郡在大海崖岸之邊出真珠故曰珠崖儋耳者種大耳其渠率自謂王者耳尤緩下肩三寸張晏曰異物志二郡在海中東西千里南北五百里儋耳之人鏤其頰皮上連耳匡分為數支狀如羊腸纍耳而下垂賢曰儋耳故城即今儋州義倫縣儋丁甘翻臣瓚曰珠崖郡治瞫都去長安七千三百二十四里儋耳去長安七千三百三十五里見茂陵書上益封伏波封樓船為將梁侯蘇弘為海常侯都稽為臨蔡侯徐廣曰海常在東萊余以王子侯表參考則海常侯當食邑琅邪功臣表臨蔡侯食邑河內趙光封隨桃侯史定封安道侯畢取封膫侯居翁封湘城侯考異曰凡此等封侯者年表皆有月日為其先後難齊故盡附於立功之處後倣此六年公孫卿候神河南言見仙人迹緱氏城上班志緱氏縣屬河南郡宋白曰漢緱氏縣故城在今縣東南二十五里緱工侯翻天子親幸緱氏城視迹問卿得毋效文成五利乎卿曰仙者非有求人主人主者求之其道非寬假神不來言神事如迂誕師古曰迂回遠也誕大言也乃可致也上信之於是郡國各除道繕治宮觀名山神祠以望幸焉觀古玩翻六年賽南越祠泰一后土始用樂舞據郊祀志五年秋為伐南越告禱太一故今賽祠賽先代翻六年馳義侯發南夷兵欲以擊南越且蘭君恐遠行且蘭亦南夷種帝開為縣屬牂柯郡且音苴子閭翻乃與其衆反殺使者及犍為太守犍渠延翻守式又翻漢乃發巴蜀罪人當嚴當改嘗擊南越者八校尉遣中郎將郭昌衛廣將而擊之將即亮翻誅且蘭及邛君莋侯邛君邛都之君莋侯莋都之君莋才各翻下同章十四行本牂作牂乙十一行本同柯郡夜郎侯始倚南越南越已滅夜郎遂入朝朝直遙翻上以為夜郎王冉駹皆振恐請臣置吏乃以邛都為越巂郡邛渠容翻越巂郡唐為巂州巂音髓莋都為沈黎郡服虔曰今蜀郡北部都尉所治本莋都臣瓚曰茂陵書沈黎治莋都去長安三千三百三十五里唐為黎州地駹莫江翻應劭曰今蜀郡山本冉駹地宣帝地節四年省山郡並蜀今茂州諸羌之地是也華陽國志汶山南接漢嘉西接涼州酒泉北接陰平皆其地也唐置茂州汶山縣注云有岷山類篇汶音岷又據史記夏紀引禹貢岷嶓既藝及岷山之陽及岷山導江之岷皆作汶蓋漢時古字通用也康曰汶音問非也廣漢西白馬為武都郡高祖置廣漢郡唐為梓州白馬居武都仇池班志所謂天池大澤括地志隴右成州武州皆白馬氐其豪族楊氏居成州仇池山上武都郡唐階成武等州地六年初東越王餘善上書請以卒八千人從樓船擊呂嘉兵至揭陽班志揭陽縣屬南海郡唐為潮州韋昭曰揭其逝翻蘇林音揭師古音竭不行持兩端陰使南越使疏吏翻及漢破番禺不至楊僕上書願便引兵擊東越上以士卒勞倦不許令諸校屯豫章梅嶺以待命徐廣曰梅嶺在會稽界索隱曰徐説非也按今豫章三十里有梅嶺在洪崖山當古驛道杜佑曰梅嶺在虔州虔化縣界括地志在虔化縣東北一百二十八里校戶教翻漢兵臨境乃遂反發兵距漢道號將軍騶力等為吞漢將軍入白沙武林梅嶺索隱曰按今豫章北二百里接番陽界地名白沙沙東南八十里有武陽亭東南三十里地名武林當閩越之京道劉昫曰武林在蒼梧猛陵縣界隋分猛陵置武林縣屬永平郡唐置龔州是時漢使大農張成故山州侯齒將屯齒城陽共王子坐酎金失侯故書曰故侯將即亮翻下僕將同卻就便處皆坐畏懦誅餘善自稱武帝上欲復使楊僕將為其伐前勞為于偽翻以書敕責之曰將軍之功獨有先破石門尋狹非有斬將搴旗之實也師古曰搴拔取之也前破番禺捕降者以為虜降戶江翻掘死人以為獲是一過也使建德呂嘉得以東越為援師古曰以僕不窮追之故令得以東越為援也士卒暴露連歲將軍不念其勤勞而請乘傳行塞傳張戀翻行下孟翻因用歸家懷銀黃垂三組夸鄉里是三過也師古曰銀銀印也黃金印也僕為主爵都尉又為樓船將軍並將梁侯故為三組組印綬也師古曰言顧思妻妾也是四過也問君蜀刀價而陽不知蜀刀蜀中所作刀師古曰蜀刀有環者也師古曰干犯也受詔不至蘭池蘭池宮在渭城如淳曰本出軍時欲使之蘭池宮頓而不至假令將軍之吏問之不對令之不從其罪何如推此心在外江海之間可得信乎今東越深入將軍能率衆以掩過不不讀曰否僕惶恐對曰願盡死贖罪上乃遣橫海將軍韓説出句章班志句章縣屬會稽郡史記正義曰句章故城在越州鄮縣西一百里樓船將軍楊僕出武林中尉王溫舒出梅嶺以越侯為戈船下瀨將軍出若邪白沙若邪時屬會稽山陰縣界今之若邪溪在越州東南二十五里曰五雲溪六年博望侯既以通西域尊貴其吏士爭上書言外國奇怪利害求使天子為其絶遠非人所樂往聽其言師古曰凡人皆不樂去故有自請為使者即聽而遣之為于偽翻樂音洛使疏吏翻下同募吏民毋問所從來師古曰不為限禁遠近雖家人私隸並許應募豫讀曰與為于偽翻下同以廣其道來還不能毋侵盜幣物及使失指師古曰乖天子指意輒覆按致重罪以激怒令贖師古曰言其串習不以為難必當更求充使令立功以贖罪使端無窮而輕犯法復扶又翻使疏吏翻下同其吏卒亦輒復盛推外國所有言大者豫節言小者為副豫讀曰與故妄言無行之徒皆爭效之行下孟翻其使皆貧人子私縣官齎物師古曰言所齎官物竊自用之同於私物師古曰所市之物得利多故不盡入官也人人有言輕重服虔曰漢使言於外國人人輕重不實而禁其食物以苦漢使師古曰令其困苦也度徒洛翻積怨至相攻擊而樓蘭車師小國當空道漢出西域有兩道南道從樓蘭北道從車師故二國當漢使空道師古曰空即孔也而胸奴奇兵又時遮擊之使者爭言西域皆有城邑兵弱易擊易以豉翻於是天子遣浮沮將軍公孫賀將萬五千騎出九原二千餘里至浮沮井而還浮沮胸奴中井名出軍時期賀至浮沮井故以為將軍之號下胸河將軍其義類此沮子餘翻至胸河水而還臣瓚曰胸奴河水去令居千里不使遮漢使皆不見胸奴一人乃分武威酒泉地置張掖敦煌郡應劭曰敦大也煌盛也張掖張國臂掖也敦音屯張掖昆邪王所居地唐為甘州敦煌唐為沙州考異曰漢書武紀元狩二年渾邪王降以其地為武威酒泉郡元鼎六年分置張掖敦煌郡而地理志云張掖酒泉郡太初元年開武威郡太初四年開敦煌郡後元元年分酒泉置今從武紀六年是歲齊相卜式為御史大夫式既在位乃言郡國多不便縣官作鹽鐵器苦惡如淳曰苦或作盬盬不攻嚴也臣瓚曰謂作鐵器民患苦其不好也師古曰二説非也鹽既味苦器又脆惡故總云苦惡也余謂鹽器則官與牢盆是也鐵器則官鑄鐵器是也苦惡專指鹽鐵器而言如説未可厚非或強令民買之而船有算船算及鹽鐵器並見上卷四年強其兩翻物貴少詩沼翻上由是不悅卜式六年初司馬相如病且死有遺書頌功德言符瑞勸上封泰山上感其言會得寶鼎上乃與公卿諸生議封禪封禪用希曠絶莫知其儀而諸方士又言封禪者合不死之名也漢書作古不死之名封禪皆致怪物與神通秦皇帝不得上封陛下必欲上稍上即無風雨遂上封矣上時掌翻師古曰稍漸也上於是乃令諸儒采尚書周官王制之文草封禪儀數年不成上以問左內史兒寬寬曰封泰山禪梁父昭姓考瑞帝王之盛節也父音甫然享薦之義不著于經師古曰封禪之享薦也以非常禮故經無其文著竹筯翻合袪於天地神祇李奇曰袪開散合閉也開閉於天地也袪丘居翻制定其當師古曰當猶中也今將舉大事優遊數年使㣥臣得人人自盡師古曰所言不同各有執見也唯天子建中和之極兼總條貫金聲而玉振之師古曰言振揚德音如金玉之聲也以順成天慶垂萬世之基上乃自制儀頗采儒術以文之上為封禪祠器以示㣥儒或曰不與古同於是盡罷諸儒不用上又以古者先振兵釋旅然後封禪元封元年辛未前一一應劭曰始封泰山故改元六年冬十月下詔曰南越東甌咸伏其辜西蠻北夷頗未輯睦師古曰輯與集同集和也躬秉武節置十二部將軍親帥師焉帥讀曰率乃行自雲陽班志雲陽縣屬左馮翊元朔四年置西河郡其地自汾石州西北至塞下北登單于臺杜佑曰單于臺在雲州雲中縣西北百餘里臨北河章十四行本河下有勒兵十八萬騎旌旗徑千餘里以見武節威胸奴十九字乙十一行本同張校同遣使者郭吉告單于曰南越王頭已縣於漢北闕縣古懸通天子自將待邊將即亮翻不能即南面而臣於漢何徒遠走亡匿於幕北寒苦無水草之地毋為也語卒而單于大怒卒子恤翻立斬主客見者師古曰主客主接諸客者也見者謂引見郭吉於單于者遷之北海上然胸奴亦讋讋之涉翻師古曰失氣也終不敢出上乃還祭黃帝冢橋山應劭曰橋山在上郡陽周縣須如地名考異曰漢書作涼如今從史記吾聞黃帝不死今有冢何也公孫卿曰黃帝已仙上天㣥臣思慕葬其衣冠考異曰史記漢書皆云或對漢武故事云公孫卿對今取之吾後升天㣥臣亦當葬吾衣冠於東陵乎東陵謂茂陵也在長安東故曰東陵類祠太一師古曰類祠謂以事類而祭也六年上以卜式不習文章貶秩為太子太傅以兒寬代為御史大夫六年漢兵入東越境東越素發兵距險使徇北將軍守武林樓船將軍卒錢塘轅終古斬徇北將軍班志錢唐縣屬會稽郡師古曰轅姓終古名越建成侯敖與繇王居股殺餘善以其衆降據東越傳吳陽先在漢漢使歸喻餘善餘善不聽及漢軍至陽以邑人攻越書故越衍侯者言其舊為越衍侯也越衍侯及建成侯皆東越所封孟康曰禦兒越中地今吳南亭是也國語曰吾用禦兒臨之宋祁注云禦兒越北鄙今嘉興史記正義曰禦今作語語兒鄉在蘇州嘉興縣南七十里臨官道居股為東成侯敖為開陵侯又封橫海將軍説為按道侯橫海校尉福為繚嫈侯東越降將多軍為無錫侯卯石侯功臣表作外石食邑於濟南東成作東城屬九江郡開陵侯國屬臨淮郡按道功臣表作安道食邑於南陽索隱曰繚嫈縣名師古曰繚音遼嫈於耕翻橫海校尉福城陽共王子海常侯福也坐法失侯以今功封繚嫈侯服虔曰嫈音瑩劉伯莊曰紆營翻無錫縣屬會稽郡數反覆數所角翻終為後世患乃詔諸將悉其民徙於江淮之間遂虛其地虛如字康讀曰墟六年春正月上行幸緱氏考異曰封禪書郊祀志作三月漢書武紀及荀紀皆作正月今從之從官在山下聞若有言萬歲者三荀悅曰萬歲神稱之也從才用翻禁無伐其草木以山下戶三百為之奉邑奉扶用翻上遂東巡海上行禮祠八神齊人之上疏言神怪奇方者以萬數乃益發船令言海中神山者數千人求蓬萊神人公孫卿持節常先行候名山至東萊東萊春秋萊子之國高祖置萊郡唐為登萊二州之地夜見大人長數丈長直亮翻就之則不見其迹甚大類禽獸云㣥臣有言見一老父牽狗言吾欲見巨公鄭氏曰巨公天子也張晏曰天子為天下父故曰巨公師古曰巨大也上既見大迹未信及㣥臣又言老父則大以為仙人也宿留海上師古曰宿留謂有所須待也宿先就翻留力就翻人以千數師古曰間微也隨間隙而行也夏四月還至奉高奉高泰山郡治所地主八神之一也梁父縣屬泰山郡父音甫乙卯令侍中儒者皮辨搢紳射牛行事續漢志委貌皮辨同制長七寸高四寸制如覆盆前高廣後卑鋭所謂夏之母追殷之章甫者也委貌以皂絹為之皮辨以鹿皮為之沈約曰古者貴賤皆執笏其有事則搢之於腰帶所謂搢紳之士者搢笏而垂紳紳帶也長三尺天子有事必自射牛示親殺也今採此禮以為封禪議考異曰武紀癸卯上還登封泰山蓋癸卯自海上還乙卯至泰山行事也封廣丈二尺高九尺廣古曠翻度廣曰廣高居號翻度高曰高其下則有玉牒書書祕禮畢天子獨與侍中奉車都尉霍子侯上泰山服虔曰子侯霍去病子也上時掌翻下同其事皆禁明日下陰道山北為陰丙辰禪泰山下址師古曰址者山之基足址音止如祭后土禮天子皆親拜見見賢遍翻下同衣尚黃而盡用樂焉江淮間茅三脊為神藉藉才夜翻薦也五色土益雜封其封禪祠夜若有光晝有白雲出封中師古曰雲出於所封之中坐明堂班志明堂在奉高西南四里臣瓚曰郊祀志初天子封泰山泰山東北址古時有明堂處則此所坐者也明年秋乃作明堂更互也工衡翻詔曰朕以眇身承至尊兢兢焉惟德菲薄不明于禮樂故用事八神遭天地況施應劭曰況賜也施與也言天地神靈乃賜我瑞應施式智翻屑然如有聞臣瓚曰聞呼萬歲者三是也欲止不敢遂登封泰山至于梁父然後升禪肅然禪與禪同嘉與士大夫更始更工衡翻下同其以十月為元封元年行所巡至博奉高蛇丘歷城梁父博與蛇丘屬泰山郡博縣有泰山廟岱山在西北師古曰蛇音移歷城縣屬濟南郡皆貸除之無出今年算賜天下民爵一級又以五載一巡狩用事泰山令諸侯各治邸泰山下載子亥翻治直之翻下同天子既已封泰山無風雨而方士更言蓬萊諸神若將可得於是上欣然庶幾遇之復東至海上望焉幾居衣翻復扶又翻上欲自浮海求蓬萊㣥臣諫莫能止東方朔曰夫仙者得之自然不必躁求躁則到翻若其有道不憂不得若其無道雖至蓬萊見仙人亦無益也臣願陛下第還宮靜處以須之處昌呂翻須待也仙人將自至上乃止會奉車霍子侯暴病一日死子侯去病子也上甚悼之乃遂去並海上並步浪翻上時掌翻北至碣石巡自遼西歷北邊至九原五月乃至甘泉凡周行萬八千里云先是桑弘羊為治粟都尉領大農原父曰大司農舊治粟內史耳弘羊為搜粟都尉也先悉薦翻弘羊作平準之法令遠方各以其物如異時商賈所轉販者賈音古為賦而相灌輸置平準于京師都受天下委輸委於偽翻輸音戍大農諸官盡籠天下之貨物貴即賣之賤則買之欲使富商大賈無所牟大利如淳曰牟取也至是天子巡狩郡縣所過賞賜用帛百餘萬匹錢金以巨萬計皆取足大農弘羊又請章十四行本請下有令字乙十一行本同孔本同吏得入粟補官及罪人贖罪山東漕粟益歲六百萬石一歲之中太倉甘泉倉滿邊餘穀諸物均輸帛五百萬匹民不益賦而天下用饒於是弘羊賜爵左庶長黃金再百斤焉是時小旱上令官求雨卜式言曰縣官當食租衣稅而已師古曰衣於既翻今弘羊令吏坐市列肆販物求利烹弘羊天乃雨六年秋有星孛于東井晉天文志東井八星天之南門黃道所經又曰東井雍州分孛蒲內翻下同有星孛于三台天文志魁下六星兩兩而比曰三台候獨見填星出如瓜食頃復入填星土星也填讀曰鎮陛下建漢家封禪天其報德星云師古曰德星即填星也言天以德星報於帝六年齊懷王閎薨無子國除閎元狩六年受封張政烺標點容肇祖聶崇岐覆校
