body:
  text: 資治通鑑卷第四十六翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注漢紀三十八建初元年肅宗孝章皇帝上諱炟顯宗第五子母賈貴人以馬后母養為嫡即位諡法溫克令儀曰章伏侯古今注炟之字曰著建初元年丙子七六建初元年春正月詔兗豫徐三州稟贍飢民上問司徒鮑昱何以消復旱災消復者消去災異而復其常陛下始踐天位雖有失得未能致異臣前為汝南太守典治楚事賢曰永平十三年楚王英謀反連坐者在汝南昱時主劾之也治直之翻恐未能盡當其罪夫大獄一起冤者過半又諸徙者骨肉離分孤魂不祀宜一切還諸徙家蠲除禁錮使死生獲所則和氣可致帝納其言校書郎楊終上疏曰間者北征胸奴西開三十六國百姓頻年服役轉輸煩費愁困之民足以感動天地陛下宜留念省察漢蘭臺藏書之室也當時文學之士使讎校於其中故有校書之職劉向揚雄輩是也東都於蘭臺置令史典校祕書以郎居其任者謂之校書郎終徵詣蘭臺拜校書郎省悉景翻下遐稼翻第五倫亦同終議牟融鮑昱皆以為孝子無改父之道引論語孔子之言屯戍西域先帝所建不宜回異終復上疏曰秦築長城功役繁興胡亥不革卒亡四海事見秦紀復扶又翻卒子恤翻事見二十八卷元帝初元二年事見四十三卷光武建武二十二年賢曰介鱗喻遠夷其人與魚鱉無異也衣裳謂中國也揚雄法言曰珠崖之絶捐之之力也否則介鱗易我衣裳春秋譏之曰先祖為之而已毀之不如勿居而已以其無妨害於民也襄公作三軍昭公舍之君子大其復古以為不舍則有害於民也舍讀曰捨今伊吾之役樓蘭之屯兵竇固等取伊吾見上卷永平十六年樓蘭即鄯善此兵蓋謂班超所將吏士也非天意也帝從之建初元年丙寅詔二千石勉勸農桑罪非殊死須秋按驗有司明慎選舉進柔良退貪猾順時令理冤獄是時承永平故事吏政尚嚴切尚書決事率近於重近其靳翻尚書沛國陳寵以帝新即位宜改前世苛俗乃上疏曰臣聞先王之政賞不僭刑不濫與其不得已寧僭無濫左傳蔡大夫聲子之言斷丁亂翻下同所以威懲姦慝姦慝既平必宜濟之以寬陛下即位率由此義數詔㣥僚弘崇晏晏賢曰晏晏溫和也尚書考靈耀曰堯聰明文塞晏晏數所角翻猶尚深刻斷獄者急於篣格酷烈之痛賢曰篣即榜也古字通用聲類曰笞也説文曰格擊也或因公行私逞縱威福夫為政猶張琴瑟大絃急者小絃絶賢曰新序臧孫魯大夫行猛政子貢非之曰夫政猶張琴瑟也大絃急則小絃絶矣故曰罰得則姦邪止賞得則下歡悅蕩滌煩苛之法輕薄箠楚以濟㣥生箠止蕊翻全廣至德以奉天心帝深納寵言每事務於寬厚建初元年酒泉太守段彭等兵會柳中擊車師攻交河城賢曰前書車師前王居交河城河水分流繞城下故號交河去長安八千一百里故城在今西州交河縣獲生口三千餘人北胸奴驚走車師復降復扶又翻會關寵已歿謁者王蒙等欲引兵還耿恭軍吏范羌時在軍中先是恭遣羌至敦煌迎兵士寒服因隨王蒙軍出塞諸將不敢前乃分兵二千人與羌從山北迎恭遇大雪丈餘軍僅能至城中夜聞兵馬聲以為虜來大驚羌遙呼曰呼火故翻我范羌也漢遣軍迎校尉耳校戶教翻城中皆稱萬歲開門共相持涕泣明日遂相隨俱歸虜兵追之且戰且行吏士素飢困發疏勒時尚有二十六人隨路死沒三月至玉門賢曰玉門關名屬敦煌郡在今沙州臣賢按酒泉郡又有玉門縣據東觀記曰至敦煌明即玉門關也衣屨穿決形容枯稿中郎將鄭衆為恭以下洗沐易衣冠衆先以軍司馬與馬廖擊車師至敦煌拜為中郎將為于偽翻恭以單兵守孤城當胸奴數萬之衆連月踰年心力困盡鑿山為井煮弩為糧前後殺傷醜虜數百千計卒全忠勇卒子恤翻不為大漢恥宜蒙顯爵以厲將帥將即亮翻帥所類翻恭至雒陽拜騎都尉詔悉罷戊己校尉及都護官二官明帝永平十七年置超將發還疏勒舉國憂恐其都尉黎弇曰漢使棄我使疏吏翻下同我必復為龜茲所滅耳誠不忍見漢使去因以刀自剄前書疏勒國官有疏勒侯擊胡侯輔國侯都尉復扶又翻下同龜茲音丘慈王侯以下皆號泣填徒賢翻號戶刀翻曰依漢使如父母誠不可去使疏吏翻互抱超馬腳不得行超亦欲遂其本志乃更還疏勒疏勒兩城已降龜茲而與尉頭連兵前書尉頭國居尉頭谷去長安八千六百五十里南與疏勒接擊破尉頭殺六百餘人疏勒復安建初元年甲寅山陽東平地震建初元年東平王蒼上便宜三事上時掌翻帝報書曰間吏民奏事亦有此言但明智淺短或謂儻是復慮為非不知所定得王深策恢然意解恢然猶廓然也以次奉行特賜王錢五百萬後帝欲為原陵顯節陵起縣邑為于偽翻蒼上疏諫曰竊見光武皇帝躬履儉約之行深覩始終之分行下孟翻分扶問翻勤勤懇懇以葬制為言事見四十四卷光武建武二十六年承奉遵行事見上卷明帝永平十四年於斯為盛臣愚以園邑之興始自強秦秦始皇葬于驪山徙三萬家起驪邑西漢因之諸陵皆起陵邑至元帝乃止賢曰禮記曰古者墓而不墳故言不欲其著明穀梁傳曰人之所聚曰都杜預注左傳曰郛郭也下造無益之功虛費國用動搖百姓非所以致和氣祈豐年也陛下履有虞之至性虞舜孝於親故以為言臣蒼誠傷二帝純德之美不暢於無窮也帝乃止自是朝廷每有疑政輒驛使咨問使疏吏翻蒼悉心以對皆見納用建初元年秋八月庚寅有星孛于天市晉天文志參十星一曰天市又危三星亦為天市又天市垣二十二星在房心東北史記曰房為天駟東北二星曰旗中四星曰天市孛蒲內翻建初元年初益州西部都尉廣漢鄭純為政清潔化行夷貊君長感慕皆奉珍內附貊莫百翻長知兩翻明帝為之置永昌郡明帝永平十年置益州西部都尉居嶲唐領不韋巂唐比蘇楪榆邪龍雲南六縣十二年哀牢內屬置哀牢博南二縣合為永昌郡為于偽翻純在官十年而卒守式又翻卒子恤翻後人不能撫循夷人九月哀牢王類牢殺守令反攻博南建初元年阜陵王延數懷怨望數所角翻有告延與子男魴造逆謀者魴間房冬十一月貶延為阜陵侯食一縣不得與吏民通延徙王阜陵事見上卷明帝永平十六年建初元年北胸奴皋林溫禺犢王將衆還居涿邪山南單于與邊郡及烏桓共擊破之皋林溫禺犢王本居涿邪山永平十六年祭肜等北伐將衆遁去今復還南部次章甲十六行本次作大乙十一行本同孔本同熊校同飢詔稟給之二年建初二年春三月甲辰罷伊吾盧屯兵胸奴復遣兵守其地伊吾盧置屯兵事見上卷永平十六年復扶又翻建初二年永昌越巂益州三郡兵及昆明夷鹵承等擊哀牢王類牢於博南大破斬之巂音髓建初二年夏四月戊子詔還坐楚淮陽事徙者四百餘家楚獄見上卷明帝永平十四年淮陽獄即阜陵王延徙封時也建初二年上欲封爵諸舅太后不聽會大旱言事者以為不封外戚之故有司請依舊典賢曰漢制外戚以恩澤封侯故曰舊典凡言事者皆欲媚朕以要福耳要一遙翻昔王氏五侯同日俱封黃霧四塞事見三十卷成帝建始元年塞悉則翻澍音注夫外戚貴盛鮮不傾覆鮮息淺翻故先帝防慎舅氏不令在樞機之位又言我子不當與先帝子等事見上卷永平十五年且陰衛尉天下稱之省中御者至門出不及履此蘧伯玉之敬也衛尉興也省中禁中也御者內人也蘧伯玉衛賢大夫蘧求於翻微失理然有方略據地談論一朝無雙新陽侯就也賢曰新陽縣屬汝南郡故城在今豫州真陽縣西南勇猛誠信原鹿侯識也原鹿縣屬汝南郡天下選臣豈可及哉馬氏不及陰氏遠矣吾不才夙夜纍息息氣一出入之頃屏氣者纍息乃一舒氣有毛髮之罪吾不釋言之不捨晝夜而親屬犯之不止治喪起墳又不時覺治直之翻是吾言之不立而耳目之塞也塞悉則翻吾為天下母而身服大練賢曰大練大帛也杜預注左傳曰大帛厚繒也左右但著帛布無香薰之飾者欲身率下也著側略翻以為外親見之當傷心自敕但笑言太后素好儉好呼到翻前過濯龍續漢志濯龍園名近北宮見外家問起居者車如流水馬如遊龍倉頭衣緑褠領袖正白賢曰褠臂衣今之臂鞲以縛左右手於事便也余據字書臂鞲之鞲從革此褠從衣釋單衣也皆音古侯翻領袖正白言其新潔無垢污也衣於既翻不及遠矣故不加譴怒但絶歲用而已冀以默愧其心猶懈怠無憂國忘家之慮懈古隘翻知臣莫若君況親屬乎吾豈可上負先帝之旨下虧先人之德重襲西京敗亡之禍哉賢曰西京外戚呂祿呂産竇嬰上官桀安父子霍禹等皆被誅重直龍翻帝省詔悲嘆復重請曰省悉景翻復扶又翻重直用翻漢興舅氏之封侯猶皇子之為王也太后誠存謙虛奈何令臣獨不加恩三舅乎且衛尉年尊兩校尉有大病衛尉太后兄廖兩校尉兄防兄光也校戶教翻使臣長抱刻骨之恨宜及吉時不可稽留漢封爵㣥臣皆涓吉吾反覆念之思令兩善兩善謂國家無濫恩而外戚亦以安全也以恩澤封爵外家為外施也施式智翻丞相條侯言高祖約無軍功不侯事見十六卷景帝中三年豈得與陰郭中興之后等邪常觀富貴之家祿位重叒冝猶再實之木其根必傷文子曰再實之木根必傷掘臧之家後必殃重直龍翻欲上奉祭祀下求溫飽耳今祭祀則受太官之賜衣食則蒙御府餘資自西都以來皇后家祀其父母太官供具御府令掌中衣服及補浣之屬飲食則太官主之此言衣食皆資於御府概言之也而必當得一縣乎吾計之孰矣古字孰熟通夫至孝之行安親為上揚子曰孝莫大於寧親寧親莫大於四表之歡心行下孟翻數所角翻穀價數倍憂惶晝夜不安坐臥而欲先營外家之封違慈母之拳拳乎賢曰拳拳猶勤勤也音權吾素剛急有胸中氣不可不順也胸中氣今所謂上氣之疾胸與胸同由於父母已冠成人則行子之志冠古玩翻念帝人君也吾以未踰三年之故自吾家族故得專之若陰陽調和邊境清靜然後行子之志吾但當舍飴弄孫方言曰飴餳也宋衛之間通語關豫政也復扶又翻太后嘗詔三輔諸馬婚親有屬託郡縣干亂吏治者以法聞繩之以法而奏聞也屬之欲翻治直吏翻太夫人太后母也漢列侯墳高四丈關內侯以下至庶人有差兄衛尉廖等即時減削其外親有謙素義行者行下孟翻輒假借溫言賞以財位如有纖介則先見嚴恪之色見賢遍翻然後加譴其美車服不遵法度者便絶屬籍遣歸田里絶外戚之屬籍也車騎朴素無金銀之飾廣平王羡巨鹿王恭樂成王黨皆明帝子即賜錢各五百萬於是內外從化被服如一被皮義翻諸家惶恐倍於永平時置織室蠶於濯龍中續漢志濯龍監屬鉤盾令本注曰濯龍亦園名近北宮以為娛樂數所角翻樂音洛常與帝旦夕言道政事及教授小王論語經書小王諸王年尚幼未就國者雍和終日馬廖慮美業難終上疏勸成德政曰昔元帝罷服官事見二十八卷初五年言服浣濯之衣也事見三十三卷綏和二年去羌呂翻至於衰亂者百姓從行不從言也書曰違上所命從厥攸好行下孟翻必有其本傳曰吳王好劍客百姓多創瘢傳直戀翻創初良翻瘢蒲官翻痕也好劍客蓋指吳王闔閭也楚王好細腰宮中多餓死墨子曰楚靈王好細腰而國多餓人賢曰當時諺語四方高一尺結讀曰髻城中好廣眉四方且半額城中好大袖四方全匹帛斯言如戲有切事實前下制度未幾後稍不行未幾言未幾時也幾居豈翻良由慢起京師今陛下素簡所安發自聖性賢曰言儉素簡約后之所安竟猶終也聲薰天地賢曰薰猶蒸也言芳聲薰天地也況於行令乎太后深納之建初二年初安夷縣吏略妻卑湳種羌人婦安夷縣屬金城郡杜預曰不以道取曰略湳乃感翻種章勇翻下同安夷長宗延追之出塞長知兩翻種人恐見誅遂共殺延而與勒姐吾良二種相結為寇勒姐羌居勒姐溪因以為種名姐子耶也翻又音紫滇音顛敗金城太守郝崇敗補邁翻郝呼各翻姓譜殷帝乙有子期封太原郝鄉後因氏焉詔以武威太守北地傅育為護羌校尉自安夷徙居臨羌臨羌縣屬金城郡杜佑曰臨羌在今西平郡水經注湟水東合安夷川水又東徑安夷縣故城在漢西平亭東七十里湟水又東合勒姐溪水本天水郡明帝永平十七年改名漢陽八月遣行車騎將軍馬防長水校尉耿恭將北軍五校兵武帝置北軍八校中壘屯騎越騎長水胡騎射聲步兵虎賁也中興省中壘胡騎虎賁惟越騎屯騎步兵長水射聲五校屯騎越騎步兵射聲各領士七百人長水領烏桓胡騎七百三十六人皆宿衛兵也馬防傳云積射士臣愚以為貴戚可封侯以富之不當任以職事何者繩以法則傷恩私以親則違憲伏聞馬防今當西征臣以太后恩仁陛下至孝恐卒有纖介難為意愛賢曰恐卒然有小過愛而不罰則廢法也卒讀曰猝馬防等軍到冀布橋等圍南部都尉於臨洮前書隴西南部都尉治臨洮賢曰即今岷洮二州地破之斬首虜四千餘人遂解臨洮圍其衆皆降唯布橋等二萬餘人屯望曲谷不下酈道元注水經云望曲在臨洮西南去龍桑城二百里建初二年十二月戊寅有星孛于紫宮晉天文志中宮北極五星銘陳六星皆在紫宮中紫官垣十五星其西蕃七東蕃八蒲內翻建初二年帝納竇勳女為貴人有寵為後諸竇竊權張本即東海恭王女沘陽公主也沘音比建初二年第五倫上疏曰光武承王莽之餘頗以嚴猛為政後代因之遂成風化郡國所舉類多辦職俗吏殊未有寬博之選以應上求者也陳留令劉豫冠軍令駟協陳留縣屬陳留郡冠軍縣屬南陽郡冠古玩翻務為嚴苦吏民愁怨莫不疾之而今之議者反以為能違天心失經義非徒應坐豫協亦宜譴舉者務進仁賢以任時政不過數人則風俗自化矣臣嘗讀書記知秦以酷急亡國又目見王莽亦以苛法自滅故勤勤懇懇實在於此又聞諸王主貴戚驕奢踰制京師尚然何以示遠故曰其身不正雖令不行論語孔子之言以言教者訟上善之倫雖天性峭直賢曰峭峻也音七笑翻然常疾俗吏苛刻論議每依寬厚云三年建初三年春正月己酉宗有祀明堂登靈臺赦天下建初三年馬防擊布橋大破之考異曰帝紀防破羌在四月蓋春破而京師四月始聞也今從防傳詔徵防還留耿恭擊諸未服者斬首虜千餘人勒姐燒何等十三種數萬人皆詣恭降姐音紫又子也翻種章勇翻恭嘗以言事忤馬防初恭出隴西上言薦竇固鎮撫涼部由是大忤於防忤五故翻奏恭不憂軍事坐徵下獄免官監古銜翻下遐稼翻建初三年三月癸巳立貴人竇氏為皇后建初三年初顯宗之世治呼沱石臼河從都慮至羊腸倉賢曰石臼河在今定州唐縣東北酈道元注水經云汾陽故城積粟所在謂之羊腸倉在晉陽西北石隥縈紆若羊腸焉故以為名今嵐州界羊腸坂是也唐嵐州宜芳縣本漢汾陽縣隋置嵐城縣唐更名宜芳杜佑曰宜芳縣有古秀容城漢羊腸倉余考水經注云按司馬彪郡國志常山南行唐縣有石臼谷蓋欲乘呼沱之水轉山東之漕自都慮至羊腸倉憑汾水以漕太原又考郡國志常山蒲吾縣注引古今注曰永平十年作常山呼沱河蒲吾渠通漕船又考班固地理志太原郡上艾縣注曰綿曼水東至蒲吾入呼沱水又蒲吾縣注曰大白渠水首受綿曼水東南至下曲陽入斯洨則知此漕自大白渠入綿曼水自綿曼水轉入淮水以達羊腸倉也慮音閭杜佑曰石臼河在定州唐昌縣唐昌藻苦陘縣也太原吏民苦役連年無成死者不可勝算勝音升帝以郎中鄧訓為謁者監領其事訓考量隱括賢曰隱審量括之也孫卿子曰銘木必待隱括蒸揉然後直也監古銜翻量音良具以上言上時掌翻夏四月己巳詔罷其役更用驢輦更工衡翻歲省費億萬計全活徒士數千人訓禹之子也建初三年閏月西域假司馬班超率疏勒康居于填拘彌兵一萬人攻姑墨石城破之前書姑墨國治南城去長安八千一百五十里建初三年冬十二月丁酉以馬防為車騎將軍建初三年武陵漊中蠻反賢曰漊水名源出今澧州崇義縣西北余據溫公類篇漊郎侯翻建初三年是歲有司奏遣廣平王羡巨鹿王恭樂成王黨俱就國上性篤愛不忍與諸王乖離遂皆留京師四年建初四年春二月庚寅太尉牟融薨建初四年夏四月戊子立皇子慶為太子建初四年己丑徙巨鹿王恭為江陵王汝南王暢為梁王常山王昞為淮陽王建初四年辛卯封皇子伉為千乘王全為平春王平春縣屬江夏郡伉音抗乘繩證翻建初四年有司連據舊典請封諸舅帝以天下豐稔方垂無事癸卯遂封衛尉廖為順陽侯順陽侯國屬南陽郡賢曰故城在今鄧州穰縣西潁陽縣屬潁川郡許縣屬潁川郡吾少壯時但慕竹帛志不顧命賢曰言慕古人書名竹帛不顧命之長短少詩沼翻猶戒之在得論語孔子曰及其老也戒之在得惕懼也厲危也冀乘此道不負先帝所以化導兄弟共同斯志欲令瞑目之日無所復恨何意老志復不從哉瞑莫定翻復扶又翻萬年之日長恨矣廖等並辭讓願就關內侯考異曰皇后紀稱廖等並辭讓願就關內侯太后聞之云云廖等不得已受封爵按太后之辭皆不欲封廖等之意而史家文勢反似太后欲令廖等受封今輒移廖等辭讓於太后語下使文勢有序讀者易解廖等不得已受封爵而上書辭位帝許之五月丙辰防廖光皆以特進就第建初四年甲戌以司徒鮑昱為太尉南陽太守桓虞為司徒建初四年六月癸丑皇太后馬氏崩帝既為太后所養專以馬氏為外家故賈貴人不登極位賈氏親族無受寵榮者及太后崩但加貴人王赤綬漢制貴人緑綬三采緑紫紺長二丈一尺二百四十首諸侯赤綬四采赤黃縹紺長二丈一尺三百首永巷宮人二百賢曰永巷宮人宮婢也大司農黃金千斤錢二千萬而已建初四年秋七月壬戌葬明德皇后賢曰諡法中和純淑曰德建初四年校書郎楊終建言宣帝博徵㣥儒論定五經於石渠閣事見二十七卷甘露三年少詩沼翻學者得成其業而章句之徒破壞大體壞音怪宜如石渠故事永為後世則帝從之冬十一月壬戌詔太常句斷將大夫博士郎官及諸儒會白虎觀議五經同異將即亮翻將三署及虎賁羽林中郎將也大夫光祿太中中散諫議大夫也博士五經博士也郎官五署郎及尚書郎蘭臺東觀校書郎也白虎觀在北宮觀古玩翻使五官中郎將魏應承制問侍中淳于恭奏帝親稱制臨決作白虎議奏名儒丁鴻樓望成封桓郁班固賈逵及廣平王羡皆與焉固超之兄也與讀曰預五年建初五年春二月庚辰朔日有食之詔舉直言極諫建初五年荊豫諸郡兵討漊中蠻破之漊郎侯翻建初五年夏五月辛亥詔曰朕思遲直士側席異聞賢曰遲猶希望也音持二翻側席謂不正坐所以待賢良也其先至者各已發憤吐悶悶莫困翻又莫旱翻略聞子大夫之志矣皆欲置於左右顧問省納句斷省悉景翻不直以言語筆札今外官多曠並可以補任建初五年戊辰太傅趙熹薨建初五年班超欲遂平西域上疏請兵曰臣竊見先帝欲開西域故北擊胸奴西使外國使疏吏翻鄯上扇翻今拘彌莎車疏勒月氏烏孫康居復願歸附復扶又翻欲共並力破滅龜茲平通漢道若得龜茲則西域未服者百分之一耳前世議者皆曰取三十六國號為斷胸奴右臂賢曰前書曰漢書公主為烏孫夫人結為昆弟則是斷胸奴右臂也哀帝時劉歆上議曰武帝立五屬國起朔方伐朝鮮起玄菟樂浪以斷胸奴左臂也西伐大宛結烏孫裂胸奴之右臂也南面以西為右斷丁管翻自日之所入莫不向化西域傳曰自條支國乘水西行可百餘日近日所入也貢奉不絶唯延章甲十六行本延作焉乙十一行本同孔本同張校同耆龜茲獨未服從臣前與官屬三十六人奉使絶域備遭艱厄自孤守疏勒於今五載使疏吏翻載子亥翻胡夷情數臣頗識之順其城郭小大皆言倚漢與依天等謂城郭之國若小若大其言皆然賢曰效猶驗也古領嶺字通今宜拜龜茲侍子白霸為其國王以步騎數百送之與諸國連兵歲月之間龜茲可禽以夷狄攻夷狄計之善者也臣見莎車疏勒田地肥廣草牧饒衍不比敦煌鄯善間也敦徒門翻兵可不費中國而糧食自足且姑墨溫宿二王特為龜茲所置前書溫宿國治溫宿城去長安八千三百五十里種章勇翻更相厭苦其勢必有降者若二國來降則龜藥綹破更工衡翻降戶江翻下同願下臣章參考行事誠有萬分死復何恨下遐稼翻復扶又翻臣超區區特蒙神靈竊冀未便僵仆目見西域平定陛下舉萬年之觴言西域平定廷臣畢賀天子為之舉觴也布大喜於天下賢曰薦進也勳功也左氏傳曰反行飲至舍爵策勳也余謂超蓋言平西域告成功於祖廟也帝知其功可成議欲給兵平陵徐幹上疏願奮身佐超帝以幹為假司馬將弛刑及義從千人就超弛刑徒也義從自奮願從行者或曰義從胡也從才用翻先是莎車以為漢兵不出先悉薦翻遂降於龜茲而疏勒都尉番辰亦叛賢曰番音潘會徐幹適至超遂與幹擊番辰大破之斬首千餘級欲進攻龜茲以烏孫兵強宜因其力乃上言烏孫大國控弦十萬故武帝妻以公主事見二十一卷元封六年妻七細翻事見二十四卷本始三年卒子恤翻與共合力帝納之六年建初六年春二月辛卯琅邪孝王京薨建初六年夏六月丙辰太尉鮑昱薨建初六年辛未晦日有食之建初六年秋七月癸巳以大司農鄧彪為太尉建初六年武都太守廉范遷蜀郡太守成都民物豐盛邑宇逼側舊制禁民夜作以防火災而更相隱蔽燒者日屬更工衡翻屬之欲翻聯也聯日有火也范乃毀削先令但嚴使儲水而已百姓以為便歌之曰廉叔度來何暮廉范字叔度民安作賢曰作協韻則護翻昔無襦今五褲襦汝朱翻短衣也褲五故翻脛衣也建初六年帝以沛王等將入朝遣謁者賜貂裘説文曰貂鼠大而黃黑出胡丁零國又使大鴻臚竇固持節郊迎臚陵如翻帝親自循行邸第行下孟翻豫設帷牀其錢帛器物無不充備七年建初七年春正月沛王輔濟南王康東平王蒼中山王焉東海王政琅邪王宇來朝政東海王強子宇琅邪王京子濟子禮翻賢曰謂讚者不唱其名余謂四王帝諸父也故異其禮上親答之所以寵光榮顯加於前古每入宮輒以輦迎至省閣乃下省閣入禁中閣門也為于偽翻下同皇后親拜於內皆躬辭謝不自安鞠曲也鞠躬曲身也大鴻臚奏遣諸王歸國帝特留東平王蒼於京師建初七年初明德太后為帝納扶風宋楊二女為貴人大貴人生太子慶梁松弟竦有二女亦為貴人小貴人生皇子肇竇皇后無子養肇為子宋貴人有寵於馬太后太后崩竇皇后寵盛與母沘陽公主謀陷宋氏沘音比外令兄弟求其纖過內使御者偵伺得失賢曰偵候也音丑政翻廣雅曰偵問也伺相吏翻宋貴人病思生兔兔獸名口有缺尻有九孔舐毫而孕生子從口出霜前獵取而食之其味甚美因誣言為厭勝之術厭一葉翻又於琰翻由是太子出居承祿觀續漢志中藏府有承祿署甲寅詔曰皇太子有失惑無常之性不可以奉宗廟大義滅親春秋左氏傳之言今廢慶為清河王皇子肇保育皇后承訓懷袵袵衣襟亦臥席也遂出宋貴人姊妹置丙舍丙舍宮中之室以甲乙丙為次也續漢志南宮有丙署二貴人皆飲藥自殺父議郎楊免歸本郡慶時雖幼亦知避嫌畏禍言不敢及宋氏帝更憐之敕皇后令衣服與太子齊等太子亦親愛慶入則共室出則同輿建初七年己未徙廣平王羡為西平王西平縣屬汝南郡賢曰西平故柏子國在今豫州吳房縣西北建初七年秋八月飲酎畢酎直又翻有司復奏遣東平王蒼歸國復扶又翻帝乃許之手詔賜蒼曰骨肉天性誠不以遠近為親疏然數見顏色數所角翻情重昔時念王久勞思得還休欲署大鴻臚奏不忍下筆顧授小黃門賢曰大鴻臚奏主歸國小黃門受詔者臚陵如翻惻然不能言於是車駕祖送祖道供張以送之復賜乘輿服御珍寶輿馬錢布以億萬計復扶又翻乘繩證翻建初七年九月甲戌帝幸偃師偃師縣屬河南郡卷縣屬河南郡其北即河津卷丘權翻下詔曰車駕行秋稼觀收穫行下孟翻因涉郡界皆精騎輕行無他輜重重直用翻不得輒修道橋遠離城郭離力智翻遣吏逢迎刺探起居賢曰刺探謂候伺也刺七亦翻探音湯勘翻以為煩擾動務省約但患不能脫粟瓢飲耳賢曰晏子相齊食脫粟之飯孔子曰顏回一瓢飲己酉進幸鄴辛卯還宮建初七年冬十月癸丑帝行幸長安封蕭何末孫熊為酇侯進幸槐里岐山槐里縣屬扶風杜佑曰槐里周曰犬丘秦曰廢丘漢改曰槐里岐山在扶風美陽縣御池陽宮東至高陵十二月丁亥還宮建初七年東平獻王蒼疾病考異曰范書作憲今從袁紀使者冠蓋不絶於道又置驛馬千里傳問起居傳直戀翻八年建初八年春正月壬辰王薨詔告中傅封上王自建武以來章奏並集賢焉遣大鴻臚持節監喪上時掌翻監古銜翻令四姓小侯諸國王主悉會葬建初八年夏六月北胸奴三木樓訾大人稽留斯等率三萬餘人款五原塞降稽留斯等部落蓋居三木樓山訾子斯翻建初八年冬十二月甲午上行幸陳留梁國淮陽潁陽戊申還宮建初八年太子肇之立也梁氏私相慶諸竇聞而惡之惡烏露翻皇后欲專名外家忌梁貴人姊妹數譖之於帝數所角翻漸致疏嫌是歲竇氏作飛書陷梁竦以惡逆賢曰飛書若今匿名書也家屬徙九真貴人姊妹以憂死辭語連及梁松妻舞陰公主坐徙新城新城縣屬河南郡賢曰今洛州伊闕縣建初八年順陽侯馬廖謹篤自守而性寬緩不能教勒子弟皆驕奢不謹校書郎楊終與廖書戒之曰君位地尊重海內所望黃門郎年幼血氣方盛賢曰廖弟防及光俱為黃門郎孝文竇皇后兄長君退讓不敢以富貴驕人長知兩翻要一遙翻行下孟翻縱而莫誨視成任性覽張覽作鑒念前往可為寒心廖不能從防光兄弟資産巨億大起第觀觀古玩翻彌亙街路食客常數百人防又多牧馬畜賦斂羌胡帝不喜之數加譴敕斂力贍翻喜許記翻數所角翻所以禁遏甚備由是權勢稍損賓客亦衰廖子豫為步兵校尉投書怨誹於是有司並奏防光兄弟奢侈踰僭濁亂聖化悉免就國臨上路上時掌翻詔曰舅氏一門俱就國封四時陵廟無助祭先后者朕甚傷之其令許侯思愆田廬許侯光也賢曰留之於京守田廬而思愆過也愆與愆同復扶又翻以慰朕渭陽之情秦康公送舅晉文公于渭陽念母之不見也其詩曰我見舅氏如母存焉故帝特留之後復位特進豫隨廖歸國考擊物故謂死於考掠也復扶又翻諸馬既得罪竇氏益貴盛皇后兄憲為侍中虎賁中郎將弟篤為黃門侍郎並侍宮省賞賜纍積喜交通賓客喜許記翻司空第五倫上疏曰臣伏見虎賁中郎將竇憲椒房之親典司禁兵出入省闥年盛志美卑讓樂善此誠其好士交結之方樂音洛好呼到翻然諸出入貴戚者類多瑕釁禁錮之人尤少守約安貧之節士大夫無志之徒更相販賣少詩沼翻更工衡翻雲集其門蓋驕佚所從生也三輔論議者至云以貴戚廢錮當復以貴戚浣濯之復扶又翻猶解酲當以酒也病酒曰酲誠不可親近趣七喻翻近其靳翻臣愚願陛下中宮嚴敕憲等閉門自守無妄交通士大夫防其未萌慮於無形令憲永保福祿君臣交歡無纖介之隙此臣之所至願也憲恃宮掖聲勢自王主及陰馬諸家莫不畏憚憲以賤直請奪沁水公主園田沁水公主明帝女沁水縣屬河內郡師古曰沁音千浸翻計猶言計較也過工禾翻下同指以問憲憲陰喝不得對賢曰陰喝猶噎塞也陰音於禁翻喝音一介翻余謂喝訶也許葛翻陰密也潛也當帝問之時密訶左右不得對也觀帝以趙高指鹿為馬責憲則陰喝之義可知矣帝大怒召憲切責曰深思前過奪主田園時何用愈趙高指鹿為馬事見八卷秦二世三年賢曰愈差也怖普布翻昔永平中常令陰黨陰博鄧叒冝三人更相糾察賢曰以陰鄧皆外戚恐其踰侈故使更相糾察也博陰興之子更工衡翻今貴主尚見枉奪何況小民哉國家棄憲如孤雛腐鼠耳賢曰鳥子生而啄曰雛皇后為毀服深謝良久乃得解毀服猶降服也為于偽翻雖不繩其罪然亦不授以重任臣光曰人臣之罪莫大於欺罔是以明君疾之孝章謂竇憲何異指鹿為馬善矣然卒不能罪憲卒子恤翻則姦臣安所懲哉夫人主之於臣下患在不知其姦苟或知之而復赦之復扶又翻則不若不知之為愈也何以言之彼或為姦而上不之知猶有所畏既知而不能討彼知其不足畏也則放縱而無所顧矣是故知善而不能用知惡而不能去去羌呂翻人主之深戒也溫公此論用齊桓公管仲論郭公所以亡國之意為竇憲亶權張本建初八年下邳周紆為雒陽令紆雍具翻下車先問大姓主名吏數閭里豪強以對數數所具翻章甲十六行本無數字乙十一行本同孔本同紆厲聲怒曰本問貴戚若馬竇等輩豈能知此賣菜傭乎於是部吏人望風旨爭以激切為事貴戚局蹐局音局蹐資昔翻毛氏曰踞曲也蹐纍足也京師肅清竇篤夜至止姦亭亭長霍延拔劍擬篤肆詈恣口篤以表聞詔召司隸校尉河南尹詣尚書譴問遣劍戟士收紆送廷尉詔獄劍戟士左右都候掌之貰出之賢曰貰赦也市夜翻余謂以貰之為是則收之為非建初八年帝拜班超為將兵長史大將軍置長史司馬其不置將軍而長史特將者為將兵長史別遣衛候李邑護送烏孫使者邑到于填值龜茲攻疏勒恐懼不敢前因上書陳西域之功不可成又盛毀超擁愛妻抱愛子安樂外國無內顧心樂音洛超聞之歎曰身非曾參而有三至之讒事見三卷周赧王七年參疏簪翻遂去其妻去羌呂翻帝知超忠乃切責邑曰縱超擁愛妻抱愛子思歸之士千餘人何能盡與超同心乎令邑詣超受節度詔若邑任在外者便留與從事任音壬超即遣邑將烏孫侍子還京師徐幹謂超曰邑前親毀君欲敗西域敗補邁翻今何不緣詔書留之更遣他吏送侍子乎超曰是何言之陋也以邑毀超故今遣之內省不疚何恤人言賢曰疚病也恤憂也論語孔子曰內省不疚夫何憂何懼左氏傳曰詩云禮義不愆何恤人之言詩謂逸詩也省悉景翻非忠臣也建初八年帝以侍中會稽鄭弘為大司農會工外翻舊交趾七郡貢獻轉運皆從東冶泛海而至交趾州部南海蒼梧鬱林合浦交趾九真日南七郡賢曰東冶縣屬會稽郡太康地理志云漢武帝名為東冶後改為東候官今泉州閩縣是沉溺相係沉持林翻溺奴歷翻弘奏開零陵桂陽嶠道自是夷通遂為常路賢曰嶠嶺也夷平也余據武帝遣路博德伐南越出桂陽下湟水則舊有是路弘特開之使夷通所省息以億萬計遭天下旱邊方有警民食不足而帑藏殷積説文曰帑金帛所藏之府帑他朗翻祖浪翻減徭費以利飢民帝從之元和元年甲申八四是年八月方改元建初八年春閏正月辛丑濟陰悼王長薨濟子禮翻建初八年夏四月己卯分東平國封獻王子尚為任城王任城國在雒陽東千一百里任音壬建初八年六月辛酉沛獻王輔薨建初八年陳事者多言郡國貢舉率非功次故守職益懈懈古隘翻而吏事寖疏疏與疏同有詔下公卿朝臣議大鴻臚韋彪上議曰夫國以簡賢為務賢以孝行為首行下孟翻下同是以求忠臣必於孝子之門賢曰孝經緯之文也少詩沼翻是以孟公綽優於趙魏老不可以為滕薛大夫論語孔子之言也公綽魯大夫趙魏晉卿之邑也家臣稱老公綽性寡欲趙魏老優間無事滕薛小國大夫職繁故不可為也持心近厚鍛鍊之吏持心近薄蒼頡篇曰鍛椎也鍛鍊猶成熟言深文之吏入人之罪猶工冶陶鑄鍛鍊使之成熟也近其靳翻不可純以閥閲史記曰明其等曰閥積功曰閲行下孟翻在於選二千石二千石賢則貢舉皆得其人矣彪又上疏曰天下樞要在於尚書賢曰百官志曰尚書主知公卿二千石吏官上書外國夷狄事故曰樞要豈可不重而間者多從郎官超升此位雖曉習文法長於應對然察察小慧類無大能宜鑒嗇夫捷急之對深思絳侯木訥之功也嗇夫事見十四卷文帝三年彪賢之玄孫也韋賢相元帝建初八年秋七月丁未詔曰律云掠者唯得榜笞立蒼頡篇曰掠問也廣雅曰榜擊也音彭設文曰笞擊也立謂立而考訊之掠音亮榜音彭箠長短有數賢曰令丙為篇之次也前書音義曰令有先後有令甲令乙令丙又景帝定箠令箠長五尺本大一寸其竹也末薄半寸其竹也末薄半寸其平去節故云長短有數箠止蘂翻自往者大獄以來掠者多酷鉆鑽之屬慘苦無極大獄謂楚王英等獄也鉆其廉翻説文曰鉆鍛也國語曰中刑用鑽鑿皆謂慘酷其肌膚也怵然動心怵敕律翻悚懼也宜及秋冬治獄明為其禁治直之翻建初八年八月甲子太尉鄧彪罷以大司農鄭弘為太尉建初八年癸酉詔改元改元元和丁酉車駕南巡詔所經道上州章甲十六行本州作郡乙十一行本同孔本同張校同縣毋得設儲跱賢曰儲積也跱具也言不得豫有蓄備跱丈里翻司空掌水士故使之拄竹柱翻探知起居探湯勘翻二千石當坐建初八年九月辛丑幸章陵十月己未進幸江陵還幸宛召前臨淮太守宛人朱暉拜尚書僕射宛於元翻暉在臨淮有善政民歌之曰強直自遂南陽朱季吏畏其威民懷其惠時坐法免家居東觀記曰坐考長史囚死獄中州奏免官十一月己丑車駕還宮尚書張林上言縣官經用不足宜自煮鹽及復修武帝均輸之法煮鹽均輸皆始於武帝賢曰武帝作均輸法謂州郡所出租賦並雇運之直官總取之市其土地所出之物官自轉輸於京謂之均輸曰均輸之法與賈販無異賈音古鹽利歸官則下民窮怨誠非明主所宜行帝因發怒切責諸尚書暉等皆自繫獄三日詔敕出之曰國家樂聞駁義章甲十六行本義作議乙十一行本同樂音洛駁北角翻黃髮無愆黃髮老稱謂朱暉也何故自繫暉因稱病篤不肯復署議復扶又翻下同尚書令以下惶怖謂暉曰今臨得譴讓謂譴讓已臨乎其前也怖普布翻其禍不細暉曰行年八十蒙恩得在機密當以死報若心知不可而順旨雷同負臣子之義今耳目無所聞見伏待死命遂閉口不復言諸尚書不知所為乃共劾奏暉劾戶概翻又戶得翻帝意解寢其事後數日詔使直事郎問暉起居賢曰直事郎謂署郎當次直者太官賜食暉乃起謝上既加禮乃起謝所謂強直自遂也布百匹衣十領建初八年魯國孔僖涿郡崔駰駰音因同遊太學相與論孝武皇帝始為天子崇信聖道五六年間號勝文景及後恣己忘其前善鄰房生梁郁上書告駰僖誹謗先帝刺譏當世事下有司駰詣吏受訊受訊謂受鞠問也下遐稼翻凡言誹謗者謂實無此事而虛加誣之也至如孝武皇帝政之美惡顯在漢史坦如日月是為直説書傳實事傳柱戀翻非虛謗也夫帝者為善為惡天下莫不知斯皆有以致之故不可以誅於人也誅責也政教未過賢曰言政教未有過失也天下所具也謂天下之人所具知也章孔本具下正有知字假使所非實是則固應悛改悛丑緣翻儻其不當當丁浪翻亦宜含容又何罪焉陛下不推原大壧深自為計徒肆私忌以快其意臣等受戮死即死耳顧天下之人必回視易慮以此事窺陛下心自今以後苟見不可之事終莫復言者矣復扶又翻下同齊桓公親揚其先君之惡以唱管仲國語曰魯莊公束縛管仲以與齊桓公公親迎於郊而與之坐問曰昔吾先君築臺以為高位田狩畢弋不聽國政卑聖侮士而唯女是崇九六嬪陳妾數百食必粱肉衣必文繡戎士凍餒是以國家不日引不月長恐宗廟不掃除社稷不血食敢問為此若何管子對以致霸之術今陛下乃欲為十世之武帝遠諱實事此言十世不以赤劉之九為數直以武昭宜元成哀平光明及帝為數為于偽翻臣恐有司卒然見構卒讀曰猝銜恨蒙枉不得自敘使後世論者亶以陛下有所比方寧可復使子孫追掩之乎謹詣闕伏待重誅書奏帝立詔勿問拜僖蘭臺令史百官志蘭臺令史六百石掌奏及印工文書建初八年十二月壬子詔前以妖惡禁錮三屬者一皆蠲除之賢曰三屬即三族也謂父族母族及妻族左傳曰以重幣錮之杜預曰禁錮勿令仕也妖於驕翻建初八年廬江毛義東平鄭均皆以行義稱於鄉里行下孟翻南陽張奉慕義名往候之坐定而府檄適至以義守安陽令賢曰檄召書也東觀記曰義為安陽尉府檄至令守令也安陽縣屬汝南郡賢曰安陽故城在今豫州新息縣西南喜動顏色奉心賤之辭去後義母死徵辟皆不至奉乃歎曰賢者固不可測往日之喜乃為親屈也為于偽翻均兄為縣吏頗受禮遺遺于貴翻均諫不聽乃脫身為傭歲餘得錢帛歸以與兄曰物盡可復得復扶又翻下同為吏坐臧終身捐棄臧與藏同遂為廉潔均仕為尚書免歸帝下詔褒寵義均賜穀各千斛常以八月長吏問起居加賜羊酒考異曰義傳云建初中今從均傳建初八年武威太守孟雲上言北胸奴復願與吏民合市詔許之北胸奴大且渠伊莫訾王等且子閭翻訾子斯翻驅牛馬萬餘頭來與漢交易南單于遣輕騎出上郡鈔之鈔楚交翻大獲而還建初八年帝復遣假司馬和恭等姓譜和本自羲和之後一云卞和之後超因發疏勒于填兵擊莎車莎車以賂誘疏勒王忠莎素何翻忠遂反從之西保烏即城超乃更立其府丞成大為疏勒王更工衡翻悉發其不反者以攻忠使人説康居王執忠以歸其國超立忠為疏勒王見上卷明帝永平十七年説輸芮翻降戶江翻王崇武標點容肇祖聶崇岐覆校
