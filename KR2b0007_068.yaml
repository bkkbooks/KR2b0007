body:
  text: 資治通鑑卷第六十八翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注漢紀六十建安二十二年孝獻皇帝癸建安二十二年丁酉二一七建安二十二年春正月魏王操軍居巢居巢縣屬廬江郡春秋之巢國宋白曰今無為軍本巢縣之無為鎮曹操攻吳築城於此無功而退因號無為城臨濡須水上壖地秦漢為居巢春秋但名巢辭有詳略耳考異曰孫權傳曹公次居巢攻濡須並在去冬今從魏武紀二月操進攻之孫權所保者十七年所築濡須塢也初右護軍蔣欽屯宣城宣城縣屬丹陽郡賢曰故城在今宣州南陵縣東表斬之蕪湖縣屬丹陽郡春秋吳鳩茲之地宋白曰以其地卑畜水非深而生蕪藻故曰蕪湖欽與呂蒙持諸軍節度欽每稱徐盛之善權問之欽曰盛忠而勤強有膽略器用好萬人督也今大事未定臣當助國求才豈敢挾私恨以蔽賢乎權善之三月操引軍還留伏波將軍夏侯惇都督曹仁張遼等二十六軍屯居巢晉志曰光武建武初征伐四方始置督軍御史事竟罷建安中魏武為相始遣大將軍督之二十一年命夏侯惇督二十六軍是也蕭子顯曰漢順帝時御史中丞馮赦討九江賊督揚徐二州軍事何徐宋志云起魏武王圭之職儀云起光武並非也操報使修好誓重結婚降戶江翻使疏吏翻好呼到翻重直龍翻權留平虜將軍周泰督濡須平虜將軍蓋孫氏創置以泰寒門不服寒門言所出微也大為酣樂命泰解衣權手自指其創痕樂音洛創初良翻問以所起泰輒記昔戰鬬處以對畢使復服權把其臂流涕曰幼平周泰字幼平為于偽翻戰如熊虎不惜軀命被創數十被皮義翻膚如刻畫孤亦何心不待卿以骨肉之恩委卿以兵馬之重乎周泰傳權住宣城忽略不治圍落山賊卒至權始上馬賊鋒刃已交泰投身衛權身被十二創是日微泰權幾危又從討黃祖拒曹公攻曹仁皆有功故委之住駕使泰以兵馬道從坐才臥翻道讀曰導從才用翻鳴鼓角作鼓吹而出樂纂曰司馬法軍中之樂鼓笛為上使聞之者壯勇而樂和細絲高竹不可用也慮悲聲感人士卒思歸之故也唐紹曰鼓吹之樂以為軍容昔黃帝涿鹿有功以為警衛劉昫曰鼓吹本軍旅之音馬上奏之自漢以來北狄之樂總歸鼓吹署余按漢制萬人將軍給鼓吹吹昌瑞翻建安二十二年夏四月詔魏王操設天子旌旗出入稱警蹕建安二十二年六月魏以軍師華歆為御史大夫華戶化翻建安二十二年冬十月命魏王操冕十有二旒乘金根車駕六馬設五時副車董巴輿服志曰金根車輪皆朱班重牙二轂兩轄金薄繆龍為輿倚較文虎伏軾龍首銜軛左右吉陽筒鸞雀立衡文畫輈羽蓋華蚤建大旗十二斿畫日月升龍駕六馬象鑣鏤錫金鍐方釳插翟尾朱兼樊纓赤罽易茸金就十有二左纛以氂牛尾為之在左騑馬軛上大如斗是為德車五時車安立亦皆如之各如方色白馬者朱其髦尾為朱鬣云所御駕六餘皆駕四後從為副車晉志五時安立車亦建旗十二各隨車色立車則正豎其旗安車則邪注鍐亡范祖叢釳許乙翻鐵孔也鍐馬首飾建安二十二年魏以五官中郎將丕為太子初魏王操娶丁夫人無子妾劉氏生子昂卞氏生四子丕彰植熊王使丁夫人母養昂昂死於穰事見六十二卷建安二年操怒而出之以卞氏為繼室植性機警多藝能才藻敏贍操愛之操欲以女妻丁儀妻七細翻丕以儀目眇眇者一目小儀由是怨丕與弟黃門侍郎廙晉百官志給事黃門侍郎秦官也漢以後並因之與侍中俱管門下衆事無員及晉置員四人廙逸職翻又羊至翻數稱臨災侯植之才數所角翻勸操立以為嗣修彪之子也操以函密訪於外尚書崔琰露版答曰露板不封也春秋之義立子以長春秋公羊傳曰立嫡以長不以賢立子以貴不以長長知兩翻宜承正統將即亮翻琰以死守之植琰之兄女壻也尚書僕射毛玠曰近者袁紹以嫡庶不分覆宗滅國廢立大事非所宜聞東曹掾邢顒曰以庶代宗先世之戒也願殿下深察之掾俞絹翻顒魚容翻丕使人問太中大夫賈詡以自固之術詡曰願將軍恢崇德度躬素士之業朝夕孜孜不違子道如此而已丕從之深自砥礪他日操屏人問詡屏必郢翻詡默然不對操曰與卿言而不答何也詡曰屬有所思屬之欲翻下右屬同故不即對耳操曰何思詡曰思袁本初劉景升父子也袁紹父子事見六十四卷六年七年劉表父子事見六十五卷十三年操嘗出征丕植並送路側植稱述功德發言有章左右屬目操亦悅焉丕悵然自失濟陰吳質耳語曰王當行流涕可也及辭丕涕泣而拜操及左右咸歔欷濟子禮翻歔音虛欷音希又許既翻於是皆以植多華辭而誠心不及也植既任性而行不自雕飾五官將御之以術矯情自飾宮人左右並為之稱説為于偽翻故遂定為太子左右長御賀卞夫人曰漢皇后宮有旁側長御將軍拜太子丕為五官將故稱之為將軍夫人當傾府藏以賞賜藏徂浪翻夫人曰王自以丕年大故用為嗣我但當以免無教導之過為幸耳亦何為當重賜遺乎遺于季翻長御還具以語操語牛倨翻操悅曰怒不變容喜不失節故最為難太子抱議郎辛毗頸而言曰辛君知我喜不不讀曰否毗以告其女憲英憲英歎曰太子代君主宗廟社稷者也代君不可以不戚主國不可以不懼宜戚而章甲十一行本而作宜乙十一行本同懼而反以為喜何以能久魏其不昌乎女子之智識有男子不能及者久之臨災侯植乘車行馳道中開司馬門出漢令乙騎乘車馬行馳道中已論者沒入車馬改具又宮衛令出入司馬門者皆下是司馬門猶可得而出入也若魏制則司馬門惟車駕出乃開耳公車令坐死由是重諸侯科禁而植寵日衰植妻衣繡操登臺見之以違制命還家賜死以違制命罪植妻則當時蓋禁衣錦繡也衣於既翻建安二十二年法正説劉備曰説輸芮翻曹操一舉而降張魯定漢中降戶江翻不因此勢以圖巴蜀而留夏侯淵張郃屯守郃古合翻又曷閣翻身遽北還此非其智不逮而力不足也必將內有憂逼故耳今策淵郃才略不勝國之將帥舉衆往討必可克之克之之日廣農積穀觀釁伺隙上可以傾覆寇敵尊獎王室中可以蠶食雍涼廣拓境土晉志曰漢改周之雍州為涼州以地處西方常寒涼也地勢西北邪出在南山之間南隔西羌西通西域于時號為斷胸奴右臂獻帝時涼州數亂河西五郡去州隔遠乃別立雍州末又依古典為九州乃令關右盡為雍州魏時復分以為涼州雍於用翻為持久之計此蓋天以與我時不可失也備善其策乃率諸將進兵漢中遣張飛馬超吳蘭等屯下辨下辨縣屬武都郡賢曰今成州同谷縣師古曰辨音步見翻又步莧翻建安二十二年魯肅卒孫權以從事中郎彭城嚴畯代肅畯音俊督兵萬人鎮陸口衆人皆為畯喜為于偽翻畯固辭以朴素書生不間軍事間習也至于流涕權乃以左護軍虎威將軍呂蒙兼漢昌太守以代之虎威將軍蓋孫權置沈約志曹魏置四十號將軍虎威第三十四建安二十二年定威校尉吳郡陸遜定威校尉亦權創置方今克敵寧亂非衆不濟而山寇舊惡依阻深地舊惡謂自舊為惡者難以圖遠可大部伍取其精鋭言可大為部伍擇取精鋭也以為帳下右部督會丹陽賊帥費棧作亂費父沸翻姓也棧士限翻扇動山越權命遜討棧破之遂部伍東三郡東三郡丹陽新都會稽也羸者補戶羸倫為翻得精卒數萬人宿惡蕩除蕩徒朗翻所過肅清還屯蕪湖會稽太守淳于式表遜枉取民人愁擾所在言遜之所在民人皆愁擾也會工外翻言次稱式佳吏孫權時都秣陵言次謂言論之次猶今云語次式白君而君薦之何也遜對曰式意欲養民是以白遜若遜復毀式以亂聖聽不可長也權曰此誠長者之事顧人不能為耳復扶又翻長知兩翻建安二十二年魏王操使丞相長史王必典兵督許中事魏王操猶領漢丞相而居鄴故以必為長史典兵督許京兆金禕覩漢祚將移乃與少府耿紀司直韋晃司直即丞相司直禕吁韋翻風俗通吉周尹吉甫之後漢有漢中太守吉恪挾天子以攻魏南引關羽為援二十三年二十三年春正月吉邈等率其黨千餘人夜攻王必燒其門射必中肩射食亦翻中竹仲翻帳下督扶必奔南城許昌之南城也邈等衆潰必與潁川典農中郎將嚴匡共討斬之潁川典農中郎將屯田許下二十三年三月有星孛于東方孛蒲內翻二十三年曹洪將擊吳蘭張飛屯固山聲言欲斷軍後斷丁管翻下同衆議狐疑騎都尉曹休曰漢武帝置三都尉騎都尉其一也賊實斷道者當伏兵潛行今乃先張聲勢此其不能明矣宜及其未集促擊蘭蘭破飛自走矣洪從之進擊破蘭斬之三月張飛馬超走情見勢屈宜其走也魏王族子也二十三年夏四月代郡上谷烏桓無臣氐等反先是魏王操召代郡太守裴潛為丞相理曹掾先悉薦翻掾于絹翻操美潛治代之功治直之翻潛曰潛於百姓雖寬於諸胡為峻今繼者必以潛為治過嚴而事加寬惠治直吏翻彼素驕恣過寬必弛既弛章甲十一行本弛下有又字乙十一行本同張校同將攝之以法攝持也整也以勢料之代必復叛後魏陸侯治高車與潛異世而同轍復扶又翻後數十日三單于反問果至操以其子鄢陵侯彰行驍騎將軍鄢陵縣屬潁川郡驍騎將軍始於漢武帝以命李廣陸德明曰鄢謁晚翻又於建翻漢書作傿師古曰音偃彰少善射御膂力過人少詩照翻操戒彰曰居家為父子受事為君臣動以王法從事爾其戒之二十三年劉備屯陽平關夏侯淵張郃徐晃等與之相拒備遣其將陳式等絶馬鳴閣道馬鳴閣在今利州昭化縣張郃屯廣石廣石當在巴漢之間急書發益州兵諸葛亮以問從事犍為楊洪洪曰漢中益州咽喉犍居言翻咽音煙存亡之機會若無漢中則無蜀矣此家門之禍也發兵何疑時法正從備北行亮於是表洪領蜀郡太守衆事皆辦遂使即真遂使之代法正初犍為太守李嚴辟洪為功曹嚴未去犍為而洪已為蜀郡洪舉門下書佐何祗有才策漢制郡閣下及諸曹各有書佐幹主文書靈帝光和二年樊毅復華下民租口算碑載其上尚書奏牘前書年月朔日弘農太守臣毅頓首死罪上尚書後書臣毅誠惶誠恐頓首頓首死罪死罪上尚書後繫掾臣條屬臣淮書佐臣謀而祗已為廣漢太守是以西土咸服諸葛亮能盡時人之器用也秋七月魏王操自將擊劉備九月至長安二十三年曹彰擊代郡烏桓身自搏戰鎧中數箭鎧可亥翻中竹仲翻意氣益厲乘勝逐北至桑乾之北桑乾縣屬代郡宋白曰今雲州東至桑乾督帳一百五十里孟康曰乾音干斬首獲生以千數時鮮卑大人軻比能軻比能本小種鮮卑以勇健不貪斷法平端衆推之為大人見彰力戰所向皆破乃請服北方悉平二十三年南陽吏民苦繇役繇讀曰徭苦於供給曹仁之軍也冬十月宛守將侯音反宛於元翻南陽太守東里袞鄭子産居東里支子以為氏音遣騎追之飛矢交流余以身蔽袞被七創而死被皮義翻創初良翻音騎執袞以歸時征南將軍曹仁屯樊以鎮荊州魏王操命仁還討音功曹宗子卿説音曰説輸芮翻足下順民心舉大事遠近莫不望風然執郡將將即亮翻逆而無益何不遣之音從之子卿因夜踰城從太守收餘民圍音會曹仁軍至共攻之二十四年二十四年春正月曹仁屠宛斬侯音復屯樊復扶又翻二十四年初夏侯淵戰雖數勝數所角翻魏王操常戒之曰為將當有怯弱時不可但恃勇也將當以勇為本行之以智計但知任勇一匹夫敵耳及淵與劉備相拒踰年備自陽平南渡沔水緣山稍前營於定軍山華陽國志曰漢中沔陽縣有定軍山北臨沔水據法正傳於定軍興勢作營則定軍山正在興勢也今按興勢山在洋州興道縣西北二十里去沔陽地里相遠當從華陽國志考異曰備傳云於定軍山勢作營法正傳作定軍興勢今從黃忠傳法正曰可擊矣備使討虜將軍黃忠乘高鼓譟攻之淵軍大敗斬淵考異曰淵傳曰備夜燒圍鹿角淵使張郃護東圍自將輕兵護南圍備挑郃戰郃軍不利淵分兵半助郃為備所襲戰死張郃傳曰備於走馬谷燒都圍淵救火從他道與備相遇交戰短兵接刃淵遂沒今從劉備黃忠法正傳顒刺益州操所命也淵軍既敗顒亦死顒魚容翻自廣石還陽平軍中擾擾不知所為督軍杜襲初操東還留襲督漢中軍事帥所類翻號令諸軍曰張將軍國家名將劉備所憚今日事急非張將軍不能安也遂權宜推郃為軍主郃出勒兵按陳陳讀曰陳下同諸將皆受郃節度衆心乃定明日備欲渡漢水來攻諸將以衆寡不敵欲依水為陳以拒之郭淮曰此示弱而不足挫敵非算也不如遠水為陳引而致之半濟而後擊之備可破也既陳備疑不渡淮遂堅守示無還心以狀聞於魏王操操善之遣使假郃節復以淮為司馬二十四年二月壬子晦日有食之二十四年三月魏王操自長安出斜谷軍遮要以臨漢中斜谷道險操恐為備所邀截先以軍遮要害之處乃進臨漢中或云遮要地名曹公雖來無能為也我必有漢川矣乃斂衆拒險終不交鋒操運米北山下黃忠引兵欲取之過期不還翊軍將軍趙雲將數十騎出營視之翊軍將軍備所創置也雲猝與相遇遂前突其陳且鬬且卻魏兵散而復合追至營下雲入營更大開門偃旗息鼓魏兵疑雲有伏引去雲雷鼓震天雷盧對翻惟以徑弩於後射魏兵射而亦翻魏兵驚駭自相蹂踐墮漢水中死者甚多蹂人九翻備明旦自來至雲營視昨戰處曰子龍一身都為膽也言其膽大能以孤軍亢操大兵操與備相守積月魏軍士多亡亡逃亡也五月操悉引出漢中諸軍還長安劉備遂有漢中操恐劉備北取武都氐以逼關中武都本白馬氐地既曰可勸使北出就穀以避賊前至者厚其寵賞則先者知利後必慕之操從之使既之武都徙氐五萬餘落出居扶風天水界操蓋已棄武都而不有矣諸氐散居秦川苻氏亂華自此始二十四年武威顏俊張掖和鸞酒泉黃華西平麴演等各據其郡自號將軍更相攻擊俊遣使送母及子詣魏王操為質以求助更工衡翻質音致操問張既既曰俊等外假國威內生傲悖悖蒲內翻又蒲沒翻計定勢足後即反耳今方事定蜀且宜兩存而鬬之猶卞莊子之刺虎坐收其敝也戰國策曰卞莊子刺虎管豎子止之曰兩虎方食牛牛甘必爭鬬則大者傷小者亡從傷刺之一舉必有兩獲莊子然之果獲二虎刺七亦翻善歲餘鸞遂殺俊武威王祕又殺鸞二十四年劉備遣宜都太守扶風孟達從秭歸北攻房陵殺房陵太守蒯祺張勃吳録曰劉備分南郡立宜都郡領夷道狠山夷陵三縣房陵縣本屬漢中郡此郡疑劉表所置使蒯祺守之否則祺自立也蒯苦怪翻統達軍劉封本羅侯寇氏之子長沙劉氏之甥備至荊州以未有繼嗣養之為子上庸太守申耽舉郡降上庸縣屬漢中郡賢曰故城在今房州清水縣西魏略曰申耽初在西城上庸間聚衆數千家與張魯通又遣使詣曹公公加其號為將軍使領上庸都尉降戶江翻領上庸太守以耽弟儀為建信將軍西城太守西城縣屬漢中郡備亦分為郡以授儀唐為金州二十四年秋七月劉備自稱漢中王設壇場於沔陽沔陽縣屬漢中郡㣥臣陪位讀奏訖乃拜受璽綬御王冠璽斯氏翻綬音受王冠遠遊冠也因驛拜章上還所假左將軍宜城亭侯印綬左將軍及宜城亭侯皆操所表授也上時掌翻拔牙門將軍義陽魏延為鎮遠將軍牙門鎮遠皆劉備創置將軍號以鎮漢川魏文帝分南陽郡立義陽郡又立義陽縣屬焉此在延入蜀之後史追書也鎮遠將軍蓋備所創置宋白曰義陽唐為申州宋為信陽軍以許靖為太傅法正為尚書令關羽為前將軍張飛為右將軍馬超為左將軍黃忠為後將軍前後左右將軍皆漢官遣益州前部司馬犍為費詩即授關羽印綬犍居言翻費父沸翻羽聞黃忠位與己並怒曰大丈夫終不與老兵同列不肯受拜詩謂羽曰夫立王業者所用非一昔蕭曹與高祖少小親舊少詩照翻而陳韓亡命後至論其班列韓最居上謂陳平韓信自楚而來韓信王而蕭曹侯故曰韓最居上今漢中王以一時之功隆崇漢室然意之輕重寧當與君侯齊乎言備以一時使忠與羽班而意之輕重則不在此曹操嘗表羽為漢壽亭侯故稱之為君侯同休等戚禍福共之愚謂君侯不宜計官號之高下爵祿之多少為意也僕一介之使使疏吏翻銜命之人君侯不受拜如是便還但相為惜此舉動為于偽翻恐有後悔耳羽大感悟遽即受拜二十四年詔以魏王操夫人卞氏為王后二十四年孫權攻合肥時諸州兵戍淮南魏改漢九江郡為淮南郡此間雖有賊然不足憂今水潦方生而子孝縣軍無有遠備曹仁字子孝時為征南將軍縣讀曰懸政恐征南有變耳驍堅堯翻已而關羽果使南郡太守麋芳守江陵將軍傅士仁守公安羽自率衆攻曹仁於樊仁使左將軍于禁立義將軍龐德等屯樊北操以龐德自漢中來歸故進號立義將軍大霖雨漢水溢平地數丈于禁等七軍皆沒禁與諸將登高避水羽乘大船就攻之禁等窮迫遂降降戶江翻下同龐德在隄上被甲持弓箭不虛發射必中也龐皮江翻被皮義翻至日過中羽攻益急矢盡短兵接德戰益怒氣愈壯而水浸盛吏士盡降降戶江翻下同德乘小船欲還仁營水盛船覆失弓矢獨抱船覆水中為羽所得立而不跪示不屈伏卿兄在漢中魏略曰德從兄柔在蜀不早降何為德罵羽曰豎子何謂降也魏王帶甲百萬威振天下汝劉備庸才耳豈能敵邪我寧為國家鬼不為賊將也羽殺之將即亮翻魏王操聞之章甲十一行本之下有流涕二字乙十一行本同孔本同曰吾知于禁三十年操收兵兗州禁即為將處昌呂翻難乃旦翻反不及龐德邪封德二子為列侯羽急攻樊城城得水往往崩壞衆皆恟懼恟許勇翻或謂曹仁曰今日之危非力所支可及羽圍未合乘輕船夜走汝南太守滿寵曰山水速疾冀其不久聞羽遣別將已在郟下寵為汝南太守操令助曹仁屯樊城郟縣屬潁川郡師古曰郟音夾晉地理志襄城郡復有郟縣蓋東漢省而魏晉復置縣也百姓擾擾羽所以不敢遂進者恐吾軍掎其後耳掎居蟻翻今若遁去洪河以南非復國家有也洪河大河也仁曰善乃沈白馬與軍人盟誓沈持林翻同心固守城中人馬才數千人城不沒者數板城高二尺為一板立圍數重重直龍翻外內斷絶羽又遣別將圍將軍呂常於襄陽荊州刺史胡修南鄉太守傅方皆降於羽水經注漢建安中割南陽右壤為南鄉郡屬荊州二十四年初沛國魏諷有惑衆才傾動鄴都魏相國鍾繇辟以為西曹掾此魏相國府之西曹掾也與諷友善同郡鄭袤袤音茂泰之子也每謂覽曰諷姦雄終必為亂九月諷潛結徒黨與長樂衛尉陳禕謀襲鄴樂音洛禕吁韋翻未及期禕懼而告之太子丕誅諷連坐死者數千人鍾繇坐免官二十四年初丞相主簿楊修與丁儀兄弟謀立曹植為魏嗣修為漢丞相主簿操官屬也以車載廢簏內朝歌長吳質與之謀長知兩翻修以白魏王操操未及推驗丕懼告質質曰無害也明日復以簏載絹以入修復白之推驗無人推按也復扶又翻其後植以驕縱見疏植乘車行馳道中私開司馬門出既得罪矣曹仁為關羽所圍操欲遣植救仁而植醉不能受命於是益見疏修亦不敢自絶每當就植慮事有闕忖度操意忖寸本翻度徒洛翻豫作答教十餘條敕門下教出隨所問答之於是教裁出答已入操怪其捷推問始泄操亦以修袁術之甥惡之惡烏路翻乃發修前後漏泄言教交關諸侯以修豫作答教謂之漏泄與植往來謂之交關諸侯二十四年魏王操以杜襲為留府長史駐關中置留府於關中者以備蜀也帥所類翻此又一許攸非自袁紹來奔之許攸也擁部曲不歸附而有慢言操大怒先欲伐之㣥臣多諫宜招懷攸共討強敵操橫刀於膝膝與膝同襲入欲諫操逆謂之曰吾計已定卿勿復言復扶又翻襲曰若殿下計是邪臣方助殿下成之若殿下計非邪雖成宜改之殿下逆臣令勿言何待下之不闡乎闡開也大也明也許攸慢吾如何可置置捨也殿下謂許攸何如人邪操曰凡人也襲曰夫惟賢知賢惟聖知聖凡人安能知非凡人邪方今豺狼當路而狐狸是先人將謂殿下避強攻弱進不為勇退不為仁臣聞千鈞之弩不為鼷鼠發機萬石之鍾不以莛撞起音三十斤為鈞千鈞之弩言其重也鼷鼠小鼠也説文曰有螫毒者或謂之甘鼠陸佃埤雅曰鼷鼠者甘口齧人及鳥獸皆不痛博物志云鼠之最小者本草説鼷鼠極細不可卒見四斤鈞石百二十斤也莛草莖也東方朔曰以莛撞鍾是皆言力勢重者不以輕觸而發動也鼷音奚莛音廷撞直江翻今區區之許攸何足以勞神武哉操曰善遂厚撫攸攸即歸服二十四年冬十月魏王操至洛陽二十四年陸渾民孫狼等作亂陸渾縣屬弘農郡秦晉遷陸渾之戎於此宋白曰陸渾河南府伊陽縣地師古曰渾音胡昆翻南附關羽羽授狼印給兵還為寇賊自許以南往往遙應羽羽威震華夏夏戶雅翻魏王操議徙許都以避其鋭丞相軍司馬司馬懿西曹屬蔣濟言於操曰于禁等為水所沒非戰攻之失於國家大計未足有損劉備孫權外親內疏關羽得志權必不願也可遣人勸權躡其後許割江南以封權則樊圍自解操從之初魯肅嘗勸孫權以曹操尚存宜且撫輯關羽與之同仇不可失也及呂蒙代肅屯陸口以為羽素驍雄有兼並之心驍堅堯翻且居國上流其勢難久密言於權曰今令征虜守南郡孫皎時為征虜將軍此即甘寧據楚關之計也應敵所在蒙為國家前據襄陽為于偽翻如此何憂於操何賴於羽且羽君臣矜其詐力所在反覆不可以腹心待也今羽所以未便東向者以至尊聖明蒙等尚存也今不於強壯時圖之一旦僵仆欲復陳力其可得邪僵仆謂死也復扶又翻今欲先取徐州自廣陵以北皆徐州之地何如對曰今操遠在河北撫集幽冀未暇東顧餘章甲十一行本餘作徐乙十一行本同土守兵聞不足言曹操審知天下之勢慮此熟矣此兵法所謂城有所不守也然地勢陸通驍騎所騁騁丑郢翻至尊今日取徐州操後旬必來爭雖以七八萬人守之猶當懷憂呂蒙自量吳國之兵力不足北向以爭中原者知車騎之地非南兵之所便也全據長江形勢益張易為守也權善之易以豉翻權嘗為其子求昏於羽為于偽翻羽罵其使不許昏使疏吏翻權由是怒及羽攻樊呂蒙上疏曰羽討樊而多留備兵必恐蒙圖其後故也蒙常有病乞分士衆還建業以治疾為名治直之翻羽聞之必撤備兵盡赴襄陽大軍浮江晝夜馳上上時掌翻襲其空虛則南郡可下而羽可禽也此南郡謂江陵權乃露檄召蒙還露檄欲使羽知之蒙下至蕪湖定威校尉陸遜謂蒙曰關羽接境如何遠下後不當可憂也蒙曰誠如來言然我病篤遜曰羽矜其驍氣陵轢於人轢郎狄翻始有大功意驕志逸但務北進未嫌於我有相聞病必益無備今出其不意自可禽制下見至尊宜好為計英雄之士所見略同蒙所以知其意思深長也羽素勇猛既難為敵且已據荊州恩信大行兼始有功膽勢益盛未易圖也兵事尚密遜之言雖當蒙之心蒙未敢容易為遜言之易以豉翻權問誰可代卿者蒙對曰陸遜意思深長思相吏翻才堪負重觀其規慮終可大任而未有遠名非羽所忌無復是過也復扶又翻下同若用之當令外自韜隱內察形便然後可克權乃召遜拜偏將軍右部督以代蒙遜至陸口為書與羽稱其功美深自謙抑為盡忠自託之意羽意大安無復所嫌稍撤兵以赴樊果墮蒙計陳其可禽之要羽得于禁等人馬數萬糧食乏絶亶取權湘關米吳與蜀分荊州以湘水為界故置關遂發兵襲羽權欲令征虜將軍孫皎與呂蒙為左右部大督征虜將軍始於光武以命祭遵若至尊以征虜能宜用之以蒙能宜用蒙昔周瑜程普為左右部督督兵攻江陵雖事決於瑜普自恃久將將即亮翻且俱是督遂共不睦幾敗國事此目前之戒也事見六十六卷建安十五年幾居希翻敗補邁翻謝蒙曰以卿為大督命皎為後繼可也魏王操之出漢中也使平寇將軍徐晃屯宛以助曹仁平寇將軍蓋亦曹操所置考沈約志不在四十號之數晃前至陽陵陂關羽遣兵屯偃城括地志偃城在襄州安養縣北三里古郾子之國詭道作都塹示欲截其後羽兵燒屯走詭道出偃城之後通為長塹故曰都塹連營稍前操使趙儼以議郎參曹仁軍事與徐晃俱前餘救兵未到晃所督不足解圍而諸將呼責晃促救仁儼謂諸將曰今賊圍素固水潦猶盛我徒卒單少少詩沼翻而仁隔絶不得同力此舉適所以敝內外耳當今不若前軍逼圍遣諜通仁使知外救以勵將士計北軍不過十日尚足堅守然後表裏俱發破賊必矣如有緩救之戮余為諸君當之為于偽翻諸將皆喜晃營距羽圍三丈所作地道及箭飛書與仁消息數通消者浸微浸滅之意息者漸生漸長之意消息數通則城內城外各知安否也晃營迫羽圍如此而不能制使呂蒙不襲取江陵羽亦必為操所破而操假手於蒙者欲使兩寇自敝而坐收漁人田父之功也數所角翻孫權為箋與魏王操請以討羽自效及乞不漏令羽有備操問㣥臣㣥臣咸言宜密之董昭曰軍事尚權期於合宜宜應權以密而內露之羽聞權上若還自護圍則速解便獲其利可使兩賊相對銜持以馬為喻也兩馬欲相踶齧既加之銜勒兩不能動矣而欲鬬之氣未衰相對銜持則兩雖跳梁力必自敝上時掌翻祕而不露使權得志非計之上又圍中將吏不知有救計糧怖懼計城中之糧不足以持久則心懷怖懼也怖普布翻為難不小難乃旦翻露之為便且羽為人強梁自恃二城守固必不速退操曰善即敕徐晃以權書射著圍裏及羽屯中射而亦翻著直略翻圍裏聞之志氣百倍羽果猶豫不能去羽雖見權書自恃江陵公安守固非權旦夕可拔又因水勢結圍以臨樊城有必破之勢釋之而去必喪前功此其所以猶豫也魏王操自雒陽南救曹仁㣥下皆謂王不亟行今敗矣侍中桓階獨曰大王以仁等為足以料事勢不也不讀曰否曰能大王恐二人遺力邪二人謂曹仁呂常也不然然則何為自往曰吾恐虜衆多而徐晃等勢不便耳階曰今仁等處重圍之中重直龍翻下同而守死無二者誠以大王遠為之勢也夫居萬死之地必有死爭之心內懷死爭外有強救大王按六軍以示餘力何憂於敗而欲自往操善其言乃駐軍摩陂據水經摩陂在潁川郟縣縱廣可一十五里魏青龍元年有龍見于陂於是改曰龍陂關羽圍頭有屯又別屯四冢晃乃揚聲當攻圍頭屯而密攻四冢章乙十一行本冢下有羽見四冢四字欲壞自將步騎五千出戰自將之上有羽字文意乃明退走羽圍塹鹿角十重重直龍翻晃追羽與俱入圍中破之傅方胡修皆死羽遂撤圍退然舟船猶據沔水襄陽隔絶不通呂蒙至尋陽盡伏其精兵中居侯翻盧谷翻博雅曰舟也使白衣搖櫓作商賈人服賈音古晝夜兼行羽所置江邊屯候盡收縛之是故羽不聞知屯候雖被收縛使麋傅無叛心羽猶可得聞知也羽之出軍芳仁供給軍資不悉相及羽言還當治之治直之翻芳仁咸懼於是蒙令故騎都尉虞翻權以翻為騎都尉以謗徙丹陽蒙請以自隨時無官爵故稱故官為書説仁為陳成敗説輸芮翻為于偽翻仁得書即降降戶江翻下同翻謂蒙曰此譎兵也謂蒙以譎計行兵也譎古穴翻留兵備城遂將仁至南郡將如字蒙以仁示之芳遂開門出降蒙入江陵釋于禁之囚得關羽及將士家屬皆撫慰之約令軍中不得干歷人家有所求取蒙麾下士與蒙同郡人取民家一笠以覆官鎧覆敷救翻官鎧雖公蒙猶以為犯軍令不可以鄉里故而廢法遂垂涕斬之於是軍中震栗道不拾遺蒙旦暮使親近存恤耆老問所不足疾病者給醫藥飢寒者賜衣糧羽府藏財寶皆封閉以待權至藏徂浪翻關羽聞南郡破即走南還還從宣翻又如字曹仁會諸將議咸曰今因羽危懼可追禽也趙儼曰權邀羽連兵之難邀當作徼徼幸也難乃旦翻謂與曹仁連兵顧羽還救恐我乘其兩疲故順辭求效求效猶言求自效也或曰巽順其辭以求成效今羽已孤迸言羽失根本而勢孤奔迸也若深入追北權則改虞於彼將生患於我矣虞度也防也謂度羽不能為害則改其防羽之心而防操則必為操之患矣仁乃解嚴趙儼之計此戰國策士所謂兩利而俱存之之計也解嚴解所嚴兵不復追羽也是後陸遜敗劉備於峽中收兵而還不復追備計亦出此恐諸將追之果疾敕仁如儼所策關羽數使人與呂蒙相聞數所角翻蒙輒厚遇其使使疏吏翻周遊城中家家致問或手書示信羽人還私相參訊訊問也見待過於平時故羽吏士無鬬心呂蒙所以禽關羽者攜之而已恙金亮翻會權至江陵荊州將吏悉皆歸附獨治中從事武陵潘濬稱疾不見權遣人以牀就家輿致之濬伏面著牀席不起涕泣交橫哀哽不能自勝著直略翻勝音升權呼其字與語潘濬字承明使親近以手巾拭其面濬起下地拜謝即以為治中荊州軍事一以咨之郝普麋芳傅士仁之在吳未有所聞也而潘濬所以自見者與陸遜諸葛瑾班識者當於此而觀人圖以武陵附漢中王備漢制州牧刺史部諸郡各郡置部從事胄與胄同誘音酉差初佳翻擇也督將也權不聽特召問濬濬答以五千兵往足以擒胄權曰卿何以輕之濬曰胄是南陽舊姓南陽之樊光武之母黨故謂之舊姓而實無才略今人以辨給觀人才何其謬也吻武粉翻口邊曰吻臣所以知之者胄昔嘗為州人設饌為于偽翻饌雛戀翻又雛皖翻比至日中比必寐翻食不可得而十餘自起此亦侏儒觀一節之驗也侏儒優人以能諧笑取寵觀其一節足以驗其技即遣濬將五千人往果斬平之權以呂蒙為南郡太守封孱陵侯孱仕連翻賜錢一億黃金五百斤以陸遜領宜都太守吳録曰蜀昭烈帝立宜都郡於西陵即夷陵也唐為峽州夷陵郡十一月漢中王備所置宜都太守樊友委郡走諸城長吏及蠻夷君長皆降於遜長知兩翻遜請金銀銅印以假授初附擊蜀將詹晏等詹姓也周有詹父楚有詹尹皆破降之前後斬獲招納凡數萬計權以遜為右護軍鎮西將軍進封婁侯屯夷陵守峽口婁縣前漢屬會稽郡後漢屬吳郡范成大吳郡志婁縣今謂之崑山縣東北三里有村落名婁縣蓋古婁縣治所也峽口西陵峽口也宜都記曰自黃牛灘東入西陵界至峽口一百許里山水紆曲兩岸高山重嶂非日中夜半不見日月關羽自知孤窮乃西保麥城荊州記曰南郡當陽縣東南有麥城羽偽降誘音酉降戶江翻立幡旗為象人於城上因遁走兵皆解散才十餘騎權先使朱然潘璋斷其徑路斷丁管翻十二月璋司馬馬忠獲羽及其子平於章鄉水經注漳水出臨沮縣東荊山南徑臨沮縣之漳鄉南潘璋禽關羽於此漳水又南徑當陽縣又南徑麥城東遂定荊州初偏將軍吳郡全琮全姓琮名權恐事泄寢而不答及已禽羽權置酒公安顧謂琮曰君前陳此孤雖不相答今日之捷抑亦君之功也於是封琮陽華亭侯權復以劉璋為益州牧駐秭歸未幾璋卒劉備入益州遷璋于公安今為權所得幾居豈翻呂蒙未及受封而疾發權迎置於所館之側所以治護者萬方時有加針權為之慘戚治直之翻為于偽翻欲數見其顏色數所角翻又恐勞動常穿壁瞻之見小能下食則喜顧左右章甲十一行本右下有言笑二字乙十一行本同孔本同張校同退齋校同不然則咄唶咄當沒翻咨也唶子夜翻嘆也夜不能寐病中瘳為下赦令為于偽翻下同㣥臣畢賀已而竟卒年四十二權哀痛殊甚為置守冢三百家權後與陸遜論周瑜魯肅及蒙曰公瑾雄烈膽略兼人遂破孟德開拓荊州邈焉寡儔子敬因公瑾致達於孤孤與宴語便及大略帝王之業此一快也事見六十三卷五年張言方率數十萬衆水步俱下張言者張大而言之咨問所宜無適先對無適先對猶言莫適先對也適音的秦松字文表子敬即駮言不可駮異也立異議以糾駮衆議之非駮北角翻付任以衆逆而擊之此二快也事見六十五卷十三年事見六十六卷十五年不足以損其二長也周公不求備於一人論語載周公語魯公之言常以比方鄧禹也鄧禹建策以開光武中興之業而其後不能定赤眉故以肅比之呂蒙字子明少詩照翻劇艱也易以豉翻及身長大長知兩翻學問開益籌略奇至可以次於公瑾但言議英發不及之耳圖取關羽勝於子敬子敬答孤書云帝王之起皆有驅除羽不足忌謂關羽之強適足為吳之驅除也外為大言耳孤亦恕之不苟責也然其作軍屯營不失令行禁止部界無廢負謂部界之內無有廢職以為罪負也其法亦美矣孫權與于禁乘馬併行併讀曰並虞翻呵禁曰汝降虜降戶江翻何敢與吾君齊馬首乎抗鞭欲擊禁抗舉也二十四年孫權之稱藩也魏王操召張遼等諸軍悉還救樊未至而圍解徐晃振旅還摩陂操迎晃七里置酒大會王舉酒謂晃曰全樊襄陽將軍之功也亦厚賜桓階以為尚書操嫌荊州殘民及其屯田在漢川者此漢川謂襄樊上下漢水左右之地也司馬懿曰荊楚輕脆易動易以豉翻關羽新破諸為惡者藏竄觀望徙其善者既傷其意將令去者不敢復還操曰是也是後諸亡者悉還出二十四年魏王操表孫權為票騎將軍假節領荊州牧封南昌侯南昌縣屬豫章郡票匹妙翻又遣朱光等歸朱光為權所獲見上卷十九年稱説天命操以權書示外曰是兒欲踞吾著爐火上邪著直略翻蓋言漢以火德王權欲使操加其上也然操必以權書示外者正欲以觀衆心耳侍中陳㣥等皆曰漢祚已終非適今日殿下功德巍巍㣥生注望注猶屬望此天人之應異氣齊聲殿下宜正大位復何疑哉復扶又翻操曰若天命在吾吾為周文王矣文王三分天下有其二以服事殷臣光曰教化國家之急務也而俗吏慢之風俗天下之大事也而庸君忽之夫惟明智君子深識長慮然後知其為益之大而收功之遠也光武遭漢中衰㣥雄糜沸奮起布衣紹恢前緒征伐四方日不暇給乃能敦尚經術賓延儒雅開廣學校校戶教翻修明禮樂武功既成文德亦洽繼以孝明孝章遹追先志遹述也遵也遹音聿橫經問道自公卿大夫至于郡縣之吏咸選用經明行修之人行下孟翻虎賁衛士皆習孝經賁音奔胸奴子弟亦遊大學是以教立於上俗成於下其忠厚清修之士豈惟取重於搢紳搢紳謂搢笏垂紳在朝公卿大夫也愚鄙汚穢之人豈惟不容於朝延章甲十一行本延作廷乙十一行本同熊校同亦見棄於鄉里自三代既亡風化之美未有若東漢之盛者也及孝和以降貴戚亶權嬖幸用事嬖卑義翻又必計翻賞罰無章賄賂公行賢愚渾殽是非顛倒可謂亂矣然猶帛丿糸帛丿糸不至於亡者上則有公卿大夫袁安楊震李固杜喬陳蕃李膺之徒面引廷爭爭讀曰諍用公義以扶其危下則有布衣之士符融郭泰范滂許卲之流立私論以救其敗私論者謂其不得預議於朝而私立論於下以矯朝議之失也治直吏翻至有觸冒斧鉞僵仆於前而忠義奮發繼起於後隨踵就戮視死如歸夫豈特數子之賢哉亦光武明章之遺化也當是之時苟有明君作而振之則漢氏之祚猶未可量也量音良不幸承陵夷頽敝之餘重以桓靈之昏虐保養姦回孔安國曰回邪也重直用翻殄滅忠良甚於寇讎積多士之憤蓄四海之怒於是何進召戎董卓乘釁袁紹之徒從而構難難乃旦翻遂使乘輿播越乘繩證翻宗廟丘墟王室蕩覆蒸民塗炭大命隕絶不可復救復扶又翻然州郡擁兵專地者雖互相吞噬猶未嘗不以尊漢為辭以魏武之暴戾強伉伉口浪翻加有大功於天下其蓄無君之心久矣乃至沒身不敢廢漢而自立豈其志之不欲哉猶畏名義而自抑也由是觀之教化安可慢風俗安可忽哉何茲全標點容肇祖聶崇岐覆校
