body:
  text: 資治通鑑卷第二百五十九端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀七十五昭宗聖穆景文孝皇帝上之中景福元年景福元年壬子八九二景福元年春正月丙寅赦天下改元景福元年鳳翔李茂貞靜難王行瑜難乃旦翻鎮國韓建同州王行約秦州李茂莊五節度使上言楊守亮容匿叛臣楊復恭事見上卷上年上時掌翻乞加茂貞山南西道招討使朝議以茂貞得山南不可復制復扶又翻下詔和解之皆不聽景福元年王鎔李匡威合兵十餘萬攻堯山李克用遣其將李嗣勳擊之大破幽鎮兵斬獲三萬考異曰實録在二月恐約奏到今從唐太祖紀年録景福元年楊行密謂諸將曰孫儒之衆十倍於我吾戰數不利數所角翻欲退保銅官何如劉威李神福曰儒掃地遠來利在速戰宜屯據險要堅壁清野以老其師時出輕騎抄其饋餉抄楚交翻奪其俘掠彼前不得戰退無資糧可坐擒也戴友規曰儒與我相持數年僖宗光啓三年楊行密孫儒爭揚州至是五年矣今悉衆致死於我我若望風棄城正墮其計淮南士民從公渡江及自儒軍來降者甚衆公宜遣將先護送歸淮南降戶江翻將即亮翻使復生業儒軍聞淮南安堵皆有思歸之心人心既搖安得不敗行密悅從之以孫儒驅淮南人以攻楊行密故其謀云爾為行密擒孫儒張本廬州人也景福元年威戎節度使楊晟僖宗文德元年置威戎軍於彭州二月丁丑晟出兵掠新繁漢州之境使其將呂蕘將兵二千會楊守厚攻梓州蕘如招翻梓州東川節度使顧彥暉治所建遣行營都指揮使李簡擊蕘斬之景福元年戊寅朱全忠出兵擊朱瑄遣其子友裕將兵前行軍于斗門據舊書李師道傳斗門城在濮陽縣界景福元年李茂貞王行瑜亶舉兵擊興元不以天子之命舉兵故曰亶遺杜讓能西門君遂書遺唯季翻杜讓能時為相西門君遂時為神策中尉此內外二大臣也陵蔑朝廷上意不能容御延英召宰相諫官議之時宦官有陰與二鎮相表裏者宰相相顧不敢言上不悅給事中牛徽曰先朝多難茂貞誠有翼衛之功此謂僖宗再幸山南時也難乃旦翻亟出攻討其志亦在疾惡但不當不俟詔命耳比聞兵過山南比毗至翻殺傷至多陛下儻不以招討使授之使用國法約束則山南之民盡矣上曰此言是也乃以茂貞為山南西道招討使牛徽之言上所以誘掖其君下所以彌縫悍將若以之為國謀則未也景福元年甲申朱全忠至衛南朱瑄將步騎萬人襲斗門朱友裕棄營走瑄據其營全忠不知乙酉引兵趣斗門趣七喻翻至者皆為鄆人所殺全忠退軍瓠河九域志濮州雷澤縣有瓠河鎮丁亥瑄擊全忠大破之全忠走張歸厚於後力戰全忠僅免考異曰歸厚傳云十一月誤也今從梁紀璠音煩景福元年朱全忠奏貶河陽節度使趙克裕考異曰實録在正月末云全忠欲全義得河陽乃奏克裕有誣謗之言而貶新紀云己未朱全忠陷孟州逐河陽節度使趙克裕今從編遺録二鎮時皆屬朱全忠或貶或兼唯其所奏景福元年孫儒圍宣州初劉建鋒為孫儒守常州將兵從儒擊楊行密甘露鎮使陳可言帥部兵千人據常州潤州城東角土山上有甘露寺前對北固山後枕大江寶曆中李德裕建寺適有甘露降因以名之孫儒蓋因此寺而置甘露鎮也帥讀曰率可言倉猝出迎訓手刃殺之遂取常州考異曰新紀景福二年二月楊行密陷常州按行密自宣歸揚過常州已歎張訓之功新紀誤也今從十國紀年楊行密自此遂有潤州而與錢氏爭常州矣景福元年朱全忠連年攻時溥光啓三年徐汴始交兵兗鄆河東兵救之皆無功復值水災復扶又翻人死者什六七溥困甚請和於全忠全忠曰必移鎮乃可溥許之全忠乃奏請移溥他鎮仍命大臣鎮徐州詔以門下侍郎同平章事劉崇望同平章事充感化節度使以溥為太子太師溥恐全忠詐而殺之據城不奉詔崇望及華陰而還華戶化翻還從宣翻又如字景福元年忠義節度使趙德諲薨子匡凝代之考異曰實録此月以前忠義軍節度使趙匡凝起復某官不言德諲卒在何時新傳薛史但云匡凝為唐州刺史兼七州馬步軍都校及德諲卒自為襄州留後朝廷即以旄鉞授之亦不言年月今附於此景福元年范暉驕侈失衆心范暉據福州見上卷上年弟審知為都監將兵攻福州從才用翻監古銜翻民自請輸米餉軍平湖洞及濱海蠻夷皆以兵船助之平湖洞在泉州莆田縣界外九域志曰今興化軍大飛山地本平湖數頃一夕風雨暴至旦見此山聳峙一名大飛景福元年辛丑王建遣族子嘉州刺史宗裕雅州刺史王宗侃威信都指揮使華洪茂州刺史王宗瑤將兵五萬攻彭州按九域志彭州距成都九十餘里此其壤地相接煙火相望所謂臥榻之側豈容他人鼾睡者也王建安得而不急攻之邪宗裕等圍之楊守亮遣其將符昭救之徑趨成都營三學山趨七喻翻漢州金堂縣東北十里有三學山建亟召華洪還洪疾驅而至王建一時諸將唯華洪饒智略建所倚也故亟召之以禦符昭華戶化翻以數百人夜去昭營數里多擊更鼓昭以為蜀軍大至引兵宵遁更工衡翻更鼓持更之鼓官府及行軍每更擊之以為節更鼓多則敵人以為營寨多故宵遁景福元年三月以戶部尚書鄭延昌為中書侍郎同平章事延昌從讜之從兄弟也僖宗乾符間鄭從讜鎮河東有聲績之從才用翻景福元年左神策勇勝三都都指揮使楊子實子遷子釗皆守亮之假子也勇勝三都亦神策五十二都之數知守亮必敗壬子帥其衆二萬降於王建帥讀曰率景福元年李克用王處存合兵攻王鎔癸丑拔天長鎮天長鎮在滹沱河東北戊午鎔與戰於新市大破之殺獲三萬餘人新市漢古縣唐併入鎮州九門縣辛酉克用退屯欒城詔和解河東及鎮定幽四鎮景福元年楊晟遺楊守貞楊守忠楊守厚書遺于季翻使攻東川以解彭州之圍守貞等從之神策督將竇行實戍梓州守厚密誘之為內應誘音酉守厚至涪城行實事泄顧彥暉斬之考異曰實録明年正月楊守厚攻東川以竇行實為內應事泄行實死守厚遁去因李茂貞與王建爭東川追敘今年事耳今從十國紀年守貞守忠軍至無所歸盤桓綿劍間綿劍二州名宋白曰綿州漢涪城縣地西魏置潼州隋置綿州以綿水為稱九域志綿州東北至劍州二百九十四里破之癸亥西川將李簡邀擊守忠於鍾陽九域志綿州巴西縣有鍾陽鎮夏四月簡又破守厚於銅鉾鉾亡侯翻斬獲三千餘人降萬五千人守忠守厚皆走景福元年乙酉置武勝軍於杭州以錢鏐為防禦使景福元年天威軍使賈德晟以李順節之死頗怨憤李順節死見上卷上年惡烏路翻奏而殺之德晟麾下千餘騎奔鳳翔李茂貞由是益強景福元年李匡威出兵侵雲代壬寅李克用始引兵還自鎮州引還景福元年時溥遣兵南侵至楚州楊行密將張訓李德誠敗之于壽河敗補邁翻下同遂取楚州執其刺史劉瓚朱全忠以劉瓚刺楚州見二百五十七卷僖宗光啓三年張訓等既破徐兵乘勝遂取汴之楚州考異曰新紀三月乙巳楊行密陷楚州執刺史劉瓚十國紀年三月時溥遣兵三萬南侵至楚州四月楊行密將張訓李德誠敗徐兵于壽河俘斬三千級取楚州執瓚今從之景福元年加章十二行本加上有五月二字乙十一行本同孔本同張校同退齋校同邠寧節度使王行瑜兼中書令景福元年楊行密屢敗孫儒兵破其廣德營廣德營孫儒之兵營於廣德者也敗補邁翻斷其糧道義寧二年沈法興分烏程置安吉縣唐因之屬湖州九域志在州西南百七十一里斷音短士卒大疫遣其將劉建鋒馬殷分兵掠諸縣六月行密聞儒疾瘧瘧逆約翻疾而寒熱迭作謂之瘧戊寅縱兵擊之會大雨晦冥儒軍大敗安仁義破儒五十餘寨田頵擒儒於陳陳讀曰陳斬之傳首京師儒衆多降於行密光啓三年孫儒始與行密交兵至是而敗孫儒以十倍之衆攻行密其智勇亦無以大相過而卒斃於行密者儒專務殺掠人心不附又後無根本行密雖為儒所困分遣張訓李德誠略淮浙之地以自廣又斥餘廩以飼飢民既得人心又有根本所以勝也南走洪州走音奏推建鋒為帥殷為先鋒指揮使張章十二行本張上有以行軍司馬五字乙十一行本同孔本同張校同退齋校同佶為謀主比至江西衆十餘萬帥所類翻比必利翻及也丁酉楊行密帥衆歸揚州帥讀曰率考異曰十國紀年行密過常州謂左右曰常州大城也張訓以一劍下之不亦壯哉舊紀大順二年三月淮南節度使孫儒為宣州觀察使楊行密所殺初行密揚州失守據宣州孫儒以兵攻圍三年是春淮南大飢軍中疫癘是月孫儒亦病為帳下所執降行密行密乃併孫儒之衆復據廣陵薛居正五代史行密傳曰大順元年行密危蹙出據宣州儒復入揚州二年儒攻行密屬江淮疾疫師人多死儒亦臥病為部下所執送於行密殺之行密自宣城長驅入于廣陵唐補紀大順二年六月孫儒兵敗於宛陵城下楊行密進首級於西京吳録曰景福元年六月六日太祖盡率諸將晨出擊儒田頵臨陳擒儒以獻斬儒於市傳首京師新紀實録十國紀年皆據此舊紀薛史唐補紀皆誤秋七月丙辰至廣陵表田頵守宣州安仁義守潤州先是揚州富庶甲天下先悉薦翻時人稱揚一益二言揚州居一益州為次也秦彥畢師鐸孫儒楊行密也東西千里掃地盡矣景福元年王建圍彭州久不下民皆竄匿山谷諸寨日出俘掠謂之淘虜都將先擇其善者餘則士卒分之以是為常將即亮翻有軍士王先成者新津人本書生也世亂為兵度諸將惟北寨王宗侃最賢乃往説之曰度徒洛翻説式芮翻彭州本西川之巡屬也陳田召楊晟割四州以授之見二百五十七卷文德元年陳田謂陳敬瑄田令孜與之共拒朝命朝直遙翻今陳田已平而晟猶據之州民皆知西川乃其大府巡屬諸州以節度使府為大府亦謂之會府時朝命以王建檢校司徒故稱之民不入城而入山谷避之以俟招安今軍至纍月未聞招安之命軍士復從而掠之復扶又翻與盜賊無異奪其資財驅其畜産分其老弱婦女以為奴婢使父子兄弟流離愁怨其在山中者暴露於暑雨殘傷於蛇虎孤危飢渴無所歸訴彼始以楊晟非其主而不從今司徒不加存恤彼更思楊氏矣宗侃惻然不覺屢移其牀前問之先成曰又有甚於是者今諸寨每旦出六七百人入山淘虜薄暮乃返薄迫也賴城中無人耳萬一有智者為之畫策為于偽翻使乘虛奔突先伏精兵千人於門內登城望淘虜者稍遠出弓弩手炮手各百人炮與炮同匹貌翻攻寨之一面隨以役卒五百負薪土填壕為道然後出精兵奮擊且焚其寨又於三面城下各出耀兵耀兵者以耀敵使不知所備無暇相救城中得以益兵繼出如此能無敗乎宗侃矍然曰矍居縛翻此誠有之將若之何先成請條列為狀以白王建宗侃即命先成草之大指言今所白之事須四面通共時西川兵圍彭州四面下寨宗裕宗侃華洪宗瑤各當一面或所白可從乞以牙舉施行牙舉謂從使牙檢舉而見之施行其一乞招安山中百姓其二乞禁諸寨軍士及子弟無得一人輒出淘虜仍表諸寨之旁七里內聽樵牧敢越表者斬其三乞置招安寨中容數千人以處所招百姓處昌呂翻宗侃請選所部將校謹幹者為招安將使將三十人晝夜執兵巡衛其四招安之事須委一人總領今榜帖既下下戶嫁翻諸寨必各遣軍士入山招安百姓見之無不驚疑如鼠見貍誰肯來者貍捕鼠者也鼠見貍則知必死特恨不可得而走耳詎肯前就之哉故以為喻願降帖付宗侃專掌其事其五乞嚴勒四寨指揮使悉索前日所虜彭州男女老幼集於營場有父子兄弟夫婦自相認者即使相從牒具人數部送招安寨有敢私匿一人者斬仍乞勒府中諸營亦令嚴索府謂成都府索山客翻量給資糧量音良悉部送歸招安寨其六乞置九隴行縣於招安寨中彭州治九隴縣彭州未下故乞置行縣九隴故漢繁縣地後魏改曰九隴以州西有九隴山為名九隴一伏隴二豆隴三秋隴四龍奔隴五走馬隴六駱駝隴七千秋隴八較車隴九橫擔隴南鄭漢古縣唐帶興元府撫安百姓擇其子弟之壯者給帖使自入山招其親戚彼知司徒嚴禁侵掠前日為軍士所虜者皆獲安堵必歡呼踊躍相帥下山帥讀曰率如子歸母不日盡出其七彭州土地宜麻益州記彭之地號小郫言土地肥良比之郫邑也漚烏候翻久漬也宜令縣令曉諭各歸田里出所漚麻鬻之以為資糧必漸復業建得之大喜即行之悉如所申考異曰張耆舊傳曰五月二十日諸軍馬步兵士到彭州城下至七月初已經五十餘日諸軍兵士始到刈麥充糧至七月初麥盡並無顆粒兵士但託求食乃每日遠去入山虜劫逃避百姓有一軍士本是儒生乃往北面寨説於統帥云云十國紀年王先成謂王宗侃云云先成上招攜七事建皆納之先成蜀州新津人按十國紀年王建自二月辛丑遣王宗裕等擊楊晟遂圍彭州又晟遺楊守忠書云弊邑雖小圍守三年矣而張云五月二十日方圍彭州或者先圍之不克而再往歟但云有一軍士而十國紀年姓王名先成不知其本出何書也明日榜帖至威令赫然無敢犯者三日山中民競出赴招安寨如歸市寨不能容斥而廣之浸有市井又出麻鬻之民見村落無抄暴之患抄楚交翻稍稍辭縣令復故業月餘招安寨皆空景福元年己巳李茂貞克鳳州感義節度使滿存奔興元僖宗光啓二年滿存得鳳州至是而敗奔興元就楊守亮皆表其子弟鎮之考異曰薛居正五代史茂貞傳曰大順二年楊復恭得罪奔山南與楊守亮據興元叛茂貞與王行瑜討平之詔以徐彥若鎮興元茂貞違詔表其假子繼徽為留後堅請旄鉞昭宗不得已而授之自是茂貞始萌問鼎之志既而逐涇原節度使張球洋州節度使楊守忠鳳州刺史滿存皆奪據其地云大順二年誤也今從新紀景福元年八月以楊行密為淮南節度使同平章事以田頵知宣州留後安仁義為潤州刺史孫儒降兵多蔡人降戶江翻行密選其尤勇健者五千人厚其稟賜以皂衣蒙甲稟筆錦翻給也皂才早翻號黑雲都每戰使之先登陷陳陳讀曰陳四鄰畏之行密以用度不足欲以茶鹽易民布帛掌書記舒城高勗曰兵火之餘十室九空又漁利以困之記坊記諸侯不下漁色注曰象捕魚然中網取之是無所擇漁利之漁猶漁色之漁復扶又翻下同不若悉我所有易鄰道所無足以給軍選賢守令勸課農桑數年之間倉庫自實行密從之守式又翻令力正翻田頵聞之曰賢者之言其利遠哉行密馳射武伎皆非所長伎渠綺翻而寬簡有智略善撫御將士與同甘苦推心待物無所猜忌嘗早出從者斷馬鞦取其金從才用翻斷音短鞦七由翻史照曰馬紂也行密知而不問他日復早出如故人服其度量淮南被兵六年光啓三年畢師鐸亂淮南始被兵被皮義翻幾居依翻下幾復同行密初至賜與將吏將即亮翻帛不過數尺錢不過數百而能以勤儉足用非公宴未嘗舉樂招撫流散輕徭薄斂斂力贍翻未及數年公私富庶幾復承平之舊復還也讀如字景福元年李克用北巡至天寧軍代州西有天安軍天寶十二載置遣其將李君慶發兵於晉陽克用潛入新城伏兵於神堆神堆在雲州城南新城又在神堆東南神堆即神武川之黃花堆新城在其側蓋克用祖執宜保黃花堆時所築也按薛史唐紀李克用生於神武川之新城宋白曰雲州西南至神堆柵九十里邏郎佐翻匡威等大驚丙申君慶以大軍至克用遷入雲州丁酉出擊匡威等大破之己亥匡威等燒營而遁追至天成軍蔚州東北有天成軍勝音升景福元年辛丑李茂貞攻拔興元楊復恭楊守亮楊守信楊守貞楊守忠滿存奔閬州光啓三年楊守亮鎮興元至是而敗考異曰舊紀景福元年十一月辛丑鳳翔邠寧之衆攻興元陷之節度使楊守亮前中尉楊復恭判官李巨川突圍而遁十二月辛未華州刺史韓建奏於乾元縣遇興元散兵擊敗之斬楊守亮楊復恭傳首實録乾寧元年七月鳳翔邠寧之兵攻興元陷之楊守亮楊復恭突圍而遁新紀景福元年八月茂貞寇興元守亮滿存奔閬州乾寧元年七月茂貞陷閬州八月守亮伏誅新復恭傳景福元年茂貞攻興元破其城復恭守亮守信奔閬州十國紀年蜀史景福元年十月行瑜茂貞表守亮招納叛臣請討之感義節度使滿存救守亮為茂貞所敗奔興元十一月邠岐攻陷興元楊復恭帥守亮守貞守忠滿存同奔閬州十二月壬午華洪敗守亮等於州按實録景福二年正月移茂貞山南於時守亮不應猶在山南今年月從新紀事則參取諸書景福元年九月加荊南節度使成汭同平章事景福元年時溥迫監軍奏稱將士留己是年二月召時溥為太子太師十月復以溥為侍中感化節度朱全忠奏請追溥新命詔諭解之景福元年初邢洺磁州留後李存孝與李存信俱為李克用假子不相睦存信有寵於克用存孝在邢州欲立大功以勝之乃建議取鎮冀見上卷大順二年不時聽許及王鎔圍堯山存孝救之不克克用以存信為蕃漢馬步都指揮使與存孝共擊之二人互相猜忌逗留不進克用更遣李嗣勳等擊破之事見上是年正月譖存孝無心擊賊疑與之有私約存孝聞之自以有功於克用而信任顧不及存信顧反也且懼及禍乃潛結王鎔及朱全忠上表以三州自歸於朝廷考異實録大順元年十月太原將邢州刺史李存孝自晉州帥行營兵據邢州舊紀十一月癸丑朔太原將邢州刺史李存孝自恃擒孫揆功合為昭義帥怨克用授康君立存孝自晉州帥行營兵歸邢州據城上表歸明仍致書與張濬王鎔求援唐末見聞録十月二十四日李存孝領兵打晉州遁歸邢州背叛與宰臣張濬狀曰某自主三郡已近二年又曰常思安知建在此之日歸順朝廷之時四鄰不有保持一家俄受塗炭以此猶豫莫敢申明遂至去年遽絶鄰好豈是某之情願蓋因李某之指揮又曰自今春戰爭之後實願休罷戈鋋自九月十五日以來有李某之人使促令某南面進軍至趙州牽脅李某即土門路入直屆鎮州今月十四日昭義軍人百姓等衆請某權知兵馬留後歸順朝廷大王聞存孝致逆大震雄威令下先差大將進軍速至邢州仍候指揮不得輒有鬬敵但圍小壘專俟大軍據唐太祖紀年録薛居正五代史紀傳實録新紀皆云景福元年十月存孝叛太原歸朝廷而舊紀唐末見聞録在大順元年十月舊紀恐是連言以後事按二年三月安知建方叛太原而此書中已説知建又云自主三郡已近二年存孝大順二年方為邢洺磁節度至景福元年乃二年也然則實録云邢州刺史據邢州亦因舊紀之誤見聞録所載存孝書蓋與王鎔誤云與張濬也詔以存孝為邢洺磁節度使不許會兵景福元年十一月時溥濠州刺史張璲泗州刺史張諫以州附于朱全忠璲徐醉翻史言時溥巡屬皆附于汴溥僅保徐州景福元年乙未朱全忠遣其子友裕將兵十萬攻濮州拔之執其刺史邵倫濮州朱瑄巡屬濮博木翻景福元年孫儒將王壇陷婺州刺史蔣王褱奔越州中和四年蔣王褱據婺州景福元年廬州刺史蔡儔發楊行密祖父墓光啓三年楊行密留蔡儔守廬州明年儔以州附孫儒儒既敗儔遂阻兵以拒行密遣使送印於朱全忠以求救全忠惡其反覆惡烏路翻納其印不救且牒報行密行密謝之行密遣行營都指揮使李神福將兵討儔景福元年宣明曆浸差穆宗立以為纍世纘緒必更曆紀乃詔日官改撰曆術名曰宣明十二月上之命曰景福崇玄曆邊岡與司天少監胡秀林均州司馬王墀改治新曆然術一出於岡岡用算巧能馳騁反覆於乘除間由是簡捷超徑等接之術興而經制遠大衰序之法廢矣雖籌策便易然皆冥於本原上時掌翻景福元年壬午王建遣其將華洪擊楊守亮於閬州破之建遣節度押牙延陵鄭頊使於朱全忠延陵漢曲阿縣地晉分置延陵郡隋移治丹徒武德三年移於舊郡治屬潤州今丹陽縣之延陵鎮即其地頊極言其險全忠不信頊曰苟不以聞恐誤公軍機全忠大笑景福元年是歲明州刺史鍾文季卒其將黃晟自稱刺史路振九國志黃晟明州鄞縣人歷為將領會刺史鍾文季卒遂據其郡二年景福二年春正月時溥遣兵攻宿州刺史郭言戰死大順二年朱全忠取宿州事見上卷景福二年東川留後顧彥暉既與王建有隙大順二年楊守亮攻東川王建遣兵救之欲因而取之不克由是與顧彥暉有隙事亦見上卷奏請更賜彥暉節大順二年朝廷遣中使賜顧彥暉節楊守厚邀而奪之故請更賜申前命也梓州未受兵而救之何也非救之也遣兵助顧彥暉以致西川之師耳建遣兵敗東川鳳翔之兵於利州幾居豈翻敗補邁翻下同彥暉求和請與茂貞絶乃許之景福二年鳳翔節度使李茂貞自請鎮興元詔以茂貞為山南西道兼武定節度使以中書侍郎同平章事徐彥若同平章事充鳳翔節度使考異曰舊紀在七月癸未今從實録新紀茂貞欲兼得鳳翔不奉詔景福二年二月甲戌加西川節度使王建同平章事景福二年李克用引兵圍邢州王鎔遣牙將王藏海致書解之克用怒斬藏海進兵擊鎔敗鎮兵於平山平山漢蒲吾縣隋為房山縣至德元年改為平山縣屬鎮州九域志在州西六十五里辛巳攻天長鎮旬日不下鎔出兵三萬救之克用逆戰於叱日嶺下大破之斬首萬餘級餘衆潰去河東軍無食脯其尸而啖之啖徒濫翻景福二年時溥求救於朱瑾朱全忠遣其將霍存將騎兵三千軍曹州以備之瑾將兵二萬救徐州存引兵赴之與朱友裕合擊徐兗兵於石佛山下大破之石佛山近彭城薛史曰石佛山在彭門南述征記彭城南有石佛山頂方二丈二尺辛卯徐兵復出存戰死霍存恃勝而不虞徐兵之復出故戰敗而死復扶又翻景福二年李克用進下井陘李存孝將兵救王鎔遂入鎮州與鎔計事鎔又乞師於朱全忠全忠方與時溥相攻不能救但遺克用書遺唯季翻言鄴下有十萬精兵抑而未進克用復書儻實屯軍鄴下顒望降臨顒魚容翻仰也必欲真決雌雄願角逐於常山之尾甲午李匡威引兵救鎔敗河東兵於元氏敗補邁翻克用引還邢州鎔犒匡威於藳城輦金帛二十萬以酬之景福二年朱友裕圍彭城時溥數出兵友裕閉壁不戰去年十一月朱全忠遣友裕攻彭城此言其積時相持之事數所角翻友裕不追謂石佛山下戰時全忠怒驛書下都指揮使龐師古下戶嫁翻使代之將且按其事書誤達於友裕友裕大懼以二千騎逃入山中按薛史元貞張后傳作二十騎朱友裕傳作數騎二千騎太多當以二十騎為是匿於伯父全昱之所朱全忠兄弟本居碭山全昱全忠長兄也碭音唐使友裕單騎詣汴州見全忠泣涕拜伏於庭全忠命左右捽抑將斬之捽者持其髻抑者按其頸捽昨沒翻泣曰汝捨兵衆束身歸罪無異志明矣全忠悟而捨之使權知許州友恭壽春人李彥威也幼為全忠家僮考異曰薛居正五代史高季興傳以友恭為汴之賈人李七郎十國紀年以為壽春賈人友恭傳云彥威丱角事太祖今從之張夫人碭山人多智略全忠敬憚之雖軍府事時與之謀議或將兵出中塗夫人以為不可遣一介召之全忠立為之返為于偽翻龐師古攻佛山寨拔之佛山寨即石佛山寨景福二年李匡威之救王鎔也將發幽州家人會別家人悉會於使宅以送別匡威醉而淫之二月匡威自鎮州還至博野匡籌據軍府自稱留後以符追行營兵匡威衆潰歸但與親近留深州深州在博野東南一百五十里遣判官李抱真張抱真作正抱入奏請歸京師京師屢更大亂更工衡翻經也聞匡威來坊市大恐曰金頭王來圖社稷士民或竄匿山谷王鎔德其以己故致失地德其救己以致失幽州為築第父事之為于偽翻為李匡威劫王鎔而死張本薛史曰鎔館匡威於寶壽佛寺景福二年以渝州刺史柳玭為瀘州刺史九域志渝州西至瀘州七百六十里玭部田翻考異曰新傳云玭坐事貶瀘州刺史卒北夢瑣言亦云謫授瀘州新舊書玭貶官無年月今據實録此月玭自渝為瀘州刺史當是初貶渝州後移瀘州新傳北夢瑣言誤也世以孝悌禮法為士大夫所宗言自元和以來為名家上欲以為相宦官惡之惡烏路翻故久謫於外玭嘗戒其子弟曰凡門地高可畏不可恃也立身行己一事有失則得罪重於他人死無以見先人於地下此其所以可畏也門高則驕心易生族盛則為人所嫉懿行實才人未之信行下孟翻下同小有玼纇玼疾移翻纇盧對翻玉病曰玼絲節曰纇衆皆指之此其所以不可恃也故膏粱子弟學宜加勤行宜加勵僅得比他人耳使柳氏子姪常能守玭之戒各務修飭雖至今為名家可也景福二年王建屢請殺陳敬瑄田令孜朝廷不許夏四月乙亥建使人告敬瑄謀作亂殺之新津陳敬瑄居新津見上卷大順二年下獄死下遐嫁翻建使節度判官馮涓草表奏之曰開匣出虎孔宣父不責他人當路斬蛇孫叔敖蓋非利己論語孔子責冉有季路曰虎兕出於柙是誰之過歟楚孫叔敖為嬰兒出遊而還憂而不食其母問其故泣而對曰今日吾見兩頭蛇恐去死無日矣母曰今蛇安在曰吾聞見兩頭蛇者死吾恐他人復見已埋之也母曰無憂汝不死吾聞之有陰德者天報以福人聞之皆諭其為仁也先機恐失於彀中彀古候翻涓宿之孫也馮宿事見二百四十五卷開成元年涓圭淵翻景福二年汴軍攻徐州纍月不克自去年十一月攻徐州至是五月矣進軍時日非良故無功全忠以為然敬翔曰今攻城纍月所費甚多徐人已困旦夕且下使將士聞此言則懈於攻取矣全忠乃焚其書癸未全忠自將如徐州戊子龐師古拔彭城時溥舉族登燕子樓自焚死僖宗中和元年時溥據徐州至是而亡張建封之鎮徐也有愛妓曰盻盻建封既歿張氏舊第有小樓名燕子盻盻念舊愛而不嫁居是樓十餘年幽獨悵然出白樂天集考異曰實録五月汴州奏拔徐州舊紀四月汴將王重師牛存節陷徐州舊傳溥求援于兗州朱瑾出兵救之值大雪糧盡而還汴將王重師牛存節夜乘梯而入溥與妻子登樓自焚而卒景福二年也新紀四月戊子朱全忠陷徐州時溥死之薛居正五代史梁紀丁亥師古下彭門梟溥首以獻唐太祖紀年録四月澤州李罕之上言懷孟降人報汴將龐師古於今月八日攻陷徐州徐帥時溥舉族皆沒溫既下徐方詐請朝廷命帥昭宗乃以兵部尚書孫儲為徐帥既而溫以他詞斥去自以其將鎮之四月八日蓋河東傳聞之誤今從編遺録新紀己丑全忠入彭城以宋州刺史張廷範知感化留後奏乞朝廷除文臣為節度使景福二年李匡威在鎮州為王鎔完城塹繕甲兵章十二行本兵下有訓士卒三字乙十一行本同孔本同張校同視之如子匡威以鎔年少且樂真定土風為于偽翻下為之同鎮州漢之真定國也樂音洛潛謀奪之李抱真自京師還為之畫策陰以恩施悅其將士施式豉翻王氏在鎮久鎮人愛之不徇匡威匡威忌日鎔就第弔之父母終之日子以為忌日第者李匡威寓第也伏兵劫之鎔趨抱匡威曰鎔為晉人所困幾亡矣晉人謂河東李克用之兵幾居依翻公欲得四州此固鎔之願也鎮冀深趙四州以位讓公則將士莫之拒矣匡威以為然與鎔駢馬駢馬並馬也會大風雷雨屋瓦皆震匡威入東偏門此鎮州牙城之東偏門也既入門而為鎮兵所閉絶其繼至者拳毆匡威甲士毆烏口翻挾鎔於馬上負之登屋鎮人既得鎔攻匡威殺之並其族黨考異曰實録殺匡威在五月恐約奏到舊紀六月乙卯幽州李匡威謀害王鎔恆州三軍攻匡威殺之舊傳唐太祖紀年録皆云五月新紀四月丁亥按匡籌奏云四月十九日是月己巳朔十九日丁亥也今從之體疏瘦為君和所挾頸痛頭偏者纍日李匡籌奏鎔殺其兄請舉兵復冤詔不許景福二年幽州將劉仁恭將兵戍蔚州過期未代士卒思歸會李匡籌立戍卒奉仁恭為帥還攻幽州蔚紆勿翻帥所類翻至居庸關為府兵所敗府兵幽州節度使府之兵也敗補邁翻李克用厚待之為李克用取幽州張本景福二年李神福圍廬州甲午楊行密自將詣廬州田頵自宣州引兵會之初蔡人張皓以驍勇事秦宗權後從孫儒儒敗歸行密行密厚待之使將兵戍廬州蔡儔叛皓更為之用及圍急皓踰城來降降戶江翻行密以隸銀槍都使袁稹使疏吏翻稹止忍翻稹以皓反覆白行密請殺之行密恐稹不能容置之親軍為張皓殺楊渥張本陳州人也稹止忍翻景福二年王彥復王審知攻福州久不下去年二月王潮遣彥復等攻福州僖宗中和三年升浙東觀察為義勝節度光啓三年改為威勝節度發溫台婺州兵五千救之彥復審知以城堅援兵且至士卒死傷多白王潮欲罷兵更圖後舉潮不許請潮自臨行營潮報曰兵盡添兵將盡添將兵將俱盡吾當自來將即亮翻彥復審知懼親犯矢石急攻之五月城中食盡暉知不能守夜以印授監軍棄城走援兵亦還庚子彥復等入城辛丑暉亡抵沿海都為將士所殺文德二年范暉據福州自稱留後素服葬陳巖以女妻其子延晦厚撫其家妻七細翻汀建二州降嶺海間㣥盜二十餘輩皆降潰言㣥盜或降或潰也王氏自此遂據有七閩矣降戶江翻景福二年閏月以武勝防禦使錢鏐為蘇杭觀察使錢鏐以杭並蘇因以命之耀德都頭李鋋為鎮海軍節度使宣威都頭孫惟晟為荊南節度使耀德宣威亦皆神策五十二都之數黔渠今翻鋋音蟬以捧日都頭陳珮為嶺南東道節度使並同平章事時李茂貞跋扈上以武臣難制欲用諸王代之故誠等四人皆加恩解兵柄令赴鎮後四人不聞至鎮蓋各有分據者四人不得而赴也考異曰舊紀三月庚子以陳珮為嶺南東道節度使曹誠為黔中節度使李鋋為鎮海節度使孫惟晟為荊南節度使時朝議以茂貞傲侮王命武臣難制故罷五將之權今從實録止是四將景福二年李匡籌出兵攻王鎔之樂壽武強以報殺匡威之恥景福二年秋七月王鎔遣兵救邢州李克用敗之于平山敗補邁翻壬申進擊鎮州鎔懼請以兵糧二十萬助攻邢州克用許之克用治兵於欒城合鎔兵三萬進屯任縣任漢古縣中廢唐之任漢南䜌縣地武德四年置任縣治苑鄉城在邢州東南治直之翻琉璃陂在邢州龍岡縣界景福二年丁亥楊行密克廬州斬蔡儔左右請發儔父母冢行密曰儔以此得罪吾何為效之蔡儔發行密祖父冢見上年景福二年加天雄節度使李茂莊同平章事時以秦州為天雄軍景福二年錢鏐發民夫二十萬及十三都軍士築杭州羅城周七十里錢鏐以八都兵起後其衆日盛置十三都今杭州羅城鏐所築也景福二年升州刺史張雄卒考異曰新紀八月庚子蓋約奏到之日今從十國紀年景福二年李茂貞恃功驕橫上表及遺杜讓能書橫戶孟翻上時掌翻遺唯季翻辭語不遜上怒欲討之茂貞又上表略曰陛下貴為萬乘不能庇元舅之一身元舅謂王王褱事見上卷大順二年不能戮復恭之一豎又曰今朝廷但觀強弱不計是非又曰約衰殘而行法隨盛壯以加恩李茂貞之表辭固慢然當時之政事實亦如此言體物有錙銖之重則待之亦重有錙銖之輕則待之亦輕劉峻廣絶交論曰衡所以揣其輕重纊所以屬其鼻息注云謂操衡揣勢之輕重持纊量氣之粗細軍情易變戎馬難羈唯慮甸服生靈因茲受禍古之王者畿方千里以為甸服自此何之乘繩證翻上益怒決討茂貞命杜讓能專掌其事讓能諫曰陛下初臨大寶國步未夷茂貞近在國門按九域志鳳翔東距長安二百八十里耳萬一不克悔之無及上曰王室日卑號令不出國門此乃志士憤痛之秋藥弗瞑眩厥疾弗瘳書説命之辭注云如服藥必瞑眩極其病乃除瞑莫遍翻眩玄遍翻瞑眩困極也孱鉏山翻愔愔度日愔於禽翻愔愔深靜貌坐視陵夷卿但為朕調兵食為于偽翻調徒釣翻朕自委諸王用兵成敗不以責卿讓能曰陛下必欲行之則中外大臣共宜協力以成聖志不當獨以任臣上曰卿位居元輔杜讓能時為首相無宜避事讓能泣曰臣豈敢避事況陛下所欲行者憲宗之志也顧時有所未可勢有所不能耳但恐他日臣徒受朝錯之誅不能弭七國之禍也朝錯事見漢景帝紀以死繼之杜讓能固已知必死矣計畫調度月餘不歸不歸私第也調徒弔翻為之耳目讓能朝發一言二鎮夕必知之李茂貞使其黨糾合市人數百千人擁觀軍容使西門君遂馬訴曰岐帥無罪岐帥謂李茂貞鳳翔本岐州帥所類翻使百姓塗炭君遂曰此宰相事非吾所及市人又邀崔昭緯鄭延昌肩輿訴之舊制朝臣入朝皆乘馬宋建炎播遷以揚州街路滑始許朝士乘擔子觀此則唐末宰相亦有乘肩輿者矣茲事主上專委杜太尉吾曹不預知市人因亂投瓦石二相下輿走匿民家僅自免喪堂印及朝服上命捕其唱帥者誅之喪息浪翻朝直遙翻下同帥讀曰率用兵之意益堅京師民或亡匿山谷嚴刑所不能禁八月以嗣覃王嗣周為京西招討使考異曰按順宗子經封郯王嗣周當是其後會昌後避武宗諱改郯作覃按武宗諱瀍後改諱炎如考異所云蓋避郯字旁從炎字也鐬火外翻景福二年丙辰楊行密遣田頵將宣州兵二萬攻歙州歙州刺史裴樞城守久不下歙書涉翻時諸將為刺史者多貪暴獨池州團練使陶雅寬厚得民歙人曰得陶雅為刺史請聽命行密即以雅為歙州刺史歙人納之雅盡禮見樞送之還朝樞遵慶之曾孫也裴遵慶見二百二十二卷肅宗上元二年景福二年朱全忠命龐師古移兵攻兗州與朱瑾戰屢破之景福二年九月丁卯以錢鏐為鎮海節度使升杭州武勝防禦使為鎮海節度使唐本置鎮海軍於潤州今以命錢鏐於杭州至光化元年鏐遂請徙軍於杭州考異曰今年五月以李鋋為鎮海節度使令赴鎮今復除鏐者按是時安仁義已據潤州又孫惟晟除荊南時成汭已據荊南二人安得赴鎮蓋但欲罷其軍權其實不至鎮而返耳實録云仍徙鎮海軍額於杭州按吳越備史是歲鏐初除鎮海節度使猶領潤州刺史至光化元年始移鎮海軍於杭州實録誤也景福二年李存孝夜犯李存信營虜奉誠軍使孫考老李克用自引兵攻邢州掘塹築壘環之環音宦存孝時出兵突擊塹壘不能成河東牙將袁奉韜密使人謂存孝曰大王惟俟塹成即歸晉陽尚書所憚者獨大王耳李克用時封隴西郡王存孝蓋亦檢校尚書大王若歸咫尺之塹安能沮尚書之鋒鋭邪存孝以為然按兵不出旬日塹壘成飛走不能越存孝由是遂窮汴將鄧季筠從克用攻邢州輕騎逃歸鄧季筠被擒見上卷大順元年使將親軍將即亮翻景福二年乙亥覃王嗣周帥禁軍三萬送鳳翔節度使徐彥若赴鎮軍于興平帥讀曰率考異曰舊紀覃王率扈駕五十四軍進攻岐陽今從實録李茂貞王行瑜合兵近六萬軍于盩厔以拒之近其靳翻禁軍皆新募市井少年茂貞行瑜所將皆邊兵百戰之餘壬午茂貞等進逼興平禁軍皆望風逃潰茂貞等乘勝進攻三橋京城大震士民奔散市人復守闕請誅首議用兵者復扶又翻崔昭緯心害太尉門下侍郎同平章事杜讓能密遺茂貞書曰用兵非主上意皆出於杜太尉耳遺于季翻甲申茂貞陳於臨皋驛臨皋驛在長安城西請誅之讓能言於上曰臣固先言之矣請以臣為解言歸罪於讓能以解兵也禁居吟翻曰與卿訣矣是日貶讓能梧州刺史梧州去京師五千五百里宋白曰漢武帝置蒼梧郡理廣信縣隋置蒼梧郡理蒼梧縣唐為梧州棄卿士之臧謀構藩垣之深釁咨詢之際證執彌堅又流觀軍容使西門君遂于儋州內樞密使李周潼于崖州段詡于歡州乙酉上御安福門斬君遂周潼詡再貶讓能雷州司戶遣使謂茂貞曰惑朕舉兵者三人也非讓能之罪以內侍駱全瓘劉景宣為左右軍中尉壬辰以東都留守韋昭度為司徒門下侍郎同平章事御史中丞崔胤為戶部侍郎同平章事胤慎由之子也崔慎由歷事文武宣大中間為相與崔昭緯深相結故得為相季父安潛謂所親曰吾父兄刻苦以立門戶終為緇郎所壞壞音怪考異曰舊傳胤初拜平章事安潛有此言按安潛去年卒必先時嘗有此言也緇郎胤小字也李茂貞勒兵不解請誅杜讓能然後還鎮崔昭緯復從而擠之復扶又翻下同擠箋西翻又子細翻冬十月賜讓能及其弟戶部侍郎弘徽自盡考異曰續寶運録曰大順二年相國杜讓能孔緯值上京頻嬰離亂朝綱紊墜是時徇意諸道扈駕兵五十四都坊坊皆滿兼近藩連帥要行征討便自統軍至如岐陽李茂貞先朝封為太子本姓宋洋州牧先祖討昭義劉從諫有功子孫爵賞不絶洎壽王登位後遣禮部侍郎薛廷圭持璽書具禮册為岐王茂貞先中和年中投判軍容使田令孜作養男姓田名彥賓蓋趨其勢也汴州朱溫先朝册東平王至今上又遣薛廷圭為禮儀使延王為册命使封為梁王且岐王與北司人情方洽宰相甚不和睦纍表章云臣今駐旆咸陽未敢入中書問罪杜讓能等請置極法表奏上不悅遂詔孔杜二相國令往咸陽謝過及二相到咸陽見岐王戰不能言岐王大怒卻令歸中書省過才到中書上又發遣令祈謝岐王如是往來三度岐王又奏曰二相見臣並不措一言如此曠官有辱聖代請行朝典別選英賢上不樂敕罷知政事不得已除孔緯荊南節度杜讓能河中節度三日後貶于嶺表出國門三十里並賜自盡時岐王率驍果五千人住咸陽及貶二相乃退此皆誤謬之説今從實録稱讓能舉枉錯直用論語孔子之言謂枉者舉之直者錯而不用也衰亂之朝安有公是非邪錯千故翻鬻獄賣官聚斂踰於巨萬斂力贍翻自是朝廷動息皆稟於邠岐南北司往往依附二鎮以邀恩澤有崔鋋王超者鋋音蟬為二鎮判官凡天子有所可否其不逞者輒訴於鋋超二人則教茂貞行瑜上章論之朝廷少有依違其辭語已不遜制復以茂貞為鳳翔節度使兼山南西道節度使守中書令於是茂貞盡有鳳翔興元洋隴秦等十五州之地鳳翔本一鎮興元山南西道又一鎮洋州武定軍又一鎮秦隴天雄軍又一鎮史言李茂貞兼有四鎮之地景福二年戊戌以泉州刺史王潮為福建觀察使景福二年舒州刺史倪章棄城走倪章與蔡儔連兵儔已敗故章走景福二年邠寧節度使守侍中兼中書令王行瑜求為尚書令韋昭度密奏太宗以尚書令執政遂登大位自是不以授人臣惟郭子儀以大功拜尚書令終身避讓行瑜安可輕議十一月以行瑜為太師賜號尚父仍賜鐵券景福二年十二月朱全忠請徙鹽鐵於汴州以便供軍崔昭緯以為全忠新破徐鄆兵力倍增若更判鹽鐵不可復制復扶又翻乃賜詔開諭之景福二年汴將葛從周攻齊州刺史朱威朱瑄朱瑾引兵救之按方鎮表齊州時屬平盧節度以後乾寧三年朱瓊降汴之事觀之則齊州已為兗鄆所並也考異曰編遺録云十月乙未今從薛居正五代史梁紀景福二年初武安節度使周嶽殺閔勗據潭州見二百五十六卷僖宗光啓二年諸將入弔處訥曰吾與公等咸受僕射大恩閔勗檢校尚書右僕射欽化節度使以處訥刺邵州故言受恩路振九國志鄧處訥自唐乾符中從閔勗征蠻于安南勗帥潭署處訥邵州兵馬留後處昌呂翻吾欲與公等竭一州之力為僕射報仇可乎為于偽翻皆曰善於是訓卒厲兵八年乃結朗州刺史雷滿雷滿與周嶽有爭肉之仇克之斬嶽自稱留後鄧處訥甫得潭州而劉建鋒馬殷已擬其後矣乾寧元年甲寅八九四景福二年春正月乙丑朔赦天下改元景福二年李茂貞入朝大陳兵自衛數日歸鎮景福二年以李匡籌為盧龍節度使景福二年二月朱全忠自將擊朱瑄軍于魚山魚山在鄆州須昌東阿兩縣之間兗鄆兵大敗死者萬餘人景福二年以右散騎常侍鄭綮為禮部侍郎同平章事綮康禮翻考異曰舊傳云光化初為相恐誤北夢瑣言曰綮雖有詩名本無廊廟之望嘗典廬州吳王楊行密為本州步奏官因有遺闕而笞責之然其儒懦清慎弘農常重之昭宗時吳王雄據淮海朝廷務行姑息因盛言鄭公之德由是登庸中外驚駭太原兵至渭北天子震恐渴於攘卻相國奏對請於文宣王諡號中加一哲字其不究時病率此類也按明年李克用舉兵至渭北綮已罷相今從實録新紀綮好詼諧好呼到翻多為歇後詩譏嘲時事歇後者敘所以為詩而歇後語不發手注班簿命以為相班簿著在朝者姓名堂吏往告之綮笑曰諸君大誤使天下更無人未至鄭綮吏曰特出聖意綮曰果如是奈人笑何既而賀客至綮搔首言曰歇後鄭五作宰相鄭綮第五為歇後詩時謂之歇後鄭五體纍讓不獲乃視事景福二年以邵州刺史鄧處訥為武安節度使景福二年彰義節度使張鈞薨表其兄鐇為留後時以涇州為彰義節度鐇甫袁翻景福二年三月黃州刺史吳討舉州降楊行密黃州時隸鄂嶽鄂嶽武昌軍也按新書杜洪傳吳討鄂州永興縣民以土團帥起據黃州景福二年邢州城中食盡甲申李存孝登城謂李克用曰兒蒙王恩得富貴苟非困於讒慝安肯捨父子而從仇讎乎願一見王死不恨克用使劉夫人視之夫人引存孝出見克用存孝泥首謝罪曰兒粗立微勞存信逼兒失圖至此粗坐五翻克用叱之曰汝遺朱全忠王鎔書毀我萬端遺唯季翻亦存信教汝乎囚之歸于晉陽車裂於牙門考異曰太祖紀年録先獲汴將鄧筠安康八軍吏劉藕子潞州所俘供奉官韓歸範皆與存孝連坐同日誅之騎將薛阿檀懼自刺按舊紀克用擒歸範尋遣歸因附表訴冤不聞復往晉陽也薛居正五代史鄧季筠傳後復自邢州逃歸汴紀年録誤也存孝傳曰武皇出井陘將逼真定存孝面見王鎔陳軍機武皇暴怒誅先獲汴將安康八耳克用軍中皆莫及常將騎兵為先鋒所向無敵身被重鎧腰弓髀槊獨舞鐵檛陷陳萬人辟易被皮義翻重直龍翻檛陟瓜翻陳讀曰陳下同辟讀曰闢易如字每以二馬自隨馬稍乏言馬稍疲而乏力也出入如飛克用惜其才意臨刑諸將必為之請為于偽翻下同因而釋之既而諸將疾其能竟無一人言者既死克用為之不視事者旬日私恨諸將而於李存信竟無所譴又有薛阿檀者其勇與存孝相侔諸將疾之常不得志密與存孝通存孝誅恐事泄遂自殺自是克用兵勢浸弱而朱全忠獨盛矣史言克用自翦羽翼故不競於汴景福二年朱全忠遣軍將張從晦慰撫壽州從晦陵侮刺史江彥溫而與諸將夜飲彥溫疑其謀己明日盡殺在席諸將以書謝全忠而自殺軍中推其子從頊知軍州事全忠為之腰斬從晦景福二年五月加鎮海節度使錢鏐同平章事景福二年劉建鋒馬殷引兵至澧陵澧當作醴醴陵在漢臨湘縣界後漢分為醴陵縣隋廢武德四年分長沙置醴陵縣屬潭州九域志在州東一百六十里殷先至關下遣使詣勛勛等以牛酒犒師殷使説勛曰劉驤智勇兼人觀後姚彥章説馬殷曰公與劉龍驤一體之人此必逸龍字説式芮翻翼軫楚荊州分長沙入軫十六度精鋭無敵而君以鄉兵數千拒之難矣按新書蔣勛鄧繼崇皆邵州土豪所領之兵皆其土人故謂之鄉兵取富貴還鄉里不亦善乎勛等然之謂衆曰東軍許吾屬還劉建鋒等兵從東來故蔣勛等謂之東兵棄旗幟鎧仗遁去建鋒令前鋒衣其甲張其旗趨潭州衣於既翻趨七喻翻潭人以為邵州兵還不為備建鋒徑入府處訥方宴擒斬之戊辰建鋒入潭州自稱留後景福二年王建攻彭州城中人相食彭州內外都指揮使趙章出降降戶江翻王先成請築龍尾道屬于女牆自城外築墱道陂陀而上屬于城上短垣其道前高後庳後塌于地若龍之垂尾然故謂之龍尾道屬之欲翻女牆即城上短垣所謂陴也丙子西川兵登城楊晟猶帥衆力戰帥讀曰率刀子都虞候王茂權斬之文德元年楊晟得彭州王建攻彭州踰兩期而後克亦憊矣建欲使為將師建泣謝曰師建誓與楊司徒同生死不忍復戴日月復扶又翻惟速死為惠再三諭之不從乃殺之禮葬而祭之更趙章姓名曰王宗勉王茂權名曰宗訓又更王釗名曰宗謹李綰姓名曰王宗綰更工衡翻景福二年辛卯中書侍郎同平章事鄭延昌罷為右僕射景福二年朱瑄朱瑾求救於河東李克用遣騎將安福順及弟福慶福遷督精騎五百假道於魏渡河應之景福二年武昌節度使杜洪攻黃州以吳討叛附楊行密也景福二年六月甲午以宋州刺史張廷範為武寧節度使從朱全忠之請也徐州先時改感化軍既屬朱全忠復為武寧軍景福二年蘄州刺史馮敬章邀擊淮南軍朱延壽攻蘄州不克蘄州武昌巡屬也景福二年戊午以翰林學士承旨禮部尚書李溪同平章事方宣制水部郎中知制誥劉崇魯出班掠麻慟哭強奪取之為掠問其故對言溪姦邪依附楊復恭西門君遂得在翰林無相業恐危社稷溪竟罷為太子少傅溪鄘之孫也李鄘見憲宗紀崔昭緯恐溪為相分己權故使崇魯沮之溪十表自訟醜詆崇魯父符受贓枉法事覺自殺弟崇望與楊復恭深交崇魯庭拜田令孜為朱玫作勸進表為于偽翻乃云臣交結內臣何異抱贓唱賊且故事絁巾慘帶不入禁庭絁巾絹巾也慘淺色絁式支翻崇魯自應上章論列上時掌翻下上表同豈於正殿慟哭豈下有宜字或當字文意乃明無人臣禮乞正其罪詔停崇魯見任見賢遍翻溪猶上表不已乞行誅竄表數千言詬詈無所不至詬古候翻又許候翻劉崇魯固可罪李溪亦褊矣當是時強藩遙制朝廷視當朝宰相特鬼朴耳李溪急於作相將以何為此其所以有都亭驛之禍也景福二年李克用大破吐谷渾殺赫連鐸擒白義誠考異曰舊紀六月壬辰克用攻陷雲州執赫連鐸以薛志勤守雲中按唐太祖紀年録莊宗列傳薛居正五代史武皇紀皆云大順二年武皇拔雲州鐸奔吐谷渾誤也新紀六月赫連鐸及李克用戰于雲州死之太祖紀年録十月討李匡籌師次新城邊兵願從者衆赫連鐸白義誠數敗至是窮蹙無歸自縶膝行詣於軍門太祖微數其罪命笞而脫之薛史武皇紀吐谷渾傳亦云鐸等來歸命笞而釋之薛志勤傳云王暉據雲州叛討平之以志勤為大同防禦使與舊紀異唐末見聞録六月收雲州處置赫連鐸活擒白義誠進兵幽州界巡檢回府新紀蓋據此今從之景福二年秋七月李茂貞遣兵攻閬州拔之楊復恭楊守亮楊守信帥其族黨犯圍走楊復恭等奔閬州見上景福元年帥讀曰率景福二年禮部侍郎同平章事鄭綮自以不合衆望纍表避位詔以太子少保致仕以御史大夫徐彥若為中書侍郎兼吏部尚書同平章事景福二年綿州刺史楊守厚卒其將常再榮舉城降王建景福二年楊復恭守亮守信將自商山奔河東至乾元萬歲通天元年分商州豐陽置安業縣乾元元年更名乾元縣屬商州獲之八月韓建獻于闕下斬于獨柳復恭父子至是夷矣訴致仕之由遺唯季翻楊復恭致仕見上卷大順元年云承天門乃隋家舊業承天門長安太極宮南門隋文帝使宇文愷所營本名昭陽門唐改曰承天門故復恭云然勿貢獻守亮復光養子故呼為姪上本封壽王廢定策國老有如此負心門生天子景福二年昭義節度使康君立詣晉陽謁李克用己未克用會諸將飲博酒酣克用語及李存孝流涕不已君立素與李存信善一言忤旨克用拔劍斫之囚於馬步司唐末諸鎮皆於馬步司置獄今謂之兵馬司忤五故翻庚申朔出之君立已死考異曰薛居正五代史李存孝既死武皇深惜之怒諸將無解慍者君立以一言忤旨武皇賜鴆而殂唐末見聞録曰八月三十日相公於左街宅夜飲行劍斫損昭義節度使康君立把送馬步司收禁至九月一日放出尋已身薨薛史賜鴆恐是文飾其事景福二年冬十月章十二行本月下有丁酉二字乙十一行本同孔本同封皇子祤為棣王禊為虔王祤兄羽翻禊胡計翻禋為沂王禕為遂王景福二年劉仁恭數因蓋寓獻策於李克用數所角翻下同蓋古盍翻願得兵萬人取幽州克用方攻邢州分兵數千欲納仁恭於幽州不克此言是年十一月以前事數侵河東之境數所角翻克用怒十一月大舉兵攻匡籌拔武州進圍新州新州領永興礬山懷安龍門四縣史失其建置之始其地在媯州西北考異曰唐太祖紀年録十一月壬辰大軍拔截寇進收楊門九子戊戌下武州甲寅攻新州營於西北隅按十一月己未朔無壬辰戊戌甲寅紀年録誤今從實録景福二年以涇原留後張鐇為彰義節度使景福二年朱全忠遣使至泗州陵章十二行本陵上有使者二字乙十一行本同孔本同退齋校同慢刺史張諫諫舉州降楊行密泗州本徐州巡屬自此遂為楊行密所有貿音茂全忠執令回盡取其茶揚汴始有隙為全忠攻行密張本景福二年十二月李匡籌遣大將將步騎數萬救新州李克用選精兵逆戰於段莊大破之段莊在新州東南生擒將校三百人以練之充夜翻徇於城下是夕新州降辛亥進攻媯州宋白曰媯州東南至幽州二百八十里西南至蔚州二百四十里媯居為翻壬子匡籌復發兵出居庸關復扶又翻下同克用使精騎當其前以疲之遣步將李存審自他道出其背夾擊之幽州兵大敗殺獲萬計甲寅李匡籌挈其族奔滄州義昌節度使盧彥威利其輜重妓妾遣兵攻之於景城殺之盡俘其衆重直用翻僖宗光啓元年李全忠得幽州三世十年而滅景城漢成平縣唐屬滄州宋廢為鎮屬瀛州樂壽縣九域志樂壽在瀛州南六十里宋白曰自幽州東南至滄州五百五十里妓渠綺翻考異曰唐太祖紀年録作匡儔今從新舊紀傳實録存審本姓符宛丘人克用養以為子薛史符存審初從李罕之罕之為諸葛爽所逼出保懷州部下分散存審乃歸李克用丙辰克用進軍幽州其大將請降匡籌素暗懦初據軍府兄匡威聞之謂諸將曰兄失弟得不出吾家亦復何恨但惜匡籌才短不能保守得及二年幸矣景福二年匡籌得幽州至是僅及二年景福二年加匡國節度使王行約檢校侍中景福二年吳討畏杜洪之逼杜洪攻吳討見上五月行密以先鋒指揮使瞿章權知黃州為瞿章為汴兵攻執張本景福二年是歲黃連洞蠻二萬圍汀州黃連洞在汀州寧化縣南今潭飛磜即其地蠻解去承勳追擊之至漿水口破之閩地略定潮遣僚佐巡州縣勸農桑定租稅交好鄰道好呼到翻保境息民閩人安之景福二年封州刺史劉謙卒子隱居喪於賀江賀水源出賀州富川縣石龍置亙合桂嶺水謂之賀江土民百餘人謀亂隱一夕盡誅之嶺南節度使劉崇龜召補右都押牙兼賀水鎮使未幾表為封州刺史劉隱始此景福二年義勝節度使董昌章十二行本昌下有為政二字乙十一行本同孔本同張校同苛虐詳考下卷浙東乃威勝節度又按新書方鎮表廣明三年升浙東道觀察為義勝軍節度光啓三年改威勝軍威勝為是加斂數倍以充貢獻及中外饋遺斂力贍翻遺唯季翻每旬發一綱金萬兩銀五千鋌越綾萬五千匹他物稱是稱尺證翻適相等也用卒五百人或遇雨雪風水違程則皆死唐制陸行之程馬日七十里步及驢五十里車三十里水行之程舟之重者泝河日三十里江四十里餘水四十五里空舟泝河四十里江五十里餘水六十里沿流之舟則輕重同制河日一百五十里江一百里餘水七十里轉運徵斂送納皆準程節其遲速其三峽砥柱之類不拘此限若遇風水淺不得行者即於隨近官司申牒驗記聽折半功不及是則為違程董昌蓋計日限程以至長安又不許以雨雪風水準折也由是朝廷以為忠寵命相繼官至司徒同平章事爵隴西郡王昌建生祠於越州制度悉如禹廟禹廟在越州會稽縣東南七里賽先代翻先祈福於神其後報祠謂之賽無得之禹廟皆之生祠昌求為越王朝廷未之許昌不悅曰朝廷欲負我矣我纍年貢獻無算而惜章十二行本惜下有一字乙十一行本同孔本同越王邪有諂之者曰王為越王曷若為越帝於是民間訛言時世將變競相帥填門喧譟請昌為帝帥讀曰率昌大喜遣人謝之曰天時未至時至我自為之其僚佐吳瑤都虞候李暢之等皆勸成之吏民獻謠讖符瑞者不可勝紀勝音升其始賞之以錢數百緡既而獻者日多稍減至五百三百而已昌曰讖云兔子上金牀此謂我也我生太歲在卯明年復在卯復扶又翻二月卯日卯時吾稱帝之秋也為董昌僭號錢鏐舉兵討之張本王崇武標點容肇祖聶崇岐覆校
