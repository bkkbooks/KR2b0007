body:
  text: 資治通鑑卷第一百三十八端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注齊紀四世祖武皇帝下永明十一年癸酉四九三春正月以驃騎大將軍王敬則為司空驃匹妙翻騎奇寄翻鎮軍大將軍陳顯達為江州刺史顯達自以門寒位重陳顯達南彭城人起於卒伍常有愧懼之色戒其子勿以富貴陵人而諸子多事豪侈顯達聞之不悅以陳顯達之居寵思畏終不能自免於猜暴之朝至於稱兵而死豈非繫於所遇之時哉過九江自建康至郢府先過九江麈尾蠅拂麈腫庾翻麈麋屬尾能生風辟蠅蚋陸佃埤雅曰麈似鹿而大其尾辟塵以置舊帛中能令歲久紅色不黦又以拂氈令氈不蠹名苑曰鹿之大者曰麈㣥鹿隨之皆視麈所往麈尾所轉為準於文主鹿為麈古之談者揮焉良為是也是王謝家物汝不須捉此言不須以風流自標置也捉執也於前燒之初上於石頭造露車三千乘欲步道取彭城魏人知之劉昶數泣訴於魏主乞處邊戍招集遺民以雪私恥以蕭氏篡宋夷滅劉氏故也數所角翻處昌呂翻魏書帝紀太和十二年起經武殿於淮泗間大積馬芻上聞之以右衛將軍崔慧景為豫州刺史以備之為下魏入寇張本魏遣員外散騎侍郎邢巒等來聘散悉亶翻騎奇寄翻巒穎之孫也穎曹魏太常邢貞之後邢穎見一百二十二卷宋文帝元嘉八年丙子文惠太子長懋卒太子風韻甚和上晚年好遊宴好呼到翻尚書曹事分送太子省之由是威加內外省悉景翻太子性奢靡治堂殿園囿過於上宮治直之翻費以千萬計恐上望見之乃傍門列修竹凡諸服玩率多僭侈啓於東田起小苑使東宮將吏更番築役將即亮翻更工衡翻更番分番更作也營城包巷彌亙華遠言其彌極華麗而延亙又遼遠也多布耳目太子所為人莫敢以聞上嘗過太子東田見其壯麗大怒收監作主帥太子皆藏之由是大被誚責監工銜翻帥所類翻被皮義翻誚才笑翻又使嬖人徐文景造輦及乘輿御物嬖卑義翻又博計翻乘繩證翻上嘗幸東宮匆匆不暇藏輦匆匆者急遽之意故上不疑文景父陶仁謂文景曰我正當掃墓待喪耳掃墓謂掃除墓地也後文景竟賜死陶仁遂不哭及太子卒上履行東宮行下孟翻見其服玩大怒敕有司隨事毀除以竟陵王子良與太子善而不啓聞並責之太子素惡西昌侯鸞嘗謂子良曰我意中殊不喜此人不解其故惡烏路翻喜許記翻解戶買翻曉也當由其福薄故也子良為之救解為于偽翻及鸞得政太子子孫無遺焉西昌侯夷滅太子子孫事見後按鸞翦除高武諸子及太子子孫以成篡事文惠雖不惡之其子孫亦不能免也觀隆昌建武時事君子謂文惠知所惡矣二月魏主始耕藉田於平城南魏起於北荒未嘗講古者天子親耕之禮今孝文始行之藉在亦翻雍州刺史王奐惡寧蠻長史劉興祖收繫獄雍於用翻惡烏路翻蕭子顯齊志寧蠻府屬雍州別領西新安義寧南襄北建武蔡陽永安安定懷化武寧新陽義安高安左義陽南襄城廣昌東襄城北襄城懷安北弘農西弘農析陽北義陽漢廣中襄城等蠻郡誣其搆扇山蠻欲為亂敕送興祖下建康自襄陽順流東至建康故曰下詐云自經上大怒遣中書舍人呂文顯直閣將軍曹道剛將齋仗五百人收奐齋仗齋庫精仗以給禁衛勇力之士將即亮翻奐子彪素凶險奐不能制長史殷睿奐之壻也謂奐曰曹呂來既不見真敕恐為姦變正宜録取録收也攝也奐納之考異曰南史奐子彪議閉門拒命睿諫曰今開門白服接臺使不過隳官免爵耳彪堅執不同睿又請遣典籤間道送啓奐從之典籤出城為文顯所執睿曰忠不背國勇不逃死勸奐仰藥睿與彪同誅今從齊書開庫配甲仗出南堂陳兵閉門拒守奐門生鄭羽叩頭啓奐乞出城迎臺使使疏吏翻奐曰我不作賊欲先遣啓自申正恐曹呂等小人相陵藉陵者侮之而出其上藉者蹈之使薦於下藉慈夜翻彪遂出與虎軍戰兵敗走歸三月乙亥司馬黃瑤起寧蠻長史河東裴叔業於城內起兵攻奐斬之為後奐子肅食瑤起之肉張本皆伏誅彪兄融琛死於建康琛弟祕書丞肅獨得脫奔魏為王肅屢引魏兵入寇張本琛丑林翻考異曰南史奐弟份自拘請罪帝宥之肅屢引魏人至邊帝謂份曰比有北信不份曰肅近忘墳柏寧遠憶有臣按奐以三月死帝以七月殂是冬肅始見魏主於鄴南史誤也齊書無此語夏四月甲午立南郡王昭業為皇太孫東宮文武悉改為太孫官屬東宮官屬文則太傅少傅詹事率更令家令僕門大夫中庶子中舍人庶子洗馬舍人武則左右衛率翊軍步兵屯騎三校尉旅賁中郎將左右積弩將軍殿中將軍員外殿中將軍常從虎賁督南郡王何氏為皇太孫戢之女也何戢見一百三十五卷高帝建元二年戢則立翻又疾立翻魏太尉丕等請建中宮戊戌立皇后馮氏后熙之女也為後馮后以讒廢張本漢章帝集諸儒於白虎觀議五經同異作白虎通王者不臣妻之父母下詔令太師上書不稱臣入朝不拜朝直遙翻熙固辭光城蠻帥征虜將軍田益宗帥部落四千餘戶叛降于魏沈約曰光城郡疑大明中分弋陽所立五代史志曰光州光山縣舊置光城郡蠻帥所類翻宗帥讀曰率降戶江翻五月壬戌魏主宴四廟子孫於宣文堂親與之齒用家人禮四廟子孫謂世祖恭宗高宗顯祖之子孫也太和十二年起宣文堂經武殿用家人禮者略君臣之敬而序長幼之齒甲子魏主臨朝堂朝直遙翻引公卿以下決疑政録囚徒帝謂司空穆亮曰自今朝廷政事日中以前卿等先自論議日中以後朕與卿等共決之丙子以宜都王鏗為南豫州刺史鏗上耕翻先是廬陵王子卿為南豫州刺史先悉薦翻之鎮道中戲部伍為水軍上聞之大怒殺其典籤以鏗代之子卿還第上終身不與相見襄陽蠻酋雷婆思等帥戶千餘求內徙於魏魏人處之沔北是時沔北之地猶為齊境雷婆思等蓋居沔南徙處沔北則稍近魏境耳酋慈由翻帥讀曰率處昌呂翻魏主以平城地寒六月雨雪極陰之地盛夏雨雪雨王遇翻自上而下曰雨風沙大風揚沙也恐㣥臣不從乃議大舉伐齊欲以脅衆齋於明堂左個鄭玄曰明堂左個大寢南堂東偏也個古賀翻遇革帝曰湯武革命應乎天而順乎人此革卦之彖辭也諶氏壬翻㣥臣莫敢言尚書任城王澄曰陛下奕葉重光帝有中土任音壬重直龍翻今出師以征未服而得湯武革命之象未為全吉也帝厲聲曰繇云大人虎變何言不吉繇直又翻大人虎變革九五爻辭九五君位也故引以難澄澄曰陛下龍興已久何得今乃虎變帝作色曰社稷我之社稷任城欲沮衆邪澄曰社稷雖為陛下之有臣為社稷之臣安可知危而不言帝久之乃解曰各言其志夫亦何傷既還宮自明堂左個還宮逆謂之曰嚮者革卦今當更與卿論之明堂之忿恐人人競言沮我大計故以聲色怖文武耳想識朕意見賢遍翻沮在呂翻怖普布翻因屏人謂澄曰今日之舉誠為不易屏必郢翻易以豉翻但國家興自朔土徙居平城此乃用武之地非可文治今將移風易俗其道誠難朕欲因此遷宅中原卿以為何如魏主始與任城王澄言其情陛下欲卜宅中土以經略四海此周漢所以興隆也比之周成康漢光明也北人習常戀故必將驚擾奈何後穆泰等之謀卒如帝所慮非常之事故非常人之所及陛下斷自聖心斷丁亂翻彼亦何所能為帝曰任城吾之子房也張良贊漢高帝遷都長安故以為比六月丙戌命作河橋欲以濟師祕書監盧淵上表以為前代承平之主未嘗親御六軍決勝行陳之間行戶剛翻陳讀曰陳豈非勝之不足為武不勝有虧威望乎昔魏武以弊卒一萬破袁紹事見六十二卷漢獻帝建安五年事見一百五卷晉孝武帝太元八年決於須臾不在衆寡也詔報曰承平之主所以不親戎事或以同軌無敵或以懦劣偷安今謂之同軌則未然天下混一則車同軌書同文必若王者不當親戎則先王制革輅何所施也周制五輅革輅龍勒條纓五就建大白以即戎鄭氏注革輅鞔之以革而漆之無他飾條讀為絛蓋由仗順苻氏之敗亦由失政豈寡必能勝衆弱必能制強邪丁未魏主講武命尚書李沖典武選時欲用兵命沖典武選銓擇才勇之士選須絹翻建康僧法智與徐州民周盤龍等作亂此又一周盤龍非周奉叔之父攻徐州城入之刺史王玄邈討誅之徐州城即鍾離城秋七月癸丑魏立皇子恂為太子為魏主後廢恂張本戊子嚴子改午魏中外戒嚴發露布及移書稱當南伐用兵尚神密魏主今露其事以布告四方故亦曰露布移書則移書於齊境也廣設召募以備之中書郎王融自恃人地王融有俊才故以人身自高且王弘曾孫故以門地自高嘗夜直省中撫案歎曰為爾寂寂爾如此也寂寂言冷寞也鄧禹年二十四為漢司徒融年已過之故云然喧湫不得進朱雀桁當建康朱雀門跨秦淮南北岸以渡行人大路所由也桁開則行者填咽湫子小翻隘也經典釋文曰湫徐音秋又在酒翻車前無八騶何得稱丈夫捶傳追翻車前有油壁自晉以來諸公諸從公車前給騶八人騶側鳩翻竟陵王子良愛其文學特親厚之融見上有北伐之志數上書奬勸奬者推助以成其事數所角翻騎奇寄翻及魏將入寇子良於東府募兵版融寧朔將軍宋泰始初南攻義嘉軍功者衆版不能供始用黃紙今版授融蓋重於黃紙也或曰未經敕用者謂之版授融傾意招納得江西傖楚數百人並有幹用傖助庚翻會上不豫詔子良甲仗入延昌殿侍醫藥子良以蕭衍范雲等皆為帳內軍主戊辰遣江州刺史陳顯達鎮樊城上慮朝野憂遑遑急也遽也江左以清商為正聲伎伎渠綺翻太孫間日參承間日隔一日也間古莧翻參候也承奉也戊寅上疾亟暫絶氣暫絶而不息也內外惶懼百僚皆已變服王融欲矯詔立子良詔草已立蕭衍謂范雲曰道路籍籍皆云將有非常之舉王元長非濟世才王融字元長雲曰憂國家者惟有王中書耳衍曰憂國欲為周召邪欲為豎刁邪召讀曰邵按左氏傳齊桓公既立子昭為太子易牙有寵於衛姬衛姬生無虧易牙因豎刁以薦羞於桓公遂有寵公許之立無虧公卒易牙入與豎刁殺㣥吏而立無虧昭奔宋宋襄公伐齊殺無虧而立昭是為孝公雲不敢答及太孫來王融戎服絳衫於中書省閣口斷東宮仗不得進斷音短頃之上復蘇復扶又翻問太孫所在因召東宮器甲皆入以朝事委尚書左僕射西昌侯鸞朝直遙翻俄而上殂年五十四處昌呂翻分扶問翻鸞聞之急馳至雲龍門不得進鸞曰有敕召我排之而入奉太孫登殿命左右扶出子良指麾部署音響如鍾殿中無不從命融知不遂釋服還省釋戎服還中書省也公誤我由是鬱林王深怨之太孫即位尋見廢弒史以追廢之號書之為後殺王融張本遺詔曰太孫進德日茂社稷有寄子良善相毗輔思弘治道治直吏翻內外衆事無大小悉與鸞參懷共下意參豫也懷思也命鸞參豫其事而詳思其可否也共下意者令降心相從以濟國事也職務根本悉委右僕射王晏吏部尚書徐孝嗣軍旅之略委王敬則陳顯達王廣之王玄邈沈文季張王褱薛淵等自此以上皆遺詔之辭王褱古回翻世祖留心政事務總大體嚴明有斷郡縣久於其職長吏犯法封刃行誅故永明之世百姓豐樂賊盜屏息然頗好遊宴華靡之事常言恨之未能頓遣遣袪也逐也言未能袪逐遊宴之失也自此以上史述帝平生之大略斷丁亂翻長知兩翻樂音洛屏必郢翻好呼到翻鬱林王之未立也衆皆疑立子良口語喧騰武陵王曄於衆中大言曰若立長則應在我世祖諸弟存者曄為長長知兩翻則應在太孫鬱林王諱昭業字元尚小字法身文惠太子長子也以世嫡立為皇太孫太孫已即位故書帝並使監殿中直衛少日復以道剛為黃門郎監古銜翻少詩沼翻復扶又翻為西昌侯鸞欲弒帝先除周奉叔曹道剛張本初西昌侯鸞為太祖所愛事見一百三十五卷高帝建元二年車服儀從同於素士所居官名為嚴能故世祖亦重之鸞初為安吉令有嚴能之名王子侯舊乘纏帷車鸞獨乘下帷車儀從如素士從才用翻使竟陵王子良輔政鸞知尚書事子良素仁厚不樂世務樂音洛乃更推鸞故遺詔云事無大小悉與鸞參懷子良之志也史言子良無奪適之志帝少養於子良袁氏少詩照翻慈愛甚著及王融有謀史言奪適之謀出於王融大行出太極殿子良居中書省帝使虎賁中郎將潘敞領二百人仗屯太極殿西階以防之中書省蓋在太極殿西故使屯於西階以防子良賁音奔將即亮翻諸王皆出子良乞停至山陵不許乞停中書省俟梓宮出葬而後出也壬午稱遺詔以武陵王曄為衛將軍與征南大將軍陳顯達並開府儀同三司尚書左僕射西昌侯鸞為尚書令太孫詹事沈文季為護軍史言遺詔本無此段除授當時稱遺詔行之以竟陵王子良為太傅蠲除三調及衆逋三調謂調粟調帛及雜調也逋欠負也治據蕭子顯齊書當作冶謂冶鑄之所也先是蠲原之詔多無事實督責如故所謂黃放白催也先悉薦翻恩信兩行衆皆悅之史為西昌侯鸞篡國張本魏山陽景桓公尉元卒尉紆勿翻魏主使録尚書事廣陵王羽持節安撫六鎮發其突騎騎奇寄翻下同丁亥魏主辭永固陵己丑發平城南伐步騎三十餘萬使太尉丕與廣陵王羽留守平城並加使持節晉制使持節得殺二千石以下杜佑曰留守周之君陳似其任也此後無聞漢和帝南巡祠園廟張禹以太尉兼衛留守晉惠帝幸長安僕射荀藩等與遺官在洛者為留臺承制行事其後安帝播遷劉裕亦置留臺後魏孝文帝南伐以太尉丕廣陵王羽留守京師留守之制因此太尉宜專節度臣正可為副魏主曰老者之智少者之決言老者經事多故智慮深遠少者氣盛故臨事有斷少詩詔翻以河南王幹為車騎大將軍都督關右諸軍事又以司空穆亮安南將軍盧淵平南將軍薛胤皆為幹副衆合七萬出子午谷欲攻梁益也辨之曾孫也薛辨見一百一十八卷晉安帝義熙十三年鬱林王性辨慧美容止善應對哀樂過人樂音洛世祖由是愛之而矯情飾詐陰懷鄙慝與左右㣥小共衣食同臥起始為南郡王從竟陵王子良在西州帝少養於子良袁氏子良為揚州刺史故帝從在西州節其用度王密就富人求錢無敢不與別作鑰鉤鉤所以啓鑰今謂之鑰匙與左右至諸營署中淫宴師史仁祖侍書胡天翼王國有師掌導之教訓侍書掌教之書翰若言之二宮二宮謂上宮及東宮也易以豉翻若於營署為異人所毆毆烏口翻及犬物所傷豈直罪止一身亦當盡室及禍年各七十餘生豈足吝邪數日間二人相繼自殺二宮不知也人莫知其子之惡其斯之謂歟皆逆加官爵疏於黃紙使囊盛帶之盛時征翻許南面之日依此施行侍太子疾及居喪憂容號毀號戶刀翻見者嗚咽裁還私室即歡笑酣飲常令女巫楊氏禱祀速求天位及太子卒文惠太子卒於是年正月倍加敬信既為太孫是年夏四月自南郡王為太孫又令楊氏禱祀時何猶在西州太孫居東宮何尚留西州太孫與何書紙中央作一大喜字而作三十六小喜字繞之侍世祖疾言發淚下世祖以為必能負荷大業荷下可翻又讀如字謂曰五年中一委宰相汝勿措意五年外勿復委人復扶又翻若自作無成無所多恨臨終執其手曰若憶翁當好作作音佐韓愈方橋詩曰非閣復非船可居兼可過若欲問方橋方橋如此作注云白樂天皮日休詩皆自注曰音佐朱元晦曰今按廣韻作造也荀子肉腐出蟲魚枯生蠹貪利忘身禍災乃作音將祚翻及廉范五袴之謠皆已為此音矣然讀為佐音者又將祚之訛也而世俗所用從人從故而切為將祚者又字之俗體也遂殂大斂始畢悉呼世祖諸伎備奏衆樂即位十餘日即收王融下廷尉斂力贍翻伎渠綺翻下戶嫁翻使中丞孔稚圭奏融險躁輕狡招納不逞誹謗朝政朝直遙翻融求援於竟陵王子良子良憂懼不敢救遂於獄賜死時年二十七初融欲與東海徐勉相識每託人召之勉謂人曰王君名高望促言名雖高而輕躁人知其必及禍故望促類篇毗祭翻弊或從衣此云者義與弊同勉由是知名太學生會稽魏準以才學為融所賞會工外翻融欲立子良準鼓成其事鼓以作氣言鼓作融氣以成其事竟陵才弱王中書無斷斷丁亂翻敗在眼中矣及融誅召準入舍人省詰問詰去吉翻惶懼而死舉體皆青時人以為膽破壬寅魏主至肆州魏收志肆州治九原天賜二年為鎮真君七年置州領永安秀容鴈門郡而永安郡定襄縣注云真君七年併雲中九原晉昌屬焉則知魏肆州蓋治定襄之九原也然此定襄亦非漢之定襄縣地蓋曹魏所置新昌郡之定襄縣其地在陘嶺之南古定襄在陘嶺之北隋志鴈門郡後周置肆州隋改曰代州又有定襄郡開皇五年置雲州總管府此蓋因古定襄以名郡參考可知矣宋白曰後魏置肆州於九原非古九原漢末曹公所置定襄郡之九原縣也唐為秀容縣欣州定襄郡治焉後魏書云太平四年置肆州治秀容城領靈丘等八郡停駕慰勞勞力到翻給衣食終身此亦可謂惠而不知為政矣見者則給衣食目所不見者豈能遍給其衣食哉古之為政者孤獨廢疾者皆有以養之豈必待身親見而後養之也跛補火翻跛者一足偏短眇者一目偏盲眇亡沼翻大司馬安定王休執軍士為盜者三人以徇於軍將斬之魏主行軍遇之行下孟翻循行也命赦之休不可曰陛下親御六師將遠清江表今始行至此而小人已為攘盜不斬之何以禁姦帝曰誠如卿言然王者之體時有非常之澤三人罪雖應死而因緣遇朕雖違軍法可特赦之既而謂司徒馮誕曰大司馬執法嚴諸君不可不慎馮誕后戚既親且貴故語之以警百司臣光曰人主之於其國譬猶一身視遠如視邇在境如在庭舉賢才以任百官修政事以利百姓則封域之內無不得其所矣是以先王黈纊塞耳前旒蔽明欲其廢耳目之近用推聰明於四遠也東方朔曰冕而前旒所以蔽明黈纊充耳所以塞聰如淳注曰黈音主苟翻謂以玉為瑱用黈纊懸之也師古曰如説非也黈黃色也纊綿也以黃綿為丸用組懸之垂兩耳邊示不外聽非玉瑱之懸也塞悉則翻當命有司均之於境內今獨施於道路之所遇則所遺者多矣其為仁也不亦微乎況赦罪人以橈有司之法橈奴教翻尤非人君之體也惜也孝文魏之賢君而猶有是乎戊申魏主至並州並州刺史王襲治有聲迹治直吏翻境內安靜帝嘉之襲教民多立銘置道側虛稱其美帝聞而問之襲對不以實帝怒降襲號二等號者所領將軍號也九月壬子魏遣兼員外散騎常侍勃海高聰等來聘丁巳魏主詔車駕所經傷民秋稼者畝給穀五斛辛酉追尊文惠太子為文皇帝廟號世宗世祖梓宮下渚渚在東府前秦淮之渚也轀輬車未出端門亟稱疾還內端門宮之正南門內大內也轀音溫輬音涼即於內奏胡伎鞞鐸之聲響震內外伎渠綺翻鞞頻迷翻丙寅葬武皇帝於景安陵廟號世祖景安陵亦在武進帝遺詔所命陵名也在休安陵東所卜第三處休安陵蓋帝祖宋太常樂子所葬高帝受禪尊為休安陵戊辰魏主濟河庚午至洛陽壬申詣故太學觀石經故太學漢魏所營者乙亥鄧至王像舒彭遣其子舊朝于魏朝直遙翻且請傳位於舊魏主許之魏主自發平城至洛陽霖雨不止丙子詔諸軍前發丁丑帝戎服執鞭乘馬而出㣥臣稽顙於馬前稽顙於前將諫南伐也稽音啓廟算已定大軍將進諸公更欲何云尚書李沖等曰今者之舉天下所不願唯陛下欲之臣不知陛下獨行竟何之也言違衆南伐無異獨行敢以死請帝大怒曰吾方經營天下期於混一而卿等儒生屢疑大計斧鉞有常卿勿復言此亦所以怖㣥臣而決遷都之計也復扶又翻於是安定王休等並殷勤泣諫帝乃諭㣥臣曰今者興發不小動而無成何以示後朕世居幽朔欲南遷中土苟不南伐當遷都於此王公以為何如欲遷者左不欲者右章十二行本右下有安定王休等相帥如右九字乙十一行本同孔本同張校同南安王楨進曰成大功者不謀於衆引秦商鞅之言遷都洛邑此臣等之願蒼生之幸也㣥臣皆呼萬歲時舊人雖不願內徙舊人謂與魏同起於北荒之子孫即所謂國人無敢言者遂定遷都之計李沖言於上曰陛下將定鼎洛邑宗廟宮室非可馬上遊行以待之願陛下暫還代都俟㣥臣經營畢功然後備文物鳴和鸞而臨之帝曰朕將巡省州郡省悉景翻至鄴小停春首即還未宜歸北不肯歸北蓋慮北人歸代復戀土重遷也諭留司百官以遷都之事曰今日真所謂革也謂前筮之遇革今之遷都真以革北方之俗易説卦曰革去故也帝以㣥臣意多異同謂衛尉卿鎮南將軍于烈曰卿意如何烈曰陛下聖略淵遠非愚淺所測若隱心而言隱度也度徒洛翻適中半耳樂音洛中竹仲翻帝曰卿既不唱異言不唱為異論也深感不言之益使還鎮平城曰留臺庶政一以相委烈栗磾之孫也于栗磾事魏道武帝健將也磾丁奚翻先是北地民支酉聚衆數千起兵於長安城北石山北地郡魏孝文帝太和十一年置班州十四年改邠州按水經注石山當在長安城東北有敷谷敷水出焉北流注于渭先悉薦翻欲邀結齊師以為應援使疏吏翻攻執魏刺史劉藻秦雍間七州民皆響震七州雍岐秦南秦涇邠華也雍於用翻各守堡壁以待齊救魏河南王幹引兵擊之幹兵大敗支酉進至咸陽北濁谷穆亮與戰又敗考異曰齊書穆亮作繆老生今從魏書酉等進向長安盧淵薛胤等拒擊大破之降者數萬口降戶江翻淵唯誅首惡餘悉不問獲酉廣並斬之冬十月戊寅朔魏主如金墉城徵穆亮徵穆亮於關右董爾北史作董爵己卯如河南城乙酉如豫州自金墉西如河南又自河南東如豫州此豫州謂虎牢城也魏明元帝取虎牢置豫州獻文帝取懸瓠又置豫州以虎牢為北豫州今主太和十九年罷北豫州置東中府癸巳舍于石濟乙未魏解嚴設壇于滑臺城東告行廟以遷都之意遷都之議既定停南伐之師故解嚴奉神主而行故有行廟起滑臺宮任城王澄至平城衆始聞遷都莫不驚駭澄援引古今徐以曉之衆乃開伏開發也伏厭伏也言北人安土重遷蔽於此説不肯降心以相從澄援引曉喻以發其蒙莫不厭伏也魏主喜曰非任城朕事不成壬寅尊皇太孫太為皇太后即文惠太子王氏也即何也癸卯魏主如鄴城王肅見魏主於鄴是年三月王肅奔魏今方得見魏主魏主與之言不覺促席移晷降人初至君臣情分甚為闊疏言有當心故促席近前以聽之不覺其分之疏也與之言而弗厭倦日為之移晷不覺其久也親舊貴臣莫能間也魏主或屏左右與肅語至夜分不罷間古莧翻屏必郢翻自謂君臣相得之晚尋除輔國將軍大將軍長史時魏主方議興禮樂變華風凡威儀文物多肅所定乙巳魏主遣安定王休帥從官迎家於平城帥讀曰率從才用翻辛亥封皇弟昭文為新安王昭秀為臨海王昭粲為永嘉王魏主築宮於鄴西十一月癸亥徙居之御史中丞江淹劾奏前益州刺史劉悛梁州刺史陰智伯贓貨巨萬皆抵罪初悛罷廣司二州按齊書劉悛傳悛出督廣州世祖自尋陽東下遇悛舟於渚間是時齊未受禪也罷廣州計當在世祖居東宮時世祖即位悛自廣陵遷督司州徵入為長兼侍中悛七倫翻又丑緣翻家無留儲在益州作金浴盆餘物稱是及鬱林王即位悛所獻減少稱尺證翻少詩沼翻悛傳云悛作金浴盆等欲以獻世祖還都而世祖晏駕鬱林新立遂減其所獻帝怒收悛付廷尉欲殺之西昌侯鸞救之得免猶禁錮終身悛勔之子也劉勔死於桂陽之難聶崇岐標點王崇武覆校
