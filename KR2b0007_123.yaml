body:
  text: 資治通鑑卷第一百二十三端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注宋紀五太祖文皇帝中之上元嘉十三年丙子四三六春正月癸丑朔上有疾不朝會朝直遙翻下同甲寅魏主還宮二月戊子燕王遣使入貢于魏使疏吏翻下同請送侍子魏主不許燕王屢請送侍子而不至魏主知其詐故不許壬辰遣使者十餘輩詣東方高麗等諸國告諭之諭以燕王之罪使不得與通或有奔逸使不得容受之也司空江州刺史永修公檀道濟漢靈帝中平中立永修縣屬豫章郡隋開皇九年併入建昌縣威名甚重左右腹心並經百戰諸子又有才氣朝廷疑畏之朝直遙翻帝久疾不愈劉湛説司徒義康以為宮車一日晏駕道濟不復可制説輪芮輸復扶又翻下足復同義康言於帝召道濟入朝其妻向氏謂道濟曰姓譜祁姓之後為向國向式亮翻又如字高世之勳自古所忌今無事相召禍其至矣既至留之纍月帝稍間間如字已下渚道濟將還江州船已下秦淮渚會帝疾動義康矯詔召道濟入祖道因執之三月己未下詔稱道濟潛散金貨招誘剽猾誘音酉剽匹妙翻因朕寢疾規肆禍心收付廷尉並其子給事黃門侍郎植等十一人誅之唯宥其孫孺唯宥諸孫之在童孺者二人皆道濟腹心有勇力時人比之關張關羽張飛也道濟見收憤怒目光如炬脫幘投地曰乃壞汝萬里長城壞音怪魏人聞之喜曰道濟死吳子輩不足復憚為後魏人入寇帝思道濟張本庚申大赦以中軍將軍南譙王義宣為江州刺史辛未魏平東將軍娥清安西將軍古弼將精騎一萬伐燕平州刺史拓跋嬰帥遼西諸軍會之將即亮翻騎奇寄翻帥讀曰率下同氐王楊難當自稱大秦王改元建義立妻為王后世子為太子置百官皆如天子之制然猶貢奉宋魏不絶夏四月魏娥清古弼攻燕白狼城克之白狼縣漢屬右北平郡燕以白狼城為重鎮置並州魏後入併建德郡廣都縣有白狼山白狼水高麗遣其將葛盧孟光將衆數萬隨陽伊至和龍迎燕王去年燕遣陽伊請迎於高麗臨川在和龍城東開城門納魏兵考異曰後魏古弼傳作大臣古泥今從十六國春秋鈔不入生遂勒兵攻燕王王引高麗兵入自東門與生戰于闕下生中流矢死中竹仲翻葛盧孟光入城命軍士脫弊褐取燕武庫精仗以給之大掠城中五月乙卯燕王帥龍城見戶東徙帥讀曰率見賢遍翻馮氏歷二主二十八年而滅焚宮殿火一旬不滅令婦人被甲居中陽伊等勒精兵居外葛盧孟光帥騎殿後被皮義翻殿丁甸翻方軌而進前後八十餘里古弼部將高苟子帥騎欲追之將即亮翻帥讀曰率騎奇寄翻弼醉拔刀止之故燕王得逃去魏主聞之怒檻車徵弼及娥清至平城皆黜為門卒戊午魏主遣散騎常侍封撥使高麗散悉亶翻騎奇寄翻使疏吏翻令送燕王丁卯魏主如河西六月詔寧朔將軍蕭汪之將兵討程道養軍至郪口郪江源出今潼川府銅山縣歷遂寧府長江縣而合於涪水謂之郪口郪音妻降戶江翻道養兵敗還入郪山赫連定之西遷也事見上卷八年秋七月魏主遣驃騎大將軍樂平王丕尚書令劉潔督河西高平諸軍以討之先遣平東將軍崔賾齎詔書諭難當驃匹妙翻騎奇寄翻賾士革翻魏散騎侍郎遊雅來聘姓譜鄭公子偃字子遊後以為氏魏為廣平望姓己未零陵王太褚氏卒追諡曰晉恭思皇后葬以晉禮八月魏主畋于河西魏主遣廣平公張黎發定州兵一萬二千通莎泉道莎泉在靈丘魏收地形志靈丘郡有莎泉縣隋廢靈丘為縣併莎泉入焉莎素何翻九月庚戌魏樂平王丕等至略陽楊難當懼請奉詔攝上邽守兵還仇池諸將議以為不誅其豪帥帥所類翻軍還之後必相聚為亂又大衆遠出不有所掠無以充軍實賞將士丕將從之中書侍郎高允參丕軍事諫曰如諸將之謀是傷其向化之心大軍既還為亂必速丕乃止還從宣翻又如字撫慰初附秋毫不犯秦隴遂安難當以其子順為雍州刺史鎮下辨雍於用翻辨步莧翻高麗不送燕王於魏遣使奉表稱當與馮弘俱奉王化魏主以高麗違詔議擊之將發隴右騎卒麗力知翻使疏吏翻騎奇寄翻劉潔曰秦隴新民且當優復新民新附之民也復方目翻然後用之樂平王丕曰和龍新定宜廣修農桑以豐軍實然後進取則高麗一舉可滅也魏主乃止癸丑封皇子濬為始興王駿為武陵王冬十一月己酉魏主如稒陽稒音固驅野馬於雲中置野馬苑閏月壬子還宮初高祖克長安事見一百十八卷晉安帝義熙十三年渾戶本翻儀狀雖舉不綴七曜日月五星謂之七曜詔太史令錢樂之更鑄渾儀徑六尺八分以水轉之昏明中星與天相應孟春之月昏參中旦尾中仲春之月昏弧中旦建星中季春之月昏七星中旦牽牛中孟夏之月昏翼中旦婺女中仲夏之月昏亢中旦危中季夏之月昏火中旦奎中孟秋之月昏建星中旦畢中仲秋之月昏牽牛中旦觜觿中季秋之月昏虛中旦柳中孟冬之月昏危中旦七星中仲冬之月昏東壁中旦軫中季冬之月昏婁中旦氐中更工衡翻柔然與魏絶和親犯魏邊柔然與魏和見上卷八年吐谷渾惠王慕璝卒弟慕利延立璝古回翻十四年丁丑四三七春正月戊子魏北平宣王長孫嵩卒長知兩翻辛卯大赦二月乙卯魏主如幽州三月丁丑魏主以南平王渾為鎮東大將軍儀同三司鎮和龍己卯還宮帝遣散騎常侍劉熙伯如魏議納幣散悉亶翻騎奇吏翻會帝女亡而止魏請婚始上卷十年夏四月趙廣張尋梁顯等各帥衆降別將王道恩斬程道養送首餘黨悉平九年趙廣等反今乃平帥讀曰率降戶江翻將即亮翻丁未以輔國將軍周籍之為益州刺史魏主以民官多貪郡守縣令親民之官五月己丑詔吏民得舉告守令不如法者於是姦猾專求牧宰之失迫脅在位橫於閭里橫戶孟翻而長吏咸降心待之貪縱如故長知兩翻丙申魏主如雲中秋七月戊子魏永昌王健等討山胡白龍餘黨於西河滅之八月甲辰魏主如河西九月甲申還宮丁酉魏主遣使者拜吐谷渾王慕利延為鎮西大將軍儀同三司改封西平王冬十月癸卯魏主如雲中十一月壬申還宮魏主復遣散騎侍郎董琬高明等多齎金帛使西域招撫九國復扶又翻下不復為復同九國入貢見上卷十二年琬等至烏孫其王甚喜曰破落那者舌二國破落那漢大宛國也去代萬四千四百五十里者舌漢康居國也去代萬五千四百五十里也但無路自致耳今使君宜過撫之乃遣導譯送琬詣破落那明詣者舌旁國聞之爭遣使者隨琬等入貢凡十六國自是每歲朝貢不絶朝直遙翻魏主以其妹武威公主妻河西王牧犍妻七細翻犍居言翻河西王遣宋繇奉表詣平城謝且問公章甲十一行本公上有其母及三字乙十一行本同孔本同張校同退齋校同主所宜稱魏主使㣥臣議之皆曰母以子貴妻從夫爵春秋之義母以子貴禮記婦人無爵從夫之爵公主於其國稱王后於京師則稱公主魏主從之初牧犍娶涼武昭王之女及魏公主至李氏與其母尹氏遷居酒泉頃之李氏卒尹氏撫之不哭曰汝國破家亡今死晚矣牧犍之弟無諱鎮酒泉謂尹氏曰后諸孫在伊吾李寶奔伊吾見一百十九卷營陽王景平元年尹氏未測其意紿之曰吾子孫漂蕩託身異域餘生無幾當死此不復為氈裘之鬼也未幾潛奔伊吾無諱遣騎追及之尹氏謂追騎曰沮渠酒泉許吾歸北何為復追汝取吾首以往吾不復還矣追騎不敢逼引還尹氏卒於伊吾史言尹氏義烈紿蕩亥翻幾居豈翻復扶又翻騎奇寄翻卒子恤翻牧犍遣將軍沮渠旁周入貢于魏魏主遣侍中古弼尚書李順賜其侍臣衣服並徵世子封壇入侍是歲牧犍遣封壇如魏亦遣使詣建康使疏吏翻獻雜書及敦煌趙所撰甲寅元曆敦徒門翻讀為斐魏書作撰士免翻並求雜書數十種種章勇翻帝皆與之李順自河西還魏主問之曰卿往年言取涼州之策朕以東方有事未遑也今和龍已平吾欲即以此年西征可乎對曰臣疇昔所言見上卷十年私謂不謬然國家戎車屢動士馬疲勞西征之議請俟他年魏主乃止十五年戊寅四三八春二月丁未以吐谷渾王慕利延為都督西秦河沙三州諸軍事鎮西大將軍西秦河二州刺史隴西王三月癸未魏主詔罷沙門年五十以下者以其強壯罷使為民以從征役初燕王弘至遼東高麗王璉遣使勞之曰麗力知翻璉力展翻使疏吏翻勞力到翻龍城王馮君爰適野次士馬勞乎弘慙怒稱制讓之高麗處之平郭處昌呂翻尋徙北豐弘素侮高麗政刑賞罰猶如其國高麗乃奪其侍人取其太子王仁為質質音致弘怨高麗遣使上表求迎上遣使者王白駒等迎之並令高麗資遣高麗王不欲使弘南來遣將孫漱高仇等殺弘于北豐並其子孫十餘人果如楊之言將即亮翻下同白駒等帥所領七千餘人掩討漱仇殺仇生擒漱高麗王以白駒等專殺遣使執送之上以遠國不欲違其意下白駒等獄下遐稼翻已而原之夏四月納故黃門侍郎殷淳女為太子劭五月戊寅魏大赦丙申魏主如五原秋七月自五原北伐柔然命樂平王丕督十五將出東道永昌王健督十五將出西道魏主自出中道至浚稽山復分中道為二陳留王崇從大澤向涿邪山魏主從浚稽北向天山西登白阜天山在漠北即唐鐵勒思結多濫葛所保之地非伊吾之折羅漫山也白阜疑即雪山復扶又翻邪讀曰耶時漠北大旱無水草人馬多死冬十一月丁卯朔日有食之十二月丁巳魏主至平城豫章雷次宗好學好呼到翻下同隱居廬山廬山在尋陽今在南康城北十五里尋陽之南正面廬山不就是歲以處士徵至建康為開館於雞籠山雞籠山在臺城北郊散悉亶翻騎奇寄翻處昌呂翻為于偽翻帝雅好藝文使丹楊尹廬江何尚之立玄學太子率更令何承天立史學晉志太子率更令主宮殿門戶及賞罰事職如光祿勳衛尉更工衡翻並次宗儒學為四學元靈運之從祖弟也帝數幸次宗學館令次宗以巾褠侍講從才用翻數所角翻褠古侯翻江南人士交際以為盛服蓋次於朝服毛修之不肯以巾褠到殷景仁之門是也蜀注曰巾謂巾幘褠謂單衣資給甚厚又除給事中不就久之還廬山臣光曰易曰君子多識前言往行以畜其德行下孟翻易大畜彖辭孔子曰辭達而已矣論語所記文者儒之餘事至於老莊虛無固非所以為教也夫學者所以求道天下無二道安有四學哉帝性仁厚恭儉勤於為政守法而不峻容物而不弛百官皆久於其職守宰以六期為斷吏不苟免民有所係三十年間四境之內晏安無事戶口蕃息斷丁亂翻蕃音煩出租供徭止於歲賦歲賦常賦也言不額外取民自事而已自適己事而已講誦相聞士敦操尚鄉恥輕薄江左風俗於斯為美後之言政治者皆稱元嘉焉治直吏翻十六年己卯四三九春正月庚寅司徒義康進位大將軍領司徒自漢以來大將軍位三公上司徒丞相職也義康既進位猶領司徒職夏戶雅翻魏主如定州初高祖遺詔令諸子次第居荊州臨川王義慶在荊州八年欲為之選代為于偽翻其次應在南譙王義宣帝以義宣人才凡鄙置不用二月己亥以衡陽王義季為都督荊湘等八州諸軍事荊州刺史義季嘗春月出畋有老父被苫而耕被皮義翻苫詩廉翻左右斥之老父曰盤于遊畋古人所戒夏太康以遊畋失國周公以文王戒成王盤樂也一日不耕民失其時奈何以從禽之樂而驅斥老農也樂音洛義季止馬曰賢者也命賜之食辭曰大王不奪農時則境內之民皆飽大王之食老夫何敢獨受大王之賜乎義季問其名不告而退三月魏雍州刺史葛那寇上洛魏雍州刺史治長安此北上洛也南上洛寄治魏興魏書官氏志內入諸姓賀葛氏改為葛氏雍於用翻鐔徐林翻辛未魏主還宮楊保宗與兄保顯自童亭奔魏保宗鎮童亭見上卷十二年庚寅魏主以保宗為都督隴西諸軍事征西大將軍開府儀同三司秦州牧武都王鎮上邽妻以公主妻七細翻保顯為鎮西將軍晉壽公河西王牧犍通於其嫂李氏兄弟三人傳嬖之傳遞也以便辟得幸曰嬖嬖卑義翻陸德明必計翻公主魏主妹也得愈傳知戀翻魏主徵李氏牧犍不遣厚資給使居酒泉魏每遣使者詣西域使疏吏翻下同常詔牧犍發導護送出流沙使者自西域還至武威牧犍左右有告魏使者曰我君承蠕蠕可汗妄言云可從刊入聲汗音寒士馬疫死大敗而還還從宣翻又如字下同我擒其長弟樂平王丕我君大喜宣言於國又聞可汗遣使告西域諸國稱魏已削弱今天下唯我為強若更有魏使勿復供奉西域諸國頗有二心復扶又翻下能復同兩屬曰二西域既貢奉魏又信柔然之言是有二心使還具以狀聞魏主遣尚書賀多羅使涼州觀虛實多羅還亦言牧犍雖外修臣禮內實乖悖悖蒲內翻又蒲沒翻魏主欲討之以問崔浩對曰牧犍逆心已露不可不誅官軍往年北伐雖不克獲實無所損戰馬三十萬匹計在道死傷不滿八千常歲羸死亦不減萬匹羸倫為翻而遠方乘虛遽謂衰耗不能復振今出其不意大軍猝至彼必駭擾不知所為擒之必矣魏主曰善吾意亦以為然於是大集公卿議於西堂魏平城太極殿有東西堂弘農王奚斤等三十餘人皆曰牧犍西垂下國雖心不純臣然繼父位以來職貢不乏朝廷待以藩臣妻以公主妻七細翻今其罪惡未彰宜加恕宥國家新征蠕蠕蠕人兗翻士馬疲弊未可大舉且聞其土地鹵瘠鹹地曰鹵墝地曰瘠大軍既至彼必嬰城固守攻之不拔野無所掠此危道也初崔浩惡尚書李順伐夏之役浩順有隙順以使涼為魏主所寵待浩愈惡之惡烏路翻使疏吏翻魏主以為能涼武宣王數與順遊宴沮渠蒙遜諡武宣王數所角翻恐順泄之隨以金寶納於順懷順亦為之隱亦為于偽翻浩知之密以白魏主魏主未之信及議伐涼州順與尚書古弼皆曰自溫圉水以西至姑臧據北史溫圉水當作溫圍絶無水草彼人言姑臧城南天梯山上冬有積雪深至丈餘春夏消釋下流成川居民引以溉灌彼聞軍至決此渠口水必乏絶彼人謂涼人也環音宦地不生草人馬飢渴難以久留斤等之議是也魏主乃命浩與斤等相詰難衆無復他言但云彼無水草浩曰漢書地理志稱涼州之畜為天下饒若無水草畜何以蕃詰去吉翻難乃旦翻復扶又翻下敢復同漢書地理志曰涼州土廣民稀水草宜畜牧故涼州之畜為天下饒畜許救翻又許六翻蕃音繁又漢人終不於無水草之地築城郭建郡縣也且雪之消釋僅能斂塵何得通渠溉灌乎此言大為欺誣矣欺誑也誣詐也耳聞不如目見吾嘗目見何可共辨浩曰汝受人金錢欲為之遊説謂我目不見便可欺邪帝隱聽聞之為于偽翻説輸芮翻隱聽者隱屏而聽也乃出見斤等辭色嚴厲㣥臣不敢復言唯唯而已唯于癸翻㣥臣既出振威將軍代人伊馛言於帝馛蒲撥翻曰涼州若果無水草彼何以為國衆議皆不可用宜從浩言帝善之夏五月丁丑魏主治兵於西郊治直之翻六月甲辰發平城使侍中宜都王穆壽輔太子晃監國決留臺事內外聽焉監工銜翻又使大將軍長樂王稽敬稽敬北史作嵇敬當從之魏書官氏志北方諸姓紇奚氏改為嵇氏王將即亮翻命公卿為書以讓河西王牧犍數其十二罪且曰若親帥㣥臣委贄遠迎數所具翻帥讀曰率古者執贄以見拜贄首則委之於地起則取而進之此之謂委贄謁拜馬首上策也六軍既臨面縛輿櫬其次也若守迷窮城不時悛悟櫬初覲翻悛丑緣翻身死族滅為世大戮宜思厥中自求多福己酉改封隴西王吐谷渾慕利延為河南王魏主自雲中濟河秋七月己巳至上郡屬國城漢置屬國於邊郡以處降胡此屬國城漢舊城也班書地理志上郡龜茲縣屬國都尉治壬午留輜重部分諸軍重直用翻分扶問翻使撫軍大將軍永昌王健尚書令劉潔與常山王素為前鋒兩道並進驃騎大將軍樂平王丕太宰陽平王杜超為後繼驃匹妙翻騎奇寄翻以平西將軍源賀為鄉導鄉讀曰嚮魏主問賀以取涼州方略對曰姑臧城旁有四部鮮卑皆臣祖父舊民禿髮傉檀據姑臧既而為沮渠所取有四部鮮卑留居城外賀傉檀之子也處昌呂翻宣國威信示以禍福必相帥歸命帥讀曰率外援既服然後取其孤城如反掌耳魏主曰善八月甲午永昌王健獲河西畜産二十餘萬河西王牧犍聞有魏師驚曰何為乃爾用左丞姚定國計不肯出迎求救於柔然遣其弟征南大將軍董來將兵萬餘人出戰於城南來將即亮翻望風奔潰劉潔用卜者言以為日辰不利斂兵不追董來遂得入城魏主由是怒之為魏誅劉潔張本丙申魏主至姑臧遣使諭牧犍令出降使疏吏翻降戶江翻牧犍聞柔然欲入魏邊為寇冀幸魏主東還遂嬰城固守其兄子祖踰城出降魏主具知其情乃分軍圍之源賀引兵招慰諸部下三萬餘落故魏主得專攻姑臧無復外慮復扶又翻下不復同魏主見姑臧城外水草豐饒由是恨李順謂崔浩曰卿之昔言今果驗矣自是魏主決意誅李順矣臣之言不敢不實類皆如此魏主之將伐涼州也太子晃亦以為疑至是魏主賜太子詔曰姑臧城章甲十一行本城下有東字乙十一行本同孔本同張校同退齋校同西門外涌泉合於城北其大如河自餘溝渠流入漠中其間乃無燥地故有此敕以釋汝疑庚子立皇子鑠為南平王鑠書藥翻九月丙戌河西王牧犍兄子萬年帥所領降魏考異曰宋書氐胡傳曰茂虔兄子萬年為虜內應茂虔見執今從後魏書帥讀曰率降戶江翻下同牧犍帥其文武五千人面縛請降魏主釋其縛而禮之收其城內戶口二十餘萬倉庫珍寶不可勝計使張掖王禿髮保周保周奔魏封張掖公今進為王保周源賀之兄也勝音升章甲十一行本羆作罷乙十一行本同孔本同驤思將翻安遠將軍源賀分徇諸郡雜胡降者又數十萬初牧犍以其弟無諱為沙州刺史都督建康以西諸軍事領酒泉太守宜得為秦州刺史都督丹嶺以西諸軍事領張掖太守丹嶺在姑臧西即刪丹嶺乞伏衰滅樂都亦為沮渠所有樂音洛考異曰宋書宜得作儀德安周作從子豐周今從後魏書從才用翻敦徒門翻及姑臧破魏主遣鎮南將軍代人奚眷擊張掖鎮北將軍封沓擊樂都宜得燒倉庫西奔酒泉安周南奔吐谷渾封沓掠數千戶而還還從宣翻又如字奚眷進攻酒泉無諱宜得收遺民奔晉昌遂就唐兒於敦煌魏主使弋陽公元潔守酒泉及武威張掖皆置將守之將即亮翻魏主置酒姑臧謂㣥臣曰崔公智略有餘吾不復以為奇復扶又翻伊馛弓馬之士而所見乃與崔公同深可奇也馛善射能曳牛卻行走及奔馬而性忠謹故魏主特愛之魏主之西伐也穆壽送至河上自平城送魏主西至河吳提與牧犍相結素深聞朕討牧犍吳提必犯塞柔然敕連可汗名吳提使卿輔佐太子收田既畢即發兵詣漠南分伏要害以待虜至引使深入然後擊之無不克矣涼州路遠朕不得救卿勿違朕言壽頓首受命壽雅信中書博士公孫質以為謀主壽質皆信卜筮以為柔然必不來不為之備質軌之弟也公孫軌見一百二十卷四年柔然敕連可汗聞魏主向姑臧乘虛入寇留其兄乞列歸與嵇敬建寧王崇相拒於北鎮北鎮即魏主破降高車所置六鎮也以在平城之北故曰北鎮或曰北鎮直代都北即懷朔鎮帥讀曰率騎奇寄翻至善無七介山平城大駭民爭走中城走音奏穆壽不知所為欲塞西郭門塞悉則翻請太子避保南山竇太后不聽而止竇太后即保太后會嵇敬建寧王崇擊破乞列歸於陰山之北擒之並其伯父他吾無鹿胡及將帥五百人將即亮翻帥所類翻斬首萬餘級敕連聞之遁去追至漠南而還冬十月辛酉魏主東還留樂平王丕及征西將軍賀多羅鎮涼州徙沮渠牧犍宗族及吏民三萬戶于平城考異曰十六國春秋鈔云十萬戶今從後魏書癸亥禿髮保周帥諸部鮮卑據張掖叛魏帥讀曰率十二月乙亥太子劭加元服大赦劭美鬚眉好讀書便弓馬喜延賓客好呼到翻喜許記翻下尤喜同意之所欲上必從之東宮置兵與羽林等師古曰羽林宿衛之官言其如羽之疾如林之多也為劭以東宮兵弒逆張本壬午魏主至平城以柔然入寇無大失亡故穆壽等得不誅魏主猶以妹壻待沮渠牧犍征西大將軍河西王如故牧犍母卒葬以太之禮武宣王置守冢三十家為沮渠蒙遜置守冢涼州自張氏以來號為多士永嘉之亂中州之人士避地河西張氏禮而用之子孫相承衣冠不墜故涼州號為多士以敦煌闞駰為姑臧太守敦徒門翻闞苦濫翻駰音因張湛為兵部尚書曹魏置五兵尚書據此則兵部之號起於河西金城宋欽為世子洗馬索昔各翻洗悉薦翻趙柔為金部郎曹魏置二十三郎金部其一也主財帛委輸從才用翻魏主克涼州皆禮而用之以闞駰劉昞為樂平王丕從事中郎安定胡叟少有俊才少詩照翻往從牧犍牧犍不甚重之叟謂程弘曰貴主居僻陋之國而淫名僭禮以小事大而心不純一外慕仁義而實無道德其亡可翹足待也吾將擇木左傳衛孔文子將攻太叔疾訪於仲尼仲尼曰甲兵之事未之學也退命駕而行曰鳥則擇木木豈能擇鳥與子暫違非久闊也遂適魏歲餘而牧犍敗魏主以叟為先識拜虎威將軍賜爵始復男按地名無始復漢書地理志越巂郡有姑復縣或者始字其姑字之誤乎世寓涼州不受禮命魏主以為宣威將軍河西右相宋繇從魏主至平城而卒相息亮翻卒子恤翻魏主以索敞為中書博士時魏朝方尚武功朝直遙翻貴遊子弟不以講學為意鄭玄曰貴遊子弟王公之子弟遊無官司者勤於誘導肅而有禮誘音酉貴遊皆嚴憚之多所成立前後顯達至尚書牧守者數十人守手又翻常爽置館於溫水之右水經注桑乾城西十里有溫湯爽立賞罰之科弟子事之如嚴君由是魏之儒風始振高允每稱爽訓厲有方曰文翁柔勝先生剛克漢景帝末文翁為蜀郡守仁愛好教化選郡縣小吏開敏有才者詣京師受業博士又修起學官於成都市中招下縣子弟為學官弟子為除更繇由是大化至今巴蜀好儒雅文翁之教也克亦勝也言文翁以柔勝而常爽以剛勝也成人一也陳留江強寓居涼州獻經史諸子千餘卷及書法亦拜中書博士魏延昌三年強孫式上表曰臣聞伏羲氏作而八卦形其畫軒轅氏興而靈龜彰其彩古史倉頡覽二象之爻觀鳥獸之迹別創文字以代結繩用書契以維事迄于三代厥體頗異雖依類取制未能違倉氏矣故周禮八歲入小學保氏教以六書蓋是史頡之遺法及宣王太史史籀著大篆十五篇與古文或同或異時人謂之籀書孔子修六經左丘明述春秋皆以古文厥意可得而言其後七國殊軌文字乖舛暨秦兼天下丞相李斯乃奏蠲罷不合秦文者斯作倉頡篇中車府令高作爰歷篇太史令胡母敬作博學篇皆取史籀式頗有省改所謂小篆者也於是秦燒經書滌除舊典官獄繁多以趣簡易始用隸書古文自此息矣隸書者始皇使下杜人程邈附於小篆所作也世人以邈徒隸即謂之隸書故秦有八體一曰大篆二曰小篆三曰符書四曰蟲書五曰摹印六曰署書七曰殳書八曰隸書漢興有尉律學復教以籀書又習八體試之課最以為尚書史書省字不正輒舉劾焉又有草書莫知誰始其形書雖無厥誼亦一時之變通也孝宣時召通倉頡讀者獨張敞從受之涼州刺史杜業沛人爰禮講學大夫秦近亦能言之孝平時徵禮等百餘人説文字於未央宮中以禮為小學元士黃門侍郎揚雄採以作訓纂篇及亡新居攝自以運應制作使大司馬甄豐校文字之部頗改定古文時有六書一曰古文孔子壁中書也二曰奇字即古文而異者三曰篆書云小篆也四曰佐書秦隸書也五曰繆篆所以摹印也六曰鳥蟲所以書幡信也壁中書者魯恭王壞孔子宅而得禮尚書春秋論語孝經也又北平侯張蒼獻春秋左氏傳書體與孔氏相類即前代之古文矣後漢扶風曹喜號曰工篆小異斯法而甚精巧自是後學皆其法也又詔侍中賈逵修理舊文殊藝異術王教一端苟有可以加於國者靡不悉集逵即汝南許慎古文學之師也後慎嗟時人之好奇歎俗儒之穿鑿故撰説文解字十五篇首一終亥各有部屬可謂類聚㣥分雜而不越文質彬彬最可得而論也左中郎將蔡雍採李斯曹喜之法以為古今雜形詔於太學立石碑刊載五經題書楷法多是雍書也後開鴻都書畫奇能莫不雲集時諸方獻篆無出雍者魏初博士清河張揖著埤蒼廣雅古今字詁方之許篇古今體用或得或失陳留邯鄲淳亦與揖同時博古開藝特善蒼雅許氏字指八體六書精究厥理有名於揖以書教諸皇子又建三字石經於漢碑西其文蔚煥三體復宣較之説文篆隸大同而古字小異又有京兆韋誕河東衛覬二家並號能篆當時臺觀榜題寶器之銘悉是誕書咸傳之子孫世稱其妙晉世呂忱表上字林六卷尋其況趣附託許慎説文而按偶章句隱別古籀奇惑之字文得正隸不差篆意也忱弟靜別倣故左校令李登聲類之法作韻集五卷使宮商籥彔徵羽各為一篇而文字與兄便是魯衛音讀楚夏時有不同皇魏承百王之季紹五運之緒世易風移文字改變篆形謬錯隸體失真俗學鄙習復加虛巧談辨之士以意為疑炫惑於時難以釐改乃曰追來為歸巧言為辨小兔為需兔神蟲為蠶如斯甚衆皆不合孔氏古書史籀大篆許氏説文石經三字也嗟夫文字者六籍之宗王教之始前人所以垂今今人所以識古臣六世祖瓊家世陳留往晉之初與從父兄應元皆受學於衛覬古篆之法蒼雅方言説文之誼當時並收善譽而祖遇洛陽之亂避地河西數世傳習斯業所以不墜也世祖太延中牧犍內附臣亡祖文威杖策歸國奉獻五世傳掌之書古篆八體之法時蒙褒録敘列於儒林官班文省家號世業臣藉六世之資奉遵祖考之訓切慕古人之軌企踐儒門之轍輒求撰集古來文字以許慎説文為主及孔氏尚書五經音注籀篇爾雅三蒼凡將方言通俗文祖文宗埤蒼廣雅古今字詁三字石經字林韻集諸賦文字有六書之誼者以類編聯文無復重統為一部其古籀奇惑俗隸諸體咸使班於篆下各有區別訓詁假借之誼隨文而解音讀楚夏之聲逐字而注其所不知則闕如也冀省百氏之觀而同文字之域詔如所請中書自曹魏置監令以來未嘗置博士蓋拓跋氏初置是官也監工銜翻綜理史職以中書侍郎高允散騎侍郎張偉參典著作曹魏明帝景初初中書改置監令又置通事郎及晉改曰中書侍郎散悉亶翻騎奇寄翻陰仲逵章甲十一行本逵作達乙十一行本同下同張校同段承根涼土美才請同修國史皆除著作郎仲逵武威人承根暉之子也段暉事乞伏熾磐暮末父子浩集諸曆家考校漢元以來日月薄食五星行度漢元漢初也別為魏曆以示高允允曰漢元年十月五星聚東井見九卷漢高帝元年考異今譏漢史而不覺此謬恐後人之譏今猶今之譏古也浩曰所謬云何允曰按星傳太白辰星常附日而行十月日在尾箕孟冬之月日在尾言在尾箕者竟一月言之也傳直戀翻而東井方出於寅北二星何得背日而行背蒲妹翻是史官欲神其事不復推之於理也復如字又扶又翻浩曰天文欲為變者何所不可邪允曰此不可以空言爭宜更審之坐者咸怪允之言唯東宮少傅遊雅曰東宮少傅即太子少傅少詩照翻高君精於曆數當不虛也後歲餘浩謂允曰先所論者本不經心及更考究果如君言五星乃以前三月聚東井非十月也衆乃歎服允雖明曆初不推步及為人論説為于偽翻唯遊雅知之雅數以災異問允數所角翻允曰陰陽災異知之甚難既已知之復恐漏泄復扶又翻不如不知也天下妙理至多何以問此雅乃止魏主問允為政何先時魏多封禁良田允曰臣少賤允自言其少賤也少詩照翻若國家廣田積穀公私有備則飢饉不足憂矣帝乃命悉除田禁以賦百姓吐谷渾王慕利延聞魏克涼州大懼帥衆西遁踰沙漠帥讀曰率魏主以其兄慕璝有擒赫連定之功事見上卷八年使疏吏翻慕利延乃還故地氐王楊難當將兵數萬寇魏上邽將即亮翻下同秦州人多應之東平呂羅漢説鎮將拓跋意頭曰難當衆盛今不出戰示之以弱衆情離沮不可守也意頭遣羅漢將精騎千餘出衝難當陳所向披靡説輸芮翻陳讀曰陳披普彼翻殺其左右騎八人難當大驚會魏主以璽書責讓難當璽斯氏翻難當引還仇池南豐太司馬氏卒故營陽王之后也九年帝以江夏王義恭子朗為南豐王奉營陽王祀以后為南豐太趙廣張尋等復謀反伏誅十四年廣尋降至建康復謀反復扶又翻下復能復那不復無復同十七年庚辰四四春正月己酉沮渠無諱寇魏酒泉元潔輕之出城與語壬子無諱執潔以圍酒泉二月魏假通直常侍邢穎來聘散騎常侍秦官也曹魏末增置員外散騎常侍晉武帝泰始十年使員外二人與散騎常侍通直故謂之通直散騎常侍穎假以出使非正官也三月沮渠無諱拔酒泉夏四月戊午朔日有食之庚辰沮渠無諱寇魏張掖禿髮保周屯刪丹刪丹縣漢屬張掖郡後分屬西郡唐屬甘州居延海在縣界丙戌魏主遣撫軍大將軍永昌王健督諸將討之將即亮翻司徒義康專總朝權上羸疾積年羸倫為翻心勞輒發屢至危殆義康盡心營奉藥石非口所親嘗不進或連夕不寐內外衆事皆專決施行性好吏職好呼到翻下好於同糾剔文案莫不精盡上由是多委以事凡所陳奏入無不可方伯以下並令義康選用生殺大事或以録命斷之義康録尚書故謂其命為録命斷丁亂翻朝野輻湊每旦府門常有車數百乘朝直遙翻乘繩證翻義康傾身引接未嘗懈倦復能強記耳目所經終身不忘好於稠人廣席標題所憶以示聰明士之幹練者多被意遇懈古隘翻復扶又翻下同好呼到翻被皮義翻嘗謂劉湛曰王敬弘王球之屬竟何所堪坐取富貴復那可解王敬弘恬淡有重名王球簡貴虛靜皆以門望位八坐不以文案關心故義康云然解戶買翻不識大體朝士有才用者皆引入己府府僚無施及忤旨者乃斥為臺官晉宋以來謂天朝為天臺忤五故翻不復存君臣形迹率心而行曾無猜防私置僮六千餘人不以言臺四方獻饋皆以上品薦義康而以次者供御上嘗冬月噉甘甘似橘而巨其皮黃於橘其味甘於橘義康曰今年甘殊有佳者遣人還東府取甘大供御者三寸領軍劉湛與僕射殷景仁有隙事見上卷十二年義康權勢已盛湛愈推崇之無復人臣之禮上浸不能平湛初入朝上恩禮甚厚湛善論治道諳前代故事敘致銓理致極致也理文理也言敘其極致又銓次其文理也治直吏翻諳烏含翻每入雲龍門御者即解駕左右及羽儀隨意分散不夕不出以此為常及晚節驅煽義康馬方走而疾其鞭策曰驅火方熾而鼓其氣焰曰煽嘗謂所親曰劉班方自西還宮與語常視日早晚慮其將去比入吾亦視日早晚苦其不去湛小字班虎故稱之為班比毗至翻近也殷景仁密言於上曰相王權重非社稷計宜少加裁抑相息亮翻少詩沼翻上陰然之司徒左長史劉斌湛之宗也斌音彬大將軍從事中郎王履謐之孫也王謐識武帝於微時晉宋之際位任通顯祭酒魯郡孔胤秀皆以傾諂有寵於義康見上多疾皆謂宮車一日晏駕宜立長君長知兩翻上嘗疾篤使義康具顧命詔義康還省流涕以告湛及景仁湛曰天下艱難詎是幼主所御義康景仁並不答考異曰南史以為義康有此言湛景仁並不答按義康雖不識大體豈敢自為此言湛常欲推崇義康豈肯聞而不答今從宋書及宋略議曹南史作儀曹當從之曹魏置二十三郎儀曹其一也立康帝事見九十七卷索山客翻及上疾瘳微聞之瘳丑留翻而斌等密謀欲使大業終歸義康遂邀結朋黨伺察禁省伺相吏翻有不與己同者必百方構陷之又採拾景仁短長或虛造異同以告湛自是主相之勢分矣相息亮翻義康欲以劉斌為丹楊尹斌音彬言次啓上陳其家貧言未卒卒子恤翻上曰以為吳郡後會稽太守羊玄保求還會工外翻義康又欲以斌代之啓上曰羊玄保求還不審以誰為會稽上時未有所擬倉猝曰我已用王鴻自去年秋上不復往東府史言帝已疏忌義康而義康貪戀權勢惑於附麗者不能引退復扶又翻下同五月癸巳劉湛遭母憂去職湛自知罪釁已彰無復全地釁許覲翻謂所親曰今年必敗常日正賴口舌爭之故得推遷耳今既窮毒謂母子相訣則人理窮而罹荼毒也禍至其能久乎考異曰南史云湛伏甲於室以俟上臨弔謀又泄竟弗之幸宋書無此事按湛若謀泄當即伏誅豈得尚延半歲今從宋書乙巳沮渠無諱復圍張掖不克退保臨松臨松郡臨松縣當是沮渠氏所置後宇文周廢入張掖復扶又翻下同但以詔諭之六月丁丑魏皇孫濬生大赦改元太平真君取寇謙之神書云輔佐北方太平真君故也寇謙之神書見一百十九卷營陽王景平元年太子劭詣京口拜京陵司徒義康竟陵王誕等並從從才用翻南兗州刺史江夏王義恭自江都會之夏戶雅翻秋七月己丑魏永昌王健擊破禿髮保周于番禾保周走遣安南將軍尉眷追之番音盤尉紆勿翻丙申魏太后竇氏殂壬子皇后袁氏殂太子劭弒逆之心萌於此矣癸丑禿髮保周窮迫自殺八月甲申沮渠無諱使其中尉梁偉詣魏永昌王健請降降戶江翻歸酒泉郡及所虜將士元潔等魏主使尉眷留鎮涼州九月壬子葬元皇后上以司徒彭城王義康嫌隙已著將成禍亂冬十月戊申收劉湛付廷尉下詔暴其罪惡就獄誅之並誅其子黯亮儼及其黨劉斌劉敬文孔胤秀等八人徙尚書庫部郎何默子等五人於廣州曹魏置尚書二十三郎庫部其一也是日敕義康入宿留止中書省其夕分收湛等青州刺史杜驥勒兵殿內以備非常遣人宣旨告義康以湛等罪狀義康上表遜位詔以義康為江州刺史侍中大將軍如故出鎮豫章初殷景仁臥疾五年景仁臥疾始上卷十二年而密函去來日以十數朝政大小必以咨之朝直遙翻影迹周密莫有窺其際者收湛之日景仁使拂拭衣冠左右皆不曉其意其夜上出華林園延賢堂召景仁景仁猶稱腳疾以小牀輿就坐誅討處分一以委之坐徂臥翻處昌呂翻分扶問翻初檀道濟薦吳興沈慶之忠謹曉兵上使領隊防東掖門劉湛為領軍嘗謂之曰卿在省歲久比當相論省謂領軍省比毗寐翻謂當為之論敘也下官在省十年自應得轉不復以此仰纍復扶又翻下同纍力瑞翻收湛之夕上開門召慶之慶之戎服縛袴而入上曰卿何意乃爾急裝慶之曰夜半喚隊主江南軍制呼長帥為隊主軍主隊主者主一隊之稱軍主者主一軍之稱史言沈慶之有識略殺之驍騎將軍徐湛之逵之之子也徐逵之武帝愛壻死於司馬楚之魯宗之之難驍堅堯翻騎奇寄翻上深銜之義康敗湛之被收罪當死其母會稽公主於兄弟為長嫡被皮義翻會工外翻長知兩翻素為上所禮家事大小必咨而後行高祖微時嘗自於新洲伐荻有納布衫襖納與衲同既貴以付公主曰後世有驕奢不節可以此衣示之至是公主入宮見上號哭不復施臣妾之禮以錦囊盛納衣擲地號戶高翻盛時征翻曰汝家本貧賤此是我母為汝父所作為于偽翻下右為嘗為同今日得一飽餐遽欲殺我兒邪上乃赦之吏部尚書王球履之叔父也以簡淡有美名為上所重履性進利言履務進而好利也球屢戒之不從誅湛之夕履徒跣告球跣先典翻球命左右為取履先溫酒與之謂曰常日語汝云何語牛倨翻履怖懼不得答怖普布翻球徐曰阿父在汝亦何憂江南人士呼叔父伯父為阿父亦為伯父叔父者以自呼阿烏葛翻履得免死廢於家據南史帝初為宜都王以球為友簡淡見重蓋素知之也義康方用事人爭求親昵昵尼質翻唯司徒主簿江湛早能自疏求出為武陵內史檀道濟嘗為其子求婚於湛湛固辭道濟因義康以請之湛拒之愈堅故不染於二公之難難乃旦翻上聞而嘉之湛夷之子也江夷嚮用於元嘉之初彭城王義康停省十餘日見上奉辭便下渚上惟對之慟哭餘無所言上遣沙門慧琳視之義康曰弟子有還理不不讀曰否慧琳曰恨公不讀數百卷書初吳興太守謝述裕之弟也謝裕見一百十五卷晉安帝義熙五年數有規益早卒義康鎮江陵述為驃騎長史南郡太守義康入相又為司徒左長史數所角翻將自建康南徙豫章昔謝述惟勸吾退劉班惟勸吾進今班存而述死其敗也宜哉上亦曰謝述若存義康必不至此以征虜司馬蕭斌為義康咨議參軍領豫章太守事無大小皆以委之斌摹之之子也蕭摹之見上卷十二年驤思將翻之將即亮翻義康左右愛念者並聽隨從從才用翻資奉優厚信賜相係朝廷大事皆報示之久之上就會稽公主宴集甚歡主起再拜叩頭悲不自勝勝音升上不曉其意自起扶之主曰車子歲暮必不為陛下所容今特請其命義康小字車子上亦流涕指蔣山曰必無此慮若違今誓便是負初寧陵高祖葬初寧陵在蔣山並書曰會稽姊飲宴憶弟所餘酒今封送故終主之身義康得無恙恙余亮翻臣光曰文帝之於義康友愛之情其始非不隆也終於失兄弟之歡虧君臣之義迹其亂階正由劉湛權利之心無有厭已厭於鹽翻詩云貪人敗類芮良夫桑柔之詩敗補邁翻徵南兗州刺史江夏王義恭為司徒録尚書事戊寅以臨川王義慶為南兗州刺史殷景仁為揚州刺史僕射吏部尚書如故義恭懲彭城之敗雖為總録奉行文書而已上乃安之彭城義康也他物稱此相息亮翻稱尺證翻而義恭性奢用常不足上又別給錢年至千萬十一月丁亥魏主如山北殷景仁既拜揚州羸疾遂篤羸倫為翻上為之敕西州道上不得有車聲為于偽翻揚州治所在建康臺城西故謂之西州宋白曰秣陵縣秦屬鄣郡丹楊圖云自句容以西屬鄣郡以東屬會稽郡武帝元封二年改鄣郡為丹楊郡置揚州刺史理秣陵西州橋冶城之間是其理處劉繇為揚州刺史始移理曲阿孫策號此為西州癸丑卒卒子恤翻十二月癸亥以光祿大夫王球為僕射戊辰以始興王濬為揚州刺史時濬尚幼州事悉委後軍長史范曄主簿沈璞曄泰之子璞林子之子也范泰為高祖所賞愛林子從高祖為將有功以吏部郎沈演之為右衛將軍對掌禁旅又以庾炳之為吏部郎俱參機密演之徑之曾孫也沈徑守死於洛陽以雪父充為逆之罪曄有雋才而薄情淺行數犯名教為士流所鄙行下孟翻數所角翻性躁競自謂才用不盡常怏怏不得志為後范曄謀亂張本范曄志趨異常趨與趣同七著翻請出為廣州刺史若在內釁成不得不加鈇鉞鈇鉞亟行釁許覲翻亟區記翻非國家之美也帝曰始誅劉湛復遷范曄復扶又翻下復稱同人將謂卿等不能容才朕信受讒言但共知其如此無能為害也是歲魏寧南將軍王慧龍卒呂玄伯留守其墓終身不去慧龍不殺玄伯見上卷八年魏主欲以伊馛為尚書封郡公馛辭曰尚書務殷公爵至重非臣年少愚近所宜膺受馛蒲撥翻少詩照翻帝問其所欲對曰中祕二省多諸文士中祕謂中書省祕書省也請參其次帝善之以為中護軍將軍祕書監大秦王楊難當復稱武都王十三年難當自稱大秦王十八年辛巳四四一春正月癸卯魏以沮渠無諱為征西大將軍涼州牧酒泉王彭城王義康至豫章辭刺史辭江州刺史也甲辰以義康都督江交廣三州諸軍事前龍驤參軍巴東扶令育詣闕上表驤思將翻扶姓也稱昔袁盎諫漢文帝曰淮南王若道路遇霜露死陛下有殺弟之名文帝不用追悔無及見十四卷文帝六年先朝之愛子朝直遙翻陛下之次弟若有迷謬之愆正可數之以善惡數所具翻導之以義方奈何信疑似之嫌一旦黜削遠送南垂草萊黔首皆為陛下痛之為于偽翻下竊為同廬陵往事足為龜鑑見百二十卷元年奄忽于南臣雖微賤竊為陛下羞之陛下徒知惡枝之宜伐豈知伐枝之傷樹伏願亟召義康返于京甸兄弟協和君臣輯睦則四海之望塞多言之路絶矣塞悉則翻何必司徒公揚州牧然後可以置彭城王哉若臣所言於國為非請伏重誅以謝陛下表奏即收付建康獄賜死裴子野論曰夫在上為善若雲行雨施施式智翻萬物受其賜及其惡也若天裂地震萬物所驚駭其誰弗知其誰弗見豈戮一人之身鉗一夫之口所能攘逃所能弭滅哉是皆不勝其忿怒而有增於疾疹也勝音升疹丑刃翻以太祖之含弘尚掩耳於彭城之戮自斯以後誰易由言鄭玄曰由用也易以豉翻罕聞直諒豈骨鯁之氣俗愧前古抑時王刑政使之然乎張約隕於權臣事見百二十卷元年宋之鼎鑊吁可畏哉魏新興王俊荒淫不法三月庚戌降爵為公俊母先得罪死俊積怨望有逆謀事覺賜死辛亥魏賜郁久閭乞列歸爵為朔方王沮渠萬年為張掖王十六年魏擒乞列歸沮渠萬年亦以是年以姑臧降魏夏四月沮渠唐兒叛沮渠無諱無諱留從弟天周守酒泉從才用翻與弟宜得引兵擊唐兒唐兒敗死魏以無諱終為邊患庚辰遣鎮南將軍奚眷擊酒泉秋八月辛亥魏遣散騎侍郎張偉來聘九月戊戌魏永昌王健卒冬十一月戊子王球卒己亥以丹楊尹孟顗為尚書僕射顗魚豈翻酒泉城中食盡萬餘口皆餓死沮渠天周殺妻以食戰士食祥吏翻庚子魏奚眷拔酒泉獲天周送平城殺之沮渠無諱乏食且畏魏兵之盛乃謀西度流沙遣其弟安周西擊鄯善鄯善王欲降鄯上扇翻降戶江翻會魏使者至勸令拒守安周不能克退保東城鄯善國之東城也氐王楊難當傾國入寇謀據蜀土遣其建忠將軍苻沖出東洛以禦梁州兵五代志義城郡景谷縣舊白水縣也後周省東洛郡入焉余據白水縣漢屬廣漢晉屬梓潼時屬晉壽則東洛在晉壽界也真道懷敬之子也劉懷敬見一百一十一卷晉安帝隆安三年獲晉壽太守申坦遂圍涪城涪音浮巴西梓潼二郡太守劉道錫嬰城固守難當攻之十餘日不克乃還道錫道産之弟也十二月癸亥詔龍驤將軍裴方明等帥甲士三千人又發荊雍二州兵以討難當皆受劉真道節度裴方明益州之良將也程道養趙廣之亂屢有戰功故用之為明年平仇池張本驤思將翻帥讀曰率雍於用翻考異曰氐胡傳作十九年正月遣方明等今從帝紀晉寧太守爨松子反寧州刺史徐循討平之晉惠帝永安二年分建寧西七縣為益州郡至懷帝更名晉寧郡天門蠻田向求等反破漊中沈約曰漊中縣二漢無晉太康地志有疑是吳立屬天門郡漊郎侯翻魏寇謙之言於魏主曰今陛下以真君御世建靜輪天宮之法開古以來未之有也應登受符書以彰聖德帝從之聶崇岐標點王崇武覆校
