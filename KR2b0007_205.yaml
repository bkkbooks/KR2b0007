body:
  text: 資治通鑑卷第二百五端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註唐紀二十一則天順聖皇后中之上長壽元年長壽元年壬辰六九二是年四月改元如意九月改元長壽自四月以前猶是天授三年長壽元年正月戊辰朔太后享萬象神宮長壽元年臘月立故于闐王尉遲伏闍雄之子瑕為于闐王闐徒賢翻尉紆勿翻闍視遮翻長壽元年春一月丁卯太后引見存撫使所舉人遣存撫使見上卷天授元年見賢遍翻使疏吏翻悉加擢用高者試鳳閣舍人給事中次試員外郎侍御史補闕拾遺校書郎唐校書郎正九品上考異曰統紀天授二年二月十道舉人石艾縣令王山齡等六十人擢為拾遺補闕懷州錄事參軍霍獻可等二十四人為御史幷州錄事參軍徐昕等二十四人為著作佐郎及評事內黃尉崔宣道等二十二人為衞佐疑與此只是一事時人為之語曰補闕連車載拾遺平斗量容齋隨筆以為此語出於張鷟欋其俱翻釋名曰齊魯謂四齒杷為欋推吐雷翻盌脫校書郎盌烏管翻坡詩但信櫝藏終自售豈知盌脫本無模有舉人沈全交續之曰麥胡心存撫使眯目聖神皇麥胡戶吳翻麥丏粘也眯莫禮翻物入目中也老子曰播糠眯目劾其誹謗朝政請杖之朝堂然後付法劾戶概翻又戶得翻誹敷尾翻朝直遙翻太后笑曰但使卿輩不濫何恤人言宜釋其罪先知大慚太后雖濫以祿位收天下人心然不稱職者尋亦黜之或加刑誅挾刑賞之柄以駕御天下政由己出明察善斷故當時英賢亦競為之用稱尺證翻斷丁亂翻長壽元年寧陵丞廬江郭霸以諂諛干太后寧陵縣屬宋州本戰國時魏之甯城漢高祖改為寧陵縣廬江漢龍舒縣地屬廬江郡梁置湖州隋廢州為廬江縣屬廬州考異曰新傳名弘霸舊傳御史臺記皆單名霸唯統紀延載元年云弘霸僉載云應革命舉蓋正謂此時也今從臺記監古銜翻中丞魏元忠病霸往問之因嘗其糞喜曰大夫糞甘則可憂中丞而呼為大夫過呼之也無傷也元忠大惡之惡烏路翻遇人輒告之長壽元年戊辰以夏官尚書楊執柔同平章事執柔恭仁弟之孫也太后以外族用之太后母楊氏尚辰羊翻長壽元年初隋煬帝作東都見一百八十卷大業元年煬羊亮翻僅有短垣而已至是鳳閣侍郎李昭德始築之長壽元年左臺中丞來俊臣羅告同平章事任知古狄仁傑裴行本司禮章十二行本禮作農乙十一行本同孔本同退齋校同卿崔章十二行本崔作裴乙十一行本同下同宣禮前文昌左丞盧獻御史中丞魏元忠潞州刺史李嗣真謀反任音壬嗣祥吏翻考異曰舊來俊臣傳云地官尚書狄仁傑益州長史任令暉冬官尚書李遊道秋官尚書袁智弘司賓卿崔基文昌左丞盧獻等六人並為羅告李嶠傳云太后使給事中李嶠與大理少卿張德裕侍御史劉憲覆其獄德裕等雖知其枉懼罪並從俊臣所奏嶠曰豈有知其枉濫而不為申明哉孔子曰見義不為無勇也乃與德裕等列其枉狀由是忤旨出為潤州司馬按嶠平生行事恐不能如此今不取先是來俊臣奏請降敕一問即承反者得減死先悉薦翻及知古等下獄下遐嫁翻俊臣以此誘之誘音酉仁傑對曰大周革命萬物惟新唐室舊臣甘從誅戮反是實俊臣乃少寬之少詩沼翻下同判官王德壽謂仁傑曰判官俊臣之屬官也尚書定減死矣德壽業受驅策欲求少階級煩尚書引楊執柔可乎仁傑曰皇天后土遣狄仁傑為如此事以頭觸柱血流被面德壽懼而謝之被皮義翻侯思止鞫魏元忠元忠辭氣不屈思止怒命倒曳之元忠曰我薄命譬如墜驢足絓於鐙為所曳耳絓戶掛翻鐙都鄧翻思止愈怒更曳之元忠曰侯思止汝若須魏元忠頭則截取何必使承反也狄仁傑既承反有司待報行刑不復嚴備仁傑裂衾帛書冤狀置綿衣中謂王德壽曰天時方熱請授家人去其綿德壽許之仁傑子光遠得書持之告變得召見復扶又翻去羌呂翻見賢遍翻則天覽之以問俊臣對曰仁傑等下獄臣未嘗褫其巾帶褫池爾翻寢處甚安處昌呂翻苟無事實安肯承反太后使通事舍人周綝往視之俊臣暫假仁傑等巾帶羅立於西使綝視之綝不敢視惟東顧唯諾而已綝丑林翻唯于癸翻俊臣又詐為仁傑等謝死表使綝奏之樂思晦男未十歲沒入司農思晦死見上卷上年得召見上時掌翻見賢遍翻太后問狀對曰臣父已死臣家已破但惜陛下法為俊臣等所弄陛下不信臣言乞擇朝臣之忠清陛下素所信任者朝直遙翻為反狀以付俊臣無不承反矣太后意稍寤召見仁傑等問曰卿承反何也對曰不承則已死於拷掠矣陸德明經典釋文掠音亮太后曰何為作謝死表對曰無之出表示之乃知其詐於是出此七族庚午貶知古江夏令仁傑彭澤令宣禮夷陵令元忠涪陵令獻西鄉令江夏本漢沙羨縣地屬江夏郡晉改沙羨為沙陽江漢二水會于縣西春秋謂之夏汭晉宋謂之夏口宋置江夏郡治于此隋因郡名置江夏縣唐屬鄂州彭澤漢縣屬豫章隋更名龍城唐復曰彭澤屬江州涪陵縣漢屬巴郡劉蜀置涪陵郡隋涪陵縣屬渝州唐武德元年分置涪州為州治所西鄉即漢成固縣地蜀置西鄉縣後魏為洋州治所夏戶雅翻涪音浮俊臣與武承嗣等固請誅之太后不許俊臣乃獨稱行本罪尤重請誅之秋官郎中徐有功駮之駮北角翻以為明主有更生之恩更工衡翻俊臣不能將順虧損恩信殿中侍御史貴鄉霍獻可後魏分館陶西界置貴鄉縣於趙城周建德七年自趙城東南移三十里以孔思集寺為縣治所大象二年於縣置魏州言於太后曰陛下不殺崔宣禮臣請隕命於前以頭觸殿階血流霑地以示為人臣者不私其親太后皆不聽獻可常以綠帛裹其傷微露之於幞頭下續事始曰三代黔首以皁絹裹髮周武帝裁為四脚名以幞頭馬周請重繫前脚長壽元年甲戌補闕薛謙光上疏上時掌翻以為選舉之法宜得實才取捨之間風化所繫今之選人咸稱覓舉奔競相尚諠訴無慚選宣戀翻至於才應經邦惟令試策武能制敵止驗彎弧昔漢武帝見司馬相如賦恨不同時及置之朝廷終文園令漢司馬相如為子虛賦武帝讀而善之曰朕獨不得與此人同時楊得意曰臣邑人司馬相如自言為此賦上召以為郎後為孝文園令病免而卒知其不堪公卿之任故也吳起將戰左右進劍起曰將者提鼓揮桴臨敵決疑一劍之任非將事也將者非將即亮翻桴方無翻然則虛文豈足以佐時善射豈足以克敵要在文吏察其行能武吏觀其勇略考居官之臧否行下孟翻否音鄙行舉者賞罰而已長壽元年來俊臣求金於左衞大將軍泉獻誠不得誣以謀反下獄乙亥縊殺之下遐嫁翻縊於計翻長壽元年庚辰司刑卿檢校陝州刺史李游道為冬官尚書同平章事陝失冉翻長壽元年二月己亥吐蕃党項部落萬餘人內附吐從暾入聲党底朗翻長壽元年戊午以秋官尚書袁智弘同平章事秋官刑部長壽元年夏四月丙申赦天下改元如意如意元年起此長壽元年五月丙寅禁天下屠殺及捕魚蝦江淮旱饑民不得采魚蝦餓死者甚衆后禁屠捕而殺人如刈草菅可以人而不如物乎蝦戶加翻右拾遺張德生男三日私殺羊會同僚補闕杜肅懷一餤餤徒濫翻又弋廉翻徒甘翻上表告之上時掌翻明日太后對仗謂德曰聞卿生男甚喜德拜謝太后曰何從得肉德叩頭服罪太后曰朕禁屠宰吉凶不預然卿自今召客亦須擇人出肅表示之肅大慚舉朝欲唾其面朝直遙翻唾吐臥翻長壽元年吐蕃酋長曷蘇帥部落請內附以右玉鈴衞將軍張玄遇為安撫使將精卒二萬迎之六月軍至大渡水西曷蘇事洩為國人所擒別部酋長昝捶帥羌蠻八千餘人內附玄遇以其部落置萊川州而還酋慈由翻長知兩翻帥讀曰率鈐其廉翻使疏吏翻將即亮翻又音如字昝子感翻捶止蘂翻新書作插黎州都督府所管羈縻州有米川州新書作葉州還從宣翻又音如字考異曰唐紀作沓搖今從實錄長壽元年辛亥萬年主簿徐堅上疏以為書有五聽之道上時掌翻疏所據翻周禮小司寇以五聽聽獄訟求民情一曰辭聽觀其所出言不直則煩二曰色聽觀其顏色不直則赧然三曰氣聽不直則喘四曰耳聽觀其聽聆不直則惑五曰目聽觀其眸子不直則眊然令著三覆之奏見一百九十三卷太宗貞觀五年比毗至翻令使者得實即行斬決令力丁翻使疏吏翻人命至重死不再生萬一懷枉吞聲赤族豈不痛哉此不足肅姦逆而明典刑適所以長威福而生疑懼臣望絕此處分長知兩翻處昌呂翻下處事同分扶問翻依法覆奏又法官之任宜加簡擇有用法寬平為百姓所稱者願親而任之有處事深酷不允人望者願疏而退之堅齊耼之子也處昌呂翻徐齊耼見二百一卷高宗咸亨元年耼它甘翻長壽元年夏官侍郎李昭德密言於太后曰魏王承嗣權太重夏官兵部嗣祥吏翻吾姪也故委以腹心昭德曰姪之於姑其親何如子之於父子猶有篡弒其父者況姪乎今承嗣既陛下之姪為親王又為宰相相息亮翻權侔人主臣恐陛下不得久安天位也太后矍然曰朕未之思矍九縛翻秋七月戊寅以文昌左相同鳳閣鸞臺三品武承嗣為特進納言武攸寧為冬官尚書嗣祥吏翻冬官工部尚辰羊翻夏官尚書同平章事楊執柔為地官尚書並罷政事以秋官侍郎新鄭崔元綜為鸞臺侍郎秋官刑部新鄭春秋鄭國都鄭武公隨周平王東遷邑於虢鄶之間莊公所謂吾先君新邑于此是也漢為新鄭縣屬河南郡魏晉省隋開皇十六年復置屬鄭州檢校天官侍郎姚璹為文昌左丞夏官兵部鳳閣中書天官吏部改尚書為文昌璹殊玉翻與司賓卿崔神基地官戶部司賓卿即鴻臚卿考異曰舊昭德傳舉明經累遷至鳳閣侍郎長壽二年增置夏官侍郎以昭德為之是歲遷鳳閣鸞臺平章事新紀表傳皆云昭德自夏官侍郎遷鳳閣侍郎同平章事蓋昭德自鳳閣為夏官自夏官復為鳳閣也婁師德傳長壽元年增置夏官侍郎今從之崔神基實錄作崔基今從新紀表思廉之孫姚思廉事隋及唐敬玄之弟也李敬玄相高宗辛巳以營繕大匠王璿為夏官尚書同平章事光宅改將作監為營繕監璿似宣翻太后曰吾任昭德始得安眠此代吾勞汝勿言也是時酷吏恣橫橫下孟翻百官畏之側足昭德獨廷奏其姦太后好祥瑞好呼到翻有獻白石赤文者執政詰其異詰去吉翻對曰以其赤心昭德怒曰此石赤心他石盡反邪邪音耶左右皆笑襄州人胡慶以丹漆書龜腹曰天子萬萬年詣闕獻之昭德以刀刮盡奏請付法太后曰此心亦無惡命釋之太后習貓使與鸚鵡共處處昌呂翻出示百官傳觀未遍貓飢搏鸚鵡食之太后甚慚太后自垂拱以來任用酷吏先誅唐宗室貴戚數百人次及大臣數百家其刺史郎將以下不可勝數將即亮翻勝音升每除一官戶婢竊相謂曰戶婢官婢之直宮中門戶者鬼朴又來矣不旬月輒遭掩捕族誅監察御史朝邑嚴善思後魏分馮翊置澄城郡仍置南五泉縣西魏改為朝邑縣隋唐屬司州監古銜翻朝直遙翻時告密者不可勝數勝音升太后亦厭其煩命善思按問引虛伏罪者八百五十餘人羅織之黨為之不振為于偽翻乃相與搆陷善思坐流驩州舊志驩州至京師陸路一萬二千四百五十二里水路一萬七千里至東都一萬一千五百九十五里水路一萬六千二百二十里宋白曰驩州日南郡堯放驩兜于崇山即此尋復召為渾儀監丞后改司天監為渾儀監丞從七品下復扶又翻渾戶本翻以字行譔士免翻右補闕新鄭朱敬則以太后本任威刑以禁異議今既革命衆心已定宜省刑尚寬乃上疏以為李斯相秦用刻薄變詐以屠諸侯不知易之以寬和卒至土崩此不知變之禍也事見秦紀上時掌翻相息亮翻卒子恤翻陸賈叔孫通說之以禮義傳世十二此知變之善也說輸芮翻事見漢紀自文明草昧天地屯蒙草造也昧蒙也造物之始始於冥昧言后稱制之初改元文明造始之時也屯者物之始蒙者物之穉言后稱制之初猶天地生物之始屯涉倫翻四凶構難三叔指韓霍諸王四凶指徐敬業等難乃旦翻無以應天順人不切刑名不可摧姦息暴故置神器開告端謂鑄匭以開告密之門也包藏之心盡露神道助直無罪不除蒼生晏然紫宸易主然而急趨無善迹以步趨為諭也以琴瑟為諭也少詩沼翻乃當今之芻狗也芻狗祭祀所用既祭則棄之矣考時事之合宜審糟粕之可遺以酒為諭泲取其醇汁而去其糟粕莊子曰蘧廬可以一宿而不可以久處郭象註云蘧廬傳舍也詩云萋兮菲兮成是貝錦彼譖人者亦已太甚去羌呂翻窒羅織之源掃朋黨之迹使天下蒼生坦然大悅豈不樂哉樂音洛太后善之賜帛三百段侍御史周矩上疏曰推劾之吏皆相矜以虐泥耳籠頭枷研楔枷研以重枷研其頸楔以鐵圈其首而加楔楔先結翻乎角翻摺與拉同力答翻摧也折也膺胸也籤爪以竹籤其爪甲今鞫獄者十指下籤即其遺虐懸髮薰耳號曰獄持或累日節食連宵緩問晝夜搖撼使不得眠號曰宿囚此等既非木石且救目前苟求賒死賒遠也言伏法而死較死於獄中為稍賒也皆稱天下太平何苦須反豈被告者盡是英雄欲求帝王邪但不勝楚毒自誣耳被皮義翻勝音升願陛下察之今滿朝側息不安朝直遙翻皆以為陛下朝與之密夕與之讎不可保也周用仁而昌秦用刑而亡願陛下緩刑用仁天下幸甚太后頗采其言制獄稍衰考異曰御史臺記云書奏遂授洛州司功舊薛懷義傳云矩劾奏懷義遷矩天官員外郎竟為懷義所搆下獄免官御史臺記又云時天官選曹無緒敕矩監之侍郎李景謀為矩所制乃引為員外不閑於吏道自此左出矣據舊傳矩劾奏薛懷義在後若此年出為洛州司功則不當復劾懷義但舊傳矩疏在載初元年二月是時制獄未息今因朱敬則疏終言之長壽元年太后春秋雖高善自塗澤雖左右不覺其衰丙戌敕以齒落更生九月庚子御則天門赦天下改元至是方改元長壽自此以後方是長壽元年更工衡翻長壽元年制於幷州置北都長壽元年癸丑同平章事李遊道王璿袁智弘崔神基李元素春官侍郎孔思元益州長史任令輝皆為王弘義所陷流嶺南璿似宣翻長知兩翻任音壬長壽元年左羽林中郎將來子珣坐事流愛州尋卒愛州至京師八千八百里東都八千一百里將即亮翻卒子恤翻長壽元年初新豐王孝傑從劉審禮擊吐蕃為副總管與審禮皆沒於吐蕃新豐縣屬雍州後改昭應縣劉審禮沒見二百二卷高宗儀鳳三年吐從暾入聲貌類吾父厚禮之後竟得歸累遷右鷹揚衞將軍光宅改左右武衞為左右鷹揚衞知其虛實會西州都督唐休璟請復取龜茲于闐疏勒碎葉四鎮復扶又翻又音如字龜茲音丘慈又音屈佳闐徒賢翻又徒見翻棄四鎮見二百一卷高宗咸亨元年敕以孝傑為武威軍總管與武衞大將軍阿史那忠節將兵擊吐蕃此時既改武衞為鷹揚衞不應復以舊官名命忠節豈史家仍襲舊官名而書之邪將又音如字十月丙戌大破吐蕃復取四鎮置安西都護府於龜茲發兵戍之二年長壽二年正月壬辰朔太后享萬象神宮以魏王承嗣為亞獻梁王三思為終獻太后自制神宮樂用舞者九百人長壽二年戶婢團兒為太后所寵信有憾於皇嗣乃譖皇嗣劉氏德竇氏為厭呪厭於協翻又於琰翻癸巳與德朝太后於嘉豫殿朝直遙翻既退同時殺之考異曰新本紀臘月癸亥殺皇嗣劉氏德竇氏舊傳云正月二日今從之今按德竇氏即玄宗母也莫知所在瘞於計翻德抗之曾孫也竇抗太穆皇后之從兄不敢言忤五故翻居太后前容止自如團兒復欲害皇嗣有言其情於太后者太后乃殺團兒復扶又翻考異曰劉子玄太上皇實錄云韋團兒諂佞多端天后尤所信任欲私於上而拒焉怨望遂作桐人潛埋於二院內譖殺之又矯制按問上今從則天實錄是時告密者皆誘人奴婢告其主以求功賞德父孝諶為潤州刺史有奴妄為妖異以恐德母龐氏誘音酉諶氏壬翻妖於喬翻龐皮江翻龐氏懼奴請夜祠禱解因發其事下監察御史龍門薛季昶按之監古銜翻下遐嫁翻季昶誣奏以為與德同祝詛先涕泣不自勝祝職救翻勝音升乃言曰龐氏所為臣子所不忍道太后擢季昶為給事中龐氏當斬其子希瑊瑊古咸翻詣侍御史徐有功訟冤有功牒所司停刑上奏論之以為無罪季昶奏有功阿黨惡逆請付法法司處有功罪當絞令史以白有功侍御史之屬有令史十七人上時掌翻處昌呂翻豈我獨死諸人永不死邪既食掩扇而寢人以為有功苟自強必內憂懼密伺之方熟寢伺相吏翻太后召有功迎謂曰卿比按獄失出何多對曰失出人臣之小過好生聖人之大德誤出人罪謂之失出比毗至翻好呼到翻由是龐氏得減死與其三子皆流嶺南孝諶貶羅州司馬有功亦除名考異曰舊有功傳有功為御史坐龐氏除名尋起為左司郎中竇孝諶傳長壽二年龐氏為酷吏所陷御史臺記有功自秋官員外郎坐龐氏除名為流人月餘授御史按實錄有功天授初累補司刑丞秋官員外郎稍遷郎中後以公事免萬歲通天元年擢拜殿中侍御史今從之長壽二年戊申姚璹奏請令宰相撰時政記會要璹以為帝王謨訓不可闕於紀述史官疏遠無因得書請自今以後所論軍國政要宰臣一人撰錄號為時政記從之時政記自此始長壽二年臘月丁卯降皇孫成器為壽春王恆王成義為衡陽王恆戶登翻楚王隆基為臨淄王衞王隆範為巴陵王趙王隆業為彭城王皆睿宗之子也長壽二年春一月庚子以夏官侍郎婁師德同平章事師德寬厚清慎犯而不校與李昭德俱入朝朝直遙翻師德體肥行緩昭德屢待之不至怒罵曰田舍夫師德徐笑曰師德不為田舍夫誰當為之其弟除代州刺史將行師德謂曰吾備位宰相汝復為州牧復扶又翻榮寵過盛人所疾也將何以自免弟長跪曰自今雖有人唾某面某拭之而已庶不為兄憂師德愀然曰愀七小翻此所以為吾憂也人唾汝面怒汝也汝拭之乃逆其意所以重其怒夫唾不拭自乾乾音干當笑而受之長壽二年甲寅前尚方監裴匪躬內常侍范雲仙坐私謁皇嗣腰斬於市光宅改少府監為尚方監內侍省有內常侍六人正五品下漢中常侍之職也考異曰舊來俊臣傳云按張虔勗范雲仙於洛陽牧院虔勗等不堪其苦自訟於徐有功俊臣命衞士以亂刀殺之雲仙亦言歷事先朝稱所司冤苦俊臣命截去其舌士庶膽破無敢言者按張虔勗天授二年被殺雲仙此年坐謁皇嗣斬今從實錄又有告皇嗣潛有異謀者太后命來俊臣鞫其左右左右不勝楚毒皆欲自誣勝音升太常工人京兆安金藏時公卿不得見皇嗣唯金藏等工人得在左右公既不信金藏之言請剖心以明皇嗣不反即引佩刀自剖其胸五藏皆出流血被地太后聞之令轝入宮中呼火故翻藏徂浪翻被皮義翻轝羊茹翻使醫內五藏以桑皮線縫之傅以藥經宿始蘇太后親臨視之歎曰吾有子不能自明使汝至此即命俊臣停推停其獄不復推鞫也長壽二年罷舉人習老子更習太后所造臣軌更工衡翻習老子見二百二卷高宗上元元年長壽二年二月丙子新羅王政明卒遣使立其子理洪為王卒子恤翻使疏吏翻長壽二年乙亥禁人間錦侍御史侯思止私畜錦李昭德按之杖殺於朝堂朝直遙翻長壽二年或告嶺南流人謀反太后遣司刑評事萬國俊攝監察御史就按之監古銜翻國俊至廣州悉召流人矯制賜自盡流人號呼不服號戶高翻國俊驅就水曲盡斬之一朝殺三百餘人然後詐為反狀還奏因言諸道流人亦必有怨望謀反者不可不早誅太后喜擢國俊為朝散大夫行侍御史朝直遙翻散悉亶翻更遣右翊衞兵曹參軍劉光業按武德四年已改左右翊衞為左右衞疑翊字衍兵曹參軍掌五府武官宿衞番第受其名數而大將軍配焉唐京都苑各有四面監監各一人從六品下副監一人從七品下丞一人正八品下各掌所管面苑內宮館園池與其種植修葺之事丞則掌判監事長知兩翻右武威衞兵曹參軍屈貞筠皆攝監察御史詣諸道按流人光業等以國俊多殺蒙賞爭效之光業殺七百人德壽殺五百人自餘少者不減百人其遠年雜犯流人亦與之俱斃太后頗知其濫制六道流人未死者幷家屬皆聽還鄉里國俊等亦相繼死或得罪流竄考異曰實錄曰光業等亦受鸞臺侍郎傅遊藝之旨按天授二年遊藝已死舊遊藝傳曰遊藝請則天發六道使雖身死之後竟從其謀武后本遣萬國俊一使國俊還言諸道流人亦反故更遣五使耳遊藝豈豫知遣六道使此所謂天下之惡皆歸焉者也潘遠紀聞曰補闕李秦授寓直中書進封事曰陛下自登極誅斥李氏及諸大臣其家人親族流放在外以臣所料且數萬人如一旦同心招集為逆出陛下不意臣恐社稷必危讖曰代武者劉夫劉者流也陛下不殺此輩臣恐為禍深焉天后納之夜中召入謂曰卿名秦授天以卿授朕也何啟予心即拜考功員外郎仍知制誥賜朱紱女妓十人金帛稱是與謀發敕使十人於十道安慰流者其實賜墨敕與牧守有流放者殺之天后度流人已死又使使者安撫流人曰吾前發十道使安慰流人何使者不曉吾意亶加殺害深為酷暴其輒殺流人使並所在鎖項將至害流人處斬之以快亡魂諸流人未死或他事繫者兼家口放還按當時止誅嶺南一道因萬國俊言更發五道使非併發十道使也十道在近地者何嘗有流人也國俊既以多殺受賞餘使或病死或自以他罪流竄必無幷斬之理今並從實錄及舊傳長壽二年來俊臣誣冬官尚書蘇幹云在魏州與琅邪王沖通謀沖舉兵見上卷垂拱四年四月乙未殺之長壽二年五月癸丑棣州河溢章十二行本溢下有流二千餘家五字乙十一行本同孔本同張校同退齋校同棣州後漢樂安郡中廢唐武德四年分滄州之厭次陽信滴河樂陵置棣州長壽二年秋九月丁亥朔日有食之長壽二年魏王承嗣等五千人表請加尊號曰金輪聖神皇帝乙未太后御萬象神宮受尊號赦天下作金輪等七寶七寶曰金輪寶曰白象寶曰女寶曰馬寶曰珠寶曰主兵臣寶曰主藏臣寶陳之殿庭朝直遙翻庚子追尊昭安皇帝曰渾元昭安皇帝渾戶本翻文穆皇帝曰立極文穆皇帝孝明高皇帝曰無上孝明高皇帝皇后從帝號后又追尊其三世長壽二年辛丑以文昌左丞同平章事姚璹為司賓卿罷政事以司賓卿萬年豆盧欽望為內史新書宰相世系表豆盧氏本姓慕容氏北地王精降後魏北人謂歸義為豆盧因以為氏秋官侍郎吳人陸元方為鸞臺侍郎同平章事巨源孝寬之玄孫也韋孝寬事宇文氏為名將延載元年甲午六九四是年五月改元長壽二年正月丙戌太后享萬象神宮長壽二年突厥可汗骨篤祿卒其子幼弟默啜自立為可汗臘月甲戌默啜寇靈州長壽二年室韋反北史曰室韋蓋契丹之類其南者為契丹在北者為室韋新書室韋契丹別種東胡之北邊蓋丁零苗裔也地據黃龍北傍峱越河直京師東北七千里東黑水靺鞨西突厥南契丹北瀕海其國無君長惟大酋皆號莫賀咄管攝其部而附于突厥長壽二年春一月以婁師德為河源等軍檢校營田大使使疏吏翻下同長壽二年二月武威道總管王孝傑破吐蕃㪍論贊刃嚴刃改興突厥可汗俀子等於冷泉及大嶺俀子西突厥部所立也俀吐猥翻弱也大嶺谷名碎葉鎮守使韓思忠破泥熟俟斤等萬餘人俟渠之翻考異曰此事諸書皆無唯統紀有之統紀又云又破吐蕃萬泥勳沒馱城語不可曉今刪去長壽二年庚午以僧懷義為代北道行軍大總管考異曰實錄新紀皆云伐逆道今從舊懷義傳長壽二年三月甲申以鳳閣舍人蘇味道為鳳閣侍郎同平章事李昭德檢校內史更以僧懷義為朔方道行軍大總管以李昭德為長史蘇味道為司馬帥契苾明曹仁師沙吒忠義等十八將軍以討默啜帥讀曰率下同契欺訖翻苾毗必翻吒陟加翻未行虜退而止昭德嘗與懷義議事失其旨懷義撻之昭德惶懼請罪長壽二年夏四月壬戌以夏官尚書武威道大總管王孝傑同鳳閣鸞臺三品長壽二年五月魏王承嗣等二萬六千餘人上尊號曰越古金輪聖神皇帝上時掌翻甲午御則天門樓受尊號赦天下改元長壽二年天授中遣監察御史壽春裴懷古安集西南蠻六月癸丑永昌蠻酋薰期帥部落二十餘萬戶內附姚州境有永昌蠻居永昌郡地薰期新書作董期監古銜翻酋慈由翻長壽二年河內有老尼居神都麟趾寺與嵩山人韋什方等以妖妄惑衆尼女夷翻妖於喬翻尼自號淨光如來云能知未然什方自云吳赤烏年章十二行本年上有元字乙十一行本同孔本同張校同生又有老胡亦自言五百歲云見薛師已二百年矣僧懷義本馮小寶也太后使與薛紹通昭穆故老胡謂之薛師少詩照翻太后甚信重之賜什方姓武氏秋七月癸未以什方為正諫大夫同平章事制云邁軒代之廣成莊子曰廣成子居崆峒之上黃帝立於下風而問道廣成子曰吾脩身千二百歲矣吾形未嘗衰黃帝名軒轅因曰軒代葛洪曰河上公者莫知其姓名也漢文帝時結草為庵于河之濱文帝從之問老子河上公曰余註是經以來千七百餘年朝直遙翻什方乞還山制罷遣之長壽二年戊辰以王孝傑為瀚海道行軍總管仍受朔方道行軍大總管薛懷義節度長壽二年己巳以司賓少卿姚璹為納言左肅政中丞原武楊再思為鸞臺侍郎洛州司馬杜景儉為鳳閣侍郎並同平章事豆盧欽望請京官九品已上輸兩月俸以贍軍唐制一品月俸八千食料一千八百雜用一千二百二品月俸六千五百食料一千五百雜用一千三品月俸五千一百食料一千一百雜用九百四品月俸三千五百食料七百雜用七百五品月俸三千食料雜用六百六品月俸二千食料雜用四百七品月俸一千七百五十食料雜用三百五十八品月俸一千三百食料三百雜用二百五十九品月俸一千五十食料二百五十雜用二百行署月俸一百四十食料三十俸扶用翻贍昌豔翻令拜表轉帖者止書一帖使吏以轉示百官不知何事拾遺王求禮謂欽望曰明公祿厚輸之無傷卑官貧迫柰何不使其知而欺奪之乎欽望正色拒之既上表上時掌翻求禮進言曰陛下富有四海軍國有儲何藉貧官九品之俸而欺奪之姚璹曰求禮不識大體求禮曰如姚璹為識大體者邪事遂寢長壽二年戊寅鸞臺侍郎同平章事崔元綜坐事流振州長壽二年武三思帥四夷酋長請鑄銅鐵為天樞立於端門之外端門洛陽皇城正南門黜唐頌周以姚璹為督作使使疏吏翻諸胡聚錢百萬億買銅鐵不能足賦民間農器以足之長壽二年九月壬午朔日有食之長壽二年殿中丞來俊臣坐贓貶同州參軍王弘義流瓊州曹魏初置殿中監隋煬帝置少監及丞舊志瓊州至兩京與崖州道里相類考異曰統紀云萬歲通天元年五月監察御史紀履忠劾奏御史中丞來俊臣犯狀有五請下獄理罪御史臺記履忠與來俊臣不協具衣冠而彈之不果黜授顏城尉俊臣誅授右領軍衞冑曹新傳云俊臣納賈人金為御史紀履忠所劾下獄當死后忠其上變得不誅免為民按舊傳云俊臣為履忠所告下獄長壽二年除殿中丞又坐贓出為同州參軍萬歲通天元年召為合宮尉統紀云萬歲通天元年紀履忠劾奏誤也王弘義傳云延載元年俊臣貶弘義亦流瓊州是俊臣長壽二年已前坐贓下獄此年又坐贓貶今從舊傳至漢北侍御史胡元禮遇之按驗得其姦狀杖殺之內史李昭德恃太后委遇頗專權使氣人多疾之前魯王府功曹參軍丘愔上疏攻之唐諸王府功曹參軍事正七品上掌文官簿書考課陳設愔於今翻上時掌翻下長上同疏所據翻陛下天授以前萬機獨斷斷丁亂翻自長壽以來委任昭德參奉機密獻可替否事有便利不預諮謀要待畫日將行凡制敕皆進畫日而後行駁北角翻揚露專亶顯示於人歸美引愆義不如此善則稱君過則稱己人臣之義也臣觀其膽乃大於身鼻息所衝上拂雲漢又曰蟻穴壞隄針芒寫氣權重一去收之極難長上果毅鄧注唐六典長上折衝果毅應宿衞者並一日上兩日下述昭德專權之狀鳳閣舍人逄弘敏取奏之逄皮江翻太后由是惡昭德壬寅貶昭德為南賓尉惡烏路翻南賓縣屬欽州本漢合浦縣地隋開皇十八年置南賓縣尋又免死流竄長壽二年太后出黎花一枝以示宰相宰相皆以為瑞杜景儉獨曰今草木黃落而此更發榮陰陽不時咎在臣等因拜謝太后曰卿真宰相也相悉亮翻長壽二年冬十月壬申以文昌右丞李元素為鳳閣侍郎左肅政中丞周允元檢校鳳閣侍郎並同平章事校古効翻豫州人也長壽二年嶺南獠反以容州都督張玄遇為桂永等州經略大使以討之容州漢合浦縣地隋為合浦郡之北流縣唐武德四年分置銅州貞觀元年改容州因容山為名獠魯皓翻使疏吏翻天冊萬歲元年乙未六九五是年九月改元天冊萬歲長壽二年正月辛巳朔太后加號慈氏越古金輪聖神皇帝赦天下改元證聖長壽二年周允元與司刑少卿皇甫文備奏內史豆盧欽望同平章事韋巨源杜景儉蘇味道陸元方附會李昭德不能匡正欽望貶趙州舊志趙州至京師東北一千八百四十二里東都一千三十三里考異曰舊紀傳新紀表傳皆作鄜州統紀作瀛州實錄唐曆作麟州今從之貞觀五年置麟州以處生羌屬松州都督府十六年開山洞置溱州屬黔州都督府舊志溱州至京師三千四百八十里東都四千二百里溱側詵翻元方貶綏州刺史舊志集州京師西南一千四百二十五里至東都二千六百里綏州京師東北一千里至東都一千八百一十九里長壽二年初明堂既成太后命僧懷義作夾紵大像紵直呂翻檾屬今人謂之紵麻夾紵者以紵布夾縫為大像後所謂麻主是也其小指中猶容數十人於明堂北構天堂以貯之貯丁呂翻堂始構為風所摧更構之日役萬人采木江嶺數年之間所費以萬億計府藏為之耗竭藏徂浪翻為于偽翻懷義用財如糞土太后一聽之無所問每作無遮會用錢萬緡士女雲集又散錢十車使之爭拾相蹈踐有死者踐息淺翻所在公私田宅多為僧有懷義頗厭入宮多居白馬寺所度力士為僧者滿千人侍御史周矩疑有姦謀固請按之太后曰卿姑退朕即令往矩至臺懷義亦至乘馬就階而下坦腹於牀矩召吏將按之遽躍馬而去矩具奏其狀太后曰此道人病風不足詰所度僧惟卿所處詰去吉翻處昌呂翻悉流遠州遷矩天官員外郎乙未作無遮會於明章十二行本明作朝乙十一行本同堂鑿地為阬深五丈深式浸翻結綵為宮殿佛像皆於阬中引出之云自地涌出又殺牛取血畫大像首高二百尺云懷義刺膝血為之高居傲翻刺七亦翻丙申張像於天津橋南設齋時御醫沈南璆唐六典尚藥局屬殿中省有侍御醫四人從六品上璆音求懷義心慍慍於問翻是夕密燒天堂延及明堂火照城中如晝比明皆盡比必利翻暴風裂血像為數百段太后恥而諱之但云內作工徒誤燒麻主遂涉明堂時方酺宴左拾遺劉承慶請輟朝停酺以答天譴酺音蒲朝直遙翻太后將從之姚璹曰昔成周宣榭卜代愈隆漢武建章盛德彌永左傳宣十五年夏成周宣榭火班書曰榭所以藏樂器宣其名也漢武時柏梁臺災乃大營建章姚璹引二事傅以己說以逢君之惡非宗廟也不應自貶損太后乃御端門觀酺如平日命更造明堂天堂仍以懷義充使使疏吏翻又鑄銅為九州鼎神都鼎曰豫州高一丈八尺受千八百石冀州鼎曰武興雍州鼎曰長安兗州鼎曰日觀青州鼎曰少陽徐州鼎曰車源揚州鼎曰江都荊州鼎曰江陵梁州鼎曰咸都八州鼎高一丈四尺各受千二百石考異曰舊傳云懷義帥人作號頭安置之按天冊萬歲元年二月懷義死神功元年九鼎始成舊傳誤也或懷義死時方鑄耳十二神子屬鼠丑屬牛寅屬虎卯屬兔辰屬龍巳屬蛇午屬馬未屬羊申屬猴酉屬雞戌屬狗亥屬豬高古犒翻各置其方先是河內老尼晝食一麻一米夜則烹宰宴樂畜弟子百餘人淫穢靡所不為武什方自言能合長年藥先悉薦翻樂音洛畜吁玉翻合音閤太后遣乘驛於嶺南采藥及明堂火尼入唁太后唁魚變翻太后怒叱之曰汝常言能前知何以不言明堂火因斥還河內弟子及老胡等皆逃散又有發其姦者太后乃復召尼還麟趾寺弟子畢集敕給使掩捕盡獲之復扶又翻唐六典北齊內職有散給使五十人唐因之置內給使無常員屬宮闈局凡宦人無官品者稱內給使又有小給使學生五十人皆沒為官婢什方還至偃師偃師縣屬河南府在洛城東六十里自絞死庚子以明堂火告廟下制求直言劉承慶上疏以為火發既從麻主後及總章所營佛舍恐勞無益請罷之又明堂所以統和天人統他綜翻一旦焚毀臣下何心猶為酺宴憂喜相爭傷於情性又陛下垂制博訪許陳至理而左史張鼎以為今既火流王屋彌顯大周之祥武王伐紂既渡河有火至于王屋流為烏馬融曰王屋王所居屋彌勒成道時有天魔燒宮七寶臺須臾散壞魔莫婆翻考異曰僉載以七寶臺散壞為姚璹之語今從實錄斯實諂妄之邪言非君臣之正論伏願陛下乾乾翼翼易曰君子終日乾乾夕惕若詩曰小心翼翼則兆人蒙賴福祿無窮獲嘉主簿彭城劉知幾獲嘉縣本汲縣之新中鄉漢武帝南幸過此聞獲呂嘉因置獲嘉縣屬河內郡後周置脩武郡隋置殷州尋廢州為獲嘉縣唐屬懷州彭城縣帶徐州幾居希翻以為皇業權輿爾雅權輿始也嗣君即位黎元更始更工衡翻時則藉非常之慶以申再造之恩今六合清晏而赦令不息近則一年再降遠則每歲無遺至於違法悖禮之徒悖蒲內翻下同無賴不仁之輩編戶則寇攘為業當官則贓賄是求而元日之朝指期天澤重陽之節佇降皇恩重直龍翻如其忖度咸果釋免或有名垂結正罪將斷決度徒洛翻斷丁亂翻竊行貨賄方便規求故致稽延畢霑寬宥用使俗多頑悖時罕廉隅為善者不預恩光作惡者獨承徼幸徼古堯翻古語曰小人之幸君子之不幸太宗亦嘗引是言望陛下而今而後頗節於赦使黎氓知禁姦宄肅清其二以為海內具僚九品以上每歲逢赦必賜階勳唐制文散階二十九武散階亦二十九勳級十有二轉公私聚會緋服衆於青衣上元敕四品服深緋五品服淺緋九品服深青朝直遙翻下同唐制五品已上笏用象九品以上用木位罕才升不知何者為妍蚩何者為美惡臣望自今以後稍息私恩使有善者逾効忠勤無才者咸知勉勵其三以為陛下臨朝踐極取士太廣六品以下職事清官遂乃方之土芥比之沙礫礫音曆若遂不加沙汰臣恐有穢皇風其四以為今之牧伯遷代太速倏來忽往蓬轉萍流既懷苟且之謀何暇循良之政望自今刺史非三歲以上不可遷官仍明察功過尤甄賞罰疏奏太后頗嘉之甄稽延翻別也疏所去翻是時官爵易得而法網嚴峻易以豉翻故人競為趨進而多陷刑戮知幾乃著思慎賦以刺時見志焉長壽二年丙午以王孝傑為朔方道行軍總管擊突厥長壽二年春二月己酉朔日有食之長壽二年僧懷義益驕恣太后惡之惡烏路翻既焚明堂心不自安言多不順太后密選宮人有力者百餘人以防之壬子執之於瑤光殿前樹下使建昌王武攸寧帥壯士毆殺之帥讀曰率毆烏口翻考異曰舊傳云人言發其陰謀者太平公主乳母張夫人令壯士縛而縊殺之送尸白馬寺其侍者僧徒皆流竄遠惡處李商隱宜都內人傳云武后篡既久頗放縱耽內習不敬宗廟四方日有叛逆防豫不暇時宜都內人以唾壺進思有以諫者后坐帷下倚檀几與語問四方事宜都內人曰大家知女卑於男邪后曰知內人曰古有女媧亦不正是天子佐伏羲理九州耳後世孃姥有越出房閤斷天下事者皆不得其正多是輔昏主不然抱小兒獨大家革夫姓改去釵釧襲服冠冕符瑞日至大臣不敢動真天子也然今內之弄臣狎人朝夕進御者久未屏去妾疑此未當天意后曰何內人曰女陰也男陽也陽尊而陰卑雖大家以陰事主天然宜體取剛亢明烈以銷㣥陽陽銷然後陰得志也今狎弄日至處大家夫宮尊位其勢陰求陽也陽勝而陰亦微不可久也大家始今日能屏去男妾獨立天下則陽之剛亢明烈可有矣如是過萬萬世男子益削女子益專妾之願在此后雖不能盡用然即日下令誅作明堂者此蓋文士寓言今從實錄送尸白馬寺焚之以造塔長壽二年甲子太后去慈氏越古之號去羌呂翻長壽二年三月丙辰鳳閣侍郎同平章事周允元薨長壽二年夏四月天樞成天樞其制若柱高古犒翻徑十二尺八面各徑五尺下為鐵山周百七十尺以銅為蟠龍麒麟縈繞之上為騰雲承露盤徑三丈四龍人立捧火珠高一丈工人毛婆羅造模武三思為文刻百官及四夷酋長名高古犒翻酋慈由翻長知兩翻太后自書其榜曰大周萬國頌德天樞長壽二年秋七月辛酉吐蕃寇臨洮臨洮洮州洮土刀翻長壽二年九月甲寅太后合祭天地於南郊加號天冊金輪大聖皇帝赦天下改元改元天冊萬歲長壽二年冬十月突厥默啜遣使請降使疏吏翻降戶江翻太后喜冊授左衞大將軍歸國公萬歲通天元年丙申六九六是年九月始改元長壽二年臘月甲戌太后發神都甲申封神嶽后以嵩山為神嶽考異曰統紀作壬午實錄作甲申按去歲下制云臘月十六日有事于神嶽長曆是月甲戌朔壬午九日甲申十一日皆非十六日今從實錄改元萬歲登封天下百姓無出今年租稅大酺九日酺音蒲丁亥禪于少室戴延之曰嵩山三十六峯東曰太室西曰少室相去十七里嵩其總名也謂之室以其下各有石室焉少室高八百六十丈方十里與太室相埒但小耳己丑御朝覲壇受賀朝直遙翻癸巳還宮甲午謁太廟長壽二年右千牛衞將軍安平王武攸緒少有志行恬澹寡欲扈從封中嶽還少詩照翻行下孟翻從才用翻即求棄官隱於嵩山之陽太后疑其詐許之以觀其所為攸緒遂優游巖壑冬居茅椒茅椒編之為室性暖可以禦寒一如山林之士太后所賜及王公所遺野服器玩遺士季翻攸緒一皆置之不用塵埃凝積買田使奴耕種與民無異考異曰舊傳云聖曆中棄官隱嵩山今從實錄長壽二年春一月甲寅以婁師德為肅邊道行軍副總管擊吐蕃己巳以師德為左肅政大夫知政事如故考異曰實錄云己巳秋官尚書婁師德為肅政御史大夫知政事如故舊傳云萬歲登封元年轉左肅政御史大夫仍依舊知政事證聖元年吐蕃寇洮州令師德與夏官尚書王孝傑討之按證聖年號在登封前此傳尤為謬誤新傳云師德為河源積石懷遠軍及河蘭鄯廓州檢校營田大使入遷秋官尚書改左肅政御史大夫並知政事證聖中與王孝傑拒吐蕃於洮州今據實錄延載元年一月自宰相出為營田大使新書宰相表長壽二年師德平章事延載元年出為營田大使萬歲通天元年一月甲寅師德為左肅政御史大夫肅邊道行軍總管統紀云秋官尚書知政事婁師德充副總管討吐蕃蓋師德之出為營田大使不解宰相之職也今從實錄新本紀長壽二年改長安崇尊廟為太廟崇尊廟見上卷天授元年長壽二年二月辛巳尊神嶽天中王為神嶽天中黃帝靈為天中黃后啟為齊聖皇帝封啟母神為玉京太后夏后啟母石在嵩山長壽二年三月壬寅王孝傑婁師德與吐蕃將論欽陵贊婆戰於素羅汗山據婁師德傳素羅汗山在洮州界將即亮翻孝傑坐免為庶人師德貶原州員外司馬考異曰新紀四月庚子貶師德而無免孝傑日新表三月壬寅孝傑免按實錄三月壬寅撫州火下言孝傑等敗蓋皆據奏到之日耳二人同罪貶必同時不容隔月不知果在何日今但依實錄因其軍敗終言貶官之事而已驚曰官爵盡無邪既而曰亦善亦善不復介意復扶又翻長壽二年丁巳新明堂成高二百九十四尺方三百尺規模率小於舊上施金塗鐵鳳高二丈高古犒翻後為大風所損更為銅火珠㣥龍捧之更工衡翻號曰通天宮赦天下改元萬歲通天長壽二年大食請獻師子姚璹上疏以為師子專食肉遠道傳致傳知戀翻肉既難得極為勞費陛下鷹犬不蓄漁獵悉停豈容菲薄於身而厚給於獸乃卻之長壽二年以檢校夏官侍郎孫元亨同平章事長壽二年夏五月壬子營州契丹松漠都督李盡忠歸誠州刺史孫萬榮舉兵反攻陷營州開元十道志曰舜築柳城即虞舜已前已有柳城之地因有營州之稱郡國志云當營室分故曰營州後漢末遼西烏丸蹋頓所居後魏於平州界置遼西郡周平齊猶為高寶寧所據隋討平寶寧始置營州松漠都督府及歸誠州太宗以內屬契丹部落置契欺訖翻又音喫翽呼會翻盡忠萬榮之妹夫也皆居於營州城側文翽剛愎契丹饑不加賑給視酋長如奴僕故二人怨而反愎弼力翻賑津忍翻酋慈由翻長知兩翻乙丑遣左鷹揚衞將軍曹仁師右金吾衞大將軍張玄遇左威衞大將軍李多祚司農少卿麻仁節等二十八將討之八將即亮翻秋七月辛亥以春官尚書梁王武三思為榆關道安撫大使榆關在勝州界與突厥接非所以備契丹也營州城西四百八十里有榆關守捉城所謂臨渝之險也榆當作渝史於此以後多以渝作榆讀者宜詳考使疏吏翻以備契丹改李盡忠為李盡滅孫萬榮為孫萬斬武后改突厥骨咄祿為不卒祿又改李盡忠為李盡滅孫萬榮為孫萬斬此事何異王莽所為顧有成敗之異耳盡忠尋自稱無上可汗據營州可從刊入聲汗音寒略地所向皆下旬日兵至數萬進圍檀州檀州本漢漁陽郡傂奚縣地舊置安州後周改為玄州隋開皇十六年置檀州八月丁酉曹仁師張玄遇麻仁節與契丹戰于硤石谷平州有西硤石東硤石二戍先是契丹破營州先悉薦翻獲唐俘數百囚之地牢聞唐兵將至使守牢霫紿之曰使霫守唐俘於地牢故曰守牢霫霫而立翻紿蕩亥翻吾輩家屬飢寒不能自存唯俟官軍至即降耳降戶江翻下同既而契丹引出其俘飼以糠粥慰勞之曰飼祥吏翻勞力到翻吾養汝則無食殺汝又不忍今縱汝去遂釋之俘至幽州具言其狀諸軍聞之爭欲先入至黃麞谷據舊書黃麞谷在西硤石故遺老牛瘦馬於道側仁師等三軍棄步卒將騎兵先進契丹設伏橫擊之飛索以玄遇仁節生獲之將即亮翻騎奇寄翻索昔各翻字書無字今讀與搨同德盍翻或曰吐合翻將卒死者填山谷鮮有脫者鮮息淺翻契丹得軍印詐為牒令玄遇等署之牒總管燕匪石宗懷昌等云官軍已破賊若至營州軍將皆斬兵不敍勳燕因肩翻將即亮翻匪石等得牒晝夜兼行不遑寢食以赴之士馬疲弊契丹伏兵於中道邀之全軍皆沒九月制天下繫囚及庶士家奴驍勇者官償其直發以擊契丹驍堅堯翻初令山東近邊諸州置武騎團兵以同州刺史建安王武攸宜為右武威衞大將軍充清邊道行軍大總管以討契丹右拾遺陳子昂為攸宜府參謀以本官參謀軍事不列為品秩恩制免天下罪人及募諸色奴充兵討擊契丹此乃捷急之計非天子之兵且比來刑獄久清罪人全少比毗至翻少詩沼翻奴多怯弱不慣征行慣古患翻縱其募集未足可用況今天下忠臣義士萬分未用其一契丹小孼孼魚列翻假命待誅何勞免罪贖奴損國大體臣恐此策不可威示天下長壽二年丁巳突厥寇涼州執都督許欽明考異曰實錄云吐蕃寇涼州都督許欽明為賊所殺按明年正月默啜寇靈州以欽明自隨又默啜將襲孫萬榮殺欽明以祭天實錄云吐蕃誤也紹之曾孫也許紹預凌煙閣二十四功臣之列突厥數萬奄至城下欽明拒戰為所虜欽明兄欽寂時為龍山軍討擊副使與契丹戰於崇州龍山即慕容氏和龍之山也崇州奚州也武德五年分饒樂都督府之可汗部置貞觀三年徙治營州之廢陽師鎮被擒虜將圍安東令欽寂說其屬城未下者說輸芮翻安東都護裴玄珪在城中高宗總章元年置安東都護府於平壤城上元元年徙遼東郡故城儀鳳二年又徙新城開元二年徙平州天寶二年徙遼西故郡城疑此時已徙平州宋白曰營州東南二百七十里有保定軍舊安東都護府狂賊天殃滅在朝夕公但勵兵謹守以全忠節虜殺之長壽二年吐蕃復遣使請和親復扶又翻太后遣右武衞冑曹參軍貴鄉郭元振往察其宜冑曹參軍掌兵械公廨興善罰讁大朝會行從則受黃質甲鎧弓矢於衞尉幷求分十姓突厥之地長壽元年置四鎮戍兵十姓突厥五咄陸五弩失畢也四鎮十姓與吐蕃種類本殊種章勇翻今請罷唐兵豈非有兼幷之志乎欽陵曰吐蕃苟貪土地欲為邊患則東侵甘涼豈肯規利於萬里之外邪乃遣使者隨元振入請之朝廷疑未決元振上疏使疏吏翻朝直遙翻上時掌翻以為欽陵求罷兵割地此乃利害之機誠不可輕舉措也今若直拒其善意則為邊患必深四鎮之利遠甘涼之害近不可不深圖也宜以計緩之使其和望未絕則善矣彼四鎮十姓吐蕃之所甚欲也而青海吐谷渾亦國家之要地也吐從暾入聲谷音浴本無用於中國所以遣兵戍之欲以鎮撫西域分吐蕃之勢使不得併力東侵也今若果無東侵之志當歸我吐谷渾諸部及青海故地吐谷渾地沒吐蕃見二百二卷高宗咸亨三年薛仁貴敗於大非川青海亦沒西突厥五弩失畢部各有酋長曰五俟斤俟渠之翻塞悉則翻而亦未與之絕也若欽陵小有乖違則曲在彼矣且四鎮十姓款附日久今未察其情之向背事之利害背蒲妹翻遙割而棄之恐傷諸國之心非所以御四夷也太后從之考異曰御史臺記論欽陵必欲得四鎮及益州通市乃和親朝廷不許制書至河源納言婁師德患之曰制書到彼必入寇柰何監察御史南陽張彥先時按河源積石諸軍謂師德曰但稽制書虜必狐疑吾乃先為之備虜至必不捷矣師德從之欽陵入寇果無功由是得罪於其國按師德延載元年一月日同平章事充河源積石懷遠等軍營田大使萬歲通天元年一月為肅邊道行軍總管與王孝傑同擊吐蕃敗於素羅汗山尋貶原州司馬是歲吐蕃復求和欽陵請割四鎮之地神功元年正月師德復同平章事九月乃守納言御史臺記誤也元振又上言吐蕃百姓疲於傜戍早願和親欽陵利於統兵專制獨不欲歸款若國家歲發和親使上時掌翻使疏吏翻而欽陵常不從命則彼國之人怨欽陵日深望國恩日甚設欲大舉其徒固亦難矣斯亦離間之漸間古莧翻可使其上下猜阻禍亂內興矣太后深然之元振名震以字行長壽二年庚申以幷州長史王方慶為鸞臺侍郎與殿中監萬年李道廣並同平章事長壽二年突厥默啜請為太后子幷為其女求昏悉歸河西降戶帥其部衆為國討契丹幷為衆為並于偽翻帥讀曰率龍朔改左右屯衞為左右武威衞光宅又改為左右豹韜衞知微立德之孫歸道仁會之子也閻立德以巧思稱田仁會良吏也冬十月辛卯契丹李盡忠卒孫萬榮代領其衆突厥默啜乘間襲松漠虜盡忠萬榮妻子而去卒子恤翻間古莧翻太后進拜默啜為頡跌利施大單于立功報國可汗頡戶結翻跌徒結翻單音蟬孫萬榮收合餘衆軍勢復振復扶又翻遣別帥駱務整何阿小為前鋒帥所類翻阿烏葛翻攻陷冀州殺刺史陸寶積屠吏民數千人又攻瀛州河北震動制起彭澤令狄仁傑長壽元年仁傑貶前刺史獨孤思莊畏契丹猝至悉驅百姓入城繕脩守備仁傑至悉遣還農曰賊猶在遠何煩如是萬一賊來吾自當之百姓大悅時契丹入寇軍書填委夏官郎中硤石姚元崇剖析如流皆有條理後魏太和十一年於崤陵置崤縣屬恆農郡隋幷入熊耳縣屬河南郡唐武德元年復置貞觀十四年移治硤石塢因更名硤石擢為夏官侍郎長壽二年太后思徐有功用法平長壽二年有功除名聞章十二行本聞上有遠近二字乙十一行本同孔本同張校同者無不相賀鹿城主簿宗城潘好禮鹿城漢安定侯國時縣西七里故城是也周齊為安定縣隋改為鹿城縣唐屬冀州唐制上縣主簿正九品下中下縣從九品上好呼到翻稱有功蹈道依仁固守誠節不以貴賤死生易其操履設客問曰徐公於今誰與為比主人曰四海至廣人物至多或匿迹韜光僕不敢誣若所聞見則一人而已當於古人中求之客曰何如張釋之主人曰釋之所行者甚易徐公所行者甚難難易之間優劣見矣易以豉翻下不易同見賢遍翻張公逢漢文之時天下無事至如盜高廟玉環及渭橋驚馬守法而已事見十四卷漢文帝三年徐公逢革命之秋屬惟新之運屬之欲翻唐朝遺老或包藏禍心使人主有疑朝直遙翻如周興來俊臣乃堯年之四凶也崇飾惡言以誣盛德而徐公守死善道深相明白幾陷囹圄數挂綱維章十二行本綱維作網羅乙十一行本同孔本同熊校同幾居希翻囹盧丁翻圄魚巨翻數所角翻此吾子所聞豈不難哉考異曰朝野僉載云時來俊臣羅織人罪皆先進狀敕依即奏籍沒徐有功出死囚亦先進狀某人罪合免敕好然後斷雪有功好出罪皆先奉進止非是自專此蓋時人見俊臣所誅有功所雪往往得其所欲疑以為先進狀耳若有功一一先奉進止何至三陷死刑乎今不取使為司刑卿乃得展其才矣主人曰吾子徒見徐公用法平允謂可置司刑僕覩其人方寸之地何所不容若其用之何事不可豈直司刑而已哉賀昌㣥標點王崇武聶崇岐覆校
