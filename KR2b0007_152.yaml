body:
  text: 資治通鑑卷第一百五十二端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注梁紀八魏肅宗亦惡儼紇等高祖武皇帝八大通二年戊申五二八魏肅宗亦惡儼紇等春正月癸亥魏以北海王皓為驃騎大將軍開府儀同三司相州刺史驃匹妙翻騎奇寄翻相息亮翻魏肅宗亦惡儼紇等魏北道行臺楊津守定州城居鮮于修禮杜洛周之間迭來攻圍津蓄薪糧治器械治直之翻隨機拒擊賊不能克津潛使人以鐵券說賊黨賊黨有應津者遺津書曰賊所以圍城正為取北人耳說式芮翻遺于季翻為于僞翻城中北人宜盡殺之不然必為患津悉收北人內子城中而不殺衆無不感其仁及葛榮代修禮統衆榮得修禮之衆見上卷普通七年許以為司徒津斬其使固守三年普通七年春津守定州至是三年說式芮翻其使疏吏翻魏不能救津遣其子遁突圍出詣柔然頭兵可汗求救遁日夜泣請頭兵遣其從祖吐豆發帥精騎一萬南出前鋒至廣昌賊塞隘口廣昌縣自漢以來屬代郡自廣昌東南山南出倒馬關至中山上曲陽縣關山險隘實為深峭石磴逶迤沿塗九曲可從刊入聲汗音寒從才用翻帥讀曰率下同塞悉則翻乙丑津長史李裔引賊入執津欲烹之既而捨之史言城無糧援雖善守者不能支久降戶江翻魏肅宗亦惡儼紇等乙丑魏潘嬪生女胡太后詐言皇子為後胡后立女張本嬪毗賓翻丙寅大赦改元武泰魏肅宗亦惡儼紇等蕭寶寅圍馮翊未下長孫稚軍至恆農長知兩翻恆戶登翻行臺左丞楊侃謂稚曰昔魏武與韓遂馬超據潼關相拒遂超之才非魏武敵也然而勝負久不決者扼其險要故也事見六十六卷漢獻帝建安十六年雖魏武復生無以施其智勇復扶又翻不如北取蒲反此用前漢書地理志蒲反字入其腹心此亦魏武之故智也則華州之圍不戰自解五代志馮翊郡後魏置華州華戶化翻支節既解長安可坐取也若愚計可取願為明公前驅稚曰子之計則善矣然今薛修義圍河東薛鳳賢據安邑宗正珍孫守虞坂不得進水經注曰虞坂即左傳所謂顛軨在傅巖東北十餘里東西絶澗於中築以成道指南北之路謂之軨橋橋之東北有虞原上道東有虞城其城北對長坂二十餘里謂之虞坂戰國策曰昔騏驥駕鹽車上虞坂遷延不能進正此處也坂音反侃曰珍孫行陳一夫行戶剛翻陳讀曰陳因緣為將將即亮翻可為人使安能使人河東治在蒲反治謂治所也漘船倫翻水崖也上平坦而下水深曰漘封疆多在郡東修義驅帥士民西圍郡城其父母妻子皆留舊村一旦聞官軍來至皆有內顧之心必望風自潰矣稚乃使其子子彥與侃帥騎兵自恆農北渡據石錐壁五代志河東郡虞鄉縣有石錐山於此築壘壁也今且停此以待步兵且觀民情向背命送降名者各自還村俟臺軍舉三烽當亦舉烽相應其無應烽者乃賊黨也當進擊屠之以所獲賞軍於是村民轉相告語背蒲妹翻語牛倨翻降戶江翻下同雖實未降者亦詐舉烽一宿之間火光遍數百里賊圍城者不測其故各自散歸修義亦逃還與鳳賢俱請降丙子稚克潼關遂入河東會有詔廢鹽池稅魏朝蓋謂弛鹽利以與民可以得民也鹽池天産之貨密邇京畿唯應寶而守之均贍以理今四方多虞府藏罄竭冀定擾攘冀定二州時為葛榮杜洛周攻圍唯仰府庫藏徂浪翻調徒弔翻復扶又翻仰魚向翻有出無入略論鹽稅一年之中準絹而言不下三十萬匹乃是移冀定二州置於畿甸今若廢之事同再失前此宣武帝用甄琛之言廢鹽池稅已為失計今又廢之是為再失不先討關賊徑解河東者非緩長安而急蒲反一失鹽池三軍乏食天助大魏茲計不爽爽乖也少詩沼翻猶創置鹽官而加典護非與物競利恐由利而亂俗也況今國用不足租徵六年之粟調折來歲之資調徒弔翻折之列翻此皆奪人私財事不獲已臣輒符同監將尉謂監鹽池之將尉也監工銜翻將即亮翻下同依常收稅帥讀曰率下同更聽後敕謂合罷與否更聽後番敕下也蕭寶寅遣其將侯終德擊毛遐會郭子恢等屢為魏軍所敗敗補邁翻下穆敗同終德因其勢挫還軍襲寶寅至白門長安城東出北來第三門曰青門意白門即西出南來第三門也丁丑與終德戰敗攜其妻南陽公主及其少子帥麾下百餘騎自後門出奔万俟醜奴少詩照翻騎奇寄翻万莫北翻俟渠之翻醜奴以寶寅為太傅二月魏以長孫稚為車騎大將軍開府儀同三司雍州刺史尚書僕射西道行臺雍於用翻㣥盜李洪攻燒鞏西闕口以東謂鞏縣以西伊闕口以東也鞏縣漢屬河南尹晉分屬滎陽郡魏都督李神軌武衛將軍費穆討之穆敗洪於闕口南遂平之魏肅宗亦惡儼紇等葛榮擊杜洛周殺之併其衆魏肅宗亦惡儼紇等魏靈太后再臨朝以來再臨朝見一百五十卷普通六年朝直遙翻嬖卑義翻又博計翻政事縱弛恩威不立盜賊起封疆日蹙謂秦隴以西冀並以北皆為盜區淮汝沂泗之間皆為梁所侵也太后自以所為不謹恐左右聞之於帝凡帝所愛信者太后輒以事去之長知兩翻去羌呂翻務為壅蔽不使帝知外事通直散騎常侍昌黎谷士恢有寵於帝使領左右散悉亶翻騎奇寄翻太后屢諷之欲用為州士恢懷寵不願出外太后乃誣以罪而殺之有蜜多道人能胡語帝常置左右太后使人殺之於城南而章甲十一行本而下有詐字乙十一行本同孔本同張校同退齊校同懸賞購賊由是母子之間嫌隙日深是時車騎將軍儀同三司並肆汾廣恆雲六州討虜大都督爾朱榮廣當作唐魏收志孝昌中置唐州高歡建義改唐州曰晉州按爾朱榮時駐兵於晉陽魏朝憚之朝直遙翻高歡段榮尉景蔡俊先在杜洛周黨中高歡等歸杜洛周見一百五十卷普通六年又亡歸爾朱榮劉貴先在爾朱榮所屢薦歡於榮榮見其憔悴未之奇也憔昨遙翻悴秦醉翻歡從榮之馬廣既廣既有悍馬榮命歡翦之髦馬而鬄落之為翦悍侯旰翻馬絡首曰羈繫足曰絆起謂榮曰御惡人亦猶是矣榮奇其言坐歡於牀下屏左右訪以時事歡曰聞公有馬十二谷榮畜牧蕃庶以谷量馬屏必郢翻畜此竟何用也畜吁玉翻榮曰但言爾意歡曰今天子暗弱太后淫亂嬖孽亶命朝政不行孽魚列翻朝直遙翻以明公雄武乘時奮發討鄭儼徐紇之罪以清帝側霸業可舉鞭而成此賀六渾之意也高歡字賀六渾語自日中至夜半乃出自是每參軍謀並州刺史元天穆孤之五世孫也孤拓跋鬱律第四子榮兄事之榮常與天穆及帳下都督賀拔嶽密謀欲舉兵入洛內誅嬖幸外清㣥盜二人皆勸成之榮上書以山東㣥盜方熾熾尺志翻冀定覆沒官軍屢敗請遣精騎三千東援相州騎奇寄翻相息亮翻太后疑之報以念生梟戮寶寅就擒醜奴請降關隴已定費穆大破㣥蠻絳蜀漸平又北海王皓帥衆二萬出鎮相州不須出兵梟堅堯翻降戶江翻帥讀曰率下同榮復上書復扶又翻下帝復同以為賊勢雖衰官軍屢敗人情危怯恐實難用若不更思方略無以萬全臣愚以為蠕蠕主阿那王褱荷國厚恩蠕蠕之亂魏援立阿那王褱事見一百四十九卷普通元年至三年蠕人兗翻荷下可翻宜遣發兵東趣下口以躡其背言阿那王褱荷魏保護之恩雖叛歸塞北未應漠然忘報恩之心下口蓋指飛狐口趣七喻翻臣麾下雖少輒盡力命自井陘以北滏口以西分據險要攻其肘腋少詩沼翻陘音刑滏音釜腋音亦葛榮雖並洛周威恩未著人類差異形勢可分杜洛周柔玄鎮民葛榮鮮于修禮之黨本非同類吞並為一及其新合亟加招討則形勢可分也北捍馬邑東塞井陘徐紇說太后以鐵券間榮左右榮聞而恨之魏肅宗亦惡儼紇等逼於太后不能去塞悉則翻說輸芮翻間古莧翻惡烏路翻去羌呂翻密詔榮舉兵內向欲以脅太后榮以高歡為前鋒行至上黨帝復以私詔止之儼紇恐禍及己陰與太后謀鴆帝癸丑帝暴殂年十九甲寅太后立皇女為帝大赦既而下詔稱潘充華本實生女潘充華即前所謂潘嬪也生女見上正月乙丑體自高祖臨洮王寶暉高祖之孫百官文武加二階宿衛加三階乙卯釗即位釗始生三歲太后欲久專政故貪其幼而立之爾朱榮聞之大怒謂元天穆曰主上晏駕春秋十九海內猶謂之幼君況今奉未言之兒以臨天下欲求治安其可得乎治直吏翻吾欲帥鐵騎赴哀山陵翦除姦佞更立長君更工衡翻長知兩翻何如天穆曰此伊霍復見於今矣乃抗表稱大行皇帝背棄萬方復扶又翻背蒲妹翻海內咸稱鴆毒致禍豈有天子不豫初不召醫貴戚大臣皆不侍側安得不使遠近怪愕又以皇女為儲兩太子謂之儲君易曰明兩作離大人以繼明照四方故稱儲兩上欺天地下惑朝野已乃選君於孩提之中實使姦豎專朝隳亂綱紀朝直遙翻此何異掩目捕雀塞耳盜鍾塞悉則翻今㣥盜沸騰鄰敵窺窬而欲以未言之兒鎮安天下不亦難乎願聽臣赴闕參預大議問侍臣帝崩之由訪侍章甲十一行本侍作禁乙十一行本同孔本同張校同衛不知之狀以徐鄭之徒付之司敗雪同天之恥君父之讎義不同天然後更擇宗親以承寶祚榮從弟世隆時為直閣更工衡翻從才用翻下從子之從同太后遣詣晉陽慰諭榮榮欲留之世隆曰朝廷疑兄故遣世隆來今留世隆使朝廷得預為之備非計也乃遣之魏肅宗亦惡儼紇等三月癸未葛榮陷魏滄州魏肅宗熙平二年分瀛冀二州置滄州治饒安城領浮陽樂陵郡居民死者什八九魏肅宗亦惡儼紇等乙酉魏葬孝明皇帝于定陵廟號肅宗魏肅宗亦惡儼紇等爾朱榮與元天穆議以彭城武宣王有忠勳彭城王協諡武宣忠勳謂侍孝文帝疾立宣武帝備極忠勤也素有令望欲立之樂音洛又遣從子天光及親信奚毅倉頭王相入洛與爾朱世隆密議天光見子攸具論榮心子攸許之天光等還晉陽榮猶疑之乃以銅為顯祖諸章甲十一行本諸下有子字乙十一行本同孔本同張校同退齊校同孫各鑄像唯長樂王像成魏人立后皆鑄像以卜之慕容氏謂冉閔以金鑄己像不成胡人鑄像以卜君其來尚矣故爾朱榮效之世隆逃出會榮於上黨靈太后聞之甚懼悉召王公等入議宗室大臣皆疾太后所為莫肯致言徐紇獨曰爾朱榮小胡敢稱兵向闕文武宿衛足以制之但守險要以逸待勞彼懸軍千里士馬疲弊破之必矣太后以為然以黃門侍郎李神軌為大都督帥衆拒之別將鄭季明鄭先護將兵守河橋帥讀曰率將即亮翻武衛將軍費穆屯小平津先護儼之從祖兄弟也榮至河內復遣王相密至洛迎長樂王子攸復扶又翻下榮復同夏四月丙申子攸與兄彭城王劭弟霸城公子正潛自高渚渡河考異曰楊衒之洛陽伽藍記高渚作霤波今從魏書丁酉會榮於河陽將士咸稱萬歲戊戌濟河子攸即帝位帝彭城王協之第三子劭彭城嫡嗣且魏主兄也封為無上王言其尊無上也有君而言無上君子是以知魏主之不終也以榮為侍中都督中外諸軍事大將軍尚書令領軍將軍領左右封太原王領左右領左右千牛備身也鄭先護素與敬宗善聞帝即位與鄭季明開城納之李神軌至河橋聞北中不守晉杜預建河橋於富平津河北側岸有二城相對魏高祖置北中郎府徙諸從隸府戶並羽林虎賁領隊防之北中不守可以平行至洛陽矣宋白曰北中城即今河陽城費穆棄衆先降於榮降戶江翻徐紇矯詔夜開殿門取驊騮廣既御馬十匹驊騮駿馬也故魏以名御馬廣既將依羊侃也為侃與紇南歸張本鄭儼滎陽開封人皆令出家太后亦自落髮榮召百官迎車駕己亥百官奉璽綬備法駕迎敬宗於河橋璽斯氏翻綬音受考異曰伽藍記云十二日爾朱榮軍于邙山之北河陰之野十三日召百官迎駕至者盡誅之長曆是月戊子朔十二日己亥也今從魏書庚子榮遣騎執太后及幼主送至河陰騎奇寄翻太后對榮多所陳說榮拂衣而起沈太后及幼主於河費穆密說榮曰公士馬不出萬人今長驅向洛前無橫陳既無戰勝之威㣥情素不厭服沈持林翻說式芮翻說式芮翻陳讀曰陳厭於葉翻以京師之衆百官之盛知公虛實有輕侮之心若不大行誅罰更樹親黨恐公還北之日未渡太行而內變作矣更工衡翻行戶剛翻榮心然之謂所親慕容紹宗曰洛中人士繁盛驕侈成俗不加芟翦終難制馭芟所銜翻吾欲因百官出迎悉誅之何如紹宗曰太后荒淫失道嬖幸弄權殽亂四海殽雜也錯也嬖卑義翻又博計翻今無故殲夷多士不分忠佞殲息廉翻恐大失天下之望非長策也榮不聽乃請帝循河西至淘渚水經注孟津又曰富平津又謂之陶河杜畿試樓船於孟津覆於陶河即此也按爾朱榮傳陶渚在河陰西北三里南北長堤之西魏紀淘作陶杜佑曰河南河陽縣西南十三里有古遮馬堤即其處云欲祭天百官既集列胡騎圍之責以天下喪亂肅宗暴崩皆由朝臣貪虐不能匡弼騎奇寄翻喪息浪翻朝直遙翻因縱兵殺之自丞相高陽王雍司空元欽儀同三司義陽王略以下死者二千餘人考異曰北史云榮惑費穆之言謂天下乘機可取乃譎朝士共為盟誓將向河陰西北三里至南北長堤悉命下馬西渡即遣胡騎圍之妄言丞相高陽王反殺王公以下二千餘人榮傳一千三百餘人今從魏紀其母敬宗之從母也相帥出迎俱死遵業慧龍之孫也劉裕得晉權殺王愈其孫慧龍奔魏著功名於南鄙從才用翻帥讀曰率時人惜其才而譏其躁躁則到翻有朝士百餘人後至榮復以胡騎圍之令曰有能為禪文者免死侍御史趙元則出應募遂使為之考異曰北史曰時隴西李神雋頓丘李諧太原溫子升並當世辭人皆在圍中恥從是命俯伏不應按神雋等不應何得不死魏書本傳皆無其事元氏既滅爾朱氏興皆稱萬歲榮又遣數十人拔刀向行宮帝與無上王劭始平王子正俱出帳外榮先遣並州人郭羅剎西部高車叱列殺鬼侍帝側剎初轄翻詐言防衛抱帝入帳餘人即殺劭及子正又遣數十人遷帝於河橋置之幕下帝憂憤無計使人諭旨於榮曰帝王迭興盛衰無常今四方瓦解將軍奮袂而起所向無前此乃天意非人力也我本相投志在全生豈敢妄希天位希望也以至於此若天命有歸將軍宜時正尊號若推而不居推吐雷翻存魏社稷亦當更擇親賢而輔之更工衡翻時都督高歡勸榮稱帝考異曰魏爾朱榮傳曰於是獻武王與外兵參軍司馬子如等切諫陳不可之理榮曰愆誤若是唯當以死謝朝廷今日安危之機計將何出獻武王等曰未若還奉長樂以安天下於是還奉莊帝北齊書神武紀云榮將篡位神武諫恐不聽請鑄像卜之鑄不成乃止蓋魏收與北齊史官欲為神武掩此惡故云爾今從周書賀拔嶽傳榮疑未決賀拔嶽進曰將軍首舉義兵志除姦逆大勳未立遽有此謀正可速禍未見其福榮乃自鑄金為像凡四鑄不成功曹參軍燕郡劉靈助善卜筮漢高祖定天下燕仍為國昭帝改為廣陽郡後漢光武併上谷和帝復為廣陽郡晉為廣陽國魏為燕郡燕因肩翻靈助言天時人事未可榮曰若我不吉當迎天穆立之靈助曰天穆亦不吉唯長樂王有天命耳榮亦精神恍惚不自支持久而方寤史言天位不可以詐力奸恍呼廣翻惚音忽章甲十一行本思作自乙十一行本同孔本同張校同愧悔曰過誤若是唯當以死謝朝廷賀拔嶽請殺高歡以謝天下左右曰歡雖復愚疏言不思難復扶又翻下更復同難乃旦翻今四方多事須藉武將將即亮翻請捨之收其後效榮乃止夜四更復迎帝還營更工衡翻榮望馬首叩頭請死榮所從胡騎殺朝士既多不敢入洛城即欲向北為遷都之計榮狐疑甚久武衛將軍泛禮固諫皇甫謐云泛本姓凡遭秦亂避地於泛水因氏焉泛音凡辛丑榮奉帝入城帝御太極殿下詔大赦改元建義從太原王將士普加五階在京文官二階武官三階百姓復租役三年復方目翻除也時百官蕩盡存者皆竄匿不出唯散騎常侍山偉一人拜赦於闕下山偉稱頌元叉而得進其人可知特乾沒以苟一時之利祿耳詩巷伯曰勞人草草注云草草勞心也箋云草草憂將妄得罪也或云榮欲縱兵大掠或云欲遷都晉陽富者棄宅貧者襁負率皆逃竄什不存一二襁居兩翻直衛空虛官守曠廢守手又翻曠空也榮乃上書稱大兵交際難可齊一諸王朝貴橫死者衆橫戶孟翻臣今粉軀不足塞咎塞悉則翻乞追贈亡者微申私責無上王請追尊為無上皇帝自餘死於河陰者王贈三司三品贈令僕五品贈刺史七品已下白章甲十一行本白上有及字乙十一行本同孔本同民贈郡鎮身無官爵謂之白民猶言白丁也郡鎮郡守鎮將也即授封爵又遣使者循城勞問勞力到翻詔從之於是朝士稍出人心粗安粗坐五翻封無上王之子韶為彭城王榮猶執遷都之議帝亦不能違都官尚書元諶爭之以為不可漢成帝置三公曹尚書主斷獄光武改三公曹主考課置中都官曹尚書主水火盜賊事魏置尚書都官郎佐督軍事晉以三公尚書掌刑獄宋三公比部主刑法又置都官尚書主軍事刑獄至隋乃改都官尚書為刑部尚書諶氏壬翻何關君事而固執也且河陰之事君應知之諶曰天下事當與天下論之奈何以河陰之酷而恐元諶諶國之宗室位居常伯尚書古常伯之任死復何損復扶又翻正使今日碎首流腸亦無所懼榮大怒欲抵諶罪爾朱世隆固諫乃止見者莫不震悚諶顏色自若後數日帝與榮登高見宮闕壯麗列樹成行行戶剛翻乃歎曰臣昨愚暗有北遷之意今見皇居之盛熟思元尚書言深不可奪由是罷遷都之議諶謐之兄也癸卯以江陽王繼為太師北海王皓為太傅光祿大夫李延實為太保賜爵濮陽王並州刺史元天穆為太尉賜爵上黨王前侍中楊椿為司徒車騎大將軍穆紹為司空領尚書令進爵頓丘王雍州刺史長孫稚為驃騎大將軍開府儀同三司賜爵馮翊王雍於用翻長知兩翻驃匹妙翻騎奇寄翻殿中尚書元諶為尚書右僕射賜爵魏郡王金紫光祿大夫廣陵王恭加儀同三司其餘起家暴貴者不可勝數延實沖之子也李沖柄用於文明孝文之時勝音升得超拜徐紇弟獻伯為北海太守季産為青州長史紇使人告之皆將家屬逃去與紇俱奔泰山泰山郡屬兗州所謂東奔兗州也從才用翻為部下所殺丁未詔內外解嚴魏肅宗亦惡儼紇等魏郢州刺史元顯達請降降戶江翻詔郢州刺史元樹迎之魏克義陽以梁之司州為郢州梁之郢州治江夏郡遂留鎮焉改魏郢州為北司州以夔為刺史兼督司州梁初義陽陷僑置司州於關南今黃州黃陂縣之地既復義陽因以為北司州逼新蔡豫州刺史夏侯亶圍南頓攻陳項魏行臺源子恭拒之魏肅宗亦惡儼紇等庚戌魏賜爾朱榮子叉羅爵梁郡王魏肅宗亦惡儼紇等柔然頭兵可汗數入貢于魏可從刊入聲汗音寒數所角翻上書不稱臣魏肅宗亦惡儼紇等魏汝南王悅及東道行臺臨淮王彧聞河陰之亂皆來奔先是魏人降者皆稱魏官為僞先悉薦翻彧表啓獨稱魏臨淮王上亦體其雅素不之責魏北海王皓將之相州至汲郡聞葛榮南侵及爾朱榮縱暴陰為自安之計盤桓不進以其舅殷州刺史范遵行相州事代前刺史李神守鄴行臺甄密知皓有異志相帥廢遵甄之人翻帥讀曰率復推李神攝州事復扶又翻遣兵迎皓且察其變皓聞之帥左右來奔為後送皓北還張本帥讀曰率琛之從父弟也甄琛事魏宣武帝從才用翻魏北青州治東陽去梁境甚遠五代志東海郡梁置南北二青州郡領懷仁縣又注云梁置南北二青州意者元世俊以懷仁之地來降也志又曰春陵郡後魏置南荊州降戶江翻魏肅宗亦惡儼紇等五月丁巳朔魏加爾朱榮北道大行臺以尚書右僕射元羅為東道大使使疏吏翻光祿勳元欣副之巡方黜陟先行後聞欣羽之子也羽孝文帝之弟封廣陵王魏肅宗亦惡儼紇等爾朱榮入見魏主於明光殿見賢遍翻下朝見同重謝河橋之事重直用翻誓言無復二心帝自起止之因復為榮誓言無疑心復扶又翻下不復同為于僞翻榮喜因求酒飲之熟醉帝欲誅之左右苦諫乃止即以牀輿向中常侍省輿羊茹翻輿車為輿榮夜半方寤遂達旦不眠自此不復禁中宿矣榮女先為肅宗嬪榮欲敬宗立以為后帝疑未決章甲十一行本決下有給事二字乙十一行本同孔本同張校同黃門侍郎祖瑩曰昔文公在秦懷嬴入侍事有反經合義左傳晉世子圉質於秦秦伯以女妻之子圉逃歸公子重耳入秦秦伯納女五人懷嬴與焉秦嬴氏也圉諡懷公故曰懷嬴漢儒以反經合道為權祖瑩本此嬪毗賓翻帝遂從之榮意甚悅榮舉止輕脫喜馳射喜許記翻每入朝見更無所為唯戲上下馬於西林園宴射恆請皇后出觀並召王公主共在一堂每見天子射中輒自起舞叫將相卿士悉皆盤旋上時掌翻恆戶登翻中竹仲翻將即亮翻相息亮翻乃至主亦不免隨之舉袂及酒酣耳熱必自匡坐唱虜歌匡坐正坐也虜歌胡歌也與左右連手踏地唱回波樂而出此所謂踏歌也回波樂曲名樂音洛喜慍無常刀槊弓矢不離於手槊色角翻離力智翻每有瞋嫌瞋昌真翻輒行擊射射而亦翻左右恆有死憂恆戶登翻嘗見沙彌重騎一馬去俗為僧受度而未受戒者謂之沙彌重騎者二人共騎也重直龍翻力窮不能復動復扶又翻遂使傍人以頭相擊死而後已辛酉榮還晉陽帝餞之於邙陰邙陰邙山之北也加天穆侍中録尚書事京畿大都督兼領軍將軍以行臺郎中桑乾朱瑞為黃門侍郎兼中書舍人朝廷要官悉用其腹心為之魏肅宗亦惡儼紇等丙寅魏主詔孝昌以來凡有冤抑無訴者悉集華林東門當親理之時承喪亂之後喪息浪翻倉廩虛竭始詔入粟八千石者賜爵散侯此有官入粟者之賜也魏制散侯降開國侯一品散悉亶翻沙門授本州統及郡縣維那維那各管其郡縣之僧爾朱榮之趣洛也趣七喻翻遣其都督樊子鵠取唐州唐州刺史崔元珍行臺酈惲拒守不從乙亥子鵠拔平陽斬元珍及惲惲於粉翻元珍挺之從父弟也從才用翻魏肅宗亦惡儼紇等將軍曹義宗圍魏荊州堰水灌城不沒者數板時魏方多難不能救難乃旦翻城中糧盡刺史王羆煮粥與將士均分食之每出戰不擐甲胄仰天大呼曰擐音宦呼火故翻荊州城孝文皇帝所置魏孝文太和中置荊州於穰城令箭中王羆額不爾王羆必當破賊彌歷三年前後搏戰甚衆亦不被傷中竹仲翻被皮義翻癸未魏以中軍將軍費穆都督南征諸軍事將兵救之將即亮翻魏肅宗亦惡儼紇等魏臨淮王彧聞魏主定位乃以母老求還辭情懇至上惜其才而不能違六月丁亥遣彧還魏以彧為侍中驃騎大將軍加儀同三司驃匹妙翻騎奇寄翻魏肅宗亦惡儼紇等魏員外散騎常侍高乾祐之從子也高祐允之從祖弟從才用翻喜許記翻與魏主有舊爾朱榮之向洛也逃奔齊州聞河陰之亂遂集流民起兵於河濟之間受葛榮官爵頻破州軍魏主使元欣諭旨乾等乃降濟子禮翻降戶江翻以乾為給事黃門侍郎兼武衛將軍敖曹為通直散騎侍郎榮以乾兄弟前為叛亂不應復居近要魏主乃聽解官歸鄉里敖曹復行抄掠復扶又翻抄楚交翻榮誘執之與薛修義同拘於晉陽薛修義為龍門鎮將附蕭寶寅既降而反側故亦被拘誘音酉以字行敖曹之父以其子昂藏敖曹故以為名字魏肅宗亦惡儼紇等葛榮軍乏食遣其僕射任褒將兵南掠至沁水沁水縣自漢以來屬河內郡任音壬沁千浸翻帥宗正珍孫等討之帥讀曰率下同前幽州平北府主簿河間邢杲帥河北流民十萬餘戶反於青州之北海自稱漢王改元天統戊申魏以征東將軍李叔仁為車騎大將軍儀同三司帥衆討之辛亥魏主詔曰朕當親御六戎戎兵也六戎猶言六軍也燕因肩翻以大將軍爾朱榮為左軍上黨王天穆為前軍司徒楊椿為右軍司空穆紹為後軍葛榮退屯相州之北相息亮翻魏肅宗亦惡儼紇等秋七月乙丑魏加爾朱榮柱國大將軍録尚書事魏初置柱國大將軍長孫嵩以開國元勳加此號魏肅宗亦惡儼紇等壬子魏光州民劉舉聚衆反於濮陽濮博木翻自稱皇武大將軍魏肅宗亦惡儼紇等是月万俟醜奴自稱天子置百官會波斯國獻師子於魏波斯國都宿利城在忸密西古條支國也去代都二萬四千二百二十八里改元神獸魏肅宗亦惡儼紇等魏泰山太守羊侃守式又翻以其祖規嘗為宋高祖祭酒從事常有南歸之志徐紇往依之因勸侃起兵侃從之兗州刺史羊敦侃之從兄也從才用翻密知之據州拒侃八月侃引兵襲敦弗克魏兗州刺史治瑕丘泰山太守治博且遣使來降使疏吏翻降戶江翻詔廣晉縣侯泰山羊鴉仁等將兵應接沈約志鄱陽郡有廣晉縣本吳所置廣昌縣晉武帝太康元年更名廣晉侃斬其使者不受將軍王辨侵魏徐州蕃郡民續靈珍擁衆萬人攻蕃郡以應梁魏徐州治彭城領彭城南陽平蕃沛蘭陵北濟陰碭郡蕃縣漢晉屬魯國魏孝昌三年置蕃郡治蕃城五代志徐州滕縣舊曰蕃置蕃郡隋開皇十六年改曰滕郡尋廢郡為縣蕃音皮又音翻斬之辨引還魏肅宗亦惡儼紇等甲辰魏大都督宗正珍孫擊劉舉於濮陽滅之魏肅宗亦惡儼紇等葛榮引兵圍鄴衆號百萬遊兵已過汲郡汲郡隋唐之衛州爾朱榮啓求討之九月爾朱榮召從子肆州刺史天光留鎮晉陽曰我身不得至處非汝無以稱我心從才用翻稱尺證翻自帥精騎七千馬皆有副魏收魏書云帥騎七萬帥讀曰率騎奇寄翻東出滏口以侯景為前驅滏音釜葛榮為盜日久梁普通七年葛榮得鮮于修禮之衆寇掠河北爾朱榮衆寡非敵議者謂無取勝之理葛榮聞之喜見於色見賢遍翻令其衆曰此易與耳易弋豉翻諸人俱辦長繩至則縛取自鄴以北列陳數十里箕張而進如箕之張也陳讀曰陳為奇兵分督將已上三人為一處處有數百騎令所在揚塵鼓譟使賊不測多少將即亮翻少詩沼翻又以人馬逼戰刀不如棒勒軍士齎袖棒一枚置於馬側至戰時慮廢騰逐不聽斬級斬級者斬首以計功級棒蒲項翻分命壯勇所向衝突號令嚴明戰士同奮爾朱榮身自陷陳出於賊後表裏合擊大破之於陳擒葛榮陳讀曰陳餘衆悉降降戶江翻以賊徒既衆若即分割恐其疑懼或更結聚乃下令各從所樂樂音洛親屬相隨任所居止於是㣥情大喜登即四散登者登時也待出百里之外乃始分道押領隨便安置咸得其宜擢其渠帥量才授任新附者咸安時人服其處分機速帥所類翻量音良處昌呂翻分扶問翻以檻車送葛榮赴洛冀定滄瀛殷五州皆平時上黨王天穆軍於朝歌之南穆紹楊椿猶未發而葛榮已滅乃皆罷兵是年夏魏主將北征以爾朱榮為左軍楊椿為右軍穆紹為後軍初宇文肱從鮮于修禮攻定州戰死於唐河魏收志定州中山郡唐縣有唐水水經唐水導源盧奴縣西北東流至唐城西北隅堨而為湖其水南入小溝下注滱水修禮死從葛榮葛榮敗爾朱榮愛泰之才以為統軍宇文泰事始此乙亥魏大赦改元永安辛巳以爾朱榮為大丞相都督河北畿外諸軍事榮子平昌公文殊昌樂公文暢並進爵為王樂音洛以楊椿為太保城陽王徽為司徒冬十月丁亥葛榮至洛魏主御閶闔門洛城西面有廣陽西明閶闔三門又洛陽宮城門曰閶闔注已見八十四卷晉惠帝太安元年斬於都市魏肅宗亦惡儼紇等帝以魏北海王皓為魏王遣東宮直閣將軍陳慶之將兵送之還北將即亮翻考異曰梁魏帝紀皆云以皓為魏主唯皓傳作魏王按魏封劉昶為宋王蕭寶寅為齊王蕭察為梁王皆俟得國然後使稱帝耳若皓在南已稱魏帝當行即位之禮又梁朝應以客禮待之又皓不應再即帝位於渙水蓋由王字與主字止缺一點故多致謬誤今從皓傳魏肅宗亦惡儼紇等丙申魏以太原王世子爾朱菩提為驃騎大將軍開府儀同三司菩薄乎翻丁酉以長樂等七郡各萬戶通前十萬戶為太原王榮國樂音洛戊戌又加榮太師皆賞擒葛榮之功也魏肅宗亦惡儼紇等壬子魏江陽武烈王繼卒魏肅宗亦惡儼紇等魏使征虜將軍韓子熙招諭邢杲杲詐降而復反降戶江翻復扶又翻李叔仁擊杲於惟水惟水當作濰水章乙十一行本正作濰退齊校同水經濰水出琅邪箕縣東北過東武城縣西又北過平昌縣東又北過高密縣西又北過淳于縣東又東北過下密縣故城西又東北過都昌縣東又東北入于海五代志後魏北海郡膠東縣隋改曰濰水縣後又改曰下密縣濰音惟還從宣翻又如字魏肅宗亦惡儼紇等魏費穆奄至荊州曹義宗軍敗為魏所擒荊州之圍始解荊州受圍三年始解魏肅宗亦惡儼紇等元皓襲魏銍城而據之銍縣漢屬沛郡魏晉屬譙郡宋白曰宿州臨渙縣漢銍縣地銍竹乙翻魏肅宗亦惡儼紇等魏行臺尚書左僕射于暉等兵數十萬擊羊侃於瑕丘劉昫曰瑕丘春秋時魯之瑕邑宋以為兗州治所隋始置瑕丘縣說侃請乞師於梁說式芮翻侃信之紇遂來奔暉等圍侃十餘重重直龍翻柵中矢盡南軍不進十一月癸亥夜侃潰圍出且戰且行一日一夜乃出魏境至渣口水經引郡國志曰逼陽有柤水南亂于沂而注于沭謂之柤口春秋諸侯會吳于柤即此渣側加翻馬二千匹士卒皆竟夜悲歌侃乃謝曰卿等懷土理不能相隨幸適去留言或去或留各從其意也各拜辭而去魏復取泰山復扶又翻又如字暉徑之子也于徑事魏孝文帝魏肅宗亦惡儼紇等戊寅魏以上黨王天穆為大將軍開府儀同三司世襲並州刺史魏肅宗亦惡儼紇等十二月庚子魏詔于暉還師討邢杲魏肅宗亦惡儼紇等葛榮餘黨韓樓復據幽州反為爾朱榮遣將平韓樓張本復扶又翻被皮義翻爾朱榮以撫軍將軍賀拔勝為大都督鎮中山樓畏勝威名不敢南出張政烺標點王崇武聶崇岐覆校
