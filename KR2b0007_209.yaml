body:
  text: 資治通鑑卷第二百九端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀二十五中宗大和大聖大昭孝皇帝下景龍二年景龍二年戊申七八景龍二年春二月庚寅嚴寅改辰宮中言皇后衣笥裙上有五色雲起上令圖以示百官韋巨源請布之天下從之仍赦天下景龍二年迦葉志忠奏昔神堯皇帝未受命天下歌桃李子桃李子見一百八十卷隋煬帝大業十三年迦居伽翻天下歌秦王破陳樂破陳樂見一百九十二卷太宗貞觀元年天下歌堂堂調露初京城民謠有側堂堂撓堂堂之言太常丞李嗣真曰側者不正撓者不安自隋以來樂府有堂堂曲再言堂者唐再受命之象鄭樵曰堂堂陳後主所作唐高宗常歌之天下歌嫵媚娘永徽後民歌嫵媚娘曲蓋隋時已有此曲矣嫵音武天下歌英王石州其歌不見於史志忠以上初封英王遂傅會以為受命之符天下歌桑條韋永徽末里歌有桑條韋也女時韋也樂志忠遂傅會以為后之德專蠶桑供宗廟事上桑韋歌十二篇主蠶桑之事謹上桑韋歌十二篇上時掌翻下同請編之樂府皇后祀先蠶則奏之太常卿鄭愔又引而申之愔於今翻上悅皆受厚賞景龍二年右補闕趙延禧上言周唐一統符命同歸故高宗封陛下為周王顯慶二年帝封周王儀鳳二年徙封英王唐同泰獻洛水圖見二百四卷武后垂拱三年雖百代可知也陛下繼則天子孫當百代王天下王于況翻上悅擢延禧為諫議大夫景龍二年丁亥蕭至忠上疏以為恩幸者止可富之金帛食以粱肉上時掌翻疏所去翻食讀曰飼祥吏翻不可以公器為私用今列位已廣宀兒員倍之干求未厭日月增數陛下降不資之澤近戚有無涯之請賣官利己鬻法徇私臺寺之內朱紫盈滿忽事則不存職務恃勢則公違憲章徒忝官曹無益時政上雖嘉其意竟不能用景龍二年三月丙辰朔方道大總管張仁願築三受降城於河上中受降城在黃河北岸南去朔方千三百餘里安北都護府治焉東受降城在勝州東北二百里西南去朔方千六百餘里西受降城在豐州北黃河外八十里東南去朔方千餘里宋祁曰中城南直朔方西城南直靈武東城南直榆關宋白曰東受降城東北至單于都護府百二十里東南至朔州四百里西南渡河至勝州八里西至中受降城三百里本漢雲中郡地中受降城西北至天德軍二百里南至麟州四百里北至磧口五百里本秦九原郡地在榆林漢更名五原開元十年於此置安北大都護府西受降城東南渡河至豐州八十里西南至定遠城七百里東北至磧口三百里降戶江翻初朔方軍與突厥以河為境河北有拂雲祠祠在拂雲堆因以為名厥九勿翻必先詣祠祈禱牧馬料兵而後渡河時默啜悉衆西擊突騎施騎奇寄翻仁願請乘虛奪取漠南地於河北築三受降城首尾相應以絶其南寇之路太子少師唐休璟以為兩漢以來皆北阻大河今築城寇境恐勞人費功終為虜有璟俱永翻仁願固請不已上竟從之仁願表留歲滿鎮兵以助其功戍邊歲滿當歸者留以助城築之功仁願悉擒之斬於城下軍中股栗六旬而成以拂雲祠為中城距東西兩城各四百餘里皆據津要宋白曰東受降城本漢雲中郡地中受降城本秦九原郡地西受降城蓋漢臨河縣舊理處於牛頭朝那山北朝那山注見二百三卷高宗弘道元年以左玉鈐衛將軍論弓仁為朔方軍前鋒遊奕使戍諾真水為邏衛遊奕使領遊兵以巡奕者也中受降城西二百里至大同川北行二百四十餘里至步越多山又東北三百餘里至帝割達城又東北至諾真水杜佑曰遊奕於軍中選驍勇諳山川泉井者充日夕邏候於亭障之外捉生問事其副使子將並久軍行人取善騎射人使疏吏翻朔方無復寇掠復扶又翻減鎮兵數萬人仁願建三城不置壅門及備守之具壅門即古之懸門也或曰門外築垣以遮壅城門今之甕城是也壅城之外又有八卦牆萬人敵皆以遮壅城門范祖禹曰張仁願築三受降城不置甕門曲敵戰格仁願曰兵貴進取不利退守寇至當人併力出戰回首望城者猶應斬之安用守備生其退恧之心也恧女六翻其後常元楷為朔方軍總管始築壅門人是以重仁願而輕元楷景龍二年夏四月癸未置修文館大學士四員直學士八員學士十二員選公卿以下善為文者李嶠等為之武德四年置修文館于門下省九年改曰弘文館五品已上曰學士六品已上曰直學士又有文學直館皆他官領之武后垂拱後以宰相兼領館事號曰館主神龍元年避孝敬皇帝諱改曰昭文館二年改曰修文館上官昭容勸帝置大學士四人以象四時直學士八人以象八節學士十二人以象十二時或宗戚宴集學士無不畢從賦詩屬和從才用翻屬之欲翻和戶臥翻使上官昭容第其甲乙北齊河清新令有昭容八十一御女之一也唐昭容位亞昭儀於九品之次第二是年冬方以上官婕妤為昭容同預宴者惟中書門下及長參王公親貴數人而已至大宴方召八座九列諸司五品以上預焉於是天下靡然爭以文華相尚儒學忠讜之士莫得進矣讜音黨景龍二年秋七月癸巳以左屯衛大將軍朔方道大總管張仁願同中書門下三品景龍二年甲午清源尉呂元泰上疏上時掌翻疏所去翻下同以為邊境未寧鎮戍不息士卒困苦轉輸疲弊而營建佛寺日廣月滋勞人費財無有窮極昔黃帝堯舜禹湯文武惟以儉約仁義立德垂名晉宋以降塔廟競起而喪亂相繼由其好尚失所奢靡相高人不堪命故也伏願回營造之資充疆埸之費使烽燧永息㣥生富庶則如來慈悲之施喪息浪翻好呼到翻施式豉翻平等之心孰過於此疏奏不省省悉景翻景龍二年安樂長寧公主及皇后妹郕國夫人上官婕妤婕妤母沛國夫人鄭氏尚宮柴氏賀婁氏唐宮官有六尚職掌如六尚書尚宮二人正五品掌導引中宮總司記司言司薄司闈四司之官賀婁氏後為臨淄王所誅樂音洛婕妤音接豫皆依勢用事請謁受賕雖屠沽臧獲臧獲奴婢也方言曰陑岱之間罵奴曰臧罵婢曰獲燕之北郊民而壻婢謂之臧女而婦奴謂之獲則別降墨敕除官斜封付中書時人謂之斜封官錢三萬則度為僧尼其員外同正試攝檢校判知官凡數千人時有員外置之官有員外同正之官有試官有攝官有檢校官判謂判某官事知謂知某官事也為四銓選者歲數萬人選須絹翻上官婕妤及後宮多立外第出入無節朝士往往從之遊處以求進達安樂公主尤驕橫朝直遙翻處昌呂翻橫下孟翻宰相以下多出其門與長寧公主競起第舍長寧公主上女也下嫁楊慎交擬於宮掖而精巧過之安樂公主請昆明池上以百姓蒲魚所資不許公主不悅乃更奪民田作定昆池延袤數里新書曰定言可抗訂之也朝野僉載定昆池方四十九里直抵南山考異曰新傳云四十九里直抵南山蓋併主田言之今從舊傳華戶化翻引水象天津天津謂天河也河圖括地象曰河精上為天漢鄭玄曰天河水氣也精光運轉於天楊泉物理論曰星者元氣之英也漢水之精也氣發而著精華浮上宛轉隨流名曰天河一曰雲漢故名定昆安樂有織成裙直錢一億花卉鳥獸皆如粟粒正視旁視日中影中各為一色上好擊毬好呼到翻由是風俗相尚駙馬武崇訓楊慎交灑油以築毬場慎交恭仁曾孫也恭仁楊師道之兄也上及皇后公主多營佛寺左拾遺京兆辛替否上疏諫略曰臣聞古之建官員不必備士有完行行下孟翻家有廉節朝廷有餘俸百姓有餘食伏惟陛下百倍行賞十倍增官金銀不供其印束帛不充於錫錫賜也豫也盡居纓冕之流鬻伎行巫或涉膏腴之地賈音古伎渠綺翻又曰公主陛下之愛女然而用不合於古義行不根於人心將恐變愛成憎翻福為禍何者竭人之力費人之財奪人之家愛數子而取三怨使邊疆之士不盡力朝廷之士不盡忠人之散矣獨持所愛何所恃乎君以人為本本固則邦寧書五子之歌曰民惟邦本本固邦寧又曰若以造寺必為理體理體猶言治體也避高宗諱以治為理則殷周已往皆暗亂漢魏已降皆聖明殷周已往為不長漢魏已降為不短矣陛下緩其所急急其所緩親未來而疏見在見賢遍翻失真實而冀虛無重俗人之為輕天子之業雖以陰陽為炭萬物為銅役不食之人使不衣之士猶尚不給用漢劉陶語意風動雨潤而後得之乎一旦風塵再擾霜雹荐臻沙彌不可操干戈寺塔不足攘飢饉臣竊惜之疏奏不省操千高翻省悉景翻時斜封官皆不由兩省而授兩省莫敢執奏即宣示所司吏部員外郎李朝隱前後執破一千四百餘人怨謗紛然朝隱一無所顧朝直遙翻景龍二年冬十月己酉修文館直學士起居舍人武平一上表請抑損外戚權寵不敢斥言韋氏但請抑損己家上優制不許平一名甄以字行載德之子也武氏之盛載德封潁川郡王景龍二年十一月庚申突騎施酋長娑葛自立為可汗殺唐使者御史中丞馮嘉賓遣其弟遮努等帥衆犯塞騎奇寄翻酋慈由翻長知兩翻娑素何翻可從刊入聲汗音寒使疏吏翻帥讀曰率初娑葛既代烏質勒統衆見上卷神龍二年將即亮翻啜陟劣翻考異曰郭元振傳作阿史那闕啜忠節突厥傳止謂之闕啜忠節文館記謂之阿史那忠節元振疏皆云忠節乃其名也突厥有五啜其一曰胡祿居闕啜或者忠節官為闕啜歟今從突厥傳今按西突厥亦姓阿史那氏闕部落之名啜官名也忠節人名也諸家有書阿史那闕啜忠節者詳書之也或書官以綴其名或書姓以綴其名者約文也數相攻擊忠節衆弱不能支金山道行軍總管郭元振奏追忠節入朝宿衛忠節行至播仙城經略使右威衛將軍周以悌説之曰唐置四鎮經略使於安西府數所角翻朝直遙翻下同使疏吏翻下間使同説輸芮翻國家不愛高官顯爵以待君者以君有部落之衆故也今脫身入朝一老胡耳豈惟不保寵祿死生亦制於人手方今宰相宗楚客紀處訥用事不若厚賂二公請留不行發安西兵及引吐蕃以擊娑葛相息亮翻處昌呂翻訥內骨翻吐從暾入聲求阿史那獻為可汗以招十姓獻阿史那彌射之孫元慶之子杜環經行記拔汗那國在怛邏斯南千里東隔山去疏勒二千餘里西去石國千餘里又得報仇比於入朝豈可同日語哉郭虔瓘者歷城人歷城縣漢晉屬濟南郡後魏以來帶齊州忠節然其言遣間使賂楚客處訥請如以悌之策將即亮翻間古莧翻元振聞其謀上疏以為往歲吐蕃所以犯邊正為求十姓四鎮之地不獲故耳求十姓四鎮事始二百五卷武后萬歲通天元年為于偽翻下能為同謂入貢而金城公主下嫁也比毗至翻直以國多內難謂贊普南征而死國中大亂嫡庶競立將相爭權自相屠滅難乃旦翻恐中國乘其弊故且屈志求自昵昵尼質翻使其國小安豈能忘取十姓四鎮之地哉今忠節不論國家大計直欲為吐蕃鄉導畜許救翻鄉讀曰嚮恐四鎮危機將從此始頃緣默啜憑陵所應者多兼四鎮兵疲弊勢未能為忠節經略非憐突騎施也忠節不體國家中外之意而更求吐蕃吐蕃得志則忠節在其掌握豈得復事唐也復扶又翻往年吐蕃無恩於中國猶欲求十姓四鎮之地即謂萬歲通天元年事請分于闐疏勒不知以何理抑之又其所部諸蠻及婆羅門等方不服若借唐兵助討之亦不知以何詞拒之是以古之智者皆不願受夷狄之惠蓋豫憂其求請無厭厭於鹽翻終為後患故也又彼請阿史那獻者豈非以獻為可汗子孫欲依之以招懷十姓乎按獻父元慶叔父僕羅兄俀子及斛瑟羅懷道等皆可汗子孫也往者唐及吐蕃遍曾立之以為可汗欲以招撫十姓武后垂拱元年册元慶為可汗見二百三卷册斛瑟羅按舊書亦在是卷二年俀子見二百五卷延載元年長安四年册懷道為可汗見二百七卷僕羅俀子蓋皆吐蕃所立俀吐猥翻尋自破滅何則此屬非有過人之才恩威不足以動衆雖復可汗舊種復扶又翻種章勇翻衆心終不親附況獻又疏遠於其父兄乎若使忠節兵力自能誘脅十姓誘音酉則不必求立可汗子孫也又欲令郭虔瓘入拔汗那發其兵虔瓘前此已嘗與忠節亶入拔汗那發兵不能得其片甲匹馬而拔汗那不勝侵擾勝音升南引吐蕃奉俀子還侵四鎮時拔汗那四旁無強寇為援虔瓘等恣為侵掠如獨行無人之境猶引俀子為患今北有娑葛急則與之並力內則諸胡堅壁拒守外則突厥伺隙邀遮伺相吏翻臣料虔瓘等此行必不能如往年之得志內外受敵自陷危亡徒與虜結隙令四鎮不安以臣愚揣之實為非計揣初委翻楚客等不從建議遣馮嘉賓持節安撫忠節侍御史呂守素處置四鎮處昌呂翻以將軍牛師獎為安西副都護發甘涼以西兵兼徵吐蕃以討娑葛娑葛遣使娑臘獻馬在京師聞其謀馳還報娑葛於是娑葛發五千騎出安西五千騎出撥換五千騎出焉耆五千騎出疏勒入寇騎奇寄翻元振在疏勒柵於河口不敢出忠節逆嘉賓於計舒河口娑葛遣兵襲之生擒忠節殺嘉賓擒呂守素於僻城縛於驛柱而殺之古瓦翻考異曰御史臺記云嘉賓為中丞神龍中起復持節甘涼時郭元振都督涼州奏中書令宗楚客受娑葛金兩石請紹封為可汗楚客憾之既用事時議云委嘉賓與侍御史呂守素按元振元振竊知之乃諷番落害嘉賓于驛中獲函中敕云元振父亡匿不發喪至是為發之仍按其不臣之狀便誅之元振以為偽敕具以聞今從舊傳景龍二年上以安樂公主將適左衛中郎將武延秀遣使召太子賓客武攸緒於嵩山郎將即亮翻使疏吏翻攸緒將至上敕禮官於兩儀殿設別位欲行問道之禮聽以山服葛巾入見不名不拜見賢遍翻下辭見同仗入自太極殿前喚仗從東西上閣門入立於兩儀殿前引就問道之位再拜如常儀凡百官自中朝出為外官赴朝辭自外官入朝覲者引入見其辭見者不與百官序班自為班立謂之辭見班杜佑曰唐制供奉官左右散騎常侍門下中書侍郎諫議大夫給事中中書舍人左右遺補通事舍人在橫班辭見者各從兼官班在正官之次品式令前官被召見及赴朝參致仕者在本品見任上以理解官者在同品下竟不成所擬之禮上屢延之內殿頻煩寵錫皆謝不受親貴謁候寒溫之外不交一言初武崇訓之尚公主也帝蓋自房陵還始以公主適崇訓數所角翻延秀美姿儀善歌舞公主悅之及崇訓死見上卷元年己卯成禮假皇后仗唐六典宮官六尚尚服局有司仗典仗掌仗之官掌羽儀仗衛之事又按唐制皇后乘重翟厭翟翟車安車四望車金根車而公主乘厭翟車則下皇后一等此時蓋以重翟及皇后儀衛假之也命安國相王障車相息亮翻庚辰赦天下考異曰實録新舊紀皆云己卯大赦今從景龍文館記成禮之明日兼右衛將軍辛巳宴㣥臣于兩儀殿命公主出拜公卿公卿皆伏地稽首稽音啓景龍二年癸未牛師獎與突騎施娑葛戰于火燒城師獎兵敗沒娑葛遂陷安西安西都護府時在龜茲斷音短遣使上表求宗楚客頭使疏吏翻上時掌翻楚客又奏以周以悌代郭元振統衆徵元振入朝朝直遙翻以阿史那獻為十姓可汗置軍焉耆以討娑葛娑葛遺元振書遺于季翻稱我與唐初無惡但讎闕啜宗尚書受闕啜金欲枉破奴部落馮中丞牛都護相繼而來宗尚書謂楚客馮中丞謂嘉賓牛都護謂師獎各稱其官也又聞史獻欲來史獻即阿史那獻約言之恐未有寧日乞大使商量處置元振奏娑葛書楚客怒奏言元振有異圖召將罪之元振使其子鴻間道具奏其狀乞留定西土不敢歸周以悌竟坐流白州復以元振代以悌處昌呂翻間古莧翻復扶又翻考異曰元載玄宗實録舊傳皆云復以元振代以悌元振奏稱西土未寧逗留不敢歸京師按既代以悌則復留居西邊矣何所逗留今從新傳赦娑葛罪册為十四姓可汗西突厥先有十姓今併咽麥丏葛邏祿莫賀達干都摩支為十四姓景龍二年以婕妤上官氏為昭容景龍二年十二月御史中丞姚廷筠奏稱比見諸司不遵律令格式事無大小皆悉聞奏臣聞為君者任臣為臣者奉法萬機叢委不可遍覽豈有修一水竇伐一枯木皆取斷宸衷比毗至翻斷丁亂翻自今若軍國大事及條式無文者聽奏取進止自餘各準法處分處昌呂翻分扶問翻其有故生疑滯致有稽失望令御史糾彈從之景龍二年丁巳晦敕中書門下與學士諸王駙馬入閣守歲設庭燎置酒奏樂閣內殿也守歲之宴古無之梁庾肩吾除夕詩聊傾柏葉酒試奠五辛盤蓋江左已有此矣然未至君臣相與酣適也隋煬帝淫侈每除夜殿前諸院設火山數十盡沈香木根每一山皆焚沈香數車火光暗則以甲煎沃之焰起數丈香聞數十里一夜之間用沈香二百餘乘甲煎過二百餘石歐陽修詩隋宮守夜沈香火謂此也帝之為此亡隋之續耳上謂御史大夫竇從一曰聞卿久無伉儷酣戶甘翻伉苦浪翻儷力計翻朕甚憂之今夕歲除為卿成禮從一但唯唯拜謝為于偽翻唯于癸翻俄而內侍引燭籠步障金縷羅扇自西廊而上內侍之官唐從四品上掌在內侍奉出入宮掖宣傳之事後魏曰長秋卿北齊曰中侍中後周曰司內上士隋曰內侍唐因之中官之貴極于此矣若有殊勳懋績則有拜大將軍者仍兼內侍之官上時掌翻花叉唐制命婦之服有翟衣內命婦受册從蠶朝會外命婦嫁及受册從蠶大朝會之服也青質繡翟編次於衣及裳重為九等一品翟九等花叉九樹二品翟八等花叉八樹三品至五品皆降殺以一禮衣者內命婦常參外命婦朝參辭見禮會之服也制同翟衣加雙佩小綬去舄加履人衣於既翻上命從一誦卻扇詩數首唐人成婚之夕有催妝詩卻扇詩李商隱代董秀才卻扇詩云莫將畫扇出帷來遮掩春山滯上才若道團圓是明月此中須放桂花開去花易服而出去羌呂翻徐視之乃皇后老乳母王氏本蠻婢也上與侍臣大笑詔封莒國夫人嫁為從一妻俗謂乳母之壻曰阿父從一每謁見及進表狀自稱翊聖皇后阿父時人謂之國父阿烏葛翻父正奢翻見賢遍翻從一欣然有自負之色三年三年春正月丁卯制廣東都聖善寺按西京已有聖善寺東都亦有聖善寺皆帝所建為武后追福三年長寧安樂諸公主多縱僮奴掠百姓子女為奴婢侍御史袁從之收繫獄治之樂音洛治直之翻公主訴於上上手制釋之從之奏稱陛下縱奴掠良人何以理天下上竟釋之三年二月己丑上幸玄武門與近臣觀宮女拔河以麻緪巨竹分朋而挽水謂之拔河以定勝負考異曰唐紀云觀宮女大酺今從實録公卿為商旅與之交易因為忿爭言辭褻慢上與后臨觀為樂褻息列翻樂音洛三年丙申監察御史崔琬對仗彈宗楚客紀處訥潛通戎狄受其貨賂致生邊患謂受闕啜忠節賂以致娑葛畔換也考異曰景龍文館記曰監察御史崔琬具衣冠對仗彈大學士兵部尚書郢國公宗楚客及侍中紀處訥時楚客在列奏言臣以庸妄叨居樞密中外朋結謀臣臣先奏聞計垂天鑒上頷之謂琬曰楚客事朕知且去待仗下來至仗下後琬方續奏敕令於西省對問中書門下奏無狀有進止即令復位初娑葛父子與阿史那忠節代為仇讎娑葛頻乞國家為除忠節安西都護郭元振表請如其奏宗楚客固執言忠節竭誠於國作扞玉關若許娑葛除之恐非威強拯弱之義上由是不許無何娑葛亶殺御史中丞馮嘉賓殿中侍御史呂守素破滅忠節侵擾四鎮時碎葉鎮守使中郎周以悌率鎮兵數百人大破之奪其所侵忠節及于闐部衆數萬口奏到上大悅拜以悌左屯衛將軍仍以元振四鎮經略使授之敕書簿責元振宗議發徑卒令以悌及郭虔瓘北討仍邀吐蕃及西域諸部計會同擊娑葛右臺御史大夫解琬議稱不可後竟與之和娑葛聞前議大怨乃付元振狀稱宗先取忠節金上以問之宗具以前事奏時太平安樂二公主以親貴權寵各立黨與陰相傾奪爰自要官宰臣皆分為兩時太平尤與宗不善故諷琬以彈之外傳取娑葛金非也今從實録記大臣被彈被皮義翻俯僂趨出俯首為俯傴背為僂僂力主翻朝直遙翻至是楚客更憤怒作色自陳忠鯁為琬所誣上竟不窮問命琬與楚客結為兄弟以和解之時人謂之和事天子三年壬寅韋巨源為左僕射楊再思為右僕射並同中書門下三品三年上數與近臣學士宴集令各效伎藝以為樂數所角翻伎渠綺翻樂音洛工部尚書張錫舞談容娘將作大匠宗晉卿舞渾脫長孫無忌以烏羊毛為渾脫氈帽人多效之謂之趙公渾脫因演以為舞如意初里歌曰黃麞黃麞草裏藏彎弓射爾傷亦演以為舞今所謂天竺神呪也國子司業河東郭山惲獨曰臣無所解上時掌翻惲於粉翻解戶買翻曉也請歌古詩上許之山惲乃歌鹿鳴蟋蟀鹿鳴宴㣥臣嘉賓蟋蟀取好樂無荒之義然山惲欲以所業自見以附於儒學而已非能納君於善上賜山惲敕嘉美其意賜時服一襲上又嘗宴侍臣使各為回波辭時內宴酒酣侍臣率起為回波舞故使為回波辭或自求榮祿諫議大夫李景伯曰回波爾時酒巵微臣職在針規侍宴既過三爵左傳曰臣侍君宴不過三爵過三爵非禮也上不悅蕭至忠曰此真諫官也三年三月戊午以宗楚客為中書令蕭至忠為侍中太府卿韋嗣立為中書侍郎同中書門下三品考異曰新表云嗣立守兵部尚書今從實録崔湜通於上官昭容故昭容引以為相湜常職翻相息亮翻彥昭張掖人也張掖故胸奴渾邪王地漢武帝開置張掖郡及觻得縣應劭曰張國臂掖故曰張掖觻得郡所治胸奴王號也晉改觻得為永平後魏置張掖軍隋開皇十七年改永平為酒泉大業初改為張掖縣其地自西魏以來為甘州治所取州甘峻山為名觻音祿時政出多門濫官充溢人以為三無坐處謂宰相御史及員外官也韋嗣立上疏以為比者造寺極多比毗至翻務取崇麗大則用錢百數十萬小則三五萬無慮所費千萬以上人力勞弊怨嗟盈路佛之為教要在降伏身心降戶江翻豈雕畫土木相誇壯麗萬一水旱為災戎狄構患雖龍象如雲將何救哉又食封之家其數甚衆昨問戶部云用六十餘萬丁一丁絹兩匹凡百二十餘萬匹唐初之制一丁歲輸絹二匹每歲庸絹多不過百萬少則六七十萬匹少詩沼翻下同比之封家所入殊少夫有佐命之勳始可分茅胙土國初功臣食封者不過三二十家今以恩澤食封者乃踰百數國家租賦太半私門私門有餘徒益奢侈公家不足坐致憂危制國之方豈謂為得封戶之物諸家自徵僮僕依勢陵轢州縣多索裹頭轢郎狄翻裹頭謂行士冖柘齎裹以自資者今謂答頭裹古臥翻轉行貿易煩擾驅迫不勝其苦不若悉計丁輸之太府使封家於左藏受之勝音升藏徂浪翻於事為愈謂猶勝於封家自徵也員外置官數倍正闕曹署典吏困於祗承府庫倉儲竭於資奉又刺史縣令近年以來不存簡擇京官有犯及聲望下者方遣刺州吏部選人衰耄無手筆者方補縣令選須絹翻下選法同以此理人何望率化望自今應除三省兩臺及五品以上清望官兩臺謂左右御史臺則天下理矣上弗聽三年戊寅以禮部尚書韋溫為太子少保同中書門下三品太常卿鄭愔為吏部尚書同平章事按下書吏部侍郎同平章事鄭愔又考新書本紀是年是月是日書太常少卿鄭愔守吏部侍郎同中書門下平章事則知傳寫通鑑者誤以侍郎為尚書也皇后之兄也三年太常博士唐紹以武氏昊陵順陵置守戶五百與昭陵數同梁宣王魯忠王墓守戶多於親王五倍梁宣王武三思魯忠王武崇訓立褒德廟見上卷元年不聽量音良紹臨之孫也唐臨歷事高祖太宗高宗三年中書侍郎兼知吏部侍郎同平章事崔湜吏部侍郎同平章事鄭愔俱掌銓衡傾附勢要贓賄狼籍數外留人授擬不足逆用三年闕選法之壞至於我宋極矣吏部注擬率一官而三人共之居之者一人未至者一人伺之者又一人稍有美闕伺之者又不特一人也豈止逆用三年闕哉湜父挹為司業受選人錢湜不之知長名放之高宗總章二年裴行儉始設長名榜凡選人之集于吏部者得者留不得者放宋白曰長名榜定留放留者入選放者不得入選公所親受某賂奈何不與官湜怒曰所親為誰當擒取杖殺之其人曰公勿杖殺將使公遭憂湜大慚侍御史靳恆與監察御史李尚隱對仗彈之靳居焮翻恆戶登翻監古銜翻彈徒丹翻上下湜等獄命監察御史裴漼按之漼七罪翻安樂公主諷漼寬其獄漼復對仗彈之夏五月丙寅愔免死流吉州湜貶江州司馬舊志江州京師東南二千九百四十八里至東都二千一百九十七里復扶又翻為于偽翻明日以湜為襄州刺史舊志襄州京師東南至東都八百五十三里愔為江州司馬三年六月右僕射同中書門下三品楊再思薨三年秋七月突騎施娑葛遣使請降騎奇寄翻娑素何翻使疏吏翻降戶江翻庚辰拜欽化嚴欽化改歸化可汗賜名守忠三年八月己嚴己改乙酉以李嶠同中書門下三品韋安石為侍中蕭至忠為中書令至忠女適皇后舅子崔無詖詖彼義翻成昏日上主蕭氏后主崔氏時人謂之天子嫁女皇后娶婦三年上將祀南郊丁酉國子祭酒祝欽明國子司業郭山惲建言古者大祭祀后祼獻以瑤爵皇后當助祭天地太常博士唐紹蔣欽緒駮之以為鄭玄注周禮內司服惟有助祭先王先公無助祭天地之文皇后不當助祭南郊周禮內宰大祭祀后祼獻則贊瑤爵亦如之注云謂祭宗廟王既祼而出迎牲后乃從後祼也獻謂薦腥薦熟后亦從後獻也瑤爵謂尸卒食王既酳尸后亞獻之其爵以瑤為飾又內司服掌王后之六服褘衣揄狄闕狄鞠衣展衣褖衣素沙注云褘衣揄狄闕狄三者皆祭服從王祭先王則服褘衣祭先公則服揄狄祭㣥小祀則服闕狄今世有圭衣者蓋三狄之遺俗據周禮則內宰所謂大祭祀指言祭宗廟也祝欽明等因唐制以天地宗廟並為大祀遂以周禮大祭祀傅會其説以諂韋后而周禮鄭義所謂祼也獻也瑤爵也乃祭時行禮之三節今欽明言后祼獻以瑤爵亦背鄭義自為之説也祼古玩翻駮北角翻鹽官漢海鹽地舊有鹽官吳因立為縣名唐屬杭州祭天惟以始祖為主不配以祖妣故皇后不應預祭韋巨源定儀注請依欽明議上從之以皇后為亞獻仍以宰相女為齋娘助執豆籩欽明又欲以安樂公主為終獻紹欽緒固爭乃止以巨源攝太尉為終獻欽緒膠水人也膠水漢膠東國地晉武帝置長廣郡後魏為光州治所隋仁壽元年改長廣為膠水縣屬萊州三年己張己作乙巳上幸定昆池命從官賦詩黃門侍郎李日知詩曰所願暫思居者逸勿使時稱作者勞從才用翻暫與暫同及睿宗即位謂日知曰當是時朕亦不敢言之睿宗之言蓋謂當時畏安樂公主之勢也三年九月戊辰以蘇王褱為右僕射同中書門下三品王褱古回翻三年太平安樂公主各樹朋黨更相譖毀更工衡翻上患之冬十一月癸亥上謂修文館直學士武平一曰比聞內外親貴多不輯睦以何法和之平一以為此由讒諂之人陰為離間比毗至翻間古莧翻宜深加誨諭斥逐姦險若猶未已伏願捨近圖遠抑慈存嚴示以知禁無令積惡上賜平一帛而不能用其言三年上召前修文館學士崔湜鄭愔入陪大禮乙丑上祀南郊赦天下並十惡咸赦除之十惡恩赦之所不原齋娘有壻者皆改官三年甲戌開府儀同三司平章軍國重事豆盧欽望薨平章軍國重事蓋自豆盧欽望始三年乙亥吐蕃贊普遣其大臣尚贊咄等千餘人逆金城公主咄當沒翻考異曰實録乙亥吐蕃大臣尚贊吐等來逆女文館記云吐蕃使其大首領瑟瑟告身贊咄金告身尚欽藏以下來迎金城公主譯者云贊咄猶此左僕射欽藏猶此侍中蓋贊咄即贊吐也今從文館記三年河南道巡察使監察御史宋務光使疏吏翻下同以於時食實封者凡一百四十餘家唐制食實封者得真戶戶皆三丁以上一分入國開元定制以三丁為限租賦全入封家皆割上腴之田或一封分食數州而太平安樂公主又取高資多丁者刻剝過苦應充封戶者甚於征役滑州地出綾縑唐六典滑州貢方紋綾趨七喻翻射而亦翻尤受其弊人多流亡請稍分封戶散配餘州又徵封使者煩擾公私請附租庸每年送納上弗聽三年時流人皆放還均州刺史譙王重福獨不得歸重福徙均州見上卷神龍元年重直龍翻陛下焚柴展禮郊祀上玄蒼生並得赦除赤子偏加擯棄赤子重福自謂也固若此乎天下之人聞者為臣流涕為于偽翻況陛下慈念豈不愍臣栖遑栖遑者離索憂迫之意不報三年前右僕射致仕唐休璟年八十餘進取彌鋭娶賀婁尚宮養女為其子婦十二月壬辰以休璟為太子少師同中書門下三品璟俱永翻考異曰舊紀誤作壬戌今從實録三年甲午上幸驪山溫湯庚子幸韋嗣立莊舍別業為莊賜爵逍遙公韋敻事見一百六十七卷陳高祖永定三年敻休正翻皇后之疏屬也由是顧賞尤重乙巳還宮三年是歲關中飢米斗百錢運山東江淮穀輸京師牛死什八九㣥臣多請車駕復幸東都韋后家本杜陵不樂東遷乃使巫覡彭君卿等説上云今歲不利東行後復有言者復扶又翻樂音洛覡刑狄翻説輸芮翻上怒曰豈有逐糧天子邪乃止睿宗玄真大聖大興孝皇帝上諱旦高宗第八子也初名旭輪後去旭名輪後改名旦初諡大聖真皇帝廟號睿宗天寶八載追尊玄真大聖皇帝十三載加尊玄真大聖大興孝皇帝景雲元年庚戌七一是年六月改元唐隆七月始改元景雲三年春正月丙寅夜中宗與韋后微行觀燈於市里又縱宮女數千人出遊多不歸者三年上命紀處訥送金城公主適吐蕃處訥辭又命趙彥昭彥昭亦辭丁丑命左驍衛大將軍楊矩送之驍堅堯翻己卯上自送公主至始平二月癸未還宮公主至吐蕃贊普為之別築城以居之三年庚戌上御梨園毬場程大昌曰梨園在光化門北光化門者禁苑南面西頭第一門在芳林景曜門之西也中宗令學士自芳林門入集於梨園分朋拔河則梨園在太極宮西禁苑之內矣開元二年玄宗置教坊於蓬萊宮上自教法曲謂之梨園弟子至天寶中即東宮置宜春北苑命宮女數百人為梨園弟子即是梨園者按樂之地而預教者名為弟子耳凡蓬萊宮宜春院皆不在梨園之內也韋巨源唐休璟衰老隨緪踣地緪古登翻踣蒲北翻久之不能興上及皇后主臨觀大笑三年夏四月丙戌上遊芳林園按唐禁苑廣矣漢長安都城盡入唐苑之內而漕渠首受豐水北流矩折入于禁苑而東流又矩折北流而入于渭苑地自漕渠之東大安宮垣之西南出與宮城齊南列三門中曰芳林自芳林門而入禁苑其地以芳林園為稱櫻桃按爾雅名楔荊桃樹多陰先百果熟大如拇指圓而色朱味甜每一朵率一二十顆核如豆大以鶯所含亦名含桃三年初則天之世長安城東隅民王純家井溢浸成大池數十頃號隆慶池池在隆慶坊南程大昌曰帝王之興若符瑞理固有之然而傅會者多六典所記隆慶坊有井忽湧為小池周袤十數丈常有雲氣或黃龍出其中至景雲間潛復出水其沼浸廣里人悉移居遂澒洞為龍池然豫詳而考之長安志曰龍池在躍龍門南本是平地自垂拱初載後因雨水流潦為小流後又引龍首渠水分溉之日以滋廣至景龍中彌亙數頃深至數丈常有雲龍之謂後因謂之龍池志又曰隋城外東南角有龍首堰自此堰分滻水北流至長樂坡分為二渠其西渠自永嘉坊西南流經興慶宮則是興慶之能變平地為龍池者實引滻之力也至六典所紀則全沒導滻之實乃言初時井溢已乃泉生合二水以成此池專以歸諸變化也壽春王成器臨淄王隆基衡陽王成義巴陵王隆範彭城王隆業五王皆相王子常鬱鬱有帝王氣比日尤盛比毗至翻乙未上幸隆慶池考異曰景龍文館記以為其月十二日按長曆是月壬午朔今從實録本紀宴侍臣泛舟戲象以厭之厭於葉翻時人以為玄宗受命之祥三年定州人郎岌上言韋后宗楚客將為逆亂岌魚及翻上時掌翻韋后白上杖殺之五月丁卯許州司兵參軍偃師燕欽融復上言皇后淫亂干預國政唐諸州兵曹司兵參軍事掌武官選兵甲器仗門禁管籥軍防烽候傳驛畋獵燕因肩翻復扶又翻上時掌翻安樂公主武延秀宗楚客圖危宗社上召欽融面詰之欽融頓首抗言神色不橈上默然宗楚客矯制令飛騎撲殺之詰去吉翻橈奴教翻騎奇寄翻撲弼角翻投於殿庭石上折頸而死楚客大呼稱快折而設翻呼火故翻上雖不窮問意頗怏怏不悅怏於兩翻由是韋后及其黨始憂懼為韋后弒逆張本三年己卯上宴近臣國子祭酒祝欽明自請作八風舞搖頭轉目備諸醜態祝欽明所謂八風舞非春秋魯大夫衆仲所謂舞者所以節八音行八風者也借八風之名而備諸淫醜之態耳今人謂淫放不返為風此則欽明所謂八風也欽明素以儒學著名吏部侍郎盧藏用私謂諸學士曰祝公五經掃地盡矣諸學士者修文館學士及直學士也三年散騎常侍馬秦客以醫術光祿少卿楊均以善烹調皆出入宮掖得幸於韋后恐事泄被誅散悉亶翻騎奇寄翻被皮義翻自為皇太女乃相與合謀於餅餤中進毒六月壬午中宗崩於神龍殿年五十五神龍殿以年號名自兩儀殿東入神龍門至神龍殿六典兩儀殿之北曰甘露門其內甘露殿左曰神龍門其內則神龍殿樂音洛朝直遙翻餤弋廉翻又徒甘翻韋后祕不發喪自總庶政癸未召諸宰相入禁中徵諸府兵五萬人屯京城使駙馬都尉韋捷韋灌韋捷尚中宗女成安公主韋灌尚定安公主璿似宣翻將即亮翻考異曰景龍文館記徵諸兵士二千人屯皇城左右衛令韋捷韋濯押當又令韋錡押羽林軍韋播高嵩分押左右營萬騎韋元巡六街實録兵五萬人韋濯作韋灌今從之璿溫之族弟播從子嵩其甥也從才用翻下同中書舍人韋元徼巡六街長安城中左右六街金吾街使主之左右金吾將軍掌晝夜巡警之法以執禦非違徼吉弔翻以備譙王重福等將即亮翻重直龍翻下同以刑部尚書裴談工部尚書張錫並同中書門下三品仍充東都留守守式又翻吏部尚書張嘉福中書侍郎岑羲吏部侍郎崔湜並同平章事羲長倩之從子也太平公主與上官昭容謀草遺制立溫王重茂為皇太子皇后知政事相王旦參謀政事宗楚客密謂韋溫曰相王輔政於理非宜且於皇后嫂叔不通問引記曲禮之言相息亮翻何以為禮遂帥諸宰相表請皇后臨朝罷相王政事朝直遙翻帥讀曰率蘇王褱曰遺詔豈可改邪溫楚客怒王褱懼而從之乃以相王為太子太師甲申梓宮遷御太極殿西內正殿曰太極殿皇后臨朝攝政赦天下改元唐隆進相王旦太尉雍王守禮為豳王雍於用翻壽春王成器為宋王以從人望命韋溫總知內外守捉兵馬事丁亥殤帝即位時年十六尊皇后為皇太后立陸氏為皇后壬辰命紀處訥持節巡撫關內道岑羲河南道張嘉福河北道宗楚客與太常卿武延秀司農卿趙履溫國子祭酒葉靜能及諸韋共勸韋后遵武后故事欲遵武后易姓事也南軍十六衛軍北軍羽林及萬騎也臺閣尚書諸司也廣聚黨衆中外連結楚客又密上書稱引圖讖謂韋氏宜革唐命讖楚譖翻考異曰舊傳安樂府倉曹苻鳳説武延秀曰天下之心未忘武氏讖云黑衣神孫披天裳公神皇之孫也大周之業可以再興勸延秀常衣皂袍以應之中宗實録云宗楚客與弟將作大匠晉卿太常少卿李㥚將作少監李守貞日夜潛圖令延秀速起事太上皇實録云楚客神龍初為太僕卿與武三思潛謀篡逆纍遷同三品及三思誅附安樂而韋氏尤信任之楚客嘗謂所親曰始吾在卑位尤愛宰相及居之又思太極南面一日足矣雖附韋氏志窺宸極此所謂天下之惡皆歸焉者也今所不取謀害殤帝深忌相王及太平公主密與韋溫安樂公主謀去之去羌呂翻相王子臨淄王隆基先罷潞州別駕唐制上州別駕從四品下中州正五品下下州從五品上陰聚才勇之士謀匡復社稷初太宗選官戶及蕃口驍勇者著虎文衣跨豹文韀驍堅堯翻著則略翻韀則前翻馬被具也從遊獵於馬前射禽獸謂之百騎射而亦翻騎奇寄翻下同則天時稍增為千騎隸左右羽林中宗謂之萬騎置使以領之使疏吏翻隆基皆厚結其豪傑兵部侍郎崔日用素附韋武與宗楚客善知楚客謀恐禍及己遣寶昌寺僧普潤密詣隆基告之勸其速發隆基乃與太平公主及公主子衛尉卿薛崇暕嚴暕改簡下同暕古限翻苑總監贛人鍾紹京鍾紹京西京苑總監也唐京都苑各有總監一人從五品下掌宮苑內館園池之事凡禽魚果木皆總而司之贛縣漢屬豫章郡吳晉屬廬陵郡宋以下為南康郡治所唐帶虔州贛師古古暗翻劉昫古濫翻朝直遙翻利仁府折衝麻嗣宗唐雍州有府百三十一其逸者百二十利仁府必屬雍州韋播高嵩數榜捶萬騎欲以立威先悉薦翻數所角翻榜音彭捶止蕊翻萬騎皆怨果毅葛福順陳玄禮見隆基訴之隆基諷以誅諸韋皆踴躍請以死自效萬騎果毅李仙鳧亦預其謀或謂隆基當啓相王隆基曰我曹為此以徇社稷事成福歸於王不成以身死之不以纍王也纍力瑞翻今啓而見從則王預危事不從將敗大計遂不啓史言隆基有大略所以能平內難敗補邁翻庚子晡時隆基微服與幽求等入苑中唐禁苑在皇城之北苑城東西二十七里南北三十里東抵霸水西連故長安城南連京城北枕渭水苑內離宮亭觀二十四所漢長安故城東西十三里皆隸入苑中廨古隘翻紹京悔欲拒之其妻許氏曰忘身徇國神必助之且同謀素定今雖不行庸得免乎紹京乃趨出拜謁隆基執其手與坐紹京趨出拜謁者示尊奉隆基也隆基執手與坐示不敢當且以結其心也逮夜葛福順李仙鳧皆至隆基所請號而行凡用兵下營及攻襲就主帥取號以備緩急相照應天星散落如雪劉幽求曰天意如此時不可失福順拔劍直入羽林營斬韋璿韋播高嵩以徇曰韋后鴆殺先帝謀危社稷今夕當共誅諸韋馬鞭以上皆斬之言諸韋男女長及馬鞭以上者皆斬敢有懷兩端助逆黨者罪及三族羽林之士皆欣然聽命乃送璿等首於隆基隆基取火視之遂與幽求等出苑南門禁苑南門直宮城之玄武門執斧鋸以從帥讀曰率下同從才用翻使福順將左萬騎攻玄德門仙鳧將右萬騎攻白獸門白獸門即白獸闥即杜甫北征詩所謂寂寞白獸闥者是也與玄德門皆通內諸門之數將即亮翻下同即大譟譟蘇到翻福順等共殺守門將斬關而入隆基勒兵玄武門外三鼓聞譟聲帥總監及羽林兵而入諸衛兵在太極殿宿衛梓宮者此南牙諸衛兵也皆被甲應之被皮義翻韋后惶惑走入飛騎營有飛騎斬其首獻於隆基安樂公主方照鏡畫眉軍士斬之斬武延秀於肅章門外斬內將軍賀婁氏於太極殿西時韋氏以婦人為內將軍蓋即賀婁尚宮為之也初上官昭容引其從母之子王昱為左拾遺母之姊妹謂之從母從才用翻説輸芮翻武氏天之所廢不可興也今婕妤附於三思此滅族之道也願姨思之鄭氏以戒昭容昭容弗聽及太子重俊起兵討三思索昭容事見上卷景龍元年索山客翻下同思昱言自是心附帝室與安樂公主各樹朋黨及中宗崩昭容草遺制立溫王以相王輔政宗韋改之及隆基入宮昭容執燭帥宮人迎之以制草示劉幽求幽求為之言為于偽翻隆基不許斬於旗下時少帝在太極殿少詩照翻劉幽求曰衆約今夕共立相王何不早定隆基遽止之捕索諸韋在宮中及守諸門並素為韋后所親信者皆斬之比曉內外皆定辛巳隆基出見相王比必利翻見賢遍翻叩頭謝不先啓之罪相王抱之泣曰社稷宗廟不墜於地汝之力也遂迎相王入輔少帝閉宮門及京城門分遣萬騎收捕諸韋親黨斬太子少保同中書門下三品韋溫於東市之北中書令宗楚客衣斬衰乘青驢逃出至通化門衣於既翻衰倉回翻通化門京城東面北來第一門門者曰公宗尚書也去布帽執而斬之並斬其弟晉卿考異曰太上實録云斬楚客于春明門外今從僉載太上録殺晉卿于定陵按定陵中宗陵也於時未有今不取去羌呂翻慰諭百姓唐六典曰皇城西面二門北曰安福南曰順義安福門西直開遠門趙履溫傾國資以奉安樂公主為之起第舍築臺穿池無休已擫紫衫以項挽公主犢車為于偽翻擫益涉翻公主死履溫馳詣安福樓下舞蹈稱萬歲聲未絶相王令萬騎斬之百姓怨其勞役爭割其肉立盡祕書監汴王雍娶韋后妹崇國夫人崇古國名雍鳳之孫也鳳高祖之子家人勸之逃匿巨源曰吾位大臣豈可聞難不赴射寅謝翻難乃旦翻出至都街為亂兵所殺時年八十於是梟馬秦客楊均葉靜能等首尸韋后於市崔日用將兵誅諸韋於杜曲唐京城南韋杜二族居之謂之韋曲杜曲語云城南韋杜去天尺五時諸韋門宗強盛侵杜曲而居之梟堅堯翻將知亮翻又音如字襁居兩翻褓音保諸杜濫死非一是日赦天下云逆賊魁首已誅自餘支黨一無所問以臨淄王隆基為平王兼知內外間廣既平王固以平州為國名實以平內難褒以此名六典尚乘奉御掌內外間廣既之馬一曰左右飛黃間二曰左右吉良間三曰左右龍媒間四曰左右騊駼間五曰左右駃騠間六曰左右天苑間開元時仗內六間曰飛龍翔麟鳳苑鵷鸞吉良六㣥等六廣既奔星內駒等兩間仗外有左飛右飛左萬右萬等四間東南內西南內等兩廣既左右廂即前所謂左萬騎右萬騎也以鍾紹京守中書侍郎劉幽求守中書舍人並參知機務麻嗣宗行右金吾衛中郎將武氏宗屬誅死流竄殆盡武氏宗屬至是時誅竄宜盡矣而史曰殆盡者攸緒平一能避權遠勢而武惠者猶足以成殺三子之禍也吏部尚書同平章事張嘉福行至懷州皆收斬之舊志華州京師東百八十里懷州京師東九百六十九里華戶化翻壬寅劉幽求在太極殿有宮人與宦官令幽求作制書立太后幽求曰國有大難難乃旦翻人情不安山陵未畢遽立太后不可平王隆基曰此勿輕言遣十道使齎璽書宣撫及詣均州宣慰譙王重福使疏吏翻璽斯氏翻重直龍翻貶竇從一為濠州司馬舊志濠州京師東南二千一百五十里中宗時太平安樂等七公主皆開府置官屬癸卯太平公主傳少帝命請讓位於相王相王固辭以平王隆基為殿中監同中書門下三品以宋王成器為左衛大將軍衡陽王成義為右衛大將軍巴陵王隆範為左羽林大將軍彭城王隆業為右羽林大將軍光祿少卿嗣道王微檢校右金吾衛大將軍微元慶之孫也道王元慶高祖之子太平公主之子薛崇訓為右千牛衛將軍隆基有二奴王毛仲李守德皆趫勇善騎射趫巨嬌翻善走也常侍衛左右隆基之入苑中也毛仲避匿不從從才用翻事定數日方歸隆基不之責仍超拜將軍毛仲本高麗也為王毛仲貴寵致禍張本麗力知翻舊志沁州京師東北一千二十五里沁七鴆翻中書令蕭至忠貶許州刺史舊志許州京師東一千二百里中書侍郎同平章事趙彥昭貶絳州刺史吏部侍郎同平章事崔湜貶華州刺史劉幽求言於宋王成器平王隆基曰相王疇昔已居宸極㣥望所屬嗣聖元年則天廢中宗而立相王及革命以王為皇嗣屬之欲翻家國事重相王豈得尚守小節不早即位以鎮天下乎隆基曰王性恬淡不以代事嬰懷代事即世事避太宗諱云爾猶讓於人謂既讓武后又讓中宗也安肯代之乎幽求曰衆心不可違王雖欲高居獨善其如社稷何成器隆基入見相王見賢遍翻極言其事相王乃許之甲辰少帝在太極殿東隅西向相王立於梓宮旁太平公主曰皇帝欲以此位讓叔父可乎幽求跪曰國家多難皇帝仁孝追蹤堯舜誠合至公相王代之任重慈愛尤厚矣難乃旦翻任音壬乃以少帝制傳位相王時少帝猶在御座太平公主進曰天下之心已歸相王此非兒座遂提下之下遐嫁翻睿宗即位御承天門赦天下京城西內正門曰承天門以鍾紹京為中書令鍾紹京少為司農録事唐九寺皆有録事官九品蓋流外也少詩照翻朝直遙翻下同縱情賞罰衆皆惡之惡烏路翻太常少卿薛稷勸其上表禮讓上時掌翻紹京從之稷入言於上曰紹京雖有勳勞素無才德出自胥徒一旦超居元宰恐失聖朝具瞻之美詩云赫赫師尹民具爾瞻丙午改除戶部尚書尋出為蜀州刺史舊志蜀州去京師三千三百三十二里三年上將立太子以宋王成器嫡長而平王隆基有大功疑不能決成器辭曰國家安則先嫡長國家危則先有功苟違其宜長知兩翻先悉薦翻四海失望臣死不敢居平王之上涕泣固請者纍日大臣亦多言平王功大宜立劉幽求曰臣聞除天下之禍者當享天下之福平王拯社稷之危救君親之難難乃旦翻論功莫大語德最賢無可疑者上從之丁未立平王隆基為太子考異曰劉子玄先撰太上皇實録盡傳位後又撰睿宗實録終橋陵文字頗不同睿宗録及舊紀皆云丙午立太子今從太上皇録不許復扶又翻三年則天大聖皇后復舊號為天后追諡雍王賢曰章懷太子賢廢見二百二卷高宗永隆元年雍於用翻下同三年戊申以宋王成器為雍州牧揚州大都督太子太師三年置溫王重茂於內宅恐㣥不逞挾之以為變也三年以太常少卿薛稷為黃門侍郎參知機務稷以工書事上於藩邸其子伯陽尚仙源公主仙源公主帝女也後封荊山公主三年追削武三思武崇訓爵諡斫棺暴尸平其墳墓三年以許州刺史姚元之為兵部尚書同中書門下三品宋州刺史韋嗣立許州刺史蕭至忠為中書令絳州刺史趙彥昭為中書侍郎華州刺史崔湜為吏部侍郎並同平章事三年越州長史宋之問饒州刺史冉祖雍坐諂附韋武皆流嶺表三年己酉立衡陽王成義為申王巴陵王隆範為岐王彭城王隆業為薛王加太平公主實封滿萬戶太平公主沈敏多權略沈持林翻武后以為類己故於諸子中獨愛幸頗得預密謀然尚畏武后之嚴未敢招權勢及誅張易之公主有力焉誅張易之見二百七卷中宗神龍元年韋后安樂公主皆畏之又與太子共誅韋氏既屢立大功益尊重上常與之圖議大政每入奏事坐語移時或時不朝謁朝直遙翻則宰相就第咨之每宰相奏事上輒問嘗與太平議否又問與三郎議否然後可之三郎謂太子也公主所欲上無不聽自宰相以下進退繫其一言其餘薦士驟歷清顯者不可勝數權傾人主趨附其門者如市勝音升趨七喻翻子薛崇行崇敏崇簡皆封王田園遍於近甸收市營造諸器玩遠至嶺蜀輸送者相屬於路屬之欲翻居處奉養擬於宮掖處昌呂翻三年追贈郎岌燕欽融諫議大夫三年秋七月庚戌朔贈韋月將宣州刺史韋月將死見上卷中宗神龍二年三年癸丑以兵部侍郎崔日用為黃門侍郎參知機務三年追復故太子重俊位號太子重俊死見上卷中宗景龍元年復其官爵五王事見上卷神龍二年千里多祚與重俊同死見景龍元年三年丁巳以洛州長史宋璟檢校吏部尚書同中書門下三品岑羲罷為右散騎常侍兼刑部尚書璟與姚元之協心革中宗弊政進忠良退不肖賞罰盡公請託不行綱紀修舉當時翕然以為復有貞觀永徽之風復扶又翻又如字三年壬戌崔湜罷為尚書左丞張錫為絳州刺史蕭至忠為晉州刺史舊志晉州京師東北七百二十五里趙彥昭為宋州刺史丙寅姚元之兼中書令兵部尚書同中書門下三品李嶠貶懷州刺史丁卯太子少師同中書門下三品唐休璟致仕右武衛大將軍同中書門下三品張仁願罷為左衛大將軍三年黃門侍郎參知機務崔日用與中書侍郎參知機務薛稷爭於上前稷曰日用傾側嚮附武三思非忠臣賣友邀功非義士日用曰臣往雖有過今立大功立大功謂誅韋氏之謀日用發之謂稷子伯陽尚主非傾側而何上由是兩罷之戊辰以日用為雍州長史稷為左散騎常侍三年己巳赦天下改元改元景雲咸赦之三年乙亥廢武氏崇恩廟及昊陵順陵中宗景龍元年復武氏陵廟安樂公主為悖逆庶人悖蒲內翻又蒲沒翻三年韋后之臨朝也吏部侍郎鄭愔貶江州司馬朝直遙翻愔於今翻潛過均州與刺史譙王重福及洛陽人張靈均謀舉兵誅韋氏未發而韋氏敗重福遷集州刺史未行靈均説重福曰大王地居嫡長當為天子長知兩翻相王雖有功不當繼統東都士庶皆願王來若潛入洛陽發左右屯營兵東都置左右屯營兵以衛宮城據東都如從天而下也然後西取陝州東取河南北天下指麾可定守式又翻陝式冉翻重福從之靈均乃密與愔結謀聚徒數十人時愔自祕書少監左遷沅州刺史武后天授二年改巫州為沅州舊志沅州京師南四千一百九十七里至東都三千九百里章十二行本福下有為重福三字乙十一行本同孔本同張校同草制立重福為帝改元為中元克復考異曰太上皇實録云改元為中宗克復元年今從新書以溫王為皇太弟愔為左丞相知內外文事靈均為右丞相天柱大將軍知武事右散騎常侍嚴善思為禮部尚書知吏部事重福與靈均詐乘驛詣東都愔先供張駙馬都尉裴巽第以待重福供居用翻張知亮翻洛陽縣官微聞其謀齊思和標點聶崇岐覆校
