body:
  text: 資治通鑑卷第一百八十五端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀一武德元年唐古國名陸德明曰周成王母弟叔虞封於唐其地帝堯夏禹所都之墟漢曰太原郡在古冀州太行恆山之西太原太嶽之野李唐之先李虎與李弼等八人佐周伐魏有功皆為柱國號八柱國家周閔帝受魏禪虎已卒乃追録其功封唐國公生子昞襲封昞生淵襲封起兵克長安進封唐王遂受隋禪國因號曰唐高祖神堯大聖光孝皇帝上之上諱淵字叔德本隴西成紀人七世祖皓王西涼是為涼武昭王至曾孫熙家于武川熙孫虎從周文帝始家長安武德元年戊寅六一八是年五月受隋禪始改元武德元年春正月丁未朔隋恭帝詔唐王劍履上殿贊拜不名隋志按漢自天子至于百官無不佩刀蔡謨議云大臣優禮者皆劍履上殿非侍臣解之蓋防刃也近代以木未詳所起東齊著令謂為象劍言象於劍周武帝時百官燕會並帶刀升座至開皇初因襲舊式朝服升殿亦不解焉十二年因蔡徵上事始制凡朝會應登殿坐者劍履俱脫其不坐者敕召奏事及須升殿亦就席解劍乃登納言黃門內史令侍郎舍人既夾侍之官則不脫其劍皆真刃非假又準晉咸康元年定令故事自天子以下皆衣冠帶劍今天子則玉具火珠鏢首惟侍臣帶劍上殿自王公已下非殊禮引升殿皆就席解而後升復下曰舄單下曰履諸非侍臣皆脫履升殿舄唯冕服及具服著之履則諸服皆用凡朝會贊拜則曰某官某不名亦殊禮也上時掌翻鏢紕招翻唐王既克長安以書諭諸郡縣於是東自商洛隋志商洛縣屬上洛郡取商山洛水以名縣也郡縣長吏及盜賊渠帥氐羌酋長爭遣子弟入見請降有司復書日以百數長知兩翻帥所類翻酋才由翻見賢遍翻降戶江翻武德元年王世充既得東都兵進擊李密於洛北敗之敗補邁翻遂屯鞏北鞏縣之北辛酉世充命諸軍各造浮橋渡洛擊密橋先成者先進前後不一虎賁郎將王辨破密外柵賁音奔將即亮翻密營中驚擾將潰世充不知鳴角收衆密因帥敢死士乘之帥讀曰率世充大敗爭橋溺死者萬餘人溺奴狄翻王辨死世充僅自免洛北諸軍皆潰世充不敢入東都北趣河陽趣七喻翻又逡須翻是夜疾風寒雨軍士涉水沾濕道路凍死者又以萬數世充獨與數千人至河陽考異曰隋書北史李密傳曰世充復移營洛北南對鞏縣其後遂於洛水造浮橋悉衆以擊密密出擊之官軍稍卻自相陷溺者數萬人世充僅而獲免不敢還東都遂走河陽其夜雨雪尺餘衆隨之者死亡殆盡王世充傳曰充敗績赴水溺死者萬餘人時天寒大雪兵士既渡水衣皆霑濕在道凍死者又數萬人蒲山公傳曰世充移營就洛水之北與密隔洛水以相望密乃築長城掘深塹周回七十里以自固十五日世充與密戰於石窟寺東密軍退敗世充渡洛水以乘之逼倉城為營塹密縱兵疾戰世充兵馬棄仗奔亡沉溺死者不可勝數密又令露布上府曰世充以今月十一日平旦屯兵洛北偷入月城其月十五日世充及王辨才等又於倉城北偷渡水南敢逼城堞河洛記曰十六日充與密戰於石窟寺東又曰其夜遇風寒疾雨士卒凍死十不存一充脫身宵遁直向河陽餘如蒲山公傳略記曰辛酉王世充等移兵洛北仍令諸軍臨岸布兵軍別造浮橋橋先成者輒渡既前後不一而李密伏發我師敗績爭橋赴水溺死者十五六雜記曰十二月越王遣太常少卿韋霽等率留守兵三萬並受世充節度又曰王辨縱等敗衆軍亦潰爭橋赴水死者太半王辨縱等皆沒唯世充敗免與數百騎奔大通城敗兵得還者於道遭大雨凍死者六七千人世充停留大通十餘日懼罪不還十四年正月越王遣世充兄世惲往大通慰諭赦世充喪師之罪按李道玄勸進於李密表云于時律始太蔟未宜霢霂而澍雨忽降凍殕將盡今參取衆書日從蒲山公傳雨從河洛記越王侗遣使赦之侗他紅翻使疏吏翻召還東都賜金帛美女以安其意世充收合亡散得萬餘人屯含嘉城含嘉城蓋在都城之北按舊書王世充傳含嘉倉城也復扶又翻密乘勝進據金墉城修其門堞廬舍而居之堞達協翻鉦鼓之聲聞於東都聞音問未幾擁兵三十萬陳於北邙陳讀曰陳南逼上春門乙丑金紫光祿大夫段達民部尚書韋津出兵拒之達望見密兵盛懼而先還密縱兵乘之軍遂潰韋津死考異曰隋書列傳不言戰日蒲山公傳此戰在四月九日略記亦云四月乙未李密率衆北據邙山南接上春門段達韋津等出兵拒之兵未交而達懼先還入城軍遂潰亂乙未二十一日也今據河洛記正月十九日世充又與密戰於上春門外韋津沒焉又二月房彥藻與竇建德書亦云幕府以去月十九日親董貔虎西取洛邑其蒲山公傳四月已後月日與事多差互不合今日從河洛記事從略記及隋段達傳隋制職方郎屬兵部尚書竇建德朱粲孟海公徐圓朗等並遣使奉表勸進降戶江翻使疏吏翻考異曰河洛記云盧祖尚亦通表於密按祖尚本起兵為隋事恐不爾今不取密官屬裴仁基等亦上表請正位號上時掌翻密曰東都未平不可議此武德元年戊辰唐王以世子建成為左元帥秦公世民為右元帥帥所類翻督諸軍十餘萬人救東都武德元年東都乏食太府卿元文都等募守城不食公糧者進散官二品於是商賈執象而朝者不可勝數象者象笏也西魏以來五品已上通用象牙賈音古朝直遙翻勝音升武德元年二月己卯唐王遣太常卿鄭元璹將兵出商洛徇南陽煬帝改鄧州為南陽郡璹殊玉翻將即亮翻隋十二衛府各有長史司馬煬帝改安州為安陸郡荊州南郡襄州襄陽郡武德元年李密遣房彥藻鄭頲等頲他鼎翻東出黎陽分道招慰州縣以梁郡太守楊汪為上柱國宋州總管煬帝改宋州為梁郡守式又翻昔在雍丘曾相追捕事見一百八十三卷大業十二年不敢庶幾管仲射齊桓公中帶鉤桓公用之以相晉寺人披伐公子重耳斬其袪文公不怨今以袪為袂射而亦翻幾居希翻密亦羈縻待之使疏吏翻彥藻以書招竇建德使來見密建德復書卑辭厚禮託以羅藝南侵請捍禦北垂彥藻還至衛州賊帥王德仁邀殺之帥所類翻下同德仁有衆數萬據林慮山衛州隋為汲郡林慮山在魏郡林慮縣慮音廬為數州之患抄楚交翻武德元年三月己酉以齊公元吉為鎮北將軍考異曰創業注改太原留守為鎮北府在去年十二月己巳蓋因元吉進封齊公言之耳今從實録聽以便宜從事武德元年隋煬帝至江都大業十二年煬帝至江都宮中為百餘房各盛供張張竹亮翻實以美人日令一房為主人江都郡丞趙元楷掌供酒饌饌雛戀翻又雛皖翻帝與蕭后及幸姬歷就宴飲酒卮不離口從姬千餘人亦常醉離力智翻從才用翻然帝見天下危亂意亦擾擾不自安退朝則幅巾短衣策杖步遊遍歷臺館非夜不止汲汲顧景唯恐不足帝自曉占候卜相好為吳語朝直遙翻相息亮翻好呼到翻常夜置酒仰視天文謂蕭后曰外間大有人圖儂吳人率自稱曰儂卿不失為沈后長城公陳叔寶叔寶后沈氏樂音洛因引滿沈醉沈持林翻又嘗引鏡自照顧謂蕭后曰好頭頸誰當斫之后驚問故帝笑曰貴賤苦樂更迭為之樂音洛更工衡翻亦復何傷復扶又翻帝見中原已亂無心北歸欲都丹陽帝改蔣州為丹陽郡蓋欲都建康也考異曰大業記帝欲南巡會稽今從隋書命㣥臣廷議之內史侍郎虞世基等皆以為善右候衛大將軍李才極陳不可請車駕還長安與世基忿爭而出門下録事衡水李桐客曰隋制門下省置録事通事令史各六人衡水縣屬信都郡開皇十六年分信都北界武邑西界下博南界置宋白曰衡水縣本漢桃縣江東卑濕土地險狹內奉萬乘外給三軍民不堪命亦恐終散亂耳御史劾桐客謗毀朝政乘繩證翻劾戶概翻又戶得翻朝直遙翻於是公卿皆阿意言江東之民望幸已久陛下過江撫而臨之此大禹之事也禹南巡狩會諸侯於會稽將徙都之治直之翻時江都糧盡從駕驍果多關中人從才用翻驍堅堯翻久客思鄉里見帝無西意多謀叛歸郎將竇賢遂帥所部西走將即亮翻下同帥讀曰率帝遣騎追斬之騎奇寄翻而亡者猶不止帝患之虎賁郎將扶風司馬德戡素有寵於帝賁音奔戡音堪帝使領驍果屯於東城德戡與所善虎賁郎將元禮直閣裴虔通謀曰煬帝制左右監門府有直閣各六人正五品今驍果人人欲亡我欲言之恐先事受誅先悉薦翻不言於後事發亦不免族滅奈何又聞關內淪沒李孝常以華陰叛事見上卷上年華戶化翻欲殺之我輩家屬皆在西能無此慮乎二人皆懼曰然則計將安出德戡曰驍果若亡不若與之俱去二人皆曰善因轉相招引內史舍人元敏虎牙郎將趙行樞鷹揚郎將孟秉符璽郎牛章十二行本牛上有李覆二字乙十一行本同孔本同張校同方裕直長許弘仁薛世良城門郎唐奉義醫正張愷勳侍楊士覽等隋初門下省統城門尚食尚藥符璽御府殿內等六局各有直長煬帝以城門尚食尚藥御府等五局隸殿內省改符璽監為郎城門置校尉後又改校尉為城門郎又置司醫醫佐等官意者醫正即司醫也勳侍三侍之一也璽斯氏翻長知兩翻日夜相結約於廣座明論叛計無所畏避有宮人白蕭后曰外間人人欲反后曰任汝奏之宮人言於帝帝大怒以為非所宜言斬之其後宮人復白后復扶又翻后曰天下事一朝至此無可救者何用言之徒令帝憂耳令力丁翻自是無復言者趙行樞與將作少監宇文智及素厚少始照翻楊士覽智及之甥也二人以謀告智及智及大喜德戡等期以三月望日結黨西遁智及曰主上雖無道威令尚行卿等亡去正如竇賢取死耳今天實喪隋喪息浪翻英雄並起同心叛者已數萬人因行大事此帝王之業也德戡等然之行樞薛世良請以智及兄右屯衛將軍許公化及為主結約既定乃告化及化及性駑怯聞之變色流汗既而從之考異曰蒲山公傳曰趙行樞楊士覽以司馬德戡謀告化及化及兄弟聞之大喜因引德戡等相見士及說德戡等曰足下等因百姓之心謀非常之事直欲走逃故非長策德戡曰為之奈何士及曰官家雖言無道臣下尚畏服之聞公叛亡必急相追捕竇賢之事殷鑒在近不如嚴勒士馬攻其宮闕因人之欲稱廢昏凶事必克成然後詳立明哲天下可安吾徒無患矣勳庸一集公等坐延榮祿縱事不成威聲大振足得官家膽懾不敢輕相追討遲疑之間自延數日比其議定公等行亦已遠如此則去住之計俱保萬全不亦可乎德戡等大悅曰明哲之望豈惟楊家衆心實在許公故是人天協契士及佯驚曰此非意所及但與公等思救命耳革命記曰帝知曆數將窮意欲南渡江水咸言不可帝知朝士不欲渡乃將毒藥醞酒二十石擬三月十六日為宴會而鴆殺百官南陽公主恐其夫死乃陰告之而事泄為此始謀害帝以免禍並是凶逆之旅妄搆此詞于時上下離心人懷異志帝深猜忌情不與人醞若不虛藥須分付有處遣何人併醞二十石藥酒必其酒有鴆毒一石堪殺千人審欲擬殺㣥寮謀之者必有三五衆謀自然早泄豈得獨在南陽只是虔通等恥有殺害之名推過惡於人主耳隋書化及傳云化及弒逆士及在公主第弗之知也智及遣家僮莊桃樹就第殺之桃樹不忍執詣智及久之乃見釋南陽公主傳責士及云但謀逆之日察君不預知耳舊唐書士及傳云化及謀逆以其主壻深忌之而不告按士及仕唐為宰相隋書亦唐初所修或者史官為士及隱惡賈杜二書之言亦似可信但杜儒童自知醞藥酒為虛則南陽陰告之事亦非其實如賈潤甫之說則弒君之謀皆出士及而智及為良人矣今且從隋書而刪去莊桃樹事及南陽之語庶幾疑以傳疑德戡使許弘仁張愷入備身府帝改左右領左右府為左右備身府陛下聞驍果欲叛多醞毒酒欲因享會盡鴆殺之獨與南人留此驍果皆懼轉相告語語牛倨翻反謀益急乙卯德戡悉召驍果軍吏諭以所為皆曰唯將軍命是日風霾晝昏霾亡皆翻雨土也德戡盜御廣既馬潛厲兵刃是夕元禮裴虔通直閣下專主殿內唐奉義主閉城門與虔通相知諸門皆不下鍵鍵戶偃翻陳楚謂戶鑰牡為鍵至三更更工衡翻德戡於東城集兵得數萬人舉火與城外相應帝望見火且聞外喧囂問何事虔通對曰草坊失火外人共救之耳時內外隔絶帝以為然智及與孟秉於城外集千餘人此城外謂江都宮城之外左右候衛主晝夜巡察故劫之普樂蓋虎賁郎將賁音奔樂音洛倓元德太子昭之子代王侑之弟倓徒甘翻穿芳林門側水竇而入至玄武門詭奏曰臣猝中風中竹仲翻命懸俄頃請得面辭裴虔通等不以聞執囚之丙辰天未明德戡授虔通兵以代諸門衛士虔通自門將數百騎至成象殿將即亮翻騎奇寄翻宿衛者傳呼有賊虔通乃還閉諸門獨開東門驅殿內宿衛者令出皆投仗而走右屯衛將軍獨孤盛謂虔通曰何物兵勢太異虔通曰事勢已然不預將軍事將軍慎毋動盛大罵曰老賊是何物語不及被甲與左右十餘人拒戰為亂兵所殺被皮義翻考異曰蒲山公傳裴虔通於成象殿前遇將軍獨孤盛時內直宿陳兵廊下以拒之詬曰天子在此爾等何敢凶逆叱兵接戰兵皆倒戈虔通謂盛曰公何暗於機會恐他人以公為勳耳盛叱之曰國家榮寵盛者正擬今日且宿衛天居唯當效之以死注弦不動俄為亂兵所擊斃於階下略記詰旦諸門已開而外傳叫有賊虔通乃還閉諸門唯開正東一門而驅殿內執仗者出莫不投仗亂走屯衛大將軍獨孤盛揮刀叱之曰天子在此爾等走欲何之然亂兵交萃俄而斃於階下今從隋書亦采略記盛楷之弟也獨孤楷見一百七十九卷文帝仁壽二年煬帝制千牛十六人掌執千牛刀屬領左右府開遠獨孤后之兄子叩閣請曰兵仗尚全猶堪破賊陛下若出臨戰人情自定不然禍今至矣竟無應者軍士稍散賊執開遠義而釋之先是帝選驍健官奴數百人置玄武門先悉薦翻謂之給使以備非常待遇優厚至以宮人賜之司宮魏氏為帝所信司宮蓋即尚宮之職是日魏氏矯詔悉聽給使出外倉猝際制無一人在者德戡等引兵自玄武門入帝聞亂易服逃於西閣虔通與元禮進兵排左閣魏氏啓之遂入永巷問陛下安在有美人出指之校尉令狐行達拔刀直進校戶教翻令音鈴帝映窗扉謂行達曰汝欲殺我邪邪音耶對曰臣不敢但欲奉陛下西還耳因扶帝下閣還從宣翻又音如字虔通本帝為晉王時親信左右也帝見之謂曰卿非我故人乎何恨而反對曰臣不敢反但將士思歸欲奉陛下還京師耳將即亮翻帝曰朕方欲歸正為上江米船未至夏口以上為上江為于僞翻虔通因勒兵守之至旦孟秉以甲騎迎化及騎奇寄翻下同化及戰栗不能言人有來謁之者但俯首據鞍稱罪過罪過今世俗謙謝之辭俯音免宮城門也引入朝堂號為丞相朝直遙翻下同號戶刀翻呼也裴虔通謂帝曰百官悉在朝堂陛下須親出慰勞勞力到翻逼帝乘之從才用翻帝嫌其鞍勒弊更易新者乃乘之虔通執轡挾刀出宮門賊徒喜譟動地化及揚言曰何用持此物出亟還與手與手魏齊間人率有是言言與之毒手而殺之也宋孝建初薛安都助順有大功從弟道生亦以軍功為大司馬參軍犯罪為秣陵令薛淑之所鞭安都大怒乘馬執矟從數十人欲往殺淑之行至朱雀航逢柳元景問何之安都曰薛淑之鞭我從弟指往刺殺之元景曰小子無宜適卿往與手甚快安都既回馬元景復呼使入車讓止之此與手之徵也亟紀力翻世基何在賊黨馬文舉曰已梟首矣於是引帝還至寢殿虔通德戡等拔白刃侍立帝歎曰我何罪至此文舉曰陛下違棄宗廟巡遊不息外勤征討內極奢淫使丁壯盡於矢刃女弱填於溝壑四民喪業喪息浪翻盜賊起專任佞諛飾非拒諫何謂無罪帝曰我實負百姓至於爾輩榮祿兼極何乃如是今日之事孰為首邪邪音耶德戡曰溥天同怨何止一人化及又使封德彞數帝罪數所具翻又所主翻帝曰卿乃士人何為亦爾德彞赧然而退帝愛子趙王杲年十二在帝側號慟不已虔通斬之血濺御服赧奴板翻慙而面赤也號戶刀翻濺子賤翻賊欲弒帝帝曰天子死自有法何得加以鋒刃取鴆酒來文舉等不許使令狐行達頓帝令坐帝自解練巾授行達縊殺之令力丁翻縊於賜翻又於計翻絞也考異曰蒲山公傳河洛記皆云于洪達縊帝今從隋書及略記初帝自知必及於難常以罌貯毒藥自隨難乃旦翻罌於耕翻貯丁呂翻謂所幸諸姬曰若賊至汝曹當先飲之然後我飲及亂顧索藥索山客翻左右皆逃散竟不能得蕭后與宮人撤漆牀板為小棺與趙王杲同殯於西院流珠堂帝每巡幸常以蜀王秀自隨囚於驍果營化及弒帝欲奉秀立之衆議不可乃殺秀及其七男又殺齊王暕及其二子並燕王倓隋氏宗室外戚無少長皆死暕古限翻驍堅堯翻少詩沼翻長知兩翻唯秦王浩素與智及往來且以計全之浩秦王俊之子暕失愛事始一百八十一卷大業四年帝聞亂顧蕭后曰得非阿孩邪暕小字阿孩恆戶登翻暕謂帝使收之曰詔使且緩兒使疏吏翻兒不負國家賊曳至街中斬之暕竟不知殺者為誰父子至死不相明又殺內史侍郎虞世基御史大夫裴蘊左翊衛大將軍來護兒祕書監袁充右翊衛將軍宇文協千牛宇文皛皛戶了翻梁公蕭巨等及其子巨琮之弟子也蕭琮故梁主琮藏宗翻難將作江陽長張惠紹馳告裴蘊江陽縣帶江都郡舊廣陵也大業初更名長知兩翻扣門援帝與上更有蘊字文意乃明遣報虞世基世基疑告反者不實抑而不許須臾難作難乃旦翻蘊歎曰謀及播郎竟誤人事播郎虞世基小字事勢已然吾將濟卿南渡同死何益熙曰棄父背君璽斯氏翻背蒲妹翻求生何地感尊之懷尊謂伋也世基弟世南抱世基號泣請章十二行本請下有以身二字乙十一行本同孔本同張校同代化及不許號戶刀翻黃門侍郎裴矩知必將有亂雖廝役皆厚遇之厮音斯今人讀如瑟又建策為驍果娶婦事見上卷上年為于僞翻賊皆曰非裴黃門之罪既而化及至矩迎拜馬首故得免化及以蘇威不預朝政亦免之朝直遙翻威名位素重往參化及化及集衆而見之曲加殊禮百官悉詣朝堂賀給事郎許善心獨不至許弘仁馳告之曰天子已崩宇文將軍攝政闔朝文武咸集朝直遙翻天道人事自有代終何預於叔而低回若此善心怒不肯行弘仁反走上馬泣而去化及遣人就家擒至朝堂既而釋之善心不舞蹈而出化及怒曰此人大負氣復命擒還殺之其母范氏年九十二撫柩不哭曰能死國難吾有子矣因臥不食十餘日而卒上時掌翻復扶又翻柩音舊難乃旦翻卒子恤翻唐王之入關也張季珣之弟仲琰為上洛令張季珣死節見上卷上年上洛縣隋帶上洛郡部下殺之以降帥讀曰率降戶江翻宇文化及之亂仲琰弟琮為千牛左右隋制領左右府有千牛左右司射左右兄弟三人皆死國難時人愧之化及自稱大丞相總百揆以皇后令立秦王浩為帝居別宮令發詔畫敕書而已仍以兵監守之令力丁翻監古銜翻化及以弟智及為左僕射士及為內史令裴矩為右僕射武德元年乙卯徙秦公世民為趙公武德元年戊辰隋恭帝詔以十郡益唐國仍以唐王為相國總百揆唐國置丞相以下官又加九錫王謂僚屬曰此諂諛者所為耳孤秉大政而自加寵錫可乎必若循魏晉之迹彼皆繁文僞飾欺天罔人考其實不及五霸而求名欲過三王此孤常所非笑竊亦恥之或曰歷代所行亦何可廢王曰堯舜湯武各因其時取與異道皆推其至誠以應天順人未聞夏商之末必效唐虞之禪也若使少帝有知必不肯為少詩照翻若其無知孤自尊而飾讓平生素心所不為也但改丞相為相國府其九錫殊禮皆歸之有司武德元年宇文化及以左武衛將軍陳稜為江都太守綜領留事守式又翻壬申令內外戒嚴云欲還長安皇后六宮皆依舊式為御營營前別立帳化及視事其中仗衛部伍皆擬乘輿乘繩證翻奪江都人舟楫取彭城水路西歸煬帝改徐州為彭城郡楫與楫同煬帝置折衝郎將正四品掌領驍果屬領左右府將即亮翻下同驍堅堯翻既立御營以御營之內為禁內虎賁郎將麥孟才虎牙郎錢傑煬帝制十二衛府每衛置護軍四人掌副二將軍尋改護軍為虎賁郎將而置虎牙郎將副焉虎牙郎下當有將字吾儕受先帝厚恩今俯首事讎受其驅帥儕士皆翻俯音免帥讀曰率下同何面目視息世間哉吾必欲殺之死無所恨光泣曰是所望於將軍也孟才乃糾合恩舊恩舊與之有舊恩者期以晨起將發時襲化及語泄帥讀曰率泄息列翻化及夜與腹心走出營外留人告司馬德戡等使討之光聞營內喧知事覺即襲化及營空無所獲值內史侍郎元敏數而斬之數所具翻又所主翻德戡引兵入圍之殺光其麾下數百人皆鬬死一無降者降戶江翻孟才亦死孟才鐵杖之子也鐵杖死於度遼之役武德元年武康沈法興隋志武康縣屬餘杭郡劉昫曰吳分烏程餘杭二縣立永安縣晉改為永康又改為武康唐分屬湖州宗族數千家法興為吳興太守守式又翻聞宇文化及弒逆舉兵以討化及為名考異曰太宗實録舊唐帝紀二月法興據丹陽起兵按法興起兵討化及當在弒逆後得精卒六萬遂攻餘杭毗陵丹陽皆下之按烏程縣帶吳興郡沈法興既為吳興守而云舉兵至烏程者法興傳云大業末法興為吳興郡守東陽賊樓世幹略其郡煬帝詔法興與太僕丞元祐討之義寧二年江都亂法興執祐舉兵名討宇文化及三月發東陽行收兵趨江都下餘杭比至烏程衆六萬如此則自東陽至烏程也比必寐翻自稱江南道大總管承制置百官武德元年陳國公竇抗唐王之兄也煬帝使行長城於靈武行循行也音下孟翻聞唐王定關中癸酉帥靈武鹽川等數郡來降煬帝改靈州為靈武郡鹽州為鹽川郡帥讀曰率武德元年夏四月稽胡寇富平隋志富平縣屬京兆郡杜佑曰稽胡一名步落稽蓋胸奴別種自離石以西安定以東方七八百里又五萬餘人寇宜春相國府咨議參軍竇軌將兵討之戰於黃欽山宜春當作宜君隋志宜君縣屬京兆郡有清水水經注清水出雲陽縣之石門山東南流徑黃嶔山西將即亮翻下同官軍小卻軌斬其部將十四人拔隊中小校代之勒兵復戰校戶教翻復扶又翻軌自將數百騎居軍後令之曰聞鼓聲有不進者自後斬之既而鼓之將士爭先赴敵稽胡射之不能止騎奇寄翻射而亦翻遂大破之虜男女二萬口武德元年世子建成等至東都軍於芳華苑東都閉門不出遣人招諭不應李密出軍爭之小戰各引去城中多欲為內應者趙公世民曰吾新定關中根本未固章十二行本固下有懸軍遠來四字乙十一行本同孔本同張校同退齊校同雖得東都不能守也遂不受戊寅引軍還還從宣翻又音如字世民曰城中見吾退必來追躡乃設三伏於三王陵以待之水經注三王陵在河南縣西南柏亭東北三王或言周景王悼王定王也崔浩曰定當為敬子朝作亂西周政弱人荒悼敬二王與景王俱葬於此故世以三王名陵遇伏而敗世民逐北抵其城下東都城下遂置新安宜陽二郡新安後周置中州及東垣縣隋廢州改縣名宜陽後魏置郡隋開皇初廢為縣與新安皆屬河南郡今並置郡章十二行本師下有將兵二字乙十一行本同孔本同鎮宜陽姓苑後漢西羌傳有北海太守盛苞其先姓奭避元帝諱改姓盛余按戰國策秦有盛橋則盛姓尚矣王褱任音壬王褱古回翻置二郡內以蔽關輔外以圖東都還從宣翻又如字武德元年初五原通守櫟陽張長遜煬帝改豐州為五原郡新唐書張長遜京兆櫟陽人隋志京兆無櫟陽縣櫟音藥守式又翻舉郡附突厥突厥以為割利特勒郝瑗說薛舉厥九勿翻郝呼各翻瑗子眷翻說輸芮翻下同與梁師都及突厥連兵以取長安舉從之時啓民可汗之子咄苾可從刊入聲汗音寒咄當沒翻苾毗必翻建牙直五原之北舉遣使與莫賀咄設謀入寇咄當沒翻使疏吏翻下同莫賀咄設許之唐王使都水監宇文歆賂莫賀咄設開皇初立都水臺置使者大業改為都水監改使者為監止其出兵又說莫賀咄設遣張長遜入朝以五原之地歸之中國莫賀咄設並從之為于僞翻咄當沒翻朝直遙翻下同己卯武都宕渠五原等郡皆降武都漢郡西魏置武州煬帝復為郡宕渠漢縣梁置渠州煬帝改為宕渠郡此二郡與五原同日來降故連書之宕徒浪翻守式又翻長遜又詐為詔書與莫賀咄設示知其謀莫賀咄設乃拒舉師都等不納其使使疏吏翻武德元年戊戌世子建成等還長安考異曰創業注在三月今從太宗實録武德元年東都號令不出四門人無固志朝議郎段世弘等謀應西師會西師已還西師謂建成等之師還從宣翻又音如字期以己亥夜納之事覺越王命王世充討誅之密聞城中已定乃還武德元年宇文化及擁衆十餘萬據有六宮自奉養一如煬帝每於帳中南面坐人有白事者默然不對下牙方取啓狀與唐奉義牛方裕薛世良張愷等參決之劉馮事始曰兵書曰牙旗者將軍之精凡始建牙必以制日制者其辰在五行以上剋下之日也又尚書緯色紅八幅大將牙門之旗出引將軍前列又黃帝出軍決曰牙旗者將軍之精金鼓者將軍之氣周禮司常職云軍旅會同置旌門夫以旌為門即旗門也後世軍中遂置牙門將又有牙兵典總此名者以押牙為名至於官府早晚軍吏兩謁亦名為衙呼謂既熟雖天子正殿受朝謁亦名正衙以少主浩付尚書省令衛士十餘人守之少始照翻遣令史取其畫敕隋門下省有録事通事令史各六人至彭城水路不通復奪民車牛得二千兩復扶又翻朝直遙翻兩力讓翻並載宮人珍寶其戈甲戎器悉令軍士負之道遠疲劇軍士始怨司馬德戡竊謂趙行樞曰君大謬誤我行樞建言以化及為主必藉英賢化及庸暗㣥小在側事將必敗若之何行樞曰在我等耳廢之何難初化及既得政賜司馬德戡爵溫國公加光祿大夫以其專統驍果心忌之後數日化及署諸將分部士卒驍堅堯翻將即亮翻以德戡為禮部尚書外示美遷實奪其兵柄德戡由是憤怨所獲賞賜皆以賂智及智及為之言乃使之將後軍萬餘人以從及為于僞翻將即亮翻從才用翻於是德戡行樞與諸將李本尹正卿宇文導師等謀以後軍襲殺化及更立德戡為主遣人詣孟海公結為外助孟海公據曹州待海公報許弘仁張愷知之以告化及化及遣宇文士及陽為遊獵至後軍德戡不知事露出營迎謁因執之化及讓之曰與公戮力共定海內出於萬死今始事成方願共守富貴公又何反也德戡曰本殺昏主苦其淫虐推立足下而又甚之逼於物情不得已也化及縊殺之並殺其支黨十餘人孟海公畏化及之強帥衆具牛酒迎之帥讀曰率下同李密據鞏洛以拒化及洛水至鞏入河故曰鞏洛引兵向東郡東郡通守王軌以城降之守式又翻降戶江翻下同武德元年辛丑李密將井陘王君廓帥衆來降隋志井陘縣屬恆山郡將即亮翻下同陘音刑帥讀曰率考異曰太宗實録曰王君愕邯鄲人君廓寇略邯鄲君愕往投之因為君廓陳井陘之險勸先往據之君廓從其言屯井陘山歲餘會義師入定關中乃與君廓率所部萬餘人歸順拜大將軍與君廓事皆出太宗實録而不同如此今據高祖實録稱李密將王君廓降從君廓傳有衆數千人與賊帥韋寶鄧豹合軍虞鄉劉昫曰虞鄉縣漢解縣地後魏分置虞鄉縣隋志屬河東郡帥所類翻使疏吏翻寶豹欲從唐王君廓僞與之同乘其無備襲擊破之奪其輜重重直用翻奔李密密不禮之復來降復扶又翻拜上柱國假河內太守武德元年蕭銑即皇帝位置百官準梁室故事諡其從父琮為孝靖皇帝諡神至翻從才用翻祖巖為河間忠烈王父璿為文憲王璿音旋封董景珍等功臣七人皆為王遣宋王楊道生擊南郡下之徙都江陵煬帝改荊州為南郡江陵帶郡引岑文本為中書侍郎使典文翰委以機密又使魯王張繡徇嶺南隋將張鎮周王仁壽等拒之既而聞煬帝遇弒皆降於銑欽州刺史寧長真亦以鬱林始安之地附於銑煬帝改欽州為寧越郡長真刺史文帝所命也鬱林郡梁定州也後改為南定州平陳改為尹州大業初改為鬱州尋改為郡又改桂州為始安郡新唐書馮盎傳曰隋仁壽初盎平潮成叛獠拜漢陽太守隋亡奔還嶺表據有諸郡蒼梧郡梁置成州開皇初改為封州煬帝改為郡改高州為高涼郡崖州為珠崖郡番禺南海郡治番音潘禺音愚煬帝改交州為交趾郡銑遣寧長真帥嶺南之兵自海道攻和帥讀曰率下同和欲出迎之司法書佐高士廉煬帝改郡諸司參軍為書佐長真兵數雖多懸軍遠至不能持久城中勝兵足以當之說輸芮翻下同勝音升奈何望風受制於人和從之以士廉為軍司馬將水陸諸軍逆擊破之將即亮翻長真僅以身免盡俘其衆既而有驍果自江都至驍堅堯翻得煬帝凶問亦以郡附於銑士廉勱之子也高勱北齊清河王嶽之子勱音邁始安郡丞李襲志遷哲之孫也李遷哲見一百七十七卷太建二年散家財募士得三千人以保郡城蕭銑林士弘曹武徹迭來攻之皆不克聞煬帝遇弒帥吏民臨三日臨力鴆翻或說襲志曰公中州貴族按李襲志之先隴西狄道人後為金州安康人此必出其家傳以門地自高耳華夷悅服今隋室無主海內鼎沸以公威惠號令嶺表尉他之業可坐致也尉他事見漢高帝紀他徒何翻吾世繼忠貞今江都雖覆宗社尚存尉他狂僭何足慕也欲斬說者衆乃不敢言堅守二年外無聲援城陷為銑所虜銑以為工部尚書檢校桂州總管於是東自九江煬帝改江州為九江郡南盡交趾北距漢川此漢川謂漢水以南之地非漢中之漢川郡勝兵四十餘萬勝音升武德元年煬帝凶問至長安唐王哭之慟曰吾北面事人失道不能救敢忘哀乎武德元年五月山南撫慰使馬元規擊朱粲於冠軍破之冠軍縣屬南陽郡使疏吏翻冠古玩翻武德元年王德仁既殺房彥藻事見上二月德仁兵敗甲寅與武安通守袁子幹皆來降詔以德仁為鄴郡太守煬帝改洺州為武安郡相州為魏郡此又改魏郡為鄴郡也守式又翻武德元年戊午隋恭帝禪位于唐遜居代邸隋開皇元年受禪歲在辛丑三主三十八年而亡考異曰創業注此詔在四月今從實録甲子唐王即皇帝位于太極殿即隋大興殿也唐既受禪改為太極殿大赦改元改元武德置州以太守為刺史大業三年改州為郡色尚黃武德元年隋煬帝凶問至東都戊辰留守官奉越王即皇帝位越王侗亦元德太子昭子改元皇泰是時於朝堂宣旨以時鍾金革朝直遙翻說文曰鍾當也公私皆即日大祥大祥而禫廟號世祖追尊元德太子曰成皇帝廟號世宗尊母劉良娣為皇太后以段達為納言陳國公王世充為納言鄭國公隋制門下省納言二人皇甫無逸為兵部尚書國公又以盧楚為內史令隋初內史省置監令各一人尋廢監置令二人趙長文為黃門侍郎共掌朝政長知兩翻朝直遙翻時人號七貴皇泰主眉目如畫溫厚仁愛風格儼然武德元年辛未突厥始畢可汗遣骨咄祿特勒來厥九勿翻可從刊入聲汗音寒突厥官子弟曰特勒咄當沒翻宴之於太極殿奏九部樂杜佑曰武德初因隋舊制九部樂一宴樂二清商三西涼四扶南五高麗六龜茲七安國八疏勒九康國前一百八十卷隋大業四年引杜佑注九部樂與此不同又考宋祁新唐志唐有十部樂有十四國技以八國入十部而不明指八國為何國此亦異同而難考者也突厥強盛東自契丹室韋西盡吐谷渾高昌諸國皆臣之契欺訖翻又音喫吐從暾入聲谷音浴控弦百餘萬帝以初起資其兵馬前後餉遺不可勝紀遺于季翻勝音升突厥恃功驕倨每遣使者至長安多暴橫使疏吏翻橫戶孟翻帝優容之武德元年壬申命裴寂劉文靜等修定律令置國子太學四門生合三百餘員唐六典國子生文武官三品已上及國公子孫從二品已上曾孫太學生文武官五品已上及郡縣公子孫從三品曾孫四門生文武官七品已上及侯伯子男子若庶人子為俊士生者後魏劉芳表云太和二十年立四門博士於四門置學按禮記云天子設四學鄭玄注周四郊之虞庠也今以其遼遠故置於四門請移與太學同處從之武德元年六月甲戌朔以趙公世民為尚書令黃臺公瑗為刑部侍郎黃臺縣公東魏置黃臺縣於潁川大業初廢瑗于眷翻司馬劉文靜為納言司録竇威為內史令李綱為禮部尚書參掌選事長知兩翻選宣絹翻掾殷開山為吏部侍郎掾于絹翻屬趙慈景為兵部侍郎韋義節為禮部侍郎主簿陳叔達博陵崔民幹並為黃門侍郎煬帝改定州為博陵郡録事參軍裴晞為尚書左丞以隋民部尚書蕭瑀為內史令禮部尚書竇璡為戶部尚書按六典貞觀二十三年避太宗諱始改民部尚書為戶部尚書史家以後來官名書之也瑀音禹璡則鄰翻屈居勿翻長安令獨孤懷恩為工部尚書瑗上之從子懷恩舅子也從才用翻上待裴寂特厚㣥臣無與為比賞賜服玩不可勝紀勝音升命尚書奉御日以御膳賜寂尚書當作尚食六典尚食奉御二人屬殿中省入閣則延之臥內言無不從稱為裴監而不名寂仕隋為晉陽宮監親之以舊官稱之朝直遙翻事無大小無不關掌瑀亦孜孜盡力繩違舉過人皆憚之毀之者衆終不自理上嘗有敕而內史不時宣行隋唐之制凡王言下內史省皆宣署申覆而施行之瑀對曰大業之世內史宣敕或前後相違有司不知所從其易在前其難在後臣在省日久瑀在隋朝為內史侍郎故云然易以豉翻今王業經始事繫安危遠方有疑恐失機會故臣每受一敕必勘審使與前敕不違始敢宣行稽緩之愆實由於此上曰卿用心如是吾復何憂復扶又翻武德元年初帝遣馬元規慰撫山南南陽郡丞河東呂子臧獨據郡不從是年二月遣馬元規使疏吏翻皆為子臧所殺及煬帝遇弒子臧發喪成禮然後請降拜鄧州刺史南陽郡復為鄧州降戶江翻下同武德元年廢大業律令頒新格武德元年上每視事自稱名引貴臣同榻而坐劉文靜諫曰昔王導有言若太陽俯同萬物使㣥生何以仰照事見九十卷晉元帝太興元年非常久之道上曰昔漢光武與嚴子陵共寢子陵加足於帝腹事見後漢書嚴光傳平生親友宿昔之歡何可忘也公勿以為嫌武德元年戊寅隋安陽令呂珉以相州來降隋安陽縣帶相州相息亮翻武德元年己卯祔四親廟主追尊皇高祖瀛州府君曰宣簡公皇曾祖司空曰懿王皇祖景王曰景皇帝廟號太祖祖妣曰景烈皇后皇考元王曰元皇帝廟號世祖妣獨孤氏曰元貞皇后追諡竇氏曰穆皇后瀛州府君熙司空天賜景王虎元王昞以景帝配神州地祇神州迎州冀州戎州拾州柱州營州咸州陽州九州之祇也祇翹移翻以元帝配古者帝王之興必感五精之氣以生隋以火德王祀赤熛怒為感帝唐以土德王祀含樞紐為感帝庚辰立世子建成為皇太子趙公世民為秦王齊公元吉為齊王宗室黃瓜公白駒為平原王按白駒蓋先封黃瓜縣公黃瓜縣蓋拓跋魏所置在上邽界水經注黃瓜水發源黃瓜谷西東流徑黃瓜縣北又東北歸于籍水籍水既與黃瓜水合又東徑上邽城南柱國道玄為淮陽王長平公叔良為長平王鄭公神通為永康王安吉公神符為襄邑王柱國德良為新興王上柱國博義為隴西王上柱國奉慈為勃海王孝基叔良神符德良帝之從父弟博義奉慈弟子道玄從父兄子也從才用翻武德元年癸未薛舉寇涇州復以安定郡為涇州後魏置涇州治高平因涇水為名將八總管兵以拒之帥所類翻將即亮翻武德元年遣太僕卿宇文明達招慰山東以永安王孝基為陝州總管義寧初以河南陝縣為弘農郡今為陝州陝失冉翻凡邊要之州皆置總管府以統數州之兵武德元年乙酉奉隋帝為酅國公酅戶圭翻詔曰近世以來時運遷革前代親族莫不誅夷興亡之效豈伊人力其隋蔡王智積等子孫並付所司量才選用量音良武德元年東都聞宇文化及西來上下震懼有蓋琮者蓋古盍翻姓也上疏請說李密與之合勢拒化及說輸芮翻元文都謂盧楚等曰今讎恥未雪而兵力不足若赦密罪使擊化及兩賊自鬬吾徐承其弊化及既破密兵亦疲又其將士利吾官賞易可離間易以豉翻間古莧翻並密亦可擒也楚等皆以為然即以琮為通直散騎常侍散悉亶翻騎奇寄翻武德元年丙申隋信都郡丞東萊麴稜來降拜冀州刺史隋信都郡入唐為冀州東萊郡為萊州宋白曰萊州古萊夷地春秋萊子之國齊滅萊以在國之東故曰東萊降戶江翻武德元年萬章十二行本萬上有丁酉二字乙十一行本同孔本同張校同退齊校同年縣法曹武城孫伏伽上表周明帝二年分長安為萬年縣與長安並居京城隋改為大興縣唐受禪復為萬年與長安並為赤縣萬年縣治宣揚坊領朱雀街東五十四坊長安縣治長壽坊領街西五十四坊隋煬帝改縣尉為縣正尋改正為戶曹法曹分司以丞郡之六司唐復為縣尉而六司各置佐史孫伏伽萬年法曹蓋隋官也武城縣漢之東武城也唐志屬貝州伽求加翻隋以惡聞其過亡天下陛下龍飛晉陽遠近響應未期年而登帝位徒知得之之易不知隋失之之不難也惡烏路翻易以豉翻下同臣謂宜易其覆轍務盡下情凡人君言動不可不慎竊見陛下今日即位而明日有獻鷂雛者此乃少年之事豈聖主所須哉鷂弋召翻少詩詔翻又百戲散樂亡國淫聲百戲散樂齊周隋所以亡國散悉亶翻襦人朱翻以充妓衣妓渠綺翻擬五月五日玄武門遊戲此亦非所以為子孫法也凡如此類悉宜廢罷善惡之習朝夕漸染漸子廉翻易以移人皇太子諸王參僚左右宜謹擇其人其有門風不能雍睦為人素無行義專好奢靡以聲色遊獵為事者皆不可使之親近也行下孟翻好呼到翻近其靳翻自古及今骨肉乖離以至敗國亡家未有不因左右離間而然也間古莧翻願陛下慎之上省表大悅省悉景翻下詔褒稱擢為治書侍御史治直之翻賜帛三百匹仍頒示遠近武德元年辛丑內史令延安靖公竇威薨以將作大匠竇抗兼納言黃門侍郎陳叔達判納言兼判皆非正官武德元年宇文化及留輜重於滑臺滑臺滑州治所重直用翻使守之引兵北趣黎陽趣七喻翻又逡須翻李密將徐世績據黎陽畏其軍鋒以兵西保倉城將即亮翻化及渡河保黎陽分兵圍世績密帥步騎二萬壁於清淇汲郡之衛縣古朝歌也隋開皇十六年分置清淇縣大業初廢入衛縣李密蓋壁於故縣也深溝高壘不與化及戰化及每攻倉城密輒引兵以掎其後掎居豈翻密與化及隔水而語隔淇水也卿本胸奴皂隸破野頭耳隋書宇文述傳本姓破野頭役屬鮮卑俟豆歸從其主為宇文氏數所具翻並受隋恩富貴纍世舉朝莫二朝直遙翻主上失德不能死諫反行弒逆欲規篡奪不追諸葛瞻之忠誠諸葛瞻亮之子蜀之亡也瞻死之霍禹光之子漢宣親政禹謀為大逆遂以滅族將欲何之若速來歸我尚可得全後嗣化及默然俯視良久瞋目大言曰與爾論相殺事何須作書語邪嗣祥吏翻瞋昌真翻邪音耶密謂從者曰從才用翻化及庸愚如此忽欲圖為帝王吾當折杖驅之耳化及盛修攻具以逼倉城世績於城外掘深溝以固守化及阻塹不得至城下世績於塹中為地道出兵擊之塹七豔翻化及大敗焚其攻具時密與東都相持日久又東拒化及常畏東都議其後見蓋琮至大喜遂上表乞降蓋古盍翻上時掌翻降戶江翻請討滅化及以贖罪送所獲章十二行本獲下有凶黨二字乙十一行本同孔本同張校同退齊校同雄武郎將于洪建煬帝募驍果置左右雄武府雄武郎將以領之將即亮翻皇泰主命戮洪建於左掖門外如斛斯政之法戮斛斯政見一百八十二卷大業十年帥所類翻下同見賢遍翻下同盛飾賓館於宣仁門東六典東都東城在皇城之東東曰宣仁門以儉為司農卿師譽為尚書右丞使具導從列鐃吹從才用翻鐃女交翻似鈴無舌吹昌瑞翻還館玉帛酒饌中使相望饌雛戀翻又士免翻冊拜密太尉尚書令東南道大行臺行軍元帥魏國公令先平化及然後入朝輔政朝直遙翻以徐世績為右武候大將軍仍下詔稱密忠款且曰其用兵機略一稟魏公節度元文都喜於和解謂天下可定於上東門置酒作樂六典東都城東面三門中曰建春南曰永通北曰上東王世充作色謂起居侍郎崔長文曰六典起居郎因起居注以為名起居注者記録人君動止之事漢獻帝及西晉已後諸帝皆有起居注皆史官所録自隋置為職員列為侍臣專掌其事每季為卷送付史官按隋志煬帝減內史舍人員加置起居舍人員然未有侍郎起居侍郎始見於此長知兩翻朝廷官爵乃以與賊其志欲何為邪邪音耶文都等亦疑世充欲以城應化及由是有隙然猶外相彌縫陽為親善秋七月皇泰主遣大理卿張權鴻臚卿崔善福賜李密書曰今日以前咸共刷蕩臚陵如翻使至以後使疏吏翻彼此通懷七政之重佇公匡弼日月五星謂之七政佇待也委公指揮周官大司馬以九伐之法正邦國密北面拜受詔書既無西慮密軍在鞏洛東都城在西密知化及軍糧且盡因僞與和化及大喜恣其兵食冀密饋之會密下有人獲罪亡抵化及具言其情化及大怒其食又盡乃渡永濟渠與密戰于童山之下隋志汲郡衛縣有同山密為流矢所中墮馬悶絶左右奔散追兵且至唯秦叔寶獨捍衛之密由是獲免叔寶復收兵與之力戰化及乃退中竹仲翻復扶又翻化及入汲郡求軍糧又遣使拷掠東郡吏民以責米粟使疏吏翻拷音考掠音亮王軌等不堪其弊遣通事舍人許敬宗詣密請降隋內史省有通事舍人十六人降戶江翻章十二行本以上有密字乙十一行本同孔本同張校同退齊校同軌為滑州總管改東郡為滑州滑州治白馬春秋衛之漕邑宋魏兵爭以滑臺為重鎮隋開皇三年置滑州取滑臺為名也與魏徵共掌文翰敬宗善心之子也善心死於江都之難隨衆降密密以其隋氏大臣虛心禮之威見密初不言帝室艱危唯再三舞蹈稱不圖今日復覩聖明時人鄙之化及聞王軌叛大懼自汲郡引兵欲取以北諸郡其將陳智略帥嶺南驍果萬餘人樊文超帥江淮排䂎將即亮翻帥讀曰率䂎作管翻張童兒帥江東驍果數千人皆降於密文超子蓋之子也樊子蓋事煬帝有守東都之功北趣魏縣隋志魏縣屬武陽郡時李密改武陽郡為魏州趣七喻翻又逡須翻西還鞏洛留徐世績以備之武德元年乙巳宣州刺史周超擊朱粲敗之宣州宣當作宜州敗補邁翻下同武德元年丁未梁師都寇靈州復以靈武郡為靈州宋白曰靈州漢富平縣地後魏孝昌二年置靈州義師初起改隋鷹揚郎將曰軍頭尋改軍頭曰驃騎將軍驃匹妙翻騎奇寄翻武德元年突厥闕可汗遣使內附西突厥闕度設處於會寧隋亂自稱可汗使疏吏翻可從刊入聲汗音寒闕可汗附於李軌隋西戎使者曹瓊據甘州誘之西戎使者蓋隋煬帝所置宋白曰西魏廢帝二年以張掖為甘州隋大業以為張掖郡唐復以張掖郡為甘州誘音酉與之拒軌為軌所敗竄於達斗拔谷與吐谷渾相表裏敗補邁翻吐從暾入聲谷音浴至是內附章十二行本附下有上厚加撫慰五字乙十一行本同孔本同退齊校同尋為李軌所滅武德元年薛舉進逼高墌新志寧州定平縣有高墌城墌章恕翻岐唐復以北地郡為豳州扶風郡為岐州詳見下卷會世民得瘧疾瘧魚約翻委軍事於長史納言劉文靜劉文靜以納言為秦王行軍長史長知兩翻殷開山以吏部侍郎為行軍司馬薛舉懸軍深入食少兵疲若來挑戰少始紹翻挑徒了翻慎勿應也俟吾疾愈為君等破之為于僞翻開山退謂文靜曰王慮公不能辦故有此言耳且賊聞王有疾必輕我宜曜武以威之乃陳於高墌西南陳讀曰陳恃衆而不設備舉潛師掩其後壬子戰於淺水原新志豳州宜祿縣有淺水原士卒死者什五六大將軍慕容羅喉李安遠劉弘基皆沒世民引兵還長安舉遂拔高墌收唐兵死者為京觀觀古玩翻文靜等皆坐除名武德元年乙卯榆林賊帥郭子和遣使來降帥所類翻使疏吏翻下同降戶江翻以為靈州總管武德元年李密每戰勝必遣使告捷於皇泰主隋人皆喜王世充獨謂其麾下曰元文都輩刀筆吏耳吾觀其勢必為李密所擒且吾軍士屢與密戰沒其父兄子弟前後已多一旦為之下吾屬無類矣欲以激怒其衆文都聞之大懼與盧楚等謀因世充入朝伏甲誅之朝直遙翻段達性庸懦懦奴過翻又奴亂翻恐其事不就遣其壻張志以楚等謀告世充戊午夜三鼓世充勒兵襲含嘉門含嘉門蓋以通含嘉城而名考異曰河洛記初元文都欲自為御史盧楚已為宣詔王世充固執以為不可乃止文都大悵盧楚私謂文都曰王世充是外軍一將非留守達官比者領軍屢為奔徙吾方恤外姦且從捨過翻更宰制人事跋扈縱橫此而不除恐為國患文都曰未可即殺且欲當朝上奏御前縛之鎖繫於獄楚曰善文都懷奏入殿臨欲施行趙季卿私告之世充遂奔含嘉以作亂是時宮中亦遣使傳報世充為皇姨故也初世充妻蕭氏早亡後有胡氏者復在江都皇泰主乃以皇姨嫁之至是爭權遂起兵馬文都等令趙方海前後追世充世充乃託疾不受召按世充正為與文都爭李密事相誅耳恐事不因此今不取入奉皇泰主御乾陽殿乾陽殿隋東都宮正殿命諸將閉門拒守將即亮翻將軍跋野綱將兵出遇世充下馬降之跋野虜復姓不利費父沸翻闍視遮翻又音都文都自將宿衛兵欲出玄武門以襲其後玄武門宮城北門煬帝大業三年改內侍省為長秋監稽留遂久天且曙文都復欲引兵出太陽門逆戰還至乾陽殿世充已攻太陽門得入按舊書王世充傳太陽門宮城東門斫右掖門西奔長安六典皇城在都城西北隅南面三門中曰端門左曰左掖右曰右掖太官署在光祿寺百僚廨署皆在皇城之內至興教門見世充皇宮南面三門左曰興教進攻紫微宮門皇泰主使人登紫微觀觀門闕也音古玩翻問稱兵欲何為世充下馬謝曰元文都盧楚等橫見規圖橫戶孟翻請殺文都甘從刑典段達乃令將軍黃桃樹執送文都文都顧謂皇泰主曰臣今朝死陛下夕及矣皇泰主慟哭遣之出興教門亂斬如盧楚並殺盧元諸子段達又以皇泰主命開門納世充世充悉遣人代宿衛者然後入見皇泰主於乾陽殿見賢遍翻下同皇泰主謂世充曰亶相誅殺曾不聞奏豈為臣之道乎公欲肆其強力敢及我邪邪音耶世充拜伏流涕謝曰臣蒙先皇采拔粉骨非報文都等苞藏禍心欲召李密以危社稷疾臣違異深積猜嫌臣迫於救死不暇聞奏若內懷不臧違負陛下天地日月實所照臨使臣闔門殄滅無復遺類復扶又翻詞淚俱發皇泰主以為誠引令升殿與語久之因與俱入見皇太后皇泰主之母劉良娣稱不敢有二心被皮義翻乃以世充為左僕射總督內外諸軍事比及日中比必寐翻捕獲趙長文郭文懿殺之二人蓋盧元之黨長知兩翻告諭以誅元盧之意世充自含嘉城移居尚書省漸結黨援恣行威福用兄世惲為內史令惲於粉翻入居禁中子弟咸典兵馬分政事為十頭悉以其黨主之勢震內外莫不趨附皇泰主拱手而已武德元年李密將入朝朝直遙翻至溫隋志溫縣屬河內郡乃還金墉東都大饑私錢濫惡太半雜以錫鐶隋開皇初見用之錢皆須和以錫鑞錫鑞既賤求利者多私鑄之錢不可禁約乃詔禁出錫鑞之處不得私採立榜置樣錢不中樣者不入於市大業之季王綱弛紊私鑄益多錢轉薄惡初焉每千猶重二斤漸輕至一斤或剪鐵鍱裁皮糊紙以為錢相雜用之錫鐶固宜多矣鐶戶關翻米斛直錢八九萬武德元年初李密嘗受業於儒生徐文遠文遠為皇泰主國子祭酒自出樵采為密軍所執密令文遠南面坐備弟子禮北面拜之文遠曰老夫既荷厚禮荷下可翻敢不盡言未審將軍之志欲為伊霍以繼絶扶傾乎則老夫雖遲暮猶願盡力若為莽卓乘危邀利則無所用老夫矣密頓首曰昨奉朝命備位上公朝直遙翻下同冀竭庸虛匡濟國難難乃旦翻此密之本志也文遠曰將軍名臣之子李密寬之子寬為周將以驍勇著名若能不遠而復猶不失為忠義之臣及王世充殺元文都等密復問計於文遠復扶又翻文遠曰世充亦門人也其為人殘忍褊隘既乘此勢必有異圖將軍前計為不諧矣非破世充不可入朝也朝直遙翻密曰始謂先生儒者不達時事今乃坐決大計何其明也文遠孝嗣之玄孫也徐孝嗣相蕭齊武德元年庚申詔隋氏離宮遊幸之所並廢之武德元年戊辰遣黃臺公瑗安撫山南瑗于眷翻武德元年己巳以隋右武衛將軍皇甫無逸為刑部尚書武德元年隋河間郡丞王琮守郡城以拒㣥盜琮祖宗翻竇建德攻之歲餘不下聞煬帝凶問帥吏士發喪乘城者皆哭建德遣使弔之琮因使者請降帥讀曰率使疏吏翻降戶江翻下同建德退舍具饌以待之琮言及隋亡俯伏流涕建德亦為之泣饌雛戀翻又雛白宛翻為于僞翻諸將曰琮久拒我軍殺傷甚衆力盡乃降請烹之建德曰琮忠臣也吾方賞之以勸事君奈何殺之往在高雞泊為盜容可妄殺人今欲安百姓定天下豈得害忠良乎乃徇軍中曰先與王琮有怨敢妄動者夷三族以琮為瀛州刺史復以河間郡為瀛州宋白曰瀛州漢為河間國後漢為樂成國後魏於樂成縣立瀛州取瀛海為名爭附於建德盜亦有道豈欺我哉先是建德陷景城執戶曹河東張玄素將殺之景城縣隋志屬河間郡舊曰成平開皇十八年改名張玄素為縣戶曹也先悉薦翻請代其死號戶刀翻曰戶曹清慎無比大王殺之何以勸善建德乃釋之以為治書侍御史固辭及江都敗復以為黃門侍郎玄素乃起史言隋之故官漸就仕於他姓治直之翻復扶又翻隋志饒陽縣屬河間郡說建德以定河北之策說輸芮翻建德引為謀主建德定都樂壽隋志樂壽縣屬河間郡舊曰樂城開皇十八年改為廣城仁壽初改今名劉昫曰後魏移縣東北近古樂縣壽因改為樂壽焉按瀛州河間郡時治樂壽宋白曰太和十一年河間郡自樂城移理於今樂壽縣西一里樂壽亭城隋開皇廢郡置瀛州大業廢州為河間郡樂音洛命所居曰金城宮備置百官王崇武標點容肇祖聶崇岐覆校
