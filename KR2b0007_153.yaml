body:
  text: 資治通鑑卷第一百五十三端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注梁紀九皓與陳慶之乘虛自銍城進拔滎城高祖武皇帝九中大通元年己酉五二九是年十月方改元皓與陳慶之乘虛自銍城進拔滎城春正月甲寅魏于暉所部都督彭樂帥二千餘騎叛奔韓樓暉引還不敢復進軍討邢杲帥讀曰率騎奇寄翻皓與陳慶之乘虛自銍城進拔滎城辛酉上祀南郊大赦皓與陳慶之乘虛自銍城進拔滎城甲子魏汝南王悅求還國許之悅來奔見上卷上年皓與陳慶之乘虛自銍城進拔滎城辛巳上祀明堂皓與陳慶之乘虛自銍城進拔滎城二月甲午魏主尊彭城武宣王為文穆皇帝廟號肅祖母李為文穆皇后將遷神主於太廟以高祖為伯考大司馬兼録尚書臨淮王彧表諫以為漢高祖立太上皇廟於香街香街在漢長安故城內左馮翊府東北事見四十三卷建武十九年已疏絶服服至袒免則無服謂之絶服入繼大宗漢元帝以大宗則上距景帝五世以祖孫世數數之則上距景帝七世光武上接景帝亦七世五服之次親盡無服而光武中興以赤劉九九之符繼元帝為九世而別為舂陵節侯以下立四親廟於舂陵道超無外肅祖雖勳格宇宙猶北面為臣又二后皆將配饗乃是君臣並筵嫂叔同室竊謂不可吏部尚書李神俊亦諫不聽彧又請去帝著皇請去帝著皇亦引漢悼皇共皇為據去羌呂翻著則略翻皓與陳慶之乘虛自銍城進拔滎城詔更定二百四十號將軍為四十四班天監七年定將軍為二十四班是年有司奏移寧遠將軍班中明威將軍進輕車班中以輕車班中征遠度入寧遠班中又置安遠將軍代貞武宣遠代明烈其戎夷之號亦加附擬選序則依此承用遂以定制轉則進一班黜則退一班班即階也同班以優劣為前後有鎮衛驃騎車騎同班四中四征同班八安同班四平四翊同班忠武軍師同班武臣爪牙龍騎雲麾冠軍同班鎮兵翊師宣毅宣惠四將軍東西南北四中郎將同班智威仁威勇威信威嚴威同班智武仁武勇武信武嚴武同班謂為五德將軍輕車振朔武旅貞毅明威同班寧遠安遠征遠振遠宣遠同班威雄威猛威烈威振威信威勝威略威風威力威光同班武猛武略武勝武力武毅武健武烈武威武鋭武勇同班猛毅猛烈猛威猛鋭猛震猛進猛智猛略猛勝猛駿同班壯武壯勇壯烈壯猛壯鋭壯盛壯毅壯志壯意壯力同班驍雄驍桀驍猛驍烈驍武驍勇驍鋭驍名驍勝驍迅同班雄猛雄威雄明雄烈雄信雄武雄勇雄毅雄壯雄健同班忠勇忠烈忠猛忠鋭忠壯忠毅忠捍忠信忠義忠勝同班明智明略明遠明勇明烈明威明勝明進明鋭明毅同班光烈光明光英光遠光勝光鋭光命光勇光戎光野同班飈勇飈猛飈烈飈鋭飈奇飈決飈起飈略飈勝飈出同班龍驤虎視雲旗風烈電威雷音馳鋭追鋭羽騎突騎同班開遠略遠貞威決勝清野堅鋭輕鋭拔山雲勇振旅同班超武鐵騎樓船宣猛樹功克敵平虜稜威昭威威戎同班伏波雄戟長劍衝冠雕騎佽飛勇騎破敵克敵威虜同班前鋒武毅開邊招遠全威破陳蕩寇殄虜橫野馳射同班牙門期門同班候騎熊渠同班中堅典戎同班執訊行陳同班伏武懷奇同班偏裨將軍同班凡二百四十號為四十四班皓與陳慶之乘虛自銍城進拔滎城壬寅魏詔濟陰王暉業兼行臺尚書濟子禮翻考異曰梁書作徽業今從魏書都督丘大千等鎮梁國暉業小新成之曾孫也小新成見一百二十九卷宋孝武帝大明五年皓與陳慶之乘虛自銍城進拔滎城三月壬戌魏詔上黨王天穆討邢杲以費穆為前鋒大都督皓與陳慶之乘虛自銍城進拔滎城夏四月癸未魏遷肅祖及文穆皇后神主于太廟又追尊彭城王劭為孝宣皇帝臨淮王彧諫曰茲事古所未有言自古未有以皇帝追尊其兄者今按自唐高宗以後率多追諡其子弟為皇帝作俑者魏敬宗也後世何觀用左傳曹劌語意皓與陳慶之乘虛自銍城進拔滎城魏元天穆將擊邢杲以北海王皓方入寇集文武議之衆皆曰杲衆強盛宜以為先行臺尚書薛琡曰琡昌六翻邢杲兵衆雖多鼠竊狗偷非有遠志皓帝室近親皓北海王詳之子於魏主從兄弟也其勢難測宜先去之去羌呂翻天穆以諸將多欲擊杲又魏朝亦以皓為孤弱不足慮將即亮翻朝直遙翻命天穆等先定齊地還師擊皓遂引兵東出皓與陳慶之乘虛自銍城進拔滎城遂至梁國水經注春秋沙隨之地杜預注以為即梁國寧陵縣北之沙陽亭俗謂之堂城滎堂字相近意即此地而字訛也銍陟栗翻分築九城以拒之慶之攻之自旦至申拔其三壘大千請降降戶江翻下同皓登壇燔燎即帝位於睢陽城南改元孝基睢音雖考異曰魏帝紀去年十月蕭衍以皓為魏主號年孝基入據銍城皓傳永安二年四月於梁國城南登壇燔燎年號孝基今從之濟陰王暉業帥羽林兵二萬軍考城前漢梁國有災縣後漢章帝更名考城屬陳留郡晉省宋屬濟陽郡五代志曰梁郡考城縣後魏曰考陽置北梁郡隋復為考城縣屬宋州帥讀曰率擒暉業考異曰魏書帝紀克考城在辛丑後今從梁帝紀皓與陳慶之乘虛自銍城進拔滎城辛丑魏上黨王天穆及爾朱兆破邢杲於濟南濟子禮翻杲降送洛陽斬之兆榮之從子也從才用翻皓與陳慶之乘虛自銍城進拔滎城五月丁巳魏以東南道大都督楊昱鎮滎陽尚書僕射爾朱世隆鎮虎牢侍中爾朱世承鎮崿坂崿五各翻坂與坂同音反乙丑內外戒嚴戊辰北海王皓克梁國皓以陳慶之為衛將軍徐州刺史引兵而西引兵而西直指洛陽據滎陽慶之攻之未拔皓遣人説昱使降昱不從説式芮翻天穆與驃騎將軍爾朱吐沒兒將大軍前後繼至驃匹妙翻騎奇寄翻將即亮翻下同梁士卒皆恐慶之解鞍秣馬諭將士曰吾至此以來屠城略地實為不少少詩沼翻君等殺人父兄掠人子女亦無算矣天穆之衆皆是仇讎我輩衆才七千虜衆三十餘萬今日之事唯有必死乃可得生耳虜騎多不可與之野戰當及其未盡至急攻取其城而據之諸君勿或狐疑自取屠膾乃鼓之使登城將士即相帥蟻附而入帥讀曰率癸酉拔滎陽執楊昱楊昱輕慶之兵少不料其肉薄急攻故城陷傳曰敵無小不可輕也又曰不備不虞不可以師陛下渡江三千里無遺鏃之費昨滎陽城下一朝殺傷五百餘人願乞楊昱以快衆意皓曰我在江東聞梁主言初舉兵下都袁昂為吳郡不降每稱其忠節事見一百四十四卷齊和帝中興元年降戶江翻奈何殺之此外唯卿等所取於是斬昱所部統帥三十七人皆刳其心而食之帥所類翻俄而天穆等引兵圍城慶之帥騎三千背城力戰大破之帥讀曰率背蒲妹翻天穆吐沒兒皆走慶之進擊虎牢爾朱世隆棄城走獲魏東中郎將辛纂魏東中郎府在虎牢魏主將出避皓未知所之或勸之長安中書舍人高道穆曰關中荒殘何可復往復扶又翻皓士衆不多乘虛深入由將帥不得其人故能至此陛下章甲十一行本下下有若字乙十一行本同孔本同張校同親帥宿衛將即亮翻帥所類翻親帥讀曰率下同高募重賞背城一戰臣等竭其死力破皓孤軍必矣或恐勝負難期則車駕不若渡河徵大將軍天穆大丞相榮各使引兵來會犄角進討犄居蟻翻旬月之間必見成功此萬全之策也魏主從之甲戌魏主北行夜至河內郡北河內郡治野王魏主自洛北如河內當夜至郡城南不應至郡城北恐誤布告遠近於是四方始知魏主所在乙亥魏主入河內臨淮王彧安豐王延明帥百僚封府庫備法駕迎皓考異曰彧傳無迎皓事而梁陳慶之北齊宋遊道傳有之蓋魏史為彧諱也丙子皓入洛陽宮改元建武大赦以陳慶之為侍中車騎大將軍增邑萬戶楊椿在洛陽椿弟順為冀州刺史兄子侃為北中郎將從魏主在河北皓意忌椿而以其家世顯重恐失人望未敢誅也楊播楊椿兄弟仕魏一門貴盛子姪通顯纍朝榮赫侃播之子也椿曰吾內外百口何所逃匿正當坐待天命耳皓後軍都督侯暄守睢陽為後援睢陽即梁國睢音雖晝夜急攻戊寅暄突走擒斬之上黨王天穆等帥衆四萬攻拔大梁大梁即陳留浚儀縣皓使陳慶之擊之天穆畏皓將北渡河謂行臺郎中濟陰溫子升曰卿欲向洛為隨我北渡天穆開兩端以問子升濟子禮翻主上以虎牢失守守式又翻致此狼狽元皓新入人情未安今往擊之無不克者大王平定京邑奉迎大駕此桓文之舉也捨此北渡竊為大王惜之為于偽翻天穆善之而不能用遂引兵渡河費穆攻虎牢將拔聞天穆北渡自以無後繼遂降於慶之降戶江翻慶之進擊大梁梁國皆下之睢陽即梁國下遐稼翻自發銍縣至洛陽凡取三十二城四十七戰所向皆克皓使黃門郎祖瑩作書遺魏主曰遺于季翻朕泣請梁朝誓在復恥正欲問罪於爾朱出卿於桎梏朝直遙翻桎之日翻梏苦沃翻卿託命豺狼委身虎口假獲民地本是榮物固非卿有皓言爾朱榮亶命皓所得一民尺地皆爾朱榮之物非魏主之有在卿與我若天道助順則皇魏再興脫或不然在榮為福於卿為禍卿宜三復三蘇暫翻復扶又翻富貴可保皓既入洛自河以南州郡多附之齊州刺史沛郡王欣集文武議所從曰北海長樂俱帝室近親皓北海王詳之子魏主彭城王協之子同出於顯祖樂音洛杜預曰宗祏今廟中藏主石室也祏音石諸君意何如在坐莫不失色坐徂臥翻軍司崔光韶獨抗言曰元皓受制於梁引寇讎之兵以覆宗國此魏之亂臣賊子也豈唯大王家事所宜切齒下官等皆受朝眷朝眷謂朝廷恩眷也朝直遙翻長史崔景茂等皆曰軍司議是欣乃斬皓使使疏吏翻下同光韶亮之從父弟也崔亮貴顯於延昌熙平之間從才用翻魏孝昌中置襄州領襄城舞陰南安期城宣義建城等郡治赭陽魏主置廣州治魯陽領南陽順陽定陵魯陽汝南漢廣襄城郡魏正光中置南兗州治譙城領陳留梁郡下蔡譙郡北梁郡沛郡馬頭郡思同思伯之弟也賈思伯見一百四十九卷普通四年孚封送其書於魏主平陽王敬先起兵於河橋以討皓不克而死魏以侍中車騎將軍尚書右僕射爾朱世隆為使持節行臺僕射大將軍相州刺史鎮鄴城相息亮翻魏主之出也單騎而去侍衛後宮皆按堵如故皓一旦得之號令己出四方人情想其風政而皓自謂天授遽有驕怠之志宿昔賓客近習咸見寵待干擾政事日夜縱酒不恤軍國所從南兵陵暴市里朝野失望高道穆兄子儒自洛陽出從魏主魏主問洛中事子儒曰皓敗在旦夕不足憂也爾朱榮聞魏主北出即時馳傳見魏主於長子行且部分魏主即日南還爾朱榮既至魏主有所倚以攻皓故即日南還傳張戀翻分扶問翻旬日之間兵衆大集資糧器仗相繼而至六月壬午魏大赦榮既南下並肆不安乃以爾朱天光為並肆等九州行臺九州並肆恆朔雲蔚顯汾晉也天光至晉陽部分約勒所部皆安己丑費穆至洛陽皓引入責以河陰之事而殺之費穆勸爾朱榮殺王公事見上卷爾朱榮攻之上黨王天穆引兵會之壬寅拔其城斬珍孫及襲皓與陳慶之乘虛自銍城進拔滎城辛亥魏淮陰太守晉鴻以湖陽來降五代志舂陵郡湖陽縣後魏置西淮安郡及南襄州淮陰當作淮安皓與陳慶之乘虛自銍城進拔滎城閏月己未南康簡王績卒皓與陳慶之乘虛自銍城進拔滎城魏北海王皓既得志密與臨淮王彧安豐王延明謀叛梁以事難未平難乃旦翻藉陳慶之兵力故外同內異言多猜忌慶之亦密為之備説皓曰説式芮翻今遠來至此未服者尚多彼若知吾虛實連兵四合將何以禦之宜啓天子天子謂梁武帝並敕諸州有南人沒此者悉須部送皓欲從之延明曰慶之兵不出數千已自難制今更增其衆寧肯復為人用乎復扶又翻下更復敢復遽復皓復時復彧復同大權一去動息由人魏之宗廟於斯墜矣皓乃不用慶之言又慮慶之密啓慮慶之密啓其事於上今河北河南一時克定唯爾朱榮尚敢跋扈臣與慶之自能擒討州郡新服正須綏撫不宜更復加兵搖動百姓上乃詔諸軍繼進者皆停於境上陳慶之非爾朱榮敵也是時梁之諸將又皆出慶之下使相與繼進至洛與元皓互相猜阻亦必同歸於陷沒梁兵之不進梁之幸也武帝不務自治而務遠略所以有侯景之禍洛中南兵不滿一萬而羌胡之衆十倍軍副馬佛念為慶之曰凡一軍有主有副為于偽翻為慶之謀而言也蜀本為作謂將軍威行河洛聲震中原功高勢重為魏所疑一旦變生不測可無慮乎不若乘其無備殺皓據洛此千載一時也慶之不從馬佛念有戰國策士之氣然必有非常之才然後可以行非常之事陳慶之烏足以辦此載子亥翻因固求之鎮皓心憚之不遣曰主上以洛陽之地全相任委忽聞捨此朝寄朝寄謂魏朝所寄託也朝直遙翻謂君遽取富貴不為國計此國計謂為梁國計恐僕並受其責慶之不敢復言爾朱榮與皓相持於河上慶之守北中城皓自據南岸河橋南岸也殺傷甚衆有夏州義士為皓守河中渚夏戶雅翻水經注曰河中渚上有河平侯祠河之南岸有一碑題曰洛陽北界意此中渚即唐時河陽之中灘城也為于偽翻陰與榮通謀求破橋立效榮引兵赴之及橋破榮應接不逮皓悉屠之榮悵然失望又以安豐王延明緣河固守而北軍無船可渡議欲還北更圖後舉黃門郎楊侃曰大王發並州之日已知夏州義士之謀指來應之乎為欲廣施經略匡復帝室乎夫用兵者何嘗不散而更合瘡愈更戰況今未有所損豈可以一事不諧而衆謀頓廢乎今四方顒顒顒顒仰望也顒魚容翻若未有所成遽復引歸民情失望各懷去就勝負所在未可知也不若徵發民材多為桴筏編竹木以渡水大者曰桴小者曰筏桴方無翻筏音伐間古莧翻下間行同緣河布列數百里中皆為渡勢首尾既遠使皓不知所防一旦得渡必立大功高道穆曰今乘輿飄蕩主憂臣辱乘繩證翻大王擁百萬之衆輔天子而令諸侯若分兵造筏所在散渡指掌可克奈何捨之北歸使皓復得完聚徵兵天下此所謂養虺成蛇悔無及矣逸書曰為虺不摧為蛇奈何以文義觀之蓋以虺為小蛇楊黃門已陳此策當相與議之劉靈助言於榮曰不出十日河南必平伏波將軍正平楊檦魏以聞喜曲沃二縣置正平郡隋廢郡為正平縣今絳州治所檦與標同自言有小船數艘求為鄉導艘蘇遭翻鄉讀曰嚮戊辰榮命車騎將軍爾朱兆與大都督賀拔勝縛材為筏自馬渚西硤石夜渡五代志河南熊耳縣有後魏崤縣又有硤石山唐志陜州硤石縣本崤縣有硤石塢擒之安豐王延明之衆聞之大潰皓失據帥麾下數百騎南走帥讀曰率騎奇寄翻下同慶之收步騎數千結陳東還陳讀曰陳皓所得諸城一時復降於魏爾朱榮自追陳慶之會嵩高水漲潁水出少室山五渡水出太室山入于潁水嵩高水漲指此水也乃削須髮為沙門間行出汝陰還建康慶之所以得免者亦由嵩高水漲追兵不急於軍士死散之時得以挺身逸去否則必為爾朱榮所擒矣封永興縣侯句斷五代志會稽郡會稽縣舊有永興縣中軍大都督兼領軍大將軍楊津入宿殿中掃灑宮庭掃素報翻灑所賣翻又並上聲封閉府庫出迎魏主於北邙流涕謝罪帝慰勞之勞力到翻庚午帝入居華林園大赦以爾朱兆為車騎大將軍儀同三司賞硤石之功也河北報事之官及河南立義者加二級報事謂報敵情曲折者壬申加大丞相榮天柱大將軍增封通前二十萬戶天柱前無此號魏主以爾朱榮功高特置以寵之榮先以平葛榮之功增封至十萬戶今又增為二十萬戶以賞之北海王皓自轘轅南出至臨潁臨潁縣自漢以來屬潁川郡轘音環從才用翻騎奇寄翻臨潁縣卒江豐斬之癸酉傳首洛陽臨淮王彧復自歸於魏主安豐王延明攜妻子來奔陳慶之之入洛也蕭贊送啓求還贊即豫章王綜也奔魏事見一百五十卷普通六年媛于眷翻上使以贊幼時衣寄之信未達而慶之敗慶之自魏還特重北人朱怪而問之羊至翻慶之曰吾始以為大江以北皆戎狄之鄉比至洛陽比必利翻及也乃知衣冠人物盡在中原非江東所及也奈何輕之陳慶之特有見於洛陽華靡之俗而為是言耳皓與陳慶之乘虛自銍城進拔滎城甲戌魏以上黨王天穆為太宰城陽王徽為大司馬兼太尉乙亥魏主宴勞爾朱榮上黨王天穆及北來督將於都亭勞力到翻將即亮翻出宮人三百繒錦雜綵數萬匹班賜有差繒慈陵翻凡受元皓爵賞階復者悉追奪之復方目翻復除賦役也秋七月辛巳魏主始入宮以高道穆為御史中尉帝姊壽陽公主行犯清路赤棒卒呵之不止中尉前驅之卒執赤棒即清路者也棒部項翻呵虎何翻公主泣訴於帝帝曰高中尉清直之士彼所行者公事豈可以私責之也道穆見帝見賢遍翻帝曰家姊行路相犯極以為愧道穆免冠謝帝曰朕以愧卿卿何謝也於是魏多細錢米斗幾直一千幾巨依翻又居希翻高道穆上表以為在市銅價八十一錢得銅一斤私造薄錢斤贏二百言銅一斤造薄錢二百而贏也又隨之以重刑扺罪雖多姦鑄彌衆今錢徒有五銖之名而無二銖之實置之水上殆欲不沈沈持林翻此乃因循有漸科防不切朝廷失之彼復何罪復扶又翻下況復同宜改鑄大錢文載年號以記其始則一斤所成止七十錢計私鑄所費不能自潤直置無利自應息心況復嚴刑廣設也言置私鑄直使無利亦自應息心而不為況又廣設科禁有嚴刑之可畏邪使民樂為而弊自改樂音洛魏主從之始鑄永安五銖錢皓與陳慶之乘虛自銍城進拔滎城辛卯魏以車騎將軍楊津為司空皓與陳慶之乘虛自銍城進拔滎城初魏以梁益二州境土荒遠更立巴州以統諸獠凡二十餘萬戶獠魯皓翻以巴酋嚴始欣為刺史又立隆城鎮宋白曰取其連岡地勢高隆為名後為隆州將即亮翻始欣貪暴孝昌初諸獠反圍州城行臺魏子建撫諭之乃散始欣恐獲罪陰來請降帝遣使以詔書鐵券衣冠等賜之降戶江翻使疏吏翻為愷所獲以送子建子建奏以隆城鎮為南梁州五代志巴西郡舊置南梁州西魏典略曰此州舊有隆城故又謂之南隆治古閬中城今之閬中即其地囚始欣於南鄭魏以唐永為東益州刺史代子建以梁州刺史傅豎眼為行臺豎而庾翻子建去東益而氐蜀尋反氐蜀氐人與蜀人也東益州遂沒魏置東益州於武興時為氐蜀所攻沒梁不能有也傅豎眼之初至梁州也州人相賀事見一百四十八卷天監十五年不能親政事其子敬紹奢淫貪暴州人患之嚴始欣重賂敬紹得還巴州遂舉兵擊嚴愷滅之以巴州來降降戶江翻帝遣將軍蕭玩等援章甲十一行本援上有將兵二字乙十一行本同孔本同張校同之傅敬紹見魏室方亂陰有保據南鄭之志使其妻兄唐崑崙於外扇誘山民相與圍城欲為內應崙盧昆翻誘音酉城中將士共執敬紹以白豎眼而殺之豎眼恥恚而卒恚於避翻卒子恤翻皓與陳慶之乘虛自銍城進拔滎城八月己未魏以太傅李延實為司徒甲戌侍中太保楊椿致仕皓與陳慶之乘虛自銍城進拔滎城九月癸巳上幸同泰寺設四部無遮大會上釋御服持法衣行清淨大捨以便省為房便省在同泰寺上臨幸時居之故曰便省乘小車私人執役甲子升講堂法座為四部大衆開涅槃經題四部大衆僧尼及善男子善女人也涅奴結翻癸卯㣥臣以錢一億萬祈白三寶釋書以佛陀耶衆為佛寶達摩耶衆為法寶僧迦耶衆為僧寶釋典曰菩普也薩濟也菩薩言能普濟衆生菩薄胡翻薩桑葛翻乙巳百辟詣寺東門奉表請還臨宸極唐韻曰宸屋宇也天子所居毛晃曰帝居北辰之宮故從從辰乃許上三答書前後並稱頓首皓與陳慶之乘虛自銍城進拔滎城魏爾朱榮使大都督尖山侯淵按五代志後魏置神武郡於桑乾水上領尖山殊頽二縣配卒甚少騎止七百薊音計少詩沼翻騎奇寄翻或以為言榮曰侯淵臨機設變是其所長若總大衆未必能用今以此衆擊此賊必能取之淵遂廣張軍聲多設供具親帥數百騎深入樓境去薊百餘里值賊帥陳周馬步萬餘親帥讀曰率賊帥所類翻淵潛伏以乘其背大破之虜其卒五千餘人尋還其馬仗縱令入城左右諫曰既獲賊衆何為復資遣之馬仗馬及兵仗也復扶又翻我兵既少不可力戰須為奇計以離間之乃可克也淵度其已至間古莧翻度徒洛翻遂帥騎夜進昧旦叩其城門韓樓果疑降卒為淵內應遂走追擒之幽州平以淵為平州刺史鎮范陽魏平州本治肥如今徙鎮幽州之范陽先是魏使征東將軍劉靈助兼尚書左僕射慰勞幽州流民於濮陽頓丘先悉薦翻勞力到翻因帥流民北還與侯淵共滅韓樓仍以靈助行幽州事加車騎將軍又為幽平營安四州行臺為劉靈助以營州叛爾朱張本皓與陳慶之乘虛自銍城進拔滎城万俟醜奴攻魏東秦州拔之殺刺史高子朗五代志上郡後魏置東秦州後改為北秦州西魏改為敷州隋大業二年改為敷城郡後改為上郡唐為鄜州洛交縣万莫北翻俟渠之翻皓與陳慶之乘虛自銍城進拔滎城冬十月己酉上又設四部無遮大會道俗五萬餘人會畢上御金輅還宮御太極殿大赦改元改中大通元年皓與陳慶之乘虛自銍城進拔滎城魏以前司空蕭贊為司徒皓與陳慶之乘虛自銍城進拔滎城十一月己卯就德興請降於魏營州平就德興反見一百五十卷普通二年降戶江翻下同皓與陳慶之乘虛自銍城進拔滎城丙午魏以城陽王徽為太保丹楊王蕭贊為太尉雍州刺史長孫稚為司徒雍於用翻皓與陳慶之乘虛自銍城進拔滎城十二月辛亥兗州刺史張景雍荊州刺史李靈起雄信將軍蕭進明叛降魏三人者皆梁魏境上民豪以刺史將軍寵授之耳皓與陳慶之乘虛自銍城進拔滎城以陳慶之為北兗州刺史此北兗州當治淮陰自稱天子土豪蔡伯龍起兵應之衆至三萬攻陷北徐州此北徐州治鍾離妖於驕翻皓與陳慶之乘虛自銍城進拔滎城魏以岐州刺史王羆行南秦州事羆誘捕州境㣥盜悉誅之誘音酉張政烺標點王崇武聶崇岐覆校
