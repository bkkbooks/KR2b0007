body:
  text: 資治通鑑卷第一百一十二端明殿學士兼翰林侍讀學士大中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注晉紀三十四安皇帝丁隆安五年辛丑四一春正月武威王利鹿孤欲稱帝㣥臣皆勸之安國將軍鍮勿崙曰安國將軍漢獻帝以授張楊鍮託侯翻崙盧昆翻吾國自上世以來被髮左袵被皮義翻無冠帶之飾逐水草遷徙無城郭室廬故能雄視沙漠抗衡中夏夏戶雅翻今舉大號誠順民心然建都立邑難以避患儲蓄倉庫啓敵人心不如處晉民於城郭勸課農桑以供資儲帥國人以習戰射鄰國弱則乘之強則避之此久長之良策也自漢以來善為夷狄謀者莫過此策矣處昌呂翻帥讀曰率徒足為世之質的將安用之質受斧的受矢按詩發彼有的毛傳云的質也正義曰毛氏於射侯之事正鵠不明惟猗嗟傳云二尺曰正亦不言正之所施周禮鄭衆馬融注皆云十尺曰侯四尺曰鵠二尺曰正四寸曰質則以為侯皆一丈鵠及正質於一侯之中為此等級則以質為四寸也王肅引爾雅云射張皮謂之侯侯中謂之鵠鵠中謂之正正方二尺正中謂之槷槷方六寸槷則質也舊云方四寸今云方六寸爾雅説明宜從之肅意惟改質為六寸餘同鄭馬賈逵周禮注云四尺曰正正五重鵠居其內而方二尺以為正正大於鵠鵠在正內雖內外不同亦共在一侯鄭於周禮上下檢之以為大射之侯其中制皮為鵠賓射之侯其中采畫為正正大如鵠皆居侯中三分之一其燕射則射獸侯侯中畫為獸形即鄉射記所謂熊侯白質之類射義云孔子曰循聲而發發而不失正鵠者其惟賢者乎詩云發彼有的以祈爾爵既言正鵠即引此的則詩人之意以的為正鵠之謂也司裘注説皮侯之狀云以虎熊豹麋之皮飾其側又方制之以為質謂之鵠是鄭意以侯中所射之處為質也此毛傳唯言的質也安國之言是也乃更稱河西王更工衡翻王武威則一郡而已王河西則欲兼漢四郡之地此利鹿孤之志也以廣武公傉檀為都督中外諸軍事涼州牧録尚書事傉奴沃翻二月丙子孫恩出浹口浹即叶翻不能拔劉牢之擊之恩復走入海復扶又翻秦王興使乞伏乾歸還鎮苑川盡以其故部衆配之為乞伏氏復強張本涼王纂嗜酒好獵好呼到翻太常楊穎諫曰陛下應天受命當以道守之今疆宇日蹙崎嶇二嶺之間姑臧南有洪池嶺西有丹嶺一作刪丹嶺而沈湎遊畋沈持林翻不以國家為事臣竊危之纂遜辭謝之然猶不悛番禾太守呂超亶擊鮮卑思盤番禾縣漢屬張掖郡後漢晉省番音盤此郡蓋呂氏置劉昫曰唐涼州天寶縣漢番禾縣地悛七緣翻番音盤纂命超及思盤皆入朝朝直遙翻超懼至姑臧深自結於殿中監杜尚纂見超責之曰卿恃兄弟桓桓孔安國曰桓桓武貌今人謂相陵為相欺天下乃定超頓首謝纂本以恐愒超愒許葛翻實無意殺之因引超思盤及㣥臣同宴於內殿超兄中領軍隆數勸纂酒數所角翻纂醉乘步挽車步挽車不用牛馬若羊等令人步而挽之魏書禮志步挽車天子小駕亦為副乘將如字車不得過纂親將竇川駱騰倚劍於壁推車過閣將即亮翻推吐雷翻超取劍擊纂纂下車禽超超刺纂洞胸刺七亦翻川騰與超格戰超殺之纂后楊氏命禁兵討超杜尚止之超之結尚也蓋有密約將軍魏益多入取纂首楊氏曰人已死如土石無所復知何忍復殘其形骸乎復扶又翻益多罵之遂取纂首以徇曰纂違先帝之命殺太子而自立事見上卷三年番禾太守超順人心而除之以安宗廟凡我士庶同茲休慶纂叔父巴西公他他徒河翻弟隴西公緯皆在北城緯于貴翻或説緯曰超為逆亂公以介弟之親杜預曰介大也説輸芮翻下同薑紀焦辨在南城楊桓田誠在東苑皆吾黨也何患不濟緯嚴兵欲與他共擊超他妻梁氏止之曰緯超俱兄弟之子何為舍超助緯自為禍首乎舍讀曰捨他乃謂緯曰超舉事已成據武庫擁精兵圖之甚難且吾老矣無能為也超弟邈有寵於緯説緯曰纂賊殺兄弟謂殺紹又殺弘也説輸芮翻正欲尊立明公耳方今明公先帝之長子當主社稷人無異望夫復何疑長知兩翻復扶又翻緯信之乃與隆超結盟單馬入城超執而殺之讓位於隆隆有難色超曰今如乘龍上天豈可中下隆遂即天王位隆字永基光弟寶之子也改元神鼎超先於番禾得小鼎以為神瑞故以紀元妻楊氏為后以超為都督中外諸軍事輔國大將軍録尚書事封安定公諡纂曰靈帝纂后楊氏將出宮超恐其挾珍寶命索之索山客翻楊氏曰爾兄弟不義手刃相屠我旦夕死人安用寶為超又問玉璽所在璽斯氏翻楊氏曰已毀之矣后有美色超將納之謂其父右僕射桓曰后若自殺禍及卿宗桓以告楊氏楊氏曰大人賣女與氐以圖富貴一之謂甚其可再乎引左傳之言諡曰穆后桓奔河西王利鹿孤利鹿孤以為左司馬三月孫恩北趣海鹽海鹽縣本武原鄉秦以為海鹽縣漢屬會稽郡後漢晉屬吳郡今在秀州東南八十里趣七喻翻築城於海鹽故治恩日來攻城裕屢擊破之斬其將姚盛城中兵少不敵將即亮翻少詩沼翻裕夜偃旗匿衆明晨開門使羸疾數人登城羸倫為翻賊遙問劉裕所在曰夜已走矣賊信之爭入城裕奮擊大破之恩知城不可拔乃進向滬瀆裕復棄城追之滬音戶復扶又翻海鹽令鮑陋遣子嗣之帥吳兵一千請為前驅帥讀曰率裕曰賊兵甚精吳人不習戰若前驅失利必敗我軍敗補邁翻可在後為聲勢嗣之不從裕乃多伏旗鼓前驅既交諸伏皆出裕舉旗鳴鼓賊以為四面有軍乃退嗣之追之戰沒裕且戰且退所領死傷且盡至向戰處令左右脫取死人衣以示間暇間讀曰間賊疑之不敢逼裕大呼更戰呼火故翻賊懼而退裕乃引歸河西王利鹿孤伐涼與涼王隆戰大破之徙二千餘戶而歸夏四月辛卯魏人罷鄴行臺魏置鄴行臺見一百一十卷隆安二年以庾嶽為刺史魏相州統魏郡陽平廣平汲郡頓丘清河六郡杜佑曰後魏置相州於鄴取河亶甲居相以名州乞伏乾歸至苑川以邊芮為長史王松壽為司馬公卿將帥皆降為僚佐偏裨將即亮翻帥所類翻北涼王業憚沮渠蒙遜勇略欲遠之沮子余翻遠于願翻蒙遜亦深自晦匿業以門下侍郎馬權代蒙遜為張掖太守守式又翻權素豪雋為業所親重常輕侮蒙遜蒙遜譖之於業曰天下不足慮惟當憂馬權耳業遂殺權以余觀之索嗣馬權皆庸夫耳恃倚世資而使氣無能為也蒙遜謂沮渠男成曰段公無鑒斷之才鑒明也斷決也斷丁亂翻嚮所憚者惟索嗣馬權今皆已死索嗣死見上卷四年何如男成曰業本孤客為吾家所立恃吾兄弟猶魚之有水夫人親信我而圖之不祥蒙遜乃求為西安太守業喜其出外許之蒙遜與男成約同祭蘭門山而陰使司馬許咸告業曰男成欲以取假日為亂假居訝翻休假也若求祭蘭門山臣言驗矣至期果然業收男成賜死男成曰蒙遜先與臣謀反臣以兄弟之故隱而不言今以臣在恐部衆不從故約臣祭山而反誣臣其意欲王之殺臣也乞詐言臣死暴臣罪惡蒙遜必反臣然後奉王命而討之無不克矣業不聽殺之蒙遜泣告衆曰男成忠於段王而段王無故枉殺之諸君能為報仇乎為于偽翻且始者共立段王欲以安衆耳今州土紛亂非段王所能濟也男成素得衆心衆皆憤泣爭奮比至氐池氐池縣漢屬張掖郡晉省其地屬唐甘州張掖縣界比必寐翻及也氐丁尼翻又音低鎮軍將軍臧莫孩率所部降之孩河開翻降戶江翻下同羌胡多起兵應蒙遜者蒙遜進逼章甲十一行本逼作壁乙十一行本同孔本同張校同侯塢業先疑右將軍田昂囚之至是召昂謝而赦之使與武衛將軍梁中庸共討蒙遜別將王豐孫言於業曰將即亮翻西平諸田世有反者昂貌恭而心險不可信也業曰吾疑之久矣但非昂無可以討蒙遜者昂至侯塢率騎五百降於蒙遜業軍遂潰中庸亦詣蒙遜降危疑反側之時用言為難而用人為尤難當此之際非有明略雄斷不能濟也五月蒙遜至張掖田昂兄子承愛斬關內之業左右皆散蒙遜至業謂蒙遜曰孤孑然一己為君家所推願丐餘命丐古泰翻乞也使得東還與妻子相見蒙遜斬之北涼段業四年而亡業儒素長者長知兩翻無他權略威禁不行㣥下亶命尤信卜筮巫覡覡它狄翻故至於敗沮渠男成之弟富占將軍俱傫帥戶五百降于河西王利鹿孤傫石子之子也傫倫追翻俱石子見一百六卷孝武太元十年帥讀曰率下同孫恩陷滬瀆殺吳國內史袁嵩死者四千人嵩當作山松涼王隆多殺豪望以立威名內外囂然人不自保魏安人焦朗魏安縣在武威昌松縣界蓋曹魏所置也而晉志不見後魏置魏安郡呂氏自武皇棄世呂光偽諡懿武皇帝説輪芮翻政綱不立競為威虐百姓飢饉死者過半今乘其篡奪之際取之易於返掌易以豉翻返當作反不可失也碩德言於秦王興帥步騎六萬伐涼乞伏乾歸帥騎七千從之六月甲戌孫恩浮海奄至丹徒丹徒縣古朱方也後曰谷陽秦改曰丹徒漢屬會稽郡後漢屬吳郡晉屬晉陵郡地理志曰秦時望氣者云其地有天子氣始皇使赭衣三千人鑿城敗其勢改曰丹徒樓船千餘艘艘蘇遭翻建康震駭乙亥內外戒嚴百官入居省內冠軍將軍高素等守石頭冠古玩翻輔國將軍劉襲柵斷淮口秦淮入江之口也斷丁管翻冠軍將軍桓謙等備白石左衛將軍王嘏等屯中堂徵豫州刺史譙王尚之入衛京師劉牢之自山陰引兵邀擊恩未至而恩已過乃使劉裕自海鹽入援裕兵不滿千人倍道兼行與恩俱至丹徒裕衆既少少詩紹翻加以涉遠疲勞而丹徒守軍莫有鬬志恩帥衆鼓譟登蒜山蒜山今在鎮江府城西三里山上多蒜故名蒜蘇貫翻荷下可翻擔都濫翻裕帥所領奔擊大破之帥讀曰率下同投崖赴水章甲十一行本水下有死字乙十一行本同孔本同張校同者甚衆恩狼狽僅得還船然恩猶恃其衆尋復整兵徑向京師復扶又翻下同後將軍元顯帥兵拒戰頻不利會稽王道子無他謀略唯日禱蔣侯廟蔣侯廟在蔣山在今建康府上元縣東北十八里漢末秣陵尉蔣子文討賊戰死山下吳孫權為立廟江東朝野禱之率有靈應百姓恟懼恟許拱翻譙王尚之帥精鋭馳至徑屯積弩堂恩樓船高大泝風不得疾行數日乃至白石恩本以諸軍分散欲掩不備既而知尚之在建康復聞劉牢之已還至新洲新洲在京口西大江中意即今之珠金沙是也復扶又翻浮海北走郁洲水經注曰東海朐縣東北海中有大洲謂之郁洲山海經所謂郁山在海中者也殺三千人寧朔將軍高雅之擊恩於郁洲為恩所執寧朔將軍蓋晉置桓玄厲兵訓卒常伺朝廷之隙伺相吏翻聞孫恩逼京師建牙聚衆上疏請討之元顯大懼會恩退元顯以詔書止之玄乃解嚴梁中庸等共推沮渠蒙遜為大都督大將軍涼州牧張掖公赦其境內改元永安蒙遜署從兄伏奴為張掖太守和平侯弟拿為建忠將軍都谷侯從才用翻拿女余翻田昂為西郡太守臧莫孩為輔國將軍房晷梁中庸為左右長史張騭謝正禮為左右司馬騭之日翻擢任賢才文武咸悅河西王利鹿孤命㣥臣極言得失西曹從事史皓曰皓古老翻陛下命將出征將即亮翻下同往無不捷然不以綏寧為先唯以徙民為務民安土重遷故多離叛此所以斬將拔城而地不加廣也利鹿孤善之秋七月魏兗州刺史長孫肥魏未得兗州也使肥以兗州刺史南略地耳東至彭城將軍劉該降之將步即亮翻騎奇寄翻降戶江翻下同秦隴西公碩德自金城濟河直趣廣武河西王利鹿孤攝廣武守軍以避之趣七喻翻攝收也秦軍至姑臧涼王隆遣輔國大將軍超龍驤將軍邈等逆戰驤思將翻碩德大破之生禽邈俘斬萬計隆嬰城固守巴西公他帥東苑之衆二萬五千降於秦帥讀曰率西涼公皓河西王利鹿孤沮渠蒙遜各遣使奉表入貢於秦皓古老翻使疏吏翻沮子余翻初涼將薑紀降於河西王利鹿孤廣武公傉檀與論兵略甚愛重之傉奴沃翻坐則連席出則同車每談論以夜繼晝利鹿孤謂傉檀曰薑紀信有美才然視候非常必不久留於此不如殺之紀若入秦必為人患傉檀曰臣以布衣之交待紀紀必不相負也八月紀將數十騎奔秦軍禿髮兄弟皆推傉檀之明略余究觀傉檀始末未敢許也又究觀薑紀自涼入秦始末則紀蓋反覆詭譎之士而傉檀愛重之則傉檀蓋以才辨為諸兄所重而智略不能濟此其所以亡國也呂隆孤城無援明公以大軍臨之其勢必請降然彼徒文降而已未肯遂服也請給紀步騎三千與王松匆因焦朗華純之衆王松匆秦將也焦朗華純皆涼人説輸芮翻華戶化翻隆不足取也不然今禿髮在南兵強國富若兼姑臧而據之威勢益盛沮渠蒙遜李皓不能抗也必將歸之如此則為國家之大敵矣碩德乃表紀為武威太守配兵二千屯據晏然班固地理志武威休屠縣王莽改曰晏然後復曰休屠永寧中張軌於姑臧西北置武興郡晏然縣屬焉秦王興聞楊桓之賢而徵之利鹿孤不敢留史言諸涼畏秦之強詔以劉裕為下邳太守討孫恩於郁洲纍戰大破之恩由是衰弱復緣海南走復扶又翻裕亦隨而邀擊之燕王盛懲其父寶以懦弱失國務峻威刑又自矜聰察多所猜忌㣥臣有纖介之嫌皆先事誅之先悉薦翻由是宗親勳舊人不自保丁亥左將軍慕容國與殿上嚴上改中將軍秦輿段讚謀帥禁兵襲盛殿上將軍蓋慕容所置緣晉之殿中將軍而名官也帥讀曰率死者五百餘人壬辰夜前將軍段璣與秦輿之子興段讚之子泰潛於禁中鼓譟大呼呼火故翻盛聞變帥左右出戰帥讀曰率賊衆逃潰璣被創創初良翻匿廂屋間俄有一賊從暗中擊盛盛被傷輦升前殿申約禁衛事定而卒年二十九慕容盛臨變而整此其雄略亦有過人者然以猜忌好殺致斃則天下之人固非一人可舞其智略而盡殺也中壘將軍慕容拔宀兒從僕射郭仲白太后丁氏以為國家多難宜立長君宀兒而隴翻從才用翻難乃旦翻長知兩翻時衆望在盛弟司徒尚書令平原公元而河間公熙素得幸於丁氏丁氏乃廢太子定密迎熙入宮明旦㣥臣入朝朝直遙翻始知有變因上表勸進於熙熙以讓元元不敢當癸巳熙即天王位熙字道文垂之少子也皆夷三族甲午大赦丙申平原公元以嫌賜死閏月辛酉葬盛於興平陵諡曰昭武皇帝廟號中宗丁氏送葬未還中領軍慕容提步軍校尉張佛等謀立故太子定事覺伏誅定亦賜死燕立定為太子見上卷四年丙寅大赦改元光始秦隴西公碩德圍姑臧纍月東方之人在城中者多謀外叛魏益多復誘扇之復扶又翻下復生同欲殺涼王隆及安定公超事發坐死者三百餘家碩德撫納夷夏分置守宰夏戶雅翻守式又翻節食聚粟為持久之計涼之㣥臣請與秦連和隆不許安定公超曰今資儲內竭上下嗷嗷雖使張陳復生亦無以為策張良陳平智謀之士故稱之何愛尺書單使為卑辭以退敵使疏吏翻敵去之後修德政以息民若卜世未窮何憂舊業之不復周成王定鼎于郟鄏卜世三十卜年七百亦可以保全宗族不然坐守困窮終將何如隆乃從之九月遣使請降於秦降戶江翻下同考異曰姚興載記姚平伐魏與姚碩德伐呂隆同時魏書天興五年五月姚平未來侵晉元興元年秦弘始四年也晉帝紀晉春秋皆云隆安五年降秦十六國西秦春秋云太初十四年五月乾歸隨姚碩德伐涼南涼春秋云建和二年七月姚碩德伐呂隆孤攝廣武守軍以避之皆隆安五年也按秦小國既與魏相持豈暇更興兵伐涼蓋載記之誤也今以晉帝紀晉春秋十六國西秦南涼春秋為據碩德表隆為鎮西大將軍涼州刺史建康公隆遣子弟及文武舊臣慕容築楊穎等五十餘家入質于長安慕容築燕宗室也苻堅滅燕其宗室悉補邊郡故築留河西築張六翻質音致下為質同秋毫不犯祭先賢禮名士西土悅之沮渠蒙遜所部酒泉涼寧二郡叛降於西涼酒泉郡治福祿縣魏收地形志涼寧郡領園池貢澤二縣大懼遣其弟建忠將軍拿牧府長史張潛蒙遜自稱涼州牧置牧府長史拿女居翻請帥其衆東遷帥讀曰率碩德喜拜潛張掖太守拿建康太守潛勸蒙遜東遷拿私謂蒙遜曰姑臧未拔呂氏猶存碩德糧盡將還不能久也何為自棄土宇受制於人乎臧莫孩亦以為然孩何開翻蒙遜遣子奚念為質於河西王利鹿孤蒙遜既不東遷故納質於利鹿孤以求援曰奚念年少可遣拿也少詩照翻冬十月蒙遜復遣使上疏於利鹿孤曰臣前遣奚念具披誠款而聖旨未昭復徵弟拿復扶又翻臣竊以為苟有誠信則子不為輕若其不信則弟不為重今寇難未夷難乃旦翻不獲奉詔願陛下亮之利鹿孤怒遣張松侯俱延興城侯文支將騎一萬襲蒙遜至萬歲臨松晉書地理志酒泉郡有延壽縣當是後改為萬歲張天錫置臨松郡五代志曰臨松縣有臨松山後周省入張掖縣宋白曰隋煬帝併萬歲入刪丹縣屬張掖郡將即亮翻騎奇寄翻從才用翻下同鄯時戰翻康曰鄯善復姓其先西域人以國為姓苟子其名余據紀文以鄯善苟子為蒙遜從弟則鄯善非姓也明矣虜其民六千餘戶蒙遜從叔孔遮入朝于利鹿孤朝直遙翻許以拿為質利鹿孤乃歸其所掠召俱延等還文支利鹿孤之弟也南燕主備德宴㣥臣於延賢堂備德本名德既據齊地增上一字名備德謂㣥臣曰朕可方自古何等主青州刺史鞠仲曰陛下中興聖主少康光武之儔少詩照翻備德顧左右賜仲帛千匹仲以所賜多辭之備德曰卿知調朕朕不知調卿邪調徒了翻又如字調戲也卿所對非實故朕亦以虛言賞卿耳韓範進曰天子無戲言今日之論君臣俱失備德大悅賜範絹五十匹備德母及兄納皆在長安備德遣平原人杜弘往訪之弘曰臣至長安若不奉太后動止當西如張掖德仕秦為張掖太守其兄納因家于張掖故弘欲往張掖訪之臣父雄年踰六十乞本縣之祿以申烏鳥之情慈烏反哺故云然李密陳情表曰烏鳥私情願乞終養杜弘未行而求祿要君之罪大矣要音邀備德曰弘為君迎母為父求祿為于偽翻忠孝備矣何罪之有以雄為平原令弘至張掖為盜所殺十一月劉裕追孫恩至滬瀆海鹽又破之滬音扈俘斬以萬數恩遂自浹口遠竄入海浹音接十二月辛亥魏主圭遣常山王遵定陵公和跋帥衆五萬襲沒奕干於高平高平漢屬安定魏收志屬涇州新平郡又原州有高平郡酈道元云高平川西南去安定三百四十里帥讀曰率乙卯魏虎威將軍宿沓干伐燕攻令支令音鈴又郎定翻支音祁又音祗乙丑燕中領軍宇文拔救之壬午宿沓干拔令支而戍之呂超攻薑紀不克遂攻焦朗薑紀時據晏然焦朗據魏安利鹿孤遣車騎將軍傉檀赴之比至超已退質音致比必寐翻朗閉門拒之傉檀怒將攻之鎮北將軍俱延諫曰安土重遷人之常情朗孤城無食今年不降降戶江翻後年自服何必多殺士卒以攻之若其不捷彼必去從他國棄州境士民以資鄰敵非計也不如以善言諭之傉檀乃與朗連和遂曜兵姑臧壁於胡坑胡坑在姑臧西傉檀知呂超必來斫營畜火以待之超夜遣中壘將軍王集帥精兵二千斫傉檀營帥讀曰率下同傉檀徐嚴不起集入壘中內外皆舉火光照如晝縱兵擊之斬集及甲首三百餘級呂隆懼偽與傉檀通好好呼到翻請於苑內結盟傉檀遣俱延入盟俱延疑其有伏毀苑牆而入超伏兵擊之俱延失馬步走淩江將軍郭祖力戰拒之俱延乃得免傉檀怒攻其昌松太守孟禕於顯美昌松顯美漢晉皆為縣屬武威郡呂光改昌松為東張掖郡尋復為昌松郡五代志後周廢顯美入姑臧禕許韋翻嚴荀改苟安國寧遠將軍石可帥騎五百救之安國等憚傉檀之強遁還桓玄表其兄偉為江州刺史鎮夏口夏戶雅翻司馬刁暢為輔國將軍督八郡軍事鎮襄陽遣其將皇甫敷馮該戍湓口移沮漳蠻二千戶于江南左傳曰江漢沮漳楚之望也水經沮水出漢中房陵東南過臨沮界又東過枝江縣南入于江漳水出臨沮縣東荊山南至枝江縣北入于沮二水上下皆蠻所居也沮子余翻漳諸良翻更招集流民立綏安郡綏安郡治長寧縣隋省長寧入長林昶丑兩翻玄皆留不遣玄自謂有晉國三分之二數使人上己符端數所角翻上時掌翻欲以惑衆又致箋於會稽王道子曰賊造近郊以風不得進以雨不致火食盡故去耳非力屈也會工外翻造七到翻謂孫恩也昔國寶死後王恭不乘此威入統朝政朝直遙翻下在朝同足見其心非侮於明公也而謂之不忠今之貴要腹心有時流清望者誰乎豈可云無佳勝直是不能信之耳江東人士其名位通顯於時者率謂之佳勝名勝遂成今日之禍爾來猶言如此以來也玄忝任在遠是以披寫事實元顯見之大懼張法順謂元顯曰桓玄承藉世資素有豪氣既並殷楊專有荊楚殷楊謂殷仲堪楊佺期也並殷楊事見上卷隆安三年第府第也第下猶言門下閣下之類東土塗地公私困竭玄必乘此縱其姦凶竊用憂之元顯曰為之奈何法順曰玄始得荊州人情未附方務綏撫未暇他圖若乘此際使劉牢之為前鋒而第下以大軍繼進玄可取也元顯以為然會武昌太守庾楷以玄與朝廷構怨恐事不成禍及於己庾楷歸桓玄見一百十卷隆安二年云玄大失人情衆不為用若朝廷遣軍己當為內應元顯大喜遣張法順至京口謀於劉牢之牢之以為難法順還謂元顯曰觀牢之言色必二於我不如召入殺之不爾敗人大事敗必邁翻元顯不從於是大治水軍徵兵裝艦以謀討玄治直之翻艦戶黯翻元興元年壬寅四二春正月庚午朔是年三月元顯敗復隆安年號桓玄尋改曰大亨玄篡又改曰永始元興之元改於是年正月通鑑自是年迄義熙初元皆不改元興之元不與桓玄之篡撥亂世返之正也以尚書令元顯為驃騎大將軍征討大都督都督十八州諸軍事加黃鉞時晉之境內有揚徐南徐兗南兗豫南豫青冀司荊江雍梁益寧交廣十八州而已元顯盡督之使其果能誅桓玄亦必凌上而篡奪之驃匹妙翻騎奇寄翻前將軍譙王尚之為後部因大赦改元內外戒嚴加會稽王道子太傅會工外翻元顯欲盡誅諸桓中護軍桓修驃騎長史王誕之甥也誕有寵於元顯因陳修等與玄志趣不同元顯乃止誕導之曾孫也張法順言於元顯曰桓謙兄弟每為上流耳目宜斬之以杜姦謀且事之濟不繫在前軍不讀曰否而牢之反覆萬一有變則禍敗立至可令牢之殺謙兄弟以示無二心若不受命當逆為之所逆為之所及禍患未來而先為之圖欲殺牢之也今非牢之無以敵玄且始事而誅大將將即亮翻人情不安再三不可法順與元顯言之再三終以為不可也桓沖特有遺惠而謙沖之子也乃自驃騎司馬除都督荊益寧梁四州諸軍事荊州刺史欲以結西人之心丁丑燕慕容拔攻魏令支戍克之宿沓干走執魏遼西太守那頡那諾何翻姓也魏書官氏志內入諸姓有那氏頡胡結翻燕以拔為幽州刺史鎮令支以中堅將軍遼西陽豪為本郡太守丁亥以章武公淵為尚書令博陵公虔為尚書左僕射尚書王騰為右僕射戊子魏材官將軍和突攻黜弗素古延等諸部破之初魏主圭遣北部大人賀狄干獻馬千匹求婚於秦秦王興聞圭已立慕容后立慕容后事見上卷隆安四年沒奕干黜弗素古延皆秦之屬國也而魏攻之由是秦魏有隙庚寅圭大閲士馬命並州諸郡積穀於平陽之乾壁以備秦魏收地形志平陽禽昌縣漢晉之北屈也有乾城隋並禽昌入襄陵又據姚興載記乾壁即乾城柔然社崙方睦於秦遣將救黜弗素古延崙盧昆翻將即亮翻辛卯和突逆擊大破之社崙帥其部落遠遁漠北奪高車之地而居之帥讀曰率斛律部帥倍侯利擊社崙大為所敗帥所類翻敗補邁翻倍侯利奔魏社崙於是西北擊胸奴遺種日拔也雞嚴雞改稽大破之種章勇翻遂吞併諸部士馬繁盛雄於北方其地西至焉耆東接朝鮮朝音潮鮮音仙南臨大漠旁側小國皆羈屬焉自號豆代可汗魏收書作丘豆代魏言駕馭開張也汗音寒杜佑曰可汗之號起於柔然社崙猶言皇帝也而拓跋氏之先通鑑皆書可汗又在社崙之前以千人為軍軍有將百人為幢幢有帥軍將幢帥皆魏制社崙蓋效而立之將即亮翻幢宅江翻帥所類翻畏懦者以石擊其首而殺之柔然為魏患自此始禿髮傉檀克顯美執孟禕而責之以其不早降禿髮傉檀自去年攻顯美至是乃克禕受呂氏厚恩分符守土若明公大軍甫至望旗歸附恐獲罪於執事矣傉檀釋而禮之徙二千餘戶而歸以禕為左司馬禕辭曰呂氏將亡聖朝必取河右朝直遙翻人無愚智皆知之但禕為人守城不能全復忝顯任於心竊所未安為于偽翻復扶又翻若蒙明公之惠使得就戮姑臧死且不朽傉檀義而歸之東土遭孫恩之亂因以飢饉漕運不繼桓玄禁斷江路章甲十一行本路下有商旅俱絶四字乙十一行本同孔本同張校同退齋校同斷讀曰短公私匱乏以麩橡給士卒麩房尤翻博雅曰麩麩米饊也又曰鬻也又麩穀皮也皆同橡似兩翻説文曰栩實也玄謂朝廷方多憂虞必未暇討己可以蓄力觀釁及大軍將發從兄太傅長史石生密以書報之從才用翻玄大驚欲完聚江陵長史卞範之曰明公英威振於遠近元顯口尚乳臭劉牢之大失物情若兵臨近畿示以禍福土崩之勢可翹足而待何有延敵入境自取窮蹙者乎玄從之留桓偉守江陵抗表傳檄罪狀元顯舉兵東下檄至元顯大懼二月丙午帝餞元顯於西池元顯下船而不發元顯內畏桓玄故下船而不發癸丑魏常山王遵等至高平去年十二月魏遣遵等襲高平至是而至帥數千騎與劉勃勃奔秦州秦州治上邽帥讀曰率騎奇寄翻不及而還盡獲其府庫蓄積馬四萬餘匹雜畜九萬餘口畜許救翻徙其民於代都魏以平城為代都種章勇翻迸北孟翻平陽太守二塵復侵秦河東姓譜春秋二軫二國後皆為氏二塵之二則虜姓也復扶又翻關中諸城晝閉秦人簡兵訓卒以謀伐魏秦王興立子泓為太子大赦泓孝友寬和喜文學喜許記翻善談詠而懦弱多病興欲以為嗣而狐疑不決久乃立之為姚泓以懦弱亡秦張本姑臧大飢米斗直錢五千人相食餓死者十餘萬口城門晝閉樵采路絶民請出城為胡虜奴婢者日有數百呂隆惡其沮動衆心惡烏路翻沮在呂翻盡坑之積尸盈路沮渠蒙遜引兵攻姑臧沮子余翻隆遣使求救於河西王利鹿孤利鹿孤遣廣武公傉檀帥騎一萬救之使疏吏翻傉奴沃翻帥讀曰率騎奇寄翻未至隆擊破蒙遜軍蒙遜請與隆盟留穀萬餘斛遺之而還遺于季翻傉檀至昌松聞蒙遜已退乃徙涼澤段冢民五百餘戶而還涼澤即禹貢之豬野澤也在武威縣東亦曰休屠澤還從宣翻中散騎常侍張融言於利鹿孤曰散悉亶翻騎奇寄翻焦朗兄弟據魏安潛通姚氏數為反覆數所角翻今不取後必為朝廷憂利鹿孤遣傉檀討之朗面縛出降焦朗以魏安招秦軍事見去年五月降戶江翻下同徙其民於樂都樂音洛桓玄發江陵慮事不捷常為西還之計及過尋陽不見官軍意甚喜將士之氣亦振史言桓玄畏怯劉牢之等不能仗順取之將即亮翻下同庾楷謀泄玄囚之丁巳詔遣齊王柔之以騶虞幡宣告荊江二州使罷兵騶則尤翻玄前鋒殺之柔之宗之子也孝武太元十年以柔之襲封齊王紹攸冏之祀宗封南頓王丁卯玄至姑孰使其將馮該等攻歷陽豫州刺史治歷陽玄軍斷洞浦洞浦即洞口魏曹休破呂範處斷丁管翻艦戶黯翻豫州刺史譙王尚之帥步卒九千陳於浦上帥讀曰率遣武都太守楊秋屯橫江秋降于玄軍尚之衆潰逃于塗中玄捕獲之塗與滁同棄城走劉牢之素惡驃騎大將軍元顯惡烏路翻恐桓玄既滅元顯益驕恣又恐己功名愈盛不為元顯所容且自恃材武擁強兵欲假玄以除執政復伺玄之隙而自取之復扶又翻伺相吏翻故不肯討玄元顯日夜昏酣以牢之為前鋒牢之驟詣門不得見及帝出餞元顯遇之公坐而已坐徂臥翻牢之軍溧洲溧音栗溧水出溧陽縣在建康東南元顯遣牢之西上擊桓玄非其路也晉書劉牢之傳作洌洲又桓沖發建康謝安送至溧洲宋武陵王討元凶劭四月戊午至南州辛酉次溧洲丙寅次江寧今舟行自采石東下未至三山江中有洌山即洌洲也洌溧聲相近故又為溧洲張舜民曰過三山十餘里至溧洲自溧洲過白土磯入慈湖夾舜民郴行録言泝流之先後水程也參軍劉裕請擊玄牢之不許玄使牢之族舅何穆説牢之曰自古戴震主之威挾不賞之功而能自全者誰邪越之文種秦之白起漢之韓信皆事明主為之盡力説輸芮翻為于偽翻功成之日猶不免誅夷況為凶愚者之用乎君如今日戰勝則傾宗戰敗則覆族欲以此安歸乎不若翻然改圖則可以長保富貴矣古人射鉤斬袪猶不害為輔佐齊桓公與子糾爭國管仲射桓公中帶鈎子糾死桓公釋管仲之囚而以為相晉獻公使寺人披伐公子重耳於蒲城重耳踰垣而走披斬其袪重耳反國披屢納忠射而亦翻時譙王尚之已敗人情愈恐牢之頗納穆言與玄交通東海中尉東海何無忌牢之之甥也與劉裕極諫不聽其子驃騎從事中郎敬宣諫曰今國家衰危天下之重在大人與玄玄藉父叔之資玄父溫叔沖割晉國三分之二一朝縱之使陵朝廷玄威望既成恐難圖也董卓之變將在今矣董卓事見五十九卷漢靈帝中平六年獻帝初平元年吾豈不知今日取玄如反覆手耳但平玄之後令我奈驃騎何元顯為驃騎將軍故稱之乙巳朔牢之遣敬宣詣玄請降降戶江翻玄陰欲誅牢之乃與敬宣宴飲陳名書畫共觀之以安悅其意敬宣不之覺玄佐吏莫不相視而笑玄版敬宣為咨議參軍未有朝命以版授之也元顯將發聞玄已至新亭棄船退屯國子學辛未陳於宣陽門外軍中相驚言玄已至南桁陳讀曰陳南桁即朱雀桁在臺城南桁戶剛翻元顯引兵欲還宮玄遣人拔刀隨後大呼曰放仗軍人皆崩潰呼火故翻元顯乘馬走入東府唯張法順一騎隨之騎奇寄翻元顯問計於道子道子但對之涕泣玄遣太傅從事中郎毛泰收元顯送新亭縛於舫前而數之數所具翻舫甫曠翻元顯曰為王誕張法順所誤耳壬申復隆安年號帝遣侍中勞玄於安樂渚勞力到翻樂音洛玄入京師稱詔解嚴以玄總百揆都督中外諸軍事丞相録尚書事揚州牧領徐荊江三州刺史假黃鉞是時晉土全有荊江揚三州徐州率多僑郡而京口則重鎮也玄悉領之全有晉國矣且將奪劉牢之之兵故領徐州以制之桓謙為尚書左僕射桓修為徐兗二州刺史桓石生為江州刺史卞範之為丹楊尹卞範之為玄長史謀主也丹楊京邑故使為尹初玄之舉兵侍中王謐奉詔詣玄玄親禮之及玄輔政以謐為中書令謐導之孫也新安太守殷仲文覬之弟也殷覬見一百九卷隆安元年覬音冀仲文聞玄克京師棄郡投玄玄以為咨議參軍劉邁往見玄玄曰汝不畏死而敢來邪邁曰射鉤斬袪並邁為三玄悅以為參軍邁折玄事見一百八卷孝武太元十七年癸酉有司奏會稽王道子酣縱不孝當棄市會工外翻詔徙安成郡吳孫晧寶鼎二年分豫章長沙廬陵立安成郡唐吉州安福縣及袁州諸縣皆其地也劉昫曰安福縣吳安成郡治彥璋元顯之子隆安初使繼東海王後桓修為王誕固請長章甲十一行本長作得乙十一行本同孔本同退齋校同流嶺南為于偽翻玄以劉牢之為會稽內史牢之曰始爾便奪我兵禍其至矣劉敬宣請歸諭牢之使受命玄遣之敬宣勸牢之襲玄牢之猶豫不決移屯班瀆班瀆在新洲西南今當北就高雅之於廣陵舉兵以匡社稷卿能從我去乎裕曰將軍以徑卒數萬望風降服彼新得志威震天下朝野人情皆已去矣降戶江翻朝直遙翻廣陵豈可得至邪裕當反服還京口耳反服謂反初服也離騷曰退將修吾初服此言釋戎服而服常服我將何之裕曰吾觀鎮北必不免牢之以討孫恩功進號鎮北將軍桓玄若守臣節當與卿事之不然當與卿圖之此時劉裕已有誅玄之心於是牢之大集僚佐議據江北以討玄參軍劉襲曰事之不可者莫大於反將軍往年反王兗州王兗州謂王恭司馬郎君謂元顯復扶又翻下復推同一人三反何以自立語畢趨出佐吏多散走牢之懼使敬宣之京口迎家失期不至牢之以為事已泄為玄所殺乃帥部曲北走帥讀曰率至新洲縊而死敬宣至不暇哭即渡江奔廣陵將吏共殯斂牢之將即亮翻斂力贍翻以其喪歸丹徒玄令斫棺斬首暴尸於市暴步卜翻又如字大赦改元大亨桓玄讓丞相荊江徐三州玄既以其兄弟領荊江徐三州且已得建康握朝權不復以丞相為重故悉讓之總百揆以琅邪王德文為太宰司馬休之劉敬宣高雅之俱奔洛陽各以子弟為質於秦以求救質音致秦王興與之符信使於關中章甲十一行本中作東乙十一行本同孔本同張校同募兵得數千人復還屯彭城間孫恩寇臨海臨海太守辛景擊破之恩所虜三吳男女死亡殆盡恩恐為官軍所獲乃赴海死其黨及妓妾從死者以百數妓渠綺翻從才用翻謂之水仙餘衆數千人復推恩妹夫盧循為主復扶又翻循諶之曾孫也盧諶盧志之子初從劉琨琨死仕於段氏段遼敗仕趙諶氏壬翻雅有材藝少時少詩照翻沙門惠遠嘗謂之曰君雖體涉風素而志存不軌如何太尉玄欲撫安東土乃以循為永嘉太守明帝太寧元年分臨海立永嘉郡今之溫州而寇暴不已盧循事始此甲戌燕大赦河西王禿髮利鹿孤寢疾遺令以國事授弟傉檀初禿髮思復鞬愛重傉檀傉奴沃翻鞬居言翻謂諸子曰傉檀器識非汝曹所及也故諸兄不以傳子而傳於弟吳壽夢以少子季札為賢故其諸子兄弟相傳欲以次傳國於季札而季札終於不受禿髮烏孤利鹿孤致國於傉檀猶吳志也豈知國亡於傉檀之手哉垂拱而已垂拱謂垂衣拱手無所為也利鹿孤卒傉檀襲位更稱涼王自此史稱禿髮氏為南涼遷于樂都樂音洛諡利鹿孤曰康王夏四月太尉玄出屯姑孰辭録尚書事詔許之而大政皆就咨焉小事則決於尚書令桓謙及卞範之自隆安以來中外之人厭於禍亂及玄初至黜姦佞擢雋賢京師欣然冀得少安少詩沼翻既而玄奢豪縱逸政令無常朋黨互起陵侮朝廷裁損乘輿供奉之具帝幾不免飢寒乘繩證翻幾居希翻由是衆心失望三吳大飢戶口減半會稽減什三四會工外翻臨海永嘉殆盡富室皆衣羅紈懷金玉閉門相守餓死此固上之人失政所致而人消物盡亦天地之大數也周餘黎民靡有孑遺以此觀之容有是事衣於既翻乞伏熾磐自西平逃歸苑川乞伏乾歸送熾磐於西平見上卷隆安四年乞伏乾歸使熾磐入朝于秦朝直遙翻秦主興以熾磐為興晉太守五月盧循自臨海入東陽太尉玄遣撫軍中兵參軍劉裕將兵擊之將即亮翻下同循敗走永嘉走音奏高句麗攻宿軍宿軍城在龍城東北句如字又音駒麗力知翻北燕平州刺史治宿軍秦主興大發諸軍遣義陽公平尚書右僕射狄伯支等將步騎四萬伐魏興自將大軍繼之以尚書令姚晃輔太子泓守長安沒奕干權鎮上邽廣陵公欽權鎮洛陽平攻魏乾壁六十餘日拔之秋七月魏主圭遣毗陵王順及豫州刺史長孫肥將六萬騎為前鋒自將大軍繼發以擊之八月太尉玄諷朝廷以玄平元顯功封豫章公平殷楊功封桂陽公並本封南郡如故玄以豫章封其子升桂陽封其兄子俊魏主圭至永安永安本漢彘縣屬河東郡順帝改曰永安晉屬平陽郡隋唐晉州之霍邑縣本永安縣也酈道元曰永安故霍伯之都也縣有霍太山驍堅堯翻將即亮翻騎奇寄翻覘丑廉翻又丑豔翻長孫肥逆擊盡擒之平退走圭追之乙巳及於柴壁平嬰城固守魏軍圍之秦王興將兵四萬七千救之將據天渡運糧以餽平柴壁在汾東天渡蓋汾津之名在汾水西岸兵法高者為敵所棲深者為敵所囚今秦皆犯之宜及興未至遣奇兵先據天渡柴壁可不戰而取也圭命增築重圍重直龍翻下同內以防平之出外以拒興之入廣武將軍安同曰汾東有蒙坑東西三百餘里蹊徑不通興來必從汾西直臨柴壁如此虜聲勢相接重圍雖固不能制也不如為浮梁渡汾西築圍以拒之虜至無所施其智力矣圭從之興至蒲阪阪音反憚魏之強久乃進兵甲子圭帥步騎三萬逆擊興於蒙坑之南帥讀曰率下同斬首千餘級興退走四十餘里平亦不敢出圭乃分兵四據險要使秦兵不得近柴壁近其靳翻興屯汾西憑壑為壘束柏材從汾上流縱之欲以毀浮梁魏人皆鉤取以為薪蒸粗曰薪細曰蒸冬十月平糧竭矢盡夜悉衆突西南圍求出興列兵汾西舉烽鼓譟為應興欲平力戰突免平望興攻圍引接但叫呼相和和戶臥翻莫敢逼圍平不得出計窮乃帥麾下赴水死諸將多從平赴水圭使善遊者鉤捕之無得免者執狄伯支及越騎校尉唐小方等四十餘人餘衆二萬餘人皆斂手就禽興坐視其窮力不能救舉軍慟哭聲震山谷數遣使求和於魏數所角翻圭不許乘勝進攻蒲阪秦晉公緒固守不戰會柔然謀伐魏圭聞之戊申引兵還還從宣翻又如字或告太史令鼂崇及弟黃門侍郎懿潛召秦兵圭至晉陽賜崇懿死鼂直遙翻秦徙河西豪右萬餘戶于長安太尉玄殺吳興太守高素將軍竺謙之及謙之從兄朗之劉襲並襲弟季武皆劉牢之北府舊將也從才用翻將即亮翻襲兄冀州刺史軌邀司馬休之劉敬宣高雅之等共據山陽沈約曰山陽本射陽縣境地名義熙土斷始分廣陵郡立山陽郡及山陽縣唐楚州即其地欲起兵攻玄不克而走將軍袁虔之劉壽高長慶郭恭等皆往從之將奔魏至陳留南分為二輩軌休之敬宣奔南燕虔之壽長慶恭奔秦魏主圭初聞休之等當來大喜後怪其不至令兗州求訪隆安五年魏以長孫肥為兗州刺史南徇地然未能有兗州也問其故皆曰魏朝威聲遠被從才用翻被皮義翻朝直遙翻是以休之等咸欲歸附既而聞崔逞被殺崔逞死見上卷三年圭深悔之自是士人有過頗見優容南涼王傉檀攻呂隆於姑臧燕王熙納故中山尹苻謨二女燕王寶即位之初苻謨為中山尹為貴人長知兩翻娀音戎幼曰訓英為貴嬪貴嬪尤有寵丁太后怨恚恚於避翻與兄子尚書信謀廢熙立章武公淵事覺熙逼丁太后令自殺葬以后禮諡曰獻幽皇后丁太后素與熙通事見上年戊辰殺淵及信辛未熙畋于北原龍城北原也石城縣漢屬北平郡燕屬建德郡高和本為石城令時以大喪會于龍城耳殺司隸校尉張顯入掠宮殿取庫兵脅營署閉門乘城熙馳還城上人皆投仗開門盡誅反者唯和走免甲戌大赦魏以庾嶽為司空十二月辛亥魏主圭還雲中柔然可汗社崙聞圭伐秦自參合陂侵魏至豺山豺山在善無縣北魏天興六年築宮於此崙盧昆翻魏常山王遵以萬騎追之不及而還太尉玄使御史杜林防衛會稽文孝王道子至安成會工外翻林承玄旨鴆道子殺之沮渠蒙遜所署西郡太守梁中庸叛奔西涼蒙遜聞之笑曰吾待中庸恩如骨肉而中庸不我信但自負耳孤豈在此一人邪乃盡歸其孥西涼公皓問中庸曰我何如索嗣中庸曰未可量也皓曰嗣才度若敵我者我何能於千里之外以長繩絞其頸邪索嗣死見上卷四年孥音奴皓古老翻索昔各翻量音良智有短長命有成敗殿下之與索嗣得失之理臣實未之能詳若以身死為負計行為勝則公孫瓚豈賢於劉虞邪公孫瓚劉虞事見六十卷漢獻帝初平四年袁虔之等至長安秦王興問曰桓玄才略何如其父卒能成功乎卒子恤翻虔之曰玄乘晉室衰亂盜據宰衡猜忌安忍刑賞不公以臣觀之不如其父遠矣玄今已執大柄其勢必將篡逆正可為他人驅除耳興善之以虔之為廣州刺史秦以廣州授袁虔之示以名位寵授之耳是歲秦王興立昭儀張氏為皇后封子懿弼洸宣諶愔璞質逵裕國兒皆為公洸古黃翻諶氏壬翻愔於今翻遣使拜禿髮傉檀為車騎將軍廣武公沮渠蒙遜為鎮西將軍沙州刺史西海侯李皓為安西將軍高昌侯秦鎮遠將軍趙曜帥衆二萬西屯金城建節將軍王松匆帥騎助呂隆守姑臧松匆至魏安傉檀弟文真擊而虜之傉檀大怒送松匆還長安深自陳謝史言河湟諸國皆畏姚秦之強聶崇岐標點王崇武覆校
