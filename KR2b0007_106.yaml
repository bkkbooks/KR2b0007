body:
  text: 資治通鑑卷第一百六端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰權判西京留司御史臺上柱國河內郡開國侯食邑一千三百戶食實封四百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注晉紀二十八烈宗孝武皇帝中之上太元十年乙酉三八五春正月秦王堅朝饗㣥臣朝直遙翻時長安饑人相食諸將歸吐肉以飼妻子窮匱如此外無救援烏得不敗乎飼祥吏翻慕容沖即皇帝位于阿房是為西燕沖有自得之志賞罰任情慕容盛年十三謂慕容柔曰夫十人之長長知兩翻亦須才過九人然後得安今中山王才不逮人功未有成而驕汰已甚殆難濟乎沖在前燕時封中山王汰侈也溢也史言慕容盛幼而有識略所以能自奮而有國盛柔歸沖見上卷上年後秦王萇留諸將攻新平自引兵擊安定擒秦安西將軍勃海公珍嶺北諸城悉降之降戶江翻甲寅秦王堅與西燕主沖戰于仇班渠大破之慕容垂復興於山東而沖稱號於關中故書西燕以別之乙卯戰于雀桑又破之甲子戰于白渠白渠即漢時白公所鑿者也西燕兵圍秦王堅殿中將軍鄧邁力戰卻之堅乃得免壬申沖遣尚書令高蓋夜襲長安入其南城左將軍竇衝前禁將軍李辨等擊破之斬首八百級分其尸而食之乙亥高蓋引兵攻渭北諸壘太子宏與戰於成二壁成二蓋人姓名關中大亂立壁自保因為地名斬首三萬燕帶方王佐與寧朔將軍平規共攻薊薊音計王永兵屢敗二月永使宋敞燒和龍及薊城宮室帥衆三萬奔壺關帥讀曰率佐等入薊慕容農引兵會慕容麟於中山與共攻翟真麟農先帥數千騎至承營帥讀曰率下同觀察形勢翟真望見陳兵而出諸將欲退農曰丁零非不徑勇而翟真懦弱今簡精鋭望真所在而衝之真走衆必散矣乃邀門而蹙之可盡殺也使驍騎將軍慕容國帥百餘騎衝之驍堅堯翻騎奇寄翻真走其衆爭門自相蹈藉藉慈夜翻死者太半遂拔承營外郭癸未秦王堅與西燕主沖戰于城西長安城西也追奔至阿城阿城即阿房宮城沖之巢穴也堅恐為沖所掩引兵還萬乘之主固不可乘危徼幸然秦喪敗若此乘諸將之勝氣以圖萬一之功可也引兵而還何歟還從宣翻乙酉秦益州刺史王廣以蜀人江陽太守李丕為益州刺史守成都沈約曰江陽郡劉璋分犍為立守式又翻己丑廣帥所部奔還隴西章十二行本西下有依其兄秦州刺史統八字乙十一行本同孔本同張校同退齊校同蜀人隨之者三萬餘人劉牢之至枋頭楊膺姜讓謀泄膺讓謀見上卷上年枋音方樂音洛牢之聞之盤桓不進秦平原悼公暉數為西燕主沖所敗數所角翻敗補邁翻秦王堅讓之曰汝吾之才子也擁大衆與白虜小兒戰而屢敗何用生為三月暉憤恚自殺堅責怒暉欲其死戰耳豈意其自殺哉恚於避翻前禁將軍李辨都水使者隴西彭和正恐長安不守召集西州人晉書職官志都水長屬大司農沈約志都水使者掌舟航及運部李辨李儼之子亦隴西人也堅召之不至為後堅襲韭園張本韭舉有翻西燕主沖攻秦高陽愍公方於驪山殺之苻方戍驪山見上卷上年七月以其子謙為馮翊太守使招集三輔之民馮翊壘主邵安民等責謙曰君雍州望族七相五公雍州之望族鍾蓋韋賢後也雍於用翻與之為不忠不義何面目以行於世乎謙以告鍾鍾自殺謙來奔秦左將軍苟池右將軍俱石子與西燕主沖戰於驪山兵敗西燕將軍慕容永斬苟池俱石子奔鄴永廆弟運之孫石子難之弟也俱難見一百四卷太元三年廆戶罪翻大破之虜鮮卑萬餘人而還悉坑之定佛奴之孫章十二行本孫下有堅之壻三字乙十一行本同孔本同張校同退齊校同也北史曰定佛奴之子佛奴宋奴之子也滎陽人鄭燮以郡來降降戶江翻燕王垂攻鄴久不下將北詣冀州乃命撫軍大將軍麟屯信都樂浪王溫屯中山召驃騎大將軍農還鄴樂浪音洛琅驃匹妙翻騎奇寄翻於是遠近聞之以燕為不振頗懷去就農至高邑高邑本鄗縣漢光武即位于此改曰高邑屬常山晉志屬趙國違期不還師古曰眭息隨翻長史張攀言於農曰邃目下參佐目下參佐言其近在眼前也請回軍討之農不應敕備假版以邃為高陽太守參佐家在趙北者悉假署遣歸趙北趙國以北也假署者權時以假版署置其官未以白燕王垂也長史二十餘人退謂攀曰君所見殊誤當今豈可自相魚肉俟吾北還邃等自當迎於道左君但觀之為後邃等迎農張本樂浪王溫在中山兵力甚弱丁零四布分據諸城溫謂諸將曰以吾之衆攻則不足守則有餘驃騎撫軍首尾連兵會須滅賊但應聚糧厲兵以俟時耳於是撫舊招新勸課農桑民歸附者相繼郡縣壁壘爭送軍糧倉庫充溢翟真夜襲中山溫擊破之自是不敢復至復扶又翻下復還同溫乃遣兵一萬運糧以餉垂且營中山宮室欲迎垂都中山也劉牢之攻燕黎陽太守劉撫于孫就柵孫就人姓名蓋立柵于黎陽界劉撫因屯焉自引兵救之秦長樂公丕聞之出兵乘虛夜襲燕營農擊敗之敗補邁翻劉牢之與垂戰不勝退屯黎陽垂復還鄴呂光以龜茲饒樂龜茲音丘慈樂音洛欲留居之天竺沙門鳩摩羅什謂光曰此凶亡之地不足留也據載記鳩摩羅姓也什其名中道自有福地可居鳩摩羅什知數知呂光必得涼州之地而據之議進止衆皆欲還乃以駝二萬餘頭載外國珍寶奇玩驅駿馬萬餘匹而還還音旋又如字夏四月劉牢之進兵至鄴燕王垂逆戰而敗遂撤圍退屯新城乙卯自新城北遁牢之不告秦長樂公丕即引兵追之丕聞之發兵繼進庚申牢之追及垂於董唐淵垂曰秦晉瓦合相待為強瓦合言其勢不膠固觸而動之一瓦墜碎則衆瓦俱解矣待當作恃今觀待字義亦自通一失則俱潰非同心也今兩軍相繼勢既未合宜急擊之牢之軍疾趨二百里至五橋澤五橋澤在臨漳縣北兵法百里而趨利者蹶上將況二百里乎重直用翻垂邀擊大破之斬首數千級牢之單馬走會秦救至得免燕冠軍將軍宜都王鳳冠古玩翻每戰奮不顧身前後大小二百五十七戰未嘗無功垂戒之曰今大業甫濟汝當先自愛使為車騎將軍德之副以抑其鋭以德持重也鄴中饑甚長樂公丕帥衆就晉穀於枋頭帥讀曰率劉牢之入鄴城收集亡散兵復少振復扶又翻少詩沼翻坐軍敗徵還燕秦相持經年去年正月垂攻鄴人相食邑落蕭條燕之軍士多餓死燕王垂禁民養蠶以桑椹為軍糧垂將北趣中山趣七喻翻以驃騎大將軍農為前驅前所假授吏眭邃等皆來迎候上下如初李攀嚴李改張乃服農之智略前作張攀此作李攀未知孰是會稽王道子好專權好呼到翻復為姦諂者所構扇復扶又翻下同與太保安有隙安欲避之會秦王堅來求救安乃請自將救之將即亮翻壬戌出鎮廣陵之步丘築壘曰新城而居之今揚州邵伯鎮即其地也在揚州城北六十里晉史云安於步丘築埭後人謂之召伯埭蜀郡太守任權攻拔成都斬秦益州刺史李丕復取益州秦取益州見一百三卷寧康元年任音壬新平糧竭矢盡後秦自去年攻新平後秦王萇使人謂苟輔曰吾方以義取天下豈讎忠臣邪卿但帥城中之人還長安吾正欲得此城耳輔以為然帥民五千口出城萇圍而坑之男女無遺萇仲良翻帥讀曰率獨馮傑子終得脫奔長安馮傑勸輔拒後秦事見上卷上年皆諡曰節愍侯以終為新平太守翟真自承營徙屯行唐即漢之南行唐縣也屬常山郡燕王垂趣中山真為所逼故徙屯自立為趙王營人共殺乞立真從弟成為主其衆多降於燕降戶江翻五月西燕主沖攻長安秦王堅身自督戰飛矢滿體流血淋漓沖縱兵暴掠關中士民流散道路斷絶千里無煙有堡壁三十餘推平遠將軍趙敖為主安遠平遠二將軍號蓋皆當時所置冒難遣兵糧助堅多為西燕所殺堅謂之曰聞來者率不善達此誠忠臣之義然今寇難殷繁難乃旦翻殷衆也盛也繁多也非一人之力所能濟也徒相隨入虎口何益汝曹宜為國自愛為于僞翻畜糧厲兵以俟天時庶幾善不終否有時而泰也幾居希翻否皮鄙翻三輔之民為沖所略者遣人密告堅請遣兵攻沖欲縱火為內應堅曰甚哀諸卿忠誠然吾猛士如虎豹利兵如霜雪困於烏合之虜豈非天乎恐徒使諸卿坐致夷滅吾不忍也其人固請不已乃遣七百騎赴之沖營縱火者反為風火所燒其得免者什一二堅祭而哭之史言關中之人乃心為堅而力不能濟蓋天棄秦也衛將軍楊定與沖戰于城西為沖所擒定秦之驍將也驍堅堯翻將即亮翻堅大懼以讖書云帝出五將久長得據載記此讖書謂之古符傳賈録秦王堅始也禁人學讖及喪敗之極乃欲用讖書奔五將山以求免其顛倒錯繆甚矣蓋死期將至也讖楚譖翻謂之曰天其或者欲導豫出外汝善守城勿與賊爭利吾當出隴收兵運糧以給汝遂帥騎數百與張夫人及中山公詵二女寶錦出奔五將山新唐書地理志京兆醴泉縣有武將山水經注扶風杜陽縣有五將山又按唐杜佑鳳翔府岐山縣有五將山期以孟冬救長安堅過襲韭園李辨奔燕奔西燕也自殺閏月以廣州刺史羅友為益州刺史鎮成都庚戌燕王垂至常山圍翟成於行唐命帶方王佐鎮龍城六月高句麗寇遼東句如字又音駒麗力知翻佐遣司馬郝景將兵救之為高句麗所敗敗補邁翻高句麗遂陷遼東玄菟自此燕不能勝高句麗菟同都翻秦太子宏不能守長安將數千騎與母妻宗室西奔下辨辨皮莧翻百官逃散司隸校尉權翼等數百人奔後秦權翼本姚襄僚屬苻氏既敗故奔後秦縱兵大掠死者不可勝計勝音升秋七月旱饑井皆竭後秦王萇自故縣如新平漢安定郡有安定縣後漢晉省故曰故縣秦王堅至五將山後秦王萇遣驍騎將軍吳忠帥騎圍之秦兵皆散走獨侍御十數人在側堅神色自若坐而待之召宰人進食俄而忠至執之送詣新平幽於別室太子宏至下辨南秦州刺史楊璧拒之苻堅破仇池置南秦州楊璧氐之種類仕秦尚主任居方面以宏奔敗拒而不納孟子曰寡助之至親戚叛之信哉斯言堅之女順陽公主也棄其夫從宏宏奔武都投氐豪強熙強其兩翻假道來奔詔處之江州為苻宏附桓玄而誅張本處昌呂翻長樂公丕帥衆三萬自枋頭將歸鄴城龍驤將軍檀玄擊之戰于谷口檀玄晉將也谷口在枋頭西丕復入鄴城復扶又翻燕建節將軍餘巖叛自武邑北趣幽州趣七喻翻燕王垂馳使敕幽州將平規曰使疏吏翻固守勿戰俟吾破丁零自討之規出戰為巖所敗敗補邁翻巖入薊掠千餘戶而去遂據令支令音鈴又郎定翻支音祁癸酉翟成長史鮮于得斬成出降垂屠行唐盡坑成衆去年丁零叛燕至是而滅降戶江翻太保安有疾求還安屯廣陵步丘八月安至建康甲午大赦丁酉建昌文靖公謝安薨諡法柔德安衆曰靖寬樂令終曰靖如大司馬溫故事晉以此崇寵謝安安之雅志豈願與桓溫同哉庚子以司徒琅邪王道子領揚州刺史録尚書都督中外諸軍事道子得權晉自此亂後秦王萇使求傳國璽於秦王堅璽斯氏翻曰萇次應曆數可以為惠堅瞋目叱之曰小羌敢逼天子五胡次序無汝羌名胡羯鮮卑氐羌五胡之次序也無汝羌名謂讖文耳姚萇自謂次應曆數堅故亦以讖文為言瞋七人翻不可得也萇復遣右司馬尹緯說堅求為禪代復扶又翻說輸芮翻堅曰禪代聖賢之事姚萇叛賊何得為之堅與緯語問緯在朕朝何官朝直遙翻緯曰尚書令史後漢以來尚書有令史十八人秩二百石卿王景略之儔宰相才也而朕不知卿宜其亡也堅自以平生遇萇有恩尤忿之數罵萇求死數所角翻謂張夫人曰豈可令羌奴辱吾兒乃先殺寶錦堅自知身死之後女必當歸姚萇也辛丑萇遣人縊堅於新平佛寺年四十八後秦將士皆為之哀慟為于僞翻萇欲隱其名諡堅曰壯烈天王臣光曰論者皆以為秦王堅之亡由不殺慕容垂姚萇故也臣獨以為不然許劭謂魏武帝治世之能臣亂世之姦雄事見五十八卷漢靈帝中平元年治直吏翻治直之翻則垂萇皆秦之能臣也烏能為亂哉堅之所以亡由驟勝而驕故也魏文侯問李克吳之所以亡對曰數戰數勝文侯曰數戰數勝國之福也何故亡對曰數戰則民疲數勝則主驕數所角翻以驕主御疲民未有不亡者也秦王堅似之矣長樂公丕在鄴將西赴長安樂音洛幽州刺史王永在壺關是年春王永自幽州奔壺關丕乃帥鄴中男女六萬餘口西如潞川使疏吏翻帥讀曰率驃騎將軍張蚝並州刺史王騰迎之入晉陽驃匹妙翻騎奇寄翻蚝七吏翻丕章十二行本丕上有王永留平州刺史苻沖守壺關自帥騎一萬會丕于晉陽二十二字乙十一行本同孔本同張校同退齊校同始知長安不守堅已死乃發喪即皇帝位丕字永叔堅之庶長子也廟號世祖大赦改元大安燕王垂以魯王和為南中郎將鎮鄴遣慕容農出蠮螉塞蠮於結翻螉於公翻歷凡城趣龍城趣七喻翻會兵討餘巖慕容麟慕容隆自信都徇勃海清河麟擊勃海太守封懿執之因屯歷口水經注清河自廣川東北流徑歷縣故城南前漢信都國之屬縣也應劭曰廣川縣西北三十里有歷城亭故縣也今亭在縣東津濟之所謂之歷口渡放之子也封放見九十九卷穆帝永和七年鮮卑劉頭眷擊破賀蘭部於善無善無縣前漢屬鴈門郡後漢屬定襄郡漢末日棄之荒外意親山蓋即意辛山親辛語相近按魏書帝紀道武登國五年四月幸意辛山與質驎討賀蘭紇突鄰紇奚諸部大破之六月還幸牛川則意辛山在牛川之北比來行兵所向無敵比毗至翻然心腹之疾願早圖之頭眷曰誰也羅辰曰從兄顯忍人也從才用翻必將為亂頭眷不聽顯庫仁之子也頃之顯果殺頭眷自立又將殺拓跋圭圭依劉庫仁見一百四卷太元元年圭之姑也埿與泥同顯謀主梁六眷代王什翼犍之甥也犍居言翻下同亦使其部人穆崇奚牧密告圭魏書官氏志拓跋氏之先兼並他國各有本部部中別族為內姓丘穆陵氏後改為穆氏又拓跋鄰以弟為達奚氏後改為奚氏事泄當以此自明賀氏夜飲顯酒令醉飲於鴆翻使圭陰與舊臣長孫犍元他羅結輕騎亡去元他羅結二人也他唐何翻賀氏故驚廣既中㣥馬使顯起視之賀氏哭曰吾子適在此今皆不見汝等誰殺之邪顯以故不急追圭遂奔賀蘭部依其舅賀訥賀訥本賀蘭訥後魏孝文帝改北方舊姓以賀蘭氏為賀氏史因簡便而書之如上文穆崇奚牧之類皆是也復國之後當念老臣圭笑曰誠如舅言不敢忘也顯疑梁六眷泄其謀將囚之穆崇宣言曰六眷不顧恩義助顯為逆我掠得其妻馬足以解忿顯乃捨之賀氏從弟外朝大人賀悅舉所部以奉圭賀悅蓋什翼犍時為外朝大人魏書官氏志曰登國二年因舊制置南北大人對治二部又置外朝大人無常員主受詔命外使出禁中國有大喪大禮皆與參知隨所典焉從才用翻將殺賀氏賀氏奔亢埿家匿神車中三日北人無室屋逐水草置神於車中而嚴事之因謂之神車乃得免為于僞翻故南部大人長孫嵩帥所部七百餘家叛顯章十二行本顯下有將字乙十一行本同孔本同張校同奔五原嵩依劉氏亦見一百四卷太元元年五原秦郡魏晉棄之荒外帥讀曰率嵩欲從之烏渥謂嵩曰逆父之子不足從也實君弒什翼犍見太元元年嵩從之史言長孫嵩由此遂為拓跋圭佐命功臣福流子孫劉顯所部有亂故中部大人庾和辰奉賀氏奔圭凡言故者皆什翼犍舊所署置也魏書官氏志拓跋詰汾時餘部諸姓內入者自有庾氏非中國之庾氏也賀訥弟染干以圭得衆心忌之使其黨侯引七突嚴七改乙下同殺圭代人尉古真知之以告圭侯引七突不敢發侯引七突官氏志無此氏志云諸姓年世稍久互以改易興衰存滅間有之今舉其可知者則其不可知而不舉者亦有之矣西方尉遲氏後改為尉氏尉讀如鬱執而訊之訊鞠問也章十二行本輪作軸乙十一行本同孔本同張校同夾其頭傷一目不伏乃免之染干遂舉兵圍圭賀氏出謂染干曰汝等欲於何置我而殺吾子乎染干慙而去史言賀訥兄弟不能舉部以奉拓跋圭為圭攻賀蘭部張本夫以圭備嘗險阻艱難以成大業而卒斃於賀蘭氏豈天道邪九月秦主丕以張蚝為侍中司空蚝七吏翻王永為侍中都督中外諸軍事車騎大將軍尚書令王騰為中軍大將軍司隸校尉苻沖為尚書左僕射封西平王又以左長史楊輔為右僕射右長史王亮為護軍將軍立楊氏為皇后子寧為皇太子壽為長樂王樂音洛鏘為平原王懿為勃海王昶為濟北王呂光自龜茲還至宜禾班志敦煌郡廣至縣昆侖障宜禾都尉治晉分為宜禾縣屬晉昌郡劉昫曰瓜州常樂縣漢廣至縣魏分廣至置宜禾縣李皓於此置涼興郡隋廢置常樂鎮武德五年改鎮為縣龜茲音丘慈高昌太守楊翰言於熙曰李延壽曰高昌者車師前王之故地昔漢武帝遣兵西討師旅頓弊其中尤困者住焉地勢高敞人庶昌盛因名高昌其地有漢時高昌壘晉為高昌郡後因為國名呂光新破西域兵強氣鋭聞中原喪亂喪息浪翻必有異圖河西地方萬里帶甲十萬足以自保若光出流沙其勢難敵高梧谷口險阻之要宜先守之而奪其水高梧谷口當在高昌西界可以坐制如以為遠伊吾關亦可拒也伊吾縣晉置屬晉昌郡有伊吾關雖有子房之策無所施矣言地險既失雖有張良之計無所用也美水令犍為張統謂熙曰今關中大亂京師存亡不可知長安已陷而涼州不知道梗故也犍居言翻其志難測將軍何以抗之熙曰憂之未知所出統曰光智略過人今擁思歸之士乘戰勝之氣其鋒未易當也易以豉翻將軍世受大恩忠誠夙著立勳王室宜在今日行唐公洛上之從弟勇冠一時從才用翻冠古玩翻為將軍計莫若奉為盟主以收衆望推忠義以帥㣥豪帥讀曰率下同則光雖至不敢有異心也資其精鋭東兼毛興毛興時刺河州王統時刺秦州楊璧時刺南秦州掃凶逆寧帝室此桓文之舉也熙又弗聽殺洛于西海洛徙西海見一百四卷太元五年梁熙既欲拒呂光又殺苻洛不過欲保據涼州非有扶顛持危之志也光聞楊翰之謀懼不敢進杜進曰梁熙文雅有餘機鑒不足終不能用翰之謀不足憂也宜及其上下離心速進以取之光從之進至高昌楊翰以郡迎降熙不能用楊翰之謀翰遂降於光降戶江翻下同熙移檄責光亶命還師以子胤為鷹揚將軍與振威將軍南安姚皓別駕衛翰帥衆五萬拒光于酒泉帥讀曰率敦煌太守姚靜晉昌太守李純以郡降光敦徒門翻光報檄涼州責熙無赴難之志難乃旦翻而遏歸國之衆遣彭晃杜進姜飛為前鋒與胤戰于安彌安彌縣自漢以來屬酒泉郡擒之於是四山胡夷皆附於光武威太守彭濟執熙以降光殺之光入姑臧自領涼州刺史表杜進為武威太守自餘將佐各受職位涼州郡縣皆降於光獨酒泉太守宋章十二行本宋作索乙十一行本同孔本同張校同退齊校同皓西郡太守宋泮晉志曰漢分張掖之日勒刪丹等縣置西郡其地當嶺要光攻而執之讓泮曰吾受詔平西域而梁熙絶我歸路此朝廷之罪人卿何為附之泮曰將軍受詔平西域不受詔亂涼州梁公何罪而將軍殺之泮但苦力不足不能報君父之讎耳豈肯如逆氐彭濟之所為乎主滅臣死固其常也光殺泮及皓主簿尉祐姦佞傾險尉姓也讀如字與彭濟俱執梁熙光寵信之祐譖殺名士姚皓等十餘人涼州人由是不悅昔齊人伐燕勝之孟子曰取之而燕民悅則取之取之而燕民不悅則勿取其後燕卒報齊呂光始得涼土而無以收涼人之心宜其有國不永也祐至允吾允吾漢縣屬金城郡晉省據水經注允吾在廣武西北其地在當時蓋屬廣武郡界劉昫曰唐鄯州龍支縣本漢允吾縣後漢改曰龍耆後魏改曰金城又改曰龍支積石山在今縣南允音鉛吾音牙姜飛擊破之祐奔據興城以載記參考水經興城當在允吾之西白土之東乞伏國仁自稱大都督大將軍單于領秦河二州牧單音蟬改元建義以乙旃童埿為左相屋引出支為右相獨孤匹蹄為左輔武㣥勇士為右輔乙旃屋引獨孤武㣥皆夷人復姓乞伏與拓跋同出於鮮卑故其部人亦有乙旃獨孤二姓埿與泥同分其地置武城等十二郡載記曰置武城武陽安固武始漢陽天水略陽漒川甘松匡朋白馬苑川十二郡水經注苑川水出勇士縣之子城南山北徑牧師苑故漢牧苑之地也有東西二苑城其城相去七里西城即乞伏所都秦尚書令魏昌公纂自關中奔晉陽秦主丕拜纂太尉封東海王冬十月西燕主沖遣尚書令高蓋帥衆五萬伐後秦戰于新平南蓋大敗降於後秦帥讀曰率降戶江翻初蓋以楊定為子及蓋敗定亡奔隴右復收集其舊衆張衆下脫定佛奴之孫也六字定為西燕禽財六月耳復扶又翻苻定苻紹苻謨苻亮聞秦主丕即位皆自河北遣使謝罪定紹謨亮降燕見上卷上年本新平氐也固守博陵為秦拒燕為于僞翻十一月丕以兗為平州刺史定為冀州牧紹為冀州都督謨為幽州牧亮為幽平二州都督並進爵郡公左將軍竇衝據茲川茲川即霸川也霸水古曰滋水秦穆公之霸也更滋水曰霸水以顯霸功今曰茲川因古名也與秦州刺史王統河州刺史毛興益州刺史王廣南秦州刺史楊璧衛將軍楊定皆自隴右遣使邀丕共擊後秦丕以定為雍州牧雍於用翻衝為梁州牧加統鎮西大將軍興車騎大將軍璧征南大將軍並開府儀同三司加廣安西將軍皆進位州牧楊定尋徙治歷城置儲蓄於百頃百頃自楊茂搜以來保為巢穴遣使來稱藩驤思將翻使疏吏翻詔因其所號假之其後又取天水略陽之地自稱秦州刺史隴西王繹幕人蔡匡據城以叛燕繹幕縣自漢以來屬清河郡至隋廢入德州安樂縣泰山太守任泰潛師救匡任音壬至匡壘南八里燕人乃覺之諸將以匡未下而外敵奄至甚患之隆曰匡恃外救故不時下今計泰之兵不過數千人及其未合擊之泰敗匡自降矣乃釋匡擊泰大破之斬首千餘級匡遂降降戶江翻下同燕王垂殺之且屠其壘慕容農至龍城自蠮螉塞歷凡城至龍城諸將皆曰殿下之來取道甚速今至此久留不進何也農曰吾來速者恐餘巖過山鈔盜侵擾良民耳此山謂白狼山鈔楚交翻誑誘飢兒誑居況翻誘音酉烏集為㣥非有綱紀吾已扼其喉久將離散無能為也今此田善熟未取而行徒自耗損當俟收畢往則梟之梟堅堯翻亦不出旬日耳頃之農將步騎三萬至令支巖衆震駭稍稍踰城歸農巖計窮出降農斬之進擊高句麗復遼東玄菟二郡郝景之敗高句麗陷遼東玄菟菟同都翻上疏請繕修陵廟燕自慕容皓以前皆葬遼西故陵廟在焉燕王垂以農為使持節都督幽平二州北狄諸軍事幽州牧鎮龍城使疏吏翻徙平州刺史帶方王佐鎮平郭農於是創立法制事從寬簡清刑獄省賦役勸課農桑居民富贍四方流民前後至者數萬口先是幽冀流民多入高句麗先悉薦翻農以驃騎司馬范陽龐淵為遼東太守招撫之慕容麟攻王兗于博陵城中糧竭矢盡功曹張猗踰城出聚衆以應麟兗臨城數之曰數所具翻卿是秦民吾是卿君卿起兵應賊自號義兵何名實之相違也古人求忠臣必於孝子之門後漢韋彪之言棄而不顧吾何有焉今人取卿一切之功則可矣寧能忘卿不忠不孝之事乎不意中州禮義之邦乃有如卿者也十二月麟拔博陵執兗及苻鑑殺之昌黎太守宋敞帥烏桓索頭之衆救兗不及而還帥讀曰率索昔各翻還從宣翻又如字秦主丕以敞為平州刺史敞時從王永在壺關燕主垂北如中山謂諸將曰樂浪王招流離實倉廩外給軍糧內營宮室雖蕭何之功何以加之樂浪王溫之功詳見上漢高祖與項羽相拒蕭何鎮撫關中為之根本丙申垂始定都中山杜佑曰後燕都中山今博陵郡唐昌縣秦苻定據信都以拒燕燕王垂以從弟北地王精為冀州刺史將兵攻之從才用翻將即亮翻拓跋圭從曾祖紇羅與其弟建及諸部大人共請賀訥推圭為主從才用翻十一年丙戌三八六春正月戊申拓跋圭大會於牛川自武周塞西出至牛川牛川以北皆大漠也據魏紀窟咄之來寇也圭乞師于燕自弩山至牛川屯于延水南出代谷以會燕師又據水經注于延水出長川城南則長川即牛川也班志于延水出代郡且如塞外則牛川亦當在且如塞外也又明元帝大獮于牛川登釜山括地志釜山在媯州懷戎縣北三里且如之且音子如翻圭什翼犍之嫡孫世子實之子拓跋氏自此興矣以長孫嵩為南部大人叔孫普洛為北部大人分治其衆魏書曰魏初自北荒南遷置四部大人坐王庭決辭訟以言語約束刻契記事無囹圄考訊之法諸犯罪者皆臨時決遣治直之翻下同許謙為右司馬廣寧王建代人和跋叔孫建庾嶽為外朝大人魏書官氏志拓跋鄰命叔父之胤曰乙旃氏後改叔孫氏朝直遙翻長知兩翻皆掌宿衛及參軍國謀議長孫道生賀毗等侍從左右從才用翻出納教命王建娶代王什翼犍之女嶽和辰之弟道生嵩之從子也庾和辰奉圭母賀氏以奔圭長孫嵩帥部衆歸圭事並見上從才用翻燕王垂即皇帝位垂字道明燕主皓之第五子後秦王萇如安定南安祕宜祕姓也前漢書功臣表有戴侯祕彭時祕氏為南安豪族國仁將兵五千逆擊大破之帥讀曰率將即亮翻宜奔還南安鮮于乞之殺翟真也翟真見殺見上年四月黎陽太守滕恬之甚愛信之恬之喜畋獵喜許記翻不愛士卒遼潛施姦惠以收衆心恬之南攻鹿鳴城黎陽在河北鹿鳴城在河南酈道元曰按竹書紀年梁惠成王十三年取鄭鹿即是城也今城內有臺尚謂之鹿鳴臺又謂之鹿鳴城恬之東奔鄄城鄄吉掾翻遼追執之遂據黎陽豫州刺史朱序遣將軍秦膺童斌與淮泗諸郡共討之斌音彬秦益州牧王廣自隴右引兵攻河州牧毛興於枹罕興遣建節將軍衛平帥其宗人一千七百夜襲廣大破之帥讀曰率二月秦州牧王統遣兵助廣攻興興嬰城自守去年王廣自成都依統燕大赦改元建興置公卿尚書百官繕宗廟社稷西燕主沖樂在長安樂音洛且畏燕主垂之強不敢東歸課農築室為久安之計鮮卑咸怨之鮮卑思東歸而沖安於長安故怨傳曰以欲從人則可以人從欲鮮濟其是之謂歟攻沖殺之立沖將段隨為燕王改元昌平初張天錫之南奔也見上卷太元八年與俱奔河西依禿髮思復鞬思復鞬烏孤之父也鞬居言翻五代志武威郡昌松縣後魏置昌松郡後周廢郡以揟次縣入焉又有後魏魏安郡後亦廢載記言焦松等迎大豫於揟次則魏安蓋後魏所置郡晉書成於唐唐史臣以後魏郡名書之耳孟康曰揟音子如翻次音恣攻呂光昌松郡拔之昌松即漢倉松縣地本屬武威郡蓋河西張氏分置郡也呂光後以郭麻香言改昌松為東張掖郡光使輔國將軍杜進擊之進兵敗大豫進逼姑臧王穆諫曰光糧豐城固甲兵精鋭逼之非利不如席卷嶺西卷讀曰捲礪兵積粟然後東向與之爭不及期年光可取也大豫不從自號撫軍將軍涼州牧改元鳳凰以王穆為長史傳檄郡縣使穆說諭嶺西諸郡自西郡至張掖酒泉建康晉昌其地皆嶺西也說輸芮翻建康郡張駿置屬涼州新唐書地理志甘州張掖縣西北百九十里有祁連山北有建康軍蓋張氏置郡地也晉書地理志永興中張祚置漢陽縣以守牧地張玄靚改為祁連郡保據楊塢楊塢在姑臧城西代王圭徙居定襄之盛樂按盛樂前漢書作成樂屬定襄後漢書作盛樂屬雲中疑定襄之盛樂即雲中之盛樂也然魏書帝紀什翼犍立三年移都於雲中之盛樂明年築盛樂城於故城南八里則已非後漢之盛樂城疑定襄之盛樂乃前漢之成樂城也蓋建武之初胸奴侵寇塞下之民悉內徙其後南單于內附北單于勢屈復歸內徙之民於塞下郡縣城郭掃地更為必有非其故處者考宋白續通典唐振武軍漢定襄郡之盛樂也在陰山之陽黃河之北後魏所都盛樂是也在唐朔州北三百餘里後魏孝文遷洛之後於定襄故城置朔州領盛樂廣牧二郡唐初平突厥置雲中都督府於盛樂貞觀八年移雲州雲中郡及定襄縣於今雲州而雲中都督府後又改單于都護府又改安北都護府由是雲中定襄地名混亂不可考而盛樂則一也國人悅之史言拓跋圭所以興三月大赦泰山太守張願以郡叛降翟遼降戶江翻初謝玄欲使朱序屯梁國玄自屯彭城以北固河上西援洛陽朝議以征役既久欲令玄置戍而還會翟遼張願繼叛北方騷動玄謝罪乞解職詔慰諭令還淮陰燕主垂追尊母蘭氏為文昭皇后欲遷文明段后以蘭氏配享太祖段氏燕王皓之元蘭氏皓之側室也皓廟號太祖諡文明皇帝皆以為當然順垂指也堯母為帝嚳位第三不以貴陵姜原帝王紀曰帝嚳有四元有邰氏女曰姜嫄生后稷次有娀氏女曰簡狄生坰人坰次陳豐氏女曰慶都生放勛次娵訾氏女曰常義生摯嚳苦沃翻以至公為先文昭后宜立別廟垂怒逼之詳謐曰上所欲為無問於臣臣按經奉禮不敢有二垂乃不復問諸儒卒遷段后以蘭后代之復扶又翻卒子戌翻又以景昭可足渾后傾覆社稷追廢之尊烈祖昭儀段氏為景德皇后配享烈祖可足渾氏燕王俊之元也傾覆事見一百二卷海西公太和四年段氏俊之側室也俊廟號烈祖諡景昭皇帝崔鴻曰齊桓公命諸侯無以妾為妻孟子曰齊桓公葵丘之會初命曰誅不孝無易樹子無以妾為妻猶不可以妾代之況子而易其母乎春秋所稱母以子貴者君母既沒得以妾母為小君也春秋公羊傳曰桓幼而貴隱長而卑隱長又賢諸大夫扳隱而立之隱之立為桓立也隱長又賢何以不宜立立適以長不以賢立子以貴不以長桓何以貴母貴也母貴則子何以貴子以母貴母以子貴左氏傳曰惠公元孟子孟子卒繼室以聲子生隱公宋武公生仲子為魯夫人生桓公而惠公薨是以隱公立而奉之則成風終不得配莊公也魯莊公夫人姜氏成風者莊公之妾僖公之母也姜氏通于共仲弒閔公而欲立共仲不克遂孫于邾齊桓公殺之僖公既立請其喪以夫人之禮葬之臣子必習而效之猶形聲之於影響也寶之逼殺其母事見後一百八卷太元二十一年堯舜之讓猶為之噲之禍事見二卷周慎靚王五年昔文姜得罪於桓公春秋不之廢魯桓公之夫人曰文姜通于齊襄公桓公謫之夫人以告襄公遂殺桓公至莊公二十一年春秋書夫人姜氏薨二十二年書葬我小君文姜是不之廢也朝直遙翻然小君之禮成矣垂以私憾廢之私憾謂譖殺垂段氏又譖垂而逐之奔秦也皆非禮也劉顯自善無南走馬邑畏代之逼且懼其修怨也帥讀曰率降戶江翻奴真有兄鞬先居賀蘭部鞬居言翻奴真言於代王圭請召鞬而以所部讓之圭許之鞬既領部遣弟去斤遺賀訥金馬遺于季翻賀染干謂去斤曰我待汝兄弟厚汝今領部宜來從我去斤許之奴真怒曰我祖父以來世為代忠臣故我以部讓汝等欲為義也今汝等無狀乃謀叛國義於何在遂殺鞬及去斤染干聞之引兵攻奴真奴真奔代圭遣使責染干染干乃止圭與賀蘭從此隙矣使疏吏翻西燕僕章十二行本僕上有左字乙十一行本同孔本同張校同射慕容恆尚書慕容永襲段隨殺之立宜都王子顗為燕王顗蓋燕宜都王桓之子顗魚豈翻帥鮮卑男女四十餘萬口去長安而東海西公太和五年秦遷鮮卑於長安至是財十七年耳而種類蕃育乃如此唐太宗阿史那結社率之變亦幸其早發耳帥讀曰率殺之於臨晉誘音酉恆怒捨韜去永與武衛將軍刁雲帥衆攻韜韜敗奔恆營恆立西燕主沖之子瑤為帝改元建平諡沖曰威皇帝衆皆去瑤奔永永執瑤殺之立慕容泓子忠為帝改元建武忠以永為太尉守尚書令封河東公永持法寬平鮮卑安之至聞喜聞燕主垂已稱尊號不敢進築燕熙城而居之為燕主垂滅西燕張本鮮卑既東長安空虛前滎陽章十二行本陽下有太守二字乙十一行本同孔本同張校同高陵趙穀等招杏城盧水胡郝奴帥戶四千入于長安渭北皆應之帥讀曰率下同以穀為丞相扶風王驎有衆數千保據馬嵬馬嵬山在咸陽縣西去長安城百餘里杜佑曰京兆金城縣有馬嵬故城孫景安征塗記云馬嵬所築不知何代人金城周曰犬丘秦曰廢丘漢曰槐里驎離珍翻嵬吾回翻夏四月後秦王萇自安定伐之驎奔漢中萇執多而進奴懼請降降戶江翻拜鎮北將軍六谷大都督長安南山有六谷癸巳以尚書僕射陸納為左僕射譙王恬為右僕射晉志曰左右僕射或不兩置但曰尚書僕射玩之子也陸玩見九十四卷成帝咸和四年毛興襲擊王廣敗之敗補邁翻廣奔秦州隴西鮮卑匹蘭執廣送於後秦興復欲攻王統於上邽枹罕諸氐皆厭苦兵事諸氐蓋秦王堅使毛興領之以鎮枹罕者也復扶又翻枹音膚推衛平為河州刺史以衛平宗強故推之使疏吏翻下同燕主垂封其子農為遼西王麟為趙王隆為高陽王代王圭初改稱魏王拓跋氏自此國號魏張大豫自楊塢進屯姑臧城西王穆及禿髮思復鞬子奚于帥衆三萬屯于城南鞬居言翻呂光出擊大破之斬奚于等二萬餘級秦大赦以衛平為撫軍將軍河州刺史呂光為車騎大將軍涼州牧騎奇寄翻使者皆沒於後秦不能達時秦主丕在晉陽後秦隔其道故不能達二鎮燕主垂以范陽王德為尚書令太原王楷為左僕射樂浪王溫為司隸校尉溫守中山有營宮室建都邑之功因用為司隸樂浪音洛琅後秦王萇即皇帝位于長安萇字景茂姚弋仲之第二十四子也改元建初國號大秦追尊其父弋仲為景元皇帝立妻蛇氏為皇后類篇蛇以者翻虜姓也姓譜姚萇后蛇氏南安人也蛇食遮翻又音他置百官萇與㣥臣宴酒酣言曰諸卿皆與朕北面秦朝朝直遙翻今忽為君臣得無恥乎趙遷曰天不恥以陛下為子臣等何恥為臣萇大笑魏王圭東如陵石陵石地名在盛樂東帥所類翻諸將請追之圭曰侯辰等纍世服役有罪且當忍之方今國家草創人情未一愚者固宜前卻一前一卻言叛服不常也史言圭能識時知變以安反側六月庚寅以前輔國將軍楊亮為雍州刺史鎮衛山陵帝置雍州於襄陽今遣亮帶雍州鎮洛雍於用翻下之姓譜曰左傳齊有晏氏代為大夫湖陝二縣皆屬弘農陝式冉翻西燕刁雲等殺西燕主忠推慕容永為使持節大都督中外諸軍事大將軍大單于雍秦梁涼四州牧録尚書事河東王稱藩於燕稱藩於燕主垂也使疏吏翻雍於用翻燕主垂遣太原王楷趙王麟陳留王紹章武王宙攻秦苻定苻紹苻謨苻亮等去年苻定等背燕為秦為陳禍福定等皆降降戶江翻垂封定等為侯曰以酬秦主之德秦主丕以都督中外諸軍事司徒録尚書事王永為左丞相太尉東海王纂為大司馬司空張蚝為太尉蚝七吏翻尚書令咸陽徐義為司空司隸校尉王騰為驃騎大將軍儀同三司驃匹妙翻騎奇寄翻永傳檄四方公侯牧守壘主民豪共討姚萇慕容垂令各帥所統以孟冬上旬會大駕于臨晉帥讀曰率於是天水姜延馮翊寇明河東王昭新平張晏京兆杜敏扶風馬朗建忠將軍高平牧官都尉扶風王敏等建忠將軍蓋亦苻氏創置高平縣漢屬安定郡晉省前趙劉曜以為朔州治所秦置牧官都尉於其地各有衆數萬遣使詣秦使疏吏翻丕皆就拜將軍郡守封列侯冠軍將軍鄧景擁衆五千據彭池與竇衝為首尾以擊後秦彭池恐當作彪池彪池在長安西詩所謂彪池北流者也竇衝據茲川在長安東南可以相為首尾又據新唐書地理志寧州有彭池但去茲川遠耳景羌之子也鄧羌秦之名將後秦王萇徙安定五千餘戶于長安秋七月秦平涼太守金熙安定都尉沒奕干與後秦左將軍姚方成戰于孫丘谷孫丘谷當在安定後秦主萇以其弟征虜將軍緒為司隸校尉鎮長安自將至安定將即亮翻擊熙等大破之金熙本東胡之種秦謂鮮卑之種居遼碣者為東胡種章勇翻鮮卑多蘭部帥也帥所類翻枹罕諸氐枹音膚以衛平衰老難與成功議廢之而憚其宗強纍日不決氐啖青謂諸將曰啖徒覽翻姓也大事宜時定不然變生諸君但請衛公為會觀我所為會七夕大宴青抽劍而前曰今天下大亂吾曹休戚同之非賢主不可以濟大事衛公老宜返初服以避賢路衛平本毛興部將長知兩翻雖王室疏屬志略雄明請共立之以赴大駕欲承王永檄赴秦主丕也即下異議乃奮劍攘袂將斬異己者衆皆從之莫敢仰視於是推登為使持節都督隴右諸軍事撫軍大將軍雍河二州牧略陽公帥衆五萬東下隴攻南安拔之馳使請命于秦登秦主丕之族子也苻登事始此使疏吏翻雍於用翻帥讀曰率下同祕宜與莫侯悌眷帥其衆三萬餘戶降于乞伏國仁國仁拜宜東秦州刺史悌眷梁州刺史莫侯夷人復姓降戶江翻下同己酉魏王圭還盛樂自陵石還也復扶又翻十餘日又奔劉顯圭使其孫倍斤代領其衆劉顯弟肺泥帥衆降魏八月燕主垂留太子寶守中山以趙王麟為尚書右僕射録留臺庚午自帥范陽王德等南略地使高陽王隆東徇平原丁零鮮于乞保曲陽西山曲陽縣屬常山郡出營望都望都縣屬中山郡水經注堯封於唐堯山在東北堯母慶都山在南登堯山見都山故望都縣以為名也剽匹妙翻趙王麟自出討之諸將皆曰殿下虛鎮遠征萬一無功而返虧損威重不如遣諸將討之麟曰乞聞大駕在外無所畏忌必不設備一舉可取不足憂也乃聲言至魯口夜回趣乞趣七喻翻比明至其營掩擊擒之比必寐翻及也翟遼寇譙朱序擊走之秦主丕以苻登為征西大將軍開府儀同三司南安王持節州牧都督皆因其所稱而授之又以徐義為右丞相留王騰守晉陽右僕射楊輔戍壺關帥衆四萬進屯平陽帥讀曰率初後秦主萇之弟碩德統所部羌居隴上聞萇起兵自稱征西將軍聚衆於冀城以應之以兄孫詳為安遠將軍據隴城從孫訓為安西將軍據南安之赤亭諸姚本赤亭羌也萇自安定引兵會碩德攻統天水屠各略陽羌胡應之者二萬餘戶秦略陽太守王皮降之屠直於翻降戶江翻初秦滅代遷代王什翼犍少子窟咄于長安事見一百四卷太元元年窟苦骨翻咄當沒翻永以窟咄為新興太守劉顯遣其弟亢埿迎窟咄以兵隨之逼魏南境諸部騷動魏王圭左右于桓等與部人謀執圭以應窟咄幢將代人莫題等亦潛與窟咄交通魏收官氏志道武登國元年置幢將六人主三郎衛士直宿禁中者侍中已下中散已上皆統之拓跋詰汾時餘部諸姓內入者有莫那婁氏後為莫氏幢直江翻圭誅桓等五人莫題等七姓悉原不問為後圭殺莫題張本難乃旦翻北踰陰山復依賀蘭部復扶又翻遣外朝大人遼東安同求救於燕姓譜安息王子入侍遂為漢人風俗通漢有安城為太守廬山記有安息國王子安高朝直遙翻九月王統以秦州降于後秦降戶江翻後秦主萇以姚碩德為使持節都督隴右諸軍事秦州刺史鎮上邽使疏吏翻呂光得秦王堅凶問舉軍縞素諡曰文昭皇帝冬十月大赦改元大安晉書載記作太安西燕慕容永遣使詣秦主丕求假道東歸使疏吏翻丕弗許與永戰于襄陵襄陵縣漢屬河東郡晉屬平陽郡左丞相王永衛大將軍俱石子皆死初東海王纂自長安來去年纂奔丕丕忌之既敗懼為纂所殺帥騎數千南奔東垣東垣縣漢已改為真定此東垣在河南新安縣界宋白曰河南府王屋縣漢為河東郡垣縣地又絳州垣縣本河東郡縣名其地即周召分陝之所又曰河南府漢為河南郡治洛陽後漢都洛陽河南屬司隸校尉魏陳留王奐合河南等五郡置司州劉聰為荊州石虎為洛州苻堅為豫州宋武入洛更置東垣西垣二縣仍於虎牢置司州帥讀曰率騎奇寄翻揚威將軍馮該自陝邀擊之陝式冉翻殺丕執其太子寧長樂王壽送建康樂音洛詔赦不誅以付苻宏苻宏去年來奔處之江州其餘王公百官皆沒於永永遂進據長子即皇帝位改元中興將以秦后楊氏為上夫人楊氏引劍刺永刺七亦翻為永所殺甲申海西公奕薨于吳年四十五燕寺人吳深據清河反寺音侍又如字燕主垂攻之不克後秦主萇還安定自上邽還安定也秦南安王登既克南安夷夏歸之者三萬餘戶夏戶雅翻遂進攻姚碩德于秦州後秦主萇自往救之登與萇戰于胡奴阜胡奴阜在上邽西斬首二萬餘級將軍啖青射萇中之射而亦翻中竹仲翻萇創重創初良翻走保上邽姚碩德代之統衆燕趙王麟軍未至魏拓跋窟咄稍前逼魏王圭賀染干侵魏北部以應之魏衆驚擾北部大人叔孫普洛亡奔劉衛辰麟聞之遽遣安同等歸魏人知燕軍在近衆心少安少詩沼翻窟咄進屯高柳高柳縣漢屬代郡晉省酈道元曰高柳在代中其山重巒疊巘霞舉雲高其山隱隱而東出遼塞窟咄大敗奔劉衛辰衛辰殺之圭悉收其衆以代人庫狄干為北部大人魏書官氏志次南諸部有庫狄氏後為狄氏劉衛辰居朔方士馬甚盛後秦主萇以衛辰為大將軍大單于河西王幽州牧單音蟬西燕主永以衛辰為大將軍朔州牧十一月秦尚書寇遺奉勃海王懿濟北王昶自杏城奔南安濟子禮翻南安王登發喪行服諡秦主丕曰哀平皇帝登議立懿為主衆曰勃海王雖先帝之子然年在幼沖未堪多難難乃旦翻今三虜窺覦三虜謂姚萇慕容垂慕容永也長知兩翻非大王不可登乃為壇於隴東即皇帝位登字文高堅之族孫也改元太初置百官慕容柔慕容盛及盛弟會皆在長子太元九年柔等自長安得脫奔慕容沖沖死隨永東遷主上已中興幽冀主上謂燕主垂東謂燕主垂西謂燕主永為智為愚皆將不免不若以時東歸無為坐待魚肉也遂相與亡歸燕後歲餘西燕主永悉誅燕主俊及燕主垂之子孫男女無遺史言慕容盛之智張大豫自西郡入臨洮掠民五千餘戶保據俱城俱城在臨洮界十二月呂光自稱使持節侍中中外大都督督隴右河西諸軍事大將軍涼州牧酒泉公使疏吏翻秦主登立世祖神主於軍中秦主堅廟號世祖車四面有屏蔽者曰輜軿軿蒲眠翻以虎賁三百人衛之賁音奔凡所欲為必啓主而後行引兵五萬東擊後秦將士皆刻鉾鎧為死休字鉾頭牟鎧甲也鉾音牟言欲復讎必死乃休也楊正衡曰字林鉾古矛字矟色角翻與槊同知有厚薄從中分配故人自為戰所向無前初長安之將敗也謂苻堅為慕容沖所困之時結壘自固既而受後秦官爵後秦主萇以王禮葬秦主堅於二壘之間及登至嵩空以衆降之登拜嵩雍州刺史空京兆尹降戶江翻雍於用翻改葬堅以天子之禮乙酉燕主垂攻吳深壘拔之深單馬走吳深時據清河以叛燕聊城縣漢屬東郡晉屬平原郡燕太子洗馬溫詳來奔以為濟北太守屯東阿東阿縣漢屬東郡晉屬濟北郡洗悉薦翻濟子禮翻詳遣從弟攀守河南岸子楷守碻磝以拒之燕主垂以魏王圭為西單于封上谷王圭不受圭不受燕封其志不在小單音蟬王崇武標點容肇祖聶崇岐覆校
