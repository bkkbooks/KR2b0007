body:
  text: 資治通鑑卷第六十二翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注漢紀五十四建安元年孝獻皇帝丁建安元年丙子一九六建安元年春正月癸酉大赦改元建安元年董承張楊欲以天子還雒陽楊奉李樂不欲由是諸將更相疑二更工衡翻下更有同二月韓暹攻董承承奔野王野王張楊所屯也暹息廉翻胡才楊奉之塢鄉郡國志河南緱氏縣西南有塢聚上使人喻止之建安元年汝南潁川黃巾何儀等擁衆附袁術曹操擊破之建安元年張楊使董承先繕修雒陽宮太僕趙岐為承說劉表使遣兵詣雒陽助修宮室軍資委輸前後不絶為于僞翻說輸芮翻委于僞翻流所聚曰委毛晃曰凡以物送之曰輸則音平聲指所送之物曰輸則音去聲委輸之委亦音去聲夏五月丙寅帝遣使至楊奉李樂韓暹營求送至雒陽奉等從詔六月乙未車駕幸聞喜建安元年袁術攻劉備以爭徐州備使司馬張飛守下邳自將拒術於盱眙淮陰郡國志盱眙淮陰二縣屬下邳國盱眙音吁怡更有勝負更工衡翻下邳相曹豹陶謙故將也與張飛相失飛殺之城中乖亂袁術與呂布書勸令襲下邳許助以軍糧布大喜引軍水陸東下布去年奔備蓋屯於下邳之西張飛敗走布虜備妻子及將吏家口備聞之引還比至下邳比必寐翻下比明同兵潰備收餘兵東取廣陵與袁術戰又敗屯於海西前漢志海西縣屬東海郡續漢志屬廣陵郡考異曰蜀志備傳於此云楊奉韓暹寇徐揚間備邀擊盡斬之按暹奉後與呂布同破袁術於時未死也備傳為誤踧子六翻吏士相食從事東海麋竺以家財助軍備請降於布降戶江翻布亦忿袁術運糧不繼乃召備復以為豫州刺史與並勢擊術使屯小沛賢曰高祖本泗水郡沛縣人及得天下改泗水為沛郡小沛即沛縣宋白曰郡國志云古逼陽國漢為沛縣而沛郡理相城以沛縣為小沛考異曰備傳云遣關羽守下邳此在布敗後備傳誤也布將河內郝萌夜攻布布科頭袒衣走詣都督高順營科頭不冠露髻也今江東人猶謂露髻為科頭萌敗走比明萌將曹性擊斬萌建安元年庚子楊奉韓暹奉帝東還張楊以糧迎道路秋七月甲子車駕至雒陽幸故中常侍趙忠宅丁丑大赦八月辛丑幸南宮楊安殿張楊以為己功故名其殿曰楊安楊謂諸將曰天子當與天下共之朝廷自有公卿大臣楊當出扞外難難乃旦翻遂還野王楊奉亦出屯梁郡國志梁縣屬河南尹春秋之梁國也癸卯以安國將軍張楊為大司馬楊奉為車騎將軍韓暹為大將軍領司隸校尉皆假節鉞是時宮室燒盡百官披荊棘依牆壁間州郡各擁強兵委輸不至㣥僚飢乏尚書郎以下自出採禾呂續漢志尚書侍郎三十六人四百石本注曰一曹有六人主作文書起草蔡質漢儀曰尚書郎初從三署詣臺試初上臺稱守尚書郎中滿歲稱尚書郎三年稱侍郎賢曰禾呂音呂埤蒼曰穭自生也禾呂與穭同或為兵士所殺建安元年袁術以讖言代漢者當塗高自云名字應之賢曰當塗高者魏也然術自以術及路皆是塗故云應之為舜後以黃代赤德運之次賢曰陳大夫轅濤塗袁氏其後也五行火生土故云以黃代赤聞孫堅得傳國璽事見五十九卷初平元年及聞天子敗於曹陽事見上卷興平二年衆莫敢對主簿閻象進曰昔周自后稷至于文王積德纍功參分天下有其二猶服事殷國語曰后稷勤周十五代而王毛詩國風序曰國君積行纍功以致爵位論語孔子曰三分天下有其二以服事殷未若有周之盛漢室雖微未若殷紂之暴也術默然術聘處士張範處昌呂翻範不往使其弟承謝之術謂承曰孤以土地之廣士民之衆欲徼福齊桓擬迹高祖何如徼一遙翻承曰在德不在強夫用德以同天下之欲雖由匹夫之資而興霸王之功不足為難若茍欲僭擬干時而動衆之所棄誰能興之術不悅孫策聞之與術書曰成湯討桀稱有夏多罪尚書湯誓曰有夏多罪天命殛之夏戶雅翻史記武王遍告諸侯曰殷有重罰不可不伐雖有聖德假使時無失道之過無由逼而取也今主上非有惡於天下徒以幼小脅於強臣異於湯武之時也且董卓貪淫驕陵志無紀極至於廢主自興亦猶未也而天下同心疾之況效尤而甚焉者乎左傳曰尤而效之罪又甚焉有夙成之德夙早也咸歸心焉使君五世相承賢曰安生京京生陽陽生逢逢生術凡五代被皮義翻榮寵之盛莫與為比宜效忠守節以報王室則旦奭之美率土所望也時人多惑圖緯之言妄牽非類之文苟以悅主為美不顧成敗之計古今所慎可不孰慮孰與熟通前書張良曰忠言逆耳利於行賢曰駮雜也議不同也言以持異議致憎疾也駮北角翻無所敢辭術始自以為有淮南之衆料策必與己合及得其書愁沮發疾沮在呂翻既不納其言策遂與之絶建安元年曹操在許郡國志許縣屬潁川郡帝既徙都改曰許昌杜佑曰漢許昌故城在今縣南三十里宋白曰在今縣西南四十里衆以為山東未定韓暹楊奉負功恣睢未可卒制睢香萃翻恣睢暴戾之貌卒讀曰猝荀彧曰昔晉文公納周襄王而諸侯景從賢曰左傳狐偃言於晉侯曰求諸侯莫如勤王諸侯信之且大義也晉侯以左師逆王王入于王城取太叔于溫殺之于隰城遂定霸業天下服從師古曰景從言如景之從形也事見九卷高祖三年為于僞翻蒙冒也言播越在草莽蒙冒塵埃也徒以山東擾亂未遑遠赴今鑾駕旋軫鄭玄注周禮曰軫車後橫木也義士有存本之思兆民懷感舊之哀誠因此時奉主上以從人望大順也秉至公以服天下大略也扶弘義以致英俊大德也四方雖有逆節其何能為韓暹楊奉安足恤哉若不時定使豪傑生心後雖為慮亦無及矣操乃遣揚武中郎將曹洪將兵西迎天子西漢有中郎將東漢分置三署虎賁羽林中郎將建安之後㣥雄兵爭自相署置始有名號中郎將洪不得進考異曰魏志此事在正月而荀彧傳迎天子在都雒後今從傳議郎董昭以楊奉兵馬最強而少黨援少詩沼翻作操書與奉曰吾與將軍聞名慕義便推赤心今將軍拔萬乘之艱難反之舊都乘繩證翻翼佐之功超世無疇何其休哉方今㣥凶猾夏孔安國曰猾亂也夏華夏夏戶雅翻神器至重事在維輔必須衆賢以清王軌誠非一人所能獨建心腹四支實相恃賴一物不備則有闕焉將軍當為內主吾為外援今吾有糧將軍有兵有無相通足以相濟死生契闊相與共之毛萇曰契闊勤苦也此蓋謂死也生也處勤苦之中相與共之也契苦結翻語諸將軍曰兗州諸軍近在許耳有兵有糧國家所當依仰也語牛倨翻仰牛向翻遂共表操為鎮東將軍襲父爵費亭侯操祖曹騰封費亭侯養子嵩襲爵今以操襲嵩爵也郡國志沛國旡旡貝縣有費亭曹騰所封也應劭曰旡旡貝音嵯師古曰王莽改旡旡貝曰贊治則此縣亦有贊音晉地道記山陽郡湖陸縣西有費亭城魏武帝初所封考異曰魏志在六月而董昭傳在都雒後今從傳韓暹矜功專恣董承患之因潛召操操乃將兵詣雒陽既至奏韓暹張楊之罪暹懼誅單騎奔楊奉帝以暹楊有翼車駕之功詔一切勿問辛亥以曹操領司隸校尉録尚書事操於是誅尚書馮碩等三人討有罪也袁宏紀曰誅碩及議郎侯祈侍中壺崇賞有功也宏紀曰封衛將軍董承輔國將軍伏完侍中丁种輔輯贈射聲校尉沮俊為弘農太守矜死節也沮俊死事見上卷興平二年沮子余翻操引董昭並坐問曰今孤來此當施何計昭曰將軍興義兵以誅暴亂入朝天子輔翼王室此五霸之功也此下諸將人殊意異未必服從今留匡弼事勢不便惟有移駕幸許耳然朝廷播越新還舊京遠近跂望跂渠宜翻舉足也冀一朝獲安今復徙駕不厭衆心復扶又翻厭於叶翻又如字夫行非常之事乃有非常之功願將軍算其多者凡舉事有利亦有害惟算其利多而害少者行之此孤本志也楊奉近在梁耳聞其兵精得無為孤纍乎纍力僞翻下同昭曰奉少黨援心相憑結鎮東費亭之事皆奉所定宜時遣使厚遺答謝以安其意少詩沼翻遺于季翻說京都無糧欲車駕暫幸魯陽魯陽縣屬南陽郡轉運稍易近其靳翻易以豉翻可無縣乏之憂縣讀曰懸奉為人勇而寡慮必不見疑比使往來比必寐翻使疏吏翻足以定計奉何能為纍操曰善即遣使詣奉庚申車駕出轘轅而東河南緱氏縣有轘轅關轘音環己巳幸曹操營以操為大將軍封武平侯武平縣屬陳國此取其以神武平禍亂也宋白曰亳州鹿邑縣後漢於今縣東北置武平縣隋改為鹿邑取故鹿邑城為名其古鹿邑城在縣西十三里春秋鹿鳴地也建安元年孫策將取會稽會工外翻吳人嚴白虎等衆各萬餘人處處屯聚諸將欲先擊白虎等策曰白虎等㣥盜非有大志此成禽耳遂引兵渡浙江浙之舌翻會稽功曹虞翻說太守王朗曰策善用兵不如避之朗不從發兵拒策於固陵策數渡水戰不能克策叔父靜說策曰朗負阻城守難可卒拔查瀆南去此數十里宜從彼據其內說輸芮翻數所角翻卒讀曰猝水經注浙江東徑固陵城北昔范蠡築城於浙江之濱言可以固守謂之固陵今之西陵也浙江又東徑柤塘謂之柤瀆孫策襲王朗所從出之道也裴松之曰查音祖加翻所謂攻其無備出其不意者也策從之夜多然火為疑兵分軍投查瀆道襲高遷屯裴松之曰按今永興縣有高遷橋沈約曰永興本漢餘暨縣吳更名蔡雍嘗經會稽高遷亭取椽竹以為笛即其處也遣故丹陽太守周昕等帥兵逆戰帥讀曰率策破昕等斬之朗遁走虞翻追隨營護朗浮海至東冶前漢志冶縣屬會稽郡師古曰故閩越地光武改曰章安晉志曰建安郡故秦閩中郡漢高祖五年以立閩越王及武帝滅之徙其人名為東冶後漢改為候官都尉及吳置建安郡洪氏隸釋據西漢志曰會稽西部都尉治錢唐南部都尉治回浦李宗諤圖經曰文帝時以山陰為都尉治元狩中徙治錢唐為西部元鼎中又立東部都尉治冶光武改回浦為章安以冶立東候官吳孫亮傳曰五鳳中以會稽東部為臨海郡孫休傳永安中以會稽南部為建安郡沈約宋志曰東陽太守本會稽西部都尉又曰臨海太守本會稽東部都尉前漢都尉治鄞後漢分會稽為吳郡疑是都尉徙治章安續漢志章安故冶光武更名晉太康記本鄞縣南之回浦鄉章帝立未詳孰是又曰司馬彪云章安是故冶然則臨海亦冶地也張勃吳録曰是句踐冶鑄之所後分為會稽東南二部都尉東部臨海是也南部建安是也杜佑通典曰後漢改冶縣為候官都尉後分冶縣為會稽東南二都尉今福州是南部台州是東部又曰二漢會稽西部都尉理婺州數說異同各有脫誤嘗參訂之自秦置會稽郡其治在今吳門至順帝分置吳郡而會稽徙郡於山陰以浙江為兩郡之境故錢唐在西漢時屬會稽所以為西部治所及會稽移於浙東則西部亦移於婺女回浦後改章安乃會稽之東部今台州蓋其地冶縣則是南部在吳屬建安郡至唐遂為福州太康記嘗云回浦本鄞之南鄉或云東部治鄞因致休文之疑然鄞及回浦皆西漢縣名謂西漢割鄞而置縣或未可知至章帝時回浦已非鄉矣太康所紀亦誤也前志注會稽之冶縣云本閩越地續志曰章安故冶閩越地光武更名因脫其中數字故劉昭補注惑於太康記而休文復不能剖判也當云章安故回浦章帝更名東候官故冶閩越地光武更名於文乃足此郡之末有東部侯國四字卻是衍文侯與候相近而南部所治故文有錯亂班史注回浦為南部司馬彪謂章安是故冶張勃謂分冶為東南二都尉杜佑謂二漢西部皆在婺女圖經以冶為東部皆誤也余按洪說甚詳其言錢唐西漢時屬會稽所以為西部治所此語亦恐有未安處大破之朗乃詣策降降戶江翻策自領會稽太守復命虞翻為功曹待以交友之禮策好游獵好呼到翻翻諫曰明府喜輕出微行從官不暇嚴喜許記翻從才用翻吏卒常苦之夫君人者不重則不威重尊重威威嚴言不尊重則無威嚴困於豫且張衡東京賦之辭注云說苑曰吳王欲從民飲酒伍子胥諫曰不可昔白龍下清泠之淵化為魚漁者豫且射中其目白龍上訴天帝曰當是之時若安置而形白龍對曰我下清泠之淵化為魚天帝曰魚固人之所射也豫且何罪夫白龍天帝貴畜也豫且宋國之賤臣也白龍不化豫且不射今棄萬乘之位而從布衣之士飲酒臣恐其有豫且之患矣王乃止且子余翻劉季害之事見七卷秦二世元年少詩沼翻策曰君言是也然不能改為策死於輕出張本建安元年九月司徒淳于嘉太尉楊彪司空張喜皆罷建安元年車駕之東遷也楊奉自梁欲邀之不及冬十月曹操征奉奉南奔袁術遂攻其梁屯拔之建安元年詔書下袁紹責以地廣兵多而專自樹黨下遐稼翻下之下同樹黨謂以子談為青州刺史熙為幽州刺史外甥高幹為並州刺史不聞勤王之師但亶相討伐謂與公孫瓚相攻也戊辰以紹為太尉封鄴侯紹恥班在曹操下怒曰曹操當死數矣數所角翻下同我輒救存之操自滎陽汴水之敗收兵從紹於河內紹表為東郡太守呂布襲取兗州紹復與操連和欲令其遣家居鄴也表辭不受操懼請以大將軍讓紹丙戌以操為司空行車騎將軍事操以荀彧為侍中守尚書令操問彧以策謀之士彧薦其從子蜀郡太守攸攸既免董卓之禍復辟公府舉高第遷任城相不行以蜀險固人民殷盛求為蜀郡太守道絶不得至駐荊州從才用翻下同操徵攸為尚書與語大悅曰公達非常人也荀攸字公達天下當何憂哉以為軍師初郭嘉往見袁紹紹甚敬禮之居數十日謂紹謀臣辛評郭圖曰夫智者審於量主量音良故百全而功名可立袁公徒欲效周公之下士而不知用人之機多端寡要好謀無決欲與共濟天下大難定霸王之業難矣好呼到翻大難乃旦翻吾將更舉而求主更工衡翻改也子盍去乎二人曰袁氏有恩德於天下人多歸之且今最強去將何之嘉知其不寤不復言復扶又翻遂去之操召見與論天下事喜曰使孤成大業者必此人也嘉出亦喜曰真吾主也操表嘉為司空祭酒陳壽三國志作司空軍祭酒此逸軍字晉志曰當塗得志克寸平諸夏初置軍師祭酒參掌戎律操以山陽滿寵為許令操從弟洪有賓客在許界數犯法寵收治之洪書報寵報告也前書霍顯曰少夫幸報我以事數所角翻治直之翻洪以白操操召許主者主者許縣主史也乃速殺之操喜曰當事不當爾邪建安元年北海太守孔融負其高氣志在靖難而才疏意廣訖無成功訖竟也終也難乃旦翻盈溢官曹辭氣清章甲十一行本清作溫乙十一行本同孔本同熊校同雅可玩而誦論事考實難可悉行但能張磔網羅磔陟格翻開也而目理甚疏造次能得人心造七到翻久久亦不願附也其所任用好奇取異多剽輕小才好呼到翻剽匹妙翻輕墟正翻至於尊事名儒鄭玄執子孫禮易其鄉名曰鄭公鄉玄傳曰融深敬玄告高密縣為玄特立一鄉曰昔齊置士鄉越有君子軍皆異賢之意也太史公廷尉吳公謁者僕射鄧公皆漢之名臣又南山四皓有園公夏黃公世嘉其高皆悉稱公然則公者仁德之正號不必皆三事大夫也今鄭君鄉宜曰鄭公鄉皆備在座席而已不與論政事曰此民望不可失也黃巾來寇融戰敗走保都昌賢曰都昌縣屬北海郡故城在今青州臨胊縣東北融兵弱糧寡孤立一隅不與相通左承祖勸融宜自託強國融不聽而殺之劉義遜棄去青州刺史袁談攻融自春至夏戰士所餘才數百人流矢交集而融猶隱几讀書談笑自若隱於靳翻賢曰隱憑也城夜陷乃奔東山都昌縣之東山也曹操與融有舊徵為將作大匠袁談初至青州其土自河而西不過平原談北排田楷田楷公孫瓚用為青州刺史威惠甚著其後信任㣥小肆志奢淫聲望遂衰建安元年中平以來天下亂離民棄農業諸軍並起率乏糧穀無終歲之計飢則寇掠飽則棄餘瓦解流離無敵自破者不可勝數勝音升袁紹在河北軍人仰食桑椹仰牛向翻椹桑實也其始生也色青熟則色黑可食椹音甚袁術在江淮取給蒲螺螺蚌屬盧戈翻民多相食州里蕭條羽林監棗祗請建置屯田潁川文士傳棗氏本姓棘避難改焉漢官羽林有左右監秩六百石屬光祿勳以祗為屯田都尉以騎都尉任峻為典農中郎將魏志曰曹公置典農中郎將秩二千石典農都尉秩六百石或四百石典農校尉秩比二千石所主如中郎所主部分別而少為校尉得穀百萬斛於是州郡例置田官所在積穀倉廩皆滿故操征伐四方無運糧之勞遂能兼並㣥雄軍國之饒起於祗而成於峻建安元年袁術畏呂布為己害乃為子求婚布復許之乃為于僞翻復扶又翻術遣將紀靈等步騎三萬攻劉備備求救於布諸將謂布曰將軍常欲殺劉備今可假手於術布曰不然術若破備則北連泰山諸將泰山諸將謂臧霸孫觀吳敦尹禮輩不得不救也便率步騎千餘馳往赴之靈等聞布至皆斂兵而止布屯沛城西南遣鈴下請靈等鈴下卒也在鈴閣之下有警至則掣鈴以呼之因以為名續漢志曰五百鈴下侍閣門闌部署街里走卒皆有程品多少隨所典領程大昌續演繁露曰鈴下威儀殆今典客之吏布往就之與備共飲食布謂靈等曰玄德布弟也劉備字玄德故來救之布性不喜合鬬喜解鬬耳言不喜合人之鬬喜解人之鬬也喜許記翻布彎弓顧曰諸君觀布射戟小支賢曰周禮考工記曰為戟博二寸內倍之胡參之援四之鄭注云援直刃胡其孑也小支謂胡也即今之戟旁曲支植直吏翻立也射而亦翻不中可留決鬬布即一發正中戟支中竹仲翻下同靈等皆驚言將軍天威也明日復歡會然後各罷備合兵得萬餘人布惡之復扶又翻惡烏路翻自出兵攻備備敗走歸曹操操厚遇之以為豫州牧或謂操曰備有英雄之志今不早圖後必為患操以問郭嘉嘉曰有是然公起義兵為百姓除暴為于僞翻推誠杖信以招俊傑猶懼其未也今備有英雄名以窮歸己而害之是以害賢為名也如此則智士將自疑回心擇主公誰與定天下乎夫除一人之患以沮四海之望安危之機也不可不察沮在呂翻考異曰傅子以為程昱郭嘉勸操殺備今從魏書操笑曰君得之矣遂益其兵給糧食使東至沛收散兵以圖呂布初備在豫州舉陳郡袁渙為茂才武帝元封六年詔州郡舉茂才茂才即秀才也避光武諱史遂書為茂才布欲使渙作書罵辱備渙不可再三強之不許強其兩翻布大怒以兵脅渙曰為之則生不為則死渙顏色不變笑而應之曰渙聞唯德可以辱人不聞以罵使彼固君子邪且不恥將軍之言彼誠小人邪將復將軍之意言布以書罵備備君子邪固不以罵為恥其小人邪將復以書罵布也且渙他日之事劉將軍猶今日之事將軍也如一旦去此復罵將軍可乎復扶又翻布慚而止建安元年張濟自關中引兵入荊州界攻穰城穰縣屬南陽郡中竹仲翻荊州官屬皆賀劉表曰濟以窮來主人無禮言無郊勞授館之禮也此非牧意牧受弔不受賀也使人納其衆衆聞之喜皆歸心焉濟族子建忠將軍繡代領其衆屯宛宛於元翻初帝既出長安宣威將軍賈詡上還印綬上時掌翻往依段煨于華陰華戶化翻詡素知名為煨軍所望煨禮奉甚備詡潛謀歸張繡或曰煨待君厚矣君去安之詡曰煨性多疑有忌詡意禮雖厚不可恃久將為所圖詡既為煨軍所望則必為煨所忌矣久留則煨懼詡奪其軍必將圖殺之又望吾結大援於外必厚吾妻子繡無謀主亦願得詡則家與身必俱全矣詡遂往繡執子孫禮煨果善視其家詡說繡附於劉表說輸芮翻繡從之詡往見表表以客禮待之詡曰表平世三公才也不見事變多疑無決無能為也劉表愛民養士從容自保從千容翻境內無事關西兗豫學士歸之者以千數表乃起立學校講明經術校戶教翻命故雅樂郎河南杜夔作雅樂蔡雍曰漢樂四品一曰太豫樂典郊廟上陵殿舉之樂二曰周頌雅樂典辟雍饗射六宗社稷之樂三曰黃門鼓吹天子所以宴樂㣥臣四曰短簫鐃歌軍樂也表欲庭觀之夔曰今將軍號不為天子合樂而庭作之無乃不可乎表乃止平原禰衡少有才辨而尚氣剛傲禰乃禮翻姓也少詩照翻孔融薦之於曹操衡罵辱操操召衡為鼓吏故為衡所罵辱謂融曰禰衡豎子孤殺之猶雀鼠耳顧此人素有虛名遠近將謂孤不能容之乃送與劉表表延禮以為上賓衡稱表之美盈口而好譏貶其左右好呼到翻於是左右因形而譖之曰衡稱將軍之仁西伯不過也唯以為不能斷斷丁亂翻終不濟者必由此也其言實指表短而非衡所言也表由是怒以江夏太守黃祖性急送衡與之祖亦善待焉後衡衆辱祖祖殺之操怒衡而送與表猶以表為寬和愛士觀其能容與否也表怒衡而送與祖知祖性急必不能容衡是直欲置之死地耳二人皆挾數用術表則淺矣二年建安二年春正月曹操討張繡軍于淯水水經注淯水出弘農盧氏縣攻離山東徑宛縣南操軍敗處也淯音育操納張濟之妻繡恨之又以金與繡驍將胡車兒繡聞而疑懼襲擊操軍殺操長子昂操中流矢敗走降戶江翻驍堅堯翻車尺遮翻長知兩翻中竹仲翻校尉典韋與繡力戰左右死傷略盡韋被數十創被皮義翻創初良翻繡兵前搏之韋雙挾兩人擊殺之瞋目大罵而死瞋七人翻操收散兵還住舞陰舞陰縣屬南陽郡操擊破之繡走還穰復與劉表合復扶又翻是時諸軍大亂平虜校尉泰山于禁獨整衆而還道逢青州兵劫掠人禁數其罪而擊之數所具翻青州兵走詣操禁既至先立營壘不時謁操或謂禁青州兵已訴君矣宜促詣公辨之禁曰今賊在後追至無時不先為備何以待敵且公聰明譖訴何緣得行徐鑿塹安營訖塹七豔翻乃入謁具陳其狀操悅謂禁曰淯水之難難乃旦翻吾猶狼狽將軍在亂能整討暴堅壘討暴謂擊劫掠者堅壘謂先鑿塹安營也雖古名將何以加之於是録禁前後功封益壽亭侯操引軍還許建安二年袁紹與操書辭語驕慢操謂荀彧郭嘉曰今將討不義而力不敵何如對曰劉項之不敵公所知也漢祖惟智勝項羽故羽雖強終為所禽今紹有十敗公有十勝紹雖強無能為也紹繁禮多儀公體任自然此道勝也紹以逆動公奉順以率天下謂奉天子以率天下於理為順桓靈以來政失於寬紹以寬濟寬故不攝攝整也左傳曰書於伐秦攝也杜預注曰能自攝整章甲十一行本猛下有以字乙十一行本猛下有而字上下知制此治勝也治直吏翻紹外寬內忌用人而疑之所任唯親戚子弟公外易簡而內機明易以豉翻用人無疑唯才所宜不間遠近此度勝也間古莧翻紹多謀少決失在後事公得策輒行應變無窮此謀勝也紹高議揖讓以收名譽士之好言飾外者多歸之好呼到翻下同公以至心待人不為虛美士之忠正遠見而有實者皆願為用此德勝也紹見人飢寒恤念之形於顏色其所不見慮或不及公於目前小事時有所忽至於大事與四海接恩之所加皆過其望雖所不見慮無不周此仁勝也紹大臣爭權讒言惑亂公御下以道浸潤不行此明勝也論語浸潤之譖不行焉可謂明也巳矣言譖人者如水之浸潤以漸而入也公所是進之以禮所不是正之以法此文勝也紹好為虛勢不知兵要荀子與臨武君議兵於趙孝成王前王曰請問兵要少詩沼翻用兵如神軍人恃之敵人畏之此武勝也操笑曰如卿所言孤何德以堪之嘉又曰紹方北擊公孫瓚瓚藏旱翻可因其遠征東取呂布若紹為寇布為之援此深害也彧曰不先取呂布河北未易圖也紹攻公孫瓚而操乘間東取呂布操擊劉備而紹不能襲許此其所以敗也易以豉翻然吾所惑者又恐紹侵擾關中西亂羌胡南誘蜀漢誘音酉是我獨以兗豫抗天下六分之五也為將奈何彧曰關中將帥以十數將即亮翻帥所類翻莫能相一唯韓遂馬騰最強彼見山東方爭必各擁衆自保今若撫以恩德遣使連和雖不能久安比公安定山東足以不動遂騰之叛服卒如荀彧所料比必寐翻若屬以西事屬之欲翻公無憂矣操乃表繇以侍中守司隸校尉持節督關中諸軍特使不拘科制繇至長安移書騰遂等移猶遺也為于僞翻騰遂各遣子入侍建安二年袁術稱帝於壽春自稱仲家以九江太守為淮南尹置公卿百官郊祀天地沛相陳圭球弟子也少與術遊術以書召圭又劫質其子少詩照翻質音致期必致圭圭答書曰曹將軍興復典刑將撥平凶慝以為足下當戮力同心匡翼漢室而陰謀不軌以身試禍欲吾營私阿附有死不能也術欲以故兗州刺史金尚為太尉尚不許而逃去術殺之金尚奔術見六十卷初平三年建安二年三月詔將作大匠孔融持節拜袁紹大將軍兼督冀青幽並四州建安二年夏五月蝗建安二年袁術遣使者韓胤以稱帝事告呂布因求迎婦布遣女隨之陳圭恐徐揚合從為難未已術領揚州布領徐州從子容翻難乃旦翻說輸芮翻曹公奉迎天子輔贊國政將軍宜與協同策謀共存大計今與袁術結昏必受不義之名將有纍卵之危矣布亦怨術初不己受也事見六十卷初平三年乃追還絶昏械送韓胤梟首許市梟堅堯翻陳圭欲使子登詣曹操布固不肯會詔以布為左將軍操復遺布手書深加尉納復扶又翻遺于季翻尉與慰同安之也漢書車千秋傳尉安黎庶顏師古曰尉安之字本無心布大喜即遣登奉章謝恩並答操書登見操因陳布勇而無謀輕於去就宜早圖之操曰布狼子野心誠難久養非卿莫究其情僞即增圭秩中二千石漢制王國相秩二千石增秩中二千石則秩視九卿臨別操執登手曰東方之事便以相付令陰合部衆以為內應始布因登求徐州牧不得登還布怒拔戟斫几曰卿父勸吾協同曹操絶婚公路今吾所求無獲而卿父子並顯重但為卿所賣耳登不為動容為于僞翻徐對之曰登見曹公言養將軍譬如養虎當飽其肉不飽則將噬人公曰不如卿言譬如養鷹飢即為用飽則揚去其言如此布意乃解袁術遣其大將張勳橋蕤等與韓暹楊奉連勢步騎數萬趣下邳趣七喻翻七道攻布布時有兵三千馬四百匹懼其不敵謂陳圭曰今致術軍卿之由也為之奈何圭曰暹奉與術卒合之師耳卒讀曰猝謀無素定不能相維子登策之比於連雞勢不俱棲戰國策秦惠王曰諸侯之不可一猶連雞之不能俱上於棲布用圭策與暹奉書曰二將軍親拔大駕而布手殺董卓俱立功名今奈何與袁術同為賊乎不如相與並力破術為國除害為于僞翻且許悉以術軍資與之暹奉大喜即回計從布布進軍去勳營百步暹奉兵同時叫呼呼火故翻並到勳營勳等散走布兵追擊斬其將十人首所殺傷墮水死者殆盡布因與暹奉合軍向壽春水陸並進到鍾離鍾離縣屬九江郡距壽春二百餘里還渡淮北留書辱術術自將步騎五千揚兵淮上布騎皆於水北大咍笑之而還咍呼來翻楚人謂相啁笑曰咍泰山賊帥臧霸襲琅邪相蕭建於莒前漢莒縣屬城陽國後漢屬琅邪國帥所類翻霸得建資實許以賂布而未送布自往求之其督將高順諫曰將即亮翻下所將順將同將軍威名宣播遠近所畏何求不得而自行求賂萬一不克豈不損邪布不從既至莒霸等不測往意固守拒之無獲而還順為人清白有威嚴少言辭所將七百餘兵號令整齊每戰必克名陷陳營少詩沼翻陳讀曰陳布後疏順以魏續有內外之親奪其兵以與續及當攻戰則復令順將順亦終無恨意布疏順而親續其後執順以敗布者續也將即亮翻易以豉翻所為無常順每諫曰將軍舉動不肯詳思忽有失得動輒言誤誤豈可數乎數所角翻布知其忠而不能從建安二年曹操遣議郎王誧誧滂古翻又匹布翻以詔書拜孫策為騎都尉襲爵烏程侯策父堅以討賊功封烏程侯烏程縣屬吳郡今安吉州縣考異曰江表傳曰建安二年夏王誧奉戊辰詔書賜策不知其何月也會工外翻使與呂布及吳郡太守陳瑀共討袁術策欲得將軍號以自重誧便承制假策明漢將軍明漢將軍亦權宜置此號言明於逆順知尊漢室也下輔漢同策治嚴嚴裝也錢唐縣前漢屬會稽郡後漢省其地當屬吳郡界錢唐記曰昔郡議曹華信議立此塘以防海募有能致一斛土者與錢一千旬月之間來者雲集塘未成而不復取於是載土石者皆委之而去塘以之成故名錢塘潛結祖郎嚴白虎等使為內應策覺之遣其將呂範徐逸攻瑀於海西瑀敗單騎奔袁紹建安二年初陳王寵有勇善弩射寵明帝子陳敬王羡之曾孫也寵治兵自守治直之翻國人畏之不敢離叛國相會稽駱俊素有威恩是時王侯無復租祿而數見虜奪數所角翻或並日而食轉死溝壑而陳獨富強鄰郡人多歸之有衆十餘萬及州郡兵起寵率衆屯陽夏賢曰陽夏縣屬淮陽國夏音工雅翻袁術求糧於陳駱俊拒絶之術忿恚恚於避翻遣客詐殺俊及寵陳由是破敗建安二年秋九月司空曹操東征袁術術聞操來棄軍走留其將橋蕤等於蘄陽以拒操賢曰蘄水出江夏蘄春縣北山水經注云即蘄山也西南流徑蘄山又南對蘄陽注于大江亦謂之蘄陽口余據三國志術時侵陳操東征之術留蕤等拒操蕤等敗死術乃走渡淮則蓋戰於淮外也安得至江夏之蘄陽哉此蓋沛國之蘄縣范史衍陽字而通鑑因之耳皆斬之考異曰范書呂布傳云布破張勳於下邳生擒橋蕤此又一橋蕤將蕤被獲又還也然魏志呂布傳無橋蕤事當是范書誤時天旱歲荒士民凍餒術由是遂衰操辟陳國何夔為掾掾俞絹翻問以袁術何如對曰天之所助者順人之所助者信術無信順之實而望天人之助其可得乎操曰為國失賢則亡君不為術所用亡不亦宜乎操性嚴掾屬公事往往加杖夔常蓄毒藥誓死無辱是以終不見及沛國許褚勇力絶人聚少年及宗族數千家堅壁以禦外寇淮汝陳梁間皆畏憚之操徇淮汝褚以衆歸操操曰此吾樊噲也即日拜都尉引入宿衛諸從褚俠客皆以為虎士焉俠戶頰翻建安二年故太尉楊彪與袁術昏姻據彪傳彪子修袁術之甥彪蓋娶於袁氏也惡烏路翻誣云欲圖廢立奏收下獄劾以大逆下遐稼翻劾戶概翻又戶得翻將作大匠孔融聞之不及朝服朝直遙翻往見操曰楊公四世清德震秉賜彪四世以清白稱周書父子兄弟罪不相及況以袁氏歸罪楊公乎操曰此國家之意國家謂帝也假使成王殺召公周公可得言不知邪操使許令滿寵按彪獄融與尚書令荀彧皆屬寵曰但當受辭勿加考掠屬之欲翻掠音亮寵一無所報考訊如法數日求見操言之曰楊彪考訊無他辭語此人有名海內若罪不明白必大失民望竊為明公惜之為于僞翻操即日赦出彪初彧融聞寵考掠彪皆怒及因此得出乃更善寵彪見漢室衰微政在曹氏遂稱腳攣攣閭緣翻牽縮也積十餘年不行由是得免於禍建安二年馬日磾喪至京師日磾死見六十一卷興平元年磾丁奚翻孔融曰日磾以上公之尊秉髦節之使使疏吏翻而曲媚姦臣為所牽率王室大臣豈得以見脅為辭聖上哀矜舊臣未忍追按不宜加禮朝廷從之金尚喪至京師詔百官弔祭拜其子瑋為郎中建安二年冬十一月曹操復攻張繡復扶又翻又如字拔湖陽湖陽縣屬南陽郡又攻舞陰下之建安二年韓暹楊奉在下邳寇掠徐揚間軍飢餓辭呂布欲詣荊州布不聽奉知劉備與布有宿憾私與備相聞欲共擊布備陽許之奉引軍詣沛備請奉入城飲食未半於座上縛奉斬之暹失奉孤特與十餘騎歸並州為杼秋令張宣所殺杼秋縣前漢屬梁國後漢屬沛國師古曰杼音食汝翻才為怨家所殺怨於元翻樂自病死郭汜為其將伍習所殺建安二年潁川杜襲趙儼繁欽避亂荊州繁音婆左傳殷民七族有繁氏西漢有御史大夫繁延壽劉表俱待以賓禮欽數見奇於表數所角翻見賢遍翻下見能同襲喻之曰吾所以與子俱來者徒欲全身以待時耳豈謂劉牧當為撥亂之主而規長者委身哉長知兩翻子若見能不已非吾徒也吾與子絶矣欽慨然曰請敬受命及曹操迎天子都許儼謂欽曰曹鎮東必能匡濟華夏夏戶雅翻下同吾知歸矣遂還詣操操以儼為朗陵長朗陵縣屬汝南郡長知兩翻陽安都尉江夏李通妻伯父犯法操分汝南二縣置陽安都尉致之大辟治直之翻辟毗亦翻時殺生之柄決於牧守守式又翻通妻子號泣以請其命號戶刀翻通曰方與曹公戮力義不以私廢公嘉儼執憲不阿與為親交三年建安三年春正月曹操還許攻張繡而還也將復擊張繡復扶又翻荀攸曰繡與劉表相恃為強然繡以遊軍仰食於表仰牛向翻表不能供也勢必乖離不如緩軍以待之可誘而致也誘音酉若急之其勢必相救操不從圍繡於穰建安三年夏四月使謁者僕射裴茂姓譜伯益之後封鄉因以為氏後徙封解邑乃去邑從衣夷其三族董卓之黨於是盡矣煨烏回翻傕古嶽翻封闅鄉侯闅音旻建安三年初袁紹每得詔書患其有不便於己者欲移天子自近使說曹操以許下埤溼近其靳翻說輸芮翻下同埤皮弭翻又讀與卑同雒陽殘破宜徙都鄄城以就全實鄄音絹操拒之田豐說紹曰徙都之計既不克從宜早圖許奉迎天子動託詔書號令海內此算之上者不爾終為人所禽雖悔無益也紹不從會紹亡卒詣操云田豐勸紹襲許操解穰圍而還還從宣翻又如字張繡率衆追之五月劉表遣兵救繡屯於安衆守險以絶軍後水經注梅溪水出南陽宛縣北紫山南徑杜衍縣東土地墊下湍溪是注古人於安衆堨之令遊水是瀦謂之安衆港郡國志南陽郡有安衆侯國吾到安衆破繡必矣及到安衆操軍前後受敵操乃夜鑿險僞遁表繡悉軍來追操縱奇兵步騎夾攻大破之他日彧問操前策賊必破何也操曰虜遏吾歸師而與吾死地兵法曰歸師勿遏又曰置之死地而後生繡之追操也賈詡止之曰不可追也追必敗繡不聽進兵交戰大敗而還詡登城謂繡曰促更追之更戰必勝繡謝曰不用公言以至於此今已敗奈何復追復扶又翻下同兵勢有變促追之言兵勢無常審知其變則因敗而為勝遂收散卒更追合戰果以勝還此亦小勝耳繡以精兵追退軍而公曰必敗以敗卒擊勝兵而公曰必克悉如公言何也詡曰此易知耳易以豉翻將軍雖善用兵非曹公敵也曹公軍新退必自斷後斷丁管翻下同故知必敗曹公攻將軍既無失策力未盡而一朝引退必國內有故也有故謂有變也必輕軍速進留諸將斷後諸將雖勇非將軍敵故雖用敗兵而戰必勝也繡乃服建安三年呂布復與袁術通遣其中郎將高順及北地太守鴈門張遼攻劉備布以遼遙領北地太守耳為順等所敗敗補邁翻秋九月順等破沛城虜備妻子備單身走曹操欲自擊布諸將皆曰劉表張繡在後而遠襲呂布其危必也荀攸曰表繡新破勢不敢動布驍猛又恃袁術若從橫淮泗間驍堅堯翻從子容翻豪傑必應之今乘其初叛衆心未一往可破也操曰善比行泰山屯帥臧霸孫觀吳敦尹禮昌豨等皆附於布比必寐翻帥所類翻豨許豈翻又音希史言攸料敵之審姓譜昌姓昌意之後操與劉備遇於梁進至彭城陳宮謂布宜逆擊之以逸待勞無不克也布曰不如待其來蹙著泗水中著直略翻冬十月操屠彭城廣陵太守陳登率郡兵為操先驅進至下邳布自將屢與操戰皆大敗將即亮翻還保城不敢出操遺布書為陳禍福遺于季翻為于僞翻布懼欲降降戶江翻陳宮曰曹操遠來勢不能久將軍若以步騎出屯於外宮將餘衆閉守於內若向將軍宮引兵而攻其背若但攻城則將軍救於外不過旬月操軍食盡擊之可破也布然之欲使宮與高順守城自將騎斷操糧道斷丁管翻布妻謂布曰宮順素不和將軍一出宮順必不同心共城守也如有蹉跌蹉昌何翻跌徒結翻將軍當於何自立乎且曹氏待公臺如赤子猶舍而歸我陳宮字公臺歸布事見上卷興平元年舍讀曰捨而欲委全城捐妻子孤軍遠出若一旦有變妾豈得復為將軍妻哉復扶又翻下同布乃止潛遣其官屬許汜王楷求救於袁術汜音祀術曰布不與我女理自當敗何為復來汜楷曰明上今不救布為自敗耳布破明上亦破也術時僭號故稱之為明上布恐術為女不至故不遣救兵以帛丿糸纏女身縛著馬上夜自送女出與操守兵相觸格射不得過復還城為于僞翻著直略翻射而亦翻河內太守張楊素與布善欲救之不能乃出兵東市野王縣東市也十一月楊將楊醜殺楊以應操別將眭固復殺醜眭息隨翻將其衆北合袁紹楊性仁和無威刑下人謀反發覺對之涕泣輒原不問故及於難難乃旦翻操掘塹圍下邳積久士卒疲敝欲還荀攸郭嘉曰呂布勇而無謀今屢戰皆北鋭氣衰矣三軍以將為主將即亮翻主衰則軍無奮意陳宮有智而遲今及布氣之未復宮謀之未定急攻之布可拔也乃引沂泗灌城泗水東南流過下邳縣西沂水南流亦至下邳縣西而南入于泗故併引二水以灌城水經注沂水於下邳縣北西流分為二水一水於城北西南入泗一水徑城東屈從縣南亦注泗謂之小沂水水上有橋張良遇黃石公處也操於此處引沂泗灌城布益困迫考異曰范書布傳云灌其城三月魏志傳亦曰圍之三月按操以十月至下邳及殺布共在一季不可言三月今從魏志武紀卿曹無相困我我當自首於明公首式救翻陳宮曰逆賊曹操何等明公今日降之降戶江翻下同若卵投石豈可得全也布將侯成亡其名馬已而復得之諸將合禮以賀成成分酒肉先入獻布布怒曰布禁酒而卿等醞釀為欲因酒共謀布邪成忿懼十二月癸酉成與諸將宋憲魏續等共執陳宮高順率其衆降布與麾下登白門樓水經注下邳城南門名白門宋武北征記曰下邳城有三重大城周四里呂布所守也魏武禽布於白門大城之門也宋白曰下邳中城南臨白樓門布令左右取其首詣操左右不忍乃下降布見操曰今日已往天下定矣操曰何以言之布曰明公之所患不過於布今已服矣若令布將騎明公將步天下不足定也將即亮翻騎奇寄翻顧謂劉備曰玄德卿為坐上客坐徂臥翻我為降虜繩縛我急獨不可一言邪操笑曰縛虎不得不急乃命緩布縛劉備曰不可考異曰獻帝春秋曰太祖意欲活布命使寬縛主簿王必趨進曰布勍虜也其衆近在外不可寬也太祖曰本欲相緩主簿復不聽如之何今從范書陳志丁原字建陽董卓官至太師布皆殺之事見五十九卷靈帝中平六年及六十卷初平三年頷之者微動頤頷以應之大耳兒最叵信備顧自見其耳故云然叵普火翻不可也洪邁曰叵為不可此以切腳稱也操謂陳宮曰公臺平生自謂智有餘今竟何如宮指布曰是子不用宮言以至於此若其見從亦未必為禽也操曰奈卿老母何宮曰宮聞以孝治天下者不害人之親治直之翻老母存否在明公不在宮也操曰奈卿妻子何宮曰宮聞施仁政於天下者不絶人之祀妻子存否在明公不在宮也操未復言宮請就刑遂出不顧操為之泣涕復扶又翻為于僞翻並布順皆縊殺之傳首許市操召陳宮之母養之終其身嫁宮女撫視其家皆厚於初操厚陳宮之家而不肯存孔融之嗣必陳宮之妻子可保其無能為也前尚書令陳紀紀子㣥在布軍中操皆禮用之張遼將其衆降拜中郎將臧霸自亡匿操募索得之索山客翻使霸招吳敦尹禮孫觀等皆詣操降操乃分琅邪東海為城陽利城昌慮郡城陽西漢王國光武省併入琅邪利城昌慮二縣皆屬東海此蓋因諸屯帥所居而分為郡也慮師古音廬初操在兗州以徐翕毛暉為將及兗州亂翕暉皆叛兗州既定翕暉亡命投霸操語劉備語牛倨翻令霸送二首霸謂備曰霸所以能自立者以不為此也霸受主公生全之恩不敢違命然王霸之君可以義告願將軍為之辭備以霸言白操操歎息謂霸曰此古人之事而君能行之孤之願也皆以翕暉為郡守守式又翻陳登以功加伏波將軍建安三年劉表與袁紹深相結約治中鄧羲諫表表曰內不失貢職外不背盟主背蒲妹翻此天下之達義也治中獨何怪乎羲乃辭疾而退長沙太守張羡性屈強屈渠勿翻強巨兩翻屈強梗戾不順從貌表不禮焉郡人桓階說羡舉長沙零陵桂陽三郡以拒表遣使附於曹操羡從之說輸芮翻考異曰魏志桓階傳袁曹相拒官渡而階說羡按范書劉表傳建安三年羡拒表在官渡前也建安三年孫策遣其正議校尉張紘獻方物正議校尉亦孫策私所署置表策為討逆將軍討逆將軍亦創置也由烏程徙封吳進其封也考異曰江表傳曰倍於元年所獻其年制書拜討逆封吳侯按策貢獻在二年非元年也又陳志紘傳曰建安四年遣紘奉章詣許按吳書紘述策材略忠款曹公乃優文褒崇改號加封然則紘來在策封吳侯前本傳誤也又為子彰取孫賁女為于僞翻取讀曰娶禮辟策弟權翊操禮辟權翊欲其至以為質耳袁術以周瑜為居巢長以臨淮魯肅為東城長居巢縣屬廬江郡東城縣前漢屬九江郡後漢省當是術復置也長知兩翻皆棄官渡江從孫策策以瑜為建威中郎將肅因家於曲阿曹操表徵王朗策遣朗還操以朗為諫議大夫參司空軍事參軍事昉於魏晉之間位望頗重孫楚謂石苞曰天子命我參卿軍事是也自是以後位望輕矣袁術遣間使間古莧翻使疏吏翻齎印綬與丹陽宗帥祖郎等帥所類翻使激動山越共圖孫策劉繇之奔豫章也太史慈遁於蕪湖山中自稱丹陽太守策已定宣城以東惟涇以西六縣未服慈因進住涇縣大為山越所附蕪湖涇縣皆屬丹陽郡宣城縣前漢亦屬丹陽後漢省晉太康元年分丹陽立宣城郡復置縣屬焉山越越民依阻山險而居者禽之陵陽縣屬丹陽郡陵陽子明得仙於此縣山因名爾昔襲孤事見上卷興平元年今創軍立事除棄宿恨惟取能用與天下通耳非但汝汝勿恐怖怖普布翻郎叩頭謝罪即破械署門下賊曹又討太史慈於勇里勇里在涇縣解縛捉其手捉執也寧識神亭時邪若卿爾時得我云何神亭事見上卷興平二年未可量也量音良策大笑曰今日之事當與卿共之聞卿有烈義天下智士也慈東萊人少為郡奏曹史時郡與州有隙交章以聞而州章先到雒慈劫取壞之由是知名後赴孔融之急詣劉備求救此策所謂烈義也謂劉繇也勿憂不如意也即署門下督軍還祖郎太史慈俱在前導軍人以為榮會劉繇卒於豫章士衆萬餘人欲奉豫章太守華歆為主歆以為因時亶命非人臣所宜衆守之連月卒謝遣之卒子恤翻華戶化翻其衆未有所附策命太史慈往撫安之謂慈曰劉牧往責吾為袁氏攻廬江劉繇奉王命牧揚州故以稱之攻廬江事見上卷興平元年為于僞翻盡在公路許吾志在立事安得不屈意於公路而求之乎其後不遵臣節諫之不從事見上建安元年苟有大故不得不離吾交求公路及絶之本末如此恨不及其生時與共論辨也今兒子在豫章卿往視之並宣孤意於其部曲部曲樂來者與俱來不樂來者且安慰之樂音洛並觀華子魚所以牧御方規何如華歆字子魚多少隨意慈曰慈有不赦之罪將軍量同桓文當盡死以報德今並息兵兵不宜多將數十人足矣左右皆曰慈必北去不還策曰子義捨我當復從誰復扶又翻餞送昌門孫權記注曰吳西郭門曰閶門夫差作以天門通閶闔故名之後春申君改曰昌門腕烏貫翻何時能還答曰不過六十日慈行議者猶紛紜言遣之非計策曰諸君勿復言孤斷之詳矣斷丁亂翻太史子義雖氣勇有膽烈然非縱橫之人縱子容翻其心秉道義重然諾然是也決辭也諾應也許辭也重不輕也死亡不相負諸君勿憂也慈果如期而反謂策曰華子魚良德也然無他方規自守而已又丹陽僮芝自亶廬陵僮姓也風俗通漢有交趾刺史僮尹一曰僮即童也顓頊子老童之後或從人廬陵縣屬豫章郡言我已別立郡海昏上繚不受發召番陽縣屬豫章郡宗部即所謂江南宗賊也帥所類翻海昏縣屬豫章郡時縣民數千家自相結聚作宗伍壁於上繚水經注僚水導源建昌縣漢元帝永光二年分海昏立僚水又東徑新吳縣漢中平中立僚水又徑海昏縣謂之上僚水繚讀曰僚策拊掌大笑遂有兼並之志建安三年袁紹連年攻公孫瓚不能克以書諭之欲相與釋憾連和瓚不答而增修守備謂長史太原關靖曰當今四方虎爭無有能坐吾城下相守經年者明矣袁本初其若我何紹於是大興兵以攻瓚先是瓚別將有為敵所圍者瓚不救先悉薦翻曰救一人使後將恃救不肯力戰及紹來攻瓚南界別營自度守則不能自固度徒洛翻又知必不見救或降或潰降戶江翻紹軍徑至其門易京之門也黑山諸帥張燕等也帥所類翻自易京西抵故安閻鄉以西諸山連接中山之界山谷深廣皆黑山諸賊所依阻也傍步浪翻橫斷紹後斷丁管翻關靖諫曰今將軍將士莫不懷瓦解之心所以猶能相守者顧戀其居處老少處昌呂翻而恃將軍為主故耳堅守曠日或可使紹自退若舍之而出舍讀曰捨後無鎮重易京之危可立待也瓚乃止紹漸相攻逼瓚衆日䠞䠞子六翻王崇武標點容肇祖聶崇岐覆校
