body:
  text: 資治通鑑卷第一百一十四端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注晉紀三十六安皇帝己義熙元年乙巳四五春正月南陽太守扶風魯宗之起兵襲襄陽桓蔚走江陵蔚紆勿翻己丑劉毅等諸軍至馬頭桓振挾帝出屯江津江津戍在江陵南臨江滸荊州記曰江陵縣東三里有津鄉水經注江陵城南有馬牧城此洲始自枚回下迄于此長七十餘里洲上有奉城江津長所治奉送天子毅等不許辛卯宗之擊破振將溫楷于柞溪水經注柞溪水出江陵縣北蓋諸池散流咸所會合積以成川東流徑魯宗之壘南又東注船官湖將即亮翻柞才各翻又音作郡國志江陵縣北十餘里有紀南城引兵與宗之戰大破之劉毅等擊破馮該於豫章口水經注江水過江陵而東得豫章口夏水所通也西北有豫章岡蓋因岡而得名其地去江陵城二十里毅等入江陵執卞範之等斬之桓振還望見火起知城已陷其衆皆潰振逃于溳川水經注溳水出漢南陽郡蔡陽縣東南大洪山東南流過隨縣西又南過江夏安陸縣西又東南入于夏溳音云乙未詔大處分悉委冠軍將軍劉毅處昌呂翻分扶問翻冠古玩翻戊戌大赦改元惟桓氏不原以桓沖忠於王室特宥其孫胤以魯宗之為雍州刺史毛璩為征西將軍都督益梁秦涼寧五州諸軍事璩弟瑾為梁秦二州刺史瑗為寧州刺史雍於用翻璩求於翻瑾渠吝翻瑗于眷翻劉懷肅追斬馮該於石城桓謙桓怡桓蔚桓謐何淡之溫楷皆奔秦蔚紆勿翻淡徒覽翻怡弘之弟也桓弘死見上卷上年燕王熙伐高句麗句如字又音駒麗力知翻戊申攻遼東城且陷熙命將士毋得先登俟剗平其城朕與皇后乘輦而入剗楚限翻由是城中得嚴備不克而還後齊高緯之攻晉州亦若是矣還從宣翻又如字秦王興以鳩摩羅什為國師奉之如神親帥㣥臣及沙門聽羅什講佛經帥讀曰率下同又命羅什翻譯西域經論三百餘卷古之譯者傳四夷之言今羅什翻夷言為華言故曰譯大營塔寺沙門坐禪者常以千數禪靜也寂也傳燈録曰禪有五有凡夫禪有外道禪有小乘禪有大乘禪有最上乘禪禪時連翻由是州郡化之事佛者十室而九乞伏乾歸擊吐谷渾大孩大破之俘萬餘口而還大孩走死胡園晉書吐谷渾傳吐谷渾王烏紇堤一名大孩胡園作胡國孩何開翻莫何川在西傾山東北西傾亦名嵹臺山帥讀曰率騎奇寄翻單音蟬樹洛干輕徭薄賦信賞必罰吐谷渾復興復扶又翻沙漒諸戎皆附之段國曰澆河郡西南一百七十里有黃沙南北一百二十里東西七十里西極大楊川望之若人委糒粳於地不生草木蕩然黃沙周回數百里洮水出嵹臺山東北徑吐谷渾中自洮嵹南北三百里中地草皆是龍鬚而無樵柴謂之嵹川嵹渠良翻西涼公皓自稱大將軍大都督領秦涼二州牧皓古老翻大赦改元建初遣舍人黃始梁興間行奉表詣建康間古莧翻二月丁巳留臺備法駕迎帝於江陵劉毅劉道規留屯夏口夏戶雅翻何無忌奉帝東還初毛璩聞桓振陷江陵帥衆三萬順流東下將討之使其弟西夷校尉瑾蜀郡太守瑗出外水璩求於翻瑾渠吝翻瑗于眷翻蜀有內水外水內水涪水也外水即蜀江發源於岷山者參軍巴西譙縱侯暉出涪水蜀人不樂遠征暉至五城水口涪音浮樂音洛水經注涪水自南安郡南流其枝流西徑廣漢五城縣為五城水又西至成都入于江又曰江水東絶綿洛徑五城界至廣都北岸南入于江謂之五城水口斯為北江沈約宋志五城縣屬廣漢郡晉武帝咸寧四年立華陽國志云漢時立倉發五縣人尉部主之晉因立五城縣在五城山按五代志蜀郡玄武縣舊曰伍城玄武縣唐屬梓州與巴西陽日末謀作亂日末莫葛翻蜀人愛之暉日末共逼縱為主縱不可走投于水引出以兵逼縱登輿縱又投地叩頭固辭暉縛縱於輿還襲毛瑾於涪城殺之涪音浮推縱為梁秦二州刺史璩至略城據晉書毛璩傳略城去成都四百里奔還成都遣參軍王瓊將兵討之將即亮翻為縱弟明子所敗敗補邁翻死者什八九益州營戶李騰開城納縱兵民有流離逃叛分配軍營者為營戶滅其家縱稱成都王以從弟洪為益州刺史以明子為巴州刺史屯白帝於是蜀大亂漢中空虛氐王楊盛遣其兄子平南將軍撫據之癸亥魏主圭還自豺山罷尚書三十六曹魏三十六曹始見於一百九卷隆安元年三月桓振自鄖城襲江陵杜預曰江夏雲杜縣東南有鄖城古鄖子之國鄖音云振先逃于溳川鄖城蓋在溳川也溳音云奔襄陽振自稱荊州刺史建威將軍劉懷肅自雲杜引兵馳赴與振戰於沙橋沙橋在江陵城北臨陳斬振陳讀曰陳復取江陵復扶又翻下復詣尋復復説同甲午帝至建康乙未百官詣闕請罪詔令復職尚書殷仲文以朝廷音樂未備言於劉裕請治之治直之翻裕曰今日不暇給且性所不解解戶買翻曉也下同仲文曰好之自解裕曰正以解則好之故不習耳英雄之言政自度越常流世之嗜音者可以自省矣好呼到翻庚子以琅邪王德文為大司馬武陵王遵為太保劉裕為侍中車騎將軍都督中外諸軍事徐青二州刺史如故劉毅為左將軍何無忌為右將軍督豫州揚州五郡軍事豫州刺史劉道規為輔國將軍督淮北諸軍事並州刺史魏詠之為征虜將軍吳國內史裕固讓不受加録尚書事又不受屢請歸藩歸藩歸京口也帝親幸其第裕惶懼復詣闕陳請乃聽歸藩以魏詠之為荊州刺史代司馬休之初劉毅嘗為劉敬宣寧朔參軍劉敬宣為寧朔將軍毅為參軍敬宣曰夫非常之才自有調度調徒弔翻豈得便謂此君為人豪邪此君之性外寬而內忌自伐而尚人若一旦遭遇亦當以陵上取禍耳敬宣之論毅其知之固審矣然幾以此掇禍聖人包周身之防正為是耳及敬宣為江州辭以無功不宜授任先於毅等先悉薦翻裕不許毅使人言於裕曰劉敬宣不豫建義猛將勞臣方須敘報將即亮翻如敬宣之比宜令在後若使君不忘平生裕參劉牢之軍事牢之父子雅敬待之故云然員外散騎常侍魏末置實為過優敬宣自北來歸裕以為晉陵太守尤用駭惋惋烏貫翻敬宣愈不自安自表解職乃召還為宣城內史夏四月劉裕旋鎮京口改授都督荊司等十六州諸軍事加領兗州刺史盧循遣使貢獻使疏吏翻時朝廷新定未暇征討壬申以循為廣州刺史徐道覆為始興相循遺劉裕益智粽遺于季翻本草曰益智子生崑崙國今嶺南州郡往往有之顧微交州記曰益智葉如蘘荷莖如竹箭子從心出一枝有十子子肉白滑四破去之密煮為粽味辛粽作弄翻角黍也裕報以續命湯循以益智調裕裕以續命報之此雖淺陋亦兵機也循以前琅邪內史王誕為平南長史誕説循曰誕本非戎旅在此無用説輸芮翻王氏江南衣冠稱首故云本非戎旅素為劉鎮軍所厚若得北歸必蒙寄任公私際會仰答厚恩循甚然之劉裕與循書令遣吳隱之還循不從誕復説循曰復扶又翻將軍今留吳公公私非計孫伯符豈不欲留華子魚邪但以一境不容二君耳於是循遣隱之與誕俱還元興元年桓玄流王誕於嶺南二年盧循破廣州虜吳隱之誕並沒於循所漢獻帝建安四年華歆以豫章歸孫策策死曹操表召歆孫權遣還許華戶化翻初南燕主備德仕秦為張掖太守事見一百二卷海西公太和五年備德之從秦王堅寇淮南也寇淮南見一百五卷孝武帝太元八年備德與燕王垂舉兵於山東張掖太守苻昌收納及備德諸子皆誅之公孫氏以老獲免納妻段氏方娠未決獄掾呼延平備德之故吏也掾于絹翻竊以公孫氏及段氏逃于羌中段氏生子超十歲而公孫氏病臨卒以金刀授超曰汝得東歸當以此刀還汝叔也呼延平又以超母子奔涼及呂隆降秦超隨涼州民徙長安秦徙涼州民事見上卷元興二年段氏為超娶其女為婦超恐為秦人所録為于偽翻録采也收也為所收采則不得歸南燕矣乃陽狂行乞秦人賤之惟東平公紹見而異之言於秦王興曰慕容超姿幹王褱偉王褱公回翻殆非真狂願微加官爵以縻之興召見與語超故為謬對或問而不答興謂紹曰諺云妍皮不裹癡骨徒妄語耳乃罷遣之備德聞納有遺腹子在秦遣濟陰人吳辨往視之濟子禮翻辨因鄉人宗正謙賣卜在長安以告超宗正以官為氏潛與謙變姓名逃歸南燕行至梁父父音甫鎮南長史悅壽以告兗州刺史慕容法南燕以法為兗州刺史鎮梁父昔漢有卜者詐稱衛太子見二十三卷漢昭帝始元五年不禮之超由是與法有隙為超立法謀反張本備德聞超至大喜遣騎三百迎之騎奇寄翻下同超至廣固以金刀獻於備德備德慟哭悲不自勝勝音升封超為北海王拜侍中驃騎大將軍司隸校尉驃匹妙翻開府妙選時賢為之僚佐備德無子欲以超為嗣超入則侍奉盡歡出則傾身下士下戶嫁翻由是內外譽望翕然歸之五月桂陽太守章武王秀義陽王望子河間王洪生子威徙封章武傳至孫無嗣河間王欽以子範之繼之秀範之子也伏誅秀妻桓振之妹也故自疑而反桓玄餘黨桓亮苻宏等擁衆寇亂郡縣者以十數劉毅劉道規檀祗等分兵討滅之荊湘江豫皆平詔以毅為都督淮南等五郡軍事豫州刺史淮南廬江歷陽晉熙安豐凡五郡會工外翻北青州刺史劉該反引魏為援隆安五年劉該固嘗降魏矣沈約曰江左青州治廣陵六月魏豫州刺史索度真大將斛斯蘭斛斯亦虜姓也圍彭城劉裕遣其弟南彭城內史道憐東海太守孟龍符將兵救之將即亮翻斬該及全魏兵敗走龍符懷玉之弟也秦隴西公碩德伐仇池屢破楊盛兵將軍斂俱攻漢中斂羌之種姓俱其名徙流民三千餘家於關中秋七月楊盛請降於秦降戶江翻秦以盛為都督益寧二州諸軍事征南大將軍益州牧劉裕遣使求和於秦使疏吏翻且求南鄉等諸郡秦王興許之㣥臣咸以為不可興曰天下之善一也劉裕拔起細微能誅討桓玄興復晉室內釐庶政外修封疆吾何惜數郡不以成其美乎遂割南鄉順陽新野舞陰等十二郡歸于晉隆安二年淮漢以北多降於秦此十二郡蓋皆在漢北漢建安中割南陽右壤為南鄉郡晉立順陽郡以南鄉為縣蓋其後復分立郡也按晉南鄉郡秦漢陰縣及酇縣之地今為光化軍舞陰縣屬南陽郡未知立郡之始八月燕遼西太守邵顏有罪亡命為盜九月中常侍郭仲討斬之汝水竭汝當作女郭緣生述征記齊桓公冢在齊城南二十里冢東有女水或曰齊桓公女冢在其上故以名水女水導川東北流甚有神焉化隆則水生政薄則津竭地理志葂頭山女水所出東北至臨災入巨淀巨淀即漢巨定地晉書地理志女水出齊國東安平縣東北惡烏路翻俄而寢疾北海王超請禱之備德曰人主之命短長在天非汝水所能制也固請不許戊午備德引見㣥臣于東陽殿見賢遍翻議立超為太子俄而地震百官驚恐備德亦不自安還宮是夜疾篤瞑不能言段后大呼曰今召中書作詔立超可乎呼火故翻備德開目頷之乃立超為皇太子大赦備德尋卒年七十夜分出四門潛瘞山谷瘞一計翻己未超即皇帝位超字祖明德兄北海王納之子改元太上尊段后為皇太后以北地王鍾都督中外諸軍録尚書事慕容法為征南大將軍都督徐兗揚南兗四州諸軍事加慕容鎮開府儀同三司以尚書令封孚為太尉麴麴當作鞠封嵩為尚書左僕射癸亥虛葬備德於東陽陵諡曰獻武皇帝廟號世宗超引所親公孫五樓為腹心備德故大臣北地王鍾段宏等皆不自安求補外職超以鍾為青州牧宏為徐州刺史公孫五樓為武衛將軍領屯騎校尉內參政事封孚諫曰臣聞親不處外羇不處內左傳申無宇諫楚靈王曰親不在外羇不在內處昌呂翻國之宗臣社稷所賴宏外戚懿望百姓具瞻正應參翼百揆不宜遠鎮外方今鍾等出藩五樓內輔臣竊未安超不從鍾宏心皆不平相謂曰黃犬之皮恐終補狐裘也史記騶忌相齊淳于髡謂之曰狐裘雖弊不可補以黃狗之皮騶忌曰謹受令請謹擇君子毋雜小人其間魏詠之卒江陵令羅修謀舉兵襲江陵奉王慧龍為主劉裕以並州刺史劉道規為都督荊寧等六州諸軍事荊州刺史修不果發奉慧龍奔秦慧龍得免見上卷元興三年乞伏乾歸伐仇池為楊盛所敗敗補邁翻西涼公皓與長史張邈謀徙都酒泉以逼沮渠蒙遜沮子余翻以張體順為建康太守鎮樂涫漢志樂涫縣屬酒泉郡張氏分為建康郡涫音官與其子敦煌太守讓鎮敦煌遂遷于酒泉李皓遷酒泉欲以逼沮渠蒙遜安知反為蒙遜所逼邪敦徒門翻皓手令戒諸子以為從政者當審慎賞罰勿任愛憎近忠正遠佞諛近其靳翻遠于願翻勿使左右竊弄威福毀譽之來當研核真偽聽訟折獄必和顏任理慎勿逆詐億必朱子曰逆未至而迎之也詐謂人欺己也億未見而意之也必期必也譽音余務廣咨詢勿自專用吾蒞事五年雖未能息民然含垢匿瑕朝為寇讎夕委心膂粗無負於新舊粗坐五翻事任公平坦然無纇纇盧對翻絲節也疵也初不容懷有所損益計近則如不足經遠乃為有餘庶亦無愧前人也十二月燕王熙襲契丹契丹本東胡種其先為胸奴所破保鮮卑山魏青龍中部酋軻比能桀驁為幽州刺史王雄所殺部衆遂微逃潢水之南黃龍之北後自號曰契丹種類繁盛契欺詰翻程大昌曰契丹之契讀如喫二年丙午四六春正月甲申魏主圭如豺山宮諸州置三刺史郡置三太守縣置三令長刺史令長各之州縣長知兩翻之往也太守雖置而未臨民功臣為州者皆徵還京師以爵歸第益州刺史司馬榮期擊譙明子于白帝破之燕王熙至陘北陘北冷陘山之北也陘音刑欲還苻后不聽戊申遂棄輜重重直用翻輕兵襲高句麗南燕主超猜虐日甚政出權幸盤于遊畋盤樂也言樂于田獵遊逸丁度曰竹角翻朕可方前世何主對曰桀紂超慙怒孚徐步而出不為改容為于偽翻鞠仲謂孚曰與天子言何得如是宜還謝孚曰行年七十惟求死所耳竟不謝超以其時望優容之桓玄之亂河間王曇之子國璠叔璠奔南燕河間王顒死無後元帝以彭城王植子融為顒嗣薨又無子帝復尋以彭城王釋子欽為融嗣欽薨曇之嗣曇之薨國鎮嗣國璠蓋國鎮兄弟劉裕興復篡意未彰國璠宜如劉敬宣輩南歸可也乃攻擾晉邊者欽孫秀嗣封章武國璠從兄弟也秀以桓振妹壻謀反誅故國璠兄弟不敢南歸耳豈知裕之必篡哉曇徒含翻璠孚袁翻甲戌國璠等攻陷弋陽燕軍行三千餘里士馬疲凍死者屬路屬之欲翻攻高句麗木底城不克而還木底城在南蘇之東唐置木底州句如字又音駒麗力知翻且畏燕王熙之虐遂以疾去官為後燕人弒熙立雲張本三月庚子魏主圭還平城夏四月庚申復如豺山宮復扶又翻甲午嚴午改子還平城柔然社崙侵魏邊崙盧昆翻五月燕主寶之子博陵公虔上黨公昭皆以嫌疑賜死六月秦隴西公碩德自上邽入朝秦王興為之大赦為于偽翻及歸送之至雍乃還雍於用翻興事晉公緒及碩德皆如家人禮車馬服玩先奉二叔而自服其次國家大政皆咨而後行禿髮傉檀伐沮渠蒙遜傉奴沃翻沮子余翻蒙遜嬰城固守傉檀至赤泉而還赤泉在張掖氐池縣北秦王興以為忠以傉檀為都督河右諸軍事車騎大將軍涼州刺史鎮姑臧徵王尚還長安涼州人申屠英等遣主簿胡威詣長安請留尚興弗許威見興流涕言曰臣州奉戴王化於茲五年隆安五年九月呂隆降秦至是猶未五期威靈不接士民嘗膽抆血共守孤城抆武粉翻又文運翻拭也仰恃陛下聖德俯杖良牧仁政克自保全以至今日陛下奈何乃以臣等貿馬三千匹羊三萬口貿音茂易也市賣也賤人貴畜畜許又翻無乃不可若軍國須馬直煩尚書一符臣州三千餘戶各輸一馬朝下夕辦何難之有昔漢武傾天下之資力開拓河西以斷胸奴右臂今陛下無故棄五郡之地忠良華族以資暴虜斷丁管翻此五郡謂漢所開武威張掖敦煌酒泉金城豈惟臣州士民墜於塗炭恐方為聖朝旰食之憂旰古案翻興悔之使西平人車普馳止王尚又遣使諭傉檀會傉檀已帥步騎三萬軍于五澗五澗在姑臧南車尺遮翻使疏吏翻帥讀曰率傉檀遽逼遣王尚尚出自清陽門傉檀入自涼風門清陽當作青陽涼風門姑臧城南門也別駕宗敞送尚還長安宗姓也漢有南陽宗資吾得涼州三千餘家情之所寄唯卿一人奈何捨我去乎敞曰今送舊君所以忠於殿下也傉檀曰吾新牧貴州懷遠安邇之略如何敞曰涼土雖弊形勝之地殿下惠撫其民收其賢俊以建功名其何求不獲因薦本州文武名士十餘人傉檀嘉納之王尚至長安興以為尚書傉檀燕㣥臣於宣德堂仰視歎曰古人有言作者不居居者不作信矣武威孟禕曰昔張文王始為此堂於今百年十有二主矣張駿卒私諡曰文王張氏自駿至重華曜靈祚玄靚天錫凡六主梁熙呂光呂紹呂纂呂隆王尚又六主通十二主禕許韋翻處昌呂翻傉檀善之魏主圭規度平城度徒洛翻欲擬鄴洛長安修廣宮室以濟陽太守莫題有巧思惠帝分陳留為濟陽國後因以為郡濟子禮翻思相吏翻與之商功題久侍稍怠圭怒賜死題含之孫也此莫題非高邑公莫題莫含見八十九卷愍帝建興三年魏先有八部大人既得中原建平城為代都分布八部於畿內灅力水翻高居傲翻穿溝池廣苑囿規立外城方二十里分置市里三十日罷秋七月魏太尉宜都丁公穆崇薨周公諡法述義不克曰丁八月禿髮傉檀以興城侯文支鎮姑臧自還樂都樂音洛雖受秦爵命然其車服禮儀皆如王者甲辰魏主圭如豺山宮遂之石漠自陰山以北皆大漠有白漠黑漠石漠白黑二漠以其色為名石漠蓋其地皆石據北史石漠在漢定襄郡武要縣西北塞外度漠北癸巳南還長川水經注長川城在柔玄鎮西劉裕聞譙縱反遣龍驤將軍毛修之將兵與司馬榮期文處茂時延祖共討之處昌呂翻修之至宕渠宕渠縣漢屬巴郡劉蜀分屬巴西郡惠帝復分巴西置宕渠郡按五代志果州南充縣舊置宕渠郡合州石鏡縣亦置宕渠郡皆當自白帝上成都之路宕徒浪翻承祖自稱巴州刺史修之退還白帝禿髮傉檀求好於西涼好呼到翻西涼公皓許之沮渠蒙遜襲酒泉至安珍安珍即漢酒泉郡安彌縣也後人從省書之以彌為彌傳寫之訛又以彌為珍蒙遜引還南燕公孫五樓欲亶朝權朝直遙翻譖北地王鍾於南燕主超請誅之南燕主備德之卒也卒子恤翻慕容法不奔喪超遣使讓之使疏吏翻法懼遂與鍾及段宏謀反超聞之徵鍾鍾稱疾不至超收其黨侍中慕容統等殺之征南司馬卜珍告左僕射封嵩數與法往來疑有姦超收嵩下廷尉太后懼泣告超曰嵩數遣黃門令牟常説吾云帝非太后所生恐依永康故事數所角翻説輸芮翻下遐稼翻燕主寶永康元年逼殺其母段氏事見一百八卷孝武帝太元二十一年我婦人識淺恐帝見殺即以語法法為謀見誤知復何言語牛倨翻復扶又翻超乃車裂嵩西中郎將封融奔魏超遣慕容鎮攻青州慕容昱攻徐州右僕射濟陽王凝及韓範攻兗州南燕青州刺史鎮東萊徐州刺史鎮莒城兗州刺史鎮梁父濟子禮翻段宏奔魏封融與㣥盜襲石塞城殺鎮西大將軍餘鬱國中振恐濟陽王凝謀殺韓範襲廣固範知之勒兵攻凝凝奔梁父範並將其衆攻梁父克之父音甫法出奔魏凝出奔秦慕容鎮克青州鍾殺其妻子為地道以出與高都公始皆奔秦秦以鍾為始平太守凝為侍中南燕主超好變更舊制朝野多不悅又欲復肉刑增置烹轘之法好呼到翻更工衡翻轘戶慣翻車裂也衆議不合而止冬十月封孚卒慕容超之立雖非少主乃國疑而大臣未附之時超不能推心和輯使之阻兵以至於奔亡超誰與立哉雖劉裕之兵未至固知其必滅矣尚書論建義功奏封劉裕豫章郡公劉毅南平郡公何無忌安成章甲十一行本成作城乙十一行本同孔本同郡公自餘封賞有差梁州刺史劉稚反劉毅遣將討禽之將即亮翻庚申魏主圭還平城乙亥以左將軍孔安國為尚書左僕射十一月禿髮傉檀遷于姑臧乞伏乾歸入朝于秦朝直遙翻十二月以何無忌為都督荊江豫三州八郡軍事江州刺史八郡蓋荊州之武昌江州之尋陽豫章廬陵臨川鄱陽南康豫州之晉熙是歲桓石綏與司馬國璠陳襲聚衆胡桃山為寇胡桃山當在歷陽郡界璠孚袁翻石綏石生之弟也三年丁未四七春正月辛丑朔燕大赦改元建始秦王興以乞伏乾歸寖強難制留為主客尚書漢成帝置四曹尚書其四曰主客主外國夷狄事監其部衆是後秦政漸衰熾磐日以盛而乾歸亦不可得而留矣熾昌志翻校戶教翻監工銜翻二月己酉劉裕詣建康固辭新所除官欲詣廷尉詔從其所守裕乃還丹徒魏主圭立其子修為河間王處文為長樂王處昌呂翻樂音洛連為廣平王黎為京兆王殷仲文素有才望自謂宜當朝政悒悒不得志悒悒憂悒不自安之意仲文黨於桓玄以才望希進而不得進故不自安也朝直遙翻尤不樂樂音洛何無忌素慕其名東陽無忌所統無忌都督浙江東五郡東陽其一也無忌喜欽遲之遲直吏翻待也後企遲同而仲文失志恍惚遂不過府府謂督府何無忌治所也恍呼廣翻惚音忽大怒會南燕入寇無忌言於劉裕曰桓胤殷仲文乃腹心之疾北虜不足憂也閏月劉裕府將駱冰謀作亂將即亮翻事覺裕斬之因言冰與仲文桓石松曹靖之卞承之劉延祖潛相連結謀立桓胤為主皆族誅之燕王熙為其后苻氏起承華殿為于偽翻負土於北門土與穀同價宿軍典軍杜靜載棺詣闕極諫熙斬之北燕營州刺史鎮宿軍苻氏嘗季夏思凍魚煎魚為凍今人多能之季夏六月暑盛則不能凍本草曰地黃葉如甘露子花如脂麻花但有細斑點北人謂之牛嬭子二月八月採根陰乾解諸熱破血通利月水下遐稼翻夏四月癸丑苻氏卒熙哭之悶絶久而復蘇悶音悶喪之如父母服斬衰食粥喪息郎翻衰倉回翻命百官於宮內設位而哭使人按檢哭者無淚則罪之㣥臣皆含辛以為淚高陽王張氏熙之嫂也高陽王隆之也思相吏翻熙欲以為殉乃毀其襚鞾中得弊氈襚音遂送終曰襚鞾許加翻遂賜死右僕射韋璆等皆恐為殉沐浴俟命公卿以下至兵民戶率營陵費殫府藏璆渠尤翻藏徂浪翻陵周圍數里熙謂監作者曰善為之朕將繼往觀熙此言死期將至監工銜翻丁酉燕太后段氏去尊號出居外宮去羌呂翻段氏熙之慈母也見上卷元興二年氐王楊盛以平北將軍苻宣為梁州督護將兵入漢中將即亮翻秦梁州別駕呂瑩等起兵應之呂瑩蓋為秦之梁州別駕以後面秦王興遣南梁州刺史王敏敕譙縱觀之可見瑩等求援於盛盛遣軍臨濜口敏退屯武興水經沔水東徑白馬戍南濜水入焉注云濜水北發武都氐中南徑張魯城東又南過陽平關西而南入于沔謂之濜口有濜口城郡國縣道記梁州西縣本名白馬城又曰濜口城劉蜀置武興督於漢中沔陽縣隋唐為興州今沔州城古武興城也濜徐刃翻孝武太元十九年楊盛來稱藩其所以不與晉通者以桓玄之亂也復扶又翻盛因以宣行梁州刺史通鑑以晉紀年則以盛為都督之上不必書晉晉字當作詔字五月丙章甲十一行本丙作壬乙十一行本同孔本同熊校同戌燕尚書郎苻進謀反誅進定之子也孝武太元十一年苻定降燕見一百六卷魏主圭北巡至濡源濡乃官翻魏常山王遵以罪賜死初魏主圭滅劉衛辰其子勃勃奔秦見一百卷孝武太元十六年妻七細翻勃勃魁岸美容儀性辨慧秦王興見而奇之與論軍國大事寵遇踰於勳舊興弟雍諫曰勃勃不可近也近其靳翻興曰勃勃有濟世之才吾方與之平天下奈何逆忌之乃以為安遠將軍使助沒奕干鎮高平以三城朔方雜夷魏收地形志偏城郡廣武縣有三城唐延州豐林縣古廣武縣地使伺魏間隙間古莧翻雍固爭以為不可興曰卿何以知其為人雍曰勃勃奉上慢御衆殘貪猾不仁輕為去就寵之踰分分扶問翻恐終為邊患興乃止久之竟以勃勃為安北將軍五原公配以三交五部鮮卑及雜虜二萬餘落鎮朔方為勃勃病秦興悔不用雍言張本魏主圭歸所虜秦將唐小方于秦將即亮翻秦王興請歸賀狄干仍送良馬千匹以贖狄伯支圭許之秦留賀狄干見一百十二卷元興元年狄伯支唐小方被禽亦見是年勃勃聞秦復與魏通而怒復扶又翻乃謀叛秦楚白公勝所以作亂於楚者其事正如此至大城大城縣前漢屬西河郡後漢屬朔方郡魏晉省崙盧昆翻悉集其衆三萬餘人偽畋於高平川因襲殺沒奕干而並其衆勃勃自謂夏后氏之苗裔史記及漢書皆云胸奴夏后氏苗裔淳維之後勃勃胸奴餘種故云然夏戶雅翻下同自稱大夏天王大單于晉書曰勃勃字屈孑胸奴右賢王去卑之後劉元海之族劉武之曾孫劉衛辰之子劉武即劉虎晉書避唐國諱改虎為武單音蟬改元龍升置百官以其兄右地代為丞相封代公力俟提為大將軍封魏公叱于阿利為御史大夫封梁公弟阿利羅引為司隸校尉若門為尚書令叱以鞬為左僕射鞬居言翻乙斗為右僕射賀狄干久在長安常幽閉因習讀經史舉止如儒者及還魏主圭見其言語衣服皆類秦人以為慕而效之怒並其弟歸殺之秦王興以太子泓録尚書事秋七月戊戌朔日有食之汝南王遵之坐事死遵之亮之五世孫也汝南王亮死於楚王瑋之難癸亥燕王熙葬其后苻氏于徽平陵喪車高大毀北門而出熙被髮徒跣步從二十餘里被皮義翻從才用翻甲子大赦初中衛將軍馮跋及弟侍御郎素弗皆得罪於熙熙欲殺之跋亡章甲十一行本亡上有兄弟二字乙十一行本同孔本同張校同命山澤熙賦役繁數民不堪命數所角翻跋素弗與其從弟萬張萬作万泥謀曰吾輩還首無路還首自歸請罪也首式救翻共舉大事可以建公侯之業事之不捷死未晚也遂相與乘車使婦人御潛入龍城匿於北部司馬孫護之家及熙出送葬跋等與左衛將軍張興及苻進餘黨作亂跋素與慕容雲善乃推雲為主雲以疾辭雲稱疾見上年河間淫虐人神共怒此天亡之時也公高氏名家何能為人養子為養子事見一百九卷隆安元年扶之而出跋弟乳陳等帥衆攻弘光門帥讀曰率鼓噪而進禁衛皆散走遂入宮授甲閉門拒守中黃門趙洛生走告于熙熙曰鼠盜何能為朕當還誅之乃置后柩於南苑柩巨救翻收髮貫甲馳還赴難難乃旦翻夜至龍城攻北門不克宿於門外乙丑雲即天王位雲字子雨祖父高和句麗之支庶慕容寶養以為子改元正始熙退入龍騰苑尚方兵褚頭踰城從熙稱營兵同心效順唯俟軍至熙聞之驚走而出左右莫敢迫熙從溝下潛遁良久左右怪其不還相與尋之唯得衣冠不知所適中領軍慕容拔謂中常侍郭仲曰大事垂捷而帝無故自驚深可怪也然城內企遲遲直利翻待也至必成功不可稽留吾當先往趣城趣七喻翻卿留待帝得帝速來若帝未還吾得如意安撫城中徐迎未晚乃分將壯士二千餘人登北城將士謂熙至皆投仗請降將即亮翻降戶江翻既而熙久不至拔兵無後繼衆心疑懼復下城赴苑復扶又翻下復二可復同遂皆潰去拔為城中人所殺丙寅熙微服匿於林中為人所執送於雲雲數而殺之年二十三史言慕容熙淫虐天奪其魄身死國滅載記曰自垂至熙四世凡二十四年而滅數所具翻雲復姓高氏幽州刺史上庸公懿以令支降魏令音鈴又郎定翻支音祁魏以懿為平州牧昌黎王懿評之孫也前燕之亡慕容評之罪也魏主圭自濡源西如參合陂濡乃官翻乃還平城禿髮傉檀復二於秦傉奴沃翻復扶又翻下同遣使邀乞伏熾磐熾磐斬其使送長安為秦襲傉檀張本使疏吏翻下同熾昌志翻南燕主超母妻猶在秦超遣御史中丞封愷使於秦以請之秦王興曰昔苻氏之敗太樂諸伎悉入于燕長安之陷太樂諸伎入于西燕西燕之亡慕容垂收以歸于中山中山之陷相率奔鄴由是南燕得之伎渠綺翻送伎或送吳口千人所請乃可得也超與㣥臣議之左僕射段暉曰陛下嗣守社稷不宜以私親之故遂降尊號且太樂先代遺音不可與也不如掠吳口與之尚書張華曰侵掠鄰國兵連禍結此既能往彼亦能來非國家之福也陛下慈親在人掌握豈可靳惜虛名不為之降屈乎靳居焮翻為于偽翻中書令韓範嘗與秦王俱為苻氏太子舍人若使之往必得如志超從之乃使韓範聘于秦稱藩奉表慕容凝言於興曰燕王得其母妻不可復臣宜先使送伎興乃謂範曰朕歸燕王家屬必矣然今天時尚熱當俟秋涼八月秦使員外散騎常侍韋宗聘於燕超與㣥臣議見宗之禮張華曰陛下前既奉表今宜北面受詔封逞曰大燕七聖重光自廆皓雋暐至垂德超凡七主重直龍翻超曰吾為太后屈願諸君勿復言為于偽翻復扶又翻遂北面受詔毛修之與漢嘉太守馮遷合兵擊楊承祖斬之修之欲進討譙縱益州刺史鮑陋不可修之上表言人之所以重生實有生理可保臣之情地生塗已竭謂其父瑾伯璩舉家為蜀人所滅修之欲致死復讎不復求生路也朝露易晞言不久生也今屢有可乘之機而陋每違期不赴臣雖效死寇庭而救援理絶將何以濟劉裕乃表襄城太守劉敬宣帥衆五千伐蜀晉氏南渡置襄城郡於江南仍領繁昌等縣孝武罷襄城郡為繁昌縣屬淮南僑郡今太平州繁昌縣即其地繁昌本漢潁川郡屬縣因僑立而是縣之名遂移於江南此襄城蓋敬宣以舊郡僑領太守也帥讀曰率魏主圭如豺山宮候官告司空庾嶽服飾鮮麗行止風采擬則人君候官見上卷元興三年殺之北燕王雲以馮跋為都督中外諸軍事開府儀同三司録尚書事馮萬泥為尚書令馮素弗為昌黎尹馮弘為征東大將孫護為尚書左僕射張興為輔國大將軍弘跋之弟也九月譙縱稱藩於秦禿髮傉檀將五萬餘人伐沮渠蒙遜傉奴沃翻將即亮翻沮子余翻蒙遜與戰於均石大破之均石在張掖之東西陝之西蓋西郡界降之日勒縣漢屬張掖郡後分置西郡治日勒賢曰日勒故城在今甘州刪丹縣東南冬十月秦河州刺史彭奚念叛降於禿髮傉檀秦以乞伏熾盤行河州刺史熾昌志翻南燕主超使左僕射張華給事中宗正元獻太樂伎一百二十人於秦秦王興乃還超母妻厚其資禮而遣之超親帥六宮迎於馬耳關伎渠綺翻帥讀曰率據水經濟南臺縣有馬耳山關盧水出焉魏收地形志泰山郡臺縣有馬耳山夏王勃勃破鮮卑薛千等三部薛千晉書載記作薛千蜀本作薛干降戶江翻進攻秦三城已北諸戍斬秦將楊丕姚石生等諸將皆曰陛下欲經營關中宜先固根本使人心有所憑係高平山川險固土田饒沃可以定都勃勃曰卿知其一未知其二吾大業草創士衆未多姚興亦一時之雄諸將用命關中未可圖也我今專固一城彼必並力於我衆非其敵亡可立待不如以驍騎風馳將即亮翻驍堅堯翻騎奇寄翻出其不意救前則擊後救後則擊前使彼疲於奔命我則遊食自若不及十年嶺北河東盡為我有待興既死嗣子暗弱徐取長安在吾計中矣於是侵掠嶺北嶺北諸城門不晝啓興乃歎曰吾不用黃兒之言以至於此黃兒興弟雍小字也勃勃求婚於禿髮傉檀傉檀不許十一月勃勃帥騎二萬擊傉檀至于支陽枝陽縣漢屬金城郡晉張實分屬廣武郡劉昫曰唐蘭州廣武縣漢枝陽縣杜佑曰唐會州會寧縣漢枝陽縣驅掠二萬七千餘口牛馬羊數十萬而還還從宣翻又如字傉檀帥衆追之帥讀曰率焦朗曰勃勃天姿雄健御軍嚴整未可輕也不如從溫圍北渡趣萬斛堆溫圍水名水經河水北過武威媼圍縣東北溫圍其即漢之媼圍縣歟趣七喻翻扼其咽喉咽音煙百戰百勝之術也傉檀將賀連怒曰勃勃敗亡之餘烏合之衆奈何避之示之以弱宜急追之傉檀從之勃勃於陽武下峽鑿凌埋車以塞路凌力證翻冰也又閭承翻鑿冰塞路置兵死地使人自為戰塞悉則翻勒兵逆擊傉檀大破之追奔八十餘里殺傷萬計名臣勇將死者什六七將即亮翻傉檀與數騎奔南山漢書地理志武威郡蒼松縣有南山松陝余謂此南山自羌中連延西平金城之界東出秦雍至于終南皆此山也傉檀所奔枝陽之南山也幾居希翻騎奇寄翻勃勃積尸而封之號曰髑髏臺髑徒谷翻髏音婁勃勃又敗秦將張佛生於青石原敗補邁翻後漢書西羌傳安定有青石岸安定唐之涇州涇州有青石嶺俘斬五千餘人傉檀懼外寇之逼徙三百里內民皆入姑臧國人駭怨屠各成七兒因之作亂屠直於翻一夕聚衆至數千人殿中都尉張猛大言於衆曰主上陽武之敗蓋恃衆故也責躬悔過何損於明而諸君遽從此小人為不義之事殿中兵今至禍在目前矣衆聞之皆散七兒奔晏然追斬之軍咨祭酒梁裒輔國司馬邊憲等謀反傉檀皆殺之自是之後禿髮氏之勢日以衰矣魏主圭還平城十二月戊子武岡文恭侯王謐薨諡法既過能改曰恭是歲西涼公皓以前表未報前奉表見上元年皓古老翻復扶又翻間古莧翻四年戊申四八春正月甲辰以琅邪王德文領司徒劉毅等不欲劉裕入輔政議以中領軍謝混為揚州刺史王謐薨揚州刺史缺官故議用其人以內事付孟昶昶丑兩翻遣尚書右丞皮沈以二議咨裕皮姓也沈持林翻具道朝議朝直遙翻穆之偽起如廁密疏白裕曰皮沈之言不可從裕既見沈且令出外呼穆之問之穆之曰晉朝失政日久朝直遙翻下同天命已移公興復皇祚勳高位重今日形勢豈得居謙遂為守藩之將耶將即亮翻劉孟諸公與公俱起布衣共立大義以取富貴事有先後故一時相推非為委體心服宿定臣主之分也分扶問翻力敵勢均終相吞噬後果如穆之之言不可假人前者以授王謐事出權道見上卷元興三年復扶又翻下而復同便應受制於人一失權柄無由可得將來之危難可熟念今朝議如此宜相酬答必云在我措辭又難唯應云神州治本宰輔崇要治直吏翻此事既大非可懸論便暫入朝共盡同異公至京邑彼必不敢越公更授餘人明矣裕從之朝廷乃徵裕為侍中車騎將軍開府儀同三司揚州刺史録尚書事徐兗二州刺史如故騎奇寄翻裕表解兗州以諸葛長民為青州刺史鎮丹徒劉道憐為並州刺史戍石頭庚申武陵忠敬王遵薨魏主圭如豺山宮遂至寧川寧川即後漢上谷郡之寧縣也前漢曰寧縣地理志曰于延水出代郡且如縣塞外東至寧入沽水經注曰于延水徑罡城南又東左與寧川水合水出小寧縣西北東南流注于延水又東徑小寧縣故城南地理志寧縣也師古曰且子如翻南燕主超尊其母段氏為皇太后妻呼延氏為皇后超祀南郊有獸如鼠而赤大如馬來至壇側須臾大風晝晦羽儀帷幄皆毀裂賈公彥曰在旁曰帷四合象宮室曰幄以問太史令成公綏對曰陛下信用姦佞誅戮賢良賦斂繁多事役殷重之所致也斂力贍翻超乃大赦黜公孫五樓等俄而復用之復扶又翻北燕王雲立妻李氏為皇后子彭城為太子三月庚申葬燕王熙及苻后于徽平陵諡熙曰昭文皇帝高句麗遣使聘北燕且敘宗族雲本高句麗支屬詳見一百九卷隆安元年使疏吏翻夏四月尚書左僕射孔安國卒甲午以吏部尚書孟昶代之昶丑兩翻北燕大赦五月北燕以尚書令馮萬泥為幽冀二州牧鎮肥如中軍將軍馮乳陳為並州牧鎮白狼前漢右北平郡有白狼縣師古曰有白狼山故以名縣後漢晉省縣魏收地形志曰世祖太平真君八年置建德郡治白狼城其地屬唐營州柳城縣界司隸校尉務銀提為尚書令譙縱遣使稱藩於秦使疏吏翻又與盧循潛通縱上表請桓謙於秦欲與之共擊劉裕秦王興以問謙謙曰臣之纍世著恩荊楚若得因巴蜀之資順流東下士民必翕然響應興曰小水不容巨魚若縱之才力自足辦事亦不假君以為鱗翼宜自求多福遂遣之謙至成都虛懷引士縱疑之置於龍格使人守之龍格蓋即今成都府廣都縣龍爪灘之地姚主之言神矣秦主興以禿髮傉檀外內多難時傉檀軍咨祭酒梁裒輔國司馬邊憲等謀反傉檀悉誅之晉書載記曰傉檀外有陽武之敗內有邊梁之亂難乃旦翻使尚書郎韋宗往覘之覘丑簾翻又丑豔翻傉檀與宗論當世大略縱橫無窮縱子容翻宗退歎曰奇才英器不必華夏夏戶雅翻明智敏識不必讀書吾乃今知九州之外五經之表復自有人也傉檀之才辨內足以欺其父兄外足以欺敵人之覘國者而卒以敗亡者輕用兵也揆之於古蓋智伯瑤之流而才識又不及焉復扶又翻言於興曰涼州雖弊傉檀權譎過人未可圖也譎古穴翻興曰劉勃勃以烏合之衆猶能破之況我舉天下之兵以加之乎宗曰不然形移勢變返覆萬端蜀本作返復當從之易以豉翻戒懼者難攻傉檀之所以敗於勃勃者輕之也今我以大軍臨之彼必懼而求全臣竊觀㣥臣才略無傉檀之比者雖以天威臨之亦未敢保其必勝也興不聽使其子中軍將軍廣平公弼後軍將軍斂成鎮遠將軍乞伏乾歸帥步騎三萬襲傉檀左僕射齊難帥騎二萬討勃勃帥讀曰率下同吏部尚書尹昭諫曰傉檀恃其險遠故敢違慢不若詔沮渠蒙遜及李皓討之使自相困斃不必煩中國之兵也亦不聽興遺傉檀書曰遺于季翻今遣齊難討勃勃恐其西逸故令弼等於河西邀之傉檀以為然遂不設備弼濟自金城自金城濟河也今王師聲言討勃勃傉檀猶豫守備未嚴願給輕騎五千騎奇寄翻掩其城門則山澤之民皆為吾有孤城無援可坐克也弼不從進至漠口漠口在昌松郡界謂之昌松漠口魏收地形志昌松郡有漠口縣弼遣人諭之使降霸曰汝棄信誓而伐與國吾有死而已何降之有降戶江翻弼進攻斬之長驅至姑臧傉檀嬰城固守出奇兵擊弼破之弼退據西苑城中人王鍾等謀為內應事泄傉檀欲誅首謀者而赦其餘前軍將軍伊力延侯曰今強寇在外而姦人竊發於內危孰甚焉不悉坑之何以懲後傉檀從之殺五千餘人命郡縣悉散牛羊於野斂成縱兵鈔掠鈔楚交翻傉檀遣鎮北大將軍俱延鎮軍將軍敬歸等擊之秦兵大敗斬首七千餘級傉檀散牛羊以餌敵而斂成掠之宜其敗也傉檀攻之未克秋七月興遣衛大將軍常山公顯帥騎二萬為諸軍後繼至高平聞弼敗倍道赴之顯遣善射者孟欽等五人挑戰於涼風門挑徒了翻弦未及發傉檀材官將軍宋益等迎擊斬之顯乃委罪斂成遣使謝傉檀慰撫河外引兵還傉檀遣使者徐宿詣秦謝罪使疏吏翻夏王勃勃聞秦兵且至退保河曲河曲在朔方東北黃河千里一曲縱兵野掠勃勃潛師襲之俘斬七千餘人難引兵退走勃勃追至木城禽之虜其將士萬三千人於是嶺北夷夏附於勃勃者以萬數夏戶雅翻勃勃皆置守宰以撫之姚弼之敗禿髮未能為秦患也齊難之敗則赫連之患熾矣司馬叔璠自蕃城寇鄒山璠孚袁翻蕃音皮又音反讀曰翻魯郡太守徐雍棄城走車騎長史劉鍾擊卻之北燕王雲封慕容歸為遼東公使主燕祀劉敬宣既入峽所謂三峽也自帥益州刺史鮑陋輔國將軍文處茂龍驤將軍時延祖由墊江轉戰而前帥讀曰率處昌呂翻驤思將翻此由內水而進也墊音疊譙縱求救於秦秦王興遣平西將軍姚賞南梁州刺史王敏將兵二萬赴之敬宣軍至黃虎去成都五百里黃虎近涪城相持六十餘日敬宣不得進食盡軍中疾疫死者太半乃引軍還還從宣翻又如字敬宣坐免官削封三分之一荊州刺史劉道規以督統降號建威將軍春秋責帥之義也道規時為征蜀都督劉裕以敬宣失利請遜位詔降為中軍將軍開府如故劉毅欲以重法繩敬宣裕保護之何無忌謂毅曰奈何以私憾傷至公私憾見上元年乞伏熾磐以秦政浸衰且畏秦之攻襲熾昌志翻冬十月招結諸部二萬餘人築城于嵻㟍山而據之丁度曰嵻㟍山在西羌豫據乞伏氏據苑川其地西至枹罕東極隴坻北限赫連南界吐谷渾嵻㟍山當在苑川西南宋朝西境盡秦渭嵻㟍山始在西羌中嵻丘岡翻㟍盧當翻十一月禿髮傉檀復稱涼王大赦改元嘉平置百官立夫人折掘氏為王后世子武臺為太子録尚書事武臺本名虎臺唐人作晉書避唐祖諱改虎為武通鑑因之鼂古朝字音直遙翻昌松侯俱延為太尉南燕汝水竭汝當作女而澠水不冰水經注澠水出營城東西北流入時水營城即臨淄城時水通有澠水之名亦謂之時澠水時水東北入淄水淄水又東北合濁水濁水東北流徑廣固城西濁水亦或通名之為澠水昔趙攻廣固望氣者以為澠水帶城非可攻拔若塞五龍口城必當陷指是水也澠神陵翻問於李宣對曰澠水無冰良由逼帶京城近日月也惡烏路翻近其靳翻超大悅賜朝服一具朝直遙翻十二月乞伏熾磐攻彭奚念於枹罕為奚念所敗而還枹音膚敗補邁翻還從宣翻又如字是歲魏主圭殺高邑公莫題初拓跋窟咄之伐圭也見一百六卷孝武太元十一年少詩照翻潛以箭遺窟咄曰三歲犢豈能勝重載邪遺于季翻勝音升載才再翻圭心銜之至是或告題居處倨傲擬則人主者圭使人以箭示題而謂之曰三歲犢果如何題父子對泣詰朝收斬之處昌呂翻詰去吉翻聶崇岐標點王崇武覆校
