body:
  text: 資治通鑑卷第二百六十六端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千六百戶食實封一千戶賜紫金魚袋臣司馬光奉敕編集後學天台音註後梁紀一開平元年朱氏本碭山人碭山戰國時屬梁地太祖以宣武節度使創業宣武軍治汴州古大梁也寖益強盛進封梁王國遂號曰梁通鑑以前紀已有蕭梁故此稱曰後梁太祖神武元聖孝皇帝上姓朱氏名溫宋州碭山午溝里人背黃巢歸唐賜名全忠即位改名晃開平元年丁卯九七是年四月即位始改元開平元年春正月辛巳梁王休兵于貝州自滄州還休兵貝州且因魏博糧餉也開平元年淮南節度使兼侍中東面諸道行營都統弘農郡王楊渥既得江西謂幷鍾匡時也事見上卷天祐三年謂節度判官周隱曰君賣人國家何面復相見遂殺之以隱言其不克負荷欲屬國於劉威也事見上卷天祐二年復扶又翻既逐王茂章又殺周隱宜餘人之不自安也黑雲都指揮使呂師周與副指揮使綦章將兵屯上高上高在洪州高安縣界宋置上高縣屬筠州在州西南九十五里宋白曰上高縣本高安縣之上鎮以地形高上故曰上高南唐昇元中立上高場保大十年升為縣屢有功渥忌之師周懼謀於綦章曰馬公寬厚謂馬殷也可乎章曰茲事君自圖之吾舌可斷不敢泄斷都管翻師周遂奔湖南章縱其孥使逸去路振九國志呂師周父珂以勇敢事楊行密累有功拜黑雲都指揮使珂卒師周代之自言三代將家不可保富貴每恣為盃酌醉必起舞或擊節狂歌慷慨泣下行密聞而疑之密使人偵其動靜師周不自安乃謀於綦章而奔湖南據此則為渥所疑非行密也孥音奴子也揚州人也渥居喪居其父行密之喪也酣戶甘翻樂飲也湛嗜也應劭曰洽也張晏曰中酒也作樂句斷一燭費錢數萬或單騎出遊從者奔走道路不知所之從才用翻之往也左右牙指揮使張顥徐溫泣諫蜀註曰牙者旗名執牙者因以名之分左右隊故稱左右牙余謂牙兵以衞府牙汝謂我不才何不殺我自為之二人懼渥選壯士號東院馬軍廣署親信為將吏所署者恃勢驕橫橫戶孟翻陵蔑勳舊顥溫潛謀作亂渥父行密之世有親軍數千營於牙城之內蜀註曰古者軍行有牙尊者所在後人因以所治為衙曰牙城即衙城也以其地為射場顥溫由是無所憚史言楊渥自去其爪牙渥之鎮宣州也天祐元年楊渥鎮宣州二年召為嗣勍渠京翻璠音番及嗣位召歸廣陵顥溫使三將從秦裴擊江西因戍洪州誣以謀叛命別將陳祐往誅之史言張顥徐溫又翦去渥之爪牙間古莧翻六日至洪州微服懷短兵徑入秦裴帳中裴大驚祐告之故告之以所以徑入之故祐數思勍等罪數所具翻下因數同俗從所主翻執而斬之渥聞三將死益忌顥溫欲誅之丙戌渥晨視事顥溫帥牙兵二百露刃直入庭中帥讀曰率渥曰爾果欲殺我邪對曰非敢然也欲誅王左右亂政者耳因數渥親信十餘人之罪曳下以鐵檛擊殺之檛側瓜翻考異曰歐陽史四年正月渥視事陳璠等侍側溫顥擁牙兵入拽璠等下斬之渥不能止由是失政按璠等已死於宣州今從十國紀年按通鑑本文宣州當作洪州謂之兵諫左傳鬻拳強諫楚子不從臨之以兵懼而從之遂自刖也張顥徐溫以兵諫自文鬻拳之罪人也顥溫稍以法誅之於是軍政悉歸二人渥不能制為顥溫弒渥張本開平元年初梁王以河北諸鎮皆服惟幽滄未下故大舉伐之欲以堅諸鎮之心既而潞州內叛王燒營而還事見上卷天祐三年還從宣翻又如字沮在呂翻恐中外因此離心欲速受禪以鎮之丁亥王入館于魏館古玩翻有疾臥府中章十二行本中下有魏博節度使五字乙十一行本同孔本同羅紹威恐王襲之入見王曰今四方稱兵為王患者皆以翼戴唐室為名王不如早滅唐以絕人望王雖不許而心德之乃亟歸亟紀力翻壬寅至大梁甲辰唐昭宣帝遣御史大夫薛貽矩至大梁勞王勞力到翻貽矩請以臣禮見見賢遍翻王揖之升階貽矩曰殿下功德在人三靈改卜三靈天地人之靈也言天地人之心皆已去唐室改卜君而命之臣安敢違乃北面拜舞於庭王側身避之貽矩還言於帝曰元帥有受禪之意矣帝乃下詔帝皆謂唐昭宣帝元帥謂梁王又遣宰相以書諭王王辭開平元年河東兵猶屯長子欲窺澤州九域志長子西南至澤州一百四十里宋太宗皇帝太平興國元年始改保義軍為保平軍避藩邸舊名也此因史臣避廟諱而書之然觀令康懷貞發京兆同華兵屯晉州則恐自鄜州而東發兩鎮兵屯晉州蓋懷貞若自邢州發京兆同華兵道里隔涉邢州與潞州相近亦當備河東兵之來無緣使懷貞離邢州而屯晉州竊謂保平亦當作保大據歐史懷英傳亦書保義蓋以美原之捷方除保義節朱全忠急於篡唐未暇舉兵攻潞州自備而已故潞州益得以嚴備開平元年二月唐大臣共奏請昭宣帝遜位壬子詔宰相帥百官詣元帥府勸進梁王建元帥府于大梁相帥讀曰率於是朝臣藩鎮乃至湖南嶺南上牋勸進者相繼朝直遙翻上時掌翻開平元年三月癸未王以亳州刺史李思安為北路行軍都統將兵擊幽州擊劉仁恭也開平元年庚寅唐昭宣帝詔薛貽矩再詣大梁諭禪位之意又詔禮部尚書蘇循齎百官牋詣大梁開平元年鎮海鎮東節度使吳王錢鏐遣其子傳璙傳瓘討盧佶於溫州璙力小翻又力弔翻佶其吉翻開平元年甲辰唐昭宣帝降御札禪位于梁考異曰實錄薛居正五代史唐餘錄皆云四月唐帝御札敕宰臣張文蔚等備法駕奉迎梁朝而無日五代通錄云四月丁未丁未四月一日也舊唐書云三月甲辰甲辰三月二十七日也唐年補錄三月二十七日甲子降此御札四月戊辰朱全忠即位尤為差誤按此年三月戊寅朔四月丁未朔今從舊唐書禮部尚書蘇循副之冊禮使奉傳禪冊寶押金吾仗衞太常鹵簿等唐有傳國八寶武后惡璽字改為寶其受命傳國八寶並改雕寶字御史大夫薛貽矩為押金寶使唐六典曰天子八寶其用以玉其封以泥皇后及太子之信曰寶其用以金帥百官備法駕詣大梁唐六典大駕備五輅五輅皆有副車又有指南車記里鼓車白鷺車鸞旗車辟惡車皮軒車耕根車安車四望車羊車黃鉞車豹尾車屬車一十有二若法駕則減五副輅白鷺辟惡安車四望車四分屬車之一帥讀曰率楊涉子直史館凝式貞觀三年置史館於門下省以他官兼領或卑位有才者亦以直館稱以宰相涖脩撰天寶後他官兼史職者曰史館脩撰初入為直館元和元年宰臣裴垍建議登朝領史職者為脩撰以官高人判館事未登朝者為直館大人為唐宰相而國家至此不可謂之無過況手持天子璽綬與人雖保富貴柰千載何盍辭之璽斯氏翻綬音受載子亥翻考異曰陶岳五代史補曰凝式恐事泄即日佯狂時謂之風子按周世宗實錄凝式本傳仕梁未嘗有疾唐同光初知制誥始以心疾罷明宗時及清泰帝末俱以心恙罷官天福初致仕在洛有風子之號非梁初佯狂也今不取涉大駭曰汝滅吾族神色為之不寧者數日楊涉之相也知必為凝式之累今乃駭凝式之言何邪為于偽翻策敦煌人敦徒門翻光逢隱之子也趙隱見二百五十二卷懿宗咸通之十三年開平元年盧龍節度使劉仁恭驕侈貪暴常慮幽州城不固築館於大安山薛史幽州西有名山曰大安山此山四面懸絕可以少制衆其棟宇壯麗擬於帝者選美女實其中與方士鍊丹藥求不死悉斂境內錢瘞於山顛令民間用菫泥為錢瘞於計翻堇几隱翻堇泥黏土也又禁江南茶商無得入境自采山中草木為茶鬻之仁恭有愛妾羅氏其子守光通焉仁恭杖守光而斥之不以為子數不齒之於諸子之列所過焚蕩無餘夏四月己酉直抵幽州城下仁恭猶在大安山城中無備幾至不守幾居依翻守光自外引兵入登城拒守又出兵與思安戰思安敗退守光遂自稱節度使令部將李小喜元行欽將兵攻大安山仁恭遣兵拒戰為小喜所敗敗補邁翻虜仁恭以歸囚於別室仁恭將佐及左右凡守光素所惡者皆殺之惡烏路翻銀胡䩮都指揮使王思同帥部兵三千䩮盧谷翻胡䩮箭室也帥讀曰率山後八軍巡檢使李承約帥部兵二千盧龍以媯檀新武四州為山後奔李克用未幾亦奔河東幾居豈翻為劉守奇引河東兵伐燕張本河東節度使晉王克用以承約為匡霸指揮使思同為飛騰指揮使思同母仁恭之女也匡霸飛騰皆晉王所置軍都之號開平元年梁章十二行本梁上有庚戌二字乙十一行本同退齋校同王始御金祥殿王溥五代會要梁受禪都大梁改正衙殿為崇元殿東殿為玄德殿內殿為金祥殿萬歲堂為萬歲殿門如殿名薛史曰梁自謂以金德王又以福建上獻鸚鵡諸州相繼上白烏白兔洎白蓮之合蒂者以為金行應運之兆故名殿曰金祥此梁所自置百官也自稱曰寡人辛亥令諸牋表簿籍皆去唐年號但稱月日去羌呂翻丙辰張文蔚等至大梁開平元年盧佶聞錢傳璙等將至將水軍拒之於青澳青澳在溫州東北海中俗謂之青澳門由青澳門而進舟則入溫州其外則大洋也澳烏到翻海之隈厓曰澳佶之精兵盡在於此不可與戰乃自安固捨舟間道襲溫州安固後漢之章安也間古莧翻戊午溫州潰擒佶斬之天祐二年盧佶陷溫州至是敗亡監古銜翻命傳璙等移兵討盧約於處州開平元年壬戌梁王更名晃更工衡翻薛史曰時將受禪下教以本名二字異帝王之稱故改名王兄全昱聞王將即帝位謂王曰朱三爾可作天子乎甲子張文蔚楊涉乘輅自上源驛從冊寶諸司各備儀衞鹵簿前導百官從其後此唐之百官從才用翻王被袞冕被皮義翻即皇帝位張文蔚蘇循奉冊升殿進讀楊涉張策薛貽矩趙光逢以次奉寶升殿讀已已者畢也帥百官舞蹈稱賀帥讀曰率帝遂與文蔚等宴於玄德殿帝舉酒曰朕輔政未久此皆諸公推戴之力文蔚等慚懼俯伏不能對獨蘇循薛貽矩及刑部尚書張禕禕許韋翻盛稱帝功德宜應天順人帝復與宗戚飲博於宮中宗同姓也戚異姓之親也復扶又翻朱全昱忽以投瓊擊盆中迸散鮑宏博經曰楚辭琨蔽象碁有六博琨蔽玉箸也各投六箸行六棊故云六博用十二棊六棊白六棊黑所擲頭謂之瓊瓊有五采刻為一畫者謂之塞刻為兩畫者謂之白刻為三畫者謂之黑不刻者五塞之間謂之五塞據歐史此所謂投瓊即骰子也迸北孟翻考異曰王仁裕玉堂閒話曰骰子數匝廣王全昱忽駐不擲顧而白梁祖再呼朱三梁祖動容廣王曰你愛他爾許大官職久遠家族得安否於是大怒擲戲具於階下抵其盆而碎之喑嗚眦睚數日不止今從王禹偁五代史闕文朱三汝本碭山一民也從黃巢為盜天子用汝為四鎮節度使梁王始兼四鎮見二百六十二卷唐昭宗天復元年柰何一旦滅唐家三百年社稷唐武德元年受禪歲在著雍攝提格禪位于梁歲在強圉單閼享國二百九十年行當族滅奚以博為帝不懌而罷乙丑命有司告天地宗廟社稷丁卯遣使宣諭州鎮皆言受禪於唐也戊辰大赦考異曰梁實錄編遺錄薛史唐餘錄皆不云大赦今從歐陽史改元開平奉唐昭宣帝為濟陰王曹州濟陰郡濟子禮翻唐中外舊臣官爵並如故以汴州為開封府命曰東都以故東都為西都廢故西京以京兆府為大安府置佑國軍於大安府唐以長安為西京洛陽為東京今梁都大梁在洛陽之東故以洛陽為西都大梁為東都而以長安為大安府通鑑二百六十四卷昭宗天祐元年四月已書更命魏博曰天雄軍蓋亦出朱全忠之意此複出也但未知更軍額的在何年更工衡翻栫之以棘用左傳語栫在甸翻圍也開平元年辛未以武安節度使馬殷為楚王馬殷不由郡王徑封國王即位之初特恩也開平元年以宣武掌書記太府卿敬翔知崇政院事梁崇政院即唐樞密院之職後遂廢樞密院入崇政院參謀議於禁中承上旨宣於宰相而行之宰相非進對時有所奏請及已受旨應復請者皆具記事因崇政院以聞得旨則復宣於宰相翔為人沈深沈持林翻有智略在幕府三十餘年僖宗光啟間敬翔入汴幕至此時二十年史誤以二十為三十耳帝一以委之翔盡心勤勞晝夜不寐自言惟馬上乃得休息帝性暴戾難近近其靳翻人莫能測惟翔能識其意趣或有所不可翔未嘗顯言但微示持疑帝意已悟多為之改易為于偽翻禪代之際翔謀居多開平元年追尊皇高祖考妣以來皆為帝后五代會要梁以舜臣朱虎為始祖四十二代至黯追尊肅祖宣元皇帝范氏諡宣僖皇后黯子茂琳諡敬祖光獻皇帝楊氏諡孝皇后茂琳子信諡憲祖昭武皇帝劉氏諡昭懿皇后信子誠妣王氏為文惠皇后開平元年初帝為四鎮節度使凡倉庫之籍置建昌院以領之至是以養子宣武節度副使友文為開封尹判院事掌凡國之金穀友文本康氏子也開平元年乙亥下制削奪李克用官爵李克用稱唐官用唐年號豈梁得而削奪之哉史姑書梁之初政耳天祐西川稱天復年號天復四年梁王劫唐昭宗遷洛改元曰天祐河東西川謂劫天子遷都者梁也天祐非唐號不可稱乃稱天復五年是歲梁滅唐河東稱天祐四年西川仍稱天復稱臣奉貢蜀王與弘農王移檄諸道淮南楊渥爵弘農王卒無應者卒子恤翻蜀王乃謀稱帝下教諭統內吏民又遺晉王書云遺唯季翻請各帝一方俟朱溫既平乃訪唐宗室立之退歸藩服晉王復書不許曰誓於此生靡敢失節史言李克用雖出於夷狄而終身為唐臣亦天性之忠純也唐末之誅宦官也詔書至河東晉王匿監軍張承業於斛律寺斬罪人以應詔見二百六十四卷唐昭宗天復三年斛律寺蓋高齊建霸府於晉陽斛律氏貴盛時所立復以為監軍待之加厚承業亦為之竭力為于偽翻岐王治軍甚寬待士卒簡易治直之翻易以豉翻有告部將符昭反者岐王直詣其家悉去左右熟寢經宿而還還從宣翻由是衆心悅服然御軍無紀律及聞唐亡以兵羸地蹙羸倫為翻不敢稱帝但開岐王府置百官名其所居為宮殿妻稱皇后李茂貞自為岐王而妻稱皇后妻之貴踰於其夫矣卒伍之雄乘時竊號私立名字以相署置豈可與之言禮乎哉鞭扇號令多擬帝者鞭鳴鞭扇雉尾扇也唐制天子視朝從禁中出則鳴鞭傳警既出西序門索扇扇合天子升御座扇開百官畢朝鎮海節度判官羅隱說吳王鏐舉兵討梁說式芮翻曰縱無成功猶可退保杭越自為東帝柰何交臂事賊為終古之羞乎鏐始以隱為不遇於唐必有怨心及聞其言雖不能用心甚義之開平元年五月丁丑朔以御史大夫薛貽矩為中書侍郎同平章事開平元年加武順節度使趙王王鎔守太師天雄節度使鄴王羅紹威守太傅義武節度使王處直兼侍中開平元年契丹遣其臣袍笏梅老來通好好呼到翻帝遣太府少卿高頎報之頎渠希翻初契丹有八部歐陽修曰契丹君長曰大賀氏後分為八部一曰但利皆部二曰乙室活部三曰實活部四曰納尾部五曰頻沒部六曰內會雞部七曰集解部八曰奚嗢部部之長號大人路振九國志契丹古匈奴之種也代居遼澤之中潢水南岸南距榆關一千一百里榆關南距幽州七百里考異曰蘇逢吉漢高祖實錄曰契丹本姓大賀氏後分八族一曰利皆邸二曰乙失活邸三曰實活邸四曰納尾邸五曰頻沒邸六曰內會雞邸七曰集解邸八曰奚嗢邸管縣四十一縣有令八族之長皆號大人稱刺史常推一人為王建旗鼓以尊之每三年第其名以相代莊宗列傳曰咸通末其王曰習爾疆土稍大累來朝貢光啟中其王曰欽德乘中原多故北邊無備遂蠶食諸部達靼奚室韋之屬咸被驅役漢高祖實錄唐餘錄皆曰僖昭之際其王邪律阿保機怙強恃勇距諸族不受代自號天皇王後諸族邀之請用舊制保機不得已傳旗鼓且曰我為長九年所得漢人頗衆欲以古漢城領本族率漢人守之自為一部諸族諾之俄設策復併諸族僭稱皇帝土地日廣大順中後唐武皇遣使與之連和大會於雲州東城延之帳中約為昆弟莊宗列傳又曰及欽德政衰阿保機族盛自稱國王天祐二年大寇我雲中太祖遣使連和因與之面會於雲州東城延入帳中約為兄弟謂曰唐室為賊臣所篡吾以今冬大舉弟助我精騎二萬同收汴洛保機許諾保機既還欽德以國事傳之賈緯備史云武皇會保機故雲州城結以兄弟之好時列兵相去五里使人馬上持盃往來以展酬酢之禮保機喜謂武皇曰我蕃中酋長舊法三年則罷若他日見公復相禮否武皇曰我受朝命鎮太原亦有遷移之制但不受代則可何憂罷乎保機由此用其教不受諸族之代趙志忠虜庭雜紀云太祖諱億番名阿保謹又諱斡里太祖生而智八部落主愛其雄勇遂退其舊主阿輦氏歸本部立太祖為王又云凡立王則衆部酋長皆集會議其有德行功業者立之或災害不生㣥牧孳盛人民安堵則王更不替代苟不然其諸酋會衆部別選一名為王故王以番法亦甘心退焉不為衆所害又曰有韓知古韓潁康枚王奏事王郁皆中國人共勸太祖不受代新唐書載契丹八部名與漢高祖實錄所載八部名多不同蓋年祀相遠虜語不常耳其實一也阿保機云我為長九年則其在國不受代久矣非因武皇之教也今從漢高祖實錄又唐餘錄前云乾寧中劉仁恭鎮幽州保機入寇仁恭擒其妻兄述律阿鉢由此十餘年不能犯塞下乃云大順中與武皇會於雲中按大順在乾寧前乾寧二年仁恭方為幽州節度大順中未也又武皇謂曰唐室為賊臣所篡吾以今冬大舉此非大順中事唐餘錄誤也又編遺錄開平二年五月契丹王阿保機及前國王欽德貢方物然則於時七部猶在也相與約推一人為王建旗鼓以號令諸部每三年則以次相代咸通末有習爾者為王土宇始大其後欽德為王乘中原多故時入盜邊及阿保機為王尤雄勇五姓奚五姓奚一阿會部二處和部三奧失部四度稽部五元俟折部各有辱紇主為之酋領歐陽修曰奚當唐末居陰涼川在營府之西幽州之西北皆數百里分為五部一曰阿薈部二曰又米部三曰粵質部四曰怒皆部五曰黑訖支部後徙居幽州之東北數百里宋白曰奚居陰涼川東去營府五百里西南去幽州九百里東南接海山川三千里後徙居琵琶川室韋本有二十餘部其近契丹者七姓阿保機姓邪律氏歐史四夷附錄曰阿保機以其所居橫帳地名為姓曰世里世里譯者謂之邪律不肯受代久之阿保機擊黃頭室韋還七部劫之於境上求如約如三年一代之約傳旗鼓且曰我為王九年得漢人多請帥種落帥讀曰率種章勇翻居古漢城與漢人守之別自為一部七部許之漢城故後魏滑鹽縣也漢志滑鹽縣屬漁陽郡後漢明帝改曰鹽田水經註大榆河自密雲城南東南流逕後魏安州舊漁陽郡之滑鹽縣南滑鹽世謂之斛鹽城西北去禦夷鎮二百里歐陽修曰漢城在炭山東南欒河上宋白曰契丹居遼澤之中潢水南岸遼澤去渝關一千一百三十里渝關去幽州一百七十四里其地東南接海東際遼河西包冷陘北界松陘山東西三千里地多松柳澤多蒲葦阿保機居漢城在檀州西北五百五十里城北有龍門山山北有炭山炭山西是契丹室韋二界相連之地其地灤河上源西有鹽泊之利則後魏滑鹽縣也有鹽池之利其後阿保機稍以兵擊滅七部復併為一國又北侵室韋女真女真肅慎氏之遺種黑水靺鞨即其地也入遼東著籍者號熟女真界外野處者號生女真極邊遠者號黃頭女真擊奚滅之復立奚王而使契丹監其兵監古銜翻東北諸夷皆畏服之是歲阿保機帥衆三十萬寇雲州晉王與之連和面會東城約為兄弟延之帳中縱酒握手盡歡約以今冬共擊梁考異曰唐太祖紀年錄太祖以阿保機族黨稍盛召之天祐二年五月阿保機領其部族三十萬至雲州東城帳中言事握手甚歡約為兄弟旬日而去留男骨都舍利首領沮禀梅為質約冬初大舉渡河反正會昭宗遇盜而止歐陽史曰梁將篡唐晉王李克用使人聘于契丹阿保機以兵三十萬會克用於雲州東城握手約為兄弟期共舉兵擊梁按雲州之會莊宗列傳薛史皆在天祐四年而紀年錄獨在天祐二年又云約今年冬同收汴洛會昭宗遇盜而止如此則應在天祐元年昭宗崩已前不應在二年也且昭宗遇盜則尤宜興兵討之何故止也按武皇云唐室為賊臣所篡此乃四年語也其冬武皇寢疾蓋以此不果出兵耳今從之因其來可擒也王曰讎敵未滅而失信夷狄自亡之道也阿保機留旬日乃去晉王贈以金繒數萬阿保機留馬三千匹雜畜萬計以酬之阿保機歸而背盟更附于梁繒慈陵翻畜許救翻背蒲妹翻更工衡翻遣使通好是附梁也晉王由是恨之通鑑於唐紀書李克用君臣之分也於梁紀書晉王敵國之體也吳蜀義例同開平元年己卯以河南尹兼河陽節度使張全義為魏王鎮海鎮東節度使吳王錢鏐為吳越王加清海節度使劉隱威武節度王審知兼侍中威武節度之下當有使字自宋武帝以彭城之裔興於江南後多以彭城之劉為名族劉隱封大彭王意蓋取此癸未以權知荊南留後高季昌為節度使荊南舊統八州荊歸硤夔忠萬澧朗共八州寇亂相繼諸州皆為鄰道所據獨餘江陵季昌到官城邑殘毀戶口彫耗季昌安集流散民皆復業開平元年乙酉立兄全昱為廣王子友文為博王友珪為郢王友璋為福王友貞為均王友雍為賀王友徽為建王友文以養子居諸子之上友珪弒逆禍胎於此開平元年辛卯以東都舊第為建昌宮改判建昌院事為建昌宮使薛史曰初帝創業之時以四鎮兵馬倉庫籍繁總因置建昌院以領之至是改為宮蓋重其事也宋白曰是年中書門下奏改判建昌院事為建昌宮使仍請在京上舊邸為建昌宮開平元年壬辰命保平節度使康懷貞將兵八萬會魏博兵攻潞州攻晉將李嗣昭也開平元年甲午詔廢樞密院其職事皆入於崇政院以知院事敬翔為院使考異曰實錄四月辛未以翔知崇政院事五月甲午詔樞密院宜改為崇政院始命翔為院使蓋崇政院之名先已有之至是始併樞密院職事悉歸崇政院耳開平元年禮部尚書蘇循及其子起居郎楷自謂有功於梁唐昭宣帝天祐二年蘇循鼓成禪代之事故自以為有功循朝夕望為相帝薄其為人舊唐書帝紀昭宣帝天祐二年蘇楷上議駮昭宗諡全忠雄猜鑒物自楷駮諡後深鄙之既傳代之後父子皆斥逐不令在朝翔言於帝曰蘇循唐之鴟梟賣國求利不可以立於惟新之朝朝直遙翻戊戌詔循及刑部尚書張禕等十五人並勒致仕楷斥歸田里循父子乃之河中依朱友謙為同光之初蘇循諂唐莊宗張本開平元年盧約以處州降吳越僖宗中和元年盧約據處州至是而亡降戶江翻開平元年弘農王以鄂岳觀察使劉存為西南面都招討使岳州刺史陳知新為岳州團練使廬州觀察使劉威為應援使別將許玄應為監軍將水軍三萬以擊楚楚王馬殷甚懼靜江軍使楊定真賀曰我軍勝矣殷問其故定真曰夫戰懼則勝驕則敗今淮南兵直趨吾城趨七喻翻是驕而輕敵也而王有懼色吾是以知其必勝也殷命在城都指揮使秦彥暉在城都指揮使盡統潭州在城之兵水軍副指揮使黃璠帥戰艦三百屯瀏陽口吳分長沙置瀏陽縣隋廢景龍二年於故城復置屬潭州九域志縣在州東北一百六十里水經註湘水北過漢臨湘縣西瀏水從縣西北流注之有瀏口戍璠孚袁翻瀏力周翻存等遇大雨引兵還至越堤北彥暉追之存數戰不利乃遺殷書詐降數所角翻遺唯季翻彥暉使謂殷曰此必詐也勿受存與彥暉夾水而陳陳讀曰陣存遙呼曰呼火故翻殺降不祥公獨不為子孫計耶彥暉曰賊入吾境而不擊奚顧子孫鼓譟而進存等走黃璠自瀏陽章十二行本陽下有引兵二字乙十一行本同絕江與彥暉合擊大破之執存及知新考異曰編遺錄天祐四年四月湖南軍陳卲告捷淮南朗州水陸合勢奔衝其境馬殷出舟師於瀏陽江口大破賊黨生擒偽鄂州節度使劉存按薛史梁紀馬殷奏破淮寇在六月十國紀年吳史劉存攻楚在五月敗在六月楚史亦然編遺錄誤也士卒死者以萬數獲戰艦八百艘威以餘衆遁歸彥暉遂拔岳州陳知新取岳州見上卷上年艦戶黯翻艘蘇遭翻慰諭之二人皆罵曰丈夫以死報主肯事賊乎遂斬之史言劉存陳知新忠壯弘農王之腹心也常預政事張顥徐溫因其敗收斬之開平元年楚王殷遣兵會吉州刺史彭玕攻洪州不克彭玕附楚見上卷唐昭宣帝天祐三年開平元年康懷貞至潞州晉昭義節度使李嗣昭副使李嗣弼閉城拒守懷貞晝夜攻之半月不克乃築壘穿蚰蜒塹而守之塹七豔翻內外斷絕晉王以蕃漢都指揮使周德威為行營都指揮使周德威盡統蕃漢之兵河東大將也五季之世諸鎮各有都指揮使而命官之職分有不同者如周德威蕃漢都指揮使則蕃漢之兵皆受指揮也行營都指揮使則行營兵皆受指揮也鐵林都指揮使安元信則鐵林軍一都之指揮使耳讀史者宜各以義類求之史言晉傾國救潞州帥讀曰率克脩之子克脩晉王之弟見唐僖昭紀本姓張建瑭敬思之子史敬思見二百五十五卷唐僖宗中和四年代北人也開平元年晉兵攻澤州攻澤州以擬康懷貞之後開平元年甲寅以平盧節度使韓建守司徒同平章事開平元年武貞節度使雷彥恭會楚兵攻江陵荊南節度使高季昌引兵屯公安公安漢孱陵縣漢末劉備屯於此改名公安唐屬江陵府九域志在府南九十里彥恭敗楚兵亦走開平元年劉守光既囚其父事見上四月遣使請命秋七月甲午以守光為盧龍節度使同平章事開平元年靜海節度使曲裕卒曲裕即曲承裕丙申以其子權知留後顥為節度使考異曰諸書不見顥於裕何親按薛史六月丙辰裕卒七月丙申以靜海行營司馬權知留後曲顥起復為安南都護充節度使既云起復知其子也行營當作行軍開平元年雷彥恭攻岳州不克雷彥恭既與楚攻荊南尋又攻楚岳州可以見其反覆矣開平元年丙章十二行本丙上有八月二字乙十一行本同孔本同張校同午賜河南尹張全義名宗奭帝舊名全忠故更全義名宗奭開平元年辛亥以吳越王鏐兼淮南節度使楚王殷兼武昌節度使各充本道招討制置使欲使兩浙湖南攻弘農王楊渥先分授以楊氏所統二鎮開平元年晉周德威壁于高河高河在潞州屯留縣東南武敗親騎梁之親兵馬軍也丁巳帝以亳州刺史李思安代懷貞為潞州行營都統黜懷貞為行營都虞候思安將河北兵西上上黨地高在河北諸鎮之西故曰西上上時掌翻更築重城重直龍翻內以防奔突外以拒援兵謂之夾寨調山東民饋軍糧德威日以輕騎抄之調徒弔翻抄楚交翻思安乃自東南山口築甬道屬於夾寨屬之欲翻德威與諸將互往攻之排牆填塹一晝夜間數十發梁兵疲於奔命夾寨中出芻牧者德威輒抄之於是梁兵閉壁不出開平元年九月雷彥恭攻涔陽公安九域志江陵府公安縣有涔陽鎮涔鋤針翻敗補邁翻彥恭貪殘類其父雷彥恭滿之子也荊湖間常被其患被皮義翻又附於淮南丙申詔削彥恭官爵命季昌與楚王殷討之開平元年蜀王會將佐議稱帝皆曰大王雖忠於唐唐已亡矣此所謂天與不取者也馮涓獨獻議請以蜀王稱制曰朝興則未爽稱臣朝直遙翻爽乖也言若唐朝復興則為臣之節未乖也賊在則不同為惡王不從涓杜門不出馮涓馮宿之孫於唐室既亡之後義存故主視韋莊張格輩有間矣帥吏民哭三日帥讀曰率己亥即皇帝位王建字光圖許州舞陽人考異曰莊宗列傳太祖厭代建自帝於成都年號武成薛史唐餘錄天祐五年九月建自帝於成都年號武成九國志此年七月即皇帝位明年改元宋庠紀年通譜天祐四年秋稱帝次年改元歐陽史十國紀年天復七年九月即位明年改元今從之辛丑以前東川節度使兼侍中王宗佶為中書令韋莊為左散騎常侍判中書門下事閬州防禦使唐道襲為內樞密使莊見素之孫也韋見素天寶之末為相蜀主雖目不知書好與書生談論好呼到翻粗曉其理粗坐五翻是時唐衣冠之族多避亂在蜀蜀主禮而用之使脩舉故事故其典章文物有唐之遺風史言蜀主起於卒伍而能親用儒生蜀主長子校書郎宗仁幼以疾廢立其次子祕書少監宗懿為遂王開平元年冬十月高季昌遣其將倪可福會楚將秦彥暉攻朗州雷彥恭遣使乞降於淮南且告急弘農王遣將泠業將水軍屯平江泠盧經翻姓也平江縣本漢羅縣地後漢分立漢昌縣孫吳立漢昌郡後又為吳昌縣隋省唐神龍元年分湘陰置昌江縣屬岳州五代改曰平江蓋後唐既滅梁楚人為之避廟諱昌字也九域志平江縣在岳州東南二百五十七里李饒將步騎屯瀏陽以救之楚王殷遣岳州刺史許德勳將兵拒之泠業進屯朗口朗水西南自辰錦州入朗州界經州城入大江謂之朗口以木枝葉覆其首覆扶又翻持長刀浮江而下夜犯其營且舉火業軍中驚擾德勳以大軍進擊大破之追至鹿角鎮擒業又破瀏陽寨擒李饒掠上高唐年而歸唐天寶二年開山洞置唐年縣屬鄂州開平元年十一月甲申夾馬指揮使尹皓攻晉江者嶺寨拔之梁西都有夾馬營江者嶺在潞州長子縣西由北路達鵰窠嶺開平元年義昌節度使劉守文聞其弟守光幽其父集將吏大哭曰不意吾家生此梟獍梟堅堯翻不孝鳥也食母獍讀如鏡破獍惡獸也食父吾生不如死誓與諸君討之乃發兵擊守光互有勝負天雄節度使鄴王紹威謂其下曰守光以窘急歸國窘巨隕翻謂上七月劉守光遣使請命也守文孤立無援滄州可不戰服也乃遺守文書遺唯季翻諭以禍福守文亦恐梁乘虛襲其後戊子遣使請降以子延祐為質帝拊手曰紹威折簡勝十萬兵質音致折之舌翻加守文中書令撫納之開平元年初帝在藩鎮用法嚴將校有戰沒者所部兵悉斬之謂之跋隊斬將即亮翻校戶教翻跋卜末翻又蒲末翻士卒失主將者多亡逸不敢歸帝乃命凡軍士皆文其面以記軍號軍士或思鄉里逃去關津輒執之關往來必由之要處津濟度必由之要處無不死者其鄉里亦不敢容由是亡者皆聚山澤為盜大為州縣之患壬寅詔赦其罪自今雖文面亦聽還鄉里盜減什七八開平元年淮南右都押牙米志誠等將兵渡淮襲潁州克其外郭刺史張實據子城拒守開平元年晉王命李存璋攻晉州以分上黨兵勢十二月壬戌詔河中陝州發兵救之陝失冉翻開平元年甲子詔發步騎五千救潁州米志誠等引去開平元年丁卯晉兵寇洺州此救潞州之遊兵也開平元年淮南兵攻信州刺史危仔倡求救於吳越危全諷以仔倡守信州之地仔子之翻倡音昌又尺亮翻二年開平二年春正月癸酉朔蜀主登興義樓有僧抉一目以獻蜀主命飯僧萬人以報之抉於決翻飯扶晚翻小人無故自殘赦其罪已幸矣不宜復崇獎以敗風俗復扶又翻敗補邁翻蜀主乃止開平二年丁丑蜀以韋莊為門下侍郎同平章事開平二年辛巳蜀主祀南郊壬午大赦改元武成開平二年晉王疽發於首病篤周德威等退屯亂柳亂柳在潞州屯留縣界珙居勇翻掌書記盧質立其子晉州刺史存勗為嗣考異曰五代史闕文世傳武皇臨薨以三矢付莊宗曰一矢討劉仁恭汝不先下幽州河南未可圖也一矢擊契丹且曰阿保機與吾把臂而盟結為兄弟誓復唐家社稷今背約附梁汝必伐之一矢滅朱溫汝能成善志死無恨矣莊宗藏三矢于武皇廟庭及討劉仁恭命幕吏以少牢告廟請一矢盛以錦囊使親將負之以為前驅凱旋之日隨俘馘納矢于太廟伐契丹滅朱氏亦如之按薛史契丹傳莊宗初嗣位亦遣使告哀賂以金繒求騎軍以救潞州契丹答其使曰我與先王為兄弟兒即吾兒也寧有父不助子邪許出師會潞平而止廣本劉守光為守文所攻屢求救於晉晉王遣將部兵五千救之然則於時莊宗未與契丹及守光為仇也此蓋後人因莊宗成功撰此事以誇其英武耳余按晉王實怨燕與契丹垂沒以屬莊宗容有此理莊宗之告哀於阿保機與遣兵救劉守光此兵法所謂將欲取之必固與之也其心豈忘父之治命哉觀後來之事可見已此子志氣遠大必能成吾事爾曹善教導之辛卯晉王謂存勗曰嗣昭厄於重圍謂李嗣昭為梁兵圍於潞州也重直龍翻俟葬畢汝與德威輩速竭力救之又謂克寧等曰以亞子累汝累良瑞翻亞子存勗小名也言終而卒年五十三中外無敢諠譁克寧久總兵柄有次立之勢兄死弟及以長幼之次有自立之勢軍中以存勗年少多竊議者人情忷忷少詩照翻忷許勇翻存勗懼以位讓克寧克寧曰汝冢嗣也且有先王之命誰敢違之將吏欲謁見存勗見賢遍翻存勗方哀哭未出張承業入謂存勗曰大孝在不墜基業多哭何為因扶存勗出襲位為河東節度使晉王張承業之扶李存勗出嗣位猶張昭之於孫權也帥讀曰率王悉以軍府事委之以李存璋為河東軍城使馬步都虞候先王之時多寵借胡人及軍士侵擾市肆先王謂李克用執其尤暴橫者戮之橫戶孟翻旬月間城中肅然開平二年吳越王鏐遣兵攻淮南甘露鎮以救信州牽制淮南之兵使之不得急攻危仔倡開平二年蜀中書令王宗佶於諸假子為最長王宗佶本姓甘王建為忠武軍卒掠得之養以為子及長為將數有功長知兩翻專權驕恣唐道襲已為樞密使宗佶猶以名呼之道襲心銜之而事之逾謹宗佶多樹黨友蜀主亦惡之惡烏路翻二月甲辰以宗佶為太師罷政事為王宗佶見殺張本開平二年蜀以戶部侍郎張格為中書侍郎同平章事格為相多迎合主意有勝己者必以計排去之去羌呂翻為張格亂蜀張本開平二年初晉王克用多養軍中壯士為子寵遇如真子及晉王存勗立諸假子皆年長握兵心怏怏不伏長知兩翻怏於兩翻或託疾不出或見新王不拜李克寧權位既重人情多向之假子李存顥陰說克寧曰說式芮翻下同兄終弟及自古有之殷人之制兄終弟及自周以來父子相繼未有能易之者也李存顥以殷制動克寧耳於理安乎天與不取後悔無及克寧曰吾家世以慈孝聞天下聞音問先王之業苟有所歸吾復何求復扶又翻汝勿妄言我且斬汝克寧妻孟氏素剛悍悍下罕翻又侯旰翻諸假子各遣其妻入說孟氏李克用義兒百餘人必不盡然獨存顥等為此耳史概言之曰諸假子且慮語泄及禍數以迫克寧克寧性怯朝夕惑於衆言心不能無動又與張承業李存璋相失數誚讓之數所角翻誚才笑翻又因事亶殺都虞候李存質又求領大同節度使以蔚朔應州為巡屬唐末置應州領金城混渾蔚紆勿翻晉王皆聽之李存顥等為克寧謀因晉王過其第為于偽翻過音戈殺承業存璋奉克寧為節度使舉河東九州附于梁河東領幷遼沁汾石忻代嵐憲九州太原人史敬鎔少事晉王克用居帳下見親信少詩照翻克寧欲知府中陰事召敬鎔密以謀告之敬鎔陽許之入告太夫人太夫人大駭召張承業指晉王謂之曰先王把此兒臂授公等如聞外間謀欲負之但置吾母子有地勿送大梁自他不以累公累力瑞翻承業惶恐曰老奴以死奉先王之命此何言也晉王以克寧之謀告且曰至親不可自相魚肉吾苟避位則亂不作矣承業曰克寧欲投大王母子於虎口不除之豈有全理乃召李存璋吳珙及假子李存敬長直軍使朱守殷使陰為之備壬戌置酒會諸將於府舍伏甲執克寧存顥於座晉王流涕數之曰數所具翻兒曏以軍府讓叔父叔父不取今事已定柰何復為此謀復扶又翻下同忍以吾母子遺仇讎乎遺唯季翻仇讎謂梁也克寧曰此皆讒人交構夫復何言是日殺克寧及存顥李克寧之奉存勗初焉非不忠順其後外搖於讒口內溺於悍妻以至變節而殺其身地親而屬尊者居主少國疑之時可不戒哉開平二年癸亥酖殺濟陰王於曹州追諡曰唐哀皇帝年十七葬于濟陰縣之定陶鄉濟子禮翻開平二年甲子蜀兵入歸州歸州荊南巡屬不地曰入言入之而不能有其地開平二年辛未以韓建為侍中兼建昌宮使開平二年李思安等攻潞州久不下士卒疲弊多逃亡晉兵猶屯余吾寨前漢書地理志上黨郡有余吾縣章懷太子賢曰余吾故城在潞州屯留縣西北欲召兵還恐晉人躡之乃議自至澤州應接歸師且召匡國節度使劉知俊將兵趣澤州趣七喻翻三月壬申朔帝發大梁丁丑次澤州辛巳劉知俊至壬午以知俊為潞州行營招討使開平二年癸巳門下侍郎同平章事張文蔚卒蔚紆勿翻開平二年帝以李思安久無功亡將校四十餘人士卒以萬計更閉壁自守遣使召詣行在甲午削思安官爵勒歸本貫充役充役使充齊民之役晉李嗣昭固守踰年前年十二月李嗣昭入潞州去年五月康懷貞始攻之至夾寨破則是年五月也嗣昭登城宴諸將作樂流矢中嗣昭足矢中竹仲翻嗣昭密拔之座中皆不覺李嗣昭登城宴樂示敵以餘暇也中矢而密拔之所以安衆也諭降之數所角翻嗣昭焚詔書斬使者帝留澤州旬餘欲召上黨兵還遣使就與諸將議之諸將以為李克用死余吾兵且退上黨孤城無援請更留旬月以俟之夾寨之敗正坐此也命增運芻糧以饋其軍劉知俊將精兵萬餘人擊晉軍斬獲甚衆劉知俊之小捷所以驕梁兵而殲之也天之厭梁於此可見車駕宜還京師帝以關中空虛慮岐人侵同華岐人謂李茂貞之兵退屯晉州俟五月歸鎮開平二年蜀太師王宗佶既罷相怨望陰畜養死士謀作亂畜吁玉翻上表以為臣官預大臣親則長子長知兩翻國家之事休戚是同今儲貳未定必生厲階陛下若以宗懿才堪繼承宜早行冊禮以臣為元帥兼總六軍儻以時方艱難宗懿沖幼臣安敢持謙不當重事陛下既正位南面軍旅之事宜委之臣下臣請開元帥府鑄六軍印征戍徵發臣悉專行太子視膳於晨昏微臣握兵於環衞萬世基業惟陛下裁之蜀主怒隱忍未發以問唐道襲對曰宗佶威望內外懾服足以統御諸將蜀主益疑之己亥宗佶入見見賢遍翻辭色悖慢悖蒲內翻又蒲沒翻蜀主諭之宗佶不退蜀主不堪其忿命衞士撲殺之撲弼角翻以華洪之得衆心猶不免於禍況甘佶之驕恃輕脫哉其死宜矣貶其黨御史中丞鄭騫為維州司戶衞尉少卿李鋼為汶川尉鋼古郎翻汶川漢綿虒地晉置汶川縣唐屬茂州九域志在州南一百里玉壘山石紐山皆在縣界汶讀曰岷皆賜死於路開平二年初晉王克用卒周德威握重兵在外國人皆疑之晉王存勗召德威使引兵還還從宣翻又如字夏四月辛丑朔德威至晉陽留兵城外獨徒步而入伏先王柩哭極哀退謁嗣王禮甚恭衆心由是釋然史言周德威臨敵勇而事上敬開平二年癸卯門下侍郎同平章事楊涉罷為右僕射以吏部侍郎于兢為中書侍郎翰林學士承旨張策為刑部侍郎並同平章事兢琮之兄子也于琮見唐宣紀僖紀開平二年夾寨奏余吾晉兵已引去帝以援兵不能復來復扶又翻下同潞州必可取丙午自澤州南還壬子至大梁梁兵在夾寨者亦不復設備兵不可以無備也有備無患今梁之為兵也主驕於上將惰於下其敗宜矣上黨河東之藩蔽無上黨是無河東也潞州上黨郡聞吾新立以為童子未閑軍旅閑習也若簡精兵倍道趣之趣七喻翻下同出其不意破之必矣取威定霸左傳晉先軫之言不可失也張承業亦勸之行乃遣承業及判官王緘乞師於鳳翔岐王李茂貞據鳳翔岐王衰老兵弱財竭竟不能應晉王大閱士卒以前昭義節度使丁會為都招討使丁會以潞州降晉見二百六十四卷唐昭宣帝天祐三年甲子帥周德威等發晉陽帥讀曰率開平二年淮南遣兵寇石首唐武德四年分華容縣置石首縣取縣北石首山而名屬江陵府九域志在府東南二百里孫鑑曰自安陸至竟陵兩驛皆平地南至大江並無丘陵之阻渡江至石首始有淺山謂之竟陵陵至此而竟謂之石首石至此而首也瀺士咸翻敗補邁翻下同又遣其將李厚將水軍萬五千趣荊南高季昌逆戰敗之於馬頭荊南治江陵在江北南岸曰馬頭岸正對沙市開平二年己巳晉王軍于黃碾距上黨四十五里黃碾村在潞州潞城縣碾紐善翻辛未朔晉王伏兵三垂岡下三垂岡在屯留縣東南詰去吉翻進兵直抵夾寨梁軍無斥候不意晉兵之至將士尚未起軍中驚擾晉王命周德威李嗣源分兵為二道德威攻西北隅嗣源攻東北隅填塹燒寨鼓譟而入梁兵大潰南走招討使符道昭馬倒為晉人所殺失亡將校士卒以萬計校戶教翻委棄資糧器械山積周德威等至城下呼李嗣昭曰先王已薨今王自來破賊夾寨賊已去矣可開門嗣昭不信曰此必為賊所得使來誑我耳欲射之誑居況翻射而亦翻左右止之嗣昭曰王果來可見乎王自往呼之嗣昭見王白服大慟幾絕氣幾絕也幾居依翻遂開門初德威與嗣昭有隙晉王克用臨終謂晉王存勗曰進通忠孝吾愛之深今不出重圍重直龍翻豈德威不忘舊怨邪汝為吾以此意諭之若潞圍不解吾死不瞑目為于偽翻瞑莫定翻閉目也進通嗣昭小名也晉王存勗以告德威德威感泣由是戰夾寨甚力既與嗣昭相見遂歡好如初好呼到翻康懷貞以百餘騎自天井關遁歸帝聞夾寨不守大驚既而歎曰生子當如李亞子克用為不亡矣至如吾兒豚犬耳詔所在安集散兵周德威李存璋乘勝進趣澤州趣七喻翻刺史王班素失人心衆不為用龍虎統軍牛存節自西都將兵應接夾寨潰兵龍虎軍即唐龍武軍號梁受唐禪改武為虎王溥五代會要曰開平元年四月改左右長直為左右龍虎軍又梁以洛陽為西都謂其衆曰澤州要害地不可失也雖無詔旨當救之衆皆不欲曰晉人勝氣方銳且衆寡不敵存節曰見危不救非義也畏敵強而避之非勇也遂舉策引衆而前策馬策也城中人已縱火諠譟欲應晉王班閉牙城自守存節至乃定考異曰歐陽史云存節從康懷英攻潞州為行營排陳使晉兵已破夾城存節以餘兵歸行至天井關聞晉兵攻澤州而救之梁列傳澤州將陷河南尹張宗奭召龍虎統軍牛存節謀之存節帥本軍及右神武羽林等軍往應接上黨回師至天井關即引衆前救澤州薛史亦同按存節若自夾城遁歸則先過澤州後至天井關豈得已過而返救之也今從梁列傳及薛史緣城穿地道攻之存節晝夜拒戰凡旬有三日劉知俊自晉州引兵救之先是命劉知俊休兵晉州九域志晉州東南至澤州三百一十里退保高平高平漢泫氏縣地後魏置高平縣唐屬澤州九域志在州東北八十三里考異曰莊宗列傳朱溫傳云李存璋進攻澤州刺史王班棄城而去澤潞皆平今不取晉王歸晉陽休兵行賞以周德威為振武節度使同平章事命州縣舉賢才黜貪殘寬租賦撫孤窮伸冤濫禁姦盜境內大治治直吏翻以河東地狹兵少乃訓練士卒令騎兵不見敵無得乘馬部分已定無得相踰越及留絕以避險分扶問翻踰越謂左軍不得越右軍後部不得踰前部之類留絕謂軍行須聯屬不得或留止而中絕或避險而不整分道並進期會無得差晷刻後期必斬軍法也晷居洧翻日景也期以日中日晷過中而不至則為差餘以類推晝夜分百刻故能兼山東取河南由士卒精整故也初晉王克用平王行瑜見二百六十卷唐昭宗乾寧二年時方鎮多行墨制王恥與之同每除吏必表聞至是晉王存勗始承制除吏晉王德張承業德其除李克寧之難每至其第升堂拜母賜遺甚厚遺唯季翻潞州圍守歷年士民凍餒死者太半市里蕭條李嗣昭勸課農桑寬租緩刑數年之間軍城完復史究言李嗣昭鎮潞之績效開平二年靜江節度使同平章事李瓊卒李瓊取靜江見二百六十二卷唐昭宗光化三年開平二年壬申更以許州忠武軍為匡國軍同州匡國軍為忠武軍陝州保義軍為鎮國軍更工衡翻陝失冉翻開平二年乙亥楚兵寇鄂州淮南所署知州秦裴擊破之開平二年淮南左牙指揮使張顥右牙指揮使徐溫專制軍政弘農威王心不能平楊渥諡威王去羌呂翻二人不自安共謀弒王分其地以臣於梁戊寅顥遣其黨紀祥等弒王於寢室考異曰吳錄顥使紀祥陳暉黎璠孫殷等執渥于寢室弒之不言徐溫蓋徐鉉為溫諱耳薛史因之而江南別錄有獨用左衙兵事歐陽史云溫顥共遣盜殺渥約分其地以臣於梁按溫與顥分掌牙兵溫若不同謀顥必不敢獨弒渥今從江南別錄十國紀年張顥欲稱淮南留後送款於梁以淮南易蔡州節制徐溫曰揚州距汴州往返僅三千里軍府踰月無主必亂不若有所立然後圖之按顥稱留後則有主矣今不取年二十三己卯顥集將吏於府庭夾道及庭中堂上各列白刃令諸將悉去衞從然後入去羌呂翻從才用翻嗣王已薨軍府誰當主之三問莫應顥氣色益怒幕僚嚴可求前密啟曰軍府至大四境多虞非公主之不可然今日則恐太速顥曰何謂速也可求曰劉威陶雅李遇李簡劉威在廬州陶雅在歙州李遇在宣州李簡在常州公今自立此曹肯為公下乎不若立幼主輔之諸將孰敢不從顥默然久之可求因屏左右屏必郢翻又卑正翻急書一紙置袖中麾同列詣使宅賀節度使所居為使宅賀者欲賀新君使疏吏翻既至可求跪讀之乃太夫人史氏教也按路振九國志渥母史氏封武昌郡君蓋渥嗣位後尊為太夫人先王創業艱難此一段凡言先王皆指楊行密隆演次當立諸將宜無負楊氏善開導之辭旨明切顥氣色皆沮以其義正不敢奪遂奉威王弟隆演稱淮南留後東面諸道行營都統楊隆演字鴻源行密第二子薛史及路振九國志皆以隆演為渭副都統朱瑾詣可求所居曰瑾年十六七即橫戈躍馬衝犯大敵未嘗畏懾懾之涉翻今日對顥不覺流汗公面折之如無人折之舌翻乃知瑾匹夫之勇不及公遠矣因以兄事之顥以徐溫為浙西觀察使鎮潤州嚴可求說溫曰說式芮翻下同公捨牙兵而出外藩顥必以弒君之罪歸公溫驚曰然則柰何可求曰顥剛愎而暗於事公能見聽請為公圖之愎蒲逼翻為于偽翻時副使李承嗣李承嗣時為淮南行軍副使可求又說承嗣曰顥凶威如此今出徐於外意不徒然恐亦非公之利承嗣深然之可求往見顥曰公出徐公於外人皆言公欲奪其兵權而殺之多言亦可畏也顥曰右牙欲之右牙者以官稱徐溫業已行矣事已成為業可求曰止之易耳易以豉翻明日可求邀顥及承嗣俱詣溫可求瞋目責溫曰瞋昌真翻古人不忘一飯之恩況公楊氏宿將今幼嗣初立多事之時乃求自安於外可乎溫謝曰苟諸公見容溫何敢自專由是不行顥知可求陰附溫夜遣盜刺之刺七亦翻可求知不免請為書辭府主府主謂隆演也可求操筆無懼色操七刀翻盜能辨字見其辭旨忠壯曰公長者長知兩翻吾不忍殺掠其財以復命曰捕之不獲顥怒曰吾欲得可求首何用財為溫與可求謀誅顥可求曰非鍾泰章不可泰章者合肥人時為左監門衞將軍考異曰吳紀作鍾章十國紀年作鍾泰章今從之章十二行本將下有彭城二字乙十一行本同孔本同張校同翟虔告之翟直格翻姓也泰章聞之喜密結壯士三十人夜刺血相飲為誓刺七亦翻飲於禁翻丁亥旦直入斬顥於牙堂牙堂左右牙指揮使治事之所溫始暴顥弒君之罪暴者發露其罪音如字轘紀祥等於市轘音患車裂也詣西宮白太夫人廣陵西宮楊行密史夫人居之大泣曰吾兒沖幼禍難如此難乃旦翻願保百口歸廬州公之惠也溫曰張顥弒逆不可不誅夫人宜自安初溫與顥謀弒威王溫曰參用左右牙兵心必不一不若獨用吾兵顥不可溫曰然則獨用公兵顥從之至是窮治逆黨皆左牙兵也由是人以溫為實不知謀也原情定罪徐溫宜與張顥同科而徐溫得免弒君之名遂專吳國之政殆天啟之也治直之翻軍府事咸取決焉以嚴可求為揚州司馬溫性沈毅沈持林翻自奉簡儉雖不知書使人讀獄訟之辭而決之皆中情理中竹仲翻先是張顥用事先悉薦翻刑罰酷濫縱親兵剽奪市里剽匹妙翻溫謂嚴可求曰大事已定吾與公輩當力行善政使人解衣而寢耳乃立法度禁強暴舉大綱軍民安之古人有言盜亦有道然盜貨者小盜也盜國者大盜也觀徐溫之盜國斯言豈欺我哉以財賦委支計官駱知祥支計官猶天臺度支郎之任也稱尺證翻淮南謂之嚴駱開平二年己丑契丹王阿保機遣使隨高頎入貢高頎報使契丹見上年五月夷狄覘國勢而為去來彼以梁為強則其背晉宜矣復扶又翻渾特人姓名渾戶昆翻又戶本翻賜以手詔約共滅沙陀乃行封冊開平二年壬辰夾寨諸將詣闕待罪皆赦之夾寨以辛未敗壬辰諸將方詣闕待罪經二十二日以為六軍馬步都指揮使開平二年雷彥恭引沅江環朗州以自守沅水逕朗州城南去城二十步環音宦彥恭守備稍懈懈古隘翻彥暉使裨將曹德昌帥壯士夜入自水竇帥讀曰率內外舉火相應城中驚亂彥暉鼓譟壞門而入壞音怪彥恭輕舟奔廣陵雷滿唐僖宗中和元年據朗州傳至彥恭而亡考異曰梁太祖實錄云丁酉朗州軍前奏捷彥恭沒溺于江今從紀年送于大梁淮南以彥恭為節度副使先是澧州刺史向王褱與彥恭相表裏至是亦降於楚向王褱亦以中和元年據澧州其後破楚者亦澧朗之兵也開平二年蜀主遣將將兵會岐兵五萬攻雍州梁受禪改京兆府為雍州大安府雍於用翻六月壬寅以劉知俊為西路行營都招討使以拒之開平二年金吾上將軍王師範家於洛陽朱友寧之妻泣訴於帝曰陛下化家為國宗族皆蒙榮寵妾夫獨不幸因王師範叛逆死於戰場朱友寧死見二百六十四卷唐昭宗天復三年妾誠痛之帝曰朕幾忘此賊幾居依翻己酉遣使就洛陽族之使者先鑿阬於第側乃宣敕告之師範盛陳宴具與宗族列坐謂使者曰死者人所不免況有罪乎予不欲使積尸長幼無序酒既行命自幼及長引於阬中戮之死者凡二百人開平二年丙辰劉知俊及佑國節度使王重師大破岐兵于幕谷幕谷即漠谷開平二年蜀立遂王宗懿為太子為宗懿不終張本開平二年帝欲自將擊潞州丁卯詔會諸道兵開平二年湖南判官高郁請聽民自采茶賣於北客收其征以贍軍楚王殷從之秋七月殷奏於汴荊襄唐郢復州置回圖務回圖務猶今之回易場也賣之以易繒纊戰馬而歸繒慈陵翻纊苦謗翻仍歲貢茶二十五萬斤詔許之湖南由是富贍開平二年壬申淮南將吏請於李儼承制授楊隆演淮南節度使東面諸道行營都統同平章事弘農王李儼承制事始二百六十三卷唐昭宗天復二年鍾泰章賞薄殺張顥之賞也後踰年因醉與諸將爭言而及之或告徐溫以泰章怨望請誅之溫曰是吾過也擢為滁州刺史鄧廣銘標點顧頡剛聶崇岐覆校
