body:
  text: 資治通鑑卷第八十九端明殿學士兼侍讀學士朝散大夫右諫議大夫充集賢殿修撰權判西京留司御史臺上柱國河內郡開國侯食邑一千三百戶食實封四百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註晉紀十一建興二年孝愍皇帝下建興二年甲戌三一四建興二年春正月辛未有如日隕于地又有三日相承出西方而東行天文占曰三四五六日俱出並爭天下兵作又曰三日並出不過三旬諸侯爭為帝建興二年丁丑大赦建興二年有流星出牽牛入紫微晉天文志牽牛六星在河鼓南墜于平陽北化為肉長三十步廣二十七步長直亮翻廣古曠翻後放此漢主聰惡之惡烏路翻以問公卿陳元達以為女寵太盛亡國之徵考異曰載記元達等曰臣恐後庭有三后之事按立三后在明年於時未也此陰陽之理何關人事聰后劉氏賢明聰所為不道劉氏每規正之己丑劉氏卒諡曰武宣自是嬖寵競進後宮無序矣嬖卑義翻又博計翻建興二年聰置丞相等七公七公見下自晉王粲至中山王曜是也輔漢都護中軍上軍撫軍鎮衞京前後左右上下軍輔國冠軍龍驤虎牙等大將軍以諸子為之又置左右司隸各領戶二十餘萬萬戶置一內史單于左右輔各主六夷十萬落六夷蓋胡羯鮮卑氐羌巴蠻或曰烏丸非巴蠻也單音蟬左右選曹尚書並典選舉自司隸以下六官皆位亞僕射以其子粲為丞相領大將軍錄尚書事進封晉王江都王延年錄尚書六條事錄尚書六條事始見於此沈約志曰晉康帝世何充讓錄表云咸康中分置三錄王導錄其一荀崧陸曄各錄六條事然則似有二十四條若止有十二條則荀陸各錄六條導又何所司乎若導總錄荀陸分掌則不得復云導錄其一也其後每置二錄輒云各錄六條事又似止有十二條十二條者不知悉何條也江右張華江左庾亮並經關尚書七條則亦不知皆何事也余按宋元嘉以後江夏王義恭始興王濬南譙王義宣皆錄尚書六條事沈氏世仕江左歷位通顯且不知為何事後之人何所取徵杜佑曰何充讓錄表曰咸康中分置三錄王導錄其一荀崧陸曄各錄二條事晉氏渡江有吏部祠部左民五兵度支五尚書是五條也晉初有吏部三公客曹駕部屯田度支六曹太康有吏部殿中五兵田曹度支左民六曹蓋六條也如杜佑之言則六條蓋六曹也沈約以何充表各錄二條為各錄六條致有此誤王育為太傅任顗為太保馬景為大司徒朱紀為大司空中山王曜為大司馬建興二年壬辰王子春等及王浚使者至襄國石勒匿其勁卒精甲羸師虛府以示之羸倫為翻北面拜使者而受書浚遺勒麈尾遺于季翻麈腫庾翻麋屬尾能生風辟蠅蜹晉王公貴人多執麈尾以玉為柄勒陽不敢執懸之於壁朝夕拜之曰我不得見王公見其所賜如見公也復遣董肇奉表于浚期以三月中旬親詣幽州奉上尊號復扶又翻上時掌翻亦脩牋于棗嵩求幷州牧廣平公勒問浚之政事於王子春子春曰幽州去歲大水人不粒食五穀不登故不粒食不能賑贍刑政苛酷賦役殷煩忠賢內離夷狄外叛人皆知其將亡而浚意氣自若曾無懼心方更置立臺閣布列百官自謂漢高魏武不足比也勒撫几笑曰王彭祖真可擒也浚使者還薊薊音計具言石勒形勢寡弱款誠無二浚大悅益驕怠不復設備建興二年楊虎掠漢中吏民以奔成梁州人張咸等起兵逐楊難敵楊虎楊難敵攻漢中事始上卷上年咸以其地歸成於是漢嘉涪陵漢中之地漢嘉本前漢青衣縣屬蜀郡後漢順帝陽嘉二年改曰漢嘉蜀分立漢嘉郡成主雄以李鳳為梁州刺史任回為寧州刺史李恭為荊州刺史雄虛己好賢隨才授任好呼到翻命太傅驤養民於內李鳳等招懷於外刑政寬簡獄無滯囚興學校置史官校戶教翻其賦民男丁歲穀三斛女丁半之疾病又半之戶調絹不過數丈綿數兩調徒釣翻賦也事少役希少詩沼翻民多富實新附者皆給復除復方目翻是時天下大亂而蜀獨無事年穀屢熟乃至閭門不閉路不拾遺漢嘉夷王沖歸朱提審炤建寧爨畺皆歸之朱提音銖時炤與照同爨取亂翻夷人姓也畺與疆同居良翻巴郡嘗告急云有晉兵雄曰吾常憂琅邪微弱遂為石勒所滅以為耿耿耿古幸翻耿耿憂也不圖乃能舉兵使人欣然然雄朝無儀品爵位濫溢朝直遙翻吏無祿秩取給於民軍無部伍號令不肅此其所短也建興二年二月壬寅以張軌為太尉涼州牧封西平郡公王浚為大司馬都督幽冀諸軍事荀組為司空領尚書左僕射兼司隸校尉行留臺事劉琨為大將軍都督幷州諸軍事朝廷以張軌老病拜其子寔為副刺史副刺史前此未有也建興二年石勒纂嚴將襲王浚而猶豫未發張賓曰夫襲人者當出其不意今軍嚴經日而不行豈非畏劉琨及鮮卑烏桓為吾後患乎勒曰然為之柰何賓曰彼三方智勇無及將軍者將軍雖遠出彼必不敢動且彼未謂將軍便能懸軍千里取幽州也輕軍往返不出二旬藉使彼雖有心比其謀議出師比必寐翻吾已還矣且劉琨王浚雖同名晉臣實為仇敵若脩牋于琨送質請和質音致下同琨必喜我之服而快浚之亡終不救浚而襲我也用兵貴神速勿後時也勒曰吾所未了右侯已了之了決也復扶又翻下敢復同遂以火宵行至柏人柏人縣屬趙國唐為邢州堯山縣以其兄統在范陽恐泄軍謀故也遣使奉牋送質于劉琨自陳罪惡請討浚以自效琨大喜移檄州郡稱己與猗盧方議討勒勒走伏無地求拔幽都以贖罪今便當遣六脩南襲平陽除僭偽之逆類降知死之逋羯逆類謂劉聰逋羯謂石勒降戶江翻羯居謁翻翼奉皇家斯乃曩年積誠靈祐之所致也浚琨為勒所玩弄而不自覺宜其相繼而覆亡也考異曰琨集檄首云三月庚午朔五日甲戌按石勒以壬申克幽州蓋時晉陽尚未知也欲敍琨事畢然後敍勒事故置此三月勒軍達易水王浚督護孫緯馳遣白浚緯于貴翻將勒兵拒之游統禁之浚將佐皆曰胡貪而無信必有詭計請擊之浚怒曰石公來正欲奉戴我耳敢言擊者斬衆不敢復言浚設饗以待之壬申勒晨至薊薊音計考異曰三十國春秋先言癸酉勒取幽州後言壬午勒晨至薊按劉琨表曰勒以三月三日徑掩薊城然則當言壬申是也叱門者開門猶疑有伏兵先驅牛羊數千頭聲言上禮言欲以牛羊上浚以為禮上時掌翻塞悉則翻浚始懼或坐或起勒既入城縱兵大掠浚左右請禦之浚猶不許勒升其聽事中庭曰聽事言受事察訟於是漢晉皆作聽事六朝以來乃始加厂作廳並他經翻堂無四壁曰皇勒召浚妻與之並坐執浚立於前浚罵曰胡奴調乃公調田聊翻戲也何凶逆如此勒曰公位冠元台冠古玩翻手握強兵坐觀本朝傾覆朝直遙翻下同曾不救援乃欲自尊為天子非凶逆乎又委任姦貪殘虐百姓賊害忠良毒徧燕土燕於賢翻此誰之罪也使其將王洛生以五百騎送浚于襄國浚自投于水束而出之斬于襄國市勒殺浚麾下精兵萬人浚將佐爭詣軍門謝罪饋賂交錯前尚書裴憲從事中郎荀綽獨不至勒召而讓之曰王浚暴虐孤討而誅之諸人皆來慶謝二君獨與之同惡將何以逃其戮乎對曰憲等世仕晉朝荷其榮祿荷下可翻浚雖凶粗猶是晉之藩臣故憲等從之裴憲奔幽州見八十七卷懷帝永嘉五年明公苟不脩德義專事威刑則憲等死自其分分扶問翻又何逃乎請就死不拜而出勒召而謝之待以客禮綽勗之孫也勒數朱碩棗嵩等以納賄亂政為幽州患事見上卷上年數所具翻皆斬之以統欲以范陽私附之也惟裴憲荀綽止有書百餘袟鹽米各十餘斛而已袟與帙同直質翻書卷編次成帙勒曰吾不喜得幽州喜得二子以憲為從事中郎綽為參軍分遣流民各還鄉里勒停薊二日焚浚宮殿以故尚書燕國劉翰行幽州刺史戍薊置守宰而還還從宣翻又如字孫緯遮擊之勒僅而得免勒至襄國遣使奉王浚首獻捷于漢漢以勒為大都督督陝東諸軍事此陝東亦取分陝之義而授之耳驃匹妙翻單音蟬增封十二郡勒固辭受二郡而已劉琨請兵於拓跋猗盧以擊漢會猗盧所部雜胡萬餘家謀應石勒猗盧悉誅之不果赴琨約琨知石勒無降意乃大懼降戶江翻上表曰東北八州勒滅其七勒入鄴殺都督東燕王騰寇信都殺冀州刺史王斌襲鄄城殺兗州刺史袁孚攻新蔡殺豫州刺史新蔡王確襲蒙城擒青州都督苟晞克上白斬青州刺史李惲攻信都殺冀州刺史王象攻定陵殺兗州刺史田徽襲幽州擒王浚除李惲田徽王浚承制所授是滅其七也存者惟臣朝直遙翻勒據襄國與臣隔山山自太行恆山至于幽碣連延不斷襄國在山東晉陽在山西城塢駭懼雖懷忠憤力不從願耳劉翰不欲從石勒乃歸段匹磾匹磾遂據薊城磾丁奚翻王浚從事中郎陽裕躭之兄子也逃奔令支令支縣漢屬遼西故孤竹君之國晉省段氏據之為國都應劭曰令音鈴裴松之曰支其兒翻師古曰令又音郎定翻杜佑曰令支今北平郡盧龍縣即其地會稽朱左車魯國孔纂泰山胡母翼自薊逃奔昌黎依慕容廆會工外翻廆戶罪翻是時中國流民歸廆者數萬家廆以冀州人為冀陽郡據魏收地形志冀陽郡當置於漢北平平剛縣界成周屬豫州之地故以為郡名前漢志遼西臨渝縣有渝水首受白狼水南流逕營丘城西廆所置郡也幷州古唐國也廆因以名郡成周唐國二郡所置地闕建興二年初王浚以邵續為樂陵太守屯厭次厭次本前漢平原郡之富平縣後漢明帝更名厭次晉分屬樂陵為治所丁度集韻厭於琰翻九域志曰相傳秦始皇東遊厭氣碣石次舍於此因以為名魏收曰樂陵郡厭次縣有富城邵續居之續附於石勒勒以續子乂為督護浚所署勃海太守東萊劉胤棄郡依續謂續曰凡立大功必杖大義君晉之忠臣柰何從賊以自汙乎汙烏故翻會段匹磾以書邀續同歸左丞相睿續從之其人皆曰今棄勒歸匹磾其如乂何續泣曰我豈得顧子而為叛臣哉殺異議者數人勒聞之殺乂續遣劉胤使江東使疏吏翻睿以胤為參軍以續為平原太守石勒遣兵圍續匹磾使其弟文鴦救之勒引去建興二年襄國大饑穀二升直銀一斤肉一斤直銀一兩建興二年杜弢將王真襲陶侃於林障水經註林障在江夏沌陽縣沔水逕沌陽縣北又東逕林障故城北宋白曰晉江夏郡治林障義熙元年方徙夏口周訪救侃擊弢兵破之灄書涉翻丁度曰灄水名在西陽水經註溳水過江夏安陸縣而東南流分為二水東通灄水西入于沔建興二年夏五月西平武穆公張軌寢疾遺令文武將佐務安百姓上思報國下以寧家己丑軌薨考異曰帝紀作壬辰今從前涼錄鈔前涼錄鈔又曰葬建陵蓋張祚僭號後追尊其墓耳璽斯氏翻建興二年漢中山王曜趙染寇長安六月曜屯渭汭春秋左氏傳曰虢公敗戎于渭汭杜預曰水之隈曲曰汭王肅曰汭入也呂忱曰汭者水相入也即渭水入河處汭儒稅翻索綝將兵出拒之索昔各翻綝丑林翻染有輕綝之色長史魯徽曰晉之君臣自知強弱不敵將致死於我不可輕也染曰以司馬模之強吾取之如拉朽事見八十七卷懷帝永嘉五年拉落合翻豈能汙吾馬蹄刀刃邪晨帥輕騎數百逆之汙烏故翻帥讀曰率下同曰要當獲綝而後食綝與戰于城西新豐城西也悔曰吾不用魯徽之言以至此何面目見之先命斬徽徽曰將軍愚愎以取敗乃復忌前害勝復扶又翻下同愎弼力翻忌前忌人在前害勝害勝己者誅忠良以逞忿猶有天地將軍其得死於枕席乎詔加索綝驃騎大將軍尚書左僕射錄尚書承制行事驃匹妙翻曜染復與將軍殷凱帥衆數萬向長安考異曰晉春秋作段凱今從麴允傳允敗收兵夜襲凱營凱敗死曜乃還攻河內太守郭默于懷列三屯圍之默食盡送妻子為質請糴於曜糴畢復嬰城固守曜怒沈默妻子于河而攻之質音致沈持林翻默欲投李矩於新鄭新鄭縣漢屬河南郡晉省其地當在滎陽郡界周宣王弟鄭桓公本封京兆之鄭縣其子武公邑于虢鄶之間遂為鄭國左傳鄭莊公曰吾先君新邑于此後遂為新鄭縣以別京兆之鄭兵少不敢進少詩照翻會劉琨遣參軍張肇帥鮮卑五百餘騎詣長安道阻不通還過矩營矩說肇使擊漢兵說輸芮翻漢兵望見鮮卑不戰而走默遂率衆歸矩漢主聰召曜還屯蒲坂建興二年秋趙染攻北地麴允拒之染中弩而死中竹仲翻建興二年石勒始命州郡閱實戶口戶出帛二匹穀二斛建興二年冬十月以張寔為都督涼州諸軍事涼州刺史西平公建興二年十一月漢主聰以晉王粲為相國大單于總百揆粲少有俊才自為宰相驕奢專恣遠賢親佞嚴刻愎諫國人始惡之為後粲為靳準所弒張本少詩照翻遠于願翻惡烏路翻建興二年周勰以其父遺言見上卷建興元年勰音協謀作亂使吳興功曹徐馥矯稱叔父丞相從事中郎札之命收合徒衆以討王導刁協豪傑翕然附之孫晧族人弼亦起兵於廣德以應之沈約曰廣德縣疑是吳所立屬宣城郡按今廣德軍即其地宋白曰廣德縣本秦障郡地漢以為故障縣三年三年春正月徐馥殺吳興太守袁琇琇音秀又音酉有衆數千欲奉周札為主札聞之大驚以告義興太守孔侃勰知札意不同不敢發馥黨懼攻馥殺之孫弼亦死札子續亦聚衆應馥左丞相睿議發兵討之王導曰今少發兵則不足以平寇少詩照翻多發兵則根本空虛續族弟黃門侍郎莚莚夷然翻忠果有謀請獨使莚往足以誅續睿從之莚晝夜兼行至郡將入遇續於門謂續曰當與君共詣孔府君有所論續不肯入莚牽逼與俱坐定莚謂孔侃曰府君何以置賊在坐坐徂臥翻續衣中常置刀即操刀逼莚操千高翻莚叱郡傳教吳曾格殺之傳教郡吏也宣傳教令者也札不聽委罪於從兄卲而誅之莚不歸家省母從才用翻省悉景翻遂長驅而去母狼狽追之睿以札為吳興太守莚為太子右衞率以周氏吳之豪望故不窮治撫勰如舊率如字治直之翻三年詔平東將軍宋哲屯華陰華陰縣前漢屬京兆後漢晉屬弘農郡華戶化翻三年成主雄立后任氏三年二月丙子以琅邪王睿為丞相大都督督中外諸軍事南陽王保為相國荀組為太尉領豫州牧劉琨為司空都督幷冀幽三州諸軍事琨辭司空不受三年南陽王模之敗也見八十七卷懷帝永嘉五年保命安將千餘人討叛羌寵待甚厚保將張春疾之譖安云有異志請除之保不許春輒伏刺客以刺安安被創馳還隴城隴縣城也前漢屬天水後漢改天水為漢陽晉省以刺七亦翻被皮義翻創初良翻貢獻不絕使疏吏翻三年詔進拓跋猗盧爵為代王置官屬食代常山二郡常山已為石勒所有拓跋氏建國曰代始此姓譜莫姓楚莫敖之後含不欲行琨曰以幷州單弱吾之不材而能自存於胡羯之間者代王之力也吾傾身竭貲以長子為質而奉之者庶幾為朝廷雪大恥也琨以長子遵質於猗盧長知兩翻幾居希翻柰何惜共事之小誠而忘徇國之大節乎往事代王為之腹心乃一州之所賴也含遂行猗盧甚重之常與參大計猗盧用法嚴國人犯法者或舉部就誅老幼相攜而行人問何之曰往就死無一人敢逃匿者三年王敦遣陶侃甘卓等討杜弢前後數十戰弢將士多死乃請降於丞相睿弢土刀翻將即亮翻降戶江翻睿不許弢遺南平太守應詹書遺于季翻自陳昔與詹共討樂鄉本同休戚後在湘中懼死求生遂相結聚見八十七卷懷帝永嘉五年為明枉直為于偽翻下同使得輸誠盟府時琅邪王睿為東南方鎮盟主故曰盟府或北清中原或西取李雄以贖前愆雖死之日猶生之年也詹為啟呈其書且言弢益州秀才羅尚刺益州舉弢秀才為于偽翻為鄉人所逼今悔惡歸善宜命使撫納以息江湘之民使疏吏翻睿乃使前南海太守王運受弢降赦其反逆之罪以弢為巴東監軍監工衡翻弢既受命諸將猶攻之不已弢不勝憤怒遂殺運復反勝音升復扶又翻遣其將杜弘張彥殺臨川內史謝摛吳孫亮太平二年分豫章東部都尉立臨川郡摛丑之翻三月周訪擊彥斬之弘奔臨賀臨賀縣漢屬蒼梧郡吳分立臨賀郡三年漢大赦改元建元考異曰十六國春秋建元元年在晉建興二年同編脩劉恕言今晉州臨汾縣嘉泉村有漢太宰劉雄碑云嘉平五年歲在乙亥二月六日立然則改建元在乙亥二月後也三年雨血於漢東宮延明殿太弟义惡之以問太傅崔瑋太保許遐瑋遐說义曰雨于具翻惡烏路翻說輸芮翻主上往日以殿下為太弟者欲以安衆心耳其志在晉王久矣聰子粲封晉王今復以晉王為相國羽儀威重踰於東宮萬機之事無不由之諸王皆置營兵以為羽翼事見上年殿下非徒不得立也朝夕且有不測之危不如早為之計今四衞精兵不減五千謂東宮左右前後四衞率所統兵也正煩一刺客耳佻他彫翻大將軍無日不出其營可襲而取粲弟勃海王敷時為大將軍固易奪也易以豉翻苟殿下有意二萬精兵指顧可得鼓行入雲龍門宿衞之士孰不倒戈以迎殿下者大司馬不慮其為異也大司馬謂中山王曜東宮舍人荀裕告瑋遐勸义謀反東宮舍人太子舍人之職义以太弟居東宮假以他事殺之使冠威將軍卜抽將兵監守東宮冠古玩翻監工銜翻禁义不聽朝會朝直遙翻义憂懼不知所為上表乞為庶人幷除諸子之封褒美晉王請以為嗣抽抑而弗通三年漢青州刺史曹嶷盡得齊魯間郡縣嶷魚力翻自鎮臨菑有衆十餘萬臨河置戍石勒表稱嶷有專據東方之志請討之漢主聰恐勒滅嶷不可復制復扶又翻下同弗許聰納中護軍靳準二女月光月華靳居丨欣翻劉貴為左皇后月華為右皇后左司隸陳元達極諫聰置左右司隸並立三后非禮也聰不悅以元達為右光祿大夫外示優崇實奪其權於是太尉范隆等皆請以位讓元達聰乃復以元達為御史大夫儀同三司月光有穢行行下孟翻元達奏之聰不得已廢之月光慙恚自殺恚於避翻聰恨元達三年夏四月大赦三年六月盜發漢霸杜二陵及薄太后陵漢薄太后葬南陵在霸陵之南詔章甲十一行本詔上有朝廷以用度不足七字乙十一行本同孔本同張校同退齋校同收其餘以實內府三年辛巳大赦三年漢大司馬曜攻上黨八月癸亥敗劉琨之衆於襄垣曜欲進攻陽曲襄垣縣屬上黨郡陽曲琨所居也敗補邁翻使疏吏翻長安未平宜以為先曜乃還屯蒲坂三年陶侃與杜弢相攻弢使王貢出挑戰挑徒了翻侃遙謂之曰杜弢為益州小吏盜用庫錢父死不奔喪卿本佳人何為隨之天下寧有白頭賊邪言為賊者不得至老聞侃言斂容下腳侃知可動復遣使諭之截髮為信貢遂降於侃貢叛侃見上卷元年降戶江翻下同遁走道死考異曰弢傳云弢逃遁不知所在晉春秋云城潰弢投水死今從帝紀長沙杜弢之巢穴也丞相睿承制赦其所部進王敦鎮東大將軍加都督江揚荊湘交廣六州諸軍事江州刺史敦始自選置刺史以下寖益驕橫橫戶孟翻初王如之降也見上卷懷帝永嘉六年從才用翻驍堅堯翻請敦配己麾下敦曰此輩險悍難畜悍下罕翻又侯旰翻畜許六翻汝性狷急狷吉掾翻不能容養更成禍端稜固請乃與之稜置左右甚加寵遇如數與敦諸將角射爭鬬數所角翻稜杖之如深以為恥及敦潛畜異志稜每諫之敦怒其異己密使人激如令殺稜如因閒宴請劍舞為歡稜許之如舞劍漸前稜惡而呵之惡烏路翻如直前殺稜敦聞之陽驚亦捕如誅之三年初朝廷聞張光死光死見上卷元年考異曰周訪傳云征南大將軍今從杜曾傳監工銜翻自武關出杜曾迎猗於襄陽為兄子娶猗女為于偽翻遂聚兵萬人與猗分據漢沔陶侃既破杜弢乘勝進擊曾有輕曾之志司馬魯恬諫曰凡戰當先料其將今使君諸將無及曾者未易可逼也易以豉翻侃不從進圍曾於石城水經註沔水南逕石城西城因山為固晉羊祜鎮荊州立晉惠帝元康九年分江夏西部都尉置竟陵郡治石城今郢州長壽縣即其地騎奇寄翻密開門突侃陳陳讀曰陣出其後反擊之侃兵死者數百人曾將趨順陽趨七喻翻下馬拜侃告辭而去時荀崧都督荊州江北諸軍事屯宛江當作沔宛於元翻崧兵少食盡少詩照翻欲求救於故吏襄城太守石覽崧小女灌年十三帥勇士數十人帥讀曰率下同踰城突圍夜出且戰且前遂達覽所又為崧書求救於南中郎將周訪訪遣子撫帥兵三千與覽共救崧曾乃遁去曾復致牋於崧求討丹水賊以自效丹水縣前漢屬弘農郡後漢屬南陽郡晉屬順陽郡賢曰丹水故城在今鄧州內鄉縣西南臨丹水復扶又翻下同陶侃遺崧書曰杜曾凶狡所謂鴟梟食母之物梟堅堯翻一曰流離爾雅作鶹黎鳥陸璣草木疏曰梟也關西人謂之流離大則食其母爾雅有茅鴟今鴟鳩也似鷹而白怪鴟即鴟鵂也梟鴟土梟也孔穎達曰鴞惡聲之鳥一名鵩與梟一名鴟詩瞻卬云為鴟為梟是也俗說以為土梟非也陸璣疏云鴞大如班鳩綠色惡聲之鳥也入人家凶賈誼所謂服鳥是也其肉甚美可為羹又可為炙漢供御物各隨其時唯鴞冬夏常施之以其美故也遺于季翻此人不死州土未寧足下當識吾言識職吏翻記也崧以宛中兵少藉曾為外援不從曾復帥流亡二千餘人圍襄陽數日不克而還三年王敦嬖人吳興錢鳳疾陶侃之功屢毀之嬖卑義翻又博計翻侃將還江陵欲詣敦自陳朱伺及安定皇甫方回諫曰公入必不出侃不從既至敦留侃不遣左轉廣州刺史以其從弟丞相軍諮祭酒廙為荊州刺史從才用翻廙逸職翻又羊至翻荊州將吏鄭攀馬雋等詣敦上書留侃敦怒不許攀等以侃始滅大賊而更被黜謂滅杜弢也惋烏貫翻又以廙忌戾難事遂帥其徒三千人屯溳口水經註溳水出蔡陽縣東南過隨縣又南過江夏安陸縣又東南分為二水西入于沔者謂之溳口溳音云西迎杜曾廙為攀等所襲奔于江安江安縣屬南平郡武帝太康元年分孱陵置廙督諸軍討曾復為曾所敗敦意攀承侃風旨被甲持矛將殺侃出而復還者數四敗補邁翻被皮義翻復扶又翻侃正色曰使君雄斷當裁天下斷丁亂翻何此不決乎因起如廁諮議參軍梅陶長史陳頒言於敦曰周訪與侃親姻如左右手訪與侃結友以女妻侃子瞻斷丁管翻敦意解乃設盛饌以餞之饌雛戀翻又雛晥翻侃便夜發敦引其子瞻為參軍初交州刺史顧祕卒州人以祕子壽領州事帳下督梁碩起兵攻壽殺之碩遂專制交州王機自以盜據廣州見上卷懷帝永嘉六年更求交州會杜弘詣機降杜弘杜弢將也弢敗弘走降機降戶江翻下同乃以降杜弘為機功轉交州刺史機至鬱林鬱林秦桂林郡地漢武帝平南越更置鬱林郡唐潯州桂平縣古鬱林郡所治布山縣地也機不得進乃更與杜弘及廣州將溫卲交州秀才劉沈謀復還據廣州陶侃至始興吳孫晧甘露元年分桂陽南部都尉立始興郡治漢曲江縣唐為韶州沈持林翻不可輕進侃不聽直至廣州廣州治南海郡番禺縣杜弘遣使偽降侃知其謀進擊弘破之遂執劉沈於小桂秦置桂林郡漢武帝改曰鬱林郡治布山桂林為縣屬焉吳孫晧鳳凰三年分立桂林郡因謂桂林為小桂陶弘景曰始興桂陽縣即是小桂走之機病死于道高掘其尸斬之諸將皆請乘勝擊溫卲侃笑曰吾威名已著何事遣兵但一函紙自定耳乃下書諭之卲懼而走追獲於始興杜弘詣王敦降廣州遂平侃在廣州無事輒朝運百甓於齋外甓蒲歷翻瓴甋也暮運於齋內人問其故答曰吾方致力中原過爾優逸恐不堪事故自勞耳王敦以杜弘為將寵任之三年九月漢主聰使大鴻臚賜石勒弓矢策命勒為陝東伯陝失冉翻得專征伐拜刺史將軍守宰封列侯歲盡集上上時掌翻集其所授官爵及其人之姓名而上之三年漢大司馬曜寇北地詔以麴允為大都督驃騎將軍以禦之驃匹妙翻騎奇寄翻冬十月以索綝為尚書僕射都督宮城諸軍事曜進拔馮翊太守梁肅奔萬年秦櫟陽縣漢高祖改曰萬年屬馮翊晉屬京兆麴允去黃白城軍于靈武漢北地郡之靈武縣也不敢進帝屢徵兵於丞相保保左右皆曰蝮虵螫手壯士斷腕漢書齊王曰蝮蠚手則斬手蓋以為不如此則流毒於一身至於死也螫音釋斷丁管翻下同腕烏貫翻且宜斷隴道以觀其變從事中郎裴詵曰今虵已螫頭頭可斷乎保乃以鎮軍將軍胡崧行前鋒都督須諸軍集乃發麴允欲奉帝往就保索綝曰保得天子必逞其私志乃止於是自長安以西不復貢奉朝廷復扶又翻百官飢乏採禾呂以自存禾呂音呂禾自生曰禾呂三年涼州軍士張冰得璽文曰皇帝行璽獻於張寔僚屬皆賀寔曰是非人臣所得留遣使歸于長安晉諸征鎮能知君臣之分者張氏父子而已璽斯氏翻四年四年春正月司徒梁芬議追尊吳王晏右僕射索綝等引魏明帝詔以為不可魏明帝詔見七十一卷太和三年諡曰孝考異曰本傳晏諡敬王今從愍帝紀四年漢中常侍王沈宣懷中宮僕射郭猗等沈持林翻皆寵幸用事漢主聰游宴後宮或三日不醒或百日不出自去冬不視朝政事一委相國粲唯殺生除拜乃使沈等入白之沈等多不白而自以其私意決之故勳舊或不敍而姦佞小人有數日至二千石者軍旅歲起將士無錢帛之賞而後宮之家賜及僮僕動至數千萬沈等車服第舍踰於諸王子弟中表為守令者三十餘人皆貪殘為民害謂他姓與沈等子弟有中表親者沈持林翻守式又翻郭猗與準皆有怨於太弟义猗謂相國粲曰殿下光文帝之世孫主上之嫡子四海莫不屬心屬之欲翻柰何欲以天下與太弟乎且臣聞太弟與大將軍謀因三月上巳大宴作亂事成許以主上為太上皇大將軍為皇太子又許衞軍為大單于聰以子驥為大將軍子勱為衞大將軍皆粲弟也又按時以子敷為大將軍敷卒後乃以驥為之處昌呂翻並握重兵以此舉事無不成者然二王貪一時之利不顧父兄事成之後主上豈有全理殿下兄弟固不待言東宮相國單于當在武陵兄弟何肯與人也武陵兄弟當是义之諸子相息亮翻單音蟬宜早圖之臣屢言於主上主上篤於友愛以臣刀鋸之餘終不之信願殿下勿泄密表其狀殿下儻不信臣可召大將軍從事中郎王皮衞軍司馬劉惇假之恩意許其歸首首式救翻以問之必可知也粲許之猗密謂皮惇曰二王逆狀主上及相國具知之矣卿同之乎二人驚曰無之猗曰茲事已決吾憐卿親舊幷見族耳因歔欷流涕歔音虛欷許既翻又音希二人大懼叩頭求哀猗曰吾為卿計卿能用之乎相國問卿卿但云有之若責卿不先啟卿即云臣誠負死罪然仰惟主上寬仁殿下敦睦苟言不見信則陷於誣譖不測之誅故不敢言也皮惇許諾粲召問之二人至不同時而其辭若一粲以為信然靳準復說粲曰殿下宜自居東宮時义居東宮復扶又翻使天下早有所繫今道路之言皆云大將軍衞將軍欲奉太弟為變期以季春若使太弟得天下殿下無容足之地矣粲曰為之柰何準曰人告太弟為變主上必不信宜緩東宮之禁使賓客得往來太弟雅好待士好呼到翻必不以此為嫌輕薄小人不能無迎合太弟之意為之謀者然後下官為殿下露表其罪為于偽翻殿下收其賓客與太弟交通者考問之獄辭既具則主上無不信之理也粲乃令卜抽引兵去東宮去年聰令卜抽將兵監守東宮少府陳休左衞將軍卜崇為人清直素惡沈等惡烏路翻下同雖在公座未嘗與語沈等深疾之侍中卜幹謂休崇曰王沈等勢力足以回天地卿輩自料親賢孰與竇武陳蕃言陳蕃之賢竇武之親且為宦官所困況休崇等乎吾輩年踰五十職位已崇唯欠一死耳死於忠義乃為得所安能俛首互眉以事閹豎乎互與低同音都黎翻去矣卜公勿復有言復扶又翻下同二月漢主聰出臨上秋閤殿之西閤也嚴諧改誕並誅之皆宦官所惡也卜幹泣諫曰陛下方側席求賢而一旦戮卿大夫七人皆國之忠良無乃不可乎藉使休等有罪陛下不下之有司下戶嫁翻暴明其狀天下何從知之詔尚在臣所未敢宣露卜幹為侍中詔經門下因留之而諫因叩頭流血王沈叱幹曰卜侍中欲拒詔乎聰拂衣而入免幹為庶人太宰河間王易考異曰晉春秋易作士通今從載記王沈等矯弄詔旨欺誣日月內諂陛下外佞相國威權之重侔於人主多樹姦黨毒流海內知休等忠臣為國盡節為于偽翻恐發其姦狀故巧為誣陷陛下不察遽加極刑痛徹天地徹敕列翻通也賢愚傷懼今遺晉未殄巴蜀不賓石勒謀據趙魏曹嶷欲王全齊嶷魚力翻王于況翻陛下心腹四支何處無患乃復以沈等助亂誅巫咸戮扁鵲臣恐遂成膏肓之疾馬融曰巫咸殷巫也扁鵲古良醫也秦醫緩視晉侯曰疾不可為也居膏之上肓之下攻之不可達之不及藥不至焉杜預曰心下為膏肓鬲也徐曰肓音荒說文曰心下鬲上也扁補典翻不可及已請免沈等官付有司治罪治直之翻聰以表示沈等笑曰㣥兒為元達所引遂成癡也沈等頓首泣曰臣等小人過蒙陛下識拔得灑掃閨閤而王公朝士疾臣等如讎又深恨陛下願以臣等膏鼎鑊膏居號翻潤也則朝廷自然雍穆矣聰曰此等狂言常然卿何足恨乎聰問沈等於相國粲粲盛稱沈等忠清聰悅封沈等為列侯太宰易又詣闕上疏極諫聰大怒手壞其疏壞音怪三月易忿恚而卒易素忠直陳元達倚之為援得盡諫諍及卒元達哭之慟曰人之云亡邦國殄悴詩大雅瞻卬之辭悴秦醉翻安用默默苟生乎歸而自殺四年初代王猗盧愛其少子比延欲以為嗣使長子六脩出居新平城而黜其母建興元年猗盧築新平城新平城唐謂之新城在朔州界少詩照翻長知兩翻日行五百里猗盧奪之以與比延六脩來朝朝直遙翻猗盧使拜比延六脩不從猗盧乃坐比延於其步輦步輦不駕馬使人輓之從才用翻出遊六脩望見以為猗盧伏謁路左至乃比延六脩慙怒而去猗盧召之不至大怒帥衆討之為六脩所敗帥讀曰率敗補邁翻猗盧微服逃民間有賤婦人識之遂為六脩所弒拓跋普根先守外境聞難來赴攻六脩滅之難乃旦翻普根代立國中大亂新舊猜嫌迭相誅滅左將軍衞雄信義將軍箕澹澹徒覽翻又徒濫翻久佐猗盧為衆所附謀歸劉琨乃言於衆曰聞舊人忌新人悍戰舊人索頭部人也新人晉人及烏桓人也悍侯旰翻又下罕翻將柰何晉人及烏桓皆驚懼曰死生隨二將軍乃與琨質子遵帥晉人及烏桓三萬家馬牛羊十萬頭歸于琨質音致帥讀曰率下同琨大喜親詣平城撫納之琨兵由是復振夏四月普根卒其子始生普根母惟氏立之惟氏猗㐌之妻四年張寔下令所部吏民有能舉其過者賞以布帛羊米賊曹佐高昌隗瑾曰自漢以來公府方州郡國諸曹有掾有屬有佐史前漢書西域傳車師國有高昌壁唐書曰高昌國漢車師前王庭也後破高昌置西州觀此則河西張氏固嘗於高昌之地置郡縣至後魏時始為高昌國也隗五罪翻今明公為政事無巨細皆自決之或興師發令府朝不知府朝謂僚佐所集之處朝直遙翻謗無所分㣥下畏威受成而已如此雖賞之千金終不敢言也謂宜少損聰明少詩照翻凡百政事皆延訪㣥下使各盡所懷然後采而行之則嘉言自至何必賞也寔悅從之增瑾位三等寔遣將軍王該帥步騎五千入援長安且送諸郡貢計貢土物也計計帳也陝失冉翻以寔弟茂為秦州刺史四年石勒使石虎攻劉演于廩丘幽州刺史段匹磾使其弟文鴦救之磾丁奚翻虎拔廩丘演奔文鴦軍虎獲演弟啟以歸四年寧州刺史王遜嚴猛喜誅殺喜許記翻五月平夷太守雷炤懷帝永嘉五年遜表分牂柯朱提建寧立平夷郡即漢平夷鄨二縣之地鄨孟康音鱉平樂郡證以隋志蓋置於越巂郡之邛部川然不知誰所置也樂音洛降於成帥讀曰率降戶江翻四年六月丁巳朔日有食之四年秋七月漢大司馬曜圍北地太守麴昌晉北地郡領泥陽富平二縣耳曜遶城縱火煙起蔽天使反間紿允曰郡城已陷往無及也衆懼而潰曜追敗允於磻石谷間古莧翻敗補邁翻磻蒲官翻魏收地形志北地郡銅官縣有石槃山允奔還靈武曜遂取北地允性仁厚無威斷斷丁亂翻喜以爵位悅人喜許記翻新平太守竺恢始平太守楊像扶風太守竺爽安定太守焦嵩皆領征鎮杖節加侍中常侍村塢主帥小者猶假銀青將軍之號征鎮四征四鎮將軍號也銀青將軍加將軍號而假以銀印青綬帥音所類翻故諸將驕恣而士卒離怨關中危亂允告急於焦嵩嵩素侮允曰須允困當救之曜進至涇陽渭北諸城悉潰涇陽縣前漢屬安定郡班志曰幵頭山在縣西禹貢涇水所出東北至陽陵入渭過郡三行千六十里此言曜至涇陽渭北諸城悉潰則其兵已在池陽陽陵二縣間言在涇水之陽非安定之涇陽縣也曜素聞充賢募生致之既見賜之酒曰吾得子天下不足定也充曰身為晉將國家喪敗不敢求生緯于貴翻將子亮翻喪息浪翻若蒙公恩速死為幸曜曰義士也賜之劍令自殺梁緯妻辛氏美色曜召見將妻之妻如字妾夫已死義不獨生且一婦人而事二夫明公又安用之曜曰貞女也亦聽自殺皆以禮葬之四年漢主聰立故張后侍婢樊氏為上皇后三后之外佩皇后璽綬者復有七人璽斯氏翻綬音受復扶又翻下同據載記三后二靳氏及劉氏樊氏為四考異曰劉聰載記曰四后之外按時靳上皇后已死唯三后耳云四誤也嬖寵用事刑賞紊亂嬖卑義翻又博計翻紊音問大將軍敷數涕泣切諫數所角翻聰怒曰汝欲乃公速死邪何以朝夕生來哭人敷憂憤發病卒河東平陽大蝗民流殍者什五六石勒遣其將石越帥騎二萬屯幷州招納流民殍被表翻餓死於中野者曰殍散而之他方者曰流時勒蓋遣越屯上黨招納幷州統內也帥讀曰率騎奇寄翻民歸之者二十萬戶聰遣使讓勒勒不受命潛與曹嶷相結嶷魚力翻四年八月漢大司馬曜逼長安四年九月漢主宴㣥臣於光極殿引見太弟义見賢遍翻义容貌憔悴鬢髮蒼然涕泣陳謝聰亦為之慟哭悴秦醉翻為于偽翻乃縱酒極歡待之如初四年焦嵩竺恢宋哲皆引兵救長安散騎常侍華輯監京兆馮翊弘農上洛四郡兵屯霸上華戶化翻監古銜翻皆畏漢兵強不敢進相國保遣胡崧將兵入援擊漢大司馬曜於靈臺破之三輔黃圖周文王靈臺在長安西四十里高二丈周回百二十步麴允索綝也索昔各翻遂還槐里槐里縣漢屬扶風晉屬始平郡曜攻陷長安外城麴允索綝退保小城以自固內外斷絕城中飢甚米斗直金二兩人相食死者太半亡逃不可制唯涼州義衆千人守死不移涼州義衆張軌父子所遣兵也麥并麥并必郢翻麴允屑之為粥以供帝既而亦盡冬十一月帝泣謂允曰今窮厄如此外無救援當忍恥出降以活士民降戶江翻下同因歎曰誤我事者麴索二公也使侍中宗敞送降牋於曜考異曰帝紀作宋敞今從晉春秋使其子說曜曰今城中食猶足支一年未易克也說輸芮翻易以豉翻若許綝以章甲十一行本以下有車騎二字乙十一行本同張校同云無註本亦無儀同萬戶郡公者請以城降曜斬而送之曰帝王之師以義行也孤將兵十五年未嘗以詭計敗人敗補邁翻必窮兵極勢然後取之今索綝所言如此天下之惡一也輒相為戮之為于偽翻若兵食審未盡者便可勉強固守強其兩翻如其糧竭兵微亦宜早寤天命甲午宗敞至曜營乙未帝乘羊車肉袒銜璧輿櫬出東門降櫬初覲翻㣥臣號泣攀車執帝手帝亦悲不自勝號戶刀翻勝音升御史中丞馮翊吉朗歎曰吾智不能謀勇不能死何忍君臣相隨北面事賊虜乎乃自殺曜焚櫬受璧使宗敞奉帝還宮丁酉遷帝及公卿以下於其營辛丑送至平陽壬寅漢主聰臨光極殿帝稽首於前稽音啟麴允伏地慟哭扶不能起聰怒囚之允自殺聰以帝為光祿大夫封懷安侯以大司馬曜為假黃鉞大都督督陝西諸軍事太宰封秦王大赦改元麟嘉以麴允忠烈贈車騎將軍諡節愍侯允則忠矣然猶在吉朗之後乎斬于都市平陽都市也華輯奔南山干寶論曰昔高祖宣皇帝以雄才碩量應時而起性深阻有若城府而能寬綽以容納行數術以御物而知人善采拔言胸中有城府者多不能寬容任數用術者多不能用人而宣帝能之也謂天下皆推其能莫與爭也劉良曰象法也言晉之興成大法從此始立也太祖繼業咸黜異圖用融前烈謂內誅李豐夏侯玄外平毌丘儉文欽諸葛誕遂享皇極呂延濟曰享當也皇極天子位也儉以足用和而不弛寬而能斷斷丁亂翻掩唐虞之舊域班正朔於八荒八荒謂八方之外戎荒之地天下無窮人之諺呂向曰言百姓盡富亦足以明民樂其生矣樂音洛武皇既崩山陵未乾而變難繼起宗子無維城之助乾音干宗子謂八王搆難詩曰宗子維城師尹無具瞻之貴詩曰赫赫師尹民具爾瞻夕成桀跖謂楊駿衞瓘張華等禁兵外散於四方方岳無鈞石之鎮關門無結草之固三十斤為鈞四鈞為石左傳秦伐晉晉魏顆敗秦師獲杜回顆夢老人結草以亢杜回杜回躓而顛故獲之二帝失尊何哉樹立失權託付非才四維不張而苟且之政多也賈誼策曰禮義廉恥是謂四維四維不張國乃滅亡夫基廣則難傾根深則難拔理節則不亂膠結則不遷李周翰曰理節謂政教有條理節度也膠固也言君布仁惠之根基深廣又不失理節則人心固結而不可遷也用此道也周自后稷愛民十六王而武始君之后稷子不窋不窋子鞠鞠子公劉公劉子慶節慶節子皇僕皇僕子差弗差弗子毀隃毀隃子公非公非子高圉高圉子亞圉亞圉子公叔祖類公叔祖類子古公亶父古公亶父子季歷季歷子文王文王子武王凡十六王如此其固今晉之興也其創基立本固異於先代矣加以朝寡純德之人鄉乏不貳之老周官有鄉老不貳謂不貳過者朝直遙翻恥尚失所言所恥者非所恥所尚者非所尚也談者以虛蕩為辨而賤名檢行身者以放濁為通而狹節信進仕者以苟得為貴而鄙居正當官者以望空為高而笑勤恪呂延濟曰望空謂不識是非但望空署名而已傅咸每糾邪正頌咸事並見武紀惠紀治直吏翻其倚杖虛曠依阿無心者皆名重海內若夫文王日昃不暇食仲山甫夙夜匪懈者蓋共嗤黜以為灰塵矣文王自朝至于日中昃不遑暇食用咸和萬民仲山甫夙夜匪懈以事一人情慝奔於貨欲之塗選者為人擇官官者為身擇利呂延濟曰言選者不復為官擇賢為官者但擇所利而趨譽音余為于偽翻陵邁超越不拘資次悠悠風塵皆奔競之士列官千百無讓賢之舉子真著崇讓而莫之省劉寔字子真崇讓論見八十二卷武帝太康十年省悉景翻劉頌字子雅九班之制見同上任情而動有逆干舅姑有殺戮妾媵二事皆賈后為之倡天下莫之非也禮法刑政於此大壞國之將亡本必先顛其此之謂乎左傳曰國將亡本必先顛而後枝葉從之故觀阮籍之行而覺禮教崩弛之所由事見七十八卷魏元帝景元三年行下孟翻事見七十九卷武帝泰始七年八年思郭欽之謀而寤戎狄之有釁平吳爭功及郭欽疏並見八十一卷武帝太康元年傅玄劉毅武帝時為司隸前後糾核不避貴游因其所言而得百官之邪也傅咸奏見八十二卷惠帝元康四年錢神論見八十三卷元康九年既已如此雖以中庸之才守文之主治之劉良曰中庸謂非賢非愚之才守文謂守常平治世之主也治直之翻況我惠帝以放蕩之德臨之哉懷帝承亂即位羈以強臣愍帝奔播之後徒守虛名天下之勢既去非命世之雄材不能復取之矣四年石勒圍樂平太守韓據于坫城楊正衡曰坫丁念翻余按武帝泰始中分上黨太原置樂平郡治沾縣沾縣漢屬上黨郡魏收地形志樂平縣有沾城師古曰沾音他兼翻載記誤作坫當讀從顏音據請救於劉琨琨新得拓跋猗盧之衆欲因其銳氣以討勒箕澹衞雄諫曰澹徒覽翻又徒濫翻此雖晉民久淪異域未習明公之恩信恐其難用不若且內收鮮卑之餘穀拓跋鮮卑也胡謂劉石也抄禁交翻務農息兵待其服化感義然後用之則功無不濟矣琨不從悉發其衆命澹帥步騎二萬為前驅琨屯廣牧為之聲援廣牧縣漢屬朔方郡漢末省朔方置廣牧縣於陘南屬新興郡非廣牧縣故地也帥讀曰率石勒聞澹至將逆擊之或曰澹士馬精強其鋒不可當不若且引兵避之深溝高壘以挫其銳必獲萬全勒曰澹兵雖衆遠來疲弊號令不齊何精強之有今寇敵垂至何可捨去大軍一動豈易中還易以豉翻若澹乘我之退而逼之顧逃潰不暇焉得深溝高壘乎焉於虔翻此自亡之道也立斬言者以孔萇為前鋒都督令三軍後出者斬勒據險要設疑兵於山上前設二伏出輕騎與澹戰陽為不勝而走澹縱兵追之入伏中勒前後夾擊澹軍大破之獲鎧馬萬計澹雄帥騎千餘奔代郡帥讀曰率下同韓據棄城走幷土震駭四年十二月乙卯朔日有食之考異曰帝紀天文志皆誤作甲申朔宋志乙卯朔與長曆合今從之四年司空長史李弘以幷州降石勒劉琨為司空以弘為長史幷州時治陽曲不知所為段匹磾遣信邀之己未琨帥衆從飛狐奔薊恆山在常山上曲陽縣西北有阪號飛狐口磾丁奚翻薊音計甚相親重與之結婚約為兄弟勒分徙陽曲樂平民于襄國置守宰而還孔萇攻箕澹于代郡殺之據載記萇攻澹於桑乾則此代郡乃後魏之代郡非漢晉之代郡也萇等攻賊帥馬嚴馮月者帥所類翻月者張如翻嚴月者蓋為盜於幽冀之間久而不克司冀幷兗流民數萬戶在遼西迭相招引民不安業勒問計於濮陽侯張賓賓曰嚴月者本非公之深仇流民皆有戀本之志今班師振旅選良牧守使招懷之則幽冀之寇可不日而清遼西流民將相帥而至矣勒乃召萇等歸以武遂令李回為易北督護兼高陽太守武遂縣前漢屬河間國後漢晉屬安平國易北易水以北也高陽縣前漢屬涿郡後漢屬河間國武帝泰始元年分置高陽國應劭曰在高河之陽多叛嚴歸之嚴懼而出走赴水死馮月者帥其衆降帥讀曰率回徙居易京易京公孫瓚所築勒喜封回為弋陽子增張賓邑千戶進位前將軍賓固辭不受四年丞相睿聞長安不守出師露次露次者出宿于野上無屋宇擐音宦移檄四方刻日北征以漕運稽期章甲十一行本期下有丙寅二字乙十一行本同退齋校同斬督運令史淳于伯刑者以刀拭柱血逆流上至柱末二丈餘而下上時掌翻下同觀者咸以為冤丞相司直劉隗上言伯罪不至死請免從事中郎周莚等官於是右將軍王導等上疏引咎請解職睿曰政刑失中皆吾闇塞所致塞悉則翻一無所問隗性剛訐當時名士多被彈劾訐居謁翻被皮義翻彈徒丹翻劾戶概翻又戶得翻睿率皆容貸由是衆怨皆歸之南中郎將王含敦之兄也以族強位顯驕傲自恣一請參佐及守長至二十許人多非其才守式又翻長知兩翻隗劾奏含文致甚苦深文以致其罪而王氏深忌疾之為王敦請誅劉隗張本四年丞相睿以邵續為冀州刺史續女壻廣平劉遐聚衆河濟之間濟子禮翻睿以遐為平原內史四年托跋普根之子又卒托與拓通魏收魏書本作托跋從才用翻何茲全標點容肇祖聶崇岐覆校
