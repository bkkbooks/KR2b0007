body:
  text: 資治通鑑卷第八十五端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰權判西京留司御史臺上柱國河內郡開國侯食邑一千三百戶食實封四百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注晉紀七劉弘遣陶侃等攻昌於竟陵孝惠皇帝中之下大章甲十一行本大作太乙十一行本同熊校同安二年癸亥三三劉弘遣陶侃等攻昌於竟陵春正月李特潛渡江擊羅尚水上軍皆散走郫水上軍也少詩照翻降戶江翻下同特入據之惟取馬以供軍餘無侵掠赦其境內改元建初考異曰帝紀太安元年五月特自號大將軍載記太安元年特稱大將軍改元後魏書李雄傳云昭帝七年特稱大將軍號年建初昭帝七年太安元年也祖孝徵修文殿御覽云太安二年特大赦改年建初元年特見殺三十國晉春秋云太安二年正月特僭位改年今從御覽等書遣使求和於特蜀民相聚為塢者皆送款於特特遣使就撫之使疏吏翻以軍中糧少少詩沼翻乃分六郡流民於諸塢就食李流言於特曰諸塢新附人心未固宜質其大姓子弟質音致聚兵自守以備不虞又與特司馬上官惇書曰納降如受敵不可易也恐其詐降當嚴為之備如待敵然易以豉翻特怒曰大事已定但當安民何為更逆加疑忌使之離叛乎朝廷遣荊州刺史宗岱建平太守孫阜帥水軍三萬以救羅尚朝直遙翻守式又翻帥讀曰率下同岱以阜為前鋒進逼德陽特遣李蕩及蜀郡太守李璜就德陽太守任臧共拒之李特蓋又分廣漢立德陽郡任音壬下同諸塢皆有二志益州兵曹從事蜀郡任睿言於尚曰李特散衆就食驕怠無備此天亡之時也宜密約諸塢刻期同發內外擊之破之必矣尚使睿夜縋出城任音壬縋馳偽翻宣旨於諸塢期以二月十日同擊特睿因詣特詐降特問城中虛實睿曰糧儲將盡但餘貨帛耳睿求出省家特許之遂還報尚考異曰戴記作任明羅尚傳作任鋭今從華陽國志省悉景翻尚遣兵掩襲特營諸塢皆應之特兵大敗斬特及李輔李遠皆焚尸傳首洛陽流民大懼李章甲十一行本李上有李流二字乙十一行本同退齋校同張校同云無注本亦無蕩李雄收餘衆還保赤祖赤祖地名當在帛丿糸竹東祖子邪翻保東營蕩雄保北營孫阜破德陽獲寋碩寋姓也與蹇同此涪陵乃漢廣漢郡之涪縣晉梓潼郡之涪城縣非涪陵郡之涪陵廣漢梓潼之涪今帛丿糸州今人猶謂帛丿糸州為涪陵涪陵郡之涪陵則今涪州涪陵縣也三月羅尚遣督護何沖常深攻李流涪陵民藥紳亦起兵攻流流與李驤拒章甲十一行本拒下有深使李蕩李雄拒七字乙十一行本同退齋校同張校同云無注本亦脫此八字按八當為七字之誤紳何沖乘虛攻北營氐苻成隗伯在營中叛應之蕩母羅氏擐甲拒戰擐音宦伯手刃傷其目羅氏氣益壯章甲十一行本壯下有營垂破三字乙十一行本同張校同退齋校同會流等破深紳引兵還與沖戰大破之成伯率其黨突出詣尚流等乘勝進抵成都尚復閉城自守復扶又翻蕩馳馬逐北中矛而死中竹仲翻朝廷遣侍中劉章甲十一行本劉上有燕國二字乙十一行本同張校同退齋校同沈假節統羅尚許雄等軍羅尚帥益州兵許雄帥梁州兵沈持林翻行至長安河間王顒留沈為軍師遣席薳代之薳羽委翻李流以李特李蕩繼死宗岱孫阜將至甚懼李含勸流降流從之李驤李雄迭諫不納夏五月流遣其子世及含子胡為質於阜軍質音致胡兄離為梓潼太守聞之自郡馳還欲諫不及退與雄謀襲阜軍雄曰為今計當如是而二翁不從奈何二翁謂李流李含也當劫之耳雄大喜乃共説流民曰説輸芮翻吾屬前已殘暴蜀民今一旦束手便為魚肉惟有同心襲阜以取富貴耳衆皆從之雄遂與離襲擊阜軍大破之會宗岱卒於墊江墊音疊墊江縣自漢來屬巴郡唐為合州之地荊州軍遂退流甚慙由是奇雄才軍事悉以任之劉弘遣陶侃等攻昌於竟陵新野莊王歆為政嚴急失蠻夷心義陽蠻張昌聚黨數千人欲為亂劉㫬曰義陽本漢平氏縣之義陽鄉魏文帝黃初中分立義陽縣蓋治石城後分南陽郡立義陽郡治安昌城領安昌平林平氏義陽平春五縣唐為申州義陽縣荊州以壬午詔書發武勇赴益州討李流號壬午兵民憚遠征皆不欲行詔書督遣嚴急所經之界停留五日者二千石免官由是郡縣官長皆親出驅逐長知兩翻展轉不遠輒復屯聚為㣥盜復扶又翻下同時江夏大稔民就食者數千口張昌因之誑惑百姓夏戶雅翻誑居況翻更姓名曰李辰更工衡翻募衆於安陸石巖山晉書張昌傳云石巖山去安陸郡八十里水經注溳水過江夏安陸縣西又南徑石巖山北今德安府南十里有石巖山太守弓欽遣兵討之不勝姓譜弓姓魯大夫叔弓之後余按孔子弟子有仲弓又有馯臂子弓而獨以魯叔弓後殊為未通欽兵敗與部將朱伺奔武昌伺相吏翻歆遣騎督靳滿討之滿復敗走騎奇寄翻靳居焮翻昌遂據江夏杜佑曰漢江夏郡故城在安州雲夢縣東南當有聖人出為民主得山都縣吏丘沈山都縣漢屬南陽郡晉屬襄陽郡其地屬唐襄州穀城縣界杜佑曰山都縣故城在襄州義清縣東南沈持林翻詐云漢後奉以為天子曰此聖人也昌自為相國詐作鳳皇玉璽之瑞璽斯氏翻建元神鳳郊祀服色悉依漢故事有不應募者族誅之士民莫敢不從又流言江淮已南皆反官軍大起當悉誅之互相扇動人情惶懼江沔間所在起兵以應昌沔彌兗翻旬月間衆至三萬皆著絳帽著陟略翻以馬尾作髯詔遣監軍華宏討之敗于障山今安陸縣東四十里有章山監工銜翻華戶化翻歆上言妖賊犬羊萬計絳頭毛面挑刀走戟其鋒不可當挑徒了翻挑刀舞刀也今鄉落悍民兩手運雙刀坐作進退為擊刺之勢擲刀空中高一二丈以手接之又善舞戟左奔右赴為刺敵之勢又環身盤戟回轉如縈又以戟矜柱地跳過矜上特為儇捷此所謂走戟也妖於嬌翻請臺敕諸軍三道救助朝廷以屯騎校尉劉喬為豫州刺史寧朔將軍沛國劉弘為荊州刺史寧朔將軍始見於此藍田關在京兆藍田縣即秦之嶢關也雍於用翻沈持林翻沈自領州兵至藍田顒又逼奪其衆於是劉喬屯汝南劉弘及前將軍趙驤平南將軍羊伊屯宛宛於元翻昌遣其將黃林帥二萬人向豫州劉喬擊卻之帥讀曰率初歆與齊王冏善事見上卷永寧元年歆懼自結於大將軍穎及張昌作亂歆表請討之時長沙王乂已與穎有隙疑歆與穎連謀不聽歆出兵昌衆日盛從事中郎孫洵謂歆曰公為嶽牧古有四嶽十二牧各統其方諸侯之國故後人謂專方面者為嶽牧拜表輒行有何不可而使姦凶滋蔓禍釁不測豈藩翰王室鎮靜方夏之義乎毛萇曰藩樊也籬也翰幹也夏戶雅翻王綏曰昌等小賊偏裨自足制之何必違詔命親矢石也昌至樊城歆乃出拒之衆潰為昌所殺詔以劉弘代歆為鎮南將軍都督荊州諸軍事六月弘以南蠻長史陶章甲十一行本陶上有廬江二字乙十一行本同侃為大都護南蠻校尉有長史司馬義軍蓋民兵也督護之官蓋創置於此時蒯苦怪翻進據襄陽杜佑曰襄陽漢中廬縣也敗趙驤軍殺羊伊劉弘退屯梁梁縣屬汝南郡唐為汝州治所敗補邁翻不克劉弘遣陶侃等攻昌於竟陵李雄攻殺汶山太守陳圖汶音民考異曰華陽國志作陳時今從載記遂取郫城郫縣屬蜀郡李膺益州記郫縣故城在今縣北劉㫬曰唐益州溫江縣漢郫縣地郫音疲秋七月李流徙屯郫蜀民皆保險結塢或南入寧州或東下荊州城邑皆空野無煙火流虜掠無所得士衆飢乏唯涪陵千餘家依青城山處士范長生青城山在汶山郡都安縣今在永康軍青城縣北三十二里杜光庭作青城山記曰岷山連峯接岫千里不絶青城乃第一峯也范長生涪陵人率衆保之處昌呂翻考異曰華陽國志作范賢今從載記求為汶山太守邀結長生與共討流尚為平西將軍以徐輿為參軍考異曰華陽國志作徐輿今從載記輿怒出降於流降戶江翻流以輿為安西將軍輿説長生使資給流軍糧説輸芮翻下含説同長生從之流軍由是復振劉弘遣陶侃等攻昌於竟陵初李含以長沙王乂微弱必為齊王冏所殺因欲以為冏罪而討之遂廢帝立大將軍穎以河間王顒為宰相己得用事既而冏為乂所殺事見上卷上年不如所謀穎恃功驕奢百度弛廢甚於冏時猶嫌乂在內不得逞其欲欲去之去羌呂翻時皇甫商復為乂參軍商兄重為秦州刺史含説顒曰商為乂所任重終不為人用宜早除之商含不平事見上卷元年因其過長安執之重知之露檄上尚書上時掌翻發隴上兵以討含自隴以西六郡統於秦州遣使詔重罷兵徵含為河南尹考異曰含傳云河間王顒表含為河南尹今從皇甫重傳顒遣金城太守遊楷隴西太守韓稚等合四郡兵攻之秦州刺史鎮冀城皇甫商以告乂收含蓀粹殺之蓀音孫驃騎從事琅邪諸葛玫前司徒長史武邑牽秀皆出奔鄴驃匹妙翻從事從事中郎也玫莫杯翻武邑縣前漢屬信都郡後漢晉屬安平國武帝分立武邑郡唐為縣屬冀州劉弘遣陶侃等攻昌於竟陵張昌黨石冰寇揚州敗刺史陳徽敗補邁翻諸郡盡沒又攻破江州別將陳貞攻武陵零陵豫章武昌長沙皆陷之臨淮人封雲起兵寇徐州以應冰江州時治豫章漢置臨淮郡章帝以合下邳國晉太康元年復置臨淮郡姓譜封姓夏封父之後將即亮翻多為昌所據昌更置牧守更工衡翻守式又翻皆桀盜小人專以劫掠為務劉弘遣陶侃等攻昌於竟陵竟陵縣屬江夏郡孫宗鑑曰自蔡州南至信陽軍始有山路迤邐至安陸又兩驛至復州皆平地南至大江並無丘陵之阻渡江至石首始有淺山謂之竟陵者陵至此而竟謂之石首石至此而首也古竟陵今復州侃等屢與昌戰大破之前後斬首數萬級昌逃于下俊山其衆悉降長沙下俊縣之山也師古曰俊字兗翻又辭兗翻考異曰帝紀八月庚申劉弘及張昌戰于清水斬之昌傳云昌敗竄于下俊山明年秋禽斬之按弘斬張奕表云張昌姦黨初平昌未梟首故從昌本傳初陶侃少孤貧少詩照翻為郡督郵長沙太守萬嗣過廬江見而異之命其子結友而去後察孝廉至洛陽豫章國郎中令楊晫薦之於顧榮帝弟熾封豫章王目卓丁角翻既克張昌劉弘謂侃曰吾昔為羊公參軍羊公謂羊祜也晉人多自謂為身必繼老夫矣弘之退屯於梁也征南將軍范陽王虓遣前長水校尉張奕領荊州范陽王虓鎮豫州奕不受代舉兵拒弘弘討奕斬之時荊部守宰多缺守式又翻下同弘請補選詔許之弘敘功銓德銓量也選也人皆服其公當當丁浪翻弘表皮初補襄陽太守姓譜皮姓樊仲皮之後更以弘壻前東平太守夏侯陟為襄陽太守弘下教曰夫治一國者宜以一國為心必若親姻然後可用則荊州十郡按晉志荊州統二十二郡時已分桂陽武昌安成三郡屬江州尚統十九郡又分新城魏興上庸三郡屬梁州尚統十六郡至懷帝分長沙衡陽湘東零陵邵陵桂陽六郡屬湘州此時荊州猶統十一郡此蓋言當時缺守者十郡也治直之翻乃表陟姻親舊制不得相監監古銜翻皮初之勳宜見酬報詔聽之弘於是勸課農桑寬刑省賦公私給足百姓愛悅劉弘遣陶侃等攻昌於竟陵河間王顒聞李含等死即起兵討長沙王乂大將軍穎上表請討張昌許之聞昌已平因欲與顒共攻乂盧志諫曰公前有大功而委權辭寵時望美矣事見上卷永寧元年章甲十一行本若作宜乙十一行本同頓軍關外關外謂郊關之外此霸主之事也朝直遙翻參軍魏郡邵續曰人之有兄弟如左右手明公欲當天下之敵而先去其一手可乎去羌呂翻穎皆不從八月顒穎共表乂論功不平與右僕射羊玄之左將軍皇甫商專亶朝政殺害忠良謂殺李含等朝直遙翻遣乂還國詔曰顒敢舉大兵內向京輦吾當親率六軍以誅姦逆其以乂為太尉都督中外諸軍事以禦之考異曰帝紀太安元年十二月乂誅齊王冏即以乂為太尉都督中外晉春秋二年七月顒穎起兵乃以乂為太尉都督以討之按齊王死後穎懸執朝政乂未應都督中外又顒見為太尉乂不應更為太尉今從晉春秋顒以張方為都督將精兵七萬自函谷東趨洛陽將即亮翻趨七喻翻穎引兵屯朝歌以平原內史陸機為前將軍前鋒都督督北中郎將王粹冠軍將軍牽秀沈約曰楚懷王以宋義為卿子冠軍冠軍之號自此始魏以文欽為冠軍將軍冠古玩翻南向洛陽機以羇旅事穎一旦頓居諸將之右王粹等心皆不服白沙督孫惠白沙在鄴城東南勸機讓都督於粹機曰彼將謂吾首鼠兩端首鼠兩端漢田蚡語服虔曰首鼠一前一卻也陸佃埤雅曰舊説鼠性疑出穴多不果故持兩端謂之首鼠遂行穎列軍自朝歌至河橋鼓聲聞數百里河橋即富平津河橋聞音問乙丑帝如十三里橋橋在洛城西去城十三里因以為名己巳帝還軍宣武埸水經注大夏門東宣武觀憑城結構南望天淵池北矚宣武埸埸西故賈充宅庚午舍于石樓九月丁丑屯于河橋壬子嚴子改午張方襲皇甫商敗之敗補邁翻下敗牽同甲申帝軍于芒山丁亥帝幸偃師偃師縣漢屬河南郡晉省隋復置在洛城東北辛卯舍于豆田據晉書五行志洛陽城東有豆田壁阻清水為壘此河南謂黃河之南非河南縣也清水蓋清濟之水癸巳羊玄之憂懼而卒帝旋軍城東丙申幸緱氏擊牽秀走之緱工侯翻大赦張方入京城大掠死者萬計劉弘遣陶侃等攻昌於竟陵李流疾篤謂諸將曰驍騎仁明固足以濟大事然前軍英武殆天所相可共受事於前軍李特以弟驤為驍騎將軍少子雄為前將軍相息亮翻驍堅堯翻衆推李雄為大都督大將軍益州牧治郫城郫音皮雄使武都朴泰紿羅尚朴姓也板楯七姓蠻之一也孫盛曰朴音浮云己為內應尚使隗伯將兵攻郫泰約舉火為應李驤伏兵於道泰出長梯於外隗伯兵見火起爭緣梯上隗五罪翻上時掌翻驤縱兵擊大破之追奔夜至城下詐稱萬歲曰已得郫城矣入少城尚乃覺之退保太城隗伯創甚雄生獲之赦不殺隗伯本亦流民之豪帥叛歸羅尚創初良翻斷尚運道犍居言翻斷丁管翻獲太守龔恢殺之劉弘遣陶侃等攻昌於竟陵石超進逼緱氏緱工侯翻冬十月壬寅帝還宮丁未敗牽秀於東陽門外水經注曰東陽門漢洛陽城之中東門也敗補邁翻戊申太尉乂奉帝與機戰于建春門水經注建春門漢雒城之上東門也穀水徑其前水上有石橋考異曰陸機傳云戰于鹿苑今從帝紀以突咸陳騎奇計翻陳讀曰陳咸軍亂執而斬之機軍大敗赴七里澗死者如積水為之不流為于偽翻斬其大將賈崇等十六人石超遁去初宦人孟玖有寵於大將軍穎玖欲用其父為邯鄲令邯鄲縣漢屬趙國魏晉屬廣平郡隋唐屬磁州邯鄲音寒丹右司馬陸雲固執不許曰此縣公府掾資言歷此縣者其資級可得公府掾掾以絹翻玖深怨之玖弟超領萬人為小督機為都督與黃門之弟共事可以辭去矣縱兵大掠陸機録其主者録收也奪之顧謂機曰貉奴能作督不楊正衡曰貉音鶴獸名善睡似狐余謂超蓋詈機為貉奴不讀曰否機司馬吳郡孫拯勸機殺之機不能用使機能用孫拯之言斬孟超是穰苴之戮莊賈也由此為穎所殺豈不光明俊偉哉陸機將反又還書與玖言機持兩端故軍不速決及戰超不受機節度輕兵獨進敗沒玖疑機殺之譖之於穎曰機有二心於長沙牽秀素諂事玖將軍王闡郝昌帳下督陽平公師藩諸王公領兵及任方面者皆有帳下督統帳下兵魏文帝黃初二年分魏郡置陽平郡公師復姓也相與共證之穎大怒使秀將兵收機參軍事王彰諫曰今日之舉強弱異勢庸人猶知必克況機之明達乎但機吳人殿下用之太過北土舊將皆疾之耳穎不從機聞秀至釋戎服著白帢著陟略翻帢苦洽翻帽也辨缺四隅謂之帢晉志曰魏武以天下凶荒資財乏匱擬古皮辨裁縑帛以為帢以色辨其貴賤本施軍飾非為國容徐爰曰俗説帢本未有岐荀文若巾之行觸樹枝成岐謂之為善今通為慶弔服與秀相見為箋辭穎既而歎曰華亭鶴唳可復聞乎機發此言有咸陽市上歎黃犬之意華亭時屬吳郡嘉興縣界有華亭谷華亭水至唐始分嘉興縣為華亭縣今縣東七十里其地出鶴土人謂之曰鶴窠復扶又翻穎又收機弟清河內史雲平東祭酒耽及孫拯皆下獄按晉書陸雲傳雲自清河內史轉大將軍右司馬此當書右司馬雲下戶嫁翻考異曰孫拯晉春秋作孫承今從晉書傳記室江統陳留蔡克潁川棗嵩等上疏以為陸機淺謀致敗殺之可也至於反逆則衆共知其不然宜先檢校機反狀若有徵驗誅雲等未晚也統等懇請不已穎遲回者三日蔡克入至穎前叩頭流血曰雲為孟玖所怨遠近莫不聞今果見殺竊為明公惜之竊為于偽翻下為陳同僚屬隨克入者數十人流涕固請穎惻然有宥雲色孟玖扶穎入催令殺雲耽夷機三族獄吏考掠孫拯數百兩踝骨見掠音亮踝戶瓦翻腿兩旁曰內外踝見賢遍翻終言機冤吏知拯義烈謂拯曰二陸之枉誰不知之君可不愛身乎拯仰天歎曰陸君兄弟世之奇士吾蒙知愛今既不能救其死忍復從而誣之乎復扶又翻玖等知拯不可屈乃令獄吏詐為拯辭穎既殺機意常悔之及見拯辭大喜謂玖等曰非卿之忠不能窮此姦遂夷拯三族拯門人費慈宰意二人詣獄明拯冤費扶沸翻宰以官為氏春秋周有宰咺孔子弟子有宰豫拯譬遣之譬喻也吾義不負二陸死自吾分分扶問翻卿何為爾邪曰君既不負二陸僕又安可負君固言拯冤玖又殺之太尉乂奉帝攻張方方兵望見乘輿皆退走乘繩證翻方遂大敗死者五千餘人方退屯十三里橋考異曰河間王顒傳云駃水橋今從帝紀欲夜遁方曰勝負兵家之常善用兵者能因敗為成今我更前作壘出其不意此奇策也乃夜潛逼洛城七里築壘數重重直龍翻外引廩穀以足軍食乂既戰勝以為方不足憂聞方壘成十一月引兵攻之不利朝議以為乂穎兄弟可辭説而釋朝直遙翻乃使中書令王衍等往説穎令與乂分陝而居周公召公分陝為二伯陝在弘農此言分陝引周召事欲令穎乂為二伯耳非分陝地而居也往説輸芮翻陝式冉翻乂因致書於穎為陳利害欲與之和解穎復書請斬皇甫商等首則引兵還鄴乂不可穎進兵逼京師張方決千金堨水經注河南縣城東十五里有千金堨洛陽記曰千金堨舊堰穀水魏時更修此堰謂之千金堨堨阿葛翻碓都內翻乃發王公奴婢手舂給兵一品已下不從征者男子十三以上皆從役又發奴助兵公私窮踧踧與蹙同子六翻米石萬錢詔命所行一城而已京師危蹙如此乂雖戰勝安得久邪乂為驃騎將軍以逖為主簿驃匹妙翻劉沈忠義果毅雍州兵力足制河間雍於用翻宜啓上為詔與沈使發兵襲顒顒窘急必召張方以自救此良策也窘渠隕翻乂從之沈奉詔馳檄四境諸郡多起兵應之沈合七郡之衆凡萬餘人趣長安雍州統七郡治安定或曰時治新平沈持林翻趣七喻翻乂又使皇甫商間行齎帝手詔命遊楷等罷兵敕皇甫重進軍討顒商間行至新平遇其從甥從甥素憎商以告顒間古莧翻從才用翻顒魚容翻顒捕商殺之劉弘遣陶侃等攻昌於竟陵十二月議郎周王巳前南平內史長沙王矩吳置南郡於江南晉平吳改曰南平以別江北之南郡王巳口紀翻推前吳興太守吳郡顧祕都督揚州九郡諸軍事揚州統郡十八帝割豫章鄱陽廬陵臨川建安南康晉安屬江州揚州統十一郡今止推祕督丹陽宣城毗陵吳吳興會稽東陽新安臨海九郡淮南廬江在江北不與也殺冰所署將吏將即亮翻於是前侍御史賀循起兵於會稽會工外翻廬江內史廣陵華談及丹陽葛洪甘卓皆起兵以應祕華戶化翻王巳處之子循卲之子卓寧之曾孫也周處見八十二卷元康六年七年賀卲事吳主晧為晧所殺甘寧事吳主權為將以勇聞三家皆吳之強宗也冰遣其將羌毒姓譜羌姓也王巳王巳擊斬之冰自臨淮趨壽春帥讀曰率趨七喻翻征東將軍劉準聞冰至惶懼不知所為廣陵度支廬江陳敏統衆在壽春陳敏自尚書令史出為合肥度支漕運南方米穀以濟中州遷廣陵度支度徒洛翻此等本不樂遠戍逼迫成賊烏合之衆其勢易離敏請督運兵為公破之樂音洛易以豉翻為于偽翻下為睿同準乃益敏兵使擊之劉弘遣陶侃等攻昌於竟陵閏月李雄急攻羅尚尚軍無食留牙門張羅守城考異曰載記作羅特今從華陽國志由牛鞞水東走水經曰牛鞞水在犍為牛鞞縣劉㫬曰洛水一名牛鞞水杜佑曰簡州陽安縣漢牛鞞縣地孟康曰鞞音髀師古曰音必爾翻降戶江翻雄入成都軍士飢甚乃帥衆就穀於郪帥讀曰率郪縣漢屬廣漢郡晉省立五代史志郪縣舊曰伍城隋大業改曰郪縣唐為梓州治所宋白曰漢舊郪縣城在今縣南九十里臨江郪王城基址見在以郪江為縣名郪音妻又千私翻掘野芋而食之芋羊遇翻所謂山之下有蹲鴟也許雄坐討賊不進徵即罪許雄刺梁州見上卷太安元年即就也劉弘遣陶侃等攻昌於竟陵安北將軍都督幽州諸軍事王浚以天下方亂欲結援夷狄乃以一女妻鮮卑段務勿塵一女妻素怒延妻七細翻宇文國有別帥曰素奴延又表以遼西郡封務勿塵為遼西公為王浚用段氏以攻成都王穎及石勤張本沈之子也王沈比晉以弒魏高貴鄉公劉弘遣陶侃等攻昌於竟陵毛詵之死也事見上卷太安元年于陵丞詣李毅為睿請命五苓夷寧州附塞部落之名帥所類翻為于偽翻睿至毅殺之于陵丞怒帥諸夷反攻毅劉弘遣陶侃等攻昌於竟陵尚書令樂廣女為成都王或譖諸太尉乂乂問廣廣神色不動徐曰廣豈以五男易一女哉謂附穎則五男被誅永興元年甲子三四長沙王乂之死改元永安西遷長安方改元永興劉弘遣陶侃等攻昌於竟陵春正月丙午樂廣以憂卒劉弘遣陶侃等攻昌於竟陵長沙厲王乂屢與大將軍穎戰破之長沙王乂不得其死穎顒之黨加以惡諡耳而乂未嘗虧奉上之禮城中糧食日窘而士卒無離心窘渠隕翻張方以為洛陽未可克欲還長安而東海王越慮事不濟癸亥潛與殿中諸將夜收乂送別省考異曰越傳云殿中諸將及三部司馬疲於戰守密與左衛將軍朱默夜收乂別省逼越為主今從乂傳甲子越啓帝下詔免乂官置金墉城大赦改元改元永安考異曰帝紀太安二年十二月甲子大赦永興元年正月大赦改元疑是一事殿中將士見外兵不盛悔之更謀劫出乂以拒穎越懼欲殺乂以絶衆心黃門侍郎潘滔曰不可將自有靜之者乃遣人密告張方丙寅方取乂於金墉城至營炙而殺之方軍士亦為之流涕為于偽翻考異曰帝紀三十國晉春秋云太安二年十三月殺乂乂傳曰初乂執權之始洛下謠曰草木萌芽殺長沙乂以正月二十五日廢二十七日死如謠言焉樂廣傳云成都王穎廣之壻也及與長沙王乂遘難而廣既處朝望㣥小讒謗之廣以憂卒惠帝紀永興元年正月丙午樂廣卒若廣卒時乂未死即乂傳正月二十五日廢為是合移在永興元年正月而晉春秋太安二年八月樂廣自裁按帝紀今年正月以穎為丞相遣兵屯城門代宿衛者疑此皆乂初死時事又今年正月末亦有甲子丙寅今從乂傳公卿皆詣鄴謝罪大將軍穎入京師復還鎮于鄴詔以穎為丞相加東海王越守尚書令穎遣奮武將軍石超等率兵五萬屯十二城門洛陽城東有建春東陽清明三門南有開陽津陽平昌宣陽四門西有廣陽西明閶闔三門北有大夏廣莫二門凡十二門帥讀曰率穎皆殺之悉代去宿衛兵去羌呂翻表盧志為中書監留鄴參署丞相府事河間王顒頓軍於鄭鄭縣屬京兆郡周宣王弟鄭桓公封邑唐屬華州聞劉沈兵起還鎮渭城渭城縣故秦咸陽也前漢屬扶風後漢省而地名猶在石勒置石安縣唐復為咸陽縣屬京兆好畤縣前漢屬扶風後漢晉省唐武德二年復分醴泉置好畤縣屬京兆顒懼退入長安急召張方方掠洛中官私奴婢萬餘人而西軍中乏食殺人雜牛馬肉食之劉沈渡渭而軍與顒戰顒屢敗沈使安定太守衙張衙作衛博功曹皇甫淡以精甲五千襲長安入其門力戰至顒帳下沈兵來遲馮翊太守張輔見其無繼引兵橫擊之殺博及淡淡徒覽翻又徒濫翻兵章甲十一行本兵上有沈字乙十一行本同孔本同張校同退齋校同遂敗收餘卒而退張方遣其將敦偉夜擊之敦徒渾翻姓也沈軍驚潰沈與麾下南走追獲之沈謂顒曰知己之惠輕顒留沈為軍師遂為雍州刺史沈不可以違天子之詔量強弱以苟全量音良投袂之日期之必死左傳宋殺楚使楚子聞之投袂而起其甘如薺詩云誰謂荼苦其甘如薺薺在禮翻顒怒鞭之而後腰斬新平太守江夏張光數為沈畫計夏戶雅翻數所角翻為于偽翻顒執而詰之光曰劉雍州不用鄙計故令大王得有今日顒壯之引與歡宴表為右衛司馬劉弘遣陶侃等攻昌於竟陵羅尚逃至江陽華陽國志曰瀘州瀘川縣本漢江陽縣又江安縣亦漢江陽縣也詔尚權統巴東巴郡涪陵以供軍賦三郡本屬梁州尚權統之涪音浮弘綱紀以運道阻遠綱紀謂弘參佐操持一府之綱紀者欲以零陵米五千斛與尚弘曰天下一家彼此無異吾今給之則無西顧之憂矣謂尚在巴涪則為荊州屏蔽無西顧之憂尚賴以自存李興願留為弘參軍弘奪其手版而遣之手版即古笏也參佐施敬府公故持手版今奪興手版遣之不許其去尚而事己也于時流民在荊州者十餘萬戶羈旅貧乏多為盜賊弘大給其田及種糧種章勇翻擢其賢才隨資敘用流民遂安劉弘遣陶侃等攻昌於竟陵三章甲十一行本三作二乙十一行本同孔本同張校同月乙酉丞相穎表廢皇后羊氏幽于金墉城廢皇太子覃為清河王羊后立見八十三卷永康元年覃立見上卷太安元年劉弘遣陶侃等攻昌於竟陵陳敏與石冰戰數十合冰衆十倍於敏敏擊之所向皆捷遂與周王巳合攻冰於建康三月冰北走投封雲封雲徐州賊應冰者揚徐二州平周王巳賀循皆散衆還家不言功賞朝廷以陳敏為廣陵相劉弘遣陶侃等攻昌於竟陵河間王顒表請立丞相穎為太弟戊申詔以穎為皇太弟都督中外諸軍事丞相如故大赦乘輿服御皆遷于鄴天子在洛而建儲于鄴則既非矣乘輿服御亦遷而就之何居乘繩正翻制度一如魏武帝故事以顒為太宰大都督雍州牧雍於用翻前太傅劉實為太尉實以老固讓不拜劉弘遣陶侃等攻昌於竟陵太弟穎僭侈日甚嬖幸用事大失衆望時人望穎以匡輔帝室今乃若此故大失衆望嬖卑義翻又博計翻與右衛將軍陳眕楊正衡曰眕止忍翻又音真及長沙故將上官巳等謀討之秋七月丙申朔陳眕勒兵入雲龍門以詔召三公百僚及殿中殿中者三部諸將也石超奔鄴戊戌大赦復皇后羊氏及太子覃己亥越奉帝北征以越為大都督徵前侍中嵇紹詣行在長沙王乂當國以紹為侍中乂死紹黜免為庶人今討穎故復徵詣行在今往安危難測卿有佳馬乎紹正色曰臣子扈衛乘輿死生以之佳馬何為越檄召四方兵赴者雲集比至安陽晉志安陽縣屬魏郡魏土地記曰鄴城南四十里有安陽城乘繩證翻比必寐翻鄴中震恐穎會㣥僚問計東安王繇曰天子親征宜釋甲縞素出迎請罪穎不從遣石超帥衆五萬拒戰帥讀曰率折衝將軍喬智明勸穎奉迎乘輿穎怒曰卿名曉事投身事孤今主上為㣥小所逼卿奈何欲使孤束手就刑邪陳眕二弟匡規自鄴赴行在云鄴中皆已離散由是不甚設備己未石超軍奄至乘輿敗績於蕩陰蕩陰縣漢屬河內郡晉屬魏郡唐為相州蕩陰縣按水經注湯陰縣因湯水為名宋白曰古湯陰縣在湯水南漢初廢安陽縣入湯陰隋又廢湯陰入安陽則安陽湯陰二縣接境也師古曰蕩音湯中三矢中竹仲翻百官侍御皆散嵇紹朝服下馬登輦以身衛帝兵人引紹於轅中斫之轅輈也方言曰楚衛謂之輈朝直遙翻忠臣也勿殺對曰奉太弟令惟不犯陛下一人耳遂殺紹血濺帝衣濺子賤翻帝墮於草中亡六璽石超奉帝幸其營帝餒甚超進水左右奉秋桃桃以夏熟者進御秋桃非所以奉至尊而奉之恤所無也庚申入鄴大赦改元曰建武左右欲浣帝衣浣戶管翻濯也帝曰嵇侍中血勿浣也孰謂帝為戇愚哉陳眕上官巳等奉太子覃守洛陽司空越奔下邳徐州都督東平王楙不納越徑還東海太弟穎以越兄弟宗室之望越騰略模皆有聲稱於諸宗室中越不應命前奮威將軍孫惠上書勸越要結藩方要一遙翻同奬王室越以惠為記室參軍與參謀議北軍中候茍晞奔范陽王虓虓承制以晞行兗州刺史范陽王虓時鎮許昌虓許交翻劉弘遣陶侃等攻昌於竟陵初三王之起兵討趙王倫也事見上卷永寧元年禁所部士民不得赴三王召募太弟穎欲討之而未能使穎兄弟不自內相圖聲浚之罪而討之固有餘力矣何未能邪穎以右司馬和演為幽州刺史和演與穎謀起兵討趙王倫穎之腹心也演與烏桓單于審登謀與浚遊薊城南清泉因而圖之單音蟬會天暴雨兵器霑濕不果而還還從宣翻又如字下同審登以為浚得天助乃以演謀告浚浚與審登密嚴兵約並州刺史東嬴公騰共圍演殺之自領幽州營兵幽州刺史營兵也越之弟也太弟穎稱詔徵浚浚與鮮卑段務勿塵烏桓羯朱及東嬴公騰同起兵討穎羯居謁翻穎遣北中郎將王斌及石超擊之斌音彬劉弘遣陶侃等攻昌於竟陵太弟穎怨東安王繇前議怨其使己縞素迎天子請罪也戊辰收繇殺之初繇兄琅邪恭王覲薨子睿嗣睿沈敏有度量沈持林翻為左將軍與東海參軍王導善導參東海王越軍事敦之從父弟也從才用翻下從者之從同識量清遠以朝廷多故每勸睿之國及繇死睿從帝在鄴恐及禍將逃歸穎先敕關津無得出貴人關立於經塗要會處以譏出入津者濟渡江河所必由之處為津吏所止從者宋典自後來以鞭拂睿而笑曰舍長舍長守舍之長也長丁丈翻今知兩翻汝亦被拘邪被皮義翻吏乃聽過至洛陽迎太夏侯氏俱歸國元帝中興事始此夏戶雅翻劉弘遣陶侃等攻昌於竟陵丞相從事中郎王澄發孟玖姦利事勸太弟穎誅之穎從之劉弘遣陶侃等攻昌於竟陵上官巳在洛陽殘暴縱橫橫戶孟翻守河南尹周馥浚之從父弟也周浚從王渾伐吳有戰功事泄奮等死馥走得免司空越之討太弟穎也太宰顒遣右將軍馮翊太守張方將兵二萬救之聞帝已入鄴因命方鎮洛陽巳與別將苗願拒之大敗而還太子覃夜襲巳願巳願出走方入洛陽覃於廣陽門迎方而拜洛城西面南頭第一門曰廣陽門復廢覃及羊后劉弘遣陶侃等攻昌於竟陵初太弟穎表胸奴左賢王劉淵為冠軍將軍監五部軍事楊駿輔政以劉淵為五部大都督元康末坐部人叛出塞免官穎鎮鄴表監五部軍事冠古玩翻監工銜翻淵子聰驍勇絶人博涉經史善屬文驍堅堯翻屬之欲翻彎弓三百斤弱冠遊京師記曲禮曰人生十年曰幼學二十曰弱冠冠古玩翻穎以聰為積弩將軍淵從祖右賢王宣謂其族人曰自漢亡以來我單于徒有虛號無復尺土事見六十七卷漢獻帝建安二十一年從才用翻單音蟬降同編戶編相聯次也民謂之編民亦謂之編戶者言比屋聯次而居編於民籍無高下之差猶不減二萬奈何斂首就章甲十一行本作手受二字乙十一行本同孔本同役奄過百年奄忽也遽也天苟不欲興胸奴必不虛生此人也今司馬氏骨肉相殘四海鼎沸復呼韓邪之業此其時矣漢宣帝時稽侯册來朝稱呼韓邪單于光武時日逐王比內附亦稱呼韓邪單于推淵為大單于使其黨呼延攸詣鄴告之師古曰漢書胸奴中貴種有呼衍氏即今之呼延氏淵白穎請歸會葬穎弗許淵令攸先歸告宣等使招集五部及雜胡聲言助穎實欲叛之及王浚東嬴公騰起兵淵説穎曰今二鎮跋扈衆十餘萬二鎮謂幽並説輸芮翻下同請為殿下還説五部以赴國難為于偽翻説輸芮翻難乃旦翻穎曰五部之衆果可發否就能發之鮮卑烏桓未易當也易以豉翻吾欲奉乘輿還洛陽以避其鋒乘繩證翻徐傳檄天下以逆順制之言見力不足以制二鎮欲檄徵天下兵杖順制逆淵曰殿下武皇帝之子有大勳於王室威恩遠著四海之內孰不願為殿下盡死力者為于偽翻下請為同何難發之有王浚豎子東嬴疏屬東嬴公騰宣帝弟東武侯馗之孫故云疏屬殿下一發鄴宮示弱於人洛陽不可得而至雖至洛陽威權不復在殿下也穎奔敗而失權卒如淵之言靖以鎮之淵請為殿下以二部摧東嬴三部梟王浚梟堅堯翻二豎之首可指日而懸也穎悅拜淵為北單于參丞相軍事淵至左國城左國城蓋胸奴左部所居城也據晉書載記光武建武之初南單于入居西河之美稷今離石左國城單于所徙庭也水經注曰左國城在汾州之右介休縣西南杜佑曰左國城在石州離石縣宋白曰離石縣東北有離石水因以為名上時掌翻二旬之間有衆五萬都於離石離石縣自漢以來屬西河郡師古曰蠡音盧奚翻鹿蠡王即仍漢時谷蠡王號也谷鹿字雖不同而音則同耳遣左於陸王宏帥精騎五千帥讀曰率騎奇寄翻下同會穎將王粹拒東嬴公騰粹已為騰所敗敗補邁翻下敗石同宏無及而歸王浚東嬴公騰合兵擊王斌大破之浚以主簿祁弘為前鋒姓譜祁姓黃帝二十五子之一也又晉獻侯四世孫奚食邑於祁曰祁奚平棘縣漢屬常山郡晉屬趙國劉㫬曰漢平棘縣在今趙州平棘縣南候騎至鄴鄴中大震百僚奔走士卒分散盧志勸穎奉帝還洛陽時甲士尚有萬五千人志夜部分分扶問翻至曉將發而程太戀鄴不欲去穎狐疑未決俄而衆潰穎遂將帳下數十騎與志奉帝御犢車晉制皂輪犢車諸公乘之倉猝上下無齎中黃門被囊中齎私錢三千詔貸之貸惕德翻又敵德翻又他代翻假借也於道中買飯夜則御中黃門布被食以瓦盆至溫將謁陵帝之先河內溫縣孝敬里人自京兆尹防以上皆葬于溫納從者之履喪息浪翻從才用翻下拜流涕及濟河張方自洛陽遣其子羆帥騎三千以所乘車奉迎帝至芒山下方自帥萬餘騎迎帝帥讀曰率方將拜謁帝下車自止之甚於夷王下堂而見諸侯矣奔散者稍還百官粗備粗坐五翻辛巳大赦王浚入鄴士衆暴掠死者甚衆使烏桓羯朱追太弟穎至朝歌不及浚還薊以鮮卑多掠人婦女命敢有挾藏者斬於是沈於易水者八千人王浚進不成勤王而縱鮮卑烏桓猾夏亂華其死於石勒之手晚矣沈持林翻劉弘遣陶侃等攻昌於竟陵東嬴公騰乞師於拓跋猗色以擊劉淵猗色與弟猗盧合兵擊淵於西河破之與騰盟于汾東而還自此拓跋氏屢以兵助並州色徒河翻還從宣翻又如字劉淵聞太弟穎去鄴歎曰不用吾言逆自奔潰真奴才也然吾與之有言矣不可以不救將發兵擊鮮卑烏桓劉宣等諫曰晉人奴隸御我今其骨肉相殘是天棄彼而使我復呼韓邪之業也鮮卑烏桓我之氣類鮮卑烏桓東胡之種與胸奴同稟北方剛強之氣又同類也奈何擊之淵曰善大丈夫當為漢高魏武呼韓邪何足效哉宣等稽首曰非所及也稽音啓劉弘遣陶侃等攻昌於竟陵荊州兵擒斬張昌同黨皆夷三族去年昌逃于下俊山至是方禽滅劉弘遣陶侃等攻昌於竟陵李雄以范長生有名德為蜀人所重欲迎以為君而臣之長生不可諸將固請雄即尊位冬十月雄即成都王位大赦改元建興除晉法約法七章以其叔父驤為太傅兄始為太保李離為太尉李雲為司徒李璜為司空李國為太宰閻式為尚書令楊褒為僕射尊母羅氏為王太后追尊父特為成都景王雄以李國李離有智謀凡事必咨而後行然國離事雄彌謹史言諸李守君臣之分以相保固所謂盜亦有道也劉弘遣陶侃等攻昌於竟陵劉淵遷都左國城考異曰下云離石大飢遷于黎亭則是淵猶在離石也按杜佑通典離石有南單于庭左國城然則淵雖遷左國猶在離石縣境內也淵謂㣥臣曰昔漢有天下久長恩結於民吾漢氏之甥約為兄弟兄亡弟紹不亦可乎乃建國號曰漢劉宣等請上尊號上時掌翻淵曰今四方未定且可依高祖稱漢王於是即漢王位劉淵字元海考異曰帝紀李雄劉淵稱王皆在十一月惠帝入長安後華陽國志李雄十月稱王一本作十二月三十國晉春秋十六國鈔皆在十月今從之改元曰元熙追尊安樂公禪為孝懷皇帝樂音洛作漢三祖五宗神主而祭之淵以漢高祖世祖昭烈為三祖太宗世宗中宗顯宗肅宗為五宗以右賢王宣為丞相崔遊為御史大夫左於陸王宏為太尉范隆為大鴻臚臚陵如翻朱紀為太常上黨崔懿之後部人陳元達皆為黃門郎劉淵皆用漢官制後部即胸奴北部也居新興遊固辭不就崔遊淵之師也范隆朱紀同門生崔遊既能以師道不為淵屈且又得不變於夷之義沈約志魏置建武將軍元達少有志操少詩照翻淵嘗招之元達不答及淵為漢王或謂元達曰君其懼乎元達笑曰吾知其人久矣彼亦亮吾之心但恐不過三二日驛書必至其暮淵果徵元達元達事淵屢進忠言退而削草雖子弟莫得知也草奏藳也曜生而眉白目有赤光幼聰慧有膽量早孤養於淵及長儀觀魁偉性拓落高亮拓恢拓也落磊落也長知兩翻觀古玩翻好讀書善屬文好呼報翻屬之欲翻鐵厚一寸射而洞之厚胡茂翻射而亦翻洞貫也常自比樂毅及蕭曹時人莫之許也惟劉聰重之曰永明漢世祖魏武之流數公何足道哉劉曜字永明數公謂樂毅蕭曹劉弘遣陶侃等攻昌於竟陵帝既還洛陽張方擁兵專制朝政朝直遙翻下同太弟穎不得復豫事復扶又翻豫州都督范陽王虓徐州都督東平王楙等上言穎弗克負荷宜降封一邑特全其命荷下可翻又如字考異曰虓傳云與鎮東將軍周馥同上言按馥傳帝自長安還馥出為平東將軍都督揚州代劉準為鎮東據此表張方猶存蓋自鄴還洛陽時也太宰宜委以關右之任河間王顒時為太宰故稱之選舉授任一皆仰成朝之大事廢興損益每輒疇咨言關右州郡聽顒選舉朝政亦咨而後行仰牛向翻孔安國曰疇誰也顏師古曰疇誰也咨謀也言謀於衆人誰可為事也余按此所謂疇咨恐非孔顏注義蓋疇類也咨問也言朝之大事類以問顒朝直遙翻而不達變通未即西還宜遣還郡方本為馮翊太守為于偽翻請悉如舊司徒戎司空越並忠國小心宜幹機事委以朝政幹讀曰管又如字王浚有定社稷之勳謂舉兵討穎也遂撫幽朔長為北藩臣等竭力扞城藩屏皇家屏必郢翻則陛下垂拱四海自正矣張方在洛既久兵士剽掠殆竭衆情喧喧無復留意剽匹妙翻衆情謂方之軍情也議欲奉帝遷都長安恐帝及公卿不從欲須帝出而劫之須待也帝不許十一月乙未方引兵入殿以所乘車迎帝帝馳避後園竹中軍人引帝出逼使上車上時掌翻帝垂泣從之方於馬上稽首曰今寇賊縱橫宿衛單少稽音啓縱子容翻少詩沼翻願陛下幸臣壘臣盡死力以備不虞時㣥臣皆逃匿唯中書監盧志侍側曰陛下今日之事當一從右將軍張方時為右將軍令方具車載宮人寶物軍人因妻略後宮分爭府藏藏徂浪翻割流蘇武帳為馬帴毛晃曰流蘇盤線繪繡之毬五采錯為之同心而下垂者是也蘇猶鬚也又散貌以其蕊下垂故曰蘇今人謂絛頭蕊為蘇孟康曰今御武帳置兵闌五兵於帳中帴將先翻馬藉也掃地無遺方將焚宗廟宮室以絶人返顧之心盧志曰董卓無道焚燒洛陽事見五十九卷漢獻帝初平元年百年猶存何為襲之乃止帝停方壘三日方擁帝及太弟穎豫章王熾等趨長安趨七喻翻王戎出奔郟郟縣前漢屬潁川郡後漢省晉屬襄城郡隋唐為汝州郟城縣郟音夾帥讀曰率顒前拜謁帝下車止之帝入長安以征西府為宮征西府征西將軍府顒所居也承制行事號東西臺洛陽為東臺長安為西臺暾他昆翻勗之子也荀勗朋比賈充貴顯於晉初丙午留臺大赦改元復為永安辛丑復皇后羊氏劉弘遣陶侃等攻昌於竟陵羅尚移屯巴郡遣兵掠蜀中獲李驤妻咱氏及子壽咱子感翻姓也劉弘遣陶侃等攻昌於竟陵十二月丁亥詔太弟穎以成都王還第更立豫章王熾為皇太弟更工衡翻帝兄弟二十五人時存者惟穎熾及吳王晏晏材資庸下熾沖素好學好呼報翻故太宰顒立之詔以司空越為太傅與顒夾輔帝室王戎參録朝政朝直遙翻又以光祿大夫王衍為尚書左僕射高密王略為鎮南將軍領司隸校尉權鎮洛陽考異曰惠紀作高密王簡按宗室傳高密孝王略字元簡時都督青州後遷都督荊州未嘗鎮洛陽蓋簡即略也時雖有朝命而略不至或嘗鎮洛陽而本傳遺脫耳以余觀之時朝廷命令不行於方鎮略蓋未嘗赴洛也都督冀州諸軍事鎮鄴晉書帝紀作東中郎將模傳作北中郎將又按晉制方面之任有四征四鎮四安四平無四寧也寧恐當作安令州郡蠲除苛政愛民務本清通之後當還東京謂阻兵者解兵道路清通之後也帝時在長安故謂洛陽為東京改元改元永興皆越之弟也王浚既去鄴越使模鎮之顒以四方乖離禍難不已故下此詔和解之冀獲少安顒欲和解兄弟當在乂穎搆隙之時及事不可為而顒亦不免矣難乃旦翻又詔以太宰顒都督中外諸軍事張方為中領軍録尚書事領京兆太守時帝在長安京兆太守實掌輦轂下張方握兵顒所親倚故使領京兆劉弘遣陶侃等攻昌於竟陵東嬴公騰遣將軍聶玄擊漢王淵戰於大陵大陵縣自漢以來屬太原郡魏收地形志太原郡統內受陽縣有大陵城其地蓋在唐遼並二州界杜佑曰文水縣漢大陵縣聶尼輒翻淵遣劉曜寇太原取泫氏屯留長子中都泫氏屯留長子屬上黨郡中都屬太原郡賢曰泫氏今澤州高平縣劉㫬曰澤州陵川縣漢泫氏縣高平漢泫氏縣地屯留長子唐皆屬潞州師古曰泫音工玄翻屯音純長讀如長短之長陸德明讀如長幼之長取介休介休令賈渾不降晞殺之介休縣漢屬太原郡晉屬西河郡唐屬汾州冠古玩翻降戶江翻宗氏罵晞而哭晞又殺之淵聞之大怒曰使天道有知喬晞望有種乎種章勇翻追還降秩四等收渾尸葬之王崇武標點容肇祖聶崇岐覆校
