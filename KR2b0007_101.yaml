body:
  text: 資治通鑑卷第一百一端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰判西京留司御史臺上柱國河內郡開國侯食邑一千三百戶食實封四百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注晉紀二十三春孝宗穆皇帝下升平四年庚申三六春春正月癸巳燕主俊大閲于鄴欲使大司馬恪司空陽騖將之入寇騖音務將即亮翻會疾篤乃召恪騖及司徒評領軍將軍慕輿根等受遺詔輔政甲午卒年四十二戊子太子暐即皇帝位暐字景茂俊第三子按長曆是年正月甲戌朔今俊以甲午卒則戊子在甲午前即位恐是戊戌大赦改元建熙春秦王堅分司隸置雍州雍於用翻以河南公雙為都督雍河涼三州諸軍事征西大將軍雍州刺史改封趙公鎮安定河涼三州非秦土也雙所督實土惟安定五郡耳為雙以安定叛張本春仇池公楊俊卒子世立春二月燕人尊可足渾后為皇太后以太原王恪為太宰專録朝政録總也朝直遙翻陽騖為太保慕輿根為太師參輔朝政朝直遙翻下同根性木強師古曰木謂質直強音其兩翻自皓以來根屢有戰功舉動倨傲時太后可足渾氏頗預外事根欲為亂乃言於恪曰今主上幼沖母后干政殿下宜防意外之變思有以自全且定天下者殿下之功也兄亡弟及古今成法此殷法也非周法也宜廢主上為王殿下自踐尊位以為大燕無窮之福恪曰公醉邪何言之悖也悖蒲內翻又蒲沒翻吾與公受先帝遺詔云何而遽有此議根愧謝而退恪以告吳王垂垂勸恪誅之恪曰今新遭大喪二鄰觀釁二鄰謂晉秦也恐乖遠近之望且可忍之祕書監皇甫真言於恪曰根本庸豎過蒙先帝厚恩引參顧命而小人無識自國哀已來驕很日甚將成禍亂很戶墾翻明公今日居周公之地當為社稷深謀早為之所恪不聽根又言於可足渾氏及燕主暐曰太宰太傅將謀不軌臣請帥禁兵以誅之帥讀曰率可足渾氏將從之暐曰二公國之親賢先帝選之託以孤嫠嫠陵之翻無夫曰嫠必不肯爾安知非太師欲為亂也乃止根又思戀東土龍城在鄴城東北故曰東土今天下蕭條外寇非一國大憂深不如還東恪聞之乃與太傅評謀密奏根罪狀使右衛將軍傅顏就內省誅根並其妻子黨與大赦既誅根及其妻子黨與恐衆心反側故肆赦以安之誅夷狼籍內外恟懼恟許拱翻太宰恪舉止如常人不見其有憂色每出入一人步從從才用翻或説以宜自嚴備説輸芮翻恪曰人情方懼當安重以鎮之奈何復自驚擾衆將何仰復扶又翻由是人心稍定恪雖綜大任而朝廷之禮兢兢嚴謹每事必與司徒評議之未嘗專決虛心待士咨詢善道量才授任量音良人不踰位官屬朝臣或有過失朝直遙翻不顯其狀隨宜他敘不令失倫以敘遷為他官不令失其倫等也時人以為大愧莫敢犯者或有小過自相責曰爾復欲望宰公遷官邪恪為太宰故稱之為宰公復扶又翻皆以為中原可圖桓溫曰慕容恪尚在憂方大耳史言慕容恪能輔幼主桓溫能料敵三月己卯葬燕主俊於龍陵陵在龍城因以為名廟號烈祖所徵郡國兵以燕朝多難難乃旦翻互相驚動往往亶自散歸自鄴以南道路斷塞塞悉則翻太宰恪以吳王垂為使持節征南將軍都督河南諸軍事兗州牧荊州刺史鎮梁國之蠡臺使疏吏翻下同孫希為並州刺史傅顏為護軍將軍帥騎二萬觀兵河南臨淮而還境內乃安史言恪當國有大憂衆心危疑之際處之有方帥讀曰率騎奇寄翻觀古玩翻示之也觀兵曜兵以示之也泳之弟也孫泳拒趙見九十六卷成帝咸康四年史書孫泳鞠彭宋燭之子弟皆貴顯於燕所以勸委質者能守死而不二子孫必獲其福也春胸奴劉衛辰遣使降秦降戶江翻請田內地春來秋返秦王堅許之夏四月雲中護軍賈雍遣司馬徐贇帥騎襲之贇於倫翻大獲而還堅怒曰朕方以恩信懷戎狄而汝貪小利以敗之何也敗補邁翻黜雍以白衣領職遣使還其所獲慰撫之衛辰於是入居塞內貢獻相尋夏六月代王什翼犍慕容氏卒犍居言翻秋七月劉衛辰如代會葬因求婚什翼犍以女妻之妻七細翻春八月辛丑朔日有食之既春謝安少有重名少詩照翻前後徵辟皆不就寓居會稽會工外翻以山水文籍自娛雖為布衣時人皆以公輔期之士大夫至相謂曰安石不出當如蒼生何謝安字安石江東人士始焉所期望者殷浩浩既無以滿衆望矣繼而所望者謝安而安卒能匡輔晉室世之論者皆優安而劣浩余謂盛名之下其實難副浩之所以敗正以與桓溫齊名其心易溫又值石氏之亂以為可以立功敗於輕率也謝安當桓溫亶政之時又身嘗為之僚屬而懲浩之所以失戒溫而為之備溫既死而值秦之強兢兢焉為自保之謀常持懼心此其所以濟也史氏謂其能矯情鎮物蓋因屐齒之折白雞之夢而知之耳東山在今紹興府上虞縣西南四十五里安故居今為國慶禪寺妓渠綺翻司徒昱聞之曰安石既與人同樂樂音洛必不得不與人同憂召之必至安妻劉惔之妹也見家門貴盛劉惔以清談貴顯而謝尚謝奕謝萬皆為方伯盛於一時惔徒甘翻謂曰丈夫不如此也安掩鼻曰恐不免耳言恐亦不免如諸兄弟也安始有仕進之志時已年四十餘征西大將軍桓溫請為司馬安乃赴召溫大喜深禮重之春冬十月烏桓獨孤部鮮卑沒奕干各帥衆數萬降秦秦王堅處之塞南帥讀曰率降戶江翻處昌呂翻下同陽平公融諫曰戎狄人面獸心不知仁義其稽顙內附實貪地利非懷德也稽音啓不敢犯邊實憚兵威非感恩也今處之塞內與民雜居彼窺郡縣虛實必為邊患不如徙之塞外以防未然堅從之春十一月封桓溫為南郡公溫弟沖為豐城縣公子濟為臨賀縣公春燕太宰恪欲以李績為右僕射燕主暐不許恪屢以為請暐曰萬機之事皆委之叔父伯陽一人暐請獨裁出為章武太守以憂卒暐不平李績事見上卷上年五年辛酉三六一春正月戊戌大赦劉衛辰掠秦邊民五十餘口為奴婢以獻於秦秦王堅責之使歸所掠衛辰由是叛秦專附於代史言夷狄反覆難保東安簡伯郗曇卒郗丑之翻曇徒含翻二月以東陽太守范汪都督徐兗冀青幽五州諸軍事兼徐兗二州刺史平陽人舉郡降燕平陽時屬張平遣督護韓苞將兵共守平陽方士丁進有寵於燕主暐章十二行本暐作俊乙十一行本同欲求媚於太宰恪説恪令殺太傅評説輸芮翻恪大怒秦收斬之高昌卒三年高昌奔滎陽遣使來降拜護冀州刺史護欲引晉兵以襲鄴三月燕太宰恪將兵五萬冠軍將軍皇甫真將兵萬人共討之將即亮翻冠古玩翻燕兵至野王護嬰城自守護軍將軍傅顏請急攻之以省大費恪曰老賊經變多矣觀其守備未易猝攻易以豉翻而多殺士卒頃攻黎陽多殺精鋭卒不能拔事見上卷二年護內無蓄積外無救援我深溝高壘坐而守之休兵養士離間其黨間古莧翻於我不勞而賊勢日蹙不過十旬取之必矣何為多殺士卒以求旦夕之功乎乃築長圍守之夏四月桓溫以其弟黃門郎豁都章十二行本無都字乙十一行本同督沔中七郡諸軍事魏置中書監令又置通事郎黃門郎沔中七郡魏興新城上庸襄陽義成竟陵江夏也城當作成破燕將慕容塵涼驃騎大將軍宋混疾甚驃匹妙翻騎奇寄翻張玄靚及其祖母馬氏往省之靚疾正翻又疾郢翻省悉景翻曰將軍萬一不幸寡婦孤兒將何所託欲以林宗繼將軍可乎混曰臣子林宗幼弱不堪大任殿下儻未棄臣門臣弟澄政事愈於臣但恐其儒緩機事不稱耳凡儒者多務為舒緩而不能應機以趨事赴功稱尺證翻可也混戒澄及諸子曰吾家受國大恩當以死報無恃勢位以驕人又見朝臣皆戒之以忠貞朝直遙翻及卒行路為之揮涕卒子恤翻為于類翻玄靚以澄為領軍將軍輔政五月丁巳帝崩年十九皇太后令曰琅邪王丕中興正統元帝明帝成帝皆正統相傳琅邪王丕成帝長子也故曰中興正統莫與為比其以王奉大統於是百官備法駕迎于琅邪第庚申即皇帝位大赦壬戌改封東海王奕為琅邪王秋七月戊午葬穆帝于永平陵廟號孝宗燕人圍野王數月呂護遣其將張興出戰傅顏擊斬之城中日蹙皇甫真戒部將曰護勢窮奔突必擇虛隙而投之吾所部士卒多羸器甲不精宜深為之備乃多課櫓楯親察行夜者將即亮翻羸倫為翻楯食尹翻行下孟翻護食盡果夜悉精鋭趨真所部趨七喻翻不得出太宰恪引兵擊之護衆死傷殆盡棄妻子奔滎陽恪存撫降民給其廣回禾食降戶江翻徙士人將帥於鄴自餘各隨所樂帥所類翻樂音洛以護參軍廣平梁琛為中書著作郎晉武帝以祕書並中書省故曰中書著作郎琛丑林翻九月戊申立王氏為皇后后濛之女也穆帝何皇后稱穆皇后居永安宮涼右司馬張雍惡宋澄專政惡烏路翻下同起兵攻澄殺之併滅其族宋澄豈特機事不稱哉遂赤其族以此知經世非儒緩者所能為也叔父天錫為中領軍同輔政張平襲燕平陽殺段剛韓苞又攻鴈門殺太守單男單音善姓也既而為秦所攻平復謝罪於燕以求救復扶又翻燕人以平反覆弗救也平遂為秦所滅乙亥秦大赦徐兗二州刺史范汪素為桓溫所惡桓溫初以安西鎮上流汪為上佐蓋惡其異己也若汪於此時能立異必知溫之心迹矣惡烏路翻命汪帥衆出梁國帥讀曰率冬十月坐失期免為庶人遂廢卒於家卒子恤翻子寧好儒學好呼到翻性質直常謂王弼何晏之罪深於桀紂或以為貶之太過寧曰王何蔑棄典文幽沈仁義沈持林翻遊辭浮説波蕩後生使搢紳之徒翻然改轍以至禮壞樂崩中原傾覆遺風餘俗至今為患桀紂縱暴一時適足以喪身覆國喪息浪翻豈能回百姓之視聽哉故吾以為一世之禍輕歷代之患重自喪之惡小迷衆之罪大也喪息浪翻呂護復叛奔燕燕人赦之以為廣州刺史燕無廣州以刺史之名授護耳涼張雍驕矜淫縱樹黨專權多所刑殺國人患之張天錫所親敦煌劉肅謂天錫曰敦徒門翻國家事欲未靜天錫曰何謂也肅曰今護軍出入有似長寧長寧侯張祚也我固疑之未敢出口計將安出肅曰正當速除之耳天錫曰安得其人肅曰肅即其人也肅時年未二十天錫曰汝年少少詩照翻更求其助肅曰趙白駒與肅二人足矣十一月天錫與雍俱入朝朝直遙翻肅與白駒從天錫章十二行本錫下有值雍於門下五字乙十一行本同孔本同張校同退齋校同肅斫之不中中竹仲翻白駒繼之又不克二人與天錫俱入宮中雍得逸走帥甲士三百餘人攻宮門天錫登屋大呼曰帥讀曰率呼火故翻張雍凶逆無道既滅宋氏又欲傾覆我家汝將士世為涼臣何忍以兵相向邪將即亮翻今所取者止張雍耳他無所問於是雍兵悉散走雍自刎死盡滅其族黨刎扶粉翻玄靚以天錫為使持節冠軍大將軍都督中外諸軍事輔政自張重華沒後張祚張瓘宋混宋澄以及張雍張天錫遞相屠滅涼浸衰矣使疏吏翻冠古玩翻始改建興四十九年奉升平年號涼至是方奉建康年號燕大赦秦王堅命牧伯守宰各舉孝悌廉直文學政事察其所舉得人者賞之非其人者罪之由是人莫敢妄舉而請託不行士皆自勵雖宗室外戚無才能者皆棄不用當是之時內外之官率皆稱職稱尺證翻田疇修闢倉庫充實盜賊屏息屏必郢翻是歲歸義侯李勢卒永和三年李勢降至是而卒哀皇帝諱丕成帝長子也字千齡咸康八年封琅邪王諡法恭仁短折曰哀隆和元年壬戌三六二春正月壬子大赦改元甲寅減田租畝收二升成帝咸和五年始度百姓田畝取十分有一率畝稅米三升今減之畝收二升燕豫州刺史孫興請攻洛陽曰晉將陳祐弊卒千餘介守孤城不足取也將即亮翻介如字獨也又音戛燕人從其言遣寧南將軍呂護屯河陰二月辛未以吳國內史庾希為北中郎將徐兗二州刺史鎮下邳龍驤將軍袁真為西中郎將監護豫司並冀四州諸軍事豫州刺史鎮汝南希真既並假節職任宜同疑希亦當帶監護之職史逸之也驤思將翻監工銜翻希冰之子也庾冰秉政於咸康丙子拜帝母周貴人為皇太儀服擬於太后燕呂護攻洛陽三月乙酉河南太守戴施奔宛永和十二年桓溫留戴施戍洛陽宛於元翻五月丁巳桓溫遣庾希及竟陵太守鄧遐帥舟師三千人助祐守洛陽帥讀曰率遐嶽之子也鄧嶽王敦將也敦敗後自歸著功交廣溫上疏請遷都洛陽自永嘉之亂播流江表者一切北徙以實河南朝廷畏溫不敢為異而北土蕭條人情疑懼雖並知不可莫敢先諫散騎常侍領著作郎孫綽上疏曰晉志曰著作郎周左史之任也漢東京圖籍在東觀故使儒者著作東觀有其名尚未有官魏明帝太和中詔置著作郎於此始有其官隸中書省晉惠帝置祕書監併統著作省蓋著作雖別置省而猶隸祕書也余按班固西都賦曰承明金馬著作之廷如是則漢西都雖未置著作之官而承明金馬亦著作之所也散悉亶翻騎奇寄翻昔中宗龍飛元帝廟號中宗易大傳曰天之所助者順也人之所助者信也今自喪亂已來六十餘年自賈后之廢趙王倫之誅繼而諸王交兵胡羯乘之而起天下大亂至是六十餘年矣喪息浪翻函夏蕭條函容也夏大也言中原之地所函容者大也夏戶雅翻已經數世存者老子長孫長知兩翻亡者丘隴成行行戶剛翻雖北風之思感其素心目前之哀實為交切若遷都旋軫之日賈公彥曰若不定之辭即復緬成遐域中興五陵元帝建平陵明帝武平陵成帝興平陵康帝崇平陵穆帝永平陵皆在江南緬遠也遐亦遠也既難以理保言以理觀之遷都于洛難以保泰山之安也豈不纏於聖心哉蒸蒸進進也言若遷洛纏心於江南陵寢孝思進進也誠欲大覽始終為國遠圖而百姓震駭同懷危懼豈不以反舊之樂賒趨死之憂促哉樂音洛趨七喻翻何者植根江外數十年矣中原以江南為江外亦曰江表驅踧於窮荒之地踧昌六翻提挈萬里踰險浮深離墳墓離力智翻棄生業田宅不可復售復扶又翻舟車無從而得捨安樂之國適習亂之鄉將頓仆道塗飄溺江川僅有達者溺奴狄翻此仁者所宜哀矜國家所宜深慮也臣之愚計以為且宜遣將帥有威名資實者先鎮洛陽將即亮翻帥所類翻掃平梁許梁謂梁國許謂許昌皆當江南入洛之要路運漕之路既通開墾之積已豐豺狼遠竄中夏小康然後可徐議遷徙耳夏戶雅翻奈何捨百勝之長理舉天下而一擲哉綽楚之孫也孫楚仕武帝時有才名少詩照翻嘗著遂初賦以見志溫見綽表不悅曰致意興公孫綽字興公而知人家國事邪時朝廷憂懼將遣侍中止溫揚州刺史王述曰溫欲以虛聲威朝廷耳非事實也但從之自無所至乃詔溫曰在昔喪亂忽涉五紀孔穎達曰言在昔者自下本上之辭言昔在者從上自下為稱喪息浪翻自惠帝永興元年劉淵始亂距是歲五十九年自懷帝永嘉五年洛陽陷距是歲五十年繼襲凶迹眷言西顧慨歎盈懷知欲躬帥三軍蕩滌氛穢廓清中畿中畿王畿也周禮九畿王畿方千里其外侯甸男采衛蠻夷鎮蕃皆以蠻五百里言之王畿在九畿之中故此曰中畿帥讀曰率非夫外身徇國孰能若此諸所處分處昌呂翻分扶問翻委之高算但河洛丘墟所營者廣經始之勤致勞懷也事果不行溫又議移洛陽鍾虡虡音巨述曰永嘉不競暫都江左方當蕩平區宇旋軫舊京若其不爾宜改遷園陵不應先事鍾虡溫乃止朝廷以交廣遼遠溫督荊司雍益梁寧交廣八州溫表辭不受秦王堅親臨太學考第諸生經義與博士講論自是每月一至焉六月甲戌燕征東參軍劉拔刺殺征東將軍冀州刺史范陽王友於信都刺七亦翻秋七月呂護退守小平津以晉援兵至也中竹仲翻燕將段崇收軍北渡屯于野王鄧遐進屯新城新城春秋戎蠻子之國也自漢以來屬河南隋改為伊闕縣西中郎將袁真進屯汝南運米五萬斛以饋洛陽冬十一月代王什翼犍納女於燕犍居言翻燕人亦以女妻之妻七細翻十二月戊午朔日有食之庾希自下邳退屯山陽袁真自汝南退屯壽陽以洛陽兵解退屯而燕兵尋復至矣興寧元年癸亥三六三春二月己亥大赦改元三月壬寅皇太周氏薨于琅邪第癸卯帝就第治喪治直之翻詔司徒會稽王昱總內外衆務帝欲為太服三年為于偽翻僕射江虨啓於禮應服緦麻虨逋間翻又欲降服期虨曰厭屈私情所以上嚴祖考乃服緦麻周禮曰王為諸侯緦縗辨而加環絰又禮為人後者為之子故為所後服斬衰三年而降其父母期虨以為應服緦者蓋以帝入後大宗則周氏者琅邪之母當以服諸侯者服之也厭於葉翻嚴尊也夏四月燕寧東將軍慕容忠攻滎陽太守劉遠遠奔魯陽五月加征西大將軍桓溫侍中大司馬都督中外諸軍録尚書事假黃鉞溫以撫軍司馬王坦之為長史坦之述之子也又以征西掾郗超為參軍王珣為主簿每事必與二人謀之府中為之語曰髯參軍短主簿以超多髯而珣短也掾于絹翻郗丑之翻能令公怒令力呈翻溫氣概高邁罕有所推與超言常自謂不能測傾身待之超亦深自結納珣導之孫也與謝玄皆為溫掾溫俱重之曰謝掾年四十必擁旄杖節王掾當作黑頭公皆未易才也易以豉翻玄奕之子也升平二年謝奕卒以西中郎將袁真都督司冀並三州諸軍事北中郎將庾希都督青州諸軍事癸卯燕人拔密城密縣漢屬河南郡晉屬滎陽郡秋八月有星孛于角亢角二星亢四星晉天文志角亢氐鄭兗州分孛蒲內翻亢居郎翻張玄靚祖母馬氏卒靚疾正翻又疾郢翻尊庶母郭氏為太郭氏以張天錫專政與大臣張欽等謀誅之事泄欽等皆死玄靚懼以位讓天錫天錫不受右將軍劉肅等勸天錫自立閏月天錫使肅等夜帥兵入宮弒玄靚帥讀曰率下同考異曰帝紀天錫殺玄靚自立在七月今從晉春秋宣言暴卒諡曰沖公天錫自稱使持節大都督大將軍涼州牧西平公使疏吏翻時年十八尊母劉美人曰太遣司馬綸騫奉章詣建康請命綸姓也姓譜曰魏志孫文端臣綸直穆帝永和三年歸使涼州今乃還癸亥大赦冬十月燕鎮南將軍慕容塵攻陳留太守袁披于長平長平縣前漢屬汝南郡後漢晉屬陳郡賢曰長平故城在今陳州宛丘縣西北克之考異曰燕書作朱黎今從晉帝紀代王什翼犍擊高車大破之高車即敕勒也俗乘高輪車故亦號高車部李延壽曰高車蓋古赤狄之餘種也初號為狄歷北方以為高車丁零其遷徙隨水草衣皮食肉與柔然同唯車輪高大輻數至多犍居言翻馬牛羊百餘萬頭以征虜將軍桓沖為江州刺史十一月姚襄故將張駿殺江州督護趙毗帥其徒北叛沖討斬之桓溫之破姚襄獲襄將張駿楊凝等徙于尋陽二年甲子三六四春正月丙辰燕大赦二月燕太傅評龍驤將軍李洪略地河南驤思將翻三月庚戌朔大閲戶口令所在土斷令西北士民僑寓東南者所在以土著為斷也斷丁亂翻章十二行本制作禁乙十一行本同謂之庚戌制帝信方士言斷穀餌藥以求長生斷讀曰短侍中高嵩諫曰此非萬乘所宜為乘繩證翻陛下茲事實日月之食論語子貢曰君子之過也如日月之食焉辛未帝以藥發不能親萬機褚太后復臨朝攝政穆帝以幼沖嗣位褚太后臨朝稱制升平元年帝加元服太后歸政帝即位年長矣以疾不能親政太后復臨朝復扶又翻朝直遙翻夏四月甲辰燕李洪攻許昌汝南敗晉兵於懸瓠敗補邁翻水經注曰懸瓠城汝南郡治也城之西北汝水枝別左出西北流又屈西東轉又西南會汝形如垂瓠因以名城瓠音胡又音互潁川太守李福戰死汝南太守朱斌奔壽春陳郡太守朱輔退保彭城大司馬溫遣西中郎將袁真等禦之去年五月加桓溫督録假黃鉞至是書其官名而不姓堅冰至矣帥讀曰率燕人遂拔許昌汝南陳郡徙萬餘戶於幽冀二州遣鎮南將軍慕容塵屯許昌五月戊辰以揚州刺史王述為尚書令加大司馬溫揚州牧録尚書事壬申使侍中召溫入參朝政溫辭不至王述每受職不為虛讓其所辭必於不受及為尚書令子坦之白述故事當讓述曰汝謂我不堪邪坦之曰非也但克讓自美事耳述曰既謂堪之何為復讓復扶又翻人言汝勝我定不及也六月秦王堅遣大鴻臚拜張天錫為大將軍涼州牧西平公秋七月丁卯詔復徵大司馬溫入朝八月溫至赭圻詔尚書車灌止之溫遂城赭圻居之赭圻在宣城界南史沈攸之自虎檻洲進攻赭圻陶亮等自鵲頭引兵救之劉昫曰宣州南陵縣漢春穀縣地梁置南陵縣舊治赭圻城唐長安四年移治青陽城按溫表云春穀縣之赭圻城在江東岸臨當濡須口上二十里距建康宮三百三十里南有聲里北有高安戍車昌遮翻圻渠希翻內録謂録尚書事也秦汝南公騰謀反伏誅騰秦主生之弟也是時生弟晉公柳等猶有五人王猛言於堅曰不去五公終必為患堅不從為後柳等反張本去羌呂翻燕侍中慕輿龍詣龍城徙宗廟及所留百官皆詣鄴燕太宰恪將取洛陽考異曰帝紀慕容暐寇洛陽上云苻堅別帥侵河南按明年恪拔洛陽堅親將以備潼關是未敢與燕爭河南也十六國春秋堅傳亦無此舉帝紀恐誤遠近諸塢皆歸之乃使司馬悅希軍于盟津盟讀曰孟豫州刺史孫興軍于成皋初沈充之子徑以其父死於逆亂見九十三卷明帝太寧二年年三十餘以刑家不得仕吳興太守王胡之為司州刺史上疏稱徑才行行下孟翻請解禁錮參其府事朝廷許之會胡之以病不行及燕人逼洛陽冠軍將軍陳祐守之冠古玩翻衆不過二千徑自表求配祐效力詔以徑補冠軍長史令自募壯士得千餘人以行徑屢以少擊燕衆摧破之少詩沼翻而洛陽糧盡援絶祐自度不能守度徒洛翻乃以救許昌為名九月留徑以五百人守洛陽祐帥衆而東帥讀曰率徑喜曰吾志欲致命論語子張曰七見危致命朱子曰致命謂委致其命猶言授命也祐聞許昌已沒遂奔新城燕悅希引兵略河南諸城盡取之秦王堅命公國各置三卿晉制王國置郎中令中尉大農為三卿秦因其制獨為置郎中令為于偽翻富商趙掇等車服僭侈諸公競引以為卿掇陟劣翻又都活翻黃門侍郎安定程憲章十二行本憲下有言於堅三字乙十一行本同孔本同請治之治直之翻堅乃下詔稱本欲使諸公延選英儒乃更猥濫如是宜令有司推檢辟召非其人者悉降爵為侯自今國官皆委之銓衡銓衡謂吏部尚書也不得乘車馬去京師百里內工商皂隸不得服金銀錦繡犯者棄市於是平陽平昌九江陳留安樂五公皆降爵為侯樂音洛三年乙丑三六五春正月庚申皇后王氏崩劉衛辰復叛代劉衛辰附代見上升平五年復扶又翻擊走之犍居言翻什翼犍性寬厚郎中令許謙盜絹二匹什翼犍知而匿之按北史代國俗無繒帛而謙盜之其罪在不赦而什翼犍能容之故史以此言其寬厚之一端吾不忍視謙之面章十二行本面下有卿慎勿泄四字乙十一行本同孔本同退齋校同若謙慙而自殺是吾以財殺士也嘗討西部叛者流矢中目中竹仲翻既而獲射者㣥臣欲臠割之什翼犍曰彼各為其主鬬耳為于偽翻何罪遂釋之大司馬溫移鎮姑孰溫又自赭圻而東鎮姑孰乙未以其弟右將軍豁監荊州揚州之義城雍州之京兆諸軍事領荊州刺史義城郡置於襄陽襄陽郡屬荊州而義城郡領揚州淮南之平阿下蔡蓋桓宣先從祖約退屯淮南後鎮襄陽陶侃以其淮南部曲置義成郡於穀城蓋有揚州之民而又置揚州僑縣於穀城穀城荊州統內之地也故曰荊州揚州之義成曰義成者言以義成軍因而名郡後人又於成字旁添土失其初立郡之旨矣京兆郡屬雍州時亦僑立於襄陽雍於用翻初沖刺江州領西陽譙二郡太守今加監荊州之江夏隨郡豫州之汝南西陽新蔡潁川凡六郡通所鎮尋陽為八郡監工銜翻考異曰帝紀云沖領南蠻校尉按江左唯荊州領南蠻沖傳亦無蓋紀因桓豁重出今不取司徒昱聞陳祐棄洛陽會大司馬溫于洌洲今姑孰江中有洌山即其地丙申帝崩于西堂年二十五西堂太極殿西堂也建康太極殿有東西堂東堂以見㣥臣西堂為即安之地帝無嗣丁酉皇太后詔以琅邪王奕承大統奕當作奕是日即皇帝位大赦秦大赦改元建元燕太宰恪吳王垂共攻洛陽恪謂諸將曰卿等常患吾不攻今洛陽城高而兵弱易克也易以豉翻勿更畏懦而怠惰遂攻之三月克之執揚武將軍沈徑徑神氣自若恪將宥之中軍將軍慕輿虔曰徑雖奇士觀其志度終不為人用今赦之必為後患遂殺之恪略地至崤澠崤崤谷也澠澠池也澠彌兗翻秦王堅自將屯陝城以備之將即亮翻陝式冉翻燕人以左中郎將慕容築為洛州刺史鎮金墉築張六翻吳王垂為都督荊揚洛徐兗豫雍益涼秦十州諸軍事征南大將軍荊州牧配兵一萬鎮魯陽雍於用翻太宰恪還鄴謂僚屬曰吾前平廣固不能濟辟閭蔚見上卷穆帝永和十二年使沈徑為戮雖皆非本情然身為元帥實有愧於四海帥讀曰率朝廷嘉徑之忠贈東陽太守臣光曰沈徑可謂能子矣恥父之惡致死以滌之變凶逆之族為忠義之門易曰幹父之蠱用譽易蠱卦六五爻辭象曰幹父用譽承以德也爾尚蓋前人之愆惟忠惟孝見尚書太宰恪為將不事威嚴專用恩信撫士卒務綜大要不為苛令使人人得便安平時營中寬縱似若可犯然警備嚴密敵至莫能近者近其靳翻故未嘗負敗壬申葬哀帝及靜皇后于安平陵王皇后諡曰靜晉書作靖夏四月壬午燕太尉武平匡公封奕卒諡法貞心大度曰匡侍中光祿大夫皇甫真為司空領中書監騖歷事四朝廆皓俊暐四朝朝直遙翻自太宰恪以下皆拜之而騖謙恭謹厚過於少時戒束子孫雖朱紫羅列無敢違犯其法度者封奕事燕亦歷事四朝其宣勞過於陽騖子孫貴顯亦過於陽氏豈奕之謙德有愧於騖邪或者史家因陽氏家傳書之而封氏闕然無述也少詩照翻六月戊子益州刺史建城襄公周撫卒諡法因事有功曰襄穆帝永和三年桓溫平蜀留撫鎮之至是才十九年蓋晉未得蜀之前置益州刺史於巴東撫先已為刺史溫既克蜀撫仍為益州刺史鎮彭模曰在益州三十餘年者史通其鎮巴東鎮彭模之年數之也詔以其子犍為太守楚代之犍居言翻秋七月己酉徙會稽王昱復為琅邪王元帝以昱為琅邪王奉恭王祀成帝咸和元年王生母鄭夫人薨王號慕請服重徙封會稽王是後康帝哀帝及今帝皆自琅邪入繼大統會工外翻壬子立庾氏為皇后后冰之女也甲申立琅邪王昱子昌明為會稽王昱固讓猶自稱會稽王會工外翻胸奴右賢王曹轂左賢王劉衛辰皆叛秦轂帥衆二萬寇杏城秦王堅自將討之轂古祿翻帥讀曰率將即亮翻使衛大將軍李威左僕射王猛輔太子宏留守長安八月堅擊轂破之斬轂弟活轂請降降戶江翻徙其豪傑六千餘戶于長安建節將軍鄧羌討衛辰擒之於木根山木根山在朔方九月堅如朔方巡撫諸胡冬十月征北將軍淮南公幼帥杏城之衆乘虛襲長安李威擊斬之幼亦秦主生之弟也鮮卑禿髮椎斤卒年一百一十子思復鞬代統其衆鞬居言翻椎斤樹機能從弟務丸之孫也樹機能亂涼州見晉武帝紀從才用翻梁州刺史司馬勳為政酷暴治中別駕及州之豪右言語忤意即於坐梟斬之忤五故翻坐徂臥翻梟堅堯翻或親射殺之射而亦翻常有據蜀之志憚周撫不敢發及撫卒勳遂舉兵反別駕雍端西戎司馬隗粹切諫西戎司馬西戎校尉之屬官也雍於用翻隗五罪翻自號梁益二州牧成都王十一月勳引兵入劍閣攻涪西夷校尉毌丘暐棄城走晉初置西夷校尉治汶山今蓋治涪城涪音浮乙卯圍益州刺史周楚于成都大司馬溫表鷹揚將軍江夏相義陽朱序為征討都護以救之夏戶雅翻相息亮翻秦王堅還長安以李威守太尉加侍中以曹轂為鴈門公劉衛辰為夏陽公夏戶雅翻各使統其部落十二月戊戌以尚書王彪之為僕射海西公上諱奕字延齡哀帝之母弟也咸康八年封為東海王穆帝升平五年改封琅邪王即位後桓溫廢為海西公太和元年丙寅三六六春三月荊州刺史桓豁使督護桓羆攻南鄭討司馬勳燕太宰大司馬恪太傅司徒評稽首歸政上章綬請歸第稽音啓上時掌翻燕主暐不許夏五月戊寅皇后庾氏崩朱序周楚擊司馬勳破之擒勳及其黨送大司馬溫溫皆斬之傳首建康代王什翼犍遣左長史燕鳳入貢于秦犍居言翻燕於賢翻秋七月癸酉葬孝皇后于敬平陵庾后諡曰孝秦輔國將軍王猛前將軍楊安揚武將軍姚萇等帥衆二萬寇荊州攻南鄉郡萇仲良翻帥讀曰率荊州刺史桓豁救之八月軍于新野秦兵掠安陽民萬餘戶而還安陽縣漢屬漢中郡魏置魏興郡安陽屬焉晉省秦攻南鄉而退安能深入山阻掠安陽之民乎載記作漢陽謂漢水之北也當從載記為是九月甲午曲赦梁益二州司馬勳初平赦其支黨及脅從者冬十月加司徒昱丞相録尚書事入朝不趨讚拜不名劍履上殿朝直遙翻上時掌翻張天錫遣使至秦境上告絶於秦涼與秦通見上卷穆帝永和十二年使疏吏翻燕撫軍將軍下邳王厲寇兗州拔魯高平數郡置守宰而還初隴西李儼以郡降秦既而復通於張天錫李儼據隴西事始上卷永和十一年降戶江翻復扶又翻羌斂岐以略陽四千家叛秦稱臣於儼載記作斂岐張天錫傳作廉岐斂羌姓也與秦涼絶南陽督護趙億據宛城降燕太守桓淡走保新野燕人遣南中郎將趙盤自魯陽戍宛宛於元翻徐兗二州刺史庾希以后族故兄弟貴顯大司馬溫忌之二年丁卯三六七春正月庾希坐不能救魯高平免官考異曰帝紀是月希有罪走入海按本傳海西廢後希始逃于海陵此時才坐免官耳二月燕撫軍將軍下邳王厲鎮北將軍宜都王桓襲敕勒秦輔國將軍王猛隴西太守薑衡南安太守南安邵羌揚武將軍姚萇等帥衆萬七千討斂岐三月張天錫遣前將軍楊遹向金城征東將軍常據向左南張軌置左南縣屬晉興郡闞駰十三州志曰石城西一百四十里有左南城河水徑其南曰左南津遹音聿晉志白土縣屬金城郡十三州志左南津西六十里有白土城城在大河之北為緣河濟渡之地倉松縣自漢以來屬武威郡後涼呂光改曰昌松縣將即亮翻斂岐部落先屬姚弋仲聞姚萇至皆降王猛遂克略陽斂岐奔白馬白馬即武都白馬氐之地夏四月燕慕容塵寇竟陵太守羅崇擊破之張天錫攻李儼大夏武始二郡下之宋白曰張駿十八年分武始興晉廣武置大夏郡唐為大夏縣屬河州張駿以狄道縣置武始郡今熙州即其地夏戶雅翻敗補邁翻天錫進屯左南儼懼退守枹罕枹音膚遣其兄子純謝罪於秦且請救秦王堅使前將軍楊安建威將軍王撫帥騎二萬會王猛以救儼猛遣邵羌追斂岐王撫守侯和薑衡守白石白石縣前漢屬金城郡後漢屬隴西郡賢曰白石山在今蘭州宋白曰河州鳳林縣本漢白石縣地張駿八年改為永固縣天錫遣楊遹逆戰于枹罕東猛大破之俘斬萬七千級與天錫相持於城下枹罕城下也送之猛遺天錫書曰遺于季翻吾受詔救儼不令與涼州戰今當深壁高壘以聽後詔曠日持久恐二家俱弊非良算也二家謂秦涼也吾執儼而東將軍徙民西旋不亦可乎天錫謂諸將曰猛書如此吾本來伐叛不來與秦戰遂引兵歸李儼猶未納秦師王猛白服乘輿從者數十人從才用翻請與儼相見儼開門延之未及為備將士繼入遂執儼以立忠將軍彭越為平西將軍涼州刺史鎮枹罕立忠將軍苻秦所創置張天錫之西歸也李儼將賀肫説儼曰以明公神武將士驍悍奈何束手於人王猛孤軍遠來士卒疲弊且以我請救必不設備若乘其怠而擊之可以得志儼曰求救於人以免難難既免而擊之天下其謂我何不若固守以老之彼將自退猛責儼以不即出迎儼以賀肫之謀告猛斬肫肫株倫翻又音豚説輸芮翻難乃旦翻以儼歸至長安堅以儼為光祿勳賜爵歸安侯燕太原桓王恪言於燕主暐曰諡法辟土服遠曰桓吳王垂將相之才十倍於臣先帝以長幼之次長知兩翻故臣得先之得先悉薦翻臣死之後願陛下舉國以聽吳王五月壬辰恪疾篤暐親視之問以後事恪曰臣聞報恩莫大於薦賢賢者雖在板築猶可為相謂殷王高宗起傅説於板築之間命以為相吳王文武兼資管蕭之亞謂才亞於管仲蕭何也國家可安不然秦晉必有窺窬之計言終而卒窬音俞卒子恤翻秦王堅聞恪卒陰有圖燕之計欲覘其可否覘丑廉翻又丑豔翻命胸奴曹轂發使如燕朝貢曹轂胸奴右賢王也前年降於秦朝直遙翻章十二行本簿下有馮翊二字乙十一行本同退齋校同郭辨為之副晉武帝置西戎校尉於長安秦蓋因之主簿其屬也考異曰燕建熙八年皇甫真為太尉燕書及載記真傳郭辨至燕皆在真為太尉下晉春秋在建熙十年八月恐皆非是故附於曹轂降秦下腆為散騎常侍皇甫真本安定人仕於燕從才用翻散悉亶翻騎奇寄翻歷造公卿造七到翻謂真曰僕本秦人家為秦所誅故寄命曹王貴兄常侍及奮覆兄弟並相知有素真怒曰臣無境外之交此言何以及我君似姦人得無因緣假託乎白暐請窮治之治直之翻太傅評不許辨還為堅言燕朝政無綱紀實可圖也為于偽翻朝直遙翻鑒機識變唯皇甫真耳堅曰以六州之衆六州幽並冀司兗豫也曹轂尋卒秦分其部落為二使其二子分統之號東西曹堅分轂部落二城以西二萬餘落使轂長子璽統之二城以東二萬餘落使轂小子寅統之荊州刺史桓豁竟陵太守羅崇攻宛拔之趙億走趙盤退歸魯陽豁追擊盤於雉城擒之雉縣自漢以來屬南陽郡其地當在唐鄧州向城縣界新唐志曰向城縣北八十里有魯陽關還從宣翻又如字秋七月燕下邳王厲等破敕勒獲馬牛數萬頭初厲兵過代地犯其穄田穄子例翻麻黍也今南人呼黍為穄北方地寒五穀不生惟黍生之故有穄田項安世曰黍有二種正黍似粟而大以五月熟今荊人專謂之黍又謂之黍穄是也又一種尤高大稈之狀至如蘆實之狀至如薏苡荊人謂之討黍又謂之蘆穄然以秋而熟非正黍也代王什翼犍怒犍居言翻燕平北將軍武強公埿以幽州兵戍雲中八月什翼犍攻雲中埿棄城走埿與泥同九月以會稽內史郗愔為都督徐兗青幽揚州之晉陵諸軍事徐兗二州刺史鎮京口郗丑之翻愔揖淫翻沈約曰晉永嘉大亂幽冀青並兗州及徐州之淮北流民相率過淮亦有過江在晉陵界者成帝咸和四年郗鑒又徙流民之在淮南者於晉陵諸縣其徙過江南及留在江北者並立僑郡縣以司牧之徐兗二州或治江北江北又僑立幽冀青並四州秦淮南公幼之反也征東大將軍並州牧晉公柳征西大將軍秦州刺史趙公雙皆與之通謀秦王堅以雙母弟至親柳健之愛子隱而不問柳雙復與鎮東將軍洛州刺史魏公廋安西將軍雍州刺史燕公武謀作亂復扶又翻秦並州刺史治蒲阪秦州刺史治上邽洛州刺史治陝雍州刺史治安定廋武皆健子也廋疏鳩翻鎮東主簿南安姚眺眺他弔翻諫曰明公以周邵之親受方面之任國家有難當竭力除之況自為難乎難乃旦翻廋不聽堅聞之徵柳等詣長安冬十月柳據蒲阪雙據上邽廋據陝城武據安定皆舉兵反果如王猛之言吾待卿等恩亦至矣何苦而反今止不徵卿宜罷兵各定其位一切如故各齧梨以為信皆不從梨肉脆而齧之易入以喻親戚離叛則國力脆弱將為敵人所乘故齧梨付使者賜柳等以為信也使疏吏翻齧魚結翻代王什翼犍擊劉衛辰河冰未合什翼犍命以葦緪約流澌俄而冰合自代擊朔方西渡大河其津曰君子津緪居登翻乃散葦於其上冰草相結有如浮梁代兵乘之以渡衛辰不意兵猝至與宗族西走什翼犍收其部落什六七而還衛辰奔秦秦王堅送衛辰還朔方遣兵戍之十二月甲子燕太尉建寧敬公陽騖卒諡法合善典法曰敬夙夜警戒曰敬光祿大夫李洪為司空三年戊辰三六八春正月秦王堅遣後將軍楊成世左將軍毛嵩分討上邽安定輔國將軍王猛建節將軍鄧羌攻蒲阪前將軍楊安廣武將軍張蚝攻陝城堅命蒲陝之軍皆距城三十里堅壁勿戰俟秦雍已平然後並力取之陝式冉翻雍於用翻初燕太宰恪有疾以燕主暐幼弱政不在己太傅評多猜忌恐大司馬之任不當其人謂暐兄樂安王臧曰今南有遺晉西有強秦二國常蓄進取之志顧我未有隙耳夫國之興衰繫於輔相大司馬總統六軍不可任非其人我死之後以親疏言之當在汝及沖汝曹雖才識明敏然年少未堪多難少詩照翻難乃旦翻吳王天資英傑智略超世汝曹若能推大司馬以授之必能混一四海況外寇不足憚也慎無冒利而忘害不以國家為意也冒利而忘害者謂利在於得兵權而冒當大司馬之任而忘亡國敗家之害也語牛倨翻及恪卒評不用其言二月以車騎將軍中山王沖為大司馬沖暐之弟也以荊州刺史吳王垂為侍中車騎大將軍儀同三司為評垂有隙張本騎奇寄翻秦魏公廋以陝城降燕請兵應接秦人大懼盛兵守華陰華陰縣在陝城之西有潼關之險降戶江翻華戶化翻燕魏尹范陽王德燕都鄴以魏郡太守為魏尹以為先帝應天受命志平六合陛下纂統當繼而成之今苻氏骨肉乖離國分為五蒲阪陝城上邽安定與長安為五前後相尋是天以秦賜燕也天與不取反受其殃吳越之事足以觀矣國語越范蠡曰昔天以越賜吳吳不敢取今天以吳賜越越其敢逆天乎趨七喻翻吳王垂引許洛之兵馳解廋圍太傅總京師虎旅為二軍後繼傳檄三輔示以禍福明立購賞彼必望風響應渾一之期於此乎在矣時燕人多請救陝因圖關中者太傅評曰秦大國也今雖有難未易可圖難乃旦翻易以豉翻朝廷雖明未如先帝燕人謂其主為朝廷又非太宰之比但能閉關保境足矣平秦非吾事也魏公廋遺吳王垂及皇甫真箋曰遺于季翻苻堅王猛皆人傑也謀為燕患久矣今不乘機取之恐異日燕之君臣將有甬東之悔矣左傳吳入越越子保于會稽使行成於吳吳子許之伍子胥諫不聽其後越入吳請使吳王居甬東吳王曰孤老矣不能事君王也吾悔不用子胥之言自令陷此乃縊賈逵曰甬東越鄙甬江東也索隱曰今鄮縣即其處甬余隴翻方今為人患者必在於秦主上富於春秋觀太傅識度豈能敵苻堅王猛乎真曰然吾雖知之如言不用何三月丁巳朔日有食之癸亥大赦秦楊成世為趙公雙將苟興所敗毛嵩亦為燕公武所敗奔還秦王堅復遣武衛將軍王鑒寧朔將軍呂光將軍馮翊郭將翟傉等帥衆三萬討之敗補邁翻復扶又翻傉奴沃翻夏四月雙武乘勝至于榆眉以苟興為前鋒王鑒欲速戰呂光曰興新得志氣勢方鋭宜持重以待之彼糧盡必退退而擊之蔑不濟矣二旬而興退光曰興可擊矣遂追之興敗因擊雙武大破之斬獲萬五千級武棄安定與雙皆奔上邽鑒等進攻之晉公柳數出挑戰數所角翻挑徒了翻王猛不應柳以猛為畏之五月留其世子良守蒲阪帥衆二萬西趨長安去蒲阪百餘里鄧羌帥精騎七千夜襲敗之帥讀曰率趨七喻翻敗補邁翻柳引軍還猛邀擊之盡俘其衆柳與數百騎入城猛羌進攻之秋七月王鑒等拔上邽斬雙武宥其妻子以左衛將軍苻雅為秦州刺史八月以長樂公丕為雍州刺史樂音洛雍於用翻九月王猛等拔蒲阪斬晉公柳及其妻子猛屯蒲阪遣鄧羌與王鑒等會攻陝城燕王公貴戚多占民為蔭戶占之贍翻晉制官品自第一至第九各以貴賤占田有差而又各以品之高卑蔭其親屬多者及九族少者二世宗室國賓先賢之後及士人子孫亦如之而又得蔭人以為衣食客及佃客國之戶口少於私家少所沼翻倉庫空竭用度不足尚書左僕射廣信公悅綰曰今三方鼎峙三方謂燕晉秦也而國家政法不立豪貴恣橫橫戶孟翻至使民戶殫盡委輸無入委於偽翻輸書遇翻吏斷常俸戰士絶廩官貸粟帛以自贍給既不可聞於鄰敵且非所以為治治直吏翻宜一切罷斷諸蔭戶盡還郡縣罷斷丁管翻燕主暐從之使綰專治其事糾擲姦伏擲他歷翻無敢蔽匿出戶二十餘萬舉朝怨怒朝直遙翻綰先有疾自力釐校戶籍疾遂亟冬十一月卒十二月秦王猛等拔陝城獲魏公廋送長安秦王堅問其所以反對曰臣本無反心但以弟兄屢謀逆亂臣懼並死故謀反耳堅泣曰汝素長者固知非汝心也且高祖不可以無後苻健廟號高祖原其七子以長子襲魏公餘子皆封縣公以嗣越厲王及諸弟之無後者苻生廢為越王諡曰厲廋與雙俱反雙獨不得置後何也堅曰天下者高祖之天下高祖之子不可以無後至於仲㣥不顧太后謀危宗廟苻雙字仲㣥不可私也以范陽公抑為征東大將軍並州刺史鎮蒲阪鄧羌為建武將軍洛州刺史鎮陝城擢姚眺為汲郡太守加大司馬溫殊禮位在諸侯王上是歲以仇池公楊世為秦州刺史世弟統為武都太守世亦稱臣於秦秦以世為南秦州刺史王崇武標點容肇祖聶崇岐覆校
