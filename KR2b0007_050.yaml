body:
  text: 資治通鑑卷第五十翰林學士兼侍讀學士朝散大夫右諫義大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注漢紀四十二元初三年孝安皇帝中元初三年丙辰一一六元初三年春正月蒼梧鬱林合浦蠻夷反三郡皆屬交州遣侍御史任逴督州郡兵討之任音壬賢曰逴音丁角翻又音卓元初三年郡國十地震元初三年三月辛亥日有食之元初三年夏四月京師旱元初三年五月武陵蠻反州郡守破之元初三年癸酉度遼將軍鄧遵率南單于擊零昌於靈州范書胸奴傳曰自置度遼將軍以來皆權行其事獨遵以皇太后從弟為真將軍此後更無行將軍者志云度遼將軍銀印青綬秩二千石靈州縣屬北地郡賢曰在今慶州馬嶺縣西北零音憐元初三年越嶲徼外夷舉種內屬嶲音髓徼吉弔翻種章勇翻元初三年六月中郎將任尚任音壬遣兵擊破先零羌於丁奚城零音憐元初三年秋七月武陵蠻復反復扶又翻州郡討平之元初三年九月築馮翊北界候塢五百所以備羌馮翊北界接安定北地元初三年冬十一月蒼梧鬱林合浦蠻夷降降戶江翻元初三年舊制公卿二千石刺史不得行三年喪司徒劉愷以為非所以師表百姓宣美風俗丙戌初聽大臣行三年喪賢曰文帝遺詔以日易月於後大臣遂以為常至此復遵古制也元初三年癸卯郡國九地震元初三年十二月丁巳任尚遣兵擊零昌於北地殺其妻子燒其廬舍章甲十六行本舍作落乙十一行本同孔本同張校同斬首七百餘級羌勢自此衰矣四年四年春二月乙巳朔日有食之四年乙卯赦天下四年壬戌武庫災四年任尚遣當闐種羌榆鬼等刺殺杜季貢闐徒賢翻種章勇翻刺七亦翻下同封榆鬼為破羌侯四年司空袁敞廉徑不阿權貴失鄧氏旨尚書郎張俊有私書與敞子俊怨家封上之怨於元翻上時掌翻夏四月戊申敞坐策免自殺俊等下獄當死下遐稼翻俊上書自訟臨刑太后詔以減死論四年己巳遼西鮮卑連休等入寇考異曰范書鮮卑傳上作連休下作休連今從上文遼西郡在雒陽東北三千三百里賢曰遼西郡故城在今平州東陽樂城是大破之斬首千三百級四年六月戊辰三郡雨雹雨于具翻四年尹就坐不能定益州徵抵罪以益州刺史張喬領其軍屯招誘叛羌稍稍降散誘音酉降戶江翻四年秋七月京師及郡國十雨水四年九月護羌校尉任尚復募效功種羌號封刺殺零昌復扶又翻封號封為羌王四年冬十一月己卯彭城靖王恭薨四年越嶲夷以郡縣賦斂煩數巂音髓斂力贍翻數所角翻十二月大牛種封離等反殺遂久令遂久縣屬越巂郡賢曰遂久故縣在今靡州界考異曰西南夷傳云五年叛今從帝紀四年甲子任尚與騎都尉馬賢共擊先零羌狼莫追至北地相持六十餘日戰於富平河上大破之范書帝紀作富平上河西羌傳作河上賢曰富平縣屬北地郡故城在今靈州回樂縣西南余按水經河水東北徑安定郡眴卷縣故城西注曰地理志河水別出為河溝東至富平北入河河水於此有上河之名前漢馮參為上河典農都尉則上河為是宋白曰唐靈州即漢富平縣之地杜佑曰漢富平今靈州回樂縣應劭曰眴音旬日之旬卷音箘簬之箘狼莫逃去於是西河虔人種羌萬人詣鄧遵降隴右平狼莫者零昌之謀主零昌既死而狼莫敗逃虔人羌失援而降故隴右平降戶江翻四年是歲郡國十三地震五年五年春三月京師及郡國五旱五年夏六月高句驪與濊貊寇玄菟句如字又音駒驪力知翻濊音穢貊莫百翻菟同都翻五年永昌益州蜀郡夷皆叛應封離衆至十餘萬破壞二十餘縣壞音怪殺長吏焚掠百姓骸骨委積千里無人五年秋八月丙申朔日有食之五年代郡鮮卑入寇殺長吏考異曰獨行傳云元初中鮮卑數百餘騎寇漁陽太守張顯率吏士追出塞遙望虜營煙火急趣之兵馬掾嚴授虜有伏兵苦諫止不聽顯䠞令進授不獲已前戰伏兵發授身被十創沒於陳顯拔刃追散兵不能制虜射中顯主簿衛福功曹徐咸遽趣之顯遂墮馬福以身擁蔽虜並殺之朝廷愍授等節詔書褒歎厚加賞賜按元初凡六年鮮卑不曾犯漁陽殺長吏惟是入代郡曾殺長吏今疑漁陽本是代郡史之誤也余按張顯事通鑑已書於上卷殤帝延平元年從范書帝紀也冬十月鮮卑寇上谷攻居庸關郡國志居庸縣屬上谷郡新唐志幽州昌平縣西北三十五里有納款關即居庸故關復扶又翻屯列衝要五年鄧遵募上郡全無種羌雕何刺殺狼莫刺七亦翻封雕何為羌侯自羌叛十餘年間永初元年羌叛至是年凡十二年凡用二百四十餘億府帑空竭邊民及內郡死者不可勝數帑他朗翻勝音升並涼二州遂至虛耗及零昌狼莫死零音憐諸羌瓦解三輔益州無復寇警詔封鄧遵為武陽侯邑三千戶東郡有東武陽泰山郡有南武陽鄧騭傳又作舞陽故爵封優大任尚與遵爭功又坐詐增首級受賕枉法贓千萬已上十二月檻車徵尚棄市沒入財物鄧騭子侍中鳳嘗受尚馬騭髡妻及鳳以謝罪騭職日翻五年是歲郡國十四地震五年太后弟悝閶皆卒封悝子廣宗為葉侯閶子忠為西華侯葉縣屬南陽郡西華縣麗汝南郡悝苦回翻閶音昌葉式涉翻六年六年春二月乙巳京師及郡國四十二地震六年夏四月沛國勃海大風雨雹雨于具翻六年五月京師旱六年六月丙戌平原哀王得薨無子六年秋七月鮮卑寇馬城塞殺長吏馬城縣屬代郡賢曰搜神記昔秦人築城於武咼塞以備胡將成而崩者數矣有馬馳走周旋反覆父老異之因依以築城城乃不崩遂以名焉其故城則今之朔州也余按續漢志搜神記所云乃鴈門郡之馬邑此乃代郡之馬城賢誤大破之六年九月癸巳陳懷王竦薨無子國除竦陳王羡之孫六年冬十二月戊午朔日有食之既六年郡國八地震六年是歲太后徵和帝弟濟北王壽河間王開子男女年五歲以上四十餘人濟子禮翻及鄧氏近親子孫三十餘人並為開邸第賢曰蒼頡篇曰邸舍也為于僞翻躬自監試監古銜翻詔從兄河南尹豹越騎校尉康等曰末世貴戚食祿之家溫衣美飯乘堅驅良賢曰堅謂好車良謂善馬余按此語出史記范蠡傳從才用翻不識臧否尚書曰弗學牆面言正牆面而立無所見也否音鄙六年豫章有芝草生太守劉祗欲上之上時掌翻以問郡人唐檀檀曰方今外戚豪盛君道微弱斯豈嘉瑞乎祗乃止六年益州刺史張喬遣從事楊竦將兵至楪榆楪榆縣武帝開置屬益州郡有葉榆澤在縣東因名明帝分屬永昌郡楪與葉同大破之斬首三萬餘級獲生口千五百人封離等惶怖斬其同謀渠帥詣竦乞降怖普布翻帥所類翻降戶江翻下同竦厚加慰納其餘三十六種皆來降附種章勇翻竦因奏長吏姦猾侵犯蠻夷者九十人皆減死論六年初西域諸國既絶於漢事見上卷永初元年役使而臣屬之復扶又翻下同敦煌太守曹宗患之敦徒門翻乃上遣行長史索班將千餘人屯伊吾以招撫之索姓出敦煌又左傳商人七族有索氏上時掌翻索昔各翻上遣者上奏而遣之也行長史者行長史事未為真也鄯上扇翻六年初疏勒王安國死無子國人立共舅子遺腹為王遺叔父臣磐在月氏月氏納而立之西域傳曰元初中安國以舅臣磐有罪徙於月氏月氏王親愛之遺腹既立月氏遣兵送臣磐還疏勒國人素敬愛臣磐又畏憚月氏即共奪遺腹印綬迎臣磐立以為王氏音支屬疏勒自明帝永平四年莎車屬于填與龜茲于填為敵國焉永寧元年庚申一二是年夏四月改元六年春三月丁酉濟北惠王壽薨濟子禮翻六年北胸奴率車師後王軍就共殺後部司馬及敦煌長史索班等賢曰司馬即屬戊己校尉所統也和帝時置戊己校尉鎮車師後部考異曰班勇傳元初六年曹宗遣索班屯伊吾後數月北單于與車師後部共攻沒索班按本紀永寧元年車師後王叛殺部司馬車師傳亦曰永寧元年後王軍就及母沙麻反畔殺後部司馬及敦煌行事蓋班以去年末屯伊吾今春見殺或今春奏事方到也略有北道鄯善逼急求救於曹宗鄯上扇翻宗因此請出兵五千人擊胸奴以報索班之恥因復取西域公卿多以為宜閉玉門關絶西域太后聞軍司馬班勇有父風召詣朝堂問之班固西都賦曰左右廷中朝堂百僚之位朝堂蓋在殿庭左右朝直遙翻昔孝武皇帝患胸奴強盛於是開通西域論者以為奪胸奴府藏上時掌翻藏徂浪翻斷其右臂斷丁管翻光武中興未遑外事故胸奴負強驅率諸國及至永平再攻敦煌敦徒門翻河西諸郡城門晝閉孝明皇帝深惟廟策惟思也賢曰古者謀事必就祖故言廟策也余謂古者遺將必於廟先定制勝之策故謂之廟策虎臣謂其父超也邊境得安及至永元莫不內屬會間者羌亂西域復絶復扶又翻北虜遂遣責諸國備其逋租高其價直嚴以期會備償也西域屬漢之後不復以馬畜旃罽輸胸奴及與漢絶胸奴復遣使責其積年所逋逋缺也思樂事漢樂音洛其路無從前所以時有叛者皆由牧養失宜還為其害故也今曹宗徒恥於前負欲報雪胸奴負敗也報雪謂報伊吾之役雪索班之恥也未度當時之宜也度徒洛翻夫要功荒外萬無一成要一遙翻荒外謂在荒服之外若兵連禍結悔無所及況今府藏未充藏徂浪翻師無後繼是示弱於遠夷暴短於海內臣愚以為不可許也舊敦煌郡有營兵三百人今宜復之復置護西域副校尉居於敦煌如永元故事校戶教翻又宜遣西域長史將五百人屯樓蘭樓蘭即鄯善南強鄯善于填心膽北扞胸奴東近敦煌如此誠便龜茲音丘慈填徒賢翻尚書復問勇利害云何勇既上議尚書復問使悉陳其利害復扶又翻昔永平之末始通西域初遣中郎將居敦煌謂鄭衆也謂耿恭關寵也又禁漢人不得有所侵擾故外夷歸心胸奴畏威今鄯善王尤還漢人外孫若胸奴得志則尤還必死賢曰尤還鄯善王名亦知避害若出屯樓蘭足以招附其心愚以為便此勇所謂利也長樂衛尉鐔顯類篇鐔如心翻姓也賢曰鐔音徒南翻唐韻又音尋廷尉綦毋參綦毋姓也左傳晉有綦毋張難乃旦翻下同朝廷前所以棄西域者以其無益於中國而費難供也今車師已屬胸奴鄯善不可保信一旦反覆班將能保北虜不為邊勃乎賢曰以勇為軍司馬故以將言之將音子亮翻今中國置州牧者以禁郡縣姦猾盜賊也若州牧能保盜賊不起者臣亦願以要斬保胸奴之不為邊害也要讀曰腰今通西域則虜勢必弱虜勢弱則為患微矣孰與歸其府藏續其斷臂哉今置校尉以扞撫西域設長史以招懷諸國若棄而不立則西域望絶望絶之後屈就北虜緣邊之郡將受困害恐河西域門必須復有晝閉之警矣明帝永平中北胸奴脅諸國共寇河西郡縣城門晝閉復扶又翻下同若此北虜遂熾豈安邊久長之策哉此勇所謂害也熾尺志翻太尉屬毛軫難曰今若置校尉則西域駱驛遣使求索無厭索山客翻厭於鹽翻百官志太尉掾屬二十四人東西曹掾比四百石餘掾比三百石屬比二百石與之則費難供不與則失其心一旦為胸奴所迫當復求救則為役大矣勇對曰今設以西域歸胸奴而使其恩德大漢不為鈔盜則可矣鈔楚交翻如其不然則因西域租入之饒兵馬之衆以擾動緣邊是為富仇讎之財增暴夷之勢也置校尉者宣威布德以繫諸國內向之心而疑胸奴覬覦之情覬音冀覦音俞而無費財耗國之慮也且西域之人無他求索其來入者不過稟食而已稟筆錦翻給也食讀曰飲今若拒絶勢歸北屬夷虜言其事勢所歸必至北屬胸奴則中國之費不止十億置之誠便於是從勇議復敦煌郡營兵三百人置西域副校尉居敦煌雖復羈縻西域然亦未能出屯謂未能如勇計出屯樓蘭西也然使盡行勇之計亦未必能羈制西域何者武帝通西域未能盡臣屬西域也及宣帝時日逐降呼韓邪內附始盡得西域明帝使班超通西域未能盡臣屬西域也及竇憲破北胸奴超始盡得西域今漢內困於諸羌而北胸奴游魂蒲類安能以五百人成功哉河西大被其害數所角翻鈔楚交翻被皮義翻六年沈氐羌寇張掖賢曰沈氐羌號也續漢書曰羌在上郡西河者號沈氐六年夏四月丙寅立皇子保為太子改元赦天下六年己巳紹封陳敬王子崇為陳王濟北惠王子萇為樂成王濟子禮翻河間孝王子翼為平原王六年六月護羌校尉馬賢將萬人討沈氐羌於張掖破之斬首千八百級獲生口千餘人餘虜悉降降戶江翻時當煎等章甲十六行等作種乙十一行本同張校同大豪飢五等以賢兵在張掖乃乘虛寇金城賢還軍章甲十六行本軍下有追之二字乙十一行本同孔本同張校同退齊校同出塞斬首數千級而還燒當燒何種聞賢軍還復寇張掖殺長吏馬賢於時為健鬬然觀其往來奔命羌人輒議其後賢不思所以制之之術重以不恤軍事宜其有射姑山之敗也還從宣翻又如字種章勇翻復扶又翻長知兩翻六年秋七月乙酉朔日有食之六年冬十月己巳司空李郃免郃古合翻又曷閣翻癸酉以衛尉廬江陳褒為司空六年京師及郡國三十三大水六年十二月永昌徼外撣國王雍曲調遣使者獻樂及幻人西南夷傳幻人能變化吐火自支解易牛馬頭自言我海西人海西即大秦也今按大秦即武帝時犂靬國今謂之拂菻撣音檀范書雍曲調作雍由調徼吉弔翻六年戊辰司徒劉愷請致仕許之以千石祿歸養六年遼西鮮卑大人烏倫其至鞬各以其衆詣度遼將軍鄧遵降烏倫其至鞬二人也鞬居言翻六年癸酉以太常楊震為司徒六年是歲郡國二十三地震六年太后從弟越騎校尉康以太后久臨朝政宗門盛滿數上書太后從才用翻上元初六年書從兄康此書從弟徵諸范史當從兄字數所角翻上時掌翻以為宜崇公室自損私權言甚切至太后不從康謝病不朝太后使內侍者問之所使者乃康家先婢先本康家婢後入宮在太后左右中大人時宮中耆宿皆稱中大人賢曰詬罵也音許遘翻又古候翻婢怨恚恚於避翻還白康疾而言不遜太后大怒免康官遣歸國康永初中紹封夷安侯六年初當煎種饑五同種大豪盧忽忍良等千餘戶種章勇翻下同別留允街而首施兩端賢曰首施猶首鼠也允音鉛建光元年辛酉一二一是年七月改元考異曰陳禪傳曰北胸奴入遼東追拜禪遼東太守胡憚其威強退還數百里禪不加兵但遣吏卒往曉慰之單于隨使還郡禪於學行禮為說道義以感化之單于懷服遺以胡中珍貨而去當在此年矣又按北單于漢朝所不能臣未嘗入朝天子安肯見遼東太守此事可疑今不取余按和帝以來北胸奴益西徙自代郡以東至遼東塞外之地皆鮮卑烏桓居之北單于安能至遼東邪不取當也六年春護羌校尉馬賢召盧忽斬之因放兵擊其種人獲首虜二千餘忍良等皆亡出塞六年幽州刺史巴郡馮煥玄菟太守姚光遼東太守蔡諷等將兵擊高句驪高句麗王宮遣子遂成詐降而襲玄菟遼東殺傷二千餘人菟同都翻句如字又音駒麗讀曰驪力知翻降戶江翻六年二月皇太后寢疾癸亥赦天下三月癸巳皇太后鄧氏崩未及大斂帝復申前命斂力贍翻復扶又翻下同封鄧騭為上蔡侯位特進封騭事見上卷永初元年丙午葬和熹皇后范曄曰漢世皇后無諡皆因帝諡以為稱雖呂氏專政上官臨制亦無殊號中興明帝始建光烈之稱其後並以德為配至於賢愚優劣混同一貫故馬竇二后俱稱德焉其餘皇帝之庶母及蕃王承統以追尊之重特為其號恭懷孝崇之比是也初平中蔡雍始追正和熹之諡其安思順烈以下皆依而加焉賢注云蔡雍集諡議曰漢世母后無諡明帝始建光烈之稱是後轉因帝號加之以德上下優劣混而為一違禮大行受大名小行受小名之制諡法有功安民曰熹帝后一體禮亦宜同大行皇太后宜為和熹太后自臨朝以來水旱十載載子亥翻四夷外侵盜賊內起每聞民饑或達旦不寐躬自減徹謂減膳徹樂之類故天下復平歲還豐穰和熹臨朝之政可謂牝雞之晨唯家之索矣上始親政事尚書陳忠薦隱逸及直道之士潁川杜根平原成翊世之徒上皆納用之忠寵之子也初鄧太后臨朝根為郎中與同時郎上書言帝年長宜親政事長知兩翻太后大怒皆令盛以縑囊於殿上撲殺之盛時征翻撲普卜翻蜀本弼角切既而載出城外根得蘇太后使人檢視根遂詐死三日目中生蛆蛆子余翻凡蠅所集其遺子之處生為蛆因得逃竄為宜城山中酒家保積十五年宜城縣屬南郡賢曰宜城故城在今襄州率道縣南其地出美酒廣雅云保使也言為人傭力保任而使也帝皆徵詣公車拜根侍御史翊世尚書郎為諸鄧得罪張本往者遇禍天下同義天下之士以根直諫遇禍同義之也少詩沼翻何至自苦如此根曰周旋民間非絶跡之處邂逅發露邂逅不期而會謂出於意料之外也故不為也申屠蟠絶跡梁碭祖根之故智也六年戊申追尊清河孝王曰孝德皇皇妣左氏曰孝德后祖妣宋貴人曰敬隱后尊其所自出也諡法執義行善曰德綏柔士民曰德不顯尸國曰隱見美堅長曰隱長樂太僕蔡倫受竇后諷旨誣陷宋貴人事見四十六卷章帝建初七年樂音洛倫飲藥死自致廷尉者使其自詣獄六年夏四月高句麗復與鮮卑入寇遼東蔡諷追擊於新昌戰歿新昌縣屬遼東郡俱歿於陳范書東夷傳作功曹耿耗兵馬掾龍端酺音蒲陳讀曰陳六年丁巳尊帝嫡母耿姬為甘陵大貴人郡國志清河郡厝縣帝改名甘陵賢曰甘陵孝德皇之陵也因以為縣在今貝州清河縣東宋白曰貝州清河縣本周甘泉氏之地秦漢為信城縣後漢為厝縣桓帝改為甘陵故城在今縣西北清河王慶陵在今清河郡東南三十里故厝城六年甲子樂成王萇坐驕淫不法貶為蕪湖侯范書紀傳皆作臨湖侯賢曰臨湖縣屬廬江郡六年己巳令公卿下至郡國守相各舉有道之士一人尚書陳忠以詔書既開諫爭爭讀曰諍慮言事者必多激切或致不能容乃上疏豫通廣帝意曰臣聞仁君廣山藪之大賢曰左氏傳曰川澤納汙山藪藏疾瑾瑜匿瑕國君含垢天之道也忠臣盡謇諤之節不畏逆耳之害易曰王臣蹇蹇晉王豹傳作謇史記趙簡子曰衆人之唯唯不如周舍之諤諤家語孔子曰忠言逆耳而利於行也周昌嘗燕入奏事高祖方擁戚姬昌還走帝逐得騎昌項問曰我何如主昌仰曰陛下即桀紂之主上笑自是心憚昌舍讀曰捨事見十三卷文帝二年事見十八卷武帝元光五年事見二十八卷元帝永光元年刎武粉翻推宋景之誠引咎克躬咨訪㣥吏時詔公卿百僚各上封事顯列二臺賢曰謂根為侍御史翊世為尚書郎也余按漢制尚書御史皆曰臺爭為切直若嘉謀異策宜輒納用如其管穴妄有譏刺賢曰管穴言小也史記扁鵲曰若以管窺天以隙視文隙即穴也不得事實且優游寬容以示聖朝無諱之美若有道之士對問高者宜垂省覽省悉景翻特遷一等以廣直言之路書御御進也書御書進而經覽也拜有道高第士沛國施延為侍中有道高第舉有道對問為上第也姓譜魯大夫施伯出於魯惠公之子子尾字施父初汝南薛包少有至行父娶後妻而憎包分出之包日夜號泣不能去少詩照翻行下孟翻號戶刀翻至被驅撲以敲撲驅之也撲普卜翻廬於舍外旦入灑掃灑所賣翻掃素報翻又並如字父怒又逐之乃廬於里門晨昏不廢不廢定省之禮也父母慙而還之及父母亡弟子求分財異居包不能止乃中分其財奴婢引其老者曰與我共事久若不能使也若汝也賢曰頓猶廢也吾少時所治意所戀也治直之翻器物取朽敗者曰我素所服食身口所安也弟子數破其産輒復賑給數所角翻復扶又翻帝聞其名令公車特徵特獨也獨徵之當時無與並者拜侍中包以死自乞有詔賜告歸加禮如毛義毛義事見四十六卷章帝元和元年六年帝少號聰明故鄧太后立之及長多不德少詩照翻長知兩翻稍不可太后意言意不以為可也太后徵濟北河間王子詣京師濟子禮翻河間王子翼美容儀太后奇之以為平原懷王後留京師王聖見太后久不歸政慮有廢置常與中黃門李閏江京候伺左右共毀短太后於帝帝每懷忿懼伺相吏翻及太后崩宮人先有受罰者懷怨恚恚於避翻因誣告太后兄弟悝弘閶先從尚書鄧訪取廢帝故事謀立平原王帝聞追怒令有司奏悝等大逆無道遂廢西平侯廣宗葉侯廣德西華侯忠陽安侯珍都鄉侯甫德皆為庶人忠閶之子珍悝兄京之子西華陽安二縣皆屬汝南郡悝苦回翻閶音昌葉式涉翻但免特進遣就國與讀曰豫宗族免官歸故郡鄧氏故南陽人徙鄧訪及家屬於遠郡郡縣迫逼廣宗及忠皆自殺又徙封騭為羅侯羅縣屬長沙郡庚辰騭與子鳳並不食而死騭從弟河南尹豹度遼將軍舞陽侯遵將作大匠暢皆自殺從才用翻唯廣德兄弟以母與閻后同産得留京師復以耿夔為度遼將軍徵樂安侯鄧康為太僕按范書鄧禹傳明帝分禹國為三封其三子季子珍為夷安侯康以珍之子紹封樂安當作夷安郡國志夷安高密二縣皆屬北海國賢曰夷安故城今高密縣外城丙申貶平原王翼為都鄉侯遣歸河間翼謝絶賓客閉門自守由是得免初鄧后之立也見四十八卷和帝永元十四年寵以先世無奏請故事爭之連日不能奪及訓追加封諡禹防復約寵俱遣子奏章甲十六行本奏作奉乙十一行本同禮於虎賁中郎將騭寵不從故寵子忠不得志于鄧氏騭等敗忠為尚書數上疏陷成其惡寵之所守是也忠之所為非也復扶又翻數所角翻大司農京兆朱寵痛騭無罪遇禍乃肉袒輿櫬櫬初覲翻賢曰櫬親身棺上疏曰伏惟和熹皇后聖善之德為漢文母賢曰詩凱風曰母氏聖善文母文王之母太任也寵言太后有聖善之德比於文母也同心憂國章甲十六行本國下有宗廟有主四字乙十一行本同張校同退齊校同社稷章甲十六行本社稷作王室乙十一行本同退齊校同是賴賢曰殤帝崩太后與騭定立安帝故曰是賴讓國遜位歷世貴戚無與為比當享積善履謙之祐賢曰易曰積善之家必有餘慶又曰鬼神害盈而福謙兩造不備又無徵左者為單辭橫戶孟翻反亂國家論語曰惡利口之覆邦家者獄不訊鞠賢曰申明白也訊問也鞠窮也章甲十行本陷作濫乙十一行本同一門七人並不以命賢曰七人謂騭從弟豹遵暢騭子鳳鳳從弟廣宗忠也冤魂不反逆天感人率土喪氣喪息浪翻宜收還冢次寵樹遺孤奉承血祀以謝亡靈賢曰血祀謂祭廟殺牲取血以降神也自致廷尉陳忠復尉陳忠復劾奏寵詔免官歸田里劾戶概翻又戶得翻衆庶多為騭稱枉者復扶又翻為于僞翻帝意頗悟乃譴讓州郡賢曰以逼迫廣宗等故也賢曰北芒山在雒陽城北從才用翻六年帝以耿貴人兄牟平侯寶監羽林左軍車騎羽林分左右監各主左右騎寶監古銜翻宋氏為卿校侍中大夫謁者郎吏十餘人校戶教翻閻皇后兄弟顯景耀並為卿校典禁兵卿校九卿及諸校尉也帝以江京嘗迎帝於邸謂延平元年迎帝於清河邸也封都鄉侯封李閏為雍鄉侯閏京並遷中常侍京兼大長秋與中常侍樊豐黃門令劉安鈎盾令陳達百官志黃門令主省中諸宦者鈎盾令典諸近地苑囿游觀之處皆宦者為之盾食尹翻競為侈虐伯榮出入宮掖傳通姦賂司徒楊震上疏曰臣聞政以得賢為本治以去穢為務治直吏翻去羌呂翻是以唐虞俊乂在官四凶流放見尚書孔安國曰俊乂在官四凶流放見尚書孔安國曰俊乂俊德能治之士馬融曰千人曰俊百人曰乂以致雍熙雍和也熙亦和也賢曰尚書皋陶謨曰亦行有九德寬而栗柔而立願而恭亂而敬擾而毅直而溫簡而廉剛而塞強而義又曰九德咸事俊乂在官孔安國曰使九德之人皆用事諡法賤而得愛曰嬖出自賤微得遭千載載子亥翻奉養聖躬雖有推燥居溼之勤孝經援神契曰母之於子也鞠養殷勤推燥居濕絶少分甘也推吐雷翻過報勞苦而無厭之心不知紀極外交屬託厭於鹽翻屬之欲翻擾亂天下損辱清朝塵點日月朝直遙翻夫女子小人近之喜遠之怨實為難養論語曰唯女子與小人為難養也近之則不遜遠之則怨近其靳翻遠于願翻令居外舍斷絶伯榮莫使往來斷丁管翻令恩德兩隆上下俱美奏御帝以示阿母等內幸皆懷忿恚恚於避翻而伯榮驕淫尤甚通於故朝陽侯劉護從兄王褱王褱遂以為妻官至侍中得襲護爵賢曰護泗水王歙之從曾孫朝陽縣屬南郡故城在今鄧州穰縣南今謂之朝城從才用翻王褱古回翻經制父死子繼兄亡弟及以防篡也賢曰公羊傳曰劉子單子以王猛入于王城者何西周也其言入何篡亂也冬十月王子猛卒此未踰年之君其稱王子猛卒何不豫當也不豫當者不豫當父死子繼兄亡弟及也封故朝陽侯劉護再從兄王褱襲護爵為侯從才用翻護同産弟威今猶見在見賢遍翻臣聞天子專封封有功諸侯專爵爵有德今王褱無他功行行下孟翻但以配阿母女一時之間既位侍中又至封侯不稽舊制不合經義行人喧譁百姓不安陛下宜鑒鏡既往順帝之則尚書廣陵翟酺范書列傳酺廣漢雒人陵當作漢廣漢郡屬益州翟直格翻酺音蒲昔竇鄧之寵傾動四方兼官重紱重直龍翻盈金積貨至使議弄神器賢曰神器謂天位也老子曰天下神器不可為也余謂威福人主之神器此言弄威福耳更工衡翻豈不以勢尊威廣以致斯患乎及其破壞頭顙墮地願為孤豚豈可得哉夫致貴無漸失必暴受爵非道殃必疾今外戚寵幸功均造化漢元以來未有等比漢元漢初也比頻寐翻以親九族然祿去公室政移私門覆車重尋寧無摧折重直龍翻折而設翻此最安危之極戒社稷之深計也昔文帝愛百金於露臺飾帷帳於皂囊文帝集上書皂囊以為殿帷上曰朕為天下守財耳為于僞翻豈得妄用之哉今自初政以來日月未久費用賞賜已不可算斂天下之財積無功之家帑藏單盡帑他朗翻藏徂浪翻單與殫同民物雕傷卒有不虞卒讀曰猝虞度也不虞謂事變出於虞度之外者也復當重賦復扶又翻百姓怨叛既生危亂可待也願陛下勉求忠貞之臣誅遠佞諂之黨割情欲之歡罷宴私之好遠于願翻好呼到翻心存亡國所以失之鑒觀興王所以得之庶災害可息豐年可招矣書奏皆不省省悉景翻六年秋七月己卯改元赦天下六年壬寅太尉馬英薨考異曰傳作策罷誤今從紀六年燒當羌忍良等以麻奴兄弟本燒當世嫡燒當豪帥東號和帝永元元年降其子麻奴永初元年叛出塞常有怨心遂相結共脅將諸種寇湟中攻金城諸縣八月賢將先零種擊之戰於牧苑不利漢邊郡皆有牧苑以養馬此牧苑在金城界將即亮翻零音憐種章勇翻敗補邁翻令孟康音連師古音零因脅將先零沈氐諸種四千餘戶緣山西走寇武威賢追到鸞鳥鸞鳥縣屬武威郡鳥音雀賢曰鸞鳥故城在今涼州昌松縣北鸞音雚沽丸翻劉昫曰涼州神鳥縣漢鸞鳥縣地嘉麟縣則鸞鳥古城也諸種降者數千降戶江翻麻奴南還湟中六年甲子以前司徒劉愷為太尉初清河相叔孫光坐臧抵罪遂增禁錮二世臧古贓字通賢曰二世謂父子俱禁錮居延都尉范邠復犯臧罪朝廷欲依光比帝置居延屬國都尉別領居延一城屬涼州復扶又翻賢曰比類也以邠類光亦錮及其子也比音庇章甲十六行本以下有為字乙十一行本同春秋之義善善及子孫惡惡止其身所以進人於善也公羊傳曰曹公孫會自鄸出奔宋畔也曷為不言畔為公子喜時之後諱也春秋為賢者諱也何賢乎公子喜時讓國也君子之善善也長惡惡也短惡惡止其身善善及子孫賢者子孫故君子為其諱也以輕從重懼及善人非先王詳刑之意也左傳曰刑濫則懼及善人鄭玄曰詳審察也章甲十六行本陳上有尚書二字乙十一行本同退齊校同忠亦以為然有詔太尉議是六年鮮卑其至鞬寇居庸關九月雲中太守成嚴擊之兵敗居庸關在上谷界蓋鮮卑先寇居庸關遂入雲中界也與之俱歿鮮卑於是圍烏桓校尉徐常於馬城度遼將軍耿夔與幽州刺史龐參發廣陽漁陽涿郡甲卒救之三郡皆屬幽州六年戊子帝幸衛尉馮石府留飲十餘日考異曰袁紀曰十二月丙申乃還宮今從石傳拜其子世為黃門侍郎世弟二人皆為郎中石陽邑侯魴之孫也按范書馮魴封陽邑鄉侯魴音房石襲公主爵為獲嘉侯獲嘉縣屬河內郡本汲之新中鄉也武帝行幸過此聞獲呂嘉因以名縣故為帝所寵六年京師及郡國二十七雨水范書帝紀作二十九六年冬十一月己丑郡國三十五地震六年鮮卑寇玄菟菟同都翻六年尚書令祋諷等奏以為孝文章甲十六行本文下有皇帝二字乙十一行本同孔本同定約禮之制光武皇帝絶告寧之典祋丁外翻又丁活翻姓也約禮謂以日易月也前書音義曰告寧休謁之名吉曰告凶曰寧貽則萬世誠不可改宜復斷大臣行三年喪斷丁管翻下同尚書陳忠上疏曰高祖受命蕭何創制大臣有寧告之科合於致憂之義論語曰人未有自致者也必也親喪乎新承大亂凡諸國政多趣簡易趣七喻翻易以豉翻大臣既不得告寧而㣥司營祿念私鮮循三年之喪鮮息淺翻以報顧復之恩者詩蓼莪云父母生兮我雇我復我欲報之德昊天罔極禮義之方實為雕損陛下聽大臣終喪聖功美業靡以尚茲孟子曰老吾老以及人之老幼吾幼以及人之幼天下可運於掌賢曰言敬吾老亦敬人之老愛吾幼亦愛人之幼有敬愛之心則天下歸順之也運掌言易也范氏曰老吾老以老者之禮養吾之老則謂事親也使天下之老者皆得其養故曰以及人之老幼吾幼以幼者之禮待吾之幼謂愛其子也使天下之幼者皆得其長故曰以及人之幼天下可運於掌言其易也以甘陵之思揆度臣子之心則海內咸得其所賢曰甘陵帝父母陵陵在清河故北望也度徒洛翻竟寢忠奏庚子復斷二千石以上行三年喪元初三年聽大臣行三年喪今復斷之斷音短袁宏論曰古之帝王所以篤化美俗率民為善因其自然而不奪其情民猶有不及者而況毀禮止哀滅其天性乎六年十二月高句驪王宮率馬韓濊貊數千騎圍玄菟韓有三種一曰馬韓二曰辰韓三曰辨辰馬韓在西有五十四國句如字又音駒驪力知翻濊音穢貊莫百翻夫音扶是歲宮死子遂成立玄菟太守姚光上言欲因其喪發兵擊之議者皆以為可許陳忠曰宮前桀黠黠下八翻光不能討死而擊之非義也宜遣使弔問因責讓前罪赦不加誅取其後善帝從之延光元年壬戌一二二六年春三月丙午改元赦天下六年護羌校尉馬賢追擊麻奴到湟中破之種衆散遁種章勇翻六年夏四月京章甲十六行本京上有癸未二字乙十一行本同孔本同退齊校同師郡國四章甲十六行本四作二乙十一行本同十一雨雹雨于具翻河西雹大者如斗六年幽州刺史馮煥玄菟太守姚光數糾發姦惡數所角翻怨者詐作璽書譴責煥光賜以歐刀賢曰歐刀刑人之刀也歐音一口翻余謂古歐冶子善作劍故謂劍為歐刀當音烏侯翻使速行刑下遐稼翻奮即斬光收煥考異曰帝紀建光元年四月甲戌龐奮承僞璽書殺姚光馮緄傳亦云建光元年按帝紀去年十二月高驪圍玄菟而高驪傳有姚光上言蓋光實以延光元年被殺紀傳誤以延為建又今年四月無甲戌其子緄疑詔文有異緄古本翻止煥曰大人在州志欲去惡實無他故必是凶人妄詐規肆姦毒願以事自上去羌呂翻上時掌翻甘罪無晚煥從其言上書自訟東詐者所為徵奮抵罪六年癸巳司空陳褒免五月庚戌宗正彭城劉授為司空六年己巳封河間孝王子德為安平王嗣樂成靖王後自是樂成國改曰安平去年樂成王萇以罪廢今以德紹靖王後諡法柔德安衆曰靖恭己鮮言曰靖寬樂令終曰靖六年六月郡國蝗六年秋七月癸卯京師及郡國十三地震六年高句驪王遂成還漢生口詣玄菟降降戶江翻下同其後濊貊率服東垂少事濊音穢少詩沼翻六年虔人羌與上郡胡反度遼將軍耿夔擊破之六年八月陽陵園寢火景帝陵園寢也六年九月甲戌郡國二十七地震六年鮮卑既纍殺郡守膽氣轉盛控弦數萬騎冬十月復寇鴈門定襄復扶又翻十一月寇太原六年燒當羌麻奴飢困將種衆詣漢陽太守耿种降種章勇翻种音沖六年是歲京師及郡國二十七雨水六年帝數遣黃門常侍及中使伯榮往來甘陵數所角翻使疏吏翻尚書僕射陳忠上疏曰今天心未得隔並屢臻賢曰隔並謂水旱不節也尚書曰一極備凶一極無凶並音必姓翻淫雨漏河賢曰漏溢也余謂雨久不止河隄為之決漏也海水盆溢禹貢海岱及淮為徐州故曰徐岱盆讀與溢同音蒲悶翻賢曰蝝螽子也音余專翻余按蝝蝗子也董仲舒云然左傳宣十五年冬蝝生劉歆曰蚍蜉子杜預曰螽子以冬生遇塞而死故不成螽爾雅曰蝝蝮蜪蝗也陸璣草木疏云螽幽州人謂之舂箕蝗類也曰螽子者猶蝗子也荊揚稻收儉薄並涼二州羌戎叛戾加以百姓不足府帑虛匱帑他朗翻陛下以不得親奉孝德皇園廟比遣中使致敬甘陵比毗至翻朱軒駢馬相望道路賢曰朱軒車使者所乘也駢並也然臣竊聞使者所過威權翕赫震動郡縣王侯二千石至為伯榮獨拜車下為于僞翻下猥為誤為同發民修道繕理亭傳傳株戀翻多設儲偫偫大理翻具也徵役無度老弱相隨動有萬計賂遺僕從人數百匹謂縑帛也遺于季翻從才用翻踣蒲墨翻僵也斃也莫不叩心河間託叔父之屬清河有陵廟之尊賢曰河間王開安帝叔也清河王延平也陵廟所在故曰尊陛下不問必以為陛下欲其然也伯榮之威重於陛下陛下之柄在於臣妾水災之發必起於此昔韓嫣託副車之乘受馳視之使江都誤為一拜而嫣受歐刀之誅韓嫣有寵於武帝常與帝共臥起江都王入朝從上獵上林中天子車駕䟆通未行失使嫣乘副車從數十晨騎馳視獸江都王望見以為天子辟從者伏謁道旁嫣驅不見既過江都王怒為太后泣請得歸國入宿衛比韓嫣太后由此銜嫣遂誅嫣嫣音偃正乾剛之位賢曰天元猶乾元也復扶又翻使如字重察左右得無石顯漏泄之姦石顯事見二十九卷元帝建昭二年重直用翻得無趙昌譖崇之詐趙昌事見三十四卷哀帝建平四年得無朱博阿傅之援朱博事見三十四卷建平二年得無王鳳害商之謀王鳳事見三十卷成帝河平四年王事每決於己則下不得逼上臣不得干君常雨大水必當霽止四方衆異不能為害書奏不省省悉景翻時三府任輕機事專委尚書而災眚變咎輒切免三公賢曰切責也漢興章乙十一行本興作典孔本同舊事丞相所請靡有不聽今之三公雖當其名而無其實選舉誅賞一由尚書尚書見任重於三公陵遲以來其漸久矣臣忠心常獨不安近以地震策免司空陳褒今者災異復欲切讓三公復扶又翻昔孝成皇帝以妖星守心移咎丞相事見三十三卷綏和二年卒子恤翻徒乖宋景之誠故知是非之分較然有歸矣分扶問翻又尚書決事多違故典罪法無例詆欺為先文慘言醜有乖章憲宜責求其意割而勿聽上順國典下防威福置方員於規矩審輕重於衡石此言決事當依典法也賢曰衡稱衡也三十斤為鈞四鈞為石萬世之法也六年汝南太守山陽王龔政崇寬和好才愛士以袁閬為功曹好呼到翻閬音浪引進郡人黃憲陳蕃等憲雖不屈蕃遂就吏就辟而為吏也蕃性氣高明龔皆禮之由是㣥士莫不歸心憲世貧賤父為牛醫潁川荀淑至慎陽慎陽縣屬汝南郡憲縣人也賢曰在慎水之南因以名縣應劭曰慎水出東北入淮師古曰慎字本作滇音真後誤為慎耳今猶有真丘真陽縣知音不改也闞駰曰永平五年失印更刻遂誤以水為心余按水北為陽賢既云縣在水南而名慎陽何也逆迎也設館舍以迎客故曰逆旅賢曰逆旅客舍淑竦然異之揖與語移日不能去移日言日移晷也子吾之師表也既而前至袁閬所未及勞問勞力到翻逆曰子國有顏子寧識之乎賢曰顏子顏回也閬汝南汝陽人見吾叔度耶黃憲字叔度才高倨傲而見憲未嘗不正容及歸罔然若有失也其母問曰汝復從牛醫兒來邪復扶又翻下同對曰良不見叔度自以為無不及既覩其人則瞻之在前忽然在後論語顏回慕孔子之言陳蕃及同郡周舉嘗相謂曰時月之間不見黃生則鄙吝之萌復存乎心矣自朔至晦為一月三月為一時賢曰吝貪也余謂作事可卑賤者謂之鄙作事可羞恨者謂之吝少遊汝南少詩照翻先過袁閬不宿而退進往從憲纍日方還或以問泰曰奉高之器譬諸氿濫雖清而易挹賢曰奉高閬字也爾雅側出氿泉正出濫泉氿音軌濫音檻易以豉翻澄之不清淆之不濁不可量也賢曰淆混也量音良又辟公府友人勸其仕憲亦不拒之暫到京師即還竟無所就年四十八終范曄論曰黃憲言論風旨無所傳聞然士君子見之者靡不服深遠去玭章甲十六行本玭作玼乙十一行本同吝遠于願翻賢曰玭說文曰鮮色也據此文當為疵作玼者古字通也將以道周性全無德而稱乎賢曰道周備性全一無德而稱言其德大無能名焉賢曰晉書曰范汪字玄平安北將軍汪生寧寧生泰泰生曄憲隤然其處順賢曰易繫辭曰夫坤隤然示人簡矣隤柔順貌音大回翻處昌呂翻賢曰老子曰道沖而用之或不盈淵乎似萬物之宗言深而不可測也分扶問翻清濁未議其方賢曰方所也其殆庶乎賢曰易繫辭曰顏氏之子其殆庶幾乎殆近也二年二年春正月旄牛夷反前漢旄牛縣屬蜀郡後漢省華陽國志旄牛縣在邛萊山表二年夏四月戊子爵乳母王聖為野王君二年北胸奴連與車師入寇河西議者欲復閉玉門陽關以絶其患賢曰玉門陽關二關名也在敦煌西界皆在敦煌龍勒界復扶又翻下同敦徒門翻臣在京師亦以為西域宜棄今親踐其土地乃知棄西域則河西不能自存謹陳西域三策北虜呼衍王常展轉蒲類秦海之間賢曰大秦國在西海西故曰秦海余按蒲類海在唐庭州界蓋此時北胸奴雖微弱然東畏鮮卑不敢還故地但結連車師鄯善以擾河西故呼衍一部常為河西患若賢注以大秦海西之國為秦海則約言之耳西海廣遠甘英之不能越北胸奴兵威所未嘗役屬言展轉二海間特當時上書者張言之耳共為寇鈔今以酒泉屬國吏士二千餘人集昆侖塞賢曰前書敦煌郡廣至縣有昆侖障宜禾都尉居也廣至故城在今瓜州常樂縣東注又見四十五卷明帝永平十七年與此稍異絶其根本因發鄯善兵五千人脅車師後部此上計也若不能出兵可置軍司馬將士五百人四郡供其犂牛穀食出據柳中此中計也四郡武威酒泉張掖敦煌賢曰柳中今西州縣余按西域傳柳中在後部金薄城之北去交河城八十里杜佑曰唐平高昌以田地城為柳中縣鄯上扇翻則宜棄交河城收鄯善等悉使入塞此下計也朝廷下其議鄯上扇翻下遐稼翻陳忠上疏曰西域內附日久區區東望扣關者數矣此其不樂胸奴慕漢之效也數所角翻樂音洛今北虜已破車師勢必南攻鄯善棄而不救則諸國從矣言從北胸奴也則虜財賄益增膽勢益殖賢曰殖生也即湟中及南山諸羌如此河西四郡危矣河西既危不可不救則百倍之役興不訾之費發矣毛晃曰訾之為言量也不訾謂無量可比也訾子斯翻恤之煩費不見孝武苦心勤勞之意也方今敦煌孤危遠來告急復不輔助內無以慰勞吏民勞力到翻外無以威示百蠻蹙國減土非良計也臣以為敦煌宜置校尉按舊增四郡屯兵以西撫諸國帝納之於是復以班勇為西域長史賢曰西域都護之長史也余按班超未為都護亦為將兵長史敦徒門翻復扶又翻下同二年秋七月丹陽山崩丹陽郡屬揚州二年九月郡國五雨水二年冬十月辛未太尉劉愷罷甲戌以司徒楊震為太尉光祿勳東萊劉熹為司徒大鴻臚耿寶自候震候見也李常侍國家所重欲令公辟其兄寶唯傳上意耳賢曰言非己本心傳在上之意如朝廷欲令三府辟召故宜有尚書敕寶大恨而去執金吾閻顯亦薦所親於震震又不從司空劉授聞之即辟此二人由是震益見怨時詔遣使者大為王聖修第中常侍樊豐及侍中周廣謝惲等更相扇動傾搖朝廷為于僞翻惲於粉翻更工衡翻震上疏曰臣伏念方今災害滋甚百姓空虛三邊震擾三邊東西北也帑它朗翻藏徂浪翻殆非社稷安寧之時詔書為阿母興起第舍合兩為一連里竟街賢曰合兩坊而為一宅里即坊也窮極巧伎伎渠綺翻攻山採石轉相迫促為費巨億周廣謝惲兄弟與國無肺府枝葉之屬府與腑同與之分威共權屬託州郡屬之欲翻傾動大臣宰司辟召承望旨意招來海內貪汙之人受其貨賂至有臧錮棄世之徒賢曰有贓賄禁錮之人余謂棄世者見棄於世也白黑渾淆清濁同源天下歡譁為朝結譏渾戶本翻歡許元翻為于僞翻朝直遙翻臣聞師言上之所取師言衆言也力盡則叛怨叛之人不可復使惟陛下度之復扶又翻度徒洛翻上不聽二年鮮卑其至鞬自將萬餘騎攻南胸奴於曼柏薁鞬日逐王戰死殺千餘人鞬居言翻薁於六翻二年十二月戊辰京師及郡國三地震二年陳忠薦汝南周燮南陽馮良學行深純行下孟翻隱居不仕名重於世帝以玄纁羔幣聘之玄黑色纁淺絶色周官考工記曰三入為纁爾雅三染謂之纁孔穎達曰東帛十端也端則二丈十端六玄四纁五兩三玄二纁纁是地色玄是天色賢曰禮卿執羔董仲舒春秋繁露曰凡贄卿用羔羔有角而不用執之不鳴殺之不嗥類死義者羔飲其母必跪類知禮者故以為贄纁許云翻夫修德立行所以為國更工衡翻行下孟翻為于僞翻君獨何為守東岡之陂乎燮居汝南安城有先人草廬結于岡畔下有陂田常肆勤以自給夫修道者度其時而動動而不時焉得亨乎賢曰亨通也書曰慮善而動動惟厥時度徒洛翻焉於虔翻稱病而還三年三年春正月班勇至樓蘭以鄯善歸附特加三綬三綬疑當作王綬綬音受龜茲音丘慈勇開以恩信白英乃率姑墨溫宿自縛詣勇因發其兵步騎萬餘人到車師前王庭擊走胸奴伊蠡王於伊和谷蠡音黎收得前部五千餘人於是前部始復開通復扶又翻還屯田柳中三年二月丙子車駕東巡辛卯幸泰山三月戊戌幸魯還幸東平至東郡歷魏郡河內而還還從宣翻又如字三年初樊豐周廣謝惲等見楊震連諫不從無所顧忌遂詐作詔書調發司農錢穀大匠見徒材木調徒弔翻見賢遍翻各起冢舍園池廬觀役費無數觀古玩翻震復上疏曰臣備台輔不能調和陰陽去年十二月四日京師地動其日戊辰三者皆土位在中宮賢曰戊干辰支皆土也並地動故言三者考異曰震傳作十一月四日按下文其日戊辰十一月丙申朔戊辰乃十二月四日也臣伏惟陛下以邊境未寧躬自匪薄宮殿垣屋傾倚枝拄而已賢曰倚邪也拄音竹柱翻未崇斷金賢曰易繫辭曰二人同心其利斷金言邪佞之人不與上同心近其靳翻斷丁亂翻王肅丁管翻多請徒士盛修第舍賣弄威福道路歡譁地動之變殆為此發歡許元翻為于僞翻下同又冬無宿雪春節未雨百僚焦心而繕修不止誠致旱之徵也惟陛下奮乾剛之德棄驕奢之臣以承皇天之戒震前後所言轉切帝既不平之而樊豐等皆側目憤怨以其名儒未敢加害會河間男子趙騰上書指陳得失帝發怒遂收考詔獄結以罔上不道結者結定其罪臣聞殷周哲王小人怨詈則還自敬德賢曰尚書無逸之辭還反也敬德加謹以增修其德也激訐謗語為罪與手刃犯法有差乞為虧除全騰之命虧減也訐居謁翻賢曰輿衆也詩曰詢于芻蕘左氏傳曰聽輿人之謀也誘音酉騰竟伏尸都市及帝東巡樊豐等因乘輿在外競修第宅乘繩證翻太尉部掾高舒召大匠令史考校之漢公府諸曹掾各有分部賢曰史謂府史也余按漢諸官府各有令史具奏須行還上之須待也待車駕行還上言其事下遐稼翻上時掌翻怖普布翻會太史言星變逆行遂共譖震云自趙騰死後深用怨懟賢曰懟怨怒也音直類翻且鄧氏故吏有恚恨之心賢曰震初鄧騭辟之故曰故吏恚於避翻下同壬戌車駕還京師便時太學賢曰且於太學待吉時而後入也故曰便時前書便時上林延壽門杜佑曰便時取日時之便遣使者策收震太尉印綬震於是柴門絶賓客柴塞其門也復扶又翻惡烏路翻下同令大鴻臚耿寶奏震大臣不服罪懷恚望有詔遣歸本郡震弘農華陰人章甲十六行本夕作几乙十一行本同孔本同熊校同陽亭雒陽城西也賢曰慷慨悲嘆余謂慷慨不得意而見於辭色也死者士之常分分扶問翻吾蒙恩居上司疾姦臣狡猾而不能誅惡嬖女傾亂而不能禁嬖卑義翻又必計翻何面目復見日月復扶又翻下同身死之日以雜木為棺布單被裁足蓋形勿歸冢次勿設祭祀因飲鴆而卒弘農太守移良風俗通曰齊公子雍食邑於移其後氏焉遣吏於陝縣留停震喪露棺道側謫震諸子代郵行書說文曰郵境上行書舍也廣雅曰郵驛也此言使震諸子代驛吏傳行文書也陝失冉翻為于僞翻太僕征羌侯來歷曰征羌侯國屬汝南郡光武以歷曾祖歙有平羌隴之功改汝南當鄉縣為征羌國以封之賢曰征羌故城在今豫州郾城縣東南耿寶託元舅之親榮寵過厚不念報國恩而傾側姦臣傷害忠良其天禍亦將至矣歷歙之曾孫也歙許及翻三年夏四月乙丑車駕入宮三年戊辰以光祿勳馮石為太尉三年南單于檀死弟拔立為烏稽侯尸逐鞮單于鞮丁奚翻時鮮卑數寇邊數所角翻下同度遼將軍耿夔與溫禺犢王呼尤徽將新降者連年出塞擊之還使屯列衝要衝要者當敵之衝邊之要地也賢曰還令新降者屯列衝要降戶江翻新降者皆怨恨大人阿族等遂反阿族者新降一部之大人也呼尤徽曰我老矣受漢家恩寧死不能相隨衆欲殺之有救者得免阿族等遂將其衆亡去中郎將馬翼與胡騎追擊破之斬獲殆盡賢曰殆近也欲死盡所餘無幾三年日南徼外蠻夷內屬徼吉弔翻三年六月鮮卑寇玄菟三年庚午閬中山崩閬中縣屬台郡賢曰臨閬中水因以為名今隆州縣宋白曰閬水紆曲經其三面縣居其中取以名之三年秋七章甲十六行本七作八乙十一行本同張校同云無注本亦作七月辛巳以大鴻臚耿寶為大將軍三年王聖江京樊豐譖太子乳母王男廚監邴吉等殺之廚監主飲食太子思男吉數為歎息為于僞翻京豐懼有後害乃與閻后妄造虛無搆讒太子及東宮官屬帝怒召公卿以下議廢太子耿寶等承旨皆以為當廢太僕來歷與太常桓焉廷尉犍為張皓議曰犍居言翻經說年未滿十五過惡不在其身且男吉之謀太子容有不知宜選忠良保傅輔以禮義廢置事重此誠聖恩所宜宿留賢曰宿留猶停留也音秀溜帝不從焉郁之子也郁桓榮之子復上書曰昔賊臣江充造構讒逆傾覆戾園孝武久乃覺寤雖追前失悔之何及事見二十三卷武帝征和二年三年未習保傅之教可遽責乎書奏不省省悉景翻九月丁酉廢皇太子保為濟陰王居於德陽殿西鍾下漢官儀曰崇玄門內德陽殿也按帝紀德陽殿在北宮掖庭中蔡質漢儀曰正月旦天子幸德陽殿臨軒公卿將大夫百官各陪朝賀蠻貊胡羌朝貢畢見屬郡計吏皆覲宗室諸劉雜會又曰德陽殿周旋容萬人陛高二丈皆文石作壇激沼水於殿下天子正旦節會朝百僚於此濟子禮翻閭丘復姓左傳齊有閭丘嬰要一遙翻祋丁外翻又丁活翻倀丑羊翻俱詣鴻都門證太子無過帝與左右患之左右近習也父子一體天性自然孟子曰父子之道天性也為天下也為于僞翻歷諷等不識大典而與㣥小共為歡譁外見忠直見賢遍翻飾邪違義豈事君之禮朝廷廣開言章甲十六行本言下有事之二字乙十一行本同孔本同張校同路故且一切假貸若懷迷不反當顯明刑書諫者莫不失色薛皓先頓首曰固宜如明詔歷怫然賢曰字林怫鬱也音扶勿翻余謂怫然憤鬱之見於色者廷詰皓曰屬通諫何言而今復背之賢曰屬近也通猶共也近者共諫何乃相背也屬之欲翻復扶又翻背蒲妹翻處國事固得輾轉若此乎賢曰輾轉不定也詩曰輾轉反側處昌呂翻輾音展歷獨守闕連日不肯去帝大怒尚書令陳忠與諸尚書遂共劾奏歷等帝乃免歷兄弟官削國租削其征羌國租也劾戶概翻又戶得翻武安公主顯宗女也武安縣屬魏郡見賢遍翻三年隴西郡始還狄道永初五年隴西徙襄武三年燒當羌豪麻奴死弟犀苦立三年庚申晦日有食之三年冬十月上行幸長安十一月乙丑還雒陽三年是歲京師及諸郡國二十三地震三十六大水雨雹雨于具翻王崇武標點容肇祖聶崇岐覆校
