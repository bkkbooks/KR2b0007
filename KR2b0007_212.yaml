body:
  text: 資治通鑑卷第二百一十二端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀二十八玄宗至道大聖大明孝皇帝上之下開元六年開元六年戊午七一八開元六年春正月辛丑突厥毗伽可汗來請和許之厥九勿翻伽求迦翻可從刊入聲汗音寒開元六年廣州吏民為宋璟立遺愛碑去年宋璟自廣州入相為于僞翻璟居永翻臣在州無他異迹今以臣光寵成彼諂諛欲革此風望自臣始請敕下禁止上時掌翻下遐稼翻上從之於是他州皆不敢立開元六年辛酉敕禁惡錢武德四年鑄開元通寶錢其後盜鑄漸起顯慶五年以惡錢多官為市之以一善錢售五惡錢民間藏惡錢以待禁㢮乾封以後私錢犯法日蕃有以舟筏鑄於江中者詔所在納惡錢而姦亦不息武后時錢非穿穴及鐵錫銅液皆得用之熟銅排斗沙澀之錢皆售自是盜鑄蜂起吏莫能捕先天之際兩京錢益濫或鎔錫模錢須臾百十故禁之斂人間惡錢鎔之更鑄如式錢更工衡翻於是京城紛然賣買殆絶宋璟蘇頲請出太府錢二萬緡置南北市以平價買百姓不售之物可充官用者及聽兩京百官豫假俸錢庶使良錢流布人間從之頲他鼎翻俸芳用翻開元六年二月戊子移蔚州橫野軍於山北杜佑曰橫野軍在蔚州東北百四十里去太原九百里此蓋指言開元所移軍之地蔚紆勿翻為九姓之援以拔曳固都督頡質略同羅都督毗伽末啜霫都督比言回紇都督夷健頡利發僕固都督曳勒歌等各出騎兵為前後左右軍討擊大使頡戶結翻啜陟劣翻霫而立翻騎奇寄翻使疏吏翻下同皆受天兵軍節度天兵軍在並州城中考異曰實録壬辰制大舉擊突厥五都督及拔悉密金山道總管處木昆執米啜堅昆都督骨篤祿毗伽契丹都督李失活奚都督李大酺及默啜之子右賢王默特勒逾輸等夷夏之師凡三十萬並取朔方道行軍大總管王晙節度而於後俱不見出師勝敗按此年正月突厥請和帝有答詔而二月伐之恐無此事舊紀及王晙突厥傳皆無此月出兵事新突厥傳云默棘連遣使請和帝以不情答而不許俄下詔伐之以王晙統之期以八年並集稽落水上行兵貴密不應前二年早先下詔蓋取實録附會舊傳耳量宜追集量音良無事各歸部落營生仍常加存撫開元六年三月乙巳徵嵩山處士盧鴻入見見賢遍翻拜諫議大夫鴻固辭考異曰舊傳作盧鴻一本紀新傳皆作鴻按中嶽真人劉君碑云盧鴻撰今從之開元六年天兵軍使張嘉貞入朝朝直遙翻有告其在軍奢僭及贓賄者按驗無狀上欲反坐告者反坐者以誣告人所得罪坐之今若罪之恐塞言路塞悉則翻使天下之事無由上達願特赦之其人遂得減死上由是以嘉貞為忠有大用之意為張嘉貞入相張本開元六年有薦山人范知璿文學者並獻其所為文璿從宣翻宋璟判之曰觀其良宰論頗涉佞諛良宰論蓋稱美當時宰相讜音黨豈宜偷合苟容文章若高自宜從選舉求試不可別奏開元六年夏四月戊子河南參軍鄭銑朱陽丞郭仙舟投匭獻詩河南參軍河南府參軍也唐制諸府州諸曹參軍之外又有參軍事掌出使贊導新志注曰武德初改行書佐曰行參軍尋又改曰參軍事朱陽漢弘農縣南界地後魏分置朱陽郡屬析州後周廢郡為縣隋屬弘農郡唐龍朔初屬商州萬歲通天二年度屬洛州匭居洧翻觀其文理乃崇道法至於時用不切事情宜各從所好好呼到翻並罷官度為道士開元六年五月辛亥以突騎施都督蘇祿為左羽林大將軍順國公充金方道經略大使騎奇寄翻開元六年契丹王李失活卒癸巳以其弟娑固代之契欺訖翻又音喫娑素何翻開元六年秋八月頒鄉飲酒禮於州縣令每歲十二月行之唐鄉飲酒之禮刺史為主人先召致仕鄉有德者謀之賢者為賓其次為介其次為衆賓與之行禮縣則令為主人鄉之老人年六十以上有德望者一人為賓次一人為介又其次為三賓又其次為衆賓年六十者三豆七十者四豆八十者五豆九十者及主人皆六豆主賓介三賓衆賓既升即席工持瑟升自階就位鼓鹿鳴卒歌笙入立於堂下北面奏南陔乃間歌歌南有嘉魚笙崇丘乃合樂周南關睢召南鵲巢司正升自西階贊禮揚觶而戒之以忠孝之本主賓介以下皆再拜奠酬既畢乃行無算爵無算樂開元六年唐初州縣官俸皆令富戶掌錢出息以給之息至倍稱多破産者唐初在京諸司官及天下官置公廨本錢以典史主之收贏十之七富戶幸免徭役貧者破産甚衆稱音尺證翻請計州縣官所得俸於百姓常賦之外微有所加以給之時沔請計戶均出每丁加升尺以給之開元六年冬十一月辛卯車駕至西京開元六年戊辰吐蕃奉表請和乞舅甥親署誓文吐蕃以尚文成公主與唐為舅甥之國吐從暾入聲開元六年宋璟奏括州員外司馬李雍儀州司馬鄭勉並有才略文詞先天元年避帝名改箕州為儀州好是非改變若全引進則咎悔必至若長棄捐則才用可惜請除渝硤二州刺史又奏大理卿元行沖素稱才行初用之時實允僉議當事之後頗非稱職請復以為左散騎常侍以李朝隱代之好呼到翻行下孟翻稱尺證翻復扶又翻散悉亶翻騎奇寄翻朝直遙翻陸象先間於政體寬不容非請以為河南尹從之七年七年春二月俱密王那羅延俱密國治山中在吐火羅東北南臨黑河其王突厥延陀種杜佑曰康國在米國西南三百餘里漢康居國也薩桑葛翻乞兵救援七年敕太府及府縣出粟十萬石糶之府謂京兆府縣謂京縣及畿縣也糶他弔翻送少府銷毀七年三月乙卯以左武衛大將軍檢校內外間廣既使苑內營田使王毛仲行太僕卿唐初以尚乘局掌內外間廣既之馬十二間既置內外間廣既使專掌御馬因以尚乘局隸間廣既使苑內諸監本隸司農寺今亦隸苑內營田使萬騎功臣間廣既官吏皆憚之騎奇寄翻苑內所收常豐溢上以為能故有寵雖有外第常居間廣既側內宅上或時不見則悄然若有所失宦官楊思勗高力士皆畏避之七年勃海王大祚榮卒考異曰實録六月丁卯祚榮卒遣左監門率吳思謙攝鴻臚卿充使弔祭按此月丙辰已云祚榮卒蓋六月方遣思謙弔祭耳丙辰命其子武藝襲位七年夏四月壬午開府儀同三司祁公王仁皎薨其子駙馬都尉守一請用竇孝諶例築墳高五丈二尺竇孝諶上外祖也諶氏壬翻宋璟蘇頲固爭以為準令一品墳高一丈九尺高居號翻其陪陵者高出三丈而已竇太尉墳議者頗譏其高大當時無人極言其失豈可今日復踵而為之復扶又翻下蕃復同昔太宗嫁女資送過於長公主魏徵進諫太宗既用其言文德皇后亦賞之事見一百九十四卷太宗貞觀六年長知兩翻號曰酆陵事見二百八卷中宗景龍元年夫以后父之尊欲高大其墳何足為難而臣等再三進言者蓋欲成中宮之美耳況今日所為當傳無窮永以為法可不慎乎上悅曰朕每欲正身率下況於妻子何敢私之然此乃人所難言卿能固守典禮以成朕美垂法將來誠所望也賜璟頲帛四百匹七年五月己丑朔日有食之上素服以俟變徹樂減膳命中書門下察繫囚賑飢乏勸農功賑津忍翻辛卯宋璟等奏曰陛下勤恤人隱此誠蒼生之福然臣聞日食修德月食修刑親君子遠小人絶女謁除讒慝所謂修德也君子恥言浮於行論語孔子曰君子恥其言而過其行遠于願翻慝吐得翻行下孟翻不必數下制書也數所角翻下遐稼翻七年六月戊辰吐蕃復遣使請上親署誓文上不許曰昔歲誓約已定苟信不由衷亟誓何益用左傳語意吐從暾入聲復扶又翻亟去吏翻七年秋閏七月右補闕盧履冰上言禮父在為母服周年則天皇后改服齊衰三年事見二百二卷高宗上元元年為于僞翻齊音咨衰倉回翻上時掌翻上下其議下遐嫁翻左散騎常侍褚無量以履冰議為是諸人爭論連年不決八月辛卯敕自今五服並依喪服傳文散悉亶翻騎奇寄翻傳直戀翻行之各從其意無量歎曰聖人豈不知母恩之厚乎厭降之禮厭於叶翻俗情膚淺不知聖人之心一紊其制誰能正之紊音問七年九月甲寅徙宋王憲為寧王四年成器更名憲棄餘食於竇中怒欲杖殺之左右莫敢言憲從容諫曰陛下從復道中窺人過失而殺之臣恐人人不自安且陛下惡棄食於地者為食可以養人也憲從千容翻惡烏路翻為于僞翻今以餘食殺人無乃失其本乎上大悟蹶然起曰微兄幾至濫刑幾居希翻遽釋衛士是日上宴飲極歡自解紅玉帶並所乘馬以賜憲七年冬十月辛卯上幸驪山溫湯癸卯還宮驪力知翻還從宣翻又音如字七年壬子冊拜突騎施蘇祿為忠順可汗可從刊入聲汗音寒七年十一月壬申章十二行本申下有契丹王李婆固與公主入朝十一字乙十一行本同惟婆作娑孔本同張校同固作圉退齊校本仍作固上以岐山令王仁琛岐山縣隋置屬岐州琛丑林翻墨敕令與五品官宋璟奏故舊恩私則有大例除官資歷非無公道仁琛嚮緣舊恩已獲優改今若再蒙超獎遂於諸人不類又是后族王仁琛蓋仁皎㣥從輿衆也苟無負犯於格應留請依資稍優注擬從之選人宋元超於吏部自言侍中璟之叔父冀得優假璟聞之牒吏部云元超璟之三從叔三從同高祖下遐嫁翻選須絹翻從才用翻不多參見見賢遍翻既不敢緣尊輒隱又不願以私害公向者無言自依大例既有聲聽事須矯枉請放元超冀得饒假今乃不得留注所謂矯枉過正也寧王憲奏選人薛嗣先請授微官事下中書門下選須絹翻事下遐嫁翻璟奏嗣先兩選齊郎雖非灼然應留以懿親之故固應微假官資在景龍中常有墨敕處分謂之斜封處昌呂翻分扶問翻自大明臨御茲事杜絶行一賞命一官必是緣功與才皆歷中書門下至公之道唯聖能行嗣先幸預姻戚不為屈法許臣等商量望付吏部知不出正敕從之量音良先是朝集使往往齎貨入京師先悉薦翻及春將還多遷官宋璟奏一切勒還以革其弊七年是歲置劍南節度使領益彭等二十五州八年八年春正月丙辰左散騎常侍褚無量卒按通鑑例惟公輔書薨偏王者公輔書卒今書褚無量卒以整比㣥書未竟改命元行沖故書以始事考異曰舊本紀正月甲子朔皇太子加元服壬申右散騎常侍褚無量卒按長曆正月甲寅朔甲子十一日也唐曆亦云壬申無量卒今從實録辛酉命右散騎常侍元行沖整比㣥書比毗至翻八年侍中宋璟疾負罪而妄訴不已者悉付御史臺治之治直之翻謂中丞李謹度曰服不更訴者出之尚訴未已者且繫由是人多怨者會天旱有魃魃蒲撥翻旱神也神異經曰南方有人長二三尺袒身目在項上走行如風其名曰魃所見之國大旱赤地千里一名旱母遇者得之投溷中即死優人作魃狀戲於上前問魃何為出對曰奉相公處分相息亮翻處昌呂翻分扶問翻又問何故魃曰負冤者三百餘人相公悉以繫獄抑之故魃不得不出上心以為然時璟與中書侍郎同平章事蘇頲建議嚴禁惡錢江淮間惡錢尤甚璟以監察御史蕭隱之充使括惡錢監工銜翻使疏吏翻隱之嚴急煩擾怨嗟盈路上於是貶隱之官辛巳罷璟為開府儀同三司頲為禮部尚書考異曰唐曆云二十八日辛卯舊紀云己卯按是月無辛卯今從實録並州長史張嘉貞為中書侍郎並同平章事於是弛錢禁惡錢復行矣復扶又翻八年二月戊戌皇子敏卒追立為懷王此懷王以州為國號八年壬子敕以役莫重於軍府一為衛士六十乃免宜促其歲限使百姓更迭為之更工衡翻八年夏四月丙午遣使賜烏長王骨咄王俱位王冊命三國皆在大食之西烏長即烏萇又曰烏荼骨咄在鑊沙之東或曰阿咄羅治思助建城俱位或曰商彌治阿賒䫻師多城在大雪山勃律河北地寒冬窟室咄當沒翻誘音酉三國不從故褒之八年五月辛酉復置十道按察使罷按察見上卷五年八年丁卯以源乾曜為侍中張嘉貞為中書令乾曜上言形要之家多任京官使俊乂之士沈廢於外沈持林翻臣三子皆在京請出其二人上從之因下制稱乾曜之公命文武官效之於是出者百餘人張嘉貞吏事強敏而剛躁自用躁則到翻中書舍人苗延嗣呂太一考功員外郎員嘉靜殿中侍御史崔訓皆嘉貞所引進常與之議政事四人頗招權時人語曰令公四俊苗呂崔員員音運八年六月瀍穀漲溢漂溺幾二千人溺奴狄翻幾居希翻考異曰實録云漂居人四百餘家舊紀云漂沒九百餘戶溺死八百餘人掌間溺死者千一百餘人今從舊紀人數按舊紀掌間之下有番兵二字八年突厥降戶僕固都督勺磨及跌部落散居受降城側降戶江翻勺職略翻奚結翻跌徒結翻朔方大使王晙言其陰引突厥謀陷軍城密奏請誅之誘勺磨等宴於受降城伏兵悉殺之河曲降戶殆盡拔曳固同羅諸部在大同橫野軍之側者聞之皆忷懼大同軍即大武軍武后大足元年更名杜佑曰在代州北三百里去並州八百餘里晙子峻翻誘音酉忷許拱翻並州長史天兵節度大使張說引二十騎持節即其部落慰撫之說讀曰悅騎奇寄翻因宿其帳下副使李憲以虜情難信馳書止之說復書曰吾肉非黃羊必不畏食北人謂麞為黃羊必不畏刺非人家及廣既牧所畜而自孳生於野者謂之野馬論語載子張之言拔曳固同羅由是遂安八年冬十月辛巳上行幸長春宮壬午畋于下邽八年上禁約諸王不使與㣥臣交結光祿少卿駙馬都尉裴虛己與岐王範遊宴仍私挾讖緯讖楚譖翻緯于貴翻戊子流虛己於新州離其公主睿宗女霍國公主下嫁虛己舊志新州至京師五千五十二里唐太常寺有太祝六人正九品上貶庭琦雅州司戶諤山茌丞山茌縣漢晉屬泰山郡宋屬東太原郡隋廢入濟州長清縣武德元年分置山茌縣屬齊州數所角翻謂左右曰吾兄弟自無間但趨競之徒強相託附耳間古莧翻強其兩翻吾終不以此責兄弟也上嘗不豫薛王業弟內直郎韋賓唐六典東宮有內直局內直郎二人掌符璽繖扇几案衣服之事職擬尚輦奉御事覺賓杖死恂貶錦州刺史武后垂拱二年以辰州麻陽縣地及開山洞置錦州上降階執業手曰吾若有心猜兄弟者天地實殛之即與之宴飲仍慰諭令復位八年十一月乙卯上還京師八年辛未突厥寇甘涼等州涼州西至甘州五百里考異曰唐曆突厥寇涼州在九月舊突厥傳云八年冬御史大夫王晙為朔方大總管奏請西徵拔悉密東發奚契丹兩蕃期以明年秋初引朔方兵數道俱入掩突厥牙帳於稽落河上按王晙此月為幽州都督今從實録舊紀敗補邁翻掠契苾部落而去貞觀中契苾來降處其部落於涼州契欺訖翻苾毗必翻先是朔方大總管王晙奏請西發拔悉密拔悉密酋長姓阿史那氏蓋亦突厥之種也居北庭先悉薦翻期以今秋掩毗伽牙帳於稽落水上稽落水蓋導源稽落山大懼暾欲谷曰不足畏也拔悉密在北庭與奚契丹相去絶遠勢不相及朔方兵計亦不能來此若必能來俟其垂至徙牙帳北行三日唐兵食盡自去矣且拔悉密輕而好利輕牽正翻好呼到翻得王晙之約必喜而先至晙與張嘉貞不相悅奏請多不相應必不敢出兵史言在廷在邊之謀不叶為夷狄所窺拔悉密獨至擊而取之勢甚易耳易以豉翻既而拔悉密果發兵逼突厥牙帳而朔方及奚契丹兵不至拔悉密懼引退毗伽欲擊之暾欲谷曰此屬去家千里將死戰未可擊也不如以兵躡之去北庭二百里暾欲谷分兵間道先圍北庭間古莧翻因縱兵擊拔悉密大破之拔悉密衆潰走趨北庭不得入趨逡喻翻盡為突厥所虜暾欲谷引兵還出赤亭掠涼州羊馬楊敬述遣裨將盧公利判官元澄將兵邀擊之將即亮翻暾欲谷謂其衆曰吾乘勝而來敬述出兵破之必矣公利等至刪丹刪丹縣漢屬張掖郡後漢晉屬西郡後魏曰山丹隋復曰刪丹屬甘州唐兵大敗公利澄脫身走毗伽由是大振盡有默啜之衆八年契丹牙官可突干驍勇得衆心李娑固猜畏欲去之驍堅堯翻娑素何翻去羌呂翻是歲可突干舉兵擊娑固娑固敗奔營州營州都督許欽淡遣安東都護薛泰帥驍勇五百與奚王李大酺奉娑固以討之戰敗娑固李大酺皆為可突干所殺帥讀曰率酺音蒲生擒薛泰營州震恐許欽淡移軍入渝關可突干立娑固從父弟鬱干為主遣使請罪上赦可突干之罪以鬱干為松漠都督以李大酺之弟魯蘇為饒樂都督使疏吏翻下同樂音洛九年九年春正月制削楊敬述官爵以刪丹之敗也仍充諸使諸使謂節度支度營田等使也九年丙辰改蒲州為河中府置中都官僚一準京兆河南九年丙寅上幸驪山溫湯乙亥還宮九年監察御史宇文融上言天下戶口逃移巧僞甚衆請加檢括融㢸之玄孫也宇文㢸見一百七十二卷陳宣帝太建七年監古銜翻上時掌翻㢸古弼字贊成之二月乙酉敕有司議招集流移按詰巧僞之法以聞詰去吉翻九年丙戌突厥毗伽復使來求和上賜書諭以曩昔國家與突厥和親華夷安逸甲兵休息國家買突厥羊馬突厥受國家繒帛彼此豐給自數十年來不復如舊正由默啜無信口和心叛數出盜兵寇抄邊鄙人怨神怒隕身喪元復扶又翻下今復同數所角翻喪息浪翻元首也斬默啜事見上卷四年吉凶之驗皆可汗所見今復蹈前迹掩襲甘涼隨遣使人更來求好國家如天之覆如海之容好呼到翻覆敷又翻但取來情不追往咎可汗果有誠心則共保遐福不然無煩使者徒爾往來若其侵邊亦有以待可汗其審圖之九年丁亥制州縣逃亡戶口聽百日自首或於所在附籍或牒歸故鄉各從所欲過期不首首式又翻即加檢括謫徙邊州公私敢容庇者抵罪以宇文融充使括逃移戶口及籍外田所獲巧僞甚衆使疏吏翻遷兵部員外郎兼侍御史融奏置勸農判官十人通典及新書並云二十九人通典且列其姓名分行天下其新附客戶免六年賦調調徒弔翻使者競為刻急州縣承風勞擾百姓苦之陽翟尉皇甫憬上疏言其狀陽翟縣漢屬潁川郡晉屬河南郡後魏置陽翟郡隋廢郡為縣屬襄城郡唐初屬嵩州貞觀元年屬許州龍朔二年度屬洛州為畿縣憬居永翻貶憬盈川尉州縣希旨務於獲多虛張其數或以實戶為客凡得戶八十餘萬田亦稱是稱尺證翻九年蘭池州胡康待賓誘諸降戶同反夏四月攻陷六胡州誘音酉降戶江翻高宗調露元年於靈夏南境以降突厥置魯州麗州含州塞州依州契州以唐人為刺史謂之六胡州長安二年併為匡長二州神龍三年置蘭池都督府分六州為縣宋白曰六胡州在夏州德靜縣北考異曰實録四月庚寅康待賓反命王晙討平之斬于都市五月丁巳既誅康待賓下詔云云壬寅叛胡康待賓僞稱葉護安慕容以叛七月己酉王晙擒康待賓至京師腰斬之前後重復交錯相違今從舊紀有衆七萬進逼夏州夏戶雅翻命朔方大總管王晙隴右節度使郭知運共討之九年戊戌敕京官五品以上外官刺史四府上佐四府謂京兆府河南府河中府太原府視其政善惡為舉者賞罰九年以太僕卿王毛仲為朔方道防禦討擊大使與王晙及天兵軍節度大使張說相知討康待賓九年六月己卯罷中都復為蒲州復扶又翻蒲州刺史陸象先政尚寬簡吏民有罪多曉諭遣之州録事言於象先曰明公不施箠撻何以示威唐上州置録事三人正九品上中下州各一人下州從九品下箠止垂翻人情不遠此屬豈不解吾言邪解戶買翻曉也必欲箠撻以示威當從汝始録事慚而退象先嘗謂人曰天下本無事但庸人擾之耳苟清其源何憂不治治直吏翻九年秋七月己酉王晙大破康待賓生擒之殺叛胡萬五千人辛酉集四夷酋長腰斬康待賓於西市酋慈由翻長知兩翻先是叛胡潛與党項通謀攻銀城連谷據其倉庾後周置銀城縣後改曰銀城防貞觀四年以銀城屬銀州八年屬勝州又以隋連谷戍置連谷縣亦屬勝州杜佑曰銀城連谷皆漢圁陰縣地漢光祿塞在今縣北先悉薦翻党底朗翻大破之嵐州合河縣北有合河關宋白曰合河縣城下有蔚汾水西與黃河合故曰合河趙珣聚米圖經合河關在府州南二百里將即亮翻騎奇寄翻堰於扇翻党項乃更與胡戰胡衆潰西走入鐵建山說安集党項使復其居業討擊使阿史那獻以党項翻覆請並誅之說曰王者之師當伐叛柔服豈可殺已降邪因奏置麟州以鎮撫党項餘衆分勝州銀城連谷置麟州又置新秦縣為麟州治所杜佑曰麟州漢新秦中地九年九月乙巳朔日有食之九年康待賓之反也詔郭知運與王晙相知討之晙上言朔方兵自有餘力請敕知運還本軍上時掌翻未報知運已至由是與晙不協晙所招降者知運復縱兵擊之虜以晙為賣己由是復叛降戶江翻復扶又翻上以晙不能遂定㣥胡丙午貶晙為梓州刺史梓州漢郪廣漢氐道之地西魏梁末置新州隋改梓州王晙貶官未必離任也如婁師德以素羅汗山之敗貶亦此類九年丁未梁文獻公姚崇薨遺令佛以清淨慈悲為本而愚者寫經造像冀以求福昔周齊分據天下周則毀經像而修甲兵齊則崇塔廟而弛刑政一朝合戰齊滅周興近者諸武諸韋造寺度人不可勝紀勝音升無救族誅汝曹勿效兒女子終身不寤追薦冥福道士見僧獲利效其所為尤不可延之於家當永為後法九年癸亥以張說為兵部尚書同中書門下三品考異曰朝野僉載曰說為並州刺史諂事王毛仲毛仲巡邊說於天兵軍大設酒肴恩敕忽降授兵部尚書同中書門下三品謝訖便抱毛仲起舞鳴其靴鼻今不取九年冬十月河西隴右節度大使郭知運卒知運與同縣嚴縣改郡右衛副率王君奐比率所律翻奐比丑略翻郭知運瓜州晉昌人王君奐比瓜州常樂人皆以驍勇善騎射著名西陲為虜所憚驍堅堯翻騎奇寄翻時人謂之王郭奐比遂自知運麾下代為河西隴右節度使判涼州都督九年十一月丙辰國子祭酒元行沖上㣥書四録甲部經録乙部史録丙部子録丁部集録考異曰集賢注記在九年春今從唐曆統紀舊紀九年庚午赦天下九年十二月乙酉上幸驪山溫湯壬辰還宮九年是歲諸王為都督刺史者悉召還京師開元二年有司請依故事出諸王刺外州九年新作蒲津橋鎔鐵為牛以繫緪時鑄八牛牛下有山皆鐵也夾岸以維浮梁蒲津東岸即河東縣西岸即河西縣緪居登翻大索也九年安州別駕劉子玄卒子玄即知幾也避上嫌名以字行劉子玄卒重史臣也例猶褚無量上名隆基知幾犯嫌名幾居希翻著作郎吳兢撰則天實録言宋璟激張說使證魏元忠事事今見二百七卷武后長安三年撰士免翻知兢所為謬曰劉五殊不相借知幾第五唐人多以第行相呼此乃兢所為史草具在不可使明公枉怨死者同僚皆失色其後說陰祈兢改數字兢終不許曰若徇公請則此史不為直筆何以取信於後九年太史上言麟德曆浸疏是曆行於高宗麟德二年上時掌翻上命僧一行更造新曆此所謂大衍曆也歐陽修曰自太初至麟德曆有二十三家與天雖近而未密也至一行密矣其倚數立法固無以易也後世雖有改作者皆依倣而已行下孟翻更工衡翻唐東宮十率府各有兵曹參軍從九品上掌判句大朝會及皇太子出則從鹵簿而涖其儀一行更造新曆欲知黃道進退而太史無黃道儀令瓚以木為遊儀一行是之請更鑄銅鐵使黃道運行以追列舍之變因二分之中以立黃道交於奎軫之間二至升降各十四度黃道內施白道月環用究陰陽朓朒動合天運七政日月五星也九年置朔方節度使領單于都護府夏鹽等六州定遠豐安二軍三受降城單音蟬夏戶雅翻降戶江翻十年十年春正月丁巳上行幸東都以刑部尚書王志愔為西京留守愔於今翻十年癸亥命有司收公廨錢以稅錢充百官俸武德元年制京司及州縣官各給公廨田課其管種以供公私之費又有公廨園公廨地皆收其稅以給百官廨古隘翻俸方用翻十年乙丑收職田唐文武官有職分田一品十二頃二品十頃三品九頃四品七頃五品六頃六品四頃七品三頃五十畝八品二頃五十畝九品二頃皆給百里內之地諸州都督都護親王府官二品十二頃三品十頃四品八頃五品七頃六品五頃七品四頃八品三頃九品二頃五十畝鎮戍關津嶽瀆官五品五頃六品三頃五十畝七品三頃八品二頃九品一頃五十畝貞觀十一年以職田侵漁百姓詔給逃還貧戶視職田多少每畝給粟二斗謂之地租尋以水旱復罷之十年二月戊寅上至東都十年夏四月己亥以張說兼知朔方軍節度使十年五月伊汝水溢漂溺數千家溺奴狄翻漢志伊水出弘農郡盧氏縣東北入洛汝水出弘農入淮史言伊汝溢而漂數千家既二水分流相去日益遠何至能漂流數千家此必於發源之地水溢而並流也被災之家當在虢洛二州界十年閏月壬申張說如朔方巡邊十年己丑以餘姚縣主女慕容氏為燕郡公主妻契丹王鬱干燕因肩翻妻七細翻十年六月丁巳博州河決命按察使蕭嵩等治之嵩梁明帝之孫也後梁主巋諡明帝治直之翻十年己巳制增太廟為九室遷中宗主還太廟中宗遷別廟見上卷五年十年秋八月癸卯武彊令裴景仙武彊漢河間之武隧縣也晉更名武彊唐屬冀州事覺亡命上怒命集衆斬之大理卿李朝隱奏景仙贓皆乞取罪不至死朝直遙翻又其曾祖寂有建義大功載初中以非罪破家據裴寂傳寂孫承先武后時為酷吏所殺今為承嫡宜宥其死投之荒遠其辭略曰十代宥賢功實宜録左傳晉祁奚請叔向曰社稷之固也猶將十世宥之情或可哀制令杖殺朝隱又奏曰生殺之柄人主得專輕重有條臣下當守今若乞取得罪便處斬刑處昌呂翻後有枉法當科欲加何辟辟毗亦翻所以為國惜法期守律文為于僞翻非敢以法隨人曲矜仙命又曰若寂勳都棄仙罪特加則叔向之賢何足稱者若敖之鬼不其餒而左傳楚令尹子文之言杖景仙一百流嶺南惡處考異曰實録云初上令集衆殺之李朝隱執奏又下制云集衆決殺朝隱又奏乃流嶺南蓋本欲斬之也十年安南賊帥梅叔焉等攻圍州縣遣驃騎將軍兼內侍楊思勗討之帥所類翻驃匹妙翻騎奇寄翻考異曰舊紀云八月丙戌按八月庚子朔無丙戌思勗傳云首領梅玄成自稱黑帝與林邑真臘國通謀陷安南府今從本紀周尹上神宗書作梅叔鸞思勗募㣥蠻子弟得兵十餘萬襲擊大破之斬叔焉積尸為京觀而還觀古玩翻還從宣翻又如字十年初上之誅韋氏也王皇后頗預密謀及即位數年色衰愛弛武惠有寵陰懷傾奪之志后心不平時對上有不遜語上愈不悅密與祕書監姜皎謀以后無子廢之皎泄其言嗣滕王嶠按新書滕王元嬰薨長子修琦嗣為長樂王垂拱中死詔獄神龍初以少子修信子涉嗣無嗣滕王嶠也新書姜皎傳言皎泄禁中語為嗣濮王嶠所劾又按新書太宗子魏王泰得罪後封濮王薨子欣嗣武后時為酷吏所陷貶神龍初子嶠嗣王則嗣滕王嶠當作嗣濮王嶠明矣奏之上怒張嘉貞希旨構成其罪云皎妄談休咎甲戌杖皎六十流欽州弟吏部侍郎晦貶春州司馬舊志春州京師東南六千四百四十八里皎卒於道己亥嚴己改乙敕宗室外戚駙馬非至親毋得往還其卜相占候之人皆不得出入百官之家相息亮翻十年己卯夜左領軍兵曹權楚璧與其黨李齊損等作亂立楚璧兄子梁山為光帝詐稱襄王之子景雲二年重茂改封襄王求留守王志愔不獲比曉比必利翻屯營兵自潰斬楚璧等傳首東都志愔驚怖而薨楚璧懷恩之姪權懷恩為吏以嚴能稱怖普布翻迥秀之子也李迥秀始見一百六卷武后神功元年迥戶頃翻壬午遣河南尹王怡如京師按問宣慰十年癸未吐蕃圍小勃律王沒謹忙小勃律在大勃律西北三百里去京師九千里而贏東少南三千里距吐蕃贊普牙勃律唐之西門勃律亡則西域皆為吐蕃矣嵩乃遣疏勒副使張思禮將蕃漢步騎四千救之據新書張嵩即張孝嵩使疏吏翻將即亮翻騎奇寄翻與謹忙合擊吐蕃大破之斬獲數萬自是纍歲吐蕃不敢犯邊十年王怡治權楚璧獄連逮甚衆久之不決治直之翻上乃以開府儀同三司宋璟為西京留守璟至止誅同謀數人餘皆奏原之十年康待賓餘黨康願子反自稱可汗張說發兵追討擒之其黨悉平徙河曲六州殘胡五萬餘口於許汝唐鄧仙豫等州貞觀八年改伊州襄城郡為汝州唐州漢南陽郡東界比陽湖陽平氏之地後魏於比陽置東荊州後改為昌州又改為淮州隋改為顯州武德五年以郡有唐城山改為唐州開元三年以汝州之葉襄城唐州之方城豫州之西平許州之舞陽置仙州先是緣邊戍兵常六十餘萬先悉薦翻說以時無強寇奏罷二十餘萬使還農上以為疑說曰臣久在疆埸具知其情將帥苟以自衛及役使營私而已埸音亦將即亮翻帥所類翻若禦敵制勝不必多擁宀兒卒以妨農務陛下若以為疑臣請以闔門百口保之上乃從之初諸衛府兵自成丁從軍六十而免其家又不免雜徭浸以貧弱逃亡略盡百姓苦之張說建議請召募壯士充宿衛不問色役優為之制逋逃者必爭出應募上從之旬日得精兵十三萬分隸諸衛更番上下更工衡翻上時掌翻兵農之分從此始矣史言唐養兵之弊始於張說十年冬十月癸丑復以乾元殿為明堂以東都明堂復為乾元殿見上卷五年復扶又翻十年甲寅上幸壽安興泰宮壽安古新安九曲之地後魏置甘棠縣隋仁壽四年改為壽安縣屬洛州庚申還宮十年上欲耀兵北邊丁卯以秦州都督張守潔等為諸衛將軍十年十一月乙未初令宰相共食實封三百戶唐會要曰舊制凡有功之臣賜實封者皆以課戶先準戶數州縣與國官邑官執帳供其租調各準配租調遠近州縣官司收其腳直然後付國邑官司其丁準此入國邑者收其庸十年前廣州都督裴胄先下獄下遐嫁翻胄與胄同上與宰相議其罪張嘉貞請杖之張說曰臣聞刑不上大夫記曲禮之言上時掌翻且所以養廉恥也為于僞翻近其靳翻故士可殺不可辱記儒行之言聞杖姜皎於朝堂朝直遙翻皎官登三品亦有微功有罪應死則死應流則流奈何輕加笞辱以皂隸待之笞丑之翻皂昨早翻姜皎事往不可復追胄先據狀當流豈可復蹈前失復扶又翻上深然之嘉貞不悅退謂說曰何論事之深也說曰宰相時來則為之若國之大臣皆可笞辱但恐行及吾輩吾此言非為胄先乃為天下士君子也為于僞翻下為農同嘉貞無以應十年十二月庚子以十姓可汗阿史那懷道女為交河公主武后長安四年冊懷道為十姓可汗十年上將幸晉陽因還長安張說言於上曰汾陰脽上有漢家后土祠立后土祠見二十卷漢武帝元鼎四年脽音誰陛下宜因巡幸修之為農祈穀上從之十年上女永穆公主將下嫁永穆公主下嫁王繇僧一行諫曰武后惟太平一女故資送特厚卒以驕敗太平公主始嫁薛紹而敗於開元之初卒子恤翻上遽止之十一年十一年春正月己巳車駕自東都北巡庚辰至潞州給復五年上嘗為潞州別駕故也復方目翻辛卯至並州置北都以並州為太原府刺史為尹二月戊申還至晉州十一年張說與張嘉貞不平會嘉貞弟金吾將軍嘉祐贓發說勸嘉貞素服待罪於外己酉左遷嘉貞幽州刺史十一年壬子祭后土於汾陰乙卯貶平遙令王同慶為贛尉平遙即漢太原郡平陶縣後魏避國諱改平陶為平遙周隋屬介州唐屬汾州贛音紺煩擾百姓也偫直里翻十一年癸亥以張說兼中書令十一年己巳罷天兵大武等軍以大同軍為太原以北節度使領太原遼石嵐汾代欣朔蔚雲十州武德三年分並州之樂平遼山平城石艾置遼州八年曰箕州先天元年避上名改曰儀州至中和三年方復曰遼州此以後來一定州名書之嵐盧含翻蔚紆勿翻十一年三月庚午車駕至京師十一年夏四月甲子以吏部尚書王晙為兵部尚書同中書門下三品十一年五月己丑以王晙兼朔方軍節度大使巡河西隴右河東河北諸軍十一年上置麗正書院聚文學之士漢魏以來有祕書之職梁於文德殿內藏聚㣥書北齊有文林館學士後周有麟趾殿學士皆掌著述隋寫㣥書正副二本藏於宮中其餘以實祕書外閣煬帝於東都觀文殿東西廂貯書自漢延嘉至隋皆祕書掌圖籍而禁中之書時或有焉太宗在藩置學士十八人其後弘文崇文二館皆有學士開元五年乾元殿寫四部書置乾元院使有刊正官四人知書官八人分掌四庫書六年更號麗正修書院置使及檢校官改修書官為麗正殿學士八年加文學直又加修撰校理判正校勘官十一年置麗正院修書學士十三年改麗正修書院為集賢殿書院五品以上為學士六品以下為直學士宰相一人為學士知院事常侍一人為副知院事又置判院一人押院中使一人又置集賢院侍講學士侍讀直學士其後又增修撰官校理官待制官留院官知檢討官文學直之類會稽縣帶越州鼓城縣漢臨平下曲陽兩縣之地隋分槀城於下曲陽故城東五里置昔陽縣尋改為鼓城唐屬定州會古外翻監古銜翻或侍講以張說為修書使以總之有司供給優厚中書舍人洛陽陸堅以為此屬無益於國徒為糜費欲悉奏罷之考異曰舊傳作徐堅今從集賢注記自古帝王於國家無事之時莫不崇宮室廣聲色今天子獨延禮文儒發揮典籍所益者大所損者微陸子之言何不達也上聞之重說而薄堅十一年秋八月癸卯敕前令檢括逃人慮成煩擾天下大同宜各從所樂樂音洛令所在州縣安集遂其生業十一年戊申追尊宣皇帝廟號獻祖光皇帝廟號懿祖宣皇帝諱熙涼武昭王皓之曾孫涼王歆之孫弘農太守重耳之子也光皇帝諱天賜宣皇帝長子也十一年先是吐谷渾畏吐蕃之強附之者數年先悉薦翻吐從暾入聲九月壬申帥衆詣沙州降帥讀曰率降戶江翻河西節度使張敬忠撫納之十一年冬十月丁酉上幸驪山作溫泉宮雍録曰驪山溫湯在臨潼縣南一百五十步直驪山之西北十道志曰泉有三所其一處即皇堂石井後周宇文護所造隋文帝又修屋宇並植松柏千餘株貞觀十八年詔閻立本營建宮殿御湯名湯泉宮是年更名溫泉宮而改作之甲寅還宮十一年十一月禮儀使張說等奏以高祖配昊天上帝罷三祖並配之禮此因郊祀置禮儀使也武德初定令圜丘以景帝配明堂以元帝配貞觀奉高祖配圜丘永徽二年又奉太宗配明堂垂拱初用元萬頃議奉高宗配圜丘自是郊祀之禮三祖並配三祖謂高祖太宗高宗使疏吏翻戊寅上祀南郊赦天下考異曰實録癸酉日長至戊寅祀南郊唐曆戊寅冬至祀南郊按長曆去年閏五月來年閏十二月唐曆近是十一年戊子命尚書左丞蕭嵩與京兆蒲同岐華州長官選府兵及白丁一十二萬謂之長從宿衛華戶化翻長知兩翻一年兩番州縣毋得雜役使十一年十二月甲午上幸鳳泉湯戊申還宮十一年庚申兵部尚書同中書門下三品王晙坐黨引疏族貶蘄州刺史舊志蘄州至京師二千五百六十里蘄渠希翻考異曰舊傳云上親郊祀追晙赴京以會大禮晙以時屬冰壯恐虜騎乘隙入寇表辭不赴手敕慰勉仍賜衣一副會許州刺史王喬家奴告喬與晙潛謀構逆敕侍中源乾曜中書令張說鞫其狀唆既無反狀乃以違詔追不到罪之今從實録十一年是歲張說奏改政事堂曰中書門下列五房於其後分掌庶政舊制宰相常於門下省議事謂之政事堂永淳元年中書令裴炎以中書執政事筆遂移政事堂於中書省至是說改政事堂為中書門下其政事印改為中書門下之印五房一曰吏房二曰樞機房三曰兵房四曰戶房五曰刑禮房十一年初監察御史濮陽杜暹因按事至突騎施監古銜翻濮博木翻暹息廉翻突騎施饋之金暹固辭左右曰君寄身異域不宜逆其情乃受之埋於幕下出境移牒令取之虜大驚度磧追之不及及安西都護闕或薦暹往使安西人服其清慎磧七迹翻使疏吏翻十二年十二年春三月甲子起暹為安西副大都護磧西節度等使十二年神龍初追復澤王上金官爵上金死見二百四卷武后天授元年紹其故封許王素節之子瓘利其爵邑與弟璆謀璆音求使人告義珣非上金子妄冒襲封復流嶺南以璆繼上金後為嗣澤王至是玉真公主表義珣實上金子為瓘兄弟所擯夏四月庚子復立義珣為嗣澤王削璆爵貶瓘鄂州別駕舊志鄂州京師東南二千九百四十八里壬寅敕宗室旁繼為嗣王者並令歸宗復扶又翻考異曰舊紀在癸卯今從實録十二年壬子命太史監南宮說等唐太史局屬祕書省景龍二年改太史局為太史監令名不改不隸祕書開元二年又改令為監說讀曰悅夏至日中立八尺之表同時候之陽城晷長一尺四寸八分弱陽城縣前漢屬潁川郡後漢屬河南郡後魏置陽城郡隋置嵩州貞觀三年廢嵩州以縣屬洛州武后登封元年改曰告成中宗神龍元年復故晷居洧翻長直亮翻高古號翻浚儀嶽臺晷長一尺五寸微強項安世曰按日行黃道每歲有差地中亦當隨之故測日景以求地中周在洛邑漢在潁川陽城唐在汴州浚儀也長直亮翻考異曰新志云浚儀嶽臺晷尺五寸三分今從僧一行大衍曆議及舊志南至朗州晷長七寸七分極高二十九度半北至蔚州晷長二尺二寸九分極高四十度南北相距三千六百八十八里九十步晷差一尺五寸二分極差十度半又南至交州晷出表南三寸三分八月海中南望老人星下衆星粲然皆古所未名大率去南極二十度以上星皆見見賢遍翻溫公作通鑑不特紀治亂之迹而已至於禮樂曆數天文地理尤致其詳讀通鑑者如飲河之鼠各充其量而已十二年五月丁亥停諸道按察使八年復置諸道按察使使疏吏翻下同十二年六月壬辰制聽逃戶自首首式又翻闢所在閒田隨宜收稅毋得差科征役租庸一皆蠲免仍以兵部員外郎兼侍御史宇文融為勸農使巡行州縣行下孟翻與吏民議定賦役十二年上以山東旱命臺閣名臣以補刺史壬午以黃門侍郎王丘中書侍郎長安崔沔沔彌兗翻丘同皎之從父兄子王同皎預誅二張死於武三思之手從才用翻大敏之孫也按舊書韓休傳休伯父大敏則天初以雪反者賜死休父曰大智初張說引崔沔為中書侍郎故事承宣制皆出宰相侍郎署位而已承宣制者承宣及承制也設官分職上下相維各申所見事乃無失侍郎令之二也豈得拱默而已由是遇事多所異同說不悅故因是出之十二年秋七月突厥可汗遣其臣哥解頡利發來求婚十二年溪州蠻覃行璋反溪州漢沅陵零陵二縣地梁分置大鄉縣舊置辰州武后天授二年分置溪州覃徒含翻姓也姓譜梁有東寧州刺史覃元亮將兵擊之監古銜翻黔音琴使疏吏翻將即亮翻癸亥思勗生擒行璋斬首三萬級而歸加思勗輔國大將軍俸祿防閣皆依品給貞觀初百官得上考者給祿一季未幾得上下考者給祿一年出使者稟其家新至官者計日給糧中書舍人高季輔言外官卑品貧匱宜給祿養親自後以地租春秋給京官歲凡五十萬一千五百餘斛外官降京官一等一品以五十石為一等二品三品以三十石為一等四品五品以二十石為一等六品七品以五石為一等八品九品以二石五斗為一等典粟則以鹽為祿職事官又有防閣庶僕一品防閣九十六人二品七十二人三品四十八人四品三十二人五品二十四人六品庶僕十五人七品四人八品二人九品二人外官以州府縣上中下為差又按唐六典輔國大將軍勳階正二品唐制宦官不得登三品今思勗階二品矣宋白曰唐制凡京司文武職官皆有防閣州縣官寮皆有白直唐志商州有洵水府又按唐制諸府無別駕各有別將一人上府正七品下中府從七品上下府從七品下別駕當為別將洵須倫翻十二年姜皎既得罪王皇后愈憂畏不安然待下有恩故無隨而譖之者上猶豫不決者纍歲后兄太子少保守一以后無子使僧明悟為后祭南北斗為于僞翻剖霹靂木書天地字及上名合而佩之霹靂木者霹靂所震之木今為張道陵之術者用霹靂木為印云有雷氣可以鎮服鬼物佩此有子當如則天皇后事覺己卯廢為庶人移別室安置貶守一潭州別駕中路賜死戶部尚書張嘉貞坐與守一交通貶台州刺史舊志台州京師東南四千一百七十七里十二年八月丙申突厥哥解頡利發還其國以其使者輕禮數不備未許婚使疏吏翻下同十二年己亥以宇文融為御史中丞融乘驛周流天下事無大小諸州先牒上勸農使上時掌翻後申中書句斷然後處決省司謂尚書都省左右司主者也處昌呂翻急於用度州縣畏融多張虛數凡得客戶八十餘萬田亦稱是融獻策括籍外羡田逃戶自占者給復五年每丁稅錢千五百州縣希旨以正田為羡編戶為客稱尺證翻增緡錢數百萬緡眉巾翻悉進入宮由是有寵議者多言煩擾不利百姓上亦令集百寮於尚書省議之公卿已下畏融恩勢不敢立異惟戶部侍郎楊瑒獨抗議以為括客免稅不利居人徵籍外田稅使百姓困弊所得不補所失未幾瑒出為華州刺史瑒雉杏翻又音暢幾居豈翻十二年壬寅以開府儀同三司宋璟為西京留守十二年冬十月丁酉謝䫻王特勒遣使入奏謝䫻國居吐火羅西南或曰漕矩吒或曰漕矩顯慶時曰訶達羅支武后改曰謝䫻東距罽賓四百里南天竺西波斯䫻于筆翻去年五月金城公主遣使詣箇失密國箇失密或曰迦濕彌邏北距勃律五百里箇失密王從臣國王借兵共拒吐蕃王遣臣入取進止上以為然賜帛遣之十二年廢后王氏卒後宮思慕后不已上亦悔之十二年十一月庚午上幸東都戊寅至東都十二年辛巳司徒申王撝薨贈諡惠莊太子十二年㣥臣屢上表請封禪上時掌翻閏月丁卯制以明年十一月十日有事于泰山時張說首建封禪之議而源乾曜不欲為之由是與說不平十二年是歲契丹王李鬱干卒弟吐干襲位卒子恤翻吐從暾入聲十三年十三年春二月庚申以御史中丞宇文融兼戶部侍郎制以所得客戶稅錢均充所在常平倉本又委使司與州縣議作勸農社使司勸農使司也使疏吏翻耕耘以時十三年乙亥更命長從宿衛之士曰彍騎彍虛郭翻引滿曰彍分隸十二衛總十二萬人為六番十三年上自選諸司長官有聲望者大理卿源光裕尚書左丞楊承令兵部侍郎寇泚等十一人為刺史命宰相諸王及諸司長官臺郎御史諸司長官省寺監之長也臺郎謂尚書郎先是改尚書為中臺臺郎及御史則三省官必皆集也長知兩翻泚且禮翻又音此供張甚盛供居用翻張知亮翻賜以御膳太常具樂御膳尚食奉御所掌天子日供之常膳太常具樂者使太常為之具樂耳若盡具太常之樂則雅樂鼓吹文武二舞及十部樂恐非宴餞之所得備也內坊內教坊也即開元二年選置宜春院之妓女妓渠綺翻章十二行本詩下有命將軍高力士六字乙十一行本同孔本同張校同退齊校同賜之光裕乾曜之從孫也從才用翻十三年三月甲午太子嗣謙更名鴻徙郯王嗣真為慶王更名潭陝王嗣升為忠王更名浚鄫王嗣真為棣王更名洽讀通鑑至此可以知前此嗣直之誤為嗣真矣更工衡翻下同鄂王嗣初更名涓鄄王嗣玄為榮王更名滉又立子琚嚴琚改涺為光王濰為儀王澐為潁王涓圭淵翻鄄吉椽翻澐音云澤為永王清為壽王洄為延王沭為盛王沭食聿翻溢為濟王濟子禮翻十三年丙申御史大夫程行湛奏周朝酷吏朝直遙翻來俊臣等二十三人情狀尤重子孫請皆禁錮傅遊藝等四人差輕子孫不聽近任從之十三年汾州刺史楊承令不欲外補舊志汾州去京師一千二百六里自言吾出守有由怏於兩翻守手又翻上聞之怒壬寅貶睦州別駕十三年張說草封禪儀獻之夏四月丙辰上與中書門下及禮官學士宴於集仙殿上曰仙者憑虛之論朕所不取賢者濟理之具朕今與卿曹合宴宜更名曰集賢殿唐六典洛陽宮南面三門中曰應天左曰興教右曰光政光政之內曰廣運其北曰明福明福之西曰崇賢門其內曰集賢殿六品以下為直學士以張說知院事右散騎常侍徐堅副之上欲以說為大學士說固辭而止十三年說以大駕東巡恐突厥乘間入寇間古莧翻議加兵守邊召兵部郎中裴光庭謀之光庭曰封禪者告成功也今將升中于天記曰因名山升中于天注云謂封泰山也非所以昭盛德也說曰然則若之何光庭曰四夷之中突厥為大比屢求和親而朝延羈縻未決許也比毗至翻今遣一使徵其大臣從封泰山使疏吏翻彼必欣然承命突厥來則戎狄君長無不皆來長知兩翻可以偃旗臥鼓高枕有餘矣枕職任翻說曰善說所不及即奏行之光庭行儉之子也裴行儉事高宗典選有識鑒為將著功名上遣中書直省袁振以他官直中書省謂之直省今之直省吏職也諭旨於突厥臚陵如翻置酒謂振曰吐蕃狗種西戎古曰犬戎故謂吐蕃為狗種本突厥奴也夷言奴猶華言臣也突厥前後求婚獨不許何也且吾亦知入蕃公主皆非天子女今豈問真僞但屢請不獲愧見諸蕃耳振許為之奏請小殺乃使其大臣阿史德頡利發入貢因扈從東巡為于僞翻從才用翻十三年五月庚寅妖賊劉定高帥衆夜犯通洛門妖於喬翻帥讀曰率悉捕斬之十三年秋八月張說議封禪儀請以睿宗配皇地祇從之十三年九月丙戌上謂宰臣曰春秋不書祥瑞惟記有年敕自今州縣毋得更奏祥瑞十三年冬十月癸丑作水運渾天成上具列宿注水激輪令其自轉晝夜一周別置二輪絡在天外綴以日月逆天而行淹速合度每天西旋一周日東行一度月行十三度十九分度之七二十九轉而日月會三百六十五轉而日周天孔穎達曰天之晝夜以日出入為分人之晝夜以昏明為限日未出以前二刻半為明日入後二刻半為昏損夜五刻以裨於晝則晝多於夜復校五刻古今曆術與太史所候皆云夏至之晝六十五刻夜三十五刻冬至之晝四十五刻夜五十五刻春分秋分之晝五十五刻疑下五字衍下同夜五十五刻此其不易之法也然今太史細候之法則較常法半刻也從春分至夏至晝漸長增九刻半夏至至於秋分所減亦如之從秋分至于冬至晝漸短減十刻半從冬至至于春分其增亦如之又於每氣之間增減刻數有多有少不可通以為率漢初未能審知率九日增減一刻和帝時霍融始請改之半在地下又立二木人每刻擊鼓每辰擊鐘機械皆藏匱中十三年辛酉車駕發東都百官貴戚四夷酋長從行酋慈由翻長知兩翻每置頓數十里中人畜被野畜許救翻被皮義翻有司輦載供具之物數百里不絶司馬法曰夏后氏謂輦曰余車殷曰胡奴車周曰輜輦輦一斧一鑿一梩一鋤周輦加二版二築又曰夏后氏二十人而輦殷十八人而輦周十五人而輦賈公彥曰輦以其束載輜重余按司馬法及賈公彥所云皆言行軍之輦此所謂輦載兼凡器物而言十一月丙戌至泰山下章十二行本下下有己丑上備法駕至山足九字乙十一行本同孔本同張校同退齊校同御馬登山考異曰實録唐曆統紀皆云備法駕登泰山開天傳信記云上將封泰山益州進白騾上親乘之不知登降之倦才下山無疾而殪諡曰白騾將軍按泰山非法駕可登白騾近怪今從舊志從才用翻獨與宰相及祠官俱登儀衛環列於山下百餘里上問禮部侍郎賀知章曰前代玉牒之文何故祕之對曰或密求神仙故不欲人見上曰吾為蒼生祈福耳為于僞翻乃出玉牒宣示㣥臣庚寅上祀昊天上帝於山上㣥臣祀五帝百神於山下之壇其餘倣乾封故事事見一百一卷高宗乾封元年辛卯祭皇地祇於社首壬辰上御帳殿受朝覲野次連幄以為殿因謂之帳殿朝直遙翻封泰山神為天齊王禮秩加三公一等古制四嶽視三公張說多引兩省吏兩省中書省門下省也禮畢推恩往往加階超入五品而不及百官中書舍人張九齡諫不聽又扈從士卒但加勳而無賜物從才用翻勳勳級也由是中外怨之十三年初隋末國馬皆為盜賊及戎狄所掠唐初才得牝牡三千匹於赤岸澤徙之隴右命太僕張萬歲掌之考異曰統紀云萬歲三世典㣥牧恩信行隴右故隴右人謂馬歲為齒為張氏諱也按公羊傳晉獻公謂荀息曰吾馬之齒則已長矣然則謂馬歲為齒有自來矣自貞觀至麟德馬蕃息及七十萬匹蕃音煩分為八坊四十八監各置使以領之唐制凡馬五千匹為上監三千匹以上為中監一千匹以上為下監麟德中置八使分總監坊秦蘭原渭四州及河曲之地凡監四十八南使有監十五西使有監十六北使有監七鹽州使有監八嵐州使有監二自京師西屬隴右有七馬坊置隴右三使領之歐陽修曰置八坊豳岐涇寧間地廣千里一曰保樂二曰甘露三曰南普閏四曰北普閏五曰岐陽六曰太平七曰宜祿八曰安定八坊之田千二百三十頃募民耕之以給芻秣八坊之馬為四十八監而馬多地狹不能容又析八監列置河西豐曠之野垂拱以後馬潛耗太半上初即位牧馬有二十四萬匹以太僕卿王毛仲為內外間廣既使少卿張景順副之至是有馬四十三萬匹牛羊稱是使疏吏翻下同稱尺證翻上之東封以牧馬數萬匹從從才用翻下宴從同色別為㣥望之如雲錦上嘉毛仲之功癸巳加毛仲開府儀同三司甲午車駕發泰山庚嚴庚改丙申幸孔子宅致祭上還至宋州宴從官於樓上刺史寇泚預焉酒酣上謂張說曰嚮者屢遣使臣分巡諸道察吏善惡今因封禪歷諸州乃知使臣負我多矣懷州刺史王丘餼牽之外一無他獻魏州刺史崔沔供張無錦繡示我以儉濟州刺史裴耀卿表數百言莫非規諫懷魏二州在河北濟州治巨野上行幸泰山往還皆得迎候車駕餼許氣翻供居用翻張知亮翻濟子禮翻則不足以告成朕常置之坐隅重直用翻坐徂臥翻且以戒左右如三人者不勞人以市恩真良吏矣顧謂寇泚曰比亦屢有以酒饌不豐訴於朕者比毗至翻饌雛戀翻又雛皖翻知卿不借譽於左右也自舉酒賜之宰臣帥㣥臣起賀樓上皆稱萬歲譽音余帥讀曰率由是以丘為尚書左丞沔為散騎侍郎耀卿為定州嚴定州改宣州刺史耀卿叔業之七世孫也尚辰羊翻沔彌兗翻散悉亶翻騎奇寄翻蕭齊東昏侯之時裴叔業叛齊入魏十二月乙巳還東都還從宣翻又如字十三年突厥頡利發辭歸上厚賜而遣之竟不許婚厥九勿翻頡奚結翻十三年王毛仲有寵於上百官附之者輻湊毛仲嫁女上問何須須求也索也臣萬事已備但未得客上曰張說源乾曜輩豈不可呼邪說讀為悅邪音耶對曰此則得之上曰知汝所不能致者一人耳必宋璟也對曰然上笑曰朕明日為汝召客為于僞翻明日上謂宰相朕奴毛仲有婚事卿等宜與諸達官悉詣其第既而日中衆客未敢舉筯待璟久之方至先執酒西向拜謝謝為君命而來非為毛仲來也遽稱腹痛而歸璟之剛直老而彌篤十三年先是契丹王李吐干與可突干復相猜忌攜公主來奔不敢復還更封遼陽王留宿衛吐從暾入聲可從刊入聲先悉薦翻復扶又翻更工衡翻車駕東巡邵固詣行在因從至泰山拜左羽林大將軍靜折軍經略大使四年契丹來降置靜折軍於松漠府以其酋長為經略大使言中國之兵不動而契丹自降以靜而折遐衝也使疏吏翻十三年上疑吏部選試不公時選期已迫御史中丞宇文融密奏請分吏部為十銓甲戌以禮部尚書蘇頲等十人掌吏部選選須絹翻下同頲他鼎翻試判將畢遽召入禁中決定吏部尚書侍郎皆不得預左庶子吳兢上表上時掌翻以為陛下曲受讒言不信有司非居上臨人推誠感物之道昔陳平邴吉漢之宰相尚不對錢穀之數不問鬬死之人陳平事見十三卷漢文帝元年邴吉事見二十六卷漢宣帝神爵三年豈得下行銓選之事乎凡選人書判並請委之有司停此十銓上雖不即從明年復故十三年是歲東都斗米十五錢青齊五錢粟三錢十三年于闐王尉遲眺陰結突厥及諸胡謀叛尉紆勿翻安西副大都護杜暹發兵捕斬之更為立王為于僞翻齊思和標點聶崇岐覆校
