body:
  text: 資治通鑑卷第一百七十七端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注隋紀一起屠維作噩己酉盡重光大淵獻辛亥凡三年隋即春秋隨國為楚所滅以為縣秦漢屬南陽郡晉屬義陽郡後分置隨郡梁曰隨州後入西魏楊忠從周太祖以功封隨國公子堅襲爵受周禪遂以隨為國號又以周齊不遑寧處去作隋以訓走故也音綽高祖文皇帝上之上諱堅姓楊氏隋書云弘農郡華陰人也漢太尉震八代孫鉉生子元壽後魏時為武川鎮司馬子孫因家焉元壽玄孫忠從周太祖起義關西實生帝自陳宣帝太建十三年至開皇九年隋有西北八年矣以通鑑紀年於此九年為隋紀年之始故書上之上開皇九年己酉五八九帝以陳高宗太建十三年受周禪至是年平陳混一天下通鑑紀事乃以開皇繫年春正月乙丑朔陳主朝會㣥臣大霧四塞朝直遙翻塞悉則翻入人鼻皆辛酸陳主昏睡至晡時乃寤日加申為晡晡奔謨翻是日賀若弼自廣陵引兵濟江若人者翻先是弼以老馬多買陳船而匿之買弊船五六十艘置於瀆內先悉薦翻艘蘇漕翻爾雅水注澮曰瀆陳人覘之以為內國無船覘丑廉翻又丑豔翻內國即中國隋避諱改曰內弼又請緣江防人每交代之際必集廣陵於是大列旗幟營幕被野幟昌志翻被皮義翻陳人以為隋兵大至急發兵為備既知防人交代其衆復散後以為常不復設備復扶又翻又使兵緣江時獵人馬喧譟故弼之濟江陳人不覺韓擒虎將五百人自橫江宵濟采石橫江浦在和州界采石磯在今太平州北三十里對岸津渡處將即亮翻下將兵同遂克之德祐甲戌十有二月沙武口之事亦猶此隋志江都郡六合縣舊曰尉氏置秦郡後齊置秦州後周改州曰方州改郡曰六合開皇初郡廢四年改尉氏曰六合張舜民曰桃葉山即今瓜步鎮之地帥讀曰率丙寅采石戍主徐子建馳啓告變丁卯召公卿入議軍旅戊辰陳主下詔曰犬羊陵縱侵竊郊畿蜂蠆有毒宜時掃定蠆丑邁翻朕當親御六師廓清八表內外並可戒嚴以驃騎將軍蕭摩訶護軍將軍樊毅中領軍魯廣達並為都督驃匹妙翻騎奇寄翻司空司馬消難湘州刺史施文慶並為大監軍去年冬陳主擢施文慶督湘州未及之鎮而隋兵渡江難乃旦翻監工銜翻陳南豫州治宣城時徙鎮姑孰白下城合白石壘唐武德移江寧縣於此名白下縣帥讀曰率重立賞格僧尼道士盡令執役尼女夷翻庚午賀若弼攻拔京口執南徐州刺史黃恪南徐州治京口秋毫不犯有軍士於民間酤酒者弼立斬之所俘獲六千餘人弼皆釋之給糧勞遣勞力到翻付以敕書令分道宣諭令力丁翻於是所至風靡樊猛在建康其子巡攝行南豫州事辛未韓擒虎進攻姑孰半日拔之執巡及其家口今太平州當塗縣南二里有姑孰溪西入大江蓋因舊鎮而得名還江南父老素聞擒虎威信來謁軍門者晝夜不絶魯廣達之子世真在新蔡與其弟世雄及所部降於擒虎侯景之亂魯悉達糾合鄉人以保新蔡魯氏遂世襲以事陳新蔡注見一百五十四卷梁世祖承聖元年降戶江翻使疏吏翻廣達時屯建康自劾詣廷尉請罪劾戶概翻又戶得翻陳主慰勞之加賜黃金遣還營勞力到翻樊猛與左衛將軍蔣元遜將青龍八十艘於白下遊奕以禦六合兵陳主以猛妻子在隋軍懼有異志欲使鎮東大將軍任忠代之任音壬令蕭摩訶徐諭猛猛不悅陳主重傷其意而止重如字難也於是賀若弼自北道韓擒虎自南道並進京口於建康為北姑孰於建康為南望風盡走弼分兵斷曲阿之衝而入曲阿本雲陽秦時人言其地有天子氣始皇鑿北坑以敗其勢截直道使阿曲改曰曲阿其地在武進丹徒二縣之間弼分兵斷其衝恐三吳之兵入救建康掎其後也斷音短蕭摩訶屯樂遊苑朝直遙翻樂音洛樊毅屯耆闍寺闍視遮翻魯廣達屯白土岡忠武將軍孔範屯寶田寺忠武將軍梁置班十九陳擬官品第四秩中二千石位次四平將軍己卯任忠自吳興入赴去年使任忠出守吳興晉孝武帝建朱雀門上有兩銅雀前直大航謂之朱雀航辛未賀若弼進據鍾山鍾山在今上元縣東北十八里輿地志古曰金陵山縣名因此又名蔣山漢末秣陵尉蔣子文討賊死此山下孫氏都秣陵以其祖諱鍾因改名蔣山晉王廣遣總管杜彥與韓擒虎合軍步騎二萬屯于新林新林浦去今建康城二十里西直白鷺洲蘄音機又音其王世積闡熙新囶人按班志廬江郡尋陽縣禹貢九江皆在南東合為大江應劭曰江自廬江尋陽分為九漢之尋陽縣在今蘄州界王世積以舟師自蘄水出九江囶古國字破陳將紀瑱於蘄口蘄水入江之口將即亮翻下同瑱他殿翻又音鎮降者相繼降戶江翻晉王廣上狀上時掌翻帝大悅宴賜㣥臣時建康甲士尚十餘萬人陳主素怯懦不達軍士懦乃臥翻又奴亂翻士讀曰事章乙十一行本正作事孔本同張校同退齋校同唯日夜啼泣臺內處分一以委施文慶處昌呂翻分扶問翻文慶既知諸將疾己恐其有功乃奏曰此輩怏怏怏於兩翻素不伏官迫此事機那可專信由是諸將凡有啓請率皆不行賀若弼之攻京口也蕭摩訶請將兵逆戰陳主不許及弼至鍾山摩訶又曰弼懸軍深入壘塹未堅塹七豔翻出兵掩襲可以必克又不許陳主召摩訶任忠於內殿議軍事忠曰兵法客貴速戰主貴持重今國家足兵足食宜固守臺城緣淮立柵北軍雖來勿與交戰分兵斷江路斷丁管翻下同無令彼信得通給臣精兵一萬金翅三百艘下江徑掩六合彼大軍必謂其渡江將士已被俘獲自然挫氣被皮義翻淮南土人與臣舊相知悉今聞臣往必皆景從師古曰景從言如景之從形也斷彼歸路則諸軍不擊自去徐州彭汴之路也復扶又翻斷丁管翻上江周羅睺等衆軍必沿流赴援周羅睺時督水軍在郢漢陳主不能從明日欻然曰欻許勿翻兵久不決令人腹煩可呼蕭郎一出擊之任忠叩頭苦請勿戰孔範又奏請作一決當為官勒石燕然孔範以竇憲破胸奴事自詭姦諂之誤國亡家如此為于偽翻下同燕於賢翻謂摩訶曰公可為我一決摩訶曰從來行陳行戶剛翻陳讀曰陳為國為身今日之事兼為妻子陳主多出金帛賦諸軍以充賞賦給與也分畀也甲申使魯廣達陳於白土岡陳讀曰陳下同居諸軍之南任忠次之樊毅孔範又次之蕭摩訶軍最在北諸軍南北亙二十里首尾進退不相知賀若弼將輕騎登山望見衆軍因馳下與所部七總管楊牙員明等將即亮翻騎奇寄翻下同員音運姓也甲士凡八千勒陳以待之陳主通於蕭摩訶之妻故摩訶初無戰意唯魯廣達以其徒力戰與弼相當隋師退走者數四弼麾下死者二百七十三人弼縱煙以自隱窘而復振窘渠隕翻復扶又翻下同陳兵得人頭皆走獻陳主求賞弼知其驕惰更引兵趣孔範趣七喻翻又讀曰趨範兵暫交即走陳諸軍顧之騎卒亂潰不可復止死者五千人員明擒蕭摩訶送於弼弼命牽斬之摩訶顏色自若弼乃釋而禮之任忠馳入臺見陳主言敗狀曰官好住好宜也住止也今南人猶有是言陳主與之金兩縢縢徒登翻以繩約物曰縢使募人出戰忠曰陛下唯當具舟楫就上流衆軍謂往就周羅睺等陳主信之敕忠出部分分扶問翻令宮人裝束以待之怪其久不至時韓擒虎自新林進軍忠已帥數騎迎降於石子岡帥讀曰率降戶江翻下同領軍蔡徵守朱雀航聞擒虎將至衆懼而潰忠引擒虎軍直入朱雀門陳人欲戰忠揮之曰老夫尚降諸軍何事軍或作君於是城內文武百司皆遁唯尚書僕射袁憲在殿中尚書令江總等數人居省中陳主謂袁憲曰我從來接遇卿不勝餘人今日但以追愧此猶劉禪之於郤正也亦是江東衣冠道盡陳主遑遽將避匿憲正色曰北兵之入必無所犯大事如此陛下去欲安之臣願陛下正衣冠御正殿依梁武帝見侯景故事事見一百六十二卷梁武帝太清三年下榻馳去曰鋒刃之下未可交當吾自有計從宮人十餘出後堂景陽殿將自投于井憲苦諫不從後閣舍人夏侯公韻以身蔽井夏戶雅翻陳主與爭久之乃得入既而軍人窺井呼之不應欲下石乃聞叫聲以繩引之驚其太重及出乃與張貴孔貴嬪同束而上祝穆曰景陽井在法寶寺或云白蓮閣下有小池面方丈餘或云在保寧寺覽輝亭側舊傳云欄有石脈以帛拭之作胭脂痕一名胭脂井又名辱井梁制有殿中舍人守舍人陳制殿中舍人為三品蘊位守舍人為三品勳位在九品之外後閣舍人蓋殿中舍人之守後閣者處昌呂翻太子深年十五閉閣而坐舍人孔伯魚侍側此太子舍人也梁制太子中舍人四人掌其坊之禁令舍人十六人掌文記中舍人八班舍人三班陳制中舍人六百石舍人亦如之深安坐勞之曰勞力到翻戎旅在塗不至勞也軍士咸致敬焉時陳人宗室王侯在建康者百餘人陳主恐其為變皆召入令屯朝堂使豫章王叔英總督之又陰為之備及臺城失守相帥出降朝直遙翻下同守式又翻帥讀曰率降戶江翻賀若弼乘勝至樂遊苑樂音洛魯廣達猶督餘兵苦戰不息所殺獲數百人會日暮乃解甲面臺再拜慟哭謂衆曰我身不能救國負罪深矣士卒皆流涕歔欷歔音虛欷音希又許既翻遂就擒諸門衛皆走弼夜燒北掖門入聞韓擒虎已得陳叔寶呼視之叔寶惶懼流汗股栗向弼再拜弼謂之曰小國之君當大國之卿拜乃禮也入朝不失作歸命侯朝直遙翻孫晧降晉封歸命侯無勞恐懼既而恥功在韓擒虎後與擒虎相詬挺刃而出詬苦候翻罵也挺拔也欲令蔡徵為叔寶作降箋命乘騾車歸己騾盧戈翻事不果弼置叔寶於德教殿以兵衛守高熲先入建康熲子德弘為晉王廣記室熲居永翻隋制諸王記室參軍在録事功曹之下廣使德弘馳詣熲所令留張麗華熲曰昔太公蒙面以斬妲己妲己有蘇氏之美女商紂嬖之武王勝殷殺紂並誅妲己妲當割翻己音紀乃斬之於青溪德弘還報廣變色曰昔人云無德不報詩大雅抑之辭由是恨熲使高熲留麗華而廣納之文帝必怒安得成他日奪嫡之謀是誠宜德之也顧恨之邪史為廣殺熲張本丙戌晉王廣入建康以施文慶受委不忠曲為諂佞以蔽耳目沈客卿重賦厚斂以悅其上與太市令陽慧朗刑法監徐析尚書都令史暨慧皆為民害斬於石闕下以謝三吳斂力贍翻暨戟乙翻陽慧朗一作惠朗暨慧之下逸景字使高熲與元帥府記室裴矩帥所類翻收圖籍封府庫資財一無所取天下皆稱廣以為賢矩讓之之弟子也裴讓之見一百五十八卷梁武帝大同四年廣以賀若弼先期決戰違軍令收以屬吏先悉薦翻屬之欲翻上驛召之詔廣曰平定江表弼與韓擒虎之力也賜物萬段又賜弼與擒虎詔美其功開府儀同三司王頒僧辨之子夜發陳高祖陵焚骨取灰投水而飲之報讎也陳高祖殺僧辨事見一百六十六卷梁敬帝紹泰元年歸罪於晉王廣廣以聞上命赦之詔陳高祖世祖高宗陵總給五戶分守之上遣使以陳亡告許善心使疏吏翻善心衰服號哭於西階之下藉草東向坐三日去年陳遣善心來聘留於客館不遣還事見上卷西階賓階也衰服藉草喪禮也衰叱雷翻號戶刀翻藉慈夜翻唁魚戰翻弔生曰唁明日有詔就館拜通直散騎常侍散悉亶翻騎奇寄翻衣單復具曰襲入房改服改衰服服賜服北面立復扶又翻垂泣再拜受詔明日乃朝朝直遙翻伏泣於殿下悲不能興上顧左右曰我平陳國唯獲此人既能懷其舊君即我之誠臣也敕以本官直門下省通直散騎常侍屬門下省今敕善心以本官直門下省何也按唐六典晉始有門下省散騎常侍雖隸門下別為一省潘嶽云寓直散騎之省是也此隋所以命許善心以通直散騎常侍直門下省歟陳水軍都督周羅睺與郢州刺史荀法尚守江夏江夏陳郢州治所夏戶雅翻不得進漢水入江之口即沔口也陳荊州刺史陳慧紀遣南康內史呂忠肅屯岐亭按楊素傳忠肅屯岐亭正據江峽則岐亭在西陵峽口也考異曰隋書作呂仲肅南史作呂肅今從陳書按水經江水出巫峽過秭歸夷陵徑流頭狼尾灘而後東徑西陵峽去年冬楊素破戚昕其舟師已過狼尾而東呂忠肅所據者蓋西陵峽也當從楊素傳作江峽為通綴鐵鎖三條考異曰南史作五條今從隋書忠肅竭其私財以充軍用楊素劉仁恩奮兵擊之四十餘戰忠肅守險力爭隋兵死者五千餘人陳人盡取其鼻以求功賞既而隋師屢捷獲陳之士卒三縱之忠肅棄柵而遁素徐去其鎖去羌呂翻忠肅復據荊門之延洲素遣巴蛋千人蛋亦蠻也居巴中者曰巴蛋此水蛋之習於用舟者也蛋徒旱翻以拍竿碎其十餘艦艘蘇遭翻艦戶黯翻遂大破之俘甲士二千餘人忠肅僅以身免陳信州刺史顧覺屯安蜀城棄城走梁置信州於巴東西魏取之其地時屬隋故陳信州刺史屯於安蜀城公安陳荊州治所引兵東下於是巴陵以東無復城守者陳慧紀帥將士三萬人樓船千餘艘沿江而下復扶又翻帥讀曰率下同將即亮翻下同欲入援建康為秦王俊所拒不得前是時陳晉熙王叔文罷湘州還至巴州慧紀推叔文為盟主巴州治巴陵俊遣使迎勞之帥讀曰率降戶江翻使疏吏翻下同勞力到翻會建康平晉王廣命陳叔寶手書招上江諸將使樊毅詣周羅睺陳慧紀子正業詣慧紀諭指時諸城皆解甲羅睺乃與諸將大臨三日將即亮翻臨力浸翻放兵散然後詣俊降陳慧紀亦降上江皆平楊素下至漢口與俊會王世積在蘄口聞陳已亡章甲十一行本亡下有移書二字乙十一行本同孔本同張校同告諭江南諸郡於是江州司馬黃偲棄城走蘄音機又音其偲音思豫章諸郡太守皆詣世積降守式又翻癸巳詔遣使者巡撫陳州郡二月乙未廢淮南行臺省晉王廣於時將凱還也蘇威奏請五百家置鄉正使治民簡辭訟治直之翻下同李德林以為本廢鄉官判事為其里閭親識剖斷不平為其于偽翻斷丁亂翻今令鄉正專治五百家恐為害更甚且要荒小縣有不至五百家者令力丁翻要一遙翻豈可使兩縣共管一鄉帝不聽丙申制五百家為鄉置鄉正一人百家為里置里長一人長知兩翻陳吳州刺史蕭瓛能得物情陳亡吳人推瓛為主瓛戶官翻右衛大將軍武川宇文述帥行軍總管元契張默言等討之落叢公燕榮以舟師自東海至章甲十一行本至下有亦受述節度五字乙十一行本同孔本同張校同隋書宇文述代郡武川人地理志馬邑郡善陽縣大業初置代郡順政郡鳴水縣西魏置落叢縣及落叢郡順政西魏之興州也東海郡海州燕榮舟師自海道入湖可至吳州陳置吳州於吳郡燕因肩翻陳永新侯陳君範自晉陵奔瓛沈約志永新縣吳立屬安成太守隋廢安成郡為安復縣晉陵與吳接壤述軍且至瓛立柵於晉陵城東留兵拒述遣其將王褒守吳州自義興入太湖欲掩述後述進破其柵回兵擊瓛大破之柵測革翻將即亮翻又遣兵別道襲吳州王褒衣道士服棄城走衣於既翻瓛以餘衆保包山包山在太湖中其地西北距吳縣百二十里又名洞庭山四面皆水地占三鄉環四十里土宜橘柚瓛將左右數人匿民家為人所執述進至奉公埭燕因肩翻將音如字領也攜也埭徒蓋翻陳東揚州刺史蕭巖以會稽降與瓛皆送長安斬之以巖等驅江陵士女降陳也事見上卷陳長城公禎明元年楊素之下荊門也遣別將龐暉將兵略地南至湘州城中將士莫有固志章甲十一行本志下有刻日請降四字乙十一行本同孔本同張校同將即亮翻下同刺史嶽陽王叔慎年十八置酒會文武僚吏酒酣叔慎歎曰君臣之義盡於此乎按陳湘州刺史陳叔文既去鎮施文慶實代之阻隋兵不及至湘州必有守之者但未知叔慎何時所命耳湘州助防遂興侯正理在坐遂興縣侯也沈約志廬陵郡有遂興縣吳立曰新興晉武帝太康元年更名長知兩翻坐徂臥翻主辱臣死諸君獨非陳國之臣乎今天下有難難乃旦翻實致命之秋也縱其無成猶見臣節青門之外有死不能召平秦時東陵侯秦亡為民種瓜青門外正理自謂陳亡之後不能編於民伍以求活不可猶豫後應者斬衆咸許諾乃刑牲結盟仍遣人詐奉降書於龐暉降戶江翻暉信之克期入城叔慎伏甲待之暉至執之以徇並其衆皆斬之叔慎坐于射堂招合士衆數日之中得五千人衡陽太守樊通武州刺史塢居業皆請舉兵助之隋志長沙郡衡山縣舊置衡陽郡武陵郡舊置武州塢姓其先仕晉為塢大夫子孫因以為氏塢烏古翻守式又翻與行軍總管劉仁恩共擊之叔慎遣其將陳正理與樊通拒戰將即亮翻兵敗胄乘勝入城禽叔慎仁恩破塢居業於橫橋亦擒之俱送秦王俊斬於漢口嶺南未有所附數郡共奉高涼郡太夫人洗氏為主高涼縣置高涼郡洗音銑又音線保境拒守詔遣柱國韋洸等安撫嶺外陳豫章太守徐璒據南康拒之徐璒自豫章退保南康南康郡治贛縣洸古黃翻守式又翻璒都滕翻晉王廣遣陳叔寶遺夫人書遺于季翻諭以國亡使之歸隋夫人集首領數千人盡日慟哭遣其孫馮魂帥衆迎洸洗氏嫁馮融見一百六十三卷梁簡文帝大寶元年帥讀曰率入至廣州説諭嶺南諸州皆定説式芮翻考異曰隋帝紀十年八月壬申遣洸等巡撫嶺南百越皆服按陳以九年正月亡至來年八月並閏計二十一月豈有洗氏猶不知者洗氏傳又云晉王遣陳主遺夫人書則事在九年三月前也帝紀所云蓋謂百越已服奏到朝廷之日也表馮魂為儀同三司册洗氏為宋康郡夫人宋文帝元嘉九年分高涼立宋康郡隋志高涼郡杜原縣舊有永寧宋康二郡敻之子也韋敻見一百六十七卷陳高祖永定三年敻休正翻衡州司馬任王褱勸都督王勇據嶺南隋志梁置衡州於廣州含洭縣任音壬王褱古回翻立以為帝勇不能用以所部來降降戶江翻王褱棄官去王褱忠之弟子也任王褱志趣如此宜其能自表見於唐元也蕭摩訶兒豚犬耳於是陳國皆平陳高祖受梁禪歲在丁丑至是而亡凡五主三十三年郡一百縣四百按隋志陳境當時有揚東揚南徐吳閩豐湘巴武江郢廣東衡衡高羅新瀧建成桂東寧靜南定越南合崖安交愛凡三十州並平蕩耕墾更於石頭置蔣州以蔣山名州也晉王廣班師留王韶鎮石頭城委以後事三月己巳陳叔寶與其王公百司發建康詣長安大小在路五百里纍纍不絶帝命權分長安士民宅以俟之內外修整遣使迎勞陳人至者如歸使疏吏翻勞力到翻下同夏四月辛亥帝幸驪山驪山在新豐縣乙巳巳似應作卯奏凱樂而入也陳叔寶及諸王侯將相並乘輿服御天文圖籍等以次行列將即亮翻相息亮翻乘繩證翻下同行戶剛翻仍以鐵騎圍之騎奇寄翻從晉王廣秦王俊入列于殿庭拜廣為太尉賜輅車乘馬袞冕之服玄圭白璧丙辰帝坐廣陽門觀廣陽門之觀闕也觀古玩翻及太子諸王二十八人司空司馬消難以下至尚書郎凡二百餘人難乃旦翻帝使納言宣詔勞之勞力到翻次使內史令宣詔責以君臣不能相輔乃至滅亡叔寶及其㣥臣並愧懼伏地屏息不能對屏必郢翻既而宥之初武元帝迎司馬消難見一百六十七卷陳高祖永定二年皇考忠諡武元帝情好甚篤好呼到翻帝每以叔父禮事之及平陳消難至特免死配為樂戶二旬而免猶以舊恩引見尋卒於家見賢遍翻卒子恤翻庚章甲十一行本庚上有魯廣達追傷本朝淪覆得疾不療憤慨而卒十七字乙十一行本同孔本同張校同戌帝御廣陽門廣陽門大興宮城正南門也唐六典曰隋曰廣陽門開皇二年作仁壽元年改曰昭陽門唐武德元年改曰順天門神龍元年改承天門自門外夾道列布帛之積將即亮翻積子賜翻凡指所聚之物曰積則去聲取物而積疊之則入聲達于南郭班賜各有差凡用三百餘萬段故陳之境內給復十年復方目翻餘州免其年租賦樂安公元諧進曰陛下威德遠被被皮義翻臣前請以突厥可汗為候正厥九勿翻可從刊入聲汗音寒陳叔寶為令史今可用臣言矣帝曰朕平陳國本以除逆非欲誇誕公之所奏殊非朕心突厥不知山川何能警候叔寶昏醉寧堪驅使諧默然而退辛酉進楊素爵為越公按隋書楊素自清河郡公進封郢國公素言逆人王誼前封於郢不願與之同改封越公玄獎為清河郡公賜物萬段粟萬石命賀若弼登御坐坐徂臥翻賜物八千段加位上柱國進爵宋公仍各加賜金寶及陳叔寶妹為妾賀若弼韓擒虎爭功於帝前弼曰臣在蔣山死戰破其鋭卒擒其驍將驍堅堯翻將即亮翻下同震揚威武遂平陳國韓擒虎略不交陳陳讀曰陳豈臣之比擒虎曰本奉明旨令臣與弼同時合勢以取偽都弼乃敢先期先悉薦翻逢賊遂戰致令將士傷死甚多臣以輕騎五百兵不血刃直取金陵降任蠻奴騎奇寄翻降戶江翻任音壬執陳叔寶據其府庫傾其巢穴弼至夕方扣北掖門臣啓關而納之斯乃救罪不暇安得與臣相比帝曰二將俱為上勳於是進擒虎位上柱國賜物八千段有司劾擒虎放縱士卒淫汙陳宮劾戶概翻又戶得翻汙烏路翻坐此不加爵邑加高熲上柱國進爵齊公熲居迥翻熲自勃海郡公進爵齊國公賜物九千段帝勞之曰公伐陳後人言公反朕已斬之君臣道合非青蠅所能間也勞力到翻青蠅以諭讒言間古莧翻帝從容命熲與賀若弼論平陳事從千容翻熲曰賀若弼先獻十策後於蔣山苦戰破賊臣文吏耳焉敢與大將論功焉於虔翻將即亮翻下同帝大笑嘉其有讓帝之伐陳也使高熲問方略於上儀同三司李德林以授晉王廣至是帝賞其功授柱國封郡公賞物三千段已宣敕訖或説高熲曰今歸功於李德林諸將必當憤惋説輸芮翻惋烏貫翻且後世觀公有若虛行熲入言之乃止以秦王俊為揚州總管四十四州諸軍事鎮廣陵晉王廣還並州晉王廣之戮陳五佞也五佞謂施文慶沈客卿陽慧朗徐析暨慧景故得免及至長安事並露乙未帝暴其過惡投之邊裔以謝吳越之人瑳刻薄貪鄙忌害才能儀傾巧側媚獻二女以求親昵散悉亶翻騎奇寄翻瑳倉何翻昵尼質翻發言邪諂故同罪焉帝給賜陳叔寶甚厚數得引見班同三品每預宴恐致傷心為不奏吳音數所角翻見賢遍翻為于偽翻後監守者奏言叔寶云既無秩位每預朝集願得一官號帝曰叔寶全無心肝監者又言叔寶常醉監古銜翻朝直遙翻罕有醒時帝問飲酒幾何對曰與其子弟日飲一石帝大驚使節其酒既而曰任其性不爾何以過日嗚呼此陳叔寶所以得死於枕席也恐其在京城為非乃分置邊州給田業使為生歲時賜衣服以安全之詔以陳尚書令江總為上開府儀同三司僕射袁憲驃騎蕭摩訶領軍任忠皆為開府儀同三司射寅謝翻驃匹妙翻騎奇寄翻任音壬吏部尚書吳興姚察為祕書丞上嘉袁憲雅操下詔以為江表稱首授昌州刺史隋志舂陵郡後魏置南荊州西魏改曰昌州擢拜主爵侍郎散悉亶翻騎奇寄翻隋志主爵侍郎屬吏部尚書平陳之初我悔不殺任蠻奴受人榮祿兼當重寄不能橫尸徇國乃云無所用力與弘演納肝何其遠也衛懿公與狄人戰于熒澤為狄人所殺弘演納肝以殉之帝見周羅睺慰諭之許以富貴羅睺垂泣對曰臣荷陳氏厚遇荷下可翻本朝淪亡無節可紀朝直遙翻下同得免於死陛下之賜也何富貴之敢望賀若弼謂羅睺曰聞公郢漢捉兵若人者翻捉把也即知揚州可得王師利涉果如所量量音良羅睺曰若得與公周旋勝負未可知周羅睺何以得此於賀若弼哉史家溢美耳拜上儀同三司先是陳將羊翔來降先悉薦翻降戶江翻伐陳之役使為鄉導鄉讀曰嚮位至上開府儀同三司班在羅睺上韓擒虎於朝堂戲之曰不知機變乃立在羊翔之下能無愧乎朝直遙翻羅睺曰昔在江南久承令問令力定翻美也謂公天下節士今日所言殊非所望擒虎有愧色帝之責陳君臣也陳叔文獨欣然有得色得色自得其意而形於色復扶又翻昔在巴州已先送款乞知此情望異常例帝雖嫌其不忠而欲懷柔江表乃授叔文開府儀同三司拜宜州刺史宜州置於京兆華原縣初陳散騎常侍韋鼎聘于周韋鼎傳陳太建中聘周散悉亶翻騎奇寄翻謂帝曰公當大貴貴則天下一家歲一周天歲星木星也十二年一周天質如字陳長城公即位改元至德盡賣田宅大匠卿毛彪問其故鼎曰江東王氣盡於此矣王于況翻又音如字吾與爾當葬長安及陳平上召鼎為上儀同三司鼎睿之孫也韋睿著功名於梁武帝之時壬戌詔曰今率土大同含生遂性太平之法方可流行凡我臣民澡身浴德家家自修人人克念書曰惟狂克念作聖不可不戢刑可助化不可專行禁衛九重之餘重直龍翻鎮守四方之外戎旅軍器皆宜停罷世路既夷㣥方無事武力之子俱可學經民間甲仗悉皆除毀頒告天下咸悉此意賀若弼撰其所畫策上之若人者翻撰士免翻述也上時掌翻謂為御授平陳七策帝弗省省悉井翻視也曰公欲發揚我名我不求名公宜自載家傳傳直戀翻弼位望隆重兄弟並封郡公為刺史列將家之珍玩不可勝計將即亮翻勝音升婢妾曳羅綺者數百羅交眼綺細綾其後突厥來朝厥九勿翻朝直遙翻上謂之曰汝聞江南有陳國天子乎對曰聞之上命左右引突厥詣韓擒虎前曰此是執得陳國天子者擒虎厲色顧之突厥惶恐不敢仰視左衛將軍龐晃等短高熲於上上怒皆黜之龐晃自結納於潛躍之辰與上情契甚密而與高熲有隙與廣平王雄挾舊屢言熲之短故皆被黜熲居永翻因謂熲曰獨孤公猶鏡也每被磨瑩皎然益明初熲父賓為獨孤信僚佐賜姓獨孤氏故上常呼為獨孤而不名按獨孤信之誅妻子徙蜀獨孤后以賓父之故吏每往來其家熲之遭遇豈專以才略哉外得君而內蒙君母親禮也及夫外則見忌於君內則失愛於君母隨見疏棄君臣之際可無謹乎樂安公元諧性豪俠有氣調調徒釣翻少與上同學甚相愛及即位纍歷顯仕諧好排詆不能取媚左右少詩照翻好呼到翻與上柱國王誼善誼誅王誼誅見一百七十六卷陳長城公至德三年或告諧與從父弟上開府儀同三司滂臨澤侯田鸞隋志毗陵郡義興縣舊有臨澤縣從才用翻章甲十一行本祈作祁乙十一行本同孔本同下同緒等謀反祈姓出於黃帝黃帝之子得姓者十四人祈其一也又曰晉獻侯四世孫曰奚食邑於祈子孫以為氏奏諧謀令祈緒勒黨項兵斷巴蜀下遐嫁翻令力丁翻斷音短又諧嘗與滂同謁上諧私謂滂曰我是主人殿上者賊也因令滂望氣滂曰彼雲似蹲狗走鹿蹲慈尊翻不如我輩有福德雲上大怒諧滂鸞緒並伏誅考異曰李德林傳云德林以梁士彥元諧頻有逆意江南抗衡上國乃著天命論上之諧傳云平陳後數歲人告諧謀反按諧請以叔寶為內史則陳亡時猶在楊雄方用事諧欲譖去之則雄未為司空故附於此按內史當依正文作令史按通鑑上正文亦書元諧言請以陳叔寶為令史按內史隋之要官元諧安敢請以陳叔寶為是官邪閏月己卯以吏部尚書蘇威為右僕射射寅謝翻六月乙丑以荊州總管楊素為納言朝野皆稱封禪朝直遙翻下同稱當作請又竊謂稱舉也言朝野舉封禪事為言也秋七月丙午詔曰豈可命一將軍除一小國遐邇注意便謂太平以薄德而封名山用虛言而干上帝非朕攸聞而今而後言及封禪宜即禁絶左衛大將軍廣平王雄貴寵特盛與高熲虞慶則蘇威稱為四貴雄寬容下士下遐嫁翻朝野傾屬屬之欲翻上惡其得衆惡烏路翻陰忌之不欲其典兵馬八月壬戌以雄為司空實奪之權雄既無職務乃杜門不通賓客雄以是能保其身於猜忌之朝帝踐阼之初柱國沛公鄭譯請修正雅樂詔太常卿牛弘國子祭酒辛彥之博士何妥等議之積年不決妥他果翻譯言古樂十二律旋相為宮各用七聲世莫能通譯因龜茲人蘇祗婆善琵琶始得其法推演為十二均八十四調以校太樂所奏例皆乖越譯又於七音之外更立一聲謂之應聲作書宣示朝廷隋志譯云考尋樂府鍾石律呂皆有宮商角徵羽變宮變徵之名七聲之內三聲乖應每恆求訪終莫能通先是周武帝時有龜茲人蘇祗婆從突厥皇后入國善胡琵琶聽其所奏一均之中間有七聲因而問之調有七種以其七調勘校七聲冥若合符一曰婆陀力華言平聲即宮聲也二曰雞識華言長聲即南呂聲也三曰沙識華言質直聲即角聲也四曰沙侯加濫華言應聲即變徵聲也五曰沙臘華言應和聲即徵聲也六曰般贍華言五聲即羽聲也七曰俟利竹建華言斛牛聲即變宮聲也譯因習而彈之始得七聲之正然其就此七調又有五旦之名旦作七調以華言譯之旦者則謂均也其聲亦應黃鍾太簇林鍾姑洗五均已外七律更無調聲譯遂因其所捻琵琶絃柱相飲為均推演其聲更立七均合成十二以應十二律律有七音音立一調故成七調十二律合八十四調旋轉相交盡皆和合仍以其聲考校太樂所奏林鍾之宮應用林鍾為宮乃用黃鍾為宮應用南呂為商乃用太簇為商應用應鍾為角乃取姑洗為角故林鍾一宮七聲三聲並戾其十一宮七十七音例皆乖越莫有通者又以編懸有八因作八音之樂七音之外更立一聲謂之應聲作書二十餘篇以明其指龜茲音丘慈賢曰今音丘勿翻茲音沮惟翻蓋急言耳時人以音律久無通者非譯夔一朝可定帝素不悅學而牛弘不精音律何妥自恥宿儒反不逮譯等常欲沮壞其事沮在呂翻壞音怪乃立議非十二律旋相為宮及七調調徒釣翻下同競為異議各立朋黨或欲令各造樂待成擇其善者而從之妥恐樂成善惡易見易弋豉翻乃請帝張樂試之先白帝云黃鍾象人君之德及奏黃鍾之調帝曰滔滔和雅甚與我心會妥因奏止用黃鍾一宮不假餘律帝悅從之時又有樂工萬寶常萬姓也孟子門人有萬章譯等為黃鍾調成奏之帝召問寶常寶常曰此亡國之音也帝不悅寶常請以水尺為律以調樂器上從之以調如字其聲率下鄭譯調二律損益樂器不可勝紀勝音升其聲雅淡不為時人所好好呼到翻太常善聲者多排毀之蘇夔尤忌寶常夔父威方用事凡言樂者皆附之而短寶常寶常樂竟為威所抑寢不行及平陳獲宋齊舊樂器並江左樂工帝令廷奏之歎曰此華夏正聲也乃調五音為五夏二舞登歌房內十四調賓祭用之五夏昭夏皇夏諴夏需夏肆夏二舞文武二舞登歌升堂上而歌匏竹在下貴人聲也帝龍潛時倚琵琶作歌二首名曰地厚天高託言夫妻之義因即取之為房內曲十四調後周故事懸鍾磬法七正七倍合為十四蓋準變宮變徵凡為七聲有正有倍為十四也夏戶雅翻時天下既一異代器物皆集樂府牛弘奏中國舊音多在江左典午南渡未能備樂石氏之亡樂人頗有自鄴而南者苻堅淮淝之敗晉始獲樂工備金石慕容垂破西燕盡獲苻氏舊樂子寶喪敗其鍾律令李佛等將太樂細伎奔慕容德德子超獻之姚秦以贖其母宋武平姚泓收歸建康故云多在江左克荊州見一百六十五卷梁元帝承聖三年史傳相承傳直戀翻以為合古請加修緝以備雅樂其後魏之樂及後周所用雜有邊裔之聲皆不可用請悉停之冬十二月章甲十一行本月下有甲子二字乙十一行本同孔本同詔弘與許善心姚察及通直郎虞世基參定雅樂按煬帝始置通直郎從六品屬謁者臺虞世基傳云以通直郎直內史省其通直散騎侍郎歟品從五荔之子也虞荔見一百六十八卷陳世祖天嘉二年荔力制翻己巳以黃州總管周法尚為永州總管隋志永安郡後齊置衡州開皇五年改曰黃州零陵郡平陳初置永州總管府給黃州兵三千五百人為帳內陳桂州刺史錢季卿等皆詣法尚降始安郡梁置桂州降戶江翻鬱林郡梁置定州不受命法尚擊斬之以駕部侍郎狄道辛公義為岷州刺史隋志駕部侍郎屬兵部尚書狄道縣屬金城郡臨洮郡溢樂縣西魏置岷州一人病疫闔家避之病者多死公義命皆輿置己之聽事輿羊茹翻暑月病人或至數百聽廊皆滿聽與廳同晝夜處其間處昌呂翻以秩祿具醫藥身自省問省悉景翻病者既愈乃召其親戚諭之曰死生有命豈能相染若相染者吾死久矣皆慚謝而去其後人有病者爭就使君使疏吏翻其家親戚固留養之始相慈愛風俗遂變後遷並州刺史下車先至獄中露坐親自驗問十餘日間決遣咸盡方還聽事受領新訟事皆立決若有未盡必須禁者公義即宿聽事終不還閣還音如字又從宣翻或諫曰公事有程使君何自苦公義曰刺史無德不能使民無訟豈可禁人在獄而安寢於家乎罪人聞之咸自款服款誠也款服猶言誠服也鄉閭父老遽曉之曰此小事何忍勤勞使君訟者多兩讓而止使疏吏翻十年庚戌五九春正月乙未以皇孫昭為河南王楷為華陽王華戶化翻昭廣之子也二月章甲十一行本月下有庚申二字乙十一行本同孔本同張校同上幸晉陽命高熲居守熲居永翻守手又翻夏四月辛酉至自晉陽成安文子李德林成安縣名文諡也子爵也成安縣屬魏郡論議好勝好呼到翻同列多疾之由是以佐命元功十年不徙級德林數與蘇威異議高熲常助威奏德林狠戾數所角翻狠戶墾翻上多從威議上賜德林莊店使自擇之德林請逆人高阿那肱衛國縣市店高阿那肱與王謙舉兵誅衛國縣本漢觀縣屬東郡光武改曰衛國魏收地形志屬頓丘郡隋開皇六年改曰觀城屬武陽郡及幸晉陽店人訴稱高氏強奪民田於內造店賃之賃乃禁翻妄奏自入司農卿李圓通等復助之曰此店收利如食千戶請計日追贓上自是益惡之復扶又翻下同惡烏路翻虞慶則等奉使關東巡省還使疏吏翻省悉景翻還從宣翻又如字皆奏稱鄉正專理辭訟黨與愛憎公行貨賄不便於民上令廢之德林曰茲事臣本以為不可然置來始爾置鄉正見上年政令不一朝成暮毀深非帝王設法之義臣望陛下自今㣥臣於律令輒欲改張即以軍法從事不然者紛紜未已上遂發怒大詬云爾欲以我為王莽邪上以權數得國猜疑㣥下以王莽篡漢變更法令而亡疑德林以況己故怒詬苦候翻邪音耶德林稱父為太尉咨議以取贈官給事黃門侍郎猗氏陳茂等密奏德林父終於校書妄稱咨議上甚銜之德林之父蓋仕於魏齊之間後齊之制公府咨議參軍從第四品校書郎第九品猗氏縣屬河東郡上因數之數所具翻又所主翻曰公為內史典朕機密比不可豫計議者比毗至翻以公不弘耳寧自知乎又罔冒取店妄加父官朕實忿之而未能發今當以一州相遣耳因出為湖州刺史烏程縣舊置吳興郡隋置湖州宋白曰湖州古防風氏之國漢烏程縣之地隋置湖州因太湖而名長安東南三千四百四十一里臣不敢復望內史令請但預散參復扶又翻又音如字散參謂散官無職務而預朝參者散悉亶翻上不許遷懷州刺史河內郡舊置懷州卒子恤翻李圓通本上微時家奴有器幹及為隋公以圓通及陳茂為參佐由是信任之梁國之廢也梁國廢見上卷陳長城公禎明元年莊有識度博學善辭令明習典故雅達政事上及高熲章甲十一行本熲下有蘇威二字乙十一行本同孔本同張校同皆重之與陳茂同僚不能降意茂譖之於上上稍疏之出為饒州刺史隋志鄱陽郡梁置吳州陳廢隋平陳置饒州上性猜忌不悅學既任智以獲大位因以文法自矜明察臨下恆令左右覘視內外有過失則加以重罪恆戶登翻覘丑廉翻又丑豔翻又患令史贓汙私使人以錢帛遺之遺于季翻得犯立斬每於殿庭捶人一日之中或至數四嘗怒問事揮楚不甚問事者行杖之人也楚荊也以之箠人箠止蕊翻尚書左僕射高熲治書侍御史柳彧等諫治直之翻彧於六翻以為朝堂非殺人之所殿廷非決罰之地上不納熲等乃盡詣朝堂請罪朝直遙翻熲居永翻上顧謂領左右都督田元曰後齊之制有領左右府將軍之下置正副都督隋蓋因之煬帝改領左右府為備身府吾杖重乎元曰重帝問其狀元舉手曰陛下杖大如指捶人三十者比常杖數百故多死捶止蕊翻下同上不懌乃令殿內去杖去羌呂翻欲有決罰各付所由所由猶言所主也隋志江都郡山陽縣舊置山陽郡開皇十二年置楚州隋制州置刺史長史司馬參軍事行參軍上寵高熲過甚上言之上時掌翻上大怒命杖之而殿內無杖遂以馬鞭捶殺之捶止蕊翻自是殿內復置杖未幾怒甚又於殿廷殺人復扶又翻幾居豈翻兵部尚書統兵部職方駕部庫部四曹各置侍郎竟於殿廷殺之上亦尋悔宣慰馮基而怒㣥臣之不諫者五月乙未詔曰魏末喪亂軍人權置坊府元魏之季兵制有六坊後齊因之亦曰六府喪息浪翻居處無定處昌呂翻家無完堵地罕包桑包桑多根植桑至於根多民安其居之驗凡是軍人可悉屬州縣墾田籍帳一與民同軍府統領宜依舊式罷山東河南及北方緣邊之地新置軍府六月辛酉制民年五十免役收庸秋七月癸卯以納言楊素為內史令冬十一月辛丑上祀南郊隋南郊為壇於國之南太陽門外道西一里去宮十里壇高七尺廣四丈孟春上辛祠所感帝赤熛怒於其上以太祖武元皇帝配江表自東晉已來刑法疏緩世族陵駕寒門平陳之後牧民者盡更變之更工衡翻蘇威復作五教使民無長幼悉誦之士民嗟怨民間復訛言隋欲徙之入關復扶又翻遠近驚駭於是婺州汪文進越州高智慧蘇州沈玄懀皆舉兵反隋志東陽郡平陳置婺州會稽郡梁置東揚州陳改曰吳州平陳改吳州後改越州吳郡陳置吳州平陳改蘇州懀烏外翻署置百官樂安蔡道人蔣山李㥄章甲十一行本㥄作稜乙十一行本同孔本同饒州吳世華溫州沈孝徹泉州王國慶杭州楊寶英交州李春等皆自稱大都督考隋志無樂安下曰陳之故境則當於陳境求之沈約志鄱陽太守有樂安縣吳立新唐志台州有樂安縣唐初析臨海置以下文江汪蓋台州之樂安蔣山在蔣州江寧縣永嘉郡開皇九年置處州十二年改栝州唐高宗上元元年始析栝州之永嘉安固置溫州安陸郡京山縣有溫州非陳境當是永嘉之溫州史追書耳建安郡陳置閩州平陳改曰泉州餘杭郡平陳置杭州交趾郡舊曰交州㥄力膺翻攻陷州縣陳之故境大抵皆反大者有衆數萬小者數千共相影響執縣令或抽其腸或臠其肉食之曰更能使儂誦五教邪邪音耶詔以楊素為行軍總管以討之素將濟江使始興麥鐵杖戴束藁夜浮渡江隋志南海郡始興縣南齊置東衡州平陳權置廣州總管府姓苑高要始興有麥姓還而復往為賊所擒覘丑廉翻又丑豔翻復扶又翻還從宣翻遣兵仗三十人防之鐵杖取賊刀亂斬防者殺之皆盡割其鼻懷之以歸素大奇之奏授儀同三司素帥舟師自楊子津入楊子津在今真州楊子縣南帥讀曰率破之京口今鎮江府帥所類翻下同皆平之隋志晉陵無錫二縣皆屬常州考異曰北史楊素傳作葉皓今從隋書素追擒之高智慧據浙江東岸為營周亙百餘里船艦被江艦戶黯翻被皮義翻素擊之子總管南陽來護兒子總管裨將也領兵屬總管南陽郡舊置荊州開皇初改為鄧州姓苑郲子姓商之支孫食采於郲因以為氏後避難去邑漢功臣表有軑侯來蒼吳人輕鋭利在舟楫必死之賊難與爭鋒公宜嚴陳以待之陳讀曰陳勿與接刃請假奇兵數千潛渡江掩破其壁使退無所歸進不得戰此韓信破趙之策也韓信破趙見十卷漢高帝三年護兒以輕舸數百舸古我翻直登江岸襲破其營因縱火煙焰漲天賊顧火而懼素因縱兵奮擊大破之賊遂潰智慧逃入海素躡之至海曲召行軍記室封德彞計事姓苑封姓夏時封父之後人救獲免易衣見素竟不自言素後知之問其故曰私事也所以不白素嗟異之德彞名倫以字行隆之之孫也封隆之高齊佐命臣守樂安素進討悉平之素遣總管史萬歲帥衆二千自婺州別道踰嶺越海攻破溪洞不可勝數帥讀曰率勝音升前後七百餘戰轉鬬千餘里寂無聲問者十旬遠近皆以萬歲為沒萬歲置書竹筒中浮之於水汲者得之言於素素上其事上時掌翻上嗟歎賜萬歲家錢十萬素又破沈孝徹於溫州步道向天台指臨海按新唐志天台山在台州唐興縣唐興本晉始豐縣始豐本吳之始平縣唐志云武德四年析臨海置始豐高宗上元二年更名唐興則吳之始豐隋已併入臨海天台山此時固屬臨海界前後百餘戰高智慧走保閩越上以素久勞於外令馳傳入朝傳株戀翻下同朝直遙翻素以餘賊未殄恐為後患復請行遂乘傳至會稽素既入朝後自長安乘傳至會稽復扶又翻傳株戀翻會工外翻非北人所習不設備素泛海奄至國慶惶遽棄州走餘黨散入海島或守溪洞素分遣諸將水陸追捕密令人説國慶使斬送智慧以自贖國慶乃執送智慧斬於泉州餘黨悉降將即亮翻説輸芮翻降戶江翻江南大定素班師上遣左領軍將軍獨孤陀至浚儀迎勞比到京師問者日至陀徒何翻勞力到翻比必寐翻拜素子玄獎為儀同三司賞賜甚厚陀信之子也獨孤信皇后之父後周功臣楊素用兵多權略馭衆嚴整每將臨敵輒求人過失而斬之多者百餘人少不下十數流血盈前言笑自若及其對陳先令一二百人赴敵陷陳則已少詩沼翻陳讀曰陳令力丁翻如不能陷而還者無問多少悉斬之又令二三百人復進還從宣翻復扶又翻還如向法將士股栗有必死之心由是戰無不勝稱為名將素時貴幸言無不從其從素行者微功必録至他將將即亮翻雖有大功多為文吏所譴卻故素雖殘忍士亦以此願從焉以並州總管晉王廣為揚州總管鎮江都復以秦王俊為並州總管復扶又翻番禺夷王仲宣反廣州舊治番禺隋為南海縣又分置番禺縣時廣州治始興仲宣所圍者南海也番禺音潘愚引兵圍廣州韋洸中流矢卒洸古黃翻詔以其副慕容三藏檢校廣州道行軍事又詔給事郎裴矩巡撫嶺南唐六典云隋開皇六年始置六品已下散官並以郎為正階尉為從階正六品上為朝議郎下為武騎尉從六品上為通議郎下為屯騎尉正七品上為朝請郎下為驍騎尉從七品上為朝散郎下為遊騎尉正八品上為給事郎下為飛騎尉從八品上為承奉郎下為旅騎尉正九品上為儒林郎下為雲騎尉從九品上為文林郎下為羽騎尉隋志煬帝減給事黃門侍郎員去給事之名移吏部給事郎名為門下之職位次黃門下此時裴矩蓋為吏部給事郎得兵數千人仲宣遣別將周師舉圍東衡州東衡州亦治始興將即亮翻鹿姓也風俗通後漢有巴郡太守鹿旗高涼洗夫人遣其孫馮暄將兵救廣州暄與賊將陳佛智素善逗留不進夫人知之大怒遣使執暄繫州獄洗悉典翻又先薦翻將即亮翻使疏吏翻更遣孫盎出討佛智斬之進會鹿願於南海與慕容三藏合擊仲宣藏徂浪翻仲宣衆潰廣州獲全洗氏親被甲乘介馬張錦繖繖蘇旦翻引彀騎衛從裴矩巡撫二十餘州彀古候翻騎奇寄翻從才用翻蒼梧首領陳坦等皆來謁見隋志蒼梧郡梁置成州隋置封州使還統其部落嶺表遂定矩復命上謂高熲楊素曰韋洸將二萬兵不能早度嶺朕每患其兵少將即亮翻少詩沼翻裴矩以三千弊卒徑至南海有臣若此朕亦何憂以矩為民部侍郎民部侍郎屬戶部尚書高涼郡舊置高州册洗氏為譙國夫人開譙國夫人幕府置長史以下官屬官給印章聽發部落六州兵馬若有機急便宜行事仍敕以夫人誠效之故特赦暄逗留之罪拜羅州刺史宋白曰羅州本招義郡秦屬象郡二漢屬合浦郡元嘉三年檀道濟於綾羅江口築石城因置羅州夫人並盛於金篋盛時征翻並梁陳賜物各藏一庫每歲時大會陳之於庭以示子孫曰我事三代主惟用一忠順之心今賜物具存此其報也汝曹皆念之盡赤心於天子番州總管趙訥貪虐按隋志廣州治南海仁壽元年置番州趙訥貪虐必非是年事史因書之俚音里獠魯皓翻夫人遣長史張融上封事論安撫之宜並言訥罪不可以招懷遠人上遣推訥得其贓賄竟致於法委夫人招慰亡叛夫人親載詔書自稱使者歷十餘州宣述上意諭諸俚獠所至皆降使疏吏翻降戶江翻上嘉之賜夫人臨振縣為湯沐邑臨振縣漢朱崖地隋煬帝置臨振郡今吉陽軍隋志朱崖郡梁置崖州平原郡公也十一年辛亥五九一春正月章甲十一行本月下有丙午二字乙十一行本同孔本同皇太子元氏薨為帝與皇后怒太子而廢之張本二月戊午吐谷渾遣使入貢吐谷渾可汗夸呂聞陳亡大懼吐從暾入聲谷音浴使疏吏翻可從刊入聲汗音寒不敢為寇夸呂卒子世伏立使其兄子無素奉表稱藩並獻方物請以女備後庭上謂無素曰若依來請他國聞之必當相效何以拒之朕情存安養各令遂性豈可聚斂子女以實後宮乎竟不許平鄉令劉曠有異政平鄉縣屬襄國郡訟者皆引咎而去獄中草滿庭可張羅遷臨潁令臨潁縣屬潁川郡潁川郡時為許州上召見勞勉之見賢遍翻謂侍臣曰若不殊獎何以為勸丙子優詔擢為莒州刺史隋志琅邪郡沂水縣舊置南青州後周改為莒州辛巳晦日有食之初帝微時與滕穆王瓚不協帝為周相以瓚為大宗伯瓚恐為家禍陰欲圖帝帝隱之隋書瓚傳瓚美姿儀好書愛士有令名於當世周宣帝崩帝入禁中將總朝政令世子勇召之欲有計議瓚素與帝不協聞召不從曰作隨國公恐不能保何乃更為族滅事邪帝相周瓚拜大宗伯瓚見㣥情未一恐為家禍陰有圖帝之計以是言之固周之忠臣也瓚藏旱翻周高祖妹順陽公主也與獨孤后素不平陰為呪詛呪職救翻詛莊助翻帝命出之瓚不可秋八月章甲十一行本月下有壬申二字乙十一行本同孔本同瓚從帝幸栗園栗園在長安南時人疑其遇鴆乙亥帝至自栗園沛達公鄭譯卒卒子恤翻王崇武標點容肇祖聶崇岐覆校
