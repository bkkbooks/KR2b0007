body:
  text: 資治通鑑卷第一百五十一端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注梁紀七高祖武皇帝七普通七年丙午五二六春正月辛丑朔大赦壬子魏以汝南王悅領太尉魏安州石離穴城斛鹽三戍兵反應杜洛周衆合二萬洛周自松岍赴之水經注大榆河出禦夷鎮北塞中南流徑密雲戍西又南流徑孔山西又歷密雲戍東右合孟廣水水西徑孔山南上有洞穴開明故謂之孔山大榆河又東南流白楊泉水注之水北發白楊溪望離石大榆河又東南流出峽徑安州舊漁陽郡之滑鹽縣南世謂之斛鹽城西北去禦夷鎮二百里岍輕煙翻或曰岍字之誤也讀作陘唐志營州西北百里曰松陘嶺將即亮翻仲哲戰沒元談軍夜潰元談軍於居庸關見上卷上年仲哲秉之子也崔秉時為燕州刺史初魏廣陽王深通於城陽王徽之徽為尚書令為胡太后所信任會恆州人請深為刺史徽言深心不可測及杜洛周反五原降戶在恆州者謀奉深為主深懼上書求還洛陽時深軍于朔州恆戶登翻降戶江翻上時掌翻詔深為吏部尚書徽長壽之子也長壽景穆子也五原降戶鮮于修禮等帥北鎮流民反於定州之左城按楊津傳左城當在博陵界又水經注中山唐縣有左人城帥讀曰率引兵向州城州兵禦之不利楊津至靈丘靈丘縣漢屬代郡唐為蔚州引兵救之入據州城修禮至津欲出擊之長史許被不聽津手劍擊之手首又翻此以記檀弓子手弓釋文為據被走得免津開門出戰斬首數百賊退人心少安少詩沼翻詔尋以津為定州刺史兼北道行臺魏以揚州刺史長孫稚為大都督北討諸軍事與河間王琛共討修禮長知兩翻琛丑林翻二月甲戌北伐衆軍解嚴魏西部敕勒斛律洛陽反於桑乾西乾音干與費也頭牧子相連結三月甲寅游擊將軍爾朱榮擊破洛陽於深井牧子於河西北河之西夏四月乙酉臨川靖惠王宏卒魏大赦癸巳魏以侍中車騎大將軍城陽王徽為儀同三司騎奇寄翻徽與給事黃門侍郎徐紇共毀侍中元順於太后出為護軍將軍太常卿順奉辭於西遊園紇侍側順指之謂太后曰此魏之宰噽宰噽吳太宰噽也好讒吳王夫差信而任之以至亡國噽匹鄙翻此終不死紇脅肩而出朱元晦曰脅肩竦體也小人側媚之態爾刀筆小才止堪供几案之用豈應汙辱門下斁我彞倫汙烏故翻斁多路翻敗也因振衣而起太后默然魏朔州城民鮮于阿胡等據城反阿從安入聲杜洛周南出鈔掠薊城魏常景遣統軍梁仲禮擊破之丁未都督李琚與洛周戰于薊城之北敗沒常景帥衆拒之洛周引還上谷鈔楚交翻薊音計帥讀曰率長孫稚行至鄴詔解大都督以河間王琛代之稚上言嚮與琛同在淮南琛敗臣全謂為裴邃所敗事見上卷上年今難以受其節度魏朝不聽朝直遙翻前至呼沱稚未欲戰琛不從鮮于修禮邀擊稚於五鹿杜預曰陽平元城縣東有五鹿即沙鹿也按呼沱不至元城界此別有五鹿非左氏所謂五鹿也沱徒河翻稚軍大敗稚琛並坐除名五月丁未魏主下詔將北討內外戒嚴既而不行衡州刺史元略自至江南晨夕哭泣常如居喪及魏元叉死叉死見上卷上年喪息郎翻知略因刁雙獲免事見一百四十九卷普通元年遣江革祖之南還以求略江革祖之沒魏見上卷上年古鄧翻寵贈甚厚略始濟淮魏拜略為侍中賜爵義陽王以司馬始賓為給事中栗法光為本縣令刁昌為東平太守刁雙為西兗州刺史凡略所過一餐一宿皆賞之略來奔見一百四十九卷元年栗法光屯留人魏孝昌十年置西兗州於定陶領沛濟陰二郡是年則孝昌二年也魏以丞相高陽王雍為大司馬復以廣陽王深為大都督討鮮于修禮復扶又翻章武王融為左都督裴衍為右都督並受深節度深以其子自隨城陽王徽言於太后曰廣陽王攜其愛子握兵在外將有異志乃敕融衍潛為之備疑則勿任任則勿疑既以深為大督而又使小督備之何以責其殄寇乎深懼事無大小不敢自決太后使問其故對曰徽銜臣次骨李奇曰次骨者言深刻至骨徽之構臣無所不為自徽執政以來臣所表請多不從允徽非但害臣而已從臣將士有勳勞者皆見排抑不得比他軍仍深被憎嫉或因其有罪加以深文至於殊死以是從臣行者莫不悚懼有言臣善者視之如仇讎言臣惡者待之如親戚徽居中用事朝夕欲陷臣於不測之誅臣何以自安陛下若使徽出臨外州臣無內顧之憂庶可以畢命賊庭展其忠力太后不聽為深死於盜手張本徽與中書舍人鄭儼等更相阿黨更工衡翻外似柔謹內實忌克賞罰任情魏政由是愈亂戊申魏燕州刺史崔秉帥衆棄城奔定州燕州自去年八月為杜洛周所圍燕因肩翻乙丑魏以安西將軍宗正珍孫為都督宗正復姓漢楚元王交之子郢客孫德世為宗正子孫因以為氏討劉蠡升也六月魏絳蜀陳雙熾聚衆反蜀人徙居絳郡者謂之絳蜀絳縣漢晉屬河東郡元魏分置絳郡魏收志郡屬東雍州魏以假鎮西將軍長孫稚為討蜀都督考異曰費穆傳穆為都督平絳蜀不應有兩都督今從帝紀曉以利害雙熾即降詔以修義為龍門鎮將此龍門在河東北屈縣西魏世祖神䴥元年禽赫連昌改北屈為禽昌縣將即亮翻降戶江翻丙子魏徙義陽王略為東平王頃之遷大將軍尚書令為胡太后所委任與城陽王徽相埒埒力輟翻然徐鄭用事略亦不敢違也魏當時宗室略其巨擘也史言其居淫昏之朝不能矯正杜洛周遣都督王曹紇真等將兵掠薊南時杜洛周葛榮等作亂其軍中將領無不加以王爵曹紇真以都督加王號故曰都督王七月丙午行臺常景遣都督于榮等擊之於栗園栗園當在范陽固安縣界固安之栗天下稱之斬曹紇真及將卒三千餘級洛周帥衆南趣范陽范陽縣前漢屬涿郡後漢章帝改涿郡為范陽郡帥讀曰率趣七喻翻魏僕射元纂以行臺鎮恆州鮮于阿胡擁朔州流民寇恆州戊申陷平城纂奔冀州恆州治平城平城魏之故都亦陷於賊其不競甚矣恆戶登翻上聞淮堰水盛壽陽城幾沒觀此蓋淮堰復成也豫州刺史夏侯亶等自南道攻壽陽復扶又翻下榮復同八月癸巳賊帥元洪業斬鮮于修禮請降于魏帥所類翻降戶江翻賊黨葛榮復殺洪業自立考異曰北史廣陽王深傳云深以兵士頻經退散人無鬬情連營轉柵日行十里行達交津隔水而陳賊修禮常與葛榮謀後稍信朔州人毛普賢榮常銜之普賢昔為深統軍及在交津深使人諭之普賢乃有降意又使録事參軍元晏說賊程殺鬼果相猜二榮遂殺普賢修禮而自立與魏帝紀全殊又其語雜亂難曉今從帝紀魏安北將軍都督恆朔討虜諸軍事爾朱榮過肆州肆州刺史尉慶賓忌之據城不出尉紆勿翻榮怒舉兵襲肆州執慶賓還秀容署其從叔羽生為刺史魏朝不能制此時爾朱榮已有無魏之心矣從才用翻朝直遙翻初賀拔允及弟勝嶽從元纂在恆州平城之陷也允兄弟相失嶽奔爾朱榮勝奔肆州榮克肆州得勝大喜曰得卿兄弟天下不足平也以為別將將即亮翻軍中大事多與之謀九月己酉鄱陽忠烈王恢卒葛榮既得杜洛周之衆魏主武泰元年葛榮方並杜洛周此得鮮于修禮之衆也趣七喻翻魏廣陽忠武王深自交津引兵躡之水經注漳水過武安縣東清水自涉縣東南來注之世謂決入之所為交漳口辛亥榮至白牛邏據魏紀白牛邏在高陽博野縣邏郎佐翻殺之榮自稱天子國號齊改元廣安深聞融敗停軍不進侍中元晏密言於太后曰廣陽王盤桓不進坐圖非望有于謹者智略過人為其謀主風塵之際恐非陛下之純臣也太后深然之詔榜尚書省門募能獲謹者有重賞謹聞之謂深曰今女主臨朝朝直遙翻信用讒佞苟不明白殿下素心恐禍至無日謹請束身詣闕歸罪有司遂徑詣榜下自稱于謹有司以聞太后引見大怒見賢遍翻謹備論深忠款兼陳停軍之狀太后意解遂捨之深引軍還趣定州趣七喻翻定州刺史楊津亦疑深有異志深聞之止於州南佛寺經二日深召都督毛諡等數人交臂為約危難之際期相拯恤諡神至翻難乃旦翻諡愈疑之密告津云深謀不軌津遣諡討深深走出諡呼噪逐深深與左右間行至博陵界間古莧翻漢桓帝置博陵郡元魏屬定州逢葛榮遊騎劫之詣榮騎奇寄翻賊徒見深頗有喜者榮新立惡之恐其徒有欲奉深為主者故惡之惡烏路翻城陽王徽誣深降賊録其妻子降戶江翻深府佐宋遊道為之訴理乃得釋遊道繇之玄孫也宋繇事西涼李氏李滅事沮渠氏沮渠滅入魏為于僞翻甲申魏行臺常景破杜洛周斬其武川王賀拔文興等捕虜四百人就德興陷魏平州殺刺史王買奴魏平州治肥如即唐平州盧龍縣地天水民呂伯度本莫折念生之黨也後更據顯親以拒念生漢光武置顯親侯國以封竇友以其兄融以河西歸附且以顯其孝文竇后之親也屬漢陽郡後魏屬天水郡至唐時秦州成紀縣治顯親川亡歸胡琛琛丑林翻琛以為大都督秦王資以士馬使擊念生伯度屢破念生軍復據顯親復扶又翻下生復同乃叛琛東引魏軍念生窘迫乞降於蕭寶寅窘渠隕翻寶寅使行臺左丞崔士和據秦州魏以伯度為涇州刺史封平秦郡公魏太延二年置平秦郡於雍縣屬岐州久不進隴口隴坻之口執士和送胡琛於道殺之久之伯度為万俟醜奴所殺万莫北翻俟渠之翻賊勢益盛寶寅不能制胡琛與莫折念生交通事破六韓拔陵浸慢琛應拔陵見上卷五年誘琛斬之誘音酉醜奴盡並其衆冬十一月庚辰大赦丁貴嬪卒太子水漿不入口太子統丁貴嬪所生也卒子恤翻毀不滅性引孝經孔子之言乃進粥數合合古沓翻漢志曰十籥為合合者合籥之量也太子體素肥壯腰帶十圍至是減削過半過工禾翻夏侯亶等軍入魏境所向皆下辛巳魏揚州刺史李憲以壽陽降降戶江翻下同宣猛將軍陳慶之入據其城凡降城五十二獲男女七萬五千口丁亥縱李憲還魏復以壽陽為豫州自宋以來以壽陽為豫州裴叔業叛齊降魏魏以壽陽為揚州復漢魏之舊也今復以壽陽為豫州復宋齊之舊也復以扶又翻又如字天監五年徙豫州治合肥壽陽久罹兵革民多離散亶輕刑薄賦務農省役頃之民戶充復杜洛周圍范陽戊戌民執魏幽州刺史王延年行臺常景送洛周開門納之常景擊杜洛周數戰數勝而終於為虜者民樂於從亂而疾視其上也魏齊州平原民劉樹等反宋武帝僑置平原郡於梁鄒屬冀州後入於魏改冀州為齊州平原為東平原郡頻敗州軍刺史元欣以平原房士達為將討平之敗補邁翻將即亮翻曹義宗據穰城以逼新野穰人羊翻魏遣都督魏承祖及尚書左丞南道行臺辛篡救之考異曰梁書此年冬新野降魏書肅宗崩後新野猶在恐梁書誤蓋梁自前年攻新野此年魏使魏承祖救之也又周于謹傳云孝昌二年與辛纂討義宗今以為據不敢進纂雄之從父兄也魏盜賊日滋征討不息國用耗竭豫徵六年租調猶不足調徒弔翻乃罷百官所給酒肉又稅入市者人一錢及邸店皆有稅百姓嗟怨吏部郎中辛雄上疏以為華夷之民相聚為亂豈有餘憾哉正以守令不得其人守式又翻百姓不堪其命故也宜及此時早加慰撫但郡縣選舉由來共輕貴遊俊才莫肯居此宜改其弊分郡縣為三等清官選補之法妙盡才望如不可並後地先才不得拘以停年地門地也崔亮制停年格見一百四十九卷天監十八年後先並去聲載子亥翻有稱職者補在京名官稱尺證翻如不歷守令不得為內職則人思自勉枉屈可申強暴自息矣不聽大通元年丁未五二七是年三月方改元大通春正月乙丑以尚書左僕射徐勉為僕射時右僕射缺故左僕射止為僕射辛未上祀南郊甲戌魏以司空皇甫度為司徒儀同三司蕭寶寅為司空魏分定相二州四郡置殷州按魏收志殷州止領趙郡巨鹿南巨鹿三郡蓋初置時兼領相州之廣宗郡也殷州治廣阿劉昫曰北齊改為趙州隋改廣阿為大陸唐武德四年改為象城天寶二年改為昭慶以有建初啓運二陵也宋開寶五年改昭慶為隆平熙寧六年省隆平縣為隆平鎮入臨城縣相息亮翻楷表稱州今新立尺刃斗糧皆所未有乞資以兵糧詔付外量聞使量計合給兵糧之數以聞也量音良或勸楷留家單騎之官騎奇寄翻楷曰吾聞食人之祿者憂人之憂若吾獨往則將士誰肯固志哉遂舉家之官葛榮逼州城或勸減弱小以避之楷遣幼子及一女夜出既而悔之曰人謂吾心不固虧忠而全愛也遂命追還賊至強弱相懸又無守禦之具楷撫勉將士以拒之莫不爭奮皆曰崔公尚不惜百口吾屬何愛一身連戰不息死者相枕枕職任翻終無叛志辛未城陷楷執節不屈榮殺之藩翰之任保境安民上也全城卻敵次也死於城郭豈得已哉崔楷闔家並命其志節有可憐矣上之人實有罪焉蕭章甲十一行本蕭上有魏字乙十一行本同孔本同張校同寶寅出兵纍年將士疲弊秦賊擊之寶寅大敗於涇州收散兵萬餘人屯逍遙園東秦州刺史潘義淵以汧城降賊秦州既為賊所據魏置東秦州於隴東郡治汧城即隋唐之汧源縣也將即亮翻汧口堅翻降戶江翻城人執刺史魏蘭根應之豳州刺史畢祖暉戰沒行臺辛深棄城走棄豳州城也賊帥胡引祖據北華州引祖恐當作弘祖魏孝文帝太和十五年置東秦州於杏城後改為北華州領中部敷城郡帥所類翻華戶化翻叱干虜復姓雍州刺史楊椿募兵得七千餘人帥以拒守雍於用翻帥讀曰率詔加椿侍中兼尚書右僕射為行臺節度關西諸將北地功曹毛鴻賓引賊抄掠渭北抄楚交翻雍州録事參軍楊侃將兵三千掩擊之鴻賓懼請討賊自效遂擒送宿勤烏過仁烏過仁者明達之兄子也莫折天生乘勝寇雍州考異曰羊侃傳作莫遮今從魏書應弦而斃塹七豔翻射而亦翻其衆遂潰侃祉之子也魏右民郎陽平路思令上疏晉武帝置尚書右民郎師出有功在於將帥得其人則六合唾掌可清人欲舉手有為先唾其掌六合天地東西南北也唾掌可清言其易也唾湯臥翻口液也此指漢三河之地為言魏都洛陽三河則畿甸也銜杯躍馬志逸氣浮軒眉扼章甲十一行本扼作攘乙十一行本同孔本同腕以攻戰自許及臨大敵憂怖交懷雄圖鋭氣一朝頓盡乃令羸弱在前以當寇強壯居後以衛身兼復器械不精進止無節以當負險之衆敵數戰之虜腕烏貫翻怖普布翻羸倫為翻比毗至翻復扶又翻下復疑同數所角翻欲其不敗豈可得哉是以兵知必敗始集而先逃將帥畏敵遷延而不進國家謂官爵未滿屢加寵命復疑賞賚之輕日散金帛帑藏空竭民財殫盡帑他朗翻藏徂浪翻遂使賊徒益甚生民雕弊凡以此也夫德可感義夫恩可勸死士今若黜陟幽明賞罰善惡簡練士卒繕修器械先遣辨士曉以禍福如其不悛以順討逆悛丑緣翻如此則何異厲蕭斧而伐朝菌戰國時雍門周有是言莊子曰朝菌不知晦朔音義云菌大芝也天陰生糞上見日則死梁簡文云菌欻生之芝也音其隕翻弗聽戊子魏以皇甫度為太尉己丑魏主以四方未平詔內外戒嚴將親出討竟亦不行譙州刺史湛僧智圍魏東豫州姓譜湛丈減翻姓也後漢有大司農湛重帝置譙州治新昌城領新昌高塘臨徐南梁郡五代志江都郡清流縣舊置新昌郡考異曰魏帝紀及曹世表傳作湛僧今從梁夏侯夔傳將軍彭㣥王辨圍琅邪魏敕青南青二州救琅邪魏青州領齊北海樂安勃海高陽河間樂陵郡南青州當又置於其南攻魏平靜穆陵陰山三關皆克之水經注木陵關在黃武山東北晉西陽城西南帥讀曰率下同亶之弟之禮邃之子也魏東清河郡山賊㣥起詔以齊州長史房景伯為東清河太守宋武帝僑置清河郡於盤陽屬冀州後入于魏為東清河郡屬齊州五代志齊州長山縣清河平原二郡併入焉舉家亡去景伯窮捕禽之署其子為西曹掾令諭山賊賊以景伯不念舊惡皆相帥出降掾俞絹翻降戶江翻景伯母崔氏通經有明識貝丘婦人列其子不孝貝丘僑縣亦宋武帝置屬清河郡五代志齊州淄川縣舊曰貝丘置東清河郡按前注所謂清河郡置於盤陽者據魏收地形志宋郡也五代志長山之清河平原雙頭郡也房景伯所守者貝丘之東清河也母曰吾聞聞名不如見面山民未知禮義何足深責乃召其母與之對榻共食使其子侍立堂下觀景伯供食未旬日悔過求還崔氏曰此雖面慚其心未也且置之凡二十餘日其子叩頭流血母涕泣乞還然後聽之卒以孝聞卒子恤翻景伯法壽之族子也房法壽見一百三十二卷宋明帝泰始三年二月秦賊據魏潼關出蕭寶寅之後庚申魏東郡民趙顯德反殺太守裴烟自號都督魏東郡治滑臺城屬西兗州烟俗煙字將軍成景俊攻魏彭城魏以前荊州刺史崔孝芬為徐州行臺以禦之先是孝芬坐元叉黨與盧同等俱除名盧同除名見上卷普通六年先悉薦翻入辭太后太后謂孝芬曰我與卿姻戚時太后為魏主納孝芬女為世婦故云然稱此老嫗會須去之嫗威遇翻去羌呂翻孝芬曰臣蒙國厚恩實無斯語假令有之誰能得聞若有聞者此於元叉親密過臣遠矣太后意解悵然有愧色景俊欲堰泗水以灌彭城孝芬與都督李叔仁等擊之景俊遁還三月甲子魏主詔將西討中外戒嚴會秦賊西走復得潼關復扶又翻戊辰詔回駕北討其實皆不行葛榮久圍信都魏以金紫光祿大夫源子雍為北討大都督以救之初上作同泰寺又開大通門以對之取其反語相協同泰反為大大通反為同是反語相協也反音翻皆出入是門辛未上幸寺捨身甲戌還宮大赦改元改是年為大通元年魏齊州廣川民劉鈞聚衆反宋武帝僑置廣川郡屬冀州入魏屬齊州五代志齊州長山縣舊曰武強置廣川郡清河民房項自署大都督屯據昌國城魏收志東清河郡武城縣有昌國城夏四月魏將元斌之討東郡斬趙顯德將即亮翻己酉柔然頭兵可汗遣使入貢於魏可從刊入聲汗音寒使疏吏翻魏人畏其反覆詔以盛暑且俟後敕魏蕭寶寅之敗也有司處以死刑詔免為庶人雍州刺史楊椿有疾求解復以寶寅為都督雍涇等四州諸軍事征西將軍雍州刺史開府儀同三司西討大都督自關以西皆受節度處昌呂翻復扶又翻雍於用翻椿還鄉里楊椿世居華陰椿謂之曰當今雍州刺史亦無踰於寶寅者但其上佐朝廷應遣心膂重臣何得任其牒用此乃聖朝百慮之一失也朝直遙翻且寶寅不藉刺史為榮吾觀其得州喜悅特甚至於賞罰云為不依常憲恐有異心汝今赴京師當以吾此意啓二聖二聖謂胡太后魏主更遣長史司馬防城都督欲安關中正須三人耳如其不遣必成深憂昱面啓魏主及太后皆不聽是後寶寅以關中叛魏如楊椿所料五月丙寅成景俊攻魏臨潼竹邑拔之魏置臨潼郡治臨潼城據水經城臨潼水故名竹邑即漢沛郡之竹縣也魏為南濟陰郡治所五代志下邳郡夏丘縣舊置臨潼郡彭城郡符離縣隋廢竹邑入焉宋白曰符離縣朝斛城西南七十里有竹邑城拔之東宮亦有直閣將軍魏收志魏沛郡治蕭縣黃陽城又領內相縣有厥城領內猶言管內也將即亮翻六月魏都督李叔仁討劉鈞平之秋七月魏陳郡民劉獲鄭辨反於西華西華縣漢屬汝南郡晉屬潁川郡元魏屬陳郡與湛僧智通謀湛僧智時圍魏東豫州源子恭代世表為東豫州諸將以賊衆強官軍弱且皆敗散之餘不敢戰欲保城自固世表方病背腫輿出呼統軍是云寶是云姓也魏書官氏志內入諸姓有是云氏湛僧智所以敢深入為寇者以獲辨皆州民之望為之內應也嚮聞獲引兵欲迎僧智去此八十里今出其不意一戰可破獲破則僧智自走矣乃選士馬付寶暮出城比曉而至比必利翻及也擊獲大破之窮討餘黨悉平僧智聞之遁還鄭辨與子恭親舊亡匿子恭所世表集將吏面責子恭收辨斬之魏相州刺史樂安王鑒與北道都督裴衍共救信都相息亮翻樂安當作安樂樂音洛鑒幸魏多故陰有異志遂據鄴叛降葛榮降戶江翻下同己丑魏大赦初侍御史遼東高道穆奉使相州使疏吏翻下同前刺史李世哲奢縱不法道穆按之世哲弟神軌用事道穆兄謙之家奴訴良律禁壓良為賤謂本是良民壓為奴婢赦將出神軌啓太后先賜謙之死朝士哀之朝直遙翻彭㣥王辨圍琅邪自夏章甲十一行本夏作春乙十一行本同孔本同張校同及秋魏青州刺史彭城王劭遣司馬鹿悆南青州刺史胡平遣長史劉仁之將兵擊㣥辨破之㣥戰沒劭協之子也彭城王協魏之賢王也死於高肇之譖悆羊茹翻將即亮翻協音協八月魏遣都督源子雍李神軌裴衍攻鄴子雍行及湯陰湯陰縣漢屬河內郡晉廢縣其地在汲郡界不克子雍乘勝進圍鄴城丁未拔之斬鑒傳首洛陽改姓拓跋氏魏因遣子雍裴衍討葛榮九月秦州城民杜粲殺莫折念生闔門皆盡粲自行州事南秦州城民辛琛亦自行州事遣使詣蕭寶寅請降琛丑林翻魏復以寶寅為尚書令還其舊封寶寅涇州之敗免為庶人舊封者寶寅自丹楊郡公徙封梁郡公復扶又翻譙州刺史湛僧智圍魏東豫州刺史元慶和於廣陵此廣陵城在新息縣界司州刺史夏侯夔自武陽引兵助僧智武陽關義陽三關之一也夔至城下慶和舉城降夔以讓僧智僧智曰慶和欲降公不欲降僧智今往必乖其意且僧智所將應募烏合之人不可御以法公持軍素嚴必無侵暴受降納附深得其宜夔乃登城拔魏幟建梁幟幟昌志翻慶和束兵而出吏民安堵獲男女四萬餘口臣光曰湛僧智可謂君子矣忘其積時攻戰之勞湛僧智自是年正月攻圍東豫州知己之短不掩人之長功成不取以濟國事忠且無私可謂君子矣元顯伯宵遁諸軍追之斬獲萬計詔以僧智領東豫州刺史鎮廣陵夔引軍屯安陽魏收志東豫州汝南郡有安陽縣五代志汝南真陽縣隋廢魏安陽縣入焉魏收志梁置西楚州於楚城五代志汝南郡城陽縣梁置楚州領軍曹仲宗東宮直閣陳慶之攻魏渦陽渦古禾翻詔尋陽太守韋放將兵會之魏散騎常侍費穆引兵奄至散悉亶翻騎奇寄翻放營壘未立麾下止有二百餘人放免胄下馬據胡牀處分胡牀即今之交牀隋惡胡字改曰交牀今之交椅是也處昌呂翻分扶問翻莫不一當百魏兵遂退放睿之子也梁之將帥韋睿一人而已魏又遣將軍元昭等衆五萬救渦陽前軍至駝澗去渦陽四十里今自肥河口泝淮西上得駝澗灘其灘南對永壽館北至耶河韋放以魏之前鋒必皆輕鋭不如勿擊待其來至慶之曰魏兵遠來疲倦去我既遠必不見疑及其未集須挫其氣諸君若疑君或作軍於是帥麾下二百騎進擊破之帥讀曰率騎奇寄翻魏人驚駭慶之乃還與諸將連營而進背渦陽城與魏軍相持背蒲妹翻自春至冬數十百戰將士疲弊聞魏人欲築壘於軍後曹仲宗等恐腹背受敵議引軍還慶之杖節軍門曰共來至此涉歷一歲去年慶之入壽陽至此涉歷一年今諸君皆無鬬心唯謀退縮豈是欲立功名直聚為抄暴耳抄楚交翻吾聞置兵死地乃可求生兵法置之死地而後生然後與戰審欲班師慶之別有密敕今日犯者當依敕行之仲宗等乃止魏人作十三城欲以控制梁軍慶之銜枚夜出陷其四城渦陽城主王緯乞降緯于貴翻考異曰魏帝紀九月辛卯東豫州刺史元慶和以城叛梁帝紀十月庚戌魏東豫州刺史元慶和以渦陽內屬夏侯夔傳湛僧智圍元慶和於廣陵慶和請降詔以僧智為東豫州鎮廣陵韋放傳普通八年曹仲宗攻渦陽放會之城主王偉降陳慶之傳大通元年隸曹仲宗伐渦陽城主王偉降詔以渦陽置西徐州然則廣陵渦陽兩處兩事梁紀慶和渦陽之間或更有脫字耳魏紀九月據聞慶和始叛之時梁紀十月據慶和降款到日按陳慶之傳云自春至冬今從梁紀十月為定此別一廣陵非南兗州之廣陵也王偉當作王緯蓋草書之誤也韋放簡遣降者三十餘人分報魏諸營陳慶之陳其俘馘鼓譟隨之九章甲十一行本九上有魏字乙十一行本同孔本同張校同退齊校同城皆潰追擊之俘斬略盡尸咽渦水所降城中男女三萬餘口蕭寶寅之敗於涇州也或勸之歸罪洛陽或曰不若留關中立功自效行臺都令史河間馮景曰擁兵不還此罪將大尚書有都令史故行臺亦置之自念出師纍年糜費不資一旦覆敗內不自安魏朝亦疑之朝直遙翻中尉酈道元素名嚴猛司州牧汝南王悅魏都洛陽置司州弄權縱恣道元收念付獄悅請之於胡太后太后欲赦之道元殺之並以劾悅嬖卑義翻又博計翻劾戶概翻又戶得翻時寶寅反狀已露悅乃奏以道元為關右大使使疏吏翻寶寅聞之謂為取己甚懼長安輕薄子弟復勸使舉兵復扶又翻下不復寅復同寶寅以問河東柳楷楷曰大王齊明帝子天下所屬屬之欲翻今日之舉實允人望且謠言鸞生十子九子毈一子不毈關中亂章甲十一行本亂下有亂者治也四字乙十一行本同孔本同張校同退齊校同齊明帝諱鸞寶寅之父也毈徒玩翻卵壞也周秦以前以亂為治大王當治關中何所疑道元至陰盤驛此陰盤縣驛也魏收地形志曰陰盤縣本屬安定晉屬京兆魏真君七年併新豐太和十一年復置陰盤縣鴻門戲水正屬縣界按漢安定郡與京兆相去遼遠中間為馮翊所隔自晉以後所置陰盤縣非漢安定之陰盤縣地也魏收不深考耳宋白曰京兆昭應縣東十三里有故城後漢靈帝末移安定郡陰盤縣寄理於此今亦謂之陰盤城後魏太和九年自此復移陰盤縣城於今昭應縣東三十一里零水西戲水東司馬村故城是也將即亮翻收殯其尸表言白賊所害秦人謂鮮卑為白虜自苻秦之亂鮮卑之種有因而留關中者是時亦相挺為盜因謂之白賊或曰白賊謂白地之寇也稱為楊椿父子所譖寶寅行臺郎中武功蘇湛臥病在家寶寅令湛從母弟開府屬天水姜儉說湛魏以寶寅為開府故有掾有屬從才用翻說式芮翻元略受蕭衍旨欲見勦除略自梁還魏大見寵任故寶寅託以為言勦子小翻事不可測吾不能坐受死亡今須為身計不復作魏臣矣死生榮辱與卿共之湛聞之舉聲大哭儉遽止之曰何得便爾湛曰我百口今屠滅云何不哭哭數十聲徐謂儉曰為我白齊王寶寅歸魏封為齊王故稱之為于僞翻下口為同賴朝廷假王羽翼榮寵至此屬國步多虞屬之欲翻不能竭忠報德乃欲乘人間隙間古莧翻信惑行路無識之語欲以羸敗之兵守關問鼎守關謂寶寅欲守潼關之險割據關中問鼎謂欲窺天位成王定鼎于郟鄏三代之世寶也楚莊問鼎之大小輕重欲以兵威脅取之故以諭窺天位者羸倫為翻天命未改且王之恩義未洽於民但見其敗未見有成蘇湛不能以百口為王族滅寶寅復使謂曰我救死不得不爾所以不先相白者恐沮吾計耳沮在呂翻湛曰凡謀大事當得天下奇才與之從事今但與長安博徒謀之此有成理不不讀曰否湛恐荊棘必生於齊閣此亦用伍胥伍被語意庶得病死下見先人寶寅素重湛且知其不為己用聽還武功甲寅寶寅自稱齊帝改元隆緒赦其所部置百官都督長史毛遐寶寅都督雍涇等四州又為西討大都督以遐為府長史與鴻賓帥氐羌起兵於馬祗柵以拒寶寅帥讀曰率寶寅遣大將軍盧祖遷擊之為遐所殺寶寅方祀南郊行即位禮未畢聞敗色變不暇整部伍狼狽而歸以姜儉為尚書左丞委以心腹文安周惠達為寶寅使在洛陽文安縣前漢屬勃海後漢屬河間晉置章武郡文安屬焉使疏吏翻惠達逃歸長安寶寅以惠達為光祿勳丹楊王蕭贊聞寶寅反懼而出走趣白馬山趣七喻翻至河橋為人所獲魏主知其不預謀釋而慰之行臺郎封偉伯等與關中豪桀謀舉兵誅寶寅事泄而死魏以尚書僕射長孫稚為行臺以討寶寅正平民薛鳳賢反魏收志世祖置太平郡於河東聞喜縣孝文太和十八年改曰正平郡屬東雍州領聞喜曲沃二縣分據鹽池攻圍蒲坂東西連結以應寶寅詔都督宗正珍孫討之十一月丁卯以護軍蕭淵藻為北討都督鎮渦陽戊辰以渦陽為西徐州渦陽魏置譙州梁改為西徐州領南譙汴龍亢蘄城潁川臨渙蒙郡渦音戈葛榮圍信章甲十一行本信上有魏字乙十一行本同孔本同退齊校同都自春及冬冀州刺史元孚帥勵將士晝夜拒守帥讀曰率下同糧儲既竭外無救援己丑城陷榮執孚逐出居民凍死者什六七孚兄祐為防城都督榮大集將士議其生死孚兄弟各自引咎爭相為死為于僞翻都督潘紹等數百人皆叩頭請就法以活使君榮曰此皆魏之忠臣義士於是同禁者五百人皆得免魏以源子雍為冀州刺史將兵討榮將即亮翻裴衍表請同行詔許之子雍上言衍行臣請留臣行請留衍若逼使同行敗在旦夕不許十二月戊申行至陽平東北漳水曲榮帥衆十萬擊之子雍衍俱敗死相州吏民聞冀州已陷子雍等敗人不自保相州刺史恆農李神志氣自若魏顯祖諱弘改弘農曰恆農相息亮翻恆戶登翻大小致力葛榮盡鋭攻之卒不能克卒子恤翻秦州民駱超殺杜粲請降於魏杜粲殺莫折念生駱超又殺杜粲㣥盜互相屠滅以邀一時之利不足怪也降戶江翻張政烺標點王崇武聶崇岐覆校
