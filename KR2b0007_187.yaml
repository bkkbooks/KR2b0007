body:
  text: 資治通鑑卷第一百八十七端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀三高祖神堯大聖光孝皇帝上之下武德二年武德二年己卯六一九武德二年春正月壬寅王世充悉取隋朝顯官名士為太尉府官屬朝直遙翻下同杜淹戴胄皆預焉胄安陽人也安陽縣帶相州煬帝改左右領軍衛為左右屯衛帥讀曰率考異曰高祖實録作鎮州今從隋書陳稜傳義寧元年七月遣王隆會兵東都今始至少始照翻事無大小悉關太尉府臺省監署莫不闃然闃苦鵙翻世充立三牌於府門外一求文學才識堪濟時務者一求武勇智略能摧鋒陷敵者一求身有冤滯擁抑不申者於是上書陳事章乙十一行本事下有者字張校同日有數百世充悉引見躬自省覽省悉景翻殷勤慰諭人人自喜以為言聽計從然終無所施行下至士卒廝養析薪為廝炊烹為養廝音斯養羊尚翻而實無恩施施式智翻隋馬軍總管獨孤武都為世充所親任其從弟司隸大夫機煬帝置司隸臺以大夫為之長掌諸巡察正四品從才用翻六典周禮地官有山虞澤虞蓋虞部之職也魏始有虞曹郎中晉因之梁陳為侍郎後周冬官有虞部下大夫梁陳後魏北齊並祠部尚書領之隋工部尚書領之煬帝曰虞曹郎煬帝改滄州為勃海郡使孝仁說武都曰王公徒為兒女之態以悅下愚而鄙隘貪忍不顧親舊豈能成大業哉圖讖之文應歸李氏人皆知之說輸芮翻下同讖楚譖翻唐起晉陽奄有關內兵不留行英雄景附且坦懷待物舉善責功不念舊惡據勝勢以爭天下誰能敵之吾屬託身非所坐待夷滅今任管公兵近在新安任王褱以穀州刺史鎮新安封管國公任音壬若遣間使召之使夜造城下間使上古莧翻下疏吏翻造七到翻吾曹共為內應開門納之事無不集矣武都從之事泄世充皆殺之恭慎達之子也達隋觀德王雄之弟武德二年癸卯命秦王世民出鎮長春宮長春宮在同州朝邑縣後周宇文護所建武德二年宇文化及攻魏州總管元寶藏四旬不克魏徵往說之丁未寶藏舉州來降魏徵本元寶藏官屬說式芮翻降戶江翻下同武德二年戊午淮安王神通擊宇文化及於魏縣化及不能抗東走聊城聊城縣時屬魏州武德四年分為博州斬獲二千餘人引兵追化及至聊城圍之武德二年甲子以陳叔達為納言武德二年丙寅李密所置伊州刺史張善相來降相息亮翻降戶江翻武德二年朱粲有衆二十萬剽掠漢淮之間剽匹妙翻遷徙無常每破州縣食其積粟未盡復他適復扶又翻下同將去悉焚其餘資又不務稼穡民餒死者如積粲無可復掠軍中乏食乃教士卒烹婦人嬰兒噉之噉徒濫翻又徒覽翻曰肉之美者無過於人但使他國有人何憂於餒隋著作佐郎陸從典通事舍人顏愍楚六典著作佐郎修國史宋百官春秋云常道鄉公咸熙百官名有著作佐郎三人晉制著作佐郎始到職必撰名臣傳一人宋氏之初國朝始建未有合撰者此制遂替後周春官府置著作中士即著作佐郎之任通事舍人即秦之謁者漢書百官表謁者掌賓贊受事舊儀云謁者有缺選郎中美鬚眉大音者補晉初中書置舍人通事各一人東晉令舍人通事兼謁者之任通事舍人之名由此始也隋初罷謁者官置通事舍人煬帝改通事舍人為通事謁者顏愍楚蓋大業前為舍人南陽鄧州其後無食闔家皆為所噉愍楚之推之子也顏之推仕於高齊之季諸城堡相帥叛之帥讀曰率下同淮安土豪楊士林田瓚起兵攻粲後魏置東荊州於比陽西魏改為淮州梁置淮安縣於桐柏並立上川郡隋開皇廢郡改淮安為桐柏縣改淮安郡曰顯州領比陽平氏桐柏等七縣大業改顯州為淮安郡瓚藏旱翻粲與戰于淮源水經注淮水出平氏縣桐柏大復山山南有淮源廟唐州桐柏淮源縣廟漢延熹六年立其文曰淮出平氏始於大復潛行地中見於陽口大敗帥餘衆數千奔菊潭帥讀曰率菊潭舊曰酈縣開皇初改焉時屬鄧州山有菊人飲其水多壽故以名縣士林家世蠻酋酋慈由翻隋末士林為鷹揚府校尉殺郡官而據其郡校戶教翻既逐朱粲己巳帥漢東四郡遣使詣信州總管廬江王瑤請降大業改隋州為漢東郡梁置信州於魚復大業改為巴東郡唐復為信州使疏吏翻瑗于眷翻宋白曰後魏置東荊州於比陽後改淮州隋文帝改顯州取界內顯望岡為名武德二年初王世充既殺元盧元盧元文都盧楚世充殺之事見一百八十五卷元年七月猶媚事皇泰主禮甚謙敬又請為劉太后假子尊號曰聖感皇太后既而漸驕橫嘗賜食於禁中還家大吐橫戶孟翻吐土故翻疑遇毒自是不復朝謁復扶又翻朝直遙翻皇泰主知其終不為臣而力不能制唯取內庫綵物大造幡花又出諸服玩令僧散施貧乏以求福施式智翻世充使其黨張績董濬守章善顯福二門東都皇城南面三門中曰應天左曰興教右曰光政興教之內曰會昌其北曰章善光政之內曰廣運其北曰顯福毫釐不得出是月世充使人獻印及劍又言河水清欲以耀衆為己符瑞云武德二年上遣金紫光祿大夫武功靳孝謨安集邊郡靳居焮翻為梁師都所獲孝謨罵之極口師都殺之二月詔追賜爵武昌縣公諡曰忠武德二年初定租庸調法每丁租二石絹二匹綿三兩租庸調之法以人丁為本梁陳齊周各有損益唐制凡授田者丁歲輸粟二斛稻三斛謂之租丁隨鄉所出歲輸絹二匹綾絁二丈布加五之一綿三兩麻三斤非蠶鄉則輸銀十四兩謂之調用人之力歲二十日閏加二日不役者日為絹三尺謂之庸有事而加役二十五日者免調三十日者租調皆免通正役不過五十日調徒釣翻下同不得橫有調斂橫戶孟翻斂力瞻翻武德二年丙戌詔諸宗姓居官者在同列之上未仕者免其徭役每州置宗師一人以攝總別為團伍武德二年張俟德至涼去年八月遣張俟德冊拜李軌唐天子吾之從兄從才用翻下同今已正位京邑一姓不可自爭天下吾欲去帝號受其封爵可乎去羌呂翻曹珍曰隋失其鹿天下共逐之稱王稱帝者奚啻一人唐帝關中涼帝河右固不相妨且已為天子奈何復自貶黜復扶又翻必欲以小事大請依蕭察事魏故事蕭察事魏事見一百六十五卷梁元帝承聖三年戊戌軌遣其尚書左丞鄧曉入見見賢遍翻奉書稱皇從弟大涼皇帝臣軌而不受官爵帝怒拘曉不遣始議興師討之初隋煬帝自征吐谷渾吐谷渾可汗伏允以數千騎奔党項事見一百八十一卷煬帝大業五年吐從暾入聲谷音浴可從刊入聲汗音寒騎奇寄翻質音致使統餘衆不果入而還會中國喪亂還從宣翻又如字喪息浪翻伏允復還收其故地復扶又翻上受禪順自江都還長安煬帝既弒順逃還長安使擊李軌許以順還之伏允喜起兵擊軌數遣使入貢請順上遣之為後太宗立順以統吐谷渾之衆張本遣使疏吏翻下同武德二年閏月朱粲遣使請降降戶江翻詔以粲為楚王聽自置官屬以便宜從事武德二年宇文化及以珍貨誘海曲諸賊賊帥王薄帥衆從之誘羊久翻賊帥所類翻薄帥讀曰率與共守聊城竇建德謂其㣥下曰吾為隋民隋為吾君今宇文化及弒逆乃吾讎也吾不可以不討乃引兵趣聊城趣七喻翻又逡須翻淮安王神通攻聊城化及糧盡請降神通不許安撫副使崔世幹勸神通許之降戶江翻下同使疏吏翻神通曰軍士暴露日久賊食盡計窮克在旦暮吾當攻取以示國威且散其玉帛以勞將士勞力到翻若受其降將何以為軍賞乎世幹曰今建德方至若化及未平內外受敵吾軍必敗夫不攻而下之為功甚易夫音扶易以豉翻奈何貪其玉帛而不受乎神通怒囚世幹於軍中去年十月遣神通安撫山東書崔民幹為副今書世幹當有一誤濟北郡濟州濟子禮翻遂復拒戰復扶又翻下同神通督兵攻之貝州刺史趙君德攀堞先登時復以清河郡為貝州宋白曰貝州清河郡春秋為晉東陽之地亦為齊境秦為巨鹿郡地漢分巨鹿郡置清河郡理清陽石趙移郡理平晉城即今博州清平縣後周平齊於清河縣置貝州清河後漢之甘陵清陽縣又兼有漢貝丘縣之地貝州以此得名堞徒協翻收兵不戰君德大詬而下詬苦候翻遂不克建德軍且至神通引兵退建德與化及連戰大破之化及復保聊城建德縱兵四面急攻王薄開門納之建德入城生擒化及先謁隋蕭皇后語皆稱臣素服哭煬帝盡哀收傳國璽及鹵簿儀仗璽斯氏翻撫存隋之百官然後執逆黨宇文智及楊士覽元武達許弘仁孟景集隋官而斬之梟首軍門之外梟堅堯翻以檻車載化及並二子承基承趾至襄國斬之煬帝改邢州為襄國郡杜佑曰邢州古邢國治龍岡縣秦為信都項羽改襄國隋改龍岡考異曰隋書云載之河間斬之唐書云至大陸斬之河洛記云建德將化及並蕭后南陽公主隨軍于時襄國郡尚為隋守建德因其回兵欲攻之營於城下遣大理官引化及出營東南二里許宣令數其罪並二子一號魏王一號蜀王同時受戮按蜀王乃士及所封今不取更無餘言但云不負夏王夏戶雅翻建德每戰勝克城所得資財悉以分將士身無所取又不噉肉常食蔬茹粟飯妻曹氏不衣紈綺將即亮翻噉徒覽翻又徒濫翻衣於既翻紈音丸綺區几翻所役婢妾才十許人及破化及得隋宮人千數即時散遣之以隋黃門侍郎裴矩為左僕射掌選事選宣絹翻兵部侍郎崔君肅為侍中考異曰革命記作君秀今從舊建德傳漢書百官表少府秦官至北齊不置少府以其屬官併太府寺隋煬帝大業三年始分太府為少府監置監少監其後改監為令少監為少令少始照翻六典左右司郎中前代不置煬帝三年尚書都司始置左右司郎各一人掌都省之職品同諸曹郎從五品司馬彪續漢書云尚書丞一人秦所置漢因之成帝置列曹尚書更置丞四人至光武減其二惟置左右丞各一人丞者承也言承助令僕總理臺事也歐陽詢為太常卿詢紇之子也歐陽紇見一百七十卷陳宣帝太建元年紇下沒翻委以政事其不願留欲詣關中及東都者亦聽之仍給資糧以兵援之出境隋驍果尚近萬人亦各縱遣任其所之驍堅堯翻近其靳翻又與王世充結好好呼到翻遣使奉表於隋皇泰主使疏吏翻皇泰主封為夏王建德起於㣥盜雖建國未有文物法度裴矩為之定朝儀制律令為于僞翻朝直遙翻建德甚悅每從之咨訪典禮武德二年甲辰上考第㣥臣以李綱孫伏伽為第一伽求加翻因置酒高會謂裴寂等曰隋氏以主驕臣諂亡天下朕即位以來每虛心求諫然惟李綱差盡忠款孫伏伽可謂誠直餘人猶踵敝風俯眉而已豈朕所望哉朕視卿如愛子卿當視朕如慈父有懷必盡勿自隱也因命捨君臣之敬極歡而罷武德二年遣前御史大夫段確使於朱粲使疏吏翻武德二年初上為隋殿內少監少始照翻宇文士及為尚輦奉御隋尚輦局屬殿內省士及從化及至黎陽上手詔召之士及潛遣家僮間道詣長安又因使者獻金環金環言欲還長安間古莧翻使疏吏翻兵勢日蹙士及勸之歸唐化及不從內史令封德彞說士及於濟北徵督軍糧以觀其變說輸芮翻濟子禮翻化及稱帝立士及為蜀王化及死士及與德彞自濟北來降降戶江翻時士及妹為昭儀由是授上儀同上以封德彞隋室舊臣而諂巧不忠深誚責之誚才笑翻罷遣就舍德彞以祕策干上上悅尋拜內史舍人俄遷侍郎武德二年甲寅隋夷陵郡丞安陸許紹帥黔安武陵澧陽等諸郡來降梁置宣州於夷陵郡西魏改曰拓州後周改曰硤州宋白曰周武帝以州扼三峽之口故名隋煬帝改為夷陵郡改安州為安陸郡黔州為黔安郡武陵郡梁置武州後改曰沅州隋改曰朗州大業復為郡澧陽隋初置澧州大業改為郡帥讀曰率澧音禮考異曰舊書傳云世充篡位乃來降按世充篡在四月實録紹降在此今從之詔以紹為峽州刺史賜爵安陸公武德二年丙辰以徐世績為黎州總管後魏置黎陽郡於黎陽縣後置黎州至隋州郡並廢以黎陽縣屬汲郡今復置黎州武德二年丁巳驃騎將軍張孝珉以徑卒百人襲王世充汜水城入其郛沈米船百五十艘隋志汜水縣舊曰成皋即虎牢也後魏置東中府東魏置北豫州後周置滎州開皇初曰鄭州十八年改成皋曰汜水驃匹妙翻騎奇寄翻下同汜音祀沈持林翻艘蘇遭翻武德二年己未世充寇穀州世充以秦叔寶為龍驤大將軍驤思將翻程知節為將軍待之皆厚然二人疾世充多詐知節謂叔寶曰王公器度淺狹而多妄語好為呪誓此乃老巫嫗耳好呼到翻呪職救翻嫗威遇翻豈撥亂之主乎世充與唐兵戰於九曲水經注洛水自宜陽而東徑九曲南其地十里有坂九曲穆天子傳所謂天子西征升于九阿此是也洛水又東與豪水會豪水出新安縣密山南流歷九曲東而南流入于洛舊志熊州壽安縣義寧元年移治九曲城將即亮翻陳讀曰陳與其徒數十騎西馳百許步下馬拜世充曰僕荷公殊禮荷下可翻深思報效公性猜忌喜信讒言喜許既翻非僕託身之所今不能仰事請從此辭遂躍馬來降降戶江翻考異曰河洛記二月王世充將兵圍新安將軍程咬金帥其徒以歸義按新安乃穀州也而梁載言十道志九曲在壽安壽安乃熊州也或者世充亦寇熊州乎世充不敢逼上使事秦王世民世民素聞其名厚禮之以叔寶為馬軍總管知節為左三統軍時世充驍將又有驃騎武安李君羡隋改洺州為武安郡驍堅堯翻將即亮翻下守將同驃匹妙翻騎奇寄翻隋臨邑縣屬齊郡惡烏路翻帥衆來降帥讀曰率降戶江翻世民引君羡置左右以留安為右四統軍武德二年王世充囚李育德之兄厚德於獲嘉獲嘉漢縣武帝巡幸至此聞破南越獲呂嘉因以名縣隋屬河內郡以城來降以厚德為殷州刺史隋開皇十六年於獲嘉縣置殷州大業初州廢王世充復置今因以命厚德武德二年竇建德陷邢州執總管陳君賓武德二年上遣殿內監竇誕隋煬帝置殿內監諱中改為內唐為殿中監是時蓋未改隋官名也秦漢始置衛將軍晉武帝分為左右二衛下至隋初皆因之煬帝改左右翊衛唐復舊歆許金翻誕抗之子也竇抗后兄也並卑盈翻元吉性驕侈奴客婢妾數百人好使之被甲戲為攻戰好呼到翻下同被皮義翻下同前後死傷甚衆元吉亦嘗被傷其乳母陳善意苦諫元吉醉怒命壯士毆殺之毆烏口翻性好田獵載罔罟三十車嘗言我寧三日不食不能一日不獵常與誕遊獵蹂踐人禾稼蹂人九翻又縱左右奪民物當衢射人觀其避箭射而亦翻夜開府門宣淫他室百姓憤怨歆屢諫不納乃表言其狀壬戌元吉坐免官為元吉失守張本武德二年癸亥陟州刺史李育德按志是年育德以修武縣濁鹿城降置陟州因武陟為名乙丑世充遣其兄子君廓侵陟州李育德擊走之斬首千餘級李厚德歸省親疾使李育德守獲嘉李厚德蓋歸濁鹿省親而使育德守獲嘉也省悉景翻人併丁卯城陷育德及弟三人皆戰死武德二年己巳李公逸以雍丘來降拜州總管以其族弟善行為州刺史隋志梁郡雍丘縣後魏置陽夏郡開皇廢郡置州大業廢州為縣李公逸因亂據之今復置州時邊要州置總管及刺史武德二年隋吏部侍郎楊恭仁從宇文化及至河北化及敗魏州總管元寶藏獲之己巳送長安上與之有舊拜黃門侍郎尋以為涼州總管恭仁素習邊事曉羌胡情僞民夷悅服自葱嶺已東並入朝貢按恭仁至長安時李軌尚據河西唐未得涼州也安能遠及葱嶺乎史終言恭仁事耳是年五月安興貴執李軌方遣楊恭仁安撫河西朝直遙翻武德二年突厥始畢可汗將其衆渡河至夏州夏州漢朔方之地赫連所都統萬也魏滅赫連以為統萬鎮魏太和十一年置夏州因赫連故國名以名州隋大業改州為朔方郡今復以朔方郡為夏州厥九勿翻可從刊入聲汗音寒夏戶雅翻以五百騎授劉武周欲自句注入寇太原騎奇寄翻句音鉤又如字又音拘會始畢卒考異曰高祖實録六月己酉始畢可汗卒疑遣使告喪月日也今從舊書本紀列傳未可立苾毗必翻立其弟俟利弗設為處羅可汗俟渠之翻處昌呂翻處羅以什鉢苾為尼步設使居東偏直幽州之北直當也尼女夷翻上遣右武候將軍高靜奉幣使於突厥使疏吏翻至豐州復以五原郡為豐州豐州漢朔方臨戎縣地後周保定三年置永豐鎮隋開皇五年置豐州因鎮為名大業廢州為五原郡唐復為州大元以豐州置天德軍節度屬大同府路敕納於所在之庫突厥聞之怒欲入寇豐州總管張長遜遣高靜以幣出塞為朝廷致賻為于僞翻賻音附貨財曰賻突厥乃還還從宣翻又如字武德二年三月庚午梁師都寇靈州長史楊則擊走之邊要之州置總管刺史長史司馬長知兩翻武德二年壬申王世充寇穀州刺史史萬寶戰不利武德二年庚辰隋北海通守鄭虔符文登令方惠整及東海齊郡東平任城平陸壽張須昌賊帥王薄等並以其地來降煬帝以青州為北海郡守式又翻文登縣屬東萊郡以海州為東海郡齊州為齊郡鄆州為東平郡須昌縣屬焉任城平陸二縣屬魯郡壽張縣屬濟北郡任音壬帥所類翻降戶江翻武德二年王世充之寇新安也外示攻取實召文武之附己者議受禪李世英深以為不可曰四方所以奔馳歸附東都者以公能中興隋室故也中竹仲翻又如字今九州之地未清其一遽正位號恐遠人皆思叛去矣世充曰公言是也長史韋節楊續等曰隋氏數窮在理昭然夫非常之事固不可與常人議之夫音扶太史令樂德融曰昔歲長星出乃除舊布新之徵隋志大業十三年六月有星孛于太微五帝座色黃赤長三四尺許亢鄭之分野晉天文志自軫十二度至氐四度為壽星於辰在辰鄭之分野屬兗州陳卓范蠡鬼谷先生張良諸葛亮京房譙周張衡並云角亢氐鄭兗州亢音剛分扶問翻恐王氣衰息世充從之外兵曹參軍戴胄外兵曹隋官無之世充取魏晉以來官制而置之耳君臣猶父子也休戚同之明公莫若竭忠徇國則家國俱安矣世充詭辭稱善而遣之世充議受九錫胄復固諫復扶又翻世充怒出為鄭州長史使與兄子行本鎮虎牢長知兩翻乃使段達等言於皇泰主請加世充九錫皇泰主曰鄭公近平李密已拜太尉事見去年九月十月未有殊績俟天下稍平議之未晚段達曰太尉欲之皇泰主熟視達曰任公辛巳達等以皇泰主之詔命世充為相國假黃鉞總百揆進爵鄭王加九錫鄭國置丞相以下官武德二年初宇文化及以隋大理卿鄭善果為民部尚書從至聊城為化及督戰中流矢為化于僞翻下何為同中竹仲翻竇建德克聊城王琮獲善果責之曰公名臣之家鄭善果父誠討尉遲迥以力戰死由是為隋名臣家奈何為弒君之賊效命苦戰傷痍至此乎善果大慙欲自殺宋正本馳往救止之建德復不為禮乃奔相州相息亮翻淮安王神通送之長安庚嚴庚改壬午善果至上優禮之拜左庶子檢校內史侍郎隋室之臣若宇文士及鄭善果安可復用乎武德二年齊王元吉諷並州父老詣闕留己甲申復以元吉為並州總管復扶又翻武德二年戊子淮南五州皆遣使來降使疏吏翻降戶江翻武德二年辛卯劉武周寇並州武德二年壬辰營州總管鄧皓擊高開道敗之皓古浩翻敗補邁翻武德二年甲午王世充遣其將高毗寇義州新志武德元年以衛州之汲新鄉置義州仍高齊舊州名也將即亮翻武德二年東都道士桓法嗣獻孔子閉房記於王世充言相國當代隋為天子嗣祥吏翻相息亮翻世充大悅以法嗣為諫議大夫世充又羅取雜鳥書帛繫頸自言符命而縱之有得鳥來獻者亦拜官爵於是段達以皇泰主命加世充殊禮世充奉表三讓百官勸進設位於都堂納言蘇威年老不任朝謁任音壬朝直遙翻世充以威隋氏重臣欲以眩耀士民每勸進必冠威名冠古玩翻及受殊禮之日扶威置百官之上然後南面正坐受之武德二年夏四月劉武周引突厥之衆軍於黃蛇嶺嶺在榆次縣北厥九勿翻齊王元吉使車騎將軍張達以步卒章十二行本卒下有百人二字乙十一行本同孔本同張校同退齊校同嘗寇嘗試也騎奇寄翻元吉強遣之少詩沼翻強其兩翻至則俱沒達忿恨庚子引武周襲榆次陷之榆次縣屬並州漢古縣也武德二年散騎常侍段確性嗜酒奉詔慰勞朱粲於菊潭是年二月段確以前御史大夫出使今書散騎常侍蓋續命之散悉亶翻騎奇寄翻勞力到翻辛丑乘醉侮粲曰聞卿好噉人人作何味好呼到翻噉徒濫翻又徒覽翻下同噉醉人正如糟藏彘肉確怒罵曰狂賊入朝為一頭奴耳復得噉人乎粲於座收確及從者數十人悉烹之朝直遙翻復扶又翻下同從才用翻以噉左右遂屠菊潭奔王世充世充以為龍驤大將軍驤思將翻武德二年王世充令長史韋節楊續等及太常博士衡水孔穎達長知兩翻衡水縣屬冀州本漢桃縣隋開皇十六年置衡水縣造禪代儀遣段達雲定興等十餘人入奏皇泰主曰天命不常鄭王功德甚盛願陛下遵唐虞之迹皇泰主斂膝據案怒曰天下高祖之天下若隋祚未亡此言不應輒發必天命已改何煩禪讓公等或祖禰舊臣禰乃禮翻或台鼎高位既有斯言朕復何望顏色凜冽言嚴冷也退朝泣對太后世充更使人謂之曰今海內未寧須立長君朝直遙翻長知兩翻俟四方安集當復子明辟必如前誓謂去年七月禁中被髮之誓也癸卯世充稱皇泰主命禪位于鄭遣其兄世惲幽皇泰主於含涼殿惲於粉翻雖有三表陳讓及敕書敦勸皇泰主皆不知也遣諸將引兵入清宮城又遣術人以桃湯葦火祓除禁省將即亮翻下同祓敷勿翻武德二年隋將帥郡縣及賊帥前後繼有降者帥所類翻降戶江翻下同詔以王薄為齊州總管齊州治歷城縣古歷下城也漢為歷城縣劉宋僑立冀州於此魏為濟南郡隋立濟州唐復隋初之舊鄭虔符為青州總管綦公順為淮州總管濟子禮翻宋白曰濟州古碻磝城也秦為東郡茌平地宋置碻磝戍及濟北郡後魏立濟州按綦公順本起北海新志云是年分青州之北海營丘下密置濰州蓋以公順為濰州總管淮當作濰宋白曰濰州取界內濰水為名王孝師為滄州總管宋白曰滄州禹疏九河在此州界漢置勃海郡理浮陽後魏置滄州武德二年甲辰遣大理卿新樂郎楚之安撫山東舊志曰新樂古鮮虞子國漢新市縣屬中山郡隋改為新樂縣唐屬定州宋白曰隋開皇十六年置新樂縣新樂者漢成帝時中山孝王母馮昭儀隨王就國建宮於西鄉呼為西樂城後語訛呼西為新故曰新樂樂音洛武德二年乙巳王世充備法駕入宮即皇帝位丙午大赦改元開明武德二年丁未隋禦衛將軍陳稜以江都來降以稜為揚州總管揚州漢廣陵江都之地自漢以來揚州所治不常厥邑至唐廣陵始專有揚州之名武德二年戊申王世充立子玄應為太子玄恕為漢王餘兄弟宗族十九人皆為王奉皇泰主為潞國公以蘇威為太師段達為司徒雲定興為太尉張僅為司空楊續為納言韋節為內史內史下當有令字韋霽為右僕射齊王世惲為尚書令楊汪為吏部尚書杜淹為少吏部少吏部即吏部侍郎惲於粉翻少始照翻頲他鼎翻世惲世充之兄也又以國子助教吳人陸德明為漢王師晉武帝立國子學置助教掌佐博士教授後世因之論語孔子曰自行束修以上吾未嘗無誨焉朱子曰修脯也十脡為束古者相見必執贄以為禮束修其至薄者後世緣夫子之言遂以為事師之禮服巴豆散臥稱病巴豆有毒能痢人散悉但翻對之遺利竟不與語德明名朗以字行陸德明過孔穎達遠矣世充於闕下及玄武門等數處皆設榻坐無常所親受章表或輕騎歷衢市亦不清道天子清道而後行騎奇寄翻世充按轡徐行語之曰語牛倨翻昔時天子深居九重重直龍翻在下事情無由聞徹徹敕列翻今世充非貪天位但欲救恤時危正如一州刺史親覽庶務當與士庶共評朝政尚恐門有禁限今於門外設坐聽朝朝直遙翻下同坐徂臥翻宜各盡情又令西朝堂納冤抑東朝堂納直諫於是獻策上書者日有數百條流既煩上時掌翻條流猶言條派省覽難遍省悉景翻數日後不復更出復扶又翻武德二年竇建德聞王世充張充下脫廢皇泰主四字自立乃絶之始建天子旌旗出警入蹕下書稱詔追諡隋煬帝為閔帝齊王暕之死也諡神至翻江都之難齊王暕亦死暕古限翻有遺腹子政道建德立以為鄖公鄖音云然猶依倚突厥以壯其兵勢厥九勿翻隋義成公主遣使迎蕭皇后及南陽公主建德遣千餘騎送之使疏吏翻騎奇寄翻又傳宇文化及首以獻義成公主武德二年丙辰劉武周圍並州齊王元吉拒卻之戊午詔太常卿李仲文將兵救並州將即亮翻武德二年王世充將軍丘懷義居門下內省召越王君度漢王玄恕將軍郭士衡雜妓妾飲博侍御史張蘊古彈之世充大怒令散手執君度玄恕批其耳數十散手者散手仗也凡朝會之仗三衛番上分為五仗一曰供奉仗以左右衛為之二曰親仗以親衛為之三曰勳仗以勳衛為之四曰翊仗以翊衛為之皆服鶡冠緋衫夾五曰散手仗以親勳翊衛為之服緋絁裲襠繡野馬列坐于東西廊下唐謂之衙內五衛唐蓋因隋制世充亦因隋制也妓渠綺翻彈徒丹翻散悉但翻批蒲鱉翻又普迷翻杖之各數十東都皇宮正殿曰乾陽殿殿左曰東上閣右曰西上閣閣各有門賞蘊古帛百段遷太子舍人君度世充之兄子也世充每聽朝殷勤誨諭言詞重復朝直遙翻重直龍翻千端萬緒侍衛之人不勝倦弊勝音升百司奏事疲於聽受御史大夫蘇良諫曰陛下語太多而無領要領要猶漢人言要領也何煩許辭也世充默然良久亦不罪良然性如是終不能改也武德二年王世充數攻伊州數所角翻總管張善相拒之糧盡援兵不至癸亥城陷善相罵世充極口而死帝聞歎曰吾負善相善相不負吾也賜其子襄城郡公相息亮翻子下當有爵字蜀本然章十二行本正有爵字乙十一行本同孔本同張校同武德二年五月王世充陷義州復寇西濟州新志濟源縣武德二年王世充將丁伯德以縣來降置西濟州復扶又翻濟子禮翻驍堅堯翻基將即亮翻下同武德二年李軌將安修仁兄興貴仕長安表請說軌諭以禍福說式芮翻下同上曰軌阻兵恃險連結吐谷渾突厥吐從暾入聲谷音浴厥九勿翻尚恐不克豈口舌所能下乎興貴曰臣家在涼州奕世豪望為民夷所附弟修仁為軌所信任子弟在機近者以十數臣往說之說式芮翻軌聽臣固善若其不聽圖之肘腋易矣腋音亦易以鼓翻上乃遣之興貴至武威軌以為左右衛大將軍興貴乘間說軌曰間古莧翻涼地不過千里土薄民貧今唐起太原取函秦宰制中原戰必勝攻必取此殆天啓非人力也不若舉河西歸之則竇融之功復見於今日矣竇融事見漢光武紀復扶又翻吾據山河之固彼雖強大若我何汝自唐來為唐遊說耳為于僞翻興貴謝曰臣聞富貴不歸故鄉如衣繡夜行項羽之言衣於既翻安肯附唐但欲效其愚慮可否在陛下耳於是退與修仁陰結諸胡起兵擊軌軌出戰而敗嬰城自守興貴徇曰大唐遣我來誅李軌敢助之者夷三族城中人爭出就興貴軌計窮與妻子登玉女臺軌築玉女臺見上卷上年庚辰興貴執之以聞河西悉平鄧曉在長安舞蹈稱慶上曰汝為人使臣使疏吏翻下同聞國亡不戚而喜以求媚於朕不忠於李軌肯為朕用乎遂廢之終身是年二月李軌遣鄧曉入見軌至長安並其子弟皆伏誅以安興貴為右武候大將軍上柱國涼國公賜帛萬段安修仁為左武候大將軍申國公武德二年隋末離石胡劉龍兒舊志云離石漢縣後周改名昌化郡隋為離石郡唐為石州離石胡胸奴種也即稽胡自號劉王以其子季真為太子虎賁郎將梁德擊斬龍兒賁音奔將即亮翻至是季真與弟六兒復舉兵為亂復扶又翻引劉武周之衆攻陷石州殺刺史王儉季真自稱突利可汗可從刊入聲汗音寒六兒遣使請降降戶江翻詔以為嵐州總管以樓煩郡置嵐州宋白曰因界內岢嵐山立名嵐盧含翻武德二年壬午以秦王世民為左武候大將軍使持節涼甘等九州諸軍事涼州總管九州涼甘瓜鄯肅會蘭河廓皆李軌所據之地也雍於用翻陝失冉翻遣黃門侍郎楊恭仁安撫河西武德二年丙戌劉武周陷平遙平遙縣屬汾州即漢平陶縣魏避國諱改陶為遙武德二年癸巳梁州總管山東道安撫副使陳政為麾下所殺攜其首奔王世充政茂之子也隋書陳茂傳政歸唐卒於梁州總管不言死於山東通鑑當是據實録諸書但是時山東無梁州或者政先為梁州總管後安撫山東而死也陳茂事隋文帝典機密武德二年王世充以禮部尚書裴仁基左輔大將軍裴行儼有威名忌之仁基父子知之亦不自安乃與尚書左丞宇文儒童儒童弟尚食直長溫隋制尚食局屬殿中省有奉御有直長長知兩翻散悉亶翻騎奇寄翻事泄皆夷三族齊王世惲言於世充曰儒童等謀反正為皇泰主尚在故也復扶又翻惲於粉翻為于僞翻下同不如早除之世充從之遣兄子唐王仁則及家奴梁百年鴆皇泰主皇泰主曰更為請太尉以往者之言未應至此謂世充往有復子明辟之言既不能踐今不應遽殺之也為于僞翻世惲不許又請與皇太后辭訣亦不許乃布席焚香禮佛願自今已往不復生帝王家飲藥不能絶以帛縊殺之諡曰恭皇帝縊於賜翻又於計翻諡神至翻世充以其兄楚王世偉為太保齊王世惲為太傅領尚書令武德二年六月庚子竇建德陷滄州滄州隋勃海郡武德二年初易州賊帥宋金剛有衆萬餘與魏刀兒連結易州上谷郡宋白曰易州六國時燕地秦並天下是為上谷郡漢置涿郡今州即涿郡故安縣地圖經云隋初自今遂城縣所理英雄城移南營州居燕之候臺仍改名易州取州南易水為名帥所類翻去年十一月建德滅刀兒戰敗帥衆四千西奔劉武周帥讀曰率武周聞其善用兵得之甚喜號曰宋王委以軍事中分家資以遺之遺于季翻金剛亦深自結出其故妻納武周之妹因說武周圖晉陽南向爭天下說輸芮翻武周以金剛為西南道大行臺使將兵三萬寇並州將即亮翻下周將人將同丁未武周進逼介州義寧元年以介休平遙置介休郡武德元年曰介州縋他僞翻遂陷介州詔左武衛大將軍姜寶誼行軍總管李仲文擊之武周將黃子英往來雀鼠谷新志介休縣有雀鼠谷將即亮翻數所角翻挑徒了翻兵才接子英陽不勝而走如是再三寶誼仲文悉衆逐之伏兵發唐兵大敗寶誼仲文皆為所虜考異曰舊裴寂傳云寶誼仲文相次陷沒按實録二人敗處皆在雀鼠谷賊將黃子英陽不勝以誘之遇伏而沒事迹並同必一時共戰皆被擒耳上復使二人將兵擊武周復扶又翻武德二年己酉突厥使來告始畢可汗之喪厥九勿翻使疏吏翻下同可從刊入聲汗音寒上舉哀于長樂門六典長安宮城南面三門中曰承天東曰長樂西曰永安樂音洛朝直遙翻詔百官就館弔其使者又遣內史舍人鄭德挺弔處羅可汗賻帛三萬段處昌呂翻賻音附武德二年上以劉武周入寇為憂右僕射裴寂請自行癸亥以寂為晉州道行軍總管晉州曹魏之平陽郡後魏真君四年置東雍州孝昌中改為唐州建義元年又改為晉州隋為臨汾郡唐復為晉州聽以便宜從事武德二年秋七月初置十二軍分關內諸府以隸焉皆取天星為名以萬年道為參旗軍長安道為鼓旗軍富平道為玄戈軍醴泉道為井鉞軍同州道為羽林軍華州道為騎官軍寧州道為折威軍岐州道為平道軍豳州道為招搖軍西麟州道為苑游軍涇州道為天紀軍宜州道為天節軍每軍將副各一人取威名素重者為之騎奇寄翻將即亮翻下同督以耕戰之務由是士馬精強所向無敵武德二年海岱賊帥徐圓朗以數州之地請降言徐圓朗跨據數州東至海西距岱帥所類翻降戶江翻下同兗州隋之魯郡禹貢之兗州東南據濟西北距河封域廣矣後漢以來兗州所治不常厥邑所部亦廣至是始專以魯郡為兗州武德二年王世充遣其將羅士信寇穀州士信帥其衆千餘人來降帥讀曰率下同先是士信從李密擊世充兵敗為世充所得先悉薦翻世充厚禮之與同寢食既而得邴元真等待之如士信士信恥之士信有駿馬世充兄子趙王道詢欲之不與世充奪之以賜道詢士信怒故來降上聞其來甚喜遣使迎勞章十二行本勞下有賜帛五千段五字乙十一行本同孔本同張校同退齊校同使疏吏翻勞力到翻廩食其所部食祥吏翻以士信為陝州道行軍總管陝失冉翻宋白曰陝州即周二伯分陝之地後魏太和十一年置陝州世充左龍驤將軍臨涇席辨新志臨涇縣屬涇州驤思將翻武德二年丙子王世充遣其將郭士衡寇穀州刺史任王褱大破之俘斬且盡任音壬王褱古回翻甲申行軍總管劉弘基遣其將种如願襲王世充河陽城种音沖毀其河橋而還還從宣翻又如字武德二年乙酉西突厥統葉護可汗高昌王麴伯雅各遣使入貢初西突厥曷娑那可汗入朝于隋隋人留之國人立其叔父號射匱可汗事見一百八十一卷煬帝大業七年厥九勿翻可從刊入聲娑素何翻朝直遙翻達頭可汗之孫也既立拓地東至金山按開元中以西州為金山都督府又突厥之先興於金山在高昌西北則知是山近高昌此西海也建庭於龜茲北三彌山龜茲音丘慈射匱卒子統葉護立統葉護章十二行本護下有可汗二字乙十一行本同孔本同勇而有謀北並鐵勒控弦數十萬據烏孫故地又移庭於石國北千泉石國康居枝庶之分王者也治柘折城漢時大宛北鄙也葉護各遣吐屯監之督其征賦監工銜翻武德二年辛卯宋金剛寇浩州浹旬而退唐初改西河郡為浩州浹子協翻武德二年八月丁酉酅公薨酅奚圭翻諡曰隋恭帝無後以族子行基嗣嗣祥吏翻武德二年竇建德將兵十餘萬趣洺州洺州隋之武安郡己亥建德兵至洺州城下將即亮翻下充將禮將同趣七喻翻下同洺音名帥讀曰率下同相息亮翻武德二年丙午將軍秦武通軍至洛陽敗王世充將葛彥璋敗補邁翻武德二年丁未竇建德陷洺州總管袁子幹降之降戶江翻考異曰實録作甲子蓋奏到之日今從革命記乙卯引兵趣相州淮安王神通聞之帥諸軍就李世績於黎陽武德二年梁師都與突厥合數千騎寇延州延州隋之延安郡騎奇寄翻厥九勿翻閉壁不戰伺師都稍怠九月丙寅遣副總管梁禮將兵擊之師都與禮戰方酣德操以輕騎多張旗幟掩擊其後少詩沼翻伺相吏翻酣戶江翻幟昌志翻師都軍潰逐北二百里破其魏州新志綏州城平縣置魏州因魏平關而名德操孝先之子也段孝先柄用於高齊之季武德二年蕭銑遣其將楊道生寇峽州刺史許紹擊破之銑又遣其將陳普環帥舟師上峽規取巴蜀將即亮翻上時掌翻紹遣其子智仁及録事參軍李弘節等追至西陵大破之夷陵孫吳之西陵世謂之步闡壘唐貞觀九年峽州徙治焉隋之峽州本治下牢戍在步闡壘西南二十八里水經江水徑夷陵縣南又東徑流頭灘狼尾灘黃牛山之黃牛灘而後徑西陵峽出峽東南流而後徑步闡壘此蓋自下牢追至西陵峽也銑遣兵戍安蜀城及荊門城安蜀城在公安縣界荊門城在長林縣界皆荊州西南要地先是上遣開府李靖詣夔州經略巴東郡舊置信州是年改夔州杜佑曰避皇外祖獨孤信諱改之先悉薦翻句斷阻銑兵久不得進上怒其遲留陰敕許紹斬之不以明詔而陰敕猶欲以宿憾殺之為之奏請獲免為于僞翻武德二年己巳竇建德陷相州殺刺史呂珉相息亮翻考異曰實録作庚辰蓋亦奏到之日今從革命記武德二年民部尚書魯公劉文靜自以才略功勳在裴寂之右而位居其下意甚不平每廷議寂有所是文靜必非之數侵侮寂數所角翻下同由是有隙文靜與弟通直散騎常侍文起飲酒酣怨望拔刀擊柱曰會當斬裴寂首家數有妖散悉亶翻騎奇寄翻妖於驕翻被皮義翻厭於葉翻文靜有妾無寵使其兄上變告之上時掌翻上以文靜屬吏屬之欲翻遣裴寂蕭瑀問狀文靜曰建義之初忝為司馬計與長史位望略同長知兩翻今寂為僕射據甲第甲第甲於諸第也東西征討老母留京師風雨無所庇實有觖望之心觖望怨望也觖苦穴翻不能自保上謂㣥臣曰觀文靜此言反明白矣李綱蕭瑀皆明其不反秦王世民為之固請曰昔在晉陽文靜先定非常之策始告寂知事見一百八十四卷隋恭帝義寧元年為于僞翻任遇懸隔令文靜觖望則有之令力丁翻非敢謀反裴寂言於上曰文靜才略實冠時人性復粗險冠古玩翻復扶又翻今天下未定留之必貽後患上素親寂低回久之卒用寂言卒子恤翻考異曰高祖實録唐書唐曆等皆以文靜之死由於裴寂今據實録裴寂此年六月為晉州道行軍總管討劉武周此月丁丑為宋金剛敗於介州去文靜死才七日此時不當在京師實録曰高祖低回者久之蓋寂未行時先有此言高祖未忍殺至是乃決意耳辛未文靜及文起坐死籍沒其家武德二年沈法興既克毗陵克毗陵見一百八十五卷元年三月撝與麾同都毗陵改元延康置百官性殘忍專尚威刑將士小有過即斬之由是其下離怨時杜伏威據歷陽陳稜據江都李子通據海陵俱有窺江表之心法興軍數敗會子通圍稜於江都稜送質求救於法興將即亮翻下同數所角翻質音致及伏威法興使其子綸將兵數萬與伏威共救之伏威軍清流綸軍揚子相去數十里舊志清流縣漢全椒縣地梁置南譙州居桑根山之朝陽在今縣西南八十里南譙州故城是也北齊自南譙故城徙治於新昌郡城今滁州治清流縣是也隋志江都郡帶江陽縣有江都宮揚子宮唐永淳元年始分江都縣置揚子縣今真州治其地宋白曰清流縣因縣東清流水為名隋文帝更梁新昌縣為清流縣募江南人詐為綸兵夜襲伏威營伏威怒復遣兵襲綸復扶又翻由是二人相疑莫敢先進子通得盡鋭攻江都克之稜奔伏威子通入江都因縱擊綸大破之伏威亦引去子通即皇帝位國號吳改元明政丹陽賊帥樂伯通帥衆萬餘降之丹陽郡隋初之蔣州賊帥所類翻通帥讀曰率降戶江翻武德二年杜伏威請降丁丑以伏威為淮南安撫大使和州總管和州漢歷陽縣地九江都尉治所晉氏南渡置戍守以防江侯景之亂江西皆入高齊置和州於歷陽以南北通和往來之津要也大業廢州為歷陽郡今復以歷陽郡為和州使疏吏翻武德二年裴寂至介休介休漢古縣因介子推介山而名時為介州寂軍于度索原營中飲澗水金剛絶之士卒渴乏寂欲移營就水金剛縱兵擊之寂軍遂潰失亡略盡寂一日一夜馳至晉州先是劉武周屢遣兵攻西河浩州刺史劉贍拒之浩州隋之西河郡先悉薦翻贍而豔翻與共守西河及裴寂敗自晉州以北城鎮俱沒唯西河獨存姜寶誼復為金剛所虜謀逃歸金剛殺之復扶又翻裴寂上表謝罪上時掌翻上慰諭之復使鎮撫河東劉文靜淺水原之敗貶落不偶以至於誅裴寂度索原之敗位任如故唐高祖以賞罰馭臣上下其手矣劉武周進逼並州齊王元吉紿其司馬劉德威曰卿以老弱守城吾以強兵出戰辛巳元吉夜出兵攜其妻妾棄州奔還長安紿蕩亥翻還從宣翻元吉始去武周兵已至城下晉陽土豪薛深以城納武周上聞之大怒謂禮部尚書李綱曰元吉幼弱未習時事故遣竇誕宇文歆輔之歆許今翻晉陽強兵數萬食支十年興王之基一旦棄之聞宇文歆首畫此策我當斬之綱曰王年少驕逸竇誕曾無規諫又掩覆之少詩照翻覆敷又翻使士民憤怨今日之敗誕之罪也歆諫王不悛尋皆聞奏事見上二月悛丑緣翻豈可殺哉明日上召綱入升御座曰我得公遂無濫刑元吉自為不善非二人所能禁也並誕赦之衛尉少卿劉政會在太原為武周所虜政會密章十二行本密下有遣人奉三字乙十一行本同孔本同表論武周形勢武周據太原遣宋金剛攻晉州拔之虜右驍衛大將軍劉弘基驍堅堯翻弘基逃歸金剛進逼絳州陷龍門宋白曰絳州晉都左傳所謂新田也後周武成二年置絳州龍門漢皮氏縣也後魏改為龍門縣隋唐屬蒲州武德二年西突厥曷娑那可汗與北突厥有怨曷娑那在長安北突厥遣使請殺之厥九勿翻可從刊入聲汗音寒使疏吏翻上不許㣥臣皆曰保一人而失一國後必為患秦王世民曰人窮來歸我殺之不義上遲回久之不得已丙戌引曷娑那於內殿宴飲既而送中書省縱北突厥使者使殺之武德二年禮部尚書李綱領太子詹事漢書百官表詹事秦官掌皇后太子家應劭云詹省也給也言給事太子家晉宋及後魏用人漸重北齊總東宮內外衆事無大小皆統之後周置太子宮正宮尹隋復置詹事唐統東宮三寺十率府之政令久之太子漸昵近小人昵尼質翻近其靳翻疾秦王世民功高頗相猜忌綱屢諫不聽乃乞骸骨上罵之曰卿為何潘仁長史乃恥為朕尚書邪長知兩翻邪音耶且方使卿輔導建成而固求去何也綱頓首曰潘仁賊也每欲妄殺人臣諫之即止為其長史可以無愧為長史事見一百八十四卷義寧元年臣不才所言如水投石言以水投石雖沾濕而不能受水臣何敢久汚天臺辱東朝乎天臺謂尚書省東朝謂東宮汚烏故翻朝直遙翻知公直士勉留輔吾兒戊子以綱為太子少保尚書詹事如故少始照翻綱復上書諫太子飲酒無節及信讒慝疏骨肉復扶又翻下同上時掌翻慝吐得翻太子不懌而所為如故綱鬱鬱不得志是歲固稱老病辭職詔解尚書仍為少保武德二年淮安王神通使慰撫使張道源鎮趙州庚寅竇建德陷趙州撫使疏吏翻宋白曰趙州周穆王封造父於趙城即此地後魏置趙郡隋大業初置趙州考異曰實録今年三月建德陷趙州此又云陷趙州蓋重復或三月是貝州唐統紀唯有九月陷趙州今從之執總管張志昂及道源建德以二人及邢州刺史陳君賓不早下欲殺之國子祭酒凌敬諫曰人臣各為其主用為于僞翻彼堅守不下乃忠臣也今大王殺之何以勵㣥下乎建德怒曰吾至城下彼猶不降力屈就擒何可捨也敬曰今大王使大將高士興拒羅藝於易水藝才至興即降將即亮翻降戶江翻大王之意以為何如建德乃悟即命釋之武德二年乙未梁師都復寇延州復扶又翻考異曰太宗實録云經數月師都又來寇按丙寅九月朔寇延州乙未九月晦也今從高祖實録段德操擊破之斬首二千餘級師都以百餘騎遁去騎奇寄翻德操以功拜柱國賜爵平原郡公鄜州刺史鄜城壯公梁禮戰沒隋志上郡後魏置東秦州後改為北華州西魏為敷州大業二年改為鄜城郡後改為上郡唐為鄜州鄜音膚武德二年冬十月己亥就加涼州總管楊恭仁納言賜幽州總管燕公羅藝姓李氏封燕郡王自國公進封郡王唐制國公食邑三千戶郡王食邑五千戶皆從一品燕因肩翻辛丑李藝破竇建德於衡水衡水縣屬冀州宋白曰衡水縣本漢桃縣隋開皇十六年置衡水縣武德二年癸卯以左武候大將軍龐玉為梁州總管時集州獠反新志武德元年析梁州之難江巴州之符陽長池白石置集州按舊志漢宕渠符陽之地也宋白曰後魏恭帝改梁之東巴州為集州以東北集川水為名獠魯皓翻獠據險自守軍不得進糧且盡熟獠與反者皆鄰里親黨近邊者為熟獠遠者為生獠請玉還玉揚言秋穀將熟百姓毋得收刈一切供軍非平賊吾不返聞者大懼曰大軍不去吾曹皆將餒死其中壯士乃入賊營與所親潛謀斬其渠帥而降帥所類翻下同降戶江翻餘黨皆散玉追討悉平之武德二年劉武周將宋金剛進攻澮州陷之新志義寧元年以絳郡之翼城絳縣置澮州因澮水而名將即亮翻下同澮古外翻裴寂性怯無將帥之略唯發使駱驛趣虞泰二州居民入城堡焚其積聚駱驛相繼不絶也新志義寧元年以蒲州之安邑虞鄉夏置安邑郡武德元年曰虞州又義寧元年以蒲州之汾陰龍門置汾陰郡武德元年曰泰州使疏吏翻趣讀曰促積聚上子賜翻下慈喻翻今人多讀如字非也皆思為盜夏縣民呂崇茂聚衆自稱魏王以應武周夏縣古虞公之地稷山虞坂皆在縣界隋屬河東郡時屬虞州杜佑曰夏縣漢安邑縣地夏都安邑城在縣北十五里蓋以此名縣夏戶雅翻為所敗敗補邁翻詔永安王孝基章十二行本基下有工部尚書四字乙十一行本同孔本同張校同退齊校同獨孤懷恩陝州總管于筠內史侍郎唐儉等將兵討之陝失冉翻將即亮翻下同時王行本猶據蒲反未下亦與武周相應去年十二月隋將堯君素死王行本據蒲反事見上卷上出手敕曰賊勢如此難與爭鋒宜棄大河以東謹守關西而已所謂蒲津關以西也太原王業所基國之根本河東富實京邑所資若舉而棄之臣竊憤恨上時掌翻願假臣精兵三萬必冀平殄武周克復汾晉上於是悉發關中兵以益世民所統使擊武周乙卯幸華陰至長春宮以送之華戶化翻武德二年竇建德引兵趣衛州衛州漢汲縣地東魏立義州後周改衛州治汲宋白曰其州城隋已前謂之陳城郡國縣道記武王伐紂於此列陳因名常為三道輜重細弱居中央步騎夾左右相去三里許趣七喻翻重直用翻騎奇寄翻下同建德以千騎前行過黎陽三十里黎陽縣在衛州東北百二十里偵丑鄭翻孝剛驍勇善馬槊驍堅堯翻槊色角翻與建德遇遂擊之建德敗走右方兵救之右方用漢書語此謂建德兵之在右者也建德怒還攻黎陽克之考異曰實録黎陽陷在十一月丙子蓋亦奏到之日今從革命記李世績父蓋魏徵及帝妹同安公主唯李世績以數百騎走渡河數日以其父故還詣建德降衛州聞黎陽陷亦降降戶江翻下同建德以李世績為左驍衛將軍使守黎陽驍堅堯翻考異曰革命記使與其將高雅賢守新鄉按是時新鄉猶屬王世充使劉黑闥守之世績既事建德乃為建德攻下新鄉虜黑闥耳今從唐書常以其父蓋自隨為質質音致以魏徵為起居舍人滑州刺史王軌奴殺軌攜其首詣建德降建德曰奴殺主大逆吾何為受之立命斬奴返其首於滑州吏民感悅即日請降於是其旁州縣及徐圓朗等皆望風歸附己未建德還洺州築萬春宮徙都之置淮安王神通於下博下博縣時屬冀州宋白曰下博漢舊縣應劭云泰山有博縣故此云下故縣在今縣南二十里今縣後魏移於衡水北俗謂之故縣城以周建德六年又移縣於今理也今理即後漢祭遵壘北枕衡水武德二年行軍總管羅士信帥勇士夜入洛陽外郭縱火焚清化里而還帥讀曰率還從宣翻壬戌士信拔青城堡蓋因青城宮為堡武德二年王世充自將兵徇地至滑臺臨黎陽尉氏城主時德睿汴州刺史王要漢亳州刺史丁叔則遣使降之汴州古大梁地戰國時為魏都漢為陳留郡東魏為梁州後周改汴州以城臨汴水因以為名宋白曰亳州春秋為東國之焦邑漢為譙縣魏為譙郡後周武帝置亳州遙取古南亳之名以名州將即亮翻使疏吏翻要漢伯當之兄也夏侯端至黎陽是年四月遣夏侯端安撫淮左夏戶雅翻自澶淵濟河隋開皇十六年置澶淵縣時屬黎州澶市連翻東至于海南至于淮二十餘州皆遣使來降使疏吏翻行至譙州舊志亳州臨漁縣隋置譙州還路遂絶端素得衆心所從二千人雖糧盡不忍委去端坐澤中殺馬以饗士因歔欷謂曰歔音虛欷音希又許既翻卿等鄉里皆已從賊特以共事之情未能見委委棄也不可從卿卿有妻子無宜效我可斬吾首歸賊必獲富貴衆皆流涕曰公於唐室非有親屬直以忠義志不圖存某等雖賤心亦人也寧肯害公以求利乎端曰卿不忍見殺吾當自刎刎武粉翻衆抱持之乃復同進復扶又翻潛行五日餒死及為賊所擊奔潰相失者太半唯餘五十二人同走采䝁豆生食之䝁豆野豆也音勞魯刀翻端持節未嘗離身屢遣從者散自求生離力智翻從才用翻衆又不可時河南之地皆入世充唯州刺史李公逸為唐堅守遣兵迎端館給之為于僞翻館古玩翻世充遣使召端解衣遺之使疏吏翻遺于季翻仍送除書以端為淮南郡公尚書少吏部少始照翻端對使者焚書毀衣曰夏侯端天子大使豈受王世充官乎汝欲吾往唯可取吾首耳因解節旄懷之置刃於竿自山中西走無復蹊徑冒踐荊棘晝夜兼行得達宜陽宜陽唐熊州為虎狼所食又喪其半從才用翻下同喪息浪翻其存者鬢髮禿落無復人狀端詣闕見上但謝無功初不自言艱苦上復以為祕書監郎楚之至山東亦為竇建德所獲楚之不屈竟得還郎楚之與夏侯端同時出使史言唐之興也使於四方者皆能不辱君命還從宣翻王世充遣其從弟世辨以徐亳之兵攻雍丘李公逸遣使求救從才用翻使疏吏翻上以隔賊境不能救公逸乃留其屬李善行守雍丘身帥輕騎入朝帥讀曰率騎奇寄翻朝直遙翻至襄城為世充伊州刺史張殷所獲世充謂曰卿越鄭臣唐其說安在公逸曰我於天下唯知有唐不知有鄭世充怒斬之善行亦沒上以公逸子為襄邑公武德二年甲子上祠華山新志華山在華州華陰縣有嶽祠華戶化翻王崇武標點容肇祖聶崇岐覆校
