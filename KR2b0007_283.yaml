body:
  text: 資治通鑑卷第二百八十三端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千六百戶食實封一千戶臣司馬光奉敕編集後學天台音註後晉紀四高祖聖文章武明德孝皇帝下天福七年壬寅九四二春正月丁巳鎮州牙將自西郭水碾門導官軍入城碾魚蹇翻水碾水磑也殺守陴民二萬人陴頻彌翻執安重榮斬之杜重威殺導者自以為功庚申重榮首至鄴都帝命漆之函送契丹重直龍翻癸亥改鎮州為恆州成德軍為順國軍鎮州本恆州唐避穆宗名改焉今以安重榮反改州名從舊又改軍號恆胡登翻丙寅以門下侍郎同平章事趙瑩為侍中以杜重威為順國節度使兼侍中安重榮私財及恆州府庫重威盡有之帝知而不問又表衞尉少卿范陽王瑜為副使瑜為之重斂於民恆人不勝其苦少詩照翻為之于偽翻斂力贍翻勝音升張式父鐸詣闕訟冤張彥澤殺張式事見上卷上年壬午以河陽節度使王周為彰義節度使代張彥澤閩主曦立皇后李氏同平章事真之女也嗜酒剛愎愎蒲逼翻曦寵而憚之彰武節度使丁審琪養部曲千人縱之為暴於境內軍校賀行政與諸胡相結為亂攻延州帝遣曹州防禦使何重建將兵救之同鄜援兵繼至乃得免校戶教翻鄜方無翻二月癸巳以重建為彰武留後召審琪歸朝重建雲朔間胡人也唐左丞相宋齊丘固求豫政事唐主聽入中書又求領尚書省乃罷侍中壽王景遂判尚書省更領中書門下省更工衡翻以齊丘知尚書省事其三省事並取齊王璟參決所以制宋齊丘親吏夏昌圖盜官錢三千緡齊丘判貸其死唐主大怒斬昌圖夏戶雅翻齊丘稱疾請罷省事從之涇州奏遣押牙陳延暉持敕書詣涼州州中將吏請延暉為節度使三月閩主曦立長樂王亞澄為閩王樂音洛張彥澤在涇州亶發兵擊諸胡兵皆敗沒調民馬千餘匹以補之調徒釣翻還至陝自涇州代還至陝還從宣翻陝失冉翻乘醉斷其手足而斬之斷音短王周奏彥澤在鎮貪殘不法二十六條民散亡者五千餘戶王周代彥澤故得奏其在鎮事帝以其有軍功又與楊光遠連姻釋不問歐史張彥澤與帝連姻又討范延光有功夏四月己未右諫議大夫鄭受益上言楊洪所以被屠由陛下去歲送張式與彥澤使之逞志致彥澤敢肆凶殘無所忌憚見聞之人無不切齒而陛下曾不動心一無詰讓淑慝莫辨詰去吉翻問也讓責也慝吐得翻賞罰無章中外皆言陛下受彥澤所獻馬百匹聽其如是臣竊為陛下惜此惡名為于偽翻受獻而釋有罪是惡名也乞正彥澤罪法以湔洗聖德湔則前翻疏奏留中受益從讜之兄子也鄭從讜見唐僖宗紀讜音黨庚申刑部郎中李濤等伏閤極論彥澤之罪語甚切至伏閤者伏閤門下奏事閤門使以聞辛酉敕張彥澤削一階降爵一級階武散階爵級封爵之級涇州民復業者減其傜賦癸亥李濤復與兩省及御史臺官伏閤復扶又翻兩省官中書門下省官也奏彥澤罰太輕請論如法帝召濤面諭之濤端笏前迫殿陛聲章十二行本聲上有論辨二字乙十一行本同孔本同張校同退齋校同色俱厲帝怒連叱之濤不退帝曰朕已許彥澤不死濤曰陛下許彥澤不死不可負不知范延光鐵券安在謂許范延光以不死而楊光遠殺之也事見上卷五年入禁中丙寅以彥澤為左龍武大將軍為張彥澤為契丹用以殘滅晉國李濤詣彥澤而不懼張本漢高祖寢疾以其子秦王弘度晉王弘熙皆驕恣少子越王弘昌孝謹有智識少詩照翻與右僕射兼西御院使王翷謀出弘度鎮邕州弘熙鎮容州而立弘昌為弘熙殺弘昌及翷張本翷求仁翻會崇文使蕭益入問疾以其事訪之益曰立嫡以長違之必亂乃止蕭益引經義以沮立弘昌之義長知兩翻丁丑高祖殂年五十四高祖為人辯察多權數好自矜大常謂中國天子為洛州刺史好呼到翻以中國天子都洛陽洛陽之地蓋本洛州刺史所治也言其政令不能及遠特昔時洛州刺史之任耳嶺南珍異所聚每窮奢極麗宮殿悉以金玉珠翠為飾用刑慘酷有灌鼻割舌支解刳剔炮炙烹蒸之法或聚毒蛇水中以罪人投之謂之水獄同平章事楊洞潛諫不聽末年尤猜忌以士人多為子孫計故專任宦官由是其國中宦者大盛自劉龑之後專任宦者謂百官為門外人傳至於鋹而國亡矣秦王弘度即皇帝位更名玢更工衡翻玢府巾翻以弘熙輔政改元光天尊母趙昭儀曰皇太契丹以晉招納吐谷渾遣使來讓帝憂悒不知為計五月己亥始有疾悒乙及翻乙巳尊太劉氏為皇太后太后帝之庶母也徐無黨曰帝所生母也唐丞相太保宋齊丘既罷尚書省不復朝謁復扶又翻朝直遙翻下同唐主遣壽王景遂勞問勞力到翻許鎮洪州始入朝唐主與之宴酒酣齊丘曰陛下中興臣之力也柰何忘之唐主怒曰公以遊客干朕事見二百六十六卷梁太祖乾化二年亦足矣乃與人言朕烏喙如句踐難與共安樂有之乎越范蠡遺文種書言越王為人長頸烏喙可與同患難不可與同安樂句讀如鉤樂讀如洛臣實有此言臣為遊客時陛下乃偏裨耳今日殺臣可矣明日唐主手詔謝之曰朕之褊性褊補典翻子嵩平昔所知少相親老相怨可乎少詩照翻自古君臣之間豈無親故未有如宋齊丘之挾舊矜功唐主之啟寵納侮者也丙午以齊丘為鎮南節度使踐洪州之約宋齊丘本洪州進士寵之以衣錦也帝寢疾一旦馮道獨對帝命幼子重睿出拜之又令宦者抱重睿置道懷中其意蓋欲道輔立之重直龍翻考異曰漢高祖實錄晉高祖大漸召近臣屬之曰此天下明宗之天下寡人竊而處之久矣寡人既謝當歸許王寡人之願也此說難信今從薛史六月乙丑帝殂年五十一五代會要殂於鄴都大內之保昌殿道與天平節度使侍衞馬步都虞候景延廣議以國家多難宜立長君乃奉廣晉尹齊王重貴為嗣晉高祖託孤於馮道與吳主孫休託孤於濮陽興張布之事略同難乃旦翻齊王即皇帝位延廣以為己功始用事禁都下人無得偶語以防姦人謀為變初高祖疾亟有旨召河東節度使劉知遠入輔政齊王寢之知遠由是怨齊王為劉知遠不入援張本丁卯尊皇太后曰太皇太后高祖之庶母劉氏也高祖之后李氏也閩富沙王延政圍汀州閩主曦發漳泉兵五千救之九域志泉州西至漳州二百九十五里漳州西至汀州五百四十里宋白曰梁山有漳浦水一名漳溪水唐垂拱二年析泉州之西南置漳州垂拱之泉州今之福州也大明宮使黃敬忠屯尤口九域志尤溪縣在南劍州南一百五十五里蓋王氏初置縣也尤口尤溪口也國計使黃紹頗將步卒八千為二軍聲援秋七月壬辰太皇太后劉氏殂閩富沙王延政攻汀州四十二戰不克而歸其將包洪實陳望將水軍以禦福州之師丁酉遇於尤口尤溪口占者言時刻未利按兵不動洪實等引兵登岸水陸夾攻之殺敬忠俘斬二千級林守亮黃紹頗皆遁歸庚子大赦癸卯加景延廣同平章事兼侍衞馬步都指揮使賞其定策之功也為景延廣挾權制上搆契丹之隙張本勳舊皆欲復置樞密使罷樞密使見上卷上年請以樞密舊職讓之幷樞密於中書故謂樞密院舊所典之職為舊職有神降於博羅縣民家博羅漢古縣唐屬循州時為漢土郡國志循州有博羅山浮海而來傅著羅山故名博羅宋朝博羅縣屬惠州九域志在州北四十五里宋白曰博羅縣接境於羅山故曰博羅東接龍州南接西平西接增城界閭閻人往占吉凶多驗縣吏張遇賢事之甚謹時循州盜賊㣥起莫相統一賊帥共禱于神神大言曰張遇賢當為汝主於是章十二行本是下有㣥帥二字乙十一行本同孔本同共奉遇賢稱中天八國王改元永樂樂音洛置百官攻掠海隅循州東南距潮惠二州皆海隅之地少詩照翻無他方略諸將但告進退而已漢主以越王弘昌為都統循王弘杲為副以討之戰于錢帛館漢兵不利二王皆為賊所圍指揮使陳道庠等力戰救之得免東方州縣多為遇賢所陷東方州縣謂番禺以東州縣也即惠潮之地九域志廣州東至惠州三百一十五里又自惠州東至潮州八百一十里端州人也高行周圍襄州踰年不下去年十一月高行周圍襄州事始見上卷奉國軍都虞候曲周王清言於行周曰曲周縣屬洺州宋熙寧三年省曲周縣為鎮入雞澤縣賊城已危我師已老民力已困不早迫之尚何俟乎與奉國都指揮使元城劉詞帥衆先登元城縣帶魏州帥讀曰率拔之安從進舉族自焚甲子以趙瑩為中書令閩主曦遣使以手詔及金器九百錢萬緡將吏敕告六百四十通求和於富沙王延政延政不受丙寅閩主曦宴㣥臣於九龍殿從子繼柔不能飲強之從才用翻強其兩翻繼柔私減其酒曦怒幷客將斬之王曦之酗虐孫晧之流也將即亮翻閩人鑄永隆通寶大鐵錢一當鉛錢百漢葬天皇大帝于康陵廟號高祖唐主自為吳相興利除害變更舊法甚多梁均王之貞明四年唐主始得吳政吳王隆演之十五年也命法官及尚書刪定為昇元條三十卷時唐以昇元紀元庚寅行之閩主曦以同平章事候官余廷英為泉州刺史廷英貪穢掠人女子詐稱受詔采擇以備後宮事覺曦遣御史按之廷英懼詣福州自歸曦詰責將以屬吏詰去吉翻屬之欲翻廷英退獻買宴錢萬緡曦悅明日召見謂曰宴已買矣皇后貢物安在廷英復獻錢於李后乃遣歸泉州自是諸州皆別貢皇后物未幾復召廷英為相見賢遍翻復扶又翻幾居豈翻史言閩主曦之好貨甚於昶冬十月丙子張遇賢陷循州殺漢刺史劉傳楚王希範作天策府王舉天下大定錄曰希範建天策府於州城西北造天策光政等一十六樓又造天策勤政等五堂戶牖欄檻皆飾以金玉塗壁用丹砂數十萬斤丹砂出辰溪漵錦等州及諸溪峒皆楚之境內也本草圖經曰丹砂生深山石崖間土人穴地數十尺始見其苗乃白石也謂之丹砂床砂生石上其塊大者如雞子小者如石榴顆狀若芙蓉頭箭鏃連床者紫黯若鐵色而光明瑩澈碎之嶄巖作牆壁又似雲母片可析者無石彌佳過此則淘土石中得之春夏用角簟角簟剖竹為細篾織之藏節去筠瑩滑可愛南蠻或以白藤為之木綿今南方多有焉於春中作畦種之至夏秋之交結實至秋半其實之外皮四裂中踊出白如綿土人取而紡之織以為布細密厚暖宜以御冬十一月庚寅葬聖文章武明德孝皇帝于顯陵陵在河南府壽安縣先是河南北諸州官自賣海鹽歲收緡錢十七萬又散蠶鹽斂民錢蠶鹽所以裛繭唐天成二年敕每年二月內一度俵散蠶鹽依夏稅限納錢宋白曰周顯德三年敕齊州蠶鹽於秋苗上俵配謂之查頭每一石徵錢三千文滄棣濱淄青每石徵絹一匹後齊州減徵一半五州所徵絹加倍先悉薦翻不若聽自販而歲以官所賣錢直斂於民謂之食鹽錢高祖從之俄而鹽價頓賤每斤至十錢至是三司使董遇欲增求羨利羨延面翻而難於驟變前法乃重征鹽商過者七錢留賣者十錢由是鹽商殆絕而官復自賣復扶又翻其食鹽錢至今斂之如故五代會要時言事者請將食鹽錢於諸道州府計戶每戶一貫至二百為五等配之然後任人逐便興販既不虧官又益百姓朝廷行之諸處場務且仍舊俄而鹽貨頓賤去出鹽遠處州縣每斤不過二十掌事者又難驟改其法奏請重置稅焉蓋欲絕興販歸利於官場院糶鹽雖多人戶鹽錢又不放免民甚苦之閩鹽鐵使右僕射李仁遇敏之子李敏閩主昶元梁國夫人之父年少美姿容得幸於曦有龍陽之寵也以仁遇為左僕射兼中書侍郎翰林學士吏部侍郎李光準為中書侍郎兼戶部尚書並同平章事曦荒淫無度嘗夜宴光準醉忤旨忤五故翻命執送都市斬之吏不敢殺繫獄中明日視朝朝直遙翻召復其位是夕又宴收翰林學士周維岳下獄下戶嫁翻吏拂榻待之曰相公昨夜宿此尚書勿憂醒而釋之他日又宴侍臣皆以醉去獨維岳在曦曰維岳身甚小何飲酒之多左右或曰酒有別腸此俚俗之常語曦欣然命捽維岳下殿捽昨沒翻欲剖視其酒腸或曰殺維岳無人章十二行本人下有復能二字乙十一行本同孔本同張校同侍陛下劇飲者乃捨之帝之初即位也大臣議奉表稱臣告哀於契丹景延廣請致書稱孫而不稱臣景延廣之議因三年契丹主令高祖稱兒皇帝用家人之禮致書也屈身以為社稷何恥之有為于偽翻陛下如此他日必躬擐甲冑擐音宦與契丹戰於時悔無益矣於時者於其時也馮道依違其間帝卒從延廣議卒子恤翻契丹大怒遣使來責讓且言何得不先承稟遽即帝位延廣復以不遜語答之契丹盧龍節度使趙延壽欲代晉帝中國趙延壽父子欲帝中國之心已見於屯團柏之時契丹主頗然之說式芮翻為契丹入寇張本齊王上天福八年癸卯九四三春正月癸卯蜀主以宣徽使兼宮苑使田敬全領永平節度使敬全宦者也引前蜀王承休為比而命之前蜀主王衍使宦者王承休帥秦州事見二百七十三卷唐莊宗同光二年詩云殷鑒不遠在夏后之世孟昶不能以前蜀之亡國為鑒乃引王承休為比以崇秩宦官其國至宋而亡晚矣帝聞契丹將入寇二月己未發鄴都乙丑至東京帝即位於鄴都保昌殿柩前至是始還汴無虛月遺唯季翻唐宣城王景達剛毅開爽烈祖愛之屢欲以為嗣烈祖即謂唐主唐主崩廟號烈祖通鑑因其國史成文書之亟去吏翻唐主以齊王璟年長而止長知兩翻璟以是怨齊丘既以贊奪嫡之謀怨之又以爭權誤國怒之宋齊丘於是不得免矣唐主幼子景逷母种氏有寵齊王璟母宋皇后稀得進見唐主如璟宮遇璟親調樂器大怒誚讓者數日种氏乘間言景逷雖幼而慧可以為嗣逷他歷翻种直中翻見賢遍翻誚才笑翻間古莧翻唐主怒曰子有過父訓之常事也國家大計女子何得預知即命嫁之史言唐主明斷不牽於女寵唐主嘗夢吞靈丹旦而方士史守沖獻丹方以為神而餌之浸成躁急自叔孫豹以來踐妖夢以自禍者多矣不聽嘗以藥賜李建勳建勳曰臣餌之數日已覺躁熱況多餌乎唐主曰朕服之久矣㣥臣奏事往往暴怒然或有正色論辯中理者中竹仲翻亦斂容慰謝而從之唐主問道士王栖霞何道可致太平對曰王者治心治身乃治家國今陛下尚未能去飢嗔飽喜治直之翻去羌呂翻嗔昌真翻何論太平宋后自簾中稱歎以為至言凡唐主所賜予予讀曰與栖霞皆不受栖霞常為人奏章唐主欲為之築壇為于偽翻辭曰國用方乏何暇及此俟焚章不化乃當奏請耳道士率奏章自謂上達於天史言王棲霞異乎挾術以干寵利者駕部郎中馮延己為齊王元帥府掌書記性傾巧與宋齊丘及宣徽副使陳覺相結同府在己上者延己稍以計逐之延己嘗戲謂中書侍郎孫晟曰公有何能為中書郎晟曰晟山東鄙儒孫晟密州高密縣人奔南見二百七十六卷唐明宗天成二年談諧不如公諂詐不如公然主上使公與齊王遊處處昌呂翻蓋欲以仁義輔導之也豈但為聲色狗馬之友邪晟誠無能章十二行本能下有如字乙十一行本同孔本同公之能適足為國家之禍耳延己歙州人也歙書涉翻又有魏岑者亦在齊王府給事中常夢錫屢言陳覺馮延己魏岑皆佞邪小人不宜侍東宮司門郎中判大理寺蕭儼表稱陳覺姦回亂政唐主頗感悟未及去去羌呂翻會疽發背祕不令人知密令醫治之聽政如故庚午疾亟太醫吳廷裕嚴裕改紹遣親信召齊王璟入侍疾唐主密令醫治疾猶可曰欲以鎮安人心至於危殆召嫡長入侍乃出於醫師之意此可以為法乎治直之翻吾餌金石始欲益壽乃更傷生汝宜戒之是夕殂年五十六下制以齊王監國大赦孫晟恐馮延己等用事欲稱遺詔令太后臨朝稱制翰林學士李貽業曰先帝嘗云婦人預政亂之本也安肯自為厲階此必近習姦人之詐也且嗣君春秋已長明德著聞長知兩翻聞音問公何得遽為亡國之言若果宣行吾必對百官毀之晟懼而止貽業蔚之從曾孫也李蔚唐僖宗乾符中為相蔚紆勿翻從才用翻丙子始宣遺制庚午至丙子七日始發喪近臣多罹譴罰陳覺稱疾累月不入及宣遺詔乃出蕭儼劾奏覺端居私室以俟升遐劾戶概翻又戶得翻請按其罪齊王不許自烈祖相吳禁壓良為賤買良人子女為奴婢謂之壓良為賤律之所禁也馮延己及弟禮部員外郎延魯俱在元帥府草遺詔聽民賣男女意欲自買姬妾蕭儼駮曰駮北角翻此必延己等所為非大行之命也自漢以來天子升遐梓宮在殯稱曰大行皇帝東都留守判官也唐以江都為東都先帝訪臣臣對曰陛下昔為吳相民有鬻男女者為出府金贖而歸之為出于偽翻府金藏府之金也故遠近歸心今即位而反之使貧人之子為富人廝役可乎先帝以為然將治延魯罪治直之翻臣以為延魯愚無足責先帝斜封延魯章抹三筆持入宮請求諸宮中必尚在齊王命取先帝時留中章奏千餘道皆斜封一抹凡章奏留中不下者皆當時不行者也若其言可行者則付外施行然以遺詔已行竟不之改聲馮延魯以己私傅益遺制之罪明底其罰而改之不亦可乎史言唐烈祖尚儒故當國有大故之時猶有能持正以斷國論者閩富沙王延政稱帝於建州國號大殷大赦改元天德以將樂縣為鏞州唐武德五年分邵武置將樂縣時屬建州宋屬南劍州九域志在州南二百四十里宋白曰其地在越已有將樂之名按後漢書云永安三年析建安之校鄉置將樂縣按漢無永安年號獨吳孫休改元永安耳樂音洛鐔州今之南劍州是也吳分建安置南平縣晉改為延平縣閩王審知立延平鎮王延政置鐔州南唐改劍州取寶劍化龍於延平津以立州也宋朝混一始加南字以別蜀之劍州鐔徐林翻又讀如覃以節度判官潘承祐為吏部尚書節度巡官建陽楊思恭為兵部尚書唐武德四年置建陽縣屬建州九域志在州西二百四十里宋白曰漢建安元年割建安縣地為桐鄉十年會稽南部都尉賀齊分上饒之地兼舊桐鄉置建平縣晉太元四年改建平為建陽縣因山之陽為名以承祐同平章事潘承祐能諫王延政之日尋干戈而不能諫其舉大號又俛眉而為之相亦復何也錄軍國事延政服赭袍視事然牙參及接鄰國使者猶如藩鎮禮殷國小民貧軍旅不息楊思恭以善聚斂得幸斂力贍翻增田畝山澤之稅至於魚鹽蔬果無不倍征征之倍其常數楊剝皮三月己卯朔以中書令趙瑩為晉昌節度使兼中書令以晉昌節度使兼侍中桑維翰為侍中桑維翰始者居藩鎮而兼侍中今入朝正為門下省長官唐元宗即位本名景通改名璟後又改名景改元保大祕書郎韓熙載請俟踰年改元不從古者人君即位踰年而後改元不忍遽改父之道也唐烈祖后宋氏唐主未聽政以居喪未御正朝聽政一日至數四唐主曰書記有常職何為如是其煩也馮延己時為齊王掌書記唐主為人謙謹初即位不名大臣數延公卿論政體數所角翻李建勳謂人曰主上寬仁大度優於先帝但性習未定苟旁無正人但恐不能守先帝之業耳後果如李建勳之言其僅保江南者幸也唐主以鎮南節度使宋齊丘為太保兼中書令奉化節度使周宗為侍中九域志南唐置奉化軍節度於江州故順人望召為相政事皆自決之徙壽王景遂為燕王宣城王景達為鄂王初唐主為齊王知政事晉天福三年唐烈祖徙吳王璟為齊王若其輔政則始於後唐潞王清泰元年吳睿皇之大和六年也此蓋言知唐政事時常夢錫常直言規正始雖忿懟懟直類翻終以諒直多之及即位許以為翰林學士齊丘之黨疾之坐封駮制書貶池州判官池州多遷客以罪遷降於外州者其州人謂之為遷客防制過甚幾不聊生幾居依翻惟事夢錫如在朝廷王彥儔豈知敬常夢錫哉以其事唐主於齊府貶非其罪必將復召用故敬之耳宋齊丘待陳覺素厚唐主亦以覺為有才遂委任之馮延己延魯魏岑雖齊邸舊僚皆依附覺與休寧查文徽吳分歙縣置休陽縣後改曰海陽晉武帝改曰海寧隋改曰休寧唐屬歙州九域志在州西六十六里查鉏加翻姓也何承天姓苑已有此姓則江南之有查姓舊矣侵蠹政事更工衡翻唐人謂覺等為五鬼延魯自禮部員外郎遷中書舍人勤政殿學士江州觀察使杜昌業聞之歎曰國家所以驅駕㣥臣在官爵而已若一言稱旨遽躋通顯勤政殿學士蓋唐烈祖所置猶中朝之端明殿學士也稱尺證翻何以賞之未幾唐主以岑及文徽皆為樞密副使幾居豈翻岑既得志會覺遭母喪岑即暴揚覺過惡暴顯也唐置定遠軍於濠州漢殤帝驕奢不親政事高祖在殯作樂酣飲夜與倡婦微行倮男女而觀之倡音昌倮魯果翻左右忤意輒死無敢諫者忤五故翻惟越王弘昌及內常侍番禺吳懷恩屢諫不聽番音潘常猜忌諸弟每宴集令宦者守門㣥臣宗室皆露索然後入露體而搜索之恐其挾懷兵刃也索山客翻晉王弘熙欲圖之乃盛飾聲伎娛悅其意以成其惡伎巨綺翻漢主好手搏弘熙令指揮使陳道庠引力士劉思潮譚令禋林少強林少良何昌廷等五人習手搏於晉府好呼到翻少詩照翻晉府弘熙所居第也漢主聞而悅之丙戌與諸王宴於長春宮觀手搏至夕罷宴漢主大醉弘熙使道庠思潮等掖漢主因拉殺之年二十四因扶掖而拉其脅殺之拉盧合翻明旦百官諸王莫敢入宮越王弘昌帥諸弟臨於寢殿帥讀曰率臨力鴆翻迎弘熙即皇帝位更名晟晟漢主玢之弟也更工衡翻以弘昌為太尉兼中書令諸道兵馬都元帥知政事循王弘杲為副元帥參預政事陳道庠及劉思潮等皆受賞賜甚厚閩主曦納金吾使尚保殷之女考異曰閩錄作尚可殷今從十國紀年有殊色曦嬖之醉中所欲殺則殺之所欲宥則宥之沈酗于酒惟婦言是用商紂所以亡也嬖卑義翻又博計翻夏四月戊申朔日有食之唐以中書侍郎同平章事李建勳為昭武節度使鎮撫州九域志吳置昭武節度於撫州殷將陳望等攻閩福州是年二月王延政建國於建州號曰殷既而敗歸五月殷吏部尚書同平章事潘承祐上書陳十事大指言兄弟相攻逆傷天理一也賦斂煩重力役無節二也斂力贍翻發民為兵羇旅愁怨三也民為兵則疲於征戍羇旅異鄉不得反其桑梓故愁怨使歸怨於上㣥臣莫敢言四也楊思恭事見上二月多置州縣增吏困民五也謂置鏞州鐔州也將攻臨汀臨汀汀州也唐開撫福二州山洞置汀州因長汀為名初治新羅後移治長汀白石村天寶改為臨汀郡乾元復為州九域志延平西至臨汀八百里六也唐都金陵吳越都錢塘唐兵自撫信可以襲建州吳越兵自婺衢可以襲建州財多者補官逋負者被刑七也被皮義翻延平諸津征果菜魚米獲利至微斂怨甚大八也與唐吳越為鄰即位以來未嘗通使九也宮室臺榭崇飾無度十也殷王延政大怒殷王當作殷主勒歸私第漢中宗既立國中議論詾詾言其弒兄自立也詾許拱翻漢主不從思潮等聞之譖弘杲謀反漢主令思潮等伺之弘杲方宴客思潮與譚令禋帥衞兵突入伺相吏翻候也察也帥讀曰率突入掩不備斬弘杲於是漢主謀盡誅諸弟以越王弘昌賢而得衆尤忌之弘昌見忌事始上年四月詳考本末雄武當作建武建武軍邕州懼禍求入朝許之初閩主曦侍康宗宴閩主昶廟號康宗新羅國之於閩國其地在海東通使於閩此何所施倓對曰斬為臣不忠者時曦已蓄異志凜然變色至是宴㣥臣復有獻劍者曦命發倓冢斬其尸倓徒甘翻又徒濫翻徒敢翻復扶又翻校書郎陳光逸謂其友曰主上失德亡無日矣吾欲死諫其友止之不從上書諫章十二行本諫作陳乙十一行本同張校同曦大惡五十事曦怒命衞士鞭之數百不死以繩繫其頸懸諸庭樹久之乃絕秋七月己丑詔以年饑國用不足分遣使者六十餘人於諸道括民穀吳越王弘佐初立上統軍使闞璠強戾闞苦鑑翻姓也璠音煩排斥異己弘佐不能制內牙上都監使章德安數與之爭數所角翻右都監使李文慶不附於璠乙巳貶德安於處州章德安受託孤之寄而為闞璠所制其才不足稱也璠與右統軍使胡進思益專橫為吳越誅闞璠張本橫戶孟翻明州人今明州猶祀闞璠謂之闞相公廟睦州人進思湖州人也唐主緣烈祖意緣因也由也徙封齊王居東宮天平節度使守侍中東都留守鄂王景達為副元帥徙封燕王宣告中外約以傳位立長子弘冀為南昌王景遂景達固辭不許景遂自誓必不敢為嗣更其字曰退身更工衡翻為弘冀毒景遂張本漢指揮使萬景忻敗張遇賢於循州敗補邁翻遇賢告于神神曰取虔州則大事可成遇賢帥衆踰嶺趣虔州唐百勝節度使賈匡浩不為備梁以百勝節度使命盧光稠淮南楊氏既幷虔州因而不改宋朝紹興初改虔州為贛州取章貢二水以名州也帥讀曰率趣七喻翻再敗州兵敗補邁翻城門晝閉遇賢作宮室營署于白雲洞遣將四出剽掠剽匹妙翻匡浩公鐸之子也賈公鐸見二百六十卷唐昭宗乾寧三年八月乙卯唐主立弟景逷為保寧王宋太后怨种夫人屢欲害景逷种夫人欲立景逷見是年二月夏州牙內指揮使拓跋崇斌謀作亂綏州刺史李彞敏將助之事覺辛未彞敏棄州與其弟彞俊等五人奔延州趙珣聚米圖經綏州南至延州界三百四十里宋白曰綏州北至夏州三百六十里九月尊帝母秦國夫人安氏為皇太代北人也帝既繼大宗則帝父敬儒為皇伯今尊生母安氏為皇太將以為誰之乎章十二行本謹下有多侍食於其宮六字乙十一行本同孔本同張校同退齋校同待諸弟亦友愛高祖七子此時惟重睿在耳帝敬儒之子也亦無兄弟見於史初河陽牙將喬榮考異曰漢隱帝實錄作喬熒陷蕃記作喬瑩今從晉少帝漢高祖實錄薛史景延廣傳契丹傳契丹以為回圖使凡外國與中國貿易者置回圖務猶今之回易場也置邸大梁及契丹與晉有隙景延廣說帝囚榮於獄說式芮翻悉取邸中貨凡契丹之人販易在晉境者皆殺之奪其貨大臣皆言契丹有大功謂救解晉陽之圍高祖遂以得中原戊子釋榮慰賜而歸之榮辭延廣延廣大言曰歸語而主語牛倨翻而汝也先帝為北朝所立故稱臣奉表今上乃中國所立所以降志於北朝者正以不敢忘先帝盟約故耳為鄰稱孫足矣無稱臣之理北朝皇帝勿信趙延壽誑誘誑居況翻誘以久翻輕侮中國中國士馬爾所目睹翁怒則來戰孫有十萬橫磨劍足以相待他日為孫所敗敗補邁翻取笑天下毋悔也榮自以亡失貨財恐歸獲罪且欲為異時據驗乃曰公所言頗多懼有遺忘忘巫放翻願記之紙墨延廣命吏書其語以授之榮具以白契丹主契丹主大怒入寇之志始決景延廣建議稱孫不稱臣猶可曰為國體也囚其邸吏而取其貨財則誤國之罪無所逃矣皆縶之幽州不得見桑維翰屢請遜辭以謝契丹每為延廣所沮沮在呂翻帝以延廣有定策功故寵冠㣥臣冠古玩翻又總宿衞兵故大臣莫能與之爭河東節度使劉知遠知延廣必致寇而畏其方用事不敢言劉知遠非不敢言蓋亦有憾於帝而不欲言將坐觀成敗因而利之也奏置興捷武節等十餘軍以備契丹甲午定難節度使李彞殷奏李彞敏作亂之狀難乃旦翻詔執彞敏送夏州斬之冬十月戊申立吳國夫人馮氏為皇后初高祖愛少弟重胤養以為子歐史重胤高祖弟也不知其為親疏高祖愛之養以為子故於名加重而下齒諸子少詩照翻重直龍翻娶副留守安喜馮濛女為其婦安喜縣屬定州劉昫曰安喜漢中山之盧奴縣也慕容垂改為不連北齊改曰安喜隋改為鮮虞唐武德復為安喜定州所治也馮夫人寡居有美色帝見而悅之高祖崩梓宮在殯帝遂納之㣥臣皆賀帝謂馮道等曰皇太后之命與卿等不任大慶㣥臣出帝與夫人酣飲過梓宮前醊而告曰皇太后之命與先帝不任大慶任音壬醊陟衞翻祭而以酒酹地也斬焉衰絰之中觸情縱欲以亂大倫又從而狎侮其先何以能久左右失笑不覺發笑為失笑顧謂左右曰我今日作新壻何如夫人與左右皆大笑太后雖恚而無如之何恚於避翻魯昭公在慼而有嘉容終以失國帝與夫人淪於異域非不幸也既正位中宮頗預政事后兄玉時為禮部郎中鹽鐵判官帝驟擢用至端明殿學士戶部侍郎與議政事漢主命韶王弘雅致仕唐主遣洪州營屯都虞候嚴恩將兵討張遇賢以通事舍人金陵邊鎬為監軍鎬用虔州人白昌裕為謀主擊張遇賢屢破之遇賢禱於神神不復言復扶又翻其徒大懼昌裕勸鎬伐木開道出其營後襲之遇賢棄衆奔別將李台台知神無驗執遇賢以降斬於金陵市去年七月張遇賢作亂於漢境入唐境而亡史言依託怪妄之禍敗降戶江翻十一月丁亥漢主祀南郊大赦改元乾和戊子吳越王弘佐納仰氏仁詮之女也仰仁詮見任於吳越王元瓘詮且緣翻初高祖以馬三百借平盧節度使楊光遠景延廣以詔命取之光遠怒曰是疑我也密召其子單州刺史承祚唐末以宋州之碭山縣梁太祖鄉里也為置輝州已而徙治單父縣後唐滅梁改為單州薛居正五代史唐莊宗同光二年六月改輝州為單州單音善戊戌承祚稱母病夜開門奔青州庚子以左飛龍使金城何超權知單州此應州之金城縣也章十二行本馬下有金帛二字乙十一行本同孔本同以安其意內班蓋宦者也壬寅遣侍衞步軍都指揮使郭謹將兵戍鄆州以防河津使楊光遠不得與契丹交通也唐葬光文肅武孝高皇帝于永陵廟號烈祖十二月乙巳朔遣左領軍衞將軍蔡行遇將兵戍鄆州楊光遠遣騎兵入淄州劫刺史翟進宗歸于青州九域志青州西南至淄州一百二十里翟萇伯翻甲寅徙楊承祚為登州刺史以從其便登州平盧巡屬也光遠益驕密告契丹以晉主負德違盟境內大饑公私困竭乘此際攻之一舉可取趙延壽亦勸之契丹主乃集山後及盧龍兵合五萬人使延壽將之山後即媯檀雲應諸州盧龍幽州軍號此皆天福之初割與契丹之土地人民也契丹用中國之將將中國之兵以攻晉藉寇兵而齎盜糧中國自此胥為夷矣將即亮翻曰若得之當立汝為帝又常指延壽謂晉人曰此汝主也延壽信之由是為契丹盡力畫取中國之策趙延壽為契丹主愚弄鼓舞至死不悟嗜欲深者天機淺也是為于偽翻朝廷頗聞其謀丙辰遣使城南樂及德清軍時置德清軍於澶州清豐縣在州北六十里宋白曰德清軍本舊澶州地晉天福三年移澶州於德勝寨乃於舊澶州置頓丘鎮取縣為名至四年改鎮為德清軍開運元年移德清軍於陸家店在新澶州之北七十里唐侍中周宗年老恭謹自守中書令宋齊丘廣樹朋黨百計傾之宋齊丘之嫌隙開於吳唐禪代之間權利啟人爭心有如此者事見二百八十卷唐主由是薄齊丘既而陳覺被疏乃出齊丘為鎮海節度使陳覺者宋齊丘之黨唐主所親任者也覺疏則齊丘無君側之助乃出被皮義翻表乞歸九華舊隱懟直類翻齊丘隱九華見二百七十七卷唐明宗長興二年唐主知其詐一表即從之賜書曰明日之行昔時相許朕實知公故不奪公志仍賜號九華先生封青陽公食一縣租稅齊丘乃治大第於青陽宋白曰青陽縣本吳臨城縣地赤烏中置隋平陳廢臨城縣為南陵縣唐天寶元年分涇南陵秋浦置青陽縣屬池州以其地在青山之陽也九域志在州東南一百里治直之翻皆如王公而憤邑尤甚寧州酋長莫彥殊以所部溫那等十八州附于楚寧州即唐之南寧州也天寶末沒于蠻唐末復置寧州于清溪鎮去黔州二十九日行酋慈由翻長知兩翻惟立牌於岡阜略以恩威羈縻而已是歲春夏旱秋冬水蝗大起東自海壖西距隴坻壖而宣翻坻丁禮翻南踰江淮章十二行本淮作湖乙十一行本同北抵幽薊原野山谷城郭廬舍皆滿竹木葉俱盡重以官括民穀薊音計重直用翻是年秋七月以年饑用不足括民穀使者督責嚴急至封碓磑不留其食有坐匿穀抵死者縣令往往以督趣不辦納印自劾去民餒死者數十萬口流亡不可勝數碓都內翻舂也磑五對翻䃺也趣讀曰促劾戶概翻又戶得翻勝音升於是留守節度使下至將軍各獻馬金帛芻粟以助國朝廷以恆定饑甚獨不括民穀順國節度使杜威奏稱軍食不足請如諸州例許之杜重威平安重榮即用為恆帥帝即位避帝名去重字止稱威順國軍號亦新改恆戶登翻檢索殆盡索山客翻得百萬斛威止奏三十萬斛餘皆入其家又令判官李沼稱貸於民復滿百萬斛來春糶之稱蚩陵翻舉也復扶又翻糶他弔翻得緡錢二百萬闔境苦之定州吏欲援例為奏援恆州例援于元翻曰吾為觀察使職在養民豈忍效彼所為乎唐節度使率兼觀察使節度之職掌兵觀察之職掌民馬全節之不效杜威是矣鄰於善民之望也杜威曾念及此乎楚地多產金銀茶利尤厚由是財貨豐殖而楚王希範奢欲無厭喜自誇大厭於鹽翻喜許記翻為長槍大槊飾之以金可執而不可用募富民年少肥澤者八千人為銀槍都少詩照翻宮室園囿服用之物務窮侈靡作九龍殿刻沈香為八龍沈持林翻飾以金寶長十餘丈長直亮翻下同抱柱相向希範居其中自為一龍其襆頭腳長丈餘以象龍角襆防玉翻後周武帝製幞頭裁幅巾出四腳至今人服用之唐人其脚向上至宋太祖始為放腳長直亮翻用度不足重為賦斂斂力贍翻下同每遣使者行田專以增頃畝為功民不勝租賦而逃行下孟翻勝音升王曰但令田在何憂無穀民逃則有不耕之土何從得穀乎史言馬希範不知稼穡之艱難募民耕藝出租藝種也僅能自存自西徂東各失其業民無安生樂業之心安能親其上而死其長乎以財多少為官高卑之差富商大賈賈音古布在列位外官還者必責貢獻還從宣翻又如字民有罪則富者輸財強者為兵惟貧弱受刑又置函使人投匿名書相告訐訐居謁翻至有滅族者是歲用孔目官周陟議令常稅之外大縣貢米二千斛中千斛小七百斛無米者輸布帛天策學士拓跋恆上書曰殿下長深宮之中藉已成之業長知兩翻藉慈夜翻身不知稼穡之勞耳不聞鼓鼙之音鼙部迷翻馳騁遨遊雕牆玉食張晏曰玉食珍食也韋昭曰諸侯備珍異之食而浮費益甚百姓困矣而厚斂不息今淮南為仇讎之國番禺懷吞噬之志荊渚日圖窺伺溪洞待我姑息淮南謂唐番禺謂漢荊渚謂高氏溪洞彭莫諸族伺相吏翻民怨傷國願罷輸米之令誅周陟以謝郡縣去不急之務減興作之役無令一旦禍敗為四方所笑王大怒他日恆請見去羌呂翻見賢遍翻辭以晝寢恆謂客將區弘練曰將即亮翻區豈俱翻又音歐今湖南多此姓王逞欲而愎諫愎蒲逼翻吾見其千口飄零無日矣人多謂闔家之人曰百口今曰千口者以其諸侯盛言之遂終身不復見之復扶又翻閩主曦嫁其女取班簿閱視之班簿者簿記朝參名員皆杖之於朝堂以御史中丞劉贊不舉劾劾戶概翻又戶得翻亦將杖之贊義不受辱欲自殺諫議大夫鄭元弼諫曰古者刑不上大夫記曲禮之言上時掌翻豈宜加之箠楚箠止橤翻曦正色曰卿欲效魏徵邪元弼曰臣以陛下為唐太宗故敢效魏徵曦怒稍解乃釋贊贊竟以憂卒開運元年甲辰九四四是年七月方改元春正月乙亥邊藩馳告契丹前鋒將趙延壽趙延照將兵五萬入寇逼貝州邊藩猶言邊鎮也思溫之子也趙思溫本中國人沒於契丹先是朝廷以貝州水陸要衝先悉薦翻多聚芻粟為大軍數年之儲以備契丹軍校邵珂性凶悖校戶教翻珂丘何翻悖蒲妹翻又蒲沒翻永清節度使王令溫黜之時置永清軍於貝州密遣人亡入契丹言貝州粟多而兵弱易取也易以豉翻會令溫入朝執政以前復州防禦使吳巒權知州事天福初吳巒堅守雲州以拒契丹故朝廷用之推誠撫士會契丹入寇巒書生無爪牙珂自請願效死巒使將兵守南門巒自守東門契丹主自攻貝州巒悉力拒之燒其攻具殆盡己卯契丹復攻城復扶又翻珂引契丹自南門入巒赴井死契丹遂陷貝州所殺且萬人庚辰以歸德節度使高行周為北面行營都部署以河陽節度使苻彥卿為馬軍左廂排陳使苻當作符鄭樵氏族略曰魯頃公為楚所滅頃公之孫公雅為秦符節令因以為氏後漢有符融皇朝有符彥卿望出琅邪非苻秦之苻也陳讀曰陣下同以陝府節度使王周為步軍左廂排陳使以左羽林將軍潘環為步軍右廂排陳使陝失冉翻太原奏契丹入鴈門關鴈門關即陘嶺關恆戶登翻成德節度使杜威自安重榮反死晉改成德軍為順國軍史以舊軍名書之耳為陳禍福為于偽翻光遠遣光裔入奏稱承祚逃歸母疾故爾去年十一月楊承祚自單州逃歸青州闔族荷恩荷下可翻朝廷信其言遣使與光裔復往慰諭之復扶又翻唐以侍中周宗為鎮南節度使左僕射兼門下侍郎同平章事張居詠為鎮海節度使唐主決欲傳位於齊燕二王傳位之議始於去年七月燕於賢翻亶辛巳敕齊王景遂參決庶政百官惟樞密副使魏岑查文徽得白事查鉏加翻餘非召對不得見國人大駭給事中蕭儼上疏極論不報考異曰江南錄此敕在去年十二月今從十國紀年紀年云宋齊丘上疏今從江南錄見賢遍翻曰臣事先帝三十年觀其延接疏遠孜孜不怠下情猶有不通者陛下新即位所任者何人而頓與㣥臣謝絕臣老矣不復得奉顏色因涕泗嗚咽詩涕泗滂沱註云自目曰涕自鼻曰泗遽收前敕唐主於宮中作高樓召侍臣觀之衆皆歎美蕭儼曰恨樓下無井唐主問其故對曰以此不及景陽樓耳陳後主起景陽樓隋兵至自投於樓下井中蕭儼引亡國以諫也貶於舒州觀察使孫晟遣兵防之儼曰儼以諫諍得罪非有他志昔顧命之際君幾危社稷謂孫晟欲使太后臨朝也幾居依翻今日反見防邪晟慙懼遽罷之帝遣使持書遺契丹遺唯季翻契丹已屯鄴都時契丹屯於鄴都城外壬午以侍衞馬步都指揮使景延廣為御營使前靜難節度使李周為東京留守難乃旦翻是日高行周以前軍先發時用兵方略號令皆出延廣宰相以下皆無所預延廣乘勢使氣陵侮諸將雖天子亦不能制為罷景延廣張本乙酉帝發東京丁亥滑州奏契丹至黎陽黎陽在滑州西岸隔大河耳故奏其事戊子帝至澶州澶州時據德勝津契丹主屯元城劉昫曰魏州元城隋縣治古殷城唐貞觀十七年併入貴鄉聖曆二年分貴鄉莘縣置元城縣治王莽城開元十三年移治郭下古殷城在朝城東北十二里時契丹主蓋屯古殷城也南樂即唐魏州之昌樂縣後唐避其祖李國昌諱改曰南樂九域志南樂縣在魏州南四十四里樂音洛封魏王此契丹主所命也契丹寇太原劉知遠與白承福合兵二萬擊之甲午以知遠為幽州道行營招討使杜威為副使馬全節為都虞候丙申遣右武衞上將軍張彥澤等將兵拒契丹於黎陽戊戌蜀主復以將相遙領節度使蜀罷將相領節見二百八十二卷高祖天福六年蜀主之廣政五年也帝復遣譯者孟守忠致書於契丹求脩舊好復扶又翻好呼到翻契丹主復書曰已成之勢不可改也辛丑太原奏破契丹偉王於秀容秀容漢汾陽縣地隋自秀容故城移於此因更縣名唐帶忻州契丹自鴉鳴谷遁去自鴉鳴谷出潞州東與契丹主大軍合殷鑄天德通寶大鐵錢一當百唐主遣使遺閩主曦及殷主延政書責以兄弟尋戈遺唯季翻左傳鄭子產曰昔高辛氏有二子伯曰閼伯季曰實沈居于曠林不相能也日尋干戈以相征討曦復書引周公誅管蔡唐章十二行本空格作太宗二字乙十一行本同孔本同熊校同誅建成元吉為比延政復書斥唐主奪楊氏國唐主怒遂與殷絕為唐滅殷張本天平節度副使知鄆州顏衎遣觀察判官竇儀奏博州刺史周儒以城降契丹九域志鄆州西北至博州一百七十里衎苦旦翻又音侃引契丹自馬家口濟河擒左武衞將軍蔡行遇去年十二月遣蔡行遇戍鄆州虜若濟河與光遠合則河南危矣延廣然之儀薊州人也薊音計章錫琛標點聶崇岐覆校
