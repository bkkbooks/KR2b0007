body:
  text: 資治通鑑卷第三十八翰林學士朝散大夫右諫議大夫知制誥兼侍講同提舉萬壽觀公事兼判集賢院上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣奉敕編集後學天台音注漢紀三十天鳳二年王莽下天鳳二年乙亥一五天鳳二年春二月大赦天下天鳳二年民訛言黃龍墜死黃山宮中晉灼曰黃山宮在槐里黃圖黃山宮在興平縣西三十里莽惡之師古曰莽自謂黃德故有此妖惡烏路翻問章十二行本問下有語字乙十一行本同孔本同張校同所從起不能得天鳳二年單于咸既和親求其子登尸莽欲遣使送致恐咸怨恨憲使者乃收前言當誅侍子者故將軍陳欽以他罪殺之誅侍子事見上卷始建國三年使疏吏翻夏五月莽復遣和親侯歙與咸等送右廚唯姑夕王因奉歸前所斬侍子登及諸貴人從者喪濟子禮翻歙許及翻復扶又翻從才用翻喪息琅翻且子余翻咸到單于庭陳莽威德莽亦多遺單于金珍因諭説改其號遺于季翻説輸芮翻號胸奴曰恭奴單于曰善于賜印綬封骨都侯當為後安公當子男奢為後安侯單于貪莽金幣故曲聽之然寇盜如故天鳳二年莽意以為制定則天下自平故鋭思於地理制禮作樂講合六經之説思相吏翻公卿旦入暮出論議連年不決不暇省獄訟冤結省悉井翻民之急務縣宰缺者數年守兼師古曰不拜正官權令人守兼中郎將繡衣執法在郡國者並乘權勢傳相舉奏傳知戀翻又十一公士分布勸農桑班時令按諸章應劭曰士掾也余按漢公府各有掾屬莽置十一公改掾曰士交錯道路召會吏民逮捕證左左音佐郡縣賦斂斂力贍翻遞相賕賂白黑紛然師古曰白黑謂清濁也紛然亂之意言清濁不分也余謂白黑色之易別者且紛然不能分可謂繆亂之甚莽自見前顓權以得漢政故務自攬衆事有司受成苟免師古曰莽事事自決成熟乃以付吏吏苟免罪責而已帑他朗翻藏徂浪翻吏民上封事宦官左右開發尚書不得知舊上封事者先由尚書乃奏御莽恐尚書壅蔽令宦官左右發其封自省之上時掌翻又好變改制度好呼到翻政令煩多當奉行者輒質問乃以從事前後相乘憒眊不泄師古曰乘積也登也憒眊不明也泄散也徹也憒音工內翻眊音莫報翻余謂前者省決未了而後者復來謂之相乘泄音泄清也猶不能勝勝音升尚書因是為姦寢事上書者尚書者尚書不以聞而竊寢其事拘繫郡縣者逢赦而後出衛卒不交代者至三歲穀糴常貴邊兵二十餘萬人仰衣食縣官師古曰仰音牛向翻五原代郡尤被其毒被皮義翻起為盜賊數千人為輩轉入旁郡莽遣捕盜將軍孔仁將兵與郡縣合擊歲餘乃定天鳳二年邯鄲以北大雨水出深者數丈流殺數千人邯鄲音寒丹三年三年春二月乙酉地震大雨雪雨于具翻關東尤甚深者一丈竹柏或枯竹柏冬青或至於枯言常寒之咎以地震乞骸骨莽不許曰夫地有動有震震者有害動者不害春秋記地震易繫坤動動靜辟翕萬物生焉師古曰辟音闢闢開也易上繫之辭曰夫坤其動也闢其靜也翕是以廣生焉故莽引之也其好自誣飾好呼到翻皆此類也三年先是莽以制作未定先悉薦翻上自公侯下至小吏皆不得俸祿俸扶用翻夏五月莽下書曰豫遭陽九之厄傳曰三統之元有陰陽之九焉天地之常數也國用不足民人騷動自公卿以下一月之祿十緵布二匹孟康曰緵八十縷也師古曰緵音子公翻帛繒也未嘗不戚焉今厄會已度府帑雖未能充帑他朗翻略頗稍給其以六月朔庚寅始賦吏祿皆如制度賦布也與也凡十五等左傳曰人有十等王臣公公臣大夫大夫臣士士臣皂皂臣輿輿臣隸隸臣僚僚臣僕僕臣臺今莽自四輔以下分為十五等稍以差稱章十二行本稱作增乙十一行本同孔本同稱尺證翻上至四輔而為萬斛云莽又曰古者歲豐穰則充其禮師古曰穰音人掌翻又音如羊翻有災害則有所損與百姓同憂喜也其用上計時通計上時掌翻天下幸無災害者太官膳羞備其品矣即有災害以什率多少而損膳焉以十為率視災害所減多少而制分數六司即前所置六監也東嶽太師立國將軍保東方三州一部二十五郡南嶽太傅前將軍保南方二州一部二十五郡西嶽國師寧始將軍保西方二州二部三十五郡北嶽國將衛將軍保北方二州一部二十五郡大司馬保納卿言卿仕卿作卿京尉扶尉兆隊中部左洎前七部大司徒保樂卿典卿宗卿秩卿翼尉光尉左隊前隊中部右部有五郡大司空保豫卿虞卿共卿工卿師尉烈尉祈隊後隊中部洎後十郡及六司六卿皆隨所屬之公保其災害郎從官中都官吏食祿都內之委者從才用翻委於偽翻委積也以太官膳羞備損而為節冀上下同心勸進農業安元元焉莽之制度煩碎如此課計不可理吏終不得祿各因官職為姦受取賕賂以自共給焉師古曰共讀曰供三年戊辰長平館西岸崩壅涇水不流毀而北行長平館即長平觀在涇水之南原涇水東南流入渭為岸所壅故毀而北行以為河圖所謂以土填水師古曰填讀與鎮同胸奴滅亡之祥也莽乃遣並州牧宋弘遊擊都尉任萌等將兵擊胸奴任音壬將即亮翻至邊止章十二行本止作上乙十一行本同孔本同張校同退齋校同屯三年秋七月辛酉霸城門災黃圖霸城門長安城東出南頭第一門亦曰青門三年戊子晦日有食之大赦天下三年平蠻將軍馮茂擊句町句町音劬挺士卒疾疫死者什六七賦斂民財什取五斂力贍翻下同益州虛耗而不克徵還下獄死下遐稼翻冬更遣寧始將軍廉丹與庸部牧史熊孟康曰莽改益州為庸部余按莽置州牧部監州自是州部自是部今史熊為庸部牧則又若州部牧為一廣漢巴蜀犍為吏民十萬人犍居言翻轉輸者合二十萬人擊之始至頗斬首數千其後軍糧前後不相及士卒飢疫莽徵丹熊丹熊願益調度必克乃還復大賦斂調徒弔翻復扶又翻下同斂力贍翻就都大尹馮英不肯給莽於蜀郡廣都縣置就都大尹自西南夷反叛以來積且十年郡縣距擊不已上時掌翻續用馮茂苟施一切之政僰道以南地理志僰道縣屬犍為郡僰音蒲北翻多驅衆遠居驅與驅同吏士罹毒氣死者什七今丹熊懼於自詭期會調發諸郡兵穀復訾民取其什四師古曰發人訾財十取其四也訾與資同功終不遂莽改益州曰梁州師古曰遂成也爾雅注梁州以西方金氣剛強強梁也明設購賞莽怒免英官後頗覺寤曰英亦未可厚非復以英為長沙連率率所類翻越巂蠻夷任貴亦殺太守枚根章十二行本根下有自立為邛穀王六字乙十一行本同孔本同張校同退齋校同巂音髓任音壬師古曰枚根者太守之姓名三年翟義黨王孫慶捕得莽使太醫尚方與巧屠共刳剝之師古曰刳剖也音口胡翻量度五臧五臟心肺肝脾腎也周禮有九藏注曰正藏五又有胃旁胱大腸小腸疏曰正藏五者肺脾心肝腎又有胃旁胱大腸小腸者此乃六府中取此四者以益五藏為九藏也六府胃小腸大腸旁胱膽三焦以其受盛故謂之為府亦有藏稱故入九藏之數然六府取此四者按黃帝八十一難經説胃為水穀之府小腸為受盛之府大腸為行道之府旁胱為精液之府氣之所生下氣象天故放寫而不實實不滿若然則正府也故入九藏其餘膽者清淨之府三焦為孤府非正府故不入九藏師古曰度音大各翻臧讀曰臟知所終始云可以治病師古曰筳竹挺也音庭按醫書脈有三部六經心部在左手寸口屬手少陰經與小腸手太陽經合肝部在左手關上屬足厥陰經與膽足少陽經合腎部在左手尺中屬足少陰經與膀胱足太陽經合肺部在右手寸口屬手太陰經與大腸手陽明經合脾部在右手關上屬足太陰經與胃足陽明經合右腎在右手尺中屬手厥陰心包經與三焦手少陽經合手少陰之脈起於心中出屬心系下膈絡小腸其支者從心系上俠咽系目系其直者復從心系卻上肺出腋下下循臑內後廉行太陰心主之後下肘內廉循臂內後廉抵掌後兌骨之端入掌內廉循小指之內出其端手太陽之脈起於小指之端循手外側上腕出踝中直上循臂骨下廉出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支別者從缺盆循頸上頰至目兌眥卻入耳中其支者別頰上䪼抵鼻至目內眥足厥陰之脈起於大指聚毛之際上循足跗上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循股入陰毛中環陰器抵小腹俠胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其支從目系下頰裏環脣內其支復從肝貫膈上注肺足少陽之脈起於目兌眥上抵頭角下耳後循頸行手少陽之脈前至肩上卻交出少陽之後入缺盆其支別者從耳中出走耳前至目兌眥後其支別者自兌眥下大迎合手少陽於䪼下交頰車下頸合缺盆下胸中貫膈絡肝屬膽循脅裏出氣街繞髮際橫入髀厭中直者從缺盆下腋循胸迥季脅下合髀厭中以下循髀太陽出膝外廉下外輔骨之前直下抵絶骨之端下出外踝之前循足跗上入小指次指之間其支者從跗上入大指循瞌骨出其端還貫入爪甲出三毛足少陰之脈起於小指之下斜趣足心出然谷之下循內踝之後別入跟中上月專內出膕內廉上股內後廉貫脊屬腎絡膀胱其直者從腎上貫肝膈入肺中循喉嚨俠舌本其支從肺出絡心注胸中足太陽之脈起於目內眥上額交巔上其支別者從巔至耳上角其直行者從巔入絡腦還出別下項循肩膊內俠脊抵腰中入循膂絡腎屬膀胱其支別者從腰中下貫臀入膕中其支別者從膊左內右別下貫胛俠脊內過髀樞循髀外後廉下合膕中下貫月專內出外踝之後循京骨至小指外端手太陰之脈起於中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循臑肉行少陰心主之前下肘中循臂內上骨下廉入寸口上循魚際出大指之端其支者從腕後直出次指內廉出其端手陽明之脈起於大指次指之端循指上廉出合谷兩肩之間上入兩筋之中循臂上廉入肘外廉循臑內前廉上肩出髃肩之前廉上出柱骨之會上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰下入齒縫中還出俠口交人中左之右右之左上俠鼻孔足太陰之脈起於大指之端循指內側白肉際過竅骨後上內踝前廉上臑肉循骨行骨後交出厥陰之前上循膝股內前廉入腹屬脾絡腎上膈俠咽連舌本散舌下其支復從胃別上膈注心中足陽明之脈起於鼻交頞中下循鼻外入上齒中還出俠口環脣下交承漿卻循頤後下廉出大迎承頰車上耳前過客主入循髮際至額顱其支者從人迎前下人迎循喉嚨入缺盆下膈屬胃絡脾其直行者從缺盆下乳內廉下俠臍入氣充中其支者起胃下口循腹裹下至氣充而合以下髀關抵伏兔下入膝臏中下循骨行外廉下足跗入中指內間其支者下膝三寸而別以下入大指間出其端手厥陰之脈起於胸中出屬心包下膈歷絡三焦其支者循胸出脅下腋三寸上抵腋下下循臑內行太陰少陰之間入肘內行兩筋之間入掌中循中指出其端手少陰之脈起於小指次指之端上出次指之間循出表腕出臂外兩骨之間上貫肘循臑內上肩交出足少陽之後入缺盆交膻中散絡心包下膈遍屬三焦其支者從膻中上出缺盆上項俠耳後直出上耳上角以屈下頰至䪼其支者從耳從入耳中卻出至目兌眥師古曰云可以治病者以知血脈之原則盡攻療之道也三年是歲遣大使五威將王駿西域都護李崇戊己校尉郭欽出西域諸國皆郊迎送兵穀駿欲襲擊之焉耆詐降而聚兵自備降戶江翻駿等將莎車龜茲兵七千餘人分為數部將即亮翻下同莎素何翻龜茲音丘慈命郭欽及佐帥何封別將居後帥所類翻駿等入焉耆焉耆伏兵要遮駿及姑墨封犂危須國兵為反間姑墨國王治南城去長安八千一百五十里封犂漢書作尉犂要一遙翻間古莧翻章十二行本駿下有等字乙十一行本同孔本同張校同皆殺之欽章十二行本欽下有封字乙十一行本同孔本同後至焉耆焉耆兵未還欽襲擊殺其老弱從車師還入塞莽拜欽為填外將軍師古曰填音竹刃翻封劋胡子師古曰劋絶也音子小翻何封為集胡男李崇收餘士還保龜茲龜茲音丘慈及莽敗崇沒西域遂絶四年四年夏六月莽更授諸侯王章十二行本無王字乙十一行本同茅土於明堂親設文石之平陳菁茅四色之土師古曰尚書禹貢包匭菁茅儒者以為菁菜名也茅三脊茅也而莽此言以菁茅為一物則是謂善茅為菁茅也土有五色而此云四者中央之土不以封也春秋大傳曰天子之國有泰社東方青南方赤西方白背方黑上方黃故將封於東方者取青土封於南者取赤土封於西者取白土封於北者取黑土各取其方土裹以白茅封以為社此始受封於天子者也此之謂主土主土者立社以奉之也菁音精莽好空言好呼到翻慕古法多封爵人性實吝嗇託以地理未定故且先賦茅土用慰喜封者四年秋八月莽親之南郊鑄作威斗以五石銅為之李奇曰以五色藥石及銅為之蘇林曰以五色銅礦治之師古曰李説是也若今作鍮石之為長二尺五寸長直亮翻欲以厭勝衆兵師古曰厭音一葉翻令司命負之莽出在前入在御旁四年莽置羲和命士以督五均六管鹽一也酒二也鐵三也名山大澤四也五均賒貸五也鐵布銅冶六也皆用富賈為之賈音古乘傳求利傳知戀翻交錯天下因與郡縣通姦多張空簿師古曰簿計簿也音步戶翻府藏不實藏徂浪翻百姓愈病是歲莽復下詔申明六管下遐稼翻每一管為設科條防禁為于偽翻犯者罪至死姦民猾吏並侵衆庶各不安生又一切調上公以下諸有奴婢者調徒釣翻率一口出章十二行本出下有錢字乙十一行本同孔本同三千六百天下愈愁納言馮常以六管諫莽大怒免常官法令煩苛民搖手觸禁不得耕桑繇役煩劇師古曰繇讀曰徭而枯旱蝗蟲相因獄訟不決吏用苛暴立威旁緣莽禁師古曰旁依也音步浪翻侵刻小民富者不能章十二行本無能字乙十一行本同孔本同張校同自別章十二行本別作保乙十一行本同孔本同張校同別彼列翻貧者無以自存於是並起為盜賊依阻山澤吏不能禽而覆蔽之浸淫日廣覆敷救翻師古曰浸淫猶漸染也余謂此以水為諭漸浸而至於淫溢也臨淮瓜田儀章十二行本儀下有等字乙十一行本同孔本同張校同依阻會稽長州服虔曰姓瓜田名儀師古曰長州即枚乘所云長州之苑余謂今蘇州長洲縣即其地會工外翻殺海曲宰入海中為盜莽改縣令長曰宰初呂母子為縣吏為宰所冤殺母散家財以酤酒買弓弩陰厚貧窮少年得百餘人遂攻海曲縣殺其宰以祭子墓地理志海曲縣屬琅邪郡賢曰故城在密州莒縣東至萬數荊州飢饉民衆入野澤掘鳧茈而食之荊州部南陽南郡桂陽武陵零陵江夏等郡爾雅曰芍鳧茈郭璞曰生下田中苗似龍鬚而細根如指根黑色可食茈音才支翻芍音胡了翻更工衡翻新市人王匡王鳳為平理諍訟地理志新市縣屬江夏郡為于偽翻諍與爭同晉王沈釋時論闒茸勇敢於叨諍叶韻平聲古字多假借用也衆數百人孔安國曰渠大也帥所類翻皆往從之共攻離鄉聚臧於緑林山中賢曰離鄉聚謂諸鄉聚離散去城郭遠者大曰鄉小曰聚前書曰收合離鄉置大城中即其義也緑林山在今荊州當陽縣東北余按郡國志新市侯國有離鄉聚緑林山則以離鄉為聚名聚才喻翻臧古藏字又有南郡張霸江夏羊牧等與王匡俱起衆皆萬人莽遣使者即赦盜賊即就也就其相聚為盜處而赦之也盜賊解輒復合復扶又翻問其故皆曰愁法禁煩苛不得舉手力作所得不足以給貢稅閉門自守又坐鄰伍鑄錢挾銅姦吏因以愁民民窮悉起為盜賊莽大怒免之其或順指言民驕黠當誅黠下八翻及言時運適然且滅不久莽説輒遷官説讀曰悅五年五年春正月朔北軍南門災北軍壘門之南出者也五年以大司馬司允費興為荊州牧見問到部方略引見而問其方略也見賢遍翻荊揚之民率依阻山澤以漁采為業師古曰漁謂捕魚也采謂采取蔬果之屬稅山澤妨奪民之利連年久旱百姓飢窮故為盜賊興到部欲令明曉告盜賊歸田里假貸犂牛種食種章勇翻闊其租賦師古曰闊寬也莽怒免興官五年天下吏以不得俸祿俸扶用翻並為姦利郡尹縣宰家纍千金莽乃考始建國二年胡虜猾夏以來諸軍吏及緣邊吏大夫以上為姦利增産致富者收其家所有財産五分之四以助邊急助邊費之急也傳知戀翻考覆貪叨師古曰叨音土高翻開吏告其將將即亮翻奴婢告其主冀以禁姦而姦愈甚五年莽孫功崇公宗坐自畫容貌被服天子衣冠刻三印發覺自殺莽傳功崇公國於穀城郡三印一曰維祉冠存已夏處南山臧薄冰二曰肅聖寶繼三曰德封昌圖畫古畫通被皮義翻坐祝詛姑祝職救翻詛莊助翻殺婢以絶口與興皆自殺五年是歲揚雄卒初成帝之世雄為郎給事黃門與莽及劉秀並列哀帝之初又與董賢同官莽賢為三公權傾人主所薦莫不拔擢而雄三世不徙官及莽篡位雄以耆老久次轉為大夫恬於勢利師古曰恬安也好呼到翻樂音洛欲以文章成名於後世乃作太玄以綜天地人之道桓談曰揚雄作玄書以為玄者天也道也言聖賢制法作事皆引天道以為本統而因附屬萬類王政人事法度故伏羲氏謂之易老子謂之道孔子謂之元揚雄謂之玄玄經三篇以紀天地人之道立三體有上中下如禹貢之陳三品三三而九因以九九八十一故為八十一卦以四為數數從一至四重纍變易竟八十一而遍不可增損以三十五蓍揲之玄經五千餘言而傳十二篇師古曰舛相背即為怪迂析辨詭辭以撓世事師古曰大抵大歸也詆訾毀也迂遠也析分也詭異也言諸子之書大歸皆非毀周孔之教為巧辨異辭以撓亂時政也訾音紫迂音于撓音火高翻終破大道而惑衆使溺於所聞而不自知其非也故人時有問雄者常用法應之號曰法言用心於內不求於外於時人皆忽之師古曰忽謂輕也而桓談以為絶倫師古曰無比類服虔曰茅音葩大司空王邑納言嚴尤聞雄死謂桓談曰子常稱揚雄書豈能傳於後世乎談曰必傳顧君與談不及見也凡人賤近而貴遠親見揚子雲祿位容貌不能動人揚雄字子雲昔老聃緑虛無之言兩篇師古曰謂道德經也非禮學然後好之者尚以為過於五經好呼到翻自漢文景之君及司馬遷皆有是言今揚子之書文義至深而論不詭於聖人師古曰詭違也聖人謂周公孔子五年琅邪樊崇起兵於莒莒縣班志屬城陽國續漢志屬琅邪國邪音耶轉入太山㣥盜以崇勇猛皆附之一歲間至萬餘人崇同郡人逄安賢曰逄音龐東海人徐宣謝祿楊音各起兵合數萬人復引從崇復扶又翻共還攻莒不能下轉掠青徐間又有東海刀子都刁作力章作刀者刻誤十二行本正作刁乙十一行本同熊校同按下二卷胡均有説姓譜力黃帝佐力牧之後漢有力子都鈔楚交翻莽遣使者發郡國兵擊之不能克五年烏纍單于死纍力追翻弟左賢王輿立為呼都而尸道皋若鞮單于鞮丁奚翻輿既立貪利賞賜遣大且渠奢與伊墨居次云女弟之子醯櫝王且子余翻師古曰櫝音讀俱奉獻至長安莽遣和親侯歙與奢等俱至制虜塞下與云及須卜當會因以兵迫脅云當將至長安云當小男從塞下得脫歸胸奴當至長安莽拜為須卜單于欲出大兵以輔立之兵調度亦不合調徒弔翻而胸奴愈怒並入北邊為寇六年六年春莽見盜賊多乃令太史推三萬六千歲曆紀六歲一改元布天下下書自言己當如黃帝仙升天欲以誑耀百姓銷解盜賊衆皆笑之六年初獻新樂於明堂太廟新樂莽所作也六年更始將軍廉丹擊益州不能克丹蓋自寧始將軍遷更始將軍更工衡翻越巂夷人大牟亦叛殺略吏人按後漢書棟蠶若豆益州夷兩種也大牟越巂姑復縣夷人巂音髓更遣大司馬護軍郭興庸部牧李曅擊蠻夷若豆等更工衡翻太傅羲叔士孫喜清潔江湖之盜賊莽以太傅主夏故置羲叔官士孫復姓姓譜漢平陵士孫張為博士明梁丘易莽乃大募天下丁男及死罪囚吏民奴名曰豬突豨勇以為鋭卒服虔曰豬性觸突人故以為諭師古曰東方人名豕曰豨一曰豨豕走也音許豈翻訾三十取一訾與資同令公卿以下至郡縣黃綬皆保養軍馬續漢志四百石三百石二百石黃綬師古曰保者不許其死傷吏盡復以與民師古曰轉令百姓養之技渠綺翻將待以不次之位言便宜者以萬數或言能渡水不用舟楫師古曰楫所以刺舟也濟百萬師或言不持斗糧服食藥物三軍不飢或言能飛一日千里可窺胸奴莽輒試之取大鳥翮為兩翼師古曰羽本曰翮音胡隔翻頭與身皆緑毛緑側略翻通引環紐紐女九翻飛數百步墮莽知其不可用苟欲獲其名皆拜為理軍賜以車馬待發初莽之欲誘迎須卜當也大司馬嚴尤諫曰當在胸奴右部兵不侵邊單于動靜輒語中國語牛倨翻此方面之大助也于今迎當置長安稿街一胡人耳不如在胸奴有益莽不聽既得當欲遣尤與廉丹擊胸奴皆賜姓徵氏號二徵將軍令誅單于輿而立當代之出車城西橫廣既未發尤素有智略非莽攻伐四夷數諫不從數所角翻及當出廷議尤固言胸奴可且以為後先憂山東盜賊莽大怒策免尤六年大司空議曹史代郡范升漢公府諸曹有掾有史有屬皆公自辟置升聞子以人不間於其父母為孝間古莧翻臣以下不非其君上為忠賢曰論語孔子曰孝哉閔子騫人不間於其父母之言間非也言子騫之孝化其父母言人無非之者忠臣事君有過即諫在下無有非其君者是忠臣也朝直遙翻下同皆曰公明蓋明者無不見聖者無不聞今天下之事昭昭於日月震震於雷霆而朝云不見公云不聞則元元焉所呼天元元民也良善之民師古曰元元善意也焉於虔翻則過小矣知而從令則過大矣二者於公無可以免宜乎天下歸怨於公矣朝以遠者不服為至念升以近者不悅為重憂遠者不服謂四夷也近者不悅謂人心不便於莽之法令也事與道反馳騖覆車之轍踵循敗事之後後出益可怪晚發愈可懼耳方春歲首而動發遠役藜藿不充田荒不耕穀價騰躍斛至數千吏民陷於湯火之中非國家之民也如此則胡貊守闕青徐之寇在於帷帳矣謂京輔之民亦將為變也可以解天下倒縣縣讀曰懸免元元之急不可書傳願蒙引見極陳所懷邑不聽六年翼平連率田況奏郡縣訾民不實地理志北海壽光縣莽曰翼平師古曰言舉百姓訾財不以實數率所類翻訾與資同章十二行本正作資孔本同以況忠言憂國進爵為伯賜錢二百萬衆庶皆詈之青徐民多棄鄉里流亡老弱死道路壯者入賊中六年夙夜連率韓博地理志東萊不夜縣莽曰夙夜有奇士長丈大十圍長直亮翻來至臣府章十二行本府下有曰字乙十一行本同孔本同欲奮擊胡虜自謂巨毋霸出於蓬萊東南五城西北昭如海瀕師古曰昭如海名瀕崖也神仙家言蓬萊有五城十二樓軺音遙小車三馬不能勝勝音升即日以大車四馬建虎旗載霸詣闕霸臥則枕鼓以鐵箸食枕職任翻箸遲倨翻此皇天所以輔新室也願陛下作大甲高車賁育之衣遣大將一人與虎賁百人賁音奔迎之於道京師門戶不容者開高大之以示百蠻鎮安天下博意欲以風莽以莽字巨君諷言毋得篡盜而霸風讀曰諷惡之惡烏路翻留霸在所新豐師古曰在所謂其見到之處謂因文母太后而霸王符也師古曰莽字巨君若言文母出此人而使我致霸王更音古衡翻下獄下遐嫁翻以非所宜言棄市六年關東飢旱連年刁子都等黨衆寖多至六七萬地皇元年庚辰二六年春正月乙未赦天下改元曰地皇從三萬六千歲曆號也六年莽下書曰方出軍行師敢有趨歡犯法者輒論斬毋須時師古曰趨歡謂趨走而歡譁也須待也歡許元翻百姓震懼道路以目韋昭曰不敢發言以目相眄而已六年莽見四方盜賊多復欲厭之復扶又翻師古曰厭音一葉翻又下書曰豫之皇初祖考黃帝定天下將兵為大將軍內設大將外置大司馬五人大將軍至士吏凡七十三萬八千九百人士千三百五十萬人豫受符命之文稽前人將條備焉於是置前後左右中大司馬之位賜諸州牧至縣宰皆有大將軍偏裨校尉之號焉州牧為大將軍卒正連率大尹為偏將軍屬令長為裨將軍縣宰為校尉日且十輩倉無見穀以給師古曰見謂見在也傳知戀翻見賢遍翻賦取道中車馬師古曰於道中行者即執取之以充事也六年秋七月大風毀王路堂莽改未央宮前殿曰王路堂服虔曰如言路寢也路大也乃壬午餔時有烈風雷雨發屋折木之變餔食也餔時食時也或曰餔即晡時日加申為晡師古曰烈風烈暴之風折而設翻伏念一旬迷乃解矣師古曰先言烈風雷雨後言迷乃解矣蓋取舜烈風雷雨弗迷以為言也章十二行本命下有文字乙十一行本同孔本同張校同退齋校同立安為新遷王臨國洛陽為統義陽王議者皆曰臨國洛陽為統謂據土中為新室統也宜為皇太子自此後臨久病雖瘳不平言疾雖有瘳不能平復如其初也名不正惟即位以來陰陽未和穀稼鮮耗師古曰鮮少也耗減也鮮音先踐翻寇賊姦宄夏戶雅翻人民征營無所錯手足師古曰征營惶恐不自安之意也錯七故翻在名不正焉其立安為新遷王服虔曰安莽第三子也遷音仙莽改汝南新蔡曰新遷師古曰遷猶仙耳不勞假借音六年莽又下書曰寶黃厮赤服虔曰以黃為寶自用其行氣也厮赤厮役賤者皆衣赤賤漢行也厮音斯從才用翻衣於既翻六年望氣為數者多言有土功象九月甲申莽起九廟於長安城南九廟祖廟五親廟四高十七丈高居傲翻餘廟半之制度甚盛博徵天下工匠及吏民以義入錢穀助作者駱驛道路師古曰駱驛言不絶功費數百餘萬卒徒死者萬數六年是月大雨六十餘日六年巨鹿男子馬適求等謀舉燕趙兵以誅莽師古曰馬適姓也求名也以聞莽遣三公大夫逮治黨與連及郡國豪桀數千人皆誅死封丹為輔國侯六年莽以私鑄錢死及非沮寶貨投四裔事見上卷始建國二年沮在呂翻不可勝行勝音升乃更輕其法私鑄作泉布者與妻子沒入為官奴婢吏及比伍知而不舉告與同罪師古曰比音頻寐翻又頻脂翻非沮寶貨民罰作一歲吏免官六年太傅平晏死以豫虞唐尊為太傅尊曰國虛民貧咎在奢泰乃身短衣小褎乘牝馬柴車藉稿以瓦器飲食師古曰柴車即棧車藉稿去蒲蒻也褎古袖字余按漢氏之盛乘牸牝者禁不得會聚至鄉閭阡陌皆然朝市之間從可知矣尊為上公而乘牝亦以矯世也遺于季翻出見男女不異路者尊自下車以象刑赭幡污染其衣師古曰赭幡以赭汁漬巾幡汚烏故翻説讀曰悅下詔申敕公卿思與厥齊師古曰令與尊同此操行也論語稱孔子曰見賢思齊故莽云然六年汝南郅惲明天文曆數以為漢必再受命上書説莽曰惲於粉翻説輸芮翻上天垂戒欲悟陛下令就臣位取之以天還之以天可謂知命矣莽大怒繫惲詔獄踰冬會赦得出二年二年春正月莽妻死諡曰孝睦皇后初莽妻以莽數殺其子數所角翻莽殺子獲見三十四卷哀帝建平二年通鑑書於三十五卷元壽元年殺子宇見三十六卷平帝元始三年涕泣失明莽令太子臨居中養焉養余亮翻莽妻旁侍者原碧莽幸之臨亦通焉恐事泄謀共殺莽臨妻愔國師公女師古曰愔音一尋翻能為星語臨宮中且有白衣會晉書天文志木與金合為白衣之會土與金合亦為白衣之會言宮中者以所會之舍占而知之語牛倨翻以為所謀且成後貶為統義陽王出在外第愈憂恐會莽妻病困臨豫書曰豫讀曰與上於子孫至嚴前長孫中孫年俱三十而死宇字長孫獲字中孫獲先死安得俱年三十乎長知兩翻中讀曰仲今臣臨復適三十誠恐一旦不保中室則不知死命所在李奇曰中室臨之母也晉灼曰長樂宮中殿也師古曰二説皆非也臨自言欲於室中自保全不可得耳復扶又翻下同見其書大怒疑臨有惡意不令得會喪既葬收原碧等考問具服姦謀殺狀莽欲祕之使殺案事使者司命從事埋獄中司命從事司命之屬官也賜臨藥臨不肯飲自刺死刺七亦翻又詔國師公臨本不知星事從愔起愔亦自殺二年是月新遷王安病死初莽為侯就國時哀帝初莽就國元壽元年召還京師生子興匡皆留新都國以其不明故也師古曰言侍者或與外人私通所生子不可分明也莽乃以王車遣使者迎興匡封興為功修公匡為功建公二年卜者王況謂魏成大尹李焉曰莽改魏郡曰魏成漢家當復興李氏為輔因為焉作讖書合十餘萬言因為于偽翻事發莽皆殺之二年莽遣太師羲仲景尚莽以太師主春其屬置羲仲官諸將軍皆置護軍國師和仲曹放助郭興擊句町葬以國師主秋故置和仲句町音劬挺軍師放縱百姓重困重直用翻二年莽又轉天下穀帛詣西河五原朔方漁陽每一郡以百萬數欲以擊胸奴須卜當病死莽以庶女妻其子後安公奢莽女捷侍者開明所生也以妻奢李奇曰奢本為侯莽以女妻之故進爵為公妻七細翻終欲為出兵立之者師古曰言為此計意不止為于偽翻下同會莽敗云奢亦死二年秋隕霜殺菽關東大飢蝗二年莽既輕私鑄錢之法犯者愈衆及伍人相坐沒入為官奴婢其男子檻車女子步以鐵瑣琅當其頸傳詣章十二行本詣下有長安二字乙十一行本同退齋校同鍾官以十萬數師古曰琅當長瑣也鍾官主鑄錢之官也師古曰改相配匹不依其舊也二年上谷儲夏自請説瓜田儀降之儲夏人姓名戰國時齊有儲子莽求其尸葬之為起冢祠室諡曰瓜寧殤男此殤非未成人之殤強死者也楚辭所謂國殤者二年閏月丙辰大赦二年郎陽成修獻符命姓陽成名修而官為郎也又曰黃帝以百二十女致神仙漢儒言天子三夫人九嬪二十七世婦八十一御妻則亦百二十女百官志中散大夫秩六百石時屬司中行下孟翻博采鄉里所高有淑女者上名上時掌翻二年莽惡漢高廟神靈惡烏路翻遣虎賁武士入高廟四章十二行本四上有拔劍二字乙十一行本同孔本同張校同退齋校同面提擊師古曰謂夢見譴責提擲也音徒計翻師古曰以斧斫壞之壞音怪師古曰桃湯灑之赭鞭鞭之也赭赤也漢以虎賁校尉主輕車此輕車校尉莽所置也二年是歲南郡秦豐聚衆且萬人平原女子遲昭平亦聚數千人在河阻中姓譜遲姓也樊遲之後以王父字為氏一曰古賢人遲任之後皆曰此天囚行尸命在漏刻言其得罪於天死在須臾其猖狂為盜特尸行耳師古曰與讀曰豫祿曰太史令宗宣宗姓晉伯宗之後伯宗本出於宋桓公候氣變以凶為吉亂天文誤朝廷太傅平化侯尊飾虛偽以偷名位賊夫人之子夫音扶國師嘉信公秀信當作新毀師法令學士疑惑明學男張邯地理侯孫陽造井田使民棄土業邯下甘翻羲和魯匡設六管以窮工商説符侯崔發阿諛取容令下情不上通宜誅此數子以慰天下又言胸奴不可攻當與和親臣恐新室憂不在胸奴而在封域之中也莽怒使虎賁扶祿出祿之言則直矣然以漢舊臣而與莽朝之議出處語默於義得乎事君若龔勝者可也左遷魯匡為五原卒正以百姓怨誹故也六管非匡所獨造莽厭衆意而出之師古曰厭滿也音一豔翻初四方皆以飢寒窮愁起為盜賊稍章十二行本重稍字乙十一行本同孔本同㣥聚常思歲熟得歸鄉里衆雖萬數不敢略有城邑章十二行本邑下有轉掠求食四字乙十一行本同孔本同張校同退齋校同日闋而已師古曰闋盡也隨日而盡也此言㣥盜攻剽所得日給口體而已闋空穴翻師古曰中傷也音竹仲翻賊非敢欲殺之也而莽終不諭其故師古曰不曉此意也荊州牧發奔命二萬人討緑林賊賊帥王匡等相率迎擊於雲杜賢曰雲杜縣名屬江夏郡故城在今復州沔陽縣西北杜佑曰安州應城縣漢雲杜縣地殺數千人盡獲輜重重直用翻牧欲北歸馬章十二行本馬上有賊字乙十一行本同張校同退齋校同武等復遮擊之復扶又翻鈎牧車屏泥屏泥緹油飾之在軾前刺七亦翻乘繩證翻然終不敢殺牧賊遂攻拔竟陵賢曰竟陵縣名屬江夏郡故城在郢州長壽縣南賢曰安陸縣屬江夏郡今安州縣還入緑林中至有五萬餘口州郡不能制又磊司馬士按章豫州師古曰有上章相告者就而按治之豫州部潁川汝南沛郡梁國魯國賊送付縣士還上書具言狀還從宣翻又如字莽大怒章十二行本怒下有下獄二字乙十一行本同孔本同以為誣罔因下書責七公曰七公謂四輔三公夫吏者理也宣德明恩以牧養民仁之道也抑強督姦師古曰督謂察視也義之節也今則不然盜發不輒得至成㣥黨遮略乘傳宰士傳知戀翻士得脫者又妄自言我責數賊何為如是數所具翻賊曰以貧窮故耳賊護出我今俗人議者率多若此惟貧困飢寒犯法為非大者㣥盜小者偷穴師古曰穴謂穿牆為盜也今乃結謀連黨以千百數是逆亂之大者豈飢寒之謂邪七公其嚴敕卿大夫卒正連率庶尹謹牧養善民急捕殄盜賊有不同心並力疾惡黠賊惡烏路翻黠下八翻而妄曰飢寒所為輒捕繫請其罪請治其罪也莫敢言賊情者州郡又不得亶發兵賊由是遂不制言不可制也唯翼平連率田況素果敢發民年十八以上四萬餘人授以庫兵與刻石為約樊崇等聞之不敢入界況自劾奏劾戶概翻未賜虎符而亶發兵此弄兵也厥罪乏興師古曰亶發之罪與乏軍興同科也故且勿治治直之翻下同後況自請出界擊賊所嚮皆破莽以璽書令況領青徐二州牧事璽斯氏翻況上言盜賊始發其原甚微部吏伍人所能禽也部吏部盜賊之吏郡賊曹縣遊徼鄉亭長之類是也師古曰伍人同伍之人若今伍保者也縣欺其郡郡欺朝廷實百言十實千言百朝廷忽略不輒督責遂至延蔓連州師古曰延音弋戰翻乃遣將帥多使者傳相監趣傳知戀翻監古銜翻師古曰趣讀曰促郡縣力事上官應塞詰對師古曰力勤也塞當也塞悉則翻詰去吉翻具資用以救斷斬師古曰交懼斬死之刑也共讀曰供斷丁管翻又丁亂翻復扶又翻治直之翻將帥又不能躬率吏士戰則為賊所破吏氣浸傷徒費百姓前幸蒙赦令賊欲解散或反遮擊恐入山谷轉相告語語牛倨翻故郡縣降賊皆更驚駭恐見詐滅因飢饉易動降戶江翻易以豉翻旬日之間更十餘萬人此盜賊所以多之故也今洛陽以東米石二千竊見詔書欲遣太師更始將軍二人爪牙重臣多從人衆道上空竭言牢稟不給也宜急選牧尹以下明其賞罰收合離鄉小國無城郭者小國諸列侯國也積臧穀食臧讀曰藏並力固守賊來攻城則不能下所過無食勢不得㣥聚如此招之必降擊之則滅今空復多出將帥復扶又翻郡縣苦之反甚於賊宜盡徵還乘傳諸使者傳知戀翻以休息郡縣委任臣況以二州盜賊必平定之莽畏惡況畏惡其能也惡烏路翻為于偽翻遣使者賜況璽書使者至見況因令代監其兵監古銜翻遣況西詣長安拜為師尉大夫況去齊地遂敗三年三年春正月九廟成納神主木主也大駕乘六馬以五采毛為龍文衣緑角長三尺師古曰以被馬上也緑陟略翻長直亮翻古今注曰華蓋黃帝所作也黃帝與蚩尤戰于涿鹿之野常有雲氣金枝玉葉因而作華蓋重直龍翻高居傲翻載以四輪車挽者皆呼登仙莽出令在前百官竊言此似輀車輀音而喪車也非仙物也三年二月樊崇等殺景尚景尚去年所遣三年關東人相食三年夏四月遣太師王匡更始將軍廉丹東討衆賊更工衡翻初樊崇等衆既寖盛乃相與為約殺人者死傷人者償創創初良翻其中最尊號三老次從事次卒史師古曰言不為大號余謂三老從事卒史皆郡縣史也崇等起於民伍所識止此耳其後黨衆日盛氣勢日張則攻長安立盆子非其初不為大號也恐其衆與莽兵亂乃皆朱其眉以相識別別彼列翻由是號曰赤眉匡丹合將鋭士十餘萬人將即亮翻下遣將同所過放縱東方為之語曰寧逢赤眉不逢太師太師尚可更始殺我卒如田況之言卒子恤翻三年莽又多遣大夫謁者分教民煮草木為酪服虔曰煮木實或曰如今餌朮之屬也如淳曰作杏酷之屬也師古曰如説是也重為煩費師古曰重音直用翻三年緑林賊遇疾疫死者且半乃各分散引去王常成丹西入南郡號下江兵王鳳王匡馬武及其支黨朱鮪張卬等北入南陽號新市兵郡國志新市縣屬江夏郡水經注新市縣治杜城屬竟陵郡杜佑曰漢新市縣故城在郢州富水縣東北莽遣司命大將軍孔仁部豫州納言大將軍嚴尤秩宗大將軍陳茂擊荊州莽賜司卿及六卿號皆大將軍乘傳到部募士傳知戀翻尤謂茂曰遣將不與兵符必先請而後動是猶紲韓盧而責之獲也師古曰紲擊也韓盧古韓國之名犬也黑色曰盧紲音私列翻三年蝗從東方來飛蔽天三年流民入關者數十萬人乃置養贍官稟食之師古曰稟給也音彼甚翻食讀曰飼使者監領監古銜翻與小吏共盜其稟師古曰盜其稟者盜所給之物先是莽使中黃門王業領長安市買先悉薦翻賤取於民民甚患之業以省費為功賜爵附城莽聞城中飢饉以問業業曰皆流民也乃市所賣梁飯肉羹持入示莽曰居民食咸如此莽信之三年秋七月新市賊王匡等進攻隨賢曰隨縣屬南陽郡今隨州縣號平林兵以應之姓譜廖周文王子伯廖之後風俗通古有廖叔安左傳作飂蓋其後也水經注章水南徑隨郡平林縣故城西俗謂之將陂城與新市接界賢曰廖音力弔翻平林地名在今隨州隨縣東北復扶又翻三年莽詔書讓廉丹曰倉廩盡矣府庫空矣可以怒矣可以戰矣將軍受國重任不捐身於中野無以報恩塞責塞悉則翻丹惶恐夜召其掾馮衍以書示之掾俞絹翻衍因説丹曰張良以五世相韓椎秦始皇博浪之中事見七卷秦始皇二十九年説諭芮翻相息亮翻為漢信臣賢曰廉褒襄武人宣帝時為後將軍即丹之先英俊不附今海內潰亂人懷漢德甚於周章十二行本周作詩乙十一行本同孔本同人思召公也召公之教明於南國周人思之為賦甘棠召音邵天必從之賢曰詩小雅曰雖無德與女式歌且舞言漢氏之德人歌舞之也書曰人之所欲天必從之莫若屯據大郡鎮撫吏士砥厲其節納雄桀之士詢忠智之謀興社稷之利除萬人之害則福祿流於無窮功烈緑於不滅何與軍覆於中原身膏於草野功敗名喪恥及先祖哉師古曰與猶如也喪息浪翻丹不聽衍左將軍奉世曾孫也冬無鹽索盧恢等舉兵反城附賊師古曰索盧姓也恢名也呂氏春秋禽滑釐有門人索盧參反城據城以反也一曰反音幡今語賊猶曰幡城索音先各翻余謂一説是賢曰無鹽縣屬東平郡故城在今鄆州須昌縣之東斬首萬餘級莽遣中郎將奉璽書勞丹匡勞力到翻進爵為公封吏士有功者十餘人赤眉別校董憲等衆數萬人在梁郡校戶教翻下同梁國時除為郡王匡欲進擊之廉丹以為新拔城罷勞罷讀曰疲當且休士養威匡不聽引兵獨進丹隨之合戰成昌師古曰成昌地名也余據後漢書亦當在無鹽縣界匡走丹使吏持其印紱節付匡紱音弗曰小兒可走吾不可遂止戰死校尉汝雲王隆等二十餘人別鬬汝姓也左傳晉大夫女齊陸德明曰女音汝皆曰廉公已死吾誰為生為于偽翻馳奔賊皆戰死國將哀章自請願平山東將即亮翻莽遣章馳東與太師匡並力又遣大將軍陽浚守敖倉司徒王尋將十餘萬屯洛陽鎮南宮大司馬董忠養士習射中軍北壘恐當作北軍中壘三年初張初下脫景帝子三字長沙定王發生舂陵節侯買買生戴侯熊渠熊渠生考侯仁仁以南方卑濕徙封南陽之白水鄉與宗族往家焉賢曰舂陵鄉名本屬零陵泠道縣在今永州唐興縣北元帝時徙南陽仍號舂陵故城在今隨州棗陽縣東杜佑曰棗陽後漢蔡陽縣漢舂陵故城在今縣東子敞嗣值莽篡位國除節侯少子外為鬱林太守賢曰鬱林郡今郴州縣余按唐郴州無鬱林縣而唐之桂柳鬱雍象燕潯南尹樂融賓等州皆漢鬱林郡地賢曰巨鹿郡今邢州縣余按唐邢州固有巨鹿縣而唐邢趙二州皆漢巨鹿郡地賢曰南頓縣屬汝南郡故城在今陳州項城縣西括地志陳州南頓縣古頓子國逼於陳南徙故曰南頓湖陽縣屬南陽郡宋白曰湖陽縣古蓼國地仲秀縯音衍兄弟早孤養於叔父良縯性剛毅慷慨有大節自莽篡漢常憤憤懷復社稷之慮不事家人居業傾身破産交結天下雄俊秀隆準日角賢曰隆高也許負云鼻頭為準鄭玄尚書中侯注云日角謂庭中骨起狀如日賢曰種曰稼斂曰穡比於高祖兄仲賢曰仲郃陽侯喜也能為産業高祖為太上皇壽曰始大人常以臣不能治産業不如仲力今其業所就孰與仲多秀嘗與晨俱過穰人蔡少公少公頗學圖讖言劉秀當為天子少詩照翻讖楚譖翻或曰是國師公劉秀乎秀戲曰何用知非僕邪坐者皆大笑晨心獨喜宛人李守好星曆讖記宛於元翻好呼到翻為莽宗卿師賢曰平帝五年王莽攝政郡國置宗師以主宗室蓋時尊之故曰宗卿師也余按莽置宗師主漢宗室耳此宗卿師莽篡時所置也劉氏當興李氏為輔及新市平林兵起南陽騷動通從弟軼謂通曰從才用翻軼音逸又徒結翻今四方擾亂漢當復興復扶又翻又如字南陽宗室獨劉伯升兄弟泛愛容衆可與謀大事縯字伯升吾意也會秀賣穀於宛宛於元翻通遣軼往迎秀與相見因具言讖文事與相約結定計議通欲以立秋材官都試騎士日劫前隊大夫甄阜及屬正梁丘賜莽改南陽曰前隊置大夫職如太守屬正職如都尉師古曰隊音遂甄之人翻使軼與秀歸舂陵舉兵以相應於是縯召諸豪桀計議曰王莽暴虐百姓分崩今枯旱連年兵革並起此亦天亡之時復高祖之業定萬世之秋也言定天下傳之萬世此其時也於是分遣親客於諸縣起兵縯自發舂陵子弟諸家子弟恐懼皆亡匿曰伯升殺我及見秀絳衣大冠董巴輿服志曰大冠者武官冠之東觀記上時絳衣大冠將軍服也謹厚者亦復為之乃稍自安凡得子弟七八千人部署賓客自稱柱天都部賢曰柱天若天之柱也都部者都統其衆也李通未發事覺亡走父守及家屬坐死者六十四人縯使族人嘉招説新市平林兵説輸芮翻與其帥王鳳陳牧西擊長聚帥所類翻聚才喻翻下同進屠唐子鄉賢曰多所誅殺曰屠唐子鄉有唐子山在今唐州湖陽縣西南軍中分財物不均衆恚恨欲反攻諸劉恚於避翻劉秀斂宗人所得物悉以與之衆乃悅進拔棘陽賢曰棗陽縣名屬南陽郡在棘水之陽古謝國也故城在今唐州湖陽縣西北棘音紀力翻將即亮翻三年嚴尤陳茂破下江兵成丹王常張卬等收散卒入蔞溪略鍾龍間賢曰蔞音力于翻盛弘之荊州記曰永陽縣北有石龍山在今安州應山縣東北又隨州隨縣東北有三鍾山衆復振復扶又翻下同引軍與荊州牧戰于上唐賢曰上唐鄉名故城在今隨州棗陽縣東北水經注上唐本蔡陽縣之上唐鄉春秋時唐國也三年十一月有星孛于張賢曰張南方宿續漢志曰張為周地晉書天文志張六星在天廟北孛蒲內翻三年劉縯欲進攻宛至小長安聚賢曰續漢書淯陽縣有小長安聚故城在今鄧州南陽縣南杜佑曰南陽漢宛縣縣南三十七里有小長安時天密霧漢軍大敗秀單馬走遇女弟伯姬與共騎而奔前行復見姊元趣令上馬騎奇寄翻復扶又翻下同趣讀曰促上時掌翻元以手揮曰行矣不能相救無為兩沒也會追兵至元及三女皆死縯弟仲及宗從死者數十人從才用翻縯復收會兵衆還保棘陽阜賜乘勝留輜重於藍鄉賢曰比陽縣有藍鄉重直用翻賢曰酈道元水經注曰諸水二湖流注合為黃水又南經棘陽縣之潢淳聚又謂之潢淳水在今唐州湖陽縣水經注沘水出沘陽縣東北大胡山南與澧水會謂之派水昔漢光武破甄阜梁丘賜於沘水西斬之於斯水也杜佑曰漢舞陽故城在唐州泌陽縣北有泌水在縣南光武破阜賜處絶後橋示無還心新市平林見漢兵數敗數所角翻阜賜軍大至各欲解去縯甚患之會下江兵五千餘人至宜秋賢曰宜秋聚名在沘陽縣余按續漢志南陽平氏縣有宜秋聚造七到翻願見下江一賢將議大事衆推王常縯見常説以合從之利賢曰以利合曰從説輸芮翻下同從子容翻王莽殘虐百姓思漢今劉氏復興復扶又翻下同即真主也誠思出身為用輔成大功縯曰如事成豈敢獨饗之哉遂與常深相結而去常還具為餘將成丹張卬言之常與縯會餘二將在軍為于偽翻將即亮翻大丈夫既起當各自為主何故受人制乎常乃徐曉説其將帥曰王莽苛酷積失百姓之心民之謳吟思漢非一日也故使吾屬因此得起夫民所怨者天所去也民所思者天所與也舉大事必當下順民心上合天意功乃可成若負強恃勇觸情恣欲雖得天下必復失之以秦項之勢尚至夷覆況今布衣相聚草澤以此行之滅亡之道也今南陽諸劉舉章十二行本舉下有宗起二字乙十一行本同孔本同張校同退齋校同兵觀其來議者皆有深計大慮王公之才與之並合必成大功此天所以祐吾屬也下江諸將雖屈強少識屈強梗戾貌屈音居勿翻強音其兩翻少詩沼翻乃皆謝曰無王將軍吾屬幾陷於不義幾居希翻即引兵與漢軍新市平林合於是諸部齊心同力鋭氣益壯縯大饗軍士設盟約休卒三日分為六部十二月晦潛師夜起襲取藍鄉盡獲其輜重重直用翻容肇祖標點顧頡剛聶崇岐覆校
