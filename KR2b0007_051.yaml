body:
  text: 資治通鑑卷第五十一翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注漢紀四十三延光四年孝安皇帝下延光四年乙丑一二五延光四年春二月乙亥下邳惠王衍薨延光四年甲辰車駕南巡延光四年三月戊午朔日有食之延光四年庚申帝至宛不豫宛於元翻書金滕王有疾弗豫孔安國注曰不悅豫乙丑帝發自宛丁卯至葉崩于乘輿葉武涉翻乘繩證翻年三十二皇后與閻顯兄弟江京樊豐等謀曰今晏駕道次賢曰晏晚也臣下不敢斥言帝崩猶言晚駕而出道次猶言路次也邂逅公卿立之還為大害邂下廨翻逅戶芒翻乃偽云帝疾甚徙御臥車所在上食問起居如故上時掌翻驅馳行四日庚午還宮自葉至雒陽六百餘里辛未遣司徒劉熹詣郊廟社稷告天請命武王有疾周公為三壇同墠因太王王季文王以請命于天後世踵而行之章甲十六行本夕下有乃字孔本同發喪尊皇后曰皇太后太后臨朝以顯為車騎將軍儀同三司太后欲久專國政貪立幼年與顯等定策禁中迎濟北惠王子北鄉侯懿為嗣賢曰惠王名壽章帝子也濟子禮翻考異曰東觀記續漢書作北鄉侯犢今從袁紀范書不得上殿親臨梓宮臨力鴆翻悲號不食號戶刀翻內外㣥僚莫不哀之延光四年甲戌濟南孝王香薨無子國絶香濟南安王康之孫康光武子也延光四年乙酉北鄉侯即皇帝位延光四年夏四月丁酉太尉馮石為太傅司徒劉熹為太尉參録尚書事前司空李郃為司徒郃古合翻又曷閣翻延光四年閻顯忌大將軍耿寶位尊權重威行前朝朝直遙翻乃風有司奏寶及其黨與風讀曰諷中常侍樊豐虎賁中郎將謝惲侍中周廣野王君王聖聖女永等更相阿黨互作威福皆大不道辛卯豐惲廣皆下獄死更工衡翻下遐稼翻家屬徙比景貶寶及弟子林慮侯承皆為亭侯牟平侯耿舒子襲尚顯宗女隆慮公主寶嗣襲封而弟子承紹公主封為林慮侯林慮即隆慮也避殤帝諱改隆為林慮音廬寶於道自殺王聖母子徙鴈門於是以閻景為衛尉耀為城門校尉晏為執金吾兄弟並處權要處昌呂翻威福自由延光四年己酉葬孝安皇帝于恭陵賢曰恭陵在今洛陽東北二十七里延光四年九六乙巳赦天下延光四年秋七月西域長史班勇發敦煌張掖酒泉六千騎及鄯善疏勒車師前部兵擊後部王軍就大破之敦徒門翻鄯上扇翻獲首虜八千餘人生得軍就及胸奴持節使者將至索班沒處斬之傳首京師索班呈見上卷永寧元年延光四年冬十月丙午越巂山崩巂音髓延光四年北鄉侯病篤中常侍孫程謂濟陰王謁者長興渠曰賢曰興姓渠名余按百官志王國謁者比四百石其下有禮樂長衛士長醫工長永巷長祠祀長而無謁者長竊意長興姓也王以嫡統本無失德先帝用讒遂至廢黜若北鄉侯不起相與共斷江京閻顯事無不成者斷丁亂翻渠然之又中黃門南陽王康先為太子府史太子府史掌東宮府藏長樂太官丞掌太后食膳樂音洛附同者既相黨附又與之同謀北鄉侯病不解解散也言病纏於身而不散也何不早徵諸王子簡所置乎簡擇也置立也辛亥北鄉侯薨顯白太后祕不發喪更徵諸王子閉宮門屯兵自守十一月乙卯孫程王康王國與中黃門黃龍彭愷孟叔李建王成張賢史泛馬國王道李元楊他陳豫趙封李剛魏猛苗光等聚謀於西鍾下皆截單衣為誓丁巳京師及郡國十六地震是夜程等共會崇德殿上崇德殿在南宮水經注魏文帝於漢崇德殿故處起太極殿蓋南宮正殿也時江京劉安及李閏陳達等俱坐省門下省門即禁門也前書謂禁中為省中以李閏權勢積為省內所服欲引為主因舉刃脅閏曰今當立濟陰王毋得搖動閏曰諾於是扶閏起俱於西鍾下迎濟陰王即皇帝位時年十一召尚書令僕射以下從輦幸南宮程等留守省門遮扞內外帝登雲臺召公卿百僚使虎賁羽林士屯南北宮諸門閻顯時在禁中憂迫不知所為顯蓋在北宮考異曰宦者傳作朔平門今從袁紀余按百官志朔平門北宮北門也恐當以宦者傳為是謂曰濟陰王立非皇太后意璽綬在此誘音酉璽斯氏翻綬音受此謂天子璽綬也苟盡力效功封侯可得太后使授之印曰能得濟陰王者封萬戶侯得李閏者五千戶侯詩等皆許諾辭以卒被召所將衆少卒讀曰猝顯使與登迎吏士於左掖門外詩因格殺登歸營屯守顯弟衛尉景遽從省中還外府外府衛尉府也孫程傳召諸尚書使收景傳召傳詔召之也聞之即率直宿羽林出南止車門逢景從吏士拔白刃呼曰無干兵鎮即下車持節詔之景曰何等詔因斫鎮不中呼火故翻中竹仲翻鎮引劍擊景墮車左右以戟叉其胸遂禽之送廷尉獄即夜死戊午遣使者入省奪得璽綬帝乃幸嘉德殿按帝紀嘉德殿在南宮並下獄誅下遐稼翻家屬皆徙比景遷太后於離宮己未開門罷屯兵壬戌詔司隸校尉惟閻顯江京近親當伏辜誅其餘務崇寬貸封孫程等皆為列侯程食邑萬戶王康王國食九千戶黃龍食五千戶彭愷孟叔李建食四千二百戶王成張賢史泛馬國王道李元楊他陳豫趙封李剛食四千戶魏猛食二千戶苗光食千戶是為十九侯孫程為浮陽侯王康為華容侯王國為酈侯黃龍為湘南侯彭愷為西平昌侯孟宿為中廬侯李建為復陽侯王成為廣宗侯張賢為祝阿侯史泛為臨沮侯馬國為廣平侯王道為范縣侯李元為褒信侯楊他為山都侯陳豫為下巂侯趙封為析縣侯李剛為枝江侯魏猛為夷陵侯苗光為東阿侯李閏以先不豫謀故不封擢孫程為騎都尉初程等入章臺門苗光獨不入詔書録功臣令王康疏名康詐疏光入章臺門光未受符策漢初封王侯皆剖符至武帝封齊燕廣陵三王始作策詣黃門令自告黃門令主省中諸宦者故詣之自告詔書勿問以將作大匠來歷為衛尉設諷章甲十六行本諷下有劉瑋二字乙十一行本同孔本同張校同退齋校同閭丘弘等先卒皆拜其子為郎朱倀施延陳光趙代皆見拔用後至公卿以來歷等鴻都門之諫也事見上卷上年設丁外翻又丁活翻倀丑羊翻厚加賞賜男吉家徙事見上卷上年監太子家小黃門籍建傅高梵監古銜翻賢曰梵音扶泛翻余按來歷傳傅中傅也梵又房戎翻長秋長趙熹丞良賀良姓也左傳鄭良霄穆公子子良之孫長秋長蓋即大長秋丞一人六百石中宮藥長四百石皆皇后宮官並擢為中常侍初閻顯辟崔駰之子瑗為吏駰音因瑗以北鄉侯立不以正知顯將敗欲説令廢立而顯日沈醉説輸芮翻下同沈持林翻不能得見乃謂長史陳禪曰中常侍江京等惑蠱先帝廢黜正統扶立疏孽孔穎達曰孽者蘖也樹木斬而復生謂之蘖以嫡子比根幹庶子比枝蘖故孽子枝庶也中候曰無易樹子注云樹子適子玉藻云公子曰臣孽注孽當為枿文王曰本支百世是適子比樹本庶子比枝蘖也發病廟中周勃之徵於斯復見賢曰呂后立惠帝後宮子為少帝周勃廢之也説式芮翻白太后收京等廢少帝引立濟陰王必上當天心下合人望伊霍之功不下席而立則將軍兄弟傳祚於無窮若拒違天意久曠神器則將以無罪並辜元惡元惡大惡也並辜謂與之同獲罪也分功之時也史記蔡澤説范睢曰君獨不見夫博者乎或欲大投或欲分功今君相秦坐制諸侯使天下皆畏秦此亦秦之分功之時也會顯敗瑗坐被斥被皮義翻門生蘇祗欲上書言狀瑗遽止之時陳禪為司隸校尉召瑗謂曰弟聽祗上書賢曰弟但也司馬相如傳曰弟俱如臨邛弟讀如第瑗曰此譬猶兒妾屏語耳屏必郢翻於隱屏之處相與私語也願使君勿復出口禪時為司隸校尉故稱之曰使者司隸校尉部察三輔三河弘農其職猶十三部使者鮑永為司隸校尉光武曰奉使如此何如復扶又翻下同不復應州郡命延光四年己卯以諸王禮葬北鄉侯延光四年司空劉授以阿附惡逆辟召非其人策免辟召非人事見上卷延光二年甲申以少府河南陶敦為司空延光四年楊震門生虞放陳翼詣闕追訟震事事見上卷上年贈錢百萬以禮改葬於華陰潼亭賢曰墓在今潼關西大道之北其碑尚存華戶化翻有大鳥高丈餘集震喪前高居號翻郡以狀上上時掌翻帝感震忠章甲十六行本忠下有直字乙十一行本同孔本同張校同詔復以中牢具祠之中牢即少牢羊豕具也復扶又翻下同延光四年議郎陳禪以為閻太后與帝無母子恩宜徙別館絶朝見朝直遙翻見賢遍翻㣥臣議者咸以為宜司徒掾汝南周舉謂李郃曰昔瞽瞍常欲殺舜舜事之逾謹瞽瞍使舜塗廩而自下焚廩使浚井既入從而掩之其欲殺者屢矣而舜事瞽瞍彌謹書曰祗載見瞽瞍夔夔齋栗掾俞絹翻郃曷閣翻又古合翻莊公誓之黃泉秦始皇怨母失行行下孟翻久而隔絶後感潁考叔茅蕉章甲十六行本蕉作焦乙十一行本同之言復修子道書傳美之鄭武薑愛少子共叔段謀襲莊公公置薑氏於城潁而誓之曰不及黃泉無相見也潁考叔以舍肉遺母感之遂為母子如初秦始皇事見六卷九年太后幽在離宮若悲愁生疾一旦不虞主上將何以令於天下如從禪議後世歸咎明公宜密表朝廷令奉太后率㣥臣朝覲如舊以厭天心以答人望厭如字滿也孝順皇帝上諱保安帝之子也諡法慈和遍服曰順伏侯古今注曰保之字曰守永建元年丙寅一二六延光四年春正月帝朝太后於東宮太后意乃安延光四年甲寅赦天下延光四年辛未皇太后閻氏崩延光四年辛巳太傅馮石太尉劉熹以阿黨權貴免司徒李郃罷延光四年二月甲申葬安思皇后賢曰諡法謀慮不愆曰思延光四年丙戌以太常桓焉為太傅大鴻臚朱章甲十六行本朱上有京兆二字乙十一行本同孔本同張校同退齋校同寵為太尉參録尚書事長樂少府朱倀為司徒臚陵如翻樂音洛倀丑羊翻延光四年封尚書郭鎮為定潁侯以禽閻景功也定潁侯國屬汝南郡延光四年隴西鍾羌反校尉馬賢擊之戰於臨洮斬首千餘級恙衆皆降由是涼州復安洮士刀翻降戶江翻復扶又翻延光四年六月己亥封濟南簡王錯子顯為濟南王安帝延光四年濟南國絶今紹封諡法一德不懈曰簡又臣諡恭敬行善曰簡延光四年秋七月庚午以衛尉來歷為車騎將軍延光四年八月鮮卑寇代郡太守李超戰歿延光四年司隸校尉虞詡到官數月奏馮石劉熹免之又劾奏中常侍程璜陳秉孟生李閏等劾戶概翻又戶得翻百官側目號為苛刻三公劾奏詡盛夏多拘繫無辜為吏民患三公欲致詡罪言盛夏當順天地長物之性不當違法拘繫無辜劾戶概翻又戶得翻考異曰詡傳云帝省其章乃為免司空陶敦按袁紀孫程就國在九月而敦免在十月蓋帝由此知敦不直因事免之不然何三府共奏而獨免敦也法禁者俗之隄防刑罰者民之銜轡今州曰任郡郡曰任縣更相委遠更工衡翻遠于願翻百姓怨窮以苟容為賢盡節為愚臣所發舉臧罪非一臧古贓字通遂加誣罪臣將從史魚死即以尸諫耳韓詩外傳曰衛大夫史魚病且死謂其子曰我數言蘧伯玉之賢而不能進彌子瑕不肖而不能退為人臣生不能進賢退不肖死不當治喪正堂殯我於室足矣君問其故子以父言聞君乃立召蘧伯玉而貴之斥彌子瑕而退之徙殯於正堂成禮而後去乃不罪詡省悉景翻中常侍張防賣弄權勢請託受取詡案之屢寢不報詡不勝其憤勝音升乃自繫廷尉奏言昔孝安皇帝任用樊豐交亂嫡統幾亡社稷事見上卷安帝延光三年幾居希翻復扶又翻下同國家之禍將重至矣重直用翻臣不忍與防同朝謹自繫以聞無令臣襲楊震之迹楊震事見上卷延光三年防流涕訴帝詡坐論輸左校將作大匠有左校令掌左工徒輸左校者免官為徒輸作左校也校戶教翻二日之中傳考四獄獄吏勸詡自引自引謂引分自裁也傳株戀翻寧伏歐刀以示遠近謂寧受刑而死於市也類篇曰啼泣無聲謂之喑歎傷謂之嗚浮陽侯孫程祝阿侯張賢相率乞見浮陽侯國屬勃海郡見賢遍翻陛下始與臣等造事之時賢曰謂帝被廢程等謀立之時也知其傾國今者即位而復自為何以非先帝乎司隸校尉虞詡為陛下盡忠為于偽翻而更被拘繫常侍張防臧罪明正反搆忠食今客星守羽林史記天官書虛危南有衆星曰羽林晉書天文志羽林四十五星在營室南宜急收防送獄以塞天變塞悉則翻時防立在帝後程叱防曰姦臣張防何不下殿防不得已趨就東箱賢曰埤蒼云箱序也字或作廂陛下急收防無令從阿母求請賢曰阿母宋娥也尚書賈朗素與防善證詡之罪帝疑焉謂程曰且出吾方思之於是詡子顗顗魚豈翻與門生百餘人舉幡候中常侍高梵車叩頭流血訴言枉狀梵入言之梵房戎翻又房泛翻防坐徙邊賈朗等六人或死或黜即日赦出詡程復上書陳詡有大功語甚切激復扶又翻帝感悟復徵拜議郎數日遷尚書僕射詡上疏薦議郎南陽左雄曰臣見方今公卿以下類多拱默拱默言拱手而默無一言盡節為愚至相戒曰白璧不可為容容多後福賢曰容容猶和同也言不可為白璧之清潔常與衆人和同也有王臣蹇蹇之節易曰王臣蹇蹇匪躬之故東都謂尚書為喉舌之官以其出納王命也由是拜雄尚書延光四年浮陽侯孫程等懷表上殿爭功帝怒有司劾奏程等干亂悖逆劾戶概翻又戶得翻悖蒲沒翻又蒲內翻王國等皆與程黨久留京都益其驕恣帝乃免程等官悉徙封遠縣因遣十九侯就國敕雒陽令促期發遣司徒掾周舉説朱倀曰朝廷在西鍾下時非孫程等豈立東都謂天子為國家又謂為朝廷説輸芮翻倀丑羊翻録其小過如道路夭折夭於紹翻帝有殺功臣之譏及今未去宜急表之倀曰今詔指方怒吾獨表此必致罪譴舉曰明公年過八十位為台輔不於今時竭忠報國惜身安寵欲以何求祿位雖全必陷佞邪之譏諫而獲罪猶有忠貞之名若舉言不足採請從此辭倀乃表諫帝果從之程徙封宜城侯宜城縣屬南郡春秋之羅國也考異曰袁紀秋七月有司奏浮陽侯孫程祝阿侯張賢為司隸校尉虞詡訂叱左右謗訕大臣妄造不祥干亂悖逆王國等皆與程黨久留京師益其驕溢詔免程等徙為都梁侯程怨恨封還印綬更封為宜城侯范書孫程傳亦云坐訟虞詡呵叱左右就國按虞詡傳程言見用上不以為怒周舉傳云程坐爭功就國今從之怨恨恚懟恚於避翻懟直類翻封還印綬符策亡歸京師往來山中詔書追求復故爵土賜車馬衣物遣還國延光四年冬十月丁亥司空陶敦免延光四年朔方以西障塞多壞鮮卑因此數侵南胸奴數所角翻單于憂恐上書乞修復障塞庚寅詔黎陽營兵出屯中山北界賢曰黎陽先置營兵以南單于求復障塞恐入侵擾亂置屯兵於中山北界舊中山郡今之定州是也余謂移黎陽營屯中山北界不過為南部聲援耳列屯塞下教習戰射延光四年以廷尉張皓為司空延光四年班勇更立車師後部王子加特奴為王更工衡翻下同勇又使別校誅斬東且彌王校戶教翻且子余翻范書東且彌國去洛陽九千二百里亦更立其種人為王種章勇翻於是車師六國悉平西域傳卑陸蒲類東且彌移支車師前後王是為六國勇遂發諸國兵擊胸奴呼衍王亡走其衆二萬餘人皆降生得單于從兄勇使加特奴手斬之以結車師胸奴之隙北單于自將萬餘騎入後部至金且谷且子余翻勇使假司馬曹俊救之單于引去後追斬其貴人骨都侯於是呼衍王遂徙居枯梧河上是後車師無復虜迹二年二年春正月中郎將張國以南單于兵擊鮮卑其至鞬破之鞬居言翻二年二月遼東鮮卑寇遼東玄菟菟同都翻烏桓校尉耿曄發緣邊諸郡兵及烏桓出塞擊之斬獲甚衆鮮卑三萬人詣遼東降降戶江翻下同二年三月旱二年初帝母李氏瘞在雒陽北李氏死見上卷安帝元初二年瘞於計翻至是左右白之帝乃發哀親到瘞所更以禮殯殯用皇后禮瘞於計翻乙酉追諡為恭愍皇后葬于恭陵之北二年西域城郭諸國皆服於漢唯焉耆王元孟未降元孟和帝永元六年班超所立也於是遣敦煌太守張朗將河西四郡兵三千人配勇敦徒門翻因發諸國兵四萬餘人分為兩道擊之勇從南道朗從北道約期俱至焉耆而朗先有罪欲徼功自贖徼一遙翻遂先期至爵離關釋氏西域記龜茲國北四十里山上有寺名雀離大清淨先悉薦翻獲首虜二千餘人元孟懼誅逆遣使乞降張朗徑入焉耆受降而還朗得免誅勇以後期徵下獄免夏之政典曰先時者殺無赦不及時者殺無赦張朗先期以徼功法所必誅則班勇非後期也漢之用刑不審厥衷勇免之後西域事去矣下遐稼翻二年秋七月甲戌朔日有食之二年壬午太尉朱寵司徒朱倀免庚子以太常劉光為太尉録尚書事光祿勳汝南許敬為司徒光矩之弟也敬仕於和安之間當竇鄧閻氏之盛無所屈橈橈奴教翻三家既敗士大夫多染汚者汚烏故翻獨無謗言及於敬當世以此貴之二年初南陽樊英少有學行少詩照翻行下孟翻名著海內隱於壺山之陽賢曰壺山在今鄧州新城縣北即張衡南都賦所云天封大狐是也不應公卿舉賢良方正有道皆不行安帝賜策書徵之不赴是歲帝復以策書玄纁備禮徵英復扶又翻英固辭疾篤詔切責郡縣駕載上道英不得已到京稱疾不肯起強輿入殿強其兩翻猶不能屈帝使出就太醫養疾太醫令屬少府掌諸醫有藥丞方丞其後帝乃為英設壇為于偽翻令公車令導尚書奉引引與靷同音羊晉翻賜几杖待以師傅之禮考異曰英傳云四年三月乃設壇場見英黃瓊傳李固勸書已云樊英設壇席及瓊至上疏薦英稱光祿大夫則是瓊至之時英已嘗設壇見之而為光祿大夫矣至三年旱瓊復上疏若四年方設壇場見英則都與瓊傳異知其必不在四年也拜五官中郎將數月英稱疾篤詔以為光祿大夫賜告歸令在所送穀以歲時致牛酒英辭位不受有詔譬旨勿聽有詔書譬曉以上旨不聽其辭位也英初被詔命被皮義翻下同衆皆以為必不降志南郡王逸素與英善因與其書多引古譬諭勸使就聘英順逸議而至及後應對無奇謀深策談者以為失望河南張楷與英俱徵謂英曰天下有二道出與處也處昌呂翻下同吾前以子之出能輔是君也濟斯民也而子始以不訾之身賢曰訾量也言無量可比之貴重之極也訾音資按英傳英強輿入殿猶不以禮屈帝怒謂英曰朕能生君能殺君能貴君能賤君能富君能貧君君何以慢朕命英曰臣受命於天生盡其命天也死不得其命亦天也陛下焉能生臣焉能殺臣臣見暴君如見仇讎立其朝猶不肯可得而貴乎雖在布衣之列環堵之中晏然自得不易萬乘之尊又可得而賤乎陛下焉能貴臣焉得賤臣非禮之祿雖萬鍾不受也申其志雖簞食不厭也陛下焉能富臣焉能貧臣乎帝不能屈而敬其名使出就太醫養疾月致羊酒又不聞匡救之術進退無所據矣臣光曰古之君子邦有道則仕邦無道則隱隱非君子之所欲也人莫己知而道不得行㣥邪共處處昌呂翻而害將及身故深藏以避之王者舉逸民揚仄陋論語曰舉逸民天下之民歸心焉堯典曰明明揚側陋為于偽翻非以徇世俗之耳目也是故有道德足以尊主智能足以庇民被褐懷玉深藏不市聖人被褐懷玉玉至寶也被褐而懷之喻珍美不外見也良賈深藏若虛賈有善貨深藏若無所有者不得善價則不售此皆以喻抱道懷才之士被皮義翻屈己以章甲十六行本以下有下之虛心以五字乙十一行本同孔本同張校同訪之克己以從之然後能利澤施于四表功烈格于上下蓋取其道不取其人務其實不務其名也其或禮備而不至意勤而不起則姑內自循省而不敢強致其人省悉景翻強其兩翻曰豈吾德之薄而不足慕乎政之亂而不可輔乎㣥小在朝而不敢進乎誠心不至而憂其言之不用乎何賢者之不我從也苟其德已厚矣政已治矣㣥小遠矣治直吏翻遠于願翻誠心至矣彼將扣閽而自售又安有勤求而不至者哉荀子曰耀蟬者務在明其火振其木而已火不明雖振其木無益也楊倞曰南方人照蟬取而食之禮記有蜩范是也則天下歸之若蟬之歸明火也或者人主恥不能致乃至誘之以高位脅之以嚴刑公孫述之待李業諸人政如此誘音酉則位非所貪刑非所畏終不可得而致也可致者皆貪位畏刑之人也烏足貴哉若乃孝弟著於家庭行誼隆於鄉曲弟讀曰悌行下孟翻利不苟取仕不苟進潔己安分優遊卒歲分扶問翻卒子恤翻雖不足以尊主庇民是亦清修之吉士也王者當褒優安養俾遂其志若孝昭之待韓福昭帝元鳳元年三月賜郡國所選有行義者涿郡韓福等五人帛人五十匹遺歸詔曰朕閔勞以官職之事其務修孝弟以教鄉里令郡縣嘗以正月賜羊酒其有不幸者賜衣一襲祠以中牢事見四十一卷建武五年美風俗斯亦可矣固不當如范升之詆毀又不可如張楷之責望也至於飾偽以邀譽釣奇以驚俗不食君祿而爭屠沽之利不受小官而規卿相之位名與實反心與迹違斯乃華士少正卯之流韓非子曰太公封於齊東海上有任矞華士昆弟二人太公殺之周公急傳而問曰二子皆賢人殺之何也太公曰是昆弟立議曰不臣天子是望不得而臣也不友諸侯是望不得而友也耕而食之掘而飲之無求於人是望不得以賞罰勸禁也且聖王所以使人非爵賞則刑罰也今四者不足以使之則望誰為君乎是以誅之也荀子曰孔子為魯相七日而誅少正卯門人進問曰夫少正卯魯之聞人也夫子為政而始誅之得無失乎孔子曰其有惡者五而盜竊不與焉一曰心達而險二曰行僻而堅三曰言偽而辨四曰記醜而博五曰順非而澤此五者有一於人則不得免於君子之誅而少正卯兼有之尚何聘召之有哉二年時又徵廣漢楊厚江夏黃瓊瓊香之子也厚既至豫陳漢有三百五十年之厄以為戒賢曰春秋命歷序曰四百年之間閉四門聽外難㣥異並賊官有孽臣州有兵亂五七弱暴漸之效也宋均注云五七三百五十歲當順帝漸微四方多逆賊也瓊將至李固以書逆遺之曰遺于季翻君子謂伯夷隘柳下惠不恭不夷不惠可否之間孟子曰伯夷隘柳下惠不恭隘與不恭君子不由也賢曰論語孔子曰伯夷叔齊不降其志不辱其身謂柳下惠少連降志辱身矣我則異於是無可無不可鄭玄注云不為夷齊之清不為惠連之屈故曰異於是也誠欲枕山棲谷枕之鴆翻擬迹巢由斯則可矣若當輔政濟民今其時也自生民以來善政少而亂俗多必待堯舜之君此為士行其志終無時矣嘗聞語曰嶢嶢者易缺皎皎者易汙嶢嶢山之高也皎皎玉石之白也嶢倪翻易以豉翻其實難副近魯陽樊君被徵初至被皮義翻朝廷設壇席猶待神明雖無大異而言行所守亦無所缺行下孟翻而毀謗布流應時折減者言其名譽折減也折食列翻聲名太盛乎言其聲名之盛素動人之觀聽故所望者深也處昌呂翻願先生弘此遠謨令衆人歎服一雪此言耳瓊至拜議郎稍遷尚書僕射瓊昔隨父在臺閣瓊父香和帝時為尚書令及後居職達練官曹達明也練習也言明習尚書諸曹事也莫能抗奪莫能抗言以奪其議也朝直遙翻數所角翻上頗采用之李固郃之子郃曷閣翻又古合翻少好學少詩照翻好呼到翻常改易姓名杖策驅驢策馬策也不遠千里笈極曄翻書箱也不遠千里不憚千里之遠也遂究覽墳籍為世大儒每到太學密入公府定省父母記曰凡為人子冬溫而夏清昏定而晨省孔穎達曰安定其牀衽也省問其安否何如省悉景翻三年三年春正月丙子京師地震三年夏六月旱三年秋七月茂章甲十六行本茂上有丁酉二字乙十一行本同退齋校同陵園寢災三年九月鮮卑寇漁陽三年冬十二月己亥太傅桓焉免三年車騎將軍來歷罷三年南單于拔死弟休利立為去特若尸逐就單于三年帝悉召孫程等還京師四年四年春正月丙寅赦天下四年丙子帝加元服四年夏五月壬辰詔曰海內頗有災異朝廷修政太官減膳珍玩不御御進也郡國志桂陽郡在雒陽南三千九百里礱音力公翻言不思宣暢本朝遇災修省之意也朝直遙翻今封以還之不罪礱而但封還其珠非所以昭德塞違也四年五州雨水四年秋八月丁巳太尉劉光司空張皓免四年尚書僕射虞詡上言安定北地上郡山川險厄沃野千里土宜畜牧水可溉漕既可溉田又可通漕也畜許六翻洪氏隸釋曰東漢書鄧騭傳元二之災注云元二既元元也古書字當再讀者於上字之下為小二字當兩度言之後人不曉遂讀為元二或同之陽九或附之百六良由不悟致斯乖舛岐州石鼓銘凡重言者皆為二字明驗也趙氏云楊孟文石門碑漢威宗建和二年立其文有曰中遭元二橋梁斷絶若讀為元元則為不成文理疑當時自有此語漢注未必然也豫按漢刻如北海相景君及李翊夫人碑之類凡重文皆以小二字贅其下此碑有蒸蒸明明蕩蕩世世勤勤亦不再出上一字然非若元二遂書為二大字也又孔耽碑云遭元二轗軻人民相食若作元元則下文不應言人民漢注之非明矣王充論衡曰今上嗣位元二之間嘉德布流三年零陵生芝草五本四年甘露降五縣則論衡所云元二者蓋謂即位之元年二年也鄧君傳云永初元年夏涼部叛羌搖蕩西州詔騭將羽林五校士擊之冬徵騭班師迎拜為大將軍帝紀班師在二年十一月傳有脫字也又云時遭元二之災人士荒飢盜賊㣥起四夷侵叛騭崇節儉罷力役進賢士故天下復安則此傳所云元二者亦謂元年二年也安帝紀書兩年之間萬民飢流羌貊叛戾又與傳同此碑所云西戎虐殘橋梁斷絶正是鄧騭出師時則史傳碑碣皆與論衡合建初者章帝之始年永初者安帝之始年乃知東漢之文所謂元二者如此郡縣兵荒二十餘年夫棄沃壤之饒捐自然之財不可謂利離河山之阻離力智翻守無險之處難以為固今三郡未復園陵單外賢曰園陵謂長安諸陵園也單外謂守固余謂西漢諸陵園不皆在長安單外言無蔽障容頭過身賢曰前書音義曰選懦柔怯也懦音而掾翻張解設難張解者開張其説以為解設難者鋪設其辭以發難難乃旦翻不圖其安宜開聖聽考行所長九月詔復安定北地上郡還舊土安帝永初五年三郡內徙四年癸酉以大鴻臚龐參為太尉録尚書事臚陵如翻龐皮江翻太常王龔為司空四年冬十一月庚辰司徒許敬免四年鮮卑寇朔方四年十二月乙卯以宗正弘農劉崎為司徒崎丘宜翻四年是歲于填王放前殺拘彌王興自立其子為拘彌王拘彌王居寧彌城去長史所居柳中城四千九百里敦煌太守徐由上求討之敦徒門翻上時掌翻帝赦于填罪令歸拘彌國放前不肯五年五年夏四月京師旱五年京師及郡國十二蝗五年定遠侯班超之孫始尚帝姑陰城公主公主清河孝王之女陰縣屬南陽郡宋白曰陰城縣在今穀城縣北宋乾德二年置光化軍始積忿怒伏刃殺主冬十月乙亥始坐腰斬同産皆棄市六年六年春二月庚午河間孝王開薨子政嗣政慠很不奉法很下墾翻帝以侍御史吳郡沈景有強能擢為河間相侍御史秩六百石擢為王國相秩二千石相息亮翻謁王王不正服箕踞殿上侍郎贊拜景峙不為禮賢曰峙立也虎賁曰是非王邪賁音奔景曰王不正服常人何別今相謁王豈謁無禮者邪王慙而更服別彼列翻更工衡翻景然後拜出住宮門外請王傅責之漢諸王國有太傅至成帝時更曰傅前發京師陛見受詔見賢遍翻以王不恭相使檢督諸君空受爵祿曾無訓導之義因奏治其罪治直之翻詔書讓政而詰責傅景因捕諸姦人奏案其罪殺戮尤惡者數十人出冤獄百餘人政遂為改節悔過自修為于偽翻六年帝以伊吾膏腴之地傍近西域胸奴資之以為鈔暴近其靳翻鈔楚交翻三月辛亥復令開設屯田如永元時事見四十七卷和帝永元二年六年初安帝薄於藝文博士不復講習朋徒相視怠散學舍穨敝鞠為園蔬穨徒回翻賢曰詩小雅曰鞠為茂草注云鞠窮也或牧兒蕘豎薪刈其下蕘豎刈草者也蕘如招翻誘進後學帝從之翟直格翻酺薄乎翻誘音酉秋九月繕起太學凡所造構二百四十房千八百五十室六年護烏桓校尉耿曄遣兵擊鮮卑破之曄與曅同六年護羌校尉韓皓轉湟中屯田置兩河間以逼㣥羌兩河謂賜支河及逢留大河也以張掖太守馬續代為校尉兩河間羌以屯田近之近其靳翻恐必見圖乃解仇詛盟各自警備詛莊助翻續上移章甲十六行本移下有屯字乙十一行本同孔本同田還湟中上上奏也音時掌翻羌意乃安六年帝欲立皇后而貴人有寵者四人莫知近建議欲探籌以神定選書四人姓氏於籌禱之於神而探之得之為入選探他南翻竊見詔書以立后事大謙不自專欲假之籌策決疑靈神篇籍所記祖宗典故未嘗有也恃神卜章甲十六行本卜作任乙十一行本同孔本同張校同筮既未必當賢就值其人猶非德選夫岐嶷形於自然賢曰詩云克岐克嶷鄭注云岐岐然意有所知其貌嶷嶷然有所識別也嶷魚力翻賢曰俔音苦見翻説文曰俔譬諭也詩云文王嘉止大邦有子俔天之妹文王聞太姒之賢則美之言大邦有子女譬天之有女弟故求為配焉宜參良家簡求有德德同以年年鈞以貌稽之典經斷之聖慮斷丁亂翻帝從之恭懷皇后弟子乘氏侯商之女恭懷皇后和帝母梁貴人也乘氏縣屬濟陰郡春秋之乘丘也乘繩證翻常特被引御從容辭曰夫陽以博施為德被皮義翻從千容翻施式智翻陰以不專為義螽斯則百福所由興也言后不妬忌若螽斯則子孫衆多而百福興矣小妾得免於罪帝由是賢之陽嘉元年壬申一三二六年春正月乙巳立貴人梁氏為皇后六年京師旱六年三月揚州六郡妖賊章河等寇四十九縣殺傷長吏揚州部九江丹楊廬江會稽吳豫章等六郡妖於驕翻長知兩翻六年庚寅赦天下改元六年夏四月梁商加位特進頃之拜執金吾六年冬耿曄遣烏桓戎末魔等鈔擊鮮卑大獲而還范書鮮卑傳作戎末廆章乙十一行本正作廆張校同賢曰廆音胡罪翻鈔楚交翻耿曄移屯遼東無慮城以拒之復扶又翻郡國志遼東屬國故邯鄉西部都尉安帝時以為屬國都尉領昌遼賓徒徒河無慮險瀆房六城在雒陽東北三千二百六十里無慮因醫無慮山以名縣慮音廬六年尚書令左雄上疏曰昔宣帝以為吏數變易則下不安業久於其事則民服教化其有政治者輒以璽書勉勵增秩賜金公卿缺則以次用之是以吏稱其職民安其業漢世良吏於茲為盛謂尹翁歸韓延壽朱邑龔遂黃霸之屬也事並見宣帝紀數所角翻治直吏翻稱尺證翻轉動無常各懷一切莫慮長久謂殺害不辜為威風聚斂整辦為賢能斂力贍翻以治己安民為劣弱治直之翻奉法循理為不治髡鉗之戮生於睚眥師古曰睚眥舉目眥也猶言顧瞻之頃也睚音崖眥音才賜翻字書曰睚牛懈翻怒視也成於喜怒視民如寇讎稅之如豺虎監司項背相望賢曰項背相望謂前後相顧也監古銜翻背音輩言同有此病也疢丑刃翻聞惡不察觀政於亭傳責成於期月言郡縣長吏飾亭傳以夸過使客監司亦以是觀政也賢曰期匝也謂一歲傳株戀翻論功不據實虛誕者獲譽拘檢者離毀賢曰離遭也譽音余或色斯而求名因有罪而先自棄官以為高論語曰色斯舉矣此言見上之人顏色不善則舉而去之以求見幾之名也覆審也踴躍升騰超等踰匹或考奏捕案而亡不受罪會赦行賂復見洗滌朱紫同色清濁不分故使姦猾枉濫輕忽去就拜除如流缺動百數鄉官部吏職賤祿薄車馬衣服一出於民廉者取足貪者充家特選橫調曰特曰橫皆出於常賦之外者也賢曰調徵也徒釣翻送迎煩費損政傷民和氣未洽災眚不消咎皆在此臣愚以為守相長吏惠和有顯效者可就增秩勿移徙非父母喪不得去官守式又翻相息浪翻長知兩翻其不從法禁不式王命賢曰式用也雖會赦令不得齒列若被劾奏亡不就法者劾戶概翻又戶得翻徙家邊郡以懲其後其鄉部親民之吏皆用儒生清白任從政者賢曰任堪也音人林翻寬其負算賢曰負欠也算口錢也儒生未有品秩故寬之吏職滿歲宰府州郡乃得辟舉如此威福之路塞塞悉則翻虛偽之端絶送迎之役損賦斂之源息循理之吏得成其化率土之民各寧其所矣帝感其言復申無故去官之禁先已有此禁今復申嚴之復扶又翻詳所施行下遐稼翻治直吏翻而宦官不便終不能行雄又上言孔子曰四十不惑見論語曲禮曰四十曰強而仕孝廉年不滿四十不得察舉皆先詣公府諸生試家法賢曰儒有一家之學故稱家法也周成雜字曰箋表也漢雜事曰凡㣥臣之書通於天子者四品一曰章二曰奏三曰表四曰駮議章者需頭稱稽首上以聞謝恩陳事詣闕通者也奏者亦需頭其京師官但言稽首言下言稽首以聞其中有所請若罪法劾案公府送御史臺卿校送謁者臺也表者不需頭上言臣某言下言誠惶誠恐頓首頓首死罪死罪左方下附曰某官臣某甲乙上宮之正南門曰端門尚書於此受天下章奏令舉者先詣公府課試以副本納之端門尚書審核之以觀異能以美風俗有不承料令者正其罪法若有茂材異行行下孟翻茂材即秀才賈公彥曰漢光武諱秀改為茂才自可不拘年齒帝從之胡廣郭虔史敞上書駮之曰凡選舉因才無拘定制六奇之策不出經學鄭阿之政非必章奏陳平六出奇計以佐高帝子産相鄭擇能而使之內無國中之亂外無諸侯之患説苑曰晏子化東阿三年景公召而數之晏子請改道易行明年上計景公迎而賀之晏子對曰臣前之化東阿也屬託不行貨賂不至君反以罪臣今則反是而更蒙賀景公下席而謝駮北角翻年乖強仕終賈揚聲亦在弱冠史記曰秦欲與燕伐趙以廣河間之地甘羅年十二使於趙趙王立割五城以廣河間秦乃封羅為上卿説苑子奇年十八齊君使主東阿東阿大化前書終軍年十八自請願以長纓必羈南越王而致之闕下武帝大悅擢為諫大夫賈誼年十八揚聲漢庭文帝超遷之貢舉之制莫或回革今以一臣之言剗戾舊章便利未明衆心不厭回轉也反也賢曰剗削也戾乖也厭滿也剗楚限翻政之所重而不訪台司不謀卿士若事下之後議者剝異下遐稼翻下同剝與駮同異之則朝失其便同之則王言已行言若附同雄言而與駮議者異則朝政為不重若與駮議者同而以雄言為非則上已從雄言而行之矣朝直遙翻參其同異然後覽擇勝否詳采厥衷衷陟仲翻下同帝不從辛卯初令郡國舉孝廉限年四十以上諸生通章句文吏能箋奏乃得應選其有茂才異行若顏淵子奇不拘年齒久之廣陵所舉孝廉徐淑年未四十臺郎詰之臺郎尚書郎也詰去吉翻詔書曰有如顏回子奇不拘年齒是故本郡以臣充選郎不能屈左雄詰之曰顏回聞一知十孝廉聞一知幾邪幾居豈翻淑無以對乃罷卻之郡守坐免袁宏論曰夫謀事作制以經世訓物必使可為也古者四十而仕非謂彈冠之會必將是年也師古曰彈冠言入仕也故舉其大限以為民衷且顏淵子奇曠代一有而欲以斯為格豈不偏乎然雄公直精明能審核真偽決志行之頃之胡廣出為濟陰坊守濟子禮翻與諸郡守十餘人皆坐謬舉免黜唯汝南陳蕃潁川李膺下邳陳球等三十餘人得拜郎中自是牧守畏栗莫敢輕舉迄于永嘉察選清平多得其人六年閏月庚子恭陵百丈廡災賢曰廡廊屋也説文堂下周屋曰廡廡音武六年上聞北海郎顗精於陰陽之學姓譜魯懿公孫費伯城郎因居之子孫以為氏顗魚豈翻二年二年春正月詔公車徵顗問以災異顗上章曰三公上應台階下同元首賢曰春秋元命包曰魁下六星兩兩而比曰三台前書音義曰泰階三台也又黃帝泰階六符經曰泰階者天之三階也上階為天子中階為諸侯公卿大夫下階為士庶人三階平則陰陽和風雨時尚書曰君為元首臣作股肱言三公上象天之台階下與人君同體也則寒陰反節今之在位競託高虛納纍鍾之奉奉與俸同音扶用翻亡天下之憂亡古無字小雅北山之詩曰或棲遲偃仰毛公曰棲遲遊息也偃仰臥也被策文得賜錢即復起矣何疾之易而愈之速被皮義翻復扶又翻易以豉翻以此消伏災眚興致升平其可得乎今選牧守委任三府長吏不良既咎州郡守式又翻長知兩翻州郡有失豈得不歸責舉者而陛下崇之彌優自下慢事愈甚所謂大網疏小網數賢曰謂緩於三公切於州郡也數趨玉翻密也孟子曰數罟不入汚池臣非狂夫之作所以發憤忘食懇懇不已者誠念朝廷欲致興平臣書不擇言死不敢恨因條便宜七事一園陵火災宜念百姓之勞罷繕修之役二立春以後陰寒失節宜采納良臣以助聖化三今年少陽之歲少詩照翻春當旱夏必有水宜遵前典惟節惟約四去年八月熒惑出入軒轅晉書天文志軒轅十七星黃帝之神黃龍之體也后之主女職也恣其姻嫁五去年閏十月有白氣從西方天苑趨參左足入玉井續漢志曰時客星氣白廣二尺長五丈起天苑西南晉書天文志曰天苑十六星在昴畢南天子之苑囿養獸之所也參十星白虎之體其中三星橫列三將也東北曰左肩主左將西北曰右肩主右將東南曰左足主後將軍西南曰右足主偏將軍玉井四星在參左足下主水漿以給廚參所今翻將有羌寇畔戾之患宜豫告諸郡嚴為備禦六今月十四日乙卯白虹貫日顗曰凡日氣色白而純者名為虹貫日中者侵太陽也晉志曰凡白虹者百殃之本衆亂所基並須立秋然後考事七漢興以來三百三十九歲於時三期賢曰謂以三期之法推之也有所變更更工衡翻王者隨天譬猶自春徂夏改青服絳也春服青夏服絳各隨時之色適三百年賢曰自文帝十三年降肉刑至順帝陽嘉二年合三百年也漸已殷積王者之法譬猶江河當使易避而難犯也二月顗復上書薦黃瓊李固以為宜加擢用又言自冬涉春訖無嘉澤數有西風反逆時節賢曰春當東風也復扶又翻數所角翻廣為禱祈薦祭山川暴龍移市董仲舒春秋繁露曰春旱以甲乙日為蒼龍一長八丈居中央為小龍各長四丈皆東向其間相去八尺小童八人皆齋三日服青衣而舞之夏以丙丁日為赤龍服赤衣季夏以戊己日為黃龍服黃衣秋以庚辛日為白龍服白衣冬以壬癸日為黑龍服黑衣龍長與舞童各依其行數牲各依其方色皆燔雄雞煅豭豬尾於里北門及市中以祈焉禮記歲旱魯穆公問於縣子縣子曰為之徙市可也不為偽動為于偽翻災變應人要在責己若令雨可請降水可攘止則歲無隔並太平可待然而災害不息者患不在此也書奏特拜郎中辭病不就二年三月使胸奴中郎將趙稠遣從事將南胸奴兵出塞擊鮮卑破之二年初帝之立也乳母宋娥與其謀與讀曰豫帝封娥為山陽君又封執金吾梁商子冀為襄邑侯襄邑縣屬陳留郡高章甲十六行本高下有皇字乙十一行本同孔本同帝約非劉氏不王非有功不侯孝安皇帝封江京王聖等遂致地震之異事見上卷安帝建光元年不見于史數術之士咸歸咎於封爵今青州飢虛盜賊未息誠不宜追録小恩虧失大典詔不聽雄復諫曰臣聞人君莫不好忠正而惡讒諛然而歷世之患莫不以忠正得罪讒諛蒙幸者蓋聽忠難從諛易也復扶又翻好呼到翻惡烏路翻下同易以豉翻夫刑罪人情之所甚惡貴寵人情之所甚欲是以時俗為忠者少而習諛者多故令人主數聞其美稀知其過迷而不悟以至於危亡臣伏見詔書顧念阿母舊德宿恩欲特加顯賞按尚書故事漢故事皆尚書主之唯先帝時阿母王聖為野王君聖造生讒賊廢立之禍事見上卷安帝延光三年咀在呂翻死為海內所歡快桀紂貴為天子而庸僕羞與為比者以其無義也夷齊賤為匹夫而王侯爭與為伍者以其有德也今阿母躬蹈儉約以身率下㣥僚蒸庶莫不向風蒸衆也懼違本操失其常願臣愚以為凡人之心理不相遠遠于願翻其所不安古今一也百姓深懲王聖傾覆之禍民萌之命危於纍卵萌與氓同復扶又翻下同怵惕之念未離於心怵惕悚懼也上尺律翻下他歷翻離力智翻乞如前議歲以千萬給奉阿母蓋雄先已有此議今乞行之也外可不為吏民所怪梁冀之封事非機急宜過災厄之運然後平議可否於是冀父商讓還冀封書十餘上上時掌翻帝乃從之夏四月己亥京師地震五月庚子詔㣥公卿士各直言厥咎仍各舉敦朴士一人左雄復上疏曰先帝封野王君漢陽地震安帝延光二年封王聖是歲京師及郡國三地震漢陽蓋其一也專政在陰其災尤大臣前後瞽言封爵至重王者可私人以財不可以官宜還阿母之封以塞災異塞悉則翻今冀已高讓山陽君亦宜崇其本節雄言切至娥亦畏懼辭讓而帝戀戀不能已卒封之卒子恤翻是時大司農劉據以職事被譴召詣尚書傳呼促步促步催使速行也被皮義翻捶止蕊翻撲普卜翻雄上言九卿位亞三事班在大臣行有佩玉之節禮記曰公侯佩山玄玉而朱組綬大夫佩水蒼玉而緇組綬詩曰雜佩以贈之毛氏注云珩璜琚瑀衝牙之類月令章句曰佩上有雙珩下有雙璜琚瑀以雜之衝牙蠙珠以納其間玉藻曰左徵角右宮羽進則揖之退則揚之然後玉瑲鳴也至漢明帝乃為大佩衝牙雙瑀璜皆以白玉乘輿落以白珠公卿諸侯以采絲孔潁達曰凡佩玉必上繫於衡下垂三道穿以蠙珠下端前後以懸於璜中央下端懸以衝牙動則衝牙前後觸璜而為聲所觸之玉其形似牙故曰衝牙章甲十六行本無則字乙十一行本同有庠序之儀庠序之儀謂濟濟蹌蹌皆非古典帝納之是後九卿無復捶撲者撲蒲卜翻又弼角翻捶止蕊翻二年戊午司空王龔免六月辛未以太常魯國孔扶為司空二年丁丑雒陽宣德亭地坼長八十五丈按續漢志宣德亭近郊地光武立郊兆於雒陽城南亭蓋在平城門外長直亮翻使之對策及特問以當世之敝為政所宜李固對曰前孝安皇帝變亂舊典封爵阿母因造妖孽妖於驕翻孽魚列翻改亂嫡嗣至令聖躬狼狽親遇其艱既拔自困殆龍興即位天下喁喁喁魚容翻師古曰喁喁衆口向上貌屬望風政屬之欲翻積敝之後易致中興易以豉翻誠當沛然思惟善道賢曰沛然寬廣之意復同於前復扶又翻臣伏在草澤痛心傷臆實以漢興以來三百餘年賢聖相繼十有八主高惠文景武昭宣元成哀平光明章和殤安至帝凡十八主豈忘貴爵之寵然上畏天威俯案經典知義不可故不封也今宋阿母雖有大功勤謹之德但加賞賜足以酬其勞苦至於裂土開國實乖舊典聞阿母體性謙虛必有遜讓陛下宜許其辭國之高使成萬安之福夫后之家所以少完全者少詩沼翻豈天性當然但以爵位尊顯顓總權柄天道惡盈易曰天道虧盈而益謙惡烏路翻故致顛仆先帝寵遇閻氏位號太疾故其受禍曾不旋時安帝建光元年諸鄧得罪閻氏始盛延光四年閻氏誅蓋不能五稔也今梁氏戚為椒房禮所不臣禮不臣妻之父母尚可然也而子弟㣥從榮顯兼加從才用翻永平建初故事殆不如此宜令步兵校尉冀及諸侍中還居黃門之官使權去外戚政歸國家豈不休乎休美也詔書所以禁侍中尚書中臣子弟不得為吏察孝廉者以其秉威權容請託故也而中常侍在日月之側聲勢振天下子弟祿任曾無限極雖外託謙默不干州郡而諂偽之徒望風進舉謂州郡阿私宦官進舉其子弟也為于偽翻下同同之中臣此中臣謂中朝臣也明帝不許賜錢千萬事見四十五卷永平十八年為于偽翻重薄位者為官人失才害及百姓也竊聞長水司馬武宣百官志北軍五營校尉各有司馬秩千石雒陽城十二門每門候一人秩六百石開陽門位在巳應劭漢官曰開陽門始成未有名宿昔有一柱來樓上琅邪開陽縣上言縣南城門一柱飛去光武皇帝使來識視愴然遂堅縛之刻記其歲月因以名焉初拜便真漢制初拜官稱守滿歲為真續漢書曰中都官千石六百石故事先守一歲然後補真壞音怪先聖法度所宜堅守故政教一跌百年不復跌徒結翻詩云上帝板板下民卒疸刺周王變祖法度故使下民將盡病也凡伯刺周厲王之詩賢曰板反也卒盡也音子恤翻疸病也疸音當但翻猶天之有北斗也斗為天喉舌尚書亦為陛下喉舌斗斟酌元氣運乎四時天文志曰斗為帝車運乎中央臨刑四方分陰陽建四時均五行移節度定諸紀皆繫於斗賦政四海賢曰賦布也責之所歸若不平心災眚必至誠宜審擇其人以毗聖政毗輔也外則公卿尚書內則常侍黃門譬猶一門之內一家之事安則共其福慶危則通其禍敗此等議論發之嬖幸盈朝之時謂之曲而當可也猶以直而不見容嗚呼外統職事內受法則夫表曲者景必邪源清者流必潔猶叩樹本百枝皆動也由此言之本朝號令豈可蹉跌蹉倉何翻天下之紀綱當今之急務也夫人君之有政猶水之有隄防隄防完全雖遭雨水霖潦不能為變政教一立暫遭凶年暫與暫同誠令隄防穿漏萬夫同力不能復救政教一壞賢智馳騖不能復還復扶又翻今隄防雖堅漸有孔穴諭嬖幸之門也當此之時不可以言漸矣固特婉其辭耳本朝者心腹也州郡者四支也心腹痛則四支不舉故臣之所憂在腹心之疾非四支之患也苟堅隄防務政教先安心腹整理本朝雖有寇賊水旱之變不足介意也誠令隄防壞漏心腹有疾雖無水旱之災天下固可以憂矣又宜罷退宦官去其權笪裁置常侍二人方直有德者省事左右小黃門五人才智間雅者給事殿中范曄曰漢承秦制置中常侍官然亦引用士人以參其選皆銀璫左貂給事殿省及高后稱制乃以張卿為大謁者出入臥內受宣詔命文帝時有趙談北宮伯子頗見親幸至於武帝亦愛李延年帝數宴後庭或潛遊離館故請奏機事多以宦人主之至元帝之世史遊為黃門令勤身納忠有所補益其後弘恭石顯以佞險自進卒有蕭周之禍損穢帝德焉中興之初宦官悉用閹人不復雜調他士至永平中始置員數中常侍四人小黃門十人和帝即祚幼弱竇憲兄弟專總威權所與居者閹宦而已故鄭衆得專謀禁中終除大憝遂享分士之封超登公卿之位於是中官始盛矣自明帝之後迄于延平委用漸大其員稍增中常侍至有十人小黃門二十人改以金璫右貂兼領卿署之職鄧后以女主臨政萬機殷遠朝臣國議無由參斷不得不委用刑人寄之國命手握王爵口銜天憲非復掖庭永巷之職閨牖房闥之任也去羌呂翻省悉景翻則論者厭塞升平可致也塞悉則翻扶風功曹馬融對曰今科條品制四時禁令所以承天順民者備矣悉矣不可加矣然而天猶有不平之效民猶有咨嗟之怨者百姓屢聞恩澤之聲而未見惠和之實也古之足民者非能家贍而人足之量其財用為之制度量音良故嫁娶之禮儉則婚者以時矣喪祭之禮約則終者掩藏矣不奪其時則農夫利矣夫妻子以纍其心纍力瑞翻産業以重其志舍此而為非者有必不多矣馬融之對不詭於聖人蓋有得於經學故其辭氣和平而切於政體也舍讀曰捨太史令南陽張衡對曰百官志太史令屬太常秩六百石掌天時星曆自初舉孝廉迄今二百歲矣武帝元光元年初舉孝廉至是凡二百七年行有餘力始學文法辛卯詔書以能章句奏案為限去年冬十一月辛卯詔書也孝行下孟翻猶不應科此棄本而取末曾子長於孝然實魯鈍文學不若遊夏政事不若冉季今欲使一人兼之苟外有可觀內必有闕則違選舉孝廉之志矣且郡國守相剖符寧境為國大臣一旦免黜十有餘人謂濟陰太守胡廣等也罷讀曰疲新故交際公私放濫或臨政為百姓所便而以小過免之是為奪民父母使嗟號也號戶刀翻易不遠復論不憚改易曰不遠復無祗悔論語曰過則勿憚改況於帝王承天理物以天下為公者乎中間以來妖星見於上古今注曰是年四月壬寅太白晝見五月癸巳又晝見見賢遍翻謂永建三年京師地震今年宣德亭地裂也可為寒心明者銷禍於未萌今既見矣為于偽翻見賢遍翻修政恐懼則禍轉為福矣上覽衆對以李固為第一即時出阿母還舍諸常侍悉叩頭謝罪朝廷肅然以固為議郎而阿母宦者皆疾之詐為飛章以陷其罪事從中下從中下者不經尚書下遐稼翻僕射黃瓊復救明其事復扶又翻久乃得釋出為洛令洛當作雒雒縣屬廣漢郡融博通經籍美文辭對奏亦拜議郎衡善屬文屬之欲翻通貫六藝雖才高於世而無驕尚之情驕者以才驕人也尚者以才尚人也尤致思於天文陰陽曆算致極也思相吏翻著靈憲蔡雍曰言天體者三家一曰周髀二曰宣夜三曰渾天宣夜之學絶無師法周髀數術具存考驗天狀多所違失故史官不用唯渾天者近得其情今史官所用候臺銅儀則其法也立八尺圓體之度而具天地之象以正黃道以察發斂以行日月以步五緯精微深妙萬世不易之道也衡著靈憲曰昔在先王將步天路用之靈軌尋緒本元先準之於渾體是為正儀立度而皇極有逌建也樞運有逌稽也乃建乃稽斯經天常聖人無心因茲以生心故靈憲作興王蕃曰天地之體狀如雞卵天包地外猶殼之裹黃也周旋無端其形渾渾然故曰渾天周天三百六十五度五百八十九分度之百四十五半露地上半在地下其二端謂之南極北極北極出地三十六度南極入地亦三十六度兩極相去一百八十二度半強繞北極徑七十二度常見不隱謂之上規繞南極七十五度常隱不見謂之下規赤道帶天之紘去兩極各九十一度少強黃道日之所行也半在赤道外半在赤道內與赤道東交於角五弱西交於奎十四少強其出赤道外極遠者去赤道二十四度斗二十一度是也其入赤道內極遠者亦二十四度井二十五度是也日南至在斗二十一度去極百一十五度少強是也日最南去極最遠故景最長黃道斗二十一度出辰入申故日亦出辰入申日晝行地上百四十六度強故日短夜行地下二百一十九度少弱故夜長自南至之後日去極稍近故景稍短日晝行地上度稍多故日稍長夜行地下度稍少故夜稍短日所在度稍北故日稍北以至於夏至日在井二十五度去極六十七度稍強是也日最北去極最近景最短黃道井二十五度出寅入戌故日亦出寅入戌日晝行地上二百一十九度少弱故日長夜行地下百四十六度強故夜短自夏至之後日去極稍遠故景稍長日晝行地上度稍少故日稍短夜行地下度稍多故夜稍長日所在度稍南故日出入稍南以至於南至而復初焉斗二十一井二十五南北相覺四十八度春分日在奎十四稍強秋分日在角五稍弱此黃赤二道之交中也去極俱九十一度少強南北處斗二十一井二十五之中故景居二至短長之中奎十四角五出卯入酉故日亦出卯入酉日晝行地上夜行地下俱百八十度半強故日見之漏晝五十刻不見之漏五十刻而晝夜同夫天之晝夜以日出入為分人之晝夜以昏明為限日未出二刻半而明日未入二刻半而昏故損夜五刻以益晝是以春秋之漏晝五十五刻洛書甄耀度曰周天三百六十五度四分度之一一度為千九百三十二里憺杜覽翻不慕當世所居之官輒積年不徙二年太尉龐參在三公中最名忠直數為左右所毀會所舉用忤帝旨數所角翻忤五故翻司隸承風案之時當會茂才孝廉參以被奏稱疾不會被皮義翻廣漢上計掾段恭因會上疏曰漢郡國歲舉茂才孝廉與上計吏皆至京師受計之日公卿皆會于廷茂孝豫焉伏見道路行人農夫織婦皆曰太尉參竭忠盡節徒以直道不能曲心孤立㣥邪之間自處中傷之地處昌呂翻中竹仲翻夫以讒佞傷毀忠正此天地之大禁人臣章甲十六行本臣作主乙十一行本同之至誡也昔白起賜死諸侯酌酒相賀白起死事見五卷周赧王五十年魯人喜其紓難賢曰紓緩也季子魯公子季友也閔公之時國家多難以季子忠賢故請齊侯復之公羊傳曰季子來歸其言季子何賢也其言來歸喜之也難乃旦翻君以忠安治直吏翻今天下咸欣陛下有此忠賢願卒寵任以安社稷卒子恤翻書奏詔即遣小黃門視參疾太醫致羊酒後參夫人疾前妻子投於井而殺之雒陽令祝良奏參罪秋七月己未參竟以災異免二年八月己巳以大鴻臚施延為太尉二年鮮卑寇馬城代郡太守擊之不克頃之其至犍章甲十六行本犍作鞬乙十一行本同死鞬居言翻鮮卑由是抄盜差稀抄楚交翻容肇祖標點顧頡剛聶崇岐覆校
