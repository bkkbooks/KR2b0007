body:
  text: 資治通鑑卷第一百七十三端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注陳紀七高宗宣皇帝中之下太建九年太建九年丁酉五七七太建九年春正月乙亥朔齊太子恆即皇帝位恆戶登翻生八年矣改元承光大赦尊齊主為太上皇帝皇太后為太皇太后皇后為太上皇后以廣寧王孝珩為太宰珩音行司徒莫多婁敬顯領軍大將軍尉相願尉紆勿翻謀伏兵千秋門千秋門鄴宮西門立廣寧王孝珩會阿那肱自他路入朝不果朝直遙翻孝珩求拒周師謂阿那肱等曰朝廷不賜遣擊賊豈不畏孝珩反邪孝珩若破宇文雍周主諱雍亦何預國家事以今日之急猶如此猜忌邪邪音耶高韓恐其為變出孝珩為滄州刺史高韓謂高阿那肱韓長鸞地形志熙平二年分瀛冀二州置滄州治饒安縣城歎曰大事去矣知復何言復扶又翻齊主使長樂王尉世辨長樂郡王五代志信都郡長樂縣舊置長樂郡樂音洛尉紆勿翻出滏口帥讀曰率騎奇寄翻覘丑廉翻又丑豔翻滏音釜登高阜西望遙見㣥烏飛起謂是西軍旗幟即馳還比至紫陌橋不敢回顧世辨粲之子也西軍旗幟皆黑齊人時恇懼望見烏飛以為周師已至馳歸不敢回顧懼其及也紫陌橋在鄴城外尉粲與高歡同起於北鎮爾雅曰大陸曰阜廣雅山無石曰阜幟昌志翻比必寐翻齊制門下省侍中給事黃門侍郎各六人中書省侍郎四人河外謂大河之外王者內京師而外諸夏齊都鄴在河北故謂河南為河外若不濟南投陳國從之道衡孝通之子也薛孝通始從賀拔嶽後因入朝遂留仕於鄴丁丑太皇太后太上皇后自鄴先趣濟州濟州治碻磝城趣七喻翻濟子禮翻癸未幼主亦自鄴東行己丑周師至紫陌橋太建九年辛卯上祭北郊太建九年壬辰周師至鄴城下癸巳圍之燒城西門齊人出戰周師奮擊大破之齊上皇從百騎東走騎奇寄翻使武衛大將軍慕容三藏守鄴宮後齊循魏制武衛將軍副二左右衛將軍掌左右廂所主朱華閣以外階從三品加大者進等藏徂浪翻齊王公以下皆降降戶江翻三藏猶拒戰周主引見禮之見賢遍翻拜儀同大將軍三藏紹宗之子也慕容紹宗始從爾朱氏後事高歡父子領軍大將軍漁陽鮮于世榮齊高祖舊將也將即亮翻周主先以馬腦酒鍾遺之馬腦石似玉寶石也今作碼瑙先息薦翻遺唯季翻周師入鄴世榮在三臺前鳴鼓不輟周人執之世榮不屈乃殺之周主執莫多婁敬顯數之曰汝有死罪三前自晉陽走鄴攜妾棄母不孝也自晉陽走鄴見上卷上年數所矩翻舊所具翻走音奏內實通啓於朕不忠也為于僞翻朝直遙翻送款之後猶持兩端不信也用心如此不死何待遂斬之使將軍尉遲勤追齊主考異曰北齊書勤作剛今從周書尉紆勿翻甲午周主入鄴齊國子博士長樂熊安生博通五經晉武帝咸寧四年初立國子學置國子祭酒博士各一人後齊置博士五人黃帝有熊氏一曰出於楚鬻熊之後以名為氏樂音洛遽令掃門家人怪而問之安生曰周帝重道尊儒必將見我俄而周主幸其家不聽拜親執其手引與同坐賞賜甚厚給安車駟馬以自隨又遣小司馬唐道和後周之制六官七命自小冢宰至小司徒小宗伯小司馬小司寇小司空皆上大夫七命曰平齊之利唯在於爾引入宮宮即鄴宮時周主居之人物善惡朝直遙翻即留內省三宿乃歸內省即齊之門下省乙未齊上皇渡河入濟州濟子禮翻是日幼主禪位於大丞相任城王湝任音壬湝戶皆翻又音皆又為湝詔尊上皇為無上皇幼主為宋嚴宋改守國天王齊氏於傾危之際不應改國號為宋宋國當作宗國齊制天子六璽受命璽在六璽之外紱印組也古者韍如蔽膝又裳繡為兩己相背形謂之黻此紱直以繫璽而已璽斯氏翻紱音弗以璽紱歸周周主詔去年大赦所未及之處皆從赦例去年周克晉陽大赦山東河南河北之地尚為齊守今既克鄴凡齊之境內赦所未及之地今皆從去年赦例齊洛州刺史獨孤永業有甲士三萬聞晉州陷請出兵擊周奏寢不報永業憤慨又聞並州陷乃遣子須達請降於周降戶江翻下同周以永業為上柱國封應公此去年事也因齊亡敍之於此應國公用古邗晉應韓之應以封之丙申周以越王盛為相州總管後魏置相州於鄴東魏都鄴改為司州以其京畿之地倣漢晉之制而置司州也周既平齊復為相州列於諸州相息亮翻齊上皇留胡太后於濟州使高阿那肱守濟州關濟州城北有碻磝津故關覘丑廉翻又丑豔翻自與穆后馮淑幼主韓長鸞鄧長顒等數十人奔青州顒魚容翻使內參田鵬鸞西出參伺動靜參候也伺相吏翻問齊主何在紿云已去紿徒亥翻誑言也計當出境謂出齊境也捶之每折一支辭色愈厲竟折四支而死捶止蘂翻折而設翻上皇至青州即欲入陳而高阿那肱密召周師約生致齊主屢啓云周師尚遠已令燒斷橋路上皇由是淹留自寬周師至關阿那肱即降之周師奄至青州上皇囊金繫於鞍與后幼主等十餘騎南走騎奇寄翻己亥至南鄧村尉遲勤追及盡擒之並胡太后送鄴先已擒胡太后於濟州今並齊主送鄴齊天保元年受禪歲在庚午四主二十八年而亡庚子周主詔故斛律光崔季舒等宜追加贈諡並為改葬斛律光死見一百七十一卷太建四年崔季舒等死見五年諡神至翻為于僞翻自漢以來將相公卿皆得保任子弟若孫為官所謂門蔭者也並還之周主指斛律光名曰此人在朕安得至鄴辛丑詔齊之東山南園三臺並可毀撤瓦木諸物可用者悉以賜民山園之田各還其主東山南園三臺皆高氏遊宴之地撤直列翻太建九年二月壬午上耕藉田藉而亦翻太建九年丙午周主宴從官將士於齊太極殿頒賞有差從才用翻將即亮翻下同丁未高緯至鄴已為俘囚不復書齊主緯于貴翻以賓禮見之齊廣寧王孝珩至滄州以五千人會任城王湝於信都冀州治信都湝自河間進兵至信都珩音行任音壬湝古皆翻召募得四萬餘人周主使齊王憲柱國楊堅擊之令高緯為手書招湝湝不從憲軍至趙州魏孝昌二年分定相二州置殷州治廣阿後改為趙州諜徒協翻覘丑廉翻又丑豔翻候騎執以白憲憲集齊舊將遍示之齊舊將從憲軍者集以示諜以攜湝軍之心騎奇寄翻吾所爭者大不在汝曹今縱汝還仍充吾使使疏吏翻乃與湝書曰足下諜者為候騎所拘軍中情實具諸執事謂諜者當能具言之無待卜疑守乃下策或未相許已勒諸軍分道並進相望非遠憑軾有期左傳城濮之役楚子玉遣使請戰於晉侯曰請與君之士戲君憑軾而望之故引以為言兵車之軾高三尺三寸立而憑之所望知機也易大傳曰君子見幾而作不俟終日引以諭湝使速降憲至信都湝陳於城南以拒之湝所署領軍尉相願詐出略陳遂以衆降鄴城之破相願蓋奔瀛州湝因署為領軍尉紆勿翻陳讀曰陳降戶江翻湝心腹也衆皆駭懼湝殺相願妻子明日復戰復扶又翻憲擊破之俘斬三萬人執湝及廣寧王孝珩憲謂湝曰任城王何苦至此湝曰下官神武皇帝之子兄弟十五人幸而獨存逢宗社顛覆章十二行本覆下有今日得死四字乙十一行本同孔本同張校同無愧墳陵聚土曰墳陵大阜也墳陵猶言山陵命歸其妻子又親為孝珩洗瘡傅藥禮遇甚厚為于僞翻孝珩歎曰自神武皇帝以外吾諸父兄弟無一人至四十者命也文襄死於盜手年二十九顯祖年三十一濟南王年十七孝昭年二十七武成年三十二其餘多不得良死宰相非柱石之寄嗣祥吏翻恨不得握兵符受斧鉞展我心力耳史言湝孝珩志節可憐五代志後齊命將出征則授鼓旗於朝皇帝陳法駕服袞冕至廟拜於太祖遍告訖降就中階引上將操鉞授柯曰從此上至天將軍制之又操斧授柯曰從此下至泉將軍制之將軍既受斧鉞對曰國不可從外理軍不可從中制臣既受命有鼓旗斧鉞之威願無一言之命於臣帝曰苟利社稷將軍裁之將軍就車載斧鉞而出皇帝推轂度閫曰從此以外將軍制之齊王憲善用兵多謀略得將士心齊人憚其威聲多望風沮潰芻牧不擾軍無私焉將即亮翻沮在呂翻周主以齊降將封輔相為北朔州總管北朔州齊之重鎮降戶江翻北朔州控禦突厥齊以為重鎮士卒驍勇驍堅堯翻前長史趙穆等謀執輔相迎任城王湝於瀛州不果前長史齊官長知兩翻相息亮翻紹義至馬邑自肆州以北二百八十餘城皆應之五代志博陵郡舊置定州魏置肆州治九原六鎮叛亂寄治樓煩郡之秀容縣其北即齊北朔州界欲取並州至新興而肆州已為周守地形志魏太延二年置薄骨律鎮孝昌二年置靈州東西分治其地屬西魏天平中東魏復置靈州寄治汾州隰城縣界五代志鴈門郡繁畤縣東魏置武州寄治城中後齊改為北靈州新興漢魏古郡名以五代志考之與肆州皆在樓煩郡秀容縣宋白曰唐之嵐州古新興郡為于僞翻二儀同前隊之將二人官皆儀同降戶江翻地形志魏永安中置顯州治汾州六玉五代志鴈門郡崞縣東魏置廓州後齊改北顯州周兵所擊即此復攻拔諸城復扶又翻紹義還保北朔州周東平公神舉將兵逼馬邑神舉即宇文神舉北奔突厥猶有衆三千人紹義令曰欲還者從其意於是辭去者太半突厥他鉢可汗常謂齊顯祖為英雄天子以紹義重踝似之厥九勿翻他徒何翻可苦曷翻汗音寒重直龍翻踝戶瓦翻腿兩旁曰內外踝甚見愛重凡齊人在北者悉以隸之於是齊之行臺州鎮唯東雍州行臺傅伏營州刺史高寶寧不下傅伏以永橋之功遷東雍州行臺五代志絳郡後魏置東雍州遼西郡置營州治和龍城雍於用翻凡得州五十郡一百六十二縣三百八十戶三百三萬二千五百梁太宗大寶元年齊顯祖受魏禪五主二十七年而亡齊所有司冀趙義懷黎建東雍汾西汾晉南朔並肆靈顯恆朔定瀛幽東燕北燕營南營安青濟光膠徐仁睢兗北徐南青海東楚潼東徐洛鄭陽宋梁南兗西兗北荊襄豫東廣秦西楚揚南潁北建羅合江和共六十州而東廣已下十州時已為陳故止言五十州考異曰隋書地理志云州九十七郡一百六十縣一百六十五今從周書齊之疏屬有勇略久鎮和龍甚得夷夏之心夏戶雅翻周主於河陽幽青南兗豫徐北朔定置總管府相並二州各置宮及六府官河陽縣屬懷州河內郡地臨河津實重鎮也幽州治薊青州治益都南兗治譙豫治汝南徐治彭城北朔治馬邑定治中山或都會之地或守禦之要也故皆置總管府總管猶魏晉之都督也相並二州皆有齊舊宮及省故仍置宮若別都然置六府官以代省也六府官蓋倣長安六官之府未必備官也周師之克晉陽也克晉陽見上卷上年比至齊已亡他鉢可汗處永安於吐谷渾使者之下紇奚虜復姓魏收官氏志北方諸姓有紇奚氏比必寐翻及也處昌呂翻吐如字或土鶻翻谷音浴使疏吏翻今齊國已亡永安何用餘生欲閉氣自絶恐天下謂大齊無死節之臣乞賜一刀以顯示遠近他鉢嘉之贈馬七十匹而歸之梁主入朝于鄴梁臣於周以周平齊故入朝朝直遙翻下同無朝覲之禮至是始命有司草具其事致積致餼設九儐九介受享於廟三公三孤六卿致食勞賓還贄致享皆如古禮積子賜翻餼許既翻勞力到翻鄭玄曰每積有牢禮米禾芻薪又曰大禮饔餼也左傳居則具一日之積杜預曰芻米菜薪詩傳曰牲腥曰餼或曰饋客生食及芻米曰餼儐主副也導主以行禮者也介賓副也輔賓以行禮者也五代志曰梁王之朝周入畿大冢宰命有司致積其餼五牢米九十筥䤈醢各三十五甕酒十八壺米禾各五十車薪芻各百車既至大司空設九儐以致館梁王東帛乘馬設九介以待之禮成而出明日王朝受享於廟既致享大冢宰又命公一人玄冕乘車陳九儐以束帛乘馬致食于賓及賓之從各有差致食訖又命公一人辨服乘車執贄設九儐以勞賓王設九介迎於門外明日朝服乘車還贄于公公皮辨迎於大門授贄受贄並於堂之中楹又明日王朝服設九介乘車以見于公事畢公致享明日三孤一人又執贄勞于梁王明日王還贄又明日王見三孤如三公明日卿一人又執贄勞王王見卿又如三孤於是三公三孤六卿又各餼賓並屬官之長為使牢米束帛同三公儐必刃翻勞力到翻周主與梁主宴酒酣酣戶甘翻周主自彈琵琶梁主起舞曰陛下既親撫五絃臣何敢不同百獸周主大悅賜賚甚厚舜彈五絃之琴夔曰於豫擊石拊石百獸率舞梁主以舜況周主故悅賚來代翻乙卯周主自鄴西還三月壬午周詔山東諸軍各舉明經幹治者二人若奇才異術卓爾不㣥者不拘此數時周分置諸州總管以撫鎮山東治軍政故曰諸軍周主之擒尉相貴也擒尉相貴見上卷上年伏不從齊人以伏為行臺右僕射周主既克並州克並州亦見上卷上年韋孝寬鎮勳州與東雍州接境故使招之復扶又翻以古武鄉郡封為公也石勒置武鄉郡凡授官爵皆給以符謂之告身五代志馮翊郡華陰縣西魏改武鄉置武鄉郡周當以此封傅伏伏不受謂孝寬曰事君有死無二此兒為臣不能竭忠為子不能盡孝人所讎疾願速斬之以令天下周主自鄴還至晉州遣高阿那肱等百餘人臨汾水召伏伏出軍隔水見之汾水徑晉絳二州之間東雍州在絳州界故隔水至尊今何在阿那肱曰已被擒矣被皮義翻伏仰天大哭帥衆入城於聽事前北面哀號良久然後降帥讀曰率聽與廳同毛晃曰聽事治官處漢晉皆作聽事六朝以來乃始加音他經翻號戶刀翻降戶江翻周主見之曰何不早下伏流涕對曰臣三世為齊臣食齊祿不能自死羞見天地周主執其手曰為臣當如此乃以所食羊肋骨賜伏肋盧則翻脅肋曰骨親肉疏所以相付遂引使宿衛授上儀同大將軍敕之曰若亟與公高官亟紀力翻恐歸附者心動努力事朕勿憂富貴他日又問前救河陰得何賞救河陰事見上卷七年蒙一轉授特進永昌郡公勳級曰轉轉張戀翻朕三年教戰決取河陰正為傅伏善守為于僞翻城不可動遂斂軍而退公當時賞功何其薄也夏四月乙巳周主至長安置高緯於前列其王公於後車輿旗幟器物以次陳之備大駕秦大駕屬車八十一乘漢遵用之備千乘萬騎晉之盛也大駕鹵簿見於志為尤詳開皇中大駕十二乘法駕半之其後大駕用三十六法駕用十二周氏雖設六官置司輅之職以掌公車之政以隋制參之大駕鹵簿必不能如漢晉之盛幟昌志翻奏凱樂周官王師大獻則令奏愷樂注云大獻獻捷於祖愷樂獻功之樂觀者皆稱萬歲戊申封高緯為溫公齊之諸王三十餘人皆受封爵周主與齊君臣飲酒令溫公起舞高延宗悲不自持屢欲仰藥其傅婢禁止之周主以李德林為內史上士後周之制內史屬春官中大夫五命下大夫四命上士三命並以委之帝從容謂㣥臣曰我常日唯聞李德林名復見其為齊朝作詔書移檄從七容翻復扶又翻為于僞翻朝直遙翻正謂是天上人豈言今日得其驅使神武公紇豆陵毅對曰神武郡公後魏置神武郡於神武川隋為神武縣屬馬邑郡紇豆陵毅本姓竇唐宰相世系表曰竇本竇融之後以竇武之難亡入鮮卑拓跋部使居南境號沒鹿回部世為部落大人及勤後魏穆帝命為紇豆陵氏至曾孫巖從孝文帝徙洛陽遂為河南洛陽人復為竇氏宇文復代北舊姓又復為紇豆陵氏臣聞麒麟鳳皇為王者瑞可以德感不可力致麒麟鳳皇得之無用豈如德林為瑞且有用哉帝大笑曰誠如公言太建九年己巳周主享太廟太建九年五月丁丑周以譙王儉為大冢宰庚辰以公亮為大司徒鄭公達奚震為大宗伯梁公侯莫陳芮為大司馬應公獨孤永業為大司寇鄭公韋孝寬為大司空己丑周主祭方丘周制方丘在國陰六里之郊以其先炎帝神農氏配路寢會義崇信含仁雲和思齊諸殿皆晉公護專政時所為事窮壯麗有踰清廟清廟者倣周祀文王之廟而為之也毛傳曰清廟者祭有清明之德者之宮也雕斫之物並賜貧民繕造之宜務從卑朴又章十二行本又上有戊戌二字乙十一行本同孔本同詔並鄴諸堂殿壯麗者準此並鄴諸堂殿齊氏所營也臣光曰周高祖可謂善處勝矣處昌呂翻他人勝則益奢高祖勝而愈儉太建九年六月丁卯周主東巡秋七月丙戌幸洛州洛州治洛陽壬寅議定權衡度量頒之於四方量音亮初魏虜西涼之人西涼謂河西自沮渠氏據河西稱涼王宋文帝元嘉十六年魏太武帝擊而虜之齊氏因之仍供廝役廝息移翻養也役也使也賤也蘇林曰廝取薪者也韋昭曰析薪曰廝今或讀從詵入聲周主滅齊欲施寬惠詔曰罪不及嗣古有定科書大禹謨皋陶曰罰不及嗣孔傳云父子罪不相及獨異常憲憲法也百代不免罰既無窮刑何以措凡諸雜戶悉放為民自是無復雜戶甲子鄭州獲九尾狐此時鄭州蓋猶在長社獻其骨周主曰瑞應之來必彰有德若五品時敍四海和平乃能致此此稽瑞應圖而言也孔氏書傳五品謂五常恐非實録命焚之九月戊寅周制庶人已上唯聽衣綢綿綢絲布圓綾紗絹綃葛布等九種衣於既翻綢與紬同直由翻大絲繒也綿綢紡綿為之今淮人能織綿紬緊厚耐久服絲布以絲裨布縷織之今謂之兼絲布圓綾土綾也亦謂之花絹紗方目紗也絹吉掾翻縑也細絲繒綃相邀翻生絲繒葛葛越宜夏服布緝麻若紵為之種章勇翻餘悉禁之朝祭之服不拘此制朝直遙翻冬十月戊申周主如鄴太建九年上聞周人滅齊欲爭徐兗此言禹迹徐兗二州之地禹貢曰海岱及淮惟徐州濟河惟兗州周之九州青州得沂泗淮三水兗州得大野無復徐州矣今之徐州春秋宋地左傳圍宋彭城是也秦屬泗水郡漢屬沛郡後分立楚國後置徐州自是之後徐州專治彭城矣以其世子戎昭將軍惠覺攝行州事明徹軍至呂梁周徐州總管梁士彥帥衆拒戰帥讀曰率戊午明徹擊破之士彥嬰城自守明徹圍之帝鋭意以為河南指麾可定中書通事舍人蔡景歷諫曰師老將驕不宜過窮遠略魏黃初中中書置通事郎晉初置舍人通事江左令舍人通事謂之通事舍人掌呈奏案又掌詔命陳氏得國國之政事並由中書省有中書舍人五人分掌二十一局事各當尚書諸曹並為上司總國內機要尚書唯聽受而已將即亮翻以為沮衆沮在呂翻出為豫章內史未行有飛章劾景歷在省贓汙狼籍坐免官削爵土飛者不知其所自來也蓋出於上意劾戶概翻又音戶得翻太建九年周改葬德皇帝於冀州宇文肱者宇文泰之父也從鮮于修禮攻定州戰死于唐河武成初追諡德皇帝其地在齊未得改葬平齊之後乃得改葬於冀州縗倉回翻哭於太極殿百官素服太建九年周人誣溫公高緯與宜州刺史穆提婆謀反並其宗族皆賜死衆人多自陳無之高延宗獨攘袂泣而不言以椒塞口而死塞悉則翻唯緯弟仁英以清狂仁雅以瘖疾得免漢張敞奏言昌邑王賀清狂不惠蘇林曰凡狂者陰陽脈盡濁今此人不狂似狂故言清狂或曰色理清徐而心不慧故曰清狂清狂如今白癡也瘖於今翻啞也其餘親屬不殺者散配西土西土謂長安西邊州郡周主以高湝妻盧氏賜其將斛斯徵湝戶皆翻又音皆將即亮翻下同盧氏蓬首垢面長齊不言笑徵放之乃為尼盧氏山東高門史言其能守節長齊者依佛教茹蔬素不食葷肉尼女夷翻女僧至以賣燭為業太建九年十一月壬申周立皇子衍嚴衍改克為道王道古國名春秋有江黃道柏皇子當作皇孫衍周太子之長子此有可疑者後注屢及之通鑑一百七十一卷太建五年六月書周皇孫衍生太建九年癸酉周遣上大將軍王軌將兵救徐州太建九年初周人敗齊師於晉州乘勝逐北齊人所棄甲仗未暇收斂事見上卷八年敗補邁翻間古莧翻並盜而有之仍立劉蠡升之孫沒鐸為主劉蠡升為高歡所滅見一百五十七卷梁武帝大同元年改元石平周人既克關東謂克齊也議欲窮其巢穴齊王憲曰步落稽種類既多種章勇翻又山谷險絶王師一舉未可盡除且當翦其魁首餘加慰撫周主從之以憲為行軍元帥督諸軍討之行軍元帥始此帥所類翻分道俱進沒鐸分遣其黨天柱守河東穆支守河西據險以拒之此西河離石之河東河西也滕王逌擊穆支逌以周翻並破之斬首萬餘級趙王招擊沒鐸禽之餘衆皆降降戶江翻太建九年周詔自永熙三年以來東土之民掠為奴婢後魏孝武帝永熙三年西入關自是宇文氏高氏交兵互相侵掠得其民口各以為奴婢良人沒為奴婢者梁世祖承聖三年江陵破事見一百六十五卷又詔後宮唯置二人世婦三人御妻三人此外皆減之周主性節儉常服布袍寢布被後宮不過十餘人每行兵親在行陳行陳上戶剛翻下讀曰陳步涉山谷人所不堪撫將士有恩而明察果斷斷丁亂翻用法嚴峻由是將士畏威而樂為之死將即亮翻樂音洛為于僞翻太建九年己亥晦日有食之太建九年周初行刑書要制㣥盜贓一匹及正長隱五丁若地頃以上皆死隋因周制制人五家為保保有長保五為閭閭四為族皆有正畿外置里正比閭正黨長比族正以相檢察所謂正長也百畝為頃長知兩翻太建九年十二月戊申新作東宮成太子徙居之太建九年庚申周主如並州徙並州軍民四萬戶於關中戊辰廢並州宮及六府是年春周置並州宮及六府太建九年高寶寧自黃龍上表勸進於高紹義黃龍即和龍今之黃龍府上時掌翻改元武平以寶寧為丞相突厥他鉢可汗舉兵助之可從刊入聲汗音寒十年十年春正月壬午周主幸鄴辛卯幸懷州懷州治河內郡野王自此以後周陳之君書如書幸雜出其間未悉義例所安癸巳幸洛州置懷州宮十年二月甲辰周譙孝王儉卒卒子恤翻十年丁巳周主還長安十年吳明徹圍周彭城環列舟艦於城下攻之甚急艦戶黯翻王軌引兵輕行據淮口淮口清水入淮之口即清口也以鐵鎖貫車輪數百沈之清水沈持林翻酈道元曰清水即泗水之別名以遏陳船歸路軍中恟懼恟許勇翻譙州刺史蕭摩訶言於明徹曰聞王軌始鎖下流其兩端築城今尚未立公若見遣擊之彼必不敢相拒水路未斷賊勢不堅彼城若立則吾屬必為虜矣明徹奮髯曰搴旗陷陳將軍事也長算遠略老夫事也摩訶失色而退史言明徹驕而愎諫以致敗髯而占翻搴起虔翻拔取也陳讀曰陳水路遂斷周兵益至諸將議破堰拔軍以舫載馬而去馬主裴子烈曰若破堰下船船必傾倒不如先遣馬出考異曰南史作馬明主今從陳書馬主馬軍主也堰於建翻舫府妄翻並兩船也倒都皓翻蕭摩訶復請曰今求戰不得進退無路若潛軍突圍未足為恥願公帥步卒乘馬輿徐行摩訶領鐵騎數千驅馳前後必當使公安達京邑京邑謂建康觀摩訶此言亦知軍退後周師繼至必不能守淮南復扶又翻帥讀曰率輿考字書皆無此字唯類篇有之音羊茹切舁車也今言乘馬輿則當讀與輿字同從平聲騎奇寄翻下同弟之此策乃良圖也然步軍既多吾為總督必須身居其後相帥兼行帥讀曰率下同弟馬軍宜速在前不可遲緩摩訶因帥馬軍夜發甲子明徹決堰乘水勢退軍冀以入淮至清口水勢漸微舟艦並礙車輪不復得過王軌引兵圍而蹙之衆潰明徹為周人所執將士三萬並器械輜重皆沒於周將即亮翻重直用翻蕭摩訶以精騎八十居前突圍衆騎繼之騎奇寄翻比旦達淮南淮水南岸也比必寐翻任音壬還音旋又如字初帝謀取彭汴以問五兵尚書毛喜彭汴謂彭城汴水之地五兵尚書以掌中兵外兵別兵都兵騎兵名官淮左新平邊民未輯周氏始吞齊國難與爭鋒且棄舟楫之工楫與楫同徐兗之地四平車騎便於馳突踐慈演翻騎奇寄翻非吳人所便臣愚以為不若安民保境寢兵結好好呼到翻斯久長之術也及明徹敗帝謂喜曰卿言驗於今矣即日召蔡景歷復以為征南咨議參軍亦以其言驗也周主封吳明徹為懷德公懷德郡公五代志巴東郡武寧縣後周置南都郡源陽縣尋改郡曰懷德縣曰武寧其朝列於大將軍無職事也卒子恤翻十年乙丑周以越王盛為大冢宰十年三月戊辰周於蒲州置宮五代志河東郡後魏曰秦州後周改蒲州因蒲坂以名州也同州治馮翊宇文泰輔魏多居同州其後受魏禪遂以同州置別宮長春宮在朝邑馮翊之屬縣也是宮蓋亦宇文所置十年甲戌周主初服常冠以皂紗全幅向後襆髮仍裁為四腳今之幞頭始此制微有不同耳杜佑曰後漢末王公卿士以幅巾為雅用全幅皂而向後襆髮謂之頭巾俗人因號為幞頭後周武帝因裁幅巾為四腳襆與幞同房玉翻皂才早翻十年丙子命中軍大將軍開府儀同三司淳于量為大都督陳制中軍大將軍品第二秩中二千石開府儀同三司品第一其秩則萬石矣鎮西將軍孫瑒都督荊郢諸軍瑒雉杏翻又音暢平北將軍樊毅都督清口上至荊山緣淮諸軍寧遠將軍任忠都督壽陽新蔡霍州諸軍以備周寧遠將軍梁置陳制擬官品第五此新蔡在弋陽郡界五代志梁置平高新蔡新城三郡於殷城後齊置新蔡郡於固始二縣皆屬弋陽任音壬十年乙酉大赦十年壬辰周改元宣政十年夏四月庚申突厥寇周幽州殺掠吏民厥九勿翻十年戊午樊毅遣軍渡淮北對清口築城壬戌清口城不守十年五月己丑周高祖帥諸軍伐突厥周主以是役殂於軍中故書其廟號帥讀曰率原古國名將即亮翻又音如字領也癸巳帝不豫留止雲陽宮五代志京兆郡雲陽縣後周置雲陽郡蓋亦置別宮於此丙申詔停諸軍驛召宗師宇文孝伯赴行在所後周置宗師之官蓋掌諸宗室杜佑曰宗師屬天官中大夫也五命小宗師下大夫四命宇文孝伯時留長安故驛召之天子所至為行在所吾自量必無濟理量音良以後事付君是夜授孝伯司衛上大夫總宿衛兵後周之制凡上大夫皆六命以備非常六月丁酉朔帝疾甚還長安是夕殂年三十六還從宣翻又音如字殂祚乎翻戊戌太子即位尊皇后阿史那氏為皇太后阿史那氏天和三年娶于突厥者也即逞奢欲大行在殯曾無戚容在戚而有嘉容魯昭公所以不終也大罵曰死晚矣捫以手撫摸也杖痕為太子時受杖之痕逼為淫欲周武帝未祔廟而書高祖者史筆也委以朝政鄭譯有寵事始上卷八年朝直遙翻己未葬武皇帝於孝陵廟號高祖既葬詔內外公除帝及六宮皆議即吉京兆郡丞樂運上疏以為葬期既促事訖即除太為汲汲帝不從樂運擢京兆郡丞見一百七十一卷五年自丁酉至己未二十三日而葬太速矣上時掌翻帝以齊煬王憲屬尊望重忌之齊王於周主叔父也屬尊出將入相著功名其望重諡法好內遠禮曰煬憲豈有是哉周主殺之而加以惡諡耳煬余亮翻公能為朕圖齊王為于僞翻當以其官相授孝伯叩頭曰先帝遺詔不許濫誅骨肉齊王陛下之叔父功高德茂社稷重臣陛下若無故害之章十二行本之下有臣又順旨曲從六字乙十一行本同孔本同張校同退齊校同則臣為不忠之臣陛下為不孝之子矣帝不懌由是疏之乃與開府儀同大將軍于智鄭譯等密謀之使智就宅候憲因告憲有異謀甲子帝遣宇文孝伯語憲語牛倨翻欲以憲為太師太師三師之首又使孝伯召憲曰晚與諸王俱入既至殿門憲獨被引進被皮義翻帝先伏壯士於別室至即執之憲自辨理帝使于智證憲憲目光如炬與智相質質證也驗也以王今日事勢何用多言憲曰死生有命寧復圖存復扶又翻但老母在堂恐留茲恨耳言既誣以異謀恐罪及其母也遂縊之縊於賜翻經也絞也帝召憲僚屬使證成憲罪參軍勃海李綱誓之以死終無橈辭橈奴教翻曲也有司以露車載憲尸而出車無帷蓋曰露車唯李綱撫棺號慟躬自瘞之綱在憲府先此未有聞焉而能臨難盡節於所事隋唐之間汔能自持有以也夫號戶刀翻瘞於計翻哭拜而去又殺上大將軍王興上開府儀同大將軍獨孤熊開府儀同大將軍豆盧紹隋書曰豆盧本姓慕容燕北地王精之後中山敗歸魏北人謂歸義為豆盧因氏焉帝既誅憲而無名無罪以加之為無名古所謂無名之師亦言無罪而加之兵也時人謂之伴死伴蒲旱翻以于智為柱國封齊公以賞之十年閏月乙亥周主立楊氏為皇后楊堅之女也十年辛巳周以趙王招為太師陳王純為太傅十年齊范陽王紹義聞周高祖殂以為得天助幽州人盧昌期起兵據范陽五代志幽州治薊城涿縣舊置范陽郡紹義引突厥兵赴之周遣柱國東平公神舉將兵討昌期將即亮翻紹義聞幽州總管出兵在外欲乘虛襲薊薊音計神舉遣大將軍宇文恩將四千人救之半為紹義所殺會神舉克范陽擒昌期紹義聞之素衣舉哀還入突厥高寶寧帥夷夏數萬騎救范陽還從宣翻又音如字厥九勿翻帥讀曰率夏戶雅翻騎奇寄翻至潞水水經注鮑丘水出禦夷北塞中俗謂之大榆河南過潞縣為潞水還據和龍十年秋七月周主享太廟丙午祀圜丘按五代志周祭圜丘及南郊並正月上辛今用七月丙午非舊制十年庚戌周以小宗伯斛斯徵為大宗伯壬戌以亳州總管楊堅為上柱國大司馬五代志譙郡後魏置南兗州後周置總管府後改曰亳州亳旁各翻十年癸亥周主尊所生母李氏為帝太后嫡母阿史那氏既尊為皇太后又尊生母為帝太后十年八月丙寅周主祀西郊五代志後周五郊壇其崇及去國如其行之數其方俱百二十步內壝皆半之壬申如同州以大司徒公亮為安州總管上柱國長孫覽為大司徒楊公王誼為大司空長知兩翻丙戌以永章十二行本永上有柱國二字乙十一行本同孔本同昌公椿為大司寇十年九月乙巳立方明壇於婁湖戊申以揚州刺史始興王叔陵為王官伯臨盟百官周禮司盟掌盟載之法凡邦國有疑會同則掌其盟約之載北面詔明神既盟則二之鄭玄注曰有疑不協也明神神之明察者謂日月山川也覲禮加方明于壇上所以依之也詔之者讀其載書以告之也二之者寫其副當以授六官陳祥道曰諸侯覲于天子為宮方三百步四門壇十有二尋深四尺加方明于其上覲禮方明者木也方四尺設六色東方青南方赤西方白北方黑上玄下黃設六玉上圭下璧南方璋西方琥東方圭北方璜鄭氏曰方明者上下四方神明之象也會同而盟明神監之六色象其神六玉以禮之上宜以蒼璧下宜以黃琮而不以者則上下之神非天地之至貴者也設玉者刻其木以著之王官伯者古者天子盟諸侯使天子之老涖之如春秋踐土之盟王子虎盟諸侯于王庭是之謂王官伯時彭城喪師陳人通國上下搖心故為是盟十年庚戌周主封其弟元為荊王十年周主詔諸應拜者皆以三拜成禮三拜成禮用夷禮也十年甲寅上幸婁湖誓衆乙卯分遣大使以盟誓班下四方上下相警戒使疏吏翻班下戶嫁翻班布也十年冬周章十二行本周上有十月癸酉四字乙十一行本同孔本同張校同主還長安以大司空王誼為襄州總管五代志襄陽郡江左僑置雍州西魏改曰襄州十年戊子以尚書左僕射陸繕為尚書僕射十年十一月突厥寇周邊圍酒泉殺掠吏民五代志張掖郡福祿縣舊置酒泉郡十年十二月甲子周以畢王賢為大司空十年己丑周以河陽總管滕王逌為行軍元帥帥衆入寇逌音由元帥所類翻帥衆之帥讀曰率十一年十一年春正月癸巳周主受朝於露門露門當作路門路大也蓋周之外朝也程泰之作雍録以唐大明宮丹鳳門太極宮承天門皆為唐之外朝蓋識此意朝直遙翻以此知後周之君臣前此蓋胡服也改元大成置四輔官以大冢宰越王盛為大前疑相州總管蜀公尉遲迥為大右弼申公李穆為大左輔大司馬隨公楊堅為大後承尉紆勿翻記文王世子虞夏商周有師保有疑丞設四輔及三公周主倣此以置官周主之初立也以高祖刑書要制為太重而除之周行刑書要制見上九年數所角翻下同京兆郡丞樂運上疏上時掌翻以為虞書所稱眚災肆赦眚所景翻謂過誤為害當緩赦之呂刑云五刑之疑有赦謂刑疑從罰罰疑從免也謹尋經典未有罪無輕重溥天大赦之文大尊豈可數施非常之惠以肆姦宄之惡乎大尊猶言至尊也既而民輕犯法又自以奢淫多過失惡人規諫惡烏路翻欲為威虐懾服㣥下懾之涉翻乃更為刑經聖制考異曰周帝紀行刑經聖制在八月按隋元巖傳樂運之諫因巖納說得免及王軌之死巖遂廢于家今運書已有更嚴前制之語然則行刑經在軌死前也大醮於正武殿告天而行之五代志道家齊法夜中於星辰之下陳設酒脯麥并餌幣物歷祀天皇太一祀五星列宿為書燒香陳讀云奏上天曹名之為醮醮子肖翻伺相吏翻小有過失輒行誅譴又居喪才踰年輒恣聲樂魚龍百戲常陳殿前五代志齊武平中有魚龍爛漫俳優朱儒山車巨象拔井種瓜殺馬剝驢等奇怪異端百有餘物名為百戲時鄭譯有寵於周主徵齊散樂並會京師為之蓋秦角抵之流也不知休息多聚美女以實後宮增置位號不可詳録遊宴沈湎或旬日不出沈持林翻湎彌兗翻毛晃曰沈湎飲酒齊其色韓詩飲酒閉門不出客曰湎㣥臣請事者皆因宦者奏之於是樂運輿櫬詣朝堂陳帝八失櫬初覲翻空棺朝直遙翻下同其一以為大尊比來事多獨斷比毗至翻斷丁亂翻不參諸宰輔與衆共之其二搜美女以實後宮儀同以上女不許輒嫁貴賤同怨其三大尊一入後宮數日不出所須聞奏多附宦官其四下詔寬刑未及半年更嚴前制其五高祖斫雕為朴崩未踰年而遽窮奢麗其六徭賦下民以奉俳優角抵其七上書字誤者即治其罪上時掌翻治直之翻杜獻書之路其八玄象垂誡不能咨諏善道玄象天象也日月星辰在天成象諏子于翻又子侯翻若不革茲八事臣見周廟不血食矣犧牲之薦為血食將殺之朝臣恐懼莫有救者內史中大夫洛陽元巖歎曰臧洪同死人猶願之陳容願與臧洪同死事見六十一卷漢獻帝興平三年以樂運忠諫況之比干吾將與之俱斃乃詣閣請見見賢遍翻曰樂運不顧其死欲以求名陛下不如勞而遣之勞力到翻以廣聖度帝頗感悟明日召運謂曰朕昨夜思卿所奏實為忠臣賜御食而罷之十一年癸卯周立皇子闡為魯王按李延壽北史靜帝諱衍後改名闡觀此則九年周立皇子衍為道王自是高祖之子邪甲辰周主東巡章十二行本巡下有丙午二字乙十一行本同孔本同以許公宇文善為大宗伯戊午周主至洛陽立魯王闡為皇太子闡昌善翻十一年二月癸亥上耕藉田藉在亦翻十一年周下詔以洛陽為東京發山東諸州兵治洛陽宮治直之翻常役四萬人徙相州六府於洛陽周置相州六府見上九年相息亮翻十一年周徐州總管王軌聞鄭譯用事自知及禍謂所親曰吾昔在先朝實申社稷至計今日之事斷可知矣朝直遙翻斷丁亂翻此州控帶淮南鄰近強寇欲為身計易如反掌強寇謂陳易以豉翻不可虧違況荷先帝厚恩荷下可翻豈可以獲罪嗣主遽忘之邪邪音耶正可於此待死冀千載之後知吾此心耳載作亥翻周主從容問譯曰我腳杖痕誰所為也對曰事由烏丸軌受杖事見上卷八年王軌蓋賜姓烏丸氏故稱之從千容翻宇文孝伯何為出此言也欲自求免死邪然終於不免也捋須事見同上元巖不肯署詔御正中大夫顏之儀切諫武成元年置御正四人巖進繼之脫巾頓顙三拜三進顙蘇朗翻額也帝曰汝欲黨烏丸軌邪巖曰臣非黨軌正恐濫誅失天下之望帝怒使閹豎搏其面搏手擊也巖亦廢于家遠近知與不知皆為軌流涕為于僞翻之儀之推之弟也顏之推先仕於齊齊亡入周周主之為太子也上柱國尉遲運為宮正此太子宮正也尉紆勿翻不用數所角翻又與王軌宇文孝伯宇文神舉皆為高祖所親待太子疑其同毀己及軌死運懼私謂孝伯曰吾徒必不免禍為之奈何孝伯曰今堂上有老母地下有武帝武帝即高祖也知欲何之之往也本狥名義諫而不入死焉可逃質如字焉於乾翻宜且遠之遠于願翻於是運求出為秦州總管天水郡舊秦州他日帝託以齊王憲事讓孝伯曰公知齊王謀反何以不言對曰臣知齊王忠於社稷為㣥小所譖言必不用所以不言且先帝付囑微臣囑之欲翻託也唯令輔導陛下今諫而不從實負顧託以此為罪是所甘心帝大慙俯首不語令力丁翻俯音免命將出賜死于家將引也領也時宇文神舉為並州刺史帝遣使就州鴆殺之使疏吏翻尉遲運至秦州亦以憂死十一年周罷南伐諸軍十一年突厥他鉢可汗請和於周厥九勿翻可從刊入聲汗音寒周主以趙王招女為千金公主妻之妻七細翻且命執送高紹義他鉢不從十一年辛巳周宣帝傳位於太子闡大赦改元大象自稱天元皇帝所居稱天臺冕二十四旒車服旗鼓皆倍於前王之數皇帝稱正陽宮置納言御正諸衛等官保定四年改宗伯為納言此納言似隋官之納言為門下省長官諸衛等官左右宮伯小宮伯左右中侍左右侍左右前侍左右後侍左右騎侍左右宗侍左右庶侍左右勳侍左右武伯小武伯左右武賁左右旅賁左右射聲左右驍騎左右羽林左右游擊也尊皇太后為天元皇太后天元既傳位驕侈彌甚務自尊大無所顧憚國之儀典率情變更更工衡翻每對臣下自稱為天用樽彞圭瓚以飲食周禮有六尊六彞尊有罍而彞有舟鄭玄曰彞亦尊也鬱鬯曰彞彞法也言為尊之法鄭衆曰於圭頭為器可以挹鬯祼祭謂之瓚瓚藏旱翻致齊三日清身一日朝直遙翻既自比上帝不欲㣥臣同己常自帶綬冠通天冠加金附蟬顧見侍臣辨上有金蟬及王公有綬者並令去之五代志古者君臣佩玉綬者所以貫佩相承受也又上下施韍如蔽膝五霸之後戰兵不息佩非兵器韍非戰儀於是解去佩韍留其繫襚而已韍佩既廢秦乃以采組連結於襚又謂之綬周制皇帝組綬以蒼以青以朱以黃以白以玄以纁以紅以紫以緅以碧以緑十有二色諸王及三公九色自黃以下王公以下以差降殺通天冠古制高九寸正豎頂少斜卻乃直下鐵為卷梁前有展筒冠前加金博山述加金附蟬者乃侍中常侍所冠武辨也史皆言天元之率意自尊綬音受冠通之冠古玩翻令力丁翻去羌呂翻天高上大之稱稱尺證翻官名有犯皆改之改姓高者為姜齊太公之後食采於高因以為氏本姜姓也使改從本姓長祖長知兩翻又令天下車皆以渾木為輪渾戶本翻禁天下婦人不得施粉黛粉以傅面黛以填額畫眉皆黃眉墨妝每召侍臣論議唯欲興造變革未嘗言及政事游戲無常出入不節羽儀仗衛晨出夜還還從宣翻又音如字陪侍之官皆不堪命自公卿以下常被楚撻每捶人皆以百二十為度謂之天杖被皮義翻下同捶止蕊翻其後又加至二百四十宮人內職亦如之后嬪御雖被寵幸亦多杖背於是內外恐怖怖蒲布翻人不自安皆求苟免莫有固志重足纍息重足而立屏氣積鬱而不敢息重直龍翻纍力委翻十一年戊子周以越王盛為太保尉遲迥為大前疑代王達為大右弼辛卯徙鄴城石經於洛陽尉紆勿翻漢靈帝時蔡雍立石經於太學講堂前一曰立於鴻都門魏正始中又立古篆隸三字石經高澄遷之於鄴周今復徙之洛陽詔河陽幽相豫亳青徐七總管並受東京六府處分相息亮翻處昌呂翻分扶問翻三月庚申天元還長安大陳軍伍親擐甲胄擐音宦入自青門靜帝備法駕以從青門漢長安城東出南來第三門也門色青故名青門法駕次於大駕從才用翻夏四月壬戌朔立朱氏為天元帝后后吳人本出寒微生靜帝長於天元十餘歲長知兩翻疏賤無寵以靜帝故特尊之乙巳周主祠太廟壬午大醮於正武殿五月章十二行本月下有辛亥二字乙十一行本同孔本同張校同以襄國郡為趙國濟南郡為陳國武當安富二郡為越國上黨郡為代國新野郡為滕國邑各萬戶食邑各有實土安富當作安福五代志淅陽郡武當縣舊置武當郡又安福縣置安福郡南陽郡之新野縣舊曰棘陽置新野郡濟子禮翻隨公楊堅私謂大將軍汝南公慶曰天元實無積德視其相貌壽亦不長相息亮翻又諸藩微弱各令就國曾無深根固本之計羽翮既翦何能及遠哉觀楊堅此言豈有篡心哉然堅處猜虐之朝而發此言其免者蓋幸也神舉之弟也十一年突厥寇周並州厥九勿翻並卑經翻六月周發山東諸民修長城修齊所築長城也齊築長城見百六十六卷梁敬帝太平元年十一年秋七月庚寅周以楊堅為大前疑柱國司馬消難為大後承難乃旦翻十一年辛卯初用大貨六銖錢五代志梁武帝鑄錢肉好周郭文曰五銖而又別鑄除其肉郭謂之女錢二品並行百姓或私以古錢交易有直百五銖五銖女錢太平百錢定平一百五銖雉錢五銖對文等號輕重不一天子頻下詔書非新鑄二種之錢並不許用而私用益甚至普通中乃議盡罷銅錢更鑄鐵錢人以鐵賤易得並皆私鑄大同已後所在鐵錢如丘山錢陌所在不等至于末年陌益少以三十五為陌陳初承喪亂之後鐵錢不行始梁末又有兩柱錢及鵝眼錢兩柱重而鵝眼輕雜而用之其價同私家多鎔錢又間以錫鐵兼以粟帛為貨至文帝天嘉五年改鑄五銖初出當鵝眼之十至是又鑄大貨六銖以一當五銖之十後還當一人皆不以為便未幾帝崩遂廢六銖而行五銖十一年丙申周納司馬消難女為正陽宮皇后靜帝后也難乃旦翻己酉周尊天元帝太后李氏為天皇太后壬子改天元皇后朱氏為天皇后立元氏為天右皇后陳氏為天左皇后凡四后云元氏開府儀同大將軍晟之女晟成正翻陳氏大將軍山提之女也陳山提爾朱兆蒼頭也見一百五十六卷梁武帝中大通五年八月庚申天元如同州十一年丁卯上閲武於大壯觀命都督任忠帥步騎十萬陳於玄武湖都督陳景帥樓艦五百出瓜步江振旅而還觀古玩翻釋名觀者於上觀望帥讀曰率騎奇寄翻陳讀曰陳樓艦即樓船兩面施重板列戰格故謂之樓艦艦戶黯翻還音旋又如字帝自喪師於彭城設近陳以耀武所謂不足者示人有餘也十一年壬申周天元還長安甲戌以陳山提元晟並為上柱國二人者皆后父也晟丞正翻十一年戊寅上還宮豫章內史南康王方泰在郡秩滿縱火延燒邑居因行暴掠驅録富人徵求財賄録收也方泰當從從才用翻啓稱母疾不行而微服往民間淫人妻為州所録州謂揚州也傷禁司仗兵仗禁司掌禁防姦非者帥讀曰率上大怒下方泰獄下戶嫁翻免官削爵土尋而復舊十一年壬午周以上柱國畢王賢為太師郇公韓業為大左輔九月乙卯以酆王貞為大冢宰以鄖公孝章十二行本孝上有韋字乙十一行本同孔本同寬為行軍元帥郇音荀酆音豐鄖音云帥所類翻帥行軍總管公亮郕公梁士彥寇淮南帥讀曰率仍遣御正杜杲禮部薛舒來聘十一年冬十月壬戌周天元幸道會苑大醮以高祖配醮初復佛像及天尊像周毀經像見上卷六年大陳雜戲令長安士民縱觀令力丁翻十一年甲戌以尚書僕射陸繕為尚書左僕射十一年十一月辛卯大赦十一年周韋孝寬分遣公亮自安陸攻黃城梁士彥攻廣陵分兩路進兵以攻淮南此廣陵在新息甲午士彥至肥口肥水入淮之口十一年乙未周天元如溫湯即驪山溫湯在驪山西北十道志曰溫泉有三所其一處即皇堂石井後周宇文護所造十一年戊戌周軍進圍壽陽十一年周天元如同州十一年詔開府儀同三司南兗州刺史淳于量為上流水軍都督中領軍樊毅都督北討諸軍事左衛將軍任忠都督北討前軍事前豐州刺史皋文奏帥步騎三千趣陽平郡五代志建安郡陳置豐州江都郡安宜縣梁置陽平郡皋姓皋陶之後左傳有越大夫皋如帥讀曰率下同騎奇寄翻下同趣七喻翻下同十一年壬寅周天元還長安十一年癸卯任忠帥步騎七千趣秦郡趣七喻翻丙午仁威將軍魯廣達帥衆入淮梁置五德將軍智仁勇信嚴五威將軍代舊征虜五武將軍代舊冠軍樊毅將水軍二萬自東關入焦湖九域志巢湖亦謂之焦湖樊毅水軍欲自此湖向合肥將即亮翻又音如字領也焦子小翻武毅將軍亦梁置下於五德二班戊申韋孝寬拔壽陽公亮拔黃城梁士彥拔廣陵辛亥又取霍州水經注蕭齊立霍州治灊縣天柱山五代志廬江郡霍山縣梁置霍州癸丑以揚州刺史始興王叔陵為大都督總水步衆軍十一年丁巳周鑄永通萬國錢一當千與五行大布並行五代志周令五行大布與五銖三品並用十一年十二月戊午周天元以災異屢見舍仗衛如天興宮百官上表勸復寢膳見賢遍翻舍讀曰捨上時掌翻甲子還宮御正武殿集百官及宮人外命婦外命婦五命以上官之妻也伎渠綺翻初作乞寒胡戲杜佑曰乞寒者本西國外藩之樂也新唐書康國之俗十一月鼓舞乞寒以水交潑為樂其戲流入中國十一年乙丑南北兗晉三州五代志不載北兗州所治同安郡梁置豫州後改曰晉州後齊改江州陳復曰晉州考異曰陳紀九郡作九州蓋字誤五代志江都永福縣舊曰沛梁置涇城東陽二郡及涇州陳廢州併二郡為沛郡全椒縣梁置北譙郡南梁郡自宋志有之不知其實土所在梁天監二年馮道根以南梁太守戍阜陵蓋自是為實土譙州治渦陽在譙郡山桑縣北徐州置於琅邪郡十一年周天元如洛陽親御驛馬日行三百里四皇后及文武侍衛數百人並乘馹以從馹人質翻亦驛馬也從才用翻仍令四后方駕齊驅方駕並駕也輒加譴責人馬頓仆相及於道十一年癸酉遣平北將軍沈恪電威將軍裴子烈鎮南徐州開遠將軍徐道奴鎮柵口電威開遠將軍品並第七秩六百石柵口柵江口戊寅以中領軍樊毅都督荊郢巴武四州水陸諸軍事五代志南郡公安縣陳置荊州江夏郡置郢州巴陵郡置巴州武陵郡置武州十一年己卯周天元還長安十一年貞毅將軍汝南周法尚貞毅將軍班五德將軍之下叔堅譖之於上云其欲反上執其兄定州刺史法僧五代志永安郡麻城縣陳置定州其地時已沒於周法尚奔周周天元以為章十二行本為下有開府二字乙十一行本同孔本同張校同儀同大將軍順州刺史五代志漢東郡順義縣西魏置順州法尚遣部曲督韓朗詐降於猛曰法尚部兵不願降北降戶江翻人皆竊議欲叛還還從宣翻又音如字若得軍來自當倒戈猛以為然引兵急趨之趨七喻翻又音如字法尚陽為畏懼自保江曲江曲江水之曲伏兵邀之猛僅以身免沒者幾八千人幾居依翻章錫琛標點容肇祖聶崇岐覆校
