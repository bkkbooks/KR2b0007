body:
  text: 資治通鑑卷第一百二十四端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注宋紀六太祖文皇帝中之中元嘉十九年壬午四四二春正月甲申魏主備法駕詣道壇受符籙旗幟盡青自是每帝即位皆受籙此所受者今道士所謂法籙也隋志曰道士受道之法初受五千文籙次受三洞籙次受洞玄籙次受上清籙籙皆素書紀諸天曹官屬佐吏之名又有諸符錯在其間文章詭怪世所不識籙龍玉翻水經注靜輪宮在道壇東北道壇在平城東灅水之左欲以上接天神崔浩勸帝為之功費萬計經年不成太子晃諫曰天人道殊卑高定分分扶問翻不可相接理在必然今虛耗府庫疲弊百姓為無益之事將安用之必如謙之所言請因東山萬仞之高謂平城之東山也易以豉翻帝不從夏四月沮渠無諱將萬餘家棄敦煌西就沮渠安周未至鄯善王比龍畏之將其衆奔且末沮子余翻將即亮翻敦徒門翻鄯上扇翻且末漢故國在鄯善西去代八千三百二十里且子餘翻其世子降於安周降戶江翻無諱遂據鄯善其士卒經流沙渴死者太半李寶自伊吾帥衆二千入據敦煌帥讀曰率繕修城府安集故民沮渠牧犍之亡也見上卷十六年犍居言翻自稱太守唐契為柔然所逼擁衆西趨高昌闞苦濫翻守手又翻趨七喻翻欲奪其地柔然遣其將阿若追擊之契敗死營陽王景平元年契與李寶同奔伊吾時沮渠安周屯橫截城和攻拔之又拔高寧白力二城李延壽曰高昌國有四十六鎮交河田地高寧白刃橫截等餘不具載白力當作白刃使疏吏翻甲戌上以疾愈大赦五月裴方明等至漢中與劉真道等分兵攻武興下辨白水皆取之下辨漢書作下辨並音皮莧翻元豐九域志階州將利縣有蘭皋鎮按五代志將利縣後魏武興郡之石門縣也蕭子顯曰武興西北有蘭皋戍去仇池二百里符恐當作苻楊氏苻氏皆氐種也方明與弘祖戰于濁水濁水城在上祿縣東南武街城西北酈道元曰濁水即白水也武街城故下辨縣治斬弘祖和退走追至赤亭又破之難當奔上邽獲難當兄子建節將軍保熾難當以其子虎為益州刺史守陰平聞難當走引兵還至下辨方明使其子肅之邀擊之擒虎送建康斬之仇池平以輔國司馬胡崇之為北秦州刺史鎮其地立楊保熾為楊玄後使守仇池楊難當廢玄子保宗而自立見一百二十一卷六年秋七月以劉真道為雍州刺史雍於用翻裴方明為梁南秦二州刺史方明辭不拜考異曰真道傳此事在胡崇之沒後氐胡傳崇之沒在明年二月即真道傳誤丙寅魏主使安西將軍古弼考異曰宋索虜傳作吐奚愛弼氐胡傳作吐奚弼蓋其舊姓今從後魏書賁音奔與武都王楊保宗自祁山南入保宗奔魏見上卷十六年俱會仇池又使譙王司馬文思督洛豫諸軍南趨襄陽營陽王景平二年魏取河南置洛州於洛陽豫州於虎牢趨七喻翻下同雍於容翻移書徐州稱為楊難當報仇為于僞翻甲戌晦日有食之唐契之攻闞爽也考異曰宋氐胡傳作闕爽今從後魏書欲與之共擊契使疏吏翻降戶江翻八月無諱將其衆趨高昌比至將即亮翻下同比必利翻及也契已死爽閉門拒之九月無諱將衛興奴夜襲高昌屠其城考異曰宋書衛興奴作衛尞今從後魏書無諱據高昌遣其常侍泛雋奉表詣建康泛音凡詔以無諱都督涼河沙三州諸軍事征西大將軍涼州刺史河西王考異曰宋本紀封爵在六月傳在九月末今從傳冬十月己卯魏立皇子伏羅為晉王翰為秦王談為燕王建為楚王余為吳王甲申柔然遣使詣建康十二月辛巳魏襄城孝王盧魯元卒丙申詔魯郡修孔子廟及學舍蠲墓側五戶課役以供灑掃灑所賣翻又所買翻掃素報翻又蘇老翻李寶遣其弟懷達子承奉表詣平城魏人以寶為都督西垂諸軍事遠邊日垂敦徒門翻四品以下聽承制假授雍州刺史晉安襄侯劉道産卒道産善為政民安其業小大豐贍由是民間有襄陽樂歌雍於用翻贍時豔翻卒子恤翻樂音洛山蠻前後不可制者皆出緣沔為村落戶口殷盛及卒蠻追送至沔口未幾㣥蠻大動道産卒未幾而㣥蠻作亂後之人不能容養之也沔彌兗翻幾居豈翻不利詔建威將軍沈慶之代之殺虜萬餘人魏主使尚書李順差次㣥臣賜以爵位順受賄品第不平是歲涼州人徐桀告之魏主怒且以順保庇沮渠氏面欺誤國事見上卷十六年二十年癸未四四三春正月魏皮豹子進擊樂鄉將軍王奐之等敗沒魏軍進至下辨將軍強玄明等敗死強其兩翻二月胡崇之與魏戰於濁水崇之為魏所擒餘衆走還漢中將軍姜道祖兵敗降魏降戶江翻魏遂取仇池楊保熾走丙午魏主如恆山之陽恆戶登翻三月庚申還宮壬戌烏洛侯國遣使如魏烏洛侯國在地豆干國北去代四千五百餘里地豆干在室韋西千餘里室韋當勿吉之北勿吉在高麗之北則烏洛侯東夷也使疏吏翻魏之居北荒也鑿石為廟在烏洛侯西北以祀其先高七十尺深九十步度高曰高音居號翻度深曰深音式禁翻及烏洛侯使者至魏言石廟具在魏主遣中書侍郎李敞詣石廟致祭刻祝文於壁而還去平城四千餘里魏河間公齊與武都王楊保宗對鎮雒谷雒谷即駱谷北史作駱令閉險自固以叛魏說輸芮翻或以告齊夏四月齊誘執保宗送平城殺之前鎮東司苻達司上當有軍字否則司下當有馬字章十二行本司下正有馬字孔本同張校同苻達等皆楊氏官屬也任音壬朏敷尾翻據白崖今大安軍東北八十里有白崖大安軍古葭萌地也考異曰宋氐胡傳云拓跋齊聞兵起遁走達追擊斬齊因據白崖按後魏河間公齊傳云文德求援於宋宋遣房亮之苻昭啖龍等帥衆助文德斬龍禽亮之氐遂平以功拜內都大官卒然則宋書誤也進圍仇池自號征西將軍秦河梁三州牧仇池公考異曰宋書在三月魏書在四月今從之甲午立皇子誕為廣陵王丁酉魏大赦己亥魏主如陰山五月魏古弼發上邽高平岍城諸軍擊楊文德岍城意當作汧城汧口堅翻皮豹子督關中諸軍至下辨聞仇池解圍欲還弼遣人謂豹子曰宋人恥敗必將復來復扶又翻軍還之後再舉為難不如練兵蓄力以待之不出秋冬宋師必至以逸待勞無不克矣豹子從之魏以豹子為仇池鎮將楊文德遣使來求援使疏吏翻秋七月癸丑詔以文德為都督北秦雍二州諸軍事征西大將軍北秦州刺史武都王雍於用翻文德屯葭蘆城五代志武都郡盤堤縣西魏之南五部縣也魏又置武陽郡及茄蘆縣後周皆併入盤堤祝穆曰盤池山在階州福津縣東南七十里郡縣志魏將鄧艾與蜀將姜維相持於此置茄蘆戍後於此置縣武都陰平氐多歸之甲子前雍州刺史劉真道梁南秦二州刺史裴方明坐破仇池減匿金寶及善馬下獄死宋人捨功録過自戮良將宜其為魏人所窺下遐稼翻九月辛巳魏主如漠南甲辰捨輜重重直用翻以輕騎襲柔然騎奇寄翻下同分軍為四道樂安王範建寧王崇各統十五將出東道樂平王丕督十五將出西道魏主出中道中山王辰督十五將為後繼將即亮翻魏主至鹿渾谷鹿渾谷即鹿渾海之谷也本高車袁紇部所居其地直平城西北其東即弱洛水可從刊入聲汗音寒賊不意大軍猝至宜掩其不備速進擊之尚書令劉潔固諫以為賊營中塵盛其衆必多出至平地恐為所圍不如須諸軍大集須待也晃曰塵之盛者由軍士驚怖擾亂故也怖普布翻何得營上而有此塵乎魏主疑之不急擊柔然遁去追至石水不及而還石水在頞根河北還從宣翻又如字柔然不覺魏軍至上下惶駭引衆北走經六七日知無追者乃始徐行魏主深恨之為魏誅劉潔中山王辰等張本皆與太子謀之司馬楚之別將兵督軍糧鎮北將軍封沓亡降柔然說柔然令擊楚之以絶軍食降戶江翻說輸芮翻俄而軍中有告失驢耳者諸將莫曉其故楚之曰此必賊遣姦人入營覘伺覘丑廉翻又丑豔翻伺相吏翻割驢耳以為信耳賊至不久宜急為之備乃伐柳為城以水灌之令凍城立而柔然至冰堅滑不可攻乃散走十一月將軍姜道盛與楊文德合衆二萬攻魏濁水戍魏皮豹子河間公齊救之道盛敗死甲子魏主還至朔方下詔令皇太子副理萬機總統百揆考異曰宋索虜傳晃與大臣崔氏寇氏不睦崔寇譖之玄高道人有道術晃使祈福七日七夜佛貍夢其祖父並怒手刃向之曰汝何故信讒欲害太子佛貍驚覺下僞詔曰王者大業纂承為重儲宮嗣紹百王舊例自今以往事無巨細必經太子然後上聞事節小異今從後魏書諸功臣勤勞日久皆當以爵歸第隨時朝請饗宴朕前論道陳謨而已不宜復煩以劇職朝直遙翻復扶又翻更舉賢俊以備百官十二月丁章十二行本丁作辛乙十一行本同孔本同退齊校同卯魏主還平城自伐柔然還也二十一年甲申四四四春正月己亥帝耕藉田大赦藉秦昔翻考異曰宋略辛酉藉田大赦下有戊午又有辛酉誤也今從宋書壬寅魏太子始總百揆命侍中中書監穆壽司徒崔浩侍中張黎古弼輔太子決庶政上書者皆稱臣儀與表同古弼為人忠慎質直嘗以上谷苑囿太廣乞減太半以賜貧民入見魏主欲奏其事據北史古弼傳時上谷人上書言苑囿過度人無田業宜減太半以賜貧者蓋上谷距代都甚遠魏未嘗置苑囿於其地而道武帝起鹿苑於南臺陰北距長城東苞白登屬之西山廣輪數十里天興六年幸南平城規度灅南夏屋山背黃瓜堆以建新邑至天賜三年遂築灅南宮闕引溝穿池廣苑囿所謂太廣者此也不在上谷當以北史為正見賢遍翻志不在弼弼侍坐良久不獲陳聞坐徂臥翻忽起捽樹頭捽昨沒翻掣下牀搏其耳毆其背掣尺列翻毆烏口翻曰朝廷不治實爾之罪治直之翻帝失容捨碁曰不聽奏事朕之過也樹何罪置之弼具以狀聞帝皆可其奏弼曰為人臣無禮至此其罪大矣出詣公車免冠徒跣請罪帝召入謂曰吾聞築社之役蹇蹶而築之蜀注曰跛蹇而顛蹶也神降之福然則卿有何罪其冠履就職苟可以利社稷便百姓者竭力為之勿顧慮也太子課民稼穡使無牛者借人牛以耕種而為之藝田以償之為于僞翻凡耕種二十二畝而藝七畝大略以是為率使民各標姓名於田首以知其勤惰禁飲酒遊戲者於是墾田大增戊申魏主詔王公以下至庶人有私養沙門巫覡於家者男曰巫女曰覡覡刑狄翻過二月十五日不出沙門巫覡死主人門誅門誅者闔門盡誅之庚戌又詔王公卿大夫之子皆詣太學其百工商賈之子當各習父兄之業賈音古毋得私立學校校戶教翻違者師死主人門誅二月辛未魏中山王辰內都坐大官薛辨魏置中都大官外都大官都坐大官皆掌折獄謂之三都坐徂臥翻將即亮翻下同坐擊柔然後期斬於都南初魏尚書令劉潔久典機要宋高祖永初末魏明元帝寢疾魏主監國劉潔與古弼等選侍東宮對綜機要至是二十餘年矣魏主心惡之惡烏路翻及將襲柔然潔諫曰蠕蠕遷徙無常前者出師勞而無功潔之言蓋指太延四年魏主伐柔然至白阜時也蠕人兗翻崔浩固勸魏主行魏主從之潔恥其言不用欲敗魏師敗補邁翻魏主與諸將期會鹿渾谷潔矯詔易其期帝至鹿渾谷章十二行本谷下有欲擊柔然潔諫止之使待諸將帝留鹿渾谷十七字乙十一行本同孔本同張校同六日諸將不至柔然遂遠遁追之不及軍還經漠中糧盡士卒多死潔陰使人驚魏軍勸帝委軍輕還帝不從潔以軍出無功請治崔浩之罪治直之翻下同帝曰諸將失期遇賊不擊浩何罪也浩以潔矯詔事白帝帝至五原收潔囚之帝之北行也潔私謂所親曰若車駕不返吾當立樂平王潔聞尚書右丞張嵩家有圖讖問曰劉氏應王繼國家後吾有姓名否嵩曰有姓無名帝聞之命有司窮治索嵩家得讖書索山客翻事連南康公狄鄰潔嵩鄰皆夷三族死者百餘人潔在勢要好作威福好呼到翻諸將破敵所得財物皆與潔分之既死籍其家財巨萬帝每言之則切齒癸酉樂平戾王丕以憂卒初魏主築白臺高二百餘尺魏主嗣泰常二年秋七月乙酉起白臺於平城南高二十丈四顧不見人命術士董道秀筮之道秀曰大吉丕默有喜色及丕卒道秀亦坐棄市高允聞之曰夫筮者皆當依附爻象勸以忠孝漢嚴君平卜筮於成都市人有邪惡非正之問則依蓍龜為言利害與人子言依於孝與人弟言依於順與人臣言依於忠各因勢道之以善高允之言祖君平之術也道秀宜曰窮高為亢易曰亢龍有悔又曰高而無民易乾上九及文言之辭亢苦浪翻王不可以不戒如此則王安於上身全於下矣道秀反之宜其死也庚辰魏主幸廬自南北國分治人主所至例不書幸此必誤也己丑江夏王義恭進位太尉領司徒夏戶雅翻庚寅以侍中領右衛將軍沈演之為中領軍左衛將軍范曄為太子詹事辛卯立皇子宏為建平王三月甲辰魏主還宮癸丑魏主遣司空長孫道生鎮統萬長知兩翻夏四月乙亥魏侍中太宰陽平王杜超為帳下所殺六月魏北部民殺立義將軍衡陽公莫孤帥五千餘落北走遣兵追擊之至漠南殺其渠帥餘徙冀相定三州為營戶杜佑曰魏道武天興中詔採漏戶令輸綸綿自後諸逃戶占為紬繭羅縠者甚衆於是雜營戶率遍於天下不隸守宰賦役不同景穆皇帝一切罷之以屬郡縣孤帥讀曰率渠帥所類翻相息亮翻吐谷渾王慕利延兄子緯世與魏使者謀降魏緯世即阿柴之長子緯代也北史避唐太宗諱改世為代使疏吏翻降戶江翻是月緯世弟叱力延等八人奔魏魏以叱力延為歸義王沮渠無諱卒沮子余翻弟安周代立魏入中國以來雖頗用古禮祀天地宗廟百神而猶循其舊俗所祀胡神甚衆崔浩請存合於祀典者五十七所其餘復重及小神悉罷之重直龍翻魏主從之秋七月癸卯魏東雍州刺史沮渠秉謀反伏誅隋志絳郡後魏置東雍州後周改曰絳州雍於用翻八月乙丑魏主畋于河西尚書令古弼留守守手又翻詔以肥馬給獵騎弼悉以弱者給之帝大怒曰筆頭奴敢裁量朕騎奇寄翻量音良朕還臺先斬此奴弼頭鋭故帝常以筆目之弼官屬惶怖恐並坐誅怖普布翻弼曰吾為人臣不使人主盤于遊畋盤樂也不備不虞乏軍國之用其罪大今蠕蠕方強南寇未滅吾以肥馬供軍弱馬供獵為國遠慮為于僞翻雖死何傷且吾自為之非諸君之憂也帝聞之歎曰有臣如此國之寶也賜衣一襲衣一稱為一襲猶今言一副衣服也鹿十頭他日魏主復畋於山北山北平城北山之北復扶又翻詔尚書發車五百乘以運之觀下載弼表蓋發民車也乘繩證翻魏主謂左右曰筆公必不與我汝輩不如以馬運之遂還行百餘里得弼表曰今秋穀懸黃麻菽布野豬鹿竊食鳥鴈侵費風雨所耗朝夕三倍言夕之所收較於朝之所收得失三倍收穫不可以不速載麋鹿猶可緩使得收載帝曰果如吾言筆公可謂社稷之臣矣魏主使員外散騎常侍高濟來聘散悉亶翻騎奇寄翻戊辰以荊州刺史衡陽王義季為征北大將軍開府儀同三司南兗州刺史以南譙王義宣為荊州刺史初帝以義宣不才故不用會稽公主屢以為言帝不得已用之會稽公主高祖長女帝深加禮敬家事大小必咨之會工外翻師護以在西久詔自中出不經門下者謂之中詔今之手詔是也敕戒也義季小字師護比毗至翻頻也今欲聽許以汝代之師護雖無殊績潔己節用潔與潔同不恣㣥下聲著西土為士庶所安論者乃未議遷之今之回換更為汝與師護年時一輩為于僞翻欲各試其能汝往脫有一事減之者既於西夏交有巨礙江左六朝以荊楚為西夏夏戶雅翻必歸責於吾矣言遷代之際所任非人也無為使人復生評論也易以豉翻復扶又翻義宣至鎮勤自課厲事亦修理庚辰會稽長公主卒長知兩翻卒子恤翻吐谷渾叱力延等請師於魏以討吐谷渾王慕利延魏主使晉王伏羅督諸軍擊之九月甲辰以沮渠安周為都督涼河沙三州諸軍事涼州刺史河西王丁未魏主如漠南將襲柔然柔然敕連可汗遠遁乃止敕連尋卒子吐賀真立號處羅可汗魏收曰處羅魏言唯也可從刊入聲汗音寒魏晉王伏羅至樂都樂音洛引兵從間道襲吐谷渾間古莧翻至大母橋吐谷渾王慕利延大驚逃奔白蘭慕利延兄子拾寅奔河西魏軍斬首五千餘級慕利延從弟伏念等帥萬三千落降於魏慕利延背阿柴折箭之誡使之招引外寇至於衆叛親離固其宜也從才用翻帥讀曰率降戶江翻冬十月己卯以左軍將軍徐瓊為兗州刺史大將軍參軍申恬為冀州刺史徙兗州鎮須昌沈約曰武帝定河南以兗州治滑臺文帝元嘉十三年治鄒山又寄治彭城此又自彭城徙須昌也歷下即歷城謨之弟也十二月章十二行本月下有丙戌二字乙十一行本同孔本同張校同魏主還平城是歲沙州牧李寶入朝于魏魏人留之以為外都大官為李氏貴盛張本朝直遙翻太子率更令何承天撰元嘉新曆表上之更工衡翻上時掌翻下所上同以月食之衝知日所在日與月對衝光相掩而知之知堯時冬至日在須女十度此以堯典日短星昴推之又測景校二至差三日有餘此亦用周禮測日至之景之法也於是更立新法冬至徙上三日五時日之所在移舊四度又月有遲疾前曆合朔月食不在朔望月食上當有日字以正朔望之日贏或作盈曆法有大餘小餘史記曆書曰大餘者日也小餘者月也周天三百六十五度四分度之一日日行一度十二月而一周天歲十二月凡三百五十四日以六除之五六三百日餘五十四日為大餘周天三百六十五度以六甲除之六六三百六十餘五為大餘小餘即四分之一未滿日之分數也其分每滿三十二則成一日蓋奇日為大餘奇分為小餘積而成閏也太史令錢樂之等奏皆如承天所上唯月有頻三大頻二小比舊法殊為乖異謂宜仍舊詔可二十二年乙酉四四五春正月辛卯朔始行新曆初漢京房以十二律中呂上生黃鍾不滿九寸更演為六十律中讀曰仲更工衡翻下同錢樂之復演為三百六十律復扶又翻日當一管何承天立議以為上下相生三分損益其一蓋古人簡易之法易以豉翻猶如古曆周天三百六十五度四分度之一也而京房不悟謬為六十乃更設新律林鍾長六寸一釐則從中呂還得黃鍾十二旋宮聲韻無失長直亮翻中讀曰仲律曆志黃鍾律九寸三分損一下生林鍾律六寸三分林鍾益一上生太簇三分太簇損一下生南呂三分南呂益一上生姑洗三分姑洗損一下生應鍾三分應鍾益一上生蕤賓三分蕤賓損一下生大呂三分大呂益一上生夷則三分夷則損一下生夾鍾三分夾鍾益一上生無射三分無射損一下生中呂陰陽相生自黃鍾始而左旋八八為伍孟康注曰從子數至未得八下生林鍾數未至寅得八上生太簇律上下相生皆以此為率伍耦也八八為耦然月令注中呂律長六寸萬九千六百八十三分寸之萬二千九百七十四若上生黃鍾當不止九寸故孔穎達考其同異於月令疏曰十二律有上生下生同位異位長短分寸之別故鄭注周禮太師職云其相生則以陰陽六體黃鍾初九下生林鍾之初六林鍾又上生太簇之九二太簇又下生南呂之六二南呂又上生姑洗之九三姑洗又下生應鍾之六三應鍾又上生蕤賓之九四蕤賓又上生大呂之六四大呂又下生夷則之九五夷則又上生夾鍾之六五夾鍾又下生無射之上九無射又上生中呂之上六同位者象夫妻異位者象子母所謂律娶妻而呂生子也同位象夫妻者則黃鍾之初九下生林鍾之初六同是初位故為夫婦又是律娶妻也異位為子母者謂林鍾上生太簇林鍾是初位太簇是二位故云異位為子母又是呂生子也云五下六上者鄭注云五下六上乃一終矣謂林鍾夷則南呂無射應鍾皆被子午以東之管三分減一而下生之大呂太簇夾鍾姑洗中呂蕤賓皆被子午以西之管三分益一而上生之子午皆上生應云七上而云六上者以黃鍾為諸律之首物莫之先似若無所稟生者故不數黃鍾也其實十二律終於中呂反歸黃鍾生於中呂三分益一大略得應黃鍾九十之數也律曆志云黃鍾為天統林鍾為地統太簇為人統故數整餘律則各有分數隨其相生之次每辰各自為宮各有五聲黃鍾為第一宮下生林鍾為徵上生太簇為商下生南呂為羽上生姑洗為角林鍾為第二宮上生太簇為徵下生南呂為商上生姑洗為羽下生應鍾為角太簇為第三宮下生南呂為徵上生姑洗為商下生應鍾為羽上生蕤賓為角南呂為第四宮上生姑洗為徵下生應鍾為商上生蕤賓為羽下生大呂為角姑洗為第五宮下生應鍾為徵上生蕤賓為商上生大呂為羽下生夷則為角應鍾為第六宮上生蕤賓為徵上恐當作下上生大呂為商下生夷則為羽上生夾鍾為角蕤賓為第七宮上生大呂為徵下生夷則為商上生夾鍾為羽下生無射為角大呂為第八宮下生夷則為徵上生夾鍾為商下生無射為羽上生中呂為角夷則為第九宮上生夾鍾為徵下生無射為商上生中呂為羽上生黃鍾為角夾鍾為第十宮下生無射為徵上生中呂為商上生黃鍾為羽下生林鍾為角無射為第十一宮上生中呂為徵上生黃鍾為商下生林鍾為羽下生太簇為角中呂為第十二宮上生黃鍾為徵下生林鍾為商上生太簇為羽下生南呂為角是十二宮各有五聲凡六十聲京房六十律相生之法以上生下皆三生二以下生上皆三生四陽下生陰陰上生陽終於中呂而十二律畢矣中呂上生執始執始下生去滅上下相生終於南事呂而六十律畢矣夫十二律之變至於六十猶八卦之變至於六十四也六十律之名詳見續漢書補志壬辰以武陵王駿為雍州刺史雍於用翻帝欲經略關河故以駿鎮襄陽魏主使散騎常侍宋愔來聘散悉亶翻騎奇寄翻愔於今翻二月魏主如上黨西至吐京酈道元曰吐京即漢西河郡吐軍縣夷夏俗音訛也後魏置吐京郡隋隰州石樓縣魏吐京郡地討徙叛胡出配郡縣甲戌立皇子禕為東海王昶為義陽王禕吁韋翻昶丑兩翻三月庚申魏主還宮魏詔諸疑獄皆付中書以經義量決量音良夏四月庚戌魏主遣征西大將軍高涼王那等擊吐谷渾王慕利延於白蘭秦州刺史代人封敕文安遠將軍乙烏頭擊慕利延兄子什歸於枹罕枹音膚河西之亡也鄯善人以其地與魏鄰大懼鄯上扇翻曰通其使人知我國虛實取亡必速乃閉斷魏道閉斷魏通西域之道也使疏吏翻下同斷丁管翻輒鈔劫之鈔楚交翻由是西域不通者數年魏主使散騎常侍萬度歸發涼州以西兵擊鄯善六月壬辰魏主北巡帝謀伐魏罷南豫州入豫州以章十二行本以上有辛亥二字乙十一行本同孔本同張校同南豫州刺史南平王鑠為豫州刺史高祖永初二年分淮東之地為南豫州治歷陽淮西為豫州或治壽陽或治汝南鑠式約翻秋七月己未以尚書僕射孟顗為左僕射顗魚豈翻中護軍何尚之為右僕射武陵王駿將之鎮時緣沔諸蠻猶為寇沔彌兗翻水陸梗礙駿分軍遣撫軍中兵參軍沈慶之掩擊大破之駿至鎮蠻斷驛道斷丁管翻欲攻隨郡隨郡太守河東柳元景募得六七百人邀擊大破之遂平諸蠻獲七萬餘口溳山蠻最強水經注云水出蔡陽縣東南大洪山山在隨郡之西南竟陵之東北槃基所跨廣圓一百餘里溳水出于其山之陰時人以為溳水所導亦曰溳山溳音云獲三萬餘口徙萬餘口於建康吐谷渾什歸聞魏軍將至棄城夜遁八月丁亥封敕文入枹罕分徙其民千家還上邽留乙烏頭守枹罕枹音膚萬度歸至敦煌留輜重以輕騎五千度流沙襲鄯善壬辰鄯善王真達面縛出降度歸留軍屯守與真達詣平城敦徒門翻重直用翻騎奇寄翻降戶江翻考異曰本紀作真達興今從西域傳西域復通復扶又翻魏主如陰山之北發諸州兵三分之一各於其州戒嚴以須後命須待也種章勇翻令就北畜牧以餌柔然壬寅魏高涼王那軍至寧嚴寧改曼頭城寧頭城當在白蘭東北吐谷渾慕璝之子被囊逆戰那擊破之被囊遁走中山公杜豐帥精騎追之璝古回翻帥讀曰率度三危至雪山酈道元曰三危山在敦煌縣南皆送平城乞伏成龍蓋因赫連定之敗沒于吐谷渾闐徒賢翻又徒見翻殺其王據其地死者數萬人九月癸酉上餞衡陽王義季于武帳岡餞義季往鎮南兗杜佑曰武帳岡在廣莫門外宣武場設行宮殿便坐於其上因名敕諸子且勿食至會所設饌日旰不至饌雛宛翻又雛晥翻旰古案翻有飢色上乃謂曰汝曹少長豐佚少詩照翻長知兩翻不見百姓艱難今使汝曹識有飢苦知以節儉御物耳裴子野論曰善乎太祖之訓也夫侈興於有餘儉生於不足欲其隱約莫若貧賤習其險艱利以任使為章十二行本為作達乙十一行本同孔本同其情僞易以躬臨易以豉翻太祖若能率此訓也難其志操卑其禮秩教成德立然後授以政事則無怠無荒可播之於九服矣周制九服侯服甸服男服采服衛服蠻服夷服鎮服藩服每服五百里謂之服者責以服事天子為職也高祖思固本枝崇樹襁褓後世遵守迭據方嶽謂義真義康義恭義宣皆迭居方面襁居兩翻褓音保升明之季絶咽於衾衽者動數十人謂明帝殺孝武諸子而宋齊禪代之際蕭氏夷劉氏也咽音煙既不是繫早肆民上左傳晉師曠曰天之愛民甚矣豈其使一人肆於民上魏民間訛言滅魏者吳盧水胡蓋吳聚衆反於杏城蓋吳蓋安定盧水胡種而分居杏城蓋古盍翻種章勇翻有衆十餘萬遣其黨趙綰來上表自歸冬十月戊子長安鎮副將拓跋紇帥衆討吳紇敗死上時掌翻將即亮翻紇下沒翻吳衆愈盛民皆渡渭奔南山長安南山也命將軍叔孫拔領攝並秦雍三州兵屯渭北騎奇寄翻雍於用翻十一月魏發冀州民造浮橋於碻磝津蓋吳遣別部帥白廣平帥所類翻西掠新平安定諸胡皆聚衆應之又分兵東掠臨晉巴東巴當作已溺死於河者三萬餘人溺奴狄翻吳又遣兵西掠至長安將軍叔孫拔與戰於渭北大破之斬首三萬餘級河東蜀薛永宗聚衆以應吳蜀人遷居河東者謂之河東蜀居絳郡者謂之絳蜀居關中赤水者謂之赤水蜀聞喜縣屬河東郡春秋時晉武公所居之曲沃也秦改為左邑漢武帝於此聞南越破改曰聞喜後魏分屬絳郡令憂惶無計縣人裴駿帥厲鄉豪擊之帥讀曰率永宗引去魏主命薛謹之子拔糾合宗鄉宗謂薛之宗族鄉謂鄉人以斷二寇往來之路二寇謂薛永宗蓋吳斷丁管翻庚午魏主使殿中尚書拓跋處直等將二萬騎討薛永宗殿中尚書乙拔將三萬騎討蓋吳晉置殿中尚書與吏部五兵田曹度支左民為六曹杜佑曰後魏初有殿中樂部駕部南部北部五尚書殿中掌殿內兵馬倉庫樂部掌伎樂及角使伍伯駕部掌牛馬驢騾南部掌南邊諸州郡北部掌北邊諸州郡魏書官氏志內入諸姓乙弗氏改為乙氏處昌呂翻將即亮翻騎奇寄翻下同官氏志內入諸姓若口引氏改為寇氏署置百官辛未魏主還宮自陰山還也魏選六州驍騎二萬六州冀定相並幽平驍堅堯翻掠淮泗以北徙青徐之民以實河北癸未魏主西巡初魯國孔熙先博學文史兼通數術有縱橫才志縱子容翻為員外散騎侍郎不為時所知憤憤不得志父默之為廣州刺史以贓獲罪大將軍彭城王義康為救解得免為于僞翻及義康遷豫章義康遷見上卷十七年且以為天文圖讖讖楚譖翻帝必以非道晏駕由骨肉相殘江州應出天子以范曄志意不滿欲引與同謀而熙先素不為曄所重太子中舍人謝綜曄之甥也太子中舍人晉咸寧四年置以舍人才學美者為之與中庶子共掌文翰職如黃門侍郎在中庶子下洗馬上綜引熙先與曄相識熙先家饒於財數與曄博故為拙行以物輸之數所角翻凡博奕以計數誘人謂之行拙行者僞為不能也行下孟翻曄既利其財又愛其文藝由是情好款洽熙先乃從容說曄曰大將軍英斷聰敏好呼到翻從千容翻斷丁亂翻大將軍謂義康人神攸屬屬之欲翻失職南垂謂遷豫章也小人受先君遺命以死報大將軍之德頃人情騷動天文舛錯此所謂時運之至不可推移者也若順天人之心結英豪之士表裏相應發於肘腋腋音亦然後誅除異我崇奉明聖號令天下誰敢不從小人請以七尺之軀三寸之舌立功立事而歸諸君子丈人以為何如曄甚愕然熙先曰昔毛玠竭節於魏武張溫畢議於孫權彼二人者皆國之俊乂豈言行玷缺然後至於禍辱哉皆以廉直徑正不得久容毛玠見六十七卷漢獻帝建安二十一年張溫事見六十九卷魏文帝黃初五年行下孟翻下內行同玷多忝翻不深於二主人間雅譽過於兩臣讒夫側目為日久矣比肩競逐庸可遂乎言與時貴比肩競逐榮利所在衆所共爭將不得遂其志也朝直遙翻見上卷十七年百世之怨乎所爭不過榮名勢利先後之間耳及其末也唯恐陷之不深發之不早戮及百口猶曰未厭是可為寒心悼懼豈書籍遠事也哉今建大勳奉賢哲圖難於易易以豉翻以安易危享厚利收鴻名一旦苞舉而有之豈可棄置而不取哉曄猶疑未決熙先曰又有過於此者愚則未敢道耳曄曰何謂也熙先曰丈人奕葉清通曄曾祖汪祖寧父泰皆有名行人以犬豕相遇而丈人曾不恥之欲為之死不亦惑乎為于僞翻曄門無內行故熙先以此激之曄默然不應反意乃決曄與沈演之並為帝所知曄先至必待演之俱入演之先至嘗獨被引被皮義翻引引見也曄以此為怨曄纍經義康府佐中間獲罪於義康謝綜及父述皆為義康所厚綜弟約娶義康女綜為義康記室參軍自豫章還申義康意於曄求解晚隙復敦往好復扶又翻好呼到翻大將軍府史仲承祖有寵於義康聞熙先有謀密相結納丹楊尹徐湛之素為義康所愛承祖因此結事湛之告以密計道人法略尼法靜皆感義康舊恩並與熙先往來法靜妹夫許曜領隊在臺江南謂禁中為臺法靜之豫章熙先付以箋書陳說圖讖於是密相署置及索所不善者並入死目條分名目凡素所不善者皆欲置之死地稱賊臣趙伯符肆兵犯蹕禍流儲宰趙伯符時為領軍將軍故欲以弒逆之罪歸之言禍流儲宰蓋欲併殺太子劭即日斬伯符首及其黨與今遣護軍將軍臧質奉璽綬迎彭城王正位辰極北辰為天極故以帝位為辰極璽斯氏翻綬音受曄又詐作義康與湛之書令誅君側之惡宣示同黨帝之燕武帳岡也曄等謀以其日作亂許曜侍帝扣刀目曄拔刀微出削為扣刀俄而座散徐湛之恐事不濟密以其謀白帝帝使湛之具探取本末探吐南翻得其檄書選署姓名上之上時掌翻帝乃命有司收掩窮治治直之翻其夜呼曄置客省客省凡四方之客入見者居之屬典客令皆款服帝遣使詰問曄曄猶隱拒詰去吉翻熙先聞之笑曰凡處分符檄書疏皆范所造處昌呂翻分扶問翻云何於今方作如此抵踏邪帝以曄墨迹示之乃具陳本末明日仗士送付廷尉仗士士之執兵仗者辭氣不橈橈奴教翻上奇其才遣人慰勉之曰以卿之才而滯於集書省散騎侍郎集書省官也蕭子顯曰自散騎侍郎及通直員外給事中奉朝請駙馬都尉皆集書省職也此乃我負卿也又責前吏部尚書何尚之曰使孔熙先年將三十作散騎郎那不作賊熙先於獄中上書謝恩且陳圖讖深戒上以骨肉之禍讖楚譖翻曰願勿遺棄存之中書若囚死之後或可追録庶九泉之下少塞釁責少詩沼翻塞悉則翻釁許覲翻曄在獄為詩曰雖無嵇生琴庶同夏侯色嵇康為晉文王所殺臨命顧視日影索琴而彈夏侯玄為晉景王所殺及赴東市顏色不變而上窮治其獄遂經二旬曄更有生望獄吏戲之曰外傳詹事或當長繫曄聞之驚喜綜熙先笑之曰詹事疇昔攘袂瞋目躍馬顧盼自以為一世之雄今擾攘紛紜畏死乃爾曄為太子詹事故稱之瞋七人翻人臣圖主何顏可以生存十二月乙未曄綜熙先及其子弟黨與皆伏誅曄母至市涕泣責曄以手擊曄頸曄顏色不怍怍疾各翻慙也妹及妓妾來別曄悲涕流漣妓渠綺翻漣泣下貌綜曰舅殊不及夏侯色曄收淚而止謝約不預逆謀見兄綜與熙先遊常諫之曰此人輕事好奇不近於道果鋭無檢言無檢東也好呼到翻近其靳翻綜不從而敗綜母以子弟自蹈逆亂獨不出視曄語綜曰姊今不來勝人多矣收籍曄家樂器服玩並皆珍麗妓妾不勝珠翠語牛倨翻不勝音升母居止單陋唯有一廚盛樵薪盛時征翻弟子冬無被叔父單布衣裴子野論曰夫有逸㣥之才必思沖天之據沖與翀同上飛也古語云一飛沖天則僨常均之下常均猶言平常也將之以禮殆為鮮乎鮮息淺翻劉弘仁范蔚宗劉湛字弘仁范曄字蔚宗蔚於勿翻忸女九翻驕也玩也狎也矜才以徇逆纍葉風素一朝而隕嚮之所謂智能翻為亡身之具矣徐湛之所陳多不盡為曄等辭所連引上赦不問臧質熹之子也臧熹臧燾之弟質在戚里於帝為中表之親與曄厚善曄敗以為義興太守有司奏削彭城王義康爵收付廷尉治罪治直之翻丁酉詔免義康及其男女皆為庶人絶屬籍徙付安成郡以寧朔將軍沈卲為安成相領兵防守相息亮翻卲璞之兄也義康在安成讀書見淮南厲王長事廢書歎曰自古有此我乃不知得罪為宜也庚戌以前豫州刺史趙伯符為護軍將軍伯符孝穆皇后之弟子也高祖母趙氏追諡孝穆皇后后弟倫之初江左二郊無樂宗廟雖有登歌亦無二舞是歲南郊始設登歌禮記郊特牲曰奠酬而工升歌發德也歌者在上匏竹在下貴人聲也二舞文舞武舞也魏安南平南府移書兗州安南平南二將軍府又欲遊獵具區周官職方氏揚州藪曰具區師古曰具區在吳必若因土立州則彼立徐揚豈有其地復知欲遊獵具區復扶又翻觀化南國開館飾邸則有司存呼韓入漢厥儀未泯饋餼之秩每存豐厚饋餉也饋餼餉客以生食及芻米也詩傳曰牲腥曰餼餼許既翻二十三年丙戌四四六春正月庚申尚書左僕射孟顗罷戊辰魏主軍至東雍州雍於用翻臨薛永宗壘崔浩曰永宗未知陛下自來衆心縱弛今北風迅疾宜急擊之魏主從之庚午圍其壘永宗出戰大敗與家人皆赴汾水死據南史薛安都傳諸薛家于河東汾陰世為強族棄城來奔辛未魏主南如汾陰濟河至洛水橋此華陰之洛水史記秦孝公之元年所謂魏築長城自鄭濱洛者也帝以渭北地無穀草欲渡渭南循渭而西以問崔浩對曰夫擊蛇者先擊其首首破則尾不能掉掉徒弔翻今蓋吳營去此六十里輕騎趨之騎奇寄翻趨七喻翻一日可到到則破之必矣破吳南向長安亦不過一日一日之乏未至有傷若從南道則吳徐入北山猝未可平帝不從自渭南向長安庚辰至戲水戲許宜翻吳衆聞之悉散入北地山地字衍帝悔之二月丙戌帝至長安丙申如盩厔盩厔音舟窒歷陳倉還如雍城雍於用翻下同所過誅民夷與蓋吳通謀者乙拔等諸軍大破蓋吳於杏城吳復遣使上表求援使疏吏翻下以義翻詔以吳為都督關隴諸軍事雍州刺史北地公使雍梁二州發兵屯境上為吳聲援遣使賜吳印一百二十一紐使吳隨宜假授初林邑王范陽邁雖進章十二行本進作遣乙十一行本同孔本同使入貢而寇盜不絶使章十二行本使作所乙十一行本同孔本同張校同退齊校同貢亦薄陋帝遣交州刺史檀和之討之南陽宗慤家世儒素慤叔父少文高尚不仕諸子㣥從皆愛好墳典好呼到翻常言願乘長風破萬里浪及和之伐林邑慤自奮請從軍詔以慤為振武將軍和之遣慤為前鋒陽邁聞軍出遣使請還所掠日南民輸金一萬斤銀十萬斤帝詔和之若陽邁果有款誠亦許其歸順和之至朱梧戍朱梧縣自漢以來屬日南郡時於其地置戍宋白曰漢日南郡治朱吾又南行四百餘里至林邑國府者交州刺史府和之乃進軍圍林邑將范扶龍於區粟城水經注盧容水出日南盧容縣區粟城南高山東徑區粟城北林邑兵器戰具悉在城中將即亮翻宗慤潛兵迎擊毗沙達破之魏主與崔浩皆信重寇謙之奉其道浩素不喜佛法喜許記翻每言於魏主以為佛法虛誕為世費害宜悉除之及魏主討蓋吳至長安入佛寺沙門飲從官酒從官入其室飲於鴆翻從才用翻見大有兵器出以白帝帝怒曰此非沙門所用必與蓋吳通謀欲為亂耳命有司按誅闔寺沙門閲其財産大得釀具及州郡牧守富人所寄藏物以萬計守式又翻又為窟室以匿婦女窟苦骨翻浩因說帝悉誅天下沙門毀諸經像說輸芮翻帝從之寇謙之與浩固爭浩不從先盡誅長安沙門焚毀經像並敕留臺下四方令一用長安法魏王出征太子居守故謂平城為留臺下遐稼翻昔後漢荒君信惑邪僞以亂天常佛法自漢明帝時入中國楚王英最先好之至桓帝始事浮屠未嘗有此夸誕大言不本人情叔季之世莫不眩焉目無常主不辨白黑謂之眩禮義大壞九服之內鞠為丘墟鞠窮也欲除僞定真復羲農之治治直吏翻其一切蕩除滅其蹤跡自今已後敢有事胡神及造形像泥人銅人者門誅有非常之人然後能行非常之事非朕孰能去此歷代之僞物去羌呂翻有司宣告征鎮諸軍刺史諸有浮圖形像及胡經皆擊破焚燒沙門無少長悉坑之少詩照翻長知兩翻太子晃素好佛法好呼到翻屢諫不聽乃緩宣詔書使遠近豫聞之得各為計沙門多亡匿獲免或收藏經像唯塔廟在魏境者無復孑遺復扶又翻魏主徙長安工巧二千家於平城還至洛水分軍誅李閏叛羌太原顏白鹿私入魏境太原郡本屬並州江左以郡人南徙者僑立太原郡晉安帝義熙中土斷立太原縣屬泰山郡元嘉十年割濟南泰山為太原郡境屬青州將殺之詐云青州刺史杜驥使其歸誠魏人送白鹿詣平城魏主喜曰我外家也魏主母杜氏故謂驥為外家且命永昌王仁高涼王那將兵迎驥攻冀州刺史申恬於歷城杜驥遣其府司馬夏侯祖歡等將兵救歷城魏人遂寇兗青冀三州至清東而還清東清水之東也北邊騷動考異曰宋文帝紀三月索虜寇兗豫青冀刺史申恬破之魏太武紀二月永昌王仁至高平禽劉義隆將王章略金鄉方與遷其民五千家於河北高涼王那至濟南東平陵遷其民六千餘家於河北蓋宋魏各據奏到之月書之耳宋索虜傳又云虜破掠太原得四千餘口蓋魏人夸張其數故不同耳帝以魏寇為憂咨訪㣥臣御史中丞何承天上表以為凡備胸奴之策不過二科武夫盡征伐之謀儒生講和親之約今欲追蹤衛霍自非大田淮泗內實青徐使民有贏儲野有積穀然後發精卒十萬一舉蕩夷則不足為也若但欲遣軍追討報其侵暴則彼必輕騎奔走不肯會戰騎奇寄翻徒興巨費不損於彼報復之役將遂無已斯策之最末者也安邊固守於計為長臣竊以曹孫之霸才均智敵江淮之間不居各數百里曹孫謂曹操孫權也斥候之郊非耕牧之地故堅壁清野以俟其來整甲繕兵以乘其弊保民全境不出此塗要而歸之其策有四一曰移遠就近今青兗舊民及冀州新附在界首者三萬餘家可悉徙置大峴之南以實內地峴戶典翻二曰多築城邑以居新徙之家假其經用春夏佃牧佃讀曰田秋冬入保寇至之時一城千家堪戰之士不下二千其餘羸弱猶能登陴鼓譟足抗㣥虜三萬矣羸倫為翻陴音疲三曰纂偶車牛以載糧械纂綜集也不下五百耦牛為車五百兩兩力讓翻參合鉤連以衛其衆設使城不可固平行趨險趨七喻翻賊所不能干有急徵發信宿可聚四曰計丁課仗凡戰士二千隨其便能各自有仗素所服習銘刻由己還保輸之於庫出行請以自新請器仗各自磨礪使精新民不得者官以漸充之簳古旱翻數年之內軍用粗備矣粗坐五翻近郡之師遠屯清濟近郡謂南徐州所領諸僑郡及三吳近在邦域之中者濟子禮翻嗟怨亦深以臣料之未若即用彼衆之易也易弋豉翻今因民所利導而帥之帥讀曰率兵強而敵不戒國富而民不勞比於優復隊伍復方目翻坐食糧廩者不可同年而校矣魏金城邊固嚴固改冏下同天水梁會與秦益雜民萬餘戶據上邽東城反攻逼西城秦益二州刺史封敕文拒卻之氐羌萬餘人休官屠各二萬餘人休官屠各二種屠直於翻皆起兵應固會敕文擊固斬之餘衆推會為主與敕文相攻夏四月甲申魏主至長安丁未大赦仇池人李洪聚衆自言應王梁會求救於氐王楊文德文德曰兩雄不並立若須我者宜先殺洪會誘洪斬之誘音酉送首於文德五月癸亥魏主遣安豐公閭根帥騎赴上邽帥讀曰率騎奇寄翻未至會棄東城走敕文先掘重塹於外重直龍翻嚴兵守之格鬬從夜至旦敕文曰賊知無生路致死於我多殺傷士卒未易克也易以豉翻乃以白虎幡宣告會衆降者赦之降戶江翻會衆遂潰分兵追討悉平之略陽人王元達聚衆屯松多川水經注松多水出隴山西南流徑降隴城北又西南注秦水蓋吳收兵屯杏城自號秦地王聲勢復振復扶又翻魏主遣永昌王仁高涼王那督北道諸軍討之北道諸軍謂魏兵分屯長安以北者檀和之等拔區粟斬范扶龍乘勝入象浦象浦即盧容浦盧容縣即秦象郡象林縣地故亦謂之象浦以具裝被象前後無際馬甲謂之具裝被皮義翻吾聞外國有師子威服百獸師子似虎正黃有耐尾端茸毛大如斗爾雅翼曰穆天子傳狻猊日走五百里其為物最猛雖虎豹亦畏之象至以鼻捲泥自塗數尺數數噴鼻隅立師子直搏而殺之與象相拒象果驚走林邑兵大敗和之遂克林邑水經注林邑國都治典沖在壽泠縣阿賁浦西去海岸四十里考異曰本紀在六月傳在五月當是六月賞檀和之等今從傳所獲未名之寶不可勝計宗慤一無所取還家之日衣櫛蕭然勝音升櫛側瑟翻梳枇總名六月癸未朔日有食之甲申魏發冀相定三州兵二萬人相息亮翻屯長安南山諸谷以備蓋吳竄逸丙戌又發司幽定冀四州兵十萬人築畿上塞圍魏都平城置司州於代都宋白曰唐雲州雲中郡是西至河廣縱千里廣古曠翻縱子容翻帝築北隄立玄武湖以其地在臺城之後故名玄武湖在今建康府上元縣北十里祝穆曰湖今為後軍寨秋七月辛未以散騎常侍杜坦為青州刺史坦驥之兄也初杜預之子耽避晉亂居河西仕張氏前秦克涼州子孫始還關中高祖滅後秦坦兄弟從高祖過江時江東王謝諸族方盛北人晚渡者朝廷悉以傖荒遇之傖助耕翻南人呼北人為傖荒言其自荒外來也雖復人才可施皆不得踐清塗上嘗與坦論金日磾曰恨今無復此輩人復扶又翻磾丁奚翻坦曰日磾假生今世養馬不暇豈辦見知上變色曰卿何量朝廷之薄也量音良坦曰請以臣言之臣本中華高族晉氏喪亂喪息浪翻播遷涼土世業相承不殞其舊直以南渡不早便以荒傖賜隔日磾胡人身為牧圉乃超登內侍齒列名賢金日磾事見二十二卷漢武帝後元二年臣恐未必能也上默然八月魏高涼王那等破蓋吳獲其二叔諸將欲送詣平城長安鎮將陸俟曰長安險固風俗豪忮將即亮翻忮支義翻狠也平時猶不可忽況承荒亂之餘乎今不斬吳則長安之變未已也吳一身潛竄非其親信誰能獲之若停十萬之衆以追一人又非長策不如私許吳叔免其妻子使自追吳擒之必矣諸將咸曰今賊黨衆已散唯吳一身何所能至俟曰諸君不見毒蛇乎不斷其首猶能為害斷丁管翻吳天性凶狡今若得脫必自稱王者不死以惑愚民為患愈大諸將曰公言是也但得賊不殺而更遣之若遂往不返將何以任其罪俟曰此罪我為諸君任之為于僞翻任音壬高涼王那亦以俟計為然遂赦二叔與刻期而遣之及期吳叔不至諸將皆咎俟俟曰彼伺之未得其便耳必不負也後數日吳叔果以吳首來傳詣平城伺相吏翻傳知戀翻又直戀翻考異曰宋索虜傳云屠各反吳自攻之為流矢所中死吳弟吾生率衆入木面山尋皆破散今從魏書永昌王仁討吳餘黨白廣平路那羅悉平之以陸俟為內都大官會安定盧水胡劉超等聚衆萬餘人反魏主以俟威恩著於關中復加俟都督秦雍二州諸軍事鎮長安復扶又翻下復選復還同謂俟曰關中奉化日淺魏主平夏始得關中吏民數為逆亂數所角翻今朕以重兵授卿則超等必同心協力據險拒守未易攻也易以豉翻若兵少則不能制賊少詩沼翻卿當自以方略取之俟乃單馬之鎮超等聞之大喜以俟為無能為也俟既至諭以成敗誘納超女與為姻戚以招之超自恃其衆猶無降意俟乃帥其帳下親往見超誘音酉降戶江翻帥讀曰率超使人逆謂俟曰從者過三百人從才用翻當以弓馬相待不及三百人當以酒食相供俟乃將二百騎詣超將即亮翻騎奇寄翻超設備甚嚴俟縱酒盡醉而還還而宣翻又如字頃之俟復選敢死士五百人出獵復扶又翻因詣超營約曰發機當以醉為限既飲俟陽醉上馬大呼呼火故翻手斬超首士卒應聲縱擊殺傷千數遂平之魏主徵俟還為外都大官是歲吐谷渾復還舊土去年吐谷渾西奔聶崇岐標點王崇武覆校
