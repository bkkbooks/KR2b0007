body:
  text: 資治通鑑卷第二百一十七端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註唐紀三十三玄宗至道大聖大明孝皇帝下之下十三載十三載甲午七五四卷首當書天寶年號載子亥翻十三載春正月己亥安祿山入朝朝直遙翻考異曰肅宗實錄十二載楊國忠屢言祿山潛圖悖逆五月玄宗使輔璆琳伺之祿山厚賂璆琳盛言祿山忠於國國忠又言祿山自此不復見矣玄宗手詔追祿山祿山來朝舊傳亦同按玄宗實錄幷祿山事迹遣璆琳送甘子于范陽覘祿山反狀在十四載五月而肅宗實錄及舊傳云十二載誤也今從唐曆是時楊國忠言祿山必反且曰陛下試召之必不來上使召之祿山聞命即至庚子見上於華清宮見賢遍翻泣曰臣本胡人陛下寵擢至此為國忠所疾臣死無日矣上憐之賞賜巨萬由是益親信祿山國忠之言不能入矣太子亦知祿山必反言於上上不聽十三載甲辰太清宮奏學士李琪此崇玄館學士也告以國祚延昌十三載唐初詔敕皆中書門下官有文者為之乾封以後始召文士元萬頃范履冰等草諸文辭常於北門候進止時人謂之北門學士中宗之世上官昭容專其事上即位始置翰林院密邇禁廷延文章之士下至僧道書畫琴棋數術之工皆處之謂之待詔處昌呂翻刑部尚書張均及弟太常卿垍皆翰林院供奉唐天子在大明宮翰林院在右銀臺門內在興慶宮院在金明門內若在西內院在顯福門內若在東都及華清宮皆有待詔之所其待詔者有詞學經術合練僧道卜祝術藝書弈各別院以廩之日晚而退其所重者詞學帝即位以來張說陸堅張九齡徐安貞張垍等召入禁中謂之翰林待詔王者尊極一日萬機四方進奏中外表疏批答或詔從中出宸翰所揮亦資其檢討謂之視草故常簡當直四人以備顧問至德以後天下用兵多務深謀密詔皆從中出名曰翰林學士得充選者文士為榮亦如中書舍人例置學士六人內擇年深德重者一人為承旨所以獨當密命故也德宗好文尤難其選貞元以後為學士承旨者多至宰相尚辰羊翻垍巨冀翻已令張垍草制楊國忠諫曰祿山雖有軍功目不知書豈可為宰相制書若下令力丁翻相悉亮翻下遐稼翻恐四夷輕唐上乃止乙巳加祿山左僕射射寅謝翻賜一子三品一子四品官十三載丙午上還宮還自華清宮還從宣翻又音如字十三載安祿山求兼領閑广既㣥牧庚申以祿山為閑广既隴右㣥牧等使使疏吏翻下同祿山又求兼總監此㣥牧總監也唐有四十八監以牧馬或曰此總監即苑總監壬戌兼知總監事祿山奏以御史中丞吉溫為武部侍郎武部即兵部广既楊國忠由是惡溫惡烏路翻祿山密遣親信選健馬堪戰者數千匹別飼之飼祥吏翻十三載二月壬申上朝獻太清宮上聖祖尊號曰大聖祖高上大道金闕玄元大皇太帝朝直遙翻上聖之上時掌翻下以義推癸酉享太廟上高祖諡曰神堯大聖光孝皇帝太宗諡曰文武大聖大廣孝皇帝高宗諡曰天皇大聖大弘孝皇帝中宗諡曰孝和大聖大昭孝皇帝睿宗諡曰玄真大聖大興孝皇帝以漢家諸帝皆諡孝故也甲戌㣥臣上尊號曰開元天地大寶聖文神武證道孝德皇帝凡上尊號上諡之上皆時掌翻赦天下十三載丁丑楊國忠進位司空甲申臨軒冊命十三載己丑安祿山奏臣所部將士討奚契丹九姓同羅等勳效甚多將即亮翻契欺訖翻又音喫乞不拘常格超資加賞仍好寫告身付臣軍授之於是除將軍者五百餘人中郎將者二千餘人祿山欲反故先以此收衆心也三月丁酉朔祿山辭歸范陽舊志范陽在京師東北二千五百二十里祿山受之驚喜恐楊國忠奏留之疾驅出關出潼關令船夫執繩板立於岸側凡挽船夫用板長二尺許斜搭胸前一端至肩一端至脅繩貫板之兩端以接船繂而挽之更工衡翻易也晝夜兼行日數百里過郡縣不下船自是有言祿山反者上皆縛送章十二行本送下有之字乙十一行本同孔本同由是人皆知其將反無敢言者祿山之發長安也上令高力士餞之長樂坡長樂坡即滻坡在長安城東樂音洛上問祿山慰意乎對曰觀其意怏怏必知欲命為相而中止故也怏於兩翻相息亮翻上以告國忠曰此議他人不知必張垍兄弟告之也國忠之下更有國忠二字文意乃明貶張均為建安太守垍為盧溪司馬垍弟給事中埱為宜春司馬建安郡隋為泉州唐改曰閩州別置泉州帝改閩州為福州長樂郡以建州為建安郡盧溪郡辰州舊志建安郡京師東南四千九百三十五里盧溪郡京師南微東三千四百五里埱昌六翻考異曰唐曆云垍嘗贊相禮儀雍容有度上心悅之翌日謂垍曰朕罷希烈相以卿代之垍曰不敢貴在坐告國忠斥之舊垍傳天寶中玄宗嘗幸垍內宅謂垍曰希烈累辭機務朕擇其代者孰可垍錯愕未對帝即曰無踰吾愛壻矣垍降階陳謝楊國忠聞而惡之及希烈罷相舉韋見素代垍垍深觖望按本紀三月丁酉垍貶官韋見素八月乃知政事而云垍深觖望舊傳誤也明皇雜錄云上幸張垍宅謂垍曰中外大臣才堪宰輔者與我悉數吾當舉而用之垍逡巡不對上曰固無如愛子壻垍降階拜舞上曰即舉成命既逾月垍頗懷怏怏意其為李林甫所排會祿山自范陽入覲祿山潛賂貴求帶平章事上不許垍因私第備言上前時行幸內第面許相垍與明公同制入輔今既中變當必為姦臣所排祿山大懷恚怒明日謁見因流涕請罪上慰勉久之因問其故祿山具以垍所陳對上命高力士送歸焉亦以怏怏聞由是上怒按李林甫時已死亦誤也哥舒翰亦為其部將論功為于偽翻將即亮翻敕以隴右十將特進火拔州都督燕山郡王火拔歸仁為驃騎大將軍十將亦唐中世以來軍中將領之職名火拔突厥別部也開元中置火拔州唐制特進文散階正二品驃騎大將軍武散階從一品燕因肩翻驃匹妙翻騎奇寄翻臨洮太守成如璆討擊副使范陽魯炅皋蘭府都督渾惟明並加雲麾將軍貞觀中鐵勒來降以渾部置皋蘭都督府雲麾將軍武散階從三品上洮土刀翻守式又翻璆音求炅火迥翻英乂知運之子也翰又奏嚴挺之之子武為節度判官河東呂諲為支度判官諲伊真翻前封丘尉高適為掌書記安邑曲環為別將河東郡蒲州唐制邊軍有支度使以計軍資糧仗之用其屬有判官巡官封丘縣漢晉以來屬陳留唐屬汴州安邑縣屬蒲州姓譜晉穆侯子成師封於曲沃其後氏焉漢有代郡太守曲謙貨殖傳有曲叔諲伊真翻十三載程千里執阿布思獻於闕下斬之甲子以千里為金吾大將軍以封常清權北庭都護伊西節度使十三載夏四月癸巳安祿山奏擊奚破之虜其王李日越十三載六月乙丑朔日有食之不盡如鉤十三載侍御史劍南留後李宓楊國忠領劍南節度使以宓為留後宓音密又音伏閤羅鳳誘之深入至大和城新書作太和城章十二行本正作太乙十一行本同孔本同熊校同夷語山陂陀為和故謂大和閤羅鳳所居也將即亮翻誘音酉宓糧盡士卒罹瘴疫及飢死什七八乃引還還從宣翻又如字蠻追擊之宓被擒被皮義翻全軍皆沒楊國忠隱其敗更以捷聞益發中國兵討之前後死者幾二十萬人幷鮮于仲通之敗死者有此數幾居依翻上嘗謂高力士曰朕今老矣朝事付之宰相邊事付之諸將夫復何憂朝直遙翻相息亮翻將即亮翻夫音扶復扶又翻力士對曰臣聞雲南數喪師又邊將擁兵太盛陛下將何以制之臣恐一旦禍發不可復救數所角翻喪息浪翻復扶又翻何得謂無憂也上曰卿勿言朕徐思之高力士之言明皇豈無所動於其心哉禍機將發直付之無可柰何僥幸其身之不及見而已十三載秋七月癸丑哥舒翰奏於所開九曲之地置洮陽澆河二郡及神策軍以臨洮太守成如璆兼洮陽太守充神策軍使洮陽澆河二郡皆置於洮廓二州西南廓州本澆河郡天寶元年更名寧塞郡洮州西八十里磨環川置神策軍新書曰澆河郡置於積石之西澆堅堯翻十三載楊國忠忌陳希烈希烈累表辭位上欲以武部侍郎吉溫代之國忠以溫附安祿山奏言不可以文部侍郎韋見素和雅易制易以豉翻薦之八月丙戌以希烈為太子太師罷政事陳希烈遂以此怨望降賊考異曰舊見素傳曰時楊國忠用事左相陳希烈畏其權寵凡事唯諾無敢發明玄宗知之不悅天寶十三年秋霖雨六十餘日天子以宰相或未稱職見此咎徵命楊國忠精求端士時兵部侍郎吉溫方承寵遇上意欲用之國忠以溫祿山賓佐懼其威權奏寢其事國忠訪於中書舍人竇華宋昱等華昱言見素方雅柔而易制上亦以經事相王府有舊恩可之希烈傳曰國忠用事素忌疾之乃引韋見素同列罷希烈知政事按明皇若惡希烈阿徇國忠當更自擇剛直之士豈得尚卜相於國忠今從希烈傳十三載自去歲水旱相繼關中大饑楊國忠惡京兆尹李峴不附己以災沴歸咎於峴九月貶長沙太守惡烏路翻沴音戾長沙郡潭州舊志長沙郡京師南二千四百四十五里峴禕之子也信安王禕開元初以軍功有寵於上禕吁韋翻國忠取禾之善者獻之曰雨雖多不害稼也上以為然扶風太守房琯言所部水災扶風郡岐州宋白曰唐故事侍御史各二人知東西推又各分京城諸司及諸道州府為東西之限隻日則臺院受事雙日則殿院受事又有監察御史出使推按謂之推事御史天下無敢言災者高力士侍側上曰淫雨不已賈公彥曰雨三日已上為淫對曰自陛下以權假宰相賞罰無章陰陽失度臣何敢言上默然十三載冬十月乙酉上幸華清宮十三載十一月己未置內侍監二員正三品唐制宦官不得過三品置內侍四人從四品上中官之貴極於此矣至帝始隳其制楊思勖以軍功高力士以恩寵皆拜大將軍階至從一品猶曰勳官也今置內侍監正三品則職事官矣十三載河東太守兼本道采訪使韋陟斌之兄也使疏吏翻斌音彬文雅有盛名楊國忠恐其入相相息亮翻使人告陟贓汚事下御史按問陟賂中丞吉溫使求救於安祿山復為國忠所發下遐嫁翻復扶又翻閏月壬寅貶陟桂嶺尉溫澧陽長史桂嶺漢臨賀縣地隋置桂嶺縣唐屬賀州澧陽郡澧州舊志澧陽郡京師東南一千八百九十三里為于偽翻且言國忠讒疾上兩無所問十三載戊午上還宮十三載是歲戶部奏天下郡三百二十一縣千五百三十八鄉萬六千八百二十九戶九百六萬九千一百五十四口五千二百八十八萬四百八十八有唐戶口之盛極於此十四載乙未七五五十三載春正月蘇毗王子悉諾邏去吐蕃來降新書曰蘇毗吐蕃強部也邏郎佐翻十三載二月辛亥安祿山使副將何千年入奏請以蕃將三十二人代漢將上命立進畫進畫者命中書為發日敕進請御畫而行之唐六典中書掌王言其制有七其四曰發日敕正謂御畫發日敕也增減官員廢置州縣除免官爵授六品以下官則用之將即亮翻韋見素謂楊國忠曰祿山久有異志今又有此請其反明矣明日見素當極言上未允公其繼之國忠許諾壬子國忠見素入見入見賢遍翻上迎謂曰卿等有疑祿山之意邪見素因極言祿山反已有迹所請不可許上不悅國忠逡巡不敢言逡七倫翻上竟從祿山之請他日國忠見素言於上曰臣有策可坐消祿山之謀今若除祿山平章事召詣闕以賈循為范陽節度使呂知誨為平盧節度使楊光翽為河東節度使使疏吏翻翽呼會翻則勢自分矣上從之已草制上留不發更遣中使輔璆琳以珍果賜祿山潛察其變輔姓也左傳晉有大夫輔躒又智果別族為輔氏即考異前所引以甘子賜祿山事璆音求還盛言祿山竭忠奉國無有二心還從宣翻又音如字上謂國忠等曰祿山朕推心待之必無異志東北二虜藉其鎮遏朕自保之卿等勿憂也事遂寢考異曰實錄正月辛巳祿山表請以蕃將三十人代漢將上遣中使袁思藝宣付中書令即日進畫便寫告身楊國忠韋見素相謂曰流言傳祿山有不臣之心今又請代漢將其反明矣乃請陳事既見上先曰卿等有疑祿山之意邪國忠等遽走下階垂涕具陳祿山反狀因以祿山表留上前而出俄頃上又令袁思藝宣曰此之一奏姑容之朕徐為圖之國忠奉詔自後國忠每對未嘗不懇請其事國忠曰臣有一策可銷其難伏望下制以祿山帶左僕射平章事追赴朝廷以賈循等分帥三道上許之草制訖留之未行上潛令輔璆琳送甘子私候其狀還固稱無事其制遂寢先是上引宰相對見常置白麻於座前及璆琳還上乃謂宰臣曰祿山必無二心其制朕已焚矣後璆琳受祿山賄事泄上因祭龍堂遣備儲供責以不虔乃命左右撲殺之始有疑祿山意祿山事迹云請不以蕃將代漢將論祿山反狀及請追祿山赴闕並是韋見素之意旨國忠曾無預焉仍語見素曰祿山出自寒微位居衆上時所忌嫉成疑似耳見素曰公若實為此見社稷危矣將至上前懇論見素約以事如未諧公繼之國忠都無一言俯僂而退見素卻到中書嗚咽流涕此非他也國忠要祿山速反以明己之先見耳宋巨玄宗幸蜀記云是歲春二月二十二日辛亥祿山使何千年表請以蕃將三十二人代漢將掌兵其日宰相韋見素楊國忠在省見素慘然國忠問曰堂老何色之戚也見素曰祿山逆狀行路共知今以蕃酋代漢將是亂將作矣與公位當此地能無戚乎國忠於是亦惘然久之乃曰與奪之間在於宸斷豈我輩所能是非邪見素曰知禍之萌而不能防亦將焉用彼相矣明日對見僕必懇論冀其萬一若不允子必繼之國忠曰事則不諧恐虛犯龍顏自貽伊戚見素曰如正其言而獲死猶愈於阿從而偷生翌日壬子二相入對見素言祿山潛貯異圖迹已昭彰因扣頭流涕久之國忠但俯僂逡巡更無所補上不悅遂以他事議之既退還省見素謂國忠曰聖意未回計將安出國忠曰祿山未必有反意但時所誹嫉便成疑似耳見素曰公若為此見社稷危矣遂憫然不言二十四日癸丑上又使思藝宣旨令且依此發遣卿等所議後別籌之自是見素數奏其凶狀三月己未朔見素請以祿山同中書門下平章事追赴闕庭及輔璆琳送甘子祿山紿璆琳曰主上耄年信任非次國忠之輩苟徇榮班今若進逆耳之言苦口之藥以吾之心事將無益今欲耀兵強諫以迹鬻拳此意決矣祿山以物贈璆琳璆琳既受金帛及還奏曰祿山盡忠奉國必無二心特望官家不以東北為慮上然之謂宰臣曰祿山朕自保之卿勿憂也見素起曰臣忤拂聖旨僭黷大臣罪合萬死然愚者千慮或有一中願陛下審察之自餘與實錄及事迹所述略同按祿山方賂璆琳泯其反迹安肯對之遽出悖語又國忠平日數言祿山欲反此際安得不與見素同心蓋所謂天下之惡皆歸焉者也今取其可信者華原人也時為節度副使十三載隴右河西節度使哥舒翰入朝道得風疾遂留京師家居不出十三載三月辛巳命給事中裴士淹宣慰河北十三載夏四月安祿山奏破奚契丹契欺訖翻十三載癸巳以蘇毗王子悉諾邏為懷義王賜姓名李忠信十三載安祿山歸至范陽朝廷每遣使者至皆稱疾不出迎朝直遙翻使疏吏翻盛陳武備然後見之裴士淹至范陽二十餘日乃得見無復人臣禮復扶又翻又如字楊國忠日夜求祿山反狀使京兆尹圍其第考異曰肅宗實錄國忠日夜伺求祿山反狀或矯詔以兵圍其宅或令府縣捕其門客李起安岱李方來等皆令侍御史鄭昂之陰推劾潛槌殺之慶宗尚郡主又供奉在京密報其父祿山轉懼唐曆是夏京兆尹李峴貶零陵太守先是楊國忠使門客蹇昂何盈求祿山陰事命京兆尹圍捕其宅得安岱李方來等與祿山反狀使侍御史鄭昂之縊殺之祿山怒使嚴莊上表自理具陳國忠罪狀二十餘事上懼其生變遂歸過於峴以安之安祿山事迹與唐曆同外有命京兆尹李峴於其宅得李起安岱李方來等又貶吉溫為澧陽長史以激怒祿山幸其速反上竟不之悟玄宗幸蜀記與事迹同按李峴傳十二載連雨六十餘日國忠歸咎京兆尹貶長沙太守新宗室宰相傳楊國忠使客蹇昂何盈摘安祿山陰事諷京兆捕其第得安岱李方來等與祿山反狀縊殺之祿山怒上書自言帝懼變出峴為零陵太守今從實錄送御使臺獄潛殺之祿山子慶宗尚宗女榮義郡主供奉在京師在京師為太僕卿得隨供奉官班見祿山愈懼六月上以其子成婚手詔祿山觀禮祿山辭疾不至秋七月祿山表獻馬三千匹每匹執控夫二人遣蕃將二十二人部送欲以襲京師也奏請諭祿山以進車馬宜俟至冬官自給夫無煩本軍於是上稍寤始有疑祿山之意會輔璆琳受賂事亦泄上託以他事撲殺之上遣中使馮神威齎手詔諭祿山如珣策撲弼角翻使疏吏翻考異曰祿山事迹作承威今從玄宗幸蜀記且曰朕新為卿作一湯自天寶六載以來華清宮中益治湯井池臺觀環列山谷御湯曰九龍殿亦曰蓮花湯明皇雜錄曰明皇幸華清宮新廣湯制作宏麗安祿山於范陽以白玉石為魚龍鳧鴈仍以石梁及蓮花同獻雕鐫巧妙殆非人功上大悅命陳於湯中仍以石梁橫亙湯上而蓮花纔出於水際上至其所解衣欲入而魚龍鳧鴈皆若奮鱗舉翼狀欲飛動上恐遽命撤去而蓮花至今猶存又嘗於宮中置長湯數十間屋皆周回甃以文石為銀鏤漆船及白木香船置於其中至於楫棹皆飾以珠玉又於湯中累瑟瑟及沈香為山以狀瀛洲方丈津陽門詩註曰宮內除供奉兩湯外內更有湯十六所長湯每賜諸嬪御其脩廣與諸湯不侔甃以文瑤密石中央有玉蓮花捧湯噴以成池又縫綴錦鏽為鳧鴈置於水中上時於其間泛鈒鏤小舟以嬉遊焉次西曰太子湯又次西宜春湯又次西長湯十六所今唯太子少陽二湯存焉又有玉女殿湯今石星痕湯玉名甕湯所出也為于偽翻神威至范陽宣旨祿山踞牀微起亦不拜曰聖人安隱聖人謂上也隱讀曰穩唐帖多有寫穩字為隱字者馬不獻亦可十月灼然詣京師即令左右引神威置館舍不復見數日遣還亦無表神威還見上泣曰臣幾不得見大家復扶又翻幾居依翻十三載八月辛卯免今載百姓租庸十三載冬十月庚寅上幸華清宮考異曰舊紀壬辰今從實錄新紀十三載安祿山專制三道陰蓄異志殆將十年以上待之厚欲俟上晏駕然後作亂會楊國忠與祿山不相悅屢言祿山且反上不聽國忠數以事激之數所角翻欲其速反以取信於上祿山由是決意遽反獨與孔目官太僕丞嚴莊掌書記屯田員外郎高尚將軍阿史那承慶密謀自餘將佐皆莫之知但怪其自八月以來屢饗士卒秣馬厲兵而已會有奏事官自京師還祿山詐為敕書悉召諸將示之曰有密旨令祿山將兵入朝討楊國忠將即亮翻朝直遙翻諸君宜即從軍衆愕然相顧莫敢異言十一月甲子祿山發所部兵及同羅奚契丹室韋凡十五萬衆號二十萬反於范陽考異曰平致美薊門紀亂曰自其年八月後慰諭兵士磨厲戈矛頗異於常識者竊怪矣至是祿山勒兵夜發將出命屬官等謂曰奏事官胡逸自京回奉密旨遣祿山將隨身兵馬入朝來莫令那人知㣥公勿怪便請隨軍那人意楊國忠也平盧節度副使呂知誨守平盧別將高秀巖守大同中受降城西二百里有大同川又代州北有大同軍去太原八百餘里新志大同軍在朔州馬邑縣按宋白續通典中受降城西之大同川乃隋大同城之舊墟開元五年分善陽縣東三十里置大同軍以戍邊復於軍內置馬邑縣直代州北詰朝祿山出薊城南詰去吉翻薊音計大閱誓衆以討楊國忠為名牓軍中曰有異議扇動軍人者斬及三族於是引兵而南祿山乘鐵轝步騎精銳煙塵千里鼓譟震地轝與輿同騎奇寄翻譟蘇到翻百姓累世不識兵革猝聞范陽兵起遠近震駭河北皆祿山統內祿山兼河北道采訪使望風瓦解守令或開門出迎守式又翻或棄城竄匿或為所擒戮無敢拒之者祿山先遣將軍何千年高邈將奚騎二十聲言獻射生手乘驛詣太原乙丑北京副留守楊光翽出迎因劫之以去考異曰肅宗實錄云先令千年領壯士數千人詐稱獻俘以車千乘包旌旗戈甲器械先俟于河陽橋不見後來所用又千年時方詣太原執楊光翽未暇向河陽也今不取薊門紀亂云是月甲午縛光翽按是月有甲子安得甲午亦不取東受降城亦奏祿山反上猶以為惡祿山者詐為之降戶江翻惡烏路翻未之信也庚午上聞祿山定反乃召宰相謀之楊國忠揚揚有德色蜀本作得色當從之今反者獨祿山耳將士皆不欲也不過旬日必傳首詣行在上以為然大臣相顧失色上遣特進畢思琛詣東京琛丑林翻金吾將軍程千里詣河東各簡募數萬人隨便團結以拒之辛未安西節度使封常清入朝朝直遙翻上問以討賊方略常清大言曰今太平積久故人望風憚賊然事有逆順勢有奇變臣請走馬詣東京開府庫募驍勇挑馬箠渡河驍堅堯翻挑徒了翻箠止橤翻計日取逆胡之首獻闕下上悅壬申以常清為范陽平盧節度使常清即日乘驛詣東京募兵旬日得六萬人乃斷河陽橋為守禦之備斷音短甲戌祿山至博陵南博陵郡本定州高陽郡天寶元年更郡名舊志博陵郡京師東北二千九百六里責光翽以附楊國忠斬之以徇考異曰幸蜀記云十九日甲戌至真定南逢楊光翽按唐曆祿山遣驍騎何千年等劫光翽歸遇於博陵郡殺之蓋幸蜀記誤以定州為真定耳祿山事迹曰其年九月甲午傳太原尹楊光翽首至按祿山十一月始反而事迹云九月取光翽誤也將即亮翻下同忠志奚人祿山養為假子又以張獻誠攝博陵太守獻誠守珪之子也張守珪卵翼祿山實為厲階祿山至藳城常山太守顏杲卿力不能拒與長史袁履謙往迎之祿山輒賜杲卿金紫質其子弟使仍守常山常山郡本恆州恆山郡天寶元年更郡名劉昫曰常山郡舊治元氏魏道武登常山郡北望安樂壘美之遂移郡治於安樂城今州城是也魏收志九門縣有安樂壘質音致以備西來諸軍西來諸軍謂河東路兵東出井陘口者陘音刑指其衣謂履謙曰何為著此著陟略翻履謙悟其意乃陰與杲卿謀起兵討祿山杲卿思魯之玄孫也顏思魯之推之子師古之父也丙子上還宮斬太僕卿安慶宗賜榮義郡主自盡以朔方節度使安思順為戶部尚書思順弟元貞為太僕卿以朔方右廂兵馬使九原太守郭子儀為朔方節度使九原郡豐州太原為北都故置尹領陳留等十三郡以衞尉卿猗氏張介然為之陳留郡汴州考異曰實錄以介然為汴州刺史舊紀以介然為陳留太守按是時無刺史郭納見為太守介然直為節度使耳諸郡當賊衝者始置防禦使丁丑以榮王琬為元帥右金吾大將軍高仙芝副之統諸軍東征帥所類翻出內府錢帛於京師募兵十一萬號曰天武軍旬日而集皆市井子弟也十二月丙戌高仙芝將飛騎彍騎及新募兵邊兵在京師者合五萬人發長安上遣宦者監門將軍邊令誠監其軍屯於陝將即亮翻騎奇寄翻彍虛郭翻又古博翻監古銜翻陝失冉翻舊志陝郡在京師東四百九十里至東都三百三十里十三載丁亥安祿山自靈昌渡河靈昌郡本滑州東郡天寶元年更郡名一夕冰合如浮梁遂陷靈昌郡舊志靈昌郡去京師一千四百四十里至東都五百三十里人莫知其數所過殘滅張介然至陳留纔數日祿山至授兵登城衆忷懼不能守忷許拱翻庚寅太守郭納以城降祿山入北郭聞安慶宗死慟哭曰我何罪而殺我子時陳留將士降者夾道近萬人降戶江翻近其靳翻祿山皆殺之以快其忿斬張介然於軍門考異曰舊紀辛卯陷陳留郡祿山事迹庚午陷陳留郡傳張介然荔非元瑜等首至今從實錄守陳留舊志陳留郡京師東一千三百五十里至東都四百一里十三載壬辰上下制欲親征其朔方河西隴右兵留守城堡之外皆赴行營令節度使自將之期二十日畢集十三載初平原太守顏真卿漢置平原郡唐為德州天寶元年復改為郡因霖雨完城浚壕料丁壯實倉廩祿山以其書生易之料連條翻量度也又力弔翻易以豉翻及祿山反牒真卿以平原博平兵七千人防河津博平郡博州間古莧翻上始聞祿山反河北郡縣皆風靡歎曰二十四郡曾無一人義士邪及平至舊志平原郡至京師一千九百八十二里朕不識顏真卿作何狀乃能如是真卿遣親客密懷購賊牒詣諸郡由是諸郡多應者真卿杲卿之從弟也從才用翻安祿山引兵向滎陽太守崔無詖拒之士卒乘城者聞鼓角聲自墜如雨癸巳祿山陷滎陽滎陽郡鄭州西至洛陽二百六十里舊志滎陽郡至京師一千一百五里東都二百七十里考異曰唐曆舊紀作甲午今從實錄以其將武令珣守之祿山聲勢益張張知亮翻以其將田承嗣安忠志張孝忠為前鋒封常清所募兵皆白徒未更訓練更工衡翻屯武牢以拒賊賊以鐵騎蹂之蹂人九翻官軍大敗常清收餘衆戰於葵園又敗戰上東門內又敗葵園在甖子谷南上東門即洛陽上春門也唐六典東都城東面三門北曰上東丁酉祿山陷東京賊鼓譟自四門入縱兵殺掠常清戰於都亭驛又敗退守宣仁門又敗乃自苑西壞牆西走壞音怪考異曰常清表云自今月七日交兵至十三日不已按七日祿山猶未至滎陽蓋與賊前鋒戰耳河南尹達奚珣降於祿山降戶江翻留守李憕謂御史中丞盧奕曰吾曹荷國重任守式又翻憕直陵翻荷下可翻雖知力不敵必死之奕許諾憕收殘兵數百欲戰皆棄憕潰去憕獨坐府中奕先遣妻子懷印間道走長安走音奏朝服坐臺中朝直遙翻左右皆散祿山屯於閑广既使人執憕奕及采訪判官蔣清皆殺之奕罵祿山數其罪數所具翻顧賊黨曰凡為人當知逆順我死不失節夫復何恨夫音扶復扶又翻憕文水人文水縣屬幷州本漢大陵縣魏置受陽縣隋為文水縣懷慎之子清欽緒之子也盧懷慎開元初賢相蔣欽緒見二百九卷中宗景龍三年封常清帥餘衆至陝帥讀曰率陝郡太守竇廷芝已奔河東吏民皆散常清謂高仙芝曰常清連日血戰賊鋒不可當且潼關無兵若賊豕突入關則長安危矣陝不可守不如引兵先據潼關以拒之仙芝乃帥見兵西趣潼關見賢遍翻趣七喻翻考異曰肅宗實錄云仙芝領大軍初至陝方欲進師會常清軍敗至欲廣其賊勢以雪己罪勸仙芝班師仙芝素信常清言即日夜走保潼關朝野大駭今從本傳賊尋至官軍狼狽走無復部伍士馬相騰踐死者甚衆至潼關脩完守備賊至不得入而去祿山使其將崔乾祐屯陝復扶又翻踐悉銑翻潼音同將即亮翻陝失冉翻臨汝弘農濟陰濮陽雲中郡皆降於祿山弘農郡本虢州虢郡天寶元年更郡名濮陽郡濮州雲中郡雲州濟子禮翻濮博木翻降戶江翻朝廷徵兵諸道皆未至關中忷懼會祿山方謀稱帝留東京不進故朝廷得為之備兵亦稍集朝直遙翻忷許拱翻祿山以張通儒之弟通晤為睢陽太守與陳留長史楊朝宗將胡騎千餘東略地睢音雖守式又翻將即亮翻騎奇寄翻郡縣官多望風降走惟東平太守嗣吳王祗濟南太守李隨起兵拒之東平郡鄆州濟南郡本齊州齊郡天寶元年更名臨淄郡五載更今郡名嗣祥吏翻禕之弟也禕吁韋翻郡縣之不從賊者皆倚吳王為名單父尉賈賁帥吏民南擊睢陽斬張通晤單父古縣時屬睢陽郡單音善父音甫聞之不敢進而還還從宣翻又音如字十三載庚子以永王璘為山南節度使江陵長史源洧為之副江陵郡本荊州南郡天寶元年更郡名璘力珍翻洧于軌翻蜀郡長史崔圓為之副蜀郡益州璬公了翻長知兩翻洧光裕之子也源光裕見二百一十二卷開元十三年十三載上議親征辛丑制太子監國監古銜翻考異曰唐曆幸蜀記皆云十六日辛丑按長曆辛丑十七日也實錄又作己丑尤誤肅宗實錄云詔以上監國仍令總統六軍親征寇逆按制書云今親總六師率衆百萬鋪敦元惡巡撫洛陽則是上親征使太子留守也今從玄宗實錄謂宰相曰朕在位垂五十載倦于憂勤去秋已欲傳位太子值水旱相仍不欲以餘災遺子孫遺唯季翻淹留俟稍豐不意逆胡橫發橫戶孟翻下同朕當親征且使之監國事平之日朕將高枕無為矣枕之任翻楊國忠大懼退謂韓虢秦三夫人曰太子素惡吾家專橫久矣若一旦得天下吾與姊妹併命在旦暮矣相與聚哭使三夫人說貴惡烏路翻橫下孟翻說式芮翻銜土請命於上事遂寢十三載顏真卿召募勇士旬日至萬餘人諭以舉兵討安祿山繼以涕泣士皆感憤祿山使其黨段子光齎李憕盧奕蔣清首徇河北諸郡至平原壬寅真卿執子光腰斬以徇取三人首續以蒲身棺斂葬之祭哭受弔棺音貫斂力贍翻祿山以海運使劉道玄攝景城太守清池尉賈載鹽山尉河內穆寧共斬道玄自帝事邊功運青萊之粟浮海以給幽平之兵故置海運使景州本滄州勃海郡天寶更郡名清池漢浮陽縣地開皇十八年更名鹽山漢高城縣地隋開皇十八年以縣有鹽山更名清池帶郡鹽山屬邑也攜道玄首謁長史李暐暐收嚴莊宗族悉誅之是日送道玄首至平原真卿召載寧及清河尉張澹詣平原計事澹徒覽翻考異曰舊穆寧傳祿山偽署劉道玄為景城守寧唱義起兵斬道玄首傳檄郡邑多有應者賊將史思明來寇郡寧以攝東光令將兵禦之思明遣使說誘寧立斬之郡懼賊怨深後大兵至奪寧兵及攝縣初寧佐采訪使巡按嘗過平原與太守顏真卿密揣祿山必叛至是真卿亦唱義舉郡兵以拒祿山會間使持書遺真卿曰夫子為衞君乎更無他詞真卿得書大喜因奏署大理評事河北采訪支使按寧以道玄首謁李暐暐即族嚴莊家豈有懼賊怨深而奪寧兵乎真卿既殺段子光帥諸郡以討祿山寧書中何必尚為隱語道玄首至平原真卿已召寧計事豈待得此書然後用之況真卿領采訪使乃在明年常山陷後今皆不取饒陽太守盧全誠據城不受代考異曰包諝河洛春秋作盧皓今從殷仲容顏氏行狀李隨遣遊弈將訾嗣賢濟河將即亮翻訾即移翻姓也漢有訾順殺祿山所署博平太守馬冀各有衆數千或萬人共推真卿為盟主軍事皆稟焉祿山使張獻誠將上谷博陵常山趙郡文安五郡團結兵萬人圍饒陽饒陽郡深州河間郡瀛州上谷郡易州趙郡趙州文安郡莫州將即亮翻十三載高仙芝之東征也監軍邊令誠數以事干之仙芝多不從令誠入奏事具言仙芝常清橈敗之狀數所角翻橈奴教翻且云常清以賊搖衆而仙芝棄陝地數百里又盜減軍士糧賜上大怒癸卯遣令誠齎敕即軍中斬仙芝及常清初常清既敗三遣使奉表陳賊形勢使疏吏翻上皆不之見常清乃自馳詣闕至渭南敕削其官爵令還仙芝軍白衣自效常清草遺表曰臣死之後望陛下不輕此賊無忘臣言時朝議皆以為祿山狂悖不日授首故常清云然云然者猶曰言如此也朝直遙翻悖蒲內翻又蒲沒翻先引常清宣敕示之常清以表附令誠上之上時掌翻考異曰明皇幸蜀記安祿山事迹皆曰常清配隸仙芝軍感憤頗深遂作遺表飲藥而死令誠至常清已死而舊傳以為敕令卻赴潼關自草表待罪是日臨刑託令誠上之蓋二書見常清表有仰天飲鴆向日封章即為尸諫之臣死作聖朝之鬼故云然今從舊傳常清既死陳尸蘧蒢蘧蒢蘆䕠也仙芝還至聽事令誠索陌刀手百餘人自隨索山客翻乃謂仙芝曰大夫亦有恩命仙芝遽下令誠宣敕仙芝曰我遇敵而退死則宜矣今上戴天下履地謂我盜減糧賜則誣也時士卒在前皆大呼稱枉其聲振地遂斬之呼火故翻史言高仙芝由邊令誠而得節亦由邊令誠而喪元以將軍李承光攝領其衆河西隴右節度使哥舒翰病廢在家考異曰舊金梁鳳傳云天寶十三載哥舒翰入京師裴冕為河西留後在武威是翰雖病在京師猶領河西隴右兩鎮也且素與祿山不協召見見賢遍翻拜兵馬副元帥將兵八萬以討祿山帥所類翻仍敕天下四面進兵會攻洛陽翰以病固辭上不許以田良丘為御史中丞充行軍司馬起居郎蕭昕為判官蕃將火拔歸仁等各將部落以從將即亮翻從才用翻幷仙芝舊卒號二十萬軍于潼關考異曰肅宗實錄云以翰為皇太子先鋒兵馬使元帥領河隴朔方募兵十萬幷仙芝舊卒號二十萬拒戰於潼關十二月十七日大軍發唐曆亦云先鋒兵馬使元帥舊傳云先鋒兵馬元帥祿山事迹云翰為副元帥領河隴諸蕃部落奴剌頡跌朱邪契苾渾蹛林奚結沙陀蓬子處蜜吐谷渾思結等十三部落督蕃漢兵二十一萬八千人鎮于潼關舊紀云丙午命翰守潼關按玄宗實錄癸卯斬常清仙芝命翰為兵馬副元帥統兵八萬鎮潼關時榮王為元帥故以翰副之蓋誅仙芝之日即命翰代仙芝舊紀丙午肅宗實錄十七日軍發皆太早也玄宗實錄所云八萬者蓋止謂漢兵隨翰東征者耳幷諸蕃部落及仙芝舊兵則及十餘萬因號二十萬也不能治事治直之翻悉以軍政委田良丘良丘復不敢專決使王思禮主騎李承光主步二人爭長無所統壹復扶又翻長知兩翻翰用法嚴而不恤士卒皆懈弛無鬬志史言哥舒翰所以敗十三載安祿山大同軍使高秀巖寇振武軍杜佑曰振武軍在單于都護府城內西去朔方千七百餘里敗補邁翻子儀乘勝拔靜邊軍據舊史靜邊軍當在單于府東北王忠嗣鎮河東所築也宋白曰雲中郡西至靜邊軍一百八十里子儀使左兵馬使李光弼右兵馬使高濬左武鋒使僕固懷恩右武鋒使渾釋之等逆擊大破之坑其騎七千騎奇寄翻下同考異曰陳翃汾陽王家傳此戰在十二月十二日嫌其與祿山陷東都相亂故幷置此進圍雲中使別將公孫瓊巖將二千騎擊馬邑拔之開東陘關馬邑郡朔州鴈門縣有東陘關西陘關時河東太原閉關以拒秀巖子儀既破秀巖始開關杜佑曰代州鴈門郡郡南三十里有東陘關甚險固西陘山即句注山陘音刑下同甲辰加子儀御史大夫懷恩哥濫拔延之曾孫也世為金微都督哥濫拔延見一百九十八卷太宗貞觀二十年金微都督府亦置於是年舊史曰僕固即鐵勒僕骨部語訛為僕固釋之渾部酋長世為皋蘭都督酋慈由翻長知兩翻十三載顏杲卿將起兵參軍馮虔前真定令賈深藳城尉崔安石郡人翟萬德內丘丞張通幽皆預其謀真定縣帶常山郡內丘漢中丘縣也隋諱忠改曰內丘屬鉅鹿郡翟萇伯翻密與相應語牛倨翻會顏真卿自平原遣杲卿甥盧逖潛告杲卿欲連兵斷祿山歸路以緩其西入之謀斷丁管翻下乃斷同時祿山遣其金吾將軍高邈詣幽州徵兵未還杲卿以祿山命召李欽湊使帥衆詣郡受犒賚帥讀曰率犒苦到翻賚來代翻丙午薄暮欽湊至杲卿使袁屢謙馮虔等攜酒食妓樂往勞之妓渠綺翻勞力到翻下慰勞同幷其黨皆大醉乃斷欽湊首收其甲兵盡縛其黨明日斬之悉散井陘之衆有頃高邈自幽州還且至藳城杲卿使馮虔往擒之斷丁管翻是年十一月安祿山使李欽湊屯井陘口今斬之而散其衆陘音刑還從宣翻又音如字南境又白何千年自東京來崔安石與翟萬德馳詣醴泉驛迎千年又擒之醴泉驛在常山郡界南直趙郡千年謂杲卿曰今太守欲輸力王室既善其始當慎其終此郡應募烏合難以臨敵宜深溝高壘勿與爭鋒俟朔方軍至併力齊進傳檄趙魏斷燕薊要膂章十二行本膂下有彼則成擒矣五字乙十一行本同退齋校同張校同云無註本亦無斷音短燕因肩翻薊音計要讀曰腰今且宜聲云李光弼引步騎一萬出井陘因使人說張獻誠云足下所將多團練之人無堅甲利兵難以當山西勁兵常山饒陽以幷代為山西合天下言之則河南河北通謂之山東函關以西為山西說式芮翻將即亮翻又音如字獻誠必解圍遁去此亦一奇也杲卿悅用其策獻誠果遁去其團練兵皆潰杲卿乃使人入饒陽城慰勞將士勞力到翻將即亮翻命崔安石等徇諸郡云大軍已下井陘朝夕當至先平河北諸郡先下者賞後至者誅於是河北諸郡響應凡十七郡皆歸朝廷兵合二十餘萬考異曰河洛春秋曰祿山至藳城杲卿上書陳國忠罪惡宜誅之狀且曰鉞下才不世出天實縱之所向輙平無思不服昔漢高仗赤帝之運猶納食其之言魏武應黃星之符亦用荀彧之策又曰今河北殷實百姓富饒衣冠禮樂天下莫敵孔子曰十室之邑必有忠信萬家之邦非無豪傑如或結聚豈非後患者乎伏惟精彼前軍嚴其後殿所過持重且詳觀地圖凡有隘狹必加防遏慎擇良吏委之腹心自洛已東且為己有廣輓芻粟繕理甲兵傳檄西都望風自振若唐祚未改王命尚行君相協謀土庶奔命則盛兵鞏洛東據敖倉南臨白馬之津北守飛狐之塞自當抗衡上國割據一方若景命已移謳歌所繫即當長驅岐雍飲馬渭河黔首歸命孰有出鉞下之右者祿山大悅加杲卿章服仍舊常山太守幷五軍團練使鎮井陘口留同羅及曳落河一百人首領各一人其趙邢洺相衞等州並皆替換及滄瀛深不從祿山張獻誠圍深州月餘不下前趙州司戶包處遂前原氏尉張通幽藳城縣尉崔安晟恆州長史袁履謙等同上書說杲卿曰明公身荷寵光位居牧守乃棄萬全之良計履必死之畏途取適於目前忘累於身後竊為明公不取今若拒祿山之命招十萬之兵峙乃芻茭積其食粟分守要害大振威聲通井陘之路與東都合勢如此則洪勳盛烈何可勝言者哉輕進瞽言萬無一用魂銷東岱先懷屠裂之憂心拱北辰願立忠貞之節杲卿覽書大悅於是僉議偽以祿山命追井陘鎮兵就恆州宴設酋長各賜帛三百段馬一疋金銀器各一牀美人各一其餘通賜物一萬段設於州南焦同驛自曉至暮幷以歌妓數百人悅其意密於酒中置毒與飲令盡醉悉無所覺乃盡收其器械一一縛之明日盡斬棄尸於滹沱河中殷亮顏杲卿傳曰祿山起杲卿計無所出乃與長史袁履謙謁于藳城縣祿山以杲卿嘗為己判官矯制賜紫金魚袋使自守常山郡以其孫誕弟子詢為質俾崇郡刺史蔣欽湊以趙郡甲卒七千人守土門約杲卿將見欽湊以私號召之杲卿罷歸途中指其衣服而謂履謙曰此害身之物也祿山雖以誅君側為名其實反矣我與公世為唐臣忝居藩翰寧可從之作逆邪履謙愀然變色感歎良久曰為之柰何唯公所命不敢違杲卿乃使人告太原尹王承業以殺欽湊俟其緩急相應承業亦使報命杲卿恐漏泄示己不事事多委政於履謙終日不相謁唯使男泉明往來通其言召前真定令賈深處士權渙郭仲邕就履謙以謀之適會杲卿從父弟真卿據平原殺段子光使杲卿妹子盧逖幷以購祿山所行敕牒潛告杲卿大悅匿逖于家逖之未至杲卿先使人以私號召欽湊至杲卿辭之曰日暮夜恐有他盜城門閉矣請俟詰朝相見因遣參軍馮虔宗室李峻靈壽尉李栖默郡人翟萬德等即于驛亭偶欽湊夜久醉熟以斧斫殺之悉散土門兵先是祿山使其腹心偽金吾將軍高邈徵兵于范陽路出常山杲卿候知之其日邈至于滿城驛杲卿令崔安石馮虔殺之邈前驅數人先至遽殺之遂生擒邈送于郡遇何千年狎至安石於路絕行人之南者馳至醴泉驛候千年亦斬其人而擒之如邈日未午二凶偕致肅宗實錄杲卿初聞祿山起兵於范陽杲卿召長史袁履謙前真定令賈深內丘丞張通幽謂之曰今祿山一朝以幽幷騎過常山趨洛陽有問鼎之志天子在長安方欲徵天下兵東向問罪事不及矣如賊軍暴至吾屬為虜必矣不若因其未萌招義徒西據土門北通河朔待海內之救上以安國家下以全臣節此策之上者遂即日購士得千餘人命履謙將兵鎮土門命賈深防東路通幽守郡城賊將李歸仁令弟欽湊領步騎五千人先鎮土門仍令以兵隸於杲卿又使麾下騎將高邈馳報祿山令促其行覘者知其謀而白杲卿杲卿召履謙告之履謙曰事將亟矣若不早誅欽湊謀不集也遂詐追欽湊令赴郡計事命履謙署人吏以待之欽湊夜至郡杲卿命憩於驛乃使參軍李循馮虔縣尉李栖默等享欽湊於驛醉而夜殺之履謙持欽湊首謁于杲卿杲卿與履謙且喜事之捷又懼賊之來相對泣杲卿收淚勵履謙曰大丈夫名不掛青史安用生為吾與公累世事唐豈偷安於胡羯但使死而不朽亦何恨也有頃藳城尉崔安石報高邈自祿山所至己宿上谷郡界又使馮虔縣吏翟萬德幷命安石共方略詰朝邈騎數人先至驛虔盡阬之邈繼至虔紿之曰太守將音樂迎候邈無疑至廳下馬虔安石等指揮人吏以棒亂擊邈仆生縛之無何南界又報何千年自東京宿趙郡安石萬德先於郡南醴泉驛候之千年至知邈被擒令麾下騎與安石戰敗又生擒千年並送于郡舊傳曰祿山陷東都杲卿忠誠感發懼賊寇潼關即危宗社時從弟真卿為平原太守遣信告杲卿相與起義兵掎角斷賊歸路以紓西寇之勢杲卿乃與長史袁履謙前真定令賈深前內丘丞張通幽等謀閉土門以背之祿山遣蔣欽湊高邈帥衆五千守土門杲卿欲誅欽湊開土門之路時欽湊軍隸常山郡屬欽湊遣高邈往幽州未還杲卿遣吏召欽湊至郡計事是月二十二日夜欽湊至舍之於傳舍會飲既醉令袁履謙與參軍馮虔縣尉李栖默手力翟萬德等殺欽湊中夜履謙攜欽湊首見杲卿相與垂泣喜事之濟也是夜藳城尉崔安石報高邈還至滿城即令馮虔翟萬德與安石往圖之詰朝邈之騎從數人至藳城驛安石皆殺之俄而邈至安石紿之曰太守備酒樂於傳舍邈方據廳下馬馮虔等擒而縶之是日賊將何千年自東都來趙郡馮虔翟萬德伏兵於醴泉驛千年至又擒之即日縛二賊將還郡按祿山初自范陽擁數十萬衆南下常山當其所出之塗若杲卿不從命遽以千餘人拒之則應時齏粉安得復守故郡乎況時祿山猶以誅楊國忠為名未僭位號杲卿迎於藳城受其金紫殆不能免矣肅宗實錄所云者蓋欲全忠臣之節耳然杲卿忠直剛烈糜軀徇國舍生取義自古罕儔豈肯更上書媚悅祿山比之漢高魏武為之畫割據幷吞之策此則粗有知識者必知其不然也蓋包諝乃處遂之子欲言杲卿初無討賊立節之意由己父上書勸成之以大其父功耳觀所載杲卿上祿山書處遂等上杲卿書田承嗣上史朝義疏其文體如一足知皆諝所撰也又張通幽兄為逆黨又教王承業奪杲卿之功終以反覆被誅其行事如此而包諝云初與處遂同上書勸杲卿為忠義尤難信也舊傳云欽湊高邈同守土門欽湊遣邈往幽州二將既握兵同鎮土門欽湊豈得亶遣邈往幽州今從殷亮杲卿傳祿山自遣邈徵兵是也河洛春秋云留同羅及曳落河百人彼鎮井陘遏山西之軍重任也豈百人所能守乎殷傳云七千人守土門此七千人又非履謙一夕所能縛也蓋祿山留精兵百人以為欽湊腹心爪牙其餘皆團練民兵脅從者耳故履謙得醉之以酒誅欽湊及百人而散其餘耳河洛春秋云酒中置毒按時履謙等與欽湊同飲豈得偏置毒於客酒中乎今不取舊傳及殷傳皆云欽湊姓蔣今從玄宗肅宗實錄唐曆姓李玄宗實錄十二月己亥杲卿殺賊將李欽湊執何千年高邈送京師按己亥十五日也而真卿以壬寅斬段子光壬寅十八日也真卿既殺子光乃報杲卿同舉義兵今從舊傳為二十二日丙午殺欽湊肅宗實錄又云杲卿之斬欽湊等因使徇諸郡曰今上使榮王為元帥哥舒翰為副徵天下兵四十萬東向討逆按實錄癸卯始命翰為副元帥計丙午常山亦未知今不取河洛春秋云十三郡悉舉義兵歸朝廷殷亮顏氏行狀舊顏真卿傳唐曆皆云十七郡歸順蓋河洛春秋不數平原景城河間饒陽先定者耳顏氏行狀曰不款者六郡而已時魏郡亦未下蓋舉其終數耳唯范陽盧龍密雲漁陽汲鄴六郡而已考唐志無盧龍郡當是改平州北平郡為盧龍郡也密雲郡本檀州安樂郡天寶元年更郡名漁陽郡薊州汲郡衞州杲卿又密使人入范章十二行本范作漁下同乙十一行本同孔本同陽招賈循郟城人馬燧說循曰郟城漢潁川郟縣之地後魏置龍山縣及南陽縣隋開皇初改龍山曰汝南十八年改汝南曰輔城南陽曰期城大業初改輔城曰郟城廢期城入焉郟音夾說式芮翻祿山負恩悖逆悖蒲內翻又蒲沒翻雖得洛陽終歸夷滅公若誅諸將之不從命者以范陽歸國傾其根柢此不世之功也循然之猶豫不時發別將牛潤容知之以告祿山祿山使其黨韓朝陽召循朝陽至范陽引循屏語將即亮翻下同屏必郢翻使壯士縊殺之滅其族縊於計翻以別將牛廷玠知范陽軍事史思明李立節將蕃漢步騎萬人擊博陵常山馬燧亡入西山范陽郡之西山南連上谷中山之諸山得免十三載初祿山欲自將攻潼關至新安聞河北有變而還考異曰玄宗實錄十五年正月壬戌祿山將犯潼關次于新安聞有備而還按祿山以此月丁酉陷東都至壬戌凡二十六日非乘虛掩襲也豈得至新安然後知其有備乎蓋常山有變則幽薊路絕故懼而歸耳今從肅宗本紀河內郡懷州十三載戊申榮王琬薨贈諡靖恭太子十三載是歲吐蕃贊普乞梨蘇籠獵贊卒子娑悉籠獵贊立吐從暾入聲卒子恤翻娑素禾翻肅宗文明武德大聖大宣孝皇帝上之上諱亨玄宗第三子也初名嗣昇開元十五年更名浚二十三年更名璵二十八年更名紹天寶三載更名亨至德元載丙申七五六是年七月太子即位於靈武始改元至德十三載春正月乙卯朔祿山自稱大燕皇帝改元聖武以達奚珣為侍中張通儒為中書令考異曰幸蜀記云以珣為左相通儒為右相今從實錄十三載李隨至睢陽有衆數萬丙辰以隨為河南節度使是載始置河南節度使治汴州領陳留睢陽靈昌淮陽汝陰譙濟陰濮陽淄川琅邪彭城臨淮東海十三郡睢音雖使疏吏翻下同許遠先仕於蜀忤章仇兼瓊貶高要尉史為許遠堅守睢陽張本以郡人王栖曜為衙前總管攻拔濟陰殺祿山將邢超然濮博木翻濟子禮翻將即亮翻十三載顏杲卿使其子泉明賈深翟萬德獻李欽湊首及何千年高邈于京師翟萇伯翻張通幽泣請曰通幽兄陷賊謂通儒也以救宗族杲卿哀而許之至太原通幽欲自託於王承業乃教之留泉明等更其表更工衡翻多自為功毀短杲卿別遣使獻之杲卿起兵纔八日守備未完史思明蔡希德引兵皆至城下考異曰河洛春秋云十二月乙未思明希德齊至城下杲卿丙午始殺李欽湊云乙未誤也今從諸書承業既竊其功利於城陷遂擁兵不救杲卿晝夜拒戰糧盡矢竭壬戌城陷考異曰實錄癸亥城陷河洛春秋正月一日城陷舊思明傳正月六日圍常山九日拔之今從玄宗實錄唐曆舊紀杲卿傳執杲卿及袁履謙等送洛陽舊志常山郡京師東北一千七百六十里至東都一千一百三十六里玄宗大喜拜承業羽林大將軍麾下受官爵者以百數徵顏杲卿為衞尉卿朝命未至常山已陷朝直遙翻杲卿至洛陽祿山數之曰數所具翻汝自范陽戶曹我奏汝為判官不數年超至太守杲卿為范陽戶曹祿山表為營田判官假常山太守杲卿瞋目罵曰汝本營州牧羊羯奴瞋昌真翻羯居謁翻天子擢汝為三道節度使恩幸無比何負於汝而反我世為唐臣祿位皆唐有雖為汝所奏豈從汝反邪我為國討賊我為于偽翻恨不斬汝何謂反也臊羯狗何不速殺我祿山大怒幷袁履謙等縛於中橋之柱而之臊蘇遭翻中橋天津中橋也古瓦翻杲卿履謙比死比必利翻罵不虛口顏氏一門死於刀鋸者三十餘人史思明李立節蔡希德既克常山引兵擊諸郡之不從者所過殘滅於是鄴廣平鉅鹿趙上谷博陵文安魏信都等郡復為賊守鉅鹿郡邢州信都郡冀州文安郡莫州復扶又翻思明等圍之河間司法李奐將七千人景城長史李暐遣其子祀將八千人救之皆為思明所敗敗補邁翻十三載上命郭子儀罷圍雲中還朔方益發兵進取東京選良將一人分兵先出井陘定河北子儀薦李光弼癸亥以光弼為河東節度使分朔方兵萬人與之考異曰杜牧張保皋傳曰安祿山亂朔方節度使安思順以祿山從弟賜死詔郭汾陽代之後旬日復詔李臨淮持節分朔方半兵東出趙魏當思順時汾陽臨淮俱為牙門都將二人不相能雖同盤飲食常睇相視不交一言及汾陽代思順臨淮欲亡去計未決詔至分汾陽兵東討臨淮入請曰一死固甘乞免妻子汾陽趨下持手上堂偶坐曰今國亂主遷非公不能東伐豈懷私忿時邪悉召軍吏出詔書讀之如詔約束及別執手泣涕相勉以忠義按於時玄宗未幸蜀唐之號令猶行於天下若制書除光弼為節度使子儀安敢亶殺之杜或得於傳聞之誤也今從汾陽家傳及舊傳十三載甲子加哥舒翰左僕射同平章事餘如故十三載置南陽節度使以南陽太守魯炅為之將嶺南黔中襄陽子弟五萬人屯葉北以備安祿山炅表薛愿為潁川太守兼防禦使南陽郡鄧州襄陽郡襄州葉縣時屬汝州潁川郡許州炅火迥翻將即亮翻黔音琴葉式涉翻愿故太子瑛之兄堅玉之曾孫也龐玉去隋歸唐為將龐皮江翻十三載乙丑安祿山遣其子慶緒寇潼關哥舒翰擊卻之十三載己巳加顏真卿戶部侍郎兼本郡防禦使真卿以李暐為副十三載二月丙戌加李光弼魏郡太守河北道采訪使十三載史思明等圍饒陽二十九日不下李光弼將蕃漢步騎萬餘人太原弩手三千人出井陘騎奇寄翻陘音刑考異曰玄宗實錄己亥光弼以朔方馬步五千東出土門收常山郡河洛春秋云光弼從大同城下領蕃漢兵馬步一萬餘人幷太原弩手三千人救真定蓋實錄言朔方元領之兵河洛言到真定之數耳己亥至常山常山團練兵三千人殺胡兵執安思義出降降戶江翻光弼謂思義曰汝自知當死否思義不應光弼曰汝久更陳行更工衡翻陳讀曰陣行胡剛翻視吾此衆可敵思明否今為我計當如何汝策可取當不殺汝思義曰大夫士馬遠來疲弊猝遇大敵恐未易當易以豉翻不如移軍入城早為備禦先料勝負然後出兵胡騎雖銳不能持重騎奇寄翻下同苟不獲利氣沮心離於時乃可圖矣思明今在饒陽去此不二百里九域志真定至饒陽二百三十五里思義蓋指思明下營處言之計其先鋒來晨必至而大軍繼之不可不留意也光弼悅釋其縛即移軍入城史思明聞常山不守立解饒陽之圍明日未旦先鋒已至思明等繼之合二萬餘騎直抵城下光弼遣步卒五千自東門出戰賊守門不退光弼命五百弩於城上齊發射之射而亦翻下兵射同賊稍卻乃出弩手千人分為四隊使其矢發發相繼賊不能當斂軍道北光弼出兵五千為槍城於道南夾呼沱水而陳賊數以騎兵搏戰光弼之兵射之人馬中矢者太半陳讀曰陣數所角翻中竹仲翻乃退小憩以俟步兵有村民告賊步兵五千自饒陽來晝夜行百七十里至九門南逢壁度憩息九門縣屬常山郡在郡東宋白曰戰國策云本有九室而居趙武靈王改為九門縣憩去例翻匿旗鼓並水潛行並步浪翻至逢壁賊方飯縱兵掩擊殺之無遺思明聞之失勢退入九門時常山九縣真定藳城石邑九門行唐井陘平山獲鹿靈壽凡九縣惟九門藳城為賊所據光弼遣裨將張奉璋以兵五百戍石邑石邑縣自漢以來屬常山郡在郡西南戍兵多於餘縣者所以通太原之路也宋白曰隋改漢上曲陽縣為石邑尋移石邑於井陘縣於舊石邑縣置恆陽縣以在恆山之陽為名則此石邑在井陘也十三載上以吳王祗為靈昌太守河南都知兵馬使上謂玄宗使疏吏翻有衆二千先是譙郡太守楊萬石以郡降安祿山先悉薦翻降戶江翻逼真源令河東張巡使為長史西迎賊巡至真源帥吏民哭於玄元皇帝廟雍丘縣漢晉屬陳留郡後魏屬湯夏郡隋屬梁郡唐屬汴州譙郡亳州老子苦縣人有祠在焉唐祖之故改縣曰真源九域志縣在譙郡西七十里帥讀曰率吏民樂從者數千人樂音洛巡選精兵千人西至雍丘與賈賁合初雍丘令令狐潮以縣降賊賊以為將使東擊淮陽救兵于襄邑破之淮陽郡陳州宋白曰襄邑縣春秋宋襄牛地也宋襄公葬焉故曰襄陵今墓在縣西北隅秦始皇以承匡縣卑濕遂徙於襄陵又以陵字犯諱改為襄邑拘於雍丘將殺之往見李庭望淮陽兵遂殺守者潮棄妻子走故賈賁得以其間入雍丘間古莧翻考異曰肅宗實錄曰雍丘令令狐潮據城以應祿山百姓有違令者百餘人將殺之覘者報官軍至潮不及行刑遂反縛仆於地令人守之遽出軍以禦官軍縛者忽一人幸脫殺守者互解其縛閉城門以拒潮相持累日賁聞之入其城領衆殺潮母妻及子以堅人志舊張巡傳潮欲以城降賊民吏百餘人不從命潮皆反接仆之於地將斬之會賊來攻城潮遽出鬬而反接者自解其縛閉城門拒潮召賁賁與巡引衆入雍丘新傳潮舉縣附賊遂自將東敗淮陽兵虜其衆反接在廷將殺之暫出行部淮陽兵更解縛起殺守者迎賁等入潮不得歸巡乃屠其妻子磔城上按潮既欲以城降賊賊來即當出迎豈有更出鬬者今從李翰張中丞傳及新傳庚子潮引賊精兵攻雍丘賁出戰敗死張巡力戰卻賊因兼領賁衆自稱吳王先鋒使三月乙卯潮復與賊將李懷仙楊朝宗謝元同等四萬餘衆奄至城下衆懼莫有固志復扶又翻下日復瘡復同朝直遙翻巡曰賊兵精銳有輕我心今出其不意擊之彼必驚潰賊勢小折然後城可守也乃使千人乘城自帥千人分數隊開門突出巡身先士卒直衝賊陳人馬辟易先悉薦翻陳讀曰陣辟讀曰闢易讀如字賊遂退明日復進攻城設百礮環城復扶又翻礮與砲同環音宦樓堞皆盡堞達協翻巡於城上立木柵以拒之賊蟻附而登巡束蒿灌脂焚而投之賊不得上上時掌翻時伺賊隙出兵擊之或夜縋斫營伺相吏翻縋馳偽翻積六十餘日大小三百餘戰帶甲而食裹瘡復戰賊遂敗走巡乘勝追之獲胡兵二千人而還軍聲大振還從宣翻又音如字十三載初戶部尚書安思順知祿山反謀因入朝奏之尚辰羊翻朝直遙翻及祿山反上以思順先奏不之罪也哥舒翰素與之有隙事見上卷天寶十載於關門擒之以獻且數思順七罪請誅之遺于季翻數所具翻又所主翻丙辰思順及弟太僕卿元貞皆坐死家屬徙嶺外楊國忠不能救由是始畏翰十三載郭子儀至朔方益選精兵戊午進軍于代此代謂代州十三載戊辰吳王祗擊謝元同走之拜陳留太守河南節度使守式又翻使疏吏翻十三載壬午以河東節度使李光弼為范陽長史河北節度使長知兩翻考異曰實錄云乙丑光弼收趙郡按壬午三月二十九日乙丑十二日也河洛春秋收趙郡在四月今從之加顏真卿河北采訪使真卿以張澹為支使先是清河客李萼先悉薦翻考異曰顏氏行狀作李華今從舊傳年二十餘為郡人乞師於真卿為于偽翻曰公首唱大義河北諸郡恃公以為長城今清河公之西鄰清河郡貝州九域志德州西南至貝州二百三十里贍時豔翻謂之天下北庫今有布三百餘萬匹帛八十餘萬匹錢三十餘萬緡糧三十餘萬斛昔討默啜甲兵皆貯清河庫謂武后時也啜陟劣翻貯丁呂翻一物可以給一事因謂之事口十餘萬竊計財足以三平原之富兵足以倍平原之強公誠資以士卒撫而有之以二郡為腹心則餘郡如四支無不隨所使矣真卿曰平原兵新集尚未訓練自保恐不足何暇及鄰雖然借若諾子之請則將何為乎萼曰清河遣僕銜命於公者非力不足而借公之師以嘗寇也亦欲觀大賢之明張明作名義耳今仰瞻高意未有決辭定色僕何敢遽言所為哉真卿奇之欲與之兵衆以為萼年少輕虜少詩照翻徒分兵力必無所成真卿不得已辭之萼就館復為書說真卿復扶又翻說式芮翻以為清河去逆効順奉粟帛器械以資軍公乃不納而疑之僕回轅之後清河不能孤立必有所繫託將為公西面之強敵公能無悔乎真卿大驚遽詣其館以兵六千借之送至境執手別真卿問曰兵已行矣可以言子之所為乎萼曰聞朝廷遣程千里將精兵十萬出崞口討賊崞口在洺州邯鄲縣西蓋即壺關之險也又按舊唐書崞口在相州西山崞音郭不得前今當引兵先擊魏郡執祿山所署太守袁知泰納舊太守司馬垂使為西南主人分兵開崞口出千里之師因討汲鄴以北至于幽陵郡縣之未下者幽陵即謂幽州帥讀曰率合兵十萬南臨孟津分兵循河據守要害制其北走之路計官軍東討者不下二十萬河南義兵西向者亦不減十萬公但當表朝廷堅壁勿戰不過月餘賊必有內潰相圖之變矣真卿曰善命錄事參軍李擇交及平原令范冬馥將其兵平原縣屬平原郡古平原郡治焉故城在今縣西南二十五里今縣治北齊所築城時平原郡治安德縣宋白曰堂邑縣屬博平郡本漢清縣發干二縣地隋開皇十六年於此置堂邑縣因縣西北有堂邑故城為名三郡兵力戰盡日魏兵大敗斬首萬餘級捕虜千餘人得馬千匹軍資甚衆知泰奔汲郡遂克魏郡軍聲大振時北海太守賀蘭進明亦起兵真卿以書召之幷力北海郡青州將即亮翻騎奇寄翻下同真卿陳兵逆之相揖哭於馬上哀動行伍行戶剛翻進明屯平原城南休養士馬真卿每事咨之由是軍權稍移於進明矣真卿不以為嫌真卿以堂邑之功讓進明進明奏其狀取捨任意敕加進明河北招討使擇交冬馥微進資級清河博平有功者皆不錄進明攻信都郡久之不克錄事參軍長安第五琦勸進明厚以金帛募勇士遂克之考異曰顏氏行狀云進明失律於信都城下有詔抵罪公縱之使赴行在進明之全乃公之護也今從舊傳又唐曆三月四日乙酉真卿充河北采訪使時進明起義兵北渡河與真卿同經略六月真卿破袁知泰於堂邑進明再拔信都統紀皆在三月舊紀破知泰拔信都皆在六月按三月無乙酉乙酉四月二日也今從統紀十三載李光弼與史思明相守四十餘日思明絕常山糧道城中乏草馬食薦藉藉慈夜翻光弼以車五百乘之石邑取草之往也乘繩證翻弩手千人衞之為方陳而行衣於既翻陳讀曰陣賊不能奪蔡希德引兵攻石邑張奉璋拒卻之光弼遣使告急於郭子儀子儀引兵自井陘出使疏吏翻陘音刑夏四月壬辰至常山與光弼合蕃漢步騎共十餘萬甲午子儀光弼與史思明等戰於九門城南宋白曰九門縣戰國趙邑戰國策云本有九室而居趙武靈王改為九門縣中郎將渾瑊射李立節殺之將即亮翻渾胡昆翻又戶本翻瑊古咸翻射而亦翻瑊釋之之子也思明收餘衆奔趙郡蔡希德奔鉅鹿思明自趙郡如博陵時博陵已降官軍降戶江翻下同思明盡殺郡官河朔之民苦賊殘暴所至屯結多至二萬人少者萬人各為營以拒賊及郭李軍至爭出自效少始紹翻庚子攻趙郡一日城降士卒多虜掠光弼坐城門收所獲悉歸之民大悅子儀生擒四千人皆捨之斬祿山太守郭獻璆璆音求光弼進圍博陵十日不拔引兵還恆陽就食恆陽即恆山郡以其地在恆山之陽也唐置恆陽軍於郡北又博陵郡有恆陽縣漢之上曲陽縣也隋改為恆陽縣在博陵西十里恆戶登翻還從宣翻又音如字十三載楊國忠問士之可為將者於左拾遺博平張鎬及蕭昕鎬下老翻昕許斤翻將即亮翻下同鎬昕薦左贊善大夫永壽來瑱武德二年分新平置永壽縣屬邠州瑱他見翻丙午以瑱為潁川太守賊屢攻之瑱前後破賊甚衆加本郡防禦使守式又翻使疏吏翻人謂之來嚼鐵十三載安祿山使平盧節度使呂知誨誘安東副大都護馬靈詧殺之馬靈詧即夫蒙靈詧也開元二年徙安東都護府于平州天寶二年徙于遼西故郡城誘羊久翻武陟漢懷縣地隋開皇十六年分置武陟縣時屬河內郡遣使踰海與顏真卿相聞請取范陽以自效真卿遣判官賈載齎糧及戰士衣助之真卿時惟一子頗纔十餘歲使詣客奴為質質音致朝廷聞之以客奴為平盧節度使朝直遙翻賜名正臣玄志為安東副大都護董秦為平盧兵馬使十三載南陽節度使魯炅立柵於滍水之南安祿山將武令珣畢思琛攻之滍直里翻容肇祖標點何茲全顧頡剛聶崇岐覆校
