body:
  text: 資治通鑑卷第一百一十端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰權判西京留司御史臺上柱國河內郡開國侯食邑一千三百戶食實封四百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注晉紀三十二安皇帝乙隆安二年戊戌三九八春正月燕范陽王德自鄴帥戶四萬南徙滑臺帥讀曰率下同魏衛王儀入鄴收其倉庫追德至河弗及趙王麟上尊號於德上時掌翻德用兄垂故事稱燕王事見一百五卷孝武太元九年以統府行帝制統府者諸方鎮皆統於燕王府行帝制者稱制以行事以趙王麟為司空領尚書令慕容法為中軍將軍慕輿拔為尚書左僕射丁通為右僕射麟復謀反德殺之慕容麟背父叛兄姦詐反覆天下其誰能容之復扶又翻庚子魏王圭自中山南巡至高邑得王永之子憲喜曰王景略之孫也以為本州中正王猛青州北海劇縣人太康中分劇屬東莞郡晉東莞屬徐州晉書載記以北海劇縣書之蓋猛自占漢郡縣也然家于魏郡而隱於華陰由是歸秦其子永鎮幽州從苻丕戰死於襄陵故憲流寓高邑今魏以為本州中正則未得青徐蓋使之銓敘東夏人士耳兼掌門下選曹吏部尚書之職門下侍中常侍給事黃門之職選須絹翻置行臺鄭樵曰行臺自魏晉有之晉文王討諸葛誕散騎常侍裴秀尚書僕射陳泰以行臺從東海王越帥衆屯許昌以行臺自隨後魏謂之尚書大行臺別置官屬與左丞賈彞帥吏兵五千人鎮鄴自漢光武委任尚書事歸臺閣謂尚書省曰尚書臺晉惠帝西遷長安置留臺於洛陽主留事於是有留臺之名至拓跋氏置行臺隨其所置掌一道之事魏書官氏志內入諸姓有素和氏後改為和氏驤思將翻圭自鄴還中山將北歸發卒萬人治直道治直之翻自望都鑿恆嶺至代五百餘里恆嶺恆山之嶺也在上曲陽西北即倒馬關路晉書地道記謂之鴻上關沈括曰北嶽恆山今謂之大茂山者是也嶽祠舊在山下石晉之後稍遷近裏今其地謂之神棚今祠乃在曲陽祠北有望嶽亭新晴氣清則望見大茂飛狐路在大茂之西自銀冶寨北出倒馬關卻自石門子令水鋪入瓶形梅回兩寨之間至代州然沈括所謂代州乃鴈門也自此亦可至魏之代都但恐非直道耳水經注祁夷水出平舒縣東東北流徑蘭亭南又東北徑石門關北舊道出中山故關也魏土地記代城西九里有平舒城此則古代城也恆戶登翻山東有變復置行臺於中山復扶又翻命衛王儀鎮之以撫軍大將軍略陽公遵為尚書左僕射鎮勃海之合口右將軍尹國督租于冀州聞圭將北還謀襲信都安南將軍長孫嵩執國斬之長知兩翻燕啓倫還至龍城去年寶遣啓崙南觀形勢倫當作崙音盧昆翻燕主寶命罷兵遼西王農言於寶曰今遷都尚新未可南征宜因成師襲庫莫奚取其牛馬以充軍資更審虛實俟明年而議之寶從之己未北行庚申渡澆洛水澆洛水蓋即饒樂水也賢曰水在今營州北唐太宗時奚內附置饒樂都督府言涉圭西上西上謂自中山取恆嶺而西歸雲代也上時掌翻延追寶及之寶大喜即日引還辛酉魏王圭發中山徙山東六州吏民雜夷十餘萬口以實代此漢高帝徙關東豪傑以實關中之策也漢時章武城屬勃海平舒縣界晉武帝泰始元年置章武國後為郡隋廢屬瀛州入平舒縣廣川太守賀賴盧性豪健廣川縣前漢屬信都國後漢屬清河郡晉屬勃海郡後分為廣川郡守式又翻襲輔殺之驅勒守兵掠陽平頓丘諸郡南渡河奔南燕南燕王德以賴盧為並州刺史封廣寧王西秦王乾歸遣乞伏益州攻涼支陽武允吾三城克之支陽允吾皆漢古縣屬金城郡武城當在二縣之間張實分支陽屬廣武郡允吾蓋仍為金城郡治所劉昫曰唐蘭州廣武縣漢枝陽縣鄯州龍支縣漢允吾縣允吾音鉛牙燕主寶還龍城宮詔諸軍就頓頓者軍行頓舍之地文武將士皆以家屬隨駕駕謂車駕猶漢人言乘輿也樂音洛以為兵疲力弱魏新得志未可與敵宜且養兵觀釁寶將從之撫軍將軍慕輿騰曰百姓可與樂成難與圖始用商鞅語意樂音洛宜獨決聖心乘機進取不宜廣采異同以沮大計沮在呂翻寶乃曰吾計決矣敢諫者斬二月乙亥寶出就頓留盛統後事己卯燕軍發龍城慕輿騰為前軍司空農為中軍寶為後軍相去各一頓觀下文連營百里蓋三十里為一頓壬午寶至乙連長上段速骨宋赤眉等因衆心之憚征役遂作亂凡衛兵皆更番迭上長上者不番代也唐官制懷化執戟長上歸德執戟長上皆武散階九品長上之官尚矣上時掌翻共逼隆子高陽王崇為主殺樂浪威王宙中牟熙公段誼及宗室諸王樂浪音洛琅河間王熙素與崇善崇擁佑之故獨得免燕主寶將十餘騎奔司空農營農將出迎左右抱其腰止之曰宜小清澄言衆方亂如水之溷濁宜少俟其定如水之清澄不可輕出也農引刀將斫之遂出見寶又馳信追慕輿騰癸未寶農引兵還趣大營大營謂寶營也農營兵亦厭征役皆棄仗走以佚道使民雖勞不怨以生道殺民雖死不怨殺者違是鮮有不敗者也寶農奔還龍城長樂王盛聞亂引兵出迎寶農僅而得免會稽王道子忌王殷之逼會工外翻以譙王尚之及弟休之有才略引為腹心尚之説道子曰今方鎮強盛宰相權輕宜密樹腹心於外以自藩衛道子從之以其司馬王愈為江州刺史都督江州及豫州之四郡軍事用為形援日夜與尚之謀議以伺四方之隙為庾楷説王殷復舉兵張本説輸芮翻伺相吏翻魏王圭如繁畤宮繁畤縣屬鴈門郡魏築宮於此天平初置繁畤郡隋復為縣唐屬代州畤音止圭畋於白登山酈道元曰今平城東十七里有臺即白登臺臺南對岡阜即白登山師古曰將謂率領也讀如字謂冠軍將軍于栗磾曰冠古玩翻磾丁奚翻卿名勇健能搏此乎對曰獸賤人貴若搏而不勝豈不虛斃一壯士乎乃驅致圭前盡射而獲之射而亦翻圭顧謝之秀容川酋長爾朱羽健從圭攻晉陽中山有功拜散騎常侍環其所居割地三百里以封之此北秀容也為爾朱榮亂魏張本爾朱榮傳云羽健之先世為部落酋帥居爾朱川因氏焉圭初以南秀容川原衍沃欲令居之羽健曰家世奉國給侍左右北秀容既在剗內差近京師豈以沃塉更遷遠地圭許之則北秀容蓋近平城也環音宦酋慈由翻長知兩翻散悉亶翻騎奇寄翻下同柔然數侵魏邊數所角翻尚書中兵郎李先請擊之圭從之大破柔然而還還從宣翻又如字楊軌以其司馬郭緯為西平相帥步騎二萬北赴郭黁禿髮烏孤遣其弟車騎將軍傉檀帥騎一萬助軌緯于季翻相息亮翻帥讀曰率黁奴昆翻傉奴沃翻軌至姑臧營于城北燕尚書頓丘王蘭汗陰與段速骨等通謀引兵營龍城之東城中留守兵至少汗音寒少詩沼翻長樂王盛徙內近城之民得丁夫萬餘乘城以禦之速骨等同謀才百餘人餘皆為所驅脅莫有鬬志三月甲午速骨等將攻城遼西桓烈王農恐不能守且為蘭汗所誘夜潛出赴之冀以自全農號為有智略乃欲投段速骨以自全不知適以速死殆天奪之鑒也速骨等攻城城上拒戰甚力速骨之衆死者以百數速骨乃將農循城將如字引也挾也城中之衆恃以為強忽見在城下無不驚愕喪氣喪息浪翻遂皆逃潰速骨入城縱兵殺掠死者狼籍寶盛與慕輿騰餘崇張真李旱趙恩等輕騎南走速骨幽農於殿內長上阿交羅速骨之謀主也騎奇寄翻上時掌翻以高陽王崇幼弱更欲立農崇親信鬷讓出力犍等聞之鬷祖紅翻春秋左氏傳有鬷蔑晉有鬷戾姓譜鬷姓古鬷夷氏之後犍居言翻丁酉殺羅及農使速骨果立農亦必同死於蘭汗之手蓋事勢已去智無所施也為于偽翻農故吏左衛將軍宇文拔亡奔遼西庚子蘭汗襲擊速骨並其黨盡殺之廢崇奉太子策承制大赦遣使迎寶及於薊城使疏吏翻薊音計寶欲還長樂王盛等皆曰汗之忠詐未可知今單騎赴之萬一汗有異志悔之無及不如南就范陽王合衆以取冀州若其不捷收南方之衆徐歸龍都亦未晚也寶從之龍城燕故都故謂之龍都慕容盛智慮逾其父遠矣離石胡帥呼延鐵西河胡帥張崇等不樂徙代帥所類翻樂音洛聚衆叛魏魏安遠將軍庾嶽討平之魏王圭召衛王儀入輔以略陽公遵代鎮中山夏四月壬戌以征虜將軍穆崇為太尉安南將軍長孫嵩為司徒燕主寶從間道過鄴間古莧翻鄴人請留寶不許南至黎陽伏於河西河水自遮害亭屈而東北流過黎陽縣南河之西岸為黎陽界東岸為滑臺界上以二月得丞相表寶以德為司徒故稱之為丞相至乙連會長上作亂失據來此人主所據者勢也衆叛親離大勢已去失所據矣鍾德之從弟也首勸德稱尊號聞而惡之執思付獄從才用翻惡烏路翻以狀白南燕王德德謂㣥下曰卿等以社稷大計勸吾攝政吾亦以嗣帝播越播逋也遷也越遠也走也故權順㣥議以繫衆心今天方悔禍嗣帝得還吾將具法駕奉迎謝罪行闕何如天子行幸所至有行宮宮前闕門謂之行闕今天下大亂非雄才無以寧濟㣥生嗣帝暗懦不能紹隆先統陛下若蹈匹夫之節捨天授之業威權一去身首不保況社稷其得血食乎慕輿護曰嗣帝不達時宜委棄國都寶棄中山見上卷上年不堪多難難乃旦翻亦已明矣昔蒯聵出奔衛輒不納春秋是之蒯苦怪翻聵五怪翻以子拒父猶可況以父拒子乎德於寶為叔父未明虛實臣請為陛下馳往詗之為于偽翻詗火迥翻又翾正翻候俟也刺探也德流涕遣之流涕遣護將使之殺寶也護帥壯士數百人帥讀曰率下同隨思而北聲言迎衛其實圖之寶既遣思詣鍾於後得樵者言德已稱制懼而北走護至無所見執思以還還從宣翻又如字德以思練習典故欲留而用之思曰犬馬猶知戀主思雖刑臣乞還就上宦者謂之刑臣上謂寶也思怒曰周室東遷晉鄭是依周平王東遷洛邑晉文侯鄭武實定王室故周桓公曰我周之東遷晉鄭焉依位為上公不能帥先㣥后以匡帝室而幸本根之傾為趙王倫之事事見八十九卷惠帝永寧元年言趙王倫以宗室而篡晉德所為類之倫於惠帝叔祖也德於寶叔父也帥讀曰率吳破楚入郢申包胥乞師於秦遂破吳師楚昭王復國龔勝字君賓事見三十七卷王莽始建國三年寶遣扶風忠公慕輿騰與長樂王盛收兵冀州盛以騰素暴橫為民所怨乃殺之行至巨鹿長樂説諸豪傑橫戶孟翻樂音洛説輸芮翻皆願起兵奉寶寶以蘭汗祀燕宗廟所為似順意欲還龍城不肯留冀州乃北行至建安建安城在令支之北乙連之南曹素武健請為寶合衆為于偽翻盛亦勸寶宜且駐留察汗情狀寶乃遣宀兒從僕射李旱先往見汗宀兒而隴翻從才用翻寶留頓石城石城縣前漢屬右北平郡後漢晉省縣屬建德郡隋唐併入營州柳城縣界宋白曰石城縣取碣石立如城以名之陳汗忠款寶以汗燕王垂之舅盛之父也謂必無他不待旱返遂行盛流涕固諫寶不聽留盛在後盛與將軍張真下道避匿丁亥寶至索莫汗陘索昔各翻汗音寒陘音刑去龍城四十里城中皆喜汗惶怖欲自出請罪怖普布翻兄弟共諫止之汗乃遣弟加難帥五百騎出迎又遣兄堤閉門止仗禁人出入城中皆知其將為變而無如之何加難見寶於陘北拜謁已已者拜謁之禮畢潁陰烈公餘崇密言於寶曰觀加難形色禍變甚逼宜留三思奈何徑前寶不從行數里加難先執崇崇大呼罵曰汝家幸緣肺附呼火故翻師古曰肺附謂親戚也舊解云肺附如肺腑之相附著一説肺斫木札也喻其輕薄附著大材也蒙國寵榮覆宗不足以報今乃敢謀篡逆此天地所不容計旦暮即屠滅但恨我不得手膾汝曹耳膾細切肉也引寶入龍城外邸弒之年四十四殺獻哀太子策及王公卿士百餘人自稱大都督大將軍大單于昌黎王單音蟬改元青龍以堤為太尉加難為車騎將軍封河間王熙為遼東公如宋故事周武王封夏之後於殷之後於宋長樂王盛聞之馳欲赴哀張真止之盛曰我今以窮歸汗汗性愚淺必念婚姻不忍殺我旬月之間足以展吾情志遂往見汗汗妻乙氏及盛皆泣涕請盛於汗盛復頓頭於諸兄弟復扶又翻汗惻然哀之乃舍盛於宮中以為侍中左光祿大夫親待如舊堤加難屢請殺盛汗不從堤驕很荒淫很戶墾翻事汗多無禮盛因而間之間古莧翻由是汗兄弟浸相嫌忌為盛誅汗張本涼太原公纂將兵擊楊軌郭黁救之纂敗還段業使沮渠蒙遜攻西郡郡在武威西據嶺之要蒙遜得之故晉昌敦煌皆降沮子余翻純光之弟子也於是晉昌太守王德敦煌太守趙郡孟敏皆以郡降業敦徒門翻降戶江翻業封蒙遜為臨池侯以德為酒泉太守敏為沙州刺史六月丙子魏王圭命㣥臣議國號皆曰周秦以前皆自諸侯升為天子因以其國為天下號漢氏以來皆無尺土之資我國家百世相承開基代北遂撫有方夏據孔安國尚書注方夏謂四方中夏夏戶雅翻黃門侍郎崔宏曰昔商人不常厥居故兩稱殷商契始封於商皇甫謐曰今上洛商是也契孫相土居商丘自契至于成湯八遷湯始居亳從先王居後仲丁遷於囂河亶甲居相祖乙居耿書曰盤庚五遷將治亳殷從先王居謂從帝嚳所居居亳也其命維新登國之初已更曰魏事見一百六卷孝武太元十一年更工衡翻大名神州之上國也左傳卜偃曰魏大名也戰國之時魏為大國中國謂之神州圭從之楊軌自恃其衆欲與涼王光決戰郭黁每以天道抑止之言天道未利也郭黁善數故如此黁奴昆翻段業使沮渠男成及王德攻之光使太原公纂將兵迎之將即亮翻楊軌曰呂弘精兵一萬若與光合則姑臧益強不可取矣乃與禿髮利鹿孤共邀擊纂纂與戰大破之軌奔王乞基王乞基田胡也不為士民所附褊補典翻聞軌敗走降西秦降戶江翻西秦王乾歸以為建忠將軍散騎常侍散悉亶翻騎奇寄翻弘引兵棄張掖東走段業徙治張掖治直之翻將追擊弘沮渠蒙遜諫曰歸師勿遏窮寇勿追孫子之言業不從大敗而還還從宣翻賴蒙遜以免業城西安以其將臧莫孩為太守業置西安郡於張掖東境孩河開翻莫孩勇而無謀知進不知退此乃為之築冢非築城也為于偽翻冢知隴翻業不從莫孩尋為呂纂所破燕太原王奇楷之子蘭汗之外孫也汗亦不殺以為征南將軍得入見長樂王盛盛潛使奇逃出起兵奇起兵於建安衆至數千汗遣蘭堤討之盛謂汗曰善駒小兒未能辦此善駒奇小字也太尉素驕難信不宜委以大衆汗以堤為太尉故稱之罷堤兵蘇軾有言木必先蠹然後蟲生之人必先疑然後讒入之蘭汗凶逆兄弟自相嫌忌故慕容盛得間之以奮其智報君父之讎更工衡翻於是龍城自夏不雨至于秋七月汗日詣燕諸廟及寶神座頓首禱請委罪於蘭加難言弒寶者加難之罪且懼誅乙巳相與率所部襲仇尼慕軍敗之敗補邁翻汗大懼遣太子穆將兵討之將即亮翻穆謂汗曰慕容盛我之仇讎必與奇相表裏此乃腹心之疾不可養也宜先除之汗欲殺盛先引見察之盛知之密以告盛盛稱疾不出蘭之為異於雍姞雖曰婦人內夫家而外父母家若蘭者處夫妻父子之變得其一而失其一者也李旱衛雙劉忠張豪張真皆盛素所厚也而穆引以為腹心旱雙得出入至盛所潛與盛結謀丁未穆擊堤加難等破之庚戌饗將士汗穆皆醉盛夜如廁因踰垣入于東宮與旱等共殺穆時軍未解嚴皆聚在穆舍聞盛得出呼躍爭先攻汗斬之汗子魯公和陳公揚分屯令支白狼令音鈴又郎定翻支音祁盛遣旱真襲誅之堤加難亡匿捕得斬之於是內外帖然士女相慶宇文拔率壯士數百來赴宇文拔自遼西來也辛亥告于太廟令曰賴五祖之休五祖謂慕容涉歸廆皓俊垂凡五廟宗廟社稷幽而復顯不獨孤以眇眇之身免不同天之責禮記曰父之讎不與共戴天因大赦改元建平盛謙不敢稱尊號以長樂王攝行統制盛字道運寶之庶長子也樂音洛以東陽公根為尚書左僕射衛倫陽璆魯恭王滕章十二行本滕作騰乙十一行本同為尚書璆渠尤翻悅真為侍中陽哲為中書監張通為中領軍自餘文武各復舊位改諡寶曰惠閔皇帝廟號烈宗初太原王奇舉兵建安南北之人翕然從之南人謂自中原來者北人則鮮卑也奇擊滅之匹馬不返進屯乙連盛既誅汗命奇罷兵奇用丁零嚴生烏桓王龍之謀遂不受命甲寅勒兵三萬餘人進至橫溝去龍城十里盛出擊大破之執奇而還斬其黨與百餘人賜奇死桓王之嗣遂絶慕容恪封太原王諡曰桓楚莊王滅若敖氏而赦針尹克黃曰子文無後何以勸善以慕容恪之輔成燕業而可使之絶祀乎上時掌翻盛弗許魏王圭遷都平城始營宮室建宗廟立社稷宗廟歲五祭用分至及臘魏都平城置代尹及司州於平城杜佑曰後魏都平城今雲中郡治雲中縣是今馬邑郡北平城即今郡隋為雲內縣恆安鎮此所謂宗廟即代都之東廟也桓玄求為廣州會稽王道子忌玄會工外翻不欲使居荊州因其所欲以玄為督交廣二州軍事廣州刺史玄受命而不行豫州刺史庾楷以道子割其四郡使王愈督之上疏言江州內地江州治尋陽在江南故云內地晉以京口為北府歷陽為西府豫州治歷陽在江西故云北帶寇戎朝廷不許楷怒遣其子鴻説王恭曰尚之兄弟謂譙王尚之及弟休之也説輸芮翻下同復扶又翻下同過於國寶欲假朝威削弱方鎮朝直遙翻懲艾前事為禍不測艾倪祭翻今及其謀議未成宜早圖之恭以為然以告殷仲堪桓玄仲堪玄許之推恭為盟主刻期同趣京師趣七喻翻時內外疑阻津邏嚴急邏郎佐翻巡也津邏者凡江津之要皆置邏卒仲堪以斜絹為書內箭簳中簳古旱翻字林曰箭笴也合鏑漆之鏑箭鏃也恭發書絹文角戾不復能辨仲堪手書戾曲也乖也斜絹無邊幅經緯不相持故斜角乖曲且謂仲堪去年已違期不赴事見上卷乃先期舉兵先悉薦翻司馬劉牢之諫曰將軍國之元舅會稽王天子叔父也會稽王又當國秉政嚮為將軍戮其所愛王國寶王緒又送王廞書事見上卷為于偽翻頃所授任雖未允愜亦非大失割庾楷四郡以配王愈於將軍何損晉陽之甲豈可數興乎數所角翻恭不從上表請討王愈司馬尚之兄弟道子使人説楷曰昔我與卿恩如骨肉楷先黨於王國寶道子亦親之結帶之言可謂親矣此必太元二十一年庾楷赴難時事結新援忘王恭疇昔陵侮之恥乎王恭以元舅之親風神簡貴志氣方嚴視庾楷蔑如也故道子以為陵侮楷使恭得志必以卿為反覆之人安肯深相親信首身且不可保況富貴乎楷怒曰王恭昔赴山陵相王憂懼無計我知事急尋勒兵而至恭不敢發事見一百八卷孝武太元二十一年我亦俟命而動我事相王無相負者相王不能拒恭反殺國寶及緒自爾已來自爾以來猶今言自那時以來也又爾言如此也復扶又翻為于偽翻庾楷實不能以百口助人屠滅時楷已應恭檄正徵士馬信返朝廷憂懼內外戒嚴會稽世子元顯言於道子曰前不討王恭故有今日之難今若復從其欲難乃旦翻復扶又翻則太宰之禍至矣道子時為太宰悉以事委元顯日飲醇酒而已元顯聰警頗涉文義志氣果鋭以安危為己任附會之者謂元顯神武有明帝之風殷仲堪聞恭舉兵自以去歲後期乃勒兵趣發趣讀曰促仲勘素不習為將將息亮翻悉以軍事委南郡相楊佺期兄弟相息亮翻使佺期帥舟師五千為前鋒桓玄次之仲堪帥兵二萬相繼而下帥讀曰率佺期自以其先漢太尉震至父亮九世皆以才德著名矜其門地謂江左莫及有以比王珣者佺期猶恚恨而時流以其晚過江婚宦失類佺期曾祖準晉太常自震至準七世有名德祖林少有才望值亂沒胡父亮少仕偽朝後歸晉比王謝諸家為晚亮及佺期皆以武力為官又與傖荒為婚故云失類時流猶言時輩也恚於避翻從才用翻獷古猛翻獷獷不可附每排抑之佺期常慷慨切齒欲因事際以逞其志故亦贊成仲堪之謀八月佺期玄奄至湓口湓口湓浦口也晉人於此築城置戍今其地在江州德化縣西一里湓蒲奔翻惶遽奔臨川吳孫亮太平二年分豫章東部都尉立臨川郡隋唐為撫州燕以河間公熙為侍中車嚴車改驃騎大將軍中領軍司隸校尉城陽公元為衛將軍元寶之子也又以劉忠為左將軍張豪為後將軍並賜姓慕容氏李旱為中常侍輔國將軍衛雙為前將軍張順為鎮西將軍昌黎尹張真為右將軍燕都龍城以昌黎太守為昌黎尹乙亥燕步兵校尉馬勒章十二行本勒作勤乙十一行本同等謀反伏誅事連驃騎將軍高陽公崇崇弟東平公澄皆賜死驃匹妙翻騎奇寄翻寧朔將軍鄧啓方南陽太守閭丘羡將兵二萬擊南燕燕自慕容寶之敗北歸龍城慕容德稱號於滑臺故稱南燕以別之魏收志滎陽郡京縣有管城故管叔邑也杜預曰在京縣東北單騎走免魏王圭命有司正封畿宋白曰魏道武都平城東至上谷軍都關西至河南至中山隘門塞北至五原地方千里以為甸服平權衡審度量遣使循行郡國使疏吏翻行下孟翻舉奏守宰不法者親考察黜陟之九月辛卯加會稽王道子黃鉞以世子元顯為征討都督遣衛將軍王珣右將軍謝琰將兵討王恭譙王尚之將兵討庾楷乙未燕以東陽公根為尚書令張通為左僕射衛倫為右僕射慕容豪為幽州刺史鎮肥如己亥譙王尚之大破庾楷於牛渚楷單騎奔桓玄為後玄殺楷張本弟恢之為驃騎司馬丹楊尹允之為吳國內史休之為襄城太守元帝渡江以丹楊春穀縣置襄城郡乙巳桓玄大破官軍於白石白石在巢縣界水經注柵江水導源巢湖東左會清溪水謂之清溪口柵水又東左會白石山水水發白石山西徑李鵲城南西南注柵水尚之退走恢之所領水軍皆沒丙午道子屯中堂元顯守石頭己酉王珣守北郊謝琰屯宣陽門以備之宣陽門建康城南面西頭第一門王恭素以才地陵物既殺王國寶自謂威無不行仗劉牢之為爪牙而但以部曲將遇之將即亮翻牢之負其才深懷恥恨元顯知之遣廬江太守高素説牢之高素亦北府將故使説之説式芮翻下可説同許事成即以恭位號授之又以道子書遺牢之為陳禍福遺于季翻為于偽翻牢之謂其子敬宣曰王恭昔受先帝大恩今為帝舅不能翼戴王室數舉兵向京師數所角翻吾不能審恭之志事捷之日必能為天子相王之下乎相王謂道子也以順討逆何如敬宣曰朝廷雖無成康之美亦無幽厲之惡而恭恃其兵威暴蔑王室蔑之者視之若無也義非君臣雖共事少時意好不協少時言不多時也少詩紹翻好呼到翻於情義何有恭參軍何淡之知其謀以告恭淡徒覽翻恭以淡之素與牢之有隙不信乃置酒請牢之於衆中拜之為兄精兵堅甲悉以配之王恭素以部曲將遇牢之及聞何淡之言則拜之為兄此豈能得其死力邪適足以速其背己耳帥讀曰率牢之至竹里斬延以降降戶江翻遣敬宣及其壻東莞太守高雅之還襲恭東莞漢舊縣武帝泰始元年分琅邪立東莞郡南渡後又置南東莞郡於晉陵界莞音官敬宣縱騎橫擊之騎奇寄翻下同恭兵皆潰恭將入城雅之已閉城門恭單騎奔曲阿素不習馬髀中生瘡曲阿人殷確恭故吏也以船載恭將奔桓玄至長塘湖長塘湖在晉陵延陵縣杜佑曰在潤州金壇縣風土記陽羡縣有洮湖別名長塘湖洮余招翻單鍔曰長塘湖在義興西獲之送京師斬於倪塘倪塘在建康東北方山埭南倪氏築塘因以為名猶理須鬢神色自若須與鬚同我暗於信人所以至此自悔悉以軍事委劉牢之也監工銜翻豈不忠於社稷邪但令百世之下知有王恭耳並其子弟黨與皆死以劉牢之為都督兗青冀幽並徐揚州晉陵諸軍事以代恭俄而楊佺期桓玄至石頭殷仲堪至蕪湖元顯自竹里馳還京師遣丹楊尹王愷等發京邑士民數萬人據石頭以拒之佺期玄等上表理王恭求誅劉牢之牢之帥北府之衆馳赴京師軍于新亭帥讀曰率佺期玄見之失色回軍蔡洲蔡洲在今建康府上元縣西二十五里仲堪等擁衆數萬充斥郊畿內外憂逼言內憂而外逼也左衛將軍桓修沖之子也言於道子曰西軍可説而解也説輸芮翻修知其情矣殷桓之下專恃王恭恭既破滅西軍沮恐沮恐言氣沮而心恐也沮在呂翻啖徒覽翻餌也二人必內喜玄能制仲堪佺期可使倒戈取仲堪矣道子納之以玄為江州刺史召郗恢為尚書以佺期代恢為都督梁雍秦三州諸軍事雍州刺史以修為荊州刺史權領左衛文武之鎮左衛文武左衛將軍府之僚屬及部曲也之往也郗丑之翻雍於用翻黜仲堪為廣州刺史遣仲堪叔父太常茂宣詔敕仲堪回軍張驤子超收合三千餘家據南皮自號烏桓王抄掠諸郡張驤烏桓種也奉燕見一百五卷孝武帝太元九年歸魏見上卷元年驤思將翻抄楚交翻楊軌屯廉川收集夷夏衆至萬餘夏戶雅翻王乞基謂軌曰禿髮氏才高而兵盛且乞基之主也不如歸之軌乃遣使降於西平王烏孤降戶江翻軌尋為羌酋梁飢所敗酋慈由翻敗補邁翻西奔零海闞駰曰金城臨羌縣西有卑和羌海酈道元曰古西零之地也零音憐烏孤謂㣥臣曰楊軌王乞基歸誠於我卿等不速救使為羌人所覆孤甚愧之平西將軍渾屯曰渾古有是姓左傳鄭有渾罕衛有渾良夫吐谷渾氏後改為渾姓渾戶昆翻梁飢無經遠大略可一戰擒也飢進攻西平西平人田玄明執太守郭幸而代之以拒飢遣子為質於烏孤質音致烏孤欲救之㣥臣憚飢兵強多以為疑左司馬趙振曰楊軌新敗呂氏方強洪池以北未可冀也洪池嶺名在涼州姑臧之南唐涼州有洪池府庶幾可取嶺南謂洪池嶺南也五郡謂廣武西平樂都澆河湟河也幾居希翻振不敢言若欲經營四方此機不可失也使羌得西平華夷震動非我之利也烏孤喜曰吾亦欲乘時立功安能坐守窮谷乎廉川在塞外故謂之窮谷梁飢若得西平保據山河不可復制西平據湟河之要有大小榆谷之饒故云然復扶又翻下同驍堅堯翻軍令不整易破也易以豉翻遂進擊飢大破之飢退屯龍支堡唐鄯州有龍支縣劉昫曰龍支漢允吾縣地此時當為西平界拔之飢單騎奔澆河澆河吐谷渾之地呂光開以為郡隋唐之廓州即其地也澆堅堯翻水洄洑曰澆此郡蓋置於洮河洄曲處杜佑曰澆河城在廓州達化縣賀蘭山劉昫曰廓州隋澆河郡治廣威縣即後漢燒當羌之地前涼置湟河郡後魏置石城郡廢帝因縣內化隆谷置化隆縣後周置廓州唐天寶元年改為廣威縣管下有達化縣吐渾澆河城在縣西百二十里杜佑曰澆河城吐谷渾阿豺所築以田玄明為西平內史樂都太守田瑤樂都注已見二十六卷漢宣帝神爵元年五代志西平郡湟水縣後周置樂都郡觀此則呂氏已置郡矣杜佑曰湟水一名樂都水唐鄯州治樂音洛裯除留翻湟河郡蓋置於此地澆河太守王稚皆以郡降降戶江翻嶺南羌胡數萬落皆附於烏孤西秦王乾歸遣秦州牧益州武衛將軍慕兀慕兀晉書載記作慕容兀慕兀蓋亦乞伏氏載記誤也冠古玩翻瑥音溫冬十月癸酉燕㣥臣復上尊號復扶又翻上時掌翻丙子長樂王盛始即皇帝位樂音洛大赦尊皇后段氏曰皇太后太丁氏曰獻莊皇后初蘭汗之當國也盛從燕主寶出亡蘭奉事丁后愈謹及汗誅盛以當從坐欲殺之丁后以有保全之功固爭之得免然終不為后大赦殷仲堪得詔書大怒得黜廣州之詔書也趣讀曰促玄等喜於朝命朝直遙翻下同欲受之猶豫未決仲堪聞之遽自蕪湖南歸遣使告諭蔡洲軍士曰汝輩不各自散歸吾至江陵盡誅汝餘口使疏吏翻餘口謂蔡洲之軍所餘家口留在江陵者佺期部將劉系帥二千人先歸帥讀曰率玄等大懼狼狽西還還從宣翻又如字追仲堪至尋陽及之仲堪既失職倚玄等為援玄等亦資仲堪兵雖內相疑阻勢不得不合乃以子弟交質質音致壬午盟于尋陽俱不受朝命連名上疏申理王恭求誅劉牢之及譙王尚之並訴仲堪無罪獨被降黜被皮義翻朝廷深憚之內外騷然乃復罷桓修復扶又翻以荊州還仲堪優詔慰諭以求和解仲堪等乃受詔御史中丞江績劾奏桓修專為身計疑誤朝廷謂分江雍以授桓玄楊佺期自取荊州也劾戶概翻又戶得翻初桓玄在荊州所為豪縱仲堪親黨皆勸仲堪殺之仲堪不聽及在尋陽資其聲地聲謂威聲地謂門地玄愈自矜倨楊佺期為人驕悍悍侯旰翻又下罕翻玄每以寒士裁之佺期甚恨密説仲堪以玄終為患請於壇所襲之説輸芮翻仲堪忌佺期兄弟勇健恐既殺玄不可復制復扶又翻苦禁之於是各還所鎮玄亦知佺期之謀陰有取佺期之志為後玄殺殷楊張本引始安太守濟陰卞範之為長史以為謀主吳孫晧甘露元年分零陵南部都尉立始安郡屬廣州晉成帝度屬荊州隋唐為桂州之地夏戶雅翻濟子禮翻詔書獨不赦庾楷玄以楷為武昌太守初郗恢為朝廷拒西軍為于偽翻玄未得江州欲奪恢雍州雍於用翻以恢為廣州恢聞之懼詢於衆衆皆曰楊佺期來者誰不戮力若桓玄來恐難與為敵桓氏世居西楚故衆畏之乃與閭丘羡謀阻兵拒之閭丘羡時為南陽太守雍之部屬也聲言玄來入沔沔彌兗翻以佺期為前驅恢衆信之望風皆潰恢請降降戶江翻佺期入府斬閭丘羡放恢還都至楊口殷仲堪陰使人殺之及其四子託言㣥蠻所殺西秦乞伏益州與吐谷渾王視羆戰於度周川度周川在臨洮塞外龍涸之西吐從暾入聲谷音浴走保白蘭山遣子宕豈為質於西秦以請和宕徒浪翻質音致西秦王乾歸以宗女妻之妻子細翻涼建武將軍李鸞以興城降於禿髮烏孤興城在允吾縣西南龍支堡之東十一月以琅邪王德文為衛將軍開府儀同三司征虜將軍元顯為中領軍領軍將軍王雅為尚書左僕射辛亥魏王圭命尚書吏部郎鄧淵立官制協音律儀曹郎清河董謐制禮儀三公郎王德定律令吏部儀曹三公郎皆曹魏所置鼂直遙翻吏部尚書崔宏總而裁之以為永式淵羌之孫也鄧羌苻秦之名將楊軌王乞基帥戶數千自歸於西平王烏孤帥讀曰率下同十二月己丑魏王圭即皇帝位大赦改元天興命朝野皆束髮加帽朝直遙翻下同説文曰帽小兒蠻夷蒙頭衣晉書輿服志曰帽猶冠也義取於蒙覆其首其本纚也古者冠無幘冠下有纚以繒為之後世施幘於冠因復裁纚為帽自乘輿宴居下至庶人無爵者皆服之江左時野人已著帽人士亦往往而然但其頂圓耳後乃高其屋云纚所爾翻追尊遠祖毛以下二十七人皆為皇帝魏諡毛為成皇帝五世至推寅南遷大澤方千餘里諡宣皇帝七世至鄰始南出居胸奴故地諡獻皇帝獻帝之子曰詰汾諡聖武皇帝廟號始祖祖什翼犍曰昭成皇帝廟號高祖父實曰獻明皇帝諡力微曰神元皇帝子沙漠汗曰文皇帝沙漠汗之子弗政曰思皇帝弗政卒力微之子祿官立諡曰昭皇帝分國為三部猗色猗盧沙漠汗之二子與祿官分統三部猗色西略服屬諸國諡曰桓皇帝猗盧目祿官之卒合三部為一又助晉國以益強諡穆皇帝猗盧死祿官之子鬱律繼之諡平文皇帝鬱律弒猗色之子賀傉立諡惠皇帝賀傉卒弟紇那立諡煬皇帝翳魏者鬱律之子國人逐紇那而立之諡烈皇帝孟夏祀天及東廟宗廟在東蓋亦左祖之義孟秋祀天於西郊至是始依倣古制定郊廟朝饗禮樂然惟孟夏祀天親行杜佑曰魏道武天賜二年祀天于西郊為方壇東為二陛土陛無等周垣四門各依方色為名置木主七於壇上牲用白犢黃駒白羊各一祭之日帝御大駕至郊所立青門內近南西面內朝臣皆位於壇北外朝臣及大人方客咸位於青門外后率六宮自黑門入列於青門內近北並西面廩犧令掌牲陳於壇前女巫執鼓立於壇東西面帝七族子弟七子執酒在巫南西面北上女巫升壇搖鼓帝拜后肅拜內外百官拜祀訖乃殺牲七執酒七人西向以酒灑天神主復拜如此者三禮畢而退自是歲一祭又用崔宏議自謂黃帝之後魏收曰魏之先出自黃帝黃帝子曰昌意昌意之子受封北國有大鮮卑山因以為號其後世為君長統幽都之北廣漠之野黃帝以土德王北俗謂土為托謂后為跋故以托跋為氏徙六州二十二郡守宰豪傑二千家于代都東至代郡魏都平城以平城為代都依漢建國之名也漢平城縣本屬鴈門郡而代郡治桑乾後漢徙高柳晉徙平舒魏收地形志之上谷郡晉之代郡也唐為蔚州之地魏之代都唐為雲州雲中縣之地南極陰館善無縣漢屬鴈門郡後漢屬定襄郡元魏天平二年置善無郡班志陰館縣屬鴈門郡本樓煩鄉景帝後三年置陰館縣有纍頭山治水所出五代史志代州鴈門縣有纍頭山則漢之陰館縣已併入鴈門縣矣皆為畿內其外四方四維置八部師張師作帥以監之魏書作八部帥八部帥勸課農耕量校收入以為殿最監工銜翻己亥燕幽州刺史慕容豪尚書左僕射張通昌黎尹張順坐謀反誅初琅邪人孫泰學妖術於錢唐杜子恭妖於驕翻士民多奉之王珣惡之惡烏路翻流泰於廣州王雅薦泰於孝武帝云知養性之方召還纍官至新安太守泰知晉祚將終因王恭之亂以討恭為名收合兵衆聚貨巨億億億為巨億識者皆憂其為亂以中領軍元顯與之善無敢言者會稽內史謝輶發其謀輶夷周翻又音酉己酉會稽王道子使元顯誘而斬之會工外翻誘音酉並其六子兄子恩逃入海愚民猶以泰蟬蛻不死蟬解殼曰蛻神仙家有尸解之説言尸解登仙如蟬之蛻殼也蛻輸芮翻又吐外翻恩乃聚合亡命得百餘人以謀復讎為後孫恩反張本西平王禿髮烏孤更稱武威王更工衡翻是歲楊盛遣使附魏魏以盛為仇池王使疏吏翻王崇武標點容肇祖聶崇岐覆校
