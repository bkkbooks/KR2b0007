body:
  text: 資治通鑑卷第一百三十四端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注宋紀十六沈攸之遣中兵參軍孫同等五將以三萬人為前驅蒼梧王下元徽四年丙辰四七六沈攸之遣中兵參軍孫同等五將以三萬人為前驅春正月己亥帝耕籍田大赦沈攸之遣中兵參軍孫同等五將以三萬人為前驅二月魏司空東郡王陸定國坐恃恩不法免官爵為兵沈攸之遣中兵參軍孫同等五將以三萬人為前驅魏馮太后內行不正行下孟翻以李奕之死怨顯祖事見一百三十二卷明帝泰始之六年夏六月辛未顯祖殂年二十三考異曰元行沖後魏國典云太后伏壯士於禁中太上入謁遂崩按事若如此安得不彰而中外恬然不以為怪又孝文終不之知按後魏書及北史皆無殺事而天象志云顯文暴崩蓋實有鴆毒之禍今從之壬申大赦改元承明葬顯祖于金陵金陵在雲中沈攸之遣中兵參軍孫同等五將以三萬人為前驅魏大司馬大將軍代人萬安國坐矯詔殺神部長奚買奴賜死神部八部之一也長知兩翻沈攸之遣中兵參軍孫同等五將以三萬人為前驅戊寅魏以征西大將軍安樂王長樂為太尉樂音洛尚書左僕射宜都王目辰為司徒南部尚書李欣為司空欣許斤翻尊皇太后曰太皇太后復臨朝稱制魏高宗之殂顯祖方年十二馮太后臨朝稱制時宋太宗泰始二年也至次年太后歸政今既鴆顯祖而高祖尚幼故復臨朝復扶又翻朝直遙翻熙自以外戚固辭內任乃除都督洛州刺史魏太宗取洛陽以晉司州為洛州顯祖神主祔太廟有司奏廟中執事之官請依故事皆賜爵祕書令廣平程駿上言建侯裂地帝王所重或以親賢或因功伐以勞定國曰功積功曰伐皇家故事蓋一時之恩豈可為長世之法乎太后善而從之謂㣥臣曰凡議事當依古典正言豈得但修修當作循而章甲十一行本而下有已字乙十一行本同孔本同熊校同張校同云事下脫而已二字賜駿衣一襲帛二百匹太后性聰察知書計曉政事被服儉素被皮義翻膳羞減於故事什七八而猜忍多權數高祖性至孝能承顏順志事無大小皆仰成於太后經典釋文仰如字又五亮翻太后往往專決不復關白於帝復扶又翻所幸宦者高平王琚安定張祐嶷康曰姓也出自夏后氏之後嶷魚力翻皆依勢用事祐官至尚書左僕射爵新平王琚官至征南將軍爵高平王嶷等官亦至侍中吏部尚書刺史爵為公侯賞賜巨萬賜鐵券許以不死康曰說文券契也釋名曰券綣也相約束繾綣為券也太卜令姑臧王睿得幸於太后超遷至侍中吏部尚書爵太原公祕書令李沖雖以才進亦由私寵賞賜皆不可勝紀太和末年高菩薩之禍后啓之也后雖獲終其世禍及門戶矣勝音升皆極其優厚每褒賞睿等輒以丕等參之以示不私丕烈帝之玄孫拓跋翳槐諡烈帝寶之子也魏世祖太平真君五年李寶入朝其子沖遂貴顯於魏太后自以失行畏人議己㣥下語言小涉疑忌輒殺之然所寵幸左右苟有小過必加笞箠或至百餘箠止蕊翻而無宿憾尋復待之如初或因此更富貴故左右雖被罰終無離心此史之所謂權數也吁行下孟翻復扶又翻被皮義翻沈攸之遣中兵參軍孫同等五將以三萬人為前驅乙亥加蕭道成尚書左僕射劉秉中書令沈攸之遣中兵參軍孫同等五將以三萬人為前驅楊運長阮佃夫等忌建平王景素益甚通鑑書禍始於上卷上年佃音田濔莫比翻中兵參軍略陽垣慶延參軍沈顒左暄等謀為自全之計顒魚容翻遣人往來建康要結才力之士要讀曰邀冠軍將軍黃回游擊將軍高道慶輔國將軍曹欣之前軍將軍韓道清長水校尉郭蘭之羽林監垣祗祖漢東都之制羽林左右監主羽林騎屬光祿勳至晉以羽林屬二衛而監不見於志當是江左復置冠古玩翻校戶教翻武人不得志者無不歸之時帝好獨出遊走郊野欣之謀據石頭城伺帝出作亂道清蘭之欲說蕭道成因帝夜出執帝迎景素道成不從者即圖之景素每禁使緩之楊阮微聞其事遣傖人周天賜僞投景素好呼到翻說輸芮翻下譬說同伺相吏翻傖助庚翻江東人謂楚人別種為傖亦謂西北人為傖勸令舉兵景素知之斬天賜首送臺秋七月祗祖率數百人自建康奔京口云京師已潰亂勸令速入景素信之戊子據京口起兵士民赴之者以千數楊阮聞祗祖叛走即命纂嚴己丑遣驍騎將軍任農夫領軍將軍黃回左軍將軍蘭陵李安民將步軍右軍將軍張保將水軍以討之驍堅堯翻騎奇寄翻任音壬民將保將即亮翻辛卯又命南豫州刺史段佛榮為都統都統之名始此故使安民佛榮與之偕行道成知黃回不附己既使之討景素又使之討沈攸之二難既平然後殺之則足以知回於當時有幹略而道成智數又一時所不及者道逢京口兵勿得戰道成屯玄武湖冠軍將軍蕭賾鎮東府冠古玩翻賾士革翻始安王伯融都鄉侯伯猷皆建安王休仁之子也楊阮忌其年長悉稱詔賜死景素欲斷竹里以拒臺軍長知兩翻斷丁管翻下斷峽同垣慶延垣祗祖沈顒皆曰今天時旱熱臺軍遠來疲困引之使至以逸待勞可一戰而克殷濔等固爭不能得農夫等既至縱火燒市邑慶延等各相顧望莫有鬬志景素本乏威略恇擾不知所為恇去王翻黃回迫於段佛榮且見京口軍弱遂不發張保泊西渚西渚在京口城西今西津渡口是也自相要結要一遙翻進擊水軍甲午張保敗死而諸將不相應赴復為臺軍所破復扶又翻臺軍既薄城下顒先帥衆走帥讀曰率祗祖次之其餘諸軍相繼奔退獨左暄與臺軍力戰於萬歲樓下而所配兵力甚弱不能敵而散乙未拔京口黃回軍先入自以有誓不殺諸王乃以景素讓殿中將軍張倪奴倪奴擒景素斬之並其三子同黨垣祗祖等數十人皆伏誅蕭道成釋黃回高道慶不問撫之如舊撫之所以安反側事定之後決不能容之解嚴丙申大赦初巴東建平蠻反沈攸之遣軍討之及景素反攸之急追峽中軍以赴建康巴東太守劉攘兵建平太守劉道欣疑攸之有異謀勒兵斷峽不聽軍下攘兵子天賜為荊州西曹西曹者漢晉公府之西曹椽攘兵知景素實反乃釋甲謝愆攸之待之如故劉道欣堅守建平攘兵譬說不回乃與伐蠻軍攻斬之沈攸之用劉攘兵卒為攘兵所禍蕭道成用黃回而權以濟事非用人之難用勢之難也說輸芮翻沈攸之遣中兵參軍孫同等五將以三萬人為前驅甲辰魏主追尊其母李貴人曰思皇后李氏李惠之女高祖之母也為後李惠貴張本沈攸之遣中兵參軍孫同等五將以三萬人為前驅八月丁卯立皇弟翽為南陽王翽呼會翻嵩為新興王禧為始建王沈攸之遣中兵參軍孫同等五將以三萬人為前驅庚午以給事黃門侍郎阮佃夫為南豫州刺史留鎮京師沈攸之遣中兵參軍孫同等五將以三萬人為前驅九月戊子賜驍騎將軍高道慶死驍堅堯翻騎奇寄翻沈攸之遣中兵參軍孫同等五將以三萬人為前驅冬十月辛酉以吏部尚書王僧虔為尚書左章甲十一行本左作右乙十一行本同孔本同僕射沈攸之遣中兵參軍孫同等五將以三萬人為前驅十一月戊子魏以太尉安樂王長樂為定州刺史司空李欣為徐州刺史樂音洛欣許斤翻順皇帝諱準字仲謨明帝第三子也小字知觀實桂陽王休範之子諡法慈和遍服曰順蕭氏所以諡之曰順者以其順天命人心而禪代也升明元年丁巳四七七是年七月帝即位始改元升明沈攸之遣中兵參軍孫同等五將以三萬人為前驅春正月乙酉朔魏改元太和沈攸之遣中兵參軍孫同等五將以三萬人為前驅己酉略陽民王元壽聚衆五千餘家自稱衝天王二月辛未魏秦益二州刺史尉洛侯擊破之秦益二州此魏所謂南秦東益也尉紆勿翻沈攸之遣中兵參軍孫同等五將以三萬人為前驅三月庚子魏以東陽王丕為司徒沈攸之遣中兵參軍孫同等五將以三萬人為前驅夏四月丁卯魏主如白登壬申如崞山崞音郭初蒼梧王在東宮好緣漆帳竿好呼到翻去地丈餘喜怒乖節主帥不能禁主帥謂東宮齊內主帥也帥所類翻陳氏蒼梧王之母也即位尊為太捶止蕊翻內畏太后太外憚諸大臣未敢縱逸自加元服內外稍無以制數出遊行數所角翻始出宮猶整儀衛俄而廾車騎帥左右數人或出郊野或入市廛騎奇寄翻下同帥讀曰率太每乘青犢車青犢車青蓋犢車也晉制諸王青蓋車時有司奏皇太輿服一同晉孝武李太故事既而輕騎遠走一二十里太不復能追復扶又翻下已復同儀衛亦懼禍不敢追尋唯整部伍別在一處瞻望而已初太宗嘗以陳太賜嬖人李道兒已復迎還生帝已既也既而復迎之還也嬖卑義翻又博計翻自稱劉統劉統自言統天下也猶苻堅稱苻詔桓玄稱桓詔李將軍常著小袴衫營署巷陌無不貫穿著陟略翻穿如字又樞絹翻或夜宿客舍或晝臥道傍排突廝養廝息移翻養餘亮翻韋昭曰析薪為廝炊烹為養又廝給養馬者與之交易或遭慢辱悅而受之凡諸鄙事裁衣作帽過目則能未嘗吹箎箎音池以竹為之長八尺四寸圍三寸周禮賈疏云箎八孔執管便韻韻諧也和也驕恣尤甚無日不出夕去晨返晨出暮歸從者並執鋋矛從才用翻鋋音蟬又以前翻小矛也行人男女及犬馬牛驢逢無免者民間擾懼商販皆息門戶晝閉行人殆絶針椎鑿鋸不離左右針與鉗同其淹翻離力智翻小有忤意即加屠剖忤五故翻一日不殺則慘然不樂殿省憂惶食息不保阮佃夫與直閣將軍申伯宗等謀因帝出江乘射雉稱太后令喚隊仗還樂音洛射而亦翻隊有隊主副仗有仗主副閉城門遣人執帝廢之立安成王準事覺甲戌帝收佃夫等殺之太后數訓戒帝數所角翻帝不悅會端午太后賜帝毛扇毛扇蓋羽扇也考異曰宋略作太賜今從宋書令太醫煮藥欲鴆太后左右止之曰若行此事官便應作孝子豈復得出入狡獪復扶又翻下無復誰復同狡古巧翻獪古外翻江南人謂小兒戲為狡獪帝曰汝語大有理乃止六月甲戌有告散騎常侍杜幼文司徒左長史沈勃游擊將軍孫超之與阮佃夫同謀者帝登帥衛士自掩三家悉誅之登登時也登時猶言即時也散悉亶翻騎奇寄翻帥讀曰率考異曰南史曰孝武二十八子太宗殺其十六餘皆帝殺之按宋書孝武諸子十人早卒二人為景和所殺餘皆太宗殺之無及蒼梧時者南史誤也嬰孩不免沈勃時居喪在廬廬倚廬也禮居喪者居倚廬寢苫枕塊孟康注曰倚廬倚牆至地而為之無楣柱孔穎達曰居倚廬者謂於中門之外東牆下倚木為廬又說曰凡非適子自未葬以於隱者為廬鄭注曰不欲人屬目蓋於東南角帝揮刀獨前勃知不免手搏帝耳唾罵之曰唾湯臥翻汝罪踰桀紂屠戮無日遂死是日大赦帝嘗直入領軍府時盛熱蕭道成晝臥裸袒裸郎果翻帝立道成於室內畫腹為的畫讀與一畫同自引滿將射之射而亦翻下無復射箭射同道成斂版曰老臣無罪左右王天恩曰領軍腹大是佳射堋堋補隥翻射堋今言射垜也後無復射不如以骲箭射之帝乃更以骲箭射正中其齊更工衡翻骲蒲交翻又蒲剝翻集韻云骨鏃也余謂骨鏃亦能害人況以之射人腹乎蓋當時所謂骲箭者必非骨鏃中竹仲翻齊與臍同投弓大笑曰此手何如帝忌道成威名嘗自磨鋋曰明日殺蕭道成陳太罵之曰蕭道成有功於國若害之誰復為汝盡力邪為于僞翻帝乃止道成憂懼密與袁粲褚淵謀廢立粲曰主上幼年微過易改易以豉翻伊霍之事非季世所行縱使功成亦終無全地淵默然淵於此時已心歸道成矣今朝廷猖狂人不自保天下之望不在袁褚明公豈得坐受夷滅存亡之機仰希熟慮道成然之道成時為中領軍以僧真為功曹希望也或勸道成奔廣陵起兵道成世子賾時為晉熙王長史行郢州事欲使賾將郢州兵東下會京口將即亮翻道成密遣所親劉僧副告其從兄行青冀二州刺史劉善明曰從才用翻人多見勸北固廣陵恐未為長算今秋風行起卿若能與垣東海微共動虜則我諸計可立亦告東海太守垣榮祖善明曰宋氏將亡愚智共知北虜若動反為公患公神武高世唯當靜以待之因機奮發功業自定不可遠去根本自貽猖蹶榮祖亦曰領府去臺百步領府謂領軍府也人豈不知若單騎輕行騎奇寄翻廣陵人閉門不受公欲何之公今動足下牀恐即有叩臺門者言將有告之者紀僧真曰主上雖無道國家纍世之基猶為安固公百口北度必不得俱縱得廣陵城天子居深宮施號令目公為逆何以避之此非萬全策也道成族弟鎮軍長史順之順之蕭衍之父也考異曰齊高帝紀姚思廉梁書武帝紀自相國何至皇考一十餘世皆有名及官位蓋史官附會今所不取驃匹妙翻騎奇寄翻嶷魚力翻皆以為帝好單行道路於此立計易以成功外州起兵鮮有克捷好呼到翻易以豉翻鮮息淺翻鮮少也徒先人受禍耳先悉薦翻道成乃止東中郎司馬行會稽郡事李安民欲奉江夏王躋起兵於東方明帝泰始七年以皇子躋繼江夏王義恭時蓋為東中郎將以安民為司馬行郡事也會工外翻夏戶雅翻躋箋西翻越騎校尉王敬則潛自結於道成夜著青衣扶匐道路著則略翻扶讀曰蒲說文曰手行也匐蒲北翻為道成聽察帝之往來道成命敬則陰結帝左右楊玉夫楊萬年陳奉伯等一張一作二十五人於殿中詗伺機便為于僞翻詗喧正翻又古迥翻伺候也伺相吏翻秋七月丁亥夜帝微行至領軍府門左右曰一府皆眠何不緣牆入帝曰我今夕欲於一處作適適意作戲謂之作適員外郎桓康等於道成門間聽聞之此員外郎蓋員外散騎郎也戊子帝乘露車與左右於臺岡賭跳臺岡意即臺城之來岡也賭跳者賭跳躑以高者為勝也跳音他弔翻考異曰南史作蠻岡今從宋書尼女夷翻晚至新安寺孝武寵姬殷貴死為之立寺貴子子鸞封新安王故以新安為寺名就曇度道人煮之曇徒含翻飲酒醉還仁壽殿寢楊玉夫常得帝意至是忽憎之見輒切齒曰明日當殺小子取肝肺是夜令玉夫伺織女渡河續齊諧記曰桂陽成武丁有仙道謂其弟曰七月七日織女當渡河弟問曰織女何事渡河答曰織女暫詣牽牛人至今云織女嫁牽牛也崔實四民月令曰或云見天漢中奕奕有正白氣光耀五色以此為徵應見當報我不見將殺汝時帝出入無常省內諸閣夜皆不閉廂下畏相逢值無敢出者宿衛並逃避內外莫相禁攝是夕王敬則出外玉夫伺帝熟寢與楊萬年取帝防身刀刎之御左右防身刀即所謂千牛刀也刎扶粉翻伎渠綺翻陳奉伯袖其首依常行法稱敕開承明門出以首與敬則敬則馳詣領軍府叩門大呼呼火故翻蕭道成慮蒼梧王誑之不敢開門誑居況翻敬則於牆上投其首道成洗視乃戎服乘馬而出敬則桓康等皆從入宮至承明門詐為行還敬則恐內人覘見以刀環塞窐孔覘丑廉翻又丑豔翻塞悉則翻窐孔即古之所謂圭竇也窐古攜翻又音攜呼門甚急門開而入他夕蒼梧王每開門門者震懾不敢仰視至是弗之疑懾之涉翻考異曰齊高帝紀云衛尉丞顏靈寶窺見太祖乘馬在外竊謂親人曰今若不開內領軍入天下會是亂耳按靈寶若語所親則須有知者豈得宿衛晏然不動今從宋後廢帝紀道成入殿殿中驚怖怖普布翻既而聞蒼梧王死咸稱萬歲己丑旦道成戎服出殿庭槐樹下以太后令召袁粲褚淵劉秉入會議道成謂秉曰此使君家事何以斷之使疏吏翻斷丁亂翻秉未答道成須髯盡張目光如電秉曰尚書衆事可以見付軍旅處分須與鬚同處昌呂翻分扶問翻道成次讓袁粲粲亦不敢當王敬則拔白刃在牀側跳躍曰天下事皆應關蕭公敢有開一言者血染敬則刀仍手取白紗帽加道成首五代志帽自天子下及士人通冠之以白紗者名高頂帽皇太子在上省則烏紗在永福則白紗蓋貴白紗也杜佑曰宋制黑帽綴紫褾褾以繒為之長四寸廣一寸後制高屋白紗帽曰今日誰敢復動事須及熱道成正色呵之曰卿都自不解復扶又翻呵虎何翻解戶買翻曉也粲欲有言敬則叱之乃止褚淵曰非蕭公無以了此手取事授道成褚淵手取其事以授道成自此天下之事一歸之矣相與不肯我安得辭乃下議備法駕詣東城迎立安成王東城即東府城也各失色而去觀史所書會議之際道成目光如電須髯盡張王敬則拔白刃跳躍繼又以長刀遮粲秉等事勢可知矣粲秉於此時聲其弒君之罪以身死之猶不愧於仇牧何待至石頭邪於路逢從弟韞從才用翻韞開車迎問曰今日之事當歸兄邪秉曰吾等已讓領軍矣韞拊膺曰兄肉中詎有血邪今年族矣宋事去矣自中人以下皆知之是日以太后令數蒼梧王罪惡數所具翻曰吾密令蕭領軍潛運明略安成王準宜臨萬國追封昱為蒼梧王儀衛至東府門安成王令門者勿開以待袁司徒粲至王乃入居朝堂史言袁粲為一時倚重朝直遙翻壬辰王即皇帝位時年十一改元大赦改元升明南郊壇在臺城南巳地世祖大明三年移南郊壇於牛頭山以正陽位沈攸之遣中兵參軍孫同等五將以三萬人為前驅魏京兆康王子推卒沈攸之遣中兵參軍孫同等五將以三萬人為前驅甲午蕭道成出鎮東府丙申以道成為司空録尚書事驃騎大將軍驃匹妙翻騎奇寄翻袁粲遷中書監褚淵加開府儀同三司劉秉遷尚書令加中領軍以晉熙王燮為揚州刺史劉秉始謂尚書萬機本以宗室居之則天下無變既而蕭道成兼總軍國布置心膂與奪自專褚淵素相憑附秉與袁粲閣手仰成矣閣手者高拱充位而無所為兩手若有所閣也仰牛向翻辛丑以尚書右僕射王僧虔為僕射丙午以武陵王贊為郢州刺史蕭道成改領南徐州刺史沈攸之遣中兵參軍孫同等五將以三萬人為前驅八月壬子魏大赦沈攸之遣中兵參軍孫同等五將以三萬人為前驅癸亥詔袁粲鎮石頭粲性沖靜每有朝命常固辭朝直遙翻逼切不得已乃就職至是知蕭道成有不臣之志陰欲圖之即時順命為袁粲以石頭死節張本沈攸之遣中兵參軍孫同等五將以三萬人為前驅初太宗使陳昭華母養順帝戊辰尊昭華為皇太魏明帝置昭華晉武帝制淑淑媛淑儀修華修容修儀婕妤充華容華為九嬪而昭華之號不復見至宋孝武制以昭儀昭容昭華代修華修儀修容也沈攸之遣中兵參軍孫同等五將以三萬人為前驅丙子魏詔曰工商皂隸各有厥分分扶問翻而有司縱濫或染流俗自今戶內有工役者唯止本部丞流俗北史作清流此蓋以當時授官不分流品故詔凡工役之戶官止本部丞不從此制沈攸之遣中兵參軍孫同等五將以三萬人為前驅蕭道成固讓司空庚辰以為驃騎大將軍開府儀同三司沈攸之遣中兵參軍孫同等五將以三萬人為前驅九月乙酉魏更定律令更工衡翻沈攸之遣中兵參軍孫同等五將以三萬人為前驅戊申封楊玉夫等二十五人為侯伯子男沈攸之遣中兵參軍孫同等五將以三萬人為前驅冬十月氐帥楊文度遣其弟文弘襲魏仇池陷之帥所類翻考異曰魏書本紀作楊黽氐傳作鼠皆避顯祖諱也沈攸之遣中兵參軍孫同等五將以三萬人為前驅初魏徐州刺史李欣事顯祖為倉部尚書晉武帝始置倉部郎屬度支尚書倉部尚書後魏所置也即前太倉尚書欣許斤翻欣弟左將軍瑛諫曰考異曰魏典檦作標瑛作璞今從魏書余按檦與標同卑遙翻瑛音英檦能降人以色假人以財輕德義而重勢利聽其言也甘察其行也賊不早絶之後悔無及欣不從腹心之事皆以語檦行下孟翻語牛倨翻尚書趙黑與欣皆有寵於顯祖對掌選部選須絹翻欣以其私用人為方州古者八州八伯謂之方伯後世遂以州刺史為方州由是有隙頃之欣發黑前為監藏監古銜翻藏徂浪翻盜用官物黑坐黜為門士黑恨之寢食為之衰少踰年復入為侍中尚書左僕射領選為于僞翻復扶又翻下我復黑復同及顯祖殂黑白馮太后稱欣專恣出為徐州范檦知太后怨欣以其告李敷也事見一百三十二卷明帝泰始六年欣為太倉尚書亦在是年也太后徵欣至平城問狀欣對無之太后引檦使證之欣謂檦曰汝今誣我我復何言然汝受我恩如此之厚乃忍為爾乎檦曰檦受公恩何如公受李敷恩公忍為之於敷檦何為不忍於公欣慨然嘆曰吾不用瑛言悔之何及趙黑復於中構成其罪丙子誅欣及其子令和令度黑然後寢食如故沈攸之遣中兵參軍孫同等五將以三萬人為前驅十一月癸未魏征西將軍皮歡喜等三將軍率衆四萬擊楊文弘沈攸之遣中兵參軍孫同等五將以三萬人為前驅丁亥魏懷州民伊祁苟自稱堯後堯伊祁氏故云然重山即河內重門之山在共縣北重直龍翻馮太后欲盡誅闔城之民雍州刺史張白澤諫曰凶渠逆黨盡已梟夷魏雍州統京兆扶風馮翊咸陽北地平秦武都等郡凶渠謂渠魁也孔安國曰渠大也雍於用翻梟堅堯翻奈何不問白黑一切誅之乃止沈攸之遣中兵參軍孫同等五將以三萬人為前驅十二月魏皮歡喜軍至建安水經注楊定自隴右徙治歷城去仇池百二十里歷城後改為建安城考異曰是年魏置閏在十一月宋之十二月也沈攸之遣中兵參軍孫同等五將以三萬人為前驅初沈攸之與蕭道成於大明景和之間同直殿省深相親善道成女為攸之子中書侍郎文和婦攸之在荊州直閣將軍高道慶家在華容華容縣自漢以來屬南郡按九域志今江陵府石首縣建寧鎮即其地宋白曰江陵府監利縣本漢華容縣地過江陵假居訝翻休假也過工禾翻與攸之爭戲槊槊色角翻馳還建康言攸之反狀已成請以三千人襲之執政皆以為不可道成仍保證其不然楊運長等惡攸之惡烏路翻密與道慶謀遣刺客殺攸之不克會蒼梧王遇弒主簿宗儼之功曹臧寅勸攸之因此起兵攸之以其長子元琰在建康為司徒左長史故未發長知兩翻寅凝之之子也臧凝之見一百二十七卷宋文帝元嘉三十年時楊運長等已不在內已出為外官不在省內也攸之以道成名位素出己下一旦專制朝權心不平斫則略翻朝直遙翻謂元琰曰吾寧為王淩死不為賈充生王淩賈充事並見魏紀乃上表稱慶因留元琰雍州刺史張敬兒素與攸之司馬劉攘兵善雍於用翻疑攸之將起事密以問攘兵攘兵無所言寄敬兒馬鐙一隻鐙都鄧翻敬兒乃為之備攸之有素書十數行行戶剛翻常韜在裲襠角博雅曰裲襠謂之百腹裲里養翻襠都郎翻攸之將舉兵其妾崔氏諫曰官年已老那不為百口計宋齊之間義從私屬以至婢僕率呼其主為官且稱太后使至賜攸之使疏吏翻下同燭割之得太后手令云社稷之事一以委公於是勒兵移檄遣使邀張敬兒及豫州刺史劉懷珍梁州刺史梓潼范柏年司州刺史姚道和湘州行事庾佩玉南陽王翽未至故庾佩玉行府州事敬兒懷珍文和並斬其使馳表以聞文和尋棄州奔夏口巴陵非州也州當作郡夏戶雅翻道和後秦高祖之孫也後秦主姚興廟號高祖辛酉攸之遣輔國將軍孫同等相繼東下攸之遺道成書遺于季翻以為少帝昏狂少詩照翻宜與諸公密議共白太后下令廢之奈何交結左右親行弒逆乃至不殯流蟲在戶凡在臣下誰不惋駭又移易朝舊朝舊謂朝廷舊臣也惋烏貫翻朝直遙翻下同宮閣管籥悉關家人吾不知子孟孔明遺訓固如此乎霍光字子孟諸葛亮字孔明吾寧敢捐包胥之節邪申包胥乞秦師以存楚事見左傳忷懼忷許拱翻丁卯道成入守朝堂命侍中蕭嶷代鎮東府嶷魚力翻撫軍行參軍蕭映鎮京口映嶷之弟也戊辰內外纂嚴己巳以郢州刺史武陵王贊為荊州刺史庚午以右衛將軍黃回為郢州刺史督前鋒諸軍以討攸之初道成以世子賾為晉熙王燮長史行郢州事修治器械以備攸之道成平桂陽之難進爵縣公以賾為世子賾士革翻治直之翻以賾為左衛將軍與燮俱下劉懷珍言於道成曰夏口衝要宜得其人道成與賾書曰汝既入朝當須文武兼資與汝意合者委以後事賾乃薦燮司馬柳世隆自代道成以世隆為武陵王贊長史行郢州事賾將行謂世隆曰攸之一旦為變焚夏口舟艦夏戶雅翻艦戶黯翻沿流而東不可制也若得攸之留攻郢城必未能猝拔君為其內我為其外破之必矣及攸之起兵賾行至尋陽未得朝廷處分處昌呂翻分扶問翻衆欲倍道趨建康趨七喻翻賾曰尋陽地居中流密邇畿甸若留屯湓口內藩朝廷外援夏首夏首即夏口控制西南今日會此天所置也或以為湓口城小難固左中郎將周山圖曰今據中流為四方勢援不可以小事難之苟衆心齊一江山皆城隍也庚午賾奉燮鎮湓口賾悉以事委山圖山圖斷取行旅船板以造樓櫓立水柵斷丁管翻立柵於水中曰水柵旬日皆辦道成聞之喜曰賾真我子也以賾為西討都督賾啓山圖為軍副時江州刺史邵陵王友鎮尋陽賾以為尋陽城不足固表移友同鎮湓口尋陽時治柴桑今江州德化西南九十里有柴桑山湓口在德化縣西一里江州治德化蓋近湓口古城處湘州刺史王蘊遭母喪罷歸至巴陵與沈攸之深相結巴陵距江陵四百餘里蓋使命往來深相結也蘊過郢州欲因蕭賾出弔作難據郢城賾知之不出還至東府又欲因蕭道成出弔作難道成又不出作難者欲殺之也難乃旦翻將帥黃回任候伯孫曇瓘王宜興卜伯興等皆與通謀將即亮翻帥所類翻任音壬曇徒含翻伯興天與之子也卜天與死於元凶劭之難道成初聞攸之事起自往詣粲粲辭不見通直郎袁達謂粲不宜示異同通直郎通直散騎侍郎也晉武帝置員外散騎侍郎元帝泰興二年使二人與散騎侍郎同員直故謂之通直散騎侍郎也彼若以主幼時艱與桂陽時不異謂桂陽王休範反時也我何辭以拒之一朝同止欲異得乎道成乃召褚淵與之連席每事必引淵共之果如袁粲所料入直門下省考異曰南齊書韞作韜今從宋書南史黃回等諸將皆出屯新亭將即亮翻初褚淵為衛將軍遭母憂去職朝廷敦迫不起粲素有重名自往譬說譬說猶說諭也說輸芮翻及粲為尚書令遭母憂淵譬說懇至粲遂不起淵由是恨之淵之恨粲以其奪己志而使之失為子之道也而殺粲以傾宋又失為臣之節曰忠與孝二者淵胥失焉道成與淵議之淵曰西夏釁難事必無成夏戶雅翻釁許覲翻難乃旦翻公當先備其內耳謂備袁粲等也將以告淵衆謂淵與道成素善不可告粲曰淵與彼雖善豈容大作同異今若不告事定便應除之乃以謀告淵袁粲猶以故意待褚淵也道成亦先聞其謀遣軍主蘇烈薛淵太原王天生將兵助粲守石頭薛淵固辭道成強之將即亮翻強其兩翻淵不得已涕泣拜辭道成曰卿近在石頭日夕去來何悲如是且又何辭淵曰不審公能保袁公共為一家否今淵往與之同則負公不同則立受禍何得不悲道成曰所以遣卿正為能盡臨事之宜使我無西顧之憂耳石頭在臺城西故云然為于僞翻無所多言淵安都之從子也從才用翻道成又以驍騎將軍王敬則為直閣驍堅堯翻騎奇寄翻與伯興共總禁兵粲謀矯太后令使韞伯興帥宿衛兵攻道成於朝堂帥讀曰率下同朝直遙翻回等帥所領為應劉秉任候伯等並赴石頭本期壬申夜發秉恇擾不知所為晡後即束裝臨去啜羹寫胸上手振不自禁恇去王翻振當作震戰也動也禁音居吟翻勝也未暗載婦女盡室奔石頭部曲數百赫奕滿道既至見粲粲驚曰何事遽來今敗矣秉奔石頭則事大露故云必敗得見公萬死何恨孫曇瓘聞之亦奔石頭丹陽丞王遜等走告道成事乃大露遜僧綽之子也王僧綽柄用於元嘉之季道成密使人告王敬則時閣已閉敬則欲開閣出卜伯興嚴兵為備敬則乃鋸所止屋壁得出至中書省收韞韞已成嚴嚴裝也成嚴謂裝束已成俟期而發也見敬則猝至驚起迎之曰兄何能夜顧敬則呵之曰小子那敢作賊韞抱敬則敬則拳毆其頰仆地而殺之呵虎何翻毆烏口翻又殺伯興卜伯興父子俱死於劉氏之難據倉城拒粲倉城石頭倉城也歎曰事不成矣狼狽帥部曲數百向石頭帥讀曰率下同考異曰宋書云齊王使蘊募人已得數百宋略云是夕徵其私衆倏忽之間被甲數百莫知所從出按道成素已疑蘊必不使之募兵宋略近是也本期開南門時暗夜薛淵據門射之射而亦翻蘊謂粲已敗即散走道成遣軍主會稽戴僧靜帥數百人向石頭助烈等會工外翻自倉門得入與之並力攻粲孫曇瓘驍勇善戰臺軍死者百餘人王天生殊死戰故得相持自亥至丑戴僧靜分兵攻府西門焚之粲與秉在城東門見火起欲還赴府秉與二子俁陔踰城走俁宇矩翻陔柯開翻粲下城列燭自照謂其子最曰本知一木不能止大廈之崩但以名義至此耳僧靜乘暗踰城獨進最覺有異人以身衛粲僧靜直前斫之粲謂最曰我不失忠臣汝不失孝子遂父子俱死考異曰南史云僧靜奮刀直前欲斬之子最叫抱父乞先死兵士人人莫不隕涕粲曰我不失忠臣汝不失孝子仍求筆作啓云臣義奉大宋策名兩畢今便歸魂墳隴永就山丘僧靜乃並斬之按時僧靜掩粲不備挺身直往安肯容粲作啓從容如此宋書皆無此等事今不取謠曰可憐石頭城寧為袁粲死不作褚淵生劉秉父子走至額檐湖蕭子顯齊書作雒檐湖檐余廉翻斬之任候伯等並乘船赴石頭既至臺軍已集不得入乃馳還黃回嚴兵期詰旦帥所領從御道直向臺門攻道成詰去吉翻帥讀曰率聞事泄不敢發道成撫之如舊王蘊孫曇瓘皆逃竄先捕得蘊斬之其餘粲黨皆無所問粲典籤莫嗣祖為粲秉宣通密謀道成召詰之曰袁粲謀反何不啓聞嗣祖曰小人無識但知報恩何敢泄其大事今袁公已死義不求生蘊嬖人張承伯藏匿蘊道成並赦而用之史言蕭道成能廾怨録才嬖卑義翻又博計翻粲簡淡平素而無經世之才好飲酒喜吟諷好呼到翻喜許記翻身居劇任不肯當事主事每往咨決主事尚書省主事也尚書諸曹各有主事閒居高臥門無雜賓物情不接故及於敗裴子野論曰袁景倩民望國華袁粲字景倩智不足以除姦權不足以處變處昌呂翻蕭條散落危而不扶及九鼎既輕三才將換區區斗城之裏斗城言城如斗大也蓋蹈匹夫之節而無棟梁之具矣裴子野之論有春秋責備賢者之意故通鑑取之沈攸之遣中兵參軍孫同等五將以三萬人為前驅甲戌大赦沈攸之遣中兵參軍孫同等五將以三萬人為前驅乙亥以尚書僕射王僧虔為左僕射新除中書令王延之為右僕射度支尚書張岱為吏部尚書度徒洛翻吏部尚書王奐為丹楊尹延之裕之孫也劉秉弟遐為吳郡太守司徒右長史張王褱永之子也張永歷事文武明三帝王褱古回翻家素豪盛蕭道成使王褱伺間取遐間古莧翻會遐召王褱詣府王褱帥部曲十餘人直入齊中執遐斬之帥讀曰率郡中莫敢動道成聞之以告王褱從父領軍沖沖曰王褱以百口一擲出手得盧矣從才用翻樗蒲得盧者勝道成即以王褱為吳郡太守道成移屯閲武堂猶以重兵付黃回使西上而配以腹心配以腹心所以防回也上時掌翻恐宜興反告其謀閏月辛巳因事收宜興斬之諸將皆言回握強兵必反將即亮翻下同寧朔將軍桓康請獨往刺之刺七亦翻道成曰卿等何疑彼無能為也史言道成才識雄於一時沈攸之遣中兵參軍孫同等五將以三萬人為前驅司馬劉攘兵等五將以二萬人次之又遣中兵參軍王靈秀等四將分兵出夏口據魯山癸巳攸之至夏口考異曰沈約齊紀十一月攸之遂謀為亂張敬兒遣使詣攸之慶冬攸之呼使人於密室謂之曰奉皇太后令得袁司徒劉丹陽諸人書呼我速下可令雍州知此意答敬兒書曰信口一二而封雞毛桃耳數物置函中敬兒賀冬使即乘驛白公十二日壬辰攸之遣孫同等先發十七日丁酉張敬兒使至十八日戊戌公率衆入鎮朝堂閏月十四日癸巳攸之至夏口按是歲宋曆閏十二月庚辰朔魏曆閏十一月庚戌朔然則冬至必在十一月晦攸之對敬兒賀冬使者猶隱祕豈可十二日已發兵東下乎又攸之若十二日已舉兵於江陵豈可六十餘日始至夏口又宋順帝紀十二月攸之反丁卯齊王入守朝堂丁卯乃十二月十八日也閏月癸巳攸之圍郢城攸之傳十一月反十二月十二日遣孫同等東下閏月十四日至夏口宋略十二月沈攸之作亂丁卯蕭道成入屯朝堂閏月癸巳攸之師及郢州南齊高帝紀十二月攸之舉兵乙卯太祖入居朝堂諸書大抵略相符合惟齊紀不同蓋齊紀之誤今不取有驕色以郢城弱小不足攻云欲問訊安西暫泊黃金浦時武陵王贊蓋以安西將軍鎮郢黃金浦在鸚鵡洲上相傳以為吳將黃蓋屯兵于此得名被太后令當暫還都被皮義翻卿既相與奉國想得此意世隆曰東下之師久承聲問郢城小鎮自守而已宗儼之勸攸之攻郢城臧寅以為郢城兵雖少而地險少詩沼翻攻守勢異非旬日可拔若不時舉孟子曰以萬乘之國伐萬乘之國五旬而舉之戰國策白起一戰而舉鄢郢舉拔也今順流長驅計日可捷既傾根本郢城豈能自固攸之從其計欲留偏師守郢城自將大衆東下將即亮翻乙未將發柳世隆遣人於西渚挑戰鸚鵡洲之西渚挑徒了翻且穢辱之攸之怒改計攻城令諸軍登岸燒郭邑築長圍晝夜攻戰世隆隨宜拒應攸之不能克道成命吳興太守沈文秀張秀作季下同督吳錢唐軍事五代史志曰餘杭郡錢唐縣舊置錢唐郡蓋此時置也誅其宗族沈攸之殺沈慶之文秀因事以報父仇沈攸之遣中兵參軍孫同等五將以三萬人為前驅乙未以後軍將軍楊運長為宣城太守於是太宗嬖臣無在禁省者矣嬖卑義翻又博計翻沈約論曰夫人君南面九重奧絶重直龍翻陪奉朝夕義隔卿士階闥之任宜有司存既而恩以狎生信由恩固無可憚之姿有易親之色易以豉翻孝建泰始主威獨運而刑政糾雜理難遍通耳目所寄事歸近習及覘歡慍候慘舒動中主情舉無謬旨覘丑廉翻又丑豔翻中竹仲翻人主謂其身卑位薄以為權不得重曾不知鼠憑社貴狐藉虎威漢中山靖王勝曰社鼠不熏所託者然也楚江乙曰虎求百獸而食之得狐狐曰子無食我天帝使我長百獸子以我為不信吾為子先行子隨我後百獸見我而敢不走乎虎以為然遂與之行獸見之皆走虎不知百獸畏己而皆走也以為畏狐也內有專用之效勢傾天下未之或悟及太宗晚運慮經盛衰權幸之徒懾憚宗戚懾之涉翻欲使幼主孤立永竊國權構造同異興樹禍隙帝弟宗王相繼屠勦謂殺建安諸王也勦子小翻實由於此矣沈攸之遣中兵參軍孫同等五將以三萬人為前驅辛丑尚書左丞濟陽江謐建議假蕭道成黃鉞濟子禮翻從之沈攸之遣中兵參軍孫同等五將以三萬人為前驅加北秦州刺史武都王楊文度都督北秦雍二州諸軍事以龍驤將軍楊文弘為略陽太守雍於用翻驤思將翻壬寅魏皮歡喜拔葭蘆斬文度魏以楊難當族弟廣香為陰平公葭蘆戍主仍詔歡喜築駱谷城文弘奉表謝罪於魏遣子苟奴入侍魏以文弘為南秦州刺史武都王沈攸之遣中兵參軍孫同等五將以三萬人為前驅乙巳蕭道成出頓新亭謂驃騎參軍江淹曰道成為驃騎大將軍以淹為參軍驃匹妙翻騎奇寄翻下同天下紛紛君謂何如淹曰成敗在德不在衆寡公雄武有奇略一勝也寬容而仁恕二勝也賢能畢力三勝也民望所歸四勝也奉天子以伐叛逆五勝也彼志鋭而器小一敗也有威而無恩二敗也士卒解體三敗也搢紳不懷四敗也懸兵數千里而無同惡相濟五敗也雖豺狼十萬終為我獲道成笑曰君談過矣南徐州行事劉善明言於道成曰攸之收衆聚騎造舟治械苞藏禍心於今十年明帝泰始五年沈攸之刺郢州已懷異志至是適十年治直之翻才非持重躁則到翻而起逆纍旬遲回不進一則暗於兵機二則人情離怨三則有掣肘之患掣昌列翻四則天奪其魄本慮其剽勇輕速剽匹妙翻掩襲未備決於一戰今六師齊奮諸侯同舉此籠中之鳥耳蕭賾問攸之於周山圖山圖曰攸之相與鄰鄉攸之吳興人而山圖義興人故曰鄰鄉數所角翻頗悉其人性度險刻士心不附今頓兵堅城之下適所以為離散之漸耳二年戊午四七八劉攘兵射書入城請降春正月己酉朔百官戎服入朝朝直遙翻沈攸之盡鋭攻郢城柳世隆乘間屢破之間古莧翻蕭賾遣軍主桓敬等八軍據西塞西塞山在今武昌縣東百三十里界于兩山之間土俗編曰吳楚舊境分界于此攸之獲郢府法曹南鄉范雲使送書入城餉武陵王贊犢一羊空羊空苦江翻皆去其首去羌呂翻城中欲殺之雲曰老母弱弟懸命沈氏若違其命禍必及親今日就戮甘心如薺詩谷風誰謂荼苦其甘如薺此謂甘心就死如茹薺也薺齊禮翻攸之遣其將皇甫仲賢向武昌中兵參軍公孫方平向西陽武昌太守臧渙降於攸之西陽太守王育奔湓城將即亮翻降戶江翻湓蒲奔翻方平據西陽豫州刺史劉懷珍遣建寧太守張謨等將萬人擊之豫州有建寧左郡孝武大明八年省郡為建寧左縣屬西陽郡尋復為郡蓋皆蠻左所居地也五代志永安郡麻城縣有梁北西陽縣又有建寧郡將即亮翻辛酉方平敗走平西將軍黃回等軍至西陽泝流而進泝蘇故翻攸之素失人情但劫以威力初發江陵已有逃者及攻郢城三十餘日不拔逃者稍多攸之日夕乘馬歷營撫慰而去者不息攸之大怒召諸軍主曰我被太后令被皮義翻建義下都大事若克白紗帽共著耳著則略翻如其不振朝廷自誅我百口不關餘人比軍人叛散比毗至翻皆卿等不以為意我亦不能問叛身自今軍中有叛者軍主任其罪任音壬於是一人叛遣人追之亦去不返莫敢發覺咸有異計劉攘兵射書入城請降射而亦翻柳世隆開門納之丁卯夜攘兵燒營而去軍中見火起爭棄甲走將帥不能禁將即亮翻帥所類翻攸之聞之怒銜須咀之自咀其須怒之甚也須與鬚同咀音在呂翻嚼也斬之向旦攸之帥衆過江至魯山大別山一名魯山在今漢陽軍沔陽縣東一里江水徑其南漢水從西北來注之帥讀曰率考異曰宋略云甲辰攸之衆潰西逃乙巳華容民斬其首按是月己酉朔無甲辰乙巳臧寅曰幸其成而廾其敗吾不忍為也乃投水死攸之猶有數十騎自隨宣令軍中曰荊州城中大有錢可相與還取以為資糧郢城未有追軍而散軍畏蠻抄此蠻即緣沔而居者騎奇寄翻抄楚交翻可二萬人隨攸之還江陵張敬兒既斬攸之使者即勒兵偵攸之下遂襲江陵偵丑正翻候也攸之使子元琰與兼長史江乂別駕傅宣共守江陵城敬兒至沙橋觀望未進城中夜聞鶴唳謂為軍來乂宣開門出走吏民崩潰元琰奔寵洲寵洲近樂鄉楊正衡晉書音義曰寵力董翻敬兒至江陵考異曰宋略云辛未敬兒克江陵按己巳攸之以敬兒據城走死不容敬兒至辛未乃入城也攸之將至江陵百餘里聞城已為敬兒所據士卒隨之者皆散攸之無所歸與其子文和走至華容界皆縊于櫟林櫟郎狄翻木名柞屬己巳村民斬首送江陵敬兒擎之以楯覆以青繖楯食尹翻覆敷又翻繖蘇旰翻蓋也徇諸市郭乃送建康敬兒誅攸之親黨收其財物數十萬皆以入私初倉曹參軍金城邊榮為府録事所辱攸之為榮鞭殺録事為于僞翻及敬兒將至榮為留府司馬或說之使詣敬兒降說輸芮翻榮曰受沈公厚恩共如此大事一朝緩急便易本心吾不能也城潰軍士執以見敬兒敬兒曰邊公何不早來榮曰沈公見留守城不忍委去本不祈生祈求也告也敬兒曰死何難得命斬之榮歡笑而去榮客太山程雍之抱榮曰與邊公周遊不忍見邊公死乞先見殺兵人不得行戮以白敬兒敬兒曰求死甚易何為不許先殺雍之然後及榮軍人莫不垂泣易以豉翻士為知己死邊榮程雍之俱有焉孫同宗儼之等皆伏誅宗儼之與臧寅勸攸之舉兵孫同為軍鋒丙子解嚴以侍中柳世隆為尚書右僕射蕭道成還鎮東府丁丑以右章甲十一行本右作左乙十一行本同張校同衛將軍蕭賾為江州刺史侍中蕭嶷為中領軍賾士革翻嶷魚力翻二月庚辰以尚書左僕射王僧虔為尚書令右僕射王延之為左僕射癸未加蕭道成太尉都督南徐等十六州諸軍事蕭子顯齊書都督南徐南兗徐兗青冀司豫荊雍襄郢梁益廣越十六州道成表送黃鉞上流已定故表還黃鉞吏部郎王儉僧綽之子也神彩淵曠好學博聞少有宰相之志時論亦推許之道成以儉為太尉右長史太尉府時置左右長史好呼到翻少詩照翻相息亮翻事無大小專委之劉攘兵射書入城請降丁亥魏主如代湯泉此魏代都之湯泉也言代湯泉者以別下洛縣橋山之湯泉魏土地記曰代城北九十里有桑乾城城西渡桑乾水去城十里有溫湯療疾有驗又下洛縣西南四十里有橋山下有溫泉癸卯還劉攘兵射書入城請降宕昌王彌機初立三月丙子魏遣使拜彌機征南大將軍梁益二州牧河南公宕昌王宕徒浪翻使疏吏翻劉攘兵射書入城請降黃回不樂在郢州樂音洛固求南兗遂帥部曲輒還帥讀曰率辛嚴辛改己卯改都督南兗等五州諸軍事南兗州刺史黃回刃在其頸乃輒東還此送死也劉攘兵射書入城請降初王蘊去湘州湘州刺史南陽王翽未之鎮翽明帝子也音呼會翻長沙內史庾佩玉行府事翽先遣中兵參軍韓幼宗將兵戍湘州與佩玉不相能及沈攸之反兩人互相疑佩玉襲殺幼宗黃回至郢州遣輔國將軍任候伯行湘州事候伯輒殺佩玉冀以自免任候伯黃回皆與袁劉同謀任音壬蕭道成使安國誅候伯劉攘兵射書入城請降夏四月甲申魏主如崞山丁亥還還從宣翻又如字劉攘兵射書入城請降蕭道成以黃回終為禍亂回有部曲數千人欲遣收恐為亂辛卯召回入東府至停外齊使桓康將數十人數回罪而殺之並其子竟陵相僧念道成翦除異己至是盡矣數所具翻相息亮翻甲午以淮南宣城二郡太守蕭映行南兗州事仍以其弟晃代之淮南宣城逼近京邑故道成不以授他人劉攘兵射書入城請降五月魏禁皇族貴戚及士民之家不顧氏族下與非類婚偶犯者以違制論劉攘兵射書入城請降魏主與太后臨虎圈圈求遠翻有虎逸登閣道幾至御座侍衛皆驚靡幾居希翻靡披靡也吏部尚書王睿執戟禦之太后稱以為忠親任愈重史言馮后假公義以成其私劉攘兵射書入城請降六月丁酉以輔國將軍楊文弘為北秦州刺史武都王劉攘兵射書入城請降庚子魏皇叔若卒劉攘兵射書入城請降蕭道成以大明以來公私奢侈秋八月奏罷御府御府令自漢以來有之漢屬少府晉屬光祿勳據宋紀世祖大明四年改細作署令為左右御府令辛卯又奏禁民間華僞雜物凡十七條按蕭子顯齊書表禁不得以金銀為箔馬乘具不得金銀度不得織成繡裙道路不得著錦履不得用紅色為幡蓋衣服不得剪綵帛為雜花不得以綾作雜服飾不得打鹿行錦及局腳柳柏牀牙箱籠雜物綵帛作屏障錦緣薦席不得私作器仗不得以七寶飾樂器又諸雜飾物不得以金銀為花獸不得輒鑄金銅為像皆頒墨敕凡十七條劉攘兵射書入城請降乙未以蕭賾為領軍將軍蕭嶷為江州刺史劉攘兵射書入城請降九月乙巳朔日有食之劉攘兵射書入城請降蕭道成欲引時賢參贊大業夜召驃騎長史謝朏屏人與語久之朏無言唯二小兒捉燭道成慮朏難之仍取燭遣兒朏又無言道成乃呼左右朏莊之子也朏敷尾翻屏必郢翻捉執也持也謝莊見一百三十卷明帝泰始元年道成為驃騎大將軍長史亦其府官也太尉右長史王儉知其指他日請間言於道成曰功高不賞古今非一以公今日位地欲終北面可乎道成正色裁之而神采內和儉因曰儉蒙公殊盼所以吐所難吐何賜拒之深宋氏失德非公豈復寧濟但人情澆薄不能持久公若小復推遷則人望去矣復扶又翻豈唯大業永淪七尺亦不可得保七尺謂七尺之軀也卿言不無理儉曰公今名位故是經常宰相宜禮絶㣥后微示變革當先令褚公知之儉請銜命道成曰我當自往經少日道成自造褚淵款言移晷少詩沼翻造七到翻晷居洧翻日影也乃謂曰我夢應得官淵曰今授始爾謂方加太尉都督也且吉夢未必應在旦夕道成還以告儉儉曰褚是未達理耳儉乃唱議加道成太傅假黃鉞使中書舍人虞整作詔道成所親任遐曰任音壬此大事應報褚公道成曰褚公不從奈何遐曰彥回惜身保妻子非有奇才異節遐能制之淵果無違異褚淵字彥回史言褚淵之為人人皆得而侮薄之丙午詔進道成假黃鉞大都督中外諸軍事太傅領揚州牧劍履上殿入朝不趨贊拜不名使持節太尉驃騎大將軍録尚書南徐州刺史如故使疏吏翻道成固辭殊禮劍履上殿入朝不趨贊拜不名皆殊禮也劉攘兵射書入城請降以揚州刺史晉熙王燮為司徒劉攘兵射書入城請降戊申太傅道成以蕭映為南兗州刺史冬十月丁丑以蕭晃為豫州刺史劉攘兵射書入城請降己卯獲孫曇瓘殺之石頭之禍曇瓘逃去曇徒含翻劉攘兵射書入城請降魏員外散騎常侍鄭羲來聘劉攘兵射書入城請降壬寅立皇后謝氏后莊之孫也劉攘兵射書入城請降十一月癸亥臨澧侯劉晃坐謀反與其黨皆伏誅晃秉之從子也沈約志臨澧縣晉武帝太康四年立屬天門郡澧音禮劉攘兵射書入城請降甲子徙南陽王翽為隨郡王翽呼會翻劉攘兵射書入城請降魏馮太后忌青州刺史南郡王李惠高祖之母惠女也故忌之十二月癸巳誅惠及妻並其子弟太后以猜嫌所夷滅者十餘家而惠所歷皆有善政魏人尤冤惜之劉攘兵射書入城請降尚書令王僧虔奏以朝廷禮樂多違正典大明中即以宮縣合和鞞拂晉志曰鼙舞未詳所起然漢代已施於宴享矣傅毅張衡所賦皆其事也舊曲有五篇一關東有賢女二章和二年中三樂久長四四方皇五殿前生桂樹其辭盡亡魏作新歌五篇泰始中又別製新歌皆易其曲名拂舞出自江左舊云吳舞檢其歌非吳辭也亦陳於殿庭楊泓序曰自到江南見白符舞或言白鳧鳩舞云有此來數十年矣察其辭旨乃是吳人患孫晧虐政思屬晉也其曲有白鳩濟濟獨祿碣石淮南王五篇余觀其辭過魏晉諸公所作歌辭遠甚但失之悽楚非治世之音耳縣讀曰懸鞞與鼙同慮乖雅體又今之清商實由銅爵三祖風流遺音盈耳京洛相高江左彌貴魏太祖起銅爵臺於鄴自作樂府被於管弦後遂置清商令以掌之屬光祿勳三祖謂魏太祖高祖烈祖也唐會要曰自晉播遷古樂遂分散不存苻堅滅涼始得漢魏清商之樂傳于前後二秦及宋武定關中收之入于江南隋平陳獲之隋文曰此華夏正聲也乃置清商署總謂之清樂莫近於斯而情變聽移稍復銷落十數年間亡者將半民間競造新聲雜曲煩淫無極宜命有司悉加補綴朝廷從之劉攘兵射書入城請降是歲魏懷州刺史高允以老疾告歸鄉里尋復以安車徵至平城復扶又翻拜鎮軍大將軍中書監固辭不許乘車入殿朝賀不拜朝直遙翻聶崇岐標點王崇武覆校
