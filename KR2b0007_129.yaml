body:
  text: 資治通鑑卷第一百二十九端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注宋紀十一閬至廣陵世祖孝武皇帝下大明三年己亥四五九閬至廣陵春正月己巳朔兗州兵與魏皮豹子戰于高平兗州兵不利閬至廣陵己丑以驃騎將軍柳元景為尚書令驃匹妙翻騎奇寄翻右僕射劉遵考為領軍將軍閬至廣陵己酉魏河南公伊馛卒馛蒲撥翻卒子恤翻閬至廣陵三月乙卯以揚州六郡為王畿六郡丹陽淮南宣城吳郡吳興義興也徙治會稽置東揚州見上卷孝建元年會工外翻星變見上卷孝建三年閬至廣陵三月庚寅以義興太守垣閬為兗州刺史閬遵之子也垣遵即垣苗也武帝西征長安使遵守洛當城城據河濟之會後人謂之垣苗城守式又翻閬至廣陵夏四月乙巳魏主立其弟子推為京兆王閬至廣陵竟陵王誕知上意忌之亦潛為之備因魏人入寇修城浚隍聚糧治仗治直之翻誕記室參軍江智淵知誕有異志請假先還建康假古訝翻假休假也上以為中書侍郎智淵夷之弟子也江夷江湛之父夷之弟曰僧安少詩照翻操七到翻行下孟翻沈懷文每稱之曰人所應有盡有人所應無盡無者其唯江智淵乎是時道路皆云誕反會吳郡民劉成上書稱息道龍昔事誕息子也習唱警蹕此蓋言誕為揚州刺史時誕時一心奉上必無是事劉成誣告之也乘繩證翻私與伴侶言之誕殺道龍考異曰宋略南史作道就今從宋書弟詠之在誕左右見誕書陛下年紀姓諱往巫鄭師憐家祝詛祝職叔翻詛莊助翻詠之密以啓聞誕誣詠之乘酒罵詈殺之劉道龍陳詠之蓋先皆為誕所殺其父兄希指誣告以報子弟之讎耳詈力智翻請收付廷尉治罪治直之翻乙卯詔貶誕爵為侯遣之國詔書未下下遐稼翻先以羽林禁兵配兗州刺史垣閬使以之鎮為名與給事中戴明寶襲誕閬至廣陵誕未悟也明寶夜報誕典籤蔣成使明晨開門為內應成以告府舍人許宗之宗之竟陵王府舍人也誕驚起呼左右及素所畜養數百人畜許六翻執蔣成勒兵自衛天將曉明寶與閬帥精兵數百人猝至而門不開誕已列兵登陴帥讀曰率陴頻彌翻自在門上斬蔣成赦作徒繫囚作徒坐徒罪居作者繫囚逮捕在獄者殺之考異曰宋略云己亥殺閬按本紀乙卯貶誕爵今從之間古莧翻詔內外纂嚴考異曰宋略乙亥纂嚴按長曆是月戊戌朔無乙亥蓋己亥也將兵討誕騎奇寄翻將即亮翻下同甲子上親總禁兵頓宣武堂司州刺史劉季之誕故將也誕為會稽季之為參軍及起兵討元凶以季之為將宗慤為豫州兼督司州恐為慤所害委官間道自歸朝廷至盱眙盱眙太守鄭瑗疑季之與誕同謀邀殺之盱眙音吁怡沈慶之至歐陽水經注曰吳城邗溝通江淮自永和中江都水斷其水上承歐陽引江入埭六十里至廣陵城余據此地則今之真州閘也餉以玉環刀慶之遣道愍反數以罪惡誕焚郭邑驅居民悉使入城閉門自守説輸芮翻數所具翻守手又翻分遣書檄邀結遠近時山陽內史梁曠家在廣陵誕執其妻子遣使邀曠曠斬使拒之使疏吏翻誕怒滅其家誕奉表投之城外曰陛下信用讒言遂令無名小人來相掩襲不任枉酷任音壬即加誅翦雀鼠貪生仰違詔敕今親勒部曲鎮扞徐兗先經何福同生皇家誕於帝同氣也故云然便成胡越陵鋒蹈章甲十一行本蹈作奮乙十一行本同孔本同戈萬沒豈顧萬沒猶言萬死也冀在旦夕又曰陛下宮帷之醜豈可三緘家語孔子觀周入后稷之廟有金人三緘其口而銘其背曰古之慎言人也凡誕左右腹心同籍期親在建康者並誅之同籍諸同宗屬之籍者期親謂期喪之親也或有家人已死方自城內出奔者慶之至城下誕登樓謂之曰沈公垂白之年白髮下垂故曰垂白慶之曰朝廷以君狂愚不足勞少壯故耳少詩照翻上慮誕奔魏使慶之斷其走路斷音短慶之移營白土去城十八里又進軍新亭此新亭在廣陵城外非建康之新亭也帥讀曰率兗州刺史沈僧明慶之兄子也亦遣兵助慶之先是誕誑其衆云宗慤助我慤至繞城躍馬呼曰我宗慤也先悉薦翻呼火故翻誑居況翻誕見諸軍大集欲棄城北走留中兵參軍申靈賜守廣陵自將步騎數百人將即亮翻騎奇寄翻親信並自隨聲云出戰邪趨海陵道晉安帝分廣陵立海陵郡今泰州也誕自廣陵北門聲言出戰邪而趨東則海陵之路趨七喻翻驤思將翻誕行十餘里衆皆不欲去互請誕還城誕曰我還易耳卿能為我盡力乎衆皆許諾誕乃復還易以豉翻為于偽翻復扶又翻築壇歃血以誓衆歃色洽翻凡府州文武皆加秩府司空竟陵王府州南兗州琨之遵考之子也劉遵考時在朝為尚書右僕射忠孝不得並琨之老父在不敢承命誕囚之十餘日終不受乃殺之右衛將軍垣護之虎賁中郎將殷孝祖等擊魏還至廣陵上並使受慶之節度賁音奔慶之進營逼廣陵城誕餉慶之食提挈者百餘人出自北門慶之不開視悉焚之誕於城上授函表授南史作投當從之慶之曰我受詔討賊不得為汝送表汝必欲歸死朝廷自應開門遣使吾為汝護送誕之為此以帝猜忍欲以間慶之也慶之峻絶之蓋亦自為謀耳為于偽翻閬至廣陵東揚州刺史顏竣遭母憂送喪還都上恩待猶厚竣時對親舊有怨言竣七倫翻或語及朝廷得失會王僧達得罪僧達死見上卷上年將死具陳竣前後怨望誹謗之語上乃使御史中丞庾徽之劾奏免竣官鄭樵曰御史之名周官有之蓋掌贊書而授法令非今任也戰國時秦趙澠池之會各命御史書事又淳于髡謂齊王曰御史在前則皆記事之任至秦漢為糾察之任上啓陳謝且請生命上益怒詔答曰卿訕訐怨憤已孤本望乃復過煩思慮懼不自全訐居謁翻復扶又翻下復沈同豈為下事上誠節之至邪及竟陵王誕反上遂誣竣與誕通謀五月收竣付廷尉先折其足折而設翻然後賜死妻子徙交州至宮亭湖宮亭湖即彭蠡湖在彭澤縣西沈持林翻顏竣失職怨望固為可罪而自尋陽東下之時保護之功不可忘也既殺其身又沈其男口孝武帝亦少恩哉閬至廣陵六月戊申魏主如陰山閬至廣陵上命沈慶之為三烽於桑里桑里在廣陵城西南舉一烽克內城舉兩烽擒劉誕舉三烽璽書督趣前後相繼璽斯氏翻趣讀曰促慶之焚其東門塞塹造攻道立行樓土山並諸攻具塞悉則翻塹七豔翻為樓車推進以攻城故曰行樓值久雨不得攻城上使御史中丞庾徽之奏免慶之官詔勿問以激之自四月至于秋七月雨止城猶未拔上怒命太史擇日將自濟江討誕太宰義恭固諫乃止誕初閉城拒使者使疏史翻記室參軍山陰賀弼固諫誕怒抽刀向之乃止誕遣兵出戰屢敗將佐多踰城出降將即亮翻降戶江翻下同或勸弼宜早出弼曰公舉兵向朝廷此事既不可從荷公厚恩又義無違背荷下可翻背蒲妹翻唯當以死明心耳乃飲藥自殺參軍何康之謀開門納官軍不果斬關出降誕為高樓置康之母於其上暴露之不與食母呼康之數日而死誕以中軍長史濮章甲十一行本濮作濟乙十一行本同孔本同陽范義為左司馬濮博木翻義母妻子皆在城內或謂義曰事必不振言誕必陷敗不能振起也義曰吾人吏也人吏言為人之佐吏吏不可以叛君必若何康之而活吾弗為也沈慶之帥衆攻城身先士卒親犯矢石帥讀曰率先悉薦翻乙巳克其外城乘勝而進又克小城誕聞兵入走趨後園趨七喻翻隊主沈胤之等追及之擊傷誕墜水引出斬之誕母妻皆自殺誕母文帝殷修華妻徐上聞廣陵平出宣陽門敕左右皆呼萬歲侍中蔡興宗陪輦上顧曰卿何獨不呼興宗正色曰陛下今日正應涕泣行誅豈得皆稱萬歲謂同氣相殘乃天理人倫之變必若以義滅親應涕泣而行誅也詔貶誕姓留氏廣陵城中士民無大小悉命殺之沈慶之請自五尺以下全之其餘男子皆死女子以為軍賞猶殺三千餘口長水校尉宗越臨決皆先刳腸抉眼抉於決翻或笞面鞭腹苦酒灌創然後斬之苦酒蓋醯之類也創初良翻欣欣若有所得史言宗越之忍沈慶之蓋悉獻其首故聚於石頭南岸觀古玩翻不聽史言當時近侍皆正人但諫不行言不聽耳初誕自知將敗使黃門呂曇濟與左右素所信者將世子景粹匿於民間將攜也曇徒含翻事若不濟思相全脫如其不免可深埋之謂深埋景粹之尸也既出門並散走唯曇濟不去攜負景粹十餘日捕得斬之臨川內史羊璿坐與誕素善下獄死璿音旋下遐稼翻擢梁曠為後將軍贈劉琨之給事黃門侍郎蔡興宗奉旨慰勞廣陵興宗與范義素善收斂其尸送喪歸豫章范義蓋寓居豫章也蔡興宗之先亦濟陽人勞力到翻斂力贍翻卿何敢故觸王憲興宗抗言對曰陛下自殺賊臣自葬故交何不可之有上有慙色兄弟朋友皆天倫也興宗能不忘故交而帝忍誅屠同氣故慙宗越治軍嚴善為營陳每數萬人止頓越自騎馬行前使軍人隨其後馬止營合未嘗參差治直之翻陳讀曰陳參初今翻差叉宜翻又初佳翻參差不齊也閬至廣陵辛未大赦廣陵既平故肆赦閬至廣陵丙子以丹楊尹劉秀之為尚書右僕射閬至廣陵丙戌以南兗州刺史沈慶之為司空刺史如故閬至廣陵八月庚戌魏主如雲中壬戌還平城閬至廣陵九月壬辰築上林苑於玄武湖北文帝元嘉二十二年築北隄立玄武湖於樂遊苑北閬至廣陵初晉人築南郊壇於巳位尚書右丞徐爰以為非禮詔徙於牛頭山西牛頭山在今建康府上元縣南四十里兩峰如闕及廢帝即位以舊地為吉復還故處復扶又翻史終言之帝又命尚書左丞荀萬秋造五路依金根車加羽葆蓋五路之制與金根車不同加羽葆蓋愈非古矣沈約曰秦閲三代之車獨取殷制古曰桑根車秦曰金根車四年庚子四六春正月甲子朔魏大赦改元和平乙亥上耕籍田大赦己卯詔祀郊廟初乘玉路庚寅立皇子子勛為晉安王勛古勳字子頊為歷陽王子鸞為襄陽王魏散騎侍郎馮闡來聘散悉亶翻騎奇寄翻二月魏衛將軍樂安王良討河西叛胡以下文叛胡詣長安首罪觀之此河西蓋謂自龍門東至華陰河之西岸也三月魏人寇北陰平陰平道漢屬廣漢屬國都尉晉武帝泰始中分立陰平郡宋分立南陰平北陰平二郡五代志普安郡陰平縣宋立北陰平郡宋白曰文州陰平郡戰國時氐羌所據永嘉之後羌虜數叛遂立郡以遏之輿地志云晉永嘉末太守王鑒以郡降李雄晉人於是悉流移於蜀漢其氐羌並屬楊茂搜此郡不復預受正朔故南史諸志悉無所録其晉人流寓於蜀者仍於益州立南北二陰平寓於漢中者亦於梁州立南北二陰平考異曰宋帝紀索虜寇北陰平孔堤太守楊歸子擊破之宋略云索虜寇壯降平朱太守楊歸子擊破之按郡縣名無壯降平及孔堤北陰平參酌二書當為朱提今按魏收地形志武都郡有孔堤縣五代志武都建威縣後周併西魏之孔堤郡及縣入焉此時魏人蓋寇北陰平之孔堤為北陰平太守楊歸子所破也當從宋紀朱提郡在南中時屬寧州去陰平甚遠蓋考異誤以宋紀宋略二書所載合為朱提也當讀作孔堤屬上句宋略所謂壯降平亦北陰平三字之誤朱字於下文無所附著當為衍字甲申皇后親桑于西郊皇太后觀禮夏四月魏太后常氏殂本保太后尊為太后見一百二十七卷文帝元嘉三十年癸丑魏葬昭太后於鳴雞山魏土地記曰下洛城東北三十里有延河東流北有鳴雞山史記趙襄子殺代王于夏屋其姊為代王夫人襄子迎之至此曰代已亡矣吾將安歸乎遂磨筓於山而自殺代人憐之為立祠焉因名為磨筓山每夜有野雞㣥鳴王祠屋上故亦謂之鳴雞山杜佑曰媯州治懷戎縣有鳴雞山本名磨筓山丙戌尚書左僕射褚湛之卒吐谷渾王拾寅兩受宋魏爵命吐從暾入聲谷音浴擬於王者魏人忿之定陽侯曹安表言拾寅今保白蘭若分軍出其左右必走保南山不過十日人畜乏食可一舉而定六月甲午魏遣征西大將軍陽平王新成等督統萬高平諸軍出南道南郡公中山李惠等督涼州諸軍出北道以擊吐谷渾魏崔浩之誅也見一百二十五卷宋文帝元嘉二十七年至是復置復扶又翻河西叛胡詣長安首罪樂安王良兵威臨之故首罪首式又翻秋七月遣使如魏甲戌開府儀同三司何尚之卒壬午魏主如河西魏軍至西平西平漢落都之地禿髮所都樂都即落都也唐為鄯州九月魏軍濟河追之會疾疫引還獲雜畜三章甲十一行本三作二乙十一行本同孔本同十餘萬畜許又翻庚午魏主還平城丁亥徙襄陽王子鸞為新安王冬十月庚寅詔沈慶之討緣江蠻前廬陵內史周朗言事切直見一百二十七卷文帝元嘉三十年使有司奏朗居母喪不如禮傳送寧州傳知戀翻又直戀翻於道殺之朗之行也侍中蔡興宗方在直請與朗別坐白衣領職蔡興宗立於猜暴之朝葬范義別周朗犯時主之怒而不加刑素行有以孚乎人也十一月魏散騎常侍盧度世等來聘散悉亶翻騎奇寄翻是歲上徵青冀二州刺史顏師伯為侍中師伯以諂佞被親任被皮義翻㣥臣莫及多納貨賄家纍千金上嘗與之樗蒲上擲得雉自謂必勝師伯次擲得盧樗蒲采名有黑犢有雉有盧得盧者勝師伯遽斂子曰幾作盧子五木也此亦師伯為佞之一端幾居希翻師伯一輸百萬柔然攻高昌殺沮渠安周滅沮渠氏文帝元嘉十六年魏克涼州沮渠無諱與弟安周西走保據高昌今為柔然所滅沮子余翻高昌稱王自此始五年辛丑四六一慶之目不知書春正月戊午朔朝賀朝直遙翻雪落太宰義恭衣有六出義恭奏以為瑞上悅義恭以上猜暴懼不自容每卑辭遜色曲意祗奉由是終上之世得免於禍慶之目不知書二月辛卯魏主如中山丙午至鄴遂如信都慶之目不知書三月遣使如魏使疏吏翻慶之目不知書魏主發並肆州民五千人治河西獵道魏道武天賜二年分並州北境為九原鎮太武真君七年置肆州宋白曰十三州志云漢末大亂胸奴侵邊自定襄已西盡雲中鴈門之間遂空曹公集荒郡之戶聚之九原界以立新興郡領五原等縣即唐欣州定襄縣之地後魏書云太平二年置肆州寄理秀容城秀容縣欣州所治即漢末所置九原縣也治直之翻辛巳還平城慶之目不知書夏四月癸巳更以西陽王子尚為豫章王慶之目不知書庚子詔經始明堂直作大殿於丙己之地制如太廟唯十有二間為異慶之目不知書雍州刺史海陵王休茂年十七雍於用翻司馬新野庾深之行府事休茂性急欲自專處決處昌呂翻深之及主帥每禁之主帥典籤也又齋內亦有主帥謂之齋帥帥所類翻左右張伯超有寵多罪惡主帥屢責之伯超懼説休茂曰説輸芮翻主帥密疏官過失欲以啓聞如此恐無好疏使去翻記也好如字無好猶今人言無好處言將得罪也休茂曰為之奈何伯超曰惟有殺行事及主帥行事謂庾深之江左率謂長史司馬行府州事者為行事此去都數千里雍州鎮襄陽去建康水行四千餘里不失入虜中為王休茂從之丙午夜休茂與伯超等帥夾轂隊宋諸王有夾轂隊蓋左右親兵也出則夾車為衛帥讀曰率下同出金城殺深之及典籤戴雙徵集兵衆建牙馳檄使佐吏上己為車騎大將軍開府儀同三司加黃鉞凡府州僚屬皆謂之佐吏上時掌翻騎奇寄翻侍讀博士授諸王經者也詵疏臻翻休茂殺之伯超專任軍政生殺在己休茂左右曹萬期挺身斫休茂不克而死休茂出城行營行下孟翻巡行也咨議參軍沈暢之等帥衆閉門拒之休茂馳還不得入義成太守薛繼考為休茂盡力攻城為于偽翻義成太守治襄陽注詳見前克之斬暢之及同謀數十人其日參軍尹玄慶復起兵攻休茂生擒斬之母妻皆自殺復扶又翻休茂母文帝蔡美人同黨伏誅城中擾亂莫相統攝中兵參軍劉恭之秀之之弟也劉秀之孝建元年不附義宣時為尚書右僕射繼考以兵脅恭之使作啓事言繼考立義自乘驛還都上以為北中郎咨議參軍賜爵冠軍侯冠古玩翻事尋泄伏誅以玄慶為射聲校尉校戶教翻上自即位以來抑黜諸弟既克廣陵欲更峻其科沈懷文曰漢明不使其子比光武之子前史以為美談見四十五卷漢明帝永平十五年願崇唐衛之寄周成王既誅管叔囚蔡叔封叔虞於唐封康叔於衛以藩屏周室太宰義恭探知上指章甲十一行本請上有復上表三字乙十一行本同孔本同請裁抑諸王不使任邊州及悉輸器甲禁絶賓客沈懷文固諫以為不可乃止慶之目不知書上畋遊無度嘗出夜還敕開門侍中謝莊居守守手又翻以棨信或虛棨音啓傳也刻木為合符執不奉旨須墨敕乃開墨敕手敕也從容曰卿欲效郅君章邪郅惲字君章事見四十三卷漢光武建武十三年從千容翻臣聞王者祭祀畋遊出入有節今陛下晨往宵歸宵夜也妄生矯詐是以伏須神筆乃敢開門耳慶之目不知書魏大旱詔州郡境內神無大小悉灑掃致禱灑所賣翻掃素報翻又各上聲俟豐登各以其秩祭之於是㣥祀之廢者皆復其舊魏罷㣥祀見一百二十四卷文帝元嘉二十七年慶之目不知書秋七月戊寅魏主立其弟小新成為濟陽王大明元年魏主立其弟新成為陽平王此小新成又陽平王之弟也濟子禮翻鎮平原平原河津之要時魏未得青齊故於此置鎮加征南大將軍鎮虎牢虎牢宋舊鎮為司州刺史治所魏得之置孫州加征北大將軍鎮和龍和龍燕舊都魏得之以為鎮後為營州樂浪音洛琅慶之目不知書壬午魏主巡山北八月丁丑還平城慶之目不知書戊子立皇子子仁為永嘉王子真為始安王慶之目不知