本同張校同官禁錮十年懷文賣宅欲還東懷文吳興人吳興在建康東章甲十一行本聞下有之字乙十一行本同孔本同張校同大怒收付廷尉丁未賜懷文死懷文三子淡淵沖行哭為懷文請命見者傷之淡徒覽翻為于偽翻柳元景欲救懷文言於上曰沈懷文三子塗炭不可見見視也言其在塗炭之中不堪著眼也言速正其罪者婉而導之謂若正其罪當不至於死也南徐州從事史范陽祖沖之夏四月淑儀殷氏卒考異曰南史曰殷淑儀南郡王義宣女也義宣敗後帝密取之假姓殷氏左右言泄者多死或云貴是殷琰家人入義宣家義宣敗入宮今從宋書諡曰宣上痛悼不已精神為之罔罔罔罔失志也若有若無也為于偽翻南徐州從事史范陽祖沖之五月壬寅太宰義恭解領司徒南徐州從事史范陽祖沖之六月辛酉東昌文穆公劉延孫卒沈約志廬陵郡有東昌國吳立隋開皇十一年省東昌入太和縣南徐州從事史范陽祖沖之庚午魏主如陰山南徐州從事史范陽祖沖之魏石樓胡賀略孫反石樓胡即吐京胡也吐京有石樓山隋廢吐京郡為石樓縣唐屬隰州將即亮翻魏主命真城長蛇鎮長蛇鎮在南田縣東南有長蛇水唐隴州吳山縣即其地傉奴沃翻真討平之卒城而還卒子恤翻南徐州從事史范陽祖沖之秋七月壬寅魏主如河西南徐州從事史范陽祖沖之乙未立皇子子雲為晉陵王是日卒諡曰孝南徐州從事史范陽祖沖之初晉庾冰議使沙門敬王者桓玄復述其議復扶又翻並不果行至是上使有司奏曰儒法枝派名墨條分班志儒家助人君順陰陽明教化遊文於六經之中留意於仁義之際祖述堯舜憲章文武宗師仲尼以重其言於道最為高法家信賞必罰以輔禮制名家正名名位不同禮亦異數墨家貴儉兼愛上賢右鬼非命尚同厥猷靡爽唯浮圖為教反經提傳釋氏以自西天竺來者為經中國沙門譯而演其義者為傳提拈掇也傳直戀翻在末彌扇夫佛以謙卑自牧忠虔為道寧有屈膝四輩而簡禮二親謂拜四輩而不拜父母也釋氏有所謂戒外四聖佛一也菩薩二也圓覺三也聲聞四也亦謂之四輩沙門重戒臘以捨俗為僧之年為始耆老也直體謂不屈身也稽音啓以為沙門接見比當盡虔比毗志翻並也總也禮敬之容依其本俗九月戊寅制沙門致敬人主及廢帝即位復舊南徐州從事史范陽祖沖之乙未以尚書右僕射劉遵考為左僕射丹楊尹王僧朗為右僕射僧朗彧之父也南徐州從事史范陽祖沖之冬十月壬申葬宣貴於龍山九域志江寧府有龍山山形似龍江寧府即建康民不堪役死亡甚衆亡逃亡也未之有也又為之別立廟古者宗廟之制妾祔於妾祖姑漢氏以來薄太后生文帝鉤弋夫人生昭帝皆就園置寢廟未嘗別立廟也史言帝溺於女寵縱情敗禮為于偽翻南徐州從事史范陽祖沖之魏員外散騎常侍遊明根等來聘南徐州從事史范陽祖沖之辛巳加尚書令柳元景司空南徐州從事史范陽祖沖之壬寅魏主還平城自河西還也南徐州從事史范陽祖沖之南徐州從事史范陽祖沖之自漢以來諸州皆有從事史假佐何承天章甲十一行本天下有元嘉二字乙十一行本同孔本同張校同退齋校同曆疏舛猶多何承天撰曆見一百二十四卷文帝元嘉二十一年更工衡翻以為舊法冬至日有定處未盈百載輒差二度載子亥翻今令冬至日度歲歲微差將來久用無煩屢改又子為辰首位在正北虛為北方列宿之中今曆上元日度發自虛一又日辰之號甲子為先今曆上元歲在甲子又承天法日月五星各自有元今法交會遲疾悉以上元歲首為始所謂今曆今法皆祖沖之更造者也曆家分上元中元下元甲子各六十年凡一百八十年而下元甲子終矣復於上元甲子不能屈會上晏駕不果施行難乃旦翻七年癸卯四六三春正月丁亥以尚書右僕射王僧朗為太常衛將軍顏師伯為尚書僕射上每因晏集使章甲十一行本使上有好字乙十一行本同孔本同張校同㣥臣自相謿訐以為樂謔人以成其過謂之謿發人之陰私謂之訐訐居謁翻樂音洛漸不會旨會合也智淵正色曰恐不宜有此戲上怒曰江僧安癡人癡人自相惜僧安智淵之父也智淵伏席流涕古人畏聞父母名惟君所無私諱今人雖各有家諱然稠人廣座中往往不敢以為諱吾是以歎隋世以前人士猶為近古也武帝以是怒江智淵何異孫晧之怒韋昭邪上以為不盡美甚銜之他日與㣥臣乘馬至貴墓舉鞭指墓前石柱石柱墓表也此上不容有懷字智淵益懼竟以憂卒考異曰宋略曰帝既以僧安辱智淵自是詆之無度智淵不堪其恥退而自殺今從宋書己丑以尚書令柳元景為驃騎大將軍開府儀同三司驃匹妙翻騎奇寄翻二月甲寅上巡南豫南兗二州丁卯嚴卯改巳校獵於烏江烏江縣始見於晉書屬淮南郡不記置立宋屬歷陽郡宋白曰晉太康六年於東城界置烏江縣校戶教翻壬戌大赦甲子如瓜步山壬申還建康夏四月甲子詔自非臨軍戰陳並不得專殺其罪應重辟者陳讀曰陳辟毗亦翻皆先上須報先上其罪狀待報乃行刑此漢法也上時掌翻五月丙子詔曰自今刺史守宰動民興軍皆須手詔施行唯邊隅外警及姦釁內發變起倉猝者不從此例釁許覲翻戊辰嚴辰改寅以左民尚書蔡興宗曹魏置左民尚書粲淑之兄子也袁淑死於元凶劭之難上好狎侮㣥臣好呼到翻自太宰義恭以下不免穢辱常呼金紫光祿大夫王玄謨為老傖江南人呼中州人為傖王玄謨太原人也故呼之為老傖傖助庚翻顏師伯為齴齴魚蹇翻露齒也其餘短長肥瘦皆有稱目黃門侍郎宗靈秀體肥拜起不便每至集會多所賜與欲其瞻謝傾踣以為歡笑踣蒲北翻又寵一崑崙奴崑崙奴者言其狀似崑崙國人也崑崙國在林邑南崙盧昆翻尚書令柳元景以下皆不能免唯憚蔡興宗方嚴不敢侵媟媟私列翻顏師伯謂儀曹郎王耽之曰曹魏置二十三郎儀曹其一也蔡尚書常免昵戲去人實遠昵尼質翻耽之曰蔡豫章昔在相府亦以方嚴不狎武帝宴私之日未嘗相召蔡豫章興宗父廓也嘗為豫章太守故稱之相府謂武帝相晉時廓為司徒左長史也相府息亮翻左傳子産曰其父析薪其子不克負荷荷音下可翻又如字壬寅魏主如陰山六月戊辰以秦郡太守劉德願為豫州刺史德願懷慎之子也上既葬殷貴數與㣥臣至其墓數所角翻謂德願曰卿哭貴悲者當厚賞德願應聲慟哭撫膺劈踊涕泗交流膺胸也劈毗亦翻以手擊胸也詩注曰自目曰涕自鼻曰泗故用豫州刺史以賞之用下當有為字志亦嗚咽極悲他日有問志者曰卿那得此副急淚志曰我爾日自哭亡妾耳史言上淫荒為下所侮弄上為人機警勇決學問博洽文章華敏省讀書奏能七行俱下省悉景翻行戶剛翻一注目間能了七行文義又善騎射騎奇寄翻而奢欲無度自晉氏渡江以來宮室草創朝宴所臨東西二堂而已晉孝武末始作清暑殿宋興無所增改上始大修宮室土木被錦繡嬖妾幸臣賞賜傾府藏壞高祖所居陰室被皮義翻藏徂浪翻壞音怪江左諸帝既崩以其所居殿為陰室藏諸御服於其處起玉燭殿與㣥臣觀之牀頭有土障壁上挂葛燈籠麻蠅拂以葛為燈籠以麻為蠅拂上不答獨曰田舍公得此已為過矣周公無逸之書曰否則侮厥父母曰昔之人無聞知宋孝武是也淑之兄子也秋八月乙丑立皇子子孟為淮南王子産為臨賀王丙寅魏主畋于河西九月辛巳還平城庚寅以新安王子鸞兼司徒丙申立皇子子嗣為東平王冬十月癸亥以東海王禕為司空己巳上校獵姑孰魏員外散騎常侍遊明根等來聘明根奉使三返上以其長者禮之有加明根連三年來聘長知兩翻十一月癸巳上習水軍於梁山十二月丙午如歷陽甲寅大赦己未太宰義恭加尚書令癸亥上還建康八年甲辰四六四春正月丁亥魏主立其弟雲為任城王任音壬戊子以徐州刺史新安王子鸞領司徒夏閏五月壬寅太宰義恭領太尉上末年尤貪財利刺史二千石罷還必限使獻奉又以蒲戲取之蒲戲樗蒲之戲也終日酣飲少有醒時少詩沼翻常憑几昏睡或外有奏事即肅然整容無復酒態復扶又翻由是內外畏之莫敢弛惰庚申上殂於玉燭殿年三十五太宰義恭解尚書令加中書監以驃騎將軍南兗州刺史柳元景領尚書令入居城內入居臺城之內也建康無外城設六籬門而已百官第宅皆在臺城之外驃匹妙翻騎奇寄翻悉關二公大事與始興公沈慶之參決若有軍旅悉委慶之尚書中事委僕射顏師伯外監所統委領軍將軍王玄謨舊制外監不隸領軍宜相統攝者自有別詔文帝元嘉十八年以趙伯符為領軍將軍始統領外監李延壽曰若徵兵動衆大興人役優劇遠近斷於外監之心延壽之言為宋末嬖幸專亶發也太子即皇帝位諱子業小字法師孝武帝長子也大赦吏部尚書蔡興宗親奉璽綬璽斯氏翻綬音受太子受之傲惰無戚容興宗出告人曰昔魯昭不戚叔孫知其不終左傳魯襄公薨立昭公叔孫穆子曰是人也居喪而不哀在戚而有嘉容是謂不度比葬三易衰衰袵如故衰於是昭公十九年矣猶有童心君子是以知其不終也其在此乎為明年帝以狂暴見弒張本甲子詔復以太宰義恭録尚書事柳元景加開府儀同三司領丹楊尹解南兗州六月丁亥魏主如陰山秋七月己亥以晉安王子勛為江州刺史為明年子勛起兵張本勛古勳字柔然處羅可汗卒子豫成立號受羅部真可汗魏收曰受羅部真魏言惠也可從刊入聲汗音寒部真帥衆侵魏帥讀曰率辛丑魏北鎮遊軍擊破之壬寅魏主如河西高車五部相聚祭天衆至數萬魏主親往臨視之高車大喜丙午葬孝武皇帝于景寧陵景寧陵在丹楊秣陵縣巖山庚戌尊皇太后曰太皇太后皇后曰皇太后乙卯罷南北二馳道世祖大明五年立南北二馳道自閶闔門至于朱雀門又自承明門至于玄武湖還依元嘉尚書蔡興宗於都座慨然謂顏師伯曰此都座謂尚書八座會坐之所猶今之都堂也先帝雖非盛德之主要以道始終三年無改古典所貴論語曰三年無改於父之道可謂孝矣山陵未遠而凡諸制度興造不論是非一皆刊削雖復禪代亦不至爾復扶又翻下復非復留同天下有識當以此窺人師伯不從太宰義恭素畏戴法興巢尚之等雖受遺輔政而引身避事由是政歸近習法興等專制朝權朝直遙翻威行近遠詔敕皆出其手尚書事無大小咸取決焉義恭與顏師伯但守空名而已義恭録尚書事師伯為僕射而尚書事決於法興等是守空名也蔡興宗自以職管銓衡興宗為吏部尚書上時掌翻朝直遙翻下同輒為義恭陳登賢進士之意為于偽翻又針規得失博論朝政義恭性恇撓恇怯也撓屈也恇去王翻撓奴教翻恆慮失旨恆戶登翻聞興宗言輒戰懼無答興宗每奏選事選須絹翻選事選曹事也法興尚之等輒點定回換僅有在者興宗於朝堂謂義恭師伯曰主上諒暗不親萬機暗音陰而選舉密事多被刪改復非公筆被皮義翻復扶又翻下同亦不知是何天子意數與義恭等爭選事往復論執義恭法興皆惡之數所角翻惡烏路翻下同左遷興宗新昌太守吳孫晧建衡三年分交趾立新興郡晉武帝太康三年更名新昌郡屬交州五代志交州嘉寧縣舊置新昌郡復留之建康丙辰追立何曰獻皇后何大明五年薨乙丑新安王子鸞解領司徒戴法興等惡王玄謨剛嚴八月丁卯以玄謨為南徐州刺史王太后疾篤使呼廢帝帝曰病人間多鬼那可往太后怒謂侍者取刀來剖我腹那得生寧馨兒寧相傳讀從去聲劉禹錫詩從平聲己丑太后殂九月辛丑魏主還平城自河西還也癸卯以尚書左僕射劉遵考為特進右光祿大夫乙卯葬文穆皇后于景寧陵王后從孝武帝諡當作武穆冬十二月壬辰以王畿諸郡為揚州大明三年以丹楊等六郡為王畿以會稽為揚州亦見三年癸巳以豫章王子尚為司徒揚州刺史是歲青州移治東陽青州移治歷城見上卷孝建三年宋之境內凡有州二十二郡二百七十四縣千二百九十九戶九十四萬有奇此大較以沈約宋志為據沈約作志大較以是年為正然是年止二十一州耳沈志所謂二十二州以明帝泰始七年分交廣置越州足之而此時又已省司州蓋止二十一州也揚州領丹楊吳興淮南宣城義興五郡東揚州領會稽東陽臨海永嘉新安五郡南徐州領南東海南琅邪晉陵吳南蘭陵南東莞淮陵臨淮南彭城南清河南高平南平昌南濟陰南濮陽南泰山濟陽南魯郡十七郡徐州領彭城沛下邳蘭陵東海東莞東安琅邪陽平濟陰北濟陰十二郡南兗州領廣陵海陵山陽盱眙秦郡南沛鍾離北沛臨江九郡兗州領泰山高平魯東平陽平濟北六郡南豫州領歷陽南譙廬江南汝陰南梁晉熙弋陽安豐南汝南南新蔡東郡南潁南潁川西汝陰南汝陽南陳留南陳左郡邊城左郡光城左郡十九郡豫州領汝南新蔡譙梁陳南頓潁川汝陰汝陽陳留馬頭十一郡江州領尋陽豫章鄱陽臨川廬陵安成南康南新蔡建安晉安十郡青州領齊濟南樂安高密平昌北海東萊太原長廣九郡冀州領廣川平原清河樂陵魏河間頓丘高陽勃海九郡司州領義陽隨陽安陸南汝南四郡荊州領南郡南平宜都巴東汶陽南義陽新興南河東建平長寧武寧十一郡郢州領江夏竟陵隨武陵天門巴陵武昌西陽八郡湘州領長沙衡陽桂陽零陵營陽湘東邵陵始興臨慶始安十郡雍州領襄陽南陽新野順陽京兆始平扶風南上洛河南廣平義成馮翊天水建昌華山北河南弘農十七郡梁州領漢中魏興新興新城上庸晉壽華陽新巴北巴西北陰平南陰平巴渠懷安宋熙白水南上洛北上洛安康南宕渠懷安二十郡秦州領武都略陽安固西京兆南太原南安馮翊隴西始平金城安定天水西扶風北扶風十四郡益州領蜀郡廣漢巴西梓潼巴郡遂寧江陽懷寧寧蜀越巂汶山南陰平犍為始康晉熙晉原永寧安固南漢中北陰平武都新城南新巴南晉壽宋興南宕渠天水東江陽沈黎二十九郡寧州領建寧晉寧牂柯平蠻夜郎朱提南廣建都西平西河陽東河陽興寧興古梁水十五郡廣州領南海蒼梧晉康新寧永平鬱林桂林高涼新會東官義安宋康綏康海昌宋熙寧浦晉興樂昌臨鄣十九郡交州領交趾武平新昌九真九德日南合浦義昌宋平九郡合二百六十八蓋以新立百梁蘇永寧安昌富昌南流六郡足為二百七十四其間荒外有郡而無縣有縣而無戶口有戶數而無口數亦不能詳也奇居宜翻東方諸郡謂三吳及浙江東五郡建康亦至百餘錢餓死什六七聶崇岐標點王崇武覆校
