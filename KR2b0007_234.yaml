body:
  text: 資治通鑑卷第二百三十四端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註唐紀五十德宗神武聖文皇帝九貞元八年貞元八年壬申七九二貞元八年春二月壬寅執夢衝數其罪而斬之數所具翻又所主翻雲南之路始通貞元八年三月丁丑山南東道節度使曹成王皋薨使疏吏翻皋諡曰成薨呼肱翻貞元八年宣武節度使劉玄佐有威略每李納使至玄佐厚結之故常得其陰事先為之備納憚之孫子五間有因間因間者因其鄉人而用之張預註云因敵國人知其底裏就而用之可使伺候也劉玄佐之制李納正用此術日織絹一匹謂玄佐曰汝本寒微天子富貴汝至此必以死報之故玄佐始終不失臣節史言玄佐忠順母教也此言蓋本之劉氏母墓誌唐人誌墓不無溢美者然此等言語有益於世教庚午玄佐薨貞元八年山南東道節度判官李實知留後事性刻薄裁損軍士衣食鼓角將楊清潭帥衆作亂將即亮翻鼓角將掌軍中鼓角者也帥讀曰率夜焚掠城中獨不犯曹王皋家曹王皋之家蓋已出次外館不居使宅明旦都將徐誠縋城而入縋馳偽翻號令禁遏然後止收清潭等六人斬之實歸京師以為司農少卿少詩照翻實元慶之玄孫也道王玄慶高祖之子丙子以荊南節度使樊澤為山南東道節度使貞元八年初竇參為度支轉運使度徒洛翻使疏吏翻班宏副之參許宏俟一歲以使職歸之歲餘參無歸意宏怒司農少卿張滂宏所薦也少始照翻滂普郎翻參欲使滂分主江淮鹽鐵宏不可滂知之亦怨宏及參為上所疏乃讓度支使於宏又不欲利權專歸於宏乃薦滂於上章乙十六行本上下有以宏判度支五字乙十一行本同孔本同退齋校同以滂為戶部侍郎鹽鐵轉運使仍隸於宏以悅之竇參陰狡而愎狡古巧翻愎弼力翻恃權而貪每遷除多與族子給事中申議之申招權受賂時人謂之喜鵲竇參每遷除朝士先與申議申因先報其人以招權納賂時人謂之喜鵲者以人家有喜事鵲必先噪於門庭以報之也謂參曰申必為卿累累良瑞翻宜出之以息物議參再三保其無他申亦不悛悛丑緣翻左金吾大將軍虢王則之巨之子也虢王巨肅宗上元二年為段子璋所殺左諫議大夫知制誥吳通玄與陸贄不叶竇申恐贄進用陰與通玄則之作謗書以傾贄上皆察知其狀夏四月丁亥貶則之昭州司馬昭州漢荔浦縣地屬蒼梧郡晉置平樂縣屬始安郡武德四年置樂州貞觀八年改曰昭州宋白曰郡北有昭山岡潭因山岡為名舊志昭州至京師四千四百三十六里隋置泉州治閩縣南安莆田縣屬焉武后聖曆二年分泉州之南安莆田龍溪置武榮州景雲二年改武榮為泉州而閩之泉州改為閩州開元十三年又改閩州為福州舊志泉州京師東南六千二百一十六里尋賜通玄死貞元八年劉玄佐之喪將佐匿之稱疾請代上亦為之隱將即亮翻為于偽翻遣使即軍中問以陝虢觀察使吳湊為代可乎監軍孟介行軍司馬盧瑗皆以為便然後除之陝失冉翻監古銜翻瑗于眷翻湊行至汜水汜音祀汜水縣本屬鄭州時屬孟州玄佐之柩將發軍中請備儀仗瑗不許又令留器用以俟新使將士怒玄佐之壻及親兵皆被甲擁玄佐之子士寧釋衰絰登重榻被皮義翻衰倉回翻重直龍翻自嚴自改尊為留後執城將曹金岸城將使之領兵巡視城堞晨夕警邏曰爾皆請吳湊者遂咼之咼古瓦翻盧瑗逃免士寧以財賞將士劫孟介以請於朝上以問宰相竇參曰今汴人指李納以邀制命不許將合於納庚寅以士寧為宣武節度使考異曰實錄士寧位未定遣使通王武俊劉濟田緒以士寧未受詔有國使皆留之舊傳云以士寧未受詔於國皆留之新傳云諸鎮不直之皆執其使然則舊傳是也翟直格翻託言巡撫至宋州以都知兵馬使劉逸準代之考異曰韓愈集作逸淮今從舊傳正臣之子也劉正臣肅宗至德初為平盧節度使貞元八年乙未貶中書侍郎同平章事竇參為郴州別駕舊志郴州京師南三千三百里郴丑林翻考異曰柳珵上清傳曰貞元壬申歲春三月相國竇公居光福里第月夜閒步於中庭有常所寵青衣上清者乃曰今欲啟事即須到堂前方敢言之竇公亟上堂上清曰庭樹上有人恐驚郎請謹避之竇公曰陸贄久欲傾奪吾權位今有人在庭樹上吾禍將至且此事奏與不奏皆受禍必竄死於道路汝在輩流中不可多得吾身死家破汝定為宮婢聖君若顧問善為我辭焉上清泣曰誠如是死生以之竇公下階大呼曰樹上君子應是陸贄使來能全老夫性命敢不厚報樹上應聲而下乃衣衰粗者也曰家有大喪貧甚不辦葬禮伏知相公推心濟物所以卜夜而來幸相公無怪公曰某罄所有堂封絹千匹而已方擬脩私廟今且輟贈可乎縗者拜謝竇公答之如禮又曰便辭相公請左右齎所賜絹擲於牆外某先於街中俟之竇公依其請命僕使偵其絕蹤旦方敢歸寢翌日執金吾先奏其事竇公得次又奏之德宗厲聲曰卿交通節將蓄養俠刺位崇台鼎更欲何求竇公頓首曰臣起自刀筆小才官以至貴皆陛下獎拔實不由人今不幸至此抑乃仇家所為耳陛下忽震雷霆之怒臣便合萬死中使下殿宣曰卿且歸私第待候進止越月貶郴州別駕會宣武節度使劉士寧通好于郴州廉使條疏上聞德宗曰交通節將信而有徵流竇公于驩州沒入家資一簪不著身竟未達流所詔自盡上清果隸名掖庭後數年以善應對能煎茶數得在帝左右德宗謂曰宮掖間人數不少汝了事從何得至此上清對曰妾本故宰相竇參家女奴竇某妻早亡故妾得陪掃灑及竇某家破幸得填宮既侍龍顏如在天上德宗曰竇某罪不止養俠刺亦甚有贓汙前時納官銀器至多上清流涕而言曰竇某自御史中丞歷度支戶部鹽鐵三使至宰相首尾六年月入數十萬前後非時賞賜亦不知紀極乃者郴州所送納官銀物皆是恩賜當部錄日妾在郴州親見州縣希陸贄意指刮去所進銀器上刻作藩鎮官銜姓名誣為贓物伏乞陛下驗之於是宣索竇某沒官銀器覆視其刮字處皆如上清言時貞元十二年德宗又問蓄養俠刺事上清曰本實無悉是陸贄陷害使人為之德宗怒陸贄曰這獠奴我脫卻伊綠衫便與紫衫著又常喚伊作陸九我任使竇參方稱意次須教我枉殺卻他及至權入伊手其為軟弱甚於泥團乃下詔雪竇參時裴延齡探知陸贄恩衰得恣行媒糱贄竟受譴不迴後上清特敕丹書度為女道士終嫁為金忠義妻世以陸贄門生名位多顯達者不敢傳說故此事絕無人知信如此說則參為人所劫德宗豈得反云蓄養俠刺況陸贄賢相安肯為此就使欲陷參其術固多豈肯為此兒戲全不近人情今不取以尚書左丞趙憬兵部侍郎陸贄並為中書侍郎同平章事憬仁本之曾孫也憬居永翻趙仁本見二百一卷高宗咸亨元年貞元八年張滂請鹽鐵舊簿於班宏宏不與滂與宏共擇巡院官莫有合者闕官甚多滂言於上曰如此職事必廢臣罪無所逃丙午上命宏滂分掌天下財賦如大曆故事大曆元年命第五琦劉晏分理天下財賦事見二百二十四卷貞元八年壬子吐蕃寇靈州陷水口支渠敗營田敗補邁翻詔河東振武救之遣神策六軍二千戍定遠懷遠城懷遠縣屬靈州後周置隋五原郡在縣界宋白曰定遠縣在靈州東北二百里貞元八年陸贄請令臺省長官各舉其屬長知兩翻著其名於詔書異日考其殿最幷以升黜舉者殿丁練翻所舉得人則升舉主以昭進賢之賞所舉非人則黜舉主以昭失舉之罰五月戊辰詔行贄議未幾或言於上曰諸司所舉皆有情故或受貨賂不得實才上密諭贄自今除改卿宜自擇勿任諸司諸司即謂臺省長官其略曰國朝五品以上制敕命之蓋宰相商議奏可者也六品以下則旨授蓋吏部銓材署職詔旨畫聞而不可否者也六品以下告身皆畫聞字起居遺補御史等官猶並列於選曹言起居郎舍人拾遺補闕及御史皆由吏部奏擬選須絹翻朝直遙翻捨僉議而重己權廢公舉而行私惠是使周行庶品行戶剛翻下班行同苟不出時宰之意則莫致也又曰宣行以來纔舉十數議其資望既不愧於班行考其行能又未聞於闕敗行下孟翻而議者遽以騰口上煩聖聰道之難行亦可知矣請使所言之人指陳其狀某人受賄某舉有情付之有司覈其虛實謬舉者必行其罰誣善者亦反其辜謂反坐以罪也不加辯詰私其公議不出主名主名告主之名也有罪獲縱枉直同貫人何賴焉又宰相不過數人豈能徧諳多士諳烏含翻若令悉命㣥官理須展轉詢訪是則變公舉為私薦易明揚以闇投公私明闇以相形而文理自見此作文之法然明揚二字本之虞書闇投二字本之漢書作文又不可無來處近世教人為文者類此文詎止於此而已為弊益甚所以承前命官罕不涉謗雖則秉鈞不一或自行情亦由私訪所親轉為所賣其弊非遠聖鑒明知又曰今之宰相則往日臺省長官今之臺省長官乃將來之宰相但是職名暫異固非行舉頓殊行舉者臺省長官舉之宰相行之居宰相之位則可擇千百具僚物議悠悠其惑斯甚蓋尊者領其要卑者任其詳是以人主擇輔臣輔臣擇庶長庶長庶官之長也將務得人無易於此夫求才貴廣考課貴精往者則天欲收人心進用不次則天謂武后也亦得自舉其才然而課責既嚴進退皆速是以當代謂知人之明累朝賴多士之用又曰則天舉用之法傷易而得人朝直遙翻易以豉翻陛下慎簡之規書曰慎簡乃僚上竟追前詔不行貞元八年癸酉平盧節度使李納薨軍中推其子師古知留後貞元八年六月吐蕃千餘騎寇涇州掠田軍千餘人而去田軍屯田之軍也貞元八年嶺南節度使奏近日海舶珍異多就安南市易欲遣判官就安南收市乞命中使一人與俱上欲從之陸贄上言以為遠國商販惟利是求緩之斯來張緩作綏擾之則去廣州素為衆舶所湊舶音白今忽改就安南若非侵刻過深則必招攜失所攜離也言所以招攜離者失其道也左傳管仲曰招攜以禮論語孔子曰吾未見能見其過而內自訟者也註云訟猶責也言人有過莫能自責記月令毋或作為淫巧以蕩上心註蕩謂動搖之也莫非王土中使外使悉是王臣豈必信嶺南而絕安南重中使以輕外使所奏望寢不行貞元八年秋七月甲寅朔戶部尚書判度支班宏薨尚辰羊翻度徒洛翻薨呼肱翻陸贄請以前湖南觀察使李巽權判度支上許之既而復欲用司農少卿裴延齡使疏吏翻度徒洛翻復扶又翻又音如字少詩照翻贄上言以為今之度支準平萬貨上時掌翻刻吝則生患寬假則容姦延齡誕妄小人用之交駭物聽尸祿之責固宜及於微臣知人之明亦恐傷於聖鑒上不從己未以延齡判度支事為裴延齡譖贄張本河南北江淮荊襄陳許等四十餘州大水溺死者二萬餘人陸贄請遣使賑撫上曰聞所損殊少溺奴狄翻少詩沼翻即議優恤恐生姦欺贄上奏其略曰流俗之弊多徇諂諛揣所悅意則侈其言度所惡聞則小其事揣初委翻度徒洛翻惡烏路翻制備失所恆病於斯制備謂隨事為之制而豫備也恆戶登翻所費者財用所收者人心苟不失人何憂乏用上許為遣使為于偽翻而曰淮西貢賦既闕不必遣使贄復上奏復扶又翻以為陛下息師含垢宥彼渠魁渠大也魁率也所宜矜恤昔秦晉讎敵穆公猶救其饑左傳晉饑秦輸之粟秦饑晉閉之糴穆公伐晉執惠公而晉又饑穆公復餼之粟曰吾怨其君而矜其民唯德與義寧人負我無我負人反曹操之言則有帝王氣象遣中書舍人京兆奚陟等宣撫諸道水災貞元八年以前青州刺史李師古為平盧節度使貞元八年韋皋攻章乙十六行本攻下有吐蕃二字乙十一行本同孔本同張校同退齋校同維州代宗廣德元年維州沒於吐蕃貞元八年陸贄上言以邊儲不贍由措置失當當丁浪翻蓄斂乖宜其略曰所謂措置失當者戍卒不隸於守臣守臣不總於元帥至有一城之將一旅之兵各降中使監臨監古銜翻皆承別詔委任分鎮亙千里之地莫相率從緣邊列十萬之師不設謀主每有寇至方從中覆比蒙徵發赴援比必利翻及也寇已獲勝罷歸吐蕃之比中國衆寡不敵工拙不侔然而彼攻有餘我守不足蓋彼之號令由將而我之節制在朝將即亮翻朝直遙翻彼之兵衆合幷而我之部分離析故也分扶問翻所謂蓄斂乖宜者陛下頃設就軍和糴之法以省運制與人加倍之價以勸農此令初行人皆悅慕此李泌所行之法也事見二百三十二貞元而有司競為苟且專事纖嗇歲稔則不時斂藏艱食則抑使收糴遂使豪家貪吏反操利權斂力驗翻操七刀翻賤取於人以俟公私之乏又有勢要近親羈遊之士委賤糴於軍城取高價於京邑又多支絺紵充直絺五之翻紵直呂翻窮邊寒不可衣鬻無所售上既無信於下下亦以偽應之度支物估轉高度徒洛翻估音古價也軍城穀價轉貴度支以苟售滯貨為功利軍城章乙十六行本城作司乙十一行本同孔本同以所得加價為羨餘羨弋線翻雖設巡院轉成囊橐元和四年十二月十二日敕遠處州使率情違法臺司無由盡知轉運使度支悉有巡院委以訪察當道使司及州縣有兩稅外榷率及違格敕文法等事狀報臺司蓋劉晏始置巡院自江淮以來達于河渭其後遂及緣邊諸道亦置之偽指囷倉囷區倫翻囷倉皆以藏穀圓曰囷方曰倉計其數則億萬有餘考其實則百十不足又曰舊制以關中用度之多歲運東方租米至有斗錢運斗米之言習聞見而不達時宜者則曰國之大事不計費損雖知勞煩不可廢也習近利而不防遠患者則曰每至秋成之時但令畿內和糴既易集事令力丁翻糴亭歷翻易以豉翻又足勸農臣以兩家之論互有長短將制國用須權重輕食不足而財有餘則弛於積財而務實倉廩廩力錦翻毛晃曰倉有屋曰廩食有餘而財不足則緩於積食而嗇用貨泉近歲關輔屢豐公儲委積屢力注翻委於偽翻積子智翻足給數年今夏江淮水潦米貴加倍人多流庸流謂流徙庸謂庸雇宜加價以糴而無錢江淮以穀貴人困宜減價以糶而無米糶他弔翻而又運彼所乏益此所餘斯所謂習見聞而不達時宜者也今江淮斗米直百五十錢運至東渭橋僦直又約二百米糙且陳僦子就翻糙七到翻米僅剝穀為糙尤為京邑所賤據市司月估今之市令司亦月具物價低昂之數以聞於上耗其九而存其一以江淮之米合運漕之僦直率一斗為錢三百五十而京師米價斗止三十七錢是耗其九而存其一也制事若斯可謂深失矣頃者每年自江湖淮浙運米百一十萬斛至河陰留四十萬斛貯河陰倉至陝州又留三十萬斛貯太原倉貯丁呂翻餘四十萬斛輸東渭橋今河陰太原倉見米猶有三百二十餘萬斛見賢遍翻京兆諸縣斗米不過直錢七十請令來年江淮止運三十萬斛至河陰河陰陝州以次運至東渭橋其江淮所停運米八十萬斛委轉運使每斗取八十錢於水災州縣糶之以救貧乏糶他吊翻計得錢六十四萬緡減僦直六十九萬緡請令戶部先以二十萬緡付京兆令糴米以補渭橋倉之缺數渭橋倉即東渭橋倉增價以糴則利農使糴十萬人一年之糧餘十萬四千緡以充來年和糴之價糴徒歷翻其江淮米錢僦直並委轉運使折市綾絹絁綿以輸上都折之舌翻絁式支翻繒之似布者今謂之紬唐都長安謂之上都償先貸戶部錢九月詔西北邊貴糴以實倉儲考異曰實錄云凡積米三十三萬斛按陸贄論守備狀云坐致邊儲數逾百萬諸鎮收糴今已向終又云更經一年可積十萬人三歲之糧矣蓋實錄所言今年之數贄狀通計來春也貞元八年冬十一月壬子朔日有食之貞元八年吐蕃雲南日益相猜每雲南兵至境上吐蕃輒亦發兵聲言相應實為之備辛酉韋皋復遺雲南王書復扶又翻遺唯季翻欲與共襲吐蕃驅之雲嶺之外雲南之地本漢雲南縣也漢屬益州郡後漢分屬永昌郡南中志曰雲南縣西高山相連衆山之中又有山特高大狀如扶風太一鬱然高峻與雲氣相連視之不見其山固陰沍寒雖五月盛暑不熱所謂雲嶺也獨與雲南築大城於境上置戍相保永同一家貞元八年左庶子姜公輔久不遷官詣陸贄求遷贄密語之曰語牛倨翻聞竇相屢奏擬上不允今人謂聖旨不從所請為不允習聞唐人之言也公輔懼請為道士上問其故公輔不敢泄贄語以聞參言為對上怒參歸怨於君己巳貶公輔為吉州別駕又遣中使責參姜公輔居猜忌之朝不能安於命義而由此重竇參之罪亦陸贄之一言也考異曰實錄初公輔罷相為左庶子以憂免復除右庶子數私謁竇參參數奏公輔以他官上不許而有怒公輔之言公輔恐乃請免官為道士久之未報因開延英奏之上問其故公輔對以參言上曉之固不已大怒貶之而詔書責參推過於上公輔傳曰陸贄知政事以有翰林之舊數告贄求官贄密謂公輔曰予常見郴州竇相言為公奏擬數矣上旨不允有怒公之言公輔恐懼上疏乞罷官為道士久之未報後又庭奏德宗問其故公輔不敢泄贄言便以參言為對帝怒貶公輔為泉州別駕又遣中使齎詔責參贄傳曰姜公輔奏竇參常語臣云陛下怒臣未已德宗怒再貶參竟殺之時議云公輔奏竇參語得之於贄云參之死贄有力焉按贄請令長官舉屬吏狀云亦由私訪所親轉為所賣其弊非遠聖鑒明知此乃解參之語也及參之死贄救解甚至由是觀之贄豈有殺參之意邪且贄語公輔之時安知公輔請為道士及於上前以泄言之罪歸參此乃公輔之意非贄意也當時之人見參贄有隙遂以己意猜之史官不悅贄者因歸罪於贄耳今不取貞元八年庚午山南西道節度使嚴震奏敗吐蕃於芳州及黑水堡敗補邁翻芳州高宗上元二年已為吐蕃所陷酈道元曰黑水出羌中西南逕黑水城西其地蓋在陰平西北臨洮西南古沓中之地也使疏吏翻敗補邁翻堡音保貞元八年初李納以棣州蛤有鹽利城而據之又戍德州之南三汊城以通田緒之路棣大計翻蛤古合翻康音螺余按集韻螺字下無字同韻有垜字音都戈翻小堆也恐當作垜汊楚嫁翻李納之阻兵也李長卿以棣州入朱滔而蛤為納所據因城而戍之其後王武俊敗朱滔得德棣二州蛤猶為納戍納又於德州南跨河而城守之謂之三汊以交魏博通田緒及李師古襲位王武俊以其年少輕之少詩照翻是月引兵屯德棣將取蛤及三汊城師古遣趙鎬將兵拒之上遣中使諭止之武俊乃還鎬下老翻將即亮翻又音如字使疏吏翻還從宣翻又音如字貞元八年初劉怦薨見二百三十二卷貞元元年怦普萌翻薨呼肱翻其母弟澭在父側以父命召濟而以軍府授之莫州治鄚縣在幽州南二百八十里澭於用翻瀛州河間郡幽州巡屬大州也其地在幽州南既而濟用其子為副大使河朔三鎮及淄青皆以其子為副大使儲帥也亶通表朝廷遣兵千人防秋濟怒發兵擊澭破之朝直遙翻為劉澭歸朝張本貞元八年左神策大將軍柏良器唐左右神策大將軍正二品史炤曰柏皇氏古帝號後為氏顓帝師柏亮父帝嚳師柏超之裔也監軍竇文場惡之惡烏路翻會良器妻族飲醉寓宿宮舍宮舍宮中直宿之舍也史言宦官惡柏良器能舉其職因其妻黨犯衞禁而文致其罪丙戌良器坐左遷右領軍自是宦官始專軍政為宦官挾兵權以脅天子張本右領軍十六衞之一也時南牙諸衞具位而已北軍掌禁兵權重故良器為左遷九年九年春正月癸卯初稅茶爾雅釋木云檟苦茶郭璞註云樹大小似梔子冬生葉可煮作羹飲今呼早採者為晚採者為茗一名荈蜀人謂之苦茶是也今通謂之茶茶聲近故呼之春中始生嫩葉蒸焙去苦水末之乃可喫與古所食殊不同也本草衍義曰晉溫嶠上表貢茶千斤茗三百斤郭璞曰早採為茶晚採為茗茗或曰荈茶葉老者也古人謂其芽為雀舌麥顆言其至嫩也又有新芽一發便長寸餘微粗如針惟芽長為上品其根榦土力皆有餘故也如雀舌麥顆又下品前人未盡識史言稅茶始此遂開利孔皆估其直什稅一從鹽鐵使張滂之請也滂奏去歲水災減稅用度不足請稅茶以足之自明年以往稅茶之錢令所在別貯俟有水旱以代民田稅自是歲收茶稅錢四十萬緡未嘗以救水旱也榷茶之說始於趙贊至張滂而始行滂又奏姦人銷錢為銅器以求贏請悉禁銅器銅山聽人開采無得私賣九年二月甲寅以義武留後張昇雲為節度使九年初鹽州既陷鹽州陷見二百三十二卷二年吐蕃常阻絕靈武侵擾鄜坊既阻絕靈武往來之路又侵擾鄜坊之民辛酉詔發兵三萬五千人城鹽州考異曰邠志八年詔追張公議築鹽夏二城張公奏曰師之進取切藉驍將神策散將魏茪者朔方子弟武藝冠絕得茪足以集事上遣之張公以茪為邠寧馬軍兵馬使三月師及諸軍赴于五原去城百里而軍茪獨以其騎徑至城下陷城而入逐吐蕃召諸軍城之更引其軍西掠境上往復走望為師耳目蕃衆距境而不敢入官軍城二郡而歸白居易樂府鹽州註亦云貞元壬申歲特詔城之而實錄在九年二月蓋去歲詔使城之今年因命杜彥光等而言之城之二旬而畢命鹽州節度使杜彥光戍之朔方都虞候楊朝晟戍木波堡木波堡在慶州方渠縣界九域志方渠宋朝改為通遠縣置環州有木波鎮章乙十六行本靈下有武銀二字乙十一行本同孔本同張校同退齋校同夏河西獲安九年上使人諭陸贄以要重之事勿對趙憬陳論當密封手疏以聞又苗粲以父晉卿往年攝政寶應間連有國憂晉卿攝冢宰諸子皆與古帝王同名晉卿十子發丕堅垂與帝王同名兄弟亦各除外官勿使近屯兵之地近其靳翻又卿清慎太過諸道饋遺遺唯季翻一皆拒絕恐事情不通如鞭鞾之類受亦無傷贄上奏其略曰昨臣所奏惟趙憬得聞陛下已至勞神委曲防護是於心膂之內尚有形迹之拘迹同事殊鮮克以濟鮮息淺翻恐爽無私之德爽差也書曰改過不吝爵人必於朝刑人必於市惟恐衆之不覩事之不彰記曰爵人於朝與衆共之刑人於市與衆棄之朝直遙翻兆庶聽之無疑議受賞安之無怍色當刑居之無怨言此聖王所以宣明典章與天下公共者也凡是譖訴之事多非信實之言利於中傷中竹仲翻懼於公辯或云歲月已久不可究尋或云事體有妨須為隱忍為于偽翻或云惡迹未露宜假他事為名或云但棄其人何必明言責辱詞皆近於情理近其靳翻意實苞於矯誣傷善售姦莫斯為甚若晉卿父子實有大罪則當公議典憲若被誣枉豈令陰受播遷夫聽訟辨讒必求情辨跡情見跡著見賢遍翻辭服理窮然後加刑罰焉是以下無冤人上無謬聽又曰監臨受賄盈尺有刑律諸監臨之官受所監臨財物者一尺笞四十諸監臨主司受財而枉法者一尺杖一百監古銜翻尚當嚴禁矧居風化之首反可通行風化之首謂宰相者風化之所自出展轉滋甚鞭鞾不已必及金玉鞾與靴同何能自窒于心古語有之不見可欲此心不亂何能中絕其意謂既受其私饋則難以絕其私謁溪壑成災矣又曰若有所受有所卻則遇卻者疑乎見拒而不通矣若俱辭不受則咸知不受者乃其常理復何嫌阻之有乎復扶又翻下同九年初竇參惡左司郎中李巽惡烏路翻出為常州刺史及參貶郴州巽為湖南觀察使郴丑林翻汴州節度使劉士寧遺參絹五十匹遺唯季翻巽奏參交結藩鎮上大怒欲殺參陸贄以為參罪不至死上乃止既而復遣中使謂贄曰參交結中外其意難測社稷事重卿速進文書處分處昌呂翻分扶問翻下無分同贄上言參朝廷大臣誅之不可無名昔劉晏之死罪不明白至今衆議為之憤邑為于偽翻叛臣得以為辭見二百二十六卷建中元年二年天下共知至於潛懷異圖事跡曖昧曖音愛不明貌若不推鞫遽加重辟駭動不細辟音闢刑辟竇參於臣無分言無契分之雅分扶問翻豈欲營救其人蓋惜典刑不濫三月更貶參驩州司馬男女皆配流上又命理其親黨理治也罪有首從法有重輕首謂為頭者從謂隨從者為首者重隨從者輕親黨亦應末減況參得罪之初私黨並已連坐人心久定請更不問從之上又欲籍其家貲贄曰在法反逆者盡沒其財贓汚者止徵所犯皆須結正施刑然後收籍今罪法未詳陛下已存惠貸若簿錄其家恐以財傷義時宦官左右恨參尤深謗毀不已參未至驩州竟賜死於路竇申杖殺貨財奴婢悉傳送京師傳知戀翻九年海州團練使張昇璘昇雲之弟李納之壻也以父大祥歸于定州海州東海郡淄青巡屬璘離珍翻壻西計翻定州義武帥治所子居父喪再朞而大祥武俊奏之夏四月丁丑詔削其官遣中使杖而囚之使所吏翻定州富庶武俊常欲之因是遣兵襲取義豐掠安喜無極萬餘口徙之德棣義豐屬定州安喜縣本定州治所蓋州治徙也無極漢古縣因無極山為名唐屬定州按無極山碑云無極山與天地俱生從上至體可三里所立石為體二丈五尺所石上青下黃白色前正平可布兩大席在無極西南三十里景福二年以無極縣為祁州棣大計翻屢遣使謝之乃止上命李師古毀三汊城李納築三汊城見上年汊楚嫁翻然常招聚亡命有得罪於朝廷者皆撫而用之朝直遙翻九年五月甲辰以中書侍郎趙憬為門下侍郎同平章事義成節度使賈耽為右僕射右丞盧邁守本官並同平章事邁翰之族子也憬居永翻耽都含翻射寅謝翻興元時盧翰與李勉劉從一同為相憬疑陸贄恃恩欲專大政排己置之門下政事堂在中書省今憬遷東省故疑贄排己右僕射屬門下省由是與贄有隙為趙憬附裴延齡張本考異曰舊憬傳曰憬與陸贄同知政事贄恃久在禁庭特承恩顧以國政為己任纔周歲轉憬為門下侍郎憬由是深銜之數以目疾請告不甚當政事因是不相協按憬遷門下猶為宰相又益以賈耽盧邁贄豈得專政蓋憬以此心疑之耳九年陸贄上奏論備邊六失以為措置乖方課責虧度財匱於兵衆力分於將多怨生於不均機失於遙制自措置乖方以下所謂六失也上時掌翻將即亮翻下同關東戍卒不習土風身苦邊荒心畏戎虜國家資奉若驕子姑息如倩人倩七政翻屈指計歸張頤待哺或利王師之敗乘擾攘而東潰或拔棄城鎮搖遠近之心豈惟無益實亦有損復有犯刑讁徙者復扶又翻下同既是無良之類且加懷土之情思亂幸災又甚戍卒可謂措置乖方矣此一失也自頃權移於下柄失於朝將之號令既鮮克行之於軍國之典常又不能施之於將朝直遙翻鮮息淺翻將即亮翻務相遵養遵率也言相率以養惡也欲賞一有功翻慮無功者反仄欲罰一有罪復慮同惡者憂虞罪以隱忍而不彰功以嫌疑而不賞姑息之道乃至於斯故使忘身效節者獲誚於等夷誚才笑翻率衆先登者取怨於士卒僨軍蹙國者不懷於愧畏僨方問翻緩救失期者自以為智能此義士所以痛心勇夫所以解體可謂課責虧度矣此二失也虜每入寇將帥遞相推倚帥所類翻推吐雷翻無敢誰何虛張賊勢上聞則曰兵少不敵朝廷莫之省察朝直遙翻省悉景翻唯務徵發益師無裨備禦之功重增供億之弊重直用翻徵求日繁以編戶傾家破產之資兼有司榷鹽稅酒之利榷古岳翻總其所入歲以事邊可謂財匱於兵衆矣此三失也吐蕃舉國勝兵之徒勝音升勝兵謂人之才力堪執兵以戰者也纔當中國十數大郡而已動則中國懼其衆而不敢抗靜則中國憚其強而不敢侵厥理何哉良以中國之節制多門蕃醜之統帥專一故也帥讀曰率夫統帥專一則人心不分號令不貳進退可齊疾徐如意機會靡愆愆違也斯乃以少為衆以弱為強者也開元天寶之間控禦西北兩蕃唯朔方河西隴右三節度中興以來未遑外討抗兩蕃者亦朔方涇原隴右河東四節度而已言西北兩蕃者以別奚契丹兩蕃若開元天寶以來西則吐蕃北則突厥中興以來所謂兩蕃西則吐蕃北則回紇建牙擁節者凡三使焉事見二百二十五卷大曆十四年使疏吏翻數且四十皆承特詔委寄各降中貴監臨人得抗衡莫相稟屬監古銜翻史炤曰衡車上橫木抗衡謂兩相抗拒有若車衡相抗也余謂衡所以揆平首尾有所偏重則衡為之低昂商輕重者所必爭也抗衡者言無所低昂而平視之也每俟邊書告急方令計會用兵既無軍法下臨惟以客禮相待令力丁翻夫兵以氣勢為用者也氣聚則盛散則消勢合則威析則弱今之邊備勢弱氣消可謂力分於將多矣夫音扶將即亮翻此四失也理戎之要在於練覈優劣之科以為衣食等級之制使能者企及企去智翻否者息心雖有厚薄之殊而無觖望之釁觖古穴翻今窮邊之地長鎮之兵皆百戰傷夷之餘終年勤苦之劇然衣糧所給唯止當身例為妻子所分常有凍餒之色而關東戍卒怯於應敵懈於服勞衣糧所頒厚踰數等又有素非禁旅本是邊軍將校詭為媚詞因請遙隸神策不離舊所當丁浪翻懈俱賣翻離去智翻唯改舊章乙十六行本舊作虛乙十一行本同孔本同張校同退齋校同名其於廩賜之饒遂有三倍之益夫事業未異而給養有殊苟未忘懷孰能無慍可謂怨生於不均矣慍於問翻此五失也凡欲選任將帥必先考察行能將即亮翻帥所類翻行下孟翻可者遣之不可者退之疑者不使使者不疑故將在軍君命有所不受此孫子兵法之言裁斷多出宸衷斷丁亂翻選置戎臣先求易制易以豉翻多其部以分其力輕其任以弱其心遂令爽於軍情亦聽命乖於事宜亦聽命戎虜馳突迅如風飈馹書上聞馹人質翻驛傳遞馬旬月方報守土者以兵寡不敢抗敵分鎮者以無詔不肯出師賊既縱掠退歸此乃陳功告捷其敗喪則減百而為一其捃獲則張百而成千喪息浪翻捃居隕翻將帥既幸於總制在朝不憂罪累累良瑞翻陛下又以為大權由己不究事情可謂機失於遙制矣此六失也臣愚謂宜罷諸道將士防秋之制令本道但供衣糧募戍卒願留及蕃漢子弟以給之又多開屯田官為收糴為于偽翻寇至則人自為戰時至則家自力農與夫倏來忽往者豈可同等而論哉又宜擇文武能臣為隴右朔方河東三元帥分統緣邊諸節度使有非要者隨所便近而併之然後減姦濫虛浮之費以豐財定衣糧等級之制以和衆弘委任之道以宣其用懸賞罰之典以考其成如是則戎狄威懷疆埸寧謐矣上雖不能盡從心甚重之九年韋皋遣大將董勔等將兵出西山勔彌兗翻自彭州導江縣西出蠶崖關歷維茂至當悉諸州皆西山也破吐蕃之衆拔堡柵五十餘九年丙午門下侍郎同平章事董晉罷為禮部尚書九年雲南王異牟尋遣使者三輩一出戎州宋白曰戎州漢僰道南安縣地梁置戎州言以鎮戎夷也西南取曲協州幷南寧州安寧鹽井路至南詔所居羊苴哶城二千三百里舊志戎州在京師西南三千一百四里一出安南各齎生金丹砂詣韋皋金礦未經鍛鍊者為生金丹砂產石中鑿石取之黔音琴丹砂以示赤心三分皋所與書為信皆達成都異牟尋上表請棄吐蕃歸唐幷遺皋帛書遺唯季翻自稱唐章乙十六行本唐下有故字乙十一行本同孔本同雲南王孫吐蕃贊普義弟日東王吐蕃以雲南王為弟見二百一十六卷天寶十載封日東王見二百二十六卷代宗大曆十四年幷上表賀上賜異牟尋詔書令皋遣使慰撫之幷上時掌翻令力丁翻使疏吏翻九年賈耽陸贄趙憬盧邁為相百官白事更讓不言耽都含翻憬居永翻相息亮翻更工衡翻互也秋七月奏請依至德故事宰相迭秉筆以處政事事見二百一十九卷肅宗至德元載十月處昌呂翻下同詔從之其後日一易之九年劍南西山諸羌女王湯立志女王亦羌別種東與吐蕃党項茂州接西屬三波訶北距于闐屬雅州羅女蠻白狼夷以女為君居康延川巖險四繚有弱水南流湯立志新書作湯立悉杜陽編女蠻國人危髻金冠瓔珞被體故謂之菩薩蠻當時倡優遂因制菩薩蠻曲自哥鄰以下諸種皆散居西山西山即雪山今威州保寧縣有雪山連乳川白狗嶺有九峯積雪春夏不消白狗嶺與雪山相連威州唐之維州也至是各帥衆內附韋皋處之於維保霸州天寶元年招附生羌置霸州種章勇翻立志陀怱辟和入朝皆拜官厚賜而遣之九年癸卯戶部侍郎裴延齡奏自判度支以來檢責諸州欠負錢八百餘萬緡收諸州抽貫錢三百萬緡呈樣物三十餘萬緡請別置欠負耗賸季庫以掌之耗虧減也賸贏餘也賸以證翻又食證翻三月為一季凡三月終則入物于庫故謂之季庫每月入物故謂之月庫欠負皆貧人無可償徒存其數者抽貫錢給用隨盡呈樣染練皆左藏正物藏徂浪翻延齡徒置別庫虛張名數以惑上上信之以為能富國而寵之於實無所增也於實者於其實也京城西汚濕地生蘆葦數畝延齡奏稱長安咸陽有陂澤數百頃可牧广既馬上使有司閱視無之亦不罪也左補闕權德輿上奏權本顓頊之後為楚武王所滅子孫以國為氏上時掌翻延齡取常賦支用未盡者充羨餘以為己功羨弋線翻縣官先所市物再給其直用充別貯貯丁呂翻邊軍自今春以來並不支糧陛下必以延齡孤貞獨立時人醜正流言何不遣信臣覆視究其本末明行賞罰今㣥情衆口喧於朝市朝直遙翻豈京城士庶皆為朋黨邪陛下亦宜稍回聖慮而察之上不從九年八月庚戌太尉中書令西平忠武王李晟薨九年冬十月甲子韋皋遣其節度巡官崔佐時齎詔書詣雲南幷自為帛書答之節度巡官在判官推官之下衙推之上九年十一月乙酉上祀圜丘赦天下九年劉士寧既為宣武節度使八年三月命劉士寧為宣武節度使士寧淫亂殘忍出畋輒數日不返軍中苦之都知兵馬使李萬榮得衆心士寧疑之奪其兵權令攝汴州事十二月乙卯士寧帥衆二萬畋于外野帥讀曰率萬榮晨入使府召所留親兵千餘人詐之曰敕徵大夫入朝以吾掌留務汝輩人賜錢三十緡衆皆拜又諭外營兵皆聽命乃分兵閉城門使馳白士寧曰敕徵大夫宜速即路即就也當傳首以獻士寧知衆不為用以五百騎逃歸京師比至東都比必利翻及也所餘僕妾而已至京師敕歸第行喪禁其出入淮西節度使吳少誠聞變發兵屯郾城郾城漢晉之郾縣也後魏省併入曲陽縣隋開皇初置郾城縣屬汴州時屬蔡州蔡北鄙也東有漢召陵縣故城東南有後漢征羌縣故城郾一戰翻問所以逐士寧之故萬榮以言戲之戲之示無所畏上聞萬榮逐士寧使問陸贄贄上奏以為今軍州已定宜且遣朝臣宣勞勞力到翻徐察事情冀免差失其略曰今士寧見逐雖是衆情萬榮典軍且非朝旨此安危強弱之機也願陛下審之慎之上復使謂贄復扶又翻下同若更淹遲恐於事非便今議除一親王充節度使且令萬榮知留後其制即從內出贄復上奏其略曰臣雖服戎角力諒匪克堪而經武伐謀或有所見夫制置之安危由勢付授之濟否由才勢如器焉惟在所置置之夷地則平才如負焉唯在所授授踰其力則踣踣蒲北翻萬榮今所陳奏頗涉張皇但露徼求之情徼一遙翻殊無退讓之禮據茲鄙躁殊異循良又聞本是滑人劉玄佐滑州匡城人萬榮與同里相善當州猶言本州謂滑州也纔止三千諸營之兵已甚懷怨據此頗僻頗滂何翻偏也亦非將材若得志驕盈不悖則敗悖則犯上敗則僨軍將即亮翻悖蒲內翻僨方問翻又曰苟邀則不順苟允則不誠君臣之間勢必嫌阻邀求也非所當求而求之為苟邀允從也非所當從而從之為苟允下以不順求之上以不誠應之其勢必至於嫌阻左傳曰毋使滋蔓蔓難圖也又曰為國之道以義訓人將教事君先令順長長知兩翻下獨長同又曰方鎮之臣事多專制欲加之罪誰則無辭若使傾奪之徒便得代居其任利之所在人各有心此源潛滋禍必難救非獨長亂之道亦關謀逆之端又曰昨逐士寧起於倉卒卒讀曰猝諸郡守將固非連謀將即亮翻一城師人亦未協志各計度於成敗之勢度徒洛翻迴遑於逆順之名安肯捐軀與之同惡又曰陛下但選文武㣥臣一人命為節度仍降優詔慰勞本軍勞力到翻獎萬榮以撫定之功別加寵任褒將士以輯睦之義厚賜資裝揆其大情理必寧息萬榮縱欲跋扈勢何能為又曰儻後事有愆素左傳曰不愆于素杜預註云不過素所慮也橈奴教翻上不從壬戌以通王諶為宣武節度大使諶氏壬翻以萬榮為留後九年丁卯納故駙馬都尉郭曖女為廣陵王淳淳太子之長子是為憲宗即昇平公主也十年十年春正月劍南西山羌蠻二萬餘戶來降詔加韋皋押近界羌蠻及西山八國使八國即前女王哥鄰等弱水最弱小不得預八國數十年崔佐時至雲南所都羊苴哶城蜀註苴徐嗟翻哶彌嗟翻詳見前考異曰舊傳作陽苴哶城今從新傳吐蕃使者數百人先在其國雲南王異牟尋尚不欲吐蕃知之令佐時衣牂柯服而入衣於既翻牂柯蠻在昆明東九百里東距辰州二千四百里其南千五百里即交州衣於既翻下同佐時不可曰我大唐使者豈得衣小夷之服異牟尋不得已夜迎之佐時大宣詔書大聲以宣詔書顧左右失色業已歸唐事已成為業俯伏受詔歔音虛欷許既翻又音希鄭回密見佐時教之鄭回勸異牟歸唐事見二百三十二卷三年因勸異牟尋悉斬吐蕃使者去吐蕃所立之號獻其金印去羌呂翻吐蕃給雲南金印見二百一十一卷玄宗天寶十載復南詔舊名異牟尋皆從之考異曰舊韋皋傳四年正月皋遣判官崔佐時至苴哶城按西南夷事狀四年皋微聞異牟尋之意始因諸蠻寓書於牟尋自是比年招諭至九年牟尋始遣使分皋書以來朝廷賜之詔書皋乃遣佐時齎詔以往牟尋猶欲使佐時易服而入皋傳誤也異牟尋帥其子尋夢湊等與佐時盟於點蒼山神祠帥讀曰率先是吐蕃與回鶻爭北庭大戰死傷甚衆爭北庭事見上卷五年六年先悉薦翻異牟尋辭以國小請發三千人吐蕃少之以為少也少詩紹翻乃許之異牟尋遣五千人前行自將數萬人踵其後晝夜兼行襲擊吐蕃戰于神川大破之取鐵橋等十六城鐵橋在施蠻東南據新書是戰也異牟尋破施順二蠻並虜其王置白崖城又據新志自戎州開邊縣南行至白崖城三千里而近南詔傳曰南詔居永昌姚州之間鐵橋之南將即亮翻下同降其衆十餘萬戊戌遣使來獻捷降戶江翻使疏吏翻十年瀛州刺史劉澭為兄濟所逼濟澭不協事始上卷八年坻丁禮翻遂將部兵千五百人男女萬餘口詣京師號令嚴整在道無一人敢取人雞犬者上嘉之二月丙午以為秦州刺史隴右經略軍使理普潤理治也以普潤為治所不設音樂士卒病者澭親視之死者哭之十年乙丑義成節度使李融薨丁卯以華州刺史李復為義成節度使復齊物之子也李齊物淮安王神通之孫監軍薛盈珍數侵軍政數所角翻坦每據理以拒之盈珍常曰盧侍御所言公我固不違也坦後卒能脫於盈珍之譖侍御坦之寄祿官所謂憲銜也十年橫海節度使程懷直入朝厚賜遣歸十年夏四月庚午宣武軍亂留後李萬榮討平之先是宣武親兵三百人素驕橫先悉薦翻橫戶孟翻萬榮惡之惡烏路翻遣詣京西防秋親兵怨之大將韓惟清張彥琳誘親兵作亂攻萬榮萬榮擊破之親兵掠而潰多奔宋州宋州刺史劉逸準厚撫之史言李萬榮不能制劉逸準彥琳奔東都萬榮悉誅亂者妻子數千人有軍士數人呼於市曰呼火故翻今夕兵大至城當破萬榮收斬之奏稱劉士寧所為五月庚子徙士寧於郴州郴丑林翻十年欽州蠻酋黃少卿反圍州城少卿者西原黃洞蠻酋也酋慈由翻上元後置邕管經略使領邕貴黨橫等州遣中使諭解之十年陸贄上言郊禮赦下已近半年而竄謫者尚未霑恩乃為三狀擬進上使謂之曰故事左降官準赦量移史炤曰移徙也謂得罪遠謫者遇赦則量徙近地今所擬稍似超越又多近兵馬及當路州縣當路州縣謂其地當入京之路者近其靳翻贄復上言復扶又翻下同以為王者待人以誠有責怒而無猜嫌有懲沮而無怨忌斥遠以儆其不恪遠于願翻甄恕以勉其自新甄稽延翻察也免也不儆則浸及威刑不勉而復加黜削雖屢進退俱非愛憎行法乃暫使左遷念材而漸加進敍又知復用誰不增脩何憂乎亂常何患乎蓄憾如或以其貶黜便謂姦凶恆處防閑之中處昌呂翻長從擯棄之例則是悔過者無由自補蘊才者終不見伸凡人之情窮則思變含悽貪亂或起于茲悽悲也痛也則有疆域不離於本道風土反惡於舊州離力智翻風土之同道而獨甚惡者如廣府統廣韶端康封岡新樂瀧竇義雷春高循潮等州而春循新瘴氣特重於諸州是也徒有徙家之勞實增移配之擾又當今郡府多有軍兵所在封疆少無館驛示人疑慮體又非弘乞更賜裁審上性猜忌不委任臣下官無大小必自選而用之宰相進擬少所稱可稱尺證翻稱愜也下同少詩沼翻及㣥臣一有譴責往往終身不復收用好以辯給取人好呼到翻下同不得敦實之士艱於進用㣥材滯淹贄上奏諫其略曰夫登進以懋庸懋勉也庸功也二者迭用理如循環進而有過則示懲懲而改脩則復進既不廢法亦無棄人雖纖介必懲而用材不匱故能使黜退者克勵以求復登進者警飭而恪居恪居謂恪居官次也下無蓄怨又曰明主不以辭盡人不以意選士如或好善而不擇所用悅言而不驗所行進退隨愛憎之情離合繫異同之趣是由捨繩墨而意裁曲直棄權衡而手揣重輕雖甚精微不能無謬由與猶同揣初委翻中人以上迭有所長苟區別得宜別彼列翻付授當器當丁浪翻下過當同各適其性各宣其能及乎合以成功亦與全才無異但在明鑒大度御之有道而已又曰以一言稱愜為能愜苦叶翻以一事違忤為咎而不考忠邪忤五故翻其稱愜則付任逾涯不思其所不及其違忤則罪責過當不恕其所不能是以職司之內無成功君臣之際無定分上不聽分扶問翻贄又請均節財賦凡六條其一論兩稅之弊其略曰舊制賦役之法曰租調庸調徒弔翻丁男一人受田百畝歲輸粟二石謂之租每戶各隨土宜出絹若綾若絁共二丈絁式支翻綿三兩不蠶之土輸布二丈五尺麻三斤謂之調每丁歲役則收其庸日準絹三尺謂之庸天下為家法制均一雖欲轉徙莫容其姦故人無搖心而事有定制及羯胡亂華謂安祿山史思明版圖墮於避地墮讀曰隳賦法壞於奉軍建中之初再造百度執事者知弊之宜革而所作兼失其原知簡之可從而所操不得其要操七刀翻執事者謂楊炎凡欲拯其弊須窮致弊之由時弊則但理其時法弊則全革其法所為必當其悔乃亡易曰革而當其悔乃亡當丁浪翻供億無度此乃時弊非法弊也而遽更租庸調法更工衡翻分遣使者搜擿郡邑擿他狄翻校驗簿書每州取大曆中一年科率最多者以為兩稅定額事見二百二十六卷建中元年必因人力故先王之制賦入必以丁夫為本不以務穡增其稅不以輟稼減其租則播種多不以殖產厚其征不以流寓免其調則地著固著直略翻不以飭勵重其役不以窳怠蠲其庸則功力勤窳勇主翻惰也如是故人安其居盡其力矣兩稅之立惟以資產為宗不以丁身為本曾不寤資產之中有藏於襟懷囊篋物雖貴而人莫能窺謂商賈居寶貨待時而取利者直雖輕而衆以為富謂力田而蓄穀粟者數雖寡而計日收贏蕃讀如繁謂貸子錢而收利者有廬舍器用之資價雖高而終歲無利謂美居室侈服用而夸一時者其流實繁一概計估算緡宜其失平長偽長知兩翻由是務輕資而樂轉徙者恆脫於傜稅樂音洛敦本業而樹居產者每困於徵求此乃誘之為姦驅之避役誘音酉力用不得不弛賦入不得不闕復以創制之首創制之首猶言立法之初復扶又翻供應有煩簡之殊牧守有能否之異所在傜賦輕重相懸所遣使臣意見各異計奏一定有加無除又大曆中供軍進奉之類既收入兩稅今於兩稅之外復又並存望稍行均減以救凋殘其二請二稅以布帛為額不計錢數其略曰凡國之賦稅必量人之力量音良任土之宜故所入者惟布麻繒纊繒疾陵翻纊苦謗翻與百穀而已先王懼物之貴賤失平而人之交易難準又定泉布之法以節輕重之宜班固曰太公為周立九府圜法貨寶於金利於刀流於泉布於布束於帛又鄭氏周禮註曰其藏曰泉其行曰布取名於水泉其流行無不徧必由於是蓋御財之大柄為國之利權守之在官不以任下然則穀帛者人之所為也錢貨者官之所為也是以國朝著令租出穀庸出絹調出繒纊布曷嘗有禁人鑄錢而以錢為賦者也今之兩稅獨異舊章但估資產為差便以錢穀定稅臨時折徵雜物謂折錢穀之價以徵他雜物也折之舌翻唯計求得之利宜靡論供辦之難易易以豉翻所徵非所業所業非所徵遂或增價以買其所無減價以賣其所有一增一減耗損已多望勘會諸州初納兩稅年絹布定估比類當今時價加賤減貴酌取其中總計合稅之錢折為布帛之數又曰夫地力之生物有大限取之有度用之有節則常足取之無度用之無節則常不足生物之豐敗由天用物之多少由人是以聖王立程量入為出雖遇災難難乃旦翻下無困窮理化既衰則乃反是理化猶言治化也不恤所無桀用天下而不足湯用七十里而有餘是乃用之盈虛在節與不節耳其三論長吏以增戶加稅闢田為課績其略曰長人者罕能推忠恕易地之情體至公徇國之意迭行小惠競誘姦甿長知丈翻甿謨耕翻以傾奪鄰境為智能以招萃逋逃為理化捨彼適此者既為新收而有復萃聚也復方目翻復除也唯懷土安居首末不遷者則使之日重斂之日加斂力贍翻下同是令地著之人恆代惰遊賦役何異驅之轉徙教之澆訛恆戶登翻澆古堯翻此由牧宰不克弘通各私所部之過也又曰立法齊人久無不弊理之者若不知維御損益之宜則巧偽萌生恆因沮勸而滋矣請申命有司詳定考績若當管之內人益阜殷所定稅額有餘任其據戶口均減以減數多少為考課等差其當管稅物通比每戶十分減三者為上課減二者次焉減一者又次焉此不以增戶為課最而以戶額增之稅能減地著戶之稅額為課最也加稅見戶見賢遍翻比校殿罰亦如之殿丁練翻其四論稅限迫促其略曰建官立國所以養人也賦人取財所以資國也明君不厚其所資而害其所養故必先人事而借其暇力先家給而斂其餘財先悉薦翻又曰蠶事方興已輸縑稅農功未艾遽斂穀租上司之繩責既嚴下吏之威暴愈促有者急賣而耗其半直無者求假而費其倍酬望更詳定徵稅期限其五請以稅茶錢置義倉以備水旱稅茶見上九年古稱九年六年之蓄者記王制曰三年耕必有一年之食九年耕必有三年之食以三十年之通制國用量入以為出國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也固非獨豐公庾不及編甿也近者有司奏請稅茶歲約得五十萬貫元敕令貯戶部用救百姓凶饑今以蓄糧適副前旨其六論兼幷之家私斂重於公稅其略曰今京畿之內每田一畝官稅五升而私家收租殆有畝至一石者是二十倍於官稅也降及中等租猶半之夫土地王者之所有耕稼農夫之所為而兼幷之徒居然受利又曰望凡所占田占之贍翻約所條限裁減租價務利貧人法貴必行慎在深刻裕其制以便俗嚴其令以懲違微損有餘稍優不足失不損富章乙十六行本作損不失富乙十一行本同張校同退齋校同優可賑窮此乃安章乙十六行本安上有古者二字乙十一行本同張校同富恤窮之善經不可捨也周禮地官以保息六養萬民一曰慈幼二曰養老三曰振窮四曰恤貧五曰寬疾六曰安富容肇祖標點聶崇岐覆校
