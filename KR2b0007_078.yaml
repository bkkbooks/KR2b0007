body:
  text: 資治通鑑卷第七十八翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事柱國河內郡開國侯食邑一千三百戶食實封二百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注魏紀十景元三年元皇帝下景元三年壬午二六二景元三年秋八月乙酉吳主立皇后朱氏朱公主之女也戊子立子為太子烏關翻據吳志吳主休為四子作名字音湖水灣澳之灣非先有此音也景元三年漢大將軍薑維將出軍右車騎將軍廖化曰兵不戢必自焚伯約之謂也左傳魯衆仲曰兵猶火也不戢將自焚薑維字伯約廖力救翻今力弔翻用之無厭將何以存謂較智則不出於敵人之上而較力則又弱小也厭於鹽翻十月維入寇洮陽洮陽洮水之陽也洮水之陰魏不置郡縣維渡洮而攻之也沙州記曰嵹城東北三百里有曾城臨洮水曰洮陽城杜佑曰臨洮郡城本洮陽城臨洮水洮土刀翻破之維退住沓中水經注洮水徑洮陽城又東徑共和山南城在四山中又東徑迷和城北意侯和即此地也沓中在諸羌中即沙漒之地晉張駿據河西因前趙之亂收河南地至于狄道置武街石門侯和漒川甘松五屯護軍與後趙分境乞伏熾盤攻漒川師次沓中則侯和之地在塞內沓中之地在羌中明矣維以羈旅依漢維降漢見七十一卷明帝太和元年興兵纍年功績不立黃皓用事於中與右大將軍閻宇親善陰欲廢維樹宇維知之言於漢主曰皓姦巧專恣將敗國家請殺之敗補邁翻漢主曰皓趨走小臣耳往董允每切齒事見七十四卷邵陵厲公正始六年君何足介意維見皓枝附葉連懼於失言遜辭而出漢主敕皓詣維陳謝維由是自疑懼此維未出洮陽以前事也因求種麥沓中不敢歸成都司馬昭因是決計絆維於沓中而伐蜀景元三年吳主以濮陽興為丞相廷尉丁密光祿勳孟宗為左右御史大夫漢成帝綏和元年罷御史大夫置大司空世祖中興因之獻帝建安十三年罷司空復置御史大夫未嘗分左右也蓋吳分之興為會稽太守會工外翻守式又翻吳主在會稽興遇之厚左將軍張布嘗為會稽王左右督將吳主休先封琅邪王徙居會稽自會稽入立未嘗封會稽王也會稽當作琅邪將即亮翻二人皆貴寵用事布典宮省興關軍國以佞巧更相表裏更工衡翻吳人失望吳主喜讀書喜許記翻欲與博士祭酒韋昭博士盛沖講論前漢五經博士有僕射一人東漢轉為祭酒胡廣曰官名祭酒皆一位之元長也古禮賓客得主人饌老者一人舉酒以祭於地舊説以為示有先沈約志曰吳王濞為劉氏祭酒夫祭祀以酒為本長者主之故以祭酒為稱漢侍中魏散騎常侍高功者並為祭酒公府祭酒漢末有之恐其入侍言己陰過固諫止之吳主曰孤之涉學㣥書略遍但欲與昭等講習舊聞亦何所損君特當恐昭等道臣下姦慝故不欲令入耳如此之事孤已自備之不須昭等然後乃解也布皇恐陳謝且言懼妨政事吳主曰王務學業其流各異不相妨也王務猶言王事也而君以為不宜是以孤有所及耳不圖君今日在事更行此於孤也良甚不取布拜表叩頭據陳壽志自孤之涉學己下皆詔答之語布得詔惶恐以表陳謝重自序述吳主又面答之自王務學業以下皆面答之語也所謂今日在事更行此於孤蓋比之孫綝以綝亶權之時不使吳主親近儒生也於是布拜叩頭未嘗再上表也此表字衍在事者在官任事也聊相開悟耳何至叩頭乎如君之忠誠遠近所知吾今日之巍巍皆君之功也詩云靡不有初鮮克有終詩大雅蕩之辭鮮息淺翻君其終之然吳主恐布疑懼卒如布意卒子恤翻廢其講業不復使昭等入復扶又翻景元三年譙郡嵇康晉書曰康之先姓奚會稽上虞人以避怨徙譙郡銍縣銍有嵇山家於其側因以命氏好言老莊而尚奇任俠俠戶頰翻與陳留阮籍籍兄子咸姓譜殷有阮國在岐渭之間周詩有侵阮徂共之辭子孫以國為姓後漢有已吾令阮敦向式亮翻琅邪王戎沛國劉伶特相友善號竹林七賢皆崇尚虛無輕蔑禮法縱酒昏酣遺落世事阮籍為步兵校尉其母卒籍方與人圍碁對者求止籍留與決賭與決勝負也舉聲一號吐血數升毀瘠骨立骨立者言其瘠甚身肉俱消唯骨立也號戶刀翻吐土故翻飲酒無異平日司隸校尉何曾惡之惡烏路翻面質籍於司馬昭座質正也面以正義責之也卿縱情背禮敗俗之人今忠賢執政綜核名實若卿之曹不可長也背蒲妹翻敗補邁翻長知兩翻因謂昭曰公方以孝治天下治直之翻而聽阮籍以重哀飲酒食肉於公座何以訓人宜擯之四裔無令汙染華夏汙烏故翻昭愛籍才常擁護之昭之讓九錫也籍為公卿為勸進箋辭甚清壯故昭愛其才夔之子也何夔見六十三卷漢獻帝建安五年阮咸素幸姑婢姑將婢去咸方對客遽借客馬追之纍騎而還纍重也兩人共馬謂之纍騎還音旋又如字劉伶嗜酒常乘鹿車賢曰鹿車言其小僅可容鹿也使人荷鍤隨之荷下可翻鍤側洽翻鍬也曰死便埋我當時士大夫皆以為賢爭慕效之謂之放達鍾會方有寵於司馬昭聞嵇康名而造之造七到翻康箕踞而鍛康性巧而好鍛鍛都玩翻小冶也會將去康曰何所聞而來何所見而去會曰聞所聞而來見所見而去遂深銜之山濤為吏部郎魏尚書郎有二十三員吏部其一也康與濤書自説不堪流俗而非薄湯武昭聞而怒之湯武革命而康非薄之故昭聞而怒安兄巽誣安不孝康為證其不然為于偽翻會因譖康嘗欲助毌丘儉言毌丘儉反而康欲助之毋音無而言論放蕩害時亂教宜因此除之昭遂殺安及康康嘗詣隱者汲郡孫登晉泰始二年始分河內為汲郡史追書也子才多識寡難乎免於今之世矣景元三年司馬昭患薑維數為寇官騎路遺求為刺客入蜀官騎騶騎也數所角翻騎奇寄翻明公為天下宰宜杖正義以伐違二違離也背也二攜二也兩屬也非所以刑于四海也毛萇曰刑法也韓嬰曰刑正也勗爽之曾孫也荀爽淑之子也漢末為公昭欲大舉伐漢朝臣多以為不可獨司隸校尉鍾會勸之昭諭衆曰自定壽春以來息役六年治兵繕甲以擬二虜治直之翻今吳地廣大而下濕攻之用功差難不如先定巴蜀三年之後因順流之勢水陸並進此滅虢取虞之勢也春秋晉獻公滅虢因以滅虞此言滅蜀乘勢可以滅吳也居守成都及備他境不下四萬然則餘衆不過五萬今絆薑維於沓中絆博漫翻繫足曰絆使不得東顧直指駱谷出其空虛之地以襲漢中以劉禪之暗而邊城外破士女內震其亡可知也乃以鍾會為鎮西將軍都督關中征西將軍鄧艾以為蜀未有釁屢陳異議善用兵者觀釁而動此艾所以陳異議也姓譜師古者掌樂之官因以為氏薑維表漢主聞鍾會治兵關中欲規進取宜並遣左右車騎張翼廖化時張翼為左車騎將軍廖化為右車騎將軍陽安關口意即陽平關也杜佑曰陰平橋頭在文州界黃皓信巫鬼謂敵終不自致致至也又詣也送也㣥臣莫知四年四年春正章甲十一行本正作二乙十一行本同孔本同張校同退齋校同月復命司馬昭進爵位如前如元年之詔也復扶又翻四年吳交趾太守孫諝貪暴諝私呂翻為百姓所患會吳主遣察戰鄧荀至交趾裴松之曰察戰吳官號今揚都有察戰巷荀亶調孔爵三十頭送建業調徒弔翻因謀作亂夏五月郡吏呂興等殺諝及荀遣使來請太守及兵九真日南皆應之四年詔諸軍大舉伐漢遣征西將軍鄧艾督三萬餘人自狄道趣甘松沓中甘松本生羌之地張駿置甘松護軍乞伏國仁置甘松郡後魏時白水羌朝貢置甘松縣太和六年改置扶州隋改甘松為嘉誠縣屬同昌郡唐武德初置松州取甘松嶺為名且其地産甘松也杜佑曰甘松嶺江水發源之地甘松山在今交川郡境今臨洮和政郡之南及合川郡之地新唐書曰甘松山在洮水之西吐谷渾居山之陽雍州刺史諸葛緒督三萬餘人自祁山趣武街橋頭絶維歸路賢曰下辨縣屬武都郡今城州同谷縣舊名武街城水經注濁水徑武街城南又曰白水出臨洮縣西傾山東南徑陰平故城南又東北徑橋頭雍於用翻斜余遮翻谷音浴趣七喻翻以廷尉衛瓘持節監艾會軍事行鎮西軍司鍾會時為鎮西將軍瓘既監艾會軍又行會軍司監古銜翻覬之子也衛覬歷事武帝文帝明帝覬音冀會過幽州刺史王雄之孫戎王雄刺幽州遣勇士刺殺軻比能計將安出戎曰道家有言為而不恃老子道經之言保之難也或以問參相國軍事平原劉實曰鍾鄧其平蜀乎實曰破蜀必矣而皆不還客問其故實笑而不答鍾鄧之禍識者固知之矣秋八月軍發洛陽大賫將士賫來代翻賜也陳師誓衆將軍鄧敦謂蜀未可討司馬昭斬以徇漢人聞魏兵且至乃遣廖化將兵詣沓中為薑維繼援張翼董厥等詣陽安關口為諸圍外助大赦改元炎興敕諸圍皆不得戰退保漢樂二城用薑維之言也翼厥北至陰平聞諸葛緒將向建威留住月餘待之鍾會率諸軍平行至漢中九月鍾會使前將軍李輔統萬人圍王含於樂城護軍荀愷圍蔣斌於漢城斌音彬考異曰晉書文紀作部將易愷今從魏志會徑過西趣陽安口遣人祭諸葛亮墓諸葛亮葬沔陽初漢武興督蔣舒在事無稱宋白曰武興漢武都沮縣地元和郡國志曰興州城即古武興城也蜀以處當衝要置武興督以守之無稱言其庸庸無可稱者朝直遙翻使助將軍傅僉守關口舒由是恨鍾會使護軍胡烈為前鋒攻關口舒詭謂僉曰今賊至不擊而閉城自守非良圖也僉曰受命保城惟全為功今違命出戰若喪師負國喪息浪翻死無益矣舒曰子以保城獲全為功我以出戰克敵為功請各行其志遂率其衆出僉謂其戰也不設備使舒果迎戰亦未可保其必勝僉何為不設備邪關城失守僉亦有罪焉降戶江翻烈乘虛襲城僉格鬬而死僉肜之子也傅肜死事見六十九卷文帝黃初三年肜余中翻長驅而前大得庫藏積穀藏徂浪翻鄧艾遣天水太守王頎直攻薑維營前漢天水郡後漢改曰漢陽郡魏復曰天水頎渠希翻金城太守楊欣趣甘松維聞鍾會諸軍已入漢中引兵還欣等追躡於強川口大戰強川口在嵹臺山南嵹臺山即臨洮之西傾山闞駰曰強水出陰平西北強山一曰強川薑維之還也鄧艾遣王頎追敗之於強口即是地也聞諸葛緒已塞道屯橋頭塞悉則翻乃從孔函谷入北道欲出緒後緒聞之卻還三十里維入北道三十餘里聞緒軍卻尋還從橋頭過緒趣截維較一日不及言較遲一日遂不及維也合集士衆欲赴關城章甲十一行本城下有未到二字乙十一行本同孔本同張校同退齋校同聞其已破退趣白水遇廖化張翼董厥等合兵守劍閣以拒會水經注小劍戍西去大劍山三十里連山絶險飛閣通衢故謂之劍閣華陽國志曰廣漢郡德陽縣有劍閣道三十里至險祝穆曰劍門漢屬廣漢郡為葭萌縣地蜀先主以霍峻為梓潼太守有劍閣縣苻秦使徐成寇蜀攻二劍克之始有二劍之號四年安國元侯高柔卒四年冬十月漢人告急於吳甲申吳主使大將軍丁奉督諸軍向壽春將軍留平就施績於南郡議兵所向將軍丁封孫異如沔中以救漢沔中時為魏境吳兵未能至也擬其所向耳吳之巫秭歸等縣皆在江北與魏之新城接境自此行兵亦可以發沔中然亦猶激西江之水以救涸轍之魚耳四年詔以征蜀諸將獻捷交至復命大將軍昭進位爵賜一如前詔復扶又翻昭乃受命始受相國晉公九錫之命昭辟任城魏舒為相國參軍任音壬初舒少時遲鈍章甲十一行本鈍下有質朴二字乙十一行本同孔本同張校同不為鄉親所重鄉里親戚也少詩照翻有名當世從才用翻亦不知之使守水碓為碓水側置輪碓後以橫木貫輪橫木之兩頭復以木長二尺許交午貫之正直碓尾木激水灌輪輪轉則交午木戛擊碓尾木而自舂不煩人力謂之水碓碓都內翻舒堪數百戶長謂小邑長也長知兩翻舒亦不以介意不為皎厲之事皎者求以暴白於世厲危行也卿終當為台輔常振其匱乏舒受而不辭年四十餘郡舉上計掾上時掌翻掾于絹翻察孝廉宗黨以舒無學業勸令不就可以為高舒曰若試而不中中竹仲翻其負在我安可虛竊不就之高以為己榮乎於是自課百日習一經因而對策升第纍遷後將軍鍾育長史育每與參佐射參佐參軍及諸佐吏也育余六翻射之畫籌猶投壺之釋算也為于偽翻下徐為同以舒滿數射以兩人為朋射之有朋猶古射儀之有耦也周禮王以六耦射三侯諸侯以四耦射二侯卿大夫以三耦射一侯士以三耦射犴侯左傳魯襄公享范獻子射者三耦公臣不足取於家臣杜預注云二人為耦發無不中中竹仲翻舉坐愕然莫有敵者坐徂臥翻育歎而謝曰吾之不足以盡卿才有如此射矣豈一事哉及為相國參軍府朝碎務未嘗見是非府朝猶言府庭也朝直遙翻見賢遍翻衆人莫能斷者斷丁亂翻舒徐為籌之多出衆議之表昭深器重之四年癸卯立皇后卞氏昭烈將軍秉之孫也四年鄧艾進至陰平簡選精鋭欲與諸葛緒自江油趣成都水經注涪水出廣漢屬國剛氐道徼外東南流徑帛丿糸竹縣北又東南徑江油戍北鄧艾自陰平景谷步道懸兵束馬入蜀徑江油廣漢者也宋白曰龍州江油郡北踰山至文州三百三十里文州漢陰平地也鄧艾自陰平行無人之地七百里至江油即此九域志龍州北至文州四百三十里元豐九域志龍州治江油縣南至綿州二百餘里西行非本詔遂引軍向白水此白水關也賢曰在今梁州金牛縣西東北至關城百八十里會欲專軍勢密白緒畏懦不進檻車徵還軍悉屬會薑維列營守險會攻之不能克糧道險遠軍食乏欲引還鄧艾上言賊已摧折宜遂乘之若從陰平由邪徑經漢德陽亭按前漢無德陽縣後漢志廣漢郡始有德陽縣蓋因漢故亭而置縣也自蜀分廣漢置梓潼郡之後劍閣縣屬梓潼德陽縣屬廣漢續漢志以為德陽縣有劍閣今薑維守劍閣拒鍾會而鄧艾欲從德陽亭趣涪則此時分為兩縣明矣然德陽亭亦非此時德陽縣治蓋前漢德陽亭故處也此道即所謂陰平景谷道趣七喻翻涪音浮出劍閣西百里去成都三百餘里奇兵衝其腹心出其不意劍閣之守必還赴涪則會方軌而進劍閣之軍不還則應涪之兵寡矣趣七喻翻涪音浮遂自陰平行無人之地七百餘里鑿山通道造作橋閣今隆慶府陰平縣北六十里有馬閣山峻峭崚嶒極為艱險鄧艾軍行至此路不得通乃懸車束馬造作棧閣始通江油因名馬閣又自文州青塘嶺至龍州百五十里自北而南者右肩不得易所負謂之左擔路亦艾伐蜀路也據鍾會傳艾自漢德陽亭入江油左擔道則德陽亭蓋當馬閣山之路至為艱險又糧運將匱瀕於危殆艾以氈自裹推轉而下推吐雷翻將士皆攀木緣崖魚貫而進山崖險狹單行相繼而進如貫魚然江油今龍州江油縣地南至綿州二百餘里綿州古涪城也降戶江翻下同諸葛瞻督諸軍拒艾至涪停住不進陳壽曰涪去成都三百六十里權之子也黃權劉璋所用先主伐吳而敗權隔在江北遂降魏無令敵得入平地瞻猶豫未納崇再三言之至于流涕瞻不能從艾遂長驅而前擊破瞻前鋒瞻退住帛丿糸竹帛丿糸竹縣屬廣漢郡今綿竹縣東北至綿州百餘里若降者必表為琅邪王諸葛氏本琅邪人故以此誘之誘音酉斬艾使列陳以待艾使疏吏翻陳讀曰陳下同艾遣子惠唐亭侯忠出其右司馬師纂等出其左忠纂戰不利並引還曰賊未可擊艾怒曰存亡之分在此一舉何不可之有叱忠纂等將斬之忠纂馳還更戰大破斬瞻及黃崇瞻子尚歎曰父子荷國重恩荷下可翻不早斬黃皓使敗國殄民用生何為策馬冒陳而死杜佑曰漢州德陽縣鄧艾破諸葛瞻於此因為京觀敗補邁翻漢人不意魏兵卒至不為城守調度卒讀曰猝調徒弔翻聞艾已入平土百姓擾擾皆迸山澤不可禁制迸比孟翻漢主使㣥臣會議或以蜀之與吳本為與國宜可奔吳或以為南中七郡南中七郡越巂朱提牂柯雲南興古建寧永昌也易以自守易以豉翻宜可奔南光祿大夫譙周以為自古以來無寄他國為天子者若入吳國亦當臣服且治政不殊則大能吞小此數之自然也治直吏翻由此言之則魏能並吳吳不能並魏明矣等為稱臣為小孰與為大為于偽翻再辱之恥何與一辱謂今降魏一辱而已若奔吳稱臣是一辱矣與吳俱亡又將臣服於魏是為再辱則當早為之計然後可果果決也克也禍敗將及㣥小之心無一可保恐發足之日其變不測何至南之有乎謂衆心已離既行之後中道潰散必不能至南中今艾已不遠恐不受降如之何降戶江翻下同周曰方今東吳未賓事勢不得不受受之不得不禮若陛下降魏魏不裂土以封陛下者周請身詣京都京都謂洛陽魏都晉景王諱師晉人避之率謂京師為京都蜀方議降譙周已為晉人諱矣吁張古作大義爭之衆人皆從周議漢主猶欲入南狐疑未決周上疏曰南方遠夷之地平常無所供為言其民既不出稅租以供上用又不出力為上有所施為自丞相亮以兵威逼之窮乃率從事見七十卷文帝黃初六年數所角翻今若至南外當拒敵內供服御費用張廣他無所取耗損諸夷其叛必矣漢主乃遣侍中張紹等奉璽綬以降於艾璽斯氏翻綬音受北地王諶怒曰若理窮力屈禍敗將及便當父子君臣背城一戰同死社稷以見先帝可也諶時壬翻背蒲妹翻奈何降乎漢主不聽是日諶哭於昭烈之廟先殺妻子而後自殺曾謂庸禪有子如此乎張紹等見鄧艾於雒雒縣屬廣漢郡西南至成都八十餘里報書褒納漢主遣太僕蔣顯別敕薑維使降鍾會又遣尚書郎李虎送士民簿於艾戶二十八萬口九十四萬甲士十萬二千吏四萬人艾至成都城北漢主率太子諸王及㣥臣六十餘人面縛輿櫬詣軍門杜預曰面縛縛手於後唯見其面也櫬棺也示將受死櫬初覲翻後主時年四十八延請相見檢御將士無得虜略綏納降附使復舊業輒依鄧禹故事承制拜漢王禪行驃騎將軍太子奉車諸王駙馬都尉漢㣥司各隨高下拜為王官或領艾官屬依鄧禹承制授隗囂故事也後艾由此得罪驃匹妙翻隴西太守牽弘等領蜀中諸郡艾聞黃皓姦險收閉將殺之皓賂艾左右卒以得免卒子恤翻薑維等聞諸葛瞻敗未知漢主所嚮乃引軍東入于巴巴即巴中也遣胡烈等追維維至郪郪縣屬廣漢郡劉昫曰梓州飛烏縣漢郪縣地隋取飛烏山以名縣師古曰郪音妻又音千私翻乃令兵悉放仗送節傳於胡烈傳株戀翻自從東道與廖化張翼董厥等同詣會降將士咸怒拔刀斫石觀此則蜀之將士豈肯下人哉其主不能用之耳圍守即魏延所置漢中諸圍之守兵也皆權還其印綬節蓋漢先主以獻帝建安十九年得蜀魏文帝黃初二年即帝位傳二世四十三年而亡四年吳人聞蜀已亡乃罷丁奉等兵吳中書丞吳郡華核魏有中書監令無中書丞此官蓋吳置也華戶化翻核戶革翻伏聞成都不守臣主播越社稷傾覆失委附之土棄貢獻之國臣以草芥竊懷不寧陛下聖仁恩澤遠撫卒聞如此必垂哀悼臣不勝忡悵之情卒讀曰猝勝音升忡丑中翻憂也謹拜表以聞左傳楚人滅江秦伯為之降服出次不舉過數大夫諫公曰同盟滅敢不矜乎吾自懼也蜀吳之與國蜀亡岌岌乎為吳矣吳之君臣不知懼故華核拜表以警之魏之伐蜀也吳人或謂襄陽張悌曰司馬氏得政以來大難屢作難乃旦翻謂王淩毋丘儉諸葛誕舉兵也百姓未服今又勞力遠征敗於不暇何以能克悌曰不然曹操雖功蓋中夏夏戶雅翻民畏其威而不懷其德也丕睿承之刑繁役重東西驅馳無有寧歲司馬懿父子纍有大功除其煩苛而布其平惠為之謀主而救其疾苦民心歸之亦已久矣故淮南三叛而腹心不擾邵陵厲公嘉平元年王淩叛高貴鄉公正元元年毌丘儉叛甘露二年諸葛誕叛四方不動任賢使能各盡其心其本根固矣姦計立矣今蜀閹宦專朝朝直遙翻國無政令而玩戎黷武民勞卒敝競於外利不修守備彼強弱不同智算亦勝因危而伐殆無不克噫彼之得志我之憂也吳人笑其言至是乃服四年吳人以武陵五溪夷與蜀接界蜀亡懼其叛亂乃以越騎校尉鍾離牧領武陵太守魏已遣漢葭縣長郭純試守武陵太守率涪陵民入遷陵界沈約曰漢獻帝建安六年劉璋以涪陵縣分立丹興漢葭二縣立巴東屬國都尉後為涪陵郡遷陵縣屬武陵郡吳境也長知兩翻誘動諸夷進攻酉陽赤沙蓋在遷陵酉陽之間酉陽縣屬武陵郡縣在酉溪之陽劉昫曰黔州彭水縣漢酉陽縣地吳分酉陽置黔陽郡隋於郡置彭水縣尋為黔州九域志曰漢武陵郡酉陽縣古城在今辰州界杜佑曰思州治務川縣亦漢酉陽地牧問朝吏曰朝郡朝也朝直遙翻西蜀傾覆邊境見侵何以禦之皆對曰今二縣山險諸夷阻兵不可以軍驚擾驚擾則諸夷盤結宜以漸安可遣恩信吏宣教慰勞勞力到翻牧曰章甲十一行本曰下有不然二字乙十一行本同孔本同張校同外境內侵誑誘人民誑居況翻當及其根柢未深而撲取之柢典禮翻又丁計翻撲普卜翻此救火貴速之勢也敕外趣嚴趣讀曰促嚴裝也撫夷將軍高尚謂牧曰昔潘太常督兵五萬然後討五溪夷事見七十二卷明帝太和五年諸夷率化今既無往日之援而郭純已據遷陵而明府欲以三千兵深入尚未見其利也牧曰非常之事何得循舊即帥所領晨夜進道帥讀曰率緣山險行垂二千里斬惡民懷異心者魁帥百餘人帥所類翻及其支黨凡千餘級純等散走五溪皆平四年十二月庚戌以司徒鄭沖為太保四年壬子分益州為梁州益州統蜀犍為汶山漢嘉江陽朱提越巂牂柯梁州統漢中梓潼廣漢涪陵巴巴西巴東梁古州也言西方金剛之氣強梁故因名焉四年癸丑特赦益州士民復除租稅之半五年復方目翻四年乙卯以鄧艾為太尉增邑二萬戶鍾會為司徒增邑萬戶賞平蜀之功也四年皇太后郭氏殂四年鄧艾在成都頗自矜伐謂蜀士大夫諸君賴遭艾故得有今日耳如遇吳漢之徒已殄滅矣吳漢屠成都事見四十二卷漢光武建武十二年兵有先聲而後實者漢初李左車以是説韓信艾祖其説以言於晉公司馬昭既受封錫遂書其爵吳人震恐席卷之時也然大舉之後將士疲勞不可便用且徐緩之留隴右兵二萬人蜀兵二萬人煮鹽興冶為軍農要用蜀有鹽井朱提出銀嚴道邛都出銅武陽南安臨邛沔陽皆出鐵漢置鹽官鐵官艾欲復其利豫為順流之事然後發使告以利害吳必歸化可不征而定也使疏吏翻今宜厚劉禪以致孫休封禪為扶風王錫其資財供其左右郡有董卓塢董卓築塢於扶風郿縣爵其子為公侯食郡內縣以顯歸命之寵開廣陵城陽以待吳人開廣陵城陽為王國以待孫休也廣陵屬徐州城陽屬青州蓋魏廣陵郡治淮陰故城城陽郡治莒二郡壤界實相接也望風而從矣昭使監軍衛瓘喻艾事當須報不宜輒行艾重言曰重直用翻銜命征行奉指授之策元惡既服至於承制拜假以安初附謂合權宜今蜀舉衆歸命地盡南海南中之地東南帶海接于交趾宜早鎮定若待國命往復道途延引日月春秋之義大夫出疆有可以安社稷利國家專之可也春秋公羊傳之言勢與蜀連不可拘常以失事機兵法進不求名退不避罪孫子曰將之至任不可不察也進不求名退不避罪唯人是保而利於主國之寶也終不自嫌以損國家計也鍾會內有異志薑維知之欲搆成擾亂乃説會曰聞君自淮南已來算無遺策謂平諸葛誕也説輸芮翻皆君之力今復定蜀復扶又翻威德振世民高其功主畏其謀欲以此安歸乎何不法陶朱公泛舟絶迹全功保身邪越大夫范蠡既與越王句踐滅吳以雪會稽之恥乃扁舟五湖泛海而止於陶欲絶其迹乃號曰陶朱公君言遠矣我不能行且為今之道或未盡於此也維曰其他則君智力之所能無煩於老夫矣言為亂也維之智固足以玩弄鍾會於掌股之上迫於時制於命奈之何哉好呼到翻出則同輿坐則同席會因鄧艾承制專事乃與衛瓘密白艾有反狀會善效人書於劍閣要艾章表白事要一遙翻章表上之魏朝白事白之晉公皆易其言令辭指悖傲多自矜伐悖蒲內翻又蒲沒翻又毀晉公昭報書手作以疑之既以怒昭又以疑艾咸熙元年甲申二六四是年五月始改元咸熙此猶是景元五年四年春正月壬辰詔以檻車徵鄧艾晉公昭恐艾不從命敕鍾會進軍成都又遣賈充將兵入斜谷斜昌遮翻谷音浴又古祿翻昭自將大軍從帝幸長安將即亮翻以諸王公皆在鄴乃以山濤為行軍司馬鎮鄴楚王彪之死盡録諸王公置鄴事見七十五卷邵陵厲公嘉平三年行軍司馬之號始此初鍾會以才能見任昭夫人王氏言於昭曰昭夫人王氏肅之女也生晉武帝齊王攸後諡文明皇后會見利忘義好為事端好呼到翻寵過必亂不可大任及會將伐漢西曹屬邵悌言於晉公曰自漢以來丞相有東西曹掾屬今遣鍾會率十餘萬衆伐蜀愚謂會單身無任魏制凡遣將帥皆留其家以為質任會單身無子弟故曰單身無任晉公笑曰我寧不知此邪蜀數為邊寇師老民疲我今伐之如指掌耳指掌言易也數所角翻夫人心豫怯則智勇並竭智勇並竭而強使之強其兩翻適所以為敵禽耳惟鍾會與人意同今遣會伐蜀蜀必可滅滅蜀之後就如卿慮何憂其不能辦邪言會若為亂自能辦之也遺民震恐不足與共圖事中國將士各自思歸不肯與同也會若作惡作為也惡不善也作惡作亂也所為不善也卿不須憂此慎勿使人聞也及晉公將之長安悌復曰鍾會所統兵五六倍於鄧艾但可敕會取艾不須自行晉公曰卿忘前言邪忘巫放翻而云不須行乎雖然所言不可宣也我要自當以信意待人但人不當負我耳我豈可先人生心哉先悉薦翻近日賈護軍問我頗疑鍾會不賈護軍賈充也時為中護軍不讀曰否寧可復疑卿邪復扶又翻賈亦無以易我語也我到長安則自了矣了辦也決也鍾會遣衛瓘先至成都收鄧艾會以瓘兵少欲令艾殺瓘因以為艾罪瓘知其意然不可得距瓘監艾會軍遣之收艾是以職分使之故不可得而距檄艾所統諸將稱奉詔收艾其餘一無所問若來赴官軍爵賞如先謂復加爵賞如先平蜀時也誅及三族比至雞鳴比必寐翻悉來赴瓘唯艾帳內在焉平旦開門瓘乘使者車續漢志有大使車小使車諸使車大使車立乘駕駟赤帷持節者重導從賊曹車斧車督車功曹車皆兩大車伍伯璅弩十二人辟車四人從車四乘無節單導從者減半小使車不立乘有騑赤屏泥油重絳帷導無斧車近小使車蘭輿赤轂白蓋赤帷從騶騎四十人此謂追捕考案有所敕取者之所乘也諸使車皆朱班輪四輻赤衡軛艾尚臥未起遂執艾父子置艾於檻車諸將圖欲劫艾整仗趣瓘營趣七喻翻瓘輕出迎之偽作表草將申明艾事詭言將申明艾無反心丙子會至成都送艾赴京師會所憚惟艾艾父子既禽會獨統大衆威震西土遂決意謀反會欲使薑維將五萬人出斜谷為前驅會自將大衆隨其後既至長安令騎士從陸道步兵從水道順流浮渭入河以為五日可到孟津與騎兵會洛陽一旦天下可定也談何容易恐鄧艾或不就徵今遣中護軍賈充將步騎萬人徑入斜谷屯樂城諸葛亮所築成固之樂城也相見在近會得書驚呼所親語之曰但取鄧艾相國知我獨辦之謂昭知會之足以辦取艾之事語牛倨翻大讀曰太必覺我異矣異變也事成可得天下不成退保蜀漢不失作劉備也蜀漢謂漢蜀郡漢中郡之地丁丑會悉請護軍郡守牙門騎督以上此皆從會軍在成都者也為太后發哀於蜀朝堂明元郭太后去年殂蜀都成都有朝堂朝直遙翻使會起兵廢司馬昭皆班示坐上人坐徂臥翻使下議訖書版署置更使所親信代領諸軍所請㣥官悉閉著益州諸曹屋中著直略翻城門宮門皆閉嚴兵圍守衛瓘詐稱疾篤出就外廨廨古隘翻舍也會信之無所復憚薑維欲使會盡殺北來諸將己因殺會盡坑魏兵復立漢主密書與劉禪曰願陛下忍數日之辱臣欲使社稷危而復安日月幽而復明薑維之心始終為漢千載之下炳炳如丹陳壽孫盛干寶之譏貶皆非也猶豫未決會帳下督丘建風俗通丘魯左丘明之後又云齊太公封於營丘支孫以地為氏會愛信之建愍烈獨坐啓會使聽內一親兵出取飲食諸牙門隨例各內一人烈紿語親兵及疏與子淵曰丘建密説消息會已作大坑白棓數千紿徒亥翻語牛倨翻棓步項翻欲悉呼外兵入人賜白帢帢魏武帝所製狀如辨缺四角帢苦洽翻將即亮翻以次棓殺內坑中諸牙門親兵亦咸説此語一夜轉相告皆遍己卯日中胡淵率其父兵雷鼓出門雷盧對翻諸軍不期皆鼓譟而出曾無督促之者而爭先赴城時會方給薑維鎧杖杖與仗同直亮翻白外有胸胸聲似失火者胸許容翻又許勇翻毛晃曰胸胸喧擾之聲有頃白兵走向城會驚謂維曰兵來似欲作惡當云何維曰但當擊之耳會遣兵悉殺所閉諸牙門郡守內人共舉機以拄門內人謂會所閉在屋內者機舉綺翻機案也不能破斯須城外倚梯登城斯此也須待也言其間無多時於此可待也蟻附亂進矢下如雨牙門郡守各緣屋出與其軍士相得薑維率會左右戰手殺五六人衆格斬維爭前殺會考異曰衛瓘傳曰會留瓘謀議乃書版云欲殺胡烈等舉以示瓘不許因相疑二瓘如廁見胡烈故給使使宣語三軍言會反會逼瓘定議經宿不眠各橫刀膝上在外諸軍已潛欲攻會瓘既不出未敢先發會使瓘慰勞諸軍瓘便下殿會悔遣之使呼瓘瓘辭眩疾動詐仆地比出閣數十信追之瓘至外廨服鹽湯大吐會遣所親人及醫視之皆言不起會由是無所憚及暮門閉瓘作檄宣告諸軍並已唱義陵旦共攻會殺之常璩華陽國志曰會命諸將發喪因欲誅之諸將半入而南安太守胡烈等知其謀燒成都東門以襲殺會及維今從魏志又世語曰維死時見剖膽如斗大如斗非身所能容恐當作升殺漢太子璿及薑維妻子軍衆鈔略死喪狼籍璿從宣翻鈔楚交翻衛瓘部分諸將數日乃定分扶問翻鄧艾本營將士追出艾於檻車迎還衛瓘自以與會共陷艾恐其為變乃遣護軍田續等將兵襲艾遇於帛丿糸竹西斬艾父子艾之入江油也田續不進艾欲斬續既而捨之及瓘遣續謂曰可以報江油之辱矣鎮西長史杜預言於衆曰伯玉其不免乎衛瓘行鎮西軍司而杜預為鎮西長史則為同僚而軍事則瓘任之也瓘字伯玉位望已高既無德音又不御下以正謂激田續使報鄧艾而行其私也瓘聞之不候駕而謝預預恕之子也杜恕見七十三卷明帝景初元年徙其妻及孫於西城西城縣屬魏興郡為晉武帝敘艾孫灼張本鍾會兄育嘗密言於晉公曰會挾術難保不可專任及會反育已卒卒子恤翻晉公思鍾繇之勳與育之賢鍾繇有定關中之功官爵如故裴松之曰辿敕連翻會功曹向雄收葬會尸晉公召而責之曰往者王經之死卿哭於東市而我不問事見上卷景元元年又輒收葬若復相容當如王法何復扶又翻雄曰昔先王掩骼埋胔仁流朽骨記月令孟春之月掩骼埋胔鄭玄注曰骨枯曰骼肉腐曰胔陸德明曰露骨曰骼有肉曰胔骼江百翻胔才賜翻周文王澤及朽骨今王誅既加於法已備雄感義收葬教亦無闕法立於上教弘於下以此訓物不亦可乎何必使雄背死違生以立於世背蒲妹翻明公讎對枯骨言會已誅晉公復以枯骨為讎對不令收葬豈仁賢之度哉晉公悅與宴談而遣之四年二月丙辰車駕還洛陽四年庚申葬明元皇后四年初劉禪使巴東太守襄陽羅憲將兵二千人守永安姓譜羅本顓頊末胤受封於羅國今房州也為楚所滅子孫以為氏譙周巴記曰漢獻帝初平六年益州司馬趙韙建議分巴郡諸縣漢安以下為永寧郡建安六年劉璋改永寧為巴東郡治魚復縣蜀先主章武二年改魚復曰永安吏民驚擾憲斬稱成都亂者一人百姓乃定及得禪手敕乃師所統臨于都亭三日帥讀曰率都亭永安之都亭也臨力鴆翻吳聞蜀敗起兵西上上時掌翻外託救援內欲襲憲憲曰本朝傾覆朝直遙翻吳為脣齒不恤我難而背盟徼利難乃旦翻徼一遙翻不義甚矣且漢已亡吳何得久我寧能為吳降虜乎降戶江翻保城繕甲告誓將士厲以節義莫不憤激吳人聞鍾鄧勝百城無主有兼蜀之志而巴東固守兵不得過乃使撫軍步協率衆而西協步騭子吳以為撫軍將軍遣參軍楊宗突圍北出告急於安東將軍陳騫又送文武印綬任子詣晉公協攻永安憲與戰大破之吳主怒復遣鎮軍陸抗等帥衆三萬人增憲之圍時吳以陸抗為鎮軍將軍都督西陵帥讀曰率四年三月丁丑以司空王祥為太尉征北將軍何曾為司徒左僕射荀顗為司空顗魚豈翻四年己卯進晉公爵為王增封十郡高貴鄉公甘露三年晉公始封八郡帝景元之三年加封同州之弘農雍州之馮翊凡十郡今又增封十郡凡二十郡顗魚豈翻顗謂祥曰相王尊重何侯與一朝之臣何侯謂何曾一朝之臣謂舉魏朝之臣也朝直遙翻下同今日便當相率而拜無所疑也祥曰相國雖尊要是魏之宰相吾等魏之三公王公相去一階而已安有天子三公可輒拜人者損魏朝之望虧晉王之德君子愛人以禮我不為也及入顗遂拜而祥獨長揖王謂祥曰今日然後知君見顧之重也四年劉禪舉家東遷洛陽時擾攘倉猝禪之大臣無從行者薑維既死張翼廖化董厥必亦死於亂兵矣禪賴正相導宜適舉動無闕宜當也適亦當也禪初入洛見魏君臣其禮各有所當嗚呼使正束帶立於朝上而擯贊漢主下而與賓客言事事合宜而無闕失豈非人臣之至願哉恨知正之晚初漢建寧太守霍弋都督南中建寧漢益州郡也蜀後主建興元年改建寧郡治味縣欲赴成都劉禪以備敵既定不聽成都不守弋素服大臨三日臨力鴆翻諸將咸勸弋宜速降降戶江翻下同弋曰今道路隔塞塞悉則翻未詳主之安危去就大故不可苟也若魏以禮遇主上則保境而降不晚也若萬一危辱吾將以死拒之何論遲速邪得禪東遷之問始率六郡將守上表曰南中七郡而此言六郡者蓋越巂已降魏也將即亮翻守式又翻臣聞人生在三事之如一惟難所在則致其命無父母烏生無君烏以為生所謂人生在三也難乃旦翻守死無所是以委質不敢有二質如字拜南中都尉委以本任丁亥封劉禪為安樂公晉志安樂屬燕國樂音洛下間樂同晉王與禪宴為之作故蜀技蜀技蜀樂也如巴渝舞之類也為于偽翻下同技與伎同渠綺翻而禪喜笑自若王謂賈充曰人之無情乃至於此雖使諸葛亮在不能輔之久全況薑維邪他日王問禪曰頗思蜀否禪曰此間樂不思蜀也郤正聞之謂禪曰若王後問宜泣而答曰先人墳墓遠在岷蜀乃心西悲無日不思西悲用詩東山語此儒生之搜章摘句也會王復問復扶又翻禪對如前王曰何乃似郤正語邪禪驚視曰誠如尊命左右皆笑四年夏四月新附督王稚浮海入吳句章新附督蓋以吳人新附者別為一部置督以領之句章縣屬會稽郡賢曰句章故城在今鄮縣西長知兩翻四年五月庚申晉王奏復五等爵封騎督以上六百餘人賞平蜀之功也周制列爵五等公侯地方百里伯七十里子男五十里秦廢五等爵漢列侯以戶為差獻帝建安二十年魏王操置名號侯以賞軍功虛封自此始矣今雖復五等爵亦虛封也騎奇寄翻四年甲戌改元始改元咸熙四年癸未追命舞陽文宣侯懿為晉宣王忠武侯師為景王四年羅憲被攻凡六月被皮義翻救援不到城中疾病太半或説憲棄城走説輸芮翻下布説同憲曰吾為城主百姓所仰危不能安急而棄之君子不為也畢命於此矣陳騫言於晉王遣荊州刺史胡烈將步騎二萬攻西陵以救憲秋七月吳師退晉王使憲因仍舊任加陵江將軍沈約志魏置陵江將軍為四十號之首言欲陵駕江流以蕩平吳會也四年晉王奏使司空荀顗定禮儀中護軍賈充正法律尚書僕射裴秀議官制太保鄭沖總而裁焉四年吳分交州置廣州漢武帝元鼎六年開百越置交趾州刺史治龍編獻帝建安八年改曰交州治蒼梧廣信縣十六年徙治南海番禺縣至是分為二州廣州治番禺交州還治龍編四年吳主寢疾口不能言乃手書呼丞相濮陽興入令子出拜之讀如彎休把興臂指以託之癸未吳主殂諡曰景帝年三十吳人以蜀初亡交趾攜叛謂呂興反也欲得長君長知兩翻左典軍萬彧嘗為烏程令與烏程侯哠相善稱晧之才識明斷長沙桓王之儔也孫策諡長沙桓王斷丁亂翻奉遵法度好呼到翻屢言之於丞相興左將軍布興布説朱太后欲以晧為嗣朱后曰我寡婦人安知社稷之慮苟吳國無隕宗廟有賴可矣賴恃也利也改元元興大赦晧字元宗孫和之子四年八月庚寅命中撫軍司馬炎副二相國事依五官將故事也四年初鍾會之伐漢也辛憲英謂其夫之從子羊祜曰會在事縱恣非持久處下之道從才用翻處昌呂翻會請其子郎中琇為參軍琇息救翻憲英憂曰他日吾為國憂今日難至吾家矣為于偽翻難乃旦翻琇固請於晉王王不聽憲英謂琇曰行矣戒之軍旅之間可以濟者其惟仁恕乎琇竟以全歸詔章甲十一行本詔上有癸巳二字乙十一行本同孔本同張校同退齋校同以琇嘗諫會反賜爵關內侯琇司馬師夫人之從父弟故以諫會為功而得封四年九月戊午以司馬炎為撫軍大將軍晉志撫軍大將軍位從公班驃騎車騎衛伏波等將軍下四年辛未詔以呂興為安南將軍都督交州諸軍事以南中監軍霍弋遙領交州刺史得以便宜選用長吏弋表遣建寧爨谷為交趾太守爨氏建寧之大姓世為耆帥至隋唐為東爨西爨蠻杜佑曰昆明在越巂西南諸爨所居炅古迥翻又古惠翻孟幹孟通爨能李松王素等將兵助興未至興為其功曹王章甲十一行本王作李乙十一行本同孔本同張校同統所殺四年吳主貶朱太后為景皇后貶其號從夫而自父其父母其母尊母何氏為太后四年冬十月丁亥詔以壽春所獲吳相國參軍事徐紹為散騎常侍水曹掾孫彧為給事黃門侍郎水曹掾吳相府所置吳未嘗置相國魏人以晉王為相國因亦稱吳丞相參軍為相國參軍掾于絹翻使疏吏翻其家人在此者悉聽自隨不必使還以開廣大信言吳不必使還以廣中國之信攜吳人之心諭以禍福四年初晉王娶王肅之女生炎及攸以攸繼景王後司馬師諡景王多才藝清和平允名聞過於炎聞音問晉王愛之常曰天下者景王之天下也吾攝居相位百年之後大業宜歸攸炎立髮委地手垂過膝膝與膝同人有相否因以異相示之從千容翻相息亮翻秀由是歸心羊琇與炎善為炎畫策察時政所宜損益為于偽翻皆令炎豫記之以備晉王訪問晉王欲以攸為世子山濤曰廢長立少違禮不祥長知兩翻少詩照翻賈充曰中撫軍有君人之德不可易也何曾裴秀曰中撫軍聰明神武有超世之才人望既茂天表如此固非人臣之相也相息亮翻晉王由是意定丙午立炎為世子為晉武帝不能容齊王攸張本四年吳主封太子及其三弟皆為王弟名音如兕觥之觥次名壾壾音如草莽之莽次名先女先女音如褒衣下寬大之褒皆吳主休自作名字四年初吳主之立發優詔恤士民開倉廩振貧乏科出宮女以配無妻者科條也當時翕然稱為明主及既得志粗暴驕盈多忌諱好酒色好呼到翻大小失望濮陽興張布竊悔之或譖諸吳主十一月朔興布入朝朝直遙翻吳主執之徙於廣州道殺之夷三族以后父滕牧為衛將軍録尚書事牧胤之族人也滕胤為孫綝所殺四年是歲罷屯田官置屯田官事見六十二卷漢獻帝建安元年王崇武標點容肇祖聶崇岐覆校
