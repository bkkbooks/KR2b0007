body:
  text: 資治通鑑卷第一百六十六端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注梁紀二十二梁王察即皇帝位於江陵敬皇帝諱方智字慧相小字法真元帝第九子也諡法夙夜警戒曰敬紹泰元年乙亥五五五是年十月方改元梁王察即皇帝位於江陵春正月壬午朔邵陵太守劉棻將兵援江陵吳孫晧寶鼎元年分零陵北部都尉置邵陵郡隋廢邵陵郡為邵陽縣屬長沙郡唐為邵州棻符分翻將即亮翻部曲宋文徹殺之帥其衆還據邵陵帥讀曰率梁王察即皇帝位於江陵梁王察即皇帝位於江陵察字理孫梁昭明太子之第三子也考異曰周書察傳云察在位八載保定二年薨然則察雖以甲戌年為魏所立乙亥年乃即位改元也追尊昭明太子為昭明皇帝廟號高宗蔡氏為昭德皇后尊其母龔氏為皇太后立妻王氏為皇后子巋為皇太子巋區韋翻又苦鬼翻又丘愧翻賞刑制度並同王者唯上疏於魏則稱臣奉其正朔上時掌翻至於官爵其下亦依梁氏之舊其勳級則兼用柱國等名勳級置以賞功柱國魏所置也為勳級之首參掌選事選須絹翻外兵參軍太原王操為五兵尚書大寶嚴整有智謀雅達政事雅素也後梁主推心任之以為謀主比之諸葛孔明操亦亞之追贈邵陵王綸太宰諡曰壯武邵陵王綸死於大寶二年諡曰武桓河東王譽死於大寶元年魏永壽為巴州刺史武州巴州皆置於江陵之南岸二將尋為侯平所擒不能有二州也梁王察即皇帝位於江陵湘州刺史王琳將兵自小桂北下據姚思廉陳書小桂嶺名輿地志連州桂陽縣漢屬桂陽郡所謂小桂也蓋漢臨蒸縣古城也在衡州界為世祖發哀三軍縞素為于偽翻縞古老翻遣別將侯平帥舟師攻後梁帥讀曰率琳屯兵長沙傳檄州郡為進取之計長沙王韶及上遊諸將皆推琳為盟主梁王察即皇帝位於江陵齊主使清河王嶽將兵攻魏安州五代志安陸郡西魏置安州嶽至義陽江陵陷因進軍臨江郢州刺史陸法和及儀同三司宋蒞舉州降之降戶江翻考異曰北史宋蒞作宋茝今從北齊紀又北齊紀云壬寅嶽渡江克夏首送法和按典略甲午齊已召嶽還今從典略長史江夏太守王珉不從殺之夏戶雅翻甲午齊召嶽還使儀同三司清都慕容儼戍郢州北齊書慕容儼清都武安人皓之後也按魏收地形志東魏都鄴以魏郡置魏尹武安縣屬焉五代志齊官有清都尹蓋改魏尹為清都尹也考異曰梁紀四月法和降齊使侯瑱討之按齊主與王僧辨書云清河王嶽今次漢口與陸居士相會然則法和先已降齊也今從典略任約徐世譜宜豐侯循皆引兵會之瑱他甸翻又音鎮任音壬梁王察即皇帝位於江陵辛丑齊立貞陽侯淵明為梁主使其上黨王渙將兵送之寒山之敗貞陽沒於齊武帝太清二年徐陵使魏魏禪於齊而梁又有侯景之亂是以留北湛海珍降見一百六十二卷三年梁王察即皇帝位於江陵二月癸丑晉安王至自尋陽入居朝堂朝直遙翻即梁王位時年十三以太尉王僧辨為中書監録尚書驃騎大將軍都督中外諸軍事驃匹妙翻騎奇寄翻加陳霸先征西大將軍以南豫州刺史侯瑱為江州刺史湘州刺史蕭循為太尉廣州刺史蕭勃為司徒鎮東將軍張彪為郢州刺史梁王察即皇帝位於江陵齊主先使殿中尚書邢子才馳傳詣建康與王僧辨書以為嗣主沖藐傳張戀翻藐亡沼翻未堪負荷荷下可翻又如字彼貞陽侯梁武猶子長沙之胤貞陽雖為縲臣於齊而貞陽侯則梁爵也故與僧辨書稱彼貞陽侯淵明長沙王懿之子武帝兄子故曰猶子堪保金陵故置為梁主納於彼國卿宜部分舟艦迎接今主分扶問翻艦戶黯翻並心一力善建良圖乙卯貞陽侯淵明亦與僧辨書求迎僧辨復書曰嗣主體自宸極受於乂祖乂當作文蓋用受終于文祖事章乙十一行本正作文孔本同張校同退齋校同十二行本作父同獎王室朝直遙翻伊呂之任僉曰仰歸意在主盟不敢聞命甲子齊以陸法和為都督荊雍等十州諸軍事太尉大都督西南道大行臺雍於用翻又以宋蒞為郢州刺史蒞弟簉為湘州刺史簉初救翻甲戌上黨王渙克譙郡梁置合州於合肥立南譙郡於襄安縣界襄安漢之巢縣也梁置蘄縣隋改曰襄安唐復曰巢縣己卯淵明又與僧辨書僧辨不從梁王察即皇帝位於江陵魏以右僕射申徽為襄州刺史魏既得梁雍州改曰襄州因襄陽以名州也梁王察即皇帝位於江陵侯平攻後梁巴武二州故劉棻主帥趙朗殺宋文徹以邵陵歸于王琳帥所類翻梁王察即皇帝位於江陵三月貞陽侯淵明至東關散騎常侍裴之橫禦之齊軍司尉瑾儀同三司蕭軌南侵皖城晉熙郡懷寧縣漢之皖城也散悉亶翻騎奇寄翻皖戶板翻降戶江翻齊改晉熙為江州齊晉州治平陽故此晉州改為江州丙戌齊克東關斬裴之橫俘數千人王僧辨大懼出屯姑孰謀納淵明梁王察即皇帝位於江陵丙申齊主還鄴封世宗二子孝珩為廣寧王珩音行延宗為安德王梁王察即皇帝位於江陵孫瑒聞江陵陷棄廣州還瑒雉杏翻又音暢曲江侯勃復據有之去年蕭勃避王琳居始興復扶又翻梁王察即皇帝位於江陵魏太師泰遣王克沈炯等還江南去年江陵陷王克等入長安厚遇之令參掌太史季才散私財購親舊之為奴婢者泰問何能如是對曰僕聞克國禮賢古之道也武王克商釋箕子囚式商容閭封比干墓所謂禮賢也其君信有罪矣江陵楚之故都古郢城及渚宮皆在其地皆為皂隸杜預曰皂隸賤官皂才早翻隸力計翻不敢獻言誠竊哀之故私購之耳泰乃悟曰吾之過也微君遂失天下之望因出令免梁俘為奴婢者數千口梁王察即皇帝位於江陵夏四月庚申齊主如晉陽梁王察即皇帝位於江陵五月庚辰侯平等擒莫勇魏永壽江陵之陷也永嘉王莊生七年矣莊世子方等之子元帝之孫尼女夷翻王琳迎莊送之建康梁王察即皇帝位於江陵庚寅齊主還鄴梁王察即皇帝位於江陵王僧辨遣使奉啓於貞陽侯淵明定君臣之禮又遣別使奉表於齊使疏吏翻以子顯及顯母劉氏弟子世珍為質於淵明質音致考異曰典略三月辛卯遣廷尉張種等送質于鄴按淵明五月始入建康疑太早恐非遣左民尚書周弘正至歷陽奉迎晉武帝太康中置左民尚書唐六典曹魏置左民尚書晉惠帝置右戶尚書唐戶部尚書即左民右戶之任也淵明許之淵明求度衛士三千僧辨慮其為變止受散卒千人散蘇旱翻散卒者宀兒散之卒非敗散之卒也敗散之散去聲庚子遣龍舟法駕迎之淵明與齊上黨王渙盟於江北辛丑自采石濟江考異曰梁紀七月辛丑淵明濟江甲辰入京師北齊紀五月蕭明入建業按典略五月庚子僧辨逆淵明辛丑濟江癸卯至建康今從之齊師北返僧辨疑齊擁楫中流楫與楫同棹也所以撥水行船擁楫附船而不鼓則船定而不進齊侍中裴英起衛送淵明與僧辨會于江寧癸卯淵明入建康望朱雀門而哭逆者以哭對丙午即皇帝位改元天成以晉安王為皇太子王僧辨為大司馬陳霸先為侍中梁王察即皇帝位於江陵六月庚戌朔齊發民一百八十萬築長城自幽州夏口西至恆州九百餘里幽州夏口蓋即居庸下口也幽州軍都縣西北有居庸關濕餘水出上谷沮陽縣之東南流出關謂之下口夏當作下恆戶登翻睿琛之子也趙郡王琛即高永寶歡之弟也永寶琛字監工銜翻琛丑林翻梁王察即皇帝位於江陵齊慕容儼始入郢州而侯瑱等奄至城下儼隨方備禦瑱等不能克乘間出擊瑱等軍大破之間古莧翻城中食盡煮草木根葉及靴皮帶角食之靴許戈翻與士卒分甘共苦堅守半歲人無異志貞陽侯淵明立乃命瑱等解圍瑱還鎮豫章齊人以城在江外難守因割以還梁儼歸望齊主悲不自勝勝音升齊主呼前執其手脫帽看髮歎息久之梁王察即皇帝位於江陵吳興太守杜龕龕苦含翻王僧辨之壻也僧辨以吳興為震州因震澤以為州名又以其弟侍中僧愔為豫章太守愔於今翻梁王察即皇帝位於江陵壬子齊主以梁國稱藩詔凡梁民悉遣南還梁王察即皇帝位於江陵丁卯齊主如晉陽壬申自將擊柔然將即亮翻秋七月己卯至白道留輜重重直用翻帥輕騎五千追柔然壬午及之於懷朔鎮齊主親犯矢石頻戰大破之至于沃野獲其酋長水經注雲中郡有白道嶺白道川帥讀曰率騎奇寄翻酋慈秋翻長知兩翻牛羊數十萬壬申章十二行本申作辰乙十一行本同孔本同張校同退齋校同還晉陽梁王察即皇帝位於江陵八月辛巳王琳自蒸城還長沙梁王察即皇帝位於江陵齊主還鄴以佛道二教不同欲去其一集二家章十二行本家下有學者二字乙十一行本同孔本同論難於前去羌呂翻難乃旦翻遂敕道士皆剃髮為沙門有不從者殺四人乃奉命於是齊境皆無道士今道家有太霄琅書經云人行大道號曰道士士者何理也事也身心順理唯道是從從道為事故曰道士余按此説是道流借吾儒經解大義以演繹道士二字道家雖曰宗老子而西漢以前未嘗以道士自名至東漢始有張道陵于吉等其實與佛教皆起於東漢之時梁王察即皇帝位於江陵初王僧辨與陳霸先共滅侯景見一百六十四卷世祖承聖元年僧辨為子頠娶霸先女好呼到翻為于偽翻頠魚委翻會僧辨有母喪未成婚僧辨居石頭城霸先在京口僧辨推心待之頠兄顗屢諫不聽顗魚豈翻及僧辨納貞陽侯淵明霸先遣使苦爭之使疏吏翻往返數四僧辨不從霸先竊歎謂所親曰武帝子孫甚多唯孝元能復讎雪恥謂誅滅侯景也而忽廢之吾與王公並處託孤之地處昌呂翻而王公一旦改圖外依戎狄援立非次其志欲何所為乎僧辨立淵明名不正而言不順故姦雄得因以為資會有告齊師大舉至壽春將入寇者僧辨遣記室江旰告霸先使為之備霸先因是留旰於京口旰古汗翻舉兵襲僧辨九月壬寅召部將侯安都周文育及安陸徐度錢塘杜稜謀之將即亮翻下同稜以為難霸先懼其謀泄以手巾絞稜今人盥洗以布拭手長七八尺謂之手巾因閉於別室部分將士分扶問翻分賜金帛以弟子著作郎曇朗鎮京口知留府事曇朗霸先母弟休先之子曇徒含翻帥所類翻下同趨七喻翻霸先帥馬步自江乘羅落會之江乘羅落江乘縣之羅落橋自江乘至羅落橋京口趨建康之大路劉裕伐桓玄由此皆發召杜稜與同行知其謀者唯安都等四將外人皆以為江旰徵兵禦齊不之怪也甲辰安都引舟艦將趣石頭艦戶黯翻趣七喻翻霸先控馬未進安都大懼追霸先罵曰今日作賊事勢已成生死須決在後欲何所望若敗俱死後期得免斫頭邪霸先曰安都嗔我乃進霸先控馬踟蹰以觀安都之意見安都決死前向乃進嗔昌真翻恚怒也棄舟登岸石頭城北接岡阜不甚危峻安都被甲帶長刀軍人捧之投於女垣內被皮義翻女垣城上堞也衆隨而入進及僧辨臥室霸先兵亦自南門入僧辨方視事外白有兵俄而兵自內出僧辨遽走遇子頠與俱出閣帥左右數十人苦戰于聽事前聽讀曰廳力不敵走登南門樓拜請求哀霸先欲縱火焚之僧辨與頠俱下就執霸先曰我有何辜公欲與齊師賜討且曰何意全無備僧辨曰委公北門何謂無備京口為建康北門霸先縊殺僧辨父子既而竟無齊兵亦非霸先之譎也譎古穴翻前青州刺史新安程靈洗帥所領救僧辨力戰於石頭西門軍敗霸先遣使招諭久之乃降使疏吏翻降戶江翻霸先深義之以為蘭陵太守使助防京口守式又翻乙巳霸先為檄布告中外列僧辨罪狀且曰資斧所指唯王僧辨父子兄弟其餘親黨一無所問丙午貞陽侯淵明遜位出就邸考異曰梁書九月丙午帝即皇帝位十月己巳大赦改元按長曆丙午九月二十九日己巳十月二十二日豈有即位二十四日始改元大赦乎蓋丙午復梁王位十月乃即帝位耳典略丁未廢貞陽侯出就邸今並從陳書勸進上時掌翻冬十月己酉晉安王即皇帝位大赦改元改元紹泰以貞陽侯淵明為司徒封建安公告齊云僧辨陰圖篡逆故誅之仍請稱臣於齊永為藩國齊遣行臺司馬恭與梁人盟于歷陽梁王察即皇帝位於江陵辛亥齊主如晉陽梁王察即皇帝位於江陵壬子加陳霸先尚書令都督中外諸軍事車騎將軍揚南徐二州刺史癸丑以宜豐侯循為太保建安公淵明為太傅曲江侯勃為太尉王琳為車騎將軍開府儀同三司帝之初為梁王也諸藩皆進官獨不及王琳抑王僧辨雅知王琳之不可制邪梁王察即皇帝位於江陵戊午尊帝所生夏貴為皇太后夏戶雅翻立王氏為皇后梁王察即皇帝位於江陵杜龕恃王僧辨之勢龕苦含翻素不禮於陳霸先在吳興每以法繩其宗族霸先深怨之及將圖僧辨密使兄子蒨還長城長城縣霸先與其宗族世居之晉太康三年分烏程立長城縣屬吳興郡今湖州長興縣是也在湖州西北七十里蒨七見翻僧辨死龕據吳興拒霸先義興太守韋載以郡應之考異曰典略作韋載今從梁陳書今按典略若作韋載則與梁陳書同不須考異矣僧辨之弟也亦據城拒守考異曰南史云僧智奔任約今從典略收兵才數百人杜龕遣其將杜泰將精兵五千奄至將士相視失色將即亮翻下同蒨言笑自若部分益明分扶問翻衆心乃定泰晝夜苦攻數旬不克而退霸先使周文育攻義興義興屬縣卒皆霸先舊兵善用弩韋載收得數十人繫以長鎖命所親監之監工銜翻使射文育軍約曰十射不兩中者死射而亦翻中竹仲翻故每發輒斃一人文育軍稍卻載因於城外據水立柵相持數旬杜龕遣其從弟北叟將兵拒戰從才用翻下同北叟敗歸于義興霸先聞文育軍不利辛未自表東討留高州刺史侯安都石州刺史杜稜宿衛臺省五代志永平郡梁置石州隋後改曰藤州宋白曰藤州治鐔津縣漢猛陵縣也甲戌軍至義興丙子拔其水柵譙秦二州刺史徐嗣徽從弟嗣先僧辨之甥也僧辨死嗣先亡就嗣徽嗣徽以州入于齊五代志江都郡清流縣梁置新昌郡及譙州又六合縣置秦郡及秦州嗣徽密結南豫州刺史任約將精兵五千乘虛襲建康是日襲據石頭遊騎至闕下侯安都閉門藏旗幟示之以弱令城中曰登陴窺賊者斬幟昌志翻陴頻彌翻及夕嗣徽等收兵還石頭安都夜為戰備將旦嗣徽等又至安都帥甲士三百開東西掖門出戰臺城正南端門其左右二門曰東西掖門帥讀曰率嗣徽等奔還石頭不敢復逼臺城復扶又翻陳霸先遣韋載族弟翽齎書諭載翽呼會翻丁丑載及杜北叟皆降降戶江翻霸先厚撫之以翽監義興郡監工銜翻引載置左右與之謀議霸先卷甲還建康卷讀曰捲考異曰梁書十一月庚寅霸先還建康按庚寅十一月十三日太晚且庚寅以前霸先已有在建康與齊相拒事迹今從陳書使周文育討杜龕救長城將軍黃他攻王僧智於吳郡不克霸先使寧遠將軍裴忌助之忌選所部精兵輕行倍道自錢塘直趣吳郡按陳霸先自義興還建康遣裴忌助黃他攻吳郡自錢塘直趣吳郡非路也錢塘必誤趣七喻翻至城下鼓譟薄之薄伯各翻僧智以為大軍至輕舟奔吳興忌入據吳郡因以忌為太守十一月己卯齊遣兵五千渡江據姑孰以應徐嗣徽任約陳霸先使合州刺史徐度立柵於冶城庚寅章乙十一行本寅作辰退齋校同齊又遣安州刺史翟子崇楚州刺史劉士榮淮州刺史柳達摩五代志鍾離郡梁置北徐州齊改曰楚州管下定遠縣梁置安州江都郡山陽縣有淮陰郡東魏置淮州翟直格翻胡墅在大江北岸對石頭城墅神與翻載曰齊師若分兵先據三吳之路略地東境則時事去矣今可急於淮南因侯景故壘築城以通東道轉輸淮南秦淮之南也輸式喻翻下運輸同則章十二行本則上有使進無所資五字乙十一行本同孔本同張校同齊將之首旬日可致將即亮翻霸先從之癸未使侯安都夜襲胡墅考異曰典略作己巳按長曆是月戊寅朔無己巳今從陳書艘蘇遭翻仁威將軍周鐵虎斷齊運輸斷音短擒其北徐州刺史張領州五代志琅邪郡舊置北徐州使杜稜守之航戶剛翻齊人於倉門水南立二柵倉門石頭倉城門水南秦淮水之南壬辰齊大都督蕭軌將兵屯江北梁王察即皇帝位於江陵初齊平秦王歸彥幼孤高祖令清河昭武王嶽養之歸彥高歡族弟也歸彥父徽於歡有舊恩故歡憐其孤而命嶽養之歡廟號高祖歸彥心銜之及顯祖即位歸彥為領軍大將軍大被寵遇被皮義翻嶽謂其德己更倚賴之嶽屢將兵立功有威名而性豪侈好酒色好呼到翻起第於城南城南鄴城之南聽讀曰廳歸彥譖之於帝曰清河僭擬宮禁制為永巷但無闕耳帝由是惡之惡烏路翻帝納倡婦薛氏於後宮倡尺良翻優也嶽先嘗因其姊迎之至第帝夜遊於薛氏家其姊為其父乞司徒為于偽翻帝大怒懸其姊鋸殺之讓嶽以姦嶽不服帝益怒乙亥使歸彥鴆嶽嶽自訴無罪歸彥曰飲之則家全飲之而卒葬贈如禮薛嬪有寵於帝嬪毗賓翻久之帝忽思其與嶽通無故斬首藏之於懷出東山宴飲勸酬始合忽探出其首投於柈上探吐南翻柈蒲官翻支解其尸弄其髀為琵琶一座大驚帝方收取對之流涕曰佳人難再得漢李延年歌曰北方有佳人絶世而獨立一顧傾人城再顧傾人國寧不知傾城與傾國佳人難再得被髮步哭而隨之被皮義翻梁王察即皇帝位於江陵甲辰徐嗣徽等攻冶城柵陳霸先將精甲自西明門出擊之嗣徽等大敗留柳達摩等守城自往采石迎齊援梁王察即皇帝位於江陵以郢州刺史宜豐侯循為太保廣州刺史曲江侯勃為司空並徵入侍循受太保而辭不入勃方謀舉兵遂不受命梁王察即皇帝位於江陵鎮南將軍王琳侵魏魏大將軍豆盧寧禦之姓氏志豆盧本姓慕容氏燕北地王精降魏北人謂歸義為豆盧因賜以為氏梁王察即皇帝位於江陵十二月癸丑侯安都襲秦郡破徐嗣徽柵俘數百人收其家得其琵琶及鷹遣使送之曰昨至弟處得此今以相還使疏吏翻下同嗣徽大懼丙辰陳霸先對冶城立航航戶剛翻連舟為橋也悉渡衆軍攻其水南二柵即倉門水南二柵陳讀曰陳霸先督兵疾戰縱火燒柵齊兵大敗爭舟相擠擠箋西翻又子細翻溺水者以千數呼聲震天地溺奴狄翻呼火故翻盡收其船艦是日嗣徽與任約引齊兵水步萬餘人還據石頭霸先遣兵詣江寧據要險嗣徽等水步不敢進頓江寧浦口霸先遣侯安都將水軍襲破之嗣徽等單舸脫走舸古我翻盡收其軍資器械己未霸先四面攻石頭城中無水升水直絹一匹庚申達摩遣使請和於霸先且求質子請和而求質子者恐還以無功得罪欲以質子藉手質音致糧運不繼朝臣皆欲與齊和朝直遙翻請以霸先從子曇朗為質曇朗時留鎮京口從才用翻曇苦含翻今在位諸賢欲息肩於齊左傳鄭成公疾子駟請息肩於晉杜預注曰以負擔諭謂孤愛曇朗不恤國家今決遣曇朗棄之寇庭齊人無信謂我微弱必當背盟背蒲妹翻齊寇若來諸君須為孤力鬬也霸先知齊人恥於無功必增兵復至故先以此諭衆責其效死為于偽翻與當作以則文意明順章乙十一行本正作以退齋校同城外者石頭城外徐嗣徽等南人恣其南柳達摩等北人恣其北恣其南北言唯意所適也辛酉霸先陳兵石頭南門送齊人歸北徐嗣徽任約皆奔齊收齊馬仗船米不可勝計勝音升齊主誅柳達摩壬戌齊和州長史烏丸遠自南州奔還歷陽劉昫曰齊梁通和置和州於歷陽郡烏丸蓋出於東胡烏丸之種因以為姓江寧令陳嗣黃門侍郎曹朗據姑孰反霸先命侯安都等討平之霸先恐陳曇朗亡竄自帥步騎至京口迎之帥讀曰率梁王察即皇帝位於江陵交州刺史劉元偃帥其屬數千人歸王琳梁王察即皇帝位於江陵魏以侍中李遠為尚書左僕射梁王察即皇帝位於江陵魏益州刺史宇文貴使譙淹從子子嗣誘説淹以為大將軍從才用翻説式芮翻淹不從斬子嗣貴怒攻之淹自東遂寧徙屯墊江晉於德陽縣界東南置遂寧郡五代志遂寧郡方義縣梁曰小溪置東遂寧郡墊江縣漢屬巴郡梁為楚州治所隋為渝州墊音疊梁王察即皇帝位於江陵初晉安民陳羽吳立東安縣晉武帝更名晉安太康三年分建安立晉安郡五代志建安郡南安縣舊曰晉安今之泉州即其地其子寶應多權詐郡中畏服侯景之亂晉安太守賓化侯雲以郡讓羽羽老但治郡事令寶應典兵時東境荒饉而晉安獨豐衍寶應數自海道出寇抄臨安永嘉會稽沈約志吳分餘杭為臨水縣晉武帝太康元年更名臨安五代志無臨安郡及臨安縣但有餘杭郡耳數所角翻抄楚交翻會工外翻由是能致富強侯景平世祖因以羽為晉安太守及陳霸先輔政羽求傳位於寶應霸先許之為後陳寶應亂閩中張本梁王察即皇帝位於江陵是歲魏宇文泰諷淮安王育上表請如古制降爵為公於是宗室諸王皆降為公梁王察即皇帝位於江陵突厥木杆可汗擊柔然鄧叔子滅之厥九勿翻杆公旦翻可從刊入聲汗音寒叔子收其餘燼奔魏木杆西破嚈噠嚈益涉翻噠當割翻又宅軋翻東走契丹北並契骨契骨即唐之結骨唐書曰黠戞斯古堅昆國或曰居勿或曰結骨蓋堅昆語訛為結骨稍號紇骨亦曰紇扢斯契丹欺訖翻又音喫契骨苦結翻其地東自遼海西至西海長萬里長直亮翻南自沙漠以北五六千里皆屬焉木杆恃其強請盡誅鄧叔子等於魏使者相繼於道太師泰收叔子以下三千餘人付其使者盡殺之於青門外長安城東出南頭第一門曰霸城門民見門色青名曰青城門或曰青門秦東陵侯召平種瓜於青門外即其地使疏吏翻梁王察即皇帝位於江陵初魏太師泰以漢魏官繁命蘇綽及尚書令盧辨依周禮更定六官更工衡翻太平元年丙子五五六是年九月方改元太平梁王察即皇帝位於江陵春正月丁丑魏初建六官以宇文泰為太師大冢宰柱國李弼為太傅大司徒趙貴為太保大宗伯宗伯以上以三公兼六卿之職北史盧辨傳置太師太傳太保各一人是曰三孤于謹為大司寇侯莫陳崇為大司空自餘百官皆倣周禮梁王察即皇帝位於江陵戊寅大赦其與任約徐嗣徽同謀者一無所問癸未陳霸先使從事中郎江旰説徐嗣徽使南歸説式芮翻下因説同嗣徽執旰送齊梁王察即皇帝位於江陵陳蒨周文育合軍攻杜龕於吳興龕勇而無謀嗜酒常醉其將杜泰陰與蒨等通龕與蒨等戰敗泰因説龕使降將即亮翻説輸芮翻降戶江翻龕然之其妻王氏曰王氏僧辨女也霸先讎隙如此何可求和因出私財賞募復擊蒨等大破之復扶又翻既而杜泰降於蒨龕尚醉未覺覺古效翻又如字蒨遣人負出於項王寺前斬之項羽起吳下故後人為立寺於吳興考異曰梁書太平元年正月癸未杜龕降詔賜死陳書紹泰元年十二月杜龕以城降明年正月癸未誅杜龕于吳興龕從弟北叟司馬沈孝敦並賜死典略魏恭帝二年十二月蒨命劉澄等攻龕大敗之龕乃降明年正月丁亥周鐵虎送杜龕祠項王神使力士拉龕於坐從弟北叟司馬沈孝敦並賜死今從南史愔於今翻考異曰梁書南史王僧辨傳僧辨既亡僧智得就任約約敗走僧智肥不能行又遇害僧智弟僧愔位譙州刺史征蕭勃及聞兄死引軍還時吳州刺史羊亮隸在僧愔下與僧愔不平密召侯瑱見禽僧愔以名義責瑱瑱乃委罪於將羊鯤斬之僧愔復得奔齊陳書南史侯瑱傳則云僧辨使其弟僧愔與瑱共討蕭勃及陳武帝誅僧辨僧愔陰欲圖瑱及奪其軍瑱知之盡收僧愔徒黨僧愔奔齊典略魏恭帝三年正月初僧愔與瑱共討曲江侯勃至是吳州刺史羊亮説僧愔襲瑱而翻以告瑱瑱攻之僧愔奔齊凡此諸説莫知孰是今約其梗概言之東揚州刺史張彪素為王僧辨所厚不附霸先二月庚戌陳蒨周文育輕兵襲會稽彪兵敗走入若邪山中簡文帝大寶元年張彪起兵於若邪山邪音耶將即亮翻下同東陽太守留異饋蒨糧食霸先以異為縉州刺史因縉雲山而置縉州五代志處州栝蒼縣有縉雲山縉音晉江州刺史侯瑱本事王僧辨亦擁兵據豫章及江州不附霸先霸先以周文育為南豫州刺史使將兵擊湓城庚申又遣侯安都周鐵虎將舟師立柵於梁山以備江州梁王察即皇帝位於江陵癸亥徐嗣徽任約襲采石執戍主明州刺史張懷鈞送於齊五代志日南郡交谷縣梁置明州張懷鈞蓋帶刺史而戍采石也梁王察即皇帝位於江陵後梁主擊侯平於公安平與長沙王韶引兵還長沙王琳遣平鎮巴州梁王察即皇帝位於江陵三月壬午詔雜用古今錢梁王察即皇帝位於江陵戊戌齊遣儀同三司蕭軌庫狄伏連堯難宗東方老等與任約徐嗣徽合兵十萬入寇出柵口柵口柵江口也在今和州歷陽縣西南百五十里與無為軍分界即古之濡須口宋白曰廬州東南至柵口今謂之新婦口三百八十四里對岸即舊南陵縣地對岸為繁昌縣陳霸先帳內蕩主黃叢逆擊破之蕩主主勇士以突蕩敵人霸先遣定州刺史沈泰等就侯安都共據梁山以禦之周文育攻湓城未克召之還夏四月丁巳霸先如梁山巡撫諸軍梁王察即皇帝位於江陵乙丑齊儀同三司婁睿討魯陽蠻破之梁王察即皇帝位於江陵侯安都輕兵襲齊行臺司馬恭於歷陽考異曰梁書云壬午安都襲恭按長曆是月乙巳朔無壬午俘獲萬計梁王察即皇帝位於江陵魏太師泰尚孝武妹馮翊公主生略陽公覺姚夫人生寧都公育育於諸子最長五代志西城郡安康縣舊曰寧都育余六翻長知兩翻下同泰將立嗣謂公卿曰孤欲立子以嫡恐大司馬有疑如何衆默然未有言者尚書左僕射李遠曰夫立子以嫡不以長春秋公羊傳之言公何所疑若以信為嫌請先斬之遂拔刀而起泰亦起曰何至於是信又自陳解遠乃止於是㣥公並從遠議遠出外拜謝信曰臨大事不得不爾信亦謝遠曰今日賴公決此大議遂立覺為世子梁王察即皇帝位於江陵太師泰北巡梁王察即皇帝位於江陵五月齊人召建安公淵明詐許退師考異曰典略云五月齊主在東山飲酒投杯赫怒召魏收於前立為制書欲自將西討長安令上黨王渙將兵伐梁於是渙南侵按梁陳北齊帝紀及渙傳皆無是事今去之癸未淵明疽發背卒甲申齊兵發蕪湖庚寅入丹楊縣此丹楊縣乃漢古縣非今鎮江府之丹楊縣也據沈約志晉武帝太康三年分丹楊縣立于湖縣于湖今太平州也丹楊縣地當在太平州東北丙申至秣稜故治沈約曰秣陵本治去京邑六十里今故治村是也晉安帝義熙九年移治京邑在鬬場鬬場猶今言教場晉成帝咸和中詔內外諸軍戲於南郊之場因名戲場亦曰鬬場丹楊記秦始皇鑿方山其斷處為瀆則今淮水馬牧牧馬之地梁王察即皇帝位於江陵齊漢陽敬懷王洽卒洽齊主之弟梁王察即皇帝位於江陵辛丑齊人跨淮立橋柵渡兵夜至方山徐嗣徽等列艦於青墩至于七磯以斷周文育歸路艦戶黯翻下同墩音敦斷音短文育鼓譟而發嗣徽等不能制至旦反攻嗣徽嗣徽驍將鮑砰獨以小艦殿軍驍堅堯翻將即亮翻下同砰普耕翻殿丁練翻文育乘單舴艋與戰舴陟格翻艋莫梗翻舴艋小船一舟曰單跳入艦中跳他弔翻斬砰仍牽其艦而還還從宣翻又如字嗣徽衆大駭因留船蕪湖自丹楊步上上時掌翻下槊上同陳霸先追侯安都徐度皆還追梁山之軍還建康以禦齊師癸卯齊兵自方山進及倪塘倪塘在臺城東騎奇寄翻建康震駭帝總禁兵出頓長樂寺樂音洛內外纂嚴霸先拒嗣徽等於白城白城當在湖熟縣界將戰風急霸先曰兵不逆風文育曰事急矣何用古法抽槊上馬先進章十二行本進下有衆軍從之四字乙十一行本同孔本同張校同退齋校同槊色角翻風亦尋轉殺傷數百人侯安都與嗣徽等戰於耕壇南天子親耕藉田祭先農於田所故有耕壇宋文帝元嘉二十一年令司空司農京尹令尉度宮之辰地八里之外整制千畝中開阡陌立先農壇於中阡西陌南設御耕壇於中阡東陌北破之騎奇寄翻陳讀曰陳生擒齊儀同三司乞伏無勞考異曰南史作乞伏無芳今從陳書襲齊行臺趙彥深於瓜步獲艦百餘艘粟萬斛艘蘇遭翻六月甲辰齊兵潛至鍾山侯安都與齊將王敬寶戰于龍尾鍾山之龍尾也自山趾築道陂陀以登山曰龍尾丁未齊師至幕府山幕府山在今建康城西二十五里晉琅邪王初渡江丞相王導建幕府其上因名邀擊齊人糧運盡獲其船米齊軍乏食殺馬驢食之庚戌齊軍踰鍾山霸先與衆軍分頓樂遊苑東及覆舟山北斷其衝要斷音短壬子齊軍至玄武湖西北將據北郊壇晉成帝立北郊壇於覆舟山南與齊人相對會連日大雨平地水丈餘齊軍晝夜坐立泥中足指皆爛懸鬲以爨鬲音歷爾雅鼎款足者謂之鬲説文鬲鼎屬也實五觳斗二升曰觳而臺中及潮溝北路燥潮溝吳孫權所開以引潮抵于秦淮時四方壅隔糧運不至建康戶口流散徵求無所甲寅少霽少詩沼翻霸先將戰調市人得麥飯調徒弔翻分給軍士士皆飢疲會陳蒨饋米三千斛鴨千頭霸先命炊米煮鴨人人以荷葉裹飯婫以鴨肉數臠婫公渾翻以鴨肉蓋飯上曰婫今江東人猶謂以物蒙頭曰婫臠力兗翻乙卯未明蓐食比曉比必利翻霸先帥麾下出莫府山侯安都謂其部將蕭摩訶曰卿驍勇有名千聞不如一見帥讀曰率將即亮翻驍堅堯翻摩訶對曰今日令公見之及戰安都墜馬齊人圍之摩訶單騎大呼直衝齊軍齊軍披靡安都乃免騎奇寄翻呼火故翻披普彼翻霸先與吳明徹沈泰等衆軍首尾齊舉縱兵大戰安都自白下引兵橫出其後齊師大潰斬獲數千人相蹂踐而死者不可勝計蹂人九翻踐慈演翻勝音升生擒徐嗣徽及弟嗣宗斬之以徇追奔至于臨沂晉成帝咸康元年桓溫領南琅邪太守鎮江乘蒲州之金城求割丹楊之江乘縣境立郡又分江乘地立臨沂縣宋白曰臨沂山西北臨大江攝山在今建康城北四十五里江乘地記曰有草可以攝生故名將即亮翻帥所類翻其軍士得竄至江者縛荻筏以濟荻亭歷翻萑也中江而溺流尸至京口翳水彌岸唯任約王僧愔得免丁巳衆軍出南州燒齊舟艦戊午大赦己未解嚴軍士以賞俘貿酒一人裁得一醉貿音茂庚申斬齊將蕭軌等齊人聞之亦殺陳曇朗霸先啓解南徐州以授侯安都賞其功也梁王察即皇帝位於江陵侯平頻破後梁軍以王琳兵威不接更不受指麾琳遣將討之平殺巴州助防呂旬收其衆奔江州侯瑱與之結為兄弟琳軍勢益衰乙丑遣使奉表詣齊並獻馴象安南出象處曰象山歲一捕之縛欄道旁中為大穽以雌象前行為媒遺甘蔗於地傅藥蔗上雄象來食蔗漸引入欄閉其中就穽中教習馴擾之始甚咆哮穽深不可出牧者以言語諭之久則漸解人意使疏吏翻馴松倫翻琳妻蔡氏世子毅皆沒于魏琳又獻款于魏以求妻子亦稱臣于梁梁王察即皇帝位於江陵齊發丁匠三十餘萬修廣三臺宮殿三臺在鄴城曹操所築梁王察即皇帝位於江陵齊顯祖之初立也留心政術務存簡靖坦於任使謂任使之際坦懷待人又能以法馭下或有違犯不容勳戚內外莫不肅然至於軍國機策獨決懷抱每臨行陳行戶剛翻陳讀曰陳親當矢石所向有功數年之後漸以功業自矜遂嗜酒淫泆泆弋乙翻淫放也肆行狂暴或身自歌舞盡日通宵或散髮胡服雜衣錦綵衣於既翻或袒露形體塗傅粉黛或乘驢牛橐駝白象不施鞍勒或令崔季舒劉桃枝負之而行擔胡鼓拍之胡鼓以手拍之成聲劉昫曰腰鼓大者瓦小者木皆廣首而纖腹本胡鼓也擔都甘翻朝夕臨幸遊行市里街坐巷宿或盛夏日中暴身暴讀曰曝或隆冬去衣馳走從者不堪去羌呂翻從才用翻帝居之自若三臺構木高二十七丈高居報翻兩棟相距二百餘尺工匠危怯皆繫繩自防帝登脊疾走殊無怖畏脊棟脊也怖普布翻復扶又翻儛與舞同折旋中節中竹仲翻傍人見者莫不寒心嘗於道上問婦人曰天子何如曰顛顛癡癡何成天子帝殺之婁太后以帝酒狂舉杖擊之曰如此父生如此兒帝曰即當嫁此老母與胡太后大怒遂不言笑帝欲太后笑自匍匐匍音蒲匐莫北翻以身舉牀墜太后於地頗有所傷既醒大慚恨使積柴熾火欲入其中太后驚懼親自持挽強為之笑曰嚮汝醉耳強其兩翻為于偽翻帝乃設地席命平秦王歸彥執杖口自責數自責而數罪也數所具翻謂歸彥曰杖不出血當斬汝太后前自抱之帝流涕苦請乃笞腳五十然後衣冠拜謝悲不自勝勝音升因是戒酒一旬又復如初帝幸李后家以鳴鏑射后母崔氏射而亦翻罵曰吾醉時尚不識太后老婢何事馬鞭亂擊一百有餘雖以楊愔為相使進廁籌以馬鞭鞭其背流血浹袍嘗欲以小刀剺其腹愔於今翻相息亮翻浹即協翻剺力之翻劃也崔季舒託俳言曰老小公子惡戲託為俳諧之言掣昌列翻去羌呂翻又置愔於棺中載以轜車轜音而喪車也又嘗持槊走馬槊色角翻以擬左丞相斛律金之胸者三金立不動乃賜帛千段高氏婦女不問親疏多與之亂或以賜左右又多方苦辱之彭城王浟太爾朱氏魏敬宗之后也浟夷周翻帝欲蒸之不從手刃殺之故魏樂安王元昂李后之姊壻也其妻有色帝數幸之數所角翻欲納為昭儀召昂令伏以鳴鏑射之百餘下射而亦翻凝血垂將一石竟至於死后啼不食乞讓位於姊太后又以為言帝乃止又嘗於衆中召都督韓哲無罪斬之作大鑊長鋸銼碓之屬陳之於庭鑊戶郭翻鼎大無足曰鑊每醉輒手殺人以為戲樂樂音洛所殺者多令支解或焚之於火或投之於水楊愔乃簡鄴下死囚置之仗內殿庭左右立仗帝欲殺人輒執以應命三月不殺則宥之開府參軍裴謂之上書極諫帝謂楊愔曰此愚人何敢如是對曰彼欲陛下殺之以成名於後世耳帝曰小人我且不殺爾焉得名焉音煙帝與左右飲酒曰樂哉都督王紘曰有大樂亦有大苦樂音洛帝曰何謂也對曰長夜之飲不寤國亡身隕所謂大苦帝縛紘欲斬之思其有救世宗之功乃捨之高澄之死王紘冒刃禦賊見一百六十二卷武帝太清二年帝遊宴東山以關隴未平投杯震怒召魏收於前立為詔書宣示遠近將事西行魏人震恐常為度隴之計字文泰識虛實何得因西行一詔便為度隴之計此齊史官之華言耳一日泣謂㣥臣曰黑獺不受我命奈何都督劉桃枝曰臣得三千騎騎奇寄翻請就長安擒之以來帝壯之賜帛千匹趙道德進曰東西兩國強弱力均彼可擒之以來此亦可擒之以往桃枝妄言應誅陛下奈何濫賞帝曰道德言是回絹賜之帝乘馬欲下峻岸入于漳欲入漳水帝怒將斬之道德曰臣死不恨當於地下啓先帝論此兒酣酗顛狂不可教訓酗吁句翻陸德明曰以酒為凶曰酗帝默然而止他日帝謂道德曰我飲酒過過謂過多道德抶之抶升栗翻擊也帝走道德逐之曰何物人為此舉止典御丞李集面諫五代志曰後齊制官多循後魏之舊尚食尚藥二局皆有典御及丞尚食總知御膳事尚藥總知御藥事屬門下省帝令縛置流中流水中也沈持林翻復令引出復扶又翻謂曰吾何如桀紂集曰向來彌不及矣帝又令沈之引出更問如此數四集對如初帝大笑曰天下有如此癡人方知龍逄比干未是俊物龍逄諫夏桀而死比干諫殷紂而死逄皮江翻頃之又被引入見被皮義翻見賢遍翻似有所諫帝令將出要斬要讀曰腰其或斬或赦莫能測焉內外憯憯憯七感翻憯憯痛毒之意各懷怨毒而素能默識強記加以嚴斷斷丁亂翻㣥下戰栗不敢為非又能委政楊愔愔總攝機衡百度修敕敕理也政清於下愔風表鑒裁為朝野所重少歷屯厄爾朱屠害楊氏唯愔得脫潛竄纍載後歸高歡又以讒間逃隱海島歡訪而用之裁才代翻少詩照翻屯陟輪翻有一餐之惠者必重報之雖先嘗欲殺己者亦不問典選二十餘年以獎拔賢才為己任性復強記一見皆不忘其姓名選人魯漫漢自言猥賤獨不見識選須絹翻復扶又翻猥鄙也愔曰卿前在元子思坊元子思坊鄴城中坊名魏侍中元子思居此後謀西奔被誅時人因以名坊見我不下以方麴障面我何為不識卿漫漢驚服梁王察即皇帝位於江陵秋七月甲戌前天門太守樊毅襲武陵殺武州刺史衡陽王護王琳使司馬潘忠擊之執毅以歸護暢之孫也暢武帝之弟梁王察即皇帝位於江陵丙子以陳霸先為中書監司徒揚州刺史進爵長城公餘如故梁王察即皇帝位於江陵初余孝頃為豫章太守姓譜余姓由余之後孝頃於新吳縣漢靈帝中平中立新吳縣屬豫章郡今洪州奉新縣即其地與瑱相拒瑱使其從弟奫守豫章從才用翻奫於倫翻悉衆攻孝頃久不克築長圍守之癸酉侯平發兵攻奫大掠豫章焚之奔于建康瑱衆潰奔湓城依其將焦僧度僧度勸之奔齊會霸先使記室濟陽蔡景歷南上濟子禮翻自建康泝流至湓城為南上上時掌翻説瑱令降瑱乃詣闕歸罪霸先為之誅侯平説式芮翻降戶江翻為于偽翻丁亥以瑱為司空南昌民熊曇朗世為郡著姓曇朗有勇力侯景之亂聚衆據豐城為柵南昌縣帶豫章郡吳立富城縣晉武帝太康元年更名豐城縣屬豫章郡今縣在郡城南一百五十五里曇徒含翻元帝廟號世祖曇朗兵力浸強侵掠鄰縣侯瑱在豫章曇朗外示服從而陰圖之及瑱敗走曇朗獲其馬仗梁王察即皇帝位於江陵己亥齊大赦梁王察即皇帝位於江陵魏太師泰遣安州長史鉗耳康買使于王琳鉗耳夷姓也出於西羌鉗其廉翻孫愐曰鉗耳西羌人自云周王季之後為虔仁氏音訛為鉗耳且請歸世祖及愍懷太子之柩泰許之江陵之陷魏既戕元帝遂殺愍懷太子元良柩音舊梁王察即皇帝位於江陵八月己酉鄱陽王循卒于江夏弟豐城侯泰監郢州事夏戶雅翻監工銜翻王琳使兗州刺史吳藏攻江夏不克而死琳署藏領兗州耳梁王察即皇帝位於江陵魏太師泰北渡河據魏紀泰北巡渡北河梁王察即皇帝位於江陵魏以王琳為大將軍長沙郡公梁王察即皇帝位於江陵魏江州刺史陸騰討陵州叛獠五代志隆山郡西魏置陵州今陵井監是也江州亦置於隆山郡之隆山縣獠魯皓翻攻之難拔騰乃陳伎樂於城下一面伎渠綺翻獠棄兵攜妻子臨城觀之騰潛師三面俱上斬首萬五千級遂平之唐柴紹破吐谷渾亦用此術上時掌翻俟之玄孫也陸俟事魏太武帝及文成帝之初立以子麗誅宗愛功封王梁王察即皇帝位於江陵庚申齊主將西巡百官辭於紫陌帝使矟騎圍之騎兵執矟者為矟騎矟色角翻騎奇寄翻我舉鞭即殺之日晏帝醉不能起黃門郎是連子暢曰是連亦夷姓也魏書官氏志內入諸姓有是連氏陛下如此㣥臣不勝恐怖勝音升怖普布翻帝曰大怖邪若然勿殺若然猶云若如此也梁王察即皇帝位於江陵九月壬寅改元大赦以陳霸先為丞相録尚書事鎮衛大將軍揚州牧義興公自長城縣公進封義興郡公按陳書帝紀義當作吳梁王察即皇帝位於江陵突厥木杆可汗假道於涼州以襲吐谷渾魏太師泰使涼州刺史史寧帥騎隨之至番禾番禾縣漢屬張掖郡魏分置番禾郡如淳曰番音盤隋廢番禾郡為番禾縣屬涼州唐天寶三年改為天寶縣厥九勿翻杆公旦翻可從刊入聲汗音寒吐從暾入聲谷音浴帥讀曰率騎奇寄翻奔南山木杆將分兵追之寧曰樹敦賀真二城吐谷渾之巢穴也拔其本根餘衆自散木杆從之木杆從北道趣賀真寧從南道趣樹敦樹敦城在曼頭山北吐谷渾之舊都也周穆王時犬戎樹惇居之因以名城祭公謀父所謂犬戎樹惇能帥舊德者也趣七喻翻章十二行本汗下有夸呂二字乙十一行本同孔本同張校同在賀真使其征南王將數千人守樹敦將即亮翻木杆破賀真獲夸呂妻子寧破樹敦虜征南王還與木杆會于青海吐谷渾中有青海周回千餘里海中有小山每冬冰合以良牝馬置此山至來春收之牝馬皆有孕生駒號為龍種必多駿異日行千里贈遺甚厚遺于季翻梁王察即皇帝位於江陵甲子王琳以舟師襲江夏冬十月壬申豐城侯泰以州降之梁王察即皇帝位於江陵齊發山東寡婦二千六百人以配軍有夫而濫奪者什二三梁王察即皇帝位於江陵魏安定文公宇文泰還至牽屯山而病北巡而還也杜佑曰牽屯在平涼郡高平縣亦曰汧屯山今謂之筓頭山護至涇州見泰泰謂護曰吾諸子皆幼外寇方強天下之事屬之於汝屬之欲翻下所屬同宜努力以成吾志乙亥卒於雲陽年五十雲陽縣漢屬馮翊魏收志屬北地郡後周置雲陽郡有雲陽宮發喪泰能駕御英豪得其力用性好質素不尚虛飾明達政事崇儒好古凡所施設皆依倣三代而為之好呼到翻丙子世子覺嗣位為太師柱國大冢宰出鎮同州宇文泰輔政多居同州以其地扼關河之要齊人或來侵軼便於應接也中山公護名位素卑雖為泰所屬而㣥公各圖執政莫肯服從護問計於大司寇于謹謹曰謹早蒙先公非常之知恩深骨肉今日之事必以死爭之若對衆定策公必不得讓明日㣥公會議謹曰昔帝室傾危非安定公無復今日謂魏孝武帝為高歡所逼遁逃入關宇文泰迎而輔之以立國於關右復扶又翻嗣子雖幼中山公親其兄子兼受顧託軍國之事理須歸之辭色抗厲衆皆悚動抗厲舉聲高亢且正色嚴厲也此乃家事護雖庸昧何敢有辭謹素與泰等夷護常拜之至是謹起而言曰公若統理軍國謹等皆有所依遂再拜㣥公迫於謹亦再拜於是衆議始定護綱紀內外撫循文武人心遂安梁王察即皇帝位於江陵十一月辛丑豐城侯泰奔齊齊以為永州刺史南方以零陵郡為永州齊以泰為永州刺史未知此永州置於何地此齊詔也留其將潘純陀監郢州監工銜翻身還長沙魏人歸其妻子梁王察即皇帝位於江陵壬子齊主詔以魏末豪傑糾合鄉部因緣請託各立州郡離大合小公私煩費丁口減於疇日疇日猶言昔日且要荒向化要荒引古要服荒服為言要者要結好信而從服之荒者言其來服荒忽無常也要一遙翻百室之邑遽立州名三戶之民空張郡目此謂梁末所置州郡在江淮之間者也事歸焉有焉於虔翻何也於是併省三州一百五十三郡章十二行本郡下有五百八十九縣三鎮二十六戍十二字乙十一行本同孔本同退齋校同考異曰北史作五十六郡今從齊書梁王察即皇帝位於江陵詔分江州四郡置高州四郡蓋臨川安成豫寧巴山以其地在南江之西負山面水據高臨深因名高州章十二行本軍上有以明威將四字乙十一行本同孔本同退齋校同黃法為刺史鎮巴山巨俱翻宋白曰梁大同二年分廬陵之興平臨川之新建二縣立西寧巴山二縣合其縣立為巴山郡其郡古迹在撫州崇仁縣巴山之北梁王察即皇帝位於江陵十二月壬申以曲江侯勃為太保梁王察即皇帝位於江陵甲申魏葬安定文公丁亥以岐陽之地封世子覺為周公岐陽即扶風之地昔周興於岐周因為國號宇文輔魏倣周以立法制故魏朝之臣以周封之將禪代也梁王察即皇帝位於江陵初侯景之亂臨川民周續起兵郡中臨川漢豫章郡南城縣之地後漢分南城北境為臨汝縣吳孫亮太平二年分豫章之東部南城臨汝二縣置臨川郡隋唐為撫州續部將皆郡中豪族多驕橫將即亮翻下同橫戶孟翻續裁制之諸將皆怨相與殺之續宗人迪勇冠軍中冠古玩翻衆推為主迪素寒微恐郡人不服以同郡周敷族望高顯折節交之折而設翻敷亦事迪甚謹迪據上塘上塘下卷作工塘必有一誤按陳書周迪傳工字為是朝廷以迪為衡州刺史領臨川內史以臨川內史帶衡州刺史耳皆棄農業㣥聚為盜唯迪所部獨務農桑各有贏儲政教嚴明教謂教令州郡下令謂之教斂力贍翻餘郡乏絶者皆仰以取給仰牛向翻迪性質朴不事威儀居常徒跣雖外列兵衛內有女伎挼繩破篾傍若無人伎渠綺翻挼奴禾翻篾莫結翻竹筠也訥於言語而襟懷信實臨川人皆附之梁王察即皇帝位於江陵齊自西河總秦戍築長城考異曰去歲六月已云築長城而地名長短不同不知與此為一事為二事北齊書北史皆然今兩存之前後所築東西凡三千餘里率十里一戍其要害置州鎮凡二十五所梁王察即皇帝位於江陵魏宇文護以周公幼弱欲早使正位以定人心庚子以魏恭帝詔禪位于周魏道武帝以晉孝武太元二十一年改元皇始歷十二世至孝武帝永熙三年西遷魏遂分為東西西魏又歷三世凡十五世一百六十年而亡濟北公迪致皇帝璽紱恭帝出居大司馬府濟子禮翻璽斯氏翻紱音弗容肇祖標點聶崇岐覆校
