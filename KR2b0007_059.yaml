body:
  text: 資治通鑑卷第五十九翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注漢紀五十一中平五年孝靈皇帝下中平五年戊辰一八八中平五年春正月丁酉赦天下中平五年二月有星孛于紫宮紫宮即太微也匡衛十二星之內皆曰紫宮天子之宮也孛蒲內翻中平五年黃巾餘賊郭大等起於河西白波谷帝紀作西河當從之又按宋白續通典河南府河清縣今理白波鎮無以此谷於孟津為河西歟中平五年三月屠各胡攻殺並州刺史張懿屠直於翻中平五年太常江夏劉焉見王室多故建議以為四方兵寇由刺史威輕既不能禁且用非其人以致離叛宜改置牧伯選清名重臣以居其任焉內欲求交趾牧以交趾僻遠可以避禍也扶學圖讖何進薦之徵拜侍中京師將亂益州分野有天子氣蔡雍月令章句自危十度至壁八度謂之豕韋之次衛之分野自壁八度至胃一度謂之降婁之次魯之分野自胃一度至畢六度謂之大梁之次趙之分野自畢六度至井十度謂之實沈之次晉之分野自井十度至柳三度謂之鶉首之次秦之分野自柳三度至張十二度謂之鶉火之次周之分野自張十二度至軫六度謂之鶉尾之次楚之分野自軫六度至亢八度謂之壽星之次鄭之分野自亢八度至尾四度謂之大火之次宋之分野自尾四度至斗六度謂之析木之次燕之分野自斗六度至須女二度謂之星紀之次越之分野自須女二度至危十度謂之玄枵之次齊之分野晉書天文志用後魏太史令陳卓所言郡國所入宿度今亦載之自軫十二度至氐四度為壽星於辰在辰鄭分屬兗州自氐五度至尾九度為大火於辰在卯宋分屬豫州自尾十度至南斗十一度為析木於辰在寅燕分屬幽州自南斗十二度至須女七度為星紀於辰在丑吳越分屬楊州自須女八度至危十五度為玄枵於辰在子齊分屬青州自危十六度至奎四度為諏訾於辰在亥衛分屬並州自奎五度至胃六度為降婁於辰在戌魯分屬徐州自胃七度至畢十一度為大梁於辰在酉趙分屬冀州自畢十二度至東井十五度為實沈於辰在申魏分屬益州自東井十六度至柳八度為鶉首於辰在未秦分屬雍州自柳九度至張十六度為鶉火於辰在午周分屬三河自張十七度至軫十一度為鶉尾於辰在巳楚分屬荊州分扶問翻會益州刺史郤儉賦斂煩擾謠言遠聞郤乞逆翻春秋晉大夫郤氏考異曰范書作郗儉今從陳壽蜀志斂力贍翻聞音問而耿鄙張懿皆為盜所殺朝廷遂從焉議選列卿尚書為州牧各以本秩居任列卿秩中二千石尚書秩六百石耳東都以後尚書職任重於列卿太僕黃琬為豫州牧宗正東海劉虞為幽州牧州任之重自此而始焉魯恭王之後虞東海恭王之五世孫也虞嘗為幽州刺史民夷懷其恩信故用之董扶及太倉令趙韙百官志太倉令秩六百石主受郡國傳漕穀屬大司農韙羽鬼翻隨焉入蜀中平五年詔發南胸奴兵配劉虞討張純單于羌渠遣左賢王將騎詣幽州國人恐發兵無已於是右部䤈落反建武中右部薁犍日逐王比來降立為䤈落尸逐鞮單于右部䤈落者蓋其支庶分居右部因以為種落之號䤈馨兮翻屠直於翻凡十餘萬人攻殺羌渠考異曰帝紀屠各胡攻殺並州刺史張懿遂與南胸奴左部胡合殺其單于今從胸奴傳賢曰於扶羅即前趙劉淵之祖也是為亂晉之首中平五年夏四月太尉曹嵩罷中平五年五月以永樂少府南陽樊陵為太尉樂音洛六月罷中平五年益州賊馬相趙祗等起兵帛丿糸竹帛丿糸竹縣屬廣漢郡賢曰故城在今益州帛丿糸竹縣東殺刺史郤儉進擊巴郡犍為旬月之間破壞三郡犍居言翻壞音怪有衆數萬自章甲十一行本自上有相字乙十一行本同張校同稱天子州從事賈龍率吏民攻相等數日破走州界清靜龍乃選吏卒迎劉焉焉徙治帛丿糸竹撫納離叛務行寬惠以收人心為劉焉專制益州張本中平五年郡國七大水中平五年故太傅陳蕃子逸與術士襄楷會於冀州刺史王芬坐坐才臥翻楷曰天文不利宦者黃門常侍真族滅矣逸喜芬曰若然者芬願驅除因與豪傑轉相招合上書言黑山賊攻劫郡縣欲因以起兵會帝欲北巡河間舊宅帝先為解瀆亭侯有舊宅在河間徼讀曰邀誅諸常侍黃門因廢帝立合肥侯以其謀告議郎曹操以此謀告操蓋亦知操之為時雄矣夫廢立之事天下之至不祥也古人有權成敗計輕重而行之者伊霍是也此等語豈常人所能及哉據宰輔之勢因秉政之重同衆人之欲故能計從事立今諸君徒見曩者之易易以豉翻未覩當今之難而造作非常欲望必克不以危乎芬又呼平原華歆陶丘洪共定計華戶化翻姓譜堯子丹朱居陶丘其後氏焉洪欲行歆止之曰夫廢立大事伊霍之所難芬性疏而不武此必無成洪乃止會北方夜半有赤氣東西竟天太史上言北方有陰謀上時掌翻不宜北行帝乃止敕芬罷兵俄而徵之芬懼解印綬亡走至平原自殺綬音受中平五年秋七月以射聲校尉馬日磾為太尉日磾融之族孫也磾丁奚翻中平五年八月初置西園八校尉校戶教翻以小黃門蹇碩為上軍校尉姓譜蹇姓也左傳有秦大夫蹇叔屯騎校尉鮑鴻為下軍校尉議郎曹操為典軍校尉趙融為助軍左校尉馮芳為助軍右校尉諫議大夫夏牟為左校尉淳于瓊為右校尉皆統於蹇碩考異曰范書袁紹傳紹為佐軍校尉何進傳淳于瓊為佐軍校尉今從樂資山陽公載記留心戎事碩壯健有武略帝親任之雖大將軍亦領屬焉中平五年九月司徒許相罷以司空丁宮為司徒光祿勳南陽劉弘為司空中平五年以衛尉條侯董重為票騎將軍重永樂太后兄子也票匹妙翻樂音洛中平五年冬十月青徐黃巾復起復扶又翻寇郡縣中平五年望氣者以為京師當有大兵兩宮流血帝欲厭之厭一葉翻乃大發四方兵講武於平樂觀下水經注穀水自白馬寺東南徑平樂觀在上西門外樂音洛觀古玩翻上建十二重華蓋蓋高十丈壇東北為小壇復建九重華蓋高九丈列步騎數萬人結營為陳重直龍翻高居傲翻陳讀曰陳下同甲子帝親出臨軍駐大華蓋下大將軍進駐小華蓋下帝躬擐甲介馬賢曰擐貫也音宦介亦甲也稱無上將軍行陳三匝而還行下孟翻匝作答翻以兵授進帝問討虜校尉蓋勳曰蓋古盍翻吾講武如是何如對曰臣聞先王曜德不觀兵國語載祭公謀父之言不足以昭果毅左傳曰戎昭果毅以聽之謂武殺敵為果致果為毅帝曰善恨見君晚㣥臣初無是言也勳謂袁紹曰上甚聰明但蔽於左右耳與紹謀共誅嬖幸嬖卑義翻又必計翻考異曰勳傳云勳時與宗正劉虞佐軍校尉袁紹同典禁兵勳謂虞紹云云按虞於胸奴未叛之前已為幽州牧又宗正非典兵之官今除之蹇碩懼出勳為京兆尹中平五年十一月王國圍陳倉詔復拜皇甫嵩為左將軍復扶又翻督前將軍董卓合兵四萬人以拒之中平五年張純與丘力居鈔略青徐幽冀四州鈔楚交翻詔騎都尉公孫瓚討之瓚與戰於屬國石門屬國遼東屬國也賢曰石門山名在今營州柳城縣西南瓚藏旱翻棄妻子踰塞走悉得所略男女瓚深入無繼反為丘力居等所圍於遼西管子城二百餘日糧盡衆潰士卒死者什五六中平五年董卓謂皇甫嵩曰陳倉危急請速救之嵩曰不然百戰百勝不如不戰而屈人兵陳倉雖小城守固備未易可拔易以豉翻王國雖強攻陳倉不下其衆必疲疲而擊之全勝之道也將何救焉國攻陳倉八十餘日不拔六年六年春二月國衆疲敝解圍去皇甫嵩進兵擊之董卓曰不可兵法窮寇勿迫歸衆勿追賢曰司馬兵法之言不然前吾不擊避其鋭也今而擊之待其衰也所擊疲師非歸衆也國衆且走莫有鬬志以整擊亂非窮寇也遂獨進擊之使卓為後拒連戰大破之斬首萬餘級卓大慙恨由是與嵩有隙為後獻帝初平二年卓怖嵩張本韓遂等共廢王國而劫故信都令漢陽閻忠使督統諸部忠病死遂等稍爭權利更相殺害更工衡翻由是寖衰六年幽州牧劉虞到部遣使至鮮卑中告以利害責使送張舉張純首厚加購賞丘力居等聞虞至喜各遣譯自歸舉純走出塞餘皆降散虞上罷諸屯兵上時掌翻奏也但留降虜校尉公孫瓚將步騎萬人屯右北平瓚以石門之捷自騎都尉拜降虜校尉降戶江翻校戶教翻張純客王政殺純送首詣虞公孫瓚志欲掃滅烏桓而虞欲以恩信招降由是與瓚有隙為後初平四年瓚殺虞張本六年夏四月丙子朔日有食之六年太尉馬日磾免遣使即拜幽州牧劉虞為太尉封容丘侯容丘縣屬東海郡考異曰袁紀三月己丑光祿劉虞為司馬領幽州牧今從范書六年蹇碩忌大將軍進與諸常侍共說帝遣進西擊韓遂說輸芮翻帝從之進陰知其謀奏遣袁紹收徐兗二州兵須紹還而西以稽行期六年初帝數失皇子數所角翻何皇后生子辨養於道人史子眇家號曰史侯賢曰道人謂有道術之人董太后自養之號曰董侯㣥臣請立太子帝以辨輕佻無威儀佻初雕翻輕薄也欲立協猶豫未決會疾篤屬協於蹇碩屬之欲翻託也丙辰帝崩于嘉德殿年三十四嘉德殿在南宮九龍門內欲先誅何進而立協使人迎進欲與計事進即駕往碩司馬潘隱與進早舊迎而目之進驚馳從儳道歸營廣雅曰儳疾也仕鑒翻引兵入屯百郡邸天下郡國百餘皆置邸京師謂之百郡邸者百郡總為一邸也戊午皇子辨即皇帝位年十四考異曰帝紀云年十七張璠漢紀曰帝年十四今從之太后臨朝朝直遙翻下同赦天下改元為光熹封皇弟協為勃海王協年九歲以後將軍袁隗為太傅與大將軍何進參録尚書事進既秉朝政忿蹇碩圖己陰規誅之袁紹因進親客張津勸進悉誅諸宦官進以袁氏纍世貴寵袁安為司空司徒子敞為司空孫湯為司空司徒太尉湯子逢為司空少子隗亦為三公是纍世貴寵也信而用之從才用翻下同復博徵智謀之士復扶又翻何顒荀攸及河南鄭泰等二十餘人以顒為北軍中候攸為黃門侍郎百官志給事黃門侍郎六百石掌侍從左右給事中關通內外獻帝起居注曰帝初即位令侍中給事黃門侍郎員各六人出入禁中近侍帷幄省尚書事蓋前無定員至帝始定員數也顒魚容翻與同腹心攸爽之從孫也蹇碩疑不自安與中常侍趙忠宋典等書曰大將軍兄弟秉國專朝今與天下黨人謀誅先帝左右掃滅我曹但以碩典禁兵故且沈吟今宜共閉上閣上閣省閣也沈持林翻中常侍郭勝進同郡人也太后及進之貴幸勝有力焉考異曰袁紀作郭脈九州春秋作郎勝今從何進傳與趙忠等議不從碩計而以其書示進庚午進使黃門令收碩誅之因悉領其屯兵票騎將軍董重票匹妙翻與何進權勢相害中官挾重以為黨助董太后每欲參干政事何太后輒相禁塞塞猶遏也塞悉則翻詈曰汝今輈張怙汝兄耶恚於避翻賢曰輈張猶強梁也兄謂進也輈音舟吾敕票騎斷何進頭如反手耳斷丁管翻何太后聞之以告進五月進與三公共奏孝仁皇后使故中常侍夏惲等交通州郡辜較財利悉入西省夏戶雅翻惲於粉翻較讀曰榷西省即謂永樂宮司故事蕃后不得留京師賢曰蕃后謂平帝母衛姬王莽攝政恐其專權后不得留在京師故以為故事也奏可辛巳進舉兵圍票騎府收董重免官自殺六月辛亥董太后憂怖暴崩怖普布翻考異曰九州春秋曰太后憂懼自殺今從皇后紀民間由是不附何氏六年辛酉葬孝靈皇帝于文陵賢曰在雒陽西北二十里稱疾不入陪喪又不送山陵六年大水六年秋七月徙勃海王協為陳留王六年司徒丁宮罷六年袁紹復說何進曰復扶又翻說輸芮翻前竇武欲誅內寵而反為所害者但坐言語漏泄五營兵士皆畏服中人而竇氏反用之自取禍滅事見五十六卷建寧元年謂進及弟苗也樂盡力命樂音洛事在掌握此天贊之時也將軍宜一為天下除患以垂名後世不可失也為于僞翻下同進乃白太后請盡罷中常侍以下以三署郎補其處太后不聽曰中官統領禁省自古及今漢家故事不可廢也且先帝新棄天下我奈何楚楚與士人共對事乎楚詞注曰楚楚鮮明貌詩曰衣裳楚楚且欲誅其放縱者紹以為中官親近至尊近其靳翻出納號令今不悉廢後必為患而太后母舞陽君及何苗數受諸宦官賂遺數所角翻下同遺于季翻知進欲誅之數白太后為其障蔽又言大將軍專殺左右亶權以弱社稷太后疑以為然進新貴素敬憚中官雖外慕大名而內不能斷斷丁亂翻下同故事久不決紹等又為畫策多召四方猛將及諸豪傑使並引兵向京城以脅太后進然之主簿廣陵陳琳諫曰諺稱掩目捕雀夫微物尚不可欺以得志況國之大事其可以詐立乎今將軍總皇威握兵要龍驤虎步高下在心此猶鼓洪爐燎毛髮耳但當速發雷霆行權立斷則天人順之而反委釋利器利器謂兵柄也大兵聚會強者為雄所謂倒持干戈授人以柄功必不成祇為亂階耳進不聽典軍校尉曹操聞而笑曰宦者之官古今宜有但世主不當假之權寵使至於此既治其罪治直之翻當誅元惡一獄吏足矣何至紛紛召外兵乎欲盡誅之事必宣露吾見其敗也初靈帝徵董卓為少府據卓傳中平六年徵卓為少府蓋即是年也所將湟中義從及秦胡兵將即亮翻從才用翻皆詣臣言牢直不畢稟賜斷絶妻子飢凍牽挽臣車使不得行羌胡憋腸狗態賢曰言羌胡心腸憋惡情態如狗也方言云憋惡也郭璞云憋怤急性也憋音芳列翻怤音芳于翻輒將順安慰增異復上賢曰如其更增異志當復聞上洪氏隸釋曰漢靈帝建寧二年魯相史晨祠孔廟奏後云增異輒上光和二年樊毅復華下民租口算奏後云增異復上此蓋當時奏文結末之常語蓋言繼今事有增於此者異於此者將復上奏也復扶又翻上時掌翻及帝寢疾璽書拜卓並州牧璽斯氏翻令以兵屬皇甫嵩卓復上書言臣誤蒙天恩掌戎十年士卒大小相狎彌久戀臣畜養之恩為臣奮一旦之命畜許六翻為于僞翻乞將之北州效力邊垂將如字又即亮翻之往也嵩從子酈說嵩曰從才用翻酈音歷考異曰袁紀作從子邐今從范書天下兵柄在大人與董卓耳今怨隙已結勢不俱存卓被詔委兵而上書自請此逆命也彼度京師政亂被皮義翻度徒洛翻故敢躊躇不進此懷姦也二者刑所不赦且其凶戾無親將士不附大人今為元帥嵩討王國時為督故曰元帥上顯忠義下除凶害無不濟也嵩曰違命雖罪專誅亦有責也卓不釋兵為違命嵩亶討卓為專誅使朝廷裁之乃上書以聞帝以讓卓卓亦不奉詔駐兵河東以觀時變何進召卓使將兵詣京師考異曰進傳曰召卓屯關中上林苑按時卓已駐河東若屯上林則更為西去非所以脅太后也今從卓傳董卓強忍寡義志欲無厭厭於鹽翻若借之朝政借子夜翻授以大事將恣凶欲必危朝廷明公以親德之重據阿衡之權秉意獨斷斷丁亂翻誅除有罪誠不宜假卓以為資援也且事留變生殷鑒不遠謂竇武之事可為殷鑒也尚書盧植亦言不宜召卓進皆不從泰乃棄官去謂荀攸曰何公未易輔也易以豉翻進府掾王匡騎都尉鮑信皆泰山人進使還鄉里募兵並召東郡太守橋瑁屯成皋瑁音冒使武猛都尉丁原將數千人寇河內燒孟津火照城中賢曰武猛謂其有武藝而勇猛取其嘉名因以名官董卓聞召即時就道並上書曰中常侍張讓等竊幸承寵濁亂海內臣聞揚湯止沸莫若去薪去羌呂翻前書枚乘諫吳王曰欲湯之滄一人炊之百人揚之無益也不如絶薪止火而巳滄音則亮翻寒也潰癰雖痛勝於內食言癰疽蘊結破之雖痛勝於內食肌肉浸淫滋大也公羊傳曰晉趙鞅取晉陽之甲以逐荀寅與士吉射者曷為君側之惡人也此逐君側之惡人曷為以叛言之無君命也賢曰鳴鐘鼓者聲其罪也太后猶不從何苗謂進曰始共從南陽來俱以貧賤依省內以致富貴言何后因宦官得進進兄弟以此致富貴也亦何容易易以豉翻覆水不收宜深思之水覆於地不可復收言事發則不可收拾卓至澠池澠彌兗翻而進更狐疑使諫議大夫种卲宣詔止之卓不受詔遂前至河南河南周之王城去雒陽不遠种音沖勞力到翻因譬令還軍卓疑有變使其軍士以兵脅卲卲怒稱詔叱之軍士皆披披芳靡翻遂前質責卓卓辭屈乃還軍夕陽亭賢曰夕陽亭在河南城西皓之孫也袁紹懼進變計因脅之曰交構已成形勢已露將軍復欲何待而不早決之乎事久變生復為竇氏矣復扶又翻進於是以紹為司隸校尉假節專命擊斷漢司隸校尉本持節至元帝時諸葛豐為司隸始去節今假紹節重其權也斷丁亂翻紹使雒陽方略武吏司察宦者而促董卓等使馳驛上奏欲進兵平樂觀上時掌翻樂音洛觀古玩翻太后乃恐悉罷中常侍小黃門使還里舍唯留進所私人以守省中諸常侍小黃門皆詣進謝罪唯所措置進謂曰天下胸胸正患諸君耳今董卓垂至諸君何不早各就國袁紹勸進便於此決之勸進於此時悉誅之也進不許紹又為書告諸州郡詐宣進意使捕按中官親屬進謀積日頗泄中官懼而思變張讓子婦太后之妹也讓向子婦叩頭曰老臣得罪當與新婦俱歸私門唯受恩纍世賢曰唯思念也離力智翻情懷戀戀願復一入直復扶又翻下同得暫奉望太后陛下顏色然後退就溝壑死不恨矣子婦言於舞陽君入白太后乃詔諸常侍皆復入直八月戊辰進入長樂宮樂音洛白太后請盡誅諸常侍中常侍張讓段圭相謂曰大將軍稱疾不臨喪不送葬今欻入省賢曰欻音許勿翻此意何為竇氏事竟復起邪使潛聽具聞其語乃率其黨數十人持兵竊自側闥入伏省戶下進出因詐以太后詔召進入坐省閣讓等詰進曰天下憒憒詰去吉翻說文曰憒憒亂也古對翻亦非獨我曹罪也先帝嘗與太后不快幾至成敗事見上卷光和四年幾居希翻各出家財千萬為禮和悅上意但欲託卿門戶耳今乃欲滅我曹種族不亦大甚乎種章勇翻於是尚方監渠穆拔劍斬進於嘉德殿前按百官志尚方有令丞而無監桓靈之世諸署令悉以宦者為之尚方監必亦置於是時也渠姓也左傳天王使宰渠伯糾來聘又衛有渠孔御戎以故太尉樊陵為司隸校尉少府許相為河南尹尚書得詔版疑之曰請大將軍出共議中黃門以進頭擲與尚書曰何進謀反已伏誅矣進部曲將吳匡張璋在外聞進被害被皮義翻欲引兵入宮宮門閉虎賁中郎將袁術與匡共斫攻之中黃門持兵守閣會日暮術因燒南宮青瑣門衛瓘曰青瑣門邊青鏤也一曰天子門內有眉格再重裏青畫曰瑣考異曰何進傳作九龍門今從袁紀讓等入白太后言大將軍兵反燒宮攻尚書闥尚書闥即尚書門從復道走北宮將如字攜也挾也仰數段圭數所具翻圭懼乃釋太后太后投閣乃章甲十一行本乃作得乙十一行本同孔本同免袁紹與叔父隗矯詔召樊陵許相斬之紹及何苗引兵屯朱雀闕下捕得趙忠等斬之吳匡等素怨苗不與進同心而又疑其與宦官通謀乃令軍中曰殺大將軍即章甲十一行本即上有者字乙十一行本同孔本同張校同車騎也時苗為車騎將軍為于僞翻皆流涕曰願致死匡遂引兵與董卓弟奉車都尉旻攻殺苗棄其尸於苑中紹遂閉北宮門勒兵捕諸宦者無少長皆殺之少詩照翻長知兩翻凡二千餘人或有無須而誤死者須古鬚字通或上端門屋以攻省內宮之正南門曰端門省禁也庚午張讓段圭等困迫遂將帝與陳留王數十人步出穀門穀門位在子雒城正北門也至小平津賢曰小平津在今鞏縣西北杜佑曰鞏縣西北有小平縣故城又北有津曰小平津公卿無得從者從才用翻唯尚書盧植河南中部掾閔貢夜至河上漢官儀諸郡置五部督郵以監屬縣河南尹置四部督郵中部為掾掾俞絹翻且曰今不速死吾將殺汝因手劍斬數人手式又翻讓等惶怖怖普布翻下同叉手再拜叩頭向帝辭曰臣等死陛下自愛遂投河而死貢扶帝與陳留王夜步逐螢光南行欲還宮行數里得民家露車露車者上無巾蓋四旁無帷裳蓋民家以載物者耳至雒舍止雒舍地名在北芒之北辛未帝獨乘一馬陳留王與貢共乘一馬從雒舍南行公卿稍有至者董卓至顯陽苑顯陽苑桓帝延熹二年所造在雒陽西知有變引兵急進未明到城西聞帝在北因與公卿往奉迎於北芒阪下帝見卓將兵卒至將即亮翻卒讀曰猝恐怖涕泣㣥公謂卓曰有詔卻兵卓曰公諸人為國大臣不能匡正王室至使國家播蕩東都㣥臣謂天子為國家卓與帝語語不可了了曉解也問禍亂由起王答自初至終無所遺失卓大喜以王為賢且為董太后所養卓自以與太后同族遂有廢立之意是日帝還宮赦天下改光熹為昭寧失傳國璽為下獻帝初平二年孫堅得璽張本璽斯氏翻以丁原為執金吾騎都尉鮑信自泰山募兵適至說袁紹曰說輸芮翻董卓擁強兵將有異志今不早圖必為所制及其新至疲勞襲之可禽也紹畏卓不敢發信乃引兵還泰山董卓之入也步騎不過三千自嫌兵少恐不為遠近所服率四五日輒夜潛出軍近營明旦乃大陳旌鼓而還以為西兵復至復扶又翻雒中無知者俄而進及弟苗部曲皆歸於卓卓又陰使丁原部曲司馬五原呂布殺原而並其衆卓兵於是大盛乃諷朝廷以久雨策免司空劉弘而代之初蔡雍徙朔方事見五十七卷光和元年五原太守王智甫之弟也奏雍謗訕朝廷雍遂亡命江海積十二年董卓聞其名而辟之稱疾不就卓怒詈曰我能族人雍懼而應命到署祭酒甚見敬重舉高第三日之間周歷三臺雍舉高第補侍御史又轉治書御史遷尚書三日之間周歷三臺六年董卓謂袁紹曰天下之主宜得賢明每念靈帝令人憤毒賢曰毒恨也今欲立之為能勝史侯否人有小智大癡亦知復何如為當且爾劉氏種不足復遺且爾猶言且如此也卓意欲廢漢自立漢家君天下四百許年恩澤深渥兆民戴之今上富於春秋未有不善宣於天下公欲廢嫡立庶恐衆不從公議也卓按劍叱紹曰豎子敢然敢然猶言敢如此也豈不在我我欲為之誰敢不從爾謂董卓刀為不利乎紹勃然曰天下健者豈惟董公引佩刀橫揖徑出卓以新至見紹大家故不敢害紹縣節於上東門縣所假司隸節也上東門位在寅賢曰雒陽城東面北頭門也縣讀曰懸九月癸酉卓大會百僚奮首而言曰皇帝暗弱不可以奉宗廟為天下主今欲依伊尹霍光故事更立陳留王何如更工衡翻公卿以下皆惶恐莫敢對卓又抗言曰賢曰抗高也昔霍光定策延年按劍事見二十四卷昭帝元平元年皆以軍法從事沮在呂翻坐者震動尚書盧植獨曰昔太甲既立不明昌邑罪過千餘故有廢立之事今上富於春秋行無失德非前事之比也卓大怒罷坐將殺植蔡雍為之請坐徂臥翻為于僞翻議郎彭伯亦諫卓曰盧尚書海內大儒人之望也今先害之天下震怖怖普布翻卓乃止但免植官植遂逃隱於上谷卓以廢立議示太傅袁隗隗報如議甲戌卓復會㣥僚於崇德前殿復扶又翻遂脅太后策廢少帝曰皇帝在喪無人子之心威儀不類人君今廢為弘農王立陳留王協為帝袁隗解帝璽綬以奉陳留王扶弘農王下殿北面稱臣太后鯁涕言不敢出聲但鯁咽而流涕也莫敢言者卓又議太后踧迫永樂宮踧子六翻至令憂死逆婦姑之禮左傳曰婦養姑者也虧姑以成婦逆莫大焉赦天下改昭寧為永漢丙子卓鴆殺何太后公卿以下不布服會葬素衣而已卓又發何苗棺出其尸支解節斷棄於道邊殺苗母舞陽君棄尸於苑枳落中落籬落也枳似棘多刺江南為橘江北為枳人以栫籬六年詔除公卿以下子弟為郎以補宦官之職侍於殿上六年乙酉以太尉劉虞為大司馬封襄賁侯襄賁縣屬東海郡應劭曰賁音肥領前將軍事加節傳斧鉞虎賁更封郿侯傳知戀翻郿縣屬扶風賢曰今岐州縣師古曰郿音媚六年丙戌以太中大夫楊彪為司空六年甲午以豫州牧黃琬為司徒六年董卓率諸公上書追理陳蕃竇武及諸黨人悉復其爵位遣使弔祠擢用其子孫六年自六月雨至于是月六年冬十月乙巳葬靈思皇后六年白波賊寇河東考異曰帝紀五年九月南單于叛與白波賊寇河東按胸奴傳帝崩之後於扶羅乃與白波賊為寇紀誤今從傳初南單于於扶羅既立國人殺其父者遂叛單于羌渠被殺事見上卷中平五年於扶羅詣闕自訟會靈帝崩天下大亂於扶羅將數千騎與白波賊合兵寇郡縣時民皆保聚鈔掠無利鈔楚交翻而兵遂挫傷復欲歸國國人不受乃止河東平陽須卜骨都侯為單于一年而死南庭遂虛其位以老王行國事六年十一月以董卓為相國漢自蕭何為相國後不復除拜入朝不趨劍履上殿六年十二月戊戌以司徒黃琬為太尉司空楊彪為司徒光祿勳荀爽為司空初尚書武威周毖城門校尉汝南伍瓊說董卓矯桓靈之政擢用天下名士以收衆望卓從之毖兵媚翻說輸芮翻考異曰范書云吏部尚書漢陽周珌侍中汝南伍瓊袁紀作侍中周毖今從魏志及英雄記命毖瓊與尚書鄭泰長史何顒等沙汰穢惡顯拔幽滯於是徵處士荀爽陳紀韓融申屠蟠處昌呂翻復就拜爽平原相復扶又翻行至宛陵宛陵縣屬河南尹在雒陽東視事三日進拜司空自被徵命及登台司凡九十三日又以紀為五官中郎將融為大鴻臚紀實之子融韶之子也爽等皆畏卓之暴無敢不至獨申屠蟠得徵書人勸之行蟠笑而不答卓終不能屈年七十餘以壽終卓又以尚書韓馥為冀州牧侍中劉岱為兗州刺史陳留孔胄為豫州刺史胄音胄考異曰九州春秋作孔胄今從董卓傳東平張邈為陳留太守潁川張咨為南陽太守卓所親愛並不處顯職但將校而已將校謂中郎將校尉處昌呂翻六年詔除光熹昭寧永漢三號除三號復稱中平六年六年董卓性殘忍一旦專政據有國家甲兵珍寶威震天下所願無極語賓客曰我相貴無上也自言非人臣之相其悖逆如此語牛倨翻相息亮翻不解劍擾龍姓也蓋古擾龍氏之後檛側瓜翻是時雒中貴戚室第相望金帛財産家家充積卓縱放兵士突其廬舍剽虜資物剽匹妙翻妻略婦女不避貴戚章甲十一行本戚作賤乙十一行本同孔本同張校同人情崩恐不保朝夕卓購求袁紹急周毖伍瓊說卓曰夫廢立大事非常人所及袁紹不達大體恐懼出奔非有他志今急購之勢必為變袁氏樹恩四世袁安四世至紹若收豪桀以聚徒衆英雄因之而起則山東非公之有也不如赦之拜一郡守紹喜於免罪必無患矣卓以為然乃即拜紹勃海太守封邟鄉侯邟苦浪翻又以袁術為後將軍曹操為驍騎校尉術畏卓出奔南陽操變易姓名間行東歸過中牟中牟縣屬河南尹間古莧翻執詣縣時縣已被卓書被皮義翻唯功曹心知是操以世方亂不宜拘天下雄雋因白令釋之白中牟令也散家財合兵得五千人是時豪傑多欲起兵討卓者袁紹在勃海冀州牧韓馥遣數部從事守之不得動搖部從事部郡國從事也勃海一郡遣部從事數人守之恐紹起兵也瑁莫報翻詐作京師三公移書與州郡陳卓罪惡云見逼迫無以自救企望義兵解國患難企欺冀翻難乃旦翻馥得移請諸從事問曰今當助袁氏邪助董氏邪治中從事劉子惠曰今興兵為國為于僞翻何謂袁董馥有慙色子惠復言兵者凶事不可為首今宜往視他州有發動者然後和之復扶又翻和戶臥翻冀州於他州不為弱也他人功未有在冀州之右者也馥然之馥乃作書與紹道卓之惡聽其舉兵考異曰范書魏志俱有此事范書在舉兵之後魏志在舉兵之前若在舉兵後時紹已為盟主馥何敢禁其發兵若在舉兵前則近是也今從魏志孝獻皇帝甲諱協諡法聰明睿智曰獻古今注協之字曰合張璠記曰靈帝以帝似己故名曰協帝王紀曰協字伯和蜀諡帝曰愍魏諡帝曰獻此從魏諡者以魏受漢禪為正也初平元年庚午一九六年春正月關東州郡皆起兵以討董卓推勃海太守袁紹為盟主紹自號車騎將軍諸將皆板授官號時卓挾天子紹等罔攸稟命故權宜板授官號冀州牧韓馥留鄴給其軍糧豫州刺史孔胄屯潁川兗州刺史劉岱陳留太守張邈邈弟廣陵太守超東郡太守橋瑁山陽太守袁遺濟北相鮑信與曹操俱屯酸棗酸棗縣屬陳留郡瑁音冒魯陽縣屬南陽郡豪桀多歸心袁紹者鮑信獨謂曹操曰夫略不世出能撥亂反正者君也苟非其人雖強必斃君殆天之所啓乎六年辛亥赦天下六年癸酉董卓使郎中令李儒鴆殺弘農王辨六年卓議大發兵以討山東尚書鄭泰曰夫政在德不在衆也卓不悅曰如卿此言兵為無用邪泰曰非謂其然也以為山東不足加大兵耳明公出自西州少為將帥間習軍事少詩照翻袁本初公卿子弟生處京師張孟卓東平長者坐不窺堂處昌呂翻長知兩翻張邈字孟卓賢曰坐不窺堂言不妄視也孔公緒清談高論噓枯吹生孔胄字公緒賢曰枯者噓之使生生者吹之使枯言談論有所抑揚也臨鋒決敵非公之儔也謂臨兵鋒而與敵人決勝負也尊卑無序若恃衆怙力將各棊峙以觀成敗不肯同心共膽與齊進退也此數語公業雖以釋言於卓然關東諸將情態實不過如此民不習戰關西頃遭羌寇婦女皆能挾弓而鬬天下所畏者無若並涼之人與羌胡義從從才用翻而明公擁之以為爪牙譬猶驅虎兕以赴犬羊兕序姊翻似牛一角而青色身重千斤角重百斤鼓烈風以掃枯葉誰敢禦之無事徵兵以驚天下使患役之民相聚為非棄德恃衆自虧威重也卓乃悅六年董卓以山東兵盛欲遷都以避之公卿皆不欲而莫敢言畏其暴也使者召拜俊辭不肯受因曰國家西遷必孤天下之望孤負也臣不知其可也使者曰召君受拜而君拒之不問徙事而君陳之何也俊曰副相國非臣所堪也遷都非計事所急也辭所不堪言其所急臣之宜也由是止不為副卓大會公卿議曰高祖都關中十有一世光武宮雒陽於今亦十一世矣按石包讖當時緯書之外又有石包室讖蓋時人附益為之如孔子閉房記之類以應天人之意百官皆默然司徒楊彪曰移都改制天下大事故盤庚遷亳殷民胥怨書序曰盤庚五遷將治亳殷民咨胥怨故光武更都雒邑更工衡翻歷年已久百姓安樂樂音洛下同今無故捐宗廟棄園陵恐百姓驚動必有糜沸之亂賢曰如糜粥之沸也詩云如沸如羹妖邪之書豈可信用卓曰關中肥饒故秦得並吞六國且隴右材木自出杜陵有武帝陶竈並功營之可使一朝而辦百姓何足與議若有前卻我以大兵驅之可令詣滄海賢曰言不敢避險難也天下動之至易易以豉翻安之甚難惟明公慮焉卓作色曰公欲沮國計邪太尉黃琬曰此國之大事楊公之言得無可思卓不答司空荀爽見卓意壯恐害彪等因從容言曰從千容翻相國豈樂此邪樂音洛山東兵起非一日可禁故當遷以圖之此秦漢之勢也謂秦漢都關中因山河形勢以制天下琬退又為駁議駁北角翻二月乙亥卓以災異奏免琬彪等以光祿勳趙謙為太尉太僕王允為司徒城門校尉伍瓊督軍校尉周毖固諫遷都卓大怒曰卓初入朝二君勸用善士故卓相從而諸君到官舉兵相圖此二君賣卓卓何用相負庚辰收瓊毖斬之楊彪黃琬恐懼詣卓謝卓亦悔殺瓊毖乃復表彪琬為光祿大夫復扶又翻六年卓徵京兆尹蓋勳為議郎蓋古盍翻時左將軍皇甫嵩將兵三萬屯扶風潘嶽關中記曰三輔舊治長安城中長吏各在其縣治民光武東都之後扶風出治槐里馮翊出治高陵會卓亦徵嵩為城門校尉嵩長史梁衍說嵩曰董卓寇掠京邑廢立從意今徵將軍大則危禍小則困辱今及卓在雒陽天子來西以將軍之衆迎接至尊奉令討逆徵兵㣥帥說輸芮翻帥所類翻袁氏逼其東將軍迫其西此成禽也嵩不從遂就徵嵩前不能從兄子酈之言今又不從衍之策自揣其才不足以制卓故也亦還京師卓以勳為越騎校尉河南尹朱俊為卓陳軍事卓折俊曰我百戰百勝決之於心卿勿妄說且汙我刀為于僞翻折之舌翻汙烏故翻蓋勳曰昔武丁之明猶求針諫賢曰武丁殷王高宗也謂傅說曰啓乃心沃朕心說復于王曰惟木從繩則正后從諫則聖余謂蓋勳忠直之士時卓方謀僭逆不應以武丁之事為言據國語楚左史倚相曰昔衛武公年數九十有五矣猶針警於國曰毋謂我老耄而捨我必恭恪於朝朝夕以交戒我聞一二之言必誦志而納之以訓道我及其沒也謂之睿聖武公勳蓋以衛武公之事責卓也史書傳寫誤以公為丁耳而欲杜人之口乎卓乃謝之六年卓遣軍至陽城值民會於社下此二月事也陽城縣屬潁川郡駕其車重重直用翻載其婦女以頭繫車轅歌呼還雒云攻賊大獲卓焚燒其頭以婦女與甲兵為婢妾甲兵謂甲兵之士六年丁亥車駕西遷董卓收諸富室以罪惡誅之沒入其財物死者不可勝計勝音升悉驅徙其餘民數百萬口於長安步騎驅蹙更相蹈藉藉慈夜翻飢餓寇掠積尸盈路卓自留屯畢圭苑中悉燒宮廟官府居家二百里內室屋蕩盡無復雞犬又使呂布發諸帝陵及公卿以下冢墓收其珍寶卓獲山東兵以者膏塗布十餘匹用纏其身然後燒之先從足起六年三月乙巳車駕入長安考異曰袁紀作己巳今從范書師古曰三輔黃圖曰京兆府在尚冠前街東入故中尉府時董卓未至朝政大小皆委之王允允外相彌縫內謀王室甚有大臣之度自天子及朝中皆倚允允屈意承卓卓亦雅信焉朝直遙翻六年董卓以袁紹之故戊午殺太傅袁隗太僕袁基及其家尺口以上五十餘人尺口謂嬰孩也六年初荊州刺史王睿裴松之曰睿晉太保祥伯父也零桂零陵桂陽也言頗輕之及州郡舉兵討董卓睿與堅亦皆起兵睿素與武陵太守曹寅不相能揚言當先殺寅寅懼詐作按行使者檄移堅說睿罪過令收行刑訖以狀上上時掌翻堅承檄即勒兵襲睿睿聞兵至登樓望之遣問欲何為堅前部答曰兵久戰勞苦欲詣使君求資直耳據吳録資直者衣資之直也兵自求賞孫府君何以在其中堅曰被使者檄誅君被皮義翻睿曰我何罪堅曰坐無所知睿窮迫刮金飲之而死陶弘景曰生金有毒不鍊服之殺人衆已數萬人南陽太守張咨不肯給軍糧堅誘而斬之陳壽志曰堅以牛酒誘之吳歷曰堅詐疾以誘之無求不獲前到魯陽魯陽縣屬南陽郡術由是得據南陽考異曰范書術傳云劉表上術為南陽太守表傳云術阻兵屯魯陽表不得至荊州魏志術傳孫堅殺張咨術得據南陽魏武帝紀此年二月已云術屯南陽蓋術初奔魯陽此春孫堅取南陽術乃據之猶以魯陽為治所也詔以北軍中候劉表為荊州刺史時寇賊縱橫道路梗塞縱子容翻塞悉則翻表單馬入宜城賢曰宜城縣屬南郡本鄢惠帝三年改名宜城與之謀曰今江南宗賊甚盛賢曰宗黨共為賊若袁術因之禍必至矣吾欲徵兵恐不能集其策焉出焉於虔翻蒯良曰衆不附者仁不足也附而不治者義不足也苟仁義之道行百姓歸之如水之趣下趣七喻翻何患徵兵之不集乎蒯越曰袁術驕而無謀宗賊帥多貪暴為下所患帥所類翻下同若使人示之以利必以衆來使君誅其無道撫而用之一州之人有樂存之心樂音洛聞君威德必襁負而至矣襁居兩翻兵集衆附南據江陵北守襄陽荊州八郡可傳檄而定郡國志荊州部南陽南郡江夏零陵桂陽長沙武陵七郡漢官儀以章陵足為八郡無能為也袁術字公路善乃使越誘宗賊帥至者五十五人皆斬之而取其衆誘音酉帥所類翻遂徙治襄陽荊州刺史本治武陵漢壽襄陽縣屬南郡江南悉平荊部在江南者長沙武陵零陵桂陽四郡也為劉表專制荊州張本六年董卓在雒陽袁紹等諸軍皆畏其強莫敢先進曹操曰舉義兵以誅暴亂大衆已合諸君何疑向使董卓倚王室據舊京東向以臨天下雖以無道行之猶足為患今焚燒宮室劫遷天子海內震動不知所歸此天亡之時也一戰而天下定矣遂引兵西將據成皋張邈遣將衛茲分兵隨之進至滎陽汴水班志汴水在滎陽西南菟同都翻與戰操兵敗為流矢所中所乘馬被創中竹仲翻被皮義翻創初良翻從弟洪以馬與操操不受從才用翻洪曰天下可無洪不可無君遂步從操夜遁去榮見操所將兵少力戰盡日謂酸棗未易攻也易以豉翻亦引兵還操到酸棗諸軍十餘萬日置酒高會不圖進取操責讓之因為謀曰為于僞翻下同諸君能聽吾計使勃海引河內之衆臨孟津勃海謂袁紹也據敖倉塞轘轅太谷全制其險塞悉則翻轘音環使袁將軍率南陽之軍軍丹析入武關此謂袁術也丹水及析縣皆屬弘農郡皆高壘深壁勿與戰益為疑兵示天下形勢以順誅逆可立定也觀操之計但欲形格勢禁待其變起於下耳非主於戰也持疑不進失天下望竊為諸君恥之邈等不能用操乃與司馬沛國夏侯惇等詣揚州募兵得千餘人還屯河內從袁紹也頃之酸棗諸軍食盡衆散劉岱與橋瑁相惡岱殺瑁以王肱領東郡太守青州刺史焦和亦起兵討董卓姓譜周武王封神農之後於焦後以國為氏務進兵與酸棗諸將相及也兵始濟河黃巾已入其境青州素殷實甲兵甚盛和每望寇奔北未嘗接風塵交旗鼓也性好卜筮信鬼神好呼到翻入見其人清談干雲出觀其政賞罰淆亂州遂蕭條悉為丘墟頃之和病卒袁紹使廣陵臧洪領青州以撫之六年夏四月以幽州牧劉虞為太傅道路壅塞塞悉則翻信命竟不得通先是幽部應接荒外荒外言荒服之外也先悉薦翻歲常割青冀賦調二億有餘以足之調徒弔翻時處處斷絶委輸不至委於僞翻輸春遇翻而虞敝衣繩屨食無兼肉務存寬政勸督農桑開上谷胡市之利通漁陽鹽鐵之饒上谷舊有關市與胡人貿易漁陽舊有鹽官鐵官穀石三十青徐士庶避難歸虞者百餘萬口虞皆收視溫恤為安立生業難乃旦翻為于僞翻流民皆忘其遷徙焉六年五月司空荀爽薨六月辛丑以光祿大夫种拂為司空拂卲之父也六年董卓遣大鴻臚韓融少府陰修執金吾胡毌班將作大匠吳修越騎校尉王王褱安集關東解譬袁紹等胡毌班吳修王王褱至河內袁紹使王匡悉收擊章甲十一行本擊作繫乙太傅馬十一行本同退齊校同殺之王褱工回翻考異曰謝承後傳衍漢書曰班王匡之妹夫班與匡書云僕與公太僕趙岐少府陰修俱受詔命關東諸郡雖實嫉卓猶以銜奉王命不敢玷辱而足下獨囚僕於獄欲以釁鼓此悖暴無道之甚者也按范書此年六月遣韓融等安集關東袁術王匡各執而殺之三年八月遣馬日磾及趙岐慰撫天下袁紀遣馬趙亦在三年八月時董卓已死而此書云與馬趙俱受詔又云恚卓遷怒自相乖忤疑非班書今不取袁術亦殺陰修惟韓融以名德免六年董卓壞五銖錢賢曰光武中興除王莽貨泉更用五銖錢孔穎達曰五銖者其重五銖凡十黍為一絫十絫為一銖二十四銖為一兩錢邊作五銖字壞音怪更工衡翻悉取雒陽及長安銅人鐘虡飛廉銅馬之屬以鑄之銅人秦始皇所鑄也賢曰鐘虡以銅為之前書音義曰虡鹿頭龍身神獸也說文鐘鼓之跗以猛獸為飾也武帝置飛廉館音義曰飛廉神禽身似鹿頭如爵有角蛇尾文如豹文明帝永平五年迎取長安飛廉銅馬置上西門外名平樂館銅馬則東門京所作置於金馬門外者也余據馬援亦進銅馬虡音巨穀石至數萬錢六年冬孫堅與官屬會飲於魯陽城東董卓步騎數萬猝至堅方行酒談笑整頓部曲無得妄動後騎漸益堅徐罷坐坐才臥翻導引入城乃曰向堅所以不即起者恐兵相蹈藉諸君不得入耳卓兵見其整不敢攻而還六年王匡屯河陽津河陽津即孟津大破之六年左中郎將蔡雍議孝和以下廟號稱宗者皆宜省去以遵先典從之禮祖有功而宗有德和帝以下無德可宗故去之去羌呂翻考異曰袁紀在明年今從范書六年中郎將徐榮薦同郡故冀州刺史公孫度於董卓卓以為遼東太守度到官以法誅滅郡中名豪大姓百餘家郡中震栗乃東伐高句驪句如字又音駒驪力知翻西擊烏桓語所親吏柳毅陽儀等曰語牛倨翻姓譜柳本自魯孝公子子展之孫以王父字為氏至展禽食采於柳下因為氏漢祚將絶當與諸卿圖正章甲十一行本正作王乙十一行本同孔本同熊校同耳於是分遼東為遼西中遼郡各置太守越海收東萊諸縣置營州刺史自立為遼東侯平州牧立漢二祖廟承制郊祀天地藉田杜佑曰藉借也謂借人力以理之勸率天下使務農也春秋傳曰郊而後耕遂藉人力以成歲功故謂之帝藉臣瓚曰親耕以躬親為義不得以假借為稱藉謂蹈藉也師古曰瓚說是說文帝藉千畝藉秦昔翻設旄頭羽騎羽騎羽林騎也容肇祖標點王崇武聶崇岐覆校
