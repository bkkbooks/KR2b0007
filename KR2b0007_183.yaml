body:
  text: 資治通鑑卷第一百八十三端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注隋紀七煬皇帝下大業十二年大業十二年丙子六一六大業十二年春正月朝集使不至者二十餘郡漢儀正旦大朝會諸郡計吏皆覲隋之朝集使亦此類也朝直遙翻下同使疏吏翻大業十二年詔毗陵通守路道德守式又翻集十郡兵數萬人於郡東南起宮苑周圍十二里內為十六離宮大抵倣東都西苑之制而奇麗過之又欲築宮於會稽會古外翻會亂不果成大業十二年三月上巳帝與㣥臣飲於西苑水上命學士杜寶撰水飾圖經采古水事七十二使朝散大夫黃袞以木為之間以妓航酒船朝直遙翻散悉亶翻間古莧翻妓渠綺翻航戶郎翻人物自動如生鍾磬箏瑟能成音曲大業十二年己丑張金稱陷平恩隋志平恩縣屬武安郡稱尺證翻又陷武安巨鹿清河諸縣隋志武安縣屬武安郡巨鹿縣屬襄國郡清河郡帶清河縣既郡城堅守則此縣不陷詳考隋志帶郭之清河本武城縣開皇初改名清河而清陽縣則舊清河縣金稱所陷蓋此所過民無孑遺孑單也遺餘也言無單孑遺餘也大業十二年夏四月丁巳大業殿西院火帝以為盜起驚走入西苑匿草間火定乃還還從宣翻又如字帝自八年以後每夜眠恆驚悸恆戶登翻悸其季翻心動也云有賊令數婦人搖撫乃得眠大業十二年癸亥歷山飛別將甄翟兒衆十萬寇太原將即亮翻甄側鄰翻將軍潘長文敗死長知兩翻大業十二年五月丙戌朔日有食之既大業十二年壬午張壬午作甲午帝於景華宮徵求螢火得數斛夜出遊山放之光遍巖谷考異曰吳兢貞觀政要貞觀八年上謂侍臣曰人君之言不可容易隋煬帝幸甘泉宮怪無螢火敕云捉取少多於宮照夜所司遽遣數千人採拾送五百輿於宮側小事尚爾況其大乎今從隋書大業十二年帝問侍臣盜賊左翊衛大將軍宇文述曰漸少帝曰比從來少幾何對曰不能什一納言蘇威引身隱柱帝呼前問之對曰臣非所司不委多少委悉也少詩沼翻帝曰何謂也威曰他日賊據長白山今近在汜水隋志汜水縣屬滎陽郡舊曰成皋開皇十八年改曰汜水汜音似今皆何在豈非其人皆化為盜乎比見奏賊皆不以實比毗至翻遂使失於支計不時翦除又昔在鴈門許罷征遼今復徵發復扶又翻賊何由息帝不悅而罷尋屬五月五日屬之欲翻百僚多饋珍玩威獨獻尚書或譖之曰尚書有五子之歌威意甚不遜言威以帝逸豫盤遊不知返將至失邦如夏太康也尚而亮翻孔安國曰以其上古之書謂之尚書頃之帝問威以伐高麗事麗力知翻威欲帝知天下多盜對曰今茲之役願不發兵但赦㣥盜自可得數十萬遣之東征彼喜於免罪爭務立功高麗可滅麗力知翻帝不懌威出御史大夫裴蘊奏曰此大不遜天下何處有許多賊帝曰老革多姦蜀志彭羕詆劉備曰老革荒悖注云老革皮色枯瘁之形羕罵備為老革猶言老兵也帝引此語欲批其口且復隱忍批蒲鱉翻又普迷翻復扶又翻蘊知帝意遣河南白衣張行本隋志洛州河南郡大業二年移都改曰豫州威昔在高陽典選謂九年從帝自遼東還高陽時選宣戀翻畏怯突厥請還京師事見上卷上年厥九勿翻獄成下詔數威罪狀數所具翻除名為民後月餘復有奏威與突厥陰圖不軌者復扶又翻厥九勿翻事下裴蘊推之蘊處威死下遐嫁翻處昌呂翻威無以自明但摧謝而已帝憫而釋之曰未忍即殺並其子孫三世皆除名大業十二年秋七月壬戌濟景公樊子蓋卒隋書樊子蓋傳帝以子蓋守東都平玄感之功進爵濟公謂其功濟天下封以嘉名無此郡國也濟讀當如字卒子恤翻大業十二年江都新作龍舟成送東都宇文述勸幸江都章十二行本都下有帝從之三字乙十一行本同孔本同張校同右候衛大將軍酒泉趙才諫曰今百姓疲勞府藏空竭隋志張掖郡福祿縣舊置酒泉郡藏徂浪翻禁令不行願陛下還京師安兆庶帝大怒以才屬吏屬之欲翻旬日意解乃出之朝臣皆不欲行帝意甚堅無敢諫者建節尉任宗上書極諫置建節尉事見上卷上年朝直遙翻下同任音壬上時掌翻下同甲子帝幸江都命越王侗與光祿大夫段達太府卿元文都檢校民部尚書韋津右武衛將軍皇甫無逸右司郎盧楚等總留後事唐六典曰煬帝三年尚書都司始置左右司郎各一人掌都省之職品同諸曹郎從五品總留後事者帝出巡幸以後事付留臺官總之侗他紅翻又音同孝寬之子也韋孝寬宇文干城之將我夢江都好征遼亦偶然奉信郎崔民象以盜賊充斥於建國門上表諫隋志帝置謁者臺官尋又置散騎郎二十人從五品承議郎正六品通直郎從六品各三十人宣德郎正七品宣義郎從七品各四十人徵事郎正八品將仕郎從八品常從郎正九品奉信郎從九品各五十人洛都羅城門正南曰建國上時掌翻先解其頤然後斬之説文頤函頁也大業十二年戊辰馮翊孫華舉兵為盜隋志馮翊郡後魏置華州西魏改曰同州帝改為郡請發兵屯洛口倉大業二年置洛口倉卿是書生定猶恇怯恇音匡戊辰車駕至鞏敕有司移箕山公路二府於倉內鞏縣屬河南郡新唐志河南有府三十九有鞏洛府無箕山公路二府疑移於倉內後遂並為鞏洛府也至汜水汜音似奉信郎王愛仁復上表請還西京帝斬之而行至梁郡帝改宋州為梁郡復扶又翻陛下若遂幸江都天下非陛下之有又斬之是時李子通據海陵左才相掠淮北杜伏威屯六合隋志六合縣屬江都郡舊曰尉氏置秦郡後周改郡曰六合開皇初廢郡改尉氏縣為六合縣相息亮翻帝遣光祿大夫陳稜將宿衛精兵八千討之往往克捷將即亮翻大業十二年八月乙巳賊帥趙萬海衆數十萬自恆山寇高陽帝改恆州為恆山郡帥所類翻恆戶登翻大業十二年冬十月己丑許恭公宇文述卒卒子恤翻初述子化及智及皆無賴化及事帝於東宮帝寵昵之昵尼質翻及即位以為太僕少卿少始照翻帝幸榆林三年幸榆林見一百八十卷帝怒將斬之已解衣辮髮既而釋之賜述為奴智及弟士及以尚主之故常輕智及惟化及與之親昵述卒帝復以化及為右屯衛將軍智及為將作少監為化及兄弟為逆張本復扶又翻大業十二年李密之亡也往依郝孝德考異曰韓昱壺關録曰大業十一年正月歷亭鎮將王該認形狀獲李密送宇文述密佯患足疾防守者一日不行一二十里忽至一澗水深岸險密跛足寅緣佯足蹶返撲而墜乃至良久狀若未蘇防守者又無計下取之遂以手中槍戟引之密以手援戟佯作失勢推戟向水守者以危岸手探不住遂即放卻密即得槍擉守者二人俱斃遂投郝孝德於平原按密楊玄感之黨前已詐亡防者豈得不加械繫怠慢如此今不取又入王薄薄亦不之奇也密困乏至削樹皮而食之匿於淮陽村舍帝改陳州為淮陽郡聚徒教授郡縣疑而捕之密亡去抵其妹夫雍丘令丘君明隋志雍丘縣屬梁郡雍於用翻轉寄密於遊俠王秀才家秀才以女妻之君明從姪懷義告其事妻七細翻從才用翻帝令懷義自齎敕書與梁郡通守楊汪相知守式又翻收捕汪遣兵圍秀才宅適值密出外由是獲免君明秀才皆死韋城翟讓為東都法曹隋志韋城縣屬東郡開皇六年置劉昫曰隋分白馬縣置於古城韋氏之國城東都當作東郡帝改滑州為兗州二年改為東郡郡有西曹金戶兵法士等曹翟萇伯翻獄吏黃君漢奇其驍勇驍堅堯翻下同夜中潛謂讓曰翟法司天時人事抑亦可知豈能守死獄中乎讓驚喜章十二行本喜下有叩頭二字乙十一行本同孔本同張校同退齋校同曰讓圈牢之豕圈求遠翻死生唯黃曹主所命君漢即破械出之讓再拜曰讓蒙再生之恩則幸矣奈黃曹主何因泣下君漢怒曰本以公為大丈夫可救生民之命故不顧其死以奉脫奈何反效兒女子涕泣相謝乎君但努力自免勿憂吾也讓遂亡命於瓦岡為㣥盜瓦岡在東郡界考異曰唐書云雄信曹州人今從河洛記單常演翻善用馬槊驍堅堯翻槊色角翻聚少年往從之少詩照翻離狐徐世績家於衛南離狐漢縣後魏之北濟陰郡也時屬濟陰郡唐中世改曰南華宋白曰離狐縣初置在濮水南常為神狐所穿穴遂移水北故曰離狐衛南古楚丘也隋開皇置衛南縣屬東郡宋白曰全衛之時此地在衛之南垂故以名縣有勇略説讓曰説輸芮翻東郡於公與績皆為鄉里人多相識不宜侵掠滎陽梁郡汴水所經帝改鄭州為滎陽郡宋州為梁郡班志汴水在滎陽西南蓋汴水所起東南入梁郡界汴皮變翻掠商旅足以自資剽匹妙翻讓然之引衆入二郡界掠公私船資用豐給附者益衆聚徒至萬餘人時又有外黃王當仁濟陽王伯當韋城周文舉雍丘李公逸等皆擁衆為盜外黃濟陽二縣隋志皆屬濟陰郡剽匹妙翻濟子禮翻章十二行本州作邱乙十一行本同孔本同張校同亡命往來諸帥間説以取天下之策帥所類翻説式芮翻下同始皆不信久之稍以為然相謂曰斯人公卿子弟志氣若是今人人皆云楊氏將滅李氏將興吾聞王者不死斯人再三獲濟豈非其人乎由是漸敬密密察諸帥唯翟讓最強乃因王伯當以見讓考異曰隋唐書皆云密歸翟讓其中有知密是玄感亡將潛勸讓害之密懼因王伯當以策干讓讓始敬焉按密既亡歸㣥盜必不隱其姓名誰不知是玄感亡將讓得之當用以敵隋何惡於密而害之今不取革命記云密投賊帥郝孝德説之曰君能用密之策河朔可指揮而定孝德曰本緣飢荒求活性命何敢別圖國家若知公在此孝德死亡無日翟讓等徒衆絶多請將兵送公於彼是日孝德以馬一匹自送至河執袂飲酒而別軍中慕從者亦數十人仍遣兵馬將送密於翟讓今從隋書為于偽翻往説諸小盜皆下之讓悅稍親近密與之計事近其靳翻密因説讓曰劉項皆起布衣為帝王今主昏於上民怨於下鋭兵盡於遼東和親絶於突厥厥九勿翻方乃巡遊揚越委棄東都此亦劉項奮起之會也以足下雄才大略士馬精鋭席卷二京誅滅暴虐隋氏不足亡也卷讀曰捲讓謝曰吾儕㣥盜旦夕偷生草間儕士皆翻君之言者非吾所及也會有李玄英者自東都逃來經歷諸賊求訪李密云斯人當代隋家人問其故玄英言比來民間謠歌比毗至翻有桃李章曰桃李子皇后繞揚州宛轉花園裏勿浪語誰道許桃李子謂逃亡者李氏之子也皇與后皆君也宛轉花園裏謂天子在揚州無還日將轉於溝壑也莫浪語誰道許者密也既與密遇遂委身事之前宋城尉齊郡房玄藻自負其才隋志宋城縣帶梁郡舊曰睢陽開皇十八年更名預於楊玄感之謀變姓名亡命遇密於梁宋之間遂與之俱遊漢沔沔彌兗翻遍入諸賊説其豪傑還日從者數百人説式芮翻從才用翻仍為遊客處於讓營處昌呂翻讓見密為豪傑所歸欲從其計猶豫未決有賈雄者曉陰陽占候為讓軍師言無不用密深結於雄使之託術數以説讓雄許諾懷之未發會讓召雄告以密所言問其可否對曰吉不可言又曰公自立恐未必成若立斯人事無不濟讓曰如卿言蒲山公當自立何來從我對曰事有相因所以來者將軍姓翟翟者澤也翟萇伯翻蒲非澤不生故須將軍也讓然之與密情好日篤好呼到翻密因説讓曰今四海糜沸糜粥也言如粥之沸也公士衆雖多食無倉廩唯資野掠常苦不給若曠日持久加以大敵臨之必渙然離散未若先取滎陽休兵館穀考異曰革命記密説讓曰洛口倉米逾巨億請公發一札之令使密奉之告諸道英雄就倉喫米必當雲合響應受命於公然後稱帝號以定中原云云讓曰就倉食米實是上計自顧庸賤寧敢別創餘心必如此謀願奉公為主密懷懼改容而拜讓亦拜於是言宴盡歡各恨相知之晚即日讓作書與密散告諸處賊頭並克寸期定日令總會洛口倉食米今從隋書然後與人爭利讓從之於是破金隄關金隄關當在滎陽界以漢金隄名之多下之滎陽太守郇王慶弘之子也弘高祖從祖弟也封河間王守式又翻下同帝徙張須陀為滎陽通守以討之庚戌須陀引兵擊讓讓嚮數為須陀所敗數所角翻敗補邁翻聞其來大懼將避之密曰須陀勇而無謀兵又驟勝既驕且狠可一戰擒也狠戶墾翻公但列陳以待密保為公破之陳讀曰陳下同為于偽翻下同讓不得已勒兵將戰密分兵千餘人伏於大海寺北林間須陀素輕讓方陳而前讓與戰不利須陀乘之逐北十餘里密發伏掩之須陀兵敗密與讓及徐世績王伯當合軍圍之須陀潰圍出左右不能盡出須陀躍馬復入救之來往數四遂戰死所部兵晝夜號哭數日不止史言張須陀得士卒心號戶刀翻為于偽翻喪息浪翻鷹揚郎將河東賈務本為須陀之副亦被傷帥餘衆五千餘人奔梁郡務本尋卒將即亮翻被皮義翻帥讀曰率卒子恤翻詔以光祿大夫裴仁基為河南討捕大使代領其衆徙鎮虎牢虎牢即滎陽郡汜水縣使疏吏翻讓乃令密建牙別統所部號蒲山公營密部分嚴整分扶問翻凡號令士卒雖盛夏皆如背負霜雪躬服儉素所得金寶悉頒賜麾下由是人為之用麾下士卒多為讓士卒所陵辱以威約有素不敢報也讓謂密曰今資糧粗足粗坐五翻今人多從去聲意欲還向瓦岡公若不往唯公所適讓從此別矣讓帥輜重東引重直用翻密亦西行至康城説下數城説輸芮翻大獲資儲讓尋悔復引兵從密復扶又翻大業十二年鄱陽賊帥操師乞自稱元興王建元始興帝改饒州為鄱陽郡操姓也帥所類翻考異曰隋帝紀作操天成按唐高祖實録林士弘傳大業末與其鄉人操師乞起為㣥盜師乞僭號建元為天成攻陷豫章郡入據之唐書士弘傳操乞師自號元興王皆無操天成名此賊本一人而隋唐二史各有名號年紀今參取之帝改洪州為豫章郡詔治書侍御史劉子翊將兵討之師乞中流矢死治直之翻中竹仲翻士弘代統其衆與子翊戰於彭蠡湖禹貢東匯澤為彭蠡班志豫章郡彭澤縣彭蠡湖在西今在南康軍城東南西接江州德化縣界周回四百五十里士弘兵大振至十餘萬人十二月壬辰士弘自稱皇帝國號楚建元太平考異曰唐高祖實録士弘自稱南越王尋僭號建元延康唐書林士弘傳操乞師攻陷豫章郡而據之以士弘為大將軍乞師既死士弘代董其衆復與劉子翊大戰於彭蠡湖隋師敗績子翊死之士弘大振兵至十餘萬十三年徙據虔州稱帝其國號年名與此同今從隋書帝改江州為九江郡改撫州為臨川郡虔州為南康郡袁州為宜春郡以郡縣應之其地北自九江南及番禺皆為所有南海郡治番禺隋併為南海縣番音潘禺音愚大業十二年詔以右驍衛將軍唐公李淵為太原留守帝改並州為太原郡驍堅堯翻守式又翻帝改定官制十二衛府每衛置護軍四人掌副二將軍尋改護軍為虎賁郎將正四品而置虎牙郎將六人副焉從四品將即亮翻下同賁音奔甄側鄰翻與翟兒遇於雀鼠谷隋志西河郡永安縣有雀鼠谷賊圍淵數匝匝子答翻李世民將精兵救之拔淵於萬衆之中會步兵至合擊大破之考異曰新舊唐書本紀皆云十三年拜太原留守新書仍云擊高陽歷山飛賊甄翟兒於西河破之今從隋帝紀大業十二年帝疏薄骨肉蔡王智積每不自安及病不呼醫臨終謂所親曰吾今日始知得保首領沒於地矣大業十二年張金稱郝孝德孫宣雅高士達楊公卿等寇掠河北屠陷郡縣隋將帥敗亡者相繼將即亮翻帥所類翻唯虎賁中郎將蒲城王辨清河郡丞華陰楊善會數有功按隋官制無中郎將王辨傳辨自鷹揚郎將遷虎賁郎將中字衍隋志蒲城縣屬馮翊郡數所角翻未嘗負敗帝遣太僕卿楊義臣討張金稱金稱營於平恩東北隋志平恩縣屬武安郡據永濟渠為營隋志臨清縣屬清河郡劉昫曰臨清漢清泉縣後魏改為臨清永濟渠大業初所開深溝高壘不與戰金稱日引兵至義臣營西義臣勒兵擐甲擐音宦約與之戰既而不出日暮金稱還營明旦復來復扶又翻下同如是月餘義臣竟不出金稱以為怯屢逼其營詈辱之詈力智翻義臣乃謂金稱曰汝明旦來我當必戰金稱易之不復設備易以豉翻義臣簡精騎二千夜自館陶濟河隋志館陶縣屬武陽郡此河謂清河也即入擊其纍重離力智翻纍力瑞翻重直用翻金稱聞之引兵還義臣從後擊之金稱大敗與左右逃於清河之東月餘楊善會討擒之吏立木於市懸其頭張其手足令仇家割食之未死間歌謳不輟詔以善會為清河通守守式又翻大業十二年涿郡通守郭絢絢許縣翻將兵萬餘人討高士達士達自以才略不及竇建德乃進建德為軍司馬悉以兵授之建德請士達守輜重自簡精兵七千人拒絢詐為與士達有隙而叛遣人請降於絢降戶江翻願為前驅擊士達以自效絢信之引兵隨建德至長河隋志長河縣屬平原郡舊曰廣川仁壽初改名建德襲之殺虜數千人斬絢首獻士達張金稱餘衆皆歸建德楊義臣乘勝至平原欲入高雞泊討之建德謂士達曰歷觀隋將將即亮翻善用兵者無如義臣今滅張金稱而來其鋒不可當請引兵避之使其欲戰不得坐費歲月將士疲倦然後乘間擊之間古莧翻乃可破也不然恐非公之敵士達不從留建德守營自帥精兵逆擊義臣帥讀曰率戰小勝因縱酒高宴建德聞之曰東海公未能破敵遽自矜大禍至不久矣後五日義臣大破士達於陳斬之乘勝逐北趣其營陳讀曰陳趣七喻翻營中守兵皆潰建德與百餘騎亡去至饒陽隋志饒陽縣屬河間郡騎奇寄翻攻陷之收兵得三千餘人義臣既殺士達以為建德不足憂引去建德還平原收士達散兵收葬死者為士達發喪軍復大振為于偽翻考異曰革命記曰高士達高德政與宗族鳩集離散得五萬人捺渦於四根柳樹入高雞泊中德政自號東海公以建德為長史俄而德政病死即有高檔脫繼立為東海公建德仍依舊任檔脫領兵劫抄至晏城府為城中兵所射而死賊之異姓皆欲建德為主高氏一族不欲更立別人遂分為兩軍各相猜二然高氏兵精強建德恐被屠乃詐分為官軍告高氏併力共擊之高氏無疑即合軍共鬬兵刃才交建德自後擊之高氏兵大亂建德兩軍擁掠遣坐簡其驍勇及頭首千餘人殺之遂總統其衆建德自號長樂王寇抄州縣即大業十二年二月也今從隋唐書自稱將軍先是㣥盜得隋官及士族子弟皆殺之先悉薦翻獨建德善遇之由是隋官稍以城降之聲勢日盛勝兵至十餘萬人降戶江翻下同勝音升大業十二年內史侍郎虞世基以帝惡聞賊盜惡烏路翻諸將及郡縣有告敗求救者將即亮翻世基皆抑損表狀不以實聞但云鼠竊狗盜郡縣捕逐行當殄盡願陛下勿以介懷帝良以為然或杖其使者以為妄言由是盜賊遍海內陷沒郡縣帝皆弗之知也楊義臣破降河北賊數十萬列狀上聞所降者皆張金稱高士達之衆將即亮翻使疏吏翻上時掌翻我初不聞賊頓如此義臣降賊何多也世基對曰小竊雖多未足為慮義臣克之擁兵不少少詩沼翻下同久在閫外此最非宜帝曰卿言是也遽追義臣放散其兵賊由是復盛復扶又翻治書侍御史韋雲起劾奏世基及御史大夫裴蘊職典樞要維持內外四方告變不為奏聞治直之翻劾戶概翻又戶得翻為于偽翻賊數實多裁減言少陛下既聞賊少發兵不多衆寡懸殊往皆不克故使官軍失利賊黨日滋請付有司結正其罪大理卿鄭善果奏雲起詆訾名臣訾將此翻所言不實非毀朝政妄作威權朝直遙翻由是左遷雲起為大理司直唐六典後魏永安三年御史中尉高穆奏置司直十人視五品隸廷尉位在正監上不署曹事唯覆理御史劾事北齊及隋因之大業十二年帝至江都江淮郡官謁見者見賢遍翻專問禮餉豐薄豐則超遷丞守薄則率從停解江都郡丞王世充獻銅鏡屏風遷通守守式又翻歷陽郡丞趙元楷獻異味遷江都郡丞帝改和州為歷陽郡趙元楷自小郡丞遷大郡丞以充貢獻民外為盜賊所掠內為郡縣所賦生計無遺加之飢饉無食無穀曰飢無蔬果曰饉或搗藁為末或煮土而食之諸物皆盡乃自相食而官食猶充牣吏皆畏法莫敢振救王世充密為帝簡閲江淮民間美女獻之由是益有寵大業十二年河間賊帥格謙擁衆十餘萬據豆子鹵亢帝改瀛州為河間郡姓苑格姓允格之後帥所類翻鹵亢各朗翻帝命王世充將兵討斬之謙將勃海高開道帝改滄州為勃海郡燕因肩翻將即亮翻下同寇掠燕地軍勢復振復扶又翻大業十二年初帝謀伐高麗麗力知翻器械資儲皆積於涿郡涿郡人物殷阜屯兵數萬又臨朔宮多珍寶諸賊競來侵掠留守官虎賁郎將趙什住等不能拒唯虎賁郎將雲陽羅藝獨出戰守式又翻賁音奔將即亮翻雲陽縣屬京兆郡前後破賊甚衆威名日重什住等陰忌之藝將作亂先宣言以激其衆曰吾輩討賊數有功數所角翻城中倉庫山積制在留守之官而莫肯散施以濟貧乏施式豉翻將何以勸將士衆皆憤怨軍還郡丞出城候藝藝因執之陳兵而入什住等懼皆來聽命乃發庫物以賜戰士開倉廩以賑貧乏境內咸服殺不同己者勃海太守唐禕等數人守式又翻威振燕地柳城懷遠並歸之藝黜柳城太守楊林甫改郡為營州隋志柳城縣帶遼西郡與襄平郡蓋皆帝所置改郡為州示復開皇之舊也皓古老翻藝自稱幽州總管大業十二年突厥數寇北邊厥九勿翻詔晉陽留守李淵帥太原道兵與馬邑太守王仁恭擊之晉陽留守即太原留守也太原有晉陽宮故亦稱晉陽留守帝改朔州為馬邑郡帥讀曰率下同守式又翻兩軍衆不滿五千仁恭患之淵選善騎射者二千人使之飲食舍止一如突厥或與突厥遇則伺便擊之前後屢捷突厥頗憚之前後屢得小捷耳曰頗憚者未深憚也厥九勿翻騎奇寄翻伺相吏翻恭皇帝上義寧元年義寧元年丁丑六一七是年十一月李淵克長安方奉代王即位改元通鑑因以繫年義寧元年春正月右禦衛將軍陳稜討杜伏威伏威帥衆拒之稜閉壁不戰伏威遺以婦人之服謂之陳姥遺于季翻姥莫補翻稜怒出戰伏威奮擊大破之稜僅以身免考異曰隋陳稜傳云往往克捷唐杜伏威傳云稜僅以身免蓋稜先破李子通等後為伏威所敗也今從唐書隋志高郵縣屬江都郡自稱總管以輔公祏為長史祏音石長知兩翻分遣諸將徇屬縣所至輒下將即亮翻江淮間小盜爭附之伏威常選敢死之士五千人謂之上募寵遇甚厚有攻戰輒令上募先擊之戰罷閲視有傷在背者即殺之以其退而被擊故也破皮義翻所獲資財皆以賞軍士有戰死者以妻妾徇葬故人自為戰所向無敵義寧元年丙辰竇建德為壇於樂壽隋志樂壽縣屬河間郡古樂城縣仁壽初更名樂音洛下同置百官改元丁丑考異曰許敬宗太宗實録舊唐帝紀皆云武德元年二月建德稱長樂王按建德改元丁丑即是今歲今從隋帝紀及建德傳義寧元年辛巳魯郡賊徐圓朗攻陷東平分兵略地自琅邪以西北至東平盡有之煬帝改兗州為魯郡改鄆州為東平郡沂州為琅邪郡邪音耶勝音升義寧元年盧明月轉掠河南至于淮北衆號四十萬自稱無上王帝命江都通守王世充討之世充與戰於南陽大破之隋志南陽郡舊置荊州開皇初改鄧州煬帝改為郡守式又翻餘衆皆散義寧元年二月壬午朔方鷹揚郎將梁師都帝改夏州為朔方郡將即亮翻據郡自稱大丞相北連突厥義寧元年馬邑太守王仁恭煬帝改朔州為馬邑郡不能振施施式豉翻郡人劉武周驍勇喜任俠驍堅堯翻喜許記翻為鷹揚府校尉煬帝改大都督為校尉校戶教翻甚親厚之令帥親兵屯閣下帥讀曰率武周與仁恭侍兒私通恐事泄謀作亂先宣言曰今百姓飢饉僵尸滿道王府君閉倉不賑恤豈為民父母之意乎僵居良翻賑津忍翻下同衆皆憤怒武周稱疾臥家豪傑來候問武周椎牛縱酒因大言曰壯士豈能坐待溝壑今倉粟爛積誰能與我共取之豪傑皆許諾己丑仁恭坐聽事聽讀曰廳武周上謁上時掌翻其黨張萬歲等隨入升階斬仁恭持其首出徇郡中無敢動者於是開倉以賑飢民馳檄境內屬城皆下之收兵得萬餘人武周自稱太守守式又翻考異曰創業注云二月己丑馬邑軍人劉武周殺太守王仁恭據其郡自稱天子國號定楊按唐書武周據汾陽宮乃僭號於時未也遣使附于突厥使疏吏翻厥九勿翻義寧元年李密説翟讓曰説式芮翻翟萇伯翻今東都空虛兵不素練越王沖幼留守諸官政令不一士民離心段達元文都暗而無謀以僕料之彼非將軍之敵若將軍能用僕計天下可指麾而定乃遣其黨裴叔方覘東都虛實守式又翻令力定翻覘丑廉翻又丑豔翻留守官司覺之始為守禦之備且馳表告江都密謂讓曰事勢如此不可不發兵法曰先則制於己後則制於人今百姓飢饉洛口倉多積粟去都百里有餘都謂東都輕行掩襲帥讀曰率彼遠未能救又先無豫備取之如拾遺耳比其聞知比必寐翻發粟以賑窮乏遠近孰不歸附百萬之衆一朝可集枕威養鋭枕職任翻以逸待勞縱彼能來吾有備矣然後檄召四方引賢豪而資計策選驍悍而授兵柄驍堅堯翻悍戶旰翻又下罕翻除亡隋之社稷布將軍之政令豈不盛哉讓曰此英雄之略非僕所堪惟君之命盡力從事請君先發僕為後殿殿丁甸翻庚寅密讓將精兵七千人將即亮翻出陽城北踰方山自羅口襲興洛倉破之隋志陽城縣屬河南郡陸渾縣有方山鞏縣有興洛倉魏收地形志鞏縣有長羅川羅口蓋即長羅川口水經羅水出方山西北流謂之長羅川又西北過訾城東北而入于洛括地志方山在洛州汜水縣東南三十二里汜水所出也老弱襁負道路相屬襁居兩翻屬之欲翻朝散大夫時德睿以尉氏應密時姓楚大夫申叔時之後隋志尉氏縣屬潁川郡尉氏漢縣也應劭曰古獄官曰尉氏鄭之別獄也臣瓚曰鄭大夫尉氏之邑故遂以名邑朝直遙翻散悉亶翻隋志宿城縣屬東平郡開皇十六年置劉昫曰漢須昌縣故城在今鄆州東南三十二里隋於此置宿城縣昌平縣隋志屬涿郡珽之子也珽他鼎翻博學強記文辭贍敏著名海內吏部侍郎薛道衡嘗薦之於高祖高祖曰是歌殺斛律明月人兒邪歌殺斛律光事見一百七十一卷陳高宗太建四年邪音耶煬帝即位尤疾其名依常調選東平書佐檢校宿城令隋制州郡皆有書佐在祭酒從事之上視正九品謂之流內視品檢校官未得為真調徒釣翻選宣戀翻常鬱鬱思亂密素聞其名得之大喜引為上客軍中書檄一以委之越王侗遣虎賁郎將劉長恭光祿少卿房崱侗音通賁音奔將即亮翻少始照翻崱士力翻帥步騎二張二作三萬五千討密帥讀曰率下同騎奇寄翻時東都人皆以密為飢賊盜米烏合易破易以豉翻爭來應募國子三館學士隋以國子太學四門為三館器械修整衣服鮮華旌旗鉦鼓甚盛長恭等當其前使河南討捕大使裴仁基等將所部兵自汜水而入以掩其後大使疏吏翻將即亮翻汜音祀約十一日會於倉城南考異曰蒲山公傳云剋取二十一日會戰河洛記曰取其月十二日會戰按下有庚子則非二十一日也當是十一日東都兵先至士卒未朝食長恭等驅之渡洛水陳於石子河西水經注洞水出南溪石泉世亦名之為石泉水過鞏東坎欿聚西而北入于洛蓋即石子河也陳讀曰陳下同密讓選驍雄分為十隊驍堅堯翻令四隊伏橫嶺下以待仁基以六隊陳於石子河東長恭等見密兵少輕之少詩沼翻讓先接戰不利密帥麾下橫衝之隋兵飢疲遂大敗長恭等解衣潛竄得免奔還東都士卒死者什五六越王侗釋長恭等罪慰撫之密讓盡收其輜重器甲重直用翻威聲大振讓於是推密為主上密號為魏公上時掌翻庚子設壇場即位稱元年考異曰壺關録云王伯當令密於西垣校射書王字於堋上如錢約中者為主其次以近遠為拜官高下使賈雄執箭仰天而誓密正中字心遂奉以為主其説鄙陋今不取河洛記云改大業十三年為永平元年今從蒲山公傳及隋唐書其文書行下下遐嫁翻稱行軍元帥府帥所類翻下同其魏公府置三司六衛元帥府置長史以下官屬拜翟讓為上柱國司徒東郡公長知兩翻考異曰河洛記云鄧公蓋後來進封耳今從蒲山公傳及隋唐書亦置長史以下官減元帥府之半以單雄信為左武候大將軍單音善徐世績為右武候大將軍各領所部房彥藻為元帥左長史東郡邴元真為右長史楊德方為左司馬鄭德韜為右司馬祖君彥為記室其餘封拜各有差於是趙魏以南江淮以北㣥盜莫不響應孟讓郝孝德王德仁郝呼各翻及濟陰房獻伯上谷王君廓長平李士才淮陽魏六兒李德謙譙郡張遷魏郡李文相譙郡黑社白社濟北張青特上洛周比洮胡驢賊等皆歸密隋志長平郡舊曰建州開皇初改為澤州煬帝改為郡譙郡後魏置南兗州後周改亳州煬帝改為郡改濟州為濟北郡商州為上洛郡黑社白社蓋賊之號非人姓名也濟子禮翻相息亮翻比毗至翻洮土刀翻使各領其衆置百營簿以領之道路降者不絶如流降戶江翻衆至數十萬考異曰略記云二月丙辰密遣其將夜襲倉城二府兵擊退之己未又悉衆來攻而府兵敗遂入據倉然二府將士猶各固小倉城二十餘日不下既而外救不至食又盡城乃陷沒死者太半於是鞏縣長柴孝和監察御史鄭頲等舉縣降賊密開倉招納降者日數百千人於是趙魏以南江淮以北莫不歸附自是賊徒滋蔓矣壬子使劉長恭房崱等統兵東討大敗戊午還都王慰撫不責也於是發教募士庶商旅奴等分置營壁各立將帥統領而固守其諸里居民皆移入三城之內於省寺府舍安置焉又使宋遵貴將兵鎮陝縣太原倉雜記密稱魏公改年于時倉猶自固守既而密遣翟讓將兵夜襲倉城官軍擊退之明日又引衆攻倉連戰三日陷外城官軍猶捉子城月餘外援不至城盡陷沒死者十六七按二月壬午朔無丙辰等日今從隋書方四十里而居之考異曰壺關録云周四十八里今從隋書取安陸汝南淮安濟陽煬帝改安州為安陸郡隋志汝南郡後魏置豫州帝改洛州為豫州以此為秦州又改曰蔡州尋改為郡淮安郡後魏置東荊州西魏改為淮州開皇五年又改為顯州煬帝改為郡濟陽縣屬濟陰郡濟子禮翻義寧元年鴈門郡丞河東陳孝意與虎賁郎將王智辨共討劉武周圍其桑乾鎮桑乾漢縣後魏為桑乾郡後周廢隋以為鎮在馬邑郡善陽縣界賁音奔將即亮翻乾音干壬寅武周與突厥合兵擊智辨殺之孝意奔還鴈門三月丁卯武周襲破樓煩郡進取汾陽宮獲隋宮人以賂突厥始畢可汗厥九勿翻可從刊入聲汗音寒始畢以馬報之兵勢益振又攻陷定襄煬帝改雲州為定襄郡言將使之定楊州也考異曰新舊唐書武周皆無國號惟創業起居注云國號定楊隋書曰突厥本狼種牙門建狼頭纛示不忘本也遺于季翻立妻沮氏為皇后沮子余翻改元天興以衛士楊伏念為尚書左僕射妹壻同縣苑君璋為內史令武周引兵圍鴈門陳孝意悉力拒守乘間出擊武周屢破之間古莧翻下同既而外無救援遣間使詣江都皆不報使疏吏翻孝意誓以必死旦夕向詔敕庫俯伏流涕悲動左右圍城百餘日食盡校尉張倫殺孝意以降校戶教翻降戶江翻義寧元年梁師都略定雕陰弘化延安等郡隋志雕陰郡西魏置綏州大業初改為上郡尋改為雕陰郡改慶州為弘化郡國號梁改元永隆始畢遺以狼頭纛號為大度毗伽可汗師都乃引突厥居河南之地攻破鹽川郡隋志鹽川郡西魏置西安州後改為鹽州煬帝改為郡義寧元年左翊衛蒲城郭子和郭子和蓋衛士之屬左翊衛府者會郡中大飢子和潛結敢死士十八人攻郡門執郡丞王才數以不恤百姓斬之數所具翻開倉賑施自稱永樂王施式豉翻樂音洛改元丑平尊其父為太公以其弟子政為尚書令子端子升為左右僕射有二千餘騎南連梁師都北附突厥各遣子為質以自固騎奇寄翻厥九勿翻質音致始畢以劉武周為定楊天子梁師都為解事天子解戶買翻子和為平楊天子平楊猶定楊也乃更以為屋利設義寧元年汾陰薛舉僑居金城隋志汾陰縣屬河東郡煬帝改蘭州為金城郡僑寓也家資巨萬交結豪傑雄於西邊為金城府校尉新唐志金城郡有府二曰廣武金城校尉其帥驍堅堯翻校戶教翻金城令郝瑗金城縣帶郡郝呼各翻瑗于眷翻使舉將而討之將即亮翻夏四月癸未方授甲置酒饗士舉與其子仁果及同黨十三人於座劫瑗發兵考異曰唐高祖實録先作仁果後作仁杲新舊高祖太宗紀薛舉傳柳芳唐曆柳宗元集皆作仁杲太宗實録吳兢太宗勳史革命記焦璐唐朝年代記陳嶽唐統記皆作仁果今醴泉昭陵前有石馬六匹其一銘曰白蹄烏平薛仁果時所乘此最可據今從之開倉賑施賑津忍翻施式智翻自稱西秦霸王改元秦興以仁果為齊公少子仁越為晉公招集㣥盜掠官牧馬賊帥宗羅喉帥衆歸之以為義興公少詩照翻賊帥所類翻喉帥讀曰率將軍皇甫綰將兵一萬屯枹罕煬帝改河州為枹罕郡綰將即亮翻枹音膚章十二行本之下有遂克枹罕四字乙十一行本同張校同退齋校同岷山羌酋鍾利俗擁衆二萬歸之隋志臨洮郡臨洮縣有岷山酋才由翻更以仁果為齊王領東道行軍元帥帥所類翻仁越為晉王兼河州刺史復以枹罕郡為河州以副仁果分兵略地取西平澆河二郡煬帝改鄯州為西平郡周武帝逐吐谷渾置廓州煬帝改為澆河郡澆古堯翻盡有隴西之地衆至十三萬幾居豈翻義寧元年李密以孟讓為總管齊郡公考異曰河洛記作孟達今從隋書己丑讓帥步騎二千入東都外郭外郭羅郭也帥讀曰率騎奇寄翻比曉而去比必寐翻於是東京居民悉遷入宮城臺省府寺皆滿鞏縣長柴孝和監察御史鄭頲以城降密長知兩翻下同頲他鼎翻降戶江翻下同密以孝和為護軍頲為右長史裴仁基每破賊得軍資悉以賞士卒監軍御史蕭懷靜不許監工銜翻士卒怨之懷靜又屢求仁基長短劾奏之劾戶概翻又戶得翻倉城之戰仁基失期不至聞劉長恭等敗懼不敢進屯百花谷百花谷蓋在汜水縣西鞏縣東南又恐獲罪於朝朝直遙翻李密知其狼狽集韻狽音貝狼屬生子或欠一足二足相附而行離則蹎故猝遽謂之狼狽使人説之説輸芮翻啖以厚利啖徒濫翻賈務本之子閏甫在軍中賈務本見上滎陽之戰仁基曰如蕭御史何閏甫曰蕭君如棲上雞若不知機變在明公一刀耳仁基從之遣閏甫詣密請降密大喜以閏甫為元帥府司兵參軍兼直記室事使之復命遺仁基書慰納之遺于季翻仁基還屯虎牢蕭懷靜密表其事仁基知之遂殺懷靜帥其衆以虎牢降密密以仁基為上柱國河東公仁基子行儼驍勇善戰密亦以為上柱國絳郡公驍堅堯翻下同密得秦叔寶及東阿程咬金隋志東阿縣屬濟北郡咬五巧翻驃騎開皇官制也煬帝改為鷹揚郎將驃匹妙翻騎奇寄翻分隸四驃騎以自衛號曰內軍常曰此八千人足當百萬咬金後更名知節更工衡翻羅士信趙仁基皆帥衆歸密密署為總管使各統所部癸巳密遣裴仁基孟讓帥二萬餘人襲回洛東倉破之新唐志孟州河陽有回洛故城是地得名之由見一百五十八卷梁武帝大同九年煬帝使宇文愷營造東都洛水貫都有河漢之象因名其橋為天津橋東都出兵擊之仁基等敗走密自帥衆屯回洛倉東都兵尚二十餘萬人乘城擊柝柝他各翻晝夜不解甲密攻偃師金墉皆不克偃師縣屬河南郡在都城東六十里晉金墉城在洛城西北隋營東都城東去故都十八里則金墉亦在都城之東乙未還洛口考異曰略記三月辛未密遣孟讓將二十餘人夜入都郭燒豐都市比曉而去癸未密襲據都倉乙亥密部衆入自上春門於宣仁門東街立柵而住丙寅燒上春門及街南北里門樓火接宣仁門因逼門為陳與城上弓矢相接而退還倉雜記密遣格謙將兵燒豐都市三月越王侗教募力捉宮城守固官賞有差撤天津等諸橋運回洛倉米入城四月密攻偃師圍金墉東都兵出密還洛口五月裴仁基翻虎牢入賊自滎陽以東至陳譙下邳彭城梁郡皆屬密賊衆逾盛並家口百萬蒲山公傳三月乙亥密帥衆入自上東門攻宣仁門不克丙寅燒上東門而退此三書月日交錯皆不可憑今從隋唐書東都城內乏糧而布帛山積至以絹為汲綆綆古杏翻然布以爨越王侗使人運回洛倉米入城遣兵五千屯豐都市五千屯上春門五千屯北邙山為九營首尾相應以備密丁酉房獻伯陷汝陰煬帝改潁州為汝陰郡守式又翻陀徒河翻降戶江翻考異曰隋書作趙他今從蒲山公傳己亥密帥衆三萬復據回洛倉大修營塹以逼東都復扶又翻塹七豔翻段達等出兵七萬拒之辛丑戰於倉北隋兵敗走丁未密使其幕府移檄郡縣數煬帝十罪數所具翻又所主翻且曰罄南山之竹書罪無窮決東海之波流惡難盡祖君彥之辭也越王侗遣太常丞元善達間行賊中間古莧翻詣江都奏稱李密有衆百萬圍逼東都據洛口倉城內無食若陛下速還烏合必散不然者東都決沒因歔欷嗚咽帝為之改容歔音虛欷音希又許既翻為于偽翻虞世基進曰越王年少少詩照翻此輩誑之誑居況翻若如所言善達何緣來至帝乃勃然怒曰善達小人敢廷辱我因使經賊中向東陽催運此東陽蓋指婺州東陽郡是後人人杜口莫敢以賊聞世基容貌沈審沈持林翻言多合意特為帝所親愛朝臣無與為比親黨憑之鬻官賣獄賄賂公行其門如市由是朝野共疾怨之朝直遙翻內史舍人封德彞託附世基以世基不間吏務間習也宣行詔命諂順帝意㣥臣表疏忤旨者皆屏而不奏為于偽翻忤五故翻屏必郢翻鞫獄用法多峻文深詆論功行賞則抑削就薄故世基之寵日隆而隋政益壞皆德彞所為也義寧元年初唐公李淵娶於神武肅公竇毅神武郡名隋志馬邑郡神武縣舊置神武郡建成世民玄霸元吉一女適太子千牛備身臨汾柴紹隋志東宮左右內率府有千牛備身八人掌執千牛刀以千牛名刀者取其解千牛而芒刃不頓臨汾縣帶臨汾郡本平陽也開皇初改名世民聰明勇決識量過人見隋室方亂陰有安天下之志傾身下士散財結客咸得其歡心下遐稼翻世民娶右驍衛將軍長孫晟之女驍堅堯翻長知兩翻晟承正翻右勳衛長孫順德晟之族弟也與右勳侍池陽劉弘基隋開皇置親勳武三衛大業初改為親勳武三侍順德蓋開皇中為勳衛弘基則為大業勳侍也三衛三侍皆分左右劉弘基雍州池陽人隋志雍州有雲陽縣無池陽舊唐志云貞觀三年改石門為雲陽雲陽為池陽通鑑據唐書以唐州縣書之也亡命在晉陽依淵與世民善左親衛竇琮熾之孫也竇熾隋初三公素與世民有隙每以自疑世民加意待之出入臥內琮意乃安晉陽宮監猗氏裴寂隋離宮皆置宮監猗氏縣屬河東郡晉陽縣帶太原郡武功縣屬京兆郡見城上烽火寂歎曰貧賤如此復逢亂離復扶又翻將何以自存文靜笑曰時事可知吾二人相得何憂貧賤文靜見李世民而異之深自結納謂寂曰此非常人豁達類漢高神武同魏祖年雖少命世才也少詩照翻寂初未然之未知文靜之言為是文靜坐與李密連昏繫太原獄繫郡獄文靜曰天下大亂非高光之才不能定也以漢高祖光武之事擲發世民省悉景翻下同安知其無但人不識耳我來相省非兒女子之情欲與君議大事也計將安出文靜曰今主上南巡江淮李密圍逼東都㣥盜殆以萬數當此之際有真主驅駕而用之取天下如反掌耳太原百姓皆避盜入城文靜為令數年知其豪傑一旦收拾可得十萬人尊公所將之兵復且數萬將即亮翻復扶又翻一言出口誰敢不從以此乘虛入關號令天下不過半年帝業成矣世民笑曰君言正合吾意乃陰部署賓客淵不之知也世民恐淵不從猶豫久之不敢言淵與裴寂有舊每相與宴語或連日夜文靜欲因寂關説關白也説輸芮翻下同世民出私錢數百萬使龍山令高斌廉與寂博稍以輸之按隋志後齊置龍山縣帶太原郡開皇十年改曰晉陽則此時不復有龍山矣豈斌廉在開皇中嘗為令史以舊官書之邪對博者不勝者納物與勝者曰輸斌音彬由是日從世民遊情款益狎世民乃以其謀告之寂許諾會突厥寇馬邑淵遣高君雅將兵與馬邑太守王仁恭並力拒之仁恭君雅戰不利按王仁恭是年春已死此必去年史序李淵起兵來歷及之厥九勿翻將即亮翻守式又翻甚憂之世民乘間屏人説淵曰間古莧翻屏必郢翻今主上無道百姓困窮晉陽城外皆為戰場大人若守小節下有寇盜上有嚴刑危亡無日不若順民心興義兵轉禍為福此天授之時也淵大驚曰汝安得為此言吾今執汝以告縣官因取紙筆欲為表世民徐曰世民觀天時人事如此故敢發言必欲執告不敢辭死淵曰吾豈忍告汝汝慎勿出口明日世民復説淵曰今盜賊日繁遍於天下大人受詔討賊賊可盡乎要之終不免罪且世人皆傳李氏當應圖讖復扶又翻説式芮翻讖楚譖翻故李金才無罪一朝族滅李渾字金才族滅事見上卷大業十一年則功高不賞身益危矣唯昨日之言可以救禍此萬全之策也願大人勿疑淵乃歎曰吾一夕思汝言亦大有理今日破家亡軀亦由汝化家為國亦由汝矣先是裴寂私以晉陽宮人侍淵先悉薦翻淵從寂飲酒酣寂從容言曰二郎陰養士馬欲舉大事正為寂以宮人侍公世民第二從千容翻為于偽翻為此急計耳衆情已協公意如何淵曰吾兒誠有此謀事已如此當復奈何正須從之耳復扶又翻下同帝以淵與王仁恭不能禦寇遣使者執詣江都此帝謂煬帝使疏吏翻世民與寂等復説淵曰今主昏國亂盡忠無益偏裨失律而罪及明公説式芮翻裨賓彌翻事已迫矣宜早定計且晉陽士馬精強宮監蓄積巨萬以茲舉事何患無成代王幼沖關中豪傑並起未知所附公若鼓行而西撫而有之如探囊中之物耳探吐南翻奈何受單使之囚使疏吏翻下遣使同坐取夷滅乎淵然之密部勒將發會帝繼遣使者馳驛赦淵及仁恭使復舊任考異曰創業注曰隋主遣司直姓名馳驛繫帝而斬仁恭帝自以姓名著於圖籙太原王氣所在恐被猜忌因而禍及頗有所悔時皇太子在河東獨有秦王侍側耳語謂王曰隋曆將盡吾家繼膺符命不早起兵者顧爾兄弟未集耳今遭羑里之厄爾昆季須會孟津之師不可從吾同受孥戮家破身亡為英雄笑王泣而啓帝曰芒碭山澤是處容人請同漢祖以觀時變帝曰今遇時來逢茲錮繫雖覩機變何能為也然天命有在吾應會昌未必不以此相啓今吾激勵謹當敬天之誡以卜興亡自天祐吾彼焉能害天必亡我何所逃刑乃後數日果有詔使馳驛而至釋淵而免仁恭各依舊檢校所部按煬帝若有詔斬仁恭則比後使之至仁恭已死矣又高祖身為留守且被禁繫亡去何之恐此亦非太宗之謀也今皆不取淵之為河東討捕使也大業十一年淵為使討捕河東使疏吏翻端詳之孫也梁武帝起兵荊雍夏侯詳佐命夏戶雅翻相息亮翻謂淵曰今玉牀搖動帝座不安晉天文志北極五星第二星主帝座太乙之座謂最赤明者紫宮門內六星曰天牀主寢舍解息燕休又大角一星在攝提間大角者天王帝座也天官書云大角北三星為帝座主宴飲酬酢也必有真人起於其分左傳參為晉星故以晉陽為參墟得歲謂歲星居參也參所今翻分扶問翻主上猜忍尤忌諸李金才既死公不思變通必為之次矣淵心然之及留守晉陽鷹揚府司馬太原許世緒煬帝制鷹揚府有司馬及兵倉兩司公姓在圖籙名應歌謠握五郡之兵五郡謂太原鴈門馬邑樓煩西河説式芮翻舉事則帝業可成端居則亡不旋踵唯公圖之行軍司鎧文水武士彠按士彠傳蓋為行軍府司鎧參軍隋志文水縣屬太原郡舊曰受陽開皇十年改名宋白曰文水縣漢大陵縣後魏省大陵於今處置受陽縣隋改曰文水彠一虢翻開皇之制東宮左右衛率府亦有親勳翊三衛煬帝改親衛為功曹儉説淵曰明公北招戎狄南收豪傑以取天下此湯武之舉也淵曰湯武非所敢擬在私則圖存在公則拯亂卿姑自重吾將思之憲雍之孫也唐雍以強幹事高齊淵留建成護家居河東劉文靜謂裴寂曰先發制人後發制於人何不早勸唐公舉兵而推遷不已推遷言推故遷延也推吐雷翻而以宮人侍客公死可爾何誤唐公也寂甚懼屢趣淵起兵趣讀曰促淵乃使文靜詐為敕書發太原西河鴈門馬邑民年二十已上五十已下悉為兵期歲暮集涿郡擊高麗麗力知翻由是人情恟恟思亂者益衆恟許拱翻及劉武周據汾陽宮世民言於淵曰大人為留守而盜賊竊據離宮不早建大計禍今至矣淵乃集將佐謂之曰將即亮翻下同武周據汾陽宮吾輩不能制罪當族滅若之何王威等皆懼再拜請計淵曰朝廷用兵動止皆稟節度今賊在數百里內江都在三千里外加以道路險要復有他賊據之復扶又翻以嬰城膠柱之兵當巨猾豕突之勢必不全矣進退維谷何為而可威等皆曰公地兼親賢同國休戚若俟奏報豈及事機要在平賊專之可也淵陽若不得已而從之者曰然則先當集兵乃命世民與劉文靜長孫順德劉弘基等各募兵遠近赴集旬日間近萬人仍密遣使召建成元吉於河東柴紹於長安近其靳翻使疏吏翻王威高君雅見兵大集疑淵有異志謂武士彠曰順德弘基皆背征三侍所犯當死二人避役亡命故曰背征背蒲妹翻欲收按之士彠曰二人皆唐公客若爾必大致紛紜威等乃止留守司兵田德平欲勸威等按募人之狀隋制留守置司功倉戶兵法士曹等書佐守式又翻討捕之兵悉隸唐公威君雅但寄坐耳言但寄身於留守坐間也坐徂臥翻德平亦止晉陽鄉長劉世龍開皇初置保長黨長鄉長亦此類也長知兩翻威君雅欲因晉祠祈雨為不利晉陽有晉王祠癸亥夜淵使世民伏兵於晉陽宮城之外甲子旦淵與威君雅共坐視事使劉文靜引開陽府司馬胙城劉政會入立庭中新唐志太原有府十八開陽其一也隋志胙城縣屬東郡舊曰東燕開皇十八年改名言有狀告密政會不與曰所告乃副留守事唯唐公得視之淵陽驚曰豈有是邪視其狀乃云威君雅潛引突厥入寇邪音耶厥九勿翻君雅攘袂大詬曰詬苦候翻罵也此乃反者欲殺我耳時世民已布兵塞衢路塞悉則翻文靜因與劉弘基長孫順德等共執威君雅繫獄丙寅突厥數萬衆寇晉陽輕騎入外郭北門出其東門騎奇寄翻下同淵命裴寂等勒兵為備而悉開諸城門突厥不能測莫敢進衆以為威君雅實召之也淵於是斬威君雅以徇淵部將王康達將千餘人出戰皆死城中忷懼將即亮翻下舉將同忷許拱翻淵夜遣軍潛出城旦則張旗鳴鼓自他道來如援軍者突厥終疑之留城外二日大掠而去義寧元年煬帝命監門將軍涇陽龐玉隋志左右監門府各將軍一人掌宮殿門禁及守衛事涇陽縣屬京兆郡監工銜翻柴孝和説李密曰賁音奔將即亮翻説式芮翻秦地山川之固秦漢所憑以成王業者也今不若使翟司徒守洛口裴柱國守回洛翟司徒讓也裴柱國仁基翟萇伯翻既克京邑業固兵強然後東向以平河洛傳檄而天下定矣方今隋失其鹿豪傑競逐不早為之必有先我者先悉薦翻悔無及矣密曰此誠上策吾亦思之久矣但昏主尚存從兵猶衆從才用翻我所部皆山東人見洛陽未下誰肯從我西入諸將出於㣥盜留之各競雌雄如此則大業隳矣孝和曰然則大軍既未可西上僕請間行觀釁將即亮翻上時掌翻間古莧翻密許之孝和與數十騎至陝縣隋志陝縣屬河南郡騎奇寄翻陝式冉翻時密兵鋒甚鋭每入苑與隋兵連戰苑即大業初所築西苑尚臥營中丁丑越王侗使段達與龐玉等夜出兵陳於回洛倉西北陳讀曰陳密與裴仁基出戰達等大破之殺傷太半密乃棄回洛奔洛口考異曰略記云四月戊申段達等帥關內兵陳於倉西倉南密出兵拒戰大破凶醜密還固倉五月丁丑達等又出兵陳於倉西倉北密又來拒大破之密奔洛口按隋書北史新舊唐書皆云密為流矢所中臥營中東都出兵擊之密衆大潰棄回洛倉奔洛口俱無月日河洛記云密軍失利歸於鞏縣東都復得回洛倉蒲山公傳曰五月二十八日越王夜出師使段達等大戰於倉西北密軍敗績歸於鞏縣亦不云密連月再敗也戊申四月二十八日丁丑五月二十八日蓋趙毅承蒲山公傳誤以密一敗分為二事也龐薄江翻杜佑曰偃師帝嚳所都古西毫也湯亦都之武王伐紂回師息戎遂名偃師縣屬河南郡柴孝和之衆聞密退各散去孝和輕騎歸密楊德方鄭德韜皆死考異曰楊德方壺關録作王德仁今從河洛記頲他鼎翻滎陽鄭乾象為右司馬考異曰隋唐書皆作虔象唯壺關録作乾象云密殺其兄乾覆乾覆之子會通後從盛彥師殺密今從之義寧元年李建成李元吉棄其弟智雲於河東而去吏執智雲送長安殺之建成元吉遇柴紹於道與之偕行王崇武標點容肇祖聶崇岐覆校
