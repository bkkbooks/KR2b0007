body:
  text: 資治通鑑卷第二百六十八端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千六百戶食實封一千戶賜紫金魚袋臣司馬光奉敕編集後學天台音註後梁紀三太祖神武元聖孝皇帝下乾化元年乾化元年辛未九一一乾化元年三月乙酉朔以天雄留後羅周翰為節度使乾化元年清海靜海節度使兼中書令南平襄王劉隱病亟亟紀力翻表其弟節度副使巖權知留後丁亥卒隱年三十八乾化元年岐王聚兵臨蜀東鄙蜀主謂㣥臣曰自茂貞為朱溫所困吾常振其乏絕事並見前紀誰為吾擊之誰為于偽翻兼中書令王宗侃請行蜀主以宗侃為北路行營都統司天少監趙溫珪諫曰茂貞未犯邊諸將貪功深入糧道阻遠恐非國家之利蜀主不聽少詩照翻將即亮翻以兼侍中王宗祐太子少師王宗賀山南節度使唐道襲為三招討使三路進兵以伐岐各路置一招討使王宗侃都統三招討之兵帥步騎十二萬伐岐帥讀曰率下同壬辰宗侃等發成都旌旗數百里乾化元年岐王募華原賊帥溫韜以為假子以華原為耀州美原為鼎州宋廢鼎州復為美原縣屬耀州宋白曰華原縣本漢祋祤縣地曹魏以來置北地郡元魏廢帝三年置通川郡泥陽縣隋開皇六年改泥陽為華原美原縣本秦漢頻陽縣苻秦置土門護軍後周置土門縣唐咸亨二年改為美原九域志耀州在長安北一百六十里以韜為節度使使帥邠岐兵寇長安詔感化節度使康懷貞忠武節度使牛存節以同華河中兵討之己酉懷貞等奏擊韜於車度走之車度地名在長安北同州界乾化元年夏四月乙卯朔岐兵寇蜀興元唐道襲擊卻之乾化元年上以久疾五月甲申朔大赦按歐史此下當有改元二字乾化元年甲辰以清海留後劉巖為節度使考異曰十國紀年甲辰太祖授陟清海節度使陟復名巖按薛史僭偽傳云前偽漢劉陟胡賓王劉氏興亡錄高祖巖皇考葬段氏得石版有篆文曰隱台巖因名其三子是先名巖後名陟也吳越備史乾化四年廣帥彭城巖遣陳用拙來使吳錄天祐十四年南海王劉巖自立為漢唐烈祖實錄天祐十四年劉陟僭位改名巖太祖實錄乾化元年五月以清海節度副使劉陟為節度使二年四月以韋戩為潭廣和叶使云廣守淪謝其母弟巖為軍情所戴七月友珪加劉巖檢校太傅薛史梁末帝紀貞明五年九月削奪廣州節度使劉巖官爵吳越備史載制詞亦云彭城巖蓋嗣節度使後復名巖也惟莊宗實錄同光三年二月廣南劉陟遣何詞來使莊宗列傳自嗣立至建號皆云劉陟衆說不同未知孰是今以其首尾名巖故但稱劉巖云出為刺史刺史無武人乾化元年蜀主如利州命太子監國監古銜翻六月癸丑朔至利州欲親總兵以繼伐岐之師乾化元年燕王守光嘗衣赭袍衣於既翻赭音者赭袍唐世天子之服顧謂將吏曰今天下大亂英雄角逐吾兵強地險亦欲自帝何如孫鶴曰今內難新平謂新平滄德斯言不當發於孫鶴難乃旦翻太原窺吾西契丹伺吾北伺相利翻遽謀自帝未見其可大王但養士愛民訓兵積穀德政既脩四方自服矣守光不悅又使人諷鎮定求尊己為尚父趙王鎔以告晉王晉王怒欲伐之諸將皆曰是為惡極矣行當族滅不若陽為推尊以稔之稔其惡也五鎮幷河東為六然自昭義以下皆屬河東守光不寤以為六鎮實畏己益驕乃具表其狀曰晉王等推臣臣荷陛下厚恩荷下可翻未之敢受竊思其宜不若陛下授臣河北都統則幷鎮不足平矣幷謂晉王鎮謂趙王鎔乃以守光為河北道采訪使唐之盛時置十道采訪使河北其一也自安史亂後不復除授受旨蓋崇政院官屬猶樞密院承旨也梁避廟諱改承為受守光命僚屬草尚父采訪使受冊儀乙卯僚屬取唐冊太尉儀獻之守光視之問何得無郊天改元之事對曰尚父雖貴人臣也安有郊天改元者乎守光怒投之於地曰我地方二千里帶甲三十萬直作河北天子誰能禁我尚父何足為哉命趣具即帝位之儀趣讀曰促械繫瞳彥㣥及諸道使者於獄既而皆釋之考異曰莊宗列傳劉守光傳云朱溫命偽閤門使王瞳供奉官史彥章等使燕冊守光為河北道采訪使六月汴使至守光令所司定尚父採訪使儀注取二十四日受冊朱溫傳亦云史彥章莊宗實錄作史彥璋編遺錄薛史皆作史彥㣥今從之又莊宗實錄三月己丑鎮州遣押牙劉光業至言劉守光凶淫縱毒欲自尊大請稔其惡以咎之推為尚父乙未上至晉陽宮召張承業諸將等議討燕之謀諸將亦云宜稔其禍上令押衙戴漢超持墨制及六鎮書如幽州其辭曰天祐八年三月二十七日天德軍節度使宋瑤振武節度使周德威昭義節度使李嗣昭易定節度使王處直鎮州節度使王鎔河東節度使尚書令晉王謹奉冊進盧龍橫海等軍節度檢校太師兼中書令燕王為尚書令尚父五月六鎮使至汴使亦集六月守光令有司定尚父採訪使儀則梁太祖實錄都不言守光事惟編遺錄云三月壬辰差閤門使王瞳受旨史彥㣥齎國禮賜幽州劉守光甲午守光連上表章率以鎮定既與河東結懽兼同差使請當道卻行天祐年號事守光尋捉王瞳史彥㣥上下一行並囚禁數日後放出按莊宗實錄及南唐烈祖實錄皆云三月辛亥晉王遣戴漢超推守光為尚父辛亥三月二十七日也壬辰乃三月初八日王瞳等安得已在幽州甲午乃三月十日守光安得上表云六鎮推臣為尚父編遺錄月日多差錯今不取乾化元年帝命楊師厚將兵三萬屯邢州欲攻趙也乾化元年蜀諸將擊岐兵屢破之秋七月蜀主西還留御營使昌王宗鐬屯利州鐬火外翻乾化元年辛丑帝避暑於張宗奭第開平元年張全義賜名宗奭見上卷按薛史張宗奭私第在洛陽會節坊宗奭子繼祚不勝憤恥勝音升欲弒之宗奭止之曰吾家頃在河陽為李罕之所圍見二百五十七卷唐僖宗文德元年啗徒濫翻賴其救我得有今日此恩不可忘也乃止甲辰還宮乾化元年趙王鎔以楊師厚在邢州甚懼九域志邢州北至趙州一百四十四里耳兵臨其境故甚懼晉王謂鎔父友也事之甚恭鎔先與晉王克用比肩事唐且通好晉王曰朱溫之惡極矣天將誅之雖有師厚輩不能救也脫有侵軼軼徒結翻僕自帥衆當之帥讀曰率叔父勿以為憂鎔捧巵為壽謂晉王為四十六舅晉王第四十六晉王斷衿為盟許妻以女斷都管翻衿音今妻七細翻由是晉趙之交遂固乾化元年八月庚申蜀主至成都自利州還乾化元年燕王守光將稱帝將佐多竊議以為不可守光乃置斧質於庭質椹也敢諫者斬孫鶴曰滄州之破鶴分當死蒙王生全事見上卷開平四年分扶問翻劉守光囚父殺兄幽滄之人義不與共戴天可也孫鶴受劉守文委任不能以死殉之乃銜守光生全之恩忠諫而死是可以死而不能死可以無死而死也今日章十二行本不重今日二字乙十一行本同孔本同張校同敢愛死而忘恩乎竊以為今日之帝未可也守光怒伏諸質上令軍士而噉之咼古瓦翻噉徒濫翻鶴呼曰不出百日大兵當至章十二行本作百日之外必有急兵八字乙十一行本同張校同云無註本與吳本同守光命以土窒其口寸斬之呼火故翻甲子守光即皇帝位國號大燕改元應天以梁使王瞳為左相盧龍判官齊涉為右相史彥㣥為御史大夫考異曰編遺錄云御史臺副使今從莊宗實錄契丹陷平州燕人驚擾宋白曰平州舜十二州為營州之境周官職方在幽州之地春秋為山戎孤竹白狄肥子二國地漢為肥如石城之地唐武德初置平州於盧龍乾化元年岐王使劉知俊李繼崇將兵擊蜀乙亥王宗侃王宗賀唐道襲王宗紹與之戰於青泥嶺青泥嶺在興州長舉縣西北五十里懸崖萬仞上多雲雨行者多逢泥淖馬步使王宗浩奔興州溺死於江此江嘉陵江也先是步軍都指揮使王宗綰城西縣號安遠軍九域志西縣在興元府西一百里知俊繼崇追圍之衆議欲棄興元道襲曰無興元則無安遠利州遂為敵境矣九域志興元西至西縣百里西縣抵利州界四十五里自界首至利州二百六十四里蜀主以昌王宗鐬為應援招討使定戎團練使王宗播為四招討馬步都指揮使蜀主先已遣三招討使伐岐今又以王宗鐬為應援招討使是為四招討壁於廉讓之間廉水出大巴山北谷中讓水其源起於廉水溉田之餘東南流至古廉水城之側二水在南鄭縣東南杜佑曰綿州昌明縣有廉水讓水宋白續通典縣有清廉鄉讓水鄉大破之於明珠曲明日又戰於鳧口斬其成州刺史李彥琛乾化元年九月帝疾稍愈聞晉趙謀入寇自將拒之戊戌以張宗奭為西都留守庚子帝發洛陽甲辰至衞州方食軍前奏晉軍已出井陘陘音刑帝遽命輦北趣邢洺晝夜倍道兼行丙午至相州九域志衞州北至相州一百二十五里自相州又北則趣邢洺趣七喻翻乃止相州刺史李思安不意帝猝至落然無具坐削官爵乾化元年湖州刺史錢鏢酗酒殺人鏢甫招翻酗吁句翻恐吳越王鏐罪之冬十月辛亥朔殺都監潘長推官鍾安德奔于吳乾化元年晉王聞燕主守光稱帝大笑曰俟彼卜年吾當問其鼎矣以周成王卜年楚子問鼎之事戲笑守光使疏吏翻下通使之使同晉王遣太原少尹李承勳往承勳至幽州用鄰藩通使之禮燕之典客者曰吾王帝矣公當稱臣庭見見賢遍翻承勳曰吾受命於唐朝為太原少尹朝直遙翻燕王自可臣其境內豈可臣他國之使乎守光怒囚之數日出而問之曰臣我乎承勳曰燕王能臣我王則我請為臣不然有死而已守光竟不能屈乾化元年蜀主如利州聞王宗侃為岐所敗故復如利州以為繼援決雲軍虞候王琮敗岐兵敗補邁翻執其將李彥太俘斬三千五百級乙卯捉生將彭君集破岐二寨俘斬三千級王宗侃遣裨將林思諤自中巴間行至泥溪巴州在三巴之中謂之中巴興元之南有大行路逕孤雲兩角過米倉山則至巴州按後唐伐蜀還魏王繼岌與李紹琛軍行次舍泥溪當在劍州北利州界蜀主命開道都指揮使王宗弼將兵救安遠及劉知俊戰于斜谷破之斜余遮翻谷余玉翻乾化元年甲寅夜帝發相州乙卯至洹水是夜邊吏言晉趙兵南下帝即時進軍丙辰至魏縣洹水在魏州之西成安縣界九域志魏州成安縣有洹水鎮成安縣在州西三十五里魏縣在魏州西三十五里沙陀至矣士卒恟懼多逃亡嚴刑不能禁既而復告云無寇上下始定敗兵之氣沒世不復此之謂也而復扶又翻戊午貝州奏晉兵寇東武尋引去帝以夾寨柏鄉屢失利夾寨之敗見二百六十六卷開平二年柏鄉之敗見上卷本年思一雪其恥意鬱鬱多躁忿功臣宿將往往以小過被誅衆心益懼薛史本紀帝至相州左龍驤都教練使鄧季筠魏博馬軍都指揮使何令稠右廂馬軍都指揮使陳令勳以部下馬瘦並腰斬于軍門次魏縣先鋒指揮使黃文靖伏誅帝以忿兵輕行求雪再敗之恥使其果與晉趙遇亦必敗矣壬午帝南還乾化元年燕主守光集將吏謀攻易定幽州參軍景城馮道以為未可景城縣屬瀛州漢舊縣名繫獄或救之得免道亡奔晉張承業薦於晉王以為掌書記馮道自此歷事唐晉漢周位極人臣不聞諫爭豈懲諫守光之禍邪丁亥王處直告難于晉難乃旦翻乾化元年懷州刺史開封段明遠妹為美人戊子帝至獲嘉九域志獲嘉縣在懷州東北一百五十里帝悅段明遠後改名凝階此寵任位為上將梁遂以亡乾化元年庚寅保塞節度使高萬興奏遣都指揮使高萬金將兵攻鹽州刺史高行存降考異曰實錄開平三年六月丁未靈武韓遜奏收復鹽州擒偽刺史李繼直已下六十二人至此年降高行存下云鹽州與吐蕃党項犬牙相接為二境咽喉之地又烏池鹽醝之利戎羌意未嘗息唐建中初為吐蕃所陷砥其墉而去由是銀夏寧延洎于靈武歲以河南山東淮南青徐江浙等道兵士不啻四萬分護其地謂之防秋貞元九年朝政稍暇乃命副元帥渾瑊總兵三萬復取其地建百雉焉自是虜塵乃息邊患遂止唐代革命又復失之今纔動偏師遽收襟要國之右臂瘡疣其息哉李茂貞養子多連繼字開平三年所收似屬鳳翔今又收復云唐革命失之前後必一誤或者開平既得又失之也乾化元年壬辰帝至洛陽疾復作復扶又翻乾化元年蜀王宗弼敗岐兵於金牛敗補邁翻下同拔十六寨俘斬六千餘級擒其將郭存等丙申王宗鐬王宗播敗岐兵於黃牛川擒其將蘇厚等丁酉蜀主自利州如興元援軍既集安遠軍望其旗旗謂蜀主之旗也與援軍夾攻岐兵大破之拔二十一寨斬其將李廷志等己亥岐兵解圍遁去解安遠之圍而遁又破之庚子蜀主西還岐兵既敗走遂還岐王左右石簡顒讒劉知俊於岐王顒魚容翻王奪其兵李繼崇言於王曰知俊壯士窮來歸我不宜以讒廢之王為之誅簡顒以安之為于偽翻繼崇召知俊舉族居于秦州李繼崇時鎮秦州繼崇尋不能守秦州劉知俊由此亦降于蜀乾化元年戊申燕主守光將兵二萬寇易定攻容城容城漢縣名唐屬易州宋屬雄州乾化元年十二月乙卯以朗州留後馬賨為永順節度使同平章事賨徂宗翻馬殷之弟也乾化元年鎮南留後盧延昌遊獵無度百勝軍指揮使黎球殺之自立將殺譚全播全播稱疾請老乃免丙辰以球為虔州防禦使未幾球卒幾居豈翻牙將李彥圖代知州事全播愈稱疾篤劉巖聞全播病發兵攻韶州破之刺史廖爽奔楚唐天復二年虔人取韶州至是復為劉氏廖力救翻楚王殷表為永州刺史乾化元年丁巳蜀主至成都自興元還至成都乾化元年戊午以靜海留後曲美為節度使乾化元年癸亥以靜江行軍司馬姚彥章為寧遠節度副使權知容州從楚王殷之請也劉巖遣兵攻容州殷遣都指揮使許德勳以桂州兵救之彥章不能守乃遷容州士民及其府藏奔長沙巖遂取容管及高州藏徂浪翻開平四年楚取容管及高州至是棄之乾化元年甲子晉王遣蕃漢馬步總管周德威將兵三萬攻燕以救易定乾化元年是歲蜀主以內樞密使潘炕為武泰節度使唐置武泰軍於黔州從才用翻峭七肖翻二年乾化二年春正月德威東出飛狐自代州出飛狐宋白曰飛狐縣漢代郡地曹魏封樂進於廣昌侯國後周於五龍城置廣昌縣隋改飛狐縣因縣北飛狐口為名趙王王鎔義武王處直丙戌三鎮兵進攻燕祁溝關下之三鎮幷鎮定祁溝關在涿州南易州拒馬河之北自關而西至易州六十里拒馬河東至新城縣四十里戊子圍涿州宋白曰涿州古涿鹿地漢高帝置涿郡魏改范陽郡取漢涿縣在范水之陽為名唐大曆四年立涿州南至莫州一百六十里東北至幽州一百二十里守手又翻劉守奇之客劉去非大呼於城下呼火故翻謂知溫曰河東小劉郎來為父討賊為于偽翻何豫汝事而堅守邪守奇免冑勞之劉守奇奔晉見二百六十六卷開平元年勞力到翻遂降周德威疾守奇之功譖諸晉王此周德威之褊也降戶江翻守奇恐獲罪與去非及進士趙鳳來奔上以守奇為博州刺史去非鳳皆幽州人也先是燕主守光籍境內丁壯悉文面為兵雖士人不免鳳詐為僧奔晉守奇客之先悉薦翻丁酉德威至幽州城下守光來求救二月帝疾小愈議自將擊鎮定以救之乾化二年帝聞岐蜀相攻辛酉遣光祿卿盧玭等使于蜀遺蜀主書玭蒲眠翻遺唯季翻呼之為兄帝與蜀主偕起於細微者也蜀兵強地險帝自度力不能制故用敵國禮呼之為兄乾化二年甲子帝發洛陽從官以帝誅戮無常多憚行帝聞之益怒是日至白馬頓賜從官食多未至遣騎趣之於路從才用翻趣讀曰促左散騎常侍孫騭右諫議大夫張衍兵部郎中張儁最後至帝命撲殺之騭職日翻撲弼角翻考異曰梁祖實錄云賜自盡今從莊宗實錄衍宗奭之姪也丙寅帝至武陟九域志武陟縣在懷州東八十里丁卯至獲嘉帝追思李思安去歲供饋有闕貶柳州司戶告辭稱明遠之能曰觀明遠之忠勤如此見思安之悖慢何如尋長流思安於崖州賜死時遠貶者悉賜死柳州遠踰嶺嶠崖州再涉鯨波思安寧得至邪更工衡翻乙亥帝至魏州命都招討使宣義節度使楊師厚副使前河陽節度使李周彞圍棗強招討應接使平盧節度使賀德倫副使天平留後袁象先圍蓨縣九域志棗強縣在鎮州東南五十五里蓨縣在冀州東北一百五十里宋白曰蓨縣即漢條侯國隋開皇五年改條縣為蓨縣蓨音條河西胡人象先下邑人也戊寅帝至貝州乾化二年辰州蠻酋宋鄴昌師益皆帥衆降於楚酋慈由翻帥讀曰率楚王殷以鄴為辰州刺史師益為溆州刺史溆音敍乾化二年帝晝夜兼行三月辛巳至下博南登觀津冢漢觀津縣古城東南有青山即漢文帝竇后父少消冢也消是縣人遭秦之亂漁釣隱身墜淵而死景帝立后遣使者填以葬父起大墳於觀津城東南縣民謂之竇氏青山不知是帝遽前逼之或告曰晉兵大至矣帝棄行幄亟引兵趣棗強與楊師厚軍合邏郎佐翻自下博至棗強六十餘里趣七喻翻習趙州人也棗強城小而堅趙人聚精兵數千人守之師厚急攻之數日不下城壞復脩死傷者以萬數此言攻城之卒死傷者也謀出降有一卒奮曰賊自柏鄉喪敗已來視我鎮人裂眥喪息浪翻眥疾智翻今往歸之如自投虎狼之口耳困窮如此何用身為我請獨往試之夜縋城出詣梁軍詐降縋馳偽翻李周彞召問城中之備對曰非半月未易下也易以豉翻因謀曰謀當作請某既歸命願得一劍效死先登取守城將首將即亮翻周彞不許使荷擔從軍卒得間舉擔擊周彞首踣地左右救至得免荷下可翻又如字擔都濫翻間古莧翻踣蒲北翻考異曰莊宗實錄頃之周彞晝寢左右未至其人抽擔擊周彞首踣於地求兵仗不獲周彞大呼左右救至獲免卒睨周彞曰吾比欲剚刃於朱溫之腹非圖爾也誤矣編遺錄云時有一百姓來投軍中李周彞收於部伍間謂周彞曰請賜一劍願先登以收其牆未許間忽然抽茶擔子揮擊周彞頭上中擔幾仆于地左右擒之元是棗強邑中遣來詐降本意欲窺算招討使楊師厚斯人不能辨乃誤中周彞按此卒從周彞請劍周彞不許而令負擔豈不知周彞非溫也又帝王與將帥居處侍衞不同豈容不識而誤中之若本欲殺楊師厚則似近之今既可疑皆不取帝聞之愈怒命師厚晝夜急攻丙戌拔之無問老幼皆殺之流血盈城初帝引兵渡河聲言五十萬晉忻州刺史李存審屯趙州患兵少裨將趙行實請入土門避之存審不可入土門則退歸晉陽矣存審謂史建瑭李嗣肱曰吾王方有事幽薊無兵此來南方之事委吾輩數人今蓨縣方急吾輩安得坐而視之使賊得蓨縣必西侵深冀患益深矣當與公等以奇計破之存審乃引兵扼下博橋漳水逕下博縣蓋跨漳水為橋也建瑭分其麾下為五隊隊各百人一之衡水一之南宮一之信都信都漢古縣唐帶冀州蓋其治所雖在郭下而所管地界則環冀州近郊皆是也自將一隊深入與嗣肱遇梁軍之樵芻者皆執之獲數百人明日會於下博橋皆殺之留數人斷臂縱去曰為我語朱公晉王大軍至矣斷音短為于偽翻語牛倨翻時蓨縣未下帝引楊師厚兵五萬就賀德倫共攻之丁亥始至縣西未及置營建瑭嗣肱各將三百騎效梁軍旗幟服色與樵芻者雜行幟昌志翻日且暮至德倫營門殺門者縱火大譟弓矢亂發左右馳突既暝各斬馘執俘而去營中大擾不知所為斷臂者復來曰晉軍大至矣復扶又翻帝大駭燒營夜遁以朱溫之狡濟之以楊師厚使遇他敵猶在亂而能整今史建瑭等以奇兵撓之遂相與狼狽至於散遁不能復振者主將上下先有畏晉之心故也委曲行百五十里戊子旦乃至冀州蓨之耕者皆荷鉏奮梃逐之委棄軍資器械不可勝計梃徒鼎翻勝音升既而復遣騎覘之覘丑廉翻又丑豔翻曰晉軍實未來此乃史先鋒遊騎耳晉王以史建瑭為先鋒指揮使故稱之親御六軍見敵之遊兵而遁故慙師屢出而屢敗故憤不能自勝言其甚也不能乘肩輿留貝州旬餘諸軍始集潰散之甚久而後集乾化二年義昌節度使劉繼威年少淫虐類其父劉繼威父守光萬進怒殺之詰旦召大將周知裕告其故萬進自稱留後以知裕為左都押牙庚子遣使奉表請降亦遣使降于晉晉王命周德威安撫之知裕心不自安章十二行本安下有求為景州刺史六字乙十一行本同孔本同退齋校同遂來奔帝為之置歸化軍為于偽翻以知裕為指揮使凡軍士自河朔來者皆隸之辛丑以萬進為義昌留後甲辰改義昌為順化軍以萬進為節度使為楊師厚劫徙張萬進張本乾化二年乙巳帝發貝州丁未至魏州貝州南至魏州二百一十里乾化二年戊申周德威遣裨將李存暉等攻瓦橋關九域志瓦橋關在涿州南一百二十里嚴幽州人也涉獵書傳傳直戀翻晉王使傅其子繼岌嚴固辭晉王怒將斬之教練使孟知祥徒跣入諫曰強敵未滅大王豈宜以一怒戮嚮義之士乎言非所以招懷燕人知祥遷之弟子孟遷以邢州降晉又背晉以邢州降梁者也孟知祥始此李克讓晉王克用之弟乾化二年吳鎮南節度使劉威歙州觀察使陶雅宣州觀察使李遇常州刺史李簡皆武忠王舊將有大功楊行密諡武忠王徐溫自右牙指揮使秉政見二百六十六卷開平元年李遇尤甚常言徐溫何人吾未嘗識面一旦乃當國邪館驛使徐玠使於吳越道過宣州溫使玠說遇入見新王說式芮翻見賢遍翻遇初許之玠曰公不爾不爾猶言不如此也遇怒曰君言遇反殺侍中者非反邪侍中謂威王也楊渥諡威王李遇斥言徐溫殺之以淮南節度副使王檀為宣州制置使王檀恐當作王壇數所具翻朝直遙翻下同遣都指揮使柴再用帥昇潤池歙兵納檀于宣州帥讀曰率昇州副使徐知誥為之副遇不受代再用攻宣州踰月不克乾化二年夏四月癸丑以楚王殷為武安武昌靜江寧遠節度使洪鄂四面行營都統欲使攻楊氏之洪鄂也乾化二年乙卯博王友文來朝來朝於魏州行宮丁巳發魏州己未至黎陽以疾淹留乙丑至滑州黎陽至滑州隔大河耳今滑州古城已淪於河乾化二年維州羌胡董琢反蜀主遣保鑾軍使趙綽討平之乾化二年己巳帝至大梁乾化二年帝聞嶺南與楚相攻甲戌以右散騎常侍韋戩等為潭廣和叶使戩子踐翻往解之乾化二年戊寅帝發大梁乾化二年周德威白晉王以兵少不足攻城言幽州城大而固非兵少所能攻契欺訖翻李嗣源攻瀛州刺史趙敬降乾化二年五月甲申帝至洛陽疾甚乾化二年司空門下侍郎同平章事薛貽矩卒乾化二年燕主守光遣其將單廷珪將精兵萬人出戰與周德威遇於龍頭岡龍頭岡在幽州城東南考異曰莊宗實錄作羊頭岡今從莊宗列傳莊宗實錄四月己卯朔周德威擒單廷珪進軍大城莊薛史及莊宗列傳周德威傳云五月七日擒廷珪十二日次大城莊今從之今日必擒周楊五以獻楊五者德威小名也既戰見德威於陳陳讀曰陣援槍單騎逐之援于元翻槍及德威背德威側身避之奮檛反擊廷珪墜馬單廷珪之馬方疾馳勢不得止周德威側身避其鋒馬差過前則德威已在槍裏奮檛擊廷珪廷珪安所避之此其所以墜馬也格鬬之勢刀不如棒謂此也置於軍門燕兵退走德威引騎乘之燕兵大敗斬首三千級廷珪燕驍將也燕人失之奪氣乾化二年己丑蜀大赦乾化二年李遇少子為淮南牙將遇最愛之徐溫執之至宣州城下示之其子啼號求生少詩照翻號戶高翻遇由是不忍戰舉大事者不顧家李遇既與徐溫為敵乃顧一子邪以吳王命說之蕘如招翻說式芮翻曰公本志果反請斬蕘以徇不然隨蕘納款遇乃開門請降溫使柴再用斬之夷其族於是諸將始畏溫莫敢違其命諸將謂劉威陶雅輩徐知誥以功遷昇州刺史知誥事溫甚謹安於勞辱或通夕不解帶溫以是特愛之每謂諸子曰汝輩事我能如知誥乎徐溫以善事楊行密而竊吳國之權徐知誥以善事徐溫而竊徐氏之權天邪人邪專以軍旅為務不恤民事知誥在昇州獨選用廉吏脩明政教招延四方士大夫傾家貲無所愛洪州進士宋齊丘好縱橫之術好呼到翻縱子容翻謁知誥知誥奇之辟為推官與判官王令謀參軍王翃專主謀議翊乎萌翻以牙吏馬仁裕周宗曹悰為腹心悰徂宗翻仁裕彭城人宗漣水人也為知誥篡楊氏張本乾化二年閏月壬戌帝疾增甚謂近臣曰我經營天下三十年帝以唐僖宗中和三年鎮宣武創業之始也至是年三十一年謂晉也孼魚列翻天復奪我年復扶又翻下同我死諸兒非彼敵也吾無葬地矣因哽咽哽古杏翻絕而復蘇氣絕而復息為蘇乾化二年高季昌潛有據荊南之志乃奏築江陵外郭增廣之乾化二年丙寅蜀門下侍郎同平章事王鍇罷為兵部尚書鍇口駭翻乾化二年帝長子郴王友裕早卒郴丑林翻次假子博王友文友文本姓康名勤常留守東都兼建昌宮使帝以大梁舊第為建昌宮其母亳州營倡也倡音昌薛史友珪小字遙喜母失其姓本亳州營妓也唐光啟中帝徇地亳州召而侍寢月餘將捨之而去以娠告是時元貞張后賢而有寵帝素憚之由是不果攜歸大梁因留亳州以別宅貯之及期妓以生男來告帝喜故字之曰遙喜後迎歸汴為左右控鶴都指揮使次均王友貞為東都馬步都指揮使章十二行本使下有無寵二字乙十一行本同孔本同張校同初元貞張皇后嚴整多智帝敬憚之后殂張后殂於唐昭宗天祐元年諸子雖在外常徵其婦入侍帝往往亂之友文婦王氏色美帝尤寵之雖未以友文為太子帝意常屬之屬之欲翻友珪心不平友珪嘗有過帝撻之友珪益不自安帝疾甚命王氏召友文於東都欲與之訣且付以後事友珪婦張氏亦朝夕侍帝側知之密告友珪曰大家以傳國寶付王氏懷往東都吾屬死無日矣夫婦相泣左右或說之曰事急計生何不改圖時不可失古人有言曰淫而不父必有子禍豈不信哉說式芮翻六月丁丑朔帝命敬翔出友珪為萊州刺史即令之官已宣旨未行敕敬翔時為宣政使故使之行敕翔佐帝有年矣軍國大謀無不預隨事彌縫轉帝兇暴之氣以成功亦不為小寢疾彌留而出友珪於外使翔能為之謀則必有以處友珪而帝免剚刃之禍顛而不扶焉用彼相哉友珪益恐戊寅友珪易服微行入左龍虎軍見統軍韓勍以情告之勍亦見功臣宿將多以小過被誅懼不自保遂相與合謀臣子俱逆亦上之人有以致之也被皮義翻伏於禁中梁以侍衞親軍為控鶴軍至寢殿侍疾者皆散走帝驚起問反者為誰友珪曰非他人也帝曰我固疑此賊恨不早殺之汝悖逆如此天地豈容汝乎悖蒲內翻又蒲沒翻友珪曰老賊萬段友珪僕夫馮廷諤刺帝腹刃出於背刺七亦翻友珪自以敗氈裹之瘞於寢殿年六十一瘞於計翻遣供奉官丁昭浦馳詣東都命均王友貞殺友文己卯矯詔稱博王友文謀逆遣兵突入殿中賴郢王友珪忠孝將兵誅之保全朕躬然疾因震驚彌致危殆宜令友珪權主軍國之務韓勍為友珪謀為于偽翻多出府庫金帛賜諸軍及百官以取悅辛巳丁昭溥還還從宣翻聞友文已死乃發喪宣遺制友珪即皇帝位時朝廷新有內難中外人情忷忷難乃旦翻忷許勇翻許州軍士更相告變匡國節度使韓建皆不之省亦不為備更工衡翻省悉景翻史言韓建死期將至丙申馬步都指揮使張厚作亂殺建考異曰莊宗實錄九月建遇害今從薛史詰去吉翻甲辰以厚為陳州刺史乾化二年秋七月丁未大赦乾化二年天雄節度使羅周翰幼弱軍府事皆決於牙內都指揮使潘晏北面都招討使宣義節度使楊師厚軍於魏州久欲圖之憚太祖威嚴不敢發至是師厚館於銅臺驛因銅雀臺以名驛然銅雀臺在鄴不在魏州執而殺之引兵入牙城據位視事壬子制以師厚為天雄節度使考異曰梁功臣列傳楊師厚傳云太祖初棄天下郡府乘間為亂甚衆魏之衙內都指揮使潘晏與大將臧延範趙訓將謀反變有密告者師厚布兵擒捕斬之七月除魏博節度使薛史師厚傳略同今從莊宗列傳朱友珪傳及莊宗實錄唐僖宗文德元年羅弘信得魏博傳子至孫而亡乾化二年以侍衞諸軍使韓勍領匡國節度使韓勍以同逆領節乾化二年甲寅加吳越王鏐尚父乾化二年甲子以均王友貞為開封尹東都留守乾化二年蜀太子元坦更名元膺宗懿更名元坦見上卷開平四年按歐史蜀主建時得銅牌子于什仿縣有文二十餘字建以為符讖因取之以名諸子故又更名元膺更工衡翻乾化二年丙寅廢建昌宮使以河南尹張宗奭為國計使凡天下金穀舊隸建昌宮者悉主之梁祖受禪以博王友文領建昌宮使專領金穀友珪既殺友文故廢之而置國計使乾化二年八月龍驤軍三千人戍懷州者戍懷州所以備晉人自上黨下太行以窺洛陽所過剽掠剽匹妙翻考異曰莊宗列傳友珪傳云重霸據懷州為亂壯健者團結於鞏村將為朱溫雪恥明宗實錄杜晏球傳云龍驤軍作亂欲入京城已至河陽今按梁祖實錄戊子鄭州奏稱懷州屯駐龍驤騎軍潰散十一日夜至州南十五里鞏村安下及五鼓分隊逃逸安得據懷州及至河陽事也戊子遣東京馬步軍都指揮使霍彥威左耀武指揮使杜晏球討之庚寅擊破亂軍執其都將劉重遇於鄢陵甲午斬之為友貞以龍驤軍起義誅友珪張本乾化二年郢王友珪既篡立諸宿將多憤怒雖曲加恩禮終不悅告哀使至河中護國節度使冀王朱友謙泣曰先帝數十年開創基業前日變起宮掖聲聞甚惡聞音問吾備位藩鎮心竊恥之朱友謙本陝州牙將朱簡也唐末附朱溫賜名友謙列於諸子故因此聲友珪弒逆之罪律以古法臣弒君子弒父凡在官者殺無赦則友珪之罪凡為梁之臣子者皆得而誅之也以詔書自辨且徵之友謙謂使者曰所立者為誰先帝晏駕不以理吾且至洛陽問罪何以徵為戊戌以侍衞諸軍使韓勍為西面行營招討使督諸軍討之友謙以河中附於晉以求救九月丁未以感化節度使康懷貞為河中都招討使更以韓勍副之乾化二年友珪以兵部尚書知崇政院事敬翔太祖腹心恐其不利於己欲解其內職內職謂知崇政院事庚午以翔為中書侍郎同平章事壬申以戶部尚書李振充崇政院使翔多稱疾不預事敬翔李振於此時皆先朝佐命功臣也李振代敬翔領崇政院使則振與友珪同惡敬翔雖稱疾不預事若律之以古人主在與在主亡與亡之法亦不免於死乾化二年康懷貞等與忠武節度使牛存節合兵五萬屯河中城西攻之甚急晉王遣其將李存審李嗣肱李嗣恩將兵救之敗梁兵于胡壁敗補邁翻嗣恩本駱氏子也歐史義兒傳嗣恩本姓駱吐谷渾部人乾化二年吳武忠王之疾病也周隱請召劉威事見二百六十五卷唐天祐二年章十二行本曰作由乙十一行本同孔本同熊校同是為帥府所忌帥府謂廣陵帥府帥所類翻溫將討之威幕客黃訥說威曰說式芮翻公受謗雖深反本無狀若輕舟入覲則嫌疑皆亡矣威從之陶雅聞李遇敗亦懼與威偕詣廣陵溫待之甚恭如事武忠王之禮優加官爵雅等悅服由是人皆重溫訥蘇州人也溫與威雅帥將吏請於李儼承制加嗣吳王隆演太師吳王隆演之嗣吳王李茂貞承制所加也楊行密因李儼來使尊之承制徐溫等因其舊而請於儼帥讀曰率淮南行軍司馬如故溫遣威雅還鎮劉威鎮洪州陶雅鎮歙州徐溫事威雅如事楊行密貴而不敢忘舊者能矯情為之至於遣威雅歸鎮不特時人服之威雅亦心服矣自古以來英雄分量固自不同至於隨其分量以制一時之事則一也善觀史者毋忽諸乾化二年辛巳蜀改劍南東川曰武德軍乾化二年朱友謙復告急于晉復扶又翻冬十月晉王自將自澤潞而西不自太原南出汾晉將即亮翻宋白曰解縣漢舊縣後魏改為北解縣按此前解縣在臨晉縣界隋開皇十六年於此置解縣大業二年省九年自綏化故城移虞鄉縣於廢縣理唐武德元年改虞鄉縣為解縣仍於蒲州界別置虞鄉縣九域志解在蒲州東九十五里虞鄉在蒲州東六十里解戶買翻考異曰莊宗同光四年實錄莊宗列傳薛史唐餘錄朱友謙傳皆云與汴軍遇於平陽大破之今從莊宗天祐九年實錄斬首千級追至白徑嶺而還白徑嶺在河中安邑縣東退保陝州九域志河中南至陝州二百三十八里陝失冉翻九域志猗氏縣在河中府東北九十五里撤武備詣晉王帳拜之為舅晉王夜置酒張樂友謙大醉晉王留宿帳中友謙安寢鼾息自如朱友謙以此示委心晉王無所猜間也鼾下旦翻乾化二年楊師厚既得魏博之衆又兼都招討使宿衞勁兵多在麾下諸鎮兵皆得調發調徒釣翻威勢甚重心輕郢王友珪遇事往往專行不顧友珪患之發詔召之云有北邊軍機欲與卿面議師厚將行其腹心皆諫曰往必不測師厚曰吾知其為人雖往如我何乃帥精兵萬餘人渡河趣洛陽帥讀曰率趣七喻翻友珪大懼丁亥至都門城外郭門曰都門與十餘人入見見賢遍翻友珪喜甘言遜詞以悅之賜與巨萬癸巳遣還乾化二年十一月趙將王德明將兵三萬掠武城武城漢之東武城縣唐屬貝州九域志在州東五十里攻宗城下之癸丑楊師厚伏兵唐店邀擊大破之斬首五千餘級乾化二年甲寅葬神武元聖孝皇帝于宣陵宣陵在河南伊闕縣乾化二年吳淮南節度副使陳璋等將水軍襲楚岳州執刺史苑玫開平元年楚取岳州三年苑玫降楚至此為淮南所執玫自江西降楚楚使之守岳州也璋等進攻荊南高季昌遣其將倪可福拒之吳恐楚人救荊南遣撫州刺史劉信帥江撫袁吉信五州兵屯吉州為璋聲援屯吉州以張聲勢若將進兵攻潭衡者以牽制楚兵乾化二年十二月戊寅蜀行營都指揮使王宗汾攻岐文州拔之守將李繼夔走文州古陰平之地將即亮翻下同乾化二年是歲隰州都將劉訓殺刺史以州降晉晉王以為瀛州刺史訓永和人也永和縣屬隰州漢狐讘縣地隋為永和縣九域志在州西一百里乾化二年虔州防禦使李彥圖卒州人奉譚全播知州事遣使內附詔以全播為百勝防禦使虔韶二州節度開通使虔州先有百勝指揮今因以為軍州之號開通使者言使之開通道路南達交廣也乾化二年高季昌出兵聲言助梁伐晉進攻襄州山南東道節度使孔勍擊敗之自是朝貢路絕高季昌既與孔勍交惡入梁之路遂絕不復朝貢敗補邁翻兗州人也均王上上諱友貞太祖第三子王溥會要曰太祖第四子母曰元貞皇后張氏即位改名瑱其後又改名鍠余按王溥云第四子者併假子博王友文數之也乾化三年癸酉九一三乾化二年春正月丁巳晉周德威拔燕順州唐貞觀四年平突厥以其部落置順祐化長四州六年以順州僑治營州南之五柳戍沈括曰幽州東北三十里有望京館東行少北十里餘出古長城又二十里至中頓又踰孫侯河行二十里至順州其北平斥土厚宜稼又東北行七十里至檀州金人疆域圖順州至燕京一百十五里匈奴須知順州南至燕京九十里其載道里遠近不同今並存之宋白曰幽州東北至順州八十里大元順州領懷柔密雲二縣屬大同都乾化二年癸亥郢王友珪朝享太廟朝直遙翻甲子祀圜丘大赦改元鳳曆考異曰莊宗列傳云七日實錄云庚戌友珪祀圜丘改元今從薛史乾化二年吳陳璋攻荊南不克而還荊南兵與楚兵會於江口以邀之江口荊江口也還音旋又如字舟二百艘駢為一列夜過二鎮兵遽出追之不能及艘蘇遭翻乾化二年晉周德威拔燕安遠軍薊州將成行言等降于晉將即亮翻宋白曰薊州治漁陽本春秋無終子之國隋開皇初徙玄州於此煬帝廢州立漁陽郡唐初廢郡其地屬幽州開元十八年置薊州取古薊門關以名州西至幽州二百一十里乾化二年二月壬午蜀大赦乾化二年郢王友珪既得志遽為荒淫內外憤怒友珪雖啗以金繒終莫之附啗徒濫翻繒慈陵翻駙馬都尉趙巖犨之子趙犨守陳州拒黃巢有功見唐僖宗紀巖尚太祖女長樂公主太祖之甥也袁象先父敬初尚太祖妹萬安大長公主使疏吏翻均王友貞密與之謀誅友珪巖曰此事成敗在招討楊令公耳楊師厚官中書令為北面都招討使故稱之吾事立辦時梁重兵皆在楊師厚之手又勳名為衆所服故欲得其言諭禁軍郢王篡弒人望屬在大梁說式芮翻屬之欲翻公若因而成之此不世之功也且許事成之日賜犒軍錢五十萬緡犒苦到翻師厚與將佐謀之曰方郢王弒逆吾不能即討今君臣之分已定分扶問翻無故改圖可乎或曰郢王親弒君父賊也均王舉兵復讎義也奉義討賊何君臣之有彼若一朝破賊公將何以自處乎處昌呂翻師厚曰吾幾誤計幾居依翻乃遣其將王舜賢至洛陽陰與袁象先謀遣招討馬步都虞候譙人朱漢賓將兵屯滑州為外應譙漢縣唐帶亳州亦與象先密定計友珪治龍驤軍潰亂者去年懷州龍驤軍亂治直之翻獲者族之經年不已時龍驤軍有戍大梁者友珪徵之均王因使人激怒其衆曰天子以懷州屯兵叛追汝輩欲盡阬之考異曰莊宗列傳朱友貞傳及薛史歐陽史末帝紀云左右龍驤都戍汴友貞偽作友珪詔追還洛下莊宗實錄云友珪疑而召之按梁太祖實錄云丙戌東京言龍驤軍准詔追赴西京軍情不肯進發實友珪徵之非友貞偽作詔但激怒言阬之耳莫知所為丙戌均王奏龍驤軍疑懼未肯前發戊子龍驤將校見均王泣請可生之路將即亮翻校戶教翻王曰先帝與汝輩三十餘年征戰經營王業今先帝尚為人所弒汝輩安所逃死乎因出太祖畫像示之而泣曰汝能自趣洛陽雪讎恥趣七喻翻則轉禍為福矣衆皆踊躍呼萬歲請兵仗王給之庚寅旦袁象先等帥禁兵數千人突入宮中帥讀曰率友珪聞變與妻張氏及馮廷諤趨北垣樓下將踰城自度不免趨七喻翻度徒洛翻令廷諤先殺妻後殺己廷諤亦自剄剄古頂翻斷首也諸軍十餘萬大掠都市汴兵未至洛陽禁衞諸軍已殺友珪矣中書侍郎同平章事杜曉侍講學士李珽皆為亂兵所殺珽他鼎翻門下侍郎同平章事于兢宣政使李振被傷至晡乃定象先巖齎傳國寶詣大梁迎均王王曰大梁國家創業之地梁祖自宣武節度使幷諸鎮乃即帝位於大梁復稱乾化三年追廢友珪為庶人復博王友文官爵乾化二年丙申晉李存暉攻燕檀州刺史陳確以城降匈奴須知檀州南至燕京一百六十里東南至薊州一百九十里宋白曰檀州古白檀之地乾化二年蜀唐道襲自興元罷歸復為樞密使太子元膺廷疏道襲過惡疏分列也於朝會廷中條分列言其過惡故曰廷疏復扶又翻蜀主不悅庚子以道襲為太子太保乾化二年三月甲辰朔晉周德威拔燕盧蘆乾化二年丁未帝更名鍠久之又名瑱更工衡翻鍠戶盲翻瑱他甸翻考異曰薛史云貞明中更名瑱諸書皆無年月今因名鍠終言之乾化二年庚戌加楊師厚兼中書令賜爵鄴王賜詔不名事無巨細必咨而後行乾化二年帝遣使招撫朱友謙友謙復稱藩奉梁年號去年朱友謙附晉今雖復稱藩實陰附于晉乾化二年丙辰立皇弟友敬為康王乾化二年乙丑晉將劉光濬克古北口檀州燕樂縣東有東軍北口二守捉北口長城口也沈括曰檀州東北五十里有金溝館自館少東北行乍原乍隰三十餘里至中頓過頓屈折北行峽中濟灤水通三十餘里鉤折投山隙以度所謂古北口也匈奴須知虎北口南至燕京三百里幽州昌平縣北十五里有軍都陘西北三十五里有納款關即居庸故關乾化二年戊辰以保義留後戴思遠為節度使鎮邢州唐昭義軍統潞澤邢洺磁五州唐末兵爭晉得潞州仍以為昭義軍自孟方立以至於梁以邢洺磁三州為昭義軍遂有兩昭義軍今梁改邢洺磁為保義軍而以陝州之保義軍為鎮國軍考異曰薛史思遠傳云貞明中為邢州留後屬張萬進殺劉繼威命思遠鎮之按萬進殺繼威在前今從本紀乾化二年燕主守光命大將元行欽將騎七千牧馬於山北募山北兵以應契丹劉守光求救於契丹故使元行欽募兵於山北以應之以為外援晉李嗣源分兵徇山後八軍皆下之晉王以其弟存矩為新州刺史總之為存矩以驕惰致亂張本李嗣源進攻武州高行珪以城降元行欽聞之引兵攻行珪行珪使其弟行周質於晉軍以求救質音致李嗣源引兵救之行欽解圍去嗣源與行周追至廣邊軍媯州懷戎縣北有廣邊軍故白雲城也宋白曰廣邊軍在媯州北一百三十里高行周兄弟本貫廣邊軍鵰窠村行欽力屈而降嗣源愛其驍勇養以為子考異曰莊宗實錄行周作行溫張昭周太祖實錄云燕城危蹙甲士亡散劉守光召元行欽行欽部下諸將以守光必敗赴召無益乃請行欽為燕帥稱留後行欽無如之何乃謂諸將曰我為帥亦須歸幽州衆然之行欽以行珪在武州慮為後患乃令人於懷戎掠得其子縶之自隨至武州行欽謂行珪曰將士立我為留後共汝父子同行先定軍府然後降太原若不從必殺汝子行珪曰大王委爾親兵遂圖叛逆吾死不能從也其子泣告行珪行珪謂曰元公謀逆何以順從與爾訣矣行珪城守月餘城中食盡士有飢色行珪乃召集居人謂之曰非不為父老惜家屬不幸軍士乏食可斬予首出降即坐見寧帖行珪為治有恩衆泣曰願出私糧濟軍以死共守乃夜縋其弟行周為質於晉軍乞兵救援周德威命李嗣本李嗣源安金全救武州比至行欽解圍矣嗣源與行珪追躡至廣邊軍行欽帥騎拒戰行珪呼謂行欽曰與公俱事劉家我為劉家守城爾則僭稱留後誰之過也今日之事何勞士衆與君抗衡以決勝負行欽驍猛騎射絕衆報曰可行周馬足微蹶將踣嗣源躍馬救之檛擊行欽幾墜行欽正身引弓射嗣源中髀貫鞍嗣源拔矢凡八戰控弦七發矢中行欽猶沫血酣戰不解是夜行欽窮蹙固守廣邊軍晉兵圍之嗣源遣人告之曰彼此戰將不假言諭事勢可量亟來相見必保功名翌日行欽面縛出降嗣源酌酒飲之撫其背曰吾子壯士也養為假子臨敵擒生必有所獲名聞軍中莊宗實錄薛史紀及元行欽傳明宗實錄皆云行欽聞行珪降晉帥兵攻之惟周太祖實錄高行周傳云行欽稱留後行珪城守不從然恐行周卒時去燕亡已久行周名位尊顯門生故吏虛美其兄弟故與諸說特異今從衆書拔之唐末於媯州東置儒州領晉山一縣行周留事嗣源常與嗣源假子從珂分將牙兵以從將即亮翻從才用翻從珂母魏氏鎮州人先適王氏生從珂嗣源從晉王克用戰河北得魏氏以為妾故從珂為嗣源子及長以勇健章十二行本健下有善戰二字乙十一行本同孔本同知名嗣源愛之李從珂始此考異曰張昭於國初脩唐廢帝實錄云廢帝諱從珂明宗皇帝之元子也母曰宣憲皇后魏氏鎮州平山人中和末明宗徇地山東留戍平山得魏后帝以光啟元年正月二十三日生於外舍屬趙人負盟用兵不息音問阻絕帝甫十歲方得歸宗時明宗為裨將性闊達不能治生曹后亦疏於畫略生計所資惟宣憲而已曹后未有胎胤幹家宜室帝與部曲王建立皇甫立代北往來供饋曹后憐之不異所生薛史末帝諱從珂本姓王氏鎮州人也母宣憲皇后魏氏以光啟元年生帝於平山景福中明宗為武皇騎將略地至平山遇魏氏虜之帝時年十餘歲明宗養為己子劉恕取廢帝錄以為明宗即位後不立從珂而欲立從榮從榮死傳位於從厚故人皆謂從珂為養子按張昭仕明宗為史官異代脩廢帝錄無所諱避而不言養子事似可信然李克用光啟元年以前未嘗徇地山東又從珂若果是明宗子明宗必不捨之而立從榮從珂亦當不服今從薛史乾化二年吳行營招討使李濤帥衆二萬出千秋嶺攻吳越衣錦軍自杭州東南度千秋嶺則至杭州臨安縣薛史梁開平二年改臨安縣廣義鄉為衣錦鄉帥讀曰率衣於既翻睦州刺史傳璙為招討收復都指揮使將水軍攻吳東洲以分其兵勢東洲即常州東洲也璙力弔翻又力小翻乾化二年夏四月癸未以袁象先領鎮南節度使鎮南軍洪州時屬吳此所謂名號節度使也五代及十國皆有之乾化二年晉周德威進軍逼幽州南門壬辰燕主守光遣使致書於德威以請和語甚卑而哀德威曰大燕皇帝尚未郊天何雌伏如是邪漢趙溫曰大丈夫當雄飛安能雌伏結盟繼好好呼到翻非所聞也不答書守光懼復遣人祈哀復扶又翻德威乃以聞於晉王乾化二年千秋嶺道險狹錢傳瓘使人伐木以斷吳軍之後而擊之斷音短吳軍大敗虜李濤及士卒三千餘人以歸乾化二年己亥晉劉光濬拔燕平州執刺史張在吉五月光濬攻營州刺史楊靖降宋白曰平州東北至營州六百九十里乾化二年乙巳蜀主以兵部尚書王鍇為中書侍郎同平章事鍇口駭翻乾化二年楊師厚與劉守奇將汴滑徐兗魏博邢洺之兵十萬大掠趙境楊師厚以燕晉交兵乘虛掠趙趣趙州守奇自貝州入趣冀州九域志柏鄉北至趙州七十餘里貝州北至冀州一百二十餘里趣七喻翻庚戌師厚至鎮州九域志趙州北至鎮州九十五里燔其關城壬子師厚自九門退軍下博守奇引兵與師厚會攻下博拔之晉將李存審史建瑭戍趙州兵少趙王告急於周德威德威遣騎將李紹衡會趙將王德明同拒梁軍師厚守奇自弓高渡御河而東隋煬帝大業四年穿永濟渠引沁水南達于河北通涿郡後人因謂之御河張萬進懼請遷于河南師厚表徙萬進鎮青州以守奇為順化節度使去年改滄州義昌軍為順化軍乾化二年吳遣宣州副指揮使花虔將兵會廣德鎮遏使渦信屯廣德渦古禾翻姓也將復寇衣錦軍復扶又翻吳越錢傳瓘就攻之乾化二年六月壬申朔晉王遣張承業詣幽州與周德威議軍事乾化二年丙子蜀主以道士杜光庭為金紫光祿大夫左諫議大夫封蔡國公進號廣成先生光庭博學善屬文屬之欲翻蜀主重之頗與議政事乾化二年吳越錢傳瓘拔廣德虜花虔渦信以歸乾化二年戊子以張萬進為平盧節度使乾化二年辛卯燕主守光遣使詣張承業請以城降承業以其無信不許乾化二年蜀太子元膺豭喙齙齒豭古牙翻牡豕也喙許穢翻齙步交翻露齒也目視不正而警敏知書善騎射性狷急猜忍狷吉掾翻蜀主命杜光庭選純靜有德者使侍東宮光庭薦儒者許寂徐簡夫太子未嘗與之交言日與樂工㣥小嬉戲無度僚屬莫敢諫秋七月蜀主將以七夕出遊丙午太子召諸王大臣宴飲集王宗翰內樞密使潘峭翰林學士承旨高陽毛文錫不至太子怒曰集王不來必峭與文錫離間也峭七肖翻間古莧翻大昌軍使徐瑤常謙素為太子所親信酒行屢目少保唐道襲道襲懼而起丁未旦太子入白蜀主曰潘峭毛文錫離間兄弟蜀主怒命貶逐峭文錫以前武泰節度使兼侍中潘炕為內樞密使炕苦浪翻太子出道襲入蜀主以其事告之道襲曰太子謀作亂欲召諸將諸王以兵錮之曰錮者以禁錮為義蜀主疑焉遂不出遂不以七夕出遊許之內外戒嚴太子初不為備聞道襲召兵乃以天武甲士自衞捕潘峭毛文錫至檛之幾死檛則瓜翻囚諸東宮又捕成都尹潘嶠囚諸得賢門戊申徐瑤常謙與懷勝軍使嚴璘等各帥所部兵奉太子攻道襲帥讀曰率至清風樓道襲引屯營兵出拒戰道襲中流矢中竹仲翻逐至城西斬之考異曰九國志建將七夕出遊先一日元膺召諸軍使及諸王宴飲邸第中且議七夕從行之禮而集王宗翰等不至又曰詰朝元膺入白建曰潘峭毛文錫離間兄弟將圖不軌又曰及聞唐襲徵兵乃遣伶官安悉香諭軍使全殊率天武甲士以自衞又曰明日徐瑤常謙與懷勝軍使嚴璘等協謀以所部兵挾元膺以逐唐襲元膺介馬率卒過其兄宗賀之門召與同進宗賀曰兵起無名不敢聞命又曰建急召宗侃宗賀及諸軍使令以兵討寇乃逐唐襲至城西斬之盡殺屯營兵又自大安門登陴以入攻瑤謙等歐陽史曰元膺與伶人安悉香軍將喻全殊率天武兵自衞召大將徐瑤常謙率兵出拒襲與襲戰神武門襲中流矢墜馬死十國紀年丁未元膺令軍使喻全殊帥天武兵自衞戊申徐瑤常謙及左大昌軍使王承燧等各帥所部兵奉元膺攻唐道襲道襲自私第被甲乘馬過王宗賀門邀之宗賀曰兵起無名且不奉詔公宜緩行元膺遣天武將唐據帥親兵逐道襲至城西斬之據九國志云徐瑤等挾元膺以逐唐襲似襲在宮中欲逐出之也歐陽史云元膺召瑤等帥兵出拒襲攻東宮而元膺拒之紀年云瑤等奉元膺攻唐道襲道襲自私第被甲乘馬似道襲出在外第元膺就攻之也按道襲止以挾君自重既勸蜀主發兵自衞豈肯更出在外第必止於禁中也蓋瑤等引兵攻宮禁以求道襲道襲以屯營兵出拒戰兵敗走至城西為唐據所殺耳九國志又云元膺介馬帥卒過其兄宗賀之門召與同進是元膺邀宗賀也紀年云道襲自私第被甲乘馬過宗賀門要之是道襲邀宗賀也按道襲私第安得有兵觀宗賀所答之辭似語太子非語道襲也若語道襲宜勸之速入宿衞豈得云公宜緩行也潘炕言太子非有他志陛下宜面諭大臣以安社稷蓋當時蜀主聞亂既信道襲之言又不忍討太子無決然號令故炕言太子無他志當召大臣討徐瑤等為亂者耳九國志云令宗侃等出兵討寇乃逐唐襲至城西斬之是官軍斬襲也若然何故明日亟加襲贈諡乎此必誤也中外驚擾潘炕言於蜀主曰太子與唐道襲爭權耳無他志也陛下宜面諭大臣以安社稷蜀主乃召兼中書令王宗侃王宗賀前利州團練使王宗魯使發兵討為亂者徐瑤常謙等宗侃等陳於西毬場門陳讀曰陣兼侍中王宗黯自大安門梯城而入與瑤謙戰於會同殿前殺數十人章十二行本人下有餘衆皆潰四字乙十一行本同孔本同張校同瑤死謙與太子奔龍躍池龍躍池即摩訶池章十二行本中下有及暮稍定四字乙十一行本同孔本同退齋校同艦戶黯翻己酉章十二行本酉下有旦字乙十一行本同孔本同張校同太子出就舟人匄食匄古太翻乞也舟人以告蜀主亟遣集王宗翰往慰撫之比至比必利翻太子已為衞士所殺蜀主疑宗翰殺之大慟不已左右恐事變會張格呈慰諭軍民牓讀至不行斧鉞之誅將誤社稷之計蜀主收涕曰朕何敢以私害公於是下詔廢太子元膺為庶人宗翰奏誅手刃太子者元膺左右坐誅死者數十人貶竄者甚衆庚戌贈唐道襲太師諡忠壯復以潘峭為樞密使乾化二年甲子晉五院軍使拔章十二行本拔上有李信二字乙十一行本同孔本同張校同莫州擒燕將畢元福八月乙亥李信拔瀛州乾化二年賜高季昌爵勃海王乾化二年晉王與趙王鎔會于天長即鎮州之天長鎮也乾化二年楚寧遠節度使姚彥章將水軍侵吳鄂州吳以池州團練使呂師造為水陸行營應援使未至楚兵引去乾化二年九月甲辰以御史大夫姚洎為中書侍郎同平章事乾化二年燕主守光引兵夜出復取順州是年春正月晉周德威拔燕順州乾化二年吳越王鏐遣其子傳瓘傳璙璙力彫翻又力弔力小二翻及大同節度使傳瑛攻吳常州營於潘葑今常州無錫縣有潘葑酒庫葑音封浙人輕而怯輕墟正翻帥諸將倍道赴之帥讀曰率下同至無錫黑雲都將陳祐言於溫曰彼謂吾遠來罷倦未能決戰罷讀曰疲請以所部乘其無備擊之乃自他道出敵後溫以大軍當其前夾攻之吳越大敗斬獲甚衆乾化二年高季昌造戰艦五百艘治城塹繕器械為攻守之具治直之翻塹七艶翻招聚亡命交通吳蜀東通吳西通蜀乾化二年冬十月己巳朔燕主守光帥衆五千夜出將入檀州庚午周德威自涿州引兵邀擊大破之守光以百餘騎逃歸幽州其將卒降者相繼乾化二年蜀潘炕屢請立太子蜀主以雅王宗輅類己信王宗傑才敏欲擇一人立之鄭王宗衍最幼其母徐賢有寵欲立其子使飛龍使唐文扆諷張格上表請立宗衍扆隱豈翻上時掌翻格夜以表示功臣王宗侃等詐云受密旨衆皆署名蜀主令相者視諸子亦希旨言鄭王相最貴相息亮翻蜀主以為衆人實欲立宗衍不得已許之曰宗衍幼懦能堪其任乎甲午立宗衍為太子為宗衍亡蜀張本潘炕以朝廷無事稱疾請老蜀主不許涕泣固請乃許之國有大疑常遣使就第問之乾化二年嶺南節度使劉巖求婚於楚楚王許以女妻之妻七細翻乾化二年盧龍巡屬皆入于晉燕主守光獨守幽州城求援於契丹契丹以其無信竟不救守光屢請降於晉晉人疑其詐終不許至是守光登城謂周德威曰俟晉王至吾則開門泥首聽命德威使白晉王十一月甲辰晉王以監軍張承業權知軍府事自詣幽州辛酉單騎抵城下謂守光曰朱溫篡逆余本與公合河朔五鎮之兵興復唐祚五鎮潞鎮定幽滄本字下當有欲字章十二行本正有欲字孔本同乃效彼狂僭鎮定二帥皆俛首事公鎮帥王鎔定帥王處直俛音免是以有今日之役守光攻易定晉王救之遂伐守光事見上年公將何如守光曰今日俎上肉耳惟王所裁王憫之與折弓矢為誓折而設翻曰但出相見保無他也言不殺之先是守光愛將李小喜多贊成守光之惡言聽計從權傾境內先悉薦翻至是守光將出降小喜止之是夕小喜踰城詣晉軍章十二行本軍下有降字孔本同張校同且言城中力竭壬戌晉王督諸軍四面攻城克之擒劉仁恭及其妻妾守光帥妻子亡去癸亥晉王入幽州唐昭宗乾寧二年劉仁恭據幽州至是父子俱敗亡帥讀曰率乾化二年以寧國節度使王景仁為淮南西北行營招討應接使梁攻淮南攻其西北廬壽二州名為王景仁為吳所敗張本鄧廣銘標點聶崇岐覆校
