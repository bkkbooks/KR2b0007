body:
  text: 資治通鑑卷第二十八翰林學士朝散大夫右諫議大夫知制誥兼侍講同提學萬壽觀公事兼判集賢院上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣奉敕編集後學天台音注漢紀二十初元元年孝元皇帝上荀悅曰諱奭之字曰盛應劭曰諡法行義悅民曰元初元元年癸酉前四八初元元年春正月辛丑葬孝宣皇帝于杜陵臣瓚曰自崩至葬凡二十八日杜陵在長安南五十里初元元年三月丙午立皇后王氏封后父禁為陽平侯恩澤侯表陽平侯食邑於東郡初元元年以三輔太常郡國公田及苑可省者振業貧民太常掌諸陵邑故亦有公田苑師古曰振業振起之令有作業賦貸種食師古曰賦給與之也貸假也種音之勇翻賈公彥曰種食者或為種子或為食用初元元年封外祖平恩戴侯同産弟子中常侍許嘉為平恩侯文穎曰戴侯許廣漢諡法典禮不愆曰戴余按廣漢先坐腐刑及薨無後今以嘉紹封百官表侍中中常侍皆加官西都參用士人東都始以宦者為中常侍初元元年夏六月以民疾疫令太官損膳減樂府員省苑馬以振困乏樂府員大凡八百二十九人武帝所立漢官儀牧師諸苑三十六所分置北邊西邊養馬三十萬匹初元元年關章乙十一行本關上有秋九月三字孔本同張校同傳校同東郡國十一大水饑或人相食轉旁郡錢穀以相救初元元年上素聞琅邪王吉貢禹皆明經潔行姓譜貢姓子貢之後行下孟翻吉道病卒禹至拜為諫大夫上數虛己問以政易咸卦君子以虛受人師古曰虛己謂聽受其言也數所角翻古者人君節儉什一而稅無他賦役故家給人足高祖孝文孝景皇帝宮女不過十餘人廣既馬百餘匹後世爭為奢侈轉轉益甚臣下亦稍放效師古曰放音甫往翻下同臣愚以為如太古難宜少放古以自節焉少詩沼翻方今宮室已定無可奈何矣其餘盡可減損故時齊三服官輸物不過十笥李斐曰齊國舊有三服之官春獻冠幘縰為首服紈素為冬服輕綃為夏服凡三如淳曰地理志曰齊冠帶天下胡公曰服官主作文繡以給袞龍之服地理志襄邑亦有服官師古曰齊三服官李說是也縰與纚同音山爾翻即今之方目桬也紈素今之絹也輕綃今之輕桬也襄邑自出文繡非齊三服也作工各數千人一歲費數巨萬萬萬為巨萬廣既武帝時又多取好女至數千人以填後宮及棄天下多藏金錢財物鳥獸魚鱉凡百九十物又皆以後宮女置於園陵至孝宣皇帝時陛下惡有所言師古曰不能自言減省之事惡烏路翻惡有所言者惡以天下儉其親此語承上園陵事甚可痛也故使天下承化取女皆大過度師古曰取讀曰娶諸侯妻妾或至數百人豪富吏民畜歌者至數十人此所謂取女過度也外多曠夫師古曰曠空也室家空也皆虛地上以實地下其過自上生師古曰自從也上謂天子也唯陛下深察古道從其儉者大減損乘輿服御器物三分去二乘繩證翻去羌呂翻擇後宮賢者留二十人餘悉歸之及諸陵園女無子者宜悉遣漢制天子晏駕後宮送葬因留奉陵寢廣既獨舍長安城南苑地以為田獵之囿師古曰舍置也獨留置之其餘皆廢去舍讀曰捨可無大自損減以救之稱天意乎天生聖人蓋為萬民非獨使自娛樂而已也稱尺證翻為于僞翻樂音洛天子納善其言下詔令諸宮館希御幸者勿繕治治直之翻太僕減穀食馬水衡減肉食獸太僕掌輿馬漢舊儀云天子六廣既未央丞華輅軨騎馬騊駼大廣既也馬皆萬匹水衡都尉掌上林苑禽獸屬焉師古曰繕補也減謂損其數省者全去之臣光曰忠臣之事君也責其所難則其易者不勞而正易以鼓翻補其所短則其長者不勸而遂孝元踐位之初虛心以問禹禹宜先其所急後其所緩然則優游不斷先後皆去聲斷丁亂翻當時之大患也而禹不以為言恭謹節儉孝元之素志也而禹孜孜言之何哉使禹之智不足以知烏得為賢知而不言為罪愈大矣初元元年胸奴呼韓邪單于復上書言民衆困乏復扶又翻詔雲中五原郡轉穀二萬斛以給之初元元年是歲初置戊己校尉使屯田車師故地師古曰戊己校尉者鎮安西域無常治處亦猶甲乙等各有方位而戊與己四季寄王故以名官也時有戊校尉又有己校尉一說戊與己位在中央今所置校尉在三十六國之中故曰戊己也余謂車師之地不在三十六國之中當從師古前說為是宣帝元康二年以車師地與胸奴今胸奴款附故復屯田故地二年初元二年春正月上行幸甘泉郊泰畤畤音止樂陵侯史高以外屬領尚書事前將軍蕭望之光祿大夫周堪為之副望之名儒與堪皆以師傅舊恩天子任之數宴見言治亂陳王事數所角翻見賢遍翻治直吏翻陳王者之事也望之選白宗室明經有行行下孟翻散騎諫大夫劉更生給事中明經有行言其通於經術且行修飭也百官表曰散騎加官騎並乘輿車師古曰並音步浪翻騎而散從無常職也給事中給事禁中也散悉亶翻四人同心謀議勸導上以古制多所欲匡正上甚鄉納之師古曰鄉讀曰嚮意信嚮之而納用其言史高充位而已由此與望之有隙中書令弘恭弘姓也衛有大夫弘演自宣帝時久典樞機明習文法續漢志尚書令承秦所置武帝用宦者更為中書謁者令成帝用士人復故令掌凡選署及奏下尚書曹文書衆事僕射署尚書事令不在則奏下衆事辨已見前以顯久典事中人無外黨師古曰少骨肉之親無婚姻之家也遂委以政事無大小因顯白決白奏也決斷也朝直遙翻百僚皆敬事顯顯為人巧慧習事能深得人主微指內深賊持詭辨以中傷人師古曰詭違也違道之辨中竹仲翻輒被以危法忤五故翻睚五懈翻眦仕懈翻師古曰被加也音皮義翻危法謂以法危殺之亦與車騎將軍高為表裏議論常獨持故事不從望之等望之等患苦許史放縱又疾恭顯亶權建白以為中書政本國家樞機師古曰建白者立此議而白之處昌呂翻武帝游宴後庭故用宦者非古制也宜罷中書宦者應古不近刑人之義師古曰禮刑人不在君側故曰應古近其靳翻師古曰忤謂相違逆也忤五故翻謙讓重改作師古曰重難也未欲更置士人於中書也出劉更生為宗正散騎給事中中朝官也宗正外朝官也故云出望之堪數薦名儒茂材以備諫官數所角翻會稽鄭朋陰欲附望之會工外翻上書言車騎將軍高遣客為姦利郡國及言許史子弟罪過章視周堪師古曰視讀曰示以朋所奏之章示堪也堪白令朋待詔金馬門朋奏記望之曰今將軍規橅云若管晏而休遂行日昃至周召乃留乎師古曰問望之立意當趣如管晏而止為欲恢廓其道日昃不食追周召之蹟然後已乎橅讀曰模其字從木則下走將歸延陵之皋沒齒而已矣應劭曰下走僕也張晏曰吳公子札食邑延陵薄吳王之行棄國而耕於皋澤朋云望之所為若但如管晏則不處漢朝將歸會稽尋延陵之軌隱耕皋澤之中也師古曰下走自謙言趨走之使也沒齒終身也親日昃之兼聽則下走其庶幾願竭區區奉萬分之一召讀曰邵庶幾居希翻望之始見朋接待以意師古曰與之相見納用其說也余謂接待以意者推誠待之接以殷勤絶不與通朋楚士怨恨張晏曰朋會稽人會稽並屬楚蘇林曰楚人脆急也推所言許史事推吐雷翻曰皆周堪劉更生教我我關東人何以知此於是侍中許章白見朋見賢遍翻下同朋出揚言曰我見言前將軍小過五大罪一前將軍謂望之也師古曰華音胡化翻姓也行下孟翻欲入堪等堪等不納亦與朋相結恭顯令二人告望之等謀欲罷車騎將軍疏退許史狀車騎將軍謂史高疏與疏同漢制自三署郎以上入直禁中者十日一出休沐事下弘恭問狀上時掌翻下遐稼翻下既下同望之對曰外戚在位多奢淫欲以匡正國家非為邪也恭顯奏望之堪更生朋黨相稱舉數譖訴大臣數所角翻毀離親戚欲以專亶權勢為臣不忠誣上不道請謁者召致廷尉時上初即位不省召致廷尉為下獄也省悉井翻察也悟也可其奏後上召堪更生曰繫獄上大驚曰非但廷尉問邪以責恭顯皆叩頭謝上曰令出視事恭顯因使史高言上新即位未以德化聞天下而先驗師傅既下九卿大夫獄劉更生為宗正九卿也周堪為光祿大夫聞音問下遐嫁翻於是制詔丞相御史前將軍望之傅朕八年宣帝五鳳二年蕭望之為太子太傅至黃龍元年為八年今事久遠識忘難明師古曰言不能盡記有遺忘者故難明忘巫放翻收前將軍光祿勳印綬及堪更生皆免為庶人初元二年二月丁巳立弟竟為清河王考異曰荀紀竟作寬今從漢書初元二年戊午隴西地震敗城郭屋室壓殺人衆敗補邁翻考異曰劉向傳云三月地大震今從元紀初元二年三月立廣陵厲王子霸為王宣帝五鳳四年廣陵厲王胥以罪自殺國除今復立其子初元二年詔罷黃門乘輿狗馬師古曰黃門近署也故親幸之物屬焉百官表黃門寺屬少府乘繩證翻百官表水衡都尉屬官有禁圃等九官令丞孟康曰宜春宮名也在杜縣東晉灼曰史記云葬二世杜南宜春苑中師古曰宜春下苑即今京城東南隅曲江池是百官表少府屬官有左弋十二官令丞武帝太初元年更名左弋為佽飛佽飛掌弋射有九丞兩尉如淳曰佽飛具矰繳以射鳧鴈給祭祀是故有池也佽飛荊人入水斬蛟勇士也故以名官佽音次蘇林曰嚴飾池上之屋及其地也晉灼曰嚴籞射苑也許慎曰嚴弋射所蔽也池田苑中田也師古曰晉說是也又詔赦天下舉茂材異等直言極諫之士初元二年夏四月章乙十一行本月下有丁巳二字孔本同張校同傳校同立子驁為皇太子驁五到翻待詔鄭朋薦太原太守張敞先帝名臣宜傅輔皇太子上以問蕭望之望之以為敞能吏任治煩亂材輕非師傅之器敞傳云敞無威儀罷朝會過走馬章臺街使御吏驅自以便面拊馬又為婦畫眉所謂材輕也任音壬治直之翻欲以為左馮翊會病卒初元二年詔賜蕭望之爵關內侯給事中朝朔望朝直遙翻考異曰元紀此詔在今冬按劉向傳云前弘恭奏望之等獄決三月地大震然則望之等黜免在今春地震前也又曰夏客星見昴卷舌間上感悟下詔賜望之爵關內侯望之傳曰後數月賜望之爵關內侯蓋紀見望之死在十二月因置此詔於彼上耳初元二年關東饑齊地人相食初元二年秋七月己酉地復震復扶又翻下同考異曰劉向傳曰冬地復震元紀此月詔曰一年中地再動漢紀在七月己酉今從之初元二年上復徵周堪劉更生欲以為諫大夫弘恭石顯白皆以為中郎百官表諫大夫秩比八百石中郎秩比六百石並屬光祿勳上器重蕭望之不已欲倚以為相相息亮翻恭顯及許史兄弟侍中諸曹皆側目於望之等更生乃使其外親上變事外親謂母黨也上時掌翻下同地震殆為恭等不為三獨夫動應劭曰三獨夫謂蕭望之周堪及向師古曰獨夫猶言匹夫也殆近也為于僞翻師古曰章明也如此則太平之門開災異之原塞矣塞悉則翻下同書奏恭顯疑其更生所為白請考姦詐辭果服遂逮更生繫獄免為庶人會望之子散騎中郎伋亦上書訟望之前事散騎中郎者本為中郎而加散騎官也復奏望之前所坐明白無譖訴者師古曰言望之自有罪非人讒譖而訴之也下遐稼翻復扶又翻下同稱引亡辜之詩史不載伋書不知其所稱引者何詩詩變雅云無罪無辜讒口嗷嗷豈伋所引者即此詩乎亡古無字通不敬請逮捕弘恭石顯等知望之素高節不詘辱詘與屈同望之前幸得不坐復賜爵邑不悔過服罪深懷怨望教子上書歸非於上師古曰言歸惡於天子也終必不坐師古曰言恃舊恩自謂終無罪坐懷此心塞其怏怏心則聖朝無以施恩厚上曰蕭太傅素剛安肯就吏顯等曰人命至重言人所重者性命也語言薄罪即以語言為薄罪則不當下吏孝元於此不能破恭顯之姦可謂不明矣上乃可其奏冬十二月顯等封詔以付謁者敕令召望之手付因令太常急發執金吾車騎馳圍其第太常掌諸陵縣執金吾掌徼循京師蕭望之時居杜陵故令太常發執金吾車騎往圍其第以恐脅之速其自盡也召望之望之以問門下生魯國朱雲雲者好節士好呼到翻勸望之自裁自裁猶自殺也吾嘗備位將相年踰六十矣老入牢獄苟求生活不亦鄙乎字謂雲曰游師古曰朱雲字游呼其字趣讀曰促和戶臥翻無久留我死遂章乙十一行本遂作竟傳校同飲鴆自殺果墮恭顯計中拊手曰曩固疑其不就牢獄果然殺吾賢傅是時太官方上晝食上時掌翻上乃卻食為之涕泣哀動左右詩云啜其泣矣何嗟及矣為于僞翻以議不詳師古曰詳審也良久然後已上追念望之不忘每歲時遣使者祠祭望之冢終帝之世平曰墓封曰冢高曰墳臣光曰甚矣孝元之為君易欺而難悟也易以鼓翻夫恭顯之譖訴望之其邪說詭計誠有所不能辨也至於始疑望之不肯就獄恭顯以為必無憂已而果自殺則恭顯之欺亦明矣在中智之君孰不感動奮發以砥邪臣之罰砥致也雖涕泣不食以傷望之而終不能誅恭顯才得其免冠謝而已如此則姦臣安所懲乎是使恭顯得肆其邪心而無復忌憚者也復扶又翻初元二年是歲弘恭病死石顯為中書令初元二年初武帝滅南越開置珠崖儋耳郡事見二十卷武帝元鼎六年儋丁甘翻師古曰居海中之洲也水中可居者曰洲多侵陵之其民亦暴惡自以阻絶數犯吏禁數所角翻率數年一反殺吏漢輒發兵擊定之二十餘年間凡六反據賈捐之傳自初為郡至昭帝始元元年二十餘年間凡六反又再反始元五年罷儋耳郡並屬珠崖至宣帝神爵三年珠崖三縣反後七年甘露元年九縣復反珠崖山南縣反發兵擊之諸縣更叛連年不定海中洲上以黎母山為主環山列置諸縣山南縣蓋置於黎母山之南也師古曰更音工衡翻欲大發軍待詔賈捐之曰捐之時待詔金馬門臣聞堯舜禹之聖德地方不過數千里西被流沙東漸于海朔南暨聲教師古曰此引禹貢之辭漸入也一曰浸也朔北方也暨及也被皮義翻漸子廉翻不欲與者不強治也與讀曰豫治直之翻強其兩翻故君臣歌德師古曰言皆有德可歌頌武丁成王殷周之大仁也然地東不過江黃杜預曰江國在汝南安陽縣黃國今弋陽縣南不過蠻荊北不過朔方是以頌聲並作視聽之物章乙十一行本物作類孔本同張校同咸樂其生樂音洛越裳氏重九譯而獻此非兵革之所能致也晉灼曰遠國使來因九譯言語乃通也張晏曰越不著衣裳慕中國化遣譯來著衣裳故曰越裳也師古曰越裳自是國名非以襲衣裳始為稱號也王充論衡作越嘗此則不作衣裳之字明矣晉志曰吳孫晧置九德郡即周時越裳氏地興兵遠攻貪外虛內而天下潰畔孝文皇帝偃武行文當此之時斷獄數百賦役輕簡斷丁亂翻下同孝武皇帝厲兵馬以攘四夷天下斷獄萬數賦煩役重寇賊並起軍旅數發數所角翻父戰死於前子鬬傷於後女子乘亭障孤兒號於道老母寡婦飲泣巷哭師古曰淚流被面以入於口故言飲泣也巷哭者哭於路也號戶刀翻征伐不休之故也今關東民衆久困流離道路人情莫親父母莫樂夫婦樂音洛至嫁妻賣子法不能禁義不能止此社稷之憂也今陛下不忍悁悁之忿悁縈年翻又吉掾翻忿也憂也詩中心悁悁又急躁貌欲驅士衆擠之大海之中師古曰擠墜也音子詣翻又子奚翻余謂擠排也推也快心幽冥之地非所以救助饑饉保全元元也詩云蠢爾蠻荊大邦為讎師古曰詩小雅采草巳之詩也蠢動貌也蠻荊荊州之蠻也言敢與大國為讎敵也中國衰則先畔自古而患之何況乃復其南方萬里之蠻乎言珠崖又在蠻荊之南去京師萬里復扶又翻南越王尉他以兵威役屬西甌駱師古曰西甌即駱越也言西者以別東甌也余謂今安南之地古之駱越也珠崖蓋亦駱越地宋白曰高貴二州亦古駱越地相習以鼻飲范成大曰今雍管溪洞及沿海喜鼻飲隨貧富以銀錫陶器或大瓢盛水入鹽並山薑汁數滴器側有竅施管如瓶觜內鼻中吸水升腦下入喉吸水時含魚肉鮓一臠故水得安流入鼻不與氣相激既飲必噫氣謂掠腦快膈莫此若但可飲水或傳為飲酒非是本不足郡縣置也顓顓獨居一海之中師古曰顓與專同專專猶區區也一曰圜貌也多毒草蟲蛇水土之害人未見虜戰士自死又非獨珠崖有珠犀瑁也海中有珠池珠母者蚌也採珠必蛋丁皆居海艇中以大舶環池採珠以石懸大緪別以小繩繫蛋丁沒水取珠氣迫則撼繩繩動舶人覺乃絞取人緣大緪上然而死於採珠者亦多矣此我太祖皇帝所以罷劉氏媚川都也師古曰犀狀如牛頭如豬而四足類象黑色一角當額前鼻上又有小角劉欣明交州記曰犀其毛如豕蹄有三甲頭如馬有三角鼻上角短額上頭上角長異物志曰角中特有光耀白理如線自本達末則為通天犀抱朴子曰通天犀有白理如線者以盛米雞即駭矣其真者刻為魚銜人水水開三尺本草圖經曰犀出永昌山谷及益州今出南海者為上郭璞爾雅注曰犀三角一在頂上一在額上一在鼻上鼻上者即食角小而不橢瑁如龜其甲相覆而生若甲然甲上有斑文音代瑁音妹不擊不損威其民譬猶魚鱉何足貪也臣竊以往者羌軍言之此蓋指宣帝神爵元年羌反時兵出不踰千里費四十餘萬萬大司農錢盡乃以少府禁錢續之續漢志大司農掌諸錢穀金帛諸貨幣邊郡諸官請調度者皆為報給損多益寡取相給足百官表少府掌山林池澤之稅以給共養應劭注曰名曰禁錢以給私養自別為藏少者小也故稱少府師古曰大司農供軍國之用少府以養天子也費尚如此況於勞師遠攻亡士毋功乎毋與無同施之當今又不便臣愚以為非冠帶之國禹貢所及春秋所治皆可且無以為師古曰為猶用也治直之翻專用恤關東為憂上以問丞相御史御史大夫陳萬年以為當擊丞相于定國以為前日興兵擊之連年護軍都尉校尉及丞凡十一人還者二人卒士及轉輸死者萬人以上費用三萬萬餘尚未能盡降降戶江翻今關東困乏民難搖動捐之議是上從之捐之賈誼曾孫也三年初元三年春詔曰珠崖虜殺吏民背畔為逆背蒲妹翻今廷議者或言可擊或言可守或欲棄之其指各殊朕日夜惟思議者之言羞威不行則欲誅之狐疑辟難則守屯田師古曰辟讀曰避下同欲屯田與之相守以待其敝通乎時變則憂萬民夫萬民之饑餓與遠蠻之不討危孰大焉且宗廟之祭凶年不備王制冢宰制國用視年之豐耗祭用數之仂鄭氏曰算今年一歲經用之數用其什一夫以凶年之入制經用之什一以供祭則宗廟之禮宜有不備者矣嫌當讀作慊慊之為言厭也意自足也今關東大困倉庫空虛無以相贍又以動兵非特勞民凶年隨之其罷珠崖郡民有慕義欲內屬便處之師古曰欲有來入內郡者所至之處即安置之余謂便處者各隨其所便而處之也處昌呂翻勿強強其兩翻初元三年夏四月乙未晦茂陵白鶴館災赦天下初元三年夏旱初元三年立長沙煬王弟宗為王長沙煬王旦定王發之玄孫初元元年薨無後今立其弟紹封鄭氏曰煬音供養之養諡法好內遠禮曰煬去禮遠衆曰煬初元三年長信少府貢禹上言諸離宮及長樂宮衛可減其太半以寬繇役繇讀曰徭六月詔曰朕惟蒸庶之饑寒蒸衆也離力智翻勞於非業之作師古曰不急之事故云非業也恐非所以佐陰陽之道也其罷甘泉建章宮衛令就農百官各省費師古曰費用之物務減省毋有所諱初元三年是歲上復擢周堪為光祿勳復扶又翻堪弟子張猛為光祿大夫給事中大見信任猛張騫孫也四年初元四年春正月上行幸甘泉郊泰畤畤音止下同三月行幸河東祠后土赦汾陰徒徒有罪居作者五年初元五年春正月以周子南君為周承休侯文穎曰姓姬名延其祖父姬嘉本周後武帝元鼎四年封為周子南君奉周祀師古曰承休侯國在潁川郡初元五年上章乙十一行本上上有三月二字孔本同張校同退齊校同傳校同行幸雍雍於用翻祠五畤畤音止初元五年夏四月有星孛于參孛蒲內翻天文志參為白虎三星直者是為衡石下有三星鋭曰罰為斬艾事其外四星左右肩股也參所今翻初元五年上用諸儒貢禹等之言詔太官毋日殺師古曰不得日日宰殺師古曰食具也無乏正事而已師古曰秣養馬以粟秣食之也正事謂駕供祭祀搜狩之事非游用者也乘繩證翻秣音末角抵見二十一卷武帝元封三年李斐曰主假賃見官田與民收其假稅也故置田農之官晉灼曰胸奴傳秦始皇渡河據陽山北假中王莽傳五原北假膏壤殖穀北假地名師古曰晉說是也酈道元曰自高闕以東夾山帶河陽山以西皆北假也武帝置鹽鐵官宣帝置常平倉以廣學者武帝為博士官置弟子五十人昭帝增弟子員滿百人宣帝末增倍之令今後數年以用度不足更為設員千人令民有能通一經者皆復復方目翻省刑罰七十餘事初元五年陳萬年卒六月辛酉長信少府貢禹為御史大夫禹前後言得失書數十上上時掌翻上嘉其質直多采用之初元五年胸奴郅支單于自以道遠又怨漢擁護呼韓邪而不助己困辱漢使者江乃始等遣使奉獻因求侍子郅支遣子入侍見上卷宣帝甘露元年谷姓也郅支單于鄉化未醇師古曰不雜曰醇醇一也厚也鄉讀曰嚮下同宜令使者送其子至塞而還還從宣翻又如字吉上書言中國與夷狄有羈縻不絶之義今既養全其子十年德澤甚厚空絶而不送近從塞還示棄捐不畜畜許六翻使無鄉從之心師古曰鄉從謂嚮化而從命也立後怨不便議者見前江乃始無應敵之數智勇俱困以致恥辱即豫為臣憂臣幸得建強漢之節承明聖之詔宣諭厚恩不宜敢桀師古曰言郅支畏威當不敢桀猾也加無道於臣則單于長嬰大罪師古曰嬰猶帶也師古曰舍止也近其靳翻沒一使以安百姓國之計臣之願也願送至庭郅支單于庭也既至郅支單于怒竟殺吉等考異曰陳湯傳初元四年郅支求侍子元帝紀五年谷吉使胸奴不還湯傳又云御史大夫貢禹議吉不可遣按禹今年六月始為御史大夫或者郅支以明年求侍子而吉以五年使胸奴也又聞呼韓邪益強恐見襲擊欲遠去會康居王數為烏孫所困數所角翻下同與諸翕侯計以為胸奴大國烏孫素服屬之今郅支單于困厄在外可迎置東邊使合兵取烏孫而立之師古曰言與郅支並力共滅烏孫以其地立郅支令居之也即使使至堅昆通語郅支宣帝黃龍元年郅支都堅昆又怨烏孫怨烏孫事亦見上卷黃龍元年大說說讀曰悅遂與相結引兵而西郅支人衆中寒道死餘財三千人師古曰中寒傷於寒也道死死於道上也中竹仲翻財與才同康居王以女妻郅支郅支亦以女豫康居王妻七細翻豫讀曰與康居甚尊敬郅支欲倚其威以脅諸國郅支數借兵擊烏孫深入至赤谷城殺略民人驅畜産去師古曰驅與驅同西邊空虛不居者五千里西城傳烏孫國治赤谷城西至康居蕃地五千里若云空虛者五千里則自赤谷以西皆不居矣此已抵其國都不得云西邊也陳湯傳作且千里當從之初元五年冬十二月丁未貢禹卒丁巳長信少府薛廣德為御史大夫永光元年戊寅前四三初元五年春正月上行幸甘泉郊泰畤禮畢因留射獵薛廣德上書曰竊見關東困極人民流離陛下日撞亡秦之鍾師古曰撞音丈江翻聽鄭衛之樂臣誠悼之今士卒暴露從官勞倦應劭曰從官謂宦者及虎賁羽林太醫太官是也師古曰從官親近天子常侍從者皆是也從才用翻下同思與百姓同憂樂樂音洛天下幸甚上即日還還從宣翻又如字初元五年二月詔丞相御史舉質朴敦厚遜讓有行者行下孟翻光祿歲以此科第郎從官師古曰始令丞相御史舉此四科人而擢用之而見在郎及從官又令光祿每歲依此科考校定其第高下用知其人賢否也初元五年三月赦天下初元五年雨雪隕霜殺桑雨于具翻初元五年秋上酎祭宗廟出便門師古曰便門長安城南面西頭第一門酎直又翻薛廣德當乘輿車免冠頓首曰宜從橋詔曰大夫冠乘繩證翻說文冠絭也所以絭髮辨冕之總名也廣德曰陛下不聽臣臣自刎刎扶粉翻以血汙車輪陛下不得入廟矣師古曰言不以理終不得立廟也一曰以見死傷犯於齊潔不得入廟祠也原父曰一說是也時上欲入廟汙烏故翻先驅光祿大夫張猛進曰師古曰先驅導乘輿也說讀曰悅驅讀曰驅臣聞主聖臣直乘船危就橋安聖主不乘危御史大夫言可聽上曰曉人不當如是邪師古曰謂諫爭之言當如猛之詳善也初元五年九月隕霜殺稼天下大饑丞相于定國大司馬車騎將軍史高御史大夫薛廣德俱以災異乞骸骨賜安車駟馬黃金六十斤罷太子太傅韋玄成為御史大夫考異曰百官表七月癸未大司馬高免辛亥韋玄成為御史大夫十一月戊寅丞相定國免荀紀七月己未高免薛廣德傳酎祭後月餘以歲惡民流乞骸骨罷廣德為御史大夫凡十月免月日參差未知孰是故皆沒不書縣其安車以傳示子孫為榮師古曰縣其所賜安車以示榮幸也致仕縣車蓋亦古法韋孟詩縣車之義以洎小臣是也貢父曰致仕縣車言休息不出也故韋孟及薛廣德自縣其安車也縣讀曰懸初元五年帝之為太子也從太中大夫孔霸受尚書及即位賜霸爵關內侯號褒成君如淳曰為帝師教令成就故曰褒成君上欲致霸相位霸為人謙退不好權勢好呼到翻常稱爵位泰過何德以堪之御史大夫屢缺上輒欲用霸霸讓位自陳至于再三上深知其至誠乃弗用以是敬之賞賜甚厚初元五年戊子侍中衛尉王接為大司馬車騎將軍接平昌侯王無故之子初元五年石顯憚周堪張猛等數譖毀之數所角翻劉更生懼其傾危上書曰臣聞舜命九官師古曰尚書禹作司空棄后稷契司徒皋陶作士垂共工益朕虞伯夷秩宗夔典樂龍納言凡九官也和之至也濟子禮翻衆臣和於朝則萬物和於野故簫韶九成鳳皇來儀師古曰韶舜樂名舉簫管之屬示其備也於韶樂九奏則鳳皇見其容儀言感至和也師古曰厲王夷王之子厲王生宣王宣王生幽王轉相非怨則日月薄食水泉沸騰山谷易處師古曰薄迫也謂被掩迫也沸涌出也騰乘也言百川沸涌而相乘陵山頂隆高而盡崩壞陵谷易處謂正月繁霜也正月夏之四月正陽之月也和氣致祥乖氣致異祥多者其國安異衆者其國危天地之常經古今之通義也今陛下開三代之業招文學之士優游寬容使得並進今賢不肖渾殽師古曰言雜亂也渾音胡本翻邪正雜糅師古曰糅和也音汝救翻忠讒並進章交公車人滿北軍如淳曰漢儀注中壘校尉主北軍壘門內尉一人主上書者獄上章於公車有不如法者以付北軍尉北軍尉以法治之楊惲上書遂幽北闕北闕公車所在膠戾乖剌師古曰言志意不和各相違背午音五故翻剌音來曷翻轉相是非更工衡翻所以營惑耳目感移心意不可勝載師古曰言其誣罔天子也營謂回繞之勝音升下同師古曰曹輩也正臣進者治之表也正臣陷者亂之機也乘治亂之機未知孰任而災異數見治直吏翻數所角翻見賢遍翻此臣所以寒心者也初元以來六年矣按春秋六年之中災異未有稠如今者也師古曰稠多也音直流翻原其所以然者由讒邪並進也讒邪之所以並進者由上多疑心既已用賢人而行善政如或譖之則賢人退而善政還矣師古曰還謂收還也來讒賊之口持不斷之意者開㣥枉之門斷丁亂翻讒邪進則衆賢退㣥枉盛則正士消故易有否泰師古曰否音皮鄙翻小人道長君子道消則政日亂君子道長小人道消則政日治長知兩翻治直吏翻下同昔者鯀共工歡兜與舜禹雜處堯朝師古曰鯀崇伯之名即檮杌也共工少皞氏之後即窮奇也歡兜帝鴻氏之後即渾敦也鯀音工本翻共音恭歡音火官翻處昌呂翻當是時迭進相毀師古曰迭互也音大結翻流言相謗豈可勝道哉勝音升帝堯成王能賢舜禹周公而消共工管蔡故以大治榮華至今孔子與季孟偕仕於魯師古曰季孟謂季孫孟孫皆桓公之後代執國權而卑公室余謂季孫孟孫季孟之通稱與孔子偕仕者季孫斯孟孫何忌也師古曰叔孫者叔孫通也故以大亂汙辱至今故治亂榮辱之端在所信任信任既賢在於堅固而不移詩云我心匪石不可轉也師古曰此邶柏舟之詩也言石性雖堅尚可移轉己志須確執德不傾過於石也易曰渙汗其大號師古曰此易渙卦九五爻辭也言王者渙然大發號令如汗之出也汗出而不反者也今出善令未能踰時而反師古曰踰時三月也用賢未能三旬而退是轉石也論語曰見不善如探湯師古曰論語載孔子之言探湯言其除難無所避也探吐南翻師古曰讇古諂字故出令則如反汗用賢則如轉石去佞則如拔山去羌呂翻如此望陰陽之調不亦難乎是以㣥小窺見間隙間古莧翻緣飾文字巧言醜詆師古曰詆毀也辱也音丁禮翻流言飛文譁於民間放言於外以誣人曰流言孔穎達曰流謂水流造作虛語使人傳之如水之流然故謂之流言為飛書以詆毀若今之匿名書曰飛文師古曰譁歡也音火瓜翻慍于㣥小師古曰邶柏舟言仁人不遇之詩悄悄憂貌慍怒也悄音千小翻慍於問翻誠足慍也昔孔子與顏淵子貢更相稱譽不為朋黨師古曰事具見論語更工衡翻譽音余不為比周師古曰事見尚書傳柱戀翻遞也比頻寐翻忠於為國無邪心也今佞邪與賢臣並交戟之內師古曰交戟謂宿衛者違善依惡歙歙訿訿詩小旻歙歙訿訿毛氏注曰潝潝然患其上訿訿然思不稱于上爾雅云潝潝訿訿莫供職也韓詩云不善之貌歙與潝同許急翻訿音紫數所角翻欲以傾移主上如忽然用之此天地之所以先戒災異之所以重至者也師古曰重音直用翻自古明聖未有無誅而治者也故舜有四放之罰師古曰謂舜流共工于幽州放歡兜于崇山竄三苗于三危殛鯀于羽山應劭曰少正卯姦人之雄故孔子為司寇七日誅之於兩觀之下師古曰兩觀謂闕也觀古玩翻今以陛下明知知讀曰智誠深思天地之心覽否泰之卦歷周唐之所進以為法原秦魯之所消以為戒師古曰歷謂歷觀之原謂思其本也周成王唐唐堯章乙十一行本災上有省字張校同災異之禍以揆當世之變放遠佞邪之黨壞散險詖之聚遠于願翻壞音怪師古曰揆度也險言曰詖詖彼義翻杜閉㣥枉之門廣開衆正之路決斷狐疑分別猶豫斷丁亂翻別彼列翻使是非炳然可知則百異消滅而衆祥並至太平之基萬世之利也顯見其書愈與許史比而怨更生等比毗至翻下同是歲夏寒日青無光顯及許史皆言堪猛用事之咎上內重堪又患衆口之寖潤鄭氏曰譖人之言如水之浸潤漸以成之孔子曰浸潤之譖不行焉可謂明也已矣時長安令楊興以材能幸常稱譽堪譽音余下同上欲以為助乃見問興朝臣斷斷不可光祿勳何邪師古曰斷斷忿疾之意也斷音牛斤翻傾巧士謂上疑堪因順指曰堪非獨不可於朝廷自州里亦不可也周禮五黨為州五家為鄰五鄰為里漢人謂同州鄉而居者為州里以為當誅故臣前書言堪不可誅傷為國養恩也為于僞翻下同上曰然此何罪而誅今宜奈何興曰臣愚以為可賜爵關內侯食邑三百戶勿令典事明主不失師傅之恩此最策之得者也上於是疑之司隸校尉琅邪諸葛豐姓譜葛氏先本琅邪諸縣人徙陽都時人本其先之所居謂之諸葛氏風俗通云葛嬰為陳涉將有功而誅孝文録其後封諸縣侯因並氏焉數侵犯貴戚數所角翻下同後坐春夏繫治人春夏生長之時故仲春省囹圄去桎梏毋肆掠止獄訟仲夏挺重囚益其食春夏而繫治人為不順天時豐於是上書告堪猛罪上不直豐乃制詔御史城門校尉豐前與光祿勳堪光祿大夫猛在朝之時數稱言堪猛之美豐前為司隸校尉不順四時修法度專作苛暴以獲虛威朕不忍下吏下遐稼翻以為城門校尉百官表城門校尉掌京師十二城門屯兵省悉景翻而反怨堪猛以求報舉師古曰言舉其事以報怨暴揚難驗之罪毀譽恣意不顧前言師古曰前言謂譽堪猛之美今乃更言其短是不顧也譽音余下同朕憐豐之耆老不忍加刑其免為庶人又曰豐言堪猛貞信不立朕閔而不治又惜其材能未有所效其左遷堪為河東太守猛槐里令槐里周之犬丘秦曰廢丘高帝二年改曰槐里屬右扶風臣光曰諸葛豐之於堪猛前譽而後毀其志非為朝廷進善而去姦也去羌呂翻欲比周求進而已矣斯亦鄭朋楊興之流烏在其為剛直哉人君者察美惡辨是非賞以勸善罰以懲姦所以為治也治直吏翻使豐言得實則豐不當黜若其誣罔則堪猛何辜焉今兩責而俱棄之則美惡是非果安在哉初元五年賈捐之與楊興善捐之數短石顯師古曰談說其長短余謂此言數陳其短耳數所角翻稀復進見復扶又翻下同見賢遍翻興新以材能得幸捐之謂興曰京兆尹缺按百官表初元四年京兆尹成永光四年光祿大夫琅邪張談為京兆尹四年不勝任免蓋是時成已去而談未除是以缺官也言君蘭張晏曰楊興字君蘭考異曰荀紀作君簡今從漢書興曰君房下筆言語妙天下賈捐之字君房師古曰於天下最為精妙耳勝五鹿充宗遠甚續漢志曰尚書令承秦所置武帝用宦者更為中書謁者令是時石顯為中書令五鹿充宗為尚書令疑兩官並置也百官表成帝建始元年尚書令五鹿充宗為少府五年貶為玄菟太守逆而數之則知充宗是年猶為尚書令也姓譜趙大夫食采於五鹿以邑為氏令我得代充宗君蘭為京兆京兆郡國首尚書百官本天下真大治士則不隔矣治直吏翻捐之復短石顯興曰顯方貴上信用之今欲進第從我計師古曰第但也即得入矣捐之即與興共為薦顯奏稱譽其美譽音余下同以為宜賜爵關內侯引其兄弟以為諸曹又共為薦興奏以為可試守京兆尹石顯聞知白之上乃下興捐之獄下遐稼翻令顯治之奏興捐之懷詐僞更相薦譽更工衡翻欲得大位罔上不道捐之竟坐棄市興髡鉗為城旦臣光曰君子以正攻邪猶懼不克況捐之以邪攻邪其能免乎初元五年徙清河王竟為中山王初元五年胸奴呼韓邪單于民衆益盛塞下禽獸盡單于足以自衛不畏郅支其大臣多勸單于北歸者師古曰塞下無禽獸則射獵無所得又不畏郅支故欲北歸舊處單于竟北歸庭民衆稍稍歸之其國遂定二年初元二年春二月赦天下初元二年丁酉御史大夫韋玄成為丞相右扶風鄭弘為御史大夫初元二年三月壬戌朔日有食之初元二年夏六月赦天下初元二年上問給事中匡衡以地震日食之變匡衡時以博士給事中風俗通云匡魯邑句須為之宰其後氏焉陛下躬聖德開太平之路閔愚吏民觸法抵禁比年大赦使百姓得改行自新比毗至翻行下孟翻天下幸甚臣竊見大赦之後姦邪不為衰止為于僞翻今日大赦明日犯法相隨入獄此殆導之未得其務也今天下俗貪財賤義好聲色上侈靡親戚之恩薄婚姻之黨隆苟合徼幸好呼到翻下同徼工堯翻以身設利不改其原師古曰設施也原本也刑猶難使錯而不用也師古曰歲赦謂每歲一赦也錯置也錯音千故翻夫朝廷者天下之楨幹也楨幹版築之具題曰楨旁曰幹以築垣牆喻治天下也楨音貞則下有爭鬬之患上有自專之士則下有不讓之人上有克勝之佐則下有傷害之心上有好利之臣則下有盜竊之民此其本也師古曰言下之所行皆取化於上也審所上而已師古曰上謂崇尚也治直之翻非家至而人說之也師古曰非家家皆到人人勸說也能者布職朝廷崇禮百僚敬讓道德之行由內及外自近者始然後民知所法遷善日進而不自知也詩曰商邑翼翼四方之極師古曰商頌殷武之詩也商邑京師也極中也言商邑之禮俗翼翼然可則效是乃四方之中正也天子之都親承聖化然其習俗無以異於遠方郡國來者無所法則或見侈靡而放效之師古曰放依也音甫往翻此教化之原本風俗之樞機宜先正者也臣聞天人之際精祲有以相蕩李奇曰祲氣也言天人精氣相動也師古曰祲謂陰陽之氣相浸漸以成災祥者也音子鴆翻事作乎下者象動乎上陰變則靜者動陽蔽則明者暗鄧展曰靜者動謂地震也明者暗謂日食也師古曰暗與暗同陛下祗畏天戒哀閔元元宜省靡麗考制度近忠正遠巧佞近其靳翻遠于頤翻以崇至仁匡失俗道德弘於京師淑問揚乎疆外師古曰淑善也問名也上說其言說讀曰悅遷衡為光祿大夫荀悅論曰夫赦者權時之宜非常典也漢興承秦兵革之後大愚之世比屋可刑比毗至翻又毗必翻故設三章之法大赦之令約法三章事見九卷高帝元年赦自古有之至於大赦則始於秦高祖既並天下即皇帝位大赦天下後世因之為永制與民更始更工衡翻時勢然也後世承業襲而不革失時宜矣若惠文之世無所赦之若孝景之時七國皆亂異心並起姦詐非一及武帝末年賦役繁興㣥盜並起加以太子之事巫蠱之禍天下紛然百姓無聊章乙十一行本聊下有人不自安四字孔本同退齊校同傳校同及光武之際撥亂之後如此之比宜為赦矣初元二年秋七月隴西羌姐旁種反師古曰音所廉翻又音先廉翻姐音紫今西羌尚有此姓而音先冉翻詔召丞相韋玄成等入議是時歲比不登比毗至翻朝廷方以為憂而遭羌變玄成等漠然莫有對者師古曰漠無聲也音莫右將軍馮奉世曰羌虜近在竟內背畔竟古境字通用背蒲妹翻無以威制遠蠻臣願帥師討之帥讀曰率上問用兵之數對曰臣聞善用兵者役不再興糧不三載故師不久暴而天誅亟決師古曰暴露也亟急也載子亥翻師古曰料量也音聊而師至於折傷再三發調則曠日煩費威武虧矣折而設翻調徒弔翻今反虜無慮三萬人師古曰無慮舉凡之言無小思慮而大計也用六萬人然羌戎弓矛之兵耳器不犀利如淳曰今俗以刀兵利為犀晉灼曰犀堅也師古曰晉說是一月足以決丞相御史兩將軍兩將軍車騎將軍王接左將軍許嘉也民方收斂時未可多發發萬人屯守之且足且足猶言且可也斂力贍翻不可天下被饑饉被皮義翻士馬羸耗守戰之備久廢不簡師古曰簡謂選揀而羌首難師古曰言創首為寇難也難乃旦翻虜見兵少必不畏懼戰則挫兵病師守則百姓不救如此怯弱之形見見賢遍翻羌人乘利諸種並和種章勇翻師古曰和應也音胡臥翻相扇而起臣恐中國之役不得止於四萬非財幣之所能解也故少發師而曠日師古曰曠空也空費其日而無功也利害相萬也師古曰相比為萬倍也不能得言奉世不能得請也益二千人於是遣奉世將萬二千人騎以將屯為名師古曰且云領兵屯田不言討賊將即亮翻到隴西分屯三處任立為右軍屯白石韓昌為前軍屯臨洮奉世為中軍屯首陽西極上任音壬羌衆章乙十一行本衆作虜孔本同盛多皆為所破殺兩校尉校戶教翻奉世具上地形部衆多少之計願益三萬六千人乃足以決事書奏天子大為發兵六萬餘人上時掌翻為于僞翻八月拜太常弋陽侯任千秋為奮武將軍以助之昭帝時宮以捕上官桀功封弋陽侯千秋其子也弋陽侯國屬汝南郡應劭曰弋山在西北十月兵畢至隴西十一月並進羌虜大破斬首數千級餘皆走出塞兵未決間漢復發募士萬人復扶又翻拜定襄太守韓安國為建威將軍師古曰自別有此韓安國非武帝時人也聞羌破而還詔罷吏士吏軍吏士卒也備要害處師古曰要害者在我為要於敵為害也容肇祖標點顧頡剛聶崇岐覆校
