body:
  text: 資治通鑑卷第二百八十七端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千六百戶食實封一千戶臣司馬光奉敕編集後學天戶音注後漢紀二高祖睿文聖武昭肅孝皇帝中帝集㣥臣庭議進取天福十二年丁未九四七帝集㣥臣庭議進取五月乙酉朔永康王兀欲召延壽及張礪和凝李嵩馮道於所館飲酒所館者兀欲所館之地兀欲從容謂延壽曰從千容翻妹自上國來言其妻方自契丹中來延壽欣然與之俱入良久兀欲出謂礪等曰燕王謀反適已鎖之矣又曰先帝在汴時遺我一籌遺唯季翻許我知南朝軍國朝直遙翻近者臨崩別無遺詔而燕王亶自知南朝軍國豈理邪下令延壽親黨皆釋不問間一日兀欲至待賢館受蕃漢官謁賀笑謂張礪等曰燕王果於此禮上上時掌翻吾以鐵騎圍之諸公亦不免矣後數日集蕃漢之臣於府署恆州府署也遺制兀欲自為之也永康王大聖皇帝之嫡孫人皇王之長子太后鍾愛㣥情允歸可於中京即皇帝位契丹主阿保機諡大聖皇帝其長子東丹王突欲號人皇王突欲奔唐其子兀欲留本國不從契丹主邪律德光封之為永康王又德光取中國以恆州為中京既而易吉服見㣥臣不復行喪復扶又翻歌吹之聲不絶於內帝集㣥臣庭議進取辛巳嚴巳改卯以絳州防禦使王晏為建雄節度使王晏守絳州見上卷是年二月帝集㣥臣庭議進取帝集㣥臣庭議進取庭議者議之於庭攻取鎮魏鎮州時為恆州契丹諸酋聚焉魏帥杜重威陘音刑則河南拱手自服帝欲自石會趨上黨趨七喻翻郭威曰虜主雖死黨衆猶盛各據堅城我出河北兵少路迂少詩沼翻下同迂音于又音紆曲也回遠也旁無應援若㣥虜合勢共擊我軍進則遮前退則邀後糧餉路絶此危道也上黨山路險止止色入翻粟少民殘無以供億亦不可由近者陝晉二鎮相繼款附陝晉歸附事見上卷上年陝失冉翻萬無一失不出兩旬洛汴定矣帝曰卿言是也蘇逢吉等曰史弘肇大軍已屯上黨㣥虜繼遁不若出天井抵孟津為便司天奏太歲在午不利南行陰陽家所謂逆太歲九域志自晉州南至絳州一百二十五里自絳州南至陝州二百五十里自陝而東則至洛矣辛卯詔以十二日發北京自後唐以來以太原為北京是月乙酉朔十二日丙申帝集㣥臣庭議進取甲申章十二行本申作午乙十一行本同孔本同以太原尹崇為北京留守以趙州刺史李存王褱為副留守河東幕僚真定李驤為少尹牙將太原蔚進為馬步指揮使以佐之李存王褱等後遂為北漢佐命王褱古回翻蔚紆勿翻姓也王褱唐莊宗之從弟也從才用翻帝集㣥臣庭議進取是日劉晞棄洛陽奔大梁以人心歸漢知不可守也帝集㣥臣庭議進取武安節度副使天策府都尉領鎮南節度使馬希廣鎮南軍洪州時屬唐性謹順希範愛之使判內外諸司事壬辰夜希範卒將佐議所立都指揮使張少敵少詩沼翻都押牙袁友恭以武平節度使知永州事希萼楚置武平節度於朗州朗永之疑注詳於後請立之長知兩翻下同下齒長居長同長直都指揮使劉彥瑫瑫他牢翻天策府學士李弘皋鄧懿文小門使楊滌小門使諸鎮皆置之掌門戶之事府有宴集則執兵在門外張少敵曰永州齒長而性剛必不為都尉之下明矣必立都尉當思長策以制永州使帖然不動則可不然社稷危矣兄弟爭國社稷必危天策府學士拓跋恆曰三十五郎雖判軍府之政然三十郎居長請遣使以禮讓之不然必起爭端希廣第三十五希萼第三十藩府將吏稱府主之子為郎君今日軍政在手天與不取使他人得之異日吾輩安所自容乎希廣懦弱不能自決乙未彥瑫等稱希範遺命共立之史言劉彥瑫等為身謀以亂馬氏兄弟傳國長幼之序考異曰十國紀年五月己丑希範得疾集國官告以傳位希廣湖湘故事希廣又不能強弱猶豫之間㣥輔明日衆口勸上乃受軍府排衙賀之以其事奏聞朝廷託以希範臨終之日遺言以付希廣按希範存時若已集國官傳位希廣則沒後將佐誰敢更有異議必彥瑫等假託希範遺令也今從湖湘故事禍其始此乎與拓跋恆皆稱疾不出為馬希萼攻殺希廣張本帝集㣥臣庭議進取丙申帝發太原自陰地關出晉絳丁酉史弘肇奏克澤州始弘肇攻澤州刺史翟令奇固守不下翟萇伯翻帝以弘肇兵少欲召還還從宣翻蘇逢吉楊邠曰今陝晉河陽皆已向化崔廷勳耿崇美朝夕遁去時契丹之兵大勢已北還故知懷州之兵必不能久留則河南人心動搖虜勢復壯矣帝未決使人諭指於弘肇句斷章乙十一行本重弘肇二字兵已及此勢如破竹可進不可退與逢吉等議合帝乃從之觀此則知帝猶憚契丹有未敢輕進之心説式芮翻令奇乃降降戶江翻弘肇以萬超權知澤州帝集㣥臣庭議進取崔廷勳耿崇美奚王拽剌合兵逼河陽張遇帥衆數千救之戰於南阪敗死太行南阪也帥讀曰率亦敗閉城自守拽剌欲攻之廷勳曰今北軍已去北軍謂契丹聚於恆州之軍崔廷勳等在南故謂屯恆之軍為北且殺一夫猶可惜況一城乎聞弘肇已得澤州乃釋河陽還保懷州弘肇將至廷勳等擁衆北遁澤州南至懷州一百二十里耳漢兵又進而逼之故遁大掠而去九域志懷州東北至衛州二百九十三里弘肇引兵與武行德合弘肇為人沈毅寡言御衆嚴整將校小不從命立撾殺之沈持林翻將即亮翻校戶教翻撾側瓜翻士卒所過犯民田及繫馬於樹者皆斬之軍中惕息惕他歷翻莫敢犯令故所向必克帝自晉陽安行入洛及汴兵不血刃皆弘肇之力也帝由是倚愛之辛丑帝至霍邑霍邑漢彘縣後漢改曰永安隋改曰霍邑唐屬晉州九域志在州西北一百三十五里仍以契丹囚其父章十二行本父下有延壽二字乙十一行本同孔本同張校同告之所以絶趙匡贊北顧之心帝集㣥臣庭議進取滋德宮有宮人五十餘人五代會要晉天福四年改明德殿為滋德殿薛史曰以宮城南門同名故也宦者張環不與翰破鎖奪宮人執環燒鐵灼之腹爛而死初翰聞帝擁兵而南欲北歸恐中國無主必大亂己不得從容而去從千容翻從容不急遽之貌時唐明宗子許王從益與王淑在洛陽王淑母子自晉入洛以後常居洛陽是年二月至大梁尋還洛陽矯稱契丹主命以從益知南朝軍國事召己赴恆州此矯契丹主兀欲之命也兀欲時尚在恆州恆戶登翻徽陵唐明宗陵梓宮所窆之所謂之下宮至大梁翰立以為帝帥諸酋長拜之帥讀曰率酋慈秋翻長知兩翻又以禮部尚書王松御史中丞趙遠為宰相前宣徽使甄城翟光鄴為樞密使甄當作鄄音吉掾翻甄城漢古縣也自唐以來帶濮州左金吾大將軍王景崇為宣徽使以北來指揮使劉祚權侍衛親軍都指揮使充在京巡檢北來謂先從契丹主自北而來者徽之子也王徽相唐僖宗百官謁見淑見賢遍翻淑泣曰吾母子單弱如此而為諸公所推是禍吾家也翰留燕兵千人守諸門為從益宿衛燕於賢翻下同壬寅翰及劉晞辭行先是劉晞棄洛陽奔大梁遣使召高行周於宋州高行周唐明宗親將時帥歸德王淑欲以舊恩召之為衛武行德並人必亦少在唐明宗麾下淑懼召大臣謀之曰吾母子為蕭翰所逼分當滅亡分扶問翻下處分同諸公無罪宜早迎新主以帝新舉大號擁兵南來將有中國故謂之新主勿以吾母子為意衆感其言皆未忍叛去或曰今集諸營不減五千與燕兵併力堅守一月北救必至北救謂契丹之救也吾母子亡國之餘後唐既亡惟王淑母子在耳故自謂然不幸至此死生惟人所裁若新主見察當知我無所負今更為計畫則禍及他人闔城塗炭終何益乎衆猶欲拒守三司使文安劉審交曰余燕人豈不為燕兵計文安漢縣唐屬莫州以戰國七雄有國之大界言則唐之瀛莫皆燕之南界以唐諸道節度言之則瀛莫盧龍巡屬也故劉審交家於文安自謂燕人今城中大亂之餘公私窮竭遺民無幾汴城經張彥澤剽掠契丹又席卷而北故云然幾居豈翻無噍類矣願諸公勿復言一從太處分復扶又翻噍才笑翻處昌呂翻乃用趙遠翟光鄴策稱梁王知軍國事從益本爵許王以稱號於大梁自稱梁王是已建國更號矣今既奉表迎漢何為又更國號是當時議者禍之也請早赴京師仍出居私第帝集㣥臣庭議進取甲辰帝至晉州帝集㣥臣庭議進取契丹主兀欲以契丹主德光有子在國己以兄子襲位又無述律太后之命述律太后兀欲祖母也亶內不自安初契丹主阿保機卒於勃海述律太后殺酋長及諸將凡數百人事見二百七十五卷唐明宗天成元年二月復扶又翻酋長諸將懼死乃謀奉契丹主兀欲勒兵北歸契丹主以安國節度使麻答為中京留守薛史曰麻答耶律德光之從弟其父曰薩剌阿保機時自蕃中奔唐莊宗尋奔梁莊宗平梁獲之磔於市晉文武官及士卒悉留於恆州獨以翰林學士徐台符李浣及後宮宦者教坊人自隨留文武官而以宮女宦官聲樂自隨史言兀欲無遠略乙巳發真定恆州建真定府帝集㣥臣庭議進取帝之即位也絳州刺史李從朗與契丹將成霸卿等拒命成姓也何氏姓苑本自周文王子成伯之後周有成肅公又楚令尹子玉封於成是為成得臣其後亦以成為氏未下護國軍河中府時未得河中白文珂領節也珂丘何翻命諸軍四布而勿攻以利害諭之戊申從朗舉城降帝命親將分護諸門士卒一人毋得入恐其入城剽掠帝集㣥臣庭議進取辛亥帝至陝州趙暉自御帝馬而入壬子至石壕九域志陝州陝縣有石壕鎮汴人越鄭洛而來迎可以見其苦契丹之虐政徯漢氏之來蘇惜乎卒無以副其望也帝集㣥臣庭議進取六月甲寅朔蕭翰至恆州與麻答以鐵騎圍張礪之第礪方臥病出見之翰數之曰汝何故言於先帝云胡人不可以為節度使張礪言見二百八十五卷晉齊王開運三年數所具翻吾為宣武節度使且國舅也汝在中書乃帖我又先帝留我守汴州見上卷是年三月處昌呂翻汝以為不可又譖我及解里於先帝云解里好掠人財我好掠人子女好呼到翻今我必殺汝命鎖之礪抗聲曰此皆國家大體吾實言之欲殺即殺奚以鎖為麻答以大臣不可專殺力救止之翰乃釋之是夕礪憤恚而卒恚於避翻崔廷勳見麻答趨走拜起跪而獻酒麻答踞而受之史言張礪抗直而蕭翰不敢殺崔廷勳過恭而麻答不為禮帝集㣥臣庭議進取乙卯帝至新安新安縣屬西京河南府九域志在京西七十里帝集㣥臣庭議進取吳越忠獻王弘佐卒年二十倧徂冬翻帝集㣥臣庭議進取丙辰帝至洛陽入居宮中汴州百官奉表來迎詔諭以受契丹補署者皆勿自疑聚其告牒而焚之趙遠更名上交避帝名也更工衡翻命鄭州防禦使郭從義先入大梁清宮密令殺李從益及王淑淑且死曰吾兒為契丹所立何罪而死何不留之使每歲寒食以一盂麥飯灑明宗陵乎五代會要曰人君奉先之道無寒食野祭近代莊宗每年寒食出祭謂之破散故襲而行之歐陽修曰寒食野祭而焚紙錢中國幾何其不為夷狄矣按唐開元敕寒食上墓禮經無文近世相傳寖以成俗宜許上墓同拜掃禮蓋唐許士庶之家行之而人君無此禮也為漢祖者待李從益以不死可也殺之過矣帝集㣥臣庭議進取戊午帝發洛陽樞密院吏魏仁浦自契丹逃歸見於鞏見賢遍翻九域志鞏縣屬西京在京東一百一十里郭威問以兵數及故事仁浦強記精敏威由是親任之仁浦衛州人也帝集㣥臣庭議進取辛酉汴州百官竇貞固等迎於滎陽滎陽縣屬鄭州自鞏縣東至滎陽一百九十里甲子帝至大梁晉之藩鎮相繼來降帝集㣥臣庭議進取丙寅吳越王弘倧襲位帝集㣥臣庭議進取戊辰帝下詔大赦凡契丹所除節度使下至將吏各安職任不復變更復扶又翻復以汴州為東京契丹廢東京為汴州見上卷是年正月仍稱天福年曰余未忍忘晉也復青襄汝三節度晉蓋以楊光遠反廢平盧軍以安從進反廢山南東道也汝州未嘗為節鎮恐是安州以李金全反廢安遠軍也然契丹入汴之後嘗以楊光遠子承信為平盧節度使蓋漢自以繼晉而興革契丹之政不以為著令也壬申以北京留守崇為河東節度使同平章事帝集㣥臣庭議進取契丹述律太后聞契丹主自立大怒發兵拒之契丹主以偉王為前鋒相遇於石橋胡嶠入遼録曰兀欲及述律戰于沙河石橋蓋沙河之橋也南則姚家洲北則宣化館至西樓晉侍衛馬軍都指揮使李彥韜從晉主北遷見上卷本年正月太后以為排陳使陳讀曰陳彥韜迎降於偉王太后兵由是大敗契丹主幽太后於阿保機墓胡嶠入遼録曰兀欲囚述律后於撲馬山又行三日始至西樓歐史曰契丹於阿保機墓置祖州胸奴須知祖州東至上京五十里上京西樓也今並録之若其地名之同異道里之遠近必親歷然後能審其是自稱天授皇帝以高勳為樞密使契丹主慕中華風俗多用晉臣而荒于酒色輕慢諸酋長由是國人不附諸部數叛數所角翻興兵誅討故數年之間不暇南寇史言中國經喪亂之後由此得稍自安集帝集㣥臣庭議進取初契丹主德光命奉國都指揮使南宮王繼弘南宮縣屬冀州九域志在州西南六十二里彰德節度使高唐英善待之高唐英契丹所署也見上卷是年四月相息亮翻唐英以鎧仗給之倚信如親戚唐英聞帝南下舉鎮請降使者未返繼弘暉殺唐英繼弘自稱留後遣使告云唐英反覆詔以繼弘為彰德留後庚辰以暉為磁州刺史磁牆之翻安國節度使高奉明聞唐英死心不自安請於麻答署馬步都指揮使劉鐸為節度副使知軍府事身歸恆州邢相既不能守恆州安能孤立哉為諸將逐麻答張本帝集㣥臣庭議進取帝遣使告諭荊南高從誨上表賀且求郢州帝不許及加恩使至拒而不受自唐以來新君踐阼則遣使加恩於諸鎮使疏吏翻帝集㣥臣庭議進取唐主聞契丹主德光卒蕭翰棄大梁去下詔曰乃眷中原本朝故地唐主自謂出於吳王恪故云然朝直遙翻章十二行本李上有同平章事四字乙十一行本同孔本同金全為北面行營招討使李金全晉將也奔唐見二百八十二卷晉高祖天福五年聞帝已入大梁遂不敢出兵帝集㣥臣庭議進取秋七月甲午以馬希廣為天策上將軍武安節度使江南諸道都統兼中書令封楚王因即位加恩遂命馬希廣以其父兄官爵帝集㣥臣庭議進取或傳趙延壽已死郭威言於帝曰趙匡贊契丹所署見上卷本年正月宜遣使弔祭因起復移鎮彼既家國無歸父死虜中無可歸之家契丹北去無可歸之國從之會鄴都留守天雄節度使兼中書令杜重威天平節度使兼侍中李守貞皆奉表歸命重威仍請移他鎮歸德節度使兼中書令高行周入朝丙申徙重威為歸德節度使以行周代之杜重威尋不受代遂命高行周攻之加兼中書令為李守貞據河中張本後二年延壽始卒於契丹史明傳者之妄帝集㣥臣庭議進取吳越王弘倧以其弟台州刺史弘俶同參相府事俶昌六翻帝集㣥臣庭議進取李達以其弟通知福州留後李仁達降唐唐賜名弘義編之屬籍及其叛唐為唐所攻求救於吳越而弘字犯吳越諱改名為達其弟先名弘通亦止名通弘倧承制加達兼侍中更其名曰孺贇更工衡翻既而孺贇悔懼悔其來且懼死也求歸福州進思為之請弘倧從之為于偽翻為李孺贇叛誅胡進思不自安張本帝集㣥臣庭議進取杜重威自以附契丹負中國事見二百八十五卷晉齊王開運三年及移鎮制下復拒而不受遣其子弘璲質於麻答以求援璲音遂質音致趙延壽有幽州親兵二千在恆州趙延壽為契丹主兀欲鎖之北去其親兵留恆州恆戶登翻重威請以守魏為張璉助杜重威堅守張本將即亮翻閏月庚午詔削奪重威官爵以高行周為招討使鎮寧節度使慕容彥超副之以討重威為慕容彥超挾勢陵轢高行周將帥不和張本帝集㣥臣庭議進取辛未楊邠郭威王章皆為正使帝即位於太原以楊邠權樞密使郭威權樞密副使王章權三司使今皆為正使公私匱竭北來兵與朝廷兵合頓增數倍北來兵謂從帝及史弘肇自太原來者朝廷兵謂晉朝舊兵省無益之費以奉軍用度克贍帝集㣥臣庭議進取庚辰制建宗廟太祖高皇帝世祖光武皇帝皆百世不遷又立四親廟追尊諡號五代會要追尊高祖湍明元皇帝廟號文祖曾祖昂恭僖皇帝廟號德祖祖僎昭獻皇帝廟號翼祖考琠章聖皇帝廟號顯祖帝集㣥臣庭議進取麻答貪猾殘忍民間有珍貨美婦女必奪取之又捕村民誣以為盜披面抉目斷腕抉於決翻斷音短下即斷同腕烏貫翻焚炙而殺之欲以威衆常以其具自隨具謂披面抉目斷腕焚炙之具章十二行本右下有前後二字乙十一行本同懸人肝膽手足飲食起居於其間語笑自若出入或被黃衣用乘輿服御物被皮義翻乘繩證翻曰茲事漢人以為不可吾國無忌也又以宰相員不足乃牒馮道判弘文館李嵩判史館和凝判集賢劉昫判中書其僭妄如此宰相分判須降制敕而麻答以牒行之史言其僭妄無所容貸故市肆不擾常恐漢人妄章十二行本妄作亡乙十一行本同孔本同張校同退齋校同去謂門者曰漢有窺門者即斷其首以來麻答遣使督運於洺州洺州防禦使薛懷讓聞帝入大梁殺其使者舉州降帝遣郭從義將兵萬人會懷讓攻劉鐸於邢州不克劉鐸為契丹守九域志洺州西北至邢州九十里麻答遣其將楊安及前義武節度使李殷將千騎攻懷讓於洺州懷讓嬰城自守安等縱兵大掠於邢洺之境契丹所留兵不滿二千謂留恆州之兵也收其餘以自入麻答常疑漢兵且以為無用稍稍廢省又損其食以飼胡兵飼祥吏翻衆心怨憤聞帝入大梁皆有南歸之志前潁州防禦使何福進控鶴指揮使太原李榮潛結軍中壯士數十人謀攻契丹然畏契丹尚強猶豫未發會楊袞楊安等軍出楊袞赴魏州楊安攻洺州福進等遂決計約以擊佛寺鍾為號約漢兵聞佛寺擊鍾則齊出攻契丹然佛寺晨昏擊鍾食時擊鍾日日然也此必以未發前預相戒約以次日食時聞佛寺鍾聲而俱發耳辛巳契丹主兀欲遣騎至恆州召前威勝節度使兼中書令馮道樞密使李嵩左僕射和凝等會葬契丹主德光於木葉山道等未行食時鍾聲發漢兵奪契丹守門者兵擊契丹殺十餘人因突入府中李榮先據甲庫悉召漢兵及市人以鎧仗授之焚牙門與契丹戰榮召諸將並力護聖左廂都指揮使恩州團練使白再榮恩州時屬南漢境白再榮遙領也匿於別室軍吏以佩刀決幕引其臂白再榮以幕自蔽軍吏決幕引出之諸將繼至煙火四起鼓譟震地麻答等大驚載寶貨家屬走保北城而漢兵無所統一貪狡者乘亂剽掠懦者竄匿剽匹妙翻八月壬午朔契丹自北門入恆州牙城北門也漢民死者二千餘人前磁州刺史李穀恐事不濟請馮道李嵩和凝至戰所慰勉士卒士卒見道等至爭自奮微李穀之謀漢兵殆矣有村民數千譟於城外欲奪契丹寶貨婦女契丹懼而北遁麻答劉晞崔廷勳皆奔定州恆州東北至定州一百二十里忠即郎五也郎五初鎮澶州而兵亂契丹又使鎮定州馮道等四出安撫兵民衆推道為節度使道曰我書生也當奏事而已宜擇諸將為留後時李榮功最多李榮先據甲庫授兵與契丹戰諸將皆繼其後故論功最多乃以再榮權知留後具以狀聞且請援兵帝遣左飛龍使李彥從將兵赴之唐有飛龍使及小馬坊使梁改小馬坊為天驥後唐復舊長興元年改飛龍院為左飛龍院小馬坊為右飛龍院宋太平興國三年改左右天廣既坊雍熙二年又改左右騏驥院使白再榮貪昧猜忌諸將奉國軍章十二行本軍作廂乙十一行本同主華池王饒晉氏南渡以後南北兵爭各置軍主隊主之官隋唐以下無是也此書奉國軍主通鑑蓋因舊史成文猶言軍帥耳非官名也慶州華池縣隋所置宋熙寧中省華池縣為寨鎮屬合水縣其地在慶州之東南宋白曰華池本漢歸德縣地即洛源縣隋仁壽二年於今縣東北二里庫多汗故城又置華池縣南有華池水故名詐稱足疾據東門樓嚴兵自衛司天監趙延乂善於二人往來諭釋始得解再榮以李嵩和凝久為相家富晉高祖入洛即以李嵩為相天福五年和凝為相嵩凝各以家財與之又欲殺嵩凝以滅口李穀往見再榮責之曰國亡主辱公輩握兵不救今僅能逐一虜將鎮民死者幾三千人虜將謂麻答恆舊鎮州也才得脫死遽欲殺宰相新天子若詰公專殺之罪詰去吉翻公何辭以對再榮懼而止又欲率民財以給軍穀力爭之乃止漢人嘗事麻答者再榮皆拘之以取其財恆人以其貪虐謂之白麻答言其貪虐似麻答特姓白耳然再榮以貪虐殖財郭威入汴竟以多財殞其身天道好還蓋昭昭矣楊袞至邢州聞麻答被逐即日北還楊安亦遁去李殷以其衆來降帝集㣥臣庭議進取庚寅以薛懷讓為安國節度使劉鐸聞麻答遁去舉邢州降懷讓詐云巡檢引兵向邢州鐸開門納之懷讓殺鐸以克復聞朝廷知而不問帝集㣥臣庭議進取辛卯復以恆州順國軍為鎮州成德軍改恆州及順國軍見二百八十卷晉高祖天福七年帝集㣥臣庭議進取乙未以白再榮為成德留後踰年始以何福進為曹州防禦使李榮為博州刺史踰年之後乃知逐麻答者二人之功始賞之此事與晉高祖天福二年馬萬盧順密之事同帝集㣥臣庭議進取敕盜賊毋問贓多少皆抵死時四方盜賊多朝廷患之故重其法仍分命使者逐捕蘇逢吉自草詔意云應賊盜並四鄰同保皆全族處斬處昌呂翻衆以為盜猶不可族況鄰保乎逢吉固爭不得已但省去全族字去羌呂翻由是捕賊使者張令柔殺平陰十七村民劉昫曰平陰漢肥冢縣隋為平陰縣屬濟州唐屬鄆州九域志平陰縣在鄆州東北一百二十里項安世家説曰古無村名今之村即古之鄙野也凡地在國中邑中則名之為都都美也言其人物衣制皆雅麗也凡言美者曰都曰子都都人士車騎甚都是也郊外則名之為野為鄙言其朴拙無文也曰鄙者如列子所謂鄭之鄙人是也故古語謂美好為都粗陋為鄙本此為義也隋世已有村名唐令在田野者為村置村正一人則村之為義明矣逢吉為人文深好殺好呼到翻在河東幕府謂為河東節度判官時也逢吉盡殺獄囚還報靜獄者使之決遣繫囚而蘇逢吉盡殺之以為靜朝廷草創帝悉以軍旅之事委楊邠郭威百司庶務委逢吉及蘇禹圭二相決事皆出胸臆不拘舊制雖事無留滯而用捨黜陟惟其所欲帝方倚信之無敢言者逢吉尤貪詐公求貨財無所顧避繼母死不為服庶兄自外至不白逢吉而見諸子逢吉怒密語郭威以他事杖殺之語牛倨翻蘇逢吉之好殺固天道所不容況怙勢而殺其兄乎帝集㣥臣庭議進取楚王希廣庶弟天策左司馬希崇性狡險陰遺兄希萼書遺唯季翻言劉彥瑫違先王之命先王謂楚王殷也殷遺命見二百七十七卷唐明宗長興元年以激怒之希萼兄也希廣弟也捨兄立弟故云然長知兩翻少詩詔翻希萼自永州來奔喪歐史曰希萼自朗州來奔喪通鑑於是年正月楚王希範之卒將佐議所立亦言希萼知永州事但希萼為武平節度使武平軍置於朗州下文言希萼求還朗州又希廣欲分潭朗而治則朗州為是前此作永州誤也乙巳至趺石趺甫無翻彥瑫白希廣遣侍從都指揮使周廷誨等將水軍逆之從才用翻命永州將士皆釋甲而入館希萼於碧湘宮館古玩翻今潭州西北出有碧湘門馬氏蓋立宮於是門之側成服於其次不聽入與希廣相見希萼求還朗州還從宣翻又如字周廷誨勸希廣殺之希廣曰吾何忍殺兄馬希廣其後唐閔帝之儔乎治直之翻乃厚贈希萼遣還朗州希崇常為希萼詗希廣為于偽翻詗古永翻又翾正翻語言動作悉以告之約為內應史言希萼之攻潭州希崇啓之也帝集㣥臣庭議進取契丹之滅晉也驅戰馬二萬歸其國事見上卷是年正月詔市士民馬於河南諸道不經剽掠者剽匹妙翻帝集㣥臣庭議進取制以錢弘倧為東南兵馬都元帥鎮海鎮東節度使兼中書令吳越王帝集㣥臣庭議進取高從誨聞杜重威叛發水軍數千襲襄州以漢兵方北討魏州未暇南救也又寇郢州刺史尹實大破之九域志荊南府北至襄州四百四十里東至郢州三百二十里附于唐蜀高從誨求郢州不許見上六月初荊南介居湖南嶺南福建之間此語專為三道入貢過荊南發自武信王季興時諸道入貢過其境者多掠奪其貨幣過音戈及諸道移書詰讓或加以兵不得已復歸之詰去吉翻復扶又翻曾不為愧及從誨立唐晉契丹漢更據中原更工衡翻南漢閩吳蜀皆稱帝從誨利其賜豫豫讀曰與所向稱臣諸國賤之謂之高無賴俚俗語謂奪攘苟得無愧恥者為無賴帝集㣥臣庭議進取唐主以太傅兼中書令宋齊丘為鎮南節度使帝集㣥臣庭議進取南漢主恐諸弟與其子爭國殺齊王弘弼貴王弘道定王弘益辨王弘濟同王弘簡益王弘建恩王弘偉宜王弘照盡殺其男納其女充後宮劉晟殘同氣而瀆天倫桀紂之虐不如是之甚也飾以珠寶設鑊湯鐵牀刳剔等刑號生地獄嘗醉戲以瓜置樂工之頸試劍遂斷其頭歐史伶人謂之尚玉樓即被斬之樂工也斷音短帝集㣥臣庭議進取初帝與吏部尚書竇貞固俱事晉高祖雅相知重及即位欲以為相問蘇逢吉其次誰可相者逢吉與翰林學士李濤善因薦之曰昔濤乞斬張彥澤事見二百八十三卷晉高祖天福七年嘗重之此可相也會高行周慕容彥超共討杜重威於鄴都遣二將討杜重威事始上閏七月行周欲緩之以待其弊行周女為重威子婦彥超揚言行周以女故愛賊不攻由是二將不協慕容彥超既以帝同産之親而陵高行周又誣行周以婚姻之故而緩賊故不協欲自將擊重威意未決濤上疏請親征帝大悅以濤有宰相器九月甲戌加逢吉左僕射兼門下侍郎蘇禹圭右僕射兼中書侍郎貞固司空兼門下侍郎濤戶部尚書兼中書侍郎並同平章事竇貞固以司空拜相而書於二僕射之次者二蘇舊相貞固則新相也戊寅詔幸澶魏勞軍澶時連翻勞力到翻以皇子承訓為東京留守帝集㣥臣庭議進取馮道李嵩和凝自鎮州還白再榮等既逐契丹馮道等乃得免而還還從宣翻又如字己卯以嵩為太子太傅凝為太子太保帝集㣥臣庭議進取庚辰帝發大梁帝集㣥臣庭議進取晉昌節度使趙匡贊是年秋七月趙匡贊自河中徙長安冬十月遣使降蜀請自終南山路出兵應援終南山路子午谷路也帝集㣥臣庭議進取戊戌帝至鄴都城下舍於高行周營人主親戎不為御營而舍於元帥之營有入韓信壁奪軍之意高行周心迹無他故不發城中食未盡急攻徒殺士卒未易克也易以豉翻不若緩之彼食盡自潰帝然之慕容彥超數因事陵轢行周數所角翻轢郎擊翻行周泣訴於執政掬糞壤實其口示受陵辱而不敢言也帝深知彥超之曲猶命二臣和解之又召彥超於帳中責之不明底彥超之罪牽於愛也杜重威聲言車駕至即降帝遣給事中陳觀往諭指重威復閉門拒之復扶又翻下同城中食浸竭將士多出降者慕容彥超固請攻城帝從之丙午親督諸將攻城自寅至辰士卒傷者萬餘人死者千餘人不克而止彥超乃不敢復言死傷者衆而城不克則高行周持久以弊之之説為是慕容彥超之語遂塞初契丹留幽州兵千五百戍大梁即蕭翰所留也見上五月或告幽州兵將為變帝盡殺之於繁臺之下繁臺在大梁丁度曰繁臺本師曠吹臺梁孝王增築曰繁臺薛史曰繁臺即梁王吹臺其後有繁氏居其側里人乃以姓呼之張璉將幽州兵二千助重威拒守張璉入鄴都助重威事始上七月許以不死璉曰繁臺之卒何罪而戮今守此以死為期耳由是城久不下十一月丙辰內殿直韓訓獻攻城之具帝曰城之所恃者衆心耳衆心苟離城無所保用此何為始用高行周之言杜重威之叛觀察判官金鄉王敏屢泣諫不聽金鄉縣唐初屬濟州後屬兗州九域志屬濟州在州東南九十里甲戌遣敏奉表出降乙亥重威子弘璉來見見賢遍翻下同丙子妻石氏來見石氏即晉之宋國長公主也長知兩翻帝復遣入城丁丑重威開門出降城中餒死者什七八存者皆尩瘠無人狀尩烏黃翻瘠秦昔翻張璉先邀朝廷信誓詔許以歸鄉里及出降殺璉等將校數十人縱其士卒北歸將出境大掠而去幽州兵將出魏州之境去漢兵既遠心無所憚遂大掠逞其忿而去將即亮翻校戶教翻郭威請殺重威牙將百餘人並重威家資籍之以賞戰士從之以重威為太傅兼中書令楚國公重威每出入路人往往擲瓦礫詬之以其歷藩鎮則貪黷無厭為將則賣國殄民也為殺杜重威市人噉其肉張本詬苦候翻又許候翻臣光曰漢高祖殺幽州無辜千五百人非仁也誘張璉而誅之非信也杜重威罪大而赦之非刑也仁以合衆信以行令刑以懲姦失此三者何以守國其祚運之不延也宜哉帝集㣥臣庭議進取高行周以慕容彥超在澶州固辭鄴都澶魏相去百五十里行周彥超既交惡接境而處必不相安故力辭己卯以忠武節度使史弘肇領歸德節度使兼侍衛馬步都指揮使義成節度使劉信領忠武節度使兼侍衛馬步副都指揮使徙彥超為天平節度使並加同平章事帝集㣥臣庭議進取吳越王弘倧大閲水軍賞賜倍於舊胡進思固諫弘倧怒投筆水中曰吾之財與士卒共之奚多少之限邪為胡進思廢弘倧張本帝集㣥臣庭議進取十二月丙戌帝發鄴都發自鄴都而歸大梁帝集㣥臣庭議進取蜀主遣雄武都押牙吳崇惲雄武都押牙秦州都押牙也惲於粉翻處昌呂翻庚寅以山南西道節度使兼中書令張虔釗為北面行營招討安撫使雄武節度使何重建副之張虔釗以潞王之亂攻鳳翔而敗降蜀何重建以契丹入中國降蜀故蜀主用之以經略岐雍重直龍翻共將兵五萬虔釗出散關重建出隴州以擊鳳翔既遣使招侯益又隨之以兵臨脅之以援長安從趙匡贊之請也旌旗數十里帝集㣥臣庭議進取辛卯皇子開封尹承訓卒承訓孝友忠厚達於從政人皆惜之史言承訓死而漢祚蹙帝集㣥臣庭議進取癸巳帝至大梁帝集㣥臣庭議進取威武節度使李孺贇與吳越戍將鮑修讓不協謀襲殺修讓復以福州降唐修讓覺之引兵攻府第復扶又翻府第福州府署也是日殺孺贇夷其族李仁達據福州事始見二百八十五卷晉齊王開運二年史言狂狡反覆者終死於人手帝集㣥臣庭議進取乙未追立皇子承訓為魏王帝集㣥臣庭議進取侯益請降於蜀使吳崇惲持兵籍糧帳西還還從宣翻又如字與趙匡贊同上表請出兵平定關中帝集㣥臣庭議進取己酉鮑修讓傳李孺贇首至錢塘吳越王弘倧以丞相山陰吳程知威武節度事帝集㣥臣庭議進取吳越王弘倧性剛嚴憤忠獻王弘佐時容養諸將政非己出按歐史吳越王錢鏐以徐綰之亂使子元瓘質於宣州以胡進思戴惲等自隨元瓘嗣立用進思為大將元瓘卒而弘佐立進思以舊將自待甚見尊禮及倧立頗卑侮之進思不能平誅杭越侮法吏三人侮當作舞內牙統軍使胡進思恃迎立功干預政事弘倧惡之惡烏路翻欲授以一州欲奪其兵權而遠之進思有所謀議弘倧數面折之進思還家設忠獻王位被髮慟哭數所角翻折之舌翻被皮義翻吏按之引人所市肉近千斤近其靳翻弘倧問進思牛大者肉幾何對曰不過三百斤弘倧曰然則吏妄也命按其罪進思拜賀其明弘倧曰公何能知其詳進思踧踖對曰踧子六翻踖子昔翻臣昔未從軍亦嘗從事於此進思以弘倧為知其素業故辱之益恨怒此褚遂良所以戒唐太宗窮張玄素也見上七月謂復欲降唐也進思愈不自安弘倧與內牙指揮使何承訓謀逐進思又謀於內都監使水丘昭券按薛史吳越王鏐母水丘氏昭券蓋外戚也不如容之弘倧猶豫未決承訓恐事泄反以謀告進思古人有言需者事之賊弘倧猶豫不決故何承訓懼而生心泄息列翻庚戌晦弘倧夜宴將吏進思疑其圖己與其黨謀作亂帥親兵百人帥讀曰率下同戎服執兵入見於天策堂曰老奴無罪王何故圖之弘倧叱之不退左右持兵者皆憤怒弘倧猝愕不暇發言乘左右之憤怒而用之以順討逆何畏乎胡進思是以人貴於有膽決進思鎖其門矯稱王命告中外云猝得風疾傳位於同參相府事弘俶進思因帥諸將迎弘俶于私第且召丞相元德昭德昭至立於簾外不拜曰俟見新君進思亟出褰簾褰起虔翻德昭乃拜進思稱弘倧之命承制授弘俶鎮海鎮東節度使兼侍中弘俶曰能全吾兄乃敢承命不然當避賢路進思許之弘俶始視事進思殺水丘昭券及進侍鹿光鉉進侍吳越所置官在王左右者也弘倧之舅也進思之妻曰他人猶可殺昭券君子也奈何害之史言婦人智識有過於丈夫者帝集㣥臣庭議進取是歲唐主以羽林大將軍王延政為安化節度使鄱陽王鎮饒州唐蓋置安化軍於饒州王延政降唐見二百八十四卷晉齊王開運二年南唐之保大三年也乾祐元年戊申九四八帝集㣥臣庭議進取春正月乙卯大赦改元帝集㣥臣庭議進取帝以趙匡贊侯益與蜀兵共為寇患之會回鶻入貢訴稱為黨項所阻自唐長興以來西路黨項部族劫掠使臣及外域進奉唐雖遣兵討之莫能遏止黨底朗翻詔左衛大將軍王景崇將軍齊藏珍將禁軍數千赴之因使之經略關西因應接回鶻使者之名以出師實則經略關右晉昌節度判官李恕久在趙延壽幕下延壽使之佐匡贊匡贊將入蜀恕諫曰燕王入朝章十二行本朝作胡乙十一行本同孔本同豈所願哉言趙延壽受囚鎖於契丹而入北方務招懷若謝罪歸朝必保富貴入蜀非全計也蹄涔不容尺鯉劉曜之言涔鋤針翻蹄涔謂牛馬所踐之迹因而渟水處也非盈尺之鯉所可容身以喻蜀小國勢不能容趙匡贊匡贊乃遣恕奉表請入朝景崇等未行而恕至帝問恕匡贊何為附蜀對曰匡贊自以身受虜官謂先受契丹主耶律德光之命鎮河中府父謂趙延壽故附蜀求苟免耳臣以為國家必應存撫故遣臣來祈哀帝曰匡贊父子本吾人也不幸陷虜今延壽方墜檻穽趙延壽為契丹所鎖事見去年五月即聽其入朝侯益亦請赴二月四日聖壽節上壽五代會要帝生於唐乾寧二年二月四日帝召入臥內敕之曰匡贊益之心皆未可知汝至彼彼已入朝則勿問若尚遷延顧望當以便宜從事帝集㣥臣庭議進取己未帝更名皓更工衡翻皓古老翻帝集㣥臣庭議進取以前威勝節度使馮道為太師帝集㣥臣庭議進取壬戌吳越王弘俶遷故王弘倧於衣錦軍私第遷於臨安私第也潛戒之曰若有非常處分皆非吾意當以死拒之處昌呂翻分扶問翻弘俶知胡進思必謀殺弘倧故密約敕薛溫使知所備為進思害弘倧而不克張本帝集㣥臣庭議進取帝自魏王承訓卒悲痛過甚甲子始不豫帝集㣥臣庭議進取趙匡贊不俟李恕返命已離長安丙子入見離力智翻見賢遍翻王景崇等至長安聞蜀兵已入秦川自大散關以北達于岐雍夾渭川南北岸沃野千里謂之秦川發本道及趙匡贊牙兵千餘人同拒之本道謂晉昌一道欲文其面微露風旨軍校趙思綰首請自文其面以帥下文其面以軍號則亡逸無所至校戶教翻帥讀曰率齊藏珍竊言曰思綰凶暴難制不如殺之景崇不聽思綰魏州人也為趙思綰據長安反張本蜀李廷圭將至長安聞趙匡贊已入朝欲引歸王景崇邀之敗廷圭於子午谷敗補邁翻下追敗同張虔釗至寶雞諸將議不協按兵未進侯益聞廷圭西還因閉壁拒蜀兵虔釗勢孤引兵夜遁景崇帥鳳翔隴邠涇鄜坊之兵追敗蜀兵於散關俘將卒四百人李廷圭張虔釗二軍皆蜀主去年十二月所遣帥讀曰率鄜音夫敗補邁翻帝集㣥臣庭議進取丁丑帝大漸楊邠忌侍衛馬軍都指揮使忠武節度使劉信立遣之鎮劉信以從弟之親典侍衛故楊邠忌之遣就鎮許州雨泣而去涕泣如雨謂之雨泣帝召蘇逢吉楊邠史弘肇郭威入受顧命曰余氣息微不能多言承祐幼弱後事託在卿輩又曰善防重威諭以誅杜重威也殂于萬歲殿年五十四薛史梁受禪以大梁萬歲堂為萬歲殿庚辰下詔稱重威父子因朕小疾謗議搖衆並其子弘璋弘璉弘璨皆斬之晉公主及內外親族一切不問晉公主石氏杜重威之妻磔陟格翻市人爭啖其肉啖徒濫翻怨杜重威賣國引虜入汴而都人被其毒也吏不能禁斯須而盡二月辛巳朔立皇子左衛大將軍大內都點檢承祐為周王同平章事有頃發喪宣遺制令周王即皇帝位時年十八帝集㣥臣庭議進取蜀韓保貞龐福誠引兵自隴州還韓保貞亦蜀主去年十二月所遣還從宣翻又如字是日保貞等至秦州分兵守諸門及衢路重建遂入于蜀要一遙翻天福十二年何重建附蜀至是蜀兵劫與俱西帝集㣥臣庭議進取丁亥尊皇后曰皇太后帝集㣥臣庭議進取朝廷知成德留後白再榮非將帥才庚寅以前建雄留後劉在明代之帝集㣥臣庭議進取癸巳大赦即位十三日而肆赦帝集㣥臣庭議進取吳越內牙指揮使何承訓復請誅胡進思及其黨復扶又翻吳越王弘俶惡其反覆且懼召禍乙未執承訓斬之惡烏路翻何承訓泄弘倧之謀以陷君於幽廢而又請弘俶誅胡進思誰敢復與之謀乎進思屢請殺廢王弘倧以絶後患弘俶不許進思詐以王命密令薛溫害之溫曰僕受命之日不聞此言不敢妄發進思乃夜遣其黨方安二人踰垣而入弘倧闔戶拒之大呼求救呼火故翻溫聞之率衆而入斃安等于庭中入告弘俶自臨安入錢唐告其事曰全吾兄汝之力也弘俶畏忌進思曲意下之下戶嫁翻進思亦內憂懼未幾疽發背卒幾居豈翻弘倧由是獲全帝集㣥臣庭議進取詔以王景崇兼鳳翔巡檢使景崇引兵至鳳翔侯益尚未行景崇以禁兵分守諸門或勸景崇殺益景崇以受先朝密旨密旨謂高祖臥內便宜從事之命也見上朝直遙翻下同或疑於專殺猶豫未決益聞之不告景崇而去景崇悔自詬詬古候翻又許候翻戊戌益入朝隱帝問何故召蜀軍對曰臣欲誘致而殺之帝哂之誘音酉哂矢忍翻笑不壞顏為哂帝集㣥臣庭議進取蜀張虔釗自恨無功癸卯至興州慙忿而卒自散關還至興州也張虔釗蓋不知可否不度利鈍而急於求功之人觀其攻王都於定州攻潞王於鳳翔皆急於求勝而敗可知已恚於避翻帝集㣥臣庭議進取侍衛馬步都指揮使同平章事史弘肇遭母喪不數日復出朝參復扶又翻居喪而經營起復已得罪於名教未起復而自出朝參雖史弘肇武人無識亦可見朝章之紊朝直遙翻章錫琛標點聶崇岐覆校
