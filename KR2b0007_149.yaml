body:
  text: 資治通鑑卷第一百四十九端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注梁紀五高祖武皇帝五天監十八年己亥五一九春正月甲申以尚書左僕射袁昂為尚令章十二行本令上有書字乙十一行本同孔本同退齋校同右僕射王暕為左僕射暕古限翻太子詹事徐勉為右僕射丁亥魏主下詔稱太后臨朝踐極歲將半紀胡后臨朝見上卷十四年以令宇內辛卯上祀南郊魏征西將軍章十二行本軍下有平陸文侯四字乙十二行本同孔本同張校同退齋校同張彞之子仲瑀上封事求銓削選格瑀音禹上時掌翻銓量也選須絹翻下入選應選同排抑武人不使豫清品於是喧謗盈路立榜大巷克期會集屠害其家彞父子晏然不以為意方羽林虎賁立榜克期之初魏朝既不為之嚴加禁遏縱彞父子欲以為意奈之何哉庚午羽林虎賁近千人賁音奔近其靳翻相帥至尚書省詬罵帥讀曰率詬戶遘翻又古侯翻求仲瑀兄左民郎中始均不獲尚書左民郎晉武帝置上下懾懼莫敢禁討張討作訶懾之涉翻遂持火掠道中薪蒿以杖石為兵器直造其第曳彞堂下捶辱極意章十二行本意下有唱呼動地四字乙十一行本同孔本同張校同退齋校同焚其第舍始均踰垣走復還拜賊造七到翻捶止蕊翻復扶又翻下不復誰復同請其父命賊就毆擊生投之火中仲瑀重傷走免彞僅有餘息言氣息奄奄僅未絶耳遠近震駭胡太后收掩羽林虎賁凶強者八人斬之其餘不復窮治治直之翻乙亥大赦以安之因令武官得依資入選識者知魏之將亂矣時官員既少少詩沼翻應選者多吏部尚書李韶銓注不行大致怨嗟更以殿中尚書崔亮為吏部尚書亮奏為格制不問士之賢愚專以停解月日為斷斷丁亂翻沈滯者皆稱其能沈持林翻亮甥司空咨議劉景安與亮書曰殷周以鄉孰貢士王制命鄉論秀士升之司徒曰選士司徒論秀士而升之學曰俊士謂賢良文學孝廉之舉也事見漢紀又置中正事見六十九卷魏文帝黃初元年應什收六七而朝廷貢才止求其文不取其理察孝廉唯論章句不及治道治直吏翻立中正不考才行空辨氏姓取士之途不博沙汰之理未精舅屬當銓衡宜改張易調行下孟翻屬之欲翻董仲舒曰譬如琴瑟不調必改而更張之不調謂不和也易調之調徒釣翻音調也如何反為停年格以限之天下士子誰復修厲名行哉行下孟翻亮復書曰汝所言乃有深致吾昨為此格有由而然古今不同時宜須異昔子産鑄刑書以救弊叔向譏之以正法復扶又翻左傳昭六年鄭人鑄刑書叔向詒子産書曰先王議事以制不為刑辟間之以義糾之以政行之以禮守之以信制為祿位以勸其從嚴斷刑罰以威其淫懼其未也故誨之以忠聳之以行教之以務使之以和臨之以敬涖之以強斷之以剛猶求聖哲之士明察之官忠信之長慈惠之師民於是可任使也而不生禍亂民知有辟則不忌其上並有爭心以徵於書而徼幸以成之弗可為矣亂獄滋豐賄賂並行終子之世鄭其敗乎復書曰僑不才不能及子孫吾以救世也何異汝以古禮難權宜哉難乃旦翻洛陽令代人薛琡魏書官氏志西方叱干氏後改為薛氏琡之六翻又音俶黎元之命繫於長吏若以選曹唯取年勞不簡能否義均行鴈次若貫魚行鴈貫魚皆以諭資次先後以序而進也上時掌翻長知兩翻選須絹翻行音戶剛翻一吏足矣數人而用何謂銓衡書奏不報後因請見復奏乞令王公貴臣薦賢以補郡縣見賢遍翻復扶又翻詔公卿議之事亦寢其後甄琛等繼亮為吏部尚書甄之人翻琛丑林翻利其便己踵而行之魏之選舉失人自亮始也初燕燕郡太守高湖奔魏事見一百一十一卷晉安帝隆安三年燕因肩翻考異曰李百藥北齊書作諡北史作謐今從之世居北邊遂習鮮卑之俗謐孫歡沈深有大志沈持林翻家貧執役在平城富人婁氏女見而奇之遂嫁焉始有馬得給鎮為函使凡書表皆函封函使者使奉函詣京師也使疏吏翻見張彞之死還家傾資以結客或問其故歡曰宿衛相帥焚大臣之第帥讀曰率考異曰北齊書云領軍張彞按彞未嘗為領軍故但云大臣朝廷懼其亂而不問為政如此事可知矣財物豈可常守邪歡與懷朔省事雲中司馬子如省事鎮吏也省悉景翻魏太宗永興二年置秀容郡及秀容縣世祖真君七年置肆州秀容郡屬焉史亦吏職也善無縣前漢屬鴈門郡後漢屬定襄郡拓跋氏置善無郡屬恆州李延壽曰秦漢置尉候官景之先有居此職者因氏焉廣寧郡魏收志屬朔州隋並入朔州善陽縣並以任俠雄於鄉里高歡事始此夏四月丁巳大赦五月戊戌魏以任城王澄為司徒京兆王繼為司空魏纍世強盛東夷西域貢獻不絶又立互市以致南貨至是府庫盈溢胡太后嘗幸絹藏藏徂浪翻命王公嬪主從行者百餘人各自負絹稱力取之稱尺證翻少者不減百餘匹少詩沼翻下同尚書令儀同三司李崇章武王融負絹過重顛仆於地崇傷腰融損足太后奪其絹使空出時人笑之融太洛之子也章武王太洛見一百三十二卷宋明帝泰始四年太后怪其少對曰臣兩手唯堪兩匹衆皆愧之時魏宗室權幸之臣競為豪侈高陽王雍富貴冠一國宮室園圃侔於禁苑僮僕六千伎女五百出則儀衛塞道路冠古玩翻塞悉則翻歸則歌吹連日夜一食直錢數萬李崇富埒於雍而性儉嗇嘗謂人曰高陽一食敵我千日埒力輟翻河間王琛每欲與雍爭富駿馬十餘匹皆以銀為槽窗戶之上玉鳳銜鈴金龍吐旆嘗會諸王宴飲酒器有水精鋒後漢書大秦國出水精以為宮室柱及食器一本鋒作鍾本草衍義曰馬腦非石非玉自是一類有紅白黑色三種亦有紋如纏絲者生西國玉石間王逸論或問玉符曰赤如雞冠黃如蒸栗白如脂肪黑如點漆玉之符也皆中國所無又陳女樂名馬及諸奇寶復引諸王歷觀府庫金錢繒布不可勝計復扶又翻勝音升顧謂章武王融曰不恨我不見石崇恨石崇不見我石崇事見八十一卷晉武帝太康三年歸而惋歎三章十二行本三上有臥疾二字乙十一行本同孔本同張校同退齋校同日惋烏貫翻京兆王繼聞而省之省悉景翻謂曰卿之貨財計不減於彼何為愧羡乃爾融曰始謂富於我者獨高陽耳不意復有河間繼曰卿似袁術在淮南不知世間復有劉備耳融乃笑而起物盛而衰固其理也史言魏君臣驕侈乃其衰亂之漸復扶又翻下無復司復同太后好佛營建諸寺無復窮已令諸州各建五級浮圖民力疲弊諸王貴人宦官羽林各建寺於洛陽相高以壯麗太后數設齋會施僧物動以萬計好呼到翻數所角翻施式豉翻賞賜左右無節所費不資而未嘗施惠及民府庫漸虛乃減削百官祿力祿在官所受之祿力在官所用白直也以為蕭衍常蓄窺覦之志覦音俞宜及國家強盛將士旅力早圖混一之功比年以來比毗至翻公私貧困宜節省浮費以周急務太后雖不能用常優禮之魏自永平以來天監七年魏改元永平役者多不過千人有司復借以修寺及供他役十餘年竟不能成起部郎源子恭上書以為廢經國之務資不急之費宜徹減諸役早圖就功使祖宗有嚴配之期孝經孔子曰孝莫大於嚴父嚴父莫大於配天昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝詔從之然亦不能成也魏人陳仲儒請依京房立準以調八音有司詰仲儒京房律準今雖有其器曉之者鮮詰去吉翻鮮息淺翻仲儒所受何師出何典籍仲儒對言性頗愛琴又嘗讀司馬彪續漢書見京房準術成數昞然司馬彪志曰京房六十律相生之法以上生下皆三生二以下生上皆三生四陽下生陰陰上生陽終於中呂而十二律畢矣中呂上生執始執始下生去滅上下相生終於南事呂而六十律畢矣夫十二律之變至於六十猶八卦之變至於六十四也宓犧作易紀陽氣之初以為律法建日冬至之聲以黃鍾為宮太簇為商姑洗為角林鍾為徵南呂為羽應鍾為變宮蕤賓為變徵此聲氣之元五音之正也故各終一日其餘以次運行當日者各自為宮而商徵以類從焉禮運曰五聲六律十二管還相為宮此之謂也以六十律分期之日黃鍾自冬至始及冬至而復陰陽寒燠風雨之占生焉於以檢攝㣥音考其高下苟非草木之聲則無所不合虞書曰律和聲此之謂也房又曰竹聲不可以度調故作準以定數準之狀如瑟長丈而十三弦隱間九尺以應黃鍾之律九寸中央一弦下有畫分寸以為六十律清濁之節房言律詳於劉歆所奏其術施行於史官候部用之律術曰陽以圓為形其性動陰以方為節其性靜動者數三靜者數二以陽生陰倍之以陰生陽四之皆三而一陽生陰曰下生陰生陽曰上生上生不得過黃鍾之清濁下生不得及黃鍾之數實皆參天兩地圓蓋方覆六耦承奇之道也黃鍾律呂之首而生十一律者也其相生也皆三分而損益之是故十二律之得十七萬七千一百四十七是為黃鍾之實又以二乘而三約之是為下生林鍾之實又以四乘而三約之是為上生太簇之實推此上下以定六十律之實以九三之數萬九千六百八十三為法律為寸於準為尺不盈者十之所得為分又不盈十之所得為小分以其餘正其強弱以黃鍾十七萬七千一百四十七下生林鍾黃鍾為宮太蔟商林鍾徵一日律九寸準九尺色育十七萬六千七百七十六下生謙待未知商謙待徵六日律八寸九分小分八微強準八尺九寸萬五千九百七十三執始十七萬四千七百六十二下生去滅執始為宮時息商去滅徵六日律八寸八分小分七大強準八尺八寸萬五千五百一十六丙盛十七萬二千四百一十下生安度丙盛為宮屈齊商安度徵六日律八寸七分小分六微弱準八尺七寸萬一千六百七十九分動十七萬八十九下生歸嘉分動為宮隨期商歸嘉徵六日律八寸六分小分四強準八尺六寸八千一百五十二質末十六萬七千八百下生否與質末為宮形晉商否與徵六日律八寸五分小分二微強準八尺五寸四千九百四十五大呂十六萬五千八百八十八下生夷則大呂為宮夾鍾商夷則徵八日律八寸四分小分三弱準八尺四寸五千五百八分否十六萬三千六百五十四下生解形分否為宮開時商解形徵八日律八寸三分小分一強準八尺三寸二千八百五十一凌陰十六萬一千四百五十二下生去南凌陰為宮族嘉商去南徵八日律八寸二分小分一弱準八尺二寸五百一十四少出十五萬九千二百八十下生分積少出為宮爭南商分積徵六日律八寸小分九強準八尺萬八千一百六十太簇十五萬七千四百六十四下生南呂太簇為宮姑洗商南呂徵一日律八寸準八尺未知十五萬七千一百三十四下生白呂未知為宮南授商白呂徵六日律七寸九分小分八強準七尺九寸萬六千三百八十三時息十五萬五千三百四十四下生結躬時息為宮變虞商結躬徵六日律七寸八分小分九少強準七尺八寸萬八千一百六十六屈齊十五萬三千二百五十三下生歸期屈齊為宮路時商歸期徵六日律七寸七分小分九弱準七尺七寸萬六千九百三十九隨期十五萬一千一百九十下生未卯隨期為宮形始商未卯徵六日律七寸六分小分八強準七尺六寸萬五千九百九十二形晉十四萬九千一百五十五下生夷汗形晉為宮依行商夷汗徵六日律七寸五分小分八弱準七尺五寸萬五千三百二十五夾鍾十四萬七千四百五十六下生無射夾鍾為宮中呂商無射徵六日律七寸四分小分九強準七尺四寸萬八千一十八開時十四萬五千四百七十下生閉掩開時為宮中呂商閉掩徵八