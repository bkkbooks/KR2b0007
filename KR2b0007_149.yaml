日律四寸五分小分五強準四尺五寸萬二百一十五截管為律吹以考聲列以物氣道之本也術家以其聲微而體難知其分數不明故作準以代之準之聲明暢易達分寸又粗然弦以緩急清濁非管無以正也均其中弦令與黃鍾相得按畫以求諸律無不如數而應者矣音聲精微綜之者解晉書樂志宮中也中和之道無往而不理商強也謂金性堅強角觸也象諸陽觸物而生徵止也言物盛則止羽舒也陽氣將復萬物孳育而舒生宋白曰合宮通音謂之宮其音雄雄洪洪然開口吐聲謂之商其音鏘鏘倉倉然張牙湧脣謂之角其音喔喔礭礭然齒合脣開謂之徵其音倚倚戲戲然齒開脣聚謂之羽其音詡酗于吁然思相吏翻鑽研甚久頗有所得夫準者所以代律取其分數調校樂器竊尋調聲之體宮商宜濁徵羽宜清徵陟里翻下同若依公孫崇止以十二律聲而云還相為宮還音旋清濁悉足唯黃鍾管最長故以黃鍾為宮則往往相順若均之八音猶須錯采衆音配成其美若以應鍾為宮蕤賓為徵則徵濁而宮清雖有其韻不成音曲若以中呂為宮則十二律中全無所取今依京房書中呂為宮乃以去滅為商執始為徵然後方韻而崇乃以中呂為宮猶用林鍾為徵何由可諧中呂陸德明曰中音仲又如字但音聲精微史傳簡略舊志準十三絃隱間九尺不言須柱以不不讀曰否今刑統疏議多用以否二字蓋當時常用疑辭也又一寸之內有萬九千六百八十三分微細難明仲儒私曾考驗準當施柱但前卻柱中以約準分則相生之韻已自應合其中絃粗細粗讀曰粗須與琴宮相類施軫以調聲令與黃鍾相合中絃下依數畫六十律清濁之節其餘十二絃須施柱如箏即於中絃按盡一周之聲度著十二絃上著直略翻然後依相生之法以次運行取十二律之商徵商徵既定又依琴五調調聲之法以均樂器五調之調徒釣翻調聲之調如字然後錯采衆聲以文飾之若事有乖此聲則不和且燧人不師資而習火古者未有火化燧人氏始鑽燧出火教民熟食延壽即京房之師焦延壽也言無所師承而變十二律為六十律也孔子曰自行束修以上吾未嘗無誨焉朱元晦注曰修脯也十脡為東古者相見必執贄以為禮束修其至薄者也心達者體知而無師苟有一毫所得皆關心抱豈必要經師受然後為奇哉尚書蕭寶寅奏仲儒學不師受輕欲制作不敢章十二行本敢作合乙十一行本同孔本同依許事遂寢魏中尉東平王匡以論議數為任城王澄所奪憤恚復治其故棺匡造棺見一百四十七卷七年數所角翻恚於避翻復扶又翻治直之翻澄因奏匡罪狀三十餘條廷尉處以死刑處昌呂翻秋八月己未詔免死削除官爵以車騎將軍侯剛代領中尉騎奇寄翻三公郎中辛雄奏理匡曹魏置尚書三公郎歷奉三朝骨鯁之迹朝野具知朝直遙翻故高祖賜名曰匡先帝既已容之於前陛下亦宜寬之於後若終貶黜恐杜忠臣之口未幾復除匡平州刺史幾居豈翻復扶又翻雄琛之族孫也辛琛見一百四十七卷天監六年琛丑林翻九月庚寅朔章十二行本無朔字乙十一行本同孔本同張校同云從無注本胡太后遊嵩高癸巳還宮太后從容謂兼中書舍人楊昱曰親姻在外不稱人心從千容翻稱尺證翻卿有聞慎勿諱隱昱奏揚州刺史李崇五車載貨相州章十二行本相作恆乙十一行本同孔本同刺史楊鈞造銀食器章十二行本器下有十具並三字孔本同張校云脫十具二字餉領軍元叉相息亮翻泣而責之泣而責之愛誨之意也昱叔父舒妻武昌王和之妹也和即叉之從祖從才用翻舒卒元氏頻請別居昱父椿泣責不聽元氏恨之會瀛州民劉宣明謀反事覺逃亡叉使和及元氏誣告昱藏匿宣明且云昱父定州刺史椿叔父華州刺史津並送甲仗三百具謀為不逞華戶化翻叉復構成之遣御仗五百人夜圍昱宅收之一無所獲太后問其狀昱具對為元氏所怨太后解昱縛處和及元氏死刑復扶又翻處昌呂翻既而叉營救之和直免官元氏竟不坐史言靈后昵庇元叉以自遺患冬十二月癸丑魏任城文宣王澄卒任音壬卒子恤翻庚申魏大赦是歲高句麗王雲卒世子安立句如字又音駒麗力知翻魏以郎選不精大加沙汰以水淘去沙石謂之沙汰故以諭去不肖餘皆罷遣深祉之子也正始之初羊祉鎮梁益普通元年庚子五二春正月乙亥朔改元大赦丙子日有食之己卯以臨川王宏為太尉揚州刺史金紫光祿大夫王份為尚書左僕射份奐之弟也份彼陳翻王奐死於齊武帝永明十一年左軍將軍豫寧威伯馮道根卒五代志豫章郡建昌縣舊有豫寧縣宋白曰漢建安中分建昌立西安縣晉太康元年改為豫寧縣祠二廟帝立太廟祀太祖文皇帝以上為六親廟皆同一堂共庭而別室又有小廟太祖太夫人廟也非嫡故別立廟皇帝每祭太廟訖乃詣小廟亦以一太牢如太廟禮有二廟令掌廟事有司以聞上問中書舍人朱曰吉凶同日今可行乎對曰昔衛獻公聞柳莊死不釋祭服而往記檀弓曰衛太史柳莊寢疾公曰若疾革雖當祭必告公再拜稽首請於尸曰有臣柳莊也者非寡人之臣社稷之臣也聞之死請往不釋服而往遂以襚之亦有勞王室臨之禮也上即幸其宅哭之甚慟高句麗世子安遣使入貢二月癸丑以安為寧東將軍高句麗王句音駒麗力知翻使疏吏翻遣使者江法盛授安衣冠劍佩魏光州兵就海中執之送洛陽魏皇興四年分青州置光州領東萊長廣東牟郡治掖魏太傅侍中清河文獻王懌美風儀胡太后逼而幸之然素有才能輔政多所匡益好文學好呼到翻禮敬士人時望甚重侍中領軍將軍元叉在門下兼總禁兵恃寵驕恣志欲無極懌每裁之以法叉由是怨之衛將軍儀同三司劉騰權傾內外吏部希騰意奏用騰弟為郡人資乖越人非其才為乖資非其次為越騰亦怨之龍驤府長史宋維辨之子也宋辨見用於魏孝文帝驤思將翻長之兩翻通直郎即通直散騎侍郎隋後遂為寄祿官行下孟翻叉許維以富貴使告司染都尉韓文殊父子謀作亂立懌周官有染人漢有平準令主練染作采色後魏置司染都尉後齊太府寺屬官有司染署令丞陸德明染而豔翻劉而險翻按驗無反狀得釋維當反坐反坐誣告失實者以其所告之罪坐之今誅維後有真反者人莫敢告乃黜維為昌平郡守昌平縣漢屬上谷郡後魏置昌平郡屬燕州隋復廢郡為縣屬幽州叉恐懌終為己害乃與劉騰密謀使主食中黃門胡定自列主食主御食者也列陳也懌貨定使毒魏主若己得為帝許定以富貴帝時年十一信之秋七月丙子太后在嘉福殿未御前殿叉奉帝御顯陽殿騰閉永巷門太后不得出懌入遇叉於含章殿後叉厲聲不聽懌入懌曰汝欲反邪叉曰叉不反正欲縛反者耳命宗士及直齋執懌衣袂將入含章東省魏置宗師宗士其屬也直齋直殿內齋閣者也屬直閣將引也送也騰稱詔集公卿議論懌大逆衆咸畏叉無敢異者唯僕射新泰文貞公遊肇抗言以為不可五代志新泰縣屬琅邪郡不下筆署名也叉騰持公卿議入俄而得可魏主可其奏也於是詐為太后詔自稱有疾還政於帝幽太后於北宮宣光殿宮門晝夜長閉內外斷絶騰自執管鑰帝亦不得省見省悉景翻見賢遍翻太后服膳俱廢不免飢寒乃歎曰養虎得噬我之謂矣又使中常侍章十二行本侍下有酒泉二字乙十一行本同孔本同賈粲侍帝書密令防察動止叉遂與太師高陽王雍等同輔政帝謂叉為姨父叉與騰表裏亶權叉為外禦騰為內防常直禁省共裁刑賞政無巨細決於二人威振內外百僚重迹重直龍翻言懼之甚不敢妄舉足而行步步踏陳迹也朝野聞懌死莫不喪氣喪息浪翻胡夷為之剺面者數百人為于偽翻剺里之翻胡夷臨喪剺面而哭哀甚遊肇憤邑而卒己卯江淮海並溢辛卯魏主加元服大赦改元正光魏相州刺史中山文莊王熙英之子也元英事魏孝文宣武數將兵有功相息亮翻自曹魏以來公府有東西閣祭酒聞懌死起兵於鄴上表欲誅元叉劉騰纂亡奔鄴後十日長史柳元章等帥城人鼓譟而入帥讀曰率下同殺其左右執熙纂並諸子置於高樓八月甲寅元叉遣尚書左丞盧同就斬熙於鄴街並其子弟熙好文學有風義好呼到翻名士多與之遊將死與故知書曰吾與弟俱蒙皇太后知遇兄據大州弟則入侍殷勤言色恩同慈母今皇太后見廢北宮太傅清河王橫受屠酷橫戶孟翻主上幼年獨在前殿君親如此無以自安故帥兵民欲建大義於天下但智力淺短旋見囚執旋反也下愧相知本以名義干心不得不爾流腸碎首復何言哉凡百君子各敬爾儀為國為身善勗名節復扶又翻為于偽翻下為知力為同聞者憐之熙首至洛陽親故莫敢視前驍騎將軍刁整獨收其尸而藏之驍堅堯翻騎奇寄翻整雍之孫也刁雍去晉入魏著功淮汝之間窮治熙黨與治直之翻鎖濟陰內史楊昱赴鄴濟陰郡漢晉屬兗州魏屬西兗州濟子禮翻乃得還任叉以同為黃門侍郎元略亡抵故人河內司馬始賓始賓與略縛荻茷夜渡孟津詣屯留栗法光家屯留縣自漢晉以來屬上黨郡姓譜栗姓栗陸氏之後漢長安富室有栗氏師古曰屯音純匿之經年時購略甚急略懼求送出境雙曰會有一死所難遇者為知己死耳願不以為慮略固求南奔雙乃使從子昌送略渡江從才用翻遂來奔上封略為中山王為略後還魏張本雍之族孫也叉誣刁整送略並其子弟收繫之御史王基等力為辨雪乃得免甲子侍中車騎將軍永昌嚴侯韋睿卒五代志零陵郡零陵縣舊分置永昌縣諡法服敵公莊曰嚴威而不猛曰嚴騎奇寄翻士民無不從風而靡獨睿自以位居大臣不欲與俗俯仰所行略如平日史言韋睿於事佛之朝矯之以正幾於以道事君者九月戊戌魏以高陽王雍為丞相總攝內外與元叉同決庶務初柔然他汗可汗納伏名敦之妻候呂陵氏生伏跋可汗及阿那王褱等六子可從刊入聲汗音寒王褱古回翻忽亡其幼子祖惠求募不能得有巫地萬言祖惠今在天上我能呼之乃於大澤中施帳幄祀天神祖惠忽在帳中自云恆在天上恆戶登翻伏跋大喜號地萬為聖女納為可賀敦柔然之主曰可汗其正室曰可賀敦復有恣色伏跋敬而愛之信用其言干亂國政如是積歲祖惠浸長語其母曰我常在地萬家未嘗上天上天者地萬教我也長知兩翻語牛倨翻上時掌翻其母具以狀告伏跋伏跋曰地萬能前知未然勿為讒也既而地萬懼譖祖惠於伏跋而殺之候呂陵氏遣其大臣具列等絞殺地萬伏跋怒欲誅具列等會阿至羅入寇阿至羅虜之別種居北河之東世附於魏一曰阿至羅高車種兵敗而還還從宣翻又如字候呂陵氏與大臣共殺伏跋立其弟阿那王褱為可汗阿那王褱立十日其族兄示發帥衆數萬擊之帥讀曰率阿那王褱戰敗與其弟乙居伐輕騎奔魏騎奇寄翻示發殺候呂陵氏及阿那王褱二弟史言柔然亂魏清河王懌死汝南王悅了無恨元叉之意以桑落酒候之水經注河東郡多徙民民有姓劉名墮者宿亶工釀採挹河流醞成芳酎懸食同枯枝之年排於桑落之辰故酒得其名香醑之色清白若滫漿焉別調氛氳不與他同蘭薰麝越自成馨逸方土之貢最為佳酌自王公庶友牽拂相招每云索郎索郎返語為桑落也更為籍徵之雋句中書之英談叉大喜冬十月乙卯以悅為侍中太尉悅就懌子亶求懌服玩不時稱旨既遷延不以時納所納者又不稱悅意也稱尺證翻幾死幾居依翻柔然可汗阿那王褱將至魏魏主使司空京兆王繼侍中崔光等相次迎之賜勞甚厚魏主引見阿那王褱於顯陽殿勞力到翻見賢遍翻因置宴置阿那王褱位於親王之下宴將罷阿那王褱執啓立於座後詔引至御座前阿那王褱再拜言曰臣以家難難乃旦翻輕來詣闕本國臣民皆已逃散陛下恩隆天地乞兵送還本國誅翦叛逆收集亡散臣當統帥遺民奉事陛下帥讀曰率言不能盡別有啓陳仍以啓授中書舍人常景以聞景爽之孫也常爽見一百二十三卷宋文帝元嘉六年十一月己亥魏立阿那王褱為朔方公蠕蠕王賜以衣服軺車蠕人兗翻軺音遙祿恤儀衛一如親王時魏方強盛於洛水橋南御道東作四館道西立四里有自江南來降者處之金陵館三年之後賜宅於歸正里自北夷降者處燕然館賜宅於歸德里自東夷降者處扶桑館賜宅於慕化里自西夷降者處崦嵫館賜宅於慕義里四館皆因四方之地為名金陵在江南燕然在漠北扶桑在東日所出崦嵫在西日所入山海經曰大荒之中暘谷上有扶桑日所出也灰野之山有樹青葉赤華名曰若木日所入也生昆崙西鳥鼠山西南曰崦嵫淮南子曰經細柳西方之地崦嵫日所入也十洲記曰扶桑在碧海中長數千丈一千餘圍兩幹同根更相依倚是以名扶桑降戶江翻處昌呂翻下同燕因肩翻崦依廉翻又依檢翻嵫音茲王褱以燕然館處之阿那王褱屢求返國朝議異同不決朝直遙翻阿那王褱以金百斤賂元叉遂聽北歸十二月壬子魏敕懷朔都督簡鋭騎二千護送阿那王褱達境首境首猶言界首也騎奇寄翻若彼迎候宜賜繒帛車馬禮餞而返繒慈陵翻如不容受聽還闕庭其行裝資遣付尚書量給量音良辛酉魏以京兆王繼為司徒魏遣使者劉善明來聘始復通好自齊明帝建元二年盧昶北歸之後魏不復遣使南聘至是復通復扶又翻二年辛丑五二一春正月辛巳上祀南郊置孤獨園於建康以收養窮民古者鰥寡孤獨廢疾者有養帝非能法古也祖釋氏須達多長者之為耳戊子大赦魏南秦州氐反魏發近郡兵萬五千人近郡近輔諸郡也將息亮翻下同送柔然可汗阿那王褱返國尚書左丞張普惠上疏以為蠕蠕久為邊患今茲天降喪亂喪息浪翻荼毒其心蓋欲使之知有道之可樂革面稽首以奉大魏也樂音洛稽音啓陛下宜安民恭己以悅服其心阿那王褱束身歸命撫之可也乃更先自勞擾興師郊甸之內投諸荒裔之外救纍世之勍敵資天亡之醜虜臣愚未見其可也勍渠京翻此乃邊將貪竊一時之功不思兵為凶器王者不得已而用之用老子語意聖慈降膳暵呼旱翻乃以萬五千人使楊鈞為將欲定蠕蠕干時而動其可濟乎脫有顛覆之變楊鈞之肉其足食乎用左傳楚孫叔敖斥伍參語意好呼到翻不圖安危大計此微臣所以寒心者也且阿那王褱之不還負何信義臣賤不及議漢自議郎以上皆得預朝廷大議尚書二丞於當時位不為卑而以為賤不及議蓋自曹魏以後朝廷大議止及八坐以上文書皆過尚書二丞之手章十二行本陳下有弗聽二字乙十一行本同孔本同張校同阿那王褱辭於西堂詔賜以軍器衣被雜采糧畜事事優厚采與綵同畜許救翻勞力到翻阿那王褱之南奔也其從父兄婆羅門帥衆數萬入討示發破之從才用翻帥讀曰率示發奔地豆干魏書曰地豆干國在室韋西千餘里國人推婆羅門為彌偶可社句可汗魏收曰魏言安靜也柔然已立君長長知兩翻恐未肯以殺兄之人郊迎其弟輕往虛返徒損國威自非廣加兵衆無以送其入北二月魏人使舊嘗奉使柔然者牒云具仁牒云姓具仁名魏書官氏志內入諸姓有牒云氏奉使疏吏翻使迎阿那王褱辛丑上祀明堂庚戌魏使假撫軍將軍邴虯討南秦叛氐姓譜邴即丙姓魏元叉劉騰之幽胡太后也右衛將軍奚康生預其謀叉以康生為撫軍大將軍河南尹仍使之領左右領仗身左右剛子叉之妹夫也叉以康生通姻深相委託三人率多俱宿禁中時或迭出以難當為千牛備身御左右有千牛刀謂之防身刀千牛刀者利刃也取庖丁解數千牛而芒刃不頓為義千牛備身執千牛刀以侍左右者也言氣高下叉稍憚之見于顏色見賢遍翻康生亦微懼不安甲午魏主朝太后于西林園文武侍坐酒酣迭舞朝直遙翻坐徂臥翻康生乃為力士儛蓋為勇士進退坐作之氣勢而舞也儛與舞同每顧視太后舉手蹈足瞋目頷首為執殺之勢折之舌翻瞋七人翻太后解其意而不敢言解戶買翻日暮太后欲攜帝宿宣光殿侯剛曰至尊已朝訖嬪御在南宣光殿在洛陽北宮元叉等幽胡太后於此魏主與嬪御居南宮故侯剛云然嬪毗賓翻康生曰至尊陛下之兒隨陛下將東西更復訪誰復扶又翻㣥臣莫敢應太后自起援帝臂援于元翻引也下堂而去康生大呼唱萬歲呼火故翻帝前入閣左右競相排閣不得閉康生奪難當千牛刀斫直後元思輔直後官名直閣之屬也帝既升宣光殿左右侍臣俱立西階下康生乘酒勢將出處分處昌呂翻分扶問翻為叉所執鎖於門下以此知一夫之勇終受制於人也侍官懷恐不安言其心懷恐懼也紿徒亥翻太后信之適下殿粲即扶帝出東序前御顯陽殿閉太后於宣光殿至晚叉不出令侍中黃門僕射尚書等十餘人就康生所訊其事處康生斬刑難當絞刑處昌呂翻叉與剛並在內矯詔決之康生如奏難當恕死從流難當哭辭父康生慷慨不悲曰我不反死汝何哭也時已昏暗有司驅康生赴市斬之尚食典御奚混與康生同執刀入內亦坐絞尚食典御唐為尚食奉御進御必辨時禁先嘗之得留百餘日竟流安州魏顯祖皇興二年置安州治方城領密雲廣陽安樂郡叉使行臺盧同就殺之魏太祖既得中山將北還慮中原有變乃於鄴中山置行臺後因之八坐九卿常旦造騰宅坐徂臥翻造七到翻參其顏色然後赴省府亦有終日不得見者得或作能非也章十二行本正作能乙十一行本同孔本同張校同屬之欲翻唯視貨多少舟車之利山澤之饒所在榷固刻剝六鎮交通互市歲入利息以巨萬萬計巨萬萬萬也巨萬萬計者萬萬萬也少詩沼翻榷古嶽翻遠近苦之京兆王繼自以父子權位太盛固請以司徒讓車騎大將軍儀同三司崔光騎奇寄翻夏四月庚子以繼為太保侍中如故繼固辭不許壬寅以崔光為司徒侍中祭酒著作如故魏牒云具仁至柔然婆羅門殊驕慢無遜避心責具仁禮敬具仁不屈婆羅門乃遣大臣丘升頭等將兵二千隨具仁迎阿那王褱五月具仁還鎮還懷朔鎮也將息浪翻下同阿那王褱懼不敢進上表請還洛陽辛巳魏南荊州刺史恆叔興據所部來降魏置南荊州見一百四十七卷天監十一年降戶江翻下同考異曰梁帝紀七月叔興帥衆降蓋記奏到之日今從魏帝紀六月丁卯義州刺史文僧明此義州當置於齊安郡木蘭縣界蕭子顯齊志木蘭縣屬寧蠻左郡唐省木蘭縣入黃岡縣以下文裴邃復義州觀之恐義州與邊城皆置於安豐界沈約志宋文帝元嘉十五年以豫部蠻民立邊城左郡酈道元曰安豐縣故城今邊城郡治也此時梁境未得至安豐五代志黃岡縣界舊有邊城郡此正田守德所居之地皆蠻酋也酋慈由翻魏以僧明為西豫州刺史守德為義州刺史癸卯琬琰殿火延燒後宮三千間秋七月丁酉以大匠卿裴邃為信武將軍假節督衆軍討義州破魏義州刺史封壽於檀公峴水經注決水出廬江雩婁縣大別山注云俗謂之檀公峴蓋大別之異名也又北過安豐縣東安豐故城今邊城郡治也此魏邊城郡峴戶典翻壽請降復取義州復扶又翻下聞復同魏以尚書左丞張普惠為行臺將兵救之不及考異曰普惠傳云棄城走今從裴邃傳以裴邃為豫州刺史鎮合肥邃欲襲壽陽陰結壽陽民李瓜花等為內應邃已勒兵為期日恐魏覺之先移章十二行本移下有魏字乙十一行本同孔本同退齋校同揚州云魏始於馬頭置戍如聞復欲修白捺故城馬頭置戍蓋即沈約志所謂馬頭太守治所而置之白捺當在馬頭東北或東南捺奴葛翻便相侵逼此亦須營歐陽設交境之備今板卒已集板幹所以築城卒士卒也揚州刺史長孫稚謀於僚佐皆曰此無修白捺之意宜以實報之録事參軍楊侃曰白捺小城本非形勝邃好狡數好呼到翻今集兵遣移恐有他意稚大寤曰録事可亟作移報之侃報移曰彼之纂兵纂集也何為妄構白捺他人有心豫忖度之詩巧言之辭度徒洛翻左傳秦大夫繞朝之言以為魏人已覺即散其兵瓜花等以失期遂相告發伏誅者十餘家稚觀之子長孫觀道生之孫見一百三十三卷宋鬱林王元徽元年播之子楊播見一百四十卷齊明帝建武二年初高車王彌俄突死事見上卷天監十五年後數年嚈噠遣彌俄突弟伊匐帥餘衆還國伊匐擊柔然可汗婆羅門大破之婆羅門帥十部落詣涼州請降於魏柔然餘衆數萬相帥迎阿那王褱阿那王褱表稱本國大亂姓姓別居迭相抄掠當今北人鵠望待拯言鵠立而望魏拯救也嚈益涉翻噠當割翻又宅軋翻帥讀曰率降戶江翻抄楚交翻給臣精兵一萬送臣磧北撫定荒民磧七迹翻涼州刺史袁翻以為自國家都洛以來蠕蠕高車迭相吞噬始則蠕蠕授首謂他汗也事見一百四十七卷天監七年謂彌俄突也克雪讎恥誠由種類繁多種章勇翻終不能相滅自二虜交鬬邊境無塵數十年矣此中國之利也今蠕蠕兩主相繼歸誠兩主謂阿那王褱婆羅門終無純固之節然存亡繼絶帝王本務若棄而不受則虧我大德若納而撫養則損我資儲或全徙內地則非直其情不願亦恐終為後患劉石是也謂漢徙胡羯於內地至於晉世卒階劉石之亂則高車猶有內顧之憂未暇窺窬上國若其全滅則高車跋扈之勢豈易可知易以豉翻今蠕蠕雖亂而部落猶衆處處棋布以望舊主高車雖強未能盡服也愚謂蠕蠕二主並宜存之居阿那王褱於東處婆羅門於西分其降民各有攸屬阿那王褱所居非所經見不敢臆度婆羅門請修西海故城以處之處昌呂翻度徒洛翻西海在酒泉之北去高車所居金山千餘里此西海非王莽所置西海郡之西海但言在酒泉之北則別有西海故城也按北史蠕蠕傳西海郡即漢晉舊鄣袁翻又曰直張掖西北千二百里又按晉志漢獻帝興平二年武威太守張雅請置西海郡於居延蓋此即漢晉舊鄣也金山形如兜鍪其後突厥居金山之陽即此山土地沃衍大宜耕稼宜遣一良將配以兵仗監護婆羅門將即亮翻監工銜翻因令屯田以省轉輸之勞其北則臨大磧野獸所聚磧七迹翻彼此相資足以自固外以輔蠕蠕之微弱內亦防高車之畔援韓詩云畔援武強也鄭玄云跋扈也若婆羅門能收離聚散復興其國者復興扶又翻漸令北轉徙度流沙則是我之外藩高車勍敵勍渠京翻西北之虞可以無慮如其姦回反覆不過為逋逃之寇於我何損哉朝議是之朝直遙翻九月柔然可汗俟匿伐詣懷朔鎮請兵且迎阿那王褱俟匿伐阿那王褱之兄也冬十月録尚書事高陽王雍等奏懷朔鎮北吐若奚泉原野平沃請置阿那王褱於吐若奚泉吐若奚泉在懷朔鎮北無結山下令各帥部落收集離散阿那王褱所居既在境外宜少優遣少詩沼翻婆羅門不得比之其婆羅門未降以前蠕蠕歸化者悉令州鎮部送懷朔鎮以付阿那王褱詔從之為阿那王褱婆羅門皆叛去張本十一月癸丑魏侍中車騎大將軍侯剛加儀同三司騎奇寄翻魏以東益南秦氐皆反庚辰以秦州刺史河間王琛為行臺以討之琛恃劉騰之勢琛求為劉騰養子見上卷天監十七年琛丑林翻大為氐所敗敗補邁翻中尉彈奏彈徒丹翻會赦除名尋復王爵魏以安西將軍元洪超兼尚書行臺詣敦煌安置柔然婆羅門敦徒門翻三年壬寅五二二初春正月庚子以尚書令袁昂為中書監吳郡太守王暕為尚書左僕射暕古限翻初辛亥魏主耕籍田初魏宋雲與惠生自洛陽西行四千里至赤嶺乃出魏境赤嶺在唐鄯州鄯城縣西二百餘里再期至乾羅國而還二月達洛陽得佛經一百七十部魏遣宋雲求佛經事始上卷天監十七年初高車王伊匐遣使入貢于魏匐蒲北翻使疏吏翻夏四月庚辰魏以伊匐為鎮西將軍西海郡公高車王久之伊匐與柔然戰敗其弟越居殺伊匐自立初五月壬辰朔日有食之既初癸巳大赦初冬十一月甲午領軍將軍始興忠武王憺卒憺徒敢翻又徒濫翻初乙巳魏主祀圜丘初初魏世祖章十二行本祖作宗乙十一行本同孔本同以玄始曆浸疏宋文帝元嘉二十九年魏行玄始曆更工衡翻至是著作郎崔光表取蕩寇將軍張龍祥嚴龍改農等九家所上曆候驗得失合為一曆以壬子為元應魏之水德壬癸水也水旺於子故以壬子為元上時掌翻丙午初行正光曆大赦考異曰後魏律曆志云曆成會孝明帝加元服改元正光因命曰正光曆按帝紀正光元年七月辛卯加元服三年十一月丙午行正光曆今從之初十二月乙酉魏以車騎大將軍尚書右僕射元欽為儀同三司騎奇寄翻太保京兆王繼為太傅司徒崔光為太保初初太子統之未生也上養臨川王宏之子正德為子正德少粗險少詩照翻上即位正德意望東宮及太子統生正德還本賜爵西豐侯沈約宋志臨川郡有西豐縣常蓄異謀怏於兩翻是歲正德自黃門侍郎為輕車將軍頃之亡奔魏自稱廢太子避禍而來魏尚書左僕射蕭寶寅上表曰豈有伯為天子父作揚州元年臨川王宏為揚州刺史遠投他國不如殺之由是魏人待之甚薄正德乃殺一小兒稱為己子遠營葬地魏人不疑明年復自魏逃歸復扶又翻考異曰梁書正德傳普通六年為輕車將軍頃之奔魏七年自魏逃歸魏書蕭衍傳正光二年弟子正德來奔南史正德傳普通三年為輕車將軍頃之奔魏又自魏逃歸六年隨豫章王北侵輒棄軍走北史蕭寶寅傳正光四年表論考課後乃云表論正德後乃云莫折大提反按大提反在正光五年唯南北史年月前後相近今從之上泣而誨之復其封爵為後正德納侯景張本初柔然阿那王褱求粟為種種章勇翻魏與之萬石婆羅門帥部落叛魏亡歸嚈噠魏以平西府長史代人費穆兼尚書右丞西北道行臺將兵討之魏收官氏志西方費連氏後改為費氏穆謂諸將曰戎狄之性見敵即走乘虛復出若不使之破膽終恐疲於奔命左傳巫臣遺子重子反書曰吾必使汝疲於奔命以死奔命者赴急之兵也復扶又翻伏於山谷以步兵之羸者為外營騎奇寄翻羸倫為翻柔然果至奮擊大破之婆羅門為涼州軍所擒送洛陽四年癸卯五二三春正月辛卯上祀南郊大赦丙午祀明堂二月乙亥耕藉田柔然大飢阿那王褱帥其衆入魏境表求賑給帥讀曰率賑之忍翻己亥魏以尚書左丞元孚為行臺尚書持節撫諭柔然孚談之孫也魏孝昌元年元談為幽州都督後此三年按魏書談太武之子蓋魏宗室多有同名者表陳便宜以為蠕蠕久來強大昔在代京常為重備今天祚大魏使彼自亂亡稽首請服蠕人兗翻稽音啓朝廷鳩其散亡禮送令返宜因此時善思遠策昔漢宣之世呼韓款塞漢遣董忠韓昌領邊郡士馬送出朔方因留衛助事見二十七卷漢宣帝甘露三年光武時亦使中郎將段彬置安集掾史隨單于所在參察動靜事見四十四卷漢光武建武二十六年掾俞絹翻單音蟬借其間地聽其田牧粗置官屬示相慰撫粗坐五翻嚴戒邊兵因令防察使親不至矯詐疏不容反叛最策之得者也魏人不從柔然俟匿伐入朝于魏朝直遙翻三月魏司空劉騰卒宦官為騰義息重服者四十餘人衰絰送葬者以百數朝貴送葬者塞路滿野衰倉回翻塞悉則翻夏四月魏元孚持白虎幡勞阿那王褱於柔玄懷荒二鎮之間懷荒鎮在柔玄鎮之東禦夷鎮之西勞力到翻王褱陰有異志遂拘留孚載以轀車應劭注漢書曰轒轀胸奴車師古曰轀於云翻坐孚東廂稱為行臺甚加禮敬引兵而南所過剽掠剽匹妙翻至平城乃聽孚還有司奏孚辱命抵罪甲申魏遣尚書令李崇左僕射元纂帥騎十萬擊柔然帥讀曰率騎奇寄翻阿那王褱聞之驅良民二千公私馬牛羊數十萬北遁崇追之三千餘里不及而還還從宣翻又如字纂使鎧曹參軍于謹帥騎二千追柔然至郁對原前後十七戰屢破之鎧可亥翻謹忠之從曾孫也于忠以保護胡太后恃功專恣從才用翻有識量涉獵經史少時屏居田里不求仕進沈持林翻少詩照翻屏必郢翻或勸之仕謹曰州郡之職昔人所鄙後漢梁竦曰州郡之職徒勞人耳須待時來纂聞其名而辟之後帥輕騎出塞覘候屬鐵勒數千騎奄至覘丑廉翻又丑豔翻屬之欲翻高車部或曰敕勒訛為鐵勒謹以衆寡不敵退必不免乃散其衆騎使匿叢薄之間又遣人升山指麾若部分軍衆者分扶問翻鐵勒望見雖疑有伏兵自恃其衆進軍逼謹謹以常乘駿馬一紫一騧騧古花翻鐵勒所識乃使二人各乘一馬突陳而出鐵勒以為謹也爭逐之謹帥餘軍擊其追騎鐵勒遂走謹因得入塞李崇長史巨鹿魏蘭根説崇曰昔緣邊初置諸鎮地廣人稀或徵發中原強宗子弟或國之肺腑寄以爪牙中年以來有司號為府戶役同廝養説式芮翻廝音斯養余亮翻官婚班齒致失清流而本來族類各居榮顯顧瞻彼此理當憤怨宜改鎮立州分置郡縣凡是府戶悉免為民入仕次敘一準其舊文武兼用威恩並施此計若行國家庶無北顧之慮矣崇為之奏聞事寢不報為後改鎮為州無及於事張本為于偽翻初元叉既幽胡太后常入直於魏主所居殿側曲盡佞媚帝由是寵信之叉出入禁中恆令勇士持兵以自先後恆戶登翻先悉薦翻後胡茂翻時出休於千秋門外施木欄楯欄檻也楯食尹翻士民求見者遙對之而已其始執政之時矯情自飾以謙勤接物時事得失頗以關懷既得志遂自驕慢嗜酒好色貪吝寶賄與奪任情紀綱壞亂父京兆王繼尤貪縱與其妻子各受賂遺請屬有司好呼到翻遺于季翻屬之欲翻莫敢違者乃至郡縣小吏亦不得公選牧守令長率皆貪汚之人守式又翻令郎定翻長知兩翻由是百姓困窮人人思亂武衛將軍于景忠之弟也謀廢叉叉黜為懷荒鎮將將即亮翻宋白曰後魏懷荒禦夷二鎮皆在蔚州界及柔然入寇鎮民請糧景不肯給鎮民不勝忿遂反執景殺之未幾沃野鎮民破六韓拔陵聚衆反殺鎮將改元真王勝音升幾居豈翻魏收曰破六韓單于之苗裔也初呼廚泉入朝于漢為魏武所留遣其叔父右賢王去卑監本國戶魏氏方興率部南轉去卑遣弟右谷蠡王潘六奚帥軍北禦軍敗奚及五子俱沒於魏其子孫遂以潘六奚為氏後人訛誤以為破六韓又曰破洛汗考異曰魏帝紀正光五年破落汗拔陵反詔臨淮王彧討之五月彧敗削官按令狐德棻周書賀拔勝傳衛可孤圍懷朔經年勝乃告急於彧然則拔陵反當在四年蓋帝紀因詔彧討拔陵而言之非拔陵於時始反也周書作破六韓今從之諸鎮華夷之民往往響應拔陵引兵南侵遣別帥衛可孤圍武川鎮考異曰北史孤作王褱今從周書尖山賀拔度拔及其三子允勝嶽皆有材勇魏收志尖山縣屬神武郡薛居正五代史周密傳神武川屬應州令狐德棻曰賀拔之先與魏氏同出陰山魏書官氏志內入諸姓有賀拔氏三子為軍主以拒之魏景明之初世宗命宦者白整為高祖及文昭高后鑿二佛龕於龍門山龕口含翻此龍門山即伊闕山也為于偽翻下復為同皆高百尺高居報翻永平中劉騰復為世宗鑿一龕復扶又翻至是二十四年凡用十八萬二千餘工而未成秋七月辛亥魏詔見在朝官依令七十合解者見賢遍翻七十而致事合解所任可給本官半祿以終其身九月魏詔侍中太尉汝南王悅入居門下與丞相高陽王雍參決尚書奏事冬十月庚午以中書監中衛將軍袁昂為尚書令即本號開府儀同三司本號中衛將軍號魏平恩文宣公崔光疾篤魏主親撫視之拜其子勵為齊州刺史為之撤樂罷遊眺丁酉光卒帝臨哭之慟為減常膳以光擁立之功也為于偽翻光寬和樂善樂音洛終日怡怡未嘗忿恚恚於避翻于忠元叉用事以光舊德皆尊敬之事多咨決而不能救裴郭清河之死裴郭死見上卷天監十四年清河王懌死見上元年光且死薦都官尚書賈思伯為侍講帝從思伯受春秋思伯雖貴傾身下士下遐稼翻或問思伯曰公何以能不驕思伯曰衰至便驕何常之有當時以為雅談十一月癸未朔日有食之甲辰尚書左僕射王暕卒暕古限翻梁初唯揚荊郢江湘梁益七州用錢交廣用金銀餘州雜以穀帛交易上乃鑄五銖錢肉好周郭皆備韋昭曰肉錢形也好孔也杜佑曰內郭為肉外郭為好孟康曰周郭周匝為郭也肉疾僦翻好呼到翻謂之女錢民間私用女章十二行本女作古乙十一行本同孔本同錢交易禁之不能止乃議盡罷銅錢十二月戊午始鑄鐵錢魏以汝南王悅為太保張政烺標點王崇武聶崇岐覆校
