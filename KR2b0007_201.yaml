body:
  text: 資治通鑑卷第二百一端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀十七高宗天皇大聖大弘孝皇帝中之上龍朔二年龍朔二年壬戌六六二龍朔二年八月壬寅以許敬宗為太子少師同東西臺三品知西臺事同中書門下三品知中書事龍朔二年九月戊寅初令八品九品衣碧衣於既翻龍朔二年冬十月丁酉上幸驪山溫湯太子監國監古銜翻丁未還宮龍朔二年庚戌西臺侍郎陝人上官儀同東西臺三品西臺侍郎即中書侍郎陝失冉翻龍朔二年癸丑詔以四年正月有事於泰山仍以來年二月幸東都龍朔二年左相許圉師之子奉輦直長自然遊獵犯人田奉輦直長即尚輦直長殿中六局直長正七品龍朔改尚輦局為奉輦局相息亮翻長知兩翻自然以鳴鏑射之射而亦翻圉師杖自然一百而不以聞田主詣司憲訟之司憲大夫楊德裔不為治治直之翻西臺舍人袁公瑜遣人易姓名上封事告之西臺舍人即中書舍人為于僞翻上時掌翻圉師為宰相侵陵百姓匿而不言豈非作威作福圉師謝曰臣備位樞軸以直道事陛下不能悉允衆心故為人所攻訐訐居謁翻至於作威福者或手握強兵或身居重鎮臣以文吏奉事聖明惟知閉門自守何敢作威福上怒曰汝恨無兵邪許敬宗曰人臣如此罪不容誅遽令引出詔特免官考異曰舊本紀十一月辛未圉師下獄新本紀十一月辛未圉師貶虔州刺史今據實録辛未免官久之貶虔州刺史舊紀貶虔州刺史在三年二月新本紀誤龍朔二年癸酉立皇子旭輪為殷王旭輪後改名旦是為睿宗龍朔二年十二月戊申詔以方討高麗百濟麗力知翻河北之民勞於征役其封泰山幸東都並停龍朔二年䫻海道總管蘇海政䫻越筆翻受詔討龜茲龜茲音丘慈敕興昔亡繼往絶二可汗發兵與之俱可從刊入聲汗音寒繼往絶素與興昔亡有怨事見上卷顯慶二年注彌射謀反請誅之阿史那彌射是為興昔亡可汗集軍吏謀曰彌射若反我輩無噍類噍才笑翻不如先事誅之先悉薦翻乃矯稱敕令大總管齎帛數萬段賜可汗及諸酋長興昔亡帥其徒受賜海政悉收斬之其鼠尼施拔塞幹兩部亡走鼠尼施啜咄陸五部之一也拔塞幹俟斤弩失畢五部之一也酋慈由翻長知兩翻帥讀曰率尼女夷翻平之軍還至疏勒南弓月部復引吐蕃之衆來欲與唐兵戰海政以師老不敢戰以軍資賂吐蕃約和而還由是諸部落皆以興昔亡為冤各有離心繼往絶尋卒復扶又翻卒子恤翻十姓無主有阿史那都支及李遮匐收其餘衆附於吐蕃為都支遮匐連兵反張本龍朔二年是歲西突厥寇庭州刺史來濟將兵拒之厥九勿翻將即亮翻謂其衆曰吾久當死幸蒙存全以至今日當以身報國遂不釋甲胄赴敵而死三年三年春正月左武衛將軍鄭仁泰討鐵勒叛者餘種悉平之種章勇翻三年乙酉以李義府為右相右相中書令也選須絹翻三年二月徙燕然都護府於回紇更名瀚海都護徙故瀚海都護於雲中古城更名雲中都護燕然都護置於貞觀二十一年見一百九十八卷瀚海都護置於永徽元年見一百九十九卷燕因肩翻更工衡翻磧北州府皆隸瀚海磧南隸雲中雲中都護府治金河即秦漢雲中舊城東北至朔州三百七十里麟德元年更名單于大都護府杜佑曰單于都護府南至榆林郡百二十里東南到馬邑郡三百五十里磧七逆翻三年三月許圉師再貶虔州刺史虔州在京師東南四千一十七里至東都三千四百里圉師子文思自然並免官三年右相河間郡公李義府典選選須絹翻恃中宮之勢專以賣官為事銓綜無次怨讟盈路上頗聞之從容謂義府曰卿子及壻頗不謹多為非法我尚為卿掩覆卿宜戒之從千容翻為于僞翻覆敷又翻義府勃然變色頸頰俱張張知亮翻曰誰告陛下上曰但我言如是何必就我索其所從得邪索山客翻義府殊不引咎緩步而去上由是不悅望氣者杜元紀謂義府所居第有獄氣宜積錢二十萬緡以厭之厭於協翻義府信之聚斂尤急斂力贍翻義府居母喪朔望給哭假假古訝翻輒微服與元紀出城東登古冢候望氣色或告義府窺覘災眚陰有異圖覘丑廉翻又丑豔翻眚所景翻又遣其子右司議郎津召長孫無忌之孫延受其錢七百緡除延司津監唐東宮司議郎四人正六品上掌啓奏記注龍朔改司議郎為左司議郎太子舍人為右司議郎漢官有都水長屬主爵掌諸池沼後改為使者後漢改為河隄謁者晉置都水臺有使者一人掌舟楫之事梁改為太舟卿北齊亦曰都水臺隋改為都水監唐因之貞觀改為使者從六品龍朔元年改為司津監掌川澤津梁之政令夏四月乙丑下義府獄下遐嫁翻遣司刑太常伯劉祥道與御史詳刑共鞫之司刑太常伯即刑部尚書詳刑大理也唐自永徽以後大獄以尚書刑部御史臺大理寺官雜按謂之三司監古銜翻事皆有實戊子詔義府除名流巂州津除名流振州諸子及壻並除名流庭州朝野莫不稱慶巂音髓朝直遙翻或作河間道行軍元帥劉祥道破銅山大賊李義府露布李義府河間人故云然帥所類翻義府多取人奴婢及敗各散歸其家故其露布云混奴婢而亂放各識家而競入此姑述時人快義府之得罪而有是通鑑因采而志之以為世鑒學者為文類有所祖漢高帝為太上皇營新豐後人志其事其辭云混雞犬而亂放各識家而競入此語所祖有自來矣三年乙未置雞林大都督府於新羅國以金法敏為之三年丙午蓬萊宮含元殿成上始移仗居之更命故宮曰西內改宮謂太極宮自武德以來人主居之自是以後謂之西內更工衡翻戊申始御紫宸殿聽政蓬萊宮正殿曰含元殿含元之後曰宣政殿宣政殿北曰紫宸門內有紫宸殿即內衙之正殿三年五月壬午柳州蠻酋吳君解反柳州漢潭中縣地隋置馬平縣唐武德四年置南昆州貞觀八年改曰柳州翽呼外翻三年吐蕃與吐谷渾互相攻各遺使上表論曲直更來求援吐從暾入聲谷音浴使疏吏翻上時掌翻更工衡翻迭也吐谷渾之臣素和貴有罪逃奔吐蕃具言吐谷渾虛實吐蕃發兵擊吐谷渾大破之吐谷渾可汗曷鉢與弘化公主帥數千帳棄國走依涼州請徙居內地唐會要曰吐谷渾自永嘉之末始西度洮水建國於㣥羌之故地龍朔三年為吐蕃所滅凡三百五十年帥讀曰率下同帥右武衛將軍獨孤卿雲辛文陵等分屯涼鄯二州以備吐蕃鄯時戰翻涼鄯相去五百八十里六月戊申又以左武衛大將軍蘇定方為安集大使節度諸軍為吐谷渾之援吐蕃祿東贊屯青海遣使者論仲琮入見吐蕃立國之初有大論小論以統國事後因以為貴姓見賢遍翻且請和親上不許遣左衛郎將劉文祥使于吐蕃降璽書責讓之將即亮翻璽斯氏翻三年秋八月戊申上以海東纍歲用兵百姓困於征調調徒弔翻士卒戰溺死者甚衆溺奴狄翻詔罷三十六州所造船遣司元太常伯竇德玄等司元太常伯即戶部尚書問人疾苦黜陟官吏德玄毅之曾孫也竇毅太穆皇后之父三年九月戊午熊津道行軍總管右威衛將軍孫仁師等破百濟餘衆及倭兵於白江拔其周留城倭烏禾翻初劉仁願劉仁軌既克真峴城克真峴城見上卷二年浮海助之將即亮翻下同仁師與仁願仁軌合兵勢大振諸將以加林城水陸之衝欲先攻之仁軌曰加林險固急攻則傷士卒緩之則曠日持久周留城虜之巢穴㣥凶所聚除惡務本書泰誓之言若克周留諸城自下於是仁師仁願與新羅王法敏將陸軍以進仁軌與別將杜爽扶餘隆將水軍及糧船自熊津入白江以會陸軍同趣周留城趣七喻翻遇倭兵於白江口四戰皆捷焚其舟四百艘煙炎灼天艘蘇遭翻炎讀曰焰海水皆赤百濟王豐脫身奔高麗王子忠勝忠志等帥衆降帥讀曰率下之帥皆帥同降戶江翻下同百濟盡平唯別帥遲受信據任存城不下帥所類翻尉紆勿翻初百濟西部人黑齒常之長七尺餘驍勇有謀略長直亮翻驍堅堯翻仕百濟為達率兼郡將猶中國刺史也新羅官有十六品左平一品達率二品五方各有方領一人以達率為之方有十郡郡有將三人以德率為之德率四品百濟置官蓋與新羅略同也率所類翻常之帥所部隨衆降定方縶其王及太子縱兵劫掠壯者多死常之懼與左右十餘人遁歸本部收集亡散保任存山結柵以自固旬月間歸附者三萬餘人定方遣兵攻之常之拒戰唐兵不利常之復取二百餘城復扶又翻定方不能克而還還從宣翻又如字常之與別部將沙吒相如沙吒夷人復姓吒陟加翻百濟既敗皆帥其衆降劉仁軌使常之相如自將其衆取任存城仍以糧仗助之孫仁師曰此屬獸心何可信也仁軌曰吾觀二人皆忠勇有謀敦信重義但嚮者所託未得其人今正是其感激立效之時不用疑也遂給其糧仗分兵隨之攻拔任存城遲受信棄妻子奔高麗詔劉仁軌將兵鎮百濟召孫仁師劉仁願還百濟兵火之餘比屋雕殘比毗必翻又毗至翻僵尸滿野仁軌始命瘞骸骨籍戶口理村聚署官長通道塗立橋梁補隄堰復陂塘課耕桑賑貧乏養孤老立唐社稷頒正朔及廟諱卒如仁軌之志所謂有志者事竟成也僵居良翻瘞於計翻長知兩翻賑津忍翻闔境各安其業然後修屯田儲糗糧訓士卒以圖高麗糗去九翻劉仁願至京師上問之曰卿在海東前後奏事皆合機宜復有文理復扶又翻卿本武人何能如是仁願曰此皆劉仁軌所為非臣所及也上悅加仁軌六階勳有級官有階為築第長安厚賜其妻子遣使齎璽書勞勉之為于僞翻使疏吏翻勞力到翻上官儀曰仁軌遭黜削而能盡忠黜削謂白衣從軍自效也皆可謂君子矣三年冬十月辛巳朔詔太子每五日於光順門內視諸司奏事唐六典大明宮紫宸殿內朝正殿也殿之南面曰紫宸門左曰崇明門右曰光順門皆委太子決之三年十二月庚子詔改來年元三年壬寅以安西都護高賢為行軍總管將兵擊弓月以救于闐三年是歲大食擊波斯拂菻破之拂菻古大秦國也居西海上一曰海西國去京師四萬里北直突厥可薩部西瀕海東南接波斯杜佑曰大秦前漢犂靬國也菻力錦翻又力鴆翻類篇曰佛菻吞滅諸胡勝兵四十餘萬勝音升麟德元年甲子六六四去年絳州麟見又含元殿前麟趾見於是改元三年春正月甲子改雲中都護府為單于大都護府以殷王旭輪為單于大都護單音蟬初李靖破突厥見一百九十三卷太宗貞觀四年厥九勿翻阿史德氏為之長長知兩翻至是部落漸衆阿史德氏詣闕請如胡法立親王為可汗以統之上召見謂曰今之可汗古之單于也故更為單于都護府更工衡翻改也而使殷王遙領之三年二月戊子上行幸萬年宮永徽元年改九成宮為萬年宮三年夏四月壬子衛州刺史道孝王元慶薨三年丙午魏州刺史郇公孝協坐贓賜死司宗卿隴西王博乂奏孝協父叔良死王事司宗卿即宗正卿叔良太祖之孫高祖時叔良擊突厥中流矢薨郇音荀恐絶嗣上曰畫一之法不以親疏異制漢書云蕭何為法講若畫一注云畫一言整齊也雖皇太子亦所不赦孝協有一子何憂乏祀乎孝協竟自盡於第三年五月戊申朔遂州刺史許悼王孝薨孝上子也後宮所生三年乙卯於昆明之弄棟川置姚州都督府劉昫曰漢益州郡之雲南縣古滇國後漢屬永昌郡蜀劉氏分永昌為建寧郡又分永昌建寧置雲南郡而治於弄梀晉改為晉寧郡又置寧州武德四年安撫大使李英以此州人多姓姚故置姚州今升置都督府管州三十二三年秋七月丁未朔詔以三年正月有事於岱宗三年八月丙子車駕還京師幸舊宅舊宅帝為晉王時所居也壬午還蓬萊宮三年丁亥以司列太常伯劉祥道兼右相司列太常伯即吏部尚書大司憲即御史大夫司元太常伯即戶部尚書左相即侍中三年冬十月庚辰檢校熊津都督劉仁軌上言上時掌翻臣伏覩所存戍兵疲羸者多勇健者少羸倫為翻少詩沼翻衣服貧敝唯思西歸無心展效臣問以往在海西見百姓人人應募爭欲從軍或請自辦衣糧謂之義征何為今日士卒如此咸言今日官府與曩時不同人心亦殊曩時東西征役身沒王事並蒙敕使弔祭使疏吏翻追贈官爵或以死者官爵回授子弟凡渡遼海者皆賜勳一轉自顯慶五年以來征人屢經渡海官不記録其死者亦無人誰何誰何問也問其為誰緣何而死也其壯而富者行錢參逐皆亡匿得免謂州縣官發人為兵其吏卒之參陪隨逐者富民行錢與之相為掩蔽得以亡匿按元和四年御史臺奏比來常參官入光範門及中書省所將參從人數頗多參從猶參逐也被發即行頃者破百濟及平壤苦戰破百濟見上卷顯慶五年平壤苦戰見龍朔二年被皮義翻許以勳賞無所不至及達西岸惟聞枷鎖推禁奪賜破勳州縣追呼無以自存公私困弊不可悉言以是昨發海西之日已有逃亡自殘者非獨至海外而然也又本因征役勳級以為榮寵而比年出征皆使勳官挽引比毗至翻挽引謂挽引舟車勞苦與白丁無殊百姓不願從軍率皆由此臣又問曩日士卒留鎮五年尚得支濟今爾等始經一年何為如此單露咸言初發家日惟令備一年資裝今已二年未有還期臣檢校軍士所留衣今冬僅可充事來秋以往全無準擬陛下留其海外欲殄滅高麗百濟高麗舊相黨援倭人雖遠亦共為影響若無鎮兵還成一國今既資戍守又置屯田所藉士卒同心同德而衆有此議何望成功自非有所更張厚加慰勞董仲舒曰琴瑟不調必改而更張之更工衡翻勞力到翻若止如今日以前處置恐師衆疲老立效無日逆耳之事或無人為陛下盡言處昌呂翻為于僞翻故臣披露肝膽昧死奏陳上深納其言遣右威衛將軍劉仁願將兵渡海以代舊鎮之兵將即亮翻仍敕仁軌俱還仁軌謂仁願曰國家懸軍海外欲以經略高麗其事非易易以豉翻今收穫未畢而軍吏與士卒一時代去軍將又歸將即亮翻下軍將同夷人新服衆心未安必將生變不如且留舊兵漸令收穫辦具資糧節級遣還節級猶今人言節次也未可還也仁願曰吾前還海西大遭讒謗云吾多留兵衆謀據海東幾不免禍幾居希翻今日唯知准敕准與準同本朝寇準為相省吏避其名凡文書準字皆去十後遂因而不改亶仁軌曰人臣苟利於國知無不為豈恤其私乃上表陳便宜上時掌翻自請留鎮海東上從之仍以扶餘隆為熊津都尉考異曰實録作熊津都督按時劉仁軌檢校熊津都督豈可復以隆為之明年實録稱熊津都尉扶餘隆與金法敏盟今從之三年初武后能屈身忍辱奉順上意故上排㣥議而立之及得志專作威福上欲有所為動為后所制上不勝其忿有道士郭行真出入禁中嘗為厭勝之術勝音升厭於協翻又於琰翻宦者王伏勝發之上大怒密召西臺侍郎同東西臺三品上官儀議之儀因言皇后專恣海內所不與請廢之上意亦以為然即命儀草詔左右奔告于后后遽詣上自訴詔草猶在上所上羞縮不忍復待之如初復扶又翻猶恐后怨怒因紿之曰我初無此心皆上官儀教我儀先為陳王咨議與王伏勝俱事故太子忠忠自陳王立為皇太子王府咨議參軍正五品上掌訏謨左右十二月丙戌儀下獄下遐嫁翻與其子庭芝王伏勝皆死籍沒其家戊子賜忠死于流所顯慶五年忠徙黔州罷政事為司禮太常伯司禮太常伯即禮部尚書左肅機即尚書左丞皆坐與儀交通故也朝直遙翻自是上每視事則后垂簾於後政無大小皆與聞之與讀曰預天下大權悉歸中宮黜陟殺生決於其口天子拱手而已中外謂之二聖考異曰唐曆㣥臣朝謁萬方表奏皆呼為二聖帝坐于東間后坐于西間后隨其愛憎生殺在口按武后雖悍戾豈得高宗尚在與高宗對坐受㣥臣朝謁乎恐不至此今從實録三年太子右中護檢校西臺侍郎樂彥瑋龍朔改左右庶子為左右中護二年二年春正月丁卯吐蕃遣使入見請復與吐谷渾和親見賢遍翻復扶又翻仍求赤水地畜牧即河源之赤水也本吐谷渾地畜吁玉翻二年二月壬午車駕發京師丁酉至合璧宮二年上語及隋煬帝謂侍臣曰煬帝拒諫而亡朕常以為戒虛心求諫而竟無諫者何也李績對曰陛下所為盡善㣥臣無得而諫褚遂良韓瑗之死不唯拒諫且殺諫者矣㣥臣誰敢復諫乎李績獻諛以苟祿利而不知凶于其家二年三月甲寅以兼司戎太常伯姜恪同東西臺三品恪寶誼之子也司戎太常伯即兵部尚書姜寶誼從高祖起兵於太原二年辛未東都乾元殿成乾元殿洛陽宮正殿也武后垂拱四年毀為明堂壬申朔車駕至東都二年疏勒弓月引吐蕃侵于闐敕西州都督崔知辨左武衛將軍曹繼叔將兵救之將即亮翻考異曰實録作西川都督按於時未有西川之名必西州也二年夏四月戊辰左侍極陸敦信龍朔改左右散騎常侍為左右侍極句斷處昌呂翻二年祕閣郎中李淳風龍朔改太史局為祕閣局令為郎中丞為郎戊寅乃增損劉焯皇極曆戊寅曆始行見一百八十七卷高祖武德二年隋時劉焯造甲子元曆謂之皇極曆為張賓所擯不得行焯之若翻五月辛卯行之更工衡翻二年秋七月己丑兗州都督鄧康王元裕薨二年上命熊津都尉扶餘隆與新羅王法敏釋去舊怨去羌呂翻八月壬子同盟于熊津城劉仁軌以新羅百濟耽羅倭國使者浮海西還耽羅國一曰儋羅居新羅武州南島上初附百濟後附新羅高麗亦遣太子福男來侍祠二年冬十月癸丑皇后表稱封禪舊儀祭皇地祇太后昭配而令公卿行事禮有未安至日妾請帥內外命婦奠獻內命婦自三至采女以備古者三夫人九嬪二十七世婦八十一御妻又有六尚二十四司二十四典二十四掌龍朔二年又置贊德宣議承閨承旨衛仙供奉侍櫛侍巾亦分為九品皆內官也外命婦皇姑封大長公主皇姊妹封長公主皇女封公主皇太子之女封郡主王之女封縣主王母妻為一品及國公母妻為國夫人三品以上母妻為郡夫人五品勳官三品封母妻為縣君散官並同職事勳官四品封母妻為鄉君其母並加太字各視其夫子之品禪社首以皇后為亞獻兗州博城縣有社首山燕氏越王貞之母蓋太宗嬪此時唯燕氏在也燕因肩翻壬戌詔封禪壇所設上帝后土位先用藳秸陶匏等秸古黠翻並宜改用茵褥罍爵其諸郊祀亦宜準此又詔自今郊廟享宴文舞用功成慶善之樂武舞用神功破陳之樂陳讀曰陳丙寅上發東都從駕文武儀仗數百里不絶從才用翻列營置幕彌亙原野東自高麗西至波斯烏長諸國自吐火羅踰五種至婆羅覩邏北踰山行六百里得烏萇國長讀曰萇各帥其屬扈從穹廬毳幕牛羊駝馬填咽道路時比歲豐稔朝直遙翻帥讀曰率從才用翻比毗至翻米斗至五錢麥豆不列于市十一月戊子上至濮陽濮陽顓頊之墟春秋衛成公自楚丘徙此漢為濮陽縣帶東郡晉分為濮陽郡隋為縣屬滑州唐屬濮州濮搏木翻騎奇寄翻從才用翻上問濮陽謂之帝丘何也德玄不能對許敬宗自後躍馬而前曰昔顓頊居此故謂之帝丘上稱善敬宗退謂人曰大臣不可以無學吾見德玄不能對心實羞之德玄聞之曰人各有能有不能吾不強對以所不知此吾所能也強其兩翻李績曰敬宗多聞信美矣德玄之言亦善也壽張人張公藝九世同居壽張縣前漢曰壽良屬東郡光武改壽張屬東平國隋屬濟州唐屬鄆州上過壽張幸其宅問所以能共居之故公藝書忍字百餘以進上善之賜以縑帛十二月丙午車駕至齊州留十日丙辰發靈巖頓至泰山下有司於山南為圓壇山上為登封壇社首山上為降禪方壇乾封元年丙寅六六六二年春正月戊辰朔上祀昊天上帝于泰山南己巳登泰山封玉牒上帝冊藏以玉匱配帝冊藏以金匱皆纏以金繩封以金泥印以玉璽藏以石䃭璽斯氏翻䃭古禫翻庚午降禪于社首祭皇地祇上初獻畢執事者皆趨下宦者執帷皇后升壇亞獻帷帟皆以錦繡為之周禮注在旁曰帷在上曰帟帟幄中座上承塵也帟音亦實俎豆登歌皆用宮人壬申上御朝覲壇受朝賀朝直遙翻下同赦天下改元文武官三品已上賜爵一等四品已下加一階先是階無泛加皆以勞考敍進至五品三品仍奏取進止先悉薦翻至是始有泛階比及末年服緋者滿朝矣比必利翻時大赦惟長流人不聽還李義府憂憤發病卒龍朔三年李義府流巂州朝士日憂其復入及聞其卒衆心乃安復扶又翻卒子恤翻丙戌車駕發泰山辛卯至曲阜曲阜魯侯伯禽所都應劭云曲阜在魯城中委曲長七八里隋始置曲阜縣屬兗州以少牢致祭少詩照翻癸未至亳州謁老君廟亳州谷陽縣漢苦縣也有老子祠是年改為真源縣亳州至東都八百九十八里丁丑至東都留六日甲申幸合璧宮夏四月甲辰至京師東都至京師八百五十里二年庚戌左侍極兼檢校右相陸敦信以老疾辭職拜大司成兼左侍極罷政事大司成即國子祭酒二年五月庚寅鑄乾封泉寶錢一當十俟期年盡廢舊錢期讀曰朞二年高麗泉蓋蘇文卒長子男生代為莫離支卒子恤翻長知兩翻初知國政出巡諸城使其弟男建男産知留後事或謂二弟曰男生惡二弟之逼惡烏路翻意欲除之不如先為計二弟初未之信又有告男生者曰二弟恐兄還奪其權欲拒兄不納男生潛遣所親往平壤伺之伺相吏翻二弟收掩得之乃以王命召男生男生懼不敢歸男建自為莫離支發兵討之男生走保別城使其子獻誠詣闕求救六月壬寅以右驍衛大將軍契苾何力為遼東道安撫大使將兵救之以獻誠為右武衛將軍使為鄉導驍堅堯翻契欺訖翻苾毗必翻大使疏吏翻將即亮翻鄉讀曰嚮又以右金吾衛將軍龐同善營州都督高侃為行軍總管同討高麗二年秋七月乙丑朔徙殷王旭輪為豫王以大司憲兼檢校太子左中護劉仁軌為右相初仁軌為給事中按畢正義事事見上卷顯慶元年出為青州刺史會討百濟仁軌當浮海運糧時未可行海行非遇順風不可遭風失船丁夫溺死甚衆命監察御史袁異式往鞫之溺奴狄翻監古銜翻義府謂異式曰君能辦事不憂無官異式至謂仁軌曰君與朝廷何人為讎宜早自為計仁軌曰仁軌當官不職國有常刑公以法斃之無所逃命若使遽自引決以快讎人竊所未甘乃具獄以聞異式將行仍自掣其鎖恐鎖不入簧行後得私開之也掣昌列翻上時掌翻義府言於上曰不斬仁軌無以謝百姓舍人源直心曰海風暴起非人力所及上乃命除名以白衣從軍自效事見上卷顯慶五年仁願不忍殺及為大司憲異式懼不自安仁軌瀝觴告之曰仁軌若念疇昔之事有如此觴仁軌既知政事異式尋遷詹事丞詹事丞正六品上仁軌聞之遽薦為司元大夫司元大夫即戶部郎中易以豉翻斯所謂矯枉過正矣二年八月辛丑司元太常伯兼檢校左相竇德玄薨二年初武士彠娶相里氏彠一虢翻相息亮翻生男元慶元爽又娶楊氏生三女長適越王府法曹賀蘭越石長知兩翻次皇后次適郭孝慎士彠卒元慶元爽及士彠兄子惟良懷運皆不禮於楊氏楊氏深銜之越石孝慎及孝慎妻並早卒越石妻生敏之及一女而寡后既立楊氏號榮國夫人越石妻號韓國夫人唐制國夫人位一品司衛少卿即衛尉少卿元慶自右衛郎將為宗正少卿此時已改宗正為司宗此時已改少府監為內府監謂惟良等曰頗憶疇昔之事乎今日之榮貴復何如對曰惟良等幸以功臣子弟早登宦籍揣分量才不求貴達豈意以皇后之故曲荷朝恩夙夜憂懼不為榮也復扶又翻分扶問翻荷下可翻朝直遙翻榮國不悅皇后乃上疏請出惟良等為遠州刺史上時掌翻外示謙抑實惡之也惡烏路翻下后惡同於是以惟良檢校始州刺史元慶為龍州刺史元爽為濠州刺史龍州古江油秦漢曹魏為無人之地鄧艾伐蜀由陰平景谷行無人之地七百里始至江油晉置陰平郡於此置平武縣至梁有楊李二姓大豪分據其地後魏平蜀置龍州濠州漢鍾離縣地晉安帝分置鍾離郡梁置北徐州後齊曰西楚州隋開皇二年改曰豪州唐曰濠州始州至京師一千六百六十二里至東都二千五百六十里龍州至京師二千六百六十里東都三千一百一十五里豪州至京師二千一百五十里東都一千三百一十三里以憂卒卒子恤翻下同元爽坐事流振州而死韓國夫人及其女以后故出入禁中皆得幸於上韓國尋卒其女賜號魏國夫人上欲以魏國為內職心難后未決后惡之會惟良懷運與諸州刺史詣泰山朝覲從至京師惟良等獻食朝直遙翻從才用翻考異曰舊傳云后諷上幸楊氏宅惟良等獻食今從實録后密置毒醢中使魏國食之暴卒因歸罪於惟良懷運丁未誅之改其姓為蝮氏懷運兄懷亮早卒其妻善氏尤不禮於榮國坐惟良等沒入掖庭榮國令后以他事朿棘鞭之肉盡見骨而死二年九月龐同善大破高麗兵泉男生帥衆與同善合詔以男生為特進遼東大都督兼平壤道安撫大使封玄菟郡公帥讀曰率使疏吏翻下同菟同都翻二年戊子金紫光祿大夫致仕廣平宣公劉祥道薨子齊賢嗣齊賢為人方正上甚重之為晉州司馬將軍史興宗嘗從上獵苑中因言晉州産佳鷂劉齊賢今為司馬請使捕之上曰劉齊賢豈捕鷂者邪鷂弋照翻卿何以此待之二年冬十二月己酉以李績為遼東道行軍大總管章十二行本管下有兼安撫大使五字乙十一行本同孔本同張校同退齊校同以司列少常伯安陸郝處俊副之安陸縣漢屬江夏郡宋分屬安陸郡隋唐屬安州處昌呂翻龐同善契苾何力並為遼東道行軍副大總管兼安撫大使如故其水陸諸軍總管並運糧使竇義積獨孤卿雲郭待封等並受績處分處昌呂翻分扶問翻河北諸州租賦悉詣遼東給軍用待封孝恪之子也郭孝恪事太宗戰死於龜茲績欲與其壻京兆杜懷恭偕行以求勳效懷恭辭以貧績贍之復辭以無奴馬贍昌豔翻下同復扶又翻又贍之懷恭辭窮乃亡匿岐陽山中謂人曰公欲以我立法耳績聞之流涕曰杜郎疏放今人猶呼壻為郎乃止二年二年春正月上耕藉田有司進耒耜加以雕飾上曰耒耜農夫所執豈宜如此之麗命易之耒盧對翻既而耕之九推乃止耕藉之制月令及鄭玄注周禮皆云天子三推盧植注禮記曰天子耕藉一發九推耒此用盧說也推吐雷翻二年自行乾封泉寶錢穀帛踊貴商賈不行賈音古癸未詔罷之二年二月丁酉涪陵悼王愔薨愔上弟也涪音浮愔於今翻二年辛丑復以萬年宮為九成宮永徽二年改九成宮為萬年宮復扶又翻又如字二年生羌十二州為吐蕃所破三月戊寅悉罷之二年上屢責侍臣不進賢衆莫敢對司列少常伯李安期對曰天下未嘗無賢亦非㣥臣敢蔽賢也司列少常伯即吏部侍郎少始照翻為讒者已指為朋黨滯淹者未獲伸而在位者先獲罪是以各務杜口耳陛下果推至誠以待之其誰不願舉所知此在陛下非在㣥臣也上深以為然安期百藥之子也李百藥德林之子比毗至翻二年夏四月乙卯西臺侍郎楊弘武戴至德正諫大夫兼東臺侍郎李安期東臺舍人昌樂張文瓘司列少常伯兼正諫大夫河北趙仁本並同東西臺三品龍朔改給事中為東臺舍人諫議大夫為正諫大夫樂音洛素之弟子楊素仕隋貴顯胄之兄子也戴胄相太宗上陽宮在洛陽宮城之西南隅南臨洛水西距穀水東即宮城北連禁苑宮內正門正殿皆東向正門曰提象正殿曰觀風其內別殿亭觀九所上陽之西隔穀水有西上陽宮虹梁跨穀行幸往來廣既馬萬匹倉庫漸虛張文瓘諫曰隋鑒不遠願勿使百姓生怨上納其言減廣既馬數千匹二年秋八月己丑朔日有食之二年辛亥東臺侍郎同東西臺三品李安期出為荊州長史荊州京師東南一千七百三十里至東都一千三百三十五里宋白曰荊州秦南郡地漢為臨江國江左置荊州以為重鎮擬周之分陝唐為大都督府二年九月庚申上以久疾命太子弘監國監古銜翻二年辛未李績拔高麗之新城使契苾何力守之績初度遼謂諸將曰新城高麗西邊要害不先得之餘城未易取也易以豉翻遂攻之城人師夫仇等縛城主開門降降戶江翻績引兵進擊一十六城皆下之龐同善高侃尚在新城泉男建遣兵襲其營左武衛將軍薛仁貴擊破之侃進至金山與高麗戰不利高麗乘勝逐北仁貴引兵橫擊大破之斬首五萬餘級新書作斬馘五千三城後皆置為州郭待封以水軍自別道趣平壤績遣別將馮師本載糧仗以資之趣七喻翻將即亮翻師本船破失期待封軍中飢窘欲作書與績恐為虜所得知其虛實乃作離合詩以與績離合詩離析字畫合之成文以見其意軍事方急何以詩為必斬之行軍管記通事舍人元章十二行本元上有河南二字乙十一行本同張校同云無注本亦無萬頃為釋其義管記掌軍中書檄為于僞翻萬頃作檄高麗文曰不知守鴨緑之險泉男建報曰謹聞命矣即移兵據鴨緑津唐兵不得渡上聞之流萬頃於嶺南郝處俊在高麗城下未及成列高麗奄至軍中大駭處俊據胡床方食乾糒胡床即今之交床乾音干糒音備擊敗之敗補邁翻將士服其膽略二年冬十二月甲午詔自今祀昊天上帝五帝皇地祇神州地祇並以高祖太宗配仍合祀昊天上帝五帝於明堂此兼用貞觀顯慶之禮二年是歲海南獠陷瓊州瓊州本隋朱崖郡之瓊山縣貞觀五年置瓊州獠魯皓翻總章元年戊辰六六八以將作明堂改元是年三月方改元二年春正月壬子以右相劉仁軌為遼東道副大總管二年二月壬午李績等拔高麗扶餘城扶餘國之故墟故城存其名乘勝將三千人將攻扶餘城諸將以其兵少止之仁貴曰兵不在多顧用之何如耳遂為前鋒以進與高麗戰大破之殺獲萬餘人遂拔扶餘城扶餘川中四十餘城皆望風請服侍御史洛陽賈言忠奉使自遼東還使疏吏翻上問以軍事言忠對曰高麗必平上曰卿何以知之對曰隋煬帝東征而不克者人心離怨故也事見隋煬帝紀高麗未有釁也事見太宗紀釁許覲翻權臣亶命蓋蘇文死男建兄弟內相攻奪男生傾心內附為我鄉導鄉讀曰嚮彼之情僞靡不知之以陛下明聖國家富強將士盡力以乘高麗之亂其勢必克不俟再舉矣且高麗連年饑饉妖異屢降妖於喬翻人心危駭其亡可翹足待也上又問遼東諸將孰賢謂征遼東之諸將也薛仁貴勇冠三軍龐同善雖不善鬬而持軍嚴整高侃勤儉自處忠果有謀契苾何力沈毅能斷雖頗忌前冠古玩翻處昌呂翻沈持林翻斷丁亂翻忌前忌人在己前也而有統御之才然夙夜小心忘身憂國皆莫及李績也上深然其言泉男建復遣兵五萬人救扶餘城復扶又翻與李績等遇於薛賀水新書作薩賀水大破之斬獲三萬餘人進攻大行城拔之二年朝廷議明堂制度略定三月庚寅赦天下改元二年戊寅上幸九成宮二年夏四月丙辰彗星見于五車五車五星五帝車舍也五帝坐也主天子五兵一曰主五穀豐耗西北大星曰天庫主太白主秦次東北曰獄主辰星主燕趙次東星曰天倉主歲星主魯衛次東南曰司空主填星主楚次西南曰卿星主熒惑主魏五星有變皆以其所占之據舊紀五車在昴畢間見賢遍翻下同彗祥歲翻減常膳撤樂許敬宗等奏請復常曰彗見東北高麗將滅之兆也上曰朕之不德謫見于天豈可歸咎小夷且高麗百姓亦朕之百姓也不許戊辰彗星滅二年辛巳西臺侍郎同東西臺三品楊弘武薨二年八月辛酉卑列道行軍總管右威衛將軍劉仁願坐征高麗逗留流姚州二年癸酉車駕還京師二年九月癸巳李績拔平壤績既克大行城諸軍出他道者皆與績會進至鴨緑柵高麗發兵拒戰績等奮擊大破之追奔二百餘里拔辱夷城諸城遁逃及降者相繼降戶江翻下同契苾何力先引兵至平壤城下績軍繼之圍平壤月餘高麗王藏遣泉男産帥首領九十八人持白幡詣績降績以禮接之帥讀曰率泉男建猶閉門拒守頻遣兵出戰皆敗男建以軍事委僧信誠信誠密遣人詣績請為內應後五日信誠開門績縱兵登城鼓譟焚城四月月當作角否則作周不死刺七亦翻遂擒之高麗悉平二年冬十月戊午以烏荼國婆羅門盧迦逸多為懷化大將軍烏荼國一曰烏萇直天竺南東距勃律六百里西罽賓四百里婆羅門僧也唐置懷化大將軍從三品以授蕃官合音閣上將餌之東臺侍郎郝處俊諫曰修短有命非藥可延貞觀之末觀古玩翻先帝服那羅邇娑婆寐藥竟無效大漸之際名醫不知所為議者歸罪娑婆寐將加顯戮恐取笑戎狄而止娑婆寐事見上卷顯慶二年願陛下深察上乃止二年李績將至上命先以高藏等獻于昭陵具軍容奏凱歌入京師獻于太廟十二月丁巳上受俘于含元殿東內正殿曰含元殿唐六典曰含元殿即龍首山之東趾階上高於平地四十餘尺南去丹鳳門四百餘步東西廣五百步殿前玉階三級每級引出一螭頭其下為龍尾道委蛇屈曲凡七轉赦以為司平太常伯員外同正司平太常伯即工部尚書按舊書永徽五年尚藥奉御蔣孝璋員外特置仍同正員員外同正自此始司宰少卿即光祿少卿泉男生為右衛大將軍李績以下封賞有差泉男建流黔中黔音琴扶餘豐流嶺南分高麗五部百七十六城六十九萬餘戶為九都督府四十二州新城州遼城州哥勿州衛樂州舍利州居素州越喜州去旦州建安州凡有九都督府四十二州存於志者南蘇蓋牟代那倉巖磨米積利黎山延津木底安市諸北識利拂涅拜漢十四州而已置安東都護府於平壤以統之擢其酋帥有功者為都督刺史縣令與華人參理酋慈由翻帥所類翻理猶治也時避上名以治為理通鑑因唐史成文以右威衛大將軍薛仁貴檢校安東都護總兵二萬人以鎮撫之丁卯上祀南郊告平高麗以李績為亞獻己巳謁太廟二年渭南尉劉延祐弱冠登進士第渭南縣屬雍州後魏之渭南郡後周廢為縣冠古玩翻唐雍州諸縣萬年長安為赤縣餘縣為畿縣六典曰城內為京縣城外為畿縣足下春秋甫爾遽亶大名宜稍自貶抑無為獨出人右也史言李績愛人以德二年時有敕征遼軍士逃亡限內不首及首而更逃者身斬首式又翻妻子籍沒太子上表上時掌翻以為如此之比其數至多或遇病不及隊伍怖懼而逃怖普布翻或因樵採為賊所掠或渡海漂沒或深入賊庭為所傷殺軍法嚴重同隊恐並獲罪即舉以為逃軍旅之中不暇勘當當丁浪翻直據隊司通狀關移所屬妻子沒官情實可哀書曰與其殺不辜寧失不經書大禹謨之言注云經常也寧失不常之罪不枉不辜之善免其配沒從之二年甲戌司戎太常伯姜恪兼檢校左相司平太常伯閻立本守右相二年是歲京師及山東江淮旱饑二年二年春二月辛酉以張文瓘為東臺侍郎以右肅機檢校太子中護譙人李敬玄為西臺侍郎譙縣帶亳州先是同三品不入銜至是始入銜先悉薦翻考異曰陳紀在乾封二年文瓘始同三品時今從舊本紀陳字必誤二年癸亥以雍州長史盧承慶為司刑太常伯雍於用翻承慶常考內外官有一官督運遭風失米承慶考之曰監運損糧考中下監古銜翻其人容色自若無言而退承慶重其雅量改注曰非力所及考中中既無喜容亦無愧詞又改曰寵辱不驚考中上二年三月丙戌東臺侍郎郝處俊同東西臺三品二年丁亥詔定明堂制度其基八觚觚攻乎翻方稜也其宇上圓覆以清陽玉葉覆敷又翻時按淮南子清陽為天故覆明堂以清陽之色玉葉非必以玉為之蓋亦瓦之類謂之葉者尚朴之意猶茨之以茅也曰玉者示寶貴之耳其門牆階級窗櫺楣柱枊楶枅栱說文曰在牆曰牖在屋曰窗釋名窗聰也於內見外之聰明也櫺盧經翻楯間于窗隔也楣屋梠說文曰楣屋櫋毛晃曰梀下橫木曰楣柱楹也枊魚剛翻斜桷謂之飛枊楶子結翻梁上欂櫨枅堅奚翻屋櫨所以承桁栱居竦翻大杙又栱科詔下之後衆議猶未決又會饑饉竟不果立二年夏四月己酉朔上幸九成宮二年高麗之民多離叛者敕徙高麗戶三萬八千二百於江淮之南及山南京西諸州空曠之地留其貧弱者使守安東二年六月戊申朔日有食之二年秋八月丁未朔詔以十月幸涼州時隴右虛耗議者多以為未宜遊幸上聞之辛亥御延福殿九成宮中有延福殿自古帝王莫不巡守守手又翻故朕欲巡視遠俗若果為不可何不面陳而退有後言何也自宰相以下莫敢對詳刑大夫來公敏獨進曰詳刑大夫即大理少卿巡守雖帝王常事然高麗新平餘寇尚多西邊經略亦未息兵隴右戶口雕弊鑾輿所至供億百端誠為未易易以豉翻外間實有竊議但明制已行故㣥臣不敢陳論耳上善其言為之罷西巡為于僞翻未幾擢公敏為黃門侍郎幾居豈翻二年甲戌改瀚海都護府為安北都護府瀚海都護府見上龍朔三年二年九月丁丑朔詔徙吐谷渾部落就涼州南山議者恐吐蕃侵暴使不能自存欲先發兵擊吐蕃右相閻立本以為去歲饑歉未可興師議久不決竟不果徙二年庚寅大風海溢漂永嘉安固六千餘家漢順帝永建四年分章安東甌鄉立永寧縣江左改曰永豐隋平陳改曰永嘉縣又孫吳立羅陽縣孫皓改曰安陽縣晉平吳改曰安固縣並屬永嘉郡唐初屬東嘉州貞觀元年州廢二縣屬栝州二年冬十月丁巳車駕還京師二年十一月丁亥徙豫王旭輪為冀王更名輪更工衡翻二年司空太子太師英貞武公李績寢疾英者封國名貞武其諡也使歸侍疾上及太子所賜藥績則餌之子弟為之迎醫為于僞翻下親為非為久為同皆不聽進曰吾本山東田夫遭值聖明致位三公年將八十考異曰舊傳云績年八十六臨終語弟弼云年將八十新傳改云年踰八十按新舊傳實録皆云大業末翟讓聚衆為盜績年十七往從之自大業十三年至此五十二年若據舊傳年八十六則年十七當在開皇時不得云大業末也總章元年賈言忠對高宗云績年登八十去此止一年若據新傳績滅高麗時年已八十五亦不得云年登八十今從實録修短有期豈能復就醫工求活復扶又翻下不復同一旦忽謂其弟司衛少卿弼曰吾今日少愈可共置酒為樂日少詩沼翻樂音洛於是子孫悉集酒闌謂弼曰吾自度必不起度徒洛翻故欲與汝曹為別耳汝曹勿悲泣聽我約束我見房杜平生勤苦僅能立門戶遭不肖子蕩覆無餘謂房遺愛杜荷也今悉付汝葬畢汝即遷入我堂撫養孤幼謹察視之其有志氣不倫交遊非類者皆先撾殺然後以聞以績之智蓋知敬業必為變也豈知敬業乃忠於唐室邪撾則瓜翻自是不復更言十二月戊申薨上聞之悲泣葬日幸未央宮登樓望轜車慟哭起冢象陰山鐵山烏德鞬山轜音而轜車喪車也所以載柩烏德鞬山在回紇牙帳西南以旌其破突厥薛延陀之功績破突厥見一百九十三卷貞觀四年破薛延陀見一百九十八卷二十年厥九勿翻績為將有謀善斷將即亮翻斷丁亂翻與人議事從善如流戰勝則歸功於下所得金帛悉散之將士故人思致死所向克捷臨事選將必訾相其狀貌豐厚者遣之訾即移翻訾之為言量也相息亮翻或問其故績曰薄命之人不足與成功名閨門雍睦而嚴其姊嘗病績已為僕射親為之煮粥風回爇其須鬢爇如悅翻姊曰僕妾幸多何自苦如是績曰非為無人使令也顧姊老績亦老雖欲久為姊煮粥其可得乎績常謂人我年十二三時為亡賴賊亡讀曰無逢人則殺十四五為難當賊有所不愜則殺人愜苦叶翻臨陳乃殺之陳讀曰陳二十為大將用兵以救人死績長子震早卒長知兩翻卒子恤翻震子敬業襲爵考異曰劉餗小說云高宗時㣥蠻為寇討之輒不利乃除徐敬業為刺史發卒郊迎敬業盡放令還單騎至府賊聞新刺史至皆繕理以待敬業一無所問處置他事已畢方曰賊安在曰在南岸乃從二佐吏而往觀之莫不駭愕賊初持兵覘望及見船中無人及兵仗更閉營藏隱敬業直入其營內告云國家知汝等為貪吏所害非有他惡可悉歸田後去者為賊唯召其帥責以不早降之意各杖數十而遣之境內肅然其祖英公壯其膽略曰吾不辦此然破我家必此兒也按敬業武后時舉兵旋踵敗亡若有智勇何至如此今不取二年時承平既久選人益多選須絹翻下同是歲司列少常伯裴行儉始與員外郎張仁禕唐制尚書二十四司各司有郎中二員從五品上員外郎二員從六品上禕吁韋翻引銓注之法又定州縣升降官資高下其後遂為永制無能革之者大略唐之選法取人以身言書判唐擇人之法有四一曰身取其體貌豐偉二曰言取其言辭辨正三曰書取其楷法遒美四曰判取其文理優長始集而試觀其書判已試而銓察其身言已銓而注詢其便利已注而唱集衆告之然後類以為甲先簡僕射乃上門下給事中讀侍郎省侍中審之不當者駮下上時掌翻省悉景翻當丁浪翻駮北角翻既審然後上聞主者受旨奉行各給以符謂之告身兵部武選亦然武選兵部主之以騎射及翹關負米翹關長丈七尺徑二寸半凡十舉後手持關距出處無過一尺負米者負米五斛行二十步皆為中第騎奇寄翻而能試文三篇謂之宏詞試判三條謂之拔萃入等者得不限而授其黔中嶺南閩中州縣官不由吏部委都督選擇土人補授黔音琴閩眉巾翻選如字凡居官以年為考六品以下四考為滿咸亨元年庚午六七是年三月始改元二年春正月丁丑右相劉仁軌請致仕許之二年三月甲戌朔以旱赦天下改元二年丁丑改蓬萊宮為含元宮即含元殿以為宮名二年壬辰太子少師許敬宗請致仕許之二年敕突厥酋長子弟事東宮酋慈由翻長知兩翻西臺舍人徐齊聃上疏聃他酣翻上時掌翻以為皇太子當引文學端良之士置左右豈可使戎狄醜類入侍軒闥又奏齊獻公即陛下外祖雖子孫有犯豈應上延祖禰今周忠孝公廟甚修而齊獻公廟毀廢齊獻公文德皇后父長孫晟也周忠孝公皇后父武士彠也禰乃禮翻彰孝理之風孝理即孝治避上名改治為理齊聃充容之弟也齊聃姊入宮為充容列於九嬪二年夏四月吐蕃陷西域十八州又與于闐襲龜茲撥換城陷之罷龜茲于闐焉耆疏勒四鎮闐徒賢翻龜茲音丘慈辛亥以右衛大將軍薛仁貴為邏娑道行軍大總管邏娑川吐蕃贊普牙在焉有邏些城以討吐蕃且援送吐谷渾還故地二年庚午上幸九成宮二年高麗酋長劍牟岑反立高藏外孫安舜為主以左監門大將軍高侃為東州道行軍總管高麗在東時已列置州府故曰東州道監古銜翻安舜殺劍牟岑奔新羅二年六月壬寅朔日有食之二年秋八月丁巳車駕還京師二年郭待封先與薛仁貴並列及征吐蕃恥居其下仁貴所言待封多違之軍至大非川自鄯州鄯城縣西行三百餘里至大非川烏海在漢哭山西隋屬河源郡界杜佑曰吐蕃國出鄯城五百里過烏海暮春之月山有積雪地有冷瘴令人氣急不甚為害趣七喻翻烏海險遠軍行甚難輜重自隨難以趨利重直用翻下同趨七喻翻宜留二萬人為兩柵於大非嶺上輜重悉置柵內吾屬帥輕鋭倍道兼行掩其未備破之必矣仁貴帥所部前行擊吐蕃於河口大破之河口積石河口也帥讀曰率進屯烏海以俟待封待封不用仁貴策將輜重徐進未至烏海遇吐蕃二十餘萬待封軍大敗還走悉棄輜重仁貴退屯大非川吐蕃相論欽陵將兵四十餘萬就擊之將即亮翻下同杜佑曰祿東贊論欽陵本姓薛氏世為大論後遂以官為氏大論吐蕃統理國事之官也相息亮翻唐兵大敗死傷略盡仁貴待封與阿史那道真並脫身免與欽陵約和而還還音旋又如字敕大司憲樂彥瑋即軍按其敗狀械送京師三人皆免死除名欽陵祿東贊之子也祿東贊事始一百九十五卷太宗貞觀十四年于張于作干勃論皆有才略祿東贊卒卒子恤翻下氏卒同欽陵代之章十二行本之下有秉政二字乙十一行本同退齊校同張校同云無注本亦無三弟將兵居外鄰國畏之二年關中旱饑九月丁丑詔以明年正月幸東都二年甲申皇后母魯國忠烈夫人楊氏卒敕文武九品以上及外命婦並詣宅弔哭二年閏月癸卯皇后以久旱請避位不許二年壬子加贈司徒周忠孝公武士彠為太尉太原王夫人為王二年甲寅以左相姜恪為涼州道行軍大總管以禦吐蕃二年冬十月乙未太子右中護同東西臺三品趙仁本為左肅機罷政事龍朔二年改左右庶子為左右中護二年庚寅詔官名皆復舊改官名見上卷龍朔二年按新書帝紀係十二月庚寅王崇武標點容肇祖聶崇岐覆校
