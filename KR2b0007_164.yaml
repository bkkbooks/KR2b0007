body:
  text: 資治通鑑卷第一百六十四端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千八百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注梁紀二十任約告急太宗簡文皇帝下大寶二年辛未五五一任約告急春正月新吳余孝頃舉兵拒侯景漢靈帝中平中立新吳縣屬豫章郡隋省新吳入建昌縣不克任約告急庚戌湘東王繹遣護軍將軍尹悅安東將軍杜幼安巴州刺史王珣將兵二萬自江夏趣武昌江夏今鄂州武昌今壽昌軍將即亮翻夏戶雅翻趣七喻翻考異曰典略在去年十一月今從太清紀任約告急楊乾運攻拔劍閣楊法昌章乙十一行本昌作王果按本卷三葉作琛退保石門去年武陵王紀遣楊乾運討楊法琛祝穆曰大劍山在今劍門關之劍門縣大劍山西北三十里有小劍山輿地廣記曰山有小石門穿山通道六丈有餘即秦所通石牛道也又魏收志武都郡治石門縣隋為將利縣魏志東益州武興郡有石門縣仇池郡有西石門縣輿地紀勝龍州江油縣東百里有石門戍杜佑曰龍州治江油縣有石門山與氐分界蓋蜀多山險地之以石門名者多矣唐志利州景谷縣西有石門關此蓋楊法昌退保之地晉永嘉流寓置南陰平於帛丿糸竹之萇楊楊乾運既拔劍閣無緣棄險退據帛丿糸竹五代志南梁州有陰平縣宋之北陰平郡也九域志劍州東北五十五里有劍門縣西北百六十里有陰平縣乾運所據其此陰平歟若漢志之陰平道則今之文州是也又在西北故以此為南陰平任約告急辛亥齊主祀圜丘任約告急張彪遣其將趙稜圍錢塘孫鳳圍富春侯景遣儀同三司田遷趙伯超救之稜鳳敗走考異曰典略去年十一月彪自圍錢塘與趙伯超戰敗于臨平死者八萬餘人走還剡伯超兄子稜在彪軍中謀殺彪僞請與彪盟引小刀披心出血自歃彪信之亦取刀刺血報之刀適至心稜以手按之刀斜入不深彪頓絶稜謂已死出外告彪諸將云彪已死當共求富貴彪左右韓武入視之彪已蘇細聲謂曰我尚活可與手武遂誅稜彪復奉表於湘東王繹今從太清紀伯超之兄子也任約告急癸亥齊主耕藉田乙丑享太廟任約告急魏楊忠圍汝南李素戰死李素納邵陵王綸見上卷上年乙亥城陷執邵陵攜王綸殺之考異曰太清紀云宇文泰遣忠襲綸詐稱來相禮接綸白服與相見執而害之今從梁書南史嶽陽王察取而葬之任約告急或告齊太尉彭樂謀反壬辰樂坐誅任約告急齊遣散騎常侍曹文皎使于江陵散悉亶翻騎奇寄翻使疏吏翻考異曰典略在正月丙午朔今從太清紀湘東王繹使兼散騎常侍王子敏報之任約告急侯景以王克為太師宋子仙為太保元羅為太傅郭元建為太尉張化仁為司徒或曰張化仁即支化仁章乙十一行本正作支退齊校同按胡刻本卷八葉作支王偉為尚書左僕射索超世為右僕射索蘇各翻景置三公官動以十數儀同尤多以子仙元建化仁為佐命元功偉超世為謀主于子悅彭雋主擊斷斷丁亂翻陳慶呂季略盧暉略丁和等為爪牙梁人為景用者則故將軍趙伯超前制局監周石珍內監嚴亶內監領內器仗自餘王克元羅及侍中殷不害太常周弘正等景從人望加以尊位非腹心之任也任約告急北兗州刺史蕭雍謀降魏侯景殺之任約告急楊乾運進據平興平興者楊法琛所治也法琛退保魚石洞乾運焚平興而歸五代志義城郡景谷縣舊曰白水置平興郡唐志武德四年以利州之景谷及龍州之方維置沙州貞觀元年州廢省方維為鎮以景谷還屬利州西有石門關西北有白埧魚老二鎮城九域志文州曲水縣有方維鎮劉昫曰利州景谷縣漢白水縣地宋置平興縣隋為景谷縣任約告急李遷仕收衆還擊南康去年李遷仕敗走保寧都將即亮翻生擒遷仕斬之考異曰太清紀在四月云遷仕追霸先於雩都縣連營相持百餘日是月廣州刺史蕭勃遣歐陽隗水步萬餘人來援隗與戰大破之斬遷仕首餘黨悉降霸先引軍前進今從陳書以為江州刺史任約告急三月丙午齊襄城王淯卒任約告急庚戌魏文帝殂年四十五欽文帝之長子也母乙弗后任約告急乙卯徐文盛等克武昌進軍蘆洲蘆洲在武昌西昔伍胥去楚出關於江上求渡漁父歌曰灼灼兮已私與子期兮蘆之漪子胥既渡解劍與之辭不受漁父遂覆舟而死即其處水經注漢邾縣故城南對蘆洲蘇軾曰武昌縣劉郎洑正與蘆洲相對伍子胥奔吳所從渡江也亦曰伍洲任約告急己未齊以湘東王繹為梁相國建梁臺總百揆承制任約告急齊司空司馬子如自求封王齊主怒庚子免子如官任約告急任約告急侯景自帥衆西上攜太子大器從軍以為質帥讀曰率上時掌翻質音致留王偉居守守手又翻閏月景發建康考異曰梁帝紀三月丁未景發京師典略云閏三月丁未按乙卯徐文盛克武昌不容丁未景已發建康閏三月甲戌朔無丁未蓋字誤也舳艫相接舳音逐艫音盧上卷作田祖龍此作田龍祖必有一誤五代志黃州黃岡縣齊曰南安置齊安郡九域志黃岡縣有齊安鎮壬寅景軍至西陽與徐文盛夾江築壘癸卯文盛擊破之射其右丞庫狄式和墜水死射而亦翻景遁走還營任約告急夏四月甲辰魏葬文帝于永陵任約告急郢州刺史蕭方諸年十五以行事鮑泉和弱常侮易之易以豉翻或使伏牀騎背為馬恃徐文盛軍在近不復設備日以蒱酒為樂復扶又翻蒱酒樗蒱飲酒也樂音洛侯景聞江夏空虛夏戶雅翻乙巳使宋子仙任約帥精騎四百由淮內襲郢州自西陽至江夏百五十餘里景使宋子仙等蓋由蘆洲上流渡兵以襲之帥讀曰率騎奇寄翻下同丙午大風疾雨天色晦冥有登陴望見賊者告泉曰虜騎至矣泉曰徐文盛大軍在下賊何由得至當是王珣軍人還耳既而走告者稍衆始命閉門子仙等已入城方諸方踞泉腹以五色綵辮其髯辮補典翻交結也見子仙至方諸迎拜泉匿于牀下子仙俯窺見泉素髯間綵間古莧翻驚愕遂擒之及司馬虞豫送於景所景因便風中江舉帆遂越文盛等軍丁未入江夏文盛衆懼而潰與長沙王韶等逃歸江陵上甲侯韶去年繹封為長沙王遂降於景降戶江翻湘東王繹以王僧辨為大都督帥巴州刺史丹楊淳于量定州刺史杜龕宜州刺史王琳郴州刺史裴之橫東擊景五代志巴陵郡梁置巴州夷陵郡梁置宜州桂陽郡梁置郴州龕苦含翻郴丑林翻戊申僧辨等軍至巴陵自江陵至巴陵四百一十里自巴陵至江夏三百五十里因留戍之繹遺僧辨書曰賊既乘勝必將西下遺于季翻自江夏指江陵當作西上不勞遠擊但守巴丘巴丘即巴陵有巴丘山無慮不克又謂將佐曰賊若水步兩道直指江陵此上策也據夏首積兵糧中策也悉力攻巴陵下策也巴陵城小而固僧辨足可委任景攻城不拔野無所掠暑疫時起食盡兵疲破之必矣湘東安能料敵如此當時作史者為之辭耳將即亮翻夏戶雅翻武州刺史杜崱自武陵引兵會僧辨五代志湘陰縣梁置羅州及嶽陽郡湘陰隋屬巴陵郡又梁置武州於武陵郡崱士力翻景使丁和將兵五千守夏首宋子仙將兵一萬為前驅趣巴陵趣七喻翻分遣任約直指江陵景帥大兵水步繼進於是緣江戍邏望風請服景拓邏至于隱磯拓斥開也邏遮也巡也拓開巡邏以張兵勢邏魯可翻又魯佐翻水經江水自公安而東過下雋縣北又東徑彭城磯北彭城磯北對隱磯二磯之間大江之中也偃旗臥鼓安若無人壬戌景衆濟江自隱磯濟江考異曰梁帝紀作甲子今從太清紀問城內為誰答曰王領軍騎曰何不早降降戶江翻僧辨曰大軍但向荊州此城自當非礙言兵若向荊州此城當非遮礙頃之執王珣等至城下使說其弟琳琳曰兄受命討賊不能死難說式芮翻難乃且翻曾不內慙翻欲賜誘取弓射之珣慙而退誘音酉射而亦翻景肉薄百道攻城薄伯各翻城中鼓譟矢石雨下景士卒死者甚衆乃退僧辨遣輕兵出戰凡十餘返皆捷景被甲在城下督戰被皮義翻僧辨著綬乘輿奏鼓吹巡城著陟略翻綬音受吹昌瑞翻景望之服其膽勇嶽陽王察聞侯景克郢州遣蔡大寶將兵一萬進據武寧五代志竟陵郡樂鄉縣舊置武寧郡劉昫曰樂鄉漢鄀縣也其地當在今郢州長壽縣西北宋白曰桓玄立武寧郡於故編縣城其屬有長林縣與郡俱立分編縣所置也詐稱赴援使疏吏翻衆議欲答以侯景已破令其退軍湘東王繹曰今語以退軍語牛倨翻是趣之令進也趣讀曰促乃使謂大寶曰嶽陽纍啓連和不相侵犯卿那忽據武寧今當遣天門太守胡僧祐精甲二萬鐵馬五千頓湕水待時進軍察聞之召其軍還湕居偃翻還從宣翻又如字僧祐南陽人也任約告急五月魏隴西襄公李虎卒任約告急侯景晝夜攻巴陵不克軍中食盡疾疫死傷太半湘東王繹遣晉州刺史蕭惠正將兵援巴陵惠正辭不堪舉胡僧祐自代僧祐時坐謀議忤旨繫獄據梁書胡僧祐傳時西沮蠻反使僧祐討之令盡誅其渠帥僧祐諫忤旨下獄忤五故翻拜武猛將軍令赴援戒之曰賊若水戰但以大艦臨之必克艦戶黯翻若欲步戰自可鼓棹直就巴丘不須交鋒也僧祐至湘浦湘水入湖之口曰浦塉及尺翻僧祐由他路西上上時掌翻約謂其畏己急追之及於芊口據姚思廉梁書芊口在南平郡安南縣界吳兒何不早降降戶江翻走何所之僧祐不應潛引兵至赤沙亭水經注灃澧徑安南縣南又東與赤湖水會二縣皆屬南平郡巴陵志洞庭湖在巴丘西西吞赤沙南連青草橫亙七八百里又有赤亭城三面臨水即胡僧祐所據杜佑曰巴陵郡西華容界有赤亭城城近赤亭湖因名任約擒於此會信州刺史陸法和至與之合軍法和有異術隱於江陵百里洲盛弘之荊州記曰百里洲在枝江縣縣左右有數十洲槃布川中百里洲最為大一如苦行沙門苦行沙門謂沙門能清苦守戒行者也處昌呂翻行下孟翻多中中竹仲翻人莫能測侯景之圍臺城也或問之曰事將何如法和曰凡人取果宜待熟時不撩自落撩落雕翻攏取物也固問之法和曰亦克亦不克亦克謂侯景取臺城不克謂景終於敗也法和若設為兩端之言使人莫之測而卒之言驗法和自請擊之繹許之壬寅約至赤亭六月甲辰僧祐法和縱兵擊之約兵大潰殺溺死者甚衆溺奴狄翻擒約送江陵景聞之乙巳焚營宵遁以丁和為郢州刺史當宋子仙等衆號二萬戍郢城別將支化仁鎮魯山考異曰梁帝紀作魏司徒張化仁按魏司徒安得為景守城今從典略考異曰典略云江州刺史今從太清紀梁於晉熙郡置晉州順流而下丁和以大石磕殺鮑泉及虞預沈於黃鶴磯磕古盍翻沈持林翻祝穆曰黃鶴山一名黃鵠山在江夏縣東九里近縣西北二里有黃鶴磯水經注黃鵠山東北對夏口城黃鵠磯直鸚鵡洲之下尾任約至江陵繹赦之徐文盛坐怨望下獄死下遐嫁翻下東下同巴州刺史余孝頃遣兄子僧重將兵救鄱陽于慶退走余孝頃起於新吳梁授以巴州刺史考異曰長曆六月癸卯朔太清紀一日慶走二日擒任約三日景走今從梁帝紀繹以王僧辨為征東將軍尚書令胡僧祐等皆進位號使引兵東下陸法和請還既至謂繹曰侯景自然平矣蜀賊將至請守險以待之法和知武陵王紀必東下巫峽之口也庚申王僧辨至漢口先攻魯山擒支化仁送江陵辛酉攻郢州克其羅城斬首千級宋子仙退據金城僧辨四面起土山攻之豫州刺史荀朗自巢湖出濡須邀景破其後軍荀朗起兵據巢湖帝密詔授豫州刺史使討景船前後相失太子船入樅陽浦樅七容翻船中腹心皆勸太子因此入北太子曰自國家喪敗志不圖生主上蒙塵寧忍違離左右喪息浪翻離力智翻吾今若去是乃叛父非避賊也因涕泗嗚咽即命前進毛詩注自目曰涕自鼻曰泗史言哀太子之孝甲子宋子仙等困蹙乞輸郢城身還就景王僧辨僞許之命給船百艘以安其意艘蘇刀翻浮舟將發僧辨命杜龕帥精勇千人攀堞而上龕苦含翻帥讀曰率下同堞達協翻上時掌翻鼓譟奄進水軍主宋遙帥樓船暗江雲合言樓船四合如雲江為之暗至白楊浦白楊浦蓋去郢城未遠周鐵虎生擒子仙及丁和送江陵殺之任約告急庚午齊主以司馬子如高祖之舊復以為太尉是年三月齊主免子如官復扶又翻任約告急江安侯圓正為西陽太守宋白曰江安縣本漢江陽縣地好呼到翻施式智翻歸附者衆有兵一萬湘東王繹欲圖之署為平南將軍及至弗見使南平王恪與之飲醉因囚之內省分其部曲使人告其罪荊益之釁自此起矣圓正武陵王紀第二子也為紀東下攻繹張本釁許覲翻任約告急陳霸先引兵發南康贛石舊有二十四灘會水暴漲數丈三百里間巨石皆沒霸先進頓西昌章貢圖經曰東江發源於汀州界之新樂山經雩都而會于章水西江導源於南安大庾縣之聶都山與貢水合會于贛水二水合而為贛在州治後北流一百八十里至萬安縣界由萬安而上為灘十有八怪石如精鐵突兀廉厲錯峙波面自贛水而上信豐寧都俱有石磧險阻視十八灘故俚俗以為上下三百里贛石吳立西昌縣屬廬陵郡今在吉州太和縣界任約告急鐵勒將伐柔然突厥酋長土門邀擊破之盡降其衆五萬餘落厥九勿翻酋慈秋翻長知兩翻降戶江翻土門恃其強盛求婚於柔然柔然頭兵可汗大怒使人詈辱之曰爾我之鍛奴也突厥本柔然鐵工故云然可從刊入聲汗音寒詈力智翻土門亦怒殺其使者遂與之絶而求婚於魏魏丞相泰以長樂公主妻之使疏吏翻樂音洛妻七細翻任約告急秋七月乙亥湘東王繹以長沙王韶監郢州事監工銜翻丁亥侯景還至建康考異曰典略作六月壬戌太清紀作七月二十日今從梁帝紀侯瑱閉門拒之慶走江州據郭默城走音奏晉將郭默反時所築城也瑱他甸翻又音鎮繹以瑱為兗州刺史據瑱傳授南兗州刺史侯景留瑱子弟為質見上卷上年辛丑王僧辨乘勝下湓城下遐嫁翻陳霸先帥所部三萬人將會之屯于巴丘此吳所置巴丘縣也屬廬陵郡界帥讀曰率王僧辨之軍自荊州來故謂之西軍分三十萬石以資之八月壬寅朔王僧辨前軍襲于慶慶棄郭默城走范希榮亦棄尋陽城走晉熙王僧振等起兵圍郡城僧辨遣沙州刺史丁道貴助之魏收志梁武帝置沙州治白沙關城領建寧齊安郡當在黃州黃岡縣界任音壬湘東王繹命僧辨且頓尋陽以待諸軍之集任約告急初景既克建康常言吳兒怯弱易以掩取易弋豉翻當須拓定中原然後為帝景尚帝女溧陽公主嬖之妨於政事溧音栗嬖卑義翻又博計翻王偉屢諫景景以告主主有惡言偉恐為所讒因說景除帝說式芮翻及景自巴陵敗歸猛將多死謂宋子仙之屬將即亮翻欲早登大位王偉曰自古移鼎武王克商遷九鼎于洛邑故後之奪人之國者率謂之移鼎既示我威權且絶彼民望景從之使前壽光殿學士謝昊為詔書以為弟姪爭立弟謂湘東王繹武陵王紀姪謂河東王譽嶽陽王察皆由朕非正緒召亂致災宜禪位於豫章王棟使呂季略齎入逼帝書之棟歡之子也華容公歡昭明太子之子戊午景遣衛尉卿彭雋等帥兵入殿廢帝為晉安王幽於永福省悉撤內外侍衛使突騎左右守之牆垣悉布枳棘枳似橘而多刺棘似棗而多刺帥讀曰率騎奇寄翻枳諸氏翻庚申下詔迎豫章王棟棟時幽拘廩餼甚薄餼許氣翻仰蔬茹為食方與張氏鉏葵葵菜也棟驚不知所為泣而升輦景殺哀太子大器尋陽王大心西陽王大鈞建平王大球義安王大昕及王侯在建康者二十餘人太子神明端嶷嶷魚力翻於景黨未嘗屈意所親竊問之太子曰賊若於事義未須見殺事義猶言事宜也終不敢言若見殺時至雖一日百拜亦無所益又曰殿下今居困厄而神貌怡然不貶平日何也貶損也吾自度死日必在賊前度徒洛翻若諸叔能滅賊賊必先見殺然後就死若其不然賊亦殺我以取富貴安能以必死之命為無益之愁乎及難難乃旦翻太子顏色不變徐曰久知此事嗟其晚耳刑者將以衣帶絞之太子曰此不能見殺命取帳繩絞之而絶壬戌棟即帝位考異曰典略作壬辰誤今從太清紀改元天正太尉郭元建聞之自秦郡馳還謂景曰主上先帝太子既無愆失何得廢之景曰王偉勸吾云早除民望吾故從之以安天下元建曰吾挾天子令諸侯猶懼不濟無故廢之乃所以自危何安之有景欲迎帝復位以棟為太孫王偉曰廢立大事豈可數改邪乃止數所角翻乙丑景又使殺南海王大臨於吳郡南郡王大連於姑孰考異曰太清紀云於九江今從梁書高唐王大壯於京口大臨時為吳郡太守大連時為江州刺史在姑熟大春時為東揚州刺史姚思廉梁書大壯作大莊始封高唐郡公後進封新興王時為南徐州刺史皆就殺之會工外翻元建曰豈有皇太子乃為人妾乎竟不與相見聽使入道丙寅追尊昭明太子為昭明皇帝豫章安王為安皇帝華容公歡進封豫章王薨諡曰安昭明太子蔡氏昭明既薨武帝為別立金華宮供侍一同常儀薨諡曰敬按敬已薨只當追諡皇后以從夫曰太皇太后非也張氏為皇后以劉神茂為司空任約告急九月癸巳齊主如趙定二州五代志趙郡大陸縣舊曰廣同置殷州及南巨鹿郡後改為南趙郡改殷州為定州治中山任約告急己亥湘東王繹以尚書令王僧辨為江州刺史江州刺史陳霸先為東揚州刺史任約告急王偉說侯景弒太宗以絶衆心侯景尊帝廟號曰高宗元帝追諡曰簡文皇帝廟號太宗說式芮翻冬十月壬寅夜偉與左衛將軍彭雋王修纂進酒於太宗曰丞相以陛下幽憂既久使臣等來上壽上時掌翻太宗笑曰已禪帝位何得言陛下此壽酒將不盡此乎言壽將盡於此酒杜佑曰傅玄琵琶賦云漢遣公主嫁烏孫念其行道思慕故使工人裁箏筑為馬上之樂今觀其器中虛外實天地象也盤圓柄直陰陽敍也柱十有二配律呂也四絃法四時也以方俗語之曰琵琶取其易傳於外國也風俗通云以手琵琶因以為名釋名曰推手前曰㧙引手卻曰把杜摯云秦人苦長城之役絃鼗而鼓之並未詳孰是今清樂奏琵琶俗謂之秦漢子圓頭修頸而小疑是絃鼗之遺制傅玄云體圓柄直柱十有二其他皆兌上鋭下曲項形制稍大本出胡中俗傳是漢制兼用兩制者謂之秦漢據此事則南朝似無曲項琵琶劉昫曰琵琶四絃曲項琵琶五絃出胡中太宗知將見殺因盡醉曰不圖為樂之至於斯也樂音洛既醉而寢偉乃出雋進土囊修纂坐其上而殂年四十九遷殯於城北酒庫中太宗自幽縶之後無復侍者及紙復扶又翻乃書壁及板障柱間不為壁以板為障施以丹漆因謂之板障辭甚悽愴愴丑亮翻景諡曰明皇帝廟號高宗任約告急侯景之逼江陵也湘東王繹求援於魏命梁秦二州刺史宜豐侯循以南鄭與魏晉志豫章郡有宜豐縣循以無故輸城非忠臣之節考異曰南史作宜豐侯修今從梁書請待改命魏太師泰遣大將軍達奚武將兵三萬取漢中將即亮翻又遣大將軍王雄出子午谷攻上津五代志西城郡豐利縣梁置南上洛郡西魏改郡曰豐利後周省郡入上津郡唐以上津為縣屬商州璠孚袁翻紀遣潼州刺史楊乾運救之循恢之子也鄱陽王恢武帝之弟王僧辨等聞太宗殂丙辰啓湘東王繹請上尊號上時掌翻下復上同考異曰典略作乙卯今從太清紀繹弗許任約告急司空東道行臺劉神茂聞侯景自巴丘敗還陰謀叛景吳中士大夫咸勸之乃與儀同三司尹思合劉歸義王曄雲麾將軍元頵等據東陽以應江陵頵居筠翻又紆綸翻遣頵及別將李占下據建德江口五代志東陽郡金華縣隋廢建德縣入焉唐武德四年復置建德縣分為睦州治所今東陽江新安江合於州城南十里將即亮翻克之新安民程靈洗起兵據郡以應神茂於是浙江以東皆附江陵湘東王繹以靈洗為譙州刺史領新安太守程靈洗字玄滌洗讀如字湘東以刺史寵靈洗實領新安太守職任約告急十一月乙亥王僧辨等復上表勸進復扶又翻湘東王繹不許戊寅繹以湘州刺史安南侯方矩為中衛將軍以自副考異曰梁書在八月辛亥今從太清紀方諸之弟也以南平王恪為湘州刺史侯景以趙伯超為東道行臺據錢塘以田遷為軍司據富春以李慶緒為中軍都督謝答仁為右廂都督李遵為左廂都督以討劉神茂任約告急己卯加侯景九錫漢國置丞相以下官己丑豫章王棟禪位于景景即皇帝位于南郊還登太極殿其黨數萬皆吹脣呼譟而上上時掌翻大赦改元太始封棟為淮陰王並其二弟橋樛同鎖於密室樛居蚪翻王偉請立七廟景曰何謂七廟偉曰天子祭七世祖考並請七世諱景曰前世吾不復記唯記我父名標且彼在朔州那得來噉此侯景本懷朔鎮人魏改懷朔鎮為朔州景黨有知景祖名乙羽周者自外皆王偉制其名位追尊父標為元皇帝景之作相也以西州為府文武無尊卑皆引接及居禁中非故舊不得見由是諸將多怨望將即亮翻景好獨乘小馬彈射飛鳥好呼到翻彈射飛鳥北俗也彈徒丹翻射而亦翻王偉每禁止之不許輕出景鬱鬱不樂樂音洛更成失志曰吾無事為帝與受擯不殊擯棄也擯斥者不得預人事故景以為言任約告急壬辰湘東王以長沙王韶為郢州刺史任約告急益州長史劉孝勝等勸武陵王紀稱帝紀雖未許而大造乘輿車服乘輿車服天子之車服也乘繩證翻任約告急十二月丁未謝答仁李慶緒攻建德擒元頵李占送建康景截其手足以徇經日乃死任約告急齊主每出入常以中山王自隨王太原公主恆為之飲章十二行本飲上有嘗字乙十一行本同孔本同張校同食護視之太原公主勃海王歡之女恆戶登翻為于僞翻飲於禁翻下同食祥吏翻齊主飲公主酒使人鴆中山王殺之並其三子諡王曰魏孝靜皇帝葬於鄴西漳北其後齊主忽掘其陵投梓宮於漳水齊主初受禪魏神主悉寄於七帝寺以寄魏七廟神主故謂之七帝寺亦取焚之彭城公元韶以高氏壻元韶娶魏孝武帝后高歡之女也開府儀同三司美陽公元暉業魏濟陰王暉業齊受禪降封美陽公又志氣不倫尤為齊主所忌從齊主在晉陽暉業於宮門外罵韶曰爾不及一老嫗負璽與人嫗威遇翻韶奉璽於齊見上卷上年璽斯氏翻何不擊碎之我出此言知即死爾亦詎得幾時齊主聞而殺之及臨淮公元孝友皆鑿汾水冰沈其尸孝友彧之弟也彧魏臨淮王沈持林翻加之粉黛以自隨曰吾以彭城為嬪御言其懦弱如婦人也剃他計翻嬪毗賓翻懦奴亂翻世祖孝元皇帝上諱繹字世誠小字七符武帝第七子也承聖元年壬申五五二是年十一月方即位改元任約告急春正月湘東王以南平內史王褒為吏部尚書褒騫之孫也王騫儉之子任約告急齊人屢侵侯景邊地甲戌景遣郭元建帥步軍趣小峴帥讀曰率下同趣七喻翻峴戶典翻侯子鑒帥舟師向濡須己卯至合肥考異曰典略二月庚子子鑒等圍合肥克其羅城今從太清紀乃引還任約告急丙申齊主伐庫莫奚大破之俘獲四千人雜畜十餘萬畜許又翻齊主連年出塞給事中兼中書舍人唐雍練習軍書自督將以降勞效本末及四方軍士強弱多少番代往還器械精粗將即亮翻少詩沼翻粗倉乎翻糧儲虛實靡不諳悉諳烏含翻或於帝前簡閲雖數千人不執文簿唱其姓名未嘗謬誤帝常曰唐雍強幹一人當千又曰雍每有軍事手作文書口且處分處昌呂翻分扶問翻耳又聽受實異人也寵待賞賜㣥臣莫及任約告急魏將王雄取上津魏興東梁州刺史安康李遷哲軍敗降之五代志西城郡安康縣舊曰寧都齊置安康郡後魏置東梁州按蕭子顯齊書安康寧都二縣皆齊所置魏收曰安康縣漢時漢中郡之安陽縣也將即亮翻降戶江翻任約告急突厥土門襲擊柔然大破之柔然頭兵可汗自殺厥居勿翻可從刊入聲汗音寒其太子菴羅辰及阿那王褱從弟登注俟利登注子庫提並帥衆奔齊餘衆復立登注次子鐵伐為主從才用翻帥讀曰率下同復扶又翻號其妻為可賀敦子弟謂之特勒考異曰諸書或作特勤今從劉昫舊唐書及宋祁新唐書任約告急湘東王命王僧辨等東擊侯景二月庚子諸軍發尋陽舳艫數百里陳霸先帥甲士三萬舟艦二千自南江出湓口會僧辨於白茅灣贛水謂之南江過彭澤縣西注于彭蠡北入于江白茅灣在桑落州西南史王僧辨傳霸先帥衆五萬出自南江前軍五千行至湓口蓋水陸俱下也帥讀曰率歃色甲翻共讀盟文流涕慷慨癸卯僧辨使侯瑱襲南陵鵲頭二戍克之戊申僧辨等軍于大雷丙辰發鵲頭戊午侯子鑒還至戰鳥子鑒蓋自合肥還杜佑曰宣州南陵縣有鵲洲有戰鳥圻孤在江中本名孤圻昔桓溫舉兵東下住此圻中宵鳥驚溫謂官軍圍之既而定以㣥鳥驚噪因名戰鳥唐顧況集有題靈山寺詩下注戰鳥蓋戰鳥圻後為靈山寺子鑒驚懼奔還淮南淮南今太平州當塗之地任約告急侯景儀同三司謝答仁攻劉神茂於東陽程靈洗張彪皆勒兵將救之神茂欲專其功不許營於下淮或謂神茂曰賊長於野戰下淮地平四面受敵不如據七里瀨七里瀨在桐廬縣距建德四十餘里與嚴陵瀨相接不從神茂偏裨多北人不與神茂同心別將王曄酈通並據外營降於答仁劉歸義尹思合等棄城走神茂孤危辛未亦降於答仁降戶江翻答仁送之建康任約告急癸酉王僧辨等至蕪湖侯景守將張黑棄城走景聞之甚懼下詔赦湘東王繹王僧辨之罪衆咸笑之侯子鑒據姑孰南洲以拒西師景遣其黨史安和等將兵二千助之三月己巳朔景下詔欲自至姑孰又遣人戒子鑒曰西人善水戰勿與爭鋒往年任約之敗良為此也去年景與徐文盛水戰亦敗走不特任約也以故畏之為于僞翻必當可破汝但結營岸上引船入浦以待之子鑒乃捨舟登岸閉營不出僧辨等停軍蕪湖十餘日景黨大喜告景曰西師畏吾之強勢將遁矣不擊且失之景乃復命子鑒為水戰之備復扶又翻丁丑僧辨至姑孰子鑒帥步騎萬餘人渡洲於岸挑戰又以鵃䑠千艘載戰士類篇曰鵃䑠船長貌玉篇曰鵃䑠小船也集韻鵃丁了翻䑠朗鳥翻按王僧辨傳鵃䑠其中載士兩邊悉八十棹棹手皆越人去來趣襲捷過風電蓋今之水哨馬即其類考異曰典略作烏鵲舫千艘今從梁書留大艦夾泊兩岸子鑒之衆謂水軍欲退爭出趨之趨七喻翻大艦斷其歸路斷音短鼓譟大呼合戰中江呼火故翻子鑒大敗士卒赴水死者數千人子鑒僅以身免收散卒走還建康據東府僧辨留虎臣將軍莊丘慧達鎮姑孰引軍而前歷陽戍迎降降戶江翻景聞子鑒敗大懼涕下覆面覆敷又翻引衾而臥良久方起歎曰誤殺乃公庚辰僧辨督諸軍至張公洲張公洲即蔡州考異曰典略作戊寅今從太清紀辛巳乘潮入淮進至禪靈寺前禪靈寺齊武帝所建使引淮中䑡䑰及海艟䑡音叉䑰蒲故翻方言船短而深謂之䑰艟尺庸翻以石縋之塞淮口縋馳僞翻塞悉則翻緣淮作城自石頭至于朱雀街十餘里中樓堞相接堞達協翻僧辨問計於陳霸先霸先曰前柳仲禮數十萬兵隔水而坐韋粲在青溪竟不渡岸賊登高望之表裏俱盡故能覆我師徒事見一百六十二卷武帝太清三年須渡北岸諸將若不能當鋒霸先請先往立柵壬午霸先於石頭西落星山築柵考異曰陳書云橫隴立柵今從典略直出石頭西北景恐西州路絶自帥侯子鑒等亦於石頭東北築五城以遏大路帥讀曰率景使王偉守臺城乙酉景殺湘東王世子方諸前平東將軍杜幼安任約告急劉神茂至建康丙戌景命為大銼碓先進其足寸寸斬之以至於頭劉神茂始導侯景取壽陽及其渡江又為爪牙東南之禍神茂實為之其死晚矣大銼碓者為大銼刀發機如碓使之踏之碓都內翻故得免禍任約告急丁亥王僧辨進軍招提寺北招提寺在石頭城北陳讀曰陳下志陳衝陳陳皆同陳霸先曰我衆賊寡應分其兵勢以強制弱何故聚其鋒鋭令致死於我乃命諸將分處置兵景衝將軍王僧志陳僧志小縮霸先遣將軍安陸徐度將弩手二千橫截其後弩矢之力可以及遠橫截其後箭鋒所到敵必驚卻霸先與王琳杜龕等以鐵騎乘之僧辨以大兵繼進景兵敗退據其柵龕岸之兄子也杜岸死於太清三年荊雍構難之時龕岸兄岑之子龕苦含翻開北門降降戶江翻僧辨入據之景與霸先殊死戰景帥百餘騎棄矟執刀左右衝陳矟色角翻陳不動衆遂大潰諸軍逐北至西明門西明門建康外城西中門景至闕下不敢入臺召王偉責之曰爾令我為帝今日誤我偉不能對繞闕而藏景欲走偉執鞚諫曰鞚苦貢翻自古豈有叛天子邪宮中衛士猶足一戰棄此將欲安之景曰我昔敗賀拔勝見一百五十六卷武帝中大通六年敗補邁翻見一百五十二卷大通二年渡江平臺城降柳仲禮如反掌見一百六十有二卷太清三年降戶江翻因仰觀石闕歎息久之以皮囊盛其江東所生二子盛時征翻景至建康所生子也掛之鞍後與房世貴等百餘騎東走欲就謝答仁於吳侯子鑒王偉陳慶奔朱方僧辨命裴之橫杜龕屯杜姥宅杜崱入據臺城僧辨不戢軍士剽掠居民男女裸露姥莫補翻崱士力翻戢則立翻剽匹妙翻裸郎果翻自石頭至于東城號泣滿道號戶刀翻是夜軍士遺火焚太極殿及東西堂寶器羽儀輦輅無遺史言王僧辨御軍無法失伐罪弔民肅清禁輦之意戊子僧辨命侯瑱等帥精甲五千追景王克元羅等帥臺內舊臣迎僧辨於道僧辨勞克曰勞力到翻甚苦事夷狄之君克不能對又問璽紱何在璽斯氏翻紱音弗克良久曰趙平原持去侯景侍中趙思賢兼平原太守王氏百世卿族一朝而墜僧辨迎太宗梓宮升朝堂帥百官哭踊如禮朝直遙翻己丑僧辨等上表勸進上時掌翻考異曰梁帝紀戊子王以賊平告明堂太社己丑僧辨等奉表按表文云衆軍以戊子總集建康豈是日告捷即能達江陵乎蓋僧辨等以己丑日發表勸進耳且迎都建業湘東王答曰淮海長鯨雖云授首襄陽短狐未全革面禹貢曰淮海惟揚州長鯨謂侯景古者伐國取其鯨鯢以為大戮嶽陽王察據襄陽與湘東為敵故斥為短狐短狐蜮也含沙射人中之者死易曰小人革面爾乃議之爾雅春為青陽夏為朱明秋為白藏冬為玄英四時和謂之玉燭釋云此釋太平之時四氣和暢以致嘉祥之事也云春為青陽者言春之氣和則青而溫陽也云夏為朱明者言夏之氣和則赤而光明也云秋為白藏者言秋之氣和則白而收藏也云冬為玄英者言冬之氣和則黑而清英也四時和謂之玉燭者言四時和氣溫潤明照故謂之玉燭李巡云人君德美如玉而明若燭聘義君子比德於玉焉是時人君若德輝動於內則和氣應於外統而言之謂之玉燭庚寅南兗州刺史郭元建秦郡戍主郭正買侯景以廣陵為南兗州因南朝之舊也行南徐州事郭子仲並據城降降戶江翻僧辨之發江陵也啓湘東王曰平賊之後嗣君萬福未審何以為禮王曰六門之內自極兵威臺城六門大司馬門萬春門東華門西華門太陽門承明門討賊之謀臣為己任成濟之事請別舉人成濟弒魏高貴鄉公王僧辨欲避弒君之惡名故云使為之所及景敗太宗已殂豫章王棟及二弟橋樛相扶出於密室樛居蚪翻逢杜崱於道為去其鎖二弟曰今日始免橫死矣為于僞翻去羌呂翻橫戶孟翻棟曰倚伏難知吾猶有懼賈誼鵩賦曰禍兮福所倚福兮禍所伏辛卯遇朱買臣呼之就船共飲未竟並沈於水沈持林翻僧辨遣陳霸先將兵向廣陵受郭元建等降又遣使者往安慰之將即亮翻降戶江翻使疏吏翻諸將多私使別索馬仗索山客翻會侯子鑒渡江至廣陵謂元建等曰我曹梁之深讎何顏復見其主復扶又翻不若投北可得還鄉遂皆降齊霸先至歐陽齊行臺辛術已據廣陵王偉與侯子鑒相失直瀆戍主黃公喜獲之送建康孫盛晉春秋曰直瀆在方山王安石詩山蟠直瀆輸淮口陸游曰直瀆吳孫氏所開溫庭筠過吳景帝陵詩虛開直瀆三千里青蓋何曾到洛陽按侯子鑒王偉已渡江此非方山之直瀆也沈約志盱眙太守管下有直瀆今晉安帝立縣卿為賊相不能死節而求活草間邪偉曰廢興命也使漢帝早從偉言明公豈有今日謂臺城之破僧辨已降侯景縱還竟陵使有今日偉之此言亦以愧僧辨也步馬乃唾其面偉曰君不讀書不足與語步馬慙而退步馬之日翻唾吐臥翻僧辨命羅州刺史徐嗣徽鎮朱方壬辰侯景至晉陵得田遷餘兵田遷東攻劉神茂有餘兵在晉陵東趨吳郡趨七喻翻任約告急夏四月齊主使大都督潘樂與郭元建將兵五萬攻陽平拔之任約告急王僧辨啓陳霸先鎮京口考異曰陳紀高祖應接郭元建還僧辨啓高祖鎮京口按是時徐嗣徽為南徐州刺史蓋霸先但領兵戍京口耳未為刺史也任約告急益州刺史太尉武陵王紀頗有武略在蜀十七年南開寧州越巂西通資陵吐谷渾內修耕桑鹽鐵之政外通商賈遠方之利巂音髓吐從暾入聲谷音浴賈音古故能殖其財用器甲殷積有馬八千匹聞侯景陷臺城湘東王將討之謂僚佐曰七官文士豈能匡濟湘東於兄弟次第七故呼為七官紀以為己瑞乙巳即皇帝位改元天正立子圓照為皇太子圓正為西陽王圓滿為竟陵王圓普為譙王圓肅為宜都王以巴西梓潼二郡太守永豐侯撝為征西大將軍益州刺史封秦郡王吳立永豐縣屬始安郡撝吁為翻不從怦普耕翻僧略僧辨之弟怦勉之從子也徐勉梁初賢相從才用翻初臺城之圍怦勸紀速入援紀意不欲行內銜之會蜀人費合告怦反怦有與將帥書云事事在人口具紀即以為反徵費扶沸翻將即亮翻帥所類翻徵讀曰證謂怦曰以卿舊情當使諸子無恙恙余亮翻對曰生兒悉如殿下留之何益以譏切紀不能救君父梟首於市梟堅堯翻亦殺王僧略永豐侯撝歎曰王事不成矣善人國之基也今先殺之不亡何待紀徵宜豐侯咨議參軍劉璠為中書侍郎璠孚袁翻使者八反乃至紀令劉孝勝深布腹心璠苦求還中記室韋登私謂璠曰殿下忍而蓄憾足下不留將致大禍孰若共構大夏章十二行本作廈乙十一行本同孔本同使身名俱美哉夏戶雅翻璠正色曰卿欲緩頰於我邪緩頰說也漢高帝謂酈食其曰緩頰往說魏王豹府侯謂宜豐侯循分扶問翻殿下方布大義於天下終不逞志於一夫紀知必不為己用乃厚禮遣之以宜豐侯循為益州刺史封隨郡王以璠為循府長史蜀郡太守任約告急謝答仁討劉神茂還至富陽聞侯景敗走帥萬人欲北出候之帥讀曰率趙伯超據錢塘拒之侯景進至嘉興沈約曰嘉興本名長水秦改曰由拳吳孫權黃龍四年由拳縣生嘉禾改曰禾興孫晧避父名改曰嘉興今秀州是也北至吳郡一百五十五里乃退據吳己酉侯瑱追及景於松江松江在今吳縣一名笠澤在吳縣南四十里衆數千人艘蘇遭翻瑱進擊敗之敗補邁翻擒彭雋田遷房世貴蔡壽樂王伯醜樂音洛瑱生剖雋腹抽其腸雋猶不死手自收之乃斬之景與腹心數十人單舸走推墮二子於水舸古我翻推吐雷翻將入海瑱遣副將焦僧度追之將即亮翻景納羊侃之女為小妻以其兄鵾為庫直都督待之甚厚鵾隨景東走與景所親王元禮謝葳蕤密圖之葳蕤答仁之弟也景下海欲向蒙山景自滬瀆下海魏收志東安郡新泰縣有蒙山景欲浮海趣山東復入北也葳音威蕤如佳翻己卯景晝寢鵾語海師海師習知海道者也語牛倨翻此中何處有蒙山汝但聽我處分處昌呂翻分扶問翻遂直向京口至胡豆洲景覺大驚問岸上人云郭元建猶在廣陵景大喜覺古孝翻喜與喜同將依之鵾拔刀叱海師向京口考異曰典略云舟人李橫文紿景向南徐州今從梁書吾等為王效力多矣為于僞翻今至於此終無所成欲就乞頭以取富貴景未及答白刃交下景欲投水鵾以刀斫之景走入船中以佩刀抉船底抉船底欲入水抉一決翻矟色角翻刺七亦翻尚書右僕射索超世在別船葳蕤以景命召而執之南徐州刺史徐嗣徽斬超世王偉索超世景之謀主也索蘇各翻送其尸於建康僧辨傳首江陵截其手使謝葳蕤送於齊暴景尸於市士民爭取食之並骨皆盡溧陽公主亦預食焉考異曰典略云復烹溧陽公主今從南史景之五子在北齊世宗剝其長子面而烹之幼者皆下蠶室長知兩翻下遐嫁翻齊顯祖即位夢獼猴坐其御牀乃盡烹之趙伯超謝答仁皆降於侯瑱瑱並田遷等送建康王僧辨斬房世貴於市送王偉呂季略周石珍嚴亶趙伯超伏知命於江陵丁巳湘東王下令解嚴任約告急乙丑葬簡文帝于莊陵廟號太宗任約告急侯景之敗也以傳國璽自隨璽斯氏翻使其侍中兼平原太守趙思賢掌之曰若我死宜沈於江勿令吳兒復得之思賢自京口濟江遇盜從者棄之草間復持林翻復扶又翻從才用翻至廣陵以告郭元建元建取之以與辛術壬申術送之至鄴任約告急甲申齊以吏部尚書楊愔為右僕射以太原公主妻之愔於今翻妻七細翻公主即魏孝靜帝之后也任約告急楊乾運至劍北劍北劍閣之北也大破乾運於白馬陳其俘馘於南鄭城下且遣人辱宜豐侯循循怒出兵與戰都督楊紹伏兵擊之殺傷殆盡劉璠還至白馬西劉璠自成都還魏收志華陽郡沔陽縣有白馬城宜豐侯循傳璠見禽於嶓冢嶓冢縣亦屬華陽郡五代志漢中郡西縣舊曰嶓冢送長安太師泰素聞其名待之如舊交時南鄭久不下武請屠之泰將許之璠請之於朝朝謂魏朝也朝直遙翻不許璠泣請不已泰曰事人當如是乃從其請任約告急五月庚午司空南平王恪等復勸進復扶又翻湘東王猶不受遣侍中豐城侯泰謁山陵沈約志豫章豐城縣吳立曰富城晉武帝更名考異曰梁書在四月官為司空太清紀在此月官太宰今從梁書戊寅侯景首至江陵梟之於市三日梟堅堯翻煮而漆之以付武庫庚辰以南平王恪為揚州刺史甲申以王僧辨為司徒鎮衛將軍封長寧公鎮衛將軍梁定二百四十號其班穹矣僧辨元功必封長寧郡公長寧郡晉安帝置屬荊州封長城縣侯賞平侯景之功也霸先長城縣人也杜佑曰湖州長城縣吳王闔閭遣弟夫概築城狹而長晉武帝太康三年置乙酉誅侯景所署尚書僕射王偉左民尚書呂季略少府周石珍舍人嚴亶於市趙伯超伏知命餓死於獄以謝答仁不失禮於太宗特宥之王偉於獄中上五百言詩五百言詩今之五十韻詩也上時掌翻欲宥之有嫉之者言於王曰前日偉作檄文甚佳王求而視之檄云項羽重瞳尚有烏江之敗重直龍翻湘東一目寧為赤縣所歸王大怒釘其舌於柱釘丁定翻剜腹臠肉而殺之剜烏丸翻王偉侯景之所取計者也自圍臺城以至於移梁祚屠蕭氏以及其臣民皆偉之謀帝忘其父子兄弟之讎乃愛其才而欲宥之發怒於檄文而後誅之失刑甚矣任約告急丙戌齊合州刺史斛斯昭攻歷陽拔之任約告急丁亥下令以王偉等既死自餘衣冠舊貴被逼偷生被皮義翻猛士勳豪和光苟免者皆不問任約告急扶風民魯悉達糾合鄉人以保新蔡陳書魯悉達扶風人祖父至悉達皆仕於齊梁沈約宋志江州所部有南新蔡郡不言僑置之地但云去京都水行一千三百七十六里有餘以水程約言之南新蔡郡當置於今蘄州界五代志蘄州黃梅縣舊曰永興隋開皇初改曰新蔡蓋因南新蔡郡以名縣也劉昫曰黃梅縣宋分置新蔡郡時江東饑亂餓死者什八九遺民攜老幼歸之悉達分給糧廩全濟甚衆招集晉熙等五郡盡有其地使其弟廣達將兵從王僧辨討侯景將即亮翻下同景平以悉達為北江州刺史魏收志梁武帝置北江州治鹿城關領義陽齊昌新昌梁安齊興郡五代志黃州木蘭縣梁置北江州唐併木蘭入黃岡縣任約告急齊主使其散騎常侍曹文皎等來聘湘東王使散騎常侍柳暉等報之且告平侯景亦遣舍人魏彥告于魏任約告急齊主使潘樂郭元建將兵圍秦郡行臺尚書辛術諫曰朝廷與湘東王信使不絶使疏吏翻陽平侯景之土取之可也今王僧辨已遣嚴超達守秦郡於義何得復爭之復扶又翻且水潦方降不如班師弗從陳霸先命別將徐度引兵助秦郡固守齊衆七萬攻之甚急王僧辨使左衛將軍杜崱救之霸先亦自歐陽來會與元建大戰於士林大破之士林在六合縣界生擒千餘人元建收餘衆北遁猶以通好不窮追也好呼到翻辛術遷吏部尚書自魏遷鄴以後大選之職知名者數人吏部選為大選選須絹翻所弊者疏袁叔德沈密謹厚所傷者細少詩照翻沈持林翻楊愔風流辨給取士失於浮華唯術性尚貞明取士必以才器循名責實新舊參舉管庫必擢門閥不遺閥音伐說文閥閲自序也史記明其等曰閥積其功曰閲此所謂門閥者直言世家子弟門地素高者耳又說門在左曰閥在右曰閲考之前後最為折衷衷陟仲翻任約告急魏達奚武遣尚書左丞柳帶韋入南鄭說宜豐侯循曰說式芮翻足下所固者險所恃者援所保者民今王旅深入所憑之險不足固也白馬破走酋豪不進謂楊乾運也酋慈秋翻長圍四合所部之民不可保也且足下本朝喪亂社稷無主欲誰為為忠乎朝直遙翻喪息浪翻誰為之為于僞翻豈若轉禍為福使慶流子孫邪循乃請降降戶江翻帶韋慶之子也柳慶見一百六十一卷武帝太清二年請攻之大都督赫連達曰不戰而獲城策之上者豈可利其子女貪其貨財而不愛民命乎且觀其士馬猶強城池尚固攻之縱克則彼此俱傷如困獸猶鬬左傳吳夫概王之言武曰公言是也乃受循降獲男女二萬口而還還從宣翻又如字於是劍北皆入於魏任約告急六月丁未齊主還鄴乙卯復如晉陽復扶又翻任約告急庚寅立安南侯方矩為王太子任約告急齊遣散騎常侍謝季卿來賀平侯景任約告急衡州刺史王懷明作亂廣州刺史蕭勃討平之任約告急齊政煩賦重江北之民不樂屬齊其豪傑數請兵於王僧辨僧辨以與齊通好皆不許樂音洛數所角翻好呼到翻秋七月廣陵僑人朱盛等僑人本非廣陵人而僑居廣陵者謀襲殺齊刺史溫仲雍遣使求援於陳霸先使疏吏翻下使未同云已克其外城霸先使告僧辨僧辨曰人之情僞未易可測易弋豉翻若審克外城亟須應援如其不爾無煩進軍使未報霸先已濟江僧辨乃命武州刺史杜崱等助之會盛等謀泄霸先因進軍圍廣陵任約告急八月魏安康人黃衆寶反攻魏興執太守柳檜進圍東梁州梁置南梁州於西城郡西魏改曰東梁州西城古魏興郡治所魏收志後魏太延五年別置魏興郡於上洛郡界帶陽亭縣屬洛州洛州後改為商州誘音酉說式芮翻檜不從而死檜虯之弟也柳虯柳慶之兄見二百五十一卷武帝大同三年驃匹妙翻騎奇寄翻任約告急武陵王紀舉兵由外水東下以永豐侯撝為益州刺史守成都使其子宜都王圓肅副之任約告急九月甲戌司空南平王恪卒甲申以王僧辨為揚州刺史任約告急齊主使告王僧辨陳霸先曰請釋廣陵之圍必歸廣陵歷陽兩城霸先引兵還京口江北之民從霸先濟江者萬餘口湘東王以霸先為征北大將軍開府儀同三司南徐州刺史徵霸先世子昌霸先封長城縣侯昌為世子以昌為散章十二行本散上有員外二字乙十一行本同孔本同張校同騎常侍頊為領直梁宿衛之官有四廂領直蓋領直衛之士因以名官為昌頊陷魏張本任約告急宜豐侯循之降魏也丞相泰許其南還久而未遣從容問劉璠曰從千容翻我於古誰比對曰璠常以公為湯武今日所見曾桓文之不如泰曰我安敢比湯武庶幾望伊周何至不如桓文對曰齊桓存三亡國左傳宋司馬子魚曰齊桓存三亡國以屬諸侯杜預注曰三亡國魯衛邢語未竟泰撫掌曰我解爾意解戶買翻欲激我耳乃謂循曰王欲之荊為之益武陵王紀封循為隨郡王故以王稱之泰厚禮遣之考異曰典略云十月乙未朔太祖謂循云云按太清紀是月循至江陵今從之湘東王疑之遣使覘察相望於道使疏吏翻覘丑廉翻又丑豔翻始至之夕命劫竊其財及旦循啓輸馬仗王乃安之引入對泣以循為侍中驃騎將軍開府儀同三司任約告急冬十月齊主自晉陽如離石自黃櫨嶺起長城北至社平戍四百餘里置三十六戍此長城蓋起於唐石州北抵武州之境櫨音盧社平齊紀作社子按斛律金傳黃櫨嶺在烏突戍東任約告急戊申湘東王執湘州刺史王琳於殿中殺其副將殷晏琳本會稽兵家將即亮翻會工外翻其姊妹皆入王宮故琳少在王左右琳好勇王以為將帥琳傾身下士少詩照翻好呼到翻帥所類翻下遐嫁翻下王下同所得賞賜不以入家麾下萬人多江淮㣥盜從王僧辨平侯景與杜龕功居第一龕苦含翻在建康恃寵縱暴僧辨不能禁僧辨以宮殿之燒謂軍人遺火焚太極殿及東西堂也欲以琳塞責塞悉則翻乃密啓王請誅琳王以琳為湘州琳自疑及禍使長史陸納帥部曲赴湘州帥讀曰率身詣江陵陳謝謂納等曰吾若不返子將安之之往也請死之相泣而別至江陵王下琳吏辛酉以王子方略為湘州刺史又以廷尉黃羅漢為長史使與太舟卿張載至巴陵先據琳軍五代志太舟卿梁初為都水臺使者天監七年改焉位視中書郎列卿之最末者也主舟航堤渠而御下峻刻荊州人疾之如讎羅漢等至琳軍陸納及士卒並哭不肯受命執羅漢及載王遣宦者陳旻往諭之納對旻刳載腹抽腸以繫馬足使繞而走腸盡氣絶又臠割出其心向之抃舞抃舞拊手而舞以黃羅漢清謹而免之納與諸將引兵襲湘州時州中無主納遂據之任約告急公卿藩鎮數勸進於湘東王數所角翻十一月丙子世祖即皇帝位於江陵改元大赦改太清為承聖帝不升正殿公卿陪列而已史言帝不能正其始任約告急丁丑以宜豐侯循為湘州刺史任約告急己卯立王太子方矩為皇太子更名元良更丁行翻皇子方智為晉安王方略為始安王方等之子莊為永嘉王方等伐湘州戰敗而死修容魏文帝所制自晉以來位列九嬪侯景之亂州郡太半入魏自巴陵以下至建康以長江為限荊州界北盡武寧西拒硤口北盡武寧與嶽陽王察分界西拒峽口與武陵王紀分界硤當作峽復扶又翻詔令所行千里而近民戶著籍不盈三萬而已著直略翻史言荊州管內蕭條任約告急陸納襲擊衡州刺史丁道貴於淥口破之衡州治衡陽縣縣東二十里有酃湖其水湛然緑色取以釀酒甘美謂之酃淥淥口即酃湖口也唐志潭州有淥口戍丁度曰湘東有淥水張舜民郴行録嘉魚縣口舟行七十餘里至淥溪口南北對境圖自嶽州沿江東北下過侯敬港神林港象湖港新打口石頭口得淥溪口按郴行録對境圖之淥溪口皆非丁道貴敗處唯唐志之潭州淥口戍為是淥音緑其衆悉降於納降戶江翻上聞之遣使徵司徒王僧辨右衛將軍杜崱平北將軍裴之橫與宜豐侯循共討納循軍巴陵以待之侯景之亂零陵人李洪雅據其郡上即以為營州刺史營陽郡亦漢零陵郡之地故因置營州隋為永州上許之丁道貴收餘衆與之俱納遣其將吳藏襲擊破之洪雅等退保空雲城姚思廉梁書作空靈灘水經注長沙建寧縣故城南有空冷峽湘水所經也驚浪雷奔濬同三峽張舜民郴行録曰自醴陵江口南行十餘里有空靈岸考異曰典略作空零城今從梁書余謂空零蓋空靈之誤也頃之納請降求送妻子送妻子為質以示誠款納衆皆泣曰王郎被囚被皮義翻故我曹逃罪於湘州非有他志也乃出妻子付旻旻至巴陵循曰此詐也必將襲我乃密為之備納果夜以輕兵繼旻後約至城下鼓譟十二月壬午晨去巴陵十里言納兵夜行至晨距巴陵相去十里即鼓譟軍中皆驚循坐胡牀於壘門望之納乘水來攻矢下如雨循方食甘蔗略無懼色蔗之夜翻徐部分將士擊之分扶問翻獲其一艦艦戶黯翻納退保長沙任約告急壬午齊主還鄴戊午復如晉陽復扶又翻王崇武標點容肇祖聶崇岐覆校
