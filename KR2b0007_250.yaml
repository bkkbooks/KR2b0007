body:
  text: 資治通鑑卷第二百五十端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀六十六懿宗昭聖恭惠孝皇帝上咸通元年咸通元年庚辰八六是年十一月始改元咸通咸通元年春正月乙卯浙東軍與裘甫戰於桐柏觀前桐柏觀在台州唐興縣天台山宋改唐興縣為天台縣桐柏觀賜額崇道觀觀古玩翻劉勍僅以身免乙丑甫帥其徒千餘人陷剡縣帥讀曰率開府庫募壯士衆至數千人越州大恐時二浙久安人不習戰甲兵朽鈍見卒不滿三百見賢遍翻鄭祗德更募新卒以益之軍吏受賂率皆得孱弱者孱鉏山翻祗德遣子將沈君縱副將張公署望海鎮將李圭子將小將也望海鎮在明州界今定海縣即其地元和十四年浙東觀察使薛戎奏望海鎮去明州七十餘里俯臨大海與新羅日本諸蕃接界將即亮翻下同二月辛卯與甫戰於剡西賊設伏於三溪之南而陳於三溪之北三溪在今嵊縣西南一溪自新昌縣東來一溪自磕下山南來與新昌溪會於湖塍屈而西北流溪流若三派然故謂之三溪使可涉既戰陽敗走官軍追之半涉決壅水大至官軍大敗三將皆死官軍幾盡幾居依翻於是山海諸盜及他道無賴亡命之徒四面雲集衆至三萬分為三十二隊其小帥有謀略者推劉暀帥所類翻暀于放翻又乎曠翻勇力推劉慶劉從簡㣥盜皆遙通書幣求屬麾下甫自稱天下都知兵馬使改元曰羅平鑄印曰天平大聚資糧購良工治器械聲震中原治直之翻咸通元年丙申葬聖武獻文孝皇帝于貞陵此諡正葬貞陵陵中册諡也貞陵在京兆雲陽縣西北四十里咸通元年丙午白敏中入朝墜陛傷腰肩輿以歸咸通元年鄭祗德纍表告急且求救於鄰道浙西遣牙將淩茂貞將四百人宣歙遣牙將白琮將三百人赴之歙書涉翻祗德始令屯郭門及東小江越州有東小江西小江東小江出剡溪至曹娥百官渡而東入海西小江出諸暨至錢清渡而東入于海皆曰小江者以浙江為大江也復扶又翻祗德饋之比度支常饋多十三倍而宣潤將士猶以為不足史言元帥威令不振則惠褻而將士不以為德度徒洛翻以與賊戰諸將或稱病或陽墜馬其肯行者必先邀職級職者軍職級者勳級賊遊騎至平水東小江越州會稽縣東南有平水鎮又東踰山即小江也北又一小江源出大木山南流合于剡江故係平水東以別東小江夜坐待旦各謀逃潰朝廷知祗德懦怯議選武將代之夏侯孜曰浙東山海幽阻可以計取難以力攻西班中無可語者唐凡朝會文官班於東武官班於西故謂武臣為西班雖儒家子王式王播弟起之子也舊史以為播子名聞遠近聞音問可任也諸相皆以為然相息亮翻遂以式為章十二行本為下有浙東二字乙十一行本同孔本同張校同觀察使徵祗德為賓客太子賓客間慢局員也三月辛亥朔式入對上問以討賊方略對曰但得兵賊必可破有宦官侍側曰發兵所費甚大式曰臣為國家惜費則不然為于偽翻兵多賊速破其費省矣若兵少不能勝賊延引歲月賊勢益張張知亮翻則江淮㣥盜將蜂起應之國家用度盡仰江淮仰牛向翻若阻絶不通則上自九廟下及十軍肅宗以後羽林龍武神武神威神策皆分左右號北門十軍元和二年省神武軍明年又省神威軍以其兵騎分隸左右神策而猶存十軍之名其費豈可勝計哉勝音升上顧宦官曰當與之兵乃詔發忠武義成淮南等諸道兵授之裘甫分兵掠衢婺州婺州押牙房郅散將樓曾散將者牙將之散員也散悉但翻將即亮翻下同賊不得入又分兵掠明州明州之民相與謀曰賊若入城妻子皆為葅醢況貨財能保之乎乃自相帥出財募勇士帥讀曰率治器械樹柵浚溝斷橋為固守之備治直之翻斷丁管翻賊又遣兵掠台州破唐興吳分章安之西界置始平縣晉改為始豐縣宋廢唐武德初分臨海置唐興縣宋改曰天台九域志在台州西一百一十里己巳甫自將萬餘人掠上虞焚之上虞漢古縣唐屬越州九域志在州東一百一十里癸酉入餘姚殺丞尉餘姚漢古縣唐屬越州九域志在州東一百四十七里宋白曰餘姚舊縣在餘姚山西風土記云舜支庶所封舜姓姚故曰餘姚入奉化抵寧海殺其令而據之開元二十六年分明州之鄮縣置慈溪縣在州西三十七里又分鄮縣置奉化縣在州南八十里武德四年分臨海縣置寧海縣屬台州九域志在州東北一百七十里所過俘其少壯少詩照翻餘老弱者蹂踐殺之蹂忍久翻踐慈演翻及王式除書下浙東人心稍安下遐稼翻裘甫方與其徒飲酒聞之不樂聞王式來心有所憚樂音洛有如此之衆而策畫未定良可惜也今朝廷遣王中丞將兵來王式蓋檢校御史中丞不四十日必至兵馬使宜急引兵取越州憑城郭據府庫遣兵五千守西陵循浙江築壘以拒之西陵渡在越州西一百二十二里今西興渡是也吳越王錢鏐惡西陵之名改曰西興得間則長驅進取浙西間古莧翻過大江掠揚州貨財以自實揚州江淮之都會也轉運鹽鐵使及度支之貨財聚焉故劉暀朵頤修石頭城而守之宣歙江西必有響應者遣劉從簡以萬人循海而南襲取福建如此則國家貢賦之地盡入於我矣唐自中世以後貢賦皆仰東南故云然終吾身保無憂也觀劉暀策畫豈可以小盜待之乎醉矣明日議之暀以甫不用其言怒陽醉而出有進士王輅在賊中賊客之輅説甫曰如劉副使之謀乃孫權所為也彼乘天下大亂故能據有江東今中國無事此功未易成也説式芮翻易以豉翻不如擁衆據險自守陸耕海漁急則逃入海島此萬全策也甫畏式猶豫未決夏四月式行至柿口義成軍不整式欲斬其將久乃釋之將即亮翻自是軍所過若無人至西陵裘甫遣使請降式曰是必無降心直欲窺吾所為且欲使吾驕怠耳乃謂使者曰甫面縛以來當免而死而汝也乙未式入越州既交政為鄭祗德置酒為于偽翻曰式主軍政不可以飲監軍但與衆賓盡醉逮夜繼以燭曰式在此賊安能妨人樂飲樂音洛下同丙申餞祗德于遠郊復樂飲而歸杜子春周禮注曰五十里為近郊百里為遠郊以今地里考之越州百里至蕭山縣王式豈能送鄭祗德至此邪記事者華言耳復扶又翻告饋餉不足者息矣稱疾臥家者起矣先求遷職者默矣賊別帥洪師簡許會能帥所部降別帥所類翻能帥讀曰率降戶江翻式曰汝降是也當立效以自異立效謂立功也帥讀曰率與賊戰有功乃奏以官先是賊諜入越州軍吏匿而飲食之先悉薦翻諜徒協翻飲於禁翻食祥吏翻文武將吏往往潛與賊通求城破之日免死及全妻子或詐引賊將來降實窺虛實城中密謀屏語屏必郢翻賊皆知之式陰察知悉捕索斬之刑將吏尤橫猾者索山客翻橫戶孟翻嚴門禁無驗者不得出入警夜周密賊始不知我所為矣式命諸縣開倉廩以賑貧乏或曰賊未滅軍食方急不可散也式曰非汝所知官軍少騎卒少詩沼翻式曰吐蕃回鶻比配江淮者比毗至翻其人習險阻便鞍馬可用也舉籍府中得驍健者百餘人凡吐蕃回鶻之配隸浙東觀察府者舉其籍而取之所部遇之無狀無善狀也餧與餒同又賙其父母妻子皆泣拜歡呼歡與喧同悉以為騎卒使騎將石宗本將之凡在管內者皆視此籍之又奏得龍陂監馬二百匹龍陂漢潁川郟縣之摩陂也唐在汝州界置馬監宋白曰元和十三年十一月賜蔡州㣥牧號龍陂牧或請為烽燧以詗賊遠近衆寡詗翾正翻又火迥翻式笑而不應選懦卒使乘健馬少與之兵以為候騎少詩沼翻衆怪之不敢問於是閲諸營見卒見賢遍翻及土團子弟得四千人使導軍分路討賊府下無守兵更籍土團千人以補之乃命宣歙將白琮浙西將淩茂貞帥本軍北來將韓宗政等帥土團合千人石宗本帥騎兵為前鋒自上虞趨奉化解象山之圍號東路軍將即亮翻帥讀曰率趨七喻翻又以義成將白宗建忠張忠下脫武字將遊君楚唐無建忠軍按此時發忠武軍從王式史逸武字也白宗建人姓名號南路軍令之曰毋爭險易易以豉翻毋焚廬舍毋殺平民以增首級平民脅從者募降之降戶江翻得賊金帛官無所問俘獲者皆越人也釋之癸卯南路軍拔賊沃州寨沃洲在今越州新昌縣東南甲辰拔新昌寨新昌時屬剡縣界今置新昌縣在越州東南二百二十里進拔章十二行本拔作抵乙十一行本同孔本同唐興咸通元年白敏中三表辭位上不許右補闕王譜上疏以為陛下致理之初乃宰相盡心之日不可暫闕敏中自正月臥疾今四月矣陛下雖與他相坐語未嘗三刻天下之事陛下嘗暇與之講論乎相息亮翻願聽敏中罷去延訪碩德以資聰明己酉貶譜為陽翟令譜圭之六世孫也王圭事太宗以直聞譜博古翻庚戌朔給事中鄭公輿封還貶譜敕書上令宰相議之宰相以為譜侵敏中竟貶之咸通元年辛亥浙東東路軍破賊將孫馬騎於寧海戊午南路軍大破賊將劉暀毛應天於唐興南谷斬應天先是王式以兵少奏更發忠武義成軍及請昭義軍詔從之先悉薦翻三道兵至越州式命忠武將張茵將三百人屯唐興斷賊南出之道斷音短下同義成將高羅鋭將三百人益以台州土軍徑趨寧海趨七喻翻攻賊巢穴昭義將跌戣將四百人奚結翻跌徒結翻戣渠龜翻益東路軍斷賊入明州之道庚申南路軍大破賊於海遊鎮海遊鎮在寧海南九十里甬溪洞在寧海西南百餘里屬唐興縣界又西則楢溪産鐵戊辰官軍屯於洞口賊出洞戰又破之己巳高羅鋭襲賊別帥劉平天寨破之帥所類翻自是諸軍與賊十九戰賊連敗劉暀謂裘甫曰嚮從吾謀入越州寧有此困邪王輅等進士數人在賊中皆衣緑衣於既翻暀悉斬之曰亂我謀者此青蟲也高羅鋭克寧海收其逃散之民得七千餘人王式曰賊窘且飢必逃入海入海則歲月間未可擒也命羅鋭軍海口以拒之海口在寧海東北四十餘里澨市制翻水際曰澨思益等遇賊將劉章孔本劉下有從字張校同簡於寧海東賊不虞水軍遽至虞度也走音奏得其船十七盡焚之式曰賊無所逃矣惟黃罕嶺可入剡黃罕嶺在奉化縣西北剡縣之東其路深險度黃罕嶺則平川四十里至剡雖然亦成擒矣裘甫既失寧海乃帥其徒屯南陳館下南陳館在寧海西南六十餘里帥讀曰率辛未東路軍破賊將孫馬騎於上疁村上疁村在寧海西北四十餘里疁力留翻今謂之上寮山請降咸通元年壬申右拾遺內供奉薛調上言以為兵興以來賦斂無度上時掌翻斂力贍翻所在㣥盜半是逃戶固須翦滅亦可閔傷望敕州縣稅外毋得科率仍敕長吏嚴加糾察從之咸通元年袁王紳薨紳順宗子咸通元年戊寅浙東東路軍大破裘甫於南陳館斬首數千級賊委棄繒帛盈路繒慈陵翻以緩追者跌戣令士卒敢顧者斬毋敢犯者賊果自黃罕嶺遁去六月甲申復入剡復扶又翻下同諸軍失甫不知所在義成將張茵在唐興獲俘將苦之俘曰賊入剡矣苟捨我我請為軍導從之茵後甫一日至剡壁其東南府中聞甫入剡復大恐王式曰賊來就擒耳命趣東南兩路軍會於剡趣讀曰促辛卯圍之賊城守甚堅攻之不能拔諸將議絶溪水以渴之剡城東南臨溪西北負山城中多鑿井以引山泉非絶溪水所能渴作史者乃北人臆説耳今浙東諸縣皆無城獨剡縣有城猶為完壯乃出戰三日凡八十三戰賊雖敗官軍亦疲賊請降諸將出章十二行本出作以乙十一行本同孔本同熊校同白式式曰賊欲少休耳少詩沼翻益謹備之功垂成矣賊果復出又三戰庚子夜裘甫劉暀劉慶從百餘人出降遙與諸將語離城數十步官軍疾趨斷其後離力智翻斷音短遂擒之壬寅甫等至越州式腰斬暀慶等二十餘人械甫送京師考異曰平剡録曰諸軍圍賊於剡賊悍甚其所謂女軍者亦乘城摘礫以中人三日凡八十三戰賊雖衄官軍亦疲裘甫佯言乞降諸將使騎來白公曰賊憊暫休耳謹備之仍遣押牙薛敬義謂諸將曰功成矣勉之勿怠也果復三戰二十一日夜甫與劉暀劉慶十餘輩又從百餘人出遙與諸將語伺我軍之懈將使勇者潰圍焉諸將得公誡夜皆設伏於營前甫輩離城數十步伏兵疾走以間之鋭師數百復繼之城中賊不出甫遽甚不知所為遂成擒焉至是用兵六十六日矣二十三日縛致府城公於衙門陳兵以見執其徒劉暀劉慶二十餘輩三斬之械裘甫獻闕下玉泉子見聞録曰王式討裘甫甫始起於剡既為官軍所敗復入于剡城堅卒鋭不可遽拔式乃約降許奏以金吾將軍甫許焉其將劉暀獨以為不可比及越城左右則械手以木曳頸以組甫曰吾既已降何用是為左右曰法也到越則釋去公且行有命矣既至式登南樓俟之曰裘甫何罪罪皆劉暀輩命三斬之暀顧謂甫曰君竟拜金吾乎斬甫于長安東市初甫之入剡也雖已纍敗向使城守期歲未可平也玉泉子曰古人有言殺降不祥李廣所以不侯良有以也王公亦不聞大貴鄭公述平剡録一何曲筆哉雖驟歷清顯而卒以喪明不復起可不慎哉按二書所言莫知孰是然裘甫在剡城窮困已極勢不能久式不必更以詐誘之或者諸將為之不可知也甫之出降也或欲突走或被誘而來皆不可知要之為出城乞降官軍因邀斷其後擒之耳剡城猶未下諸將已擒甫不復設備劉從簡帥壯士五百突圍走諸將追至大蘭山今明州奉化縣西北有大蘭山山在越州分界復扶又翻帥讀曰率秋七月丁巳諸將共攻克之台州刺史李師望募賊相捕斬之以自贖所降數百人得從簡首獻之大蘭既破劉從簡走入台州界方為其黨所殺諸將還越式大置酒諸將乃請曰某等生長軍中久更行陳長知兩翻更工衡翻行戶剛翻今年得從公破賊然私有所不諭者敢問公之始至軍食方急而遽散以賑貧乏何也式曰此易知耳易以豉翻賊聚穀以誘飢人吾給之食則彼不為盜矣且諸縣無守兵賊至則倉穀適足資之耳又問不置烽燧何也式曰烽燧所以趣救兵也趣讀曰促兵盡行城中無兵以繼之徒驚士民使自潰亂耳又問使懦卒為候騎而少給兵何也式曰彼勇卒操利兵操七高翻遇敵且不量力而鬬鬬死則賊至不知矣皆曰非所及也自至德以來浙東盜起者再袁朝裘甫是也裘甫之禍不烈於袁朝袁朝之難張伯儀平之通鑑所書數語而已今王式之平裘甫通鑑書之視張伯儀平袁朝事為詳蓋唐中世之後家有私史王式儒家子也成功之後紀事者不無張大通鑑因其文而序之弗覺其煩耳容齋隨筆曰通鑑書討裘甫事用平剡録蓋亦有見於此考異三十卷辨訂唐事者居太半焉亦以唐私史之多也咸通元年封憲宗子為信王彌遣翻咸通元年八月裘甫至京師斬于東市加王式檢校右散騎常侍諸將官賞各有差先是上每以越盜為憂先悉薦翻夏侯孜曰王式才有餘不日告捷矣孜與式書曰公專以執裘甫為事軍須細大此期悉力軍須謂行軍所須糧仗衣物悉力謂盡力應辦也由是能成其功咸通元年衛王灌薨灌上弟也咸通元年九月白敏中五上表辭位辛亥以敏中為司徒中書令咸通元年右章十二行本右上有癸酉二字乙十一行本同孔本同張校同退齋校同拾遺句容劉鄴上言李德裕父子為相有聲迹功效李德裕父吉甫相憲宗德裕相武宗皆有勳勞在於王室備著前紀血屬將盡生涯已空宜賜哀閔贈以一官冬十月丁亥敕復李德裕太子少保衛國公贈左僕射德裕貶見二百四十八卷宣宗大中元年考異曰裴旦李太尉南行録載咸通二年九月二十六日右拾遺內供奉劉鄴表略云子曄貶立山尉去年獲遇陛下惟新之命覃作解之恩移授郴縣尉今已沒於貶所又曰血屬已盡生涯悉空又曰枯骨未歸於塋域一男又殞於江湘又曰其李德裕請特賜贈官敕依奏實録注引東觀奏記云令狐相綯夢德裕曰某已謝明時幸相公哀之許歸葬故里綯具為其子滈言之滈曰李衛公犯衆怒又崔相鉉魏相謨皆敵人也見持政必將上前異同未可言也後數日上將坐延英綯又夢德裕曰某委骨海上思還故里與相公有舊幸憫而許之既寤復謂滈曰向見衛公精爽尚可畏吾不言必掇禍明日入中書且為同列言之既而於帝前論奏許其子蒙州立山尉曄護喪歸葬又是時柳仲郢鎮東蜀設奠於荊南命從事李商隱為文曰恭承新渥言還舊止又云身留蜀郡路隔伊川鄴奏乃云孤骨未歸塋域曄懿宗初才徙郴縣尉未詳或者後人偽作之非鄴本奏也實録注又云白敏中為中書令時與右庶子段全緯書云故衛公太尉災興鵂鳥怨結江魚親交雨散於西園子弟蓬飄於南土嘗蒙一顧繼履三台保持獲盡於天年論請爰加於寵贈全緯嘗為德裕西川從事故敏中語及云按此似繇敏中開發而數本追復贈官多連鄴奏德裕素有恩於敏中敏中前作相既遠貶之至此又掠其美鄙哉按劉鄴表云去年獲遇陛下惟新之命覃作解之恩則上此表在咸通元年非二年也舊傳鄴為翰林學士承旨以李德裕貶死朱崖大中朝令狐綯當權纍有赦宥不蒙恩列懿宗即位綯在方鎮屬郊天大赦鄴奏論之李太尉南行録鄴此時未為翰林學士因上此表敕批便令內養宣喚入翰林充學士餘依奏金華子雜編曰宣宗嘗私行經延資庫見廣廈連綿錢帛山積問左右曰誰為此庫侍臣對曰宰相李德裕執政日以天下每歲備用之餘自是已來邊庭有急支備無乏者茲實有賴上曰今何在曰頃以坐吳湘獄貶于崖州上曰如有此功於國微罪豈合深譴由是劉公鄴得以進表乞追雪之上一覽表遂許其加贈歸葬焉按宣宗素惡德裕故始即位即逐之豈有不知其在崖州而云豈合深譴又劉鄴追雪在懿宗時此説殊為淺陋今不取咸通元年己亥以門下侍郎同平章事夏侯孜同平章事充西川節度使以戶部尚書判度支畢諴為禮部尚書同平章事咸通元年安南都護李鄠復取播州播州屬黔中道大中十三年為雲南所陷此非安南巡屬也李鄠越境收復欲以為功而不知蠻兵乘虛已陷安南也鄠音戶復扶又翻咸通元年十一月丁丑上祀圜丘赦改元咸通元年十二月戊申安南土蠻引南詔兵合三萬餘人乘虛攻交趾陷之考異曰新南詔傳大中時李琢為安南經略使苛墨自私以斗鹽易一牛夷人不堪結南詔將段酋遷陷安南都護府號白衣沒命軍懿宗絶其朝貢乃陷播州安南都護李鄠屯武州咸通元年為蠻所攻棄州走天子斥鄠以王寬代之按宣宗時南詔未嘗陷安南據新傳則似大中時已陷安南咸通元年又陷武州也且李鄠安南失守然後奔武州非在武州而棄之新傳誤也今從實録新志雍管所領又有顯州武州沈州後皆廢省據此則武州當在宜州界二年咸通二年春正月詔發雍管及鄰道兵救安南擊南蠻咸通二年二月以中書令白敏中兼中書令充鳳翔節度使以左僕射判度支杜悰兼門下侍郎同平章事一日兩樞密使詣中書宣徽使楊公慶繼至獨揖悰受宣受宣受宣命也避之西軒三相畢諴杜審權蔣伸也發之乃宣宗大漸時章十二行本時下有宦官二字乙十一行本同孔本同張校同退齋校同請鄆王監國奏也且曰當時宰相無名者當以反法處之悰反復讀處昌呂翻復音覆又如字良久曰聖主登極萬方欣戴今日此文書非臣下所宜窺復封以授公慶曰主上欲罪宰相當於延英面示聖旨明行誅譴公慶去悰復與兩樞密坐謂曰內外之臣事猶一體宰相樞密共參國政今主上新踐阼未熟萬機資內外裨補固當以仁愛為先刑殺為後豈得遽贊成殺宰相事若主上習以性成則中尉樞密權重禁闈時以兩中尉兩樞密為四貴言殺宰相則上手滑矣中尉樞密亦將及禍豈得不自以為憂六朝謂憲穆敬文武宣不欲朝廷以愛憎行法兩樞密相顧默然徐曰當具以公言白至尊非公重德無人及此慙悚而退三相復來見悰微請宣意悰無言三相惶怖乞存家族悰曰勿為他慮既而寂然無復宣命及延英開上色甚悅意此亦是據杜悰家傳書之其辭旨抑揚容有過其實者洪邁隨筆曰按懿宗即位之日宰相四人曰令狐綯曰蕭鄴曰夏侯孜曰蔣伸至是惟有伸在三人者罷去矣諴及審權乃懿宗自用者無有斯事蓋野史之妄溫公以唐事屬之范祖禹其審取可謂詳盡尚如此信乎修史之難哉考異曰新傳云宣宗大漸樞密使王歸長等矯詔迎鄆王立之懿宗即位欲罪大臣悰解之按立鄆王者王宗實新傳云歸長誤也今從補國史是時士大夫深疾宦官事有小相涉則衆共棄之建州進士葉京嘗預宣武軍宴識監軍之面既而及第在長安與同年出遊遇之於塗馬上相揖因之謗議喧然遂沈廢終身其不相悅如此東漢黨錮之禍蓋亦如此但李杜諸公風節凜凜千載之下讀其事者猶使人心神肅然晚唐詩人不能企其萬一也而亦以胎清流之禍哀哉沈持林翻咸通二年福王綰薨綰順宗子咸通二年夏六月癸丑以鹽州防禦使王寬為安南經略使時李鄠自武州收集土軍攻㣥蠻復取安南朝廷責其失守貶儋州司戶鄠初至安南殺蠻酋杜守澄其宗黨遂誘道㣥蠻陷交趾道讀曰導朝廷以杜氏強盛務在姑息冀收其力用乃贈守澄父存誠金吾將軍再舉鄠殺守澄之罪長流崖州劉昫曰唐武德四年以隋朱崖郡為崖州自雷州徐聞縣南舟行四百三十里渡大海達崖州宋白曰宋開寶六年割舊崖州之地屬瓊州卻改振州為崖州考異曰實録又賜寬手詔云云如聞李琢在安南日殺害杜存誠李鄠又處置其子守澄使誘導㣥蠻陷沒城邑卿到鎮日於李鄠處索取前後敕詔一一參詳初李琢在鎮蠻首領愛州刺史兼土軍兵馬使杜存誠密誘溪洞夷獠為之鄉導涿察其不忠戮死焉及李鄠至鎮蠻陷安南鄠走武州召土軍收復城邑而存誠家兵甚衆朝廷務姑息乃贈存誠金吾將軍鄠以失備貶儋州補國史蠻陷安南李鄠投武州召土軍收復頗有功績殺首領杜存誠以捍禦盤桓不戮力盡敵兼洞夷獠為鄉導之罪也鄠貶儋州後以存誠溪洞強獷家兵數多子弟繼總軍旅皆輸忠勇軍府倚賴方甚朝廷亦加姑息乃再舉憲章長流鄠崖州贈存誠金吾將軍以誘其竭力命前鹽州刺史王宙為都護按鄠所殺存誠之子守澄已為王式所逐鄠至旬日殺之非因扞禦不戮力也代鄠者乃王寬非王宙補國史誤也今獨取鄠克復安南一事餘皆從平剡録實録按唐朝若以杜守澄之戮為李鄠罪則當贈守澄官不當贈其父官此余所以致疑於前也咸通二年秋七月南詔章十二行本詔作蠻乙十一行本同孔本同攻雍州陷之先是廣桂容三道共發兵三千人戍雍州三年一代先悉薦翻經略使段文楚請以三道衣糧自募土軍以代之朝廷許之所募才得五百許人文楚入為金吾將軍經略使李蒙利其闕額衣糧以自入悉罷遣三道戍卒止以所募兵守左右江比舊什減七八故蠻人乘虛入寇時蒙已卒經略使李弘源至鎮才十日無兵以禦之城陷弘源與監軍脫身奔巒州宋白曰雍州古南越城晉置晉興郡隋廢郡為宣化縣唐武德四年於此置南晉州貞觀六年改雍州至長安五千六百里巒州秦桂林郡地唐置淳州後改巒州至京師五千三百里西至雍州三百里蠻去乃還還從宣翻又如字弘源坐貶建州司戶文楚時為殿中監復以為雍管經略使至鎮城邑居人什不存一文楚秀實之孫也段秀實死於朱泚之難咸通二年杜悰上言南詔向化七十年貞元間南詔復向化㣥蠻率服率服謂相率而服從也未可輕與之絶且應遣使弔祭曉諭清平官等以新王名犯廟諱故未行册命事始見上卷大中十三年更工衡翻然後遣使册命庶全大體上從之命左司郎中孟穆為弔祭使未發會南詔寇巂州攻邛崍關穆遂不行考異曰實録在此年十二月按補國史杜邠公再入輔建議遣使弔祭令其改名才命使臣已破越巂城池攻邛崍關鎮使臣逗留數月不發然則命穆充使當在寇巂州前實録書於十二月誤也按南詔已稱帝陷安南豈可彌縫悰但欲姑息故陽不知其僭號及以陷安南者為土蠻耳咸通二年冬十月以御史大夫鄭涯為山南東道節度使十一月加同平章事三年咸通三年春正月庚寅朔㣥臣上尊號曰睿文明聖孝德皇帝赦天下咸通三年以中書侍郎同平章事蔣伸同平章事充河中節度使咸通三年二月棣王惴薨咸通三年南詔復寇安南經略使王寬數來告急復扶又翻數所角翻朝廷以前湖南觀察使蔡襲代之考異曰補國史王宙有緝理撫衆才遠人懷惠才未周歲南蠻復侵封部請兵設備纍以危急上聞乃命桂管都防禦使蔡襲代之實録以前湖南觀察使蔡襲為安南經略等使王寬亦制置失宜諸部蠻相帥內寇故命襲往代焉今從之各三萬人則八道之兵為二十四萬不既多乎疑各字誤否則萬字誤蜀本作合三萬人良是章十二行本正作合孔本同兵勢既盛蠻遂引去考異曰實録咸通三年二月以蔡襲為安南經略招討處置等使三月以蔡京充荊襄以南宣慰安撫使五月以京為嶺南西道節度使舊紀三年十一月遣蔡襲帥禁軍三千赴援安南按補國史云咸通三年使左庶子蔡京制置嶺南事又云命桂管都防禦使蔡襲代王宙其明年使蔡京制置嶺南事然則襲除安南似在咸通二年也又按樊綽蠻書云臣咸通三年三月四日奉本使尚書蔡襲手示密委臣深入賊帥朱道古營寨三月八日入賊重圍之中臣卻回一一白於都護王寬領得臣書牒全無指揮亶放軍回苟求朝獎致襲枉傷矢石陷失城池徵之其由莫非蔡京王寬之過綽既謂襲為本使為之入蠻則是襲已到官又云回白都護王寬則是寬猶未去任也不知綽不白襲而白寬何故也又襲將兵代寬寬為己替之人安能亶放軍回令襲陷沒疑蠻書亶放軍回字上少蔡京二字襲除安南不知的在何年月今從實録謂募土軍以代廣桂容戍軍更工衡翻考異曰補國史文楚到後城邑牢落人戶雕殘才得數月朝廷責其更改舊制降授威衛分司蓋文楚既之官而朝議責雍州陷沒由文楚請罷三道戍兵自募土軍故云更改舊制而實録云及文楚再至城池圮廢人戶殘耗由是頗更舊制未數月朝廷慮致煩擾復改命懷玉焉新傳文楚數改條約衆不悅以胡懷玉代之蓋因補國史改更舊制之語相承致誤也咸通三年左庶子蔡京性貪虐多詐時相以為有吏才相息亮翻奏遣制置嶺南事三月京還奏事稱旨稱尺證翻復以京權知太僕卿充荊襄以南宣慰安撫使為蔡京奔敗張本復扶又翻咸通三年夏四月己亥朔敕於兩街四寺各置戒壇度人三七日兩街四寺謂慈恩薦福西明莊嚴也三七二十一日怠於政事嘗於咸泰殿築壇為內寺尼受戒內寺尼蓋宮人捨俗者就禁中為寺以處之非教也又於禁中設講席自唱經手録梵夾梵夾者貝葉經也以板夾之謂之梵夾段成式曰貝多葉出摩伽陀西國土用以寫經其樹長六七丈經冬不凋施與無度數所角翻施式豉翻吏部侍郎蕭倣上疏以為玄祖之道慈儉為先素王之風仁義為首玄祖謂唐祖老子尊為玄元皇帝也素王謂孔子也必不可加佛者棄位出家割愛中之至難取滅後之殊勝人情莫不愛其親莫不愛富貴佛者棄父母之親捨王子之貴而出家是割愛中之至難又釋氏為宏闊勝大之言以為佛滅度後諸天神王供養莊嚴皆人世所希有後人又奉其法而尊事之是取滅後之殊勝也願陛下時開延英接對四輔力求人瘼瘼音莫病也虔奉宗祧思繆賞與濫刑其殃必至知勝殘而去殺得福甚多罷去講筵繆靡幼翻勝音升去羌呂翻講筵與僧尼講經之筵躬勤政事上雖嘉獎竟不能從咸通三年嶺南舊分五管廣桂雍容安南皆隸嶺南節度使蔡京奏請分嶺南為兩道節度從之五月敕以廣州為東道雍州為西道又割桂管龔象二州容管藤巖二州隸雍管尋以嶺南節度使韋宙為東道節度使以蔡京為西道節度使蔡襲將諸道兵在安南蔡京忌之恐其立功奏稱南蠻遠遁邊徼無虞徼吉弔翻武夫邀功妄占戍兵占之贍翻虛費餽運蓋以荒陬路遠陬將侯翻難於覆驗故得肆其姦詐請罷戍兵各還本道朝廷從之襲纍奏㣥蠻伺隙日久不可無備伺相吏翻乞留戍兵五千人不聽襲以蠻寇必至交趾兵食皆闕謀力兩窮作十必死狀申中書時相信京之言終不之省時相苟求省餽運之費故京之言易入襲之請不行省悉景翻咸通三年秋七月徐州軍亂逐節度使溫璋考異曰舊傳曰璋咸通末為徐泗節度使徐州牙卒曰銀刀軍頗驕橫璋至誅其凶惡者五百餘人自是軍中畏法按誅銀刀軍者王式也舊傳誤初王智興既得徐州募勇悍之士二千人號銀刀雕旗門槍挾馬等七軍常以三百餘人自衛露刃坐於兩廡夾幕之下每月一更更工衡翻其後節度使多儒臣其兵浸驕小不如意一夫大呼呼火故翻其衆皆和之和戶臥翻節度使輒自後門逃去前節度使田牟至與之雜坐飲酒把臂拊背或為之執板唱歌為于偽翻犒賜之費日以萬計風雨寒暑復加勞來復扶又翻勞力到翻來力代翻猶時喧譁邀求不已牟薨璋代之驕兵素聞璋性嚴憚之璋開懷慰撫而驕兵終懷猜忌賜酒食皆不歷口一旦竟聚譟而逐之朝廷知璋無辜乙亥以璋為邠寧節度使以浙東觀察使王式為武寧節度使咸通三年以前西川節度使同平章事夏侯孜為左僕射同平章事咸通三年忠武義成兩軍從王式討裘甫者猶在浙東詔式帥以赴徐州帥讀曰率驕兵聞之甚懼八月式至大彭館大彭館在徐州城外大彭即彭祖所謂商有大彭霸諸侯者也一曰彭祖姓籛名鏗事帝堯歷虞夏至商年八百歲封於彭城故彭城人以名館式視事三日饗兩鎮將士遣還鎮章十二行本鎮作既乙十一行本同孔本同張校云還下衍鎮字脫既字擐甲執兵命圍驕兵盡殺之銀刀都將邵澤等數千人皆死考異曰舊傳曰式至鎮盡誅銀刀等七軍徐方平定金華子雜編曰溫璋失律於徐州自河陽移式往鎮之式領河陽全軍赴任徐州將士聞式到近境先遣衙隊三百人遠接式衩衣坐胡床受參既畢乃問其逐帥之罪命皆斬於帳前不留一人既而相次繼來莫知前死者音耗至則又斬之亦無脫者如是數日銀刀都數千人垂盡虎狼之衆居常咸謂能吞噬於人及于斯際式衣襖子半臂曳屐危坐逐人皆拱手就戮無一敢旅拒者其後親戚相訝不能自會焉按若頓殺數千人豈有人不知者又式自浙東除武寧非河陽也今從實録甲子敕以徐州先隸淄青道李洧自歸始置徐海使額見二百二十七卷德宗建中三年特帖濠泗二州見二百三十三卷貞元四年自寇孽消弭而武寧一道職為亂階今改為徐州團練使隸兗海節度復以濠州歸淮南道更於宿州置宿泗都團練觀察使憲宗元和四年析徐州之符離蘄泗州之虹置宿州治甬橋在徐州南界汴水上當舟車之會宋白曰宿州取古宿國為名章十二行本三作二乙十一行本同孔本同張校同千人守徐州餘皆分隸兗宿且以王式為武寧節度使兼徐泗濠宿制置使委式與監軍楊玄質分配將士赴諸道訖然後將忠武義成兩道兵至汴滑各遣歸本道身詣京師其銀刀等軍逃匿將士聽一月內自首首手又翻一切勿問咸通三年嶺南西道節度使蔡京為政苛慘設炮烙之刑闔境怨之遂為雍州軍士所逐嶺南分二節鎮西道治雍州藤州漢猛陵縣地唐置藤州至京師五千六百里募鄉丁及旁側土軍以攻雍州衆既烏合動輒潰敗往依桂州桂州人怨其分裂不納以其割桂管巡屬隸西道節度也敕貶崖州司戶不肯之官還至零陵敕賜自盡以桂管觀察使鄭愚為嶺南西道節度使咸通三年冬十月丙申朔立皇子佾為魏王侹為涼王佶為蜀王侹他鼎翻佶其吉翻咸通三年十一月立順宗子緝為蘄王憲宗子憤為榮王咸通三年南詔帥㣥蠻五萬寇安南帥讀曰率考異曰補國史云四年春南蠻帥衆五萬攻安南按蠻書咸通三年十二月二十一日桃花人安南城西南角下營茫蠻於蘇歷江岸屯聚裸形蠻亦當陳面二十七日蠻賊逼交州城則是今年冬末蠻已圍交州也今從實録都護蔡襲告急敕發荊南湖南兩道兵二千桂管義征子弟三千詣雍州義征子弟因其應募從軍名之咸通三年嶺南東道節度使韋宙奏蠻寇必向雍州若不先保護遽欲遠征恐蠻於後乘虛扼絶餉道乃敕蔡襲屯海門考異曰實録詔襲且住海門是令棄交趾退屯海門也按襲死時猶在交趾蓋詔書到時襲已被圍不得通也十二月襲又求益兵敕山南東道發弩手千人赴之時南詔已圍交趾襲嬰城固守救兵不得至咸通三年翼王繟薨繟順宗子音齒善翻咸通三年是歲嗢末始入貢嗢末者吐蕃之奴號也嗢烏沒翻吐蕃每發兵其富室多以奴從從才用翻往往一家至十數人由是吐蕃之衆多及論恐熱作亂奴多無主遂相糾合為部落散在甘肅瓜沙河渭岷廓疊宕之間宕徒浪翻吐蕃微弱者反依附之四年咸通四年春正月庚午上祀圜丘赦天下咸通四年是日南詔陷交趾蔡襲左右皆盡徒步力戰身集十矢欲趣監軍船趣七喻翻船已離岸遂溺海死離力智翻蔡襲死矣而十必死之狀曾無朝臣一人為之申理自是之後唐之紀綱大壞凡藩鎮有片言隻字則朝廷聳動惟恐拂其意朝臣反與之關通依以為外主矣幕僚樊綽攜其印浮渡江自白州博白縣西南百里下北戍灘出馬門江渡海抵安南界樊綽攜印渡處即此江走至城東水際荊南虞候元惟德等謂衆曰吾輩無船入水則死不若還向城與蠻鬬人以一身易二蠻亦為有利遂還向城入東羅門東羅門安南羅城東門也惟德等縱兵殺蠻二千餘人考異曰實録二月安南經略使蔡襲奏蠻賊楊思僭羅伏州扶耶縣令麻光高部領其衆五六千人於城西角下營嶺南東道節度使韋宙奏蠻賊去十二月二十七日逼安南城池經略使檢校工部尚書蔡襲出兵格鬬殺傷相當正月三日賊衆圍城進攻甚急襲城上以車弩射之至七日城陷襲右膊中弩箭死家口並元從七十餘人悉隕於賊從事樊綽攜印渡江其荊南江西鄂嶽襄州兵突到城東水際無船卻回相率入東羅門殺蠻僅一二千人至夜賊救兵至遂屠其城按此二奏似後人采集蠻書為之其中又多差舛如楊思僭蠻書中兩處有之皆作楊思縉蓋草書誤為僭耳彼雖蠻夷豈肯名思僭也張錦里耆舊傳載高駢與雲南牒亦云楊思縉善蘭節度使新書亦承此誤為僭又蠻書所云思縉光高部領者桃花蠻五六千人耳非謂盡將㣥蠻也補國史云蠻衆五萬攻安南非止五六千人也又十二月二十一月裸形蠻茫蠻桃花人已在城下豈至二十七日始逼安南也蠻書言二十七日逼城者但記見河蠻尋傳蠻之日耳又言正月二日三日者但記以車弩射得苴子之日耳非其日始圍城也且城陷奔迸之際非樊綽身在其間豈知其詳四道兵入城所殺人數猶因僧無旱説始知之韋宙身在廣州何得所奏一如樊綽之書其偽明矣新傳曰是夜蠻遂屠城亦承實録而誤蠻將楊思縉始自子城出救之子城城內小城也南詔兩陷交趾所殺虜且十五萬人留兵二萬使思縉據交趾城溪洞夷獠無遠近皆降之獠魯皓翻降戶江翻詔諸道兵赴安南者悉召還分保嶺南章十二行本南下有東字乙十一行本同張校同云無注本南東二字誤倒西道咸通四年上遊宴無節左拾遺劉蛻上疏曰蛻輸芮翻今西涼築城應接未決於與奪西涼即涼州蓋此時謀進築也軼徒結翻突也干戈悉在於道塗旬月以來不為無事陛下不形憂閔以示遠近則何以責其死力望節娛遊以待遠人乂安未晚言待遠人乂安之後然後娛遊尚未為晚咸通四年二月甲午朔上歷拜十六陵十六陵謂獻陵昭陵乾陵定陵橋陵泰陵建陵元陵崇陵豐陵景陵光陵莊陵章陵端陵貞陵考異曰拜十六陵非一日可了而舊史無還宮之日唐年補録云二月庚子一日拜十六陵尤難信也咸通四年置天雄軍於秦州代宗姑息田承嗣以天雄軍號寵魏博尋以其悖傲削之今復於秦州置天雄軍至於唐末魏博復天雄軍號秦州不復號天雄矣以前左金吾將軍王晏實為天雄觀察使晏實宰之子宰父智興子之見二百四十七卷會昌四年咸通四年三月歸義節度使張義潮奏自將蕃漢兵七千克復涼州將即亮翻下同咸通四年南蠻寇左右江浸逼雍州鄭愚懼自言儒臣無將略請任武臣朝廷召義武節度使康承訓詣闕欲使之代愚仍詔選軍校數人士卒數百人自隨就義武軍中選之也校戶教翻咸通四年中書侍郎同平章事畢諴以同列多徇私不法稱疾辭位夏四月罷為兵部尚書咸通四年庚戌㣥盜入徐州殺官吏刺史曹慶討平之咸通四年康承訓至京師以為嶺南西道節度使發荊襄洪鄂四道兵萬人與之俱咸通四年五月戊辰以翰學士承旨兵部侍郎楊收同平章事收發之弟也宣宗以開河湟追加順憲二宗尊號有司議改造廟主署新諡發以為作主求古無其文執不可知禮者韙之由是知名故得為相價音介為楊收與玄價交惡張本咸通四年乙亥廢容管隸嶺南西道章十二行本道下有以供軍食四字乙十一行本同孔本同張校同退齋校同復以龔象二州隸桂管去年以龔象隸嶺南西道咸通四年戊子以門下侍郎同平章事杜審權同平章事充鎮海節度使咸通四年六月廢安南都護府置行交州於海門鎮以右監門將軍宋戎為行交州刺史以康承訓兼領安南及諸軍行營咸通四年閏月以門下侍郎同平章事杜悰同平章事充鳳翔節度使以兵部侍郎判度支河南曹確同平章事咸通四年秋七月辛卯朔日有食之咸通四年復置安南都護府於行交州考異曰實録以郡州為交州補國史亦同又云夏侯貞孝公請用高駢為郡州進討使按地理志無郡州補國史又云海門今晏州地理志晏州乃屬瀘州都督府嶺南亦無之發山東兵萬人鎮之時諸道兵援安南者屯聚嶺南句斷此四字衍酈道元曰湘灕同源分為二水南則灕水北則湘川湘灕之間陸地廣百餘步謂之始安嶠漢伐南越出零陵下灕水即此路也湘水出零陵始安縣陽朔山自零陵西南謂之澪渠新書曰桂州有灕水出海陽山世言秦命史祿伐越鑿為漕馬援討徵側復治以通餽後為江水潰毀渠遂廞淺唐李渤復浚之范成大桂海虞衡志曰湘灕二水皆出靈川之海陽行百里分南北下北下曰湘稠灘急瀧又二千里至長沙水始緩南下曰灕名灘三百六十又千二百里至番禺以入海又曰靈渠在桂之興安縣秦始皇戍嶺時史祿鑿此以運之遺迹湘水源於雲泉之陽海山在此下瀜江牂柯下流本南下廣西興安水行其間地勢最高二水遠不相謀祿始作此渠派湘之流而注之瀜使北水南合北舟踰嶺其作渠之法於湘流沙磕中壘石作鏵觜鋭其前逆分湘流為兩激之六十里行渠中以入瀜江與俱南渠繞興安界深不數尺廣丈餘六十里間置斗門三十六土人但謂之斗舟入一斗則復閘斗伺水積漸進故能循崖而上建瓴而下千斛之舟亦可往來治水巧妙無如靈渠者澪音零灕音離止諸軍乏食潤州人陳磻石上言磻薄官翻請造千斛大舟自福建運米泛海不一月至廣州從之軍食以足然有司以和雇為名奪商人舟委其貨於岸側舟入海或遇風濤沒溺有司囚繫綱吏舟人使償其米人頗苦之咸通四年八月嶺南東道節度使韋宙奏蠻必向雍州請分兵屯容藤州容藤二州相去二百七十里咸通四年夔王滋薨滋上弟也咸通四年敕以閣門使吳德應等為館驛使臺諫上言故事御史巡驛唐中世置閣門使以宦者為之掌供奉朝會贊引親王宰相百官蕃客朝見辭唐初中書通事舍人之職也玄宗開元中以監察御史兼巡傳驛至二十五年以監察御史檢校兩京館驛大曆十四年兩京以御史一人知館驛號館驛使宋白曰元和初征劉闢郵傳多事憲宗命中人為館驛使監察御史薛存誠及諫官相繼論奏罷之章十二行本人作臣乙十一行本同代之上諭以敕命已行不可復改左拾遺劉蛻上言昔楚子縣陳得申叔一言而復封之左傳楚子為陳夏氏亂故伐陳遂入陳殺夏徵舒因縣陳申叔時不賀楚子問其故對曰夏徵舒弒其君其罪大矣討而戮之君之義也今縣陳貪其富也無乃不可乎王曰善哉乃復封陳聞張玄素諫即日罷之見一百九十三卷貞觀四年從諫如流豈有已行而不改且敕自陛下出之自陛下改之何為不可弗聽咸通四年黠戛斯遣其臣合伊難支表求經籍及每年遣使走馬請曆又欲討回鶻使安西以來悉歸唐不許咸通四年冬十月甲戌以長安尉集賢校理令狐滈為左拾遺乙亥左拾遺劉蛻上言滈專家無子弟之法布衣行公相之權相息亮翻起居郎張雲言滈父綯用李涿為安南見上卷宣宗大中十二年由滈納賄陷父於惡十一月丁酉雲復上言滈父綯執政之時復扶又翻人號白衣宰相滈亦上表引避乃改詹事府司直唐太子詹事府有司直二人正七品上掌糾劾宮寮及率府之兵咸通四年辛巳廢宿泗觀察使復以徐州為觀察府以濠泗隸焉去年八月廢徐州軍額咸通四年十二月南詔寇西川咸通四年昭義節度使沈詢奴歸秦與詢侍婢通詢欲殺之未果乙酉歸秦結牙將作亂攻府第殺詢五年咸通五年春正月以京兆尹李蠙為昭義節度使蠙部田翻取歸秦心肝以祭沈詢咸通五年淮南節度使令狐綯為其子滈訟冤為于偽翻貶張雲興元少尹劉蛻華陰令華戶化翻敕曰雖嘉蹇諤之忠難逃疏易之責易以豉翻咸通五年丙午西川奏南詔寇巂州刺史喻士珍破之獲千餘人觀明年喻士珍以貪獪而失守則此捷虛張功狀也忠武大將顏慶復請築新安遏戎二城從之二城蓋築於巂州界咸通五年以容管經略使張茵兼句當交州事句古候翻當丁浪翻時交州寄治海門欲使張茵進取益海門鎮兵滿二萬五千人令茵進取安南咸通五年二月己巳以刑部尚書鹽鐵轉運使李福同平章事充西川節度使咸通五年甲申前西川節度使蕭鄴左遷山南西道觀察使咸通五年三月丁酉彗星出於婁長三尺彗祥歲翻又徐醉翻又音歲長直亮翻己亥司天監奏按星經是名含譽瑞星也上大喜唐司天監正三品掌察天文稽曆數史言唐末司天官昏迷天象以妖為祥請宣示中外編諸史策從之咸通五年康承訓至雍州蠻寇益熾詔發許滑青汴兗鄆宣潤八道兵以授之承訓不設斥候南詔帥㣥蠻近六萬寇雍州帥讀曰率近其靳翻將入境承訓乃遣六道兵凡萬人拒之以獠為導紿之熾昌志翻獠音老紿徒亥翻敵至不設備五道兵八千人皆沒惟天平軍後一日至得免天平軍鄆兵也惶怖不知所為怖普布翻節度副使李行素帥衆治壕柵甫畢蠻軍已合圍留四日治攻具將就諸將請夜分道斫蠻營承訓不許有天平小校再三力爭乃許之小校將勇士三百夜縋而出將即亮翻校戶教翻縋馳偽翻散燒蠻營斬首五百餘級蠻大驚間一日解圍去承訓乃遣諸軍數千追之所殺虜不滿三百級皆溪獠脅從者承訓騰奏告捷云大破蠻賊中外皆賀咸通五年夏四月以兵部侍郎判戶部蕭置同平章事置復之孫也蕭復相德宗咸通五年加康承訓檢校右僕射賞破蠻之功也自餘奏功受賞者皆承訓子弟親昵昵尼質翻燒營將校不遷一級由是軍中怨怒聲流道路咸通五年五月敕徐州土風雄徑甲士精強比因罷節比毗至翻四年罷徐州武寧節度頗多逃匿宜令徐泗團練使選募軍士三千人赴雍州防戍待嶺外事寧即與代歸咸通五年秋七月西川奏兩林鬼主邀南詔蠻敗之史照曰兩林部落東蠻國也去勿鄧國七十里地雖狹而諸部推為長號大鬼主敗補邁翻保塞城使杜守連不從南詔帥衆詣黎州降帥讀曰率降戶江翻咸通五年嶺南東道節度使韋宙具知康承訓所為以書白宰相承訓亦自疑懼纍表辭疾乃以承訓為右武衛大將軍分司考異曰補國史嶺南東道節度使韋宙兼領供軍使將吏在雍州者潛令申報事無巨細莫不知之復究尋克捷事多虛妄具所聞啓於丞相承訓已自懷疑懼辭疾免責授右武衛大將軍分司東都僖宗實録承訓傳曰南蠻陷交趾以承訓為嶺南西道節度使踰歲討平之加檢校右僕射與鄰帥不叶以右武衛大將軍罷歸蓋其家行狀云爾今從補國史懿宗實録新傳復以容管四州別為經略使新書方鎮表咸通元年罷容管以所管州隸雍管時南詔知雍州空竭不復入寇茵久之不敢進軍取安南夏侯孜薦驍衛將軍高駢代之考異曰補國史茵驍將無遠略經年不敢進軍丞相夏侯貞孝公獨獻密疏請用驍衛將軍高駢有制以本官充郡州進討使旋拜安南節度使其茵所領兵並付高公指揮按今年正月詔茵進軍收復安南若經年則孜已罷相今從實録附於此實録駢官為右領軍上將軍太高今從補國史舊紀五年四月南蠻寇雍管以秦州經略使高駢率禁軍五千會諸道之師禦之今不取茵所將兵悉以授之駢崇文之孫也憲宗朝高崇文有定蜀之功駢頗讀書好談今古好呼到翻兩軍宦官多譽之兩軍謂左右神策兩軍也譽音余黨項叛將禁兵萬人戍長武屢有功遷秦州防禦使復有功故委以安南復扶又翻咸通五年冬十一月以門下侍郎同平章事夏侯孜同平章事充河東節度使咸通五年壬寅以翰林學士承旨兵部侍郎路巖同平章事時年三十六為路巖以高位疾僨張本六年咸通六年春正月丁巳始以懿安皇后配饗憲宗室時王皞復為禮院檢討官更申前議朝廷竟從之王皡議見二百四十八卷宣宗大中二年咸通六年諸道進私白者唐時諸道歲進閹兒號曰私白故宦官多閩人福建觀察使杜宣猷每寒食遣吏分祭其先壠宦官德之庚申以宣猷為宣歙觀察使時人謂之敕使墓戶咸通六年三月中書侍郎同平章事蕭置薨咸通六年夏四月以前東川節度使高璩為兵部侍郎同平章事璩元裕之子也璩其於翻元裕見二百四十五卷文宗太和八年咸通六年楊收建議以蠻寇積年未平兩河兵戍嶺南冒瘴霧物故者什六七請於江西積粟募強弩三萬人以應接嶺南道近便仍建節以重其權從之五月辛丑置鎮南軍於洪州咸通六年巂州刺史喻士珍貪獪獪古外翻掠兩林蠻以易金南詔復寇巂州復扶又翻兩林蠻開門納之南詔盡殺戍卒士珍降之降戶江翻咸通六年壬寅以桂管觀察使嚴撰為鎮南節度使撰震之從孫也撰雛免翻嚴震鎮興元德宗播遷震有迎奉之功從才用翻咸通六年六月高璩薨咸通六年以御史大夫徐商為兵部侍郎同平章事咸通六年秋七月立皇子侃為郢王儼為普王咸通六年高駢治兵於海門未進監軍李維周惡駢欲去之屢趣駢使進軍治直之翻惡烏路翻去羌呂翻趣讀曰促駢以五千人先濟約維周發兵應援駢既行維周擁餘衆不發一卒以繼之九月駢至南定高祖武德四年分交趾所管宋平縣置南定縣時屬安南府安南府即交趾宋白曰南定縣漢日南郡西捲縣地方穫田近其靳翻劉昫曰峯州隋交趾郡之嘉寧縣唐武德四年置峯州嘉寧漢麊冷縣地駢掩擊大破之考異曰舊紀實録皆云五月駢奏於雍管大敗林邑蠻按林邑在海南自至德後號環王與中國久絶劉昫但見南蠻則謂之林邑誤也新南詔傳亦云駢以選士五千渡江敗林邑兵於雍州亦承此而誤也舊紀又云是歲秋高駢自海門進軍破蠻軍收復安南府蓋因駢今秋發海門遂云復安南耳復安南實在明年也補國史云五年九月高公力戰破峯州蠻於南定縣按張茵以五年正月句當交州受詔收復安南補國史云經年不進軍乃以駢代之則駢豈得以其年九月已破峯州蠻乎補國史又云駢破峯州蠻後近四月餘日表報不至朝廷以王晏權代之六月高公進軍收復安南亦不云幾年六月蓋駢以六年九月破峯州蠻七年六月破安南耳實録又云九月駢奏破蠻龍州營寨並燒食糧等事詔駢令於當界守備緣近有赦文已許恩宥伺其悛改亦未要更深加討逐按赦在明年十一月此詔必在駢已平安南後實録誤也新傳又云駢擊南詔龍州屯蠻酋燒資畜走龍州即安南所管龍編縣也穫戶郭翻刈稻也食祥吏翻咸通六年冬十二月壬子太皇太后鄭氏崩考異曰舊傳大中末崩誤也今從實録七年咸通七年春二月歸義節度使張義潮奏北庭回鶻固俊克西州北庭輪臺清鎮等城北庭本貞觀所置之庭州長安二年置北庭都護府西七百里有清海鎮又西延城西行三百二十里至輪臺縣回鶻固俊新書及考異正文皆作僕固俊考異曰實録義潮奏俊收西河及部落胡漢皆歸伏並表賀收西州等城事新吐蕃傳曰七年俊擊取西州收諸部按大中五年義潮以十一州圖籍來上西州已在其中今始云收西州者蓋當時雖得其圖籍其地猶為吐蕃所據耳論恐熱寓居廓州糾合旁側諸部欲為邊患皆不從所向盡為仇敵無所容仇人以告拓跋懷光於鄯州懷光引兵擊破之宋白曰鄯州南至廓州一百八十里考異曰實録義潮又奏鄯州城使張季顒押領拓跋懷光下使送到尚恐熱將並隨身器甲等並以進奉新吐蕃傳曰鄯州城使張季顒與尚恐熱戰破之收器鎧以獻今從補國史實録咸通七年三月戊寅以河東節度使劉潼為西川節度使初南詔圍巂州東蠻浪稽部竭力助之遂屠其城謂去年陷巂州也導忠武戍兵襲浪稽滅之南詔由是怨唐南詔遣清平官董成等詣成都節度使李福盛儀衛以見之故事南詔使見節度使拜伏於庭成等曰驃信已應天順人南詔自尋夢湊以來自稱驃信夷語君也因僭號自謂應天順人傳言往返自旦至日中不決將士皆憤怒福乃命捽而毆之捽昨沒翻毆烏口翻因械繫於獄劉潼至鎮釋之奏遣還國詔召成等至京師見於別殿厚賜勞而遣之見賢遍翻勞力到翻咸通七年成德節度使王紹懿在鎮十年大中十一年紹懿襲鎮軍民便之疾病召兄紹鼎之子都知兵馬使景崇而告之曰吾兄以汝之幼以軍政授我汝今長矣長知兩翻我復以軍政歸汝努力為之上忠朝廷下和鄰藩勿墜吾兄之業汝之功也言竟而薨史言王紹懿垂沒精神不亂咸通七年閏月吐蕃寇邠寧節度使薛弘宗拒卻之咸通七年夏四月章十二行本月下有辛巳二字乙十一行本同孔本同張校同貶前西川節度使李福為蘄王傅以毆繫南詔使者也蘄王緝順宗子咸通七年五月葬孝明皇后於景陵之側主祔別廟孝明皇后宣宗母鄭太后也懿安郭后憲宗之元也配食于太廟鄭后側室也祔別廟禮也咸通七年六月魏博節度使何弘敬薨軍中立其子左司馬全皞為留後咸通七年以王景崇為成德留後咸通七年南詔酋龍遣善闡節度使楊緝章十二行本緝下有思字乙十一行本同孔本同張校同助安南節度使段酋遷守交趾善闡府南詔別都也在交趾西北昵尼質翻些蘇個翻又音細趙諾眉為扶邪都統按實録扶邪縣屬羅伏州蓋南詔所置也監古銜翻陳讀曰陳高駢得以益其軍進擊南詔屢破之捷奏至海門李維周皆匿之數月無聲問上怪之以問維周維周奏駢駐軍峯州玩寇不進上怒以右武衛將軍王晏權代駢鎮安南考異曰補國史謂駢及晏權皆云安南節度使按時安南止有都護經略招討使耳無節度使也舊王智興傳九子無晏權名實録亦云命晏權代駢為節度而無月日蓋闕漏也欲重貶之晏權智興之從子也王智興歷德順憲穆四朝後為武寧帥尤貪橫駢大破南詔蠻於交趾殺獲甚衆遂圍交趾城咸通七年秋七月以何全皞為魏博留後咸通七年冬十月甲申以門下侍郎同平章事楊收為宣歙觀察使收性侈靡門吏僮奴多倚為姦利楊玄價兄弟受方鎮之賂屢有請託收不能盡從玄價怒以為叛己故出之咸通七年拓跋懷光以五百騎入廓州生擒論恐熱先刖其足數而斬之數所具翻傳首京師其部衆東奔秦州尚延心邀擊破之悉奏遷於嶺南吐蕃自是衰絶乞離胡君臣不知所終乞離胡事始見二百四十六卷武宗會昌二年咸通七年高駢圍交趾十餘日蠻困蹙甚城且下會得王晏權牒已與李維周將大軍發海門駢即以軍事授韋仲宰與麾下百餘人北歸先是仲宰遣小使王惠贊駢遣小校曾袞入告交趾之捷先悉薦翻至海中望見旌旗東來問遊船遊船遊奕之船二人謀曰維周必奪表留我乃匿於島間維周過即馳詣京師上得奏大喜即加駢檢校工部尚書復鎮安南駢至海門而還王晏權暗懦動稟李維周之命維周凶貪諸將不為之用遂解重圍重直龍翻蠻遁去者太半駢至復督勵將士攻城復扶又翻遂克之殺段酋遷及土蠻為南詔鄉導者朱道古鄉讀曰嚮蠻居安南界內者為土蠻斬首三萬餘級考異曰舊紀十月駢奏蠻寇悉平實録九月駢奏殺戮都蠻統皈首遷朱道古及斬首三千餘級十月丙申日下又云駢奏收復安南蠻寇遁散又云敗楊緝思段酋遷朱道古殺戮三萬餘級新紀十月高駢克安南按皈首遷即段酋遷字之誤也補國史收城與敗緝思等共是一事實録分在兩月不知其何所據也新南詔傳曰七年六月駢次交州戰數勝士酣鬬斬其將張詮李溠龍舉衆萬人降拔波風三壁緝思出戰敗還走城士乘之超堞入斬酋遷昵些諾眉上首三萬級安南平蓋因駢以六月至安南終言之耳安南實不以六月平也今從新舊紀駢又破土蠻附南詔者二洞誅其酋長土蠻帥衆歸附者萬七千人酋慈由翻長知兩翻帥讀曰率咸通七年十一月壬子赦天下詔安南雍州西川諸軍各保疆域勿復進攻南詔委劉潼曉諭如能更修舊好復扶又翻好呼到翻下同一切不問咸通七年置靜海軍於安南以高駢為節度使自此迄宋朝安南遂為靜海軍節鎮章十二行本安南作㣥蠻乙十一行本同孔本同張校同退齋校同事見上卷宣宗大中十二年為安南患殆將十年至是始平駢築安南城周三千步造屋四十餘萬間咸通七年十二月黠戛斯遣將軍乙支連幾入貢奏遣鞍馬迎册立使及請亥年曆日是年丙戌亥明年也咸通七年以成德留後王景崇為節度使咸通七年上好音樂宴遊殿前供奉樂工常近五百人近其靳翻每月宴設不減十餘宴設謂宮中置宴也宋朝內臣謂之排當言殽膳備水陸之品不知厭倦賜與動及千緡曲江昆明灞滻南宮北苑南宮即興慶宮禁苑在皇城之北昭應有華清宮咸陽有望賢樓不待供置有司常具音樂飲食幄帟帟羊益翻小幕曰帟諸王立馬以備陪從從才用翻下同每行幸內外諸司扈從者十餘萬人所費不可勝紀勝音升八年咸通八年春正月以魏博留後何全皞為節度使咸通八年二月歸義節度使張義潮入朝宣宗大中五年張義潮以沙州降尋授以歸義節至是入朝命其族子惟深守歸義咸通八年自安南至雍廣海路多潛石覆舟靜海節度使高駢募工鑿之漕運無滯咸通八年西川近邊六姓蠻六姓蠻一曰蒙蠻二曰夷蠻三曰訛蠻四曰狼蠻五曰勿鄧蠻六曰白蠻近其靳翻無寇則稱效順有寇必為前鋒卑籠部獨盡心於唐與㣥蠻為讎朝廷賜姓李除為刺史節度使劉潼遣將將兵助之將即亮翻討六姓蠻焚其部落斬首五千餘級咸通八年樂工李可及善為新聲三月上以可及為左威衛將軍曹確諫曰太宗定文武官六百餘員謂房玄齡曰朕以待天下賢士工商雜流不可處也處昌呂翻大和中文宗欲以樂工尉遲璋為王府率尉紆勿翻東宮有十率諸王有府率拾遺竇洵直諫即改光州長史乞以兩朝故事別除可及官不從咸通八年夏四月上不豫㣥臣希進見見賢遍翻咸通八年五月丙辰疏理天下繫囚非巨蠹不可赦者皆遞降一等咸通八年秋七月壬寅蘄王緝薨緝順宗子咸通八年懷州民訴旱刺史劉仁規揭榜禁之揭其列翻民怒相與作亂逐仁規仁規逃匿村舍民入州宅掠其家資登樓擊鼓久之乃定咸通八年甲子以兵部侍郎充諸道鹽鐵轉運等使駙馬都尉于琮同平章事咸通八年宣歙觀察使楊收過華嶽廟華嶽廟在華州華陰縣華戶化翻施式豉翻使巫祈禱縣令誣以為收罪右拾遺韋保衡復言收前為相除嚴撰江西節度使受錢百萬又置造船務人訟其侵隱復扶又翻八月庚寅貶收端州司馬考異曰舊傳曰韋保衡作相又發收陰事言前用嚴撰為江西節度納賂百萬明年貶為端州司馬按是時保衡未作相舊傳誤今從實録咸通八年九月上疾瘳咸通八年冬十二月信王薨憲宗子音彌兗翻咸通八年加嶺南東道節度使韋宙同平章事容肇祖標點聶崇岐覆校
