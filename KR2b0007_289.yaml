body:
  text: 資治通鑑卷第二百八十九端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千六百戶食實封一千戶臣司馬光奉敕編集後學天台音注後漢紀四隱皇帝下六月乾祐三年庚戌九五六月春正月丁未加鳳翔節度使趙暉兼侍中六月密州刺史王萬敢請益兵以攻唐王萬敢去年已殘荻水鎮今請益兵攻之帥禁軍及齊州兵赴之因王萬敢請兵使郭瓊將以赴之道過青州因以易置劉銖帥讀曰率六月郭威請勒兵北臨契丹之境詔止之六月丙寅遣使詣河中鳳翔收瘞戰死及餓殍遺骸時有僧已聚二十萬矣瘞於計翻殍被表翻已聚者二十萬史言其未聚者尚多大兵攻圍積久其禍如此六月唐主聞漢兵盡平三叛始罷李金全北面行營招討使唐命李金全見二百八十七卷元年六月唐清淮節度使劉彥貞多斂民財以賂權貴權貴爭譽之在壽州積年譽音余晉開運元年唐徙劉彥貞鎮濠州劉崇俊鎮壽州漢乾祐元年清淮節度使劉彥貞副李金全北伐未知彥貞以何年徙鎮壽州恐被代欲以警急自固妄奏稱漢兵將大舉南伐被皮義翻二月唐主以東都留守燕王弘冀為潤宣二州大都督鎮潤州寧國節度使周宗為東都留守以漢兵大舉弘冀年少恐不能調用扞禦周宗為唐祖佐命宿望也故徙鎮揚州六月朝廷欲移易藩鎮因其請赴嘉慶節上壽五代會要帝以三月九日為嘉慶節洪邁隨筆曰唐穆宗即位之初年詔曰七月六日是朕載誕之辰其日百寮命婦宜於光順門進名參賀朕於門內與百寮相見明日又敕受賀儀宜停先是左丞韋綬奏行之宰臣以為古無降誕受賀之禮奏罷之然次年復行賀禮誕節之制始於明皇令天下宴集休假三日受賀之事蓋自長慶至今用之也上時掌翻六月甲申郭威行北邊還去年冬十月郭威北征今還行下孟翻還從宣翻又如字六月福州人或詣建州告唐永安留後查文徽云吳越兵已棄城去請文徽為帥查鉏加翻帥所類翻文徽信之遣劍州刺史陳誨將水軍下閩江薛史曰李景保大三年以延平為劍州析建州之劍浦汀州之沙縣隸焉劍溪上接建溪下達福唐亦謂之閩江下戶嫁翻將即亮翻會大雨水漲誨一夕行七百里至城下敗福州兵敗補邁翻執其將馬先進等庚寅文徽至福州吳越知威武軍吳程詐遣數百人出迎吳越未命吳程為威武節度使先令知威武軍事閩人多詐未可信也宜立寨徐圖文徽曰疑則變生不若乘機據其城因引兵徑進誨整衆鳴鼓止于江湄湄旻悲翻水草之交曰湄詩巧言居河之麋注云本作湄水草交也文徽不為備程勒兵出擊之唐兵大敗文徽墜馬為福人所執士卒死者萬人誨全軍歸劍州程送文徽於錢唐吳越王弘俶獻于五廟而釋之俶昌六翻吳越用諸侯之制立五廟六月丁亥汝州奏防禦使劉審交卒吏民詣闕上書以審交有仁政乞留葬汝州得奉事其丘壟詔許之上時掌翻州人相與聚哭而葬之為立祠歲時享之為于僞翻太師馮道曰吾嘗為劉君僚佐按歐史劉審交燕人劉守光之僭號以審交為兵部尚書馮道事守光為參軍嘗為僚佐必是時也無以踰人非能減其租賦除其繇役也繇讀曰徭但推公廉慈愛之心以行之耳此亦衆人所能為但他人不為而劉君獨為之故汝人愛之如此使天下二千石皆效其所為何患得民不如劉君哉五代之諸州防禦使曾未足以當漢郡守二千石後人特以專城分守故稱之六月甲午吳越丞相昭化節度使同平章事杜建徽卒六月乙未以前永興節度使趙匡贊為左驍衛上將軍趙匡贊自長安入朝見二百八十七卷高祖乾祐元年六月三月丙午嘉慶節鄴都留守高行周天平節度使慕容彥超泰寧節度使符彥卿昭義節度使常思安遠節度使楊信安國節度使薛懷讓成德節度使武行德彰德節度使郭謹保大留後王饒皆入朝許之赴嘉慶節上壽故皆入朝六月甲寅詔營寢廟於高祖長陵世祖原陵以時致祭有司以費多寢其事以至國亡二陵竟不霑一奠是年十一月郭威入大梁十二月將士扶立以時致祭之詔有司既停寢不行六七月之間宜乎不霑一奠也六月壬戌徙高行周為天平節度使符彥卿為平盧節度使甲子徙慕容彥超為泰寧節度使六月永安節度使折從阮舉族入朝折從阮自府州入朝六月夏四月戊辰朔徙薛懷讓為匡國節度使庚午徙折從阮為武勝節度使按五代會要周廣順二年三月始改鄧州威勝軍為武勝軍避周太祖名也史以後來所改軍名而書之耳壬申徙楊信為保大節度使徙鎮國節度使劉詞為安國節度使永清節度使王令溫為安遠節度使李守貞之亂王饒潛與之通王饒潛以鄜州與河中通衆謂饒必居散地宀兒散之官為散地散悉但翻厚結史弘肇遷護國節度使聞者駭之駭其不惟免罪又得大鎮六月楊邠求解樞密使帝遣中使諭止之宣徽北院使吳虔裕在旁曰吳虔裕時蓋在楊邠旁樞密重地難以久居當使後來者迭為之相公辭之是也帝聞之不悅辛巳以虔裕為鄭州防禦使六月朝廷以契丹近入寇橫行河北諸藩鎮各自守無捍禦之者事見上卷上年十月使督諸將以備契丹史弘肇欲威仍領樞密使蘇逢吉以為故事無之言故事無帶樞密使出鎮者領樞密使則可以便宜從事諸軍畏服號令行矣帝卒從弘肇議卒子恤翻弘肇怨逢吉異議逢吉曰以內制外順也今反以外制內其可乎壬午制以威為鄴都留守天雄節度使樞密使如故仍詔河北兵甲錢穀但見郭威文書立皆稟應明日朝貴會飲於竇貞固之第弘肇舉大觴屬威屬之欲翻厲聲曰昨日廷議一何同異今日為弟飲之史弘肇呼郭威為弟為于僞翻是國家之事何足介意弘肇又厲聲曰安定國家在長槍大劍安用毛錐王章曰無毛錐則財賦何從可出毛錐謂筆也以束毛為筆其形如錐也王章為三司使實掌財賦故云然六月癸未罷永安軍復以府州隸河東也六月壬辰以左監門衛將軍郭榮為貴州刺史天雄牙內都指揮使貴州時屬南漢宋白曰貴州故西甌駱越之地秦雖立桂林郡仍有甌駱之名漢武帝改桂林為鬱林郡梁武帝以鬱林郡為桂州後割桂州之鬱林寧浦立定州尋改為南定州隋改南定州為尹州唐改貴州漢以郭榮遙領刺史而其職則天雄牙將也考異曰世宗實録曰太祖皇帝之長子也母曰聖穆皇后柴氏以唐天祐十八年九月二十四日丙午生於邢臺之別墅薛史世宗紀云太祖之養子蓋聖穆皇后之姪也本姓柴氏父守禮太子少保致仕帝年未童冠因侍聖穆皇后在太祖左右時太祖無子乃養為己子按今舉世皆知世宗為柴氏子謂之柴世宗而世宗實録云太祖長子誣亦甚矣父守禮郭威之妻兄也威未有子時養以為子郭榮始見於此六月五月己亥以府州蕃漢馬步都指揮使折德扆為本州團練使前此置永安軍於府州以寵折從阮也今從阮移鎮其子德扆守府州資序未至而府州被邊一城之地耳故降為團練使其後復以為節鎮以寵折氏從阮之子也六月庚子郭威辭行言於帝曰太后從先帝久多歷天下事陛下富於春秋有事宜稟其教而行之親近忠直放遠讒邪近其靳翻遠于願翻善惡之間所宜明審蘇逢吉楊邠史弘肇皆先帝舊臣盡忠徇國願陛下推心任之必無敗失郭威言及此蓋已知帝之信近習而間勳舊也臣願竭其愚駑駑音奴庶不負驅策帝斂容謝之威至鄴都以河北困弊戒邊將謹守疆場嚴守備無得出侵掠契丹入寇則堅壁清野以待之兵法所謂先為不可勝以待敵之可勝也六月辛丑敕防禦團練使自非軍期無得專奏事皆先申觀察使斟酌以聞言軍期事須朝廷應副則不及聞於廉使許得專達朝廷如尋常公事須先申本管斟酌以聞六月丙午以皇弟山南西道節度使承勳為開封尹加兼中書令實未出閣年尚幼且有羸疾也山南西道時為蜀境六月平盧節度使劉銖貪虐恣橫橫戶孟翻朝廷欲徵之恐其拒命因沂密用兵於唐遣沂州刺史郭瓊將兵屯青州歐史作郭淮攻南唐還以兵屯青州置酒召瓊伏兵幕下欲害之瓊知其謀悉屏左右從容如會了無懼色屏必郢翻又卑正翻從千容翻銖不敢發瓊因諭以禍福銖感服詔至即行庚戌銖入朝辛亥以瓊為潁州團練使六月癸丑王章置酒會諸朝貴酒酣為手勢令會飲而行酒令以佐歡唐末之俗也類說曰亞其虎膺謂手掌曲其松根謂指節以蹲鴟間虎膺之下蹲鴟大指也以鉤戟差玉柱之旁鉤戟頭指玉柱中指也潛虬闊玉柱三分潛虬無名指也奇兵闊潛虬一寸奇兵小指也死其三洛謂嚲其腕也生其五峯五峯通呼五指也謂之招手令蓋亦手勢令之類也乎哉言不素習其事屢教之蘇逢吉戲之曰旁有姓閻人何憂罰爵壺射之事不勝者罰爵自古有之行令則末世之為耳本酒家倡也倡音昌酒家倡善為酒令意逢吉譏之大怒以醜語詬逢吉詬古候翻又許候翻逢吉不應弘肇欲毆之逢吉起去弘肇索劍欲追之毆烏口翻索山客翻楊邠泣止之曰蘇公宰相公若殺之置天子何地願孰思之孰與熟同邠與之聯鑣送至其第而還上時掌翻鑣悲驕翻馬銜也還從宣翻又如字於是將相如水火矣帝使宣徽使王峻置酒和解之不能得逢吉欲求出鎮以避之既而中止曰吾去朝廷止煩史公一處分吾齏粉矣王章亦忽忽不樂處昌呂翻分扶問翻齏箋西翻樂音洛欲求外官楊史固止之六月閏月宮中數有怪癸巳大風章十二行本風下有雨字乙十一行本同孔本同張校同發屋拔木吹鄭門扉起十餘步而落震死者六七人水深平地尺餘數所角翻鄭門大梁城西面南來第一門也梁改為開明門晉改為金義門周改為迎秋門汴人只以舊門名呼之深式禁翻帝召司天監趙延乂問以禳祈之術對曰臣之業在天文時日禳祈非所習也然王者欲弭災異莫如修德延乂歸帝遣中使問如何為修德延乂對請讀貞觀政要而法之觀古玩翻六月六月河決鄭州歐史曰六月癸卯河決原武按原武縣屬鄭州九域志云原武縣在鄭州之北六十里六月馬希萼既敗歸僕射洲之敗也事見上卷上年八月誘音酉漵音敍宋白曰潭州西有梅山洞為草寇之窟穴欲與共擊湖南蠻素聞長沙帑藏之富帑他朗翻藏徂浪翻大喜爭出兵赴之遂攻益陽益陽縣屬潭州漢古縣城在唐縣東八十里九域志益陽在潭州西北一百八十二里宋白曰以其地在益水之陽故名其城魯肅所築戰于淹溪璠敗死璠音翻六月秋七月唐歸馬先進等於吳越以易查文徽馬先進等被擒見上二月查文徽亦以是月為吳越所禽六月馬希萼又遣㣥蠻攻迪田八月戊戌破之殺其鎮將張延嗣楚王希廣遣指揮使黃處超救之處超敗死處昌呂翻潭人震恐復遣牙內指揮使崔洪璉將兵七千屯玉潭九域志潭州湘鄉縣有玉潭鎮在潭州西復扶又翻六月庚子蜀主立其弟仁毅為夔王仁贄為雅王仁裕為彭王仁操為嘉王己酉立子玄哲為秦王哲音哲玄王玉為褒王六月晉李太后在建州契丹遷晉主及其家于建州見上卷上年三月無醫藥惟與晉主仰天號泣號戶刀翻戟手罵杜重威李守貞曰吾死不置汝以其降契丹而亡晉也事見二百八十六卷開運二年戊午卒周顯德中有自契丹來者云晉主及馮后尚無恙其從者亡歸及物故則過半矣恙余亮翻從才用翻過音戈六月馬希萼表請別置進奏務於京師九月辛巳詔以湖南已有進奏務不許亦賜楚王希廣詔勸以敦睦六月馬希萼以朝廷意佑楚王希廣怒遣使稱藩于唐乞師攻楚唐加希萼同平章事以鄂州今年租稅賜之命楚州刺史何敬洙將兵助希萼冬十月丙午希廣遣使上表告急言荊南嶺南江南連謀欲分湖南之地荊南高氏嶺南劉氏江南李氏以扼江南荊南援朗州之路江南遣兵援朗道出嶽州嶽州西至澧州三百餘里荊南遣兵援朗徑渡江南趨澧州亦三百里自澧州東南至朗州三百五十九里六月丁未以吳越王弘俶為諸道兵馬元帥六月楚王希廣以朗州與山蠻入寇諸將屢敗憂形于色劉彥瑫言於希廣曰朗州兵不滿萬馬不滿千都府精兵十萬朗桂以潭州為都府願假臣兵萬餘人戰艦百五十艘艦戶黯翻艘蘇遭翻徑入朗州縛取希萼以解大王之憂王悅以彥瑫為戰棹都指揮使朗州行營都統彥瑫入朗州境九域志潭州北至朗州界二百一十七里曰百姓不願從亂望都府之兵久矣彥瑫厚賞之戰艦過則運竹木以斷其後斷音短是日馬希萼遣朗兵及蠻兵六千戰艦百艘逆戰於湄州歐史作湄洲頃之風回反自焚彥瑫還走江路已斷自斷歸路則當死戰還走何為考異曰湖湘故事彥瑫敗在九月十三日今從十國紀年涕泣不知所為希廣平日罕頒賜至是大出金帛以取悅於士卒或告天策左司馬希崇流言惑衆反狀已明請殺之希廣曰吾自害其弟何以見先王於地下希崇與希萼通謀者也當斷不斷反受其亂希廣之亡宜矣馬軍指揮使張暉將兵自他道擊朗州至龍陽龍陽縣屬朗州隋所置也取龍陽洲以名縣九域志在朗州東南八十五里宋白曰龍陽故漢索縣地吳分其地立龍陽縣退屯益陽希萼又遣指揮使朱進忠等將兵三千急攻益陽張暉紿其衆曰我以麾下出賊後汝輩留城中待我相與合勢擊之既出遂自竹頭市遁歸長沙朗兵知城中無主急擊之士卒九千餘人皆死六月吳越王弘俶歸查文徽於唐文徽得瘖疾以工部尚書致仕史言唐不能正查文徽敗軍之罪瘖於今翻六月十一月甲子朔日有食之六月蜀太師中書令宋忠武王趙廷隱卒六月楚王希廣遣其僚屬孟駢說馬希萼曰公忘父兄之讎北面事唐自馬殷以來與楊徐世為仇讎說式芮翻事見六十四卷漢獻帝建安八年駢曰古者兵交使在其間春秋左氏傳之言使疏吏翻安肯此來駢之言非私於潭人實為公謀也為于僞翻乃釋之使還報曰大義絶矣非地下不相見也朱進忠請希萼自將兵取潭州辛未希萼留其子光贊守朗州悉發境內之兵趣長沙趣七喻翻考異曰湖湘故事希萼以十月二十一日直往湖南今從十國紀年自稱順天王六月詔侍衛步軍都指揮使寧江節度使王殷將兵屯澶州以備契丹侍衛親軍都指揮使之下又有侍衛馬軍步軍二都指揮此皆梁唐所置寧江軍夔州時屬蜀王殷遙領也瀛州人也六月朝廷議發兵以安遠節度使王令溫為都部署以救潭州會內難作不果內難謂殺楊邠等以召郭威之禍難乃旦翻六月帝自即位以來樞密使右僕射同平章事楊邠總機政樞密使兼侍中郭威主征伐歸德節度使侍衛親軍都指揮使兼中書令史弘肇典宿衛三司使同平章事王章掌財賦邠頗公忠退朝門無私謁雖不卻四方饋遺有餘輒獻之遺唯季翻弘肇督察京城道不拾遺是時承契丹蕩覆之餘契丹入汴中原蕩覆契丹北歸漢承其後章捃托遺利吝於出納以實府庫屬三叛連衡捃居運翻托之石翻屬之欲翻三叛謂李守貞王景崇趙思綰衡讀曰橫宿兵纍年而供饋不乏及事平賜豫之外尚有餘積豫讀曰與積子賜翻以是國家粗安粗坐五翻章聚斂刻急斂力贍翻舊制田稅每斛更輸二升謂之雀鼠耗章始令更輸二斗謂之省耗按唐明宗天成元年四月赦文應納夏秋稅子先有省耗每斗一升今後祗納正稅數不量省耗如此則天成已前已有省耗每斛更輸一斗天成罷輸之後至漢興王章復令輸省耗而又倍舊數取之也章始令入者八十出者七十七謂之省陌沈括曰今之數錢百錢謂之陌者借陌字用之其實只是百字如什與伍耳唐自皇甫鎛為墊錢法至昭宗時乃定八十為陌錙銖涓滴罪皆死鹽禁之設久矣酒之為禁或罷或榷歷代不常自唐中世始申榷酒之禁及其末也又禁造麴至於礬禁新舊唐書食貨志皆未著言其事是必起於五代之初本草圖經曰礬石生河西山谷及隴西武都石門今白礬則晉州慈州拱州無為軍緑礬則隰州溫泉縣池州銅陵縣並煎礬處處出焉初生皆石也採得碎之煎煉乃成礬凡有五種其色各異謂白礬緑礬黃礬黑礬絳礬也自岐伯至陶隱居之書皆言之章尤不喜文臣嘗曰此輩授之握算不知縱橫喜許記翻縱子容翻何益於用俸祿皆以不堪資軍者給之吏已高其估章更增之估價也帝左右嬖幸浸用事嬖卑義翻又博計翻太后親戚亦干預朝政朝直遙翻邠等屢裁抑之太后有故人子求補軍職弘肇怒而斬之武德使李業太后之弟也太后昆弟七人業最幼故尤憐之帑底朗翻帝即位尤蒙寵任會宣徽使闕業意欲之吳虔裕出鄭州闕宣徽北院使邠弘肇以為內使遷補有次不可以外戚超居乃止內客省使閻晉卿次當為宣徽使久而不補樞密承旨聶文進飛龍使後匡贊翰林茶酒使郭允明皆有寵於帝久不遷官共怨執政姓譜後姓望出東海開封並州人也劉銖罷青州歸久奉朝請未除官常戟手於執政是年夏五月劉銖自青州召歸戟手者戟其手而詬怨之帝初除三年喪聽樂賜伶人錦袍玉帶伶人詣弘肇謝弘肇怒曰士卒守邊苦戰猶未有以賜之汝曹何功而得此皆奪以還官帝欲立所幸耿夫人為后邠以為太速夫人卒帝欲以后禮葬之邠復以為不可復扶又翻帝年益壯厭為大臣所制邠弘肇嘗議事於帝前帝曰審圖之勿令人有言邠曰陛下但禁聲禁聲者謂禁口勿言使不出聲也帝積不能平左右因乘間譖之於帝間古莧翻云邠等專恣終當為亂帝信之嘗夜聞作坊鍛聲作坊造兵甲之所作坊使領之鍛都玩翻鍛鐵以為兵甲達旦不寐司空同平章事蘇逢吉既與弘肇有隙知李業等怨弘肇屢以言激之帝遂與業文進匡贊允明謀誅邠等議既定入白太后太后曰茲事何可輕發更宜與宰相議之業時在旁曰先帝嘗言朝廷大事不可謀及書生懦怯誤人太后復以為言史言殺邠等非太后之意復扶又翻國家之事非閨門所知拂衣而出乙亥業等以其謀告閻晉卿晉卿恐事不成詣弘肇第欲告之弘肇以他故辭不見使閻晉卿得見史弘肇則李業等之死不待郭威之入也天方授郭威故史弘肇等先死以除其逼豈特人事哉丙子旦邠等入朝有甲士數十自廣政殿出殺邠弘肇章於東廡下廡罔甫翻按薛史晉天福四年二月辛卯改東京玉華殿為永福殿周顯德四年新修永福殿改為廣政殿此蓋以後來殿名書之文進亟召宰相朝臣班於崇元殿宣云邠等謀反已伏誅與卿等同慶又召諸軍將校至萬歲殿庭五代會要梁開平元年改汴京正衙殿為崇元殿東殿為玄德殿萬歲堂為萬歲殿晉天福二年八月改玄德殿為廣政殿將即亮翻校戶教翻且曰邠等以稚子視朕朕今始得為汝主汝輩免橫憂矣皆拜謝而退稚直利翻橫戶孟翻又召前節度使刺史等升殿諭之分遣使者帥騎收捕邠等親戚黨與傔從盡殺之帥讀曰率騎奇寄翻傔苦念翻從才用翻弘肇待侍衛步軍都指揮使王殷尤厚邠等死帝遣供奉官孟業齎密詔詣澶州及鄴都令鎮寧節度使李洪義殺殷又令鄴都行營馬軍都指揮使郭崇威步軍都指揮使真定曹威殺郭威及監軍宣徽使王峻洪義太后之弟也又急詔徵天平節度使高行周平盧節度使符彥卿永興節度使郭從義泰寧節度使慕容彥超匡國節度使薛懷讓鄭州防禦使吳虔裕陳州刺史李穀入朝急徵諸帥欲其以從兵衛宮闕李穀一刺史耳而亦預徵入朝之數必其智略聞於時也前平盧節度使劉銖權知開封府侍衛馬軍都指揮使李洪建權判侍衛司事內侍省使閻晉卿權侍衛馬軍都指揮使內侍省當作內客省業之兄也時中外人情憂駭駭其變起於倉猝而憂禍至之無日也以弘肇詬怒逢吉欲殺之故惡之也惡烏路翻聞變驚愕私謂人曰事太匆匆匆匆急遽不審諦之意不至於此業等命劉銖誅郭威王峻之家銖極其慘毒嬰孺無免者嬰嬰兒鄭玄曰嬰猶鷖彌也孺乳子飲乳之子也洪建但使人守視仍飲食之飲於禁翻食祥吏翻丁丑使者至澶州李洪義畏懦慮王殷已知其事不敢發乃引孟業見殷殷囚業遣副使陳光穗以密詔示郭威威召樞密吏魏仁浦示以詔書曰奈何仁浦曰公國之大臣功名素著加之握強兵據重鎮一旦為㣥小所構禍出非意此非辭說之所能解解佳買翻釋也說也時事如此不可坐而待之勸之舉兵也歐史曰威匿詔書召樞密院吏魏仁浦謀於臥內仁浦勸威反倒用留守印更為詔書詔威誅諸將校以激怒之將校皆憤然效用竊意歐史必有所本通鑑所書必本於周史周臣為其君諱復為魏仁浦緣飾耳告以楊邠等冤死及有密詔之狀且曰吾與諸公披荊棘從先帝取天下受託孤之任竭力以衛國家今諸公已死吾何心獨生君輩當奉行詔書取吾首以報天子庶不相纍纍力瑞翻郭崇威等皆泣曰天子幼沖此必左右㣥小所為若使此輩得志國家其得安乎崇威願從公入朝自訴蕩滌鼠輩以清朝廷不可為單使所殺受千載惡名翰林天文趙修己謂郭威曰公徒死何益不若順衆心擁兵而南此天啓也趙修己諫李守貞而勸郭威自信其術也命郭崇威將騎兵前驅戊寅自將大軍繼之將即亮翻慕容彥超方食得詔捨匕筯入朝帝悉以軍事委之九域志兗州至大梁六百里慕容彥超三日而至自以於先帝同産之親急於赴闕而不知其才智之不足以濟也己卯吳虔裕入朝九域志鄭州至大梁一百四十里帝聞郭威舉兵南向議發兵拒之前開封尹侯益曰鄴都戍兵家屬皆在京師官軍不可輕出不若閉城以挫其鋒使其母妻登城招之可不戰而下也慕容彥超曰侯益衰老為懦夫計耳帝乃遣益及閻晉卿吳虔裕前保大節度使張彥超將禁軍趣澶州趣七喻翻是日郭威已至澶州魏州南至澶州一百五十里兩日而至欲掩漢之未備王殷迎謁慟哭以所部兵從郭威涉河帝遣內養鸗脫覘郭威威獲之鸗力鍾翻又盧紅翻歐史作驡亦音龍考異曰隱帝實録丁丑孟業至澶州戊寅鄴兵至河上己卯吳虔裕入朝庚辰詔侯益等赴澶州守捉鄴軍獲鸗脫又云庚辰郭諱次滑州宋延渥納軍辛巳鸗脫還宮薛史隱帝紀丁丑李洪義得密詔遣陳光穗至鄴都翌日郭威以衆南行戊寅至澶州庚辰至滑州是日詔侯益等赴澶州守捉餘與實録同周太祖實録十四日陳光穗至翌日遵路明日遇鸗脫云見召侯益等令守澶州十六日趨滑臺十七日賞諸軍令奉行前詔十八日自滑而南薛史周太祖紀十六日至澶州獲鸗脫十七日至滑州餘與實録同按丁丑十四日也若十七日始詔侯益赴澶州則十六日郭威獲鸗脫何故已見之也蓋帝遣侯益赴澶州必在十六日鸗脫行在遣益之後今從薛史周太祖紀以表置鸗脫衣領中使歸白帝曰臣昨得詔書延頸俟死郭崇威等不忍殺臣云此皆陛下左右貪權無厭者譖臣耳厭於鹽翻逼臣南行詣闕請罪臣求死不獲力不能制臣數日當至闕庭陛下若以臣為有罪安敢逃刑若實有譖臣者願執付軍前以快衆心臣敢不撫諭諸軍退歸鄴都庚辰郭威趣滑州澶州西南至滑州一百餘里趣七喻翻辛巳義成節度使宋延渥迎降考異曰隱帝實録十一月丙子誅楊史丁丑孟業至澶州王殷錮業送郭威即日首塗戊寅至河上見王殷庚辰次滑州周太祖實録云十三日夜太祖夢入朝見至詰旦以夢示峻是日陳洪穗至鄴都是十四日丁丑也翌日為衆所迫遵路十五日戊寅也明日行次遇鸗脫欲住澶州十六日己卯也下文又云十六日趣滑臺按大梁至澶州二百七十里澶州至鄴都一百四十里至滑州一百二十里不應往還如是之速漢周實録首塗與至滑州日不同蓋十六日趣滑州十七日至滑州也今從周太祖實録洛陽人其妻晉高祖女永寧公主也郭威取滑州庫物以勞將士勞力到翻且諭之曰聞侯令公已督諸軍自南來侯益兼中書令故稱之為令公交戰則非入朝之義不戰則為其所屠吾欲全汝曹功名不若奉行前詔吾死不恨郭威以此觀衆心向背耳國家負公公不負國所以萬人爭奮如報私讎侯益輩何能為乎王峻徇於衆曰我得公處分俟克京城聽旬日剽掠衆皆踊躍處昌呂翻分扶問翻剽匹妙翻許士卒以剽掠之利以濟其私可以得而不可長守也辛巳鸗脫至大梁前此帝議欲自往澶州聞郭威已至河上而止帝甚有悔懼之色私謂竇貞固曰屬者亦太草草屬之欲翻屬者猶言頃者也草草亦言率爾缺審諦商量之意李業等請空府庫以賜諸軍蘇禹圭以為未可業拜禹圭於帝前曰相公且為天子勿惜府庫為于僞翻下當為同乃賜禁軍人二十緡下軍半之將士在北者給其家使通家信以誘之誘音酉壬午郭威軍至封丘人情忷懼太后泣曰不用李濤之言宜其亡也李濤之言見上卷元年言於帝曰臣視北軍猶蠛蠓耳爾雅注蠛蠓翳蒙之所生一名醯雞孫炎曰此蟲微細㣥飛列子曰蠛蠓生朽壤之上因雨而生覩陽而死莊子謂之醯雞蠛莫結翻蠓莫孔翻為于僞翻退見聶文進問北來兵數及將校姓名頗懼曰是亦劇賊未易輕也將即亮翻校戶教翻易以豉翻帝復遣左神武統軍袁山義前威勝節度使劉重進等帥禁軍與侯益等會屯赤岡山義象先之子也復扶又翻山義宜崎翻帥讀曰率袁象先梁將也事見梁紀彥超以大軍屯七里店癸未南北軍遇於劉子陂劉子陂在封丘之南汴郊之北勞力到翻太后曰郭威吾家故舊非死亡切身何以至此但按兵守城飛詔諭之觀其志趣必有辭理則君臣之禮尚全慎勿輕出帝不從使帝從太后之言雖不能保其往猶未至於野死也從才用翻下從官同太后遣使戒聶文進曰大須在意對曰有臣在雖郭威百人可擒也至暮兩軍不戰帝還宮慕容彥超大言曰陛下來日宮中無事幸再出觀臣破賊臣不必與之戰但叱散使歸營耳甲申帝欲再出太后力止之不可既陳陳讀曰陳郭威戒其衆曰吾來誅㣥小非敢敵天子也慎勿先動久之慕容彥超引輕騎直前奮擊郭崇威與前博州刺史李榮帥騎兵拒之騎奇寄翻帥讀曰率彥超馬倒幾獲之幾居依翻彥超引兵退麾下死者百餘人於是諸軍奪氣稍稍降於北軍侯益吳虔裕張彥超袁山義劉重進皆潛往見郭威威各遣還營又謂宋延渥曰天子方危公近親宜以牙兵往衛乘輿且附奏陛下願乘間早幸臣營宋延渥主壻故云近親牙兵謂延渥所領義成牙兵也衛乘繩證翻間古莧翻亂兵雲擾不敢進而還還從宣翻又如字比暮南軍多歸於北比必利翻及也慕容彥超與麾下十餘騎奔還兗州是夕帝獨與三相及從官數十人宿於七里寨餘皆逃潰三相竇貞固蘇逢吉禹圭七里寨即慕容彥超所屯七里店寨乙酉郭威望見天子旌旗在高阪上下馬免胄往從之至則帝已去矣帝策馬將還宮至玄化門玄化門大梁城北面東來第一門也本酸棗門梁開平元年改曰興和門晉天福三年改曰玄化門問帝左右兵馬何在因射左右劉銖之射左右其意何為射而亦翻帝回轡西北至趙村追兵已至帝下馬入民家為亂兵所弒考異曰實録帝至玄化門劉銖射帝左右帝回詣西北郭允明露刃隨後西北至趙村前鋒已及亂兵騰沸上懼下馬入於民室郭允明知事不濟乃抽刃犯蹕而崩薛史隱帝紀郭允明知事不濟乃剚刃於帝而崩允明自殺周太祖紀云允明弒漢帝於北郊劉恕曰允明帝所親信何由弒逆蓋郭威兵殺帝事成之後諱之因允明自殺歸罪耳按弒帝者未必是允明但莫知為誰故止云亂兵聶文進挺身走軍士追斬之李業奔陝州九域志大梁至陝州六百五十九里李業欲依其兄耳陝失冉翻欲依慕容彥超也號慟曰老夫之罪也號戶刀翻威至玄化門劉銖雨射城外雨射者射矢如雨也歸私第迎春門汴城東面北來第一門也本名曹門梁開平元年改曰建陽門晉天福三年改曰迎春門諸軍大掠通夕煙火四發軍士入前義成節度使白再榮之第執再榮盡掠其財既而進曰某等昔嘗趨走麾下一旦無禮至此何面目復見公復扶又翻遂刎其首而去以白再榮真定之虐今罹此禍抑天道也刎武粉翻吏部侍郎張允家資以萬計而性吝雖妻亦不之委常自繫衆鑰於衣下行如環珮是夕匿於佛殿藻井之上風俗通云殿堂象東井刻為荷菱荷菱水物所以厭火杜佑曰漢宮殿率號屋仰為井皆畫水藻蓮茭之屬以厭火何晏景福殿賦繚以藻井編以綷疏又王文考靈光殿賦圓淵方井反植荷藻蓋為方井而畫藻其上也陸佃埤雅曰屋上覆橑謂之藻井板壞而墜軍士掠其衣遂以凍卒卒子恤翻初作坊使賈延徽有寵於帝與魏仁浦為鄰欲併仁浦所居以自廣屢譖仁浦於帝幾至不測言幾至於死也幾居依翻有擒延徽以授仁浦者仁浦謝曰因亂而報怨吾所不為也郭威聞之待仁浦益厚右千牛衛大將軍棗強趙鳳曰郭侍中舉兵欲誅君側之惡以安國家耳而鼠輩敢爾乃賊也豈侍中意邪執弓矢踞胡床坐於巷首掠者至輒射殺之里中皆賴以全射而亦翻丙戌獲劉銖李洪建囚之考異曰五代史闕文周祖自鄴起兵銖盡誅周祖之家子孫婦女十數人極其慘毒及隱帝遇害周祖以漢太后令收銖下獄使人責銖殺其家對曰銖為漢家戮叛族耳不知其他威怒殺之王禹稱曰周世宗朝史官修漢隱帝實録銖之忠言諱而不載銖今有子孝和擢進士第按銖所至貪婪酷虐在青州謀不受代賴郭瓊諭之始入朝私怨楊史快其就戮隱帝敗歸射而不納使至野死其屠滅周祖之家出於殘忍之性耳豈忠義之士邪王禹稱所記蓋憑孝和之言耳今不取我死汝且為人婢乎妻曰以公所為雅當然耳王殷郭崇威言於郭威曰不止剽掠剽匹妙翻今夕止有空城耳威乃命諸將分部禁止掠者不從則斬之分扶問翻至晡乃定竇貞固蘇禹圭自七里寨逃歸郭威使人訪求得之尋復其位貞固為相值楊史弄權楊邠史弘肇但以凝重處其間自全而已處昌呂翻下處分同郭威命有司遷隱帝梓宮於西宮或請如魏高貴鄉公故事葬以公禮高貴鄉公事見六十七卷魏元帝景元元年曰倉猝之際吾不能保衛乘輿乘繩證翻罪已大矣況敢貶君乎太師馮道帥百官謁見郭威帥讀曰率下同威見猶拜之道受拜如平時考異曰五代史闕文周祖入京師百官謁之周祖見道猶設拜意道便行推戴道受拜如平時徐曰侍中此行不易周祖氣沮故禪代之謀稍緩按周祖舉兵既克京城所以不即為帝者蓋以漢之宗室崇在河東信在許州贇在徐州若遽代漢慮三鎮舉兵以興復為辭則中外必有響應者故陽稱輔立宗子信素庸愚不足畏忌贇乃崇子故迎贇而立之使兩鎮息謀俟其離徐已遠去京稍近然後併信除之則三鎮去其二矣然後自立則所與為敵者唯崇而已此其謀也豈馮道受拜之所能沮乎道之所以受拜如平時者正欲示器宇凝重耳侍中此行不易易以豉翻丁亥郭威帥百官詣明德門起居太后且奏稱軍國事殷請早立嗣君太后誥稱郭允明弒逆太后之誥云然郭威之志也此事考異已辨之於前河東節度使崇忠武節度使信皆高祖之弟武寧節度使贇開封尹勳高祖之子其令百官議擇所宜贇崇之子也高祖愛之養視如子路振九國志劉崇之長子曰贇少慧黠高祖憐之録為己子贇於倫翻按薛史唐莊宗同光二年以太后宮為長壽宮晉漢蓋以為萬歲宮也或曰因萬歲殿為名見賢遍翻太后曰勳久羸疾不能起羸倫為翻威出諭諸將諸將請見之太后令左右以臥榻舉之示諸將諸將乃信之於是郭威與峻議立贇己丑郭威帥百官表請以贇承大統太后誥所司擇日備法駕迎贇即皇帝位郭威奏遣太師馮道及樞密直學士王度祕書監趙上交詣徐州奉迎考異曰周太祖實録己丑太祖奏遣前太師馮道往彼諭旨太祖將奉表於徐州未知所遣樞密直學士王度請行許之宰臣百寮表祕書監趙上交齎詔同日首塗五代史闕文周祖請道詣徐州冊湘陰公為漢嗣道曰侍中由衷乎周祖設誓道曰莫教老夫為謬語人及行謂人曰平生不謬語今為謬語人矣王禹稱曰周世宗朝詔史臣修周祖實録故道之事迹所宜諱矣按道廉智自將陽愚遠禍恐不肯觸周祖未發之機其後欲歸美而云耳又隱帝實録云初議立徐帥太后遣中使馳諭劉崇請崇入纘大位崇知立其子上章謙遜恐無此事今不取郭威之討三叛也事見上卷元年二年處分軍事皆合機宜問使者誰為此詔使者以翰林學士范質對威曰宰相器也入城訪求得之甚喜時大雪威解所服紫袍衣之衣於既翻令草太后誥令迎新君儀注蒼黃之中討論撰定皆得其宜蒼黃者猝遽之狀論盧昆翻撰士免翻初隱帝遣供奉官押班陽曲張永德賜昭義節度使常思生辰物供奉官押班供奉官之長也生辰物謂聖節回賜郭威之壻也會楊邠等誅密詔思殺永德思素聞郭威多奇異囚永德以觀變及威克大梁思乃釋永德而謝之庚寅郭威帥百官上言比皇帝到闕動涉浹旬比必利翻十日為浹旬徐州至大梁七百里郭威計程言之也請太后臨朝聽政考異曰周太祖實録云太后自臨朝令稱制隱帝實録自是至國亡止稱誥今從之朝直遙翻六月先是馬希萼遣蠻兵圍玉潭朱進忠引兵會之崔洪璉兵敗奔還長沙馬希廣遣崔洪璉屯玉潭事始見上六月攻嶽州刺史王贇拒之五日不克希萼使人謂贇曰公非馬氏之臣乎不事我欲事異國乎為人臣而懷二心豈不辱其先人贇曰贇父環章十二行本贇作亡無環字乙十一行本同張校云王褱作環無注本與吳本同按王褱字與今見胡刻本異為先王將六破淮南兵王贇父環馬氏之良將也將即亮翻贇常恐淮南坐收其弊一旦以遺體臣淮南誠辱先人耳大王苟能釋憾罷兵兄弟雍睦如初贇敢不盡死以事大王兄弟豈有二心乎希萼慚引兵去辛卯至湘陰焚掠而過湘陰古羅縣之地唐屬嶽州宋屬潭州九域志湘陰縣在潭州東北一百五十五里宋白曰湘陰縣本羅子國秦為羅縣宋元徽二年分益陽羅湘西處巴峽流人因立湘陰縣以地在湘江之陰故名至長沙軍于湘西步兵及蠻兵軍于嶽麓盛弘之荊州記長沙西岸有麓山蓋衡山之足又名靈麓峯乃嶽山七十二峯之數自湘西古渡登岸夾徑喬松泉澗盤繞諸峯疊秀下瞰湘江道林嶽麓等寺皆在焉馬希廣遣劉彥瑫召水軍指揮使許可瓊帥戰艦五百艘屯城北津屬于南津帥讀曰率屬之欲翻以馬希崇為監軍馬希崇在長沙常為希萼詗希廣希萼又以利啖許可瓊希廣使可瓊為將希崇監軍所謂藉寇兵也扼湘陰路瀏江口有駱駝觜因謂之駝口扼柵路朗兵柵于湘西以兵扼其路德勳之子也許德勳亦楚之良將六月壬辰太后始臨朝以王峻為樞密使袁山義為宣徽南院使王殷為侍衛馬步軍都指揮使郭崇威為侍衛馬軍都指揮使曹威為侍衛步軍都指揮使陳州刺史李穀權判三司六月劉銖李洪建及其黨皆梟首於市而赦其家考異曰實録國子博士司天監洛陽王處訥素與周祖善因言劉氏祚短事處訥曰漢曆未盡但以即位後讎殺人夷人之族怨結天下所以社稷不得久長耳時周祖方以兵圍蘇逢吉劉銖之第俟旦而族之聞其言蹶然遽命釋之按周祖時方迎湘陰公立之豈得遽言劉氏祚短乎今不取劉銖屠吾家吾復屠其家怨讎反覆庸有極乎由是數家獲免王殷屢為洪建請免死王殷先與李洪建分掌侍衛馬步軍以同僚故為之請為于僞翻後匡贊至兗州慕容彥超執而獻之李業至陝州陝失冉翻其兄保義節度使洪信不敢匿於家業懷金將奔晉陽至絳州盜殺之而取其金六月蜀施州刺史田行皋奔荊南高保融曰彼二於蜀安肯盡忠于我執之歸于蜀伏誅六月鎮州邢州奏契丹主將數萬騎入寇攻內丘內丘本漢中丘縣隋避武元帝諱改為內丘唐屬邢州九域志在州北四十七里范成大北使録邢州三十五里至內丘縣死傷甚衆有戍兵五百叛應契丹引契丹入城屠之又陷饒陽九域志饒陽縣在深州北九十里國事權委竇貞固蘇禹圭王峻軍事委王殷十二月甲午朔郭威發大梁六月丁酉以翰林學士戶部侍郎范質為樞密副使六月初蠻酋彭師皓降於楚見二百八十二卷晉天福五年酋慈由翻皓古老翻惡烏路翻獷古猛翻楚王希廣獨憐之以為強弩指揮使領辰州刺史師皓常欲為希廣死為于僞翻及朱進忠與蠻兵合七千餘人至長沙營於江西湘江之西言於希廣曰朗人驟勝而驕雜以蠻兵攻之易破也願假臣步卒三千自巴溪渡江出嶽麓之後至水西令許可瓊以戰艦渡江腹背合擊必破之前軍敗則其大軍自不敢輕進矣希廣將從之時馬希萼已遣間使以厚利啖許可瓊間古莧翻啖吐濫翻許分湖南而治可瓊有二心乃謂希廣曰師皓與梅山諸蠻皆族類安可信也可瓊世為楚將許可瓊德勳之子故自言爾希萼竟何能為希廣乃止希萼尋以戰艦四百餘艘泊江西希廣命諸將皆受可瓊節度日賜可瓊銀五百兩希廣屢造其營計事造七到翻可瓊常閉壘不使士卒知朗軍進退希廣歎曰真將軍也吾何憂哉臨亂之君各賢其臣斯言信矣與希萼會水西約為內應舸苦我翻一旦彭師皓見可瓊瞋目叱之瞋昌真翻拂衣入見希廣曰可瓊將叛國人皆知之請速除之無貽後患希廣曰可瓊許侍中之子豈有是邪楚加許德勳侍中故希廣稱之歎曰王仁而不斷斷丁亂翻敗亡可翹足俟也潭州大雪平地四尺潭朗兩軍久不得戰希廣信巫覡及僧語塑鬼於江上覡刑狄翻塑桑故翻摶埴為神鬼之形曰塑舉手以卻朗兵又作大像于高樓手指水西怒目視之怒奴古翻命衆僧日夜誦經希廣自衣僧服膜拜求福衣於既翻下暉衣同膜莫乎翻甲辰朗州步軍指揮使武陵何敬真等考異曰湖湘故事作何景真今從十國紀年敬真望韓禮營旌旗紛錯先是希廣命韓禮營于楊柳橋紛亂也錯雜也陳讀曰陳彼衆已懼擊之易破也朗人雷暉衣潭卒之服潛入禮寨手劍擊禮不中手式又翻中竹仲翻軍中驚擾敬真等乘其亂擊之禮軍大潰禮被創走至家而卒創初良翻於是朗兵水陸急攻長沙步軍指揮使吳宏小門使楊滌相謂曰以死報國此其時矣各引兵出戰宏出清泰門戰不利滌出長樂戰自辰至午朗兵小卻長樂之下當有門字滌士卒飢疲退就食彭師皓戰於城東北隅蠻兵自城東縱火城上人招許可瓊軍使救城可瓊舉全軍降希萼長沙遂陷朗兵及蠻兵大掠三日殺吏民焚廬舍自武穆王以來所營宮室皆為灰燼楚王馬殷諡武穆皆入蠻落李彥溫望見城中火起自駝口引兵救之朗人已據城拒戰彥溫攻清泰門不克與劉彥瑫各將千餘人奉文昭王及希廣諸子趣袁州遂奔唐楚王希範諡文昭九域志潭州東南至袁州六百三十四里趣七喻翻張暉先是自益陽遁歸長沙長沙既陷遂降於希萼馬希崇通希萼事始二百八十七卷天福十二年帥讀曰率見希萼曰不幸為許可瓊所誤今日死不愧先王矣彭師皓投槊於地大呼請死呼火故翻希萼歎曰鐵石人也皆不殺乙巳希崇迎希萼入府視事閉城分捕希廣及掌書記李弘皋弟弘節都軍判官唐昭胤及鄧懿文楊滌等皆獲之希萼謂希廣曰承父兄之業豈無長幼乎希廣曰將吏見推朝廷見命耳希萼皆囚之卒如張少敵拓跋恆之言丙午希萼命內外巡檢侍衛指揮使劉賓禁止焚掠丁未希萼自稱天策上將軍武安武平靜江寧遠等軍節度使馬氏舊有此四鎮之地是時寧遠巡屬已屬南漢此皆父兄官爵希萼未稟命於中國而自稱之為希崇殺希萼張本悉以朗人為之臠食李弘皋弘節唐昭胤楊滌斬鄧懿文於市戊申希萼謂將吏曰希廣懦夫為左右所制耳吾欲生之可乎諸將皆不對朱進忠嘗為希廣所笞對曰大王三年血戰始得長沙天福十二年希萼希廣始爭國次年交兵至是三年矣他日必悔之戊申賜希廣死希廣臨刑猶誦佛書彭師皓葬之於瀏陽門外瀏陽門潭州城東門瀏音劉六月武寧節度使贇留右都押牙鞏延美元從都教練使楊溫守徐州為二人以徐州拒周張本鞏延美據下卷及歐史當作鞏廷美鞏以邑為姓周有卿士鞏簡公晉有大夫鞏朔從才用翻自彭城而西來大梁皆如王者左右呼萬歲郭威至滑州留數日贇遣使慰勞諸將勞力到翻受命之際相顧不拜私相謂曰我輩屠陷京城其罪大矣若劉氏復立我輩尚有種乎種章勇翻己酉威聞之即引兵行趣澶州趣七喻翻辛亥遣蘇禹圭如宋州迎嗣君六月楚王希萼以子光贊為武平留後以何敬真為朗州牙內都指揮使將兵戍之希萼召拓跋恆欲用之恆稱疾不起自希廣之立拓跋恆已杜門矣事見二百八十七卷天福十二年六月壬子郭威渡河館于澶州館古玩翻澶時連翻癸丑旦將發將士數千人忽大譟威命閉門將士踰垣登屋而入曰天子須侍中自為之將士已與劉氏為仇不可立也或裂黃旗以被威體被皮義翻共扶抱之呼萬歲震地因擁威南行威乃上太后箋請奉宗章十二行本宗上有漢字乙十一行本同廟事太后為母丙辰至韋城隋分白馬置韋城縣治韋氏國城屬滑州九域志在州東南五十里丁度曰韋城縣古豕韋國也上時掌翻以昨離河上在道秋毫不犯勿有憂疑恐京城士民懲前者剽掠之禍奔迸四出故撫安之離力智翻戊午威至七里店竇貞固帥百官出迎拜謁因勸進威營於皋門村皋門村蓋在皋門之外按大梁城無皋門詩大雅綿之篇曰乃立皋門皋門有伉毛氏傳曰王之郭門曰皋門鄭氏箋曰諸侯之宮外門曰皋門朝門曰應門內有路門天子之宮加之庫雉至禮記明堂位記周賜魯公以天子之制其言曰庫門天子皋門雉門天子應門鄭注又云天子五門皋庫雉應路魯有庫雉路則諸侯三門歟詳而味之詩箋記注微有不同而五代之時汴城之外所謂皋門村蓋以郭門之外有村遂呼曰皋門村合於毛氏詩傳皋門村屬開封縣薛史云王檀葬于開封縣之皋門原以是知之武寧節度使贇已至宋州王峻王殷聞澶州軍變遣侍衛馬軍都指揮使郭崇威將七百騎往拒之又遣前申州刺史馬鐸將兵詣許州巡檢崇威忽至宋州陳于府門外贇大驚闔門登樓詰之詣許州巡檢備劉信也汴京至宋州二百八十五里耳贇不意其至故驚而詰之詰去吉翻澶州軍變郭公慮陛下未察故遣崇威來宿衛無他也贇召崇威崇威不敢進馮道出與崇威語先是使馮道迎贇故道在贇所贇執崇威手而泣崇威以郭威意安諭之少頃崇威出時護聖指揮使張令超帥部兵為贇宿衛按薛史護聖漢侍衛馬軍也帥讀曰率下同說式芮翻觀崇威視瞻舉措必有異謀道路皆言郭威已為帝而陛下深入不止禍其至哉請急召張令超諭以禍福使夜以兵劫崇威奪其兵明日掠睢陽金帛募士卒北走晉陽宋州睢陽郡贇父崇鎮晉陽睢音雖走音奏未暇追我此策之上也贇猶豫未決是夕崇威密誘令超令超帥衆歸之誘音酉贇大懼郭威遺贇書云為諸軍所迫召馮道先歸留趙上交王度奉侍道辭行贇曰寡人此來所恃者以公三十年舊相故無疑耳馮道唐明宗天成二年為相至是二十四年曰三十年舉成數也遺于季翻事危矣公何以為計道默然無以答贇故默馮道自謂癡頑老子良不妄也欲殺之將即亮翻數所角翻贇曰汝輩勿草草此無預馮公事契丹主入汴責劉繼勳繼勳歸罪於道道幾死矣宋州之事使劉贇從賈貞之意道亦必死矣而契丹主謂道非多事者劉贇謂無預馮公事豈非以其在位素懷沖淡與物無競人皆敬其名德而然邪道之全身固為得矣有國者焉用彼相哉然自後唐同光以來樞密使任事丞相取充位而已責人斯無難惟受責俾如流以此而言道未肯受責也殺其腹心董裔賈貞等數人己未太后誥廢贇為湘陰公馬鐸引兵入許州劉信惶惑自殺庚申太后誥以侍中監國太后兩誥皆郭威之志也侍中稱郭威官壬戌夜監國營有步兵將校醉揚言嚮者澶州騎兵扶立今步兵亦欲扶立監國斬之六月南漢主以宮人盧瓊仙黃瓊芝為女侍中朝服冠帶參決政事朝直遙翻宗室勳舊誅戮殆盡惟宦官林延遇等用事史言南漢終以宦官女寵亡國而南漢主所以能終其世者以僻處海隅而中國未有真主耳容肇祖標點聶崇岐覆校
