body:
  text: 資治通鑑卷第六朝散大夫右諫議大夫權御史中丞充理檢使上護軍賜紫金魚袋臣奉敕編集後學天台音注秦紀一陸德明曰秦隴西谷名也在雍州烏鼠山之東北秦之先非子為周孝王養馬於汧渭之間封為附庸邑之秦谷非子曾孫秦仲周宣王命為大夫仲之孫襄公討西戎救周平王東遷以岐豐之地賜之列為諸侯春秋時稱秦伯昭襄王名稷惠文王庶子也西周既亡天下莫適為主通鑑以秦卒併天下因以昭襄王繫年諡法昭德有勞曰昭辟地有德曰襄以沈約諡法言之則昭襄復諡也卒子恤翻諡神至翻辟讀曰闢五十二年五十二年河東守王稽坐與諸侯通棄市河東本魏地秦取之以其地在大河之東置河東郡守式又翻刑人於市與衆棄之秦法論死於市謂之棄市王稽薦范睢於秦王睢既相秦稽亦進用今以罪死故睢日以不懌懌悅也不懌不悅也應於陵翻或曰范睢之初進用於秦至於為相昭襄王誠悅之也鄭安平既降趙王稽又得罪睢雖為相昭襄王臨朝接之日以不悅懌羊益翻朝直遙翻應侯請其故王曰今武安君死而鄭安平王稽等皆畔內無良將而外多敵國吾是以憂將即亮翻應侯懼不知所出燕客蔡澤聞之燕於賢翻蔡姓也以國為氏西入秦先使人宣言於應侯曰蔡澤天下雄辨之士彼見王必困君而奪君之位應侯怒使人召之蔡澤見應侯禮又倨倨居御翻傲也應侯不快因讓之曰子宣言欲代我相相息亮翻請聞其説蔡澤曰吁孔安國曰吁疑怪之辭孔穎達曰吁者心有所嫌而為此聲故以為疑怪之辭也夫四時之序成功者去謂春生夏長秋就實冬閉藏各成其功而相代謝也夫音扶下同何足願與商君事見二卷周顯王三十一年吳起事見一卷安王二十一年大夫種相越王句踐以雪會稽之恥功成不退為句踐所殺種溫公音章勇翻與讀曰歟句音鉤踐慈淺翻種章勇翻何為不可此三子者義之至也忠之盡也君子有殺身以成名死無所恨蔡澤曰夫人立功豈不期於成全邪應於陵翻謬靡幼翻邪音耶身名俱全者上也名可法而身死者次也名僇辱而身全者下也僇與戮同其為人臣盡忠致功則可願矣閎夭周公豈不亦忠且聖乎三子之可願孰與閎夭周公哉閎夭周文王武王之賢臣閎音宏夭於驕翻又於表翻善蔡澤曰然則君之主惇厚舊故不倍功臣孰與孝公楚王越王倍與背同蒲昧翻曰未知何如蔡澤曰君之功能孰與三子曰不若蔡澤曰然則君身不退患恐甚於三子矣語曰日中則移月滿則虧進退嬴縮五星早出為嬴晚出為縮嬴餘輕翻縮所六翻聖人之道也今君之怨已讎而德已報怨已讎謂殺魏齊德已報謂進用王稽鄭安平等竊為君危之為于偽翻應侯遂延以為上客因薦於王王召與語大悅拜為客卿應侯因謝病免王新悅蔡澤計畫遂以為相國澤為相數月免相息亮翻五十二年楚春申君以荀卿為蘭陵令姓譜荀本姓郇後去邑為荀又晉荀林父公族隰叔之後班志蘭陵縣屬東海郡史記正義曰今沂州承縣有蘭陵山趙人名況嘗與臨武君論兵於趙孝成王之前王曰請問兵要臨武君對曰上得天時下得地利觀敵之變動後之發先之至此用兵之要術也後先皆去聲不然臣所聞古之道凡用兵攻戰之本在乎一民弓矢不調則羿不能以中六馬不和則造父不能以致遠羿古之善射者造父古之善御者也羿音詣中竹仲翻父音甫則湯武不能以必勝也故善附民者是乃善用兵者也故兵要在乎附民而已臨武君曰不然兵之所貴者勢利也所行者變詐也善用兵者感忽悠暗楊倞曰感忽恍惚也悠暗謂遠視不分之貌孫吳用之無敵於天下豈必待附民哉荀卿曰不然臣之所道仁人之兵王者之志也君之所貴權謀勢利也仁人之兵不可詐也彼可詐者怠慢者也露袒者也露袒如人之支體上下無衣裳以覆蔽裸露肉袒者也滑音骨亂也故以桀詐桀猶巧拙有幸焉以桀詐堯譬之以卵投石以指橈沸橈奴巧翻又奴教翻攪也若赴水火入焉焦沒耳故仁人之兵上下一心三軍同力臣之於君也下之於上也若子之事父弟之事兄若手臂之扞頭目而覆胸腹也覆敷救翻蓋也詐而襲之與先驚而後擊之一也且仁人用十里之國則將有百里之聽用百里之國則將有千里之聽用千里之國則將有四海之聽必將聰明警戒和傅而一康曰將音將帥之將余據文義讀如字為通傅音附故仁人之兵聚則成卒百人為卒延則若莫邪之長刃莫邪吳之寶劍也説文莫邪長戟也邪音耶兌則若莫邪之利鋒當之者潰兌劉向新序作鋭楊倞曰兌猶聚也讀與隊同倞音諒則若盤石然觸之者角摧而退耳且夫暴國之君將誰與至哉夫音扶彼其所與至者必其民也其民之親我歡若父母其好我芬若椒蘭彼反顧其上則若灼黥若仇讎人之情雖桀跖豈有肯為其所惡賊其所好者哉字書仇讎皆匹也説文仇讎也讎猶應也左傳怨耦曰仇記曰父之讎不與共戴天蓋謂仇之初匹也至於耦而成怨則為仇讎校也兩本相對覆校是非也殺父之人一旦相對覆校是非則不共戴天矣仇讎之義至此為甚後世率以為言好呼到翻為于偽翻惡烏路翻彼必將來告章十二行本告下有之字乙十一行本同孔本同退齋校同夫又何可詐也故仁人用國日明諸侯先順者安後順者危敵之者削反之者亡詩曰武王載發有虔秉鉞如火烈烈則莫我敢遏此之謂也商頌之辭武王湯也發依商頌讀為斾古者軍將戰則建斾孝成王臨武君曰善請問王者之兵設何道何行而可楊倞曰設謂制置道謂論説教令也行謂動用也凡君賢者其國治君不能者其國亂隆禮貴義者其國治簡禮賤義者其國亂治者強亂者弱是強弱之本也治直吏翻上足卬則下可用也上不足卬則下不可用也卬古仰字音魚向翻楊倞曰下託上曰仰下可用則強下不可用則弱是強弱之常也齊章十二行本齊上有好士者強不好士者弱愛民者強不愛民者弱政令信者強政令不信者弱重用兵者強輕用兵者弱權出一者強權出二者弱是強弱之常也五十五字乙十一行本同孔本同張校同退齋校同人隆技擊孟康曰技擊者兵家之技巧習手足便器械積機關以立攻守之勝者也楊倞曰技材力也齊人以勇力擊斬敵者號為技擊隆重也技渠綺翻得一首者則賜贖錙金無本賞矣楊倞曰八兩曰錙本賞謂有功同受賞也其技擊之術斬得一首則官賜以錙金贖之斬首雖戰敗亦賞不斬首雖勝亦不賞是無本賞矣錙莊持翻則偷可用也毳與脆同音此芮翻事大敵堅則渙焉離耳若飛鳥然傾側反覆無日是亡國之兵也兵莫弱是矣是其去賃市傭而戰之幾矣賃女禁翻毛晃曰借也僦也市傭謂市人之受雇者也魏氏之武卒以度取之楊倞曰選擇武勇之士號為武卒度取之謂取長短材力之中度者也如淳曰三身一髀褌一脛繳一凡三屬衣於既翻屬之欲翻沈括曰鈞石之石五權之名石重百二十斤後人以一斛為一石自漢時已如此于定國飲酒一石不亂是也挽強弓弩古人以鈞石率之今人乃以粳米一斛之重為一石凡石以九十二斤半為法乃漢稱三百四十一斤也今之武卒蹶弩有及九石者計其力乃古二十五石比魏之武卒當二人有餘弓有挽三石者乃古之二十四鈞比顏高之弓當五人有餘此皆近世教習所致武備之盛前古未有其比案括之論詳矣然用之則誤國喪師不知合變是趙括之談兵也操七刀翻置戈其上謂置戈於身之上即荷戈也荷下可翻贏三章十二行本三作二乙十一行本同日之糧日中而趨百里中試則復其戶利其田宅中試言程試而中度者復其戶不徭役也利其田宅給以田宅便利之處胄今之兜鍪冠古玩翻贏怡成翻擔也中竹仲翻復方目翻而復利未可奪也改造則不易周也改造謂更選擇也易弋豉翻其稅必寡是危國之兵也秦人其生民也狹隘其使民也酷烈劫之以勢隱之以厄忸之以慶賞鰌之以刑罰愜與狹同隘烏懈翻楊倞曰隱之以厄謂隱蔽以險厄使敵不能害鄭氏曰秦地多厄隱藏其民於厄中也忸與狃同串習也戰勝則與之慶賞使習以為常鰌藉也不勝則以刑罰陵藉之莊子風謂蛇曰鰌我亦勝我陸德明音義曰鰌音秋藉也李云鰌藉也藉則削也忸女九翻非鬬無由也使以功賞相長五甲首而隸五家楊倞曰有功則賞之使相長凡獲得五甲首則役隸鄉里之五家也要一遙翻長知兩翻故四世有勝非幸也數也四世謂秦孝公惠文王悼武王昭襄王魏之武卒不可以遇秦之鋭士秦之鋭士不可以當桓文之節制桓文之節制不可以當湯武之仁義有遇之者若以焦熬投石焉焦熬之物至脆投石則碎熬五刀翻皆干賞蹈利之兵也傭徒鬻賣之道也未有貴上安制綦節之理也楊倞曰干賞蹈利之兵與傭徒之人鬻賣其力而作者無異未有愛貴其上而為之致死安於制度自不踰越極於節義心不為非之理也則作而兼殆之耳楊倞曰微妙精盡也節仁義也作起也殆危也諸侯有能精盡仁義則起而兼此數國使之危殆隆勢詐上功利是漸之也漸浸漬也言勢詐功利漸染以成俗漸子廉翻是齊之也故以詐遇詐猶有巧拙焉以詐遇齊譬之猶以錐刀墮泰山也謂禮義教化之所齊以詐遇之無不敗者墮讀曰隳拱挹指麾而強暴之國莫不趨使挹一及翻義與揖同誅桀紂若誅獨夫故泰誓曰獨夫紂此之謂也故兵大齊則制天下小齊則治鄰敵治直之翻若夫招延募選隆勢詐上功利之兵夫音扶下同則勝不勝無常代翕代張代存代亡相為雌雄耳夫是謂之盜兵君子不由也孝成王臨武君曰善請問為將將即亮翻荀卿曰知莫大於棄疑楊倞曰不用疑謀此智之大知讀曰智行下孟翻事莫大於無悔事至無悔而止矣不可必也言不可自以為必勝欲嚴以威慶賞刑罰欲必以信處舍收藏欲周以固楊倞曰處舍營壘也收藏財物也周密嚴固則敵不得而陵奪也處昌呂翻欲安以重欲疾以速窺敵觀變欲潛以深欲伍以參楊倞曰謂使間諜觀敵欲潛隱深入之也伍參猶錯雜也使間諜或參之或伍之於敵之間而盡知其事韓子曰省同異之言以知朋黨之分偶參伍之驗以責陳言之實又曰參之以比物伍之以合參必行吾所明無行吾所疑夫是之謂六術無欲將而惡廢言欲為將而惡失權則舍己之勝算遷就以逢君之欲矣將即亮翻無威內而輕外無見其利而不顧其害凡慮事欲熟而用財欲泰夫是之謂五權夫音扶將所以不受命於主有三可殺而不可使處不完可殺而不可使擊不勝可殺而不可使欺百姓夫是之謂三至楊倞曰至謂守一而不變處昌呂翻三軍既定百官得序楊倞曰百官軍之百吏也則主不能喜敵不能怒夫是之謂至臣慮必先事而申之以敬慎終如始始終如一夫是之謂大吉楊倞曰言必無覆敗之禍必在敬之其敗也必在慢之故敬勝怠則吉怠勝敬則滅計勝欲則從欲勝計則凶戰如守行如戰有功如幸敬謀無曠敬事無曠敬吏無曠敬衆無曠敬敵無曠夫是之謂五無曠曠廢也夫音扶而處之以恭敬無曠夫是之謂天下之將則通於神明矣臨武君曰善請問王者之軍制荀卿曰將死鼓將即亮翻將建旗伐鼓以令三軍之進退死不離局離力智翻御死轡百吏死職上章乙十一行本上作士大夫死行列行戶剛翻聞鼓聲而進聞金聲而退順命為上有功次之令不進而進猶令不退而退也令力正翻其罪惟均不殺老弱不獵禾稼服者不禽格者不赦奔命者不獲楊倞曰服謂不戰而退者不追禽之格謂相拒捍者奔命謂奔走來歸其命不獲之以為囚俘非誅其百姓也誅其亂百姓者也百姓有捍其賊則是亦賊也以其章十二行本其作故乙十一行本同順刃者生傃刃者死奔命者貢楊倞曰傃向也謂傃向格鬬者貢謂取歸命者獻於上將也傃音素殷紂暴虐微子奔周武王殺紂封微子於宋微子本名啓此云開者蓋漢景帝諱劉向改之也楊倞曰説苑云桀為天子其臣有左師觸龍者諂諛不正此云紂當是説苑誤按戰國時趙亦有左師觸龍豈姓名同乎姓譜曹姓本自顓頊玄孫陸終之子六安周武王封曹挾於邾故邾曹姓也至魏武帝始祖曹叔振鐸所以養生之者無異周人故近者歌謳而樂之遠者竭蹶而趨之以上下文觀之商周二字恐或倒置楊倞曰竭蹶顛仆猶言匍匐也樂音洛蹶居月翻莫不趨使而安樂之間讀曰間辟讀曰僻四海之內若一家通達這屬莫不從服夫是之謂人師夫音扶詩曰自西自東自南自北無思不服此之謂也引文王有聲之詩而言城守不攻兵格不擊敵上下相喜則慶之不屠城不潛軍不留衆師不越時故亂者樂其政不安其上欲其至也亂國之民樂吾之政故不安其上惟欲吾兵之至也樂音洛善陳囂問荀卿曰囂虛驕翻又牛刀翻先生議兵常以仁義為本仁者愛人義者循理然則又何以兵為凡所為有兵者為爭奪也為爭于偽翻荀卿曰非汝所知也彼仁者愛人愛人故惡人之害之也義者循理循理故惡人之亂之也惡烏路翻彼兵者所以禁暴除害也非爭奪也五十二年燕孝王薨子喜立五十二年周民東亡義不為秦民也遷西周公於狐之聚此西周文公也武公之子也自赧王時東西分治赧王擁虛器而已班志河南郡梁縣有狐聚括地志汝州外古梁城即狐聚也陽人故城即陽人聚也在汝州梁縣西四十里秦遷東周所居也梁亦古梁城也在汝州梁縣西南十五里索隱曰狐聚與陽人聚在洛陽南北五十里梁新城之間也與憚同聚賢曰慈諭翻五十二年楚王章十二行本王作人乙十一行本同孔本同退齋校同遷魯於莒而取其地魯至是而亡莒居許翻五十三年五十三年摎伐魏取吳城後漢志河東郡大陽縣有吳山山上有虞城杜預曰虞國也帝王世紀曰舜嬪于虞虞城是也亦謂吳城秦昭王伐魏取吳城是也摎紀虬翻魏舉國聽令朝直遙翻令力政翻五十四年五十四年王郊見上帝於雍班志雍縣屬扶風秦惠公都之有五畤故於此郊見上帝欲行天子之禮也應劭曰四方積高曰雍凡下見上之見音賢遍翻雍於用翻畤音止五十四年楚遷于巨陽赧王三十七年楚自郢東北徙於陳今自陳徙巨陽至始皇六年春申君以朱英之言自陳徙壽春則此時雖徙巨陽未離陳地也赧奴版翻郢以井翻離力智翻五十五年五十五年衛懷君朝於魏魏人執而殺之更立其弟是為元君更工衡翻元君魏壻也壻女夫也妻謂夫亦曰壻旁從女或從士音思繼翻五十六年五十六年秋王薨孝文王立尊唐八子為唐太后薨呼肱翻七子八子秦宮中女官名以子楚為太子趙人奉子楚妻子歸之韓王衰絰入弔祠賢曰喪服斬衰裳上曰衰下曰裳麻在首要皆曰絰首絰象緇布冠要絰象大帶絰之言實衰之言摧明中實摧痛也衰七雷翻五十六年燕王喜使栗腹約歡於趙姓譜栗姓栗陸氏之後燕因肩翻反而言於燕王曰趙壯者皆死長平長平之敗事見上卷周赧王五十五年可伐也王召昌國君樂間問之對曰趙四戰之國言其四境皆鄰於強敵四面拒戰也不可王曰吾以五而伐一對曰不可王怒㣥臣皆以為可乃發二千乘栗腹將而攻鄗乘繩證翻鄗呼各翻卿秦攻代姓譜卿姓也與人通關約交以五百金飲人之王姓譜將亦姓也音即良翻飲於禁翻使者赧而攻之不祥師必無功使疏吏翻王不聽自將偏軍隨之將渠引王之綬王以足蹴之蹴子六翻踏也綬音受將渠泣曰臣非自為為王也為于偽翻燕師至宋子班志宋子縣屬巨鹿郡逆擊之敗栗腹於鄗敗卿秦樂乘於代將即亮翻樂乘趙將也戰國策曰樂乘敗卿秦於代當從之敗補邁翻追北五百餘里遂圍燕燕都薊趙人進圍之趙人曰必令將渠處和處昌呂翻處和者主和也燕王使章十二行本使作以乙十一行本同孔本同將渠為相而處和趙師乃解去相息亮翻五十六年趙平原君卒卒子恤翻孝文王索隱曰名柱諡法五宗安之曰孝慈惠愛民曰文元年元年冬十月己亥王即位三日薨子楚立是為莊襄王尊華陽夫人為華陽太后夏姬為夏太后姓譜周封夏后氏於非為後不得封者以夏為氏一曰陳夏徵舒之後夏姬生莊襄王故尊為太后華戶化翻夏戶雅翻元年燕將攻齊聊城拔之聊城在濟水之北班志聊城縣屬東郡燕將保聊城不敢歸齊田單攻之歲餘不下魯仲連乃為書約之矢以射城中燕因肩翻將即亮翻約之矢謂以書圍繞束縛於矢也射而亦翻遺燕將為陳利害遺于季翻為于偽翻曰為公計者不歸燕則歸齊今獨守孤城齊兵日益而燕救不至將何為乎燕將見書泣三日猶豫不能自決欲歸燕已有隙欲降齊所殺虜於齊甚衆恐已降而後見辱喟然歎曰與人刃我寧我自刃遂自殺降戶江翻喟丘貴翻言與其使人加刃於我寧使我拔刃而自殺也聊城亂田單克聊城用大師曰克言魯仲連於齊章十二行本齊下有王字乙十一行本同孔本同欲爵之仲連逃之海上曰吾與富貴而詘於人詘曲勿翻禮記不充詘於富貴詘者喜失節貌余謂此詘即屈伸之屈寧貧賤而輕世肆志焉魏安釐王問天下之高士於子順釐讀曰僖子順曰世無其人也抑可以為次其魯仲連乎王曰魯仲連強作之者強其兩翻非體自然也子順曰人皆作之作之不止乃成君子作之不變習與體成章十二行本成下有習與體成四字乙十一行本同孔本同張校同則自然也朱熹曰君子成德之名莊襄王本名異人改名楚孝文王之中子也諡法勝敵志強曰莊元年元年呂不韋為相國相息亮翻元年東周君與諸侯謀伐秦王使相國帥師討滅之遷東周君於陽人聚帥讀曰率聚慈喻翻周既不祀皇甫謐曰周凡三十七王八百六十七年周有天下祀后稷以配天宗祀文王於明堂以配上帝宗廟血食八百六十餘年西周已亡猶幸東周能守其祀東周又為秦所滅則盡不祀矣索隱曰既盡也日食盡曰既言周祚盡滅無主祭祀比必寐翻及也凡有七邑河南洛陽穀城平陰偃師鞏緱氏班志河南縣故郟鄏地周武王遷九鼎周公營以為都是為王城平王居之洛陽周公遷殷民於此是為成周師古曰穀城即今新安應劭曰平陰在平城北故曰平陰班志河南郡之平縣即平城也括地志曰故穀城在洛州河南縣西北十八里苑中河陰縣城本漢平陰縣在洛州洛陽縣東北五十里十三州志曰在平津大河之南魏文帝改曰河陰劉昭曰偃師帝嚳所都盤庚復南亳是為西亳鞏古鞏伯國周之東周公所居緱氏周大夫劉子邑宋白曰緱氏春秋之滑國已上七邑漢皆屬河南郡緱工侯翻郟音夾鄏音辱元年以河南洛陽十萬戶封相國不韋為文信侯相息亮翻元年蒙驁伐韓驁五到翻又五刀翻取成皋滎陽班志滎陽縣屬河南郡滎澤在其南唐屬鄭州元年楚滅魯遷魯頃公於卞春秋夫人薑氏會齊侯于卞即其地班志卞縣屬魯郡頃音傾家人猶今所謂齊民也二年二年日有食之二年蒙驁伐趙章十二行本趙下有定太原三字乙十一行本同孔本同張校同退齋校同取榆次狼孟等三十七城班志榆次狼孟二縣並屬太原郡榆次即左傳塗水梗陽之地括地志狼孟故城在並州陽曲縣東北二十六里二年楚春申君言於楚王曰淮北地邊於齊其事急請以為郡而封於江東楚王許之春申君因城吳故墟以為都邑吳都姑蘇越王句踐滅吳王夫差而吳為墟班志吳縣太伯所邑漢為會稽郡治所句音鉤踐慈演翻春申君相楚楚王弱秦正強不能為國謀乃營其都而盛宮室何足道也孔穎達曰爾雅云室謂之宮宮謂之室別而言之論其四面穹隆則曰宮因其貯物則曰室室之言實也三年三年王齕攻上黨諸城悉拔之初置太原郡齕恨勿翻三年蒙驁帥師伐魏取高都汲班志高都縣屬上黨郡汲縣屬河內郡括地志高都縣今澤州也汲故城在衛州所理汲縣之西南二十五里帥讀曰率數所角翻魏王患之乃使人請信陵君於趙信陵君畏得罪不肯還信陵君留趙事見上卷周赧王五十八年還從宣翻又音如字赧奴版翻誡居拜翻敕也有敢為魏使通者死為于偽翻使疏吏翻賓客莫敢諫毛公薛公見信陵君曰公子所以重於諸侯者徒以有魏也康曰重直用切余按文義當音輕重之重一旦秦人克大梁夷先王之宗廟公子當何面目立天下乎語未卒信陵君色變趣駕還魏卒子恤翻趣讀曰促催也魏王持信陵君而泣以為上將軍信陵君使人求援於諸侯諸侯聞信陵君復為魏將將即亮翻皆遣兵救魏信陵君率五國之師敗蒙驁於河外自春秋至戰國率以黃河之西為河外晉賂秦以河外列城五即其證也驁五到翻敗補邁翻信陵君追至函谷關抑之而還安陵人縮高之子仕於秦後漢志汝南郡征羌縣有安陵亭注云即魏安陵君所封地括地志曰陵縣西北十五里李奇云六國時為安陵還從宣翻又音如字縮所六翻班志河南郡中牟縣有管叔邑後漢志中牟縣有管城杜預曰管國也在京縣東北使人謂安陵君曰君其遣縮高吾將仕之以五大夫使為執節尉信陵君使安陵君遣縮高欲使安陵以君諭其民以父諭其子也軍尉之執節者也周執節以使漢執節則使且可以專殺矣安陵小國也不能必使其民使者自往請之使吏導使者至縮高之所使者致信陵君之命縮高曰君之幸高也將使高攻管也夫父攻子守人之笑也見臣而下是倍主也父教子倍亦非君之所喜夫音扶倍蒲妹翻喜許既翻敢再拜辭使者以報信陵君信陵君大怒遣使之安陵君所曰安陵之地亦猶魏也使疏吏翻之如也往也安陵本魏地魏襄王以封其弟今吾攻管而不下則秦兵及我社稷必危矣願君生束縮高而致之若君弗致無忌將發十萬之師以造安陵之城下造七到翻安陵君曰吾先君成侯受詔襄王以守此城也手授太府之憲太府魏國藏圖籍之府憲法也子弒父有常不赦有常謂有常法也降城亡子不得與焉降戶江翻與讀曰預今縮高辭大位以全父子之義而君曰必生致之是使我負襄王之詔而廢太府之憲也雖死終不敢行縮高聞之曰信陵君為人悍猛而自用此辭必反章十二行本二字互乙乙十一行本同孔本同為國禍謂為安陵之禍也悍下罕翻又音汗無違人臣之義矣豈可使吾君有魏患乎乃之使者之舍刎頸而死信陵君聞之縞素辟舍刎扶粉翻頸居郢翻縞古老翻爾雅曰縞皓也辟讀曰避使使者謝安陵君曰無忌小人也困於思慮失言於君請再拜辭罪安陵受封於魏國者也縮高受廛於安陵者也縮高之子不為魏民逃歸秦而臣於秦為秦守管時秦加兵於魏欲取大梁安陵儻念魏為宗國縮高儻念其先為魏民見魏之危安敢坐視而不救公子無忌為魏舉師以臨之安陵君則陳太府之憲縮高則陳大臣之義以拒之雖死不避反而求之可謂得其死乎無忌為之縞素辟舍以謝安陵吾亦未知其何所處也王使人行萬金於魏以間信陵君求得晉鄙客信陵君殺晉鄙事見上卷周赧王五十六年間古莧翻公子亡在外十年矣今復為將諸侯皆屬天下徒聞信陵君而不聞魏王矣令力丁翻説式芮翻將即亮翻王又數使人賀信陵君得為魏王末也數所角翻魏王日聞其毀不能不信乃使人代信陵君將兵信陵君自知再以毀廢乃謝病不朝日夜以酒色自娛凡四歲而卒朝直遙翻卒子恤翻韓王往弔其子榮之以告子順子順曰必辭之以禮鄰國君弔君為之主鄭玄曰君為之主弔臣恩為己也子不敢當主中庭北面哭不拜記曰昔者衛靈公適魯遭季桓子之喪衛君請弔哀公辭不得命公為主客入弔公揖讓升自東階西鄉客升自西階弔公拜興哭則子無所受韓君也其子辭之三年五月丙午王薨薨呼肱翻太子政立生十三年矣國事皆決章十二行本決作委乙十一行本同孔本同張校同退齋校同於文信侯號稱仲父呂不韋封文信侯仲父以齊桓禮管仲禮之三年晉陽反是年秦攻得晉陽置太原郡未及而秦有莊襄王之喪故反始皇帝上諱政莊襄王子也王並天下自以德兼三皇功過五帝故自號曰皇帝欲傳世以一至萬乃除諡法號始皇帝元年元年蒙驁擊定之心擊定晉陽也驁五到翻元年韓欲疲秦人使無東伐乃使水工鄭國為間於秦鑿涇水自仲山為渠間古莧翻班志涇水出安定郡涇陽縣西幵頭山東至馮翊陽陵縣入渭過郡三行千六十里淮南子曰涇水出薄落之山華戎對境圖涇水上接蔚茹水南流至筓頭山西折而東流徑原州涇州界又東流徑邠州乾州之北又東南流至雍州涇陽縣而合于渭師古曰仲山即今九嵏之東仲山也幵輕煙翻蔚紆勿翻筓古兮翻雍於用翻嵏祖紅翻並北山東注洛並步浪翻師古曰洛水即馮翊漆沮水程大昌曰禹貢止有漆沮秦漢以來始有洛水所謂洛者班志云源出北地歸德縣北蠻夷中今按其水自入塞後歷鄜坊同三州始入渭孔安國謂自馮翊懷德縣入渭是也漢懷德唐同州朝邑縣是也漆水自華原縣東北同官縣界來沮水自邠州東北來洛在漆沮之東至同州白水縣與漆沮合所謂洛即漆沮者言其本同也沮七余翻鄜音膚邠彼巾翻中作而覺師古曰中作謂用功中道事未竟也覺露也韓之謀露也鄭國曰臣為韓延數年之命然渠成亦秦萬世之利也乃使卒為之臣為于偽翻卒子恤翻終也注填閼之水溉舄鹵之地四萬餘頃收皆畝一鍾師古曰注引也填閼謂壅泥也言引淤濁之水灌鹹鹵之田更令肥美故一畝之收至六斛四斗杜佑曰古者百步為畝秦漢以降即二百四十步為畝閼讀曰淤音於據翻舄與潟同音思積翻鹵也鹵亦作滷音郎古翻鹹滷饒有餘裕也二年二年麃公將卒攻卷索隱曰麃邑名麃公史失其姓名麃悲驕翻將即亮翻又音如字卷逵員翻邑名二年趙以廉頗為假相國伐魏取繁陽班志繁陽縣屬魏郡應劭曰在繁水之陽括地志繁陽故城在相州內黃縣東北二十七里相息亮翻子悼襄王立使武襄君樂乘代廉頗廉頗怒攻武襄君武襄君走廉頗出奔魏久之魏不能信用趙師數困於秦趙王思復得廉頗廉頗亦思復用於趙趙王使使者視廉頗尚可用否廉頗之仇郭開多與使者金令毀之廉頗見使者一飯斗米肉十斤被甲上馬以示可用使者還報曰廉將軍雖老尚善飯然與臣坐頃之三遺矢矣數所角翻復扶又翻使使疏吏翻令力丁翻被皮義翻上時掌翻矢糞也趙王以為老遂不召郭開之間廉頗以其仇也其讒殺李牧則好貨耳讒人罔極其禍國可勝言哉間古莧翻好呼到翻勝音升廉頗一為楚將無功曰我思用趙人卒死於壽春將即亮翻壽春縣漢屬九江郡唐為壽州治所始皇六年楚方徙都壽春史終言廉頗之事也卒子恤翻三年三年大飢五穀皆不熟為大飢三年蒙驁伐韓取十二城驁五到翻三年趙王以李牧為將伐燕取武遂方城班志武遂縣屬河間國方成縣屬廣陽國後漢志作方城括地志易州遂城縣戰國時武遂城也方城故城在幽州固安縣南十七里將即亮翻燕因肩翻趙之北邊良將也嘗居代鴈門備胸奴秦置鴈門郡在伐郡西南胸奴淳維之後本夏后氏之苗裔索隱曰張晏云淳維以殷時奔北邊又樂彥括地譜曰夏桀無道湯放之鳴條三年而死其子獯粥妻桀之衆妾避居北野隨畜移徙中國謂之胸奴其言夏后苗裔或當然也故應劭風俗通曰殷時曰獯粥改曰胸奴又晉灼云堯時曰葷粥周曰獫狁秦曰胸奴韋昭曰漢曰胸奴葷粥其別名則淳維是其始祖蓋與獯粥是一也獯許云翻粥音育獫虛檢翻市租皆輸入莫府為士卒費康曰師出無常處所在張幕居之以將帥得稱府故曰莫府莫與幕同一曰莫大也莫府猶言大府習騎射孔穎達曰古人不騎馬故但經記正典無言騎者今言騎者當是周末時射之所起起自黃帝故易繫辭黃帝下九事章云古者弦木為弧剡木為矢弧矢之利以威天下又世本云揮作弓夷牟作矢注云揮夷牟黃帝臣是弓矢起於黃帝矣騎奇寄翻下同剡以冉翻多間諜塞上置候望之地邊有警則舉烽漢書音義烽如覆米䉛縣著桔槔頭有寇則舉之燧積薪有寇則燔然之索隱曰字林䉛漉米藪也音一六翻纂要䉛淅箕也烽見敵則舉燧有難則焚烽主晝燧主夜間諜者使之間行以伺敵觀其變動也間古莧翻諜達協翻著直略翻桔吉屑翻槔音皋漉音鹿淅音析難乃旦翻伺相吏翻胸奴即入盜急入收保收畜産而自保也胸奴每入烽火謹輒入收保不戰如是數歲亦不亡失胸奴皆以為怯雖趙邊兵亦以為吾將怯將即亮翻趙王讓之讓責也王怒使他人代之歲餘屢出戰不利多失亡邊不得田畜説文畜許竹翻養也史記正義許又翻又音蓄聚也王復請李牧復扶又翻李牧杜門稱病不出王強起之杜門塞門以拒絶來者強其兩翻必欲用臣章十二行本作王必用臣四字乙十一行本同孔本同退齋校同如前乃敢奉令王許之李牧至邊如約胸奴數歲無所得終以為怯邊士日得賞賜而不用言屢賞而不用之以戰也於是乃具選車得千三百乘選騎得萬三千匹車騎皆選其堅良者乘繩證翻騎奇寄翻管子曰能禽敵殺將者賞百金將即亮翻彀古候翻張弓也索隱曰彀謂能射者也悉勒習戰大縱畜牧人民滿野胸奴小入佯北不勝以數十人委之委廾也委之於敵也佯音羊單于胸奴首領之稱班書曰單于者廣大之貌言其象天單于然也單音蟬稱尺證翻李牧多為奇陳陳讀曰陳張左右翼擊之大破之殺胸奴十餘萬騎滅襜襤如淳曰襜襤胡名在代地班書作淡林襜都甘翻襤路談翻類篇盧甘翻東胡其後為鮮卑烏丸服虔曰在胸奴東故曰東胡如淳以淡林為東胡以此觀之似是兩種降戶江翻十餘歲不敢近趙邊近其靳翻先是天下冠帶之國七而三國邊於戎狄先悉薦翻秦自隴以西有帛丿糸諸緄戎翟獂之戎班志綿諸道屬天水郡西漢之制縣有蠻夷曰道括地志帛丿糸諸城在秦州秦嶺縣北五十六里唐貞觀十七年省秦嶺入清水縣韋昭曰緄戎春秋以為犬戎師古曰混云夷也史記正義曰緄音昆字當作混余謂昆戎即周之昆夷翟與狄同班志隴西郡有狄道師古曰其地有狄種故曰狄道天水郡有獂道應劭曰獂戎邑也狄道晉置武始郡括地志獂道故城在渭州襄武縣東南三十七里獂戶官翻班志岐山在扶風美陽縣西北梁山在馮翊夏陽縣西北師古曰此漆水在新平後漢志扶風漆縣有漆水晉分扶風置新平郡治漆縣班志義渠道屬北地郡括地志唐寧慶二州地又班志馮翊臨晉縣古大荔城括地志同州馮翊縣及朝邑縣本漢臨晉地今朝邑縣東三十步故王城即大荔王城也宋白曰同州馮翊縣古大荔城在今州東三十七里朝邑縣界故王城是也荔力計翻班志安定郡有烏氏縣括地志烏氏故城在涇州安定縣東三十里周之故地後入戎秦惠王取之置烏氏縣氏音支班志北地郡有胊衍縣括地志鹽州古戎狄居之即胊衍戎之地應劭曰胊音煦師古音香于翻康求于翻非燕北有東胡山戎自漢北平無終白狼以北皆大山重谷諸戎居之春秋謂之山戎自有君長往往而聚者百有餘戎然莫能相一其後義渠築城郭以自守而秦稍蠶食之至惠王遂拔義渠二十五城昭王之時宣太后誘義渠王殺諸甘泉甘泉在漢馮翊雲陽縣漢起甘泉宮於此誘羊久翻滅之始於隴西北地上郡隴西唐渭州洮州河州之地北地唐慶州寧州鄜州靈州鹽州之地上郡唐延州綏州銀州之地趙武靈王北破林胡樓煩築長城自代並陰山下至高闕為塞徐廣曰五原郡西安陽縣北有陰山陰山在河南陽山在河北酈道元曰余按南河北河及安陽縣以南悉沙阜耳無他異山故廣志云朔方郡移沙七所而無山以擬之是議志之僻也陰山在河東南斯可矣漢郎中侯應曰陰山東西千餘里單于之苑囿也孝武出師攘之於漠北胸奴過之未嘗不哭則此山蓋在沙漠之南也括地志陰山在朔州北塞外突厥界杜佑曰今安北府北山是也安北府治中受降城地志朔方郡臨戎縣北有連山險於長城其山中斷兩峰俱峻名曰高闕水經注河水自窳渾縣東屈而東流徑高闕南闕口有城跨山結局謂之高闕戍劉昫曰高闕北拒大磧口三百里杜佑曰高闕當在豐州河西厥九勿翻降戶江翻窳以主翻渾戶昆翻磧七迹翻史記正義曰雲中故城趙雲中城秦雲中郡在勝州榆林縣東北四十里秦漢之鴈門代郡皆在句注陘之北唐之雲朔蔚新武州即其地也若唐之代州鴈門郡惟崞繁畤二縣漢鴈門郡之舊縣其鴈門縣則漢太原郡之廣武縣也五臺則漢太原之慮虒縣也句音鉤陘音刑蔚紆勿翻崞音郭畤音止師古曰慮虒音廬夷姓譜秦本顓頊後子嬰既滅支庶為秦氏余按左傳魯有秦堇父秦姓其來尚矣燕因肩翻將即亮翻質音致父音甫堇几隱翻歸而襲破東胡東胡卻千餘里燕亦築長城自造陽至襄平韋昭曰造陽地名在上谷余按漢書所謂上谷之斗造陽是也杜佑曰晉太康地志自北地郡北行九百里得五原塞又北出九百里得造陽即麟州銀城縣史記燕築長城自造陽至襄平韋昭曰造陽地在上谷未詳孰是史記正義曰上谷今媯州王隱地道志曰郡在谷之頭故以上谷名焉班志襄平縣遼東郡治所燕因肩翻媯居為翻漁陽唐薊州檀州北平唐平州遼東其地在大遼水之東唐嘗置遼州又嘗為安東都護府治所四年四年春蒙驁伐魏取畼有詭畼徐廣音場索隱音暢類篇又直亮翻仲郎翻三月軍罷四年秦質子歸自趙趙太子出歸國質音致四年七月蝗疫蝗子始生曰蝝翅成而飛曰蝗以食苗為災疫札瘥瘟也拜爵一級四年魏安釐王薨子景湣王立釐讀曰僖湣讀曰閔五年五年蒙驁伐魏取酸棗燕虛長平雍丘山陽等三章十二行本三作二乙十一行本同孔本同退齋校同十城驁五到翻括地志酸棗故城在滑州酸棗縣北十五里索隱曰燕虛二邑名春秋桓十二年會于虛赧王四十二年黃歇説秦王曰拔酸棗虛桃按今東郡燕縣東三十里有桃城虛蓋與桃相近括地志南燕城古燕國滑州胙城縣是也桃虛在濮州雷澤縣東十三里燕烏田翻虛如字班志長平縣屬汝南郡括地志在陳州宛丘縣西六十六里班志雍丘縣屬陳留郡故國也雍於用翻史記正義曰地理志河內郡有山陽縣余考之上下文此非河內之山陽蓋班志山陽郡之地初置東郡五年初劇辛在趙與龐暖善赧王三年劇辛自趙適燕劇竭戟翻暖音許遠翻又許元翻赧奴版翻燕王見趙數困於秦廉頗去而廉暖為將欲因其敝而攻之問於劇辛對曰龐暖易與耳數所角翻將即亮翻易弋豉翻燕王使劇辛將而伐趙趙龐暖禦之殺劇辛取燕師二萬五年諸侯患秦攻伐無已時以發明年合從伐秦事從子容翻六年六年楚趙魏韓衛合從以伐秦楚王為從長從子容翻長知兩翻春申君用事取壽陵徐廣曰壽陵在常山史記正義曰本趙邑也余據五國攻秦取壽陵至函谷則壽陵不在新安宜陽之間當在河東郡界常山無乃太遠秦師出五國之師皆敗走楚王以咎春申君春申君以此益疏觀津人朱英謂春申君曰史記正義曰觀音館今魏州觀城縣余按班志觀津縣屬信都國又按隋志魏州之觀城舊曰衛國開皇六年始更名信都國則隋冀州也開皇六年置武邑縣並得觀津縣地則觀津猶屬信都也正義誤矣觀古玩翻人皆以楚為強君用之而弱其於英不然先君時秦善楚二十年而不攻楚何也秦踰黽厄之塞而攻楚不便劉昭曰江夏郡鄳縣古冥厄之塞也史記正義曰黽厄之塞在申州張守節曰申州羅山縣本漢鄳縣平靖關蓋鄳縣之厄塞括地志曰石城山在申州羅山縣東南二十一里古冥厄塞黽音盲康彌兗切非也厄音厄又於賣翻背韓魏而攻楚不可背蒲妹翻今則不然魏旦暮亡不能愛許鄢陵鄢於幰翻魏割以與秦秦兵去陳百六十里臣之所觀者見秦楚之日鬬也楚於是去陳徙壽春命曰郢郢以井翻春申君就封於吳行相事相息亮翻六年秦拔魏朝歌朝歌紂都衛康叔所封也班志朝歌縣屬河內郡衛元君率其支屬徙居野王班志野王縣屬河內郡濮博不翻七年七年伐魏取汲七年夏太后薨即夏姬也夏戶雅翻薨呼肱翻七年蒙驁卒驁五到翻卒子恤翻八年八年魏與趙鄴八年韓桓惠王薨子安立九年九年伐魏取垣蒲蒲晉公子重耳所居也班志蒲子與垣縣皆屬河東郡括地志故垣城漢縣治本魏地王垣在絳州垣縣西北二十里蒲故城在隰州蒲縣北四十五里垣于元翻重直龍翻九年夏四月寒民有凍死者九年王宿雍雍於用翻九年己酉王冠冠古喚翻帶劍九年楊端和伐魏姓譜周宣王子尚父幽王邑諸楊號曰楊侯後並於晉因以為氏又晉大夫楊食我食采於楊氏子孫以邑為氏楊食音嗣采倉代翻史記正義曰衍氏在鄭州衍羊善翻九年初王即位年少少始照翻太后章十二行本作時乙十一行本同孔本同時與文信侯私通王益壯文信侯恐事覺禍及己乃詐以舍人嫪土母為宦者進於太后師古曰嫪居蚪翻許慎郎到翻康盧道切土母烏改翻太后幸之生二子封土母為長信侯以太原為土母國政事皆決於土母客求為土母舍人者甚衆王左右有與土母爭言者告土母實非宦者王下吏治土母下遐稼翻治直之翻土母懼矯王御璽發兵欲攻蘄年宮班志蘄年宮秦惠公所起在雍括地志在岐州城西故城內蘄巨依翻句斷相息亮翻戰咸陽斬首數百土母敗走獲之秋九月夷土母三族秦有夷三族之罪張晏曰三族父母兄弟妻子也如淳曰父族母族妻族也師古曰如説是所謂參夷之誅也舍人罪輕者徙蜀凡四千餘家遷太后於雍萯陽宮萯陽宮秦文王所見水經注甘水出南山甘谷北徑秦文王萯陽宮西又北徑五柞宮東又北徑甘亭西後漢志甘亭在扶風鄠縣萯音倍下令曰敢以太后事諫者戮而殺之斷其四支積於闕下死者二十七人斷丁管翻齊客茅焦上謁請諫姓譜周公之子封於茅其後以國為氏又有茅戎邾大夫有茅地茅夷鴻謁猶今之刺也上謁者通名而求見也上時掌翻若不見夫積闕下者邪若汝也夫音扶臣聞天有二十八宿二十八宿角亢氏房心尾箕斗牛女虛危室璧奎婁胃昂畢觜參井鬼柳星張翼軫天之經星也日月五星之行躔次所舍故謂之宿宿音秀亢音剛觜即移翻參疏簪翻臣之來固欲滿其數耳臣非畏死者也使者走入白之使疏吏翻茅焦邑子同食者盡負其衣物而逃邑子同邑之少年也是人也故來犯吾趣召鑊烹之趣讀曰促鑊胡郭翻吳人謂之鍋是安得積闕下哉王按劍而坐口正沫出沫莫曷翻涎也使者召之入茅焦徐行至前再拜謁起稱曰臣聞有生者不諱死有國者不諱亡諱死者不可以得生諱亡者不可以得存死生存亡聖主所欲急聞也陛下欲聞之乎蔡雍獨斷曰陛階陛也與天子言不敢指斥故稱陛下應劭曰陛者升堂之陛王者必有執兵陳於階陛㣥臣與至尊言不敢指斥故呼在陛下者以告之因卑以達尊之意若今稱殿下閣下之類斷丁亂翻何謂也茅焦曰陛下有狂悖之行悖蒲妹翻又蒲沒翻行下孟翻下同不自知邪邪音耶車裂假父謂嫪土母以囊盛其人撲而殺之撲弼角翻又普卜翻殘戮諫士桀紂之行不至於是矣今章十二行本今作令乙十一行本同令上有一空格孔本同退齋校同天下聞之盡瓦解無嚮秦者臣窮為陛下危之雍於用翻行下孟翻為于偽翻臣言已矣乃解衣伏質質與鑽同職日翻鐵椹也王下殿手自接之曰先生起就衣今願受事受事者受所教之事也王自駕虛左方往迎太后歸於咸陽復為母子如初九年楚考烈王無子春申君患之求婦人宜子者甚衆進之卒無子卒子恤翻趙人李園持其妹欲進諸楚王聞其不宜子恐久無寵乃求為春申君舍人已而謁歸謂謁告而歸也欲以發春申君之問也還從宣翻李園曰齊王使人求臣之妹與其使者飲故失期春申君曰聘入乎謂已入聘幣否也使疏吏翻未也春申君遂納之既而有娠娠音身李園使其妹説春申君曰楚王貴幸君雖兄弟不如也今君相楚二十餘年而王無子周赧王五十三年楚以春申君為相至是二十餘年説式芮翻相息亮翻人謂死後為百歲後君又安得常保此寵乎非徒然也言非但如此而已也用事久多失禮於王之兄弟兄弟立禍且及身矣今妾有娠而人莫知妾幸君未久誠以君之重進妾於王王必幸之妾賴天而有男則是君之子為王也楚國盡可得孰與身臨不測之禍哉春申君大然之乃出李園妹謹舍而言諸楚王謹舍者別為館舍以居之奉衛甚謹也幸之遂生男立為太子李園妹為王后李園亦貴用事而恐春申君泄其語陰養死士欲殺春申君以滅口國人頗有知之者楚王病朱英謂春申君曰世有無望之福亦有無望之禍史記正義曰無望者不望而忽至正義曰謂生死無常也處昌呂翻正義曰謂喜怒不節也正義曰謂吉凶忽為何謂無望之福曰君相楚二十餘年矣雖名相國其實王也相息亮翻王今病旦暮薨薨而君相幼主因而當國王長而反政不即遂南面稱孤長知兩翻不讀曰否此所謂無望之福也何謂無望之禍曰李園不治國而君之仇也左傳曰怨耦曰仇蓋取此義治直之翻王薨李園必先入據權而殺君以滅口此所謂無望之禍也薨呼肱翻何謂無望之人曰君置臣郎中班書百官表郎掌門戶出充車騎有議郎中郎侍郎郎中韓信曰吾事項王官不過郎中位不過執戟蓋戰國時置此官李園先入臣為君殺之此所謂無望之人也為于偽翻春申君曰足下置之李園弱人也僕又善之且何至此朱英知言不用懼而亡去後十七日楚王薨李園果先入伏死士於棘門之內史記正義曰棘門壽春城門名死士俠刺之俠讀曰夾蓋夾而刺之魏晉儀衛有俠轂隊亦曰夾轂隊刺七亦翻投其首於棘門之外於是使吏盡捕誅春申君之家太子立是為幽王揚子法言曰或問信陵平原孟嘗春申益乎曰上失其政姦臣竊國命何其益乎九年王以文信侯奉先王功大事見上卷周赧王五十八年十年十年冬十月文信侯免相出就國相息亮翻文信侯國於河南洛陽宗室大臣議曰諸侯人來仕者皆為其主遊間耳謂遊説以間秦之君臣為于偽翻間古莧翻於是大索逐客索山客翻客卿楚人李斯亦在逐中行且上書曰昔穆公求士西取由余於戎東得百里章十二行本里下有奚字乙十一行本同孔本同於宛迎蹇叔於宋求丕豹公孫支於晉上時掌翻史記戎王使由余使於秦穆公留由余而遺戎王以女樂戎王受而説之乃歸由余由余諫戎王而不聽穆公使人要之由余遂去戎降秦穆公用其謀伐戎並國十二開地千里晉獻公滅虞虜其大夫百里奚以媵於秦百里奚亡秦走宛穆公贖之於楚授以國政奚薦其友蹇叔穆公使人厚幣迎之以為上大夫晉惠公殺其大夫丕鄭其子豹奔秦穆公用之公孫支子桑也余使疏吏翻遺于季翻説讀為悅要一遙翻降戶江翻媵以證翻宛於元翻並國二十遂霸西戎孝公用商鞅之法諸侯親服至今治強惠王用張儀之計散六國之從使之事秦昭王得范睢強公室杜私門事並見前治直吏翻從子容翻睢息隨翻皆以客之功由此觀之客何負於秦哉夫色樂珠玉不産於秦而王服御者衆夫音扶色女色也取人則不然不問可否不論曲直非秦者去為客者逐是所重者在乎色樂珠玉而所輕者在乎人民也臣聞太山不讓土壤故能成其大河海不擇細流故能就其深王者不卻衆庶故能明其德此五帝三王之所以無敵也今乃棄黔首以資敵國秦謂民為黔首黔其廉翻黧黑也所謂藉寇兵章十二行本兵下有而字乙十一行本同孔本同齎盜糧者也藉慈夜翻假也借也齎子兮翻持遺也或為資義亦通王乃召李斯復其官除逐客之令李斯至驪邑而還班志京兆新豐縣秦之驪邑古驪戎國也驪山在其南漢高帝七年更名新豐驪呂支翻還從宣翻又音如字更工衡翻陰遣辨士齎金玉遊説諸侯諸侯名士可下以財者厚遺結之不肯者利劍刺之離其君臣之計然後使良將隨其後數年之中卒兼天下卒子恤翻遺于季翻刺七亦翻又七賜翻將即亮翻十一年十一年趙人伐燕取貍陽史記正義曰按燕無貍陽疑貍字誤當作漁陽故城在亶州密雲縣南十八里燕漁陽郡城也趙東界至瀛州則檀州在北趙攻燕取漁陽城也康從本字力之切余謂康音是戰國策燕昭王攻齊陽城及貍竊意貍即貍陽也其地當在齊燕境上燕因肩翻將軍王翦桓齮楊端和伐趙言伐燕之兵未罷而秦兵來伐也姓譜桓本自薑姓齊桓公後因諡為氏余按齊桓之前有周桓王魯桓公晉有桓莊之族而以姓桓者為祖齊桓亦不通矣齮丘奇翻又去倚翻諡神至翻取九城王翦攻閼與轑陽閼於曷翻與音預又音余徐廣曰轑音老在並州十三州志轑陽在上黨西北百八十里蓋唐樂平郡地今之遼州也據十三州志轑當音遼桓齮取鄴安陽鄴縣有安陽城曹魏置安陽縣屬魏郡十一年趙悼襄王薨薨呼肱翻子幽繆王遷立繆靡幼翻其母倡也倡音昌妓女也嬖於悼襄王嬖卑義翻又博計翻悼襄王廢嫡子嘉而立之遷素以無行聞於國為遷亡趙張本行下孟翻十一年文信侯就國歲餘諸侯賓客使者相望於道請之使疏吏翻王恐其為變乃賜文信侯書曰君何功於秦封君河南食十萬戶何親於秦號稱仲父其與家屬徙處蜀處昌呂翻恐誅十二年十二年文信侯飲鴆死鴆鳥出南方噉蝮蛇以其羽畫酒中飲之立死鴆直禁翻其舍人臨者皆逐遷之臨良鴆翻哭也且曰自今以來操國事不道如嫪土母不韋者籍其門視此操七刀翻嫪居蚪翻土母烏改翻揚子法言曰或問呂不韋其智矣乎以人易貨曰誰謂不韋智者歟以國易宗呂不韋之盜穿窬之雄乎穿穿壁窬穿牆窬音諭又音俞吾見擔石矣擔亦作儋齊人名小罌為儋音都濫翻石斗石也罌於耕翻未見雒陽也十二年自六月不雨至于八月十二年發四郡兵助魏伐楚發關東四郡兵也十三年十三年桓齮伐趙敗趙將扈輒於平陽齮丘奇翻又去倚翻敗補邁翻將即亮翻扈夏有扈氏之後音戶輒陟涉翻後漢志魏郡鄴縣有平陽城括地志平陽故城在相州臨漳縣西二十五里史記正義曰平陽戰國時屬韓後屬趙若據正義所云則以此平陽為河東之平陽非也當以後漢志括地志為正斬首十萬殺扈輒趙王以李牧為大將軍復戰於宜安肥下復扶又翻括地志宜安故城在常山藳城縣西南二十五里肥下即班志真定國之肥纍縣春秋肥子之國括地志肥纍故城在藳城縣西七里秦師敗績大崩曰敗績趙封李牧為武安君還從宣翻十四年十四年桓齮伐趙取宜安平陽武城後漢志魏郡鄴縣有武城史記正義曰即貝州武城縣外城是齮丘奇翻又去倚翻十四年韓王納地效璽請為藩臣使韓非來聘古者列國之於天子比年一小聘三年一大聘璽斯氏翻韓之諸公子也善刑名法術之學班志法家者流蓋出於理官信賞必罰以輔禮制鼂錯為申商刑名之學言人主不可不知術數張晏曰術數刑名之書也臣瓚曰術數謂法制治國之術也師古曰瓚説是也公孫弘曰亶殺生之力通雍塞之塗權輕重之數論得失之道使遠近情偽畢見於上謂之術與錯所言同法古法字鼂古朝字錯千故翻瓚藏旱翻塞悉則翻見賢遍翻數以書干韓王數所角翻王不能用於是韓非疾治國不務求人任賢治直之翻反舉浮淫之蠹而加之功實之上寬則寵名譽之人急則用介胄之士所養非所用所用非所養悲廉直不容於邪枉之臣觀往者得失之變作孤憤五蠹內外儲説林説難五十六篇十餘萬言自孤憤至説難皆韓非子篇名索隱曰孤憤者憤孤直不容於時也五蠹者蠹政之事有五也內外儲者韓非子有內外儲説篇內儲者言明君執術以制臣下制之在己故曰內也外儲者明君觀聽臣下之言行以斷其賞罰賞罰在彼故曰外也説林廣説諸事其多若林故曰説林也余謂説難者言遊説之難溫公揚子注説音稅難如字王聞其賢欲見之非為韓使於秦因上書説王曰為于偽翻使疏吏翻上時掌翻説式芮翻今秦地方數千里師名百萬號令賞罰天下不如臣昧死願望見大王言所以破天下從之計大王誠聽臣説一舉而天下之從不破從子容翻趙不舉韓不亡荊魏不臣齊燕不親霸王之名不成四鄰諸侯不朝燕因肩翻朝直遙翻大王斬臣以徇國以戒為王謀不忠者也王悅之未任用李斯嫉之曰韓非韓之諸公子也今欲並諸侯非終為韓不為秦此人情也為于偽翻今王不用久留而歸之此自遺患也不如以法誅之王以為然下吏治非李斯使人遺非藥令早自殺下遐稼翻治直之翻遺于季翻令力丁翻韓非欲自陳不得見王後悔使人赦之非已死矣揚子法言曰或問韓非作説難之書而卒死乎説難敢問何反也知説之難而卒死於説是何其所行與所言反也説式芮翻難如字卒子恤翻曰説難蓋其所以死乎曰何也君子以禮動以義止合則進否則退確乎不憂其不合也確堅也言自信之堅也則亦無所不至矣或曰非憂説之不合夫音扶此非指韓非子之名非邪此非是非之非邪音耶説不由道憂也由道而不合非憂也臣光曰臣聞君子親其親以及人之親愛其國以及人之國是以功大名美而享有百福也今非為秦畫謀而首欲覆其宗國謂欲亡韓罪固不容於死矣言死猶有餘罪也十五年十五年王大興師伐趙一軍抵鄴一軍抵太原取狼孟番吾遇李牧而還番音婆又音盤還從宣翻又音如字秦軍畏李牧不敢戰而還趙之所恃者李牧而卒殺之以速其亡十五年初燕太子丹嘗質於趙與王善王之父異人質於趙生王於邯鄲丹為質於秦質音致王不禮焉丹怒亡歸為丹遣荊軻刺秦王張本十六年十六年韓獻南陽地此漢南陽郡之地時秦楚韓分有之發卒受地於韓十六年魏人獻地十六年代地震自樂徐以西北至平陰史記正義曰樂徐在晉州平陰在汾州余謂上書代地震則樂徐平陰皆代地也烏得在晉汾二州界水經注徐水出代郡廣昌縣東南大嶺下東北流徑郎山入北平郡界意樂徐之地當在徐水左右又代郡平邑縣王莽曰平湖十三州志平湖城在高柳南百八十里水經注曰代郡道人縣城北有潭淵而不注俗謂之平湖平陰之地蓋在此湖之陰也樂意當音洛地坼東西百三十步毛晃曰四方而高曰臺垣子元翻坼斥格翻説文裂也十七年十七年內史勝滅韓史記本紀作內史騰班書百官表內史周官秦因之掌治京師余按秦內史兼治漢三輔之地始皇並天下置三十六郡內史其一也以其地置潁川郡韓至是而亡潁川郡韓地也韓自平陽徙都河南新鄭韓景侯又自新鄭徙都陽翟秦滅韓遂以陽翟縣為潁川郡治所十七年華陽太后薨華戶化翻十七年趙大飢十七年衛元君薨子角立十八年十八年王翦將上地兵下井陘史記正義曰上郡上縣今綏州是也余謂上地以其地在大河上遊凡上郡抵西河之地皆是也應劭曰井陘在常山郡井陘縣西唐謂之土門將即亮翻又音如字陘音刑端和即楊端和此逸楊字秦人多與趙王嬖臣郭開金嬖卑義翻又博計翻使毀牧及尚言其欲反趙王使趙蔥及齊將顏聚代之姓譜顏姓本自魯伯禽支庶有食采顏邑者因而著族又邾武公名夷字曰顏故公羊傳稱顏公後以為氏將即亮翻采倉代翻傳直戀翻趙人捕而殺之廢司馬尚十九年十九年王翦擊趙軍大破之殺趙蔥顏聚亡遂克邯鄲虜趙王遷趙至是亡邯鄲音寒丹故與母家有仇怨者皆殺之王母邯鄲美女也事見上卷周赧王五十八年怨於元翻從太原上郡歸還從宣翻又音如字十九年太后薨薨呼肱翻十九年王翦屯中山以臨燕中山春秋之鮮虞也戰國時為中山國趙滅之以其地為中山郡水經注曰城中有山故曰中山唐之定州即其地也燕因肩翻章十二行本無數字乙十一行本同百人奔代帥讀曰率自立為代王趙之亡大夫稍稍歸之與燕合兵軍上谷上谷燕地秦置上谷郡唐易州媯州之地括地志上谷郡故城在媯州懷戎縣東北百一十里媯居為翻十九年楚幽王薨國人立其弟郝郝音釋康曰呵各切三月郝庶兄負芻殺之自立十九年魏景湣王薨子假立湣與閔同十九年燕太子丹怨王怨王之不禮也以問其傅鞠武鞠居六翻姓也姓譜云后稷之孫生而有文在手曰鞠因以為氏余謂此傅會之説也鞠武請西約三晉南連齊楚北媾胸奴以圖秦太子曰太傅之計曠日彌久令人心惛然恐不能須也令力丁翻康曰惛音昏恐丘用切余謂然字句絶言鞠武之計迂遠使人悶然恐如字須待也頃之將軍樊於期得罪亡之燕姓譜周宣王封太王之子虞仲支孫仲山甫於樊後因氏焉舍如字館也夫以秦王之暴而積怒於燕足為寒心又況聞樊將軍之所在乎是謂委肉當餓虎之蹊也願太子疾遣樊將軍入胸奴太子曰樊將軍窮困於天下歸身於丹是固丹命卒之時也命卒謂命盡也丹言樊將軍以窮來歸當盡死以保匿舍藏之卒子恤翻鞠武曰夫行危以求安造禍以為福計淺而怨深連結一人之後交不顧國家之大害所謂資怨而助禍矣太子不聽太子聞衛人荊軻之賢楚國本曰荊此蓋楚未改國號之前受姓也謂軻曰今秦已虜韓王又舉兵南伐楚北臨趙趙不能支秦則禍必至於燕燕小弱數困於兵燕因肩翻數所角翻何足以當秦諸侯服秦莫敢合從丹之私計愚以為誠得天下之勇士使於秦從子容翻使疏吏翻劫秦王使悉反諸侯侵地若曹沫之與齊桓公則大善矣不可則章十二行本作則可下無則字乙十一行本同孔本同退齋校同因而刺殺之燕丹於禮致荊軻之初畫兩端之策荊軻守其初説所以事不成要之戰國之士皆祖曹沫之故智若藺相如會秦王毛遂結從於楚之類是也沫音末又讀曰劌刺七亦翻又七賜翻亶則君臣相疑以其間諸侯得合從其破秦必矣唯荊卿留意焉荊軻許之於是舍荊卿於上舍太子日造門下所以奉養荊軻無所不至間古莧翻造七到翻及王翦滅趙太子聞之懼欲遣荊軻行荊軻曰今行而無信則秦未可親也誠得樊將軍首與燕督亢之地圖後漢志涿郡方城縣有督亢亭劉向別録曰督亢膏腴之地史記正義曰督亢陂在幽州范陽縣東南十里今固安縣南有督亢陌幽州南界唐會要涿州新城縣太和六年置古督亢地也督都毒翻亢音剛康苦浪切秦王必説見臣説讀曰悅臣乃有以報太子曰樊將軍窮困來歸丹丹不忍也荊軻乃私見樊於期曰秦之遇將軍可謂深矣父母宗族皆為戮沒今聞購將軍首金千斤邑萬家將奈何於期太息流涕曰計將安出荊卿曰願得將軍之首以獻秦王秦王必喜而見臣臣左手把其袖右手揕其胸揕張鴆翻索隱曰揕謂以劍刺其胸也則將軍之仇報而燕見陵之愧除矣燕因肩翻樊於期曰此臣之日夜切齒腐心也索隱曰切齒相磨切也爾雅曰治骨曰切腐音輔腐亦爛也猶今人事不可忍云腐爛然皆奮怒之意太子聞之奔往伏哭然已無奈何遂以函盛其首刎扶粉翻盛時征翻太子豫求天下之利匕首使工以藥焠之焠忽潰翻索隱曰焠染也謂以毒藥染劍鍔也水與火合為焠以試人血濡縷人無不立死者言以匕首試人人血出才足以霑濡絲縷便立死也康曰血出如絲縷也濡人余翻縷龍主翻以燕勇士秦舞陽為之副使入秦齊思和標點顧頡剛聶崇岐覆校
