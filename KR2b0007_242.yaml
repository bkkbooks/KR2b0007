body:
  text: 資治通鑑卷第二百四十二端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀五十八穆宗睿聖文惠孝皇帝中長慶元年長慶元年辛丑八二一長慶元年秋七月甲辰韋雍出逢小將策馬衝其前導雍命曳下欲於街中杖之河朔軍士不貫受杖不服韋雍欲以柳公綽治京兆之體治幽燕然公綽行之則可肅清輦轂韋雍行之則召禍興戎所居之地不同也貫讀曰慣弘靖命軍虞候繫治之治直之翻是夕士卒連營呼譟作亂將校不能制遂入府舍掠弘靖貨財婦女囚弘靖於薊門館薊門館幽州驛館也考異曰舊傳作張宗厚今從實録塤許元翻都虞候劉操押牙張抱元明日軍士稍稍自悔悉詣館謝弘靖請改心事之凡三請弘靖不應軍士乃相謂曰相公無言是不赦吾曹軍中豈可一日無帥乃相與迎舊將朱洄奉以為留後帥所類翻將即亮翻洄克融之父也時以疾廢臥家自辭老病請使克融為之衆從之或問當亂軍相率詣館謝弘靖之時弘靖若能以任迪簡行於中山者行之可以弭亂乎曰否迪簡能與其下同甘苦弘靖驕貴簡默弘靖婦女為兵所掠僚佐為兵所殺使燕人果能改心以事弘靖亦徒建節帥空名於悍將凶卒之上耳悍凶憑陵無所不至祗重辱而已不殺徹罵曰汝何敢反行且族滅衆共殺之考異曰實録徹到職才數日軍人不之殺與弘靖同館處之後數日軍人恐徹與弘靖為謀將移之他所徹自疑就戮因抗聲大罵復遇害舊傳曰續有張徹者自遠使回軍人以其無過不欲加害將引置館中徹不知其心遂索弘靖所在大罵軍人亦為亂兵所殺韓愈徹墓志曰徹纍官至范陽府監察御史長慶二年今牛宰相為中丞奏君為御史其府惜不敢留遣之而密奏臣始至孤怯須強佐乃濟發半道有詔以君還之至數日軍亂怨其府從事盡殺之而囚其帥且相約張御史長者無庸殺置之帥所居月餘聞有中貴人自京師至君謂其帥公無負此土人上使至可因請見自辨幸得脫免歸即推門求出守者以告其魁魁與其徒皆駭曰張御史忠義必為其帥告此餘人不如遷之別館即以衆出君君出門罵衆曰汝何敢反前日吳元濟斬東市昨日李師道斬於軍中同惡者父母妻子皆屠死肉餧狗鼠鴟鴉汝何敢反行且罵衆畏惡其言不忍聞且虞生變即擊君以死君抵死口不絶罵衆皆曰義士義士或收瘞之以俟據舊傳徹以弘靖囚時被殺實録云後數日墓志云居月餘三書各不同按此月丁巳弘靖已貶官月餘則離幽州矣今從實録參以墓志余謂韓愈墓志能紀張徹所以罵賊之言實録及舊傳能原張徹所以罵賊之心若其月日則考異已有所去取矣長慶元年壬子㣥臣上尊號曰文武孝德皇帝赦天下長慶元年甲寅幽州監軍奏軍亂丁巳貶張弘靖為賓客分司貶為太子賓客分司東都也己未再貶吉州刺史考異曰舊傳貶撫州刺史按明年乃改撫州今從實録庚申以昭義節度使劉悟為盧龍節度使悟以朱克融方強奏請且授克融節鉞徐圖之乃復以悟為昭義節度使長慶元年辛酉太和公主發長安長慶元年初田弘正受詔鎮成德自以久與鎮人戰有父兄之仇憲宗之世田弘正兩出兵攻鎮冀因留以自衛奏請度支供其糧賜舊制諸鎮兵出境度支給其衣糧性剛褊無遠慮倰力曾翻以為魏鎮各自有兵恐開事例不肯給弘正四上表不報不得已遣魏兵歸考異曰舊弘正傳云七月歸卒於魏州王庭湊傳云六月魏兵還鎮崔倰傳曰遣魏卒還鎮不數日而鎮州亂今從之沔之孫也崔沔開元初名臣弘正厚於骨肉兄弟子姪在兩都者數十人競為侈靡弘正兄弟子姪皆仕於朝分居東西兩都弘正輦魏鎮之貨以供之相屬於道屬之欲翻河北將士頗不平詔以錢百萬緡賜成德軍度支輦運不時至軍士益不悅都知兵馬使王庭湊本回鶻阿布思之種也廷湊曾祖五哥之驍果善鬬王武俊養以為子故冒姓王氏阿布思者天寶中以反誅種章勇翻悍下罕翻又侯旰翻潛謀作亂每抉其細故以激怒之抉一決翻挑也尚以魏兵故不敢發及魏兵去壬戌夜庭湊結牙兵譟於府署殺弘正及僚佐元從將吏並家屬三百餘人從才用翻下再從同廷湊自稱留後逼監軍宋惟澄奏求節鉞八月癸巳嚴癸改己惟澄以聞朝廷震駭崔倰於崔植為再從兄故時人莫敢言其罪初朝廷易置魏鎮帥臣左金吾將軍楊元卿上言以為非便又詣宰相深陳利害及鎮州亂上賜元卿白玉帶辛未以元卿為涇原節度使楊元卿以言驗受賞然無救於鎮州之亂者古之明君不徒賞言者而已其言可行必先從而行之瀛莫將士家屬多在幽州壬申莫州都虞候張良佐潛引朱克融兵入城刺史吳暉不知所在莫州北接幽薊故先陷癸酉王庭湊遣人殺冀州刺史王進岌分兵據其州魏博節度使李訴聞田弘正遇害素服令將士曰魏人所以得通聖化至今安寧富樂者樂音洛田公之力也今鎮人不道輒敢害之是輕魏以為無人也諸君受田公恩宜如何報之衆皆慟哭深州刺史牛元翼成德良將也訴使以寶劍玉帶遺之遺唯季翻曰昔吾先人以此劍立大勳謂平朱泚也今以授公努力翦庭湊元翼以劍帶徇于軍報曰願盡死訴將出兵會疾作不果元翼趙州人也乙亥起復前涇原節度使田布為魏博節度使令乘驛之鎮布固辭不獲與妻子賓客訣曰吾不還矣悉屏去旌節導從而行屏必郢翻又卑正翻從才用翻未至魏州三十里被髮徒跣號哭而入居于堊室被皮義翻號戶刀翻堊遏各翻白埴也按間傳父母之喪居倚廬齊衰之喪居堊室孔穎達正義曰斬衰居倚廬齊衰居堊室論其正耳亦有斬衰不居倚廬者則雜記云大夫居倚廬士居堊室是士服斬衰而居堊室田布父為鎮人所殺寢苫枕戈之時也今居堊室蓋用士禮也月俸千緡一無所取賣舊産得錢十餘萬緡皆以頒士卒舊將老者兄事之以田布所為宜可以得魏卒之心而卒不濟者人心已搖而布之威略不振也丙子瀛州軍亂執觀察使盧士玫及監軍僚佐送幽州囚於客館王庭湊遣其將王立攻深州不克丁丑詔魏博橫海昭義河東義武諸軍各出兵臨成德之境若王庭湊執迷不復宜即進討成德大將王儉嚴儉改位等五人謀殺王庭湊事泄並部兵三千人皆死己卯以深州刺史牛元翼為深冀節度使深州南至冀州八十五里丁亥以殿中侍御史溫造為起居舍人充鎮州四面諸軍宣慰使歷澤潞河東魏博橫海深冀易定等道諭以軍期造大雅之五世孫也高祖起兵溫大雅掌書翰己丑以裴度為幽鎮兩道招撫使癸巳王庭湊引幽州兵圍深州長慶元年九月乙巳相州軍亂殺刺史邢濋濋音楚長慶元年吐蕃遣其禮部尚書論納羅來求盟庚戌以大理卿劉元鼎為吐蕃會盟使長慶元年壬子朱克融焚掠易州淶水遂城滿城淶水漢涿郡遒縣地隋開皇元年以范陽為道更置范陽縣於此地六年改范陽曰固安八年廢十年又置永陽縣十八年又改為淶水周官職方其浸淶易蓋因淶水以名縣也淶音來遂城漢北新城縣地屬中山國後魏置南營州於其地置五郡十都後省併為昌黎一郡領永樂新昌二縣隋廢郡因舊有武遂縣置遂城縣唐屬易州宋以遂城縣置威虜軍金以縣置遂州以滿城縣屬保州長慶元年自定兩稅以來定兩稅見二百二十六卷德宗建中元年物日輕民所輸三倍其初詔百官議革其弊戶部尚書楊於陵以為錢者所以權百貨貿遷有無所宜流散貿音茂流散謂錢流布於天下不應蓄聚今稅百姓錢藏之公府又開元中天下鑄錢七十餘爐歲入百萬新志云天寶末天下爐九十九絳州三十揚潤宣鄂蔚皆十益郴皆五洋州三定州一蓋天寶末又加多於開元矣歲入十五萬又積於商賈之室賈音古及流入四夷又大曆以前淄青太原魏博貿易雜用鉛鐵嶺南雜用金銀丹砂象齒今一用錢如此則錢焉得不重物焉得不輕焉於虔翻今宜使天下輸稅課者皆用穀帛廣鑄錢而禁滯積積子賜翻及出塞者錢出邊關則流入於夷狄朝廷從之始令兩稅皆輸布絲纊獨鹽酒課用錢長慶元年冬十月丙寅以鹽鐵轉運使刑部尚書王播為中書侍郎同平章事使職如故播為相專以承迎為事未嘗言國家安危長慶元年以裴度為鎮州四面行營都招討使左領軍大將軍杜叔良以善事權幸得進時幽鎮兵勢方盛諸道兵未敢進上欲功速成宦官薦叔良以為深州諸道行營節度使為杜叔良喪師張本長慶元年癸酉命宰相及大臣凡十七人與吐蕃論訥羅盟于城西遣劉元鼎與訥羅入吐蕃亦與其宰相以下盟吐蕃國有大相副相史因亦以宰相書之長慶元年乙亥以沂州刺史王智興為武寧節度副使先是副使皆以文吏為之先悉薦翻上聞智興有勇略欲用之於河北故以是寵之為王智興逐其帥崔㣥張本長慶元年丁丑裴度自將兵出承天軍故關以討王庭湊承天軍當在遼州界故關即娘子關也宋朝廢遼州以平城和順二縣為鎮以並州之樂平平定二縣為平定軍二鎮屬焉以承天軍為寨屬平定縣平定唐之廣陽縣也按沈存中筆談鎮州通河東有兩路飛狐路在大茂山之西大茂山恆山之岑也自銀冶寨北出倒馬關卻自石門子令水鋪入瓶形梅回兩寨之間至代州自石晉割地與契丹以大茂山分脊為界此路已不通惟北寨西出承天關路可至河東然路極峭峽宋白曰承天軍太原東鄙土門路所衝也長慶元年朱克融遣兵寇蔚州媯州西南至蔚州二百四十里蔚紆勿翻長慶元年戊寅王庭湊遣兵寇蔚章十二行本蔚作貝乙十一行本同孔本同退齋校同熊校同州長慶元年己卯易州刺史柳公濟敗幽州兵於白石嶺敗補邁翻殺千餘人長慶元年庚辰橫海軍節度使烏重胤奏敗成德兵於饒陽長慶元年辛巳魏博節度使田布將全軍三萬人討王庭湊屯於南宮之南拔其二柵長慶元年翰林學士元稹與知樞密魏弘簡深相結求為宰相由是有寵於上每事咨訪焉元稹交結大閹喪其素守憲宗之過也稹止忍翻但以度先達重望恐其復有功大用復扶又翻妨己進取故度所奏畫軍事多與弘簡從中沮壞之度乃上表極陳其朋比姦蠹之狀沮在呂翻壞音怪比毗至翻以為逆豎搆亂震驚山東逆豎指王庭湊等撓敗國政姦臣指元稹等撓奴教翻敗補邁翻屈也先宜肅清朝廷何者為患有大小議事有先後河朔逆賊祗亂山東禁闈姦臣必亂天下是則河朔患小禁闈患大小者臣與諸將必能翦滅大者非陛下覺寤制斷無以驅除斷丁亂翻今文武百寮中外萬品有心者無不憤忿憤悶也忿怒也直以獎用方深不敢抵觸恐事未行而禍已及不為國計且為身謀臣自兵興以來所陳章疏事皆要切所奉書詔多有參差參楚簪翻差楚宜翻參差不齊也蒙陛下委付之意不輕遭姦臣抑損之事不少臣素與佞幸亦無讎嫌正以臣前請乘傳詣闕面陳軍事傳株戀翻乘傳乘驛馬也姦臣最所畏憚恐臣發其過百計止臣臣又請與諸軍齊進隨便攻討姦臣恐臣或有成功曲加阻礙逗遛日時進退皆受羈牽羈馬絡頭也牽牛紖也諭以馬牛動為人所制塞悉則翻但欲令臣失所使臣無成則天下理亂山東勝負悉不顧矣為臣事君一至於此若朝中姦臣盡去則河朔逆賊不討自平若朝中姦臣尚存則逆賊縱平無益陛下儻未信臣言乞出臣表使百官集議彼不受責臣當伏辜表三上上時掌翻上雖不悅以度大臣不得已癸未以弘簡為弓箭庫使稹為工部侍郎稹雖解翰林恩遇如故為相稹及于方事張本長慶元年宿州刺史李直臣坐贓當死宦官受其賂為之請為于偽翻御史中丞牛僧孺固請誅之上曰直臣有才可惜僧孺對曰彼不才者無過溫衣飽食以足妻子安足慮本設法令所以擒制有才之人安祿山朱泚皆才過於人法不能制者也上從之長慶元年橫海節度使烏重胤將全軍救深州時王庭湊圍牛元翼於深州橫海當鎮州之東幽州之南知賊未可破按兵觀釁上怒章十二行本怒下有丙戌二字乙十一行本同以杜叔良為橫海節度使徙重胤為山南西道節度使長慶元年靈武節度使李進誠奏敗吐蕃三千騎於大石山下敗補邁翻大石山在魯州東南魯州六胡州之一也在靈夏西河曲之地長慶元年十一月辛酉淄青節度使薛平奏突將馬廷崟作亂伏誅崟魚音翻時幽鎮兵攻棣州平遣大將李叔佐將兵救之刺史王稷供饋稍薄軍士怨怒宵潰推廷崟為主行且收兵至七千餘人徑逼青州城中兵少不敵平悉發府庫及家財召募得精兵二千人逆戰大破之斬廷崟其黨死者數千人考異曰河南記曰韓國公之節制青州也長慶元年詔徵數道兵馬且問罪於常山平盧發二千餘人駐于無棣臨當回戈青州所駐兵部內隊長有馬士端者殺其首領遂驅所部士卒兼招召迫脅比到博昌已萬餘人便謀入青州有日矣韓公聞之便議除討大將等進計曰彼賊者凶頑一卒無經遠之謀可令紿以尚書已赴闕庭三軍將吏皆延頸以待留後賊必信之懈然無備可伏甲而虜之韓公大然其策於是賊心不復疑二翌日引兵而來遂於城北三十餘里三面伏兵賊衆果陷於我圍信旗一麾步騎雲合賊衆驚擾不知所為悉皆降伏遂令投戈釋甲驅入青州矯令還家待以不死遂條其數目明立簿書三千二千各屯一處霜刀齊發蟻衆湯消二萬餘人同命一日賊帥馬士端潰圍奔走尋於鄒平渡口追獲磔於城北於是具列其狀以上聞旋除左僕射據實録作馬廷崟舊傳作馬狼兒河南記作馬士端今名從實録事從舊傳明年二月平加僕射舊傳云封魏國公河南記作韓公恐誤長慶元年橫海節度使杜叔良將諸道兵與鎮人戰遇敵輒北鎮人知其無勇常先犯之十二月庚午監軍謝良通奏叔良大敗於博野博野漢涿郡蠡吾縣之地後漢分置博陵縣後魏改為博野唐屬深州宋為永寧軍治所宋白曰雍熙四年於博野縣置寧邊軍叔良脫身還營喪其旌節喪息浪翻長慶元年丁丑義武節度使陳楚奏敗朱克融兵於望都及北平望都漢縣屬中山郡張晏曰都山在縣南堯母慶都所居堯山在縣北登堯山望見都山故以望都為名北齊併望都入北平唐武德四年復置望都縣屬定州九域志縣在州東北六十里北平亦漢古縣唐屬定州九域志在州北九十里宋白曰定州北平縣漢曲逆縣地後漢改蒲陰後魏孝昌中於今縣東北二十里置北平郡於北平城唐為北平縣按漢志北平縣屬中山國敗補邁翻長慶元年戊寅以鳳翔節度使李光顏為忠武節度使兼深州行營節度使代杜叔良長慶元年自憲宗征伐四方國用已虛上即位賞賜左右及宿衛諸軍無節及幽鎮用兵久無功府藏空竭勢不能支藏徂浪翻支持也當也執政乃議王庭湊殺田弘正而朱克融全張弘靖罪有重輕請赦克融專討庭湊上從之乙酉以朱克融為平盧節度使平盧當作盧龍長慶元年戊子義武奏破莫州清源等三柵斬獲千餘人柵側革翻二年長慶二年春正月丁酉幽州兵陷弓高先是弓高守備甚嚴弓高縣宋朝為永靜軍地先悉薦翻守將不內旦乃得入中使大詬怒詬許候翻又古候翻賊諜知之諜達協翻他日偽遣人為中使投夜至城下守將遽內之賊衆隨之遂陷弓高史言唐宦者陵轢守禦捍敵之臣使之失守中書舍人白居易上言以為自幽鎮逆命朝廷徵諸道兵計十七八萬考異曰白集作七八十萬計無此數恐是十七八萬誤耳已踰半年王師無功賊勢猶盛弓高既陷糧道不通下博深州飢窮日急深州西南皆逼於王庭湊惟恃弓高以通橫海之餫弓高既陷糧道遂梗九域志弓高東至滄州一百二十里西北至深州二百里其心不齊莫肯率先遞相顧望又朝廷賞罰近日不行未立功者或已拜官已敗衄者不聞得罪衄女六翻既無懲勸以至遷延若不改張改張猶更張也董仲舒曰譬如琴瑟不調必改絃而更張之乃可鼓也請令李光顏將諸道徑兵約三四萬人從東速進開弓高糧路章十二行本路下有合下博諸軍五字乙十一行本同退齋校同解深邢重圍深邢當作深州重直龍翻令裴度將太原全軍兼招討舊職西面壓境壓鎮州之境若乘虛得便即令同力翦除若戰勝賊窮亦許受降納款降戶江翻如此則夾攻以分其力招諭以動其心必未及誅夷自生變故謂賊之麾下將有誅逆而效順者其餘不可用者悉遣歸本道自守土疆蓋兵多而不精豈唯虛費衣糧兼恐撓敗軍陳故也撓奴巧翻敗補邁翻陳讀曰陳今既祗留東西二帥謂令裴度居西李光顏居東諸道監軍一時停罷如此則衆齊令一必有成功又朝廷本用田布令報父讎令報王庭湊殺弘正之讎供給度支言仰供給於度支都不進討非田布固欲如此抑有其由聞魏博一軍屢經優賞自田弘正舉魏博一軍歸朝其後代伐平蔡平鄆朝廷犒賞優厚兵驕將富莫肯為用況其軍一月之費計實錢二十八萬緡若更遷延將何供給此尤宜早令退軍者也若兩道止共留兵六萬所費無多兩道謂河東橫海易以豉翻自然豐足今事宜日急其間變故遠不可知苟兵數不抽軍費不減食既不足衆何以安不安之中何事不有況有司迫於供軍百端斂率不許即用度交闕盡許則人心無憀指言將有建中之禍而微其辭憀落蕭翻無憀賴也伏乞聖慮察而念之疏奏不省白居易之論事李絳之流亞歟顧憲穆有用不用耳省悉景翻己亥度支饋滄州糧車六百乘至下博盡為成德軍所掠時諸軍匱乏供軍院所運衣糧往往不得至院此時供軍院置於行營者謂之北供軍院度支自南供軍院運以給之乘繩證翻其懸軍深入者皆凍餒無所得初田布從其父弘正在魏善視牙將史憲誠屢稱薦至右職及為節度使遂寄以腹心以為先鋒兵馬使軍中精鋭悉以委之憲誠之先奚人也世為魏將魏與幽鎮本相表裏及幽鎮叛魏人固搖心布以魏兵討鎮軍于南宮上屢遣中使督戰而將士驕惰無鬬志又屬大雪屬之欲翻度支饋運不繼布發六州租賦以供軍魏博貝衛澶相六州也曰故事軍出境皆給朝廷言仰給於朝廷也雖尚書瘠己肥國六州之人何罪乎憲誠陰蓄異志因衆心不悅離間鼓扇之以衆情諭火火本有熾烈之性鼓鞴以吹之搖扇以扇之則愈熾烈矣間古莧翻使救深州庚子布軍大潰多歸憲誠布獨與中軍八千人還魏壬寅至魏州癸卯布復召諸將議出兵復扶又翻諸將益偃蹇曰尚書能行河朔舊事則死生以之謂行田承嗣李寶臣之事也則不能也布無如之何歎曰功不成矣即日作遺表具其狀略曰臣觀衆意終負國恩臣既無功敢忘即死即就也不然者忠臣義士皆為河朔屠害矣奉表號哭號戶刀翻拜授幕僚李石乃入啓父靈孝子之喪其親也設几筵朝夕具盥洗上飲食事之如生俗謂之靈筵上以謝君父下以示三軍遂刺心而死刺七亦翻憲誠聞布已死乃諭其衆遵河北故事衆悅擁憲誠還魏奉為留後戊申魏州奏布自殺己酉以憲誠為魏博節度使憲誠雖喜得旄鉞外奉朝廷然內實與幽鎮連結長慶二年庚戌以德州刺史王日簡為橫海節度使日簡本成德牙將也壬子貶杜叔良為歸州刺史王庭湊圍牛元翼於深州官軍三面救之裴度以河東軍臨其西李光顏以橫海諸軍營其東陳楚以易定軍逼其北是三面救之雖李光顏亦閉壁自守而已軍士自采薪芻日給不過陳米一勺陳舊也經年之米為陳米勺職略翻又時灼翻周禮梓人為飲器勺一升按一升之勺乃飲器也非以量米凡量十勺為合十合為升十升為斗以量言之則一人日給一勺之陳米有餒死而已作史者蓋極言其匱乏猶武成血流漂杵之語朝廷不得已二月甲子以庭湊為成德節度使軍中將士官爵皆復其舊以兵部侍郎韓愈為宣慰使上之初即位也兩河略定蕭俯段文昌以為天下已太平漸宜消兵請密詔天下軍鎮有兵處每歲百人之中限八人逃死或以逃或以死除其籍俯音免不以國事為意遂可其奏軍士落籍者衆皆聚山澤為盜及朱克融王庭湊作亂一呼而亡卒皆集呼火故翻詔徵諸道兵討之諸道兵既少少詩沼翻皆臨時召募烏合之衆又諸節度既有監軍其領偏軍者亦置中使監陳監古銜翻陳讀曰陳主將不得專號令戰小勝則飛驛奏捷自以為功不勝則迫脅主將以罪歸之悉擇軍中驍勇以自衛遣羸懦者就戰故每戰多敗又凡用兵舉動皆自禁中授以方略朝令夕改不知所從不度可否度徒洛翻惟督令速戰中使道路如織驛馬不足掠行人馬以繼之人不敢由驛路行取間道而行由驛路則馬為所掠故也裴度元臣宿望烏重胤李光顏皆當時名將討幽鎮萬餘之衆屯守踰年竟無成功財竭力盡崔植杜元穎為章十二行本為上有王播二字乙十一行本同相皆庸才無遠略史憲誠既逼殺田布朝廷不能討遂並朱克融王庭湊以節授之由是再失河朔迄于唐亡不能復取史極言唐再失河朔之由若以三叛得節之時言之須有先後復扶又翻朱克融既得旌節乃出張弘靖及盧士玫去年七月朱克融囚張弘靖八月囚盧士玫丙寅以牛元翼為山南東道節度使以左神策行營樂壽鎮兵馬使清河傅良弼為沂州刺史樂壽鎮即置於深州樂壽縣樂音洛良弼寰所戍在幽鎮之間朱克融王庭湊互加誘脅良弼寰不從各以其衆堅壁賊竟不能取故賞之誘音酉長慶二年丙子賜橫海節度使王日簡姓名為李全略長慶二年辛巳中書侍郎同平章事崔植罷為刑部尚書以工部侍郎元稹同平章事考異曰實録以御史中丞牛僧孺為戶部侍郎翰林學士李德裕為御史中丞舊李德裕傳元和初用兵伐叛始於杜黃裳誅蜀吉甫經畫欲定兩河方欲出師而卒繼之元衡裴度而韋貫之李逢吉沮議深以用兵為非而韋李相次罷相故逢吉常怒吉甫裴度而德裕於元和時久之不調逢吉僧孺宗閔以私怨恆排擯之時德裕與李紳元稹俱在翰林以學識才名相類情頗款密逢吉之黨深惡之其月自學士出為御史中丞按德裕元和中揚歷清要非為不調此際元稹入相逢吉在淮南豈能排擯德裕蓋出於德裕黨人之語耳今不取長慶二年癸未加李光顏橫海節度滄景觀察使其忠武深州行營節度如故以橫海節度使李全略為德棣節度使時朝廷以光顏懸軍深入饋運難通故割滄景以隸之王庭湊雖受旌節不解深州之圍丙戌以知制誥東陽馮宿為山南東道節度副使權知留後垂拱二年分烏傷縣置東陽縣取舊郡名以名縣也屬婺州九域志在州東一百五十五里裴度亦與幽鎮書責以大義朱克融即解圍去王庭湊雖引兵少退猶守之不去元稹怨裴度欲解其兵柄故勸上雪廷湊而罷兵丁亥以度為司空東都留守平章事如故考異曰舊紀傳皆云度守司徒為東都留守實録此云司徒後領淮南及拜相皆云司空新書度自檢校司空為守司空東都留守及領淮南乃為司徒蓋實録此月誤紀傳遂因之新傳後云司徒亦誤今據實録除淮南及拜相制書自此至罷相止是守司空舊裴度傳又曰元稹為相請上罷兵洗雪廷湊克融解深州之圍蓋欲罷度兵柄故也按此月甲子雪廷湊辛巳稹為相蓋稹未為相時勸上也時未偃兵度有將相全才不宜置之散地散蘇但翻上乃命度入朝然後赴東都以靈武節度使李聽為河東節度使初聽為羽林將軍有良馬上為太子遣左右諷求之聽以職總親軍不敢獻及河東缺帥帥所類翻上曰李聽不與朕馬是必可任遂用之長慶二年昭義監軍劉承偕恃恩憲宗之崩也劉承偕預有援立穆宗之功故恃恩轢郎狄翻數衆辱之數所角翻衆辱者於衆中慢辱之也又縱其下亂法陰與磁州刺史張汶謀縛悟送闕下以汶代之悟知之諷其軍士作亂殺汶圍承偕欲殺之汶音問幕僚賈直言入責悟曰公所為如是欲效李司空邪此軍中安知無如公者李師道為司空賈直言舊僚屬也故猶稱其官言李師道悖逆劉悟倒戈取師道而得節鉞今悟效師道所為昭義軍中亦將有效悟所為而取節鉞者得無笑公於地下乎悟遂謝直言救免承偕囚之府舍考異曰實録監軍劉承偕頗恃恩侵權嘗對衆辱悟又縱其下亂法悟不能平異日有中使至承偕宴之請悟悟欲往左右皆曰往則必為其困辱矣軍衆因亂悟不止之遂擒承偕殺其二傔欲並害承偕悟救之獲免新劉悟傳曰承偕與都將張問謀縛悟送京師以問代節度事悟知之以兵圍監軍殺小使其屬賈直言質責悟悟即撝兵退匿承偕囚之新直言傳張問作張汶杜牧上李司徒書亦云其軍大亂殺磁州刺史張汶又云汶既因依承偕謀殺悟自取軍人忌怒遂至大亂蓋軍士圍承偕必出於悟志及奏朝廷則云軍衆所為耳今承偕名從實録汶名從杜書長慶二年初上在東宮聞天下厭苦憲宗用兵故即位務優假將卒以求姑息三月壬辰章十二行本辰下有朔字乙十一行本同詔神策六軍使及南牙常參武官南牙常參武官十六衛上將軍大將軍將軍也牒送中書量加獎擢由者得官之由歷者所歷職任量音良悉奏聞與除官應天下諸軍各委本道據守舊額不得輒有減省於是商賈胥吏賈音古爭賂藩鎮牒補列將而薦之即升朝籍朝直遙翻唐末藩鎮列將帶朝銜者著之朝籍奏章委積士大夫皆扼腕歎息腕烏貫翻長慶二年武寧節度副使王智興將軍中精兵三千討幽鎮節度使崔㣥忌之奏請即用智興為節度使不則召詣闕除以他官不讀曰否事未報智興亦自疑會有詔赦王庭湊諸道皆罷兵智興引兵先期入境㣥懼遣使迎勞先悉薦翻勞力到翻且使軍士釋甲而入智興不從乙巳引兵直進徐人開門待之智興殺不同己者十餘人乃入府牙見㣥及監軍見賢遍翻拜伏曰軍衆之情不可如何為㣥及判官從吏具人馬及治裝為于偽翻從才用翻下同治直之翻皆素所辦也遣兵衛從㣥至甬橋而返甬余隴翻考異曰實録㣥纍表請追智興授以他官事未行詔班師智興帥衆斬關而入舊智興傳亦同舊㣥傳則曰㣥以智興早得士心表請因授智興旄鉞寢不報智興回戈城內皆是父兄開關延入今兼取之遂掠鹽鐵院錢帛甬橋有鹽鐵院謂諸道進奉船在汴河中者皆三分取二史言唐下陵上慢無復紀綱長慶二年丙午加朱克融王庭湊檢校工部尚書上聞其解深州之圍故褒之然庭湊之兵實猶在深州城下韓愈既行衆皆危之詔愈至境更觀事勢勿遽入愈曰止君之仁死臣之義言止之勿使遽入鎮者君之仁不畏死而徑往致命者臣之義也庭湊拔刃弦弓以逆之及館甲士羅於庭庭湊言曰所以紛紛者乃此曹所為非庭湊心愈厲聲曰天子以尚書有將帥材故賜之節鉞不知尚書乃不能與健兒語邪甲士前曰先太師為國擊走朱滔王武俊贈太師擊走朱滔見二百三十二卷德宗興元元年為于偽翻此軍何負朝廷乃以為賊乎愈曰汝曹尚能記先太師則善矣夫逆順之為禍福豈遠邪自祿山思明以來至元濟師道其子孫有今尚存仕宦者乎田令公以魏博歸朝廷子孫雖在孩提皆為美官田弘正之徙成德也進兼中書令子孫為美官見上卷憲宗元和十四年弱冠為節度使見上卷元和十五年冠古玩翻今皆為節度使汝曹亦聞之乎庭湊恐衆心動麾之使出恐其衆聞愈言而心動有如劉悟李祐者侍郎來韓愈時為兵部侍郎故稱之愈曰神策六軍之將如牛元翼者不少少詩沼翻但朝廷顧大體不可棄之耳尚書何為圍之不置庭湊曰即當出之因與愈宴禮而歸之未幾牛元翼將十騎突圍出幾居豈翻深州大將臧平等舉城降庭湊責其久堅守殺平等將吏百八十餘人長慶二年戊申裴度至長安見上謝討賊無功先是上詔劉悟送劉承偕詣京師悟託以軍情不時奉詔上問度宜如何處置處昌呂翻下同度對曰承偕在昭義驕縱不法臣盡知之悟在行營謂討王承宗在行營時具論其事時有中使趙弘亮在軍中持悟書去云欲自奏之不知嘗奏不奏不讀曰否上曰朕殊不知也且悟大臣何不自奏對曰悟武臣不知事體然今事狀籍籍如此顏師古曰籍籍猶紛紛也陛下猶不能決況悟當日單辭豈能動聖聽哉單辭一人之言前事勿論直言此時如何處置對曰陛下必欲收天下心止應下半紙詔書具陳承偕驕縱之罪令悟集將士斬之則藩鎮之臣孰不思為陛下效死為于偽翻非獨悟也上俯首良久曰俯音免朕不惜承偕然太后以為養子今茲囚縶太后尚未知之況殺之乎卿更思其次度乃與王播等奏請流承偕於遠州必得出言既明底其罪則悟必釋承偕後月餘悟乃釋承偕長慶二年李光顏所將兵聞當留滄景皆大呼西走呼火故翻西走欲歸許州光顏不能制因驚懼成疾己酉上表固辭橫海節乞歸許州許之李光顏本忠武節度使許州忠武軍治所考異曰舊光顏傳曰光顏以朝廷制置乖方賊帥連結未可朝夕平定事若差跌即前功盡棄乃懇辭兼鎮尋以疾作表祈歸鎮朝廷果以討賊無功而赦庭湊今從實録長慶二年壬子以裴度為淮南節度使餘如故餘官如故也長慶二年加劉悟檢校司徒餘如故自是悟浸驕欲效河北三鎮魏鎮幽為河北三鎮不逞者欲為非而不得逞志者也長慶二年裴度之討幽鎮也回鶻請以兵從從才用翻朝議以為不可遣中使止之回鶻遣其臣李義節將三千人已至豐州北卻之不從詔發繒帛七萬匹以賜之甲寅始還還音旋又如字長慶二年王智興遣輕兵二千襲濠州丙辰刺史侯弘度棄城奔壽州長慶二年言事者皆謂裴度不宜出外上亦自重之戊午制留度輔政以中書侍郎同平章事王播同平章事代度鎮淮南仍兼諸道鹽鐵轉運使長慶二年李寰帥其衆三千出博野帥讀曰率王庭湊遣兵追之寰與戰殺三百餘人庭湊兵乃還餘衆二千猶固守博野長慶二年朝廷以新罷兵力不能討徐州己未以王智興為武寧節度使長慶二年復以德棣節度使李全略為橫海節度使李光顏既還許州故全略復鎮橫海長慶二年夏四月辛酉朔日有食之長慶二年甲戌以傅良弼李寰為神策都知兵馬使長慶二年戶部侍郎判度支張平叔上言官自糶鹽糶他弔翻可以獲利一倍又請令所由將鹽就村糶易所由綰掌官物之吏也事必經由其手故謂之所由令宰相領鹽鐵使又請以糶鹽多少為刺史縣令殿最殿丁練翻又乞檢責所在實戶據口團保團保者團結戶口使之互相保識使其四季輸價又行此策後富商大賈或行財賄邀截喧訴其為首者所在杖殺連狀人皆杖脊連狀人謂連名告狀者也兵部侍郎韓愈上言以為城郭之外少有見錢少詩紹翻見賢遍翻下同糴鹽當屬上句鹽商則無物不取或賒貸徐還鬻物而緩取直曰賒貸借也兩得利便今令吏人坐鋪自糶列物而鬻之謂之鋪鋪普故翻必不敢受如此貧者無從得鹽自然坐失常課如何更有倍利又若令人吏將鹽家至而戶糶必索百姓供應索山客翻供應言各供其物以應官吏所須也騷擾極多又刺史縣令職在分憂人君憂民有不得其生者故置守令以撫字之是其職在分憂也不復考其理行復扶又翻理行猶言治行也行戶孟翻又貧家食鹽至少或有淡食動經旬月若據戶給鹽依時徵價官吏畏罪必用威刑臣恐因此所在不安此尤不可之大者也中書舍人韋處厚議以為宰相處論道之地處昌呂翻書曰三公論道經邦雜以鹺務鹺才何翻記曲禮曰鹽曰鹹鹺實非所宜竇參皇甫鎛皆以錢穀為相名利難兼卒蹈禍敗竇參事見德宗紀皇甫鎛事見憲宗紀卒子恤翻謂為首告訴者杖殺連名者杖脊也事必不立強其兩翻禁人之所必犯法必不行矣事遂寢考異曰實録因三月壬寅平叔遷戶部侍郎事遂言變鹽法及處厚駁議按韓愈時奉使鎮州猶未還又壬寅二月十一日愈論鹽法狀云奉今月九日敕不知其何月也今附於四月之末平叔又奏徵遠年逋欠江州刺史李渤上言度支徵當州貞元二年逃戶所欠錢四千餘緡當州今歲旱災田損什九刺史自以所守州為當州詔悉免之長慶二年雍州人不樂屬容管廢雍管入容管見上卷元和十五年樂音洛使奏之容管經略使嚴公素聞之遣吏按元宗亶以羅陽縣歸蠻酋黃少度羅陽當在西原羈縻縣也蓋裴行立攻黃洞時得之而元宗亶以歸之也酋慈由翻壬寅元宗將兵百人並州印奔黃洞長慶二年王庭湊之圍牛元翼也和王傅于方欲以奇策干進和王綺順宗子請遣客王昭于友明考異曰實録作于友明後作于啓明舊元稹傳作王友明今從實録之初及新書使出元翼間古莧翻説式芮翻仍賂兵吏部令史偽出告身二十通文官告身賂吏部令史偽為之武官告身賂兵部令史偽為之稹皆然之元稹方圖進取而先與兵吏部令史為偽曾是以為相業乎知其謀乃告裴度云方為稹結客刺度為于偽翻度隱而不發賞詣左神策告其事考異曰舊裴度傳曰初度與李逢吉素不協度自太原入朝而惡度者以逢吉善於陰計足能構度乃自襄陽召逢吉入朝為兵部尚書度既復知政事而魏弘簡劉承偕之黨在禁中逢吉用族子仲言之謀因鑿人鄭注與中尉王守澄交結內官皆為之助五月左神策軍奏告事人李賞稱于方受元稹所使結客欲刺裴度按惡度者不過元稹與宦官彼欲害度其術甚多何必召逢吉又如所謀則稹當獲罪非所以害度也又逢吉若使李賞告之下御史按鞫賞急必連引逢吉非所以自謀也蓋賞自告耳非逢吉教令也丁巳詔左僕射韓皋等鞫之長慶二年戊午幽州節度使朱克融進馬萬匹羊十萬口而表云先請其直充犒賞史言朱克融玩弄朝廷長慶二年三司按于方刺裴度事皆無驗六月甲子度及元稹皆罷相度為右僕射稹為同州刺史以兵部尚書李逢吉為門下侍郎同平章事長慶二年黨項寇靈州渭北掠官馬先寇靈州遂及渭北也長慶二年諫官上言裴度無罪不當免相元稹與于方為邪謀責之太輕上不得已壬申削稹長春宮使長春宮在同州元稹以出刺兼使今削之長慶二年吐蕃寇靈武長慶二年庚辰鹽州奏黨項都督拔跋萬誠請降黨底朗翻拔跋當作托跋降戶江翻長慶二年壬午吐蕃寇鹽州長慶二年戊子復置雍管經略使復扶又翻長慶二年初張弘靖為宣武節度使弘靖代韓弘見上卷憲宗元和十四年府庫虛竭李願繼之性奢侈賞勞既薄於弘靖時勞力到翻又峻威刑軍士不悅願以其妻弟竇瑗典宿直兵瑗驕貪軍中惡之惡烏路翻牙將李臣則等作亂秋七月壬辰夜即帳中斬瑗頭因大呼呼火故翻府中響應願與一子踰城奔鄭州汴州西至鄭州一百五十里推都押牙李㝏為留後㝏古拜翻考異曰實録戊戌汴州監軍使奏六月四日夜軍亂節度使李願踰城以遁新紀亦云六月癸亥李㝏反逐李願按李願若以六月四日夜被逐不應至此月十日方奏到京師疑實録十字誤為六舊紀止用此奏到日今從願傳七月四日長慶二年丙申宋王結薨結順宗子長慶二年戊戌宣武監軍奏軍亂庚子李㝏自奏已權知留後乙巳詔三省官與宰相議汴州事三省官自遺補舍人丞郎以上授李㝏節李逢吉曰河北之事蓋非獲已今若並汴州棄之則是江淮以南皆非國家有也杜元穎張平叔爭之曰奈何惜數尺之節不愛一方之死乎議未決會宋亳潁三州章十二行本州下有刺史二字乙十一行本同各上奏請別命帥三州皆宣武巡屬帥所類翻以逢吉議為然遣中使詣三州宣慰逢吉因請以將軍徵㝏入朝以義成節度使韓充鎮宣武充弘之弟素寬厚得衆心韓弘鎮宣武二十餘年將士懷之其弟又以寬厚得衆故逢吉請以代㝏則命徐許兩軍攻其左右而滑軍蹙其北徐帥王智興許帥李光顏上皆從之丙午貶李願為隨州刺史隨州古隨國漢為隨縣江左為隨郡西魏置隨州京師東南一千三百八十八里徵李㝏為右金吾將軍㝏不奉詔宋州刺史高承簡斬其使者㝏遣兵二千攻之陷寧陵襄邑宋州西至汴州二百八十五里寧陵州西四十五里襄邑州西微北賊已陷其南城承簡保北二城與賊十餘戰癸丑忠武節度使李光顏將兵二萬五千討李㝏屯尉氏尉氏在汴州西南許州東北不俟詔即發兵討之㝏遣兵三千人攻宋州適至城下丙辰華逆擊破之丁巳李光顏敗宣武兵於尉氏敗補邁翻下同斬獲二千餘人長慶二年八月辛酉大理卿劉元鼎自吐蕃還元鼎去年使吐蕃長慶二年甲子韓充入汴境軍于千塔千塔當在汴州北斬首千餘級餘衆遁去壬申韓充敗宣武兵於郭橋九域志汴州祥符縣有郭橋鎮進軍萬勝九域志汴州中牟縣有萬勝鎮初李㝏既為留後以都知兵馬使李質為腹心及㝏除將軍不奉詔質屢諫不聽會㝏疽發於首遣李臣則等將兵拒李光顏於尉氏既而官軍四集兵屢敗㝏疾甚悉以軍事屬李質屬之欲翻臥於家丙子質與監軍姚文壽擒㝏殺之詐為㝏牒追臣則等至皆斬之執㝏四子送京師韓充未至質權知軍務時牙兵三千人日給酒食物力不能支質曰若韓公始至而罷之則人情大去矣不可留此弊以遺吾帥遺唯季翻帥所類翻即命罷給而後迎充丁丑充入汴癸未以韓充專為宣武節度使以曹華為義成節度使高承簡為兗海沂密節度使加李光顏兼侍中以李質為右金吾將軍韓充既視事人心粗定乃密籍軍中為惡者千餘人一朝並父母妻子悉逐之曰敢少留境內者斬於是軍政大治除亂而去其根則亂無從生矣治直吏翻長慶二年九月戊子朔浙西觀察使京兆竇易直易弋豉翻奏大將王國清作亂伏誅初易直聞汴州亂而懼欲散金帛以賞軍士或曰賞之無名恐益生疑乃止而外已有知之者故國清作亂易直討擒之並殺其黨二百餘人考異曰舊易直傳曰時江淮旱水淺轉運司錢帛委積不能漕國清指以為賞激諷州兵謀亂先事有告者乃收國清下獄其黨數千大呼入獄中篡取國清而出之因欲大剽易直登樓謂將吏曰能誅為亂者每獲一人賞千萬衆喜倒戈擊亂黨擒國清等三百餘人皆斬之今從實録長慶二年德州刺史王稷承父鍔餘資家富厚橫海節度使李景略利其財李景略當作李全略密教軍士殺稷屠其家納其女為妾以軍亂聞象有齒而焚其身賄也王鍔僅能免其身而禍鍾其子君子是以知守富之難長慶二年朝廷之討李㝏也遣司門郎中韋文恪宣慰魏博史憲誠表請授㝏旌節又於黎陽築馬頭為渡河之勢附河岸築土植木夾之至水次以便兵馬入船謂之馬頭辭禮倨慢及聞㝏死辭禮頓恭曰憲誠胡人譬如狗雖被捶擊終不離主耳捶比蘂翻離力智翻長慶二年冬十一月庚午皇太后幸華清宮辛未上自復道幸華清宮遂畋于驪山即日還宮太后數日乃返長慶二年丙子集王緗薨緗順宗子長慶二年庚辰上與宦者擊毬於禁中有宦者墜馬上驚因得風疾不能履地自是人不聞上起居宰相屢乞入見不報裴度三上疏請立太子且請入見見賢遍翻十二月辛卯上見㣥臣於紫宸殿御大繩牀程大昌演繁露曰今之交牀制本自虜來始名胡牀隋以讖有胡改名交牀唐穆宗於紫宸殿御大繩牀見㣥臣則又名繩牀矣余按交牀繩牀今人家有之然二物也交牀以木交午為足足前後皆施橫木平其底使錯之地而安足之上端其前後亦施橫木而平其上橫木列竅以穿繩絛使之可坐足交午處復為圓穿貫之以鐵斂之可挾放之可坐以其足交故曰交牀繩牀以板為之人坐其上其廣前可容膝後有靠背左右有托手可以閣臂其下四足著地去羌呂翻獨宦者十餘人侍側人情稍安李逢吉進言景王已長請立為太子裴度請速下詔副天下望既章十二行本既上有上無言三字乙十一行本同退齋校同張校同云無注本亦無而兩省官亦繼有請立太子者癸巳詔立景王湛為皇太子考異曰劉軻牛羊日曆曰穆宗不愈宰臣議立敬宗為皇太子時牛僧孺獨懷異圖欲立諸子僧孺乃昌言於朝曰梁守謙王守澄將不利於上又使楊虞卿漢公輩宣言於外曰王守澄欲謀廢立又令其徒於街衢門牆上施榜每於穆宗行幸處路傍或苑內草間削白而書之冀謀大亂其凶險如此此出於朋黨之言不足信也長慶二年是歲初行宣明曆憲宗即位司天徐昂上新曆曰觀象起元和二年用之然無蔀章之數至於發斂啓閉之候循用舊法測驗不合上立以纍世纘緒必更曆紀乃詔日官改撰曆名曰宣明其氣朔發斂日躔月離皆因大衍舊術晷漏交會則稍增損之容肇祖標點聶崇岐覆校
