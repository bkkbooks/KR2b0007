body:
  text: 資治通鑑卷第一百五十九端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注梁紀十五上遣交州刺史楊螵討李賁高祖武皇帝十五大同十一年乙丑五四五上遣交州刺史楊螵討李賁春正月丙申東魏遣兼散騎常侍李獎來聘散悉亶翻騎奇寄翻上遣交州刺史楊螵討李賁東魏儀同爾朱文暢與丞相司馬任胄都督鄭仲禮等謀因正月望夜觀打簇戲作亂北史曰魏氏舊俗以正月十五夜為打簇戲能中者即時賞帛按魏書孝靜天平四年春正月禁打簇相偷戲蓋此禁尋弛也任音壬奉文暢為主事泄皆死文暢榮之子也其姊敬宗之后及仲禮姊大車皆為歡妾有寵故其兄弟皆不坐歡上書言並州軍器所聚動須女功請置宮以處配沒之口處昌呂翻又納吐谷渾之女以招懷之吐谷渾國於西魏西南高歡越境納其女以招懷之蓋欲借其力以侵擾西魏吐從暾入聲谷音浴丁未置晉陽宮二月庚申東魏主納吐谷渾可汗從妹為容華容華前漢內職舊號可從刊入聲汗音寒從才用翻上遣交州刺史楊螵討李賁魏丞相泰遣酒泉胡安諾槃陀始通使於突厥突厥本西方小國姓阿史那氏世居金山之陽為柔然鐵工使疏吏翻下同李延壽曰突厥其先居西海之右獨為部落蓋胸奴之別種也姓阿史那氏後為鄰國所破盡滅其族有一兒年且十歲兵人見其小不忍殺之乃刖足斷臂棄澤中有牝狼以肉飼之及長與狼交合遂有孕焉彼王聞此兒尚在復遣殺之使者見在狼側並欲殺狼於時若有神物投狼於西海之東落高昌國西北山狼匿其中遂生十男男長外託妻孕其後各為一姓阿史那其一也最賢遂為君長故牙門建狼頭纛示不忘本也或云突厥本平涼雜胡姓阿史那氏魏太武滅沮渠氏阿史那以五百家奔柔然世居金山之陽為柔然鐵工金山形似兜鍪借俗號兜鍪突厥突厥因以為號又曰突厥之先出於索國在胸奴之北其部落大人曰阿謗步兄弟七十人其一曰伊質泥師都狼所生也此說雖殊終狼種也程大昌曰金山形如兜鍪其俗謂兜鍪為突厥因以為號厥九勿翻至其酋長土門始強大酋慈秋翻長知兩翻頗侵魏西邊安諾槃陀至其國人皆喜曰其國之下當更有國字屬下句大國使者至吾國其將興矣上遣交州刺史楊螵討李賁三月乙未東魏丞相歡入朝于鄴百官迎於紫陌朝直遙翻鄴都記紫陌在鄴城西北五里歡握崔暹手而勞之曰往日朝廷豈無法官莫肯舉劾勞力到翻劾戶概翻又戶得翻中尉盡心徇國不避豪強遂使遠邇肅清衝鋒陷陳大有其人陳讀曰陳當官正色今始見之言聞之古人有當官正色者今始見崔暹也高歡父子無以相報賜暹良馬暹拜馬驚走歡親擁之授以轡東魏主宴於華林園鄴都倣京洛之制亦有華林園歡降階跪曰唯暹一人可勸並請以臣所射賜物千段賜之時於華林園宴射賜歡物千段歡請回以賜暹謂暹曰我尚畏羡何況餘人然暹中懷頗挾巧詐初魏高陽王斌有庶妹玉儀不為其家所齒為孫騰妓斌音彬妓渠綺翻騰又棄之高澄遇諸塗悅而納之遂有殊寵白居易詩云天下無正色悅目即為姝誠有是事蓋玉儀所乏者非色必妖媚善蠱惑故所如衆女謠諑而不見容澄謂崔季舒曰崔暹必造直諫造如字作也及暹咨事澄不復假以顏色復扶又翻居三日暹懷刺墜之於前續世說古者未有紙削竹木以書姓名謂之刺後以紙書謂之名紙唐李德裕貴盛人務加禮改具銜候起居之狀謂之門狀何用此為暹悚然曰未得通公主澄大悅把暹臂入見之季舒語人曰語牛倨翻崔暹常忿吾佞在大將軍前每言叔父可殺及其自作乃過於吾上遣交州刺史楊螵討李賁夏五月甲辰東魏大赦上遣交州刺史楊螵討李賁魏王盟卒九年魏以王盟為太傅上遣交州刺史楊螵討李賁晉氏以來文章競為浮華魏丞相泰欲革其弊六月丁巳魏主饗太廟泰命大行臺度支尚書領著作蘇綽度徒洛翻作大誥宣示㣥臣戒以政事仍命自今文章皆依此體宇文泰令蘇綽倣周書作大誥今其文尚在使當時文章皆依此體亦非所以崇雅黜浮也上遣交州刺史楊螵討李賁上遣交州刺史楊螵討李賁㬓匹妙翻以陳霸先為司馬命定州刺史蕭勃會㬓於西江五代志鬱林郡梁置定州因詭說留㬓說式芮翻㬓集諸將問計霸先曰交趾叛換罪由宗室謂李賁之叛由武林侯咨也事見上卷七年逋誅纍歲定州欲偷安目前不顧大計節下奉辭伐罪當死生以之豈可逗橈不進長寇沮衆也橈奴教翻長知兩翻沮在呂翻遂勒兵先發㬓以霸先為前鋒至交州考異曰典略作十二月癸丑至交州姚思廉陳書帝紀在六月今從之帥讀曰率敗於朱鳶朱鳶縣自漢以來屬交趾郡五代志朱鳶縣舊置武平郡鳶音緣賁奔嘉寧城沈約志吳孫晧建衡三年分交趾立新興郡並立嘉寧縣晉武帝太康三年更郡曰新昌五代志交趾郡嘉寧縣舊置興州新昌郡隋改曰峯州勃昺之子也吳平侯昺帝從父弟也昺音丙上遣交州刺史楊螵討李賁魏與柔然頭兵可汗謀連兵伐東魏丞相歡患之遣行臺郎中杜弼使於柔然為世子澄求婚使疏吏翻為于僞翻頭兵曰高王自娶則可歡猶豫未決婁曰國家大計願勿疑也世子澄尉景亦勸之歡乃遣鎮南將軍慕容儼往聘之號曰蠕蠕公主魏明元帝命柔然曰蠕蠕謂其蠕動無知識也阿那王褱封蠕蠕王雖曰以為國號猶鄙賤之也至高歡納其女號曰蠕蠕公主則徑以為國號不復以為鄙賤矣蠕人兗翻八月歡親迎於下館據北史彭城太傳下館當在木井北宋白曰木井城今並州陽曲縣理又曰代州即古陰館城有上館下館婁避正室以處之歡跪而拜謝婁歡微時之妻正室也處昌呂翻彼將覺之願絶勿顧史言婁為國家計有趙姬使叔隗為內子而己下之之意頭兵使其弟禿突佳來送女且報聘或云作聘章胡注或云作聘十二行本作娉乙十一行本同疑元刻本作娉胡刻改誤待見外孫乃歸公主性嚴毅終身不肯華言歡嘗病不得往禿突佳怨恚恚於避翻歡輿疾就之上遣交州刺史楊螵討李賁冬十月乙未詔有罪者復聽入贖天監三年除贖罪科見一百四十五卷復扶又翻上遣交州刺史楊螵討李賁東魏遣中書舍人尉瑾來聘上遣交州刺史楊螵討李賁乙未東魏丞相歡請釋邙山俘囚桎梏配以民間寡婦此邙山之捷所獲西魏之兵也捷事見上卷九年桎之日翻梏古沃翻上遣交州刺史楊螵討李賁十二月東魏以侯景為司徒中書令韓軌為司空戊子以孫騰録尚書事上遣交州刺史楊螵討李賁魏築圜丘於城南長安城南也上遣交州刺史楊螵討李賁散騎常侍賀琛啓陳四事其一以為今北邊稽服稽音啓謂東魏通和也正是生聚教訓之時用伍子胥越十年生聚十年教訓之言關外彌甚謂淮汝潼泗新復州郡在邊關之外者縣不堪郡之裒削裒薄侯翻更相呼擾更工衡翻惟事徵斂斂力贍翻各務流移此豈非牧守之過歟守式又翻下同東境戶口空虛東境謂三吳之地使疏吏翻下同數所角翻窮幽極遠無不皆至每有一使所屬搔擾駑困守宰則拱手聽其漁獵桀黠長吏又因之重為貪殘黠下八翻長知兩翻重直用翻縱有廉平郡猶掣肘如此雖年降復業之詔屢下蠲賦之恩而民不得反其居也其二以為今天下章十二行本下下有守宰二字乙十一行本同孔本同張校同所以貪殘良由風俗侈靡使之然也今之燕喜詩魯頌曰魯侯燕喜鄭氐箋云燕飲也積果如丘陵列肴同綺繡露臺之産不周一燕之資露臺之産謂百金也露臺事見十五卷漢文帝後七年裁取滿腹未及下堂已同臭腐又畜妓之夫無有等秩畜吁玉翻妓渠綺翻為吏牧民者致資巨億巨億者億億也不支數年率皆盡於燕飲之物歌謠之具所費事等丘山為歡止在俄頃乃更追恨向所取之少少詩沼翻如復傅翼增其搏噬復扶又翻傅讀曰附言罷官家食之人復出為官猶不能奮飛之鳥復傅之羽翼也一何悖哉悖蒲內翻下同其餘淫侈著之凡百言時人凡百所為皆事淫侈也日見滋甚欲使人守廉白安可得邪誠宜嚴為禁制道以節儉道讀曰導糾奏浮華變其耳目夫失節之嗟亦民所自患正恥不能及㣥故勉強而為之易曰不節若則嗟若無咎象曰不節之嗟又誰咎也琛引用之以發己意此論誠切中人情強其兩翻足正雕流之弊矣其三以為陛下憂念四海不憚勤勞至於百司莫不奏事但斗筲之人既得伏奏帷扆扆於豈翻便欲詭競求進不論國之大體心存明恕惟務吹毛求疵擘肌分理吹毛以求其疵瘢擘肌以分其肉理言其苛細以繩逐為務繩逐者繩糾其過失而斥逐之也事更成其威福犯罪者多巧避滋甚長弊增姦實由於此長知兩翻古實實同誠願責其公平之效黜其讒慝之心則下安上謐無徼幸之患矣徼堅堯翻其四以為今天下無事而猶日不暇給宜省事息費事省則民養費息則財聚應內省職掌各檢所部凡京師治署邸肆及國容戎備治理事之所署舍止之所邸諸王列第及諸郡朝宿之區肆市列也國容禮樂車服旗章也戎備用兵之器備也屯軍屯也傳驛傳也傳張戀翻除之有所宜減減之興造有非急者徵求有可緩者皆宜停省以息費休民故畜其財者所以大用之也養其民者所以大役之也若言小事不足害財則終年不息矣以小役不足妨民則終年不止矣此亦確論也則難可以語富強而圖遠大矣啓奏上大怒召主書於前口授敕書以責琛蕭子顯曰自齊建武以來詔命不關中書專出舍人省四省謂之四戶其下有主書令史舊用武官末改文吏人數無員莫非左右要密朕有天下四十餘年公車讜言日關聽覽讜多曩翻讜言善言也直言也所陳之事與卿不異每苦倥偬倥康董翻偬作孔翻倥偬困苦也不暇給也更增惛惑卿不宜自同闒茸闒吐盍翻茸而隴翻闒茸不肖也劣也止取名字宣之行路言我能上事恨朝廷之不用何不分別顯言某刺史橫暴上時掌翻別彼列翻橫戶孟翻某太守貪殘守式又翻尚書蘭臺某人姦猾使者漁獵並何姓名使疏吏翻取與者誰明言其事得以誅黜更擇材良又士民飲食過差若加嚴禁密房曲屋云何可知儻家家搜檢恐益增苛擾若指朝廷我無此事昔之牲牢久不宰殺周禮王膳用六牲謂馬牛羊豕犬雞也又曰王日一舉鼎十有二注曰殺牲盛饌曰舉鼎十有二牢鼎九陪鼎三帝事佛乃不宰殺菜蔬而已若復減此必有蟋蟀之譏詩唐蟋蟀刺晉僖公儉不中禮朝直遙翻復扶又翻帝以供佛供僧設無遮無礙會為功德事變一瓜為數十種種章勇翻治一菜為數十味治直之翻下同以變故多何損於事我自非公宴不食國家之食多歷年所乃至宮人亦不食國家之食帝奄有東南凡其所食自其身以及六宮不由佛營不由神造又不由西天竺國來有不出於東南民力者乎惟不出於公賦遂以為不食國家之食誠如此則國家者果誰之國家邪不關材官及以國匠此自文其營造塔寺之過耳材官將軍屬少府卿國匠者官給其俸廩以供國家之用者大匠卿掌土木之工勇怯不同貪廉各用亦非朝廷為之傅翼為于僞翻傅讀曰附卿以朝廷為悖乃自甘之當思致悖所以悖蒲妹翻卿云宜導之以節儉朕絶房室三十餘年至於居處不過一牀之地雕飾之物不入於宮受生不飲酒不好音聲所以朝中曲宴未嘗奏樂此㣥賢之所見也朕三更出治事隨事多少事少午前得竟孔穎達曰雜比曰音單出曰聲竟畢其事也處昌呂翻好呼到翻更工衡翻朝直遙翻少詩沼翻事多日昃方食日常一食若晝若夜昔要腹過於十圍要讀曰腰今之瘦削才二尺餘舊帶猶存非為妄說為誰為之救物故也為誰之為于僞翻下手為同卿又曰百司莫不奏事詭競求進今不使外人呈事誰尸其任尸主也云何可得古人云專聽生姦獨任成亂漢鄒陽之言元后之付王莽趙高事見秦紀王莽事見漢紀又可法歟卿云吹毛求疵復是何人擘肌分理復是何事復扶又翻下當復復見敢復同治署邸肆等何者宜除何者宜減何處興造非急何處徵求可緩各出其事具以奏聞富國強兵之術息民省役之宜並宜具列若不具列則是欺罔朝廷倚章十二行本倚作佇乙十一行本同孔本同聞重奏倚側也側者傾待之義如側耳側身側席之類重直龍翻付之尚書班下海內省悉景翻下遐嫁翻庶惟新之美復見今日琛但謝過而已不敢復言上為人孝慈恭儉博學能文陰陽卜筮騎射聲律草隸圍碁無不精妙騎奇寄翻勤於政務冬月四更竟夜分五更每更至五點而竟執筆觸寒手為皴裂皴七倫翻皮細起也自天監中用釋氏法長齊斷魚肉斷音短日止一食惟菜羹糲飯而已糲盧達翻糲者粗而不鑿也或遇事繁日移中則嗽口以過日移中日過中也嗽當作漱滌口也音先奏翻過謂度日也木綿皂帳木綿江南多有之以春二三月之晦下子種之既生須一月三薅其四旁失時不薅則為草所荒穢輒萎死入夏漸茂至秋生黃花結實及熟時其皮四裂其中綻出如綿土人以鐵鋌碾去其核取如綿者以竹為小弓長尺四五寸許牽弦以彈帛丿糸令其勻細卷為小筒就車紡之自然抽緒如繅絲狀不勞紉緝織以為布自閩廣來者尤為麗密方勺曰閩廣多種木綿樹高七八尺葉如柞結實如大菱而色青秋深即開露白綿茸然土人摘取去殼以鐵杖捍盡黑子徐以小弓彈令紛起然後紡績為布名曰吉貝今所貨木綿特其細緊者耳當以花多為勝橫數之得百二十花此最上品海南蠻人織為巾上出細字雜花卉尤工巧即古所謂白疊巾身衣於既翻一衾二年載子亥翻亦年也後宮貴以下衣不曳地性不飲酒非宗廟祭祀大饗宴及諸法事未嘗作樂法事謂奉佛為梵唄恆理衣冠小坐盛暑未嘗褰袒小坐宮中便坐也恆戶登翻坐徂臥翻如遇大賓然優假士人太過牧守多浸漁百姓使者干擾郡縣又好親任小人守式又翻使疏吏翻好呼到翻頗傷苛察多造塔廟公私費損江南久安風俗奢靡故琛啓及之上惡其觸實惡烏路翻故怒臣光曰梁高祖之不終也宜哉夫人君聽納之失在於叢脞孔安國曰叢脞細碎無大略馬融曰叢總也脞小也陸德明曰脞倉果翻徐音鎖在於煩碎是以明主守要道以御萬機之本忠臣陳大體以格君心之非故身不勞而收功遠言至約而為益大也觀夫賀琛之諫未章十二行本未上有亦字乙十一行本同孔本同至於切直而高祖已赫然震怒護其所短矜其所長詰貪暴之主名詰去吉翻問勞費之條目困以難對之狀責以必窮之辭自以蔬食之儉為盛德日昃之勤為至治昃阻力翻治直吏翻君道已備無復可加復扶又翻㣥臣針規舉不足聽如此則自餘切直之言過於琛者誰敢進哉由是姦佞居前而不見謂朱周石珍輩也謂納侯景復與東魏和也覆邦絶祀為千古所閔笑豈不哀哉上遣交州刺史楊螵討李賁上敦尚文雅疏簡刑法自公卿大臣咸不以鞫獄為意姦吏招權弄法貨賂成市枉濫者多大率二歲刑已上歲至五千人徒居作者具五任任謂其人巧力所任也五任謂任攻木者則役之攻木任攻金者則役之攻金任攻皮者則役之攻皮任設色者則役之設色任摶埴者則役之摶埴任音壬魏武帝定甲子科犯釱左右趾者易以升械是時乏鐵故易以木焉著陟略翻權解之是後囚徒或有優劇言囚徒有力足以行賂者則守吏詭言疾病權解其械而得優寬其無力以賂吏者則雖實罹疾病亦不得解械更增苦劇也多驕淫不法上年老厭於萬幾幾居希翻又專精佛戒每斷重罪則終日不懌梁武帝斷重罪則終日不懌此好生惡殺之意也夷考帝之終身自襄陽舉兵以至下建康猶曰事關家國伐罪救民洛口之敗死者凡幾何人浮山之役死者凡幾何人寒山之敗死者又幾何人其間爭城以戰殺人盈城爭地以戰殺人盈野南北之人交相為死者不可以數計也至於侯景之亂東極吳會西抵江郢死於兵死於饑者自典午南渡之後未始見也驅無辜之人而就死地不惟儒道之所不許乃佛教之罪人而斷一重罪乃終日不懌吾誰欺欺天乎斷丁亂翻事覺亦泣而宥之如臨賀王正德父子是也橫戶孟翻或白晝殺人於都街或暮夜公行剽劫剽匹妙翻有罪亡命者匿於王家有司不敢搜捕上深知其弊溺於慈愛不能禁也上遣交州刺史楊螵討李賁魏東陽王榮為瓜州刺史五代志敦煌郡舊置瓜州榮卒瓜州首望表榮子康為刺史各州之大姓是為望族首望者又一州望族之首魏不能討因以彥為刺史屢徵不至又南通吐谷渾吐谷渾立國在敦煌之南隔大河吐從暾入聲谷音浴欲以計取之以給事黃門侍郎申徽為河西大使密令圖彥徽以五十騎行既至止於賓館彥見徽單使兵從不多故曰單使文選李陵答蘇武書所謂單車之使者也使疏吏翻騎奇寄翻徽遣人微勸彥歸朝朝直遙翻彥不從徽又使贊成其留計贊其留敦煌之計遂來至館徽先與州主簿敦煌令狐整等密謀令狐整瓜州之望也姓譜令狐本自畢萬之後晉大夫令狐文子即魏顆也敦徒門翻令音零坐徂臥翻責而縛之因宣詔慰諭吏民且云大軍續至城中無敢動者鄧彥久在瓜州豈無黨與威之以大軍繼至故懼而不敢動泰以徽為都官尚書中大同元年丙寅五四六是年夏四月方改元為中大同上遣交州刺史楊螵討李賁春正月癸丑楊㬓等克嘉寧城㬓匹妙翻考異曰典略作乙未今從梁帝紀李賁奔新昌獠中諸軍頓于江口江口即蘇歷江入海之口獠魯皓翻上遣交州刺史楊螵討李賁二月魏以義州刺史史寧先是東西魏爭義州史寧先入城據之西魏因以為刺史前刺史宇文仲和據州不受代瓜州民張保殺刺史成慶以應之晉昌民呂興殺太守郭肆以郡應保劉昫唐志瓜州晉昌縣漢敦煌郡之置安縣舊置晉昌郡及置安縣因改晉昌為永興隋改為瓜州改置安為常樂武德七年復為晉昌唐又有常樂縣則漢之廣至縣地也又按五代志瓜州常樂縣後魏置常樂郡後周併涼興廣至置安閏泉合為涼興縣隋廢郡改縣為常樂參而考之則晉昌郡當置於隋常樂縣界上遣交州刺史楊螵討李賁三月乙巳大赦上遣交州刺史楊螵討李賁庚戌上幸同泰寺遂停寺省同泰寺有便省考異曰典略云癸卯詔以今月八日於同泰寺設無遮大會捨朕身及以宮人並所王境土供養三寶四月丙戌公卿以錢二億萬奉贖按韓愈佛骨表云三度捨身為寺家奴若並此則四矣今從梁書四月丙戌解講大赦改元是夜同泰寺浮圖災上曰此魔也宜廣為法事㣥臣皆稱善乃下詔曰道高魔盛行善鄣生魔鬼魔鄣鄣礙魔眉波翻行下孟翻倍增往日遂起十二層浮圖將成值侯景亂而止上遣交州刺史楊螵討李賁魏史寧曉諭涼州吏民率皆歸附獨宇文仲和據城不下五月獨孤信使諸將夜攻其東北自帥壯士襲其西南遲明克之將即亮翻帥讀曰率下同遲直二翻遂擒仲和初張保欲殺州主簿令狐整以其人望恐失衆心雖外相敬內甚忌之整陽為親附因使人說保曰今東軍漸逼涼州東軍謂獨孤信之軍東自長安來說式芮翻恐不能敵宜急分精鋭以救之然成敗在於將領將即亮翻下同令狐延保兼資文武令狐整字延保蔑不濟矣保從之整行及玉門玉門縣漢晉屬酒泉郡師古曰闞駰云漢罷玉門關屯徙其人於此五代志瓜州玉門縣後魏置會稽郡又有玉門郡馳還襲之先克晉昌斬呂興進擊瓜州州人素信服整皆棄保來降保奔吐谷渾降戶江翻吐從暾入聲谷音浴衆議推整為刺史整曰吾屬以張保逆亂恐闔州之人俱陷不義故相與討誅之今復見推是效尤也左傳曰尤而效之罪又甚焉復扶又翻使疏吏翻具以狀聞丞相泰以申徽為瓜州刺史召整為壽昌太守五代志西城郡石泉縣舊曰永樂置晉昌郡西魏改為壽昌郡又改永樂為石泉守式又翻整帥宗族鄉里三千餘人入朝從泰征討纍遷驃騎大將軍開府儀同三司加侍中令狐整以忠順貴顯於魏史終言之朝直遙翻驃匹妙翻騎奇寄翻上遣交州刺史楊螵討李賁六月庚子東魏以司徒侯景為河南大將軍大行臺上遣交州刺史楊螵討李賁秋七月壬寅東魏遣散騎常侍元廓來聘散悉亶翻上遣交州刺史楊螵討李賁甲子詔犯罪非大逆父母祖父母不坐上遣交州刺史楊螵討李賁先是江東唯建康及三吳荊郢江湘梁益用錢先悉薦翻其餘州郡雜以穀帛交廣專以金銀為貨上自鑄五銖及女錢二品並行杜佑曰梁武帝鑄錢肉好周郭文曰五銖重二銖三絫二黍其百文則重一斤二兩又別鑄除其肉郭謂之公式女錢徑一寸文曰五銖重如新鑄五銖二錢並行及其末也又有兩柱錢普通中更鑄鐵錢由是民私鑄者多物價騰踊交易者至以車載錢不復計數更工衡翻復扶又翻又自破嶺以東八十為百名曰東錢破嶺在今鎮江府丹楊縣秦始皇所鑿即破岡也七十為百名曰西錢建康以九十為百名曰長錢丙寅詔曰朝四暮三衆狙皆喜名實未虧而喜怒為用莊子曰狙公賦芋曰朝三而暮四衆狙皆怒曰朝四而暮三衆狙皆喜狙千余翻陌減則物貴陌足則物賤非物有貴賤乃心有顛倒至於遠方日更滋甚徒亂王制無益民財自今可通用足陌錢令書行後百日為期若猶有犯男子謫運女子質作並同三年謫運者以謫發之轉運質作質其身使居作皆役之三年此古所謂三歲刑也錢陌益少少詩沼翻至於季年遂以三十五為百云上遣交州刺史楊螵討李賁上年高諸子心不相下下遐嫁翻章十二行本下下有互相猜忌四字乙十一行本同孔本同退齊校同邵陵王綸為丹楊尹湘東王繹在江州武陵王紀在益州皆權侔人主太子綱惡之常選精兵以衛東宮為帝諸子皆不終張本惡烏路翻以綸為南徐州刺史上遣交州刺史楊螵討李賁東魏丞相歡如鄴自晉陽朝于鄴而書如鄴言其威權陵上若列國然石經見五十七卷漢靈帝熹平四年上遣交州刺史楊螵討李賁魏徙並州刺史王思政為荊州刺史使之舉諸將可代鎮玉壁者西魏置並州刺史僑治玉壁將即亮翻晉州屬東魏韋孝寬遙領刺史耳東魏丞相歡悉舉山東之衆將伐魏癸巳自鄴會兵於晉陽九月至玉壁圍之以挑西師挑徒了翻西師不出上遣交州刺史楊螵討李賁李賁復帥衆二萬自獠中出屯典徹湖復扶又翻湖亦當在新昌郡界考異曰典略云渡武平江據新安村今從陳帝紀大造船艦充塞湖中艦戶黯翻塞悉則翻衆軍憚之頓湖口不敢進陳霸先謂諸將曰我師已老楊㬓等自去年夏五月出師至是幾一年半故自謂師老且孤軍無援入人心腹若一戰不捷豈望生全今藉其屢奔人情未固夷獠烏合易為摧殄獠魯皓翻下同易弋豉翻正當共出百死決力取之無故停留時事去矣諸將皆默然莫應諸將心不欲戰故默而莫敢應江水暴起七丈注湖中霸先勒所部兵乘流先進衆軍鼓譟俱前賁衆大潰竄入屈獠洞中上遣交州刺史楊螵討李賁冬十月乙亥以前東揚州刺史嶽陽王察為雍州刺史雍於用翻上捨察兄弟而立太子綱事見一百五十五卷中大通三年寵亞諸子言察被寵亞於諸子帝固知察之才器足以自立矣會工外翻故用察兄弟迭為東揚州以慰其心察兄弟亦內懷不平察以上衰老朝多秕政朝直遙翻秕卑履翻不成粟也書曰若粟之有秕後漢書安帝贊曰秕我王度注曰秕諭穢也遂蓄聚貨財折節下士折而設翻下遐嫁翻招募勇敢左右至數千人以襄陽形勝之地梁業所基謂帝自襄陽起兵以得天下乃克己為政撫循士民數施恩惠延納規諫所部稱治為察據襄陽張本數所角翻治直吏翻上遣交州刺史楊螵討李賁東魏丞相歡攻玉壁晝夜不息魏韋孝寬隨機拒之城中無水汲於汾歡使移汾一夕而畢於汾水上流決而移之不使近城欲乘之以入城上先有二樓先悉薦翻孝寬縛木接之令常高於土山以禦之歡使告之曰雖爾縛樓至天我當穿地取爾乃鑿地為十道又用術士李業興孤虛法漢書藝文志有風后孤虛二十卷史記日者傳曰日辰不全故有孤虛注云甲乙謂之日子丑謂之辰六甲孤虛法甲子旬中無戌亥戌亥即為孤辰巳即為虛甲戌旬中無申酉申酉為孤寅卯為虛甲申旬中無午未午未為孤子丑為虛甲午旬中無辰巳辰巳為孤戌亥為虛甲辰旬中無寅卯寅卯為孤申酉為虛甲寅旬中無子丑子丑為孤午未為虛賢曰對孤為虛玄女謂黃帝曰戰陳之法避孤擊虛北天險也天險自然之險也天設地造不假人力者也易曰天險不可升也邀其地道選戰士屯塹上每穿至塹戰士輒禽殺之又於塹外積柴貯火塹七豔翻貯丁呂翻敵有在地道內者塞柴投火以皮排吹之塞悉則翻排讀與鞴同音步拜翻韋囊也所以吹火一鼓皆焦爛鼓排吹之火氣入地道故敵人在其中者皆焦爛撞直江翻車之所及莫不摧毀無能禦者孝寬縫布為幔幔莫半翻隨其所向張之布既懸空車不能壞壞音怪敵又縛松麻於竿松薪麻骨之燥者燒之易然故敵用之並欲焚樓孝寬作長鉤利其刃此所謂鉤刀也杜佑曰鉤竿如槍兩旁有曲刃可以鉤物以鉤遙割之松麻俱落敵又於城四面穿地為二十道其中施梁柱縱火燒之柱折城崩高歡嘗用此術攻鄴以擒劉誕故復用之於玉壁折而設翻豎而主翻敵不得入城外盡攻擊之術而城中守禦有餘孝寬又奪據其土山歡無如之何乃使倉曹參軍祖珽說之曰珽他鼎翻說式芮翻君獨守孤城而西方無救恐終不能全何不降也降戶江翻下同孝寬報曰我城池嚴固兵食有餘攻者自勞守者常逸豈有旬朔之間已須救援浹日為旬改月為朔孝寬關西男子必不為降將軍也自謂男子言決不怯懦如婦人韋城主受彼榮祿或復可爾可爾猶言可如此也復扶又翻何事相隨入湯火中乃射募格於城中募格者立賞格以募人射而亦翻下同能斬城主降者拜太尉封開國郡公賞帛萬匹孝寬手題書背返射城外云能斬高歡者準此珽瑩之子也祖瑩見一百五十卷普通六年士卒戰及病死者共七萬人考異曰北史韋孝寬傳云苦戰六旬傷及病死者什四五今從北齊書歡智力皆困因而發疾有星墜歡營中士卒驚懼十一月庚子解圍去先是歡別使侯景將兵趣齊子嶺河內郡王屋縣舊名長平有齊子嶺有軹關杜佑曰按齊子嶺在今王屋縣東二十里周齊分界處先悉薦翻將即亮翻趣七喻翻恐其寇邵郡先是檦取建州已而退還邵郡西魏因授以建州刺史車廂當在隋唐之絳州垣縣界宋白曰絳州絳縣本理車廂城隋移縣理於城北十里檦與標同帥讀曰率騎奇寄翻景聞檦至斫木斷路六十餘里斷音短猶驚而不安遂還河陽楊檦常才耳侯景何至懼之如此史之所言容有過其實者庚戌歡使段韶從太原公洋鎮鄴辛亥徵世子澄會晉陽魏以韋孝寬為驃騎大將軍開府儀同三司進爵建忠公賞守玉壁之功也建忠公建忠郡公五代志京兆郡三原縣後周置建忠郡十一章乙十一行本一作二張校同月己卯歡以無功表解都督中外諸軍東魏主許之歡之自玉壁歸也軍中訛言韋孝寬以定功弩射殺丞相射而亦翻魏人聞之因下令曰徑弩一發凶身自隕歡聞之勉坐見諸貴使斛律金作敕勒歌斛律金敕勒部人也故使作敕勒歌洪邁曰斛律金唱敕律歌本鮮卑語按古樂府有其辭云敕勒川陰山下天似穹廬籠罩四野天蒼蒼野茫茫風吹草低見牛羊余謂此後人妄為之耳敕勒與鮮卑殊種斛律金出於敕勒故使之作敕勒歌若高歡則習鮮卑之俗者也哀感流涕和胡臥翻史言高歡將死故當樂而哀不能自掩上遣交州刺史楊螵討李賁魏大行臺度支尚書司農卿蘇綽性忠儉常以喪亂未平為己任度徒洛翻喪息浪翻紀章十二行本紀上有薦賢拔能四字乙十一行本同孔本同張校同綱庶政丞相泰推心任之人莫能間間古莧翻或出遊常預署空紙以授綽有須處分處昌呂翻分扶問翻隨事施行及還啓知而已綽常謂為國之道當愛人如慈父訓人如嚴師每與公卿論議自晝達夜事無巨細若指諸掌積勞成疾而卒卒子恤翻泰深痛惜之謂公卿曰蘇尚書平生廉讓吾欲全其素志恐悠悠之徒有所未達如厚加贈諡又乖宿昔相知之心何為而可尚書令史麻瑤尚書令史自東漢有之唐六典曰魏晉以來令史之任用人常輕齊梁後魏北齊雖預品秩益又微矣儉約所以彰其美也泰從之歸葬武功蘇綽武功人歸葬鄉里乘繩證翻泰與㣥公步送出同州郭外五代志馮翊郡後魏置華州西魏改曰同州孫愐曰馮翊有九龍泉泉有九源同為一流因以名州酹盧對翻餟祭以酒沃地也言曰尚書平生為事妻子兄弟所不知者吾皆知之唯爾知吾心吾知爾志方與共定天下遽捨吾去奈何因舉聲慟哭不覺巵落於手上遣交州刺史楊螵討李賁東魏司徒河南大將軍大行臺侯景右足偏短弓馬非其長而多謀算諸將高敖曹彭樂等皆勇冠一時冠古玩翻景常輕之曰此屬皆如豕突勢何所至言其勇而無謀也願得兵三萬橫行天下要須濟江縛取蕭衍老公以為太平寺主史言侯景夙有取江南之志太平寺蓋在鄴專制河南杖任若己之半體杖直兩翻憑也景素輕高澄嘗謂司馬子如曰高王在吾不敢有異王沒吾不能與鮮卑小兒共事子如掩其口及歡疾篤澄詐為歡書以召景先是景與歡約曰今握兵在遠人易為詐先悉薦翻易弋豉翻所賜書皆請加微點歡從之景得書無點辭不至又聞歡疾篤用其行臺郎潁川王偉計遂擁兵自固歡謂澄曰我雖病汝面更有餘憂何也言澄當以得盡總內外大權為喜不應更有餘憂歡曰豈非憂侯景叛邪對曰然歡曰景專制河南十四年矣東魏天平元年歡使景取荊州後遂委以河南至是十三年歡此語當在來春垂沒之時顧我能畜養畜許竹翻非汝所能駕御也今四方未定勿遽發哀庫狄干鮮卑老公斛律金敕勒老公並性遒直終不負汝遒慈秋翻健也固也可朱渾道元劉豐生遠來投我必無異心可朱渾道元奔東魏見一百五十七卷大同元年劉豐生奔東魏見二年心和厚汝兄弟當得其力韓軌少戇宜寬借之少詩沼翻戇陟降翻彭樂心腹難得宜防護之終以邙山事銜之為後彭樂被誅張本唯有慕容紹宗我故不貴之留以遺汝使澄厚以官爵結紹宗之心遺于季翻下患遺同段孝先忠亮仁厚段韶字孝先親戚之中唯有此子軍旅大事宜共籌之又曰邙山之戰吾不用陳元康之言事見上卷大同九年死不瞑目瞑莫定翻相樂廣寧人也張政烺標點容肇祖聶崇岐覆校
