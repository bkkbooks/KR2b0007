body:
  text: 資治通鑑卷第二百四十三端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註唐紀五十九穆宗睿聖文惠孝皇帝下長慶三年長慶三年癸卯八二三長慶三年春正月癸未賜兩軍中尉以下錢二月辛卯賜統軍軍使等綿綵銀器各有差綿當作錦章十二行本正作錦長慶三年戶部侍郎牛僧孺素為上所厚初韓弘之子右驍衞將軍公武為其父謀以財結中外為其于偽翻及公武卒弘繼薨穉孫紹宗嗣主藏奴與吏訟於御史府藏徂浪翻上憐之盡取弘財簿自閱視凡中外主權主權謂中外官之有事權者獨朱句細字曰某年月日送戶部牛侍郎錢千萬不納句古侯翻上大喜以示左右曰果然吾不繆知人繆靡幼翻三月壬戌以僧孺為中書侍郎同平章事時僧孺與李德裕皆有入相之望德裕出為浙西觀察使八年不遷至文宗大和三年用裴度薦始徵李德裕於浙西又為李宗閔所排出帥滑引僧孺為相由是牛李之怨愈深考異曰舊德裕傳曰初李逢吉自襄陽入朝乃密賂纖人構成于方獄八月元稹裴度俱罷逢吉代裴度為相既得權位銳意報怨時德裕與僧孺俱有相望逢吉欲引僧孺懼紳與德裕禁中沮之九月出德裕浙西尋引僧孺同平章事繇是交怨愈深蓋德裕以此疑怨逢吉未必皆出逢吉之意也長慶三年夏四月甲午安南奏陸州獠攻掠州縣武德元年以寧越郡之安海玉山置玉山州貞觀元年州廢屬欽州高宗上元二年復置陸州東至廉州界三百里長慶三年丙申賜宣徽院供奉官錢紫衣者百二十緡下至承旨各有差唐中世以後置宣徽院以宦者主之其大朝賀及聖節上壽則宣徽使宣答徐度卻掃編曰宣徽使本唐宦者之官故其所掌皆瑣細之事本朝更用士人品秩亞二府有南北院南院比北院資望尤優然其職猶多因唐之舊賜㣥臣新火及諸司使至崇班內侍供奉諸司工匠兵卒名籍及三班以下遷補假故鞫劾春秋及聖節大宴節度迎授恩命上元張燈四時祠祭契丹朝貢內庭學士赴上督其供帳內外進奉名物教坊伶人歲給衣帶郊御殿朝謁聖容賜酺國忌諸司使下別籍分產諸司工匠休假之類今觀穆宗所賜則宣徽院官員數多矣長慶三年初翼城人鄭注眇小目下視而巧譎傾諂善揣人意翼城縣屬絳州本漢絳縣地隋改翼城縣因縣古翼城為名揣初委翻羇貧甚嘗以藥術干徐州牙將牙將悅之薦於節度使李愬愬餌其藥頗驗遂有寵署為牙推牙推在節度推官之下妄作威福軍府患之監軍王守澄以衆情白愬請去之去羌呂翻下同愬曰注雖如是然奇才也將軍試與之語時中官多加諸衞將軍謂之內將軍去之未晚乃使注往謁守澄守澄初有難色不得已見之坐語未久守澄大喜延之中堂促膝笑語恨相見之晚明日謂愬曰鄭生誠如公言自是又有寵於守澄權勢益張張知亮翻愬署為巡官列於賓席注既用事恐牙將薦己者泄其本末密以他罪譖之於愬愬殺之及守澄入知樞密挈注以西為立居宅贍給之為于偽翻遂薦於上上亦厚遇之自上有疾去年冬十一月上有疾事見上卷勢傾中外注日夜出入其家與之謀議語必通夕關通賂遺遺唯季翻人莫能窺其迹始則有微賤巧宦之士或因以求進數年之後達官車馬滿其門矣為鄭注與李訓誅王守澄及甘露之禍張本家多姬妾祿薄不能贍因注通於守澄以求節鎮己酉以權為嶺南節度使長慶三年五月壬申以尚書左丞柳公綽為山南東道節度使公綽過鄧縣唐襄州之鄧城縣漢南陽之鄧縣也治古樊城隋改為安養縣天寶元年改為臨漢縣貞元二十一年移縣古鄧城乃改為鄧城縣九域志在州北二十里一犯贓一舞文衆謂公綽必殺犯贓者公綽判曰贓吏犯法法在姦吏亂法法亡竟誅舞文者考異曰柳氏敍訓曰公為襄陽節度使有名馬人爭畫為圖圉人潔其蹄尾被蹴致斃命斬於鞠場賓吏請曰圉人備之不至良馬可惜公曰有良馬之貌含駑馬之性必殺之有齊縗者哭且獻狀曰遷三世十二喪于武昌為津吏所遏不得出公覽狀召軍候擒之破其十二柩皆實以稻米時歲儉鄰境尤甚人以為神明之政按韓愈與公綽書曰殺所乘馬以祭踶死之士乃在鄂岳時事敍訓舊傳皆誤也察齊衰者乃是閉糶非美事今不取長慶三年丙子以晉慈二州為保義軍以觀察使李寰為節度使長慶三年六月己丑以吏部侍郎韓愈為京兆尹六軍不敢犯法私相謂曰是尚欲燒佛骨事見二百四十卷憲宗元和十四年長慶三年秋七月癸亥嶺南奏黃洞蠻寇邕州破左江鎮邕州宣化縣有左江右江二鎮左江出七源州界至合江鎮與右江水合為一水流入橫州號鬱水右江源出峨利州界與雲南大槃水通左江道屬太平永平寨右江道屬橫山寨各管羈縻州丙寅邕州奏黃洞蠻破欽州千金鎮刺史楊嶼奔石南砦千金鎮當在欽州西南嶼徐與翻砦與寨同音豺夬翻長慶三年南詔勸利卒國人請立其弟豐祐考異曰實錄九月辛酉南詔王立佺進其國信歲末又云南詔請立蒙勸利之弟豐祐云立佺者蓋誤也今從新傳善用其衆始慕中國不與父連名南詔父子連名其先細奴邏生邏盛炎邏盛炎生炎閤炎閤死而立其弟盛邏皮盛邏皮生皮邏閤皮邏閤生閤邏鳳閤邏鳳生鳳迦異鳳迦異生異牟尋異牟尋生尋閣勸尋閣勸生勸龍晟勸利皆連名也為南詔強盛寇邊張本長慶三年八月癸巳邕管奏破黃洞蠻長慶三年丙申上自複道幸興慶宮至通化門樓雍錄開元二十年築夾城通芙蓉園自大明宮夾東羅城複道由通化安興門次經春明門延喜門又可以達曲江芙蓉園而外人不知也按複道自大明宮至通化門便可入興慶宮若經春明延興延喜門則至芙蓉園矣施式豉翻上之濫賜皆此類不可悉紀長慶三年癸卯以左僕射裴度為司空山南西道節度使不兼平章事李逢吉惡度惡烏路翻右補闕張又新等附逢吉競流謗毀傷度竟出之又新薦之子也張薦事德宗屢使吐蕃回鶻長慶三年九月丙辰加昭義節度使劉悟同平章事長慶三年李逢吉為相內結知樞密王守澄勢傾朝野考異曰李讓夷敬宗實錄曰逢吉用族子仲言之謀因鄭注與守澄潛結上於東宮且言逢吉實立殿下上深德之又曰張又新李續之皆逢吉藩僚時又新為右補闕續之為度支員外郎劉昫承之為逢吉傳亦言逢吉令仲言賂注求結於守澄仲言辯譎多端守澄見之甚悅自是逢吉有助事無違者其李訓傳則云訓自流所還丁母憂居洛中時逢吉為留守思復為相乃使訓因鄭注結王守澄然則逢吉結守澄乃在文宗時非穆宗時也二傳自相違逢吉結守澄要為不誣然未必因鄭注李讓夷乃李德裕之黨惡逢吉欲重其罪使與李訓鄭注皆有連結之迹故云用訓謀因注以交守澄耳又張又新李續之為逢吉藩僚乃在逢吉再鎮襄陽後於此時未也今不取常排抑之擬狀至內庭紳多所臧否擬狀謂進狀所擬除目也翰林學士院在內庭蓋李逢吉所進擬者穆宗訪其可否於李紳故得言之否音鄙而上待遇方厚不能遠也遠于願翻會御史中丞缺逢吉薦紳清直宜居風憲之地上以中丞亦次對官程大昌曰德宗貞元七年詔每御延英令諸司長官二人奏本司事俄又令常參官必日引見二人訪以政事謂之巡對則是待制之外又別有巡對也蓋正謂待制者諸司長官也名為巡對者未為長官而在常參之數亦得更迭引對者也其曰次對官者即巡對官許亞次待制而俟對者也則次對不得正為待制矣今人作文凡言待制皆以次對名之則恐未審也然稱謂既熟雖唐人亦自不辯開成中敕今後遇入閤日次對官未要隨班出並於東階松木下立待宰臣奏事退令齊至香案前各奏本司公事左右史待次對官奏事訖同出案此所言嘗以諸司之長官待制者名為次對官矣若究其制實誤以待制為次對官也余考唐中世以後宰相對延英既退則待制官巡對官皆得引對總可謂之次對官所謂次對官者謂次宰相之後而得對也非次待制官而入對也唐人本不誤程泰之自誤耳據宋白所紀貞元七年十一月敕則次對官者以常參官依次對為稱詳已見前註會紳與京兆尹御章十二行本御上有兼字乙十一行本同史大夫韓愈爭臺參及他職事文移往來辭語不遜故事京尹新除皆詣臺參逢吉欲激二人使爭以愈兼御史大夫免臺參而紳愈果爭不遜謂不相遜也冬十月丙戌以愈為兵部侍郎紳為江西觀察使長慶三年己丑以中書侍郎同平章事杜元穎同平章事充西川節度使為杜元穎以刻削致寇張本長慶三年辛卯安南奏黃洞蠻為寇長慶三年韓愈李紳入謝上各令自敍其事乃深寤壬辰復以愈為吏部侍郎紳為戶部侍郎考異曰穆宗實錄曰紳性險果交結權倖自以望輕頗忌朝廷有名之士及居近署封植己類以樹黨援進脩之士懼為傷毒疾之常指鈞衡欲逞其私志時宰病之因以人情上論諫官歷獻疏方有江西之命行有日矣因延英對辭又泣請留侍故有是拜人情憂駭此蓋脩穆宗實錄者惡紳故毀之如是今從敬宗實錄四年四年春正月辛亥朔上始御含元殿朝會上即位四年矣是歲元正方御東內正牙大朝會四年初柳泌等既誅見二百四十一卷元和十五年復扶又翻上餌其金石之藥有處士張皋者上疏以為神慮澹則血氣和嗜欲勝則疾疢作澹徒覽翻疢丑刃翻藥以攻疾無疾不可餌也昔孫思邈有言孫思邈唐之名醫令人藏氣不平藏徂浪翻藏氣五藏之氣也借使有疾用藥猶須重慎庶人尚爾況於天子先帝信方士妄言餌藥致疾此陛下所詳知也豈得復循其覆轍乎復扶又翻下同今朝野之人紛紜竊議但畏忤旨莫敢進言臣生長蓬艾長知丈翻麋鹿與遊無所邀求但粗知忠義欲裨萬一耳上甚善其言使求之不獲四年丁卯嶺南奏黃洞蠻寇欽州殺將吏舊制欽州至京師五千二百五十一里四年庚午上疾復作壬申大漸命太子監國宦官欲請郭太后臨朝稱制太后曰昔武后稱制幾危社稷事見武后紀幾居依翻非武氏之比也太子雖少少詩照翻但得賢宰相輔之卿輩勿預朝政何患國家不安自古豈有女子為天下主而能致唐虞之理乎取制書手裂之太后兄太常卿釗聞有是議密上牋曰苟果徇其請臣請先帥諸子納官爵歸田里帥讀曰率太后泣曰祖考之慶鍾於吾兄是夕上崩于寢殿年三十癸酉以李逢吉攝冢宰丙子敬宗即位于太極東序初穆宗之立神策軍士人賜錢五十千事見二百四十一卷元和十五年乃下詔稱宿衞之勤誠宜厚賞屬頻年旱歉屬之欲翻御府空虛邊兵尚未給衣霑卹期於均濟神策軍士人賜絹十匹錢十千畿內諸鎮又減五千仍出內庫綾二百萬匹付度支充邊軍春衣時人善之李逢吉為相時人之所惡也一事之善則時人善之非是非之公歟度徒洛翻四年自戊寅至庚辰上賜宦官服色及錦綵金銀甚衆或今日賜綠明日賜緋史言上昵於近習賜予無度四年初穆宗既留李紳事見上年紳族子虞頗以文學知名自言不樂仕進樂音洛隱居華陽川華陽川在虢州華陽山南華戶化翻從才用翻下從子同虞與耆書求薦誤達於紳紳以書誚之且以語於衆人誚才笑翻語牛倨翻虞深怨之乃詣逢吉悉以紳平日密論逢吉之語告之逢吉益怒使虞與補闕張又新及從子前河陽掌書記仲言等伺求紳短揚之於士大夫間伺相吏翻且言紳潛察士大夫有㣥居議論者輒指為朋黨白之於上由是士大夫多忌之及敬宗即位逢吉與其黨快紳失勢又恐上復用之復扶又翻日夜謀議思所以害紳者楚州刺史蘇遇楚州漢射陽縣地晉立山陽郡隋為楚州至京師二千五百一里主上初聽政必開延英有次對官惟此可防恐紳因次對言事而上復用之亟白逢吉曰事迫矣若俟聽政悔不可追逢吉乃令王守澄言於上曰陛下所以為儲貳臣備知之皆逢吉之力也如杜元穎李紳輩皆欲立深王深王察後改名悰憲宗之子穆宗之弟也上時年十六疑未信會逢吉亦有奏言紳不利於上請加貶謫上猶再三覆問然後從之二月癸未貶紳為端州司馬端州隋置取界內端溪為名煬帝初置信安郡武德又為端州天寶改為高安郡乾元復為州舊志至京師四千九百三十五里帥讀曰率既退百官復詣中書賀復扶又翻下同逢吉方與張又新語門者弗內良久又新揮汗而出旅揖百官曰端溪之事又新不敢多讓端州謂之端溪憚之辟音闢易音亦右拾遺內供奉吳思獨不賀逢吉怒以思為吐蕃告哀使丙戌貶翰林學士龐嚴為信州刺史蔣防為汀州刺史唐上元元年割饒州之弋陽衢州之玉山建撫二州各三鄉置信州至京師東南三千八百里開元二十六年開福撫二州山洞置汀州至京師六千一百七十三里壽州人與防皆紳所引也給事中于敖素與嚴善封還敕書人為之懼為于偽翻曰于給事為龐蔣直冤犯宰相怒誠所難也及奏下乃言貶之太輕逢吉由是獎之張又新等猶忌紳日上書言貶紳太輕上許為殺之為于偽翻朝臣莫敢言獨翰林侍讀學士韋處厚上疏太宗選耆儒侍讀以質史籍疑義開元中集賢院置侍讀直學士時翰林有侍讀學士有侍書學士指述紳為逢吉之黨所讒人情歎駭紳蒙先朝獎用借使有罪猶宜容假以成三年無改之孝論語孔子曰三年無改於父之道可謂孝矣於是上稍開寤考異曰處厚傳曰敬宗即位李逢吉用事素惡李紳乃構成其罪禍將不測處厚乃上疏云云帝悟其事紳得減死貶端州司馬今從實錄處厚上疏在紳貶端州後有穆宗所封文書一篋發之得裴度杜元穎李紳疏請立上為太子上乃嗟歎悉焚人所上譖紳書所上時掌翻雖未即召還後有言者不復聽矣四年己亥尊郭太后為太皇太后四年乙巳尊上母王為皇太后太后越州人也四年丁未上幸中和殿擊毬自是數遊宴擊毬奏樂數所角翻賞賜宦官樂人不可悉紀四年三月壬子赦天下諸道常貢之外毋得進奉四年甲寅上始對宰相於延英殿四年初牛元翼在襄陽牛元翼出深州鎮襄陽見上卷二年數所角翻庭湊不與聞元翼薨甲子盡殺之四年上視朝每晏戊辰日絕高尚未坐百官班於紫宸門外老病者幾至僵踣僵居良翻踣蒲北翻諫議大夫李渤白宰相曰昨日疏論坐晚論上坐朝之晚也請出閤待罪於金吾仗金吾左右仗在宣政殿前左拾遺劉栖楚獨留進言曰憲宗及先帝皆長君四方猶多叛亂陛下富於春秋嗣位之初當宵衣求理而嗜寢樂色宵衣未明而衣也理治也樂魚教翻梓宮在殯鼓吹日喧吹尺偽翻令聞未彰聞音問下響聞同惡聲遐布臣恐福祚之不長請碎首玉階以謝諫職之曠遂以額叩龍墀見血不已響聞閤外考異曰實錄曰莊周云為善無近名為惡無近刑意者既能為近名之善即必忍為近刑之惡栖楚本王承宗小吏果敢有聞逢吉擢而用之蓋取其鷹犬之效耳夫諫諍之道是豈能知之乎即如比干剖心當文王與紂之事也朱雲折檻恐漢氏之為新室也時危事迫不得不然故忠臣有死諫之義至如上年少嗜寢坐朝稍晚蓋宰臣密勿諫臣封事而可止者也豈在暴揚面數激訐於羽儀之前致使上疑死諫為不難謂細事皆當碎首從此遂不覽章疏卒有克明之難實栖楚兆之況諫辭皆㣥黨所作而使栖楚道之哉賣前直而資後詐殊可歎駭按李讓夷此論豈非惡栖楚而強毀之邪今所不取劉栖楚休叩頭俟進止程大昌曰奏劄言取進止猶言此劄之或留或卻合稟承可否也唐中葉遂以處分為進止而不曉文義者習而不察概謂有旨為進止如玉堂宣底所載凡宣旨皆云有進止者相承之誤也更論宦官事上連揮令出栖楚曰不用臣言請繼以死牛僧孺宣曰所奏知門外俟進止此宰相宣上旨也言所奏知者謂所奏之事上已知之也待罪於金吾仗於是宰相贊成其言上命中使就仗幷李渤宣慰令歸尋擢栖楚為起居舍人仍賜緋栖楚辭疾不拜歸東都四年庚午賜內教坊錢萬緡以備行幸武德後置內教坊於禁中武后如意元年改曰雲韶府以中官為使開元二年又置內教坊於蓬萊宮側京都有左右教坊四年夏四月甲午淮南節度使王播罷鹽鐵轉運使王播兼鹽鐵轉運見上卷二年四年乙未以布衣姜洽為補闕試大理評事陸洿布衣李虞劉堅為拾遺六典註云隋置大理評事通典云唐置評事十人掌出使推覆後增為十二人新志評事八人從八品下陸洿特試官耳洿後五翻所親厚者張又新李仲言李續之李虞劉栖楚姜洽及拾遺張權輿程昔範又有從而附麗之者時人惡逢吉者目之為八關十六子附依也麗著也自張又新至程昔範八人而附麗者又八人皆任要劇故目之為八關十六子關者要也考異曰按宰相之門何嘗無特所親愛之士數蒙引接詢訪得失否臧人物其間忠邪溷殽固亦多矣其疏遠不得志者則從而怨疾之巧立品目以相譏誚此古今常態非獨逢吉之門有八關十六子也舊逢吉傳以為有求於逢吉者必先經此八人納賂無不如意亦恐未必然但逢吉之門險詖者為多耳此皆出於李讓夷敬宗實錄按栖楚為吏敢與王承宗爭事此乃正直之士何得為佞邪之黨哉蓋讓夷德裕之黨而栖楚為逢吉所善故深詆之耳四年卜者蘇玄明與染坊供人張韶善染坊供人供役於染坊者也陸德明曰染如豔翻劉而險翻我為子卜為于偽翻當升殿坐與我共食今主上晝夜毬獵多不在宮中大事可圖也韶以為然乃與玄明謀結染工無賴者百餘人丙申匿兵於紫草車載以入銀臺門本草曰紫草出碭山山谷及楚地今處處有之人家園圃或種蒔其根所以染紫也爾雅謂之藐廣雅謂之茈卄戾苗似蘭香節青二月有花紫白色秋實白三月採根陰乾以下文清思殿徵之所入者左銀臺門也在大明宮東面又北則玄化門伺相吏翻未達所詣有疑其重載而詰之者載才代翻韶急即殺詰者與其徒易服揮兵大呼趣禁庭上時在清思殿擊毬自左銀臺門西入經太和殿至清思殿清思殿之南則宣徽殿北則珠鏡殿驚駭急入閉門走白上盜尋斬關而入先是右神策中尉梁守謙有寵於上每兩軍角伎藝先悉薦翻伎渠綺翻上常佑右軍至是上狼狽欲幸右軍左右曰右軍遠恐遇盜不若幸左軍近唐左神策軍左龍武軍左羽林軍皆列屯東內苑直左銀臺門東北角左神策中尉河中馬存亮聞上至走出迎捧上足涕泣自負上入軍中遣大將康藝全將騎卒入宮討賊將即亮翻上憂二太后隔絕二太后太皇太后郭氏上母太后王氏也復扶又翻張韶升清思殿坐御榻與蘇玄明同食曰果如子言玄明驚曰事止此邪韶懼而走會康藝全與右軍兵馬使尚國忠引兵至合擊之殺韶玄明及其黨死者狼藉逮夜始定餘黨猶散匿禁苑中明日悉擒獲之時宮門皆閉上宿於左軍中外不知上所在人情恇駭恇去王翻丁酉上還宮宰相帥百官詣延英門賀來者不過數十人帥讀曰率盜所歷諸門監門宦者三十五人法當死己亥詔並杖之仍不改職任兩中尉及諸宦者右之也壬寅厚賞兩軍立功將士四年五月乙卯以吏部侍郎李程戶部侍郎判度支竇易直並同平章事上問相於李逢吉逢吉列上當時大臣有資望者程為之首列上時掌翻故用之上好治宮室好呼到翻治直之翻欲營別殿制度甚廣李程諫請以所具木石回奉山陵上即從之四年六月己卯朔以左神策大將軍康藝全為鄜坊節度使賞討張韶蘇玄明之功也四年上聞王庭湊屠牛元翼家歎宰輔非才使凶賊縱暴翰林學士韋處厚因上疏言裴度勳高中夏聲播外夷若置之巖廊委其參決河北山東必稟朝算夏戶雅翻朝直遙翻管仲曰人離而聽之則愚合而聽之則聖理亂之本非有他術順人則理違人則亂伏承陛下當食歎息恨無蕭曹今有裴度尚不能留此馮唐所以謂漢文得廉頗李牧不能用也事見十五卷漢文帝十四年當委之信之親之禮之於事不效於國無勞則置之散寮散蘇但翻宀儿散也黜之遠郡如此則在位者不敢不厲將進者不敢苟求臣與逢吉素無私嫌嘗為裴度無辜貶官憲宗時韋處厚為考功郎韋貫之罷相處厚坐與之善出刺開州上答聖明下達㣥議耳上見度奏狀無平章事以問處厚處厚具言李逢吉排沮之狀上曰何至是邪李程亦勸上加禮於度丙申加度同平章事四年張韶之亂馬存亮功為多存亮不自矜委權求出秋七月以存亮為淮南監軍使四年夏綏節度使李祐入為左金吾大將軍夏戶雅翻壬申進馬百五十匹上卻之甲戌侍御史溫造於閤內奏彈祐違敕進奉因入閤而奏彈之也違敕者謂違三月壬子敕也詔釋之祐謂人曰吾夜半入蔡州城取吳元濟事見二百四十卷憲宗元和十二年今日膽落於溫御史矣四年八月丁卯朔安南奏黃蠻入寇黃蠻即黃洞蠻四年龍州刺史尉遲銳上言牛心山素稱神異尉紆勿翻牛心山在龍州江油縣西一里道教靈驗記李虎葬龍州之牛心山又牛心山靈異記梁武陵王紀理益州使李龍遷築城於牛心山龍遷既沒即葬於山側鄉里為立祠武德中改為觀武氏革命鑿斷山脈明皇幸蜀有老人蘇坦奏曰牛心山國之祖墓今日蒙塵之禍乃則天掘鑿所致明皇即命修填如舊明年誅祿山復宮闕以二記考之則李虎與龍遷即一人也然虎仕西魏未嘗仕梁有掘斷處請加補塞塞悉則翻從之役數萬人於絕險之地東川為之疲弊為于偽翻四年九月丁未波斯李蘇沙獻沈香亭子材左拾遺李漢上言此何異瑤臺瓊室上雖怒亦優容之杜佑曰林邑出沈香土人破斷其木積以歲年朽爛而心節獨在置水中則沈故名沈香諸蕃志沈香所出非一形多異而名亦不一有如犀角者謂之犀角沈如燕口者謂之燕口沈如附子者謂之附子沈如梭者謂之梭沈紋堅而理緻者謂之橫陽沈今其材可為亭子則條段又非諸沈比矣道明之六世孫也道明淮陽王道玄之弟四年冬十月戊戌翰林學士韋處厚諫上宴遊曰先帝以酒色致疾損壽臣是時不死諫者以陛下年已十五故也今皇子纔一歲臣安敢畏死而不諫乎上感其言賜錦綵百匹銀器四四年十一月戊午安南奏黃蠻與環王合兵攻陷陸州殺刺史葛維四年庚申葬睿聖文惠孝皇帝于光陵光陵在同州奉先縣北十五里堯山四年王播以錢十萬緡賂王守澄求復領利權是年四月王播罷鹽鐵轉運使癸未諫議大夫獨孤朗張仲方起居郎柳公權起居舍人宋申錫拾遺李景讓薛廷老請開延英論其奸邪上問前廷爭者不在中邪爭讀曰諍即日除劉栖楚諫議大夫景讓憕之曾孫李憕天寶末守東都死於安祿山之難憕直陵翻河中人也四年十二月庚寅加天平節度使烏重胤同平章事四年乙未徐泗觀察使王智興以上生日按唐會要上以元和四年六月九日生今王智興於十二月請置戒壇預請之也度僧尼以資福釋氏之法凡初度僧尼皆詣戒壇受戒其未受戒者謂之沙彌無知及避征役者爭趨之泗州有大聖塔人敬事之故王智興請於此置戒壇自元和以來敕禁此弊智興欲聚貨首請置之於是四方輻湊江淮尤甚智興家貲由此累鉅萬浙西觀察使李德裕上言若不鈐制鈐其廉翻至降誕日方停計兩浙福建當失六十萬丁奏至即日罷之四年是歲回鶻崇德可汗卒弟曷薩特勒立敬宗睿武昭愍孝皇帝寶曆元年寶曆元年乙巳八二五寶曆元年春正月辛亥上祀南郊還御丹鳳樓赦天下改元先是鄠令崔發聞外喧囂問之曰五坊人毆百姓先悉薦翻鄠音戶囂虛驕翻毆烏口翻發怒命擒以入曳之於庭時已昏黑良久詰之乃中使也上怒收發繫御史臺是日發與諸囚立金雞下唐制凡國有赦宥刑部先集囚徒於闕下衞尉建金雞置鼓宮城門之右囚徒至則擊之宣制訖乃釋其囚玄宗天寶十三年內侍省置高品一千六百九十六人品官白身二千九百三十二人皆㣥閹也破面折齒梃徒鼎翻白木棓也捶止橤翻折而設翻絕氣乃去數刻而蘇復有繼來求擊之者復扶又翻臺吏以席蔽之僅免上命復繫發於臺獄臺獄御史臺獄也寶曆元年中書侍郎同平章事牛僧孺以上荒淫嬖幸用事嬖卑義翻又博計翻又畏罪不敢言但累表求出乙卯升鄂岳為武昌軍以僧孺同平章事充武昌節度使考異曰皇甫松續牛羊日曆曰太牢既交惡黨潛豫姦謀太牢乃元和中青衫外郎耳穆宗世因承和薦不三二年位兼將相憲宗仙駕至灞上以從官召知制誥當時宰臣未盡兼職而獨綜集賢史館兩司出鎮未盡佩相印而太牢同平章事出夏口夏口去節十五年由太牢而加節焉太牢早孤母周氏冶蕩無檢鄉里云云兄弟羞赧乃令改醮既與前夫義絕矣及貴請以出母追贈禮云庶氏之母死何為哭於孔氏之廟乎又曰不為伋也妻者是不為白也母而李清心妻配牛幼簡是夏侯銘所謂魂而有知前夫不納於幽壤歿而可作後夫必訴於玄穹使其母為失行無適從之鬼上罔聖朝下欺先父得曰忠孝智識者乎作周秦行紀呼德宗為沈婆兒謂睿真皇太后為沈婆此乃無君甚矣此朋黨之論今不取中旨復以王播兼鹽鐵轉運使復扶又翻諫官屢爭之上皆不納牛僧孺過襄陽山南東道節度使柳公綽服櫜鞬候於館舍櫜姑勞翻鞬居言翻將佐諫曰襄陽地高於夏口鄂州謂之夏口公綽曰奇章公甫離台席牛弘相隋封奇章公僧孺其裔孫也故唐人以稱之宰相之位取象三台故曰台席離力智翻所以尊朝廷也竟行之寶曆元年上遊幸無常昵比㣥小昵尼質翻狎也近也比毗至翻黨也視朝月不再三朝直遙翻下同大臣罕得進見見賢遍翻二月壬午浙西觀察使李德裕獻丹扆六箴扆於豈翻一曰宵衣以諷視朝希晚朝直遙翻二曰正服以諷服御乖異三曰罷獻以諷徵求玩好好呼到翻四曰納誨以諷侮棄讜言讜音黨五曰辨邪以諷信任㣥小六曰防微以諷輕出遊幸其納誨箴略曰漢驁流湎舉白浮鍾事見三十一卷漢成帝永始二年成帝諱驁音五到翻陵霄作宮事見七十三卷魏明帝青龍三年明帝諱叡善亦不從忤五故翻以規為瑱是謂塞聰左氏外傳楚靈王虐白公子張驟諫王曰不穀雖不能用吾憗置之於耳對曰賴君之用也故言不然犀犛兕象其可盡乎其又以規為瑱也韋昭註曰瑱所以塞耳也言四獸之牙角可以為瑱難盡也而又以規諫為之乎瑱他甸翻塞悉則翻下同亂臣猖獗非可遽數玄服莫辨漢宣帝時霍氏外孫任宣坐謀反誅宣子章亡在渭城界夜玄服入廟居廊間執戟立廟門待上至欲為逆發覺伏誅馬何羅事見二十二卷漢武帝征和四年豺豕塞路覩貌獻餐斯可戒懼事見十七卷漢武帝建元三年寶曆元年上既復繫崔發於獄復扶又翻給事中李渤上言縣令不應曳中人中人不應毆御囚敕旨所囚繫者謂之御囚然縣令所犯在赦前中人所犯在赦後中人橫暴橫戶孟翻一至於此若不早正刑書臣恐四方藩鎮聞之則慢易之心生矣易以豉翻諫議大夫張仲方上言略曰鴻恩將布於天下而不行御前霈澤徧被於昆蟲而獨遺崔發被皮義翻自餘諫官論奏甚衆上皆不聽戊子李逢吉等從容言於上曰從千容翻崔發輒曳中人誠大不敬律以對捍制使無人臣之禮為大不敬今崔發曳中使故先以此罪坐之故相韋貫之之姊也年垂八十自發下獄積憂成疾下遐稼翻陛下方以孝理天下此所宜矜念上乃愍然曰比諫官但言發冤未嘗言其不敬亦不言有老母如卿所言朕何為不赦之此以母子天性感發之易所謂納約自牖者也但逢吉以權數耳比毗至翻送歸家仍慰勞其母勞力到翻母對中使杖發四十寶曆元年三月辛酉遣司門郎中于人文冊回鶻曷薩特勒為愛登里囉汩沒密於合張於合作施合毗伽昭禮可汗囉魯何翻汩越筆翻寶曆元年夏四月癸巳㣥臣上尊號曰文武大聖廣孝皇帝赦天下赦文但云左降官已經量移者宜與量移不言未量移者翰林學士韋處厚上言逢吉恐李紳量移故有此處置如此則應近年流貶官因李紳一人皆不得量移也量音良處昌呂翻上即追赦文改之紳由是得移江州長史寶曆元年秋七月甲辰鹽鐵使王播進羨餘絹百萬匹播領鹽鐵誅求嚴急正入不充而羨餘相繼正入謂歲入有正額者羨弋線翻寶曆元年己未詔王播造競渡船二十艘荊楚歲時記屈原以五月五日死於汨羅人傷其死並以舟楫拯之至今競渡是其遺俗自唐以來治競渡船務為輕駛前建龍頭後豎龍尾船之兩旁刻為龍鱗而綵繪之謂之龍舟植標於中流衆船鼓楫競進以爭錦標有破舟折楫至於沉溺而不悔者計用轉運半年之費諫議大夫張仲方等力諫乃減其半寶曆元年諫官言京兆尹崔元略以諸父事內常侍崔潭峻丁卯元略遷戶部侍郎寶曆元年昭義節度使劉悟之去鄆州也以鄆兵二千自隨為親兵八月庚戌悟暴疾薨子將作監主簿從諫匿其喪考異曰據李絳疏云悟八月十日得病計是日便死故置此餘從杜牧書以悟遺表求知留後司馬賈直言入責從諫曰爾父提十二州地歸朝廷謂殺李師道以鄆青等州歸朝廷也事見二百四十一卷憲宗元和十四年祗以張汶之故張汶事見上卷穆宗長慶二年汶音問今人為屎為不潔爾孺子何敢如此父死不哭何以為人從諫恐悚不能對乃發喪寶曆元年初陳留人武昭罷石州刺史為袁王府長史石州漢離石縣地唐置石州京師東北一千二百九十一里袁王紳順宗子李逢吉與李程不相悅水部郎中李仍叔程之族人激怒之云程欲與昭官為逢吉所沮昭因酒酣對左金吾兵曹茅彙言欲刺逢吉刺七亦翻為人所告九月庚辰詔三司鞫之前河陽掌書記李仲言謂彙曰君言李程與昭謀則生不然必死彙曰冤死甘心誣人自全彙不為也獄成冬十月甲子武昭杖死李仍叔貶道州司馬李仲言流象州茅彙流崖州彙于貴翻寶曆元年上欲幸驪山溫湯左僕射李絳諫議大夫張仲方等屢諫不聽拾遺張權輿伏紫宸殿下叩頭諫曰昔周幽王幸驪山為犬戎所殺史記周幽王愛褒姒褒姒不好笑王欲其笑萬方終不笑幽王為烽燧有寇至則舉烽火諸侯悉至而無寇褒姒乃大笑幽王悅之為數舉烽火其後不信諸侯益不至西夷犬戎攻幽王王舉烽徵兵兵莫至遂殺幽王驪山下國亡玄宗宮驪山而祿山亂先帝幸驪山享年不長事並見前紀驪山若此之凶邪我宜一往以驗彼言十一月庚寅幸溫湯即日還宮謂左右曰彼叩頭者之言安足信哉史言敬宗荒縱而愎諫寶曆元年丙申立皇子普為晉王寶曆元年朝廷得劉悟遺表議者多言上黨內鎮與河朔異不可許左僕射李絳上疏以為兵機尚速威斷貴定斷丁亂翻下裁斷同人情未一乃可伐謀劉悟死已數月朝廷尚未處分處昌呂翻分扶問翻中外人意共惜事機今昭義兵衆必不盡與從諫同謀縱使其半叶同尚有其半效順從諫未嘗久典兵馬威惠未加於人又此道素貧言昭義一道素來貧薄不比他道豐富今朝廷但速除近澤潞一將充昭義節度使令兼程赴鎮從諫未及布置新使已至潞州所謂先人奪人之心也先悉薦翻左傳趙宣子之言使疏吏翻下同新使既至軍心自有所繫從諫無位何名主張設使謀撓朝命撓奴教翻又奴巧翻其將士必不肯從今朝廷久無處分處昌呂翻分扶問翻彼軍不曉朝廷之意彼軍謂昭義軍也欲同惡則恐別更除人猶豫之間若有姦人為之畫策虛張賞設錢數軍士覬望尤難指揮為于偽翻賞設猶言賞犒也覬凡利翻伏望速賜裁斷仍先下明敕明敕猶言明詔斷丁亂翻下遐稼翻獎其從來忠節言澤潞一軍自李抱真以來盡忠竭節於朝廷使之賞設繒慈陵翻續除劉從諫一刺史從諫既粗有所得必且擇利而行萬無違拒設不從命臣亦以為不假攻討何則臣聞從諫已禁山東三州軍士不許自畜兵刀昭義巡屬邢洺磁三州皆在山東帳下之事亦在不疑言帳下必有圖從諫以為功者決無即授從諫之理時李逢吉王守澄計議已定竟不用絳等謀考異曰實錄從諫以金幣賂當權者舊從諫傳曰李逢吉王守澄受其賂曲為奏請事有無難明今不取辛丑以從諫為昭義留後劉悟煩苛從諫濟以寬厚衆頗附之寶曆元年李絳好直言李逢吉惡之故事僕射上日好呼到翻惡烏路翻上時掌翻宰相送之百官立班中丞列位於廷尚書以下每月當牙牙牙參也伊慎為僕射太常博士韋謙上言舊儀太重削去之去羌呂翻御史中丞王播恃逢吉之勢與絳相遇於塗不之避絳引故事上言僕射國初為正宰相唐初太宗為尚書令㣥臣不敢居其位自是不除授以左右僕射為尚書省長官其任為正宰相所謂參議朝政參知機務同平章事雖皆宰相之職然非正宰相也儻人才忝位自宜別授賢良若朝命守官豈得有虧法制乞下百官詳定議者多從絳議朝直遙翻下遐稼翻上聽行舊儀甲子以絳有足疾除太子少師分司寶曆元年言事者多稱裴度賢不宜棄之藩鎮上數遣使至興元勞問度數所角翻勞力到翻密示以還期度因求入朝逢吉之黨大懼二年寶曆二年春正月壬辰裴度自興元入朝李逢吉之黨百計毀之先是民間謠云先悉薦翻緋衣小兒坦其腹天上有口被驅逐緋衣裴字天上有口吳字謂度能擒吳元濟其才為可用也長安城中有橫亙六岡如乾象度宅偶居第五岡六岡橫亙如乾卦六畫之象裴度平樂里第偶居第五岡程大昌曰宇文愷之營隋都也曰朱雀街南北盡郭有六條高坡象乾卦六爻故於九二置宮殿以當帝王之居九三立百司以應君子之數九五貴位不欲常人居之故置玄都觀及興善寺以鎮其地劉禹錫賦看花詩即此也裴度宅在朱雀街東自北而南則為第四坊名永樂坊略與玄都觀東西相對而其第之比觀基蓋退北兩坊不正相當也唐實錄裴度在興元自請入覲李逢吉之黨有張權輿者排之以為度名應圖讖宅據乾岡不召而來其意可見蓋權輿之所謂宅據乾岡者即龍首第五坡之餘勢也然度之所居張說第在其西尤與玄都觀相近而張嘉貞之第正在坊北何獨指度為占據乾岡也小人挾私欺君皆此類度名應圖讖宅占岡原不召而來其旨可見考異曰舊逢吉傳曰寶曆初度連上章請入覲逢吉之黨坐不安席如矢攢身乃相與為謀欲沮其來張權輿撰非衣小兒之謠傳於閭巷言度相有天分名應謠讖而韋處厚於上前解析權輿所撰之言按權輿若撰謠言當更加以惡言不止云天上有口被驅逐而已蓋民間先有此謠權輿因言度名應謠讖非撰之也少詩照翻悉察其誣謗待度益厚度初至京師朝士填門度留客飲京兆尹劉栖楚附度耳語侍御史崔咸舉觴罰度曰丞相不應許所由官呫囁耳語京尹任煩劇故唐人謂府縣官為所由官項安世家說曰今坊市公人謂之所由呫叱涉翻囁而涉翻呫囁細語口動而聲不遠聞栖楚不自安趨出二月丁未以度為司空同平章事度在中書左右忽白失印聞者失色度飲酒自如頃之左右白復於故處得印度不應或問其故度曰此必吏人盜之以印書券耳急之則投諸水火緩之則復還故處或問當左右白得印之時豈不可就詰其人以得印所自邪答曰晉公處此必有說請自詳度寶曆二年上自即位以來欲幸東都宰相及朝臣諫者甚衆上皆不聽決意必行已令度支員外郎盧貞按視脩東都宮闕及道中行宮自長安歷華陝至洛沿道皆有行宮如華陰之瓊岳宮金城宮鄭縣之神臺宮陝縣之繡嶺宮澠池之芳桂宮福昌之福昌宮永寧之崎岫宮蘭峯宮壽安之連昌宮興泰宮是也國家本設兩都以備巡幸自多難以來茲事遂廢從千容翻難乃旦翻今宮闕營壘百司廨舍率已荒阤阤施是翻廢也陛下儻欲行幸宜命有司歲月間徐加完葺然後可往上曰從來言事者皆云不當往如卿所言不往亦可會朱克融王庭湊皆請以兵匠助脩東都三月丁亥敕以脩東都煩擾罷之史言脩東都之役非以㣥臣論諫而罷特畏幽鎮之稱兵而罷耳先是朝廷遣中使賜朱克融時服先悉薦翻克融以為疏惡執留敕使又奏當道今歲將士春衣不足乞度支給三十萬端匹又奏欲將兵馬及丁匠五千助脩宮闕上患之以問宰相欲遣重臣宣慰仍索敕使索山客翻裴度對曰克融無禮已甚殆將斃矣譬如猛獸自於山林中咆哮跳踉咆蒲交翻嘷也哮虛交翻闞也踉呂張翻又音郎久當自困必不敢輒離巢穴離力智翻願陛下勿遣宣慰亦勿索敕使旬日之後徐賜詔書云聞中官至彼稍失去就俟還朕自有處分時服有司製造不謹朕甚欲知之已令區處處昌呂翻分扶問翻其將士春衣從來非朝廷徵發皆本道自備朕不愛數十萬匹物但素無此例不可獨與范陽所稱助脩宮闕皆是虛語若欲直挫其姦宜云丁匠宜速遣來已令所在排比供擬比毗至翻彼得此詔必蒼黃失圖若且示含容則云脩宮闕事在有司不假丁匠遠來如是而已不足勞聖慮也上悅從之寶曆二年立才人郭氏為貴晉王普之母也寶曆二年橫海節度使李全略薨其子副大使同捷亶領留後重賂鄰道以求承繼為文宗討李同捷張本寶曆二年夏四月戊申以昭義留後劉從諫為節度使寶曆二年五月幽州軍亂殺朱克融及其子延齡果如裴度之言寶曆二年六月甲子上御三殿令左右軍教坊內園為擊毬手搏雜戲戲酣有斷臂碎首者夜漏數刻乃罷寶曆二年己卯上幸興福寺唐會要興福寺在脩德坊本王君廓宅貞觀八年太宗為太穆皇后追福立為弘福寺神龍元年改名元和十二年築夾城自雲韶門過芳林門西至脩德里以通於興福佛寺釋氏講說類談空有而俗講者又不能演空有之義徒以悅俗邀布施而已漵象呂翻寶曆二年癸未衡王絢薨絢順宗子音翾縣翻寶曆二年壬辰宣索左藏見在銀十萬兩金七千兩悉貯內藏以便賜與索山客翻貯丁呂翻藏徂浪翻見賢遍翻寶曆二年道士趙歸真說上以神仙僧惟貞齊賢正簡說上以禱祠求福說式芮翻皆出入宮禁上信用其言山人杜景先請徧歷江嶺求訪異人有潤州人周息元自言壽數百歲上遣中使迎之八月乙巳息元至京師潤州至京師二千八百二十一里館古玩翻寶曆二年朱延嗣既得幽州虐用其人都知兵馬使李載義與弟牙內兵馬使載寧共殺延嗣幷屠其家三百餘人載義權知留後九月數延嗣之罪以聞數所具翻載義承乾之後也承乾太宗長子以罪廢寶曆二年庚申魏博節度使史憲誠妄奏李同捷為軍士所逐走歸本道請束身歸朝尋奏同捷復歸滄州史言史憲誠玩侮朝廷公肆欺罔寶曆二年壬申以中書侍郎同平章事李程同平章事充河東節度使寶曆二年冬十月己亥嚴己改乙以李載義為盧龍節度使寶曆二年十一月甲申以門下侍郎同平章事李逢吉同平章事充山南東道節度使寶曆二年上遊戲無度狎暱㣥小暱尼質翻善擊毬好手搏好呼到翻下同禁軍及諸道爭獻力士又以錢萬緡付內園令召募力士晝夜不離側離力智翻又好深夜自捕狐狸性復褊急復扶又翻力士或恃恩不遜輒配流籍沒宦官小過動遭捶撻皆怨且懼十二月辛丑上夜獵還宮與宦官劉克明田務澄許文端及擊毬軍將蘇佐明王嘉憲石從寬閻惟直等二十八人飲酒上酒酣入室更衣更工衡翻殿上燭忽滅蘇佐明等弒上於室內年十八命翰林學士路隋草遺制以絳王悟權句當軍國事絳王悟憲宗子句古侯翻當丁浪翻壬寅宣遺制絳王見宰相百官於紫宸外廡克明等欲易置內侍之執權者於是樞密使王守澄楊承和中尉魏從簡梁守謙定議唐末謂兩樞密兩中尉為四貴自十六宅迎入宮也盡斬之克明赴井出而斬之絳王為亂兵所害時事起蒼猝守澄以翰林學士韋處厚博通古今一夕處置皆與之共議處昌呂翻守澄等欲號令中外而疑所以為辭處厚曰正名討罪於義何嫌安可依違有所諱避又問江王當如何踐阼處厚曰詰朝當以王教布告中外以已平內難詰去吉翻難乃旦翻然後㣥臣三表勸進以太皇太后令冊命即皇帝位當時皆從其言時不暇復問有司復扶又翻凡百儀法皆出於處厚無不叶宜癸卯以裴度攝冢宰百官謁見江王於紫宸外廡見賢遍翻王素服涕泣甲辰見諸軍使於少陽院少陽院以地望準之當在宮城東北隅太子居之亦謂之東宮今按閣本大明宮圖少陽院在浴堂殿東其北又有溫室宣徽清思太和珠鏡等殿不正在宮城東北隅也考異曰魏謩文宗實錄見軍使事承見百官下不云別日今從敬宗實錄皆流嶺南或邊地乙巳文宗即位更名昂更工衡翻戊申尊母蕭氏為皇太后王太后為寶曆太后是時郭太后居興慶宮王太后居義安殿蕭太后居大內上性孝謹事三宮如一自此以後凡言上者皆文宗也先薦郊廟次奉三宮然後進御蕭太后閩人也寶曆二年庚戌以翰林學士韋處厚為中書侍郎同平章事寶曆二年上自為諸王深知兩朝之弊謂穆敬兩朝也朝直遙翻下同勵精求治去奢從儉治直吏翻去羌呂翻詔宮女非有職掌者皆出之出三千餘人五坊鷹犬準元和故事量留校獵外悉放之量音良有司供宮禁年支物並準貞元故事省教坊翰林總監宀儿食千二百餘員總監苑總監也諸司內諸司也衣糧敬宗濫恩所加也占之贍翻悉歸之有司先宣索組繡彫鏤之物悉罷之鏤郎豆翻敬宗之世每月視朝不過一二上始復舊制每奇日未嘗不視朝奇紀宜翻隻也唐制天子以隻日視朝對宰相㣥臣延訪政事久之方罷待制官舊雖設之未嘗召對至是屢蒙延問其輟朝放朝皆用偶日中外翕然相賀以為太平可冀欲治之主不世出人君初政儻有一二足以新民視聽天下之所望重矣然卒無以副天下之望者魏高貴鄉公晉懷帝唐德宗文宗是也文宗元聖昭獻孝皇帝上之上寶曆太和元年太和元年丁未八二七寶曆太和元年春二月乙巳赦天下改元寶曆太和元年李同捷亶據滄景朝廷經歲不問去年三月李同捷亶領橫海留後三月壬戌朔遣掌書記崔從長奉表與其弟同志同巽俱入見見賢遍翻請遵朝旨寶曆太和元年上雖虛懷聽納而不能堅決與宰相議事已定尋復中變復扶又翻夏四月丙辰韋處厚於延英極論之因請避位上再三慰勞之勞力到翻寶曆太和元年忠武節度使王沛薨庚申以太僕卿高瑀為忠武節度使瑀音禹自大曆以來節度使多出禁軍其禁軍大將資高者皆以倍稱之息貸錢於富室倍者子錢倍於本錢稱者子本相侔也稱尺證翻動踰億萬然後得之未嘗由執政至鎮則重斂以償所負斂力贍翻及沛薨裴度韋處厚始奏以瑀代之中外相賀曰自今債帥鮮矣帥所類翻鮮息淺翻少也寶曆太和元年五月丙子以天平節度使烏重胤為橫海節度使以前橫海節度副使李同捷為兗海節度使朝廷猶慮河南北節度使搆扇同捷使拒命乃加魏博史憲誠同平章事丁丑加盧龍李載義平盧康志睦成德王庭湊檢校官寶曆太和元年鹽鐵使王播自淮南入朝力圖大用所獻銀器以千計綾絹以十萬計六月癸巳以播為左僕射同平章事寶曆太和元年秋七月癸酉葬睿武昭愍孝皇帝于莊陵莊陵在京兆三原縣西北五里寶曆太和元年李同捷託為將士所留不受詔乙酉武寧節度使王智興奏請將本軍三萬人自備五月糧以討同捷許之八月庚子削同捷官爵命烏重胤王智興康志睦史憲誠李載義與義成節度使李聽義武節度使張璠各帥本軍討之璠扶元翻帥讀曰率同捷遣其子弟以珍玩女妓賂河北諸鎮妓渠綺翻戊午李載義執其姪幷所賂獻之史憲誠與李全略為婚姻及同捷叛密以糧助之裴度不知其所為謂憲誠無貳心憲誠遣親吏至中書請事韋處厚謂曰晉公於上前以百口保爾使主裴度封晉國公節度使為一道之主故對其屬吏稱之為使主使疏吏翻但仰俟所為自有朝典耳憲誠懼不敢復與同捷通讀史者以為裴度於是時耄及之矣韋處厚較聰明不惟不知度亦不知處厚矣一推心以待之一明法以示之此正寬嚴相濟所以制御強藩復扶又翻王庭湊為同捷求節鉞不獲為于偽翻乃助之為亂出兵境上以撓魏師撓奴教翻又遣使厚賂沙陀酋長朱邪執宜欲與之連兵執宜拒不受酋慈由翻長知丈翻冬十月天平橫海節度使烏重胤擊同捷屢破之十一月丙寅重胤薨庚辰以保義節度使李寰為橫海節度使穆宗長慶三年以晉慈二州為保義軍寶曆太和元年十二月庚戌加王智興同平章事二年寶曆二年春三月己卯王智興攻棣州焚其三門寶曆二年自元和之末宦官益橫橫戶孟翻建置天子在其掌握穆宗及上皆宦官所立人莫敢言上章十二行本上上有辛巳二字乙十一行本同退齋校同張校同云無註本亦無親策制舉人賢良方正昌平劉蕡蕡符分翻對策極言其禍其略曰陛下宜先憂者宮闈將變社稷將危天下將傾海內將亂又曰陛下將杜篡弒之漸則居正位而近正人遠刀鋸之賤親骨鯁之直近其靳翻遠于願翻輔相得以專其任相息亮翻庶職得以守其官柰何以褻近五六人總天下大政禍稔蕭牆姦生帷幄臣恐曹節侯覽復生於今日曹節侯覽見漢桓帝紀復扶又翻忠賢無腹心之寄閽寺持廢立之權陷先君不得正其終致陛下不得正其始謂宦者弒敬宗而立上也春秋穀梁傳曰定元年春王不言正月定無正也定之無正何也昭公之終非正終也定之始非正始也昭無正終故定無正始威柄陵夷藩臣跋扈或有不達人臣之節首亂者以安君為名不究春秋之微稱兵者以逐惡為義微為春秋之微指也此二語蕡蓋慮夫強藩首亂稱兵以逐君側惡臣為名者征伐必自於諸侯昭宗之世岐汴交兵以誅宦官為名卒如劉蕡之言陛下何不塞陰邪之路屏褻狎之臣塞悉則翻屏必郢翻又卑正翻制侵陵迫脅之心復門戶掃除之役戒其所宜戒憂其所宜憂既不能治於前當治於後治直之翻既不能正其始當正其終則可以虔奉典謨克承丕構矣昔秦之亡也失於強暴漢之亡也失於微弱強暴則賊臣畏死而害上謂趙高也高亦宦者也謂外戚宦官蕡意專指宦官不翦其萌伏惟陛下深軫亡漢之憂以杜其漸蕡蓋謂敬宗以荒暴喪身又恐上以仁弱不能制宦官也三五之遐軌可追矣三五謂三皇五帝臣聞昔漢元帝即位之初更制七十餘事其略見二十八卷漢元帝初元元年二年其稱甚美然後紀綱日紊稱尺證翻紊音問國祚日衰姦宄日強黎元日困者以其不能擇賢明而任之失其操柄也引漢元以為戒者蓋以帝之去奢從儉似漢元而優遊不斷亦類漢元也陛下誠能揭國權以歸相持兵柄以歸將則心無不達行無不孚矣行下孟翻又曰法宜畫一官宜正名今分外官中官之員立南司北司之局百官赴南牙朝會者謂之外官亦謂之南司宦官列局於玄武門內兩軍中尉護諸營於苑中謂之中官亦謂之北司或正刑于外則破律於中法出多門人無所措實由兵農勢異而中外法殊也又曰今夏官不知兵籍止於奉朝請朝直遙翻六軍不主兵事止於養勳階兵部古夏官之職六軍上將軍大將軍將軍統軍皆以養勳階戎律附內臣之職謂觀軍容使及諸監軍使也疾文吏如仇讎足一蹈軍門視農夫如草芥謀不足以翦除兇逆而詐足以抑揚威福勇不足以鎮衞社稷而暴足以侵軼里閭羈絏藩臣軼徒結翻又音逸突也絏先列翻干陵宰輔隳裂王度汩亂朝經朝直遙翻張武夫之威上以制君父假天子之命下以御英豪有藏姦觀釁之心無伏節死難之義難乃旦翻豈先王經文緯武之旨邪又曰臣非不知言發而禍應計行而身戮蓋痛社稷之危哀生人之困豈忍姑息時忌竊陛下一命之寵哉周禮一命受職後世以授初品官為一命寶曆二年閏月丙戌朔史憲誠奏遣其子副大使唐都知兵馬使亓志紹將兵二萬五千趣德州討李同捷幵苦堅翻按考異從亓當音渠之翻二音皆姓也趣七喻翻考異曰實錄或作于志沼或作幵志沼或作亓志紹舊紀作幵志紹新紀傳作亓志沼今從之據考異紹當作沼時憲誠欲助同捷唐泣諫且請發兵討之憲誠不能違寶曆二年甲午賢良方正裴休李郃李甘杜牧馬植崔璵王式崔慎由等郃曷閣翻璵音余二十二人中第皆除官中竹仲翻考官左散騎常侍馮宿等見劉蕡策皆歎服而畏宦官不敢取詔下物論囂然稱屈囂虛驕翻喧也諫官御史欲論奏執政抑之李郃曰劉蕡下第我輩登科能無厚顏乃上疏以為蕡所對策漢魏以來無與為比今有司以蕡指切左右不敢以聞恐忠良道窮綱紀遂絕況臣所對不及蕡遠甚乞回臣所授以旌蕡直不報蕡由是不得仕於朝終於使府御史使府節度使幕府也御史幕僚所帶寄祿官亦謂之憲官佑之孫植勛之子杜佑歷德順憲三朝位至公輔馬勛見二百三十卷德宗貞元元年考異曰舊傳勛作曛誤也勛事見德宗實錄起之孫慎由融之玄孫也王起見二百四十一卷穆宗長慶元年崔融以文章顯於武后朝寶曆二年夏六月晉王普薨辛酉諡章十二行本諡作贈乙十一行本同悼懷太子寶曆二年初蕭太后幼去鄉里有弟一人上即位命福建觀察使求訪莫知所在有茶綱役人蕭洪凡茶商販茶各以若干為一綱而輸稅于官商人趙縝引之見太后近親呂璋之妻縝指忍翻亦不能辯與之俱見太后上以為得真舅甲子以為太子洗馬為蕭洪詐覺流死張本先悉薦翻寶曆二年峯州刺史王升朝叛庚辰安南都護武陵韓約討斬之舊志峯州至京師一萬一千五百里宋白曰峯州治嘉寧縣漢麊冷縣地武陵漢臨沅縣之地隋置武陵縣唐帶朗州朝直遙翻寶曆二年王庭湊陰以兵及鹽糧助李同捷上欲討之秋七月甲辰詔中書集百官議其事宰相以下莫敢違衞尉卿殷侑獨以為廷湊雖附凶徒事未甚露宜且含容專討同捷己巳下詔罪狀廷湊命鄰道各嚴兵守備聽其自新寶曆二年九月丁亥王智興奏拔棣州寶曆二年李寰自晉州引兵赴鎮不戢士卒所過殘暴至則擁兵不進但坐索供饋索山客翻庚寅以寰為夏綏節度使夏戶雅翻寶曆二年甲午詔削奪王庭湊官爵命諸軍四面進討寶曆二年加王智興守司徒以前夏綏節度使傅良弼為橫海節度使寶曆二年岳王緄薨緄順宗子音古本翻寶曆二年庚戌容管奏安南軍亂逐都護韓約寶曆二年冬十月洋王忻薨忻憲宗子寶曆二年魏博敗橫海兵於平原遂拔之敗補邁翻寶曆二年十一月癸未朔易定節度使柳公濟奏攻李同捷堅固寨拔之同捷築寨於滄州西以抗官軍以堅固為名時河南北諸軍討同捷久未成功每有小勝則虛張首虜以邀厚賞朝廷竭力奉之江淮為之耗弊寶曆二年傅良弼至陝而薨陝失冉翻乙酉以左金吾大將軍李祐為橫海節度使寶曆二年甲辰禁中昭德寺火天火曰災人火曰火燒死者數百人寶曆二年十二月丁巳王智興奏兵馬使李君謀將兵濟河破無棣無棣古齊國之北境周封太公賜履所至也漢為陽信縣界有無棣溝通海唐為無棣縣屬滄州九域志在州東南一百七里寶曆二年壬申中書侍郎同平章事韋處厚薨寶曆二年李同捷軍勢日蹙王庭湊不能救乃遣人說魏博大將亓志紹說式芮翻使殺史憲誠父子取魏博志紹遂作亂引所部兵二萬人還逼魏州丁丑命諫議大夫柏耆宣慰魏博且發義成河陽兵以討志紹寶曆二年戊寅以翰林學士路隋為中書侍郎同平章事寶曆二年辛巳史憲誠奏亓志紹兵屯永濟代宗大曆七年田承嗣分魏州之臨清置永濟縣屬貝州詔義成節度使李聽帥滄州行營諸軍以討志紹帥讀曰率容肇祖標點聶崇岐覆校
