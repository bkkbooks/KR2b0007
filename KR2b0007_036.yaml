body:
  text: 資治通鑑卷第三十六翰林學士朝散大夫右諫議大夫知制誥兼侍講同提舉萬壽觀公事兼判集賢院上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣奉敕編集後學天台音註漢紀二十八元始三年孝平皇帝下元始三年癸亥三元始三年春太后遣長樂少府夏侯藩宗正劉宏尚書令平晏納采見女婚有五禮納采問名納吉納徵請期陸德明曰采音七在翻擇也師古曰謂采擇其可者奏言公女漸漬德化漸音沾有窈窕之容窈窕幽閒也王肅曰善心曰窈善容曰窕奉祭祀太師光大司徒宮大司空豐左將軍孫建執金吾尹賞行太常事太中大夫劉秀及太卜太史令服皮弁素積百官表太常有太卜太史等令師古曰皮弁以鹿皮為冠形如人手之弁合也素積謂素裳也朱衣而素裳積謂襞績若今之巽為也巽音雛戀翻賢曰素積者積以為裳也言要中辟積也賈公彥曰皮弁之服十五升白布衣積素以為裳皆曰兆遇金水王相卦遇父母得位兆卜也封筮也孟康曰金水相生也張晏曰金王則水相也遇父母則泰卦乾下坤上天下於地是配享之卦師古曰王音于放翻原父曰但言父母得位安知是泰卦乎相息亮翻逢吉之符也洪範曰汝則從龜從筮從卿士從庶民從是之謂大同身其康強子孫其逢吉有司奏故事聘皇后黃金二萬斤為錢二萬萬莽深辭讓受六千三百萬而以其四千三百萬分予十一媵家及九族貧者九族上自高祖下至玄孫之親按漢書王莽傳故事聘皇后黃金二萬斤為錢二萬萬莽深辭讓受四千萬而以其三千三百萬予十一媵家㣥臣復言今皇后受聘踰㣥妾亡幾有詔復益二千三百萬為三千萬莽復以其千萬分予九族貧者又按杜佑通典聘后黃金二萬斤漢呂后為惠帝聘魯元公主故事也予讀曰與元始三年夏安漢公奏車服制度吏民養生送終嫁娶奴婢田宅器械之品立官稷元始元年莽號安漢公至是始書以冠事表其所從來者漸矣通鑑凡書權臣例始此如淳曰郊祀志已有官社未有官稷遂立官稷於官社之後臣瓚曰漢初除秦社稷立漢社稷其後又立官社配以夏禹而不立官稷師古曰淳瓚二說皆未盡也初立官稷於官社之後是為一處今更創置建於別所不相從也張晏曰聚邑落名也師古曰聚音才喻翻元始三年大司徒司直陳崇使張敞孫竦草奏師古曰草謂創立其文以為宜恢公國令如周公成王以周公有勳勞於天下封以曲阜地方七百里魯頌閟宮之詩曰王曰叔父建爾元子俾侯於魯魯公之封於魯也賜以附庸殷民六族大路大旂封父之繁弱夏后氏之璜祝宗卜史備物典策官司彞器白牡之牲郊望之禮周公六子封於凡蔣邢茅胙祭師古曰六子伯禽之弟也祭側界翻㣥公方議其事會呂寬事起初莽長子宇非莽隔絕衞氏隔絕事見上卷元年長知兩翻即私與衞寶通書教衞后上書謝恩上時掌翻下同因陳丁傅舊惡冀得至京師莽白太皇太后詔有司褒賞中山孝王后益湯沐邑七千戶衞后日夜啼泣思見帝面而但益戶邑宇復教令上書求至京師復扶又翻莽不聽宇與師吳章及婦兄呂寬議其故章以章甲十六行本以下有為字乙十一行本同莽不可諫而好鬼神好呼到翻可為變怪以驚懼之章因推類說令歸政衞氏推類者因變怪而推言事類如洪範五行傳以說莽也說輸芮翻門吏發覺之莽執宇送獄飲藥死宇妻焉懷子師古曰焉其名須產子已殺之師古曰須待也已訖也下詔曰公居周公之位輔成王之主而行管蔡之誅不以親親害尊尊朕甚嘉之莽盡滅衞氏支屬唯衞后在吳章要斬磔尸東市門要與腰同磔陟格翻裂也張也初章為當世名儒章治尚書經為博士弟子千餘人莽以為惡人黨皆當禁錮不得仕宦門人盡更名他師師古曰更以他人為師諱不言是章弟子更工衡翻姓譜䢵出自祝融之後為䢵國後去邑為云劾戶㮣翻棺斂葬之師古曰棺音工喚翻斂音力贍翻京師稱焉莽於是因呂寬之獄遂窮治黨與連引素所惡者悉誅之治直之翻下同惡烏路翻元帝女弟敬武長公主素附丁傅長知兩翻及莽專政復非議莽復扶又翻紅陽侯王立莽之尊屬立莽叔父也素剛直仁譚子也遣使迫守令自殺使疏吏翻下同令力丁翻莽白太后主暴病薨主言敬武公主莽固爭而止甄豐遣使者乘傳案治衞氏黨與傳知戀翻郡國豪桀及漢忠直臣不附莽章甲十六行本莽下有者字乙十一行本同孔本同皆誣以罪法而殺之何武鮑宣及王商子樂昌侯安涿郡王商相成帝者也何武不舉莽為大司馬鮑宣素有強項名王商與王鳳不協為所擠陷忿毒而死其子安不附王氏辛慶忌本王鳳所成莽見其三子皆能欲親厚之辛茂自以名臣子孫兄弟並顯列不宜附莽又不甚詘事甄豐甄邯伯亦辛氏之族故幷及禍海內震焉北海逢萌謂友人曰三綱絕矣莽殺其叔父又自殺其冢嫡是滅其天性也殺其君之祖姑又盡除忠直之臣是無君也故曰三綱絕矣逢皮江翻禍將及人即解冠掛東都城門萌時學於長安賢曰漢宮殿名東都門今名青門註又見昭紀將家屬浮海客於遼東莽召明禮少府宗伯鳳宗伯姓也鳳名也鳳明於禮官為少府少詩照翻白令公卿將軍侍中朝臣並聽說為人後者議不得顧私親師古曰白令皆聽之朝直遙翻厲諷厲也厲者磨錯垢故以就新取此義也師古曰塞止也塞悉則翻秺侯金日磾子賞都成侯金安上子常皆以無子國絕先悉薦翻秺音妬磾丁奚翻莽以章甲十六行本以下有日磾二字乙十一行本同孔本同張校同曾孫當及安上孫京兆尹欽紹其封當日磾曾孫也當宜為其父祖立廟晉灼曰當是賞弟建之孫此言當自為其父及祖父建立廟也為于偽翻章甲十六行本無也字乙十一行本同孔本也作事張校同如淳曰以賞故國君使大夫掌其祭事臣瓚曰當是支庶上繼大宗不得顧其私親也而欽令尊其父祖以續日磾不復為賞後而令大夫主掌祭事師古曰瓚說是甄邯時在旁廷叱欽因劾奏欽誣祖不孝大不敬下獄自殺劾戶㮣翻下遐稼翻無所阿私忠孝尤著益封千戶更封安上曾孫湯為都成侯湯受封日不敢還歸家以明為人後之誼元始三年是歲尚書令潁川鍾元為大理哀帝元壽二年復改廷尉為大理地理志陵陽縣屬丹陽郡行下孟翻謂掾史為師友掾俞絹翻有過輒閉閤自責終不大言郡中亂史言世降俗薄徒善不足以為政官屬數百人為設祖道為于偽翻詡據地哭掾史曰明府吉徵不宜若此詡曰吾哀潁川士身豈有憂哉我以柔弱徵必選剛猛代代到將有僵仆者師古曰僵偃也仆顛也僵音薑仆音赴詡至拜為美俗使者文穎曰宣美風化使者章甲十六行本守下有平陵二字乙十一行本同孔本同張校同何並為潁川太守並到郡捕鍾元弟威及陽翟輕俠趙季李款皆殺之郡中震栗地理志陽翟縣屬潁川郡翟音直格翻四年四年春正月郊祀高祖以配天宗祀孝文以配上帝師古曰郊祀祀於郊也宗尊也祀於明堂也上帝太微五帝也一曰昊天上帝也王肅曰上帝天也馬融曰上帝泰一之神在紫微宮天之最尊者杜佑曰元氣廣大則稱昊天人之所尊莫過於帝託之於天故稱上帝四年改殷紹嘉公曰宋公周承休公曰鄭公成帝綏和元年封殷紹嘉公進周承休侯爵為公為二王後四年詔婦女非身犯法及男子年八十以上七歲已下家非坐不道詔所名捕張晏曰名捕謂下詔所特捕也其當驗者即驗問師古曰就其所居而問四年二月丁未遣大司徒宮大司空豐等奉乘輿法駕迎皇后於安漢公第授皇后璽紱乘繩證翻續漢志皇后綬與乘輿同四采黃赤縹紺長丈九尺九寸五百首璽蓋亦玉璽也師古曰紱所以繫璽音弗考異曰王莽傳云四月丁未平紀云二月丁未立皇后王氏下云夏皇后見于高廟外戚傳云明年春迎皇后於安漢公第然則言四月者誤也入未央宮大赦天下四年遣太僕王惲等八人各置副假節副副使也惲等持節其副則假之以節惲於粉翻行下孟翻覽觀風俗四年夏太保舜等及吏民上書者八千餘人咸請如陳崇言加賞於安漢公章下有司下遐稼翻下同有司請益封公以召陵新息二縣及黃郵聚新野田新息召陵二縣屬汝南郡續漢志南陽郡新野縣有東鄉故新都王莽所封也又有黃郵聚聚才諭翻加公為宰衡伊尹曰阿衡周公位冢宰稱尺證翻三公言事稱敢言之賜公太夫人號曰功顯君莽母也臨為賞都侯莽封新都侯析其國名二字加褒賞以封其二子合為一萬萬以明大禮太后臨前殿親封拜安漢公拜前二子拜後如周公故事成王之侯伯禽於魯也周公拜前魯公拜後稽音啟出奏封事願獨受母號還安臨印韍及號位戶邑韍即紱音弗事下下遐稼翻太師光等皆曰賞未足以直功師古曰直當也公之常節終不可聽忠臣之節亦宜自屈而伸主上之義宜遣大司徒大司空持節承制詔公亟入視事詔尚書勿復受公之讓奏復扶又翻下同奏可莽乃起視事止減召陵黃郵新野之田而已莽復以所益納徵錢千萬遺太后左右奉共養者遺于季翻下同白虎通曰納徵用玄纁共居用翻養弋向翻莽雖專權然所以誑耀媚事太后下至旁側長御方故萬端賂遺以千萬數白尊太后姊妹號皆為君食湯沐邑姊君挾為廣恩君君力為廣惠君君弟為廣施君譽音余莽又知太后婦人厭居深宮中莽欲虞樂以市其權樂音洛乃令太后四時車駕巡狩四郊張晏曰市權者以遊觀之樂易其權若市賈然師古曰虞與娛同邑外謂之郊近二十里也仲馮曰言郊不必二十里也所至屬縣輒施恩惠賜民錢帛牛酒歲以為常太后旁弄兒病在外舍服虔曰官婢侍史生兒取以作弄兒也其欲得太后意如此太保舜奏言天下聞公不受千乘之土古者諸公之國地方百里出兵車千乘謂聘后之幣也鄉讀曰嚮蜀郡男子路建等輟訟慚怍而退雖文王卻虞芮何以加師古曰卻退也虞芮二國名也並在河之東二國之君爭田不平聞文王之德乃往斷焉入周之竟則耕者讓畔行者讓路乃相謂曰我小人也不可以履君子之庭遂相讓以其所爭為閒田而退怍才各翻章甲十六行本下下有奏可二字乙十一行本同孔本同張校同於是孔光愈恐固稱疾辭位太后詔太師毋朝朝直遙翻十日一入省中置几杖賜餐十七物然後歸官屬按職如故師古曰食具有十七種物言十日一入朝受此寵禮他日則常在家自養而其屬官依常各行職務四年莽奏起明堂辟雍靈臺應劭曰明堂所以正四時出教化明堂上圓下方八窗四達布政之宮在國之陽上八窗法八風四達法四時九室法九州十二種法十二月三十六戶法三十六雨七十二牖法七十二風黃帝曰合宮有虞曰總章殷曰陽館周曰明堂辟雍者象璧圜之以水象教化流行大戴禮明堂以茅蓋上圓下方天子曰靈臺諸侯曰觀臺以望氣書雲物為于偽翻制度甚盛立樂經益博士員經各五人徵天下通一藝教授十一人以上及有逸禮古書天文圖讖張衡曰圖讖虛妄非聖人之法劉向父子領校祕書閱定九流亦無讖錄成哀之後乃始聞之孟康曰史籀所作十五篇古文書也師古曰周宣王太史史籀所作大篆書也籀直救翻皆詣公車網羅天下異能之士前後至者千數皆令記說廷中將令正乖謬壹異說云令各造廷中而記其說也又徵能治河者以百數治直之翻其大略異者長水校尉平陵關並姓譜關夏大夫關龍逢之後風俗通關令尹喜之後河決率常於平原東郡左右其地形下而土疏惡疏音疎聞禹治河時本空此地以為水猥盛則放溢少稍自索少詩沼翻師古曰猥多也索盡也音先各翻雖時易處猶不能離此離力智翻上古難識近察秦漢以來河決曹衞之域漢之濟陰定陶故曹國也東郡及魏郡黎陽古衞地也可空此地勿以為官亭民室而已御史臨淮韓牧以為可略於禹貢九河處穿之縱不能為九但為四五宜有益大司空掾王橫言河入勃海地高於韓牧所欲穿處往者天常連雨東北風海水溢西南出寖數百里九河之地已為海所漸矣師古曰漸寖也讀如本字又音子廉翻禹之行河水本隨西山下東北去師古曰行謂通流也河徙如淳曰譜音補世統譜諜也則今所行非禹之所穿也又秦攻魏決河灌其都事見七卷秦始皇二十二年不可復補復扶又翻宜卻徙完平處更開空空音孔師古曰空猶穿使緣西山足乘高地而東北入海乃無水災西山謂黎陽以西諸山為甄豐言為于偽翻下同凡此數者必有一是宜詳考驗皆可豫見計定然後舉事費不過數億萬亦可以事諸浮食無產業民師古曰事謂役使也同當衣食衣食縣官而為之作乃兩便師古曰言無產業之人端居無為及發行力役俱須衣食耳今縣官給其衣食而使修治河水是為公私兩便也下除民疾時莽但崇空語無施行者四年㣥臣奏言昔周公攝政七年制度乃定今安漢公輔政四年營作二句大功畢成宜升宰衡位在諸侯王上詔曰可仍令議九錫之法應劭曰九錫一曰車馬二曰衣服三曰樂器四曰朱戶五曰納陛六曰虎賁百人七曰鈇鉞八曰弓矢九曰秬鬯此皆天子制度尊之故事事錫與但數少耳張晏曰九錫經本無文周禮以為九命春秋說有之臣瓚曰九錫備物霸者之盛禮齊桓晉文猶不能備鄭玄曰按九錫之名古無有也王制三公一命袞若有加則賜也不過九命孔穎達曰鄭意以為九命之外別加九賜案禮緯含文嘉上列九錫之差下云四方所瞻之成侯子所望宋均註云九賜者乃四方所共見公侯伯子男所希望孔引含文嘉所謂九錫與應劭同獨樂器曰樂則耳宋均註云進退有節行步有度賜之車馬以代其步言成文章行成法則賜之衣服以表其德長於教訓內懷至仁賜之樂則以化其民居處修理房內不渫賜之朱戶以明其別動作有禮賜之納陛以安其體勇猛勁疾執義堅強賜之虎賁以備非常亢揚威武志在宿衞賜之斧鉞使得專殺內懷仁德執義不傾賜之弓矢使得專征孝慈父母賜之秬鬯以事先祖四年莽奏尊孝宣廟為中宗孝元廟為高宗又奏毀孝宣皇考廟勿脩宣帝元康元年尊悼園曰皇考南陵文帝母薄太后陵雲陵昭帝母趙太后陵四年莽自以北化匈奴東致海外南懷黃支莽自奏曰越裳氏重譯獻白雉黃支自三萬里貢生犀東夷王渡大海奉國珍匈奴單于順制作去二名乃遣中郎將平憲等多持金幣誘塞外羌使獻地願內屬憲等奏言羌豪良願等種可萬二千人願為內臣種章勇翻獻鮮水海允谷鹽池地理志金城郡臨羌縣西北至塞外有西海鹽池闞駰云西有卑禾羌海即獻王莽地為西海郡者也酈道元曰世謂之青海東去西平二百五十里皆與漢民自居險阻處為藩蔽問良願降意降戶江翻對曰太皇太后聖明安漢公至仁天下太平五穀成孰或禾長丈餘長直亮翻或一粟三米或不種自生或繭不蠶自成甘露從天下醴泉自地出鳳皇來儀神爵降集從四歲以來謂自莽輔政以來也故思樂內屬宜以時處業處謂度地以處之業謂使各有作業也樂音洛處昌呂翻事下莽莽復奏下遐稼翻今已有東海南海北海郡請受良願等所獻地為西海郡分天下為十二州應古制奏可冬置西海郡考異曰王莽傳置西海郡在明年秋今從平紀犯者徙之西海徙者以千萬數民始怨矣四年梁王立坐與衞氏交通廢徙南鄭自殺衞氏帝外家也四年分京師置前煇光後丞烈二郡前煇光蓋領長安以南諸縣後丞烈蓋領長安以北諸縣也更工衡翻分界郡國所屬罷置改易天下多事吏不能紀矣五年五年春正月祫祭明堂應劭曰禮五年而再殷祭壹禘壹祫祫祭者毀廟之主皆合食於太祖師古曰祫音合列侯百二十人宗室子九百餘人徵助祭禮畢皆益戶賜爵及金帛增秩補吏各有差已封者益戶未有爵者賜爵已有爵者賜金帛已有秩者增秩未有官者補吏五年安漢公又奏復長安南北郊三十餘年間天地之祠凡五徙焉成帝建始元年罷甘泉泰畤汾陰后土祠作長安南北郊永始三年復甘泉汾陰成帝崩皇太后詔復長安南北郊哀帝建平三年復甘泉汾陰今又復南北郊是五徙也五年詔曰宗室子自漢元至今十餘萬人其令郡國各置宗師以糾之漢元漢初也師古曰糾謂禁察也五年夏四月乙未博山簡烈侯孔光薨贈賜葬送甚盛車萬餘兩兩音亮以馬宮為太師五年吏民以莽不受新野田而上書者前後四十八萬七千五百七十二人及諸侯王公列侯宗室見者見賢遍翻皆叩頭言宜亟加賞於安漢公於是莽上書言諸臣民所上章下議者事章乙十一行本事作願孔本同甲十六行本事作以皆寢勿上上時掌翻下遐稼翻使臣莽得盡力畢制禮作樂事成願賜骸骨歸家避賢者路言久處大位妨賢者進用之路避位所以避賢者路也詔曰公每見輒流涕叩頭言願不受賞賞即加不敢當位方制作未定事須公而決故且聽公制作畢成㣥公以聞究于前議師古曰究竟也五月策命安漢公莽以九錫莽稽首再拜受綠韍袞冕衣裳師古曰此韍謂蔽膝也或謂韍韡韍音弗韡音畢孟康曰瑒玉名也佩刀之飾上曰琫下曰珌詩云鞞琫有珌是也毛傳曰鞞容刀鞞也琫上飾珌下飾天子玉琫而珧珌諸侯璗琫而璆珌陸云鞞刀室也琫佩刀削上飾珌佩刀下飾爾雅云黃金謂之璗說文云璗金之美與玉同色者也師古曰瑒音蕩琫音布孔翻珌音必孟康曰今齊祀履頭飾也出履三寸師古曰其形岐頭句音巨俱翻師古曰鸞路車之施鸞者也四馬曰乘音食證翻周禮交龍為旂爾雅有鈴曰旂旒旂之末垂也戎路乘馬師古曰戎路戎車也師古曰彤赤色盧黑色右建金戚師古曰鉞戚皆斧屬冑兜鍪秬鬯香酒也周禮春官鬯人註云釀秬為酒秬如黑黍一稃二米陸佃埤雅曰說文鬯以秬釀鬱草芬芳攸服以降神也舊說芬芳條暢故謂之鬯禮以鬱合鬯言鬱於中而鬯於外也又曰先鄭小毛以為鬯香草也築而煮之為鬯秬者百穀之華鬯者百草之英故先王煮以合鬯卣中樽也秬音巨卣音攸又音羊久翻九命青玉珪二師古曰圭瓚以圭為勺末上公九命青者春色東方生而長育萬物也朱戶以居納陛以登孟康曰納內也謂鑿殿基際為陛不使露也師古曰孟說是也尊者不欲露而升陛故納之於霤下也放周公也成王之命周公祝宗卜史杜預曰太祝宗人太卜太史凡四官孔安國曰虎賁勇士稱也若虎賁戰言其猛也賁音奔五年王惲等八人使行風俗還惲於粉翻行下孟翻下同言天下風俗齊同詐為郡國造歌謠頌功德凡三萬言閏月丁酉詔以羲和劉秀等四人使治明堂辟雍治直之翻令漢與文王靈臺周公作洛同符詩曰經始靈臺經之營之庶民攻之不日成之周公營成周曰其作大邑其自時配皇天中乂宣明德化萬國齊同皆封為列侯四人者劉秀紅休侯平晏防鄉侯孔永寧鄉侯孫遷定鄉侯八人者王惲常鄉侯閻遷望鄉侯陳崇南鄉侯李翕邑鄉侯郝黨亭鄉侯謝殷章鄉侯逯普蒙鄉侯陳鳳盧鄉侯考異曰恩澤侯表劉歆等十一侯皆云丁酉獨平晏云丁丑按十二人同功俱封是年閏五月甲午朔無丁丑表誤時廣平相班穉獨不上嘉瑞及歌謠班穉時相廣平王漢武帝征和二年於廣平置平干國宣帝五鳳二年復曰廣平上時掌翻下同甄豐遣屬馳至兩郡續漢志大司空掾屬二十九人掾比三百石屬比二百石杜佑曰正曰掾副曰屬師古曰遣言祥應而隱除災害閎空造不祥穉絕嘉應嫉害聖政皆不道劾戶㮣翻班倢伃弟也倢伃音接予不宣德美宜與言災害者異罰且班穉後宮賢家我所哀也師古曰班倢伃有賢德故哀閔其家誅下遐稼翻穉懼上書陳恩謝罪陳恩者自陳述世受國恩入補延陵園郎園郎掌守園寢門戶五年莽又奏為市無二賈師古曰言純質也賈讀曰價邑無盜賊野無飢民道不拾遺男女異路之制犯者象刑師古曰白虎通云象者其衣服象五刑也犯墨者蒙犯劓者以赭著其衣犯髕者以墨蒙其髕象而畫之犯宮者屝犯大辟者布衣無領屝草屨也臏音頻忍翻屝音扶味翻五年莽復奏言共王母丁姬前不臣妾師古曰言不遵臣妾之道復扶又翻共音恭賈公彥曰爾雅山頂冢則山冢之冢封土為丘壠曰冢則冢墓之冢冢知隴翻師古曰懷謂挾之以自隨也璽斯氏翻綬音受取其璽綬徙共王母歸定陶葬共王冢次太后以為既已之事不須復發復扶又翻莽固爭之太后詔因故棺改葬之莽奏共王母及丁姬棺皆名梓宮珠玉之衣謂之梓宮者以香梓為之言猶生時所居宮室也珠玉之衣珠襦玉匣也請更以木棺代更工衡翻下同去珠玉衣去羌呂翻葬丁姬媵妾之次奏可公卿在位皆阿莽指入錢帛遣子弟及諸生四夷凡十餘萬人操持作具作具畚鍤之類操七刀翻二旬間皆平莽又周棘其處以為世戒云師古曰以棘周繞也諸造議者泠褒段猶章甲十六行本猶下等字乙十一行本同孔本同皆徙合浦褒猶奏見三十三卷哀帝建平元年考異曰師丹傳云復免高昌侯宏為庶人按功臣表建平四年董宏已死元壽二年子武坐父為佞邪免不得至今丹傳誤也徵師丹詣公車賜爵關內侯食故邑數月更封丹為義陽侯丹建平元年罷歸故邑高樂侯戶邑也恩澤侯表義陽侯國於南陽新野考異曰恩澤侯表丹元始三年二月癸巳更為義陽侯胡旦因此幷發傅太后陵徙泠褒等事俱著之三年按外戚傳云元始五年莽發共王母及丁姬冢改葬之馬宮傳莽發傅太后陵追誅前議者宮慙懼乃乞骸骨公卿表宮以今年八月壬午免然則褒等徙合浦及丹封侯皆在今年明矣按長曆二月丙申朔無癸巳日月必有誤者薨初哀帝時馬宮為光祿勳與丞相御史雜議傅太后諡曰孝元傅皇后及莽追誅前議者宮為莽所厚獨不及宮內慙懼上書言臣前議定陶共王母諡希指雷同詭經僻說師古曰詭違也為臣不忠幸蒙洒心自新師古曰洒音先禮翻誠無顏復望闕庭無心復居官府無宜復食國邑宮封扶德侯邑於琅邪贛榆復扶又翻避賢者路上時掌翻下同八月壬午莽以太后詔賜宮策曰四輔之職為國維綱三公之任鼎足承君不有鮮明固守無以居位鮮明猶言精明也不敢文過朕甚多之師古曰多猶重也其上太師大司徒印綬使者上印綬於使者也五年莽以皇后有子孫瑞通子午道張晏曰時年十四始有婦人之道也子水午火也水以天一為牡火以地二為牝故火為水今通子午以協之案男八月生齒八歲毀齒二八十六陽道通八八六十四陽道絕女七月生齒七歲毀齒二七十四陰道通七七四十九陰道絕徑漢中師古曰子北方也午南方也言通南北道相當故謂之子午耳今京城直南山有谷通梁漢道者名子午谷又宜州西界慶州東界有山名子午嶺計南北直相當此則北山是子南山是午共為子午道仲馮曰史文自以從杜陵徑漢中為子午道耳顏說非史意也三秦記長安正南山名秦嶺谷名子午一名樊川一名御宿五年泉陵侯劉慶上書師古曰衆陵節侯賢長沙定王子本始四年戴侯真定嗣二十二年薨黃龍元年頃侯慶嗣此則是也莽傳及翟義傳並云泉陵地理志泉陵縣屬零陵郡而表作衆陵表為誤也周成王幼小章甲十六行本小作少下有稱孺子三字乙十一行本同孔本同張校同周公居攝今帝富於春秋宜令安漢公行天子事如周公㣥臣皆曰宜如慶言五年時帝春秋益壯以衞后故怨不悅謂衞后不得至京師其族皆死徙故不悅十二月莽因臘日上椒酒上時掌翻置毒酒中帝有疾莽作策請命於泰畤願以身代藏策金縢置于前殿敕諸公勿敢言師古曰詐依周公為武王請命作金縢也書曰周公納策金縢之匱中孔安國曰為請命之書藏之於匱緘之以金不欲人開之孔穎達曰縢是縛約之名丙午帝崩于未央宮臣瓚曰帝年九歲即位即位五年壽十四莽令天下吏六百石以上皆服喪三年奏尊孝成廟曰統宗孝平廟曰元宗斂孝平加元服斂力贍翻葬康陵臣瓚曰康陵在長安北六十里班固贊曰孝平之世政自莽出褒善顯功以自尊盛觀其文辭方外百蠻無思不服休徵嘉應頌聲並作至於變異見於上見賢遍翻民怨於下莽亦不能文也如淳曰不可復文飾也五年以長樂少府平晏為大司徒五年太后與㣥臣議立嗣時元帝世絕而宣帝曾孫有見王五人王之見在者五人淮陽王縯中山王成都楚王紆信都王景東平王開明也見賢遍翻廣戚侯顯陽興侯寄陵陽侯嘉高樂侯修平邑侯閔平纂侯況合昌侯輔伊鄉侯開就鄉侯不害膠鄉侯武宜鄉侯恢昌城侯豐樂安侯禹陶鄉侯恢釐鄉侯褒昌鄉侯且新鄉侯鯉郚鄉侯光新城侯武宜陵侯封堂鄉侯護成陵侯由成陽侯衆復昌侯休安陸侯平梧安侯譽朝鄉侯充扶鄉侯普方城侯宣當陽侯益廣城侯疌春城侯允呂鄉侯尚李鄉侯殷宛鄉侯隆壽泉侯承杏山侯遵嚴鄉侯信武平侯璜陵鄉侯曾武安侯㥅富陽侯萌西陽侯偃桃鄉侯立栗鄉侯玄成金鄉侯不害平通侯且西安侯漢湖鄉侯開重鄉侯少柏凡五十人而廣戚侯顯孺子之父栗鄉侯玄成先已免侯止四十八人耳師古曰疌音竹二翻㥅音受惡烏路翻長知兩翻下同曰兄弟不得相為後乃悉徵宣帝玄孫選立之是月前煇光謝囂奏武功長孟通浚井得白石武功縣本屬扶風莽分屬前煇光師古曰浚抒治之也囂音許驕翻浚音峻抒音直呂翻有丹書著石師古曰著音直略翻文曰告安漢公莽為皇帝符命之起自此始矣莽使㣥公以白太后太后曰此誣罔天下不可施行太保舜謂太后曰事已如此無可柰何沮之力不能止沮慈呂翻又莽非敢有他但欲稱攝以重其權填服天下耳師古曰填音竹刃翻太后心不以為可然力不能制乃聽許舜等即共令太后下詔曰孝平皇帝短命而崩已使有司徵孝宣皇帝玄孫二十三人差度宜者師古曰差度謂擇也度音大各翻玄孫年在襁褓不得至德君子孰能安之安漢公莽輔政三世與周公異世同符今前煇光囂武功長通上言丹石之符朕深思厥意云為皇帝者乃攝行皇帝之事也其令安漢公居攝踐祚如周公故事祚位也於是㣥臣奏言太后聖德昭然深見天意詔令安漢公居攝臣請安漢公踐祚服天子韍冕背斧依立於戶牖之間背蒲妹翻鄭氏曰斧依為斧文屏風師古曰依讀曰扆音於豈翻南面朝㣥臣聽政事朝直遙翻下同車服出入警蹕民臣稱臣妾皆如天子之制郊祀天地宗祀明堂共祀宗廟享祭㣥神贊曰假皇帝師古曰贊者謂祭祝之辭共音恭余謂此贊固主於祭祝若朝會亦有贊者所謂贊拜贊謁是也自稱曰予平決朝事朝直遙翻常以皇帝之詔稱制以奉順皇天之心輔翼漢室保安孝平皇帝之幼嗣遂寄託之義寄託謂寄以天下託以孤幼也師古曰遂成也治直吏翻其朝見太皇太后帝皇后皆復臣節見賢遍翻帝皇后謂平帝后也復如字反也還也自施政教於章甲十六行本於下有其字乙十一行本同孔本同宮家國采宮者謂以安漢公第為宮也家者謂其家也國者謂其所封新都國也采謂以武功縣為采地名曰漢光邑也師古曰采官也以官受地故謂之采采音七在翻又音七代翻太后詔曰可王莽上字巨君孝元皇后之弟子也莽父曼祖禁禁武帝繡衣御史賀之子也居攝元年丙寅六莽既攝政遂改元為居攝五年春正月王莽祀上帝於南郊又行迎春大射養老之禮上無天子通鑑不得不以王莽繫年不書假皇帝而直書王莽者不與其攝也及其既纂也書莽不與其篡也呂后武后書太后其義亦然五年三月己丑立宣帝玄孫嬰為皇太子號曰孺子亦因周公輔成王二叔流言曰公將不利於孺子而為此號廣戚侯顯之子也楚孝王子勳封廣戚侯顯則勳之子也地理志沛郡有廣戚侯國託以卜相最吉立之相息亮翻尊皇后曰皇太后五年以王舜為太傅左輔甄豐為太阿右拂師古曰拂讀曰弼甄邯為太保後承又置四少秩皆二千石四少少師少傅少阿少保也少詩照翻五年四月安衆侯劉崇師古曰安衆康侯丹長沙定王子崇即丹玄孫之子也見王子侯表地理志安衆侯國屬南陽郡故宛西鄉也安漢公莽必危劉氏天下非之莫敢先舉此乃宗室之恥也吾帥宗族為先海內必和帥讀曰率和戶臥翻紹等從者百餘人遂進攻宛宛南陽郡治所宛於元翻紹從弟竦與崇族父嘉詣闕自歸莽赦弗罪從才用翻竦因為嘉作奏為于偽翻稱莽德美罪狀劉崇願為宗室倡始師古曰倡音先向翻父子兄弟負籠荷鍤師古曰籠所以盛土鍤鍫也荷下可翻又音何豬崇宮室令如古制古者畔逆之國既伏其罪則豬其宮室以為汙池師古曰豬謂畜水也以賜諸侯用永監戒武王勝殷分亳社以班諸侯四牆其社覆上棧下使不得通陰陽之氣所以著亡國之戒也說讀曰悅封嘉為率禮侯嘉子七人皆賜爵關內侯後又封竦為淑德侯長安為之語曰欲求封過張伯松師古曰伯松張竦之字不如巧為奏自後謀反章甲十六行本反下有者字乙十一行本同孔本同張校同皆汙池云師古曰汙下也音烏㣥臣復白劉崇等謀逆者以莽權輕也復扶又翻宜尊重以填海內填竹刃翻五月甲辰太后詔莽朝見太后稱假皇帝朝直遙翻見賢遍翻五年冬十月丙辰朔日有食之五年十二月㣥臣奏請以安漢公廬為攝省府為攝殿第為攝宮奏可廬殿中止宿之舍府治事之所第所居也五年是歲西羌龐恬傅幡等師古曰幡音敷元翻怨莽奪其地反攻西海太守程永永奔走莽誅永遣護羌校尉竇況擊之二年二年春竇況等擊破西羌二年五月更造貨更工衡翻錯刀一直五千契刀一直五百大錢一直五十食貨志錯刀以黃金錯其文曰一刀直五千契刀其環如大錢身形如刀長二寸文曰契刀五百大錢徑寸二分重十二銖文曰大錢五十張晏曰案今所見契刀錯刀形質如大錢而肉好輪厚異於此大錢形如大刀環矣契刀身形圓不長二寸也其文左曰契右曰刀無五百字也錯刀則刻之作字也以黃金填其文上曰一下曰刀二刀泉甚不與志相應也似札單差錯文字磨滅故耳師古曰張說非也王莽錢刀今並尚在形質及文與志相合無差錯也索隱曰錢本名泉以貨之流布如泉布者言貨流布刀以其利於人也民多盜鑄者禁列侯以下不得挾黃金輸御府受直百官表少府有御府令丞師古曰御府主天子衣服卒子恤翻二年東郡太守翟義方進之子也翟直格翻與姊子上蔡陳豐謀曰地理志上蔡縣屬汝南郡新都侯攝天子位號令天下故擇宗室幼稚者以為孺子故意為之曰故稚直利翻且以觀望師古曰言漸試天下人心其漸可見方今宗室衰弱外無強蕃天下傾首服從莫能亢扞國難亢口浪翻禦也扞戶榦翻難乃旦翻吾幸得備宰相子身守大郡父子受漢厚恩義當為國討賊以安社稷為于偽翻欲舉兵西誅不當攝者選宗室子孫輔而立之設令時命不成死國埋名師古曰埋名謂身埋而名立今欲發之汝肯從我乎豐年十八勇壯許諾義遂與東郡都尉劉宇嚴鄉侯劉信信弟武平侯劉璜結謀信璜皆東平煬王雲子嚴鄉武平二國蓋皆在東郡璜胡光翻地理志觀縣屬東郡本曰畔觀應劭曰夏有觀扈世祖改為衞公國以封周後師古曰觀音工喚翻募郡中勇敢部署將帥信子匡時為東平王乃幷東平兵立信為天子義自號大司馬柱天大將軍移檄郡國言莽鴆殺孝平皇帝攝天子位欲絕漢室今天子已立共行天罰師古曰共讀曰恭郡國皆震比至山陽衆十餘萬比必寐翻莽聞之惶懼不能食太皇太后謂左右曰人心不相遠也師古曰言所見者同亦知莽必以此自危莽乃拜其黨親孫建劉宏竇況莽之黨也王邑王駿王況王昌莽之親也光祿勳成都侯王邑為虎牙將軍明義侯王駿為強弩將軍春王城門校尉王況為震威將軍師古曰春王長安城東出北頭第一門也本名宣平門莽改名焉余按漢城門校尉掌十二城門觀此則莽改官名十二城門各置城門校尉平帝元始四年莽更名宗正為宗伯莽更少府曰共工此中少府蓋長樂少府也以職在宮中故曰中少府凡七人自擇除關西人為校尉軍吏將關東甲卒發奔命以擊義焉校戶教翻將即亮翻復以太僕武讓為積弩將軍屯函谷關復扶又翻下同將作大匠蒙鄉侯逯並為橫壄將軍屯武關師古曰逯姓也並名也逯音錄又音鹿今東郡有逯姓二音並得書本逯字或作逮今河朔有逮姓自呼音徒戴翻其義兩通屯宛宛於元翻三輔聞翟義起自茂陵以西至汧地理志汧縣屬右扶風音口堅翻賢曰汧故城在隴州汧源縣南二十三縣盜賊並發槐里男子趙朋霍鴻等自稱將軍攻燒官寺殺右輔都尉及斄令地理志右輔都尉治郿郿與斄縣皆屬扶風斄周后稷所封邑也師古曰斄與邰同音胎諸將精兵悉東京師空可攻長安衆稍多至十餘萬火見未央宮前殿見賢遍翻莽復拜衞尉王級為虎賁將軍賁音奔大鴻臚望鄉侯閻遷為折衝將軍西擊朋等以常鄉侯王惲為車騎將軍屯平樂館樂音洛騎都尉王晏為建威將軍屯城北城門校尉趙恢為城門將軍皆勒兵自備以太保後承承陽侯甄邯為大將軍承陽之承音烝受鉞高廟領天下兵左杖節右把鉞屯城外王舜甄豐晝夜循行殿中行下孟翻莽日抱孺子禱郊廟會㣥臣稱曰昔成王幼周公攝政而管蔡挾祿父以畔師古曰祿父紂子也父讀曰甫自古大聖猶懼此況臣莽之斗筲師古曰斗筲諭材器小也不遭此變不章聖德冬十月甲子莽依周書作大誥師古曰武王崩周公相成王而三監及淮夷叛周公作大誥莽自比周公故依倣其事粵其聞日孟康曰翟義反書上聞日也師古曰粵發語辭孟康曰諸劉見在者孟康曰民之表儀謂賢者也師古曰我用此宗室之儁及獻儀者共圖謀國事終成其功以當反位孺子之意諸將東至陳留菑孟康曰菑故戴國在梁後屬陳留今曰考城陳留風俗傳曰菑縣秦之穀縣也遭漢兵起邑多菑年故改曰菑縣章帝東巡過縣詔曰陳留菑縣其名不善其改曰考城破之斬劉璜首莽大喜復下詔先封車騎都尉孫賢等五十五人皆為列侯即軍中拜授因大赦天下於是吏士精銳遂攻圍義於圉城十二月大破之義與劉信棄軍亡至固始界中捕得義尸磔陳都市卒不得信地理志圉固始陳三縣皆屬淮陽國賢曰圉故城在今汴州雍丘縣東南卒子恤翻始初元年戊辰八是年十一月莽始改元始初二年春地震大赦天下二年王邑等還京師西與王級等合擊趙朋霍鴻二月朋等殄滅諸縣息平還師振旅莽乃置酒白虎殿勞賜將帥勞力到翻詔陳崇治校軍功第其高下治直之翻校古效翻依周制爵五等以封功臣為侯伯子男凡三百九十五人曰皆以奮怒東指西擊羌寇蠻盜反虜逆賊不得旋踵應時殄滅天下咸服之功封云其當賜爵關內侯者更名曰附城又數百人項安世家說曰王莽封諸侯置附城漢人蓋以城解墉也古文庸即墉字後人加土以別之不成國者謂之附城猶今言支郡為屬城也余按王制不能五十里者不達於天子附於諸侯曰附庸鄭註曰小城曰附庸附庸者以國事附於大國正義曰庸城也謂小國之城不能自通以其國事附於大國故曰附庸項說本諸此更工衡翻燒其棺柩柩音舊夷滅三族誅及種嗣種章勇翻嗣祥吏翻至皆同阬以棘五毒幷葬之如淳曰五毒野葛狼毒之屬翟方進本汝南上蔡人聚之通路之旁濮陽無鹽圉槐里盩厔凡五所濮陽無鹽圉義黨之尸也槐里盩厔朋鴻黨之尸也盩厔音舟窒師古曰表者所以標明也反虜逆賊魚畺鯢師古曰魚畺鯢大魚為害者也以此比敵人之勇桀者崔豹古今註鯨大者長千里小者數丈一生數萬子常以五六月就岸生子至七八月導從其子還大海中鼓浪成雷噴沫成雨水族驚畏一皆逃匿莫敢當其雌曰鯢大者亦長千里蓋鯨鯢有力能驅食小魚故以喻夫強暴而淩弱者而導從數萬子跋扈大海中亦有渠魁之義魚畺古鯨字音其京翻鯢五奚翻莽於是自謂威德日盛章甲十六行本盛下有大獲天人之助六字乙十一行本同孔本同張校同退齋校同遂謀即真之事矣二年㣥臣復奏進攝皇帝子安臨爵為公復扶又翻下同封兄子光為衍功侯光莽兄永之子莽既居攝故還歸新都國宗宇子也二年九月莽母功顯君死莽自以居攝踐阼奉漢大宗之後為功顯君緦縗弁而加麻環絰如天子弔諸侯服周禮王為諸侯緦縗弁而加環絰同姓則麻異姓則葛師古曰於弁上加環絰也謂之環者言其輕細如環之形記曰緦麻十五升去其半有事其縷無事其布曰緦賈公彥曰凡五服之絰皆兩股絞之言環絰則與絞絰有異矣謂以麻為體又以一股麻為糾而橫纏之如環然故謂之環絰縗倉回翻而令新都侯宗為主服喪三年云二年司威陳崇莽置司威以司察百官令殺人私報者私屬之也霍顯曰少夫幸報我以事致其法為于偽翻莽大怒切責光光母曰汝自視孰與長孫中孫長孫中孫者宇及獲之字也獲死見上卷哀帝元壽元年宇死見上平帝元始三年師古曰中讀曰仲及況皆死初莽以事母養嫂撫兄子為名事見三十一卷成帝永始元年復以示公義焉服虔曰不舍光罪為公義仲馮曰莽不服母喪亦以示公義悖蒲內翻又蒲沒翻二年是歲廣饒侯劉京言齊郡新井地理志齊郡有廣饒縣師古曰千人官名屬車騎將軍扈其姓雲其名余按百官表千人在候司馬之下漢公府有掾有屬姓譜魯孝公之子彄食采於臧子孫以為氏雍縣屬扶風雍音於用翻十一月甲子莽奏太后曰陛下遇漢十二世三七之戹三七二百一十年漢元至是歲二百一十四年詔臣莽居攝廣饒侯劉京上書言七月中齊郡臨淄縣昌興亭長辛當一暮數夢曰吾天公使也使疏吏翻天公使我告亭長章甲十六行本長下有曰字乙十一行本同孔本同攝皇帝當為真即不信我此亭中當有新井亭長晨起視亭中誠有新井師古曰誠實也十一月壬子直建冬至師古曰壬子之日冬至而其日當建戊午雍石文皆到于未央宮之前殿臣與太保安陽侯舜等視天風起塵冥風止得銅符帛圖於石前文曰天告帝符獻者封侯騎都尉崔發等視說師古曰視其文而說其意也畏大人畏聖人之言師古曰論語所載孔子之言臣請共事神祇宗廟師古曰共讀曰恭奏言太皇太后孝平皇后皆稱假皇帝其號令天下天下奏言事毋言攝以居攝三年為始初元年考異曰莽傳作初始荀紀及韋莊美嘉號錄宋庠紀年通譜皆作始初今從之用應天命臣莽夙夜養育隆就孺子師古曰隆長也成就之使其長大也宣明太皇太后威德於萬方期於富而教之孺子加元服復子明辟如周公故事書洛誥周公拜手稽首曰朕復子明辟孔安國註曰周公盡禮致敬言我復還明君之政於子子成王也年二十成人故必歸政衆庶知其奉符命指意㣥公章甲十六行本公作臣乙十一行本同博議別奏以示即真之漸矣二年期門朗張充等六人謀共劫莽立楚王楚王紆宣帝之曾孫誅死二年梓潼人哀章師古曰梓潼廣漢之縣也潼音童哀姓章名姓譜曰哀姓以諡為氏余按古人以哀為諡非一孔子弟子傳有公皙哀烈士傳有羊角哀獨不可以為出於其後乎素無行好為大言行下孟翻好呼到翻見莽居攝即作銅匱為兩檢檢居掩翻毛晃曰檢書檢印窠封題也署其一曰天帝行璽金匱圖其一署曰赤帝璽某傳予皇張皇作黃帝金策書予讀曰與某者高皇帝名也書言王莽為真天子皇太后如天命圖書皆書莽大臣八人又取令名王興王盛章因自竄姓名師古曰竄謂廁著也皆署官爵為輔佐章聞齊井石牛事下下遐稼翻即日昏時衣黃衣時衣於既翻持匱至高廟以付僕射高廟有令有僕射戊辰莽至高廟拜受金匱神禪師古曰言有神命使漢禪位於莽也王者之冠也還坐未央宮前殿下書曰予以不德託于皇初祖考黃帝之後皇始祖考虞帝之苗裔詳見下卷皇天上帝隆顯大佑成命統序符契圖文金匱策書神明詔告屬予以天下兆民師古曰屬委付也音之欲翻赤帝漢氏高皇帝之靈承天命傳章甲十六行本傳下有國字乙十一行本同孔本同金策之書予甚祗畏敢不欽受以戊辰直定師古曰以建除之次其日當定即真天子位定有天下之號曰新因新都國以定號也易服色變犧牲殊徽幟異器制師古曰徽幟通謂旌旗之屬也幛音式志翻癸酉以鷄鳴為時以十二月為正以丑時為十二時之始也犧牲應正用白以土繼火故尚黃萬物紐牙於丑其色白故應正用白其署曰新使五威節以承皇天上帝威命也使疏吏翻莽將即真先奉諸符瑞以白太后太后大驚是時以孺子未立璽臧長樂宮璽即傳國璽臧古藏字通請璽太后不肯授莽莽使安陽侯舜諭指舜素謹敕太后雅愛信之舜既見太后太后知其為莽求璽為于偽翻怒罵之曰而屬父子宗族師古曰而汝也富貴累世既無以報受人孤寄乘便利時奪取其國師古曰孤寄言以孤寄托之人如此者狗豬不食其餘師古曰言惡賤言天下無此等人謂其全無人心也一曰言天下將共誅之不復有兄弟存也師古曰若亦汝也更工衡翻亦當自更作璽傳之萬世何用此亡國不祥璽為而欲求之我漢家老寡婦旦暮且死欲與此璽俱葬終不可得太后因涕泣而言旁側長御以下皆垂涕長御太后旁側常侍者良久乃仰謂太后臣等已無可言者師古曰言不可諫止太后寧能終不與邪太后聞舜語切恐莽欲脅之乃出漢傳國璽投之地以授舜曰我老已死知章甲十六行本知作如乙十一行本同而兄弟今族滅也舜既得傳國璽奏之莽大說乃為太后置酒未央宮漸臺說讀曰悅為于偽翻師古曰未央殿西南有蒼池池中有漸臺黃圖曰漸浸也言為池水所漸漸讀曰沾大縱衆樂莽又欲改太后漢家舊號易其璽綬恐不見聽而莽疏屬王諫欲諂莽上書言皇天廢去漢而命立新室去羌呂翻太皇太后不宜稱尊號當隨漢廢以奉天命莽以其書白太后太后曰此言是也師古曰恚忿之辭也此誖德之臣也師古曰誖乘也音布內翻罪當誅於是冠軍張永獻符命銅璧文冠軍屬南陽郡服虔曰銅璧如璧形以銅為之冠古玩翻莽乃下詔從之於是鴆殺王諫而封張永為貢符子班彪贊曰三代以來王公失世稀不以女寵及王莽之興由孝元后歷漢四世為天下母饗國六十餘載㣥小章甲十六行本小作弟乙十一行本同退齋校同張校同云無註本亦作小世權更持國柄載子亥翻更工衡翻五將十侯師古曰五將者鳳音商根莽皆為大司馬十侯者陽平頃侯禁禁子敬侯鳳安成侯崇平阿侯譚成都侯商紅陽侯立曲陽侯根高平侯逢時安陽侯音新都侯莽也一曰鳳嗣禁為侯不當重數而十人者淳于長即其一也卒成新都卒子恤翻位號已移於天下而元后卷卷猶握一璽師古曰卷音其圓翻惓惓忠謹之意余謂此云卷卷猶眷戀也不欲以授莽婦人之仁悲夫容肇祖標點顧頡剛聶崇岐覆校
