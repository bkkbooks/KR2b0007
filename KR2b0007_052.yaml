body:
  text: 資治通鑑卷第五十二翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注漢紀四十四陽嘉三年孝順皇帝下陽嘉三年甲戌一三四陽嘉三年夏四月車師後部司馬率後王加特奴章甲十六行本奴下有等字乙十一行本同孔本同掩擊北胸奴於閶吾陸谷閶音昌大破之獲單于母陽嘉三年五月戊戌詔以春夏連旱赦天下上親自露坐德陽殿東廂請雨按范書桓帝紀德陽殿在北宮掖庭中特加策問舉對曰臣聞陰陽閉隔則二氣否塞否皮鄙翻塞悉則翻陛下廢文帝光武之法而循亡秦奢侈之欲內積怨女外有曠夫自枯旱以來彌歷年歲未聞陛下改過之效徒勞至尊暴露風塵誠無益也謂露坐無益不尋其實猶緣木希魚卻行求前賢曰緣木求魚孟子之文韓詩外傳曰夫明鏡所以照形往古所以知今惡知往古之所以危亡無異卻行而求達於前人也崇道變惑出後宮不御之女除太官重膳之費易傳曰陽感天不旋日易稽覽圖中孚傳曰陽感天不旋日諸侯不旋時六夫不過朞鄭玄注云陽者天子為善一日天立應以善為惡一日天立應以惡一說不旋時立應之重直龍翻傳直戀翻帝復召舉面問得失舉對以宜慎官人去貪汙遠佞邪復扶又翻去羌呂翻遠于願翻帝曰官貪汙佞邪者為誰乎對曰臣從下州超備機密舉自冀州刺史徵拜尚書然公卿大臣數有直言者忠貞也別彼列翻數所角翻阿諛苟容者佞邪也太史令張衡亦上疏言前年京師地震土裂裂者威分震者民擾也窮懼聖思厭倦制不專己恩不忍割與衆共威威不可分德不可共願陛下思惟所以稽古率舊勿使刑德八柄不由天子周禮王以八柄馭㣥臣一曰爵以馭其貴二曰祿以馭其富三曰豫以馭其幸四曰置以馭其行五曰生以馭其福六曰奪以馭其貧七曰廢以馭其罪八曰誅以馭其過塞悉則翻災消不至矣衡又以中興之後儒者爭學圖緯緯七緯也七緯者易緯稽覽圖乾鑿度坤靈圖通卦驗是類謀辨終備也書緯璇璣鈐考靈耀刑德放帝命驗運期授也詩緯推度災泛歷樞含神霧也禮緯含文嘉稽命徵斗威儀也樂緯動聲儀稽耀嘉汁國徵也孝經緯援神契鉤命決也春秋緯演孔圖元命包文耀鉤運斗樞感精符合誠圖考異郵保乾圖漢含孽佑助期握誠圖潛潭巴說題辭也春秋元命包有公輸班與墨翟事見戰國又言別有益州益州之置在於漢世賢曰前書武帝始置益州閲定九流亦無讖録賢曰成哀時劉向及子歆為祕書校定經傳諸子等九流謂儒家道家陰陽家法家名家墨家縱橫家雜家農家見藝文志並無讖說讖楚譖翻皆虛僞之徒以要世取資要一遙翻欺罔較然莫之糾禁且律曆卦候九宮風角黃帝命伶倫吹律大撓作甲子容成造曆而律曆之學傳矣京房分六十四卦更直日用事以風雨寒溫為候伏羲之時龍馬負圖出於河戴九履一左三右七二四為肩六八為足而五居中伏羲觀河圖而畫八卦陰陽家謂之九宮一六八為白二黑三緑四碧五黃七赤九紫至今承用之又易乾鑿度曰太一取其數而行九宮鄭玄注云太一者北辰神名也下行八卦之宮每四乃還於中央中央者地神之所居故謂之九宮天數大分以陽出以陰入陽起於子陰起於午是以太一下九宮從坎宮始自此而從於坤宮又自此而從於震宮又自此而從於巽宮所以從半矣還息於中央之宮既又自此而從於乾宮又自此而從於兌宮又自此而從於艮宮又自此而從於離宮行則周矣上遊息於太一之星而反於紫宮行起從坎宮始終於離宮也此雖緯書之說而九宮定位則一也賢曰風角謂候四方四隅之風以占吉凶數所角翻下同世莫肯學而競稱不占之書賢曰謂競稱讖家也誠以實事難形而虛僞不窮也惡烏路翻好呼到翻魅音媚韓子曰客有為齊王畫者問畫孰難對曰狗馬最難孰易曰鬼魅最易狗馬人所知也故難鬼魅無形故易也宜收藏圖讖一禁絶之則朱紫無所眩典籍無瑕玷矣陽嘉三年秋七月鍾羌良封等復寇隴西漢陽復扶又翻詔拜前校尉馬賢為謁者鎮撫諸種種章勇翻冬十月護羌校尉馬續遣兵擊良封破之陽嘉三年十一月壬寅司徒劉崎司空孔扶免用周舉之言也崎丘宜翻乙巳以大司農黃尚為司徒光祿勳河東王卓為司空陽嘉三年耿貴人數為耿氏請為于僞翻帝乃紹封耿寶子箕為牟平侯耿寶貶死事見上卷安帝延光四年四年四年春北胸奴呼衍王侵車師後部帝令敦煌太守發兵救之不利敦徒門翻四年二月丙子初聽中官得以養子襲爵曹操階之遂移漢祚其所由來者漸矣帝之復位宦官之力也事見上卷延光四年參與政事與讀曰預御史張綱上書曰竊尋文明二帝德化尤盛中官常侍不過兩人近幸賞賜裁滿數金惜費重民故家給人足而頃者以來無功小人皆有官爵非愛民重器承天順道者也書奏不省省悉景翻綱皓之子也張皓見五十卷安帝延光三年四年旱四年謁者馬賢擊鍾羌大破之四年夏四月甲子太尉施延免戊寅以執金吾梁商為大將軍故太尉龐參為太尉龐皮江翻商稱疾不起且一年帝使太常桓焉奉策就第即拜商乃詣闕受命杜佑曰後漢策拜諸王侯三公之儀百官會位定謁者引光祿勳前謁者引當拜者前伏殿下光祿前一拜舉手曰制詔其以某為某讀策書畢拜者稱臣再拜尚書郎以璽印綬付侍御史前而立受印璽綬當受策者再拜頓首三贊謁者曰某王臣某新封某公某初除謝中謁者報謹謝贊者立曰皇帝為公興重坐受策者拜謝起就位禮畢自漢以來惟衛青以有功即軍中拜大將軍未聞有就第即拜者也況以此異數加之后父乎謙恭好士少詩沼翻好呼到翻下同辟漢陽巨覽巨姓覽名掾余絹翻李固為從事中郎楊倫為長史李固以商柔和自守不能有所整裁乃奏記於商曰數年以來災怪屢見見賢遍翻孔子曰智者見變思形愚者覩怪諱名范書李固傳形作刑此二語蓋亦本之緯書可為祗畏賢曰祗敬也言天無親疏惟善是與可敬而畏也道行忠立明公踵伯成之高莊子曰伯成子高唐虞時為諸侯至禹去而耕於野豈與此外戚凡輩耽榮好位者同且而論哉商不能用四年秋閏八月丁亥朔日有食之四年冬十月烏桓寇雲中度遼將軍耿曄追擊不利十一月烏桓圍曄於蘭池城續漢志雲中郡沙南縣有蘭池城烏桓乃退四年十二月丙章甲十六行本丙作甲乙十一行本同張校同寅京師地震永和元年丙子一三六四年春正月己巳改元赦天下四年冬十月丁亥承福殿火四年十一月丙子太尉龐參罷四年十二月象林蠻夷反象林縣屬日南郡晉宋以下為林邑國四年乙巳以前司空王龔為太尉龔疾宦官專權上書極言其狀諸黃門使客誣奏龔罪上命龔亟自實李固奏記於梁商曰王公以堅貞之操橫為讒佞所構橫戶孟翻衆人聞知莫不歎栗夫三公尊重無詣理訴冤之義哀帝時丞相王嘉召詣廷尉主簿曰將相不對理陳冤相踵以為故事君侯宜引決輒引分決是以舊典不有大罪不至重問賢曰大臣獄重故曰重問成帝時丞相薛宣御史大夫翟方進有罪上使五二千石雜問音義云大臣獄重故以二千石五人同問之卒讀曰猝則朝廷獲害賢之名㣥臣無救護之節矣語曰善人在患飢不及餐言當速救之也商即言之於帝事乃得釋四年是歲以執金吾梁冀為河南尹冀性嗜酒逸遊自恣居職多縱暴非法父商所親客雒陽令呂放以告商商以讓冀冀遣人於道刺殺放刺七亦翻而恐商知之乃推疑放之怨仇推吐雷翻惡自冀出欲嫁之他人故託其辭疑放之怨仇為之請以放弟禹為雒陽令使捕之賢曰安慰放家欲以滅口余謂賢說非也冀請於商以放弟為令謂必急於捕賊而陰使禹滅其兄之宗親賓客以快己忿耳四年武陵太守上書以蠻夷率服言相率而來服增其租賦議者皆以為可尚書令虞詡曰自古聖王不臣異俗先帝舊典貢賦多少所由來久矣漢興令武陵諸蠻大人歲輸布一匹小口二丈是謂之賨布必有怨叛計其所得不償所費必有後悔帝不從澧中漢中蠻各爭貢布非舊約漊郎侯翻遂殺鄉吏舉種反種章勇翻二年二年春武陵蠻二萬人圍充城八千人寇夷道賢曰充縣屬武陵郡故城在澧州崇義縣東北充音衝夷道屬南郡二年二月廣漢屬國都尉擊破白馬羌安帝改蜀郡北部都尉為廣漢屬國都尉別領陰平甸氏剛氏三道屬益州二年帝遣武陵太守李進擊叛蠻破平之進乃簡選良吏撫循蠻夷郡境遂安二年三月章甲十六行本月下有乙卯二字乙十一行本同張校同退齊校同司空王卓薨丁丑以光祿勳敦虔為司空考異曰袁書作乾今從范書二年夏四月丙申京師地震二年五月癸丑山陽君宋娥坐構姦誣罔收印綬歸里舍黃龍楊他孟叔李建張賢史泛王道李元李剛等九侯坐與宋娥更相賂遺更工衡翻遺于季翻求高官增邑並遣就國減租四分之一考異曰孫程傳云龍等誣罔曹騰孟賁按梁商傳誣罔騰賁者張逵等非龍等也二年象林蠻區憐等區烏侯翻今廣中猶有此姓姓譜云今長沙有此姓音豈俱翻攻縣寺殺長史交趾刺史樊演發交趾九真兵萬餘人救之兵士憚遠役秋七月二郡兵反攻其府府雖擊破反者而蠻勢轉盛二年冬十月甲申上行幸長安扶風田弱薦同郡法真博通內外學東都諸儒以七緯為內學六經為外學宜就加袞職賢曰毛詩曰袞職有闕謂三公也前後四徵終不屈友人郭正稱之曰法真名可得聞身難得而見逃名而名我隨避名而名我追可謂百世之師者矣真雄之子也法雄見四十九卷安帝永初四年二年丁卯京師地震二年太尉王龔以中常侍張昉等專弄國權欲奏誅之宗親有以楊震行事諫之者楊震事見五十卷安帝延光三年二年十二月乙亥上還自長安三年三年春二月乙亥京師及金城隴西地震二郡山崩三年夏閏四月己酉京師地震三年五月吳郡丞羊珍反攻郡府太守王衡破斬之三年侍御史賈昌與州郡並力討區憐不克寸為所攻圍歲餘兵穀不繼帝召公卿百官及四府掾屬大將軍府掾屬二十九人太尉府二十四人司徒府三十一人司空府二十九人皆議遣大將發荊揚兗豫四萬人赴之李固駮曰若荊揚無事發之可也今二州盜賊磐結不散二州謂荊揚也長沙桂陽數被徵發如復擾動數所角翻被皮義翻復扶又翻下同必更生患其不可一也又兗豫之人卒被徵發卒讀曰猝遠赴萬里無有還期詔書迫促必致叛亡其不可二也南州水土溫暑加有瘴氣瘴之亮翻度嶺而南瘴氣甚重炎熱蒸鬱之所生也中之者輒死致死亡者十必四五其不可三也遠涉萬里士卒疲勞比至嶺南比必寐翻及也不復堪鬬其不可四也軍行三十里為程而去日南九千餘里三百日乃到計入稟五升賢曰古升小故曰五升也稟給也不計將吏驢馬之食但負甲自致費便若此其不可五也設軍所在死亡必衆既不足禦敵當復更發此為刻割心腹以補四支其不可六也九真日南相去千里發其吏民猶尚不堪何況乃苦四州之卒以赴萬里之艱哉其不可七也前中郎將尹就討益州叛羌益州諺曰虜來尚可尹來殺我後就徵還以兵付刺史張喬喬因其將吏旬月之間破殄寇虜事見四十九卷安帝元初二年止五十卷五年將即亮翻州郡可任之驗也宜更選有勇略仁惠任將帥者以為刺史太守悉使共住交趾今日南兵單無穀言孤軍處叛蠻之中又乏糧也戰又不能可一切徙其吏民北依交趾事靜之後乃命歸本還募蠻夷使自相攻轉輸金帛以為其資有能反間致頭首者間古莧翻頭首謂諸蠻渠帥也許以封侯裂土之賞故並州刺史長沙祝良性多勇決又南陽張喬前在益州有破虜之功皆可任用昔太宗就加魏尚為雲中守魏尚見十四卷文帝十四年就加事未見守式又翻下同前書龔舍楚人初徵為諫大夫病免復徵為博士又病去頃之哀帝遣使即楚拜舍為泰山太守便道之官四府悉從固議即拜祝良為九真太守張喬為交趾刺史喬至開示慰誘並皆降散良到九真單車入賊中設方略招以威信降者數萬人皆為良築起府寺由是嶺外復平為于僞翻復扶又翻三年秋八月己未司徒黃尚免九月己酉以光祿勳長沙劉壽為司徒三年丙戌令大將軍三公舉剛毅武猛謀謨任將帥者各二人特進卿校尉各一人校戶教翻初尚書令左雄薦冀州刺史周舉為尚書既而雄為司隸校尉舉故冀州刺史馮直任將帥直嘗坐臧受罪臧古贓字通劾所舉非其人也劾戶概翻又戶得翻詔書使我選武猛不使我選清高舉曰詔書使君選武猛不使君選貪汚也雄曰進君適所以自伐也舉曰昔趙宣子任韓厥為司馬厥以軍法戮宣子僕宣子謂諸大夫曰可賀我矣吾選厥也任其事秦晉戰于河曲趙宣子將中軍韓厥為司馬宣子使以其乘車干行韓厥戮其僕衆曰韓厥必不沒矣其主朝升之而暮戮其車宣子謂諸大夫曰可賀我矣吾舉厥也任其事吾今乃知免於戾矣任音壬不敢阿君以為君羞不寤君之意與宣子殊也雄悅謝曰吾嘗事馮直之父又與直善今宣光以此奏吾是吾之過也周舉字宣光聞過而服天下以此益賢左雄諱過者為何如邪是時宦官競賣恩勢挾勢市恩以此自鬻也春秋鄭穆公子子良後為良氏賢曰謙退而厚重也余謂退厚者不與儕輩爭進趣競浮薄也賀獨無所薦帝問其故對曰臣生自草茅長於宮掖長知兩翻既無知人之明又未嘗交加士類昔衛鞅因景監以見有識知其不終事見二卷周顯王三十一年匪榮伊辱言不足為榮適以為辱也考異曰宦者傳云陽嘉中詔舉武猛良賀獨無所薦按此詔蓋誤以永和為陽嘉也帝由是賞之三年冬十月燒當羌那離等三千餘騎寇金城校尉馬賢擊破之三年十二月戊戌朔日有食之三年大將軍商以小黃門南陽曹節等用事於中遣子冀不疑與為交友而宦官忌其寵反欲陷之中常侍張逵蘧政楊定等蘧姓也衛有大夫蘧伯玉共譖商及中常侍曹騰孟賁云欲徵諸王子圖議廢立請收商等案罪帝曰大將軍父子我所親騰賁我所愛必無是但汝曹共妒之耳妒與妬同懼迫言既不用懼禍且及也矯詔收縛騰賁於省中帝聞震怒敕宦者李歙急呼騰賁釋之收逵等下獄歙許及翻下遐稼翻四年四年春正月庚辰逵等伏誅事連弘農太守張鳳安平相楊皓皆坐死辭所連染延及在位大臣商懼多侵枉乃上疏曰春秋之義功在元帥罪止首惡春秋左氏傳晉郤克帥師敗齊師于鞍師歸范文子後入曰師有功國入喜以逆之先入必屬耳目焉是代帥受名也故不敢虞師晉師滅下陽公羊傳曰虞微國也曷為序于大國之上使虞首惡也帥所類翻無辜者衆死囚久繫纖微成大賢曰言久繫之則細微之事牽引以成大也平政成化也宜早訖竟以止逮捕之煩謂孟春之月當行慶施惠順天地生物之心以迎和氣不宜使獄事枝蔓賢曰逮及也辭所連及即追捕之也罪止坐者二月帝以商少子虎賁中郎將不疑為步兵校尉商上書辭曰不疑童孺猥處成人之位處昌呂翻昔晏平仲辭鄁殿以安章甲十六行本安作守乙十一行本同孔本同其富左傳齊討慶封與晏子鄁殿其鄙六十弗受子尾曰富人之所欲也何故弗受對曰慶氏之邑足欲故亡吾邑不足欲也益之以鄁殿乃足欲亡無日矣不受鄁殿非惡富也恐失富也鄁蒲對翻殿多薦翻又如字公儀休為魯相客有遺相魚者相不受客曰聞君嗜魚遺君魚何故不受也相曰以嗜魚故不受也今為相能自給魚受魚而免誰復給我魚者故不受也亦願固福祿於聖世上乃以不疑為侍中奉車都尉梁商之讓通經傳之力也四年三月乙亥京師地震四年燒當羌那離等復反復扶又翻下同夏四月癸卯護羌校尉馬賢討斬之獲首虜千二百餘級四年戊午赦天下四年五月戊辰封故濟北惠王壽子安為濟北王去年濟北王多薨無子今以安紹封范書列傳作安國此從帝紀濟子禮翻四年秋八月太原旱五年五年春二月戊申京師地震五年南胸奴句龍王吾斯車紐等反句古侯翻車尺遮翻寇西河招誘右賢王合兵圍美稷殺朔方代郡長吏夏五月度遼將軍馬續與中郎將梁並等此護胸奴中郎將也破之吾斯等復更屯聚攻沒城邑天子遣使責讓單于單于本不預謀乃脫帽避帳詣並謝罪並以病徵五原太守陳龜代為中郎將龜以單于不能制下賢曰吾斯等攻沒城邑單于雖不預謀然不能制下即是不堪其任龜又欲徙單于近親於內郡而降者遂更狐疑龜坐下獄免降戶江翻下同龜所施行必有未究其方略者而遽坐免也下遐稼翻大將軍商上表曰胸奴寇畔自知罪極窮鳥困獸皆知救死鳥窮則攫獸困則搏傳曰困獸猶鬬不可單盡賢曰單亦盡也種章勇翻三軍疲苦虛內給外非中國之利度遼將軍馬續素有謀謨且典邊日久深曉兵要每得續書與臣策合宣令續深溝高壘以恩信招降宣示購賞明為期約如此則醜類可服賢曰醜等也余謂醜類言凶醜之黨類也帝從之乃詔續招降畔虜商又移書續等曰中國安寧忘戰日久良騎夜章甲十六行本夜作野乙十一行本同孔本同張校同合交鋒接矢決勝當時戎狄之所長而中國之所短也強弩乘城堅營固守以待其衰中國之所長而戎狄之所短也宜務先所長而觀其變先悉薦翻設購開賞宣示反悔反音幡宣示招降之意以開其反悔之心勿貪小功以亂大謀於是右賢王部抑鞮等萬三千口皆詣續降鞮丁奚翻五年己丑晦日有食之五年初那離等既平朝廷以來機為並州刺史劉秉為涼州刺史機等天性虐刻多所擾發且凍傅難種羌遂反賢曰且音子余翻種章勇翻下同攻金城與雜種羌胡大寇三輔殺害長吏機等並坐徵於是拜馬賢為征西將軍以騎都尉耿叔為副將左右羽林五校士及諸州郡兵十萬人屯漢陽五年九月令扶風漢陽築隴道塢三百所置屯兵五年辛未太尉王龔以老病罷五年且凍羌寇武都燒隴關賢曰隴山之關也今名大震關在今隴州汧源縣西五年壬午以太常桓焉為太尉五年胸奴句龍王吾斯等立車紐為單于東引烏桓西收羌胡等數萬人攻破京兆虎牙營殺上郡都尉及軍司馬遂寇掠並涼幽冀四州乃徙西河治離石賢曰離石即西河之屬縣也在郡南五百九里郡本都平定縣至此徙於離石朔方治五原十二月遣使胸奴中郎將張耽將幽州烏桓諸郡營兵擊車紐等戰於馬邑斬首三千級獲生口甚衆車紐乞降而吾斯猶率其部曲與烏桓寇鈔鈔楚交翻下同五年初上命馬賢討西羌大將軍商以為賢老不如太中大夫宋漢帝不從漢由之子也宋由為公於章和之間稽留不進武都太守馬融上疏曰今雜種諸羌種章勇翻轉相鈔盜宜及其未並亟遣深入破其支黨並合也及其勢未合而攻其支黨羌胡百里望塵千里聽聲今逃匿避回回胡對翻繞也曲也漏出其後則必侵寇三輔為民大害臣願請賢所不可用關東兵五千裁假部隊之號盡力率厲埋根行首以先吏士賢曰埋根言不退也行戶剛翻先悉薦翻必克破之臣又聞吳起為將暑不張蓋寒不披裘今賢野次垂幕珍肴雜遝兒子侍妾事與古反臣懼賢等專守一城言攻於西而羌出於東且其將士將不堪命必有高克潰叛之變也鄭高克好利而不顧其君文公使克將兵而禦狄于竟陳其師旅翺翔河上衆潰而歸審其必敗審悉也察也朝廷皆不從六年六年春正月丙子征西將軍馬賢與且凍羌戰于射姑山且子余翻射音夜按續漢書天文志射姑山在北地賢軍敗賢及二子皆沒東西羌遂大合羌居安定北地上郡西河者謂之東羌居隴西漢陽延及金城塞外者謂之西羌鞏唐羌寇隴西遂及三輔燒園陵殺掠吏民六年二月丁巳有星孛于營室晉書天文志營室二星天子之宮也又為軍糧之府及土功事孛蒲內翻六年三月上巳大將軍商大會賓客宴于雒水司馬彪曰三月上巳宮人皆潔於東流上洗濯祓除為大潔也按古以三月上巳日為上巳今以三月三日為上巳繼以䪥露之歌纂文曰䪥露今之挽歌也崔豹古今注曰䪥上露何易晞露晞明朝還復落人死一去何時歸䪥下戒翻一作薤歎曰此所謂哀樂失時樂音洛非其所也殃將及乎左傳曰哀樂失時殃咎必至六年武都太守趙沖追擊鞏唐羌考異曰西羌傳作武威太守今從帝紀皇甫規傳云與護羌校尉趙沖按西羌傳沖時尚為太守規傳誤也降二千餘人詔沖督河西四郡兵為節度余按沖以追羌之功詔督河西四郡兵則武威太守為是武都西北接漢陽東北接扶風南接漢中無緣遠督河西四郡兵安定上計掾皇甫規上疏曰臣比年以來數陳便宜羌戎未動策其將反馬賢始出知其必敗誤中之言在可考校比毗至翻數所角翻中竹仲翻臣每惟賢等掖衆四年未有成功縣師之費且百億計賢曰縣猶停也余謂出師遠征其勢縣絶不能相及故曰縣師縣讀曰懸民平謂齊民也謂為姦吏所侵盜也㣥為盜賊青徐荒饑襁負流散襁居兩翻夫羌戎潰叛不由承平皆因邊將失於綏御乘常守安則加侵暴言前後相乘以侵暴羌戎為常也微勝則虛張首級軍敗則隱匿不言軍士勞怨困於猾吏進不得快戰以徼功徼一遙翻退不得溫飽以全命餓死溝渠暴骨中原徒見王師之出不聞振旅之聲賢曰振整也旅衆也穀梁傳曰出曰治兵入曰振旅驚懼生變酋慈秋翻是以安不能久叛則經年臣所以搏手扣心而增歎者也願假臣兩營二郡屯列坐食之兵五千賢曰兩營謂馬賢及趙沖等二郡安定隴西也余謂兩營者扶風雍營及京兆虎牙營也與趙沖共相首尾土地山谷臣所曉習兵勢巧便臣已更之更工衡翻經也歷也可不煩方寸之印尺帛之賜高可以滌患下可以納降降戶江翻若謂臣年少官輕不足用者凡諸敗將非官爵之不高年齒之不邁賢曰邁往也沒死自陳勝音升沒死猶言昧死也冒死也帝不能用六年庚子司空郭虔免丙午以太僕趙戒為司空六年夏使胸奴中郎將張耽度遼將軍馬續率鮮卑到穀城擊烏桓於通天山大破之穀城蓋即西河郡之穀羅縣城通天山蓋即士軍縣之石樓山以其高絶故曰通天六年鞏唐羌寇北地考異曰西羌傳作罕種羌今從帝紀不利六年秋八月乘氏忠侯梁商病篤乘繩證翻敕子冀等曰吾生無以輔益朝廷死何可耗費帑藏帑他朗翻藏徂浪翻衣衾飯含玉匣珠貝之屬賢曰含口實也白虎通曰大夫飯以玉含以貝士飯以珠含以貝也飯父遠翻含戶紺翻百僚勞擾紛華道路祇增塵垢耳宜皆辭之丙辰薨帝親臨喪諸子欲從其誨朝廷不聽賜以東圖祕器銀鏤黃賜玉匣賢曰棺以銀鏤之以柏木黃心為椁曰黃腸孔穎達曰喪服大記君松槨大夫柏椁士雜木椁鄭注椁謂周棺者也天子柏椁以端長六尺正義曰君松椁君諸侯也諸侯用松為椁材也盧云以松黃腸為椁庾云黃腸松心也大夫柏椁以柏為椁不用黃腸下天子也賜輕車介士賢曰輕車兵車也介士甲士也帝至宣陽亭賢曰每城門各有亭即宣陽門之亭也余按續漢志雒陽城十二門無宣陽門魏晉之間洛城始有宣陽門正南門也漢雒城正南曰平城門壬戌以河南尹乘氏侯梁冀為大將軍冀弟侍中不疑為河南尹臣光曰成帝不能選任賢俊委政舅家可謂暗矣猶知王立之不材棄而不用事見三十二卷元延元年授之后族援于元翻梁冀頑嚚凶暴著於平昔而使之繼父之位終於悖逆嚚魚巾翻悖蒲內翻又蒲沒翻蕩覆漢室校於成帝暗又甚焉六年初梁商病篤帝親臨幸問以遺言對曰臣從事中郎周舉清高忠正可重任也由是拜舉諫議大夫續漢志曰武帝元狩五年置諫大夫世祖中興以為諫議大夫六年九月諸羌寇武威六年辛亥晦日有食之六年冬十月癸丑以羌寇充斥涼部震恐復徙安定居扶風北地居馮翊永建四年二郡還舊治今復徙之復扶又翻庚子以執金吾張喬行車騎將軍事將兵萬五千人屯三輔六年荊州盜賊起彌年不定以大將軍從事中郎李固為荊州刺史固到遣吏勞問境內赦寇盜前釁與之更始勞力到翻更工衡翻於是賊帥夏密等率其魁黨六百餘人自縛歸首帥所類翻首式救翻固皆原之遣還章甲十六行本還下有使字乙十一行本同孔本同張校同自相招集開示威法半歲間餘類悉降降戶江翻州內清平奏南陽太守高賜等臧穢臧古贓字通冀為之千里移檄賢曰言移檄一日行千里救之急也為于僞翻冀遂徙固為泰山太守時泰山盜賊屯聚歷年郡兵常千人追討不能制固到悉罷遣歸農但選留任戰者百餘人任音壬以恩信招誘之未滿歲賊皆弭散誘音酉弭止也散逃潰而去也漢安元年壬午一四二六年春正月癸巳赦天下改元六年秋八月南胸奴句龍吾斯與薁鞬臺耆等復反薁音郁鞬居元翻復扶又翻寇掠並部六年丁卯遣侍中河內杜喬周舉按范書紀傳周舉汝南人時為光祿大夫張綱犍為武陽人栩況羽翻行下孟翻表賢良顯忠勤其貪汚有罪者刺史二千石驛馬上之墨綬以下便輒收舉刺史二千石大吏驛馬上奏其罪取旨黜免驛馬欲速達京闕也墨綬縣令長也令長以下便收案舉劾其罪上時掌翻張綱獨埋其車輪於雒陽都亭漢郡國縣道皆有都亭豺狼當路安問狐狸前漢京兆督郵侯文對孫寶之辭大將軍冀河南尹不疑以外戚蒙恩居阿衡之任而專肆貪叨縱恣無極章甲十六行本極下有多樹諂諛以害忠良誠天威所不赦大辟所宜加也二十字乙十一行本同孔本同張校同退齊校同謹條其無君之心十五事斯皆臣子所切齒者也書御賢曰御進也時皇后寵方盛諸梁姻戚滿朝朝直遙翻帝雖知綱言直不能用也杜喬至兗州表奏泰山太守李固政為天下第一上徵固為將作大匠八使所劾奏多梁冀及宦者親黨互為請救事皆寢遏劾戶概翻又戶得翻寢者已御其奏寢而不行遏者其奏未達遏而不上侍御史河南种皓疾之种音沖皓古老翻復行案舉復扶又翻廷尉吳雄將作大匠李固亦上言八使所糾宜急誅罰帝乃更下八使奏章令考正其罪下遐稼翻梁冀恨張綱思有以中傷之中竹仲翻時廣陵賊張嬰寇亂揚徐間積十餘年二千石不能制冀乃以綱為廣陵太守前太守率多求兵馬綱獨單車之職既到徑詣嬰壘門嬰大驚遽走閉壘綱於門章甲十六行本門下有外字乙十一行本同孔本同張校同退齊校同罷遣吏民章甲十六行本民作兵乙十一行本同孔本同張校同獨留所親者十餘人以書喻嬰請與相見嬰見綱至誠乃出拜謁綱延置上坐坐才臥翻譬之曰前後二千石多肆貪暴故致公等懷憤相聚二千石信有罪矣然為之者又非義也今主上仁聖欲以恩德服叛故遣太守來思以爵祿相榮不願以刑罰相加今誠轉禍為福之時也若聞義不服天子赫然震怒荊揚兗豫大兵雲合身首橫分血嗣俱絶賢曰凡祭皆用牲故曰血嗣或曰父子氣血相傳故曰血嗣公其深計之嬰聞泣下曰荒裔愚民不能自通朝廷不堪侵枉遂復相聚偷生復扶又翻若魚游釜中知其不可久且以喘息須臾間耳人以氣一出入之頃為一息喘者息之疾音尺兗翻乃嬰等更生之辰也乃辭還營明日將所部萬餘人與妻子面縛歸降考異曰帝紀九月張嬰寇郡縣又云是歲嬰詣綱降按張綱傳云寇亂十餘年則非今年九月始寇郡縣也袁紀置嬰降事於八月下十月上今從之大會置酒為樂樂音洛散遣部衆任從所之親為卜居宅相田疇賢曰相視也田並畔曰疇為于僞翻相息亮翻章甲十六行本孫作弟乙十一行本同孔本同張校同欲為吏者皆引召之人情悅服南州晏然朝廷論功當封梁冀遏之在郡一歲卒卒子恤翻張嬰等五百餘人為之制服行喪為于僞翻送到犍為犍居言翻負土成墳詔拜其子續為郎中賜錢百萬是時二千石長吏有能政者有雒陽令章甲十六行本令下有渤海二字乙十一行本同孔本同張校同任峻任音壬冀州刺史京兆蘇章膠東相陳留吳祐雒陽令自王渙之後皆不稱職王渙事見四十八卷和帝元興元年稱尺證翻各盡其用發姦不旋踵民間不畏吏其威禁猛於渙而文理政教不如也章為冀州刺史有故人為清河太守章行部欲案其姦臧行下孟翻臧古贓字通用乃請太守為設酒肴陳平生之好甚歡為于僞翻好呼到翻太守喜曰人皆有一天我獨有二天謂章必能覆蓋其惡也今夕蘇孺文與故人飲者私恩也蘇章字孺文公法也遂舉正其罪州境肅然後以摧折權豪忤旨坐免時天下日敝民多愁苦論者日夜稱章朝廷遂不能復用也復扶又翻祐為膠東相續漢志膠東侯國屬北海國民不忍欺嗇夫孫性私賦民錢市衣以進其父百官志縣置嗇夫一人主知民善惡為役先後知民貧富為賦多少平其差品風俗通曰嗇省也夫賦也言消息百姓均其役賦嗇音色有君如是何忍欺之促歸伏罪性慙懼詣閣持衣自首首式救翻祐屏左右問其故屏必郢翻性具談父言祐曰掾以親故受汚穢之名所謂觀過斯知仁矣論語載孔子之言也此言觀性之過在於取民則知其心主於奉父還以衣遺之遺于季翻六年冬十月辛未太尉桓焉司徒劉壽免六年罕羌邑落五千餘戶詣趙沖降唯燒何種據參䜌未下種章勇翻參䜌縣屬安定郡䜌音力全翻甲戌罷張喬軍屯六年十一月壬午以司隸校尉下邳趙峻為太尉大司農胡廣為司徒二年二年夏四月庚戌護羌校尉趙沖與漢陽太守張貢擊燒當羌於參䜌破之當當作何此承范紀之誤燒當燒何羌兩種也二年六月丙寅立南胸奴守義王兜樓儲為呼蘭若尸逐就單于自永和五年吾斯車紐反陳龜逼殺單于休利南庭虛位至是始立單于考異曰袁紀去年六月立兜樓儲為單于今從范書上親臨軒授璽綬引上殿賜車馬器服金帛甚厚璽斯民翻綬音受引上時掌翻詔太常大鴻臚與諸國侍子於廣陽門外祖會饗賜作樂角抵百戲太常掌樂大鴻臚典四夷之客故詔使祖單于祖會為祖道之會也賢曰廣陽城西面南頭門角抵之戲則魚龍爵馬之屬言兩兩相當亦角而為抵對即今之鬬用古之角抵也臚陵如翻二年冬閏十月趙沖擊燒當羌於阿陽破之賢曰阿陽縣屬漢陽郡故城在今秦州隴城縣西北二年十一月使胸奴中郎將扶風馬實遣人刺殺句龍吾斯刺七亦翻句古侯翻二年涼州自九月以來地百八十震山谷坼裂壞敗城寺壞音怪敗補邁翻民壓死者甚衆二年尚書令黃瓊以前左雄所上孝廉之選專用儒學文吏事見上卷陽嘉元年上時掌翻乃奏增孝悌及能從政章甲十六行本政下有者字乙十一行本同孔本同為四科帝從之建康元年甲申一四四是年四月改元二年春護羌從事馬玄為諸羌所誘將羌衆亡出塞誘音酉將如字領也領護羌校尉衛琚追擊玄等斬首八百餘級琚音居趙沖復追叛羌到建威鸇陰河賢曰續漢書建威作武威鸇陰縣名屬安定郡又曰涼州姑臧縣東南有鸇陰縣故城縣因水以為名宋白曰會州會寧縣漢鸇陰縣地黃河西南自蘭州金城縣界流注水經云河水又東過勇士縣北東流即此處復扶又翻所將降胡六百餘人叛走降戶江翻沖將數百人追之遇羌伏兵與戰而歿沖雖死而前後多所斬獲羌遂衰耗詔封沖子為義陽亭侯二年夏四月使胸奴中郎將馬實擊南胸奴左部破之左部即句龍吾斯之黨二年辛巳立皇子炳為太子炳虞貴人之子也赦天下太子居承光宮帝使侍御史种皓監太子家監古銜翻中常侍高梵從中單駕出迎太子皓工老翻梵房戎翻又房泛翻時太傅杜喬等疑不欲從而未決皓乃手劍當車曰手守又翻太子國之儲副人命所係今常侍來無詔信何以知非姦邪今日有死而已梵辭屈不敢對馳還奏之詔報太子乃得去喬退而歎息愧皓臨事不惑愧者愧己之不能然也稱善者良久二年揚徐盜賊㣥起盤互連歲秋八月九江范容周生等寇掠城邑屯據歷陽歷陽縣屬九江郡賢曰今和州縣遣御史中丞馮緄督州兵討之緄古本翻考異曰帝紀作馮赦袁紀作馮放皆誤今據緄傳二年庚午帝崩于玉堂前殿年三十年二歲尊皇后曰皇太后太后臨朝丁丑以太尉趙峻為太傅大司農李固為太尉參祿尚書事二年九月丙午葬孝順皇帝于憲陵賢曰憲陵在雒陽西十五里二年是日京師及太原鴈門地震二年庚戌詔舉賢良方正之士策問之皇甫規對曰伏惟孝順皇帝初勤王政紀綱四方幾以獲安幾讀曰冀後遭姦僞威分近習賢曰近習謂佞幸親近小人也賓客交錯天下擾擾從亂如歸官民並竭上下窮虛陛下體兼乾坤以坤母臨朝以君天下行乾之德故曰體兼乾坤攝政之初拔用忠貞其餘維綱多所改正遠近翕然望見太平而災異不息寇賊縱橫縱子容翻殆以姦臣權重之所致也其常侍尤無狀者賢曰無狀謂無善狀拔掃凶黨披開也掃除也以塞痛怨塞悉則翻以答天誡大將軍冀河南尹不疑亦宜增修謙節輔以儒術省去遊娛不急之務去羌呂翻割減廬第無益之飾夫君者舟也民者水也家語孔子曰君者舟也民者水也水可載舟亦以覆舟君以此思危則危可知也乘舟者也將軍兄弟操楫者也操千高翻楫與楫同若能平志畢力以度元元所謂福也如其怠弛將淪波濤可不慎乎夫德不稱祿猶鑿墉之趾以益其高豈量力審功安固之道哉稱尺證翻量音良凡諸宿猾酒徒戲客皆宜貶斥以懲不軌令冀等深思得賢之福失人之纍纍良瑞翻梁冀忿之以規為下第拜郎中託疾免歸州郡承冀旨幾陷死者再三遂沈廢於家積十餘年幾居希翻沈持林翻考異曰規傳云沖質之間規對策免歸積十四年檢帝紀此後別無舉賢良事或者此時規舉賢良其至對策時已在質帝世也故云沖質之間自明年數至梁冀誅亦整十四年也二年揚州刺史尹耀九江太守鄧顯討范容等於歷陽敗歿二年冬十月日南蠻夷復反復扶又翻攻燒縣邑交趾刺史九江夏方招誘降之夏戶雅翻二年十一月九江盜賊徐鳳馬勉攻燒城邑鳳稱無上將軍勉稱皇帝考異曰帝紀永嘉元年三月勉稱皇帝今據滕撫傳賢曰當塗縣之山在今宣州余按兩漢志當塗縣屬九江郡續志曰縣有馬丘聚徐鳳反於此又有塗山禹會諸侯處也又有芍陂陂在壽州安豐縣東塗山在濠州鍾離縣西九十五里以此證之漢當塗縣地當在唐濠壽二州界晉氏南渡淮民避亂渡江晉成帝乃僑立當塗縣於于胡於唐屬宣州今當塗縣非漢舊當塗縣地置百官二年十二月九江賊黃虎等攻合肥合肥縣屬九江郡賢曰故城在今廬州北應劭曰夏水出父城東南至此與淮合故曰合肥二年是歲㣥盜發憲陵孝沖皇帝諱炳諡法幼少在位曰沖司馬彪曰沖幼早夭故諡曰沖伏侯古今注曰炳之字曰明永嘉元年乙酉一四五考異曰袁紀作元嘉誤二年春正月戊戌帝崩于玉堂前殿年三歲欲須所徵諸王侯到乃發喪太尉李固曰帝雖幼少猶天下之父今日崩亡人神感動豈有人之反共掩匿乎人子當作臣子皆祕不發喪沙丘事見七卷秦始皇三十七年北鄉事見上卷安帝延光四年不可之甚者也太后從之即暮發喪徵清河王蒜及渤海孝王鴻之子纘皆至京師蒜父曰清河恭王延平延平及鴻皆樂安夷王寵之子千乘貞王伉之孫也千乘貞王伉章帝建初四年封薨子寵嗣和帝永元七年改千乘國曰樂安薨子鴻嗣是生質帝帝既立梁太后以樂安國士卑溼租委鮮薄改封鴻渤海王清河王慶子虎威嗣國三年而薨無子鄧太后立延平為清河王諡法安心好靜曰夷蒜蘇貫翻伉音抗動止有法度公卿皆歸心焉李固謂大將軍冀曰今當立帝宜擇長年高明有德任親政事者長知兩翻任如林翻堪也願將軍審詳大計察周霍之立文宣戒鄧閻之利幼弱周勃事見十三卷高后八年霍光事見二十四卷昭帝元平元年鄧氏事見四十八卷和帝元興元年四十九卷殤帝延平元年閻氏事見上卷安帝延光四年與太后定策禁中丙辰冀持節以王青蓋車迎纘入南宮丁已封為建平侯其日即皇帝位年八歲蒜罷歸國二年將卜山陵李固曰今處處寇賊軍興費廣新創憲陵賦發非一帝尚幼小可起陵於建章甲十六行本建作憲乙十一行本同張校同云無注本亦作建陵塋內依康陵制度康陵殤帝陵亦在慎陵塋內塋音營己未葬孝沖皇帝於懷陵二年太后委政宰輔李固所言太后多從之宦章甲十六行本宦上有黃門二字乙十一行本同孔本同官為惡者一皆斥遣天下咸望治平治直吏翻而梁冀深忌疾之初順帝時所除官多不以次及固在事奏免百餘人此等既怨又希望冀旨遂共作飛章誣奏固曰太尉李固因公假私依正行邪離間近戚間永莧翻自隆支黨大行在殯路人掩涕掩涕者掩面而泣也燒鉛汞成粉以傅面北史曰胡粉出龜茲國西京雜記曰武帝遇李夫人就取玉簪搔頭自此宮人搔頭皆用玉從容治步從七容翻從容舒緩也治步言修治容儀行步中規矩也治直之翻曾無慘怛傷悴之心悴秦醉翻山陵未成違矯舊政善則稱己過則歸君斥逐近臣不得侍送作威作福莫固之甚矣夫子罪莫大於纍父纍力瑞翻臣惡莫深於毀君固之過釁事合誅辟辟毗亦翻書奏冀以白太后使下其書下遐稼翻太后不聽二年廣陵賊張嬰復聚衆數千人反據廣陵復扶又翻下同二年二月乙酉赦天下二年西羌叛亂積年費用八十餘億諸將多斷盜牢稟前書音義曰牢價直也稟給也賢曰牢廩食也古者名廩為牢斷割也減割牢廩而盜之斷丁管翻私自潤入皆以珍寶貨賂左右上下放縱不恤軍事士卒不得其死者白骨相望於野左馮翊梁並以恩信招誘叛羌離湳狐奴等五萬餘戶皆詣並降誘音酉湳乃感翻降戶江翻隴右復平二年太后以徐揚盜賊益熾博求將帥三公舉涿令北海滕撫有文武才姓譜滕侯之後以國為氏與中郎將趙序助馮緄合州郡拴數萬人共討之緄古本翻又廣開賞募錢邑各有差謂立賞格錢邑以功之高下為差錢賜錢也邑封邑也未及行三月撫等進擊衆賊大破之斬馬勉范容周生等千五百級徐鳳以餘衆燒東城縣東城縣屬九江郡賢曰在今濠州定遠縣南五月下邳人謝安應募率其宗親設伏擊鳳斬之封安為平鄉侯拜滕撫中郎將督揚徐二州事二年丙辰詔曰孝殤皇帝即位踰年君臣禮成孝安皇帝承襲統業而前世遂令恭陵在康陵之上先後相踰失其次序今其正之二年六月鮮卑寇代郡二年秋廬江盜賊攻尋陽尋陽縣屬廬江郡班志注云禹貢九江在南皆東合為大江余按尋陽縣本在大江之北尋水之陽吳立蘄春郡尋陽縣屬焉蘄春縣漢屬江夏郡唐蘄州之地元豐九域志蘄州東南至江州二百四十里江州得尋陽之名由司馬氏置尋陽太守於柴桑於是江南之尋陽著於此江北之尋陽晦矣盱台縣屬下邳國音吁怡滕撫遣司馬王章擊破之二年九月庚戌太傅趙峻薨二年滕撫進擊張嬰冬十一月丙午破嬰斬獲千餘人丁未中郎將趙序坐畏懦詐增首級棄市考異曰東觀記曰取錢縑三百七十五萬今從滕撫傳二年歷陽賊華孟自稱黑帝華戶化翻攻殺九江太守楊岑滕撫進擊破之斬孟等三千八百級虜獲七百餘人於是東南悉平振旅而還還從宣翻又如字以撫為左馮翊二年永昌太守劉君世鑄黃金為文蛇以獻大將軍冀益州刺史种皓糾發逮捕馳傳上言傳株戀翻下傳逮同上時掌翻冀由是恨皓會巴郡人服直姓譜服周內史叔服之後漢有江夏太守服徹自稱天王皓與太守應承討捕不克吏民多被傷害被皮義翻冀因此陷之傳逮皓承逮皓承傳詣京師也臣伏聞討捕所傷本非皓承之意實由縣吏懼法畏罪迫逐深苦致此不詳詳審也言不能審知賊勢驅民赴戰以致死傷也比毗至翻處處未絶高承以首舉大姦而相隨受罪臣恐沮傷州縣糾發之意更共飾匿賢曰言各飾僞辭隱匿真狀也太后省奏復扶又翻省悉景翻乃赦皓承罪免官而已金蛇輸司農大司農掌諸錢穀金帛故金蛇輸司農考異曰种皓傳云二府畏懦不敢按之今從杜喬傳喬不肯與冀小女死令公卿會喪喬獨不往冀由是銜之為冀殺喬張本容肇祖標點顧頡剛聶崇岐覆校
