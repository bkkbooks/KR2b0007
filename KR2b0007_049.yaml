body:
  text: 資治通鑑卷第四十九翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註漢紀四十一延平元年孝殤皇帝諱隆和帝少子也諡法短折不成曰殤伏侯古今註曰隆之字曰盛延平元年丙午一六延平元年春正月辛卯以太尉張禹為太傅司徒徐防為太尉參錄尚書事太后以帝在襁褓襁居兩翻褓音保欲令重臣居禁內乃詔禹舍宮中五日一歸府每朝見特贊與三分絕席特贊者每朝見贊拜者先獨贊禹名既乃贊太尉名以下禹不與三公同贊也絕席者朝位獨在百僚上不與三公聯席也朝直遙翻見賢遍翻延平元年封皇兄勝為平原王延平元年癸卯以光祿勳梁鮪為司徒鮪于軌翻延平元年三月甲申葬孝和皇帝于慎陵賢曰慎陵在雒陽東南三十里延平元年丙戌清河王慶濟北王壽河間王開常山王章始就國濟子禮翻太后特加慶以殊禮殊異也其禮異於諸王也年十三太后以帝幼弱遠慮不虞留祜與嫡母耿姬居清河邸為帝崩立祜張本況之曾孫也耿況以上谷從光武犍為左姬也犍居言翻延平元年夏四月鮮卑寇漁陽漁陽太守張顯率數百人出塞追之兵馬掾嚴授諫曰前道險阻賊勢難量掾俞絹翻量音良宜且結營先令輕騎偵視之顯意甚銳怒欲斬之遂進兵遇虜伏發士卒悉走唯授力戰身被十創手殺數人而死緣邊郡曹有兵馬掾掌兵馬偵丑鄭翻創初良翻俱沒於陳陳讀曰陣延平元年丙寅以虎賁中郎將鄧騭為車騎將軍儀同三司三司三公也晉職官志曰儀同三司之名始此騭職日翻弘閶皆侍中悝苦回翻閶齒良翻延平元年司空陳寵薨延平元年五月辛卯赦天下延平元年壬辰河東垣山崩賢曰垣縣今絳州縣也延平元年六月丁未以太常尹勤為司空延平元年郡國三十七雨水延平元年己未太后詔減太官導官尚方內署諸服御珍膳靡麗難成之物賢曰太官令周官也秩千石典天子御膳導官掌擇御米導擇也尚方掌作御刀劍諸器物內署掌內府衣物令秩皆六百石稻粱米不得導擇朝夕一肉飯而已舊太官湯官經用歲且二萬萬自是裁數千萬百官志湯官丞主酒屬太官令皆減其過半悉斥賣上林鷹犬東都亦有上林苑在雒陽西斥開也棄也悉令省之峙丈里翻糒音備延平元年丁卯詔免遣掖庭宮人及宗室沒入者皆為庶民延平元年秋七月庚寅敕司隸校尉部刺史曰司隸校尉及諸州部刺史也間者郡國或有水災妨害秋稼朝廷惟咎憂惶悼懼惟思也咎過也遂覆蔽災害覆敷又翻多張墾田不揣流亡揣音初委翻競增戶口掩匿盜賊令姦惡無懲隱蔽盜賊不以上聞弗加誅討使姦惡無所懲艾選舉乖宜貪苛慘毒延及平民賢曰平民謂善人也阿私下比塞悉則翻比毗至翻不畏于天不愧于人詩小雅何人斯之辭不可數恃數所角翻自今以後將糾其罰二千石長吏其各實覈所傷害為除田租芻槀長知兩翻為于偽翻延平元年八月辛卯帝崩年二歲癸丑殯于崇德前殿賢曰雒陽南宮有崇德殿悝苦回翻其夜使騭持節以王青蓋車迎清河王子祜賢曰續漢志曰皇太子皇子皆安車朱班輪青蓋金華蚤皇子為王錫以乘之故曰王青蓋車皇孫則綠車皇太后御崇德殿百官皆吉服陪位賢曰不可以凶事臨朝改吉服也賢曰不即立為天子而封侯者不欲從微即登皇位余謂先封侯者用立孝宣帝故事也以祜為孝和皇帝嗣又作策命有司讀策畢太尉奉上璽綬即皇帝位上時掌翻璽斯氏翻綬音受太后猶臨朝公羊傳曰猶者可止之辭延平元年詔告司隸校尉河南尹南陽太守曰每覽前代外戚賓客濁亂奉公言其挾勢恣橫奉公之吏為所濁亂也咎在執法怠懈不輒行其罰故也懈古隘翻今車騎將軍騭等雖懷敬順之志而宗門廣大姻戚不少賓客姦猾多干禁憲賢曰干犯也勿相容護自是親屬犯罪無所假貸延平元年九月六州大水延平元年丙寅葬孝殤皇帝于康陵賢曰康陵在慎陵塋中庚地章甲十六行本水作憂乙十一行本同孔本同退齋校同百姓苦役方中祕藏賢曰方中陵中也冢藏之中故言祕也孔潁達曰凡天子葬掘地為方壙漢書謂之方中方中之內先累椁於其方中南面為羨道以蜃車載柩至壙說而載以龍輴從羨道而入至方中乃屬紼於棺之緘從上而下棺入於椁之中方上謂覆坑方石上減約十分居一十分居一者減其九分也延平元年乙亥殞石于陳留陳留郡在雒陽東五百三十里延平元年詔以北地梁慬為西域副校尉慬音勤校戶教翻慬行至河西會西域諸國反攻都護任尚於疏勒尚上書求救詔慬將河西四郡羌胡五千騎馳赴之慬未至而尚已得解詔徵尚還以騎都尉段禧為都護西域長史趙博為騎都尉禧博守它乾城班超為都護居龜茲它乾城梁慬以為不可固乃譎說龜茲王白霸譎古穴翻說輸芮翻龜茲音丘慈欲入共保其城白霸許之吏民固諫白霸不聽慬既入遣將急迎段禧趙博合軍八九千人龜茲吏民並叛其王而與溫宿姑墨數萬兵反共圍城慬等出戰大破之連兵數月故衆敗走乘勝追擊凡斬首萬餘級獲生口數千人龜茲乃定梁慬非不健鬬然終不能定西域者徒勇而無策略也延平元年冬十月四州大水雨雹雨于具翻延平元年清河孝王慶病篤上書求葬樊濯宋貴人冢旁欲從其母也甲子王薨延平元年乙酉罷魚龍曼延戲武帝元封三年作魚龍曼延戲今罷之曼音萬延衍面翻延平元年尚書郎南陽樊準以儒風寖衰上疏曰臣聞人君不可以不學光武皇帝受命中興東西誅戰不遑啟處處昌呂翻然猶投戈講藝藝六藝也孝明皇帝庶政萬機無不簡心朱子曰簡閱也游意經藝每饗射禮畢正坐自講諸儒並聽四方欣欣又多徵名儒布在廊廟每讌會則論難衎衎賢曰衎衎和樂貌也難乃旦翻衎苦旱翻又苦汗翻期門羽林介冑之士悉通孝經期門即虎賁士流及蠻荒是以議者每稱盛時咸言永平今學者益少少詩沼翻遠方尤甚博士倚席不講賢曰禮記曰凡侍坐於大司成者遠間三席又曰若非飲食之客則布席席間函丈註云謂講問客也倚席言不施講坐也忘蹇蹇之忠習諓諓之辭賢曰諓諓諂言也音踐前書曰昔秦穆公議諓諓之言臣愚以為宜下明詔博求幽隱寵進儒雅以俟聖上講習之期時安帝始年十三故請求儒雅以俟講習太后深納其言詔公卿中二千石各舉隱士大儒務取高行以勸後進行下孟翻妙精也擇也孝安皇帝上諱祜肅宗孫也父曰清河孝王慶諡法寬容和平曰安伏侯古今註曰祜之字曰福永初元年丁未一七延平元年春正月癸酉朔赦天下延平元年蜀郡徼外羌內屬徼吉弔翻下同延平元年二月丁卯分清河國封帝弟常保為廣川王廣川縣屬信都國賢曰故城在今冀州棗強縣東北延平元年庚午司徒梁鮪薨延平元年三月癸酉日有食之延平元年己卯永昌徼外僬僥種夷陸類等舉種內附永昌郡在雒陽西七千二百六十里僬僥國人長不過三尺徼吉弔翻僬茲消翻僥倪翻種章勇翻延平元年甲申葬清河孝王於廣丘廣丘在清河厝縣後更名甘陵儀比東海恭王恭王葬見四十五卷明帝永平元年考異曰帝紀書車騎將軍護葬今從傳延平元年自和帝之喪鄧騭兄弟常居禁中騭不欲久在內連求還第太后許之夏四月封太傅張禹太尉徐防司空尹勤車騎將軍鄧騭城門校尉鄧悝虎賁中郎將鄧弘黃門郎鄧閶皆為列侯禹安鄉侯防龍鄉侯騭上蔡侯悝葉侯弘西平侯閶西華侯閶音昌考異曰袁紀前作閶後作闓蓋誤騭以定策功增三千戶騭及諸弟辭讓不獲遂逃避使者間關詣闕賢曰間關猶崎嶇也至于五六乃許之延平元年五月甲戌以長樂衞尉魯恭為司徒樂音洛恭上言舊制立秋乃行薄刑自永元十五年以來改用孟夏事見上卷拘對考驗連滯無已連謂獄辭相連及也滯謂留滯不決也下傷農業按月令孟夏斷薄刑者謂其輕罪已正謂已結正也斷丁亂翻下同故時斷之也臣愚以為今孟夏之制可從此令其決獄案考皆以立秋為斷又奏孝章皇帝欲助三正之微定律著令斷獄皆以冬至之前事見四十七卷章帝元和三年率章甲十六行本率下有入字乙十一行本同孔本同十一月得死罪賊不問曲直便即格殺雖有疑罪不復讞正復扶又翻讞魚列翻又魚戰翻又魚蹇翻議獄也可令大辟之科辟毗亦翻盡冬月乃斷朝廷皆從之延平元年丁丑詔封北海王睦孫壽光侯普為北海王和帝永元八年北海王威自殺今復紹封壽光縣本屬北海後屬樂安國延平元年九真徼外夜郎蠻夷舉土內屬延平元年西域都護段禧等雖保龜茲而道路隔塞塞悉則翻檄書不通公卿議者以為西域阻遠數有背叛數所角翻背蒲妹翻吏士屯田其費無已六月壬戌罷西域都護和帝永元三年復置西域都護今罷伊吾盧柳中屯田吏士而還延平元年初燒當羌豪東號之子麻奴隨父來降東號降見四十七卷和帝永元元年降戶江翻時諸降羌布在郡縣皆為吏民豪右所傜役傜使也及王弘西迎段禧發金城隴西漢陽羌數百千騎與俱郡縣迫促發遣㣥羌懼遠屯不還行到酒泉頗有散叛諸郡各發兵邀遮或覆其廬落於是勒姐當煎大豪東岸等愈驚遂同時奔潰姐音紫且翻又音紫麻奴兄弟因此與種人俱西出塞章甲十六行本塞下有先零別種四字乙十一行本同孔本同張校同退齋校同滇零與鍾羌諸種大為寇掠斷隴道零音憐續漢書曰種羌九千餘戶在隴西臨洮谷隴道隴坻之道也種章勇翻斷丁管翻時羌歸附既久無復器甲或持竹竿木枝以代戈矛或負板案以為楯楯食尹翻或執銅鏡以象兵銅鏡暎日人遙望之以為兵也丁卯赦除諸羌相連結謀叛逆者罪延平元年秋九月庚午太尉徐防以災異寇賊策免三公以災異免自妨始辛未司空尹勤以水雨漂流策免仲長統昌言曰仲姓也商湯左相仲虺周有仲山甫舜十六相有仲堪仲熊周八士有仲突仲忽忿強臣之竊命賢曰昌當也慍猶恨也數世謂元成哀平強臣謂王莽政不任下雖置三公事歸臺閣賢曰臺閣謂尚書余謂三公失職非至光武時始然也自武帝游宴後庭用宦者處樞機至於宣帝專任恭顯而丞相御史取充位事歸臺閣其所由來者漸矣三公之職備員而已然政有不治猶加譴責而權移外戚之家寵被近習之豎被皮義翻親其黨類用其私人內充京師外而州章甲十六行本州作列乙十一行本同孔本同郡顛倒賢愚貿易選舉貿音茂疲駑守境駑音奴駑駘馬之下乘以諭不才之吏貪殘牧民撓擾百姓撓音火高翻忿怒四夷招致乖叛亂離斯瘼用詩語賢曰瘼病也陰陽失和三光虧缺怪異數至數所角翻蟲螟食稼水旱為災此皆戚宦之臣所致然也反以策讓三公至於死免乃足為叫呼蒼天號咷泣血者矣放聲而哭曰號咷號戶刀翻咷徒刀翻中世之選三公也務於清愨謹慎循常習故者是乃婦女之檢柙賢曰檢柙猶規矩也揚子曰蠢迪撿押註云撿押猶隱括也毛晃曰撿押檢束也輔也俗作檢柙非惡足以居斯位邪惡音烏下同勢既如彼選又如此而欲望三公勳立於國家績加於生民不亦遠乎昔文帝之於鄧通可謂至愛而猶展申徒嘉之志事見十四卷文帝後二年則何患於左右小臣哉至如近世外戚宦豎請託不行意氣不滿立能陷人於不測之禍惡可得彈正者哉曩者任之重而責之輕今者任之輕而責之重光武奪三公之重至今而加甚不假后黨以權數世而不行蓋親疏之勢異也賢曰言光武奪三公重任今奪更甚光武不假后黨威權數代遂不遵行此為三公疏后黨親故也分任責成而在位病民病民謂百姓受其害也百姓不安爭訟不息天地多變人物多妖妖於驕翻然後可以分此罪矣延平元年壬午詔太僕少府減黃門鼓吹以補羽林士漢官儀曰黃門鼓吹百四十五人羽林左監主羽林八百人右監主九百人杜佑曰漢代有黃門鼓吹享宴食舉樂十三曲與魏代鼓吹長簫伎錄並云絲竹合作執節者歌又建初錄云務成黃爵玄雲遠期皆騎吹曲非鼓吹曲此則列於殿庭者為鼓吹今之從行者為騎吹二曲異也孫權觀魏武軍作鼓吹而還應是此鼓吹魏晉代給鼓吹甚輕牙門督將五校悉有鼓吹齊梁至陳則重矣今代短簫鐃歌亦謂之鼓吹蔡邕曰鼓吹軍樂也黃帝岐伯所作以揚威武勸士諷敵也雍門周說孟嘗君鼓吹于不測之淵說者云鼓自一物吹自竽籟之屬非簫鼓合奏別為一樂之名也然則短簫鐃歌此時未名鼓吹矣宋白曰鼓吹據崔豹古今註張騫使西域得摩訶兜勒一曲李延年增之分為二十八曲梁置清商鼓吹令二人唐又有掆鼓金鉦大鼓長鳴歌簫笳笛合為鼓吹十二按大享會則設於縣外广既皆減半食賢曰乘輿所乘車興也不敢斥言尊者故稱乘輿見蔡邕獨斷乘繩證翻非供宗廟園陵之用皆且止延平元年庚寅以太傅張禹為太尉太常周章為司空大長秋鄭衆中常侍蔡倫等皆秉勢豫政周章數進直言數所角翻太后不能用初太后以平原王勝有痼疾而貪殤帝孩抱養為己子故立焉及殤帝崩㣥臣以勝疾非痼意咸歸之太后以前不立勝恐後為怨乃迎帝而立之周章以衆心不附密謀閉宮門誅鄧騭兄弟及鄭衆蔡倫劫尚書廢太后於南宮封帝為遠國王而立平原王事覺冬十一月丁亥章自殺延平元年戊子敕司隸校尉冀幷二州刺史民訛言相驚棄捐舊居老弱相攜窮困道路其各敕所部長吏躬親曉喻長知兩翻若欲歸本郡在所為封長檄不欲勿強為于偽翻賢曰封謂印封之也長檄猶今長牒也欲歸者皆給以長牒為驗強音其兩翻延平元年十二月乙卯以潁川太守張敏為司空延平元年詔車騎將軍鄧騭征西校尉任尚將五營及諸郡兵五萬人五營北軍五校營也考異曰帝紀在六月今從西羌傳延平元年是歲郡國十八地震四十一大水二十八大風雨雹延平元年鮮卑大人燕荔陽詣闕朝賀太后賜燕荔陽王印綬赤車參駕赤車者帷裳衡軛皆赤參駕者駕三馬燕於賢翻荔力計翻甯城屬上谷郡因築南北兩部質館賢曰築館以受降質質音致下同二年延平二年春正月鄧騭至漢陽諸郡兵未至鍾羌數千人擊敗騭軍于冀西冀縣之西也敗補邁翻梁慬還至敦煌自西域還也敦徒門翻逆迎也張掖郡在雒陽西四千二百里應劭曰張掖者言為國張臂掖也其能脫者十二三進至姑臧羌大豪三百餘人詣慬降並慰譬遣還故地延平二年御史中丞樊準以郡國連年水旱民多飢困上疏請令太官尚方考功上林池籞諸官實減無事之物賢曰前書百官表少府掌山海池澤之稅屬官有太官考工尚方上林中十池監太官掌御膳飲食考工主作器械尚方主作刀劍實減謂實覆其數減之也功當作工籞偶許翻賢曰五府謂太傅太尉司徒司空大將軍也調徵發也省減也中都官吏在京師之官吏也作謂營作者也余按是時不拜大將軍獨鄧騭為車騎將軍耳調徒弔翻被災之郡百姓凋殘恐非賑給所能勝贍被皮義翻勝音升雖有其名終無其實可依征和元年故事賢曰武帝征和元年詔曰當今務在禁苛暴止亶賦力本農桑毋乏武備而已余據此乃征和四年詔也征和元年當有遣使慰安故事尤困乏者徙置荊揚孰郡孰古熟字通宜先東州之急西屯謂討羌之師東州謂雒陽以東冀兗諸州被水旱也先悉薦翻悉以公田賦與貧民賦布也二月乙丑遣準使冀州倉使兗州亶貸流民咸得蘇息亶給也貸施也死而更生曰蘇氣絕而復續曰息延平二年夏旱五月丙寅皇太后幸雒陽寺賢曰寺官舍也風俗通曰寺嗣也理事之吏嗣續於其中前漢有若盧獄屬少府漢舊儀曰主鞠將相大臣東都初省和帝永元九年復置雒陽有囚實不殺人而被考自誣羸困輿見輿箯輿也獄囚被掠委困者以箯輿處之師古曰編竹木以為輿形如今之食輿見賢遍翻箯音編將去舉頭若欲自訴太后察視覺之即呼還問狀具得枉實得其見枉之實也下遐稼翻行未還宮澍雨大降澍音注又殊遇翻時雨也延平二年六月京師及郡國四十大水大風雨雹東觀記曰雹大如芋魁雞子風拔樹發屋雨于具翻延平二年秋七月太白入北斗晉書天文志北斗七星在太微北七政之樞機陰陽之元本也故運乎中央而臨制四方所以建四時而均五行也天文志曰太白入斗中為貴相凶延平二年閏月章甲十六行本月下有辛丑二字乙十一行本同退齋校同廣川王常保薨無子國除延平二年癸未蜀郡徼外羌舉土內屬東觀記曰徼外羌薄申等八種舉衆降徼吉弔翻延平二年冬鄧騭使任尚及從事中郎河內司馬鈞率諸郡兵與滇零等數萬人戰于平襄平襄縣屬漢陽郡賢曰故襄戎邑零音憐死者八千餘人羌衆遂大盛朝廷不能制湟中諸縣粟石萬錢百姓死亡不可勝數而轉運難劇劇甚也勝音升將作大匠屬官有左右校令各一人秩六百石左校令掌左工徒右校令掌右工徒校戶教翻龐皮江翻使其子俊上書曰方今西州流民擾動而徵發不絕水潦不休地力不復賢曰言其耗損不復於舊重直用翻疲之以遠戍農功消於轉運資財竭於徵發田疇不得墾闢禾稼不得收入搏手困窮賢曰兩手相捕言無計也百姓力屈不復堪命復扶又翻臣愚以為萬里運糧遠就羌戎不若總兵養衆以待其疲車騎將軍騭宜且振旅傳曰三年而治兵入而振旅書曰班師振旅振整也整衆而還也使督涼州士民轉居三輔參建棄涼州之議發於此書止煩賦以益其財令男得耕種女得織絍賢曰絍音如深翻杜預註左傳云織絍織繒布也字釋云絍機縷也又如沁翻乘懈沮出其不意攻其不備則邊民之仇報奔北之恥雪矣懈古隘翻沮在呂翻書奏會樊準上疏薦參太后即擢參於徒中召拜謁者使西督三輔諸軍屯十一月辛酉詔鄧騭還師留任尚屯漢陽為諸軍節度遣使迎拜騭為大將軍既至使大鴻臚親迎中常侍郊勞臚陵如翻勞力到翻王主以下候望於道寵靈顯赫光震都鄙王主諸王及諸公主也鄧騭西征無功而還當引罪求自貶以謝天下據勢持權冒受榮寵於心安乎君子是以知其不終也延平二年滇零自稱天子於北地招集武都參狼羌居武都者為參狼種參所簪翻寇鈔三輔斷丁管翻鈔楚交翻南入益州殺漢中太守董炳梁慬受詔當屯金城聞羌寇三輔即引兵赴擊轉戰武功美陽間武功美陽二縣屬扶風羌稍退散延平二年十二月廣漢塞外參狼羌降此與武都參狼同種而分居廣漢塞外者也延平二年是歲郡國十二地震三年延平三年春正月庚子皇帝加元服赦天下延平三年遣騎都尉任仁督諸郡屯兵救三輔仁戰數不利數所角翻當煎勒姐羌攻沒破羌縣破羌縣屬金城縣郡鍾羌攻沒臨洮縣執隴西南部都尉臨洮縣隴西南部都尉治所洮土刀翻延平三年三月京師大饑民相食壬辰公卿詣闕謝詔務思變復以助不逮變改也改過以復於善也延平三年壬寅司徒魯恭罷恭再在公位和帝永元十二年恭代呂蓋為司徒永初元年復代梁鮪為司徒此謂恭府掾屬之高第也守手又翻耆老也至有怨望者恭聞之曰學之不講是吾憂也論語載孔子之言賢曰言人患學之不習耳若能究習自有鄉里之舉豈要待三公之辟乎亦不借之議論學者受業必窮核問難難乃旦翻道成然後謝遣之學者曰魯公謝與議論不可虛得延平三年夏四月丙寅以大鴻臚九江夏勤為司徒延平三年三公以國用未足奏令吏民入錢穀得為關內侯虎賁羽林郎五官大夫官府吏緹騎營士各有差五官亦郎也大夫光祿太中中散諫議大夫也官府吏給事諸官府者賢曰續漢志曰執金吾緹騎二百人緹赤黃色營士謂五校營士也緹丁禮翻又丁奚翻延平三年甲申清河愍王虎威薨無子五月丙申封樂安王寵子延平為清河王奉孝王後延平三年六月漁陽烏桓與右北平胡千餘寇代郡上谷考異曰紀有涿郡傳無之今從傳延平三年漢人韓琮隨匈奴南單于入朝漢人與匈奴錯居韓琮因事南單于琮徂宗翻說南單于云說式芮翻關東水潦人民飢餓死盡可擊也單于信其言遂反延平三年秋七月海賊張伯路等寇濱海九郡殺二千石令長長知兩翻遣侍御史巴郡龐雄督州郡兵擊之伯路等乞降尋復屯聚復扶又翻延平三年九月鴈門烏桓率衆王無何允與鮮卑大人丘倫等及南匈奴骨都章甲十六行本都下有侯字乙十一行本同孔本同張校同退齋校同合七千騎寇五原與太守戰于高渠谷賢曰東觀記戰九原高梁谷渠梁相類必有誤延平三年南單于圍中郎將耿种於美稷使匈奴中郎將也种音沖以大司農陳國何熙行車騎將軍事中郎將龐雄為副將五營及邊郡兵二萬餘人又詔遼東太守耿夔率鮮卑及諸郡章甲十六行本郡下有兵字乙十一行本同孔本同張校同退齋校同共擊之以梁慬行度遼將軍事雄夔擊南匈奴薁鞬日逐王破之薁於六翻鞬居言翻延平三年十二月辛酉郡國九地震延平三年乙亥有星孛于天苑晉書天文志天苑十六星在昴畢南天子之苑囿養獸之所也孛蒲內翻延平三年是歲京師及郡國四十一雨水幷涼二州大飢人相食延平三年太后以陰陽不和軍旅數興數所角翻詔歲終饗遣衞士勿設戲作樂西都之制歲盡衞卒交代上臨饗罷遣之續漢志曰饗遣故衞士儀百官會位定謁者持節引故衞士入自端門衞司馬執幡鉦護行行定侍御史持節慰勞以詔恩問所疾苦受其章奏所欲言畢饗賜作樂觀以角抵樂闋罷遣勸以農桑賢曰侲子逐疫之人也音振薛綜註西京賦云侲之言者也善童幼子也續漢書曰大儺選中黃門子弟年十歲以上十二以下百二十人為侲子皆赤幘皁製執大鞉四年延平四年春正月元會徹樂不陳充庭車賢曰每大朝會必陳乘輿法物車輦於庭以年饑故不陳延平四年鄧騭在位頗能推進賢士薦何熙李郃等列於朝廷郃曷閣翻又辟弘農楊震巴郡陳禪等置之幕府天下稱之震孤貧好學明歐陽尚書通達博覽諸儒為之語曰關西孔子楊伯起楊震字伯起居弘農在函谷關之西不答州郡禮命禮謂延聘之禮命謂辟置之命謂歲月已老而出仕遲也騭聞而辟之時震年已五十餘累遷荊州刺史東萊太守郡國志東萊郡在雒陽東三千一百二十八里道經昌邑昌邑縣屬山陽郡賢曰昌邑故城在今兗州金鄉縣西北夜懷金十斤以遺震遺于季翻下同震曰故人知君君不知故人何也密曰暮夜無知者震曰天知地知我知子知何謂無知者密愧而出後轉涿郡太守郡國志涿郡在雒陽東北千八百里于子孫常蔬食步行食不魚肉行不車騎也為于偽翻震不肯曰使後世稱為清白吏子孫以此遺之不亦厚乎延平四年張伯路復攻郡縣殺守令復扶又翻下同黨衆浸盛詔遣御史中丞王宗持節發幽冀諸郡兵合數萬人徵宛陵令扶風法雄為青州刺史宛陵縣屬河南尹法姓也齊襄王法章之後秦滅齊子孫不敢稱田姓故以法為氏延平四年南單于圍种各數月梁慬耿夔擊斬其別將於屬國故城班志西河美稷縣屬國都尉治故城蓋在美稷縣界將即亮翻下同慬等復破之單于遂引還虎澤班志西河郡穀羅縣虎澤在西北師古避唐諱以虎為武延平四年丙午詔減百官及州郡縣奉各有差奉讀曰俸延平四年二月南匈奴寇常山延平四年滇零遣兵寇褒中褒中縣屬漢中郡古褒國也賢曰今梁州褒城縣任尚軍久出無功民廢農桑乃詔尚將吏民章甲十六行本民作兵乙十一行本同還屯長安罷遣南陽潁川汝南吏士乙丑初置京兆虎牙都尉於長安扶風都尉於雍如西京三輔都尉故事賢曰漢官儀京兆虎牙扶風都尉以涼州近羌數犯三輔將兵衞護園陵扶風都尉居雍故俗人稱雍營西京三輔京兆有京輔都尉馮翊有左輔都尉扶風有右輔都尉謁者龐參說鄧騭說輸芮翻徙邊郡不能自存者入居三輔騭然之欲棄涼州幷力北邊乃會公卿集議騭曰譬若衣敗壞一以相補猶有所完懷音怪若不如此將兩無所保章甲十六行本保下有公卿皆以為然六字乙十一行本同孔本同張校同退齋校同郎中陳國虞詡言於太尉張禹曰若大將軍之策不可者三先帝開拓土宇劬勞後定而今憚小費舉而棄之此不可一也涼州既棄即以三輔為塞隴西安定北地皆涼州所部涼州既棄則三輔為極邊此不可二也喭曰關西出將關東出相賢曰說文喭傳言也前書秦漢以來山西出將山東出相秦時郿白起頻陽王翦漢興義渠公孫賀傅介子成紀李廣李蔡上邽趙充國狄道辛武賢皆名將也丞相則蕭曹魏邴韋平孔翟之類也多出涼州土風壯猛便習兵事今羌胡所以不敢入據三輔為心腹之害者以涼州在後故也涼州士民所以推鋒執銳蒙矢石於行陳行戶剛翻陳讀曰陣父死於前子戰於後無反顧之心者為臣屬於漢故也為于偽翻今推而捐之推通回翻割而棄之民庶安土重遷必引領而怨曰中國棄我於夷狄雖赴義從善之人不能無恨如卒然起謀卒讀曰猝因天下之饑敝乘海內之虛弱豪雄相聚量材立帥量音良帥所類翻驅氐羌以為前鋒席卷而東雖賁育為卒太公為將賁音奔將即亮翻猶恐不足當禦如此則函谷以西園陵舊京非復漢有復扶又翻此不可三也是後北宮伯玉王國閻忠馬騰韓遂之變卒如詡言賢曰席卷言無餘也前書曰雲徹席卷後無餘災也余謂席卷者言其勢便易也詡恐其疽食侵淫而無限極也賢曰疽癰瘡也余謂食者言其侵食肌肉也考異曰龐參虞詡傳皆云四提羌轉盛故有棄涼州之畫又干說鄧騭則是騭未以喪罷以前明矣而虞詡傳中言詡辟太尉李脩府為郎中說李脩脩以五年正月方自光祿勳拜太尉按袁紀四年春匈奴寇常山下載騭欲棄涼州詡說太尉張禹又其言語小異於范書此近得實今從之吾意不及此微子之言幾敗國事微無也幾居希翻收羅涼土豪桀說輸芮翻引其牧守子弟於朝守式又翻朝直遙翻令諸府各辟數人外以勸厲答其功勤內以拘致防其邪計禹善其言更集四府皆從詡議於是辟西州豪桀為掾屬拜牧守長吏子弟為郎以安慰之掾俞絹翻長知兩翻下同鄧騭由是惡詡欲以吏法中傷之惡烏路翻中竹仲翻會朝歌賊甯季等數千人攻殺長吏屯聚連年州郡不能禁乃以詡為朝歌長朝歌縣屬河內郡賢曰朝歌故城在今衞州衞縣西謂其將得罪也事不避難臣之職也不遇槃根錯節無以別利器以斤斧自喻也別彼列翻始到謁河內太守馬稜稜曰君儒者當謀謨廟堂乃在朝歌甚為君憂之為于偽翻詡曰此賊犬羊相聚以求溫飽耳願明府不以為憂稜曰何以言之詡曰朝歌者韓魏之郊賢曰韓界上黨魏界河內相接太行故云郊也背蒲妹翻行戶剛翻臨黃河去敖倉不過百里而青冀之民流亡萬數賊不知開倉招衆劫庫兵守成皋斷天下右臂賢曰右臂喻要便也余謂右臂之說祖張儀見三卷周赧王四年斷丁管翻今其衆新盛難與爭鋒兵不厭權願寬假轡策勿令有所拘閡而已詡欲用度外之人以制㣥盜恐郡守循常襲故以文法繩之故先以此言於稜賢曰閡與礙同設三科以募求壯士自掾史以下各舉所知百官志縣有廷掾猶郡之五官掾也監鄉部春夏為勸農掾秋冬為制度掾史則有獄史佐史斗食令史掾史幹小史傷人偷盜者次之不事家業者為下收得百餘人詡為饗會悉貰其罪此三等人皆惡少年負宿罪者也悉貰之使入賊為間為于偽翻貰始制翻乃伏兵以待之遂殺賊數百人誘賊出劫掠而伏兵殺之誘音酉以采線縫其裙有出市里者吏輒禽之賊由是駭散咸稱神明縣境皆平延平四年三月何熙軍到五原曼柏暴疾不能進遣龐雄與梁慬耿种將步騎萬六千人攻虎澤連營稍前單于見諸軍並進大恐怖怖普布翻顧讓韓琮曰汝言漢人死盡今是何等人也賢曰顧反也讓責也反顧責韓琮也許之單于脫帽徒跣對龐雄等拜陳道死罪自陳謝罪言當死也遇待如初乃還所鈔漢民男女鈔楚交翻及羌所略轉賣入匈奴中者合萬餘人會熙卒即拜梁慬為度遼將軍龐雄還為大鴻臚延平四年先零羌復寇褒中復扶又翻下同鄭勤欲擊之主簿段崇諫以為虜乘勝鋒不可當宜堅守待之勤不從出戰大敗死者三千餘人段崇及門下史王宗原展周原伯之後有原莊公又晉卿先軫邑於原子孫以為氏又孔子弟子有原憲與勤俱死郡門下有掾有史張徙上脫於是二字金城郡居襄武襄武縣屬隴西郡賢曰今渭州縣延平四年戊子杜陵園火宣帝陵園也延平四年癸巳郡國九地震延平四年夏四月六州蝗東觀記曰司隸豫兗徐青冀六州延平四年丁丑赦天下延平四年王宗法雄與張伯路連戰破走之會赦到赦書到也不敢歸降降戶江翻王宗召刺史太守共議刺史青州刺史太守青州所部諸郡太守法雄曰不然兵凶器戰危事賢曰史記范蠡之辭勝不可必賊若乘船浮海深入遠島島都老翻水中有山曰島攻之未易也易以豉翻及有赦令可且罷兵以慰誘其心勢必解散然後圖之可不戰而定也宗善其言即罷兵賊聞大喜乃還所略人而東萊郡兵獨未解甲賊復驚恐遁走遼東止海島上果如法雄之言延平四年秋七月乙酉三郡大水延平四年騎都尉任仁與羌戰累敗而兵士放縱檻車徵詣廷尉死護羌校尉段禧卒復以前校尉侯霸代之移居張掖永初二年侯霸以衆羌反叛免護羌校尉時居狄道按水經註羌水出湟中西南山下逕護羌城東故護羌校尉治又東逕臨羌城西護羌校尉蓋治金城郡臨羌縣界也然宣帝置護羌校尉本治金城令居東都定河隴之後護羌校尉治安夷縣既而自安夷徙臨羌侯霸先居隴西狄道以羌叛而臨羌不可居也今移居張掖以隴西殘破復渡河而西延平四年九月甲申益州郡地震賢曰益州郡故城在今昆州晉寧縣延平四年皇太后母新野君病續漢志曰婦人封君儀比公主油鞬軿車帶綬以采組為緄帶各如其綬色黃金辟邪加其首為帶連日宿止三公上表固爭乃還宮冬十月甲戌新野君薨使司空護喪事儀比東海恭王恭王事見四十四卷明帝永平元年太后欲不許以問曹大家大家上疏曰妾聞謙讓之風德莫大焉今四舅深執忠孝引身自退賢曰四舅謂騭悝弘閶也拒而不許如後有毫毛加於今日誠恐推讓之名不可再得賢曰謂有纖微之過則推讓之美失也及服除詔騭復還輔朝政朝直遙翻更授前封帝即阼之初封騭悝弘閶皆辭不受乃止於是並奉朝請位次三公下特進侯上賢曰在特進及侯之上請才性翻又如字乃詣朝堂與公卿參謀延平四年太后詔陰后家屬皆歸故郡陰后家南徙事見上卷和帝永元十四年歸故郡歸南陽也五年延平五年春正月庚辰朔日有食之延平五年丙戌郡國十地震延平五年己丑太尉張禹免甲申以光祿勳潁川李脩為太尉延平五年先零羌寇河東至河內零音憐百姓相驚多南奔渡河使北軍中候朱寵將五營士屯孟津北軍中候掌監屯騎越騎步兵長水射聲五營續漢志曰舊有中壘校尉領北軍營壘之事中興省中壘但置中候以監五營洪氏隸釋曰按祝睦後碑書為北軍軍中候則知此亦省文耳郡國四皆屬冀州懼羌自河東河內北入冀州界故作塢候以備之而緣邊二千石令長多內郡人並無守戰意皆爭上徙郡縣以避寇難長知兩翻上時掌翻三月詔隴西徙襄武隴西郡本治狄道考異曰上云金城徙襄武此又云隴西徙襄武紀傳皆然或者二郡皆寄治於襄武歟北地徙池陽上郡治章甲十六行本治作徙乙十一行本同衙賢曰安定郡今涇州也美陽故城在今武功縣北北地郡今寧州池陽縣故城在今涇陽縣北上郡今綏州也衙縣故城在今同州白水縣東北左傳秦晉戰于彭衙即此也余按郡國志美陽縣屬扶風池陽衙二縣屬馮翊衙音牙不樂去舊樂音洛遂乃刈其禾稼發徹室屋夷營壁破積聚積子賜翻聚慈喻翻時連旱蝗饑荒而驅䠞劫掠流離分散隨道死亡或棄捐老弱或為人僕妾喪其太半䠞與蹙同喪息浪翻擊羌於上黨羊頭山破之賢曰羊頭山在上黨郡穀遠縣復扶又翻下同延平五年夫餘王寇樂浪夫餘為寇始此夫音扶樂浪音洛琅句如字又音駒驪力知翻濊音穢貊莫百翻菟同都翻延平五年夏閏四月丁酉赦涼州河西四郡延平五年海賊張伯路復寇東萊青州刺史法雄擊破之賊逃還遼東遼東人李久等共斬之張伯路永初三年作亂至是始平延平五年秋九月漢陽人杜琦及弟季貢同郡王信等與羌通謀聚衆據上邽城冬十二月漢陽太守趙博遣客杜習刺殺琦刺七亦翻封習討姦侯杜季貢王信等將其衆據樗泉營延平五年是歲九州蝗郡國八雨水六年延平六年春正月甲寅詔曰凡供薦新味多非其節或鬱養強孰謂為土室蓄火使土氣蒸鬱而養之強使成熟也前書召信臣傳曰太官園種冬生葱韭菜茹覆以屋廡晝夜然蘊火待溫氣乃生強其兩翻味無所至而夭折生長夭於兆翻短折曰夭長知兩翻豈所以順時育物乎傳曰非其時不食賢曰論語曰不時不食言非其時物則不食之前書召信臣曰不時之物有傷於人不宜以奉供養皆須時乃上時熟乃上進也上時掌翻種章勇翻延平六年三月十州蝗延平六年夏四月乙丑司空張敏罷己卯以太常劉愷為司空延平六年詔建武元功二十八將皆紹封延平六年五月旱延平六年丙寅詔令中二千石下至黃綬一切復秩董巴輿服志中二千石青綬四百石二百石黃綬四年減百官奉今復之延平六年六月壬辰豫章員谿原山崩豫章郡在雒陽南二千七百里屬揚州延平六年辛巳赦天下延平六年侍御史唐喜討漢陽賊王信破斬之杜季貢亡從滇零是歲滇零死子零昌立年尚少同種狼莫為其計策滇音顛零音憐少詩照翻種章勇翻以季貢為將軍別居丁奚城按東觀記丁奚城在北地郡靈州縣七年延平七年春二月丙午郡國十八地震延平七年夏四月乙未平原懷王勝薨無子太后立樂安夷王寵子得為平原王延平七年丙申晦日有食之延平七年秋護羌校尉侯霸騎都尉馬賢擊先零別部牢羌於安定零音憐獲首虜千人延平七年蝗元初元年甲寅一一四延平七年春正月甲子改元延平七年二月乙卯日南地坼長百餘里東觀記曰坼長百八十二里廣五十六里長直亮翻延平七年三月癸亥日有食之考異曰帝紀二月己卯日南地坼三月癸酉日食本志及袁紀皆云三月己卯日南地坼按長曆是年二月壬辰朔無己卯三月壬戌朔癸酉十二日不應日食二月當是乙卯三月當是癸亥延平七年詔遣兵屯河內通谷衝要三十六章甲十六行本六作三乙十一行本同孔本同所皆作塢壁設鳴鼓以備羌寇自太行北至恆山限隔幷冀其間多有谷道以相通今於衝要之地作塢壁以備羌寇延平七年夏四月丁酉赦天下延平七年京師及郡國五旱蝗延平七年五月先零羌寇雍城右扶風雍縣城也雍於用翻延平七年蜀章甲十六行本蜀上有秋七月三字乙十一行本同孔本同張校同退齋校同郡夷寇蠶陵殺縣令蠶陵縣屬蜀郡賢曰蠶陵故城在今翼州翼水縣西有蠶陵山因以名焉延平七年九月乙丑太尉李脩罷延平七年羌豪號多與諸種鈔掠武都漢中巴郡板楯蠻救之按范書板楯蠻夷者秦昭襄王時射殺白虎有功昭王復夷人頃田不租十妻不算傷人者論殺人者得以倓錢贖死高祖為漢王發夷人以定三秦復其渠帥七姓不輸租賦餘戶乃歲入賨錢口四十世號為板楯蠻夷閬中有渝水其人多居水左右天性勁勇數陷陳喜歌舞高祖為制巴渝舞蠻蓋挾板楯而戰因以為名楯食尹翻倓徒濫翻賨藏宗翻百官志郡有五官掾署功曹及諸曹事掾俞絹翻斷隴道與零昌合斷丁管翻零音憐侯霸馬賢與戰於枹罕破之枹罕縣屬隴西郡唐之河州枹音膚延平七年辛未以大司農山陽司馬苞為太尉延平七年冬十月戊子朔日有食之延平七年涼州刺史皮楊姓譜皮樊仲皮之後又鄭有上卿子皮出於罕氏大敗死者八百餘人考異曰紀作皮陽今從西羌傳余按隴西郡舊治狄道去年徙襄武則其地已棄而不有矣延平七年是歲郡國十五地震二年延平二年春護羌校尉龐參以恩信招誘諸羌號多等帥衆降帥讀曰率降戶江翻參遣詣闕賜號多侯印遣之參始還治令居自張掖徙還令居也延平二年零昌分兵寇益州遣中郎將尹就討之延平二年夏四月丙午立貴人滎陽閻氏為皇后閻后之母鄧弘之妻之同產也故得立後宮李氏生皇子保后鴆殺李氏為后廢保張本保後立是為順帝延平二年五月京師旱河南及郡國十九蝗河南即京師也延平二年六月丙戌太尉司馬苞薨延平二年秋七月辛巳以太僕泰山馬英為太尉延平二年八月遼東鮮卑圍無慮無慮縣屬遼東郡應劭曰慮音閭師古曰即所謂毉無閭按郡國志無慮縣時屬遼東屬國又攻夫犂營殺縣令賢曰夫犂縣屬遼東屬國故城在今營州東南余按兩漢志遼東郡及遼東屬國皆無夫犂縣今言殺縣令則嘗為縣矣未知賢所據者何書也延平二年壬午晦日有食之延平二年尹就擊羌黨呂叔都等蜀人陳省羅橫應募刺殺叔都刺七亦翻皆封侯賜錢延平二年詔屯騎校尉班雄屯三輔雄超之子也以左馮翊司馬鈞行征西將軍督關中諸郡兵八千餘人龐參將羌胡兵七千餘人與鈞分道並擊零昌參兵至勇士東賢曰勇士縣屬天水郡余按天水時已改為漢陽郡引退敗補邁翻鈞等獨進攻拔丁奚城杜季貢率衆偽逃鈞令右扶風仲光等收羌禾稼考異曰袁紀作右扶風太守种暠今從范書散兵深入羌乃設伏要擊之要一遙翻鈞在城中怒而不救冬十月乙未光等兵敗並沒死者三千餘人鈞乃遁還龐參既失期稱病引還皆坐徵下獄下遐稼翻鈞自殺時度遼將軍梁慬亦坐事抵罪校書郎中扶風馬融融以郎中校蘭臺書故稱校書郎中宜宥過責效詔赦參等考異曰慬傳曰慬為度遼將軍明年安定北地上郡皆被羌寇不能自立詔慬發邊兵迎三郡吏民徙扶風界慬即遣南單于兄子優孤塗奴將兵迎之既還慬以塗奴接其家屬有勞輒授以羌侯印綬坐專亶徵下獄抵罪明年校書郎馬融上書訟慬與參按慬為度遼將軍在永初四年徙三郡民在五年參下獄在今年不得云明年融訟之也疑傳誤復以任尚為中郎將代班雄屯三輔考異曰帝紀冬十月遣任尚屯三輔按西羌傳司馬鈞抵罪後尚乃代雄屯三輔耳復扶又翻懷令虞詡說尚曰說輸芮翻兵法弱不攻強走不逐飛自然之勢也今虜皆馬騎日行數百里來如風雨去如絕弦以步追之勢不相及所以雖屯兵二十餘萬曠日而無功也為使君計莫如罷諸郡兵各令出錢數千二十人共市一馬以萬騎之衆逐數千之虜追尾掩截賢曰尾猶尋也余謂尾者隨其後而擊之也掩襲也截邀也言虜之路自窮不能捷出而寇掠也大功立矣尚即上言用其計遣輕騎擊杜季貢於丁奚城破之太后聞虞詡有將帥之略以為武都太守考異曰翊傳曰羌寇武都太后以翊有將帥之略遷武都太守又曰賊敗散南入益州本紀元初元年羌寇武都漢中據此似詡以元初元年為武都太守也然按西羌傳龐參抵罪後任尚屯三輔時詡猶為懷令說尚用騎兵袁紀亦云懷令虞詡說尚如范書所言又云上問何從發此計尚表之受於懷令虞詡由是知名遷武都太守以此驗之當在龐參抵罪後也此崤谷當在陳倉縣界即今之大散關非弘農澠池縣之崤山也而宣言上書請兵須到當發羌聞之乃分鈔傍縣鈔楚交翻詡因其兵散日夜進道兼行百餘里令吏士各作兩竈日增倍之羌不敢逼或問曰孫臏減竈而君增之減竈事見二卷周顯王二十八年臏頻忍翻以戒不虞前書吉行五十里師行三十里詡曰虜衆多吾兵少徐行則易為所及易以豉翻速進則彼所不測虜見吾竈日增必謂郡兵來迎衆多行速必憚追我孫臏見弱見賢遍翻吾今示強勢有不同故也既到郡兵不滿三千而羌衆萬餘攻圍赤亭數十日賢曰赤亭故城在今渭州襄武縣東南有赤亭水余按唐渭州漢隴西郡地漢武都唐階成州地此自是武都之赤亭非渭州之赤亭也又按郡國志武都下辨縣有赤亭即此強弩勿發而潛發小弩羌以為矢力弱不能至幷兵急攻詡於是使二十強弩共射一人發無不中射而亦翻中竹仲翻羌大震退詡因出城奮擊多所傷殺明日悉陳其兵衆令從東郭門出北郭門入貿易衣服回轉數周羌不知其數更相恐動貿音茂更工衡翻詡計賊當退乃潛遣五百餘人於淺水設伏候其走路詡知賊退遇水必踏淺而渡因於其處設伏以待之因掩擊大破之斬獲甚衆賊由是敗散詡乃占相地勢相息亮翻招還流亡假賑貧民開通水運詡按行川谷自沮至下辨數十里燒石翦木開漕船道穀石千鹽石八千見戶萬三千見存之戶也見賢遍翻米石八十鹽石四百民增至四萬餘戶人足家給一郡遂安延平二年十一月庚申郡國十地震延平二年十二月武陵澧中蠻反澧中今澧州地澧音禮延平二年己酉司徒夏勤罷夏戶雅翻延平二年庚戌以司空劉愷為司徒光祿勳袁敞為司空敞安之子也延平二年前虎賁中郎將鄧弘卒弘自遭母喪去官奉朝請故曰前治歐陽尚書漢千乘歐陽生傳伏生尚書由是尚書有歐陽氏學治立之翻有司奏贈弘驃騎將軍位特進封西平侯西平縣屬汝南郡不加贈位衣服但賜錢千萬布萬匹兄騭等復辭不受復扶又翻下同詔封弘子廣德為西平侯將葬有司復奏發五營輕車騎士禮儀如霍光故事賢曰霍光薨宣帝遣太中大夫侍御史持節護喪事中二千石修莫府冢上賜玉衣梓宮便房黃腸題湊轀輬車黃屋左纛輕車材官五校士以送葬也但白蓋雙騎門生輓送賢曰白蓋車也輓音晚騎奇寄翻分西平之都鄉封廣德弟甫德為都鄉侯王崇武標點容肇祖聶崇岐覆校
