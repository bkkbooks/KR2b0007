body:
  text: 資治通鑑卷第二十一翰林學士朝散大夫右諫議大夫知制誥兼侍講同提舉萬壽觀公事兼判集賢院上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣奉敕編集後學天台音注漢紀十三元封二年世宗孝武皇帝下之上元封二年壬申前一九元封二年冬十月上行幸雍祠五畤還祝祠泰一以拜德星師古曰拜而祠之加祝辭元封二年春正月公孫卿言見神人東萊山若云欲見天子天子於是幸緱氏城緱工侯翻拜卿為中大夫遂至東萊宿留之數日無所見宿留音秀溜見大人迹云復遣方士求神怪采芝藥以千數復扶又翻時歲旱天子既出無名乃禱萬里沙應劭曰萬里沙神祠也在東萊曲城孟康曰沙徑三百餘里杜佑通典萬里沙在萊州掖縣界四月還過祠泰山元封二年初河決瓠子河始決見十八卷元光二年復扶又翻塞悉則翻下同梁楚之地尤被其害被皮義翻是歲上使汲仁郭昌二卿發卒數萬人塞瓠子河決天子自泰山還自臨決河沈白馬玉璧于河沈持林翻令㣥臣從官自將軍以下皆負薪卒填決河從才用翻卒子恤翻築宮其上名曰宣防宮導河北行二渠復禹舊迹溝洫志禹導河自積石歷龍門南到華陰東下底柱及孟津洛汭至于大伾於是禹以為河所從來者高水湍悍難以行平地數為敗乃釃二渠以引其河北載之高地過洚水至於大陸播為九河同為迎河入勃海孟康曰二渠其一出貝丘西南南折者也其一則漯川也河自王莽時遂空惟用漯耳釃山支翻漯吐合翻無水災元封二年上還長安元封二年初令越巫祠上帝百鬼而用雞卜越俗用雞卜李奇曰持雞骨卜如鼠卜史記正義曰雞卜法用雞一狗一生祝願訖即殺雞狗煮熟又祭獨取雞兩眼骨上自有孔裂似人物形則吉不足則凶今嶺南猶行此法范成大桂海虞衡志雞卜南人占法以雄雞雛執其兩足焚香禱所占撲雞殺之拔兩股骨淨洗線束之以竹筳插束處使兩骨相背於筳端執竹再祝左骨為儂儂我也右骨為人人所占事也視兩骨之側所有細竅以細竹筳長寸餘遍插之斜直偏正各隨竅之自然以定吉凶法有十八變大抵直而正或近骨者多吉曲而斜或遠骨者多凶亦有用雞卵卜者握卵以卜書墨於殼記其四維煮熟橫截視當墨處辨殼中白之厚薄以定儂人吉凶元封二年公孫卿言仙人好樓居好呼到翻於是上令長安作蜚廉桂觀甘泉作益壽延壽觀應劭曰蜚廉神禽名能致風氣晉灼曰身似鹿頭如爵有角而蛇尾文如豹文桂觀漢志作桂館師古曰蜚廉桂館益壽延壽四館名觀古玩翻又作通天莖臺通天臺在甘泉宮漢舊儀曰臺高五十丈去長安二百里望見長安城更置甘泉前殿益廣諸宮室元封二年初全燕之世嘗略屬真番朝鮮徐廣曰遼東有番汙縣應劭曰玄菟本真番國番普安翻張晏曰朝鮮有濕水洌水汕水三水合為洌水疑樂浪朝鮮取名於此括地志高麗都平壤城本樂浪郡王險城又古云朝鮮索隱曰按朝音潮直驕翻鮮音仙以有汕水故也汕一音訕築障塞為于偽翻下同秦滅燕屬遼東外徼徼吉弔翻漢興為其遠難守復修遼東故塞至浿水為界班志浿水出遼東塞外西南至樂浪縣西入海水經浿水出樂浪鏤方縣東南過臨浿縣東入海酈道元注曰滿自浿水而至朝鮮若浿水東流無渡浿之理余訪蕃使言城在浿水之陽其水西流徑樂浪郡朝鮮縣故志曰浿水西至增地縣入海經誤浿普蓋翻又滂沛翻普大翻杜佑曰浿滂拜翻燕王盧綰反入胸奴見十二卷高祖十三年聚黨千餘人椎髻蠻夷服而東走出塞渡浿水居秦故空地上下障稍役屬真番朝鮮蠻夷及燕亡命者王之王于況翻都王險韋昭曰王險故邑名應劭曰遼東有險瀆縣即滿所都因水險故曰險瀆臣瓚曰王險在樂浪郡浿水之東師古曰瓚説是賢曰即平壤城天下初定遼東太守即約滿為外臣保塞外蠻夷無使盜邊諸蠻夷君欲入見天子勿得禁止見賢遍翻下同以故滿得以兵威財物侵降其旁小邑真番臨屯皆來服屬臨屯帝後開為郡注見下三年降戶江翻傳子至孫右渠所誘漢亡人滋多又未嘗入見誘音酉見賢遍翻下同辰國欲上書見天子又雍閼不通師古曰辰國即辰韓之國雍讀曰壅閼一曷翻漢使涉何誘諭涉姓也左傳晉有大夫涉他何去至界上臨浿水使御刺殺送何者朝鮮裨王長刺七亦翻即渡馳入塞遂歸報天子曰殺朝鮮將上為其名美將即亮翻為于偽翻下同即不詰拜何為遼東東部都尉遼東東部都尉治武次縣發兵襲攻殺何元封二年六月甘泉房中産芝九莖時芝産於甘泉齋房九莖連葉論衡芝生於土土氣和則芝草生瑞命記王者慈仁則芝草生元封二年上以旱為憂公孫卿曰黃帝時封則天旱乾封三年上乃下詔曰天旱意乾封乎乾音干元封二年秋作明堂於汶上班志泰山郡萊蕪縣禹貢汶水出西南入濟桑欽所言又曰琅邪郡朱虛縣東泰山汶水所出東至安丘入濰有五帝祠師古曰前言汶水出萊蕪入濟此又言出朱虛入濰將桑欽所言有異或者有二汶水乎余據班志明堂在泰山奉高縣西南四里又禹貢浮于汶達于濟此明堂當在濟之汶上琅邪之汶入于濰而濰入于海其地僻遠非立明堂處汶音問元封二年上募天下死罪為兵遣樓船將軍楊僕從齊浮渤海僕從齊浮渤海蓋自青萊以北幽平以南皆濱於海其海通謂之渤海非指渤海郡而言也以討朝鮮元封二年初上使王然于以越破及誅南夷兵威喻滇王入朝滇王者其衆數萬人其旁東北有勞深靡莫皆同姓相杖未肯聽杖直亮翻勞深靡莫數侵犯使者吏卒數所角翻於是上遣將軍郭昌中郎將衛廣發巴蜀兵擊滅勞深靡莫以兵臨滇滇王舉國降請置吏入朝於是以為益州郡續漢志益州郡去雒陽五千六百里魏晉為南中寧州之地唐為昆州姚州之地後沒于南詔師古曰唐南寧州昆州裒州也降戶江翻朝直遙翻復長其民復扶又翻又如字長丁丈翻是時漢滅兩越平西南夷置初郡十七臣瓚曰元鼎六年定南越地以為南海鬱林蒼梧合浦九真日南交趾珠崖儋耳郡定西南夷以為武都牂柯越巂沈黎汶山郡及地里志西南夷傳所置犍為零陵益州郡凡十七毋賦稅南陽漢中以往郡各以地比給初郡吏卒奉食幣物傳車馬被具師古曰地比謂依其次第自近及遠比頻寐翻奉扶用翻傳張戀翻被皮義翻殺吏漢發南方吏卒往誅之間歲萬餘人費皆仰給大農大農以均輸調鹽鐵助賦故能贍之然兵所過縣為以訾給毋乏而已訾讀曰資不敢言亶賦法矣帝初擊胡大司農賦稅專以奉戰士故有亶賦之法元封二年是歲以御史中丞南陽杜周為廷尉姓譜杜本陶唐氏劉纍之後在周為唐杜氏有杜伯內深次骨李奇曰其用法深刻至骨言大抵依放張湯也放甫往翻二千石繫者新故相因不減百餘人廷尉一歲至千餘章章者諸獄告劾之書上之廷尉者也小者數十人遠者數千近者數百里會獄師古曰往赴對也師古曰中都官凡京師諸官府也獄辭所及進考問者六七萬人也十萬餘人師古曰吏又於此外以文致之更增也三年三年冬十二月雷雨雹大如馬頭雨于具翻三年上遣將軍趙破奴擊車師破奴與輕騎七百餘先至虜樓蘭王遂破車師因舉兵威以困烏孫大宛之屬宛於元翻春正月甲申封破奴為浞野侯王恢佐破奴擊樓蘭封恢為浩侯從票侯趙破奴元鼎五年坐酎金失侯今以功復封浞野侯浞野侯浩侯功臣表不書所食邑浞士角翻三年初作角抵戲魚龍曼延之屬文穎曰名此樂為角抵兩兩相當角力角技藝射御蓋雜技樂也師古曰魚龍者為舍利之獸先戲於庭極畢乃入殿前化成比目魚跳躍漱水作霧障日畢化成黃龍八丈散戲於庭炫耀日光西京賦云海鱗變而成龍即謂此也曼延即西京賦所謂巨獸百尋是為曼延者也延弋戰翻三年漢兵入朝鮮境朝鮮王右渠發兵距險樓船將軍將齊兵七千人先至王險右渠城守窺知樓船軍少守式又翻少詩沼翻即出城擊樓船樓船軍敗散遁山中十餘日稍求退嚴退改收散卒復聚左將軍擊朝鮮水具章十四行本水具作浿孔本同張校同退齋校同下三見均同水西軍未能破天子為兩將未有利為于偽翻乃使衛山因兵威往諭右渠右渠見使者頓首謝願降恐兩將詐殺臣今見信節請復降復扶又翻降戶江翻下同遣太子入謝獻馬五千匹及饋軍糧人衆萬餘持兵方渡水具水使者及左將軍疑其為變謂太子已服降宜令人毋持兵太子亦疑使者左將軍詐殺之遂不渡水具水復引歸山還報天子天子誅山左將軍破水具水上軍乃前至城下圍其西北樓船亦往會居城南右渠遂堅守城數月未能下左將軍所將燕代卒多徑悍樓船將齊卒已嘗敗亡困辱卒皆恐將心慚將即亮翻悍下罕翻又侯旰翻其圍右渠常持和節左將軍急擊之朝鮮大臣乃陰間使人私約降樓船陰暗密也間空隙也言暗密遣使投空隙而出與樓船約降間古莧翻左將軍數與樓船期戰數所角翻下同樓船欲就其約不會左將軍亦使人求間隙降下朝鮮朝鮮不肯心附樓船以故兩將不相能左將軍心意樓船前有失軍罪意疑也億度也料也而又不降疑其有反計未敢發天子以兩將圍城乖異兵久不決使濟南太守公孫遂往正之濟子禮翻考異曰史記作征之蓋字誤今從漢書有便宜得以從事遂至左將軍曰朝鮮當下久之不下者樓船數期不會具以素所意告曰今如此不取恐為大害遂亦以為然乃以節召樓船將軍入左將軍營計事即命左將軍麾下執樓船將軍並其軍以報天子天子誅遂考異曰漢書作許遂按左將軍亦以爭功相嫉乖計棄市則武帝必以遂執樓船為非漢書作許蓋字誤今從史記左將軍已並兩軍即急擊朝鮮朝鮮相路人相韓陰考異曰漢書陰作陶今從史記應劭曰凡五人戎狄不知官紀故皆稱相師古曰相路人一也相韓陶二也尼溪相參三也將軍王硤四也應氏乃云五人失之矣不當尋下文乎余據韓陶今作韓陰蓋從史記相息亮翻硤音頰始欲降樓船樓船今執獨左將軍並將將即亮翻戰益急恐不能與戰王又不肯降陰硤路人皆亡降漢路人道死夏尼溪參使人殺朝鮮王右渠來降王險城未下故右渠之大臣成己又反復攻吏復扶又翻左將軍使右渠子長降相路人之子最師古曰右渠之子名長路人先已降漢而死於道故謂之降相最者其子名誅成己以故遂定朝鮮為樂浪臨屯玄菟真番四郡樂浪郡治朝鮮縣蓋以右渠所都為治所也臣瓚曰茂陵書臨屯郡治東暆縣去長安六千一百三十八里領十五縣玄菟郡本高句驪也既平朝鮮併開為郡治沃沮城後為夷貊所侵徙郡句驪西北真番郡治霅縣去長安七千六百四十里領十五縣余據後廢臨屯真番二郡班志東暆縣屬樂浪霅縣無所考樂音洛浪音狼功臣表澅清侯食邑於齊澅音獲又戶卦翻班書功臣表作荻苴侯食邑於勃海此從史記作萩音秋苴子餘翻功臣表平州侯食邑於泰山梁父縣功臣表作幾侯張洛食邑於河東為涅陽侯涅陽縣屬南陽郡涅乃結翻左將軍徵至坐爭功相嫉乖計棄市樓船將軍亦坐兵至列口班志列口縣屬樂浪郡郭璞曰山海經列水在遼東余謂其地當列水入海之口亶先縱失亡多當誅贖為庶人班固曰玄菟樂浪本箕子所封武王封箕子於朝鮮教其民以禮義田蠶織作為民設禁八條為于偽翻相殺以當時償殺相傷以穀償相盜者男沒入為其家奴女為婢欲自贖者人五十萬雖免為民俗猶羞之嫁娶無所售是以其民終不相盜無門戶之閉婦人貞信不淫辟辟讀曰僻其田野飲食以籩豆都邑頗放效吏往往以杯器食放甫往翻郡初取吏於遼東吏見民無閉臧臧讀曰藏及賈人往者賈音古夜則為盜俗稍益薄今於犯禁寖多至六十餘條可貴哉仁賢之化也然東夷天性柔順異於三方之外故孔子悼道不行設浮桴於海欲居九夷並見論語桴編竹木為之大者曰筏小者曰桴桴芳無翻三年秋七月膠西于王端薨端景帝子三年受封諡法能優其德曰于考異曰荀紀端皆作瑞今從漢書三年武都氐反分徙酒泉杜佑曰氐者西戎別種四年四年冬十月上行幸雍祠五畤雍於用翻畤音止通回中道遂北出蕭關師古曰回中在安定高平有險阻蕭關在其北此蓋自回中通道以出蕭關服虔曰獨鹿山名鳴澤澤名皆在涿郡遒縣北界水經注澤渚方十五里幸河東春三月祠后土赦汾陰夏陽中都死罪以下四年夏大旱四年胸奴自衛霍度幕以來度幕見十九卷元狩四年復扶又翻下同遠徙北方休養士馬習射獵數使使於漢數色角翻使使下疏吏翻好辭甘言求請和親漢使北地人王烏等窺胸奴烏從其俗去節入穹廬去羌呂翻師古曰穹廬氈帳也索隱曰蓋以氈為廬崇穹然而宋均曰穹獸名亦異説也單于愛之佯許甘言為遣其太子入漢為質質音致漢使楊信於胸奴信不肯從其俗單于曰故約漢嘗遣翁主給繒絮食物有品以和親師古曰品謂等差也今乃欲反古師古曰反違也無幾矣師古曰言遣太子為質則胸奴國中所餘者無幾皆當盡也余謂胸奴蓋自謂本與漢為鄰敵之國今乃令以太子為質是其國勢削弱所餘無幾也幾居豈翻漢又使王烏往而單于復讇以甘言師古曰讇古諂字紿謂王烏曰吾欲入漢見天子面相約為兄弟王烏歸報漢漢為單于築邸于長安漢為于偽翻胸奴曰非得漢貴人使吾不與誠語師古曰誠實也病漢豫藥欲愈之豫讀曰與不幸而死漢使路充國佩二千石印綬往使因送其喪厚葬直數千金曰此漢貴人也單于以為漢殺吾貴使者乃留路充國不歸諸所言者單于特空紿王烏師古曰特但也於是胸奴數使奇張奇作騎兵侵犯漢邊數所角翻乃拜郭昌為拔胡將軍及浞野侯屯朔方以東備胡五年五年冬上南巡狩至于盛唐文穎曰按地理志不得疑當在廬江左右縣名韋昭曰在南郡余據唐地理志壽州有盛唐縣蓋以古地名名縣宋白曰壽州六安縣楚之潛也在漢為盛唐縣西十五里有盛唐山地理志九疑山在零陵營道縣南亦名蒼梧山九峰相似望而疑之故曰九疑相傳舜死於蒼梧因葬焉故望祀之班志灊縣屬廬江郡天柱山在南帝以為南嶽灊音潛唐之舒州班志尋陽縣屬廬江郡禹貢九江在南皆東合為大江沈約曰尋陽因水名縣水南注江余據漢尋陽縣在大江之北自晉立尋陽郡於江南之柴桑而江北尋陽之名遂晦杜佑曰漢舊尋陽縣在江北今蘄春郡界晉溫嶠移於江南獲之師古曰蛟龍屬也郭璞説其狀云似蛇而有腳細頸有白嬰大者數圍卵生子如二石大甕能吞人射而亦翻薄樅陽而出李斐曰舳船後持柁處艫船前刺棹處言其船多前後相銜千里不絶也舳音逐艫音盧班志樅陽縣屬廬江郡宋白曰舒州桐城縣漢為樅陽縣也梁置樅陽郡師古曰樅千容翻琅邪郡秦置唐為沂州其餘地入海萊密州界並步浪翻所過禮祠其名山大川春三月還至太山增封甲子始祀上帝於明堂配以高祖因朝諸侯王列侯受郡國計師古曰計若今之諸州計帳也朝直遙翻四月赦天下所幸縣毋出今年租賦還幸甘泉郊泰畤五年長平烈侯衛青薨考異曰漢武故事云大將軍四子皆不才皇后每因太子涕泣請上削其封上曰吾自知之不令皇后憂也少子竟坐奢淫誅上遣謝后通削諸子封爵各留千戶焉按青四子無坐奢淫誅者此説妄也象廬山廬山蓋即盧山楊雄所謂填盧山之壑者也師古曰盧山胸奴中山名衛青冢在茂陵東次去霍病冢之西相併者是也五年上既攘卻胡越開地斥境乃置交趾朔方之州及冀幽並兗徐青揚荊豫益涼等州凡十三部皆置刺史焉續漢志秦有監郡御史監諸郡漢興省之但遣丞相史分刺諸州無常官孝武帝初置刺史十三人秩六百石古今注曰常以春分行部郡國各遣一吏迎界上漢舊儀曰詔書舊典刺史班宣周行郡國省察治政黜陟能否斷理冤獄以六條問事非條所問即不省一條強宗豪右田宅踰制以強陵弱以衆暴寡二條二千石不奉詔書遵承典制倍公向私旁詔牟利侵漁百姓聚斂為姦三條二千石不恤疑獄風厲殺人怒則任刑喜則任賞煩擾苛暴剝戮黎元為百姓所疾山崩石裂妖祥訛言四條二千石選置不平苟阿所愛蔽賢寵頑五條二千石子弟怙恃榮勢請託所監六條二千石違公下比阿附豪強通行貨賂割損政令續漢志又曰諸州常以八月巡行郡國録囚徒考殿最初歲盡詣京都奏事中興但因計吏與古今注異據晉志帝改禹貢雍州曰涼州梁州曰益州又置徐州復禹貢舊號北置朔方南置交趾與荊揚兗豫青冀幽並為十三州春秋元命包及晉書地理志昴畢散為冀州其地有險有易帝王所都亂則冀安弱則冀強荒則冀豐箕星散為幽州言北方太陰故以幽冥為號營室流為並州不以衛水為號又不以恆山為稱而云並者蓋以其在兩谷之間也五星流為兗州端也信也又云蓋取沇水以名焉天氐流為徐州蓋取舒緩之義或云因徐丘以立名虛危流為青州周禮曰正東曰青州蓋取地居少陽其色青故名牽牛流為揚州以為江南之氣躁徑厥性輕揚亦云州界多水水波輕揚也軫星散為荊州強也言其氣躁強亦曰警也言南蠻數為寇逆其人有道後服無道先強常警備也又云取名於荊山鉤鈐星別為豫州豫者舒也言稟中和之氣性理安舒也參伐流為益州益之言厄言其所在之地險厄亦曰疆壤益大故以名焉涼州以地處西方常寒涼也五年上以名臣文武欲盡乃下詔曰蓋有非常之功必待非常之人故馬或奔踶而致千里師古曰奔走也踶蹈也奔踶者乘之則奔立則踶人也踶徒計翻晉灼曰負俗謂被世譏論也纍力瑞翻師古曰泛覆也與覂同言馬有逸氣者多能覆車泛方勇翻如淳曰士行有卓異不入俗弛而見斥逐者師古曰跅者跅落無檢局也弛者放廢不遵法度也跅音跖弛式爾翻其令州郡察吏民有茂才異等應劭曰舊言秀才避光武諱稱茂才異等者超等軼㣥不與凡同也師古曰茂美也使疏吏翻六年六年冬上行幸回中六年春作首山宮應劭曰首山在上郡於其下立宮廟也文穎曰在河東蒲坂界師古注漢書曰尋此下詔文及依地理志文説是六年三月行幸河東祠后土赦汾陰殊死以下六年漢既通西南夷開五郡五郡犍為越巂沈黎汶山益州歲遣使十餘輩出此初郡皆閉昆明杜佑曰昆明在越巂西南諸爨所居奪幣物於是天子赦京師亡命令從軍遣拔胡將軍郭昌將以擊之斬首數十萬後復遣使竟不得通將即亮翻復扶又翻六年秋大旱蝗六年烏孫使者見漢廣大歸報其國元鼎二年烏孫遣使隨張騫入謝天子胸奴聞烏孫與漢通怒欲擊之又其旁大宛月氏之屬皆事漢烏孫於是恐使使願得尚漢公主為昆弟天子與㣥臣議許之烏孫以千匹馬往章十四行本無往字乙十一行本同孔本同聘漢女漢以江都王建女細君為公主往妻烏孫江都王建易王非之子妻七細翻下同烏孫王昆莫以為右夫人胸奴亦遣女妻昆莫以為左夫人公主自治宮室居治直之翻歲時一再與昆莫會置酒飲食昆莫年老言語不通公主悲愁思歸天子聞而憐之間歲遣使者以帷帳錦繡給遺焉師古曰間歲者謂每隔一歲而往也間古莧翻遺于季翻我老欲使其孫岑娶尚公主史記作岑娶漢書作岑陬師古曰岑士林翻陬子侯翻余據漢書岑陬者其官名也本名軍須靡上書言狀天子報曰從其國俗欲與烏孫共滅胡岑娶遂妻公主昆莫死岑娶代立為昆彌烏孫建國之王曰昆莫班史云昆莫王號也名獵驕靡後書昆彌云顏注曰昆莫本是王號而其人名獵驕靡故書云昆彌昆取昆莫彌取驕靡彌靡音有輕重耳蓋本一也後遂以昆彌為王號滅綿結翻是時漢使西踰蔥嶺抵安息安息發使以大鳥卵及黎軒善眩人獻于漢應劭曰大鳥卵如一二石甕師古曰如汲水甕無一二石也郭義恭廣志曰大爵頸及身膺蹄都似橐駝舉頭高七八尺張翅丈餘食大麥其卵如甕即今之駝鳥也黎軒亦曰黎靬東漢為大秦國唐為拂菻國在安息烏弋之西隔大海眩與幻同即今吞刀吐火植瓜種樹屠人截馬之術皆是魚豢魏略曰大秦國俗善幻口中出火自縛自解跳十二丸巧妙非常靬音軒又巨連翻姑據史記歡潛大益在大宛西扜冞國治扜冞城去長安九千二百八十里西通于填三百九十里後漢曰寧冞蘇薤康居小王國治蘇薤城去陽關凡八千二十五里扜音烏冞與彌同薤下戒翻見賢遍翻天子大悅西國使更來更去師古曰遞互來去前後不絶更工衡翻悉從外國客大都多人則過之散財帛以賞賜厚具以饒給之以覽示漢富厚焉師古曰言示之令其觀覽出奇戲諸怪物多聚觀者師古曰聚都邑人令觀看以誇示之觀工喚翻下同酒池肉林令外國客遍觀名嚴名改各倉庫府藏之積見漢之廣大傾駭之師古曰見顯示也藏徂浪翻可以為酒多苜蓿苜蓿草名苜音目蓿音宿漢使采其實以來天子種之於離宮別觀旁極望然西域以近胸奴常畏胸奴使待之過於漢使焉近其靳翻六年是歲胸奴烏維單于死子烏師廬立年少號兒單于自此之後單于益西北徙左方兵直雲中右方兵直酒泉敦章十四行本敦作燉乙十一行本同孔本同煌郡胸奴左方兵本直上谷以東右方兵直上郡以西單于庭直代雲中今徙去而西北故左右方亦徙太初元年丁丑前一四應劭曰初用夏正以正月為歲首故改元為太初六年冬十月上行幸泰山十一月甲子朔旦冬至祠上帝于明堂東至海上考入海及方士求神者莫驗然益遣冀遇之六年乙酉柏梁臺災天火曰災人火曰火六年十二月甲午朔上親禪高里伏儼曰高里山名在泰山下師古曰此高字自作高下之高而死人之里謂之蒿里字即為蓬蒿之蒿或呼為下里者也或者既見泰山神靈之府高里山又在其旁即誤以高里為蒿里混同一事陸士衡尚不免況餘人乎今流俗漢書本有作蒿字者妄增耳臨勃海將以望祀蓬萊之屬冀至殊廷焉師古曰蓬萊仙人之庭也上還以柏梁災故朝諸侯受計于甘泉師古曰受郡國所上計簿也朝直遙翻越人勇之曰越俗有火災復起屋必以大用勝服之於是作建章宮師古曰建章宮在未央宮西俗所呼貞女樓即建章之闕余據戾太子傳建章宮在長安城西周回二十里上林之地也括地志建章宮在雍州長安縣西二十里長安故城西度大各翻其東則鳳闕三輔黃圖曰鳳闕高二十五丈關中記曰一名別風闕以言別四方之風西京賦閶闔之內別風嶕嶢是也三輔舊事曰北有圜闕高二十丈上有銅鳳凰故曰鳳闕也高居豪翻其西則唐中數十里虎圈西都賦前唐中而後太液索隱曰如淳云中唐有甓鄭玄注唐堂庭也爾雅以廟中路謂之唐西京賦前開唐中彌望廣潒是也毛氏詩傳曰唐堂塗也正義曰唐是門內之路釋宮云廟中路謂之唐堂塗謂之陳班史作商中師古曰商金也於序在秋如淳謂商中為商庭蓋以西方之庭也數十里言廣於菟亦西方之獸故於此置圈圈求遠翻漸臺高二十餘丈命曰太液池治直之翻漸臺在太液池中師古曰為水所漸漬故曰漸臺漸子廉翻臣瓚曰太液池言承陰陽津液以作池也師古曰太液池者言其津潤所及廣也中有蓬萊方丈瀛洲壺梁象海中神山龜魚之屬三輔故事池北面有石魚長三丈高五尺南岸有石鱉三枚長六尺漢武故事玉堂基與未央前殿等去地十二丈黃圖曰璧門薄以璧玉因曰璧門大鳥立條支所産大鳥之象度五十丈漢宮閣疏神明臺高五十丈上有九室置九天道士百人然則神明井幹俱高五十丈也井幹樓積木而高為樓若井幹之形也井幹者井上木欄也其形或四角或八角西京賦井幹疊而百層即此樓也屬之欲翻六年大中大夫公孫卿壺遂姓譜晉大夫受邑壺口其後以為氏曆紀壞廢箕子敘大法九章而五紀明曆法故自古以來創業改制咸正曆紀上詔兒寬與博士賜等共議以為宜用夏正漢初用秦正以建亥之月為歲首夏正以建寅之月為歲首五月詔卿遂遷等共造漢太初曆以正月為歲首色上黃數用五時議者謂漢以土德旺土色黃而數五故上黃而用五張晏曰用五謂印文也若丞相曰丞相之印章諸卿及守相印文不足五字者以之字足之協音律定宗廟百官之儀以為典常垂之後世云六年胸奴兒單于好殺伐國人不安又有天災畜多死好呼到翻畜許救翻左大都尉使人間告漢曰間古莧翻我欲殺單于降漢降戶江翻漢遠即兵來迎我我即發上乃遣因杅將軍公孫敖築塞外受降城以應之服虔曰因杅胸奴地名因所征以為將軍之名杅與俱翻受降城在居延北六年秋八月上行幸安定元鼎二年置安定郡屬涼州唐為原會涇州地六年漢使入西域者言宛有善馬在二師城張晏曰二師大宛城名宛於元翻天子使壯士車令等持千金及金馬以請之姓譜以為車姓本於田千秋據此則已自有車姓漢去我遠而鹽水中數敗服虔曰鹽水水名道從水中行師古曰沙磧之中不生草木水又鹹苦即今敦煌西北惡磧者也數有敗言每自死亡也孔文祥曰鹽澤也言水廣遠或致風波而數敗也裴矩西域記曰鹽水在西州高昌縣東東南去瓜州一千三百里並砂磧之地道路不可準惟以人畜骸骨及駝馬糞為標驗由此數有死亡出其南乏水草又且往往而絶邑師古曰言近道之處無城郭之居也漢使數百人為輩來而常乏食死者過半是安能致大軍乎無奈我何二師馬宛寶馬也遂不肯豫漢使豫讀曰與漢使怒妄言椎金馬而去謂妄發言以詬詈之且椎破金馬而去也漢使至輕我遣漢使去令其東邊郁成王遮攻殺漢使取其財物於是天子大怒諸嘗使宛姚定漢等言宛兵弱姚舜姓也左傳有鄭大夫姚句耳強弩射之射而亦翻可盡虜矣天子嘗使浞野侯以七百騎虜樓蘭王以定漢等言為然而欲侯寵姬李氏師古曰欲封其兄弟發屬國六千騎及郡國惡少年數萬人以往伐宛師古曰惡少年謂無行義者故號二師將軍趙始成為軍正故浩侯王恢使導軍而李哆為校尉制軍事哆昌也翻索隱音尺奢翻臣光曰武帝欲侯寵姬李氏而使廣利將兵伐宛其意以為非有功不侯不欲負高帝之約也夫軍旅大事國之安危民之死生繫焉苟為不擇賢愚而授之欲徼幸咫尺之功藉以為名而私其所愛不若無功而侯之為愈也然則武帝有見於封國無見於置將高祖曰置將不善一敗塗地將即亮翻臣曰過矣六年中尉王溫舒坐為姦利罪當族自殺時兩弟及兩婚家婦家曰婚光祿勳徐自為曰帝改郎中令為光祿勳應劭曰光明也祿爵也勳功也如淳曰胡公曰勳之言閽也閽者古主門官也光祿主宮門師古曰應説是也悲夫古有三族而王溫舒罪至同時而五族乎師古曰溫舒與兄弟同三族而兩妻各一故曰五族也六年關東蝗大起飛西至敦煌敦煌郡屬涼州唐瓜州沙州地敦音屯二年二年春正月戊申牧丘恬侯石慶薨沈約曰恬亦諡法所不載二年閏月丁丑以太僕公孫賀為丞相封葛繹侯賀始以功封南奅侯元鼎五年坐酎金免今以為相封葛繹侯功臣表不書所食邑督責大臣自公孫弘後丞相比坐事死元狩五年丞相李蔡有罪自殺元鼎二年丞相莊青翟自殺五年丞相趙周下獄死師古曰比頻也比毗寐翻然數被譴數所角翻被皮義翻賀引拜為丞相不受印綬頓首涕泣不肯起上乃起去賀不得已拜出曰我從是殆矣師古曰殆危也二年三月上行幸河東河東郡屬司隸三河之一也唐蒲晉解隰州地二年夏五月籍吏民馬補車騎馬二年秋蝗二年二師將軍之西也既過鹽水當道小國各城守不肯給食攻之不能下下者得食不下者數日則去比至郁成比必寐翻及也士至者不過數千皆飢罷罷讀曰疲攻郁成郁成大破之所殺傷甚衆二師將軍與李哆趙始成等計至郁成尚不能舉況至其王都乎引兵而還至敦煌燉音屯士不過什一二師古曰十人之中一二人得還道遠乏食且士卒不患戰而患飢人少不足以拔宛願且罷兵益發而復往復扶又翻天子聞之大怒使使遮玉門曰軍有敢入者輒斬之二師恐因留敦煌二年上猶以受降城去胸奴遠遣浚稽將軍趙破奴將二萬餘騎出朔方西北二千餘里期至浚稽山而還應劭曰浚稽山在武威塞北胸奴常以為障蔽浚音峻稽音雞余據班史胸奴中有東西浚稽東浚稽山在龍勒水上左大都尉欲發而覺單于誅之發左方兵擊浞野侯浞野侯行捕首虜得數千人還未至受降城四百里胸奴兵八萬騎圍之浞野侯夜自出求水胸奴間捕生得浞野侯間古莧翻因急擊其軍軍吏畏亡將而誅莫相勸歸者軍遂沒於胸奴兒單于大喜因遣奇兵攻受降城不能下乃寇入邊而去二年冬十二月兒寬卒兒五兮翻三年三年春正月膠東太守延廣為御史大夫膠東郡屬青州唐入青萊州界延廣史逸其姓守式又翻三年上東巡海上考神仙之屬皆無驗令祠官禮東泰山東泰山在琅邪郡朱虛縣界四月還修封泰山禪石閭應劭曰石閭在泰山下址南方方士以為仙人之閭三年胸奴兒單于死子年少胸奴立其季父右賢王詬犂湖為單于詬漢書作句師古曰音鉤史記作詬音同又音吁三年上遣光祿勳徐自為出五原塞數百里史記正義曰即五原郡榆林塞也在勝州榆林縣西北四十里築城障列亭西北至廬胊晉灼曰地理志從五原稒陽縣北出石門障即得所築城師古曰廬胊山名杜佑曰廬胊在麟州銀城縣北猶謂之光祿塞銀城漢圁陰縣地使強弩都尉路博德築居延澤上班志居延澤在張掖居延縣東北古文以為流沙括地志居延海在甘州張掖縣東北六十四里甘州在長安西北二千四百六十里説讀曰悅伉音抗胸奴大入定襄雲中定襄雲中二郡屬並州敗數二千石而去行破壞光祿所築城列亭障敗補邁翻壞音怪又使右賢王入酒泉張掖酒泉張掖二郡屬涼州會軍正任文擊救盡復失所得而去師古曰擊救者擊胸奴以救漢人任音壬三年是歲睢陽侯張昌坐為太常乏祠國除班書功臣表及公卿表皆作睢陵侯高祖功臣張敖封宣平侯傳國至曾孫壬失侯元光三年封其弟廣為睢陵侯紹國昌廣之子也睢陵縣屬臨淮郡師古曰乏祠祠事有闕也睢音雖初高祖封功臣為列侯百四十有三人時兵革之餘大城名都民人散亡戶口可得而數裁什二三師古曰裁與才同十分之內才有二三也小者五六百戶其封爵之誓曰使黃河如帶泰山若厲國以永存爰及苗裔應劭曰封爵之誓國家欲使功臣傳祚無窮也帶衣帶也厲砥石也河當何時如衣帶山當何時如厲石言如帶厲國猶永存以及後世之子孫也重以白馬之盟及高后時盡差第列侯位次藏諸宗廟副在有司師古曰副二也其列侯功籍已藏於宗廟副二之本又在有司四五世間流民既歸戶口亦息列侯大者至三四萬戶小國自倍師古曰謂舊五百戶今者至千戶也曹參初封萬六百戶至後嗣宗免時有戶二萬三千是為戶口蕃息故也他皆類此師古曰言其資財亦益富厚如戶口之多多抵法禁隕身失國至是見侯裁四人酇侯蕭壽成繆侯酈世宗汾陽侯靳石封並睢陵侯張昌為四人耳見賢遍翻少詩沼翻三年漢既亡浞野之兵公卿議者皆願罷宛軍專力攻胡天子業出兵誅宛宛小國而不能下則大夏之屬漸輕漢而宛善馬絶不來烏孫輪臺易苦漢使晉灼曰易輕也師古曰輪臺亦國名余按輪臺在車師西千餘里又西即大宛易以豉翻乃案言伐宛尤不便者鄧光等師古曰按其罪而行罰發惡少年及邊騎歲餘而出敦煌者六萬人師古曰興發部署歲餘乃得行師古曰負私糧食及私從者不在六萬人數中也從才用翻與讀曰預馬三萬匹驢橐駝以萬數齎糧兵弩甚設師古曰施張甚具也轉相奉伐宛五十餘校尉宛城中無井汲城外流水於是遣水工徙其城下水空以穴其城師古曰空孔也徙其城下水者令從他道流不迫其城也空以穴其城者圍而攻之令作孔使穿穴也下云決其水原移之又云圍其城攻之皆再敘其事也一曰既徙其水不令於城下流而因其舊引水入城之孔攻而穴之余謂此書遣水工將以徙水穴城也下書決水原攻城正行其初計耳非再敘其事也置居延休屠屯兵以衛酒泉班志居延縣屬張掖郡休屠縣屬武威郡屠音儲適為兵贅之芮翻賈音古適讀曰謫及載糒給二師師古曰糒乾飯也音備轉車人徒相連屬屬之欲翻而拜習馬者二人為執驅馬校尉師古曰習猶便也一人為執馬校尉一人為驅馬校尉於是二師後復行復扶又翻兵多所至小國莫不迎出食給軍至輪臺輪臺不下攻數日屠之自此而西平行至宛城師古曰平行言無寇難宛兵迎擊漢兵漢兵射敗之射而亦翻敗補賣翻宛兵走入保其城二師欲攻郁成城恐留行而令宛益生詐師古曰留行謂留止軍廢其行決其水原移之則宛固已憂困圍其城攻之四十餘日宛貴人謀曰王毋退毋作母寡匿善馬殺漢使師古曰毋寡宛王名漢兵宜解即不解乃力戰而死未晚也宛貴人皆以為然共殺王其外城壞虜宛貴人勇將煎靡師古曰宛之貴人為將而勇者名煎靡煎子延翻走入城中持王毋寡頭遣人使二師約曰漢無攻我我盡出善馬恣所取而給漢軍食即不聽我章十四行本重我字乙十一行本同孔本同盡殺善馬康居之救又且至至我居內康居居外與漢軍戰孰計之何從師古曰令二師孰計之而欲攻戰乎欲不攻而取馬乎孰與熟同古字通用康居候視漢兵尚盛不敢進二師聞宛城中新得漢人知穿井而其內食尚多計以為來誅首惡者毋寡毋寡頭已至如此不許則堅守而康居候漢兵罷來救宛罷讀曰疲破漢兵必矣乃許宛之約宛乃出其馬令漢自擇之而多出食食漢軍師古曰下食讀曰飼漢軍取其善馬數十匹中馬以下牝牡三千餘匹而立宛貴人之故時遇漢善者名日末蔡為宛王服虔曰蔡音楚言蔡師古曰日末音本末之末蔡音千曷翻與盟而罷兵初二師起敦煌西起發也謂發敦煌而西也從南北道校尉王申生將千餘人別至郁成郁成王擊滅之數人脫亡走二師走音奏下同二師令搜粟都尉上官桀往攻章十四行本攻下有破字乙十一行本同孔本同張校同郁成帝置搜粟都尉屬大司農姓譜楚莊王少子為上官大夫其後以為氏秦滅楚徙隴西之上邽桀追至康居康居聞漢已破宛出郁成王與桀桀令四騎士縛守詣二師上邽騎士趙弟恐失郁成王班志上邽縣屬隴西郡故邽戎邑也邽音圭追及二師四年四年春二師將軍來至京師二師所過小國聞宛破皆使其子弟從入貢獻見天子見賢遍翻因為質焉質音至軍還入馬千餘匹漢書李廣利傳云軍還入玉門者萬餘人馬千餘匹文為詳明既還敦煌而再出師故曰後行戰死不甚多而將吏貪不愛卒侵牟之師古曰言如牟賊之食苗也天子為萬里而伐不録其過乃下詔封李廣利為海西侯班志海西縣屬東海郡功臣表新畤侯食邑於齊地畤音止軍官吏為九卿者三人諸侯相郡守二千石百餘人千石以下千餘人奮行者官過其望孟康曰奮迅也自樂而行者皆黜其勞師古曰言以罪謫而行者免其所犯不敘其勞師古曰或以他財物充之故云直胸奴聞二師征大宛欲遮之二師兵盛不敢當即遣騎因樓蘭候漢使後過者欲絶勿通時漢軍正任文將兵屯玉門關捕得生口知狀以聞上詔文便道引兵捕樓蘭王將詣闕簿責王對曰小國在大國間不兩屬無以自安願徙國入居漢地上直其言師古曰以其言為直亦因使候司胸奴司讀曰伺胸奴自是不甚親信樓蘭自大宛破後西域震懼漢使入西域者益得職師古曰賞其勤勞皆得拜職也余謂顏説非也此言漢使入西域諸國不敢輕辱為得其職耳得職者不失其職也而輪臺渠犂渠犂在輪臺東東南與且末接南與精絶接置使者校尉領護師古曰統領保護屯田之事也師古曰收其五穀以供之使疏吏翻後歲餘宛貴人以為日末蔡善諛以其遇漢善而得王也乃相與殺日末蔡立毋寡昆弟蟬封為宛王而遣其子入侍章十四行本侍作質乙十一行本同孔本同於漢漢因使使賂賜以鎮撫之蟬封與漢約歲獻天馬二匹四年秋起明光宮三輔黃圖明光宮在長樂宮後南與長樂宮相聯屬北通桂宮四年冬上行幸回中四年胸奴詬犂湖單于死胸奴立其弟左大都尉且鞮侯為單于師古曰且子餘翻鞮丁奚翻天子欲因伐宛之威遂困胡乃下詔曰高皇帝遺朕平城之憂平城事見十一卷高祖七年遺于季翻又如字單于書絶悖逆事見十二卷惠帝三年悖蒲內翻春秋大之公羊傳莊四年春齊襄公滅紀復讎也襄公之九世祖為紀侯所譖而烹殺于周故襄公滅紀也九世猶可以復讎乎曰雖百世可也恐漢襲之乃曰我兒子安敢望漢天子漢天子我丈人行也師古曰丈人尊老之稱行戶浪翻充國被留見上元封四年張使上缺且字使來獻天漢元年辛巳前一應劭曰時頻年苦旱故改元為天漢以祈甘雨師古曰大雅有雲漢之詩周大夫仍叔所作以美宣王遇旱災修德勤政而能致雨故依以為年號也四年春正月上行幸甘泉郊泰畤三月行幸河東祠后土四年上嘉胸奴單于之義遣中郎將蘇武送胸奴使留在漢者因厚賂單于答其善意武與副中郎將張勝及假吏常惠等俱師古曰假吏猶言兼吏也時權為使之吏若今之差人充使典矣姓譜常姓黃帝相常先之後置幣遺單于遺于季翻單于益驕非漢所望也漢望其回心鄉善今乃益驕故曰非漢所望會緱王與長水虞常等緱王者胸奴渾邪王姊子與渾邪王俱降漢後隨浞野侯沒胸奴中漢有長水校尉掌長水胡騎師古曰長水胡名其注戾太子傳則又曰今鄠縣東有長水余據水經注長水出杜縣白鹿原北入霸水胡騎蓋屯於此非胡名也戾傳説是虞常蓋亦先沒於胸奴緱工侯翻陰相與謀劫單于母閼氏歸漢降戶江翻閼氏音煙支衛律者父故長水胡人律善協律都尉李延年延年薦言律使於胸奴使還聞延年家收遂亡降胸奴考異曰延年傳云誅延年兄弟宗族按是後李廣利尚為將帥蓋止誅延年及弟季妻子耳與謀國事立為丁靈王魏略曰丁靈在康居北去胸奴廷接習水七千里胸奴蓋以丁靈王封衛律耳私候勝曰聞漢天子甚怨衛律常能為漢伏弩射殺之為于偽翻射而亦翻吾母弟在漢言其母與其弟也張勝許之以貨物與常後月餘單于出獵獨閼氏子弟在虞常等七十餘人欲發其一人夜亡告之單于子弟發兵與戰緱王等皆死虞常生得師古曰被執獲也單于使衛律治其事治直之翻張勝聞之恐前語發以狀語武狀語牛倨翻武曰事如此此必及我見犯乃死重負國欲自殺勝惠共止之虞常果引張勝見犯言被胸奴侵犯然後乃死是為更負漢國故欲先自殺而勝惠止之引謂辭及之也重直用翻召諸貴人議欲殺漢使者左伊秩訾曰即謀單于何以復加臣瓚曰左伊秩訾胡官之號余據胸奴傳呼韓邪之敗其右伊秩訾王使之降漢則此乃胡王之號師古曰言謀衛律而殺之其罰太重也復扶又翻降戶江翻下同單于使衛律召武受辭師古曰致單于之命而取其對也謂猶語也武語惠等也屈節辱命雖生何面目以歸漢引佩刀自刺刺七亦翻衛律驚自抱持武馳召醫鑿地為坎置熅火師古曰熅謂聚火無焰者也熅于云翻師古曰覆身於坎上也覆音方目翻武氣絶半日復息師古曰息謂出氣也輿歸營單于壯其節朝夕遣人候問武而收繫張勝武益愈單于使使曉武欲降之師古曰喻説令武降也欲因此時降武劍斬虞常已律曰漢使張勝謀殺單于近臣師古曰近臣衛律自謂也單于募降者赦罪舉劍欲擊之勝請降律謂武曰副有罪當相坐武曰本無謀又非親屬何謂相坐復舉劍擬之復扶又翻下同武不動律曰蘇君律前負漢歸胸奴幸蒙大恩賜號稱王擁衆數萬馬畜彌山師古曰彌滿也畜許又翻蘇君今日降明日復然空以身膏草野膏古號翻誰復知之武不應律曰君因我降與君為兄弟今不聽吾計後雖欲復見我尚可得乎武罵律曰汝為人臣子不顧恩義畔主背親背蒲妹翻為降虜於蠻夷何以汝為見師古曰言何用見汝為也使決人死生不平心持正反欲鬬兩主觀禍敗南越殺漢使者屠為九郡宛王殺漢使者頭縣北闕朝鮮殺漢使者即時誅滅南越事見上卷元鼎五年六年宛事見上太初三年朝鮮事見上元封二年縣讀曰懸若知我不降明師古曰若汝也言汝知我不降明矣胸奴之禍從我始矣律知武終不可脅白單于單于愈益欲降之乃幽武置大窖中師古曰舊米粟之窖而空者也窖工孝翻天雨雪武臥齧雪與旃毛並咽之師古曰飲於禁翻食讀曰飼雨于具翻齧魚結翻咽音宴吞也數日不死胸奴以為神乃徙武北海上無人處使牧羝曰羝乳乃得歸師古曰羝牡羊也羝不當産乳故設此言示絶其事若燕太子丹烏白頭馬生角之比也羝音丁奚翻乳音人喻翻各置他所四年天雨白氂師古曰氂毛之強曲者音力之翻四年夏大旱四年五月赦天下四年發謫戍屯五原五原郡屬並州括地志勝州連谷縣本秦九原郡漢武帝更名五原四年浞野侯趙破奴自胸奴亡歸太初元年破奴為胸奴所獲四年是歲濟南太守王卿為御史大夫濟南郡屬青州唐淄青齊州地濟子禮翻守式又翻考異曰七月閉城門大搜臣瓚注武帝紀曰漢帝年記六月禁踰侈七月大搜則搜索踰侈者不必閉城門大搜蓋搜姦人耳二年二年春上行幸東海東海郡屬徐州唐為海州地章十四行本空格作還字乙十一行本同孔本同退齋校同二年夏五月遣二師將軍廣利以三萬騎出酒泉擊右賢王於天山晉灼曰天山在西域近蒲類國去長安八千里師古曰即祈連山也胸奴謂天曰祈連西河舊事白山冬夏有雪胸奴謂之天山括地志天山一名白山今名折羅漫山在伊吾縣北百二十里伊州在長安西北四千四百一十六里余據唐志祁連山在甘州張掖縣與天山似是兩處騎音渠吏翻還從宣翻又如字胸奴大圍二師將軍漢軍乏食數日死傷者多假司馬隴西趙充國隴西郡屬涼州唐河渭岷州地陳讀曰陳二師引兵隨之遂得解漢兵物故什六七充國身被二十餘創二師奏狀詔徵充國詣行在所帝親見視其創被皮義翻創初良翻嗟嘆之拜為中郎漢復使因杅將軍敖出西河西河郡屬並州章十四行本強上有與字乙十一行本同張校同退齋校同弩都尉路博德會涿塗山徐廣曰塗音邪索隱曰涿音卓邪以奢翻漢書作涿邪山在高闕塞北千里無所得初李廣有孫陵為侍中善騎射愛人下士帝以為有廣之風拜騎都尉續漢志騎都尉比二千石杜佑曰奉車都尉駙馬都尉騎都尉並漢武帝置東晉省奉車騎都尉惟留駙馬尚主者為之丹陽秦鄣郡地元封二年更名丹陽屬揚州唐宣歙池升睦州之地及二師擊胸奴上詔陵欲使為二師將輜重將即亮翻下同重直用翻陵叩頭自請曰臣所將屯邊者皆荊楚勇士奇材劍客也力扼虎扼捉持也師古曰所指名處即中之也中竹仲翻到蘭于章十四行本于作干乙十一行本同退齋校同山南以分單于兵毋令專鄉二師軍鄉讀曰嚮上曰將惡相屬邪將如字惡烏路翻無騎豫女陵對無所事騎師古曰猶言不須騎也豫讀曰與女讀曰汝步兵五千人涉單于庭上壯而許之因詔路博德將兵半道迎陵軍博德亦羞為陵後距奏言方秋胸奴馬肥未可與戰願留陵至春俱出上怒疑陵悔不欲出而教博德上書乃詔博德引兵擊胸奴於西河詔陵以九月發出遮虜障遮虜障在張掖居延縣路博德所築括地志漢居延故城在甘州張掖縣之東北一千五百三十里有遮虜障班志敦煌龍勒縣有龍勒水出南羌中東北入澤溉民田蓋其下流北至浚稽山下即無所見還抵受降城休士太初元年公孫敖築受降城出居延北行三十日至浚稽山止營舉圖所過山川地形使麾下騎陳步樂還以聞步樂召見道陵將率得士死力將率猶言將領也將即亮翻率如字拜步樂為郎陵至浚稽山與單于相值騎可三萬圍陵軍軍居兩山間以大車為營陵引士出營外為陳陳讀曰陳前行持戟盾後行持弓弩行戶剛翻盾食尹翻虜見漢軍少直前就營陵搏戰攻之如淳曰手對戰也應弦而倒虜還走上山上時掌翻漢軍追擊殺數千人單于大驚召左右地兵八萬餘騎攻陵陵且戰且引南行數日抵山谷中師古曰抵當也至也士卒中矢傷三創者載輦兩創者將車一創者持兵戰復斬首三千餘級中竹仲翻創初良翻將如字詩無將大車鄭氏曰將猶扶進也復扶又翻引兵東南循故龍城道行四五日抵大澤葭葦中師古曰葭即蘆也釋名曰初生為葭長大為蘆成則名為葦陵亦令軍中縱火以自救師古曰預燒自陳前葭葦則虜火不得而延及也單于在南山上使其子將騎擊陵陵軍步鬬樹木間復殺數千人因發連弩射單于服虔曰三十弩共一弦也張晏曰三十絭共一臂也貢父曰皆無此理蓋如今之合蟬或併兩弩共一弦之類余據魏氏春秋諸葛亮損益連弩以鐵為矢矢長八寸一弩十矢俱發今之划車弩梯弩蓋亦損益連弩而為之雖不能三十臂共一弦亦十數臂共一弦射而亦翻是日捕得虜言單于曰此漢精兵擊之不能下日夜引吾南近塞得無有伏兵乎近其靳翻諸當戶君長皆言師古曰當戶胸奴官名余據胸奴之官有左右當戶骨都侯凡二十四長後無以復使邊臣復扶又翻下同令漢益輕胸奴復力戰山谷間尚四五十里得平地不能破乃還是時陵軍益急胸奴騎多戰一日數十合復傷殺虜二千餘人虜不利欲去會陵軍候管敢為校尉所辱續漢志凡領軍皆有部曲部有校尉部下有曲曲有軍候一人具言陵軍無後救射矢且盡獨將軍麾下及校尉成安侯韓延年韓延年以父千秋死南越封事見上卷元鼎五年以黃與白為幟當使精騎射之行戶剛翻射而亦翻即破矣單于得敢大喜使騎並攻漢軍疾呼曰李陵韓延年趣降呼火故翻趣讀曰促遂遮道急攻陵陵居谷中虜在山上四面射矢如雨下漢軍南行未至鞮汗山一日五十萬矢皆盡師古曰鞮音丁奚翻漢書作百五十萬矢皆盡即棄車去士尚三千餘人徒斬車輻而持之師古曰徒但也輻音福章十四行本刀下有抵山二字乙十一行本同孔本同張校同入狹谷單于遮其後乘隅下壘石服虔曰壘石山名也師古曰此説非也言放石以投人因山隅曲而下也壘盧對翻不得行昏後陵便衣獨步出營蘇林曰褰衣卷袖而行也師古曰便衣謂著短衣小袖也毋隨我丈夫一取單于耳師古曰言一身獨取也陵還太息曰兵敗死矣於是盡斬旌旗及珍寶埋地中陵嘆曰復得數十矢足以脫矣今無兵復戰師古曰兵即謂矢及矛戟之屬也坐受縛矣各鳥獸散猶有得脫歸報天子者令軍士人持二升糒一片冰師古曰時冬寒有冰持之以備渴也糒音備與軍士期有先至遮虜障者留駐以待後至也擊鼓起士鼓不鳴陵與韓延年俱上馬壯士從者十餘人虜騎數千追之韓延年戰死陵曰無面目報陛下遂降軍人分散脫至塞者四百餘人陵敗處去塞百餘里史記正義曰遮虜障北百八十里直居延西北長老相傳云是李陵戰處上欲陵死戰後聞陵降上怒甚責問陳步樂步樂自殺㣥臣皆罪陵上以問太史令司馬遷遷盛言陵事親孝與士信常奮不顧身以徇國家之急師古曰徇營也一曰從也言其胸中素所畜積者如上所言也今舉事一不幸全軀保妻子之臣隨而媒糵其短服虔曰媒音欺謂詆欺也孟康曰媒酒教糵麴也謂釀成其罪也師古曰孟説是也齊人名麴餅曰媒賈公彥曰齊人名麴餅為媒者麴麩和合得成酒醴名之為媒誠可痛也且陵提步卒不滿五千深蹂戎馬之地師古曰蹂人九翻踐也抑數萬之師虜救死扶傷不暇悉舉引弓之民共攻圍之轉鬬千里矢盡道窮士張空弮文穎曰弮弓弩弮也師古曰音去權翻又音眷北首爭死敵師古曰冒犯也北首北嚮也冒音莫北翻首音式救翻雖古名將不過也身雖陷敗然其所摧敗亦足暴於天下師古曰所摧敗敗胸奴之兵也暴者猶章也摧敗補賣翻宜欲得當以報漢也師古曰言欲立功以當罪也欲沮二師為陵遊説下遷腐刑沮在呂翻為于偽翻説式芮翻下遐嫁翻如淳曰腐宮刑也丈夫割勢不復能生子如腐木不生實腐音附久之上悔陵無救曰陵當發出塞乃詔強弩都尉令迎軍坐預詔之得令老將生姦詐孟康曰坐預詔博德迎陵博德老將出塞不至令陵見沒也余謂此説非也帝意既悔追思前事以為當陵發出塞之時方可詔博德繼其後以迎陵軍乃於陵未行之時預詔之使博德羞為陵後距得生姦詐上奏而遂令博德別出西河使陵軍無救也勞力到翻二年上以法制御下好尊用酷吏好呼報翻而郡國二千石為治者大抵多酷暴治直之翻吏民益輕犯法東方盜賊滋起大㣥至數千人攻城邑取庫兵漢郡國各有庫兵縛辱郡太守都尉殺二千石小㣥以百數掠鹵鄉里者不可勝數勝音升道路不通上始使御史中丞丞相長史督之弗能禁督察也禁居禽翻持節虎符發兵以興擊師古曰以軍興之法而討擊也衣繡於既翻及以法誅通行飲食當連坐者諸郡甚者數千人數歲乃頗得其渠率師古曰渠大也率所類翻無可奈何於是作沈命法應劭曰沈沒也敢蔽匿盜賊者沒其命也孟康曰沈藏匿也命亡逃也師古曰應説是沈持林翻㣥盜起不發覺發覺而捕弗滿品者師古曰品率也以人數為率也主者皆死其後小吏畏誅雖有盜不敢發恐不能得坐課纍府府亦使其不言師古曰縣有盜賊府亦併坐故使縣不言之也纍力瑞翻上下相為匿以文辭避法焉是時暴勝之為直指使者所誅殺二千石以下尤多威震州郡暴周卿士暴公之後勃海郡屬幽州高祖置師古曰在勃海之濱因以為名唐為滄景州之地師古曰雋音徂兗翻又辭兗翻姓譜有雋姓請與相見不疑容貌尊嚴衣冠甚偉勝之屣履起迎文穎曰屣音纚師古曰履不著跟曰屣屣謂納履未正曳之而行屣音山爾翻不疑據地曰竊伏海瀕聞暴公子舊矣師古曰瀕崖也公子勝之字也舊久也凡為吏太剛則折折而設翻太柔則廢威行施之以恩然後樹功揚名樹立也勝之深納其戒及還表薦不疑上召拜不疑為青州刺吏濟南王賀亦為繡衣御史濟子禮翻逐捕魏郡㣥盜魏郡高帝置屬冀州唐為相魏澶衛州地以奉使不稱免師古曰不稱謂不副所委稱尺正翻吾聞活千人子孫有封吾所活者萬餘人後世其興乎為王氏子孫以外戚篡漢張本二年是歲以胸奴降者介和王成娩為開陵侯降戶江翻師古曰娩音晚又音免班志開陵侯國屬臨淮郡將樓蘭國兵擊車師胸奴遣右賢王將數萬騎救之漢兵不利引去張政烺標點容肇祖聶崇岐覆校
