body:
  text: 資治通鑑卷第一百三十二端明殿學士兼翰林侍讀學士朝散大夫右諫議大夫充集賢殿修撰提舉西京嵩山崇福宮上柱國河內郡開國侯食邑一千六百戶食實封六百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注宋紀十四春太宗明皇帝中泰始三年丁未四六七春春正月張永等棄城夜遁考異曰宋本紀去年冬永攸之大敗遂失淮北四州及豫州淮西地宋略今年正月永攸之師次彭城虜掩其輜重敗王穆之於武原薛安都開彭城以納虜永等引退虜追之王師敗績畢捺亦舉兗州歸虜遂失淮北之地魏帝紀去年九月常珍奇薛安都內屬張永沈攸之擊安都詔尉元救彭城西河公石救懸瓠十一月畢衆敬內屬十二月己未次于秺周凱張永沈攸之相繼退走今年正月癸巳尉元破永攸之於呂梁東閏月沈文秀崔道固舉州內屬按青冀今歲始叛宋去年豈得已失淮北安都為永攸之所逼故降魏豈得今年永攸之始次彭城安都始納魏兵乎蓋去冬穆之等已敗退今春永大敗耳今從後魏帝紀泗水冰合永等棄船步走士卒凍死者太半手足斷者什七八尉元邀其前薛安都乘其後大破永等於呂梁之東水經注泗水自彭城東南過呂縣南泗水之上有石梁焉故曰呂梁尉紆勿翻枕尸六十餘里枕職任翻委棄軍資器械不可勝計勝音升永足指亦墮與沈攸之僅以身免梁南秦二州刺史垣恭祖等為魏所虜上聞之召蔡興宗以敗書示之曰我愧卿甚永降號左將軍攸之免官以貞陽公領職還屯淮陰漢志桂陽郡有湞陽縣沈約志宋泰始三年改湞為貞屬廣興公相淮北四州青冀徐兗豫州淮西汝南新蔡譙梁陳南頓潁川汝南汝陰諸郡也考異曰後魏帝紀閏月沈文秀崔道固舉州內屬宋索虜傳曰永攸之敗退虜攻青冀二州執文秀道固又下書曰淮北三州民自天安二年正月三十日壬寅昧爽已前罪一切原免按青州破在五年淮北三州蓋謂徐司豫壬寅二十日壬子三十日也裴子野論曰昔齊桓矜於葵丘而九國叛公羊傳曰貫澤之會齊桓公有憂中國之心不召而至者江人黃人也葵丘之會桓公震而矜之叛者九國見六十五卷漢獻帝建安十三年其差遠矣太宗之初威令所被不滿百里被皮義翻卒有離心士無固色而能開誠心布款實莫不感恩服德致命效死故西摧北蕩㝢內褰開既而六軍獻捷方隅束手天子欲賈其餘威賈音古師出無名長淮以北忽為戎惜乎若以嚮之虛懷不驕不伐則三叛奚為而起哉三叛薛安都畢衆敬常珍奇也蟣居豨翻蝨子也蝨色櫛翻經啓疆埸場音亦後之子孫日蹙百里大雅召旻之詩曰昔先王受命有如召公日辟國百里今也日蹙國百里豈云易哉書大誥曰若考作室既底法厥子乃弗肯堂矧肯構厥父菑厥子乃弗肯播矧肯穫易以豉翻春魏尉元以彭城兵荒之後公私困竭請發冀相濟兗四州粟相息亮翻濟子禮翻取張永所棄船九百艘沿清運載以賑新民新民謂新取徐州之民謂沿清水而運載也艘蘇遭翻賑津忍翻朝直遙翻春魏東平王道符反於長安殺副將駙馬都尉萬古真等副將副鎮將也將即亮翻下同丙午司空和其奴等將殿中兵討之丁未道符司馬段太陽攻道符斬之以安西將軍陸真為長安鎮將以撫之道符翰之子也秦王翰死於正平宗愛之禍春閏月魏以頓丘王李峻為太宰春沈文秀崔道固為土人所攻土人謂青冀二州之人使疏吏翻降戶江翻下同且請兵自救春二月魏西河公石自懸瓠引兵攻汝陰太守張超不克此汝陰郡蓋猶治汝陰也當在隋蔡州新蔡縣界守式又翻考異曰宋帝紀云索虜寇汝陰太守張景遠擊破之景遠即超也宋略七月張景遠先卒汝陰城又陷亦誤也今從後魏書陳項本二邑時陳郡治項因曰陳項待秋擊之鄭羲曰張超蟻聚窮命糧食已盡不降當走可翹足而待也今棄之遠去超修城浚隍積薪儲穀更來恐難圖矣石不從遂還長社為石再攻汝陰不克張本春初尋陽既平帝遣沈文秀弟文炳以詔書諭文秀又遣輔國將軍劉懷珍將馬步三千人與文炳偕行未至值張永等敗退懷珍還鎮山陽文秀攻青州刺史明僧皓僧皓起兵見上卷上年皓古老翻帥讀曰率驤思將翻將即亮翻騎奇寄翻至東海僧皓已退保東萊懷珍進據胊城衆心凶懼欲且保郁洲凶許拱翻凶恐懼聲胊城漢東海之胊縣城也水經注曰胊山西側有胊縣故城東北海中有大洲故謂之郁洲胊音劬懷珍曰文秀欲以青州歸索虜索昔各翻計齊之士民安肯甘心左衽邪今揚兵直前宣布威德諸城可飛書而下奈何守此不進自為沮撓乎沮在呂翻撓奴教翻屈也遂進至黔陬黔陬縣前漢屬琅邪郡後漢屬東萊郡晉屬城陽郡宋屬高密郡陬子侯翻隋志膠州膠西縣舊曰黔陬杜佑曰漢黔陬縣故城在密州諸城縣東北高密漢郡平昌郡魏文帝分城陽立宋志高密郡領黔陬淳于高密夷安營陵昌安平昌郡領安丘平昌東武琅邪朱虛五代志黔陬縣舊置平昌郡達朝廷意文秀猶不降降戶江翻下同百姓聞懷珍至皆喜文秀所署長廣太守劉桃根將數千人戍不其城不其縣前漢屬琅邪郡後漢屬東萊郡晉分屬長廣郡唐萊州膠水縣即長廣郡地章懷太子賢曰不其故城在今萊州即墨縣西南其音基水經巨洋水出朱虛縣東泰山北過縣西北過臨胊縣東又北過劇縣西又東北過壽光縣西又東北入于海師古曰洋音祥懷珍曰今衆少糧竭少詩沼翻懸軍深入正當以精兵速進掩其不備耳乃遣王廣之將百騎襲不其城拔之文秀聞諸城皆敗乃遣使請降使疏吏翻帝復以為青州刺史崔道固亦請降復以為冀州刺史懷珍引還懷珍既還兵勢不接故青冀二州尋為魏有復扶又翻春魏濟陰王小新成卒濟子禮翻春沈攸之之自彭城還也留長水校尉王玄載守下邳校戶教翻積射將軍沈韶守宿豫睢陵淮陽皆留兵戍之玄載玄謨之從弟也王玄謨以功名著於太祖世祖二朝從才用翻幽州刺史劉休賓守梁鄒梁鄒縣漢屬濟南郡魏收志東太原郡太原縣治升城其地在唐濟州長清縣界水經注琅邪郡東莞縣春秋之鄆邑今有鄆亭在團城東北四十里沈約志蘭陵太守治昌慮漢舊縣也肥城縣前漢屬泰山郡後漢屬濟北郡晉罷宋復置濟北郡於肥城魏收志糜溝垣苗二城亦在東太原郡大原縣界又據水經注濟水自平陰城西東北流徑垣苗城西宋武帝西征長安令垣苗鎮此故俗以為稱濟水又東北過盧縣北賢曰肥城縣故城在今濟州平陰縣東南則此三戍皆在漢太山郡盧縣及肥城縣界至後漢和帝永安二年始分太山為濟北郡乘民之兄子也劉乘民見上卷上年魏遣平東將軍長孫陵等將兵赴青州長知兩翻征南大將軍慕容白曜將騎五萬為之繼援白曜燕太祖之玄孫也燕王皓廟號太祖欲攻之將佐皆以為攻具未備不宜遽進左司馬范陽酈範曰今輕軍遠襲深入敵境豈宜淹緩且申纂必謂我軍來速不暇攻圍將不為備師速而疾者略也略謂略地也無暇於攻城圍邑白曜以形形申纂故料其不為備也可一鼓而克白曜曰司馬策是也乃引兵僞退申纂不復設備白曜夜中部分復扶又翻分扶問翻三月甲寅旦攻城食時克之纂走追擒殺之考異曰宋略云七月纂戰死蓋贈官之月今從魏帝紀酈範曰齊形勝之地宜遠為經略今王師始入其境人心未洽連城相望咸有拒守之志苟非以德信懷之未易平也易以豉翻白曜曰善皆免之白曜將攻肥城酈範曰肥城雖小攻之引日勝之不能益軍勢不勝足以挫軍威彼見無鹽之破死傷塗地不敢不懼若飛書告諭縱使不降亦當逃散此即李左車教韓信以破趙之勢而喻燕故智也降戶江翻下同肥城果潰獲粟三十萬斛白曜謂範曰此行得卿三齊不足定也遂取垣苗糜溝二戍一旬中連拔四城威震齊土史言慕容白曜能用酈範之計以取勝春丙子以尚書左僕射蔡興宗為郢州刺史春房崇吉守升城勝兵者不過七百人勝音升任也勝兵者謂能操五兵而戰也慕容白曜築長圍以攻之自二月至于夏四月乃克之白曜忿其不降欲盡坑城中人參軍事昌黎韓麒麟諫曰今勍敵在前而坑其民勍渠京翻自此以東諸城人自為守不可克也師老糧盡外寇乘之此危道也白曜乃慰撫其民各使復業崇吉脫身走崇吉母傅氏申纂妻賈氏與濟州刺史盧度世有中表親然已疏遠濟子禮翻及為魏所虜度世奉事甚恭贍給優厚親者毋失其為親故者毋失其為故其盧度世之謂乎和而有禮雖世有屯夷屯陟倫翻多難也夷平易也家有貧富百口怡怡豐儉同之史言盧度世有行崔道固閉門拒魏沈文秀遣使迎降於魏請兵援接白曜欲遣兵赴之酈範曰文秀室家墳墓皆在江南沈文秀吳興武康人城固甲堅強則拒戰屈則遁去我師未逼其城無朝夕之急何所畏忌而遽求援軍且觀其使者視下而色愧語煩而志怯此必挾詐以誘我不可從也春秋之時諸侯交兵謀人之軍師者多能以此覘敵酈範亦祖其故智耳誘音酉克盤陽般陽縣漢屬濟南郡應劭曰在般水之陽師古曰般音盤劉昫曰唐淄州淄川縣漢盤陽縣也平樂陵晉武帝分平原立樂陵郡宋文帝置樂陵郡於故千乘地皆在隋唐青州界不患其不服也白曜曰崔道固等兵力單弱不敢出戰吾通行無礙直抵東陽彼自知必亡故望風求服夫又何疑範曰歷城兵多糧足非朝夕可拔文秀坐據東陽為諸城根本今多遣兵則無以攻歷城少遣兵則不足以制東陽少詩沼翻若進為文秀所拒退為諸城所邀腹背受敵必無全理願更審計無墮賊彀中彀古候翻張子厚曰彀指拇也彀弓既持滿以指拇為度而發矢以志於中墮彀中者言敵彀弓指我而我不知避則矢必集于我而受其害白曜乃止文秀果不降魏尉元上表稱彭城賊之要藩不有重兵積粟則不可固守若資儲既廣雖劉彧師徒悉起不敢窺淮北之地彧於六翻又言若賊向彭城必由清泗過宿豫歷下邳趨青州亦由下邳沂水經東安東安縣前漢屬城陽國後漢屬琅邪郡晉屬東莞郡惠帝元康七年分東莞置東安郡唐沂州沂水縣即東安郡地趨七喻翻皆為賊用師之要今若先定下邳平宿豫鎮淮陽戍東安則青冀諸鎮可不攻而克若四城不服青冀雖拔百姓狼顧猶懷僥幸之心僥堅堯翻臣愚以為宜釋青冀之師先定東南之地斷劉彧北顧之意斷丁管翻絶愚民南望之心夏水雖盛無津途可由冬路雖通無高城可固如此則淮北自舉暫勞永逸兵貴神速久則生變若天雨既降彼或因水通運糧益衆規為進取恐近淮之民翻然改圖青冀二州猝未可拔也考異曰尉元傳先上表論取四城利害後乃云沈攸之欲援下邳遣孔道恭擊破之按元以泰始二年九月受詔救薛安都此表云受命出疆再離寒暑又云今雖向熱猶可行師則似上表時在四年春末夏初也又按沈攸之以三年八月出師尋即敗退則上表當在攸之敗後今此表但言陳顯達循宿豫不言攸之救下邳又慕容白曜以四年二月十七日拔歷城而此表欲釋青冀之師先定東南之地則此表不在其年春末夏初決矣蓋再當作載是語助之辭非謂兩經寒暑也故置於此春五月壬戌以太子詹事袁粲為尚書右僕射春沈攸之自送運米至下邳沈攸之自淮陰至下邳薛安都欲降降戶江翻求軍迎接軍副吳喜請遣千人赴之攸之不許既而來者益多喜固請不已攸之乃集來者告之曰君諸人既有誠心若能與薛徐州子弟俱來者皆即假君以本鄉縣唯意所欲如其不爾無為空勞往還自是一去不返以攸之知其情也將即亮翻下同還從宣翻又如字薛安都子令伯亡命梁雍之間雍於用翻聚黨數千人攻陷郡縣秋七月雍州刺史巴陵王休若遣南陽太守張敬兒等擊斬之春上復遣中領軍沈攸之等擊彭城攸之以為清泗方涸糧運不繼固執以為不可使者七返上怒強遣之復扶又翻強其兩翻考異曰宋沈攸之傳宋略皆云帝怒攸之云卿若不行便可使吳喜獨去按喜傳乃無與攸之討彭城事後魏書作吳僖公不知即吳喜為別一人也按南史亦有謂吳喜為吳喜公者八月壬寅以攸之行南兗州刺史將兵北出使行徐州事蕭道成將千人鎮淮陰去年僑立徐州於鍾離今使蕭道成屯淮陰為沈攸之後鎮賓客始盛為後蕭道成取宋張本魏之入彭城也事見上卷上年據之魏收曰胊縣漢屬東海晉曰臨胊屬琅邪郡有胊山臨海瀕今按晉志臨胊屬東莞郡後魏復曰胊屬琅邪郡胊音劬蕭道成以為胊山戍主胊山瀕海孤絶人情未安崇祖浮舟水側欲有急則逃入海魏東徐州刺史成固公戍圂城魏收地形志魏置南青州於圂城圂城當在唐沂州沂水縣界圂戶困翻亡降魏成固公遣步騎二萬襲胊山將即亮翻降戶江翻騎奇寄翻下同去城二十里崇祖方出送客城中人驚懼皆下船欲去崇祖還謂腹心曰虜非有宿謀承叛者之言而來耳易誑也易以豉翻誑居況翻今得百餘人還事必濟矣但人情一駭不可斂集卿等可亟去此一里外大呼而來云艾塘義人已得破虜呼火故翻艾塘當在唐海州懷仁縣界北齊於此置義塘郡宋人謂淮北起兵拒魏者為義人須戍軍速往相助逐之舟中人果喜爭上岸上時掌翻崇祖引入據城遣羸弱入島島海中山也羸倫為翻登山鼓譟魏參騎以為軍備甚盛乃退參騎候騎也垣榮祖亦自彭城奔胊山以奉使不效奉使說薛安都見上卷上年往依蕭道成于淮陰榮祖少學騎射或謂之曰武事可畏謂矢刃交乎前生死在於須臾也少詩照翻榮祖曰昔曹公父子上馬橫槊下馬談詠謂魏王操及文帝兄弟也上時掌翻槊色角翻可不負飲食矣君輩無自全之伎伎渠綺翻能也藝也何異犬羊乎此犬羊直謂其無防身之術耳道成亦召而撫之從才用翻春魏於天宮寺作大像高四十三尺高居傲翻用銅十萬斤黃金六百斤春魏尉元遣孔伯恭帥步騎一萬拒沈攸之帥讀曰率騎奇寄翻又以攸之前敗所喪士卒瘃墮膝行者悉還攸之以沮其氣喪息浪翻瘃陟玉翻寒瘡也沮在呂翻上尋悔遣攸之等復召使還復扶又翻攸之至焦墟去下邳五十餘里陳顯達引兵迎攸之至睢清口清水合於泗水故泗水亦得清水之名水經注泗水過下邳縣西又東南得睢水口泗水又東南入于淮水故謂之睢清口睢音雖攸之引兵退伯恭追擊之攸之大敗龍驤將軍姜彥之等戰沒攸之創重驤思將翻創初良翻入保顯達營丁酉夜衆潰攸之輕騎南走委棄軍資器械以萬計還屯淮陰尉元以書諭徐州刺史王玄載玄載棄下邳走沈攸之留王玄載戍下邳因領徐州刺史守式又翻紹先不尚苛察務舉大綱教民治生禦寇而已由是下邳安之治直之翻孔伯恭進攻宿豫宿豫戍將魯僧遵亦棄城走魏將孔大恆等將千騎南攻淮陽淮陽太守崔武仲焚城走尉元取下邳等城不愆于素使沈攸之不敗於再舉元亦未敢輕動也淮陽太守治角城角城在唐泗州宿遷縣界宿遷即宿豫唐避諱改焉慕容白曜進屯瑕丘崔道固之未降也降戶江翻下同綏邊將軍房法壽為王玄邈司馬屢破道固軍歷城人畏之崔道固鎮歷城其軍皆歷城人皆罷兵道固畏法壽扇動百姓迫遣法壽使還建康會從弟崇吉自升城來從才用翻以母妻為魏所獲謀於法壽法壽雅不欲南行雅素也時道固遣兼治中房靈賓督清河廣川二郡事戍磐嚴磐改盤下同陽法壽乃與崇吉謀襲磐陽據之降於慕容白曜以贖崇吉母妻道固遣兵攻之白曜自瑕丘遣將軍長孫觀救磐陽磐陽即盤陽白曜表冠軍將軍韓麒麟與法壽對為冀州刺史冠古玩翻以法壽從弟靈民思順靈悅伯憐伯玉叔玉思安幼安等八人皆為郡守此冀州即宋所置冀州以命法壽郡守即守冀州所領廣川平原清河樂陵魏郡河間頓丘高陽勃海皆僑郡也白曜自瑕丘引兵攻崔道固於歷城遣平東將軍長孫陵等攻沈文秀於東陽道固拒守不降白曜築長圍守之陵等至東陽文秀請降陵等入其西郭縱士卒暴掠文秀悔怒閉城拒守擊陵等破之考異曰文秀傳云八月虜蜀郡公拔式入西郭今從慕容白曜傳屢進攻城不克春癸卯大赦春戊申魏主李夫人生子宏夫人惠之女也李惠蓋李貴人兄弟貴人魏主之母賜死見一百二十八卷宋孝建三年夫人則惠之女而宏之母也宏是為魏孝文帝頃之還政於魏主魏主始親國事勤於為治治直吏翻賞罰嚴明拔清節黜貪汙於是魏之牧守始有以廉潔著聞者春太中大夫徐爰自太祖時用事徐爰事始一百二十六卷文帝元嘉二十八年上銜之詔數其姦佞之罪數所具翻徙交州春冬十月辛巳詔徙義陽王昶為晉熙王昶丑兩翻考異曰宋帝紀在十一月今從宋略使員外郎李豐以金千兩贖昶於魏昶奔魏見一百三十卷元年使昶與上書為兄弟之儀上責其不稱臣不答魏主復使昶與上書復扶又翻下復攻復以同昶辭曰臣本實彧兄昶文帝第九子帝文帝第十二子若改前書事為二敬既稱臣於魏復稱臣於宋是為二敬也彼所不納臣不敢奉詔乃止魏人愛重昶凡三尚公主春十一月乙卯分徐州置東徐州以輔國將軍張讜為刺史張讜時守團城就置東徐州以刺史命之讜音黨十二月庚戌以幽州刺史劉休賓為兗州刺史時兗州之境已沒於魏劉休賓守梁鄒就以刺史命之崔邪利之女也生子文曄與邪利皆沒於魏邪利沒於魏見一百二十五卷文帝元嘉二十七年休賓密遣主簿尹文達至歷城見白曜且視其妻子休賓欲降而兄子聞慰不可白曜使人至城下呼曰劉休賓數遣人來見僕射約降呼火故翻數所角翻降戶江翻何故違期不至由是城中皆知之共禁制休賓不得降魏兵圍之春魏西河公石復攻汝陰今年春石攻汝陰不克無功而還還從宣翻又如字常珍奇雖降於魏實懷二心劉勔復以書招之會西河公石攻汝陰珍奇乘虛燒劫懸瓠驅掠上蔡安成平輿三縣民屯於灌水水經注灌水導源廬江金蘭縣西北東陵鄉大蘇山東北徑蓼縣故城西而北注決水許慎曰灌水出雩婁縣輿音預四年戊申四六八魏尉元遣使說東徐州刺史張讜春正月己未上祀南郊大赦魏尉元遣使說東徐州刺史張讜魏汝陽司馬趙懷仁帥衆寇武津汝陽司馬汝陽郡司馬也沈約曰武津縣屬汝陽郡何志不注置立在隋唐上蔡縣界帥讀曰率又斬魏于都公閼于拔於汝陽臺東魏收地形志汝陽郡汝陽縣有章華臺此書汝陽臺者蓋以別南郡之章華臺也乘繩證翻魏復寇義陽復扶又翻勔使司徒參軍孫臺瓘擊破之臺瓘當作曇瓘淮西民賈元友上書陳伐魏取陳蔡之策宋豫州淮西之地春秋陳蔡之地也勔上言元友稱虜主幼弱內外多難難乃旦翻天亡有期臣以為虜自去冬蹈藉王土磐據數郡百姓殘亡今春以來連城圍逼國家未能復境何暇滅虜元友所陳率多夸誕狂謀皆無事實言之甚易行之甚難易以豉翻臣竊尋元嘉以來傖荒遠人多干國議負擔歸闕傖助庚翻擔丁濫翻皆勸討虜從來信納皆貽後悔境上之人唯視強弱王師至彼必壺漿候塗裁見退軍便抄截蜂起抄楚交翻此前後所見明驗非一也上乃止史言劉勔諳識邊情魏尉元遣使說東徐州刺史張讜魏尉元遣使說東徐州刺史張讜讜以團城降魏魏已得彭城又得團城故因宋所置東徐州以命讜據水經注東莞郡治團城城在春秋之鄆邑西南四十里魏後徙東徐州治下邳說輸芮翻考異曰尉元傳沈攸之既走元以書諭王玄載玄載與魯僧遵崔武仲楊繼皆走遂以高閭與張讜對為東徐州刺史按三年十一月乙卯始以讜為東徐州刺史則於時未降魏也故置於此宋兗州治瑕丘畢衆敬以瑕丘降魏魏以為東兗州蓋先已有兗州也說輸芮翻沈約曰宋失淮北僑立兗州寄治淮陰時蕭道成鎮淮陰王整蓋屯徐州界領兗州刺史耳此時宋魏交兵疆吏能自守者即以州刺史命之無常處也蘭陵太守桓欣整欣皆降於魏魏以元為開府儀同三司都督徐南北兗三州諸軍事徐州刺史鎮彭城兗州治瑕丘以王整新降故分南北兗朝直遙翻至平城魏以上客待之㣥從皆封侯賜第宅資給甚厚從才用翻魏尉元遣使說東徐州刺史張讜慕容白曜圍歷城經年二月庚寅拔其東郭癸巳崔道固面縛出降考異曰宋略云丙申索虜陷歷城執崔道固按後魏列傳道固表云以今月十四日臣東郭失守以十七日面縛請罪長曆是月丁丑朔今從之劉休賓亦出降白曜送道固休賓及其僚屬於平城魏尉元遣使說東徐州刺史張讜辛丑以前龍驤將軍常珍奇為都督司北豫二州諸軍事司州刺史魏西河公石攻之珍奇單騎奔壽陽常珍奇自灌水奔壽陽驤思將翻騎奇寄翻下同魏尉元遣使說東徐州刺史張讜乙巳車騎大將軍曲江莊公王玄謨卒曲江縣漢屬桂陽郡宋屬廣興公相諡法屢征殺伐曰莊武征而不遂曰莊魏尉元遣使說東徐州刺史張讜三月魏慕容白曜進圍東陽白曜既得歷城始進圍東陽用酈範之計也上以崔道固兄子僧祐為輔國將軍將兵數千從海道救歷城至不其聞歷城已沒遂降於魏將即亮翻其音基降戶江翻魏尉元遣使說東徐州刺史張讜交州刺史劉牧卒州人李長仁殺牧北來部曲據州反自稱刺史魏尉元遣使說東徐州刺史張讜廣州刺史羊希使晉康太守沛郡劉思道伐俚晉穆帝永和七年分蒼梧立晉康郡今端州即其地李延壽曰記云南方曰蠻有不火食者矣然其種類非一與華人錯居其流曰蛋曰獽曰俚曰獠曰㐌居無君長隨山洞而居俚音里希遣收之思道帥所領攻州帥讀曰率希兵敗而死龍驤將軍陳伯紹將兵伐俚還擊思道擒斬之驤思將翻將即亮翻希玄保之兄子也羊玄保見一百二十三卷文帝元嘉十七年魏尉元遣使說東徐州刺史張讜夏四月己卯復減郡縣田租之半復扶又翻魏尉元遣使說東徐州刺史張讜徙東海王禕為廬江王山陽王休祐為晉平王上以廢帝謂禕為驢王見百二十卷元年魏尉元遣使說東徐州刺史張讜劉勔敗魏兵於許昌敗補邁翻魏尉元遣使說東徐州刺史張讜魏以南郡公李惠為征南大將軍儀同三司都督關右諸軍事雍州刺史進爵為王雍於用翻魏尉元遣使說東徐州刺史張讜五月乙卯魏主畋于崞山遂如繁畤崞山縣即漢晉雁門之崞縣魏曰崞山天平二年分屬繁畦郡隋志雁門崞縣有崞山據水經注山在繁畤之西灅水之南孟康曰崞音郭九域志繁畤縣在代州之東六十里辛酉還宮魏尉元遣使說東徐州刺史張讜六月魏以昌黎王馮熙為太傅熙太后之兄也魏尉元遣使說東徐州刺史張讜秋七月庚申以驍騎將軍蕭道成為南兗州刺史代沈攸之也南兗州治廣陵驍堅堯翻騎奇寄翻魏尉元遣使說東徐州刺史張讜八月戊子以南康相劉勃為交州刺史相息亮翻魏尉元遣使說東徐州刺史張讜上以沈文秀之弟征北中兵參軍文靜為輔國將軍統高密等五郡軍事五郡蓋高密平昌長廣東海東莞也至不其城為魏所斷其音基斷丁管翻因保城自固魏人攻之不克辛卯分青州置東青州以文靜為刺史魏尉元遣使說東徐州刺史張讜九月辛亥魏立皇叔楨為南安王楨音貞長壽為城陽王太洛為章武王休為安定王魏尉元遣使說東徐州刺史張讜冬十月癸酉朔日有食之發諸州兵北伐魏尉元遣使說東徐州刺史張讜十一月李長仁遣使請降使疏吏翻降戶江翻自貶行州事許之魏尉元遣使說東徐州刺史張讜十二月魏人拔不其城殺沈文靜入東陽西郭魏尉元遣使說東徐州刺史張讜義嘉之亂巫師請發修寧陵戮玄宮為厭勝是歲改葬昭太后昭太后陵曰修寧晉安王子勛於昭后孫也改元義嘉南史曰修寧陵在孝武陵東南厭衣檢翻又益涉翻禳也魏尉元遣使說東徐州刺史張讜先是中書侍郎舍人皆以名流為之史曰先是謂元嘉以前通鑑因而書之先悉薦翻秋當人姓名姓譜秋姓秋胡之後巢尚之戴法興皆用事士謂巢尚之庶謂戴法興皆俱也盡用左右細人細微也纖也小也細人言纖微小人也並參預政事權亞人主巢戴所不及也佃夫尤恣橫人有順忤禍福立至佃音田散悉亶翻騎奇寄翻橫下孟翻忤五故翻謂順之則有福忤之則有禍大納貨賂所餉減二百匹絹則不報書園宅飲饌過於諸王妓樂服飾宮掖不如也朝士貴賤莫不自結僕隸皆不次除官捉車人至虎賁中郎將馬士至員外郎捉車人持車者馬士控馬者員外郎謂員外散騎郎也饌雛戀翻又雛皖翻妓渠綺翻朝直遙翻賁音奔將即亮翻五年己酉四六九春正月癸亥上耕籍田大赦沈文秀守東陽魏人圍之三年泰始三年魏始攻文秀至此時首尾涉三年也士卒晝夜拒戰甲胄生蟣蝨無離叛之志乙丑魏人拔東陽史言沈文秀善守以援兵不接而沒蟣居豨翻正衣冠取所持節坐齊內魏兵交至問沈文秀何在文秀厲聲曰身是身猶今人言我去其衣去羌呂翻縛送慕容白曜使之拜文秀曰各兩國大臣何拜之有白曜還其衣為之設饌鎖送平城魏主數其罪而宥之為于僞翻數所具翻數其罪者以文秀既迎降復拒守也待為下客給惡衣疏食疏食粗飯也食祥吏翻稍嘉禮之拜外都下大夫外都下大夫外都大官之屬僚也拓跋氏所置戊辰魏平昌宣王和其奴卒二月己卯魏以慕容白曜為都督青齊東徐三州諸軍事征南大將軍開府儀同三司青州刺史宋置冀州於歷城魏既得之改為齊州統東魏東平原東清河廣川濟南東太原六郡東徐州統東安東莞二郡濟子禮翻白曜撫御有方東人安之荀卿有言兼並易也堅凝之難魏並青徐淮北四州之民未忘宋也惟其撫御有方民安其生不復引領南望矣書云撫我則后虐我則讎信哉魏自天安以來泰始二年魏改元天安重以青徐用兵山東之民疲於賦役比毗至翻重直用翻師之所聚荊棘生焉大兵之後必有凶年豈謂是邪顯祖命因民貧富為三等輸租之法等為三品上三品輸平城中輸他州下輸本州又魏舊制常賦之外有雜調十五至是悉罷之由是民稍贍給調徒釣翻史言魏能紓民力河東柳欣慰等謀反欲立太尉廬江王禕禕自以於帝為兄而帝及諸兄弟皆輕之遂與欣慰等通謀相酬和禕吁韋翻和戶臥翻征北咨議參軍杜幼文告之丙申詔降禕為車騎將軍開府儀同三司南豫州刺史出鎮宣城帝遣腹心楊運長領兵防衛欣慰等並伏誅三月魏人寇汝陰太守楊文萇擊卻之夏四月丙申魏大赦五月魏徙青齊民於平城置升城歷城民望於桑乾立平齊郡以居之據崔道固傳立平齊郡於平城西北北新城五代志馬邑郡雲內縣後魏立平齊郡乾音干分賜百官魏沙門統曇曜奏沙門統猶今之僧録曇徒含翻平齊戶及諸民有能歲輸穀六十斛入僧曹者即為僧祇戶粟為僧祇粟遇凶歲賑給飢民又請民犯重罪及官奴以為佛圖戶以供諸寺灑掃魏主並許之於是僧祇戶粟及寺戶遍於州鎮矣魏自北方並有諸夏亦依魏晉制置諸州刺史其西北被邊夷晉雜居之地則置鎮將以鎮之祇翹移翻史言魏割民力以奉釋氏六月魏立皇子宏為太子癸酉以左衛將軍沈攸之為郢州刺史上又令有司奏廬江王禕忿懟有怨言懟直類翻請窮治不許治直之翻丁丑免禕官爵遣大鴻臚持節奉詔責禕臚陵如翻因逼令自殺子輔國將軍充明廢徙新安冬十月丁卯朔日有食之魏頓丘王李峻卒十一月丁未魏復遣使來修和親自是信使歲通自元嘉之末南北不復通好帝即位之三年四年再遣聘使是歲魏使來復通好復扶又翻使疏吏翻閏月戊子以輔師將軍孟陽為兗州刺史始治淮陰是歲改輔國將軍為輔師將軍兗州本治瑕丘既入於魏始治淮陰蕭子顯曰淮陰縣前漢屬臨淮郡後漢屬下邳國晉屬廣陵郡穆帝永和中荀羡北討鮮卑以淮陰舊鎮地形都要水陸交通乃營立城池是時既失淮北遂為重鎮後為北兗州治所九域志楚州淮陰縣在州西四十里十二月戊戌司徒建安王休仁解揚州休仁年與上鄰亞素相友愛景和之世上賴其力以脫禍事見上卷元年四方兵起休仁親當矢石克成大功事亦見上卷元年二年親寄甚隆由是朝野輻湊上漸不悅為帝殺休仁張本朝直遙翻故表解揚州己未以桂陽王休範為揚州刺史分荊州之巴東建平益州之巴西梓潼郡置三巴校尉治白帝校戶教翻先是三峽蠻獠歲為抄暴故立府以鎮之先悉薦翻抄楚交翻府謂三巴校尉府也上以司徒參軍東莞孫謙為巴東建平二郡太守謙將之官敕募千人自隨謙曰蠻夷不賓蓋待之失節耳何煩兵役以為國費固辭不受至郡開布恩信蠻獠翕然懷之獠魯皓翻競餉金寶謙皆慰諭不受臨海賊帥田流自稱東海王剽掠海鹽殺鄞令帥所類翻剽匹妙翻鄞縣自漢以來屬會稽郡師古曰鄞音牛斤翻今屬明州東土大震六年庚戌四七春正月乙亥初制間二年一祭南郊間一年一祭明堂昔周公郊祀后稷以配天宗祀文王於明堂以配上帝三歲一郊始於漢武帝平帝元始中始行祫祭明堂之禮明帝永平初始盛其儀亦曰宗祀公羊傳曰古者五年而再殷祭謂祫祭也然古之所謂祫者合祭於太祖之廟而明堂宗祀則嚴父以配帝此先儒之說所以異也蔡雍謂明堂即太廟蓋有見於此歟然明堂九室而太廟七室則又不得而合也間年一祭非古也故曰初制間古莧翻二月壬寅以司徒休仁為太尉領司徒固辭辭者以上不悅也然終不能免於禍癸丑納江智淵孫女為太子甲寅大赦令百官皆獻物始興太守孫奉伯止獻琴書上大怒封藥賜死既而原之魏以東郡王陸定國為司空定國麗之子也宗愛之亂陸麗有立嫡之功乙渾之亂麗死之魏主遣征西大將軍上黨王長孫觀擊吐谷渾長知兩翻吐從暾入聲谷音浴夏四月辛丑魏大赦戊申魏長孫觀與吐谷渾王拾寅戰於曼頭山隋伐吐谷渾置河源郡有曼頭城蓋因山得名也考異曰宋本紀作拾虔今從後魏書遣別駕康盤龍入貢魏主囚之癸亥立皇子燮為晉熙王奉晉熙王昶後昶時在魏五月魏立皇弟長樂為建昌王樂音洛六月癸卯以江州刺史王景文為尚書左僕射揚州刺史以尚書僕射袁粲為右僕射上宮中大宴裸婦人而觀之裸郎果翻王后以扇障面上怒曰外舍寒乞寒乞猶言窮陋也何獨不視后曰為樂之事其方自多豈有姑姊妹集而裸婦人以為笑外舍之樂雅異於此樂音洛上大怒遣后起后兄景文聞之曰后在家劣弱今段遂能剛正如此南兗州刺史蕭道成在軍中久據蕭子顯齊書文帝元嘉十九年遣道成討竟陵蠻則在軍中久矣當為天子齊書言道成姿表奇異龍顙鍾聲鱗文遍體相息亮翻徵為黃門侍郎越騎校尉騎奇寄翻校戶教翻道成懼不欲內遷而無計得留冠軍參軍廣陵荀伯玉勸道成遣數十騎入魏境安置標榜道成時假冠軍將軍以伯玉為參軍冠古玩翻行下孟翻道成以聞上使道成復本任秋九月命道成遷鎮淮陰按三年八月蕭道成以行徐州事鎮淮陰以沈攸之北伐使為後鎮也攸之北還道成代為南兗州刺史鎮廣陵今復使遷鎮淮陰鎮廣陵戊寅立總明觀置祭酒一人儒玄文史學士各十人文帝元嘉十五年立儒玄文史四學今置總明觀祭酒以總之觀古玩翻柔然部真可汗侵魏可從刊入聲汗音寒尚書右儀射南平公目辰曰若車駕親征京師危懼不如持重固守虜懸軍深入糧運無繼不久自退遣將追擊破之必矣將即亮翻給事中張白澤曰蠢爾荒愚輕犯王略杜預曰略界也毛晃曰略封界也必望麾崩散豈可坐而縱敵以萬乘之尊嬰城自守非所以威服四夷也乘繩證翻魏主從之白澤袞之孫也魏道武之建國也張袞有功焉魏主使京兆王子推等督諸軍出西道任城王雲等督諸軍出東道任音壬汝陰王天賜等督諸軍為前鋒隴西王源賀等督諸軍為後繼鎮西將軍呂羅漢等掌留臺事諸將會魏主於女水之濱將即亮翻與柔然戰柔然大敗乘勝逐北斬首五萬級降者萬餘人獲戎馬器械不可勝計勝音升旬有九日往返六千餘里改女水曰武川按魏紀女水當在長川之西赤城之西北後魏置武川鎮隋書宇文述代郡武川人代郡指代都平城也魏都平城謂之代都代都以北列置鎮將其後罷鎮置州則武川屬代郡軍陳不整免官陳讀曰陳壬申還至平城是時魏百官不給祿少能以廉白自立者前言魏主拔清節黜貪汙魏之牧守始有以廉潔著聞者此言魏之百官少能以廉白自立蓋法行於州郡未行於朝廷也少詩沼翻吏受所監臨羊一口酒一斛者死與者以從坐論監工銜翻有能糾告尚書已下罪狀者隨所糾官輕重授之張白澤諫曰昔周之下士尚有代耕之祿孟子曰周室班爵祿下士與庶人在官者同祿祿足以代其耕也服勤無報若使受禮者刑身受禮謂受羊酒之禮刑身謂刑加其身朝直遙翻臣恐姦人窺望忠臣懈節懈居隘翻如此而求事簡民安不亦難乎請依律令舊法仍班祿以酬廉吏魏主乃為之罷新法為于僞翻冬十月辛卯詔以世祖繼體陷憲無遺事見上卷二年立為武陵王孝武廟號世祖考異曰宋本紀作智贊宋略作贊列傳作智隨按太宗生子皆筮之以卦為其字今從列傳初魏乙渾專政事見上卷元年二年魏主追以為憾遂稱白曜謀反誅之及其弟如意初魏南部尚書李敷儀曹尚書李欣蕭子顯曰魏南部尚書知南邊州郡儀曹尚書蓋知禮儀按魏初有殿中樂部駕部南部北部五尚書儀曹選曹等尚書中世所置欣許斤翻少詩照翻與中書侍郎盧度世皆以才能為世祖顯祖所寵任參豫機密出納詔命其後欣出為相州刺史相息亮翻受納貨賂為人所告敷掩蔽之顯祖聞之檻車徵欣案驗服罪當死是時敷弟奕得幸於馮太后帝意已疏之有司以中旨諷欣告敷兄弟陰事可以得免欣謂其壻裴攸曰吾與敷族世雖遠恩同生今在事勸吾為此在事謂有司也言在官而主案敷之事每引簪自刺刺七亦翻解帶自絞終不得死且吾安能知其陰事將若之何攸曰何為為人死也為為上如字下于僞翻有馮闡者先為敷所敗敗補邁翻其家深怨之今詢其弟敷之陰事可得也欣從之又趙郡范檦條列敷兄弟事狀凡三十餘條檦與標同音卑遙翻有司以聞帝大怒誅敷兄弟為馮太后鴆魏主張本告李敷兄弟者范檦其後告李欣者亦范檦也鞭髡配役未幾復為太倉尚書攝南部事魏中世分殿中尚書所掌倉庫置太倉尚書掌倉粟事也幾居豈翻復扶又翻順之子也李順以才能事魏太武而為崔浩所告而誅魏陽平王新成卒是歲命龍驤將軍義興周山圖將兵屯浹口討田流平之驤思將翻浹即協翻柔然攻于闐于闐遣使者素目伽奉表詣魏求救魏主命公卿議之皆曰于闐去京師幾萬里北史曰于闐國去代九千八百里闐徒賢翻又堂見翻使疏吏翻伽求迦翻幾居依翻蠕人兗翻不能攻城若其可攻尋已亡矣雖欲遣師勢無所及魏主以議示使者使者亦以為然乃詔之曰朕應急敕諸軍以拯汝難難乃旦翻但去汝遐阻必不能救當時之急汝宜知之朕今練甲養士一二歲間當躬帥猛將為汝除患帥讀曰率為于僞翻汝其謹修警候以待大舉聶崇岐標點王崇武覆校
