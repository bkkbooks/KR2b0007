body:
  text: 資治通鑑卷第三十一翰林學士朝散大夫右諫議大夫知制誥兼侍講同提舉萬壽觀公事兼判集賢院上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣奉敕編集後學天台音註漢紀二十三陽朔三年孝成皇帝上之下陽朔三年己亥前二二陽朔三年春三月壬戌隕石東郡八陽朔三年夏六月潁川鐵官徒申屠聖等百八十人殺長吏盜庫兵自稱將軍經歷九郡遣丞相長史御史中丞逐捕以軍興從事長知兩翻師古曰逐捕之事須有發興皆依軍法皆伏辜陽朔三年秋王鳳疾天子數自臨問數所角翻親執其手涕泣曰將軍病如有不可言師古曰不可言謂死也不欲斥言之鳳頓首泣曰譚等雖與臣至親行皆奢僭行下孟翻無以率導百姓不如御史大夫音謹敕敕整也正也固也理也及鳳且死上疏謝上復固薦音自代復扶又翻言譚等五人必不可用天子然之初譚倨不肯事鳳師古曰倨慢也卑恭如子故鳳薦之八月丁巳鳳薨九月甲子以王音為大司馬車騎將軍而王譚位特進領城門兵長安十二城門皆有屯兵勸譚辭讓不受城門職由是譚音相與不平陽朔三年冬十一月丁卯光祿勳于永為御史大夫永定國之子也四年四年春二月赦天下四年夏四月雨雪雨于具翻四年秋九月壬申東平思王宇薨宇宣帝之子四年少府王駿為京兆尹駿吉之子也先是京兆有趙廣漢張敞王尊王章至駿皆有能名故京師稱曰前有趙張後有三王趙廣漢張敞宣帝時尹京三王皆帝所用史言尹京者難其材先悉薦翻四年閏月壬戌于永卒四年烏孫小昆彌烏就屠死子拊離代立師古曰拊讀與撫同為弟日貳所殺漢遣使者立拊離子安日為小昆彌日貳亡阻康居亡奔康居依阻其遠以自全刺殺之師古曰詐畔亡而投之因得以刺殺刺七亦翻願復得前都護段會宗會宗前為西域都護終更而還復扶又翻城郭諸國聞之皆翕然親附四年谷永奏言聖王不以名譽加於實效御史大夫任重職大少府宣達於從政唯陛下留神考察上然之鴻嘉元年辛丑前二四年春正月癸巳以薛宣為御史大夫用谷永之言也四年二月壬午上行幸初陵赦作徒師古曰徒人之在陵役作者師古曰戲水之鄉也戲音許宜翻四年上始為微行張晏曰出入市里不復警蹕若微賤者之所為故曰微行或乘小車或皆騎騎奇寄翻出入市里郊野遠至旁縣旁縣諸縣環長安旁者也柞才各翻鬬雞走馬常自稱富平侯家人富平侯者張安世四世孫放也放父臨尚敬武公主文穎曰公主成帝姊也臣瓚曰敬武公主是元帝姊也師古曰二說皆非也薛宣傳云主怒曰嫂何以取妹殺之既謂元后為嫂是即元帝妹也地理志鉅鹿郡有敬武縣放為侍中中郎將娶許皇后女弟當時寵幸無比故假稱之四年三月庚戌張禹以老病罷以列侯朝朔望位特進見禮如丞相朝直遙翻賞賜前後數千萬四年夏四月庚辰薛宣為丞相封高陽侯恩澤侯表高陽侯食邑於東莞四年王音即以從舅越親用事小心親職從才用翻上以音自御史大夫入為將軍將軍中朝官故曰入自公孫弘以來為相者封侯乙巳封音為安陽侯地理志汝南郡有安陽侯國四年冬黃龍見真定見賢遍翻四年是歲匈奴復株累單于死弟且麋章十四行本麋作糜乙十一行本同乙本同胥立為搜諧若鞮單于遣子左祝都韓王呴留斯侯入侍以且莫車為左賢王累力追翻單音蟬且子余翻鞮丁兮翻昫漢書作胊師古曰音許于翻二年二年春上行幸雲陽甘泉甘泉宮在雲陽縣二年三月博士行大射禮古者天子諸侯大夫士皆有大射之禮博士所行士之射禮也歷階登堂而雊師古曰歷階謂以次而登也雊古豆翻又集未央宮承明殿屋上車騎將軍音待詔寵等上言師古曰以經術待詔其人名寵不記姓也天地之氣以類相應譴告人君甚微而著雉者聽察先聞雷聲故月令以紀氣師古曰謂季冬之月雉雊雞乳以明轉禍為福之驗師古曰高宗祭成湯有飛雉升鼎耳而雊祖己曰惟先假王正厥事故能攘妖而致百年之壽章乙十一行本日下有大衆聚會飛集於庭八字孔本同張校同退齋校同歷階登堂萬衆睢睢師古曰睢睢仰目視貌音呼惟翻驚怪連日徑歷三公之府太常宗正典宗廟骨肉之官然後入宮其宿留告曉人具備深切師古曰宿音先就翻留音力救翻雖人道相戒何以過是後帝使中常侍鼂閎詔音曰鼂古朝字聞捕得雉毛羽頗摧折類拘執者得無人為之師古曰言人放此雉故欲為變異者折而設翻陛下安得亡國之語不知誰主為佞讇之計誣亂聖德如此者左右阿諛甚衆不待臣音復讇而足復扶又翻讇古諂字師古曰是益也音子喻翻足其不足曰足公卿以下保位自守莫有正言如令陛下覺寤懼大禍且至身深責臣下繩以聖法臣音當先誅豈有以自解哉今即位十五年繼嗣不立日日駕車而出失行流聞行所行也言帝所行多非道過失流布聞於遠方也行下孟翻甚於京師外有微行之害內有疾病之憂皇天數見災異欲人變更數所角翻見賢遍翻更工衡翻下同終已不改天尚不能感動陛下臣子何望獨有極言待死命在朝暮而已如有不然老母安得處所尚何皇太后之有高祖天下當以誰屬乎如淳曰老母音之老母也當隨己受罪誅也又謂己言深切觸牾人主積恚而犯必行之誅不能復顧太后也師古曰如說非也此言總屬於成帝耳不然者謂不如所諫而自修改也老母即帝之母太后也言帝不自修改國家危亡太后不知處所高祖天下無所付屬也屬音之欲翻宜謀於賢智克己復禮用論語孔子答顏淵之言繼嗣可立災變尚可銷也二年初元帝儉約渭陵不復徙民起邑事見二十九卷元帝永光四年復扶又翻即延陵也樂霸陵曲亭南更營之即新豐戲鄉之地關中記昌陵在霸城東二十里樂音洛解戶買翻姓也姓譜自晉唐叔虞食邑於解今解縣也晉有解狐解揚使陳湯為奏請為初陵徙民起邑欲自以為功求重賞湯因自請先徙冀得美田宅上從其言果起昌陵邑為萬年湯得罪罷昌陵張本夏徙郡國豪桀貲五百萬以上五千戶于昌陵二年五月癸未隕石于杜郵三二年六月立中山憲王孫雲客為廣德王中山憲王福靖王勝之玄孫也地節元年福薨子懷王脩嗣五鳳三年脩薨無後今立雲客二年是歲城陽哀王雲薨無子國除城陽景王章傳國十世至雲三年三年夏四月赦天下三年大旱三年王氏五侯爭以奢侈相尚成都侯商嘗病欲避暑從上借明光宮師古曰黃圖云明光宮在城內近桂宮引內灃水地理志豐水出鄠縣東南北流過上林苑入渭立羽蓋羽蓋編羽為之周帷船之四周皆張帷師古曰楫棹皆所以行船也令執楫棹人為越歌也楫謂棹之短者也今吳越之人謂之橈音饒越歌為越之歌見穿城引水意恨內銜之未言後微行出過曲陽侯第又見園中土山漸臺象白虎殿起土山漸臺又為室屋象白虎殿也以讓車騎將軍音音根兄弟欲自黥劓以謝太后劓魚器翻又牛例翻上聞之大怒乃使尚書責問司隸校尉京兆尹知成都侯商等奢僭不軌藏匿姦猾皆阿縱不舉奏正法二人頓首省戶下司隸校尉察三輔京兆尹治京邑而阿縱不舉奏故責之省戶禁門也外家何甘樂禍敗師古曰言此罪過並身自為之余謂言商等奢僭必將得罪何乃甘心為之以為樂也樂音洛相戮辱於太后前傷慈母之心以危亂國家外家宗族強上一身寖弱日久今將一施之師古曰行刑罰令待府舍諸侯指商根等師古曰令總集音舍待詔命詔尚書奏文帝誅將軍薄昭故事見十四卷文帝前十年師古曰自坐稾上言待刑戮也良久乃已上特欲恐之實無意誅也三年秋八月乙卯孝景廟北闕災三年初許皇后與班倢伃皆有寵於上上嘗遊後庭欲與倢伃同輦載倢伃音接于下同觀古圖畫賢聖之君皆章十四行本皆下有有字乙十一行本同孔本同名臣在側三代末主乃有嬖妾今欲同輦得無近似之乎師古曰嬖愛也音必計翻又卑義翻近音巨靳翻上善其言而止太后聞之喜曰古有樊姬張晏曰楚王好田樊姬為不食禽獸之肉按樊姬事楚莊王班倢伃進侍者李平得幸亦為倢伃賜姓曰衞其後上微行過陽阿主家師古曰陽阿平原之縣也應劭曰平原漯陰東南五十里有陽阿鄉故縣也考異曰五行志作河陽主伶玄趙后外傳及荀紀亦作河陽外戚傳顏師古註曰陽阿平原之縣也今俗書阿字作河或為河陽皆後人所妄改耳今從之師古曰以其體輕故曰飛燕大幸有女弟復召入復扶又翻姿性尤醲粹左右見之皆嘖嘖嗟賞嘖嘖衆口稱羡而作聲也音側革翻披香博士後宮女職也淖音女教翻姓也此禍水也滅火必矣姊弟俱為倢伃貴傾後宮許皇后班倢伃皆失寵於是趙飛燕譖告許皇后班倢伃挾媚道婦人挾媚道者蠱詛他人求己親媚詈及主上祝職救翻詛莊助翻詈力智翻冬十一月甲寅許后廢處昭臺宮師古曰宮在上林苑中處昌呂翻章乙十一行本謁下有等字孔本同張校同皆誅死親屬歸故郡后姊謁為平安剛侯夫人許氏本山陽人也倢伃對曰妾聞死生有命富貴在天論語載子夏答司馬牛之言為邪欲以何望使鬼神有知不受不臣之愬師古曰祝詛主上是不臣也愬之何益故不為也上善其對赦之賜黃金百斤趙氏姊弟驕妬婕伃恐久見危乃求共養太后於長信宮師古曰共音居用翻養音弋向翻宮閣記長信殿在長樂宮太后常居之上許焉三年廣漢男子鄭躬等六十餘人攻官寺篡囚徒盜庫兵自稱山君廣漢郡高帝分蜀郡置屬益州師古曰逆取曰篡風俗通寺司也諸官府所止皆曰寺四年四年秋勃海清河信都河水湓溢勃海唐滄景州清河唐貝州信都唐冀州師古曰湓湧也音普頓翻敗官亭民舍四萬餘所敗補邁翻平陵李尋章乙十一行本尋下有等字孔本同奏言議者常欲求索九河故迹而穿之今因其自決可且勿塞以觀水勢索山客翻塞悉則翻下同河欲居之當稍自成川跳出沙土然後順天心而圖之必有成功而用財力寡於是遂止不塞朝臣數言百姓可哀上遣使者處業振贍之師古曰處業謂安處之使得居業數所角翻處昌呂翻四年廣漢鄭躬黨與寖廣犯歷四縣衆且萬人州郡不能制冬以河東都尉趙護為廣漢太守發郡中及蜀郡合三萬人擊之或相捕斬除罪師古曰賊黨相捕斬赦其本罪遷護為執金吾賜黃金百斤四年是歲平阿安侯王譚薨上悔廢譚使不輔政而薨也乃復進成都侯商復扶又翻以特進領城門兵置幕府得舉吏如將軍漢制列將軍置幕府得舉吏魏郡杜鄴時為郎素善車騎將軍音見音前與平阿侯有隙即說音曰夫戚而不見殊孰能無怨師古曰戚近也殊謂異於疏也說輸芮翻師古曰秦景公母弟公子鍼有寵於其父桓公景公立鍼懼而奔晉事在昭元年故經書秦伯之弟鍼出奔晉傳曰稱弟罪秦伯也周召則不然師古曰言周公召公無私怨也余謂不然者不為秦伯之為也召讀曰邵義以相匡同己之親等己之尊不以聖德獨兼國寵又不為長專受榮任分職於陝並為弼疑師古曰分職於陝謂自陝以東周公主之自陝以西召公主之陝即今陝州縣也音式冉翻而說者妄云分陝是潁川郟縣謬矣弼疑謂左輔右弼前疑後丞也余按字書陝從兩入郟從兩人人自不考耳為于偽翻長知兩翻師古曰感音胡闇翻外無侵侮之羞俱享天祐兩荷高名者蓋以此也荷下可翻竊見成都侯以特進領城門兵復有詔得舉吏如五府丞相御史及車騎左右將軍府也復扶又翻將軍宜承順聖意加異往時每事凡議必與及之發於至誠則孰不說諭師古曰言皆出於至誠彼必和說無憂乖異也說讀曰悅由是與成都侯商親密二人皆重鄴永始元年乙巳前一六四年春正月癸丑太官凌室火師古曰凌室藏冰之室凌音力證翻又音陵戊午戾后園南闕火考異曰五行志及荀紀二火皆作災今從漢書四年上欲立趙倢伃為皇后皇太后嫌其所出微甚難之太后姊子淳于長為侍中數往來通語東宮數所角翻歲餘乃得太后指許之夏四月乙亥上先封倢伃父臨為成陽侯恩澤侯表成陽侯食邑於汝南新息漢書劉輔河間宗室昔武王周公承順天地以饗魚烏之瑞然猶君臣祗懼動色相戒今文尚書泰誓曰白魚入于王舟有火復于王屋流為烏周公曰復哉復哉不蒙繼嗣之福屢受威怒之異者虖威怒謂皇天降威震怒也虖古乎字改過易行行下孟翻畏天命念祖業妙選有德之世考卜窈窕之女鄭玄曰考猶稽也師古曰窈窕幽閒也順神祇心塞天下望塞悉則翻子孫之祥猶恐晚暮今乃觸情縱欲傾於卑賤之女欲以母天下不畏于天不愧于人惑莫大焉里語曰腐木不可以為柱人婢不可以為主考異曰劉輔傳云腐木不可以為柱卑人不可以為主荀紀柱作珪卑人作人婢今柱從漢書人婢從荀紀必有禍而無福市道皆共知之師古曰市道市中之道也一曰市人及行於道路者也予讀曰與臣竊傷心不敢不盡死書奏上使侍御史收縛輔繫掖庭祕獄師古曰漢舊儀掖庭詔獄令丞宦者為之主理婦人女官也於是左將軍辛慶忌右將軍廉褒光祿勳琅邪師丹太中大夫谷永四人皆中朝官竊見劉輔前以縣令求見擢為諫大夫輔以襄賁令上書言得失召見擢諫大夫襄賁東海縣也賁音肥故得拔至於此旬月之間收下祕獄下遐稼翻臣等愚以為輔幸得託公族之親在諫臣之列新從下土來未知朝廷體獨觸忌諱不足深過過猶罪也如有大惡宜暴治理官與衆共之理官謂廷尉也師古曰令衆人知其罪狀而罰之暴顯示也顯示其罪使理官治之張晏曰豫悅豫也水旱迭臻方當隆寬廣問褒直盡下之時也而行慘急之誅於諫爭之臣爭讀曰諍震驚㣥下失忠直心假令輔不坐直言所坐不著師古曰著明也師古曰言不可家家曉諭之也本以言顯其於治親養忠之義治直之翻誠不宜幽囚於掖庭獄公卿以下見陛下進用輔亟而折傷之暴人有懼心精銳銷耎師古曰人人皆懼也蘇林曰耎弱也師古曰耎音乃亂翻又乳兗翻非所以昭有虞之聽師古曰舜有敢諫之鼓故言有虞之聽也一曰謂達四聰也臣等竊深傷之惟陛下留神省察省悉井翻上乃徙輔繫共工獄蘇林曰考工也師古曰少府之屬官亦有詔獄共讀與龔同論為鬼薪應劭曰取薪給宗廟為鬼薪三歲刑也四年初太后兄弟八人獨弟曼早死不侯鳳嗣父爵陽平侯崇安成侯庶弟五人同日封謂之五侯八人之中獨曼不侯曼寡婦渠供養東宮供居用翻養余亮翻子莽幼孤不及等比師古曰比音必寐翻余謂當音毗至翻其㣥兄弟皆將軍五侯子乘時侈靡師古曰乘因也因富貴之時師古曰佚與逸同勤身博學折而設翻被服如儒生師古曰被音皮義翻事母及寡嫂養孤兄子行甚敕備莽兄永早死有子光行下孟翻內事諸父曲有禮意大將軍鳳病莽侍疾親嘗藥鄭玄曰嘗藥度其所堪不解衣帶連月鳳且死以託太后及帝拜為黃門郎漢舊儀曰黃門郎屬黃門令日暮入對青瑣門拜名曰夕郎董巴曰禁門曰黃闥久之叔父成都侯商上書願分戶邑以封莽長樂少府戴崇姓譜戴宋戴公之後一曰宋滅戴子孫以國為氏咸為莽言為于偽翻下同上由是賢莽太后又數以為言數所角翻五月乙未封莽為新都侯莽傳以南陽新野之都鄉為新都侯國宿衞謹敕爵位益尊節操愈謙散輿馬衣裘振施賓客師古曰振舉也施式智翻收贍名士交結將相卿大夫甚衆故在位者更推薦之更工衡翻游者為之談說虛譽隆洽傾其諸父矣隆盛也洽漸浹也周徧也處之不慙恧師古曰激急動恧愧也激音工歷翻行下孟翻處昌呂翻恧音女六翻昆弟或頗聞知莽因曰後將軍朱子元無子朱博字子元章十四行本子下有為買之三字乙十一行本同孔本同張校同退齋校同師古曰此兒謂所買婢也種章勇翻即日以婢奉朱博其匿情求名如此王莽事始此四年六月丙寅立皇后趙氏大赦天下皇后既立寵少衰而其女弟絕幸為昭儀居昭陽舍其中庭彤朱而殿上髹漆師古曰以漆漆物謂之髹音許求翻又許昭翻今關東俗器物一再著漆者謂之捎漆捎即髹聲之轉重耳髹字或作䰍音義亦與髹同今關西俗云黑髹盤朱髹盤其音如此兩義並通毛晃曰髹赤黑漆切皆銅沓黃金塗師古曰切門限也音千結翻沓冒其頭也塗以金塗銅上也沓音他合翻白玉階師古曰階所由升殿陛也函藍田璧明珠翠羽飾之服虔曰釭壁中之橫帶也晉灼曰以金環飾之也師古曰壁帶壁之橫木露出如帶者也於壁帶之中往往以金為釭若車釭之形也其釭中著玉璧明珠翠羽耳藍田山名出美玉釭音工流俗讀之音江非也趙后居別館多通侍郎宮奴多子者侍郎郎之得出入禁中者宮奴有罪沒為宮奴給使宮中者妾姊性剛有如為人構陷則趙氏無種矣種章勇翻因泣下悽惻帝信之有白后姦狀者帝輒殺之由是后公為淫恣無敢言者然卒無子卒子恤翻光祿大夫劉向以為王教由內及外自近者始詩大序關雎后之德也風之始也所以風天下而正夫婦也故曰正始之道王化之基師古曰孽庶也嬖愛也凡八篇及采傳記行事著新序說苑凡五十篇奏之數上疏言得失陳法戒數所角翻書數十上以助觀覽補遺闕上時掌翻上雖不能盡用然內嘉其言常嗟嘆之四年昌陵制度奢泰久而不成劉向上疏曰臣聞王者必通三統應劭曰二王之後與己為三統也孟康曰天地人之始也張晏曰一曰天統謂周以十一月建子為正天始施之端也二曰地統謂殷以十二月建丑為正地始化之端也三曰人統謂夏以十三月建寅為正人始成之端也師古曰諸家之說皆不備也言王者象天地人之三統故存三代也非獨一姓也自古及今未有不亡之國孝文皇帝嘗美石槨之固張釋之曰使其中有可欲雖錮南山猶有隙夫死者無終極而國家有廢興故釋之之言為無窮計也釋之對詳見十四卷文帝前三年遂薄葬棺槨之作自黃帝始古之葬者厚衣之以薪葬之中野不封不樹黃帝易之以棺槨丘壠皆小葬具甚微晉灼曰丘壠冢墳也此誠奉安君父忠孝之至也孔子葬母於防師古曰防魯邑名也杜預曰昌邑縣西有防城記檀弓曰孔子既得合葬於防曰古者墓而不墳今丘也東西南北之人也不可以不識也於是封之崇四尺師古曰墳者謂積土也春秋緯天子墳高三仞樹以松諸侯半之樹以柏大夫八尺樹以藥草士四尺樹以槐庶人無墳樹以楊柳鄭玄曰孔子蓋用士禮封墳掩坎其高可隱孟康曰隱蔽之財可見而己臣瓚曰謂人立可隱肘也師古曰瓚說是也隱音於靳翻舜禹忠臣周公弟弟師古曰弟弟者言弟能順理也上弟音徒計翻非苟為儉誠便於體也秦始皇葬於驪山之阿下錮三泉上崇山墳水銀為江海黃金為鳧雁珍寶之臧臧古藏字通下臧椁同棺椁之麗宮館之盛不可勝原詳見七卷秦始皇三十七年勝音升驪山之作未成而周章百萬之師至其下矣事見七卷秦二世二年營宇事見九卷高帝元年失火燒其臧椁自古及今葬未有盛如始皇者也數年之間外被項籍之災被皮義翻內離牧豎之禍師古曰離遭也是故德彌厚者葬彌薄知愈深者葬愈微無德寡知知讀曰智下賢知同其葬愈厚丘壠彌高宮闕章十四行本闕作廟乙十一行本同孔本同甚麗發掘必速由是觀之明暗之效葬之吉凶昭然可見矣陛下即位躬親節儉始營初陵其制約小天下莫不稱賢明始營陵見上卷建始二年增庳為高師古曰庳下也音婢積土為山發民墳墓積以萬數營起邑居期日迫卒師古曰卒讀曰猝應劭曰大萬億也大巨也生者愁於上臣甚惽焉師古曰惽謂不了言惑於此事也惽音昬一云惽古閔字憂病也余謂當從後說發人之墓其害多矣若其無知又安用大謀之賢知則不說說讀與悅同下同以示衆庶則苦之若苟以說愚夫淫侈之人又何為哉唯陛下上覽明聖之制以為則下觀亡秦之禍以為戒初陵之模宜從公卿大臣之議以息衆庶上感其言初解萬年自詭昌陵三年可成卒不能就卒子恤翻㣥臣多言其不便者下有司議下遐稼翻皆曰昌陵因卑為高度便房猶在平地上漢書音義曰便房藏中便坐也度徒洛翻客土之中不保幽冥之靈淺外不固服虔曰取他處土以增高為客土至然服夜作取土東山且與穀同賈師古曰賈讀曰價作治數年天下徧被其勞治直之翻被皮義翻故陵因天性據真土處勢高敞旁近祖考初陵近渭陵又西近茂陵處昌呂翻近其靳翻師古曰緒謂端次也勿徙民便秋七月詔曰朕執德不固謀不盡下師古曰言不博謀於㣥下師古曰過誤也萬年解萬年也中陵司馬殿門內尚未加功如淳曰陵中有司馬殿門如生時制也臣瓚曰天子之藏壙中無司馬殿門也此謂陵上寢殿及司馬門也時皆未作之故曰尚未加功師古曰中陵陵中正寢也司馬殿門瓚說是也百姓罷勞客土疏惡罷讀曰疲疏音疎終不可成朕惟其難師古曰惟思也怛當割翻驚也懼也悼也不安也夫過而不改是謂過矣師古曰論語載孔子之言故詔引之及故陵勿徙吏民罷昌陵還故陵而故陵勿起陵邑徙吏民也四年初酇侯蕭何之子章十四行本子下有孫字乙十一行本同孔本同張校同嗣為侯者無子及有罪凡五絕祀高后文帝景帝武帝宣帝思何之功輒以其支庶紹封蕭何薨子祿嗣薨亡子高后乃封何夫人同為酇侯小子延為筑陽侯孝文元年罷同更封延為酇侯薨子遺嗣薨亡子文帝復以遺弟則嗣有罪免景帝二年封則弟嘉為武陽侯薨子勝嗣有罪免武帝元狩中復以酇戶二千四百封何會孫慶為酇侯慶則子也薨子壽成嗣坐罪免宣帝封何玄孫建世為酇侯凡五紹封何七世孫酇侯獲坐使奴殺人減死完為城旦獲建世孫也上詔有司訪求漢初功臣之後久未省錄杜業說上曰先悉薦翻省悉井翻說輸芮翻唐虞三代皆封建諸侯以成太平之美是以燕齊之祀與周並傳太公封於齊至周安王二十三年始為田氏所滅召公封於燕後周而滅歷載不墮師古曰弟繼兄位謂之及載子亥翻墮毀也音火規翻辟毗亦翻繇祖之竭力故支庶賴焉師古曰言國家非無刑辟而功臣子孫得不陷罪辜而能長存者思其先人之力令有嗣續也亦皆剖符世爵受山河之誓高帝封爵之誓曰使黃河如帶泰山若厲國以永存爰及苗裔而襲封者盡朽骨孤於墓苗裔流於道生為愍隸死為轉屍應劭曰死不能葬故屍流轉在溝壑之中師古曰愍隸者言為徒隸在可哀愍之中師古曰況譬也聖朝憐閔詔求其後四方忻忻靡不歸心出入數年而不省察恐議者不思大義徒設虛言則厚德掩息吝簡布章吝靳也簡略也言既詔求其後復靳而不封略而不問若如此必布聞於天下也雖難盡繼宜從尤功言漢之功臣絕世者多雖難盡繼宜取功尤重者後紹其國封也癸卯封蕭何六世孫南䜌長喜為酇侯地理志南䜌縣屬鉅鹿郡孟康曰䜌音力全翻百官表縣令長皆秦官掌治其縣萬戶以上為令秩千石至六百石減萬戶為長秩五百石至三百石長知兩翻考異曰成紀元延元年封蕭相國後喜為酇侯荀胡皆用之按功臣表永始元年釐侯喜紹封三年薨永始四年質侯尊嗣五年薨質侯章嗣蓋本紀誤以永始為元延故也四年立城陽哀王弟俚為王鴻嘉二年哀王雲薨無後考異曰漢紀俚作悝今從漢書四年八月丁丑太皇太后王氏崩師古曰宣帝王皇后也四年九月黑龍見東萊見賢遍翻四年丁巳晦日有食之考異曰荀紀作乙巳按長曆丁巳晦荀悅誤四年是歲以南陽太守陳咸為少府侍中淳于長為水衡都尉二年二年春正月己丑安陽敬侯王音薨王氏唯音為修整數諫正數所角翻有忠直節二年二月癸未夜星隕如雨繹繹未至地滅師古曰繹繹光采貌二年乙酉晦日有食之二年三月丁酉以成都侯章十四行本侯下有王字乙十一行本同孔本同商為大司馬衞將軍紅陽侯王立位特進領城門兵二年京兆尹翟方進為御史大夫翟亭歷翻又直格翻二年谷永為涼州刺史秦事京師訖當之部涼州部隴西天水武都金城安定北地武威張掖敦煌酒泉等郡漢制諸州刺史常以八月巡行所部錄囚徒考殿最歲盡詣京師奏事受所欲言師古曰永有所言令尚書即受之臣聞王天下有國家者王于況翻患在上有危亡之事而危亡之言不得上聞如使危亡之言輒上聞師古曰如若也有即上聞三正不變改而更用更工衡翻夏商之將亡也行道之人皆知之師古曰凡在道路行者也莫能危尚書大傳曰桀云天之有日猶吾之有民日有亡哉日亡吾亦亡矣師古曰自謂如日在天而無有能傷危也大命傾而不章十四行本不下有自字乙十一行本同孔本同張校同寤易曰危者有其安者也亡者保其存者也師古曰易下繫之辭也言安必思危存不忘亡乃得保其安存無忌諱之誅使芻蕘之臣得盡所聞於前刈草曰芻采薪曰蕘文王詢于芻蕘社稷之長福也元年九月黑龍見見賢遍翻其晦日有食之今年二月己未夜星隕乙酉日有食之己當作癸此承谷永傳之誤大異四發二二而同月三代之末春秋之亂未嘗有也臣聞三代所以隕社稷喪宗廟者皆由婦人與㣥惡沈湎於酒喪息浪翻沈持林翻秦所以二世十六年而亡者秦始皇二十六年初幷天下三十七年崩二世三年而亡其有天下財十六年奉終泰厚也二者陛下兼而有之臣請略陳其效建始河平之際許班之貴傾動前朝師古曰許皇后及班倢伃之家朝直遙翻女寵至極不可上矣師古曰上猶加也什倍于前如淳曰謂趙李本從微賤起也聽用其言官秩不當縱釋王誅師古曰縱放也釋解也王誅謂王法當誅者當丁浪翻假之威權從橫亂政師古曰從音子用翻橫音胡孟翻刺舉之吏莫敢奉憲又以掖庭獄大為亂阱師古曰阱穿也為阬阱以拘繫人也亂者言其非正而又多也阱音才性翻仲馮曰言設獄陷人如阱耳余謂仲說是師古曰㿊痛也炮烙紂所作刑也膏塗銅柱加之火上令罪人行其上輒墮炭中笑而以為樂㿊音千感翻主為趙李報德復怨師古曰復亦報也為于偽翻建治正吏師古曰反讀曰幡罪之明白者反而除之吏之公正者建議劾治也多繫無辜掠立迫恐師古曰掠笞服之立其罪名分利受謝師古曰言富賈有錢假託其名代之為主放與他人以取利息而共分之或受報謝別取財物為于偽翻不可勝數勝音升是以日食再既以昭其辜孟康曰既盡也師古曰昭明也王者必先自絕然後天絕之今陛下棄萬乘之至貴樂家人之賤事師古曰謂私畜田及奴婢財物樂音洛好匹夫之卑字孟康曰成帝好微行更作私字以相呼如淳曰稱張放家人為卑字好呼到翻師古曰僄疾也音頻妙翻又匹妙翻數離深宮之固數所角翻離力智翻挺身晨夜與㣥小相隨師古曰挺引也音大鼎翻烏集雜會醉飽吏民之家師古曰言聚散不常如烏鳥之集沈湎媟嫚溷淆無別黽勉遁樂師古曰黽勉言不息也遁流遁也言流遁為樂也沈持林翻樂音洛典門戶奉宿衞之臣執干戈而守空宮公卿百僚不知陛下所在積數年矣王者以民為基民以財為本財竭則下畔下畔則上亡是以明王愛養基本不敢窮極使民如承大祭論語孔子答仲弓之言師古曰言常畏慎不愛民力聽邪臣之計去高敞初陵改作昌陵役百乾谿費擬驪山楚靈王侈心無厭民不堪其役潰於乾谿王縊而死驪山事見秦紀師古曰擬比也言勞役之功百倍於楚靈王費財之廣比於秦始皇杜預曰乾谿在譙國城父縣南乾音干師古曰靡音武皮翻五年不成而後反故百姓愁恨感天饑饉仍臻師古曰仍頻也宀儿餧死於道以百萬數師古曰宀儿亦散也餧餓也宀儿音人勇翻餧音乃賄翻師古曰畜讀曰蓄百姓無句月章十四行本月作日乙十一行本同孔本同張校同之儲上下俱匱無以相救詩云殷監不遠在夏后之世師古曰大雅蕩之詩也以鏡考己行師古曰鏡謂鑒照之考校也行下孟翻臣當伏妄言之誅師古曰言上所為違於節儉皆與永言同余謂此言帝之失行與夏殷周秦所以失者合耳漢興九世百九十餘載載子亥翻繼體之主七皆承天順道遵先祖法度或以中興或以治安治直吏翻至於陛下獨違道縱欲輕身妄行當盛壯之隆無繼嗣之福有危亡之憂積失君道不合天意亦以多矣為人後嗣守人功業如此豈不負哉方今社稷宗廟禍福安危之機在於陛下陛下誠能昭然遠寤專心反道師古曰反猶還也新德既章則赫赫大異庶幾可銷天命去就庶幾可復師古曰去就言去離無德而就有德唯陛下留神反覆熟省臣言帝性寬好文辭而溺於宴樂省悉井翻好呼到翻樂音洛皆皇太后與諸舅夙夜所常憂至親難數言數所角翻故推永等使因天變而切諫勸上納用之永自知有內應展意無所依違師古曰展申也師古曰如禮而答之余謂答禮者答之而又加禮也上時掌翻上大怒衞將軍商密擿永令發去師古曰擿謂發動之敕過交道广既者勿追晉灼曰交道广既去長安六十里近延陵還上意亦解自悔悔遣侍御史收永也二年上嘗與張放及趙李諸侍中共宴飲禁中皆引滿舉白服虔曰舉滿桮有餘白歷者罰之也孟康曰舉白見驗飲酒盡不也師古曰謂引取滿觴而飲飲訖舉觴告白盡不也一說白者罰爵之名飲有不盡者則以此爵罰之魏文侯與大夫飲酒令曰不釂者浮以大白於是公乘不仁舉白浮君是也釂子肖翻飲酒盡爵也師古曰噱笑聲也音其略翻或曰噱謂脣口之中大笑則見此說非時乘輿幄坐張畫屏風乘繩證翻師古曰坐音材臥翻畫古凵田字通下同畫紂醉踞妲己作長夜之樂妲當割翻妲己有蘇氏之女樂音洛侍中光祿大夫班伯久疾新起姓譜班楚令尹鬬班之後班書敘傳自以為楚令尹子文之後子文初生廾於夢中而虎乳之楚人謂乳為穀謂虎為於菟故名穀於菟楚人謂虎班其子以為號師古註曰子文之子鬬班亦為楚令尹余按左傳莊三十年申公鬬班殺令尹子元鬬穀於菟為令尹恐班非子文之子紂為無道至於是虖虖古乎字書云乃用婦人之言師古曰今文尚書泰誓之辭師古曰肆放也陳也朝直遙翻不如是之甚者也師古曰論語稱孔子曰紂之不善不如是之甚也是以君子惡居下流天下之惡皆歸焉苟不若此此圖何戒對曰沈湎于酒微子所以告去也孔穎達曰酒誥註云飲酒齊色曰湎然則湎者顏色湎然齊一之辭師古曰微子殷之卿士封於微爵稱子也殷紂錯亂天命微子作誥告箕子比干而去其誥曰用沈酗于酒用亂敗厥德于下我其發出狂吾家耄遜于荒事見尚書微子篇大雅所以流連也師古曰大雅蕩之詩曰式號式謼俾晝作夜言醉酒號呼以晝為夜也流連言作詩之人嗟嘆而泣涕流連也而說者乃以流連為荒亡蓋失之矣大雅所以流連不謂飲酒之人也謼音火故翻其原皆在於酒上乃喟然歎曰吾久不見班生今日復聞讜言復扶又翻師古曰讜言善言也讜音黨放等不懌師古曰懌悅也音亦稍自引起更衣更工衡翻因罷出時長信庭林表適使來聞見之孟康曰長信太后宮名也庭林表宮中婦人官名也師古曰長信宮庭之林表也林表官名耳庭非官稱也使疏吏翻朝直遙翻太后泣曰帝間顏色瘦黑師古曰間謂比日也大將軍謂王鳳也益求其比以輔聖德鳳初薦伯宜勸學召見親近今太后以其能諫正欲令帝寵異之也師古曰比類也音必寐翻當如字富平侯張放諾上諸舅聞之以風丞相御史師古曰風讀曰諷求放過失於是丞相宣御史大夫方進奏放驕蹇縱恣奢淫不制拒閉使者侍御史脩奉使至放家逐名捕賊奴從者閉門設弓弩距使者不肯內放知李游君欲獻女求不得使奴康等之其家賊傷三人為暴虐從子用翻請免放就國考異曰敘傳云王音以風丞相御史按放傳丞相宣御史大夫方進奏放過惡音以正月乙巳薨方進以三月丁酉為御史大夫然則風丞相御史者疑非音也放傳又云上諸舅皆害其寵故但云上諸舅上不得已師古曰已止也其後比年數有災變師古曰比頻也比毗至翻數所角翻璽書勞問不絕璽斯氏翻勞力到翻敬武公主有疾詔徵放歸第視母疾數月主有瘳後復出放為河東都尉復扶又翻上雖愛放然上迫太后下用大臣故常涕泣而遣之二年邛成太后之崩也邛成太后孝宣王皇后也父奉光封邛成侯故書邛成太后以別孝元王皇后恩澤侯表邛成侯國於濟陰吏賦斂以趨辦卒讀曰猝斂力贍翻師古曰趨讀曰趣言苟取辦趣與促同上聞之以過丞相御史過罪也十一月己丑策免丞相宣為庶人御史大夫方進左遷執金吾二十餘日丞相官缺㣥臣多舉方進者上亦器其能十一月壬子擢方進為丞相封高陵侯恩澤侯表高陵侯國於琅邪考異曰方進傳丞相薛宣免方進亦左遷執金吾二十餘日遂擢為丞相而荀紀云秋八月方進貶為執金吾蓋以公卿表云三月丁酉京兆尹翟方進為御史大夫八月貶為執金吾故致此誤也按公卿表所云者謂方進自三月為御史大夫至十一月而貶凡居官八月耳又黑龍見東萊在去年九月谷永傳著之甚明而荀悅亦載之於此年云冬黑龍見東萊蓋因陳湯獲罪在今年故也漢春秋雖正黑龍之誤而方進貶官猶承荀悅之失散悉亶翻方進以經術進方進以射策甲科為郎舉明經遷議郎用法刻深好任勢立威有所忌惡峻文深詆中傷甚多好呼到翻惡烏路翻中竹仲翻有言其挾私詆欺不專平者上以方進所舉應科不以為非也科律條也褒成君霸之少子也霸見二十八卷元帝永光元年典樞機十餘年守法度修故事上有所問據經法以心所安而對不希指苟合師古曰希指希望天子之意指也不敢強諫爭爭讀曰諍以是久而安時有所言輒削草藳服虔曰言巳繕書更削壞其草也人臣大罪也師古曰奸求也奸忠直之名也奸音干唯恐其人之聞知沐日歸休兄弟妻子燕語終不及朝省政事朝直遙翻或問光溫室省中樹皆何木也光嘿不應更答以他語其不泄如是二年上行幸雍祠五畤建始二年罷雍五畤今以久無繼嗣幷甘泉泰畤皆復之雍於用翻畤音止二年衞將軍王商惡陳湯奏湯妄言昌陵且復發徙初湯請起昌陵邑既罷昌陵丞相御史請廢昌陵邑中室奏未下人以問湯第宅不徹得無復發徙湯曰縣官且順聽㣥臣言猶復發徙之也惡烏路翻微行數出之應東萊郡黑龍出人以問湯曰是所謂玄門開微行數出出入不時故龍以非時出也數所角翻湯非所宜言大不敬詔以湯有功有斬郅支功徙邊上以趙后之立也淳于長有力焉故德之乃追顯其前白罷昌陵之功下公卿議封長下遐稼翻光祿勳平當以為長雖有善言不應封爵之科姓譜平齊相晏平仲之後一曰韓哀侯子少婼食采平邑因以為氏高祖之法非有功不侯上遂下詔以常侍閎衞章十四行本衞上有侍中二字乙十一行本同孔本同尉長首建至策師古曰閎王閎也將作大匠萬年佞邪不忠毒流衆庶與陳湯俱徙敦煌敦徒門翻初少府陳咸衞尉逢信官簿皆在翟方進之右逢皮江翻姓也古有逢蒙師古曰簿謂伐閱也簿音主簿之簿方進晚進為京兆尹與咸厚善及御史大夫缺三人皆名卿俱在選中而方進得之會丞相薛宣得罪與方進相連上使五二千石雜問丞相御史晉灼曰大臣獄重故以秩二千石者五人詰責之冀得其處方進心恨詰去吉翻陳湯素以材能得幸於王鳳及王音咸信皆與湯善湯數稱之於鳳音所數所角翻以此得為九卿及王商黜逐湯方進因奏咸信附會湯以求薦舉苟得無恥皆免官考異曰咸信免官皆在明年以後因陳湯事連言之二年是歲琅邪太守朱博為左馮翊博治郡常令屬縣各用其豪桀以為大吏文武從宜師古曰各因其材而任之治直之翻博輒移書以詭責之其盡力有效必加厚賞懷詐不稱誅罰輒行師古曰稱副也稱尺證翻事無不集懾之涉翻三年三年春正月己卯晦日有食之三年初帝用匡衡議罷甘泉泰畤事見上卷建始元年大風壞甘泉竹宮武帝以正月上辛有事甘泉圜丘自竹宮而望拜韋昭曰以竹為宮天子居中師古曰漢舊儀竹宮去壇三里壞音怪折而設翻帝異之以問劉向對曰家人尚不欲絕種祠師古曰家人謂庶人之家也種祠繼嗣所傳祠也且甘泉汾陰及雍五畤始立皆有神祇感應然後營之非苟而已也武帝祠泰一於甘泉夜常有神光如流星集于祠壇汾陰男子公孫滂洋等見汾旁有光如絳上遂立后土祠於汾陰脽上文帝十四年黃龍見成紀始幸雍郊見五畤禮敬敕備神光尤著祖宗所立神祇舊位誠未易動易以豉翻前始納貢禹之議後人相因多所動搖元帝時貢禹建言漢家祭祀多不應古禮韋玄成匡衡等因之恐其咎不獨止禹等上意恨之師古曰恨悔也冬十月庚辰上白太后令詔有司復甘泉泰畤汾陰后土如故及雍五畤陳寶祠長安及郡國祠著明者皆復之是時上以無繼嗣頗好鬼神方術之屬好呼到翻上書言祭祀方術得待詔者甚衆祠祭費用頗多谷永說上曰說輸芮翻臣聞明於天地之性不可惑以神怪知萬物之情不可罔以非類師古曰罔猶蔽余謂罔欺也欺人以所無曰罔背蒲妹翻不遵五經之法言而盛稱奇怪鬼神廣崇祭祀之方求報無福之祠及言世有仙人服食不終之藥遙興輕舉如淳曰遙遠也興舉也師古曰興起也謂起而遠去也晉灼曰黃者鑄黃金也道家言冶丹沙令變化可鑄作黃金也挾左道懷詐偽以欺罔世主師古曰左道邪僻之道非正義也王制曰執左道以亂政者殺洋洋滿耳若將可遇師古曰洋洋美盛之貌洋音羊又音祥盪盪如係風捕景終不可得師古曰盪盪空曠之貌也盪音蕩景影也聖人絕而不語師古曰謂孔子不語怪神因逃不還天下怨恨事見秦始皇紀新垣平事見文帝紀事見武帝紀誅夷伏辜師古曰詐得謂主上得其詐偽之情毋令姦人有以窺朝者朝直遙翻上善其言三年十一月尉氏男子樊並等十三人謀反地理志尉氏縣屬陳留郡應劭曰古獄官曰尉氏鄭之別獄也臣瓚曰鄭大夫尉氏之邑故遂以為邑名師古曰鄭大夫尉氏亦以掌獄之官故為族耳應說是也劫略吏民自稱將軍徒李譚稱忠鍾祖訾順共殺並以聞皆封為侯姓譜稱平聲漢功臣表有新山侯稱忠楚有鍾儀鍾建又有知音鍾子期訾即移翻何氏姓苑云今齊人本姓祭氏譚延鄉侯忠新山侯祖童鄉侯順樓虛侯考異曰本紀云五人而功臣表止有四人蓋紀誤三年十二月山陽鐵官徒蘇令等二百二十八人攻殺長吏盜庫兵自稱將軍地理志山陽郡有鐵官殺東郡太守及汝南都尉汝南太守嚴訢捕斬令等遷訢為大司農師古曰訢與欣同三年故南昌尉九江梅福上書曰地理志南昌縣屬豫章郡後漢志尉主盜賊凡有賊發主名不立則推索行尋按察姦宄以起端緒昔高祖納善若不及從諫如轉圜師古曰不及恐失之也轉圜者言其順易也舉功不考其素師古曰直取其功不論其舊行及所從來也韓信拔於行陳而建上將事並見高帝紀行戶剛翻陳讀曰陣師古曰言四面而至知者竭其策知讀曰智下同愚者盡其慮勇士極其節怯夫勉其死合天下之知幷天下之威是以舉秦如鴻毛取楚若拾遺師古曰鴻毛諭輕拾遺言其易也孝武皇帝好忠諫說至言好呼到翻說讀曰悅出爵不待廉茂廉茂孝廉秀才也光武諱秀改為茂才師古曰謂諫爭合意即得爵賜不由薦舉及軍功也廉廉吏也茂茂材也自衒鬻者不可勝數師古曰衒行賣也鬻亦賣也衒音州縣之縣又音工縣翻勝音升於此為盛使孝武皇帝聽用其計升平可致張晏曰民有三年之儲曰升平快心胡越故淮南王安緣間而起間古莧翻下同所以計慮不成而謀議泄者以衆賢聚於本朝故其大臣勢陵不敢和從也事見武紀師古曰本朝謂漢朝也大臣謂淮南相內史之屬也服虔曰臣勢陵君和戶臥翻見間而起者蜀郡是也孟康曰鴻嘉中廣漢男子鄭躬等反是也蹈藉名都大郡賢曰前書曰十二萬戶為大郡索隨和而無逃匿之意李奇曰求索與己和及隨己者原父曰漢氏世寶隨和珠玉謂匹夫至欲求索此物所謂與上爭衡也索山客翻無所畏忌量音良國家之權輕故匹夫欲與上爭衡也土者國之重器得士則重失士則輕詩云濟濟多士文王以寧師古曰詩大雅文王之詩也濟濟盛貌也言文王能多用賢人故邦國得以安寧也濟子禮翻非草茅所言也漢書所字下有當字尸幷卒伍故數上書求見輒報罷福去南昌歸壽春數因縣道上書求假軺傳詣行在所條對急政輒報罷數所角翻見賢遍翻有以九九見者桓公不逆欲以致大也今臣所言非特九九也陛下距臣者三矣此天下士所以不至也昔秦武王好力任鄙叩關自鬻事見三卷周赧王七年周禮司關凡四方之賓客叩關者則為之告註曰叩關謂謁關人也疏曰叩猶至也好呼到翻由余歸德秦繆公開霸業由余自西戎歸之繆讀曰穆民有上書求見者輒使詣尚書問其所言言可采取者秩以升斗之祿賜以一束之帛若此則天下之士發憤懣懣音悶吐忠言嘉謀日聞於上天下條貫國家表裏爛然可睹矣師古曰爛然分明之貌也夫以四海之廣士民之數數趨玉翻能言之類至衆多也然其雋桀指世陳政言成文章質之先世章十四行本世作聖乙十一行本同孔本同張校同而不繆施之當世合時務若此者亦無幾人師古曰無幾言不多也幾音居豈翻天下之砥石高祖所以厲世摩鈍也師古曰砥細石也音之履翻又音祇孔子曰工欲善其事必先利其器師古曰論語載孔子之言也工以諭國政利器諭賢材張誹謗之罔以為漢敺除為于偽翻倒持泰阿授楚其柄師古曰太阿劍名歐冶所鑄也言秦無道令陳涉項羽乘間而發譬倒持劍以把授人也天下雖有不順莫敢觸其鋒此孝武皇帝所以辟地建功為漢世宗也師古曰辟讀曰闢今陛下既不納天下之言又加戮焉夫鳶鵲遭害則仁鳥增逝師古曰鳶鴟也仁鳥鸞鳳也鳶音緣則智士深退間者愚民上書多觸不急之法師古曰言以其所言為不急而罪之也下遐稼翻下同自陽朔以來天下以言為諱朝廷尤甚懲王章之死也師古曰防人之口法禁嚴切也莫有執正何以明其然也取民所上書陛下之所善試下之廷尉廷尉必曰非所宜言大不敬以此卜之一矣故京兆尹王章資質忠直敢面引廷爭爭讀曰諍孝元皇帝擢之以厲具臣而矯曲朝元帝初擢章為左曹中郎將師古曰具臣具位之臣無益者也矯正也朝直遙翻戮及妻子事見上卷陽朔元年公羊傳惡惡止其身善善及子孫言王章妻子坐徙也孔穎達曰左傳曰男有室女有家謂男處妻之室女安夫之家夫婦共為家室故謂夫婦家室之道為室家也折而設翻結諫臣之舌㣥臣皆知其非然不敢爭天下以言為戒最國家之大患也願陛下循高祖之軌杜亡秦之路除不急之法下無諱之詔博覽兼聽謀及疏賤令深者不隱遠者不塞所謂辟四門明四目也師古曰虞書舜典曰闢四門明四目言開四門以致衆賢則明視於四方也塞悉則翻辟讀曰闢來者猶可追方今君命犯而主威奪師古曰君命犯者謂大臣犯君之命日以益隆陛下不見其形願察其景建始以來日食地震以率言之三倍春秋水災亡與比數師古曰言其極多不可比校而數也亡讀曰無金鐵為飛此何景也張晏曰河平二年沛郡鐵官鑄鐵如星飛上去權臣用事之異也蘇林曰言之不從是謂不乂則金不從革景象也何象言將危亡也為于偽翻社稷三危呂霍上官皆母后之家也親親之道全之為右師古曰務全安之此為上教以忠孝之道今乃尊寵其位授以魁柄師古曰以斗為諭也斗身為魁至於夷滅師古曰夷平也謂平除之自霍光之賢不能為子孫慮故權臣易世則危書曰毋若火始庸庸師古曰周書洛誥之辭也庸庸微小貌也言火始微小不早撲滅則至熾盛大臣貴亶亦當早圖黜其權也權隆於主然後防之亦無及已師古曰已語終辭容肇祖標點顧頡剛聶崇岐覆校
