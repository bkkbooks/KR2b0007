body:
  text: 資治通鑑卷第二百八十二端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千六百戶食實封一千戶臣司馬光奉敕編集後學天台音注後晉紀三高祖聖文章武明德孝皇帝中延羲自稱威武節度使閩國王天福四年己亥九三九延羲自稱威武節度使閩國王春正月辛亥以澶州防禦使太原張從恩為樞密副使澶時連翻延羲自稱威武節度使閩國王朔方節度使張希崇卒羌胡寇鈔無復畏憚鈔楚交翻復扶又翻甲寅以義成節度使馮暉為朔方節度使黨項酋長拓跋彥超最為強大酋慈秋翻長知兩翻暉至彥超入賀自其部落入靈州城以賀因為於城中治第為于偽翻下主為同治直之翻豐其服玩留之不遣封內遂安質彥超於城中則黨項諸部不敢鈔暴於外故安延羲自稱威武節度使閩國王唐㣥臣江王知證等纍表請唐主復姓李立唐宗廟乙丑唐主許之㣥臣又請上尊號上時掌翻唐主曰尊號虛美且非古遂不受其後子孫皆踵其法不受尊號又不以外戚輔政宦者不得預事皆他國所不及也二月乙亥改太祖廟號曰義祖唐主初受禪尊徐溫為太祖今復姓李以溫為義父故改廟號為義祖己卯唐主為李氏考妣發哀與皇后斬衰居廬如初喪禮朝夕臨凡五十四日衰倉回翻臨力鴆翻初喪之禮自古無五十四日之制唐主亦是依傍漢晉以日易月之制居父喪母喪各二十七日故為五十四日江王知證饒王知諤請亦服斬衰不許知證知諤皆徐溫子章十二行本禮作哀乙十一行本同孔本同張校同如父母之喪李建勳妻徐溫女也勢利所在非血氣之親而親長知兩翻辛巳詔國事委齊王璟詳決惟軍旅以聞庚寅唐主更名忭更工衡翻忭皮變翻詔百官議二祚合享禮二祚徐李二姓之先也辛卯宋齊丘等議以義祖居七室之東唐主命居高祖於西室太宗次之義祖又次之皆為不祧之主㣥臣言義祖諸侯不宜與高祖太宗同享請於太廟正殿後別建廟祀之帝曰通鑑既帝晉此帝字與晉帝渾殽此亦因江南舊史失於更定吾自幼託身義祖事見二百六十卷唐昭宗之乾寧二年朕安能啓此中興之業㣥臣乃不敢言唐主欲祖吳王恪或曰恪誅死吳王恪死於唐高宗朝為房遺愛所誣引非其罪也唐主命有司考二王苗裔以吳王孫禕有功禕子峴為宰相玄宗朝信安王禕有邊功峴相肅宗峴戶典翻云自峴五世至父榮其名率皆有司所撰考異曰周世宗實録及薛史稱忭唐玄宗第六子永王璘苗裔江南録云憲宗第八子建王恪之玄孫李昊蜀後主實録云唐嗣薛王知柔為嶺南節度使卒於官其子知誥流落江淮遂為徐溫養子吳越備史云忭本潘氏湖州安吉人父為安吉寨將吳將李神福攻衣錦軍過湖州虜忭歸為僕隸徐溫嘗過神福愛其謹厚求為養子以讖云東海鯉魚飛上天忭始事神福後歸溫故冒李氏以應讖劉恕以為忭復姓附會祖宗固非李氏而吳越與唐人仇敵亦非實録忭少孤遭亂莫知其祖系忭曾祖超祖志乃與義祖之曾祖祖同名知其皆附會也疑十世太少有司曰三十年為世陛下生於文德已五十年矣文德唐僖宗末年之號言唐主之生至是年為五十年延羲自稱威武節度使閩國王盧損至福州盧損去年十一月奉册使閩今乃至福州命弟繼恭主之遣其禮部員外郎鄭元弼奉繼恭表隨損入貢閩主不禮於損有士人林省鄒私謂損曰吾主不事其君不愛其親不恤其民不敬其神不睦其鄰不禮其賓賓謂盧損也余將僧服而北逃會相見於上國耳時假號偏隅者以中原為上國以余觀之林省鄒亦非善士有樊若水之志而不得遂其志耳延羲自稱威武節度使閩國王三月庚戌唐主追尊吳王恪為定宗孝靜皇帝自曾祖以下皆追尊廟號及諡延羲自稱威武節度使閩國王己未詔歸德節度使劉知遠忠武節度使杜重威並加同平章事知遠自以有佐命功重威起於外戚無大功恥與之同制制麻制也黃忠有功關羽猶恥與之同列杜重威何如人劉知遠其肯與之同制乎英雄倔強之氣大抵然也杜門四表辭不受帝怒謂趙瑩曰重威朕之妹夫知遠雖有功何得堅拒制命可落軍權劉知遠時總宿衛諸軍瑩拜請曰陛下昔在晉陽兵不過五千為唐兵十餘萬所攻事見上卷上年非知遠心如鐵石豈能成大業奈何以小過棄之竊恐此語外聞聞音問非所以彰人君之大度也帝意乃解命端明殿學士和凝詣知遠第諭旨知遠惶恐起受命君降心以撫其臣則臣亦自悔馴服勳舊強悍之氣不容不爾延羲自稱威武節度使閩國王靈州戍將王彥忠據懷遠城叛懷遠縣屬靈州趙珣聚米圖經曰唐懷遠鎮在靈州北約一百餘里宋時西夏強盛即其地置興州其西九十餘里即賀蘭山彥忠降延祚殺之降戶江翻上怒曰朕踐阼以來未嘗失信於人彥忠已輸仗出迎延祚何得亶殺之除延祚名重杖配流議者猶以為延祚不應免死以其殺降失信繼此將無以懷遠人也延羲自稱威武節度使閩國王辛酉册回鶻可汗仁美為奉化可汗時回鶻比年遣使朝貢故册命之按五代會要回鶻自唐會昌間為黠戛斯所破西奔居于甘州梁乾化元年遣使入貢至唐同光二年四月其本國權知可汗仁美遣使入貢命鄭績何延嗣持節册仁美為英義可汗其年十一月仁美卒其弟狄銀嗣立遣都督安千等來朝貢狄銀卒阿咄欲立亦遣使來貢天成三年其權知可汗仁裕遣使入貢其年三月命使册仁裕為順化可汗晉天福三年遣使朝貢四年三月又遣使來朝兼貢方物其月命衛尉卿邢德昭持節就册為奉化可汗若據會要則仁美當作仁裕延羲自稱威武節度使閩國王夏四月唐江王徐知證等請亦姓李欲改其本姓從國姓以自親延羲自稱威武節度使閩國王辛巳唐主祀南郊癸未大赦延羲自稱威武節度使閩國王梁太祖以來軍國大政天子多與崇政樞密使議梁與崇政使議唐與樞密使議崇政使即樞密使之職也行制敕講典故治文事而已治直之翻帝懲唐明宗之世安重誨專橫專橫事見唐明宗紀橫戶孟翻但命桑維翰兼樞密使及劉處讓為樞密使奏對多不稱旨劉處讓攘桑維翰樞密使見上卷上年稱尺證翻甲申廢樞密院以印付中書院事皆委宰相分判以副使張從恩為宣徽使直學士倉部郎中司徒詡工部郎中顏衎並罷守本官鄭樵氏族略曰帝王世紀舜為堯司徒支孫氏焉直學士樞密直學士也二人本官倉部工部也衎苦旱翻習於故事每欲復之史言帝王命相當悉委以政事不當置樞密使以分其權延羲自稱威武節度使閩國王帝以唐之大臣除名在兩京者皆貧悴李專美等除名見上卷元年悴秦醉翻丙戌以韓昭胤為兵部尚書馬胤孫為太子賓客房皓為右驍衛大將軍並致仕延羲自稱威武節度使閩國王閩主忌其叔父前建州刺史延武戶部尚書延望才名巫者林興與延武有怨託鬼神語云延武延望將為變閩主不復詰詰去吉翻使興帥壯士就第殺之帥讀曰率並其五子閩主用陳守元言作三清殿於禁中道家以上清玉清太清為三清晝夜作樂焚香禱祀求神丹政無大小皆林興傳寶皇命決之延羲自稱威武節度使閩國王戊申加楚王希範天策上將軍賜印聽開府置官屬梁開平四年已嘗加楚王殷天策上將軍今晉復以命其子希範延羲自稱威武節度使閩國王辛亥唐徙吉王景遂為壽王立壽陽公景達為宣城王延羲自稱威武節度使閩國王乙卯唐鎮海節度使兼中書令梁懷王徐知諤卒延羲自稱威武節度使閩國王唐人遷讓皇之族於泰州號永寧宮防衛甚嚴泰州本揚州海陵縣吳乾貞中立制置院南唐升元元年升為泰州考異曰十國紀年唐人遷讓皇之族於泰州號永寧宮守衛甚嚴不敢與國人通婚姻久而男女自為匹偶江表志讓皇子及五歲遣中使拜官賜朝服即日而卒按唐烈祖受禪使讓皇居故宮稱臣上表慕仁厚之名若惡楊氏則滅之而已何必如此之迂也他書皆未之見不知紀年據何書今不取罷歸永寧宮康化軍亦吳於統內所置節鎮或南唐置之其地今無可考乙丑以平盧節度使兼中書令楊璉為康化節度使璉固辭請終喪終讓皇之喪也延羲自稱威武節度使閩國王唐主將立齊王璟為太子固辭乃以為諸道兵馬大元帥判六軍諸衛守太尉録尚書事升揚二州牧南唐以升州為西都揚州為東都故二州置牧延羲自稱威武節度使閩國王閩判六軍諸衛建王繼嚴得士心閩主忌之六月罷其兵柄更名繼裕更工衡翻以弟繼鎔章十二行本鎔作鏞乙十一行本同孔本同判六軍去諸衛字去羌呂翻林興詐覺流泉州望氣者言宮中有災乙未閩主徙居長春宮延羲自稱威武節度使閩國王秋七月庚子朔日有食之延羲自稱威武節度使閩國王成德節度使安重榮出於行伍行戶剛翻性粗率粗與粗同每謂人曰今世天子兵強馬壯則為之耳安重榮粗暴一夫耳使其強梁亦何所至然其所以強梁者亦習見當時之事遂起非望之心耳嘗挾弓矢謂左右曰我能中竿上龍章十二行本龍下有首字乙十一行本同孔本同張校同退齋校同者必有天命一發中之廨古隘翻高居號翻中竹仲翻以是益自負帝之遣重榮代祕瓊也見上卷二年瓊不受代當別除汝一鎮勿以力取恐為患滋深重榮由是以帝為怯謂人曰祕瓊匹夫耳天子尚畏之況我以將相之重士馬之衆乎每所奏請多踰分分扶問翻為執政所可否可者則從之否者不從也乃聚亡命市戰馬有飛揚之志帝知之義武節度使皇甫遇與重榮姻家甲辰徙遇為昭義節度使鎮定接境恐其合而為變徙令稍遠以離析之延羲自稱威武節度使閩國王乙巳閩北宮火焚宮殿殆盡延羲自稱威武節度使閩國王戊申薛融等上所定編敕行之三年令薛融等詳定編敕今始上而行之上時掌翻延羲自稱威武節度使閩國王丙辰敕先令天下公私鑄錢見上卷上年小弱缺薄宜皆禁之專令官司自鑄延羲自稱威武節度使閩國王西京留守楊光遠疏中書侍郎同平章事桑維翰遷除不公及營邸肆於兩都與民爭利帝不得已閏月壬申出維翰為彰德節度使兼侍中延羲自稱威武節度使閩國王初義武節度使王處直子威避王都之難亡在契丹王都之難謂囚處直也見二百七十一卷梁均王龍德元年難乃旦翻義武缺帥皇甫遇徙潞故義武缺帥帥所類翻請使威襲父土地如我朝之法我朝契丹自謂也朝直遙翻中國之法必自刺史團練防禦序遷乃至節度使請遣威至此漸加進用契丹主怒復遣使來言曰復扶又翻爾自節度使為天子亦有階級邪帝恐其滋蔓不已厚賂契丹且請以處直兄孫彰德節度使廷胤為義武節度以厭其意厭於涉翻又如字契丹怒稍解延羲自稱威武節度使閩國王初閩惠宗以太祖元從為拱宸控鶴都閩王審知廟號太祖從才用翻下同更募壯士二千為腹心號宸衛都祿賜皆厚於二都或言二都怨望將作亂閩主欲分隸漳泉二州二都益怒閩主好為長夜之飲強㣥臣酒好呼到翻強其兩翻醉則令左右伺其過失伺相吏翻從弟繼隆醉失禮斬之屢以猜怒誅宗室叔父左僕射同平章事延羲陽為狂愚以避禍閩主賜以道士服置武夷山中武夷山在建州崇安縣南三十里朱元晦武夷圖序曰武夷君之名著自漢世祀以乾魚不知果何神也今崇安有山名武夷相傳即神仙所宅峯巒巖壑秀拔奇偉清溪九曲流出其間兩崖絶壁人迹所不到處往往有枯查插石罅間以庋舟船棺柩之屬柩中遺骸外列陶器尚且未壞頗疑前世道阻未通川壅未決時夷俗所居而漢祀者即其君長蓋亦避世之士生為衆所臣服沒而傳以為仙也武夷山中有道士觀閩主蓋置延羲於觀中幽於私第復扶又翻閩主數侮拱宸控鶴軍使永泰朱文進光山連重遇數所角翻永泰縣屬福州晉分弋陽置西陽縣宋孝武大明初置光城縣梁於縣置光州後廢州置光城郡隋廢郡置光山縣仍置光州以縣屬焉九域志縣在州西六十里連重遇之先蓋與王潮兄弟同入閩連姓也左傳齊有連稱二人怨之會北宮火求賊不獲閩主命重遇將內外營兵掃除餘燼日役萬人士卒甚苦之又疑重遇知縱火之謀欲誅之內學士陳郯私告重遇辛巳夜重遇入直帥二都兵焚長春宮帥讀曰率以攻閩主使人迎延羲於瓦礫中呼萬歲礫郎擊翻復召外營兵共攻閩主復扶又翻下同獨宸衛都拒戰閩主乃與李后如宸衛都李后李春燕也如往也比必利翻亂兵焚宸衛都宸衛都戰敗餘衆千餘人奉閩主及李后出北關至梧桐嶺衆稍逃散延羲使兄子前汀州刺史繼業將兵追之及於村舍閩主素善射引弓殺數人俄而追兵雲集閩主知不免投弓謂繼業曰卿臣節安在繼業曰君無君德臣安有臣節新君叔父也舊君昆弟也孰親孰疏閩主不復言繼業與之俱還至陀莊飲以酒醉而縊之還從宣翻又如字飲張禁翻並李后及諸子王繼恭皆死宸衛餘衆奔吳越延羲自稱威武節度使閩國王更名曦更工衡翻曦王審知少子也改元永隆考異曰十國紀年通文四年延羲自稱威武節度使改元永隆即晉天福四年也周世宗實録薛史唐餘録南唐烈祖實録吳越備史及運曆圖紀年通譜皆同惟閩中啓運圖通文四年己亥閏七月延羲立明年庚子改元永隆五年甲辰被弒林仁志閩國人載延羲改年宜不差失然五代士人撰録國書多不憑舊文出於記憶及傳聞雖本國近事亦有抵牾者高遠敘事頗有有本末余公綽雖在仁志之後然亦閩人故不敢獨從仁志所記又王曦既立若但稱節度使則不應改元及以其臣為三公平章事按晉高祖實録天福五年十一月甲申授閩國王延羲威武軍節度使閩國王是曦先已自稱閩國王紀年脫漏耳頒賚中外以宸衛弒閩主赴於鄰國諡閩主曰聖神英睿文明廣武應道大弘孝皇帝廟號康宗遣商人間道奉表稱藩于晉間古莧翻然其在國置百官皆如天子之制以太子太傅致仕李真為司空兼中書侍郎同平章事連重遇之攻康宗也陳守元在宮中易服將逃兵人殺之陳守元蠱惑閩主者二世其死晚矣數以賣官之罪而斬之數所具翻蔡守蒙賣官見上卷上年閩王曦既立遣使誅林興於泉州林興流泉州見上六月蜀本誅作追延羲自稱威武節度使閩國王河決薄州薄州當作博州延羲自稱威武節度使閩國王八月辛丑以馮道守司徒兼侍中壬寅詔中書知印止委上相舊制凡宰臣更日知印悉委於道帝嘗訪以軍謀對曰征伐大事在聖心獨斷斷丁亂翻臣書生惟知謹守歷代成規而已帝以為然道嘗稱疾求退帝使鄭王重貴詣第省之省悉景翻曰來日不出朕當親往道乃出視事當時寵遇㣥臣無與為比延羲自稱威武節度使閩國王己酉以吳越王元瓘為天下兵馬元帥延羲自稱威武節度使閩國王黔南巡內溪州刺史彭士愁引蔣錦州蠻萬餘人寇辰澧州唐之盛時溪州屬黔中觀察唐末升黔中觀察為黔南節度後號武泰軍時屬蜀境巡內言在巡屬之內也蔣當作獎唐長安四年以沅州之夜郎渭溪二縣置舞州開元十三年以舞武聲相近更名鶴州二十年又更名業州大曆五年又更名獎州辰澧時屬楚黔渠今翻又其廉翻遣使乞師于蜀蜀主以道遠不許九月辛未楚王希範命左靜江指揮使劉勍決勝指揮使廖匡齊帥衡山兵五千討之勍渠京翻廖力救翻今讀從力弔翻帥讀曰率延羲自稱威武節度使閩國王癸未以唐許王從益為郇國公奉唐祀從益尚幼李后養從益於宮中奉王淑如事母李后唐明宗曹皇后之女王淑明宗次也故后事之如母延羲自稱威武節度使閩國王冬十月庚戌閩康宗所遣使者鄭元弼至大梁是年十二月閩遣鄭元弼隨盧損入貢至是達大梁而康宗已於閏七月為閩人所弒矣遺于季翻閩國一從興運久歷年華見北辰之帝座頻移言中國屢易主也言由此不修職貢帝怒其不遜壬子詔卻其貢物及福建諸州綱運並令元弼及進奏官林恩部送速歸兵部員外郎李知損上言王昶僭慢宜執留使者籍沒其貨乃下元弼恩獄下戶嫁翻延羲自稱威武節度使閩國王吳越恭穆夫人馬氏卒夫人雄武節度使綽之女也路振九國志馬綽餘杭人少與錢鏐俱事董昌以女弟妻鏐鏐復為元瓘娶綽女按薛史梁貞明四年秦州節度使檢校太傅同平章事馬綽加檢校太尉秦州雄武軍也鏐傳又曰鏐恃崇盛分兩浙為數鎮其節制署而後奏則其國內節帥皆稟朝命也武肅王鏐禁中外畜聲伎文穆王元瓘年三十餘無子夫人為之請於鏐為于偽翻鏐喜曰吾家祭祀汝實主之禮冢婦主先世之祭祀今馬夫人不妬忌而廣嗣續故鏐喜其有託生弘僔弘倧許氏生弘佐吳氏生弘俶衆妾生弘偡弘億章十二行本億下有弘儀二字乙十一行本同孔本同張校同弘偓弘仰弘信僔子損翻倧徂冬翻俶昌六翻偡丈減翻夫人撫視慈愛如一常置銀鹿於帳前坐諸兒於上而弄之延羲自稱威武節度使閩國王十一月戊子契丹遣其臣遙折來使遂如吳越如往也使疏吏翻延羲自稱威武節度使閩國王楚王希範始開天策府是年夏加天策上將軍至是始開府章十二行本中作都乙十一行本同孔本同尉領軍司馬等官以諸弟及將校為之又以幕僚拓跋恆李弘皋廖匡圖徐仲雅等十八人為學士倣唐太宗天策府文學館立學士員路振九國志載李鐸潘起曹梲李莊徐牧彭繼英裴頏何仲舉孟玄暉劉昭禹鄧懿文李弘節蕭洙彭繼勳併拓跋恆等四人凡十八人恆戶登翻劉勍等進攻溪州彭士愁兵敗棄州走保山寨石崖四絶勍為梯棧上圍之棧士限翻上時掌翻廖匡齊戰死楚王希範遣弔其母其母不哭謂使者曰廖氏三百口受王溫飽之賜舉族效死未足以報況一子乎願王無以為念王以其母為賢厚恤其家延羲自稱威武節度使閩國王十二月丙戌禁創造佛寺創與創同音初亮翻前所無而今創為之者禁之延羲自稱威武節度使閩國王閩王作新宮徙居之閩北宮燬于火曦改作新宮而徙居之延羲自稱威武節度使閩國王是歲漢門下侍郎同平章事趙光裔言於漢主曰自馬后崩漢主娶于楚唐清泰元年馬后殂親鄰舊好不可忘也劉馬通姻故曰親潭廣接境故曰鄰好呼到翻紓音舒漢主從之楚亦遣使報聘光裔相漢二十餘年府庫充實邊境無虞及卒漢主復以其子翰林學士承旨尚書左丞損為門下侍郎同平章事復扶又翻五年庚子九四閩王曦因商人奉表自理春正月帝引見閩使鄭元弼等見賢遍翻使疏吏翻元弼曰王昶蠻夷之君不知禮義陛下得其善言不足喜惡言不足怒臣將命無狀願伏鈇鑕以贖昶罪帝憐之辛未詔釋元弼等考異曰洛中紀異云昶既為朝命所責乃遣使越海聘於契丹即將籍沒之物為贄晉祖方卑辭以奉戎主戎主降偽詔曰閩國禮物並付喬榮放其使人還本國晉祖不敢拒之既而昶又遣使於契丹求馬由滄齊淮甸路南去自茲往復不一時人無不憤惋按昶以天福四年閏七月被弒十月元弼等至京下獄昶安得知而告契丹今不取閩王曦因商人奉表自理楚劉勍等因大風以火箭焚彭士愁寨而攻之士愁帥麾下逃入獎錦深山乙未遣其子師皓帥諸酋長納溪錦獎三州印請降於楚為彭師皓盡節於馬氏張本帥讀曰率閩王曦因商人奉表自理二月庚戌北都留守同平章事安彥威入朝北都自後唐以來建於太原吾所重者信與義昔契丹以義救我我今以信報之聞其徵求不已公能屈節奉之深稱朕意稱尺證翻對曰陛下以蒼生之故猶卑辭厚幣以事之臣何屈節之有上悅閩王曦因商人奉表自理劉勍引兵還長沙楚王希範徙溪州於便地便地者徙近楚境便於制令以劉勍為錦州刺史自是㣥蠻服於楚希範自謂伏波之後漢馬援為伏波將軍高丈二尺高居號翻入地六尺銘誓狀於上立之溪州今辰州會溪城西南一里有銅柱即馬希範所立也天策府學士李皋為之銘閩王曦因商人奉表自理唐康化節度使兼中書令楊璉謁平陵還平陵蓋楊璉之父讓皇陵也還從宣翻又如字大醉卒於舟中唐主使然也路振九國志曰楊璉拜陵至竹篠口維舟大醉一夕而卒章十二行本追上有唐主二字乙十一行本同孔本同封諡曰弘農靖王因楊氏其先受封之郡追封為弘農王諡曰靖閩王曦因商人奉表自理閩王曦既立驕淫苛虐猜忌宗族多尋舊怨其弟建州刺史延政數以書諫之數所角翻曦怒復書罵之遣親吏業翹監建州軍史照曰業當作鄴風俗通漢有梁令鄴鳳監古銜翻按福州西北與建州鄰閩主蓋置南鎮軍於福建二州界扼往來之要故是後王延政攻南鎮而福州西鄙戍兵皆潰捃居運翻由是兄弟積相猜恨一日翹與延政議事不叶翹訶之曰公反邪延政怒欲斬翹翹奔南鎮延政發兵就攻之敗其戍兵訶虎何翻敗補邁翻下同翹漢崇奔福州西鄙戍兵皆潰二月曦遣統軍使潘師逵吳行真將兵四萬擊延政師逵軍於建州城西行真軍於城南皆阻水置營焚城外廬舍延政求救於吳越壬戌吳越王元瓘遣寧國節度使同平章事仰仁詮宣州寧國軍時屬南唐吳越使仰仁詮遙領耳當時列國自相署置多此類仰姓也何氏姓苑有此姓丞相林鼎諫不聽三月戊辰師逵分兵三千遣都軍使蔡弘裔將之出戰延政遣其將林漢徹等敗之於茶山斬首千餘級茶山在建州東二十五里今亦謂之鳳凰山北苑茶焙即其地閩王曦因商人奉表自理安彥威王建立皆請致仕不許辛未以歸德節度使侍衛馬步都指揮使同平章事劉知遠為鄴都留守徙彥威為歸德節度使加兼侍中癸酉徙建立為昭義節度使進爵韓王以建立遼州人割遼沁二州隸昭義遼沁二州自唐以來本屬河東節度沁午鴆翻珫昌終翻守式又翻閩王曦因商人奉表自理山南東道節度使同平章事安從進恃其險固襄陽之地正得屈完所謂方城以為城漢水以為池之險故安從進恃之以傲朝廷亶邀取湖南貢物湖南貢物馬希範所進者也增廣甲卒元隨都押牙王令謙押牙潘知麟諫皆殺之及王建立徙潞州帝使問之曰朕虛青州以待卿青州平盧軍從進對曰若移青州置漢南襄陽在漢水之南帝不之責帝非姑息之主也慊然內顧其所以取中原者而思其所以守中原者畏首畏尾故諸鎮之桀驁者皆俯眉而撫馴之閩王曦因商人奉表自理丁丑王延政募敢死士千餘人夜涉水潛入潘師逵壘因風縱火城上鼓譟以應之戰棹都頭建安陳誨殺師逵建安漢冶縣地吳置建安縣唐帶建州戊寅引兵欲攻吳行真寨建人未涉水行真及將士棄營走死者萬人延政乘勝取永平順昌二城吳分建安置南平縣晉武帝改為延平縣王審知置延平鎮其子延翰改曰永平鎮今南劍州治所即其地九域志南劍州管下有順昌縣在州西一百八十里宋白曰順昌縣本建安縣之校鄉地也吳永安三年置將樂縣隋併入邵武唐復置景福二年又置將水鎮改為永順場尋立為順昌縣閩王曦因商人奉表自理夏四月蜀太保兼門下侍郎同平章事趙季良請與門下侍郎同平章事毋昭裔中書侍郎同平章事張業分判三司癸卯蜀主命季良判戶部昭裔判鹽鐵業判度支度徒洛翻閩王曦因商人奉表自理庚戌以前橫海節度使馬全節為安遠節度使以代李金全也閩王曦因商人奉表自理甲子吳越孝獻世子弘僔卒僔子損翻閩王曦因商人奉表自理吳越仰仁詮等兵至建州王延政以福州兵已敗去奉牛酒犒之犒苦到翻請班師仁詮等不從營于城之西北延政懼見仰仁詮逼城而屯有圖建州之心是以懼復扶又翻閩王以泉州刺史王繼業為行營都統將兵二萬救之且移書責吳越所謂歸曲以直責也會久雨吳越章十二行本越下有軍字乙十一行本同孔本同食盡五月延政遣兵出擊大破之俘斬以萬計癸未仁詮等夜遁閩王曦因商人奉表自理胡漢筠既違詔命不詣闕又聞賈仁沼二子欲訴諸朝賈仁沼死見上卷二年朝直遙翻漢筠紿金全曰進奏吏遣人倍道來言進奏吏謂安遠軍進奏院之主吏在大梁者也即按賈仁沼死狀以為必有異圖金全大懼漢筠因説金全拒命自歸於唐金全從之説式芮翻丙戌帝聞金全叛命馬全節以汴洛汝鄭單宋陳蔡曹濮申唐之兵討之如此則河之南濟之西諸鎮之兵盡發矣單音善濮音卜審暉審琦之兄也李金全遣推官張緯奉表請降於唐降戶江翻唐主遣鄂州屯營使李承裕段處恭將兵三千逆之處昌呂翻閩王曦因商人奉表自理唐主遣客省使尚全恭如閩和閩王曦及王延政六月延政遣牙將及女奴持誓書及香爐至福州與曦盟于宣陵古者盟誓坎用牲加載書於上歃血以質諸天地鬼神宗廟之祭焫蕭合馨香而已至於灌獻尚鬱食品用椒荀卿言芬若椒蘭漢皇后椒房取其芬馥郎官含雞舌香奏事西京雜記載長安巧工丁緩作被下香爐劉向銘博山爐漢官典職尚書郎給女史二人執香爐燒薰皆未以奉鬼神漢武內傳載西王母降爇嬰香多品疑皆後人傅會而言之宋范曄作香序備言諸香以譏評時人至其作後漢書亦不載漢人焚香事疑以香禮神之習出於魏晉已下程大昌演繁露曰梁武帝祭天始用沈香古未用也祀地用上和香注云以地於人近宜加雜馥即合諸香為之言不止一香也閩主鏻之舉大號尊其父審知墓為宣陵閩王曦因商人奉表自理癸卯唐李承裕等至章十二行本至上有引兵二字乙十一行本同孔本同安州是夕李金全將麾下數百人詣唐軍妓妾資財皆為承裕所奪妓渠綺翻承裕入據安州甲辰馬全節自應山進軍大化鎮應山古應國漢屬隨縣界梁分隨縣置永陽縣隋改曰應山唐屬安州九域志在州北一百八十里大化鎮屬應山縣大破之承裕掠安州南走全節入安州丙午安審暉追敗唐兵於黃花谷段處恭戰死丁未審暉又敗唐兵於雲夢澤中九域志安州安陸縣有雲夢鎮今安陸縣南五十里有雲夢澤宋白曰安州雲夢縣本漢安陸縣地後魏大統十六年於雲城古城置雲夢縣敗補邁翻唐將張建崇據雲夢橋拒戰審暉乃還馬全節斬承裕及其衆千五百人于城下送監軍杜光業等五百七人于大梁上曰此曹何罪皆賜馬及器服而歸之初盧文進之奔吳也事見二百八十卷元年戒無入安州城陳于城外陳讀曰陳俟文進出殿之以歸無得剽掠自盧文進至此皆言唐主相吳時事也殿丁練翻剽匹妙翻戒之如全恩承裕貪剽掠與晉兵戰而敗失亡四千人唐主惋恨纍日自以戒敕之不熟也惋烏貫翻唐主生於兵間老於兵間軍之利鈍熟知之矣其惋恨者誠有罪己之心惜不能如秦穆公耳至馮延己輩乃訕笑先朝至於蹙國殄民而後已書曰否則侮厥父母曰昔之人無聞知延己之謂矣後之守國者尚鑒茲哉杜光業等至唐唐主以其違命而敗不受復送於淮北遺帝書曰邊校貪功乘便據壘復扶又翻下同遺唯季翻校戶教翻又曰軍法朝章彼此不可言律之以軍法則喪師者此所必誅盜邊者彼所不恕繩之以朝章則兩國皆不可容之立於朝也朝直遙翻使者將自桐墟濟淮九域志宿州蘄縣有桐壚鎮自桐壚而南至渦口則濟淮矣金人疆域圖桐墟在宿州臨渙縣乃還還從宣翻又如字帝悉授唐諸將官以其士卒為顯義都命舊將劉康領之舊將蓋從起於晉陽者臣光曰違命者將也士卒從將之令者也又何罪乎受而戮其將以謝敵弔士卒而撫之斯可矣將即亮翻何必棄民以資敵國乎閩王曦因商人奉表自理唐主使宦者祭廬山廬山在江州潯陽縣山南即唐都昌縣山北即唐之潯陽縣都昌今為南康軍軍城之北十五里即廬山還從宣翻又如字勞之曰勞力到翻卿此行甚精潔宦者曰臣自奉詔蔬食至今唐主曰卿某處市魚為羹某日市肉為胾何為蔬食宦者慚服胾側吏翻臠肉為之唐主之察衛嗣君之儔也倉吏歲終獻羡餘萬餘石唐主曰出納有數苟非掊民刻軍安得羡餘邪羡延面翻掊蒲侯翻閩王曦因商人奉表自理秋七月閩主曦城福州西郭以備建人又度民為僧民避重賦多為僧凡度萬一千人嗚呼使度僧而有福田利益則閩國至今存可也閩王曦因商人奉表自理乙丑帝賜鄭元弼等帛遣歸遣歸閩也去年十月囚之今釋而遣之閩王曦因商人奉表自理李金全之叛也安州馬步副都指揮使桑千威和指揮使王萬金成彥溫不從而死馬步都指揮使龐守榮誚其愚以徇金全之意誚才笑翻己巳詔贈賈仁沼及桑千等官遣使誅守榮於安州李金全至金陵唐主待之甚薄李金全為姦將所惑背父母之國委身於他邦其見薄宜也閩王曦因商人奉表自理丁巳唐主立齊王璟為太子兼大元帥録尚書事閩王曦因商人奉表自理太子太師致仕范延光請歸河陽私第范延光仕唐先有私第在河陽延光重載而行西京留守楊光遠兼領河陽利其貨且慮為子孫之患當范延光以廣晉自歸之時楊光遠為元帥必有以陵暴之故懼其為子孫之患延光叛臣不家汴洛而就外藩恐其逃逸入敵國宜早除之帝不許光遠請敕延光居西京從之光遠使其子承貴以甲士圍其第逼令自殺嗚呼財之纍人如此祕瓊以是而殺董溫琪之家范延光復以是而殺祕瓊楊光遠又以是而殺范延光而光遠亦卒不免財之纍人如此夫天子在上賜我鐵券許以不死賜鐵券見上卷三年己未承貴以白刃驅延光上馬至浮梁擠于河上時掌翻擠子細翻又子西翻光遠奏云自赴水死帝知其故憚光遠之強不敢詰為延光輟朝贈太師為于偽翻閩王曦因商人奉表自理唐齊王璟固辭太子位居嫡長則當為太子辭之非所以繫臣民之望也乙丑唐主許之詔中外致箋如太子禮閩王曦因商人奉表自理丁卯以翰林學士承旨戶部侍郎和凝為中書侍郎同平章事閩王曦因商人奉表自理己巳鄴都留守劉知遠入朝是年二月劉知遠代安彥威鎮魏州閩王曦因商人奉表自理辛未李嵩奏諸州倉糧於計帳之外所餘頗多計帳謂歲計其數造帳以申三司者倉吏於受納之時斛面取贏俟出給之時而私其利此皆官吏相與為弊至今然也必般量而後知其所餘而般量之際為弊又多竊意李嵩亦因時人既言而奏之耳法外稅民罪同枉法倉吏特貸其死各痛懲之不知當時所謂痛懲者為何畢竟言之而不能行閩王曦因商人奉表自理翰林學士李浣輕薄多酒失上惡之丙子罷翰林學士併其職於中書舍人惡烏路翻當是時樞密直學士既罷僅有翰林學士尚為親近儒生李浣之酒失罷之是也因而罷翰林學士非也浣濤之弟也閩王曦因商人奉表自理楊光遠入朝帝欲徙之他鎮謂光遠曰圍魏之役卿左右皆有功尚未之賞圍魏見上卷二年三年因以其將校數人為刺史所以分楊光遠之黨而弱其勢甲申徙光遠為平盧節度使進爵東平王開運之初楊光遠遂以平盧叛閩王曦因商人奉表自理冬十月丁酉加吳越王元瓘天下兵馬都元帥尚書令閩王曦因商人奉表自理壬寅唐大赦詔中外奏章無得言睿聖犯者以不敬論術士孫智永以四星聚斗分野有災分扶間翻勸唐主巡東都勸之東巡江都乙巳唐主命齊王璟監國光政副使太僕少卿陳覺以私憾奏泰州刺史褚仁規貪殘泰州漢時吳國之海陵倉地東晉分廣陵置海陵郡唐初置吳州更海陵縣為吳陵縣武德七年廢吳州復為海陵縣南唐升為泰州丙午罷仁規為扈駕都部署覺始用事為陳覺亂唐政張本庚戌唐主發金陵甲寅至江都閩王曦因商人奉表自理閩王曦因商人奉表自理言己未嘗稱大號稱大號者王昶之為也甲申以曦為威武節度使兼中書令封閩國王閩王曦因商人奉表自理唐主欲遂居江都以水凍漕運不給乃還還從宣翻又如字十二月丙申至金陵閩王曦因商人奉表自理唐右僕射兼門下侍郎同平章事張延翰卒閩王曦因商人奉表自理是歲漢門下侍郎同平章事趙損卒以寧遠節度使南昌王定保為中書侍郎同平章事不踰年亦卒閩王曦因商人奉表自理初帝割鴈門之北以賂契丹見二百八十卷元年苦其貪虐思歸中國成德節度使安重榮復誘之復扶又翻誘音酉於是吐谷渾帥部落千餘帳自五臺來奔歐陽修曰吐谷渾本居青海唐至德中為吐蕃所攻部族分散其內附者唐處之河西唐末其首領有赫連鐸為大同節度使為晉王克用所破部族益微散處蔚州界中余按唐高宗之時吐谷渾為吐蕃所破棄青海而內徙至至德中青海不復有吐谷渾而吐蕃東吞河隴吐谷渾復東徙居雲蔚之間自五臺來奔蓋取飛狐道奔鎮州也宋白曰吐谷渾謂之退渾蓋語急而然聖曆後吐蕃陷安樂州其衆東徙散在朔方赫連鐸以開成元年將本部三千帳來投豐州文宗命振武節度使劉沔以善地處之及沔移鎮河東遂散居川界音訛謂之退渾其後吐谷渾白姓皆赫連之部落赫連鐸為李克用所逐歸幽州李匡儔遂居蔚州界部落代建其氏不常白承福自莊宗後為都督依北山北石門為柵賜其額為寧朔府以都督為節度使遣使讓帝以招納叛人為契丹誚讓不已帝憂悒而殂張本六年辛丑九四一春正月丙寅帝遣供奉官張澄將兵二千索吐谷渾在並鎮欣代四州山谷者逐之使還故土索山客翻吐谷渾既仇視契丹雖逐之不去其後劉知遠遂殺之以為資王延政城建州周二十里請於閩王曦欲以建州為威武軍自為節度使曦以威武軍福州也乃以建州為鎮安軍以延政為節度使封富沙王建州本漢冶縣地後分冶地南部曰建安唐置建州州有古富沙驛又南劍州管內有富沙里二月壬辰作浮梁於德勝口是為澶州河橋彰義節度使張彥澤欲殺其子掌書記張式素為彥澤所厚諫止之彥澤怒射之左右素惡式從而讒之射而亦翻惡烏路翻式懼謝病去彥澤遣兵追之式至邠州靜難節度使李周以聞帝以彥澤故流式商州彥澤遣行軍司馬鄭元昭詣闕求之且曰彥澤不得張式恐致不測以反脅上與之癸未嚴未改巳式至涇州彥澤命決口剖心斷其四支斷音短父子之道天性也張彥澤欲殺其子其於天性何有張式其所親者也以諫而殺之極其慘酷其於所親亦何有晉祖欲以君臣之分柔服之難矣此其所以貽負義侯之禍也涼州軍亂留後李文謙閉門自焚死趙珣聚米圖經涼州東至會州六百里西至甘州五百里南至鄯州三百六十里北至故突厥界三百里宋白續通典四至同而里數之遠近異蜀自建國以來唐清泰元年蜀建國或以他職留成都委僚佐知留務專事聚斂政事不治斂力贍翻治直之翻民無所訴蜀主知其弊丙辰加衛聖馬步都指揮使武德節度使兼中書令趙廷隱蜀以東川為武德軍以定董璋克梓州取武有七德以為軍號並罷其節度使三月甲戌以翰林學士承旨李昊知武寧章十二行本寧作德乙十一行本同孔本同軍散騎常侍劉英圖知保寧軍諫議大夫崔鑾知武信軍給事中謝從志知武泰軍將作監張讚知寧江軍使之各知節度事非正帥也夏四月閩王曦以其子亞澄同平章事判六軍諸衛曦疑其弟汀州刺史延喜與延政通謀汀建接壤故疑之執延喜以歸唐主以陳覺及萬年常夢錫為宣徽副使辛巳北京留守李德珫遣牙校以吐谷渾酋長白承福入朝既遣張澄逐吐谷渾之在四州山谷者矣而又容其酋長入朝豈非容其大而逐其細歟晉高祖之與契丹主以術相遇者也珫昌中翻唐主遣通事舍人歐陽遇求假道以通契丹帝不許契丹求假道以通淮浙晉無所不可至唐求假道以通契丹則不許之隨其所輕重而應之也自黃巢犯長安以來唐僖宗廣明元年黃巢入長安然後諸國各有分土分扶問翻兵革稍息及唐主即位江淮比年豐稔兵食有餘㣥臣爭言陛下中興今北方多難宜出兵恢復舊疆比毗至翻難乃旦翻舊疆謂盛唐時疆土也此豈易恢復邪宜唐主之不從之也唐主曰吾少長軍旅少詩照翻長知兩翻見兵之為民害深矣不忍復言復扶又翻使彼民安則吾民亦安矣又何求焉漢主遣使如唐謀共取楚分其地唐主不許史言唐主能保境息民山南東道節度使安從進謀反遣使奉表詣蜀請出師金商以為聲援自金商取道均房則至襄陽丁亥使者至成都蜀主與㣥臣謀之皆曰金商險遠少出師則不足制敵多則漕挽不繼水運曰漕陸運曰挽挽音晚又求援於荊南高從誨遺從進書遺唯季翻諭以禍福從進怒反誣奏從誨荊南行軍司馬王保義勸從誨具奏其狀且請發兵助朝廷討之從誨從之成德節度使安重榮恥臣契丹見契丹使者必箕踞慢罵使過其境或潛遣人殺之契丹以讓帝帝為之遜謝使並疏吏翻為于偽翻六月戊午重榮執契丹使拽剌拽戶結翻剌來達翻遣騎掠幽州南境軍於博野博野縣屬定州宋雍熙四年以其地置寧邊軍景德元年改永定軍天聖七年改永寧軍金升為蠡州其疆域圖云北至燕京四百九十里吐谷渾兩突厥渾契苾沙陀各帥部衆歸附兩突厥東突厥西突厥也帥讀曰率言為虜所陵暴黨底朗翻又言自二月以來令各具精甲壯馬將以上秋南寇上秋謂七月與之俱滅願自備十萬衆與晉共擊契丹又朔州節度副使趙崇已逐契丹節度使劉山朔州舊非節鎮蓋契丹所置也臣相繼以聞陛下屢敕臣承奉契丹勿自起釁端其如天道人心難以違拒機不可失時不再來諸節度使沒於虜庭者此謂趙德鈞董溫琪沙彥珣翟璋等企去智翻舉踵不至地也良可哀閔願早決計表數千言大抵斥帝父事契丹竭中國以媚無厭之虜厭於鹽翻又以此意為書遺朝貴遺唯季翻及移藩鎮云已勒兵必與契丹決戰帝以重榮方握強兵不能制甚患之時鄴都留守侍衛馬步都指揮使劉知遠在大梁去年劉知遠自魏來朝時尚留大梁又慮朝廷重違其意重難也陛下免於晉陽之難而有天下難乃旦翻皆契丹之功也不可負之今重榮恃勇輕敵吐渾假手報仇皆非國家之利不可聽也臣竊觀契丹數年以來士馬精強吞噬四鄰戰必勝攻必取割中國之土地收中國之器械此謂降楊光遠虜趙德鈞時也其臣上下輯睦牛羊蕃息蕃音煩國無天災此未可與為敵也且中國新敗謂張敬達晉安之敗趙德鈞團柏之敗以當契丹乘勝之威其勢相去甚遠又和親既絶則當發兵守塞兵少則不足以待寇兵多則饋運無以繼之我出則彼歸我歸則彼至臣恐禁衛之士疲於奔命鎮定之地無復遺民幽涿瀛莫既屬契丹鎮定滄景悉為邊鎮滄景之地近海卑下又多塘濼虜騎不可得而入其入寇多依山而趨鎮定故其地為虜衝粗坐五翻瘡痍未復府庫虛竭蒸民困弊蒸衆也猶懼不濟其可妄動乎契丹與國家恩義非輕信誓甚著彼無間隙間古莧翻而自啓釁端就使克之後患愈重萬一不克大事去矣議者以歲輸繒帛謂之耗蠹有所卑遜謂之屈辱殊不知兵連而不休禍結而不解財力將匱耗蠹孰甚焉用兵則武吏功臣過求姑息邊藩遠郡得以驕矜下陵上替屈辱孰大焉桑維翰權利害之輕重而言之一時之論也養兵息民俟國無內憂民有餘力然後觀釁而動則動必有成矣又鄴都富盛國家藩屏今主帥赴闕屏必郢翻主帥赴闕謂劉知遠來朝帥所類翻軍府無人臣竊思慢藏誨盜之言勇夫重閉之義慢藏誨盜易大傳之言勇夫重閉左傳申公巫臣之言藏徂浪翻重直龍翻以杜姦謀帝謂使者曰朕比日以來煩悶不決今見卿奏如醉醒矣比毗至翻悶音悶醒先梃翻醉寤也卿勿以為憂閩王曦聞王延政以書招泉州刺史王繼業召繼業還賜死於郊外福州之郊外也城外三十里為郊蓋殺之於野初繼業為汀州刺史司徒兼門下侍郎同平章事楊沂豐為士曹參軍與之親善或告沂豐與繼業同謀沂豐方侍宴即收下獄下戶嫁翻明日斬之夷其族沂豐涉之從弟也楊涉為相於唐梁禪代之際從才用翻國人哀之自是宗族勳舊相繼被誅人不自保諫議大夫黃峻舁櫬詣朝堂極諫曦曰老物狂發矣貶章州司戶被皮義翻舁音余又羊茹翻襯初覲翻章州當作漳州章乙十一行本正作漳曦淫侈無度資用不給謀於國計使南安陳匡範南安縣隋置唐屬泉州九域志在州北四十七里曦悅加匡範禮部侍郎匡範增算商賈數倍曦宴㣥臣舉酒屬匡範曰賈音古屬之欲翻明珠美玉求之可得如匡範人中之寶不可得也未幾商賈之算不能足日進貸諸省務錢以足之恐事覺憂悸而卒幾居豈翻悸其季翻曦祭贈甚厚諸省務以匡範貸帖聞貸帖貸錢之文書也斫棺斷其尸棄水中斷音短以連江人黃紹頗代為國計使唐武德元年分閩縣置溫麻縣尋改曰連江屬福州九域志在州東北一百六十里令欲仕者自非蔭補皆聽輸錢即授之以資望高下及州縣戶口多寡定其直自百緡至千緡從之唐主自以專權取吳尤忌宰相權重此王莽隋文帝之故知也姦雄事成與不成有幸不幸耳欲罷之會建勳上疏言事意其留中既而唐主下有司施行下戶嫁翻建勳自知事挾愛憎密取所奏改之秋七月戊辰罷建勳歸私第帝憂安重榮跋扈己巳以劉知遠為北京留守河東節度使復以遼沁隸河東去年以遼沁隸昭義軍沁午鴆翻知遠微時為晉陽李氏贅壻嘗牧馬犯僧田僧執而笞之知遠至晉陽首召其僧命之坐慰諭贈遺衆心大悅遺唯季翻不念舊怨故衆心大悅為劉知遠自河東成大業張本吳越府署火宮室府庫幾盡幾居依翻吳越王元瓘驚懼發狂疾唐人爭勸唐主乘弊取之唐主曰奈何利人之災遣使唁之且賙其乏唁魚戰翻弔生曰唁賙音周振贍之也閩主曦自稱大閩皇領威武節度使既稱皇矣又領威武節度使古之私立名字者無此比也治直之翻互有勝負福建之間暴骨如莽鎮武節度判官晉江潘承祐屢請息兵修好唐開元八年分南安縣置晉江縣後遂為泉州治所好呼到翻閩主使者至延政大陳甲卒以示之對使者語甚悖慢悖蒲妹翻又蒲沒翻承祐長跪切諫延政怒顧左右曰判官之肉可食乎承祐不顧聲色愈厲閩主曦惡泉州刺史王繼嚴得衆心罷歸鴆殺之惡烏路翻八月戊子朔以開封尹鄭王重貴為東京留守馮道李嵩屢薦天平節度使兼侍衛親軍馬步副都指揮使同平章事杜重威之能此希上指而薦之也充隨駕御營使代劉知遠知遠由是恨二相為馮道不用於漢李嵩見殺張本民多逃亡嘗出過市謂左右曰人言我驅盡百姓何市人之多也壬辰帝發大梁己亥至鄴都壬寅大赦帝以詔諭安重榮曰爾身為大臣家有老母忿不思難棄君與親吾因契丹得天下爾因吾致富貴謂重榮降帝於晉陽從此得富貴爾乃忘之何邪今吾以天下臣之爾欲以一鎮抗之不亦難乎宜審思之無取後悔重榮得詔愈驕聞山南東道節度使安從進有異志陰遣使與之通謀安從進反而重榮亦反矣吳越文穆王元瓘寢疾察內都監章德安忠厚能斷大事欲屬以後事語之曰弘佐尚少當擇宗人長者立之監古銜翻斷丁亂翻屬之欲翻語牛倨翻少詩照翻長知兩翻德安曰弘佐雖少㣥下伏其英敏願王勿以為念王曰汝善輔之吾無憂矣德安處州人也辛亥元瓘卒年五十五初內牙指揮使戴惲為元瓘所親任悉以軍事委之元瓘養子弘侑乳母惲妻之親也惲於粉翻或告惲謀立弘侑德安祕不發喪與諸將謀伏甲士於幕下壬子惲入府執而殺之廢弘侑為庶人復姓孫幽之明州是日將吏以元瓘遺命承制以鎮海鎮東副大使弘佐為節度使時年十四歐史曰年十三庚申弘佐即王位命丞相曹仲達攝政軍中言賜與不均舉仗不受諸將不能制仲達親諭之皆釋仗而拜弘佐溫恭好書禮士躬勤政務發擲姦伏人不能欺擲他狄翻民有獻嘉禾者弘佐問倉吏今蓄積幾何對曰十年王曰然則軍食足矣可以寬吾民乃命復其境內稅三年復方目翻除免也史言弘佐雖少而敏於政辛酉滑州言河決考異曰薛史紀載九月辛酉滑州河決而不載庚午濮州決高祖實録載庚午濮州奏河決而不載辛酉滑州決五代會要及志皆云天福六年九月決滑州兗濮州界皆為水漂溺史匡翰傳亦云天福六年白馬河決按辛酉滑州河已決則下流皆涸濮州無庚午再決之理蓋滑州河決漂浸及濮州耳帝以安重榮殺契丹使者恐其犯塞乙亥遣安國節度使楊彥詢使于契丹彥詢至其帳契丹章十二行本丹下有主字乙十一行本同孔本同責以使者死狀彥詢曰譬如人家有惡子父母所不能制將如之何契丹主怒乃解閩主曦以其子琅邪王亞澄為威武節度使兼中書令改號長樂王樂音洛劉知遠遣親將郭威以詔指説吐谷渾酋長白承福時朝廷陽為逐吐谷渾而陰撫納之又懼契丹知之而怒之也不敢明降詔書故劉知遠承帝密指使郭威稱詔指以説之將即亮翻説式芮翻酋慈秋翻長知兩翻許以節鉞威還謂知遠曰虜惟利是嗜安鐵胡止以袍袴賂之還從宣翻又如字安重榮小字鐵胡今欲其來莫若重賂乃可致耳知遠從之且使謂承福曰朝廷已割爾曹隸契丹爾曹當自安部落今乃南來助安重榮為逆重榮已為天下所棄朝夕敗亡爾曹宜早從化勿俟臨之以兵南北無歸悔無及矣言吐谷渾若助安重榮重榮敗亡之後吐谷渾南不可歸晉北不可歸契丹冬十月帥其衆歸于知遠知遠處之太原東山及嵐石之間帥讀曰率處昌呂翻嵐盧含翻表承福領大同節度使雲州大同軍時已屬契丹為劉知遠殺白承福張本始安重榮移檄諸道云與吐谷渾達靼契苾同起兵既而承福降知遠達靼契苾亦莫之赴靼當割翻重榮勢大沮沮在呂翻閩主曦即皇帝位王延政自稱兵馬元帥閩同平章事李敏卒書閩同平章事以別他國之相帝之發大梁也和凝請曰車駕已行安從進若反何以備之帝曰卿意如何凝請密留空名宣敕十數通宣出於樞密院敕出於中書門下時並樞密院於中書空苦貢翻聞變則書諸將名遣擊之帝從之十一月從進舉兵攻鄧州唐州刺史武延翰以聞九域志襄陽北至鄧州一百七十八里東北至唐州一百五十里漢有葉縣中廢隋復置葉縣唐屬汝州九域志在州東南一百四十里葉式涉翻本突厥思讓幽州人也厥九勿翻丁丑以西京留守高行周為南面軍前都部署前同州節度使宋彥筠副之張從恩監焉又以郭金海為先鋒使陳思讓監焉監古銜翻彥筠滑州人也庚辰以鄴都留守李德珫權東京留守召鄭王重貴如鄴都安從進攻鄧州威勝節度使安審暉據牙城拒之鄧州牙城也癸未從進至花山九域志唐州湖陽縣有花山銀場今按花山在湖陽北不意其至之速合戰大敗從恩獲其子牙內都指揮使弘義從進以數十騎奔還襄州嬰城自守唐主性節儉常躡蒲屨盥頮用鐵盎躡尼輒翻織蒲為屨江淮之人多能之頮呼內翻澡手為盥滌面為頮暑則寢於青葛帷左右使令惟老醜宮人服飾粗略粗讀曰粗死國事者章十二行本者下有雖士卒三字乙十一行本同孔本同皆給祿三年分遣使者按行民田以肥瘠定其稅行下孟翻民間稱其平允自是江淮調兵興役及他賦斂皆以稅錢為率調徒釣翻斂力贍翻至今用之唐主勤於聽政以夜繼晝還自江都不復宴樂頗傷躁急復扶又翻樂音洛躁則到翻內侍王紹顏上書以為今春以來㣥臣獲罪者衆中外疑懼唐主手詔釋其所以然令紹顏告諭中外十二月丙戌朔徙鄭王重貴為齊王充鄴都留守以李德珫為東都留守丁亥以高行周知襄州行府事詔荊南湖南共討襄州高從誨遣都指揮使李端將水軍數千至南津漢水南津也仍各運糧以饋之少敵佶之子也張佶與楚王馬殷同起事者也少詩沼翻艦戶黯翻艘蘇遭翻佶其吉翻安重榮聞安從進舉兵反謀遂決大集境內飢民衆至數萬南向鄴都聲言入朝初重榮與深州人趙彥之俱為散指揮使相得歡甚散悉亶翻二年安重榮始帥鎮州重榮待遇甚厚使彥之招募黨衆然心實忌之及舉兵止用為排陳使陳讀曰陳彥之恨之帝聞重榮反壬辰遣護聖等馬步三十九指揮擊之以天平節度使杜重威為招討使安國節度使馬全節副之前永清節度使王清章十二行本清作周乙十一行本同退齋校同為馬步都虞候安從進遣其弟從貴將兵逆均州刺史蔡行遇行遇者安從進巡內刺史時蓋以兵援襄陽故遣弟逆之敗之獲從貴斷其足而歸之敗補邁翻斷音短戊戌杜重威與安重榮遇於宗城西南九域志宗城縣在魏州之西北一百七十里官軍再擊之不動重威懼欲退指揮使宛丘王重胤曰兵家忌退退則敵得而乘之或士卒因退而潰亂故忌之陳讀曰陳請公分鋭士擊其左右翼重胤為公以契丹直衝其中軍為于偽翻彼必狼狽重威從之鎮人陳稍卻趙彥之卷旗策馬來降彥之以銀飾鎧胄及鞍勒官軍殺而分之重榮聞彥之叛大懼退匿於輜重中重直用翻官軍從而乘之鎮人大潰斬首萬五千級重榮收餘衆走保宗城官軍進攻夜分拔之重榮以十餘騎走還鎮州嬰城自守會天寒鎮人戰及凍死者二萬餘人契丹聞重榮反乃聽楊彥詢還是年九月楊彥詢使契丹庚子冀州刺史張建武等取趙州冀趙二州皆安重榮巡屬漢主寢疾有胡僧謂漢主名龔不利漢主自造龑字名之義取飛龍在天易曰飛龍在天利見大人庚戌制以錢弘佐為鎮海鎮東軍節度使兼中書令吳越國王鄧廣銘標點聶崇岐覆校
