body:
  text: 資治通鑑卷第六十七翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣司馬光奉敕編集後學天台音註漢紀五十九建安十九年孝獻皇帝壬建安十九年甲午二一四建安十九年春馬超從張魯求兵北取涼州魯遣超還圍祁山姜敍章甲十一行本敍下有等字乙十一行本同孔本同告急於夏侯淵諸將議欲須魏公操節度淵曰公在鄴反覆四千里比報敍等必敗非救急也比必寐翻遂行使張郃督步騎五千為前軍郃古合翻又曷閤翻超敗走韓遂在顯親顯親縣屬漢陽郡班志無之蓋光武所置以封竇友賢曰顯親故城在今秦州成紀縣東遂走淵追至略陽城去遂三十餘里諸將欲攻之或言當攻興國氐魏略曰建安中興國氐王阿貴百頃氐王千萬各有部落萬餘從馬超為亂超破之後阿貴為夏侯淵所攻滅千萬南入蜀遂兵精興國城固攻不可卒拔不如擊長離諸羌水經註瓦亭水南逕隴西成紀縣東歷長離川謂之長離水燒當等羌居之卒讀曰猝必歸救其家若捨羌獨守則孤謂遂若捨羌而不救獨擁兵自守則其勢孤必可虜也淵乃留督將守輜重重直用翻自將輕兵到長離攻燒羌屯遂果救長離諸將見遂兵衆欲結營作塹乃與戰塹七豔翻淵曰我轉鬬千里今復作營塹則士衆罷敝不可復用復扶又翻罷讀曰疲賊雖衆易與耳易以豉翻乃鼓之大破遂軍進圍興國氐王千萬奔馬超餘衆悉降轉擊高平屠各皆破之屠直如翻建安十九年三月詔魏公操位在諸侯王上改授金璽赤紱遠游冠漢制諸侯王金印赤紱遠游冠董巴曰遠游冠制如通天高九寸正豎頂少邪乃直下為鐵卷梁有展筩橫之於前無山述建安十九年夏四月旱五月雨水建安十九年初魏公操遣廬江太守朱光屯皖皖戶板翻大開稻田呂蒙言於孫權曰皖田肥美若一收孰彼衆必增收孰謂稻成熟而收之也有糧則可以增衆孰古熟字通閏月權親攻皖城諸將欲作土山添攻具呂蒙曰治攻具及土山必歷日乃成治直之翻城備既脩外救必至不可圖也且吾乘雨水以入若留經日水必向盡還道艱難蒙竊危之今觀此城不能甚固以三軍銳氣四面並攻不移時可拔及水以歸全勝之道也權從之蒙薦甘寧為升城督寧手持練身緣城為士卒先蒙以精銳繼之手執枹鼓枹音膚士卒皆騰踊侵晨進攻食時破之獲朱光及男女數萬口既而張遼至夾石夾石在今安慶府桐城縣北四十七里今名西峽山乃退權拜呂蒙為廬江太守守式又翻還屯尋陽建安十九年諸葛亮留關羽守荊州與張飛趙雲將兵泝流克巴東譙周巴記曰初平六年趙韙分巴郡安漢以下為永寧郡建安六年劉璋以永寧為巴東郡唐夔州開州之地也破巴郡太守嚴顏生獲之飛呵顏曰呵虎何翻大軍既至何以不降而敢拒戰顏曰卿等無狀侵奪我州我州但有斷頭將軍無降將軍也降戶江翻下同我州謂益州也飛怒令左右牽去斫頭顏容止不變曰斫頭便斫頭何為怒邪飛壯而釋之引為賓客分遣趙雲從外水定江陽犍為江陽縣本屬犍為郡劉璋分立江陽郡唐為瀘州犍為郡唐為資簡嘉眉之地今渝州亦漢巴郡地也對二水口右則涪內水左則蜀外水自渝上合州至綿州者謂之內水自渝上戎瀘至蜀者謂之外水犍居言翻譙周巴記建安六年劉璋分巴郡墊江以上為巴西德陽縣屬廣漢郡唐遂州地劉備圍雒城且一年龐統為流矢所中卒法正牋與劉璋為陳形勢強弱中竹仲翻卒子恤翻為于偽翻且曰左將軍從舉兵以來舊心依依實無薄意蓋時人以璋倚備為用備反襲璋議備之薄也以保尊門尊門謂璋家門雒城潰備進圍成都諸葛亮張飛趙雲引兵來會馬超知張魯不足與計事又魯將楊昂等數害其能超內懷於邑數所角翻師古曰於邑短氣貌讀並如字又於音烏邑音烏合翻備使建寧督郵李恢往說之蜀志後主建興三年改益州郡為建寧郡恢此時蓋為益州郡督郵史因後改郡名而書之耳說輸芮翻下同密書請降於備備使人止超而潛以兵資之超到令引軍屯城北城中震怖怖普布翻備圍城數十日使從事中郎涿郡簡雍入說劉璋簡姓也魯有大夫簡叔蜀志曰簡雍姓耿後音訛為簡穀帛支一年吏民咸欲死戰璋言父子在州二十餘年靈帝中平五年劉焉牧益州至是二十七年百姓攻戰三年肌膏草野者以璋故也膏古報翻何心能安遂開城與簡雍同輿出降降戶江翻㣥下莫不流涕備遷璋于公安盡歸其財物佩振威將軍印綬曹公先加璋振威將軍故仍佩其印綬備入成都置酒大饗士卒取蜀城中金銀分賜將士還其穀帛凡城中公私所有金銀悉取以分賜將士至於穀帛則各還所主也以軍師中郎將諸葛亮為軍師將軍益州太守此益州太守非漢武帝所開置之益州郡也武帝所置之益州郡劉蜀為南中地宅蓋劉璋置益州太守與蜀郡太守並治成都郭下並署左將軍府事署府事者總錄軍府事也晉百官志四平立於喪亂謂平東平西平南平北四將軍也裨將軍南陽黃忠為討虜將軍從事中郎麋竺為安漢將軍漢大將軍府有從事中郎職參謀議北海孫乾為秉忠將軍安漢昭德秉忠皆備所置將軍號也長知兩翻汝南許靖為左將軍長史龐羲為司馬龐皮江翻李嚴為犍為太守犍居言翻費觀為巴郡太守費父沸翻山陽伊籍為從事中郎零陵劉巴為西曹掾掾俞絹翻廣漢彭羕為益州治治中從事羕餘亮翻初董和在郡清儉公直為民夷所愛信蜀中推為循吏故備舉而用之備之自新野奔江南也事見六十五卷十三年而劉巴獨北詣魏公操操辟為掾遣招納長沙零陵桂陽會備略有三郡巴事不成欲由交州道還京師時諸葛亮在臨蒸沈約曰吳立衡陽郡臨蒸縣屬焉蓋吳所置也水經註蒸水出衡陽重安縣西邵陵縣界耶薑山東北流過臨蒸縣北東注于湘謂之蒸口巴不從備深以為恨巴遂自交趾入蜀依劉璋及璋迎備巴諫曰備雄人也入必為害既入巴復諫曰復扶又翻若使備討張魯是放虎於山林也璋不聽巴閉門稱疾備攻成都令軍中曰有害巴者誅及三族及得巴甚喜是時益州郡縣皆望風景附獨黃權閉城堅守須璋稽服乃降稽音啟言稽顙服從也降戶江翻下同於是董和黃權李嚴等本璋之所授用也璋以和為益州太守權為府主簿嚴為護軍璋之婚親也璋兄瑁娶吳懿妹璋母費氏璋之所擯棄也羕仕益州不過書佐人毀之於璋髡鉗為徒隸宿昔之所忌恨也備皆處之顯任處昌呂翻盡其器能有志之士無不競勸益州之民是以大和初劉璋以許靖為蜀郡太守成都將潰靖謀踰城降備備以此薄靖不用也法正曰天下有獲虛譽而無其實者許靖是也許靖與弟劭並有高名汝南月旦評二人者為之也主公之稱始於東都改明公稱主公尊事之為主也不可戶說不可戶戶而說之也說如字以慰遠近之望備乃禮而用之成都之圍也備與士衆約若事定府庫百物孤無預焉及拔成都士衆皆捨干戈赴諸藏藏徂浪翻競取寶物軍用不足備甚憂之劉巴曰此易耳易以豉翻但當鑄直百錢直百錢一錢直百也杜佑曰蜀鑄直百錢文曰直百亦有勒為五銖者大小稱兩如一焉並徑七分重四銖令吏為官市備從之數月之間府庫充實時議者欲以成都名田宅分賜諸將趙雲曰霍去病以匈奴未滅無用家為事見十九卷武帝元狩四年未可求安也須天下都定各反桑梓都定猶言皆定也桑梓謂其故鄉祖父之所樹者詩云維桑與梓必恭敬止乃其宜耳益州人民初罹兵革田宅皆可歸還令安居復業然後可役調調徒弔翻得其歡心不宜奪之以私所愛也備從之備之襲劉璋也留中郎將南郡霍峻守葭萌城張魯遣楊昂誘峻求共守城峻曰小人頭可得城不可得昂乃退後璋將扶禁向存等帥萬餘人由閬水上扶姓禁名帥讀曰率閬水即西漢水禹貢所謂嶓冢導漾東流為漢者也水經註漾水出隴西氐道縣嶓冢山謂之西漢水東南至廣漢白水縣西又東南至葭萌縣又東南過巴郡閬中縣與閬水會水出閬陽縣而東逕其縣南又東注漢水昔劉璋攻霍峻於葭萌也自此水上又東南入漢州江津縣東南入于江余據此水今謂之嘉陵江且一年峻城中兵纔數百人伺其怠隙選精銳出擊大破之斬存伺相吏翻備既定蜀乃分廣漢為梓潼郡唐梓州之地宋白曰綿州巴西縣本漢涪縣屬廣漢郡華陽國志漢元初二年廣漢自繩鄉移治涪後治雒劉備立梓潼郡以縣屬焉隋改為巴西縣唐梓州治郪天寶方改為梓潼郡法正外統都畿備都成都以蜀郡為都畿一餐之德睚眦之怨無不報復餐千安翻睚五懈翻眦士懈翻亶殺毀傷己者數人或謂諸葛亮曰法正太縱橫橫戶孟翻將軍宜啟主公抑其威福亮曰主公之在公安也北畏曹操之強東憚孫權之逼近則懼孫夫人生變於肘腋事見上卷十四年令翻然翱翔不可復制謂迎備入益州也復扶又翻使不得少行其意邪法正字孝直少詩沼翻諸葛亮佐備治蜀頗尚嚴峻人多怨歎者治直之翻法正謂亮曰昔高祖入關約法三章秦民知德事見九卷高帝元年跨據一州初有其國未垂惠撫且客主之義宜相降下下遐稼翻願緩刑弛禁以慰其望以亮等初至為客益州人士則主也君知其一未知其二秦以無道政苛民怨匹夫大呼呼火故翻天下土崩高祖因之可以弘濟弘大也自焉以來焉璋父也文法羈縻互相承奉德政不舉威刑不肅蜀土人士專權自恣君臣之道漸以陵替寵之以位位極則賤順之以恩恩竭則慢所以致敝實由於此吾今威之以法法行則知恩限之以爵爵加則知榮榮恩並濟上下有節為治之要於斯而著矣孔子曰政寬則濟之以猛孔明其知之治直吏翻劉備以零陵蔣琬為廣都長長知兩翻備嘗因游觀奄至廣都見琬衆事不治時又沈醉沈持林翻沈醉言為酒所沈滯也備大怒將加罪戮諸葛亮請曰蔣琬社稷之器非百里之才也其為政以安民為本不以脩飾為先願主公重加察之重直用翻言再三加察也備雅敬亮乃不加罪倉卒但免官而已建安十九年秋七月魏公操擊孫權留少子臨菑侯植守鄴少詩照翻考異曰植傳云太祖戒之曰吾昔為頓丘令年二十三思此時所行無悔於今今汝年亦二十三矣又云植太和六年薨年三十一按植今年年二十三則死時當年四十一矣本傳誤也操為諸子高選官屬為于偽翻以邢顒為植家丞顒防閑以禮無所屈橈顒魚容翻防隄也閑闌也防以制水閑以制獸皆禁止之義也橈奴教翻由是不合庶子劉楨美文辭植親愛之漢制列侯置家丞庶子各一人主侍侯使理家事楨音貞君侯採庶子之春華忘家丞之秋實為上招謗其罪不小愚實懼焉建安十九年魏尚書令荀攸卒攸深密有智防智以料事防以保身常謀謨帷幄時人及子弟莫知其所言操嘗稱荀文若之進善不進不休荀公達之去惡不去不止去惡之去羌呂翻荀彧字文若荀攸字公達又稱二荀令之論人久而益信吾沒世不忘彧為漢尚書令攸為魏尚書令建安十九年初枹罕宋建因涼州亂自號河首平漢王枹罕縣前漢屬金城郡後漢屬隴西郡枹音膚賜支河首在金城河關之西建自以居河上流故以為號置百官三十餘年冬十月魏公操使夏侯淵自興國討建圍枹罕拔之斬建淵別遣張郃等渡河入小湟中湟水源出西海鹽池之西北東至金城允吾縣入河夾湟兩岸之地通謂之湟中又有湟中城在西平張掖之間小月氏之地也故謂之小湟中降戶江翻隴右平建安十九年帝自都許以來守位而已左右侍衞莫非曹氏之人者議郎趙彥常為帝陳言時策魏公操惡而殺之為于偽翻惡烏路翻操後以事入見殿中帝不任其懼見賢遍翻下同任音壬勝也不任猶言不勝也因曰君若能相輔則厚不爾幸垂恩相捨操失色俛仰求出舊儀三公領兵朝見令虎賁執刃挾之以其領兵懼其為變故防之也朝直遙翻下同見賢遍翻顧左右汗流浹背浹即協翻自後不復朝請復扶又翻董承女為貴人操誅承求貴人殺之帝以貴人有姙姙如林翻孕也累為請不能得為于偽翻伏皇后由是懷懼乃與父完書言曹操殘逼之狀賊人者謂之殘逼言其逼上也完不敢發至是事乃泄董承誅事見六十三卷五年十一月使御史大夫郗慮持節策收皇后璽綬郗丑之翻璽斯氏翻綬音受以尚書令華歆為副勒兵入宮收后后閉戶藏壁中歆壞戶發壁就牽后出華子魚有名稱於時與邴原管寧號三人為一龍歆為龍頭原為龍腹寧為龍尾歆所為乃爾邴原亦為操爵所縻高尚其事獨管寧耳當時頭尾之論蓋以名位言也嗚呼壞音怪引慮於坐坐徂臥翻后被髮徒跣行泣過訣曰不能復相活邪被皮義翻復扶又翻帝曰我亦不知命在何時顧謂慮曰郗公漢御史大夫三公也故以呼之遂將后下暴室以幽死下遐稼翻所生二皇子皆酖殺之兄弟及宗族死者百餘人建安十九年十二月魏公操至孟津建安十九年操以尚書郎高柔為理曹掾理曹漢公府無之蓋操所置掾俞絹翻考竟其妻子考覈而窮竟之也操欲更重其刑幷及父母兄弟柔啟曰士卒亡軍誠在可疾疾惡也書曰爾毋忿疾于頑愚謂乃宜貸其妻子一可使誘其還心誘音酉正如前科固已絕其意望而猥復重之復扶又翻下同柔恐自今在軍之士見一人亡逃誅將及己亦且相隨而走不可復得殺也此重刑非所以止亡乃所以益走耳操曰善即止不殺二十年二十年春正月甲子立貴人曹氏為皇后魏公操之女張女上脫中字也二十年三月魏公操自將擊張魯將自武都入氐武都本白馬氐所居之地武帝開以為郡塞悉則翻遣張郃朱靈等攻破之郃古合翻又曷閤翻夏四月操自陳倉出散關至河池陳倉縣屬右扶風唐岐州寶雞縣是大散關在其西南河池縣屬武都郡余據大散關在今鳳州梁泉縣恃險不服五月攻屠之西平金城諸將麴演蔣石等共斬送韓遂首漢末分金城為西平郡二十年初劉備在荊州周瑜甘寧等數勸孫權取蜀數所角翻權遣使謂備曰使疏吏翻劉璋不武不能自守若使曹操得蜀則荊州危矣今欲先攻取璋次取張魯一統南方雖有十操無所憂也備報曰益州民富地險劉璋雖弱足以自守今暴師於蜀漢轉運於萬里欲使戰克攻取舉不失利此孫吳所難也孫吳謂孫武吳起也謂其力屈無復遠念復扶又翻今操三分天下已有其二將欲飲馬於滄海觀兵於吳會吳會謂吳地為一都會會讀如字一說吳會謂吳會稽二郡之地會音工外翻而同盟無故自相攻伐借樞於操樞者門戶所由以運動也言操欲搖動吳蜀而未得其樞若自相攻伐是借之以可動之樞也非長計也且備與璋託為宗室冀憑威靈以匡漢朝朝直遙翻今璋得罪於左右備獨悚懼非所敢聞願加寬貸權不聽遣孫瑜率水軍住夏口備不聽軍過謂瑜曰汝欲取蜀吾當被髮入山不失信於天下也言宗室被攻而不能救無面目以立於天下也被皮義翻張飛屯秭歸秭歸縣屬南郡唐之歸州南郡本治江陵吳得荊州置南郡於江南晉平吳以江陵為南郡以江南之南郡為南平郡亮所據蓋江南之南郡也孱應劭音踐師古士連翻權不得已召瑜還及備西攻劉璋權曰猾虜乃敢挾詐如此備留關羽守江陵魯肅與羽鄰界羽數生疑貳肅常以歡好撫之數所角翻好呼到翻及備已得益州權令中司馬諸葛瑾從備求荊州諸郡時權署置諸將有別部司馬則中司馬者蓋中軍司馬也瑾自長史轉中司馬位任蓋不輕矣瑾渠吝翻曰吾方圖涼州涼州定乃盡以荊州相與耳權曰此假而不反乃欲以虛辭引歲也謂延引歲時也孟子曰久假而不歸焉知其非有也長知兩翻關羽盡逐之權大怒遣呂蒙督兵二萬以取三郡蒙移書長沙桂陽皆望風歸服惟零陵太守郝普城守不降降戶江翻下同劉備聞之自蜀親至公安遣關羽爭三郡孫權進住陸口為諸軍節度使魯肅將萬人屯益陽以拒羽益陽縣屬長沙郡應劭曰在益水之陽輿地志今潭州安化縣本漢益陽縣杜佑曰潭州益陽縣漢故城在今縣東宋白曰益陽故城在今益陽縣東八十里其城魯肅所築使捨零陵急還助肅蒙得書祕之夜召諸將授以方略晨當攻零陵顧謂郝普故人南陽鄧玄之曰郝子太聞世間有忠義事亦欲為之而不知時也郝普字子太郝呼各翻關羽在南郡至尊身自臨之彼方首尾倒縣縣讀曰懸救死不給豈有餘力復營此哉今吾計力度慮而以攻此復扶又翻度徒洛翻下同曾不移日而城必破城破之後身死何益於事而令百歲老母戴白受誅豈不痛哉度此家不得外問此家謂郝普也故至於此耳君可見之為陳禍福為于偽翻玄之見普具宣蒙意普懼而出降蒙迎執其手與俱下船語畢出書示之因拊手大笑普見書知備在公安而羽在益陽慙恨入地蒙留孫河委以後事考異曰按孫河已死或他人同姓名耳魯肅欲與關羽會語諸將疑恐有變議不可往肅曰今日之事宜相開譬劉備負國是非未決羽亦何敢重欲干命乃邀羽相見各駐兵馬百步上但諸將軍單刀俱會肅因責數羽以不返三郡數所具翻羽曰烏林之役左將軍身在行間戮力破敵即謂赤壁之戰也行戶剛翻無一塊土而足下來欲收地邪塊苦潰翻肅曰不然始與豫州覲於長阪事並見六十五卷十三年校戶教翻計窮慮極志勢摧弱圖欲遠竄謂欲投吳巨也主上矜愍豫州之身無有處所不愛土地士民之力使有所庇蔭以濟其患而豫州私獨飾情愆德墮好私獨謂私其一己之所獨也墮讀曰隳好呼到翻下同謂得益州有以藉手也斯蓋凡夫所不忍行而況整領人物之主乎羽無以答會聞魏公操將攻漢中考異曰備傳云曹公定漢中孫權傳云入漢中按操以七月入漢中備未應即聞之而八月權已攻合肥蓋聞曹公兵始欲向漢中即引兵還耳使使求和於權權令諸葛瑾報命更尋盟好遂分荊州以湘水為界長沙江夏桂陽以東屬權南郡零陵武陵以西屬備班志湘水出零陵陽海山至酃入江過郡二行二千五百三十里吳蜀分荊州長沙桂陽零陵武陵以湘水為界耳南郡江夏各自依其郡界夏戶雅翻使疏吏翻與其弟亮但公會相見退無私面二十年秋七月魏公操至陽平水經註濜水發武都氐中南逕張魯城東城因崤嶺周迴五里東臨峻谷杳然百尋西北二面連峯接崖莫究其極從南為盤道登陟二里有餘庾仲雍謂山為白馬塞東對白馬城一名陽平關濜水南流入沔謂之濜口或曰陽平關即今興元百牢關是也杜佑曰陽平關在漢中褒城縣西北降戶江翻下同其弟衞不肯率衆數萬人拒關堅守橫山築城十餘里初操承涼州從事及武都降人之辭說張魯易攻易以豉翻陽平城下南北山相遠遠于願翻不可守也信以為然及往臨履不如所聞乃歎曰他人商度度徒洛翻少如人意少詩沼翻攻陽平山上諸屯山峻難登既不時拔士卒傷夷者多軍食且盡操意沮便欲拔軍截山而還沮在呂翻截山者防其追尾也還從宣翻又如字下同遣大將軍夏侯惇將軍許褚呼山上兵還會前軍夜迷惑誤入張衞別營營中大驚退散侍中辛毗主簿劉曄等在兵後語惇褚語牛倨翻言官兵已據得賊要屯賊已散走猶不信之惇前自見乃還白操進兵攻衞衞等夜遁考異曰武帝紀曰公至陽平張魯使弟衞等據關攻之不拔乃引還賊守備解散公乃密遣解等乘險夜襲大破之劉曄傳曰太祖欲還令曄督後諸軍曄策魯可克馳白太祖不如致攻遂進兵魯乃奔走郭頒世語魯遣五官掾降弟衞拒王師不得進魯走巴中軍糧盡太祖將還西曹掾郭諶曰魯已降留使既未反衞雖不同偏攜可攻縣軍深入以進必克退必不免太祖疑之夜有野麋數千突壞衞營軍大驚高祚等誤與衞衆遇衞以為大軍見掩遂降魏名臣奏載楊暨表曰武皇帝征張魯以十萬之衆身親臨履張衞之守蓋不足言地險守易雖有精兵虎將勢不能施對兵三日欲抽軍還天祚大魏魯守自壞因以定之又載董昭表其承涼州以下皆昭表所述必得實今從之張魯聞陽平已陷欲降閻圃曰今以迫往功必輕不如依杜濩赴朴胡杜濩賨邑侯也朴胡巴七姓夷王也余據板楯蠻渠帥有羅朴督鄂度夕龔七姓不輸租賦此所謂七姓夷王也其餘戶歲入賨錢口四十故有賨侯孫盛曰朴音浮濩音戶然後委質質如字乃奔南山入巴中今興元府古漢中之地也興元之南有大行路通於巴州其路險峻三日而達于山頂其絕高處謂之孤雲兩角去天一握孤雲兩角二山名也今巴州漢巴郡宕渠縣之北界也三巴之地此居其中謂之中巴巴之北境有米倉山下視興元實孔道也魯曰本欲歸命國家而意未得達今之走避銳鋒非有惡意寶貨倉庫國家之有遂封藏而去操入南鄭南鄭縣漢中郡治所又以魯本有善意遣人慰喻之丞相主簿司馬懿言於操曰劉備以詐力虜劉璋蜀人未附而遠爭江陵此機不可失也今克漢中益州震動進兵臨之勢必瓦解聖人不能違時亦不可失時也操曰人苦無足既得隴復望蜀邪光武詔岑彭等曰人苦不知足既得隴復望蜀劉備人傑也有度而遲得蜀日淺蜀人未恃也今破漢中蜀人震恐其勢自傾以公之神明因其傾而壓之無不克也若少緩之諸葛亮明於治國而為相關羽張飛勇冠三軍而為將少詩沼翻治直之翻相息亮翻冠古玩翻將即亮翻下同蜀民既定據險守要則不可犯矣今不取必為後憂操不從居七日蜀降者說蜀中一日數十驚守將雖斬之而不能安也考異曰劉曄傳云備雖斬之按備傳云備下公安聞曹公定漢中乃還如此則備時猶在公安也今尚可擊不不讀曰否曄曰今已小定未可擊也七日之間何以遽謂之小定曄蓋窺覘備之守蜀有不可犯者故為此言以對操焉耳以夏侯淵為都護將軍都護將軍以盡護諸將而立號光武始以命賈復以丞相長史杜襲為駙馬都尉留督漢中事襲綏懷開導百姓自樂出徙洛鄴者八萬餘口樂音洛二十年八月孫權率衆十萬圍合肥時張遼李典樂進將七千餘人屯合肥魏公操之征張魯也為教與合肥護軍薛悌署函邊曰賊至乃發及權至發教教曰若孫權至者張李將軍出戰樂將軍守護軍勿得與戰操以遼典勇銳使之戰樂進持重使之守薛悌文吏也使勿得與戰疑之張遼曰公遠征在外比救至彼破我必矣比必寐翻是以教指及其未合逆擊之折其盛勢以安衆心然後可守也進等莫對遼怒曰成敗之機在此一戰諸君若疑遼將獨決之欲獨出戰也慨然曰此國家大事顧君計何如耳吾可以私憾而忘公義乎請從君而出於是遼夜募敢從之士得八百人椎牛犒饗犒苦到翻明旦遼被甲持戟先登陷陳殺數十人斬二大將大呼自名陳讀曰陣呼火故翻衝壘入至權麾下權大驚不知所為走登高冢以長戟自守遼叱權下戰權不敢動望見遼所將衆少乃聚圍遼數重少詩沼翻重直龍翻遼急擊圍開將麾下數十人得出餘衆號呼曰將軍棄我乎號戶高翻遼復前章甲十一行本前作還乙十一行本同退齋校同突圍拔出餘衆復扶又翻下同權人馬皆披靡無敢當者披普靡翻自旦戰至日中吳人奪氣乃還脩守備衆心遂安權守合肥十餘日城不可拔徹軍還兵皆就路權與諸將在逍遙津北水經註合肥東有逍遙津水上舊有梁覘丑廉翻又丑艷翻即將步騎奄至甘寧與呂蒙等力戰扞敵凌統率親近扶權出圍復還與遼戰左右盡死身亦被創度權已免乃還被皮義翻創初良翻度徒洛翻權乘駿馬上津橋上時掌翻橋南已徹丈餘無板親近監谷利在馬後親近監官也谷姓也利名也江表傳曰谷利者本左右給使也以謹直為親近監控即馬鞚著陟略翻遂得超渡賀齊率三千人在津南迎權權由是得免權入大船宴飲賀齊下席涕泣曰至尊人主常當持重今日之事幾致禍敗㣥下震怖幾居希翻怖普布翻若無天地願以此為終身之誡權自前收其淚曰大慙權慙謝賀齊也非但書紳也論語子張問於孔子以孔子之言書諸紳故以答賀齊二十年九月巴賨夷帥朴胡杜濩任約各舉其衆來附賨臧宗翻帥所類翻於是分巴郡以胡為巴東太守濩為巴西太守約為巴郡太守皆封列侯後三人皆為劉備所破二十年冬十月始置名號侯以賞軍功魏書曰置名號爵十八級關中侯爵十七級皆金印紫綬又置關內外侯十六級銅印龜紐墨綬皆不食租裴松之曰今之虛封蓋自此始二十年十一月張魯將家屬出降降戶江翻下同魏公操逆拜魯鎮南將軍待以客禮封閬中侯賢曰閬中縣屬巴郡今隆州余據隆州後避唐玄宗諱改為閬州杜佑曰閬中今閬州城閬音浪封魯五子及閻圃等皆為列侯習鑿齒論曰閻圃諫魯勿王事見六十四卷建安六年將來之人孰不思順塞其本源而末流自止塞悉則翻其此之謂歟若乃不明於此而重焦爛之功此引前書徐福焦頭爛額事見二十五卷漢宣帝地節四年則民利於有亂俗競於殺伐阻兵杖力杖除兩翻干戈不戢矣曹公之此封可謂知賞罰之本矣二十年程銀侯選龐惪皆隨魯降程銀侯選關中部帥也龐惪馬超將也渭南冀城之敗皆奔張魯惪古德字拜惪立義將軍二十年張魯之走巴中也黃權言於劉備曰若失漢中則三巴不振此為割蜀之股臂也三巴巴東巴西巴郡也率諸將迎魯魯已降權遂擊朴胡杜濩任約破之魏公操使張郃督諸軍徇三巴欲徙其民於漢中進軍宕渠宕渠縣本屬巴郡時屬巴西郡賢曰宕渠故城在今渠州流江縣東北杜佑曰俗號車騎城是也宋白曰宕渠城漢車騎將軍馮緄增修俗名車騎城師古曰宕音徒浪翻五十餘日飛襲擊郃大破之郃走還南鄭備亦還成都操徙出故韓遂馬超等兵五千餘人使平難將軍殷署等督領平難將軍曹氏所置難乃旦翻操使儼發千二百兵助漢中守禦殷署督送之行者不樂樂音洛儼護送至斜谷口斜余遮翻谷音浴又古祿翻還未至營署軍叛亂儼自隨步騎百五十人皆叛者親黨也聞之各驚被甲持兵被皮義翻不復自安復扶又翻儼徐喻以成敗慰勵懇切皆慷慨曰死生當隨護軍不敢有二前到諸營各召料簡諸姦結叛者料音聊量度也理也八百餘人散在原野儼下令惟取其造謀魁率治之率讀曰帥所類翻治直之翻餘一不問郡縣所收送皆放遣乃即相率還降儼密白宜遣將詣大營大營謂操營也將讀如字送也魏公操遣將軍劉柱將二千人往當須到乃發遣俄而事露諸營大駭不可安諭不可以言語諭之使安帖也當差留新兵之溫厚者千人鎮守關中差初皆翻擇也其餘悉遣東遣之東赴操營立差別之主者主兵籍者也差初皆翻擇也又初加翻言以等差別異之也別彼列翻分也異也與儼同心其當去者亦不敢動儼一日盡遣上道上時掌翻因使所留千人分布羅落之分布於行者之間羅列而遮落之也東兵劉柱所將之兵也復扶又翻幷徙千人令相及共東凡所全致二萬餘口二十一年二十一年春二月魏公操還鄴二十一年夏五月進魏公操爵為王初中尉崔琰薦鉅鹿楊訓於操中尉秦官漢因之至武帝改為執金吾今操復置中尉實則漢執金吾之職也及操進爵訓發表稱頌功德或笑訓希世浮偽謂琰為失所舉琰從訓取表草視之與訓書曰省表事佳耳省悉景翻時乎時乎會當有變時琰本意譏論者好譴呵而不尋情理也好呼到翻時有與琰宿不平者白琰傲世怨謗意旨不遜以會當有變為意旨不遜收琰付獄髡為徒隸前白琰者復白之云琰為徒對賓客虬須直視虬須卷鬚也直視者目不他矚也復扶又翻下同瞋昌真翻怒目也遂賜琰死尚書僕射毛玠傷琰無辜心不悅人復白玠怨謗操收玠付獄侍中桓階和洽皆為之陳理為于偽翻操不聽階求按實其事王曰言事者白玠不但謗吾也乃復為崔琰觖望觖有二音音窺瑞翻者望也言有所覬望也音古穴翻者怨望也此當從入聲此捐君臣恩義妄為死友怨歎死友言其背公而相為死也為于偽翻洽曰如言事者言玠罪過深重非天地所覆載覆敷又翻臣非敢曲理玠以枉大倫也孟子曰內則父子外則君臣人之大倫也荷下可翻剛直忠公為衆所憚不宜有此然人情難保要宜考覈兩驗其實今聖恩不忍致之于理更使曲直之分不明分扶問翻操曰所以不考欲兩全玠及言事者耳洽對曰玠信有謗主之言當肆之市朝論語子服景伯曰吾力猶能肆諸市朝應劭曰大夫以上尸諸朝士以下尸諸市朝直遙翻言事者加誣大臣以誤主聽不加檢覈臣竊不安操卒不窮治卒子恤翻治直之翻下同玠遂免黜終於家是時西曹掾沛國丁儀用事玠之獲罪儀有力焉㣥下畏之側目尚書僕射何夔及東曹屬東莞徐奕東莞縣屬琅琊國春秋之鄆邑也晉置東莞郡唐密州莒縣即其地也莞姑丸翻儀譖奕出為魏郡太守操既居鄴建安十七年割河內之蕩陰朝歌林慮東郡之衞國頓丘東武陽發干鉅鹿之癭陶曲陽南和廣平之廣平任趙國之襄國邯鄲易陽以益魏郡十八年分置東西都尉此以自相府掾屬補郡為出左右讀曰佐佑尚書傅選謂何夔曰儀已害毛玠子宜少下之夔曰為不義適足害其身焉能害人少詩沼翻下遐稼翻焉於虔翻且懷姦佞之心立於明朝其得久乎為丁儀被誅張本朝直遙翻崔琰從弟林從才用翻嘗與陳㣥共論冀州人士稱琰為首㣥以智不存身貶之林曰大丈夫為有邂逅耳邂下懈翻逅戶茂翻即如卿諸人良足貴乎二十一年五月己亥朔日有食之二十一年代郡烏桓三大人皆稱單于代郡烏桓單于其一曰普廬其二曰無臣氐其三則未之聞也太守不能治魏王操以丞相倉曹屬裴潛為太守漢公府有倉曹有掾有屬主倉穀事潛曰單于自知放橫日久橫戶孟翻今多將兵往必懼而拒境少將則不見憚宜以計謀圖之遂單車之郡單于驚喜潛撫以恩威單于讋服讋質涉翻二十一年初南匈奴久居塞內南匈奴自光武建武二十六年即入居塞內議者恐其戶口滋蔓浸難禁制宜豫為之防秋七月南單于呼廚泉入朝于魏朝直遙翻魏王操因留之於鄴使右賢王去卑監其國監古銜翻下同單于歲給綿絹錢穀如列侯子孫傳襲其號分其衆為五部各立其貴人為帥分為左右前後中五部分居幷州諸郡而監國者居平陽帥所類翻二十一年八月魏以大理鍾繇為相國二十一年冬十月魏王操治兵擊孫權十一月至譙何茲全標點容肇祖聶崇岐覆校
