body:
  text: 資治通鑑卷第二百三十一端明殿學士兼翰林侍讀學士太中大夫提舉西京嵩山崇福宮上柱國河內郡開國公食邑二千二百戶食實封九百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注唐紀四十七德宗神武聖文皇帝六興元元年興元元年甲子七八四興元元年五月鹽鐵判官萬年王紹以江淮繒帛來至萬年京縣屬京兆繒慈陵翻然後御衫始改御夾而御衫衫單衣也將即亮翻滉呼廣翻使疏吏翻羅綺也綾文繒丁度曰古者芒氏初作羅一曰帛之美者今人以絲縷織而交眼者為羅擔都濫翻肩負為擔天子所至為行在所幕僚何士幹請行滉喜曰君能相為行為于偽翻請今日過江士幹許諾歸別家則家之薪米儲偫已羅門庭矣偫直里翻登舟則資裝器用已充舟中矣下至廚籌廚籌當作廁籌章乙十五行本廚正作廁乙十一行本同孔本同無不周備每擔夫與白金一版置腰間史言韓滉強敏精密艘蘇遭翻下同晟成正翻考異曰柳玭敘訓曰上初至梁省奏甚悅又知西平聚兵必乏糧糗命運米百艘按五月初梁州尚未春服月末已克長安梁潤相去數千里詔命豈能遽達乎今不取將佐爭舉之須臾而畢艘置五弩手以為防援有寇則叩舷相警將即亮翻叩擊也船邊曰舷音胡田翻五百弩已彀矣比至渭橋彀居候翻引滿比必利翻及也盜不敢近近其靳翻時關中兵荒米斗直錢五百及滉米至減五之四滉為人強力嚴毅自奉儉素夫人常衣絹裙衣於既翻絹與掾翻縑帛織成而無紋其精善者曰繒俗亦謂之絹破然後易興元元年吐蕃既破韓旻等吐從暾入聲破韓旻見上卷是年四月朱泚使田希鑒厚以金帛賂之吐蕃受之韓遊王褱以聞渾瑊又奏尚結贊屢遣人約刻日共取長安既而不至聞其衆今春大疫近已引兵去泚且禮翻又音此王褱工回翻渾戶昆翻又戶本翻瑊古銜翻考異曰實録舊本紀皆云乙丑渾瑊與蕃將論莽羅衣衆大破朱泚將韓旻等於武功武亭川吐蕃傳亦同邠志曰李懷光竟不署敕結贊亦不進軍又曰渾公出斜谷曹子達赴渾公吐蕃以二萬騎從之既勝泚軍大掠而去泚使田希鑒以金帛賂之蓋尚結贊雖引兵入塞止屯邠南但遺論莽羅衣將偏軍助瑊破泚於武功大掠而去既受泚賂遂引兵歸國瑊於吐蕃歸國之時有此奏耳上以李晟渾瑊兵少少詩沼翻欲倚吐蕃以復京城聞其去甚憂之以問陸贄贄以為吐蕃貪狡有害無益得其引去實可欣賀乃上奏其略曰吐蕃遷延顧望反覆多端深入郊畿陰受賊使使疏吏翻致令㣥帥進退憂虞帥所類翻欲捨之獨前則慮其懷怨乘躡乘其虛躡其後也躡尼輒翻則苦其失信稽延戎若未歸寇終不滅又曰將帥意陛下不見信任且患蕃戎之奪其功士卒恐陛下不恤舊勞而畏蕃戎之專其利賊黨懼蕃戎之勝不死則悉遺人禽遺唯季翻百姓畏蕃戎之來有財必盡為所掠是以順於王化者其心不得不怠陷於寇境者其勢不得不堅又曰今懷光別保蒲絳吐蕃遠避封疆形勢既分腹背無患瑊晟諸帥才力得伸又曰但願陛下慎於撫接勤於砥礪中興大業旬月可期不宜尚眷眷於犬羊之㣥以失將士之情也上復使謂贄曰卿言吐蕃形勢甚善然瑊晟諸軍當議規畫令其進取朕欲遣使宣慰卿宜審細條流章乙十一行本流作疏孔本同以聞條分也流派也賢君選將委任責成故能有功況今秦梁千里秦謂咸陽長安古秦中之地梁謂梁州遙為規畫未必合宜彼違命則失君威從命則害軍事進退羈礙難以成功史照曰羈馬絡頭也礙謂羈所挂礙也余謂贄言羈礙者蓋謂欲進則有所羈而不得進欲退則有所礙而不得退也待以殊常之賞則將帥感悅智勇得伸乃上奏其略曰鋒鏑交於原野而決策於九重之中機會變於斯須而定計於千里之外用捨相礙否臧皆凶易曰師出以律否臧凶王弼注曰齊衆以律失律則散律不可失失律而臧何異於否失令有功法所不赦故師出不以律否臧皆凶陸德明釋文曰否音鄙惡也臧作郎翻善也宓子賤為單父宰請吏於魯侯魯侯使二吏與之俱至單父子賤使吏書而掣其肘書惡則從而怒之二吏歸以告魯侯魯侯曰此謂吾橈其政也兵志曰將軍死綏有前無卻傳聞與指實不同懸算與臨事有異又曰設使其中有肆情干命者陛下能於此時戮其違詔之罪乎是則違命者既不果行罰從命者又未必合宜徒費空言祗勞睿慮匪惟無益其損實多又曰君上之權特異臣下惟不自用乃能用人興元元年癸酉涇王侹薨侹肅宗子音他頂翻興元元年徐海沂密觀察使高承宗卒建中二年李洧以徐州歸國明年以為徐沂密觀察使洧卒高承宗代之甲戌使其子明應知軍事興元元年乙亥李抱真王武俊距貝州三十里而軍朱滔聞兩軍將至急召馬實實晝夜兼行赴之或謂滔曰武俊善野戰不可當其鋒宜徙營稍前逼之使回紇絶其糧道我坐食德棣之餫餫音運糧運曰餫依營而陳陳讀曰陳利則進攻否則入保待其飢疲然後可制也滔疑未決會馬實軍至滔命明日出戰實言軍士冒暑困憊憊音蒲拜翻請休息數日乃戰常侍楊布滔倣天朝置常侍達干曰回紇在國與鄰國戰常以五百騎破鄰國數千騎如掃葉耳今受大王金帛牛酒前後無算思為大王立效為于偽翻下同此其時矣明日願大王駐馬高丘觀回紇為大王翦武俊之騎使匹馬不返為于偽翻布雄曰大王英略蓋世舉燕薊全軍將掃河南清關中今見小敵冘豫不擊冘讀與猶同按後漢書馬援傳計冘豫未決章懷太子賢注曰冘行貌也義見説文豫亦未定也冘音以林翻毛晃曰冘豫不定後漢馬援傳計冘豫未決字從犬曲其足與古尤同與侵韻冘韻不同唐史冘豫音淫誤今從晃失遠近之望將何以成霸業乎達干請戰是也滔喜遂決意出戰丙子旦武俊遣其兵馬使趙琳將五百騎伏於桑林桑林之地在經城西南陳讀曰陳下同武俊引騎兵居前自當回紇回紇縱兵衝之武俊使其騎控馬避之回紇突出其後將還武俊乃縱兵擊之趙琳自林中出橫擊之回紇敗走武俊急追之滔騎兵亦走自踐其步陳步騎皆東奔滔不能制遂走趣其營趣七喻翻下同抱真武俊合兵追擊之時滔引三萬人出戰死者萬餘人逃潰者亦萬餘人滔才與數千人入營堅守會日暮昏霧兩軍不能進抱真軍其營之西北武俊軍其東北滔夜焚營引兵出南門趣德州遁去委棄所掠資財山積兩軍以霧不能追也滔殺楊布蔡雄而歸幽州心既內慙又恐范陽留守劉怦因敗圖己怦普耕翻怦悉發留守兵夾道二十里具儀仗迎之入府相對悲喜時人多之興元元年初張孝忠以易州歸國詔以孝忠為義武節度使以易定滄三州隸之事見二百二十七卷建中三年李惟嶽之妻兄也李惟嶽本姓張故娶李氏孝忠遣押牙安喜程華交其州事安喜縣漢之盧奴縣屬中山國燕主慕容垂改為不連北齊改為安喜隋改為鮮虞唐武德四年復為安喜帶定州將行軍士大譟曰刺史掃府庫之實以行將士於後飢寒奈何遂殺固烈屠其家程華聞亂自竇逃出亂兵求得之請知州事華不得已從之孝忠聞之即版華攝滄州刺史考異曰舊張孝忠傳曰遣華往滄州交檢府藏程日華傳曰孝忠令華詣固烈交郡固烈死孝忠版華知滄州事燕南記曰孝忠差牙官程華與固烈交割固烈死孝忠聞之當日差人送文牒令攝刺史按固烈既去則滄州無主孝忠豈得但令華交檢府藏今從華傳及燕南記推心以待將士將士安之會朱滔王武俊叛更遣人招華更工衡翻迭也華皆不從時孝忠在定州自滄如定必過瀛州瀛隸朱滔道路阻澀澀色立翻史照曰阻隔也澀不通滑也滄州録事參軍李宇説華表陳利害請別為一軍華從之説輸芮翻下同遣宇奉表詣行在上即以華為滄州刺史橫海軍副大使知節度事賜名日華令日華歲供義武租錢十二萬緡王武俊又使人説誘之時軍中乏馬日華紿使者曰王大夫必欲相屬當以二百騎相助武俊給之日華悉留其馬遣其士歸武俊怒而方與馬燧等相拒不能攻取日華由是獲全及武俊歸國日華乃遣人謝過償其馬價且賂之武俊喜復與交好騎奇寄翻好呼到翻興元元年庚寅李晟大陳兵諭以收復京城先是姚令言等屢遣諜人覘晟進軍之期先悉薦翻諜徒協翻覘丑廉翻皆為邏騎所獲邏郎佐翻巡察者也晟引示以所陳兵謂曰歸語諸賊語牛倨翻努力固守勿不忠於賊也皆飲之酒飲於禁翻給錢而縱之遂引兵至通化門外曜武而還還從宣翻又如字賊不敢出晟召諸將問兵所從入皆請先取外城據坊市然後北攻宮闕晟曰坊市狹隘賊若伏兵格鬬居人驚亂非官軍之利也今賊重兵皆聚苑中不若自苑北攻之潰其腹心賊必奔亡如此則宮闕不殘坊市無擾策之上者也諸將皆曰善乃牒渾瑊及鎮國節度使駱元光商州節度使尚可孤刻期集於城下京城之下也壬辰尚可孤敗泚將仇敬忠於藍田西斬之敗補邁翻乙未李晟移軍於光泰門外米倉村光泰門苑城東北門程大昌曰光泰門在通化門北小城之東門門東七里有長樂坡呂大防長安圖光泰門者京城東門大明宮東苑之東丙申晟方自臨築壘泚驍將張庭芝李希倩引兵大至晟謂諸將曰始吾憂賊潛匿不出今來送死此天贊我不可失也命副元帥兵馬使吳詵等縱兵擊之時華州營在北兵少華州兵駱元光之兵華戶化翻少詩沼翻晟命牙前將李演等帥精兵救之演等力戰賊敗走演等追之乘勝入光泰門再戰又破之會夜晟斂兵還賊餘衆走入白華門白華殿門也聞慟哭希倩希烈之弟也丁酉晟復出兵復扶又翻諸將請待西師至夾攻之西師謂渾瑊之師也賊數敗已破膽數所角翻不乘勝取之使其成備非計也賊又出戰官軍屢捷駱元光敗泚衆於滻西敗補邁翻戊戌晟陳兵於光泰門外使李演及牙前兵馬使王佖將騎兵佖蒲必翻牙前將史萬頃將步兵直抵苑牆神麚村按新書李晟傳神麚村在苑北麚古牙翻比演等至比必利翻及也賊已樹柵塞之自柵中刺射官軍塞悉則翻刺七亦翻射而亦翻官軍不得進晟怒叱諸將曰縱賊如此吾先斬公輩矣萬頃懼帥衆先進拔柵而入帥讀曰率下同佖演引騎兵繼之賊衆大潰諸軍分道並入姚令言等猶力戰晟命決勝軍使唐良臣等步騎蹙之且戰且前凡十餘合賊不能支至白華門有賊數千騎出官軍之背晟帥百餘騎回禦之左右呼曰呼火故翻相公來賊皆驚潰涇原將士素畏服李晟故聞其來而驚潰先是泚遣張光晟將兵五千屯九曲先悉薦翻去東渭橋十餘里光晟密輸款於晟及泚敗光晟勸泚出亡泚乃與姚令言帥餘衆西走猶近萬人帥讀曰率近其靳翻光晟送泚出城還降於晟降戶江翻晟遣兵馬使田子奇以騎兵追泚晟屯含元殿前舍於右金吾仗含元殿唐東內之前殿也左金吾仗在殿之東右金吾仗在殿之西晟賴將士之力克清宮禁長安士庶久陷賊庭若小有震驚非弔民伐罪之意晟與公等室家相見非晚五日內無得通家信命京兆尹李齊運等安慰居人晟大將高明曜取賊妓妓渠綺翻女樂也尚可孤軍士亶取賊馬晟皆斬之軍中股栗公私安堵秋毫無犯遠坊有經宿乃知官軍入城者史言李晟御軍嚴整是日渾瑊戴休顏韓遊王褱亦克咸陽敗賊三千餘衆敗補邁翻聞泚西走分兵邀之己亥晟使京西兵馬使孟涉屯白華門尚可孤屯望仙門唐大明宮南面五門其中曰丹鳳門丹鳳之東為望仙門又東為延政門丹鳳之西為建福門又西為興安門也晟以牙前三千人屯安國寺程大昌曰章敬寺在東城之外安國寺在大明宮東南斬泚黨李希倩敬釭彭偃等八人於市興元元年王武俊既破朱滔還恆州表讓幽州盧龍節度使上許之王武俊兼幽州盧龍節度使見上卷是年二月恆戶登翻興元元年六月癸卯李晟遣掌書記吳人于公異作露布上行在上時掌翻曰臣已肅清宮禁祗謁寢園鍾簴不移簴其呂翻説文曰簴鍾鼓之柎也飾為猛獸釋名曰橫曰栒縱曰簴又云虡天上神獸也鹿頭龍身象之為簴以架鍾鼓廟貌如故孔穎達曰廟之言貌也死者精神不可得而見但以生時之宮室象貌為之耳孝經注云宗尊也廟貌也天生李晟以為社稷非為朕也為于偽翻史言于公異為李晟作露布得體晟在渭橋熒惑守歲歲星所在其國有福熒惑守之是為罰星賓佐皆賀曰熒惑退舍皇家之福也宜速進兵晟曰天子野次臣下知死敵而已天象高遠誰得知之既克長安乃謂之曰嚮非相拒也吾聞五星贏縮無常前漢書天文志曰凡五星早出為贏贏為客晚出為縮縮為主人晉書天文志曰失次而上為贏失次而下為縮復扶又翻吾軍不戰自潰矣皆謝曰非所及也興元元年朱泚將奔吐蕃其衆隨道散亡比至涇州比必利翻及也才百餘騎田希鑒閉城拒之泚謂之曰汝之節吾所授也朱泚以田希鑒為涇原節度使見上卷是年四月使焚其門希鑒取節投火中曰還汝節泚衆皆哭涇卒遂殺姚令言詣希鑒降泚獨與范陽親兵及宗族賓客北趣驛馬關趣七喻翻寧州刺史夏侯英拒之至彭原西城屯彭原本彭陽縣隋開皇十八年更名唐屬寧州射而亦翻韓旻等斬之詣涇州降源休李子平奔鳳翔李楚琳斬之皆傳首行在興元元年上命陸贄草詔賜渾瑊使訪求奉天所失裹頭內人裹頭內人在宮中給使令者也內人給使令者皆冠巾故謂之裹頭內人以為巨盜始平疲瘵之民瘡痍之卒尚未循拊瘵仄介翻而首訪婦人非所以副惟新之望也謀始盡善克終已稀始而不謀終則何有所賜瑊詔未敢承旨上遂不降詔竟遣中使求之乙巳詔吏部侍郎班宏充宣慰使勞問將士撫慰蒸黎按詩傳箋蒸衆也黎亦衆也勞力到翻丙午李晟斬文武官受朱泚寵任者崔宣洪經綸等十餘人考異曰袁皓興元聖功録載李晟奏宥郭晞狀曰晞頃因鑾輿順動山谷潛藏逆賊所知舁致城邑迫脅授任前後極多蒼黃之中偽令仍及堅臥當節即懼嚴刑隨俗從官又傷素業然晞已染汚俗尚可昭明子儀勳勞書在王府父為中興之佐子有疑謗之名非止在於一身實恐玷於先烈況臣總領士馬孤立渭橋頻有帛書纍陳誠效按晞舊傳泚欲令掌兵晞陽瘖泚以兵脅之終不語賊知其不可用乃止晞潛奔奉天從駕還京不云終臣事泚而皓載晟此狀恐非其實今不取劉乃事見上卷是年二月蔣沇事見二百二十八卷建中四年己酉以李晟為司徒中書令駱元光尚可孤各遷官有差賞收復京城之功也興元元年詔改梁州為興元府以紀元為府號始此興元元年甲寅以渾瑊為侍中韓遊王褱戴休顏各遷官有差賞扈衛之功也興元元年朱泚之敗也李忠臣奔樊川酈道元水經注曰樊川即杜縣之樊鄉漢高祖還定三秦以樊噲灌廢丘最賜邑於此鄉也按其地在唐長安城南程大昌曰樊川在萬年縣南三十五里丙辰斬之興元元年上問陸贄今至鳳翔有迎駕諸軍形勢甚盛欲因此遣人代李楚琳何如贄上奏以為如此則事同脅執以言乎除亂則不武以言乎務理則不誠用是時巡後將安入書周官六年王乃時巡考制度于四嶽諸侯各朝于方嶽孔安國曰春東夏南秋西冬北故謂之時巡臣竊未諭其理夫權之為義取類權衡衡以平物權則權物之輕重揆之以衡平首行脅奪易一帥而虧萬乘之義得一方而結四海之疑帥讀曰率乘繩證翻乃是重其所輕而輕其所重謂之權也不亦反乎以反道為權以任數為智君上行之必失衆臣下用之必陷身歷代之所以多喪亂而長姦邪由此誤也陸贄此論所以正漢儒反經合道為權之失程氏曰漢儒以反經合道為權故有權變權術之説皆非也權只是經字自漢以下無人識權字喪息浪翻長知兩翻章乙十五行本如下有俟字乙十一行本同孔本同張校同退齋校同奠枕京邑史照曰奠枕安枕也揚子曰奠枕于京彼喜於恩宥將奔走不暇安敢輒有旅拒史照曰旅衆也拒捍也謂率衆以相捍也復扶又翻戊午車駕發漢中興元元年李晟綜理長安以備百司史照曰綜機縷也理治也謂整治其事使皆有紀若機之綜縷也上不許內常侍尹元貞奉使同華輒詣河中招諭李懷光此唐之中世閹宦之常態也華戶化翻元貞矯制亶赦元惡請理其罪理治也避高宗諱以治為理興元元年秋七月丙子車駕至鳳翔斬喬琳蔣鎮張光晟等李晟以光晟雖臣賊而滅賊亦頗有力欲全之上不許興元元年副元帥判官高郢數勸李懷光歸款數所角翻高郢判李懷光幕府懷光此時已罷副元帥而不肯釋兵史仍書郢元官懷光遣其子璀詣行在謝罪璀七罪翻請束身歸朝朝直遙翻庚辰詔遣給事中孔巢父齎先除懷光太子太保敕懷光除見上卷本年三月朔方將士悉復官爵如故朔方將士懷光所部也考異曰興元聖功録有李晟奏郢勸懷光歸投狀云今懷光即欲束身蓋自郢之勸導今取之興元元年壬午車駕至長安渾瑊韓遊王褱戴休顏以其衆扈從從才用翻李晟駱元光尚可孤以其衆奉迎步騎十餘萬旌旗數十里晟謁見上於三橋三橋在望賢宮之東京城之西見賢遍翻後謝收復之晚伏路左請罪上駐馬慰撫為之掩涕為于偽翻掩面垂涕謂之掩涕命左右扶上馬上時掌翻至宮每間日間讀曰間唐世天子以隻日視朝雙日謂之間日輒宴勳臣賞賜豐渥李晟為之首渾瑊次之諸將相又次之興元元年曹王皋遣其將伊慎王鍔圍安州李希烈遣其甥劉戒虛將步騎八千救之皋遣其別將李伯潛逆章乙十五行本逆下有擊字乙十一行本同孔本同退齋校同之於應山劉昫曰應山本漢南陽郡隨縣地梁分隨縣置永陽縣隋改為應山以縣北山為名唐屬隨州九域志應山縣在隨州北一百八里生擒戒虛徇於城下安州遂降以伊慎為安州刺史又擊希烈將康叔夜於厲鄉走之記祭法厲山氏之有天下也其子農能殖百穀注云厲山氏炎帝也起於厲山西漢書地理志注云隨故厲國皇甫謐曰今隨之厲鄉九域志隨州厲鄉村有厲山今自棗陽至厲鄉道路交錯號九十九岡興元元年丁亥孔巢父至河中李懷光素服待罪巢父不之止懷光左右多胡人皆歎曰太尉無官矣胡人不習朝章見懷光素服待罪故以為無官軍中誰可代太尉領軍者於是懷光左右發怒喧譟宣詔未畢衆殺巢父及中使啖守盈懷光亦不之止考異曰邠志曰七月十二日駕還長安上使諫議大夫孔巢父中官談懷仙持詔赦懷光曰奉天之時非卿不能救朕今日之事非朕不能容卿宜委軍赴闕以保官爵使者將至懷光陰導其卒使留己卒之蕃渾希懷光意輒害二使欲食其肉懷光翼而覆之全尸以聞今從實録復扶又翻治直之翻興元元年辛卯赦天下興元元年初肅宗在靈武見二百十九卷至德元載學文於李泌代宗之世泌居蓬萊書院見二百二十四卷永泰元年史照曰泌兵媚切亦與之遊及上在興元泌為杭州刺史上急詔徵之與睦州刺史杜亞俱詣行在乙未以泌為左散騎常侍亞為刑部侍郎命泌日直西省以候對唐門下省謂之東省中書省謂之西省屬之欲翻上問泌河中密邇京城朔方兵素稱精鋭如達奚小俊嚴小俊改承俊等皆萬人敵朕晝夕憂之奈何對曰天下事甚有可憂者若惟河中不足憂也夫料敵者料將不料兵今懷光將也將即亮翻下同小俊之徒乃兵耳何足為意懷光既解奉天之圍視朱泚垂亡之虜不能取乃與之連和使李晟得取以為功今陛下已還宮闕懷光不束身歸罪乃虐殺使臣謂殺孔巢父啖守盈也使疏吏翻如夢魘之人耳魘於琰翻但恐不日為帳下所梟梟古堯翻使諸將無以藉手也初上發吐蕃以討朱泚事見二百二十九卷本年正月及泚誅吐蕃來求地上欲召兩鎮節度使郭昕李元忠還朝昕元忠見二百二十七卷建中二年李泌曰安西北庭人性驍悍控制西域五十七國西域漢時有三十六國其後稍分至唐有五十七國西突厥有五弩失畢五咄陸凡十姓使不能併兵東侵謂東侵涇邠岐隴諸州且兩鎮之人勢孤地遠盡忠竭力為國家固守近二十年代宗初吐蕃陷河隴獨安西北庭為唐固守為于偽翻近其靳翻一旦棄之以與戎狄彼其心必深怨中國他日從吐蕃入寇如報私讎矣況日者吐蕃觀望不進陰持兩端大掠武功受賂而去事見上卷本年四月衆議亦以為然上遂不與興元元年李希烈聞李希倩伏誅忿怒八月壬寅遣中使至蔡州殺顏真卿考異曰顏氏行狀其年八月二十四日又使辛景臻等害公於龍興寺又曰初遭難後嗣曹王皋上表曰臣見蔡州歸順腳力張希璨王仕顆等説去年八月二十四日蔡州城中見封有鄰兒不得名字云希烈令偽皇城使辛景臻右軍安華於龍興寺殺顏真卿實録及舊傳云三日今從之有敕真卿再拜中使曰今賜卿死真卿曰老臣無狀罪當死不知使者幾日發長安使者曰自大梁來非長安也真卿曰然則賊耳何謂敕邪遂縊殺之興元元年李晟以涇州倚邊屢害軍帥常為亂根帝初即位涇州有劉文喜之亂既而又有姚令言之亂既而田希鑒又殺馮河清帥所類翻下同理即治也癸卯以晟兼鳳翔隴右節度等使及四鎮北庭涇原行營副元帥進爵西平王時李楚琳入朝晟請與俱至鳳翔而斬之以懲逆亂上以新復京師務安反仄不許興元元年先是上命渾瑊駱元光討李懷光軍于同州九域志同州至河中七十五里先悉薦翻瑊等數為所敗不能進數所角翻敗補邁翻時度支用度不給度支之度徒洛翻議者多請赦懷光上不許李懷光遣其妹壻要廷珍守晉州要於消翻姓也姓苑吳人要離之後後漢有河南令要兢牙將毛朝揚守隰州朝直遙翻揚音揚鄭抗守慈州馬燧皆遣人説下之晉隰慈三州皆與馬燧巡屬接壤故得説下之宋白曰慈州文城郡赤狄牆咎如之國郡西南有采桑津晉里克敗赤狄之地漢為北屈縣隋為汾州大業為文城郡唐貞觀為慈州以州城內舊有慈烏戍因名治吉鄉縣漢北屈縣也説式芮翻充河中同華陝虢行營副元帥加馬燧奉誠軍晉慈隰節度使充管內諸軍行營副元帥渾戶混翻又戶本翻瑊古咸翻華戶化翻是年正月置奉誠軍於同州以授康日知事見二百二十九卷帥所類翻陝失冉翻使疏吏翻與鎮國節度使駱元光肅宗上元二年置鎮國節度於華州廣德元年罷今復置鄜音膚初王武俊急攻康日知於趙州馬燧奏請詔武俊與李抱真同擊朱滔以深趙隸武俊改日知為晉慈隰節度使上從之日知未至而三州降燧降戶江翻下同故上使燧兼領之燧表讓三州於日知且言因降而授恐後有功者踵以為常上嘉而許之燧遣使迎日知既至籍府庫而歸之興元元年甲辰以鳳翔節度使李楚琳為左金吾大將軍興元元年丙午加渾瑊朔方行營元帥興元元年李晟至鳳翔治殺張鎰之罪殺張鎰見二百二十八卷建中四年治直之翻鎰弋質翻斌音彬興元元年朱滔為王武俊所攻殆不能軍上表待罪上時掌翻興元元年癸未馬燧將步騎三萬攻絳州絳州時屬李懷光將即亮翻又音如字騎奇寄翻興元元年度支以李懷光所部將士數萬與懷光同反不給冬衣上曰朔方軍纍代忠義度徒洛翻自肅代以來朔方軍輸力王室功高天下今為懷光所制耳將士何罪冬十月章乙十五行本月下有己亥二字乙十一行本同孔本同張校同詔朔方及諸軍在懷光所者冬衣及賞錢皆當別貯貯丁呂翻俟道路稍通即時給之興元元年李勉纍表乞自貶以討李希烈喪師失守也辛丑罷勉都統節度使建中間勉以永平節度使都統討李希烈之兵興元元年丙辰李懷光將閻晏寇同州官軍敗于沙苑詔徵邠州之軍韓遊王褱將甲士六千赴之興元元年乙丑馬燧拔絳州分兵取聞喜萬泉虞鄉永樂猗氏武德元年分芮縣置永樂縣屬芮州州廢屬鼎州又廢鼎州以縣屬河中府燧既取永樂則兵逼河中矣樂音洛興元元年初魚朝恩既誅代宗不復使宦官典兵事見二百二十四卷大曆五年復扶又翻下同悉以禁兵委白志貞白志貞名白琇圭典禁兵事始見二百二十五卷大曆十四年見二百二十九卷建中四年從幸山南兩軍稍集兩軍謂左右神策軍頗忌宿將握兵多者稍稍罷之戊辰以文場監神策軍左廂兵馬使王希遷監右廂兵馬使始令宦官分典禁旅宦官握兵柄自此不可奪矣將即亮翻監古銜翻考異曰舊竇文場傳云文場與霍仙鳴分統禁旅蓋希遷尋罷而仙鳴代之也今從實録興元元年閏月丙子以涇原節度使田希鑒為衛尉卿李晟初至鳳翔希鑒遣使參候晟謂使者曰涇州逼近吐蕃近其靳翻萬一入寇州兵能獨禦之乎欲遣兵防援又未知田尚書意使者歸以告希鑒希鑒果請援兵晟遣腹心將彭令英等戍涇州晟尋託巡邊詣涇州希鑒出迎晟與之並轡而入道舊結歡希鑒妻李氏以叔父事晟晟謂之田郎晟命具三日食曰巡撫畢即還鳳翔希鑒不復疑復扶又翻晟置宴希鑒與將佐俱至晟營晟伏甲於外廡既食而飲彭令英引涇州諸將下堂晟曰我與汝曹久別各宜自言姓名於是得為亂者石奇等三十餘人讓之曰汝曹屢為逆亂殘害忠良固天地所不容悉引出斬之希鑒尚在座晟顧曰田郎亦不得無過以親知之故當使身首得完希鑒曰唯唯于癸翻遂引出縊殺之並其子萼考異曰舊晟傳曰晟至涇州希鑒迎謁於座執而誅之還鎮表李觀為涇原節度使幸奉天録十月丁丑李晟誅田希鑒於涇州實録閏月癸酉除李觀涇原節度使丙子以希鑒為衛尉卿丁丑晟誅希鑒今從之諭以誅希鑒之意衆股栗無敢動者興元元年李希烈遣其將翟崇暉悉衆圍陳州久之不克翟萇伯翻李澄知大梁兵少不能制滑州遂焚希烈所授旌節誓衆歸國李澄請降事始上卷上年甲午以澄為汴滑節度使考異曰二月已云上以澄為滑州節度使蓋於時但許之耳興元元年宋亳節度使劉洽遣馬步都虞候劉昌與隴右幽州行營節度使曲環等將兵三萬救陳州十一月癸卯敗翟崇暉於州西敗補邁翻斬首三萬五千級擒崇暉以獻乘勝進攻汴州李希烈懼奔歸蔡州李澄引兵趣汴州趣七喻翻至城北恇怯不敢進恇去王翻劉洽兵至城東戊午李希烈守將田懷珍開門納之明日澄入舍於浚儀浚儀帶汴州李澄蓋舍於縣治輿地志夷門之下新里之東浚水之北象而儀之以為邑名漢武元年廢新里而立浚儀縣日有忿鬩鬩許激翻鬬也狠也戾也又相怨也會希烈鄭州守將孫液降於澄澄引兵屯鄭州詔以都統司馬寶鼎薛王玉為汴州刺史都統司馬宋滑河陽都統司馬也寶鼎縣屬河中府本汾陰縣開元十年獲寶鼎更名王玉古嶽翻李勉至長安素服待罪議者多以勉失守大梁勉失守事見二百二十九卷建中四年相息亮翻李泌言於上曰李勉公忠雅正而用兵非其所長及大梁不守將士棄妻子而從之者殆二萬人足以見其得衆心矣且劉洽出勉麾下勉至睢陽睢陽宋州卒平大梁卒子恤翻亦勉之功也上乃命勉復其位議者又言韓滉聞鑾輿在外聚兵修石頭城事見二百二十九卷建中四年上疑之以問李泌對曰滉公忠清儉自車駕在外滉貢獻不絶事見上卷盜賊不起皆滉之力也唐時浙江東西道所統惟潤升常湖蘇杭睦越明台溫衢處婺十四州前此滉遣宣潤弩手援寧陵蓋兼統宣州為十五州也滉見中原板蕩謂陛下將有永嘉之行引晉永嘉之亂元帝南渡以為言此乃人臣忠篤之慮奈何更以為罪乎滉性剛嚴不附權貴故多謗毀願陛下察之臣敢保其無他上曰外議洶洶章奏如麻如麻言其多如麻可束也對曰臣固聞之其子皋為考功員外郎今不敢歸省其親省悉景翻覲省也正以謗語沸騰故也上曰其子猶懼如此卿奈何保之對曰滉之用心臣知之至熟願上章明其無他願上時掌翻乞宣示中書使朝衆皆知之朝衆謂在朝百官之衆也朝直遙翻下同朕方欲用卿人亦何易可保慎勿違衆恐並為卿纍也易以豉翻纍良瑞翻泌退遂上章請以百口保滉他日上謂泌曰卿竟上章已為卿留中為于偽翻雖知卿與滉親舊豈得不自愛其身乎對曰臣豈肯私於親舊以負陛下顧滉實無異心臣之上章以為朝廷非為身也上曰如何其為朝廷為于偽翻下同對曰今天下旱蝗關中米斗千錢倉廩耗竭而江東豐稔願陛下早下臣章下戶嫁翻下同以解朝衆之惑面諭韓皋使之歸覲歸覲者歸覲省父母也速運糧儲豈非為朝廷邪上曰善朕深諭之矣即下泌章令韓皋謁告歸覲面賜緋衣諭以卿父比有謗言比毗至翻朕今知其所以釋然不復信矣復扶又翻因言關中乏糧歸語卿父語牛倨翻皋至潤州滉感悅流涕即日自臨水濱發米百萬斛聽皋留五日即還朝皋別其母啼聲聞於外聞音問滉怒召出撻之自送至江上冒風濤而遣之既而陳少遊聞滉貢米亦貢二十萬斛陳少遊時鎮淮南韓滉乃能化陳少遊貢米矣對曰豈惟少遊諸道將爭入貢矣興元元年吏部尚書同平章事蕭復奉使自江淮還蕭復出使見二百二十九卷興元元年四月還從宣翻又如字見賢遍翻勉等退復獨留言於上曰陳少遊任兼將相首敗臣節敗補邁翻陳少遊事見二百二十九卷建中四年韋皋幕府下僚獨建忠義韋皋事見二百二十八卷建中四年章乙十五行本南下有使善惡著明五字乙十一行本同孔本同張校同退齋校同上然之尋遣中使馬欽緒揖劉從一附耳語而去諸相還閣諸相在省中坐政事堂既退各居閣子欽緒宣旨令從一與公議朝來所言事即奏行之朝如字下朝來同敢問何事也復曰唐虞黜陟嶽牧僉諧事見堯典舜典與士共之記王制之言則罷之既在相位朝廷政事安得不與之同議而獨隱此事乎此最當今之大弊朝來主上已有斯言朝早也陟遙翻復已面陳其不可不謂聖意尚爾復不惜與公奏行之但恐浸以成俗未敢以告竟不以語從一從一奏之語牛倨翻上愈不悅復乃上表辭位乙丑罷為左庶子劉洽克汴州得李希烈起居注云某月日陳少遊上表歸順史究言陳少遊敗臣節之事發疾十二月乙亥薨贈太尉賻祭如常儀賻符遇翻淮南大將王韶欲自為留後令將士推己知軍事且欲大掠韓滉遣使謂之曰汝敢為亂吾即日全軍渡江誅汝矣韶等懼而止上聞之喜謂李泌曰滉不惟安江東又能安淮南真大臣之器卿可謂知人庚辰加滉平章事江淮轉運使滉運江淮粟帛入貢府謂朝廷受貢藏財物之府朝廷賴之使者勞問相繼使疏吏翻勞力到翻恩遇始深矣興元元年是歲蝗遍遠近草木無遺惟不食稻大飢道殣相望詩云行有死人尚或殣之殣渠吝翻瘞尸也又餓殍為殣道殣相望本左傳之言貞元元年乙丑七八五興元元年春正月丁酉朔赦天下改元興元元年癸丑贈顏真卿司徒諡曰文忠興元元年新州司馬盧盧貶新州見二百二十九卷建中四年移吉州長史謂人曰吾必再入未幾上果用為饒州刺史幾居豈翻給事中袁高應草制執以白盧翰劉從一曰盧作相致鑾輿播遷海內瘡痍奈何遽遷大郡願相公執奏翰等不從更命他舍人草制更工衡翻下更赦同乙卯制出高執之不下執之不肯書讀下戶嫁翻且奏極惡窮凶百辟疾之若讎六軍思食其肉何可復用復扶又翻上不聽補闕陳京趙需等上疏曰三年亶權建中二年盧為相四年貶書舜典納于百揆百揆時敘孔安國注曰舜舉八凱使揆度百事百事時敘無廢事業今云失敘謂事業廢也華夏蠻貊同棄儻加巨姦之寵必失萬姓之心丁巳袁高復於正牙論奏唐謂大明宮含光殿為正牙亦謂之南牙已再更赦高曰赦者止原其罪不可為刺史陳京等亦爭之不已曰之執政百官常如兵在其頸今復用之則姦黨皆唾掌而起上大怒左右辟易辟讀曰闢易如字辟易言開遠而易其故處諫者稍引卻京顧曰趙需等勿退此國大事當以死爭之上怒稍解戊午上謂宰相與小州刺史可乎李勉曰陛下欲與之雖大州亦可其如天下失望何壬戌以為澧州別駕使謂袁高曰朕徐思卿言誠為至當當丁浪翻又謂李泌曰朕已可袁高所奏泌曰纍日外人竊議比陛下於桓靈今承德音乃堯舜之不逮也上悅竟卒於澧州高恕己之孫也袁恕己與張柬之等誅二張中宗復辟興元元年三月李希烈陷鄧州興元元年戊午以汴滑節度使李澄為鄭滑節度使汴州歸劉洽李澄得鄭州故以鄭滑節授之興元元年以代宗女嘉誠公主妻田緒嘉城縣名隋置唐為松州治所妻七細翻興元元年李懷光都虞候呂鳴嶽密通款於馬燧事泄懷光殺之屠其家事連幕僚高郢李鄘懷光集將士而責之郢鄘抗言逆順無所慙隱懷光囚之鄘雍之姪孫也李雍以讒死於天寶之末敗懷光兵於陶城敗補邁翻唐書地理志河中有陶城府酈道元曰陶城在蒲坂城西北即舜所都也舜陶河濱蓋即此地與歷山相近按唐河中府治河東縣河東古蒲坂也斬首萬餘級分兵會渾瑊逼河中興元元年夏四月丁丑以曹王皋為荊南節度節度之下當有使字興元元年壬午馬燧渾瑊破李懷光兵於長春宮南遂掘塹圍宮城懷光諸將相繼來降詔以燧瑊為招撫使興元元年五月丙申劉洽更名玄佐更工衡翻興元元年韓遊王褱請兵於渾瑊共取朝邑朝直遙翻李懷光將閻晏欲爭之士卒指邠軍曰彼非吾父兄則吾子弟朔方軍分屯河中邠州故云然時韓遊王褱將邠軍以討李懷光語甚囂囂喧也懷光知衆心不從乃詐稱欲歸國聚貨財飾車馬云俟路通入貢由是得復踰旬月史言李懷光偷延視息復扶又翻興元元年六月辛巳以劉玄佐兼汴州刺史興元元年辛卯以金吾大將軍韋皋為西川節度使為韋皋以功烈著於西南張本興元元年朱滔病死將士奉前涿州刺史劉怦知軍事自朱滔得幽州滔每出兵皆以劉怦知留後事素得衆心故滔死而衆奉之怦普耕翻興元元年時連年旱蝗老子有言師之所聚荊棘生焉大兵之後必有凶年度徒洛翻言事者多請赦李懷光李晟上言赦懷光有五不可晟成正翻上時掌翻河中距長安才三百里同州當其衝多兵則未為示信少兵則不足隄防少詩沼翻忽驚東偏同州在長安東北一也今赦懷光必以晉絳慈隰還之渾瑊既無所詣康日知又應遷移先已命渾瑊為蒲絳節度使康日知為晉慈隰節度使故云然渾戶昆翻又戶本翻瑊古咸翻何以獎勵二也陛下連兵一年討除小醜兵力未窮遽赦其反逆之罪今西有吐蕃北有回紇南有淮西吐從暾入聲紇下沒翻李希烈時據淮西僭號故以之與二虜並言不謂陛下施德澤愛黎元乃謂兵屈於人而自罷耳必競起窺覦之心三也覦音俞懷光既赦則朔方將士皆應敘勳行賞謂解奉天圍勳賞也將即亮翻賞不滿望是愈激之使叛四也既解河中罷諸道兵賞典不舉怨言必起五也今河中斗米五百芻藁且盡牆壁之間餓殍甚衆殍彼表翻且軍中大將殺戮略盡陛下但敕諸道圍守旬時彼必有內潰之變何必養腹心之疾為他日之悔哉又請發兵二萬自備資糧獨討懷光秋七月甲午朔馬燧自行營入朝奏稱懷光凶逆尤甚赦之無以令天下願更得一月糧必為陛下平之燧音遂朝直遙翻必為于偽翻考異曰鄴侯家傳稱李泌語曰臣但恐梟於帳下太速何足憂也臣能為陛下取之上曰未諭卿意何故以太速為憂而卿能取也對曰臣為陛下憂不在河中乃在太原今馬燧亦蹭蹬矣領河東十萬之師遣王權領五千人赴難及再幸梁洋遂抽歸本道男暢在奉天亦便北歸陛下更收復後宣慰云王權亶抽兵馬暢不扈從並宜釋放此則尤不安矣臣比年曾與之言甚有心路今之雄傑也若使之有異志則不比希烈朱泚之徒或能旰食伏望陛下聽臣之言緩鞚遠馭以羈之上曰卿所欲何也對曰馬燧保全河東十餘州以待陛下還宮此亦功也臣為常侍與燧兄炫同列然其兄弟素不相能其語無益臣重表兄鄭叔規為賓佐臣令以炫意請至京城欲與相見即至臣激燧令其取李懷光自效必可致也因令燧為忠臣矣又曰貞元元年上因郊天改元時馬燧在太原遣其行軍司馬鄭叔規奏事請因鴻恩以雪懷光並致書信於先公先公不與之報留其信物且令叔規謂之曰比年展奉得接語言心期以為丈夫且河東節度以破靈曜之功上所與也奉天之難握十萬強兵而令懷光解圍及懷光圖危社稷車駕幸梁洋逢此際會又令他人立蓋代之功今聖主已歸宮闕懷光蹭蹬在於近畿旦夕為帳下所梟乃尸居也不速出軍收取以自解而快上心者即不及矣若河中既平公即如懷光之蹭蹬矣欲於滔俊之下作倔強之臣亦必不成不言公才略不及也緣腹中有三二百卷書蹭蹬至此必自內慙是進不立忠勳退不能效夷狄既而持疑則舟中帳下皆敵國矣可惜八尺之軀聲氣如鍾而心不果決乃婦人也著裙可矣欲奉答以裙衫而家纍在江東未至今聖上收復之後含垢匿瑕與人更始某又特蒙聽信已於上前保薦可使司徒以取懷光今弟來又請雪之大失所望且望弟速去為説若河中既平司徒何面目更來朝而與士人相見今雖請雪昨赦書亦許束身入朝矣若以建中同征之故當發一使諭之準赦歸朝必為保全如不奉詔當領全師問罪因速上表求自征之至河中輕騎入朝親稟廟略乃天與之便也能如是當與司徒為中朝應接有須陳奏必聞聖聽若不能何敢有書也叔規既去具奏於上上每憂河中驍將達奚小俊等突犯宮闕居常不安會東面苑牆有崩倒者上大驚以為有應之者將啓賊上顧問泌對曰此賊不足憂也乃猶機上肉耳但恐梟懸太速不得與馬燧藉手為憂上曰古人云輕敵者亡今卿心輕敵如是朕甚憂之對曰陛下初經難危憂慮太過輕敵者亡誠如聖旨至如懷光豈可謂之敵乎陛下比在梁洋元惡據宮闕渠以朔方全軍在河中李晟保東渭橋此時足以傍助逆順之勢不然苟欲偷安脅為遲棊亦可而竟如醉如魘都不能動今陛下復歸京闕又安足慮之哉臣伏計馬燧請討之章即至若以宗社之靈此賊且未為帳下所圖得河東軍有以藉手陛下無憂矣不喜平懷光先喜得馬燧也既而馬燧表至請全軍南收河中仍自供糧上大悅召先公對曰馬燧果請全軍討懷光來矣兼請至行營已來自備軍糧何其畏伏卿如此也對曰此乃畏伏天威而然於臣何有而能使其畏伏臣曾與之言諳其為人頗見機識勢今之雄傑也臣昨故令叔規傳詞以激怒之且曰欲寄婦人之服當艱虞之際握十萬強兵收復功在他人今聖主已還宮闕惟有懷光不速收取以立功自解他時復何面目至朝廷與公卿相見則蹭蹬之勢又不及懷光猶有解重圍之功料以此告之燧必能覺悟果得如此既以師至河中旬月當平而燧因此有功便為忠臣矣上曰當盡用卿言初叔規至太原具以先公言告燧燧搏䏶驚曰有是哉賴子之至京也不然燧幾為懷光矣非賢表兄豈有告燧者乎即日上表請行叔規又請如泌言先寫表本示懷光勸其束身歸朝彼必不從然後表請全軍往討則聖上信司徒誠心又可以忠義告四鄰不然朝救而夕請誅恐中外尤疑燧曰誠然仍令叔規草書寫表本馳驛以告懷光果不從於是乃請全軍南討尋發太原使者相繼奏事及與先公書言征討之謀及須上聞者先公因對皆為奏之又諷令下營訖輕騎由臨晉度朝謁燧皆然之七月乃自臨晉夏陽來朝上大悅遂具告以先公言卿才略必可使圖懷光初見卿請雪朕所未諭今乃果然比亦有人毀卿言詞百端聞於遠近惟先公保卿於朕朕信其言既見卿益知先公忠讜豁然體卿至誠奉國矣燧謝恩出而請先公至中書具説上言泣下拜謝後對上曰馬燧昨對其器質意趣固不易有且甚有心路感而用之必有成算皆如卿言信雄豪也按泌到長安數日即除常侍時興元元年七月乙未也八月癸卯加燧晉慈隰節度使然則癸卯之前燧已取晉慈隰三州矣故朝廷命為副元帥以討懷光十月已拔絳州及猗氏等諸縣矣貞元元年正月改元赦於時燧豈得猶在太原雪懷光邪自乙未至癸卯才九日自長安至晉陽千餘里若因泌諷諭鄭叔規始來京師又令叔規還激勸燧又使燧以書諭懷光懷光不從然後上表興師伐之事多如此豈九日之內所能容也此直李繁欲取馬燧平河中之功皆歸於其父耳今從舊燧傳李肇國史補曰馬司徒面雪李懷光上曰惟卿不合雪人惶恐而退李令聞之請全軍自備資糧以討凶逆由此李馬不平邠志曰七月馬公朝于京師請赦懷光隴右節度李公晟聞之上表請發兵二萬獨討懷光芻糧之費軍中自備上以李公表示馬公因曰朱泚之反不得已也懷光勃逆使朕再遷此而可赦何者為罪馬公雨泣曰十日之內請獻其首上遣之按是時懷光垂亡燧功已成八九故自入朝爭之豈肯面雪懷光邪今從舊傳上許之興元元年陝虢都章乙十五行本都下有知字乙十一行本同孔本同張校同兵馬使達奚抱暉鴆殺節度使張勸代總軍務邀求旌節且陰召李懷光將達奚小俊為援上謂李泌曰若蒲陝連衡則猝不可制蒲李懷光陝謂抱暉則水陸之運皆絶矣江淮水陸之運皆經陝州而後至長安辛丑以泌為陝虢都防禦水陸運使上欲以神策軍送泌之官問須幾何人對曰陝城三面懸絶攻之未可以歲月下也臣請以單騎入之上曰單騎如何可入對曰陝城之人不貫逆命貫讀與慣同此特抱暉為惡耳若以大兵臨之彼閉壁定矣臣今單騎抵其近郊彼舉大兵則非敵若遣小校來殺臣未必不更為臣用也校戶教翻且今河東全軍屯安邑馬燧入朝願敕燧與臣同辭皆行使陜人欲加害於臣則畏河東移軍討之此亦一勢也以形臨之謂之勢雖然朕方大用卿寧失陝州不可失卿當更使他人往耳對曰他人必不能入今事變之初衆心未定故可出其不意奪其姦謀他人猶豫遷延彼既成謀則不得前矣上許之泌見陝州進奏官及將吏在長安者唐諸鎮皆置進奏院在長安以進奏官主之主上以陝虢飢故不授泌節而領運使欲令督江淮米以賑之耳語牛倨翻陝州行營在夏縣行營在夏縣亦以討河中也夏縣唐初屬虞州貞觀十七年屬絳州時屬陝州其地跨河之南北九域志夏縣在陝州北九十八里夏戶雅翻當使將之有功則賜旌節矣抱暉覘者馳告之將即亮翻覘丑廉翻抱暉稍自安泌具以語白上曰欲使其士卒思米抱暉思節必不害臣矣上曰善戊申泌與馬燧俱辭行庚戌加泌陝虢觀察使泌出潼關鄜坊節度使唐朝臣以步騎三千布於關外朝臣時帶鄜坊節守潼關奉密詔送公至陝泌曰辭日奉進止自唐以來率以奉聖旨為奉進止蓋言聖旨使之進則進使之止則止也程大昌曰今奏劄言取進止猶言此劄之或留或卻合稟承可否也唐中葉遂以處分為進止而不曉文義者習而不察概謂有旨為進止如玉堂宣底所載凡宣旨皆云有進止者相承之誤也此一人不可相躡而來來則吾不得入陝矣唐臣以受詔不敢去唐臣當作朝臣沈存中曰唐故事中書舍人職掌詔誥皆寫四本一本為底一本為宣此宣謂行出耳未以名書也晚唐樞密使自禁中受旨出付中書即謂之宣中書承受録之於籍謂之宣底如今之聖語簿也余謂宣者因奉宣上旨而得名或以口傳為宣或以行文書為宣口傳為宣多命中臣而宰相亦有之劉栖楚之叩墀也牛僧孺宣曰所奏知門外俟進止此宰相之口宣也李泌寫宣以卻還唐朝臣之兵此宰相行文書為宣也抱暉不使將佐出迎惟偵者相繼偵丑鄭翻泌宿曲沃將佐不俟抱暉之命來迎泌笑曰吾事濟矣去城十五里抱暉亦出謁泌稱其攝事保完城隍之功曰軍中煩言不足介意公等職事皆按堵如故抱暉出而喜泌既入城視事賓佐有請屏人白事者屏必郢翻又卑正翻泌曰易帥之際軍中煩言乃其常理杜預注左傳曰煩言忿爭也余謂煩雜碎也此煩言謂雜碎之言帥所類翻自妥貼矣史照曰妥安也貼伏也亦作帖由是反仄者皆自安泌但索簿書治糧儲索山客翻治直之翻明日召抱暉至宅語之曰宅者觀察所居也唐諸鎮將吏謂節度觀察所居者為使宅語牛倨翻吾非愛汝而不誅恐自今有危疑之地朝廷所命將帥皆不能入故丐汝餘生汝為我齎版幣祭前使為于偽翻前使謂張勸版以祝幣以燎慎無入關自擇安處潛來取家保無他也泌之辭行也上籍陝將預於亂者七十五人授泌使誅之泌既遣抱暉日中宣慰使至泌奏已遣抱暉餘不足問上復遣中使至陝必使誅之復扶又翻泌不得已械兵馬使林滔等五人送京師懇請赦之詔謫戍天德天德軍在振武東北宋白曰天寶八年張齊丘於可敦城置橫塞軍十二年安思順奏廢橫塞軍請於大同城西築城置軍玄宗賜名天安軍乾元後改為天德軍緣居人校少遂南移四里權居永清柵其城則隋大同城之故墟在牟船山鉗耳觜之北竟殺之而抱暉遂亡命不知所之達奚小俊引兵至境聞泌已入陝而還興元元年壬辰章乙十五行本辰作子乙十一行本同以劉怦為幽州盧龍節度使興元元年大旱灞滻將竭長安井皆無水度支奏中外經費才支七旬容肇祖標點聶崇岐覆校
