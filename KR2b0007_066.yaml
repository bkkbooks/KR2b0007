body:
  text: 資治通鑑卷第六十六翰林學士兼侍讀學士朝散大夫右諫議大夫知制誥判尚書都省兼提舉萬壽觀公事上護軍河內郡開國侯食邑一千三百戶賜紫金魚袋臣司馬光奉敕編集後學天台音注漢紀五十八建安十四年孝獻皇帝辛建安十四年己丑二九建安十四年春三月曹操軍至譙自赤壁還也建安十四年孫權圍合肥久不下權率輕騎欲身往突敵長史張紘諫曰夫兵者凶器戰者危事也兵凶器戰危事前書鼂錯之言忽強暴之虜以權在軍中故稱麾下莫不寒心雖斬將搴旗威震敵場此乃偏將之任非主將之宜也將即亮翻願抑賁育之勇賁音奔懷霸王之計權乃止曹操遣將軍張喜將兵解圍久而未至揚州別駕楚國蔣濟密白刺史僞得喜書云步騎四萬已到雩婁雩婁縣屬廬江郡師古曰雩音許于翻婁音力于翻晉地道記雩婁在安豐縣西南三部使齎書語城中守將語牛倨翻一部得入城二部為權兵所得權信之遽燒圍走考異曰魏志武紀十二月權圍合肥劉馥傳云攻圍百餘日孫權傳云踰月不能下由此言之權退必在今年明矣建安十四年秋七月曹操引水軍自渦入淮班志淮陽扶溝縣渦水首受狼湯渠東至向入淮過郡三行千里水經注曰至下邳睢陵縣入淮師古曰渦音戈又音瓜狼音浪湯音徒浪翻軍合肥開芍陂屯田水經注肥水出九江成德縣廣陽鄉西西北入芍陂陂周一百二十許里在壽春縣南八十里楚相孫叔敖所造也自芍陂上施水則至合肥肥水又北過壽春縣北入于淮師古曰芍音鵲建安十四年冬十月荊州地震建安十四年十二月操軍還譙建安十四年廬江人陳蘭梅成據灊六叛灊六二縣皆屬廬江郡賢曰灊今壽州霍山縣灊音潛蕩徒朗翻考異曰遼傳無年按繁欽征天山賦云建安十四年十二月甲辰丞相武平侯曹公東征臨川未濟㣥舒蠢動割有灊六乃俾上將蕩寇將軍張遼治兵南嶽之陽又云陟天柱而南徂故置於此因使遼與樂進李典等將七千餘人屯合肥建安十四年周瑜攻曹仁歲餘所殺傷甚衆仁委城走權以瑜領南郡太守屯據江陵守式又翻程普領江夏太守治沙羡夏戶雅翻羡音夷呂範領彭澤太守範傳云範領彭澤太守以彭澤柴桑歷陽為奉邑劉備表權行車騎將軍領徐州牧會劉琦卒權以備領荊州牧周瑜分南岸地以給備荊江之南岸則零陵桂陽武陵長沙四郡地也改名公安水經南平郡孱陵縣有油水西北注于江曰油口即劉備立營之處也權以妹妻備妻七細翻妹才捷剛猛有諸兄風侍婢百餘人皆執刀侍立備每入心常凜凜恐為所圖也曹操密遣九江蔣幹往說周瑜說輸芮翻下同幹以才辨獨步於江淮之間言江淮人士無能敵其才辨者自託私行詣瑜瑜出迎之立謂幹曰子翼良苦遠涉江湖蔣幹字子翼為于僞翻因延幹與周觀營中行視倉庫軍資器仗訖還飲宴示之侍者服飾珍玩之物因謂幹曰丈夫處世處昌呂翻下同遇知己之主外託君臣之義內結骨肉之恩言行計從禍福共之假使蘇張更生謂蘇秦張儀也幹但笑終無所言還白操稱瑜雅量高致非言辭所能間也間古莧翻建安十四年丞相掾和洽言於曹操曰天下之人材德各殊不可以一節取也儉素過中自以處身則可以此格物所失或多格正也掾俞絹翻吏有著新衣著陟略翻乘好車者謂之不清形容不飾衣裘敝壞者謂之廉潔至令士大夫故汙辱其衣藏其輿服朝府大吏或自挈壺飧以入官寺朝直遙翻飧蘇昆翻熟食曰飧夫立教觀俗貴處中庸為可繼也中者正道庸者常道程子曰不偏之謂中不易之謂庸檢束也檢柙也概與概同行下孟翻下同必有疲瘁瘁秦醉翻古之大教務在通人情而已凡激詭之行則容隱僞矣操善之十五年十五年春下令曰孟公綽為趙魏老則優不可以為滕薛大夫論語載孔子之言朱子曰公綽魯大夫趙魏晉卿之家老家臣之長大家勢重而無諸侯之事家老望尊而無官守之責優有餘也滕薛二國名大夫任國政者滕薛國小政繁大夫位高責重然則公綽蓋廉靜寡欲而短於才者則齊桓其何以霸世管仲富擬公室築三歸之臺塞門反坫鏤簋朱紘桓公用之而霸書堯典曰明明揚仄陋揚舉也吾得而用之十五年二月乙巳朔日有食之十五年冬曹操作銅爵臺於鄴水經注銅爵臺在鄴城西北因城為之高十丈有屋百餘間十五年十二月己亥操下令曰孤始舉孝廉操年二十舉孝廉為郎恐為世人之所凡愚恐時人以凡愚待之也故在濟南除殘去穢操為濟南相國有十餘縣長吏多阿附貴戚贓汙狼籍於是奏免其八姦宄逃竄境內肅然濟子禮翻去羌呂翻以是為強豪所忿恐致家禍故以病還鄉里時年紀尚少少詩照翻乃於譙東五十里築精舍欲秋夏讀書冬春射獵為二十年規待天下清乃出仕耳然不能得如意徵為典軍校尉見五十九卷靈帝中平五年為于僞翻使題墓道言漢故征西將軍曹侯之墓此其志也而遭值董卓之難興舉義兵見五十九卷初平元年難乃旦翻破降黃巾三十萬衆見六十卷初平三年降戶江翻使窮沮而死見六十三卷建安四年沮在呂翻見六十三卷建安五年斬談見六十四卷十年斬尚見上卷十二年梟堅堯翻見上卷上年復扶又翻身為宰相人臣之貴已極意望已過矣設使國家無有孤不知當幾人稱帝幾人稱王或者人見孤強盛又性不信天命恐妄相忖度言有不遜之志言其將篡也度徒洛翻耿古幸翻毛公曰耿耿猶警警也又憂也故為諸君陳道此言為于僞翻皆肝鬲之要也鬲胸鬲也歸就武平侯國實不可也何者誠恐己離兵為人所禍離力智翻既為子孫計又己敗則國家傾危是以不得慕虛名而處實禍也處昌呂翻然兼封四縣食戶三萬何德堪之江湖未靜謂孫劉也至於邑土可得而辭今上還陽夏柘苦三縣戶二萬但食武平萬戶上時掌翻武平陽夏柘苦四縣皆屬陳國夏音賈且以分損謗議少減孤之責也少詩沼翻下同十五年劉表故吏士多歸劉備備以周瑜所給地少不足以容其衆乃自詣京見孫權京京口城也權時居京故劉備周瑜皆詣京見之後都秣陵於京口置京督又曰徐陵督爾雅絶高曰京其城因山為壘緣江為境因謂之京口荊州八郡瑜既以江南四郡給備備又欲兼得江漢間四郡也劉備以梟雄之姿梟堅堯翻而有關羽張飛熊虎之將必非久屈為人用者愚謂大計宜徙備置吳盛為築宮室多其美女玩好以娛其耳目好呼到翻分此二人各置一方使如瑜者得挾與攻戰大事可定也今猥割土地以資業之謂資之土地使成霸業埸音亦恐蛟龍得雲雨終非池中物也呂範亦勸留之權以曹操在北方當廣攬英雄攬魯敢翻手取也不從不從瑜範之言也久乃聞之歎曰天下智謀之士所見略同時孔明諫孤莫行其意亦慮此也孤方危急不得不往此誠險塗殆不免周瑜之手周瑜詣京見權曰今曹操新敗憂在腹心謂操以赤壁之敗威望頓損中國之人或欲因其敗而圖之是憂在腹心相事謂相與從事於戰攻也取蜀而並張魯因留奮威固守其地與馬超結援瑜還與將軍據襄陽以䠞操䠞子六翻北方可圖也權許之奮威者孫堅弟子奮威將軍丹陽太守瑜也周瑜還江陵為行裝於道病困與權箋曰修短命矣誠不足惜但恨微志未展不復奉教命耳復扶又翻下同方今曹操在北疆埸未靜劉備寄寓有似養虎言養虎將自遺患未知終始此朝士旰食之秋旰古旦翻晚也朝直遙翻至尊垂慮之日也魯肅忠烈臨事不苟可以代瑜儻所言可采瑜死不朽矣卒於巴丘裴松之曰瑜欲取蜀還江陵治嚴所卒之處應在今之巴陵與前所鎮巴江名同處異也據水經注巴丘山在湘水右岸晉武帝太康元年立巴陵縣宋文帝元嘉十六年置巴陵郡今嶽州也考異曰按江表傳瑜與策同年策以建安五年死年二十六瑜死時年三十六故知在今年也曰公瑾有王佐之資今忽短命孤何賴哉自迎其喪於蕪湖蕪湖縣屬丹陽郡權為長子登娶其女為于僞翻長知兩翻以其男循為騎都尉妻以女胤為興業都尉妻以宗女妻七細翻初瑜見友於孫策太夫人又使權以兄奉之是時權位為將軍諸將賓客為禮尚簡而瑜獨先盡敬便執臣節程普頗以年長數陵侮瑜瑜折節下之長知兩翻數所角翻折而設翻下遐稼翻終不與校普後自敬服而親重之乃告人曰與周公瑾交若飲醇醪不覺自醉酒不澆為醇醪滓汁酒權以魯肅為奮武校尉代瑜領兵令程普領南郡太守魯肅勸權以荊州借劉備與共拒曹操權從之為孫劉爭荊州張本考異曰肅傳曰曹公聞權以土地業備方作書落筆於地恐操不至於是今不取番蒲何翻分長沙為漢昌郡鄱陽今饒州地沈約志長沙郡有吳昌縣漢末之漢昌也吳更名至隋廢吳昌入羅縣唐武德八年又省羅縣入湘陰則知吳立漢昌郡在唐嶽州湘陰縣界復扶又翻魯肅為漢昌太守屯陸口水經江水左徑烏林南又東右岸得蒲磯口即陸口也水出下雋縣西三山溪入蒲圻縣北徑呂蒙城西孫權征長沙零桂所鎮也初權謂呂蒙曰卿今當塗掌事當塗猶言當路也蒙辭以軍中多務權曰孤豈欲卿治經為博士邪但當涉獵見往事耳師古曰涉若涉水獵若獵獸言歷覽之不專精也治直之翻孰若孤孤常讀書自以為大有所益蒙乃始就學及魯肅過尋陽與蒙論議大驚曰卿今者才略非復吳下阿蒙蒙曰士別三日即更刮目相待大兄何見事之晚乎肅遂拜蒙母結友而別劉備以從事龐統守耒陽令耒陽縣屬桂陽郡宋白曰郡國志云鰲山口即耒陽縣耒盧對翻免官魯肅遺備書曰龐士元非百里才也使處治中別駕之任始當展其驥足耳遺于季翻處昌呂翻百官志司隸校尉從事史十二人功曹從事主選署及衆事別駕從事校部行部則奉引録衆事州牧則改功曹從事為治中從事杜佑曰別駕從事史從刺史行部別乘一乘傳車故謂之別駕治中從事史居中治事主衆曹功曹主選用諸葛亮亦言之備見統與善談大器之善談者劇論當世事也談與談同親待亞於諸葛亮與亮並為軍師中郎將十五年初蒼梧士燮為交趾太守交州刺史朱符為夷賊所殺州郡擾亂燮表其弟一領合浦太守䵋領九真太守䵋胡悔翻又于鄙翻武領南海太守燮體器寬厚中國士人多往依之雄長一州偏在萬里威尊無上天下殽亂燮雄據偏州人但知威尊無復知有天子也長知兩翻震服百蠻朝廷遣南陽張津為交州刺史津好鬼神事常著絳帕頭好呼到翻著陟略翻帕莫白翻項安世家說頭巾一名巾烏音塢一名帕陸游曰袹頭者巾幘之類猶今言幞頭韓文公云以紅袹首已為失之東坡云絳袹蒙頭讀道書增一蒙字其誤尤甚鼓琴燒香讀道書云可以助化為其將區景所殺區烏侯翻姓也又虧于翻據史自賈琮以前皆為交趾刺史未得為交州晉志永和九年交趾太守周敞求立為州朝議不許即拜敞為交趾刺史建安八年張津為刺史士燮為交趾太守共表立為州乃拜津為交州牧十五年移居番禺劉表遣零陵賴恭代津為刺史姓譜賴為楚所滅子孫以國為氏風俗通漢有交趾太守賴先表又遣吳巨代之朝廷賜燮璽書以燮為綏南中郎將董督七郡領交趾太守如故章甲十一行本故下有後字乙十一行本同孔本後字作空格巨與恭相失巨舉兵逐恭恭走還零陵孫權以番陽太守臨淮步騭為交州刺史姓譜晉有步揚食采於步因氏焉番蒲荷翻騭職日翻吳巨外附內違騭誘而斬之誘音酉威聲大震權加燮左將軍燮遣子入質質音致由是嶺南始服屬於權十六年十六年春正月以曹操世子丕為五官中郎將置官屬為丞相副漢五官中郎將主五官郎而已未嘗置官屬也領屬光祿勳未嘗為丞相副也十六年三月操遣司隸校尉鍾繇討張魯使征西護軍夏侯淵等將兵出河東與繇會淵之族操所自出也付以西征先驅之任以資序未得為征西將軍故以護軍為名公府倉曹主倉穀事有掾有屬大兵西出韓遂馬超疑為襲己必相扇動宜先招集三輔三輔苟平漢中可傳檄而定也操不從關中諸將果疑之操舍關中而遠征張魯伐虢取虞之計也蓋欲討超遂而無名先張討魯之勢以速其反然後加兵耳其衆十萬屯據潼關潼關在弘農華陰縣水經注曰河在關內南流潼激關山因謂之潼關晉所謂桃林之塞秦所謂陽華是也晉百官志曰四安起於魏初謂安東安西安南安北四將軍也命五官將丕留守鄴以奮武將軍程昱參丕軍事沈約曰奮武將軍始於漢末門下督督將之居門下者樂安國淵為居府長史統留事姓譜齊有國氏世為上卿又鄭七穆子國之後為國氏七月操自將擊超等將即亮翻下同議者多言關西兵習長矛非精選前鋒不可當也操曰戰在我非在賊也賊雖習長矛將使不得以刺諸君但觀之在我而不在敵故可以制勝此未易與常人言也刺七亦翻下同八月操至潼關與超等夾關而軍操急持之而潛遣徐晃朱靈以步騎四千人渡蒲阪津據河西為營蒲阪津在蒲阪縣西河西即唐之蒲津關考異曰晃傳曰太祖至潼關恐不得渡召問晃晃曰公盛兵於此而賊不復別守蒲阪知其無謀也今假臣精兵渡蒲阪津為軍先置以截其裏賊可禽也太祖曰善按武帝紀潛遣二將渡蒲阪皆太祖之謀而晃傳云皆晃之策蓋陳氏各欲稱其功美不相顧耳操自潼關北渡河兵衆先渡操獨與虎士百餘人留南岸斷後斷丁管翻馬超將步騎萬餘人攻之矢下如雨操猶據胡牀不動許褚扶操上船船工中流矢死中竹仲翻褚左手舉馬鞍以蔽操右手刺船校尉丁斐放牛馬以餌賊賊亂取牛馬操乃得渡遂自蒲阪渡西河循河為甬道而南超等退拒渭口前書渭水至船司空入河後漢省船司空屬華陰縣渭口之東即潼關也潛以舟載兵入渭為浮橋夜分兵結營於渭南超等夜攻營伏兵擊破之超等屯渭南遣使求割河以西請和操不許九月操進軍悉渡渭超等數挑戰又不許固請割地求送任子賈詡以為可僞許之操復問計策數所角翻挑徒了翻復扶又翻詡曰離之而已操曰解解戶買翻曉也韓遂請與操相見操與遂有舊於是交馬語移時遂與樊稠交馬語而得以斃稠與曹操交馬語乃以自斃然後知遂之所以遇稠者非用數也若馬超等之疑遂則猶李傕之疑稠耳但說京都舊故拊手歡笑時秦胡觀者前後重沓重直龍翻操笑謂之曰爾欲觀曹公邪亦猶人也非有四目兩口但多智耳既罷超等問遂公何言遂曰無所言也超等疑之他日操又與遂書多所點竄如遂改定者超等愈疑遂二者皆所以離之也考異曰許褚傳曰太祖與韓遂馬超等會語左右皆不得從唯將褚超負其力陰欲前突太祖素聞褚勇疑從騎是褚乃問曰公有虎侯者安在太祖顧指褚褚瞋目眄之超不敢動按時超不與遂同在彼故疑此說妄也克日者剋定其日也挑徒了翻戰良久乃縱虎騎夾擊大破之斬成宜李堪等遂超奔涼州楊秋奔安定諸將問操曰初賊守潼關渭北道缺缺謂缺而不備引日而後北渡何也操曰賊守潼關若吾入河東賊必引守諸津則西河未可渡吾故盛兵向潼關賊悉衆南守西河之備虛故二將得亶取西河然後引軍北渡賊不能與吾爭西河者以二將之軍也二將徐晃朱靈也將即亮翻為甬道而南既為不可勝兵法先為不可勝以待敵之可勝渡渭為堅壘虜至不出所以驕之也故賊不為營壘而求割地吾順言許之所以從其意使自安而不為備因畜士卒之力一旦擊之所謂疾雷不及掩耳淮南子之言固非一道也始關中諸將每一部到操輒有喜色諸將問其故操曰關中長遠若賊各依險阻征之不一二年不可定也今皆來集其衆雖多莫相歸服軍無適主適丁歷翻一舉可滅為功差易吾是以喜當此之時關西之兵最為精強而破於操者法制不一也易以豉翻冬十月操自長安北征楊秋圍安定秋降降戶江翻復其爵位使留撫其民十二月操自安定還留夏侯淵屯長安以議郎張既為京兆尹既招懷流民興復縣邑百姓懷之遂超之叛也弘農馮翊縣邑多應之河東民獨無異心操與超等夾渭為軍軍食一仰河東仰牛向翻及超等破餘畜尚二十餘萬斛畜讀曰蓄操乃增河東太守杜畿秩中二千石十六年扶風法正為劉璋軍議校尉軍議校尉使之議軍事蓋時議必推正之善謀璋能官之而不能用耳又為其州里俱僑客者所鄙正邑邑不得志僑寄也寓也鄙薄也邑邑不樂之意自負其才忖璋不足與有為忖度也思也忖寸本翻松勸璋結劉備璋曰誰可使者松乃舉正璋使正往正辭謝佯為不得已而行還為松說備有雄略為于僞翻密謀奉戴以為州主會曹操遣鍾繇向漢中璋聞之內懷恐懼松因說璋曰說輸芮翻曹公兵無敵於天下若因張魯之資以取蜀土誰能禦之劉豫州使君之宗室而曹公之深讎也使疏吏翻善用兵若使之討魯魯必破矣魯破則益州強曹公雖來無能為也今州章甲十一行本州下有中字乙十一行本同孔本同張校同諸將龐羲李異等皆恃功驕豪據裴松之注龐羲免璋諸子於難而李異殺趙韙故各恃功謂其意欲附外也則敵攻其外民攻其內必敗之道也璋然之遣法正將四千人迎備主簿巴西黃權諫曰譙周巴記曰劉璋分巴郡墊江已上為巴西郡劉左將軍有驍名曹操表備為左將軍故稱之驍堅堯翻欲以部曲遇之則不滿其心欲以賓客禮待則一國不容二君若客有泰山之安則主有纍卵之危不若閉境以待時清璋不聽出權為廣漢長廣漢縣屬廣漢郡長知兩翻自倒懸於州門以諫璋一無所納法正至荊州陰獻策於劉備曰以明將軍之英才乘劉牧之懦弱張松州之股肱別駕州之上佐故曰股肱以取益州猶反掌也考異曰韋曜吳書曰備前見張松後得法正皆厚以恩德接納盡其殷勤之歡因問蜀中闊狹兵器府庫人馬衆寡及諸要害道里遠近松等具言之按劉璋劉備傳松未嘗先見備吳書誤也龐統言於備曰荊州荒殘人物殫盡東有孫車騎備表權為車騎將軍故以稱之難以得志今益州戶口百萬土沃財富誠得以為資大業可成也備曰今指與吾為水火者曹操也言水火者以其性相反也吾以寬操以暴吾以仁操以譎吾以忠譎古穴翻每與操反事乃可成耳今以小利而失信義於天下奈何統曰亂離之時固非一道所能定也且兼弱攻昧尚書仲虺之言前書陸賈曰湯武逆取而順守之若事定之後封以大國何負於信今日不取終為人利耳備以為然乃留諸葛亮關羽等守荊州以趙雲領留營司馬留營司馬掌留營軍事也孫權聞備西上上時掌翻遣舟船迎妹而夫人欲將備子禪還吳張飛趙雲勒兵截江乃得禪還劉璋敕在所供奉備備入境如歸前後贈遺以巨億計遺于季翻備至巴郡巴郡太守嚴顏拊心歎曰此所謂獨坐窮山放虎自衛者也備自江州北由墊江水詣涪巴郡治江州墊江縣屬巴郡涪縣屬廣漢郡墊江水蓋即涪內水也庾仲雍曰江州縣對二水口右則涪內水左則蜀外水墊音疊涪音浮賢曰涪縣故城今綿州城墊江縣唐之合州車乘帳幔乘繩證翻幔莫半翻幕也精光耀日往會之張松令法正白備便於會襲璋備曰此事不可倉卒卒讀曰猝龐統曰今因會執之則將軍無用兵之勞而坐定一州也備曰初入他國恩信未著此不可也璋推備行大司馬領司隸校尉備亦推璋行鎮西大將軍領益州牧晉百官志曰四鎮通於柔遠謂鎮東鎮西鎮南鎮北四將軍也更相之適之往也更工衡翻璋增備兵厚加資給使擊張魯又令督白水軍白水關在廣漢白水縣劉璋置軍屯守即楊懷高沛之軍也杜佑曰梁州金牛縣漢葭萌縣地縣南有故白水關車甲器械資貨甚盛璋還成都備北到葭萌葭萌縣屬廣漢郡賢曰葭萌今利州益昌縣應劭曰葭音家師古曰萌音氓蜀王封其弟葭萌於此因以名邑先主改曰漢壽厚樹恩德以收衆心十七年十七年春正月曹操還鄴詔操贊拜不名入朝不趨劍履上殿如蕭何故事十七年操之西征也河間民田銀蘇伯反扇動幽冀五官將丕欲自討之功曹常林曰據林傳時為五官將功曹北方吏民樂安厭亂樂音洛服化已久守善者多銀伯犬羊相聚不能為害方今大軍在遠外有強敵將軍為天下之鎮謂留守鄴也雖克不武乃遣將軍賈信討之應時克滅餘賊千餘人請降議者皆曰公有舊法圍而後降者不赦降戶江翻程昱曰此乃擾攘之際權時之宜今天下略定不可誅之縱誅之宜先啓聞議者皆曰軍事有專無請昱曰凡專命者謂有臨時之急耳今此賊制在賈信之手故老臣不願將軍行之也丕曰善即白操操果不誅既而聞昱之謀甚悅曰君非徒明於軍計又善處人父子之間以勸丕不專殺也處昌呂翻故事破賊文書以一為十國淵上首級皆如其實數國淵時統留事上時掌翻淵曰夫征討外寇多其斬獲之數者欲以大武功聳民聽也河間在封域之內銀等叛逆雖克捷有功淵竊恥之操大悅十七年夏五月癸未誅衛尉馬騰夷三族騰詣鄴見上卷十三年十七年六月庚寅晦日有食之十七年秋七月螟十七年馬超等餘衆屯藍田夏侯淵擊平之鄜賊梁興鄜縣前漢屬左馮翊後漢省師古曰鄜音敷諸縣恐懼皆寄治郡下議者以為當移就險阻左馮翊鄭渾曰興等破散藏竄山谷雖有隨者率脅從耳今當廣開降路降戶江翻下同宣諭威信而保險自守此示弱也乃聚吏民治城郭為守備治直之翻募民逐賊得其財物婦女十以七賞民大悅皆願捕賊賊之失妻子者皆還求降渾責其得他婦女然後還之於是轉相寇盜黨與離散又遣吏民有恩信者分布山谷告諭之出者相繼乃使諸縣長吏各還本治以安集之長知兩翻興等懼將餘衆聚鄜城操使夏侯淵助渾討之遂斬興餘黨悉平渾泰之弟也鄭泰見用於董卓而欲圖卓者也十七年九月庚戌立皇子熙為濟陰王懿為山陽王邈為濟北王敦為東海王時許靖在蜀聞立諸王曰將欲翕之必姑張之將欲奪之必姑與之其孟德之謂乎濟子禮翻十七年初張紘以秣陵山川形勝勸孫權以為治所及劉備東過秣陵亦勸權居之權於是作石頭城徙治秣陵改秣陵為建業秣陵屬丹陽郡本金陵也秦始皇改孫權改曰建業後避晉愍帝諱改曰建康石頭城在今建康城西二里金陵志石頭城去臺城九里南合秦淮水張舜民曰石頭城者天生城壁有如城然在清涼寺北覆舟山上江行自北來者循石頭城轉入秦淮陸游曰龍灣望石頭山不甚高然峭立江中繚繞如垣牆清涼寺距石頭里餘西望宣化渡及歷陽諸山宋白曰晉平吳分為二邑自淮水南為秣陵北為建業江表傳紘謂權曰秣陵楚武王所置名為金陵地勢岡阜連石頭昔秦始皇東巡經此縣望氣者云金陵地形有王者都邑之氣故掘斷連岡改名秣陵今處所具存宜為都邑獻帝春秋又載權曰秣陵有小江百餘里可以安大船吾方理水軍當移據之又據晉書郗隆傳隆為揚州刺史鎮秣陵齊王冏檄令赴討趙王倫隆停檄不下時王邃鎮石頭隆軍西赴邃者甚衆隆遣從事於牛渚禁之不得止將士奉邃攻殺隆則石頭在牛渚西詳考是事秣陵軍將赴邃欲自牛渚而西勤王也石頭自在牛渚東十七年呂蒙聞曹操欲東兵說孫權夾濡須水口立塢說輸芮翻賢曰濡須水名在今和州歷陽縣西南孫權夾水立塢狀如偃月杜佑曰濡須水在歷陽西南百八十里余據濡須水出巢湖在今無為軍北二十五里濡須塢在今巢縣東南四十里諸將皆曰上岸擊賊上時掌翻洗足入船何用塢為蒙曰兵有利鈍戰無百勝如有邂逅敵步騎蹙人不暇及水其得入船乎權曰善遂作濡須塢十七年冬十月曹操東擊孫權董昭言於曹操曰自古以來人臣匡世未有今日之功有今日之功未有久處人臣之勢者也處昌呂翻下同今明公恥有慙德樂保名節樂音洛然處大臣之勢使人以大事疑己誠不可不重慮也重直用翻乃與列侯諸將議以丞相宜進爵國公九錫備物以彰殊勳賢曰禮含文嘉曰九錫一曰車馬二曰衣服三曰樂器四曰朱戶五曰納陛六曰虎賁百人七曰斧鉞八曰弓矢九曰秬鬯謂之九錫錫豫也九錫皆如其德左傳曰分魯公以大路大旗夏后氏之璜封父之繁弱祝宗卜史備物典策曹公本興義兵以匡朝寧國朝直遙翻秉忠貞之誠守退讓之實君子愛人以德記檀弓曾子曰君子之愛人也以德細人之愛人也以姑息操由是不悅及擊孫權表請彧勞軍于譙勞力到翻因輒留彧以侍中光祿大夫持節參丞相軍事輒言專輒也彧以疾留壽春飲藥而卒彧傳云操饋之食發視乃空器也於是飲藥而卒考異曰陳志彧傳曰以憂薨范書彧傳曰操饋之食發視乃空器也於是飲藥而卒孫盛魏氏春秋亦同按彧之死操隱其誅陳壽云以憂卒蓋闕疑也今不正言其飲藥恐後世為人上者謂隱誅可得而行也好推賢進士故時人皆惜之行下孟翻好呼到翻臣光曰孔子之言仁也重矣自子路冉求公西赤門人之高第令尹子文陳文子諸侯之賢大夫皆不足以當之而獨稱管仲之仁豈非以其輔佐齊桓大濟生民乎論語孟武伯問子路仁乎子曰不知也又問子曰由也千乘之國可使治其賦也不知其仁也求也何如曰求也千室之邑百乘之家可使為之宰也不知其仁也赤也何如曰赤也束帶立於朝可使與賓客言也不知其仁也子張問曰令尹子文三仕為令尹無喜色三巳之無慍色舊令尹之政必以告新令尹何如子曰忠矣曰仁矣乎曰未知焉得仁崔子弒齊君陳文子有馬十乘棄而違之至於他邦則曰猶吾大夫崔子也違之之一邦則又曰猶吾大夫崔子也違之何如子曰清矣曰仁矣乎曰未知焉得仁子貢曰管仲非仁者與桓公殺公子糾不能死又相之子曰管仲相桓公霸諸侯一匡天下民到于今受其賜微管仲吾其被髮左衽矣豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也子路曰桓公殺公子糾召忽死之管仲不死曰未仁乎子曰桓公九合諸侯不以兵車管仲之力也如其仁如其仁管仲不羞而相之行下孟翻相息亮翻其志蓋以非桓公則生民不可得而濟也漢末大亂㣥生塗炭自非高世之才不能濟也然則荀彧捨魏武將誰事哉齊桓之時周室雖衰未若建安之初也建安之初四海蕩覆尺土一民皆非漢有荀彧佐魏武而興之舉賢用能訓卒厲兵決機發策征伐四克遂能以弱為強化亂為治治直吏翻十分天下而有其八其功豈在管仲之後乎管仲不死子糾而荀彧死漢室其仁復居管仲之先矣復扶又翻而杜牧乃以為彧之勸魏武取兗州則比之高光官渡不令還許則比之楚漢及事就功畢乃欲邀名於漢代譬之教盜穴牆發匱而不與同挈得不為盜乎臣以為孔子稱文勝質則史見論語必有以文之然則比魏武於高光楚漢者史氏之文也豈皆彧口所言邪用是貶彧非其罪矣且使魏武為帝則彧為佐命元功與蕭何同賞矣彧不利此而利於殺身以邀名豈人情乎十七年十二月有星孛于五諸侯晉天文志曰五諸侯五星在東井北又太微南蕃左執法東北一星曰謁者謁者東北三星曰三公三公北三星曰九卿九卿西五星曰內五諸侯內侍天子不之國也孛蒲內翻十七年劉備在葭萌龐統言於備曰今陰選精兵晝夜兼道徑襲成都劉璋既不武又素無豫備大軍卒至卒讀曰猝一舉便定此上計也楊懷高沛璋之名將各杖強兵據守關頭即白水關頭也數所角翻使發遣將軍還荊州將軍遣與相聞說荊州有急欲還救之並使裝束外作歸形此二子既服將軍英名又喜將軍之去計必乘輕騎來見將軍因此執之進取其兵乃向成都此中計也退還白帝白帝即巴東魚復縣城也公孫述據成都自稱白帝改魚復曰白帝城徐還圖之此下計也若沈吟不去沈持林翻將致大困不可久矣備然其中計及曹操攻孫權權呼備自救備貽璋書曰孫氏與孤本為脣齒而關羽兵弱今不往救則曹操必取荊州轉侵州界州界謂益州界魯自守之賊不足慮也因求益萬兵及資糧璋但許兵四千其餘皆給半備因激怒其衆曰吾為益州征強敵師徒勤瘁瘁秦醉翻而積財吝賞何以使士大夫死戰乎張松書與備及法正曰今大事垂立如何釋此去乎松兄廣漢太守肅恐禍及己因發其謀於是璋收斬松敕關戍諸將文書皆勿復得與備關通復扶又翻備大怒召璋白水軍督楊懷高沛責以無禮斬之責其無客主之禮也並其兵進據涪城此用龐統之中計也十八年十八年春正月曹操進軍濡須口號步騎四十萬攻破孫權江西營大江東北流故自歷陽至濡須口皆謂之江西而建業謂之江東權率衆七萬禦之相守月餘操見其舟船器仗軍伍整肅歎曰生子當如孫仲謀孫權字仲謀豚犬耳權為箋與操說春水方生公宜速去別紙言足下不死孤不得安操語諸將曰語牛倨翻孫權不欺孤乃徹軍還十八年庚寅詔並十四州復為九州十四州司豫冀兗徐青荊揚益梁雍並幽交也復為九州者割司州之河東河內馮翊扶風及幽並二州皆入冀州涼州所統悉入雍州又以司州之京兆入焉又以司州之弘農河南入豫州交州並入荊州則省司涼幽並而復禹貢之九州矣此曹操自領冀州牧欲廣其所統以制天下耳十八年夏四月曹操至鄴十八年初曹操在譙恐濱江郡縣為孫權所略欲徙令近內近其靳翻以問揚州別駕蔣濟曰昔孤與袁本初對軍官渡徙燕白馬民民不得走賊亦不敢鈔事見六十三卷建安五年燕縣白馬縣皆屬東郡燕春秋之南燕國也賢曰燕故城今滑州胙城縣鈔楚交翻燕於賢翻何如對曰是時兵弱賊強不徙必失之自破袁紹以來明公威震天下民無他志人情懷土實不樂徙樂音洛懼必不安操不從既而民轉相驚自廬江九江蘄春廣陵戶十餘萬皆東渡江蘄春縣本屬江夏郡沈約曰吳立蘄春郡此據吳志書之也蘄音祁合淝以南惟有皖城皖縣屬廬江郡賢曰今舒州懷寧縣師古曰皖音胡管翻使疏吏翻操迎見大笑曰本但欲使避賊乃更驅盡之拜濟丹陽太守丹陽郡已屬孫權濟不得之郡也十八年五月丙申以冀州十郡封曹操為魏公時以冀州之河東河內魏郡趙國中山常山巨鹿安平甘陵平原凡十郡為魏國又加九錫大輅戎輅各一玄牡二駟兗冕之服赤舄副焉毛萇曰赤舄人君之盛屨也釋舄復履也鄭玄曰復下曰舄鄭衆曰舄有三等赤舄為上冕服之舄六佾之舞周禮樂縣之位王宮縣諸侯軒縣鄭衆曰宮縣四面縣軒縣去其一面縣讀曰懸舞佾之數天子八諸侯六杜預曰八佾八八六十四人六佾六六三十六人服虔曰天子八八諸侯六八大夫四八士二八宋傅隆曰鄭伯納晉悼公女樂二八晉以一八賜魏絳此樂以八人為列之證也佾音逸納陛以登虎賁之士三百人鈇鉞各一彤弓一彤矢百玈弓十玈矢千玈與盧同黑色也圭瓚副焉十八年大雨水十八年益州從事廣漢鄭度聞劉備舉兵謂劉璋曰左將軍懸軍襲我兵不滿萬士衆未附軍無輜重重直用翻野穀是資其計莫若盡驅巴西梓潼民內涪水以西梓潼縣屬廣漢郡漢武帝元鼎元年置以縣倚梓林而枕潼水為名建安二十二年劉備分立梓潼郡班志梓潼有五婦山駝水所出南入涪應劭曰涪水出廣漢南入漢水經曰涪水出廣漢涪縣西北東至廣漢與梓潼水合又西南流又南入于墊江注云涪水出廣漢屬國剛氐道徼外梓潼水即五婦水也同入于墊江即所謂內水也一皆燒除高壘深溝靜以待之彼至請戰勿許久無所資不過百日必將自走走而擊之此必禽耳劉備聞而惡之惡烏路翻以問法正正曰璋終不能用無憂也璋果謂其㣥下曰吾聞拒敵以安民未聞動民以避敵也不用度計璋遣其將劉璝冷苞張任鄧賢吳懿等拒備皆敗退保帛丿糸竹璝姑回翻又胡隈翻冷魯杏翻姓也按本或作泠泠音魯經翻帛丿糸竹縣屬廣漢郡唐屬漢州九域志在州東北九十三里懿詣軍降降戶江翻下同璋復遣護軍南陽李嚴江夏費觀督帛丿糸竹諸軍復扶又翻下同夏戶雅翻費父沸翻嚴觀亦率其衆降於備備軍益強分遣諸將平下屬縣劉璝張任與璋子循退守雒城雒縣屬廣漢郡雒水所出唐為漢州治所任勒兵出戰於鴈橋鴈江在雒縣南曾有金鴈故名為鴈橋任死十八年秋七月魏始建社稷宗廟十八年魏公操納三女為貴人自此以後曹操不書姓而冠以國操三女長憲次節次華節後立為皇后十八年初魏公操追馬超至安定聞田銀蘇伯反引軍還參涼州軍事楊阜言於操曰超有信布之勇甚得羌胡心若大軍還不設備隴上諸郡非國家之有也隴西南安漢陽永陽皆隴上諸郡也獻帝起居注初平四年分漢陽上郡為永陽超果率羌胡擊隴上諸郡縣郡縣皆應之惟冀城奉州郡以固守冀縣屬漢陽郡郡及涼州刺史治焉超盡兼隴右之衆張魯復遣大將楊昂助之復扶又翻凡萬餘人攻冀城自正月至八月救兵不至刺史韋康遣別駕閻溫出告急於夏侯淵夏侯淵時屯長安重直龍翻溫夜從水中潛出明日超兵見其迹遣追獲之超載溫詣城下使告城中云東方無救隴右在西方操在關東故曰東方呼火故翻大軍不過三日至勉之城中皆泣稱萬歲超雖怒猶以攻城久不下徐徐更誘溫冀其改意誘音酉溫曰事君有死無二而卿乃欲令長者出不義之言乎超遂殺之已而外救不至韋康及太守欲降降戶江翻楊阜號哭諫曰阜等率父兄子弟以義相勵有死無二以為使君守此城號戶刀翻為于僞翻今奈何棄垂成之功陷不義之名乎刺史太守不聽開城門迎超超入遂殺刺史太守自稱征西將軍領並州牧督涼州軍事魏公操使夏侯淵救冀未到而冀敗淵去冀二百餘里超來逆戰淵軍不利氐王千萬反應超屯興國氐王千萬略陽清水氐種也其後是為仇池之楊興國城名會楊阜喪妻就超求假以葬之喪息浪翻假居訝翻休假也求假猶古之請告請急也阜外兄天水姜敍為撫夷將軍擁兵屯歷城水經注歷城在西縣去仇池一百二十里後改為建安城杜佑曰歷城在今同谷郡西七里去仇池九十里宋白曰晉置仇池郡於歷城今為成州歔欷悲甚歔音虛欷許既翻又音希泣餘聲也敍曰何為乃爾阜曰守城不能完君亡不能死亦何面目以視息於天下目之視物一出入息之頃則一瞬虐殺州將背蒲妹翻將即亮翻豈獨阜之憂責一州士大夫皆蒙其恥君擁兵專制而無討賊心此趙盾所以書弒君也趙盾晉卿趙宣子也左傳趙穿攻靈公於桃園宣子未出山而復太史書曰趙盾弒其君以示於朝宣子曰不然對曰子為正卿亡不越境反不討賊非子而誰多釁易圖耳易以豉翻敍母慨然曰咄伯奕韋使君遇難亦汝之負豈獨義山哉咄當沒翻姜敍字伯奕楊阜字義山負罪負也難乃旦翻人誰不死死於忠義得其所也但當速發勿復顧我我自為汝當之復扶又翻為于僞翻不以餘年纍汝也纍力瑞翻敍乃與同郡趙昂尹奉武都李俊等合謀討超又使人至冀結安定梁寬南安趙衢使為內應超取趙昂子月為質質音致昂謂妻異曰據皇甫謐列女傳異士氏女也吾謀如是事必萬全當奈月何異厲聲應曰雪君父之大恥喪元不足為重喪息浪翻況一子哉九月阜與敍進兵入鹵城鹵城當在西縣冀縣之間以討超水經注祁山在嶓冢之西七十許里山上有城極為險固漢水徑其南又曰祁山在上邽西南二百四十里杜佑曰祁山在今同谷郡長道縣東十里余據今西和州長道縣南十里有祁山古來南北二岈有萬餘家諸葛亮表言祁山去沮五百里有人萬戶者此也大怒趙衢因譎說超使自出擊之譎古穴翻說輸芮翻超出衢與梁寬閉冀城門盡殺超妻子超進退失據乃襲歷城得敍母敍母罵之曰汝背父之逆子殺君之桀賊背父謂馬騰在鄴不顧而反殺君謂殺韋康也背蒲妹翻而不早死敢以面目視人乎超殺之又殺趙昂之子月楊阜與超戰身被五創超兵敗遂南奔張魯被皮義翻創初良翻考異曰楊阜傳云十七年九月武帝紀十八年超在漢陽復因羌胡為害十九年正月趙衢等討超超奔漢中按姜敍九月起兵超即應出討超出衢等即應閉門不應至來年正月蓋魏史書捷音到鄴之月耳楊阜傳誤也魯以超為都講祭酒魯為五斗米道自號師君其來學者初名鬼卒後號祭酒各領部衆都講祭酒者魯使學者都習老子五千文置都講祭酒位次師君妻七細翻或謂魯曰有人若此不愛其親焉能愛人焉於虔翻魯乃止操封討超之功侯者十一人賜楊阜爵關內侯十八年冬十一月魏初置尚書侍中六卿以荀攸為尚書令涼茂為僕射涼姓茂名魏置五曹尚書吏部左民客曹五兵度支自是以後侍中遂以四人為定員大理漢廷尉之職袁渙為郎中令行御史大夫事郎中令漢光祿勳之職時以御史大夫為三公以中丞為御史臺主袁渙得賞賜皆散之家無所儲乏則取之於人不為皎察之行皎吉了翻行下孟翻然時人皆服其清時有傳劉備死者㣥臣皆賀惟渙獨否魏公操欲復肉刑令曰昔陳鴻臚以為死刑有可加於仁恩者臚陵如翻御史中丞能申其父之論乎陳㣥父紀為漢大鴻臚臣父紀以為漢除肉刑而增加於笞事見十五卷文帝十三年所謂名輕而實重者也名輕則易犯易以豉翻實重則傷民且殺人償死合於古制至於傷人或殘毀其體而裁剪毛髮非其理也若用古刑使淫者下蠶室盜者刖其足則永無淫放穿踰之姦矣下遐稼翻刖音月穿者穿穴隙踰者踰垣牆夫三千之屬周穆王作甫刑墨罰之屬千劓罰之屬千剕罰之屬五百宮罰之屬三百大辟之罰其屬二百五刑之屬三千若斯數者時之所患宜先施用漢律所殺殊死之罪仁所不及也其餘逮死者可易以肉刑如此則所刑之與所生足以相貿矣貿易也是重人支體而輕人軀命也當時議者唯鍾繇與㣥議同餘皆以為未可行操以軍事未罷顧衆議而止何茲全標點容肇祖聶崇岐覆校
